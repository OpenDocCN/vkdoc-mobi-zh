    ## Debugging JavaScript


    Like most scripting languages, JavaScript comes with its share of hair pulling,
    and it can be hard putting your finger on why exactly your script isn’t working.
    The Web Inspector makes several very handy tools available to you in this task,
    from the most straightforward script execution timeline to the more complex observation
    helpers such as breakpoints. We’ll now cover how your developing tools can help
    you get out of scripting chaos faster and with less guessing.


    Before you start, please note that, unlike the Elements Inspector, in which the
    HTML code was clearly displayed as a structured tree, the JavaScript code will
    appear as it was originally written. Therefore, we would obviously not recommend
    that you work with these tools on minified code—code from which unnecessary spaces
    and line feeds have been removed in order to make file size smaller.


    ### Logging to the Console


    If you’ve already coded in JavaScript, it’s likely that you’ve already used an
    `alert()` method to get the value of an object or a variable at some precise point
    of your developing process. Because this has quite a few drawbacks (don’t try
    this with loops, for instance!), you may have gotten further by using some tracing
    options, which is generally more natural and efficient. The good news is that
    there is a full Console API that you can use with the Web Inspector.


    **Table 3–1.** Logging Functions


    | Function | Description |

    | :--- | :--- |

    | `console.log(format, ...);` | Logs a message or object properties to the console.
    These five functions only differ in the icon shown on the left of the message.
    On Safari Mobile, only these commands are available; moreover, the formatting
    options listed in the next table are not available. |

    | `console.info(format, ...);` |  |

    | `console.debug(format, ...);` |  |

    | `console.warn(format, ...);` |  |

    | `console.error(format, ...);` |  |

    | `console.assert(condition, format, ...);` | Logs to the console only if the
    condition is not met. |

    | `console.group(format, ...);` | Starts and ends a group of logs. Each new group
    will be indented relative to the other logs. |

    | `console.groupEnd();` |  |

    | `console.time(name);` | Respectively starts and ends a timer, supposedly to
    track code execution times. The name is to identify the timer so that it can be
    stopped. |

    | `console.timeEnd(name);` |  |

    | `console.count(name);` | Sets a function-call counter. name is used to identify
    the counter. Counter logs an incremented number for each new call of a function.
    |

    | `console.dir(object);` | Logs all properties of an object to the console. |

    | `console.dirxml(node);` | Logs an HTML node with all its child nodes as a collapsible
    tree. In the latest versions of the |'
