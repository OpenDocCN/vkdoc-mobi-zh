    \ Found)` 状态或 `410` 状态 (`Gone`)。\n\n这可以用于检查浏览器是否已下载了新版本并通知用户：\n\n```\nif (window.applicationCache.status\
    \ == window.applicationCache.UPDATEREADY) {\n  if (window.confirm(\"A new version\
    \ is available.\\nDo you want to use it now?\")) {\n    window.location.reload();\n\
    \  }\n}\n```\n\n此状态并不一定会立即可用。如果在资源加载时检查此状态，则会发送 `CHECKING` 状态。因此，为更新和下载过程添加监听器会很有用，我们很快就会看到这一点。\n\
    \n您还可以直接使用 JavaScript 控制缓存，使用表 15-5 中介绍的方法。\n\n**表 15-5. 缓存相关方法**\n\n| 方法 | 描述\
    \ |\n|--------|-------------|\n| `cache.update()` | 如果服务器上有资源可用，则强制验证并更新缓存。如果文档没有关联的缓存，则会发送一个\
    \ `INVALID_STATE_ERR` 异常。 |\n| `cache.swapCache()` | 如果可用，则激活新的缓存资源 (`UPDATEREADY`)。否则会抛出一个\
    \ `INVALID_STATE_ERR` 异常。 |\n\n例如，即使状态设置为 `IDLE` 且清单文件刚刚被修改，调用 `update()` 方法也会强制重新加载缓存。在新资源下载完成后，状态将变为\
    \ `UPDATEREADY`。调用 `swapCache()` 将强制使用新资源，并且状态将返回到 `IDLE`。\n\n当然，当前页面不会自动更新，您必须等待下一次启动\
    \ Web 应用程序时用户才能看到更改。但是，您也可以使用 JavaScript 读取新资源。如果对 `update()` 的调用成功并且下载完成，您可以按如下方式调用更新后的资源：\n\
    \n```\n/* 更新一个 iframe */\nvar iframe = document.getElementById(\"myIframe\");\n\
    iframe.src = iframe.src;\n\n/* 更新文档中的第一张图片 */\nvar image = document.images[0];\n\
    image.src = image.src;\n```\n\n您也可以关联一个新缓存的资源：\n\n```\nimage.src = \"newlyCachedImage.png\"\
    ;\n```\n\n在 Safari 中，令人惊讶的是，尽管 `swapCache()` 旨在切换应用程序缓存，但在调用 `swapCache()` 之前缓存就已经可用。因此，您应该仅在调用\
    \ `swapCache()` 之后才执行此类操作，而不是仅仅在调用 `update()` 之后。\n\n# 第 15 章：更好地处理客户端数据存储\n\n\
    ## 响应应用程序缓存发送的事件\n\n在应用程序更新的执行周期中，会发送一系列事件，让应用程序了解正在发生的事情并做出相应反应。这些事件列在表 15-6\
    \ 中。\n\n**表 15-6. 缓存更新事件**\n\n| 事件 | 描述 |\n|-------|-------------|\n| `checking`\
    \ | 浏览器正在尝试首次下载清单，或正在检查是否有可用的更新。 |\n| `noupdate` | 清单文件没有变化。 |\n| `downloading`\
    \ | 已开始下载清单中列出的资源，无论是为了首次获取资源还是更新缓存。 |\n| `progress` | 浏览器正在下载清单中列出的资源。 |\n| `cached`\
    \ | 清单中列出的资源已全部下载完毕，应用程序现在可从缓存中使用。此事件仅在首次下载时发送。 |\n| `updateready` | 缓存中的资源已全部重新下载完毕。\
    \ |\n| `obsolete` | 清单不再可用，并且服务器已发送 `404` 或 `410` 状态。下次启动应用程序时，缓存将被删除。 |\n| `error`\
    \ | 未找到清单或清单包含错误。 |\n\n可以使用常规的 DOM 方法或使用 `ApplicationCache` 对象属性来注册这些事件。\n\n```\n\
    window.applicationCache.addEventListener(\"updateready\", doSomethingHandler,\
    \ false);\n/* 或者... */\nwindow.applicationCache.onupdateready = doSomethingHandler;\n\
    ```\n\n事件序列必然以 `checking` 事件开始，因为文档在 `<html>` 标签中持有对清单的引用。\n"
- fmt: "Then, if the document has no application cache associated with it, and if\
    \ the manifest contains no error, the `downloading` event will be triggered, followed\
    \ by a series of `progress` events, until all listed resources have been fetched.\
    \ The sequence will terminate with the `cached` event, indicating the application\
    \ cache has been created and that the web application is now cached.\n\nIf the\
    \ document already has an application cache associated with it and the browser\
    \ hasn’t detected any changes in the manifest, a `noupdate` event will be sent,\
    \ and the sequence will halt immediately. Otherwise, the sequence will be the\
    \ same as earlier but will finish with a `updateready` event instead of a `cached`\
    \ event. In such a case, you can call the `swapCache()` method, as shown earlier.\n\
    \nIf the manifest isn’t accessible or the manifest contains errors (such as a\
    \ signature problem, an unavailable resource...), the sequence will be interrupted\
    \ with an `error` event. Still, if a cache exists and the manifest file isn’t\
    \ found, an `obsolete` event will be sent, and the cache will be deleted from\
    \ the device.\n\nThe specifications plan for the `progress` event to be of `ProgressEvent`\
    \ type, allowing you to follow the progress of the download. As illustrated in\
    \ Chapter 12 dealing with Ajax, this type will let you determine whether the downloading\
    \ is computable using the `lengthComputable` property and will then evaluate the\
    \ loading time with the `loaded` and `total` properties.\n\nFor the moment, the\
    \ `progress` event type is not supported on iOS, nor is it implemented in Desktop\
    \ Safari. It will return a regular `Event` object. You can, yet, resort to this\
    \ event using a callback, because there will be no warranty that the progress\
    \ would be computable anyway.\n\n## Deleting Cache\n\nOnce a web application is\
    \ cached, it is no longer possible to delete it. Indeed, the user emptying the\
    \ browser cache will not affect the offline application cache. Thus, the only\
    \ way users can delete the cache is to visit the site again, hopeful they will\
    \ have an option to unload the application.\n\nIf your manifest is a dynamic file\
    \ (a PHP script, for instance), it is possible to offer this option by setting\
    \ a cookie that will be read by the manifest script in order to return a `404`\
    \ error if the cache should be deleted.\n\n```html\n<script>\nfunction switchMode(online)\
    \ {\n  var now = new Date().getTime();\n  var tenYears = 1000 * 60 * 60 * 24 *\
    \ 365 * 10;\n  var expires = new Date(now + tenYears) * (online ? +1 : -1);\n\
    \  document.cookie = \"online=true; expires=\" + expires;\n}\n</script>\n...\n\
    <div class=\"header-wrapper\">\n  ...\n  <button onclick=\"switchMode(true)\"\
    >No Cache</button>\n</div>\n...\n```\n\nThe PHP manifest could look something\
    \ like this:\n\n```php\n<?php\n$code = ($_COOKIE['online'] == 'true') ? 410 :\
    \ 200;\nheader('Content-type: text/cache-manifest', true, $code);\n?>CACHE MANIFEST\n\
    ```\n\nWhen the user clicks the **No Cache** button, a new online cookie will\
    \ be created with the boolean value `true`. The expiration date is set far enough\
    \ in the future not to expire.\n\nWhen the manifest file is accessed again, the\
    \ script will check for the cookie using the `$_COOKIE` hash table and will send\
    \ a response relevant to the value of `online`. The web application will finally\
    \ receive an `obsolete` event, as explained earlier.\n\n## Is the User Online?\n\
    \nWhether an offline application cache is associated with the current document\
    \ or not, you can easily check the state of the network. This piece of information\
    \ can be gathered from the `onLine` property of the `navigator` object. This way,\
    \ it is possible to prevent downloading some elements from the JavaScript, such\
    \ as the RSS feed used previously, if the network is not available, thus preventing\
    \ access to the callback content.\n\n```javascript\nfunction refresh(db) {\n \
    \ /* Always display the previous content */\n  processFeed(db);\n  /* Do not try\
    \ to download feeds if not online */\n  if (!window.navigator.onLine) {\n    return;\n\
    \  }\n  ...\n}\n```"
