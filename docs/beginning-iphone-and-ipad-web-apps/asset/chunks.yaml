  raw: 'Obviously, this method isn’t very flexible, and it entails that all your handlers
    are triggered only when the global handler is called. Using the addEventListener()
    and removeEventListener() methods should be preferred in most cases.


    CHAPTER 13: Using Touch and Gesture Events


    The Capture Stage


    The third parameter to the addEventListener() method specifies whether you want
    to add a listener only for the capture stage, which means it won’t be triggered
    during the target and bubbling stages. The capture stage is the process by which
    an event can be handled by parents to the target before being allotted to the
    target itself.


    <div>0<div>1<div>2<div>3<div>4


    <div>5</div>


    </div></div></div></div></div>


    <script>


    var div = document.getElementsByTagName("div");


    div[0].addEventListener("click", handleEvent, false);


    div[1].addEventListener("click", handleEvent, false);


    div[2].addEventListener("click", handleEvent, false);


    div[3].addEventListener("click", handleEvent, false);


    div[4].addEventListener("click", handleEvent, false);


    div[5].addEventListener("click", handleEvent, false);


    function handleEvent(event) {


    console.log("(" + event.eventPhase + ") " + this.firstChild.nodeValue);


    }


    </script>


    In this piece of code, each <div> is the parent of the next <div>. Therefore,
    every click on a number will reach the direct target (target phase) and then move
    up the DOM tree to the top-level ancestor (bubbling phase). For instance, clicking
    4 will cause 4, 3, 2, 1, 0


    to be logged to the console. Naturally, ancestors will receive the event only
    if a listener exists.


    To precisely identify the event target, you can rely on two properties of the
    Event object.


    The target property holds the actual target of the event; clicking 4 in the previous
    example, it would return a reference to the element holding the string "4". The
    currentTarget property is a reference to the object receiving the event during
    the bubbling phase or the capture phase. In a handler such as the one defined
    earlier, this and currentTarget are equal; if our handler had been bound to an
    object, on the


    contrary, this would refer to that object. Moreover, you can simply determine
    the phase relative to the received event using the eventPhase property, whose
    possible values are presented in Table 13–1.


    CHAPTER 13: Using Touch and Gesture Events


    Table 13–1\. Constants Use for the Different Event Phases


    **Constant**


    **Description**


    *event*.CAPTURING_PHASE (1)


    The current event phase is the capture phase.


    *event*.AT_TARGET (2)


    The current event phase is the target phase.


    *event*.BUBBLING_PHASE (3)


    The current event phase is the bubbling phase.


    Now, if you change the third parameter of the first listener from false to true,
    the order of the log wil change, because the event wil be in capture phase first.
    The console wil display 0, 4, 3, 2, 1\. Capture handlers are always added to the
    top of the cal stack.


    Control Over Event Propagation


    If you want to precisely control every click within your web application—as, for
    instance, we have done in Chapter 4 to maintain the application in ful -screen
    mode—you need to use capture (set the third parameter to true). Capture, for instance,
    could let you prevent the user from tapping some elements if the user is not logged
    in. The stopPropagation() method of the Event object al ows you to prevent the
    propagation of the event at any chosen moment. This way, try modifying our previous
    handler as fol ows:


    div[0].addEventListener("click", handleEvent, **true**);


    ...


    function handleEvent(event) {


    console.log("(" + event.eventPhase + ") " + this.firstChild.nodeValue); **if (event.eventPhase
    == event.CAPTURING_PHASE) {**


    **event.stopPropagation();**


    **}**


    }


    Download from Wow! eBook <www.wowebook.com>


    Only the value 0 wil be logged to the console, corresponding to the text of the
    first


    <div>, because propagation for any child <div> is halted directly during the capture
    phase. This doesn’t mean that listeners defined with the same currentTarget and
    at the same phase won’t be cal ed, but using this method implies that there is
    no guarantee that your handler wil be triggered, because the process can be interrupted
    at any moment by another handler at a higher level.


    Preventing Default Behavior


    It is also often desirable to local y prevent the default behavior of the browser
    to some event, typical y changing the URL when a link or submit button is tapped
    or preventing gesture effects using the touchstart event. This can be done using
    the


    preventDefault() method, assuming that the event can be canceled. You can check


    this by reading the cancelable property of the Event object. Note that this method
    has the advantage of not stopping propagation.


    CHAPTER 13: Using Touch and Gesture Events


    Handlers and Object Methods


    There are cases where you will need to use a handler based on an object method,
    and you will have to restore the calling context, as shown in Chapter 10, and
    encapsulate the method in a new Function object. This of course implies more memory
    usage. To


    address this issue, since DOM Level 2, you can use the handleEvent() method from
    the EventListener interface. To benefit from the advantages of this method, you
    should simply use the this keyword or any other instance of an object implementing
    the


    function in place of what generally would be a Function object as a parameter
    to the addEventListener() method.


    someObject.addEventListener("click", **this**, false);


    Proceeding this way, the scripting engine will seek a handleEvent() method attached
    to this and will call the method passing the Event-derived object (MouseEvent,


    TouchEvent...) with all its properties to it. The keyword this can be used when
    the handleEvent() is at the window level or when it is directly under an object
    definition. In other cases, you will need to pass an object instance, as shown
    here:


    <div>Click Me</div>


    <script>


    /* A sample objet */


    var Example = function(name) {


    this.name = name;


    }


    Example.prototype.handleEvent = function(event) {


    switch (event.type) {


    case "mousedown":


    case "mouseup":


    this[event.type + "Handler"](event);


    }


    }


    Example.prototype.mousedownHandler = function(event) {


    console.log("The ''mousedown'' handler was called with " + this.name + ".");


    }


    Example.prototype.mouseupHandler = function(event) {


    console.log("The ''mouseup'' handler was called with " + this.name + ".");


    }


    /* Create 2 objects and use them as event handlers */


    var div = document.getElementsByTagName("div")[0];


    var obj1 = new Example("Object 1");


    var obj2 = new Example("Object 2");


    div.addEventListener("mousedown", obj1, false);


    div.addEventListener("mouseup", obj2, false);


    </script>


    CHAPTER 13: Using Touch and Gesture Events


    **--- result ---**


    > The ''mousedown'' handler was called with Object 1.


    > The ''mouseup'' handler was called with Object 2.


    In this code, the handling of events is deferred to two instances of Example.
    As you can see, the execution context is maintained, and each event triggers a
    log using the expected value for name. To make maintenance easier, the subhandler
    has been


    externalized to specific methods called using the ability of JavaScript to provide
    object properties through a hash table. Of course, if the code you use is short,
    you could use switch...case directly without any additional method.


    Classic Events with Mobile Safari


    Although Apple portable devices have no support for external pointing devices,
    the events usually related to a mouse are supported by Mobile Safari. This, however,
    is of limited usefulness because they are simply faked and may react differently
    than what would be expected in a desktop environment.


