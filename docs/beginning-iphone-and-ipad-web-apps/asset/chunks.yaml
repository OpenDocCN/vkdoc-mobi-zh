    \n你会看到，那里列出的大多数选择器要么是已知的，要么是显而易见的。你可能会注意到一些有趣的新成员，它们允许进行否定选择或仅匹配属性的部分内容。在第 9 章中，我们还将使用功能非常强大的`:target`，它可以省去不少\
    \ JavaScript 代码。\n\n然而，其他一些选择器虽然有用，但可能不那么直观。以下是对这些选择器的一些说明和解释。\n\n首先，伪元素现在通过使用双冒号标记（`::`）而不是单冒号来与伪类区分。这看起来很琐碎，但\
    \ CSS2 并没有做出这种区分。这对选择器的本质有意义：伪元素不属于文档树。通常它们属于文档文本内容，无法通过文档语言正常访问；而伪类旨在根据元素在 DOM\
    \ 中的位置进一步识别它们。\n\n其次，你应该注意空格，因为一个“空选择器”可以匹配任何元素。\n\n```css\n/* 2 个等效定义...（带空格）\
    \ */\np ::first-letter { ... }\np *::first-letter { ... }\n\n/* ...但不同于 */\np::first-letter\
    \ { ... }\n```\n\n接下来，请注意你可以链式使用选择器。例如，你可能想在所有文章的末尾添加一个视觉标记。假设`<div>`的最后一个子元素是一个段落元素，可以按如下方式实现：\n\
    \n```css\ndiv p:last-child::after {\n  content: \"The End\";\n  font-weight: bold;\n\
    }\n```\n\n这可能会相当复杂，因为实际上，你可以精确到几乎无极限，正如以下示例所示：\n\n```css\na.class1.class2:not(#id1):first-child:hover\
    \ {\n  color: red;\n}\n```\n\n这里，我们定位任何同时具有`class1`和`class2`类、但不具有`id1`ID、且是父元素的第一个子元素的锚点，以对其悬停状态应用特定颜色。\n\
    \n### 位置相关选择器：结构伪类\n\n你可能已经习惯了使用`:first-child`和`:last-child`选择器。如果是这样，你大概知道它们可能会令人沮丧，原因有二。\n\
    \n第一个限制是，显然，它们只允许你分别定位第一个和最后一个子元素。然而，常常需要为元素的倒数第二个子元素、每隔一个元素，或某个类型的第一个子元素应用不同的样式。\n"
- fmt: "第二个原因是，这两个选择器都具有模糊性：`p:first-child`并非直接选中第一个`<p>`元素，而是选中父元素中的第一个子元素，如果该子元素恰好是`<p>`类型。因此，在以下代码中，没有任何段落会被应用不同的样式：\n\
    \n```html\n<style>\ndiv p:first-child {\n  font-weight: bolder;\n}\n</style>\n\
    \n<div>\n  <h1>Some Title</h1>\n  <p>First paragraph, but not first element: will\
    \ not be bold text.</p>\n  <p>Second paragraph.</p>\n</div>\n```\n\n# 第6章：为Web应用用户界面设计的实用CSS特性\n\
    \n上述所有限制都在CSS3中得到了解决。不过，这些新选择器的语法需要一些说明。我们将要探讨的选择器包括那些涉及在DOM树中计数的元素：`:nth-child()`、`:nth-last-child()`、`:nth-of-type()`和`:nth-last-of-type()`。\n\
    \n所有这些选择器都共享一种特殊的语法，其中目标元素的计数可以用一个单独的数字来表示（仅选中第`n`个子元素），或者用符合`xn+y`模式的表达式来表示。如果`xn`和`y`等于0，则可以省略，但两者中必须有一个不为0。另外，`y`可以取负值。以下是一个应用示例：\n\
    \n```html\n<style>\n/* 这里不会有重复，等同于 nth-child(3) */\nul li:nth-child(0n+3) {\n\
    \  font-weight: bolder;\n}\n\nul li:nth-child(2n) {\n  /* 每隔一行会被影响 */\n  color:\
    \ red;\n}\n</style>\n\n<ul>\n  <li>Item</li>\n  <li>Red Item</li>\n  <li>Bolder\
    \ Item</li>\n  <li>Red Item</li>\n  <li>Item</li>\n  <li>Red Item</li>\n</ul>\n\
    ```\n\n`xn`始终代表表达式中的变量增量部分，而`+`号后面的数字则表示增量应该开始的起始位置。当变量设置为`0n`时，你只针对一个元素，正如我们第一个例子所示。\n\
    \n因此，表达式`ul li:nth-child(1n+3)`会选中所有从父元素的第三个子元素开始的`<li>`元素。使用`nth-child(4n+1)`则会选中从第一个子元素开始计数的每第四个元素（即第1、5、9、13...个）。\n\
    \n对于`:nth-last-child()`，语法是相同的，不同之处在于`n`是一个递减因子。`:nth-last-child(2n+0)`会选中从结尾开始计数的所有偶数元素。还要注意，无论是正向计数还是反向计数，`+y`都可以是`-y`，例如`(3n-1)`。\n\
    \n理解这种语法为你提供了丰富的可能性，可以设计重复性的布局模式，或者在不借助额外标记的情况下定位特定元素。还要注意，所有这些选择器都可以将`odd`和`even`关键字作为参数。因此，以下两条规则是相同的：\n\
    \n```css\nsection div:nth-child(2n+0)::after { content: \"even\"; }\nsection div:nth-child(even)::after\
    \ { content: \"even\"; }\n```\n\n以下两条规则也是相同的：\n\n```css\nsection div:nth-child(2n+1)::after\
    \ { content: \"odd\"; }\nsection div:nth-child(odd)::after { content: \"odd\"\
    ; }\n```\n\n另一方面，前面的例子可能不一定与下面的例子相同，因为起始点不同：\n\n```css\nsection div:nth-last-child(2n+0)::after\
    \ { content: \"odd or even\"; }\nsection div:nth-last-child(even)::after { content:\
    \ \"odd or even\"; }\n```\n\n最后，请注意，这些选择器作为参数所接受的表达式不应包含空白字符。以下是无效的，会被忽略：\n\n\
    ```css\nul li:nth-child(0n + 3) { font-weight: bolder; }\n```\n\n如我们所说，这些全局子元素选择器会搜索一个容器内的所有子元素，无论其类型如何。正如我们第一个例子所示，仅针对特定类型的子元素通常更可取。以下是修改后能按预期工作的版本：\n\
    \n```html\n<style>\ndiv p:first-of-type {\n  font-weight: bolder;\n}\n</style>\n\
    \n<div>\n  <h1>Some Title</h1>\n  <p>First paragraph now bolder!</p>\n  <p>Second\
    \ paragraph.</p>\n</div>\n```\n\n因此，你可以完全掌控元素的选中。\n\n## 背景的高级处理\n\n尽管以前的CSS版本所提供的可能性已经实现了许多令人鼓舞的设计，但它们通常使得设置背景的任务变得困难。"
  raw: 'The second reason is that both of these selectors have an ambiguous behavior
    where p:first-child doesn’t target the first <p> element, but the first element
    of the parent, if it is of type <p>. Thus, in the following code, no paragraph
    would be styled differently:


    <style>


    div p:first-child {


    font-weight: bolder;


    }


    </style>


    <div>


    <h1>Some Title</h1>


    <p>First paragraph, but not first element: will not be bold text.</p>


    <p>Second paragraph.</p>


    </div>


    CHAPTER 6: Interesting CSS Features for Your Web Application User Interface


    All of these limitations are addressed in CSS3\. However, the syntax for these
    new selectors deserves some explanation. The selectors we are going to look at
    here are those that imply counting elements within the tree, :nth-child(), :nth-last-child(),


    :nth-of-type(), :nth-last-of-type().


    These all share a peculiar syntax where the count of the element you want to target
    can be represented either by a single number, to target the *n* th child only,
    or by an expression matching the xn+y pattern. Both xn and y can be omitted if
    they equal 0, but one of them must be different from 0\. Also, y can have a negative
    value. Here is an application:


    <style>


    /* Here there will be no repetition, equal to nth-child(3) */


    ul li:nth-child(0n+3) {


    font-weight: bolder;


    }


    ul li:nth-child(2n) {


    /* Every other row will be affected */


    color: red;


    }


    </style>


    <ul>


    <li>Item</li>


    <li>Red Item</li>


    <li>Bolder Item</li>


    <li>Red Item</li>


    <li>Item</li>


    <li>Red Item</li>


    </ul>


    xn always represents the variable increment part of the expression, and the number
    after the + is the position where the increment should begin. When the variable
    is set to 0n, you target only one element, as in our first example.


    Hence, the expression ul li:nth-child(1n+3) would have to target all <li> elements
    starting at the third child of its parent. Using nth-child(4n+1) would target
    every fourth element starting the count at the first child (1, 5, 9, 13...).


    For nth-last-child(), the syntax is the same, except n is a decrement factor.
    :nth-last-child(2n+0) targets every even element counting from the end. Also note
    that for both forward and backward counting, the +y can be a -y, as in (3n-1).


    Understanding this syntax gives you plenty of possibilities to style repetitive
    layout patterns or target specific elements without resorting to additional markup.
    Also note that all these selectors can take the odd and even keywords as a parameter.
    Thus, the two following rules are identical:


    section div:nth-child(2n+0)::after { content: "even"; }


    section div:nth-child(even)::after { content: "even"; }


    As are these two:


    section div:nth-child(2n+1)::after { content: "odd"; }


    section div:nth-child(odd)::after { content: "odd"; }


    CHAPTER 6: Interesting CSS Features for Your Web Application User Interface


    On the other side, the former examples may or may not be identical to the following,
    because the starting point is different:


    section div:**nth-last-child**(2n+0)::after { content: "odd or even"; }


    section div:**nth-last-child**(even)::after { content: "odd or even"; }


    Finally, note that the expressions taken by these selectors as parameters should
    be free of whitespace. The following is invalid and will be ignored:


    ul li:nth-child(0n + 3) { font-weight: bolder; }


    As we said, these global child selectors search through all children of a container,
    regardless of their type. It can often be preferable to target only one kind of
    children, as in our first example. Here it is again, modified to work as expected:


    <style>


    div p:**first-of-type** {


    font-weight: bolder;


    }


    </style>


    <div>


    <h1>Some Title</h1>


    <p>First paragraph **now bolder!** </p>


    <p>Second paragraph.</p>


    </div>


    Hence, you can have complete control over the selection of your elements.


    Advanced Handling of Backgrounds


    Although many inspiring designs have been achieved with the possibilities offered
    by previous versions of CSS, these usually made the task of setting a background
    a difficult one.'
  trans: "\n第二个原因是，这两个选择器都具有模糊性：`p:first-child`并非直接选中第一个`<p>`元素，而是选中父元素中的第一个子元素，如果该子元素恰好是`<p>`类型。因此，在以下代码中，没有任何段落会被应用不同的样式：\n\
    \n```html\n<style>\ndiv p:first-child {\n  font-weight: bolder;\n}\n</style>\n\
    \n<div>\n  <h1>Some Title</h1>\n  <p>First paragraph, but not first element: will\
    \ not be bold text.</p>\n  <p>Second paragraph.</p>\n</div>\n```\n\n# 第 6 章：为\
    \ Web 应用用户界面设计的实用 CSS 特性\n\n上述所有限制都在 CSS3 中得到了解决。不过，这些新选择器的语法需要一些说明。我们将要探讨的选择器包括那些涉及在\
    \ DOM 树中计数的元素：`:nth-child()`、`:nth-last-child()`、`:nth-of-type()`和`:nth-last-of-type()`。\n\
    \n所有这些选择器都共享一种特殊的语法，其中目标元素的计数可以用一个单独的数字来表示（仅选中第`n`个子元素），或者用符合`xn+y`模式的表达式来表示。如果`xn`和`y`等于\
    \ 0，则可以省略，但两者中必须有一个不为 0。另外，`y`可以取负值。以下是一个应用示例：\n\n```html\n<style>\n/* 这里不会有重复，等同于\
    \ nth-child(3) */\nul li:nth-child(0n+3) {\n  font-weight: bolder;\n}\n\nul li:nth-child(2n)\
