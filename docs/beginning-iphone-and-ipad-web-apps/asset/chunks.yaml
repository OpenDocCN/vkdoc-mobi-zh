    will be using in Chapter 15\. This way, whenever the user comes 102


    CHAPTER 5: User Experience and Interface Guidelines


    back to your web application, the user will be grateful for not having to type


    *Mephistofeles’s Antique Bookshelf Treasures* again.


    The key principle behind user input is that for whatever information you ask for,
    you should give as much extra functionality in return. Of course, gathering information
    about your user can greatly improve the quality of the service you are providing.
    The point is to make the “greatly” as great as possible relative to the “gather.”


    Avoid Multiplying Steps


    In the previous example, the user goes through three steps—filter, search, and
    sort—of which only the first is required. As we have stated earlier, the functionality
    the user came to find should be available as soon as possible, through a straightforward
    process. Cutting the book search application into three separate pages only to
    lighten up each stage—as is often seen with traditional Web, for example in account
    creation forms—wouldn’t be appropriate here. The benefits of such a decision—less
    panning, less clutter—would be hindered by the fact that the user is forced to
    wait, perhaps without even knowing how long the process will take or which step
    is next. Also, for the developer, it is a risky bet to consider that the network
    will be efficient three time in a row.


    The Spirit: Be Focused


    The iPhone is not a computer, nor is the iPad. Don’t expect users to handle them
    as such, and don’t develop your web applications with computer applications in
    mind. An iOS application should focus on bringing a specific and satisfying solution
    to a particular demand or problem and should focus almost only on providing what
    is expected in the most straightforward manner. The viewport holding your web
    app should therefore be a place holding selected elements that behave as a whole
    and a place that is uncluttered, discrete, and clear, as with the Clock application
    (Figure 5–10).


    Although this may originate in hardware limitations—slow rendering under heavy
    activity, limited screen estate—it has become an expectation of the user, whose
    loyalty will reward you for providing the appropriate answer to the user’s primary
    question. This becomes true for the iPad also, at least by inheritance, so, always
    focus on bringing one appropriate service rather than several approximate ones.


    ![](index-125_1.jpg)


    CHAPTER 5: User Experience and Interface Guidelines


    Figure 5–10\. The Clock application focuses on what is expected: time services


    Make Things Responsive'
