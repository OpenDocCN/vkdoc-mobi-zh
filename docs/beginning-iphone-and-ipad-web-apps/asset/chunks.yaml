    select property. This takes either the value auto, to al ow selecting; text, to
    let users select only text; or none, to disable it altogether.


    Nonetheless, be careful not to let usability dwindle, for instance by removing
    the ability to select text fields. The fol owing code takes care of this for you,
    using common selectors:


    *:not(input):not(textarea):not(select),


    input[type=image],


    input[type=file],


    input[type=submit],


    input[type=button],


    input[type=reset] {


    -webkit-user-select: none;


    }


    This wil prevent selection for al elements apart from text inputs (taking into
    account al the new input types), making your web application experience closer
    to that of a native Mobile Safari application.


