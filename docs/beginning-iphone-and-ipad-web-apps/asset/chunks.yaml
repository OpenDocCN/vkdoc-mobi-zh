- fmt: "显然，这个方法并不灵活，而且它意味着你所有的处理函数只会在全局处理函数被调用时触发。在大多数情况下，应该优先使用`addEventListener()`和`removeEventListener()`方法。\n\
    \n# 第13章：使用触摸和手势事件\n\n## 捕获阶段\n\n`addEventListener()`方法的第三个参数指定是否仅为捕获阶段添加监听器，这意味着它不会在目标阶段和冒泡阶段被触发。捕获阶段是一种事件在分配给目标本身之前，可以被目标的父级处理的过程。\n\
    \n```\n<div>0<div>1<div>2<div>3<div>4\n<div>5</div>\n</div></div></div></div></div>\n\
    \n<script>\nvar div = document.getElementsByTagName(\"div\");\ndiv[0].addEventListener(\"\
    click\", handleEvent, false);\ndiv[1].addEventListener(\"click\", handleEvent,\
    \ false);\ndiv[2].addEventListener(\"click\", handleEvent, false);\ndiv[3].addEventListener(\"\
    click\", handleEvent, false);\ndiv[4].addEventListener(\"click\", handleEvent,\
    \ false);\ndiv[5].addEventListener(\"click\", handleEvent, false);\n\nfunction\
    \ handleEvent(event) {\n    console.log(\"(\" + event.eventPhase + \") \" + this.firstChild.nodeValue);\n\
    }\n</script>\n```\n\n在这段代码中，每个`<div>`都是下一个`<div>`的父级。因此，每次点击一个数字都会先到达直接目标（目标阶段），然后沿着DOM树向上移动到最顶层的祖先（冒泡阶段）。例如，点击4将会在控制台输出4,\
    \ 3, 2, 1, 0。当然，只有存在监听器时，祖先才会接收到事件。\n\n为了精确识别事件目标，你可以依赖`Event`对象的两个属性。\n\n- `target`属性保存了事件的真实目标；在前面的例子中点击4，它会返回一个指向包含字符串“4”的元素的引用。\n\
    - `currentTarget`属性是一个引用，指向在冒泡阶段或捕获阶段接收事件的对象。\n\n在像前面定义的这样一个处理函数中，`this`和`currentTarget`是相等的；相反，如果我们的处理函数被绑定到了一个对象，`this`将指向那个对象。此外，你可以使用`eventPhase`属性简单地确定与接收事件相关的阶段，该属性的可能取值在表13-1中列出。\n\
    \n### 表13-1. 不同事件阶段使用的常量\n\n| 常量 | 描述 |\n| :--- | :--- |\n| `event.CAPTURING_PHASE`\
    \ (1) | 当前事件阶段是捕获阶段。 |\n| `event.AT_TARGET` (2) | 当前事件阶段是目标阶段。 |\n| `event.BUBBLING_PHASE`\
    \ (3) | 当前事件阶段是冒泡阶段。 |\n\n现在，如果你将第一个监听器的第三个参数从`false`改为`true`，日志的顺序将会改变，因为事件将首先处于捕获阶段。控制台将显示0,\
    \ 4, 3, 2, 1。捕获处理函数总是被添加到调用栈的顶部。\n\n## 控制事件传播\n\n如果你想精确控制Web应用程序中的每一次点击——例如，我们在第4章中为保持应用程序全屏模式所做的那样——你需要使用捕获（将第三个参数设置为`true`）。例如，如果用户未登录，捕获可以让你阻止用户点击某些元素。`Event`对象的`stopPropagation()`方法允许你在任何选择的时刻阻止事件的传播。这样，尝试修改我们之前的处理函数如下：\n\
    \n```\ndiv[0].addEventListener(\"click\", handleEvent, true);\n...\nfunction handleEvent(event)\
    \ {\n    console.log(\"(\" + event.eventPhase + \") \" + this.firstChild.nodeValue);\n\
    \    if (event.eventPhase == event.CAPTURING_PHASE) {\n        event.stopPropagation();\n\
    \    }\n}\n```\n\n只有值0会被记录到控制台，这对应于第一个`<div>`的文本，因为任何子`<div>`的传播在捕获阶段就被直接停止了。这并不意味着使用相同`currentTarget`并在同一阶段定义的监听器不会被调用，但使用此方法意味着无法保证你的处理函数会被触发，因为该过程可能在任何时刻被更高层级的另一个处理程序中断。\n\
    \n## 阻止默认行为\n\n通常，局部地阻止浏览器对某些事件的默认行为也是可取的，典型情况包括在点击链接或提交按钮时更改URL，或使用`touchstart`事件阻止手势效果。这可以通过使用`preventDefault()`方法来实现，前提是该事件可以被取消。你可以通过读取`Event`对象的`cancelable`属性来检查这一点。请注意，此方法具有不停止传播的优点。\n\
    \n## 处理函数和对象方法\n\n在某些情况下，你需要使用基于对象方法的处理函数，并且必须恢复调用上下文，如第10章所示，并将该方法封装在一个新的`Function`对象中。这当然意味着更多的内存使用。为了解决这个问题，从DOM\
    \ Level 2开始，你可以使用`EventListener`接口的`handleEvent()`方法。要利用此方法的优势，你应该简单地使用`this`关键字或任何其他实现该函数的对象实例，来代替通常作为参数传递给`addEventListener()`方法的`Function`对象。\n\
    \n```\nsomeObject.addEventListener(\"click\", this, false);\n```\n\n通过这种方式，脚本引擎将寻找一个附加到`this`上的`handleEvent()`方法，并调用该方法，将`Event`派生的对象（`MouseEvent`，`TouchEvent`...）及其所有属性传递给它。当`handleEvent()`位于window级别或直接位于对象定义下时，可以使用关键字`this`。在其他情况下，你需要传递一个对象实例，如下所示：\n\
    \n```\n<div>Click Me</div>\n<script>\n/* 一个示例对象 */\nvar Example = function(name)\
    \ {\n    this.name = name;\n}\n\nExample.prototype.handleEvent = function(event)\
    \ {\n    switch (event.type) {\n        case \"mousedown\":\n        case \"mouseup\"\
    :\n            this[event.type + \"Handler\"](event);\n    }\n}\n\nExample.prototype.mousedownHandler\
    \ = function(event) {\n    console.log(\"The 'mousedown' handler was called with\
    \ \" + this.name + \".\");\n}\n\nExample.prototype.mouseupHandler = function(event)\
    \ {\n    console.log(\"The 'mouseup' handler was called with \" + this.name +\
    \ \".\");\n}\n\n/* 创建2个对象并将它们用作事件处理函数 */\nvar div = document.getElementsByTagName(\"\
    div\")[0];\nvar obj1 = new Example(\"Object 1\");\nvar obj2 = new Example(\"Object\
    \ 2\");\ndiv.addEventListener(\"mousedown\", obj1, false);\ndiv.addEventListener(\"\
    mouseup\", obj2, false);\n</script>\n```\n\n**--- 结果 ---**\n\n```\n> The 'mousedown'\
    \ handler was called with Object 1.\n> The 'mouseup' handler was called with Object\
    \ 2.\n```\n\n在这段代码中，事件的处理被委托给了`Example`的两个实例。如你所见，执行上下文得以维持，每个事件都使用预期的`name`值触发一条日志。为了方便维护，子处理函数已被外部化为特定的方法，这些方法利用JavaScript通过哈希表提供对象属性的能力来调用。当然，如果你使用的代码很短，你可以直接使用`switch...case`而无需任何额外的方法。\n\
