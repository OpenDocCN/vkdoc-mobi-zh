    other movements typically are already interpreted by gesture events, as shown
    earlier. Therefore, we are going to use touch events, taking into consideration
    only the first finger. The script will first register all the points where the
    finger passes and will then try to interpret the sequence.


    The interpretation will be handled by projecting the movement against a 3x3 block
    grid, numbered from 1 to 9, that will let us extract a signature associated with
    a specific shape. As shown in Figure 13–4, the grid has no definite dimensions,
