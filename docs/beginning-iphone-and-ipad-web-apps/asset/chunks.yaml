  raw: 'Here, we use parametrized queries. In a query, a parameter is represented
    by a question mark, and for each question mark there needs to be an entry in the
    array passed as a parameter to executeSql(). This technique will not only save
    you the cumbersome


    building of long strings, it is above all a solid protection against SQL injection
    attacks.


    We will get into more detail about this in the upcoming section about security.


    Because queries are run asynchronously, we need to chain the calls using callbacks.


    Moreover, because creating tables and inserting initial data is an atomic and
    sequential operation, the same transaction has to be used so that, if an error
    should occur, all operations are canceled. Therefore, we pass a reference to initFeedList()
    to the


    createSchema() function, which will be called after the tables have been created.


    function initDatabase(db) {


    db.transaction(function(transaction) {


    createSchema(transaction, **initFeedList**);


    });


    }


    To make parametrized queries usable, we need to improve the executeSequence()


    method in order to pass the parameters. Also, because a query can be used several
    times for a same data set, we add the possibility to loop through a set of queries
    for a set of given parameters.


    function createSchema(tran**, next**) {


    ...


    executeSequence(tran, schema**, null, next**);


    }


    function executeSequence(tran, list**, params, next**) {


    **params = params || [];**


    **var max = Math.max(list.length, params.length);**


    var i = -1;


    (function recursive(tran) {


    if (++i < max) {


    tran.executeSql(list[i **% list.length**], **params[i]**, recursive);


    **/* Sequence completed */**


    **} else if (next) {**


    **next(tran);**


    **}**


    })(tran);


    }


    We calculate the utmost size between the list and the params parameters to go
    through a sufficient number of iterations to use all available data. Then, to
    execute the following instructions set, we test for the next parameter, and if
    it is set, we execute the function referred to. This way, the insertion will occur
    after the tables are created and never during their creation.


    CHAPTER 15: A Better Handling of Client-Side Data Storage


    Querying Data from the Tables


    Our database is now fully initialized. To fill the News table, we are going to
    fetch data from the Source table and send Ajax requests to gather data.


    function checkDatabase(db) {


    ...


    function() {


    /* Start database jobs */


    **refresh(db);**


    });


    ...


    }


    function initDatabase(db) {


    db.transaction(function(transaction) {


    createSchema(transaction, initFeedList);


    }**, null, function() {**


    **refresh(db);**


    **}**);


    }


    function refresh(db) {


    /* Always display the previous content */


    processFeed(db);


    /* Then try to refresh the News table */


    db.transaction(function (tran) {


    tran.executeSql("SELECT SourceID, URL, LastUpdated FROM Source", null,


    function(tran, res) {


    for (var i = 0; i < res.rows.length; i++) {


    var row = res.rows.item(i);


    var last = row.LastUpdated || new Date(0);


    var ttl = new Date() - 1000 * 60 * 10;


    // 10 minutes


    /* If the feed needs update */


    if (last <= ttl) {


    loadFeed(row.URL, db, row.SourceID);


    }


    }


    }


    );


    });


    }


    First, we add the relevant calls to the refresh() function from the success callback
    of the checking transaction. Then, using the new transaction created in refresh(),
    we read the data returned by the query from the SQLResultSet object, which holds
    all the rows resulting from the query inside the rows property. This property
    is a list of type SQLResultSetRowList whose elements are accessible only through
    the item() method.


    Table 15–2 gives detail for the ResultSet object properties.


    CHAPTER 15: A Better Handling of Client-Side Data Storage


    Table 15–2\. Properties of the *SQLResultSet* Object


    **Property Description**


    *result*.insertId


    When data is inserted into a table that has a field of type


    AUTOINCREMENT, this property holds the value of the last generated


    identity. If no such field is set, it holds the row number of the inserted


    line. If there is no insertion, trying to access this property will raise a


    INVALID_ACCESS_ERR exception.


    *result*.rowsAffected'
  trans: "\n这里我们使用了参数化查询。在查询中，参数用问号表示，每个问号都对应着作为参数传递给 `executeSql()` 的数组中的一个条目。这种技术不仅能省去你拼接长字符串的繁琐工作，更重要的是能有效防范\
    \ SQL 注入攻击。\n\n关于这一点，我们将在后续关于安全性的章节中做更详细的介绍。\n\n由于查询是异步执行的，我们需要使用回调函数来串联这些调用。\n\
    \n此外，由于创建表和插入初始数据是一个原子且顺序执行的操作，因此必须使用同一个事务，这样一旦发生错误，所有操作都会被撤销。因此，我们将对 `initFeedList()`\
    \ 的引用传递给了 `createSchema()` 函数，该函数会在表创建完成后被调用。\n\n```\nfunction initDatabase(db)\
    \ {\n  db.transaction(function(transaction) {\n    createSchema(transaction, initFeedList);\n\
    \  });\n}\n```\n\n为了让参数化查询可用，我们需要改进 `executeSequence()` 方法，以便传递参数。同时，由于同一查询可能对同一数据集使用多次，我们还增加了为给定的一组参数循环执行一组查询的功能。\n\
    \n```\nfunction createSchema(tran, next) {\n  ...\n  executeSequence(tran, schema,\
    \ null, next);\n}\n\nfunction executeSequence(tran, list, params, next) {\n  params\
    \ = params || [];\n  var max = Math.max(list.length, params.length);\n  var i\
    \ = -1;\n  (function recursive(tran) {\n    if (++i < max) {\n      tran.executeSql(list[i\
    \ % list.length], params[i], recursive);\n      /* 序列执行完成 */\n    } else if (next)\
    \ {\n      next(tran);\n    }\n  })(tran);\n}\n```\n\n我们计算 `list` 和 `params` 参数之间的最大值，以便进行足够次数的迭代来使用所有可用数据。然后，为执行后续的指令集合，我们会检查\
    \ `next` 参数，如果已设置，则执行其所引用的函数。这样，数据插入操作将在表创建完成后进行，而绝不会在创建过程中进行。\n\n## 第 15 章：更好地处理客户端数据存储\n\
    \n## 从表中查询数据\n\n我们的数据库现在已经完全初始化好了。为了填充 `News` 表，我们将从 `Source` 表中获取数据，并发送 Ajax\
    \ 请求来收集数据。\n\n```\nfunction checkDatabase(db) {\n  ...\n  function() {\n    /*\
    \ 开始数据库任务 */\n    refresh(db);\n  });\n  ...\n}\n\nfunction initDatabase(db) {\n\
    \  db.transaction(function(transaction) {\n    createSchema(transaction, initFeedList);\n\
    \  }, null, function() {\n    refresh(db);\n  });\n}\n\nfunction refresh(db) {\n\
    \  /* 总是先显示之前的内容 */\n  processFeed(db);\n  /* 然后尝试刷新 News 表 */\n  db.transaction(function\
    \ (tran) {\n    tran.executeSql(\"SELECT SourceID, URL, LastUpdated FROM Source\"\
    , null,\n      function(tran, res) {\n        for (var i = 0; i < res.rows.length;\
    \ i++) {\n          var row = res.rows.item(i);\n          var last = row.LastUpdated\
    \ || new Date(0);\n          var ttl = new Date() - 1000 * 60 * 10;\n        \
    \  // 10 分钟\n          /* 如果源需要更新 */\n          if (last <= ttl) {\n         \
    \   loadFeed(row.URL, db, row.SourceID);\n          }\n        }\n      }\n  \
    \  );\n  });\n}\n```\n\n首先，我们在检查事务的成功回调函数中添加了对 `refresh()` 函数的相关调用。然后，利用在 `refresh()`\
    \ 中创建的新事务，我们通过 `SQLResultSet` 对象读取查询返回的数据，该对象的 `rows` 属性中保存了查询结果的所有行。这个属性是一个 `SQLResultSetRowList`\
    \ 类型的列表，其元素只能通过 `item()` 方法访问。\n\n表 15-2 详细说明了 `ResultSet` 对象的属性。\n\n## 第 15 章：更好地处理客户端数据存储\n\
    \n### 表 15-2.*SQLResultSet* 对象的属性\n\n| 属性 | 描述 |\n|----------|-------------|\n\
    | `result.insertId` | 当数据插入到包含 `AUTOINCREMENT` 类型字段的表中时，此属性保存最后生成的身份标识值。如果未设置此类字段，则保存插入行的行号。如果没有插入操作，尝试访问此属性将引发\
    \ `INVALID_ACCESS_ERR` 异常。 |\n| `result.rowsAffected` | |\n"
- fmt: "`result.rows.length`返回查询已修改的行数，如果未做任何更改（例如，查询是`SELECT`语句），则返回`0`。\n\n`result.rows`：查询返回的行列表。\n\
    \n每列都可以通过名称访问，如同对象属性一样，名称与在表中创建时的大小写保持一致。`length`属性可让你了解结果集有多少行。\n\n**更新数据**\n\
    \n一旦检查了最后更新时间（如果需要），我们就发起`Ajax`请求来检索数据，随后将从`RSS`提要中提取这些数据。\n\n```javascript\n\
    function loadFeed(url, db, id) {\n    var xml = new XMLHttpRequest();\n    xml.onreadystatechange\
    \ = function() {\n        feedLoaded(this, db, id);\n    }\n    xml.open(\"get\"\
    , \"proxy.php?url=\" + encodeURIComponent(url));\n    xml.send();\n}\n\nfunction\
    \ feedLoaded(xhr, db, id) {\n    if (xhr.readyState == xhr.DONE && xhr.status\
    \ == 200) {\n        updateFeed(xhr.responseXML, db, id);\n    }\n}\n\nfunction\
    \ updateFeed(xml, db, id) {\n    db.transaction(function (tran) {\n        tran.executeSql(\"\
    UPDATE Source SET LastUpdated = ? WHERE SourceID = ?\",\n                    \
    \    [new Date(), id]);\n        var all = xml.getElementsByTagName(\"item\");\n\
    \        for (var i = 0; i < all.length; i++) {\n            var params = [];\n\
    \            params.push(getText(all[i], \"title\"));\n            params.push(getText(all[i],\
    \ \"description\"));\n            params.push(new Date(getText(all[i], \"pubDate\"\
    )));\n            params.push(getText(all[i], \"link\"));\n            params.push(id);\n\
    \            params.push(getText(all[i], \"guid\"));\n            upsertNews(tran,\
    \ params);\n        }\n    });\n}\n\nfunction upsertNews(tran, params) {\n   \
    \ var len = params.length;\n    var guid = params[len - 1];\n    var id = params[len\
    \ - 2];\n    tran.executeSql(\n        \"SELECT NewsID FROM News WHERE SourceID\
    \ = ? AND GUID = ?\", [id, guid],\n        function(tran, res) {\n           \
    \ var sql = (res.rows.length == 0) ?\n                \"INSERT INTO News (Title,\
    \ Content, Date, TargetURL, SourceID, GUID) \" +\n                \" VALUES(?,\
    \ ?, ?, ?, ?, ?)\"\n                :\n                \"UPDATE News SET \" +\n\
    \                \" Title = ?, Content = ?, Date = ?, TargetURL = ? \" +\n   \
    \             \"WHERE SourceID = ? AND GUID = ?\";\n            tran.executeSql(sql,\
    \ params);\n        }\n    );\n}\n```\n\n`loadFeed()`函数逐个发起`Ajax`请求，无需等待前一个请求完成。然后，在每次收到服务器响应后，我们立即使用`processFeed()`函数浏览`XML`。在此阶段，`Source`表中的`LastUpdated`字段会被更新，并且对于提要中的每条新闻条目，我们会在相关表中添加条目。这里无需同步行更新，因为执行此操作的顺序不重要。因此，批量插入就足够好了，稍后我们可以通过`SELECT...ORDER\
    \ BY`这样的请求对新闻进行排序。\n\n如果你熟悉`DBMS`，你可能习惯于运行某种自定义的`UPSERT`（`UPDATE`或`INSERT`）。在使用`Web\
    \ Database API`时，没有存储过程来完成此操作，并且在`SQL`语言中也没有适用的条件语句。执行此类操作的唯一方法是链接一个`SELECT`命令来确定数据是否可用，然后进行`UPDATE`（如果数据可用）或`INSERT`（如果不可用）。我们这里用于选择的关键字是`SourceID`/`GUID`组合，因为尽管`GUID`被假定为全局唯一，但实际上它仅在源级别是唯一的。\n\
    \n**注意：** 对于`UPDATE`操作，我们本可以使用`SELECT`操作返回的`NewsID`。但是，使用相同的参数数组可以使代码更简单。\n\n\
    我们的`News`表现在保存了来自两个提要的信息。如果你在桌面版`Safari`上测试，则可以使用第 3 章介绍的`Web Inspector`的`Storage`部分来读取数据库中存储的数据，只需从左侧窗格中选择`Apress`数据库，然后从内置命令提示符运行一个请求，如图\
    \ 15–4 所示。\n\n```sql\n> SELECT Title, Date, Name\nFROM News\nINNER JOIN Source\n\
    ON News.SourceID = Source.SourceID\nORDER BY Date DESC\n```"
  raw: '*Returns the number of lines that have been modified by a query, or 0 if


    nothing was altered (for instance, if the query was a SELECT statement).


    *result*.rows


    *A list of lines returned by the query.


    Every column is accessible by name, like an object property, with the same case
    as when it was created in the table. The length property will let you know how
    many lines are in the result set.


    Updating Data


    Once the last update time has been checked, if needed, we launch the Ajax requests
    to retrieve the data that we will then extract from the RSS feed.


    function loadFeed(url, db, id) {


    var xml = new XMLHttpRequest();


    xml.onreadystatechange = function() {


    feedLoaded(this, db, id);


    }


    xml.open("get", "proxy.php?url=" + encodeURIComponent(url));


    xml.send();


    }


    function feedLoaded(xhr, db, id) {


    if (xhr.readyState == xhr.DONE && xhr.status == 200) {


    updateFeed(xhr.responseXML, db, id);


    }


    }


    function updateFeed(xml, db, id) {


    db.transaction(function (tran) {


    tran.executeSql("UPDATE Source SET LastUpdated = ? WHERE SourceID = ?",


    [new Date(), id]);


    var all = xml.getElementsByTagName("item");


    for (var i = 0; i < all.length; i++) {


    var params = [];


    params.push(getText(all[i], "title"));


    params.push(getText(all[i], "description"));


    params.push(new Date(getText(all[i], "pubDate")));


    params.push(getText(all[i], "link"));


    params.push(id);


    CHAPTER 15: A Better Handling of Client-Side Data Storage


    params.push(getText(all[i], "guid"));


    upsertNews(tran, params);


    }


    });


    }


    function upsertNews(tran, params) {


    var len = params.length;


    var guid = params[len - 1];


    var id = params[len - 2];


    tran.executeSql(


    "SELECT NewsID FROM News WHERE SourceID = ? AND GUID = ?", [id, guid],


    function(tran, res) {


    var sql = (res.rows.length == 0) ?


    "INSERT INTO News (Title, Content, Date, TargetURL, SourceID, GUID) " +


    " VALUES(?, ?, ?, ?, ?, ?)"


    :


    "UPDATE News SET " +


    " Title = ?, Content = ?, Date = ?, TargetURL = ? " +


    "WHERE SourceID = ? AND GUID = ?";


    tran.executeSql(sql, params);


    }


    );


    }


    The loadFeed() function launches the Ajax requests one after another, without
    delaying for the previous request to complete. Then, after each response from
    the server, we immediately browse the XML with the processFeed() function. At
    this stage, the


    LastUpdated field is changed in the Source table, and for each news entry from
    the feed, we add entries in the relevant table. Here, there is no need to synchronize
    the line updating, because the order in which this operation is done is unimportant.
    Therefore, a bulk insert is good enough, and we wil be able to order the news
    later with a request Download from Wow! eBook <www.wowebook.com>


    such as SELECT...ORDER BY.


    If you are familiar with DBMSs, you may be used to running some kind of custom
    UPSERT


    (UPdate or inSERT). When dealing with the Web Database API, there is no stored


    procedure to do this, and there is no conditional statement applicable in the
    SQL


    language. The only way to perform such an operation is to chain a SELECT command
    to determine whether data is available with an UPDATE (if data is available) or
    an INSERT (if not). Our key here for the selection is the SourceID/GUID couple,
    because although a GUID is supposed to be unique global y, it is real y unique
    only at the level of its source.


    NOTE: For UPDATE operations, we could have used the NewsID returned by the SELECT


    operation. However, using the same parameters array makes the code simpler.


    Our News table now holds information from our two feeds. If you test this on Desktop
    Safari, it is possible to use the Storage section of the Web Inspector introduced
    in Chapter 3 to read the data stored in the database, simply by clicking the Apress


    ![](index-473_1.jpg)


    CHAPTER 15: A Better Handling of Client-Side Data Storage


    database from the left pane and running a request from the built-in command prompt,
    as shown in Figure 15–4.


    > SELECT Title, Date, Name


    FROM News


    INNER JOIN Source


    ON News.SourceID = Source.SourceID


    ORDER BY Date DESC'
