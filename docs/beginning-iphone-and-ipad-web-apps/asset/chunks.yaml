    \ c1 = (document.getElementById(\"left\").childNodes.length == 1);\n\nvar c2 =\
    \ (document.getElementById(\"right\").childNodes.length == 1);\n\nif (animate\
    \ || (c1 && dir == +1) || (c2 && dir == -1)) {\n\nreturn;\n\n}\n\nanimate = true;\n\
    \n...\n\n}\n\nfunction prepareFlipCurrent(dir) {\n\n...\n\ncurrent.addEventListener(\"\
    webkitTransitionEnd\", function() {\n\n...\n\nCHAPTER 9: Handling Transformations,\
    \ Animations, and Special Effects with CSS\n\n**animate = false;**\n\n}, false);\n\
    \n}\n\nIn addition to the animate variable, we add a control in slide() on the\
    \ number of children remaining on either sides of the Cover Flow display. If none\
    \ of them remain on one pane and the user tries to move elements from that side,\
    \ nothing will happen.\n\nThis is your Cover Flow setup. Of course, the colored\
    \ squares used in our example aren’t very attractive and should be replaced with\
    \ relevant content. To use this at its best, we suggest you try things with transitions,\
    \ such as modifying animation curves or adding more covers to estimate the impact\
    \ on the performance of your page.\n\nAdvanced Animations and Key Frames\n\nThe\
    \ transitions explained up to now only allow you to progressively slip from one\
    \ value to another for some property, and each property needs its own definition.\
    \ Moreover, they use implicit animation, because the animation is triggered by\
    \ the change of a property value. Whenever you need finer control over your animation\
    \ and have to\n\nexplicitly declare animations from your style sheets, you should\
    \ resort to Apple’s new CSS Animation module. This will let you precisely define\
    \ a series of events on a timeline, using an at-rule.\n\nKey Frames\n\nA key frame\
    \ specifies the state of an animation at some definite stage in time. A series\
    \ of key frames is defined using the @keyframes rule by giving a name to the sequence\
    \ that will be used by the animation-name property and listing CSS rules to be\
    \ animated.\n\n@-webkit-keyframes \"mySequence\" {\n\n0% {\n\nleft: 100px;\n\n\
    top: 0;\n\nbackground-color: red;\n\n}\n\n25% {\n\nleft: 75px;\n\nbackground-color:\
    \ green;\n\n}\n\n75% { background-color: blue; }\n\n100% {\n\nleft: 200px;\n\n\
    top: 100px;\n\n}\n\n}\n\nUsing this sequence, for instance, on an absolutely positioned\
    \ element, the element will be set to the position (100,0), with a red background.\
    \ Then, using 25 percent of the CHAPTER 9: Handling Transformations, Animations,\
    \ and Special Effects with CSS\n\ndefined animation duration, it will slide to\
    \ the left until it reaches the position (75,0) and simultaneously blend from\
    \ red to green. Finally, a new color switch will occur over 50\n\npercent of the\
    \ allotted time, before the element is shifted to the coordinates (200,100) over\
    \ the 25 percent remaining for the animation.\n\nNOTE: As with transitions, the\
    \ animations are optimized for some properties, and you are often better off using\
    \ transformations than regular CSS positioning in order to obtain better performances\
    \ and thus spare battery life and provide an overall better user experience.\n\
    \nTo prepare your animations, you have to determine the initial state (0%), optional\
    \ transitional states, and a final state (100%). The position of these states\
    \ must be set using numerical values followed by the % sign, or the rule will\
    \ not be considered valid.\n\nMoreover, the 0% and 100% points are mandatory.\
    \ Note, however, that they can be\n\nreplaced with the from and to keywords. The\
    \ order of the declarations isn’t important, but be careful because any single\
    \ mistake will make the whole sequence invalid and compromise the whole animation.\n\
    \nStarting and Timing the Animation\n\nTo trigger an animation, you simply need\
    \ to use the animation-name property,\n\nassociating the name of a sequence to\
    \ it and giving the animation a duration. The timing uses properties similar to\
    \ those of transitions, and you can use both the animation-duration property to\
    \ declare the duration and animation-delay to delay the beginning of the animation.\
    \ The duration will then be split up to determine the duration of each step of\
    \ the sequence.\n\ndiv {\n\n-webkit-animation-name: \"mySequence\";\n\n-webkit-animation-duration:\
    \ 10s;\n\n-webkit-animation-delay: 2s;\n\n-webkit-animation-iteration-count: 3;\n\
    \n}\n\nIn the previous example, we indicate that the animation should follow the\
    \ mySequence sequence and span over ten seconds, after a two-second delay. This\
    \ delay naturally isn’t taken into consideration for the animation duration. The\
    \ animation will be repeated three times before stopping and hence will last for\
    \ thirty seconds. The animationiteration-count property can also be set to infinite,\
    \ which is quite self-explanatory.\n\nAnimation Properties\n\nAs with transitions,\
    \ not all properties can be animated. However, using such a\n\nproperty—box-shadow,\
    \ for instance—within an @keyframes statement will not raise an error, and the\
    \ animation will resume, simply ignoring the faulty rule.\n\nWhen a property is\
    \ animated, the computed values are affected by the transformations applied all\
    \ along the animation. Moreover, because all properties pertaining to the 284\n\
    \nCHAPTER 9: Handling Transformations, Animations, and Special Effects with CSS\n\
    \nanimation can take several comma-separated values, it is possible to specify\
    \ several sequences for one element. In such a case, if the same properties are\
    \ animated, the last definition will overwrite the previous one.\n\n<style>\n\n\
    @-webkit-keyframes \"blue-yellow\" {\n\nfrom { background-color: blue; }\n\nto\
    \ { background-color: yellow; }\n\n}\n\n@-webkit-keyframes \"red-green\" {\n\n\
    from { background-color: red; }\n\nto { background-color: green; }\n\n}\n\ndiv\
    \ {\n\nwidth: 100px;\n\nheight: 100px;\n\n-webkit-animation-name: \"red-green\"\
    , \"blue-yellow\";\n\n-webkit-animation-duration: 10s, 2s;\n\n}\n\n</style>\n\n\
    <div></div>\n\nIn this peculiar example, the animation will begin with a blue\
    \ to yellow blending, because the same property is animated in both @keyframes,\
    \ and blue-yellow is called last.\n\nHowever, because the red-green animation\
    \ lasts longer, the animation will go on as if the red to green animation had\
    \ occurred and will be resumed with a slightly greenish red block, changing to\
    \ full green on the tenth second.\n\nBe aware that if the initial state declaration\
    \ is different from that of the actual element to animate for some property, no\
    \ transition will occur from one style to the other, and the transition initial\
    \ state declaration will be applied immediately. This may cause unpleasant effects,\
    \ for instance a jump of the element before the actual transition. Moreover, unlike\
    \ what happens with transitions, the state of the element after the animation\
    \ is complete isn’t persistent, and the element will instantly return to its initial\
    \ state, with the same jump effect.\n\nAlways keep these specificities in mind\
    \ when building animations for your web\n\napplications, and don’t get stuck because\
    \ of something that isn’t an actual issue but just a subtlety of the implementation.\n\
    \nThe Evolution Curve\n\nAnimation curves, defined using animation-timing-function,\
    \ are the same as for\n\ntransitions and use the cubic-bezier() function. The\
    \ curve isn’t applied globally for the animation as a unit, but one key frame\
    \ at a time. Thus, you can define a different curve for each step of the animation\
    \ within the at-rule. The animation-timing-function\n\nproperty is the only property\
    \ that can be used directly within the at-rule.\n\nCHAPTER 9: Handling Transformations,\
    \ Animations, and Special Effects with CSS\n\n@-webkit-keyframes \"mySequence\"\
    \ {\n\n0% {\n\nleft: 100px;\n\ntop: 0;\n\nbackground-color: red;\n\n}\n\n25% {\n\
    \nleft: 75px;\n\nbackground-color: green;\n\n**-webkit-animation-timing-function:\
    \ ease-in;**\n\n}\n\n...\n\n}\n\nThe timing function must be defined on the destination\
    \ key frame, or it will either not be applied or not be applied where expected.\
    \ If you want the function to apply to all steps of the sequence, you can define\
    \ it directly along with animation-name.\n\nWorking with Events\n\nAnimations\
    \ come with three new events. The first two, animationstart and\n\nanimationend,\
    \ will let you know when an animation starts or reaches its end; the third, animationiteration,\
    \ is triggered when an animation is run again after its first occurrence because\
    \ of the animation-iteration-count property value.\n\nvar div = document.getElementsByTagName(\"\
    div\")[0];\n\ndiv.addEventListener(\"webkitAnimationStart\", function(event) {\n\
    \nalert('The animation \"' + event.animationName + ' has started.');\n\n}, false);\n\
    \nAs for transitions, the name is case sensitive when used with the addEventListener()\
    \ method, and you should follow the camel case syntax used in the previous example.\n\
    \nAll three events use the new AnimationEvent object that adds the animation name\
    \ to the base Event object through the animationName property. For animationiteration\
    \ and\n\nanimationend, as with transitions, the elapsedTime property lets you\
    \ estimate the time elapsed during the animation.\n\nOf course, this property\
    \ will always return 0 for animationstart, because no delay before the animation\
    \ is taken into account. The event will actually be triggered only after the delay\
    \ is determined. Also note that because the animationiteration is replaced by\
    \ animationend for the last iteration, you will never get an animationiteration\
    \ if the counter is set to 1.\n\nSpecial Effects with CSS\n\nThe latest versions\
    \ of WebKit implement new properties that can make the life of web developers\
    \ much easier, such as reflection or masks. These are not yet part of the CSS3\n\
    \nspecifications, so they won’t be exportable for some time to other browsers.\n\
    \nCHAPTER 9: Handling Transformations, Animations, and Special Effects with CSS\n\
    \nCreating Reflections\n\nAlthough reflection has been a very popular effect for\
    \ some time now, there is no optimal way to implement it into your pages. Up to\
    \ now, solutions included creating a specific image for each element you wanted\
    \ reflected—which isn’t very flexible—or stacking 1-pixel high elements underneath\
    \ your image and applying a positioned\n\nbackground to each one while acting\
    \ on opacity, which is not very flexible either, because this can only work with\
    \ images and it takes up a lot of extra markup. Both of these solutions of course\
    \ are quite heavy on the rendering engine. WebKit comes with the new -webkit-box-reflect\
    \ property, which should be used as follows:\n\n-webkit-box-reflect: *<direction>\
    \ <offset> <mask-box-image>*\n\nThe direction parameter, which determines to which\
    \ side of the element the reflection should be built, can take either of four\
    \ values: below, above, left, or right. The offset can be set using any valid\
    \ CSS size unit, including percentages, and will determine the distance between\
    \ the original image and its reflection. Finally, the mask can be any image supported\
    \ for the background-image property, as Figure 9–11 demonstrates. The use of CSS\
    \ gradients for the mask will of course make the process even simpler and lightweight.\n\
    \n<style>\n\nimg {\n\n-webkit-box-reflect: below 3px\n\n-webkit-gradient(\n\n\
    linear,\n\nleft top, left bottom,\n\ncolor-stop(0.7, transparent), to(rgba(0,\
    \ 0, 0, 0.75))\n\n)\n\n}\n\n</style>\n\n<img src=\"panda.jpg\" alt=\"A nice panda\"\
    >\n\nUsing a gradient, like any other image format, the most important element\
    \ is the alpha channel, because pixels visible in the image used as a mask will\
    \ be visible in the reflection. Therefore, you will most often use PNG, although\
    \ all formats are supported.\n\nUsing a format that doesn’t support transparency\
    \ (or an image with no transparent or partially transparent pixel) will be the\
    \ same as not specifying a mask-box-image\n\nparameter: a full mask will be applied,\
    \ with all pixels visible. Note that the image will be stretched to take all the\
    \ available space of the reflection box.\n\nAlso keep in mind that when defining\
    \ your reflection mask, even using a gradient, it will be reversed according to\
    \ the direction: if the reflection is projected on the x-axis, it will be reversed\
    \ as in a mirror, and it will be shown upside down if the projection is vertical.\n\
    \n![](index-309_1.jpg)\n\nCHAPTER 9: Handling Transformations, Animations, and\
    \ Special Effects with CSS\n\nFigure 9–11\\. A simple reflection using a gradient\n\
    \nNOTE: On older WebKit versions, reflection doesn’t work in association with\
    \ transformations.\n\nUsing reflections for your Cover Flow effect, you will see\
    \ the reflection only for the focused element using iOS version 3.2 or earlier.\
    \ This has been solved in the latest versions of Safari.\n\nYou can of course\
    \ use SVG, in which case the transparency of the colors will determine the opacity\
    \ of the pixels, or canvases, using the WebKit-specific –webkit-canvas() function,\
    \ explained in Chapter 7\\. This way, you could easily define animations on your\
    \ masks, for instance, if you wanted to create a wavy water-reflection effect.\n\
    \nLikewise, if the element from which the reflection is built changes—for instance\
    \ during a hover event—the reflection will take this change into account. Finally,\
    \ remember that, like shadows, CSS reflections do not change the dimensions of\
    \ elements nor otherwise affect the layout.\n\nUsing Real Masks\n\nThe third parameter\
    \ to the reflection function is a mask, which can let you achieve quite interesting\
    \ effects once you have mastered their subtleties. Masks in WebKit are also available\
    \ as such with many advanced options and will let you finely cut out parts of\n\
    \n![](index-310_1.jpg)\n\nCHAPTER 9: Handling Transformations, Animations, and\
    \ Special Effects with CSS\n\nyour page elements. The supported items supported\
    \ for CSS masks are the same as for reflections, that is, images, gradients, SVG,\
    \ and canvases. Masks are declared much like backgrounds, meaning that all the\
    \ adjustments used for backgrounds—including those presented in Chapter 6—can\
    \ be used for masks, and you shouldn’t find difficult to master the new possibilities\
    \ available to you. Figure 9–12 shows the effect of the following rule:\n\n<style>\n\
    \nimg {\n\n-webkit-mask-image: url(mask.png);\n\n-webkit-mask-repeat: repeat-x;\n\
    \n-webkit-mask-size: 50%;\n\n}\n\n</style>\n\n<img src=\"flower.jpg\" alt=\"A\
    \ nice flower\">\n\nFigure 9–12\\. The content, mask, and association of the two\
    \ with CSS\n\nNot only can you use masks on backgrounds, but they can also be\
    \ applied on borders using the -webkit-mask-box-image property that behaves like\
    \ the border-image property.\n\nNote, however, that, unlike border images, border\
    \ masks do not adapt to the\n\ndimensions of the border; this means the corners\
    \ will be rendered without scaling, and the rest of the mask will be tiled or\
    \ stretched depending on the parameter you specify, regardless of the border itself.\n\
    \nCreate an iOS-Like Tab Bar Using Masks\n\nTo convey an idea of the possibilities\
    \ offered by masks and their options, we will create a tab bar similar to that\
    \ provided by the UITabBar object of the Cocoa Touch API, which is often used\
    \ in native applications (Figure 9–13).\n\n![](index-311_1.jpg)\n\nCHAPTER 9:\
    \ Handling Transformations, Animations, and Special Effects with CSS\n\nFigure\
    \ 9–13\\. The classic tab bar in the bottom of the Phone application\n\nFor this\
    \ we will rely on canvases, masks, and the flexible box model that we introduced\
    \ in Chapter 6\\. Also, we will use the new :target pseudo-oclass to activate\
    \ the current tab, so absolutely no script or images are required.\n\nGetting\
    \ the Initial Tab Bar Ready\n\nWe are going to base our example on the web application\
    \ template used and extended in previous chapters. Simply add the code associated\
    \ with our tabs:\n\n...\n\n<body>\n\n<div class=\"view\">\n\n<div class=\"header-wrapper\"\
    >\n\n<h1>Tab Bar Demo</h1>\n\n</div>\n\n<nav class=\"tabbar-wrapper\">\n\n<ul>\n\
    \n<li id=\"tab1\"><a href=\"#tab1\"><b><i></i></b>Most Recent</a></li>\n\n<li\
    \ id=\"tab2\"><a href=\"#tab2\"><b><i></i></b>Favorites</a></li>\n\n<li id=\"\
    tab3\"><a href=\"#tab3\"><b><i></i></b>Search</a></li>\n\n<li id=\"tab4\"><a href=\"\
    #tab4\"><b><i></i></b>Bookmarks</a></li>\n\n<li id=\"tab5\"><a href=\"#tab5\"\
    ><b><i></i></b>History</a></li>\n\n</ul>\n\n</nav>\n\n</div>\n\n</body>\n\n...\n\
    \nCHAPTER 9: Handling Transformations, Animations, and Special Effects with CSS\n\
    \nThe :target pseudo-class is going to let us focus the tab relevant to the active\
    \ hash in the URL. To do this, we add an ID to each list item of the list identical\
    \ to the hash specified as href to the anchor. The <i> and <b> tags wil only be\
    \ placeholders for the tab icons and their shadows. This wil be explained thoroughly\
    \ later in this chapter.\n\nNext, we add some rules to our *main.css* file to\
    \ style our tab bar. This shares some resemblance with the header; it is simply\
    \ higher and uses a slightly different gradient, because the base color is black.\n\
    \n.tabbar-wrapper {\n\nbackground-color: black;\n\nbackground-image:\n\n-webkit-gradient(linear,\
    \ left top, left bottom,\n\nfrom(rgba(255, 255, 255, 0.2)),\n\nto(rgba(255, 255,\
    \ 255, 0.1)) );\n\nbackground-repeat: no-repeat;\n\nbackground-position: top left;\n\
    \n-webkit-background-size: 100% 50%;\n\nborder-top: solid 1px rgba(0,0,0,0.6);\n\
    \nposition: absolute;\n\nbottom: 0;\n\nwidth: 100%;\n\n}\n\nThen, here are the\
    \ rules relative to the list itself:\n\n.tabbar-wrapper ul {\n\nborder-top: solid\
    \ 1px rgba(255, 255, 255, 0.2);\n\nheight: 48px;\n\ndisplay: -webkit-box;\n\n\
    margin: 0;\n\npadding: 2px;\n\ntext-align: center;\n\ncolor: hsla(0,0%,100%, 0.65);\n\
    \nfont-weight: bold;\n\nfont-size: 9px;\n\nDownload from Wow! eBook <www.wowebook.com>\n\
    \nline-height: 1;\n\n-webkit-box-sizing: border-box;\n\n}\n\n.tabbar-wrapper li\
    \ {\n\nwidth: 100%;\n\nlist-style: none;\n\n-webkit-box-flex: 1;\n\npadding: 2px;\n\
    \nmargin-top: -1px;\n\n}\n\n.tabbar-wrapper li a {\n\ncolor: inherit;\n\ntext-decoration:\
    \ none;\n\ndisplay: block;\n\n}\n\nCHAPTER 9: Handling Transformations, Animations,\
    \ and Special Effects with CSS\n\nSo as not to worry about the size of our tabs,\
    \ we use the box display mode for our container (<ul>). From there, in order to\
    \ make the tabs take up all the available width, whatever the number of tabs and\
    \ their individual width, we set their box-flex property to 1\\. Thus, even when\
    \ the user changes the orientation of the device, our tab bar will consistently\
    \ span across the screen.\n\nA Placeholder for Icons\n\nBefore adding icons to\
    \ our tabs, let’s handle the tab selection, as announced, using the\n\n:target\
    \ pseudo-class. This is done as follows:\n\n.tabbar-wrapper li:target {\n\ncolor:\
    \ white;\n\n-webkit-border-radius: 3px;\n\nbackground-color: hsla(0, 0%, 100%,\
    \ 0.2);\n\ntext-shadow: rgba(0, 0, 0, .5) 1px 1px 1px;\n\n}\n\nNow, we can add\
    \ the placeholder for our tab icons. Before applying a mask to draw the icons,\
    \ we define the containers that will hold the shadow and the blue icon.\n\n.tabbar-wrapper\
    \ li b {\n\ndisplay: block;\n\nwidth: 36px;\n\nheight: 36px;\n\nmargin: -3px auto\
    \ -1px;\n\npadding: 2px;\n\n-webkit-box-sizing: border-box;\n\n}\n\n.tabbar-wrapper\
    \ li i {\n\ndisplay:block;\n\nwidth:32px;\n\nheight:32px;\n\nbackground-image:\
    \ -webkit-gradient(\n\nlinear, left top, left bottom, from(#bbb), to(#666)\n\n\
    );\n\n}\n\n.tabbar-wrapper li:target i {\n\nbackground-image:\n\n-webkit-gradient(radial,\
    \ 72 170, 160, 72 170, 184,\n\nfrom(rgba(255,255,255,0)),\n\ncolor-stop(0, rgba(255,\
    \ 255, 255, 0.3)),\n\ncolor-stop(0, rgba(255, 255, 255, 0.35)),\n\nto(white)\n\
    \n),\n\n-webkit-gradient(linear, left top, left bottom, from(#0062db), to(#44d5fe));\n\
    \n-webkit-background-size: 48px 32px;\n\nbackground-position: right top;\n\n}\n\
    \nThe backgrounds define the gray and blue gradients (Figure 9–14) for the unfocused\
    \ and focused states of our tabs. They will show through the mask once it is defined.\
    \ You can\n\n![](index-314_1.jpg)\n\nCHAPTER 9: Handling Transformations, Animations,\
    \ and Special Effects with CSS\n\nalready check the behavior of the :target pseudo-class\
    \ by loading the page in your browser.\n\nFigure 9–14\\. The gray and blue gradients,\
    \ before the application of masks\n\nIcons Management\n\nTo create our icons,\
    \ we are going to use the “sprite” technique, commonly used to limit HTTP requests\
    \ for background images; it can be used for masks also. As with\n\nbackgrounds,\
    \ you will simply have to move the image within the container to show\n\ndifferent\
    \ areas of the mask.\n\nWe have defined two containers—one that’s 36x36 pixels\
    \ represented by a <b> tag, which will contain the shadow, and the other that’s\
    \ 32x32 pixels represented by an <i> tag, which will hold the icon mask. The shadow\
    \ placeholder is slightly larger than the actual icon placeholder, because in\
    \ order to be visible, the shadow must span beyond the limits of the icon (in\
    \ this case, to the bottom right).\n\nFor our icons, we need an image whose alpha\
    \ channel represents the shapes of the\n\npictographs we want to use; we will\
    \ use canvases to build a template that will represent the successive display\
    \ stages. Figure 9–15 represents the template we are going to use.\n\nFor each\
    \ shape, we are going to align three areas from this template vertically. The\
    \ first element represents the icon. The image holding the mask needs to be drawn\
    \ black on a transparent background, up to 30 pixels wide and high, and offset\
    \ by 1 pixel from the top and left. For a better result, the icon should be centered\
    \ in the 30x30 pixels area.\n\nAlso note that within the black zone, you may draw\
    \ some transparent pixels. The two additional pixels of the <i> container will\
    \ let us correctly position the icon in the tab bar.\n\nThe second element will\
    \ be used for the shadow on unfocused tabs, which will emboss the icon materialized\
    \ by a gray gradient, as explained earlier. This area will be drawn directly from\
    \ the canvas by copying the first area without the 1-pixel vertical offset and\
    \ setting a lower opacity value. This is why the icon has to be drawn black.\n\
    \n![](index-315_1.png)\n\n![](index-315_2.png)\n\nCHAPTER 9: Handling Transformations,\
    \ Animations, and Special Effects with CSS\n\nFigure 9–15\\. The template used\
    \ to build an icon\n\nTo draw the last element, the drop shadow, we can copy the\
    \ first one again and change the opacity value three times (Figure 9–16). Proceeding\
    \ this way, we needn’t worry about the actual shape of the icon we draw to render\
    \ the shadow.\n\nFigure 9–16\\. A basic icon as three elements: the icon, the\
    \ emboss shadow, and the regular shadow We can now create our icons and use them\
    \ in our tabs using masks.\n\nCHAPTER 9: Handling Transformations, Animations,\
    \ and Special Effects with CSS\n\nCreating Icons\n\nThe canvas definition that\
    \ holds the different images should be declared within the client code rather\
    \ than from the main style sheet, because you are likely to need several tab bars\
    \ in the same web application at some stage. We are going to use the -webkit-canvas()\
    \ function, as shown in the following code:\n\n<style>\n\n.tabbar-wrapper li i\
    \ {\n\n-webkit-mask-image: -webkit-canvas(tabbar-icons);\n\n}\n\n.tabbar-wrapper\
    \ li b {\n\nbackground-image: -webkit-canvas(tabbar-icons);\n\n}\n\n</style>\n\
    \nAs explained earlier, the <i> tag holds the icon, and we will use the previously\
    \ defined gradients. A mask will let us “cut out” the icon shape from the gradients.\
    \ The <b> tag will hold a background that will simulate a shadow; we won’t need\
    \ a mask for this, because the shadow will already be defined from the canvas.\n\
    \nHere is how the icons are finally defined:\n\n<script>\n\nconst AREA_SIZE =\
    \ 36;\n\n/* Prepare the 3 states of 3 icons */\n\ninitTabBarIcons(\"tabbar-icons\"\
    , 3, createIcons);\n\nfunction initTabBarIcons(id, count, src) {\n\nvar ctx =\
    \ document.getCSSCanvasContext(\"2d\", id, AREA_SIZE * count, AREA_SIZE * 3);\
    \ if (typeof src == 'function') {\n\nsrc(ctx);\n\ncreateShadows(ctx);\n\n} else\
    \ {\n\nvar i = new Image();\n\ni.onload = function() {\n\nctx.drawImage(this,\
    \ 0, 0);\n\ncreateShadows(ctx);\n\n}\n\ni.src = src;\n\n}\n\n}\n\n</script>\n\n\
    The initTabBarIcons() function takes three parameters. The two first parameters\
    \ are rather straightforward—first, the ID of the canvas to hold the icon states,\
    \ and second, the number of icons in order to correctly fit the canvas width.\
    \ The last parameter can be either CHAPTER 9: Handling Transformations, Animations,\
    \ and Special Effects with CSS\n\na function or the URL of an image. In the first\
    \ case, the functions will be called to draw icons to the relevant context (passed\
    \ as first parameter) using the Canvas API. In the second case, the image will\
    \ be loaded and then drawn to the canvas using the\n\ndrawImage() method. The\
    \ image has to be built according to the scheme explained earlier.\n\nFor now,\
    \ let’s draw our icons using the first configuration, with the createIcons() function.\
    \ We will go through the more common case later.\n\nfunction createIcons(ctx)\
    \ {\n\nctx.save();\n\n/* Offset of 1x1 pixel */\n\nctx.translate(1, 1);\n\nctx.fillStyle\
    \ = \"black\";\n\n/* A circle icon */\n\nctx.beginPath();\n\nctx.arc(15, 15, 15,\
    \ 0, Math.PI * 2, false);\n\nctx.fill();\n\n/* A square icon */\n\nctx.translate(AREA_SIZE,\
    \ 0);\n\nctx.fillRect(0, 0, 30, 30);\n\n/* A triangle icon */\n\nctx.translate(AREA_SIZE,\
    \ 0);\n\nctx.moveTo(15, 0);\n\nctx.lineTo(30, 30);\n\nctx.lineTo(0, 30);\n\nctx.fill();\n\
    \nctx.restore();\n\n}\n\nNow, our canvas has three basic icons, for which the\
    \ function createShadows() is going to build shadows, as evoked earlier, by copying\
    \ the icon and altering its opacity and position. Figure 9–17 shows the final\
    \ result.\n\nfunction createShadows(ctx) {\n\nvar c = ctx.canvas;\n\nvar w = c.width;\n\
    \nvar h = c.height / 3;\n\nctx.save();\n\n/* Draw the emboss shadow */\n\nctx.globalAlpha\
    \ = 0.25;\n\nctx.drawImage(c, 0,0,w,h, 0,h*1-1,w,h);\n\n/* Draw the drop shadow\
    \ */\n\nctx.globalAlpha = 0.1;\n\nctx.drawImage(c, 0,0,w,h, 1,h*2+0,w,h);\n\n\
    ctx.drawImage(c, 0,0,w,h, 2,h*2+1,w,h);\n\nctx.drawImage(c, 0,0,w,h, 3,h*2+2,w,h);\n\
    \nctx.restore();\n\n}\n\n![](index-318_1.png)\n\nCHAPTER 9: Handling Transformations,\
    \ Animations, and Special Effects with CSS\n\nFigure 9–17\\. The final result\
    \ showing icons and their shadows\n\nThe canvas is now ready, so we need only\
    \ add styles to position the shadows within their areas. Here is the code to be\
    \ added to the main style sheet:\n\n.tabbar-wrapper li b {\n\n...\n\nbackground-position:\
    \ 2px -34px;\n\n}\n\n.tabbar-wrapper li:target b {\n\nbackground-position: 2px\
    \ -70px;\n\n}\n\nBecause we have a 2-pixel padding, we adjust the position of\
    \ the background shadow (<b>) so that it is aligned with the icon (<i>). Then,\
    \ we select the relevant shadow by moving the canvas upward, depending on the\
    \ state of the icon.\n\nIf you test your page now, you will see that all tabs\
    \ have the same round icon. To use a different icon for each tab, still using\
    \ the “sprite” technique, you simply need to move the background by a specific\
    \ amount of pixels. Because our blocs are 36 pixels wide and the shadow requires\
    \ a 2-pixel offset, the following code added to our CSS file will take care of\
    \ that:\n\n<style>\n\n...\n\n.tabbar-wrapper li:nth-child(2) i { -webkit-mask-position-x:\
    \ -36px; }\n\n.tabbar-wrapper li:nth-child(3) i { -webkit-mask-position-x: -72px;\
    \ }\n\n.tabbar-wrapper li:nth-child(4) i { -webkit-mask-position-x: -36px; }\n\
    \n.tabbar-wrapper li:nth-child(2) b { background-position-x: -34px; }\n\n.tabbar-wrapper\
    \ li:nth-child(3) b { background-position-x: -70px; }\n\n.tabbar-wrapper li:nth-child(4)\
    \ b { background-position-x: -34px; }\n\n</style>\n\nBecause we have only three\
    \ icons for five tabs, we use two icons twice, as shown in Figure 9–18\\. Sprites\
    \ are a very convenient and flexible way to define background\n\nimages, and as\
    \ stated earlier, they will generally help making your applications faster to\
    \ load, because they limit the number of HTTP requests, which is especially appreciable\
    \ on mobile devices.\n\n![](index-319_1.jpg)\n\n![](index-319_2.png)\n\n![](index-319_3.jpg)\n\
    \nCHAPTER 9: Handling Transformations, Animations, and Special Effects with CSS\n\
    \nFigure 9–18\\. Our tabs with icons appropriately positioned\n\nCustom Icons\
    \ Using an Image\n\nOur initTabBarIcons() function can take an image URL as its\
    \ third parameter. Of\n\ncourse, this will often be more flexible and familiar\
    \ to developers than using the Canvas API to draw icons. The image should contain\
    \ as many black icons as needed, on a\n\ntransparent background, using the template\
    \ shown earlier. The following call to the function uses the image presented on\
    \ Figure 9–19 to create the tab bar shown in Figure 9–20:\n\n<script>\n\ninitTabBarIcons(\"\
    tabbar-icons\", 5, \"icons.png\");\n\n</script>\n\n<style>\n\n...\n\n**.tabbar-wrapper\
    \ li:nth-child(4) i { -webkit-mask-position-x: -108px; }**\n\n**.tabbar-wrapper\
    \ li:nth-child(5) i { -webkit-mask-position-x: -144px; }**\n\n...\n\n**.tabbar-wrapper\
    \ li:nth-child(4) b { background-position-x: -106px; }**\n\n**.tabbar-wrapper\
    \ li:nth-child(5) b { background-position-x: -142px; }**\n\n</style>\n\nFigure\
    \ 9–19\\. *icons.png* is used for the tab bar icons\n\nFigure 9–20\\. A tab bar\
    \ using an external image\n\nFirst, the image is copied to the canvas and the\
    \ building process is launched. Then everything happens exactly like when using\
    \ a canvas definition, and the icons are positioned. The process is very simple\
    \ to set up and makes code maintenance easy, because only one image is required\
    \ to handle both the icons and their shadows.\n\nCHAPTER 9: Handling Transformations,\
    \ Animations, and Special Effects with CSS\n\nSummary\n\nAlthough the new CSS\
    \ properties introduced in this chapter may seem unfamiliar and somewhat disturbing,\
    \ you will soon find that they can greatly enhance the user\n\nexperience for\
    \ your web applications, both by making them more appealing visually via animations\
    \ and masks and by allowing better performances relying on hardware\n\noptimized\
    \ transformations.\n\nBy limiting the number of images and scripts required to\
    \ achieve attractive effects, not only should you be able to limit the number\
    \ of HTTP requests, reduce the overall file size to be loaded for your pages,\
    \ and make your pages easier to process for the rendering engine, you should end\
    \ up with code that is easier to maintain, more flexible, and, with some practice,\
    \ faster to build.\n\n**III**\n\n ******Part**\n\nGoing Futher with\n\nJavaScript\
    \ and\n\nWeb Standards\n\nDownload from Wow! eBook <www.wowebook.com>\n\n**10**\n\
    \n ****Chapter**\n\nAn Object-Oriented\n\nJavaScript Programming\n\nPrimer\n\n\
    It is more than likely that, as shown in the previous chapters, you will heavily\
    \ rely on JavaScript to build your web applications. Over time, client-side scripting\
    \ has become an ever more crucial tool for developers, with the progress of hardware,\
    \ the evolution of expectations, and, recently, new APIs that bring the most desirable\
    \ functionality to web content.\n\nHowever, this language, to be efficiently used,\
    \ requires that the developer understands some of its specificities, such as weak\
    \ typing and its object model. We will explain the object-oriented programming\
    \ part, which should help you bring more modularity to your programs, encapsulate\
    \ some APIs to make their use more flexible and generic, and\n\nmake them easier\
    \ to maintain. This chapter will also help you better understand\n\nexecution\
    \ context issues that you are likely to run into when using event handlers or\
    \ callback functions, as used extensively in the upcoming chapters. You will also\
    \ find out how to effectively solve the problems of code execution isolation when\
    \ you need to work with third-party scripts to enhance your web applications or\
    \ when you provide scripts to other sites yourself.\n\nFrom the Procedural Model...\n\
    \nThe procedural programming model is still widespread nowadays. As in BASIC,\
    \ this\n\nmeans you use a series of functions to control the state of your program\
    \ by modifying variables and changing their values. The most common way to do\
    \ this is as follows: var state = add(5, 6, 7);\n\nfunction add(a, b, c) {\n\n\
    return a + b + c;\n\n}\n\nCHAPTER 10: An Object-Oriented JavaScript Programming\
    \ Primer\n\nProceeding this way, you multiply the number of independent and possibly\
    \ redundant functions and variables. Yet, in JavaScript, this is actually already\
    \ OOP. As soon as you define a function, the scripting engine creates an instance\
    \ of the Function object.\n\nTherefore, the previous code is the same as what\
    \ follows:\n\nvar add = new Function(\"a\", \"b\", \"c\", \"return a + b + c\"\
    ); The Function object takes a series of strings as parameters, the last always\
    \ being the code to be executed and the others being arguments for use by the\
    \ defined function.\n\nThere are several ways to declare these parameters. You\
    \ can declare them as we did previously, or you can group comma-separated arguments\
    \ within the same string to\n\nform the list of parameters for the function. Hence,\
    \ the previous example could have been written like this:\n\nvar add = new Function(**\"\
    a, b\", \"c\"** , \"return a + b + c\"); var add = new Function(**\"a, b, c\"\
    ** , \"return a + b + c\"); Of course, the function keyword is a very useful shortcut,\
    \ because declaring a function within a string the way it is done using the Function\
    \ object would quickly prove difficult to handle.\n\nUsing instantiation for our\
    \ previous example will quite evidently result in code similar to the following\
    \ example:\n\nvar add = function(a, b, c) {\n\nreturn a + b + c;\n\n}\n\nNote\
    \ that you can also add a name to your function so that it can refer to itself\
    \ within the function. Specifically, this declaration type is the basis of creating\
    \ objects.\n\n...to Object-Oriented Programming\n\nWhen a function is declared,\
    \ an object is created internally that is attached to the global object of the\
    \ hosting environment. With JavaScript, in the browser context, this is the DOMWindow\
    \ object of the browser, accessible using the window property. This means when\
    \ you declare a function, you extend the window object, and the function will\
    \ be accessible through this property, as any variable would be.\n\nvar state\
    \ = window.add(5, 6, 7);\n\nvar result = window.state;\n\nUsing the faculty of\
    \ objects to be extended with properties and methods, we are going to create a\
    \ simple program to illustrate the assets of OOP.\n\nA First Custom Object\n\n\
    Using object-oriented programming, any object inherits from the base object Object,\
    \ as seen in languages like .NET or Java. This means all properties and methods\
    \ available to the Object object will be available to the inheriting object. The\
    \ most common example is 303\n\nCHAPTER 10: An Object-Oriented JavaScript Programming\
    \ Primer\n\nthe toString() method. So, beginning to create our object, we create\
    \ an instance of Object with the new keyword. From there we can extend it with\
    \ the following code: var animal = new Object();\n\n/* Additional properties */\n\
    \nanimal.family = \"Unnamed\";\n\nanimal.noise = \"Silent\";\n\nanimal.legs =\
    \ 4;\n\n/* New method */\n\nanimal.makeNoise = function() {\n\nconsole.log(\"\
    The noise of \" + this.family + \" is \" + this.noise + \".\");\n\n}\n\nCalling\
    \ the function and reading the properties of our object is easy:\n\nanimal.makeNoise();\n\
    \nconsole.log(animal.legs);\n\n**--- result ---**\n\n> The noise of Unnamed is\
    \ Silent.\n\n> 4\n\nIn our examples, we adopt the naming conventions of the language,\
    \ that is, *camel case*, with an uppercase first letter for object definitions\
    \ and a lowercase first letter for its properties.\n\nThe keyword this will let\
    \ you access the current execution context. In our example, this is the instance\
    \ of the object, which allows us to reach the properties previously defined and\
    \ use them to build a readable string. The execution context is an important notion\
    \ that we will explain in more detail shortly.\n\nThe effect achieved with the\
    \ previous code can also be reached using a slightly different syntax.\n\nvar\
    \ animal = {\n\nfamily: \"Unnamed\",\n\nnoise: \"Silent\",\n\nlegs: 4,\n\nmakeNoise:\
    \ function() {\n\nconsole.log(\"The noise of \" + this.family + \" is \" + this.noise);\n\
    \n}\n\n};\n\nThis method to create objects is called an *object initializer*.\
    \ It can be useful to dynamically create anonymous objects and, for instance,\
    \ return several values from a function; however, it doesn’t offer the flexibility\
    \ provided by other object-oriented languages, because the definition of the object\
    \ here isn’t easily reusable.\n\nUsing a Proper Constructor\n\nThe animal we have\
    \ created obviously isn’t very lively yet. Let’s remedy this. To make our object\
    \ structure reusable, we need to add a constructor using a Function object.\n\n\
    CHAPTER 10: An Object-Oriented JavaScript Programming Primer\n\nECMAScript doesn’t\
    \ have actual classes but uses constructors that let you allocate the object and\
    \ initialize its properties. The following code does just that:\n\n/* Constructor\
    \ */\n\nvar Animal = function() {\n\n/* Properties */\n\nthis.family = \"Unnamed\"\
    ;\n\nthis.noise = \"Silent\";\n\nthis.legs = 4;\n\n/* Method */\n\nthis.makeNoise\
    \ = function() {\n\nconsole.log(\"The noise of \" + this.family + \" is \" + this.noise\
    \ + \".\");\n\n}\n\n}\n\nThis allows you to get an instance of Animal, using the\
    \ new keyword again.\n\n/* Create a first instance of Animal */\n\nvar animal1\
    \ = new Animal();\n\nanimal1.family = \"Mussel\";\n\n/* Create a new instance\
    \ of Animal */\n\nvar animal2 = new Animal();\n\nanimal2.family = \"Plankton\"\
    ;\n\nanimal1.makeNoise();\n\nanimal2.makeNoise();\n\n**--- result ---**\n\n> The\
    \ noise of Mussel is Silent.\n\n> The noise of Plankton is Silent.\n\nThis means\
    \ we can use our object as many times as needed with totally independent instances,\
    \ each holding their own properties. Still, this is not optimal, because the syntax\
    \ used to declare each method forces the engine to instantiate a new Function\
    \ object for the makeNoise() method for every instance rather than using a reference\
    \ to the object. This means that more memory will be used, which could be a problem\
    \ if the object is used intensively.\n\nBetter Performance with Prototype\n\n\
    There is a property introduced by ECMAScript that solves this reinstantiation\
    \ issue, named prototype. Every constructor has this property available to implement\n\
    \ninheritance and shared properties. Hence, we can further better our object:\n\
    \n/* Constructor */\n\nvar Animal = function() {\n\nthis.family = \"Unnamed\"\
    ;\n\nthis.noise = \"Silent\";\n\nthis.legs = 4;\n\n}\n\n**/* A more efficient\
    \ way to define a method */**\n\nCHAPTER 10: An Object-Oriented JavaScript Programming\
    \ Primer\n\n**Animal.prototype.makeNoise = function() {**\n\n**console.log(\"\
    The noise of \" + this.family + \" is \" + this.noise + \".\");**\n\n**}**\n\n\
    The defined method will be shared by all instances of the Animal object and will\
    \ be instantiated only once. This is true for all properties defined this way.\n\
    \nWARNING: This is an important notion: all properties defined using prototype\
    \ will be shared by all instances of the object. Hence, modifying the value of\
    \ a property will impact all instances.\n\nOf course, this syntax uses more code;\
    \ therefore, you should always seek a good\n\nbalance between concise code and\
    \ memory usage. Still, referring to the Function object instead of instantiating\
    \ makes a great difference in performance, because allotting memory is a very\
    \ greedy operation. Safari’s Web Inspector should be of some help to evaluate\
    \ this, as shown in Chapter 3.\n\nImplementing Inheritance\n\nAlthough JavaScript\
    \ is an object-oriented language, it isn’t based on the class concept, like C++\
    \ or Java, for instance. Instead, it relies on constructors and prototypes, and\
    \ each constructor has a prototype property available to it. The engine implicitly\
    \ sets the value of this property to a reference that points to an instance of\
    \ Object, which implies that it inherits from Object. This instance will be shared\
    \ by all instances of your object, which is the reason why all methods defined\
    \ using prototype will also be shared,\n\nbecause they extend prototype.\n\nPrototype-Based\
    \ Inheritance\n\nTo implement prototype-based inheritance for your own objects,\
    \ you simply need to redefine prototype so that it inherits from your object instead\
    \ of Object. Thus, to further specify your animals, you could use the following\
    \ code:\n\n/* Constructor */\n\nvar Dog = function() {\n\nthis.family = \"Dog\"\
    ;\n\nthis.noise = \"Woof!\";\n\n};\n\n/* Dog will inherit from Animal */\n\nDog.prototype\
    \ = new Animal;\n\n/* Add a new method to Dog */\n\nDog.prototype.showLegs = function()\
    \ {\n\nconsole.log(\"The \" + this.family + \" has \" + this.legs + \" legs.\"\
    );\n\n}\n\nWe define a new object called Dog, whose default properties are changed\
    \ using the constructor to actually fit with a dog. Other properties are already\
    \ defined through the 306\n\nCHAPTER 10: An Object-Oriented JavaScript Programming\
    \ Primer\n\nAnimal constructor, as illustrated in our next block of code. The\
    \ previous script starts with a instantiation of Animal that is associated with\
    \ the prototype property of the Dog object when the code is evaluated. The call\
    \ to the constructor of Dog will occur only after this initialization, using the\
    \ new keyword.\n\nvar dog = new Dog();\n\ndog.makeNoise();\n\ndog.showLegs();\n\
    \n**--- result ---**\n\n> The noise of Dog is Woof!.\n\n> The Dog has 4 legs.\n\
    \nHere the legs property is present, although it hasn’t been defined in the constructor\
    \ of Dog, and the makeNoise() method returns a string with the appropriate values\
    \ for family and noise. Proof is made that Dog inherits from Animal.\n\nShared\
    \ Properties\n\nHowever desirable limiting memory usage and function instance\
    \ multiplication may be, you could learn the hard way that, using inheritance,\
    \ all properties from the inherited object (arrays, anonymous objects, and so\
    \ on) are also defined using this principle and thus are shared by all instances\
    \ of your object. You could, for instance, add an array to your initial object\
    \ to hold all of the eye color values for your animals.\n\nvar Animal = function()\
    \ {\n\n...\n\n**this.eyeColor = [];**\n\n}\n\nYou would then create two dogs with\
    \ their own eye color:\n\nvar dog1 = new Dog();\n\ndog1.eyeColor.push(\"brown\"\
    , \"brown\");\n\nvar dog2 = new Dog();\n\ndog2.eyeColor.push(\"blue\", \"brown\"\
    );\n\nconsole.log(dog1.eyeColor);\n\nconsole.log(dog2.eyeColor);\n\n**--- result\
    \ ---**\n\n> [\"brown\", \"brown\", \"blue\", \"brown\"]\n\n> [\"brown\", \"brown\"\
    , \"blue\", \"brown\"]\n\nAnd, as you can see, you would have two dogs, each with\
    \ no less than four eyes. This can be remedied by defining an initialize() method,\
    \ which should be used to initialize sensitive properties. Doing just this will\
    \ return more appropriate information.\n\nvar Animal = function() {\n\n...\n\n\
    **this.initialize();**\n\n}\n\nAnimal.prototype.initialize = function() {\n\n\
    this.eyeColor = [];\n\nCHAPTER 10: An Object-Oriented JavaScript Programming Primer\n\
    \n}\n\nvar Dog = function() {\n\n...\n\n**this.initialize();**\n\n}\n\n**--- result\
    \ ---**\n\n> [\"brown\", \"brown\"]\n\n> [\"blue\", \"brown\"]\n\nThis convenient\
    \ method prevents the inheriting object from gathering what its parent contains\
    \ and initializes. Reinitializing properties directly from the constructor of\
    \ Dog is possible but would harm the maintainability of your code, because you\
    \ would have to change Dog every time you altered the definition of Animal. However,\
    \ redefining a property in an inheriting object doesn’t mean that its initial\
    \ value is lost, as shown with the following example:\n\nAnimal.prototype.initialize\
    \ = function() {\n\nthis.eyeColor = [**\"initial value\"** ];\n\n}\n\n...\n\n\
    console.log(dog1.eyesColor);\n\n**delete dog1.eyesColor;** // Delete the property\
    \ created with initialize() console.log(dog1.eyesColor); // Return the property\
    \ from Animal\n\nconsole.log(dog2.eyesColor); // Other instances are not affected\n\
    \n**--- result ---**\n\n> [\"brown\", \"brown\"]\n\n> [\"initial value\"]\n\n\
    > [\"blue\", \"brown\"]\n\nThe object dog1 is instantiated, which creates a new\
    \ eyeColor property on the prototype.\n\nThis way, the previous code will return\
    \ the correct value for the eye color of our first dog.\n\nThen, we empty this\
    \ property using the delete operator. With the next access to the property, the\
    \ scripting engine will move up the prototype hierarchy until it finds a property\
    \ with the same name and returns the value of this property, if any. This is why\
    \ we get the content of the array as defined for the Animal object.\n\nGenerally,\
    \ this initialization issue isn’t encountered with properties with a more primitive\
    \ type such as Boolean or Number, because the most common technique is to redefine\n\
    \nvalues directly on the property. On the contrary, it is common to use methods\
    \ to\n\npopulate an array (such as push() or unshift()) or to scan it (such as\
    \ pop() or shift()); hence, you would be working directly on the shared instance\
    \ of the Array object, instead of working on the property.\n\nThe Prototype Chain\n\
    \nECMAScript introduces the *prototype chain* concept. The prototype property\
    \ allows you, as indicated earlier, to move up the chain of the original properties\
    \ of inherited objects. This is what the engine does when it calls a method. Thus,\
    \ calling\n\ndog.makeNoise(), the engine checks whether Dog has this method; if\
    \ this is not the case, 308\n\nCHAPTER 10: An Object-Oriented JavaScript Programming\
    \ Primer\n\nit will move up the chain until it finds the called method—or not.\
    \ This specificity can be used to call methods of the base object. For this, you\
    \ simply have to get the base prototype and call the method with the correct execution\
    \ context.\n\nvar Dog = function() {\n\n**this._base = this.constructor.prototype;**\n\
    \n...\n\n}\n\nDog.prototype.makeNoise = function() {\n\nconsole.log(\"Modified\
    \ Version...\");\n\nthis._base.makeNoise.call(this);\n\n}\n\nvar dog = new Dog();\n\
    \ndog.makeNoise();\n\n**--- result ---**\n\n> Modified Version...\n\n> The noise\
    \ of Dog is Woof!.\n\nWe use the internal constructor property to access the prototype\
    \ in order not to depend on the initial object. We could have used, for the value\
    \ of _base, Animal.prototype. The _base property is used to call makeNoise() through\
    \ the call() method of the object Function. This method will let you specify the\
    \ execution context and thus use the values from the current object properties,\
    \ not those of the base object.\n\nThe Execution Context\n\nProgramming with JavaScript,\
    \ the execution context is a crucial notion. It is what determines what is accessible\
    \ and what isn’t at the moment some code is executed and functions are accessed.\
    \ The call() method of the Function object takes at least an execution context\
    \ as a first parameter; you can then add a comma-separated list of other parameters\
    \ that will be passed to the called function.\n\nUsing the call() and apply()\
    \ Methods\n\nOne problem is that you may not always know exactly how many parameters\
    \ you might need to pass to your function when you call it. Moreover, fixing parameters\
    \ explicitly for the call() method doesn’t favor maintainability and code reusability.\
    \ Here’s an\n\nexample:\n\nAnimal.prototype.initialize = function() {\n\n...\n\
    \n**this.colors = [];**\n\n}\n\nAnimal.prototype.setColors = function(color1,\
    \ color2) {\n\nthis.colors.splice(0, this.eyesColor.length);\n\nthis.colors.push(color1);\n\
    \nthis.colors.push(color2);\n\nCHAPTER 10: An Object-Oriented JavaScript Programming\
    \ Primer\n\n}\n\nDog.prototype.setColors = function(color1, color2) {\n\nconsole.log(\"\
    Adding colors: \" + color1 + \", \" + color2);\n\nthis._base.setColors.call(this,\
    \ color1, color2);\n\n}\n\ndog.setColors(\"white\", \"maroon\");\n\nHere, it is\
    \ clear that this process isn’t very flexible, because only two colors can be\
    \ attributed to an animal. This could be addressed simply by using a variable\
    \ number of parameters that would be processed in a loop using the arguments property,\
    \ as\n\nillustrated here:\n\nAnimal.prototype.setColors = function() {\n\nthis.colors.splice(0,\
    \ this.eyesColor.length);\n\nfor (var i = 0; i < arguments.length; i++) {\n\n\
    this.colors.push(arguments[i]);\n\n}\n\n}\n\nTo solve the problem met with the\
    \ setColors() function of the object inheriting from Animal, you can use the apply()\
    \ method of the Function object. This method takes the execution context as a\
    \ parameter, like when using call(), and takes arguments, unlike call(), as an\
    \ array, instead of a list. Hence, our code can be optimized.\n\nAnimal.prototype.setColors\
    \ = function() {\n\nthis.colors.splice(0, this.eyeColor.length);\n\n**this.colors.push.apply(this.colors,\
    \ arguments);**\n\n}\n\nDog.prototype.setColors = function() {\n\nconsole.log(\"\
    Adding colors: \" + **arguments.join(\", \")**); this._base.setColors. **apply**(this,\
    \ **arguments**);\n\n}\n\nBecause we know which type of argument the function\
    \ expects, we needn’t list these in the function declaration; the only unknown\
    \ element is the number of arguments. With the setColor() method of the Animal\
    \ object, we use apply() on the push() method,\n\nwhich initially takes a list\
    \ of elements to add to an array. In this case, the context needn’t be modified\
    \ but has to be specified, so we use this.colors to keep the correct context.\n\
    \nThen, to simplify the call of the base method from within Dog, we replace call()\
    \ with apply(), to make the number of arguments totally unimportant. You will\
    \ therefore be able to call any method from the base object whatever the signature\
    \ of the function.\n\nThe apply() method should come to great use developing web\
    \ applications as soon as the application relies on lists whose lengths vary dynamically.\
    \ For instance, this method can be used to handle an array of objects holding\
    \ data in order to display a list of emails and to let the user show more messages\
    \ using a More button, like in the iPhone Mail application. In this case, apply()\
    \ would let you save a loop by simply adding the objects to the list with the\
    \ push() method of the Array object.\n\nCHAPTER 10: An Object-Oriented JavaScript\
    \ Programming Primer\n\nThis is more efficient, because the process is handled\
    \ natively by the scripting engine and doesn’t have to be interpreted in a loop.\n\
    \nTaking Care of the Execution Context\n\nThis is al rather simple, but it may\
    \ sometimes be difficult to identify where a piece of code is going wrong, especial\
    \ y when using a reference to a method. For instance, using the first definition\
    \ of Dog, you could expect that funcRef() would return the same string as seen\
    \ previously.\n\nvar funcRef = dog.makeNoise;\n\nfuncRef();\n\n**--- result ---**\n\
    \n> The noise of undefined is undefined\n\nOn the contrary, here, the properties\
    \ are not available, so their return value is undefined.\n\nThis is because the\
    \ reference was taken on the function makeNoise(). Although\n\nmakeNoise() is\
    \ referred to through an instance of Dog, it has no relation with any context.\n\
    \nIn this case, dog.makeNoise is a reference to an instance of the function.\n\
    \nCal ing dog.makeNoise(), the context is fixed by the dog object. Because the\
    \ method is cal ed with dog and the context is the cal er of the function, this\
    \ refers to the instance of Dog, and the result is as expected.\n\nOn the other\
    \ side, when defining funcRef, dog was used only to access the reference to the\
    \ instance of the function. After that, the engine moves out of the context (dog)\
    \ to execute the next instruction. Thus, when we actual y cal funcRef(), the *cal\
    \ ing* *context* is set to the default context, the global window object. This\
    \ is easily verified, as shown here:\n\n...\n\nvar family = \"Bird\";\n\nDownload\
    \ from Wow! eBook <www.wowebook.com>\n\nfuncRef();\n\n**--- result ---**\n\n>\
    \ The noise of **Bird** is undefined\n\nThis kind of issue comes up often when\
    \ you’re building web applications, because you wil often rely on a reference\
    \ to define event handlers and timers. Using\n\naddEventListener(), the context\
    \ is always that of the object to which the listener is attached to; managing\
    \ setTimeout() and setInterval(), which are methods of the\n\nwindow object, the\
    \ context wil be window itself.\n\nSetting the Proper Context with Handlers and\
    \ Callbacks\n\nIn Chapter 7, we have created a spinner with the canvas and JavaScript.\
    \ In the functions we used, you may have noted that we put the value of this into\
    \ the variable that and then encapsulated the cal in an anonymous function. This\
    \ technique lets you use the 311\n\nCHAPTER 10: An Object-Oriented JavaScript\
    \ Programming Primer\n\nright context and thus allows you to correctly execute\
    \ methods with the right instance.\n\nHere is the relevant part of the code, the\
    \ animate() method of the BigSpinner object: BigSpinner.prototype.animate = function()\
    \ {\n\n/* Already running? exit... */\n\nif (this.timer) {\n\nreturn;\n\n}\n\n\
    /* The execution context (this) will be the window object with setInterval()\n\
    \nSave the correct context in \"that\" variable and run the timer */\n\n**var\
    \ that = this;**\n\n**this.timer = window.setInterval(function() {**\n\n**that.draw();**\n\
    \n**}, 100);**\n\n}\n\nThe variable that is local. Still, because it is referenced\
    \ within the timer, it will be kept in memory, and its range will be valid until\
    \ the timer is canceled with the clearInterval() method. This is the most common\
    \ way to call a method by reference. To make the\n\nsyntax of such a technique\
    \ easier in your code, you can extend the native Function object with a new method\
    \ that will bind an execution to a specific context. Note that all native objects\
    \ can be extended. You should also notice that we test for the existence of such\
    \ a method; this is because it is planned for with the fifth version of the ECMAScript\
    \ specification. Our version is simplified.\n\nif (!Function.prototype.bind) {\n\
    \nFunction.prototype.bind = function(ctx) {\n\nvar that = this;\n\nreturn function()\
    \ {\n\nthat.apply(ctx, arguments);\n\n}\n\n}\n\n}\n\nHowever convenient this may\
    \ be, be aware that every time you call this function, the Function object will\
    \ be instantiated anew. Therefore, if you need to use this reference several times,\
    \ consider associating it to a variable or a property in order not to take up\
    \ too much memory. Also take into account that saving the reference is necessary\
    \ to remove an event listener. In the following code, you wouldn’t obtain the\
    \ expected result, because two different instances are passed to the addEventListener()\
    \ and\n\nremoveEventListener() methods.\n\n/* Listen to \"load\" event */\n\n\
    document.body.addEventListener(\"click\", some.method.bind(someParameter), false);\n\
    \n/* Try to remove listener, but nothing happens */\n\ndocument.body.removeEventListener(\"\
    click\", some.method.bind(someParameter), false); Instead, you should do as follows,\
    \ which will work:\n\n/* Get a reference */\n\nvar ref = some.method.bind(some);\n\
    \nCHAPTER 10: An Object-Oriented JavaScript Programming Primer\n\n/* Listen to\
    \ \"load\" event */\n\ndocument.body.addEventListener(\"click\", **ref**, false);\n\
    \n/* The listener can be found and removed */\n\ndocument.body.removeEventListener(\"\
    click\", **ref**, false);\n\nHere, the references in the listener methods are\
    \ to the same instance, and the second method will find the method used in the\
    \ first. This of course is important, especially when repeatedly adding and removing\
    \ listeners for animations, as we saw in our\n\nprevious chapter about CSS transitions.\
    \ Indeed, as long as a listener hasn’t been removed, the instance of the object\
    \ is still being referenced, the listener is still working, and the memory load\
    \ and CPU load will continuously grow, as more and more code is executed for a\
    \ same event.\n\nAccessing Properties and Methods\n\nAs illustrated in this chapter,\
    \ it is easy to access a property with commands with the form object.property.\
    \ The same is true for methods, because these are properties that reference an\
    \ instance of the Function object. All these properties are actually stored as\
    \ key/value pairs in a hash table. Hence, they are accessible using the\n\nobject[\"\
    property\"] syntax, which is especially useful, for instance, when setting properties\
    \ for a character in a role-playing game. This is similar to the DOM\n\nsetAttribute()\
    \ method.\n\nvar Character = function(name) {\n\nthis.patronym = name || \"The\
    \ Unknown\";\n\nthis.characteristics = {\n\nstamina: 10,\n\nmana: 10,\n\nskill:\
    \ 10,\n\nhealth: 100\n\n};\n\n}\n\nCharacter.prototype.setCharacteristic = function(prop,\
    \ value) {\n\nif (this.characteristics.hasOwnProperty(prop)) {\n\nif (value >=\
    \ 0 && value <= 250) {\n\nthis.characteristics[prop] = value;\n\n}\n\n}\n\n}\n\
    \nCharacter.prototype.showCharacteristics = function() {\n\nconsole.log(\"Characteristics\
    \ of \" + this.patronym + \":\");\n\nfor (var prop in this.characteristics) {\n\
    \nconsole.log(\"=>\" + prop + \": \" + this.characteristics[prop]);\n\n}\n\n}\n\
    \nvar paladin = new Character(\"Danis\");\n\npaladin.setCharacteristic(\"health\"\
    , 200);\n\npaladin.setCharacteristic(\"mana\", 0);\n\nCHAPTER 10: An Object-Oriented\
    \ JavaScript Programming Primer\n\npaladin.showCharacteristics();\n\n**--- result\
    \ ---**\n\n> Characteristics of Danis:\n\n> => stamina: 10\n\n> => mana: 0\n\n\
    > => skill: 10\n\n> => health: 200\n\nTo prevent our characteristics object from\
    \ artificially growing, we check that the requested property exists when setCharacteristic()\
    \ is called. Besides, we check that the value is within a reasonable interval.\
    \ Checking that properties exist also prevents errors due to letter case, because\
    \ properties are always case sensitive.\n\nIn our example, we have used the hash\
    \ table syntax to iterate through our properties using the for...in statement\
    \ and to display their values. Be careful, however; because our example properties\
    \ are displayed in the same order as they were declared in, this won’t necessarily\
    \ happen. Never expect a specific order when scanning the properties of an object.\n\
    \nDefining Getters and Setters\n\nIn our previous example, we have used a method\
    \ to set the values for several properties, which is quite similar to using a\
    \ setter in other object-oriented programming languages.\n\nJavaScript will also\
    \ let you define getters and setters, also called *accessors*, though this is\
    \ of limited use, because unlike some more complex languages, you won’t be able\
    \ to define object properties other than *public* ones. There is no native way\
    \ to define private properties meant only for use within one specific object.\
    \ Therefore, whereas\n\nprogramming with other languages you would try to protect\
    \ access to some variables to make your code easier to maintain, it is common\
    \ with JavaScript to leave variables of an object instance available to the client\
    \ code.\n\nProgramming in JavaScript, you should dissociate elements from an existing\
    \ object to use them as properties rather than use a method. Accessors will also\
    \ allow for control over the access and over the associable values by a property.\
    \ For instance, if you wanted to create an object that would count the time elapsed\
    \ during the execution of a function to compare one technique to another, you\
    \ could expose the conversion from milliseconds to seconds using a property created\
    \ with a getter.\n\n/* Object definition */\n\nvar Timing = function() {\n\nthis.elapsed\
    \ = 0;\n\n}\n\nTiming.prototype.test = function(iter, func) {\n\nvar time = new\
    \ Date();\n\nfor (var i = 0; i < iter; i++) {\n\nfunc();\n\n}\n\nthis.elapsed\
    \ = new Date() - time;\n\n}\n\nCHAPTER 10: An Object-Oriented JavaScript Programming\
    \ Primer\n\nTiming.prototype.__defineGetter__(\"seconds\",\n\nfunction() { return\
    \ this.elapsed / 1000; });\n\n/* Using the object... */\n\nvar timer = new Timing();\n\
    \n/* Test Math.floor() speed */\n\ntimer.test(1000000, function() { var a = Math.floor(10.6)\
    \ });\n\nconsole.log(timer.seconds);\n\n/* Test shorter/faster way */\n\ntimer.test(1000000,\
    \ function() { var a = (10.6 << 0) });\n\nconsole.log(timer.seconds);\n\n**---\
    \ result ---**\n\n> 0.035\n\n> 0.011\n\nWe have a read-only property that lets\
    \ us get the elapsed time in seconds using the __defineGetter__ method. This method\
    \ takes the name of the property to create as a first parameter and a function\
    \ to call as a second parameter. This, however, only allows you to read the value.\
    \ To be able to write to the property, you also need to define a setter. You should\
    \ define such a function like a getter, only passing a value to the associated\
    \ function.\n\nTiming.prototype.__defineSetter__(\"reset\",\n\nfunction(value)\
    \ {\n\nif (value === true) {\n\nthis.elapsed = 0\n\n}\n\n});\n\nAccessors can\
    \ be added either to an object, as shown here, or dynamically to an\n\ninstance.\
    \ You can also use them directly with object initializers, using the get and set\
    \ keywords to prefix the relevant property.\n\nvar something = {\n\nprop: \"value\"\
    ,\n\nget someProp() { return this.prop },\n\nset someProp(value) { this.prop =\
    \ value }\n\n};\n\nThis can be useful in some cases, but keep in mind that these\
    \ accessors are slower to execute than a method that would do the same thing—which\
    \ in turn would still be\n\nslower than a regular property. Note that although\
    \ these accessors are not standards, they are supported by Mobile Safari and by\
    \ many other browsers. Therefore, they may be of more use for very large JavaScript\
    \ applications where strong control over\n\nproperties guarantees that the code\
    \ is correctly executed.\n\nCode Isolation and Libraries\n\nIt is often desirable\
    \ to isolate code as much as possible from other scripts in a web page or site\
    \ to avoid conflicts when using a third-party snippet or when providing libraries\
    \ to 315\n\nCHAPTER 10: An Object-Oriented JavaScript Programming Primer\n\nother\
    \ web applications. This can be done resorting to the *scope chain*. The scope\
    \ chain defines the environment, bound to the execution context, where a function\
    \ is executed.\n\nIn other words, it is a list of objects that are scanned when\
    \ evaluating a property. Every call to a function pushes new elements on this\
    \ chain.\n\nIsolating Your Code\n\nIsolating code is rather straightforward to\
    \ implement: you just have to enclose your function in parentheses to force evaluation\
    \ and then launch execution as with any function reference.\n\n**(**function()\
    \ {\n\n/* Your code here */\n\n}**)()**;\n\nAnything declared within this function\
    \ will be pushed to the scope chain and won’t be accessible from functions external\
    \ to it, because its context will be bound to this function. Thus, there is no\
    \ risk of overwriting external properties, as long as you use the var keyword\
    \ to force the definition of a new variable. Not using this keyword would result\
    \ in a search against the scope chain that could move up to a corresponding\n\n\
    declaration outside the function.\n\nvar variable1 = \"This is external variable\
    \ 1.\";\n\nvar variable2 = \"This is external variable 2.\";\n\nfunction someFunc()\
    \ {\n\nconsole.log(\"External someFunc() called.\");\n\n}\n\n(function() {\n\n\
    var variable0 = \"Not accessible from external code.\";\n\nvar variable1 = \"\
    This is internal variable 1.\";\n\nvariable2 = \"This is bad... replaced external\
    \ variable 2.\";\n\nfunction someFunc() {\n\nconsole.log(\"Internal someFunc()\
    \ called.\");\n\nconsole.log(\"Am I in 'window' context: \" + (this == window));\n\
    \n}\n\n/* Trace starts here... */\n\nsomeFunc();\n\nwindow.someFunc();\n\n})();\n\
    \n/* ...and continues here */\n\nconsole.log(variable0);\n\nconsole.log(variable1);\n\
    \nconsole.log(variable2);\n\nsomeFunc();\n\n**--- result ---**\n\n> Internal someFunc()\
    \ called.\n\n> Am I in 'window' context: true\n\n> External someFunc() called.\n\
    \nCHAPTER 10: An Object-Oriented JavaScript Programming Primer\n\nx ReferenceError:\
    \ Can't find variable: variable0\n\n> This is external variable 1.\n\n> This is\
    \ bad... replaced external variable 2.\n\n> External someFunc() called.\n\nIn\
    \ the previous code, we define two external variables and a global function named\
    \ someFunc; then, we write some code that is isolated and executed immediately.\
    \ You will have noticed that the second internal variable doesn’t overwrite its\
    \ external counterpart, because it is defined using the var keyword. On the contrary,\
    \ for the last variable, no keyword is used—the engine hence looks for a property\
    \ with this name in the scope chain and, finding one, will set a new value for\
    \ it. Finally, someFunc() is not overwritten, because its definition is equivalent\
    \ to the following:\n\nvar someFunc = function() { ... }\n\nTherefore, it will\
    \ be pushed to the scope chain and found on the stack whenever\n\nsomeFunc() is\
    \ called. Of course, you can also call the someFunc() method previously defined\
    \ by specifying the object to which it is attached—window in our example. The\
    \ var keyword works differently outside a function and binds variables and functions\
    \ as properties of the global object.\n\nCreating a Library\n\nNow, let’s consider\
    \ that our isolated function may return something, like an object initializer;\
    \ then, you would be defining a static object with private variables and functions.\n\
    \nvar MyStatic = (function() {\n\nvar localVariable = \"LOCAL\";\n\nvar public\
    \ = {\n\nsomeProp: \"PUBLIC\",\n\nsomeMethod: function() {\n\nconsole.log(localVariable);\n\
    \n}\n\n};\n\nlocalVariable += \" \" + public.someProp;\n\nreturn public;\n\n})();\n\
    \nMyStatic.someMethod();\n\n**--- result ---**\n\nLOCAL PUBLIC\n\nUsing an object\
    \ initializer as with public in our example, we actually create an instance of\
    \ Function. Thus, that is equivalent to the following:\n\nvar public = new function()\
    \ {\n\nthis.someProp = \"PUBLIC\";\n\n...\n\n}\n\nCHAPTER 10: An Object-Oriented\
    \ JavaScript Programming Primer\n\nWhen a function is defined within another function\
    \ and a reference is made to this Function object, a *closure* is created. Thus,\
    \ functions and variables outside public but used in these methods are referenced\
    \ inside the closure and so will be stored as long as the closure remains valid.\
    \ Such variables are a kind of private property to the public object, because\
    \ they are accessible only by this object. We already met closures in a previous\
    \ example, defining the bind() function.\n\nThis technique is used in many libraries\
    \ and web application frameworks like jQuery, iUI, or WebApp.Net to isolate the\
    \ library core as much as possible while still allowing for interaction with client\
    \ code.\n\nEnhancing Your Spinner Animation\n\nYou should now have a pretty firm\
    \ grasp of what JavaScript OOP is. We are now going to use some of the principles\
    \ presented earlier to make the BigSpinner object from Chapter 7 better. The new\
    \ object will let you create different spinners by concentrating on the animation\
    \ rendering. Of course, some of the code will be taken as is from the original\
    \ object.\n\nFirst, rename the BigSpinner object to CanvasAnimator, and apply\
    \ the following changes:\n\n/* Base object to be inherited */\n\n**var CanvasAnimator\
    \ = function() {**\n\n**/* Default dimensions */**\n\n**this.width = this.width\
    \ || 37;**\n\n**this.height = this.height || 37;**\n\n**this._base = CanvasAnimator.prototype;**\n\
    \n**}**\n\n**CanvasAnimator**.prototype.init = function(id, color, shadow) {\n\
    \n/* Initialize the canvas and save the context */\n\nthis.context = document.getCSSCanvasContext(\"\
    2d\", id, **this.width, this.height**);\n\n/* Animation variables */\n\nthis.step\
    \ = 0;\n\nthis.timer = null;\n\n}\n\n**CanvasAnimator**.prototype.stop = function()\
    \ {\n\n...\n\nthis.context.clearRect(0, 0, **this.width, this.height**);\n\n...\n\
    \n}\n\n**CanvasAnimator**.prototype.animate = function() { ... }\n\n/* Abstract\
    \ method */\n\nCanvasAnimator.prototype.draw = null;\n\nCHAPTER 10: An Object-Oriented\
    \ JavaScript Programming Primer\n\nThe changes brought to the original code are\
    \ minor here. In this object, we only put what will be common to any spinner and\
    \ define one abstract method that we set to null to force its definition from\
    \ the object that will inherit CanvasAnimator. For our first spinner, we are going\
    \ to use the methods from BigSpinner that draw the canvas context and fix the\
    \ dimensions using the new width and height properties.\n\n/* The new BigSpinner\
    \ object */\n\nvar BigSpinner = new Function();\n\n/* Inherit from BaseSpinner\
    \ */\n\nBigSpinner.prototype = new CanvasAnimator;\n\nBigSpinner.prototype.init\
    \ = function(id, color, shadow) {\n\n/* Call the base method */\n\n**this._base.init.apply(this,\
    \ arguments);**\n\n/* Line style for the spinner */\n\nthis.context.lineWidth\
    \ = 3;\n\nthis.context.lineCap = \"round\";\n\nthis.context.strokeStyle = color;\n\
    \n/* Define a shadow for the spinner */\n\nif (shadow) {\n\nthis.context.shadowOffsetX\
    \ = 1;\n\nthis.context.shadowOffsetY = 1;\n\nthis.context.shadowBlur = 1;\n\n\
    this.context.shadowColor = shadow;\n\n}\n\n}\n\nBigSpinner.prototype.draw = function()\
    \ {\n\n/* Clear the canvas */\n\nthis.context.clearRect(0, 0, **this.width, this.height**);\n\
    \n...\n\n}\n\nBigSpinner.prototype.drawLine = function(i) { ... }\n\nCoding JavaScript,\
    \ there is no notion of abstract classes, in other words, incomplete implementations\
    \ that will be finalized using an inheriting class. Still, this is what we try\
    \ to achieve. The only missing method is draw(), which is moved to our inheriting\
    \ objects in order to define our different spinners. We also override the init()\
    \ method to prepare the canvas context. CanvasAnimator, the base object, only\
    \ plays the animation drawing frames through the draw() method. All that is left\
    \ to do is to create your own animations.\n\nSummary\n\nAlthough JavaScript OOP\
    \ is more limited than other languages, with this application, you have proof\
    \ that it can make your code notably more flexible and usable.\n\nAlways keep\
    \ in mind that objects, like methods, should as much as possible focus on doing\
    \ one thing or as much as possible pertain to one area of action. Also, always\
    \ ponder the respective assets of inheritance or composition when defining what\
    \ your 319\n\nCHAPTER 10: An Object-Oriented JavaScript Programming Primer\n\n\
    objects are and what they hold. The object doesn’t make everything, and design\
    \ and architecture are more important because they are what will determine how\
    \ flexible, maintainable, and easy to extend your applications will be.\n\nDownload\
    \ from Wow! eBook <www.wowebook.com>\n\n![](index-343_1.jpg)\n\n**11**\n\n ****Chapter**\n\
    \nCross-Document\n\nCommunication\n\nThere are many cases where integrating external\
    \ content into a web page can really make a difference to its richness. It is\
    \ no secret that the Web isn’t as static as it initially was, and including pieces\
    \ from other pages, importing raw data, RSS feeds, or so-called widgets has become\
    \ a norm as found on Netvibes or iGoogle (shown in Figure 11–1), where content\
    \ and tools from several sources are appropriately brought together in a single\
    \ page to supply users with a kind of synthesis of their interests.\n\n **Figure\
    \ 11–1\\. iGoogle lets you create your own unique page by grouping external content\
    \ 321\n\nCHAPTER 11: Cross-Document Communication\n\nThis can be quite easily\
    \ done by handling XML or JSON feeds (preferred for back-end and front-end treatment,\
    \ respectively), but the easiest way to include a page into another is to virtually\
    \ create a new page inside your page with an iframe. In many cases, you are likely\
    \ to choose the latter method. Fetching feeds can be a lot of work, because you\
    \ have to handle both getting the feed to parse or store it and handling its layout\
    \ in your pages in the first place.\n\nBecause the <iframe> tag acts as a raw\
    \ inclusion of a page into another one, you will just have to indicate the source\
    \ URL and let the magic operate. This cuts out most of the maintenance work, leaving\
    \ it to the site you load the page from. What’s more, it takes care of security\
    \ issues that arise when using untrusted or unreliable code, because no communication\
    \ is possible between the <iframe> tag and the host page.\n\nHowever, communication\
    \ between part of your pages will quite often be desirable, either to add functionality,\
    \ to operate tweaks on the imported content, or to gather specific information\
    \ from the external document. Traditionally, this is possible only one way, when\
    \ the page first loads, by passing data such as color or other styling information\
    \ to the iframe source query string.\n\nOne of the most annoying problems using\
    \ iframes arguably is that because your main document has no idea of the external\
    \ document, there is no straightforward manner to determine which height should\
    \ be allotted to the <iframe>. This often results in the appearance of scrollbars\
    \ or in truncated content. Although specifically this is not a problem on the\
    \ iPhone, as you will soon see, it could often be useful if the content of the\
    \ frame could communicate this kind of information to the parent document or if,\
    \ for instance, it could send a message to notify that its content has been successfully\
    \ loaded to trigger some process in the main document. This is all possible now\
    \ thanks to the new Cross-Document Messaging API.\n\nCross-Document Communication\
    \ Limitations\n\nFor years, communication between pages from different domains—or\
    \ even different\n\nsubdomains—has been prevented because of security reasons\
    \ and privacy\n\nconsiderations. Letting any page access any other freely can\
    \ lead to uncontrollable attacks and the spreading of malicious programs.\n\n\
    The limitation also protects intellectual property, to some extent. Practically,\
    \ you cannot apply styles to the included content, nor can you access it with\
    \ scripting languages.\n\nTherefore, a request as basic as the following code\
    \ will return an exception:\n\n<!DOCTYPE html>\n\n<html>\n\n<head>\n\n<title>Quick\
    \ Sample</title>\n\n</head>\n\n<body>\n\n[<iframe src=\"http://www.apress.com/\"\
    ></iframe>](http://www.apress.com)\n\n<script>\n\nCHAPTER 11: Cross-Document Communication\n\
    \nwindow.addEventListener(\"load\", function() {\n\nvar frame = document.getElementsByTagName(\"\
    iframe\")[0];\n\nalert(frame.contentWindow.document.title);\n\n}, false);\n\n\
    </script>\n\n</body>\n\n</html>\n\nThe exception simply occurs because, as far\
    \ as your page is concerned, the\n\nconentWindow frame object has no document\
    \ property.\n\n**NOTE**: This code will not yield an exception if you try to load\
    \ the iframe inside a page accessed\n\n[using a file:// URL scheme, because in\
    \ this case, the security context is com](file://URL)pletely different.\n\nTherefore,\
    \ always test your pages in real-life conditions to avoid delusions when putting\
    \ your web applications online.\n\nUp to now, there was no easy way out of this\
    \ trap. If your conflict involved different domain prefixes on a single domain,\
    \ you probably would have moved the relevant files from one place to another to\
    \ make the problem disappear altogether, but if you were coping with multiple\
    \ sites, the only solutions available would have been both mind-twisting and awkward\
    \ to maintain.\n\nCommunication, the HTML5 Way\n\nHTML5 introduces an API that\
    \ is meant to allow communication between documents\n\nwhatever their source domain\
    \ while preventing cross-site scripting attacks as much as possible. It may seem\
    \ a dream; the following sections detail how it works.\n\nThe Cross-Document Messaging\
    \ API\n\nThe API itself is quite straightforward. It simply introduces the MessageEvent\
    \ object and a method used to send messages that can be applied to a window object.\
    \ Table 11–1\n\npresents the main properties for the event object as it is sent\
    \ to a remote document.\n\nThis event cannot be canceled, it doesn’t bubble, and\
    \ it has no default behavior.\n\nTable 11–1\\. Main Properties of the *MessageEvent*\
    \ Object\n\n**Property Description**\n\n*event*.data\n\nThe data that is sent\
    \ with the postMessage() method.\n\n*event*.origin\n\nThe origin of the message.\n\
    \n*event*.source\n\nThe source window.\n\nCHAPTER 11: Cross-Document Communication\n\
    \nThe MessageEvent object is sent to the destination window with the postMessage()\n\
    \nmethod. The parameters currently supported by Mobile Safari, listed in Table\
    \ 11–2, are\n\n ***all* **required.**\n\n **Table 11–2\\. Parameters for the *postMessage()*\
    \ Method\n\n**Parameter Description**\n\nmessage\n\nThe message that will be accessed\
    \ in the target window with the data\n\nproperty of the event object\n\ntargetOrigin\n\
    \nThe target to which you accept to deliver the message\n\nThe targetOrigin parameter\
    \ can be defined under three forms, either an absolute URL, a / to indicate the\
    \ same origin, or the * wildcard, indicating that no origin check will be performed.\n\
    \nIf the value of targetOrigin doesn’t match the actual origin of the target window,\
    \ the message is ignored, for security reasons. If the targetOrigin parameter\
    \ is not defined, a SYNTAX_ERR exception will be thrown.\n\nData Type Support\
    \ and Handling\n\nThe API specifies that several data types should be supported\
    \ by the data property.\n\nUnfortunately, only the string format is currently\
    \ supported in Mobile Safari as of OS 3.2.\n\nNonetheless, there are quite effortless\
    \ workarounds to handle several other types. For instance, the Number, Boolean,\
    \ or Date objects have a convenient toString() method that will return appropriate\
    \ values and allow for further processing—including\n\nreconversion to objects.\
    \ Do remember, though, that because the elements passed as parameter will be plain\
    \ strings, you won’t be able to access any of their initial properties, as made\
    \ clear in the following example:\n\nvar o = { someProperty: 'someValue' };\n\n\
    The preceding will appear in the data property as [object Object], a 15-character\
    \ string. This requires that you pay attention, of course, to the elements that\
    \ you pass as parameters to the postMessage() method but also that you take extra\
    \ care of checking the data you receive.\n\nMobile Safari’s implementation of\
    \ the API yet isn’t much more restrictive than the API itself. The Cross-Document\
    \ Messaging API doesn’t intend that native DOM objects\n\nshould be handled by\
    \ the postMessage() method. Therefore, you should never be able to access objects\
    \ through the document.getElementById() method or get information about the page\
    \ structure.\n\nCHAPTER 11: Cross-Document Communication\n\nSecurity Considerations\n\
    \nThe HTML5 specification indicates several stages of the process where developers\n\
    \nshould be particularly vigilant when using the method and recommends good practices.\n\
    \nThis is because using cross-document messaging can easily lead to vulnerability\
    \ to scripting attacks that ultimately would affect the end user.\n\nThe main\
    \ stage where developers should be careful is when receiving a message. First,\
    \ you should verify the origin of the message and process it only if the source\
    \ is trusted and expected to communicate at the specific moment in the specific\
    \ context of the operation. You have to be able to rely on the code from the source,\
    \ because security weaknesses in it could expose your site to attacks without\
    \ the source site even being aware of it. Then, you should confront the communicated\
    \ data to the expected data format.\n\nAgain, if the data you receive is different\
    \ from what you were asking for without your noticing it, you are exposed to cross-site\
    \ scripting attacks. Finally, you should never use the wildcard for the targetOrigin\
    \ parameter when handling sensitive data, such as user information, because there\
    \ is no way to verify recipients.\n\nCase Study\n\nTo make the Cross-Document\
    \ Messaging API more concrete, we are going to build a\n\nsmall widgets-based\
    \ web application where a document on the domain\n\n[www.example1.local is going\
    \ to gather widget information from the](http://www.example1.local) <iframe> it\
    \ contains, which loads a document from [www.example2.local. You can easily set\
    \ up this example](http://www.example2.local)\n\non your computer following the\
    \ instructions in Chapter 2 about the development\n\nenvironment.\n\nNote that\
    \ following these instructions, your files will be hosted in the same directories;\
    \ however, the domain and the directory structure are two completely different\
    \ realities, so you could actually call the same file for the main document and\
    \ the iframe source, as long as you use different domains or subdomains.\n\nThe\
    \ Main Document\n\nIf you’ve created a Komodo Edit project template as introduced\
    \ in Chapter 4, you need to change the following bold elements in the *index.html*\
    \ file:\n\n<!DOCTYPE html>\n\n<html>\n\n<head>\n\n<title> **Messaging Example**</title>\n\
    \n<meta name=\"viewport\" content=\"initial-scale=1.0;\n\nmaximum-scale=1.0; user-scalable=no\"\
    >\n\n<link rel=\"stylesheet\" href=\"styles/main.css\">\n\n<script src=\"scripts/main.js\"\
    ></script>\n\nCHAPTER 11: Cross-Document Communication\n\n**<style>**\n\n**.group-wrapper\
    \ p iframe {**\n\n**width: 100%;**\n\n**height: 1px;**\n\n**border: 0;**\n\n**}**\n\
    \n**.header-wrapper .header-button {**\n\n**background-color: #2070e9;**\n\n**}**\n\
    \n**.widget h2 {**\n\n**-webkit-border-top-left-radius: 8px;**\n\n**-webkit-border-top-right-radius:\
    \ 8px;**\n\n**background-color: #c5ccd3;**\n\n**border: 1px solid #a9abae;**\n\
    \n**border-bottom: 0;**\n\n**margin: 0;**\n\n**color: gray;**\n\n**font-size:\
    \ 14px;**\n\n**line-height: 25px;**\n\n**padding: 0 10px;**\n\n**}**\n\n**.widget\
    \ p {**\n\n**margin-top: 0;**\n\n**border-top: 0;**\n\n**-webkit-border-top-left-radius:\
    \ 0;**\n\n**-webkit-border-top-right-radius: 0;**\n\n**}**\n\n**</style>**\n\n\
    </head>\n\n<body>\n\n<div class=\"view\">\n\n<div class=\"header-wrapper\">\n\n\
    <h1> **Messaging**</h1>\n\n**<button class=\"header-button\" onclick=\"sendMessageToFrame()\"\
    >Send</button>**\n\n</div>\n\n<div class=\"group-wrapper\">\n\n<div class=\"widget\"\
    >\n\n<h2> **Loading Widget...** </h2>\n\n<p**><** iframe [**src=\"http://www.example2.local/calculator.html\"\
    >**](http://www.example2.local/calculator.html)\n\n**</**iframe**>** </p>\n\n\
    </div>\n\n</div>\n\n</div>\n\n</body>\n\n</html>\n\nBecause style is not the point\
    \ in this example, we have kept it as simple as possible.\n\nTherefore, we shall\
    \ leave the styles in the <head> area of the page, rather than include them from\
    \ an external style sheet.\n\ns\n\nCHAPTER 11: Cross-Document Communication\n\n\
    The Hosted Document\n\nThe following is the *calculator.html* file to be included\
    \ in the main document through an\n\n<iframe> tag representing a widget. Because\
    \ it needs to be a proper HTML document, do not forget to create a validating\
    \ HTML structure (for example, with a doctype\n\ndeclaration). However, because\
    \ its purpose is only to supply content for the main document, you needn’t use\
    \ additional markup for the content area or use a specific external style sheet.\n\
    \n<!DOCTYPE html>\n\n<html>\n\n<head>\n\n<title>Calculator</title>\n\n<style>\n\
    \nbody {\n\nfont-family: helvetica;\n\nfont-size: 14px;\n\nmargin: 0;\n\n}\n\n\
    p { margin: 0; }\n\n</style>\n\n</head>\n\n<body>\n\n<p>Hello, I'm a calculator\
    \ widget.<br>\n\nClick \"Send\" to request the widget title.</p>\n\n</body>\n\n\
    </html>\n\nThings are getting into shape here, as you can see in Figure 11–2.\
    \ You will notice that the <iframe> has taken an appropriate height, so its contents\
    \ fit in. We will explain this behavior later in this chapter. But for now, the\
    \ next step is to do some API magic and make the title above the <iframe> adapt\
    \ to the actual content of the iframe.\n\n![](index-350_1.jpg)\n\nCHAPTER 11:\
    \ Cross-Document Communication\n\nFigure 11–2\\. The initial document, without\
    \ custom widget name\n\nLet’s Send a Message\n\nWe are going to assume that the\
    \ hosted document will be able to answer a request from our main document by returning\
    \ a title relevant to its own content. The following is the code that we need\
    \ to do that, using the API. Add it to the head of the main document.\n\n<script>\n\
    \n/* Register for the answer */\n\nwindow.addEventListener(\"message\", handleFrameMessage,\
    \ false);\n\n/* Send a message to the iframe */\n\nfunction sendMessageToFrame()\
    \ {\n\nvar frame = document.getElementsByTagName(\"iframe\")[0];\n\n[frame.contentWindow.postMessage(\"\
    getFrameTitle\", \"http://www.example2.local\");](http://www.example2.local)\n\
    \n}\n\n/* Expects a string under the form \"title:frame document title\" */\n\n\
    function handleFrameMessage(e) {\n\n[if (e.origin == \"http://www.example2.local\"\
    ) {](http://www.example2.local)\n\nif (e.data && e.data.indexOf(\"title:\") ==\
    \ 0) {\n\nvar h2 = document.getElementsByTagName(\"h2\")[0];\n\nh2.textContent\
    \ = e.data.substr(6);\n\n}\n\n}\n\n}\n\n</script>\n\nCHAPTER 11: Cross-Document\
    \ Communication\n\nFirst, we have registered to be notified of message events.\
    \ Then, we add a button in the header so that we can manually send our message\
    \ with the sendMessageToFrame()\n\nfunction. Of course, we could have used the\
    \ onload event of the body to trigger the message immediately after the document\
    \ has loaded.\n\nHandling the Response\n\nThe last step happens on the <iframe>document\
    \ side. We want the document loaded in the inline frame to answer the message\
    \ of the main document by sending the contents of its <title> tag. The following\
    \ code, put in the <head> of the hosted document, should do:\n\n<script>\n\nwindow.addEventListener(\"\
    message\", handleParentMessage, false);\n\nfunction handleParentMessage(e) {\n\
    \n[if (e.origin == \"http://www.example1.local\") {](http://www.example1.local)\n\
    \nif (e.data == \"getFrameTitle\") {\n\ne.source.postMessage(\"title:\" + document.title,\
    \ e.origin);\n\n}\n\n}\n\n}\n\n</script>\n\nWe add a new event handler to launch\
    \ the handleParentMessage() function when we\n\nreceive a message. Note how the\
    \ checking process is done: first, we check whether the message is coming from\
    \ the right domain; then, we check that the received message is in the expected\
    \ format (in our example, we check for an exact string). Only after this security\
    \ checking will we send a message with the requested data. Then, similar\n\nchecking\
    \ will be taken on by the hosting page before replacing the <h2> title with the\
    \ one sent by the inline frame (see Figure 11–3).\n\nThe response will be caught\
    \ using the handleFrameMessage() function. Note how we use the textContent property\
    \ in the main document handling function, rather than the more common innerHTML.\
    \ This is an extra security action, because innerHTML will write out all the content\
    \ of the variable as it is received, while textContext will encode special characters\
    \ into proper HTML entities.\n\n![](index-352_1.jpg)\n\n![](index-352_2.jpg)\n\
    \nCHAPTER 11: Cross-Document Communication\n\nFigure 11–3\\. The title has been\
    \ changed using the API\n\nOf course, you must also never get the target origin\
    \ parameter wrong, or you wil get an error as shown in Figure 11–4 and no data\
    \ because the message wil be ignored.\n\n **Download from Wow! eBook <www.wowebook.com>\n\
    \nFigure 11–4\\. An incorrect origin value will raise an exception\n\nMost importantly,\
    \ you should neglect none of the security steps we have introduced. If you want\
    \ to add more, al the better. The end user himself obviously cannot react to cross-site\
    \ scripting attacks, so you are responsible for the security of your pages, especial\
    \ y when you are involving other sites.\n\nSo, let’s repeat it: when working with\
    \ cross-document messaging, always make sure, at the least, that the message you\
    \ receive is from the right document or site, that its content is in the right\
    \ format and holds appropriate data, and that you don’t leave space for scripting.\n\
    \nSpecific Mobile Safari Behavior with <iframe>\n\nFrames in HTML5 have been dropped.\
    \ You are no longer supposed to use the\n\n<frameset>, <frame>, and <noframes>\
    \ tags. There are several reasons for this.\n\n![](index-353_1.jpg)\n\nCHAPTER\
    \ 11: Cross-Document Communication\n\nFirst, they tend to participate in bad user\
    \ experience, while not bringing many\n\nadvantages to web pages. Furthermore,\
    \ they are usually very bad for visibility for search engines and are very badly\
    \ supported by screen readers.\n\nYet, the <iframe> tag remains part of the language,\
    \ although it has disappeared from the XHTML Strict specification. However, it\
    \ should be resorted to only when absolutely necessary, especially in Mobile Safari,\
    \ because <iframe> content requires a two-finger gesture to be panned (a rather\
    \ uneasy one—try it). If you can display this content without it needing to be\
    \ scrolled, the drawbacks will be fewer. For this, you need the size of the inline\
    \ frame to adapt to the size of the browsing context it nests.\n\nThe use of iframes\
    \ in Mobile Safari can result in strange rendering, because scrollbars as such\
    \ do not exist. Therefore, if your content goes beyond the limits of the frame\
    \ window, it will simply appear truncated, which can be unclear to the user.\n\
    \nHowever, Mobile Safari handles iframes differently from desktop browsers. By\n\
    \nspecifying both a width and a height for your <iframe>, you will trigger an\
    \ iOS-specific behavior: the frame will adapt to the size of its content (see\
    \ Figure 11–5).\n\nFigure 11–5\\. If both dimensions are set, the frame is expanded\
    \ to fit its contents This is why we have set the height of our frame to 1px in\
    \ the main document of the previous case study. Do note that this behavior will\
    \ not be triggered if the width or height is set to 0\\. Also, the reverse action\
    \ will not apply. If you determine a width or height greater than that of the\
    \ content, the frame will not be made smaller.\n\nCHAPTER 11: Cross-Document Communication\n\
    \nWorking with Proper Windows\n\nInline frames are a way to cope with external\
    \ content with a fully active browsing context and a child browsing context. However,\
    \ there are cases where it would be desirable to create an auxiliary browsing\
    \ context instead, in the form of a second window, either because the external\
    \ content doesn’t visually fit into the design of your page or because you would\
    \ like to launch a stand-alone widget that could still communicate with the host\
    \ document.\n\nNOTE: This of course is possible in Mobile Safari. However, if\
    \ you are creating a web application meant to run in stand-alone mode, opening\
    \ a new window in such a way would result in changing that window—without actually\
    \ opening Safari—at loss of the main document.\n\nTherefore, the execution context\
    \ could be lost.\n\nThe following is an example of how to open a new browsing\
    \ context in a separate\n\nwindow and how to establish communication between the\
    \ main document and the\n\nsecond one.\n\nTo begin, modify the case study by adding\
    \ this code to your *index.html* file:\n\n<script>\n\n**var win; // Global variable\
    \ to work later on the window**\n\n**function openChildWindow() {**\n\n**if (!win)\
    \ {**\n\n[**win = window.open('http://www.example2.local/calculator.html', \"\
    childWin\");**](http://www.example2.local/calculator.html)\n\n**}**\n\n**return\
    \ false;**\n\n**}**\n\n**function sendMessageToWindow() {**\n\n[**win.postMessage(\"\
    getFrameTitle\", \"http://www.example2.local\");**](http://www.example2.local)\n\
    \n**}**\n\n...\n\n</script>\n\n...\n\n<div class=\"header-wrapper\">\n\n<h1>Messaging</h1>\n\
    \n<button class=\"header-button\" onclick=\" **openChildWindow()**\"> **Window**</button>\n\
    \n</div>\n\n<div class=\"group-wrapper\">\n\nCHAPTER 11: Cross-Document Communication\n\
    \n<h2>Loading Widget...</h2>\n\n<p> **No** iframe **here.<br>Click the \"Window\"\
    \ button.** </p>\n\n</div>\n\n</div>\n\n...\n\nBecause the pop-up blocker usually\
    \ is turned on by default, we bind the opening of the new window to an action\
    \ by the user using a button and an onclick handler. Also, it is better to open\
    \ the auxiliary browsing context only once the main document is fully loaded to\
    \ make synchronizing the windows together more reliable.\n\nOnly the childWin\
    \ window can know when it has been fully loaded, and the window\n\nfrom which\
    \ it has been opened has limited control over it. The only actions the main window\
    \ can operate on its auxiliary context is to close it or change its location.\n\
    \nNext, modify the handleFrameMessage() function so you can get a “page loaded”\n\
    \nnotification, and then ask for the title information you want:\n\nfunction handleFrameMessage(e)\
    \ {\n\n[if (e.origin == \"http://www.example2.local\") {](http://www.example2.local)\n\
    \n**if (e.data == \"loaded\") {**\n\n**sendMessageToWindow();**\n\n**} else**\
    \ if (e.data && e.data.indexOf(\"title:\") == 0) {\n\n...\n\n}\n\n}\n\n}\n\nThe\
    \ next step is to modify code inside the child window so that it indicates when\
    \ its content is loaded.\n\nNotify the Page Is Loaded\n\nYou want the child window\
    \ to notify its parent window when it is ready for\n\ncommunication. Conveniently,\
    \ auxilary browsing contexts have a object that keeps the memory of their parent\
    \ browsing context.\n\nTherefore, they can communicate both with the context from\
    \ which it was opened and with the top-level browsing context of that opener.\
    \ Here is the code that you need in the head of the *calculator.html* file for\
    \ the newly opened window:\n\n...\n\nfunction contentLoaded() {\n\nif (window.opener)\
    \ {\n\nwindow.opener.postMessage(\"loaded\", \"*\");\n\n}\n\n}\n\n...\n\n<body\
    \ onload=\"contentLoaded()\">\n\nCHAPTER 11: Cross-Document Communication\n\n\
    The opener property of the window object keeps record of the opening context for\
    \ further processing. It will return a WindowProxy object related to its parent\
    \ window, if the latter has one and is still available.\n\nStill, be careful,\
    \ because there is no way to check the domain of the window referred to by the\
    \ window.opener object; therefore, be careful not to send private information\
    \ to it. In our example, you simply notify of document loading state. Once both\
    \ documents are ready, they can communicate with the postMessage() method, as\
    \ we have seen\n\npreviously.\n\nNote that this load notification method works\
    \ with windows but could also be used with inline frames, using the properties\
    \ covered in the next section.\n\nProperties of the Window Object\n\nThe opener,\
    \ top, and parent properties initially are part of the DOM Level 0; that is, they\
    \ are DOM properties first introduced by user agents themselves.\n\nHTML5 makes\
    \ them part of the web specifications, which means you will soon be able to use\
    \ them more reliably to determine the position of browsing contexts within the\
    \ parents/children hierarchy. Figure 11–6 shows different relationships possible\
    \ between browsing contexts.\n\nFigure 11–6\\. Relationships between browsing\
    \ contexts\n\nThe opener is relative to the browsing context from which the child\
    \ window was opened.\n\nWhen a new browsing context is created from a <iframe>,\
    \ it can refer to its parent using the usual property from the DOMWindow object.\
    \ Hence, you would simply have to replace window.opener with window.parent.\n\n\
    CHAPTER 11: Cross-Document Communication\n\n...\n\nfunction contentLoaded() {\n\
    \n/* Do not post a message to self */\n\nif (**window.parent && window.parent\
    \ != window**) {\n\n**window.parent**.postMessage(\"loaded\", \"*\");\n\n}\n\n\
    }\n\n...\n\nRemember to always check, as is done in our example, that parent doesn’t\
    \ refer to the current window, because parent and top are the same as window when\
    \ the browsing\n\ncontext is the top level.\n\nEncapsulating the API to Ease Communication\n\
    \nUp to now, in the examples, you have handled only one widget, with code specific\
    \ to one host page, one widget, and one external source. Of course, as in any\
    \ development process, it would be better to create code that can handle multiple\
    \ elements to avoid creating processes over and over again. Here, what you want\
    \ to do is create one\n\nprocess that could initiate communication for any widget\
    \ of the kind.\n\nWith this aim in mind, we are going to gather all the functionality\
    \ we have previously implemented into two objects: one for the host document,\
    \ which will send requests to create titles, and one for the widgets, which will\
    \ relieve the content providers from any specific implementation on the source\
    \ side, except the use of the object and a few specific functions. This will enhance\
    \ maintainability on both sides.\n\nAn Object for the Host Document\n\nIn a new\
    \ *host.js* file, we are going to create our object for the document that will\
    \ hold the widgets. As stated earlier, we want to make it possible to load several\
    \ widgets with a communication process that is mainly automatic while still addressing\
    \ security\n\nconcerns.\n\nvar Communicator = function(element) {\n\nvar widget\
    \ = Communicator.widgetFromElement(element);\n\nthis.title = widget.getElementsByTagName(\"\
    h2\")[0];\n\nthis.iframe = widget.getElementsByTagName(\"iframe\")[0];\n\n/* Force\
    \ same origin if the domain cannot be extracted */\n\nvar match = this.iframe.src.match(/^(https?:\\\
    /\\/.+?)\\/.*$/);\n\nthis.domain = (match) ? match[1] : \"/\";\n\n}\n\nCommunicator.prototype.setTitle\
    \ = function(title) {\n\nif (!title) {\n\nthis.iframe.contentWindow.postMessage(\"\
    getFrameTitle\", this.domain);\n\n} else {\n\nthis.title.lastChild.textContent\
    \ = title;\n\n}\n\n}\n\nCHAPTER 11: Cross-Document Communication\n\nAs a parameter,\
    \ the constructor takes a widget and gathers the HTMLHeadingElement and HTMLIFrameElement\
    \ objects that are to be modified in the widget. The domain is gathered directly\
    \ from the src attribute of the <iframe> element and will be used to secure the\
    \ communication. This is done, as shown earlier, by validating the origin of the\
    \ message.\n\nThe setTitle() method allows you to set a title for the widget either\
    \ by giving it directly a new title directly or by getting it from the widget\
    \ itself, using the postMessage() method.\n\nFinally, we need a global process\
    \ to receive messages and distribute them among the relevant widgets. To not overload\
    \ the browser with too many listeners, we define one global listener that will\
    \ listen for messages from widgets.\n\n/* Static part of the Communicator object\
    \ */\n\nCommunicator.listen = function() {\n\nwindow.addEventListener(\"message\"\
    , Communicator.handleMessages, false);\n\n}\n\nCommunicator.handleMessages = function(e)\
    \ {\n\nvar iframe = Communicator.containerFromSource(e.source);\n\nif (iframe)\
    \ {\n\n/* When the widget is loaded,\n\nappend a new property to the iframe element\
    \ */\n\nif (e.data == \"loaded\") {\n\niframe._com = new Communicator(iframe);\n\
    \niframe._com.setTitle(\"Loaded!\");\n\n/* Handle messages and dispatch request\
    \ to proper object */\n\n} else if (iframe._com) {\n\nif (e.data.indexOf(\"title:\"\
    ) == 0) {\n\niframe._com.setTitle(e.data.substr(6));\n\n}\n\n}\n\n}\n\n}\n\nThe\
    \ first method is used for initialization and triggers the listening for messages.\
    \ It is the only function explicitly called by the client code and will be launched\
    \ immediately, without waiting for the load event, so as not to miss any messages\
    \ from the widgets.\n\nThis is done because the browser downloads elements moving\
    \ down the document tree before it is completely loaded.\n\nThe second method\
    \ is the handler that receives notifications. Its first action is to look for\
    \ an <frame> that fits with the message source, and then it checks the type of\
    \ the received message. If it is a “loaded” message, it instantiates a new Communicator\
    \ object that will in turn be attached to the widget HTMLIFrameElement, appending\
    \ to it a new _com property to make it easy to find and use later. For other message\
    \ types, it will call the relevant method on the previously instantiated Communicator\
    \ object, in our case, setTitle().\n\nCommunicator.containerFromSource = function(source)\
    \ {\n\nvar widgets = document.getElementsByClassName(\"widget\");\n\nfor (var\
    \ i = 0; i < widgets.length; i++) {\n\nvar iframe = widgets[i].getElementsByTagName(\"\
    iframe\")[0];\n\nCHAPTER 11: Cross-Document Communication\n\nif (iframe.contentWindow\
    \ == source) {\n\nreturn iframe;\n\n}\n\n}\n\n}\n\nCommunicator.widgetFromElement\
    \ = function(o) {\n\nreturn (o && o.className != \"widget\") ?\n\nCommunicator.widgetFromElement(o.parentNode)\
    \ : o;\n\n}\n\nFinally, we use two convenient methods that, respectively, allow\
    \ you to search for a widget container (an <iframe>) or find a “widget” bloc using\
    \ one of its children.\n\nAn Object for the Widget\n\nThe Widget object will let\
    \ the widgets send information to their host and execute actions the host asks\
    \ for. In our example, this is quite simple because the action will only show\
    \ a title above each widget. In a new *widget.js* file, you need to add the following\
    \ code: var Widget = function(allowed) {\n\nthis.allowed = allowed || [];\n\n\
    }\n\nWidget.prototype.loaded = function() {\n\n/* The wildcard is not a problem\
    \ here,\n\nthere is no sensitive data sent to the parent window */\n\nwindow.parent.postMessage(\"\
    loaded\", \"*\");\n\n/* Prepare message handling */\n\nvar that = this;\n\nwindow.addEventListener(\"\
    message\", function(e) {\n\nthat.handleParentMessage(e);\n\n}, false);\n\n}\n\n\
    Widget.prototype.isAllowed = function(origin) {\n\nfor (var i = 0; i < this.allowed.length;\
    \ i++) {\n\nif (origin == this.allowed[i]) {\n\nreturn true;\n\n}\n\n}\n\nreturn\
    \ false;\n\n}\n\nWidget.prototype.handleParentMessage = function(e) {\n\nif (this.isAllowed(e.origin))\
    \ {\n\nif (e.data == \"getFrameTitle\") {\n\ne.source.postMessage(\"title:\" +\
    \ this.getTitle(), e.origin);\n\n}\n\n}\n\n}\n\nAgain, the elements here have\
    \ been used in previous examples. Our primary concern is security, so we pass\
    \ a list of trusted sources to the constructor. This way, if the widget 338\n\n\
    CHAPTER 11: Cross-Document Communication\n\nis available to several partners using\
    \ the API defined here, there will only be an array to fill. If the origin of\
    \ the widget doesn’t match an entry of the array, the widget can be deactivated,\
    \ and different content can be loaded instead.\n\nThe loaded() method is called\
    \ by the widget with the load event to make sure\n\ncommunication between the\
    \ host and the widget will happen as expected. It sends the\n\n“loaded” message\
    \ to the host that will instantiate the Communicator object required for the communication\
    \ process. The messages are handled by the handleParentMessage()\n\nfunction,\
    \ which will first test for a valid request by checking the origin and then send\
    \ the title for the document. Last, we need the widget-specific part:\n\nWidget.prototype.getTitle\
    \ = function() {\n\nreturn document.title;\n\n}\n\nUsing this small API, all the\
    \ partner has to do is implement this method to return the document title. It\
    \ is used in handleParentMessage(). Thus, adding a new action is as simple as\
    \ adding a handler to this function and adding the appropriate method to the object\
    \ prototype.\n\nThe Host Document and the Widgets\n\nTo make this effective, we\
    \ need to call our new scripts in our main document. From the *index.html* file\
    \ we created previously in this chapter, remove the inline scripts that handled\
    \ messages, and add the following code:\n\n<head>\n\n...\n\n<script src=\"scripts/main.js\"\
    ></script>\n\n**<script src=\"scripts/host.js\"></script>**\n\n**<script>**\n\n\
    **Communicator.listen();**\n\n**</script>**\n\n<style>\n\nh2 a {\n\nfloat: right;\n\
    \ncolor: inherit;\n\ntext-decoration: none;\n\n}\n\n...\n\n</head>\n\nThen, add\
    \ two widget calls after the first one to make use of the new code:\n\n...\n\n\
    <div class=\"widget\">\n\n<h2><a href=\"#\" onclick=\"return **getTitle(this)**\"\
    >&raquo;Title</a>\n\n<span>Loading Widget...</span></h2>\n\n[<p><iframe src=\"\
    http://www.example2.local/calculator.html\"></iframe></p>](http://www.example2.local/calculator.html)\n\
    \n</div>\n\n**<div class=\"widget\">**\n\n**<h2><a href=\"#\" onclick=\"return\
    \ getTitle(this)\">&raquo;Title</a>**\n\n**<span>Loading Widget...</span></h2>**\n\
    \nCHAPTER 11: Cross-Document Communication\n\n**<p><** iframe [**src=\"http://www.example2.local/game.html\"\
    ></**](http://www.example2.local/game.html)iframe**></p>**\n\n**</div>**\n\n**<div\
    \ class=\"widget\">**\n\n**<h2><a href=\"#\" onclick=\"return getTitle(this)\"\
    >&raquo;Title</a>**\n\n**<span>Loading Widget...</span></h2>**\n\n**<p><** iframe\
    \ [**src=\"http://www.example2.local/weather.html\"></**](http://www.example2.local/weather.html)iframe**></p>**\n\
    \n**</div>**\n\n...\n\nTo make the process of gathering titles from the Title\
    \ links more straightforward, you can use a function that is a shortcut to the\
    \ Communicator object bound to each frame: function getTitle(o) {\n\nvar widget\
    \ = Communicator.widgetFromElement(o);\n\nvar iframe = widget.getElementsByTagName(\"\
    iframe\")[0];\n\niframe._com.setTitle();\n\nreturn false; // To cancel the click\
    \ event\n\n}\n\nFinally, change the widget file, *calculator.html*, by removing\
    \ the initial scripts and adding the following:\n\n...\n\n</style>\n\n**<script\
    \ src=\"scripts/widget.js\"></script>**\n\n**<script>**\n\n**function contentLoaded()\
    \ {**\n\n[**var allowed = [\"http://www.example1.local\"];**](http://www.example1.local)\n\
    \n**new Widget(allowed).loaded();**\n\n**}**\n\n**</script>**\n\n</head>\n\n<body\
    \ **onload=\"contentLoaded()\"** >\n\nYou instantiate a new Widget object without\
    \ relating it to a variable. Still, there is no risk of it being deleted by the\
    \ garbage collector, because one of its methods is referred to in an event listener.\n\
    \nThe last step is to actually create more widgets. Because the document is quite\
    \ simple, all you need to do is change the <title> and the content of the <p>\
    \ element in each document. Now, refreshing the host document in a browser, you\
    \ should see something similar to Figure 11–7.\n\nYou can trigger the title request\
    \ by clicking the Title link on the right of the widget title.\n\nThe point here\
    \ was to illustrate how requests using the messaging API can be\n\nencapsulated.\n\
    \n![](index-362_1.jpg)\n\nCHAPTER 11: Cross-Document Communication\n\nFigure 11–7\\\
    . Several widgets can be loaded and communicate with the host document without\
    \ requiring specific scripts\n\nRelaxing Subdomain Communication\n\nWhen handling\
    \ subdomain communication, we evoked the possibility to simply change the location\
    \ of one of the files to make both documents be cal ed on the same domain.\n\n\
    Download from Wow! eBook <www.wowebook.com>\n\nThis of course, when it can be\
    \ done, is a rather annoying and potential y problematic thing to do because it\
    \ may harm the initial architecture. After al , if two documents were on different\
    \ subdomains, there probably was a reason. There actual y is a more elegant way\
    \ to handle subdomain communication. It has drawbacks, but it is a reliable method.\n\
    \nChanging the Domain\n\nDOM Level 1 al ows you to redefine the domain for documents\
    \ sharing the same suffix.\n\nThe relevant property initial y returns the host\
    \ name of the server from which the page is served; it can also be assigned the\
    \ domain suffix to al ow communication between\n\nframes with the same top-level\
    \ domain.\n\nFor instance, using the files from the previous case study, if you\
    \ are working with *calculator.html* on someplace.example1.local instead of [www.example2.local,](http://www.example2.local)\
    \ you could set both documents to have a domain property example1.local, and communication\
    \ wil be enabled. This makes it possible not to resort to the Cross-Document Messaging\
    \ API when not strictly necessary, thus letting you access the title directly\
    \ using less code.\n\nCHAPTER 11: Cross-Document Communication\n\ndocument.domain\
    \ = \"example1.local\";\n\nHere is what your main document code would look like:\n\
    \n...\n\nfunction getFrameTitle() {\n\nvar frame = document.getElementsByTagName(\"\
    iframe\")[0];\n\nvar h2 = document.getElementsByTagName(\"h2\")[0];\n\nh2.textContent\
    \ = frame.contentWindow.document.title;\n\n}\n\n...\n\n<body onload=\"getFrameTitle()\"\
    >\n\nNot only is the code made much simpler, but this method also allows you to\
    \ directly read the entire DOM of the child document as if it were the same browsing\
    \ context.\n\nFurthermore, no more code is needed in the child document, apart\
    \ from the domain\n\nchange.\n\nSecurity\n\nUsing the latter method, you yet once\
    \ again have to pay extra attention to security issues. The first thing to be\
    \ careful about is the type of hosting you are using. If your pages are on a shared\
    \ hosting, using the same top-level domain for all hosted sites (as is done, for\
    \ instance, for people.wordpress.com, computers.wordpress.com, and so on), the\
    \ obvious risk is that any other site using the domain could find a way to access\
    \ your site in the same manner, especially by building a page to affect yours\
    \ specifically (which actually some people do get into doing).\n\nThe Last Message\n\
    \nThe Cross-Document Messaging API introduced by HTML5 opens a whole new range\
    \ of\n\nopportunities for developers to build better web sites and applications.\
    \ Indeed, because the Web grows ever more dynamic and mixed-source content becomes\
    \ an inevitable\n\nway to make richer content and better service, being able to\
    \ do more with alien content is a great step forward.\n\nHowever, the causes for\
    \ restrictions applied to iframes in HTML4 and previous are still to be taken\
    \ into account. Communicating with alien content necessarily implies risks that\
    \ this content could have harmful consequences—even when there was no such\n\n\
    intention on your fellow developer’s side.\n\nTherefore, do be careful to always\
    \ double- and triple-check any content or message that is embedded or called from\
    \ sites you do not have a hand on. Security on the Web is a collective effort\
    \ in which you too need to participate.\n\n**12**\n\n ****Chapter**\n\nAjax and\
    \ Dynamic Content\n\nAlthough inline frames can be an appropriate way to load\
    \ external content into your web pages, they are not as flexible as much modern\
    \ functionality would require. Building web applications, you will generally try\
    \ to provide a specific answer to some request of the user, so it is likely that\
    \ you will need to dynamically load external content on actions of the user or\
    \ resort to server-side scripting to process user input.\n\nThis would traditionally\
    \ require that you use multiple forms and load a new page every time the user\
    \ has completed a significant piece of information, which of course violates a\
    \ number of principles that we have presented in earlier chapters. Because the\n\
    \nexperience for the user should be made as seamless as possible, imposing daunting\
    \ forms, regularly loading new pages without being confident that connectivity\
    \ will be steady, and ultimately breaking the impression of users that they are\
    \ within a proper application should by all means be avoided.\n\nFor some years\
    \ now, Asynchronous JavaScript and XML (Ajax) has been widely\n\naccepted as the\
    \ appropriate solution to provide functionality in such a manner. The principle\
    \ of Ajax is that JavaScript can let you perform HTTP client functionality after\
    \ your page has loaded. This is done using a specific API, maintained by the W3C,\
    \ based on the XMLHttpRequest object.\n\nBuilding an HTTP Request\n\nThe XMLHttpRequest\
    \ object allows client scripts to perform HTTP functionality. This means you can\
    \ perform actions that you traditionally would have accessed by loading a new\
    \ page without leaving the current page and by loading external content into the\
    \ current document. This typically is done asynchronously, although the object\
    \ supports synchronous requests; the strength of asynchronous requests is that\
    \ they do not\n\ndepend on the global page-loading process, and because requests\
    \ are executed in the background, they will not affect the rest of the page activity,\
    \ be it simple rendering or the execution of other scripts.\n\nCHAPTER 12: Ajax\
    \ and Dynamic Content\n\nRequests Using the XMLHttpRequest Object\n\nThe process\
    \ to use the XMLHttpRequest object is pretty straightforward. All versions of\
    \ Mobile Safari have an implementation that complies to the W3C standard. The\
    \ following is the most basic way to do this:\n\nfunction ajaxHandler() {\n\n\
    /* Test state of the request and handle response */\n\n}\n\nvar ajax = new XMLHttpRequest();\n\
    \najax.onreadystatechange = ajaxHandler;\n\najax.open(\"GET\", \"file.xml\");\n\
    \najax.send();\n\nThere are four steps to execute a typical Ajax request. First,\
    \ you need to create a new XMLHttpRequest instance; then, you will open a connection\
    \ using the open() method and, finally, send the request and process the response\
    \ from the server, if any.\n\nThe open() Method\n\nThe purpose of the open() method\
    \ basically is to set parameters and options for the request you want to perform.\
    \ The two parameters in our example—the request method and URL—are mandatory.\
    \ Other optional parameters should be passed as follows:\n\najax.open( *method,\
    \ url, async, login, password*);\n\nThe async parameter lets you specify whether\
    \ the request should be run\n\nasynchronously. If this is set to false, the engine\
    \ will complete the request before executing any other script. The default value\
    \ is true, which is your best choice for most requests, because a synchronous\
    \ request can often give the impression that the web application has frozen.\n\
    \nThe two other parameters will let you pass a user name and password if needed\
    \ to\n\naccess the server pointed to in the url parameter.\n\nThe browser should\
    \ check for the validity of the request. For instance, if the method is either\
    \ CONNECT, TRACE, or TRACK, a SECURITY_ERR exception will be raised.\n\nSending\
    \ Requests Using GET or POST\n\nThe differences between GET and POST requests\
    \ using the XMLHttpRequest object are the same as with regular HTML forms. POST\
    \ requests have the advantage that you can pass larger amounts of data, using\
    \ more diverse formats. Another appreciable characteristic of all POST requests\
    \ is that user agents shouldn’t resort to cached data to display content.\n\n\
    However, although passing data with a GET request is very straightforward—you\
    \ simply need to add a query string to the URL in the call to open()—passing data\
    \ when using the POST method is a different process. The data passed with the\
    \ request should be the CHAPTER 12: Ajax and Dynamic Content\n\nparameter to the\
    \ send() method, but first, you will have to tell the server that you are submitting\
    \ data with you request; this is done by setting a custom Content-Type header:\
    \ var data = \"firstname=John&lastname=Doe\";\n\n/* Pass data using GET... */\n\
    \najax.open(\"GET\", \"script.php?\" + data);\n\najax.send();\n\n/* ... or using\
    \ POST */\n\najax.open(\"POST\", \"script.php\");\n\najax.setRequestHeader(\"\
    Content-Type\", \"application/x-www-form-urlencoded\"); ajax.send(data);\n\nHandling\
    \ the Request State\n\nNaturally, you will need to define a function to process\
    \ whatever data you would gather from your request; in the previous example, this\
    \ function is called ajaxHandler(). In this example, we listen for the readystatechange\
    \ event attached to the XMLHttpRequest\n\nobject using the onreadystatechange\
    \ property. Be aware that this is called every time the request state changes,\
    \ which should be four times for each request. Of course, you could also use the\
    \ traditional addEventListener() method:\n\najax.addEventListener(\"readystatechange\"\
    , ajaxHandler, false);\n\nFrom the handler function, you can access the current\
    \ state using the readyState\n\nproperty. Table 12–1 presents the possible values.\n\
    \nTable 12–1\\. Possible States of the *XMLHttpRequest* *readystate* Attribute\
    \ **Constant Description**\n\n*ajax*.UNSENT (0)\n\nThe object has been constructed,\
    \ but nothing else has happened.\n\n*ajax*.OPENED (1)\n\nThe open() method has\
    \ been run successfully.\n\n*ajax*.HEADERS_RECEIVED (2)\n\nAll headers have been\
    \ received.\n\n*ajax*.LOADING (3)\n\nThe response from the server is being received\
    \ (in most cases, this\n\nmeans an external document is being loaded).\n\n*ajax*.DONE\
    \ (4)\n\n *Either all external data transfer has completed or an error has\n\n\
    occurred.\n\nWhen a new XMLHttpRequest object is instantiated, its readyState\
    \ property is set to UNSENT. This is changed to OPENED when the open() method\
    \ of the object has been\n\nsuccessfully called. Once headers have been received,\
    \ the property is set to\n\nHEADERS_RECEIVED, and the loading of the remote document\
    \ begins (LOADING). Once all operations of the request have completed, the state\
    \ is set to DONE.\n\nThe readyState property should be used to check that you\
    \ can safely use the data that you requested. For instance, you can abort the\
    \ request to prevent the response body 346\n\nCHAPTER 12: Ajax and Dynamic Content\n\
    \nfrom being loaded when the received content doesn’t come in the expected format.\
    \ This could be done by checking values for the response HTTP header using the\n\
    \ngetResponseHeader() method.\n\najax.onreadystatechange = ajaxhandler;\n\n...\n\
    \nfunction ajaxHandler() {\n\nif (this.readyState > this.HEADERS_RECEIVED) {\n\
    \nif (this.getResponseHeader(\"Content-Type\") != \"text/xml\") {\n\nthis.abort();\n\
    \n}\n\n}\n\n}\n\nThis will also save some bytes to load for the user. Note that\
    \ whatever happens during the process, the readyState property will end with the\
    \ value DONE.\n\nHandling Progress Events\n\nIn addition to the onreadystatechange\
    \ event, Mobile Safari supports many events\n\nspecific to the XMLHttpRequest\
    \ object Level 2\\. Table 12–2 lists these events with their use.\n\nTable 12–2\\\
    . Events Available for the *XMLHttpRequest* Object\n\n**Event Description**\n\n\
    onreadystatechange\n\nThe readyState has changed during the HTTP request.\n\n\
    loadstart\n\nThe request has begun.\n\nprogress\n\nThe data is being received.\
    \ This event can be sent several times\n\nfor one request, depending on the time\
    \ the request takes to\n\ncomplete.\n\nload\n\nThe request has completed successfully.\n\
    \nabort\n\nThe request was interrupted, for instance through the abort()\n\nmethod.\n\
    \nerror\n\nAn error has occurred during the request; for instance, an attempt\n\
    \nwas made to send a cross-origin request, if the remote page was\n\nnot found\
    \ (HTTP 404).\n\nAll these events, except the onreadystatechange event, return\
    \ an\n\nXMLHttpRequestProgressEvent object that will let you provide feedback\
    \ to the user while data is being downloaded.\n\nYou can see whether the download\
    \ time is computable from the lengthComputable\n\nproperty and then evaluate the\
    \ loading time with the loaded and total properties.\n\nCHAPTER 12: Ajax and Dynamic\
    \ Content\n\najax.addEventListener(\"progress\", progressHandler, false);\n\n\
    function progressHandler(e) {\n\nif (e.lengthComputable && e.total != 0) {\n\n\
    var progress = 100 * e.loaded / e.total;\n\n/* Do something with progress value\
    \ */\n\n} else {\n\n/* Not supported or not computable, do something else... */\n\
    \n}\n\n}\n\nThe progress is computable in most cases; still, you should always\
    \ build an alternative in case it is not—as planned for in the previous example.\n\
    \nChecking the Response\n\nHowever, this is not enough to be sure the data is\
    \ really available, because it only indicates the state of the request. You should\
    \ also check the status property available after the headers have been received.\
    \ This property returns the HTTP status code 200 if the operation completed correctly\
    \ and an error code otherwise—generally 404, meaning the requested document could\
    \ not be found, or 500, if the server returns a fatal error.\n\nNote that redirection\
    \ (for instance, codes 301 or 302) is automatically handled, so you will not have\
    \ to worry about that.\n\nThere are also two cases when the HTTP status code is\
    \ set to the specific value 0: when an unauthorized cross-origin request is attempted\
    \ or when the request is performed\n\n[from a file with the file:// URL scheme.](file://URL)\n\
    \nOnce these verifications have been made, you will want to gather the data returned\
    \ by the server. This comes in either of two formats: an XML document or plain-text\
    \ content.\n\nDepending on the format, it will be stored in the responseXML or\
    \ in the responseText properties of the XMLHttpRequest instance.\n\nGathering\
    \ data through an HTTP request, especially on mobile devices, is prone to return\
    \ errors. Therefore, you should check the state of your requests at all of these\
    \ stages. This can be done by adding verifications to the ajaxHandler() function.\
    \ Because the send() method can be called only if the readyState value is set\
    \ to OPENED, we will also move it inside a conditional statement.\n\nfunction\
    \ ajaxHandler() {\n\nswitch (this.readyState) {\n\n/* When possible, send the\
    \ request */\n\ncase this.OPENED:\n\nthis.send();\n\nbreak;\n\n/* Test if the\
    \ loading process has end */\n\ncase this.DONE:\n\nif (this.status != 200) {\n\
    \nconsole.log(\"An error occurred.\");\n\n} else {\n\n/* Code to run if the response\
    \ body is in XML format */\n\nCHAPTER 12: Ajax and Dynamic Content\n\nif (this.responseXML)\
    \ {\n\nconsole.log(\"XML response received.\");\n\n/* Code to run if the body\
    \ entity is of another format */\n\n} else if (this.responseText) {\n\nconsole.log((\"\
    Plain text response received.\");\n\n} else {\n\nconsole.log(\"No data received.\"\
    );\n\n}\n\n}\n\nbreak;\n\n}\n\n}\n\nProcessing this way, the document will be\
    \ accepted only if the response appears to be valid. Because the responseXML property\
    \ is a Document object, you will be able to traverse it as you would an HTML document.\
    \ The responseText property, on the other side, can be processed in various ways.\n\
    \nHandling Return Formats\n\nThree main options are available to you for the format\
    \ of the information you load using Ajax: XML, JSON and HTML. Every format has\
    \ its fervent advocates, but it ultimately comes down to how you need to gather\
    \ data and what you need to do with it. The fact that XML actually is the *X*\
    \ in Ajax shouldn’t misguide you, because this is only for historical reasons.\n\
    \nNOTE: The responseText property can hold any other text data, such as SRT subtitles\
    \ that we have used in Chapter 8\\. These could be processed in a similar way\
    \ to dynamically add subtitles to a video.\n\nMost Common Return Formats\n\nThe\
    \ most obvious and straightforward solution to simply display data on the page\
    \ from the perspective of the front-end developer probably is to gather already\
    \ formatted HTML\n\nfrom the server, because such data will seamlessly integrate\
    \ into the destination page, will be directly rendered by the browser without\
    \ any kind of parsing and will be easily styled with CSS.\n\n<!-- publications.html\
    \ -->\n\n<ul id=\"books\">\n\n<li>\n\n<em>Oliver Twist</em>\n\n<span><b>DICKENS</b>,\
    \ Charles</span>\n\n<span>1838</span>\n\n</li>\n\n<li>\n\n<em>The Picture of Dorian\
    \ Gray</em>\n\n<span><b>WILDE</b>, Oscar</span>\n\nCHAPTER 12: Ajax and Dynamic\
    \ Content\n\n<span>1890</span>\n\n</li>\n\n</ul>\n\nYou can simply inject this\
    \ snippet into your document as it is, using the innerHTML\n\nproperty, as shown\
    \ here:\n\n<section id=\"publications\"></section>\n\n<script>\n\nvar ajax = new\
    \ XMLHttpRequest();\n\najax.onreadystatechange = ajaxHandler;\n\najax.open(\"\
    GET\", \"publications.html\");\n\najax.send();\n\nfunction ajaxHandler() {\n\n\
    if (this.readyState == this.DONE && this.status == 200) {\n\ndocument.getElementById(\"\
    publications\").innerHTML = this.responseText;\n\n}\n\n}\n\n</script>\n\nHowever,\
    \ requesting HTML from the server will typically be less flexible, primarily because\
    \ the back-end developer may not be the same person as the front-end\n\ndeveloper\
    \ but also because, unlike the two other formats, the descriptive nature of HTML\
    \ is rather loose.\n\nParsing XML for Use in HTML Documents\n\nThe XML alternative\
    \ is the most verbose option, not only because its formatting is based on tags\
    \ but also because processing it requires a lot of code. When receiving a\n\n\
    response in XML format, you can either convert the data to HTML to insert into\
    \ your page by parsing the XML with JavaScript or develop specific style sheets\
    \ to convert the XML to HTML using XSLT. Both solutions are pretty heavy to set\
    \ up. Here is a sample XML file and two examples of how it can be rendered to\
    \ look like the HTML shown\n\nearlier:\n\n<?xml version=\"1.0\" encoding=\"utf-8\"\
    \ ?>\n\n<!-- publications.xml -->\n\n<publications>\n\n<books>\n\n<book title=\"\
    Oliver Twist\">\n\n<author>\n\n<lastname>DICKENS</lastname>\n\n<firstname>Charles</firstname>\n\
    \n</author>\n\n<year>1838</year>\n\n</book>\n\n<book title=\"The Picture of Dorian\
    \ Gray\">\n\n<author>\n\n<lastname>WILDE</lastname>\n\n<firstname>Oscar</firstname>\n\
    \n</author>\n\nCHAPTER 12: Ajax and Dynamic Content\n\n<year>1890</year>\n\n</book>\n\
    \n</books>\n\n</publications>\n\nParsing the DOM with JavaScript\n\nThe fol owing\
    \ is the ajaxHandler() function, which uses the W3C Selectors API Level 1\n\n\
    to parse the XML code and store it in the html variable after transformation:\n\
    \n...\n\najax.open(\"GET\", \"publications. **xml**\");\n\n...\n\nfunction ajaxHandler()\
    \ {\n\nif (!(this.readyState == this.DONE && this.status == 200)) {\n\nreturn;\n\
    \n}\n\nvar input = this.responseXML.documentElement;\n\nvar books = input.querySelectorAll(\"\
    books book\");\n\nvar html = '<ul id=\"books\">';\n\nfor (var i = 0; i < books.length;\
    \ i++) {\n\nhtml += \"<li>\" +\n\n\"<em>\" + books[i].getAttribute(\"title\")\
    \ + \"</em>\\n\" +\n\n\"<span><b>\" + books[i].querySelector(\"author lastname\"\
    ).textContent + \"</b>, \" +\n\nbooks[i].querySelector(\"author firstname\").textContent\
    \ +\n\n\"</span>\\n\" +\n\n\"<span>\" + books[i].getElementsByTagName(\"year\"\
    )[0].textContent + \"</span>\";\n\n}\n\nhtml += \"</ul>\";\n\ndocument.getElementById(\"\
    publications\").innerHTML = html;\n\n}\n\nDownload from Wow! eBook <www.wowebook.com>\n\
    \nAs with our HTML example, the markup held in the html variable is then inserted\
    \ into the HTML document with the innerHTML property. This method of course is\
    \ heavier to\n\nprocess, because the HTML markup is generated directly on the\
    \ client.\n\nUsing XML Style Sheet Transformations\n\nOur second alternative is\
    \ to parse the XML with XLST. XLST is supported by Mobile Safari 2.0 and newer,\
    \ so you can confidently use it to process XML. It is a very\n\nappropriate language\
    \ to convert XML into HTML, and it is extremely powerful because it uses XPath\
    \ to gather information from nodes.\n\nYou’d start by creating a new document\
    \ named *publications.xsl*, with the fol owing code:\n\n<?xml version=\"1.0\"\
    \ encoding=\"utf-8\" ?>\n\n<xsl:stylesheet version=\"1.0\" xmlns:xsl=\" [http://www.w3.org/1999/XSL/Transform\"\
    ](http://www.w3.org/1999/XSL/Transform) >\n\n<xsl:template match=\"/\">\n\n<ul\
    \ id=\"books\">\n\n<xsl:for-each select=\"//books/book\">\n\n<li>\n\nCHAPTER 12:\
    \ Ajax and Dynamic Content\n\n<em><xsl:value-of select=\"@title\" /></em>\n\n\
    <span><b><xsl:value-of select=\"author/lastname\" /></b>,\n\n<xsl:value-of select=\"\
    author/firstname\" /></span>\n\n<span><xsl:value-of select=\"year\" /></span>\n\
    \n</li>\n\n</xsl:for-each>\n\n</ul>\n\n<xsl:template>\n\n</xsl:stylesheet>\n\n\
    To use this style sheet, you would need to call the file from your XML as follows:\n\
    \n<?xml version=\"1.0\" encoding=\"utf-8\" ?>\n\n**<?xml-stylesheet type=\"text/xsl\"\
    \ href=\"publications.xsl\" ?>**\n\n...\n\nUnfortunately, doing this from an XML\
    \ HTTP request, the XLST style sheet will simply not be downloaded—and thus not\
    \ be applied. Therefore, we need to parse the XML\n\ndocument to check for style\
    \ sheets and download any that are found.\n\nfunction findStylesheet(xml) {\n\n\
    var nodes = xml.childNodes;\n\nfor (var i = 0; i < nodes.length; i++) {\n\nif\
    \ (nodes[i].nodeType == xml.PROCESSING_INSTRUCTION_NODE &&\n\nnodes[i].nodeName\
    \ == \"xml-stylesheet\") {\n\nreturn /href=\"(.+?)\"/.exec(nodes[i].nodeValue)[1];\n\
    \n}\n\n}\n\n}\n\nOf course, we also need to modify our response handler, because\
    \ it now needs to\n\ntrigger the download of another file:\n\nfunction ajaxHandler()\
    \ {\n\nif (this.readyState == this.DONE && this.status == 200) {\n\nvar xml =\
    \ this.responseXML;\n\nvar fss = findStylesheet(xml);\n\n/* Send a request for\
    \ the stylesheet */\n\nvar xsl = new XMLHttpRequest();\n\nxsl.onreadystatechange\
    \ = function() {\n\nif (this.readyState == this.DONE && this.status == 200) {\n\
    \nvar processor = new XSLTProcessor();\n\nprocessor.importStylesheet(this.responseXML);\n\
    \nvar doc = processor.transformToFragment(xml, document);\n\ndocument.getElementById(\"\
    publications\").appendChild(doc);\n\n}\n\n}\n\nxsl.open(\"GET\", fss);\n\nxsl.send();\n\
    \n}\n\n}\n\nWe use the transformToFragment() method of the XSLTProcessor object,\
    \ which takes an XML object and the document that will hold the fragment as parameters,\
    \ to apply our style sheet. Because the doc variable then holds a document fragment\
    \ instead of a string, we can insert it using the appendChild() method.\n\nCHAPTER\
    \ 12: Ajax and Dynamic Content\n\nAlthough this method is rich and useful, it\
    \ is not very flexible, because you will need to check for errors on two HTTP\
    \ requests. A more flexible process would be to convert the data into HTML on\
    \ the server.\n\nSpecificities When Parsing JSON\n\nParsing JSON-formatted data\
    \ with JavaScript, as one can imagine when comparing it to the previous examples,\
    \ is very similar to parsing XML. However, you will have noticed the close connection\
    \ between JSON notation and JavaScript syntax.\n\n{\n\n\"publications\": {\n\n\
    \"books\": [\n\n{ \"title\": \"Oliver Twist\",\n\n\"author\": { \"lastname\":\
    \ \"DICKENS\", \"firstname\": \"Charles\" },\n\n\"year\": \"1838\"\n\n},\n\n{\
    \ \"title\": \"The Picture of Dorian Gray\",\n\n\"author\": { \"lastname\": \"\
    WILDE\", \"firstname\": \"Oscar\" },\n\n\"year\": \"1890\"\n\n}\n\n]\n\n}\n\n\
    }\n\nJSON stands for JavaScript Object Notation and can be transformed into a\
    \ proper\n\nJavaScript object using the native eval() function. This means that\
    \ following the same path as with our XML parsing script, our code would look\
    \ like this:\n\n...\n\najax.open(\"GET\", \"publications. **json**\");\n\n...\n\
    \nfunction ajaxHandler() {\n\nif (!(this.readyState == this.DONE && this.status\
    \ == 200)) {\n\nreturn;\n\n}\n\nvar json = eval ('(' + this.responseText + ')');\n\
    \nvar books = json.publications.books;\n\nvar html = '<ul id=\"books\">';\n\n\
    for (var i = 0; i < books.length; i++) {\n\nhtml += \"<li>\" +\n\n\"<em>\" + books[i].title\
    \ + \"</em>\\n\" +\n\n\"<span><b>\" + books[i].author.lastname + \"</b>, \" +\n\
    \nbooks[i].author.firstname +\n\n\"</span>\\n\" +\n\n\"<span>\" + books[i].year\
    \ + \"</span>\";\n\n}\n\nhtml += \"</ul>\";\n\ndocument.getElementById(\"publications\"\
    ).innerHTML = html;\n\n}\n\nCHAPTER 12: Ajax and Dynamic Content\n\nWhereas JSON\
    \ notation can be confusing to read with the multiple square and curly brackets,\
    \ the JavaScript code to parse it is made clear by the common roots of JSON\n\n\
    and JavaScript. This doubles the advantage it has over XML for file sizes. Be\
    \ careful not to forget the parentheses around the JSON literal, which are mandatory\
    \ to avoid the object literal being confused with a block.\n\nJSON Security Considerations\n\
    \nYet, because JSON closely resembles JavaScript, you must be careful with the\
    \ code you evaluate, because actual scripts within JSON data would, of course,\
    \ be run.\n\nHowever, because the syntax for JSON is a stricter version of JavaScript\
    \ literal notation, you can quite easily eliminate most security risks by checking\
    \ the format of the code you receive against the one you expect using regular\
    \ expressions. Unquoted, only a bunch of expressions are allowed in JSON format\
    \ (among which are numbers, boolean, and\n\nnull); therefore, you can easily isolate\
    \ what isn’t acceptable data. Properties and values need to be wrapped in quotes,\
    \ and quotes inside these should be escaped. This means you can easily build a\
    \ reusable function to check the JSON data you receive.\n\nThe following validation\
    \ script is based on that of the MooTools compact JavaScript framework:\n\nfunction\
    \ getJSON(s) {\n\nvar check = s.replace(/\\\\./g, '').replace(/\"[^\"\\\\]*\"\
    /g, '');\n\nvar regexp = /^[,:{}\\[\\]\\s\\d\\.\\-+eEfalr-un]*$/;\n\nif (regexp.test(check))\
    \ {\n\ntry {\n\nreturn eval('(' + s + ')');\n\n} catch(e) {\n\n/* Ignore */\n\n\
    }\n\n}\n\nreturn null;\n\n}\n\nfunction ajaxHandler() {\n\n...\n\nvar json = **getJSON(**this.responseText**)**;\n\
    \n...\n\n}\n\nThe first line of this function removes all escape characters and\
    \ then all quoted values.\n\nAt this stage, no backslash or quotation mark—which\
    \ could be used in a script injection attempt—should remain. On the resulting\
    \ “bare-bones” string, we use a regular\n\nexpression representing the normal\
    \ syntax of a JSON object in the test() method to check whether no unexpected\
    \ character remains; we then return the resulting object using eval(). Using this\
    \ small function, you can be pretty sure that no actual script is hiding within\
    \ the JSON data you receive and add the evaluated object to access its data.\n\
    \nCHAPTER 12: Ajax and Dynamic Content\n\nClient-Side Rendering Using Returned\
    \ Data\n\nWhen handling sensitive data from your own site, it is quite obvious\
    \ that most rendering should be done on the server. However, when handling highly\
    \ dynamic content or when the data you need to render your page comes as a feed\
    \ or more generally from external sites, it can be useful to operate the rendering\
    \ on the client. For such purposes, the easiest format, as mentioned earlier,\
    \ is JSON, because its manipulation with JavaScript is very straightforward.\n\
    \nHandling Template Variables\n\nA popular way to handle JSON is to build a template\
    \ available to a script that will identify specific keywords to be replaced by\
    \ dynamic content, using the global RegExp object. A similar system is used in\
    \ the Prototype JavaScript library. A template could look something like this:\n\
    \nvar template = \"<h2>#{title}</h2><p>#{content}</p>\"; This template could be\
    \ populated using data in the following form:\n\nvar json = { \"title\": \"Some\
    \ title\", \"content\": \"Some cool content coming...\" }; Here is the function\
    \ to apply the relevant modifications:\n\nfunction applyTemplate(template, data)\
    \ {\n\nvar item, regexp = /#\\{(\\w+)\\}/g;\n\nvar index = 0;\n\nwhile (item =\
    \ regexp.exec(template)) {\n\nvar pattern = new RegExp(item[0], \"g\");\n\ntemplate\
    \ = template.replace(pattern, data[item[1]]);\n\nvar last = regexp.lastIndex;\n\
    \nregexp.lastIndex = index;\n\nindex = last;\n\n}\n\nreturn template;\n\n}\n\n\
    var formatted = applyTemplate(template, json);\n\nconsole.log(formatted);\n\n\
    **--- result ---**\n\n> <h2>Some title</h2><p>Some cool content coming...</p>\
    \ Using the global search identifier g, our regular expression searches the whole\n\
    \ndocument for all substrings beginning with #{, ending with }, and holding one\
    \ or more word characters (represented by \\w). The exec() method of the RegExp\
    \ object returns an array whose first entry is the string found; we use this string\
    \ to perform a new regular expression search on the template and replace it with\
    \ the relevant data from the json variable. The subsequent entries list the captured\
    \ patterns.\n\nCHAPTER 12: Ajax and Dynamic Content\n\nThe lastIndex property\
    \ stores the index position of the last occurrence found in the template to know\
    \ where to continue the search from; in order not to miss any\n\noccurrences,\
    \ we change the value of lastIndex to the previous search position using the index\
    \ variable, which is then used as a starting point for the next exec() call. This\
    \ prevents errors because of changes to the template length after a replacement\
    \ has taken place but could also be used to apply recursive changes to the template.\n\
    \nFormatting Variables\n\nReplacing a template item by some value is useful but\
    \ sometimes isn’t enough. Because JSON doesn’t have specific date formats, you\
    \ could typically want to format date\n\nelements before displaying them. To illustrate\
    \ how this can be done, we are going to build a formatter that will be called\
    \ when necessary to transform timestamps. The following is our modified template\
    \ and JSON object:\n\nvar template = \"<h2>#{title}</h2><p>#{content}</p> **\\\
    n<time>#{dateFormatted}</time>** \"; var json = {\n\n\"title\": \"Some title\"\
    ,\n\n\"content\": \"Some cool content coming...\" **,**\n\n**timestamp: 207698400000**\
    \ **/* Aug 1st, 1976 */**\n\n}\n\nfunction applyTemplate(template, data**, formatters**)\
    \ {\n\n...\n\nvar value = undefined;\n\nif (item[1].substr(-9) == \"Formatted\"\
    ) {\n\nvar property = item[1].substr(0, item[1].length - 9);\n\nvar func = formatters[property];\n\
    \nif (typeof func == \"function\") {\n\nvalue = func(data[property], data);\n\n\
    }\n\n} else {\n\nvalue = data[item[1]];\n\n}\n\ntemplate = template.replace(pattern,\
    \ **value**);\n\n...\n\n}\n\nfunction formatDate(value, data) {\n\nvar date =\
    \ new Date(data.timestamp);\n\nreturn date.getFullYear();\n\n}\n\nvar formatters\
    \ = { \"date\": formatDate };\n\nvar formatted = applyTemplate(template, json**,\
    \ formatters**);\n\nconsole.log(formatted);\n\n**--- result ---**\n\n> <h2>Some\
    \ title</h2><p>Some cool content coming...</p>\n\n<time>1976</time>\n\nCHAPTER\
    \ 12: Ajax and Dynamic Content\n\nThe formatters properties don’t necessarily\
    \ have to match a property from the JSON\n\nobject; in such a case, value will\
    \ be set to undefined. Otherwise, it will hold the value of the corresponding\
    \ JSON property to make its formatting easier. Whatever the case, the data parameter\
    \ will hold all the data required to build complex schemes, taking several properties\
    \ into account.\n\nCross-Origin Communication\n\nThe most frustrating part of\
    \ Ajax probably is the same-origin restriction, which notably prevents accessing\
    \ content from another domain name. Although it unfortunately isn’t possible to\
    \ use the domain property of the Document object, as done in Chapter 11, to bypass\
    \ this restriction, several workarounds are available to you.\n\nUsing Proxies\n\
    \nTo perform a cross-origin XMLHttpRequest, you can send the request to a proxy.\
    \ A proxy is a server used as an intermediate between a client and another server.\
    \ The advantage of such a process for cross-site communication is that servers,\
    \ unlike the Ajax request, will not be limited by the same-origin rule. Thus,\
    \ rather than querying a distant site—\n\nwhich would return an error—you would\
    \ let your own server do the work, simply passing it the relevant data for your\
    \ query:\n\najax.open(\"GET\", \"proxy.php?url=\" +\n\n[encodeURIComponent(\"\
    http://www.example2.local/file.xml\"));](http://www.example2.local/file.xml)\n\
    \nIn this example, the request is initiated from [www.example1.local and needs\
    \ data from](http://www.example1.local)\n\n[www.example2.local.](http://www.example2.local)\
    \ To create the *proxy.php* script, we are going to use PHP together with the\
    \ cURL API, which is widely available, solid, and rather easy to understand and\
    \ use.\n\n<?php\n\nif ($url = $_GET['url']) {"
