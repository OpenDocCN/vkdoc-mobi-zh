- fmt: '# User Experience and Interface Guidelines


    The fact is, there are chances you may not be developing for mobile devices with
    much larger dimensions in mind. Although screen resolutions may enhance the experience
    for the user, screen sizes, if devices are to remain mobile, are unlikely to get
    any larger. The iPad is a quite different experience. Although it has a larger
    screen, it shouldn’t be considered as a new kind of laptop, and although it definitely
    shouldn’t be considered as a larger iPod touch, the following applies to iPad
    development too: always be extremely careful that all your text content is readable.
    Small fonts on a wide screen annoy many people—on a mobile device screen, it can
    completely put your user off.


    Of course, one solution is to offer the ability to increase or decrease font size
    (Figure 5–7). However, ultimately, the best technique is to test your fonts on
    a device, being honest as to the accurateness of your own eyesight. Create icons
    with the same limitations in mind. When you make an area efficiently tappable
    by its size, remember the purpose of an icon is to express an action, a shortcut,
    or a link faster and more universally than text. This is extra true on mobile
    devices.


    **Figure 5–7.** The `Twitterific` application offers a button in the navigation
    bar to change text size.


    ## Avoid Unnecessary Interaction


    We’ve stressed that the experience for the user should be as fluid as possible.
    Whereas filling in forms on the traditional Web can discourage users from going
    further, on the mobile Web, it can quickly become a chore. In all cases, you should
    prefer radio buttons, check boxes, or drop-down options to text fields, because
    typing on an iPhone can be difficult depending on circumstances. The same guideline
    should be followed concerning the iPad; Apple recommends making iPad applications
    entirely usable with one hand only, while using two hands should bring extra comfort
    and speed to access functionality.


    ## Make Use of New Input Types Capabilities


    Nowadays, forms are part of a web user’s everyday life. People are used to filling
    in forms and think about it less and less. Therefore, they may be less patient
    and have higher standards regarding aesthetics and usability. This is especially
    true on mobile devices, where browsing conditions tend to make users impatient
    and where input processes can be difficult.


    HTML5 introduces a number of new input types to address these issues, which are
    backward compatible. Table 5–1 lists the types supported by Mobile Safari.


    **Table 5–1.** New Input Types Supported in Mobile Safari


    | Type | Description |

    |------|-------------|

    | `tel` | A phone number (usually a set of numeric characters) |

    | `search` | A search field |

    | `url` | An absolute URL |

    | `email` | One or several valid e-mail addresses |

    | `number` | A numerical value |


    The core idea is that the browser should be able to supply an interface for the
    user and submit the format to the developer when handling forms. Mobile Safari
    brings a contextual keyboard for user submission with these input types. For example,
    tapping a `tel` type input will trigger a numerical keyboard, as shown on Figure
    5–8.


    **Figure 5–8.** All the supported keyboards


    Such features can obviously make the user experience better by requiring fewer
    actions for a seamless interaction. The iPhone, up to version 2.0, provided similar
    functionality to some extent, by automatically firing a numeric keyboard for input
    elements named `zip` or `phone`. However, this feature was dropped in iOS 2.0
    and was not available until version 3.1 began to support these new types.


    ## Ponder Upon User-Supplied Information


    Although user input can be made easier, always ask yourself whether you really
    need the information you plan to ask for, or in other words, if it will be a primary
    concern for the end user. If your application returns a list of books depending
    on various criteria, it seems secondary to ask whether hardback products, a specific
    editor, or any year of publication are preferred. In such a case, the best would
    be to break queries into stages, as done by Amazon (Figure 5–9). First, search
    by title, author, or topic—ideally, this requires only one text field, leaving
    the server-side script to determine which is relevant. Then, offer to filter results,
    for instance by date, editor, or cover type. Finally, you can let your user classify
    the last results, let’s say by price or availability in book stores.


    **Figure 5–9.** Amazon doesn’t load the search area with filters. Instead, it
    delays filtering to the result page.


    Another way to speed up such an application is to keep track of user input. Here,
    it is likely that your loyal user will mostly be looking for books from the same
    publishers. You can store the user’s choices using traditional cookies or HTML5’s
    latest client-side storage tricks that we will be using in Chapter 15. This way,
    whenever the user comes back to your web application, the user will be grateful
    for not having to type `Mephistofeles’s Antique Bookshelf Treasures` again.


    The key principle behind user input is that for whatever information you ask for,
    you should give as much extra functionality in return. Of course, gathering information
    about your user can greatly improve the quality of the service you are providing.
    The point is to make the “greatly” as great as possible relative to the “gather.”


    ## Avoid Multiplying Steps


    In the previous example, the user goes through three steps—filter, search, and
    sort—of which only the first is required. As we have stated earlier, the functionality
    the user came to find should be available as soon as possible, through a straightforward
    process. Cutting the book search application into three separate pages only to
    lighten up each stage—as is often seen with traditional Web, for example in account
    creation forms—wouldn’t be appropriate here. The benefits of such a decision—less
    panning, less clutter—would be hindered by the fact that the user is forced to
    wait, perhaps without even knowing how long the process will take or which step
    is next. Also, for the developer, it is a risky bet to consider that the network
    will be efficient three times in a row.


    ## The Spirit: Be Focused


    The iPhone is not a computer, nor is the iPad. Don’t expect users to handle them
    as such, and don’t develop your web applications with computer applications in
    mind. An iOS application should focus on bringing a specific and satisfying solution
    to a particular demand or problem and should focus almost only on providing what
    is expected in the most straightforward manner. The viewport holding your web
    app should therefore be a place holding selected elements that behave as a whole
    and a place that is uncluttered, discrete, and clear, as with the Clock application
    (Figure 5–10).


    Although this may originate in hardware limitations—slow rendering under heavy
    activity, limited screen estate—it has become an expectation of the user, whose
    loyalty will reward you for providing the appropriate answer to the user’s primary
    question. This becomes true for the iPad also, at least by inheritance, so, always
    focus on bringing one appropriate service rather than several approximate ones.


    **Figure 5–10.** The Clock application focuses on what is expected: time services.


    ## Make Things Responsive'
