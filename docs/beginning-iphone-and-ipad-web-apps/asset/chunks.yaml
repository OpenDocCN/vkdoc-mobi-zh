    **丹尼尔·帕特森** 拥有比较文学硕士学位，撰写过一篇关于将文学理论融入虚构作品的回忆录，以安伯托·艾柯、米兰·昆德拉和戴维·洛奇的小说为例。大学毕业后，丹尼尔进入
