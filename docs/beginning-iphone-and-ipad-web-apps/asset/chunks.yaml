    **.header-wrapper {**


    **background-color: rgba(0,0,0,0.65);**


    **position: absolute;**


    **top: 0;**


    **width: 100%;**


    **}**


    **.view { height: 100%; }**


    **#map { min-height: 100%; }**


    **</style>**


    </head>


    CHAPTER 14: Location-Aware Web Applications


    Now, we can call the Google Maps API to render the map inside our container. The


    sensor parameter tells the API if the device has location functionality; we set
    this to true.


    <head>


    ...


    </style>


    [**<script src="http://maps.google.com/maps/api/js?sensor=true"></script>**](http://maps.google.com/maps/api/js?sensor=true)


