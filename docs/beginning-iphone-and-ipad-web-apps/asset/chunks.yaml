    \ will be listed in the sidebar.\n\n![](index-73_1.jpg)\n![](index-73_2.jpg)\n\
    \n**Figure 3–18.** Two breakpoints are placed on the line gutter; the debugger\
    \ stops on the second one\n\nYou can also fine-tune your script watching with\
    \ conditional breakpoints. If you want to know what a variable value is if it\
