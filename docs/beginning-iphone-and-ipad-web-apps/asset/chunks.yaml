    允许您在 JavaScript 代码中操作当前元素。因此，每个元素都拥有其自身以及继承的属性。例如，一个 `<h1>` 标签就是一个 DOM 的 `HTMLHeadingElement`
    实例，它具备 `HTMLHeadingElement` 属性，同时还继承了 `HTMLElement` 对象的属性和方法，并以此类推，直至继承 `Object`
    对象的属性。


    在“属性”面板中，各个可折叠的分类以字母顺序列出了当前选中对象的所有属性和方法（如图 3–12 所示）。当然，DOM 元素并非只有固定的属性值。例如，`innerHTML`
    属性会根据其所在的页面而变化；“属性”面板会列出检查时所有这些变量值。


    ![](img/index-64_1.jpg)

    ![](img/index-64_2.jpg)


    图 3–12. 属性面板


    了解这些内容在编辑 HTML 或 CSS 时可能用处不大，但在编写 JavaScript 时却至关重要。它为您提供了丰富的信息，供您构建或在此基础上开发，充分展现
    DOM 所拥有的动态潜力。我们之所以说“构建”和“在此基础上开发”，是因为在使用 JavaScript 编写脚本时，您很可能需要为元素添加属性。当您键入或执行脚本时，“属性”面板会随之更新，因此您始终可以获取文档和对象状态的实时快照。


    ## 事件监听器


    通过检查器完整洞察 DOM 的最后一个技巧，恰恰是查看页面中对象可能发生变化的位置。现在，切换到最后一个侧边面板“事件监听器”（如图 3–13 所示），您就能看到是否有任何
    JavaScript 事件（如 `click` 或 `load` 事件）附加到了该元素上。


    ![](img/index-65_1.jpg)


    图 3–13. 事件监听器面板，显示监听器的层级结构


    事件按类型分组，每个事件都可以展开，以查看按其调用顺序排列的相关函数。例如，这可以让您了解监听器为何可能从未被调用——因为有可能从某个监听器中停止了事件传播。它还能让您发现由于基于匿名函数的监听器意外堆叠而导致的内存泄漏，这类泄漏比常规监听器更难阻止。


    当您想知道某个元素是否与脚本相关时，获取已附加事件的节点列表十分有用。但尤其有用的是，它提供了一份所有动态元素的列表，这是一种检查 DOM 的新方式，有助于排查
    JavaScript 冲突等错误根源。


    ## 高级搜索


    除了文档树的可折叠表示以及允许您直接在元素显示位置进行选择的放大镜工具之外，在检查 HTML 文档时，您还可以使用另一个更高级的工具。


    它就是 Web 检查器窗口右上角的搜索字段。我们现在才介绍这个工具，是因为它最巧妙的用途与 HTML 搜索相关；但搜索字段在调试工具中始终可用，并且会返回与您当前查看内容相关的结果。


    您可以使用高级选项来搜索 HTML 标记。如果搜索返回任何结果，项目数量将显示在搜索字段的左侧，如图 3–14 所示。所有匹配项都会在文档树中高亮显示，并且第一个匹配项将被选中。


    ![](img/index-65_1.jpg)


    图 3–14. 匹配数量显示在搜索字段的左侧


    最显而易见的搜索选项就是直接查找纯文本。搜索针对文档内容（区分大小写）以及标签和属性名称（不区分大小写）进行。虽然这对于大型或不熟悉的文档而言可能效率不高，但它至少易于理解和使用，并且由于结果清晰显示，总体而言应该会很有用。

    '
- fmt: '你可以使用 CSS 语法和选择器来查找文档中的标签。选择器是一种模式匹配规则，既能用于简单的标签定位搜索，也能用于复杂的上下文选择。这对前端开发人员来说自然很有吸引力，因为这应该是你熟悉的语言。但请注意：搜索标签名称将触发不区分大小写的搜索，但
    ID 和类名在搜索字段中与在 XHTML 文档中一样是区分大小写的。


    尽管我们将在后续章节中更深入地介绍选择器，但这里先给出一个简单的例子以作说明：


    **第 3 章：介绍开发者与调试工具**


    ```html

    <h1>A Big Title</h1>

    <p>

    <span>The strong and quick brown <strong>fox</strong>

    jumps over the lazy<strong>dog</strong>.</span>

    </p>

    ```


    如果你在此文档中对`*strong*`执行简单的文本搜索，将会找到三处匹配。当然，你可能预期找到五处，但搜索引擎识别出其中两处实际上是与开始标签对应的结束标签，因此只考虑了开始标签。这是最简单的情况。


    如果这个文档更大，你可能希望找到所有第二个`<strong>`标签，这些标签的祖先是一个紧随`<h1>`标题之后的`<p>`标签。是不是变得有点复杂了？


    这正是 CSS 选择器大显身手的地方。尝试在搜索字段中输入以下内容：


    ```

    h1 + p strong:nth-child(2)

    ```


    这对前端开发人员来说应该很熟悉。对于不太熟悉这类选择器的读者，需要记住的选择器并不多，因此绝对值得深入研究。


    最后，你还可以对文档执行 XPath 搜索。XPath 语言是专为在 XML 上执行搜索而设计的。HTML 与 XML 有许多相似之处。XPath 语法允许进行高级的结构化查询。应用于前面的示例，你的搜索查询如下：


    ```

    //h1/following-sibling::p//strong[2]

    ```


    关于 XPath，我们不想深入过多细节，只希望强调这两种方法各有优劣。例如，在我们的例子中，你应该注意到 CSS 选择器通过`+`号表达了`<p>`标签紧随标题之后，这在
    XPath 中无法翻译。另一方面，CSS 选择器无法执行反向搜索（查找以另一个元素为父元素的元素），而 XPath 则可以。


    **资源查看器**


    资源查看器以图形方式展示当前页面已下载的元素概览（见图 3-15）。你可以在左侧边栏的顶部区域选择两种图表之一：时间（Time）和大小（Size）。


    第一种视图是时间（Time），它显示了所有需要下载的元素的时间线，以及总的检索时间。浅色区域表示延迟期，即从发出请求到服务器发送响应之间经过的时间。深色区域给出了实际的下载时间。每种元素类型用不同的颜色表示，因此通过读取顶部图表栏中的图例可以轻松识别。你可以根据需求，使用
    Web Inspector 窗口顶部的按钮来筛选类别，并选择数据的排序标准。蓝色和红色的垂直线分别指示了`DOMContentLoaded`和`load`事件的触发时间，这有助于你理解页面的加载方式，并据此优化页面设计。


    ![](index-67_1.jpg)


    **第 3 章：介绍开发者与调试工具**


    图 3-15. 资源查看器


    第二种视图是大小（Size），它简单按重要性从大到小显示页面所有已下载元素的重量。带有两个区域的条形图仍然存在，以便于理解。在这里，第一个条表示实际传输文件的大小，而第二个条在使用
    HTTP 压缩时表示实际下载文件的大小。'
  raw: 'You can also use CSS syntax and selectors to find tags in your document. Selectors
    are pattern matching rules that allow both simple tag targeting searches and complex


    contextual selections. This of course is attractive to front-end developers, because
    it is a language you should know well. Just be careful—searching tag names will
    trigger a case-insensitive search, but IDs and class names are just as case sensitive
    in the search field as they are in an XHTML document.


    Although we will be covering selectors in more depth in the following chapters,
    here is a simple example, just to make things clear:


    CHAPTER 3: Introducing Developer and Debugging Tools


    <h1>A Big Title</h1>


    <p>


    <span>The strong and quick brown <strong>fox</strong>


    jumps over the lazy<strong>dog</strong>.</span>


    </p>


    If you perform a simple text search for *strong* on this document, three occurrences
    will be found. Of course, you could have expected five, but the search engine
    recognizes that two of the occurrences actually are closing tags that work with
    opening tags and so only consider the latter. This is the simplest case.


    If this document were larger, you might want to find all second <strong> tags
    that have as ancestor a <p> immediately following an <h1> heading. Getting somewhat
    trickier?


    This is typically where CSS selectors can be of great help. Try typing the following
    into the search field:


    h1 + p strong:nth-child(2)


    This should seem familiar to front-end developers. For readers less familiar with
    these kind of selectors, there are not so many selectors to remember, so it definitely
    is worth digging this.


    Finally, you have the option to perform XPath searches on your document. The XPath
    language was specifically designed to perform searches on XML. HTML shares many


    similarities with XML. The XPath syntax allows advanced structure queries. Applied
    to the former example, your search query would be as follows:


    //h1/following-sibling::p//strong[2]


    Without getting into too much detail about XPath, we simply want to stress that
    both methods have strengths and limitations. For instance, in our examples, you
    should notice that CSS selectors express the fact that the <p> tag immediately
    follows the heading with the + sign, which cannot be translated to XPath. On the
    other side, CSS


    selectors have no way to perform backward searches (find an element that has another
    element as parent), which XPath has.


    The Resources Viewer


    The Resources viewer gives a graphical overview of the elements downloaded for
    the current page (see Figure 3–15). You can choose between two graphs from the
    top area of the left sidebar: Time and Size.


    The first view, Time, shows the timeline for all elements that have to be downloaded,
    together with the total retrieval time. The light area represents the latency
    period, that is, the time elapsed from the moment the request is sent to the moment
    the server sends a response. The darker area gives the actual download time. Each
    element type is


    represented in a different color, so they are easily identified by reading the
    legend in the top graph bar. You can filter categories, depending on your needs,
    using the buttons at the top of the Web Inspector window, and you can choose by
    which criteria your data should be ordered. The blue and red vertical lines, respectively,
    indicate when the


    ![](index-67_1.jpg)


    CHAPTER 3: Introducing Developer and Debugging Tools


    DOMContentLoaded and load events are fired, which should help you understand how


    your page is loaded and from there optimize its design.


    Figure 3–15\. The Resources viewer


    The second view, Size, simply displays the weight of all the elements downloaded
    for your page ordered by importance, from the heaviest to the lightest. The graph
    bars with their two areas are still there to make things easier to understand.
    Here, the first bar represents the weight of the actually transferred file, while
    the second bar is relevant when HTTP Compress is used to represent the weight
    of the actually downloaded file.'
