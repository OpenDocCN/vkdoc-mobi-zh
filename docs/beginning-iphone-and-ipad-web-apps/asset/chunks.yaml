- fmt: '# Chapter 13: Using Touch and Gesture Events


    `wrap.addEventListener("bookPageMovedRight", function(e) {


    color -= 20; // New active color


    e.pages.left.style.backgroundColor = makeColor(color - 20);


    }, false);`


    What we do is simply increment and decrement the `color` variable and change the
    color of the opposite node appropriately depending on the direction. The listeners
    need to be added before the instantiation of the `PageView` object, or the `PageChanged`
    event will be sent before a listener is created to catch it. The event is sent
    from the constructor once the page view is initialized.


    ## Working with Precomputed Gestures


    To make the interpretation of classic iPhone gestures easier, Apple has added
    higher-level events that encapsulate `TouchEvent` and will let you focus only
    on these gestures.


    With `GestureEvent`, there is no `TouchList` data but only information relative
    to rotation and scale (pivot and pinch gestures).


    **NOTE:** The rotation and scale data are also available through the `TouchEvent`
    object. However, gesture events allow you to focus only on this information, whereas
    touch events will send constant updates because of the `touchmove` events, even
    if there is no actual gesture. You therefore have a choice between the two, knowing
    that `GestureEvent` is less resource hungry.


    The `scale` and `rotation` properties of the `GestureEvent` object will let you
    access the state of their respective gestures through `gesturestart`. They initially
    are set to `1` (scale) and `0` (rotation) when the `touchstart` event is sent,
    and then they change as the user moves fingers on the screen.


    **NOTE:** With iOS 3.0, the values for `scale` and `rotation` are fallacious with
    the `gestureend` if the event occurs immediately after a `gesturestart` event.
    In such a case, you would receive a `scale` at `0` and an incorrect angle for
    the rotation. If you want to use `gestureend`, always check that the returned
    values are consistent; you can, for instance, test whether a `gesturechange` event
    has been sent.


    These gestures require the use of two fingers. Thus, when the second finger reaches
    the screen surface, the `gesturestart` event is sent just before the `touchstart`
    event. Gesture events are always sent before the associated touch event. The same
    is therefore true when the user releases one of two fingers: the `gestureend`
    event is sent before the `touchend` event. Likewise, `gesturechange` is sent before
    `touchmove`.


    The following example illustrates the use of these events:


    ```html

    <!DOCTYPE html>

    <html>

    <head>

    <title>Gesture Demo</title>

    <meta name="viewport" content="width=device-width;

    initial-scale=1.0; maximum-scale=1.0; user-scalable=0;">

    <style>

    body { margin-top: 50% }

    div {

    margin:-125px auto 0;

    text-align: center;

    color: white;

    font: bold 20px/250px sans-serif;

    width: 250px;

    background: rgba(0,0,255,0.5);

    border: solid 1px blue;

    -webkit-border-radius: 32px;

    }

    </style>

    </head>

    <body>

    <div>SQUARE</div>

    <script>

    var div = document.getElementsByTagName("div")[0];

    div.addEventListener("gesturestart", startHandler, false);

    div.addEventListener("gesturechange", changeHandler, false);

    function startHandler(event) {

    if (event.target != event.currentTarget) {

    return;

    }

    var computed = window.getComputedStyle(event.target);

    event.target._originalMatrix =

    new WebKitCSSMatrix(computed.webkitTransform);

    }

    function changeHandler(event) {

    if (event.target != event.currentTarget) {

    return;

    }

    event.target.style.webkitTransform = event.target._originalMatrix

    .scale(event.scale).rotate(event.rotation);

    event.preventDefault();

    }

    </script>

    </body>

    </html>

    ```


    Unsurprisingly, we start by adding the appropriate handlers to catch events. As
    the `<div>` element holds a text node, if a finger passes over it, two events
    will be sent for the same gesture change: one for the main target and the other
    one for the content of the `<div>`. To avoid uselessly applying the same transformation
    twice, we filter the target to focus only on the main one.


    To make sure the transformation is applied on top of the current state of the
    object, the `startHandler()` function gathers the computed style of the target
    and stores it in the `_originalMatrix` property, which is dynamically added to
    the target node.


    From there, the new matrix can be calculated when the `gesturechange` event is
    sent, using the `scale()` method from the `CSSMatrix` object, and the rotation
    can be applied using `rotate()`. Because these methods don’t alter the original
    matrix, each new `gesturechange` event will entail a correct transformation of
    the scale and rotation values, which will change together with the movements of
    the fingers of the user within a gesture session.


    Finally, because the event can be canceled, to make sure the viewport doesn’t
    move when the user performs gestures, we use `preventDefault()` on the event.


    ## Create Your Own Gestures


    Using gesture events is rich and makes interpreting the classic iOS gestures much
    easier, because the value to apply is already computed. However, this can be limited,
    because only two predefined gestures are available.


    Interpreting gestures can quickly become a chore as soon as one wants to define
    each gesture independently. The popular swipe-to-delete gesture is rather simple
    to handle, because all you need to do is record the finger position between the
