    The Geolocation API


    The implementation for this API is based on a W3C specification. It allows you
    to determine the geographic position of the host device using the previously named


    sources and is very easy to start using. All the API methods are accessible with
    the navigator.geolocation object, and they let you easily request the user’s position,
    either once or repeatedly, tracking the user’s movement (if any).


    Privacy Considerations


    Granting access to such information about users without them knowing should always
    be controlled to some extent. To respect the end user’s privacy, iOS will always
    ask for a user’s permission before sending any information about their position,
    as in the Maps and Camera applications (see Figure 14–1).


    Figure 14–1\. All iPhone applications ask for the user’s authorization before
    sending location data Setup Considerations


    Before testing the API on your own device, make sure the location service is active.
    You will find it in the Settings application, under the General submenu. It would
    be even


    “cleaner” to reset previously granted geolocation request authorizations, to work
    on a tabula rasa, for instance. This is achieved by navigating to Settings General
    Reset Reset geolocation alerts.


