    Seriously Appy: Using Stand-Alone Mode


    Now that you have a web application that will just fit in the user’s device screen,
    you’d like your application to be truly used like an application. The good news
    is that not only do iOS users have the option to put a web page in their bookmarks,
    but they can also put shortcuts to web pages on their home screen as web clips.
    This makes the web


    application as quickly accessible as any native app, notably making it accessible
    with Spotlight. The user just has to select the “Add to home screen” option and
    choose a name for the shortcut. After that, tapping the new icon on the springboard
    will bring up your web application in Mobile Safari straightaway.


    Showcasing a Proper Icon


    The default icon that will be generated for the user’s home screen is a screenshot
    of your application, resized to fit the size of other icons on the page. Although
    a little gloss is added to make this more icon-like, the truth is it isn’t very
    attractive or very recognizable (see Figure 4–4). You want your end user to find
    your web app easily and recognize it at first glance, even in the middle of various
    other shortcuts.


    Figure 4–4\. The default icon built with web page screenshot...not very sexy


    To achieve this, you have to make your own icon for your web application. It’s
    best to make it a reminder of your application, be it by using the same colors,
    similar shapes, and so on. It will be used for any page that is turned into a
    web clip, just like a favicon in traditional web browsers, so you want something
    sexy. The easiest way to make iOS


    use your icon is to save it as *apple-touch-icon.png* format at the root of your
    site.


    Having your icon displayed in the springboard is good, but making it shine is
    better. The typical shine and drop shadows from the iPhone GUI will be automatically
    superimposed on your icon, so if you create an icon that is square and is large
    enough to display in a good quality, it will look just like a native icon to the
    user (see Figure 4–5).


    Icons on iPhone are 57 pixels wide, while the default iPad icon size is 72 pixels.
    Building icons to common sizes such as 128 or 256 pixels seems a rather good practice.
    Simply be careful not to add light effects yourself, which could interfere with
    the default effects added by the OS.


    ![](index-100_1.jpg)


    ![](index-100_2.jpg)


    CHAPTER 4: The Anatomy of a Web Application


    Figure 4–5\. Apress icon before and after styles are applied by the springboard


    Nevertheless, there are cases where the gloss just doesn’t fit in and cases where
    you want to make something slightly different. If you make an application listing
    places to see Eastern European naïve painters, you may want to have an icon that
    is rather flat-looking. Shiny curves would just look out of place. To prevent
    the OS from applying the full range of effects, simply rename your icon to *apple-touch-icon-precomposed.png*.


    You will still have rounded corners and a drop shadow, but the icon itself will
    remain unchanged (see Figure 4–6).


    Figure 4–6\. Icon using the “precomposed” option'
