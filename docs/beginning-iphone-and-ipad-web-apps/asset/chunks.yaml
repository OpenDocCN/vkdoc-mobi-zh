- fmt: "# CHAPTER 13: Using Touch and Gesture Events\n\nUp to the parent, to which\
    \ the listener is attached. This allows you to concentrate the handler treatment.\n\
    \n**Figure 13–6.** The swipe movement changes the text style\n\n## Improve Accuracy\n\
    \nAs you can see, implementing new gesture events is rather simple. Nonetheless,\
    \ accuracy strongly depends on the stroke initiated by the user and may dwindle\
    \ especially when dealing with diagonals. Diagonals will typically span over several\
    \ columns and rows, thus multiplying possible paths for a single stroke. An interesting\
    \ way to handle this would be to resort to regular expressions in the interpretation\
    \ phase to limit the number of successive comparisons required to determine what\
    \ the stroke was. This will speed your application up also because the regular\
    \ expressions engine is executed natively, unlike custom tests that will grow\
    \ more complicated as strokes grow more complex.\n\nAnother approach is to work\
    \ with directions rather than a grid, seeking to determine the orientation of\
    \ strokes rather than trying to position points. This method is used in many applications\
    \ such as Firefox’s FireGestures extension and has proven very accurate and efficient.\n\
    \n## Summary\n\nThe unique relationship established by touch between the user\
    \ and the device should be totally taken into account when developing your applications.\
    \ Not only can the correct use and handling of touches and gestures let you greatly\
    \ enhance user experience: with a bit of imagination, you can also bring new functionality\
    \ and make your applications stand out in the Web crowd.\n\nThis all requires\
    \ that you fully understand how these events work and how users are likely to\
    \ use their device and react to the interface of your applications. More than\
    \ ever, the best way to go further with touch and gesture events is to experience\
    \ your own applications and experiments.\n\n# CHAPTER 14: Location-Aware Web Applications\n\
    \nThe App Store offers a myriad of applications that bring users services based\
    \ on where they are at some particular moment, such as Where by uLocate, a multilocation-based\
    \ services aggregator, or Foursquare, which offers a new way to discover your\
    \ city.\n\nBy crossing information from growing spatial-related databases with\
    \ the approximate position of the user, you get to suggest the perfect place to\
    \ eat homemade chili con carne, customize the user experience by giving the impression\
    \ you actually know about the user, give the relevant afternoon’s weather, or\
    \ show a map with the appropriate directions to any address. Since its very first\
    \ release, the iPhone has featured ways to locate the user on a world map. Even\
    \ though it didn’t primarily ship with an Assisted Global Positioning System (A-GPS)\
    \ chip, it used a hybrid algorithm to determine its position: by synthesizing\
    \ data from triangulation—via cell towers, a method widely used in cell phones—and\
    \ using information gathered from the network through the Wi-Fi Positioning System\
    \ (WPS), it could return its location within reasonable time.\n\nTriangulation\
    \ became more efficient as the number of cell towers increased but never yielded\
    \ results with an accuracy better than 100 meters; deducing position from network\
    \ information could be very precise and fast but still depended on the network’s\
    \ density.\n\nThe solution was good in most cases, but there was still room for\
    \ improvement.\n\n> **NOTE:** Geolocation on all devices is pretty tough on the\
    \ battery’s life, so always keep this in mind, and use these features only when\
    \ required for the end user. For instance, prefer caching data rather than requesting\
    \ a new position on every page load.\n\nMoreover, the system in use made this\
    \ feature available only to native iPhone applications using the `Core Location`\
    \ API. iOS 3.0 brings the exciting possibility to access geographical data directly\
    \ with JavaScript, thanks to a new API accessible to Mobile Safari. This chapter\
    \ will get you going with this new, rich tool available to you.\n\n## The Geolocation\
    \ API\n\nThe implementation for this API is based on a W3C specification. It allows\
    \ you to determine the geographic position of the host device using the previously\
    \ named sources and is very easy to start using. All the API methods are accessible\
    \ with the `navigator.geolocation` object, and they let you easily request the\
    \ user’s position, either once or repeatedly, tracking the user’s movement (if\
    \ any).\n\n### Privacy Considerations\n\nGranting access to such information about\
    \ users without them knowing should always be controlled to some extent. To respect\
    \ the end user’s privacy, iOS will always ask for a user’s permission before sending\
    \ any information about their position, as in the Maps and Camera applications\
    \ (see Figure 14–1).\n\n**Figure 14–1.** All iPhone applications ask for the user’s\
    \ authorization before sending location data\n\n### Setup Considerations\n\nBefore\
    \ testing the API on your own device, make sure the location service is active.\
    \ You will find it in the Settings application, under the General submenu. It\
    \ would be even cleaner to reset previously granted geolocation request authorizations,\
    \ to work on a tabula rasa, for instance. This is achieved by navigating to `Settings`\
    \ > `General` > `Reset` > `Reset geolocation alerts`.\n\nAlso, when debugging\
    \ on a desktop browser, don’t forget to check for the actual availability of the\
    \ API—this will save you precious time debugging code that simply cannot be interpreted.\
    \ This is done simply with the following code that checks for the `Geolocation`\
    \ object:\n\n```javascript\nif (window.navigator.geolocation) {\n    /* The API\
    \ is available */\n} else {\n    /* Fallback message */\n}\n```\n\nLikewise, targeting\
    \ Mobile Safari, not all your users will have the latest version of the browser—especially\
    \ on older versions of the iPod touch, for which the relevant update is either\
    \ sold for a cost or not available at all. Generally speaking, proceeding this\
    \ way will make your application available in better conditions to more users,\
    \ and planning for errors will help you offer a better user experience.\n\n###\
    \ Getting the Current Position\n\nThe most obvious and probably most common use\
    \ of the API will be to ask for the user’s present position. As stated earlier,\
    \ you will use the `Geolocation` object, and you will access the `getCurrentPosition()`\
    \ method.\n\n```javascript\nwindow.navigator.geolocation.getCurrentPosition(\n\
    \    function(position) {\n        /* do something with the position object data\
    \ */\n    }\n);\n```\n\nBecause every request takes some time, which could quickly\
    \ freeze the user’s device, all requests are asynchronous. You will need to pass\
    \ a callback function as a parameter to be called when data becomes available,\
    \ as illustrated earlier.\n\n### Longitude, Latitude, and More\n\nWhen the request\
    \ is successful, the callback is called using the `position` parameter, which\
    \ contains data about the user’s location. This object makes eight properties\
    \ available, as shown in Table 14–1.\n\n**Table 14–1.** Properties of the Position\
    \ Object\n\n| Property | Description |\n|----------|-------------|\n| `position.timestamp`\
    \ | Time at which the location information was determined (milliseconds). |\n\
    | `position.coords.accuracy` | The accuracy of the latitude/longitude information\
    \ returned (meters; the lower, the better). |\n| `position.coords.latitude` |\
    \ The user’s current latitude (decimal degrees). |\n| `position.coords.longitude`\
    \ | The user’s current longitude (decimal degrees). |\n| `position.coords.altitudeAccuracy`\
    \ | The accuracy of the altitude information returned (meters). This is often\
    \ set to null. |\n| `position.coords.altitude` | The user’s current altitude (meters).\
    \ The same restrictions apply. |\n| `position.coords.heading` | The direction\
    \ in which the user is heading (decimal degrees). This is often set to null. |\n\
    | `position.coords.speed` | The user’s current speed. The same restrictions apply\
    \ (meters/second). |"
