  trans: "\n# 第 6 章：为 Web 应用界面增添趣味的 CSS 特性\n\n`图 6-8`：照片应用呈现均匀的画廊效果，所有图片均采用相同的显示尺寸\n\
    \n在开发原生应用时，您可以使用 Cocoa Touch 框架中的 `UIImageView` 对象，通过使用适应比例、填充缩放或填充比例等参数（如图 6-9\
    \ 所示），让图片适应任意容器尺寸。现在我们将利用全新的 CSS 特性来实现高度相似的设计。Mobile Safari 的缩放算法表现优异，因此您可以获得出色的效果。\n\
    \n`图 6-9`：现在只需为容器应用样式，即可实现适应比例、填充缩放和填充比例模式\n\n`background-size` 属性接受两个值：水平值和垂直值。当然，您也可以只指定一个值，该值将同时应用于两个方向。您可以使用常用的\
    \ CSS 单位来赋值；但在本例中，百分比是最佳选择，因为它能让代码更易于重用。\n\n最直接的值是填充缩放，这样您无需了解图片的横纵比。图片将被缩放以填满可用空间，并可能适当地拉伸或压缩：\n\
    \n```css\n/* 填充缩放 */\n-webkit-background-size: 100%;\n```\n\n`background-size`\
    \ 属性的其他值要求您了解图片的方向。要实现填充比例效果，您应将图片较窄的一边设为 100%，另一边设为 `auto`。这意味着竖版图片将在垂直方向上裁剪，横版图片则在水平方向上裁剪。\n\
    \n```css\n/* 横版图片的填充比例... */\n-webkit-background-size: auto 100%;\n\n/* ...以及竖版图片\
    \ */\n-webkit-background-size: 100% auto;\n```\n\n将这两个值互换则会产生适应比例缩放的效果，即整张图片会显示在指定区域内，但在垂直或水平方向留下空白区域。\n\
    \n同时明确指定两个值将强制改变图片缩放后的尺寸。\n\n> **警告：** 请注意，图片高度不要超过容器的两倍。Mobile Safari 在处理这种情况时存在一个\
    \ Bug，会导致图片被裁剪。避免此问题的唯一方法是使用更小的图片。\n\nCSS3 规范提供了轻松实现预期效果的值。然而，`contain` 和 `cover`\
    \ 这两个值在 iOS 3.2 版本中并不支持。\n\n## 开发类似照片应用的照片墙\n\n在本节中，我们将通过一个实例展示这些新 CSS 属性和值所提供的可能性，即利用它们重现之前展示的照片应用中的照片墙外观。这种照片墙之所以高效且吸引人，其中一个特点是不论图片的原始格式如何，它们都能完美地适配到分配给它们的方形区域中。\n\
    \n与往常一样，我们将在 Komodo Edit 项目中已有的目录结构基础上进行构建。首先，您需要在项目中添加一个名为 `images` 的新物理文件夹，用于存储照片墙中的所有图片。\n\
    \n在 Komodo Edit 中，转到 **项目** ➤ **添加** ➤ **新建活动文件夹**，然后点击相应的图标创建一个名为 `images` 的新目录，并选择它。\n\
    \n接下来，由于我们将使用 PHP 来读取 `images` 文件夹的内容，并将其中图片的引用动态添加到一些 JavaScript 代码中，因此您需要将 `index.html`\
    \ 文件重命名为 `index.php`。文件内容应如下所示：\n\n```php\n<?php require_once(\"index_code.php\"\
    ); ?>\n\n<!DOCTYPE html>\n<html>\n<head>\n  <title>照片墙演示</title>\n  ...\n  <link\
    \ rel=\"stylesheet\" href=\"styles/main.css\">\n  <link rel=\"stylesheet\" href=\"\
    styles/gallery.css\">\n  ...\n  <script src=\"scripts/main.js\"></script>\n  <script>\n\
    \    var images = <?php writeImages('images'); ?>;\n  </script>\n  <script src=\"\
    scripts/gallery.js\"></script>\n</head>\n<body onload=\"showImages()\">\n  ...\n\
    \  <h1>照片墙</h1>\n  ...\n  <div id=\"gallery\"></div>\n</body>\n</html>\n```\n\n\
    然后，在与 `index.php` 相同的目录下创建一个 `index_code.php` 文件。该文件将包含照片墙运行所需的函数。换句话说，它允许您从 `images`\
    \ 文件夹中收集图片列表。文件内容如下：\n\n```php\n<?php\n# 解析指定文件夹并返回收集到的文件数组\nfunction getImages($path)\
    \ {\n  $handle = opendir($path);\n  $files = array();\n  if ($handle) {\n    while\
    \ (($name = readdir($handle)) !== false) {\n      if (is_file(\"$path/$name\"\
    )) {\n        $files[] = \"$path/$name\";\n      }\n    }\n  }\n  closedir($handle);\n\
    \  return $files;\n}\n?>\n```"
- fmt: "# Transform our PHP array into a JavaScript array\n\n```\nfunction writeImages($path)\
    \ {\n\n  $all = implode('\", \"', getImages($path));\n\n  echo !$all ? '[]' :\
    \ '[\"'. $all . '\"]';\n\n}\n\n?>\n```\n\n# CHAPTER 6: Interesting CSS Features\
    \ for Your Web Application User Interface\n\nNow, create a `gallery.css` file\
    \ in your `styles` folder, and link to it in the head of your document. The following\
    \ are the styles you will be using:\n\n```\n.header-wrapper {\n\n  background-color:\
    \ #444;\n\n}\n\n.view {\n\n  background-color: #fff;\n\n}\n\ndiv#gallery {\n\n\
    \  padding: 2px;\n\n  float: left;\n\n}\n\n#gallery > div {\n\n  border: solid\
    \ 1px rgba(0,0,0,0.1);\n\n  width: 75px;\n\n  height: 75px;\n\n  margin: 2px;\n\
    \n  float: left;\n\n  -webkit-box-sizing: border-box;\n\n  -webkit-background-size:\
    \ 100%;\n\n  background-position: center top;\n\n  background-repeat: no-repeat;\n\
    \n  -webkit-background-origin: border-box;\n\n}\n\n#gallery > div.portrait {\n\
    \n  -webkit-background-size: 100% auto;\n\n}\n\n#gallery > div.landscape {\n\n\
    \  -webkit-background-size: auto 100%;\n\n}\n```\n\nThese styles ensure that each\
    \ image extends into the borders of its container so that all images have exactly\
    \ the correct size. In addition, the translucent border makes sure that the overall\
    \ look is consistent, even with pale-colored pictures.\n\nYou will have noticed\
    \ that, because the `contain` and `cover` values aren't supported, we have to\
    \ apply different rules, whether the picture is in portrait or landscape orientation.\n\
    \nWe will use the following JavaScript code, to be put in a new `scripts/gallery.js`\
    \ file, to determine for each image which class should be added:\n\n```\nfunction\
    \ showImages() {\n\n  var container = document.getElementById(\"gallery\");\n\n\
    \  container.innerHTML = \"\";\n\n  for (var i = 0; i < images.length; i++) {\n\
    \n    loadImage(container, images[i]);\n\n  }\n\n}\n\nfunction loadImage(container,\
    \ src) {\n\n  var img = new Image();\n```\n\n![](index-155_1.jpg)\n\nCHAPTER 6:\
    \ Interesting CSS Features for Your Web Application User Interface\n\n```\n  img.src\
    \ = src;\n\n  var div = document.createElement(\"div\");\n\n  container.appendChild(div);\n\
    \n  img.onload = function() {\n\n    div.className = (this.width < this.height)\
    \ ? \"portrait\" : \"landscape\";    div.style.backgroundImage = \"url(\" + this.src\
    \ + \")\";\n\n  }\n\n}\n```\n\nThe `showImages()` function first empties the gallery\
    \ container so that there is no display problem when loading new content. Then,\
    \ it uses the global `images` array to fetch the pictures to be displayed and\
    \ for each new item calls the `loadImage()` function. This function creates a\
    \ new `<div>` container for each new item with the right class and image background.\
    \ The `Image` object is used only to determine the current orientation once each\
    \ image has been loaded.\n\nNow, if you open the URL to this page in Mobile Safari,\
    \ you should see a consistent gallery similar to that of the native Photos application,\
    \ as shown in Figure 6–10.\n\n**Figure 6–10.** A homogeneous picture gallery\n\
    \nTo be more search engine friendly, you can also add the images directly to the\
    \ markup on the server side and apply an `onload` attribute directly to each image.\
    \ However, you would then need to replace all the images' `src` with a blank pixel\
    \ image in order to finally display only the background.\n\n![](index-156_1.jpg)\n\
    \nCHAPTER 6: Interesting CSS Features for Your Web Application User Interface\n\
    \n## Multilayer Backgrounds\n\nAs you can see, the effects you can achieve with\
    \ CSS3 backgrounds are much richer than those of CSS2. Yet this is not all the\
    \ new specifications have in store for you.\n\nWorking with background images,\
    \ you can now handle multiple backgrounds applied to only one element. By using\
    \ a comma-separated list of values for the URL of your background, all images\
    \ will be taken into account, stacking up with the first declared one on top.\
    \ The main limitation to this is that you can specify only one background color\
    \ that will be on only the lowermost layer.\n\nHowever, WebKit extends this functionality\
    \ by allowing it not only for the `background-image` property but for all background\
    \ properties apart from the color. This means, for instance, the end of the sliding-doors\
    \ technique or more possibilities for fluid layouts, because gradient backgrounds\
    \ drawn with `-webkit-gradient()` will be resizable. Rather than using a background\
    \ repeat, you could also achieve effects like the one shown in Figure 6–11 using\
    \ the following code:\n\n```\n.multiple {\n\n  width: 400px;\n\n  height: 300px;\n\
    \n  background-repeat: no-repeat;\n\n  background-image: url(flower.jpg);\n\n\
    \  background-position:\n\n    90px 90px,\n\n    70px 70px,\n\n    50px 50px;\n\
    \n  -webkit-background-size:\n\n    60% auto,\n\n    50% auto,\n\n    40% auto,\n\
    \n    30% auto,\n\n    20% auto;\n\n}\n```\n\n**Figure 6–11.** Images stack up,\
    \ from the first at the bottom to the last on top\n\nIn this example, we leave\
    \ the `background-image` property unchanged for all background layers, but we\
    \ progressively change its position and size to mimic a zoom-in effect.\n\nCHAPTER\
    \ 6: Interesting CSS Features for Your Web Application User Interface\n\nIt is\
    \ important here to understand how the interpreter handles values when there are\
    \ more layers than values for some property. The rule applied is to repeat the\
    \ list of available values in a loop until they meet the right count.\n\nHowever,\
    \ be careful: although the specifications indicate that the number of layers should\
    \ be determined solely by the number of `background-image` properties, WebKit\
    \ duplicates this property if other background properties have a higher count.\
    \ Because, following the specifications, superfluous values should be ignored,\
    \ we advise that you should not rely on this for your designs, because it is likely\
    \ that either WebKit's implementation or the specification will evolve.\n\nThis\
    \ property will, for instance, let you set a different background for elements\
    \ that are selected. We shall use it in our next chapter on the canvas and SVG\
    \ to add an arrow to list items, and this is used in our web application template\
    \ header combining gradients and the new color definition possibilities that we\
    \ are going to explain next.\n\n## Colors\n\nColor is essential to design, and\
    \ its use has become more and more complex as its rendering has improved on devices.\
    \ However, building interfaces with complex color associations often required\
    \ that we resorted to images (for instance to handle transparency) or to third-party\
    \ tools (typically to build a color scheme). The CSS3 specification brings a new\
    \ set of options that will help you build image-less interfaces that are more\
    \ complex yet more lightweight, while making your workflow more efficient.\n\n\
    ### The Alpha Channel\n\nColors using CSS2 would most often be defined using the\
    \ RGB notations, namely, `#rrggbb`, `#rgb`, and the `rgb()` function. This is\
    \ extended in CSS3 to allow for an alpha channel, using the `rgba()` function.\
    \ The value for the alpha channel is a floating number within a range from 0 to\
    \ 1. This is especially useful when dealing with transparent box backgrounds,\
    \ because the traditional use of the `opacity` property has the inconvenience\
    \ of being inherited. For instance, to set a translucent background on a box while\
    \ still having fully readable text inside it, you would have needed to resort\
    \ to background images or complex positioning. This is no longer necessary, because\
    \ you can simply set transparency for the `background-color` property.\n\nThe\
    \ following code illustrates how this will change your life:\n\n```\n<style>\n\
    \nbody { background-color: yellow; }\n\n.main { position: relative; }\n\n.opacity-layer\
    \ {\n\n  position: absolute;\n\n  background-color: blue;\n\n  opacity: 0.25;\n\
    \n  left: 0;\n\n  right: 0;\n```\n\nCHAPTER 6: Interesting CSS Features for Your\
    \ Web Application User Interface\n\n```\n  top: 0;\n\n  bottom: 0;\n\n}\n\n.content-layer\
    \ {\n\n  position: relative;\n\n  color: red;\n\n}\n\n</style>\n\n<div class=\"\
    main\">\n\n  <div class=\"opacity-layer\"></div>\n\n  <div class=\"content-layer\"\
    >\n\n    <h1>Some Title</h1>\n\n    <p>A nice paragraph.</p>\n\n  </div>\n\n</div>\n\
    ```\n\nHere is equivalent code using the new color functions:\n\n```\n<style>\n\
    \nbody { background-color: yellow; }\n\n.content-layer {\n\n  background-color:\
    \ rgba(0,0,255,0.25);\n\n  color: red;\n\n}\n\n</style>\n\n<div class=\"content-layer\"\
    >\n\n  <h1>Some Title</h1>\n\n  <p>A nice paragraph.</p>\n\n</div>\n```\n\nOf\
    \ course, the other advantage of the alpha channel is that, because it is simply\
    \ a color definition, you can apply it to anything that takes a color as value,\
    \ including text or borders. You will also find it can be used to create sophisticated\
    \ CSS background gradients.\n\n### New Color Definitions\n\nThe alpha channel\
    \ can also be used with a new CSS3 color definition function: `hsl()`. Although\
    \ RGB is commonly used and many front-end developers are quite fluent with it,\
    \ it is often considered unintuitive. Indeed, in \"everyday life\", people are\
    \ used to subtractive synthesis of colors (as when mixing paint colors), while\
    \ RGB is based on additive synthesis (as in \"blending all colors together produced\
    \ pure white,\" which is the case for light). It is common that RGB users actually\
    \ get used to it by subconsciously translating it to a change in hue, saturation,\
    \ and light.\n\nThe hue (the *h* in the `hsl()` and `hsla()` functions) is an\
    \ angle, measured in degrees (without specifying the unit) with a value from 0\
    \ to 360. It is usually represented by a circle, where each degree represents\
    \ a shift in color, from red (0) to red (360). Saturation and lightness are specified\
    \ as percentages.\n\n![](index-159_1.jpg)\n\nCHAPTER 6: Interesting CSS Features\
    \ for Your Web Application User Interface\n\n`hsl(*<hue>*, *<saturation>*, *<lightness>*)`\n\
    \n`hsla(*<hue>*, *<saturation>*, *<lightness>*, *<alpha>*)`\n\nHere is a set of\
    \ equivalent CSS rules:\n\n```\n.red { color: red; }\n\n.red { color: #f00; }\n\
    \n.red { color: rgb(255, 0, 0); }\n\n.red { color: hsl(0, 100%, 50%); }\n\n.red\
    \ { color: hsl(360, 100%, 50%); }\n\n.red { color: hsla(0, 100%, 50%, 1.0); }\n\
    ```\n\nBecause the progression around the hue \"circle\" is easy to grasp, you\
    \ can quite easily move around it, as represented in Figure 6–12, a laid-out version\
    \ of the circle, with stop points to situate basic colors.\n\n**Figure 6–12.**\
    \ Conversion table between basic colors\n\nHSL makes it easier to move around\
    \ color values in a natural way. If you want orange, you just pick a value between\
    \ red and yellow (0 and 60 degrees). Want a lighter orange? Just add some lightness.\
    \ Need an orange that is less vivid? Remove some saturation. With the `rgb()`\
    \ representation, you would have had to determine an amount of each color, while\
    \ with the `#rrggbb` representation, you would have had to cope with the extra\
    \ difficulty of converting to hexadecimal values for each color.\n\n### Using\
    \ Gradients\n\nThe previous properties allowed for the fine-tuning of background\
    \ properties. However, WebKit features new properties that allow you to use code\
    \ instead of images for a most interesting purpose: gradients. This can make a\
    \ great difference in the way you handle design elements, because it has quite\
    \ a few advantages.\n\nFirst, CSS gradients will be more lightweight for the end\
    \ user, because no images will have to be loaded, and of course, there will be\
    \ no extra HTTP request—which, as we have indicated before, can be quite slow\
    \ on mobile devices.\n\nSecond, CSS gradients, once you have mastered them, are\
    \ faster and more straightforward to modify on your site, because you will need\
    \ only one tool—which often means only one person, too—and you don't have to worry\
    \ about dimensions.\n\n### Basic Syntax\n\nAs of this writing, there is no specification\
    \ about the actual syntax for CSS gradients; each browser vendor has implemented\
    \ this feature in its own way. Here is the most elementary syntax to create a\
    \ gradient for WebKit browsers:\n\n![](index-160_1.jpg)\n\nCHAPTER 6: Interesting\
    \ CSS Features for Your Web Application User Interface\n\n```\n-webkit-gradient(\n\
    \n  linear,\n\n  left top,\n\n  right bottom,\n\n  from(black),\n\n  to(yellow)\n\
    \n)\n```\n\nFor instance, you can apply this to the background of an element using\
    \ the following:\n\n```\n<style>\n\nbutton {\n\n  background-image:\n\n    -webkit-gradient(\n\
    \n      linear,\n\n      left top,\n\n      right bottom,\n\n      from(white),\n\
    \n      to(lightgrey)\n\n    );\n\n  border: 1px solid gray;\n\n}\n\n</style>\n\
    \n<button>Click Me</button>\n```\n\nThis example draws a linear gradient that\
    \ spans from the upper-left corner of the box to the lower-right corner and will\
    \ create a transition from white to lightgrey, as shown in Figure 6–13. In our\
    \ examples, we are going to use named colors for clarity, but you can use any\
    \ color naming convention supported by CSS3, including transparent values.\n\n\
    **Figure 6–13.** A simple button with a linear gradient\n\nYou can determine positions\
    \ using named positions, pixels (with implicit unit), or percentages: the `left\
    \ top` and `right bottom` values in our example are equivalent to `0 0` and `100%\
    \ 100%`, for instance.\n\nA gradient value can be applied to properties that support\
    \ an image, namely, `background-image`, `border-image`, `list-style-image`, and\
    \ even `content`. However, it is not possible for now to set this value for a\
    \ color property—meaning you won't be able to directly apply gradients to text.\n\
    \n![](index-161_1.jpg)\n\nCHAPTER 6: Interesting CSS Features for Your Web Application\
    \ User Interface\n\n### Changing the Size of the Gradient\n\nWith backgrounds,\
    \ the default behavior of gradients is to extend to the dimensions of the box\
    \ to which they are attached. Because the `-webkit-gradient()` function is considered\
    \ as an image, you can tweak this behavior using the properties explained earlier,\
    \ noticeably with `background-size`, which will change the drawing area for the\
    \ gradient.\n\nSetting the background size to `5px`, for instance, will limit\
    \ the span of the gradient to a square 5 pixels on a side. The default value of\
    \ the `background-repeat` is repeat, so if you haven't set a value, the gradient\
    \ will repeat as a pattern to cover the box area, as shown in Figure 6–14.\n\n\
    ```\n.gradient-box {\n\n  ...\n\n  -webkit-background-size: 5px;\n\n}\n```\n\n\
    **Figure 6–14.** Because the drawing area has been redefined, the gradient has\
    \ become a repeating pattern\n\nOf course, your gradient could be cut off, if\
    \ the drawing area is not large enough to hold the whole gradient. This would\
    \ typically occur using fixed dimensions (as you will have to do to use radial\
    \ gradients).\n\n### Complete Gradient Syntax\n\nAlthough gradients offer a good\
    \ range of new possibilities for the styling of HTML elements, there is more to\
    \ the implementation of gradients by WebKit. Here is the complete syntax as described\
    \ in the WebKit documentation:\n\n`-webkit-gradient(*<type>*, *<point>* [, *<radius>*]?,\
    \ *<point>* [, *<radius>*]? [, *<stop>*]**)`\n\nAs with regular expressions, the\
    \ question mark indicates that the item can occur none or one time, and the asterisk\
    \ shows that it can be used one or several times, or not at all. Of course, specifying\
    \ a gradient with no color seems like a strange idea.\n\nYou can create two kinds\
    \ of gradients with CSS: linear gradients, as you have already seen, and radial\
    \ gradients. To define a radial gradient, you have to specify a radius together\
    \ with the elements we have already introduced. Note that the value for the radius\
    \ is expressed in pixels only, though the unit should not be specified. You cannot\
    \ use relative units to fit your gradient whatever the size of your box, and therefore\
    \ you can achieve only regular circles, not more complex ellipses. You can see\
    \ the effect of the radial type gradient (shown in Figure 6–15) by replacing your\
    \ gradient code in the first example by the following:\n\n![](index-162_1.jpg)\n\
    \nCHAPTER 6: Interesting CSS Features for Your Web Application User Interface\n\
    \n```\n-webkit-gradient(\n\n  radial,                    /* gradient <type> */\n\
    \n  100 100, 25,               /* <point> and <radius> (for radial gradients only)\
    \ */\n\n  100 100, 100,\n\n  from(black),               /* 2 <stop> values */\n\
    \n  to(yellow)\n\n);\n```\n\n**Figure 6–15.** A simple radial gradient\n\nThis\
    \ syntax can seem a little tricky or confusing. It is important to understand\
    \ exactly what each value represents. The first pair of values, after the gradient\
    \ type, is the position where the gradient should originate. It is followed by\
    \ the radius of the area that should be entirely filled by the first color stop.\n\
    \nThe second pair again indicates the destination circle of the gradient, the\
    \ last number being the radius by which the color blend should occur. The rest\
    \ of the available space out of this last circle will be filled with the last\
    \ color stop, plain.\n\nDownload from Wow! eBook <www.wowebook.com>\n\nThe last\
    \ values determine the colors that will be used to draw the gradient. As shown\
    \ previously and as we'll explain in the next section, you can set as many colors\
    \ as you like for these values.\n\n### Advanced Color Handling\n\nThe `from()`\
    \ and `to()` functions are both shorthand expressions for the `color-stop()` function,\
    \ which has the following signature:\n\n`color-stop(*<stop value>*, *<color>*)`\n\
    \nThe first parameter can be defined either as a percentage or with a float ranging\
    \ from 0 to 1. The second takes any valid CSS color definition. This function\
    \ thus allows you to determine the entire color palette for your gradient, along\
    \ with the steps where they should start, stop, and blend. `from(*<color>*)` and\
    \ `to(*<color>*)` hence are the same as `color-stop(0, *<color>*)` and `color-stop(1,\
    \ *<color>*)`.\n\n![](index-163_1.jpg)\n\nCHAPTER 6: Interesting CSS Features\
    \ for Your Web Application User Interface\n\nThis opens new ways to use your gradients,\
    \ because you can use the `color-stop()` function as many times as you want for\
    \ a single gradient. Here is the preceding example, with an extra color:\n\n```\n\
    -webkit-gradient(\n\n  radial,\n\n  100 100, 25,\n\n  100 100, 100,\n\n  from(black),\n\
    \n  to(yellow),\n\n  color-stop(50%, red)\n\n);\n```\n\nIf you use Photoshop,\
    \ this logic should seem familiar, and you will recognize the Gradient Editor,\
    \ as shown in Figure 6–16.\n\n**Figure 6–16.** Photoshop Gradient Editor with\
    \ color stops and midpoint circles between stops\n\nHowever, with CSS, the only\
    \ way to give more importance to one color over another as you would with the\
    \ color midpoint in Photoshop or to build irregular gradients is to add more stops\
    \ with the same color.\n\nOrder is not important when you specify these color\
    \ stops, unless several occur in the same place, for instance when building a\
    \ sharp transition, as in the following example (Figure 6–17):\n\n```\n-webkit-gradient(\n\
    \n  radial,\n\n  50% 50%, 0,\n\n  50% 50%, 100,\n\n  from(red),\n\n  color-stop(50%,\
    \ red),\n```\n\n![](index-164_1.png)\n\nCHAPTER 6: Interesting CSS Features for\
    \ Your Web Application User Interface\n\n```\n  color-stop(50%, yellow),\n\n \
    \ color-stop(99%, yellow),\n\n  color-stop(99%, transparent),\n\n  to(transparent)\n\
    \n);\n```\n\n**Figure 6–17.** Two concentric circles drawn using several `color-stop()`\n\
    \nUsing this technique, you can draw circles with crisp borders, without worrying\
    \ about the ending color of the gradient filling the entire box. In our web application\
    \ template, we have used this technique to add a hashed background. It will be\
    \ used also in Chapter 9 to create an attractive tab bar, in association with\
    \ the flexible box model, which will be explained later in this chapter.\n\n##\
    \ Boxes and Borders\n\nTraditionally, \"boxes\" in CSS haven't been supplied with\
    \ many styling options. Beyond a handful of unevenly supported border styles,\
    \ you had to resort to background images, with all the duplicate styles and the\
    \ approximations that the process entails, to bring some extra shine to your elements.\n\
    \nA simple web search yields hundreds of pages promising the ultimate beveled\
    \ or rounded border solution; this has resulted either in superfluous markup,\
    \ heavy JavaScript, or extra images. CSS3 is almost making these practices obsolete,\
    \ with several very interesting features supported by recent browsers, including\
    \ Mobile Safari.\n\n### Box Sizing\n\nBefore we get into the styling of boxes,\
    \ let's take a look at a new feature regarding box sizing. The `box-sizing` property\
    \ resulted from the observation of the non-compliant Internet Explorer that didn't\
    \ calculate box sizes as described in the CSS2 specification. Although HTML renderers\
    \ should process the box size as the sum of its width, padding, borders, and margins,\
    \ Internet Explorer considered the padding part of the content width, instead\
    \ of adding it.\n\n![](index-165_1.jpg)\n\nCHAPTER 6: Interesting CSS Features\
    \ for Your Web Application User Interface\n\n```\n.box {\n\n  -webkit-box-sizing:\
    \ border-box;\n\n}\n```\n\nThe default value for the `box-sizing` property is\
    \ `content-box`, which is the behavior expected in CSS2. However, setting the\
    \ value to `border-box` will cause the padding and borders to be counted inside\
    \ the content area instead of around it. Figure 6–18 shows the difference.\n\n\
    **Figure 6–18.** The transparent padding and black borders show the difference\
    \ between both box models\n\nThis may seem unusual to you if you've been using\
    \ the CSS2 box model for some time. Nonetheless, using this property value means\
    \ you won't have to worry about giving a 100% width to a box or adding a border\
    \ to your containers.\n\nTypically, you would design a site with a global container,\
    \ a 680 pixels wide left column for the main content, and a 300 pixels side column.\
    \ Changing the padding for your boxes or adding a border to your side column would\
    \ have proven a daunting task. Here, you wouldn't have to worry about this, because\
    \ your boxes would preserve their outer width.\n\n### Rounded Box Corners\n\n\
    Adding rounded corners to elements on your pages has been very popular for some\
    \ time now; however, again, this could be difficult to implement in a flexible\
    \ way. Furthermore, the iPhone user interface extensively uses rounded corners.\
    \ To achieve a design consistent with this, it is likely you will want to emulate\
    \ iOS boxes too.\n\nCSS3 brings the ultimate solution with the `border-radius`\
    \ property. With a simple CSS declaration, you should be able to achieve most\
    \ of your designer dreams regarding corners, as shown in Figure 6–19.\n\nNote\
    \ that WebKit (and, necessarily, Mobile Safari) doesn't exactly comply with the\
    \ specification. This is a limitation only in that the specification allows you\
    \ to generate\n\n![](index-166_1.jpg)\n\n![](index-166_2.png)\n\nCHAPTER 6: Interesting\
    \ CSS Features for Your Web Application User Interface\n\ndifferentiated borders\
    \ in a single declaration. With the syntax for WebKit, you will have to declare\
    \ each corner separately if you want different effects.\n\nThe syntax for Mobile\
    \ Safari is arguably more intuitive, though. You refer to the targeted border\
    \ in the property name and set the radius as the value. Thus, your rule would\
    \ be presented as follows:\n\n```\n/* Same value for the four corners */\n\n-webkit-border-radius:\
    \ 16px;\n\n/* The same as separated declarations */\n\n-webkit-border-top-left-radius:\
    \ 16px;\n\n-webkit-border-top-right-radius: 16px;\n\n-webkit-border-bottom-left-radius:\
    \ 16px;\n\n-webkit-border-bottom-right-radius: 16px;\n```\n\n**Figure 6–19.**\
    \ A simple box with rounded corners\n\nOf course, you are not limited to regular\
    \ shapes. Although giving the same value to every corner will return a regular\
    \ box with rounded corners and end in a perfect circle, you can create a more\
    \ elliptic shape by specifying parallel values for the width and height, as in\
    \ Figure 6–20:\n\n```\n/* Again, same value for the four corners */\n\n-webkit-border-radius:\
    \ 24px 48px;\n\n/* And again, the same as separated declarations */\n\n-webkit-border-top-left-radius:\
    \ 24px 48px;\n\n-webkit-border-top-right-radius: 24px 48px;\n\n-webkit-border-bottom-left-radius:\
    \ 24px 48px;\n\n-webkit-border-bottom-right-radius: 24px 48px;\n```\n\n**Figure\
    \ 6–20.** A box with distorted corners\n\n![](index-167_1.jpg)\n\nCHAPTER 6: Interesting\
    \ CSS Features for Your Web Application User Interface\n\nThe property is applicable\
    \ to all elements, just as with the `border` property, but it doesn't depend on\
    \ the actual use of a border. Likewise, you can use any measure unit, be it fixed\
    \ values such as pixels or relative values such as ems or percentages.\n\nUsing\
    \ percentages, the value of the radius will be evaluated relative to the overall\
    \ width and height of the box (that is, the dimensions considered as when using\
    \ the `border-box` value for `box-sizing`). Also note that you won't have to worry\
    \ about your backgrounds overflowing their containers, because they will be clipped\
    \ appropriately.\n\n### Borders Drawn with Images\n\nHowever awesome the `border-radius`\
    \ CSS3 feature may be, there is more to borders than actual border lines with\
    \ the new specification. Indeed, you can also integrate more elaborate border\
    \ styles with the `border-image` property. This will take care of adapting an\
    \ image to the size of your borders, either by scaling it or by repeating it.\n\
    \nIn the following examples, we will use the image in Figure 6–21, which is 300\
    \ pixels wide and high, as a pattern for a border divided into nine different\
    \ areas. These will be declared in the same order as for margins, padding, or\
    \ borders, with two modes, stretch and repeat. The main limitation to this method\
    \ is that you cannot specify a different mode for opposite borders.\n\n**Figure\
    \ 6–21.** A pattern to be used as a border image\n\n![](index-168_1.jpg)\n\nCHAPTER\
    \ 6: Interesting CSS Features for Your Web Application User Interface\n\nFigure\
    \ 6–22 shows the result of the following code, changing only the mode:\n\n```\n\
    .border {\n\n  -webkit-border-image: url(diamonds.png) 100 100 100 100 stretch\
    \ stretch;\n\n  width: 400px;\n\n  height: 350px;\n\n  border-width: 100px;\n\n\
    }\n```\n\n**Figure 6–22.** The resulting box with stretch and repeat mode\n\n\
    There is a third mode, round, that would repeat the pattern and scale it so that\
    \ it is not truncated. However, this mode is not yet supported by Mobile Safari.\
    \ As a consolation, because a border with an image primarily is a border, you\
    \ can specify the border width directly in your `border-image` declaration, as\
    \ shown here:\n\n```\n.border {\n\n  -webkit-border-image: url(diamonds.png) 100\
    \ / 100px stretch stretch;\n\n  width: 400px;\n\n  height: 350px;\n\n}\n```\n\n\
    This is shorthand for the property. Because all sides have the same dimensions,\
    \ we group the slice areas together. This value doesn't take a unit; pixels are\
    \ implicit for the parts of the image. A slash separates the slice area from the\
    \ size of the border to avoid any confusion.\n\nBecause the areas in our image\
    \ are 100 pixels wide doesn't mean we need to have borders that wide: by defining\
    \ a thinner border, the area of the image shall be scaled to fit into the border\
    \ width. Thus, in the following example, our image will be made, respectively,\
    \ 50px, 25px, 100px, and 25px wide for the top, right, bottom, and left borders\
    \ (Figure 6–23).\n\n```\n.border {\n```\n\n![](index-169_1.jpg)\n\nCHAPTER 6:\
    \ Interesting CSS Features for Your Web Application User Interface\n\n```\n  -webkit-border-image:\
    \ url(diamonds.png) 100 / 50px 25px 100px stretch;\n\n  width: 400px;\n\n  height:\
    \ 350px;\n\n}\n```\n\n**Figure 6–23.** Each border has its own thickness\n\nThis\
    \ rule can be very useful when creating attractive buttons to replace the default\
    \ operate system ones.\n\n### Shadows\n\nMore control over borders is an interesting\
    \ feature in building web pages because identifying blocks helps readability and\
    \ can be a way to make content stand out. CSS3 offers another long-awaited feature\
    \ in this respect, namely, outer shadows for blocks with the `box-shadow` property.\
    \ WebKit browsers also implement the CSS2 `text-shadow` property. Because this\
    \ property is part of an official recommendation and is considered stable, you\
    \ needn't use the `-webkit-` prefix.\n\nBoth of these features not only allow\
    \ for drop shadows but also make it possible to draw glowing effects, which is\
    \ useful creating button effects. Beyond the visual attractiveness, one advantage\
    \ of this solution is that shadows don't extend the dimensions of your blocks\
    \ or text, meaning your layout will not be affected. Also, you have the possibility\
    \ to apply multiple shadows to the same element, using only one declaration.\n\
    \nCHAPTER 6: Interesting CSS Features for Your Web Application User Interface\n\
    \n### Box Shadows\n\nThe syntax for box shadows is quite simple. The `box-shadow`\
    \ property takes four parameters: the color, horizontal offset, vertical offset,\
    \ and blur radius. Setting the blur to 0 would result in a neatly cut shadow;\
    \ the greater the value, the fuzzier and more transparent the shadow.\n\nThe most\
    \ usual use of such a property would probably be the outlining of page sections\
    \ or provide user feedback while pressing a button. Nonetheless, in the following\
    \ example, we are going to use it to create an iOS-looking icon, using only one\
    \ image, that of the icon itself.\n\n```\n<style>\n\n.icon {\n\n  display: inline-block;\n\
    \n  text-shadow: rgba(0,0,0,0.5) 2px 2px 2px;\n\n  color: #000;\n\n  font: bold\
    \ 11px helvetica;\n\n  text-align: center;\n\n  margin: 8px;\n\n}\n\n.icon div\
    \ {\n\n  -webkit-border-radius: 8px;\n\n  width: 57px;\n\n  height: 57px;\n\n\
    \  margin: 0 auto 4px;\n\n  -webkit-box-shadow: 0 4px 4px rgba(0,0,0,0.5);\n\n\
    \  -webkit-box-sizing: border-box;\n\n  background-image:\n\n    -webkit-gradient(radial,\n\
    \n      50% -40, 37,\n\n      50% 0, 100,\n\n      from(rgba(255,255,255, 0.75)),\n\
    \n      color-stop(30%, rgba(255,255,255, 0)),\n\n      color-stop(30%, rgba(0,0,0,\
    \ 0.25)),\n\n      to(rgba(0,0,0, 0))\n\n    ),\n\n    url(flower.png);\n\n  -webkit-background-size:\
    \ auto auto, 100% 100%;\n\n}\n\n</style>\n\n<div class=\"icon\">\n\n  <div></div>\n\
    \n  Flowers\n\n</div>\n```\n\nThe first thing you'll notice in Figure 6–24 is\
    \ that the shadow follows the borders. Therefore, if you apply a radius to corners,\
    \ the shadows will be rounded too.\n\n![](index-171_1.jpg)\n\n![](index-171_2.jpg)\n\
    \nCHAPTER 6: Interesting CSS Features for Your Web Application User Interface\n\
    \n**Figure 6–24.** An icon in the iOS Dashboard style\n\n**NOTE:** The zoom property\
