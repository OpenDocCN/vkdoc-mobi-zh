    function button(active) {


    document.getElementsByTagName("button")[0].disabled = !active;


    }


    function locate() {


    button(false);


    window.navigator.geolocation.getCurrentPosition(successCallback, failureCallback);


    }


    And we modify the init() function to activate our button:


    function init() {


    ...


    button(true);


    }


    Finally, let’s add callbacks to process the data returned by getCurrentLocation()
    and handle possible errors:


    function successCallback(position) {


    var latlng = new ns.LatLng(position.coords.latitude, position.coords.longitude);


    map.setCenter(latlng);


    map.setZoom(17);


    button(true);


    }


    function failureCallback(error) {


    switch (error.code) {


    case error.PERMISSION_DENIED:


    alert("Positioning failed. Please check that the location service


    is on and that you have accepted location for the application.");


    break;


    case error.TIMEOUT:


    case error.POSITION_UNAVAILABLE:


    alert("Positioning failed. This often occurs when you are indoors.");


    break;


