    scripts/main.js


    The CACHE MANIFEST line is required as the first line in the file and should have
    no extra space or line feed. It acts as a file signature that identifies the file
    as the cache manifest to the browser. The URLs can be either absolute or relative,
    but be careful that relative paths are relative to the directory where the manifest
    is hosted. Therefore, for the sake of consistency, it is a good practice to place
    the manifest file in the same directory as the HTML file it is called from.


    NOTE: Although the file from which the manifest is called is automatically cached,
    following the specification, we add it to the manifest too.


    The manifest will be used in the document from which it is included. It should
    be called using the new manifest attribute on the <html> tag. As with any other
    attribute allowing to pull remote files, it can take both relative and absolute
    paths.


    <html **manifest="cache.manifest"** >


    ...


    CHAPTER 15: A Better Handling of Client-Side Data Storage


    This is the simplest possible definition of a manifest file, which wil let you
    store elements on the device without having to download them with every page load.
    You can simply list resources to cache, but it is also possible to more precisely
    determine how the cache should be handled.


    The CACHE Sections


    The files to be cached can be defined in a specific section of the manifest file
    resorting to the CACHE directive. You can define several sections in a similar
    way, which can be useful to order your file indications. You can also make your
    file more easily readable by humans by adding comments, as il ustrated here:


    CACHE MANIFEST


    **# Our cached resources**


    **CACHE:**


    index.html


    styles/main.css


    scripts/main.js


    Any kind of file can be registered for caching, even images or server-side scripts.
    Of course, server-side scripts wil be stored after their execution, so be careful
    when using this feature. This is possible because the cache application not only
    stores data but also stores resource metadata, such as HTTP headers.


    The NETWORK Sections


    The use of a manifest file makes the web application work in offline mode, which
    means that files not listed in the manifest file wil not be downloaded, even if
    the device is connected to a network. This behavior can be changed from the NETWORK
    section. In this Download from Wow! eBook <www.wowebook.com>


    section, you can specify resources that should be downloaded from the server if
    a network is available, which wil be especial y useful for dynamic elements of
    your applications.


    The section simply holds an online white list, similarly to what is found under
    the CACHE


    section. However, this section functions differently: each URL is a prefix match
    pattern.


    Thus, you wil be able to target al resources from a given directory by listing
    only this directory. Be careful not to uselessly list the same prefix several
    times.


    In our previous example, using only a CACHE section in our manifest file would
    keep our web application from working, because the proxy used to gather the RSS
    feed could not be accessed. To change this, we simply add the fol owing to our
    manifest:


    NETWORK:


    proxy.php


    Our proxy uses the url parameter from the query string to know which feed should
    be downloaded, but as proxy.php is a prefix, authorization to access the ful URL
    is given by the browser.


    CHAPTER 15: A Better Handling of Client-Side Data Storage


    You can also use the * wildcard to allow access to all resources. This naturally
    is taken into account for resources not listed under the CACHE section, which
    has precedence over other sections. Of course, this makes writing your manifest
    file much easier and reduces the risks of forgetting files and ending up with
    a partially functional application.


    The FALLBACK Sections'
  trans: '

    # 使用缓存清单实现离线 Web 应用


    通过使用以下 `cache.manifest` 文件，我们可以轻松缓存本章开发的 Web 应用示例，使其在离线或用户网速不佳时仍可使用。


    ```

    CACHE MANIFEST


    index.html

    styles/main.css

    scripts/main.js

    ```


    `CACHE MANIFEST` 行必须作为文件的第一行，且不应包含多余的空格或换行。它作为文件签名，告诉浏览器这是一个缓存清单。URL 可以是绝对路径或相对路径，但需注意相对路径是相对于清单文件所在的目录而言的。因此，为保持一致性，最好将清单文件放在调用它的
    HTML 文件所在的同一目录下。


    > **注意：** 尽管调用清单的文件会被自动缓存，但根据规范，我们仍将其添加到清单中。


    清单文件将用于包含它的文档中，并且必须通过 `<html>` 标签上的新 `manifest` 属性来调用。与其他允许拉取远程文件的属性一样，它可以接受相对路径和绝对路径。


    ```

    <html manifest="cache.manifest">

    ...

    ```


    ## 第 15 章：更好地处理客户端数据存储


    这是清单文件最简单的定义方式，它允许你将资源存储在设备上，而无需在每次加载页面时重新下载。你可以简单地列出要缓存的资源，但也可以更精确地控制缓存的处理方式。


    ### CACHE 部分


    可以通过 `CACHE` 指令在清单文件的特定部分中定义要缓存的文件。你可以用类似的方式定义多个部分，这有助于组织文件指示。此外，通过添加注释可以使文件更易于阅读，如下所示：


    ```

    CACHE MANIFEST


    # 我们的缓存资源


    CACHE:

    index.html

    styles/main.css

    scripts/main.js

    ```


    任何类型的文件都可以注册为缓存资源，甚至包括图片或服务器端脚本。当然，服务器端脚本会在执行后被缓存，因此使用此功能时要小心。这是因为缓存应用不仅存储数据，还存储资源元数据（如
    HTTP 标头）。


    ### NETWORK 部分


    使用清单文件会使 Web 应用以离线模式运行，这意味着未在清单文件中列出的文件将不会被下载，即使设备已连接到网络。此行为可以通过 `NETWORK` 部分改变。在该部分中，你可以指定当网络可用时应从服务器下载的资源，这对于应用的动态元素特别有用。


    该部分类似于 `CACHE` 部分，保存了一个在线白名单。然而，该部分的功能有所不同：每个 URL 都是一个前缀匹配模式。因此，你可以仅通过列出目录来定位该目录下的所有资源。注意不要多次无用地列出相同的前缀。


    在我们的上一个示例中，如果清单文件中只包含 `CACHE` 部分，Web 应用将无法正常工作，因为用于获取 RSS 源的代理将无法访问。要解决此问题，我们只需在清单中添加以下内容：


    ```

    NETWORK:

    proxy.php

    ```


    我们的代理使用查询字符串中的 `url` 参数来知道应该下载哪个 feed，但由于 `proxy.php` 是一个前缀，浏览器会授权访问完整的 URL。


    你也可以使用 `*` 通配符来允许访问所有资源。对于未在 `CACHE` 部分（优先级高于其他部分）列出的资源，这一规则自然会被考虑。当然，这使编写清单文件变得更加容易，并降低了忘记文件导致应用功能不完整的风险。


    ### FALLBACK 部分

    '
- fmt: '对于需要网络但未缓存资源的场景，如果网络不可用，可以定义一个或多个后备（fallback）部分。


    在这些部分下，行由空格或制表符分隔的元素对组成。第一个元素是后备命名空间，定义了一个前缀匹配模式，用于定位来自某些 URL 的一组资源，这与 `NETWORK`
    部分的做法相同。所有匹配此命名空间的资源都将被缓存，如果第二个元素列出的资源不可用，则将使用该缓存资源。


    为了观察此部分的行为，我们将指定一个静态的 RSS 提要（`default.xml`）作为默认值，用于网络不可用的情况。


    ```

    <?xml version="1.0" encoding="UTF-8" ?>


    <rss version="2.0">


    <channel>


    <title>Offline Application Cache</title>


    <description />


    [<link>http://www.apress.com/</link>](http://www.apress.com/%3C/link)


    <item>


    <title>Fallback Element</title>


    <description>This is a fallback resource cached to be used


    when the network is not available.</description>


    [<link>http://www.apress.com/</link>](http://www.apress.com/%3C/link)


    [<guid>http://www.apress.com/guid/</guid>](http://www.apress.com/guid/%3C/guid)


    <pubDate>Mon, 01 Aug 2011 00:00:00 +0000</pubDate>


    </item>


    </channel>


    </rss>

    ```


    相关文件将在清单中列出如下：


    ```

    FALLBACK:

    proxy.php default.xml

    ```


    因此，当网络不可用时，将使用 RSS 文件来代替代理调用，并为将要收集的每个提要添加唯一可用的元素。此部分不仅可用于网络不可用的情况，还可用于处理任何其他丢失文件的问题，例如
    HTTP 404 错误。


    但请注意，浏览器不一定使用最具体的前缀来获取相关资源；因此，声明顺序很重要。在以下示例中，第一行将用于所有后备情况，因为它将匹配所有资源，包括那些会被第二行匹配的资源。


    **第 15 章：更好地处理客户端数据存储**


    ```

    FALLBACK:

    ./ any.html

    proxy.php default.xml

    ```


    在这种情况下，你应该首先指定最具体的前缀，然后依次是较不具体的前缀。同时，考虑规划一个组织良好的目录结构，以使该过程更简单。这无论如何都可能对你的目录结构有益。


    ## 使用 JavaScript 控制缓存


    HTML5 允许通过附加到 `ApplicationCache` 对象的 JavaScript API 来控制缓存。每个拥有清单的页面都会自动附加一个 `ApplicationCache`
    对象实例；它可以通过 `DOMWindow` 对象访问。


    ```

    var cache = window.applicationCache;

    ```


    通过此实例，你将能够检查缓存的状态，例如通过检查清单文件是否已被考虑，读取其 `status` 属性。


    表 15-4 显示了当前页面缓存的所有可能状态。如果是 `UNCACHED` 状态，则表示你的清单文件尚未加载。在这种情况下，你通常应检查内容类型是否正确以及文件是否没有错误。


    **表 15-4.** `applicationCache` 状态常量


    **常量** | **描述**

    --- | ---

    `cache.UNCACHED` (0) | 文档未被缓存。

    `cache.IDLE` (1) | 文档可从缓存获取且是最新版本。这是页面首次加载，或应用在更新后重新加载且所有资源已加载完毕时的状态。

    `cache.CHECKING` (2) | 文档可从缓存获取，并且正在检查更新。

    `cache.DOWNLOADING` (3) | 文档可从缓存获取，并且当前正在下载更新或新资源。

    `cache.UPDATEREADY` (4) | 文档可从缓存获取，并且已完成下载更新或新资源。这些资源将在下次访问应用时可用。

    `cache.OBSOLETE` (5) | 可从缓存获取的文档已过时，这意味着清单不再可用。浏览器收到 HTTP 404 错误。'
  raw: 'For cases where the network is necessary to fetch a resource that is not cached
    but no network is available, it is possible to define one or several fallback
    sections.


    Under these sections, lines are built by space- or tab-separated element couples.
    The first element is a fallback namespace defining a prefix match pattern that
    will let you target a set of resources from some URL, as done under the NETWORK
    section. All


    resources matching this namespace will be cached, and if the resource listed as
    the second element is not available, this will be used instead.


    To observe the behavior of this section, we are going to specify a static RSS
    feed ( *default.xml*) as the default, for cases where the network is not available.


    <?xml version="1.0" encoding="UTF-8" ?>


    <rss version="2.0">


    <channel>


    <title>Offline Application Cache</title>


    <description />


    [<link>http://www.apress.com/</link>](http://www.apress.com/%3C/link)


    <item>


    <title>Fallback Element</title>


    <description>This is a fallback resource cached to be used


    when the network is not available.</description>


    [<link>http://www.apress.com/</link>](http://www.apress.com/%3C/link)


    [<guid>http://www.apress.com/guid/</guid>](http://www.apress.com/guid/%3C/guid)


    <pubDate>Mon, 01 Aug 2011 00:00:00 +0000</pubDate>


    </item>


    </channel>


    </rss>


    The relevant files will be listed in the manifest as follows:


    FALLBACK:


    proxy.php default.xml


    Thus, when the network is unavailable, the RSS file will be used in place of the
    proxy call, and the only available element will be added for every feed to be
    gathered. You can use this section not only for unavailable networks but also
    to handle any other missing file problem, such as HTTP 404 errors.


    Beware, however, that the browser will not necessarily use the most specific prefix
    to use the relevant resource; hence, the declaration order is important. In the
    following example, the first line will be used for all fallbacks, because it will
    match all resources, including those that would be matched by the second line.


    CHAPTER 15: A Better Handling of Client-Side Data Storage


    FALLBACK:


    **./ any.html**


    proxy.php default.xml


    In such a case, you should specify the most specific prefixes first, moving down
    to the less specific. Also consider thinking a well-organized directory structure
    to make the process easier. This will probably be beneficial for your directory
    structure anyway.


    Controlling the Cache with JavaScript


    HTML5 allows control over the cache based on a JavaScript API attached to an


    ApplicationCache object. Every page that has a manifest automatically has an instance
    of the ApplicationCache object attached to it; it can be accessed from the DOMWindow
    object.


    var cache = window.applicationCache;


    With this instance, you will be able to check the state of the cache, for instance
    by checking that the manifest file has been considered, reading its status property.


    Table 15–4 shows all the possible states for the cache of the current page. If
    it is UNCACHED, your manifest file has not been loaded. In such a case, you should
    typically check that the content type is correct and that your file holds no errors.


    Table 15–4\. *applicationCache* State Constants


    **Constant Description**


    *cache*.UNCACHED (0)


    The document isn’t cached.


    *cache*.IDLE (1)


    *The document is available from cache and is the most recent. This


    is the state when the page is loaded for the first time, or the


    application has been reloaded after an update, and all resources


    have been loaded.


    *cache*.CHECKING (2)


    *The document is available from cache and is checking for an


    update.


    *cache*.DOWNLOADING (3)


    The document is available from cache and is currently downloading


    updates or new resources.


    *cache*.UPDATEREADY (4)


    The document is available from cache and has finished


    downloading updates or new resources. These will be available on


    the next access to the application.


    *cache*.OBSOLETE (5)


    The document available from cache is obsolete, which means the


    manifest is no longer available. The browser receives an HTTP 404'
