    \n# 第 15 章  \n更好地处理客户端数据存储\n\n多年来，当需要在客户端存储数据以增强页面功能或使其正常工作，开发者只能依赖 Cookie。尽管这对各种应用来说运行良好，但\
    \ Cookie 存在局限性，使其不太适合开发复杂功能。在存储标识符或会话信息（如购物车数据）时，大小限制不是问题，但在处理更复杂的任务（例如日历同步）时，这些限制就变得难以应对了。\n\
    \n这并不意味着客户端存储不是一种有益的做法：限制客户端和服务器之间传输的数据量自然会提高页面的响应性，从而带来更好的用户体验。然而，在处理 Cookie\
    \ 时，这只有部分是正确的，因为 Cookie 会随每个请求（无论是下载图像、样式表还是其他任何内容）一起发送，无谓地使每次传输的每个元素变得更重。\n\n\
    在本章中，你将深入了解通过 JavaScript API 提供给开发者的新的客户端存储选项，并学习如何使用 HTML5 的新功能正确处理离线模式。\n\n\
    ## 不同的存储区域\n\n为了使客户端存储的持久性更加灵活，并突破 Cookie 带来的限制，现在可以依赖由 WHATWG 维护的 Web Storage\
    \ API。该规范定义了一个新的 `Storage` 接口，该接口由 `window` 对象的全新 `localStorage` 和 `sessionStorage`\
    \ 属性实现。\n\n与 Cookie 相比，这种存储模式的优势之一是大小限制为 5MB 而不是 4KB；此限制适用于完全限定域名 (FQDN)。一旦达到此配额，你将无法再向客户端存储数据，并会收到一个\
    \ `QUOTA_EXCEEDED_ERR`（图 15-1）。\n\n![](img/index-454_1.jpg)\n\n**图 15-1.** 尝试存储超出最大限制的数据时会发送错误\n\
    \n可以说，`sessionStorage` 属性类似于会话 Cookie，它跨浏览上下文可用，并在用户退出浏览应用程序时被删除。然而，在讨论 Cookie\
    \ 或 `sessionStorage` 属性时，*会话* 的含义略有不同。`localStorage` 属性的行为或多或少类似于永不过期的 Cookie，这意味着使用此属性存储的数据将持续存在，直到被脚本或用户操作删除。这两个属性的工作方式与\
    \ Cookie 非常相似，只是访问存储的数据不像 Cookie 那样受路径影响，而是基于方案/主机/端口的源规则。\n\n## 如何使用新的存储能力\n\n\
    使用 Web Storage API 存储数据，如同创建 Cookie 一样，依赖于键/值对。键可以定义为任何有效的字符串——包括空字符串。在 Mobile\
    \ Safari 中 API 的当前实现中，值也只能是有效的字符串。因此，如果你尝试存储一个对象，存储的数据将是调用了其 `toString()` 方法后的对象。根据规范，你应该能够以克隆（而非引用）的形式存储多种对象，因此存储对象的功能应该很快就能实现。\n\
    \n这种类型限制适用于所有对象，包括数值。例如，如果你想使用一个键来存储计数器，不要忘记在递增或递减之前，将检索到的数据转换回 `Number` 对象，否则字符串只会简单地与\
    \ 1 拼接。另外，由于字符串使用 UTF-16 存储，一个字符占用两个字节，因此占用更多空间；因此，例如要存储 `Date` 对象，你应该存储 `getTime()`\
    \ 方法的值，而不是 `toString()` 方法返回的值。\n\n然而，与使用 Cookie 设置或获取值的过程相比，这些限制微不足道。使用 Web Storage\
    \ API 进行这些基本操作非常简单。该 API 提供了专门的方法来插入、读取或删除值。\n\n```\n/* 写入数据 */\nwindow.localStorage.setItem(\"\
    myKey\", \"myValue\");\nwindow.localStorage.setItem(\"anotherKey\", \"myOtherValue\"\
    );\n\n/* 读取数据 */\nvar value1 = window.localStorage.getItem(\"myKey\");\nvar value2\
    \ = window.localStorage.getItem(\"anotherKey\");\n\n/* 删除数据 */\nwindow.localStorage.removeItem(\"\
    myKey\");\n```\n"
