    No styles are applied, and there hardly is any content. However, you will notice
    that our template skeleton has several classes and IDs. These are going to help
    you target elements and style them to look like a proper application.


    Create a new folder, still at the root of your site, called *styles*. Now, create
    a CSS file as you did a few minutes ago for the HTML file, and call it *main.css*.
    This file is already called in the head of your document, so whatever you change
    in it should be applied immediately, so let’s add some style.


    Following the recommendations we went through earlier, the first style rule you
    will add to your style sheet will state that the document should take the entire
    screen height. To mimic the iOS UI, you will also set the generic font to Helvetica.


    Further chapters will get deeper into CSS possibilities, so we will not explain
    everything here. Simply, you could be unfamiliar with the -webkit- prefix. It
    is a proprietary prefix (which means it isn’t interpreted by browsers other than
    WebKit-based browsers) used for properties and values that are either specific
    to the browser or considered unstable regarding the CSS3 specifications or their
    implementation.


    html { height: 100%; }


    body {


    height: 100%;


    margin: 0;


    font-family: helvetica, sans-serif;


    -webkit-text-size-adjust: none;


    }


    To always make text as readable as possible, Mobile Safari automatically changes
    the size of text each time the viewport orientation changes. This isn’t always
    desirable, because it can break your layout or end up looking odd if you design
    your pages in a particular manner. To prevent this behavior and keep control over
    the appearance of your pages, we set the -webkit-text-size-adjust to none, which
    disables automatic text resizing.


    CHAPTER 4: The Anatomy of a Web Application


    Next, using the -webkit-gradient() background extension, we create a general


    background without even using images. This background is built so that all you
    have to do to change the color of the element without losing the iOS look is change
    the


    background-color property. As for the .view rule, it applies to the main container
    of the document views.


    body {


    -webkit-background-size: 100% 21px;


    background-color: #c5ccd3;


    background-image:


    -webkit-gradient(linear, left top, right top,


    color-stop(.75, transparent),


    color-stop(.75, rgba(255,255,255,.1)) );


    -webkit-background-size: 7px;


    }


    .view {


    min-height: 100%;


    overflow: auto;


    }


    Then, add the header style using the same rule applied to the body background.


    .header-wrapper {


    height: 44px;


    font-weight: bold;


    text-shadow: rgba(0,0,0,0.7) 0 -1px 0;


    border-top: solid 1px rgba(255,255,255,0.6);


    border-bottom: solid 1px rgba(0,0,0,0.6);


    color: #fff;


    background-color: #8195af;


    background-image:


    -webkit-gradient(linear, left top, left bottom,


    from(rgba(255,255,255,.4)),


    to(rgba(255,255,255,.05)) ),


    -webkit-gradient(linear, left top, left bottom,


    from(transparent),


    to(rgba(0,0,64,.1)) );


    background-repeat: no-repeat;


    background-position: top left, bottom left;


    -webkit-background-size: 100% 21px, 100% 22px;


    -webkit-box-sizing: border-box;


    }


    .header-wrapper h1 {


    text-align: center;


    font-size: 20px;


    line-height: 44px;


    margin: 0;


    }


    And finally, this is what will allow to display our content with style:


    .group-wrapper {


    margin: 9px;


    }


    .group-wrapper h2 {


    color: #4c566c;


    ![](index-107_1.jpg)


    CHAPTER 4: The Anatomy of a Web Application


    font-size: 17px;


    line-height: 0.8;


    font-weight: bold;


    text-shadow: #fff 0 1px 0;


    margin: 20px 10px 12px;


    }


    .group-wrapper p {


    background-color: #fff;


    -webkit-border-radius: 10px;


    font-size: 17px;


    line-height: 20px;


    margin: 9px 0 20px;


    border: solid 1px #a9abae;


    padding: 11px 9px 12px;


    }


    The last exciting feature presented here is the border-radius property, which
    will let you bring rounded borders to any kind of element. Now, reload your page
    in a browser


    (Figure 4–7). Does that ring a bell?


    Figure 4–7\. Et voila, your first web app!


    Hiding Mobile Safari’s Address Bar


    As long as you view your site in full-screen mode, this is all very well. However,
    you can’t be absolutely sure that your end user will use it that way. A desirable
    trick would be to hide the address bar—and the error console, if necessary—when
    the site is seen in 86


    CHAPTER 4: The Anatomy of a Web Application'
  trans: "\n# Web 应用结构剖析\n\n掌握了以上基础知识后，我们就可以开始构建 Web 应用了。为了条理清晰，我们将演示如何从零开始搭建一个基础项目。\n\
    \n这样能让本书各章节中的示例更易于理解，并且随着你对这个模板的扩展，它也能极大地提升你的工作效率。遵循本章前面提出的指南，并为了简化操作，我们将坚持使用\
    \ iOS 的默认颜色和尺寸标准。同时，我们也会借此机会介绍一些技巧，教你如何用 CSS 替代过去用图片来实现的效果（这些技巧将在后续相关章节中进行详细解释）。\n\
    \n## 在 Komodo Edit 中创建文档模板\n\n要在 Komodo Edit 中创建新项目，请选择 **文件** > **新建** > **新建项目**。将新项目命名为\
    \ `Web App Template` 或你喜欢的任何名称，并选择保存文件的目录。如果项目侧边栏已激活，你将在其中看到你的新项目，显示为你指定的名称和 Komodo\
    \ Edit 的项目扩展名 `.kpf`。如果侧边栏未打开，你可以从 **视图** 菜单中激活它，具体路径为 **视图** > **标签与侧边栏** > **项目**。\n\
    \n> **注意：** 此项目定义基于 Komodo Edit 5.x 版本。在编辑器的新版本中，菜单布局和选项可能会有所不同。\n\n现在，我们来添加你的第一个\
    \ HTML 文件。你可以通过右键单击侧边栏中的项目名称，然后选择 **添加新文件**，或者选择菜单项 **项目** > **Web App Template.kpf**\
    \ > **添加新文件** 来完成此操作。此时会弹出一个新窗口。从右侧列中选择适当的文件类型，这里选 HTML。在列下方的文本字段中，输入文件名 `index.html`；你会注意到保存文件的正确文件夹已被选中，因此只需单击\
    \ **打开**。你的新文件将显示在编辑区域中。\n\n这个文件并非空白。由于你选择了 HTML 文件类型，Komodo Edit 已经为你完成了一些工作，基本结构已经存在。然而，为了完全满足我们的需求，我们需要更改或添加一些元素。你的文件在下一步骤中应如下所示：\n\
    \n```html\n<!DOCTYPE html>\n<html>\n<head>\n    <title>Web 应用模板</title>\n    <meta\
    \ name=\"apple-mobile-web-app-capable\" content=\"yes\">\n    <meta name=\"apple-mobile-web-app-status-bar-style\"\
    \ content=\"default\">\n    <meta name=\"viewport\" content=\"initial-scale=1.0;\n\
    \    maximum-scale=1.0; user-scalable=no\">\n    <link rel=\"stylesheet\" href=\"\
    styles/main.css\">\n    <script src=\"scripts/main.js\"></script>\n</head>\n<body>\n\
    \    <div class=\"view\">\n        <div class=\"header-wrapper\">\n          \
    \  <h1>Web 应用标题</h1>\n        </div>\n        <div class=\"group-wrapper\">\n\
    \            <h2>iPhone</h2>\n            <p>你好，世界！</p>\n        </div>\n    </div>\n\
    </body>\n</html>\n```\n\n你可以看到本章一直在讨论的特殊标签。当然，如果你希望它们都能按预期工作，你需要在根文件夹中创建一个 `images`\
    \ 文件夹，并按照之前说明放入一个名为 `startup.png` 的文件。你应该注意到，我们更改了 Komodo Edit 默认 HTML 文件中的文档类型声明（DOCTYPE）。这是我们将在本书中使用的\
    \ HTML5 文档类型声明，目的是在创建有效文档的同时，展示 HTML5 的新特性。使用大写字母是前端开发者的老习惯；自 HTML5 起，文档类型声明不区分大小写。\n\
    \n如果你现在在浏览器中打开此文件（或通过菜单 **视图** > **在浏览器中预览** 直接在 Komodo Edit 中查看），你可能会觉得它平淡无奇。没有应用任何样式，也几乎没有什么内容。然而，你会注意到我们的模板骨架中包含了一些类和\
    \ ID。这些将帮助你定位元素，并将它们样式化为看起来像真正的应用。\n\n在你的站点根目录下创建一个名为 `styles` 的新文件夹。然后，像几分钟前创建\
    \ HTML 文件那样，创建一个 CSS 文件，并将其命名为 `main.css`。此文件已在文档的 `<head>` 中被引用，因此你对它的任何更改都应立即生效。现在让我们添加一些样式。\n\
    \n根据我们之前讨论的建议，你添加到样式表中的第一条样式规则应规定文档占据整个屏幕高度。为了模拟 iOS 用户界面，你还需要将通用字体设置为 Helvetica。\n\
    \n后续章节将深入探讨 CSS 的各种可能性，因此我们在此不会解释全部内容。不过，你可能会对 `-webkit-` 前缀感到陌生。这是一个专有前缀（意味着只有基于\
    \ WebKit 的浏览器才能解释），用于那些特定于浏览器或被认为在 CSS3 规范或其实现方面不稳定的属性和值。\n\n```css\nhtml { height:\
    \ 100%; }\n\nbody {\n    height: 100%;\n    margin: 0;\n    font-family: helvetica,\
    \ sans-serif;\n    -webkit-text-size-adjust: none;\n}\n```\n\n为了始终使文本尽可能易读，Mobile\
    \ Safari 会在每次视口方向改变时自动更改文本大小。这并非总是理想的，因为如果你以特定方式设计页面，它可能会破坏布局或最终看起来很奇怪。为防止此行为并保持对页面外观的控制，我们将\
    \ `-webkit-text-size-adjust` 设置为 `none`，从而禁用自动文本大小调整。\n\n接下来，使用 `-webkit-gradient()`\
    \ 背景扩展，我们无需使用图片即可创建通用背景。构建此背景的方式是，你只需更改 `background-color` 属性，就能在不丢失 iOS 外观的情况下更改元素的颜色。至于\
    \ `.view` 规则，它应用于文档视图的主容器。\n\n```css\nbody {\n    -webkit-background-size: 100%\
    \ 21px;\n    background-color: #c5ccd3;\n    background-image:\n        -webkit-gradient(linear,\
    \ left top, right top,\n            color-stop(.75, transparent),\n          \
    \  color-stop(.75, rgba(255,255,255,.1)) );\n    -webkit-background-size: 7px;\n\
    }\n\n.view {\n    min-height: 100%;\n    overflow: auto;\n}\n```\n\n然后，使用应用于 body\
    \ 背景的相同规则添加标题样式。\n\n```css\n.header-wrapper {\n    height: 44px;\n    font-weight:\
    \ bold;\n    text-shadow: rgba(0,0,0,0.7) 0 -1px 0;\n    border-top: solid 1px\
    \ rgba(255,255,255,0.6);\n    border-bottom: solid 1px rgba(0,0,0,0.6);\n    color:\
    \ #fff;\n    background-color: #8195af;\n    background-image:\n        -webkit-gradient(linear,\
    \ left top, left bottom,\n            from(rgba(255,255,255,.4)),\n          \
    \  to(rgba(255,255,255,.05)) ),\n        -webkit-gradient(linear, left top, left\
    \ bottom,\n            from(transparent),\n            to(rgba(0,0,64,.1)) );\n\
    \    background-repeat: no-repeat;\n    background-position: top left, bottom\
    \ left;\n    -webkit-background-size: 100% 21px, 100% 22px;\n    -webkit-box-sizing:\
    \ border-box;\n}\n\n.header-wrapper h1 {\n    text-align: center;\n    font-size:\
    \ 20px;\n    line-height: 44px;\n    margin: 0;\n}\n```\n\n最后，以下代码将使我们可以用样式来展示内容：\n\
    \n```css\n.group-wrapper {\n    margin: 9px;\n}\n\n.group-wrapper h2 {\n    color:\
    \ #4c566c;\n    font-size: 17px;\n    line-height: 0.8;\n    font-weight: bold;\n\
    \    text-shadow: #fff 0 1px 0;\n    margin: 20px 10px 12px;\n}\n\n.group-wrapper\
    \ p {\n    background-color: #fff;\n    -webkit-border-radius: 10px;\n    font-size:\
    \ 17px;\n    line-height: 20px;\n    margin: 9px 0 20px;\n    border: solid 1px\
    \ #a9abae;\n    padding: 11px 9px 12px;\n}\n```\n\n这里介绍的最后一个令人兴奋的特性是 `border-radius`\
    \ 属性，它让你可以为任何元素添加圆角边框。现在，在浏览器中重新加载你的页面（图 4-7）。是不是很眼熟？\n\n**图 4-7.** 瞧，你的第一个 Web\
    \ 应用！\n\n## 隐藏 Mobile Safari 的地址栏\n\n只要用户以全屏模式查看你的站点，这都没问题。然而，你无法完全确定你的最终用户会以那种方式使用它。一个理想的技巧是，当站点在没有全屏模式的浏览器中显示时，隐藏地址栏——以及错误控制台（如果需要的话）。\n"
- fmt: "# Mobile Safari\n\nTake a look at the situation. These page elements disappear\
    \ as the user pans the viewport. The page will take up at least 100 percent of\
    \ the view height, which means that it won’t necessarily be high enough to cover\
    \ the whole screen if part of its elements move out of focus. Therefore, our goal\
    \ will be to readjust the page’s height if needed so it occupies 100 percent of\
    \ the viewport, even if part of it is hidden.\n\nLet’s get to the code. Create\
    \ a new directory in your project named `scripts`. From Komodo Edit, create a\
    \ JavaScript file called `main.js`, and copy the following code to it:\n\n```\n\
    if (!window.navigator.standalone) {\n   document.addEventListener(\"DOMContentLoaded\"\
    , adjustHeight, false);\n}\n\nfunction adjustHeight() {\n   var html = document.documentElement;\n\
    \   var size = window.innerHeight;\n   html.style.height = (size + size) + \"\
    px\";\n   window.setTimeout(function() {\n      if (window.pageYOffset == 0) {\n\
    \         window.scrollTo(0, 0);\n      }\n      html.style.height = window.innerHeight\
    \ + \"px\";\n   }, 0);\n}\n```\n\nWhat this snippet does is check for stand-alone\
    \ mode; if the user is not viewing your page full-screen, the `adjustHeight()`\
    \ function will be associated with the DOM finishing loading. The function makes\
    \ the page twice the height of the screen, which will be enough in most cases,\
    \ because user interface elements will rarely take as much space.\n\nThe `window.setTimeout()`\
    \ gives the page enough time to be modified before the magic occurs. The magic\
    \ takes two steps: we move the page up so the top of the page is at the top of\
    \ the screen with the `scrollTop()` method; then, we readjust the page height\
    \ to make it just fit the screen height again.\n\nYou may find it strange to readjust\
    \ the page position only if the vertical page offset equals 0. Actually, as long\
    \ as a single pixel hasn’t moved out of the screen, the `pageYOffset` will have\
    \ a value of 0. Even if the user pans half the height of the address bar, the\
    \ `pageYOffset` value will stay at 0. Thus, we can maintain the page position\
    \ call after call. The result is that when the user loads the page, it will show\
    \ almost full-screen, giving maximum focus to the application.\n\n## Handling\
    \ Screen Orientation Changes\n\nHowever, because the height of the page has been\
    \ modified dynamically, if the user rotates the screen when not in full-screen\
    \ mode, the page would become too high for the screen. We must add an event listener\
    \ for this case also. Note that the `pageYOffset` test is especially useful here,\
    \ because the position won’t be reinitialized with each rotation. Here is the\
    \ line that handles rotation:\n\n`window.addEventListener(\"orientationchange\"\
    , adjustHeight, false);`\n\n## CHAPTER 4: The Anatomy of a Web Application\n\n\
    This code will let us know when the user turns his device. The event listener\
    \ must be set on the `DOMWindow` object attached to the current window, not on\
    \ the document. You will be able at any time to check the value of the orientation\
    \ using the `window.orientation` property, as done in the following example, for\
    \ instance to modify styles appropriately:\n\n```\nswitch (window.orientation)\
    \ {\n   /* Normal orientation, home button on the bottom */\n   case 0:\n    \
    \  document.body.className = \"portrait\";\n      break;\n   /* Rotated 90 degrees\
    \ to the left */\n   case 90:\n      document.body.className = \"landscape\";\n\
    \      break;\n   /* Upside down */\n   case 180:\n      document.body.className\
    \ = \"portrait\";\n      break;\n   /* Rotated 90 degrees to the right */\n  \
    \ case -90:\n      document.body.className = \"portrait\";\n      break;\n}\n\
    ```\n\nThis way, we avoid using a timer, which would have been hard on the battery,\
    \ to regularly check the dimensions of the window for changes—the notification\
    \ is automatic.\n\nNote that on the iPad you can also target one orientation or\
    \ the other using CSS or the link tag with the `media` attribute.\n\n```\n<link\
    \ rel=\"stylesheet\" media=\"all and (orientation:portrait)\" href=\"portrait.css\"\
    >\n<link rel=\"stylesheet\" media=\"all and (orientation:landscape)\" href=\"\
    landscape.css\">\n\n<!-- Or in a style tag or stylesheet -->\n<style>\n@media\
    \ all and (orientation:portrait) { /* Your style here */ }\n@media all and (orientation:landscape)\
    \ { /* Your style here */ }\n</style>\n```"
  raw: 'Mobile Safari. Take a look at the situation. These page elements disappear
    as the user pans the viewport. The page will take up at least 100 percent of the
    view height, which means that it won’t necessarily be high enough to cover the
    whole screen if part of its elements move out of focus. Therefore, our goal will
    be to readjust the page’s height if needed so it occupies 100 percent of the viewport,
    even if part of it is hidden.


    Let’s get to the code. Create a new directory in your project named *scripts*.
    From Komodo Edit, create a JavaScript file called *main.js*, and copy the following
    code to it: if (!window.navigator.standalone) {


    document.addEventListener("DOMContentLoaded", adjustHeight, false);


    }


    function adjustHeight() {


    var html = document.documentElement;


    var size = window.innerHeight;


    html.style.height = (size + size) + "px";


    window.setTimeout(function() {


    if (window.pageYOffset == 0) {


    window.scrollTo(0, 0);


    }


    html.style.height = window.innerHeight + "px";


    }, 0);


    }


    What this snippet does is check for stand-alone mode; if the user is not viewing
    your page full-screen, the adjustHeight() function will be associated with the
    DOM finishing loading. The function makes the page twice the height of the screen,
    which will be enough in most cases, because user interface elements will rarely
    take as much space.


    The window.setTimeout() gives the page enough time to be modified before the magic
    occurs. The magic takes two steps: we move the page up so the top of the page
    is at the top of the screen with the scrollTop() method; then, we readjust the
    page height to make it just fit the screen height again.


    You may find it strange to readjust the page position only if the vertical page
    offset equals 0\. Actually, as long as a single pixel hasn’t moved out of the
    screen, the pageYOffset will have a value of 0. Even if the user pans half the
    height of the address bar, the pageYOffset value will stay at 0\. Thus, we can
    maintain the page position call after call. The result is that when the user loads
    the page, it will show almost full-screen, giving maximum focus to the application.


    Handling Screen Orientation Changes


    However, because the height of the page has been modified dynamically, if the
    user rotates the screen when not in full-screen mode, the page would become too
    high for the screen. We must add an event listener for this case also. Note that
    the pageYOffset test is especially useful here, because the position won’t be
    reinitialized with each rotation. Here is the line that handles rotation:


    window.addEventListener("orientationchange", adjustHeight, false);


    CHAPTER 4: The Anatomy of a Web Application


    This code will let us know when the user turns his device. The event listener
    must be set on the DOMWindow object attached to the current window, not on the
    document. You will be able at any time to check the value of the orientation using
    the window.orientation property, as done in the following example, for instance
    to modify styles appropriately: switch (window.orientation) {


    /* Normal orientation, home button on the bottom */


    case 0:


    document.body.className = "portrait";


    break;


    /* Rotated 90 degrees to the left */


    case 90:


    document.body.className = "landscape";


    break;


    /* Upside down */


    case 180:


    document.body.className = "portrait";


    break;


    /* Rotated 90 degrees to the right */


    case -90:


    document.body.className = "portrait";


    break;


    }


    This way, we avoid using a timer, which would have been hard on the battery, to


    regularly check the dimensions of the window for changes—the notification is automatic.


    Note that on the iPad you can also target one orientation or the other using CSS
    or the link tag with the media attribute.


    <link rel="stylesheet" media="all and (orientation:portrait)" href="portrait.css">


    <link rel="stylesheet" media="all and (orientation:landscape)" href="landscape.css">


    <!-- Or in a style tag or stylesheet -->


    <style>


    @media all and (orientation:portrait) { /* Your style here */ }


    @media all and (orientation:landscape) { /* Your style here */ }


    </style>'
  trans: "\n# Mobile Safari\n\n观察一下这种情况。当用户平移视口时，这些页面元素会消失不见。页面将至少占据视口高度的 100%，这意味着如果页面部分元素移出焦点区域，其高度未必足以覆盖整个屏幕。因此，我们的目标是在必要时重新调整页面高度，使其始终占据视口的\
    \ 100%，即便部分内容被隐藏。\n\n我们直接来看代码。在你的项目中创建一个名为 `scripts` 的新目录。在 Komodo Edit 中，创建一个名为\
    \ `main.js` 的 JavaScript 文件，并将以下代码复制进去：\n\n```\nif (!window.navigator.standalone)\
    \ {\n   document.addEventListener(\"DOMContentLoaded\", adjustHeight, false);\n\
    }\n\nfunction adjustHeight() {\n   var html = document.documentElement;\n   var\
    \ size = window.innerHeight;\n   html.style.height = (size + size) + \"px\";\n\
    \   window.setTimeout(function() {\n      if (window.pageYOffset == 0) {\n   \
    \      window.scrollTo(0, 0);\n      }\n      html.style.height = window.innerHeight\
    \ + \"px\";\n   }, 0);\n}\n```\n\n这段代码的作用是检查是否处于独立模式；如果用户没有全屏浏览你的页面，`adjustHeight()`\
    \ 函数将会与 DOM 加载完成事件关联。该函数将页面高度设为屏幕高度的两倍，这在大多数情况下都足够，因为用户界面元素很少会占据那么多空间。\n\n`window.setTimeout()`\
    \ 为页面提供了足够的时间，以便在奇迹发生前完成修改。这个奇迹分两步完成：首先，我们使用 `scrollTop()` 方法将页面上移，使页面顶部与屏幕顶部对齐；然后，我们重新调整页面高度，使其再次恰好适应屏幕高度。\n\
    \n你可能会觉得奇怪，为什么只在垂直页面偏移量等于 0 时才重新调整页面位置。实际上，只要没有单个像素移出屏幕，`pageYOffset` 的值就为 0。即使用户平移了地址栏一半的高度，`pageYOffset`\
    \ 的值仍然保持为 0。因此，我们可以一次又一次地保持页面位置不变。这样做的结果是，当用户加载页面时，页面几乎会以全屏模式显示，从而将最大的关注度集中到应用程序上。\n\
    \n## 处理屏幕方向变化\n\n然而，由于页面高度已被动态修改，如果用户在非全屏模式下旋转屏幕，页面高度可能会超出屏幕范围。为此，我们也必须添加一个事件监听器。请注意，`pageYOffset`\
    \ 测试在这里特别有用，因为页面位置不会随着每次旋转而重置。以下是处理旋转的代码行：\n\n`window.addEventListener(\"orientationchange\"\
    , adjustHeight, false);`\n\n## 第 4 章：Web 应用的构成\n\n这段代码能让我们知道用户何时旋转了设备。事件监听器必须设置在附加到当前窗口的\
    \ `DOMWindow` 对象上，而不是文档（document）上。你可以随时使用 `window.orientation` 属性来检查方向的值，如下例所示，例如为了适当地修改样式：\n\
    \n```\nswitch (window.orientation) {\n   /* 正常方向，Home 键在底部 */\n   case 0:\n  \
    \    document.body.className = \"portrait\";\n      break;\n   /* 向左旋转 90 度 */\n\
    \   case 90:\n      document.body.className = \"landscape\";\n      break;\n \
    \  /* 倒置 */\n   case 180:\n      document.body.className = \"portrait\";\n   \
    \   break;\n   /* 向右旋转 90 度 */\n   case -90:\n      document.body.className =\
    \ \"portrait\";\n      break;\n}\n```\n\n通过这种方式，我们避免了使用会消耗大量电量的定时器来定期检查窗口尺寸变化——通知是自动的。\n\
    \n请注意，在 iPad 上，你也可以使用 CSS 或带有 `media` 属性的 link 标签来锁定某个特定的方向。\n\n```\n<link rel=\"\
    stylesheet\" media=\"all and (orientation:portrait)\" href=\"portrait.css\">\n\
    <link rel=\"stylesheet\" media=\"all and (orientation:landscape)\" href=\"landscape.css\"\
    >\n\n<!-- 或者在 style 标签或样式表中使用 -->\n<style>\n@media all and (orientation:portrait)\
    \ { /* 此处是你的样式 */ }\n@media all and (orientation:landscape) { /* 此处是你的样式 */ }\n\
    </style>\n```\n"
- fmt: "# This is possible only on the iPad. For other devices, a good practice is\
    \ to add a class or id on the body tag with JavaScript to apply different styles\
    \ when the orientation changes.\n\n## Final Touch\n\nThe previous piece of JavaScript\
    \ handles the viewport if the user is opening your application in Mobile Safari.\
    \ If he is not, we have seen that you should handle links with JavaScript; we\
    \ are going to add the relevant script to our `main.js` to prevent the default\
    \ behavior in this case. For that, add an event listener as follows, and append\
    \ the `clickHandler()` function to your *scripts* file:\n\n```\nif (!window.navigator.standalone)\
    \ {\n    document.addEventListener(\"DOMContentLoaded\", adjustHeight, true);\n\
    \    window.addEventListener(\"orientationchange\", adjustHeight, true);\n} else\
    \ {\n    /* Target only standalone mode */\n    document.addEventListener(\"click\"\
    , clickHandler, true);\n}\n```\n\n## Ready to Go\n\nThe files and file structure\
    \ you have built here are just what you will need to start most web app projects.\
    \ If you’ve installed Komodo Edit, you can now save this project as a template\
    \ to easily reuse it in your regular working process. To do this, choose your\
    \ project name from the Project menu, and click Create template from project.\
    \ The default location for templates is the *Template* folder in the user folder\
    \ that was created when Komodo Edit was installed. You will be able to create\
    \ new projects from this template from the Project menu by choosing New project\
    \ from template.\n\nIf you haven’t chosen to install Komodo Edit, we recommend\
    \ you find some other way to easily reuse this code and structure. From this chapter,\
    \ you have learned how important the requirements our template stub answers are\
    \ to the satisfaction of the user—and the success of your web app. Using templates\
    \ as helpers will help you quickly get past the somewhat annoying first stages\
    \ of the project. It also is a first step to make your web application meet its\
    \ primary goal: to be a proper application.\n\n---\n\n# Chapter 5: User Experience\
    \ and Interface Guidelines\n\nThe heart of the previous chapter is not the information\
    \ about screen dimensions, technical possibilities, or even understanding of how\
    \ iOS behaves on the iPhone, iPod touch, and iPad. Of course, you have to master\
    \ these aspects to build quality web applications for these devices, but the techniques\
    \ for doing so are simply tools to succeed in the process. The advice in this\
    \ book all comes down to the user. The touch-interaction system of Apple’s portable\
    \ devices establishes a specific relationship between the device and the user\
    \ that is definitely user-centric. This means that you, the developer, need to\
    \ seriously consider the design of your applications.\n\nApplied to computer development,\
    \ cognitive ergonomics is the practical science that aims to make an application’s\
    \ functionality easy to understand and access for the user.\n\nThe Apple engineers\
    \ have considered some of the ergonomics of the iOS already. For instance, the\
    \ Multi-Touch interaction model allows users to easily perform common tasks for\
    \ most sites, such as zooming, focusing, or opening a contextual menu.\n\nAn important\
    \ aspect of ergonomics in Apple products in general, and even more critically\
    \ on Apple portable devices, is aesthetic appeal. The iOS has a strong visual\
    \ identity that has been made even more recognizable by the success of native\
    \ applications tightly integrated into the iPhone’s GUI. Therefore, the quality\
    \ of an application from a user point of view is often judged by how its visual\
    \ quality compares to the iOS GUI.\n\nOf course, relying solely on design won’t\
    \ make your web application successful. Although a pretty face can allure users\
    \ into an application, if they don’t find the expected quality when actually using\
    \ it, they will quickly move on. This is especially true in the wildly competitive\
    \ field like application development.\n\nIn this chapter, we will go through a\
    \ number of rules and best practices that will help you build better web applications,\
    \ that is, applications where the user experience, which is different on mobile\
    \ devices than on desktop computers, is at its best.\n\n---\n\n### From the Web\
    \ on the Desktop to the Mobile Web\n\nIt is a common but dangerous mistake to\
    \ consider that the Web is the same regardless of the platform it is accessed\
    \ on. Although web applications are built using web technologies, they are completely\
    \ different from classic web pages. Obviously, device capabilities are different.\
    \ If you view a web application such as Gmail on Desktop Safari or Mobile Safari,\
    \ you will see a notably different interface.\n\nStill, using Gmail on your iPhone\
    \ is possible because Mobile Safari is meant to adapt to the limited screen real\
    \ estate. However, the experience for the user is not as good as when using an\
    \ iMac or even a MacBook. The scaling makes the content harder to read and interact\
    \ with, as demonstrated in Figure 5–1. As a result, Google tries to offer adapted\
    \ versions—with lighter interfaces, generally less features, and optimized loading\
    \ times—of its web applications for mobile devices.\n\n![Figure 5–1](index-112_1.jpg)\n\
    \n**Figure 5–1.** Although the rendering is the same between Desktop Safari and\
    \ Mobile Safari, the scaling does affect user experience\n\nA different screen\
    \ size doesn’t only mean a different view: changing devices implies a completely\
    \ different experience, with different behaviors and expectations. Developing\
    \ web applications, you should tightly relate interface and interaction schemes\
    \ to functionality, independently from the device. Likewise, web technologies\
    \ such as CSS or JavaScript should always be considered as tools that can be used\
    \ to define interfaces and interaction possibilities, inherent to specific functionality—but\
    \ should by no means dictate what the interface and functionality should be.\n\
    \n---\n\n### Forget the Desktop\n\nTypically, the desktop metaphor is one to forget,\
    \ together with the habit of intensive multitasking. Get used to the fact that\
    \ iOS devices—not to say all mobile devices—do not work that way. Using a desktop\
    \ computer, the end user can perform various tasks at a time, handling multiple\
    \ windows that he can, if he wants, display side by side at any time. For all\
    \ these tasks, he enjoys plenty screen estate and, most importantly, will interact\
    \ with the desktop using feature-rich devices, that is, a mouse and keyboard.\n\
    \nComputers embrace the desktop metaphor, and they can boast productivity tools\
    \ and a practical or playful approach to many activities. With iOS, though you\
    \ can have several background tasks such as playing music, downloading applications,\
    \ or fetching e-mail, running several native applications side by side isn’t possible.\
    \ iOS aims to let the end user efficiently accomplish one task at a time. The\
    \ small screen means the user successively focuses on one area—and hence one series\
    \ of actions—at a time.\n\n---\n\n### Change Navigation Habits\n\nWhen developing\
    \ for the mobile Web, it is important not to lose your end user halfway through\
    \ the web application experience. The traditional web experience lets the user\
    \ access all parts of the site from any other part of the site. This is usually\
    \ done using both a navigation bar and numerous internal links. As a user of the\
    \ Web, you’ve probably already been confronted with a site that you just couldn’t\
    \ figure out. If all went right, you found what you were looking for fast enough;\
    \ if not, like most users, you probably have moved to the next site.\n\nThis situation\
    \ is even more critical on the mobile Web. The user expects to find a clear, straightforward\
    \ path from one point to another. The important notion is that of *flow*."
