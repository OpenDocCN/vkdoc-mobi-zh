    ![](img/index-478_1.jpg)


    # 第 15 章：更好地处理客户端数据存储


    ## 删除数据库


    创建数据库非常简单，但删除数据库却可能更加棘手。


    无法通过 JavaScript 删除数据库，SQL 命令`DROP DATABASE`也不可用。幸运的是，删除数据库仍是可行的，但只能通过用户操作完成。这在开发阶段显然非常方便。


    ### 在桌面版 Safari 中


    在桌面版 Safari 及大多数基于 WebKit 的浏览器中，可通过偏好设置面板删除数据库。前往“Safari 偏好设置...”并选择“安全”选项卡，将出现如图
    15-5 所示的窗口。


    **图 15-5.** 桌面版 Safari 的安全面板


    在此窗口中，点击屏幕底部的“显示数据库”按钮，即可触发数据库列表。你可以通过“移除”按钮删除任意数据库。这样，你便能基于干净环境，根据需要多次测试代码。


    ### 在移动版 Safari 中


    在移动版 Safari 中，一旦创建数据库，浏览器偏好设置中会出现新的菜单项，如图 15-6 所示。由此，可通过“设置”应用，在“Safari 数据库”选项下访问数据库列表。


    ![](img/index-479_1.jpg)


    **图 15-6.** 移动版 Safari 中的数据库偏好设置


    只需点击屏幕右上角的“编辑”按钮，然后选择要删除的数据库即可。此处提供的选项不如桌面版丰富；例如，无法为数据库设置初始大小。


    ## 安全再探讨


    出于安全原因，Web Storage 的相同限制同样适用于网络数据库，即对方案/主机/端口三元组的严格限制。不同子域间的数据访问可通过 HTML5 跨文档消息传递
    API 实现，如第 11 章所述。


    在存储关键数据（如用户密码或个人隐私信息）时，应谨慎使用 Web 数据库。建议采用不可逆加密方式（如 MD5），因为可逆加密意味着加密密钥将隐藏在代码某处。当然，由于移动版
    Safari 没有 Web 检查器，你可能会合理认为数据库是安全的，但网页应用可在任意浏览器中查看，因此应采取更严格的安全措施以防范更大风险。


    使用网络数据库时需特别警惕的安全风险是 SQL 注入，这在构建查询语句时应格外小心。此类攻击常见于拼接查询中，当变量中的单引号未被转义时，其他查询语句便可能被插入。由于请求可在客户端读取，这种攻击尤为容易实施。以下是用户输入名称并传入查询的示例：


    ```

    var name = "''; DELETE FROM Source --";

    var sql = "SELECT * FROM Source WHERE Name=''" + name + "'' AND URL IS NOT NULL";

    ```


    分号是指令分隔符，双连字符（`--`）标记注释开始。因此，上述代码将被解释为清空`Source`表：


    ```

    SELECT * FROM Source WHERE Name=''''; DELETE FROM Source --'' AND URL IS NOT NULL;

    ```


    防范此问题的首要步骤当然是转义用户输入中的所有单引号（将其替换为两个单引号`''''`），但更推荐使用安全的`executeSql()`方法，传入参数数组。


    ```

    var sql = "SELECT * FROM Source WHERE Name=? AND URL IS NOT NULL";

    transaction.executeSql(sql, [name]);

    ```


    如前所述，这样脚本引擎将自动用表中的对应值替换每个问号，从而杜绝注入风险。在上线前，务必仔细检查代码，对查询语句及参数列表进行彻底审查。


    ## 离线网页应用缓存


    除新增的存储功能外，借助 HTML5 带来的缓存能力，你还可以将全部或部分网页应用资源存储在用户设备上，实现离线访问。这能让你的网页应用更进一步接近原生应用体验——根据用户对应用的使用方式，他们或许感受不到在线与离线模式的区别。此外，这还能在任何情况下缩短加载时间。该规范在
    iOS 2.1 及以上版本的移动版 Safari 中得到支持。


    ### 工作原理是什么？


    当页面首次在浏览器中加载时，会同时加载一个清单文件，其中包含处理应用资源的规则。这样，后续访问该应用时，相关文件将按预期缓存，而不会从服务器重新加载。


    一旦清单文件被读取，除非清单文件本身发生变更，否则任何标记为缓存的文件都不会再向服务器检查或重新加载。清单文件是按字节精确比较的，这意味着修改日期变更不会强制重新评估。服务器上其他文件的变更，或指示文件更新版本的
    HTTP 头信息，都不会触发浏览器重新下载。


    但请始终牢记：缓存更新后，客户端不会立即使用新版本文件，而是需要刷新网页应用后才能生效——这与桌面计算机的更新机制类似。因此，最好能通知用户有新版本文件可用。这可通过特定
    API 实现，该 API 允许你控制缓存并在文件更新期间接收通知。我们将在后续章节中介绍相关事件。


    ### 清单文件


    清单文件主要用于列出需要缓存的文件，以及处理网页应用元素的规则。它使用特殊的`.manifest`扩展名，是简单的 UTF-8 编码文件，必须通过`text/cache-manifest`内容类型提供，才能被浏览器正确解析。你可以使用字节顺序标记（BOM）对文件签名。需要注意的是，目前大多数服务器在默认配置下不会发送此
    MIME 类型，而这对清单文件的正常工作至关重要。


    **注意：** 自然，本地测试该文件并不容易，因为你无法断开与服务器的连接。运行本地测试的唯一方法是：加载应用、停止本地服务器，然后重新加载网页应用以观察显示内容。另外请注意，清单文件不会显示在
    Safari Web 检查器的资源查看器部分，这不利于检查它是否已加载。

    ```'
- fmt: '# Using the Cache Manifest for Offline Web Applications


    Using the following `cache.manifest` file, we can simply cache the web application
    example developed in this chapter to make it available offline or when the user
    suffers from bad connection speeds.


    ```

    CACHE MANIFEST


    index.html

    styles/main.css

    scripts/main.js

    ```


    The `CACHE MANIFEST` line is required as the first line in the file and should
    have no extra space or line feed. It acts as a file signature that identifies
    the file as the cache manifest to the browser. The URLs can be either absolute
    or relative, but be careful that relative paths are relative to the directory
    where the manifest is hosted. Therefore, for the sake of consistency, it is a
    good practice to place the manifest file in the same directory as the HTML file
    it is called from.


    > **NOTE:** Although the file from which the manifest is called is automatically
    cached, following the specification, we add it to the manifest too.


    The manifest will be used in the document from which it is included. It should
    be called using the new `manifest` attribute on the `<html>` tag. As with any
    other attribute allowing to pull remote files, it can take both relative and absolute
    paths.


    ```

    <html manifest="cache.manifest">

    ...

    ```


    ## Chapter 15: A Better Handling of Client-Side Data Storage


    This is the simplest possible definition of a manifest file, which will let you
    store elements on the device without having to download them with every page load.
    You can simply list resources to cache, but it is also possible to more precisely
    determine how the cache should be handled.


    ### The CACHE Sections


    The files to be cached can be defined in a specific section of the manifest file
    resorting to the `CACHE` directive. You can define several sections in a similar
    way, which can be useful to order your file indications. You can also make your
    file more easily readable by humans by adding comments, as illustrated here:


    ```

    CACHE MANIFEST


    # Our cached resources


    CACHE:

    index.html

    styles/main.css

    scripts/main.js

    ```


    Any kind of file can be registered for caching, even images or server-side scripts.
    Of course, server-side scripts will be stored after their execution, so be careful
    when using this feature. This is possible because the cache application not only
    stores data but also stores resource metadata, such as HTTP headers.


    ### The NETWORK Sections


    The use of a manifest file makes the web application work in offline mode, which
    means that files not listed in the manifest file will not be downloaded, even
    if the device is connected to a network. This behavior can be changed from the
    `NETWORK` section. In this section, you can specify resources that should be downloaded
    from the server if a network is available, which will be especially useful for
    dynamic elements of your applications.


    The section simply holds an online white list, similarly to what is found under
    the `CACHE` section. However, this section functions differently: each URL is
    a prefix match pattern. Thus, you will be able to target all resources from a
    given directory by listing only this directory. Be careful not to uselessly list
    the same prefix several times.


    In our previous example, using only a `CACHE` section in our manifest file would
    keep our web application from working, because the proxy used to gather the RSS
    feed could not be accessed. To change this, we simply add the following to our
    manifest:


    ```

    NETWORK:

    proxy.php

    ```


    Our proxy uses the `url` parameter from the query string to know which feed should
    be downloaded, but as `proxy.php` is a prefix, authorization to access the full
    URL is given by the browser.


    You can also use the `*` wildcard to allow access to all resources. This naturally
    is taken into account for resources not listed under the `CACHE` section, which
    has precedence over other sections. Of course, this makes writing your manifest
    file much easier and reduces the risks of forgetting files and ending up with
    a partially functional application.


    ### The FALLBACK Sections'
