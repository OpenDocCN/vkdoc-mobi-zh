    Because we are going to use the methods of the `Map` object, we store it inside
    the global variable `map`. Once the page has loaded, we call the `init()` function;
    this initializes the map by giving it a base location, the intersection of the
    equator, and the Greenwich meridian (0,0).


    Because for now we cannot tell where the user is, we set the zoom factor to 2,
    which in the Google Maps API represents a 2000km scale. In satellite view, the
    zoom can range from 0 (10.000km) to 22 (2m). There is no particular step between
    the values: each one represents a scale determined in the API. Besides, all are
    not always available, depending on the map type.


    The `center` property positions the map with the location passed in the parameters
    in the middle of the area. You will be able to modify this later using the `setCenter()`
    method of the `Map` object.


    In order not to show useless controls on the map, we pass the `disableDefaultUI`
    property set to `true` as a parameter. This means controls to change the map type
    or the scaling slider won’t appear. However, we are going to show the current
    scale in the bottom-left area of the map, which is hidden by default, by setting
    the `scaleControl` to `true`.


    Next, we instantiate a new `Map` object to which we pass the element where the
    SATELLITE mode map will be rendered and the parameters listed earlier. Other available
    display modes are listed in Table 14–3.


    ![](index-427_1.jpg)


    CHAPTER 14: Location-Aware Web Applications


    ## Table 14–3. Available Map Display Modes


    | Constant | Description |

    |----------|-------------|

    | HYBRID | Displays a transparent layer of major streets on a satellite view.
    |

    | ROADMAP | Displays a street map. |

    | SATELLITE | Displays a satellite view. |

    | TERRAIN | Displays a map with shaded relief and terrain along with roads. |


    This parameter is mandatory, because there is no default value. You can already
