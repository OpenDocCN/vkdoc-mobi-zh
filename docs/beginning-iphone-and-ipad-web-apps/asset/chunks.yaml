  trans: "\n# 上一节中解释的设计优势同样适用于下一个属性 `background-clip`。虽然背景的“原点”仅影响背景图像，但 `background-clip`\
    \ 属性允许你通过定义背景绘制区域，为所有背景元素（即图像和颜色）设定规则。\n\n我们几乎可以直接沿用上一个示例，只需在样式中将 `origin` 替换为\
    \ `clip`——因为此属性与 `background-origin` 的属性值相同。\n\n```css\n<style>\ndiv {\n    ...\n\
    \    background-position: bottom right;\n    background-repeat: no-repeat;\n \
    \   background-image: url(images/flower.jpg);\n    -webkit-background-origin:\
    \ border-box;\n}\ndiv:nth-of-type(1) {\n    -webkit-background-clip: border-box;\
    \ /* 默认值 */\n}\ndiv:nth-of-type(2) {\n    -webkit-background-clip: padding-box;\n\
    }\ndiv:nth-of-type(3) {\n    -webkit-background-clip: content-box;\n}\n</style>\n\
    ```\n\n这会产生如图 6–6 所示的效果。\n\n**图 6–6.** 背景剪裁的三种可能状态：从边框外边缘开始（默认），然后排除边框，再排除内边距（从内容区域内部开始）\n\
    \n默认行为是将背景颜色延伸到盒子的边框内部。其他值则表现为与背景原点类似，只是也包含了背景颜色。\n\n然而，在使用 `background-clip`\
    \ 属性的 `content-box` 值时需谨慎：WebKit 已按照 CSS3 规范的早期版本实现了该值。但由于此值已从规范中移除，你应尽可能优先将 `background-clip`\
    \ 与其他两个值之一结合使用以达到预期效果，以防该值从浏览器中被移除。对于 `background-clip` 属性而言，`padding-box` 值可能最有价值，因为它允许使用图像或透明度来丰富边框的样式——我们很快会看到这一点。\n\
    \n## 基于文本的背景剪裁\n\nWebKit 还提供了使用 `text` 值根据容器中的文本来剪裁背景的可能性，如图 6–7 所示。\n\n```css\n\
    <style>\ndiv {\n    background-image:\n    -webkit-gradient(linear,\n    left\
    \ top,\n    left bottom,\n    from(yellow), to(red));\n    -webkit-background-clip:\
    \ text;\n    color: transparent;\n}\n</style>\n<div>Background Clip</div>\n```\n\
    \n**图 6–7.** 无图像文本以渐变形式呈现\n\n如代码所示，文本颜色需要设置为 `transparent`，以便容器背景能够透显出来。这样做的问题是，不支持此背景值的浏览器版本将几乎不显示任何文本。幸运的是，你可以使用一个仅受支持该背景属性值的\
    \ WebKit 特定属性 `-webkit-text-fill-color` 来解决这个问题。\n\n你可以这样使用它：\n\n```css\n-webkit-text-fill-color:\
    \ transparent;\ncolor: red;\n```\n\n这样一来，不支持这些新属性的浏览器将显示红色文本，而最新版本的 Mobile Safari\
    \ 仍会以渐变形式呈现文本。\n\n## 背景尺寸调整\n\n你可能曾经诅咒过 CSS2 背景的另一个缺陷：背景图像无法像真正的 HTML 图像那样调整大小。CSS3\
    \ 通过 `background-size` 属性（以 `-webkit-` 为前缀）为这个恼人的问题带来了一个易于使用的解决方案。\n\n我们很快就会看到如何利用这一新功能，将\
    \ Photos 原生应用的吸引力带到你的 Web 应用中。Photos 应用在视觉上吸引人的一个方面是，所有图片都以相同格式和排列的缩略图规则网格呈现——大小相同的小方块，如图\
    \ 6–8 所示。这产生了一致的布局，同时不会损害图片质量，因为所有图片都被缩放或裁剪以适应这种格式。\n"
- fmt: "# CHAPTER 6: Interesting CSS Features for Your Web Application User Interface\n\
    \n`Figure 6-8`. The Photos application presents a homogeneous gallery, where pictures\
    \ all have the same display size\n\nDeveloping a native application, you could\
    \ use the `UIImageView` object from the Cocoa Touch framework to make images fit\
    \ into whatever container size using aspect fit, scale to fill, or aspect fill\
    \ parameters, as shown in Figure 6-9. We are going to use the new CSS features\
    \ made available to us to achieve a very similar design. The Mobile Safari resize\
    \ algorithm is good, so you can obtain excellent results.\n\n`Figure 6-9`. The\
    \ aspect fit, scale to fill, and aspect fill modes can now be achieved simply\
    \ by applying a style to the container\n\nThe `background-size` property takes\
    \ two values: a horizontal value and a vertical value, and of course you can specify\
    \ only one value that will apply for both. You can give values using the usual\
    \ CSS units of your liking; however, for our example, percentages are the best\
    \ choice, because they make the code easily reusable.\n\nThe most obvious value\
    \ to use is scale to fill, so you needn't know the horizontal/vertical ratio of\
    \ your pictures. The image will be resized to fill the available space and be\
    \ stretched or squashed appropriately:\n\n```css\n/* Scale to fill */\n-webkit-background-size:\
    \ 100%;\n```\n\nThe other values for the `background-size` property require that\
    \ you know the orientation of your images. To obtain an aspect fill effect, you\
    \ should set the narrowest part of your picture to 100% and the other to `auto`.\
    \ This means your image will be cropped vertically for a portrait and cropped\
    \ horizontally for a landscape.\n\n```css\n/* Aspect fill for landscape images...\
    \ */\n-webkit-background-size: auto 100%;\n\n/* ... and portrait images */\n-webkit-background-size:\
    \ 100% auto;\n```\n\nReversing these values would result in an aspect fit resize,\
    \ meaning the whole image will appear in the dedicated area, leaving blank space\
    \ either vertically or horizontally.\n\nSpecifying both values explicitly would\
    \ force the resized image dimensions.\n\n> **WARNING:** Be careful that your images\
    \ are not more than twice as high as your container. There is a bug in Mobile\
    \ Safari's handling of such a situation, which shows a cropped image. The only\
    \ way to avoid this problem is to use smaller images.\n\nThe CSS3 specification\
    \ has values to easily achieve the desired effect. However, these values—`contain`\
    \ and `cover`—are not supported as of iOS version 3.2.\n\n## Developing a Photos-Like\
    \ Gallery\n\nIn this section, we will show a live example of the possibilities\
    \ offered by these new CSS properties and values by using them to reproduce the\
    \ appearance of the Photos gallery shown earlier. One of the characteristics that\
    \ makes this gallery so efficient and appealing is that, whatever the initial\
    \ format of the pictures displayed, they all fit nicely into the square area allotted\
    \ to them.\n\nAs usual, we are going to build upon our Komodo Edit project and\
    \ the directory structure we have already worked with. First, you will need to\
    \ add a new physical folder to your project, named `images`, where you will store\
    \ all the pictures for your gallery.\n\nIn Komodo Edit, go to **Project** ➤ **Add**\
    \ ➤ **New Live Folder**, and click the appropriate icon to create a new directory\
    \ called `images`. Then select it.\n\nNext, because we are going to use PHP to\
    \ read the `images` folder contents and dynamically add references to the images\
    \ inside it to some JavaScript code, you will have to rename your `index.html`\
    \ file to `index.php`. This is what it should look like:\n\n```php\n<?php require_once(\"\
    index_code.php\"); ?>\n\n<!DOCTYPE html>\n<html>\n<head>\n  <title>Gallery Demo</title>\n\
    \  ...\n  <link rel=\"stylesheet\" href=\"styles/main.css\">\n  <link rel=\"stylesheet\"\
    \ href=\"styles/gallery.css\">\n  ...\n  <script src=\"scripts/main.js\"></script>\n\
    \  <script>\n    var images = <?php writeImages('images'); ?>;\n  </script>\n\
    \  <script src=\"scripts/gallery.js\"></script>\n</head>\n<body onload=\"showImages()\"\
    >\n  ...\n  <h1>Gallery</h1>\n  ...\n  <div id=\"gallery\"></div>\n</body>\n</html>\n\
    ```\n\nThen, create an `index_code.php` file at the same level as `index.php`.\
    \ It will hold the functions necessary for the gallery to work. In other words,\
    \ it allows you to gather the list of images from the `images` folder. Here it\
    \ is:\n\n```php\n<?php\n# Parse the given folder and return an array of the collected\
    \ files\nfunction getImages($path) {\n  $handle = opendir($path);\n  $files =\
    \ array();\n  if ($handle) {\n    while (($name = readdir($handle)) !== false)\
    \ {\n      if (is_file(\"$path/$name\")) {\n        $files[] = \"$path/$name\"\
    ;\n      }\n    }\n  }\n  closedir($handle);\n  return $files;\n}\n?>"
