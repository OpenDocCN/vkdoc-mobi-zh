    \ + \"px, 0, 0)\";\n\n}\n```\n\n当用户沿着屏幕移动手指时，我们调整页面组的位置以使其同步移动。如第 9 章所述，`translateX()`\
    \ 方法目前因缺乏流畅性而不可靠。我们依赖于没有此问题的 `translate3d()` 方法。\n\n当用户释放压力时，我们需要激活新聚焦的图片。\n\n\
    因为我们不希望页面视图从一个区域突然跳到另一个区域，所以我们使用 CSS 过渡。这样，区域就能平滑地移动到它们的新位置。使用过渡要求将整个控制（时间、缓动函数）转移到样式表中，这使得过渡比在\
    \ JavaScript 中硬编码的值更容易维护。\n\n```css\n.pageview-group {\n\n  -webkit-transition:\
    \ -webkit-transform 0.35s ease-out;\n\n}\n```\n\n为了防止在 `touchmove` 事件期间发生过渡，有必要修改\
    \ `createElements()` 方法，将时间初始化为 0，这将阻止过渡的发生。\n\n```javascript\nPageView.prototype.createElements\
    \ = function() {\n\n  /* 创建页面组 */\n\n  this.group = document.createElement(\"\
    div\");\n\n  this.group.className = \"pageview-group\";\n\n  this.group.style.webkitTransitionDuration\
    \ = 0;\n\n  this.target.appendChild(this.group);\n\n  ...\n\n}\n```\n\n此外，如果没有在全局范围内对绝对定位元素进行光栅化处理，动画期间可能会出现闪烁。从一个状态到另一个状态的转换偶尔会导致渲染近似，特别是对于大型元素。这种差异在\
    \ iPad 上尤为明显。这可以通过简单地将以下 CSS 属性添加到要动画化的元素来解决。\n\n> **注意：** 当处理非常大的元素时，如果不需要让元素的背面可见，将\
    \ `backface-visibility` 属性设置为 `hidden` 将提高性能。\n\n```css\n.pageview-wrapper div\
    \ {\n\n  -webkit-transform: translate3d(0, 0, 0);\n\n  position: absolute;\n\n\
    \  ...\n\n}\n```\n\n我们现在可以定义 `touchend` 事件的处理器：\n\n```javascript\nPageView.prototype.touchendHandler\
    \ = function(event) {\n\n  if (this.state == this.DETACHING) {\n\n    return;\n\
    \n  }\n\n  var matrix = new WebKitCSSMatrix(this.group.style.webkitTransform);\n\
    \n  if (matrix.e == 0) {\n\n    this.state = this.WAITING;\n\n  } else {\n\n \
    \   var jump = this.target.offsetWidth;\n\n    matrix.e = (matrix.e > 0) ? +jump\
    \ : -jump;\n\n    this.group.addEventListener(\"webkitTransitionEnd\", this, false);\n\
    \n    this.group.style.webkitTransitionDuration = \"\";\n\n    this.group.style.webkitTransform\
    \ = matrix;\n\n    this.state = this.DETACHING;\n\n  }\n\n}\n```\n\n`touchendHandler()`\
    \ 方法从当前矩阵收集数据，以确定是否发生了移动。如果没有发生移动，对象简单地返回到 `WAITING` 状态；否则，该方法确定移动的方向并修改矩阵，以便在正确的方向上应用一个等同于容器宽度的距离的平移。会恢复在样式表中定义的平移持续时间，以便动画正确执行，并将对象的状态设置为\
    \ `DETACHING`。这通知其他方法正在运行动画，因此不应监听任何事件。\n\n为了终止移动，为 `transitionend` 事件添加了一个监听器。我们需要修改\
    \ `handleEvent()` 方法来考虑这一点：\n\n```javascript\nPageView.prototype.handleEvent =\
    \ function(event) {\n\n  switch (event.type) {\n\n    case \"webkitTransitionEnd\"\
    :\n\n      this.moveNodes();\n\n      break;\n\n    case \"touchstart\":\n\n \
    \     ...\n\n  }\n\n}\n```\n\n一旦动画完成，就会调用 `moveNodes()` 方法。这个方法也会读取矩阵以确定方向，然后适当地移动节点。\n\
    \n最后，删除监听器，并将组重置为其初始状态。对象状态返回到 `WAITING`，等待用户进行新的操作。\n\n```javascript\nPageView.prototype.moveNodes\
    \ = function() {\n\n  var matrix = new WebKitCSSMatrix(this.group.style.webkitTransform);\n\
    \n  var first = this.group.firstChild;\n\n  if (matrix.e < 0) {\n\n    this.group.appendChild(first);\n\
    \n  } else {\n\n    var last = this.group.lastChild;\n\n    this.group.insertBefore(last,\
    \ first);\n\n  }\n\n  this.group.removeEventListener(\"webkitTransitionEnd\",\
    \ this, false);\n\n  this.group.style.webkitTransitionDuration = 0;\n\n  this.group.style.webkitTransform\
    \ = \"\";\n\n  this.state = this.WAITING;\n\n}\n```\n\n剩下的就是将对象与主容器关联起来，这可以像下面这样简单地完成：\n\
    \n```javascript\nvar wrap = document.querySelector(\".pageview-wrapper\");\n\n\
    var view = new PageView(wrap);\n```\n\n如您所见，这段代码非常简短，并且使得定义过渡和尺寸非常灵活，因为所有内容都由样式表处理。如果您现在运行这段代码，您已经可以使区域从右向左以及从左向右移动。当然，这还不太令人满意，因为目前定义的区域中没有显示任何内容。\n\
    \n## 创建自定义事件"
- fmt: "为了处理不同区域中图像的渲染，我们将创建新的事件。第一个事件是`PageChanged`，它将初始化页面视图图像。另外两个事件是`PageMovedLeft`和`PageMovedRight`，当图像向左或向右移动时，将发送这两个事件。首先通过创建一个`sendEvent()`方法来完成此操作，如下所示：\n\
    \n```\nPageView.prototype.sendEvent = function(dir) {\n    /* Create a new Event\
    \ instance */\n    var type, event = document.createEvent(\"Event\");\n\n    /*\
    \ Prepare the event type */\n    if (dir > 0) {\n        type = \"PageMovedRight\"\
    ;\n    } else if (dir < 0) {\n        type = \"PageMovedLeft\";\n    } else {\n\
    \        type = \"PageChanged\";\n    }\n\n    /* Initialize the new event */\n\
    \    var vendor = \"book\";\n    event.initEvent(vendor + type, false, false);\n\
    \n    /* Add a 'pages' property to the Event object */\n    var nodes = this.group.childNodes;\n\
    \    event.pages = {\n        left: nodes[0],\n        view: nodes[1],\n     \
    \   right: nodes[2]\n    };\n\n    /* Dispatch the event to the target */\n  \
    \  this.target.dispatchEvent(event);\n}\n```\n\n`DOM DocumentEvent`接口的`createEvent()`方法返回作为参数传递的对象的实例。在这里，我们通过传递字符串`Event`来创建一个基本事件。我们也可以传递`MouseEvent`、`TouchEvent`等来创建这些事件的实例。\n\
    \n每个实现`Event`接口的对象都有自己的初始化方法。对于`Event`对象，该方法是`initEvent()`，它只接受三个参数。例如，`MouseEvent`的初始化方法参数明显更多。`initEvent()`方法具有以下签名：\n\
    \n```\nevent.initEvent( *eventType, canBubble, cancelable*);\n```\n\n我们的事件不能被取消，因为它是在标记构建完成并且组已移动之后发送的：默认行为无法取消，因为它已经被执行了。前缀`book`被添加到我们的事件类型中，以确保与原生事件的向前兼容性。当然，您可以使用来自DOM的事件名称，例如模拟一次点击。\n\
    \n一旦`Event`对象被初始化，我们向它添加一个新的`pages`属性，这将允许处理程序随时访问和修改区域。然后事件被发送到它的目标，即主容器。\n\n\
    现在，我们可以调用新的`sendEvent()`函数。我们只需修改构造函数，使客户端代码通过`PageChanged`事件初始化区域的内容。\n\n```\n\
    var PageView = function(target) {\n    ...\n    this.sendEvent();\n}\n```\n\n\
    接下来，我们需要在过渡完成后通知客户端代码。因此，我们修改`moveNodes()`方法，在其末尾添加一个函数调用。\n\n```\nPageView.prototype.moveNodes\
    \ = function() {\n    ...\n    this.sendEvent(matrix.e);\n}\n```\n\n`PageView`对象现在已经准备好向客户端代码发送其自定义事件。\n\
    \n## 处理自定义事件\n\n在不进行过于冗长的开发的情况下，我们只需更改区域的背景颜色。如果您希望在具有适当图像的应用程序中使用此功能，您可以使用第6章中介绍的背景定位和大小调整规则，以便在保持相关比例的同时充分利用所有可用空间。\n\
    \n捕获自定义事件的方式与捕获原生事件完全相同。我们将使用新的CSS `hsl()`函数，以便在颜色之间无缝循环，而无需处理颜色变量的值。\n\n第一个要捕获的事件是`PageChanged`，它将指示何时初始化三个区域的颜色。\n\
    \n```\nvar color = 0;\n\nfunction makeColor(hue) {\n    return \"hsl(\" + hue\
    \ + \", 100%, 50%)\";\n}\n\nwrap.addEventListener(\"bookPageChanged\", function(e)\
    \ {\n    e.pages.left.style.backgroundColor = makeColor(color - 20);\n    e.pages.view.style.backgroundColor\
    \ = makeColor(color);\n    e.pages.right.style.backgroundColor = makeColor(color\
    \ + 20);\n}, false);\n```\n\n接下来，我们希望随着用户将区域从一侧移动到另一侧，逐步改变颜色。\n\n```\nwrap.addEventListener(\"\
    bookPageMovedLeft\", function(e) {\n    color += 20; // New active color\n   \
    \ e.pages.right.style.backgroundColor = makeColor(color + 20);\n}, false);\n```"
  raw: 'To handle the rendering of our images in the different areas, we are going
    to create new events. The first one, PageChanged, will initialize the page view
    images. The other two, PageMovedLeft and PageMovedRight, will be sent when images
    are moved to the left or to the right. This is done by first creating a sendEvent()
    method, as follows:


    PageView.prototype.sendEvent = function(dir) {


    /* Create a new Event instance */


    var type, event = document.createEvent("Event");


    /* Prepare the event type */


    if (dir > 0) {


    type = "PageMovedRight";


    CHAPTER 13: Using Touch and Gesture Events


    } else if (dir < 0) {


    type = "PageMovedLeft";


    } else {


    type = "PageChanged";


    }


    /* Initialize the new event */


    var vendor = "book";


    event.initEvent(vendor + type, false, false);


    /* Add a ''pages'' property to the Event object */


    var nodes = this.group.childNodes;


    event.pages = {


    left: nodes[0],


    view: nodes[1],


    right: nodes[2]


    };


    /* Dispatch the vent to the target */


    this.target.dispatchEvent(event);


    }


    The createEvent() method of the DOM DocumentEvent interface returns an instance
    of the object passed as a parameter. Here, we create a basic event by passing
    the string Event. We also could have passed MouseEvent, TouchEvent, and so on,
    to create


    instances of these events.


    Every object implementing the Event interface has its own initialization method.
    For the Event object, that is initEvent(), which takes only three parameters.
    The MouseEvent initialization method, for instance, is notably longer. The initEvent()
    method has the following signature:


    event.initEvent( *eventType, canBubble, cancelable*);


    Our event cannot be canceled, because it is sent after the markup is built, and
    the group is moved: the default behavior cannot be canceled, because it has already
    been


    executed. The prefix book is added to our event type to ensure forward compatibility
    with native events. You could, of course, use event names from the DOM and thus


    simulate a click, for instance.


    Once the Event object is initialized, we add a new pages property to it, which
    will let the handler access and modify the areas at any moment. The event is then
    sent to its target, the main container.


    Now, we can call our new sendEvent() function. We simply change our constructor
    so that the client code initializes the content of our areas with the PageChanged
    event.


    var PageView = function(target) {


    ...


    this.sendEvent();


    }


    Next, we need to notify the client code after the transition has completed. Therefore,
    we change the moveNodes() method to add a function call at the end of it.


    PageView.prototype.moveNodes = function() {


    CHAPTER 13: Using Touch and Gesture Events


    ...


    this.sendEvent(matrix.e);


    }


    The PageView object is now ready to send its own custom events to the client code.


    Handling Custom Events


    Without getting into too-lengthy development, we are simply going to change the


    background color of our areas. If you want to use this in an application with
    proper images, you could use the background positioning and sizing rules presented
    in Chapter 6 in order to use all the available space while keeping a relevant
    ratio.


    The catching of custom events is handled exactly like that of native events. We
    are going to use the new CSS hsl() function in order to loop through colors seamlessly,
    without coping with the value of the color variable.


    The first event to catch is PageChanged, which will indicate when to initialize
    the colors for the three areas.


    var color = 0;


    function makeColor(hue) {


    return "hsl(" + hue + ", 100%, 50%)";


    }


    wrap.addEventListener("bookPageChanged", function(e) {


    e.pages.left.style.backgroundColor = makeColor(color - 20);


    e.pages.view.style.backgroundColor = makeColor(color);


    e.pages.right.style.backgroundColor = makeColor(color + 20);


    }, false);


    Next, we want to shift colors progressively as the user moves areas from one side
    to the other.


    wrap.addEventListener("bookPageMovedLeft", function(e) {


    color += 20; // New active color


    e.pages.right.style.backgroundColor = makeColor(color + 20);


    }, false);'
