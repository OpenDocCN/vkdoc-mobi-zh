    proceeding this way will make your application available in better conditions
    to more users, and planning for errors will help you offer a better user experience.


    Getting the Current Position


    The most obvious and probably most common use of the API will be to ask for the


    user’s present position. As stated earlier, you will use the Geolocation object,
    and you will access the getCurrentPosition() method.


    window.navigator.geolocation.getCurrentPosition(


