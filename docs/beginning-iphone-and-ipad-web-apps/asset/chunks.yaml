    # 移动端用户体验与界面设计指南


    移动设备用户期望操作能够快速响应。任何操作都应立即获得反馈。我们在前一章中已经说明，全屏模式 Web 应用的默认启动画面是上一个 Web 应用界面的状态快照，这可能会让用户误认为应用或设备已经无响应。这种情况至少会让用户感到沮丧。即使是短暂的等待也会驱赶部分用户，并且在任何情况下都会损害用户忠诚度。


    ## 让你的 Web 应用响应迅速


    这一原则贯穿 Web 应用体验的始终。你应该避免使用过多处理器密集型操作、过多的`JavaScript`，以及耗时过长的操作（如重服务器端活动以显示结果）。这些不仅应该在开发优化阶段充分考虑，更应在头脑风暴和功能设计阶段就纳入考量。


    为了在 Web 应用加载时最小化等待时间，应始终尽量限制图片的使用，注意文件大小，并避免页面过长导致需要大量滚动才能使用。关于图片，正如我们将在后续章节中看到的，你可以通过使用`CSS`渐变、画布（`canvas`）或网页字体（`web
    fonts`）来替代许多图片。需要注意的是，在文档未完全加载之前，页面的其余部分很可能无法进行用户交互——而用户却无法理解其中原因，因为尚未加载的页面部分在视窗之外。最后，虽然将标记、样式和功能（即`HTML`、`CSS`和`JavaScript`）分离并采用外部文件是一种良好实践，但你也应尽可能减少`HTTP`请求次数，因为你无法预测连接类型或质量，而且移动设备的服务器响应时间可能更长。


    当然，在您提供的体验中出现明显的延迟步骤可能难以避免。如果在某个阶段，你必须启动一个需要较长时间的操作，请务必记得向用户反馈 Web 应用的活动状态（见图
    5–11）。虽然每个操作都应快速给出答案，但如果无法做到，通过让用户了解当前进展，他们会更有耐心和容忍度。顺便说一句，这对于大多数用户交互来说都是如此。


    ![图 5–11](img/index-126_1.jpg)


    **图 5–11.** 邮件应用在连接时使用旋转指示器，在可能较长的消息加载过程中则使用进度条


    对于等待阶段，除非你绝对确定等待时间会很短（无论连接质量如何），否则进度条比旋转指示器更好，因为它能告知用户当前进程的进展情况。同样，如果多个操作同时进行，最好逐步告知用户正在发生的事情。屏幕上视觉元素的变化能让用户确信确实有事情正在发生——也就是说，Web
    应用并没有卡在旋转指示器上——如果你做得好的话，甚至还能在一定程度上带来娱乐性。


    ## 让你的 Web 应用具有交互反馈


    类似地，即使操作不需要时间完成，你也应该引导用户完成操作。`iOS`通过`-webkit-tap-highlight-color` `CSS`属性为点击按钮提供了内置反馈。你可以将此作为示例，来加强与用户及其设备（以及你的应用）之间的连接——因为屏幕会像真正的按钮一样对手指操作做出反应。在传统
    Web 上，这通常通过悬停（`hover`）状态来实现：菜单项在悬停时改变颜色、出现工具提示、元素放大或不透明度切换。


    但你应该知道，这在移动设备上并不可行，因为没有鼠标，也就不存在真正的悬停操作。相反，你需要额外关注用户点击时应该发生什么。另一个来自原生`iOS`功能的启发式示例是切换开关按钮。`Apple`的设计师没有使用普通的复选框，甚至不是按下时看起来被按下的按钮，而是采用了一种“开关”隐喻。这给用户带来了对`GUI`元素更强的真实感，同时状态的改变变成一种微妙的动画，告知用户操作已被采纳。尽管如此，在模仿原生`iOS`界面时一定要小心，因为用户会期望你的元素行为与它们模仿的对象完全一致。因此，不同的行为或结果会具有欺骗性，并对用户对你应用质量的感知产生负面影响。


    作为`iOS`开发者，在许多情况下，通过创建自己的效果来超越`-webkit-tap-highlight-color`效果是很有趣的（但要记住，事情应该保持简单且易于理解），无论是通过管理你自己的自定义效果，还是例如模仿原生`iOS`的条目或菜单选择列表效果。


    ## `iOS`界面设计最佳实践


    除了前面介绍的用户体验指南外，在开发 Web 应用时，还有若干用户界面设计准则需要考虑。这些准则源于设备的特殊性或原生`iOS`的`GUI`。遵循这些准则有助于提供用户期望的优质体验，也是应用成功的重要一步。


    ### 适应性


    `iOS`的一个棘手特性是，它允许用户随时在竖屏和横屏方向之间切换视口。这与传统 Web 开发者不同，他们可以轻松依赖最小屏幕尺寸，最终依靠滚动条。此外，用户在一次页面访问中反复更改浏览器窗口大小的可能性很小，这意味着不会出现不同显示方式的直接对比。随着屏幕尺寸是`iPhone`和`iPod
    touch`五倍大的`iPad`的发布，情况变得更加复杂。为了给用户提供令人满意的体验，你的 Web 应用必须完美适应这些情况。


    因为按照本书的建议，你已阻止了 Web 应用的缩放，因此必须确保应用能够适应视口的宽度（设置为`device-width`）。如果你是前端 Web 开发者，你应该知道什么是流动布局（`fluid
    layout`）。基本思想是，无论屏幕尺寸如何，页面都占据屏幕的 100%，而不会破裂成一堆无序的元素。这意味着你应该禁止所有布局元素使用固定尺寸，并作为通用规则，完全避免使用它们。


    本书中将有大量示例说明如何实现这一点。你已经在项目模板中看到，标题和段落会占据屏幕的全部宽度，无论方向如何。


    另一种可用方法是根据视口方向应用`CSS`规则。使用时需谨慎，因为如果最终对每种配置应用完全不同的规则，文件大小很容易翻倍。最佳方法是始终记住你的页面将有两种可能的布局，并在每个开发阶段对两种布局都进行测试。如果你以这种方式构建了标记和样式，很可能就不需要使用特定样式。


    ### 列表与图标方法

