  trans: "\nMobile Safari 初始实现的交互状态基于 `-webkit-tap-highlight-color` 属性，该属性定义了一个覆盖框的颜色，用于在用户操作时高亮视口中的可点击区域。例如，在任何被点击的链接上都能看到这种效果。以下规则会在用户触摸可点击元素时使这些区域变暗（图\
    \ 6-1）：\n\n```\na { -webkit-tap-highlight-color: rgba(0, 0, 0, 0.5); }\n```\n\n\
    图 6-1. 使用自定义高亮颜色的被触摸元素\n\n你可能一直以为 Mobile Safari 中没有其他“已点击”状态。这并非完全正确。不过，需要一点小技巧才能通过\
    \ CSS 的 `:active` 和 `:hover` 伪类来访问这个属性。\n\n许多人推荐使用多点触控中与 `mouseover` 和 `mouseout`\
    \ 对应的 `touchstart` 和 `touchend`，通过事件处理器添加和移除特定类来实现。这种方法确实有效，但使用起来有些笨重且繁琐，尤其是有一种更简单的方式可以实现同样效果。\n\
    \n你可以通过在 `window` 上添加事件处理器来激活这些对应状态，即使不为此处理器添加任何功能，它也能生效并触发所需行为。因此，将以下代码添加到我们\
    \ Web 应用模板的 `main.js` 文件中，就能为 `main.css` 文件添加后续规则，如图 6-2 所示：\n\n```\n/* main.js\
    \ */\ndocument.addEventListener(\"touchstart\", new Function(), false);\n```\n\
    \n```\n/* main.css */\n.group-wrapper ul li a {\n  ...\n  -webkit-tap-highlight-color:\
    \ transparent;\n}\n\n.group-wrapper ul li a:active {\n  color: #fff;\n  background:\
    \ #015de6 -webkit-gradient(linear, left top, left bottom, from(rgba(255, 255,\
    \ 255, .25)), to(transparent));\n}\n\n.group-wrapper ul li a:active * {\n  color:\
    \ #fff;\n}\n```\n\n图 6-2. 犹如原生 iPhone 菜单\n\n同样，我们设计这些样式时使其易于调整。这里只需改变背景颜色，就能调整按钮外观，而无需修改渐变效果。\n\
    \n### 禁用复制/粘贴功能\n\n用户可以轻松地对页面元素执行长按操作，这会触发复制/粘贴功能，并显示一个影响体验的丑陋框体，如图 6-3 所示。\n\n\
    图 6-3. 长按可能触发复制/粘贴功能\n\n当不需要此行为，或希望为此操作添加自定义功能时，可以禁用它。仅需使用 CSS 的 `-webkit-user-select`\
    \ 属性即可实现。该属性可取值 `auto`（允许选择）、`text`（仅允许用户选择文本），或 `none`（完全禁用选择）。\n\n不过，务必注意不要让可用性下降，例如禁止选择文本字段。以下代码使用通用选择器为你处理了这一问题：\n\
    \n```\n*:not(input):not(textarea):not(select),\ninput[type=image],\ninput[type=file],\n\
    input[type=submit],\ninput[type=button],\ninput[type=reset] {\n  -webkit-user-select:\
    \ none;\n}\n```\n\n这将阻止除文本输入框（涵盖所有新输入类型）之外的所有元素被选中，使你的 Web 应用体验更接近原生 Mobile Safari\
    \ 应用。\n\n### 控制弹出菜单\n\n在链接上触摸并长按会触发如图 6-4 所示的菜单。如果你的 Web 应用已设计得类似原生应用，你可能不希望、不需要或用户预期中不存在此行为。\n\
    \n图 6-4. 触摸并长按链接或图片等元素可能触发选项弹出菜单\n\n幸运的是，同样只需简单的 CSS，通过设置 `-webkit-touch-callout`\
    \ 属性即可禁用它。\n"
- fmt: "将`callout`属性设置为`none`。与上一个属性一样，请考虑用户可能期望该功能的情况，以避免造成困扰。\n\n```\nbody {\n \
    \ ...\n  -webkit-touch-callout: none;\n}\n```\n\n为文档的`body`元素添加此规则，足以全局禁用所有元素的该行为。\n\
    \n## 选择器\n\n在深入了解CSS3布局和样式特性的神奇之处之前，我们认为有必要花些时间来介绍现代浏览器中编写CSS最令人兴奋的方面之一：选择器。的确，如果你过去只习惯使用ID、类和后代选择器来定位元素，那么你错过了大部分乐趣。WebKit浏览器实现了所有CSS1和CSS2选择器，以及CSS3引入的大多数选择器。\n\
    \n> **注意**：此处讨论的所有选择器都可以在WebKit的Web检查器（位于“开发”菜单下）的搜索字段中使用，这在你的开发过程中会非常有用。\n\n\
    这让你几乎完全掌控想要定位的元素，而无需为太多标签添加额外的标识符。CSS选择器允许你在文档结构中精确移动，仅选择具有特定特征的元素。\n\n### 可用CSS选择器概述\n\
    \n随着CSS3的推出，可用选择器的数量变得相当可观，但我们将只深入探讨那些看起来更复杂的选择器。你可以在规范页面找到完整列表及每个选择器的描述，网址是：[www.w3.org/TR/css3-selectors/#selectors](http://www.w3.org/TR/css3-selectors/#selectors)。\n\
    \n你会看到，那里列出的大多数选择器要么是已知的，要么是显而易见的。你可能会注意到一些有趣的新成员，它们允许进行否定选择或仅匹配属性的部分内容。在第9章中，我们还将使用功能非常强大的`:target`，它可以省去不少JavaScript代码。\n\
    \n然而，其他一些选择器虽然有用，但可能不那么直观。以下是对这些选择器的一些说明和解释。\n\n首先，伪元素现在通过使用双冒号标记（`::`）而不是单冒号来与伪类区分。这看起来很琐碎，但CSS2并没有做出这种区分。这对选择器的本质有意义：伪元素不属于文档树。通常它们属于文档文本内容，无法通过文档语言正常访问；而伪类旨在根据元素在DOM中的位置进一步识别它们。\n\
    \n其次，你应该注意空格，因为一个“空选择器”可以匹配任何元素。\n\n```css\n/* 2个等效定义...（带空格） */\np ::first-letter\
    \ { ... }\np *::first-letter { ... }\n\n/* ...但不同于 */\np::first-letter { ... }\n\
    ```\n\n接下来，请注意你可以链式使用选择器。例如，你可能想在所有文章的末尾添加一个视觉标记。假设`<div>`的最后一个子元素是一个段落元素，可以按如下方式实现：\n\
    \n```css\ndiv p:last-child::after {\n  content: \"The End\";\n  font-weight: bold;\n\
    }\n```\n\n这可能会相当复杂，因为实际上，你可以精确到几乎无极限，正如以下示例所示：\n\n```css\na.class1.class2:not(#id1):first-child:hover\
    \ {\n  color: red;\n}\n```\n\n这里，我们定位任何同时具有`class1`和`class2`类、但不具有`id1`ID、且是父元素的第一个子元素的锚点，以对其悬停状态应用特定颜色。\n\
    \n### 位置相关选择器：结构伪类\n\n你可能已经习惯了使用`:first-child`和`:last-child`选择器。如果是这样，你大概知道它们可能会令人沮丧，原因有二。\n\
    \n第一个限制是，显然，它们只允许你分别定位第一个和最后一个子元素。然而，常常需要为元素的倒数第二个子元素、每隔一个元素，或某个类型的第一个子元素应用不同的样式。"
  raw: 'callout property to none. As with the previous property, do consider cases
    where the functionality may be expected by the user, to not entail frustration
    on that side.


    body {


    ...


    -webkit-touch-callout: none;


    }


    Adding this rule for the body of your documents will be enough to globally disable
    the behavior for all elements.


    Selectors


    Before getting into the magic of CSS3 layout and styling features, we think it
    is important to spend some time going through one of the most exciting aspects
    of writing CSS for modern browsers: selectors. Indeed, if you used to target elements
    using IDs, classes, and descendants only, you have been missing most of the fun.
    WebKit


    browsers implement all of the CSS1 and 2 selectors, along with most of those


    introduced by CSS3.


    NOTE: All the selectors discussed here can be used in the search field of WebKit''s
    Web Inspector found under the Develop menu, which again can prove very useful
    in your development process.


    This gives you almost full control over which element you want to target, without
    having to identify too many tags with extra identifiers. CSS selectors allow you
    to precisely move across the document structure choosing only elements with given
    characteristics.


    Overview of Available CSS Selectors


    With CSS3, the number of available selectors has become quite impressive, but
    we will only get into the details of those that appear more complex to handle.
    You can find the complete list with a description for each selector on the specification
    page, at


    [www.w3.org/TR/css3-selectors/#selectors.](http://www.w3.org/TR/css3-selectors/#selectors)


    You will see that most of the selectors presented there are either known already
    or pretty self-explanatory. You will probably notice some interesting newcomers
    that allow for negative selection or selection on only part of an attribute. In
    Chapter 9, we will also be using the very versatile :target, which can save you
    a fair amount of JavaScript.


    Other selectors, however useful, may be a little less obvious. Here are a few
    notes and explanations for those.


    First, pseudo-elements are now differentiated from pseudo-classes by the use of
    a double colon mark (::) instead of a single one. This may seem trivial, but CSS2
    didn’t make this difference. It has a meaning in the nature of selectors: pseudo-elements
    are not part of the document tree. Typically they belong to the document text
    content and 122


    CHAPTER 6: Interesting CSS Features for Your Web Application User Interface


    couldn’t normally be accessed with the document language, while pseudo-classes
    are meant to further identify elements based on their position in the DOM.


    Second, you should be careful with spaces, because an “empty selector” can target
    any element.


    /* 2 equivalent definitions... (with space) */


    p ::first-letter { ... }


    p *::first-letter { ... }


    /* ...but different from */


    p::first-letter { ... }


    Next, be aware that you can chain selectors. You could, for instance, want to
    add a visual mark to the end of all your articles. Assuming that the very last
    child of the <div> is a paragraph element, this could be done as follows:


    div p:last-child::after {


    content: "The End";


    font-weight: bold;


    }


    This can be quite complex, because there is virtually no limit to how precise
    you get, as you can imagine from what follows:


    a.class1.class2:not(#id1):first-child:hover {


    color: red;


    }


    Here, we target any anchor that has the classes .class1 and .class2, but not the
    ID id1, and that is the first child of its parent in order to apply a specific
    color to its hover state.


    Position in Suite Selectors: Structural Pseudoclasses


    You may be accustomed to using the :first-child and :last-child selectors. If
    so, you probably know that they can be frustrating, for two reasons.


    The first limitation is that, obviously, they allow you to target only the first
    and last children, respectively. Yet, it can often be desirable to apply different
    styles to the penultimate child of an element, every other element, or the first
    child of such or such type.'
  trans: "\n将`callout`属性设置为`none`。与上一个属性一样，请考虑用户可能期望该功能的情况，以避免造成困扰。\n\n```\nbody {\n\
    \  ...\n  -webkit-touch-callout: none;\n}\n```\n\n为文档的`body`元素添加此规则，足以全局禁用所有元素的该行为。\n\
    \n## 选择器\n\n在深入了解 CSS3 布局和样式特性的神奇之处之前，我们认为有必要花些时间来介绍现代浏览器中编写 CSS 最令人兴奋的方面之一：选择器。的确，如果你过去只习惯使用\
