    list elements if done so. Therefore, we add the content of the html variable to
    a dummy element and then move each node from the dummy element to the list. Surprisingly,
    this method is twice as fast as the innerHTML method one could have initially
    expected.


    Be Kind to the Waiting User


    As stated several times already, HTTP response times can be irregular on mobile


    devices, as are loading times depending on the quality of the connection the user
    currently has access to. Therefore, particularly for Ajax-based web applications,
    you should always provide visual feedback to your user during loading and processing


    times.


    Adding Visual Feedback


    To do this, you again can rely on the readyState property by adding a condition
    to the function used earlier. You could, for instance, use a spinner as a background
    for the element that should receive the content. This has the advantage of being
    lightweight and flexible. Here, we use the BigSpinner object created in Chapter
    7.


    var spinner = new BigSpinner();


    function init() {


    spinner.init("spinner", "white");


    ...


    }


    function showTrends() {


    **if (this.readyState == this.OPENED) {**


    **buttonState(true);**


    **} else** if (this.readyState == this.DONE && this.status == 200) {


    ...


    buttonState(**false**);


    }


    }


    function buttonState(**loading**) {


    var but = document.querySelector("button.header-button");


    if (loading) {


    but.disabled = true;


    but.className += " spinning";


    spinner.animate();


    } else {


    but.className = but.className.replace(" spinning", "");


    spinner.stop();


    }


    }


    ![](index-386_1.jpg)


    CHAPTER 12: Ajax and Dynamic Content


    The new buttonState() function adds a .spinning class to the button to display
    the spinner. For the spinner to be shown in the button, you need to add a <span>
    surrounding the button text.


    <button class="header-button" onclick="init()"> **<span>** Get**</span>** </button>
    The final step is to add the relevant style into the *main.css* file so that it
    can easily be used in other projects. You can see the resulting button in Figure
    12–2.


    .header-wrapper .header-button.spinning span {


    color: transparent;


    text-shadow: none;


    background: -webkit-canvas(spinner) center center no-repeat;


    -webkit-background-size: auto 22px;


    padding: 4px;


    margin: -4px;


    }


    Figure 12–2\. The spinning button


    The CSS class .spinning hides the button text by setting its color to transparent
    and changes its background using the -webkit-canvas() function. Because the spinner
    is a little too big, we resize it using the background-size property so that it
    perfectly fits inside our button.


    Handling Excessive Waiting Times


    Additionally, you should plan for possible errors or excessive waiting times.
    Setting a timer for this is the most straightforward solution; depending on the
    kind of content you need to load, you may want to adapt the value for a “reasonable”
    wait.


    var timerID;


    function checkTime(msecs, ajax) {


    timerID = window.setTimeout(function() {


    ajax.abort();


    alert("The server is taking too long to respond... \n


    Try reloading this page.");


    }, msecs);


    }


    function showTrends() {


    if (this.readyState == this.OPENED) {


    **checkTime(1000, this);**


    ...


    } else if (this.readyState == this.DONE && this.status == 200) {


    **window.clearTimeout(timerID);**


    ...


    }


    }


    CHAPTER 12: Ajax and Dynamic Content


    Especially when everything doesn’t depend solely on yourself, you cannot be sure
    that your application will run without any problem. Handling possible errors is
    an extra guarantee of a good user experience.


    Summary


    Building web applications shouldn’t be considered an insular task. The richness
    of the Web nowadays partly depends on interaction between web sites, and you can
    seriously benefit from external sources and numerous third-party feeds and APIs
    to build better applications. You now have the tools to take full advantage of
    elements that have allowed the success of the Web 2.0 era and that should be fundamental
    for upcoming changes in the way people consume web content.


    Master these thoroughly, take them further, and always remember that, regarding
    the use of external content, there is no absolute best solution. A format or technique
    will be more appropriate for some project, and another may be far better for another—not
    to mention that all are not necessarily available in all cases.


    **13**


    ****Chapter**


    Using Touch and


    Gesture Events


    The iPhone, iPad, and iPod touch, like many portable devices nowadays, uses the
    finger as the only pointing device. Apple’s devices even support several simultaneous
    contact points, which, along with a simple, intuitive graphical interface, makes
    their use fluid, efficient, and overall pleasing for the user. As we have explained
    in earlier chapters, this entails a close, almost intimate connection between
    the user and the device. This particular relationship favors realistic designs;
    for instance, building a poker game application, you can allow your user to virtually
    “throw” cards on a table with a simple flick of the finger, adding to the real-life
    impression.


    Since version 2.0 of the OS, you can use the Multi-Touch API with Mobile Safari
    to bring interaction between the user and your web applications a major step further.
    In this chapter, we are going to explain how to implement functionality from this
    API to catch touch events and how to interpret most any user movement and, ultimately,
    use this to build a simple handwriting recognition web application.


    How to Handle Events


    To catch events using JavaScript, developers are used to attributes such as onclick—


    normalized in the HTML5 specification—directly on an element or the DOM


    addEventListener() method, sometimes without really understanding how listeners
    are to be organized or what capturing events implies. A thorough understanding
    of this is crucial to efficiently work with events.


    Calling Priority of Handlers


    Not taking the capture into account, there is no actual priority among handlers;
    they are simply called in the order of their definition. Hence, event attributes
    within the HTML


    markup are generally interpreted before scripts, and code introduced using attributes
    will be executed first when an event occurs, as easily shown with the following
    example: 367


    CHAPTER 13: Using Touch and Gesture Events


    <div onclick="console.log(''attribute'')">Click Me</div>


    <script>


    var div = document.getElementsByTagName("div")[0];


    div.addEventListener("click", function() { console.log("listener") }, false);


    </script>


    **--- result ---**


    > attribute


    > listener


    Nevertheless, if a new click event is defined using *element*.onclick in a script,
    the onclick attribute will be overwritten, the previous handler will be removed,
    and a new handler will be created:


    <div onclick="console.log(''attribute'')">Click Me</div>


    <script>


    var div = document.getElementsByTagName("div")[0];


    div.addEventListener("click", function() { console.log("listener") }, false);
    **div.onclick = function() { console.log("property") };**


    </script>


    **--- result ---**


    > listener


    > property


    Attributes basically allow you to define only one handler at a time. This doesn’t
    mean you cannot preserve a previous attribute-defined handler when defining a
    new handler.


    Here is one method to do this:


    /* First, we read the handler from the onclick attribute */


    **var old = div.onclick;**


    /* Next, we group all relevant functions in a global handler */


    div.onclick = function() {


    **old();**


    console.log("property");


    };


    **--- result ---**


    > listener


    > attribute


    > property'
