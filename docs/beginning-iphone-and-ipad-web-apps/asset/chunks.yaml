  trans: "\n# `inspector` 与 `console.log()` 对 HTML 元素的操作方式类似。\n\n## `console.trace()`\n\
    \n记录当前函数调用栈及传入参数的值。\n\n## `inspect(object)`\n\n根据传入的对象打开相应的检查器标签页。可触发的标签页包括元素、数据库或存储检查器。\n\
    \n## `console.profile(name)`\n\n开始并结束对脚本执行的分析。\n\n## `console.profileEnd(name)`\n\
    \n# 第 3 章：开发者与调试工具简介\n\n列出的几个表达式可以像 C 语言的 `printf()` 函数一样接收带有多个变量的模式。因此，你可以使用\
    \ `%s` 插入字符串，或使用 `%o` 添加可折叠的对象结构。这有助于在开发过程中保持日志的条理性和一致性。\n\n## 表 3-2：格式化选项\n\n\
    **格式** | **描述**\n--- | ---\n`%s` | 字符串。\n`%d` 或 `%i` | 整数。不支持像 `%02d` 这样的数字格式化。\n\
    `%f` | 浮点数。不支持像 `%4.2f` 这样的数字格式化。\n`%o` | 对象。可通过展开三角形查看对象详情。\n\n以下是两个使用控制台日志的示例：\n\
    \n```\nconsole.log(\"My %s is great!\", \"iPhone\");\nconsole.log(\"My\", \"iPhone\"\
    , \"is great!\");\n```\n\n为了便于阅读，控制台会在必要时自动添加空格，并以树形格式显示对象。这两条命令将输出相同的结果到控制台，并附带一个指向执行行的链接。点击该链接会聚焦并高亮显示相关行。\n\
    \n## 使用交互式 Shell\n\n有时，通过重复的日志记录操作来查找对象或变量的值会非常繁琐。编辑文件、保存、重新加载页面等操作既耗时又低效。不过，借助检查器的交互特性，你可以直接在窗口底部的控制台提示符中输入命令，从而完成部分工作。命令的返回值会立即打印到控制台中。此功能可做的事情很多。\n\
    \n获取结果的最快方法是使用前面列出的日志记录命令，但您也可以运行页面中已有的脚本。这将允许您评估代码中的变量，观察它们的行为，并调整页面，因为您执行的所有更改（如果有）将直接应用于受影响的元素。\n\
    \n按向上箭头键将打开您已输入的命令历史记录，按时间从新到旧排列。\n\n检查器的交互式控制台甚至支持代码补全：开始输入命令时，会弹出建议补全单词。按右箭头键或\
    \ Tab 键接受建议。此外，在终端中时，输入 `clear()` 将清除屏幕上的所有输出，不过此功能也可以通过点击窗口左下角最右侧的图标来实现。\n\n\
    ## 让调试器来完成工作\n\n到目前为止，我们介绍的所有内容中，都是您在输入命令，决定在哪里做什么，以及如何去做。如果这还不够，您还可以利用 Web 检查器中实现的高级调试器。我们将使用以下代码来说明调试器的各种工具：\n\
    \n```html\n<html>\n  <head>\n    <title>测试脚本</title>\n    <script>\n      var\
    \ counter = 0;\n      var timerID = window.setInterval(myTimer, 10000);\n\n  \
    \    function myTimer() {\n        var span = document.getElementById(\"count\"\
    );\n        span.textContent = incrementCounter();\n        for (var n = 0; n\
    \ < 100000; n++) {\n          new Object().toString();\n        }\n        if\
    \ (counter > 1) {\n          errorGenerator();\n        }\n      }\n\n      function\
    \ incrementCounter() {\n        return ++counter;\n      }\n    </script>\n  </head>\n\
    \  <body>\n    定时器执行次数：<span id=\"count\">0</span>\n  </body>\n</html>\n```\n\n\
    这段代码的作用是启动一个定时器，每十秒钟调用另一个函数 `myTimer()`。该函数依次递增显示在浏览器中的计数器，然后运行一个重要的循环，最后通过调用一个未定义的函数来生成一个异常。\n\
    \n页面加载后，您可以从菜单中激活调试器，如果 Web 检查器窗口已打开，也可以直接点击“脚本(Scripts)”标签页。\n\n您刚刚打开的窗口有两个主要部分，如图\
    \ 3-17 所示。左侧是文件中的当前脚本，带有行号；如果脚本直接位于 HTML 文档的 `<script>` 标签中（如本例所示），您将看到此文件。右侧是有关当前脚本的各种信息。目前，这部分是空的。\n\
    \n![](img/index-72_1.jpg)\n\n**图 3-17.** 脚本调试器\n\n窗口的每个部分都有专门的按钮。在左上方，您可以从下拉菜单中选择所有可用的脚本。在右侧边栏的上方，您可以使用步进按钮来暂停脚本执行、单步执行到下一个函数调用、单步进入下一个函数调用或跳出当前函数，以及禁用断点。\n\
    \n### 断点\n\n即使您大致知道脚本在哪个阶段停止工作，找出问题所在也可能更棘手。这时，断点就可以帮到您。\n\n**警告：** 您无法通过从控制台运行脚本来使用调试器。无论您设置了什么断点或生成了什么异常，在这种情况下执行都不会暂停。因此，您还必须考虑使用有用的日志函数来跟踪您的脚本。\n\
    \n点击窗口左侧的行槽会为该行上的脚本部分切换一个蓝色断点。使用之前的代码，例如，您可以在定义 `myTimer()` 函数的行上添加一个断点。当脚本运行时，它将在此处中断（图\
    \ 3-18），并且所有变量和函数的当前状态将列在侧边栏中。\n\n![](img/index-73_1.jpg)\n![](img/index-73_2.jpg)\n\
    \n**图 3-18.** 行槽上放置了两个断点；调试器在第二个断点处停止\n\n您还可以使用条件断点来精细化地监控脚本。如果您想知道某个变量值如果不是\"\
    foo\"是什么，请右键单击任意一行，然后从上下文菜单中选择“编辑断点...”。将会弹出一个文本字段供您输入表达式，如图 3-19 所示。这种情况下，断点将变为橙色。如果表达式为真，脚本将停止；否则，将自动继续执行。\n\
    \n![](img/index-74_1.jpg)\n\n**图 3-19.** 设置条件断点\n\n在调试过程中，设置断点、查看情况、移除断点、查找另一行、再回到前一行等操作可能会很繁琐。侧边栏底部的“断点(Breakpoints)”窗格是您的助手。它保存了所有断点的列表，您无需删除，只需单击它们各自的复选框即可停用。您也可以使用侧边栏右上角的断点图标一次性停用所有断点。\n\
    \n更改选项后，您需要重新加载页面。脚本将一直运行，直到遇到断点。然后，所有执行都会暂停，并在右侧显示有关执行的上下文信息，如图 3-20 所示。\n\n\
    ![](img/index-74_1.jpg)\n![](img/index-74_2.jpg)\n\n**图 3-20.** 当调试器在断点处停止时，侧边栏会更新为与当前执行上下文相关的信息\n\
    \n### 单步执行\n\n在完成整个流程之前，只观察脚本的一个部分并不是很高效或自然。为了解决这个问题，让我们仔细看看侧边栏顶部的步进按钮，如图 3-21\
    \ 所示。\n\n![](img/index-75_1.jpg)\n\n**图 3-21.** 带有步进按钮的脚本调试器\n\n您可以使用第一个按钮在之前暂停当前脚本的执行。\n"
- fmt: '# Chapter 3: Introducing Developer and Debugging Tools


    ## Watch Expressions


    In the sidebar, another pane can help you inspect specific elements in your scripts:
    the Watch Expressions section. The expressions you watch can be quite anything,
    such as variables, test expressions, instances, and more. The information you
    will gather can be both local or global and will be updated as scripts are executed.


    Continuing with the same example, click the **Add** button (Figure 3–22), and
    type `counter` to observe its evolution. Refreshing is not automatic, so you will
    have to click the **Refresh** button to update data when a breakpoint is reached.


    > **Figure 3–22.** To watch an expression, click the **Add** button, and enter
    the expression to evaluate


    ## Call Stack


    The second pane from the top is labeled **Call Stack**. Here, all the functions
    that have been called but haven''t returned yet are listed, with the most recent
    call on top.


    You can add a second breakpoint on the `incrementCounter()` declaration and start
    the debug up to this function; this would result in what is shown on Figure 3–23.
    From there, you can move up the stack by clicking the entries from the pane.


    > **Figure 3–23.** The call stack is displayed in the sidebar in the relevant
    pane


    **TIP:** If you want your function''s name in the call stack to be more readable
    in some manner, you can easily assign it a specific name in the debugger with
    the `displayName` property. Thus, the function `myTimer()`, extended with `myTimer.displayName
    = "Main Loop"`, will appear as `"Main Loop"` in the call stack. This will also
    work in the profiler, soon to be introduced.


    This of course can be a great time-saver when watching the execution of consecutive
    scripts or scripts that are nested inside one another.


    ## Scope Variables


    The last and arguably richest section in the scripts sidebar is the one under
    the **Scope Variables** pane. At any time, the values of all the elements in the
    scope of the current execution context or used by the current script will be listed
    here. Stopping at the first breakpoint in our example, the data should look like
    Figure 3–24, displaying all the variables available to the `myTimer()` function,
    regardless of whether they have been initialized.


    > **Figure 3–24.** Variables in the current scope, initialized or not, with the
    huge Global list


    For ease of reading, these elements are classified based on their types and their
    use in the current scope: **Local**, **Global**, and **With Block** or **Closure**
    when available. This view not only makes it easier to find and use the elements
    available to your script, but it can also help you understand what''s going on
    and how to change it. As with CSS and HTML values, you can alter values in the
    **Scope Variables** pane by double-clicking them. The **Global** pane will notably
    give a list of classes available at the scripting engine level with their complete
    prototype.


    ## Exceptions


    You''ve learned how to find errors and how to look at your script behavior. However,
    you may have noticed that both the JavaScript console and the **Scripts** section
    only notify about exceptions—a log in the console, a colored line directly in
    the script—they do not stop the execution. To make the execution of functions
    automatically halt on exceptions (Figure 3–25), you can click the **Pause** icon
    in the bottom-left corner of the Web Inspector window.


    > **Figure 3–25.** Click the **Pause** button will halt the debugger on exceptions


    Clicking once will color the icon blue, meaning that all exceptions will cause
    the script to pause, so you can check the information available at that stage,
    as shown in Figure 3–25. Clicking twice will cause the script to halt only on
    uncaught exceptions—not those caught by a `try...catch` statement.


    These tools brought together should make your development process hugely easier
    and faster. Not only is the JavaScript debugger useful to identify exactly where
    your script may be going wrong, but as you get used to it, it should also help
    you in your optimization stages to build overall better web applications.


    ## The Life Cycle of Your Page


    It is always interesting to get an overview of what''s going on in your page all
    the way through its life. Which scripts are executed, how long do they take to
    complete, what amount of code, markup or images are loaded and in which order—this
    information is important when developing for the Web. The **Timeline** tab shows
    you all this information in an orderly and clear manner (see Figure 3–26).


    The recording is triggered by clicking the round icon on the bottom-left side
    of the Web Inspector window. If you click this button and reload your page, you
    will see that everything is recorded, including what happens after the initial
    page load and expressed at the top of the drawing area using three parallel timelines—**Loading**,
    for elements loaded for the page; **Scripting**, for script evaluation and events
    triggered on page load for instance; and **Rendering**, for all that is done to
    draw to the screen, what is redrawn, and how it can harm performance.


    > **Figure 3–26.** The **Timeline** section with control buttons on the bottom


    **WARNING:** You have to be cautious with this inspector tool and always remember
    that the device you are targeting will not share the same specs as your desktop
    system and browser, notably regarding connection speeds. That is to say, use this
    tool, get information from it, but, most importantly, interpret this information
    while keeping in mind that you are not developing for the device you are debugging
    on.


    For ease of use, although all operations are recorded, you can easily show only
    some types of events by deselecting categories from the left sidebar opposite
    the timeline. This will make the events in the timeline change from blue (loading),
    yellow (scripting), and purple (rendering) to gray.


    The timeline width is limited to the width of your screen, meaning the timescale
    will change depending on its contents. You can refine your inspection target by
    pulling the handles from the left and right edges of the top timeline area. This
    will stress the relevant section of the event tree. This will prove especially
    useful if your page contains animated content or JavaScript timers, because in
    this case, the timelines will continue drawing changes to the screen, showing
    newly rendered browser areas and timer iterations.


    Hovering over an event in the timeline or the tree view will trigger a pop-up
    with information about the event, such as the time it took to take effect, its
    type, or the files requested in a loading operation. Clicking elements in this
    pop-up will take you to the **Resources** section of the Web Inspector to get
    additional information about the event (see Figure 3–27).


    > **Figure 3–27.** A pop-up showing information about the bar being hovered over


    As with the JavaScript debugger, if you want a fresh start at some point, you
    can clear the view by clicking the struck circle icon near the bottom-left side
    of the window.


    ## Profiling Your Scripts


    Together with a timeline for all that is happening in your page, you can get a
    profile of the scripts being run and CPU usage. This feature is available by clicking
    the **Profiles** icon (see Figure 3–28).'
