    the data retrieved back to a Number object before incrementing or decrementing
    it, or the string will simply be concatenated with 1\. Also, because strings are
    stored using UTF-16, a character takes two bytes, thus taking more space; therefore,
    to store a Date object for instance, you should rather store the value of the
