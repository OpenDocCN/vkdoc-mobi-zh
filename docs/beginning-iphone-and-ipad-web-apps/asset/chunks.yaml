- fmt: '# CHAPTER 3: Introducing Developer and Debugging Tools


    From the `Profiles` section, as from any other section, you can perform a search
    against your data from the text field at the upper right of the Web Inspector
    window. This search field will understand character strings when looking for function
    names or resource URLs. Nonetheless, it should take numerical values and operators,
    such as `<`, `>`, `<=`, `>=`, and `=`. This will allow you, for instance, to find
    all functions that take more than a certain amount of time to complete. Values
    would be highlighted in the table, as shown on Figure 3–30.


    **Figure 3–30.** Searching for `>4s` will highlight all the relevant table entries


    You can use the same numerical units as in the tabular data, namely, percentage,
    milliseconds, or seconds. Once your query has returned results, you can navigate
    different elements by pressing the `Return` key.


    ## Client-Side Data Storage


    One exciting new feature in WebKit is the ability to store data on the user side
    not only with cookies but also with databases directly set in the browser. We
    will be getting into further detail for this feature in Chapter 15; for now, we
    will see how the `Storage` section (the `Database` section in older versions)
    allows you to inspect several client-side storage types (see Figure 3–31).


    **Figure 3–31.** The Storage Inspector


    The Storage Inspector layout should seem familiar at this stage with the usual
    sidebar and main view. In the sidebar on the left are panes listing storage types,
    and under each you will see the various storage groups or cookies in use, if any.


    ### Database Storage


    The first group is for databases. Each database is collapsible using the arrow
    preceding the database icon. To reveal the tables of a storage block, just click
    it. The selected table will be presented on the right side of the window as data
    grids showing all columns and rows.


    As with the `Scripts` section, if you want to go further with your inspection,
    you can invoke an interactive shell by clicking the storage block. The shell here
    is dedicated to SQL commands, allowing you to query data with the help of autocompletion.
    Note that in the current version, running commands here is the only way to interact
    with the tables, which cannot be edited directly as you may have done with other
    storage features.


    However, the results of your queries will appear immediately on the screen, so
    the process is rather quick and simple.


    ### Cookies


    Cookies are a long-known client-side storage method. Selecting the `Cookies` pane
    from the left can hugely simplify your management of cookies. All cookies available
    to the current page will be presented as a table, with for each its name, value,
    domain (whether it is a cookie from your page or from third-party sites, as for
    ads), path, expiry date, size, HTTP, and HTTPS-only flags. You can delete any
    cookie; however, all cookie deletion is definitive, so use this with care—you
    may not want to lose your preferences for all your favorite sites by messing this
    up.


    ### Other Storage Features


    Cookies are limited in size to 4KB. Along with database storage, WebKit brings
    you solutions to store beyond these limitations with local storage and session
    storage. Each of these has a dedicated pane in the left sidebar. Like cookies,
    they work as key-value pairs of information. To illustrate this, you can type
    the following into the console:


    ```

    localStorage.myKey = "Some value";

    sessionStorage.anotherKey = "Some other value";

    ```


    These lines will respectively create new storage sections in the local and session
    storage areas. As will be possible with cookies, you can delete an entry by clicking
    the cross icon under the table, but unlike cookies and database storage, you can
    modify values directly from the table and add new entries by double-clicking an
    empty spot.


    ## Auditing Your Page


    The `Audits` section can help you optimize your site by suggesting guidelines
    and best practices related to the loading of your pages. These guidelines are
    mainly based on recommendations from the W3C WebApps Working Group (WWAWG) for
    better web-based applications. At the time of writing, you cannot extend the audit
    abilities, but this is a project for future versions, which should allow you to
    target issue categories specifically, such as security or specific devices.


    Again, a list of audits is available from the left sidebar, and the right side
    of the window holds data and options to run a new audit (Figure 3–32). You will
    be able to choose between `Network Utilization`, `Page Performance`, and `All`.
    You can also choose between an audit on page load and an audit of the current
    state of the page. When you’re ready, simply click the `Run` button at the bottom
    of the window, and shortly the results of your audit should appear in the inspector.


    **Figure 3–32.** The result of the audit


    Results are categorized depending on how critical they are—red for important issues
    and green for lesser improvements to be considered. Among recommendations, you
    may find a list of unused CSS selectors, tips for browser caching, or tips for
    cookie handling. For instance, you may be advised to put static content on a separate
    server to prevent useless cookie movement with each new request (images, style
    sheets, and so on); obviously, this uselessly adds to the traffic weight, because
    there are few chances that a cookie would be processed on the server by static
    content such as an image.


    If we haven’t reminded you enough, you’re targeting devices whose connection quality
    is unreliable and with overall lower performances than desktop computers or laptops.
    Every kilobyte spared is time saved and is a step away from seeing your user leave
    the page, perhaps never to come back.


    ## Still Unsure?


    Although we think the WebKit Web Inspector is a great tool for front-end debugging,
    it is natural that you may prefer some other browser or tool in your developing
    process. If you’re already a front-end developer, you may be used to Firebug on
    Firefox or Dragonfly on Opera. Even Internet Explorer comes with developer tools
    with the latest versions. Whatever your situation, be aware that most browsers
    nowadays have debugging and development tools either built in or available as
    extensions. The Web Inspector actually wasn’t built from scratch: the `Console
    API`, for instance, was first used in the hugely successful Firebug. This ultimately
    is a matter of habits and personal choice.


    If you like Firebug or you want more functionality to debug directly on your targeted
    device, we recommend you follow the updates of Firebug Lite. This tool is a lightweight
    version of Firebug available to all browsers as a bookmarklet. For now, it isn’t
    very functional on the iPhone, but as it evolves, it may be a serious option for
    web app developers.


    ## Summary


    You now should have a firm grasp of the tools available to you to speed up your
    developing process. You may also feel reassured that so many helpful tools are
    available right in your everyday browser to make your developer’s life easier.
    You are not alone, and because the tools we have introduced are built with web
    languages, the evolutions coming from the community should prove of great help
    too: who better than web developers can tell what they need? We will be giving
    more detail about some of these tools when necessary in the following chapters.
    We bet you sense that things are getting more concrete. In the next chapter, we
    will be dissecting the generic web app elements, before getting to the core of
    Mobile Safari development.


    ---


    ## Part II


    # Web App Design with HTML5 and CSS3


    ## Chapter 4


    # The Anatomy of a Web Application


