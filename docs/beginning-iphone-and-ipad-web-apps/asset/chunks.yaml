    \n![](img/index-156_1.jpg)\n\n第 6 章：为 Web 应用界面增色的 CSS 特性\n\n## 多层背景\n\n如你所见，使用\
    \ CSS3 背景可以实现的视觉效果比 CSS2 丰富得多。然而，这还不是新规范为你准备的全部内容。\n\n在处理背景图片时，你现在可以处理应用于单个元素的多个背景。通过为背景的\
    \ URL 使用逗号分隔的值列表，所有图片都会被考虑在内，并按照最先声明的图片位于最上层的顺序堆叠。这样做的主要限制是，你只能指定一种背景颜色，并且该颜色将仅位于最底层。\n\
    \n然而，WebKit 扩展了此功能，不仅允许对 `background-image` 属性使用多层背景，还允许对所有（除颜色之外的）背景属性使用。例如，这意味着“滑动门”技术的终结，或者为流式布局提供了更多可能性，因为使用\
    \ `-webkit-gradient()` 绘制的渐变背景将是可调整大小的。你可以不使用背景重复，而是使用以下代码实现类似图 6-11 所示的效果：\n\n\
    ```\n.multiple {\n\n  width: 400px;\n\n  height: 300px;\n\n  background-repeat:\
    \ no-repeat;\n\n  background-image: url(flower.jpg);\n\n  background-position:\n\
    \n    90px 90px,\n\n    70px 70px,\n\n    50px 50px;\n\n  -webkit-background-size:\n\
    \n    60% auto,\n\n    50% auto,\n\n    40% auto,\n\n    30% auto,\n\n    20%\
    \ auto;\n\n}\n```\n\n**图 6-11.** 图片从底部第一张到顶部最后一张堆叠显示\n\n在这个例子中，我们对所有背景层保持 `background-image`\
    \ 属性不变，但逐步改变其位置和大小，以模拟缩放效果。\n\n第 6 章：为 Web 应用界面增色的 CSS 特性\n\n当某些属性的值个数少于层数时，理解解释器如何处理值非常重要。应用的规则是循环重复可用值列表，直到满足正确的数量。\n\
    \n但是，请小心：尽管规范指出层数应完全由 `background-image` 属性的数量决定，但如果其他背景属性有更多数量，WebKit 会复制此属性。因为根据规范，多余的值应该被忽略，我们建议你在设计中不要依赖此行为，因为\
    \ WebKit 的实现或规范都有可能演变。\n\n例如，此属性将让你为被选中的元素设置不同的背景。我们将在下一章关于 canvas 和 SVG 的内容中使用它来为列表项添加箭头，并且它被用于我们的\
    \ Web 应用模板头部，结合了渐变和我们将要解释的新颜色定义可能性。\n\n## 颜色\n\n颜色对于设计至关重要，并且随着其渲染在设备上的改进，其使用变得越来越复杂。然而，构建具有复杂颜色关联的界面通常需要我们求助于图片（例如处理透明度）或第三方工具（典型的是构建配色方案）。CSS3\
    \ 规范带来了一系列新选项，可以帮助你构建更复杂但更轻量级的无图片界面，同时提高你的工作效率。\n\n### Alpha 通道\n\n使用 CSS2 定义颜色最常用的是\
    \ RGB 表示法，即 `#rrggbb`、`#rgb` 和 `rgb()` 函数。这在 CSS3 中得到了扩展，允许使用 `rgba()` 函数来使用 alpha\
    \ 通道。Alpha 通道的值是一个介于 0 到 1 之间的浮点数。这在处理透明框背景时特别有用，因为传统使用 `opacity` 属性存在一个不便之处：其效果会被子元素继承。例如，要在一个框上设置半透明背景，同时保持内部文本完全可读，你通常需要求助于背景图片或复杂的定位。现在这不再是必需的，因为你可以简单地设置\
    \ `background-color` 属性的透明度。\n\n以下代码展示了这将如何改变你的工作：\n\n```\n<style>\n\nbody { background-color:\
    \ yellow; }\n\n.main { position: relative; }\n\n.opacity-layer {\n\n  position:\
    \ absolute;\n\n  background-color: blue;\n\n  opacity: 0.25;\n\n  left: 0;\n\n\
    \  right: 0;\n```\n\n第 6 章：为 Web 应用界面增色的 CSS 特性\n\n```\n  top: 0;\n\n  bottom:\
    \ 0;\n\n}\n\n.content-layer {\n\n  position: relative;\n\n  color: red;\n\n}\n\
    \n</style>\n\n<div class=\"main\">\n\n  <div class=\"opacity-layer\"></div>\n\n\
    \  <div class=\"content-layer\">\n\n    <h1>一些标题</h1>\n\n    <p>一个不错的段落。</p>\n\
    \n  </div>\n\n</div>\n```\n\n以下是使用新颜色函数的等效代码：\n\n```\n<style>\n\nbody { background-color:\
    \ yellow; }\n\n.content-layer {\n\n  background-color: rgba(0,0,255,0.25);\n\n\
    \  color: red;\n\n}\n\n</style>\n\n<div class=\"content-layer\">\n\n  <h1>一些标题</h1>\n\
    \n  <p>一个不错的段落。</p>\n\n</div>\n```\n\n当然，alpha 通道的另一个优点是，因为它只是一种颜色定义，你可以将其应用于任何接受颜色值的属性，包括文本或边框。你还会发现它可以用于创建复杂的\
    \ CSS 背景渐变。\n\n### 新的颜色定义\n\nAlpha 通道也可以与一个新的 CSS3 颜色定义函数 `hsl()` 一起使用。尽管 RGB\
    \ 被广泛使用，并且许多前端开发人员对它相当熟悉，但它通常被认为不够直观。实际上，在“日常生活中”，人们习惯于颜色的减色合成（例如混合颜料时），而 RGB\
    \ 基于加色合成（例如“将所有颜色混合在一起会产生纯白色”，光的情况就是如此）。通常，RGB 用户实际上是通过潜意识地将其转换为色相、饱和度和亮度的变化来习惯它的。\n\
    \n色相（`hsl()` 和 `hsla()` 函数中的 *h*）是一个角度，以度为单位（不指定单位），取值范围是 0 到 360。它通常用一个圆来表示，其中每个度代表颜色的变化，从红色（0）到红色（360）。饱和度和亮度以百分比形式指定。\n\
    \n![](img/index-159_1.jpg)\n\n第 6 章：为 Web 应用界面增色的 CSS 特性\n\n`hsl(*<色相>*, *<饱和度>*,\
    \ *<亮度>*)`\n\n`hsla(*<色相>*, *<饱和度>*, *<亮度>*, *<alpha>*)`\n\n以下是一组等效的 CSS 规则：\n\
    \n```\n.red { color: red; }\n\n.red { color: #f00; }\n\n.red { color: rgb(255,\
    \ 0, 0); }\n\n.red { color: hsl(0, 100%, 50%); }\n\n.red { color: hsl(360, 100%,\
    \ 50%); }\n\n.red { color: hsla(0, 100%, 50%, 1.0); }\n```\n\n由于围绕色相“圆”的递进很容易理解，你可以相当轻松地在它周围移动，如图\
    \ 6-12 所示，这是该圆的一个展开版本，带有用于定位基本颜色的停止点。\n\n**图 6-12.** 基本颜色之间的转换表\n\nHSL 使得以自然的方式移动颜色值变得更加容易。如果你想要橙色，只需在红色和黄色之间（0\
    \ 到 60 度）选择一个值。想要更浅的橙色？只需增加一些亮度。需要一个不那么鲜艳的橙色？降低一些饱和度。使用 `rgb()` 表示法，你需要确定每种颜色的数量，而使用\
    \ `#rrggbb` 表示法，你还需要处理将每种颜色转换为十六进制值的额外困难。\n\n### 使用渐变\n\n前面的属性允许对背景属性进行微调。然而，WebKit\
    \ 引入了新的属性，允许你使用代码而不是图片来实现一个非常有趣的目的：渐变。这可以对你处理设计元素的方式产生巨大影响，因为它具有相当多的优点。\n\n首先，CSS\
    \ 渐变对最终用户来说更轻量级，因为不需要加载任何图片，当然，也不会有额外的 HTTP 请求——正如我们之前指出的，这在移动设备上可能相当慢。\n\n其次，一旦你掌握了\
    \ CSS 渐变，在你的网站上修改它们会更快、更直接，因为你只需要一种工具（这通常也意味着只需要一个人），而且你不需要担心尺寸问题。\n\n### 基本语法\n\
    \n在撰写本文时，还没有关于 CSS 渐变实际语法的规范；每个浏览器厂商都以自己的方式实现了这个特性。以下是为 WebKit 浏览器创建渐变的最基本语法：\n\
    \n![](img/index-160_1.jpg)\n\n第 6 章：为 Web 应用界面增色的 CSS 特性\n\n```\n-webkit-gradient(\n\
    \n  linear,\n\n  left top,\n\n  right bottom,\n\n  from(black),\n\n  to(yellow)\n\
    \n)\n```\n\n例如，你可以使用以下代码将其应用到元素的背景上：\n\n```\n<style>\n\nbutton {\n\n  background-image:\n\
    \n    -webkit-gradient(\n\n      linear,\n\n      left top,\n\n      right bottom,\n\
    \n      from(white),\n\n      to(lightgrey)\n\n    );\n\n  border: 1px solid gray;\n\
    \n}\n\n</style>\n\n<button>点击我</button>\n```\n\n这个例子绘制了一个从框的左上角延伸到右下角的线性渐变，并会创建一个从白色到浅灰色的过渡，如图\
    \ 6-13 所示。在我们的例子中，为了清晰起见，我们将使用命名颜色，但你可以使用 CSS3 支持的任何颜色命名约定，包括透明值。\n\n**图 6-13.**\
    \ 一个带有线性渐变的简单按钮\n\n你可以使用命名位置、像素（隐含单位）或百分比来确定位置：例如，我们例子中的 `left top` 和 `right bottom`\
    \ 值分别等同于 `0 0` 和 `100% 100%`。\n\n渐变色值可以应用于支持图片的属性，即 `background-image`、`border-image`、`list-style-image`，甚至\
    \ `content`。但是，目前还不能将此值设置为颜色属性的值——这意味着你无法直接将渐变应用于文本。\n\n![](img/index-161_1.jpg)\n\
    \n第 6 章：为 Web 应用界面增色的 CSS 特性\n\n### 改变渐变的尺寸\n\n对于背景，渐变的默认行为是扩展到其所在框的尺寸。由于 `-webkit-gradient()`\
    \ 函数被视为一张图片，你可以使用前面解释过的属性来调整此行为，特别是使用 `background-size`，它将改变渐变的绘制区域。\n\n例如，将背景尺寸设置为\
    \ `5px`，会将渐变的跨度限制为一个边长为 5 像素的正方形。`background-repeat` 的默认值是 repeat，所以如果你没有设置值，渐变将作为一个图案重复以覆盖框的区域，如图\
    \ 6-14 所示。\n\n```\n.gradient-box {\n\n  ...\n\n  -webkit-background-size: 5px;\n\
    \n}\n```\n\n**图 6-14.** 由于绘制区域被重新定义，渐变变成了一个重复的图案\n\n当然，如果绘制区域不够大，无法容纳整个渐变，你的渐变可能会被截断。这通常在使用固定尺寸时发生（正如你必须使用径向渐变时那样）。\n\
    \n### 完整的渐变语法\n\n尽管渐变为 HTML 元素的样式提供了大量新的可能性，但 WebKit 对渐变的实现还有更多内容。以下是 WebKit 文档中描述的完整语法：\n\
    \n`-webkit-gradient(*<类型>*, *<点>* [, *<半径>*]?, *<点>* [, *<半径>*]? [, *<停止点>*]**)`\n\
    \n像正则表达式一样，问号表示该项可以出现零次或一次，星号表示它可以出现一次或多次，或者根本不出现。当然，指定一个没有颜色的渐变似乎是个奇怪的想法。\n\n\
    你可以使用 CSS 创建两种渐变：你已经见过的线性渐变和径向渐变。要定义径向渐变，你必须在我们已经介绍的元素之外指定一个半径。请注意，半径的值仅以像素表示，尽管不应指定单位。你不能使用相对单位来使渐变适应你的框的尺寸，因此你只能实现正圆，而不能实现更复杂的椭圆。你可以通过将第一个例子中的渐变代码替换为以下代码来查看径向渐变类型的效果（如图\
    \ 6-15 所示）：\n\n![](img/index-162_1.jpg)\n\n第 6 章：为 Web 应用界面增色的 CSS 特性\n\n```\n\
    -webkit-gradient(\n\n  radial,                    /* 渐变 <类型> */\n\n  100 100,\
    \ 25,               /* <点> 和 <半径> (仅用于径向渐变) */\n\n  100 100, 100,\n\n  from(black),\
    \               /* 2 个 <停止点> 值 */\n\n  to(yellow)\n\n);\n```\n\n**图 6-15.** 一个简单的径向渐变\n\
    \n这种语法可能看起来有点棘手或令人困惑。确切理解每个值代表什么很重要。在渐变类型之后，第一对值是渐变应该起始的位置。其后跟着第一个颜色停止点应该完全填充的区域半径。\n\
    \n第二对值再次指示渐变的终点圆，最后一个数字是颜色混合应该发生的半径。此最后一个圆之外的剩余空间将仅用最后一个颜色停止点填充。\n\n从 Wow! eBook\
    \ <www.wowebook.com> 下载\n\n最后的数值决定了用于绘制渐变的颜色。如前所示，并且我们将在下一节解释，你可以为这些值设置任意数量的颜色。\n\
    \n### 高级颜色处理\n\n`from()` 和 `to()` 函数都是 `color-stop()` 函数的简写形式，其签名如下：\n\n`color-stop(*<停止值>*,\
    \ *<颜色>*)`\n\n第一个参数可以定义为百分比，也可以定义为范围从 0 到 1 的浮点数。第二个参数接受任何有效的 CSS 颜色定义。因此，此函数允许你为渐变确定整个调色板，以及它们应该开始、停止和混合的步骤。因此\
    \ `from(*<颜色>*)` 和 `to(*<颜色>*)` 等同于 `color-stop(0, *<颜色>*)` 和 `color-stop(1, *<颜色>*)`。\n\
    \n![](img/index-163_1.jpg)\n\n第 6 章：为 Web 应用界面增色的 CSS 特性\n\n这为使用渐变开辟了新的途径，因为你可以为单个渐变多次使用\
    \ `color-stop()` 函数。以下是前面的例子，增加了一种颜色：\n\n```\n-webkit-gradient(\n\n  radial,\n\
    \n  100 100, 25,\n\n  100 100, 100,\n\n  from(black),\n\n  to(yellow),\n\n  color-stop(50%,\
    \ red)\n\n);\n```\n\n如果你使用 Photoshop，这种逻辑应该感觉很熟悉，你会认出渐变编辑器，如图 6-16 所示。\n\n**图\
    \ 6-16.** Photoshop 渐变编辑器，带有颜色停止点及其之间的中点圆\n\n然而，使用 CSS，要让一种颜色比另一种颜色更重要（就像在 Photoshop\
    \ 中使用颜色中点那样）或构建不规则渐变的唯一方法是添加更多具有相同颜色的停止点。\n\n在指定这些颜色停止点时顺序并不重要，除非有几个停止点出现在同一位置，例如在构建一个锐利的过渡时，如下例所示（图\
    \ 6-17）：\n\n```\n-webkit-gradient(\n\n  radial,\n\n  50% 50%, 0,\n\n  50% 50%,\
    \ 100,\n\n  from(red),\n\n  color-stop(50%, red),\n```\n\n![](img/index-164_1.png)\n\
    \n第 6 章：为 Web 应用界面增色的 CSS 特性\n\n```\n  color-stop(50%, yellow),\n\n  color-stop(99%,\
    \ yellow),\n\n  color-stop(99%, transparent),\n\n  to(transparent)\n\n);\n```\n\
    \n**图 6-17.** 使用多个 `color-stop()` 绘制的两个同心圆\n\n使用这种技术，你可以绘制出边界清晰的圆，而无需担心渐变的结束颜色会填满整个框。在我们的\
    \ Web 应用模板中，我们使用了这种技术来添加一个斜线背景。它也将用于第 9 章，结合本章稍后将解释的弹性盒模型，创建一个吸引人的标签栏。\n\n## 盒与边框\n\
    \n传统上，CSS 中的“盒”并没有提供太多的样式选项。除了少数支持不均衡的边框样式外，你不得不求助于背景图片，以及随之而来的所有重复样式和过程中的近似处理，才能为你的元素增添一些额外的光彩。\n\
    \n一个简单的网络搜索会得到数百个页面，承诺提供终极的斜面或圆角边框解决方案；这要么导致了多余的标记，要么带来了沉重的 JavaScript，要么增加了额外的图片。CSS3\
    \ 几乎使这些做法过时了，因为新版本的浏览器（包括 Mobile Safari）支持几个非常有趣的特性。\n\n### 盒尺寸\n\n在开始讨论盒的样式之前，让我们先看看一个关于盒尺寸的新特性。`box-sizing`\
    \ 属性源于对不符合规范的 Internet Explorer 的观察，它没有按照 CSS2 规范描述的方式计算盒尺寸。尽管 HTML 渲染引擎应将盒尺寸计算为其宽度、内边距、边框和外边距的总和，但\
    \ Internet Explorer 将内边距视为内容宽度的一部分，而不是将其添加进去。\n\n![](img/index-165_1.jpg)\n\n\
    第 6 章：为 Web 应用界面增色的 CSS 特性\n\n```\n.box {\n\n  -webkit-box-sizing: border-box;\n\
    \n}\n```\n\n`box-sizing` 属性的默认值是 `content-box`，这是 CSS2 中预期的行为。但是，将值设置为 `border-box`\
    \ 将导致内边距和边框被计入内容区域内部，而不是其外部。图 6-18 显示了它们的区别。\n\n**图 6-18.** 透明内边距和黑色边框显示了两种盒模型之间的差异\n\
    \n如果你已经使用 CSS2 盒模型一段时间了，这可能会让你觉得不寻常。尽管如此，使用这个属性值意味着你无需担心为盒赋予 100% 的宽度，或为容器添加边框。\n\
    \n通常情况下，你会设计一个具有全局容器、一个用于主内容的 680 像素宽的左列和一个 300 像素的侧栏的网站。更改盒的内边距或为侧栏添加边框可能是一项艰巨的任务。在这里，你无需担心这个，因为你的盒将保持其外部宽度。\n\
    \n### 圆角盒角\n\n为页面上的元素添加圆角已经流行了一段时间；然而，同样地，这很难以一种灵活的方式实现。此外，iPhone 用户界面广泛使用了圆角。要实现与此一致的设计，你可能希望模拟\
    \ iOS 的盒。\n\nCSS3 通过 `border-radius` 属性带来了终极解决方案。通过一个简单的 CSS 声明，你应该能够实现设计师对圆角的大部分梦想，如图\
    \ 6-19 所示。\n\n请注意，WebKit（以及必然的 Mobile Safari）并未完全遵循规范。这只是一个限制，规范允许你通过一个声明生成\n\n\
    ![](img/index-166_1.jpg)\n\n![](img/index-166_2.png)\n\n第 6 章：为 Web 应用界面增色的 CSS\
    \ 特性\n\n不同的边框。对于 WebKit 的语法，如果你想要不同的效果，你必须分别声明每个角。\n\n然而，Mobile Safari 的语法可以说是更直观的。你在属性名称中引用目标边框，并将半径设置为值。因此，你的规则将如下所示：\n\
    \n```\n/* 四个角使用相同值 */\n\n-webkit-border-radius: 16px;\n\n/* 与分别声明相同 */\n\n-webkit-border-top-left-radius:\
    \ 16px;\n\n-webkit-border-top-right-radius: 16px;\n\n-webkit-border-bottom-left-radius:\
    \ 16px;\n\n-webkit-border-bottom-right-radius: 16px;\n```\n\n**图 6-19.** 一个带有圆角的简单盒\n\
    \n当然，你并不局限于常规形状。尽管为每个角赋予相同的值会得到一个带有圆角的常规盒，最终形成一个完美的圆，但你可以通过为宽度和高度指定并列的值来创建更椭圆的形状，如图\
    \ 6-20 所示：\n\n```\n/* 再次，四个角使用相同值 */\n\n-webkit-border-radius: 24px 48px;\n\n\
    /* 再次，与分别声明相同 */\n\n-webkit-border-top-left-radius: 24px 48px;\n\n-webkit-border-top-right-radius:\
    \ 24px 48px;\n\n-webkit-border-bottom-left-radius: 24px 48px;\n\n-webkit-border-bottom-right-radius:\
    \ 24px 48px;\n```\n\n**图 6-20.** 一个带有扭曲角的盒\n\n![](img/index-167_1.jpg)\n\n第 6\
    \ 章：为 Web 应用界面增色的 CSS 特性\n\n此属性适用于所有元素，就像 `border` 属性一样，但它不依赖于边框的实际使用。同样，你可以使用任何度量单位，无论是像像素这样的固定值，还是像\
    \ em 或百分比这样的相对值。\n\n使用百分比时，半径的值将相对于盒的总宽度和高度（即使用 `border-box` 作为 `box-sizing` 值时考虑的尺寸）进行评估。还要注意，你无需担心背景溢出其容器，因为它们将被适当地裁剪。\n\
    \n### 用图片绘制边框\n\n无论 `border-radius` 这个 CSS3 特性多么令人惊叹，新规范中的边框远不止是边框线。实际上，你还可以通过\
    \ `border-image` 属性整合更复杂的边框样式。它会负责将图片调整到边框的尺寸，要么通过缩放，要么通过重复。\n\n在以下示例中，我们将使用图\
    \ 6-21 中的图片（宽高均为 300 像素）作为边框图案，该图案被分成九个不同的区域。这些区域将按照与 margin、padding 或 border\
    \ 相同的顺序进行声明，有两种模式：拉伸和重复。此方法的主要限制是你无法为相对的边框指定不同的模式。\n\n**图 6-21.** 用作边框图片的图案\n\n\
    ![](img/index-168_1.jpg)\n\n第 6 章：为 Web 应用界面增色的 CSS 特性\n\n图 6-22 显示了仅更改模式后以下代码的结果：\n\
    \n```\n.border {\n\n  -webkit-border-image: url(diamonds.png) 100 100 100 100\
    \ stretch stretch;\n\n  width: 400px;\n\n  height: 350px;\n\n  border-width: 100px;\n\
    \n}\n```\n\n**图 6-22.** 使用拉伸和重复模式的结果框\n\n还有第三种模式，`round`，它会重复图案并对其进行缩放，使其不被截断。然而，Mobile\
    \ Safari 尚不支持此模式。作为安慰，因为主要是边框的贴图边框，你可以直接在 `border-image` 声明中指定边框宽度，如下所示：\n\n```\n\
    .border {\n\n  -webkit-border-image: url(diamonds.png) 100 / 100px stretch stretch;\n\
    \n  width: 400px;\n\n  height: 350px;\n\n}\n```\n\n这是该属性的简写形式。因为所有边都具有相同的尺寸，我们将切片区域组合在一起。此值不带单位；对于图片的各个部分，像素是隐含的。斜线将切片区域与边框的尺寸分隔开，以避免混淆。\n\
    \n因为图片中的区域是 100 像素宽，并不意味着我们需要那么宽的边框：通过定义更薄的边框，图片区域将被缩放以适合边框宽度。因此，在以下示例中，我们的图片的上、右、下、左边框将分别被处理为\
    \ 50px、25px、100px 和 25px 宽（图 6-23）。\n\n```\n.border {\n```\n\n![](img/index-169_1.jpg)\n\
    \n第 6 章：为 Web 应用界面增色的 CSS 特性\n\n```\n  -webkit-border-image: url(diamonds.png)\
    \ 100 / 50px 25px 100px stretch;\n\n  width: 400px;\n\n  height: 350px;\n\n}\n\
    ```\n\n**图 6-23.** 每个边框都有自己的厚度\n\n在创建有吸引力的按钮以替换默认的操作系统按钮时，这条规则非常有用。\n\n### 阴影\n\
    \n在构建网页时，对边框有更多的控制是一个有趣的特性，因为识别块有助于提高可读性，并且可以成为一种使内容突出的方式。在这方面，CSS3 提供了另一个期待已久的特性，即通过\
    \ `box-shadow` 属性为块添加外部阴影。WebKit 浏览器也实现了 CSS2 的 `text-shadow` 属性。由于该属性是官方推荐标准的一部分，并且被认为是稳定的，你无需使用\
    \ `-webkit-` 前缀。\n\n这两个特性不仅允许投影，还使得绘制发光效果成为可能，这对于创建按钮效果非常有用。除了视觉吸引力之外，此解决方案的一个优点是阴影不会扩展你块或文本的尺寸，这意味着你的布局不会受到影响。此外，你可以仅使用一个声明为同一个元素应用多个阴影。\n\
    \n第 6 章：为 Web 应用界面增色的 CSS 特性\n\n### 盒阴影\n\n盒阴影的语法非常简单。`box-shadow` 属性接受四个参数：颜色、水平偏移、垂直偏移和模糊半径。将模糊设置为\
    \ 0 会产生一个清晰锐利的阴影；值越大，阴影越模糊、越透明。\n\n此属性最常见的用法可能是勾勒页面部分的轮廓，或者在按下按钮时提供用户反馈。尽管如此，在以下示例中，我们将使用它来创建一个类似\
    \ iOS 外观的图标，仅使用图标本身这一张图片。\n\n```\n<style>\n\n.icon {\n\n  display: inline-block;\n\
    \n  text-shadow: rgba(0,0,0,0.5) 2px 2px 2px;\n\n  color: #000;\n\n  font: bold\
    \ 11px helvetica;\n\n  text-align: center;\n\n  margin: 8px;\n\n}\n\n.icon div\
    \ {\n\n  -webkit-border-radius: 8px;\n\n  width: 57px;\n\n  height: 57px;\n\n\
    \  margin: 0 auto 4px;\n\n  -webkit-box-shadow: 0 4px 4px rgba(0,0,0,0.5);\n\n\
    \  -webkit-box-sizing: border-box;\n\n  background-image:\n\n    -webkit-gradient(radial,\n\
    \n      50% -40, 37,\n\n      50% 0, 100,\n\n      from(rgba(255,255,255, 0.75)),\n\
    \n      color-stop(30%, rgba(255,255,255, 0)),\n\n      color-stop(30%, rgba(0,0,0,\
    \ 0.25)),\n\n      to(rgba(0,0,0, 0))\n\n    ),\n\n    url(flower.png);\n\n  -webkit-background-size:\
    \ auto auto, 100% 100%;\n\n}\n\n</style>\n\n<div class=\"icon\">\n\n  <div></div>\n\
    \n  鲜花\n\n</div>\n```\n\n在图 6-24 中你首先会注意到阴影跟随边框。因此，如果你为角应用了半径，阴影也会是圆角的。\n\n![](img/index-171_1.jpg)\n\
    \n![](img/index-171_2.jpg)\n\n第 6 章：为 Web 应用界面增色的 CSS 特性\n\n**图 6-24.** 一个 iOS\
    \ 仪表盘样式的图标\n\n**注意：** `zoom` 属性不是有效的 CSS。它最初由 Internet Explorer 实现，后来被其他浏览器实现，但从未成为任何规范的一部分。\n\
    \n使用这段代码的另一个有趣之处在于它是完全可调整大小的。例如，将 `zoom` 属性设置为 0.57 会将你的 57 像素图标更改为常规的 32 像素 iPhone\
    \ 菜单图标；只需更改一个值，就会在保持整体尺寸和质量的同时改变图标大小。\n\n### 文本阴影\n\n前面的示例使用了另一种应用于文本的阴影。`text-shadow`\
    \ 属性的语法与 `box-shadow` 非常相似；唯一的区别是你应该先声明颜色值，而不是最后声明。以下两个类分别对其应用的文本应用投影和发光效果（图 6-25）：\n\
    \n```\n.shadow {\n\n  text-shadow: #000 2px 2px 5px;\n\n}\n\n.glow {\n\n  text-shadow:\
    \ #000 0 0 2px;\n\n  color: #fff;\n\n}\n```\n\n**图 6-25.** 阴影和发光效果\n\n正如我们在 Web\
    \ 应用模板中看到的，投影可以用于不仅仅是阴影。之前，我们使用投影来创建浮雕效果。\n\n![](img/index-172_1.png)\n\n第 6 章：为\
    \ Web 应用界面增色的 CSS 特性\n\n使用 JavaScript，你甚至还可以动态地扩展和减小文本阴影的模糊度，以创建生动的发光动画。\n\n###\
    \ 带有阴影和轮廓的文本效果\n\n通过 `text-shadow` 属性，你已经学会了创建逼真的发光效果，这非常类似于轮廓。为了探索 Mobile Safari\
    \ 在此领域提供的丰富可能性，让我们使用一些属性来绘制一个更高级的标题，这些属性可以让你精细控制文本描边的渲染：\n\n```\n<style>\n\ndiv\
    \ {\n\n  color: lightgrey;\n\n  -webkit-text-stroke: 2px gray;\n\n  font-size:\
