- fmt: "# Host Database\n\n# localhost is used to configure the loopback interface\n\
    # when the system is booting. Do not change this entry.\n\n`127.0.0.1 localhost`\n\
    \nAfter this line, add another rule to the file following the same scheme, with\
    \ `127.0.0.1` and your site name.\n\n`127.0.0.1 localhost`\n\n`127.0.0.1 www.example.local`\n\
    \nYou can now save your file and test this newly created domain in your browser.\
    \ You should see the same page as the one previously configured with your web\
    \ server.\n\n## CHAPTER 2: Development Environment\n\n### Windows-Based System\n\
    \nOn Windows systems, this file can be edited with any text editor, without special\
    \ privileges. You can, for instance, use `Komodo Edit` here. The `/etc/` directory\
    \ is located in `C:\\Windows\\System32\\drivers\\`, and there you will find your\
    \ `hosts` file.\n\nIts contents will look a lot like those of Unix and BSD systems.\
    \ You should apply the same changes as in the previous section. Your changes will\
    \ be automatically taken into account.\n\n### Configuring Multiple Web Sites\n\
    \nNow, as a treat, there is one last thing we will go through. This step is not\
    \ necessary; we just thought it might be desirable to some of you. Specifically,\
    \ we will explain how to create multiple sites on your server. Thus, working on\
    \ several projects, instead of using subfolders, you can make your browser understand\
    \ proper addresses.\n\nIn addition to the organization benefit of using different\
    \ site names in different folders, you will benefit from some notion of a “root\
    \ directory,” be it with PHP, HTML, or CSS.\n\nPractically, in PHP, you will access\
    \ this information using the `$_SERVER['DOCUMENT_ROOT']` environment variable.\
    \ Writing HTML and CSS, if you start a URL with a slash (`/`) character, the browser\
    \ will understand that the path you are calling will start from the top of the\
    \ directory structure down. On the site `http://localhost/example/`, `/images/hey.png`\
    \ means `http://localhost/images/hey.png`.\n\n### Apache 2: Get Carried Away\n\
    \nThe following steps apply to Apache servers, in other words, the server type\
    \ you installed on Mac OS X and Linux platforms. As a lucky Unix user, you will\
    \ yet have to adapt a little, because, as you’ve experienced earlier, all platforms\
    \ don’t install Apache in the same way. You have to find Apache’s main configuration\
    \ file, which you are going to modify. There are other ways to manage virtual\
    \ hosts, but this one is closest to platform independent.\n\n#### Checking the\
    \ Configuration\n\nAs in the install part, you are again going to edit the file\
    \ with `Vi` in the terminal. Open a Terminal window, and type in one of the following\
    \ two commands depending on your system:\n\n```\nsudo vi /private/etc/apache2/httpd.conf\
    \ # On MacOSX\nsudo vi /etc/apache2/apache2.conf       # On Debian\n```\n\nA file\
    \ will be open with variable content depending on your system. The first thing\
    \ you want to do is to check for these two lines:\n\n```\n# Ensure that Apache\
    \ listens on port 80\nListen 80\n\n# Listen for virtual host requests on all IP\
    \ addresses\nNameVirtualHost *:80\n```\n\nIf they exist, very well, you can go\
    \ to the next step. If they don’t, you should add them at the end of the file.\
    \ To do this in `Vi`, move your cursor to the end of the file, and again type\
    \ `a` (for Append) to enter edition mode. These rules ensure your Apache server\
    \ will listen for HTTP requests on port 80, whatever the IP (which is the reason\
    \ for the `*`).\n\n#### Configuring Your First Virtual Host\n\nNext is creating\
    \ the actual virtual host. At the very least, you need to give a name to your\
    \ site (a URL) and the path to the document root (where your files will go). At\
    \ the end of your configuration file, add the following code using the names and\
    \ paths you want:\n\n```\n<VirtualHost *:80>\n    DocumentRoot /var/www/example\n\
    \    ServerName www.example.local\n</VirtualHost>\n```\n\n**WARNING:** Adding\
    \ a virtual host using this directive will override the main host that was initially\
    \ installed. To prevent this, you should create a virtual host using the global\
    \ server name and document root from that host prior to adding new ones. You will\
    \ find the information you need within the main Apache config file you are editing.\n\
    \nOnce you have performed all the changes you needed, you can save the file and\
    \ quit `Vi` by typing `Esc` key and then `:wq` (write and quit). Then, restart\
    \ your server. If you are a Mac user and you have followed the Apache install\
    \ process, you already know how to do this. For Debian users, run the following\
    \ command:\n\n```\nsudo /etc/init.d/apache2 restart\n```\n\nApache now knows your\
    \ site exists, but the rest of your system doesn’t as long as you haven’t added\
    \ it to your `hosts` file. To fix this, you should follow the steps explained\
    \ earlier to modify this file.\n\nYou now can check your new site in a browser,\
    \ typing the server name you’ve chosen. A rather empty page should appear, because\
    \ your document root holds no files. Nevertheless, it is functional, so we’ll\
    \ be meeting you in the next chapters to fill it with exciting homemade web applications.\n\
    \n### The Windows Case\n\nIf you’re a Windows user, whether you can set up a virtual\
    \ host depends on which operating system you have installed. Before Vista, it\
    \ wasn’t possible to configure multiple sites on a workstation machine. XP users\
    \ can only simulate multiple sites by editing their `hosts` file, as explained\
    \ earlier.\n\nFor Vista and 7 users, however, you can access such features changing\
    \ the Internet Information Services configuration from **Control Panel** ➤ **Administrative\
    \ Tools** ➤ **Computer Management**. Then, from the window that appears, unfold\
    \ the **Services and Applications** section in the left pane, and choose **Internet\
    \ Information Service Manager**.\n\n**NOTE:** If the relevant menu doesn’t appear\
    \ under Windows 7, change the display mode for the **Control Panel** window to\
    \ small or large icons from the top-right pop-up menu.\n\nAt this stage, your\
    \ window should look like **Figure 2–9**.\n\n**Figure 2–9. The IIS Manager view**\n\
    \nNext, right-click the **Sites** directory in the second pane from the left,\
    \ and choose **Add web site** from the contextual menu. The form that appears\
    \ is quite simple, as shown in **Figure 2–10**. Just fill it in with the listing\
    \ name you want for your site, its root directory path, and the URL you want to\
    \ access it by.\n\n**Figure 2–10. The web site configuration panel**\n\nYour site\
    \ is now ready to fly! If you seem not to be able to access the desired URL from\
    \ a web browser, check that it has been added to your `hosts` file. Otherwise,\
    \ your machine would not know that this address should be looked for locally.\n\
    \n### Have You Made It?\n\nWasn’t that easier than you expected? Setting up a\
    \ basic server isn’t necessarily a complicated task, especially since the two\
    \ major OS companies have been through."
