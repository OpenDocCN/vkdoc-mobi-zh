    }


    This status will not necessarily be available straightaway. If you check this
    status while resources are loading, the sent state will be CHECKING. Therefore,
    it is useful to add listeners for the update and download processes, as we will
    soon see.


    You can also control cache directly from the JavaScript, using the methods presented
    in Table 15–5.


    Table 15–5\. Cache-Related Methods


    **Method Description**


    *cache*.update()


    Force the verification and the update of cache, if the resources are


    available from the server. An INVALID_STATE_ERR exception will be


    sent if no cache is associated to the document.


    *cache*.swapCache()


    Activates new cache resources if available (UPDATEREADY). Throws


    an INVALID_STATE_ERR exception otherwise.


    For instance, even if the status is set to IDLE and the manifest file has just
    been modified, a call to the update() method will force the cache to be reloaded.
    The status will then change to UPDATEREADY after the new resources have been downloaded.
    A call to swapCache() will force the new resources to be used, and the status
    will return to IDLE.


    Of course, the current page will not be automatically updated, and you will have
    to wait for the next web application launch for the user to see the changes. However,
    you can also read the new resources using JavaScript. If the call to update()
    was successful and the downloading is complete, you can call an updated resource
    as follows:


    /* Update an iframe */


    var iframe = document.getElementById("myIframe");


    iframe.src = iframe.src;


    /* Update the first image of the document */


    var image = document.images[0];


    image.src = image.src;


    You can also associate a newly cached resource:


    image.src = "newlyCachedImage.png";


    In Safari, surprisingly, the cache is available before the call to swapCache(),
    although this is meant to switch the application cache. Therefore, you should
    run such operations only after a swapCache() call, instead of simply after a call
    to update().


    CHAPTER 15: A Better Handling of Client-Side Data Storage


    Reacting to Events Sent by the Application Cache


    During the execution cycle of the application update, a number of events are sent
    to let the application know what is happening and react accordingly. These events
    are listed in Table 15–6.


    Table 15–6\. Cache Update Events


    **Event Description**


    checking


    The browser is attempting to download the manifest for the first


    time or is checking whether an update is available.


    noupdate


    The manifest hasn’t been changed.


    downloading


    The download of resources listed in the manifest has begun, either


    to gather the resources for the first time or to update the cache.


    progress


    The browser is downloading the resources listed in the manifest.


    cached


    The resources listed in the manifest have all been downloaded, and


    the application is now available from cache. This is sent only on


    first download.


    updateready


    The resources form the cache have all been downloaded anew.


    obsolete


    The manifest is no longer available, and the server has sent a 404


    or 410 status. The cache will be deleted the next time the


    application is launched.


    error


    The manifest has not been found or contains errors.


    These events can be registered using the regular DOM method or using the


    ApplicationCache object properties.


    window.applicationCache.addEventListener("updateready", doSomethingHandler, false);


    /* or... */


    window.applicationCache.onupdateready = doSomethingHandler;


    The sequence of events necessarily begins with the checking event, because the


    document holds a reference to the manifest in the <html> tag.'
