  trans: "\n# 用户体验与界面设计指南\n\n尽管不打断用户正在进行的操作似乎是显而易见的原则，但弹出模态对话框仍然很容易干扰用户。在这种情况下，你始终应为用户提供一种简便的关闭对话框的方式，并让后续操作清晰明了。\n\
    \n开发者可能会倾向于通过要求用户输入（无论是文本框还是单选按钮）来让应用对最终用户更个性化。但在 iPhone 上，这会降低用户体验速度，并延迟他们达成目标的时间。\n\
    \n在 iPad 上，这种后果可能更令人恼火。苹果建议 iPad 应用应以非线性方式运行，这意味着用户应在主视图中看到任务内容，并能从屏幕的导航区域访问选项和交互工具。也就是说，无论用户在应用中做什么，都应能完成大多数任务。即使这对你来说似乎合理，在要求用户做出选择时也要谨慎，因为这既打断了用户在主视图中的操作流程，也可能导致导航区域的某些选项被切断，从而带来挫败感。例如，在邮件应用中，你不希望因为用户正在阅读邮件而失去“撰写”选项。作为经验法则，你应谨慎假设用户所处的上下文以及用户可能想要做什么。\n\
    \n还需谨记，设备制造商已经仔细考虑过其设备的可用性。因此，你不应重新创建已经存在且用户已经习惯使用的功能。\n\n## 精心展示广告\n\n很多网站提供免费内容，并依赖广告作为收入来源。如果你的计划如此，就应认真思考如何实现。在传统网页上，多项研究已证明用户普遍被“训练”得对广告视而不见。虽然你可能认为在\
    \ iPhone 上这不是大问题，因为广告必然会占据更多屏幕空间，且显示通常不那么杂乱，但你不应过度加载页面。强制用户滚动掠过无关内容或缩放远离广告，很可能迅速将用户从你的\
    \ Web 应用驱离。\n\n对于 Web 应用和原生应用，广告标准早已确立；通常你会在页面顶部或底部显示一个小横幅。然而，原生应用更进一步，在大多数情况下会在短暂延迟后自动隐藏广告，将全部空间留给实际内容。这具有既不突兀又能吸引用户注意力的优点。将这种行为引入\
    \ Web 应用将是一个积极的举措，尤其因为使用 CSS 过渡，你几乎无需使用任何 JavaScript。以下是一个简单的示例，你可以使用本书前面创建的模板轻松测试。首先，将以下代码添加到页面的\
    \ `<head>` 中：\n\n```css\n.ads {\n  z-index: -1;\n  position: relative;\n  -webkit-transition:\
    \ margin-top 0.35s ease-out;\n  border-bottom: 0;\n  margin: 0 auto 34px;\n  width:\
    \ 320px;\n}\n\n.ads img { display: block; }\n\n.ads .tab:before {\n  color: red;\n\
    \  content: 'AD ';\n}\n\n.ads .tab {\n  position: absolute;\n  background-image:\
    \ -webkit-gradient(\n    linear, left top, left bottom,\n    from(black), to(#666));\n\
    \  color: white;\n  font: bold 11px/24px verdana;\n  height: 24px;\n  bottom:\
    \ -24px;\n  left: 0;\n  width: 100%;\n  padding: 0 5px;\n  -webkit-box-sizing:\
    \ border-box;\n}\n```\n\n首先，你通过修改广告的 `z-index` 和 `position` 值来定义样式，使广告堆叠在页眉下方。然后，你创建应用于广告区域和广告出现后仍需可见区块的样式。与过渡相关的代码以粗体显示，表明当\
    \ `margin-top` 属性发生变化时，应发生一次平滑的 35ms 过渡。\n\n接下来，你依靠脚本来触发动画：\n\n```javascript\n\
    function hideAds() {\n  setTimeout(hide, 5000);\n}\n\nfunction hide() {\n  var\
    \ ads = document.querySelector(\".ads\");\n  ads.style.marginTop = (-ads.offsetHeight)\
    \ + \"px\";\n}\n\nfunction reveal() {\n  var ads = document.querySelector(\".ads\"\
    );\n  ads.style.marginTop = \"\";\n  hideAds();\n}\n```\n\n**注意：** `querySelector()`\
    \ 方法返回匹配作为参数传递的 CSS 选择器的第一个元素。它是 W3C 选择器 API 的一部分，由 Mobile Safari 完全支持。\n\n通过这种方式，无论何时你希望隐藏广告，只需调用\
    \ `hide()` 函数，它会根据横幅的高度确定新的 `margin-top` 值并启动动画。\n\n`reveal()` 函数允许你通过恢复 `margin-top`\
    \ 的初始值并再次触发动画来重新显示广告。以下是相关的 HTML 标记：\n\n```html\n<body onload=\"hideAds()\">\n\
    \  ...\n  <div class=\"header-wrapper\">\n    <h1>Web App Header</h1>\n  </div>\n\
    \  <div class=\"ads\">\n    <img src=\"some-ad.gif\" alt=\"Advertisement\" width=\"\
    320\" height=\"50\">\n    <div class=\"tab\" onclick=\"reveal()\">\n      Apress\
    \ sales. 20% off on all books.\n    </div>\n  </div>\n  ...\n  <img src=\"index-116_1.jpg\"\
    \ alt=\"\">\n  <img src=\"index-116_2.jpg\" alt=\"\">\n```\n\n图 5–2 展示了结果。用户将能够点击标签再次查看广告，而隐藏过程将在五秒后再次发生。第\
    \ 9 章将更详细地介绍 CSS 过渡。\n\n**图 5–2.** 广告在几秒后自动隐藏\n\n此外，你应避免使用弹出元素。如前所述，你应限制任何对用户体验流程产生负面影响的内容。因此，你应仅在特定时刻考虑使用弹出元素，例如首次页面加载时。在所有情况下，都应为用户提供明显且简便的方式关闭广告——使用\
    \ iPhone 界面默认的 X 按钮是一个合理的选择（图 5–3）。总的来说，你应彻底考虑广告对应用的影响。\n\n**图 5–3.** 你应始终为用户提供简便的方式隐藏广告\n\
    \n在 iPad 上，可以使用类似的过程，只是格式不同。尽管 iPad 的大屏幕更接近桌面网页，但正如前一章所述，用户与设备之间建立了一种特殊的连接。因此，你应考虑采用新的、适合的方式将广告引入页面。你所拥有的各种可能性，包括声音、视频和丰富的交互，应促使你让用户成为推广内容的核心角色。\n\
    \n无论你想出什么点子，都要牢记本书中已经介绍和将要介绍的使用特性，以及你从自身 iPhone 用户体验中收集到的要素。\n\n## 让用户自行决定\n\n\
    作为开发者，在引导用户通过\n"
- fmt: '# Seamless User Experience and Interface Guidelines


    Providing a seamless experience, letting users choose what they want from the
    web application without intervening throughout the process can be really tricky.
    However, there are times when you should clearly leave the decision to the user.
    Although user frustration isn’t directly a question of user interface or design,
    it will negatively affect the perceived quality of your application. For instance,
    filtering users based on the device they use and blocking them with “iPhone Only”
    messages is something you should avoid. First, it is better and more efficient
    to target functionalities rather than user agents. Then, if your web application
    works on the iPhone, it will probably work similarly on an iPad, an Android, or
    a webOS device.


    Likewise, you shouldn’t impose an iPhone-specific site on iPhone users. Users
    may have reasons to prefer using the regular desktop site. Mobile Safari renders
    sites similarly to Desktop Safari and provides tools to view pages in the best
    conditions. Give the user a choice (Figure 5–4), remember that choice (be it with
    cookies or other storage means), and always give users a chance to change their
    minds.


    ![Figure 5–4](index-118_1.jpg)


    **Figure 5–4.** The mobile version of Google Translate offers users the option
    to use the regular web version.


    ## Simplicity and Ease of Use


    What is true for traditional desktop and web development is even more critical
    for the mobile Web. Because portable devices are meant to be used in mobile situations,
    users may be focusing on something else simultaneously. This is why you must make
    it obvious how users can achieve their goal with your application. Although repeated
    panning can be annoying, you shouldn’t concentrate most of your content at the
    top of the page. Instead, categorize your content and make categories clear. The
    user should immediately identify the primary function of your web application
    and how it globally works, even while focusing on other things.


    ## Avoid Clutter


    The overall iOS user interface is simple and polished, with subtle gradients,
    a limited set of colors, and clean lines. This is a standard by which users will
    judge your web applications, and Apple’s choice is by no means random. Clutter
    begins with loud colors, too many colors, and colors that make content difficult
    to scan. The same applies to elements of your web application. Scattered content
    can be difficult to take in and will distract users from what is important. Figure
    5–5 shows an example of a cluttered application.


    ![Figure 5–5](index-119_1.jpg)


    **Figure 5–5.** eBay is not optimized for the iPhone and leaves an impression
    of clutter, while still remaining efficient because there is only one search field.


    This doesn’t mean you should make extensive use of whitespace. Using too much
    whitespace on the iPhone forces the user to pan a lot, with limited visibility
    on the content as a whole. Misusing whitespace on a larger screen like the iPad’s
    is likely to dilute the content and leave the impression of a scattered experience.


    In cases where your web application intrinsically contains many different content
    elements, the key to a satisfying user experience is probably an efficient menu.
    You cannot keep the habits you built developing for the desktop Web. Your menu
    must get to the point quickly, limiting user actions to a minimum while making
    the different available options clear. Short, expressive text should be preferred
    over long, descriptive, or drop-down menus. If you’re confident that your targeted
    audience will know technical words or abbreviations that make options clear in
    fewer characters, use them. Everything regarding navigation should be fast to
    scan and use, so these guidelines similarly apply to buttons, links, and odd pop-up
    windows.


    Simply, do not forget that all these elements are secondary and should not draw
    attention away from the main service you are providing. Appropriately balancing
    all of this will greatly help catch user attention and ultimately increase user
    loyalty.


    ## User Interface


    In a mobile context with limited screen sizes, the notion of a user interface
    should be considered with a curious mind. We are talking about someone who frequently
    uses your web application while on the move, on a screen smaller than what one
    is used to, and using solely finger gestures to interact with your application
    and the device as a whole.


    ![Figure 5–6](index-120_1.jpg)


    When developing desktop applications, you could confidently line up buttons at
    the far edge of a full-screen window to make them easily clicked. Developing for
    the Web, you could rely on mouse-over tooltips to guide users in the right direction.
    These techniques aren’t relevant when developing for iOS. Nothing prevents users
    from missing the far edges of the screen, and there is no actual mouse hovering
    by which users could rapidly “explore” the page. For the user interface to remain
    what it was on the desktop—a set of graphical elements acting as a whole to make
    functionality easily accessible—you must reconsider the key rules you should apply.


    ### Adapt to Touch


    The first parameter you should take into account is the pointing device—the user’s
    finger. Apple suggests that most users’ fingers need an area roughly 44 pixels
    wide to quickly tap something without missing. If you want to use smaller buttons
    or links, ensure enough surrounding space is available so that several active
    areas aren’t clicked simultaneously.


    Another crucial point is that actions should be clearly indicated. There is no
    point in having perfectly sized tapping areas if nobody ever thinks of tapping
    them. Make your elements look tappable. The best way to guarantee that a user
    will recognize a button is to follow the prevalent Apple user interface. If you
    move away from it, be careful that people won’t misunderstand your elements. On
    the iPhone, general advice for creating tappable elements is to make them “look
    real.” Apple buttons stand out on the screen because of their gradients and drop
    shadows (see Figure 5–6). They look like buttons you could actually touch—which
    is precisely what you need to suggest.


    ![Figure 5–7](index-121_1.jpg)


    **Figure 5–6.** Users will be more likely to click the button than the plain link.


    This will be even more important when developing for the iPad: real-world-like
    application interfaces will likely be taken a serious step further as the number
    of applications and sites specifically designed for the iPad’s larger screen increases.


    Finally, don’t forget that unlike when using a mouse, the user has no means to
    activate hover states. If your application relies on tooltips or complex hover
    effects, it is likely to simply drive disappointed users away.


