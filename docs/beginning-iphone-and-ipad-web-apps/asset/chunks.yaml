    | HYBRID | 在卫星视图上显示主要街道的透明图层。 |

    | ROADMAP | 显示街道地图。 |

    | SATELLITE | 显示卫星视图。 |

    | TERRAIN | 显示带有山体阴影、地形以及道路的地图。 |


    此参数是必需的，因为没有默认值。你现在就可以加载这段代码来查看中间结果，并更改地图类型的值，以测试可供你使用的选项。渲染出的地图如图 14-2 所示。


