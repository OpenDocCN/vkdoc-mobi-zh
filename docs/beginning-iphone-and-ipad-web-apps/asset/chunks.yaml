- fmt: "# Following the same principle as for the marker\n\nFollowing the same principle\
    \ as for the marker, we resort to only one instance of the `Circle` object. It\
    \ too is initialized with the `LatLng` and `Map` objects. The radius is set in\
    \ meters and will be set by the value returned by the Geolocation API. In addition\
    \ to these parameters, you can define colors for the fill and stroke of your indicator,\
    \ as well as its opacity. As done earlier, you now simply have to modify your\
    \ success callback to take accuracy into account.\n\n```\nfunction successCallback(position)\
    \ {\n    ...\n    drawMarker(latlng, position.coords.accuracy, \"#0072f9\"); //\
    \ A blue marker\n}\n```\n\nThis will bring the user a satisfying positioning service,\
    \ displaying not only their position but also the accuracy of the positioning,\
    \ as shown in Figure 14–3.\n\n![](index-432_1.jpg)\n\n**Figure 14–3.** The user\
    \ position is displayed on the map along with the accuracy\n\nWith the Google\
    \ Maps API, you can go much further, from using itineraries defined on the Google\
    \ servers to showing information with the Street View mode. Because there is a\
    \ lot to discover and use for impressive applications, we invite you to study\
    \ the online documentation at [http://code.google.com/apis/maps](http://code.google.com/apis/maps)/.\n\
    \n---\n\n## Tracking the User’s Position\n\nYou have learned how to request the\
    \ user’s position and how to display this information on a map, and you now should\
    \ have a pretty clear idea of how to do this most efficiently depending on the\
    \ applications you are planning for this data.\n\nLet’s now concentrate on another\
    \ feature of the Geolocation API: the ability to track changes in a device’s situation.\
    \ By keeping up with a user’s location, you will be able to respond to events\
    \ as they occur, for instance in an itinerary application or in conjunction with\
    \ some geotagging utility.\n\n### Registering for Updates\n\nThis functionality\
    \ is accessed with the `watchPosition()` method. This method is used in the same\
    \ manner as `getCurrentPosition()`, with the same parameters. However, whereas\
    \ the latter sends a position and ends, the former will send a position and run\
    \ again.\n\nThe `watchPosition()` method also returns a unique identifier, which\
    \ in time can be used to stop the tracking. The easiest way to call this function\
    \ is as follows:\n\n```\nvar watchId = window.navigator.geolocation.watchPosition(successCallback);\n\
    ```\n\nThe repeated request will come to an end when the `clearWatch()` function\
    \ is called with the relevant ID as a parameter:\n\n```\nwindow.navigator.geolocation.clearWatch(watchId);\n\
    ```\n\nIt seems a reasonable choice to leave this option always available to the\
    \ end user, who should always have control over their device and usually will\
    \ know why they launched the application and thus when to stop it.\n\nNonetheless,\
    \ `clearWatch()` can also be triggered on some specific event depending on the\
    \ use of `watchPosition()`, for instance when the user reaches the requested destination\
    \ with an itinerary application.\n\n### Specific Behavior of the Watcher\n\nBecause\
    \ `watchPosition()` is an iterative function, it is useful to understand what\
    \ happens when the user quits the application without calling the `clearWatch()`\
    \ function, when the device runs out of battery, or whatever else.\n\nWhen the\
    \ user returns to the launcher, if there is enough room to cache the application’s\
    \ state, the function will be temporarily suspended and will resume when the browser\
    \ is launched again. If an error occurs, the update attempt will continue, and\
    \ the API will call the failure callback.\n\nYou can check this behavior using\
    \ the following code:\n\n```\nwindow.navigator.geolocation.watchPosition(successCallback,\
    \ failureCallback);\n\nfunction successCallback(position) {\n    var msg = 'Position:\
    \ ' +\n        position.coords.longitude + ', ' +\n        position.coords.latitude;\n\
    \    console.info(msg + '\\nAt ' + (new Date()).toTimeString());\n}\n\nfunction\
    \ failureCallback(error) {\n    var err = error.message + ' (' + error.code +\
    \ ')';\n    console.error(err + '\\nAt ' + (new Date()).toTimeString());\n}\n\
    ```\n\nLoad a page running this code, quit Mobile Safari, and activate or deactivate\
    \ the geolocation service. You will see that the position update goes on, meaning\
    \ neither errors nor quitting an application stops the API’s operation.\n\nIf\
    \ the user denies access to the geolocation service, the API will continue sending\
    \ error messages, although no second chance will be given to the user to change\
    \ his answer to the request. However, in this case, after the user has quit Mobile\
    \ Safari and restarted it, the authorization pop-up will appear again; under these\
    \ circumstances, it is understandable that the API keeps the polling active in\
    \ this way.\n\nBeing aware of this special behavior, the developer should anticipate\
    \ it by building appropriate callbacks to inform the user of a problem with tracking\
    \ or stop the tracking with the `clearWatch()` method after a defined number of\
    \ attempts.\n\n### Watching Position on Google Maps\n\nTo illustrate this tracking\
    \ possibility, we are going to modify the previous Google Maps example to take\
    \ tracking into account, first by binding the following code to our button:\n\n\
    ```\nvar firstRun, trackerID, failedCount = 0;\n\nfunction swapAction() {\n  \
    \  var button = document.getElementsByTagName(\"button\")[0];\n    if (trackerID\
    \ == undefined) {\n        trackerID = window.navigator.geolocation.watchPosition(\n\
    \            successCallback, failureCallback);\n        button.textContent =\
    \ \"Stop\";\n        button.style.backgroundColor = \"#c6323d\"; // Turn to red\n\
    \        firstRun = true;\n    } else {\n        window.navigator.geolocation.clearWatch(trackerID);\n\
    \        trackerID = undefined;\n        button.textContent = \"Track\";\n   \
    \     button.style.backgroundColor = \"\";\n    }\n}\n```\n\nIt is important here\
    \ to let the user stop the tracking whenever he wants, because tracking can be\
    \ hard on the battery life of the device, because the user will want to stop if\
    \ he stops moving, and because, depending on the location method used, the data\
    \ returned by the tracking may not be satisfying. To do this, we are going to\
    \ change the Track button into a Stop button when tracking is occurring. The `swapAction()`\
    \ function will be used altogether for this, for the stop action itself and to\
    \ halt the tracking if an error occurs.\n\nThen, we slightly alter the `successCallback()`\
    \ function.\n\n```\nfunction successCallback(position) {\n    var latlng = new\
    \ ns.LatLng(position.coords.latitude, position.coords.longitude);\n    map.panTo(latlng);\n\
    \    if (firstRun) {\n        map.setZoom(17);\n        firstRun = false;\n  \
    \  }\n    ...\n    failedCount = 0;\n}\n```\n\nHere, we replace `setCenter()`\
    \ with `panTo()`. The advantage of the `panTo()` function over `setCenter()` is\
    \ that it slides to a new position rather than jumping to it. Besides, we zoom\
    \ for only the first position; this way, if the user changes the zoom factor,\
    \ his choice will not be discarded when his position changes.\n\nBecause our request\
    \ has been successful in this case, we set the error counter to 0. On the other\
    \ side, the failure callback needs slightly more work.\n\n```\nfunction failureCallback(error)\
    \ {\n    /* Stop the tracking after 100 errors */\n    if (error.code != error.PERMISSION_DENIED)\
    \ {\n        failedCount++;\n        if (failedCount < 100) {\n            return;\n\
    \        }\n    }\n    failedCount = 0;\n    swapAction();\n    switch (error.code)\
    \ {\n        ...\n    }\n    button(true);\n}\n```\n\nReception may not always\
    \ be optimal, which means that location may not succeed with every attempt, but\
    \ most likely it will succeed enough to send satisfying data. Therefore, we cannot\
    \ throw an error to the user with every failure, nor can we halt the tracking\
    \ on the first failure. Because several calls can be performed every second, we\
    \ fix a limit to the number of failures at 100, which should approximately mean\
    \ a 30- to 60-second wait before an error message is sent to the user. After that,\
    \ the process will be halted.\n\n---\n\n## From Data to Math"
  raw: 'Following the same principle as for the marker, we resort to only one instance
    of the Circle object. It too is initialized with the LatLng and Map objects. The
