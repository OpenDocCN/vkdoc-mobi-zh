    CHAPTER 14: Location-Aware Web Applications


    Handling Errors from Requests


    Luckily enough, the getCurrentPosition() takes another optional parameter that
    gives you access to code and description for the occurring error. This gives you
    some latitude to understand and then handle the error. Here’s an example of how
    to do this:


    /* Request the user''s position */


    window.navigator.geolocation.getCurrentPosition(successCallback, failureCallback);
    function successCallback(position) {


    /* Do something with the position object data */


    }


    function failureCallback(error) {


    /* Do something with the error object */


    }


    There are two properties to the error object, as shown in Table 14–2.


    Table 14–2\. Properties of the Error Object


    **Property Description**


    *error*.code


    One of the following error codes:


    *error*.UNKNOWN_ERROR (0)


    *error*.PERMISSION_DENIED (1)


    *error*.POSITION_UNAVAILABLE (2)


    *error*.TIMEOUT (3)


    *error*.message


    A message describing what happened.


    Whereas the *error*.code property yields persistent error codes, the *error*.message
    property may be quite different depending on the device running the function.


    Obviously, a single error code may cover several real-life errors. For instance,


    PERMISSION_DENIED is returned when the user refuses the request but also when
    the geolocation service on the device is disabled. However, the error message
    should shed light on the code, which is why both properties are useful together.
    Please note that indeed the *error*.message property is meant only for debugging
    purposes; it is by no means supposed to be seen on the user’s end.


    WARNING: If an exception occurs within your success callback function, the failure
    callback function will be called with an UNKNOWN_ERROR code. Always double-check
    whether the error you are getting really is a location error or comes from your
    own code.


    CHAPTER 14: Location-Aware Web Applications


    Accuracy, Timeout, and Cached Location


    The W3C specification provides three options to refine your request, using an
    object-type parameter along with your callbacks. You can specify how long your
    request may take to succeed, how long the position yielded may have been cached
    before the


    request, and whether to require extra accuracy. These options are invoked as follows:
    window.navigator.geolocation.getCurrentPosition(successCallback, failureCallback,
    {


    timeout: 0,


    maximumAge: 60000,


    enableHighAccuracy: false


    });


    There are many cases where there’s no need to require an updated position of the
    user.


    For an application returning a list of trendy restaurants based on a user’s location,
    chances are the user will often be in the same bounds. In such cases, you may
    want to use cached data from the user’s device.'
  trans: "\n# 排版后的文档\n\n由于不同设备的性能和精度有所差异，并且只要不发生错误（例如用户拒绝请求），无论使用何种设备（无论是旧款 iPhone、iPod\
    \ touch 还是 iPad），第一种方法 `properties` 都会返回一个值。但是，正如你所见，并非所有数据都必然可用。例如，`Heading`\
    \ 和 `speed` 显然要求已记录下足够精确的多个位置点，因此需要持续跟踪才能返回值，我们稍后将对此进行说明。根据所使用的设备及其所用的定位技术，并非所有数据都能获取。\n\
    \n此外，由于使用 GPS 通常需要时间才能连接到卫星，设备往往会推迟使用这种定位方法，这虽然能提升性能，但返回的数据精度会降低。这种方法将用于跟踪，因为对位置信息的请求是重复发出的，从而为\
    \ GPS 信号获取留出了足够的时间。\n\n在测试你的 Web 应用程序时，你通常需要到室外进行，尤其是在依赖 GPS 精度的情况下，因为 GPS 在室内几乎无法工作（即便能工作）。\n\
    \n因此，无论你是期望从基本属性还是更高级的属性中获取信息，你都应该始终处理可能出现的错误和近似情况。\n\n## 第 14 章：位置感知 Web 应用程序\n\
    \n### 处理请求中的错误\n\n幸运的是，`getCurrentPosition()` 接受另一个可选参数，该参数能让你访问所发生错误的代码和描述。这为你理解和处理错误提供了一定的灵活性。以下是一个操作示例：\n\
    \n```\n/* 请求用户的位置 */\nwindow.navigator.geolocation.getCurrentPosition(successCallback,\
    \ failureCallback);\n\nfunction successCallback(position) {\n  /* 对位置对象数据进行处理\
    \ */\n}\n\nfunction failureCallback(error) {\n  /* 对错误对象进行处理 */\n}\n```\n\n错误对象有两个属性，如表\
    \ 14-2 所示。\n\n**表 14-2.** 错误对象的属性\n\n| 属性 | 描述 |\n| --- | --- |\n| `error.code`\
    \ | 以下错误代码之一：<br>`error.UNKNOWN_ERROR` (0)<br>`error.PERMISSION_DENIED` (1)<br>`error.POSITION_UNAVAILABLE`\
    \ (2)<br>`error.TIMEOUT` (3) |\n| `error.message` | 描述发生情况的说明信息。 |\n\n尽管 `error.code`\
    \ 属性提供固定的错误代码，但 `error.message` 属性可能因运行该函数的设备不同而有很大差异。\n\n显然，一个错误代码可能对应多种实际错误。例如，当用户拒绝请求，或者设备上的定位服务被禁用时，都会返回\
    \ `PERMISSION_DENIED`。然而，错误说明信息应该能阐明该代码的详情，这就是这两个属性一起使用很有用的原因。请注意，`error.message`\
    \ 属性仅用于调试目的；它绝不应该展示给最终用户。\n\n**警告：** 如果成功回调函数内部发生异常，则会以 `UNKNOWN_ERROR` 代码调用失败回调函数。请务必仔细检查你所遇到的错误究竟是定位错误还是来自你自己的代码。\n\
    \n### 精度、超时和缓存位置\n\nW3C 规范提供了三个选项，通过使用一个对象类型参数以及你的回调函数来优化你的请求。你可以指定请求成功所需的最长时间、请求之前缓存位置信息的有效时长，以及是否需要更高的精度。这些选项的调用方式如下：\n\
    \n```\nwindow.navigator.geolocation.getCurrentPosition(successCallback, failureCallback,\
    \ {\n  timeout: 0,\n  maximumAge: 60000,\n  enableHighAccuracy: false\n});\n```\n\
    \n在很多情况下，并不需要获取用户的最新位置。例如，对于一个根据用户当前位置返回热门餐厅列表的应用程序，用户很可能常常处于相同的地理范围内。在这种情况下，你或许希望使用用户设备上的缓存数据。\n"
- fmt: "# 排版后的文本\n\n`maximumAge`选项告诉设备在尝试确定用户实际位置之前先查找此类数据，并允许你为此数据设置一个时效限制。如我们之前所见，此解决方案的另一个优点是它减少了电池消耗。\n\
    \n`maximumAge`的默认值为`0`，意味着设备将尝试为每个请求返回一个更新的值；如果设置为`Infinity`，用户代理将必然返回一个缓存值（如果有的话）。如果不存在缓存值，它将获取一个新位置。\n\
    \n`timeout`属性为位置获取操作完成设置了一个以毫秒为单位的时间限制。默认值为`Infinity`，这可以让你想象`timeout`选项在开发应用程序时的用处。如果未指定，应用程序将一直运行直到终端返回所请求的信息，即使此信息由于某些原因不可用。指定一个`timeout`值后，当达到时间限制时，一个`TIMEOUT`错误将被发送到错误回调函数。\n\
    \n在前面的示例中，如果没有缓存任何位置值，函数的失败回调将被立即调用。请注意，用户授予访问其位置信息所花费的任何时间都不被计入。\n\n组合这些选项可以使你的应用程序更具响应性。然而，当你确实需要这种额外的精度时，第三个选项`enableHighAccuracy`告诉API获取尽可能接近用户实际位置的结果。此选项默认设置为`false`。\n\
