    **var ns = google.maps; // Namespace**


    **var map;**


    **function init() {**


    **var latlng = new ns.LatLng(0, 0);**


    **var options = {**


    **zoom: 2,**


    **center: latlng,**


    **disableDefaultUI: true,**


    **scaleControl: true,**'
