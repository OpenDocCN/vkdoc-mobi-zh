    \n```html\n<link rel=\"apple-touch-icon\" href=\"/path/to/custom-icon.png\">\n\
    <link rel=\"apple-touch-icon-precomposed\" href=\"/path/to/custom-icon.png\">\n\
    ```\n\n这些值与对应图标名称的同类属性产生相同的结果，并适用相同的规则。\n\n## 第4章：Web应用的解剖学\n\n### 全屏运行您的应用\n\n\
    您已经朝着“应用而非浏览器”的体验迈出了重要一步。\n\n但是，如果这个图标启动的是嵌有您网页应用的移动版Safari，那么浏览器的存在感就无法隐藏。这时，另一个`meta`选项就派上用场了。自iOS\
    \ 1.1.3版本起，您可以指示页面默认全屏打开。只有状态栏保持可见；屏幕的其余部分将专用于您的页面。这种所谓的“独立模式”并非在移动版Safari中运行您的网页；它使用与移动版Safari相同的渲染引擎，用户将能使用移动版Safari的功能，但视图本身将是您的应用。\n\
    \n实现方法如下：\n\n```html\n<meta name=\"apple-mobile-web-app-capable\" content=\"yes\"\
    >\n```\n\n切记：您的应用并不会运行在移动版Safari或它的“精简”版本中。这是一种不同的模式，应进行全面测试，以确保在显示和行为方面不出问题。同时，务必为用户提供一个清晰高效的导航系统，因为浏览器的导航选项将不复存在。用户进入一个无法进行任何操作或很快陷入困境的应用页面，显然会让他们感到受骗。\n\
    \n如有需要，您可以通过`window.navigator.standalone`布尔值，使用JavaScript检查当前是否启用了此模式。这是一个只读属性，因此您无法动态更改它；不过，我们将在本章后面展示如何利用此模式下的选项和操作。\n\
    \n### 一个很棒的启动画面\n\n特殊的`<link>`标签还允许您触发一张图片，在应用首次加载时作为启动画面显示。打开页面时的默认行为是显示上次访问时的页面快照，直到页面加载完成足以显示。这不仅相当缺乏个性，还可能让用户感觉应用在启动时卡住了，从而将他们吓跑。\n\
    \n在iPhone上，操作系统允许您通过指定启动图片来改变此行为，代码如下所示。但请注意，这在iPad上是不可能的；iPad会系统性地显示您页面的截图。\n\
