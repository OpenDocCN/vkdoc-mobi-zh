  \ `AsyncTask`，以便它能够重新生成进度对话框。如果没有正在运行的 `AsyncTask`，该片段则会创建一个新的并执行它。\n\n现在，我们来看看\
  \ `AsyncTask` 如何创建并控制这个进度对话框。**代码清单 6-12** 展示了 `AsyncTask` 的代码，以帮助理解这一点。\n\n**第\
