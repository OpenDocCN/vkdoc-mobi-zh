  \n## 理解 doInBackground() 方法\n\n\n\n# 排版后的文本\n\n`AsyncTask` 的所有后台工作都在 `doInBackground()`\
  \ 方法中完成。该方法由 `AsyncTask` 编排，在工作线程上运行。因此，与在主线程上执行的工作不同，此方法允许执行超过五秒的操作。\n\n在清单 6-5\
  \ 的示例中，我们在 `doInBackground()` 方法中简单地像处理数组一样检索任务的每个输入字符串。在此方法定义中，我们没有定义显式的字符串数组。然而，该函数的唯一参数被定义为可变长度参数，如清单\
  \ 6-8 所示。\n\n*清单 6-8. `doInBackground()` 方法签名*\n\n```\nprotected Integer doInBackground(String...strings)\n\
  ```\n\n随后，Java 会将此参数视为函数内部的数组。因此，在 `doInBackground()` 方法的代码中，我们读取每个字符串并记录它们，以表明我们知晓其内容。然后，我们等待足够长的时间来模拟一个长时间运行的操作。由于此方法在工作线程中运行，我们不应在此工作线程中访问\
  \ Android 的 UI 功能。例如，即使您在此线程中可以访问某些 `Views`，也不应直接更新它们。甚至无法从此处发送 `Toast`。接下来的两个方法帮助我们解决了这个问题。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 6 章：高级 AsyncTask 与进度对话框\n\
  \n### 通过 `publishProgress()` 触发 `onProgressUpdate()`\n\n在 `doInBackground()` 方法中，您可以通过调用\
  \ `publishProgress()` 方法来触发 `onProgressUpdate()`。被触发的 `onProgressUpdate()` 方法随后会在主线程上运行。这使得\
  \ `onProgressUpdate()` 方法能够适当地更新 `Views` 等 UI 元素。您也可以在此处发送 `Toast`。在清单 6-5 中，我们仅记录了一条消息。当所有工作完成后，我们从\
  \ `doInBackground()` 方法返回一个结果代码。\n\n### 理解 `onPostExecute()` 方法\n\n`doInBackground()`\
  \ 方法的结果代码随后被传递给 `onPostExecute()` 回调方法。此回调也在主线程上执行。在此方法中，我们指示进度对话框关闭。由于在主线程上，您可以无限制地在此方法中访问任何\
  \ UI 元素。\n\n### 升级为确定性进度对话框\n\n在之前清单 6-5 的示例中，我们使用了一个进度对话框（图 6-1），它无法告知我们已完成工作的比例。这种进度对话框被称为**不确定进度对话框**。如果您在此进度对话框上将\
