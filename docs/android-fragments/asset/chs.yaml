  \nnewPD.setOnCancelListener(this);\n\nnewPD.setIndeterminate(false);\n\nnewPD.setProgressStyle(ProgressDialog.STYLE_HORIZONTAL);\n\
  \nnewPD.setMax(PDMAX);\n\nnewPD.setProgress(progress);\n\nreturn newPD;\n\n}\n\n\
  }\n```\n\n\n# 高级 AsyncTask 与进度对话框\n\n清单 6-12 中的 `AsyncTask` 与本章开头介绍的那个非常相似。它负责管理自己的进度对话框，从而形成一个内聚的单元，避免将\
  \ `AsyncTask` 的细节污染到主活动中。不过，它确实在 `IReportBack` 接口中使用了一个新方法，以便让这个 `AsyncTask` 在完成时通知活动。你将在清单\
  \ 6-13 中看到，活动使用 `allDone()` 方法来移除管理此 `AsyncTask` 的保留片段。这就是清理工作的实现方式。你应当注意到，进度对话框会在两个不同的地方实例化：一是在\
  \ `onPreExecute()` 回调中（当 `AsyncTask` 首次启动时），二是在 `setActivity()` 中（当出现新的活动，因此需要创建新的对话框时）。\n\
  \n在 `setActivity()` 中创建进度对话框时，会使用最后已知的进度值，让对话框从上次中断的位置继续显示。为确保不发生内存泄露，`dismissDialog()`\
  \ 方法被提供给保留片段，以便在活动销毁前移除对话框。\n\n保留片段通过其 `onDetach()` 回调得知活动即将结束。\n\n清单 6-13 展示了调用保留片段来设置\
  \ `AsyncTask` 的活动。你应当注意到，活动代码中没有对 `AsyncTask` 的引用，活动只知道片段的存在。\n\n## 清单 6-13. 调用保留片段的活动\n\
  \n```java\npublic class TestAsyncTaskDriverActivity extends Activity\n        implements\
  \ IReportBack\n{\n    public static final String tag = \"TestAsyncTaskDriverActivity\"\
  ;\n    private static final String ASYNCTASKFRAG = \"ASYNCTASKFRAG\";\n    private\
  \ AsyncTaskFragment atf = null;\n\n    @Override\n    public void onCreate(Bundle\
  \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
  \        if ((atf = (AsyncTaskFragment) getFragmentManager()\n                .findFragmentByTag(ASYNCTASKFRAG))\
  \ != null) {\n            // 我们在后台发现了一个未完成的 AsyncTask\n            Log.d(tag, \"\
  Found an incomplete AsyncTask\");\n        }\n    }\n\n    @Override\n    public\
  \ boolean onCreateOptionsMenu(Menu menu) {\n        super.onCreateOptionsMenu(menu);\n\
  \        MenuInflater inflater = getMenuInflater();\n        inflater.inflate(R.menu.main_menu,\
  \ menu);\n        return true;\n    }\n\n    @Override\n    public boolean onOptionsItemSelected(MenuItem\
  \ item) {\n        appendMenuItemText(item);\n        if (item.getItemId() == R.id.menu_clear)\
  \ {\n            this.emptyText();\n            return true;\n        }\n      \
  \  if (item.getItemId() == R.id.menu_test_async1) {\n            if (atf == null)\
  \ {\n                atf = AsyncTaskFragment\n                        .newInstance(\"\
  String1\", \"String2\", \"String3\");\n                getFragmentManager().beginTransaction()\n\
  \                        .add(atf, ASYNCTASKFRAG).commit();\n            }\n   \
  \         return true;\n        }\n        return true;\n    }\n\n    private TextView\
  \ getTextView() {\n        return (TextView) this.findViewById(R.id.text1);\n  \
  \  }\n\n    private void appendMenuItemText(MenuItem menuItem) {\n        String\
  \ title = menuItem.getTitle().toString();\n        TextView tv = getTextView();\n\
  \        tv.setText(tv.getText() + \"\\n\" + title);\n    }\n\n    private void\
  \ emptyText() {\n        TextView tv = getTextView();\n        tv.setText(\"\");\n\
  \    }\n\n    private void appendText(String s) {\n        TextView tv = getTextView();\n\
  \        tv.setText(tv.getText() + \"\\n\" + s);\n        Log.d(tag, s);\n    }\n\
  \n    public void reportBack(String tag, String message) {\n        this.appendText(tag\
  \ + \":\" + message);\n        Log.d(tag, message);\n    }\n\n    public void reportTransient(String\
  \ tag, String message) {\n        String s = tag + \":\" + message;\n        Toast.makeText(this,\
  \ s, Toast.LENGTH_SHORT).show();\n        reportBack(tag, message);\n        Log.d(tag,\
  \ message);\n    }\n\n    public void allDone(int status) {\n        // 可以根据返回的状态执行各种操作，\n\
  \        // 但需要丢弃该片段，以便在需要时能再次执行此操作。\n        Log.d(tag, \"AsyncTask returned: \"\
  \ + status);\n        getFragmentManager().beginTransaction()\n                .remove(atf).commitAllowingStateLoss();\n\
  \        atf = null;\n    }\n}\n```\n\n实际上，活动与该片段进行交互的地方只有三处。\n\n\n\n在`onCreate()`回调中，Activity\
  \ 会检查是否存在已有的保留片段。如果存在，Android 会自动将其重新附加到 Activity。\n\n菜单点击代码会创建一个新的保留片段（以及关联的 `AsyncTask`），但若已存在则不会重复创建。我们不希望同时存在多个保留片段。最后，在\
  \ `allDone()` 回调中，当保留片段完成任务后将被销毁。请注意 `allDone()` 中的 `commitAllowingStateLoss()`\
  \ 方法。之所以使用此方法，是因为 Activity 可能不可见，但我们仍希望尝试移除保留片段。如果使用常规的 `commit()` 方法，则会抛出异常。\n\n\
  如果 `AsyncTask` 正在执行更新并改变状态，则还有进一步的考虑。在这种情况下，你可能需要使用后台服务，以便在进程被回收且稍后重新启动时能够重新开始。你也可以考虑使用通知来跟踪与应用程序相关的某些后台任务的进度，类似于\
  \ Google Play 商店显示正在下载和安装/升级的应用程序的进度。如果你期望用户等待，则此处介绍的方法适用于快速到中等程度的读取操作。但对于较长时间的读取或写入操作，你可能需要采用基于服务的解决方案。\n\
