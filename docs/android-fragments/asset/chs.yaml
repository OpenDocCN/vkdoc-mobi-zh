  \n# 章节：高级 AsyncTask 与进度对话框\n\n在许多 Android 应用程序中，你需要在 UI 后台的单独线程中执行任务。当任务进行时，你可能希望向用户显示某种进度指示器。虽然你可以自行创建线程、管理线程并协调\
  \ UI 更新，但 Android 提供了一些类来自动为你处理其中的大部分工作。这样你就可以专注于实际要完成的任务，而不是编写线程管理和 UI 消息传递的代码。这些类就是`AsyncTask`和`ProgressDialog`。\n\
  \n本章将从`AsyncTask`的基础知识讲起，然后进入展示进度对话框和进度条的代码部分，这些代码能够正确显示`AsyncTask`的状态，即使设备配置发生变化也是如此。\n\
  \n## 介绍 AsyncTask\n\n让我们通过清单 6-1 中的伪代码来介绍`AsyncTask`。\n\n*清单 6-1. Activity 使用 AsyncTask\
  \ 的模式*\n\n```\npublic class MyActivity {\n\nvoid respondToMenuItem( ) { // 菜单处理程序\n\
  \nperformALongTask( );\n\n}\n\n**91**\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**92**\n\n\n\n# 第 6 章：进阶 AsyncTask 与进度对话框\n\n`void performALongTask( ) { //使用\
  \ AsyncTask`\n\n`//继承 AsyncTask，并实例化该 AsyncTask`\n\n`MyLongTask myLongTask = new\
  \ MyLongTask(...回调对象...); myLongTask.execute(...一些参数...); //在工作线程上启动任务`\n\n`//让主线程返回处理\
  \ UI 事务`\n\n`}`\n\n`//接收 AsyncTask 的回调`\n\n`void someCallBackFromAsyncTask(SomeParameterizedType\
  \ x) {`\n\n`//虽然由 AsyncTask 调用，但此代码运行在主线程上`\n\n`//向用户报告进度`\n\n`}`\n\n使用`AsyncTask`首先要像清单\
  \ 6-1 中的`MyLongTask`那样继承`AsyncTask`。一旦实例化了`AsyncTask`对象，就可以在该对象上调用`execute()`方法。`execute()`方法内部会启动一个独立线程来执行实际工作。`AsyncTask`实现会依次调用多个回调方法，用于报告任务开始、任务进度和任务结束。\n\
  \n清单 6-2 展示了扩展`AsyncTask`的伪代码以及需要重写的方法。（请注意，这是伪代码，并非用于编译。添加`@Override`注解是为了明确表明这些方法来自基类重写）。\n\
  \n*清单 6-2. 扩展 AsyncTask：示例*\n\n```\npublic class MyLongTask extends AsyncTask<String,Integer,Integer>\
  \ {\n\n    //... 构造函数相关\n\n    //调用 execute()会触发以下所有方法\n\n    @Override\n    void\
  \ onPreExecute( ){} //在主线程上运行\n\n    //在此执行所有工作，运行在工作线程上\n\n    @Override\n    Integer\
  \ doInBackground(String... params){}\n\n    //任务完成后再次在主线程上运行\n\n    @Override\n\
  \    void onPostExecute(Integer result){}\n\n    //在主线程上运行\n\n    @Override\n  \
  \  void onProgressUpdate(Integer... progressValuesArray){}\n\n    //....其他方法\n}\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 6 章：进阶 AsyncTask\
  \ 与进度对话框** **93**\n\n清单 6-1 中的`execute()`方法在主线程上调用。此调用会触发清单 6-2 中的一系列方法，从`onPreExecute()`开始。`onPreExecute()`同样在主线程上调用。你可以用此方法设置执行任务的环境，也可以设置对话框或启动进度条，告知用户工作已开始。`onPreExecute()`执行完毕后，`execute()`方法会返回，Activity\
  \ 的主线程继续处理其 UI 职责。此时，`execute()`会生成一个新的工作线程，使`doInBackground()`方法安排在该工作线程上执行。你将在`doInBackground()`方法中完成所有繁重工作。由于该方法运行在工作线程上，主线程不受影响，因此不会出现\"\
  应用无响应\"提示。从`doInBackground()`方法中，你可以通过某种机制（稍后会看到）调用`onProgressUpdate()`来报告进度。`onProgressUpdate()`方法运行在主线程上，因此你可以更新主线程上的\
  \ UI。\n\n## 实现一个简单的 AsyncTask\n\n接下来我们深入了解如何扩展`AsyncTask`。`AsyncTask`类使用泛型为其方法（包括重写的方法）提供类型安全。查看`AsyncTask`类的部分定义（清单\
  \ 6-3）时，你可以看到这些泛型。（请注意，清单 6-3 是经过大幅精简的`AsyncTask`类版本，只包含客户端代码最常用的接口元素。）\n\n*清单 6-3.\
  \ AsyncTask 类定义速览*\n\n```\npublic class AsyncTask<Params, Progress, Result> {\n\n\
  \    //客户端将调用此方法\n\n    AsyncTask<Params, Progress, Result> execute(Params... params);\n\
  \n    //在此执行你的工作。经常触发 onProgressUpdate()\n\n    Result doInBackground(Params...\
  \ params);\n\n    //回调：工作完成后\n\n    void onPostExecute(Result result);\n\n    //回调：工作进度更新时\n\
  \n    void onProgressUpdate(Progress... values);\n}\n```\n\n\n\n```java\nvoid onProgressUpdate(Progress...\
  \ progressValuesArray);\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**94**\n\n# 第 6 章：高级 AsyncTask 与进度对话框\n\n研究清单 6-3，你可以看到，在扩展 `AsyncTask` 时（通过泛型），它需要以下三个参数化类型（`Params`、`Progress`\
  \ 和 `Result`）。我们简要说明这些类型：\n\n- **Params**（`execute()` 方法的参数类型）：扩展 `AsyncTask` 时，你需要指明传递给\
  \ `execute()` 方法的参数类型。如果你将 `Params` 类型声明为 `String`，那么 `execute()` 方法将期望在调用时传入任意数量的由逗号分隔的字符串，例如\
  \ `execute(s1,s2,s3)` 或 `execute(s1,s2,s3,s4,s5)`。\n\n- **Progress**（进度回调方法的参数类型）：此类型表示通过回调\
  \ `onProgressUpdate(Progress... progressValuesArray)` 向调用者报告进度时传回的数值数组。能够传递进度值数组，使得可以监控并报告任务的多个方面。例如，如果\
  \ `AsyncTask` 在处理多个子任务，就可以利用此特性。\n\n- **Result**（通过 `onPostExecute()` 方法报告结果时使用的类型）：此类型表示\
  \ `doInBackground()` 返回的数据类型，该数据最终会以线程安全的方式传递给 `onPostExecute()` 进行处理。\n\n现在了解了\
  \ `AsyncTask` 所需的泛型类型后，假设我们为特定的 `AsyncTask` 确定了以下参数：`Params`：`String`，`Result`：`Integer`，`Progress`：`Integer`。那么，我们可以声明一个扩展的\
  \ `AsyncTask` 类，如清单 6-4 所示。\n\n*清单 6-4. 通过具体类型扩展泛型 AsyncTask*\n```java\npublic class\
  \ MyLongTask\nextends AsyncTask<String,Integer,Integer>\n{\n    //...其他构造函数内容\n\
