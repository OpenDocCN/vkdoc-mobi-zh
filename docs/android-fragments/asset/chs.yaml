  \ 将强制停止工作线程。\n\n## AsyncTask 与线程池\n\n考虑清单 6-10 中的代码，其中菜单项依次调用了两个 `AsyncTasks`。\n\
  \n*清单 6-10. 调用两个长时间运行的任务*\n\n```\nvoid respondToMenuItem( ) {\n    MyLongTask mlt\
  \ = new MyLongTask(this.mReportTo,this.mContext,\"任务 1\");\n    mlt.execute(\"String1\"\
