- '# 第 2 章：响应配置变更


  当应用程序在设备上运行且设备配置发生变化时（例如，旋转 90 度），应用程序需要相应地做出响应。新配置很可能看起来与之前的配置不同。例如，从竖屏模式切换到横屏模式意味着屏幕从又高又窄变为又矮又宽。UI
  元素（按钮、文本、列表等）需要重新排列、调整大小甚至移除，以适应新的配置。


  在 Android 中，默认情况下，配置变更会导致当前 Activity 被销毁并重新创建。应用程序本身会继续运行，但它有机会根据配置变更来改变 Activity
  的显示方式。在极少数情况下，如果需要在不销毁和重新创建 Activity 的情况下处理配置变更，Android 也提供了相应的方法。


  请注意，配置变更的形式多种多样，不仅仅是设备旋转。如果设备连接到扩展坞，这也是一种配置变更。改变设备的语言同样如此。无论新的配置是什么，只要您为相应配置设计了
  Activity，Android 就能处理大部分过渡工作，为用户提供无缝体验。


  本章将从 Activity 和 Fragment 两个角度，带你了解配置变更的全过程。我们将向你展示如何为这些过渡设计应用程序，以及如何避免可能导致应用程序崩溃或行为异常的陷阱。




  '
- "# 第 2 章：响应配置变更\n\n## 默认的配置变更流程\n\nAndroid 操作系统会持续跟踪其运行设备当前的 `Configuration`（配置）。配置包含多种因素，并且新的配置因素会不断加入。例如，当设备插入扩展坞时，就代表设备配置发生了改变。当\
  \ Android 检测到配置变更时，会在正在运行的应用程序中调用回调函数，通知它们变更正在发生，以便应用程序能够正确响应此变更。我们稍后会讨论这些回调，但现在先来回顾一下关于资源的知识。\n\
  \nAndroid 的一大特色在于，系统会根据设备当前的配置为你的 Activity（活动）选择合适的资源。你无需编写代码来判断当前处于哪种配置；只需通过名称访问资源，Android\
  \ 就会自动为你获取相应的资源。\n\n如果设备处于竖屏模式，而你的应用请求一个布局，你会得到竖屏布局；如果设备处于横屏模式，则会得到横屏布局。代码只是请求一个布局，而无需指定具体获取哪一种。这一点非常强大，因为即使引入了新的配置因素或配置因素的新取值，代码也无需改变。\n\
  \n开发者需要做的，就是决定是否需要为新的配置创建新的资源，并按要求创建它们。然后，当应用程序经历配置变更时，Android 会向应用提供新的资源，一切功能将继续按预期运行。\n\
  \n出于让事情尽可能简单的强烈愿望，当配置发生变更时，Android 会销毁当前 Activity，并在其位置创建一个新的 Activity。这看起来可能有点粗暴，但实际上并非如此。要让一个正在运行的\
  \ Activity 适应变更，需要判断哪些部分保持不变、哪些部分需要更改，然后只处理需要变更的部分，这本身就是一个更大的挑战。\n\n即将被销毁的 Activity\
  \ 会首先得到适当的通知，让你有机会保存任何需要保存的内容。当新的 Activity 被创建时，它有机会利用前一个 Activity 的数据来恢复状态。为了获得良好的用户体验，显然你希望这个保存和恢复过程不要花费太长时间。\n\
  \n只要应用及其 Activity 的设计方式能确保它们不包含大量需要长时间重新创建的非 UI 内容，那么保存你需要保存的数据，然后让 Android 丢弃其余部分并重新开始，是相当容易的。这恰恰是成功进行配置变更设计的关键：不要把那些在配置变更期间难以轻松重新创建的\"\
  东西\"放在 Activity 内部。\n\n请记住，我们的应用程序并没有被销毁，因此处于应用上下文（而非当前 Activity）中的任何内容，对于新 Activity\
  \ 来说仍然存在。单例对象仍然可用，我们为应用程序派生出的任何后台线程也仍然存在。\n\n我们正在使用的任何数据库或内容提供程序也仍然存在。利用好这些特性，可以使配置变更变得快速且无痛。如果可能，尽量将数据和业务逻辑放在\
  \ Activity 之外。\n\n配置变更的流程在 Activity 和 Fragment（片段）之间有些相似。当一个 Activity 被销毁并重新创建时，该\
  \ Activity 内的所有 Fragment 也会被销毁并重新创建。那么我们需要担心的，就是关于 Fragment 和 Activity 的状态信息，例如当前显示给用户的数据，或者我们希望保留的内部值。我们将保存想要保留的内容，并在\
  \ Fragment 和 Activity 被重新创建时，在另一边重新拾取它们。\n\n\n\n## 在配置变更期间保护数据\n\n你需要保护那些不易重新创建的数据，避免它们在默认的配置变更过程中被销毁。\n\
  \n### Activity 的销毁/重建周期\n\n在处理 Activity 的默认配置变更时，需要注意三个回调方法：\n\n- `onSaveInstanceState()`\n\
  - `onCreate()`\n- `onRestoreInstanceState()`\n\n第一个回调是 Android 在检测到配置变更发生时将调用的方法。Activity\
  \ 有机会保存其状态，以便在配置变更结束时创建的新 Activity 能够恢复这些状态。`onSaveInstanceState()` 回调将在调用 `onStop()`\
  \ 之前被调用。此时可以访问任何存在的状态，并将其保存到 `Bundle` 对象中。当 Activity 被重新创建时，这个对象将被传递给另外两个回调方法（`onCreate()`\
  \ 和 `onRestoreInstanceState()`）。你只需要在其中一个回调方法中添加逻辑来恢复 Activity 的状态即可。\n\n默认的 `onSaveInstanceState()`\
  \ 回调会为你做一些有用的事情。例如，它会遍历当前活跃的视图层级，并保存每个带有 `android:id` 的视图的值。这意味着如果你有一个接收了用户输入的 `EditText`\
  \ 视图，那么该输入在 Activity 销毁/重建周期后仍然可用，以便在用户重新获得控制权之前填充 `EditText`。你无需手动逐个保存这些状态。如果你确实重写了\
  \ `onSaveInstanceState()`，请确保使用 bundle 对象调用 `super.onSaveInstanceState()`，这样系统就能为你处理这些工作。保存的不是视图本身，而是那些需要在销毁/重建边界间保持不变的视图状态属性。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n要将数据保存到 bundle 对象中，请使用诸如用于整数的\
  \ `putInt()` 和用于字符串的 `putString()` 之类的方法。`android.os.Bundle` 类中有相当多的方法；你的选择不限于整数和字符串。例如，`putParcelable()`\
  \ 可用于保存复杂对象。每个 `put` 方法都使用一个字符串键，之后你将使用相同的键来检索该值。一个示例性的 `onSaveInstanceState()`\
  \ 可能如代码清单 2-1 所示。\n\n**代码清单 2-1. 示例 `onSaveInstanceState()`**\n\n```java\n@Override\n\
  public void onSaveInstanceState(Bundle icicle) {\n    super.onSaveInstanceState(icicle);\n\
  \    icicle.putInt(\"counter\", 1);\n}\n```\n\n有时 bundle 被称为 `icicle`，因为它代表 Activity\
  \ 的一个冻结的小片段。在这个示例中，你仅保存了一个值，它的键是 `counter`。你可以通过在此回调中添加更多 `put` 语句来保存更多值。此示例中的 `counter`\
  \ 值有些临时性，因为如果应用被完全销毁，当前值将会丢失。例如，当用户关闭设备时就会发生这种情况。在第 4 章中，你将学习更持久地保存值的方法。此实例状态仅用于在应用本次运行期间保留值。不要将此机制用于需要长期保留的重要状态。\n\
  \n要恢复 Activity 状态，你需要访问 bundle 对象以检索你认为存在的值。同样，你需要使用 `Bundle` 类的方法，如 `getInt()`\
  \ 和 `getString()`，并传入相应的键来指定你想要的值。如果该键在 `Bundle` 中不存在，则会返回 0 或 null（取决于所请求对象的类型）。或者，你可以在相应的\
  \ getter 方法中提供一个默认值。\n\n代码清单 2-2 展示了一个示例性的 `onRestoreInstanceState()` 回调。\n\n**代码清单\
  \ 2-2. 示例 `onRestoreInstanceState()`**\n\n```java\n@Override\npublic void onRestoreInstanceState(Bundle\
  \ icicle) {\n    super.onRestoreInstanceState(icicle);\n    int someInt = icicle.getInt(\"\
  counter\", -1);\n    // 现在使用 someInt 来恢复 Activity 的状态。\n    // 如果未找到值，则 -1 为默认值。\n\
  }\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n你可以在 `onCreate()`\
  \ 或 `onRestoreInstanceState()` 中恢复状态，这取决于你。许多应用会在 `onCreate()` 中恢复状态，因为那里是执行大量初始化工作的地方。将两者分开的一个原因是，如果你正在创建一个可能被扩展的\
  \ Activity 类。进行扩展的开发者可能会发现，只需重写 `onRestoreInstanceState()` 并添加恢复状态的代码，比必须重写整个 `onCreate()`\
  \ 要更容易。\n\n这里非常重要的一点是，你需要注意对 Activity、视图以及其他对象的引用，这些对象需要在当前 Activity 被完全销毁时能够被垃圾回收。如果你将某些引用了将要被销毁的\
  \ Activity 的对象放入保存的 bundle 中，那么该 Activity 将无法被垃圾回收。这很可能会导致内存泄漏，并且泄漏可能会不断增长，直到你的应用崩溃。\n\
  \n应避免放入 bundle 的对象包括 `Drawables`、`Adapters`、`Views` 以及任何与 Activity 上下文绑定的其他内容。不要将\
  \ `Drawable` 直接放入 bundle，而是应该序列化位图并保存它。或者更好的是，在 Activity 和 Fragment 外部管理位图，而不是在内部管理。向\
  \ bundle 中添加某种对位图的引用。当需要为新 Fragment 重新创建任何 `Drawables` 时，使用该引用来访问外部位图以重新生成你的 `Drawables`。\n\
  \n### Fragment 的销毁/重建周期\n\nFragment 的销毁/重建周期与 Activity 非常相似。一个正在被销毁并重建的 Fragment\
  \ 会调用其 `onSaveInstanceState()` 回调，允许 Fragment 将值保存到 `Bundle` 对象中以备后用。一个区别是，当 Fragment\
  \ 被重新创建时，有六个 Fragment 回调会接收这个 `Bundle` 对象：`onInflate()`、`onCreate()`、`onCreateView()`、`onActivityCreated()`、`onViewCreated()`\
  \ 和 `onViewStateRestored()`。最后两个回调是较新的，分别来自 Honeycomb 3.2 和 JellyBean 4.2。这为我们提供了大量机会，可以根据重建的\
  \ Fragment 的先前状态来重建其内部状态。\n\nAndroid 仅保证在 `onDestroy()` 之前的某个时间点会为 Fragment 调用 `onSaveInstanceState()`。这意味着当调用\
  \ `onSaveInstanceState()` 时，视图层次可能已附加，也可能尚未附加。因此，不要指望在 `onSaveInstanceState()` 内部遍历视图层次。例如，如果\
  \ Fragment 位于 Fragment 回退栈中，则不会显示任何 UI，因此不会存在任何视图层次。这当然没问题，因为如果没有 UI 显示，就无需尝试捕获视图的当前值来保存它们。在尝试保存视图的当前值之前，你需要检查视图是否存在，并且不要将视图不存在视为错误。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n与 Activity 类似，注意不要在 bundle\
  \ 对象中包含那些引用了在此 Fragment 被重新创建时可能不存在的 Activity 或 Fragment 的项。尽量保持 bundle 的大小尽可能小，并尽可能将长期存在的数据存储在\
  \ Activity 和 Fragment 之外，仅从你的 Activity 和 Fragment 中引用这些数据。这样，你的销毁/重建周期会快得多，产生内存泄漏的可能性也会大大降低，并且你的\
  \ Activity 和 Fragment 代码应该更容易维护。\n\n### 使用 FragmentManager 保存 Fragment 状态\n\nFragment\
  \ 还有另一种保存状态的方法，可以作为……的补充\n\n\n\n## 处理配置变化\n\nAndroid 不会通知 `Fragment` 保存其状态。在 Honeycomb\
  \ 3.2 中，`FragmentManager` 类新增了 `saveFragmentInstanceState()` 方法，可调用该方法生成 `Fragment.SavedState`\
  \ 类的对象。前面章节中提到的保存状态的方法都是在 Android 内部进行的。\n\n虽然我们知道状态正在被保存，但我们无法直接访问它。这种保存状态的方法会生成一个代表\
  \ `Fragment` 保存状态的对象，并允许你控制是否以及何时从该状态创建 `Fragment`。\n\n使用 `Fragment.SavedState`\
  \ 对象恢复 `Fragment` 的方法是通过 `Fragment` 类的 `setInitialSavedState()` 方法。在第 1 章中，你了解到最好使用静态工厂方法（例如\
  \ `newInstance()`）创建新的 `Fragment`。在这个方法中，你看到了如何调用默认构造函数，然后附加一个参数包。你可以改为调用 `setInitialSavedState()`\
  \ 方法来设置它，以便恢复到之前的状态。\n\n关于这种保存 `Fragment` 状态的方法，有几个注意事项需要了解：\n\n*   要保存的 `Fragment`\
  \ 当前必须已附加到 `FragmentManager`。\n*   使用此保存状态创建的新 `Fragment` 必须与创建它的 `Fragment` 属于相同的类类型。\n\
  *   保存的状态不能包含对其他 `Fragment` 的依赖。当保存的 `Fragment` 被重新创建时，其他 `Fragment` 可能不存在。\n\n\
  [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 在 Fragment 上使用 setRetainInstance\n\
  \n`Fragment` 可以避免在配置更改时被销毁和重新创建。如果使用参数 `true` 调用 `setRetainInstance()` 方法，则当它的 `Activity`\
  \ 被销毁并重新创建时，该 `Fragment` 将保留在应用程序中。不会调用 `Fragment` 的 `onDestroy()` 回调，也不会调用 `onCreate()`。`onDetach()`\
  \ 回调会被调用，因为 `Fragment` 必须与即将消失的 `Activity` 分离；而 `onAttach()` 和 `onActivityCreated()`\
  \ 会被调用，因为 `Fragment` 已附加到新的 `Activity`。这仅适用于不在返回栈上的 `Fragment`。对于没有 UI 的 `Fragment`\
  \ 尤其有用。\n\n此功能非常强大，因为你可以使用非 UI 的 `Fragment` 来处理对数据对象和后台线程的引用，并在该 `Fragment` 上调用\
  \ `setRetainInstance(true)`，以便它不会在配置更改时被销毁和重新创建。额外的好处是，在正常的配置更改过程中，非 UI `Fragment`\
  \ 的回调 `onDetach()` 和 `onAttach()` 会将 `Activity` 引用从旧 `Activity` 切换到新 `Activity`。\n\
  \n### 已弃用的配置更改方法\n\n`Activity` 上的几个方法已被弃用，因此不应再使用它们：\n\n*   `getLastNonConfigurationInstance()`\n\
  *   `onRetainNonConfigurationInstance()`\n\n这些方法以前允许你保存一个正在被销毁的 `Activity` 中的任意对象，并将其传递给正在被创建的\
  \ `Activity` 的下一个实例。虽然它们很有用，但现在你应该使用前面描述的方法来管理销毁/创建周期中 `Activity` 实例之间的数据。\n\n###\
  \ 自行处理配置更改\n\n到目前为止，你已经了解了 Android 如何为你处理配置更改。它负责销毁和重新创建 `Activity` 和 `Fragment`，为新的配置拉取最佳资源，保留任何用户输入的数据，并让你有机会在某些回调中执行一些额外的逻辑。这通常是你最好的选择。但当情况并非如此，当你必须自行处理配置更改时，Android\
  \ 提供了一种出路。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n不推荐这样做，因为完全由你来确定由于更改而需要更改的内容，然后你需要负责进行所有更改。如前所述，除了方向变化之外，还有许多其他配置更改。幸运的是，你不一定需要自行处理所有配置更改。\n\
  \n自行处理配置更改的第一步是在 `AndroidManifest.xml` 文件的 `<activity>` 标签中，使用 `android:configChanges`\
  \ 属性声明你将处理哪些更改。Android 将使用前面描述的方法处理其他配置更改。你可以通过使用 `|` 符号将它们组合在一起，根据需要指定任意数量的配置更改类型，如下所示：\n\
  \n```\n<activity ... android:configChanges=\"orientation|keyboardHidden\" ... >\n\
  ```\n\n配置更改类型的完整列表可以在 `R.attr` 的参考页面上找到。请注意，如果你的目标 API 是 13 或更高，并且你需要处理方向更改，则还需要处理\
  \ `screenSize`。\n\n配置更改的默认过程是调用回调来销毁和重新创建 `Activity` 或 `Fragment`。当你声明将处理特定的配置更改时，过程会发生变化，因此仅调用\
  \ `onConfigurationChanged()` 回调（在 `Activity` 及其 `Fragment` 上）。Android 会传入一个 `Configuration`\
  \ 对象，以便回调知道新的配置是什么。由回调来确定可能发生了什么变化；但是，由于你可能只自行处理少量的配置更改，因此弄清楚这一点应该不会太难。\n\n你只有在需要完成的工作非常少，并且可以跳过销毁和重新创建时，才真正希望自行处理配置更改。例如，如果竖屏和横屏的\
  \ `Activity` 布局相同，并且所有图像资源都相同，那么销毁和重新创建 `Activity` 实际上并不能带来任何好处。在这种情况下，声明你将处理方向配置更改是相当安全的。在你的\
  \ `Activity` 方向更改期间，`Activity` 将保持不变，只需使用现有资源（如布局、图像、字符串等）在新的方向上重新渲染自身。但如果可以的话，让\
  \ Android 来处理这些事情其实也没什么大不了的。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n## 参考资料\n\n以下是一些可能有用的参考资料，供你进一步探索相关主题：\n\n*   [www.androidbook.com/androidfragments/projects](http://www.androidbook.com/androidfragments/projects)：本书相关可下载项目的列表。对于本章，请查找名为\
  \ `AndroidFragments_Ch02_ConfigChanges.zip` 的 ZIP 文件。此 ZIP 文件包含本章的所有项目，这些项目列在不同的根目录中。还有一个\
  \ `README.TXT` 文件，准确描述了如何从这些 ZIP 文件之一将项目导入到你的 IDE 中。\n*   [`developer.android.com/guide/topics/fundamentals/activities.html#SavingActivityState`](http://developer.android.com/guide/topics/fundamentals/activities.html#SavingActivityState)：Android\
  \ 开发者指南，讨论了保存和恢复状态。\n*   [`developer.android.com/guide/topics/resources/runtime-changes.html`](http://developer.android.com/guide/topics/resources/runtime-changes.html)：Android\
  \ 处理运行时变更的 API 指南。\n\n## 总结\n\n让我们通过快速列举你学到的关于处理配置更改的知识来结束本章：\n\n*   默认情况下，`Activity`\
  \ 在配置更改期间会被销毁并重新创建。`Fragment` 也是如此。\n*   避免将大量数据和逻辑放入 `Activity` 中，以便配置更改能够快速发生。\n\
  \n\n\n"
- '# 优化排版后的内容


  让 Android 提供合适的资源。


  使用单例在 Activity 外部保存数据，以便在配置变更时更轻松地销毁和重建 Activity。


  利用默认的 `onSaveInstanceState()` 回调来保存带有 `android:id` 的视图上的 UI 状态。


  如果某个 Fragment 在 Activity 的销毁与重建周期中能够无问题地存活，可以使用 `setRetainInstance()` 来告知 Android
  无需销毁并重建该 Fragment。


  ---


  '
- "# 章节：使用对话框\n\nAndroid SDK 为对话框提供了广泛支持。对话框是一个较小的窗口，会弹出于当前窗口前方，用于显示紧急消息、提示用户输入信息，或显示某种状态（如下载进度）。通常期望用户与对话框进行交互，然后返回到底层窗口继续使用应用。从技术上讲，Android\
  \ 允许将对话框 Fragment 嵌入到 Activity 的布局中，我们也会涵盖这一点。\n\nAndroid 明确支持的对话框包括：提示对话框、输入对话框、选择列表、单选、多选、进度条、时间选择器和日期选择器。（此列表可能因\
  \ Android 版本而异。）Android 也支持满足其他需求的自定义对话框。本章的主要目的并非逐一介绍这些对话框，而是通过一个示例应用来讲解 Android\
  \ 对话框的底层架构。\n\n基于此，你应该能够使用任意 Android 对话框。\n\n需要注意的是，Android 3.0 新增了基于 Fragment 的对话框。Google\
  \ 期望开发者仅使用 Fragment 对话框，即使在 Android 3.0 之前的版本中也如此。这可以通过 Fragment 兼容库实现。因此，本章重点介绍\
  \ `DialogFragment`。\n\n## 在 Android 中使用对话框\n\nAndroid 中的对话框是异步的，这提供了灵活性。然而，如果你习惯于对话框主要是同步的编程框架（例如\
  \ Microsoft Windows 或网页中的 JavaScript 对话框），你可能会觉得异步对话框不太直观。\n\n对于同步对话框，对话框显示后的下一行代码会等到对话框被关闭后才执行。这意味着下一行代码可以查询用户按下了哪个按钮，或在对话框中输入了哪些文本。但在\
  \ Android 中，对话框是异步的。对话框一旦显示，下一行代码就会立即执行，即使此时用户尚未触碰对话框。你的应用必须通过实现对话框的回调来处理这一情况，以便应用能获知用户与对话框的交互。\n\
  \n这也意味着你的应用能够通过代码关闭对话框，这一功能非常强大。如果对话框正在显示忙碌消息（因为你的应用正在执行某项任务），一旦应用完成任务，它就可以通过代码关闭该对话框。\n\
  \n## 理解对话框 Fragment\n\n在本节中，你将学习如何使用对话框 Fragment 来呈现一个简单的警告对话框，以及一个用于收集提示文本的自定义对话框。\n\
  \n### DialogFragment 基础\n\n在我们展示提示对话框和警告对话框的工作示例之前，我们想先介绍对话框 Fragment 的高级概念。\n\n\
  对话框相关功能使用名为 `DialogFragment` 的类。`DialogFragment` 派生自 `Fragment` 类，其行为与 Fragment\
  \ 非常相似。然后你将使用 `DialogFragment` 作为对话框的基类。一旦你从该类派生出自己的对话框（例如 `public class MyDialogFragment\
  \ extends DialogFragment { ... }`），就可以通过 Fragment 事务将此 `MyDialogFragment` 作为对话框显示出来。代码清单\
  \ 3-1 展示了实现此功能的代码片段。\n\n*代码清单 3-1\\. 显示一个对话框 Fragment*\n\n\n```java\npublic class\
  \ SomeActivity extends Activity\n{\n    //....其他活动函数\n    public void showDialog()\n\
  \    {\n        //构造 MyDialogFragment\n        MyDialogFragment mdf = MyDialogFragment.newInstance(arg1,\
  \ arg2);\n        FragmentManager fm = getFragmentManager();\n        FragmentTransaction\
  \ ft = fm.beginTransaction();\n        mdf.show(ft, \"my-dialog-tag\");\n    }\n\
  \    //....其他活动函数\n}\n```\n\n**注意** 我们在本章末尾的“参考资料”部分提供了一个可下载项目的链接。你可以利用这个下载来实验本章介绍的代码和概念。\n\
  \n从`清单 3-1`可以看出，显示对话框片段的步骤如下：\n1. 创建一个对话框片段。\n2. 获取一个片段事务。\n3. 使用步骤 2 中的片段事务显示对话框。\n\
  \n接下来我们将逐一讨论这些步骤。\n\n### 构造对话框片段\n\n构造对话框片段时，其规则与构建任何其他类型的片段相同。推荐的模式是使用工厂方法，例如之前用到的\
  \ `newInstance()`。在该 `newInstance()` 方法内部，你使用对话框片段的默认构造函数，然后添加一个包含传入参数的参数包。你不需要在此方法中执行其他工作，因为必须确保此处的操作与\
  \ Android 从其保存状态恢复对话框片段时的操作一致。而 Android 所做的全部工作就是调用默认构造函数并为其重新创建参数包。\n\n### 重写 `onCreateView`\n\
  \n当你继承对话框片段时，需要重写两个方法之一来为对话框提供视图层次结构。第一种选择是重写 `onCreateView()` 并返回一个视图。第二种选择是重写\
  \ `onCreateDialog()` 并返回一个对话框（例如由 `AlertDialog.Builder` 构建的对话框，稍后我们会介绍）。\n\n`清单\
  \ 3-2` 展示了重写 `onCreateView()` 的示例。\n\n*清单 3-2. 重写* `DialogFragment` *中的* `onCreateView()`\n\
  \n```java\npublic class MyDialogFragment extends DialogFragment\n    implements\
  \ View.OnClickListener\n{\n    .....其他函数\n    public View onCreateView(LayoutInflater\
  \ inflater,\n                             ViewGroup container, Bundle savedInstanceState)\n\
  \    {\n        //通过填充所需布局创建视图\n        View v = inflater.inflate(R.layout.prompt_dialog,\
  \ container, false);\n        //你可以定位视图并设置值\n        TextView tv = (TextView)v.findViewById(R.id.promptmessage);\n\
  \        tv.setText(this.getPrompt());\n        //你可以在按钮上设置回调\n        Button dismissBtn\
  \ = (Button)v.findViewById(R.id.btn_dismiss);\n        dismissBtn.setOnClickListener(this);\n\
  \        Button saveBtn = (Button)v.findViewById(R.id.btn_save);\n        saveBtn.setOnClickListener(this);\n\
  \        return v;\n    }\n    .....其他函数\n}\n```\n\n在`清单 3-2`中，你加载了一个由布局标识的视图。然后你查找两个按钮并为其设置回调。这与你在第\
  \ 1 章中创建详情片段的方式非常相似。但是，与早期的片段不同，对话框片段有另一种创建视图层次结构的方式。\n\n### 重写 `onCreateDialog`\n\
  \n作为在 `onCreateView()` 中提供视图的替代方案，你可以重写 `onCreateDialog()` 并提供对话框实例。`清单 3-3` 为此方法提供了示例代码。\n\
  \n*清单 3-3. 重写* `DialogFragment` *中的* `onCreateDialog()`\n\n```java\npublic class\
  \ MyDialogFragment extends DialogFragment\n    implements DialogInterface.OnClickListener\n\
  {\n    .....其他函数\n    @Override\n    public Dialog onCreateDialog(Bundle icicle)\n\
  \    {\n        AlertDialog.Builder b = new AlertDialog.Builder(getActivity())\n\
  \            .setTitle(\"我的对话框标题\")\n            .setPositiveButton(\"确定\", this)\n\
  \            .setNegativeButton(\"取消\", this)\n            .setMessage(this.getMessage());\n\
  \        return b.create();\n    }\n    .....其他函数\n}\n```\n\n在这个示例中，你使用警告对话框构建器来创建并返回一个对话框对象。这对于简单对话框效果很好。第一种重写\
  \ `onCreateView()` 的方式同样简单，并且提供了更大的灵活性。`AlertDialog.Builder` 实际上是 Android 3.0 之前版本的遗留产物。这是创建对话框的旧方法之一，你仍然可以在\
  \ `DialogFragments` 中使用它来创建对话框。如你所见，通过调用各种可用方法来构建对话框相当容易，就像我们在此处所做的那样。\n\n### 显示对话框片段\n\
  \n一旦构造好对话框片段，你需要一个片段事务来显示它。与所有其他片段一样，对对话框片段的操作通过片段事务进行。\n\n对话框片段的 `show()` 方法接受一个片段事务作为输入。你可以在`清单\
  \ 3-1`中看到这一点。`show()` 方法使用片段事务将对话框添加到活动，然后提交该片段事务。但是，`show()` 方法不会将事务添加到返回栈。如果你想这样做，需要先将此事务添加到返回栈，然后将其传递给\
  \ `show()` 方法。对话框片段的 `show()` 方法具有以下签名：\n\n```java\npublic int show(FragmentTransaction\
  \ transaction, String tag)\npublic int show(FragmentManager manager, String tag)\n\
  ```\n\n第一个 `show()` 方法通过将片段以指定标签添加到传入的事务中来显示对话框。此方法随后返回已提交事务的标识符。\n\n第二个 `show()`\
  \ 方法自动从事务管理器获取一个事务。这是一个快捷方法。但是，当你使用第二种方法时，你无法选择将事务添加到返回栈。如果你想要这种控制，需要使用第一种方法。如果你只是想简单地显示对话框，并且当时没有其他理由需要处理片段事务，那么可以使用第二种方法。\n\
  \n对话框作为片段的一个好处是，底层的片段管理器会负责基本的状态管理。例如，即使在显示对话框时设备旋转，对话框也会重新生成，而无需你执行任何状态管理。对话框片段还提供了控制对话框视图显示框架的方法，例如标题和框架的外观。请参阅\
  \ `DialogFragment` 类的文档以了解这些选项的更多信息；本章末尾提供了此 URL。\n\n### 关闭对话框片段\n\n有两种方法可以关闭对话框片段。第一种是响应按钮或对话框视图上的某些操作，在对话框片段上显式调用\
  \ `dismiss()` 方法，如`清单 3-4`所示。\n\n*清单 3-4. 调用* `dismiss()`\n\n```java\nif (someview.getId()\
  \ == R.id.btn_dismiss)\n{\n    //使用某些回调通知此对话框的客户端\n    //对话框正在被关闭\n    //并调用 dismiss\n\
  \    dismiss();\n    return;\n}\n```\n\n对话框片段的 `dismiss()` 方法会从片段管理器中移除该片段，然后提交该事务。如果此对话框片段存在返回栈，则\
  \ `dismiss()` 会将当前对话框弹出事务栈，并呈现上一个片段事务状态。无论是否存在返回栈，调用 `dismiss()` 都会导致调用标准的对话框片段销毁回调，包括\
  \ `onDismiss()`。\n\n需要注意的一点是，你不能依赖 `onDismiss()` 来断定 `dismiss()` 是由你的代码调用的。这是因为当设备配置发生变化时也会调用\
  \ `onDismiss()`，因此它并不能很好地指示用户对对话框本身做了什么。如果对话框正在被...\n\n\n当用户旋转设备时，即使没有点击对话框中的按钮，`DialogFragment`也会看到`onDismiss()`被调用。相反，你应该始终依赖对话框视图上明确的按钮点击。\n\
  \n如果用户按下了返回键，这会导致`onCancel()`回调在`DialogFragment`上触发。默认情况下，Android 会让`DialogFragment`消失，所以你不需要自己调用`dismiss()`。但如果你希望调用方`Activity`被通知对话框已被取消，你需要在`onCancel()`内部调用逻辑来实现这一点。这是`onCancel()`和`onDismiss()`在`DialogFragment`中的区别。使用`onDismiss()`，你无法确切知道是什么导致了`onDismiss()`回调被触发。你可能也注意到了，`DialogFragment`没有`cancel()`方法，只有`dismiss()`；但正如我们所说，当`DialogFragment`被按下返回键取消时，Android\
  \ 会为你处理取消/关闭操作。\n\n关闭`DialogFragment`的另一种方式是呈现另一个`DialogFragment`。关闭当前对话框并呈现新对话框的方式与仅仅关闭当前对话框略有不同。清单\
  \ 3-5 展示了一个示例。\n\n*清单 3-5. 为返回栈设置一个对话框*\n\n```\nif (someview.getId() == R.id.btn_invoke_another_dialog)\n\
  {\n    Activity act = getActivity();\n    FragmentManager fm = act.getFragmentManager();\n\
  \    FragmentTransaction ft = fm.beginTransaction();\n    ft.remove(this);\n   \
  \ ft.addToBackStack(null);\n    //null represents no name for the back stack transaction\n\
  \    HelpDialogFragment hdf =\n        HelpDialogFragment.newInstance(R.string.helptext);\n\
  \    hdf.show(ft, \"HELP\");\n    return;\n}\n```\n\n在单个事务中，你删除了当前的`DialogFragment`并添加了新的`DialogFragment`。这导致当前对话框从视觉上消失，新对话框出现。如果用户按下返回键，因为你已将此事务保存在返回栈中，新对话框将被关闭，之前的对话框将重新显示。例如，这是显示帮助对话框的一种便捷方式。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**52**\n\n**第 3 章：使用对话框**\n\
  \n### 对话框关闭的影响\n当你向`FragmentManager`添加任何`Fragment`时，`FragmentManager`会为该`Fragment`管理状态。这意味着当设备配置发生变化（例如设备旋转）时，`Activity`会重启，`Fragment`也会重启。你在第\
  \ 1 章运行 Shakespeare 示例应用并旋转设备时已经看到了这一点。\n\n设备配置变化不会影响对话框，因为它们也由`FragmentManager`管理。但`show()`和`dismiss()`的隐式行为意味着，如果你不小心，很容易失去对`DialogFragment`的跟踪。`show()`方法自动将`Fragment`添加到`FragmentManager`；`dismiss()`方法自动从`FragmentManager`中移除`Fragment`。在开始显示`Fragment`之前，你可能有一个指向`DialogFragment`的直接指针。但你不能先把这个`Fragment`添加到`FragmentManager`，之后再调用`show()`，因为一个`Fragment`只能被添加到`FragmentManager`一次。你可能打算通过`Activity`的恢复来获取这个指针。然而，如果你显示然后关闭这个对话框，这个`Fragment`会被隐式地从`FragmentManager`中移除，从而剥夺了该`Fragment`被恢复和重新指向的能力（因为`FragmentManager`在它被移除后不知道这个`Fragment`的存在）。\n\
  \n如果你希望在对话框关闭后保留其状态，你需要在对话框之外——要么在父`Activity`中，要么在持久存在的非对话框`Fragment`中——维护状态。\n\n\
  ### DialogFragment 示例应用\n在本节中，你将回顾一个演示`DialogFragment`概念的示例应用。你还将研究`Fragment`与其包含它的`Activity`之间的通信。为了实现这一切，你需要五个\
  \ Java 文件：\n\n- `MainActivity.java`：应用的主`Activity`。它显示一个包含帮助文本的简单视图以及一个可以启动对话框的菜单。\n\
  - `PromptDialogFragment.java`：一个`DialogFragment`示例，它定义了其自己的 XML 布局并允许用户输入。它有三个按钮：保存、关闭（取消）和帮助。\n\
  - `AlertDialogFragment.java`：一个`DialogFragment`示例，它使用`AlertBuilder`类在此`Fragment`内创建对话框。这是创建对话框的传统方式。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00019.jpeg)\n\n**第\
  \ 3 章：使用对话框**\n\n**53**\n\n- `HelpDialogFragment.java`：一个非常简单的`Fragment`，显示来自应用资源的帮助消息。创建帮助对话框对象时指定具体的帮助消息。这个帮助`Fragment`可以从主`Activity`和提示对话框`Fragment`中显示。\n\
  - `OnDialogDoneListener.java`：一个接口，你要求你的`Activity`实现它，以便从`Fragment`接收消息。使用接口意味着你的`Fragment`不需要太多了解调用它的`Activity`，只需知道它必须实现了这个接口即可。这有助于将功能封装在合适的位置。从`Activity`的角度来看，它有一种通用的方式从`Fragment`接收信息，而无需了解过多细节。\n\
  \n这个应用有三个布局：主`Activity`的布局、提示对话框`Fragment`的布局和帮助对话框`Fragment`的布局。注意，你不需要为警告对话框`Fragment`提供布局，因为`AlertBuilder`会在内部为你处理这个布局。完成后，应用看起来就像图\
  \ 3-1。\n\n***图 3-1.** DialogFragment 示例应用的用户界面*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**54**\n\n**第 3 章：使用对话框**\n\n### Dialog 示例：MainActivity\n让我们来看看源代码，你可以从本书的网站下载（参见“参考资料”部分）。我们将使用`DialogFragmentDemo`项目。在我们继续之前，打开`MainActivity.java`的源代码。\n\
  \n主`Activity`的代码非常直接。你显示一个简单的文本页面并设置一个菜单。每个菜单项调用一个`Activity`方法，每个方法基本做同样的事情：获取一个`FragmentTransaction`，创建一个新的`Fragment`，并显示该`Fragment`。注意，每个`Fragment`都有一个唯一的标签，该标签与`FragmentTransaction`一起使用。\n\
  \n这个标签会与`FragmentManager`中的`Fragment`关联起来，因此你之后可以通过标签名称定位这些`Fragment`。`Fragment`也可以通过`Fragment`的`getTag()`方法确定自己的标签值。\n\
  \n主`Activity`中的最后一个方法定义是`onDialogDone()`，这是一个回调，属于你正在实现的`OnDialogDoneListener`接口的一部分。如你所见，回调提供了调用你的`Fragment`的标签、一个指示对话框是否被取消的布尔值以及一条消息。就本示例而言，你只是希望将信息记录到`LogCat`；你也使用`Toast`将其显示给用户。`Toast`将在本章后面介绍。\n\
  \n### Dialog 示例：OnDialogDoneListener\n为了能够知道对话框何时消失，创建一个你的对话框调用者实现的监听器接口。接口的代码位于`OnDialogDoneListener.java`中。\n\
  \n\n\n这是一个非常简单的接口，如你所见。你只为该接口选择一个回调，且该回调必须由 Activity 实现。你的 Fragment 无需了解调用者 Activity\
  \ 的具体细节，只需知道调用者 Activity 必须实现 `OnDialogDoneListener` 接口；因此，Fragment 可以调用此回调来与调用者\
  \ Activity 进行通信。根据 Fragment 的功能，该接口中可能包含多个回调。在本示例应用中，你将接口与 Fragment 类定义分开展示。\n\n\
  为了更便捷地管理代码，你可以将 Fragment 监听器接口嵌入 Fragment 类定义本身，这样更容易保持监听器与 Fragment 之间的同步。\n\n\
  ### 对话框示例：`PromptDialogFragment`\n\n现在来看你的第一个 Fragment，`PromptDialogFragment`，其布局位于\
  \ `/res/layout/prompt_dialog.xml`，Java 代码在 `/src` 目录下的 `PromptDialogFragment.java`\
  \ 中。\n\n这个提示对话框的布局与你之前见过的许多布局类似。它包含一个作为提示信息的 `TextView`；一个用于接收用户输入的 `EditText`；以及三个按钮，分别用于保存输入、关闭（取消）对话框\
  \ Fragment，以及弹出帮助对话框。\n\n`PromptDialogFragment` 的 Java 代码开头与你之前的 Fragment 类似。你有一个\
  \ `newInstance()` 静态方法来创建新对象，在此方法中，你调用默认构造函数，构建一个参数 Bundle，并将其附加到新对象上。接下来，你在 `onAttach()`\
  \ 回调中有了新内容。你需要确保刚附加到的 Activity 已实现 `OnDialogDoneListener` 接口。为了测试这一点，你将传入的 Activity\
  \ 强制转换为 `OnDialogDoneListener` 接口。代码如下：\n\n```\ntry {\n    OnDialogDoneListener\
  \ test = (OnDialogDoneListener)act;\n}\ncatch(ClassCastException cce) {\n    //\
  \ 在这里优雅地处理失败情况。\n    Log.e(MainActivity.LOGTAG, \"Activity is not listening\");\n\
  }\n```\n\n如果 Activity 没有实现此接口，则会抛出 `ClassCastException`。你可以捕获此异常并更优雅地处理它，但本示例保持代码尽可能简单。\n\
  \n接下来是 `onCreate()` 回调。与 Fragment 的常见情况一样，你在这里不构建用户界面，但可以设置对话框样式。这是对话框 Fragment\
  \ 特有的。你可以自行设置样式和主题，或者仅设置样式，同时使用主题值零（`0`），让系统为你选择合适的主题。代码如下：\n\n```\nint style =\
  \ DialogFragment.STYLE_NORMAL, theme = 0;\nsetStyle(style,theme);\n```\n\n在 `onCreateView()`\
  \ 中，你为对话框 Fragment 创建视图层级。\n\n与其他 Fragment 类似，你不要将视图层级附加到传入的视图容器上（即，将 `attachToRoot`\
  \ 参数设置为 `false`）。然后，你继续设置按钮回调，并将对话框提示文本设置为最初传递给 `newInstance()` 的提示信息。最后，你检查是否有任何值通过保存状态\
  \ Bundle（`icicle`）传入。这表示你的 Fragment 正在被重新创建，很可能是由于配置变更，并且用户可能已经输入了一些文本。如果是这样，你需要用用户已输入的内容填充\
  \ `EditText`。请记住，由于配置已更改，内存中实际的视图对象与之前不同，因此你必须找到它并相应地设置文本。\n\n紧接着的下一个回调是 `onSaveInstanceState()`；这是你将用户当前输入的任何文本保存到保存状态\
  \ Bundle 中的地方。\n\n`onCancel()` 和 `onDismiss()` 回调未展示，因为它们仅执行日志记录；你可以在 Fragment 的生命周期中看到这些回调何时触发。\n\
  \n提示对话框 Fragment 中的最后一个回调是用于按钮的。再次，你获取对封闭 Activity 的引用，并将其强制转换为你期望 Activity 已实现的接口。如果用户按下“保存”按钮，你获取输入的文本并调用接口的回调\
  \ `onDialogDone()`。此回调接受此 Fragment 的标签名称、一个表示此对话框 Fragment 是否已被取消的布尔值，以及一条消息，在此例中为用户输入的文本。以下是来自\
  \ `MainActivity` 的代码：\n\n```\npublic void onDialogDone(String tag, boolean cancelled,\n\
  CharSequence message) {\n    String s = tag + \" responds with: \" + message;\n\
  \    if(cancelled)\n        s = tag + \" was cancelled by the user\";\n    Toast.makeText(this,\
  \ s, Toast.LENGTH_LONG).show();\n    Log.v(LOGTAG, s);\n}\n```\n\n为了完成对“保存”按钮点击的处理，你随后调用\
  \ `dismiss()` 来关闭对话框 Fragment。请记住，`dismiss()` 不仅会在视觉上使 Fragment 消失，还会将 Fragment\
  \ 从 Fragment 管理器中弹出，使其不再可用。\n\n如果按下的按钮是“关闭”，你再次调用接口回调，这次不带消息，然后调用 `dismiss()`。最后，如果用户按下了“帮助”按钮，你不想丢失提示对话框\
  \ Fragment，因此你需要采取一些不同的操作。我们之前描述过这一点。为了记住提示对话框 Fragment，以便稍后能返回，你需要创建一个 Fragment\
  \ 事务来移除提示对话框 Fragment，并使用 `show()` 方法添加帮助对话框 Fragment；这需要被添加到返回栈中。同时请注意，帮助对话框 Fragment\
  \ 是如何通过引用资源 ID 来创建的。这意味着你的帮助对话框 Fragment 可以用于应用程序中可用的任何帮助文本。\n\n### 对话框示例：`HelpDialogFragment`\n\
  \n你创建了一个 Fragment 事务，从提示对话框 Fragment 转到帮助对话框 Fragment，并将该 Fragment 事务放入了返回栈。这会使得提示对话框\
  \ Fragment 从视图中消失，但它仍然可以通过 Fragment 管理器和返回栈访问。新的帮助对话框 Fragment 会出现在其位置，允许用户阅读帮助文本。当用户关闭帮助对话框\
  \ Fragment 时，Fragment 返回栈的条目会被弹出，导致帮助对话框 Fragment 被关闭（从视觉上和 Fragment 管理器中移除），同时提示对话框\
  \ Fragment 恢复显示。\n\n这是实现这一切非常简单的方法。它非常简单却又非常强大；即使在显示这些对话框时用户旋转设备，它也能正常工作。\n\n查看\
  \ `HelpDialogFragment.java` 文件及其布局（`help_dialog.xml`）的源代码。此对话框 Fragment 的目的是显示帮助文本。\n\
  \n布局包含一个 `TextView` 和一个“关闭”按钮。Java 代码应该开始让你感到熟悉了。有一个 `newInstance()` 方法用于创建新的帮助对话框\
  \ Fragment，一个 `onCreate()` 方法用于设置样式和主题，以及一个 `onCreateView()` 方法用于构建视图层级。在这个特定情况下，你需要定位一个字符串资源来填充\
  \ `TextView`，因此你通过 Activity 访问资源，并选择传递给 `newInstance()` 的资源 ID。最后，`onCreateView()`\
  \ 设置一个按钮点击处理器来捕获“关闭”按钮的点击。在此例中，你不需要在关闭时执行任何特殊操作。\n\n\n\n### Dialog Fragment 调用方式\n\
  \n此片段通过两种方式被调用：从 Activity 以及从提示对话框片段调用。当此帮助对话框片段从主 Activity 显示时，关闭它只会将片段从栈顶弹出，并显示底下的主\
  \ Activity。当此帮助对话框片段从提示对话框片段显示时，由于帮助对话框片段是返回栈上片段事务的一部分，关闭它会导致片段事务被回滚，这会使帮助对话框片段弹出，但恢复提示对话框片段。用户会看到提示对话框片段重新出现。\n\
  \n### Dialog 示例：`AlertDialogFragment`\n\n在本示例应用中，我们还有最后一个对话框片段要展示：警报对话框片段。虽然你可以用类似于帮助对话框片段的方式创建警报对话框片段，但也可以使用已在多个\
  \ Android 版本中运行良好的旧版 `AlertBuilder` 框架来创建对话框片段。请查看 `AlertDialogFragment.java` 中的源代码。\n\
  \n你不需要为这个片段提供布局，因为 `AlertBuilder` 会帮你处理。请注意，此对话框片段开始时与其他片段无异，但你没有 `onCreateView()`\
  \ 回调，而是有 `onCreateDialog()` 回调。你需要实现 `onCreateView()` 或 `onCreateDialog()` 之一，但不能同时实现两者。`onCreateDialog()`\
  \ 的返回值不是视图，而是一个对话框。\n\n值得注意的是，要获取对话框的参数，你应该访问参数包（arguments bundle）。在本示例应用中，你只对警报消息这样做，但也可以通过参数包访问其他参数。\n\
  \n另请注意，对于这种类型的对话框片段，你的片段类需要实现 `DialogInterface.OnClickListener`，这意味着你的对话框片段必须实现\
  \ `onClick()` 回调。当用户对嵌入的对话框进行操作时，会触发此回调。再次强调，你会获得触发对话框的引用以及被按下的按钮指示。与之前一样，你应该小心不要依赖\
  \ `onDismiss()`，因为当设备配置发生变化时，它可能会被触发。\n\n### Dialog 示例：嵌入式对话框\n\n你可能已经注意到 `DialogFragment`\
  \ 还有一个特性。在应用的主布局中，文本下方有一个 `FrameLayout`，可用于容纳对话框。在应用的菜单中，最后一项会导致一个片段事务将 `PromptDialogFragment`\
  \ 的新实例添加到主屏幕。无需任何修改，对话框片段就可以嵌入在主布局中显示，并且其功能符合预期。\n\n此技术的一个不同之处在于，显示嵌入对话框的代码与显示弹出对话框的代码不同。嵌入对话框的代码如下所示：\n\
  \n```\nft.add(R.id.embeddedDialog, pdf, EMBED_DIALOG_TAG);\nft.commit();\n```\n\n\
  这与第 1 章中我们在 `FrameLayout` 中显示片段时的代码完全相同。然而，这次你需要确保传入一个标签名称，当对话框片段通知你的 Activity 用户输入时，会使用这个标签名称。\n\
  \n### Dialog 示例：观察结果\n\n当你运行此示例应用时，请确保在设备的不同方向下尝试所有菜单选项。在对话框片段显示时旋转设备。你应该会满意地看到对话框会随着旋转而移动；你无需担心因配置变化而编写大量代码来保存和恢复片段。\n\
  \n我们希望你欣赏的另一件事是，片段与 Activity 之间可以轻松通信。当然，Activity 拥有或可以获取对所有可用片段的引用，因此它可以访问片段本身暴露的方法。这并不是片段与\
  \ Activity 之间通信的唯一方式。你可以\n\n\n\n"
- "# 第三章：使用对话框\n\n**59**\n\n务必使用片段管理器上的 getter 方法来检索已管理片段的实例，然后适当地转换该引用，并直接在该片段上调用方法。你甚至可以在另一个片段内部执行此操作。你通过接口和\
  \ Activity 将片段相互隔离的程度，或者通过片段间通信建立依赖关系的程度，取决于你的应用程序有多复杂以及你想要实现多少复用。\n\n## 使用 Toast\n\
  \n`Toast` 就像一个迷你警报对话框，它包含一条消息，显示一定时间后会自动消失。它没有任何按钮。因此可以说它是一种短暂的警报消息。它被称为 `Toast`，是因为它像吐司面包从烤面包机中弹出一样弹出。\n\
  \n清单 3-6 展示了一个如何使用 `Toast` 显示消息的示例。\n\n**清单 3-6.** 使用 `Toast` 进行调试\n\n```java\n\
  //创建一个函数，将消息包装成 toast\n//显示 toast\n\npublic void reportToast(String message)\n{\n\
  \    String s = MainActivity.LOGTAG + \":\" + message;\n    Toast.makeText(activity,\
  \ s, Toast.LENGTH_SHORT).show();\n}\n```\n\n清单 3-6 中的 `makeText()` 方法不仅可以接受 Activity，还可以接受任何上下文对象，例如传递给广播接收器或服务的上下文对象。这扩展了\
  \ `Toast` 在 Activity 之外的使用。\n\n## 参考资料\n\n- [www.androidbook.com/androidfragments/projects](http://www.androidbook.com/androidfragments/projects)\
  \  \n  本章的测试项目。ZIP 文件名为 `AndroidFragments_ch03_Dialogs.zip`。下载内容包括 `PickerDialogFragmentDemo`\
  \ 中的日期和时间选择器对话框示例。\n\n- [`developer.android.com/guide/topics/ui/dialogs.html`](http://developer.android.com/guide/topics/ui/dialogs.html)\
  \  \n  Android SDK 文档，提供了关于使用 Android 对话框的出色介绍。你将在这里找到关于如何使用托管对话框的解释以及各种可用对话框的示例。\n\
  \n**60**\n\n**第三章：使用对话框**\n\n- [`developer.android.com/reference/android/content/DialogInterface.html`](http://developer.android.com/reference/android/content/DialogInterface.html)\
  \  \n  为对话框定义的许多常量。\n\n- [`developer.android.com/reference/android/app/AlertDialog.Builder.html`](http://developer.android.com/reference/android/app/AlertDialog.Builder.html)\
  \  \n  `AlertDialog.Builder` 类的 API 文档。\n\n- [`developer.android.com/reference/android/app/ProgressDialog.html`](http://developer.android.com/reference/android/app/ProgressDialog.html)\
  \  \n  `ProgressDialog` 的 API 文档。\n\n- [`developer.android.com/guide/topics/ui/controls/pickers.html`](http://developer.android.com/guide/topics/ui/controls/pickers.html)\
  \  \n  关于使用日期选择器和时间选择器对话框的 Android 教程。\n\n## 总结\n\n本章讨论了异步对话框以及如何使用对话框片段，包括以下主题：\n\
  \n- 什么是对话框以及为什么要使用它\n- Android 中对话框的异步特性\n- 在屏幕上显示对话框的三个步骤\n- 创建片段\n- 对话框片段创建视图层次结构的两种方法\n\
  - 片段事务如何参与显示对话框片段，以及如何获取一个对话框片段\n- 当用户在查看对话框片段时按下返回键会发生什么\n- 返回栈以及管理对话框片段\n- 当对话框片段上的按钮被点击时会发生什么，以及如何处理\n\
  - 一种从对话框片段向调用它的 Activity 进行通信的简洁方式\n- 一个对话框片段如何调用另一个对话框片段并仍然能够返回上一个对话框片段\n- `Toast`\
  \ 类以及如何将其用作简单的警报弹窗\n\n---\n\n"
- "# 第四章：使用首选项与保存状态\n\nAndroid 提供了一个健壮且灵活的框架来处理设置，也称为首选项。这里所说的设置，指的是用户为了按自己的喜好定制应用程序而做出并保存的功能选择。（在本章中，术语“设置”和“首选项”将互换使用。）例如，如果用户希望通过铃声或振动来接收通知，或者根本不接收通知，这就是用户保存的首选项；应用程序会记住该选择，直到用户更改它。Android\
  \ 提供了简单的 API，隐藏了首选项的管理和持久化。它还提供了预构建的用户界面，你可以用它们让用户进行首选项选择。由于 Android 首选项框架内置的强大功能，我们还可以将首选项用于更通用的应用程序状态存储，以便在应用程序退出后又返回时，能够从上次离开的地方继续。\n\
  \n再举一个例子，游戏的高分可以存储为首选项，尽管你可能希望使用自己的 UI 来显示它们。\n\n本章将介绍如何为你的应用程序实现自己的设置屏幕，如何与 Android\
  \ 系统设置交互，以及如何使用设置来秘密保存应用程序状态，同时还提供最佳实践指导。你将发现如何让你的设置在小屏幕以及平板电脑等较大屏幕上看起来美观。\n\n**61**\n\
  \n**第四章：使用首选项与保存状态**\n\n## 探索首选项框架\n\nAndroid 的首选项框架从单个的设置选择开始，构建到包含设置选择的屏幕层次结构。设置可以是二进制设置，例如开/关，也可以是文本输入、数值输入，或者是从选项列表中进行选择。Android\
  \ 使用一个 `PreferenceManager` 来向应用程序提供设置值。该框架负责进行和持久化更改，并在设置即将更改或已经更改时通知应用程序。虽然设置被持久化在文件中，但应用程序不直接处理这些文件。这些文件被隐藏起来，你稍后会看到它们在哪里。\n\
  \n首选项可以通过 XML 或编写代码来指定。在本章中，你将使用一个示例应用程序来演示不同类型的选项。XML 是指定首选项的首选方式，因此该应用程序就是使用 XML\
  \ 编写的。XML 指定了最底层的设置，以及如何将设置分组到类别和屏幕中。作为参考，本章的示例应用程序展示了如图 4-1 所示的以下设置。\n\n**图 4-1.**\
  \ 示例应用程序首选项 UI 中的主要设置。由于屏幕高度，此处将上半部分显示在左侧，下半部分显示在右侧。注意两幅图像之间的重叠部分。\n\n**第四章：使用首选项与保存状态**\n\
  \n**63**\n\n\n\nAndroid 提供了一个端到端的偏好设置框架。这意味着该框架允许你定义偏好设置，将其展示给用户，并将用户的选择持久化到数据存储中。你可以在`/res/xml/`目录下的\
  \ XML 文件中定义偏好设置。要向用户展示偏好设置，你需要编写一个 Activity 类，该类继承自一个预定义的 Android 类`android.preference.PreferenceActivity`，并使用\
  \ Fragment 来处理偏好设置的各个屏幕。框架会处理其余的工作（显示和持久化）。在你的应用程序中，代码会获取特定偏好设置的引用。通过偏好设置引用，你可以获取该偏好设置的当前值。\n\
  \n为了使偏好设置能够在用户会话之间保存，当前值必须存储在某处。Android 框架负责将偏好设置持久化到设备上应用程序`/data/data`目录下的一个 XML\
  \ 文件中（见图 4-2）。\n\n**图 4-2.** 应用程序已保存偏好设置的路径  \n**注意** 你只能在模拟器中检查共享偏好设置文件。在真实设备上，由于\
  \ Android 的安全机制，共享偏好设置文件是无法读取的（当然，除非你拥有 root 权限）。\n\n应用程序的默认偏好设置文件路径是`/data/data/[PACKAGE_NAME]/shared_prefs/[PACKAGE_NAME]_preferences.xml`，其中`[PACKAGE_NAME]`是应用程序的包名。清单\
  \ 4-1 展示了本例中`com.androidbook.preferences.main_preferences.xml`数据文件的内容。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**64**\n\n**第 4 章：使用偏好设置与保存状态**\n\n*清单 4-1. 我们的示例中已保存的偏好设置*\n\n```xml\n<?xml version='1.0'\
  \ encoding='utf-8' standalone='yes' ?>\n<map>\n<boolean name=\"notification_switch\"\
  \ value=\"true\" />\n<string name=\"package_name_preference\">com.androidbook.win</string>\n\
  <boolean name=\"potato_selection_pref\" value=\"true\" />\n<boolean name=\"show_airline_column_pref\"\
  \ value=\"true\" />\n<string name=\"flight_sort_option\">2</string>\n<boolean name=\"\
  alert_email\" value=\"false\" />\n<set name=\"pizza_toppings\">\n<string>pepperoni</string>\n\
  <string>cheese</string>\n<string>olive</string>\n</set>\n<string name=\"alert_email_address\"\
  >davemac327@gmail.com</string>\n</map>\n```\n\n如你所见，这些值存储在一个映射（map）中，偏好设置的键作为数据的名称。有些值看起来晦涩难懂，与展示给用户的内容并不匹配。例如，`flight_sort_option`的值是`2`。Android\
  \ 并不存储展示给用户的文本作为偏好设置的值；相反，它存储一个用户看不到的值，你可以独立于用户所见内容来使用它。你希望能够根据用户的语言自由更改显示的文本，同时也希望能够在保持偏好设置文件中存储值不变的情况下调整显示的文本。如果该值是一个整数而不是某个显示字符串，你甚至可以对偏好设置进行更简单的处理。你无需担心解析此数据文件。Android\
  \ 偏好设置框架提供了一个优秀的 API 来处理偏好设置，本章后面将对此进行更详细的描述。\n\n如果你将清单 4-1 中的偏好设置映射与图 4-1 中的截图进行比较，你会注意到并非所有偏好设置都在偏好设置\
  \ XML 数据文件中列出了值。这是因为偏好设置数据文件不会自动为你存储默认值。稍后你将了解如何处理默认值。\n\n现在你已经了解了这些值保存在哪里，接下来需要了解如何定义要展示给用户的屏幕，以便他们进行选择。\n\
  \n在了解如何将偏好设置收集到屏幕中之前，你将学习可以使用的不同类型的偏好设置，然后你将了解如何将它们组合到屏幕中。`/data/data` XML 文件中的每个持久化值都来自一个特定的偏好设置。所以，让我们理解每一项的含义。\n\
  \n\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](img/00015.png)\n\n"
- "# 第 4 章：管理偏好设置与保存状态\n\n## 理解 `CheckBoxPreference` 和 `SwitchPreference`\n\n最简单的偏好设置是\
  \ `CheckBoxPreference` 和 `SwitchPreference`。它们共享同一个父类（`TwoStatePreference`），状态要么是开启（值为\
  \ `true`），要么是关闭（值为 `false`）。在示例应用中，我们创建了一个包含五个 `CheckBoxPreference` 的屏幕，如图 4-3 所示。\n\
  \n清单 4-2 展示了 `CheckBoxPreference` 的 XML 代码。\n\n**图 4-3.** 复选框偏好设置的用户界面\n\n**清单 4-2.**\
  \ 使用 `CheckBoxPreference`\n\n```xml\n<CheckBoxPreference\nandroid:key=\"show_airline_column_pref\"\
  \nandroid:title=\"Airline\"\nandroid:summary=\"Show Airline column\" />\n```\n\n\
  **注意** 我们将在本章末尾提供一个 URL，您可以通过它下载本章的项目文件。这样您就可以直接将项目导入 IDE 中。主要的示例应用名为 `PrefDemo`。在阅读“保存状态”部分之前，请参考该项目。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n此示例展示了定义偏好设置所需的最少内容。`key`\
  \ 是偏好设置的引用名称，`title` 是偏好设置显示的标题，`summary` 是对偏好设置用途或当前状态的描述。回顾清单 4-1 中保存的值，您会看到 `\"\
  show_airline_column_pref\"`（即 `key`）对应的 `<boolean>` 标签，其属性值为 `true`，表示该偏好设置已被勾选。\n\
  \n对于 `CheckBoxPreference`，当用户设定状态后，偏好设置的状态会立即保存。换句话说，当用户勾选或取消勾选偏好控制项时，其状态会立刻保存。\n\
  \n`SwitchPreference` 与之非常相似，只是视觉显示不同。用户界面中不再是复选框，而是显示一个开关（如图 4-1 中“通知”旁边的开关）。\n\n\
  `CheckBoxPreference` 和 `SwitchPreference` 另一个有用的功能是：您可以根据偏好是否被勾选，设置不同的摘要文本。对应的 XML\
  \ 属性是 `summaryOn` 和 `summaryOff`。如果您查看 `main.xml` 文件中名为 `\"potato_selection_pref\"\
  ` 的 `CheckBoxPreference`，会看到一个示例。\n\n在学习其他偏好类型之前，现在正是理解如何访问该偏好设置以读取其值并执行其他操作的好时机。\n\
  \n## 在代码中访问偏好设置的值\n\n既然您已经定义了偏好设置，就需要知道如何在代码中访问它以便读取其值。清单 4-3 展示了访问 Android 中存储偏好设置的\
  \ `SharedPreferences` 对象的代码。这段代码来自 `MainActivity.java` 文件的 `setOptionText()` 方法。\n\
  \n**清单 4-3.** 访问 `CheckBoxPreference`\n\n```java\nSharedPreferences prefs =\nPreferenceManager.getDefaultSharedPreferences(this);\n\
  // 这是获取共享偏好设置的另一种方式：\n// SharedPreferences prefs = getSharedPreferences(\n// \"\
  com.androidbook.preferences.main_preferences\", 0);\nboolean showAirline = prefs.getBoolean(\"\
  show_airline_column_pref\", false);\n```\n\n通过偏好设置的引用，可以轻松读取 `show_airline_column_pref`\
  \ 偏好设置的当前值。如清单 4-3 所示，有两种方式可以获取偏好设置。第一种方式显示的是获取当前上下文的默认偏好设置，这里的上下文是应用中 `MainActivity`\
  \ 的上下文。第二种方式（注释部分）通过包名来检索偏好设置。\n\n\n```markdown\n\n您可以使用任何您想要的包名，以便在不同文件中存储不同的偏好设置。\n\
  \n获取偏好设置引用后，使用偏好键和默认值调用相应的 getter 方法。由于`show_airline_column_pref`是一个`TwoStatePreference`，返回的值为布尔类型。`show_airline_column_pref`的默认值在此处硬编码为`false`。如果此偏好从未被设置过，则硬编码值（`false`）将被赋值给`showAirline`。然而，这本身并不会将偏好持久化为`false`以供将来使用，也不会遵循可能已在偏好设置的\
  \ XML 规范中设置的任何默认值。\n\n如果 XML 规范使用资源值来指定默认值，则可以在代码中引用同一资源来设置默认值，如下所示，用于另一个不同的偏好设置：\n\
  \n```java\nString flight_option = prefs.getString(\n    resources.getString(R.string.flight_sort_option),\n\
  \    resources.getString(R.string.flight_sort_option_default_value));\n```\n\n请注意，此处的偏好键也使用了字符串资源值（`R.string.flight_sort_option`）。这是一个明智的选择，因为它降低了拼写错误的可能性。如果资源名称输入错误，您很可能会遇到构建错误。而如果您只使用简单的字符串，则拼写错误可能会被忽略，最终导致偏好设置无法正常工作。\n\
  \n我们展示了一种在代码中读取偏好默认值的方法。\n\nAndroid 还提供了另一种更优雅的方式。在`onCreate()`中，您可以改为执行以下操作：\n\n\
  ```java\nPreferenceManager.setDefaultValues(this, R.xml.main, false);\n```\n\n然后，在`setOptionText()`中，您可以像这样读取选项值：\n\
  \n```java\nString option = prefs.getString(\n    resources.getString(R.string.flight_sort_option),\
  \ null);\n```\n\n第一次调用将使用`main.xml`查找默认值，并使用这些默认值为我们生成偏好设置 XML 数据文件。如果内存中已存在`SharedPreferences`对象的实例，它也会更新该实例。第二次调用将为`flight_sort_option`找到一个值，因为我们已提前加载了默认值。\n\
  \n首次运行此代码后，如果您查看`shared_prefs`文件夹，即使偏好设置屏幕尚未被调用，您也会看到偏好设置 XML 文件。您还会看到另一个名为`_has_set_default_values.xml`的文件。此文件告诉您的应用程序，偏好设置\
  \ XML 文件已使用默认值创建。`setDefaultValues()`的第三个参数（即`false`）表示只有当偏好设置 XML 文件先前未设置过默认值时，您才希望在其中设置默认值。Android\
  \ 通过这个新 XML 文件的存在来记住这一信息。\n\n然而，即使您升级应用程序并添加具有新默认值的新设置，Android 也会记住之前的状态，这意味着此技巧不会设置这些新默认值。您的最佳选择是始终为默认值使用资源，并在获取偏好的当前值时始终将该资源作为默认值提供。\n\
  \n### 理解 ListPreference\n\n`ListPreference`为每个选项包含一个单选按钮，并且默认（或当前）选项会被预选。用户只能选择其中一个选项。当用户选择一个选项时，对话框会立即关闭，并且选择结果会保存到偏好设置\
  \ XML 文件中。\n\n图 4-4 展示了其外观。\n\n***图 4-4.** ListPreference 的用户界面*\n\n*列表 4-4. 在 XML\
  \ 中指定 ListPreference*\n\n```xml\n<ListPreference\n    android:key=\"@string/flight_sort_option\"\
  \n    android:title=\"@string/listTitle\"\n    android:summary=\"@string/listSummary\"\
  \ />\n```\n\n```\n\n\n`android:entries=\"@array/flight_sort_options\"`\n\n`android:entryValues=\"\
  @array/flight_sort_options_values\"`\n\n`android:dialogTitle=\"@string/dialogTitle\"\
  `\n\n`android:defaultValue=\"@string/flight_sort_option_default_value\" />` 清单 4-4\
  \ 包含了一个代表航班选项偏好设置的 XML 片段。这次，文件中引用了字符串和数组，这样做比硬编码字符串更常见。如前所述，存储在 `/data/data/{package}`\
  \ 目录下的 XML 数据文件中的列表偏好值，与用户在用户界面中看到的内容并不相同。键的名称与用户看不到的隐藏值一同存储在数据文件中。因此，要让 `ListPreference`\
  \ 生效，需要两个数组：一个用于向用户显示的值，另一个用作键值的字符串。\n\n这里很容易出错。`entries` 数组保存着向用户显示的字符串，而 `entryValues`\
  \ 数组保存着将存储在偏好设置 XML 数据文件中的字符串。\n\n这两个数组的元素按位置一一对应。\n\n也就是说，`entryValues` 数组中的第三个元素对应\
  \ `entries` 数组中的第三个元素。人们很容易想用 0、1、2 等作为 `entryValues`，但这并非必需，并且当之后需要修改数组时可能会引发问题。如果我们的选项本质上是数字（例如倒计时器的起始值），那么我们可以使用诸如\
  \ 60、120、300 等值。这些值完全不需要是数字，只要对开发者有意义即可；用户不会看到这些值，除非你选择将其暴露出来。用户只能看到第一个字符串数组 `flight_sort_options`\
  \ 中的文本。本章的示例应用展示了这两种方式。\n\n这里有一个提醒：由于偏好设置 XML 数据文件只存储值而不存储文本，当你升级应用并更改选项文本或向字符串数组添加项目时，偏好设置\
  \ XML 数据文件中存储的任何值在升级后仍应与相应的文本对齐。偏好设置 XML 数据文件在应用升级期间会被保留。如果偏好设置 XML 数据文件中存储的是“1”，并且在升级前它代表“经停次数”，那么在升级后它仍应代表“经停次数”。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**70**\n\n**第 4 章：使用偏好设置与保存状态**\n\
  \n由于最终用户看不到 `entryValues` 数组，最佳实践是在你的应用中只存储一次。因此，请创建且仅创建一个 `/res/values/prefvaluearrays.xml`\
  \ 文件来包含这些数组。\n\n而 `entries` 数组很可能会在每个应用程序中为不同语言或不同设备配置创建多次。因此，请为你需要的每种变体创建单独的 `prefdisplayarrays.xml`\
  \ 文件。\n\n例如，如果你的应用将提供英文和法文版本，那么就需要分别为英文和法文创建单独的 `prefdisplayarrays.xml` 文件。你不希望将\
  \ `entryValues` 数组包含在这些其他文件中。\n\n但至关重要的是，`entryValues` 和 `entries` 数组中的数组元素数量必须相同。元素之间必须对应整齐。在做出更改时，请务必保持一切对齐。清单\
  \ 4-5 包含了示例中 `ListPreference` 文件的源代码。\n\n*清单 4-5. 示例中的其他 ListPreference 文件*\n\n\
  ```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<resources>\n    <string-array\
  \ name=\"flight_sort_options_values\">\n        <item>0</item>\n        <item>1</item>\n\
  \        <item>2</item>\n    </string-array>\n    <string-array name=\"pizza_toppings_values\"\
  >\n        <item>cheese</item>\n        <item>pepperoni</item>\n        <item>onion</item>\n\
  \        <item>mushroom</item>\n        <item>olive</item>\n        <item>ham</item>\n\
  \        <item>pineapple</item>\n    </string-array>\n    <string-array name=\"\
  default_pizza_toppings\">\n        <item>cheese</item>\n        <item>pepperoni</item>\n\
  \    </string-array>\n</resources>\n```\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
  utf-8\"?>\n<resources>\n    <string-array name=\"flight_sort_options\">\n      \
  \  <item>总成本</item>\n        <item>经停次数</item>\n        <item>航空公司</item>\n    </string-array>\n\
  \    <string-array name=\"pizza_toppings\">\n        <item>芝士</item>\n        <item>意式腊肠</item>\n\
  \        <item>洋葱</item>\n        <item>波托贝洛蘑菇</item>\n        <item>黑橄榄</item>\n\
  \        <item>烟熏火腿</item>\n        <item>菠萝</item>\n    </string-array>\n</resources>\n\
  ```\n\n另外，别忘了你在 XML 源文件中指定的默认值必须与 `prefvaluearrays.xml` 数组中的一个 `entryValue` 相匹配。\n\
  \n对于 `ListPreference`，偏好设置的值是一个 `String`。如果你使用数字字符串（例如 0、1、1138）作为 `entryValues`，你可以在代码中将其转换为整数或你需要的任何类型，就像在\
  \ `flight_sort_options_values` 数组中所做的那样。\n\n你的代码很可能想要显示偏好设置 `entries` 数组中用户友好的文本。本例采取了一种捷径，因为数组索引被用作\
  \ `flight_sort_options_values` 中的元素。只需将值转换为 int，你就知道该从 `flight_sort_options` 中读取哪个字符串。如果你在\
  \ `flight_sort_options_values` 中使用了其他一些值集合，那么你需要确定作为偏好设置的元素的索引，然后反过来使用该索引从 `flight_sort_options`\
  \ 中获取偏好设置的文本。`ListPreference` 的辅助方法 `findIndexOfValue()` 可以帮助解决这个问题，它提供值数组中的索引，这样你就可以轻松地从\
  \ `entries` 数组中获取对应的显示文本。\n\n现在回到清单 4-4，有几个用于标题、摘要等的字符串。名为 `flight_sort_option_default_value`\
  \ 的字符串将默认值设置为 1，在示例中代表“经停次数”。通常最好为每个选项选择一个默认值。如果你没有选择默认值，并且尚未选择任何值，那么返回选项值的方法将返回\
  \ `null`。在这种情况下，你的代码必须处理 `null` 值。\n\n### 理解 EditTextPreference\n\n偏好设置框架还提供了一种自由格式的文本偏好设置，称为\
  \ `EditTextPreference`。此偏好设置允许你捕获原始文本，而不是让用户进行选择。为了演示这一点，假设你有一个为用户生成 Java 代码的应用程序。该应用程序的一个偏好设置可能是为生成的类使用的默认包名。在这里，你想向用户显示一个文本字段来设置生成类的包名。图\
  \ 4-5 显示了用户界面，清单 4-6 显示了 XML。\n\n**图 4-5. 使用 EditTextPreference**\n\n*清单 4-6. EditTextPreference\
  \ 示例*\n\n```xml\n<EditTextPreference\n    android:key=\"package_name_preference\"\
  \n    android:title=\"设置包名\"\n    android:summary=\"为生成的代码设置包名\"\n    android:dialogTitle=\"\
  包名\" />\n```\n\n当选择“设置包名”时，用户会看到一个用于输入包名的对话框。当点击“确定”按钮时，该偏好设置将被保存到偏好存储中。\n\n与其他偏好设置类似，你可以通过调用相应的\
  \ getter 方法来获取偏好设置的值，在本例中是 `getString()`。\n\n### 理解 MultiSelectListPreference\n\n\
  \n\n最后，Android 3.0 引入了一个名为 `MultiSelectListPreference` 的首选项。其概念与 `ListPreference`\
  \ 有些相似，但用户不仅可以选中列表中的一项，还可以选择多项或一项都不选。在代码清单 4-1 中，`MultiSelectListPreference` 在首选项\
  \ XML 数据文件中存储了一个 `<set name=\"pizza_toppings\">` 标签，而不是单一的值。与 `MultiSelectListPreference`\
  \ 的另一个显著区别是，其默认值是一个数组，就像 `entryValues` 数组一样。也就是说，该默认值数组必须包含来自该首选项 `entryValues`\
  \ 数组中的零个或多个元素。在本章的示例应用程序中也可以看到这一点；只需查看 `/res/xml` 目录下 `main.xml` 文件的末尾部分即可。\n\n\
  要获取 `MultiSelectListPreference` 的当前值，可以使用 `SharedPreferences` 的 `getStringSet()`\
  \ 方法。要从 `entries` 数组中检索显示字符串，你需要遍历作为此首选项值的字符串集合，确定字符串的索引，然后使用该索引从 `entries` 数组中访问正确的显示字符串。\n\
  \n## 更新 AndroidManifest.xml\n\n由于示例应用程序中有两个 Activity，我们需要在 `AndroidManifest.xml`\
  \ 中添加两个 `<activity>` 标签。第一个是类别为 `LAUNCHER` 的标准 Activity。第二个用于 `PreferenceActivity`，因此根据\
  \ Intent 的惯例设置 action 名称，并将类别设置为 `PREFERENCE`，如代码清单 4-7 所示。你可能不希望 `PreferenceActivity`\
  \ 与我们的其他应用程序一起出现在 Android 页面上，这就是为什么你不为其使用 `LAUNCHER`。如果你要添加其他首选项 Activity，则需要 `AndroidManifest.xml`\
  \ 做类似的修改。\n\n*代码清单 4-7.* `PreferenceActivity` *在* `AndroidManifest.xml` *中的条目*\n\
  \n```\n<activity android:name=\".MainPreferenceActivity\"\n          android:label=\"\
  @string/prefTitle\">\n    <intent-filter>\n        <action android:name=\n     \
  \       \"com.androidbook.preferences.main.intent.action.MainPreferences\" />\n\
  \        <category\n            android:name=\"android.intent.category.PREFERENCE\"\
  \ />\n    </intent-filter>\n</activity>\n```\n\n## 使用 PreferenceCategory\n\n首选项框架支持你将首选项组织成类别。例如，如果你有很多首选项，可以使用\
  \ `PreferenceCategory`，它将首选项分组在一个分隔标签之下。图 4-6 展示了可能的效果。请注意名为“肉”和“蔬菜”的分隔符。你可以在 `/res/xml/main.xml`\
  \ 中找到这些规格说明。\n\n![图 4-6](img/00029.png)\n\n**图 4-6.** 使用 `PreferenceCategory` 组织首选项\n\
  \n## 创建具有依赖关系的子首选项\n\n组织首选项的另一种方法是使用首选项依赖关系。这会在首选项之间建立父子关系。例如，你可能有一个开启警报的首选项；如果警报开启，可能会有几个其他与警报相关的首选项可供选择。如果主警报首选项关闭，则其他首选项不相关，应被禁用。代码清单\
  \ 4-8 展示了 XML，图 4-7 展示了其效果。\n\n*代码清单 4-8.* XML 中的首选项依赖关系\n\n```\n<PreferenceScreen>\n\
  \    <PreferenceCategory\n        android:title=\"警报\">\n        <CheckBoxPreference\n\
  \            android:key=\"alert_email\"\n            android:title=\"发送邮件？\" />\n\
  \        <EditTextPreference\n            android:key=\"alert_email_address\"\n\
  \            android:layout=\"?android:attr/preferenceLayoutChild\"\n          \
  \  android:title=\"电子邮箱地址\"\n            android:dependency=\"alert_email\" />\n\
  \    </PreferenceCategory>\n</PreferenceScreen>\n```\n\n![图 4-7](img/00006.jpeg)\n\
  \n**图 4-7.** 首选项依赖关系\n\n## 带标题的首选项\n\nAndroid 3.0 引入了一种组织首选项的新方式。你可以在平板电脑的主设置应用程序中看到这一点。由于平板电脑的屏幕空间比智能手机大得多，因此同时显示更多首选项信息是有意义的。为此，你需要使用首选项标题。请看图\
  \ 4-8。\n\n![图 4-8](img/00004.jpeg)\n\n**图 4-8.** 带首选项标题的主设置页面\n\n注意标题显示在左侧，像一个垂直的选项卡栏。当你点击左侧的每个项目时，右侧屏幕会显示该项目对应的首选项。在图\
  \ 4-8 中，选择了“声音”，右侧显示声音首选项。右侧是一个 `PreferenceScreen` 对象，这种设置使用了 Fragment。显然，我们需要做一些与本章迄今讨论的不同的操作。\n\
  \n从 Android 3.0 开始的一个重大变化是向 `PreferenceActivity` 添加了标题。这也意味着要在 `PreferenceActivity`\
  \ 中使用新的回调方法来设置标题。现在，当你扩展 `PreferenceActivity` 时，需要实现这个方法：\n\n```\npublic void onBuildHeaders(List<Header>\
  \ target) {\n    loadHeadersFromResource(R.xml.preferences, target);\n}\n```\n\n\
  完整的源代码请参考 `PrefDemo` 示例应用程序。`preferences.xml` 文件包含一些如下所示的新标签：\n\n```\n<preference-headers>\n\
  \    <header android:fragment=\"com.example.PrefActivity$Prefs1Fragment\"\n    \
  \        android:icon=\"@drawable/ic_settings_sound\"\n            android:title=\"\
  声音\"\n            android:summary=\"你的声音首选项\" />\n    ...\n```\n\n每个 header 标签指向一个扩展了\
  \ `PreferenceFragment` 的类。在上面给出的例子中，XML 指定了图标、标题和摘要文本（充当副标题）。`Prefs1Fragment` 是\
  \ `PreferenceActivity` 的一个内部类，可能看起来像这样：\n\n```\npublic static class Prefs1Fragment\
  \ extends PreferenceFragment {\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        addPreferencesFromResource(R.xml.sound_preferences);\n\
  \    }\n}\n```\n\n这个内部类只需要像所示那样引入相应的首选项 XML 文件。该首选项 XML 文件包含了我们之前介绍过的首选项规范类型，例如\
  \ `ListPreference`、`CheckBoxPreference`、`PreferenceCategory` 等。非常好的一点是，当屏幕配置发生变化，或者首选项显示在小屏幕上时，Android\
  \ 会自动处理正确的情况。当屏幕太小，无法同时显示标题和右侧的首选项屏幕时，标题的行为就像旧式的首选项一样。也就是说，你只能看到标题；点击某个标题后，你才会看到对应的首选项屏幕。\n\
  \n## PreferenceScreen\n\n首选项的顶级容器是 `PreferenceScreen`。在平板电脑和 `PreferenceFragment`\
  \ 出现之前，你可以嵌套 `PreferenceScreen`，当用户点击一个嵌套的 `PreferenceScreen` 项目时，新的 `PreferenceScreen`\
  \ 会替换当前显示的 `PreferenceScreen`。这在小屏幕上效果很好，但在平板电脑上看起来就不太理想了，特别是当你开始时使用了标题和 Fragment。你可能希望新的\
  \ `PreferenceScreen` 出现在当前 Fragment 所在的位置。\n\n要使 `PreferenceScreen` 在 Fragment 内部工作，你只需为该\
  \ `PreferenceScreen` 指定一个 Fragment 类名即可。代码清单 4-9 展示了示例应用程序中的 XML。\n\n*代码清单 4-9.*\
  \ 通过 `PreferenceFragment` 调用的 `PreferenceScreen`\n\n```\n<PreferenceScreen\n   \
  \ android:title=\"启动一个新的屏幕到 fragment 中\"\n\n\n```markdown\n\n`android:fragment=\"\
  com.androidbook.preferences.main.BasicFrag\" />`当用户点击此项时，当前片段将被替换为`BasicFrag`，然后`BasicFrag`会加载一个新的\
  \ XML 布局，用于定义`PreferenceScreen`（如`nested_screen_basicfrag.xml`中所指定）。在本例中，我们选择不将`BasicFrag`类作为`MainPreferenceActivity`类的内部类，主要原因是不需要从外部类共享内容，同时也向您展示，如果您愿意，可以这样实现。\n\
  \n## 动态偏好设置摘要文本\n\n您可能见过这样的偏好设置：其摘要中包含了当前值。实际上，这比您想象的要稍微难实现一些。要实现这一功能，您需要创建一个监听器回调，用于检测偏好值即将发生变化，然后相应地更新偏好设置摘要。第一步是让您的`PreferenceFragment`实现`OnPreferenceChangeListener`接口。接着，您需要实现`onPreferenceChange()`回调。\n\
  \n清单 4-10 展示了一个示例。回调中的`pkgPref`对象之前在`onCreate()`方法中已被设置为对应的偏好设置。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**78**\n\n**第 4 章：使用偏好设置与保存状态**\n\n*清单 4-10. 设置偏好监听器*\n\n```\npublic boolean onPreferenceChange(Preference\
  \ preference,\nObject newValue) {\nfinal String key = preference.getKey();\nif (\"\
  package_name_preference\".equals(key)) {\npkgPref.setSummary(newValue.toString());\n\
  }\n...\nreturn true;\n}\n```\n\n您必须在`onResume()`中通过为每个需要监听的偏好设置调用`setOnPreferenceChangeListener(this)`来将片段注册为监听器，并在`onPause()`中再次调用它并传入`null`来取消注册。现在，每当您已注册的偏好设置发生待处理的变化时，此回调将被触发，并传入该偏好设置和潜在的新的值。回调返回一个布尔值，指示是否继续将偏好设置更新为新值（`true`）或不更新（`false`）。假设您将返回`true`以允许新的设置，此时您也可以更新摘要值。您还可以验证新值并拒绝更改。例如，您可能希望`MultiSelectListPreference`具有最大勾选项数量。您可以在回调中统计已选中的项目，若数量过多则拒绝更改。\n\
  \n## 使用偏好设置保存状态\n\n偏好设置非常适合让用户按自己的喜好定制应用程序，但我们也可以利用 Android 偏好设置框架来做更多事情。当您的应用程序需要在多次调用之间跟踪某些数据时，即使这些数据在偏好设置屏幕中不可见，偏好设置也是一种完成任务的方法。请查找名为`SavingStateDemo`的示例应用程序，以跟随完整的源代码进行学习。\n\
  \n`Activity`类有一个`getPreferences(int mode)`方法。实际上，该方法会以活动类名作为标签，并传入模式，来调用`getSharedPreferences()`。结果会得到一个特定于活动的共享偏好设置文件，您可以使用它在多次调用之间存储关于该活动的数据。清单\
  \ 4-11 展示了如何使用它的一个简单示例。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n\
  **第 4 章：使用偏好设置与保存状态** **79**\n\n*清单 4-11. 使用偏好设置为活动保存状态*\n\n```\nfinal String INITIALIZED\
  \ = \"initialized\";\nprivate String someString;\n[ ... ]\nSharedPreferences myPrefs\
  \ = getPreferences(MODE_PRIVATE);\nboolean hasPreferences = myPrefs.getBoolean(INITIALIZED,\
  \ false);\nif(hasPreferences) {\nLog.v(\"Preferences\", \"We've been called before\"\
  );\n// Read other values as desired from preferences file...\nsomeString = myPrefs.getString(\"\
  someString\", \"\");\n}\nelse {\nLog.v(\"Preferences\", \"First time ever being\
  \ called\");\n// Set up initial values for what will end up\n// in the preferences\
  \ file\nsomeString = \"some default value\";\n}\n[ ... ]\n// Later when ready to\
  \ write out values\n```\n\n```\n\n\n`Editor editor = myPrefs.edit();`\n\n`editor.putBoolean(INITIALIZED,\
  \ true);`\n\n`editor.putString(\"someString\", someString);`\n\n`// 根据需要写入其他值`\n\
  \n`editor.commit();`\n\n这段代码的作用是获取我们 Activity 类的偏好引用，并检查一个名为 `initialized` 的布尔型“偏好”是否存在。我们用双引号括起“偏好”，因为这个值用户不会看到或设置；它只是我们希望存储在共享偏好文件中以备下次使用的值。如果获取到了这个值，说明共享偏好文件已存在，那么该应用之前一定被调用过。你可以接着从共享偏好文件中读取其他值。例如，`someString`\
  \ 可能是一个 Activity 变量，其值应当从上一次 Activity 运行时设置，或者如果是首次运行，则设置为默认值。\n\n要向共享偏好文件写入值，首先必须获取一个偏好\
  \ `Editor`。然后，你可以将值放入偏好中，并在完成后提交这些更改。请注意，在后台，Android 管理着一个真正共享的 `SharedPreferences`\
  \ 对象。理想情况下，同一时间不应有多个活动的 `Editor`。但调用 `commit()` 方法非常重要，这样才能更新 `SharedPreferences`\
  \ 对象和共享偏好 XML 文件。在示例中，`someString` 的值被写入，以供下次此 Activity 运行时使用。\n\n你可以随时访问、写入和提交偏好文件中的值。可能的用途包括记录游戏的高分，或记录应用上次运行的时间。你还可以使用不同名称调用\
  \ `getSharedPreferences()` 来管理多组独立的偏好，所有这些操作都可以在同一个应用甚至同一个 Activity 中完成。\n\n到目前为止，我们的示例中都使用了\
  \ `MODE_PRIVATE` 作为模式。由于共享偏好文件始终存储在你的应用的 `/data/data/{package}` 目录下，其他应用无法访问，因此你只需要使用\
  \ `MODE_PRIVATE`。\n\n## 使用 DialogPreference\n\n到目前为止，你已经了解了如何使用偏好框架的现成功能，但如果你想要创建一个自定义偏好呢？如果你想要类似“屏幕设置”下“亮度”偏好的滑块功能呢？这时就需要用上\
  \ `DialogPreference`了。`DialogPreference` 是 `EditTextPreference` 和 `ListPreference`\
  \ 的父类。其行为是弹出一个对话框，向用户显示选项，并通过按钮或返回键关闭。但你可以扩展 `DialogPreference` 来设置自己的自定义偏好。在你扩展的类中，你可以提供自己的布局、自己的点击处理器，并在\
  \ `onDialogClosed()` 中编写自定义代码，将偏好数据写入共享偏好文件。\n\n## 参考资料\n\n以下是一些你可能希望进一步探索的主题的有用参考资料：\n\
  \n- [`developer.android.com/design/patterns/settings.html`](http://developer.android.com/design/patterns/settings.html)：Android\
  \ 的“设置”设计指南。包含关于设置屏幕和选项布局的一些建议。\n- [`developer.android.com/guide/topics/ui/settings.html`](http://developer.android.com/guide/topics/ui/settings.html)：Android\
  \ 的“设置”API 指南。本页描述了“设置”框架。\n- [`developer.android.com/reference/android/provider/Settings.html`](http://developer.android.com/reference/android/provider/Settings.html)：参考页面，列出了调用系统设置活动所需的设置常量。\n\
  - [www.androidbook.com/androidfragments/projects](http://www.androidbook.com/androidfragments/projects)：与本书相关的可下载项目列表。对于本章，请查找文件\
  \ `AndroidFragments_Ch04_Preferences.zip`。此 ZIP 文件包含本章的所有项目，分别列在独立的根目录中。还有一个 `README.TXT`\
  \ 文件，描述了如何从这些 ZIP 文件之一将项目导入你的 IDE。\n\n## 总结\n\n本章讨论了在 Android 中管理偏好：\n\n- 可用的偏好类型\n\
  - 将偏好的当前值读取到你的应用中\n- 通过嵌入式代码设置默认值，以及通过将 XML 文件中的默认值写入已保存的偏好文件\n- 将偏好组织成组，并定义偏好之间的依赖关系\n\
  - 用于验证更改和设置动态摘要文本的偏好的回调\n- 使用偏好框架在多次调用之间保存和恢复 Activity 的信息\n- 创建自定义偏好\n\n## 章节\n\
  \n为旧设备使用兼容库\n\n自从几年前首次推出以来，Android 平台经历了一场令人瞩目的演变。虽然其初衷始终是让 Android 为各种不同类型的设备提供动力，但它并非从一开始就为实现这一目标而架构设计的。相反，谷歌工程师添加、移除和更改了\
  \ API，以提供新功能。其中最大的变化之一是为了处理平板电脑和电视等更大的屏幕尺寸而引入了 Fragment。但还有其他的变化，例如 `ActionBar`\
  \ 和菜单。\n\n新的 API 给开发者带来了一个难题，他们希望自己的应用既能在拥有新 API 的新设备上运行，也能在没有这些 API 的旧设备上运行。许多旧设备无法获得\
  \ Android 系统升级。即使谷歌将新的 API 添加到旧版 Android 系统的修订版本中，旧设备也无法获得那个新修订版本，因为这需要设备制造商和蜂窝网络运营商进行测试和支持。谷歌提出的解决方案是创建可以链接到应用中的兼容库，这样应用就可以利用新的\
  \ API 功能，同时仍然能在较旧版本的 Android 上运行。该库会找出如何使用旧版 API 来实现新功能。如果同一个应用在已经拥有这些新功能的较新版本 Android\
  \ 上运行，兼容库则会调用该新版本 Android 中存在的底层 API。\n\n本章将深入探讨兼容库，并解释如何使用它们以及需要注意什么。如果你不是在为旧版本的\
  \ Android 开发应用，可以安全地跳过本章，因为你不需要这些库。只有当你想在将运行于不具备新 API 的旧版本 Android 上的应用中包含新 API\
  \ 功能时，这些库才有用。\n\n## 一切始于平板电脑\n\nAndroid 操作系统在支持平板电脑之前一直运行良好。应用的基本构建模块是 Activity，旨在为用户执行单一任务并填满设备的屏幕。\n\
  \n\n# 为旧设备使用兼容库\n\n但平板电脑提供了更大的屏幕空间，让用户可以在一个屏幕上同时查看并操作多项内容。因此，谷歌在 Honeycomb（`Android\
  \ 3.0`）中引入了片段（fragments）。这是一个全新的概念，它改变了开发者创建用户界面及其背后逻辑的方式。这本是件好事，但当时市面上仍有大量不支持片段的安卓设备（例如智能手机）。谷歌的解决方案是编写一个兼容库，利用旧版安卓中已有的\
  \ API，为 `Fragment` 等提供功能相似的实现。只要应用链接了该兼容库，即使旧版安卓系统本身不支持片段，应用也能使用片段功能。\n\n随后，谷歌工程师们研究了新版安卓中的其他特性与\
  \ API，并为兼容库提供了相应的特性和 API，使得这些功能无需发布旧版安卓的更新也能在旧版本上使用。除了对 `Fragments` 的支持，兼容库还提供了对\
  \ `Loaders`、`RenderScript`、`ActionBar` 等的支持。\n\n兼容库并不总能保证新旧版本之间的体验完全一致。例如，新的 `Activity`\
  \ 类本身就感知片段的存在。要使用兼容库，你必须继承 `FragmentActivity` 类而非 `Activity`；正是 `FragmentActivity`\
  \ 类负责在旧版安卓中处理片段。\n\n当你使用兼容库时，无论应用将运行在哪个安卓版本上，你都应该使用兼容库提供的类。换句话说，你的应用中只会使用 `FragmentActivity`，而它会在所有安卓版本（包括\
  \ `Android 3.0` 及更高版本）上正确工作。你不应该尝试在同一个应用中同时包含用于 `Android 3.0+` 的 `Activity` 和用于低于\
  \ `3.0` 版本的 `FragmentActivity`。当 `FragmentActivity` 在 `Android 3.0` 及以上版本运行时，它几乎可以直接调用底层的\
  \ `Activity` 类。因此，在新版安卓上使用兼容库并不会带来实质性的性能损失。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 5 章：为旧设备使用兼容库** **85**\n\n## 将库添加到项目\n\n在撰写本文时，共有四个兼容库；它们统称为 Android Support\
  \ Library（修订版 21）：\n\n- **v4** — 包含 `FragmentActivity`、`Fragment`、`Loader` 以及许多在\
  \ `Android 3.0` 之后引入的其他类。数字 4 代表 Android API 版本 4（即 `Donut 1.6`）。这意味着该库可用于运行在 Android\
  \ API 版本 4 及更高版本上的应用。\n- **v7** — 提供了 `ActionBar`、`CardView`、`GridLayout`、`MediaRouter`、`Palette`\
  \ 和 `RecyclerView` 类。该库可用于 Android API 版本 7（即 `Eclair 2.1`）及更高版本。实际上这里有六个库：`appcompat`、`cardview`、`gridlayout`、`mediarouter`、`palette`\
  \ 和 `recyclerview`。\n- **v8** — 为 Android API 版本 8（即 `Froyo 2.2`）及更高版本增加了 `RenderScript`\
  \ 能力。`RenderScript` 允许在设备处理器（CPU 内核、GPU、DSP）之间并行处理任务，它于 Android API 版本 11（即 `Honeycomb\
  \ 3.0`）中被引入。\n- **v13** — 为标签页和分页界面等功能添加了特殊的 `Fragment` 功能。该库也包含了许多来自 v4 库的类，因此可以将其包含在你的应用中，而无需同时引入其他库。\n\
  \n有关按版本号分类的所有兼容性功能的完整列表，请参阅本章末尾的参考资料。\n\n要将 Android Support Library 下载到你的计算机，请使用\
  \ Android SDK Manager，并在列表底部的 `Extras` 下找到它。如果你使用的是 Android Studio，请下载 Android Support\
  \ Repository 和 Google Repository。否则，请下载 Android Support Library。这些文件将被放置在你的 Android\
  \ SDK 目录下。Android Support Library 位于 `extras/android/support/`，Android Support Repository\
  \ 位于 `extras/android/m2repository`，Google Repository 位于 `extras/google/m2repository`。在撰写本文时，`RenderScript`\
  \ 兼容库在 Android Studio 中不受支持。\n\n从上述列表中可以看出，并非所有 Android Support Library 的功能都适用于所有旧版安卓。因此，你必须在\
  \ `AndroidManifest.xml` 文件中正确设置 `android:minSdkVersion`。\n\n如果你在使用 v7 中的兼容库功能，那么\
  \ `android:minSdkVersion` 不应低于 7。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00002.jpeg)\n\n**86** **第 5 章：为旧设备使用兼容库**\n\n### 包含 v7 Support Library\n\
  \n你几乎不太可能只想包含 v4 库而不包含 v7 库。由于 v7 库需要同时包含 v4 库才能提供 v7 正常运行所需的类，因此你需要将两者都包含进来。如果你使用\
  \ Eclipse，ADT 插件会让这一切变得相当简单。当你在 Eclipse 中创建一个新的 Android 项目时，需要指定它将运行的最低安卓版本。如果 ADT\
  \ 认为你可能需要包含兼容库，它会自动将其包含进来。\n\n例如，如果你将目标 SDK 指定为 16（`JellyBean 4.1`），但最低 SDK 指定为\
  \ 8（`Froyo 2.2`），ADT 会自动设置一个 `appcompat v7` 库项目，将该库项目包含到你的新应用中，并且也会将 v4 库包含到你的应用中。因此，你无需额外工作，v7\
  \ 库的资源就可用于你的应用。\n\n然而，如果你想使用另外两个 v7 库（`gridlayout` 和/或 `mediarouter`），则需要做一些额外的工作，具体如下所述。\n\
  \n通过创建一个库项目并将其包含到你的应用中，你的应用就能获得所需的兼容库资源。\n\n你可以手动执行类似于 ADT 自动执行的操作，以便将 v7 `appcompat`\
  \ 库包含到你的项目中。首先，选择 **File ➤ Import**，然后选择 **Existing Android Code Into Workspace**，接着导航到你工作站上\
  \ Android SDK 所在的 `extras` 文件夹。找到 v7 `gridlayout` 或 `mediarouter` 文件夹并选中。见图 5-1。\n\
  \n***图 5-1.** 导入 v7 mediarouter 兼容库*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n![](img/00023.jpeg)\n\n**第 5 章：为旧设备使用兼容库** **87**\n\n点击 **Finish**，你将获得一个新的库项目。如果你选择为\
  \ v7 `mediarouter` 创建库项目，你会发现它缺少一些功能，因此会有错误。你需要添加 v7 `appcompat` 库来解决这个问题。在 Eclipse\
  \ 中右键点击 `mediarouter` 库项目，选择 **Properties**。在左侧列表中选择 **Android**。现在，点击 **Library**\
  \ 部分的 **Add…** 按钮。见图 5-2。\n\n***图 5-2.** 将 appcompat_v7 添加到 v7 mediarouter 兼容库*\n\
  \n选择 `appcompat_v7` 库并点击 **OK**。这应该能解决 `mediarouter` 中的错误。现在，当你想将 `mediarouter`\
  \ 包含到你的应用项目中时，只需按照相同步骤操作，但右键点击你的应用项目，然后在 **Library** 部分点击 **Add…** 按钮时，选择 `mediarouter`\
  \ 库即可。\n\n### 包含 v8 Support Library\n\n\n\n如果你希望使用 v8 RenderScript 兼容库，只需在应用项目的`project.properties`文件中添加以下两行，无论你的应用目标版本是多少：\n\
  \n`renderscript.target=19`\n\n`renderscript.support.mode=true`\n\n如果在 Eclipse 控制台中看到关于版本号的错误，请按照错误提示尝试使用更新的版本。不过，Android\
  \ 的最新版本可能也无法正常工作。你可能还需要做另一件事：将`renderscript-v8.jar`文件作为外部 jar 文件添加到项目的构建路径中。你可以在\
  \ SDK 的`build-tools`目录下找到这个 jar 文件，请使用可用的最新版本。\n\n在你的代码中，请确保导入的是`android.support.v8.renderscript`包，而不是`android.renderscript`包。如果你正在为\
  \ v8 库修改现有的 RenderScript 应用，请务必清理你的项目；由`.rs`文件生成的 Java 文件需要重新生成，以同样使用 v8 库。之后，你就可以像往常一样使用\
  \ RenderScript，并将你的应用部署到旧版本的 Android 上了。\n\n### 包含 v13 支持库\n\n最后，要包含 v13 兼容库到你的应用中，请进入\
  \ SDK 的`extras`目录，找到 v13 jar 文件。将此文件复制到应用项目的`/libs`目录下。将 v13 jar 文件放置到位后，右键点击它，弹出菜单，然后选择“构建路径”（Build\
  \ Path）➤ “添加到构建路径”（Add to Build Path）。有很大可能你的应用中已经包含了 v4 和 v7 appcompat 库（这得益于 ADT）。如果你不需要其中任何一个库的功能，你可以选择将它们移除。例如，如果你的应用最低\
  \ SDK 是 v11，你可以使用原生的`ActionBar`类，而不需要 v7 appcompat 支持库。\n\nv13 jar 文件包含了许多与 v4 相同的类，因此你不希望因同时添加相同的类而导致任何问题。如果你打算在应用中同时使用这三个库（即\
  \ v4、v7 和 v13），那么至少要确保 v13 的排序在 v4 之前。这可以在“配置构建路径”（Configure Build Path）对话框中完成。\n\
  \n### 仅包含 v4 支持库\n\n如果你确实只需要 v4 支持库而不要其他库，你可以遵循与 v13 库相同的步骤。\n\n## 使用 Android 支持库改造应用\n\
