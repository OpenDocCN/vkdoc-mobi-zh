  \ SDK 文档，在单个 `AsyncTask` 上多次调用 `execute()` 方法是无效的。如果您需要这种行为，则必须实例化一个新任务并再次调用 `execute()`\
  \ 方法。\n\n## 正确显示 AsyncTask 进度的问题与解决方案\n\n如果您本章的主要目标只是学习 `AsyncTask` 的基本知识，那么到目前为止我们所涵盖的内容已经足够。然而，当\
  \ `AsyncTask` 与进度对话框配对使用时，会存在一些问题，如前文清单所示。其中一个问题是，当设备旋转时，`AsyncTask` 会丢失正确的活动引用，从而也丢失对进度对话框的引用。另一个问题是，我们之前在代码中使用的进度对话框不是托管对话框。\n\
  \n现在让我们来理解这些问题。\n\n### 处理活动指针与设备旋转\n\n\n`AsyncTask` 持有的活动指针在因配置变更而重新创建活动时会变得过时。这是因为\
  \ Android 已创建了一个新活动，而旧活动不再显示在屏幕上。因此，持有旧活动及其对应的对话框会带来几个问题。首先，用户看不到 `AsyncTask` 试图更新的那个活动或对话框。其次，旧活动需要被垃圾回收，但由于\
  \ `AsyncTask` 持有对它的引用，你将阻止它被回收。即使你聪明地使用 Java 弱引用来引用旧活动，虽然不会发生内存泄漏，但你会得到一个空指针异常。过时指针的问题不仅适用于活动指针，也适用于任何间接指向该活动的指针。\n\
  \n解决过时活动引用问题的推荐方法是使用无头保留片段（第 1 章中介绍了片段。保留片段是指当活动因配置变更而重新创建时仍然存在的片段。这些片段也被称为无头片段，因为它们不一定需要持有任何用户界面）。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 6 章：高级 AsyncTask 和进度对话框**\
  \ **103**\n\n处理托管对话框\n\n即使我们能够解决过时活动引用问题并重新建立与当前活动的连接，本章到目前为止使用进度对话框的方式也存在缺陷。我们直接实例化了一个\
  \ `ProgressDialog`。以这种方式创建的 `ProgressDialog` 并不是一个“托管”对话框。如果它不是一个托管对话框，当设备发生旋转或任何其他配置变更时，活动将不会重新创建该对话框。因此，当设备旋转时，`AsyncTask`\
  \ 仍在继续运行，但对话框将不会显示。有几种方法可以解决这个问题。推荐的方法是不使用进度对话框，而是在活动本身中使用一个嵌入式 UI 控件，例如进度条。因为进度条是活动视图层次结构的一部分，希望它能够被重新创建。尽管进度条听起来不错，但有时模态进度对话框更有意义。例如，当你不希望用户在\
  \ `AsyncTask` 运行时与活动的任何其他部分进行交互时，就会出现这种情况。在这些情况下，我们认为使用片段对话框而不是进度条几乎没有矛盾。\n\n你接下来将看到的解决方案使用一个保留的非\
  \ UI 片段加上一个进度对话框，当活动因配置变更而重新创建时，该对话框会根据需要重新创建。你可能选择实现进度指示器的其他方式，它们也可以使用类似的技术。\n\n\
  行为良好的进度对话框的测试场景\n\n无论你使用哪种解决方案来为 `AsyncTask` 正确显示进度对话框，该解决方案都应在以下所有测试场景中正常工作：\n\
  1.  在没有方向变更的情况下，进度对话框必须启动、显示进度、结束，并清理对 `AsyncTask` 的引用。这必须能够重复工作，以证明没有残留上次运行的痕迹。\n\
  2.  该解决方案应能处理任务执行中途的方向变更。旋转应重新创建对话框并从上次中断的地方显示进度。对话框应正确结束并清理 `AsyncTask` 引用。这必须能够重复工作，以证明没有残留任何痕迹。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**104** **第 6 章：高级 AsyncTask\
  \ 和进度对话框**\n\n3.  即使任务正在执行中途，也应当允许按 Home 键返回桌面。\n4.  按 Home 键返回桌面后重新访问活动，应显示对话框并正确反映当前进度，并且进度不应低于之前的进度。\n\
  5.  按 Home 键返回桌面后，当任务在返回前完成时，这也应能正常工作。对话框应被正确关闭，并且移除 `AsyncTask` 引用。\n\n所有处理 `AsyncTask`\
  \ 的活动都应始终执行这组测试用例。既然我们已经阐述了解决方案应如何满足要求，接下来展示一个使用保留片段和进度对话框的解决方案。\n\n使用保留片段和进度对话框\n\
  \n在这个解决方案中，我们将向你展示如何使用一个保留片段和一个进度对话框来为 `AsyncTask` 正确显示进度。该解决方案涉及以下步骤：\n\n1.  活动必须跟踪非\
  \ UI 片段。这个外部片段必须持续存在，并且在活动关闭和重新返回时验证其引用。这个保留片段持有对 `AsyncTask` 的引用。\n2.  然后，一个保留片段将拥有指向\
  \ `AsyncTask` 的指针，并且可以在活动创建和销毁时，在 `AsyncTask` 上设置和重置活动指针。因此，这个保留片段充当了活动与 `AsyncTask`\
  \ 之间的中介。\n3.  然后，`AsyncTask` 将实例化一个进度对话框。`AsyncTask` 将使用由保留片段设置的活动指针来完成此操作，因为你需要一个活动来创建进度对话框。\n\
  4.  `AsyncTask` 将在设备旋转时重新创建对话框并正确保持其状态。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n**第 6 章：高级 AsyncTask 和进度对话框** **105**\n\n5.  用户可以通过点击 Home 键返回桌面并使用其他应用。这将把我们的活动及其对话框推到后台。这必须得到处理。当用户返回活动或应用时，对话框可以继续显示进度。如果任务在活动隐藏时完成，`AsyncTask`\
  \ 必须知道如何关闭对话框。\n\n探索关键代码片段\n\n现在，我们将展示用于实现所述方法的关键代码片段。其余的实现可以在本章的可下载项目 `AndroidFragments_Ch06_TestAsyncTask2.zip`\
  \ 中找到。清单 6-11 首先展示了保留片段的源代码。该片段代表活动管理 `AsyncTask`。\n\n*清单 6-11. 使用保留的非 UI 片段管理 AsyncTask*\n\
  \n```java\npublic class AsyncTaskFragment extends Fragment {\n\n    private static\
