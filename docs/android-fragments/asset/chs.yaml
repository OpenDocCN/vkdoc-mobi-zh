  \ 展示了如何将一个非 UI 片段设置为活动与 `AsyncTask` 之间的中介。通过将该片段设置为保留状态，它能够应对配置变更。它还会从活动中获取字符串列表，并轻松地将这些字符串传递给\
  \ `AsyncTask`。然而，`AsyncTask` 将会在活动上（而非此片段上）调用 UI 变更。由于当活动即将结束时片段会收到通知（即通过 `onDetach()`\
