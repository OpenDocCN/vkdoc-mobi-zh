  trans: "\n优化后的 Markdown 文档如下：\n\n# 摘要\n\n理解回调函数的最佳方法是仔细研究它们。本 URL 提供了关于片段（Fragment）所有重要回调函数的文档化示例代码。\n\
    \n-   [www.androidbook.com/item/4668](http://www.androidbook.com/item/4668)：理解\
    \ Activity 生命周期的最佳方法是仔细研究其回调函数。本 URL 提供了关于所有重要 Activity 回调函数的文档化示例代码。\n-   [www.androidbook.com/item/3634](http://www.androidbook.com/item/3634)：本\
    \ URL 概述了我们关于片段对话框（Fragment Dialogs）的研究。\n-   [www.androidbook.com/AndroidFragments/projects](http://www.androidbook.com/AndroidFragments/projects)：本书中可下载项目的列表位于此\
    \ URL。对于本章，请查找名为`AndroidFragments_Ch06_AsyncTask.zip`的压缩文件。\n\n# 总结\n\n在本章中，除了介绍`AsyncTask`，我们还向您介绍了进度对话框和无头保留片段（headless\
    \ retained fragments）。通过阅读本章，您不仅理解了`AsyncTask`，而且能够应用您对 Activity 生命周期的理解，并深入理解片段。\n\
    \n我们还记录了一组关键测试用例，这些用例必须满足，才能构建一个行为良好的 Android 应用程序。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
