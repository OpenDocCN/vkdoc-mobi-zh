    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter


    Responding to


    Configuration Changes


    When an application is running on a device, and the device’s configuration changes
    (for example, is rotated 90 degrees), your application needs to respond accordingly.
    The new configuration will most likely look different from the previous configuration.
    For example, switching from portrait to landscape mode means the screen went from
    being tall and narrow to being short and wide. The UI elements (buttons, text,
    lists, and so on) will need to be rearranged, resized, or even removed to accommodate
    the new configuration.


    In Android, a configuration change by default causes the current activity to go
    away and be re-created. The application itself keeps on running, but it has the
    opportunity to change how the activity is displayed in response to the configuration
    change. In the rare case that you need to handle a configuration change without
    destroying and re-creating your activity, Android provides a way to handle that
    as well.


    Be aware that configuration changes can take on many forms, not just device rotation.
    If a device gets connected to a dock, that’s also a configuration change. So is
    changing the language of the device. Whatever the new configuration is, as long
    as you’ve designed your activity for that configuration, Android takes care of
    most everything to transition to it, giving the user a seamless experience.


    This chapter will take you through the process of a configuration change, from
    the perspectives of both activities and fragments. We’ll show you how to design
    your application for those transitions and how to avoid traps that could cause
    your application to crash or misbehave.


    **35**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


