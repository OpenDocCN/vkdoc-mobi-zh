    ## Introduction


    Mobile application development is as hot a topic as ever. Consumers have been
    benefiting from smartphones for years, and now more and more companies are getting
    into the game. Some developers are learning mobile development brand new, while
    others are coming from backgrounds in web development or PC programming. No matter,
    making mobile applications that work well requires learning some new concepts
    and skills. With Android in particular, fragments are one of those topics that
    are critical to an Android application, but are not that easy to master. Once
    you understand the inner details of how fragments work, and the ways in which
    they can be used, you will find it much easier to design and build Android applications.


    Fragments are conceptual containers of user interface and logic that can be easily
    combined as building blocks into your mobile application. Android has not abandoned
    the `Activity` class, but activities are now often composed from fragments. This
    makes it much easier to build applications to support different device types,
    sizes and orientations.


    This book, *Android Fragments*, is our sixth book on Android. In the first four
    books, published under the *Pro Android* name, we covered many of the Android
    APIs, from basic Views to broadcast receivers, touchscreens, services and animations.
    In *Expert Android* we tackled more advanced Android APIs as well as the advanced
    debugging capabilities of Android.


    *Android Fragments* is actually a subset of the *Pro Android* book. It focuses
    specifically on fragments, providing you with the detail you won’t find in other
    books. It covers not only the basic fragment, but also dialog fragments, preference
    fragments, and progress dialog fragments. It covers the compatibility library
    so you can use fragments with the older versions of Android that originally did
    not support fragments. After reading this book, you should have no fear incorporating
    all manner of fragments into your applications.


    ## Is This Book for You?


    This book was written for the mobile developer who has a good understanding of
    Android, and the basics of an Android application, but who needs or wants an in-depth
    understanding of fragments. A good architect knows the materials. To build great
    mobile applications, the great mobile developer needs to know fragments. If you
    don’t know, or if you’re not sure you understand fragments well, then this book
    is for you.


    ## What You Need to Know Before You Begin


    *Android Fragments* assumes that you are familiar with Java and basic Android
    and that you have developed Android applications, using Eclipse or another IDE.
    You do not need to be an Android expert.


    With that said, here’s a brief, quick overview of what is in *Android Fragments*,
    chapter by chapter.


    ## What’s in This Book


    We start *Android Fragments* by documenting in depth the `Fragment` class and
    its life cycle. We cover the careful integration dance between the activities
    and the fragments of an application. You’ll see how to incorporate fragments into
    the UI, but also how to encapsulate functionality into fragments.


    **Chapter 2** helps you understand what happens to a fragment during a configuration
    change, such as the rotation of a device. You’ll see how fragments make this easier
    than it has been in the past.


    Dialogs are very common in applications, and now you’ll be using fragments to
    display them. Find out how in **Chapter 3**.


    Preferences also went through some major UI changes when fragments came along.
    **Chapter 4** covers everything you need to know about using Android’s preference
    framework for preferences or for just a quick and easy way to store some application
    state from one invocation to the next.'
