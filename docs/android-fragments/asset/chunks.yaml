    # Dialog Fragment 调用方式


    此片段通过两种方式被调用：从 Activity 以及从提示对话框片段调用。当此帮助对话框片段从主 Activity 显示时，关闭它只会将片段从栈顶弹出，并显示底下的主
    Activity。当此帮助对话框片段从提示对话框片段显示时，由于帮助对话框片段是返回栈上片段事务的一部分，关闭它会导致片段事务被回滚，这会使帮助对话框片段弹出，但恢复提示对话框片段。用户会看到提示对话框片段重新出现。


    ## Dialog 示例：`AlertDialogFragment`


    在本示例应用中，我们还有最后一个对话框片段要展示：警报对话框片段。虽然你可以用类似于帮助对话框片段的方式创建警报对话框片段，但也可以使用已在多个 Android
    版本中运行良好的旧版 `AlertBuilder` 框架来创建对话框片段。请查看 `AlertDialogFragment.java` 中的源代码。


    你不需要为这个片段提供布局，因为 `AlertBuilder` 会帮你处理。请注意，此对话框片段开始时与其他片段无异，但你没有 `onCreateView()`
    回调，而是有 `onCreateDialog()` 回调。你需要实现 `onCreateView()` 或 `onCreateDialog()` 之一，但不能同时实现两者。`onCreateDialog()`
    的返回值不是视图，而是一个对话框。


    值得注意的是，要获取对话框的参数，你应该访问参数包（arguments bundle）。在本示例应用中，你只对警报消息这样做，但也可以通过参数包访问其他参数。


    另请注意，对于这种类型的对话框片段，你的片段类需要实现 `DialogInterface.OnClickListener`，这意味着你的对话框片段必须实现
    `onClick()` 回调。当用户对嵌入的对话框进行操作时，会触发此回调。再次强调，你会获得触发对话框的引用以及被按下的按钮指示。与之前一样，你应该小心不要依赖
    `onDismiss()`，因为当设备配置发生变化时，它可能会被触发。


    ## Dialog 示例：嵌入式对话框


    你可能已经注意到 `DialogFragment` 还有一个特性。在应用的主布局中，文本下方有一个 `FrameLayout`，可用于容纳对话框。在应用的菜单中，最后一项会导致一个片段事务将
    `PromptDialogFragment` 的新实例添加到主屏幕。无需任何修改，对话框片段就可以嵌入在主布局中显示，并且其功能符合预期。


    此技术的一个不同之处在于，显示嵌入对话框的代码与显示弹出对话框的代码不同。嵌入对话框的代码如下所示：


    ```

    ft.add(R.id.embeddedDialog, pdf, EMBED_DIALOG_TAG);

    ft.commit();

    ```


    这与第 1 章中我们在 `FrameLayout` 中显示片段时的代码完全相同。然而，这次你需要确保传入一个标签名称，当对话框片段通知你的 Activity
    用户输入时，会使用这个标签名称。


    ## Dialog 示例：观察结果


    当你运行此示例应用时，请确保在设备的不同方向下尝试所有菜单选项。在对话框片段显示时旋转设备。你应该会满意地看到对话框会随着旋转而移动；你无需担心因配置变化而编写大量代码来保存和恢复片段。


    我们希望你欣赏的另一件事是，片段与 Activity 之间可以轻松通信。当然，Activity 拥有或可以获取对所有可用片段的引用，因此它可以访问片段本身暴露的方法。这并不是片段与
    Activity 之间通信的唯一方式。你可以

