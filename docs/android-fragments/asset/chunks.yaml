    \ 的活动都应始终执行这组测试用例。既然我们已经阐述了解决方案应如何满足要求，接下来展示一个使用保留片段和进度对话框的解决方案。\n\n使用保留片段和进度对话框\n\
    \n在这个解决方案中，我们将向你展示如何使用一个保留片段和一个进度对话框来为 `AsyncTask` 正确显示进度。该解决方案涉及以下步骤：\n\n1. \
    \ 活动必须跟踪非 UI 片段。这个外部片段必须持续存在，并且在活动关闭和重新返回时验证其引用。这个保留片段持有对 `AsyncTask` 的引用。\n2.\
    \  然后，一个保留片段将拥有指向 `AsyncTask` 的指针，并且可以在活动创建和销毁时，在 `AsyncTask` 上设置和重置活动指针。因此，这个保留片段充当了活动与\
    \ `AsyncTask` 之间的中介。\n3.  然后，`AsyncTask` 将实例化一个进度对话框。`AsyncTask` 将使用由保留片段设置的活动指针来完成此操作，因为你需要一个活动来创建进度对话框。\n\
    4.  `AsyncTask` 将在设备旋转时重新创建对话框并正确保持其状态。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**第 6 章：高级 AsyncTask 和进度对话框** **105**\n\n5.  用户可以通过点击 Home 键返回桌面并使用其他应用。这将把我们的活动及其对话框推到后台。这必须得到处理。当用户返回活动或应用时，对话框可以继续显示进度。如果任务在活动隐藏时完成，`AsyncTask`\
    \ 必须知道如何关闭对话框。\n\n探索关键代码片段\n\n现在，我们将展示用于实现所述方法的关键代码片段。其余的实现可以在本章的可下载项目 `AndroidFragments_Ch06_TestAsyncTask2.zip`\
    \ 中找到。清单 6-11 首先展示了保留片段的源代码。该片段代表活动管理 `AsyncTask`。\n\n*清单 6-11. 使用保留的非 UI 片段管理\
    \ AsyncTask*\n\n```java\npublic class AsyncTaskFragment extends Fragment {\n\n\
    \    private static final String tag = \"AsyncTaskFragment\";\n    private TestAsyncTaskDriverActivity\
    \ ctx = null;\n    private MyLongTask mlt = null;\n\n    public static AsyncTaskFragment\
    \ newInstance(String... params) {\n        AsyncTaskFragment myMF = new AsyncTaskFragment();\n\
    \        Bundle bundle = new Bundle();\n        bundle.putStringArray(\"params\"\
    , params);\n        myMF.setArguments(bundle);\n        return myMF;\n    }\n\n\
    \    @Override\n    public void onAttach(Activity activity) {\n        super.onAttach(activity);\n\
    \        ctx = (TestAsyncTaskDriverActivity) activity;\n        if (mlt != null\
    \ && mlt.getStatus() != AsyncTask.Status.FINISHED) {\n            // 我们有一个未完成的任务，确保它有正确的活动\n\
    \            mlt.setActivity(activity);\n        } else {\n            mlt = new\
    \ MyLongTask(ctx, ctx, \"Task1\");\n            String[] params = this.getArguments().getStringArray(\"\
    params\");\n            mlt.execute(params);\n        }\n    }\n\n    @Override\n\
    \    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
    \        setRetainInstance(true);\n    }\n\n    // 当活动将要销毁时，确保关闭对话框（如果它存在的话）。\n\
    \    @Override\n    public void onDetach() {\n        super.onDetach();\n    \
    \    Log.d(tag, \"calling for dismissal of the dialog\");\n        if (mlt !=\
    \ null) {\n            mlt.dismissDialog();\n        }\n    }\n}\n```\n"
- fmt: 'Code in `Listing 6-11` shows how to set up a non-UI fragment as a go-between
    from the activity to the `AsyncTask`. By setting the fragment to be retained,
    it will survive configuration changes. It also takes the list of strings from
    the activity and easily passes those on to the `AsyncTask`. However, the `AsyncTask`
    is going to invoke UI changes on the activity and not on this fragment. Since
    the fragment will get notified when the activity is going away (i.e., via the
    `onDetach()` callback), it can let the `AsyncTask` know to dismiss the dialog.
    The fragment also knows when the activity gets attached to this fragment, and
    if there is an already-running `AsyncTask`. It means the activity has been recreated
    due to a configuration change. Therefore, this fragment can notify the `AsyncTask`
    of the new activity so it can re-generate the progress dialog. If there is not
    a running `AsyncTask`, this fragment creates a new one and executes it.


    Let’s see now how an `AsyncTask` can create and control this progress dialog.
    `Listing 6-12` presents the code for the `AsyncTask` in order to aid this understanding.


    **Chapter 6: Advanced AsyncTask and Progress Dialogs**


    `Listing 6-12. AsyncTask That Uses a Progress Dialog`


    ```java

    public class MyLongTask


    extends AsyncTask<String,Integer,Integer>


    implements OnCancelListener


    {


    private IReportBack r;


    private Context ctx;


    private String tag = null;


    private ProgressDialog pd = null;


    final private int PDMAX = 5;


    private int pd_progress = 0;


    MyLongTask(IReportBack inr, Context inCtx, String inTag)


    {


    r = inr;


    ctx = inCtx;


    tag = inTag;


    }


    protected void onPreExecute( )


    {


    //Runs on the main ui thread


    Utils.logThreadSignature(this.tag);


    pd = newPDinstance(0);


    pd.show( );


    }


    protected void onProgressUpdate(Integer... progress)


    {


    //Runs on the main ui thread


    Utils.logThreadSignature(this.tag);


    this.reportThreadSignature( );


    //will be called multiple times


    //triggered by onPostExecute


    Integer i = progress[0];


    r.reportBack(tag, "Progress:" + i.toString( ));


    pd.setProgress(i);


    }


    protected void onPostExecute(Integer result)


    {


    //Runs on the main ui thread


    Utils.logThreadSignature(this.tag);


    r.reportBack(tag, "onPostExecute result:" + result); pd.cancel( );


    r.allDone(0);


    }


    protected Integer doInBackground(String...strings)


    {


    //Runs on a worker thread


    //May even be a pool if there are


    //more tasks.


    Utils.logThreadSignature(this.tag);


    for(String s :strings)


    {


    Log.d(tag, "Processing:" + s);


    }


    for (int i=0;i<PDMAX;i++)


    {


    Utils.sleepForInSecs(2);


    publishProgress(i+1);


    if(isCancelled( )) {


    Log.e(tag, "*** This task has been cancelled");


    break;


    }


    }


    return 1;


    }


    public void onCancelled(Integer result) {


    Log.d(tag, "AsyncTask was cancelled");


    r.allDone(1);


    }


    protected void reportThreadSignature( )


    {


    String s = Utils.getThreadSignature( );


    r.reportBack(tag,s);


    }


    public void onCancel(DialogInterface d)


    {


    r.reportBack(tag,"Cancel called on the dialog");


    // Therefore, cancel the AsyncTask


    this.cancel(false);


    }


    // Must detach the progress dialog from the


    // activity before it''s gone away, otherwise


    // we''ll get a window leaked exception.


    public void dismissDialog( ) {


    if(pd != null) {


    pd_progress = pd.getProgress( );


    pd.dismiss( );


    }


    }


    // When there''s a new activity, need to kill the


    // old dialog and create a new one, but with the


    // latest progress.


    public void setActivity(Context newCtx) {


    r = (IReportBack)newCtx;


    ctx = newCtx;


    pd = newPDinstance(pd_progress);


    pd.show( );


    }


    private ProgressDialog newPDinstance(int progress) {


    ProgressDialog newPD = new ProgressDialog(ctx);


    newPD.setTitle("title");


    newPD.setMessage("In progress...");


    newPD.setCancelable(true);


    newPD.setOnCancelListener(this);


    newPD.setIndeterminate(false);


    newPD.setProgressStyle(ProgressDialog.STYLE_HORIZONTAL);


    newPD.setMax(PDMAX);


    newPD.setProgress(progress);


    return newPD;


    }


    }

    ```'
