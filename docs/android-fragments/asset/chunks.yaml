- fmt: "# Chapter 3: Working with Dialogs\n\n**59**\n\nAlways use the getter methods\
    \ on the fragment manager to retrieve an instance of a managed fragment, and then\
    \ cast that reference appropriately and call a method on that fragment directly.\
    \ You can even do this from within another fragment. The degree to which you isolate\
    \ your fragments from each other with interfaces and through activities, or build\
    \ in dependencies with fragment-to-fragment communication, is based on how complex\
    \ your application is and how much reuse you want to achieve.\n\n## Working with\
    \ Toast\n\nA `Toast` is like a mini alert dialog that has a message and displays\
    \ for a certain amount of time and then goes away automatically. It does not have\
    \ any buttons. So it can be said that it is a transient alert message. It’s called\
    \ `Toast` because it pops up like toast out of a toaster.\n\nListing 3-6 shows\
    \ an example of how you can show a message using `Toast`.\n\n**Listing 3-6.**\
    \ Using `Toast` for Debugging\n\n```java\n//Create a function to wrap a message\
    \ as a toast\n//show the toast\n\npublic void reportToast(String message)\n{\n\
    \    String s = MainActivity.LOGTAG + \":\" + message;\n    Toast.makeText(activity,\
    \ s, Toast.LENGTH_SHORT).show();\n}\n```\n\nThe `makeText()` method in Listing\
    \ 3-6 can take not only an activity but any context object, such as the one passed\
    \ to a broadcast receiver or a service, for example. This extends the use of `Toast`\
    \ outside of activities.\n\n## References\n\n- [www.androidbook.com/androidfragments/projects](http://www.androidbook.com/androidfragments/projects)\
    \  \n  This chapter’s test project. The name of the ZIP file is `AndroidFragments_ch03_Dialogs.zip`.\
    \ The download includes an example of the date- and time-picker dialogs in `PickerDialogFragmentDemo`.\n\
    \n- [http://developer.android.com/guide/topics/ui/dialogs.html](http://developer.android.com/guide/topics/ui/dialogs.html)\
    \  \n  Android SDK document that provides an excellent introduction to working\
    \ with Android dialogs. You will find here an explanation of how to use managed\
    \ dialogs and various examples of available dialogs.\n\n**60**\n\n**Chapter 3:\
    \ Working with Dialogs**\n\n- [http://developer.android.com/reference/android/content/DialogInterface.html](http://developer.android.com/reference/android/content/DialogInterface.html)\
    \  \n  The many constants defined for dialogs.\n\n- [http://developer.android.com/reference/android/app/AlertDialog.Builder.html](http://developer.android.com/reference/android/app/AlertDialog.Builder.html)\
    \  \n  API documentation for the `AlertDialog.Builder` class.\n\n- [http://developer.android.com/reference/android/app/ProgressDialog.html](http://developer.android.com/reference/android/app/ProgressDialog.html)\
    \  \n  API documentation for `ProgressDialog`.\n\n- [http://developer.android.com/guide/topics/ui/controls/pickers.html](http://developer.android.com/guide/topics/ui/controls/pickers.html)\
    \  \n  An Android tutorial for using the date-picker and time-picker dialogs.\n\
    \n## Summary\n\nThis chapter discussed asynchronous dialogs and how to use dialog\
    \ fragments, including the following topics:\n\n- What a dialog is and why you\
    \ use one\n- The asynchronous nature of a dialog in Android\n- The three steps\
    \ of getting a dialog to display on the screen\n- Creating a fragment\n- Two methods\
    \ for how a dialog fragment can create a view hierarchy\n- How a fragment transaction\
    \ is involved in displaying a dialog fragment, and how to get one\n- What happens\
    \ when the user presses the Back button while viewing a dialog fragment\n- The\
    \ back stack, and managing dialog fragments\n- What happens when a button on a\
    \ dialog fragment is clicked, and how you deal with it\n- A clean way to communicate\
    \ back to the calling activity from a dialog fragment\n- How one dialog fragment\
    \ can call another dialog fragment and still get back to the previous dialog fragment\n\
    - The `Toast` class and how it can be used as a simple alert pop-up\n\n---\n\n\
    # Chapter 4: Working with Preferences and Saving State\n\nAndroid offers a robust\
    \ and flexible framework for dealing with settings, also known as preferences.\
    \ And by settings, we mean those feature choices that a user makes and saves to\
    \ customize an application to their liking. (In this chapter, the terms settings\
    \ and preferences will be used interchangeably.) For example, if the user wants\
    \ a notification via a ringtone or vibration or not at all, that is a preference\
    \ the user saves; the application remembers the choice until the user changes\
    \ it. Android provides simple APIs that hide the management and persisting of\
    \ preferences. It also provides prebuilt user interfaces that you can use to let\
    \ the user make preference selections. Because of the power built into the Android\
    \ preferences framework, we can also use preferences for more general-purpose\
    \ storing of application state, to allow our application to pick up where it left\
    \ off, should our application go away and come back later.\n\nAs another example,\
    \ a game’s high scores could be stored as preferences, although you’ll want to\
    \ use your own UI to display them.\n\nThis chapter covers how to implement your\
    \ own settings screens for your application, how to interact with Android system\
    \ settings, and how to use settings to secretly save application state, and it\
    \ also provides best-practice guidance. You’ll discover how to make your settings\
    \ look good on small screens as well as larger screens such as those found on\
    \ tablets.\n\n**61**\n\n**Chapter 4: Working with Preferences and Saving State**\n\
    \n## Exploring the Preferences Framework\n\nAndroid’s preferences framework builds\
    \ from the individual settings choices, to a hierarchy of screens that contain\
    \ settings choices. Settings could be binary settings such as on/off, or text\
    \ input, or a numeric value, or could be a selection from a list of choices. Android\
    \ uses a `PreferenceManager` to provide settings values to applications. The framework\
    \ takes care of making and persisting changes, and notifying the application when\
    \ a setting changes or is about to change. While settings are persisted in files,\
    \ applications don’t deal directly with the files. The files are hidden away,\
    \ and you’ll see shortly where they are.\n\nPreferences can be specified with\
    \ XML, or by writing code. For this chapter, you’ll work with a sample application\
    \ that demonstrates the different types of choices. XML is the preferred way to\
    \ specify a preference, so that is how the application was written. XML specifies\
    \ the lowest-level settings, plus how to group settings together into categories\
    \ and screens. For reference, the sample application for this chapter presents\
    \ the following settings as shown in Figure 4-1.\n\n**Figure 4-1.** The main settings\
    \ from the sample app preference UI. Due to the screen’s height, it has been shown\
    \ with the top on the left and the bottom on the right. Notice the overlap between\
    \ the two images.\n\n**Chapter 4: Working with Preferences and Saving State**\n\
    \n**63**"
