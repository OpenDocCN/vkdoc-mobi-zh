- fmt: "`android:entries=\"@array/flight_sort_options\"`\n\n`android:entryValues=\"\
    @array/flight_sort_options_values\"`\n\n`android:dialogTitle=\"@string/dialogTitle\"\
    `\n\n`android:defaultValue=\"@string/flight_sort_option_default_value\" />` Listing\
    \ 4-4 contains an XML fragment that represents the flight-option preference setting.\
    \ This time the file contains references to strings and to arrays, which would\
    \ be the more common way to specify these rather than hard-coding the strings.\
    \ As mentioned before, the value of a list preference as stored in the XML data\
    \ file under the `/data/data/{package}` directory is not the same as what the\
    \ user sees in the user interface. The name of the key is stored in the data file,\
    \ along with a hidden value that the user does not see. Therefore, to get a `ListPreference`\
    \ to work, there needs to be two arrays: the values displayed to the user and\
    \ the strings used as key values.\n\nThis is where you can easily get tripped\
    \ up. The `entries` array holds the strings displayed to the user, and the `entryValues`\
    \ array holds the strings that will be stored in the preferences data XML file.\n\
    \nThe elements between the two arrays correspond to each other positionally.\n\
    \nThat is, the third element in the `entryValues` array corresponds to the third\
    \ element in the `entries` array. It is tempting to use 0, 1, 2, etc., as `entryValues`\
    \ but it is not required, and it could cause problems later when the arrays must\
    \ be modified. If our option were numeric in nature (for example, a countdown\
    \ timer starting value), then we could have used values such as 60, 120, 300,\
    \ and so on. The values don’t need to be numeric at all as long as they make sense\
    \ to the developer; the user doesn’t see these values unless you choose to expose\
    \ them. The user only sees the text from the first string array `flight_sort_options`.\
    \ The example application for this chapter shows it both ways.\n\nA word of caution\
    \ here: because the preferences XML data file is storing only the value and not\
    \ the text, should you ever upgrade your application and change the text of the\
    \ options or add items to the string arrays, any value stored in the preferences\
    \ XML data file should still line up with the appropriate text after the upgrade.\
    \ The preferences XML data file is kept during the application upgrade. If the\
    \ preferences XML data file had a “1” in it, and that meant “# of Stops” before\
    \ the upgrade, it should still mean “# of Stops” after the upgrade.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**70**\n\n**CHAPTER 4: Working with Preferences and Saving State**\n\nSince\
    \ the `entryValues` array is not seen by the end user, it is best practice to\
    \ store it once and only once within your application. Therefore, make one and\
    \ only one `/res/values/prefvaluearrays.xml` file to contain these arrays.\n\n\
    The `entries` array is very likely to be created multiple times per application,\
    \ for different languages or perhaps different device configurations. Therefore,\
    \ make separate `prefdisplayarrays.xml` files for each variation that you need.\n\
    \nFor example, if your application will be used in English and in French, there\
    \ will be separate `prefdisplayarrays.xml` files for English and French. You do\
    \ not want to include the `entryValues` array in each of these other files.\n\n\
    It is imperative though that there are the same numbers of array elements between\
    \ `entryValues` and `entries` arrays. The elements must line up. When you make\
    \ changes, be careful to keep everything in alignment. Listing 4-5 contains the\
    \ source of `ListPreference` files for the example.\n\n*Listing 4-5\\. Other ListPreference\
    \ Files from Our Example*\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"\
    ?>\n<resources>\n    <string-array name=\"flight_sort_options_values\">\n    \
    \    <item>0</item>\n        <item>1</item>\n        <item>2</item>\n    </string-array>\n\
    \    <string-array name=\"pizza_toppings_values\">\n        <item>cheese</item>\n\
    \        <item>pepperoni</item>\n        <item>onion</item>\n        <item>mushroom</item>\n\
    \        <item>olive</item>\n        <item>ham</item>\n        <item>pineapple</item>\n\
    \    </string-array>\n    <string-array name=\"default_pizza_toppings\">\n   \
    \     <item>cheese</item>\n        <item>pepperoni</item>\n    </string-array>\n\
    </resources>\n```\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<resources>\n\
    \    <string-array name=\"flight_sort_options\">\n        <item>Total Cost</item>\n\
    \        <item># of Stops</item>\n        <item>Airline</item>\n    </string-array>\n\
    \    <string-array name=\"pizza_toppings\">\n        <item>Cheese</item>\n   \
    \     <item>Pepperoni</item>\n        <item>Onions</item>\n        <item>Portobello\
    \ Mushrooms</item>\n        <item>Black Olives</item>\n        <item>Smoked Ham</item>\n\
    \        <item>Pineapple</item>\n    </string-array>\n</resources>\n```\n\nAlso,\
    \ don’t forget that your default value as specified in the XML source file must\
    \ match an `entryValue` in the array from `prefvaluearrays.xml`.\n\nFor a `ListPreference`,\
    \ the value of the preference is a `String`. If you are using number strings (e.g.,\
    \ 0, 1, 1138) as `entryValues`, you could convert those to integers or whatever\
    \ you need in your code, as is used in the `flight_sort_options_values` array.\n\
    \nYour code is likely going to want to display the user-friendly text from the\
    \ preference’s `entries` array. This example took a shortcut, because array indices\
    \ were used for the elements in `flight_sort_options_values`. By simply converting\
    \ the value to an int, you know which string to read from `flight_sort_options`.\
    \ Had you used some other set of values for `flight_sort_options_values`, you\
    \ would need to determine the index of the element that is your preference and\
    \ then turn around and use that index to grab the text of your preference from\
    \ `flight_sort_options`. `ListPreference`’s helper method `findIndexOfValue()`\
    \ can help with this, by providing the index into the values array so you can\
    \ then easily get the corresponding display text from the `entries` array.\n\n\
    Returning now to Listing 4-4, there are several strings for titles, summaries,\
    \ and more. The string called `flight_sort_option_default_value` sets the default\
    \ value to 1 to represent “# of Stops” in the example. It is usually a good idea\
    \ to choose a default value for each option. If you don’t choose a default value\
    \ and no value has yet been chosen, the methods that return the value of the option\
    \ will return `null`. Your code would have to deal with `null` values in this\
    \ case.\n\n## Understanding EditTextPreference\n\nThe preferences framework also\
    \ provides a free-form text preference called `EditTextPreference`. This preference\
    \ allows you to capture raw text rather than ask the user to make a selection.\
    \ To demonstrate this, let’s assume you have an application that generates Java\
    \ code for the user. One of the preference settings of this application might\
    \ be the default package name to use for the generated classes. Here, you want\
    \ to display a text field to the user for setting the package name for the generated\
    \ classes. Figure 4-5 shows the UI, and Listing 4-6 shows the XML.\n\n**Figure\
    \ 4-5.** Using the **EditTextPreference**\n\n*Listing 4-6\\. An Example of an*\
    \ **EditTextPreference**\n\n```xml\n<EditTextPreference\n    android:key=\"package_name_preference\"\
    \n    android:title=\"Set Package Name\"\n    android:summary=\"Set the package\
    \ name for generated code\"\n    android:dialogTitle=\"Package Name\" />\n```\n\
    \nWhen `Set Package Name` is selected, the user is presented with a dialog to\
    \ input the package name. When the OK button is clicked, the preference is saved\
    \ to the preference store.\n\nAs with the other preferences, you can obtain the\
    \ value of the preference by calling the appropriate getter method, in this case\
    \ `getString()`.\n\n## Understanding MultiSelectListPreference"
