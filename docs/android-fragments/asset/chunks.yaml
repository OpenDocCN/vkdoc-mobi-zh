    Child Preferences with Dependency


    Another way to organize preferences is to use a preference dependency.


    This creates a parent-child relationship between preferences. For example, you
    might have a preference that turns on alerts; and if alerts are on, there might
    be several other alert-related preferences to choose from. If the main alerts
    preference is off, the other preferences are not relevant and should be disabled.
    Listing 4-8 shows the XML, and Figure [4-7](#part0000_split_001.html#p80) shows
    what it looks like.


    *Listing 4-8\. Preference Dependency in XML*


    <PreferenceScreen>


    <PreferenceCategory


    android:title="Alerts">


    <CheckBoxPreference


    android:key="alert_email"


    android:title="Send email?" />


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00006.jpeg)


    ![](images/00004.jpeg)


    **CHAPTER 4: Working with Preferences and Saving State**


    **75**


    <EditTextPreference


    android:key="alert_email_address"


    android:layout="?android:attr/preferenceLayoutChild"


    android:title="Email Address"


    android:dependency="alert_email" />


    </PreferenceCategory>


    </PreferenceScreen>


    ***Figure 4-7.** Preference dependency*


    Preferences with Headers


    Android 3.0 introduced a new way to organize preferences. You see this on tablets
    under the main Settings app. Because tablet screen real estate offers much more
    room than a smartphone does, it makes sense to display more preference information
    at the same time. To accomplish this, you use preference headers. Take a look
    at Figure [4-8.](#part0000_split_001.html#p80)


    ***Figure 4-8.** Main Settings page with preference headers*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **76**


    **CHAPTER 4: Working with Preferences and Saving State**


    Notice that headers appear down the left side, like a vertical tab bar. As you
    click each item on the left, the screen to the right displays the preferences
    for that item. In Figure [4-8](#part0000_split_001.html#p80), Sound is chosen,
    and the sound preferences are displayed at right. The right side is a PreferenceScreen
    object, and this setup uses fragments. Obviously, we need to do something different
    than what has been discussed so far in this chapter.


    The big change from Android 3.0 was the addition of headers to PreferenceActivity.
    This also means using a new callback within PreferenceActivity to do the headers
    setup. Now, when you extend PreferenceActivity, you’ll want to implement this
    method:


    public void onBuildHeaders(List<Header> target) {


    loadHeadersFromResource(R.xml.preferences, target);


    }


    Please refer to the PrefDemo sample application for the complete source code.
    The preferences.xml file contains some new tags that look like this:


    <preference-headers


    >


    <header android:fragment="com.example.PrefActivity$Prefs1Fragment"


    android:icon="@drawable/ic_settings_sound"


    android:title="Sound"


    android:summary="Your sound preferences" />


    ...


    Each header tag points to a class that extends PreferenceFragment. In the example
    just given, the XML specifies an icon, the title, and summary text (which acts
    like a subtitle). Prefs1Fragment is an inner class of PreferenceActivity that
    could look something like this:


    public static class Prefs1Fragment extends PreferenceFragment {


    @Override


    public void onCreate(Bundle savedInstanceState) {


    super.onCreate(savedInstanceState);


    addPreferencesFromResource(R.xml.sound_preferences);


    }


    }


    All this inner class needs to do is pull in the appropriate preferences XML file,
    as shown. That preferences XML file contains the types of preference specifications
    we covered earlier, such as ListPreference, CheckBoxPreference, PreferenceCategory,
    and so on. What’s very nice is that Android takes care of doing the right thing
    when the screen configuration changes and when the preferences are displayed on
    a small screen. Headers behave like old preferences when the screen is too


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 4: Working with Preferences and Saving State** **77**


    small to display both headers and the preference screen to the right. That is,
    you only see the headers; and when you click a header, you then see only the appropriate
    preference screen.


    PreferenceScreens


    The top-level container for preferences is a PreferenceScreen. Before tablets
    and PreferenceFragments, you could nest PreferenceScreens, and when the user clicked
    on a nested PreferenceScreen item, the new PreferenceScreen would replace the
    currently displayed PreferenceScreen. This worked fine on a small screen, but
    doesn’t look as good on a tablet, especially if you started with headers and fragments.
    What you probably want is for the new PreferenceScreen to appear where the current
    fragment is.


    To make a PreferenceScreen work inside of a fragment, all you need to do is specify
    a fragment class name for that PreferenceScreen. Listing 4-9 shows the XML from
    the sample application.


    *Listing 4-9\. PreferenceScreen invoked via a PreferenceFragment*


    <PreferenceScreen


