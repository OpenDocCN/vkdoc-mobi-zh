  raw: 'Because the fragment manager knows about all fragments attached to the current
    activity, the activity or any fragment in that activity can ask for any other
    fragment using the getter methods described earlier. Once the fragment reference
    has been obtained, the activity or fragment could cast the reference appropriately
    and then call methods directly on that activity or fragment. This would cause
    your fragments to have more knowledge about the other fragments than might normally
    be desired, but don’t forget that you’re running this application on a mobile
    device, so cutting corners can sometimes be justified. A code snippet is provided
    in Listing 1-12 to show how one fragment might communicate directly with another
    fragment.


    The snippet would be part of one of your extended Fragment classes, and FragmentOther
    is a different extended Fragment class.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **32**


    **CHAPTER 1: Fragments Fundamentals**


    *Listing 1-12\. Direct Fragment-to-Fragment Communication*


    FragmentOther fragOther =


    (FragmentOther)getFragmentManager().findFragmentByTag("other"); fragOther.callCustomMethod(
    arg1, arg2 );


    In Listing 1-12, the current fragment has direct knowledge of the class of the
    other fragment and also which methods exist on that class. This may be okay because
    these fragments are part of one application, and it can be easier to simply accept
    the fact that some fragments will know about other fragments. We’ll show you a
    cleaner way to communicate between fragments in the DialogFragment sample application
    in Chapter 3.


    Using startActivity( ) and setTargetFragment( )


    A feature of fragments that is very much like activities is the ability of a fragment
    to start an activity. Fragment has a startActivity() method and startActivityForResult()
    method. These work just like the ones for activities; when a result is passed
    back, it will cause the onActivityResult() callback to fire on the fragment that
    started the activity.


    There’s another communication mechanism you should know about. When one fragment
    wants to start another fragment, there is a feature that lets the calling fragment
    set its identity with the called fragment. Listing 1-13 shows an example of what
    it might look like.


    *Listing 1-13\. Fragment-to-Target-Fragment Setup*


    mCalledFragment = new CalledFragment();


    mCalledFragment.setTargetFragment(this, 0);


    fm.beginTransaction().add(mCalledFragment, "work").commit(); With these few lines,
    you’ve created a new CalledFragment object, set the target fragment on the cal
    ed fragment to the current fragment, and added the cal ed fragment to the fragment
    manager and activity using a fragment transaction. When the cal ed fragment starts
    to run, it wil be able to call getTargetFragment(), which wil return a reference
    to the cal ing fragment. With this reference, the cal ed fragment could invoke
    methods on the cal ing fragment or even access view components directly. For example,
    in Listing 1-14, the called fragment could set text in the UI of the calling fragment
    directly.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 1: Fragments Fundamentals**


    **33**


    *Listing 1-14\. Target Fragment-to-Fragment Communication*


    TextView tv = (TextView)


    getTargetFragment().getView().findViewById(R.id.text1);


    tv.setText("Set from the called fragment");


