  trans: '

    代码清单 6-11 展示了如何将一个非 UI 片段设置为活动与 `AsyncTask` 之间的中介。通过将该片段设置为保留状态，它能够应对配置变更。它还会从活动中获取字符串列表，并轻松地将这些字符串传递给
    `AsyncTask`。然而，`AsyncTask` 将会在活动上（而非此片段上）调用 UI 变更。由于当活动即将结束时片段会收到通知（即通过 `onDetach()`
    回调），因此它可以让 `AsyncTask` 知道要关闭对话框。当活动重新附加到该片段时，该片段也能知晓，并可判断是否存在正在运行的 `AsyncTask`。这意味着活动是由于配置变更而被重新创建的。因此，该片段可以将新的活动通知给
    `AsyncTask`，以便它能够重新生成进度对话框。如果没有正在运行的 `AsyncTask`，该片段则会创建一个新的并执行它。


    现在，我们来看看 `AsyncTask` 如何创建并控制这个进度对话框。**代码清单 6-12** 展示了 `AsyncTask` 的代码，以帮助理解这一点。


    **第 6 章：高级 AsyncTask 与进度对话框**


    `代码清单 6-12. 使用进度对话框的 AsyncTask`


    ```java

    public class MyLongTask


    extends AsyncTask<String,Integer,Integer>


    implements OnCancelListener


    {


    private IReportBack r;


    private Context ctx;


    private String tag = null;


    private ProgressDialog pd = null;


    final private int PDMAX = 5;


    private int pd_progress = 0;


    MyLongTask(IReportBack inr, Context inCtx, String inTag)


    {


    r = inr;


    ctx = inCtx;


    tag = inTag;


    }


    protected void onPreExecute( )


    {


    //在主 UI 线程上运行


    Utils.logThreadSignature(this.tag);


    pd = newPDinstance(0);


    pd.show( );


    }


    protected void onProgressUpdate(Integer... progress)


    {


    //在主 UI 线程上运行


    Utils.logThreadSignature(this.tag);


    this.reportThreadSignature( );


    //将被多次调用


    //由 onPostExecute 触发


    Integer i = progress[0];


    r.reportBack(tag, "进度：" + i.toString( ));


    pd.setProgress(i);


    }


    protected void onPostExecute(Integer result)


    {


    //在主 UI 线程上运行


    Utils.logThreadSignature(this.tag);


    r.reportBack(tag, "onPostExecute 结果：" + result); pd.cancel( );


    r.allDone(0);


    }


    protected Integer doInBackground(String...strings)


    {


    //在工作线程上运行


    //如果有更多任务，甚至可以是一个线程池。


    Utils.logThreadSignature(this.tag);


    for(String s :strings)


    {


    Log.d(tag, "正在处理：" + s);


    }


    for (int i=0;i<PDMAX;i++)


    {


    Utils.sleepForInSecs(2);


    publishProgress(i+1);


    if(isCancelled( )) {


    Log.e(tag, "*** 此任务已被取消");


    break;


    }


    }


    return 1;


    }


    public void onCancelled(Integer result) {


    Log.d(tag, "AsyncTask 已被取消");


    r.allDone(1);


    }


    protected void reportThreadSignature( )


    {


    String s = Utils.getThreadSignature( );


    r.reportBack(tag,s);


    }


    public void onCancel(DialogInterface d)


    {


    r.reportBack(tag,"在对话框上调用了取消");


    // 因此，取消 AsyncTask


    this.cancel(false);


    }


    // 必须在活动结束前将进度对话框与活动分离，

    // 否则我们会得到一个窗口泄漏异常。


    public void dismissDialog( ) {


    if(pd != null) {


    pd_progress = pd.getProgress( );


    pd.dismiss( );


    }


    }


    // 当新活动出现时，需要关闭旧对话框并创建一个新对话框，

    // 但要保留最新的进度。


    public void setActivity(Context newCtx) {


    r = (IReportBack)newCtx;


    ctx = newCtx;


    pd = newPDinstance(pd_progress);


    pd.show( );


    }


    private ProgressDialog newPDinstance(int progress) {


    ProgressDialog newPD = new ProgressDialog(ctx);


    newPD.setTitle("标题");


    newPD.setMessage("正在处理...");


    newPD.setCancelable(true);


    newPD.setOnCancelListener(this);


    newPD.setIndeterminate(false);


    newPD.setProgressStyle(ProgressDialog.STYLE_HORIZONTAL);


    newPD.setMax(PDMAX);


    newPD.setProgress(progress);


    return newPD;


    }


    }

    ```'
- fmt: "# Advanced AsyncTask and Progress Dialogs\n\nThe `AsyncTask` in Listing 6-12\
    \ looks a lot like the earlier one from the beginning of this chapter. It handles\
    \ the management of its progress dialog so that it acts like a cohesive unit and\
    \ thereby doesn't contaminate the main activity with the details of this `AsyncTask`.\
    \ It does, however, use a new method in the `IReportBack` interface, to allow\
    \ this `AsyncTask` to tell the activity when it is finished. You will see in Listing\
    \ 6-13 that the activity uses the `allDone()` method to get rid of the retained\
    \ fragment that managed this `AsyncTask`. This is how the cleanup is done. You\
    \ should notice that the progress dialog gets instantiated in two different places:\
    \ in the `onPreExecute()` callback when the `AsyncTask` is starting up for the\
    \ first time, and in `setActivity()` when there's a new activity and therefore\
    \ a new dialog is required.\n\nWhen creating the progress dialog in `setActivity()`,\
    \ the last known progress value is used to start the dialog where it left off.\
    \ To ensure no memory leaks, the `dismissDialog()` method is provided to the retained\
    \ fragment so the dialog can be removed before the activity is destroyed.\n\n\
    The retained fragment knows the activity is going away because of its `onDetach()`\
    \ callback.\n\nListing 6-13 shows the activity that calls the retained fragment\
    \ to setup the `AsyncTask`. You should notice that there are no references to\
    \ an `AsyncTask` within the activity code, only the fragment is known to the activity.\n\
    \n## Listing 6-13. Activity that calls the Retained Fragment\n\n```java\npublic\
    \ class TestAsyncTaskDriverActivity extends Activity\n        implements IReportBack\n\
    {\n    public static final String tag = \"TestAsyncTaskDriverActivity\";\n   \
    \ private static final String ASYNCTASKFRAG = \"ASYNCTASKFRAG\";\n    private\
    \ AsyncTaskFragment atf = null;\n\n    @Override\n    public void onCreate(Bundle\
    \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n       \
    \ setContentView(R.layout.main);\n        if ((atf = (AsyncTaskFragment) getFragmentManager()\n\
    \                .findFragmentByTag(ASYNCTASKFRAG)) != null) {\n            //\
    \ we found an incomplete AsyncTask in the background\n            Log.d(tag, \"\
    Found an incomplete AsyncTask\");\n        }\n    }\n\n    @Override\n    public\
    \ boolean onCreateOptionsMenu(Menu menu) {\n        super.onCreateOptionsMenu(menu);\n\
    \        MenuInflater inflater = getMenuInflater();\n        inflater.inflate(R.menu.main_menu,\
    \ menu);\n        return true;\n    }\n\n    @Override\n    public boolean onOptionsItemSelected(MenuItem\
    \ item) {\n        appendMenuItemText(item);\n        if (item.getItemId() ==\
    \ R.id.menu_clear) {\n            this.emptyText();\n            return true;\n\
    \        }\n        if (item.getItemId() == R.id.menu_test_async1) {\n       \
    \     if (atf == null) {\n                atf = AsyncTaskFragment\n          \
    \              .newInstance(\"String1\", \"String2\", \"String3\");\n        \
    \        getFragmentManager().beginTransaction()\n                        .add(atf,\
    \ ASYNCTASKFRAG).commit();\n            }\n            return true;\n        }\n\
    \        return true;\n    }\n\n    private TextView getTextView() {\n       \
    \ return (TextView) this.findViewById(R.id.text1);\n    }\n\n    private void\
    \ appendMenuItemText(MenuItem menuItem) {\n        String title = menuItem.getTitle().toString();\n\
    \        TextView tv = getTextView();\n        tv.setText(tv.getText() + \"\\\
    n\" + title);\n    }\n\n    private void emptyText() {\n        TextView tv =\
    \ getTextView();\n        tv.setText(\"\");\n    }\n\n    private void appendText(String\
    \ s) {\n        TextView tv = getTextView();\n        tv.setText(tv.getText()\
    \ + \"\\n\" + s);\n        Log.d(tag, s);\n    }\n\n    public void reportBack(String\
    \ tag, String message) {\n        this.appendText(tag + \":\" + message);\n  \
    \      Log.d(tag, message);\n    }\n\n    public void reportTransient(String tag,\
    \ String message) {\n        String s = tag + \":\" + message;\n        Toast.makeText(this,\
    \ s, Toast.LENGTH_SHORT).show();\n        reportBack(tag, message);\n        Log.d(tag,\
    \ message);\n    }\n\n    public void allDone(int status) {\n        // Could\
    \ do various things based on the returned status\n        // but need to throw\
    \ away the fragment so we can do this\n        // again if needed.\n        Log.d(tag,\
    \ \"AsyncTask returned: \" + status);\n        getFragmentManager().beginTransaction()\n\
    \                .remove(atf).commitAllowingStateLoss();\n        atf = null;\n\
    \    }\n}\n```\n\nThere are really just three places that the activity deals with\
    \ the fragment."
