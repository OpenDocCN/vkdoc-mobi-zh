    \ `null` 值。\n\n## 理解 EditTextPreference\n\n偏好设置框架还提供了一种自由格式的文本偏好设置，称为 `EditTextPreference`。此偏好设置允许你捕获原始文本，而不是让用户进行选择。为了演示这一点，假设你有一个为用户生成\
    \ Java 代码的应用程序。该应用程序的一个偏好设置可能是为生成的类使用的默认包名。在这里，你想向用户显示一个文本字段来设置生成类的包名。图 4-5 显示了用户界面，清单\
