  trans: "\n这是一个非常简单的接口，如你所见。你只为该接口选择一个回调，且该回调必须由 Activity 实现。你的 Fragment 无需了解调用者\
    \ Activity 的具体细节，只需知道调用者 Activity 必须实现 `OnDialogDoneListener` 接口；因此，Fragment 可以调用此回调来与调用者\
    \ Activity 进行通信。根据 Fragment 的功能，该接口中可能包含多个回调。在本示例应用中，你将接口与 Fragment 类定义分开展示。\n\
    \n为了更便捷地管理代码，你可以将 Fragment 监听器接口嵌入 Fragment 类定义本身，这样更容易保持监听器与 Fragment 之间的同步。\n\
    \n## 对话框示例：`PromptDialogFragment`\n\n现在来看你的第一个 Fragment，`PromptDialogFragment`，其布局位于\
    \ `/res/layout/prompt_dialog.xml`，Java 代码在 `/src` 目录下的 `PromptDialogFragment.java`\
    \ 中。\n\n这个提示对话框的布局与你之前见过的许多布局类似。它包含一个作为提示信息的 `TextView`；一个用于接收用户输入的 `EditText`；以及三个按钮，分别用于保存输入、关闭（取消）对话框\
    \ Fragment，以及弹出帮助对话框。\n\n`PromptDialogFragment` 的 Java 代码开头与你之前的 Fragment 类似。你有一个\
    \ `newInstance()` 静态方法来创建新对象，在此方法中，你调用默认构造函数，构建一个参数 Bundle，并将其附加到新对象上。接下来，你在 `onAttach()`\
    \ 回调中有了新内容。你需要确保刚附加到的 Activity 已实现 `OnDialogDoneListener` 接口。为了测试这一点，你将传入的 Activity\
    \ 强制转换为 `OnDialogDoneListener` 接口。代码如下：\n\n```\ntry {\n    OnDialogDoneListener\
    \ test = (OnDialogDoneListener)act;\n}\ncatch(ClassCastException cce) {\n    //\
    \ 在这里优雅地处理失败情况。\n    Log.e(MainActivity.LOGTAG, \"Activity is not listening\"\
    );\n}\n```\n\n如果 Activity 没有实现此接口，则会抛出 `ClassCastException`。你可以捕获此异常并更优雅地处理它，但本示例保持代码尽可能简单。\n\
    \n接下来是 `onCreate()` 回调。与 Fragment 的常见情况一样，你在这里不构建用户界面，但可以设置对话框样式。这是对话框 Fragment\
    \ 特有的。你可以自行设置样式和主题，或者仅设置样式，同时使用主题值零（`0`），让系统为你选择合适的主题。代码如下：\n\n```\nint style\
    \ = DialogFragment.STYLE_NORMAL, theme = 0;\nsetStyle(style,theme);\n```\n\n在\
    \ `onCreateView()` 中，你为对话框 Fragment 创建视图层级。\n\n与其他 Fragment 类似，你不要将视图层级附加到传入的视图容器上（即，将\
    \ `attachToRoot` 参数设置为 `false`）。然后，你继续设置按钮回调，并将对话框提示文本设置为最初传递给 `newInstance()`\
    \ 的提示信息。最后，你检查是否有任何值通过保存状态 Bundle（`icicle`）传入。这表示你的 Fragment 正在被重新创建，很可能是由于配置变更，并且用户可能已经输入了一些文本。如果是这样，你需要用用户已输入的内容填充\
    \ `EditText`。请记住，由于配置已更改，内存中实际的视图对象与之前不同，因此你必须找到它并相应地设置文本。\n\n紧接着的下一个回调是 `onSaveInstanceState()`；这是你将用户当前输入的任何文本保存到保存状态\
    \ Bundle 中的地方。\n\n`onCancel()` 和 `onDismiss()` 回调未展示，因为它们仅执行日志记录；你可以在 Fragment\
    \ 的生命周期中看到这些回调何时触发。\n\n提示对话框 Fragment 中的最后一个回调是用于按钮的。再次，你获取对封闭 Activity 的引用，并将其强制转换为你期望\
    \ Activity 已实现的接口。如果用户按下“保存”按钮，你获取输入的文本并调用接口的回调 `onDialogDone()`。此回调接受此 Fragment\
    \ 的标签名称、一个表示此对话框 Fragment 是否已被取消的布尔值，以及一条消息，在此例中为用户输入的文本。以下是来自 `MainActivity`\
    \ 的代码：\n\n```\npublic void onDialogDone(String tag, boolean cancelled,\nCharSequence\
    \ message) {\n    String s = tag + \" responds with: \" + message;\n    if(cancelled)\n\
    \        s = tag + \" was cancelled by the user\";\n    Toast.makeText(this, s,\
    \ Toast.LENGTH_LONG).show();\n    Log.v(LOGTAG, s);\n}\n```\n\n为了完成对“保存”按钮点击的处理，你随后调用\
    \ `dismiss()` 来关闭对话框 Fragment。请记住，`dismiss()` 不仅会在视觉上使 Fragment 消失，还会将 Fragment\
    \ 从 Fragment 管理器中弹出，使其不再可用。\n\n如果按下的按钮是“关闭”，你再次调用接口回调，这次不带消息，然后调用 `dismiss()`。最后，如果用户按下了“帮助”按钮，你不想丢失提示对话框\
    \ Fragment，因此你需要采取一些不同的操作。我们之前描述过这一点。为了记住提示对话框 Fragment，以便稍后能返回，你需要创建一个 Fragment\
    \ 事务来移除提示对话框 Fragment，并使用 `show()` 方法添加帮助对话框 Fragment；这需要被添加到返回栈中。同时请注意，帮助对话框\
    \ Fragment 是如何通过引用资源 ID 来创建的。这意味着你的帮助对话框 Fragment 可以用于应用程序中可用的任何帮助文本。\n\n## 对话框示例：`HelpDialogFragment`\n\
    \n你创建了一个 Fragment 事务，从提示对话框 Fragment 转到帮助对话框 Fragment，并将该 Fragment 事务放入了返回栈。这会使得提示对话框\
    \ Fragment 从视图中消失，但它仍然可以通过 Fragment 管理器和返回栈访问。新的帮助对话框 Fragment 会出现在其位置，允许用户阅读帮助文本。当用户关闭帮助对话框\
    \ Fragment 时，Fragment 返回栈的条目会被弹出，导致帮助对话框 Fragment 被关闭（从视觉上和 Fragment 管理器中移除），同时提示对话框\
    \ Fragment 恢复显示。\n\n这是实现这一切非常简单的方法。它非常简单却又非常强大；即使在显示这些对话框时用户旋转设备，它也能正常工作。\n\n\
    查看 `HelpDialogFragment.java` 文件及其布局（`help_dialog.xml`）的源代码。此对话框 Fragment 的目的是显示帮助文本。\n\
    \n布局包含一个 `TextView` 和一个“关闭”按钮。Java 代码应该开始让你感到熟悉了。有一个 `newInstance()` 方法用于创建新的帮助对话框\
    \ Fragment，一个 `onCreate()` 方法用于设置样式和主题，以及一个 `onCreateView()` 方法用于构建视图层级。在这个特定情况下，你需要定位一个字符串资源来填充\
    \ `TextView`，因此你通过 Activity 访问资源，并选择传递给 `newInstance()` 的资源 ID。最后，`onCreateView()`\
    \ 设置一个按钮点击处理器来捕获“关闭”按钮的点击。在此例中，你不需要在关闭时执行任何特殊操作。\n"
- fmt: '# Dialog Fragment 调用方式


    此片段通过两种方式被调用：从 Activity 以及从提示对话框片段调用。当此帮助对话框片段从主 Activity 显示时，关闭它只会将片段从栈顶弹出，并显示底下的主
    Activity。当此帮助对话框片段从提示对话框片段显示时，由于帮助对话框片段是返回栈上片段事务的一部分，关闭它会导致片段事务被回滚，这会使帮助对话框片段弹出，但恢复提示对话框片段。用户会看到提示对话框片段重新出现。


    ## Dialog 示例：`AlertDialogFragment`


    在本示例应用中，我们还有最后一个对话框片段要展示：警报对话框片段。虽然你可以用类似于帮助对话框片段的方式创建警报对话框片段，但也可以使用已在多个 Android
    版本中运行良好的旧版 `AlertBuilder` 框架来创建对话框片段。请查看 `AlertDialogFragment.java` 中的源代码。


    你不需要为这个片段提供布局，因为 `AlertBuilder` 会帮你处理。请注意，此对话框片段开始时与其他片段无异，但你没有 `onCreateView()`
    回调，而是有 `onCreateDialog()` 回调。你需要实现 `onCreateView()` 或 `onCreateDialog()` 之一，但不能同时实现两者。`onCreateDialog()`
    的返回值不是视图，而是一个对话框。


    值得注意的是，要获取对话框的参数，你应该访问参数包（arguments bundle）。在本示例应用中，你只对警报消息这样做，但也可以通过参数包访问其他参数。


    另请注意，对于这种类型的对话框片段，你的片段类需要实现 `DialogInterface.OnClickListener`，这意味着你的对话框片段必须实现
    `onClick()` 回调。当用户对嵌入的对话框进行操作时，会触发此回调。再次强调，你会获得触发对话框的引用以及被按下的按钮指示。与之前一样，你应该小心不要依赖
    `onDismiss()`，因为当设备配置发生变化时，它可能会被触发。


    ## Dialog 示例：嵌入式对话框


    你可能已经注意到 `DialogFragment` 还有一个特性。在应用的主布局中，文本下方有一个 `FrameLayout`，可用于容纳对话框。在应用的菜单中，最后一项会导致一个片段事务将
    `PromptDialogFragment` 的新实例添加到主屏幕。无需任何修改，对话框片段就可以嵌入在主布局中显示，并且其功能符合预期。


    此技术的一个不同之处在于，显示嵌入对话框的代码与显示弹出对话框的代码不同。嵌入对话框的代码如下所示：


    ```

    ft.add(R.id.embeddedDialog, pdf, EMBED_DIALOG_TAG);

    ft.commit();

    ```


    这与第 1 章中我们在 `FrameLayout` 中显示片段时的代码完全相同。然而，这次你需要确保传入一个标签名称，当对话框片段通知你的 Activity
    用户输入时，会使用这个标签名称。


    ## Dialog 示例：观察结果


    当你运行此示例应用时，请确保在设备的不同方向下尝试所有菜单选项。在对话框片段显示时旋转设备。你应该会满意地看到对话框会随着旋转而移动；你无需担心因配置变化而编写大量代码来保存和恢复片段。


    我们希望你欣赏的另一件事是，片段与 Activity 之间可以轻松通信。当然，Activity 拥有或可以获取对所有可用片段的引用，因此它可以访问片段本身暴露的方法。这并不是片段与
    Activity 之间通信的唯一方式。你可以'
  raw: 'This fragment is cal ed two ways: from the activity and from the prompt dialog
    fragment. When this help dialog fragment is shown from the main activity, dismissing
    it simply pops the fragment off the top and reveals the main activity underneath.
    When this help dialog fragment is shown from the prompt dialog fragment, because
    the help dialog fragment was part of a fragment transaction on the back stack,
    dismissing it causes the fragment transaction to be rol ed back, which pops the
    help dialog fragment but restores the prompt dialog fragment. The user sees the
    prompt dialog fragment reappear.


    Dialog Sample: AlertDialogFragment


    We have one last dialog fragment to show you in this sample application: the alert
    dialog fragment. Although you could create an alert dialog fragment in a way similar
    to the help dialog fragment, you can also create a dialog fragment using the old
    AlertBuilder framework that has worked for many releases of Android. Look at the
    source code in AlertDialogFragment.java.


    You don’t need a layout for this one because the AlertBuilder takes care of that
    for you. Note that this dialog fragment starts out like any other, but instead
    of an onCreateView() callback, you have a onCreateDialog() callback. You implement
    either onCreateView() or onCreateDialog() but not both. The return from onCreateDialog()
    is not a view; it’s a dialog.


    Of interest here is that to get parameters for the dialog, you should be


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **58**


    **CHAPTER 3: Working with Dialogs**


    accessing your arguments bundle. In this example application, you only do this
    for the alert message, but you could access other parameters through the arguments
    bundle as well.


    Notice also that with this type of dialog fragment, you need your fragment class
    to implement the DialogInterface.OnClickListener, which means your dialog fragment
    must implement the onClick() callback. This callback is fired when the user acts
    on the embedded dialog. Once again, you get a reference to the dialog that fired
    and an indication of which button was pressed. As before, you should be careful
    not to depend on an onDismiss() because this could fire when there is a device
    configuration change.


    Dialog Sample: Embedded Dialogs


    There’s one more feature of a DialogFragment that you may have noticed. In the
    main layout for the application, under the text, is a FrameLayout that can be
    used to hold a dialog. In the application’s menu, the last item causes a fragment
    transaction to add a new instance of a PromptDialogFragment to the main screen.
    Without any modifications, the dialog fragment can be displayed embedded in the
    main layout, and it functions as you would expect.


    One thing that is different about this technique is that the code to show the
    embedded dialog is not the same as the code to do a pop-up dialog. The embedded
    dialog code looks like this:


    ft.add(R.id.embeddedDialog, pdf, EMBED_DIALOG_TAG);


    ft.commit();


    This looks just the same as in Chapter 1, when we displayed a fragment in a FrameLayout.
    This time, however, you make sure to pass in a tag name, which is used when the
    dialog fragment notifies your activity of the user’s input.


    Dialog Sample: Observations


    When you run this sample application, make sure you try all the menu options in
    different orientations of the device. Rotate the device while the dialog fragments
    are displayed. You should be pleased to see that the dialogs go with the rotations;
    you do not need to worry about a lot of code to manage the saving and restoring
    of fragments due to configuration changes.


    The other thing we hope you appreciate is the ease with which you can communicate
    between the fragments and the activity. Of course, the activity has references,
    or can get references, to all the available fragments, so it can access methods
    exposed by the fragments themselves. This isn’t the only way to communicate between
    fragments and the activity. You can


