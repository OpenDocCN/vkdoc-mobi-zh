    \            ft.commit();\n        }\n        // The rest was left out to save\
    \ space.\n    }\n}\n```\n\n一个关键的概念需要理解：Fragment 必须生存于视图容器（也称为*视图组*）之中。`ViewGroup`类包括布局及其派生类。在\
    \ Activity 的`main.xml`布局文件中，`FrameLayout`是作为详情 Fragment 容器的理想选择。`FrameLayout`很简单，您只需要一个简单的容器来容纳\
    \ Fragment，而不需要其他类型布局带来的额外负担。`FrameLayout`就是详情 Fragment 将要放置的位置。\n\n如果您在 Activity\
