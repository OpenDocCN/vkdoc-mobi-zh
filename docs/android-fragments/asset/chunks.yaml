    \        pd = new ProgressDialog(ctx);\n        pd.setTitle(\"标题\");\n       \
    \ pd.setMessage(\"进行中...\");\n        pd.setCancelable(true);\n        pd.setOnCancelListener(this);\n\
    \        pd.setIndeterminate(false);\n        pd.setProgressStyle(ProgressDialog.STYLE_HORIZONTAL);\n\
    \        pd.setMax(5);\n        pd.show( );\n    }\n\n    public void onCancel(DialogInterface\
    \ d) {\n        r.reportBack(tag,\"对话框上调用了取消\");\n        this.cancel(true);\n\
    \    }\n    //..取自清单 6-5 的其他代码\n}\n```\n\n请注意我们在清单 6-9 中是如何准备进度对话框的。在此例中，我们没有像在清单\
    \ 6-5 中那样对进度对话框使用静态方法 `show()`。相反，我们显式地实例化了进度对话框。变量 `ctx` 代表此 UI 进度对话框操作的上下文（或活动）。然后我们单独设置了对话框的属性，包括其确定性或不确定性行为。方法\
    \ `setMax()` 指示进度对话框有多少步。当触发对话框取消时，我们还将自身引用（`AsyncTask` 本身）作为监听器传递。在取消回调中，我们显式地对\
    \ `AsyncTask` 发出取消命令。带有布尔参数 `false` 的 `cancel()` 方法将在 `AsyncTask` 上设置一个标志，可通过\
    \ `isCancelled()` 进行查询。\n\n`doInBackground()` 方法应定期检查 `isCancelled()`，以便在被取消时优雅地提前结束。布尔参数\
    \ `true` 将强制停止工作线程。\n\n## AsyncTask 与线程池\n\n考虑清单 6-10 中的代码，其中菜单项依次调用了两个 `AsyncTasks`。\n\
    \n*清单 6-10. 调用两个长时间运行的任务*\n\n```\nvoid respondToMenuItem( ) {\n    MyLongTask\
    \ mlt = new MyLongTask(this.mReportTo,this.mContext,\"任务 1\");\n    mlt.execute(\"\
    String1\",\"String2\",\"String3\");\n    MyLongTask mlt1 = new MyLongTask(this.mReportTo,this.mContext,\"\
    任务 2\");\n    mlt1.execute(\"String1\",\"String2\",\"String3\");\n}\n```\n\n这里我们在主线程上执行两个任务。您可能期望这两个任务几乎同时启动。然而，默认行为是这些任务使用从线程池中取出单个线程来顺序执行。如果您想要并行执行，可以在\
    \ `AsyncTask` 上使用 `executeOnExecutor()` 方法。有关此方法的详细信息，请参阅 `AsyncTask` 的参考文档。此外，根据\
    \ SDK 文档，在单个 `AsyncTask` 上多次调用 `execute()` 方法是无效的。如果您需要这种行为，则必须实例化一个新任务并再次调用 `execute()`\
    \ 方法。\n\n## 正确显示 AsyncTask 进度的问题与解决方案\n\n如果您本章的主要目标只是学习 `AsyncTask` 的基本知识，那么到目前为止我们所涵盖的内容已经足够。然而，当\
    \ `AsyncTask` 与进度对话框配对使用时，会存在一些问题，如前文清单所示。其中一个问题是，当设备旋转时，`AsyncTask` 会丢失正确的活动引用，从而也丢失对进度对话框的引用。另一个问题是，我们之前在代码中使用的进度对话框不是托管对话框。\n\
    \n现在让我们来理解这些问题。\n\n### 处理活动指针与设备旋转"
- fmt: "`AsyncTask`持有的活动指针在因配置变更而重新创建活动时会变得过时。这是因为Android已经创建了一个新活动，而旧活动不再显示在屏幕上。因此，持有旧活动及其对应的对话框会带来几个问题。首先，用户看不到`AsyncTask`试图更新的那个活动或对话框。其次，旧活动需要被垃圾回收，但由于`AsyncTask`持有对它的引用，你将阻止它被回收。即使你聪明地使用Java弱引用来引用旧活动，虽然不会发生内存泄漏，但你会得到一个空指针异常。过时指针的问题不仅适用于活动指针，也适用于任何间接指向该活动的指针。\n\
    \n解决过时活动引用问题的推荐方法是使用无头保留片段（在第1章中介绍了片段。保留片段是指当活动因配置变更而重新创建时仍然存在的片段。这些片段也被称为无头片段，因为它们不一定需要持有任何用户界面）。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第6章：高级AsyncTask和进度对话框**\
    \ **103**\n\n处理托管对话框\n\n即使我们能够解决过时活动引用问题并重新建立与当前活动的连接，本章到目前为止使用进度对话框的方式也存在缺陷。我们直接实例化了一个`ProgressDialog`。以这种方式创建的`ProgressDialog`并不是一个“托管”对话框。如果它不是一个托管对话框，当设备发生旋转或任何其他配置变更时，活动将不会重新创建该对话框。因此，当设备旋转时，`AsyncTask`仍在继续运行，但对话框将不会显示。有几种方法可以解决这个问题。推荐的方法是不使用进度对话框，而是在活动本身中使用一个嵌入式UI控件，例如进度条。因为进度条是活动视图层次结构的一部分，希望它能够被重新创建。尽管进度条听起来不错，但有时模态进度对话框更有意义。例如，当你不希望用户在`AsyncTask`运行时与活动的任何其他部分进行交互时，就会出现这种情况。在这些情况下，我们认为使用片段对话框而不是进度条几乎没有矛盾。\n\
    \n你接下来将看到的解决方案使用一个保留的非UI片段加上一个进度对话框，当活动因配置变更而重新创建时，该对话框会根据需要重新创建。你可能选择实现进度指示器的其他方式，它们也可以使用类似的技术。\n\
    \n行为良好的进度对话框的测试场景\n\n无论你使用哪种解决方案来为`AsyncTask`正确显示进度对话框，该解决方案都应在以下所有测试场景中正常工作：\n\
    1.  在没有方向变更的情况下，进度对话框必须启动、显示进度、结束，并清理对`AsyncTask`的引用。这必须能够重复工作，以证明没有残留上次运行的痕迹。\n\
    2.  该解决方案应能处理任务执行中途的方向变更。旋转应重新创建对话框并从上次中断的地方显示进度。对话框应正确结束并清理`AsyncTask`引用。这必须能够重复工作，以证明没有残留任何痕迹。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**104** **第6章：高级AsyncTask和进度对话框**\n\
    \n3.  即使任务正在执行中途，也应当允许按Home键返回桌面。\n4.  按Home键返回桌面后重新访问活动，应显示对话框并正确反映当前进度，并且进度不应低于之前的进度。\n\
    5.  按Home键返回桌面后，当任务在返回前完成时，这也应能正常工作。对话框应被正确关闭，并且移除`AsyncTask`引用。\n\n所有处理`AsyncTask`的活动都应始终执行这组测试用例。既然我们已经阐述了解决方案应如何满足要求，接下来展示一个使用保留片段和进度对话框的解决方案。\n\
    \n使用保留片段和进度对话框\n\n在这个解决方案中，我们将向你展示如何使用一个保留片段和一个进度对话框来为`AsyncTask`正确显示进度。该解决方案涉及以下步骤：\n\
    \n1.  活动必须跟踪非UI片段。这个外部片段必须持续存在，并且在活动关闭和重新返回时验证其引用。这个保留片段持有对`AsyncTask`的引用。\n2.\
    \  然后，一个保留片段将拥有指向`AsyncTask`的指针，并且可以在活动创建和销毁时，在`AsyncTask`上设置和重置活动指针。因此，这个保留片段充当了活动与`AsyncTask`之间的中介。\n\
    3.  然后，`AsyncTask`将实例化一个进度对话框。`AsyncTask`将使用由保留片段设置的活动指针来完成此操作，因为你需要一个活动来创建进度对话框。\n\
    4.  `AsyncTask`将在设备旋转时重新创建对话框并正确保持其状态。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**第6章：高级AsyncTask和进度对话框** **105**\n\n5.  用户可以通过点击Home键返回桌面并使用其他应用。这将把我们的活动及其对话框推到后台。这必须得到处理。当用户返回活动或应用时，对话框可以继续显示进度。如果任务在活动隐藏时完成，`AsyncTask`必须知道如何关闭对话框。\n\
    \n探索关键代码片段\n\n现在，我们将展示用于实现所述方法的关键代码片段。其余的实现可以在本章的可下载项目`AndroidFragments_Ch06_TestAsyncTask2.zip`中找到。清单6-11首先展示了保留片段的源代码。该片段代表活动管理`AsyncTask`。\n\
    \n*清单6-11. 使用保留的非UI片段管理AsyncTask*\n\n```java\npublic class AsyncTaskFragment extends\
    \ Fragment {\n\n    private static final String tag = \"AsyncTaskFragment\";\n\
    \    private TestAsyncTaskDriverActivity ctx = null;\n    private MyLongTask mlt\
    \ = null;\n\n    public static AsyncTaskFragment newInstance(String... params)\
    \ {\n        AsyncTaskFragment myMF = new AsyncTaskFragment();\n        Bundle\
    \ bundle = new Bundle();\n        bundle.putStringArray(\"params\", params);\n\
    \        myMF.setArguments(bundle);\n        return myMF;\n    }\n\n    @Override\n\
    \    public void onAttach(Activity activity) {\n        super.onAttach(activity);\n\
    \        ctx = (TestAsyncTaskDriverActivity) activity;\n        if (mlt != null\
    \ && mlt.getStatus() != AsyncTask.Status.FINISHED) {\n            // 我们有一个未完成的任务，确保它有正确的活动\n\
    \            mlt.setActivity(activity);\n        } else {\n            mlt = new\
    \ MyLongTask(ctx, ctx, \"Task1\");\n            String[] params = this.getArguments().getStringArray(\"\
    params\");\n            mlt.execute(params);\n        }\n    }\n\n    @Override\n\
    \    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
    \        setRetainInstance(true);\n    }\n\n    // 当活动将要销毁时，确保关闭对话框（如果它存在的话）。\n\
    \    @Override\n    public void onDetach() {\n        super.onDetach();\n    \
    \    Log.d(tag, \"calling for dismissal of the dialog\");\n        if (mlt !=\
    \ null) {\n            mlt.dismissDialog();\n        }\n    }\n}\n```"
  raw: 'The activity pointer that is held by the AsyncTask becomes stale when the
    activity is re-created because of a configuration change. This is because Android
    has created a new activity and the old activity is no longer shown on the screen.
    So holding on to the old activity and its corresponding dialog is bad for a couple
    of reasons. The first is that the user is not seeing that activity or dialog that
    the AsyncTask is trying to update. The second reason is that the old activity
    needs to be garbage collected and you are stopping it from getting garbage collected
    because the AsyncTask is holding on to its reference. If you were to be smart
    and use a Java weak reference for the old activity, then you wouldn’t leak memory
    but you would get a null pointer exception. The case of a stale pointer is true
    not only of the activity pointer but any other pointer that indirectly points
    to the activity.


    The recommended way to address the stale activity reference issue is to use headless
    retained fragments. (Fragments are covered in Chapter 1. Retained fragments are
    fragments that stay around while the activity is re-created due to a configuration
    change. These fragments are also called headless because they don’t necessarily
    have to hold any UI.)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 6: Advanced AsyncTask and Progress Dialogs** **103**


    Dealing with Managed Dialogs


    Even if we are able to solve the stale activity reference issue and reestablish
    the connectivity to the current activity, there is a flaw in the way progress
    dialogs were used so far in this chapter. We have instantiated a ProgressDialog
    directly. A ProgressDialog created in this manner is not a


    “managed” dialog. If it is not a managed dialog, the activity wil not re-create
    the dialog when the device undergoes rotation or any other configuration change.
    So, when the device rotates the AsyncTask is still running uninterrupted but the
    dialog will not show up. There are a couple of ways to solve this problem as wel
    . The recommended way is not to use progress dialogs but instead use an embedded
    UI control in the activity itself, such as a progress bar. Because a progress
    bar is part of the activity view hierarchy, the hope is that it wil be re-created.
    Although a progress bar sounds good, there are times when a modal progress dialog
    makes more sense. For example, that would be the case if you don’t want the user
    to interact with any other part of the activity while the AsyncTask is running.
    In those cases, we see little contradiction in using fragment dialogs instead
    of progress bars.


    The solution you will see next uses a retained non-UI fragment plus a progress
    dialog that is recreated as necessary if and when the activity is recreated due
    to a configuration change. There are other ways that you might choose to implement
    a progress indicator, and they could use a similar technique.


    Testing Scenarios for a Well-Behaved Progress


    Dialog


    Whichever solution you use to correctly display a progress dialog for an AsyncTask,
    the solution should work in all of the following test scenarios: 1\. Without an
    orientation change the progress dialog


    must start, show its progress, end, and also clean


    up the reference to the AsyncTask. This must work


    repeatedly to show that there are no vestiges left


    from the previous run.


    2\. The solution should handle the orientation changes


    while the task is in the middle of its execution.


    The rotation should re-create the dialog and show


    progress where it left off. The dialog should properly


    finish and clean up the AsyncTask reference. This


    must work repeatedly to show that there are no


    vestiges left behind.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **104**


    **CHAPTER 6: Advanced AsyncTask and Progress Dialogs**


    3\. Going Home should be allowed even when the task


    is in the middle of execution.


    4\. Going Home and revisiting the activity should show


    the dialog and correctly reflect the current progress,


    and the progress should never be less than the


    one before.


    5\. Going Home and revisiting the activity also should


    work when the task finishes before returning.


    The dialog should be properly dismissed and the


    AsyncTask reference removed.


    This set of test cases should always be performed for all activities dealing with
    AsyncTasks. Now that we have laid out how a solution should satisfy, let’s show
    one that uses a retained fragment and progress dialog.


    Using a Retained Fragment and a Progress Dialog


    In this solution, let’s show you how to use a retained fragment and a progress
    dialog for displaying progress correctly for an AsyncTask. This solution involves
    the following steps:


    1\. The activity must keep track of non-UI fragment.


    This external fragment must stick around and its


    reference validated as the activity is closed and


    brought back. This retained fragment holds a


    reference to the AsyncTask.


    2\. A retained fragment then will have a pointer to the


    AsyncTask and can set and reset the activity pointer


    on AsyncTask as the activity comes and goes. So,


    this retained fragment acts as an intermediary


    between the activity and the AsyncTask.


    3\. The AsyncTask then will instantiate a progress dialog.


    The AsyncTask will use the activity pointer that is set


    by the retained fragment to accomplish this, as you


    will need an activity to create a progress dialog.


    4\. The AsyncTask will re-create the dialog as the device


    rotates and keeps its state properly.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 6: Advanced AsyncTask and Progress Dialogs** **105**


    5\. A user can go Home by tapping Home and use other


    apps. This will push our activity, and the dialog with


    it, into the background. This must be handled. When


    the user returns to the activity or app, the dialog can


    continue to show the progress. The AsyncTask must


    know how to dismiss the dialog if the task finishes


    while the activity is hidden.


    Exploring Key Code Snippets


    We will present now the key pieces of code that are used to implement the outlined
    approach. The rest of the implementation can be found in the downloadable project
    AndroidFragments_Ch06_TestAsyncTask2.zip for this chapter. Listing 6-11 presents
    the source code of the retained fragment first.


    This fragment manages the AsyncTask on behalf of the activity.


    *Listing 6-11\. Managing an AsyncTask with a Retained non-UI Fragment* public
    class AsyncTaskFragment extends Fragment {


    private static final String tag = "AsyncTaskFragment"; private TestAsyncTaskDriverActivity
    ctx = null;


    private MyLongTask mlt = null;


    public static AsyncTaskFragment newInstance(String... params) {


    AsyncTaskFragment myMF = new AsyncTaskFragment( );


    Bundle bundle = new Bundle( );


    bundle.putStringArray("params", params);


    myMF.setArguments(bundle);


    return myMF;


    }


    @Override


    public void onAttach(Activity activity) {


    super.onAttach(activity);


    ctx = (TestAsyncTaskDriverActivity) activity;


    if(mlt != null &&


    mlt.getStatus( ) != AsyncTask.Status.FINISHED) {


    // we must have an incomplete task, make


    // sure it has the correct activity


    mlt.setActivity(activity);


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **106**


    **CHAPTER 6: Advanced AsyncTask and Progress Dialogs**


    else {


    mlt = new MyLongTask(ctx, ctx, "Task1");


    String[] params = this.getArguments( )


    .getStringArray("params");


    mlt.execute(params);


    }


    }


    @Override


    public void onCreate(Bundle savedInstanceState) {


    super.onCreate(savedInstanceState);


    setRetainInstance(true);


    }


    // When the activity is going away, make sure


    // to dismiss the dialog if it''s there.


    @Override


    public void onDetach( ) {


    super.onDetach( );


    Log.d(tag, "calling for dismissal of the dialog");


    if(mlt != null) {


    mlt.dismissDialog( );


    }


    }


