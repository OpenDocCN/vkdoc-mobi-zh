    # 第 4 章：管理偏好设置与保存状态


    ## 理解 `CheckBoxPreference` 和 `SwitchPreference`


    最简单的偏好设置是 `CheckBoxPreference` 和 `SwitchPreference`。它们共享同一个父类（`TwoStatePreference`），状态要么是开启（值为
    `true`），要么是关闭（值为 `false`）。在示例应用中，我们创建了一个包含五个 `CheckBoxPreference` 的屏幕，如图 4-3 所示。


    清单 4-2 展示了 `CheckBoxPreference` 的 XML 代码。


    **图 4-3.** 复选框偏好设置的用户界面


    **清单 4-2.** 使用 `CheckBoxPreference`


    ```xml

    <CheckBoxPreference

    android:key="show_airline_column_pref"

    android:title="Airline"

    android:summary="Show Airline column" />

    ```


    **注意** 我们将在本章末尾提供一个 URL，您可以通过它下载本章的项目文件。这样您就可以直接将项目导入 IDE 中。主要的示例应用名为 `PrefDemo`。在阅读“保存状态”部分之前，请参考该项目。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    此示例展示了定义偏好设置所需的最少内容。`key` 是偏好设置的引用名称，`title` 是偏好设置显示的标题，`summary` 是对偏好设置用途或当前状态的描述。回顾清单
    4-1 中保存的值，您会看到 `"show_airline_column_pref"`（即 `key`）对应的 `<boolean>` 标签，其属性值为 `true`，表示该偏好设置已被勾选。


    对于 `CheckBoxPreference`，当用户设定状态后，偏好设置的状态会立即保存。换句话说，当用户勾选或取消勾选偏好控制项时，其状态会立刻保存。


    `SwitchPreference` 与之非常相似，只是视觉显示不同。用户界面中不再是复选框，而是显示一个开关（如图 4-1 中“通知”旁边的开关）。


    `CheckBoxPreference` 和 `SwitchPreference` 另一个有用的功能是：您可以根据偏好是否被勾选，设置不同的摘要文本。对应的
    XML 属性是 `summaryOn` 和 `summaryOff`。如果您查看 `main.xml` 文件中名为 `"potato_selection_pref"`
    的 `CheckBoxPreference`，会看到一个示例。


    在学习其他偏好类型之前，现在正是理解如何访问该偏好设置以读取其值并执行其他操作的好时机。


    ## 在代码中访问偏好设置的值


    既然您已经定义了偏好设置，就需要知道如何在代码中访问它以便读取其值。清单 4-3 展示了访问 Android 中存储偏好设置的 `SharedPreferences`
    对象的代码。这段代码来自 `MainActivity.java` 文件的 `setOptionText()` 方法。


    **清单 4-3.** 访问 `CheckBoxPreference`


    ```java

    SharedPreferences prefs =

    PreferenceManager.getDefaultSharedPreferences(this);

    // 这是获取共享偏好设置的另一种方式：

    // SharedPreferences prefs = getSharedPreferences(

    // "com.androidbook.preferences.main_preferences", 0);

    boolean showAirline = prefs.getBoolean("show_airline_column_pref", false);

    ```


    通过偏好设置的引用，可以轻松读取 `show_airline_column_pref` 偏好设置的当前值。如清单 4-3 所示，有两种方式可以获取偏好设置。第一种方式显示的是获取当前上下文的默认偏好设置，这里的上下文是应用中
    `MainActivity` 的上下文。第二种方式（注释部分）通过包名来检索偏好设置。

