- fmt: '# The `onViewCreated()` Callback


    This one is called right after `onCreateView()` but before any saved state has
    been put into the UI. The view object passed in is the same view object that got
    returned from `onCreateView()`.


    # The `onActivityCreated()` Callback


    You’re now getting close to the point where the user can interact with your fragment.
    The next callback is `onActivityCreated()`. This is called after the activity
    has completed its `onCreate()` callback. You can now trust that the activity’s
    view hierarchy, including your own view hierarchy if you returned one earlier,
    is ready and available. This is where you can do final tweaks to the user interface
    before the user sees it. It’s also where you can be sure that any other fragment
    for this activity has been attached to your activity.


    # The `onViewStateRestored()` Callback


    This one is relatively new, introduced with JellyBean 4.2. Your fragment will
    have this callback called when the view hierarchy of this fragment has all state
    restored (if applicable). Previously you had to make decisions in `onActivityCreated()`
    about tweaking the UI for a restored fragment. Now you can put that logic in this
    callback knowing definitely that this fragment is being restored from a saved
    state.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 1: Fragments Fundamentals**


    # The `onStart()` Callback


    The next callback in your fragment life cycle is `onStart()`. Now your fragment
    is visible to the user. But you haven’t started interacting with the user just
    yet. This callback is tied to the activity’s `onStart()`. As such, whereas previously
    you may have put your logic into the activity’s `onStart()`, now you’re more likely
    to put your logic into the fragment’s `onStart()`, because that is also where
    the user interface components are.


    # The `onResume()` Callback


    The last callback before the user can interact with your fragment is `onResume()`.
    This callback is tied to the activity’s `onResume()`. When this callback returns,
    the user is free to interact with this fragment. For example, if you have a camera
    preview in your fragment, you would probably enable it in the fragment’s `onResume()`.


    So now you’ve reached the point where the app is busily making the user happy.
    And then the user decides to get out of your app, either by Back’ing out, or by
    pressing the Home button, or by launching some other application. The next sequence,
    similar to what happens with an activity, goes in the opposite direction of setting
    up the fragment for interaction.


    # The `onPause()` Callback


    The first undo callback on a fragment is `onPause()`. This callback is tied to
    the activity’s `onPause()`; just as with an activity, if you have a media player
    in your fragment or some other shared object, you could pause it, stop it, or
    give it back via your `onPause()` method. The same good-citizen rules apply here:
    you don’t want to be playing audio if the user is taking a phone call.


    # The `onSaveInstanceState()` Callback


    Similar to activities, fragments have an opportunity to save state for later reconstruction.
    This callback passes in a `Bundle` object for this fragment to be used as the
    container for whatever state information you want to hang onto. This is the saved-state
    bundle passed to the callbacks covered earlier.


    To prevent memory problems, be careful about what you save into this bundle. Only
    save what you need. If you need to keep a reference to another fragment, don’t
    try to save or put the other fragment, rather just save the identifier for the
    other fragment such as its tag or ID. When this fragment runs `onViewStateRestored()`,
    then you could re-establish connections to the other fragments that this fragment
    depends on.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 1: Fragments Fundamentals**


    Although you may see this method usually called right after `onPause()`, the activity
    to which this fragment belongs calls it when it feels that the fragment’s state
    should be saved. This can occur any time before `onDestroy()`.


    # The `onStop()` Callback'
