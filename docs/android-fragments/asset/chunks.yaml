    [http://www.androidbook.com](http://www.androidbook.com). Here you will find links
    to source code, links to downloadable projects, key feedback from readers, full
    contact information, future notifications, errata, news on our future projects,
    a reading guide, and additional resources.


    We truly hope that you enjoy our book, and we welcome your feedback.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    Chapter


    Fragments


    Fundamentals


    For the first two major releases of Android, small screens were it. Then came
    the Android tablets: devices with screen sizes of 10”. And that complicated things.
    Why? Because now there was so much screen real estate that a simple activity had
    a hard time filling a screen while at the same time keeping to a single function.
    It no longer made sense to have an e-mail application that showed only headers
    in one activity (filling a large screen), and a separate activity to show an individual
    e-mail (also filling a large screen). With that much room to work with, an application
    could show a list of e-mail headers down the left side of the screen and the selected
    e-mail contents on the right side of the screen. Could it be done in a single
    activity with a single layout? Well, yes, but you couldn’t reuse that activity
    or layout for any of the smaller-screen devices.


    One of the core classes introduced in Android 3.0 was the Fragment class, especially
    designed to help developers manage application functionality so it would provide
    great usability as well as lots of reuse. This chapter will introduce you to the
    fragment, what it is, how it fits into an application’s architecture, and how
    to use it. Fragments make a lot of interesting things possible that were difficult
    before. At about the same time, Google released a fragment SDK that works on old
    Androids. So even if you weren’t interested in writing applications for tablets,
    you may have found that fragments made your life easier on non-tablet devices.
    Now it’s easier than ever to write great applications for smartphones and tablets
    and even TVs and other devices.


    Let’s get started with Android fragments.


    **1**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **2**


    **CHAPTER 1: Fragments Fundamentals**


    What Is a Fragment?


    This first section will explain what a fragment is and what it does. But first,
    let’s set the stage to see why we need fragments. As you learned earlier, an Android
    application on small-screen devices uses activities to show data and functionality
    to a user, and each activity has a fairly simple, well-defined purpose. For example,
    an activity might show the user a list of contacts from their address book. Another
    activity might allow the user to type an e-mail.


    The Android application is the series of these activities grouped together to
    achieve a larger purpose, such as managing an e-mail account via the reading and
    sending of messages. This is fine for a small-screen device, but when the user’s
    screen is very large (10” or larger), there’s room on the screen to do more than
    just one simple thing. An application might want to let the user view the list
    of e-mails in their inbox and at the same time show the currently selected e-mail
    text next to the list. Or an application might want to show a list of contacts
    and at the same time show the currently selected contact in a detail view.


    As an Android developer, you know that this functionality could be accomplished
    by defining yet another layout for the xlarge screen with ListViews and layouts
    and al sorts of other views. And by “yet another layout” we mean layouts in addition
    to those you’ve probably already defined for the smaller screens. Of course, you’ll
    want to have separate layouts for the portrait case as well as the landscape case.
    And with the size of an xlarge screen, this could mean quite a few views for al
    the labels and fields and images and so on that you’l need to lay out and then
    provide code for. If only there were a way to group these view objects together
    and consolidate the logic for them, so that chunks of an application could be
    reused across screen sizes and devices, minimizing how much work a developer has
    to do to maintain their application. And that is why we have fragments.'
