- fmt: "# 排版后的文本\n\nAll the background work carried out by the `AsyncTask` is done\
    \ in the `doInBackground()` method. This method is orchestrated by the `AsyncTask`\
    \ to run on a worker thread. As a result, this work is allowed to take more than\
    \ five seconds, unlike the work done on a main thread.\n\nIn our example from\
    \ Listing 6-5, in the `doInBackground()` method we simply retrieve each of the\
    \ input strings to the task as if they are an array. In this method definition\
    \ we haven’t defined an explicit string array. However, the single argument to\
    \ this function is defined as a variable-length argument, as shown in Listing\
    \ 6-8.\n\n*Listing 6-8. `doInBackground()` Method Signature*\n\n```\nprotected\
    \ Integer doInBackground(String...strings)\n```\n\nJava then treats the argument\
    \ as if it is an array inside the function. So in our code in the `doInBackground()`\
    \ method, we read each of the strings and log them to indicate that we know what\
    \ they are. We then wait long enough to simulate a long-running operation. Because\
    \ this method is running in a worker thread, we should not access the UI functionality\
    \ of Android from this worker thread. For instance, you should not update any\
    \ `Views` directly even if you have access to them from this thread. You cannot\
    \ even send a `Toast` from here. The next two methods allow us to overcome this.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## CHAPTER 6: Advanced AsyncTask\
    \ and Progress Dialogs\n\n### Triggering `onProgressUpdate()` through `publishProgress()`\n\
    \nIn the `doInBackground()` method, you can trigger `onProgressUpdate()` by calling\
    \ the `publishProgress()` method. The triggered `onProgressUpdate()` method then\
    \ runs on the main thread. This allows the `onProgressUpdate()` method to update\
    \ UI elements such as `Views` appropriately. You can also send a `Toast` from\
    \ here. In Listing 6-5, we simply log a message. Once all the work is done, we\
    \ return from the `doInBackground()` method with a result code.\n\n### Understanding\
    \ the `onPostExecute()` Method\n\nThe result code from the `doInBackground()`\
    \ method is then passed to the `onPostExecute()` callback method. This callback\
    \ is also executed on the main thread. In this method, we tell the progress dialog\
    \ to close. Being on the main thread, you can access any UI elements in this method\
    \ with no restrictions.\n\n### Upgrading to a Deterministic Progress Dialog\n\n\
    In the previous example in Listing 6-5, we used a progress dialog (Figure [6-1](#part0000_split_001.html#p101))\
    \ that doesn’t tell us what portion of the work is complete. This progress dialog\
    \ is called an indeterminate progress dialog. If you set the indeterminate property\
    \ to false on this progress dialog, you will see a progress dialog that tracks\
    \ progress in steps. This is shown in Figure [6-2](#part0000_split_001.html#p104).\n\
    \n(Use menu item \"Test Async 2\" to invoke this view from project download `AndroidFragments_Ch06_TestAsyncTask.zip`.)\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](images/00018.jpeg)\n\
    \n**Figure 6-2.** *A progress dialog showing explicit progress, interacting with\
    \ an `AsyncTask`*\n\nListing 6-9 shows the previous task from Listing 6-5 rewritten\
    \ to change the behavior of the progress dialog to a deterministic progress dialog.\
    \ We have also added an `onCancelListener` to see if we need to cancel the task\
    \ on cancelling the dialog. A user can click the back button in Figure [6-2](#part0000_split_001.html#p104)\
    \ to cancel the dialog. Key portions of the code are given in Listing 6-9 (for\
    \ the full code, see the download file `AndroidFragments_Ch06_TestAsyncTask.zip`).\n\
    \n*Listing 6-9. A Long Task Utilizing a Deterministic Progress Dialog*\n\n```\n\
    //Following code is in MyLongTask1.java(AndroidFragments_Ch06_TestAsyncTask.zip)\n\
    //Use menu item: Test Async2 to invoke this code\n\npublic class MyLongTask1 extends\
    \ AsyncTask<String,Integer,Integer> implements OnCancelListener\n{\n    //..other\
    \ code taken from Listing 6-5\n    //Also refer to the java class MyLongTask1.java\
    \ in the downloadable project\n    //for full code listing.\n\n    protected void\
    \ onPreExecute( ) {\n        //....other code\n        pd = new ProgressDialog(ctx);\n\
    \        pd.setTitle(\"title\");\n        pd.setMessage(\"In Progress...\");\n\
    \        pd.setCancelable(true);\n        pd.setOnCancelListener(this);\n    \
    \    pd.setIndeterminate(false);\n        pd.setProgressStyle(ProgressDialog.STYLE_HORIZONTAL);\n\
    \        pd.setMax(5);\n        pd.show( );\n    }\n\n    public void onCancel(DialogInterface\
    \ d) {\n        r.reportBack(tag,\"Cancel called on the dialog\");\n        this.cancel(true);\n\
    \    }\n    //..other code taken from Listing 6-5\n}\n```\n\nNotice how we have\
    \ prepared the progress dialog in Listing 6-9. In this case we haven’t used the\
    \ static method `show()`, in contrast to what we did in Listing 6-5, on the progress\
    \ dialog. Instead, we explicitly instantiated the progress dialog. The variable\
    \ `ctx` stands for the context (or activity) in which this UI progress dialog\
    \ operates. Then we individually set the properties on the dialog, including its\
    \ deterministic or indeterminate behavior. The method `setMax()` indicates how\
    \ many steps the progress dialog has. We have also passed the self reference (the\
    \ `AsyncTask` itself) as a listener when a dialog cancel is triggered. In the\
    \ cancel callback, we explicitly issue a cancel on the `AsyncTask`. The `cancel()`\
    \ method with a boolean argument of false will set a flag on the `AsyncTask` which\
    \ can be queried with `isCancelled()`.\n\nThe `doInBackground()` method should\
    \ periodically check `isCancelled()` to gracefully end early if cancelled. A boolean\
    \ argument of true will force-stop the worker thread.\n\n## AsyncTask and Thread\
    \ Pools\n\nConsider the code in Listing 6-10, where a menu item is invoking two\
    \ `AsyncTasks` one after the other.\n\n*Listing 6-10. Invoking Two Long-Running\
    \ Tasks*\n\n```\nvoid respondToMenuItem( ) {\n    MyLongTask mlt = new MyLongTask(this.mReportTo,this.mContext,\"\
    Task1\");\n    mlt.execute(\"String1\",\"String2\",\"String3\");\n    MyLongTask\
    \ mlt1 = new MyLongTask(this.mReportTo,this.mContext,\"Task2\");\n    mlt1.execute(\"\
    String1\",\"String2\",\"String3\");\n}\n```\n\nHere we are executing two tasks\
    \ on the main thread. You may expect that both the tasks get started close to\
    \ each other. The default behavior, however, is that these tasks run sequentially\
    \ using a single thread drawn out of a pool of threads. If you want a parallel\
    \ execution, you can use the `executeOnExecutor()` method on the `AsyncTask`.\
    \ See the reference documentation of `AsyncTask` for details on this method. Also\
    \ as per the SDK documentation, it is not valid to call the `execute()` method\
    \ more than once on a single `AsyncTask`. If you want that behavior, you have\
    \ to instantiate a new task and call the `execute()` method again.\n\n## Issues\
    \ and Solutions for Correctly Showing the Progress of an AsyncTask\n\nIf your\
    \ primary goal with this chapter is to learn just the essentials of `AsyncTask`,\
    \ then what we have covered so far is sufficient. However, there are some issues\
    \ when an `AsyncTask` is paired with a progress dialog as shown in the previous\
    \ listings so far. One of those issues is that an `AsyncTask` will lose the correct\
    \ activity reference when the device is rotated, thereby also losing its reference\
    \ to the progress dialog. The other issue is that the progress dialog we used\
    \ earlier in the code is not a managed dialog.\n\nLet’s understand these issues\
    \ now.\n\n### Dealing with Activity Pointers and Device Rotation"
