- fmt: "# Fragment Lifecycle Callbacks\n\n## The `onStop()` Callback\n\nThe next undo\
    \ callback is `onStop()`. This one is tied to the activity’s `onStop()` and serves\
    \ a purpose similar to an activity’s `onStop()`. A fragment that has been stopped\
    \ could go straight back to the `onStart()` callback, which then leads to `onResume()`.\n\
    \n## The `onDestroyView()` Callback\n\nIf your fragment is on its way to being\
    \ killed off or saved, the next callback in the undo direction is `onDestroyView()`.\
    \ This will be called after the view hierarchy you created on your `onCreateView()`\
    \ callback earlier has been detached from your fragment.\n\n## The `onDestroy()`\
    \ Callback\n\nNext up is `onDestroy()`. This is called when the fragment is no\
    \ longer in use.\n\nNote that it is still attached to the activity and is still\
    \ findable, but it can’t do much.\n\n## The `onDetach()` Callback\n\nThe final\
    \ callback in a fragment’s life cycle is `onDetach()`. Once this is invoked, the\
    \ fragment is not tied to its activity, it does not have a view hierarchy anymore,\
    \ and all its resources should have been released.\n\n## Using `setRetainInstance()`\n\
    \nYou may have noticed the dotted lines in the diagram in Figure [1-2](#part0000_split_000.html#p12).\
    \ One of the cool features of a fragment is that you can specify that you don’t\
    \ want the fragment completely destroyed if the activity is being re-created and\
    \ therefore your fragments will be coming back also. Therefore, Fragment comes\
    \ with a method called `setRetainInstance()`, which takes a boolean parameter\
    \ to tell it “Yes; I want you to hang around when my activity restarts” or “No;\
    \ go away, and I’ll create a new fragment from scratch.”\n\nA good place to call\
    \ `setRetainInstance()` is in the `onCreate()` callback of a fragment, but in\
    \ `onCreateView()` works, as does `onActivityCreated()`.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**CHAPTER 1: Fragments Fundamentals**\n\nIf the parameter is true, that means\
    \ you want to keep your fragment object in memory and not start over from scratch.\
    \ However, if your activity is going away and being re-created, you’ll have to\
    \ detach your fragment from this activity and attach it to the new one. The bottom\
    \ line is that if the retain instance value is true, you won’t actually destroy\
    \ your fragment instance, and therefore you won’t need to create a new one on\
    \ the other side. The dotted lines on the diagram mean you would skip the `onDestroy()`\
    \ callback on the way out, you’d skip the `onCreate()` callback when your fragment\
    \ is being re-attached to your new activity, and all other callbacks would fire.\n\
    \nBecause an activity is re-created most likely for configuration changes, your\
    \ fragment callbacks should probably assume that the configuration has changed,\
    \ and therefore should take appropriate action. This would include inflating the\
    \ layout to create a new view hierarchy in `onCreateView()`, for example. The\
    \ code provided in Listing 1-2 would take care of that as it is written. If you\
    \ choose to use the retain-instance feature, you may decide not to put some of\
    \ your initialization logic in `onCreate()` because it won’t always get called\
    \ the way the other callbacks will.\n\n# Sample Fragment App Showing the Life\
    \ Cycle\n\nThere’s nothing like seeing a real example to get an appreciation for\
    \ a concept. You’ll use a sample application that has been instrumented so you\
    \ can see all these callbacks in action. You’re going to work with a sample application\
    \ that uses a list of Shakespearean titles in one fragment; when the user clicks\
    \ one of the titles, some text from that play will appear in a separate fragment.\
    \ This sample application will work in both landscape and portrait modes on a\
    \ tablet. Then you’ll configure it to run as if on a smaller screen so you can\
    \ see how to separate the text fragment into an activity.\n\nYou’ll start with\
    \ the XML layout of your activity in landscape mode in Listing 1-3, which will\
    \ look like Figure 1-3 when it runs.\n\n**Listing 1-3.** Your Activity’s Layout\
    \ XML for Landscape Mode\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n\
    <LinearLayout\n    android:orientation=\"horizontal\"\n    android:layout_width=\"\
    match_parent\"\n```"
