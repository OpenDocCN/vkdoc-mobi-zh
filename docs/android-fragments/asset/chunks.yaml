- fmt: '# Fragments Fundamentals


    One way to think of a fragment is as a sub-activity. And in fact, the semantics
    of a fragment are a lot like an activity. A fragment can have a view hierarchy
    associated with it, and it has a life cycle much like an activity’s life cycle.
    Fragments can even respond to the Back button like activities do. If you were
    thinking, “If only I could put multiple activities together on a tablet’s screen
    at the same time,” then you’re on the right track. But because it would be too
    messy to have more than one activity of an application active at the same time
    on a tablet screen, fragments were created to implement basically that thought.
    This means fragments are contained within an activity. Fragments can only exist
    within the context of an activity; you can’t use a fragment without an activity.
    Fragments can coexist with other elements of an activity, which means you do *not*
    need to convert the entire user interface of your activity to use fragments. You
    can create an activity’s layout as before and only use a fragment for one piece
    of the user interface.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00027.png)


    Fragments are not like activities, however, when it comes to saving state and
    restoring it later. The fragments framework provides several features to make
    saving and restoring fragments much simpler than the work you need to do on activities.


    How you decide when to use a fragment depends on a few considerations, which are
    discussed next.


    ## When to Use Fragments


    One of the primary reasons to use a fragment is so you can reuse a chunk of user
    interface and functionality across devices and screen sizes. This is especially
    true with tablets. Think of how much can happen when the screen is as large as
    a tablet’s. It’s more like a desktop than a phone, and many of your desktop applications
    have a multipane user interface. As described earlier, you can have a list and
    a detail view of the selected item on screen at the same time. This is easy to
    picture in a landscape orientation with the list on the left and the details on
    the right. But what if the user rotates the device to portrait mode so that now
    the screen is taller than it is wide? Perhaps you now want the list to be in the
    top portion of the screen and the details in the bottom portion. But what if this
    application is running on a small screen and there’s just no room for the two
    portions to be on the screen at the same time? Wouldn’t you want the separate
    activities for the list and for the details to be able to share the logic you’ve
    built into these portions for a large screen? We hope you answered yes. Fragments
    can help with that.


    Figure 1-1 makes this a little clearer.


    **Figure 1-1.** Fragments used for a tablet UI and for a smartphone UI


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    In landscape mode, two fragments may sit nicely side by side. In portrait mode,
    we might be able to put one fragment above the other. But if we’re trying to run
    the same application on a device with a smaller screen, we might need to show
    either fragment 1 or fragment 2 but not both at the same time. If we tried to
    manage all these scenarios with layouts, we’d be creating quite a few, which means
    difficulty trying to keep everything correct across many separate layouts. When
    using fragments, our layouts stay simple; each activity layout deals with the
    fragments as containers, and the activity layouts don’t need to specify the internal
    structure of each fragment.


    Each fragment will have its own layout for its internal structure and can be reused
    across many configurations.


    Let’s go back to the rotating orientation example. If you’ve had to code for orientation
    changes of an activity, you know that it can be a real pain to save the current
    state of the activity and to restore the state once the activity has been re-created.
    Wouldn’t it be nice if your activity had chunks that could be easily retained
    across orientation changes, so you could avoid all the tearing down and re-creating
    every time the orientation changed? Of course it would. Fragments can help with
    that.


    Now imagine that a user is in your activity, and they’ve been doing some work.
    And imagine that the user interface has changed within the same activity, and
    the user wants to go back a step, or two, or three. In an old-style activity,
    pressing the Back button will take the user out of the activity entirely. With
    fragments, the Back button can step backward through a stack of fragments while
    staying inside the current activity.


    Next, think about an activity’s user interface when a big chunk of content changes;
    you’d like to make the transition look smooth, like a polished application. Fragments
    can do that, too.


    Now that you have some idea of what a fragment is and why you’d want to use one,
    let’s dig a little deeper into the structure of a fragment.


    ## The Structure of a Fragment


    As mentioned, a fragment is like a sub-activity: it has a fairly specific purpose
    and almost always displays a user interface. But where an activity is subclassed
    from `Context`, a fragment is extended from `Object` in package `android.app`.
    A fragment is *not* an extension of `Activity`. Like activities, however, you
    will always extend `Fragment` (or one of its subclasses) so you can override its
    behavior.


    A fragment can have a view hierarchy to engage with a user. This view hierarchy
    is like any other view hierarchy in that it can be created (inflated) from an
    XML layout specification or created in code. The view hierarchy needs to be attached
    to the view hierarchy of the surrounding activity if it is to be seen by the user,
    which you’ll get to shortly. The view objects that make up a fragment’s view hierarchy
    are the same sorts of views that are used elsewhere in Android. So everything
    you know about views applies to fragments as well.


    Besides the view hierarchy, a fragment has a bundle that serves as its initialization
    arguments. Similar to an activity, a fragment can be saved and later restored
    automatically by the system. When the system restores a fragment, it calls the
    default constructor (with no arguments) and then restores this bundle of arguments
    to the newly created fragment.


    Subsequent callbacks on the fragment have access to these arguments and can use
    them to get the fragment back to its previous state. For this reason, it is imperative
    that you:


    - Ensure that there’s a default constructor for your fragment class.

    - Add a bundle of arguments as soon as you create a new fragment so these subsequent
    methods can properly set up your fragment, and so the system can restore your
    fragment properly when necessary.


    An activity can have multiple fragments in play at one time; and if a fragment
    has been switched out with another fragment, the fragment-switching transaction
    can be saved on a back stack. The back stack is managed by the fragment manager
    tied to the activity. The back stack is how the Back button behavior is managed.
    The fragment manager is discussed later in this chapter. What you need to know
    here is that a fragment knows which activity it is tied to, and from there it
    can get to its fragment manager. A fragment can also get to the activity’s resources
    through its activity.


    Also similar to an activity, a fragment can save state into a bundle object when
    the fragment is being re-created, and this bundle object gets given back to the
    fragment’s `onCreate()` callback. This saved bundle is also passed to `onInflate()`,
    `onCreateView()`, and `onActivityCreated()`.'
  raw: 'One way to think of a fragment is as a sub-activity. And in fact, the semantics
    of a fragment are a lot like an activity. A fragment can have a view hierarchy
    associated with it, and it has a life cycle much like an activity’s life cycle.
    Fragments can even respond to the Back button like activities do. If you were
    thinking, “If only I could put multiple activities together on a tablet’s screen
    at the same time,” then you’re on the right track. But because it would be too
    messy to have more than one activity of an application active at the same time
    on a tablet screen, fragments were created to implement basically that thought.
    This means fragments are contained within an activity. Fragments can only exist
    within the context of an activity; you can’t use a fragment without an activity.
    Fragments can coexist with other elements of an activity, which means you do *not*
    need to convert the entire user interface of your activity to use fragments. You
    can create an activity’s layout as before and only use a fragment for one piece
    of the user interface.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00027.png)


    **CHAPTER 1: Fragments Fundamentals**


    **3**


    Fragments are not like activities, however, when it comes to saving state and
    restoring it later. The fragments framework provides several features to make
    saving and restoring fragments much simpler than the work you need to do on activities.


    How you decide when to use a fragment depends on a few considerations, which are
    discussed next.


    When to Use Fragments


    One of the primary reasons to use a fragment is so you can reuse a chunk of user
    interface and functionality across devices and screen sizes. This is especially
    true with tablets. Think of how much can happen when the screen is as large as
    a tablet’s. It’s more like a desktop than a phone, and many of your desktop applications
    have a multipane user interface. As described earlier, you can have a list and
    a detail view of the selected item on screen at the same time. This is easy to
    picture in a landscape orientation with the list on the left and the details on
    the right. But what if the user rotates the device to portrait mode so that now
    the screen is taller than it is wide? Perhaps you now want the list to be in the
    top portion of the screen and the details in the bottom portion. But what if this
    application is running on a small screen and there’s just no room for the two
    portions to be on the screen at the same time? Wouldn’t you want the separate
    activities for the list and for the details to be able to share the logic you’ve
    built into these portions for a large screen? We hope you answered yes. Fragments
    can help with that.


    Figure [1-1](#part0000_split_000.html#p9) makes this a little clearer.


    ***Figure 1-1.** Fragments used for a tablet UI and for a smartphone UI*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **4**


    **CHAPTER 1: Fragments Fundamentals**


    In landscape mode, two fragments may sit nicely side by side. In portrait mode,
    we might be able to put one fragment above the other. But if we’re trying to run
    the same application on a device with a smaller screen, we might need to show
    either fragment 1 or fragment 2 but not both at the same time. If we tried to
    manage all these scenarios with layouts, we’d be creating quite a few, which means
    difficulty trying to keep everything correct across many separate layouts. When
    using fragments, our layouts stay simple; each activity layout deals with the
    fragments as containers, and the activity layouts don’t need to specify the internal
    structure of each fragment.


    Each fragment will have its own layout for its internal structure and can be reused
    across many configurations.


    Let’s go back to the rotating orientation example. If you’ve had to code for orientation
    changes of an activity, you know that it can be a real pain to save the current
    state of the activity and to restore the state once the activity has been re-created.
    Wouldn’t it be nice if your activity had chunks that could be easily retained
    across orientation changes, so you could avoid all the tearing down and re-creating
    every time the orientation changed? Of course it would. Fragments can help with
    that.


    Now imagine that a user is in your activity, and they’ve been doing some work.
    And imagine that the user interface has changed within the same activity, and
    the user wants to go back a step, or two, or three. In an old-style activity,
    pressing the Back button will take the user out of the activity entirely. With
    fragments, the Back button can step backward through a stack of fragments while
    staying inside the current activity.


    Next, think about an activity’s user interface when a big chunk of content changes;
    you’d like to make the transition look smooth, like a polished application. Fragments
    can do that, too.


    Now that you have some idea of what a fragment is and why you’d want to use one,
    let’s dig a little deeper into the structure of a fragment.


    The Structure of a Fragment


    As mentioned, a fragment is like a sub-activity: it has a fairly specific purpose
    and almost always displays a user interface. But where an activity is subclassed
    from Context, a fragment is extended from Object in package android.app. A fragment
    is *not* an extension of Activity. Like activities, however, you will always extend
    Fragment (or one of its subclasses) so you can override its behavior.


    A fragment can have a view hierarchy to engage with a user. This view hierarchy
    is like any other view hierarchy in that it can be created (inflated) from an
    XML layout specification or created in code. The view hierarchy needs to be attached
    to the view hierarchy of the surrounding activity if it


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 1: Fragments Fundamentals**


    **5**


    is to be seen by the user, which you’ll get to shortly. The view objects that
    make up a fragment’s view hierarchy are the same sorts of views that are used
    elsewhere in Android. So everything you know about views applies to fragments
    as well.


    Besides the view hierarchy, a fragment has a bundle that serves as its initialization
    arguments. Similar to an activity, a fragment can be saved and later restored
    automatically by the system. When the system restores a fragment, it calls the
    default constructor (with no arguments) and then restores this bundle of arguments
    to the newly created fragment.


    Subsequent callbacks on the fragment have access to these arguments and can use
    them to get the fragment back to its previous state. For this reason, it is imperative
    that you


     Ensure that there’s a default constructor for your


    fragment class.


     Add a bundle of arguments as soon as you create a new


    fragment so these subsequent methods can properly


    set up your fragment, and so the system can restore


    your fragment properly when necessary.


    An activity can have multiple fragments in play at one time; and if a fragment
    has been switched out with another fragment, the fragment-switching transaction
    can be saved on a back stack. The back stack is managed by the fragment manager
    tied to the activity. The back stack is how the Back button behavior is managed.
    The fragment manager is discussed later in this chapter. What you need to know
    here is that a fragment knows which activity it is tied to, and from there it
    can get to its fragment manager. A fragment can also get to the activity’s resources
    through its activity.


    Also similar to an activity, a fragment can save state into a bundle object when
    the fragment is being re-created, and this bundle object gets given back to the
    fragment’s onCreate() callback. This saved bundle is also passed to onInflate(),
    onCreateView(), and onActivityCreated().'
