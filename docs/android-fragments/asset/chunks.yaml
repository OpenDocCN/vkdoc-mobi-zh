- fmt: '# Fragment Transactions and Animations


    This was fine when an activity was just single-purpose, but now that an activity
    can have several fragments going at once, and because you can go deeper into your
    application without leaving the topmost activity, Android really needed to extend
    the Back button stack concept to include fragments as well. In fact, fragments
    demand this even more. When there are several fragments interacting with each
    other at the same time in an activity, and there’s a transition to new content
    across several fragments at once, pressing the Back button should cause each of
    the fragments to roll back one step *together*. To ensure that each fragment properly
    participates in the rollback, a `FragmentTransaction` is created and managed to
    perform that coordination.


    Be aware that a back stack for fragments is not required within an activity.


    You can code your application to let the Back button work at the activity level
    and not at the fragment level at all. If there’s no back stack for your fragments,
    pressing the Back button will pop the current activity off the stack and return
    the user to whatever was underneath. If you choose to take advantage of the back
    stack for fragments, you will want to uncomment in Listing 1-8 the line that says
    `ft.addToBackStack("details")`. For this particular case, you’ve hardcoded the
    tag parameter to be the string `"details"`. This tag should be an appropriate
    string name that represents the state of the fragments at the time of the transaction.
    The tag is not necessarily a name for a specific fragment but rather for the fragment
    transaction and all the fragments in the transaction. You will be able to interrogate
    the back stack in code using the tag value to delete entries, as well as pop entries
    off. You will want meaningful tags on these transactions to be able to find the
    appropriate ones later.


    ## Fragment Transaction Transitions and Animations


    One of the very nice things about fragment transactions is that you can perform
    transitions from an old fragment to a new fragment using transitions and animations.
    Let’s use a fragment transaction transition to add special effects when you swap
    out the old details fragment with a new details fragment. This can add polish
    to your application, making the switch from the old to the new fragment look smooth.


    One method to accomplish this is `setTransition()`, as shown in Listing 1-8. However,
    there are a few different transitions available. You used a fade in your example,
    but you can also use the `setCustomAnimations()` method to describe other special
    effects, such as sliding one fragment out to the right as another slides in from
    the left. The custom animations use the new object animation definitions, not
    the old ones. The old anim XML files use tags such as `<translate>`, whereas the
    new XML files use `<objectAnimator>`.


    The old standard XML files are located in the `/data/res/anim` directory under
    the appropriate Android SDK platforms directory (such as `platforms/android-11`
    for Honeycomb). There are some new XML files located in the `/data/res/animator`
    directory here, too. Your code could be something like:


    ```

    ft.setCustomAnimations(android.R.animator.fade_in, android.R.animator.fade_out);

    ```


    which will cause the new fragment to fade in as the old fragment fades out. The
    first parameter applies to the fragment entering, and the second parameter applies
    to the fragment exiting. Feel free to explore the Android animator directory for
    more stock animations. The other very important bit of knowledge you need is that
    the transition calls need to come before the `replace()` call; otherwise, they
    will have no effect.


    Using the object animator for special effects on fragments can be a fun way to
    do transitions. There are two other methods on `FragmentTransaction` you should
    know about: `hide()` and `show()`. Both of these methods take a fragment as a
    parameter, and they do exactly what you’d expect. For a fragment in the fragment
    manager associated to a view container, the methods simply hide or show the fragment
    in the user interface. The fragment does not get removed from the fragment manager
    in the process, but it certainly must be tied into a view container in order to
    affect its visibility.


    If a fragment does not have a view hierarchy, or if its view hierarchy is not
    tied into the displayed view hierarchy, then these methods won’t do anything.


    Once you’ve specified the special effects for your fragment transaction, you have
    to tell it the main work that you want done. In your case, you’re replacing whatever
    is in the frame layout with your new details fragment. That’s where the `replace()`
    method comes in. This is equivalent to calling `remove()` for any fragments that
    are already in the frame layout and then `add()` for your new details fragment,
    which means you could just call `remove()` or `add()` as needed instead.


    The final action you must take when working with a fragment transaction is to
    commit it. The `commit()` method does not cause things to happen immediately but
    rather schedules the work for when the UI thread is ready to do it.


    Now you should understand why you need to go to so much trouble to change the
    content in a simple fragment. It’s not just that you want to change the text;
    you might want a special graphics effect during the transition. You may also want
    to save the transition details in a fragment transaction that you can reverse
    later. That last point may be confusing, so we’ll clarify.


    This is not a transaction in the truest sense of the word. When you pop fragment
    transactions off the back stack, you are not undoing all the data changes that
    may have taken place. If data changed within your activity, for example, as you
    created fragment transactions on the back stack, pressing the Back button does
    not cause the activity data changes to revert back to their previous values. You
    are merely stepping back through the user interface views the way you came in,
    just as you do with activities, but in this case it’s for fragments. Because of
    the way fragments are saved and restored, the inner state of a fragment that has
    been restored from a saved state will depend on what values you saved with the
    fragment and how you manage to restore them. So your fragments may look the same
    as they did previously but your activity will not, unless you take steps to restore
    activity state when you restore fragments.


    In your example, you’re only working with one view container and bringing in one
    details fragment. If your user interface were more complicated, you could manipulate
    other fragments within the fragment transaction. What you are actually doing is
    beginning the transaction, replacing any existing fragment in your details frame
    layout with your new details fragment, specifying a fade-in animation, and committing
    the transaction. You commented out the part where this transaction is added to
    the back stack, but you could certainly uncomment it to take part in the back
    stack.


    ## The FragmentManager


    The `FragmentManager` is a component that takes care of the fragments belonging
    to an activity. This includes fragments on the back stack and fragments that may
    just be hanging around. We’ll explain.'
