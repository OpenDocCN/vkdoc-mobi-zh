    Dynamic Preference Summary Text


    You’ve probably seen preferences where the preference summary contains the current
    value. This is actually a little harder to implement than you might think. To
    accomplish this feat, you create a listener callback that detects when a preference
    value is about to change, and you then update the preference summary accordingly.
    The first step is for your PreferenceFragment to implement the OnPreferenceChangeListener
    interface. You then need to implement the onPreferenceChange() callback.


    Listing 4-10 shows an example. The pkgPref object in the callback was set earlier
    to the preference in the onCreate() method.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


