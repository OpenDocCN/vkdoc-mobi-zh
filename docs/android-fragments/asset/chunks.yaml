    \n如果用户按下了返回键，这会导致`onCancel()`回调在`DialogFragment`上触发。默认情况下，Android会让`DialogFragment`消失，所以你不需要自己调用`dismiss()`。但如果你希望调用方`Activity`被通知对话框已被取消，你需要在`onCancel()`内部调用逻辑来实现这一点。这是`onCancel()`和`onDismiss()`在`DialogFragment`中的区别。使用`onDismiss()`，你无法确切知道是什么导致了`onDismiss()`回调被触发。你可能也注意到了，`DialogFragment`没有`cancel()`方法，只有`dismiss()`；但正如我们所说，当`DialogFragment`被按下返回键取消时，Android会为你处理取消/关闭操作。\n\
    \n关闭`DialogFragment`的另一种方式是呈现另一个`DialogFragment`。关闭当前对话框并呈现新对话框的方式与仅仅关闭当前对话框略有不同。清单3-5展示了一个示例。\n\
    \n*清单3-5. 为返回栈设置一个对话框*\n\n```\nif (someview.getId() == R.id.btn_invoke_another_dialog)\n\
    {\n    Activity act = getActivity();\n    FragmentManager fm = act.getFragmentManager();\n\
    \    FragmentTransaction ft = fm.beginTransaction();\n    ft.remove(this);\n \
    \   ft.addToBackStack(null);\n    //null represents no name for the back stack\
    \ transaction\n    HelpDialogFragment hdf =\n        HelpDialogFragment.newInstance(R.string.helptext);\n\
    \    hdf.show(ft, \"HELP\");\n    return;\n}\n```\n\n在单个事务中，你删除了当前的`DialogFragment`并添加了新的`DialogFragment`。这导致当前对话框从视觉上消失，新对话框出现。如果用户按下返回键，因为你已将此事务保存在返回栈中，新对话框将被关闭，之前的对话框将重新显示。例如，这是显示帮助对话框的一种便捷方式。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**52**\n\n**第3章：使用对话框**\n\
    \n### 对话框关闭的影响\n当你向`FragmentManager`添加任何`Fragment`时，`FragmentManager`会为该`Fragment`管理状态。这意味着当设备配置发生变化（例如设备旋转）时，`Activity`会重启，`Fragment`也会重启。你在第1章运行Shakespeare示例应用并旋转设备时已经看到了这一点。\n\
    \n设备配置变化不会影响对话框，因为它们也由`FragmentManager`管理。但`show()`和`dismiss()`的隐式行为意味着，如果你不小心，很容易失去对`DialogFragment`的跟踪。`show()`方法自动将`Fragment`添加到`FragmentManager`；`dismiss()`方法自动从`FragmentManager`中移除`Fragment`。在开始显示`Fragment`之前，你可能有一个指向`DialogFragment`的直接指针。但你不能先把这个`Fragment`添加到`FragmentManager`，之后再调用`show()`，因为一个`Fragment`只能被添加到`FragmentManager`一次。你可能打算通过`Activity`的恢复来获取这个指针。然而，如果你显示然后关闭这个对话框，这个`Fragment`会被隐式地从`FragmentManager`中移除，从而剥夺了该`Fragment`被恢复和重新指向的能力（因为`FragmentManager`在它被移除后不知道这个`Fragment`的存在）。\n\
    \n如果你希望在对话框关闭后保留其状态，你需要在对话框之外——要么在父`Activity`中，要么在持久存在的非对话框`Fragment`中——维护状态。\n\
    \n### DialogFragment 示例应用\n在本节中，你将回顾一个演示`DialogFragment`概念的示例应用。你还将研究`Fragment`与其包含它的`Activity`之间的通信。为了实现这一切，你需要五个Java文件：\n\
    \n- `MainActivity.java`：应用的主`Activity`。它显示一个包含帮助文本的简单视图以及一个可以启动对话框的菜单。\n- `PromptDialogFragment.java`：一个`DialogFragment`示例，它定义了其自己的XML布局并允许用户输入。它有三个按钮：保存、关闭（取消）和帮助。\n\
    - `AlertDialogFragment.java`：一个`DialogFragment`示例，它使用`AlertBuilder`类在此`Fragment`内创建对话框。这是创建对话框的传统方式。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![](images/00019.jpeg)\n\
    \n**第3章：使用对话框**\n\n**53**\n\n- `HelpDialogFragment.java`：一个非常简单的`Fragment`，显示来自应用资源的帮助消息。创建帮助对话框对象时指定具体的帮助消息。这个帮助`Fragment`可以从主`Activity`和提示对话框`Fragment`中显示。\n\
    - `OnDialogDoneListener.java`：一个接口，你要求你的`Activity`实现它，以便从`Fragment`接收消息。使用接口意味着你的`Fragment`不需要太多了解调用它的`Activity`，只需知道它必须实现了这个接口即可。这有助于将功能封装在合适的位置。从`Activity`的角度来看，它有一种通用的方式从`Fragment`接收信息，而无需了解过多细节。\n\
    \n这个应用有三个布局：主`Activity`的布局、提示对话框`Fragment`的布局和帮助对话框`Fragment`的布局。注意，你不需要为警告对话框`Fragment`提供布局，因为`AlertBuilder`会在内部为你处理这个布局。完成后，应用看起来就像图3-1。\n\
    \n***图3-1.** DialogFragment示例应用的用户界面*\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**54**\n\n**第3章：使用对话框**\n\n### Dialog示例：MainActivity\n让我们来看看源代码，你可以从本书的网站下载（参见“参考资料”部分）。我们将使用`DialogFragmentDemo`项目。在我们继续之前，打开`MainActivity.java`的源代码。\n\
    \n主`Activity`的代码非常直接。你显示一个简单的文本页面并设置一个菜单。每个菜单项调用一个`Activity`方法，每个方法基本做同样的事情：获取一个`FragmentTransaction`，创建一个新的`Fragment`，并显示该`Fragment`。注意，每个`Fragment`都有一个唯一的标签，该标签与`FragmentTransaction`一起使用。\n\
    \n这个标签会与`FragmentManager`中的`Fragment`关联起来，因此你之后可以通过标签名称定位这些`Fragment`。`Fragment`也可以通过`Fragment`的`getTag()`方法确定自己的标签值。\n\
    \n主`Activity`中的最后一个方法定义是`onDialogDone()`，这是一个回调，属于你正在实现的`OnDialogDoneListener`接口的一部分。如你所见，回调提供了调用你的`Fragment`的标签、一个指示对话框是否被取消的布尔值以及一条消息。就本示例而言，你只是希望将信息记录到`LogCat`；你也使用`Toast`将其显示给用户。`Toast`将在本章后面介绍。\n\
    \n### Dialog示例：OnDialogDoneListener\n为了能够知道对话框何时消失，创建一个你的对话框调用者实现的监听器接口。接口的代码位于`OnDialogDoneListener.java`中。"
  raw: 'displayed when the user rotates the device, the dialog fragment sees onDismiss()
    cal ed even though the user did not press a button in the dialog.


    Instead, you should always rely on explicit button clicks on the dialog view.


    If the user presses the Back button while the dialog fragment is displayed, this
    causes the onCancel() callback to fire on the dialog fragment. By default, Android
    makes the dialog fragment go away, so you don’t need to call dismiss() on the
    fragment yourself. But if you want the calling activity to be notified that the
    dialog has been cancelled, you need to invoke logic from within onCancel() to
    make that happen. This is a difference between onCancel() and onDismiss() with
    dialog fragments. With onDismiss(), you can’t be sure exactly what happened that
    caused the onDismiss() callback to fire. You might also have noticed that a dialog
    fragment does not have a cancel() method, just dismiss(); but as we said, when
    a dialog fragment is being cancelled by pressing the Back button, Android takes
    care of cancelling/dismissing it for you.


    The other way to dismiss a dialog fragment is to present another dialog fragment.
    The way you dismiss the current dialog and present the new one is slightly different
    than just dismissing the current dialog. Listing 3-5 shows an example.


    *Listing 3-5\. Setting Up a Dialog for a Back Stack*


    if (someview.getId() == R.id.btn_invoke_another_dialog)


    {


    Activity act = getActivity();


    FragmentManager fm = act.getFragmentManager();


    FragmentTransaction ft = fm.beginTransaction();


    ft.remove(this);


    ft.addToBackStack(null);


    //null represents no name for the back stack transaction


    HelpDialogFragment hdf =


    HelpDialogFragment.newInstance(R.string.helptext);


    hdf.show(ft, "HELP");


    return;


    }


    Within a single transaction, you’re removing the current dialog fragment and adding
    the new dialog fragment. This has the effect of making the current dialog disappear
    visually and making the new dialog appear. If the user presses the Back button,
    because you’ve saved this transaction on the back stack, the new dialog is dismissed
    and the previous dialog is displayed. This is a handy way of displaying a help
    dialog, for example.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **52**


    **CHAPTER 3: Working with Dialogs**


    Implications of a Dialog Dismiss


    When you add any fragment to a fragment manager, the fragment manager does the
    state management for that fragment. This means when a device configuration changes
    (for example, the device rotates), the activity is restarted and the fragments
    are also restarted. You saw this earlier when you rotated the device while running
    the Shakespeare sample application in chapter 1.


    A device-configuration change doesn’t affect dialogs because they are also managed
    by the fragment manager. But the implicit behavior of show() and dismiss() means
    you can easily lose track of a dialog fragment if you’re not careful. The show()
    method automatically adds the fragment to the fragment manager; the dismiss()
    method automatically removes the fragment from the fragment manager. You may have
    a direct pointer to a dialog fragment before you start showing the fragment. But
    you can’t add this fragment to the fragment manager and later call show(), because
    a fragment can only be added once to the fragment manager. You may plan to retrieve
    this pointer through restore of the activity. However, if you show and dismiss
    this dialog, this fragment is implicitly removed from the fragment manager, thereby
    denying that fragment’s ability to be restored and repointed (because the fragment
    manager doesn’t know this fragment exists after it is removed).


    If you want to keep the state of a dialog after it is dismissed, you need to maintain
    the state outside of the dialog either in the parent activity or in a non-dialog
    fragment that hangs around for a longer time.


    DialogFragment Sample Application


    In this section, you review a sample application that demonstrates these concepts
    of a dialog fragment. You also examine communication between a fragment and the
    activity that contains it. To make it all happen, you need five Java files:


     MainActivity.java: The main activity of your


    application. It displays a simple view with help text in it


    and a menu from which dialogs can be started.


     PromptDialogFragment.java: An example of a dialog


    fragment that defines its own layout in XML and allows


    input from the user. It has three buttons: Save, Dismiss


    (cancel), and Help.


     AlertDialogFragment.java: An example of a dialog


    fragment that uses the AlertBuilder class to create a


    dialog within this fragment. This is the old-school way of


    creating a dialog.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00019.jpeg)


    **CHAPTER 3: Working with Dialogs**


    **53**


     HelpDialogFragment.java: A very simple fragment


    that displays a help message from the application’s


    resources. The specific help message is identified when


    a help dialog object is created. This help fragment can


    be shown from both the main activity and the prompt


    dialog fragment.


     OnDialogDoneListener.java: An interface that you


    require your activity to implement in order to get


    messages back from the fragments. Using an interface


    means your fragments don’t need to know much


    about the calling activity, except that it must have


    implemented this interface. This helps encapsulate


    functionality where it belongs. From the activity’s point


    of view, it has a common way to receive information


    back from fragments without needing to know too much


    about them.


    There are three layouts for this application: for the main activity, for the prompt
    dialog fragment, and for the help dialog fragment. Note that you don’t need a
    layout for the alert dialog fragment because the AlertBuilder takes care of that
    layout for you internally. When you’re done, the application looks like Figure
    [3-1](#part0000_split_000.html#p58).


    ***Figure 3-1.** The user interface for the dialog fragment sample application*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **54**


    **CHAPTER 3: Working with Dialogs**


    Dialog Sample: MainActivity


    Let’s get to the source code, which you can download from the book’s web site
    (see the “References” section). We’ll use the DialogFragmentDemo project. Open
    up the source code for MainActivity.java before we continue.


    The code for the main activity is very straightforward. You display a simple page
    of text and set up a menu. Each menu item invokes an activity method, and each
    method does basically the same thing: gets a fragment transaction, creates a new
    fragment, and shows the fragment. Note that each fragment has a unique tag that’s
    used with the fragment transaction.


    This tag becomes associated with the fragment in the fragment manager, so you
    can locate these fragments later by tag name. The fragment can also determine
    its own tag value with the getTag() method on Fragment.


    The last method definition in the main activity is onDialogDone(), which is a
    callback that is part of the OnDialogDoneListener interface that your activity
    is implementing. As you can see, the callback supplies a tag of the fragment that
    is calling you, a boolean value indicating whether the dialog fragment was cancelled,
    and a message. For your purposes, you merely want to log the information to LogCat;
    you also show it to the user using Toast. Toast will be covered later in this
    chapter.


    Dialog Sample: OnDialogDoneListener


    So that you can know when a dialog has gone away, create a listener interface
    that your dialog callers implement. The code of the interface is in OnDialogDoneListener.java.'
