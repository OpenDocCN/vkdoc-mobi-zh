- fmt: "# Document Outline\n\nCalling an AsyncTask  \nUnderstanding the `onPreExecute()`\
    \ Callback and Progress Dialog  \nUnderstanding the `doInBackground()` Method\
    \  \n\n**Contents**\n\nTriggering `onProgressUpdate()` through `publishProgress()`\
    \  \nUnderstanding the `onPostExecute()` Method  \nUpgrading to a Deterministic\
    \ Progress Dialog  \n`AsyncTask` and Thread Pools  \nIssues and Solutions for\
    \ Correctly Showing the Progress of an `AsyncTask`  \nDealing with Activity Pointers\
    \ and Device Rotation  \nDealing with Managed Dialogs  \nTesting Scenarios for\
    \ a Well-Behaved Progress Dialog  \nUsing a Retained Fragment and a Progress Dialog\
    \  \nExploring Key Code Snippets  \nReferences  \nSummary  \nIndex  \n\n---\n\n\
    **About the Authors**\n\n**Dave MacLean** is a software engineer and architect\
    \ living and working in Orlando, Florida. Since 1980, he has programmed in many\
    \ languages, developing solutions ranging from robot automation systems to data\
    \ warehousing, from web self-service applications to electronic data interchange\
    \ transaction processors. Dave has worked for Sun Microsystems, IBM, Trimble Navigation,\
    \ General Motors, Blue Cross Blue Shield of Florida and several small companies.\
    \ He has written several books on Android and a few magazine articles. He graduated\
    \ from the University of Waterloo in Canada with a degree in systems design engineering.\n\
    \nVisit his blog at `http://davemac327.blogspot.com` or contact him at `davemac327@gmail.com`.\n\
    \n**Satya Komatineni** has been programming for more than 20 years in the IT and\
    \ Web space. He has had the opportunity to work with Assembly, C, C++, Rexx, Java,\
    \ C#, Lisp, HTML, JavaScript, CSS, SVG, relational databases, object databases\
    \ and related technologies. He has published more than 30 articles touching many\
    \ of these areas, both in print and online. He has been a frequent speaker at\
    \ O’Reilly Open Source Conference, speaking on innovations around Java and Web.\
    \ Satya has done a considerable amount of original work in creating Aspire, a\
    \ comprehensive open-source Java-based web framework, and has explored personal\
    \ web productivity and collaboration tools through his open-source work for `KnowledgeFolders.com`.\
    \ Satya holds a master’s degree in electrical engineering from Indian Institute\
    \ of Technology and a bachelor’s degree in electrical engineering from Andhra\
    \ University, India. You can find his website at `SatyaKomatineni.com`.\n\n---\n\
    \n**About the Technical Reviewer**\n\n**Shane Kirk** earned a B.S. in Computer\
    \ Science from the University of Kentucky in 2000. He’s currently a Senior Software\
    \ Engineer for IDEXX Laboratories in Westbrook, Maine, where he spends his days\
    \ working on communication solutions for embedded systems. Shane’s foray into\
    \ mobile development began in 2010, shortly after purchasing his first smartphone\
    \ - a Droid X running Eclair (Android 2.1). He’s been hooked on Android ever since.\n\
    \n---\n\n**Acknowledgments**\n\nWriting a technical book is a team effort, and\
    \ we’d like to thank this team in particular. The folks at Apress were great,\
    \ including Steve Anglin, Mark Powers, Brendan Frost and Anna Ishchenko. We’d\
    \ also like to graciously thank our technical reviewer Shane Kirk, who worked\
    \ hard to catch our slips and who made this book so much better.\n\nWe have also\
    \ been ably assisted by the various Android forums that have provided answers\
    \ to our questions as well as valuable advice. We extend our thanks to our readers.\
    \ We greatly appreciate your picking up our books, asking us questions, and keeping\
    \ us on our toes. We are better for it, and we hope our work can somehow help\
    \ you achieve your goals. We work very hard to stay abreast of all things Android,\
    \ in a way that allows us to explain it to you so it’s easy to understand. We\
    \ really hope you will learn a lot from it, as we did.\n\nWe especially want to\
    \ thank our families, for letting us go off to do research, buy gadgets, vent\
    \ our frustrations, and ultimately create this work you now hold. We are forever\
    \ indebted to you."
