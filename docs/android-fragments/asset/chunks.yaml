  trans: '

    # 为旧设备使用兼容库


    但平板电脑提供了更大的屏幕空间，让用户可以在一个屏幕上同时查看并操作多项内容。因此，谷歌在 Honeycomb（`Android 3.0`）中引入了片段（fragments）。这是一个全新的概念，它改变了开发者创建用户界面及其背后逻辑的方式。这本是件好事，但当时市面上仍有大量不支持片段的安卓设备（例如智能手机）。谷歌的解决方案是编写一个兼容库，利用旧版安卓中已有的
    API，为 `Fragment` 等提供功能相似的实现。只要应用链接了该兼容库，即使旧版安卓系统本身不支持片段，应用也能使用片段功能。


    随后，谷歌工程师们研究了新版安卓中的其他特性与 API，并为兼容库提供了相应的特性和 API，使得这些功能无需发布旧版安卓的更新也能在旧版本上使用。除了对
    `Fragments` 的支持，兼容库还提供了对 `Loaders`、`RenderScript`、`ActionBar` 等的支持。


    兼容库并不总能保证新旧版本之间的体验完全一致。例如，新的 `Activity` 类本身就感知片段的存在。要使用兼容库，你必须继承 `FragmentActivity`
    类而非 `Activity`；正是 `FragmentActivity` 类负责在旧版安卓中处理片段。


    当你使用兼容库时，无论应用将运行在哪个安卓版本上，你都应该使用兼容库提供的类。换句话说，你的应用中只会使用 `FragmentActivity`，而它会在所有安卓版本（包括
    `Android 3.0` 及更高版本）上正确工作。你不应该尝试在同一个应用中同时包含用于 `Android 3.0+` 的 `Activity` 和用于低于
    `3.0` 版本的 `FragmentActivity`。当 `FragmentActivity` 在 `Android 3.0` 及以上版本运行时，它几乎可以直接调用底层的
    `Activity` 类。因此，在新版安卓上使用兼容库并不会带来实质性的性能损失。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **第 5 章：为旧设备使用兼容库** **85**


    ## 将库添加到项目


    在撰写本文时，共有四个兼容库；它们统称为 Android Support Library（修订版 21）：


    - **v4** — 包含 `FragmentActivity`、`Fragment`、`Loader` 以及许多在 `Android 3.0` 之后引入的其他类。数字
    4 代表 Android API 版本 4（即 `Donut 1.6`）。这意味着该库可用于运行在 Android API 版本 4 及更高版本上的应用。

    - **v7** — 提供了 `ActionBar`、`CardView`、`GridLayout`、`MediaRouter`、`Palette` 和 `RecyclerView`
    类。该库可用于 Android API 版本 7（即 `Eclair 2.1`）及更高版本。实际上这里有六个库：`appcompat`、`cardview`、`gridlayout`、`mediarouter`、`palette`
    和 `recyclerview`。

    - **v8** — 为 Android API 版本 8（即 `Froyo 2.2`）及更高版本增加了 `RenderScript` 能力。`RenderScript`
    允许在设备处理器（CPU 内核、GPU、DSP）之间并行处理任务，它于 Android API 版本 11（即 `Honeycomb 3.0`）中被引入。

    - **v13** — 为标签页和分页界面等功能添加了特殊的 `Fragment` 功能。该库也包含了许多来自 v4 库的类，因此可以将其包含在你的应用中，而无需同时引入其他库。


    有关按版本号分类的所有兼容性功能的完整列表，请参阅本章末尾的参考资料。


    要将 Android Support Library 下载到你的计算机，请使用 Android SDK Manager，并在列表底部的 `Extras` 下找到它。如果你使用的是
    Android Studio，请下载 Android Support Repository 和 Google Repository。否则，请下载 Android
    Support Library。这些文件将被放置在你的 Android SDK 目录下。Android Support Library 位于 `extras/android/support/`，Android
    Support Repository 位于 `extras/android/m2repository`，Google Repository 位于 `extras/google/m2repository`。在撰写本文时，`RenderScript`
    兼容库在 Android Studio 中不受支持。


    从上述列表中可以看出，并非所有 Android Support Library 的功能都适用于所有旧版安卓。因此，你必须在 `AndroidManifest.xml`
    文件中正确设置 `android:minSdkVersion`。


    如果你在使用 v7 中的兼容库功能，那么 `android:minSdkVersion` 不应低于 7。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00002.jpeg)


    **86** **第 5 章：为旧设备使用兼容库**


    ## 包含 v7 Support Library


    你几乎不太可能只想包含 v4 库而不包含 v7 库。由于 v7 库需要同时包含 v4 库才能提供 v7 正常运行所需的类，因此你需要将两者都包含进来。如果你使用
    Eclipse，ADT 插件会让这一切变得相当简单。当你在 Eclipse 中创建一个新的 Android 项目时，需要指定它将运行的最低安卓版本。如果 ADT
    认为你可能需要包含兼容库，它会自动将其包含进来。


    例如，如果你将目标 SDK 指定为 16（`JellyBean 4.1`），但最低 SDK 指定为 8（`Froyo 2.2`），ADT 会自动设置一个 `appcompat
    v7` 库项目，将该库项目包含到你的新应用中，并且也会将 v4 库包含到你的应用中。因此，你无需额外工作，v7 库的资源就可用于你的应用。


    然而，如果你想使用另外两个 v7 库（`gridlayout` 和/或 `mediarouter`），则需要做一些额外的工作，具体如下所述。


    通过创建一个库项目并将其包含到你的应用中，你的应用就能获得所需的兼容库资源。


    你可以手动执行类似于 ADT 自动执行的操作，以便将 v7 `appcompat` 库包含到你的项目中。首先，选择 **File ➤ Import**，然后选择
    **Existing Android Code Into Workspace**，接着导航到你工作站上 Android SDK 所在的 `extras` 文件夹。找到
    v7 `gridlayout` 或 `mediarouter` 文件夹并选中。见图 5-1。


    ***图 5-1.** 导入 v7 mediarouter 兼容库*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](img/00023.jpeg)


    **第 5 章：为旧设备使用兼容库** **87**


    点击 **Finish**，你将获得一个新的库项目。如果你选择为 v7 `mediarouter` 创建库项目，你会发现它缺少一些功能，因此会有错误。你需要添加
    v7 `appcompat` 库来解决这个问题。在 Eclipse 中右键点击 `mediarouter` 库项目，选择 **Properties**。在左侧列表中选择
    **Android**。现在，点击 **Library** 部分的 **Add…** 按钮。见图 5-2。


    ***图 5-2.** 将 appcompat_v7 添加到 v7 mediarouter 兼容库*


    选择 `appcompat_v7` 库并点击 **OK**。这应该能解决 `mediarouter` 中的错误。现在，当你想将 `mediarouter`
    包含到你的应用项目中时，只需按照相同步骤操作，但右键点击你的应用项目，然后在 **Library** 部分点击 **Add…** 按钮时，选择 `mediarouter`
    库即可。


    ## 包含 v8 Support Library

    '
- fmt: '如果你希望使用 v8 RenderScript 兼容库，只需在应用项目的`project.properties`文件中添加以下两行，无论你的应用目标版本是多少：


    `renderscript.target=19`


    `renderscript.support.mode=true`


    如果在 Eclipse 控制台中看到关于版本号的错误，请按照错误提示尝试使用更新的版本。不过，Android 的最新版本可能也无法正常工作。你可能还需要做另一件事：将`renderscript-v8.jar`文件作为外部
    jar 文件添加到项目的构建路径中。你可以在 SDK 的`build-tools`目录下找到这个 jar 文件，请使用可用的最新版本。


    在你的代码中，请确保导入的是`android.support.v8.renderscript`包，而不是`android.renderscript`包。如果你正在为
    v8 库修改现有的 RenderScript 应用，请务必清理你的项目；由`.rs`文件生成的 Java 文件需要重新生成，以同样使用 v8 库。之后，你就可以像往常一样使用
    RenderScript，并将你的应用部署到旧版本的 Android 上了。


    ### 包含 v13 支持库


    最后，要包含 v13 兼容库到你的应用中，请进入 SDK 的`extras`目录，找到 v13 jar 文件。将此文件复制到应用项目的`/libs`目录下。将
    v13 jar 文件放置到位后，右键点击它，弹出菜单，然后选择“构建路径”（Build Path）➤ “添加到构建路径”（Add to Build Path）。有很大可能你的应用中已经包含了
    v4 和 v7 appcompat 库（这得益于 ADT）。如果你不需要其中任何一个库的功能，你可以选择将它们移除。例如，如果你的应用最低 SDK 是 v11，你可以使用原生的`ActionBar`类，而不需要
    v7 appcompat 支持库。


    v13 jar 文件包含了许多与 v4 相同的类，因此你不希望因同时添加相同的类而导致任何问题。如果你打算在应用中同时使用这三个库（即 v4、v7 和 v13），那么至少要确保
    v13 的排序在 v4 之前。这可以在“配置构建路径”（Configure Build Path）对话框中完成。


    ### 仅包含 v4 支持库


    如果你确实只需要 v4 支持库而不要其他库，你可以遵循与 v13 库相同的步骤。


    ### 使用 Android 支持库改造应用


    为了让你更清楚地了解这一切是如何工作的，我们将重新使用你在第 1 章中编写的一个 fragment 应用，并使其能在不支持 fragment 的原生旧版本
    Android 上运行。


    选择“文件”（File）➤ “导入”（Import），选择“常规”（General），然后选择“将现有项目导入工作空间”（Existing Projects
    into Workspace）。


    导航到第 1 章中的 `ShakespeareInstrumented` 项目并选择它。在点击“完成”（Finish）之前，勾选“将项目复制到工作空间”（Copy
    projects into workspace）。


    现在，你将改造这个应用，使其能在低于 API 版本 11 的 Android 上运行。以下方法适用于你不需要兼容库中的资源的情况，因为它只关心复制 JAR
    文件。


    1. 右键点击你的项目，选择“Android 工具”（Android Tools）➤ “添加支持库...”（Add Support Library...）。接受许可协议并点击“确定”（OK）。

    2. 现在进入`MainActivity.java`，将基类从`Activity`改为`FragmentActivity`。你需要修复导入行，从`android.app.Activity`改为`android.support.v4.app.FragmentActivity`。同时，修复`Fragment`、`FragmentManager`和`FragmentTransaction`的导入，改为使用支持库中的对应类。

    3. 找到`getFragmentManager()`的方法调用，并将其改为`getSupportFragmentManager()`。对`DetailsActivity.java`也执行此操作。

    4. 对于`DetailsFragment.java`，将`Fragment`的导入改为指向支持库的`Fragment`（即`android.support.v4.app.Fragment`）。

    5. 在`TitlesFragment.java`中，修改导入。'
  raw: 'If you want to use the v8 renderscript compatibility library, you simply add
    the following two lines to the application project’s project.properties file regardless
    of the target version of your application:


    renderscript.target=19


    renderscript.support.mode=true


    If you see errors in the Eclipse Console regarding version numbers, try using
    a later version as indicated by the error. However, the very latest version of
    Android may not work for you either. The other thing you likely need to do


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **88**


    **CHAPTER 5: Using the Compatibility Library for Older Devices** is add the renderscript-v8.jar
    file as an external jar file to the project’s Build Path. You will find this jar
    file under the SDK build-tools directory. Use the latest version available.


    Within your code, make sure you import from android.support.


    v8.renderscript rather than android.renderscript. If you are modifying an existing
    RenderScript application for the v8 library, make sure to clean your project;
    the Java files that are generated from your .rs files need to be regenerated to
    also use the v8 library. You can now use RenderScript as usual and deploy your
    application to older versions of Android.


    Including the v13 Support Library


    Finally, to include the v13 compatibility library into your application, navigate
    to the SDK extras directory and find the v13 jar file. Copy this file to the /


    libs directory of your application project. Once the v13 jar file is in place,
    right-click it to pull up the menu, and then choose Build Path ➤ Add to Build
    Path. There’s a good chance you already have the v4 and v7 appcompat libraries
    in your application courtesy of ADT. You may choose to get rid of those if you
    don’t need the functionality from either one. For example, if the minimum SDK
    for your application is v11, you can use the native ActionBar class without the
    need for the v7 appcompat support library.


    The v13 jar file contains many of the same classes as v4, so you don’t want to
    cause any problems by having the same classes in twice. If you’re going to have
    all three libraries in your application (i.e., v4, v7, and v13), then at least
    ensure that v13 is ordered before v4\. This can be done in the Configure Build
    Path dialog box.


    Including Just the v4 Support Library


    If you really must have the v4 support library and none of the others, you would
    follow the same procedure as for the v13 library.


    Retrofitting an App with the Android Support


    Library


    To get a better feel for how this all works, you’re going to bring back a fragment
    app you worked on in Chapter 1 and will make it work for older versions of Android
    that don’t natively support fragments.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 5: Using the Compatibility Library for Older Devices** **89**


    Use File ➤ Import, choose General, then Existing Projects into Workspace.


    Navigate to the ShakespeareInstrumented project from Chapter 1 and choose that.
    Check “Copy projects into workspace” before hitting Finish.


    Now you’re going to retrofit this application to work on versions of Android lower
    than API version 11\. The following works when you don’t need resources from the
    compatibility library, since it worries only about copying in the JAR file.


    1\. Right-click your project and choose Android


    Tools ➤ Add Support Library.... Accept the license


    and click OK.


    2\. Now go into MainActivity.java and change the


    base class from Activity to FragmentActivity.


