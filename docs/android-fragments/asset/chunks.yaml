  trans: '

    片段只能在活动的上下文中创建。这可以通过加载活动的布局 XML 文件，或者通过使用如代码清单 1-1 中的代码直接实例化来实现。当通过代码实例化时，片段通常通过片段事务附加到活动。无论哪种情况，都会使用
    `FragmentManager` 类来访问和管理这些活动中的片段。


    您可以在活动或已附加的片段上使用 `getFragmentManager()` 方法来获取片段管理器。您从代码清单 1-8 中看到，片段管理器就是获取片段事务的地方。除了获取片段事务，您还可以通过片段的
    ID、标签或组合键及键值对来获取片段。如果片段是从 XML 加载的，其 ID 将是片段的资源 ID；如果片段是通过片段事务放入视图中的，其 ID 将是容器的资源
    ID。片段的标签是一个 `String`，您可以在片段的 XML 定义中分配，也可以在通过片段事务将片段放入视图时分配。通过组合键及键值对来检索片段的方法仅适用于使用
    `putFragment()` 方法持久化保存的片段。


    用于获取片段的 getter 方法包括 `findFragmentById()`、`findFragmentByTag()` 和 `getFragment()`。`getFragment()`
    方法会与 `putFragment()` 方法配合使用，后者也需要一个组合键、一个键以及待保存的片段。该组合键很可能就是 `savedState` 组合键，而
    `putFragment()` 将在 `onSaveInstanceState()` 回调中使用，以保存当前活动（或另一个片段）的状态。`getFragment()`
    方法可能会在 `onCreate()` 中调用，以对应 `putFragment()`，不过对于片段来说，如前所述，该组合键也适用于其他回调方法。


    显然，您无法对尚未附加到活动的片段使用 `getFragmentManager()` 方法。但同样，您可以将片段附加到活动，而无需让用户立即看到它。如果您这样做，应该为片段关联一个
    `String` 标签，以便将来能够找到它。您很可能会使用 `FragmentTransaction` 的以下方法来实现：


    ```

    public FragmentTransaction add (Fragment fragment, String tag)

    ```


    事实上，您可以拥有一个不显示视图层次结构的片段。这样做可能是为了将某些逻辑封装在一起，使其能够附加到活动，同时仍然保留相对于活动生命周期和其他片段的一定自主性。当活动因设备配置更改而经历重新创建周期时，这个非
    UI 片段可以在活动消失并重新出现时基本保持完整。这对于 `setRetainInstance()` 选项来说是一个很好的应用场景。


    片段的回退栈也属于片段管理器的管辖范围。片段事务用于将片段放入回退栈，而片段管理器则可以将片段从回退栈中移除。这通常通过片段的 ID 或标签来完成，但也可以基于回退栈中的位置，或者仅仅是弹出栈顶的片段。


    最后，片段管理器还提供了一些用于调试功能的方法，例如使用 `enableDebugLogging()` 开启向 LogCat 输出调试信息，或使用 `dump()`
    将片段管理器的当前状态输出到流中。请注意，您在代码清单 1-4 的活动 `onCreate()` 方法中开启了片段管理器调试。


    ## 引用片段时的注意事项


    现在，让我们重新审视之前关于片段生命周期以及参数和已保存状态组合键的讨论。Android 可能在不同的时间点保存您的某个片段。这意味着，当您的应用程序想要检索该片段时，它可能不在内存中。因此，我们提醒您**不要**认为对片段的变量引用会长时间有效。如果使用片段事务在容器视图中替换片段，那么对旧片段的任何引用现在都指向一个可能位于回退栈中的片段。或者，在应用程序配置更改（例如屏幕旋转）期间，片段可能会从活动的视图层次结构中分离。请务必小心。


    如果您要持有对片段的引用，请注意它何时可能被保存；当您需要再次找到它时，应使用片段管理器的某个 getter 方法。如果您想持有一个片段引用，例如当活动经历配置更改时，您可以使用
    `putFragment()` 方法，并传入适当的组合键。对于活动和片段而言，适当的组合键就是 `onSaveInstanceState()` 中使用的、并会在
    `onCreate()`（对于片段，则是片段生命周期中的其他早期回调）中重新出现的 `savedState` 组合键。您可能永远不会将对片段的直接引用存储到片段的参数组合键中；如果您有此想法，请务必先三思。


    获取特定片段的另一种方式是使用已知的标签或已知的 ID 进行查询。先前描述的 getter 方法允许通过这种方式从片段管理器中检索片段，这意味着您可以选择仅记住片段的标签或
    ID，以便使用这些值之一从片段管理器中获取它，而不是使用 `putFragment()` 和 `getFragment()`。


    ## 保存片段状态


    Android 3.2 中引入了另一个有趣的类：`Fragment.SavedState`。使用 `FragmentManager` 的 `saveFragmentInstanceState()`
    方法，您可以向此方法传递一个片段，它会返回一个代表该片段状态的对象。然后，您可以使用 `Fragment` 的 `setInitialSavedState()`
    方法在初始化片段时使用该对象。第 2 章将对此进行更详细的讨论。


