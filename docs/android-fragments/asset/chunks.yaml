  raw: 'Note that this is not the same bundle as the one attached as initialization
    arguments. This bundle is one in which you are likely to store the current state
    of the fragment, not the values that should be used to initialize it.


    A Fragment’s Life Cycle


    Before you start using fragments in sample applications, you need understand the
    life cycle of a fragment. Why? A fragment’s life cycle is more complicated than
    an activity’s life cycle, and it’s very important to understand *when* you can
    do things with fragments. Figure [1-2 shows the](#part0000_split_000.html#p12)


    life cycle of a fragment.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00030.png)


    **6**


    **CHAPTER 1: Fragments Fundamentals**


    ***Figure 1-2.** Life cycle of a fragment*


    If you compare this to the life cycle for an activity, you’ll notice several differences,
    due mostly to the interaction required between an activity and a fragment. A fragment
    is very dependent on the activity in which it lives and can go through multiple
    steps while its activity goes through one.


    At the very beginning, a fragment is instantiated. It now exists as an object
    in memory. The first thing that is likely to happen is that initialization arguments
    will be added to your fragment object. This is definitely true in the situation
    where the system is re-creating your fragment from a saved state.


    When the system is restoring a fragment from a saved state, the default constructor
    is invoked, followed by the attachment of the initialization arguments bundle.
    If you are doing the creation of the fragment in code, a nice pattern to use is
    that in Listing 1-1, which shows a factory type of instantiator within the MyFragment
    class definition.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 1: Fragments Fundamentals**


    **7**


    *Listing 1-1\. Instantiating a Fragment Using a Static Factory Method* public
    static MyFragment newInstance(int index) {


    MyFragment f = new MyFragment();


    Bundle args = new Bundle();


    args.putInt("index", index);


    f.setArguments(args);


    return f;


    }


    From the client’s point of view, they get a new instance by calling the static
    newInstance() method with a single argument. They get the instantiated object
    back, and the initialization argument has been set on this fragment in the arguments
    bundle. If this fragment is saved and reconstructed later, the system will go
    through a very similar process of calling the default constructor and then reattaching
    the initialization arguments. For your particular case, you would define the signature
    of your newInstance() method (or methods) to take the appropriate number and type
    of arguments, and then build the arguments bundle appropriately. This is all you
    want your newInstance() method to do. The callbacks that follow will take care
    of the rest of the setup of your fragment.


    The onInflate( ) Callback


    The next thing that happens is layout view inflation. If your fragment is defined
    by a <fragment> tag in a layout, your fragment’s onInflate() cal back will be
    called. This passes in a reference to the surrounding activity, an AttributeSet
    with the attributes from the <fragment> tag, and a saved bundle.


    The saved bundle is the one with the saved state values in it, put there by onSaveInstanceState()
    if this fragment existed before and is being re-created.


    The expectation of onInflate() is that you’l read attribute values and save them
    for later use. At this stage in the fragment’s life, it’s too early to actual
    y do anything with the user interface. The fragment is not even associated to
    its activity yet. But that’s the next event to occur to your fragment.


    The onAttach( ) Callback


    The onAttach() callback is invoked after your fragment is associated with its
    activity. The activity reference is passed to you if you want to use it. You can
    at least use the activity to determine information about your enclosing activity.
    You can also use the activity as a context to do other operations.'
