- fmt: '# CHAPTER 2: Responding to Configuration Changes


    ## The Default Configuration Change Process


    The Android operating system keeps track of the current `Configuration` of the
    device it’s running on. Configuration includes lots of factors, and new ones get
    added all the time. For example, if a device is plugged into a docking station,
    that represents a change in the device configuration. When a configuration change
    is detected by Android, callbacks are invoked in running applications to tell
    them a change is occurring, so an application can properly respond to the change.
    We’ll discuss those callbacks a little later, but for now let’s refresh your memory
    with regard to resources.


    One of the great features of Android is that resources get selected for your activity
    based on the current configuration of the device. You don’t need to write code
    to figure out which configuration is active; you just access resources by name,
    and Android gets the appropriate resources for you.


    If the device is in portrait mode and your application requests a layout, you
    get the portrait layout. If the device is in landscape mode, you get the landscape
    layout. The code just requests a layout without specifying which one it should
    get. This is powerful because as new configuration factors get introduced, or
    new values for configuration factors, the code stays the same.


    A developer needs to do is decide if new resources need to be created, and create
    them as necessary for the new configuration. Then, when the application goes through
    a configuration change, Android provides the new resources to the application,
    and everything continues to function as desired.


    Because of a great desire to keep things simple, Android destroys the current
    activity when the configuration changes and creates a new one in its place. This
    might seem rather harsh, but it’s not. It is a bigger challenge to take a running
    activity and figure out which parts would stay the same and which would not, and
    then only work with the pieces that need to change.


    An activity that’s about to be destroyed is properly notified first, giving you
    a chance to save anything that needs to be saved. When the new activity gets created,
    it has the opportunity to restore state using data from the previous activity.
    For a good user experience, obviously you do not want this save and restore to
    take very long.


    It’s fairly easy to save any data that you need saved and then let Android throw
    away the rest and start over, as long as the design of the application and its
    activities is such that activities don’t contain a lot of non-UI stuff that would
    take a long time to re-create. Therein lies the secret to successful configuration
    change design: do not put “stuff” inside an activity that cannot be easily re-created
    during a configuration change.


    Keep in mind that our application is not being destroyed, so anything that is
    in the application context, and not a part of our current activity, will still
    be there for the new activity. Singletons will still be available, as well as
    any background threads we might have spun off to do work for our application.


    Any databases or content providers that we were working with will also still be
    around. Taking advantage of these makes configuration changes quick and painless.
    Keep data and business logic outside of activities if you can.


    The configuration change process is somewhat similar between activities and fragments.
    When an activity is being destroyed and re-created, the fragments within that
    activity get destroyed and re-created. What we need to worry about then is state
    information about our fragments and activity, such as data currently being displayed
    to the user, or internal values that we want to preserve. We will save what we
    want to keep, and pick it up again on the other side when the fragments and activities
    are being re-created.'
