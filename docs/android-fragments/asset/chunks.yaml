  trans: "\n# 第三章：使用对话框\n\n**59**\n\n务必使用片段管理器上的 getter 方法来检索已管理片段的实例，然后适当地转换该引用，并直接在该片段上调用方法。你甚至可以在另一个片段内部执行此操作。你通过接口和\
    \ Activity 将片段相互隔离的程度，或者通过片段间通信建立依赖关系的程度，取决于你的应用程序有多复杂以及你想要实现多少复用。\n\n## 使用 Toast\n\
    \n`Toast` 就像一个迷你警报对话框，它包含一条消息，显示一定时间后会自动消失。它没有任何按钮。因此可以说它是一种短暂的警报消息。它被称为 `Toast`，是因为它像吐司面包从烤面包机中弹出一样弹出。\n\
    \n清单 3-6 展示了一个如何使用 `Toast` 显示消息的示例。\n\n**清单 3-6.** 使用 `Toast` 进行调试\n\n```java\n\
    //创建一个函数，将消息包装成 toast\n//显示 toast\n\npublic void reportToast(String message)\n\
    {\n    String s = MainActivity.LOGTAG + \":\" + message;\n    Toast.makeText(activity,\
    \ s, Toast.LENGTH_SHORT).show();\n}\n```\n\n清单 3-6 中的 `makeText()` 方法不仅可以接受 Activity，还可以接受任何上下文对象，例如传递给广播接收器或服务的上下文对象。这扩展了\
    \ `Toast` 在 Activity 之外的使用。\n\n## 参考资料\n\n- [www.androidbook.com/androidfragments/projects](http://www.androidbook.com/androidfragments/projects)\
    \  \n  本章的测试项目。ZIP 文件名为 `AndroidFragments_ch03_Dialogs.zip`。下载内容包括 `PickerDialogFragmentDemo`\
    \ 中的日期和时间选择器对话框示例。\n\n- [`developer.android.com/guide/topics/ui/dialogs.html`](http://developer.android.com/guide/topics/ui/dialogs.html)\
    \  \n  Android SDK 文档，提供了关于使用 Android 对话框的出色介绍。你将在这里找到关于如何使用托管对话框的解释以及各种可用对话框的示例。\n\
    \n**60**\n\n**第三章：使用对话框**\n\n- [`developer.android.com/reference/android/content/DialogInterface.html`](http://developer.android.com/reference/android/content/DialogInterface.html)\
    \  \n  为对话框定义的许多常量。\n\n- [`developer.android.com/reference/android/app/AlertDialog.Builder.html`](http://developer.android.com/reference/android/app/AlertDialog.Builder.html)\
    \  \n  `AlertDialog.Builder` 类的 API 文档。\n\n- [`developer.android.com/reference/android/app/ProgressDialog.html`](http://developer.android.com/reference/android/app/ProgressDialog.html)\
    \  \n  `ProgressDialog` 的 API 文档。\n\n- [`developer.android.com/guide/topics/ui/controls/pickers.html`](http://developer.android.com/guide/topics/ui/controls/pickers.html)\
    \  \n  关于使用日期选择器和时间选择器对话框的 Android 教程。\n\n## 总结\n\n本章讨论了异步对话框以及如何使用对话框片段，包括以下主题：\n\
    \n- 什么是对话框以及为什么要使用它\n- Android 中对话框的异步特性\n- 在屏幕上显示对话框的三个步骤\n- 创建片段\n- 对话框片段创建视图层次结构的两种方法\n\
    - 片段事务如何参与显示对话框片段，以及如何获取一个对话框片段\n- 当用户在查看对话框片段时按下返回键会发生什么\n- 返回栈以及管理对话框片段\n- 当对话框片段上的按钮被点击时会发生什么，以及如何处理\n\
    - 一种从对话框片段向调用它的 Activity 进行通信的简洁方式\n- 一个对话框片段如何调用另一个对话框片段并仍然能够返回上一个对话框片段\n- `Toast`\
    \ 类以及如何将其用作简单的警报弹窗\n\n---\n\n# 第四章：使用首选项与保存状态\n\nAndroid 提供了一个健壮且灵活的框架来处理设置，也称为首选项。这里所说的设置，指的是用户为了按自己的喜好定制应用程序而做出并保存的功能选择。（在本章中，术语“设置”和“首选项”将互换使用。）例如，如果用户希望通过铃声或振动来接收通知，或者根本不接收通知，这就是用户保存的首选项；应用程序会记住该选择，直到用户更改它。Android\
    \ 提供了简单的 API，隐藏了首选项的管理和持久化。它还提供了预构建的用户界面，你可以用它们让用户进行首选项选择。由于 Android 首选项框架内置的强大功能，我们还可以将首选项用于更通用的应用程序状态存储，以便在应用程序退出后又返回时，能够从上次离开的地方继续。\n\
    \n再举一个例子，游戏的高分可以存储为首选项，尽管你可能希望使用自己的 UI 来显示它们。\n\n本章将介绍如何为你的应用程序实现自己的设置屏幕，如何与 Android\
    \ 系统设置交互，以及如何使用设置来秘密保存应用程序状态，同时还提供最佳实践指导。你将发现如何让你的设置在小屏幕以及平板电脑等较大屏幕上看起来美观。\n\n\
    **61**\n\n**第四章：使用首选项与保存状态**\n\n## 探索首选项框架\n\nAndroid 的首选项框架从单个的设置选择开始，构建到包含设置选择的屏幕层次结构。设置可以是二进制设置，例如开/关，也可以是文本输入、数值输入，或者是从选项列表中进行选择。Android\
    \ 使用一个 `PreferenceManager` 来向应用程序提供设置值。该框架负责进行和持久化更改，并在设置即将更改或已经更改时通知应用程序。虽然设置被持久化在文件中，但应用程序不直接处理这些文件。这些文件被隐藏起来，你稍后会看到它们在哪里。\n\
    \n首选项可以通过 XML 或编写代码来指定。在本章中，你将使用一个示例应用程序来演示不同类型的选项。XML 是指定首选项的首选方式，因此该应用程序就是使用\
    \ XML 编写的。XML 指定了最底层的设置，以及如何将设置分组到类别和屏幕中。作为参考，本章的示例应用程序展示了如图 4-1 所示的以下设置。\n\n\
    **图 4-1.** 示例应用程序首选项 UI 中的主要设置。由于屏幕高度，此处将上半部分显示在左侧，下半部分显示在右侧。注意两幅图像之间的重叠部分。\n\n\
    **第四章：使用首选项与保存状态**\n\n**63**\n"
- fmt: "Android 提供了一个端到端的偏好设置框架。这意味着该框架允许你定义偏好设置，将其展示给用户，并将用户的选择持久化到数据存储中。你可以在`/res/xml/`目录下的\
    \ XML 文件中定义偏好设置。要向用户展示偏好设置，你需要编写一个 Activity 类，该类继承自一个预定义的 Android 类`android.preference.PreferenceActivity`，并使用\
    \ Fragment 来处理偏好设置的各个屏幕。框架会处理其余的工作（显示和持久化）。在你的应用程序中，代码会获取特定偏好设置的引用。通过偏好设置引用，你可以获取该偏好设置的当前值。\n\
    \n为了使偏好设置能够在用户会话之间保存，当前值必须存储在某处。Android 框架负责将偏好设置持久化到设备上应用程序`/data/data`目录下的一个\
    \ XML 文件中（见图[4-2](#part0000_split_000.html#p68)）。\n\n**图 4-2.** 应用程序已保存偏好设置的路径\
    \  \n**注意** 你只能在模拟器中检查共享偏好设置文件。在真实设备上，由于 Android 的安全机制，共享偏好设置文件是无法读取的（当然，除非你拥有\
    \ root 权限）。\n\n应用程序的默认偏好设置文件路径是`/data/data/[PACKAGE_NAME]/shared_prefs/[PACKAGE_NAME]_preferences.xml`，其中`[PACKAGE_NAME]`是应用程序的包名。清单\
    \ 4-1 展示了本例中`com.androidbook.preferences.main_preferences.xml`数据文件的内容。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**64**\n\n**第 4 章：使用偏好设置与保存状态**\n\n*清单 4-1. 我们的示例中已保存的偏好设置*\n\n```xml\n<?xml\
    \ version='1.0' encoding='utf-8' standalone='yes' ?>\n<map>\n<boolean name=\"\
    notification_switch\" value=\"true\" />\n<string name=\"package_name_preference\"\
    >com.androidbook.win</string>\n<boolean name=\"potato_selection_pref\" value=\"\
    true\" />\n<boolean name=\"show_airline_column_pref\" value=\"true\" />\n<string\
    \ name=\"flight_sort_option\">2</string>\n<boolean name=\"alert_email\" value=\"\
    false\" />\n<set name=\"pizza_toppings\">\n<string>pepperoni</string>\n<string>cheese</string>\n\
    <string>olive</string>\n</set>\n<string name=\"alert_email_address\">davemac327@gmail.com</string>\n\
    </map>\n```\n\n如你所见，这些值存储在一个映射（map）中，偏好设置的键作为数据的名称。有些值看起来晦涩难懂，与展示给用户的内容并不匹配。例如，`flight_sort_option`的值是`2`。Android\
    \ 并不存储展示给用户的文本作为偏好设置的值；相反，它存储一个用户看不到的值，你可以独立于用户所见内容来使用它。你希望能够根据用户的语言自由更改显示的文本，同时也希望能够在保持偏好设置文件中存储值不变的情况下调整显示的文本。如果该值是一个整数而不是某个显示字符串，你甚至可以对偏好设置进行更简单的处理。你无需担心解析此数据文件。Android\
    \ 偏好设置框架提供了一个优秀的 API 来处理偏好设置，本章后面将对此进行更详细的描述。\n\n如果你将清单 4-1 中的偏好设置映射与图[4-1](#part0000_split_000.html#p67)中的截图进行比较，你会注意到并非所有偏好设置都在偏好设置\
    \ XML 数据文件中列出了值。这是因为偏好设置数据文件不会自动为你存储默认值。稍后你将了解如何处理默认值。\n\n现在你已经了解了这些值保存在哪里，接下来需要了解如何定义要展示给用户的屏幕，以便他们进行选择。\n\
    \n在了解如何将偏好设置收集到屏幕中之前，你将学习可以使用的不同类型的偏好设置，然后你将了解如何将它们组合到屏幕中。`/data/data` XML 文件中的每个持久化值都来自一个特定的偏好设置。所以，让我们理解每一项的含义。"
  raw: 'Android provides an end-to-end preferences framework. This means the framework
    lets you define your preferences, display the setting(s) to the user, and persist
    the user’s selection to the data store. You define your preferences in XML under
    /res/xml/. To show preferences to the user, you write an activity class that extends
    a predefined Android class called android.preference.PreferenceActivity and use
    fragments to handle the screens of preferences. The framework takes care of the
    rest (displaying and persisting). Within your application, your code will get
    references to specific preferences. With a preference reference, you can get the
    current value of the preference.


    In order for preferences to be saved across user sessions, the current values
    must be saved somewhere. The Android framework takes care of persisting preferences
    in an XML file within the application’s /data/data directory on the device (see
    Figure [4-2](#part0000_split_000.html#p68)).


    ***Figure 4-2.** Path to an application’s saved preferences* **Note** You will
    be able to inspect shared preferences files in the emulator only. On a real device,
    the shared preferences files are not readable due to Android security (unless
    you have root privileges, of course).


    The default preferences file path for an application is /data/data/


    [ *PACKAGE_NAME*]/shared_prefs/[ *PACKAGE_NAME*]_preferences.xml, where


    [PACKAGE_NAME] is the package of the application. Listing 4-1 shows the com.androidbook.preferences.main_preferences.xml
    data file for this example.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **64**


    **CHAPTER 4: Working with Preferences and Saving State**


    *Listing 4-1\. Saved Preferences for Our Example*


    <?xml version=''1.0'' encoding=''utf-8'' standalone=''yes'' ?>


    <map>


    <boolean name="notification_switch" value="true" />


    <string name="package_name_preference">com.androidbook.win</string>


    <boolean name="potato_selection_pref" value="true" />


    <boolean name="show_airline_column_pref" value="true" />


    <string name="flight_sort_option">2</string>


    <boolean name="alert_email" value="false" />


    <set name="pizza_toppings">


    <string>pepperoni</string>


    <string>cheese</string>


    <string>olive</string>


    </set>


    <string name="alert_email_address">davemac327@gmail.com</string>


    </map>


    As you can see, values are stored in a map, with preference keys as names to the
    data values. Some of the values look cryptic and do not match what is displayed
    to the user. For example, the value for flight_sort_


    option is 2\. Android does not store the displayed text as the value of the preference;
    rather, it stores a value that the user won’t see, that you can use independently
    of what the user sees. You want the freedom to change the displayed text based
    on the user’s language, and you also want the ability to tweak the displayed text
    while keeping the same stored value in the preferences file. You might even be
    able to do simpler processing of the preference if the value is an integer instead
    of some display string. What you don’t have to worry about is parsing this data
    file. The Android preferences framework provides a nice API for dealing with preferences,
    which will be described in more detail later in this chapter.


    If you compare the preferences map in Listing 4-1 with the screenshots in Figure
    [4-1](#part0000_split_000.html#p67), you will notice that not all preferences
    are listed with values in the preferences XML data file. This is because the preference
    data file does not automatically store a default value for you. You’ll see shortly
    how to deal with default values.


    Now that you’ve seen where the values are saved, you need to see how to define
    the screens to display to the user so they can make selections.


    Before you see how to collect preferences together into screens, you’ll learn
    about the different types of preferences you can use, and then you’ll see how
    to put them together into screens. Each persisted value in the /data/


    data XML file is from a specific preference. So let’s understand what each of
    these means.'
