    **CHAPTER 4: Working with Preferences and Saving State**


    *Listing 4-10\. Setting Up a Preference Listener*


    public boolean onPreferenceChange(Preference preference,


    Object newValue) {


    final String key = preference.getKey();


    if ("package_name_preference".equals(key)) {


    pkgPref.setSummary(newValue.toString());


    }


    ...


    return true;


    }


    You have to register the fragment as a listener in onResume() using setOnPre ferenceChangeListener(this)
    on each preference you want to listen on, and unregister in onPause() by calling
    it again with null. Now every time there is a pending change to a preference you’ve
    registered for, this callback will be invoked passing in the preference and the
    potential new value. The callback returns a boolean indicating whether to proceed
    with setting the preference to the new value (true) or not (false). Assuming you
    would return true to allow the new setting, this is where you can update the summary
    value as well. You could also validate the new value and reject the change. Perhaps
    you want a MultiSelectListPreference to have a maximum number of checked items.
    You could count the selected items in the callback and reject the change if there
    are too many.


    Saving State with Preferences


    Preferences are great for allowing users to customize applications to their liking,
    but we can use the Android preference framework for more than that. When your
    application needs to keep track of some data between invocations of the application,
    preferences are one way to accomplish the task even if the user can’t see the
    data in preference screens. Please find the sample application called SavingStateDemo
    to follow along with the complete source code.


    The Activity class has a getPreferences(int mode) method. This, in reality, simply
    calls getSharedPreferences() with the class name of the activity as the tag plus
    the mode as passed in. The result is an activity-specific shared preferences file
    that you can use to store data about this activity across invocations. A simple
    example of how you could use this is shown in Listing 4-11.


