    `editor.putBoolean(INITIALIZED, true);`


    `editor.putString("someString", someString);`


    `// Write other values as desired`


    `editor.commit();`


    What this code does is acquire a reference to preferences for our activity class
    and check for the existence of a boolean “preference” called `initialized`. We
    write “preference” in double quotation marks because this value is not something
    the user is going to see or set; it’s merely a value that we want to store in
    a shared preferences file for use next time. If we get a value, the shared preferences
    file exists, so the application must have been called before. You could then read
    other values out of the shared preferences file. For example, `someString` could
    be an activity variable that should be set from the last time this activity ran
    or set to the default value if this is the first time.


    To write values to the shared preferences file, you must first get a preferences
    `Editor`. You can then put values into preferences and commit those changes when
    you’re finished. Note that, behind the scenes, Android is managing a `SharedPreferences`
    object that is truly shared. Ideally, there is never more than one `Editor` active
    at a time. But it is very important to call the `commit()` method so that the
    `SharedPreferences` object and the shared preferences XML file get updated. In
    the example, the value of `someString` is written out to be used the next time
    this activity runs.


    You can access, write, and commit values any time to your preferences file. Possible
    uses for this include writing out high scores for a game or recording when the
    application was last run. You can also use the `getSharedPreferences()` call with
    different names to manage separate sets of preferences, all within the same application
    or even the same activity.


    `MODE_PRIVATE` was used for mode in our examples thus far. Because the shared
    preferences files are always stored within your application’s `/data/data/{package}`
    directory and therefore are not accessible to other applications, you only need
    to use `MODE_PRIVATE`.


    ## Using DialogPreference


    So far, you’ve seen how to use the out-of-the-box capabilities of the preferences
    framework, but what if you want to create a custom preference? What if you want
    something like the slider of the Brightness preference under Screen Settings?
    This is where `DialogPreference` comes in. `DialogPreference` is the parent class
    of `EditTextPreference` and `ListPreference`. The behavior is a dialog that pops
    up, displays choices to the user, and is closed with a button or via the Back
    button. But you can extend `DialogPreference` to set up your own custom preference.
    Within your extended class, you provide your own layout, your own click handlers,
    and custom code in `onDialogClosed()` to write the data for your preference to
    the shared preferences file.


