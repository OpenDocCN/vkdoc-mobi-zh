- fmt: "This is a very simple interface, as you can see. You choose only one callback\
    \ for this interface, which the activity must implement. Your fragments don’t\
    \ need to know the specifics of the calling activity, only that the calling activity\
    \ must implement the `OnDialogDoneListener` interface; therefore the fragments\
    \ can call this callback to communicate with the calling activity. Depending on\
    \ what the fragment is doing, there could be multiple callbacks in the interface.\
    \ For this sample application, you’re showing the interface separately from the\
    \ fragment class definitions.\n\nFor easier management of code, you could embed\
    \ the fragment listener interface inside of the fragment class definition itself,\
    \ thus making it easier to keep the listener and the fragment in sync with each\
    \ other.\n\n## Dialog Sample: `PromptDialogFragment`\n\nNow let’s look at your\
    \ first fragment, `PromptDialogFragment`, whose layout is in `/res/layout/prompt_dialog.xml`\
    \ and Java code is under `/src` in `PromptDialogFragment.java`.\n\nThis prompt\
    \ dialog layout looks like many you’ve seen previously. There is a `TextView`\
    \ to serve as the prompt; an `EditText` to take the user’s input; and three buttons\
    \ for saving the input, dismissing (cancelling) the dialog fragment, and popping\
    \ a help dialog.\n\nThe `PromptDialogFragment` Java code starts out looking just\
    \ like your earlier fragments. You have a `newInstance()` static method to create\
    \ new objects, and within this method you call the default constructor, build\
    \ an arguments bundle, and attach it to your new object. Next, you have something\
    \ new in the `onAttach()` callback. You want to make sure the activity you just\
    \ got attached to has implemented the `OnDialogDoneListener` interface. In order\
    \ to test that, you cast the activity passed in to the `OnDialogDoneListener`\
    \ interface. Here’s that code:\n\n```\ntry {\n    OnDialogDoneListener test =\
    \ (OnDialogDoneListener)act;\n}\ncatch(ClassCastException cce) {\n    // Here\
    \ is where we fail gracefully.\n    Log.e(MainActivity.LOGTAG, \"Activity is not\
    \ listening\");\n}\n```\n\nIf the activity does not implement this interface,\
    \ a `ClassCastException` is thrown. You could handle this exception and deal with\
    \ it more gracefully, but this example keeps the code as simple as possible.\n\
    \nNext up is the `onCreate()` callback. As is common with fragments, you don’t\
    \ build your user interface here, but you can set the dialog style. This is unique\
    \ to dialog fragments. You can set both the style and the theme yourself, or you\
    \ can set just style and use a theme value of zero (`0`) to let the system choose\
    \ an appropriate theme for you. Here’s that code:\n\n```\nint style = DialogFragment.STYLE_NORMAL,\
    \ theme = 0;\nsetStyle(style,theme);\n```\n\nIn `onCreateView()` you create the\
    \ view hierarchy for your dialog fragment.\n\nJust like other fragments, you do\
    \ not attach your view hierarchy to the view container passed in (that is, by\
    \ setting the `attachToRoot` parameter to `false`). You then proceed to set up\
    \ the button callbacks, and you set the dialog prompt text to the prompt that\
    \ was passed originally to `newInstance()`. Finally, you check to see whether\
    \ any values are being passed in through the saved state bundle (`icicle`). This\
    \ would indicate that your fragment is being re-created, most likely due to a\
    \ configuration change, and it’s possible that the user has already typed some\
    \ text. If so, you need to populate the `EditText` with what the user has done\
    \ so far. Remember that because your configuration has changed, the actual view\
    \ object in memory is not the same as before, so you must locate it and set the\
    \ text accordingly.\n\nThe very next callback is `onSaveInstanceState()`; it’s\
    \ where you save any current text typed by the user into the saved state bundle.\n\
    \nThe `onCancel()` and `onDismiss()` callbacks are not shown because all they\
    \ do is logging; you’ll be able to see when these callbacks fire during the fragment’s\
    \ lifecycle.\n\nThe final callback in the prompt dialog fragment is for the buttons.\
    \ Once again, you grab a reference to your enclosing activity and cast it to the\
    \ interface you expect the activity to have implemented. If the user pressed the\
    \ Save button, you grab the text as entered and call the interface’s callback\
    \ `onDialogDone()`. This callback takes the tag name of this fragment, a boolean\
    \ indicating whether this dialog fragment was cancelled, and a message, which\
    \ in this case is the text typed by the user. Here it is from the `MainActivity`:\n\
    \n```\npublic void onDialogDone(String tag, boolean cancelled,\nCharSequence message)\
    \ {\n    String s = tag + \" responds with: \" + message;\n    if(cancelled)\n\
    \        s = tag + \" was cancelled by the user\";\n    Toast.makeText(this, s,\
    \ Toast.LENGTH_LONG).show();\n    Log.v(LOGTAG, s);\n}\n```\n\nTo finish handling\
    \ a click on the Save button, you then call `dismiss()` to get rid of the dialog\
    \ fragment. Remember that `dismiss()` not only makes the fragment go away visually,\
    \ but also pops the fragment out of the fragment manager so it is no longer available\
    \ to you.\n\nIf the button pressed is Dismiss, you again call the interface callback,\
    \ this time with no message, and then you call `dismiss()`. And finally, if the\
    \ user pressed the Help button, you don’t want to lose the prompt dialog fragment,\
    \ so you do something a little different. We described this earlier. In order\
    \ to remember the prompt dialog fragment so you can come back to it later, you\
    \ need to create a fragment transaction to remove the prompt dialog fragment and\
    \ add the help dialog fragment with the `show()` method; this needs to go onto\
    \ the back stack. Notice, too, how the help dialog fragment is created with a\
    \ reference to a resource ID. This means your help dialog fragment can be used\
    \ with any help text available to your application.\n\n## Dialog Sample: `HelpDialogFragment`\n\
    \nYou created a fragment transaction to go from the prompt dialog fragment to\
    \ the help dialog fragment, and you placed that fragment transaction on the back\
    \ stack. This has the effect of making the prompt dialog fragment disappear from\
    \ view, but it’s still accessible through the fragment manager and the back stack.\
    \ The new help dialog fragment appears in its place and allows the user to read\
    \ the help text. When the user dismisses the help dialog fragment, the fragment\
    \ back stack entry is popped, with the effect of the help dialog fragment being\
    \ dismissed (both visually and from the fragment manager) and the prompt dialog\
    \ fragment restored to view.\n\nThis is a pretty easy way to make all this happen.\
    \ It is very simple yet very powerful; it even works if the user rotates the device\
    \ while these dialogs are being displayed.\n\nLook at the source code of the `HelpDialogFragment.java`\
    \ file and its layout (`help_dialog.xml`). The point of this dialog fragment is\
    \ to display help text.\n\nThe layout is a `TextView` and a Close button. The\
    \ Java code should be starting to look familiar to you. There’s a `newInstance()`\
    \ method to create a new help dialog fragment, an `onCreate()` method to set the\
    \ style and theme, and an `onCreateView()` method to build the view hierarchy.\
    \ In this particular case, you want to locate a string resource to populate the\
    \ `TextView`, so you access the resources through the activity and choose the\
    \ resource ID that was passed in to `newInstance()`. Finally, `onCreateView()`\
    \ sets up a button-click handler to capture the clicks of the Close button. In\
    \ this case, you don’t need to do anything interesting at the time of dismissal."
