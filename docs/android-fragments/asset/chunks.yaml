    match_parent\">\n        <TextView \n            android:id=\"@+id/text1\"\n \
    \           android:layout_width=\"match_parent\"\n            android:layout_height=\"\
    match_parent\" />\n    </ScrollView>\n</LinearLayout>\n```\n\n对于您的示例应用，无论处于横屏模式还是竖屏模式，您都可以为详情Fragment使用完全相同的布局文件。这个布局不是为Activity准备的，而仅仅是让Fragment显示文本。由于它可以被视为默认布局，您可以将其存储在`/res/layout`目录中，即使处于横屏模式，系统也能找到并使用它。\n\
    \n当Android查找`details.xml`文件时，它会先尝试与设备配置最匹配的特定目录，但如果无法在其他位置找到`details.xml`，最终会回到`/res/layout`目录。当然，如果您希望在横屏模式下为Fragment使用不同的布局，您可以定义一个单独的`details.xml`布局文件，并将其存储在`/res/layout-land`目录下。请尝试使用不同的`details.xml`文件进行实验。\n\
    \n当详情Fragment的`onCreateView()`被调用时，您只需获取适当的`details.xml`布局文件，对其进行解析（inflate），并将文本设置为`Shakespeare`类中的对应文本。此处未完整展示`Shakespeare`的全部Java代码，但**清单\
