    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**70**\n\n**第 4 章：使用偏好设置与保存状态**\n\
    \n由于最终用户看不到 `entryValues` 数组，最佳实践是在你的应用中只存储一次。因此，请创建且仅创建一个 `/res/values/prefvaluearrays.xml`\
