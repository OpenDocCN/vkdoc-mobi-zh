  trans: "\n# 文档大纲\n\n调用 AsyncTask  \n理解 `onPreExecute()` 回调与进度对话框  \n理解 `doInBackground()`\
    \ 方法  \n\n**目录**\n\n通过 `publishProgress()` 触发 `onProgressUpdate()`  \n理解 `onPostExecute()`\
    \ 方法  \n升级到确定型进度对话框  \n`AsyncTask` 与线程池  \n正确显示 `AsyncTask` 进度的问题与解决方案  \n处理 Activity\
    \ 指针与设备旋转  \n处理托管对话框  \n良好行为进度对话框的测试场景  \n使用保留 Fragment 与进度对话框  \n探索关键代码片段  \n\
    参考文献  \n总结  \n索引  \n\n---\n\n**关于作者**\n\n**Dave MacLean** 是一位软件工程师和架构师，现居并工作于佛罗里达州奥兰多。自\
    \ 1980 年以来，他使用多种语言进行编程，开发了从机器人自动化系统到数据仓库、从 Web 自助服务应用到电子数据交换事务处理器的解决方案。Dave 曾就职于\
    \ Sun Microsystems、IBM、Trimble Navigation、General Motors、佛罗里达蓝十字蓝盾协会以及几家小型公司。他撰写过多本关于\
    \ Android 的书籍和多篇杂志文章。他毕业于加拿大滑铁卢大学，获得系统工程设计学士学位。\n\n访问他的博客 `http://davemac327.blogspot.com`\
    \ 或通过 `davemac327@gmail.com` 联系他。\n\n**Satya Komatineni** 在 IT 与 Web 领域拥有超过 20\
    \ 年的编程经验。他曾有机会使用 Assembly、C、C++、Rexx、Java、C#、Lisp、HTML、JavaScript、CSS、SVG、关系型数据库、对象数据库及相关技术进行开发。他已发表\
    \ 30 多篇涉及这些领域的文章，涵盖印刷版和在线版。他经常在 O'Reilly 开源大会上演讲，主题围绕 Java 和 Web 的创新。Satya 在创建\
    \ Aspire（一个基于 Java 的综合开源 Web 框架）方面做了大量原创工作，并通过他在 `KnowledgeFolders.com` 的开源工作探索了个人\
    \ Web 生产力及协作工具。Satya 拥有印度理工学院电气工程硕士学位和印度安得拉大学电气工程学士学位。您可以在 `SatyaKomatineni.com`\
    \ 找到他的网站。\n\n---\n\n**关于技术审阅者**\n\n**Shane Kirk** 于 2000 年获得肯塔基大学计算机科学学士学位。他目前是缅因州韦斯特布鲁克\
    \ IDEXX 实验室的高级软件工程师，日常工作致力于嵌入式系统的通信解决方案。Shane 对移动开发的涉足始于 2010 年，在他购买首款智能手机——运行\
    \ Eclair（Android 2.1）的 Droid X 后不久。自那时起，他便深深迷上了 Android。\n\n---\n\n**致谢**\n\n\
    撰写一本技术书籍是团队合作的成果，我们特别要感谢这个团队。Apress 的成员们非常出色，包括 Steve Anglin、Mark Powers、Brendan\
    \ Frost 和 Anna Ishchenko。我们还要衷心感谢我们的技术审阅者 Shane Kirk，他辛勤工作，帮我们纠正错误，使本书变得更加出色。\n\
    \n此外，我们还得到了各种 Android 论坛的帮助，它们为我们的问题提供了答案以及宝贵的建议。我们向读者们致以谢意。非常感谢你们购买我们的书籍、向我们提问，并时刻鞭策我们进步。这让我们变得更优秀，也希望我们的作品能以某种方式帮助你们实现目标。我们非常努力地跟上\
    \ Android 领域的所有动态，以便能够以易于理解的方式向你们进行讲解。我们真心希望你们能像我们一样，从中受益匪浅。\n\n我们尤其要感谢我们的家人，感谢他们允许我们外出调研、购买小工具、发泄沮丧情绪，并最终创作出你们手中这部作品。我们对你们感激不尽。\n"
