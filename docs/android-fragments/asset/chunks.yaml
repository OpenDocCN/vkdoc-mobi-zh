    \ index) {\n    MyFragment f = new MyFragment();\n    Bundle args = new Bundle();\n\
    \    args.putInt(\"index\", index);\n    f.setArguments(args);\n    return f;\n\
    }\n```\n\n从客户端的角度来看，他们通过调用静态的 `newInstance()` 方法并传递一个参数来获得一个新实例。他们返回实例化的对象，并且初始化参数已在此\
    \ fragment 的参数 bundle 中设置。如果这个 fragment 稍后被保存并重建，系统将经历一个非常相似的过程：调用默认构造函数，然后重新附加初始化参数。对于你的特定情况，你可以定义你的\
    \ `newInstance()` 方法（或方法们）的签名，以接收适当数量和类型的参数，然后适当地构建参数 bundle。这就是你希望 `newInstance()`\
    \ 方法做的所有事情。后续的回调将负责 setup fragment 的其余部分。\n\n## `onInflate()` 回调\n\n接下来发生的是布局视图的填充。如果你的\
    \ fragment 是通过布局中的 `<fragment>` 标签定义的，那么 fragment 的 `onInflate()` 回调将被调用。这会将周围\
    \ activity 的引用、一个包含来自 `<fragment>` 标签属性的 `AttributeSet` 以及一个已保存的 bundle 传递进来。\n\
    \n已保存的 bundle 是包含已保存状态值的那个，如果这个 fragment 之前存在并且正在被重新创建，这些值由 `onSaveInstanceState()`\
    \ 放置到其中。\n\n`onInflate()` 的预期行为是，你读取属性值并将其保存以供后续使用。在 fragment 生命周期的这个阶段，对用户界面进行任何实际操作都为时过早。fragment\
    \ 甚至还没有关联到它的 activity。但这是 fragment 要发生的下一个事件。\n\n## `onAttach()` 回调\n\n`onAttach()`\
    \ 回调在你的 fragment 与它的 activity 关联后被调用。如果你需要使用，activity 的引用会被传递给你。你至少可以使用 activity\
    \ 来确定关于其宿主 activity 的信息。你也可以将 activity 作为上下文来执行其他操作。\n"
- fmt: "# Fragments Fundamentals\n\n需要特别注意的是，`Fragment`类有一个`getActivity()`方法，它会返回该`Fragment`所依附的`Activity`。请记住，在整个生命周期中，你可以通过`Fragment`的`getArguments()`方法获取初始化参数`Bundle`。然而，一旦`Fragment`被附加到其`Activity`上，就不能再次调用`setArguments()`。因此，除了在最开始的时候，你不能再向初始化参数中添加内容。\n\
    \n## `onCreate()`回调\n\n接下来是`onCreate()`回调。虽然这与`Activity`的`onCreate()`类似，但区别在于你不应该在此处放置依赖`Activity`视图层次结构的代码。此时你的`Fragment`可能已经与其`Activity`关联，但你尚未收到`Activity`的`onCreate()`已完成的通知。这将在后续步骤中发生。如果有保存的状态`Bundle`，此回调会将其传入。这个回调是创建后台线程以获取`Fragment`所需数据的最早时机。你的`Fragment`代码运行在UI线程上，你不希望在UI线程上执行磁盘输入/输出（I/O）或网络访问。事实上，启动一个后台线程来准备数据是非常合理的。后台线程应该处理阻塞调用。你之后需要与数据建立连接，可能使用`Handler`或其他技术。\n\
    \n## `onCreateView()`回调\n\n下一个回调是`onCreateView()`。这里期望你返回此`Fragment`的视图层次结构。传入此回调的参数包括一个`LayoutInflater`（可用于为此`Fragment`填充布局）、一个`ViewGroup`父容器（在**清单1-2**中称为`container`），以及保存的`Bundle`（如果存在）。非常重要的一点是，你不应该将视图层次结构附加到传入的`ViewGroup`父容器上。该关联稍后将自动发生。如果你在此回调中将`Fragment`的视图层次结构附加到父容器上，很可能会引发异常——或者至少会出现奇怪且意外的应用程序行为。\n\
    \n**清单1-2 在`onCreateView()`中创建Fragment视图层次结构**\n\n```java\n@Override\npublic View\
    \ onCreateView(LayoutInflater inflater,\n                         ViewGroup container,\
    \ Bundle savedInstanceState) {\n    if(container == null)\n        return null;\n\
    \n    View v = inflater.inflate(R.layout.details, container, false); \n    TextView\
    \ text1 = (TextView) v.findViewById(R.id.text1);\n    text1.setText(myDataSet[\
    \ getPosition() ] );\n    return v;\n}\n```\n\n提供父容器的目的是让你能够将其与`LayoutInflater`的`inflate()`方法一起使用。如果父容器值为`null`，则意味着此特定`Fragment`将不会被显示，因为没有要附加的视图层次结构。在这种情况下，你可以直接从此处返回`null`。请记住，你的应用程序中可能存在一些未被显示的`Fragment`。\n\
    \n**清单1-2**展示了你可能在此方法中执行的操作示例。你可以看到如何访问仅用于此`Fragment`的布局XML文件，并将其填充为视图，然后返回给调用者。这种方法有几个优点。你始终可以在代码中构建视图层次结构，但通过填充布局XML文件，你可以利用系统的资源查找逻辑。根据设备所处的配置，或者根据你使用的设备，系统会选择适当的布局XML文件。然后你可以访问布局中的特定视图（在此例中为`text1`的`TextView`字段）来执行所需操作。重复一个非常重要的要点：不要在此回调中将`Fragment`的视图附加到父容器上。你可以在**清单1-2**中看到，你在调用`inflate()`时使用了容器，但同时你也为`attachToRoot`参数传递了`false`。"
  raw: 'One thing to note is that the Fragment class has a getActivity() method that
    will always return the attached activity for your fragment should you need it.
    Keep in mind that all during this life cycle, the initialization arguments bundle
    is available to you from the fragment’s getArguments()


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **8**


    **CHAPTER 1: Fragments Fundamentals**


    method. However, once the fragment is attached to its activity, you can’t call
    setArguments() again. Therefore, you can’t add to the initialization arguments
    except in the very beginning.


    The onCreate( ) Callback


    Next up is the onCreate() callback. Although this is similar to the activity’s
    onCreate(), the difference is that you should not put code in here that relies
    on the existence of the activity’s view hierarchy. Your fragment may be associated
    to its activity by now, but you haven’t yet been notified that the activity’s
    onCreate() has finished. That’s coming up. This callback gets the saved state
    bundle passed in, if there is one. This callback is about as early as possible
    to create a background thread to get data that this fragment will need. Your fragment
    code is running on the UI thread, and you don’t want to do disk input/output (I/O)
    or network accesses on the UI thread. In fact, it makes a lot of sense to fire
    off a background thread to get things ready. Your background thread is where blocking
    calls should be. You’ll need to hook up with the data later, perhaps using a handler
    or some other technique.


    The onCreateView( ) Callback


    The next callback is onCreateView(). The expectation here is that you will return
    a view hierarchy for this fragment. The arguments passed into this callback include
    a LayoutInflater (which you can use to inflate a layout for this fragment), a
    ViewGroup parent (called *container* in Listing 1-2), and the saved bundle if
    one exists. It is very important to note that you should not attach the view hierarchy
    to the ViewGroup parent passed in. That association will happen automatically
    later. You will very likely get exceptions if you attach the fragment’s view hierarchy
    to the parent in this callback—or at least odd and unexpected application behavior.


    *Listing 1-2\. Creating a Fragment View Hierarchy in **on CreateView()***


    @Override


    public View onCreateView(LayoutInflater inflater,


    ViewGroup container, Bundle savedInstanceState) {


    if(container == null)


    return null;


    View v = inflater.inflate(R.layout.details, container, false); TextView text1
    = (TextView) v.findViewById(R.id.text1);


    text1.setText(myDataSet[ getPosition() ] );


    return v;


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 1: Fragments Fundamentals**


    **9**


    The parent is provided so you can use it with the inflate() method of the LayoutInflater.
    If the parent container value is nul , that means this particular fragment won’t
    be viewed because there’s no view hierarchy for it to attach to.


    In this case, you can simply return nul from here. Remember that there may be
    fragments floating around in your application that aren’t being displayed.


    Listing 1-2 shows a sample of what you might want to do in this method.


    Here you see how you can access a layout XML file that is just for this fragment
    and inflate it to a view that you return to the caller. There are several advantages
    to this approach. You could always construct the view hierarchy in code, but by
    inflating a layout XML file, you’re taking advantage of the system’s resource-finding
    logic. Depending on which configuration the device is in, or for that matter which
    device you’re on, the appropriate layout XML file will be chosen. You can then
    access a particular view within the layout—in this case, the text1 TextView field—to
    do what you want with. To repeat a very important point: do not attach the fragment’s
    view to the container parent in this callback. You can see in Listing 1-2 that
    you use a container in the call to inflate(), but you also pass false for the
    attachToRoot parameter.'
