  trans: "\n# 片段生命周期回调\n\n## `onStop()` 回调\n\n下一个撤销回调是 `onStop()`。该回调与 Activity 的\
    \ `onStop()` 绑定，其作用与 Activity 的 `onStop()` 类似。已停止的片段可以直接回到 `onStart()` 回调，随后进入\
    \ `onResume()`。\n\n## `onDestroyView()` 回调\n\n如果你的片段即将被销毁或保存，撤销方向的下一个回调是 `onDestroyView()`。此回调将在你先前在\
    \ `onCreateView()` 中创建的视图层次结构从片段中分离后被调用。\n\n## `onDestroy()` 回调\n\n接下来是 `onDestroy()`。当片段不再被使用时，会调用此方法。\n\
    \n请注意，此时片段仍附着在 Activity 上且仍可被找到，但它已无法执行太多操作。\n\n## `onDetach()` 回调\n\n片段生命周期的最后一个回调是\
    \ `onDetach()`。一旦调用该回调，片段便与 Activity 解除绑定，不再拥有视图层次结构，且其所有资源应已被释放。\n\n## 使用 `setRetainInstance()`\n\
    \n你可能已经注意到图 1-2 中的虚线。片段的一个巧妙特性是，当 Activity 被重新创建（因此片段也会随之重建）时，你可以指定不希望片段被完全销毁。因此，Fragment\
    \ 提供了一个名为 `setRetainInstance()` 的方法，该方法接受一个布尔参数来指示：“是的，我希望在 Activity 重启时保留该片段”或“不，请销毁它，我将从头创建一个新片段”。\n\
    \n调用 `setRetainInstance()` 的最佳位置是片段的 `onCreate()` 回调，但 `onCreateView()` 和 `onActivityCreated()`\
    \ 中也可以调用。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 1 章：片段基础**\n\
    \n如果参数为 true，则表示你希望将片段对象保留在内存中，而不是从头重新创建。然而，如果 Activity 正在被销毁并重新创建，你必须将片段从当前 Activity\
    \ 分离，并将其附着到新的 Activity 上。关键点在于：如果保留了实例值为 true，你实际上不会销毁片段实例，因此在另一端也无需创建新实例。图中的虚线意味着在销毁流程中会跳过\
    \ `onDestroy()` 回调，在片段重新附着到新 Activity 时会跳过 `onCreate()` 回调，而所有其他回调仍会触发。\n\n由于\
    \ Activity 重新创建通常由配置变更引起，你的片段回调应假定配置已发生变更并采取相应措施。例如，在 `onCreateView()` 中加载布局以创建新的视图层次结构。清单\
    \ 1-2 中提供的代码已按此方式编写，可处理该情况。如果你选择使用保留实例功能，可以将部分初始化逻辑放在 `onCreate()` 之外，因为它不会像其他回调那样总是被调用。\n\
    \n# 展示生命周期的片段示例应用\n\n没有什么比查看真实示例更能理解一个概念了。我们将使用一个经过插桩的示例应用，让你观察所有这些回调的实际运行。你将使用一个示例应用，该应用在一个片段中显示莎士比亚作品标题列表；当用户点击某个标题时，该剧作的文本会出现在另一个片段中。此示例应用可在平板电脑的横屏和竖屏模式下运行。随后，你将配置它以模拟在较小屏幕上运行，从而了解如何将文本片段分离到一个\
    \ Activity 中。\n\n首先，我们从清单 1-3 中 Activity 的横屏模式 XML 布局开始，运行时它看起来将如图 1-3 所示。\n\n\
    **清单 1-3.** Activity 的横屏模式布局 XML\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
    utf-8\"?>\n<LinearLayout\n    android:orientation=\"horizontal\"\n    android:layout_width=\"\
    match_parent\"\n```\n"
- fmt: "`android:layout_height=\"match_parent\"`>\n\n```xml\n<fragment class=\"com.androidbook.fragments.bard.TitlesFragment\"\
    \n    android:id=\"@+id/titles\" android:layout_weight=\"1\"\n    android:layout_width=\"\
    0px\"\n    android:layout_height=\"match_parent\" />\n```\n\n`<FrameLayout\n \
    \   android:id=\"@+id/details\" android:layout_weight=\"2\"\n    android:layout_width=\"\
    0px\"\n    android:layout_height=\"match_parent\" />\n</LinearLayout>`\n\n**Figure\
    \ 1-3.** The user interface of your sample fragment application\n\n**Note** At\
    \ the end of the chapter is the URL you can use to download the projects in this\
    \ chapter. This will allow you to import these projects into your IDE (such as\
    \ Eclipse or Android Studio) directly.\n\nThis layout looks like a lot of other\
    \ layouts you've seen throughout the book, horizontally left to right with two\
    \ main objects. There's a special new tag, though, called `<fragment>`, and this\
    \ tag has a new attribute called `class`.\n\nKeep in mind that a fragment is not\
    \ a view, so the layout XML is a little different for a fragment than it is for\
    \ everything else. The other thing to keep in mind is that the `<fragment>` tag\
    \ is just a placeholder in this layout. You should not put child tags under `<fragment>`\
    \ in a layout XML file.\n\nThe other attributes for a fragment look familiar and\
    \ serve a purpose similar to that for a view. The fragment tag's `class` attribute\
    \ specifies your extended class for the titles of your application. That is, you\
    \ must extend one of the Android Fragment classes to implement your logic, and\
    \ the `<fragment>` tag must know the name of your extended class. A fragment has\
    \ its own view hierarchy that will be created later by the fragment itself. The\
    \ next tag is a `FrameLayout`—not another `<fragment>` tag. Why is that? We'll\
    \ explain in more detail later, but for now, you should be aware that you're going\
    \ to be doing some transitions on the text, swapping out one fragment with another.\n\
    \nYou use the `FrameLayout` as the view container to hold the current text fragment.\
    \ With your titles fragment, you have one—and only one—fragment to worry about:\
    \ no swapping and no transitions. For the area that displays the Shakespearean\
    \ text, you'll have several fragments.\n\nThe `MainActivity` Java code is in Listing\
    \ 1-4. Actually, the listing only shows the interesting code. The code is instrumented\
    \ with logging messages so you can see what's going on through LogCat. Please\
    \ review the source code files for `ShakespeareInstrumented` from the web site\
    \ to see all of it.\n\n*Listing 1-4. Interesting Source Code from **MainActivity***\n\
    \n```java\npublic boolean isMultiPane() {\n    return getResources().getConfiguration().orientation\n\
    \            == Configuration.ORIENTATION_LANDSCAPE;\n}\n\n/**\n * Helper function\
    \ to show the details of a selected item, either by\n * displaying a fragment\
    \ in-place in the current UI, or starting a\n * whole new activity in which it\
    \ is displayed.\n */\npublic void showDetails(int index) {\n    Log.v(TAG, \"\
    in MainActivity showDetails(\" + index + \")\");\n    if (isMultiPane()) {\n \
    \       // Check what fragment is shown, replace if needed.\n        DetailsFragment\
    \ details = (DetailsFragment)\n                getFragmentManager().findFragmentById(R.id.details);\n\
    \        if ( (details == null) ||\n                (details.getShownIndex() !=\
    \ index) ) {\n            // Make new fragment to show this selection.\n     \
    \       details = DetailsFragment.newInstance(index);\n\n            // Execute\
    \ a transaction, replacing any existing\n            // fragment with this one\
    \ inside the frame.\n            Log.v(TAG, \"about to run FragmentTransaction...\"\
    );\n            FragmentTransaction ft\n                    = getFragmentManager().beginTransaction();\n\
    \            ft.setTransition(\n                    FragmentTransaction.TRANSIT_FRAGMENT_FADE);\n\
    \            //ft.addToBackStack(\"details\");\n            ft.replace(R.id.details,\
    \ details);\n            ft.commit();\n        }\n    } else {\n        // Otherwise\
    \ you need to launch a new activity to display\n        // the dialog fragment\
    \ with selected text.\n        Intent intent = new Intent();\n        intent.setClass(this,\
    \ DetailsActivity.class);\n        intent.putExtra(\"index\", index);\n      \
    \  startActivity(intent);\n    }\n}\n```\n\nThis is a very simple activity to\
    \ write. To determine multipane mode (that is, whether you need to use fragments\
    \ side by side), you just use the orientation of the device. If you're in landscape\
    \ mode, you're multipane; if you're in portrait mode, you're not. The helper method\
    \ `showDetails()` is there to figure out how to show the text when a title is\
    \ selected. The `index` is the position of the title in the title list. If you're\
    \ in multipane mode, you're going to use a fragment to show the text. You're calling\
    \ this fragment a `DetailsFragment`, and you use a factory-type method to create\
    \ one with the `index`. The interesting code for the `DetailsFragment` class is\
    \ shown in Listing 1-5 (minus all of the logging code). As we did before in `TitlesFragment`,\
    \ the various callbacks of `DetailsFragment` have logging added so we can watch\
    \ what happens via LogCat. You'll come back to your `showDetails()` method later.\n\
    \n*Listing 1-5. Source Code for **DetailsFragment***\n\n```java\npublic class\
    \ DetailsFragment extends Fragment {\n    private int mIndex = 0;\n\n    public\
    \ static DetailsFragment newInstance(int index) {\n        Log.v(MainActivity.TAG,\
    \ \"in DetailsFragment newInstance(\" +\n                index + \")\");\n\n \
    \       DetailsFragment df = new DetailsFragment();\n        // Supply index input\
    \ as an argument.\n        Bundle args = new Bundle();\n        args.putInt(\"\
    index\", index);\n        df.setArguments(args);\n        return df;\n    }\n\n\
    \    public static DetailsFragment newInstance(Bundle bundle) {\n        int index\
    \ = bundle.getInt(\"index\", 0);\n        return newInstance(index);\n    }\n\n\
    \    @Override\n    public void onCreate(Bundle myBundle) {\n        Log.v(MainActivity.TAG,\n\
    \                \"in DetailsFragment onCreate. Bundle contains:\");\n       \
    \ if(myBundle != null) {\n            for(String key : myBundle.keySet()) {\n\
    \                Log.v(MainActivity.TAG, \" \" + key);\n            }\n      \
    \  }\n        else {\n            Log.v(MainActivity.TAG, \" myBundle is null\"\
    );\n        }\n        super.onCreate(myBundle);\n        mIndex = getArguments().getInt(\"\
    index\", 0);\n    }\n\n    public int getShownIndex() {\n        return mIndex;\n\
    \    }\n\n    @Override\n    public View onCreateView(LayoutInflater inflater,\n\
    \                             ViewGroup container, Bundle savedInstanceState)\
    \ {\n        Log.v(MainActivity.TAG,\n                \"in DetailsFragment onCreateView.\
    \ container = \" +\n                        container);\n        // Don't tie\
    \ this fragment to anything through the inflater.\n        // Android takes care\
    \ of attaching fragments for us. The\n        // container is only passed in so\
    \ you can know about the\n        // container where this View hierarchy is going\
    \ to go.\n        View v = inflater.inflate(R.layout.details, container, false);\n\
    \n        TextView text1 = (TextView) v.findViewById(R.id.text1);\n        text1.setText(Shakespeare.DIALOGUE[\
    \ mIndex ] );\n        return v;\n    }\n}\n```\n\nThe `DetailsFragment` class\
    \ is actually fairly simple as well. Now you can see how to instantiate this fragment.\
    \ It's important to point out that you're instantiating this fragment in code\
    \ because your layout defines the `ViewGroup` container (a `FrameLayout`) that\
    \ your details fragment is going to go into. Because the fragment is not itself\
    \ defined in the layout XML for the activity, as your titles fragment was, you\
    \ need to instantiate your details fragments in code.\n\nTo create a new details\
    \ fragment, you use your `newInstance()` method. As discussed earlier, this factory\
    \ method invokes the default constructor and then sets the arguments bundle with\
    \ the value of `index`. Once `newInstance()` has run, your details fragment can\
    \ retrieve the value of `index` in any of its callbacks by referring to the arguments\
    \ bundle via `getArguments()`. For your convenience, in `onCreate()` you can save\
    \ the `index` value from the arguments bundle to a member field in your `DetailsFragment`\
    \ class."
