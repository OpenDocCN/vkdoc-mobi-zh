  trans: '

    # 片段事务与动画


    当 Activity 仅用于单一目的时，这种方式尚可。但现在一个 Activity 可以同时包含多个片段，并且你可以在不离开顶层 Activity 的情况下深入应用，因此
    Android 确实需要将返回键堆栈的概念扩展到包含片段。实际上，片段对此的需求更为迫切。当多个片段在 Activity 中同时交互，并且需要一次性切换到多个片段的新内容时，按下返回键应使每个片段*共同*回退一步。为确保每个片段正确参与回退，需要创建并管理一个`FragmentTransaction`来协调这一过程。


    请注意，Activity 中并非必须为片段提供返回堆栈。


    你可以编写代码，让返回键仅在 Activity 层级工作，而完全不涉及片段层级。如果片段没有返回堆栈，按下返回键会将当前 Activity 从堆栈中弹出，并将用户返回到其下方的界面。如果你选择利用片段的返回堆栈，则需要取消清单
    1-8 中 `ft.addToBackStack("details")` 这一行的注释。在此特定情况下，你将标签参数硬编码为字符串 `"details"`。该标签应是一个恰当的字符串名称，用于表示事务发生时片段的状态。该标签不一定指向某个特定片段，而是指向片段事务及事务中包含的所有片段。你可以通过代码使用标签值来查询返回堆栈，以删除条目或弹出条目。你应该为这些事务设置有意义的标签，以便后续找到相应的事务。


    ## 片段事务切换与动画


    片段事务的一大优点在于，你可以使用切换和动画效果，从旧片段过渡到新片段。当用新的详细信息片段替换旧的时，我们可以利用片段事务切换来添加特殊效果。这能让你的应用更精致，使新旧片段的切换看起来流畅自然。


    实现此目的的一种方法是使用 `setTransition()`，如清单 1-8 所示。不过，有几种不同的切换效果可供选择。在示例中你使用了淡入效果，但你也可以使用
    `setCustomAnimations()` 方法描述其他特效，比如一个片段向右滑出，同时另一个从左侧滑入。自定义动画使用的是新的对象动画定义，而非旧的。旧的动画
    XML 文件使用 `<translate>` 等标签，而新的 XML 文件则使用 `<objectAnimator>`。


    旧的 XML 文件位于相应 Android SDK 平台目录下的 `/data/res/anim` 目录中（例如，Honeycomb 版在 `platforms/android-11`
    目录下）。该目录下的 `/data/res/animator` 目录中也存在一些新的 XML 文件。你的代码可以这样写：


    ```

    ft.setCustomAnimations(android.R.animator.fade_in, android.R.animator.fade_out);

    ```


    这将使新片段淡入，同时旧片段淡出。第一个参数应用于进入的片段，第二个参数应用于退出的片段。请随意浏览 Android 的 animator 目录以获取更多内置动画。你需要掌握的另一重要知识点是，这些切换调用必须在
    `replace()` 调用之前进行；否则，它们将不起作用。


    使用对象动画为片段添加特效是实现切换的一种有趣方式。`FragmentTransaction` 上还有两个方法值得了解：`hide()` 和 `show()`。这两个方法都以片段为参数，其作用正如其名。对于片段管理器中已绑定到视图容器的片段，这些方法仅在用户界面中隐藏或显示该片段。在此过程中，片段并不会从片段管理器中被移除，但它必须与视图容器关联才能影响其可见性。


    如果片段没有视图层次结构，或者其视图层次结构未绑定到显示的视图层次结构中，则这些方法将不会产生任何效果。


    一旦为片段事务指定了特效，你就需要告知它你想要完成的主要工作。在你的案例中，是用新的详细信息片段替换帧布局中的任何内容。这就是 `replace()` 方法的用途。这等效于先为帧布局中已有的任何片段调用
    `remove()`，然后为新的详细信息片段调用 `add()`，这意味着你也可以根据需要仅调用 `remove()` 或 `add()`。


    处理片段事务时必须执行的最后一步是提交它。`commit()` 方法并不会立即执行操作，而是将工作排入计划，等待 UI 线程准备就绪时再执行。


    现在你应该明白，为什么更改一个简单片段中的内容需要如此费周折。这不仅仅是为了更改文本；你可能希望在切换过程中实现特殊的图形效果。你可能还希望将切换细节保存在一个可以稍后撤销的片段事务中。最后一点可能让人困惑，下面我们来澄清一下。


    这并不是严格意义上的“事务”。当你从返回堆栈中弹出片段事务时，并不会撤销可能已发生的所有数据更改。例如，如果你的 Activity 内部数据在你于返回堆栈上创建片段事务时发生了变化，按下返回键并不会让
    Activity 的数据更改恢复到之前的值。你仅仅是按照与 Activity 相同的方式，在用户界面视图中逐级返回，只不过这里针对的是片段。由于片段保存和恢复的方式，从保存状态恢复的片段的内部状态，将取决于你随片段保存了哪些值以及你如何管理这些值的恢复。因此，你的片段可能看起来和之前一样，但你的
    Activity 不会，除非你在恢复片段的同时采取措施恢复 Activity 的状态。


    在你的示例中，你只操作一个视图容器并引入一个详细信息片段。如果你的用户界面更复杂，你可以在片段事务中操作其他片段。实际上，你正在执行的是：开始事务，用新的详细信息片段替换详细信息帧布局中的任何现有片段，指定淡入动画，然后提交事务。你注释掉了将事务添加到返回堆栈的那部分代码，但当然可以取消注释以参与返回堆栈。


    ## FragmentManager


    `FragmentManager` 是一个负责管理属于某个 Activity 的所有片段的组件。这包括返回堆栈上的片段以及可能只是暂时存在的片段。下面我们来详细说明。

    '
- fmt: 'Fragments should only be created within the context of an activity. This occurs
    either through the inflation of an activity’s layout XML or through direct instantiation
    using code like that in Listing 1-1. When instantiated through code, a fragment
    usually gets attached to the activity using a fragment transaction. In either
    case, the `FragmentManager` class is used to access and manage these fragments
    for an activity.


    You use the `getFragmentManager()` method on either an activity or an attached
    fragment to retrieve a fragment manager. You saw in Listing 1-8 that a fragment
    manager is where you get a fragment transaction. Besides getting a fragment transaction,
    you can also get a fragment using the fragment’s ID, its tag, or a combination
    of bundle and key. The fragment’s ID will either be the fragment’s resource ID
    if the fragment was inflated from XML, or it will be the container’s resource
    ID if the fragment was placed into a view using a fragment transaction. A fragment’s
    tag is a `String` that you can assign in the fragment’s XML definition, or when
    the fragment is placed in a view via a fragment transaction. The bundle and key
    method of retrieving a fragment only works for fragments that were persisted using
    the `putFragment()` method.


    For getting a fragment, the getter methods include `findFragmentById()`, `findFragmentByTag()`,
    and `getFragment()`. The `getFragment()` method would be used in conjunction with
    `putFragment()`, which also takes a bundle, a key, and the fragment to be put.
    The bundle is most likely going to be the `savedState` bundle, and `putFragment()`
    will be used in the `onSaveInstanceState()` callback to save the state of the
    current activity (or another fragment). The `getFragment()` method would probably
    be called in `onCreate()` to correspond to `putFragment()`, although for a fragment,
    the bundle is available to the other callback methods, as described earlier.


    Obviously, you can’t use the `getFragmentManager()` method on a fragment that
    has not been attached to an activity yet. But it’s also true that you can attach
    a fragment to an activity without making it visible to the user yet. If you do
    this, you should associate a `String` tag to the fragment so you can get to it
    in the future. You’d most likely use this method of `FragmentTransaction` to do
    this:


    ```

    public FragmentTransaction add (Fragment fragment, String tag)

    ```


    In fact, you can have a fragment that does not exhibit a view hierarchy. This
    might be done to encapsulate certain logic together such that it could be attached
    to an activity, yet still retain some autonomy from the activity’s life cycle
    and from other fragments. When an activity goes through a re-create cycle due
    to a device-configuration change, this non-UI fragment could remain largely intact
    while the activity goes away and comes back again. This would be a good candidate
    for the `setRetainInstance()` option.


    The fragment back stack is also the domain of the fragment manager. Whereas a
    fragment transaction is used to put fragments onto the back stack, the fragment
    manager can take fragments off the back stack. This is usually done using the
    fragment’s ID or tag, but it can be done based on position in the back stack or
    just to pop the topmost fragment.


    Finally, the fragment manager has methods for some debugging features, such as
    turning on debugging messages to LogCat using `enableDebugLogging()` or dumping
    the current state of the fragment manager to a stream using `dump()`. Note that
    you turned on fragment manager debugging in the `onCreate()` method of your activity
    in Listing 1-4.


    ## Caution When Referencing Fragments


    It’s time to revisit the earlier discussion of the fragment’s life cycle and the
    arguments and saved-state bundles. Android could save one of your fragments at
    many different times. This means that at the moment your application wants to
    retrieve that fragment, it’s possible that it is not in memory. For this reason,
    we caution you *not* to think that a variable reference to a fragment is going
    to remain valid for a long time. If fragments are being replaced in a container
    view using fragment transactions, any reference to the old fragment is now pointing
    to a fragment that is possibly on the back stack. Or a fragment may get detached
    from the activity’s view hierarchy during an application configuration change
    such as a screen rotation. Be careful.


    If you’re going to hold onto a reference to a fragment, be aware of when it could
    get saved away; when you need to find it again, use one of the getter methods
    of the fragment manager. If you want to hang onto a fragment reference, such as
    when an activity is going through a configuration change, you can use the `putFragment()`
    method with the appropriate bundle. In the case of both activities and fragments,
    the appropriate bundle is the `savedState` bundle that is used in `onSaveInstanceState()`
    and that reappears in `onCreate()` (or, in the case of fragments, the other early
    callbacks of the fragment’s life cycle). You will probably never store a direct
    fragment reference into the arguments bundle of a fragment; if you’re tempted
    to do so, please think very carefully about it first.


    The other way you can get to a specific fragment is by querying for it using a
    known tag or known ID. The getter methods described previously will allow retrieval
    of fragments from the fragment manager this way, which means you have the option
    of just remembering the tag or ID of a fragment so that you can retrieve it from
    the fragment manager using one of those values, as opposed to using `putFragment()`
    and `getFragment()`.


    ## Saving Fragment State


    Another interesting class was introduced in Android 3.2: `Fragment.SavedState`.
    Using the `saveFragmentInstanceState()` method of `FragmentManager`, you can pass
    this method a fragment, and it returns an object representing the state of that
    fragment. You can then use that object when initializing a fragment, using `Fragment`’s
    `setInitialSavedState()` method. Chapter 2 discusses this in more detail.


    ## ListFragments and <fragment>


    There are still a few more things to cover to make your sample application complete.
    The first is the `TitlesFragment` class. This is the one that is created via the
    `main.xml` file of your main activity. The `<fragment>` tag serves as your placeholder
    for where this fragment will go and does not define what the view hierarchy will
    look like for this fragment. The interesting code for your `TitlesFragment` is
    in Listing 1-9. For all of the code please refer to the source code files. `TitlesFragment`
    displays the list of titles for your application.


    *Listing 1-9. **TitlesFragment** Java Code*


    ```

    public class TitlesFragment extends ListFragment {


    private MainActivity myActivity = null;


    int mCurCheckPosition = 0;


    @Override


    public void onAttach(Activity myActivity) {


    Log.v(MainActivity.TAG,


    "in TitlesFragment onAttach; activity is: " + myActivity); super.onAttach(myActivity);


    this.myActivity = (MainActivity)myActivity;


    }


    @Override


    public void onActivityCreated(Bundle savedState) {


    Log.v(MainActivity.TAG,


    "in TitlesFragment onActivityCreated. savedState contains:"); if(savedState !=
    null) {


    for(String key : savedState.keySet()) {


    Log.v(MainActivity.TAG, " " + key);


    }


    }


    else {


    Log.v(MainActivity.TAG, " savedState is null");


    }


    super.onActivityCreated(savedState);


    // Populate list with your static array of titles.


    setListAdapter(new ArrayAdapter<String>(getActivity(),


    android.R.layout.simple_list_item_1,


    Shakespeare.TITLES));

    ```'
