    # 第 1 章：Fragments 基础


    在 Android 的前两个主要版本中，小屏幕是主流。随后出现了 Android 平板电脑：屏幕尺寸为 10 英寸的设备。这使得事情变得复杂了。为什么？因为现在有如此多的屏幕空间，一个简单的
    `Activity` 很难在保持单一功能的同时填满整个屏幕。在一个 `Activity` 中只显示邮件标题（填满大屏幕），而在另一个单独的 `Activity`
    中显示单个邮件内容（也填满大屏幕）——这种电子邮件应用模式不再合理。有了那么多可用的空间，一个应用可以在屏幕左侧显示邮件标题列表，在屏幕右侧显示选中的邮件内容。能否在一个带有单一布局的
    `Activity` 中实现这一点？嗯，可以，但你无法在任何小屏幕设备上重用该 `Activity` 或布局。


    Android 3.0 引入的核心类之一是 `Fragment` 类，它专门设计用于帮助开发者管理应用程序功能，从而提供出色的可用性以及大量的可重用性。本章将向你介绍
    `Fragment`：它是什么，如何融入应用程序的架构，以及如何使用它。`Fragment` 使得许多以前困难的有趣事情成为可能。大约在同一时间，Google
    发布了一个适用于旧版 Android 的 `Fragment` SDK。因此，即使你对编写平板电脑应用不感兴趣，你也会发现 `Fragment` 在非平板设备上让你的生活更轻松。现在，为智能手机、平板电脑甚至电视和其他设备编写出色的应用比以往任何时候都更容易。


    让我们开始学习 Android `Fragment` 吧。


    **1**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **2**


    **第 1 章：Fragments 基础**


    ## 什么是 Fragment？


    本节将解释什么是 `Fragment` 以及它的作用。但首先，让我们设个背景，看看为什么需要 `Fragment`。正如之前所学，在小屏幕设备上，Android
    应用使用 `Activity` 向用户展示数据和功能，每个 `Activity` 都有相当简单且定义明确的目的。例如，一个 `Activity` 可能向用户显示通讯录中的联系人列表。另一个
    `Activity` 可能允许用户输入电子邮件。


    Android 应用就是将一系列这些 `Activity` 组合在一起，以实现更大的目标，例如通过阅读和发送消息来管理电子邮件账户。这对于小屏幕设备来说没问题，但当用户的屏幕非常大（10
    英寸或更大）时，屏幕上有空间可以做更多事情，而不仅仅是单一功能。一个应用可能希望让用户同时查看收件箱中的邮件列表，并在列表旁边显示当前选中的邮件内容。或者，一个应用可能希望同时显示联系人列表以及当前选中的联系人的详细信息视图。


    作为 Android 开发者，你知道可以通过为超大屏幕定义另一个包含 `ListView`、`Layout` 和所有其他视图的布局来实现此功能。而“另一个布局”指的是除了你可能已经为小屏幕定义的布局之外的布局。当然，你还需要为竖屏和横屏情况分别设置不同的布局。由于超大屏幕的尺寸，这可能意味着需要布局并为其提供代码的标签、字段、图像等视图会非常多。要是能有办法将这些视图对象分组，并整合它们的逻辑，以便应用的各个部分可以在不同屏幕尺寸和设备之间重用，从而最大限度地减少开发者维护应用所需的工作量，那该多好。而这正是我们拥有
    `Fragment` 的原因。'
