- fmt: "# Protecting Data During Configuration Changes\n\nYou’ll want to protect data\
    \ that can’t easily be re-created by not letting it get destroyed in the default\
    \ configuration change process.\n\n## The Destroy/Create Cycle of Activities\n\
    \nThere are three callbacks to be aware of when dealing with default configuration\
    \ changes in activities:\n\n- `onSaveInstanceState()`\n- `onCreate()`\n- `onRestoreInstanceState()`\n\
    \nThe first is the callback that Android will invoke when it detects that a configuration\
    \ change is happening. The activity has a chance to save state that it wants to\
    \ restore when the new activity gets created at the end of the configuration change.\
    \ The `onSaveInstanceState()` callback will be called prior to the call to `onStop()`.\
    \ Whatever state exists can be accessed and saved into a `Bundle` object. This\
    \ object will get passed in to both of the other callbacks (`onCreate()` and `onRestoreInstanceState()`)\
    \ when the activity is re-created. You only need to put logic in one or the other\
    \ to restore your activity’s state.\n\nThe default `onSaveInstanceState()` callback\
    \ does some nice things for you. For example, it goes through the currently active\
    \ view hierarchy and saves the values for each view that has an `android:id`.\
    \ This means if you have an `EditText` view that has received some user input,\
    \ that input will be available on the other side of the activity destroy/create\
    \ cycle to populate the `EditText` before the user gets control back. You do not\
    \ need to go through and save this state yourself. If you do override `onSaveInstanceState()`,\
    \ be sure to call `super.onSaveInstanceState()` with the bundle object so it can\
    \ take care of this for you. It’s not the views that are saved, only the attributes\
    \ of their state that should persist across the destroy/create boundary.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nTo save data in the bundle object, use methods such as `putInt()` for integers\
    \ and `putString()` for strings. There are quite a few methods in the `android.os.Bundle`\
    \ class; you are not limited to integers and strings. For example, `putParcelable()`\
    \ can be used to save complex objects. Each `put` is used with a string key, and\
    \ you will retrieve the value later using the same key used to put the value in.\
    \ A sample `onSaveInstanceState()` might look like Listing 2-1.\n\n**Listing 2-1.\
    \ Sample `onSaveInstanceState()`**\n\n```java\n@Override\npublic void onSaveInstanceState(Bundle\
    \ icicle) {\n    super.onSaveInstanceState(icicle);\n    icicle.putInt(\"counter\"\
    , 1);\n}\n```\n\nSometimes the bundle is called `icicle` because it represents\
    \ a small frozen piece of an activity. In this sample, you only save one value,\
    \ and it has a key of `counter`. You could save more values by simply adding more\
    \ `put` statements to this callback. The `counter` value in this example is somewhat\
    \ temporary because if the application is completely destroyed, the current value\
    \ will be lost. This could happen if the user turned off their device, for example.\
    \ In Chapter 4, you’ll learn about ways to save values more permanently. This\
    \ instance state is only meant to hang onto values while the application is running\
    \ this time. Do not use this mechanism for state that is important to keep for\
    \ a longer term.\n\nTo restore activity state, you access the bundle object to\
    \ retrieve values that you believe are there. Again, you use methods of the `Bundle`\
    \ class such as `getInt()` and `getString()` with the appropriate key passed to\
    \ tell which value you want back. If the key does not exist in the `Bundle`, a\
    \ value of 0 or null is passed back (depending on the type of the object being\
    \ requested). Or you can provide a default value in the appropriate getter method.\n\
    \nListing 2-2 shows a sample `onRestoreInstanceState()` callback.\n\n**Listing\
    \ 2-2. Sample `onRestoreInstanceState()`**\n\n```java\n@Override\npublic void\
    \ onRestoreInstanceState(Bundle icicle) {\n    super.onRestoreInstanceState(icicle);\n\
    \    int someInt = icicle.getInt(\"counter\", -1);\n    // Now go do something\
    \ with someInt to restore the\n    // state of the activity. -1 is the default\
    \ if no\n    // value was found.\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nIt’s up to you whether you restore state in `onCreate()` or in `onRestoreInstanceState()`.\
    \ Many applications will restore state in `onCreate()` because that is where a\
    \ lot of initialization is done. One reason to separate the two would be if you’re\
    \ creating an activity class that could be extended. The developers doing the\
    \ extending might find it easier to just override `onRestoreInstanceState()` with\
    \ the code to restore state, as compared to having to override all of `onCreate()`.\n\
    \nWhat’s very important to note here is that you need to be very concerned with\
    \ references to activities and views and other objects that need to be garbage-collected\
    \ when the current activity is fully destroyed. If you put something into the\
    \ saved bundle that refers back to the activity being destroyed, that activity\
    \ can’t be garbage collected. This is very likely a memory leak that could grow\
    \ and grow until your application crashes.\n\nObjects to avoid in bundles include\
    \ `Drawables`, `Adapters`, `Views`, and anything else that is tied to the activity\
    \ context. Instead of putting a `Drawable` into the bundle, serialize the bitmap\
    \ and save that. Or better yet, manage the bitmaps outside of the activity and\
    \ fragment instead of inside. Add some sort of reference to the bitmap to the\
    \ bundle. When it comes time to re-create any `Drawables` for the new fragment,\
    \ use the reference to access the outside bitmaps to regenerate your `Drawables`.\n\
    \n## The Destroy/Create Cycle of Fragments\n\nThe destroy/create cycle for fragments\
    \ is very similar to that of activities. A fragment in the process of being destroyed\
    \ and re-created will have its `onSaveInstanceState()` callback called, allowing\
    \ the fragment to save values in a `Bundle` object for later. One difference is\
    \ that six fragment callbacks receive this `Bundle` object when a fragment is\
    \ being re-created: `onInflate()`, `onCreate()`, `onCreateView()`, `onActivityCreated()`,\
    \ `onViewCreated()`, and `onViewStateRestored()`. The last two callbacks are more\
    \ recent, from Honeycomb 3.2 and JellyBean 4.2 respectively. This gives us lots\
    \ of opportunities to rebuild the internal state of our reconstructed fragment\
    \ from its previous state.\n\nAndroid guarantees only that `onSaveInstanceState()`\
    \ will be called for a fragment sometime before `onDestroy()`. That means the\
    \ view hierarchy may or may not be attached when `onSaveInstanceState()` is called.\
    \ Therefore, don’t count on traversing the view hierarchy inside of `onSaveInstanceState()`.\
    \ For example, if the fragment is on the fragment back stack, no UI will be showing,\
    \ so no view hierarchy will exist. This is OK of course because if no UI is showing,\
    \ there is no need to attempt to capture the current values of views to save them.\
    \ You need to check if a view exists before trying to save its current value,\
    \ and not consider it an error if the view does not exist.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \nJust like with activities, be careful not to include items in the bundle object\
    \ that refer to an activity or to a fragment that might not exist later when this\
    \ fragment is being re-created. Keep the size of the bundle as small as possible,\
    \ and as much as possible store long-lasting data outside of activities and fragments\
    \ and simply refer to it from your activities and fragments. Then your destroy/create\
    \ cycles will go that much faster, you’ll be much less likely to create a memory\
    \ leak, and your activity and fragment code should be easier to maintain.\n\n\
    ## Using FragmentManager to Save Fragment State\n\nFragments have another way\
    \ to save state, in addition to, or"
  raw: 'You’ll want to protect data that can’t easily be re-created by not letting
    it get destroyed in the default configuration change process.


    The Destroy/Create Cycle of Activities


    There are three callbacks to be aware of when dealing with default configuration
    changes in activities:


     onSaveInstanceState()


     onCreate()


     onRestoreInstanceState()


    The first is the callback that Android will invoke when it detects that a configuration
    change is happening. The activity has a chance to save state that it wants to
    restore when the new activity gets created at the end of the configuration change.
    The onSaveInstanceState() callback will be called prior to the call to onStop().
    Whatever state exists can be accessed and saved into a Bundle object. This object
    will get passed in to both of the other callbacks (onCreate() and onRestoreInstanceState())
    when the activity is re-created. You only need to put logic in one or the other
    to restore your activity’s state.


    The default onSaveInstanceState() callback does some nice things for you.


    For example, it goes through the currently active view hierarchy and saves the
    values for each view that has an android:id. This means if you have an EditText
    view that has received some user input, that input will be available on the other
    side of the activity destroy/create cycle to populate the EditText before the
    user gets control back. You do not need to go through and save this state yourself.
    If you do override onSaveInstanceState(), be sure to call super.onSaveInstanceState()
    with the bundle object so it can take care of this for you. It’s not the views
    that are saved, only the attributes of their state that should persist across
    the destroy/create boundary.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **38**


    **CHAPTER 2: Responding to Configuration Changes**


    To save data in the bundle object, use methods such as putInt() for integers and
    putString() for strings. There are quite a few methods in the android.os.Bundle
    class; you are not limited to integers and strings. For example, putParcelable()
    can be used to save complex objects. Each put is used with a string key, and you
    will retrieve the value later using the same key used to put the value in. A sample
    onSaveInstanceState() might look like Listing 2-1.


    *Listing 2-1\. Sample* **on SaveInstanceState()**


    @Override


    public void onSaveInstanceState(Bundle icicle) {


    super.onSaveInstanceState(icicle);


    icicle.putInt("counter", 1);


    }


    Sometimes the bundle is called icicle because it represents a small frozen piece
    of an activity. In this sample, you only save one value, and it has a key of counter.
    You could save more values by simply adding more put statements to this callback.
    The counter value in this example is somewhat temporary because if the application
    is completely destroyed, the current value will be lost. This could happen if
    the user turned off their device, for example. In Chapter 4, you’ll learn about
    ways to save values more permanently. This instance state is only meant to hang
    onto values while the application is running this time. Do not use this mechanism
    for state that is important to keep for a longer term.


    To restore activity state, you access the bundle object to retrieve values that
    you believe are there. Again, you use methods of the Bundle class such as getInt()
    and getString() with the appropriate key passed to tell which value you want back.
    If the key does not exist in the Bundle, a value of 0 or null is passed back (depending
    on the type of the object being requested).


    Or you can provide a default value in the appropriate getter method.


    Listing 2-2 shows a sample onRestoreInstanceState() callback.


    *Listing 2-2\. Sample* **on RestoreInstanceState()**


    @Override


    public void onRestoreInstanceState(Bundle icicle) {


    super.onRestoreInstanceState(icicle);


    int someInt = icicle.getInt("counter", -1);


    // Now go do something with someInt to restore the


    // state of the activity. -1 is the default if no


    // value was found.


    }


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 2: Responding to Configuration Changes** **39**


    It’s up to you whether you restore state in onCreate() or in


    onRestoreInstanceState(). Many applications will restore state in onCreate() because
    that is where a lot of initialization is done. One reason to separate the two
    would be if you’re creating an activity class that could be extended. The developers
    doing the extending might find it easier to just override onRestoreInstanceState()
    with the code to restore state, as compared to having to override all of onCreate().


    What’s very important to note here is that you need to be very concerned with
    references to activities and views and other objects that need to be garbage-collected
    when the current activity is fully destroyed. If you put something into the saved
    bundle that refers back to the activity being destroyed, that activity can’t be
    garbage collected. This is very likely a memory leak that could grow and grow
    until your application crashes.


    Objects to avoid in bundles include Drawables, Adapters, Views, and anything else
    that is tied to the activity context. Instead of putting a Drawable into the bundle,
    serialize the bitmap and save that. Or better yet, manage the bitmaps outside
    of the activity and fragment instead of inside.


    Add some sort of reference to the bitmap to the bundle. When it comes time to
    re-create any Drawables for the new fragment, use the reference to access the
    outside bitmaps to regenerate your Drawables.


    The Destroy/Create Cycle of Fragments


    The destroy/create cycle for fragments is very similar to that of activities.


    A fragment in the process of being destroyed and re-created will have its onSaveInstanceState()
    callback called, allowing the fragment to save values in a Bundle object for later.
    One difference is that six fragment callbacks receive this Bundle object when
    a fragment is being re-created: onInflate(), onCreate(), onCreateView(), onActivityCreated(),
    onViewCreated(), and onViewStateRestored(). The last two callbacks are more recent,
    from Honeycomb 3.2 and JellyBean 4.2 respectively. This gives us lots of opportunities
    to rebuild the internal state of our reconstructed fragment from its previous
    state.


    Android guarantees only that onSaveInstanceState() will be called for a fragment
    sometime before onDestroy(). That means the view hierarchy may or may not be attached
    when onSaveInstanceState() is called. Therefore, don’t count on traversing the
    view hierarchy inside of onSaveInstanceState(). For example, if the fragment is
    on the fragment back stack, no UI will be showing, so no view hierarchy will exist.
    This is OK


    of course because if no UI is showing, there is no need to attempt to capture
    the current values of views to save them. You need to check if a view exists before
    trying to save its current value, and not consider it an error if the view does
    not exist.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **40**


    **CHAPTER 2: Responding to Configuration Changes**


    Just like with activities, be careful not to include items in the bundle object
    that refer to an activity or to a fragment that might not exist later when this
    fragment is being re-created. Keep the size of the bundle as small as possible,
    and as much as possible store long-lasting data outside of activities and fragments
    and simply refer to it from your activities and fragments. Then your destroy/create
    cycles will go that much faster, you’ll be much less likely to create a memory
    leak, and your activity and fragment code should be easier to maintain.


    Using FragmentManager to Save Fragment State


    Fragments have another way to save state, in addition to, or'
  trans: "\n# 在配置变更期间保护数据\n\n你需要保护那些不易重新创建的数据，避免它们在默认的配置变更过程中被销毁。\n\n## Activity 的销毁/重建周期\n\
    \n在处理 Activity 的默认配置变更时，需要注意三个回调方法：\n\n- `onSaveInstanceState()`\n- `onCreate()`\n\
    - `onRestoreInstanceState()`\n\n第一个回调是 Android 在检测到配置变更发生时将调用的方法。Activity 有机会保存其状态，以便在配置变更结束时创建的新\
    \ Activity 能够恢复这些状态。`onSaveInstanceState()` 回调将在调用 `onStop()` 之前被调用。此时可以访问任何存在的状态，并将其保存到\
    \ `Bundle` 对象中。当 Activity 被重新创建时，这个对象将被传递给另外两个回调方法（`onCreate()` 和 `onRestoreInstanceState()`）。你只需要在其中一个回调方法中添加逻辑来恢复\
    \ Activity 的状态即可。\n\n默认的 `onSaveInstanceState()` 回调会为你做一些有用的事情。例如，它会遍历当前活跃的视图层级，并保存每个带有\
    \ `android:id` 的视图的值。这意味着如果你有一个接收了用户输入的 `EditText` 视图，那么该输入在 Activity 销毁/重建周期后仍然可用，以便在用户重新获得控制权之前填充\
    \ `EditText`。你无需手动逐个保存这些状态。如果你确实重写了 `onSaveInstanceState()`，请确保使用 bundle 对象调用\
    \ `super.onSaveInstanceState()`，这样系统就能为你处理这些工作。保存的不是视图本身，而是那些需要在销毁/重建边界间保持不变的视图状态属性。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n要将数据保存到 bundle 对象中，请使用诸如用于整数的\
    \ `putInt()` 和用于字符串的 `putString()` 之类的方法。`android.os.Bundle` 类中有相当多的方法；你的选择不限于整数和字符串。例如，`putParcelable()`\
    \ 可用于保存复杂对象。每个 `put` 方法都使用一个字符串键，之后你将使用相同的键来检索该值。一个示例性的 `onSaveInstanceState()`\
    \ 可能如代码清单 2-1 所示。\n\n**代码清单 2-1. 示例 `onSaveInstanceState()`**\n\n```java\n@Override\n\
    public void onSaveInstanceState(Bundle icicle) {\n    super.onSaveInstanceState(icicle);\n\
    \    icicle.putInt(\"counter\", 1);\n}\n```\n\n有时 bundle 被称为 `icicle`，因为它代表 Activity\
    \ 的一个冻结的小片段。在这个示例中，你仅保存了一个值，它的键是 `counter`。你可以通过在此回调中添加更多 `put` 语句来保存更多值。此示例中的\
    \ `counter` 值有些临时性，因为如果应用被完全销毁，当前值将会丢失。例如，当用户关闭设备时就会发生这种情况。在第 4 章中，你将学习更持久地保存值的方法。此实例状态仅用于在应用本次运行期间保留值。不要将此机制用于需要长期保留的重要状态。\n\
    \n要恢复 Activity 状态，你需要访问 bundle 对象以检索你认为存在的值。同样，你需要使用 `Bundle` 类的方法，如 `getInt()`\
    \ 和 `getString()`，并传入相应的键来指定你想要的值。如果该键在 `Bundle` 中不存在，则会返回 0 或 null（取决于所请求对象的类型）。或者，你可以在相应的\
    \ getter 方法中提供一个默认值。\n\n代码清单 2-2 展示了一个示例性的 `onRestoreInstanceState()` 回调。\n\n\
    **代码清单 2-2. 示例 `onRestoreInstanceState()`**\n\n```java\n@Override\npublic void\
    \ onRestoreInstanceState(Bundle icicle) {\n    super.onRestoreInstanceState(icicle);\n\
    \    int someInt = icicle.getInt(\"counter\", -1);\n    // 现在使用 someInt 来恢复 Activity\
    \ 的状态。\n    // 如果未找到值，则 -1 为默认值。\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n你可以在 `onCreate()` 或 `onRestoreInstanceState()` 中恢复状态，这取决于你。许多应用会在 `onCreate()`\
    \ 中恢复状态，因为那里是执行大量初始化工作的地方。将两者分开的一个原因是，如果你正在创建一个可能被扩展的 Activity 类。进行扩展的开发者可能会发现，只需重写\
    \ `onRestoreInstanceState()` 并添加恢复状态的代码，比必须重写整个 `onCreate()` 要更容易。\n\n这里非常重要的一点是，你需要注意对\
    \ Activity、视图以及其他对象的引用，这些对象需要在当前 Activity 被完全销毁时能够被垃圾回收。如果你将某些引用了将要被销毁的 Activity\
    \ 的对象放入保存的 bundle 中，那么该 Activity 将无法被垃圾回收。这很可能会导致内存泄漏，并且泄漏可能会不断增长，直到你的应用崩溃。\n\n\
    应避免放入 bundle 的对象包括 `Drawables`、`Adapters`、`Views` 以及任何与 Activity 上下文绑定的其他内容。不要将\
    \ `Drawable` 直接放入 bundle，而是应该序列化位图并保存它。或者更好的是，在 Activity 和 Fragment 外部管理位图，而不是在内部管理。向\
    \ bundle 中添加某种对位图的引用。当需要为新 Fragment 重新创建任何 `Drawables` 时，使用该引用来访问外部位图以重新生成你的 `Drawables`。\n\
    \n## Fragment 的销毁/重建周期\n\nFragment 的销毁/重建周期与 Activity 非常相似。一个正在被销毁并重建的 Fragment\
    \ 会调用其 `onSaveInstanceState()` 回调，允许 Fragment 将值保存到 `Bundle` 对象中以备后用。一个区别是，当 Fragment\
    \ 被重新创建时，有六个 Fragment 回调会接收这个 `Bundle` 对象：`onInflate()`、`onCreate()`、`onCreateView()`、`onActivityCreated()`、`onViewCreated()`\
    \ 和 `onViewStateRestored()`。最后两个回调是较新的，分别来自 Honeycomb 3.2 和 JellyBean 4.2。这为我们提供了大量机会，可以根据重建的\
    \ Fragment 的先前状态来重建其内部状态。\n\nAndroid 仅保证在 `onDestroy()` 之前的某个时间点会为 Fragment 调用\
    \ `onSaveInstanceState()`。这意味着当调用 `onSaveInstanceState()` 时，视图层次可能已附加，也可能尚未附加。因此，不要指望在\
    \ `onSaveInstanceState()` 内部遍历视图层次。例如，如果 Fragment 位于 Fragment 回退栈中，则不会显示任何 UI，因此不会存在任何视图层次。这当然没问题，因为如果没有\
    \ UI 显示，就无需尝试捕获视图的当前值来保存它们。在尝试保存视图的当前值之前，你需要检查视图是否存在，并且不要将视图不存在视为错误。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n与 Activity 类似，注意不要在 bundle 对象中包含那些引用了在此 Fragment 被重新创建时可能不存在的 Activity 或 Fragment\
    \ 的项。尽量保持 bundle 的大小尽可能小，并尽可能将长期存在的数据存储在 Activity 和 Fragment 之外，仅从你的 Activity\
    \ 和 Fragment 中引用这些数据。这样，你的销毁/重建周期会快得多，产生内存泄漏的可能性也会大大降低，并且你的 Activity 和 Fragment\
    \ 代码应该更容易维护。\n\n## 使用 FragmentManager 保存 Fragment 状态\n\nFragment 还有另一种保存状态的方法，可以作为……的补充\n"
- fmt: '# 处理配置变化


    Android 不会通知`Fragment`保存其状态。在 Honeycomb 3.2 中，`FragmentManager`类新增了`saveFragmentInstanceState()`方法，可调用该方法生成`Fragment.SavedState`类的对象。前面章节中提到的保存状态的方法都是在
    Android 内部进行的。


    虽然我们知道状态正在被保存，但我们无法直接访问它。这种保存状态的方法会生成一个代表`Fragment`保存状态的对象，并允许你控制是否以及何时从该状态创建`Fragment`。


    使用`Fragment.SavedState`对象恢复`Fragment`的方法是通过`Fragment`类的`setInitialSavedState()`方法。在第
    1 章中，你了解到最好使用静态工厂方法（例如`newInstance()`）创建新的`Fragment`。在这个方法中，你看到了如何调用默认构造函数，然后附加一个参数包。你可以改为调用`setInitialSavedState()`方法来设置它，以便恢复到之前的状态。


    关于这种保存`Fragment`状态的方法，有几个注意事项需要了解：


    *   要保存的`Fragment`当前必须已附加到`FragmentManager`。

    *   使用此保存状态创建的新`Fragment`必须与创建它的`Fragment`属于相同的类类型。

    *   保存的状态不能包含对其他`Fragment`的依赖。当保存的`Fragment`被重新创建时，其他`Fragment`可能不存在。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 在 Fragment 上使用 setRetainInstance


    `Fragment`可以避免在配置更改时被销毁和重新创建。如果使用参数`true`调用`setRetainInstance()`方法，则当它的`Activity`被销毁并重新创建时，该`Fragment`将保留在应用程序中。不会调用`Fragment`的`onDestroy()`回调，也不会调用`onCreate()`。`onDetach()`回调会被调用，因为`Fragment`必须与即将消失的`Activity`分离；而`onAttach()`和`onActivityCreated()`会被调用，因为`Fragment`已附加到新的`Activity`。这仅适用于不在返回栈上的`Fragment`。对于没有
    UI 的`Fragment`尤其有用。


    此功能非常强大，因为你可以使用非 UI 的`Fragment`来处理对数据对象和后台线程的引用，并在该`Fragment`上调用`setRetainInstance(true)`，以便它不会在配置更改时被销毁和重新创建。额外的好处是，在正常的配置更改过程中，非
    UI `Fragment`的回调`onDetach()`和`onAttach()`会将`Activity`引用从旧`Activity`切换到新`Activity`。


    ## 已弃用的配置更改方法


    `Activity`上的几个方法已被弃用，因此不应再使用它们：


    *   `getLastNonConfigurationInstance()`

    *   `onRetainNonConfigurationInstance()`


    这些方法以前允许你保存一个正在被销毁的`Activity`中的任意对象，并将其传递给正在被创建的`Activity`的下一个实例。虽然它们很有用，但现在你应该使用前面描述的方法来管理销毁/创建周期中`Activity`实例之间的数据。


    ## 自行处理配置更改


    到目前为止，你已经了解了 Android 如何为你处理配置更改。它负责销毁和重新创建`Activity`和`Fragment`，为新的配置拉取最佳资源，保留任何用户输入的数据，并让你有机会在某些回调中执行一些额外的逻辑。这通常是你最好的选择。但当情况并非如此，当你必须自行处理配置更改时，Android
    提供了一种出路。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    不推荐这样做，因为完全由你来确定由于更改而需要更改的内容，然后你需要负责进行所有更改。如前所述，除了方向变化之外，还有许多其他配置更改。幸运的是，你不一定需要自行处理所有配置更改。


    自行处理配置更改的第一步是在`AndroidManifest.xml`文件的`<activity>`标签中，使用`android:configChanges`属性声明你将处理哪些更改。Android
    将使用前面描述的方法处理其他配置更改。你可以通过使用`|`符号将它们组合在一起，根据需要指定任意数量的配置更改类型，如下所示：


    ```

    <activity ... android:configChanges="orientation|keyboardHidden" ... >

    ```


    配置更改类型的完整列表可以在`R.attr`的参考页面上找到。请注意，如果你的目标 API 是 13 或更高，并且你需要处理方向更改，则还需要处理`screenSize`。


    配置更改的默认过程是调用回调来销毁和重新创建`Activity`或`Fragment`。当你声明将处理特定的配置更改时，过程会发生变化，因此仅调用`onConfigurationChanged()`回调（在`Activity`及其`Fragment`上）。Android
    会传入一个`Configuration`对象，以便回调知道新的配置是什么。由回调来确定可能发生了什么变化；但是，由于你可能只自行处理少量的配置更改，因此弄清楚这一点应该不会太难。


    你只有在需要完成的工作非常少，并且可以跳过销毁和重新创建时，才真正希望自行处理配置更改。例如，如果竖屏和横屏的`Activity`布局相同，并且所有图像资源都相同，那么销毁和重新创建`Activity`实际上并不能带来任何好处。在这种情况下，声明你将处理方向配置更改是相当安全的。在你的`Activity`方向更改期间，`Activity`将保持不变，只需使用现有资源（如布局、图像、字符串等）在新的方向上重新渲染自身。但如果可以的话，让
    Android 来处理这些事情其实也没什么大不了的。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 参考资料


    以下是一些可能有用的参考资料，供你进一步探索相关主题：


    *   [www.androidbook.com/androidfragments/projects](http://www.androidbook.com/androidfragments/projects)：本书相关可下载项目的列表。对于本章，请查找名为`AndroidFragments_Ch02_ConfigChanges.zip`的
    ZIP 文件。此 ZIP 文件包含本章的所有项目，这些项目列在不同的根目录中。还有一个`README.TXT`文件，准确描述了如何从这些 ZIP 文件之一将项目导入到你的
    IDE 中。

    *   [http://developer.android.com/guide/topics/fundamentals/activities.html#SavingActivityState](http://developer.android.com/guide/topics/fundamentals/activities.html#SavingActivityState)：Android
    开发者指南，讨论了保存和恢复状态。

    *   [http://developer.android.com/guide/topics/resources/runtime-changes.html](http://developer.android.com/guide/topics/resources/runtime-changes.html)：Android
    处理运行时变更的 API 指南。


    ## 总结


    让我们通过快速列举你学到的关于处理配置更改的知识来结束本章：


    *   默认情况下，`Activity`在配置更改期间会被销毁并重新创建。`Fragment`也是如此。

    *   避免将大量数据和逻辑放入`Activity`中，以便配置更改能够快速发生。'
  raw: 'instead of, Android notifying the fragments that their state should be saved.
    With Honeycomb 3.2, the FragmentManager class got a saveFragmentInstanceState()
    method that can be called to generate an object of the class Fragment.SavedState.
    The methods mentioned in the previous sections for saving state do so within the
    internals of Android.


    While we know that the state is being saved, we do not have any direct access
    to it. This method of saving state gives you an object that represents the saved
    state of a fragment and allows you to control if and when a fragment is created
    from that state.


    The way to use a Fragment.SavedState object to restore a fragment is through the
    setInitialSavedState() method of the Fragment class. In Chapter 1, you learned
    that it is best to create new fragments using a static factory method (for example,
    newInstance()). Within this method, you saw how a default constructor is called
    and then an arguments bundle is attached. You could instead call the setInitialSavedState()
    method to set it up for restoration to a previous state.


    There are a few caveats you should know about this method of saving fragment state:


     The fragment to be saved must currently be attached to


    the fragment manager.


     A new fragment created using this saved state must


    be the same class type as the fragment it was created


    from.


     The saved state cannot contain dependencies on other


    fragments. Other fragments may not exist when the


    saved fragment is re-created.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 2: Responding to Configuration Changes** **41**


    Using setRetainInstance on a Fragment


    A fragment can avoid being destroyed and re-created on a configuration change.
    If the setRetainInstance() method is called with an argument of true, the fragment
    wil be retained in the application when its activity is being destroyed and re-created.
    The fragment’s onDestroy() callback will not be called, nor will onCreate(). The
    onDetach() callback will be called because the fragment must be detached from
    the activity that’s going away, and onAttach() and onActivityCreated() will be
    called because the fragment is attached to a new activity. This only works for
    fragments that are not on the back stack. It is especial y useful for fragments
    that do not have a UI.


    This feature is very powerful in that you can use a non-UI fragment to handle
    references to your data objects and background threads, and call setRetainInstance(true)
    on this fragment so it won’t get destroyed and re-created on a configuration change.
    The added bonus is that during the normal configuration change process, the non-UI
    fragment cal backs onDetach() and onAttach() will switch the activity reference
    from the old to the new.


    Deprecated Configuration Change Methods


    A couple of methods on Activity have been deprecated, so you should no longer
    use them:


     getLastNonConfigurationInstance()


     onRetainNonConfigurationInstance()


    These methods previously allowed you to save an arbitrary object from an activity
    that was being destroyed, to be passed to the next instance of the activity that
    was being created. Although they were useful, you should now use the methods described
    earlier instead to manage data between instances of activities in the destroy/create
    cycle.


    Handling Configuration Changes Yourself


    So far, you’ve seen how Android handles configuration changes for you. It takes
    care of destroying and re-creating activities and fragments, pulling in the best
    resources for the new configuration, retaining any user-entered data, and giving
    you the opportunity to execute some extra logic in some callbacks. This is usually
    going to be your best option. But when it isn’t, when you have to handle a configuration
    change yourself, Android provides


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **42**


    **CHAPTER 2: Responding to Configuration Changes**


    a way out. This isn’t recommended because it is then completely up to you to determine
    what needs to change due to the change, and then for you to take care of making
    all the changes. As mentioned before, there are many configuration changes besides
    just an orientation change. Luckily, you don’t necessarily have to handle all
    configuration changes yourself.


    The first step to handling configuration changes yourself is to declare in the


    <activity> tag in AndroidManifest.xml file which changes you’re going to handle
    using the android:configChanges attribute. Android will handle the other configuration
    changes using the previously described methods. You can specify as many configuration
    change types as needed by or’ing them together with the ‘|’ symbol, like this:


    <activity ... android:configChanges="orientation|keyboardHidden" ... > The complete
    list of configuration change types can be found on the reference page for R.attr.
    Be aware that if you target API 13 or higher and you need to handle orientation,
    you also need to handle screenSize.


    The default process for a configuration change is the invoking of callbacks to
    destroy and re-create the activity or fragment. When you’ve declared that you
    will handle the specific configuration change, the process changes so only the
    onConfigurationChanged() callback is invoked instead, on the activity and its
    fragments. Android passes in a Configuration object so the callback knows what
    the new configuration is. It is up to the callback to determine what might have
    changed; however, since you likely handle only a small number of configuration
    changes yourself, it shouldn’t be too hard to figure this out.


    You’d really only want to handle a configuration change yourself when there is
    very little to be done, when you could skip destroying and re-creating. For example,
    if the activity layout for portrait and landscape is the same layout and all image
    resources are the same, destroying and re-creating the activity doesn’t really
    accomplish anything. In this case it would be fairly safe to declare that you
    will handle the orientation configuration change. During an orientation change
    of your activity, the activity would remain intact and simply re-render itself
    in the new orientation using the existing resources such as the layout, images,
    strings, etc. But it’s really not that big a deal to just let Android take care
    of things if you can.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 2: Responding to Configuration Changes** **43**


    References


    Here are some helpful references to topics you may wish to explore further:


     [www.androidbook.com/androidfragments/projects: A](http://www.androidbook.com/androidfragments/projects)


    list of downloadable projects related to this book. For


    this chapter, look for a ZIP file called AndroidFragments_


    Ch02_ConfigChanges.zip. This ZIP file contains all


    the projects from this chapter, listed in separate root


    directories. There is also a README.TXT file that describes


    exactly how to import projects into your IDE from one of


    these ZIP files.


     [http://developer.android.com/guide/topics/](http://developer.android.com/guide/topics/fundamentals/activities.html#SavingActivityState)


    [fundamentals/activities.html#SavingActivityState](http://developer.android.com/guide/topics/fundamentals/activities.html#SavingActivityState):
    The Android Developer’s Guide, which discusses saving


    and restoring state.


     [http://developer.android.com/guide/topics/](http://developer.android.com/guide/topics/resources/runtime-changes.html)


    [resources/runtime-changes.html](http://developer.android.com/guide/topics/resources/runtime-changes.html):
    The Android API Guide for Handling Runtime Changes.


    Summary


    Let’s conclude this chapter by quickly enumerating what you have learned about
    handling configuration changes:


     Activities by default get destroyed and re-created during


    configuration changes. So do fragments.


     Avoid putting lots of data and logic into activities so


    configuration changes occur quickly.'
