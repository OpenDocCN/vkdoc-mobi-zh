    \ `publishProgress()` 方法来触发 `onProgressUpdate()`。被触发的 `onProgressUpdate()` 方法随后会在主线程上运行。这使得\
    \ `onProgressUpdate()` 方法能够适当地更新 `Views` 等 UI 元素。您也可以在此处发送 `Toast`。在清单 6-5 中，我们仅记录了一条消息。当所有工作完成后，我们从\
