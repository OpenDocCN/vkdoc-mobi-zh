    - [http://developer.android.com/reference/android/os/AsyncTask.html](http://developer.android.com/reference/android/os/AsyncTask.html)：一份关键资源，明确记录了`AsyncTask`的行为。

    - [www.shanekirk.com/2012/04/asynctask-missteps/](http://www.shanekirk.com/2012/04/asynctask-missteps/)：对行为良好的`AsyncTask`的另一份分析。

    - [www.androidbook.com/item/3536](http://www.androidbook.com/item/3536)：我们在准备本章时收集的关于`AsyncTask`的研究笔记。

    - [www.androidbook.com/item/3537](http://www.androidbook.com/item/3537)：Android在其API中经常使用Java泛型。此链接记录了一些Java泛型的基础知识，帮助你入门。

    - [www.androidbook.com/fragments](http://www.androidbook.com/fragments)：正如本章所示，要权威地使用`AsyncTask`，你需要了解很多关于Activity生命周期、片段及其生命周期、无头片段、配置更改、片段对话框、`AsyncTask`等方面的知识。此链接包含大量关于所有这些领域的文章。

    - [www.androidbook.com/item/4660](http://www.androidbook.com/item/4660)：ADO是我们的一位作者推崇的一种抽象工具，用于方便地处理配置更改。此链接记录了ADO是什么、如何使用，并提供了初步实现。

    - [www.androidbook.com/item/4674](http://www.androidbook.com/item/4674)：此链接记录了与`ProgressBar`配合使用的背景信息、有用的链接、代码片段和提示。

    - [www.androidbook.com/item/4680](http://www.androidbook.com/item/4680)：此链接包含了大量关于配置更改事件中Activity生命周期的研究。

    - [www.androidbook.com/item/4665](http://www.androidbook.com/item/4665)：当设备旋转时，很难编写出运行良好的程序。此链接概述了验证`AsyncTask`必须成功运行的一些基本测试用例。

    - [www.androidbook.com/item/4673](http://www.androidbook.com/item/4673)：此链接提出了一个用于构建继承片段的增强模式。

    - [www.androidbook.com/item/4629](http://www.androidbook.com/item/4629)：理解片段（包括保留片段）的最佳方式。'
  raw: 'In the onCreate( ) callback, the activity checks to see if there is an existing
    retained fragment and if it exists, Android will automatically re-attach it to
    the activity.


    The menu click code will create a new retained fragment (and therefore the associated
    AsyncTask) if one is not already there. We do not want more than one at a time.
    And finally, in the allDone( ) callback, the retained fragment wil be destroyed
    when it is finished performing its duties. Notice the


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **112**


    **CHAPTER 6: Advanced AsyncTask and Progress Dialogs**


    commitAllowingStateLoss( ) method in allDone( ). This is used because the activity
    may not be visible, but we stil want to attempt to remove the retained fragment.
    If regular commit( ) is used, an exception will be thrown.


    There are further considerations if the AsyncTask were doing updates and changing
    state. If that is the case, you may want to use a background service so that it
    can be restarted if the process is to be reclaimed and restarted later. You could
    also consider using a notification to track progress of some background task related
    to your application, similar to how the Google Play Store shows you the progress
    of applications that are being downloaded and installed/upgraded. The approaches
    presented here are adequate for quick- to medium-level reads as you are expecting
    the user to wait. However, for longer-time reads or writes, you may want to adapt
    a service-based solution.


