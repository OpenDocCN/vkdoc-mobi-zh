    \ 编排，在工作线程上运行。因此，与在主线程上执行的工作不同，此方法允许执行超过五秒的操作。\n\n在清单 6-5 的示例中，我们在 `doInBackground()`\
    \ 方法中简单地像处理数组一样检索任务的每个输入字符串。在此方法定义中，我们没有定义显式的字符串数组。然而，该函数的唯一参数被定义为可变长度参数，如清单 6-8\
    \ 所示。\n\n*清单 6-8. `doInBackground()` 方法签名*\n\n```\nprotected Integer doInBackground(String...strings)\n\
