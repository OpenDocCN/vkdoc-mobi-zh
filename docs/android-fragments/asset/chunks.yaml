    \    </string-array>\n</resources>\n```\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
    utf-8\"?>\n<resources>\n    <string-array name=\"flight_sort_options\">\n    \
    \    <item>总成本</item>\n        <item>经停次数</item>\n        <item>航空公司</item>\n\
    \    </string-array>\n    <string-array name=\"pizza_toppings\">\n        <item>芝士</item>\n\
    \        <item>意式腊肠</item>\n        <item>洋葱</item>\n        <item>波托贝洛蘑菇</item>\n\
    \        <item>黑橄榄</item>\n        <item>烟熏火腿</item>\n        <item>菠萝</item>\n\
    \    </string-array>\n</resources>\n```\n\n另外，别忘了你在 XML 源文件中指定的默认值必须与 `prefvaluearrays.xml`\
    \ 数组中的一个 `entryValue` 相匹配。\n\n对于 `ListPreference`，偏好设置的值是一个 `String`。如果你使用数字字符串（例如\
    \ 0、1、1138）作为 `entryValues`，你可以在代码中将其转换为整数或你需要的任何类型，就像在 `flight_sort_options_values`\
    \ 数组中所做的那样。\n\n你的代码很可能想要显示偏好设置 `entries` 数组中用户友好的文本。本例采取了一种捷径，因为数组索引被用作 `flight_sort_options_values`\
    \ 中的元素。只需将值转换为 int，你就知道该从 `flight_sort_options` 中读取哪个字符串。如果你在 `flight_sort_options_values`\
    \ 中使用了其他一些值集合，那么你需要确定作为偏好设置的元素的索引，然后反过来使用该索引从 `flight_sort_options` 中获取偏好设置的文本。`ListPreference`\
    \ 的辅助方法 `findIndexOfValue()` 可以帮助解决这个问题，它提供值数组中的索引，这样你就可以轻松地从 `entries` 数组中获取对应的显示文本。\n\
    \n现在回到清单 4-4，有几个用于标题、摘要等的字符串。名为 `flight_sort_option_default_value` 的字符串将默认值设置为\
