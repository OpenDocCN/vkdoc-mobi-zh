  trans: '

    # 第 2 章：响应配置变更


    ## 默认的配置变更流程


    Android 操作系统会持续跟踪其运行设备当前的 `Configuration`（配置）。配置包含多种因素，并且新的配置因素会不断加入。例如，当设备插入扩展坞时，就代表设备配置发生了改变。当
    Android 检测到配置变更时，会在正在运行的应用程序中调用回调函数，通知它们变更正在发生，以便应用程序能够正确响应此变更。我们稍后会讨论这些回调，但现在先来回顾一下关于资源的知识。


    Android 的一大特色在于，系统会根据设备当前的配置为你的 Activity（活动）选择合适的资源。你无需编写代码来判断当前处于哪种配置；只需通过名称访问资源，Android
    就会自动为你获取相应的资源。


    如果设备处于竖屏模式，而你的应用请求一个布局，你会得到竖屏布局；如果设备处于横屏模式，则会得到横屏布局。代码只是请求一个布局，而无需指定具体获取哪一种。这一点非常强大，因为即使引入了新的配置因素或配置因素的新取值，代码也无需改变。


    开发者需要做的，就是决定是否需要为新的配置创建新的资源，并按要求创建它们。然后，当应用程序经历配置变更时，Android 会向应用提供新的资源，一切功能将继续按预期运行。


    出于让事情尽可能简单的强烈愿望，当配置发生变更时，Android 会销毁当前 Activity，并在其位置创建一个新的 Activity。这看起来可能有点粗暴，但实际上并非如此。要让一个正在运行的
    Activity 适应变更，需要判断哪些部分保持不变、哪些部分需要更改，然后只处理需要变更的部分，这本身就是一个更大的挑战。


    即将被销毁的 Activity 会首先得到适当的通知，让你有机会保存任何需要保存的内容。当新的 Activity 被创建时，它有机会利用前一个 Activity
    的数据来恢复状态。为了获得良好的用户体验，显然你希望这个保存和恢复过程不要花费太长时间。


    只要应用及其 Activity 的设计方式能确保它们不包含大量需要长时间重新创建的非 UI 内容，那么保存你需要保存的数据，然后让 Android 丢弃其余部分并重新开始，是相当容易的。这恰恰是成功进行配置变更设计的关键：不要把那些在配置变更期间难以轻松重新创建的"东西"放在
    Activity 内部。


    请记住，我们的应用程序并没有被销毁，因此处于应用上下文（而非当前 Activity）中的任何内容，对于新 Activity 来说仍然存在。单例对象仍然可用，我们为应用程序派生出的任何后台线程也仍然存在。


    我们正在使用的任何数据库或内容提供程序也仍然存在。利用好这些特性，可以使配置变更变得快速且无痛。如果可能，尽量将数据和业务逻辑放在 Activity 之外。


    配置变更的流程在 Activity 和 Fragment（片段）之间有些相似。当一个 Activity 被销毁并重新创建时，该 Activity 内的所有
    Fragment 也会被销毁并重新创建。那么我们需要担心的，就是关于 Fragment 和 Activity 的状态信息，例如当前显示给用户的数据，或者我们希望保留的内部值。我们将保存想要保留的内容，并在
    Fragment 和 Activity 被重新创建时，在另一边重新拾取它们。

