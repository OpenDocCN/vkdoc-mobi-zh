    \ 通过这个新 XML 文件的存在来记住这一信息。\n\n然而，即使您升级应用程序并添加具有新默认值的新设置，Android 也会记住之前的状态，这意味着此技巧不会设置这些新默认值。您的最佳选择是始终为默认值使用资源，并在获取偏好的当前值时始终将该资源作为默认值提供。\n\
    \n### 理解 ListPreference\n\n`ListPreference`为每个选项包含一个单选按钮，并且默认（或当前）选项会被预选。用户只能选择其中一个选项。当用户选择一个选项时，对话框会立即关闭，并且选择结果会保存到偏好设置\
    \ XML 文件中。\n\n图 4-4 展示了其外观。\n\n***图 4-4.** ListPreference 的用户界面*\n\n*列表 4-4. 在\
    \ XML 中指定 ListPreference*\n\n```xml\n<ListPreference\n    android:key=\"@string/flight_sort_option\"\
    \n    android:title=\"@string/listTitle\"\n    android:summary=\"@string/listSummary\"\
    \ />\n```"
  raw: 'You could use whatever package name you want in case you need to store different
    sets of preferences in different files.


    Once you have a reference to the preferences, you call the appropriate getter
    method with the key of the preference and a default value. Since show_airline_column_pref
    is a TwoStatePreference, the value returned is a boolean. The default value for
    show_airline_column_pref is hard-coded here as false. If this preference has not
    yet been set at all, the hard-coded value (false) will be assigned to showAirline.
    However, that by itself does not persist the preference to false for future use,
    nor does it honor any default value that might have been set in the XML specification
    for this preference.


    If the XML specification uses a resource value to specify the default value, then
    the same resource could be referred to in code to set the default value, as shown
    in the following for a different preference:


    String flight_option = prefs.getString(


    resources.getString(R.string.flight_sort_option),


    resources.getString(R.string.flight_sort_option_default_value)); Notice here that
    the key for the preference is also using a string resource value (R.string.flight_sort_option).
    This can be a wise choice since it makes typos less likely. If the resource name
    is typed wrong you’ll very likely get a build error. If you use just simple strings,
    it is possible for a typo to go unnoticed, except that your preferences won’t
    work.


    We showed one way to read a default value for a preference in code.


    Android provides another way that is a bit more elegant. In onCreate(), you can
    do the following instead:


    PreferenceManager.setDefaultValues(this, R.xml.main, false);


    Then, in setOptionText(), you would have done this to read the option value:


    String option = prefs.getString(


    resources.getString(R.string.flight_sort_option), null);


    The first call will use main.xml to find the default values and generate the preferences
    XML data file for us using the default values. If we already have an instance
    of the SharedPreferences object in memory, it will update that too. The second
    call will then find a value for flight_sort_option, because we took care of loading
    defaults first.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00013.jpeg)


    **68**


    **CHAPTER 4: Working with Preferences and Saving State**


    After running this code the first time, if you look in the shared_prefs folder,
    you will see the preferences XML file even if the preferences screen has not yet
    been invoked. You will also see another file called _has_set_default_


    values.xml. This file tells your application that the preferences XML file has
    already been created with the default values. The third argument to setDefaultValues()—that
    is, false—indicates that you want the defaults set in the preferences XML file
    only if it hasn’t been done before. Android remembers this information through
    the existence of this new XML file.


    However, Android remembers even if you upgrade your application and add new settings
    with new default values, which means this trick won’t set those new defaults.
    Your best option is to always use a resource for the default value, and always
    provide that resource as the default value when getting the current value of a
    preference.


    Understanding ListPreference


    A list preference contains radio buttons for each option, and the default (or
    current) selection is preselected. The user is expected to select one and only
    one of the choices. When the user chooses an option, the dialog is immediately
    dismissed and the choice is saved in the preferences XML file.


    Figure [4-4](#part0000_split_000.html#p73) shows what this looks like.


    ***Figure 4-4.** The user interface for the ListPreference*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 4: Working with Preferences and Saving State** **69**


    *Listing 4-4\. Specifying a ListPreference in XML*


    <ListPreference


    android:key="@string/flight_sort_option"


    android:title="@string/listTitle"


    android:summary="@string/listSummary"'
