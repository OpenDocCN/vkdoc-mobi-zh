    `Activity`类有一个`getPreferences(int mode)`方法。实际上，该方法会以活动类名作为标签，并传入模式，来调用`getSharedPreferences()`。结果会得到一个特定于活动的共享偏好设置文件，您可以使用它在多次调用之间存储关于该活动的数据。清单
