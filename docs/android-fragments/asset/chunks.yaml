    # Chapter: Working with Dialogs


    The Android SDK offers extensive support for dialogs. A dialog is a smaller window
    that pops up in front of the current window to show an urgent message, to prompt
    the user for a piece of input, or to show some sort of status like the progress
    of a download. The user is generally expected to interact with the dialog and
    then return to the window underneath to continue with the application. Technically,
    Android allows a dialog fragment to also be embedded within an activity’s layout,
    and we’ll cover that as well.


    Dialogs that are explicitly supported in Android include the alert, prompt, pick-list,
    single-choice, multiple-choice, progress, time-picker, and date-picker dialogs.
    (This list could vary depending on the Android release.) Android also supports
    custom dialogs for other needs. The primary purpose of this chapter is not to
    cover every single one of these dialogs but to cover the underlying architecture
    of Android dialogs with a sample application.


    From there you should be able to use any of the Android dialogs.


    It’s important to note that Android 3.0 added dialogs based on fragments. The
    expectation from Google is that developers will only use fragment dialogs, even
    in the versions of Android before 3.0. This can be done with the fragment-compatibility
    library. For this reason, this chapter focuses on `DialogFragment`.


    ## Using Dialogs in Android


    Dialogs in Android are asynchronous, which provides flexibility. However, if you
    are accustomed to a programming framework where dialogs are primarily synchronous
    (such as Microsoft Windows, or JavaScript dialogs in web pages), you might find
    asynchronous dialogs a bit unintuitive.


    With a synchronous dialog, the line of code after the dialog is shown does not
    run until the dialog has been dismissed. This means the next line of code could
    interrogate which button was pressed, or what text was typed into the dialog.
    In Android however, dialogs are asynchronous. As soon as the dialog has been shown,
    the next line of code runs, even though the user hasn’t touched the dialog yet.
    Your application has to deal with this fact by implementing callbacks from the
    dialog, to allow the application to be notified of user interaction with the dialog.


    This also means your application has the ability to dismiss the dialog from code,
    which is powerful. If the dialog is displaying a busy message because your application
    is doing something, as soon as your application has completed that task, it can
    dismiss the dialog from code.


    ## Understanding Dialog Fragments


    In this section, you learn how to use dialog fragments to present a simple alert
    dialog and a custom dialog that is used to collect prompt text.


    ### DialogFragment Basics


    Before we show you working examples of a prompt dialog and an alert dialog, we
    would like to cover the high-level idea of dialog fragments.


    Dialog-related functionality uses a class called `DialogFragment`. A `DialogFragment`
    is derived from the class `Fragment` and behaves much like a fragment. You will
    then use the `DialogFragment` as the base class for your dialogs. Once you have
    a derived dialog from this class such as `public class MyDialogFragment extends
    DialogFragment { ... }`, you can then show this dialog fragment `MyDialogFragment`
    as a dialog using a fragment transaction. Listing 3-1 shows a code snippet to
    do this.


    *Listing 3-1\. Showing a Dialog Fragment*'
