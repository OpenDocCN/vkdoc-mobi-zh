    \ getter 方法来获取偏好设置的值，在本例中是 `getString()`。\n\n## 理解 MultiSelectListPreference\n"
- fmt: "And finally, a preference called `MultiSelectListPreference` was introduced\
    \ in Android 3.0. The concept is somewhat similar to a `ListPreference`, but instead\
    \ of only being able to select one item in the list, the user can select several\
    \ or none. In listing 4-1, the `MultiSelectListPreference` stores a `<set name=\"\
    pizza_toppings\">` tag in the preferences XML data file, instead of a single value.\
    \ The other significant difference with a `MultiSelectListPreference` is that\
    \ the default value is an array just like the `entryValues` array. That is, the\
    \ array for the default values must contain zero or more of the elements from\
    \ the `entryValues` array for this preference. This can also be seen in the sample\
    \ application for this chapter; just view the end of the `main.xml` file in the\
    \ `/res/xml` directory.\n\nTo get the current value of a `MultiSelectListPreference`,\
    \ use the `getStringSet()` method of `SharedPreferences`. To retrieve the display\
    \ strings from the `entries` array, you would need to iterate through the set\
    \ of strings that is the value of this preference, determine the index of the\
    \ string, and use the index to access the proper display string from the `entries`\
    \ array.\n\n## Updating AndroidManifest.xml\n\nBecause there are two activities\
    \ in the sample application, we need two `<activity>` tags in `AndroidManifest.xml`.\
    \ The first one is a standard activity of category `LAUNCHER`. The second one\
    \ is for a `PreferenceActivity`, so set the action name according to convention\
    \ for intents, and set the category to `PREFERENCE` as shown in listing 4-7. You\
    \ probably don’t want the `PreferenceActivity` showing up on the Android page\
    \ with all our other applications, which is why you don’t use `LAUNCHER` for it.\
    \ You would need to make similar changes to `AndroidManifest.xml` if you were\
    \ to add other preference activities.\n\n*Listing 4-7.* `PreferenceActivity` *Entry\
    \ in* `AndroidManifest.xml`\n\n```\n<activity android:name=\".MainPreferenceActivity\"\
    \n          android:label=\"@string/prefTitle\">\n    <intent-filter>\n      \
    \  <action android:name=\n            \"com.androidbook.preferences.main.intent.action.MainPreferences\"\
    \ />\n        <category\n            android:name=\"android.intent.category.PREFERENCE\"\
    \ />\n    </intent-filter>\n</activity>\n```\n\n## Using PreferenceCategory\n\n\
    The preferences framework provides support for you to organize your preferences\
    \ into categories. If you have a lot of preferences, for example, you can use\
    \ `PreferenceCategory`, which groups preferences under a separator label. Figure\
    \ 4-6 shows what this could look like. Notice the separators called “MEATS” and\
    \ “VEGETABLES.” You can find the specifications for these in `/res/xml/main.xml`.\n\
    \n![Figure 4-6](images/00029.png)\n\n**Figure 4-6.** Using `PreferenceCategory`\
    \ to organize preferences\n\n## Creating Child Preferences with Dependency\n\n\
    Another way to organize preferences is to use a preference dependency. This creates\
    \ a parent-child relationship between preferences. For example, you might have\
    \ a preference that turns on alerts; and if alerts are on, there might be several\
    \ other alert-related preferences to choose from. If the main alerts preference\
    \ is off, the other preferences are not relevant and should be disabled. Listing\
    \ 4-8 shows the XML, and Figure 4-7 shows what it looks like.\n\n*Listing 4-8.*\
    \ Preference Dependency in XML\n\n```\n<PreferenceScreen>\n    <PreferenceCategory\n\
    \        android:title=\"Alerts\">\n        <CheckBoxPreference\n            android:key=\"\
    alert_email\"\n            android:title=\"Send email?\" />\n        <EditTextPreference\n\
    \            android:key=\"alert_email_address\"\n            android:layout=\"\
    ?android:attr/preferenceLayoutChild\"\n            android:title=\"Email Address\"\
    \n            android:dependency=\"alert_email\" />\n    </PreferenceCategory>\n\
    </PreferenceScreen>\n```\n\n![Figure 4-7](images/00006.jpeg)\n\n**Figure 4-7.**\
    \ Preference dependency\n\n## Preferences with Headers\n\nAndroid 3.0 introduced\
    \ a new way to organize preferences. You see this on tablets under the main Settings\
    \ app. Because tablet screen real estate offers much more room than a smartphone\
    \ does, it makes sense to display more preference information at the same time.\
    \ To accomplish this, you use preference headers. Take a look at Figure 4-8.\n\
    \n![Figure 4-8](images/00004.jpeg)\n\n**Figure 4-8.** Main Settings page with\
    \ preference headers\n\nNotice that headers appear down the left side, like a\
    \ vertical tab bar. As you click each item on the left, the screen to the right\
    \ displays the preferences for that item. In Figure 4-8, Sound is chosen, and\
    \ the sound preferences are displayed at right. The right side is a `PreferenceScreen`\
    \ object, and this setup uses fragments. Obviously, we need to do something different\
    \ than what has been discussed so far in this chapter.\n\nThe big change from\
    \ Android 3.0 was the addition of headers to `PreferenceActivity`. This also means\
    \ using a new callback within `PreferenceActivity` to do the headers setup. Now,\
    \ when you extend `PreferenceActivity`, you’ll want to implement this method:\n\
    \n```\npublic void onBuildHeaders(List<Header> target) {\n    loadHeadersFromResource(R.xml.preferences,\
    \ target);\n}\n```\n\nPlease refer to the `PrefDemo` sample application for the\
    \ complete source code. The `preferences.xml` file contains some new tags that\
    \ look like this:\n\n```\n<preference-headers>\n    <header android:fragment=\"\
    com.example.PrefActivity$Prefs1Fragment\"\n            android:icon=\"@drawable/ic_settings_sound\"\
    \n            android:title=\"Sound\"\n            android:summary=\"Your sound\
    \ preferences\" />\n    ...\n```\n\nEach header tag points to a class that extends\
    \ `PreferenceFragment`. In the example just given, the XML specifies an icon,\
    \ the title, and summary text (which acts like a subtitle). `Prefs1Fragment` is\
    \ an inner class of `PreferenceActivity` that could look something like this:\n\
    \n```\npublic static class Prefs1Fragment extends PreferenceFragment {\n    @Override\n\
    \    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
    \        addPreferencesFromResource(R.xml.sound_preferences);\n    }\n}\n```\n\
    \nAll this inner class needs to do is pull in the appropriate preferences XML\
    \ file, as shown. That preferences XML file contains the types of preference specifications\
    \ we covered earlier, such as `ListPreference`, `CheckBoxPreference`, `PreferenceCategory`,\
    \ and so on. What’s very nice is that Android takes care of doing the right thing\
    \ when the screen configuration changes and when the preferences are displayed\
    \ on a small screen. Headers behave like old preferences when the screen is too\
    \ small to display both headers and the preference screen to the right. That is,\
    \ you only see the headers; and when you click a header, you then see only the\
    \ appropriate preference screen.\n\n## PreferenceScreens\n\nThe top-level container\
    \ for preferences is a `PreferenceScreen`. Before tablets and `PreferenceFragment`s,\
    \ you could nest `PreferenceScreen`s, and when the user clicked on a nested `PreferenceScreen`\
    \ item, the new `PreferenceScreen` would replace the currently displayed `PreferenceScreen`.\
    \ This worked fine on a small screen, but doesn’t look as good on a tablet, especially\
    \ if you started with headers and fragments. What you probably want is for the\
    \ new `PreferenceScreen` to appear where the current fragment is.\n\nTo make a\
    \ `PreferenceScreen` work inside of a fragment, all you need to do is specify\
    \ a fragment class name for that `PreferenceScreen`. Listing 4-9 shows the XML\
    \ from the sample application.\n\n*Listing 4-9.* `PreferenceScreen` invoked via\
    \ a `PreferenceFragment`\n\n```\n<PreferenceScreen\n    android:title=\"Launch\
    \ a new screen into a fragment\""
