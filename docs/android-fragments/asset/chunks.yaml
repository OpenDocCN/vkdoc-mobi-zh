    ## 章节


    为旧设备使用兼容库


    自从几年前首次推出以来，Android 平台经历了一场令人瞩目的演变。虽然其初衷始终是让 Android 为各种不同类型的设备提供动力，但它并非从一开始就为实现这一目标而架构设计的。相反，谷歌工程师添加、移除和更改了
    API，以提供新功能。其中最大的变化之一是为了处理平板电脑和电视等更大的屏幕尺寸而引入了 Fragment。但还有其他的变化，例如 `ActionBar`
    和菜单。


    新的 API 给开发者带来了一个难题，他们希望自己的应用既能在拥有新 API 的新设备上运行，也能在没有这些 API 的旧设备上运行。许多旧设备无法获得 Android
    系统升级。即使谷歌将新的 API 添加到旧版 Android 系统的修订版本中，旧设备也无法获得那个新修订版本，因为这需要设备制造商和蜂窝网络运营商进行测试和支持。谷歌提出的解决方案是创建可以链接到应用中的兼容库，这样应用就可以利用新的
    API 功能，同时仍然能在较旧版本的 Android 上运行。该库会找出如何使用旧版 API 来实现新功能。如果同一个应用在已经拥有这些新功能的较新版本 Android
    上运行，兼容库则会调用该新版本 Android 中存在的底层 API。


    本章将深入探讨兼容库，并解释如何使用它们以及需要注意什么。如果你不是在为旧版本的 Android 开发应用，可以安全地跳过本章，因为你不需要这些库。只有当你想在将运行于不具备新
    API 的旧版本 Android 上的应用中包含新 API 功能时，这些库才有用。


    ### 一切始于平板电脑


    Android 操作系统在支持平板电脑之前一直运行良好。应用的基本构建模块是 Activity，旨在为用户执行单一任务并填满设备的屏幕。'
- fmt: '# Using the Compatibility Library for Older Devices


    But tablets offered more real estate so the user could see and do a few things
    at a time on one screen. So with Honeycomb (`Android 3.0`), Google introduced
    fragments. This was a whole new concept, which changed how developers created
    UIs and the logic that ran behind them. And this would have been fine, except
    that there were still plenty of Android devices (e.g., smartphones) in the wild
    which did not support fragments. What Google figured out is that a compatibility
    library could be written to provide comparable implementations of `Fragment`,
    etc., that used the existing APIs in the older versions of Android. If an application
    linked in the compatibility library, it could work with fragments even though
    the older version of Android didn’t support fragments in the OS.


    The Google engineers then looked at other features and APIs in new Android and
    provided compatibility library features and APIs to match, so that these features
    could also be used in older versions of Android without having to release updates
    to those older versions of Android. In addition to support for `Fragments`, compatibility
    libraries provide support for `Loaders`, `RenderScript`, `ActionBar`, and others.


    The compatibility library doesn’t always make things perfectly the same between
    old and new. For example, the new `Activity` class is aware of fragments. To use
    the compatibility library, you must extend the `FragmentActivity` class instead
    of `Activity`; it is the `FragmentActivity` class that works with fragments in
    old Android versions.


    When you use the compatibility library, you will use those classes for your application
    regardless of which version of Android it will run on. In other words, you would
    only use `FragmentActivity` in your application and it will do the right thing
    in all versions of Android, including `Android 3.0` and later. You would not try
    to include in the same application both `Activity` for `Android 3.0+` and `FragmentActivity`
    for Android below `3.0`. When `FragmentActivity` is executing on `Android 3.0`
    and above, it can pretty much call straight through to the underlying `Activity`
    class. There is no real penalty to using a compatibility library on a recent Android
    version.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 5: Using the Compatibility Library for Older Devices** **85**


    ## Adding the Library to Your Project


    As of this writing, there are four compatibility libraries; together the collection
    is called the Android Support Library, revision 21:


    - **v4**—contains `FragmentActivity`, `Fragment`, `Loader`, and quite a few other
    classes introduced after `Android 3.0`. The number 4 represents Android API version
    4 (i.e., `Donut 1.6`). It means this library can be used for applications that
    run on Android API version 4 and above.

    - **v7**—makes available the `ActionBar`, `CardView`, `GridLayout`, `MediaRouter`,
    `Palette` and `RecyclerView` classes. This library can be used with Android API
    version 7 (i.e., `Eclair 2.1`) and above. There are actually six libraries here:
    `appcompat`, `cardview`, `gridlayout`, `mediarouter`, `palette` and `recyclerview`.

    - **v8**—adds `RenderScript` capability to Android API version 8 (i.e., `Froyo
    2.2`) and above. `RenderScript` allows for parallelization of work across device
    processors (CPU cores, GPUs, DSPs) and was introduced in Android API version 11
    (i.e., `Honeycomb 3.0`).

    - **v13**—adds some special `Fragment` functionality for things like tabbed and
    pager interfaces. This library also contains many of the classes from v4 so it
    can be included in your application without requiring other libraries.


    For a complete list of all compatibility functionality by version number, please
    see the references at the end of this chapter.


    To download the Android Support Library to your computer, use the Android SDK
    Manager and look for it at the bottom of the list under `Extras`. If you’re using
    Android Studio, download the Android Support Repository and Google Repository.
    Otherwise, download Android Support Library instead. The files will be placed
    under your Android SDK directory. The Android Support Library can be found in
    `extras/android/support/`, the Android Support Repository can be found in `extras/android/m2repository`,
    and the Google Repository can be found in `extras/google/m2repository`. As of
    this writing, the `RenderScript` compatibility library is not supported in Android
    Studio.


    As you can see from the preceding bullet list, not all features of the Android
    Support Library are available on all older versions of Android. Therefore you
    must properly set `android:minSdkVersion` in your `AndroidManifest.xml` file.


    If you are using a compatibility library feature from v7, `android:minSdkVersion`
    should not be lower than 7.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00002.jpeg)


    **86** **CHAPTER 5: Using the Compatibility Library for Older Devices**


    ## Including the v7 Support Library


    There’s very little chance that you’d ever want to include the v4 library and
    not the v7 library. Since the v7 library requires that the v4 library also be
    included to provide the necessary classes for v7 to function properly, you’ll
    want to include both. If you are using Eclipse, the ADT plug-in makes all of this
    pretty easy. When you create a new Android project in Eclipse, you specify the
    minimum version of Android that it will run on. If ADT thinks that you might want
    the compatibility library included, it will automatically include it.


    For example, if you specify a target SDK of 16 (`JellyBean 4.1`) but a minimum
    SDK of 8 (`Froyo 2.2`), ADT will automatically set up an `appcompat v7` library
    project, include that library project in your new application, and also include
    the v4 library as well in your application. The resources from the v7 library
    are therefore available to your application without you having to do extra work.


    However, if you want to use either of the other two v7 libraries (`gridlayout`
    and/or `mediarouter`), those will require a little extra work, as will now be
    explained.


    By creating a library project and including that in your application, it will
    include the compatibility library resources that your application will need.


    You will manually do something similar to what ADT did to automatically include
    the v7 `appcompat` library into your project. To start, you will choose **File
    ➤ Import**, then **Existing Android Code Into Workspace**, then navigate to the
    `extras` folder where the Android SDK is on your workstation. Locate the v7 `gridlayout`
    or `mediarouter` folder and choose that. See Figure [5-1](#part0000_split_001.html#p90).


    ***Figure 5-1.** Importing the v7 mediarouter compatibility library*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00023.jpeg)


    **CHAPTER 5: Using the Compatibility Library for Older Devices** **87**


    Click **Finish** and you will get a new library project. If you chose to create
    a library project for v7 `mediarouter`, you will see that it is missing some functionality
    so it has errors. You need to add in the v7 `appcompat` library to clear that
    up. Right-click the `mediarouter` library project in Eclipse and choose **Properties**.
    In the list on the left choose **Android**. Now click the **Add…** button in the
    **Library** section. See Figure [5-2](#part0000_split_001.html#p91).


    ***Figure 5-2.** Adding appcompat_v7 to the v7 mediarouter compatibility library*


    Select the `appcompat_v7` library and click **OK**. That should clear up the errors
    in `mediarouter`. Now when you want to include `mediarouter` in your application
    project, simply follow the same procedure but right-click your application project,
    and when you click the **Add…** button for **Library**, choose the `mediarouter`
    library.


    ## Including the v8 Support Library'
  raw: 'But tablets offered more real estate so the user could see and do a few things
    at a time on one screen. So with Honeycomb (Android 3.0), Google introduced fragments.
    This was a whole new concept, which changed how developers created UIs and the
    logic that ran behind them. And this would have been fine, except that there were
    still plenty of Android devices (e.g., smartphones) in the wild which did not
    support fragments. What Google figured out is that a compatibility library could
    be written to provide comparable implementations of Fragment, etc., that used
    the existing APIs in the older versions of Android. If an application linked in
    the compatibility library, it could work with fragments even though the older
    version of Android didn’t support fragments in the OS.


    The Google engineers then looked at other features and APIs in new Android and
    provided compatibility library features and APIs to match, so that these features
    could also be used in older versions of Android without having to release updates
    to those older versions of Android. In addition to support for Fragments, compatibility
    libraries provide support for Loaders, RenderScript, ActionBar, and others.


    The compatibility library doesn’t always make things perfectly the same between
    old and new. For example, the new Activity class is aware of fragments. To use
    the compatibility library, you must extend the FragmentActivity class instead
    of Activity; it is the FragmentActivity class that works with fragments in old
    Android versions.


    When you use the compatibility library, you will use those classes for your application
    regardless of which version of Android it will run on. In other words, you would
    only use FragmentActivity in your application and it will do the right thing in
    all versions of Android, including Android 3.0 and later. You would not try to
    include in the same application both Activity for Android 3.0+ and FragmentActivity
    for Android below 3.0\. When FragmentActivity is executing on Android 3.0 and
    above, it can pretty much call straight through to the underlying Activity class.
    There is no real penalty to using a compatibility library on a recent Android
    version.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 5: Using the Compatibility Library for Older Devices** **85**


    Adding the Library to Your Project


    As of this writing, there are four compatibility libraries; together the collection
    is called the Android Support Library, revision 21:


     v4—contains FragmentActivity, Fragment, Loader, and


    quite a few other classes introduced after Android 3.0.


    The number 4 represents Android API version 4


    (i.e., Donut 1.6). It means this library can be used for


    applications that run on Android API version 4 and above.


     v7—makes available the ActionBar, CardView,


    GridLayout, MediaRouter, Palette and RecyclerView


    classes. This library can be used with Android API


    version 7 (i.e., Eclair 2.1) and above. There are actually


    six libraries here: appcompat, cardview, gridlayout,


    mediarouter, palette and recyclerview.


     v8—adds RenderScipt capability to Android API version


    8 (i.e., Froyo 2.2) and above. RenderScript allows for


    parallelization of work across device processors (CPU


    cores, GPUs, DSPs) and was introduced in Android API


    version 11 (i.e., Honeycomb 3.0).


     v13—adds some special Fragment functionality for


    things like tabbed and pager interfaces. This library


    also contains many of the classes from v4 so it can


    be included in your application without requiring other


    libraries.


    For a complete list of all compatibility functionality by version number, please
    see the references at the end of this chapter.


    To download the Android Support Library to your computer, use the Android SDK
    Manager and look for it at the bottom of the list under Extras. If you’re using
    Android Studio, download the Android Support Repository and Google Repository.
    Otherwise, download Android Support Library instead. The files wil be placed under
    your Android SDK directory. The Android Support Library can be found in extras/android/support/,
    the Android Support Repository can be found in extras/android/m2repository, and
    the Google Repository can be found in extras/google/m2repository. As of this writing,
    the RenderScript compatibility library is not supported in Android Studio.


    As you can see from the preceding bullet list, not all features of the Android
    Support Library are available on all older versions of Android. Therefore you
    must properly set android:minSdkVersion in your AndroidManifest.xml file.


    If you are using a compatibility library feature from v7,


    android:minSdkVersion should not be lower than 7.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00002.jpeg)


    **86**


    **CHAPTER 5: Using the Compatibility Library for Older Devices** Including the
    v7 Support Library


    There’s very little chance that you’d ever want to include the v4 library and
    not the v7 library. Since the v7 library requires that the v4 library also be
    included to provide the necessary classes for v7 to function properly, you’l want
    to include both. If you are using Eclipse, the ADT plug-in makes all of this pretty
    easy. When you create a new Android project in Eclipse, you specify the minimum
    version of Android that it wil run on. If ADT thinks that you might want the compatibility
    library included, it will automatically include it.


    For example, if you specify a target SDK of 16 (JellyBean 4.1) but a minimum SDK
    of 8 (Froyo 2.2), ADT wil automatical y set up an appcompat v7 library project,
    include that library project in your new application, and also include the v4
    library as wel in your application. The resources from the v7 library are therefore
    available to your application without you having to do extra work.


    However, if you want to use either of the other two v7 libraries (gridlayout and/


    or mediarouter), those wil require a little extra work, as wil now be explained.


    By creating a library project and including that in your application, it will
    include the compatibility library resources that your application will need.


    You will manually do something similar to what ADT did to automatically include
    the v7 appcompat library into your project. To start, you will choose File ➤ Import,
    then Existing Android Code Into Workspace, then navigate to the extras folder
    where the Android SDK is on your workstation. Locate the v7 gridlayout or mediarouter
    folder and choose that. See Figure [5-1](#part0000_split_001.html#p90).


    ***Figure 5-1.** Importing the v7 mediarouter compatibility library*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![](images/00023.jpeg)


    **CHAPTER 5: Using the Compatibility Library for Older Devices** **87**


    Click Finish and you will get a new library project. If you chose to create a
    library project for v7 mediarouter, you will see that it is missing some functionality
    so it has errors. You need to add in the v7 appcompat library to clear that up.
    Right-click the mediarouter library project in Eclipse and choose Properties.
    In the list on the left choose Android. Now click the Add… button in the Library
    section. See Figure [5-2](#part0000_split_001.html#p91).


    ***Figure 5-2.** Adding appcompat_v7 to the v7 mediarouter compatibility library*
    Select the appcompat_v7 library and click OK. That should clear up the errors
    in mediarouter. Now when you want to include mediarouter in your application project,
    simply follow the same procedure but right-click your application project, and
    when you click the Add… button for Library, chose the mediarouter library.


