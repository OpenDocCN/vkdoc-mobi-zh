    \ 的源代码*\n\n```java\npublic class Shakespeare {\n    public static String TITLES[]\
    \ = {\n        \"Henry IV (1)\",\n        \"Henry V\",\n        \"Henry VIII\"\
    ,\n        \"Romeo and Juliet\",\n        \"Hamlet\",\n        \"The Merchant\
    \ of Venice\",\n        \"Othello\"\n    };\n    public static String DIALOGUE[]\
    \ = {\n        \"So shaken as we are, so wan with care,\\n... ... ***and so on***\
    \ ...\"\n    };\n}\n```\n\n现在，您的详情Fragment的视图层次结构包含了所选标题的文本。详情Fragment已准备就绪。现在您可以回到`MainActivity`的`showDetails()`方法来讨论`FragmentTransaction`。\n\
    \n## FragmentTransactions 与 Fragment 返回栈\n\n`showDetails()`中用于引入新详情Fragment的代码（部分内容再次在**清单\
    \ 1-8**中展示）看起来相当简单，但其中涉及了很多细节。花些时间来解释发生了什么以及为什么这样做是值得的。如果您的Activity处于多面板模式，您希望在标题列表旁边显示详情Fragment。您可能已经在显示详情了，这意味着用户可能已经看到了一个详情Fragment。无论哪种情况，资源ID\
    \ `R.id.details` 都指向Activity的`FrameLayout`，如**清单 1-3**所示。如果您在布局中放置了一个详情Fragment而未指定其他ID，它就会拥有这个ID。因此，要判断布局中是否存在详情Fragment，您可以使用`findFragmentById()`询问FragmentManager。如果框架布局为空，此方法返回`null`；否则返回当前的详情Fragment。然后您可以决定是否需要放置一个新的详情Fragment——无论是因为布局为空，还是因为存在其他标题的详情Fragment。一旦决定创建并使用新的详情Fragment，您就可以调用工厂方法来创建一个新的详情Fragment实例。\n\
    \n现在，您可以将这个新的Fragment放置到用户可以看到的位置。\n\n*清单 1-8. FragmentTransaction 示例*\n\n```java\n\
    public void showDetails(int index) {\n    Log.v(TAG, \"in MainActivity showDetails(\"\
    \ + index + \")\");\n    if (isMultiPane()) {\n        // Check what fragment\
    \ is shown, replace if needed.\n        DetailsFragment details = (DetailsFragment)\n\
    \                getFragmentManager().findFragmentById(R.id.details);\n      \
    \  if (details == null || details.getShownIndex() != index) {\n            //\
    \ Make new fragment to show this selection.\n            details = DetailsFragment.newInstance(index);\n\
    \            // Execute a transaction, replacing any existing\n            //\
    \ fragment with this one inside the frame.\n            Log.v(TAG, \"about to\
    \ run FragmentTransaction...\");\n            FragmentTransaction ft\n       \
    \             = getFragmentManager().beginTransaction();\n            ft.setTransition(\n\
    \                    FragmentTransaction.TRANSIT_FRAGMENT_FADE);\n           \
    \ //ft.addToBackStack(\"details\");\n            ft.replace(R.id.details, details);\n\
    \            ft.commit();\n        }\n        // The rest was left out to save\
    \ space.\n    }\n}\n```\n\n一个关键的概念需要理解：Fragment必须生存于视图容器（也称为*视图组*）之中。`ViewGroup`类包括布局及其派生类。在Activity的`main.xml`布局文件中，`FrameLayout`是作为详情Fragment容器的理想选择。`FrameLayout`很简单，您只需要一个简单的容器来容纳Fragment，而不需要其他类型布局带来的额外负担。`FrameLayout`就是详情Fragment将要放置的位置。\n\
    \n如果您在Activity的布局文件中指定了另一个`<fragment>`标签而不是`FrameLayout`，您将无法用新Fragment替换当前Fragment（即交换Fragment）。\n\
    \n`FragmentTransaction`正是您用于执行交换操作的对象。您告诉Fragment事务，您希望用新的详情Fragment替换框架布局中的任何内容。您原本可以通过定位详情`TextView`的资源ID并直接将其文本设置为新莎士比亚标题的文本来避免这一切。但关于Fragment的另一个方面解释了为什么您要使用`FragmentTransaction`。\n\
    \n如您所知，Activity在栈中排列，随着应用不断深入，同时存在多个Activity的栈是很常见的。当您按下返回键时，最顶层的Activity消失，您将回到下面的Activity，该Activity会恢复运行。这个过程可以一直持续到您回到主屏幕。"
  raw: 'You might wonder why you didn’t simply set the mIndex value in newInstance().
    The reason is that Android will, behind the scenes, re-create your fragment using
    the default constructor. Then it sets the arguments bundle to what it was before.
    Android won’t use your newInstance() method, so the only reliable way to ensure
    that mIndex is set is to read the value from the arguments bundle and set it in
    onCreate(). The convenience method getShownIndex() retrieves the value of that
    index. Now the only method left to describe in the details fragment is onCreateView().
    And this is very simple, too.


    The purpose of onCreateView() is to return the view hierarchy for your fragment.
    Remember that based on your configuration, you could want all kinds of different
    layouts for this fragment. Therefore, the most common thing to do is utilize a
    layout XML file for your fragment. In your sample application, you specify the
    layout for the fragment to be details.xml using the resource R.layout.details.
    The XML for details.xml is in Listing 1-6.


    *Listing 1-6\. The **details.xml** Layout File for the Details Fragment*


    <?xml version="1.0" encoding="utf-8"?>


    <LinearLayout


    android:layout_width="match_parent"


    android:layout_height="match_parent">


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **18**


    **CHAPTER 1: Fragments Fundamentals**


    <ScrollView android:id="@+id/scroller"


    android:layout_width="match_parent"


    android:layout_height="match_parent">


    <TextView android:id="@+id/text1"


    android:layout_width="match_parent"


    android:layout_height="match_parent" />


    </ScrollView>


    </LinearLayout>


    For your sample application, you can use the exact same layout file for details
    whether you’re in landscape mode or in portrait mode. This layout is not for the
    activity, it’s just for your fragment to display the text. Because it could be
    considered the default layout, you can store it in the /res/layout directory and
    it will be found and used even if you’re in landscape mode.


    When Android goes looking for the details XML file, it tries the specific directories
    that closely match the device’s configuration, but it will end up in the /res/layout
    directory if it can’t find the details.xml file in any of the other places. Of
    course, if you want to have a different layout for your fragment in landscape
    mode, you could define a separate details.xml layout file and store it under /res/layout-land.
    Feel free to experiment with different details.xml files.


    When your details fragment’s onCreateView() is called, you will simply grab the
    appropriate details.xml layout file, inflate it, and set the text to the text
    from the Shakespeare class. The entire Java code for Shakespeare is not shown
    here, but a portion is in Listing 1-7 so you understand how it was done. For the
    complete source, access the project download files, as described in the “References”
    section at the end of this chapter.


    *Listing 1-7\. Source Code for **Shakespeare.java***


    public class Shakespeare {


    public static String TITLES[] = {


    "Henry IV (1)",


    "Henry V",


    "Henry VIII",


    "Romeo and Juliet",


    "Hamlet",


    "The Merchant of Venice",


    "Othello"


    };


    public static String DIALOGUE[] = {


    "So shaken as we are, so wan with care,\n...


    ... ***and so on*** ...


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 1: Fragments Fundamentals**


    **19**


    Now your details fragment view hierarchy contains the text from the selected title.
    Your details fragment is ready to go. And you can return to MainActivity’s showDetails()
    method to talk about FragmentTransactions.


    FragmentTransactions and the Fragment


    Back Stack


    The code in showDetails() that pulls in your new details fragment (partially shown
    again in Listing 1-8) looks rather simple, but there’s a lot going on here. It’s
    worth spending some time to explain what is happening and why. If your activity
    is in multipane mode, you want to show the details in a fragment next to the title
    list. You may already be showing details, which means you may have a details fragment
    visible to the user. Either way, the resource ID R.id.details is for the FrameLayout
    for your activity, as shown in Listing 1-3\. If you have a details fragment sitting
    in the layout because you didn’t assign any other ID to it, it will have this
    ID. Therefore, to find out if there’s a details fragment in the layout, you can
    ask the fragment manager using findFragmentById(). This will return null if the
    frame layout is empty or will give you the current details fragment. You can then
    decide if you need to place a new details fragment in the layout, either because
    the layout is empty or because there’s a details fragment for some other title.
    Once you make the determination to create and use a new details fragment, you
    invoke the factory method to create a new instance of a details fragment.


    Now you can put this new fragment into place for the user to see.


    *Listing 1-8\. Fragment Transaction Example*


    public void showDetails(int index) {


    Log.v(TAG, "in MainActivity showDetails(" + index + ")"); if (isMultiPane()) {


    // Check what fragment is shown, replace if needed.


    DetailsFragment details = (DetailsFragment)


    getFragmentManager().findFragmentById(R.id.details);


    if (details == null || details.getShownIndex() != index) {


    // Make new fragment to show this selection.


    details = DetailsFragment.newInstance(index);


    // Execute a transaction, replacing any existing


    // fragment with this one inside the frame.


    Log.v(TAG, "about to run FragmentTransaction...");


    FragmentTransaction ft


    = getFragmentManager().beginTransaction();


    ft.setTransition(


    FragmentTransaction.TRANSIT_FRAGMENT_FADE);


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **20**


    **CHAPTER 1: Fragments Fundamentals**


    //ft.addToBackStack("details");


    ft.replace(R.id.details, details);


    ft.commit();


    }


    // The rest was left out to save space.


    }


    A key concept to understand is that a fragment must live inside a view container,
    also known as a *view group*. The ViewGroup class includes such things as layouts
    and their derived classes. FrameLayout is a good choice as the container for the
    details fragment in the main.xml layout file of your activity. A FrameLayout is
    simple, and all you need is a simple container for your fragment, without the
    extra baggage that comes with other types of layouts. The FrameLayout is where
    your details fragment is going to go.


    If you had instead specified another <fragment> tag in the activity’s layout file
    instead of a FrameLayout, you would not be able to replace the current fragment
    with a new fragment (i.e., swap fragments).


    The FragmentTransaction is what you use to do your swapping. You tell the fragment
    transaction that you want to replace whatever is in your frame layout with your
    new details fragment. You could have avoided all this by locating the resource
    ID of the details TextView and just setting the text of it to the new text for
    the new Shakespeare title. But there’s another side to fragments that explains
    why you use FragmentTransactions.


    As you know, activities are arranged in a stack, and as you get deeper and deeper
    into an application, it’s not uncommon to have a stack of several activities going
    at once. When you press the Back button, the topmost activity goes away, and you
    are returned to the activity below, which resumes for you. This can continue until
    you’re at the home screen again.'
