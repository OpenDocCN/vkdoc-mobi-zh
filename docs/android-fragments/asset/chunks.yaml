    String1\",\"String2\",\"String3\");\n}\n```\n\n请注意清单 6-6 中调用 `execute()` 方法的方式。由于我们将其中一个泛型类型指定为\
    \ `String`，并且 `execute()` 方法接受该类型的可变数量参数，因此我们可以向 `execute()` 方法传递任意数量的字符串。在清单\
    \ 6-6 的示例中，我们传递了三个字符串参数。你可以根据需要传递更多或更少的参数。\n\n一旦我们在 `AsyncTask` 上调用 `execute()`\
