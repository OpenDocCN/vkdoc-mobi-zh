    # 优化排版后的内容


    让 Android 提供合适的资源。


    使用单例在 Activity 外部保存数据，以便在配置变更时更轻松地销毁和重建 Activity。


    利用默认的 `onSaveInstanceState()` 回调来保存带有 `android:id` 的视图上的 UI 状态。


    如果某个 Fragment 在 Activity 的销毁与重建周期中能够无问题地存活，可以使用 `setRetainInstance()` 来告知 Android
    无需销毁并重建该 Fragment。


    ---


    # 章节：使用对话框


    Android SDK 为对话框提供了广泛支持。对话框是一个较小的窗口，会弹出于当前窗口前方，用于显示紧急消息、提示用户输入信息，或显示某种状态（如下载进度）。通常期望用户与对话框进行交互，然后返回到底层窗口继续使用应用。从技术上讲，Android
    允许将对话框 Fragment 嵌入到 Activity 的布局中，我们也会涵盖这一点。


    Android 明确支持的对话框包括：提示对话框、输入对话框、选择列表、单选、多选、进度条、时间选择器和日期选择器。（此列表可能因 Android 版本而异。）Android
    也支持满足其他需求的自定义对话框。本章的主要目的并非逐一介绍这些对话框，而是通过一个示例应用来讲解 Android 对话框的底层架构。


    基于此，你应该能够使用任意 Android 对话框。


    需要注意的是，Android 3.0 新增了基于 Fragment 的对话框。Google 期望开发者仅使用 Fragment 对话框，即使在 Android
    3.0 之前的版本中也如此。这可以通过 Fragment 兼容库实现。因此，本章重点介绍 `DialogFragment`。


    ## 在 Android 中使用对话框


    Android 中的对话框是异步的，这提供了灵活性。然而，如果你习惯于对话框主要是同步的编程框架（例如 Microsoft Windows 或网页中的 JavaScript
    对话框），你可能会觉得异步对话框不太直观。


    对于同步对话框，对话框显示后的下一行代码会等到对话框被关闭后才执行。这意味着下一行代码可以查询用户按下了哪个按钮，或在对话框中输入了哪些文本。但在 Android
    中，对话框是异步的。对话框一旦显示，下一行代码就会立即执行，即使此时用户尚未触碰对话框。你的应用必须通过实现对话框的回调来处理这一情况，以便应用能获知用户与对话框的交互。


    这也意味着你的应用能够通过代码关闭对话框，这一功能非常强大。如果对话框正在显示忙碌消息（因为你的应用正在执行某项任务），一旦应用完成任务，它就可以通过代码关闭该对话框。


    ## 理解对话框 Fragment


    在本节中，你将学习如何使用对话框 Fragment 来呈现一个简单的警告对话框，以及一个用于收集提示文本的自定义对话框。


    ### DialogFragment 基础


