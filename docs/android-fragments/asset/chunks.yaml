    # CHAPTER 4: Working with Preferences and Saving State


    ## Understanding `CheckBoxPreference` and `SwitchPreference`


    The simplest of the preferences are the `CheckBoxPreference` and `SwitchPreference`.
    These share a common parent class (`TwoStatePreference`) and are either on (value
    is `true`) or off (value is `false`). For the sample application, a screen was
    created with five `CheckBoxPreferences`, as shown in Figure 4-3.


    Listing 4-2 shows what the XML looks like for a `CheckBoxPreference`.


    **Figure 4-3.** The user interface for the check box preference


    **Listing 4-2.** Using `CheckBoxPreference`


    ```xml

    <CheckBoxPreference

    android:key="show_airline_column_pref"

    android:title="Airline"

    android:summary="Show Airline column" />

    ```


    **Note** We will give you a URL at the end of the chapter that you can use to
    download projects from this chapter. This will allow you to import these projects
    into your IDE directly. The main sample application is called `PrefDemo`. You
    should refer to that project until you come to the Saving State section.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    This example shows the minimum that’s required to specify a preference. The `key`
    is the reference to, or name of, the preference, the `title` is the title displayed
    for the preference, and `summary` is a description of what the preference is for
    or a status of the current setting. Looking back on the saved values in Listing
    4-1, you will see a `<boolean>` tag for `"show_airline_column_pref"` (the `key`),
    and it has an attribute value of `true`, which indicates that the preference is
    checked on.


    With `CheckBoxPreference`, the state of the preference is saved when the user
    sets the state. In other words, when the user checks or unchecks the preference
    control, its state is saved immediately.


    The `SwitchPreference` is very similar except that the visual display is different.
    Instead of a check box in the user interface, the user sees an on-off switch,
    as shown in Figure 4-1 next to “Notifications are.”


    One other useful feature of `CheckBoxPreference` and `SwitchPreference` is that
    you can set different summary text depending on whether it’s checked. The XML
    attributes are `summaryOn` and `summaryOff`. If you look in the `main.xml` file
    for the `CheckBoxPreference` called `"potato_selection_pref"` you will see an
    example of this.


    Before you learn the other preference types, now would be a good time to understand
    how to access this preference to read its value and perform other operations.


    ## Accessing a Preference Value in Code


    Now that you have a preference defined you need to know how to access the preference
    in code so you can read the value. Listing 4-3 shows code to access the `SharedPreferences`
    object in Android where the preferences exist. This code is from the `MainActivity.java`
    file in the `setOptionText()` method.


    **Listing 4-3.** Accessing the `CheckBoxPreference`


    ```java

    SharedPreferences prefs =

    PreferenceManager.getDefaultSharedPreferences(this);

    // This is the other way to get to the shared preferences:

    // SharedPreferences prefs = getSharedPreferences(

    // "com.androidbook.preferences.main_preferences", 0);

    boolean showAirline = prefs.getBoolean("show_airline_column_pref", false);

    ```


    Using the reference to preferences, it is straightforward to read the current
    value of the `show_airline_column_pref` preference. As shown in Listing 4-3, there
    are two ways to get to the preferences. The first way shown is to get the default
    preferences for the current context. In this case, the context is that of the
    `MainActivity` of our application. The second case, which is shown commented out,
    retrieves the preferences using a package name.'
