    # 处理配置变化


    Android 不会通知 `Fragment` 保存其状态。在 Honeycomb 3.2 中，`FragmentManager` 类新增了 `saveFragmentInstanceState()`
    方法，可调用该方法生成 `Fragment.SavedState` 类的对象。前面章节中提到的保存状态的方法都是在 Android 内部进行的。


    虽然我们知道状态正在被保存，但我们无法直接访问它。这种保存状态的方法会生成一个代表 `Fragment` 保存状态的对象，并允许你控制是否以及何时从该状态创建
    `Fragment`。


    使用 `Fragment.SavedState` 对象恢复 `Fragment` 的方法是通过 `Fragment` 类的 `setInitialSavedState()`
    方法。在第 1 章中，你了解到最好使用静态工厂方法（例如 `newInstance()`）创建新的 `Fragment`。在这个方法中，你看到了如何调用默认构造函数，然后附加一个参数包。你可以改为调用
    `setInitialSavedState()` 方法来设置它，以便恢复到之前的状态。


    关于这种保存 `Fragment` 状态的方法，有几个注意事项需要了解：


    *   要保存的 `Fragment` 当前必须已附加到 `FragmentManager`。

    *   使用此保存状态创建的新 `Fragment` 必须与创建它的 `Fragment` 属于相同的类类型。

    *   保存的状态不能包含对其他 `Fragment` 的依赖。当保存的 `Fragment` 被重新创建时，其他 `Fragment` 可能不存在。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 在 Fragment 上使用 setRetainInstance


    `Fragment` 可以避免在配置更改时被销毁和重新创建。如果使用参数 `true` 调用 `setRetainInstance()` 方法，则当它的 `Activity`
    被销毁并重新创建时，该 `Fragment` 将保留在应用程序中。不会调用 `Fragment` 的 `onDestroy()` 回调，也不会调用 `onCreate()`。`onDetach()`
    回调会被调用，因为 `Fragment` 必须与即将消失的 `Activity` 分离；而 `onAttach()` 和 `onActivityCreated()`
    会被调用，因为 `Fragment` 已附加到新的 `Activity`。这仅适用于不在返回栈上的 `Fragment`。对于没有 UI 的 `Fragment`
    尤其有用。


    此功能非常强大，因为你可以使用非 UI 的 `Fragment` 来处理对数据对象和后台线程的引用，并在该 `Fragment` 上调用 `setRetainInstance(true)`，以便它不会在配置更改时被销毁和重新创建。额外的好处是，在正常的配置更改过程中，非
    UI `Fragment` 的回调 `onDetach()` 和 `onAttach()` 会将 `Activity` 引用从旧 `Activity` 切换到新
    `Activity`。


    ## 已弃用的配置更改方法


    `Activity` 上的几个方法已被弃用，因此不应再使用它们：


    *   `getLastNonConfigurationInstance()`

    *   `onRetainNonConfigurationInstance()`


    这些方法以前允许你保存一个正在被销毁的 `Activity` 中的任意对象，并将其传递给正在被创建的 `Activity` 的下一个实例。虽然它们很有用，但现在你应该使用前面描述的方法来管理销毁/创建周期中
    `Activity` 实例之间的数据。


    ## 自行处理配置更改


    到目前为止，你已经了解了 Android 如何为你处理配置更改。它负责销毁和重新创建 `Activity` 和 `Fragment`，为新的配置拉取最佳资源，保留任何用户输入的数据，并让你有机会在某些回调中执行一些额外的逻辑。这通常是你最好的选择。但当情况并非如此，当你必须自行处理配置更改时，Android
    提供了一种出路。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    不推荐这样做，因为完全由你来确定由于更改而需要更改的内容，然后你需要负责进行所有更改。如前所述，除了方向变化之外，还有许多其他配置更改。幸运的是，你不一定需要自行处理所有配置更改。


    自行处理配置更改的第一步是在 `AndroidManifest.xml` 文件的 `<activity>` 标签中，使用 `android:configChanges`
    属性声明你将处理哪些更改。Android 将使用前面描述的方法处理其他配置更改。你可以通过使用 `|` 符号将它们组合在一起，根据需要指定任意数量的配置更改类型，如下所示：


    ```

    <activity ... android:configChanges="orientation|keyboardHidden" ... >

    ```


    配置更改类型的完整列表可以在 `R.attr` 的参考页面上找到。请注意，如果你的目标 API 是 13 或更高，并且你需要处理方向更改，则还需要处理 `screenSize`。


    配置更改的默认过程是调用回调来销毁和重新创建 `Activity` 或 `Fragment`。当你声明将处理特定的配置更改时，过程会发生变化，因此仅调用 `onConfigurationChanged()`
    回调（在 `Activity` 及其 `Fragment` 上）。Android 会传入一个 `Configuration` 对象，以便回调知道新的配置是什么。由回调来确定可能发生了什么变化；但是，由于你可能只自行处理少量的配置更改，因此弄清楚这一点应该不会太难。


    你只有在需要完成的工作非常少，并且可以跳过销毁和重新创建时，才真正希望自行处理配置更改。例如，如果竖屏和横屏的 `Activity` 布局相同，并且所有图像资源都相同，那么销毁和重新创建
    `Activity` 实际上并不能带来任何好处。在这种情况下，声明你将处理方向配置更改是相当安全的。在你的 `Activity` 方向更改期间，`Activity`
    将保持不变，只需使用现有资源（如布局、图像、字符串等）在新的方向上重新渲染自身。但如果可以的话，让 Android 来处理这些事情其实也没什么大不了的。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 参考资料


    以下是一些可能有用的参考资料，供你进一步探索相关主题：


    *   [www.androidbook.com/androidfragments/projects](http://www.androidbook.com/androidfragments/projects)：本书相关可下载项目的列表。对于本章，请查找名为
    `AndroidFragments_Ch02_ConfigChanges.zip` 的 ZIP 文件。此 ZIP 文件包含本章的所有项目，这些项目列在不同的根目录中。还有一个
    `README.TXT` 文件，准确描述了如何从这些 ZIP 文件之一将项目导入到你的 IDE 中。

    *   [`developer.android.com/guide/topics/fundamentals/activities.html#SavingActivityState`](http://developer.android.com/guide/topics/fundamentals/activities.html#SavingActivityState)：Android
    开发者指南，讨论了保存和恢复状态。

    *   [`developer.android.com/guide/topics/resources/runtime-changes.html`](http://developer.android.com/guide/topics/resources/runtime-changes.html)：Android
    处理运行时变更的 API 指南。


    ## 总结


    让我们通过快速列举你学到的关于处理配置更改的知识来结束本章：


    *   默认情况下，`Activity` 在配置更改期间会被销毁并重新创建。`Fragment` 也是如此。

    *   避免将大量数据和逻辑放入 `Activity` 中，以便配置更改能够快速发生。

