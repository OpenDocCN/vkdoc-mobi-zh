- fmt: "您可能想知道为什么没有直接在`newInstance()`中设置`mIndex`值。原因是Android会在后台使用默认构造函数重新创建您的Fragment，然后将其参数Bundle恢复为之前的状态。Android不会使用您的`newInstance()`方法，因此确保设置`mIndex`值的唯一可靠方法是从参数Bundle中读取该值，并在`onCreate()`中进行设置。便捷方法`getShownIndex()`用于检索该索引的值。现在，要在详情Fragment中描述的最后一个方法是`onCreateView()`，它也非常简单。\n\
    \n`onCreateView()`的作用是返回Fragment的视图层次结构。请记住，根据配置的不同，您可能需要为这个Fragment使用各种不同的布局。因此，最常见的做法是利用布局XML文件来定义Fragment的布局。在示例应用中，您使用资源`R.layout.details`为Fragment指定了布局文件`details.xml`。`details.xml`的XML内容如**清单\
    \ 1-6**所示。\n\n*清单 1-6. 详情Fragment的布局文件 **details.xml***\n\n```\n<?xml version=\"\
    1.0\" encoding=\"utf-8\"?>\n<LinearLayout\n    android:layout_width=\"match_parent\"\
