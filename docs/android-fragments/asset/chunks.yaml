    ## Chapter


    Using the Compatibility Library for Older Devices


    The Android platform has gone through an impressive evolution since it was first
    introduced several years ago. While the intention has always been for Android
    to power lots of different types of devices, it wasn’t architected from the beginning
    to meet that goal. Instead, the Google engineers have added, removed, and changed
    APIs in order to provide new features. One of the biggest changes was the creation
    of fragments in order to handle larger screen sizes such as on tablets and TVs.
    But there have been other changes such as with `ActionBar` and Menus.


    The new APIs created a difficult problem for developers who wanted their applications
    to run on the new devices with the new APIs, as well as older devices that did
    not have those APIs. Many older devices do not get Android upgrades. Even if Google
    added the new APIs to a revision of the old Android OS, the old devices aren’t
    going to get that new revision, because of the testing and support required from
    both the device manufacturer and the cellular carrier. The solution that Google
    came up with was to create compatibility libraries that could be linked into an
    application so it could take advantage of the new API functionality yet still
    run on an older version of Android. The library figures out how to use the older
    APIs to implement the new features. If the same application runs on a newer version
    of Android that already has those new features, the compatibility library calls
    through to the underlying APIs present in that newer version of Android.


    This chapter will dive into the compatibility libraries and explain how to use
    them and what to watch out for. If you aren’t developing applications for older
    versions of Android, you could safely skip this chapter as you won’t need the
    libraries. The libraries are only useful if you want to include the functionality
    of a new API in an application that will run on an old version of Android that
    doesn’t have that new API.


