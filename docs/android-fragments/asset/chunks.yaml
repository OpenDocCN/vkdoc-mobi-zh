    \ 文件。你不希望将 `entryValues` 数组包含在这些其他文件中。\n\n但至关重要的是，`entryValues` 和 `entries` 数组中的数组元素数量必须相同。元素之间必须对应整齐。在做出更改时，请务必保持一切对齐。清单\
    \ 4-5 包含了示例中 `ListPreference` 文件的源代码。\n\n*清单 4-5. 示例中的其他 ListPreference 文件*\n\n\
