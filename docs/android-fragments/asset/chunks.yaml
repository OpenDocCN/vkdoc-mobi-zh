    \n### Persistence of Fragments\n\nWhen you play with this sample application,\
    \ make sure you rotate the device (pressing `Ctrl+F11` rotates the device in the\
    \ emulator). You will see that the device rotates, and the fragments rotate right\
    \ along with it. If you watch the LogCat messages, you will see a lot of them\
    \ for this application.\n\nIn particular, during a device rotation, pay careful\
