  trans: '

    # `onViewCreated()` 回调


    该方法在 `onCreateView()` 之后、但在任何已保存状态被注入 UI 之前立即调用。传入的视图对象与 `onCreateView()` 返回的视图对象是同一个。


    # `onActivityCreated()` 回调


    现在已接近用户可以与你片段交互的阶段。下一个回调是 `onActivityCreated()`，它在 Activity 完成其 `onCreate()` 回调后被调用。此时你可以确信，Activity
    的视图层级结构（如果你之前返回了视图，则包括你自己的视图层级结构）已准备就绪并可用了。你可以在此处对用户界面进行最终调整，这些调整将在用户看到界面之前完成。同时，你也可以在此处确认，该
    Activity 的其他任何片段都已附着到你的 Activity 上。


    # `onViewStateRestored()` 回调


    该回调相对较新，于 JellyBean 4.2 中引入。当该片段的视图层级结构的所有状态都已恢复（如果适用）时，你的片段将收到此回调。以前你必须在 `onActivityCreated()`
    中针对恢复的片段决定是否调整 UI。现在，你可以将该逻辑放在此回调中，因为你确切地知道该片段正在从已保存的状态中被恢复。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **第 1 章：片段基础**


    # `onStart()` 回调


    片段生命周期中的下一个回调是 `onStart()`。此时，你的片段对用户可见，但你尚未开始与用户交互。此回调与 Activity 的 `onStart()`
    相关联。因此，尽管以前你可能将逻辑放入 Activity 的 `onStart()` 中，但现在你更可能将逻辑放入片段的 `onStart()` 中，因为这也是用户界面组件所在的位置。


    # `onResume()` 回调


    用户能与你的片段交互之前的最后一个回调是 `onResume()`。此回调与 Activity 的 `onResume()` 相关联。当此回调返回时，用户便可以自由地与这个片段交互。例如，如果你的片段中有一个相机预览，你可能会在片段的
    `onResume()` 中启用它。


    至此，你的应用已进入让用户满意的忙碌阶段。接着，用户决定离开你的应用，可能是通过返回键退出、按 Home 键，或启动其他应用。与 Activity 发生的情况类似，接下来的序列会进入与设置片段交互相反的方向。


    # `onPause()` 回调


    片段的第一个撤销回调是 `onPause()`。此回调与 Activity 的 `onPause()` 相关联；与 Activity 一样，如果你的片段中有媒体播放器或其他共享对象，你可以在
    `onPause()` 方法中暂停它、停止它或将其归还。同样适用好公民规则：如果用户正在接听电话，你不想播放音频。


    # `onSaveInstanceState()` 回调


    与 Activity 类似，片段有机会保存状态以供日后重建。此回调会传入一个 `Bundle` 对象，作为你想保留的任何状态信息的容器。这就是之前介绍的回调中传递的已保存状态
    Bundle。


    为防止内存问题，请谨慎选择保存到该 Bundle 中的内容。只保存你需要的内容。如果你需要保留对另一个片段的引用，不要试图保存或放置该片段，而只需保存该片段的标识符，如它的标签或
    ID。当该片段运行 `onViewStateRestored()` 时，你可以重新建立该片段所依赖的其他片段的连接。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


