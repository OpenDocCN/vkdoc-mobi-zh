  \ 11–16.** *绑定列。*\n\n你应该完成了。单击 **Run**，你应该能够看到新的应用程序窗口。单击 **Add**，它应在表格视图中添加一行。单击列单元格，你可以编辑\
  \ **Title** 和 **Price**。你还会注意到，当退出并重新启动应用程序时，它会记住之前存储的值。\n\n这是一个非常简略的 Mac OS X 和\
  \ iOS Core Data 入门介绍。Core Data 是一个功能非常强大的 API，需要花大量时间才能精通。\n\n\n\n## 小结\n\n本章内容到此结束。以下是涉及知识点的总结。\n\
  \n- **偏好设置**：你学会了如何使用 `NSUserDefaults` 在 iPhone 和 Mac OS X 电脑上以文件形式保存和读取偏好设置。\n\
  - **数据库**：你了解了数据库的概念，以及为何在某些情况下使用数据库比使用偏好设置文件更合适。你还学习了苹果集成到 Mac 和 iPhone 中的数据库引擎，以及该引擎的优势与局限性。\n\
  - **Core Data**：苹果提供了一个用于与 SQLite 数据库交互的框架。该框架让接口的使用变得简单得多。\n- **书店应用**：你创建了一个简单的\
  \ Core Data 应用。你使用 Xcode 为书店应用创建了数据模型，学习了如何在两个不同实体之间建立关系，并使用 Xcode 为 Core Data 模型创建了简单的界面。\n\
  \n### 练习\n\n- 为 `Book` 实体添加更多字段。尝试添加出版社、页数和 ISBN 编号。\n- 修改图书标签页的布局。重新排序列的顺序。\n-\
  \ 为作者的名和姓添加默认值。\n\n## 第 12 章\n\n## 协议与委托\n\n恭喜！你正在掌握成为 iOS 开发者所需的技能！然而，要想成功，iOS\
  \ 开发者还需要理解两个额外的主题：协议与委托。新手开发者常常会因这两个概念而感到不知所措，因此我们觉得最好先介绍 Objective-C 语言的基础知识。\n\
  \n## 多重继承\n\n我们在第 1 章中讨论过对象继承。简而言之，对象继承意味着子类可以继承父类的所有特征。请参见图 12-1。\n\n![images](img/1201.jpg)\n\
  \n**图 12-1.** *典型的 Objective-C 继承*\n\nC++、Perl 和 Python 都拥有一个称为多重继承的特性。多重继承允许一个类从多个父类继承行为和特性。请参见图\
  \ 12-2。\n\n然而，多重继承可能会引发歧义，因此会带来问题。由于这个原因，Objective-C 没有实现多重继承。相反，它实现了所谓的协议。\n\n\
  ![images](img/1202.jpg)\n\n**图 12-2.** *多重继承*\n\n## 理解协议\n\n苹果将协议简单地定义为：一个独立于类定义的方法声明列表。协议与类接口非常相似，不同之处在于它并不定义特定的类。你必须实现协议中列出的方法。例如，报告中鼠标用户操作的方法可以放入一个协议中。请参考以下示例：\n\
  \n```\n- (void)mouseDown:(NSEvent *)theEvent;\n- (void)mouseDragged:(NSEvent *)theEvent;\n\
  - (void)mouseUp:(NSEvent *)theEvent;\n```\n\n任何希望响应鼠标事件的类都可以采用该协议并实现其方法。协议非常易于使用，因为它们与类层次结构无关，任何类都可以实现它们。\n\
  \n在本书中，我们一直以书店为例。之前，我们讨论过书店可能销售不同类型的媒体，并讨论了继承在这种情况下如何发挥作用。为了解释协议，假设我们的书店也出售口香糖和糖果。我们希望为这些商品创建一个类，名为\
  \ `EdibleItem`。让口香糖继承与书或杂志相同的方法是没有意义的，但所有商品都需要被销售，且库存需要被追踪。在这种情况下，将方法添加到所有商品都可以共享的协议中是有道理的。\n\
  \n**注意：** 协议与继承截然不同。当一个类继承自另一个类时，它不仅接收方法声明，还接收方法本身。而使用协议时，只引入了声明，方法本身需要自行编写。\n\n\
  ### 协议语法\n\n协议的接口示例如下：\n\n```\n@protocol InventoryItem\n\n- (void)removeFromInventory;\n\
  - (void)addToInventory;\n\n@end\n```\n\n该协议示例的实现文件如下：\n\n```\n@interface MyClass\
  \ : SomeSuperClass < InventoryItem>\n@end\n```\n\n任何想要实现 `InventoryItem` 协议的对象，都需在对象定义后包含\
  \ `< InventoryItem>`。\n\n例如，我们可以为销售的可食用商品创建接口：\n\n```\n@interface Edible : NSObject\
  \ <InventoryItem>\n{\n}\n```\n\n对于 iOS 开发者来说，为对象设置多个协议并不罕见。这在需要时能赋予对象真正的能力。附加的协议放在第一个协议之后，用逗号分隔。\n\
  \n```\n@interface EditbleItem : UITableViewController  <InventoryItem,SaleItem >\n\
  {\n}\n```\n\n这个示例展示了委托的强大之处。`EditableItem` 现在拥有了来自 `InventoryItem` 和 `SaleItem`\
  \ 的所有方法声明。\n\n为对象委托定义的方法称为**委托方法**。\n\n## 理解委托\n\n委托是辅助对象。它们让我们能够控制自己对象的行为。协议中列出的方法成为\
  \ `MyClass` 的辅助方法。\n\n**注意：** 理解委托的关键在于要知道委托是一个独立的对象，它被用来增强宿主对象的行为。因此，你可以创建一个应用委托对象，它可以影响\
  \ iOS 的 `NSApplication` 对象的行为，而无需子类化或修改 `NSApplication` 类。你创建的这个对象就是委托对象，`NSApplication`\
  \ 将向你的对象发送的消息称为**委托方法**。这些方法通常定义在你的类必须采用的协议（`<UIApplicationDelegate>`）中。为了生效，需要将委托对象设置为宿主的\
  \ `delegate` 属性。\n\n现在我们可以在对象中使用这些方法了。例如，在我们的 `MyClass` 接口定义中包含 `<CLLocationManagerDelegate>`\
  \ 协议，使得我们的对象能够被 iPhone 的 GPS 通知其新位置。下面的示例展示了我们将包含并在对象实现文件中定义的方法：\n\n```\n- (void)locationManager:(CLLocationManager\
  \ *)manager didUpdateToLocation:(CLLocation *)newLocation fromLocation:(CLLocation\
  \ *)oldLocation\n{\n    ……\n}\n```\n\n当我们的 GPS 位置发生变化时，`locationManager` 委托方法会自动被调用，从而使你的代码能够处理新旧坐标。代码清单\
  \ 12-1 展示了如何在我们自己的类 `MyCoreLocationController` 中实现来自 `CLLocationManagerDelegate`\
  \ 的 `didUpdateToLocation` 和 `didFailWithError` 委托方法。\n\n**代码清单 12-1.** *Core Location\
  \ 委托示例*\n\n```\n@implementation MyCoreLocationController //我们自己的控制器\n@synthesize\
  \ locationManager;\n\n- (id) init\n{\n    self = [super init];\n    if (self !=\
  \ nil) {\n        self.locationManager = [[CLLocationManager alloc] init];\n   \
  \     self.locationManager.delegate = self; // 将位置更新发送给我自己\n    }\n    return self;\n\
  }\n\n- (void)locationManager:(CLLocationManager *)manager\n    didUpdateToLocation:(CLLocation\
  \ *)newLocation\n           fromLocation:(CLLocation *)oldLocation\n{\n    NSLog(@\"\
  位置: %@\", [newLocation description]);\n}\n\n- (void)locationManager:(CLLocationManager\
  \ *)manager\n           didFailWithError:(NSError *)error\n{\n        NSLog(@\"\
  错误: %@\", [error description]); //输出错误描述\n}\n\n- (void)dealloc {\n    [self.locationManager\
  \ release];\n    [super dealloc];\n}\n@end\n```\n\n\n\n## 下一步行动\n\n你现在已经具备了扎实的 Objective-C\
  \ 基础。在学习了最后两章——“内存、地址与指针”以及“使用 Xcode 调试程序”之后，你应该能够深入实践，成为一名出色的 iOS 开发者。我们向正在成长为\
  \ iOS 开发者的学员推荐两本优秀著作：Mark Dalrymple 和 Scott Knaster 合著的 *在 Mac 上学习 Objective-C*，以及\
  \ Dave Mark 和 Jeff LaMarche 合著的 *iOS 5 开发入门*，两书均由 Apress 出版。\n\n你将做好充分准备来阅读这些书籍，并开始编写自己的\
  \ iOS 应用。不要放松——请继续前进！立即开始阅读这些书籍并着手编写你的应用程序。你越早开始运用所学的知识，进步就会越快。无论做什么，都请不要停步！\n\n\
  ### 本章小结\n\n本章我们介绍了为什么 Objective-C 不使用多重继承，以及协议和委托的工作原理。\n\n在你的 iOS 学习之旅中，还有很多知识需要了解和掌握。请继续努力，并帮助他人一起前行。\n\
  \n你应该熟悉以下术语：\n\n- 多重继承\n- 协议\n- 委托\n\n"
