  \n### 总结\n\n做得好！Interface Builder 在创建用户界面时为您节省了大量时间。您拥有强大的一组对象可在应用程序中使用，并且只需编写最少的代码。Interface\
  \ Builder 处理了许多您通常需要自己处理的细节。\n\n您应该熟悉以下术语：\n\n- XIB 文件\n- 模型-视图-控制器 (MVC)\n- 架构模式\n\
  - 人机界面指南 (HIG)\n- Outlet\n- Action\n\n### 练习\n\n- 扩展随机数生成器应用，使其在应用启动时在标签中显示日期和时间。\n\
  - 调整“生成器已设定种子”的日期和时间消息，使其在标签中完美显示。\n- 在显示日期和时间标签后，添加一个按钮以使用新时间更新日期和时间标签。\n\n## 第\
  \ 11 章\n\n\n\n## 存储信息\n\n作为开发者，您会遇到许多需要存储数据的不同场景。用户期望您的应用（app）能在每次启动时记住偏好设置和其他信息。在前几章中，我们讨论了“书店”应用。对于这个应用，用户会希望它能够记住书店中的所有书籍，并将数据库位置设为默认。您的应用需要一种方式来存储、检索这些信息，并可能需要对数据进行搜索和排序。处理数据有时可能会有些棘手。幸运的是，苹果公司提供了相应的方法和框架来简化这一过程。\n\
  \n在本章中，我们将讨论两种需要存储数据的不同格式。首先从保存 Mac 和 iPhone 的偏好设置开始，然后讨论如何在应用中使用 `SQLite` 数据库来存储和检索数据。\n\
  \n## 存储考量\n\nMac 和 iPhone 在存储方面存在一些主要差异，这些差异会影响您处理数据的方式。我们先从 Mac 谈起，看看您需要如何为其进行开发。\n\
  \n在 Mac 上，默认情况下，应用存储在“应用程序”文件夹中。每个用户都有自己的个人文件夹，用于存储与该用户相关的偏好设置和信息。并非所有用户都有权限写入“应用程序”文件夹或应用包本身。\n\
  \n在 iPhone 和 iPad 上，开发者无需处理不同用户的问题。每位使用 iPhone 的用户都具有相同的权限和相同的文件夹。不过，在 iPhone 上还有一些其他因素需要考虑。iPhone\
  \ 上的每个应用都处于各自的“沙盒”之中。这意味着一个应用写入的文件只能被该应用自身查看和使用。这为 iPhone 创造了一个更安全的环境，但也改变了我们处理数据存储的方式。\n\
  \n## 数据库\n\n我们已经讨论了如何存储少量信息并在以后检索它们。但如果您有更多信息需要存储呢？如果您需要在这些信息中进行搜索，或者将它们按某种顺序排列呢？这些情况就需要用到数据库。\n\
  \n让我们先讨论一下什么是数据库。数据库是一种工具，用于以易于搜索或检索的方式存储大量信息。使用数据库时，通常一次只检索一小部分数据，而不是整个文件。您日常生活中使用的许多应用都基于某种数据库。您的网上银行应用从数据库中检索账户活动。超市使用数据库检索不同商品的价格。一个简单的数据库示例就是电子表格。您的电子表格中可能有许多列和许多行。电子表格中的列代表了您想要存储的不同信息片段。在数据库中，这些被称为属性。电子表格中的行则被视为数据库中的不同记录。\n\
  \n## 在数据库中存储信息\n\n数据库对开发者来说通常是一个令人望而生畏的主题；大多数开发者会将数据库与企业级数据库服务器（如 Microsoft SQL\
  \ Server 或 Oracle）联系起来。这些应用需要花费时间进行设置，并且需要持续维护。对大多数开发者来说，像 Oracle 这样的数据库系统可能过于庞大难应付。幸运的是，苹果公司在\
  \ Mac、iPhone 和 iPad 中内置了一个小巧紧凑的数据库引擎，名为 `SQLite`。这使您无需承担高昂开销就能获得复杂数据库服务器的许多功能。\n\
  \n`SQLite` 将为您的应用在存储信息方面提供极大的灵活性。它将整个数据库存储在单个文件中。它速度快、可靠性高，且易于在您的应用中实现。`SQLite`\
  \ 数据库最棒的一点是，无需安装任何软件；苹果公司已经为您考虑周全了。\n\n然而，作为开发者，您应该了解 `SQLite` 确实存在一些局限性：\n\n- \
  \  `SQLite` 被设计为单用户数据库。在多人同时访问同一个数据库的环境中，不应使用 `SQLite`。这可能导致数据丢失或损坏。\n-   在商业领域，数据库可能会变得非常大。数据库管理员处理高达\
  \ 500GB 的数据库并不罕见，有时数据库甚至可能远大于此。`SQLite` 应该能够毫无问题地处理较小的数据库，但如果您的数据库开始变得过大，您将会看到性能问题。\n\
  -   `SQLite` 缺少企业级数据库解决方案中的一些备份和数据恢复功能。\n\n基于本章的目的，我们将重点使用 `SQLite` 作为我们的数据库引擎。如果您正在开发的应用存在上述任何局限性，您可能需要考虑采用企业级数据库解决方案，但这已超出本书的讨论范围。\n\
  \n**注:** `SQLite` 的名称源于结构化查询语言，或 `SQL`。`SQL` 是用于向数据库输入、搜索和检索数据的语言。\n\n苹果公司一直致力于解决数据库开发中的诸多挑战。作为开发者，您无需熟悉\
  \ `SQL`，因为苹果公司已经为您处理了直接的数据库交互。苹果公司创建了一个名为 `Core Data` 的框架，使得与数据库的交互变得容易得多。`Core\
  \ Data` 是苹果公司从 NeXT 公司的一个名为 `Enterprise Object Framework` 的产品改编而来的，它将为您处理所有数据库交互。使用\
  \ `Core Data` 比直接与 `SQLite` 数据库交互要容易得多。通过 `SQL` 直接访问数据库超出了本书的讨论范围。\n\n## Core Data\
  \ 入门\n\n让我们从创建一个新的 `Core Data` 项目开始。\n\n1.  打开 Xcode，选择 **File** ![images](img/U001.jpg)\
  \ **New Project**。要创建一个 Mac OS X `Core Data` 项目，请从左侧菜单中选择 Application。它位于 Mac OS\
  \ X 标题下方。请参见图 11-1。\n\n    ![images](img/1101.jpg)\n\n    **图 11-1.** *创建一个新项目。*\n\
  \n2.  完成后点击 Next 按钮。下一个屏幕将允许您决定项目的保存位置和想要使用的名称。基于本章的目的，我们将使用名称 `BookStoreCoreData`。\n\
  3.  靠近底部，您会看到三个复选框。第一个复选框标记为 **Use Core Data**。请确保勾选该框，然后点击 **Next**。\n\n    ![images](img/1102.jpg)\n\
  \n    **图 11-2.** *使用 Core Data。*\n\n完成后，您的新项目将打开。它看起来与标准应用类似，只是现在您会看到一个 `BookStoreCoreData.xcdatamodel`\
  \ 文件。这个文件被称为数据模型，它将包含关于您将要在 `Core Data` 中存储的数据的信息。\n\n\n\n## 模型\n\n如果你点击文件夹旁边的三角形，会看到一个名为\
  \ `BookStoreCoreData.xcdatamodel` 的文件。该文件将包含你要存储在数据库中的数据信息。点击这个模型文件，它就会打开。你将看到一个类似于图\
  \ 11-3 所示的窗口。\n\n![images](img/1103.jpg)\n\n**图 11-3.** *空白的模型。*\n\n窗口分为四个部分。左侧是你的实体。通俗来说，这些就是你想要存储在数据库中的对象或项目。\n\
  \n右上方的窗口包含属性。属性是关于实体的具体信息。例如，一本书是一个实体，而书的标题就是该实体的一个属性。\n\n**注意：** 在数据库术语中，实体是你的数据表，而实体的属性被称为列。由这些实体创建的对象则被称为行。\n\
  \n右中窗口将显示一个实体的所有关系。关系用于连接一个实体与另一个实体。例如，我们将创建一个 `Book` 实体和一个 `Author` 实体。然后我们会将它们关联起来，使每本书都可以有一个作者。右下方部分涉及获取属性。获取属性超出了本书的讨论范围，但它们允许你为数据创建过滤器。\n\
  \n让我们创建一个实体。\n\n1. 点击窗口左下角的加号，或者从菜单中选择 **Editor** ![images](img/U001.jpg) **Add\
  \ Entity**。参见图 11-4。\n\n![images](img/1104.jpg)\n\n**图 11-4.** *添加一个新实体。*\n\n2.\
  \ 在左侧，你现在可以给这个实体命名。我们将这个实体命名为 `Book`。\n\n**注意：** 通常认为将实体名称首字母大写是一种良好的实践。\n\n3. 现在，让我们添加一些属性。属性可以看作是书籍的详细信息，因此我们将存储书名、作者、价格和出版年份。显然，在你自己的应用程序中，你可能想存储更多信息，比如出版社、页数和体裁，但我们希望从简单的开始。点击窗口右下角的加号，或者选择\
  \ **Editor** ![images](img/U001.jpg) **Add Attribute**，如图 11-5 所示。如果你看不到添加属性的选项，请确保你在左侧已选中了\
  \ `Book` 实体。\n\n![images](img/1105.jpg)\n\n**图 11-5.** *添加一个新属性。*\n\n4. 对于你的属性，你只有两个选项：名称和数据类型。让我们把这个属性命名为\
  \ `title`。与实体不同，属性名称应该使用小写。\n5. 现在，我们需要选择一个数据类型。选择正确的数据类型非常重要。它会影响数据在数据库中的存储和检索方式。列表中共有\
  \ 12 个选项，可能会令人望而生畏。我们将讨论最常见的选项，随着你对 Core Data 越来越熟悉，你可以尝试其他选项。最常见的选项是 `String`、`Integer\
  \ 32`、`Float` 和 `Date`。对于书名，选择 `String`。\n\n> **String**：这是用于存储文本的属性类型。它应该用于存储任何非数字或日期的信息。在此示例中，书名和作者将使用字符串。\n\
  > \n> **Integer 32**：实际上，该属性有三种不同的整数值可选。每种整数类型的区别仅在于其可能的最小值和最大值。`Integer 32` 应该可以满足你存储整数时的大部分需求。整数是不带小数的数字。如果你尝试在小数属性中保存整数，小数部分将被截断。在此示例中，出版年份将是一个整数。\n\
  > \n> **Float**：Float 是一种可以存储带小数的数字的属性类型。Float 类似于 double 属性，但它们在最小值和最大值上有所不同。Float\
  \ 应该能够处理任何数值。在此示例中，我们将使用 Float 来存储书的价格。\n> \n> **Date**：日期属性顾名思义。它允许你存储日期和时间，然后基于这些值执行搜索和查找。在此示例中，我们不会使用此类型。\n\
  \n6. 让我们为这本书创建其余属性。现在，添加 `price`。它应该是 Float 类型。添加书籍的出版年份。对于由两个单词组成的属性，标准做法是第一个单词小写，第二个单词首字母大写。例如，书籍出版年份属性的理想名称可以是\
  \ `yearPublished`。选择 `integer 32` 作为属性类型。添加完所有属性后，你的屏幕应该看起来像图 11-6。\n\n**注意：** 属性名称不能包含空格。\n\
  \n![images](img/1106.jpg)\n\n**图 11-6.** *完成后的图书实体。*\n\n**注意：** 如果你习惯于使用数据库，你会注意到我们没有添加主键。主键是一个字段（通常是一个数字），用于唯一标识数据库中的每条记录。在\
  \ Core Data 数据库中，无需创建主键。框架会为你管理这一切。\n\n现在我们已经完成了 `Book` 实体，让我们添加一个 `Author` 实体。\n\
  \n1. 添加一个新实体，并将其命名为 `Author`。\n2. 为该实体添加 `lastName` 和 `firstName`，两者都被视为字符串。\n\n\
  完成后，你的关系窗口中应该有两个实体。现在我们需要添加关系。\n\n1. 点击 `Book` 实体，然后点击并按住屏幕右下角的加号。选择 Add Relationship，如图\
  \ 11-7 所示。\n\n![images](img/1107.jpg)\n\n**图 11-7.** *添加一个新关系。*\n\n2. 现在，你将有机会命名你的关系。我们通常给关系起一个与其派生来源的实体相同的名称。输入\
  \ `author` 作为名称，或者从下拉菜单中选择 `Author`。\n3. 现在，我们已经创建了关系的一半。要创建另一半，请点击 `Author` 实体。现在，点击屏幕底部的加号，并选择\
  \ Add Relationship。我们将使用我们正在连接的实体名称作为此关系的名称，因此我们将其命名为 `books`。我们在实体名称后加了一个“s”，因为一个作者可以有多本书。在\
  \ Destination 下，选择 `Book`，在 Inverse 下，选择你在上一步中创建的关系。你的模型现在应该看起来像图 11-8。\n\n**注意：**\
  \ 有时在 Xcode 中处理模型时，需要按 Tab 键来更新实体、属性和关系的名称。这个小怪癖可以追溯到 WebObjects 工具时代。\n\n![images](img/1108.jpg)\n\
  \n**图 11-8.** *最终的关系。*\n\n\n\n现在我们需要让代码了解我们的新实体。为此，选中`Book`实体和`Author`实体，然后选择 **Editor**\
  \ ![images](img/U001.jpg) **Create NSManagedObject Subclass**。屏幕应如图 11–9 所示。\n\n\
  ![images](img/1109.jpg)\n\n**图 11–9.** *将托管对象添加到项目中。*\n\n选择存储位置并将其添加到项目中。你无需更改此页面上的任何默认设置。然后点击\
  \ **Create**。你会注意到项目已添加了四个文件。`Book.h`和`Author.h`包含书籍的头部信息，而`Book.m`和`Author.m`包含实际实现。这些文件相当简单，因为\
  \ Core Data 将负责大部分工作。你还应该注意到，如果返回模型并点击`Book`，它会有一个新类。它将不再是`NSManagedObject`，而是`Book`类。\n\
  \n让我们看看`Author.h`的部分内容：\n\n```\n#import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\
  \n@class Book;\n\n@interface Author : NSManagedObject {\n@private\n}\n@property\
  \ (nonatomic, retain) NSString * lastName;\n@property (nonatomic, retain) NSString\
  \ * firstName;\n@property (nonatomic, retain) Book * book;\n\n@end\n```\n\n你会看到文件开头包含了\
  \ Core Data 框架。这使得 Core Data 能够管理你的信息。往下看，你会看到你创建的三个属性。\n\n## 托管对象上下文\n\n我们创建了一个名为`Book`的托管对象。Xcode\
  \ 的优点是它会生成必要的代码来管理这些新的数据对象。在 Core Data 中，每个托管对象都应存在于托管对象上下文中。上下文负责跟踪对象的更改、执行撤销操作以及将数据写入数据库。在此示例中，我们无需编写代码来创建或管理对象上下文，但当你探索在自己的项目中使用\
  \ Core Data 时，你需要意识到它的存在。目前，生成的类提供的基本功能已能正常工作。\n\n## 设置界面\n\n以下步骤将帮助你设置界面：\n\n1.\
