  16\n17  @synthesize detailViewController = _detailViewController;\n18  @synthesize\
  \ myBookStore;\n19\n20  - (id)initWithNibName:(NSString *)nibNameOrNil bundle:(NSBundle\
  \ *)nibBundleOrNil\n21  {\n22      self = [super initWithNibName:nibNameOrNil bundle:nibBundleOrNil];\n\
  23      if (self) {\n24          self.title = NSLocalizedString(@\"Master\", @\"\
  Master\");\n25          self.myBookStore = [[Bookstore alloc] init];  \n26      }                                      \n\
  27      return self;\n28  }\n```\n\n好了，现在 `Bookstore` 对象已经初始化，我们需要告诉 `MasterViewController`\
  \ 如何显示书籍列表——不显示详情，只显示书名。为此，我们需要修改几个方法。幸运的是，Xcode 提供了一个不错的模板，因此我们的修改量很小。\n\n我们的 `MasterViewController`\
  \ 是 `UITableViewController` 的子类。该类控制数据行在屏幕上的显示。在我们的案例中，这些行显示的是书名（对于这个简单程序来说只有两本，但终究是一个列表）。\n\
  \n控制 `UITableViewController` 数据内容及显示方式的主要方法有三个。\n\n*   第一个是 `numberOfSectionsInTableView:`。由于我们的应用程序只有一个列表（即一个分区），该方法返回\
  \ 1。\n*   第二个是 `tableView:numberOfRowsInSection:`。在我们的程序中，返回书店数组中的书籍数量。由于这是唯一的分区，代码非常简单。\n\
  *   第三个方法是 `tableView:cellForRowAtIndexPath:`。该方法针对屏幕上要显示的每一行被调用，且每次只调用一行。\n\n代码清单\
  \ 8–20 详细列出了我们需要进行的修改，以便在视图上显示书籍列表。修改从源文件的第 83 行开始。\n\n**代码清单 8-20.** *设置视图以显示书籍。*\n\
  \n```\n83  - (NSInteger)tableView:(UITableView *)tableView\n84  numberOfRowsInSection:(NSInteger)section\n\
  85  {\n86      return self.myBookStore.count;\n87  }\n88  \n89  // 自定义表格视图单元格的外观。\n\
  90  - (UITableViewCell *)tableView:(UITableView *)tableView  \n91           cellForRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n92  {\n93      static NSString *CellIdentifier = @\"Cell\";\n94\n\
  95      UITableViewCell *cell =\n96         [tableView dequeueReusableCellWithIdentifier:CellIdentifier];\n\
  97      if (cell == nil) {\n98          cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault\n\
  99                                        reuseIdentifier:CellIdentifier];\n100          cell.accessoryType\
  \ = UITableViewCellAccessoryDisclosureIndicator;\n101      }\n102\n103      // 配置单元格。\n\
  104      cell.textLabel.text = [self.myBookStore bookAtIndex:indexPath.row].title;\n\
  105      return cell;\n106  }\n```\n\n在这段代码中，我们只需要修改两行。其他部分保持不变即可。这就是使用 Xcode 模板的优势之一。第\
  \ 86 行原本仅返回 1；我们需要将其改为返回 `Bookstore` 类中项目的数量。\n\n第 104 行看起来稍显复杂。基本上，`UITableView`\
  \ 的每一行都被称为一个单元格（具体来说是 `UITableViewCell`）。第 104 行将单元格的文本设置为某本书的标题。让我们更具体地看一下这段代码：\n\
  \n```\n[self.myBookStore bookAtIndex:indexPath.row].title;\n```\n\n首先，`self.myBookStore`\
  \ 是我们的 `Bookstore` 对象，这一点很明确。我们调用它的方法 `bookAtIndex:`。参数 `indexPath.row` 指定了我们要获取的行——`indexPath.row`\
  \ 总是比总数量（第 86 行返回的值）小 1。因此，调用 `[self.myBookStore bookAtIndex:indexPath.row]` 会返回一个\
  \ `Book` 对象。最后一部分 `.title` 用于访问返回的 `Book` 对象的标题属性。以下代码等同于我们刚才在一行中完成的操作：\n\n```\n\
  1  Book *book;\n2  book = [self.myBookStore bookAtIndex:indexPath.row];\n3  cell.textLabel.text\
  \ = book.title;\n```\n\n现在，你可以构建并运行应用程序，应该能看到我们在数据模型中创建的两本书，如图 8–15 所示。\n\n但任务尚未完成。我们需要让应用程序在点击某本书时显示其详情。为此，我们需要对\
  \ `MasterViewController` 进行最后一次修改。\n\n每当触摸屏幕上的某一行时，就会调用 `tableView:didSelectRowAtIndexPath:`\
  \ 方法。该方法是模板的一部分，但目前并未处理我们的书籍。代码清单 8-21 显示了将详情视图与书籍数据关联起来所需进行的微小修改。\n\n![images](img/0815.jpg)\n\
  \n**图 8–15.** *首次运行应用程序。*\n\n**代码清单 8-21.** *通过触摸选中书籍。*\n\n\n\n### 代码行示例\n\n```\n\
  146  - (void)tableView:(UITableView *)tableView didSelectRowAtIndexPath:(NSIndexPath\
  \ *)indexPath\n147  {\n148      Book *selectedBook = [self.myBookStore bookAtIndex:indexPath.row];\n\
