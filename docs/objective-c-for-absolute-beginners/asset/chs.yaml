  \ 11–10。\n\n![images](img/1110.jpg)\n\n**图 11–10.** *创建界面。*\n\n2.  应该有一个空白窗口。为了给窗口添加一些功能，我们需要从对象库中添加一些对象。要查看对象库，请选择\
