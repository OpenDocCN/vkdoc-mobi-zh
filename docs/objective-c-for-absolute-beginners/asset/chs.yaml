  \ `Book` 对象。\n\n    ![images](img/0807.jpg)\n\n    **图 8–7.** *查看我们的新类。*\n\n9. \
  \ 点击 `Book.h` 文件，开始定义我们的新类！\n\n\n好的，作为一名高级文档工程师和翻译员，我将遵循您的所有注意事项和示例，将给定的英文文本翻译成中文。\n\
  \n\n## 引入实例变量\n\n我们的对象简单地命名为 `Book`，它是 `NSObject` 的子类。确实，我们有了一个对象，但目前它还不*存储*任何东西。为了使这个类有用，它需要能够保存一些信息，这通过实例变量来实现。当一个对象被使用时，它必须被实例化。一旦对象被实例化，它就可以访问其实例变量。只要对象保持在作用域内，这些变量就可以供对象使用。正如我们从第\
  \ 7 章了解的，作用域定义了对象存在的上下文。在某些情况下，对象的作用域可能是整个程序的生命周期。在其他情况下，作用域可能只是一个函数或方法。这完全取决于对象在何处声明以及如何使用它。稍后将更详细地讨论作用域。现在，让我们给我们的\
  \ `Book` 类添加一些实例变量，使其更有用。\n\n**代码清单 8–11.** *为 Book.h 文件添加实例变量。*\n\n```\n 1  //\n\
   2  //  Book.h\n 3  //  MyBookstore\n 4  //\n 5  //  Created by Mitch Fisher on\
  \ 8/28/11.\n 6  //  Copyright 2011 www.committed-code.com. All rights reserved.\n\
   7  //\n 8  \n 9  #import <Foundation/Foundation.h>\n10  \n11  @interface Book :\
  \ NSObject {\n12          NSString *title;\n13          NSString *author;\n14          NSString\
  \ *description;\n15  }\n16  \n17  @end\n```\n\n这是和之前相同的 `Book` 对象，但现在，大括号内多了三个新的实例变量，即第\
  \ 12–14 行。它们都是 `NSString` 对象，这意味着它们可以为我们的 `Book` 对象保存文本信息。因此，`Book` 对象现在有了一个存储书名、作者和描述信息的地方。\n\
  \n### 访问实例变量\n\n现在我们有了实例变量，该如何使用它们呢？如何访问它们？正如你在前几章学到的，Objective-C 对象响应消息。不幸的是，仅仅声明一个实例变量并不能保证我们可以访问它。有两种方法可以访问这些变量。\n\
  \n*   一种方法，当然是在我们的 `Book` 对象内部。\n*   第二种方法是从对象外部——即程序中使用 `Book` 对象的其他部分。\n\n如果我们在\
  \ `Book` 对象内部编写一个方法的代码，访问实例变量就相当简单。例如，你可以直接编写以下代码：\n\n`title = @\"Test Title\";`\n\
  \n上面这行代码是在 `Book` 类内部编写的。在对象外部，`title` 实例变量是完全不可见的。当然，外部的对象也需要能够访问这些实例变量。为此，你需要创建两种类型的方法：getter\
  \ 和 setter。\n\n*   **getter** 是一个返回对象中某个值的方法，通常是像 `Book` 对象中的 `author` 变量这样的实例变量。\n\
  *   **setter** 是一个更新或设置该实例变量的方法。\n\n让我们看看在 2007 年 Objective-C 2.0 引入之前常见的传统 getter\
  \ 和 setter 方法。\n\n**提示：** 有时实例变量被称为 ivars。`Ivar` 只是 `instance variable` 的简称。\n\n\
  ### 使用 Getter 和 Setter 方法\n\n以下是 `Book` 对象的头文件（`.h`），它包含了 `Book` 的接口定义。\n\n**代码清单\
  \ 8–12.** *为 Book 对象定义 getter 和 setter。*\n\n```\n 1  #import <Foundation/Foundation.h>\n\
   2  \n 3  @interface Book : NSObject {\n 4          NSString *title;\n 5          NSString\
  \ *author;\n 6          NSString *description;\n 7  }\n 8  \n 9  - (NSString *)title;\n\
  10  - (void)setTitle:(NSString *)newString;\n11  \n12  @end\n```\n\n在第 9 行和第 10\
  \ 行声明的两个方法分别是 getter 和 setter 方法。按照惯例，getter 方法的名称与实例变量相同。在我们的例子中，我们正在获取图书对象的书名，所以我们的\
  \ getter 方法就是 `title`。它被定义为向调用者返回一个 `NSString` 对象。\n\nsetter 方法的命名惯例是 `set`*`实例变量名`*。因此，在我们的例子中，setter\
  \ 方法被命名为 `setTitle`。请注意，实例变量名的第一个字符使用了大写字母；这也是标准惯例的一部分。\n\n**注意：** 一种称为驼峰命名法（或 `CamelCase`）的命名惯例使用大写字母来区分方法、变量或类名称中的不同单词。这种命名方式形似骆驼，因为大写字母倾向于形成驼峰。它使名称更易读。例如，`stringWithContentsOfURL`\
  \ 远比 `stringwithcontentsofurl` 易读。\n\n现在，“惯例”这个词已经被多次提及。Objective-C 并不要求方法有特定的名称。然而，由于大多数应用程序都遵循我们讨论的指导原则，这种惯例就成了*事实上的*标准。在稍后讨论属性的主题时，了解这一点变得非常重要。不过现在，我们将手动编写一个\
  \ getter 和一个 setter 方法，以便更好地理解它们。\n\n首先，getter——这是最容易实现的方法：\n\n```\n- (NSString\
  \ *)title\n{\n    return title;\n}\n```\n\n在上面的例子中，`title` 方法简单地返回了名为 `title` 的局部实例变量。要访问这个方法，可以使用\
  \ `[object title]` 语法。\n\n看起来，实例变量和方法名可能会混淆。但由于访问实例变量与访问方法名的方式完全不同，Objective-C 运行环境在处理同名的实例变量和方法名时没有问题。\n\
  \n现在，这是 setter：\n\n```\n- (void)setTitle:(NSString *)newTitle\n{\n    if ([newTitle\
  \ length] > 0) {\n        title = newTitle;\n    }\n}\n```\n\n这个例子比我们的 getter 方法稍微复杂一些，尽管它本可以不这么复杂。在我们的\
  \ setter 示例中，在赋值字符串之前，会检查 `newTitle` 的长度是否大于 `0`（`NSString` 类的 `length` 方法返回字符串中的字符数）。显然，我们的\
  \ setter 代码不希望当前的书名叫什么。\n\n使用上面的 getter/setter 方法，它们将像以下代码片段所示那样被使用：\n\n```\n 1  Book\
  \ *myBook = [Book alloc] init];\n 2  \n 3  [myBook setTitle:@”My Great Book”];  //\
  \ 调用 setter\n 4  \n 5  NSString *title = [myBook title];  // 调用 getter 并将其放入 ‘title’\
  \ NSString 对象中。\n```\n\nsetter 方法的好处在于，对象可以在接受值之前对参数执行一些验证逻辑。如果对象允许直接访问实例变量，那么这种验证要么必须遍布各处，要么根本不存在验证，从而导致对象的书名可能被设置为无效值（例如空白书名）。\n\
  \n现在，并不需要*总是*为每个实例变量创建 getter 和/或 setter。一个很好的例子是表示当前日期的对象。不需要设置它，只需检索它，因此只需要一个\
  \ getter 方法。\n\n对象和变量的需求将决定 getter 和 setter 方法如何构建。如果一个 getter 获取值，一个 setter 设置值，那么仅仅编写对象中的所有\
  \ getter 和 setter 就需要大量的编码工作，尤其是在有许多实例变量的情况下。幸运的是，Objective-C 2.0 引入了一种方法，可以在程序员付出最小努力的情况下减轻这种负担。Objective-C\
  \ 2.0 中的这些特性被称为属性。\n\n**注意：** Objective-C 2.0 于 2006 年随 Xcode 3.4 引入，并包含在 Xcode\
  \ 4 及更高版本中。\n\n\n\n## 介绍属性\n\n当我们为 `Book` 对象创建实例变量时，我们是手动创建了用于访问这些变量的方法。既然你已经了解了如何手动操作，接下来让我们看看如何利用一种名为“属性”的特性。属性是一种简洁的方式，能让编译器自动创建用于获取和/或设置实例变量值的函数。正如你之前所学，实例变量通常无法从对象外部直接访问，因此拥有获取和设置这些变量的方法就显得至关重要。\n\
  \n以下是我们之前创建的 `Book` 对象的接口（头）文件。让我们看看如何让 Objective-C 编译器自动为我们生成 getter 和 setter 方法。\n\
  \n**代码清单 8–13.** *为 Book 对象添加属性。*\n\n```\n 1  //\n 2  //  Book.h\n 3  //  MyBookstore\n\
   4  //\n 5  //  Created by M.R. Fisher on 8/28/11.\n 6  //  Copyright (c) 2011 www.committed-code.com.\
  \ All rights reserved.\n 7  //\n 8  \n 9  #import <Foundation/Foundation.h>\n10  \n\
  11  @interface Book : NSObject {\n12  }\n13  \n14  @property(nonatomic,strong) NSString\
  \ *title;\n15  @property(nonatomic,strong) NSString *author;\n16  @property(nonatomic,strong)\
  \ NSString *description;\n17  \n18  @end\n```\n\n第 14–16 行展示了实例变量的属性声明。并非所有实例变量都需要声明属性，只有那些我们希望对外暴露的才需要。不过，在这个例子中，我们为所有实例变量都创建了属性。注意，之前放在\
  \ `{ ... }` 括号内的实际实例变量声明现在已经不见了。当在 Xcode 4 及以上版本中使用属性时，我们不再需要同时声明实例变量**和**属性。编译器已经足够智能，可以自动为你完成这项工作。\n\
  \n属性以 `@property` 指令开头。这告诉 Objective-C 编译器为我们自动生成 getter 和/或 setter 方法。具体生成 getter\
  \ 还是 setter，或者两者都生成，都包含在声明中。让我们解析一下这段代码：\n\n`@property¹ (nonatomic,strong)² NSString*\
  \ title³;`\n\n1.  这是属性指令。\n2.  小括号及其内部逗号分隔的关键字有时是可选的。在我们的具体例子中，我们指定了 `nonatomic`\
  \ 和 `strong`。`nonatomic` 关键字告诉编译器不要生成用于多线程的特殊代码——我们没有使用线程，所以使用 `nonatomic` 没问题。第二个关键字\
  \ `strong` 用于指示这是一个强类型变量——在第 13 章讨论内存管理时会进一步说明。这里还可以包含许多其他选项；例如 `readonly`，它告诉编译器只创建\
  \ getter，不创建 setter，从而防止实例变量在对象外部被设置。\n3.  最后，`NSString* title` 是实例变量声明。它必须包含类型，当然还有实例变量名。\n\
  \n这定义了属性的一半。你可能会问：“只有一半？还缺什么？”嗯，`@property` 的另一半是在实现文件（`.m`）中声明的。\n\n**代码清单 8–14.**\
  \ *为 Book 对象定义 getter 和 setter。*\n\n```\n 1  //\n 2  //  Book.m\n 3  //  MyBookstore\n\
   4  //\n 5  //  Created by M.R. Fisher on 8/28/11.\n 6  //  Copyright (c) 2011 www.committed-code.com.\
  \ All rights reserved.\n 7  //\n 8  \n 9  #import \"Book.h\"\n10  \n11  @implementation\
  \ Book\n12  @synthesize title, author, description;\n13  \n14  @end\n```\n\n这是 `Book`\
  \ 对象的实现文件。第 12 行很重要，因为它是完成属性定义所需的另一半。这部分比接口文件简单得多。只需要使用 `@synthesize` 关键字并提供一或多个属性名的列表即可。在一个\
  \ `@synthesize` 语句中可以指定多个属性名，也可以写多个 `@synthesize` 行。这完全取决于个人偏好。\n\n现在我们已经创建了三个不同的属性，那么如何使用这些属性呢？\n\
  \n## 使用属性\n\n一旦在接口文件和实现文件都指定了属性，使用起来就非常直接简单。首先，语法略有变化。让我们看一个传统的 setter：\n\n`[myBookObject\
  \ setTitle:newTitle]; // 传统 setter`\n\n这是一个向图书对象发送 set 消息来设置标题的例子——正如我们所说，非常直接。但是，当使用属性时，情况发生了变化：\n\
  \n`myBookObject.title = newTitle; // setter 示例`\n\n有一些非常重要的点需要说明。首先，对象访问不再使用方括号（`[\
  \ ... ]`）。其次，我们使用名为 `title` 的属性，而不是 `setTitle` 方法。在内部，仍然存在一个 `setTitle` 方法，只是它被隐藏了。为什么这一点很重要？嗯，如果我们自己编写了一个显式的\
  \ `setTitle` 方法，那么我们的新方法将被调用，而不是编译器创建的方法。这可能是我们想要的行为，也可能不是。\n\n对于 getter，情况非常相似：\n\
  \n`NSString* title = myBookObject.title;  // getter 示例`\n\n获取信息的属性也叫做 `title`。这里的关键在于，访问对象属性的方式决定了是调用\
  \ getter 还是 setter。如果我们试图设置变量，就会调用 setter。如果我们试图获取变量的值，就会调用 getter。\n\n最后一个很大的区别是，访问属性的语法现在在对象和方法之间使用点号（`.`）。这是必要的，因为方括号已经没有了，所以点号用于区分使用属性和向对象发送消息。\n\
  \n## 理解命名规范的重要性\n\n如前所述，getter 和 setter 的命名有一套规范。虽然这些命名指南并非强制要求，但理解规范的价值在于使用属性时会非常方便。以下是我们之前的例子：\n\
  \n```\n- (void)setTitle:(NSString *) newTitle\n{\n    if ([newTitle length] > 0)\
  \ {\n        title = newTitle;\n    }\n}\n```\n\n如果我们创建一个像 `@property title` 这样的属性，并将其与\
  \ `@synthesize` 关键字配对，编译器将生成两个方法——一个名为 `title` 作为 getter，另一个名为 `setTitle` 作为 setter。但是，如果我们提供了自己的\
  \ setter 并按照规范命名（如上述代码），编译器就不会生成自己的 setter。\n\n`        myBookObject.title = newTitle;\
  \ // 调用自定义 setter`\n\n上述代码将调用我们自己定义的自定义 setter，而不是标准的 setter。如果我们编写了自己的 getter 方法，情况也是如此。现在，让我们继续完成\
  \ Bookstore 应用程序。\n\n## 完成 MyBookstore 程序\n\n在理解了实例变量和属性之后，我们现在将着手创建实际的图书店程序。思路很简单——创建一个名为\
  \ `Bookstore` 的类，该类将存放几个 `Book` 对象。\n\n\n\n## 创建视图\n\n首先，我们来准备好视图。如果你需要复习如何在 Xcode\
  \ 中构建界面，请参考第 6 章。\n\n1.  在导航窗口中点击 `DetailViewController.xib` 文件。这将显示 Xcode 的界面构建器，如图\
