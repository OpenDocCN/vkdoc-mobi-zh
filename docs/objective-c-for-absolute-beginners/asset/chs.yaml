  \ 在线研讨会与 YouTube 视频*\n\n#### 免费书籍论坛\n\n我们为此书创建了一个在线论坛，网址为 [`http://forum.xcelme.com`](http://forum.xcelme.com)。您在学习\
  \ Objective-C 时可以在那里提问，并从作者那里获得答案。您还可以找到练习题答案以及额外的练习题来帮助学习。请参见图 3。\n\n您还可以获取练习题的答案，并发现有用的链接，帮助您成为成功的\
  \ iPhone/iPad 开发者，创建出色的应用。请参见图 4。那么，让我们开始吧！\n\n![images](img/in04.jpg)\n\n**图 4.**\
  \ *读者论坛：用于获取练习题答案以及向作者提问*\n\n## 第一章\n\n## 成为优秀的 iOS 或 Mac 程序员\n\n既然您已经准备好成为一名软件开发者，并且已经阅读了本书的引言部分，那么您需要熟悉几个关键概念。您的计算机程序会完全按照您的指令执行——不多也不少。它将遵循操作系统和编程语言定义的规则。您的程序不会在意您今天心情不好，也不会在意您要求它执行某件事多少次。通常，您认为您告诉程序要做的事情，与程序实际做的事情是两码事。\n\
  \n**成功关键：** 如果您还没有做，请花几分钟阅读本书的引言。引言会告诉您去哪里访问每章对应的免费在线研讨会、论坛和 YouTube 视频。此外，您还能更好地理解我们为何使用\
  \ Alice 编程环境，以及如何成功开发您的 iOS 和 Mac 应用。\n\n根据您的背景，处理这种非黑即白的事情可能会令人沮丧。很多时候，编程学生都哀叹：“这不是我想要它做的！”当您开始积累编程经验和信心时，您会开始像程序员一样思考。您将理解软件设计和逻辑，并体验到您的程序完全按照您的意愿执行，以及随之而来的满足感。\n\
  \n\n\n### 像开发者一样思考\n\n软件开发涉及编写计算机程序，然后让计算机执行该程序。**计算机程序**是我们希望计算机执行的一组指令。在开始编写计算机程序之前，先列出我们希望程序按顺序执行的步骤会很有帮助。这种逐步执行的过程被称为**算法**。\n\
  \n如果我们想编写一个烤面包片的计算机程序，我们首先要编写一个算法。这个算法可能如下所示：\n\n1.  从袋子里取出面包片。\n2.  将面包片放入烤面包机。\n\
  3.  按下烤面包按钮。\n4.  等待面包片弹出。\n5.  从烤面包机中取出烤好的面包片。\n\n乍一看，这个算法似乎解决了我们的问题。然而，我们的算法遗漏了许多细节，并且做了很多假设。例如：\n\
  \n1.  用户想要什么样的面包？用户想要白面包、全麦面包还是其他种类的面包？\n2.  用户希望面包烤到什么程度？浅色还是深色？\n3.  面包烤好后，用户想在面包上放什么：黄油、人造黄油、蜂蜜还是草莓酱？\n\
  4.  这个算法对所有不同文化和语言的用户都适用吗？有些文化可能对烤面包有其他的叫法，或者根本不知道烤面包是什么。\n\n现在，你可能会想，对于仅仅制作一个简单的烤面包程序来说，我们考虑得太细了。多年来，软件开发一直背负着耗时过长、成本过高、最终产品并非用户所需的声誉。之所以会有这种声誉，是因为计算机程序员常常在真正想通他们的算法之前，就开始编写程序了。\n\
  \n打造成功应用的关键要素是**设计需求**。设计需求可以非常正式和详细，也可以简单到像写在纸上的一张清单。设计需求之所以重要，是因为它们有助于开发者明晰应用在完成后应该做什么以及不应该做什么。设计需求不应在程序员的真空中完成，而应是开发者、用户和客户协作的成果。\n\
  \n**注意：** 如果本章有任何内容是值得你牢记在心的，那就是在开始软件开发之前，充分考虑设计需求和用户界面设计的重要性。这是软件开发周期中最高效（且成本最低）的时间利用方式。使用铅笔和橡皮擦比修改代码要容易且快得多，因为后者是因为你在开始编程之前没有让其他人审查设计方案。\n\
  \n另一个打造成功应用的关键要素是**用户界面 (UI)** 设计。苹果公司建议将整个开发流程中超过 50% 的时间用于 UI 设计。设计可以是使用 Dean\
  \ Kaplan 所著的 *《iPhone Application Sketch Book》* 或 *《iPad Application Sketch Book》*（Apress，2009\
  \ 年）创建的简单纸笔草图，也可以是使用 Omni Group 的 `OmniGraffle`*（*[`www.omnigroup.com`](http://www.omnigroup.com)*）*\
  \ 软件应用配合 `Ultimate iPhone Stencil` 插件*（*[`www.graffletopia.com`](http://www.graffletopia.com)*）*\
  \ 创建的屏幕布局。许多软件开发者从 UI 设计入手，在布局好所有屏幕元素并让众多用户查看纸质模型后，再根据屏幕布局写出设计需求。\n\n在你尽最大努力明确了所有设计需求、布局好了所有用户界面屏幕、并让客户或潜在客户查看了你的设计并给出了反馈之后，就可以开始编码了。编码一旦开始，设计需求和用户界面屏幕可能会发生变化，但这些变化通常很小，并且容易在开发过程中被纳入。参见\
  \ 图 1–1 和 图 1–2。\n\n图 1–1 展示了在开发之前使用 `OmniGraffle` 构建的一个移动银行应用屏幕模型。将制作屏幕模型与设计需求相结合，迫使开发者在编码开始前就充分考虑应用程序的许多可用性问题。这有助于缩短应用开发时间，带来更好的用户体验，并在\
  \ iTunes App Store 上获得更好的评价。图 1–2 展示了移动银行应用的视图在完成后的实际外观。\n\n![图片](img/0101.jpg)\n\
  \n**图 1–1.** *这是在开发开始之前，为 iPhone 移动银行应用制作的账户余额屏幕的用户界面 (UI) 模型。该 UI 设计模型是使用 `OmniGraffle`\
  \ 完成的。*\n\n![图片](img/0102.jpg)\n\n**图 1–2.** *这张截图显示了在 iTunes App Store 上架的一个已完成的\
  \ iPhone 移动银行应用。该应用名为 \"Woodforest Mobile Banking\"。*\n\n### 完成开发周期\n\n现在我们有了设计需求和用户界面设计，并且编写了程序，接下来该做什么呢？编程之后，我们需要确保我们的程序符合设计需求和用户界面设计，并且确保没有错误。在编程术语中，错误被称为**缺陷**。缺陷是我们编程产生的非预期结果，必须在应用发布到\
  \ App Store 之前修复。查找程序中的缺陷并确保程序满足设计需求的过程被称为**测试**。通常，由经验丰富的软件测试方法学专家（而非编写该应用的开发者）来执行此测试。软件测试通常被称为**质量保证\
  \ (QA)**。\n\n**注意：** 当一个应用准备好提交到 iTunes App Store 时，`Xcode` 会给该文件加上 `.app` 扩展名，例如\
  \ `appName.app`。这就是为什么 iPhone、iPad 和 Mac 应用程序被称为 **app**。在本书中，我们将互换使用“程序”、“应用程序”和“应用”这三个术语，它们都表示相同的意思。\n\
  \n在测试阶段，开发者需要与 QA 人员合作，以确定应用程序为何无法按设计工作。这个过程被称为**调试**。它要求开发者逐步检查程序，以找出应用程序无法按设计工作的原因。图\
  \ 1–3 展示了完整的软件开发周期。\n\n![图片](img/0103.jpg)\n\n**图 1–3.** *典型的软件开发周期*\n\n在测试和调试过程中，经常需要修改需求（设计），以使应用对用户更友好。在设计需求和用户界面变更完成后，整个过程会重新开始。\n\
  \n在某个时候，大家如此努力开发的应用必须提交到 iTunes App Store。此时需要考虑许多因素：\n\n-   开发成本\n-   预算\n-   应用的稳定性\n\
  -   投资回报率\n\n开发者和管理层之间总是存在权衡取舍。开发者希望应用完美无瑕，而管理层希望尽快从投资中获得回报。如果将发布日期的决定权交给开发者，应用可能永远无法上架\
  \ App Store。开发者会无休止地调整应用，使其更快、更高效、更易用。然而，到了某个时间点，代码必须从开发者手中夺过来，上传至 App Store，以便它能够实现其应有的价值。\n\
  \n\n\n### 面向对象编程简介\n\n正如导言中详细讨论的那样，`Alice` 使我们能够专注于学习面向对象编程（OOP），而无需一次性掌握所有 `Objective-C`\
  \ 编程语法和复杂的 `Xcode` 开发环境。相反，我们可以专注于学习 OOP 的基本原则，并快速运用这些原则编写我们的第一个程序。\n\n几十年来，开发者们一直在努力寻找一种更好的方法来开发在项目生命周期内可复用、可管理且易于维护的代码。OOP\
  \ 旨在帮助实现代码复用和可维护性，同时降低软件开发成本。\n\nOOP 可以被视为程序中对象的集合。对这些对象执行操作以满足设计要求。\n\n一个**对象**是任何可以被操作的东西。例如，一架飞机、一个人或\
  \ iPad 上的屏幕/视图都可以是对象。我们可能希望通过让飞机倾斜来操作它。我们可能希望让人行走，或者改变 iPad 上某个应用的屏幕颜色。操作都要应用于这些对象；参见图\
  \ 1-4。\n\n![images](img/0104.jpg)\n\n**图 1-4.** *Alice 应用程序中的两个对象：一艘运输船和一架战斗机。两个对象都可以应用操作——起飞和降落、右转和左转。*\n\
  \n如果你点击播放按钮，`Alice` 将会为你运行一个程序，例如图 1-4 中所示的程序。当我们运行 `Alice` 应用程序时，用户可以对应用程序中的对象应用操作。类似地，`Xcode`\
  \ 是一个**集成开发环境（IDE）**，它使我们能够在编程环境中运行应用程序。我们可以在将应用程序运行到 iOS 设备上之前，先在电脑上通过 Xcode 的模拟器测试它们，如图\
  \ 1-5 所示。\n\n![images](img/0105.jpg)\n\n**图 1-5.** *这个示例 iPhone 应用包含一个用于组织课程列表的表格对象。诸如“向左旋转”或“用户选择了第\
  \ 3 行”等操作可应用于此对象。*\n\n对对象执行的操作称为**方法**。方法操纵对象以实现我们希望应用执行的功能。例如，对于图 1-4 中的喷气机对象，我们可能有以下方法：\n\
  \n`goUp`\n`goDown`\n`bankLeft`\n`turnOnAfterBurners`\n`lowerLandingGear`\n\n图 1-5\
  \ 中的表格对象，在程序中实际被称为 `UITableView`，它可能有以下方法：\n\n`loadView`\n`shouldAutorotateToInterfaceOrientation`\n\
  `numberOfSectionsInTableView`\n`cellForRowAtIndexPath`\n`didSelectRowAtIndexPath`\n\
  \n所有对象都有描述这些对象的数据。这些数据被定义为**属性。**每个属性都以特定的方式描述相关联的对象。例如，喷气机对象的属性可能如下：\n\n`altitude\
  \ = 10,000 feet`\n`heading = North`\n`speed = 500 knots`\n`pitch = 10 degrees`\n\
  `yaw = 20 degrees`\n`latitude = 33.575776`\n`longitude = -111.875766`\n\n对于图 1-5\
  \ 中的 `UITableView` 对象，以下可能是我们的属性：\n\n`backGroundColor = Red`\n`selectedRow = 3`\n\
  `animateView = No`\n\n当程序运行时，当用户与应用交互时，或者当程序员设计应用以满足设计要求时，对象的属性可以随时被更改。在特定时间存储在对象属性中的值的集合统称为**对象的状态**。\n\
  \n**状态**是计算机编程中的一个重要概念。在向学生教授状态时，我们让他们走到窗边，找到天空中一架飞机。然后我们让他们打个响指，想象一下当时那架飞机的属性可能具有的一些值。这些值可能是：\n\
  \n`altitude = 10,000 feet`\n`latitude = 33.575776`\n`longitude = -111.875766`\n\n\
  这些值代表了对象在他们打响指的那个特定时刻的状态。\n\n等待几分钟后，我们让学生找到同一架飞机，再次打响指，并记录下该飞机在那个特定时间点可能的状态。\n\n\
  那么属性的值可能变成这样：\n\n`altitude = 10,500 feet`\n`latitude = 33.575665`\n`longitude =\
  \ -111.875777`\n\n请注意对象的状态是如何随时间变化的。\n\n### 使用 Alice 界面\n\n`Alice` 提供了一种很棒的方法来运用我们刚刚讨论过的概念，而无需同时面对学习\
  \ `Xcode` 和 `Objective-C` 语言的所有复杂性。只需几分钟就能熟悉 `Alice` 界面并开始编写程序。\n\n本书的导言描述了如何下载\
  \ `Alice`。下载并安装后，你需要打开 `Alice`。它的界面将如图 1-6 所示。\n\n![images](img/0106.jpg)\n\n**图\
  \ 1-6.** *正在运行的 Alice IDE*\n\n严格来说，`Alice` 并不是像 `Xcode` 那样的真正 IDE，但它非常接近，而且比 `Xcode`\
  \ 更容易学习。真正的 IDE 将代码开发、用户界面布局、调试工具、文档以及模拟器/控制台启动功能集成为单个应用程序；参见图 1-7。然而，`Alice` 提供了与\
  \ `Xcode` 相似的外观、感觉和功能。这将为以后我们开始编写 `Objective-C` 代码打下良好的基础。\n\n![images](img/0107.jpg)\n\
  \n**图 1-7.** *Xcode 集成开发环境（IDE）及 iPhone 模拟器*\n\n在下一章中，你将逐步了解 `Alice` 界面并编写你的第一个程序。\n\
  \n### 本章小结\n\n恭喜你，你已经完成了本书的第一章。理解以下术语非常重要，因为它们将在本书中反复强调：\n\n*   计算机程序\n*   算法\n\
  *   设计要求\n*   用户界面\n*   缺陷（Bug）\n*   质量保证（QA）\n*   调试\n*   面向对象编程（OOP）\n*   对象\n\
  *   属性\n*   方法\n*   对象的状态\n*   集成开发环境（IDE）\n\n### 练习\n\n*   回答以下问题：\n    *   为什么要花时间在用户需求上如此重要？\n\
  \    *   设计需求和算法之间有什么区别？\n    *   方法和属性有什么区别？\n    *   什么是缺陷（Bug）？\n    *   什么是状态？\n\
  *   编写一个算法，描述自动售货机从投入硬币到出苏打水的工作过程。假设一瓶苏打水的价格是 80 美分。\n*   为一个可以控制自动售货机的应用编写设计要求。\n\
  \n## 第 2 章\n\n## 编程基础\n\n本章将重点介绍成为一名优秀的 `Objective-C` 程序员所必需的构建块。本章将讲解如何使用 `Alice`\
  \ 用户界面，如何编写我们的第一个 `Alice` 程序，如何编写我们的第一个 `Objective-C` 程序，并探索一些新的 OOP 术语。\n\n**注意：**\
  \ 我们希望在 `Alice` 中引入新概念，然后在后面的章节中，让你能够在 `Objective-C` 中使用这些概念。我们在过去 3 年中一直使用这种方法，并且根据个人经验，我们知道这种方法可以帮助你快速学习这些概念，不会感到气馁，并为你打下坚实的基础。\n\
  \n\n\n### 与爱丽丝一起探索\n\n爱丽丝的 3D 编程环境让编写第一个程序变得简单，因为它应用了你在第 1 章中学到的一些原则。首先，你需要进一步了解爱丽丝的用户界面。当我们首次启动爱丽丝时，会看到一个类似图\
  \ 2-1 的屏幕。\n\n你可以使用默认的蓝天绿草模板，也可以选择其他不同背景的模板。尽情探索并享受其中乐趣吧。这里将是我们花费大部分时间并编写第一个爱丽丝应用程序的地方。\n\
  \n爱丽丝的用户界面旨在帮助我们高效编写应用程序。其界面在形式和功能上与 Xcode IDE 非常相似。现在，我们来探索爱丽丝的主要区域。\n\n![images](img/0201.jpg)\n\
  \n**图 2-1.** *爱丽丝的启动屏幕*\n\n#### 导航菜单\n\n导航菜单，如图 2-2 所示，允许我们打开和关闭文件、设置应用程序偏好、查看世界统计数据、文本输出和错误控制台。我们还可以通过导航菜单访问示例世界和爱丽丝帮助。\n\
  \n**注意：** 在使用爱丽丝时，务必频繁保存程序。如果爱丽丝崩溃而你未保存工作，你将丢失自上次保存以来的所有代码或更改。此外，我们建议你在要打开新的爱丽丝程序时，完全关闭爱丽丝并重新启动。\n\
  \n![images](img/0202.jpg)\n\n**图 2-2.** *此图展示了爱丽丝用户界面的主要部分。花点时间探索用户界面。你将在本章中了解它如何与\
  \ Xcode 进行比较，以及它如何帮助我们学习 Objective-C。*\n\n#### 世界窗口\n\n世界窗口显示我们的虚拟世界在运行时的样子。这个窗口类似于我们稍后用于运行应用程序的\
  \ iPhone/iPad 模拟器。世界窗口使我们能够利用爱丽丝的 3D 用户界面来建模我们的应用程序。\n\n在世界窗口中，我们可以移动相机并将其放置到我们想要的视角位置。图\
  \ 2-3 中的三个箭头工具提供了极大的灵活性，使我们的应用程序栩栩如生。\n\n学习如何在世界中移动相机以获取你希望用户看到的视角非常重要。\n\n![images](img/0203.jpg)\n\
  \n**图 2-3.** *用于在世界窗口中控制相机的相机操控箭头。*\n\n爱丽丝中最重要的控件之一是**编辑场景**控件。参见图 2-4。当我们点击世界窗口右下角的“编辑场景”按钮时，将启动爱丽丝的**场景编辑器**。\n\
  \n![images](img/0204.jpg)\n\n**图 2-4.** *世界窗口中的“编辑场景”按钮由方框标出，是最重要的控件之一。该按钮将启动爱丽丝的场景编辑器，使我们能够向爱丽丝世界添加对象。*\n\
  \n花点时间熟悉图 2-5 所示的场景编辑器。场景编辑器使我们能够：\n\n*   从库中向世界添加对象。\n*   从互联网向世界添加对象。\n*   在世界中定位对象。\n\
  *   调整相机以查看我们的世界。\n\n我们将花费大量时间通过场景编辑器向世界添加对象并设置相机。\n\n![images](img/0205.jpg)\n\n\
  **图 2-5.** *爱丽丝的场景编辑器*\n\n#### 爱丽丝中的类、对象和实例\n\n一组具有相同属性和相同方法（动作）的对象被称为**类**。例如，我们可以有一个名为\
  \ `Airplane` 的类。在这个类中，我们可以有五个对象：\n\n`boeing747`\n`lockheedSR71`\n`boeing737`\n`citation10`\n\
  `f18Fighter`\n\n这些对象几乎相同。它们来自同一个 `Airplane` 类。它们都具有以下相同的方法：\n\n`land()`\n`takeOff()`\n\
  `lowerLandingGear()`\n`raiseLandingGear()`\n`bankRight()`\n`bankLeft()`\n\n区分这些对象的唯一因素是它们属性值的不同。这些值的一些属性可能是：\n\
  \n`wingLength = 20ft`\n`maxThrust = 200,000lbs`\n`numberOfEngines = 2`\n\n在你的世界中，你可能有两个完全相同的对象。你可能希望在视图中看到两架波音\
  \ 737。类的每个副本称为一个**实例**。向程序添加类的实例称为**实例化**。\n\n#### 对象树\n\n**对象树**（参见图 2-6）使我们能够查看爱丽丝世界中的所有对象。此外，如果对象有子部件，你可以通过单击加号来查看这些子部件，或者通过单击减号来折叠子部件。\n\
  \n![images](img/0206.jpg)\n\n**图 2-6.** *对象树*\n\n许多爱丽丝世界都包含我们应用程序所需的几个内置对象。图 2-6\
  \ 中的世界包含相机、灯光和地面对象。\n\n#### 编辑器区域\n\n编辑器区域是爱丽丝界面中最大的区域，我们在这里编写代码。使用爱丽丝，我们实际上不需要键入代码；我们可以拖放代码来操作我们的对象和属性。\n\
  \n**注意：** 不要忘记编辑器区域的顶部。顶部包含一行用于循环、分支和其他逻辑结构的控件和逻辑模块，我们可以用它们来控制对象的行为。\n\n#### 详细信息区域\n\
  \n爱丽丝界面中的**详细信息区域**包含用于属性、过程和函数的选项卡，这些构成了对象树中选定的对象。\n\n*   **属性**包含我们选定对象的具体信息（例如，重量、长度和高度）。\n\
  *   **过程（方法）** 对对象执行动作（例如，起飞和降落）。\n*   **函数**与方法类似。在爱丽丝中，两者的区别在于方法不返回值，而函数会返回值。\n\
  \n#### 事件区域\n\n爱丽丝界面中的事件区域包含应用程序使用的所有现有事件的列表，并为我们提供了创建新事件的机会。**事件**是触发我们方法的条件。响应这些事件的方法（或过程）称为**事件处理程序**。当特定事件发生时，它会**触发**一个信号，由事件处理程序接收和处理。\n\
  \n一些例子是用户在 iPhone 上触摸按钮。触摸或滑动会触发事件，而处理这些事件的方法会对应用程序中的对象进行操作。参见图 2-7。\n\n![images](img/0207.jpg)\n\
  \n**图 2-7.** *Phonics Easy Reader 1（由 Rock 'n' Learn 出品）以左侧横向方向在 iPad 模拟器上运行。点击“读给我听”或“让我试试”按钮会触发事件，方法接收并处理这些事件——在此示例中，是为孩子朗读或让孩子读出句子中的单词。*\n\
  \n\n\n### 创建 Alice 应用——登月，爱丽丝\n\n我们已经介绍了一些新术语和概念，现在是时候做程序员该做的事了——写代码。新手开发者通常会将编写一个\
  \ **Hello World** 应用作为他们的第一个程序。我们也会做类似的事情，但 Alice 让它变得更有趣。接下来，在完成第一个 Alice 应用后，我们再来编写第一个\
  \ Objective-C 应用。\n\n这个 Alice 应用将在屏幕上显示三个对象：一个月球着陆器和两名宇航员。一名宇航员会说：“鹰已着陆。”另一名宇航员会说：“这是个人的一小步，却是人类的一大步。”\n\
  \nAlice 确实让这类应用的开发变得简单又好玩。请确保你遵循以下步骤：\n\n1. 点击**文件**，然后点击**新建**。\n2. 点击**模板**选项卡。\n\
  3. 选择 `MoonProject.a3p` 模板，并点击**打开**按钮。参见图 2-8。\n\n![images](img/0208.jpg)\n\n**图\
  \ 2–8.** *选择太空模板。*\n\n4. 现在，我们需要添加对象。点击**编辑场景**。这是 图 2-4 中“世界”窗口里的一个重要按钮。\n5. 在“对象库”中，从**通用\
  \ Alice 模型**中选择**太空类别**。\n6. 右键点击**月球着陆器**来查看关于该对象的一些信息。参见图 2-9。我们可以点击**“确定”**将对象添加到世界中，也可以直接从库中将它们拖放到世界中。\n\
  \n**注意：** 在这个例子中，你可以看到为什么实例是对象的一个副本。我们正在创建对象的一个副本并将其放入我们的世界中。*实例化* 是对创建副本并初始化对象这一过程的一个术语描述。\n\
  \n![images](img/0209.jpg)\n\n**图 2–9.** *在步骤 6 中查看对象并将其添加到我们的世界中。*\n\n7. 点击 `Astronaut`\
  \ 类别两次，向世界中添加两名宇航员。\n8. 使用 图 2-10 中方框标出的**摄像机调整**和**对象调整**工具，以达到你想要的视觉效果和视角。\n\n\
  **提示：** 有时当你添加两个对象时，Alice 会将一个对象放置在另一个之上。如果发生这种情况，将上面的宇航员拖到另一名宇航员的旁边。你的世界应该看起来像\
  \ 图 2-10。\n\n![images](img/0210.jpg)\n\n**图 2–10.** *使用“摄像机调整”工具来控制用户对世界的视角。使用“对象调整”工具来塑造和调整对象在世界中的方向。*\n\
  \n9. 在右上角有**对象调整**工具。将鼠标悬停在每个图块上，以了解每个图块工具会对对象产生什么效果。注意 图 2-10 中的对象树。`ground`、`lunarLander`、`astronaut`\
  \ 和 `astronaut2` 对象都在对象树中。\n10. 点击屏幕右下角的**编辑代码**按钮。这将返回编辑器视图。\n11. 在世界窗口中点击左侧的宇航员。确保在“详细信息区域”中选中了**过程选项卡**。\n\
  12. 现在我们要让宇航员们说些什么。记住，对对象执行动作需要方法。将 `Astronaut2|turn` 图块从“详细信息区域”拖到我们的编辑器中。从参数列表中选择**向左转**、**0.25\
  \ 旋转**。参见图 2-11。当我们运行应用时，左侧的宇航员将向左旋转四分之一圈，面向另一名宇航员。\n\n![images](img/0211.jpg)\n\
  \n**图 2–11.** *左侧宇航员的方法和参数。*\n\n13. 让我们为另一名宇航员做同样的操作。点击右侧的宇航员。将 `Astronaut|turn`\
  \ 图块从“详细信息区域”拖到我们的编辑器中。从参数列表中选择**向右转**、**0.25 旋转**。\n14. **参数**是方法对对象进行操作所需的信息。一个方法可能需要一个或多个参数。点击右侧的宇航员，将\
  \ `Astronaut2|say` 图块拖到编辑器中，**选择其他**，然后输入 **The Eagle has landed.** 参见图 2-12。\n\n\
  ![images](img/0212.jpg)\n\n**图 2–12.** *你的编辑器应该包含这些带有列出参数的方法。*\n\n15. 点击右侧的宇航员。将\
  \ `astronaut|say` 图块拖到编辑器中，**选择其他**，然后输入 **That’s one small step for man. . . One\
  \ giant leap for mankind**。你的应用看起来应该像 图 2-12。\n16. 让我们运行第一个程序，点击**播放**。如果你正确地完成了所有步骤，你的应用在运行时应该看起来像\
  \ 图 2-13。如果不是，那么你需要进行一些调试。\n17. 将应用保存为 `toTheMoonAlice.a3p`。我们稍后会用到这个应用。点击**文件**\
  \ ![images](img/U001.jpg) **保存世界**，或者**文件** ![images](img/U001.jpg) **另存世界为**。\n\
  \n![images](img/0213.jpg)\n\n**图 2–13.** *从“世界运行”窗口的顶部区域，我们可以重新运行程序、暂停、继续、重启、停止以及为我们的应用拍照。我们还可以根据应用的运行速度来加快或减慢它。*\n\
  \n### 你的第一个 Objective-C 程序\n\n既然你已经对 OOP 有了一些了解，并且完成了第一个 Alice 程序，那么是时候编写你的第一个 Objective-C\
  \ 程序，并开始理解 Objective-C 语言、Xcode 和语法了。首先，我们必须安装 Xcode。Xcode 是我们在开发 Objective-C 应用时使用的\
  \ IDE。它相当于 Alice 的界面。\n\n\n\n### 启动和使用 Xcode 4.2\n\nXcode 4.2 可从 Mac App Store 免费下载，参见图\
  \ 2–14；也可从 iOS 开发中心获取，参见图 2–15 和图 2–16。\n\n![images](img/0214.jpg)\n\n**图 2–14.**\
  \ *Xcode 4.2 可从 Mac App Store 免费下载。*\n\n**注意：** 该软件包包含我们编写 Objective-C 和 Mac 应用所需的一切。要开发\
  \ iPhone 应用，你需要申请 iPhone 开发者计划，支付 99 美元（准备在 iOS 设备上测试时），并从苹果官网 [`http://developer.apple.com/iphone`](http://developer.apple.com/iphone)\
  \ 下载 iPhone SDK。\n\n![images](img/0215.jpg)\n\n**图 2–15.** *如果你已支付 99 美元并加入 iOS\
  \ 开发者计划，就可以下载如上图所示的 Xcode 和 iOS SDK 测试版。*\n\n现在我们已经安装了 Xcode，需要开始编写 Objective-C\
  \ 应用程序了；让我们开始吧。启动 Xcode 后，请按照以下步骤操作：\n\n1.  点击 **Create a new Xcode Project**。参见图\
  \ 2–16。\n\n![images](img/0216.jpg)\n\n**图 2–16.** *创建我们的第一个 Objective-C 项目。*\n\n\
  **重要提示：** 许多初学者在此处会遇到困难，具体取决于他们使用的 Xcode 版本以及是否安装了 iPhone SDK。在图 2–17 中，你可以看到我们已经安装了\
  \ iOS SDK，同时也安装了 Lion 版本的 Xcode。如果你尚未安装这些，也没关系。只需在模板选项的左侧窗格中导航，点击 **Applications**，然后查找\
  \ Command Line Tool 即可。\n\n2.  在左侧窗格中选择 **Applications**，选择 **Command Line Tool**\
  \ 模板，然后点击 **Next**。参见图 2–17。\n\n![images](img/0217.jpg)\n\n**图 2–17.** *选择 Command\
  \ Line Tool。你可能需要在其他版本的 Xcode 中导航到等效界面。总之，关键是要找到 Command Line Tool。*\n\n3.  让我们将应用命名为\
  \ **HelloWorld**，并选择 **Foundation** 作为应用类型，如图 2–18 所示。然后点击 **Next**，并将应用保存到你选择的目录中。\n\
  \n![images](img/0218.jpg)\n\n**图 2–18.** *将应用命名为 HelloWorld，并选择 Foundation 作为应用类型。*\n\
  \n4.  在 **Project Navigator** 中，点击 `main.m` 文件。参见图 2–19。\n\nXcode 为我们做了大量工作，创建了一个包含文件和代码的目录，供我们直接使用。这就是\
  \ Xcode 模板的作用——它们为我们节省了大量时间。\n\n我们需要熟悉 Xcode IDE。让我们来看两个最常用的功能（参见图 2–19）：\n\n* \
  \  导航区\n*   编辑器区\n\n这些区域与我们在 Alice 中使用的界面类似。**导航**区包含构建应用所需的文件，包括我们的类、方法和资源。\n\n\
  **编辑器**区是 Xcode IDE 的核心所在；在这里，我们的梦想变成了现实。编辑器区域是我们编写代码的地方。你会注意到，编写代码时，代码的颜色会发生变化。有时，Xcode\
  \ 甚至会尝试为你自动补全单词。这些颜色都有其含义，随着我们使用 IDE，它们会逐渐变得清晰。编辑器区域也是我们调试应用的地方。\n\n**注意：** 即使我们已经提过，但值得再说一次：通过阅读本书，你将学习\
  \ Objective-C 编程，但通过调试应用，你才会*真正*学会 Objective-C。调试是开发者学习并成长为优秀开发者的途径。\n\n**Run**\
  \ 按钮将我们的代码从纯文本转换为 Mac、iPhone 或 iPad 能够执行的 `.app` 文件。在 Alice 界面中，我们使用播放按钮来运行 Alice\
  \ 应用。\n\n![images](img/0219.jpg)\n\n**图 2–19.** *创建项目后，点击 Run 按钮即可运行应用，并在控制台中看到\
  \ **Hello World!** 的输出。*\n\n要运行我们的第一个程序，只需点击 **Run** 按钮。Xcode 会检查我们的代码语法，编译应用，如果未发现错误，则会生成一个\
  \ `.app` 文件并运行它。该应用程序将在控制台（也称为终端）中运行。\n\n当应用运行时，它会在控制台中打印出 **Hello World**。此外，在控制台窗口中，我们还可以看到应用程序是否已终止以及终止的原因。在本例中，它正常终止。我们可以通过消息\
  \ `Program ended with exit code: 0` 看到这一点，这意味着我们的应用没有崩溃。参见图 2–20。\n\n![images](img/0220.jpg)\n\
  \n**图 2–20.** *我们的应用在调试器控制台中执行。*\n\n现在，让我们修改我们的应用，使其完成我们之前对宇航员所做的操作：\n\n1.  导航到\
