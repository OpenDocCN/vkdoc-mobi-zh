- "# 内存、地址与指针\n\n计算机和我们人类一样，需要一个工作与存储的空间。例如，可以将计算机内存想象成办公桌上的空间。一个需要同时处理多个项目的人，必须有足够的桌面空间来放置所有文件与文档，以便快速便捷地取用。如果桌面空间对于同时处理的项目数量来说太小，部分项目可能不得不归档到抽屉里，等桌面腾出更多空间再迅速取出。确保桌面空间得到高效利用也非常重要。\n\
  \n处理计算机内存是编程中较为复杂的领域之一。为什么会这样？这些问题按理说现在应该已经解决了，对吧？嗯，可以说是解决了，也可以说没有。有些语言采用了完全消除程序员管理内存需求的方法，通过一些内部机制（以及一种称为垃圾回收的功能）来处理内存的使用和释放。但这种方法的缺点在于，垃圾回收并不能在所有情况下让程序员对内存使用拥有最终决定权。这为什么重要？一般来说，这关乎性能。当完全掌控内存管理时，程序员也就完全掌握了程序的性能（或性能不足的问题）。\n\
  \n本章将介绍在 Mac、iPhone 或 iPad 上处理内存的思路。在任何设备上处理内存都有其挑战。例如，iPhone 和 iPad 作为更小的设备，可用内存更少，这意味着高效利用其内存至关重要。幸运的是，Objective-C\
  \ 提供了一些机制，让内存管理不再是一件苦差事。你将学习如何分配内存，以及 Xcode 4 中新的自动引用计数（`ARC`）特性，这使得管理已分配内存比早期版本的\
  \ Xcode 简单得多。\n\n## 理解内存\n\n虽然很多人可能将计算机内存比作人类大脑，但我更倾向于将计算机内存比作你作为一个人所拥有的物理工作空间。你就像计算机的\
  \ CPU，即实际处理信息并对其执行操作的部分。你拥有的工作空间越大，整理东西就越容易，完成任务也越快。当然，我们都会到达一个临界点，无论获得多少额外空间，都无法再提高工作效率。\n\
  \n对于计算机而言，内存是存储某些程序（或程序的一部分）和数据的工作区。在 Mac、iPhone 和 iPad 上，最基本的内存单元是 `字节`。如果你将内存想象成一个网格状的盒子，那么一个字节就是一个单独的盒子，如图\
  \ 13–1 所示。\n\n![图片](img/1301.jpg)\n\n**图 13–1.** *字节就像一排盒子。*\n\n当然，在现代典型的计算机中，通常有数十亿个这样的盒子（即字节）。尽管看似庞大近乎无限，但内存是计算机可用作支配的最重要的资源。只有驻留在内存中的程序才能被执行，只有从磁盘加载的数据才能被查看或操作。此外，在\
  \ iPhone 或 iPad 上，可用的内存远少于典型的 PC 或 Mac 电脑。一定程度的内存节约始终是一个好习惯。\n\n好了，所以内存就像一个由盒子组成的网格，每个盒子保存一个字节的信息。这到底有什么用？计算机如何将每个字节放入其位置，又如何将其取出？当然，如果我的车库里堆满了没有标签的盒子，我很难找出，比如，所有旧游戏机存放的位置。计算机也面临同样的问题，因此它以一种非常有条理的方式来解决这个问题。在深入探讨计算机如何解决这个问题之前，你需要了解内存单位和地址的基本概念。\n\
  \n### 位、字节与进制\n\n在 图 13–1 中，每个盒子代表一个字节，即内存空间。每个字节可以容纳总共 8 个位。一个`位`就是一个可以是 0 或 1\
  \ 的数字——即关或开。正是这些 0 和 1 的序列赋予了字节其数值。这些 0 和 1 代表一种`二进制`数字系统；也就是说，每个数字位最多可以有两个值：0 或\
  \ 1。这有时被称为 base-2 编号系统（与我们日常生活中使用的 base-10 或十进制编号系统相对）。在深入探讨内存的具体细节之前，理解现代计算机硬件上通常使用的编号系统非常重要。\n\
  \n**注：** 现代计算机每字节使用 8 个位。在早期的计算时代，不同的计算机制造商有时会采用不同的字节大小。例如，Control Data Corporation\
  \ 的 CDC-6000 经常为显示代码使用 12 位字节，而 DEC PDP-10 在位字段上操作，因此一个“字节”可以是 1 位到 36 位中的任何值。IBM\
  \ 凭借其流行的 System/360 确立了 8 位字节的标准，20 世纪 70 年代的微处理器也是如此。\n\n一般来说，人们几乎对所有事物都使用十进制编号；从金钱到度量衡，十进制是标准。然而，在现代计算机领域，十进制系统很少使用。相反，计算机通常使用二进制（base-2）或十六进制（base-16）。\n\
  \n**注：** 八进制（常称为 base-8）也有使用，但没有十六进制那么常见。\n\n\n\n### 将十进制（Base-10）转换为二进制（Base-2）\n\
  \n一个典型的日常数字可能看起来像这样：`1101`。现在，大多数人会认为这个数字是“一千一百零一”。然而，在二进制（Base-2）计数法中，这个数字代表十进制数`13`。让我们看看这是如何实现的。\n\
  \n如图 13-2 所示，在十进制计数法中，每个数位代表 10 的幂次；即从右向左，每一列的值按 10 的幂次（10, 100, 1000 等）递增。我们将千位（`10³`）、百位和个位相加，得到`1,101[10]`（下标表示“基数为\
  \ 10”）。\n\n![images](img/1302.jpg)\n\n**图 13-2.** *十进制计数系统。*\n\n现在，让我们看看同样的数字在二进制中是什么样，如图\
  \ 13-3 所示。\n\n![images](img/1303.jpg)\n\n**图 13-3.** *二进制计数系统。*\n\n在二进制计数法中（如图 13-3\
  \ 所示），从右向左，每一列的值按 2 的幂次（2, 4, 8, 16, 32 等）递增。我们将`8`、`4`和`1`相加，得到值`13[10]`（这里是二进制结果）。另请注意，连续的\
  \ 4 位（即半个字节）通常被称为一个**半字节**。\n\n当然，前面提到 8 位（编号从 0 到 7）构成一个字节。图 13-4 展示了一个由 8 位组成的完整字节示例。要获取其值，请将所有列的值相加，方法如下：\n\
  \n![images](img/1304.jpg)\n\n**图 13-4.** *一个完整的字节，显示二进制和十进制值。*\n\n### 使用十六进制（Base-16）计数法\n\
  \n最后一个值得一提的、在现代计算机中广泛使用的进制是十六进制（Base-16）计数系统。在二进制中，每个数位可以有 0 和 1 两种值。在十进制中，每个数位可以有\
  \ 0-9 共十种值。在十六进制中，每个数位可以有 0-F 共十六种值。是的，你没看错；最后一个是`F`。为了在单一数位中表示 16 个值，使用字母来表示数值就变得很有必要。对于十六进制，其数字序列从\
  \ 0 到 9，然后从`A`到`F`。表示一个字节需要两个十六进制（简称**hex**）数字；每个十六进制数字代表 4 位，如图 13-5 所示。\n\n![images](img/1305.jpg)\n\
  \n**图 13-5.** *左侧：两个半字节组成一个字节。右侧是一个简单的十六进制到十进制转换表。*\n\n因此，十六进制数`9D`等于二进制数`10011101`，也等于十进制数`157`。如图\
  \ 13-5 所示，一个字节的值可以是从`0000 0000`到`1111 1111`（二进制）之间的任意值，也就是`0xFF`（十六进制）。\n\n**注意：**\
  \ 在`0xFF`中，前缀`0x`在编程中用来表示该数字是一个十六进制数。虽然`FF`看起来很明显（因为只有字母），但像`10`这样的数字就不那么明确了：它是十进制的\
  \ 10 还是十六进制的 16？而`0x10`则明确了这一点。\n\n学习十六进制需要一些时间适应，但这段时间花得很值。这是因为在处理内存时，几乎所有东西都用十六进制表示。如同十进制计数法，每个数位都比前一位呈指数级增大，如图\
  \ 13-6 所示。\n\n![images](img/1306.jpg)\n\n**图 13-6.** *一个 16 位的十六进制数。*\n\n在十进制中，数位依次是\
  \ 1, 10, 100, 1000，等等。在十六进制中，数位基于 16，因此是 1, 16, 256, 1024，等等——每一列都是 16 的倍数。然而，一旦你理解了十六进制，你可能也想将其转换为十进制表示。图\
  \ 13-7 展示了如何将 16 位的十六进制数转换为十进制数。\n\n![images](img/1307.jpg)\n\n**图 13-7.** *将 16\
  \ 位的十六进制数转换为十进制。*\n\n如果我们把所有列的值相加，就会得到答案：\n\n`8,192 + 256 + 160 + 2 = 8,610`\n\n\
  因此`0x21A2`等于`8,610`。\n\n图 13-7 表示的是一个 16 位的数字。计算 32 位和 64 位数字只需要向左增加列数即可。\n\n**提示：**\
  \ 如果你发现自己经常需要计算 32 位和 64 位的值，只需使用 Mac 上的计算器（切换到程序员视图），或者花点小钱买个能处理十六进制的科学计算器。\n\n\
  我们希望这没有把你吓跑。在最底层理解计算机内存其实并没那么难，而且也不是所有时候都需要这样做。需要记住的重点是：处理内存时，可能有必要理解二进制（Base-2）、十进制（Base-10）和十六进制（Base-16）的值。这在调试应用程序时会变得更加清晰，如第\
  \ 14 章中所讨论的。\n\n\n\n### 理解内存地址基础\n\n就像街道上的建筑一样，内存也有地址，只不过在某些方面，内存寻址要简单得多。在本章前面部分，我们提到计算机可以在虚拟车库中解决追踪旧游戏机盒子的难题。这个过程的第一步是能够追踪内存中的特定位置，这些位置被称为`地址`。从程序的角度来看，这些地址被存储在变量中供后续引用。\n\
  \n计算机中的内存是一组线性的字节（或称为盒子），用于存储信息。如果你只是简单地将这些盒子标记为 1、2、3、4，依此类推，你就会得到一组从 1 开始、以某个非常大的数字结束的盒子。这些数字被称为`内存地址`。\n\
  \n图 13–8 提供了一个寻址内存的简单示例。\n\n![images](img/1308.jpg)\n\n**图 13–8.** *寻址的简单示例。*\n\n\
  如果每个块是一个字节，那么第一个字节从地址`0×1000`开始，到`0×1037`结束。请记住，数字前的“0×”表示该数字（此处指地址）是用十六进制表示的。例如，地址`0×1000`实际上是\
  \ 4096，而不是 1000。数字`0×1000`代表我们内存示例的起始位置。在这个位置存储的是字母“A”。示例中还有字母“Z”。“Z”的值位于内存地址`0×1019`处。地址`0×1000`是一个简单的\
  \ 16 位地址示例。一个 32 位 iPhone 的地址看起来像`0×03C06D80`。64 位地址的大小将是 32 位地址的两倍。\n\n**注意：**\
  \ 如果我们的程序可以访问图 13–8 中的内存，它将会把内存的起始点`0×1000`存储到一个变量中。这个变量通常被称为`指针`，因为该变量的值（地址`0×1000`，仅是一个数字）指向我们感兴趣的数据，就像地图上的箭头一样。\n\
  \n另一种看待这个内存网格的方式是将其视为一个数组。在这个例子中，一个变量被声明为一个数组。该数组的长度是 56 个字符，与图 13–8 中示例的大小完全相同。当一个变量（如`myArray`）被声明为数组时，该变量的值会解析为一个地址或指针。为了方便讨论，我们假设`myArray`的地址是`0×1000`，就像图\
  \ 13–8 中的网格一样。如果你查看变量`myArray`，它的值会是`0×1000`。记住，数组会解析为一个地址。那么，我们如何访问数组中的内存呢？\n\n\
  ```\nchar myArray[56];\n```\n\n**注意：** 在 C 和 Objective-C 中，所有数组都是**从零开始**的。这意味着数组的第一个元素位于索引\
  \ 0，而不是索引 1。一个包含 30 个元素的数组将从元素 0 开始，结束于元素 29。元素 30 在数组的边界之外。\n\n由于 C 和 Objective-C\
  \ 使用从零开始的数组，如果程序需要访问数组的第一个元素，可以这样操作：\n\n```\nchar letterA = myArray[0];\n```\n\n\
  在这个例子中，`letterA`将被设置为数组的第一个元素，即字母“A”（使用图 13–8 作为数组）。在底层，计算机实际上只是简单地使用数组索引并将其加到地址上。同样，如果地址是`0×1000`，加上\
  \ 0 得到的新地址仍然是`0×1000`，这正是字母“A”所在的位置。\n\n```\nchar letterZ = myArray[25];       \
  \          // 或者如果你喜欢用十六进制，可以写成 myArray[0×19]！\n```\n\n在上面的例子中，`letterZ`将被设置为索引\
  \ 25 处的值，即字母“Z”。计算机将 25（`0×19`）加到基地址`0×1000`上，得到的结果是`0×1019`。这就是字母“Z”所在的位置。记住，数组是从零开始的，所以“Z”位于索引\
  \ 25，因为“A”从索引 0 开始；“Z”仍然是第 26 个元素（使用从 1 开始的自然数或计数数）。\n\n在指针后使用方括号（`[ ]`），可以非常简单地访问该内存数组中的元素。还有一种不同的方法可以达到同样的效果。这个例子希望能帮助你更深入地理解指针和地址。\n\
  \n**清单 13–1.** *使用指针。*\n\n![images](img/U1301.jpg)\n\n在清单 13–1 中，第 3 行声明了一个新数组。方括号（`[\
  \ … ]`）是空的，因为我们直接将字母表作为数组的值进行赋值。在这种情况下，由于我们提供了值，编译器知道数组的大小。因此，我们的新数组就像图 13–8 一样：索引\
  \ 0 处的第一个值是字母“A”，索引 25（`0×19`）处的最后一个值是字母“Z”。`myArray`等同于一个指针，因为它可以直接赋值给一个指针变量，如第\
  \ 7 行所示。它指向包含字母表的内存区域。\n\n第 4 行声明了一个指针变量。`aPointer`是一个指向`char`数据类型的指针。如果第 4 行是`int\
  \ *aPointer`，那么`aPointer`就是一个指向`int`类型数据的指针。在我们的例子中，我们将其保留为`char`类型。记住，指针只是一个地址，而地址只是一个数字。\n\
  \n在第 5 行，程序声明了一个字符变量。我们将使用这个变量来存储数组中的数据。\n\n第 7 行看起来有点奇怪，但它实际上是在将`myArray`的值赋给`aPointer`变量。如前所述，作为数组的变量总是解析为一个指针。所以，`myArray`等同于一个指针，这个指针是一个地址，而这个地址只是一个数字。这个数字被赋值给`aPointer`。程序并没有将数组复制给`aPointer`；它只是将`aPointer`的值设置为`myArray`的值。在此程序点上，`myArray`和`aPointer`拥有相同的值，因为它们都引用或指向同一块内存区域。\n\
  \n第 8 行向`myArray`的地址加上 25，并返回数组中偏移 25 个字节处的值，结果是字母“Z”。\n\n第 9 行将`aPointer`的值加 2。记住，`aPointer`等于`myArray`。`aPointer\
  \ + 2`现在指向字母“C”。如果这在数学上看起来有点奇怪，请记住从零开始的数组：\n\n- `aPointer+0` 指向 “A”\n- `aPointer+1`\
  \ 指向 “B”\n- `aPointer+2` 指向 “C”\n\n希望你已经逐渐习惯从零开始的数组。第 9 行还使用了`解引用` `运算符`，即星号（`*`）；下一节将对此进行更多介绍。\n\
  \n第 10 行等价于第 8 行。`myArray`和`aPointer`都有效地指向同一块内存，因此数组运算符可以正常工作。\n\n\n\n## 使用解引用运算符\n\
  \n第 9 行看起来与其他行有些不同，让我们更仔细地分析一下：\n\n```\nletter = *(aPointer + 2);\n```\n\n首先，我们来看括号内的内容：\n\
  \n`aPointer + 2`\n\n这应该相当直接明了：我们将 2 加到指针 `aPointer` 上。如果 `aPointer` 是 0×1000，结果值将是\
  \ 0×1002。此时指针*指向*了字母“C”。以这种方式使用指针与第 8 行或第 10 行中使用方括号的方式截然不同。我们是在手动调整指针，使其指向一个新值。接下来，我们需要询问计算机：“这个指针指向什么？”在列表\
  \ 13–1 的第 8 行和第 10 行中，使用数组运算符时，这个问题是隐含的，程序会直接响应。但当我们简单地通过加法、减法等方式改变地址时，程序需要显式地提出这个问题。这就是星号（`*`）发挥作用的地方。\n\
  \n在指针前使用星号可以*解引用*该地址，并返回指针所指向的值。因此，如果我们的指针是 0×1000，而字母“A”存储在 0×1000，我们可以通过解引用指针来获取字母“A”。如果我们的示例指向真实内存，`*(0×1000)`\
  \ 将返回字母“A”（但实际上不要这样做，因为 0×1000 不是一个真实地址，仅用于简化问题的示例）。请记住，指针是一个地址，而地址只是一个数字。星号要求计算机返回存储在地址中的内容，而不是返回地址本身。\n\
  \n**注：** 在大多数常见编程中，程序员很少有机会直接告诉系统，例如，位置 0×1000 是我们的数据。这是因为内存是**虚拟化**的。虚拟化内存允许使用的内存量超过机器物理内存的实际容量*（虚拟内存超出本书讨论范围）*。因此，操作系统管理数据的存储位置。结果是，计算机告诉程序它的内存在哪里，而不是程序告诉计算机。尽管如此，概念是相同的。\n\
  \n在硬件或设备驱动程序级别的软件开发中，使用硬编码地址更为常见。Mac OS X 或 iOS 中的典型程序永远不会使用硬编码地址。\n\n## 分配内存\n\n\
  在现代操作系统中，程序分配内存，操作系统通过返回一个指向所请求内存的指针来响应。在 C 和 Objective-C 中，**指针**通过在变量名前加上星号（`*`）来声明，如下例所示：\n\
  \n```\nchar *theData;\nNSString *theString;\n```\n\n不要将此处的星号与***解引用运算符***混淆。只有在声明变量时，星号才将变量标识为指针。\n\
  \n以下是更多请求内存的示例：\n\n```\n1. char data1[100];\n2. char *data2 = malloc(100);\n3. NSString\
  \ *myString = [[NSString alloc] init];\n```\n\n在示例 1 中，通过数组声明的方式分配内存。程序现在拥有一个数组（`data1`），它**指向**\
  \ 100 字节的内存。在 C 中，只需记住任何声明为数组的变量即使没有声明为指针，也会被*视为*指针来引用。\n\n示例 2 稍微复杂一些。`data2` 被声明为一个指向\
  \ `char` 数据类型的指针。指针通过在文件前加上星号来声明。该行的下一部分是 `malloc(100)`，这是一个标准 C 库函数调用。此函数分配所请求的内存大小并返回一个指向它的指针。在我们的示例中，`malloc`\
  \ 被传入值 `100`。这请求分配 100 字节。当函数返回时，`data2` 包含一个*指针*，指向这 100 字节的内存。\n\n示例 3 是一种更传统的\
  \ Objective-C 类型的内存分配。首先，程序声明一个指向名为 `myString` 的 `NSString` 类的指针。接下来，执行以下代码：`[[NSString\
  \ alloc] init]`。这将为对象分配所需的内存，并返回一个*指针*指向它。\n\n在所有这些示例中，内存都是从操作系统请求的，并通过指针返回给程序，甚至示例\
  \ 1 也不例外——只是示例 1 与其他示例略有不同。\n\n### 使用自动变量和指针\n\n在函数或块内创建的任何变量都被视为**自动变量**，或**自动变量**。在我们之前的示例中，示例\
  \ 1 将 100 个字符分配为一个数组。这是自动完成的，因为如你所知，所有变量默认都是自动变量。由于我们通过数组声明预先定义了所有空间，这块内存会自动为我们管理。示例\
  \ 2 和 3 也是自动变量，但它们分配的空间仅足以容纳一个指向内存的指针——仅此而已。回想一下，指针只是一个保存内存地址的变量，而不是内存本身。因此，`char*\
  \ data2` 和 `NSString *myString` 实际上只是保存一个数字的变量，该数字代表一个内存地址。\n\n**提示：** 这样理解指针：*指针*就像一张音乐会的门票，而分配的内存就像座位。门票上带有如何到达座位的信息。如果门票被丢弃（或丢失），找到座位的能力也就丢失了。然而，座位（分配的内存）仍然存在。\n\
  \n示例 2 和 3 是持有内存“门票”的自动变量，而不是内存本身（参见图 13–9）。这意味着，当函数退出且变量超出作用域时，指向内存的指针将会丢失；即“门票”丢失了。问题在于，程序还需要在指针丢失之前释放或解除分配指针所指向的内存。手动分配的内存不会随着指针一起超出作用域；分配的内存对于程序来说是全局的，直到程序退出才会被释放。\n\
  \n![images](img/1309.jpg)\n\n**图 13–9.** *指针不是内存本身。*\n\n需要记住的非常重要的一点是，手动分配的内存必须在某个时刻解除分配，具体取决于内存的使用方式。有些内存可能在程序启动时分配，直到程序退出时才需要释放。然而，最常见的内存分配在程序生命周期中会发生很多很多次，因此一旦对象不再使用，立即解除分配相关内存至关重要。手动分配的内存必须手动解除分配。自动分配的内存（例如\
  \ `char array[100];`）会自动解除分配。\n\n\n\n### 释放内存\n\n当程序分配内存时，需要确保在使用完内存后将其释放（或称为解除分配）。再次以之前的例子为例，示例\
  \ 2 使用`malloc`命令分配了内存。当程序使用完该内存后，需要将其释放。未能释放内存是一种常见的编程错误，并被形象地称为**内存泄漏**。\n\n为了防止内存泄漏（最终会导致程序崩溃），分配的内存必须谨慎管理。代码清单\
  \ 13–2 展示了示例 2 和示例 3 在正确释放内存时代码应有的样子。\n\n**代码清单 13–2.** *内存分配与释放。*\n\n```\n1   int\
  \ main(void)\n2   {\n3       char *data2 = malloc(100);\n4       NSString *myString\
  \ = [[NSString alloc] init];\n5       …  // 标准的“执行操作”省略号\n6       …\n7       free(data2);\
  \  // 释放 100 字节\n8       data2 = NULL;\n9       [myString release];\n10      myString\
  \ = nil;\n11   }\n```\n\n在代码清单 13–2 中，`data2`在第 3 行被分配。这种分配方式是纯旧式的标准 C 语言，在 Objective-C\
  \ 程序中并不典型，但了解它仍然非常重要。\n\n第 4 行声明并分配了一个 Objective-C 对象，即`NSString`。\n\n第 7 行释放了第\
  \ 3 行分配的内存块。\n\n第 8 行将指针设置为`NULL`。这是一个良好的实践，将在下一节中解释。\n\n第 9 行释放了第 4 行分配的对象。`release`消息是一个请求解除分配该对象的消息。之所以`release`消息是*请求*释放内存，这与\
  \ Objective-C 对象的内存管理机制有关。这种机制被称为**保留/释放模型**，有时也被称为**引用计数**。\n\n**注意：** 在 Xcode\
  \ 4 之前，保留/释放模型是 iOS 开发的唯一模型。Xcode 4.2 引入了一个名为自动引用计数（ARC）的选项。ARC 会使编译器自动为你加入保留和释放方法。虽然\
  \ ARC 是可选的，但对于在 Xcode 4.2 中启动的任何新项目，它默认是开启的。打开 Xcode 4.2 之前创建的旧项目仍然可以正常编译，并且 ARC\
  \ 将被禁用。\n\n尽管 ARC 是一个不错的特性，但了解底层实际发生的情况仍然非常重要。ARC 不会移除对保留和释放方法的调用，它只是隐藏了实现，就像 Objective-C\
  \ 属性隐藏了 getter 和 setter 方法一样。\n\n引用计数使内存使用更高效一些，因为它允许对象知道何时应该释放内存。这是一种比完全手动管理内存稍好一些的机制。\n\
  \n第 10 行与第 8 行等价。Objective-C 指针*可以*被设置为`NULL`，但将指针设置为`nil`要好得多。在 Objective-C 中，`nil`对象具有特殊含义，实际上可以响应消息。`NULL`不具备同样的特性。\n\
  \n我们再看看如果使用 ARC，这个代码清单会如何变化：\n\n**代码清单 13–3.** *使用 ARC 进行内存分配。*\n\n```\n1   int\
  \ main(void)\n2   {\n3       char *data2 = malloc(100);\n4       NSString *myString\
  \ = [[NSString alloc] init];\n5       …  // 标准的“执行操作”省略号\n6       …\n7       free(data2);\
  \  // 释放 100 字节\n8       data2 = NULL;\n9       myString = nil;\n10   }\n```\n\n\
  代码清单 13–2 和代码清单 13–3 的主要区别在于省略了`[myString release]`。由于使用了 ARC，它会处理内存的释放。\n\n###\
  \ 使用特殊指针\n\n正如你所学的，指针只是一个表示内存地址的数字。有两个值得提及的特殊指针。严格来说，它们并非指针，而是代表空指针——即不指向任何内容的指针。这两个指针是`NULL`和`nil`。`NULL`就是零、虚无、什么也没有。由于指针只是表示地址的数字，地址为`0`或`NULL`代表一个逻辑上不指向任何内容的指针。\n\
  \n使用零地址是现代计算机采用的一种约定；计算机不允许任何程序在地址`0`处存储任何东西，这使得使用`NULL`来表示空内存或未使用内存更有意义。了解这一点很重要，因为如果内存分配失败，返回的结果指针就是`NULL`。`NULL`也可以用来指示指针不再有效或只是空了。这对于所有标准\
  \ C 语言都是如此。下面展示了如何使用`NULL`初始化指针：\n\n```\n       char *data = NULL;\n```\n\n它也应像代码清单\
  \ 13–4 中的代码片段那样用于比较。\n\n**代码清单 13–4.** *使用 NULL 验证和清除指针。*\n\n```\n1   char *data\
  \ = malloc(100);\n2   if (data != NULL) {\n3       // 使用该内存。它是有效的。\n4       free\
  \ (data);   // 释放内存，我们已完成使用。\n5       data = NULL;  // 将指针设置为 NULL，表示它已经为空。\n6 \
  \  }\n```\n\n在代码清单 13–4 中，第 2 行通过用`NULL`检查指针来确保`malloc`函数工作正常。如果指针不是`NULL`，则分配成功，程序可以使用返回的值。然后第\
  \ 4 行释放内存，第 5 行将指针设置为`NULL`，以表示该指针不再指向任何内容。\n\n在处理 Objective-C 对象时，`nil`是 Objective-C\
  \ 中与`NULL`对应的概念。与`NULL`一样，`nil`是一个指向空内容的特殊指针。然而，在 Objective-C 中，`nil`实际上是一个空对象。由于\
  \ Objective-C 大量依赖于向对象发送消息，因此空指针应该能够响应发送给它的消息，即使该指针是空的——`nil`空对象正满足了这一目的。代码清单 13–5\
  \ 是一个类似于标准 C 版本的示例代码片段。\n\n**代码清单 13–5.** *在可能为 nil 的对象上使用属性。*\n\n```\n1   NSArray\
  \ *bookList = [bookstore booksOnSale];\n2   for (NSUinteger i=0 i<bookList.count;\
  \ ++i) {\n3       // 如果 bookList 非 nil，for 循环的这部分将会执行。\n4       // 如果 bookList 为\
  \ nil，则循环的这部分将被跳过。\n5   }\n```\n\n**提示：** 当使用票务比喻来理解已释放的内存时，需要注意一点：如果一张票是指向剧院某个座位的指针，演出结束后会发生什么？票仍然指向那个座位，但它不再有效了；演出已经结束。内存也是如此。如果指针指向的内存被释放了，那么这块内存现在可以自由地用于其他内存分配。然而，指针仍然指向那块旧内存。清除指针很重要，这样它就不会被误用。这就是所谓的悬空指针。在使用指针前检查其是否为非`NULL`，配合上在对象释放时将指针设置为`NULL`或`nil`的做法，是一个应该严格遵守的“最佳实践”。\n\
  \n\n\n### 在 Objective-C 中使用 ARC 管理内存\n\n如前所述，`ARC` 是 Xcode 4.2 引入的新特性，它隐藏了对 `retain`/`release`\
  \ 模型的需求。默认情况下，在 Xcode 4.2 中启动的任何 **新** 项目都会启用 `ARC`。旧项目则禁用了 `ARC`。要启用或禁用 `ARC`，只需在\
  \ Xcode 4.2 项目的构建设置中查找 **自动引用计数**，如 图 13–10 所示。\n\n![images](img/1310.jpg)\n\n**图\
  \ 13–10.** *在 Xcode 4.2 项目中启用或禁用 ARC。*\n\n我们将探讨如何利用新的 `ARC` 特性在 Objective-C 中管理内存。\n\
  \n首先，`retain`/`release` 和 `autorelease`（稍后讨论）不再是有效的方法。在 `ARC` 下，这些方法已被弃用。这还包括属性中的\
  \ `release` 关键字。在 Xcode 4.2 之前，通常这样编写属性：\n\n```\n@property (nonatomic, retain) NSString\
  \ *name;\n```\n\n现在使用 Xcode 4.2，这发生了一些变化。该属性应写成：\n\n```\n@property (nonatomic, strong)\
  \ NSString *name;\n```\n\n`strong` 关键字取代了 `retain`；`strong` 用于告诉编译器，当赋值时需要保留此对象。反之，编译器会知道，当它不再被使用或重新赋值时，也要释放此对象。\n\
  \n以下是另一个关于如何使用隐式 `strong` 变量的代码示例：\n\n**清单 13–6.** *使用自动引用计数。*\n\n```\n1   24 -\
  \ (id)init\n2   {\n3          self = [super init];\n4          if (self) {\n5  \
  \            self.theBookStore = [[NSMutableArray alloc] init];\n6             \
  \ Book *newBook = [[Book alloc] init];\n7              newBook.title = @\"Objective-C\
  \ for Absolute Beginners\";\n8              newBook.author = @\"Bennett, Fisher\
  \ and Lees\";\n9              newBook.description = @\"iOS Programming made easy.\"\
  ;\n10             [self.theBookStore addObject:newBook];\n11\n12             newBook\
  \ = [[Book alloc] init];\n13             newBook.title = @\"A Farwell To Arms\"\
  ;\n14             newBook.author = @\"Ernest Hemingway\";\n15             newBook.description\
  \ = @\"The story of an affair between an English \"\n16                        \
  \            \"nurse and an American soldier \"\n17                            \
  \        \"on the Italian front \"\n18                                    \"during\
  \ World War I.\";\n19             [self.theBookStore addObject:newBook];\n20   \
  \          newBook = nil;                                   \n21         }\n22\n\
  23         return self;\n24   }\n```\n\n如果我们看一下清单 13–6，可以清楚地看到在第 6 行分配了一个新的 `Book`\
  \ 对象。然而，`ARC` 发挥作用的地方在第 12 行。在这里，我们通过分配一个新的 `Book` 对象来重新赋值指针。按照旧的内存管理规则，我们必须先释放旧值，否则会造成内存泄漏。在\
  \ `ARC` 下，编译器知道在重新赋值之前对该指针执行释放操作。第 20 行也是如此。实际上，第 20 行并非必需，因为当变量超出作用域时，`ARC` 会自动释放它。将它赋值为\
  \ `nil` 只是执行相同操作的一种更直接的方式。\n\n进一步检查此源文件（来自第 8 章示例的 `Bookstore.m`）发现，这里没有 `dealloc`\
  \ 方法。因此，`self.theBookStore` 变量 **在没有** `ARC` 的情况下会导致内存泄漏。有了 `ARC`，程序员不必担心释放 `self.theBookStore`\
  \ 变量，因为当 `Bookstore` 类不再被使用时，`ARC` 会自动执行该操作。\n\n### 在没有 ARC 的 Objective-C 中管理内存\n\
  \n虽然建议在启动新项目时使用 `ARC`，但有时需要管理一个旧项目，该项目要么早于 iOS 4，要么是基于 `retain`/`release` 模型构建的。对于这些项目，Xcode\
  \ 4 不会自动将其转换为使用 `ARC`。本节介绍如何处理没有 `ARC` 的程序。\n\n如前所述，Objective-C 处理已分配内存的方式与大多数用标准\
  \ C 编写的应用程序略有不同。回想一下，Objective-C 系统使用一种称为 `retain`/`release` 模型的东西。使用此模型，由对象分配的内存在每次对该内存感兴趣的应用程序向该对象发送\
  \ `retain` 消息时都会被计数。在应用程序的不同阶段，程序指示它已使用完该内存并发送 `release` 消息。当释放次数等于保留次数时，与该对象关联的内存最终被释放。让我们看看这个模型在实践中是什么样子的。清单\
  \ 13–7 是一个非常基本的例子。\n\n**清单 13–7.** *分配一个 Objective-C 对象。*\n\n```\n1   int main(void)\n\
  2{   \n3       NSString* myString = [[NSString alloc] initWithUTF8String:\"Hello\
  \ World!\"];\n4       // 使用该字符串执行某些操作的代码...\n5       [myString release];\n6    \
  \   myString = nil;\n7   }\n```\n\n在这个例子中，第 3 行使用 `alloc` 分配了一个新的字符串对象。这一行在这种情况下实际上非常重要；稍后将解释原因。所以第\
  \ 3 行创建了新的字符串。在创建时，Objective-C 系统自动向该对象发送一条 `retain` 消息。此时，`myString` 变量指向一个当前拥有一个\
  \ `retain` 计数的对象。\n\n第 5 行向 `myString` 对象发送了一个 `release` 消息。`release` 从当前 retain\
  \ 计数（为 1）中减去 1。如前所述，一旦 retain 计数达到零，该对象就会被释放。因此，当第 5 行执行完毕后，`myString` 变量指向已释放的内存。\n\
  \n第 6 行将原始变量设置为 `nil`，以指示该指针现在为空。\n\n\n\n#### 使用保留/释放模型\n\n保留和释放内存的过程是 Objective-C\
  \ 广泛用于管理内存的一种方式。这个过程还有一个别名叫做引用计数，这个名称更具描述性，因为保留和释放内存的过程本质上是计算内存被保留（而非释放）的次数。请注意，这里“内存”是一个通用术语。Objective-C\
  \ 中的内存管理是为*对象*分配内存，而不仅仅是内存块。大多数 Objective-C 对象都派生自基类 `NSObject`，它负责跟踪对象的保留计数。\n\n\
  **注意：** 如果你追求精确性，实际上是一组 `NSObject` 协议定义了引用计数的消息，而 `NSObject` 类实现了该协议。\n\n到目前为止，事情看起来相当简单：每次\
  \ `retain`，最终都需要有一次 `release`。这听起来不难，对吧？嗯，要知道一个对象何时被保留，并不总是那么直接。考虑代码清单 13–8 中的示例。\n\
  \n**代码清单 13–8.** *保留计数示例*\n\n![图片](img/U1302.jpg)\n\n查看代码清单 13–8，可以看到 `dict` 和 `today`\
  \ 对象的保留计数。`dict` 对象看起来很正常：每当对象被创建时，它的保留计数为 `1`。第 2 行的 `today` 对象也是如此。\n\n到了第 4 行，情况看起来有点奇怪。出于某种原因，`today`\
  \ 的保留计数现在变成了 `2`。发生了什么？如果我们仔细查看 `NSMutableDictionary` 的 `setObject: forKey:` 方法的文档，我们会看到在\
  \ `setObject:` 的部分说明中提到“该对象在添加到接收器之前会收到一条 retain 消息。”\n\n根据文档，在一个对象被添加到字典之前，该对象会收到一条\
  \ `retain` 消息。这就是为什么 `today` 的保留计数变成了 `2`。\n\n为什么字典要这样做呢？答案其实很简单。如果我们将一个对象添加到字典中，那么字典就应该对该对象负责；我们基本上是将对象交给它管理。我们可以释放我们添加到字典中的任何对象对应的局部变量。字典随后成为这些对象的所有者。为了确保这一点，`NSMutableDictionary`\
  \ 类会向其存储的所有数据发送一条 `retain` 消息，以便系统知道有对象正在使用该数据。\n\n由于 `dict` 正在管理这个对象，第 5 行用于释放我们自己的对象。字典依然持有与\
  \ `today` 对象相同的内存；我们只是告诉系统，我们已经不再需要它了。如果字典对象*没有*发送 `retain` 消息，那么第 5 行实际上就会导致该内存被释放。规则很简单：一旦一个对象的保留计数通过\
  \ `release` 消息变为零，该对象就会收到一条 `dealloc` 消息，该对象所占用的内存就会被真正释放。\n\n第 6 行是一个简单的约定，表示我们不再使用这个指针了。\n\
  \n第 7 行通过键 `TODAY` 移除了对象。当一个对象从字典中被移除时，该对象会自动收到一条 `release` 消息。此时，`today` 曾经指向的那个对象会收到一条\
  \ `release` 消息。由于这会使该对象的保留计数变为零，该对象也会收到一条 `dealloc` 消息来释放其内存。\n\n第 8 行简单地给 `dict`\
  \ 对象发送了一条 `release` 消息。由于没有其他地方保留这个对象，这将释放该对象的内存。\n\n#### 处理隐式保留消息和自动释放\n\n我们如何知道哪些对象需要释放，哪些不需要？答案基本上取决于对象所有权规则。如果创建对象的消息名称中包含\
  \ `alloc`、`copy` 或 `new`，那么你就拥有该对象，因此，一旦程序使用完毕，就需要释放它。还有其他一些例子，但遗憾的是，没有硬性规定。正确地释放内存需要理解对象以及哪些消息会导致显式的\
  \ `retain`。\n\n虽然对象可以收到显式的 `retain` 消息，但在我们前面的例子中，没有出现任何显式的 `retain`，因为存在自动或隐式的保留消息。例如，每当向字典对象发送\
  \ `setObject: forKey:` 消息时，我们添加的对象会自动收到一条 `retain` 消息。如前所述，每当我们分配一个对象时，就隐含了一个 `retain`：\n\
  \n`NSMutableDictionary *dict = [[NSMutableDictionary alloc] init];`\n\n其他调用则不那么明显，如下面的例子所示：\n\
  \n```\nNSDate* today = [NSDate date];\n```\n\n在上面这个例子中，对象被分配了，但带有一个隐式的释放——称为自动释放（autorelease）。如前所述，任何包含\
  \ `alloc`、`copy`、`new` 的方法都要求程序手动释放对象。对于其他情况，对象会被自动释放。\n\n关键在于，返回值是一个 `new` 日期对象。因为它是一个新对象，它会收到一种隐式的\
  \ `retain` 消息。但更重要的是，它将自动被释放，因为该对象不是通过 `alloc`/`copy`/`new` 方法创建的。这段代码也可以写成如下形式：\n\
  \n```\nNSDate* today = [[[NSDate alloc] init] autorelease];\n```\n\n这段代码会产生完全相同的结果。区别在于，在第二个例子中，我们显式地分配了内存，但将其标记为\
  \ `autorelease`。Objective-C 运行时系统会自动释放这块内存。虽然使用 `autorelease` 似乎是处理内存释放的最佳方式，但它不一定总是我们需要的。标记为自动释放的变量不会存在很长时间。所有\
  \ iOS 和一些 Mac 应用程序都有一个叫做**运行循环**（run-loop）的机制。基本上，应用程序大部分时间都在等待输入。例如，如果你触摸屏幕，应用程序会执行一些功能，然后最终回到等待更多输入的状态。每当应用程序回到等待更多输入的状态时，所有自动释放的变量都会被释放；这段时间可能短至\
  \ 1/60 秒。因此，`autorelease` 应该谨慎使用，并且仅用于变量的生命周期在当前运行循环范围内的场景中。如果程序需要让一个自动释放的变量存活更长时间，那么要么不使用\
  \ `autorelease`（使用标准的 `alloc` 和 `init`），要么简单地给该对象发送一条 `retain` 消息。\n\n**代码清单 13–9.**\
  \ *保持自动释放变量可用*\n\n```\n1   - (NSDate *)getDate\n2   {\n3       return [NSDate date];\n\
  4   }\n5\n6   - (void)captureDate\n7   {\n8       // 捕获当前日期并存储在类的实例变量中\n9      \
  \ currentDate = [[self getDate] retain];\n10   }\n11\n12   - (void)dealloc\n13 \
  \  {\n14       // 释放 current_date 的内存\n15       [currentDate release];\n16   }\n\
  ```\n\n注意第 9 行，我们调用了 `getDate` 方法，然后立即向返回的对象发送了一条 `retain` 消息。这是因为 `getDate` 返回的对象被设置为自动释放。如果程序不这样做，`currentDate`\
  \ 指向的内存就会被自动释放。\n\n**注意：** 在任何基于 Xcode 4.2 之前版本开发的 iOS 应用程序中，`main.m` 文件里都有一行看起来像这样的代码：\n\
  \n```\nNSAutoreleasePool * pool = [[NSAutoreleasePool alloc] init];\n```\n\n这就是程序用来自动释放那些在分配时（就像我们上面的例子一样）已收到\
  \ `autorelease` 消息的内存的机制。`[NSDate date]` 返回的内存会被自动添加到这个自动释放池中，然后在下一次运行循环时自动释放。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格遵守您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n#### 发送 `dealloc`\
  \ 消息\n\n一般情况下，你的程序绝不应向其他对象发送 `dealloc` 消息。但也存在一些例外情况，其中之一就是在处理 `dealloc` 消息本身时。你只需为你创建的对象处理\
  \ `dealloc` 消息。代码清单 13–10 是一段代码片段，展示了如何编写一个典型的 `dealloc` 消息。除了使用 ARC、垃圾收集或没有任何需要释放的内容之外，你创建的每个对象都应该实现一个\
  \ `dealloc` 消息。\n\n**代码清单 13–10.** *一个典型的 dealloc 实现。*\n\n```\n1   - (void)dealloc\n\
  2   {\n3       self.iVar1 = nil;     // 如果我们有实例变量，确保它们被释放。\n4                  \
  \           // 此实例变量是一个属性（`第 10 章`）\n5       [iVar2 release];      // 另一个例子。我们释放一个正在使用的实例变量\n\
  6                             // – 它不是一个属性。\n7       [super dealloc];      // 最后，我们告诉父类释放它自己。\n\
  8                             // 这是少数几次显式调用 dealloc 的情况之一。\n9   }\n```\n\n代码清单 13–10\
  \ 严格来说只是一个示例，其中的实例变量名完全是虚构的。\n\n第 3 行将一个实例变量设置为 `nil`。这不仅是一种常见做法，而且在这个例子中，该实例变量是一个属性。如果该属性是使用\
  \ `retain` 关键字创建的，那么像下面这样将属性设置为 `nil` 会自动向 `iVar1` 最初指向的任何对象发送一条 release 消息。\n\n\
  ```\n@property(retain) NSDate* iVar1\n```\n\n这是一种非常干净的释放对象的方法。\n\n第 5 行展示了如何释放非属性的实例变量。到目前为止，我们在许多示例中都使用了这种方法。\n\
  \n第 7 行是你向对象发送 `dealloc` 消息的唯一情况。在这种情况下，程序会告诉其父类（超类）释放自身。父类最终会做同样的事情，向其父类发送 `dealloc`，依此类推，直到基础对象最终被释放。另请注意，`[super\
  \ dealloc]` 是该方法执行的最后一件事情——先释放父类然后再继续做其他事情并不是一个好主意。\n\n处理 retain/release 模型需要一些时间来适应，但总体来说，它是一个相当直接的内存管理系统。不过，这里有一个警告：尽管我们的例子中提到了对象的\
  \ `retainCount` 方法，但不要依赖这个值。因为你无法知道框架的哪些部分对你的对象感兴趣，所以保留计数可能比你预期的要高。然而，了解 `retainCount`\
  \ 对于排查潜在的内存泄漏问题是有益的。继续练习使用 retain/release 模型，并确保在发送或接收对象时阅读开发者文档，以便了解所涉及的对象是如何被处理的。\n\
  \n### 如果出现问题\n\n无论是通过标准的 C 机制还是 Objective-C 对象分配方法来分配内存，大多数情况下都能成功。但是，程序员不能假设分配对象或分配内存是*总是*成功的。当内存分配失败时，通常预示着更大的问题即将发生，程序可能无法运行太久（会因内存问题而崩溃）。然而，即使程序可能因为无法分配内存而进入不良状态，它也不应该忽略内存分配失败的信号。以下是一些用于测试内存分配是否失败的惯例：\n\
  \n![images](img/U1303.jpg)\n\n在这个标准的 C 示例中，如果 `malloc` 函数失败，将返回一个 `NULL` 指针。回顾一下，`NULL`\
  \ 指针只不过是一个指向位置 0×00000000 的指针。内存永远不会从这个位置开始，因此 `NULL` 可以用来指示一个*错误的*内存分配。\n\n在 Objective-C\
  \ 中，我们需要在两个主要区域执行有效性检查。这是第一个：\n\n![images](img/U1304.jpg)\n\n在这个示例中，我们尝试创建一个对象，但我们检查返回的指针是否为\
  \ `nil`。回顾一下，`nil` 对象基本上是一个默认的空对象，用作表示“空”或“无”的占位符。不要将其与一个空的 `MyObject` 混淆，因为两者不是一回事。\n\
  \n第二个有效性检查仅适用于我们创建的对象。这个检查是在类的 `init` 方法中完成的：\n\n![images](img/U1305.jpg)\n\n在这个示例中，在对象的\
  \ `init` 方法里，程序显式地测试 `self` 是否返回了一个非 `nil` 的值。如果 `self` 不是 `nil`，说明一切正常，该方法可以继续初始化对象。然后，该方法返回\
  \ `self`，它可能是 `nil` 也可能不是。这里要注意的重点是，我们在继续处理 `self` 之前，先测试了对 `[super init]` 的调用是否成功。\n\
  \n### 关于 ARC 的说明\n\n虽然我们介绍了许多在不使用 ARC 时手动处理内存的方法，但建议你在任何新创建的项目中使用 ARC。你在这里学到的是，尽管\
  \ ARC 隐藏了内存是如何被保留和释放的细节，但理解底层真正发生的事情仍然很重要。\n\n### 总结\n\n本章我们涵盖了不少内容。希望你现在对内存、地址和指针的工作方式有了更清晰的理解。在本章中，我们介绍了以下内容：\n\
  \n*   定义内存\n*   使用二进制、十进制和十六进制\n*   定义和使用内存地址\n*   定义和使用指针\n*   定义和使用解引用运算符\n* \
  \  分配内存\n*   使用自动变量并注意陷阱，以免造成内存泄漏\n*   释放内存和防止内存泄漏，包括使用 `dealloc` 方法\n*   使用特殊指针\
  \ `NULL` 和 `nil`\n*   理解使用 ARC 的内存管理\n*   使用 Objective-C 及其 retain/release 模型管理内存\n\
  *   检测内存分配出错的情况。\n\n本章内容非常丰富，恭喜你坚持了下来。理解内存如何在 Mac、iPhone、iPad 或任何计算设备上工作是至关重要的。\n\
  \n### 练习\n\n*   在下面的内存空间中，这个内存块有多大？这块内存中最后一个字节的地址是什么？\n\n![images](img/U1306.jpg)\n\
  \n*   使用 代码清单 12-1 中的代码，尝试确定以下语句会做什么以及为什么：\n    *   `*(aPointer + 2) = '1';`\n \
  \   *   `(aPointer + 2) = '1';`\n*   查看 `NSMutableArray` 类的 `addObject` 方法的 Apple\
  \ 开发者文档。\n    *   `NSMutableArray` 类的 `addObject:` 方法与 `NSMutableDictionary` 类的\
  \ `setObject:forKey:` 方法有什么不同？\n    *   使用 `NSMutableArray` 将如何改变 代码清单 13–1 中的代码（如果有变化的话）？\n\
  \n## 第 14 章\n\n\n\n"
- "# Xcode 调试器介绍\n\n`Xcode` 非常出色！这款工具不仅可以在苹果开发者网站上免费获取，而且实际上真的非常、非常棒！除了能够用来创建下一款出色的\
  \ Mac OS X、iPhone 或 iPad 应用之外，`Xcode` 还内置了一个功能强大的调试器。\n\n那么，调试器到底是什么呢？首先，我们要明确一点：程序会*严格*按照编写的内容执行。有时，程序实际所写的功能与预期应实现的功能并不完全一致。这有时会导致程序崩溃，或者仅仅是无法按预期运行。无论哪种情况，当程序无法按计划运行时，我们就说程序存在**缺陷（bugs）**。而检查代码并修复这些问题的过程，就被称为**调试（debugging）**。\n\
  \n关于术语“bug”的真正起源仍存有一些争议，但一个记录详实的案例发生在 1947 年，涉及已故的海军后备役军官、当时的程序员格蕾丝·霍珀（Grace Hopper）少将。霍珀和她的团队当时正试图解决哈佛马克二型计算机的一个问题。一名团队成员在电路中发现了一只飞蛾，正是它导致其中一个继电器出现故障。霍珀后来被引用说：“从那时起，每当计算机出问题，我们就说它里面有‘bug（虫子）’了。”^(1)\n\
  \n无论起源如何，这个术语保留了下来，全世界的程序员都使用调试器（例如 `Xcode`）来帮助查找程序中的错误。真正进行调试的是人；调试工具只是帮助程序员定位问题。任何调试器，无论其名称如何暗示，都不会自己修复问题。\n\
  \n本章将重点介绍 `Xcode` 调试器的一些更重要的功能，并解释如何使用它们。完成本章后，你应该能对 `Xcode` 调试器以及一般的调试过程有足够深入的了解，从而能够搜索并修复大部分编程问题。\n\
  \n__________\n\n¹ Michael Moritz, Alexander L. Taylor III, and Peter Stoler, “The\
  \ Wizard Inside the Machine,” Time, Vol.123, no. 16: pp. 56–63\n\n## 开始调试\n\n如果你曾经为了捕捉到电影全速播放时无法看清的细节而慢放观看，那么你实际上已经使用了一种类似于调试的工具。逐帧播放电影以揭示你想寻找的细节，这个思路与我们调试程序时应用的思路是相同的。对于程序来说，有时有必要放慢速度来看看发生了什么。调试器允许我们通过两个主要功能来实现这一点：设置断点并逐行单步执行程序——稍后将详细介绍这两个功能。我们先来看看如何进入调试器以及它的界面。\n\
  \n首先，我们需要加载一个现有的程序。本章的示例使用了第 8 章中的 `MyBookstore` 项目，因此请打开 `Xcode` 并加载 `MyBookstore`\
  \ 项目。\n\n其次，确保在运行方案（Run Scheme）中选择了 **Debug** 配置，如图 14-1 所示。要编辑当前方案，请从主菜单栏选择 Product![images](img/U001.jpg)Edit\
  \ Scheme。**Debug** 是默认选项，因此你可能无需更改。这一步很重要，因为如果配置是 **Release**，调试将完全无法工作！\n\n![images](img/1401.jpg)\n\
  \n**图 14-1.** *选择调试配置。*\n\n虽然我们不会在本书中讨论 `Xcode` 方案（Schemes），但只需知道，默认情况下，`Xcode`\
  \ 为你创建的任何 Mac OS X 或 iOS 项目都提供了 **Release** 和 **Debug** 两种配置选项。就本章而言，主要区别在于发布（Release）配置不会添加调试应用程序所需的任何程序信息，而调试（Debug）配置则会。\n\
  \n### 设置断点\n\n要查看程序内部发生了什么，我们需要让程序在我们作为程序员感兴趣的特定位置暂停。**断点**允许我们做到这一点。在图 14-2 中，我们在程序的第\
  \ 25 行设置了一个断点。要设置断点，只需将光标放在行号上（不是程序文本，而是程序文本左侧的数字 25 上）并单击一次。\n\n如果没有显示行号，请选择主菜单栏中的\
  \ Xcode ![images](img/U001.jpg) Preferences，然后点击“Text Editing”选项卡，并勾选“Line Numbers”复选框。\n\
  \n![images](img/1402.jpg)\n\n**图 14-2.** *我们的第一个断点*\n\n我们也可以通过将断点拖放到行号列的左侧或右侧来移除它。在图\
  \ 14-3 中，断点已被拖到列的左侧。在拖放过程中，断点会变成一团烟雾。\n\n![images](img/1403.jpg)\n\n**图 14-3.**\
  \ *断点在烟雾中消失。*\n\n设置和删除断点是非常简单的任务。还有其他方法可以删除断点，但这种方法是最有趣的！\n\n### 使用断点导航器\n\n对于小项目，知道所有断点的位置并不难。但是，一旦项目变得比我们那个小小的\
  \ `MyBookstore` 应用更大，管理所有断点就会变得有点困难。幸运的是，`Xcode` 4 提供了一种简单的方法来列出应用程序中的所有断点，称为断点导航器。可以通过单击导航栏中的断点导航器图标来访问它，如图\
  \ 14-4 所示。\n\n![images](img/1404.jpg)\n\n**图 14-4.** *在 Xcode 4 中访问断点导航器*\n\n单击后，它将列出应用程序中当前定义的所有断点。在此处，单击某个断点将跳转到该断点所在的源文件。你也可以在此处轻松删除和禁用断点。\n\
  \n要禁用/启用一个断点，只需单击列表中（或任何出现该断点的地方）的蓝色断点图标即可。不要单击行号，必须是那个蓝色的小图标，如图 14-5 所示。\n\n![images](img/1405.jpg)\n\
  \n**图 14-5.** *使用断点导航器启用/禁用断点*\n\n有时，禁用断点而不是删除它会更方便，特别是当你计划之后还要在同一位置放置断点时。禁用断点实际上非常简单。只需单击现有的断点，它就会从深蓝色变为非常浅的蓝色。调试器不会在这些褪色的断点处停止，但它们仍然保留在原位，因此可以方便地重新启用，并作为代码中重要区域的标记。\n\
  \n也可以从断点导航器中删除断点。只需选择一个或多个断点，然后按 **delete** 键。确保你选择了正确的断点进行删除，因为此操作没有撤销功能。\n\n也可以选择与断点关联的文件。在这种情况下，如果你选择断点导航器中列出的文件并按\
  \ delete 键，该文件中的所有断点都将被删除。\n\n![images](img/1406.jpg)\n\n**图 14-6.** *包含多个断点的文件*\n\
  \n请注意，断点是指带有小断点图标的行，如图 14-5 所示。文件相对断点缩进显示；在图 14-5 中，文件是 `DetailViewController.m`\
  \ 和 `MasterViewController.m`。图 14-6 展示了一个文件包含多个断点的示例。\n\n\n\n#### 调试基础\n\n在图 14–2\
  \ 所示的语句上设置一个断点。接下来，如图 14–7 所示，点击**运行**按钮来编译项目，并在 Xcode 调试器中启动运行。\n\n![images](img/1407.jpg)\n\
  \n**图 14–7.** *Xcode 工具栏中的构建与调试按钮*\n\n项目构建完成后，调试器将启动；屏幕上会显示调试窗口，程序将在该语句行停止执行，如图\
  \ 14–8 所示。\n\n![images](img/1408.jpg)\n\n**图 14–8.** *调试器视图，执行停在第 25 行*\n\n调试器视图会添加一些额外的窗口。让我们来逐一了解图\
  \ 14–8 中调试器的各个部分。\n\n1.  **调试器控件**：（红色圆圈标注）调试控件可以暂停、继续、单步跳过、单步进入和单步跳出程序中的语句。其中单步执行控制最常用。左侧第一个按钮用于显示或隐藏调试区域。在图\
  \ 14–8 中，调试区域处于显示状态。\n2.  **变量：** 变量窗口显示当前作用域内的变量。点击变量名称左侧的小三角形即可展开它。\n3.  **输出窗口：**\
  \ 当程序崩溃或发生异常时，输出窗口会显示非常有用的信息。此外，所有 `NSLog` 的输出也会显示在此处。\n4.  **堆栈跟踪：** 堆栈显示对象堆栈以及程序中当前活动的所有线程。堆栈是一个层级视图，展示哪些方法正在被调用。例如，`main`\
  \ 调用 `UIApplication`，而 `UIApplication` 又调用 `AppDelegate` 类。这些方法调用会“堆叠”起来，直到最终返回，堆栈因此得名。\n\
  \n#### 使用调试器控件\n\n如前所述，调试器启动后，视图会发生变化。出现的是调试控件（图 14–8 中的项目 B）。这些控件相当直观，并在表 14–1\
  \ 中进行了说明。\n\n![images](img/t1401.jpg)\n\n#### 使用单步执行控件\n\n为了练习使用单步执行控件，让我们单步进入一个函数。顾名思义，**单步进入**按钮会跟随程序的执行，进入当前高亮的方法。请确保在\
  \ `MasterViewController.m` 文件中图 14–8 所示语句行（示例中的第 25 行，你的可能不同）设置了断点，然后点击运行按钮。你的屏幕应该与图\
  \ 14–9 类似。\n\n![images](img/1409.jpg)\n\n**图 14–9.** *调试器停在 25 行*\n\n点击**单步进入**按钮\
  \ ![images](img/U1401.jpg)，这将使调试器进入 `Bookstore` 对象的 `init` 方法。屏幕应该看起来像图 14–10。\n\
  \n![images](img/1410.jpg)\n\n**图 14–10.** *单步进入 `Bookstore` 对象的 `init` 方法*\n\n需要注意的是，调试器不仅进入了\
  \ `Bookstore` 对象，而且还切换到了 `Bookstore.m` 文件（之前它位于 `MasterViewController.m` 文件中）。\n\
  \n**单步跳过**控件 ![images](img/U1402.jpg) 会继续执行程序，但不会进入某个方法。它只是执行该方法并继续执行到下一行。**单步跳出**控件\
  \ ![images](img/U1403.jpg) 则有点像**单步进入**的反向操作。如果点击**单步跳出**按钮，当前方法会继续执行直至完成。然后调试器会返回到点击**单步进入**之前的那一行。例如，如果在图\
  \ 14–9 所示的代码行点击了**单步进入**按钮，然后又点击了**单步跳出**按钮，调试器将返回到 `MasterViewController.m` 文件中图\
  \ 14–9 所示的语句（示例中的第 25 行），即执行**单步进入**操作的那一行。\n\n#### 查看线程窗口与调用堆栈\n\n如前所述，线程窗口显示当前线程（在我们的程序中只有一个）。然而，它也显示了**调用堆栈**。比较图\
  \ 14–9 和 14–10 在线程窗口方面的差异，我们可以看到，图 14–10 中现在列出了 `[Bookstore init]` 方法，因为 `[MasterViewController\
  \ initWithNibName:bundle:]` 调用了 `[Bookstore init]` 方法。\n\n现在，调用堆栈不仅仅是一个*已经*被调用的函数列表；相反，它是一个当前*正在*被调用的函数列表。这是一个非常重要的区别。一旦\
  \ `init` 方法执行完毕并返回（第 17 行），`[Bookstore init]` 将不再出现在调用堆栈中。你可以把调用堆栈想象成一条面包屑踪迹。这条踪迹告诉了我们如何返回到最初开始的地方。\n\
  \n#### 调试变量\n\n通过将鼠标悬停在变量上，可以查看变量的一些信息（除了它的内存地址）。在我们当前的 `Bookstore` 示例中，所有变量都是通过属性合成的。问题在于，它们无法通过调试器直接看到。因此，为了让调试器实际显示这些变量，我们必须显式地声明它们。要这样做，只需导航到\
  \ `Book.h` 头文件，并添加一个名为 `title` 的实例变量，如图 14–11 所示。\n\n![images](img/1411.jpg)\n\n\
  **图 14–11.** *添加一个名为 `title` 的显式实例变量*\n\n（如果你当前正在运行应用程序，在修改 `Book.h` 文件之前，请先点击左上角的停止图标）。接下来，运行应用程序。调试器应该会停在我们在图\
  \ 14–9 中放置的断点处。单步进入该语句；这会将调试器带到 `Bookstore.m` 文件。接着，使用单步跳过命令逐步执行代码，直到调试器指向“`newBook.author\
  \ = …`”这一行。\n\n将光标放在 `newBook` 变量出现的任何位置，并展开 `Book` 对象。你应该会看到图 14–12 中显示的内容。\n\n\
  ![images](img/1412.jpg)\n\n**图 14–12.** *将鼠标悬停在 `newBook` 变量上会显示一些信息*\n\n将鼠标悬停在\
  \ `newBook` 变量上会显示它的信息。此变量是在该方法中声明的一个局部变量。它也可以在左下角的变量窗口中看到。在图 14–12 中，你可以看到展开的 `newBook`\
  \ 变量；它显示了与悬停查看相同的信息。\n\n`newBook` 变量中的相关信息是 `NSCFConstantString` 变量。为简化问题，只需知道 `NSCFConstantString`（Core\
  \ Foundation 字符串）仍然是我们在构建 `Book` 类时使用的 `NSString` 类。“Core Foundation” 就是 Apple 为程序员提供的基础库类。最右侧的信息（调试器中灰色文本）是该类字符串的实际值。当变量的内容发生变化时，调试器会以蓝色斜体高亮显示变量的新内容，就像你在图\
  \ 14–13 的变量窗口中所看到的那样。由于这些是 `newBook` 类的新值，因此这些值显示为蓝色和斜体。对于未更改的值，调试器会将其保留为灰色且非斜体。\n\
  \n![images](img/1413.jpg)\n\n**图 14–13.** *在变量窗口中，值的变化会以蓝色斜体高亮显示。*\n\n\n\n### 处理代码错误和警告\n\
  \n虽然代码错误和警告并非 Xcode 4 调试器的真正组成部分，但修复它们却是整个调试过程的一部分。在程序运行之前（无论是否使用调试器），必须修复所有错误。警告不会阻止程序构建，但可能在程序执行期间引发问题。最好是完全没有任何警告。\n\
  \n让我们来看几种不同类型的错误。首先，我们在代码中添加一个错误。在 `MasterViewController.m` 文件的第 25 行，将\n\n```\n\
  [[BookStore alloc] init]\n```\n\n改为\n\n```\n[[BookStore alloc] initialize].\n```\n\
  \n保存更改，然后按 ![images](img/U002.jpg)+B 构建项目来构建程序。这时会出现一个错误，如图 14-14 所示，该错误可能立即显示，也可能在构建后显示。\n\
  \n![images](img/1414.jpg)\n\n**图 14-14.** *在 Xcode 中查看错误*\n\n接下来，我们点击带有感叹号的三角形图标，切换到问题导航器窗口，如图\
  \ 14-15 所示。此视图显示程序中当前的所有错误和警告——不仅仅是当前文件 `MasterViewController.m`，而是所有文件。错误以红色八边形内的白色感叹号显示。在我们的例子中，只有一个错误。另外，如果错误信息超出屏幕范围或难以阅读，只需将鼠标悬停在问题导航窗口的错误上，即可显示完整的错误信息。\n\
  \n![images](img/1415.jpg)\n\n**图 14-15.** *查看问题导航器窗口*\n\n通常，错误会指向实际问题。在上面的例子中，`BookStore`\
  \ 对象不知道一个名为 `initialize` 的方法。\n\n**提示：** 在构建项目时遇到此错误，通常意味着方法名称拼写错误，或者没有包含正确的头文件来让编译器识别该方法。如果你知道该方法确实存在，请检查头文件是否已包含。否则，可能只是一个拼写错误。\n\
  \n好了，让我们将单词 `initialize` 改为 `init` 来修复这个错误。\n\n#### 警告\n\n警告表明程序存在潜在问题。如上所述，警告不会阻止程序构建，但可能在程序执行期间引发问题。全面介绍那些可能在程序执行期间引发问题的警告超出了本书的范围；不过，消除程序中的所有警告是一个好习惯。\n\
  \n将 `MasterViewController.m` 文件中包含 `@synthesize MasterViewController` 的行（下图中第 14\
  \ 行；你的行号可能不同）注释掉，方法是在 `@synthesize myBookStore` 前面加上两个斜杠，如图 14-16 所示。然后按 ![images](img/U002.jpg)+B\
  \ 构建项目。\n\n![images](img/1416.jpg)\n\n**图 14-16.** *在问题导航器中查看警告*\n\n遗憾的是，该警告并未在\
  \ `MasterViewController.m` 文件中显示。点击问题导航器中的第一个警告，我们将定位到第一个问题，如图 14-17 所示。\n\n![images](img/1417.jpg)\n\
  \n**图 14-17.** *查看我们的第一个警告*\n\n在主窗口中，我们可以看到警告。实际上，这个警告为我们提供了一些关于代码问题的线索。警告内容如下：\n\
  \n> *“属性 ‘myBookStore’ 需要定义方法 ‘myBookStore’ – 请使用 @synthesize、@dynamic 或提供方法实现。”*\n\
  \n我们的代码中有一个 `@property`，但由于我们将其注释掉了，所以没有对应的 `@synthesize`。编译器将此视为警告，因为该方法可能在运行时被动态提供。然而，在我们的例子中，我们并没有这样做；我们只是没有在实现文件中包含\
  \ `@synthesize` 关键字。\n\n要解决此问题，只需导航回 `MasterViewController.m` 文件，并移除我们刚刚在第 14 行添加的注释。要导航回文件列表，请点击*文件夹*图标，如图\
  \ 14-18 所示（或直接点击编辑窗口顶部的返回按钮）。\n\n![images](img/1418.jpg)\n\n**图 14-18.** *导航回文件列表并修复警告问题*\n\
  \n### 本章小结\n\n在本章中，我们涵盖了免费的 Apple Xcode 调试器的高级功能。无论价格如何，Xcode 都是一个出色的调试器。具体来说，在本章中，你学到了以下内容：\n\
  \n- 术语“bug”的起源以及什么是调试器；\n- Xcode 调试器的高级功能：\n  - 断点\n  - 单步执行程序；\n- 如何使用调试控件：\n \
  \ - 任务（停止标志），\n  - 重启与继续（暂停），\n  - 单步跳过，\n  - 单步进入，\n  - 单步跳出；\n- 使用各种调试器视图：\n \
  \ - 线程（调用堆栈），\n  - 变量，\n  - 文本编辑器，以及\n  - 输出；\n- 查看程序变量；以及\n- 处理错误和警告。\n\n## 索引\n\
