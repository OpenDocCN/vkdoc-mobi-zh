  \n## 摘要\n\n我们终于到达了这一章的结尾！以下是我们所涵盖内容的总结。\n\n- **理解集合类：** 集合类是一组非常强大的类，随 Foundation\
  \ 框架一起提供，允许我们高效地存储和检索信息。\n- **使用实例变量：** 实例变量是在类的接口文件中定义的变量，在类被实例化后即可访问。\n- **使用属性：**\
  \ 属性是创建 getter 和/或 setter 的简短方式。Getter 和 setter 用于获取或设置实例变量的值。\n- **使用`for...in`循环：**\
  \ 这个特性提供了一种新的方式来遍历枚举列表中的项。\n- **构建主从应用程序：** 我们使用 Xcode 和主从模板构建了一个简单的 Bookstore 程序，用于显示书籍和单本书的详细信息。\n\
  - **简单的数据模型：** 使用我们学习到的集合类，我们使用`NSMutableArray`构建了一个 Bookstore 对象，并将其用作 Bookstore\
  \ 程序中的数据源。\n- **将数据连接到视图：** 我们使用 Xcode 将`Book`对象的数据连接到界面字段。\n\n### 练习\n\n- 参考原始程序，向\
  \ Bookstore 中添加更多书籍。\n- 增强`Book`类，使其能够存储另一个属性——例如价格或 ISBN 号。\n- 修改`DetailViewController`，使其显示新的字段。记得将界面控件连接到实例变量。\n\
  - 修改`Bookstore`对象，使其调用一个单独的方法来初始化`Book`对象列表（而不是将所有内容放在`init`方法中）。\n- `UITableViewCell`还有一个名为`detailTextLabel`的属性。尝试使用它，将其文本属性设置为某些内容。\n\
  - 使用 Xcode 修改界面，尝试更改`DetailViewController.xib`文件的背景颜色。\n\n更难的挑战：\n\n- 对`Bookstore`对象中的书籍进行排序，使它们在`MasterDetailView`上按升序显示。\n\
  \n"
- "# 第 9 章\n\n## 比较数据\n\n在本章中，我们将讨论编程中最基本也是最频繁的操作之一：比较数据。在我们的 Bookstore 示例中，如果客户正在寻找特定的书籍，您可能需要比较书名。如果客户有兴趣购买特定作者的书，您可能还需要比较作者。比较数据是开发人员执行的常见任务。您在上一章中学到的许多循环都需要您比较数据，以便知道代码何时应停止循环。\n\
  \n编程中的比较就像使用天平。一端有一个值，另一端有另一个值。中间有一个运算符。运算符决定了进行哪种比较。运算符的示例包括\"大于\"、\"小于\"或\"等于\"\
  。\n\n天平两端的值通常是变量。我们在第 3 章中学习了不同类型的变量。通常，不同变量的比较函数会略有不同。您必须非常熟悉比较数据的函数和语法，因为这将是您开发的基础。\n\
  \n在本章中，我们将使用一个 Bookstore 应用程序的示例。该应用程序将允许用户登录应用程序、搜索书籍以及购买书籍。我们将尝试联系比较数据的不同方式，以展示它们在这类应用程序中是如何使用的。\n\
  \n\n\n## 重温布尔逻辑\n\n在前面的章节中，我们介绍了布尔逻辑。由于它在编程中非常普遍，本章将重新审视这个主题，并进行更详细的讨论。\n\n你将编写应用程序执行的最常见的比较就是布尔逻辑。布尔逻辑通常以\
  \ `if` `then` 语句的形式出现。布尔逻辑只能有“是”或“否”两个答案之一。以下是一些你将在应用程序中使用的布尔问题的好例子：\n\n*   `5`\
  \ 比 `3` 大吗？\n*   “now”的字母数超过 `5` 吗？\n*   `2010 年 6 月 1 日` 晚于今天吗？\n\n请注意，这些问题的正确答案只有两个可能：“是”和“否”。如果你提出的问题可能有超过两个答案，那么该问题需要以不同的措辞来进行编程。\n\
  \n这些问题中的每一个都将由一个 `if` `then` 语句来表示（例如，如果 `5` 大于 `3`，则向用户打印一条消息）。每个 `if` 语句都必须有某种关系运算符。关系运算符可以是“大于”或“等于”之类的。\n\
  \n为了开始在程序中使用这类问题，你首先需要熟悉 C 和 Objective-C 语言中可用的不同关系运算符。我们将首先介绍这些。之后，我们将探讨不同的变量如何与这些运算符一起工作。\n\
  \n## 使用关系运算符\n\nObjective-C 使用 6 个标准的关系运算符。这些是标准的代数运算符，只有一个真正的变化：在 Objective-C 语言中，与大多数其他编程语言一样，等于运算符由两个等号（`==`）构成。在第\
  \ 4 章的表 4-7 中，我们描述了作为开发者可以使用的不同运算符。\n\n**注意：** 单个等号（`=`）用于给变量赋值。需要两个等号（`==`）来比较两个值。例如，`if(x=9)`\
  \ 会将值 `9` 赋值给变量 `x`，并且如果 `9` 成功赋值给 `x`，它将返回“是”，这在大多数（如果不是全部）情况下都会发生。而 `if(x==9)`\
  \ 实际上会执行一个比较，以检查 `x` 是否等于 `9`。\n\n### 比较数字\n\n过去开发者面临的一个难题是在比较中处理不同的数据类型。在本书的前面部分，我们讨论了不同类型的变量。你可能还记得\
  \ `1` 是一个整数。如果你想将一个整数与一个浮点数（如 `1.2`）进行比较，这可能会引起一些问题。幸运的是，Objective-C 在这方面帮了我们。在\
  \ Objective-C 中，你可以比较任何两个数值数据类型，而无需进行类型转换（在处理其他数据类型时，有时仍然需要进行类型转换，我们将在本章后面讨论这一点）。这让你可以编写代码，而无需担心需要比较的数据类型。\n\
  \n**注意：** 类型转换是一种将数字从一种类型转换为另一种类型的过程。\n\n在我们的应用中，我们需要以多种方式比较数字。例如，假设我们的书店为单次交易消费超过\
  \ `30` 美元的顾客提供折扣。我们需要计算顾客的总消费金额，然后将其与 `30` 美元进行比较。如果消费金额大于 `30` 美元，我们需要计算折扣。请参考以下示例。\n\
  \n```\nfloat totalSpent;\nint discountThreshhold;\nint discountPercent;\n\ndiscountThreshold=30;\n\
  discountPercent=0;\ntotalSpent=calculateTotalSpent();\n\nif(totalSpent>discountThreshold)\
  \ {\n        discountPercent=10;\n}\n```\n\n让我们逐行分析这段代码。首先，我们声明变量（`totalSpent`、`discountThreshhold`\
  \ 和 `discountPercent`）。正如我们在第 3 章中讨论的，如果数字可能包含小数，我们应该将其声明为 `float` 而不是 `int`。我们知道\
  \ `discountThreshold` 和 `discountPercent` 不会包含小数，因此我们可以将它们声明为 `int`。在这个例子中，我们假设有一个名为\
  \ `calculateTotalSpent` 的函数，它会计算当前订单的总消费额。然后我们简单地检查总消费额是否大于折扣阈值；如果是，我们就设置折扣百分比。还请注意，在比较不同的数值数据类型时，无需告知代码转换数据。正如我们之前提到的，这一切都由\
  \ Objective-C 处理。\n\n另一个需要比较数字的操作是循环。正如在第 4 章中讨论的，循环是开发中的核心操作，许多循环类型都需要某种比较来确定何时停止。让我们看一个\
  \ `for` 循环的例子。\n\n```\nint numberOfBooks;\nnumberOfBooks=50;\n\nfor (int y = 1;\
  \ y <= numberOfBooks; y++) {\n     doSomething();\n}\n```\n\n在这个例子中，我们遍历（即循环）书店中图书的总数。`for`\
  \ 语句是开始发生有趣事情的地方。让我们分解一下。\n\n```\nint y=1;\n```\n\n这部分代码将 `y` 声明为 `int` 类型，然后为其分配一个起始值\
  \ `1`。\n\n```\ny <= numberOfBooks;\n```\n\n这部分告诉计算机检查我们的计数变量 `y` 是否小于或等于我们商店中图书的总数。如果\
  \ `y` 变得大于图书数量，循环将不再运行。\n\n```\ny++\n```\n\n这部分代码每次循环运行时，将 *y* 增加 `1`。\n\n\n\n###\
  \ 创建示例 Xcode 应用\n\n现在我们来创建一个 Xcode 应用，以便开始比较数值数据。\n\n1.  启动 Xcode。在你的硬盘驱动器中，依次进入\
  \ `Developer`![images](img/U001.jpg)`Applications` 文件夹。将该文件夹拖到 Dock 栏中，因为在本书余下部分我们会经常用到它。请参见图\
  \ 9-1。\n\n![images](img/0901.jpg)\n**图 9-1.** *启动 Xcode*\n\n2.  点击“Create a New\
  \ Xcode Project”以打开一个新窗口。在该窗口左侧，iOS 下方，选择 Application。然后在右侧选择 Single View Application。点击\
  \ Next。\n\n**注意：** Window-Based Application 是 iOS 应用类型中最通用、最基本的一种。\n\n![images](img/0902.jpg)\n\
  **图 9-2.** *创建新项目*\n\n3.  在下一页，输入你的应用名称。我们使用了 `Comparison` 作为名称，但你可以选择任何你喜欢的名称。这个窗口也是你选择目标设备的地方。我们暂时将其保持为\
  \ Universal。请参见图 9-3。\n\n![images](img/0903.jpg)\n**图 9-3.** *选择项目类型和名称*\n\n**注意：**\
  \ Xcode 项目默认保存在你的用户主目录下的 Documents 文件夹中。\n\n4.  新项目创建后，你会看到标准的 Xcode 窗口。点击 `Comparison`\
  \ 文件夹旁边的展开箭头以展开它。你会看到两个文件：`ComparisonsAppDelegate.m` 和 `ComparisonsAppDelegate.h`。`.h`\
  \ 文件是头文件，此时我们不会对其做任何更改。实际文件名会根据你在创建项目时使用的名称而有所不同。在本示例中，我们将只关注 `ComparisonsAppDelegate.m`\
  \ 文件。\n5.  双击 `main.c` 文件，你会看到以下代码：\n    ```\n    #import \"ComparisonsAppDelegate.h\"\
  \n    @implementation TestingComparisonsAppDelegate\n    @synthesize window=_window;\n\
  \n    - (BOOL)application:(UIApplication *)application\n        didFinishLaunchingWithOptions:(NSDictionary\
  \ *)launchOptions\n        {\n            // Override point for customization after\
  \ application launch.\n            [self.window makeKeyAndVisible];\n\n    }\n \
  \   ```\n6.  此时，我们的应用只会启动并显示一个窗口。我们将为应用添加一点“Hello World”内容。在 `[self.window makeKeyAndVisible]`\
  \ 这一行之后，我们需要添加以下代码：`NSLog(@\"Hello World\");`\n\n这行代码会创建一个内容为“Hello World”的新 `NSString`，并将其传递给用于调试的\
  \ `NSLog` 函数。\n\n让我们运行应用看看效果如何。\n\n1.  点击默认工具栏中的 Run 按钮。\n2.  iOS 模拟器将启动，并显示一个窗口。回到\
  \ Xcode，一个调试窗口会出现在屏幕底部，如图 9-4 所示。你可以随时通过选择 `View`![images](img/U001.jpg)`Show Debug\
  \ Area` 来切换显示此窗口。\n\n![images](img/0904.jpg)\n**图 9-4.** *调试器窗口*\n\n这个窗口中的大部分信息对你来说意义不大。最重要的一行是加粗部分，它实际显示了你的应用的输出。该行的第一部分显示了日期、时间和应用名称。“Hello\
  \ World”部分是由我们之前添加的 `NSLog` 行生成的。\n\n1.  回到应用，打开 `ComparisonsAppDelegate.m` 文件。\n\
  2.  找到以 `NSLog` 开头的行。正是这行负责打印“Hello World”部分。我们将通过在这行代码前面加上两个反斜杠（`//`）来注释掉它。注释掉代码会告诉\
  \ Xcode 在构建和运行应用时忽略这行代码。被注释掉的代码不会运行。\n3.  一旦你注释掉这行代码，再次运行程序时就看不到加粗的那一行了，因为应用不再输出任何内容。\n\
  4.  为了让应用输出我们比较的结果，我们需要添加一行代码：`NSLog(@\"The result is %@\", (6>5 ? @\"True\" : @\"\
  False\"));`\n\n**注意：** 上述代码 `(6>5 ? @\"True\" : @\"False\")` 被称为三元运算。它本质上只是编写 If/Then\
  \ 语句的一种简化方式。\n\n5.  将这行代码放入你的代码中。这行代码告诉你的应用打印“The result is”。然后，如果 6 大于 5，它会打印“True”；如果\
  \ 5 大于 6，则打印“False”。\n\n因为 6 大于 5，所以它会打印出 `True`。\n\n你可以更改这行代码，以测试本章中我们编写的任何示例，或者我们之后会编写的任何示例。\n\
  \n让我们尝试另一个示例。\n\n```\nint i=5;\nint y=6;\nNSLog(@\"The result is %@\", (y>i ? @\"\
  True\" : @\"False\"));\n```\n\n在这个示例中，我们创建了一个整数并将其值赋为 5。然后我们创建了另一个变量并将其值赋为 6。接着我们修改了\
  \ `NSLog` 示例，改为比较变量 `i` 和 `y`，而不是使用具体的数字。当你运行这个示例时，会得到以下结果：\n\n![images](img/0904a.jpg)\n\
  **图 9-4.** *NSLog 输出*\n\n我们现在将探讨其他类型的比较，然后回到我们的应用，测试其中的一些。\n\n## 使用布尔表达式\n\n布尔表达式是所有比较中最简单的一种。布尔表达式用于确定一个值是真还是假。假被定义为\
  \ 0，真被定义为非零。例如：\n\n```\nint j;\nj=5;\nif(j) {\n        some_code();\n}\n```\n\n\
  `if` 语句始终会被评估为 `true`，因为我们的变量 `j` 不等于零或空。因此，我们的程序会运行 `some_code()` 方法。\n\n```\n\
  int j;\nj=0;\nif(j) {\n        some_code();\n}\n```\n\n如果我们更改 `j` 的值，该语句会被评估为 `false`，因为现在\
  \ `j` 等于 0。这可以与 `BOOL` 和数字变量一起使用。\n\n```\nint j;\nj=0;\nif(!j) {\n        some_code();\n\
  }\n```\n\n在布尔表达式前加上一个感叹号会将其值变为相反值（`false` 变成 `true`，`true` 变成 `false`）。现在这行代码询问的是“如果不等于\
  \ `j`”，在本例中结果为 `true`，因为 `j` 等于 0。这是一个使用整数充当布尔变量的例子。正如我们之前讨论的，Objective C 也有名为 `BOOL`\
  \ 的变量，它只有两个可能的值：`YES` 或 `NO`。\n\n**注意：** 许多编程语言使用 `TRUE` 和 `FALSE` 这两个术语，而 Objective\
  \ C 使用的是 `YES` 和 `NO`。在开发 Objective C 时，C 语言还没有真正的布尔变量。\n\n让我们来看一个与书店相关的例子。我们有一个常客俱乐部，所有会员在购买任何书籍时均可享受\
  \ 15% 的折扣。这很容易检查。我们只需将变量 `clubMember` 设置为：如果是会员则设为 `YES`，如果不是则设为 `NO`。以下代码将仅对俱乐部会员应用折扣：\n\
  \n```\nint discountPercent;\nBOOL clubMember;\n\nclubMember=FALSE;\ndiscountPercent=0;\n\
  if(clubMember) {\n        discountPercent=15;\n}\n```\n\n\n\n## 比较字符串\n\n对于大多数 C\
  \ 语言来说，字符串是一种非常棘手的数据类型。在 ANSI C（或标准 C）中，字符串仅仅是一个字符数组。而 Objective-C 则进一步推动了字符串的发展，将其转化成一个名为`NSString`的对象。当我们使用对象时，可以调用更多的属性和方法。幸运的是，`NSString`提供了许多用于比较数据的方法，这大大简化了我们的工作。\n\
  \n在为 Mac 和 iPhone 进行开发时，你既能使用`NSString`，也能使用标准的 C 字符串。在本书的范围内，我们将重点放在比较`NSString`对象上。如果你的应用程序中包含\
  \ C 类型的字符串，则需要将它们转换为`NSString`，才能使用本书中的代码。幸运的是，这种转换非常简单。\n\n```\nchar *myCString;\n\
  NSString *myNsstring;\n\nmyCString = \"testing a string\";\nmyNsstring = [NSString\
  \ stringWithUTF8String: myCString];\n```\n\n前两行是你之前见过的代码，是变量声明。你声明了一个名为`myCString`的标准\
  \ C 字符串，以及一个名为`myNsstring`的`NSString`。第三行只是对标准 C 字符串的简单初始化，我们为其赋值。\n\n最后一行是关键所在。我们将`NSString`对象赋值为一个新创建的`NSString`对象，该对象的值来源于一个`UTF8string`，并将其传递给已创建的标准\
  \ C 字符串。一旦你将所有标准 C 字符串都转换为`NSString`，就能充分利用该类提供的强大比较功能。\n\n让我们看另一个示例。这里，我们将比较密码，以判断是否允许用户登录。\n\
  \n```\nNSString *enteredPassword, *myPassword;\n\nmyPassword=@\"duck\";\nenteredPassword=@\"\
  Duck\";\nbool continueLogin=NO;\n\nif([enteredPassword isEqualToString:myPassword])\
  \ {\n        continueLogin=YES;\n}\n```\n\n第一行声明了两个`NSString`变量。接下来两行初始化了这些字符串。请记住，在使用任何对象之前，都需要先初始化它们。在实际代码中，你需要从用户那里获取`enteredPassword`字符串。这几行代码使用了一种快捷方式。请注意\
  \ C 风格字符串前的`@`符号。`@`符号会根据其后的 C 风格字符串创建一个新的`NSString`。\n\n下一行是实际完成工作的代码部分。我们向`enteredPassword`对象发送了一条消息，询问它是否与`myPassword`字符串相等。该方法始终需要传入一个`NSString`对象。这段示例代码的结果始终为`false`，因为`enteredPassword`中包含大写字母，而`myPassword`中都是小写字母。\n\
  \n**注意：** 如果你需要比较两个`NSString`而忽略大小写，只需使用`caseInsensitiveCompare`方法，而不是`isEqualToString`。\n\
  \n你还可能需要对字符串执行许多其他不同的比较操作。例如，你可能想要检查某个字符串的长度。这很容易实现。\n\n```\nNSString *enteredPassword;\n\
  NSString *myPassword;\nmyPassword=@\"duck\";\nenteredPassword=@\"Duck\";\nbool continueLogin=NO;\n\
  \nif([enteredPassword length] > 5) {\n        continueLogin=YES;\n}\n```\n\n这段代码会检查输入的密码长度是否大于\
  \ 5 个字符。\n\n其他时候，你可能需要在一个字符串中搜索某些数据。幸运的是，Objective-C 让这件事变得非常简单。`NSString`提供了一个名为`rangeOfString`的函数，允许你在一个字符串中搜索另一个字符串。`rangeOfString`函数只接受一个参数，即你要搜索的字符串。\n\
  \n```\nNSString *searchTitle, *bookTitle;\nsearchTitle=@\"Sea\";\nbookTitle=@\"\
  2000 Leagues Under the Sea\";\n\nif([bookTitle rangeOfString:searchTitle].location\
  \ !=NSNotFound) {\n        addToResults();\n}\n```\n\n这段代码与我们之前检查过的其他示例非常相似。此示例接受一个搜索词，并检查书名中是否包含该搜索词。如果包含，则将该书添加到结果中。这可以进行调整，允许用户在书名、作者甚至描述中搜索特定词条。\n\
  \n**注意：** 默认情况下，所有字符串搜索都是区分大小写的。如果你想在字符串内搜索而忽略大小写，可以将前面的调用：\n\n`[bookTitle rangeOfString:\
  \ searchTitle]`\n\n改为：\n\n`[bookTitle rangeOfString: searchTitle options:NSCaseInsensitiveSearch]`\n\
  \n有关`NSString`支持的方法的完整列表，请参阅苹果文档：[`http://developer.apple.com/mac/library/documentation/cocoa/reference/Foundation/Classes/NSString_Class/Reference/NSString.html`](http://developer.apple.com/mac/library/documentation/cocoa/reference/Foundation/Classes/NSString_Class/Reference/NSString.html)。\n\
  \n\n\n## 比较日期\n\n在任何编程语言中，日期都是一种相当复杂的变量类型，而不幸的是，根据你编写的应用程序类型，它们又非常常见。Objective-C\
  \ 以前使用 `NSCalendarDate` 类，但最近已被更新式的 `NSDate` 所取代。新的 `NSDate` 包含许多便捷方法，使得日期比较变得简单。我们将重点介绍\
  \ `compare` 函数。`compare` 函数返回一个 `NSComparisonResult` 类型，该类型有三个可能的值：`NSOrderedSame`、`NSOrderedDescending`、`NSOrderedAscending`。\n\
  \n```\nNSDate *today = [NSDate date];\n\n//促销日期为 2011/12/4\nNSDate *saleDate = [NSDate\
  \ dateWithString:@\"2011-12–04 04:00:00 -0700\"];\n\nNSComparisonResult result;\n\
  bool saleStarted;\n\nresult=[today compare:saleDate];\n\n        if(result==NSOrderedAscending)\
  \ {\n                //促销日期在未来\n                saleStarted=NO;\n        } else\
  \ if(result==NSOrderedDescending) {\n                //促销日期已过去\n               \
  \ saleStarted=YES;\n        } else {\n                //促销日期与今日相同\n            \
  \    saleStarted=YES;\n        }\n```\n\n这看起来好像只是为了比较日期而做了大量工作。让我们逐步分析这段代码，看看能否理解其含义。\n\
  \n`NSDate *today = [NSDate date];`\n`NSDate *saleDate = [NSDate dateWithString:@\"\
  2011-09–04 04:00:00 -0700\"];`\n\n这里，我们声明了两个不同的 `NSDate` 对象。第一个名为 `today`，用系统日期（即你的电脑或\
  \ iPad 日期）进行初始化。第二个名为 `saleDate`，用未来的某个日期进行初始化。我们将使用这个日期来判断促销是否已经开始。我们不会详细讨论 `NSDate`\
  \ 的初始化细节，但它可以使用 `dateWithString` 函数进行初始化，就像我们前面展示的那样。\n\n**注意：** 在大多数编程语言中，日期都按照特定的格式处理。通常以四位数的年份开头，后跟连字符，然后是两位数的月份，再跟连字符，最后是两位数的日期。如果您使用带时间的数据格式，这些数据的呈现方式通常也类似。时间通常以小时、分钟和秒的形式呈现，各部分之间用冒号分隔。Objective-C\
  \ 也支持时区。“-0700”告诉 Objective-C 该时间比格林威治标准时间（即山地标准时间）早 7 小时。\n\n`NSComparisonResult\
  \ result;`\n\n使用 `NSDate` 对象的 `compare` 函数的结果是一个 `NSComparisonResult` 类型。我们必须声明一个\
  \ `NSComparisonResult` 变量来捕获 `compare` 函数的输出。\n\n`result=[today compare:saleDate];`\n\
  \n这一行代码执行了两个日期的比较。它将结果 `NSComparisonResult` 存储到名为 `result` 的变量中。\n\n```\nif(result==NSOrderedAscending)\
  \ {\n//促销日期在未来\n        saleStarted=NO;\n} else if(result==NSOrderedDescending)\
  \ {\n//促销日期已过去\n        saleStarted=YES;\n} else {\n//促销日期与今日相同\n        saleStarted=YES;\n\
  }\n```\n\n现在我们需要找出变量 `result` 中的值。为此，我们执行一条 `if` 语句，将该结果与 `NSComparisonResult` 的三个不同选项进行比较。第一行判断促销日期是否大于今天的日期。这意味着促销日期在未来，因此促销尚未开始。我们将变量\
  \ `saleStarted` 设置为 `No`。下一行判断促销日期是否小于今天的日期。如果是，则促销已经开始，我们将 `saleStarted` 变量设置为\
  \ `Yes`。再下一行是 `else`。它涵盖了所有其他情况。不过我们知道，唯一剩下的情况是 `NSOrderedSame`。这意味着两个日期完全相同，因此促销刚开始。\n\
  \n还有其他方法可用于比较 `NSDate` 对象。每种方法在某些特定任务中会更高效。我们选择了 `compare` 方法，因为它能处理大部分基本的日期比较需求。\n\
  \n**注意：** 请记住，`NSDate` 同时包含日期和时间。这会影响你的日期比较，因为它不仅会比较日期，还会比较时间。\n\n## 组合比较\n\n正如我们在第\
  \ 4 章中讨论的，有时需要比单一比较更复杂的逻辑。这时就需要用到逻辑运算符。逻辑运算符使你能够同时检查多个不同的条件。例如，如果我们的图书俱乐部会员消费超过\
  \ 30 美元时享有特别折扣，我们可以写一条语句来检查。\n\n```\nfloat totalSpent;\n int discountThreshhold;\n\
  int discountPercent;\nBOOL clubMember = TRUE;\n\ndiscountThreshhold=30;\ndiscountPercent=0;\n\
  totalSpent=calculateTotalSpent();\n\nif(totalSpent > discountThreshhold && clubMember)\
  \ {\n        discountPercent=15;\n}\n```\n\n我们结合了上面的两个示例。新的比较行解读如下：如果 `totalSpent`\
  \ 大于 `discountThreshold` **并且** `clubMember` 为 `true`，则将 `discountPercent` 设置为 15。要使此条件返回\
  \ `True`，两个条件都必须为真。可以使用 `||` 代替 `&&` 来表示“或”。我们可以将上面这行代码改为：\n\n```\nif(totalSpent>\
  \ discountThreshhold|| clubMember) {\n        discountPercent=15;\n}\n```\n\n现在这行代码解读为：如果\
  \ `totalSpent` 大于 `discountThreshold` **或** `clubMember` 为 `true`，则设置折扣百分比。如果任意一个条件为\
  \ `true`，此条件将返回 `True`。\n\n你可以继续使用逻辑运算符，根据需求将任意数量的比较串联起来。在某些情况下，你可能需要使用括号将比较条件分组。这可能更复杂，超出了本书的讨论范围。\n\
  \n\n\n## 使用 Switch 语句\n\n到目前为止，我们已经看到了几个通过简单使用 `if` 语句和/或 `if`/`else` 语句来比较数据的示例。\n\
  \n```\nif (some_value == SOME_CONSTANT) {\n    ...\n} else if (some_value == SOME_OTHER_CONSTANT)\
  \ {\n    ...\n} else if (some_value == YET_SOME_OTHER_CONSTANT) {\n    ...\n}\n\
  ```\n\n如果要将某个特定的有序类型与若干常量值进行比较，你可以使用一种不同的方法来简化比较代码：`switch` 语句。\n\n**注意：** 有序类型是一种可以排序的\
  \ C 语言内置数据类型。例如 `int`、`long`、`char`、`BOOL`。\n\n`switch` 语句允许将一个或多个常量值与有序数据类型进行比较。这一点至关重要，需要理解。`switch`\
  \ 语句不允许将有序类型与变量进行比较。下面是一个正确的 `switch` 语句示例：\n\n```\nchar value;\nvalue = 'd';\n\n\
  switch (value) {        // switch 语句后跟一个左大括号\ncase 'a':       // 等同于 if (value ==\
  \ 'a')\n   ...                  // 在此处调用函数并在 case 之后放置任何其他语句\n   ...\nbreak;   \
  \               // 表示 \"case 'a':\" 语句的结束\ncase 'b':\n    ...\n    ...\nbreak;\n\
  case 'c':       // 如果 case 没有 break，程序会继续执行\ncase 'd':               //  因此，在这种情况下，如果\
  \ value 是 'c' 或 'd'，此代码块将被执行\n    ...\n    ...\nbreak;\ndefault:               \
  \  // default 是可选的，仅当没有与 'value' 匹配的 case 语句时使用\n   ...              // 所以，如果 value\
  \ 等于 'x'，则会执行 switch 语句的 default 部分\n   ...          // 因为没有 \"case 'x':\" 存在\n\
  break;\n}  // switch 语句结束\n```\n\n`switch` 语句非常强大，它简化并精简了将有序类型与若干可能常量进行的比较。话虽如此，这同时也是\
  \ `switch` 语句的局限性所在。例如，无法使用 `switch` 语句将 `NSString` 变量与一系列字符串常量进行比较。这是因为 `NSString`\
  \ 值不是有序类型。`switch` 语句还必须将有序类型与常量进行比较。因此，无法编写如下代码：\n\n```\nswitch (value) {\ncase\
  \ variable: //case 必须是常量，而不能是变量\n   ...\nbreak;\n```\n\n虽然这些看起来似乎是 `switch` 语句的严重限制，但\
  \ `switch` 语句仍然是一个非常强大的语句，可以用来简化某些 `if`/`else` 语句。\n\n### 总结\n\n本章到此结束！以下是涵盖内容的总结。\n\
  \n*   **比较**\n    *   数据比较是任何应用程序不可或缺的一部分。\n*   **关系运算符**\n    *   你了解了六种标准关系运算符及其各自的使用方法。\n\
  *   **整数**\n    *   整数是最容易比较的信息类型。你了解了如何在程序中使用整数比较以及如何实现它。\n*   **示例**\n    *  \
  \ 你创建了一个示例应用程序，在其中可以测试你的比较逻辑，确保其正确无误。\n    *   你了解了如何修改应用程序以添加不同类型的比较。\n*   **布尔值**\n\
  \    *   你了解了如何检查布尔值。\n*   **字符串**\n    *   你了解了字符串与你测试过的其他信息类型表现有何不同。你了解到了一些比较字符串时可能遇到的陷阱。\n\
  *   **对象**\n    *   你了解到比较对象可能相当困难，并且必须小心谨慎，以确保得到你期望的响应。\n\n### 练习\n\n*   修改示例应用程序，以比较一些字符串信息。可以是变量形式或字面量形式。\n\
  *   在你的应用程序中创建一个循环，使用你在本章布尔值部分学到的方法来显示一个数字。\n*   编写一个 Objective-C 应用，判断以下年份是否为闰年：1800、1801、1899、1900、2000、2001、2003\
  \ 和 2010。输出应以如下格式写入控制台：“2000 年是闰年”，或“2001 年不是闰年”。\n\n## 第 10 章\n\n## 创建用户界面\n\n\
  Interface Builder 是一款应用程序，它使 iPhone/iPad 和 Mac 开发者能够通过一个强大的图形用户界面轻松创建他们的用户界面。它提供了只需将对象从\
  \ Interface Builder 的库中拖拽到应用的用户界面上，即可构建用户界面的能力。\n\nInterface Builder 将你的用户界面设计存储在一个或多个资源文件中，这些文件称为\
  \ XIB。这些资源文件用于设置界面对象及其关系。你在用户界面上所做的更改会自动与 Xcode 同步。\n\n要构建用户界面，只需将对象从 Interface\
  \ Builder 的库面板拖拽到你的视图上。操作和输出口是 Interface Builder 的两个关键组件，它们帮助我们简化开发流程。\n\n我们的视图中对象触发的**操作**会连接到应用代码中的方法。在对象接口文件中声明的**输出口**（指针）会连接到特定的实例变量。请参见图\
  \ 10–1。\n\n**注意：** Interface Builder 曾经是一款独立的应用程序，开发者用它来设计用户界面。从 Xcode 4.0 开始，Apple\
  \ 将 Interface Builder 集成到了 Xcode 中。\n\n![images](img/1001.jpg)\n\n**图 10–1.** *Interface\
  \ Builder*\n\n## 理解 Interface Builder\n\n对于 iPhone 和 iPad 应用，操作系统负责管理其创建的对象的生命周期。这减轻了开发者的负担，如果开发者使用\
  \ Interface Builder 创建了对象，就无需再为其分配内存。\n\nInterface Builder 将用户界面文件保存为一个 bundle，其中包含应用中使用的界面对象和关系。这些\
  \ bundle 的文件扩展名是 “.NIB”。在 Interface Builder 3.0 版本中，采用了新的 XML 文件格式，文件扩展名改为 “.XIB”。然而，开发者们在提及或引用这些文件时，仍然称其为\
  \ “NIB” 文件。\n\n与大多数其他图形用户界面应用程序不同，NIB 通常被称为“冻干”文件，因为它们包含已归档的对象本身，并且可以随时运行。\n\nXML\
  \ 文件格式便于与 Subversion 和 Git 等源代码控制系统一起存储。\n\n在下一节中，我们将讨论一种称为“模型-视图-控制器”的应用设计模式。这种设计模式使开发者能够更轻松地维护代码，并在应用的整个生命周期中重用对象。\n\
  \n\n\n## 模型-视图-控制器\n\n`Model-View-Controller`（`MVC`）是 iPhone/iPad 开发中最常用的设计模式，学习它将极大简化你的开发者生涯。`MVC`\
  \ 被广泛应用于软件开发中，被视为一种架构模式。\n\n架构模式描述了开发者可在代码中复用的软件设计问题解决方案。`MVC` 模式并非苹果面向对象编程开发者独有；包括\
  \ Windows 和 Linux 平台在内的许多 IDE 厂商都在采用它。\n\n软件开发对企业而言常被视为一项昂贵且高风险的投资。应用经常超出预期开发时间、预算超支，且无法按照承诺运行。面向对象编程曾引发大量关注，让人们相信采用其方法论能节省成本，这主要归功于对象的可复用性和代码更易维护。但最初，这一愿景并未实现。\n\
  \n当工程师们探究面向对象编程为何未能达到预期时，他们发现了开发者设计对象方式的一个关键缺陷：开发者经常将对象混杂在一起，导致随着应用成熟、迁移到不同平台或硬件显示变化，代码变得难以维护。\n\
  \n对象设计时常常存在这样的问题：如果以下任何一项发生变化，就很难隔离受影响的对象：\n\n- 业务规则\n- 用户界面\n- 客户端-服务器或基于互联网的系统\n\
  \n对象可以划分为三个与任务相关的类别。开发者有责任确保每个类别中的对象不会越界到其他类别。它们分别是：\n\n1. **模型：** 业务对象\n2. **视图：**\
  \ 用户界面对象\n3. **控制器：** 与模型和视图通信的对象\n\n当对象被归类到这些组中后，应用就能随着时间的推移更轻松地开发和维护。以下是一个 iPhone\
  \ 银行应用中的对象及其对应的 `MVC` 类别示例：\n\n**模型**\n\n- 账户余额\n- 用户加密\n- 账户转账\n- 账户登录\n\n**视图**\n\
  \n- 账户余额表格单元格\n- 账户登录旋转控件\n\n**控制器**\n\n- 账户余额视图控制器\n- 账户转账视图控制器\n- 登录视图控制器\n\n\
  在 `MVC` 范式中记忆和归类对象最简单的方法如下：\n\n**模型**：代表真实世界的独特业务或应用规则及代码\n\n**视图**：独特的用户界面代码\n\n\
  **控制器**：任何控制或与模型、视图对象通信的代码\n\n`图 10–2` 展示了 `MVC` 范式。\n\n![images](img/1002.jpg)\n\
  \n**图 10–2.** *MVC 范式*\n\nXcode 和 Interface Builder 都不会强制开发者使用 `MVC` 设计模式。开发者需要自行组织对象以运用此设计模式。\n\
  \n值得一提的是，苹果*强烈*推崇 `MVC` 设计模式，其所有框架都设计为在 `MVC` 环境中运行。这意味着，如果你也遵循 `MVC` 设计模式，使用苹果的类库将更加得心应手。否则，你将如同逆水行舟。\n\
  \n## 人机界面指南（HIGs）\n\n在你过于兴奋并开始为应用设计动态用户界面之前，需要先了解一些基本规则。苹果通过 iOS 5 打造了世界上最先进的操作系统之一。此外，苹果产品以直观和用户友好著称。苹果希望用户在不同应用间获得一致的体验。\n\
  \n为确保用户体验的一致性，苹果为开发者提供了关于应用外观和感觉的指南。这些指南被称为人机界面指南（HIGs），适用于 Mac、iPhone 和 iPad。你可以从\
  \ `http://developer.apple.com` 下载这些文档。参见 `图 10–3`。\n\n![images](img/1003.jpg)\n\n\
  **图 10–3.** *适用于 iOS 设备和 Mac 的苹果人机界面指南（HIGs）*\n\n**注意：** 苹果的 HIGs 不仅仅是建议或参考。苹果对此非常重视。虽然\
  \ HIGs 并未描述如何用代码实现用户界面设计，但它们对于理解正确实现视图和控件的方法非常有帮助。\n\n以下是应用在苹果 iTunes App Store\
  \ 被拒绝的主要原因：\n\n1. 应用崩溃\n2. 违反 HIGs\n3. 使用苹果私有 API\n4. 功能与 iTunes App Store 宣传不符\n\
  \n你可以在开发应用之前阅读、学习并遵循 HIGs，或者当你的应用被苹果拒绝并需要重写部分或全部代码后，再来阅读、学习并遵循 HIGs。无论如何，所有 iOS\
  \ 开发者最终都将熟悉 HIGs。\n\n许多 iOS 新开发者是通过惨痛教训才明白这一点，但如果你从第一天起就遵循 HIGs，你的 iOS 开发体验将会愉快得多。\n\
