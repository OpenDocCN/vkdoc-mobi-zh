- "# 修改 `MasterViewController`\n\n我们的简易应用程序包含两个视图控制器：主视图控制器名为 `MasterViewController`，另一个辅助视图控制器名为\
  \ `DetailViewController`。视图控制器是控制视图行为的对象。为了让应用程序开始显示来自数据模型的数据，我们首先需要修改 `MasterViewController`——这是应用程序导航的起点。以下代码已经存在于\
  \ Xcode 提供的模板中，我们只需对其进行修改以加入数据模型。\n\n首先，需要修改 `MasterViewController.h` 文件。我们要添加一个实例变量来存储\
  \ `Bookstore` 对象。代码清单 8-18 显示了第 17 行以属性的形式添加了实例变量。同时请注意第 12 行有一个所谓的*前向声明*。这并没有定义\
  \ `Bookstore` 类，只是告诉编译器后续会定义 `Bookstore` 对象。这样就能防止第 17 行因编译器不了解 `Bookstore` 对象而报错。\n\
  \n**代码清单 8-18.** *添加 `Bookstore` 对象。*\n\n```\n 1  //\n 2  //  MasterViewController.h\n\
   3  //  MyBookstore\n 4  //  \n 5  //  Created by M.R. Fisher on 8/28/11.\n 6  //  Copyright\
  \ (c) 2011 www.committed-code.com. All rights reserved.\n 7  //  \n 8\n 9  #import\
  \ <UIKit/UIKit.h>\n10\n11  @class DetailViewController;\n12  @class Bookstore;\n\
  13\n14  @interface MasterViewController : UITableViewController\n15\n16  @property\
  \ (strong, nonatomic) DetailViewController *detailViewController;\n17  @property\
  \ (strong, nonatomic) Bookstore *myBookStore;\n18\n19  @end\n```\n\n接下来，我们需要修改 `MasterViewController.m`\
  \ 实现文件，以实际使用该对象。首先，要让 `MasterViewController` 知道我们的 `Bookstore` 类。如代码清单 8-19 所示，我们通过在第\
  \ 13 行导入头文件来实现。\n\n第 18 行是对我们之前声明的 `myBookStore` 属性进行的 `@synthesize`。第 25 行分配了一个新的\
  \ `Bookstore` 对象并赋值给该属性。放置一次性初始化（如书店对象）的最佳位置是 `initWithNibName:bundle:` 方法。该方法在类加载时仅被调用一次。\n\
  \n**代码清单 8-19.** *分配 `Bookstore` 对象。*\n\n```\n 1  //\n 2  //  MasterViewController.m\n\
   3  //  MyBookstore\n 4  //\n 5  //  Created by M.R. Fisher on 8/28/11.\n 6  //  Copyright\
