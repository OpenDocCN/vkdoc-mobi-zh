  \ iPhone/iPad 编程在线课程。加里已教授数千名学生如何开发 iPhone/iPad 应用，并在 iTunes App Store 拥有数款非常受欢迎的应用。加里的学生也在\
  \ iTunes App Store 拥有一些最畅销的应用。此外，加里在科技和国防行业工作了 25 年。他曾在美国海军服役 10 年，在两艘核潜艇上担任核工程师。离开海军后，加里在多家公司担任过软件开发人员、首席信息官和总裁等职务。作为首席信息官，他于\
  \ 2002 年协助 VistaCare 公司上市。加里还与人合著了 Apress 出版社的*iPhone Cool Projects*。他与妻子斯蒂芬妮及四个孩子居住在亚利桑那州斯科茨代尔。\n\
  \n**米奇·费舍尔**是亚利桑那州凤凰城地区的一名软件开发者。他在 20 世纪 80 年代初次接触个人电脑，那时 640 KB 被认为是任何人都用不完的巨大内存。在过去的\
  \ 25 年里，米奇曾在多家大中小型公司担任软件工程师、软件架构师和软件经理，并领导过团队负责价值数百万美元的项目。米奇目前将时间分配在编写 iOS 应用、创建服务器端\
  \ UNIX 技术以及在`xcelMe.com`教授 iOS 开发上。\n\n**布拉德·利斯**在应用开发和服务器管理方面拥有超过 14 年的经验。他专长于在房地产开发系统和金融机构中创建和启动软件项目。其职业生涯亮点包括：担任\
  \ Lyle Anderson 公司信息系统经理、Smarsh 公司产品开发经理、iNation 公司应用开发副总裁，以及亚利桑那州最大建筑公司 Orcutt/Winslow\
  \ Partnership 的信息技术经理。布拉德毕业于亚利桑那州立大学，现与妻子娜塔莉及五个孩子居住在凤凰城。\n\n\n\n## 关于技术审校\n\n![图片](img/james_bucanek.jpg)\
  \ **詹姆斯·布卡内克**在过去 30 年间一直从事微机系统编程与开发工作。他拥有广泛的技术经验，涵盖从嵌入式消费产品到工业机器人等多个领域。詹姆斯目前专注于\
  \ Macintosh 和 iPhone 软件开发。不编程时，他沉浸于对艺术的热爱，获得了皇家舞蹈学院古典芭蕾副学士学位，并偶尔在亚当斯芭蕾学院授课。\n\n\
  ## 引言\n\n过去三年里，我们无数次听到这样的声音：\n\n- “我从未编过程序，但我对 iPhone/iPad 应用有个绝妙的主意。”\n- “我真的能学会为\
  \ iPhone 或 iPad 编程吗？”\n\n我们总是回答：“是的，但你必须相信自己可以。”只有你自己会告诉自己你做不到。\n\n### 写给新手\n\n\
  本书假设你之前可能从未编过程序。本书也为那些从未使用面向对象编程（OOP）语言编过程序的人而写。市面上有许多关于 Objective-C 的书籍，但这些书都假设读者有编程经验，并且了解\
  \ OOP 和计算机逻辑。我们希望写一本能把对计算机编程和逻辑知之甚少甚至一无所知的读者，培养成能用 Objective-C 编程的书。毕竟，Objective-C\
  \ 是 iPhone、iPad 和 Mac 的原生编程语言。\n\n过去三年里，我们在`xcelMe.com`上教授了超过一千名学生，让他们成为 iPhone/iPad（iOS）开发者。我们的许多学生在\
  \ iTunes App Store 中开发了各自类别里最成功的 iOS 应用。我们将前两门课程（面向对象编程与逻辑入门、以及面向 iPhone/iPad 开发者的\
  \ Objective-C）中的经验融入了本书。\n\n### 写给更有经验的开发者\n\n许多多年前编程过、或使用非 OOP 语言编程的开发者，在深入 Objective-C\
  \ 之前需要了解 OOP 和逻辑背景。这本书就是为你准备的。我们会循序渐进地带你了解 OOP 及其在 iOS 开发中的应用，帮助你成为一名成功的 iOS 开发者。\n\
  \n### 为什么选择 Alice：一个创新的 3D 编程环境\n\n多年来，大学计算机科学系一直面临几个问题：\n\n- 男女比例严重失衡\n- 高辍学率\n\
  - 毕业时间超过平均水平\n\n学习 Java、C++或 Objective-C 这类 OOP 语言最大的挑战之一，就是从一开始就陡峭的学习曲线。过去，学生必须同时学习以下内容：\n\
  \n- 面向对象原则\n- 复杂的集成开发环境（IDE），例如 Xcode、Eclipse、Visual Studio\n- 编程语言的语法\n- 编程逻辑与原则\n\
  \n因此，卡内基梅隆大学获得了美国政府资助，开发了 Alice。Alice 是一个创新的 3D 编程环境，让新手开发者轻松创建丰富的图形化应用。Alice 是学生在\
  \ OOP 环境中学习编程的教学工具。该软件使用 3D 图形和拖放界面，提供更吸引人、更少挫败感的初次编程体验。\n\nAlice 使学生能够专注于学习 OOP\
  \ 原则，而不必同时学习复杂的 IDE 和 Objective-C 原则。你可以逐一专注于每个主题。这有助于学生在学习过程中获得真正的成就感。\n\n作为拖放式编程，Alice\
  \ 消除了学习 IDE 和编程语言语法的所有复杂性。你会发现编程其实很有趣，并且可以在 Alice 中开发非常酷且复杂的应用。\n\n在介绍完 OOP 主题，读者对内容感到熟悉后，我们再进入\
  \ Xcode，让你运用新的 OOP 知识编写 Objective-C 应用。这样，你可以专注于 Objective-C 语法和语言本身，而无需同时学习 OOP。\n\
  \n### 不使用 Alice 学习 Objective-C\n\n超过一千名`xcelMe.com`的学生使用本书成功成为 iOS 开发者。每门课程结束时，我们都会询问学生前四章中的\
  \ Alice 部分是否有用。超过一半的学生认为，在前四章开头使用 Alice 来引入章节内容，对他们的成功至关重要。不过，也有部分学生认为他们不需要前四章开头的\
  \ Alice 示例。\n\n我们将本书前四章安排为：每章第一部分用 Alice 介绍 OOP 主题；剩余部分则用 Objective-C 介绍该主题。因此，如果你对该主题感到熟悉，可以跳过\
  \ Alice 的内容。\n\n### 本书的组织方式\n\n你会发现本书始终强调成就感。我们先在 Alice 中介绍 OOP 和逻辑概念，然后将这些概念迁移到\
  \ Xcode 和 Objective-C 中。许多学生是视觉型学习者或实践型学习者。我们两种方法都采用。我们会用视觉示例带你了解主题和概念，然后通过分步示例强化这些概念。\n\
  \n我们经常在不同章节重复某些主题，以巩固所学内容，并以新方式运用这些技能。这使新手程序员能够重新应用开发技能，并在学习过程中获得成就感。如果你觉得某个主题尚未掌握，不必担心，继续前进吧！\n\
  \n### 成功公式\n\n学习编程是程序与你之间的一个互动过程。就像学习演奏乐器一样，你需要练习。你必须完成本书中的示例和练习。理解概念并不意味着你知道如何应用和使用它。\n\
  \n你会从本书中学到很多。你会通过完成书中的练习学到很多。*然而，真正让你学到东西的是调试程序。* 花时间逐步检查代码，找出它为什么没有按你期望的方式运行，这是一个无与伦比的学习过程。调试的缺点是，新手开发者可能会感到特别沮丧。如果你从未想过把电脑扔出窗外，你会有这个念头的。你会质疑自己为什么要做这件事，以及自己是否足够聪明来解决这个问题。编程非常考验人，即使对最有经验的开发者也是如此。\n\
  \n像音乐家一样，练习得越多，你就越擅长。我们说的练习，就是指编程！作为程序员，你可以做出一些令人惊叹的事情。世界尽在掌握。看到自己的应用出现在 iTunes\
  \ App Store 中，是最令人满足的成就之一。然而，这是有代价的，这个代价就是花在编码和学习上的时间。\n\n在教授了超过一千名学生成为 iOS 开发者之后，我们总结出了一套让学生成功的公式。以下是我们的成功公式：\n\
  \n- 相信自己能做到。唯一会说你做不到的人就是你自己。所以别对自己这么说。\n- 完成本书中的所有示例和练习。\n- 编码、编码、再编码。你编码越多，就会越擅长。\n\
  - 对自己要有耐心。如果你有幸是一个只需阅读就能记住材料的全优生，这在 Objective-C 编码中不会发生。你需要花时间编码。\n- 通过阅读本书来学习。真正学习是在调试代码时。\n\
  - 使用本章末尾介绍的免费`xcelMe.com`网络研讨会和 YouTube 视频。\n- 不要放弃！\n\n\n\n### 开发技术栈\n\n我们将引导您了解\
  \ iOS 应用的开发流程以及所需的技术。不过，先整体浏览一下所有组件会很有帮助。关于表视图中的 iPhone 应用程序示例，请参见图 1。\n\n![images](img/in01.jpg)\n\
  \n**图 1.** *iPhone/iPad 技术栈*\n\n### 所需软件、材料和设备\n\nAlice 的一大优点是它支持当今三大主流操作系统：\n\n\
  - Windows\n- Mac\n- Linux\n\nAlice 的另一大优点是免费！您可以从 [`www.Alice.org`](http://www.Alice.org)\
  \ 下载 Alice。\n\n#### 操作系统与集成开发环境\n\n虽然您可以在多个平台上使用 Alice，但开发人员用于开发 iOS 应用的集成开发环境（IDE）是\
  \ `Xcode`。您必须使用基于 Intel 芯片的 Mac 才能使用 `Xcode` 并提交应用！`Xcode` 是免费的，可在 Mac App Store\
  \ 中获取。\n\n#### 软件开发工具包\n\n您需要注册成为 iOS 开发者。您可以在 [`http://developer.apple.com/iphone`](http://developer.apple.com/iphone)\
  \ 完成注册。\n\n当您准备好将应用上传到 iTunes App Store 时，需要支付每年 99 美元的费用。\n\n#### 双显示器\n\n我们建议开发者为其电脑连接第二台显示器。在双独立显示器上同时单步调试代码、查看输出窗口和\
  \ iPad 模拟器，效果非常理想。苹果硬件使这变得很简单。只需将第二台显示器插入任何基于 Intel 芯片的 Mac 的显示端口（当然，需要使用正确的 Mini\
  \ DisplayPort 适配器），您就能拥有两台独立工作的显示器。请参见图 2。请注意，双显示器并非必需。如果您没有，只需要调整好打开的窗口以适配屏幕即可。\n\
  \n![images](img/in02.jpg)\n\n**图 2.** *双显示器*\n\n### 免费在线研讨会、问答与 YouTube 视频\n\n几乎每周三太平洋夏令时晚上\
  \ 7:30，我们都会举办免费在线研讨会，讨论书中的一个主题或某个热门话题。这些研讨会是免费的，您可以在 [`www.xcelme.com/free-webinars.php`](http://www.xcelme.com/free-webinars.php)\
  \ 注册参加。\n\n每次研讨会结束时，我们会进行问答环节。您可以就讨论的主题或书中的任何主题提问。\n\n此外，所有这些研讨会都会被录制并上传到 YouTube。\n\
