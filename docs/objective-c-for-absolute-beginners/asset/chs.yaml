  \ 电台（提示：你需要在 `RadioStationsAppDelegate.h` 接口文件中添加第二个 `RadioStation` 对象）。\n*   通过确保\
  \ iPhone 应用首次启动时用户不会看到文本“Label”，对界面进行一些清理。\n    *   使用界面工具修复此问题。\n    *   你如何通过添加代码来解决这个问题？\n\
  *   为 `(IBAction)buttonClick:(id)sender` 方法增加更多验证。目前，它验证了 FM 频段范围，但未验证 AM 频段范围。修改代码，使其也能验证\
  \ AM 频段范围。\n    *   如果电台频率超出范围，请使用现有的标签显示某种错误信息。\n\n## 第 8 章\n\n## Objective-C 编程基础\n\
  \nObjective-C 是一种非常优雅的语言。它将 C 语言的高效性与 Smalltalk 面向对象的优点结合在一起。这种组合于 20 世纪 80 年代中期问世，至今仍在为\
  \ iPhone、iPad 和 Mac OS X 背后的出色应用提供动力。一门超过 20 年的语言是如何在这么长时间后依然保持相关性和实用性的？其成功部分源于构成\
  \ Objective-C 的两种语言都经过了充分测试和精心设计。另一个原因则不那么明显：iPhone 和 Mac OS X 可用的各种框架大大简化了开发功能完善的应用的过程。这些框架得益于它们已经存在了相当长的时间，这也就意味着稳定性和高功能性。最后，Objective-C\
  \ 具有高度动态性。虽然本章不会重点讨论这一特性，但 Objective-C 的动态特性提供了许多编译型语言所不具备的灵活性。凭借所有这些优秀特性，Objective-C\
  \ 及其对应的框架为创作杰作提供了一个绝佳的调色板！\n\n本章将介绍 Objective-C 的一些更常见的概念，例如属性和集合类。本章还将展示在 Xcode\
  \ 中处理用户界面元素时，如何同时使用属性和实例变量。这听起来工作量很大，但 Objective-C、Foundation 框架和 Xcode 工具提供了丰富的对象和方法，以及一种轻松构建应用的方式。\n\
  \n## 集合\n\n理解集合是学习 Objective-C 的基础。事实上，集合对象几乎是所有现代面向对象语言库的基本构造——有时它们被称为容器。简单来说，集合是一种可以容纳和管理其他对象的类。集合的全部意义在于提供一种通用且高效的方式来存储和检索对象。\n\
  \n有几种不同类型的集合。虽然它们都满足容纳其他对象的相同目的，但主要区别在于对象的检索方式。以下是 Objective-C 中最常用的集合列表：\n\n* \
  \  `NSSet`\n*   `NSArray`\n*   `NSDictionary`\n*   `NSMutableSet`\n*   `NSMutableArray`\n\
  *   `NSMutableDictionary`\n\n注意，列出的三个集合类中，有一个包含单词 `Mutable`。可变的（相对于不可变的）类是指，在集合创建后可以向其中添加或移除项目的类。Mutable\
  \ 意味着它可以被修改。不可变集合必须在首次创建时使用其所有值进行初始化，之后便无法修改。\n\n\n\n### 使用 NSSet\n\n`NSSet` 类用于存储无序的对象列表。*无序*的意思就是——对象在集合中存储时没有顺序。`NSSet`\
  \ 的优势在于性能——它是可用的最快集合类。当需要存储一组对象，且存储或检索的顺序不重要时，请使用 `NSSet`。\n\n以下是一个典型的 `NSSet` 初始化方法：\n\
  \n```\nNSSet *mySet = [NSSet setWithObjects:@\"String 1\", @\"String 2\", @\"Whatever\"\
  , nil];\n```\n\n如你所见，该集合通过一个对象列表进行初始化，本例中是一个字符串列表。最后一个对象必须是 `nil`，以表示对象列表的结束。另外，这个例子使用了字符串，但一个\
  \ `NSSet` 可以由任何对象组成，甚至可以包含不同类型的对象，包括来自其他集合的对象！\n\n**提示：** 所有集合类都能够同时存储和管理任何类型的对象。然而，在典型情况下，大多数程序员倾向于在任何一个特定的集合类中只存储单一类型的对象，以使代码更简单。\n\
  \n为了访问 `NSSet` 中的数据，常用几种访问 `NSSet` 内部元素的方法。其中一种方法如代码清单 8–1 所示，是使用所谓的*快速枚举*，逐个检索每个对象。请注意，下面的快速枚举（第\
  \ 3-5 行）适用于所有集合类。\n\n**代码清单 8–1.** *通过枚举器遍历 NSSet。*\n\n```\n 1  NSSet *mySet = [NSSet\
  \ setWithObjects:@\"One\", @\"Two\", @\"Three\", nil];\n 2  \n 3  for (id value\
  \ in mySet) {\n 4      NSLog(@\"%@\", value);\n 5  }\n```\n\n**注意：** 在第 3 行中，值的类型是\
  \ `id`。回忆一下，`id` 是一个泛型类型，代表任何 Objective-C 类。使用 `id` 的原因是我们存储在 `NSSet` 中的值可以是任何类型。例如，如果\
  \ `NSSet` 包含了一个名为 `Animal` 的类和一个名为 `Zoo` 的类，代码就会失败，因为我们没有一个类既是 `Zoo` 类型又是 `Animal`\
  \ 类型。另一方面，如果 `NSSet` 始终包含相同的类，我们可以用该特定类替换第 3 行中的 `id`。\n\n另一种访问 `NSSet` 的常见方法，特别是在为捕捉触摸事件的\
  \ iOS 设备编程时，是使用以下方式：\n\n**代码清单 8–2.** *选择 NSSet 集合中的任意对象。*\n\n```\n 1  NSSet *mySet\
  \ = [NSSet setWithObjects:@\"One\", @\"Two\", @\"Three\", nil];\n 2  \n 3  NSString\
  \ *value = [mySet anyObject];\n```\n\n第 3 行调用了 `anyObject` 方法。这个方法名副其实；它从集合中返回任意一个对象。返回的对象由集合自行决定，因此无法保证会返回第一个项目。当然，使用\
  \ `anyObject` 方法的前提是任何对象都可以满足需求。如前所述，在处理 iOS 设备上的触摸事件时，有时只需要知道至少有一根手指触碰了屏幕即可。每次触摸屏幕都会作为一条记录存储在\
  \ `NSSet` 中，每根手指对应一条记录。使用 `anyObject` 会返回其中任意一个触摸对象。\n\n实际上还有很多其他从 `NSSet` 获取对象的方法——多到本章无法一一涵盖。^(1)\
  \ 不过，有一种特殊的方法涉及到下一个集合——`NSArray` 类。\n\n### 使用 NSArray\n\n`NSArray` 类与其他集合类似，允许程序员管理一组对象。`NSArray`\
  \ 与 `NSSet` 的不同之处在于，`NSArray` 允许通过对象在数组中的*索引*来检索对象。索引是对象在 `NSArray` 中所占据的数值位置。例如，如果\
  \ `NSArray` 中有三个元素，则可以通过从 0 到 2 的索引来引用这些对象。与 C 和 Objective-C 语言中的大多数情况一样，索引从 0 开始。\n\
  \n__________\n\n¹ [`developer.apple.com/library/mac/#documentation/Cocoa/Reference/Foundation/Classes/NSSet_Class/Reference/Reference.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/Foundation/Classes/NSSet_Class/Reference/Reference.html)\n\
  \n**代码清单 8–3.** *访问 NSArray 中的对象。*\n\n```\n 1  NSArray *myArray = [NSArray arrayWithObjects:\
  \ @\"One\", @\"Two\", @\"Three\", nil];\n 2  \n 3  NSLog (@\"%@\", [myArray objectAtIndex:0]);\n\
  \ 4  NSLog (@\"%@\", [myArray objectAtIndex:1]);\n 5  NSLog (@\"%@\", [myArray objectAtIndex:2]);\n\
  ```\n\n可以看出，`NSArray` 中的对象可以通过*索引*来检索。索引从 0 开始，且不能超过数组大小减 1。数组的大小可以通过向 `NSArray`\
  \ 对象发送 `count` 消息轻松计算：\n\n```\nint entries = [myArray count];\n```\n\n实际上，每一种集合类型，`NSSet`、`NSArray`、`NSDictionary`（以及它们的可变对应类）都会响应\
  \ `count` 消息。\n\n**注意：** 你可能已经注意到 `NSLog` 命令传递了一个类似 `:@\"%@\"` 的字符串。`%@` 是一种格式化字符串，可用于任何\
  \ Objective-C 对象。它只是告诉对象描述自身。对于 `NSString` 来说，描述就是字符串本身。不同类型的对象有不同的描述。在代码清单 8–3\
  \ 中，`[myArray objectAtIndex:0]` 返回一个 `NSString` 对象。如果参数不是一个 Objective-C 类，你的程序会崩溃！\n\
  \n如前所述，有一种方法可以利用 `NSArray` 来访问 `NSSet`。\n\n**代码清单 8–4.** 从现有的 NSSet 创建 NSArray。\n\
  \n```\n 1  NSSet *mySet = [NSSet setWithObjects:@\"One\", @\"Two\", @\"Three\",\
  \ nil];\n 2  NSArray *myArray = [NSSet allObjects];\n 3  \n 4  NSLog(@\"%@\", [myArray\
  \ objectAtIndex:1);\n```\n\n除了*快速枚举*之外，使用 `allObjects` 方法可以从 `NSSet` 创建一个 `NSArray`。通常，你不会先创建一个集合然后再将其复制到数组中——为什么不一开始就直接创建数组呢？嗯，有时对象列表只能通过\
  \ `NSSet` 给出（处理 iOS 设备触摸事件时的 `touchesBegan: withEvent:` 方法就是一个完美的例子）。\n\n\n\n###\
  \ NSDictionary\n\n`NSDictionary`类也是一种非常有用的集合类。与`NSSet`和`NSArray`一样，它允许存储对象，但`NSDictionary`的不同之处在于它允许将*键*与条目相关联。例如，可以创建一个存储`Animal`对象列表的`NSDictionary`。与`NSArray`通过索引访问`Animal`对象不同，`NSDictionary`可以使用像“monkey”这样的`NSString`作为键。然而，所有键必须是唯一的——也就是说，“monkey”不能出现多次。根据你的程序，找到唯一的名称通常不是问题。\n\
  \n使用上面的“monkey”例子——如果有 5 只不同的猴子，`NSDictionary`中只会包含一个对应“monkey”的条目。不过，这个条目本身可以是另一个包含五个唯一猴子名称的`NSDictionary`：\n\
  \n`\"monkey\" -> NSDictionary object`\n\n这个`NSDictionary`对象包含：\n\n`\"Spider\" ->\
  \ Animal Object`\n`\"Capuchin\" -> Animal Object`\n`\"Tamarin\" -> Animal Object`\n\
  `\"Mandril\" -> Animal Object`\n`\"Orangutan\" -> Animal Object`\n\n当然，`NSDictionary`可以通过多种不同的方式进行组织，具体取决于键的定义方式。在大多数情况下，不会出现`NSDictionary`的条目是另一个`NSDictionary`的情况——上面的例子只是为了展示`NSDictionary`（或一般的集合）的灵活性。\n\
  \n让我们看看上面的例子在代码中是如何实现的。例如，假设已经存在一个`Animal`对象列表，我们只是将其赋值给字典：\n\n**列表 8–5.** *使用另一个\
  \ NSDictionary 创建 NSDictionary。*\n\n```\n 1  NSDictionary *zoo = [NSDictionary dictionaryWithObjectsAndKeys:\n\
  \ 2                       @\"elephant\", myElephantObject,\n 3                 \
  \      @\"giraffe\", myGiraffeObject,\n 4                       @\"monkey\", [NSDictionary\
  \ dictionaryWithObjectsAndKeys:\n 5                                   @\"Spider\"\
  , mySpiderMonkey,\n 6                                   @\"Capuchin\", myCapuchinMonkey,\n\
  \ 7                                   @\"Tamarin\", myTamarinMonkey,\n 8       \
  \                            @\"Mandril\", myMandrilMonkey,\n 9                \
  \                   @\"Orangutan\", myOrangutanMonkey, nil]\n10                \
  \       @\"zebra\", myZebraObject, nil];\n```\n\n现在主`NSDictionary`已经设置好了，我们如何知道什么时候获取的是`Animal`对象，什么时候获取的是`NSDictionary`对象呢？（提示：请阅读下一节的标题。）\n\
  \n### 确定集合中的类类型\n\n当遍历集合时，我们通常使用`id`类类型来表示我们不知道集合中的具体类。每个 Objective-C 对象都有两个便捷的方法来帮助我们。现在让我们来看看它们。\n\
  \n以列表 8–3 中的代码为例，考虑以下代码片段：\n\n**列表 8–6.** *处理集合中的不同类。*\n\n```\n11  for (id element\
  \ in [zoo allValues]) {\n12      if ([element isKindOfClass:[Animal class]]) {\n\
  13          NSLog(@\"%@\", id);\n14      }\n15      if ([element isKindOfClass:[NSDictionary\
  \ class]]) {\n16          ... // 处理上面的猴子字典。\n17      }\n18  }\n```\n\n在列表 8–6 中，我们使用快速枚举来遍历我们的动物园`NSDictionary`。由于只有两种可能性：`Animal`类或`NSDictionary`（动物字典），代码需要检查两种不同的类类型。如前所述，每个\
  \ Objective-C 对象都有两个便捷的方法。\n\n*   第一个方法是`isKindOfClass:`。如果当前类（即我们的`element`变量）是某种类型的类，此方法返回一个布尔值。\n\
  *   第二个便捷方法是`class`方法。此方法简单地返回对象的类；第 12 行是`Animal`类，第 15 行是`NSDictionary`类。\n\n\
  结合使用`isKindOfClass:`和`class`方法，可以相当简单地处理集合中不同类型的类。\n\n## 使用可变类\n\n到目前为止，我们只讨论了初始化后便永远无法更改的集合对象。虽然这显然在某些地方很有用，但更实用的是可以修改的集合类。每个集合类都有一个**可变**版本——我们之前只讨论了**不可变**的类。这些类在本质上是相同的，唯一的区别是可变的版本可以添加和删除元素。\n\
  \n### NSMutableSet\n\n它可以像`NSSet`一样被初始化，也可以不包含任何值进行初始化，然后再添加值。考虑列表 8–7 中的代码：\n\n\
  **列表 8–7.** *向 NSMutableSet 添加对象。*\n\n```\n 1  NSMutableSet *mySet = [[NSMutableSet\
  \ alloc] init];\n 2  \n 3  [mySet addObject:@\"One\"];\n 4  [mySet addObject:@\"\
  Two\"];\n 5  [mySet addObject:@\"Three\"];\n 6  \n 7  for (id val in mySet) {\n\
  \ 8      NSLog(@\"%@\", val);\n 9  }\n```\n\n任何可变类的优点在于，可以以编程方式添加和删除元素，而不必在声明类时一次性包含所有值。可以使用以下代码行移除集合中的所有对象：\n\
  \n```\n    [mySet removeAllObjects];\n```\n\n只要拥有对某个对象的引用，也可以移除特定的对象：\n\n**列表 8–8.**\
  \ *在 NSMutableSet 中移除特定对象。*\n\n```\n10  NSString *testString = @\"Zero\";\n11  \n\
  12  [mySet addObject: testString];\n13  [mySet addObject: testString];  // 仅用于测试\n\
  14  \n15  for (id val in mySet) {\n16      NSLog(@\"%@\", val);\n17  }\n18  \n19\
  \  [mySet removeObject:testString];\n20  \n21  for (id val in mySet) {\n22     \
  \ NSLog(@\"%@\", val);\n23  }\n```\n\n在列表 8–8 中，第 19 行将移除字符串“Zero”。我们能够这样做，仅仅是因为我们已经在`testString`变量中持有对该对象的引用。这引出了另一个要点：`NSSet`和`NSMutableSet`只会存储*唯一的*对象。两个完全相同的对象（即，相同的指针）不能被添加多次。例如，第\
  \ 13 行实际上替换了第 12 行添加的第一个`testString`。\n\n**提示：** 添加完全相同的对象意味着指向该对象的指针是相同的。这里不会比较被添加对象的值是否与集合中已有的对象值相同——检查的是指针。指针将在第\
  \ 11 章中深入讨论。\n\n\n\n#### `NSMutableArray`\n\n与 `NSMutableSet` 类似，`NSMutableArray`\
  \ 也与其父类 `NSArray` 相似。实际上，向 `NSMutableArray` 对象添加对象的方式与 `NSMutableSet` 完全相同，都是使用\
  \ `addObject:` 方法。然而，与 `NSMutableSet` 不同的是，`NSMutableArray` 还可以在数组中插入元素——而 `NSMutableSet`\
  \ 只能向集合中添加对象。请参阅代码清单 8–9。\n\n**代码清单 8–9.** *向 NSMutableArray 添加和插入值。*\n\n```\n 1  NSMutableArray\
  \ *myArray = [[NSMutableArray alloc] init];\n 2  \n 3  [myArray addObject:@\"One\"\
  ];\n 4  [myArray addObject:@\"Two\"];\n 5  [myArray addObject:@\"Three\"];\n 6  \n\
   7  for (id val in myArray) {\n 8      NSLog(@\"%@\", val);\n 9  }\n10  \n11  [myArray\
  \ insertObject:@\"One and a Half\" atIndex:1];\n12  \n13  for (id val in myArray)\
  \ {\n14      NSLog(@\"%@\", val);\n15  }\n```\n\n在代码清单 8–9 中，创建新数组的方式与 `NSMutableSet`\
  \ 类似。然而，在第 11 行，一个新元素被插入到数组的位置 1。请记住，位置 0 是数组的第一个元素。插入操作后，数组的内容将如下所示：\n\n![images](img/U0801.jpg)\n\
  \n第 11 行插入了一个新元素——剩余元素在数组中向上移动以腾出空间。这一点至关重要，尤其是当代码假定数组中特定索引具有特定值时。\n\n对于 `NSMutableArray`，有多种移除对象的方法。以下是一些较常用的方法：\n\
  \n*   `removeAllObjects` – 此方法如其名所示。它从一个给定的 `NSMutableArray` 中移除所有对象。\n*   `removeLastObject`\
  \ – 此方法移除数组末尾的最后一个对象。数组大小减一。\n*   `removeObjectAtIndex:(NSUInteger index)` – 此方法移除给定索引处的对象。该值的范围是从\
  \ 0 到数组长度减 1。\n\n#### `NSMutableDictionary`\n\n至此，集合类的可变版本如何工作对你来说应该已经非常清楚了——`NSMutableDictionary`\
  \ 也不例外。`NSMutableDictionary` 提供了 `NSDictionary` 的所有功能，但当然，可以添加和删除元素，如代码清单 8–10 所示：\n\
  \n**代码清单 8–10.** *向 NSMutableDictionary 添加对象。*\n\n```\n 1  \n 2  NSMutableDictionary\
  \ *myDict = [[NSMutableDictionary alloc] init];\n 3  \n 4  [myDict setObject:@\"\
  Number One\" forKey:@”1”];\n 5  [myDict setObject:@\"Number Two\" forKey:@”2”];\n\
   6  [myDict setObject:@\"Number Three\" forKey:@”3”];\n 7  \n 8  for (id val in\
  \ myDict) {\n 9      NSLog(@\"%@\", val);\n10  }\n11  \n12  [myDict setObject:@\"\
  One and a Half\" forKey:@”1.5”];\n13  \n14  for (id val in myArray) {\n15      NSLog(@\"\
  %@\", val);\n    }\n```\n\n在上面的示例中，对象 `@\"One and a Half\"` 被添加到字典中。这与数组不同，因为无法像\
  \ `NSMutableArray` 那样将对象插入到字典的特定位置。\n\n## 创建 BookStore 应用程序\n\n首先，我们来创建基础应用程序项目。我们首先打开\
