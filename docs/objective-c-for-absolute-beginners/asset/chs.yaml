  \ Alice 和 Objective-C 中完成此操作。\n\n## 第 5 章\n\n\n\n"
- "# 使用 Objective-C 进行面向对象编程\n\n在过去的 15 年间，编程界一直聚焦于面向对象编程（OOP）这一开发范式。大多数现代开发环境和语言都实现了\
  \ OOP。简而言之，OOP 构成了你今天开发一切应用的基础。\n\n你可能会问：既然 OOP 是当今主要的开发模式，为什么我们直到第 5 章才用 Objective-C\
  \ 来介绍它？答案很简单：对于新开发者来说，这并非一个容易理解的概念。本章中，我们将详细探讨 OOP 的不同方面，以及它们将如何影响你的开发工作。\n\n在应用程序中正确实施\
  \ OOP 需要一些前期规划，但这将在项目的整个生命周期为你节省大量时间。OOP 已经改变了开发的方式。在本章中，我们将了解 OOP 究竟是什么。本书第一章已经初步讨论过\
  \ OOP，但这里我们将深入细节。我们将重新审视对象是什么，以及它们如何与我们现实世界中的物理对象相关联。我们还会探讨类是什么，以及它们与对象之间的关系。此外，我们将讨论规划类时需要采取的步骤，以及一些可用于实现此目标的视觉工具。读完本章并完成练习后，你将更深入地理解\
  \ OOP 是什么，以及它为何对你作为开发者不可或缺。\n\n起初，对象和面向对象编程可能难以理解，但希望随着本章内容的推进，这些概念会逐渐变得清晰易懂。\n\n\
  ## 对象\n\n正如第 1 章所讨论的，OOP 基于对象。关于对象的讨论，部分内容将是回顾，但我们也会深入展开。对象是任何可以被作用于的事物。为了更好地解释编程中的对象是什么，我们先看看周围物理世界中的一些事物。物理对象可以是周围任何你能触摸或感知的东西。以电视机为例，它的一些特征包括类型（等离子、液晶或显像管）、尺寸（40\
  \ 英寸）、品牌（索尼、Vizio）、重量和价格。电视机还具有功能：可以打开或关闭，可以换台、调节音量和调整亮度。\n\n其中一些特征和功能是电视机独有的，而另一些则不是。例如，你家里的沙发可能就不具备与电视机相同的特征。你可能会关注沙发的不同信息，比如材质类型、座位容量和颜色。沙发可能只有少数功能，例如展开成床。\n\
  \n现在我们来专门讨论编程领域中的对象。对象是一个具体的条目。它可以描述物理存在的东西（如一本书），也可以是应用程序中的窗口之类的事物。对象拥有属性和方法。属性描述对象的某些特征，如位置、颜色或名称；而方法则描述对象能够执行的操作，如关闭或重新计算。在我们的例子中，一个`TV`对象会拥有`type`（类型）、`size`（尺寸）和`brand`（品牌）属性，而一个`Couch`对象则会有颜色、材质和舒适度等属性。从编程角度讲，属性是对象中的变量。例如，电视机可以用字符串变量存储品牌，用整数存储高度。\n\
  \n对象还拥有程序员能用来控制它们的命令，这些命令称为方法。方法是其他对象与某个对象交互的方式。例如，对于电视机而言，遥控器上的每个按钮都是一个方法，代表着你可以与电视机交互的方式。方法可以（并且经常）被用来改变属性的值，但方法本身不存储任何值。\n\
  \n正如我们在第 1 章中所述，对象具有状态，这本质上是对象在任意给定时间点的一个快照。状态就是在特定时刻所有属性值的集合。\n\n在前几章中，我们举过书店的例子。书店包含许多不同的对象。其中有图书对象，它们拥有书名、作者、页码和出版商等属性。还有杂志对象，它们拥有标题、期号、类别和出版商等属性。书店还有一些非实物对象，比如一次销售。一个`sale`（销售）对象会包含所购图书、客户信息、支付金额和支付方式等信息。一个`sale`对象可能还拥有一些方法，用于计算税额、打印收据或作废交易。`sale`对象不代表任何实物，但它仍然是一个对象，并且是构建高效书店所必需的。\n\
  \n由于对象是 OOP 的基础，理解对象及其交互方式至关重要。本章剩余部分将详细描述对象及其一些特性。\n\n## 什么是类？\n\n讨论 OOP 就不可能不讨论类。类定义了一个对象将拥有哪些属性和方法。类基本上就像一个饼干模具，可以用来创建具有相似特征的对象。某个特定类的所有对象都将拥有相同的属性和方法。不同对象的属性值则会发生变化。\n\
  \n类类似于动物世界中的物种。物种不是某一个特定的动物，但它描述了该动物许多共同的特征。为了更深入地理解类，让我们看一个自然界中类的例子。`Dog`（狗）类具有所有狗共有的许多属性。例如，狗可能拥有名字、年龄、主人和最喜欢的活动。属于某个类的对象被称为该类的实例。如果查看图\
  \ 5–1，你可以看到类与作为该类实例的实际对象之间的区别。例如，`Lassie`（莱西）就是`dog`类的一个实例。在下图中，你可以看到我们有一个`Dog`类，它包含四个属性（`品种`、`年龄`、`主人`、`最喜欢的活动`）。在现实生活中，一条狗会拥有更多属性，但我们决定在这个演示中只使用四个。\n\
  \n![图片](img/0501.jpg)\n\n**图 5–1.** *类与单个对象的示例*\n\n## 规划类\n\n规划类是开发过程中最重要的步骤之一。虽然事后回过头来添加属性和方法是可能的（而且你肯定需要这样做），但了解哪些类将在你的应用中使用，以及它们将拥有哪些基本属性和方法，这一点至关重要。在过程初期花费时间规划好各类，是非常重要的。\n\
  \n\n\n### 规划属性\n\n让我们来看一下书店的示例以及我们需要创建的一些类。首先，创建一个`Bookstore`类非常重要。`Bookstore`类包含了每个`Bookstore`对象所存储信息的蓝图，例如书店名称、地址、电话号码和徽标（参见图\
  \ 5–2）。将这些信息放在类中，而不是硬编码到应用程序里，将来可以轻松地对这些信息进行修改。我们将在本章后面讨论使用面向对象编程（OOP）方法论的原因。此外，如果你的书店大获成功并决定再开一家分店，你也能有备无患，因为你可以创建`Bookstore`类的另一个对象。\n\
  \n![images](img/0502.jpg)\n\n**图 5–2.** *书店类*\n\n接下来，我们再规划一个`Customer`类（参见图 5–3）。注意名称是如何拆分为`First`\
  \ `Name`和`Last` `Name`的。这样做非常重要。在项目中，有时你可能只需要使用客户的姓氏，如果没有提前规划，将名字和姓氏分开会非常困难。假设你想给一位客户寄一封信，告知他们即将举行的促销活动。你肯定不希望问候语写成\"\
  尊敬的张三\"。如果写成\"尊敬的张三\"，会显得更加个性化。\n\n![images](img/0503.jpg)\n\n**图 5–3.** *客户类*\n\
  \n你还会注意到，我们将地址拆分成了不同的部分，而不是全部堆在一起。我们将`地址行 1`、`地址行 2`、`城市`、`州`和`邮政编码`分开了。这非常重要，并且会在应用程序中用到。让我们回到刚才想给客户发送店内促销通知信的场景。你可能不想给所有住在其他州的客户都发送这封信。通过拆分地址，你可以轻松过滤掉那些不希望包含在邮寄名单中的客户。\n\
  \n我们还在`Customer`类中添加了`喜爱的图书类型`属性。添加这个属性是为了向你展示如何在每个类中保存多种不同类型的信息。如果你有新的悬疑小说即将出版，并且想发送电子邮件提醒对悬疑小说特别感兴趣的客户，这个字段就会派上用场。通过存储这类信息，你将能够精准地针对客户群体中的不同部分进行推广。\n\
  \n为了创建我们的书店，还需要一个`Book`类（参见图 5–3）。我们将存储关于图书的信息，例如作者、出版商、类型、页数和版次（以防有多个版本）。`Book`类还将包含图书的价格。\n\
  \n![images](img/0504.jpg)\n\n**图 5–4.** *图书类*\n\n我们还添加了一个名为`Sale`的类（参见图 5–5）。这个类比我们讨论过的其他类更抽象，因为它描述的不是有形的物体。你会注意到我们在`Sale`类中添加了对客户和图书的引用。因为`Sale`类将跟踪图书的销售情况，所以我们需要知道哪本书被卖给了哪位客户。\n\
  \n![images](img/0505.jpg)\n\n**图 5–5.** *销售类*\n\n现在我们已经规划好了类的属性，接下来需要研究每个类将具有的一些方法。\n\
  \n## 规划方法\n\n我们现在不会添加所有的方法，但你在一开始规划得越多，以后就越容易。并非所有类都会有很多方法，有些类可能根本没有任何方法。\n\n**注意：**\
  \ 在规划方法时，请记住让它们专注于一个特定的任务。方法越具体，它被重用的可能性就越大。\n\n目前，我们不会向`Book`类或`Bookstore`类添加任何方法。我们将重点关注另外两个类。\n\
  \n对于`Customer`类，我们将添加列出该客户购买历史记录的方法。将来你可能需要添加其他方法，但目前我们只添加这一个。你完成的`Customer`类图应该类似于图\
  \ 5–6。你会注意到靠近底部的线条将属性与方法分开了。\n\n![images](img/0506.jpg)\n\n**图 5–6.** *完成的客户类*\n\
  \n对于`Sales`类，我们添加了三个方法。我们添加了`Charge` `Credit` `Card`、`Print` `Invoice`和`Checkout`（参见图\
  \ 5–7）。目前，你不需要知道如何实现这些方法，但你需要知道你正计划将它们添加到类中。\n\n![images](img/0507.jpg)\n\n**图 5–7.**\
  \ *完成的销售类*\n\n现在你已经完成了对类以及将添加到类中的方法的规划，你就有了统一建模语言（UML）图的雏形。基本上，这是一种开发人员用来规划类、属性和方法的图表。通过创建这样的图表来启动你的开发过程，从长远来看将对你大有裨益。对\
  \ UML 图的深入讨论超出了本书的范围。如果你想了解更多关于这个主题的信息，smartdraw.com 网站上有非常深入的概述。\n\n`http://www.smartdraw.com/resources/tutorials/uml-diagrams/`\n\
  \n图 5–8 显示了完整的图。\n\n![images](img/0508.jpg)\n\n**图 5–8.** *书店的完整 UML 图*\n\n\n\n\
  ### 实现类\n\n既然我们已经了解了将要创建的对象，接下来就需要创建第一个对象。为此，我们将从一个新项目开始。\n\n1.  请启动 Xcode。点击 **文件**\
  \ ![images](img/U001.jpg) **新建** ![images](img/U001.jpg) **新建项目**。\n2.  在左侧选择 `iOS`。在右侧选择\
  \ **Master-Detail Application**。就本章内容而言，我们可以选择任何应用程序类型（参见 图 5–9）。点击“下一步”。\n\n![images](img/0509.jpg)\n\
  \n**图 5–9.** *创建新项目*\n\n3.  你需要输入公司名称。保留此屏幕上的复选框为默认状态。我们现在无需担心这些选项。选择一个位置保存项目，然后保存项目。你可以使用名称\
  \ `bookstore` 或任何你喜欢的项目名。\n4.  选择屏幕左侧的 **BookStore** 文件夹（参见 图 5–10）。这是你大部分代码的存放位置。\n\
  5.  选择 **文件** ![images](img/U001.jpg) **新建** ![images](img/U001.jpg) **新建文件**。\n\
  \n![images](img/0510.jpg)\n\n**图 5–10.** *选择 bookStore 文件夹*\n\n6.  在弹出的窗口中，在 iOS\
  \ 标题下选择 **Cocoa Touch**，然后在右侧点击 **Objective-C class**（参见 图 5–11）。然后点击 **下一步**。\n\
  \n![images](img/0511.jpg)\n\n**图 5–11.** *创建新的 Objective-C 类*\n\n7.  在下一个屏幕上，你需要选择对象的超类。这决定了你的对象默认将具有哪些属性和方法。我们现在选择\
  \ `NSObject`（参见 图 5–12）。点击 **下一步**。\n\n**注意：** `NSObject` 是 Objective-C 中的基类。它包含了大多数对象所需的属性和方法。\n\
  \n![images](img/0512.jpg)\n\n**图 5–12.** *选择超类*\n\n8.  现在你将有机会命名你的类。在本练习中，我们将创建\
  \ `Customer` 类。现在，将类命名为 `Customer`。然后点击 **保存**。\n\n**注意：** 为便于使用和理解代码，请记住，在 Objective-C\
  \ 中，类名应始终以大写字母开头。对象名应始终以小写字母开头。例如，`Book` 是类的合适名称，而 `book` 则是基于 `Book` 类的对象的绝佳名称。对于由两个单词组成的对象，例如图书作者，合适的名称是\
  \ `bookAuthor`。这种大小写格式被称为小驼峰式。\n\n9.  现在查看你的主项目文件夹；你应该看到两个新文件。一个名为 `Customer.h`，另一个名为\
  \ `Customer.m`。`.h` 文件是头文件，包含有关你类的信息。头文件将列出类中的所有属性和方法，但不会实际包含与它们相关的代码。`.m` 文件是实现文件，是你编写方法代码的地方。\n\
  10. 双击 `Customer.h` 文件，你将看到 图 5–12 所示的窗口。你会注意到它当前包含的信息不多。第一部分带有双斜线（`//`）的是注释，不视为代码的一部分。注释允许你告诉阅读你代码的人每部分代码的用途。关于头文件的其他部分，我们现在不详细讨论，只需知道类的所有属性都需要放在\
  \ `@interface` 部分的大括号（`{}`）内即可。\n\n![images](img/0513.jpg)\n\n**图 5–13.** *空的客户类*\n\
  \n现在让我们将属性从 UML 图迁移到实际的类中。\n\n**提示：** 属性应始终以小写字母开头。属性名称中不能包含空格。\n\n对于第一个属性“First\
  \ Name”，我们将下面这行代码添加到文件中。\n\n```\nNSString* firstName;\n```\n\n这会在我们的类中创建一个名为 `firstName`\
  \ 的字符串对象。由于 `Customer` 类的所有属性也都是字符串，我们只需要对其他属性重复相同的过程即可。完成后，你的 `@interface` 部分应该如\
  \ 图 5–13 所示。\n\n![images](img/0514.jpg)\n\n**图 5–14.** *带有属性的客户类接口*\n\n`@interface`\
  \ 部分完成后，我们需要添加方法。方法需要放在 `@interface` 部分之外，但仍需位于头文件的 `@interface` 部分之内。我们将添加一个返回\
  \ `NSArray` 的新方法。代码如下所示：\n\n```\n-(NSArray *) listPurchaseHistory;\n```\n\n**注意：**\
  \ `NSString` 是一个用于存储字符串并对其执行操作的类。字符串是一组字符。`NSString` 可以包含字母、数字和标点符号。\n\n这就是在头文件中创建类所需做的全部工作。图\
  \ 5–15 显示了最终的头文件。在下一章中，我们将更详细地介绍实现文件。\n\n![images](img/0515.jpg)\n\n**图 5–15.**\
  \ *完成的客户类头文件*\n\n## 继承\n\nOOP 的另一个主要特性是继承。编程中的继承类似于遗传继承。你可能从你母亲那里继承了眼睛的颜色，或者从你父亲那里继承了头发的颜色，反之亦然。类可以以类似的方式从其父类继承属性和方法。在\
  \ OOP 中，父类被称为超类，子类被称为子类。\n\n在 Objective-C 中，程序员创建的所有类都有一个类似于父类的超类。该类将继承该父类的特征。因此，就像在所有其他\
  \ OOP 语言中一样，该类被称为父类的子类。在本章中，我们所有的类都是 `NSObject` 的子类。在 Objective-C 中，大多数情况下，你的类都将是\
  \ `NSObject` 的子类。在我们之前的例子中，`Customer` 类是 `NSObject` 的子类。\n\n例如，我们可以创建一个印刷品基类，并使用子类来表示书籍、杂志和报纸。印刷品可能有许多共同点，因此我们可以将变量分配给印刷品超类，而不必为每个单独的类重复分配它们。通过这样做，我们可以进一步减少需要编写和调试的冗余代码量。\n\
  \n在 图 5–16 中，你将看到 `Printed Material` 超类的属性布局，以及它如何影响 `Book`、`Magazine` 和 `Newspaper`\
  \ 子类。`Printed Material` 类的属性将被子类继承，因此无需在子类中显式定义它们。你会注意到 `Book` 类现在拥有的属性明显减少了。通过使用超类，你将显著减少程序中冗余代码的数量。\n\
  \n![images](img/0516.jpg)\n\n**图 5–16.** *超类和子类的属性*\n\n## 为什么要使用 OOP？\n\n在本章中，我们讨论了什么是\
  \ OOP，甚至讨论了如何创建类和对象。然而，我认为讨论为什么要在开发中使用 OOP 原则非常重要。\n\n如果你查看当今流行的编程语言，它们都在一定程度上使用了\
  \ OOP 原则。Objective-C、C++、Visual Basic、C# 和 Java 都要求程序员理解类和对象才能成功使用这些语言进行开发。为了成为当今世界的开发者，你需要理解\
  \ OOP。但是为什么要使用它呢？\n\n\n\n### 随处可见\n\n如今，几乎你选择从事的任何开发工作都需要你理解面向对象的原则。在 Mac OS X 和\
  \ iOS 中，你与之交互的每个元素都是一个对象。例如，简单的窗口、按钮和文本框都是对象，并拥有属性和方法。如果你想成为一名成功的程序员，就需要理解 OOP。\n\
  \n### 消除冗余代码\n\n通过使用对象，你可以减少需要重复输入的代码量。如果你编写了一段代码用于在顾客结账时打印收据，那么当你需要重新打印收据时，你也希望同样的代码可用。如果你将打印收据的代码放在`Sales`类中，就无需再次重写这段代码。这不仅节省了时间，通常还能帮助你消除错误。如果你不使用\
  \ OOP，并且发票发生了变化（即使是像图形更改这样简单的事情），你就必须确保在桌面应用和移动应用中都进行了修改。如果你漏掉了其中一个，就存在两个界面行为不一致的风险。\n\
  \n### 易于调试\n\n通过将与书籍相关的所有代码都放在一个类中，当书籍出现问题时，你就知道该去哪里查找。对于一个小型应用来说，这听起来可能没什么大不了的，但当你的应用达到数十万甚至数百万行代码时，这将为你节省大量时间。\n\
  \n### 易于替换\n\n如果你将所有代码都放在一个类中，那么随着应用中的变化，你可以替换掉这些类，并赋予新类完全不同的功能。然而，它能够以与当前类相同的方式与应用的其他部分进行交互。这类似于汽车零件。如果你想更换汽车上的消音器，你不需要买一辆新车。如果你与发票相关的代码分散在各处，那就使得修改类的元素变得更加困难。\n\
  \n## 高级主题\n\n我们在本章中讨论了 OOP 的基础知识，但还有一些其他主题对你的理解非常重要。\n\n### 接口\n\n正如我们在本章中讨论的，其他对象通过彼此交互的方式是使用方法。我们讨论了创建类时生成的头文件。这通常被称为接口，因为它告知其他对象它们如何与你的对象进行交互。在你的应用中实现一个标准接口，将使你的代码能够以相似的方式与不同的对象进行交互。这将显著减少你需要编写的特定于对象的代码量。\n\
  \n### 多态性\n\n多态性是指一个类的对象能够以另一个类的对象的样子出现并被使用的能力。这通常通过创建与另一个类相似的方法和属性来实现。我们一直在使用的一个多态性的好例子是书店。在书店中，我们有三个相似的类：`Book`、`Magazine`\
  \ 和 `Newspaper`。如果我们想对我们的整个库存进行一次大甩卖，我们可以遍历所有书籍并给它们降价。然后遍历所有杂志并给它们降价，接着再遍历所有报纸并给它们降价。这样会比我们实际需要做的工作多出很多。更好的做法是确保所有类都有一个降价方法。然后我们可以对所有对象调用该方法，而无需知道它们属于哪个类，只要它们是包含所需方法的类的子类即可。这将节省大量的时间和编码工作。\n\
  \n在规划你的类时，寻找可能适用于不止一种类别的相似之处和方法。从长远来看，这将为你节省时间并加速你的应用开发。\n\n### 总结\n\n我们终于到达了本章的末尾！以下是所涵盖内容的总结。\n\
  \n*   面向对象编程（OOP）\n    *   我们讨论了 OOP 的重要性以及所有现代代码都应使用该方法的原因。\n*   对象\n    *   你了解了对象以及它们如何对应现实世界中的对象。我们了解到许多编程对象直接与现实世界中的对象相关。你还了解了不对应现实世界对象的抽象对象。\n\
  *   类\n    *   你了解到类决定了每个对象将拥有的数据类型（属性）和方法。每个对象都需要有一个类。它是对象的蓝图。\n*   创建类\n    *\
  \   你学习了如何规划我们类的属性和方法。\n    *   我们使用 Xcode 创建了一个类文件。\n    *   我们编辑了类头文件以添加我们的属性和方法。\n\
  \n### 练习\n\n*   尝试为其余我们规划过的类创建类文件。\n*   规划一个`Author`类。选择你需要存储的关于作者的信息种类。\n\n对于大胆和进阶的读者：\n\
  \n*   尝试创建一个名为`PrintedMaterials`的超类。规划该类可能拥有的属性。\n*   为商店可能销售的其它类型的印刷材料创建类。\n\n\
  ## 第 6 章\n\n## 学习 Objective-C 和 Xcode\n\n在很大程度上，所有计算机语言都执行任何计算机都需要执行的典型任务——存储信息、比较信息、对这些信息做出决策，并根据这些决策执行某些操作。Objective-C\
  \ 是一种让这些任务更易于理解和完成的语言。Objective-C（实际上，任何 C 语言）的真正技巧在于理解用于完成这些任务的符号和关键字。本章将继续探讨 Objective-C\
  \ 和 Xcode，以便你能够更加熟悉它们。\n\n\n\n### Objective-C 简史\n\nObjective-C 实际上是两种语言的结合体：C 语言和一种鲜为人知的名为\
  \ Smalltalk 的语言。早在 20 世纪 70 年代，贝尔实验室的几位才华横溢的工程师创造了一种名为 C 的语言，这种语言使得他们心爱的项目——Unix\
  \ 操作系统——能够轻松地从一台机器移植到另一台机器上。在 C 语言出现之前，人们必须用汇编语言编写程序。汇编语言的问题在于每种语言都特定于其机器，因此将软件从一台机器迁移到另一台机器几乎是不可能的。由布莱恩·克尼汉和丹尼斯·里奇创建的\
  \ C 语言解决这个问题的方式，是提供一种能够为其所支持的任意机器生成相应汇编代码的语言，它堪称早期计算机语言的罗塞塔石碑。由于其可移植性，C 语言迅速成为许多类型计算机（尤其是早期个人电脑）的事实标准语言。\n\
  \n快进到 20 世纪 80 年代初，C 语言正逐步成为那个年代最流行的语言之一。大约在这个时候，一家名为 Stepstone 公司的工程师将 C 语言与另一种新兴语言\
  \ Smalltalk 结合了起来。C 语言通常被称为过程式语言，即一种使用过程来划分处理步骤的语言。而另一方面，Smalltalk 则完全不同，它是一种面向对象的编程语言。它不使用过程式处理，而是通过编程对象来完成其任务。这种\
  \ C 语言的新超集后来被称为“带对象的 C”，或者更常见的名字——Objective-C。\n\n1985 年，布拉德·考克斯将 Objective-C 语言及其商标卖给了\
  \ NeXT 计算机公司。NeXT 是史蒂夫·乔布斯的创意产物，而乔布斯在同一年刚刚被他自己的公司——苹果电脑公司——解雇。NeXT 使用 Objective-C\
  \ 语言构建了 NeXTSTEP 操作系统及其一套开发工具。事实上，Objective-C 语言赋予了 NeXT 在其所有软件上的竞争优势。使用 NeXTSTEP\
  \ 和 Objective-C 的程序员编写程序的速度比那些使用传统 C 语言的程序员要快得多。尽管 NeXT 计算机的硬件部分从未真正成功，但其操作系统和工具却大获成功。颇具趣味的是，NeXT\
  \ 于 1996 年底被苹果电脑公司收购，目的是取代其老化的操作系统——该系统自 1984 年第一台 Macintosh 开发以来就一直存在。收购四年后，曾经的\
  \ NeXTSTEP 以 Mac OS X 的形式重新登场，而 Objective-C 仍然是该系统的核心。\n\n### 理解语言符号\n\n尽管 Objective-C\
  \ 集成了大量的面向对象语言特性，但其核心仍然是 C 语言。以下是 Objective-C 中使用的一些符号和语言结构，其中一些是 C 语言的一部分，而大部分我们已经以某种方式接触过了。知道哪些是纯粹的\
  \ C 语言成分并不重要；只需知道新旧符号/结构共同构成了 Objective-C 语言即可。\n\n- `{` 这是左花括号，用于开始一个通常被称为代码块的区域。代码块用于定义并包围一段代码，同时设定其作用域。\n\
  - `}` 这是右花括号，用于结束一个代码块。凡是有开始（`{`）的地方，就必定有一个对应的结束（`}`）。\n- `- (void)methodName` 这是\
  \ Objective-C 中方法定义的格式。当然，`methodName` 这个词可以代表任何名称。`(void)` 这个词也是可以变化的，它表示该方法返回的信息类型。在这个例子中，`(void)`\
  \ 表示该方法没有关联的数据类型（数据类型在第 3 章中介绍过，并将在后续章节中更深入地探讨）。`(void)` 可以被替换成类似 `(NSString*)`\
  \ 这样的形式，这将在后面进一步讨论。\n- `*` 星号（被称为“star”或“splat”）用于表示指针（参见第 13 章）。目前真正需要了解的是，当你看到类似\
  \ `NSString*` 这样的内容时，把它当作名称的一部分。`NSString` 和 `NSString*` 是完全不同的。\n- `;` 分号用于结束一行代码。关于分号需要记住的一点是，它们不会用在控制程序流程的语句末尾，例如\
  \ `if`, `for`, `while` 等。你最终会理解它们该去何处以及不该去何处的规则。\n- `[ ]` 这些被称为方括号，用于向 Objective-C\
  \ 对象发送消息。第 7 章会更详细地讨论这个主题。\n- `@` 虽然许多人会将此符号与电子邮件地址联系起来，但 at 符号在 Objective-C 中用于标识一个\
  \ Objective-C 指令。指令是一种特殊的 Objective-C 命令，例如 `@interface`，`@implementation` 或 `@property`。\n\
  - `#` 井号（如果你喜欢冷知识，也可以叫 octathorpe）与 `@` 符号类似，用于标识 C 语言指令，例如 `#import` 或 `#define`。虽然它最初是\
  \ C 语言的一部分，但 `#` 的使用在几乎所有的 Objective-C 程序中仍然可见。\n\n那么，让我们来看一个 Objective-C 代码的例子：\n\
  \n![images](img/U0601.jpg)\n\n第 1 行表示一个 Objective-C 方法。`(void)` 表示此方法未与数据类型关联，如果被调用，不会向调用者返回值。\n\
  \n第 2 行和第 5 行是定义代码块的花括号。这个代码块定义了该方法。每个方法至少有一个代码块。\n\n第 3 行定义了一个 `NSString*` 对象，并将其值赋为\
  \ `@\"Hello World\"`。请记住，at 符号（`@`）是一个 Objective-C 指令，是定义常量字符串对象的一种快捷方式（回想一下，我们第一次看到字符串是在第\
  \ 3 章）。\n\n第 4 行调用了 `NSLog` 方法；它不是一个对象，所以我们不能向它发送消息。相反，我们将要打印的 `hello` `NSString*`\
  \ 对象传递给该方法。\n\n虽然对于刚开始学习 Objective-C 的人来说，这看起来有点难以理解，但这种简单而简洁的语法并不需要花费太多时间去学习。\n\
  \n\n\n### 将“Objective”注入 Objective-C\n\nObjective-C 之所以能成为面向对象的语言，很大程度上源于其对 Smalltalk\
  \ 的借鉴。Smalltalk 是一种百分之百的面向对象语言，而 Objective-C 大量借用了 Smalltalk 的概念和语法。以下是从 Smalltalk\
  \ 借鉴的几个高层概念。如果其中某些术语听起来陌生，不必担心；它们将在后续章节中讨论（第 7 章 和 第 8 章 介绍了基础知识）。\n\n- 几乎所有事物都是**对象**。\n\
  - 对象会接收**消息**。在此语境下，对象有时也被称为**接收者**，因为它正在接收消息。\n- 对象包含**实例**变量。\n- 对象和实例变量具有定义的**作用域**。\n\
  - 类隐藏了对象的**实现**。\n\n**注意：** 正如我们在第 5 章中看到的，术语**类**通常用于表示对象的定义或类型。**对象**是由类创建出来的。例如，SUV\
  \ 是一种*车型*。类就像是某种蓝图。工厂生产 SUV，产出的就是人们驾驶的 SUV 对象。你无法驾驶一个*类*，但可以驾驶从类构建出的*对象*。\n\n那么，这些概念是如何转换到\
  \ Objective-C 中的呢？首先，Objective-C 中的对象通过两个不同的部分来定义：`@interface` 和 `@implementation`。`@interface`\
  \ 部分定义了对象可以响应哪些消息以及对象将使用的实例变量。`@implementation` 部分包含了 `@interface` 部分中各种消息的实际代码。\n\
  \n为什么接口和实现要分开呢？因为在一个程序中，Objective-C 对象只被定义一次。然而，它可能在程序的许多不同地方被使用。在使用对象的地方，程序只需读入或**导入**接口即可；如果该对象的代码每次使用时都需要复制，那将是低效的。\n\
  \n**注意：** 通常的惯例是，将对象的接口存储在 `.h` 文件中，实现存储在 `.m` 文件中。两个文件都以对象命名。因此，如果要定义一个 `Library`\
  \ 对象，其接口将位于 `Library.h` 中，实现位于 `Library.m` 中（请记住，名称是区分大小写的）。\n\n接下来，我们看一个简单的例子，这是一个名为\
  \ `HelloWorld` 的 Objective-C 对象的完整定义。下面是接口文件（`HelloWorld.h`）。\n\n![images](img/U0602.jpg)\n\
  \n这是实现文件（`HelloWorld.m`）：\n\n![images](img/U0603.jpg)\n\n在上面的例子中，定义了一个名为 `HelloWorld`\
  \ 的对象。这个对象只定义了一个消息——`printGreeting`。所有这些奇怪的符号是什么意思呢？我们以行号为参考，逐行分析这段代码。\n\n第 1 行包含一个编译器指令：`#import\
  \ <Foundation/Foundation.h>`。为了让这个小程序能够识别某些其他对象（例如第 3 行的 `NSObject`），我们需要让编译器读取其他接口文件。在这里，`Foundation.h`\
  \ 文件定义了 **Foundation 框架**中的对象和接口。该框架包含了 iOS 和 Mac OS X 系统中大多数非用户界面的基类定义。这里重要的是，我们有\
  \ `NSObject` 对象的定义。我们对象的实际起始位置在第 3 行，如下所示。\n\n`@interface HelloWorld : NSObject`\n\
  \n`HelloWorld` 是对象，但 `: NSObject` 是什么意思呢？对象名后的冒号（`:`）表示我们计划从另一个类派生出额外的功能。在这个例子中，`NSObject`\
  \ 就是那个类。`HelloWorld` 现在是 `NSObject` 的一个*子类*。\n\n**注意：** 为什么叫 `NSObject` 而不是 `Object`？你还记得\
  \ Mac OS X 实际上是从 NeXTSTEP 系统移植而来的吗？“NS”是 NeXTSTEP 的缩写，并用于 Mac OS X 和 iOS 的许多基础对象中——例如\
  \ `NSObject`、`NSString`、`NSDictionary` 等。\n\n第 4 行和第 5 行仅包含 `{` 和 `}` 字符。这个代码块用于定义对象使用的实例变量，但\
  \ `HelloWorld` 类足够简单，不需要实例变量。稍后，在第 9 章中，会有定义和使用实例变量的例子。\n\n第 7 行包含该对象的一个消息定义，如下所示：\n\
  \n`- (void)printGreeting;`\n\n在定义消息时，该行必须以 `+` 或 `-` 字符开头。对于 `HelloWorld` 对象，我们使用\
  \ `-` 来表示该消息可以在对象创建*之后*使用。`+` 字符用于可以在对象创建*之前*使用的消息。消息的其余部分 `(void) printGreeting`\
  \ 代表消息的返回值。这里，`(void)` 值后面跟着实际的消息名 `printGreeting`。\n\n在第 9 行，`@end` 表示对象接口的定义完成。\n\
  \n以上就是 `HelloWorld` 对象接口的完整描述；内容并不多。更复杂的对象只是拥有更多的消息和更多的实例变量。\n\n对于实现部分，源代码存储在不同的文件\
  \ `HelloWord.m` 中。开头部分，第 10 行以语句 `#import \"HelloWorld.h\"` 开始。这只是为了让我们的对象知道自己的接口。虽然将接口文件和实现文件分开起初看起来有些奇怪，但这种惯例在\
  \ Objective-C 编程中非常一致。每当要使用一个对象时，只需包含其接口即可。另外，导入时使用了引号括起来的 `\"HelloWorld.h\"`，而不是单独使用的\
  \ `<HelloWorld.h>`。区别是什么？很简单，使用引号（例如 `\"HelloWorld.h\"`）导入文件，表示编译器应在本地项目中查找该文件；而使用\
  \ `<Foundation/Foundation.h>` 导入，则表示该文件位于某个全局区域，适用于*所有*项目。记住的简单方法是：如果你创建了该文件，请使用双引号；如果不是，请使用尖括号（`<`\
  \ 和 `>`）。\n\n第 12 行是对象实现的开始，如下所示：\n\n`@implementation HelloWorld`\n\n第 14 行是对象消息\
  \ `printGreeting` 的定义。它与接口文件中的消息定义看起来完全相同。唯一的区别是，这里定义了实现 `printGreeting` 消息的代码。\n\
  \n第 15 行到第 17 行构成了实现 `printGreeting` 消息的代码块。对于这个简单的消息，调用了函数 `NSLog`。这个基础级别的函数接收一个格式化的\
  \ `NSString` 对象，并将结果输出到控制台。`NSString` 类是一个 Objective-C 类，实现了字符串字符的行为。为什么为此专门设计一个类？一方面，它为框架提供了一种表示字符串的一致对象。此外，`NSString`\
  \ 中具有大量可用于操作、比较和转换实际数据的功能。\n\n这里的 `NSString` 对象是以一种简写方式指定的。`@\"Hello World!\"` 是一种快速声明\
  \ `NSString` 对象的方式。at 符号（`@`）用于表示指定的字符串是一个 `NSString` 对象。\n\n第 19 行向编译器表示实现部分的定义已完成。\n\
  \n但等等，还有更多内容。既然我们已经定义了一个新的 Objective-C 类，那么如何使用它呢？下面是另一段代码，展示了如何使用这个新创建的类，这是主程序（`myprogram.m`）。\n\
  \n![images](img/U0604.jpg)\n\n\n\n在`HelloWorld.h`文件中，程序首先包含了`*HelloWorld.h*`文件，这使得应用程序的这一部分能够访问`HelloWorld`对象。\n\
  \n在第 22 行，我们有`main`函数。请记住，每个 Objective-C 程序都必须有一个`main`函数。\n\n第 24 行较为复杂。它定义并**实例化**了`HelloWorld`类。你首先看到文本`HelloWorld*\
  \ myObject`。这定义了一个名为`myObject`的变量，其类型为`HelloWorld`，即我们的新类。星号（`*`）用于表示一个**指向**对象的**指针**。这种表示法基本上意味着我们不希望对象本身在这里；我们只希望有一种方法可以访问它，或者说一个指向它所在位置的指针。可以这样理解：就像有人给了你一张名片。你拥有名片，而不是实际的人。但名片是一种联系人的方式。\n\
  \n**注意：** 实例化使得一个类成为计算机内存中的真实对象。类本身在没有实例的情况下是不可用的。以 SUV 为例，在没有工厂制造（实例化）出 SUV 之前，SUV\
  \ 毫无意义。只有在那之后，SUV 才能被使用。\n\n该行的下一部分是`[[HelloWorld alloc] init]`。这是一个**嵌套**调用。最内层括号内的指令首先执行，因此`[HelloWorld\
  \ alloc]`是第一个发送的消息。等等，我们从未定义过`alloc`消息，这怎么能行呢？嗯，当`HelloWorld`被定义时，它被定义为`NSObject`的子类。解释这种关系的另一种方式是：`NSObject`是`HelloWorld`的父类。当我们向`HelloWorld`对象发送`alloc`消息时，系统知道`HelloWorld`不认识这条特定的消息，因此它会自动将消息传递给父类；在我们的例子中，父类是`NSObject`类。\n\
  \n一旦`[HelloWorld alloc]`被调用，返回值是一个指向新分配的`HelloWorld`对象的指针（**分配**意味着我们使用计算机内存的一部分来存储某些内容）。但我们还没有完成。嵌套语句的剩余部分，即`init`消息，接下来被执行：`[[HelloWorld\
  \ alloc] init]`。因此，现在`init`消息被发送给由`[HelloWorld alloc]`创建的新`HelloWorld`对象。`init`只是执行对象的一些基本初始化。这一切的最终返回是一个指向新对象的指针，即指向`HelloWorld`对象的指针。\n\
  \n**注意：** 在 Objective-C 中，每当向对象发送消息时，代码必须放在方括号`[`和`]`内。\n\n既然我们已经创建了一个新对象，就可以使用它了。第\
  \ 25 行`[myObject printGreeting]`让我们的对象投入使用。在这段代码中，我们通过向它发送`printGreeting`消息来使用新实例化的对象。程序将输出文本`HelloWorld!`\n\
  \n第 27 行向我们的对象发送另一条消息`release`。这条消息告诉系统，该程序已使用完该对象，并释放与其关联的任何系统资源。\n\n第 28 行向`main`函数的调用者返回值`0`。这表示执行成功。\n\
  \n第 29 行结束代码块和程序。\n\n**注意：** 消息也可以接受多个参数。例如，考虑`[myCarObject switchRadioBandTo:FM\
  \ andTuneToFrequncy:104.7];`。这里的消息将是`switchRadioBandTo:andTuneToFrequency:`。在每条冒号之后，当消息实际发送时，会放置参数值。你可能还会注意到，这些消息的命名方式使得解释它们实际做的事情变得容易理解。在开发类时，使用有帮助的消息名称是一个理想的约定，因为这使得类的使用更加直观。在命名消息时保持一致性也至关重要。\n\
  \n### 在 Xcode 中编写另一个程序\n\n当您首次打开 Xcode 时，您将看到如图 6-1 所示的屏幕。\n\n![images](img/0601.jpg)\n\
  \n**图 6-1.** *Xcode 打开界面*\n\n图 6-1 显示了一个在启动 Xcode 时始终可见的绝佳界面。在您对 Xcode 更加熟悉之前，请保持选中**Show\
  \ this window when Xcode launches**复选框。此窗口允许您选择最近创建的项目、访问开发者文档（即**Getting started\
  \ with Xcode**图标），并快速链接到 Apple 的开发者网站。无论选择哪个文档集，它们都为初学者和高级用户提供了丰富的信息。\n\n\n\n###\
  \ 创建项目\n\n我们将开始一个新项目，因此请点击**创建一个新的 Xcode 项目**图标。无论何时你想开始一个新的 iOS 或 Mac OS X 应用程序、库或其他任何东西，都请使用这个图标。当一个项目已创建并保存后，该项目将出现在屏幕右侧的“最近项目”列表中。\n\
  \n对于这个 Xcode 项目，我们将选择一些非常简单的选项。确保选中了 iOS 应用程序。然后选择**单视图应用程序**，如图 6-2 所示。然后只需点击**下一步**按钮。\n\
  \n![images](img/0602.jpg)\n\n**图 6-2.** *从模板列表中选择一个新项目*\n\n有几种不同类型的模板。这些模板通过自动创建简单的源文件来提供一个起点，使得从头开始一个项目变得更容易。\n\
  \n选择模板并点击**下一步**按钮后，Xcode 会弹出一个对话框，询问项目的名称和其他一些信息，如图 6-3 所示。输入产品名称为 **MyFirstApp**。公司标识符需要有一个值，所以只需输入\
  \ **MyCompany**。同时确保**设备系列**设置为 **iPhone**。\n\n![images](img/0603.jpg)\n\n**图 6-3.**\
  \ *设置产品名称、公司和类型*\n\n**包含单元测试**复选框可以保持默认设置。在我们的示例中，我们没有勾选它。对于这个示例，勾选与否并不重要。提供所有信息后，点击**下一步**按钮。Xcode\
  \ 将询问你项目的保存位置。你可以将其保存在任何地方，但桌面是一个不错的选择，因为它总是可见的。此外，默认情况下，**使用自动引用计数**是勾选状态，这更可取。^(1)\n\
  \n__________\n\n¹ 第 13 章 会详细介绍自动引用计数或 ARC。\n\n![images](img/0604.jpg)\n\n**图 6-4.**\
  \ *Xcode 4.0 主屏幕*\n\n选择项目保存位置后，将显示 Xcode 主屏幕。最左侧的窗格是源文件列表。右侧三分之二的屏幕专用于上下文相关的编辑器。点击一个源文件，编辑器将显示源代码。点击一个\
  \ `*.xib`（读作 zib）文件将显示屏幕界面编辑器。\n\n**注意：** Xcode 4 引入了一个全新的单屏幕环境，称为*工作区窗口*。例如，在 Xcode\
  \ 3 及更早版本中，Interface Builder（用于构建界面的系统）是一个独立的程序。现在，在 Xcode 4 中，只需点击一个界面文件，即可在 Xcode\
  \ 4 中显示该界面。\n\n我们的第一个应用程序将会非常简单。这个 iPhone 应用将只包含一个按钮。当按钮被按下时，你的名字将出现在屏幕上。那么，让我们先更仔细地看一下\
  \ Xcode 为我们创建的一些存根源代码。Xcode 的一个好处是，它会创建一个无需任何修改即可执行的存根应用程序。在我们开始添加一些代码之前，让我们看一下\
  \ Xcode 的主工具栏，如图 6-5 所示。\n\n![images](img/0605.jpg)\n\n**图 6-5.** *Xcode 4 工具栏*\n\
  \n初看之下，工具栏有三个不同的区域。左侧区域用于运行/调试应用程序。中间窗口显示状态，作为编译器错误和/或警告的摘要。最右侧区域包含一系列用于自定义编辑视图的按钮。\n\
  \n![images](img/0606.jpg)\n\n**图 6-6.** *Xcode 工具栏左侧部分特写*\n\n如图 6-6 所示，工具栏的左侧部分包含一个*播放*按钮（类似于\
  \ iTunes），该按钮将编译并运行应用程序。如果应用程序正在运行，*停止*按钮将不会变灰。由于它是灰色的，我们知道应用程序没有运行。*方案*和*断点*目前可以不用理会。它们将在第\
  \ 14 章中更详细地讨论。\n\n![images](img/0607.jpg)\n\n**图 6-7.** *Xcode 工具栏右侧部分特写*\n\nXcode\
  \ 工具栏的右侧包含用于更改编辑器的按钮。这三个按钮分别代表*标准编辑器*（已选中）、*辅助编辑器*和*版本编辑器*。目前，只需选择*标准编辑器*，如图 6-7\
  \ 所示。\n\n在编辑器选择旁边是一组视图按钮。这些按钮可以切换打开或关闭。例如，图 6-7 中选中的按钮代表如图 6-4 所示的当前视图——屏幕左侧三分之一是程序文件列表，其余三分之二是主编辑器。可以选择任意组合，或者都不选，以帮助自定义主工作区窗口。最后一个按钮用于打开*管理器*窗口。我们将在第\
  \ 14 章中更详细地讨论这个按钮。现在，让我们回到我们的第一个 iPhone 应用。\n\n![images](img/0608.jpg)\n\n**图 6-8.**\
  \ *在 Xcode 编辑器中查看源代码*\n\n点击 `ViewController.h` 文件一次，如图 6-8 所示。编辑器显示了一些称为*接口*文件的\
  \ Objective-C 代码。你可以通过第 11 行的 `@interface` Objective-C 指令来判断这是一个接口文件。我们将在下一章讨论接口文件的重要性。\n\
  \n**注意：** 目前，我们只是要添加几行代码并看看它们的作用。并不要求你现在就理解这些代码的含义。重要的是通过操作来熟悉 Xcode。第 7 章 会更深入地介绍\
  \ Objective-C 程序的构成，第 10 章 会更深入地介绍如何构建 iPhone 界面。\n\n接下来，我们将在这个文件中添加两行代码，如图 6-9\
  \ 所示。第 12 行在屏幕上定义了一个 iPhone 标签，我们可以在上面放置一些文本。第 15 行告诉编译器这个对象可以接收一个名为 `showName:`\
  \ 的消息。我们将调用这个方法来填充 iPhone 标签。标签只不过是屏幕上用于放置一些文本信息的区域。\n\n**警告：** 请**完全**按照示例所示输入代码。例如，`UILabel`\
  \ 不能写成 `uilabel` 或 `UILABEL`。Objective-C 是一种区分大小写的语言，所以 `UILabel` 与 `uilabel` 完全不同。\n\
  \n![images](img/0609.jpg)\n\n**图 6-9.** *添加到 ViewController.h 接口文件中的代码*\n\n接下来，我们将添加代码使\
  \ `showName:` 消息执行某些操作。首先，点击左侧的 `ViewController.m` 文件一次。这个文件是一个*实现*文件。你可以通过第 11\
  \ 行的 `@implementation` Objective-C 指令来判断它是一个实现文件，如图 6-10 所示。\n\n![images](img/0610.jpg)\n\
  \n**图 6-10.** *ViewController.m 实现文件*\n\n注意第 11 行有一个警告符号。点击该警告符号会显示警告“不完整的实现”，这基本上意味着我们在接口文件中提到了一个新消息，但它尚未被添加到实现文件中。图\
  \ 6-11 是更新后的实现文件。\n\n![images](img/0611.jpg)\n\n**图 6-11.** *添加到 ViewController.m\
  \ 实现文件中的代码*\n\n\n\n当添加`#19–22`行代码后（如图 6-11 所示），警告消息便会消失。Xcode 4 的妙处在于，无需先尝试编译和运行程序，它就会报告键入代码中的任何警告或错误。这种即时反馈有时可能让人烦恼，但确实能节省时间。\n\
  \n现在我们已经有了必要的代码，但在 iPhone 上还没有界面。接下来，我们将编辑界面，为应用添加两个界面对象。\n\n为了编辑 iPhone 的界面，我们需要单击`ViewController.xib`文件。`.xib`文件包含单个窗口或视图的所有信息。具有多个视图的应用将包含多个`.xib`文件。我们将使用\
  \ Xcode 的界面编辑器，将标签（Label）等 UI 对象*连接*到我们刚刚创建的代码上。连接操作就像点击和拖动一样简单。\n\n我们不会修改`MainWindow.xib`文件。在我们的示例中，`MainWindow.xib`文件仅包含了我们的视图，即`ViewController.xib`文件。\n\
  \n![images](img/0612.jpg)\n\n**图 6–12.** *我们将要修改的 iPhone 界面*\n\n请注意，我们点击了屏幕右上角的最后一个`view\
  \ button`（视图按钮），如图 6-12 所示。这会打开界面的实用工具视图。除其他功能外，此实用工具视图会显示我们可以在应用中使用的各种界面对象。我们只需关注前两个：`Round\
  \ Rect Button`（圆角矩形按钮）和`Label`（标签）。\n\n第一步是从实用工具窗口中单击`Round Rect Button`。接着，将该对象拖拽到\
  \ iPhone 视图上，如图 6-13 所示。不用担心；拖拽该对象并不会将其从实用工具视图的对象列表中移除。拖拽出来会在我们的 iPhone 界面上创建该对象的一个新副本。\n\
  \n![images](img/0613.jpg)\n\n**图 6–13.** *将按钮对象移动到 iPhone 视图上*\n\n接下来，双击刚刚添加到 iPhone\
  \ 界面上的圆角矩形按钮（Round Rect Button）。这样可以将按钮的标题从无更改为“Name”（名称），如图 6-14 所示。许多不同的界面对象操作方式都与此类似。只需双击并更改对象的标题即可。这也可以在代码中完成，但在界面编辑器中操作要简单得多。\n\
  \n更改标题后，拖拽一个标签（Label）对象并将其放置在按钮正下方，如图 6-15 所示。\n\n![images](img/U0605.jpg)\n\n**图\
  \ 6–14.** *修改按钮标题*\n\n![images](img/0615.jpg)\n\n**图 6–15.** *向 iPhone 界面添加标签对象*\n\
  \n目前，我们可以将标签的文本保留为“Label”，因为这样在界面上容易找到它。如果清除了标签的文本，该对象仍然存在，但就没有可见的内容可供点击来选择标签了。通过向右拖拽中间的蓝色球体来扩大标签的尺寸，如图\
  \ 6-16 所示。\n\n![images](img/0616.jpg)\n\n**图 6–16.** *扩大标签尺寸*\n\n现在我们同时拥有了按钮和标签，接下来就可以将这些可视化对象连接到我们的程序。首先，在按钮控件上点击鼠标右键。这会调出一个连接菜单，如图\
  \ 6-17 所示。\n\n![images](img/0617.jpg)\n\n**图 6–17.** *按钮对象的连接菜单*\n\n接着，我们从`Touch\
  \ Up Inside`（手指抬起）连接圆圈点击并拖拽到`File’s Owner`（文件所有者）图标上，如图 6-18 所示。`Touch Up Inside`表示用户点击了按钮的*内部区域*。将连接拖拽到文件所有者（即`ViewController`对象）上，会将`Touch\
  \ Up Inside`事件连接到`ViewController`对象。这样做的作用是，每当按钮被按下时，我们的对象都能收到通知。\n\n![images](img/0618.jpg)\n\
  \n**图 6–18.** *将 `Touch Up Inside` 事件连接到我们的对象*\n\n连接建立后，会显示一个可用于该连接的方法列表，如图 6-19\
  \ 所示。在我们的示例中，只有一个方法，即`showName:`方法。选择`showName:`方法会将`Touch Up Inside`事件连接到我们的对象。\n\
  \n![images](img/0619.jpg)\n\n**图 6–19.** *选择处理 `Touch Up Inside` 事件的方法*\n\n连接完成后，详细信息会显示在按钮的连接菜单上，如图\
  \ 6-20 所示。\n\n![images](img/0620.jpg)\n\n**图 6–20.** *连接现已完成*\n\n接下来，我们为标签对象创建连接。在这种情况下，我们不关心标签的事件；相反，我们希望将`ViewController`的`nameLabel`输出口连接到\
  \ iPhone 界面上的对象。这个连接基本上告诉我们的对象，我们想要设置文本的标签位于 iPhone 界面上。\n\n首先，在 iPhone 界面上的标签对象上点击鼠标右键。这会调出标签的连接菜单，如图\
  \ 6-21 所示。标签对象的选项没有按钮对象那么多。\n\n![images](img/0621.jpg)\n\n**图 6–21.** *标签对象的连接菜单*\n\
  \n如上所述，我们在此不是为了连接事件。相反，我们连接的是所谓的*引用输出口*（Referencing Outlet）。此连接将屏幕对象连接到`ViewController`对象中的一个变量。就像按钮一样，将连接拖拽到`File’s\
  \ Owner`图标上，如图 6-22 所示。\n\n![images](img/0622.jpg)\n\n**图 6–22.** *将引用输出口连接到我们的对象*\n\
  \n连接拖拽到文件所有者上后，会显示`ViewController`对象中的输出口列表，如图 6-23 所示。在两个选项中，我们选择`nameLabel`。这是我们正在使用的`ViewController`对象中的变量名称。\n\
  \n![images](img/0623.jpg)\n\n**图 6–23.** *选择对象的变量以完成连接*\n\n选择`nameLabel`后，我们就可以运行程序了。点击\
  \ Xcode 窗口左上角的`Run`（运行）按钮（参见图 6-6）。这将自动保存你的文件并在 iPhone 模拟器中启动应用程序，如图 6-24 所示。\n\n\
  ![images](img/0624.jpg)\n\n**图 6–24.** *我们的应用运行中，按钮按下前后对比*\n\n点击`Name`按钮后，标签的文本将从默认值“Label”更改为“My\
  \ Name is Mitch!”或你输入的任何值。如果你愿意，可以回到界面中清除默认的标签文本。\n\n### 总结\n\n本章的示例非常简单，但希望它们能激发你使用\
  \ Objective-C 和 Xcode 开发更复杂应用的兴趣。在后续章节中，你将学习更多关于面向对象编程的知识，以及 Objective-C 的更多功能。你已经学到了很多，值得为自己鼓掌。以下是本章讨论的主题总结：\n\
  \n*   Objective-C 语言的起源和简史，\n*   Objective-C 中常用的一些语言符号，\n*   一个 Objective-C 类的示例，\n\
  *   程序的`@interface`和`@implementation`部分，\n*   更深入地使用 Xcode，包括输入和编译`HelloWorld.m`源文件，以及\n\
  *   将可视化界面对象与应用程序对象中的方法和变量进行连接。\n\n\n\n### 练习\n\n*   清除程序中“Label”的默认文本，然后重新运行示例。\n\
  *   将界面上的标签对象的宽度调小。这对我们的文本消息有何影响？\n*   删除标签的引用插座（Referencing Outlet）连接，然后重新运行项目。会发生什么？\n\
  *   如果你觉得自己已经掌握了要领，可以添加一个新的按钮和标签，同时添加到`ViewController`对象和界面中。将其从显示你的名字改为显示其他内容。\n\
  \n## 第 7 章\n\n## Objective-C 类、对象和方法\n\n如果你还没有阅读第 6 章，请在阅读本章之前先阅读它，因为它对 Objective-C\
  \ 的一些基础知识做了很好的介绍。本章将在此基础上进一步深入。学完本章后，你将对 Objective-C 语言以及如何使用基础知识编写简单程序有更深入的理解。对\
  \ Mitch 个人而言，最好的学习方法是编写（或重写）小型 Objective-C 程序，以观察该语言的运作方式。\n\n本章将介绍 Objective-C\
  \ 类的组成，以及如何通过方法与 Objective-C 对象进行交互。我们将以一个简单的无线电台类为例，展示 Objective-C 类的编写方式。这有望帮助你理解如何使用\
  \ Objective-C 类。本章将教你如何针对需要解决的问题来设计对象。我们会涉及如何创建自定义对象，以及如何使用 Foundation 类中提供的现有对象。\n\
  \n如果你来自 C 语言家族，你会发现 Objective-C 与其有许多相似之处。如第 6 章所述，Objective-C 的根源深深植根于 C 语言。本章将扩展第\
  \ 6 章的主题，并融入第 8 章中描述的一些概念。\n\n## 创建 Objective-C 类\n\n第 6 章介绍了 Objective-C 语言的一些常见元素，让我们快速回顾一下。\n\
  \n*   Objective-C 类分为两部分：类接口（class interface）和类实现（class implementation）。\n*   `@interface`：此关键字用于定义新\
  \ Objective-C 类的接口。该部分写在`.h`或头文件中。\n*   **方法（Methods）**：这些是在类的`@interface`部分定义、并在`.m`文件中的`@implementation`部分实现的代码块。\n\
  *   `@implementation`：此关键字用于定义实现接口中定义的方法的实际代码。该部分写在`.m`或 Objective-C 类文件中。\n\n如第\
  \ 6 章所述，Objective-C 类由接口和相应的实现组成。现在，我们集中讨论接口。在最基本的层面上，类的接口告诉你类的名称、它派生自哪个类，以及该类理解哪些**消息**。请注意这里使用了“消息”一词。要与\
  \ Objective-C 对象通信，程序会向该对象发送消息。这些消息直接转化为实现文件中的代码——这些实现代码被称为方法。\n\n以下是类接口第一行的示例：\n\
  \n`@interface RadioStation : NSObject`\n\n这里，类名是`RadioStation`。类名后的冒号（`:`）表示该类派生自另一个类；也就是说，`RadioStation`对象**继承**了`NSObject`类的功能。换句话说，在我们列表\
  \ 7–1 所示的示例中，`RadioStation`类派生自`NSObject`类。\n\n**提示：** 如果你的对象不继承自任何其他基础类，*始终*继承自`NSObject`；没有它，你的类将毫无价值。`NSObject`提供了使新对象正确运行的基本功能。`NSObject`是所有\
  \ Foundation 类的基类。因此，继承自任何 Foundation 类也是可以的。\n\n一旦定义了类名，接口文件的其余部分就包含了该类的主要组成部分（见列表\
  \ 7–1）。\n\n**列表 7–1.** *接口文件：`RadioStation.h`*\n\n![images](img/U0701.jpg)\n\n###\
  \ 声明接口和实例变量\n\nObjective-C 类由其**接口**定义。由于对象大部分通过消息进行通信，对象的接口定义了该对象将响应哪些消息。第 1 行导入了\
  \ Foundation 类定义（稍后会详细介绍）。第 2-7 行通过定义类的名称（有时称为**类型**）和继承的类来开始定义类的接口。接下来，有一个在大括号（`{`\
  \ `}`）内定义的块。此块用于定义该类的*实例*所使用的变量。这些被称为**实例变量**。\n\n每当`RadioStation`类被实例化时，生成的`RadioStation`对象都可以访问这些变量，这些变量仅针对特定实例。如果有十个`RadioStation`对象，每个对象都有自己的变量，独立于其他对象。这也称为**作用域**，即对象的变量位于每个对象的作用域内。\n\
  \n\n\n### 发送消息（方法）\n\n每个对象都有方法。在 Objective-C 中，与对象交互的常见概念是向对象发送一条消息：\n\n```\n[myStation\
  \ frequency];\n```\n\n上一行代码会向一个名为 `myStation` 的 `RadioStation` 类实例发送一条消息。在这个例子中，`myStation`\
  \ 被称为**接收者**，因为它接收消息。消息（上例中的 `frequency`）用于选择对象内将要调用的方法。消息中出现的这些方法名称，如上例所示，被称为**选择器**。由于消息根据名称选择方法，实际上消息和方法名是同义词。\n\
  \n如果某个类不理解某条消息，该消息会传递给父对象；在这种情况下，是 `NSObject`。如果父对象也不理解该消息，则会继续传递给其父对象，依此类推，直到找到或找不到这条消息为止。这种行为被称为**动态绑定**，这意味着方法是在运行时而非编译时被找到的。动态绑定允许\
  \ Objective-C 程序在运行过程中对变化做出反应——这是 Objective-C 相对于其他语言的一大优势。\n\n消息也可以附带参数。为什么要传递参数？传递参数有几个原因。首先（也是最常见的），可能性范围太大，无法编写成单独的方法。其次，需要存储在对象中的数据是可变的——例如广播电台的名称。在下面的示例中，你会看到为每一种可能的广播频率编写方法是不切实际的；因此，频率作为参数传入。电台名称也是如此。\n\
  \n```\n[myStation setFrequency: 104.7];\n```\n\n消息是 `setFrequency:`。冒号表示该消息需要一个参数。消息可以有多个参数，如下例所示：\n\
  \n```\nmyStation = [[RationStation alloc] initWithName:@\"KZZP\" atFrequency: 104.7];\n\
  ```\n\n我们关注的消息是：\n\n```\ninitWithName:atFrequency:\n```\n\n理解消息及其结构非常重要，尤其是在实际实现代码时。在你的代码中，你需要确保实现了\
  \ `initWithName:atFrequency:` 方法；否则程序将无法运行。\n\n在上例中，消息由两个参数组成：电台名称及其频率。Objective-C\
  \ 相对于其他语言的一个有趣之处在于，方法本质上是命名参数。如果这是一个 C++ 或 Java 程序，调用方式会是：\n\n```\nmyObject = New\
  \ RadioStation(\"KZZP\", 104.7);\n```\n\n虽然 `RadioStation` 对象的参数可能看起来很明显，但拥有命名参数可能是一个优势，因为它们或多或少地说明了参数的用途或作用。以下是一些示例：\n\
  \n- `[NSDictionary dictionaryWithContentsOfFile:filename];`\n- `[myString characterAtIndex:\
  \ 1];`\n- `[myViewController willRotateToInterfaceOrientation:portrait duration:60];`\n\
  \n### 使用类方法\n\n类不必实例化即可使用。在某些情况下，类拥有可以执行一些简单操作并返回值的方法。这些方法被称为**类方法**。在列表 7–1 中，以加号（`+`）开头的方法是类方法——所有类方法都必须以\
  \ `+` 号开头。\n\n类方法有限制。它们最大的限制之一是任何实例变量都不能被使用。嗯，从技术上讲，Xcode 允许在类方法中编写实例变量。代码编译时会产生警告，但访问或使用实例变量不会有任何效果——千万不要这样做。无法使用实例变量是合理的，因为我们还没有实例化任何东西。类方法可以在方法内部拥有自己的局部变量，但不能使用任何定义为实例变量的变量。\n\
  \n调用类方法的方式如下：\n\n```\n[RadioStation minAMFrequency];\n```\n\n请注意，这个调用与向实例化对象传递消息的方式非常相似。最大的区别在于，这里使用的是*类名*本身，而不是实例变量。类方法在\
  \ Mac OS X 和 iOS 框架中被广泛使用。它们主要用于返回一些固定的或众所周知类型的值，或者返回对象的新实例。这类类方法有时被称为**工厂方法**，因为就像工厂一样，它们会创建新东西；在这里，就是创建一个类的新实例。以下是一个工厂方法的示例：\n\
  \n1.  `[NSDate timeIntervalSinceReferenceDate]; // 返回一个数字`\n2.  `[NSString stringWithFormat:@\"\
  %d\", 1000]; // 返回一个新的 NSString 对象`\n3.  `[NSDictionary alloc];            // 返回一个新的未初始化的\
  \ NSDictionary 对象`\n\n以上所有消息都是正在被调用的类方法。\n\n第一行简单地返回一个值，表示自参考日期 2001 年 1 月 1 日以来的秒数。\n\
  \n第二行返回一个新的 `NSString` 对象，该对象已被格式化，值为 `1000`。\n\n第三行是一种非常常见的形式，因为它实际上分配了一个新对象。通常，这行不单独使用，而是像这样使用：\n\
  \n```\nmyDict = [[NSDictionary alloc] init];\n```\n\n上面的调用是一个**复合调用**。`[NSDictionary\
  \ alloc]` 类方法返回一个新的 `NSDictionary` 对象。然后，`init` 消息被发送给 `NSDictionary` 对象，用于在类内部进行自身初始化（例如，设置实例变量）。`init`\
  \ 函数随后将新对象返回给调用者。\n\n那么，何时应该使用类方法？一般而言，如果方法返回的信息不是特定于类的任何特定实例，那么将该方法设为类方法。例如，前面例子中的\
  \ `minAMFrequency` 对于任何 `RadioStation` 对象的所有实例都是相同的——这是一个非常适合作为类方法的候选。然而，电台的名称或分配给它的频率对于类的每个实例都是不同的。这些不应该（也确实不能）是类方法。原因在于类方法不能使用该类定义的任何实例变量。\n\
  \n### 使用实例方法\n\n实例方法（列表 7–1 中的第 15–20 行）是只有类被实例化后才能使用的方法；例如：\n\n```\n1  RadioStation\
  \ *myStation;             // 声明一个变量来持有 RadioStation 对象。\n2  myStation = [[RadioStation\
  \ alloc] init]; // 创建一个新对象并将其放入变量中。\n3  [myStation setFrequency: 104.7];       \
  \  // 设置 myStation 对象的频率。\n4  double f = [myStation frequency]           // 该实例方法返回当前频率。\n\
  ```\n\n第 3 行和第 4 行向 `RadioStation` 对象发送消息；第 3 行调用方法来设置频率，第 4 行获取频率。频率与对象一起存储在 `frequency`\
  \ 实例变量中。此外，实例方法可以访问在类的**接口声明**部分定义的实例变量。所有实例方法都必须以连字符（`-`）开头；这可以很容易地将它们与使用加号（`+`）的类方法区分开来。\n\
  \n\n\n### 处理实现文件\n\n现在你已经了解了接口文件的样子，让我们来看看**实现文件**。首先，接口文件的扩展名是 `.h`，例如 `RadioStation.h`。实现文件的扩展名是\
  \ `.m`，例如 `RadioStation.m`，如代码清单 7-2 所示。\n\n另一个需要注意的重要事项是，接口文件和实现文件的名称相同（不包括扩展名）。这个约定是普遍使用的：虽然接口文件和实现文件使用不同的名称并没有任何限制，但名称不同可能会造成很大的混乱，并且像\
  \ Xcode 这样的工具也无法正常工作。例如，Xcode 的快捷键 Control + Command + 上箭头（^ + ![images](img/U002.jpg)\
  \ + ![images](img/uparrow.jpg)）用于在实现文件和接口文件之间切换，如果两个文件名不相同，这个快捷键将无法工作。\n\n**代码清单\
  \ 7-2.** *实现文件的部分内容*\n\n![images](img/U0702.jpg)\n\n当 Xcode 创建一个类时，它会生成一个非常基本的实现文件框架。代码清单\
  \ 7-2 以 `#import` 语句开头，用于引入你的接口文件。`#import` 语句会读取该类的接口文件。当编译器处理你的实现文件（`.m`）时，它需要知道正在实现的是哪个类，而接口文件提供了所有需要的信息。\n\
  \n`#import` 语句告诉编译器读取指定的文件，因为编译器需要了解某些预定义的内容。例如，在你的接口文件中，`RadioStation` 类是 `NSObject`\
  \ 的子类。为了程序能成功编译，需要先定义 `NSObject` 类。所有这些对象都是 iOS 框架的一部分，并通过代码清单 7-1 中接口文件的第 1 行包含进来。\n\
  \n`#import <Foundation/Foundation.h>`\n\n**注意：** 注意 `#import` 语句：一个使用了尖括号（`< >`），另一个使用了普通的双引号（`\"\
  \ \"`）。区别在于，尖括号中的文件表示系统级文件，它通过 Xcode 为你的项目自动设置的预定义路径来定位。使用双引号的任何文件则会在当前项目中查找。在我们的例子中，`RadioStation.h`\
  \ 接口文件属于项目的一部分，所以我们使用双引号；而 `Cocoa.h` 文件是系统文件，使用了尖括号。\n\n### 编写方法\n\n代码清单 7-2 是一个非常简单的例子，但它展示了类中许多方法的常见形式。首先，如果你查看某个类方法的实现文件和接口文件，就能看到它们的相似之处。下面这行代码来自接口文件：\n\
  \n`+ (double)minAMFrequency;`\n\n如你所见，这是一个类方法，因为它以 `+` 开头。接着是 `(double)`，表示该方法返回值的类型，这里是\
  \ `double` 类型。接口文件中接下来的部分只是方法的名称 `minAMFrequency`。\n\n下面这行代码来自实现文件：\n\n```\n+ (double)minAMFrequency\
  \ {\n        return 520.0;\n}\n```\n\n这行代码代表了接口中定义的方法的实现。“实现”这个词表明函数在这里编写。它看起来与接口文件几乎相同，但现在包含了一个带有代码的代码块，而不是仅以分号结束。\n\
  \n在前面的例子中，`minAMFrequency` 类方法的实现只是返回一个数值（`double` 类型）520.0。\n\n通常，一个类会在接口文件中定义方法，而在实现文件中包含方法的实际代码。\n\
  \n现在，我们来看一个**实例方法**的实现（参见代码清单 7-3）。实例方法和类方法之间存在一些显著差异：例如，实例方法可以选择使用在接口文件中定义的实例变量。此外，实例方法只有在类被实例化之后才可用。\n\
  \n**代码清单 7-3.** *实例方法的实现*\n\n```\n1  - (id)initWithName:(NSString *)newName atFrequency:(double)newFrequency\
  \ {\n2       self = [super init];\n3       if (self != nil) {\n4           name\
  \ = newName;\n5           frequency = newFrequency;\n6       }\n7\n8       return\
  \ self;\n9  }\n```\n\n代码清单 7-3 演示了你的电台类中一个实例方法的实现。这个初始化方法接受新的电台名称和频率。许多 OS X 和 iOS\
  \ 类都有类似的初始化实例方法。许多类初始化方法允许使用特殊的初始化方法，而不是简单地初始化类然后逐个设置各种值；或者，像本例这样，可以在初始化时传递多个值。\n\
  \n在前面的例子中，第 1 行是方法接口，它包含两个参数：`newName` 和 `newFrequency`。要使用这个方法，调用者只需执行以下操作：\n\n\
  ```\nRadioStation myStation = [[RadioStation alloc] initWithName:@\"WOW FM\"\n \
  \                                              atFrequency: 102.5];\n```\n\n这个方法还被定义为返回一个\
  \ `id` 类型的值。`id` 是一个通用对象类型，所有 Objective-C 对象都属于 `id` 类型，就像 `RadioStation` 类是一个对象一样。现在，让我们看看实现部分的其余内容。\n\
  \n第 2 行引用了两个特殊变量，你无需在任何地方定义它们。关键字 `self` 用于表示“这个类的这个实例”，因此第 2 行是在给“这个类的这个实例”赋值，其值来自使用第二个特殊变量\
  \ `super init` 所返回的结果。关键字 `super` 是“superclass”（超类）的缩写，可以理解为“这个类的父类”。任何初始化类型的方法通常都会以类似第\
  \ 2 行的代码开始。\n\n为什么第 2 行是必要的呢？好吧，如果你有一个从另一个对象派生出来的对象（回想一下，类被表示为 `RadioStation : NSObject`），你必须告诉父对象初始化自身。父对象也会做同样的事情，告诉它的父对象初始化自身，依此类推，直到达到最顶层的对象。如果另一个类将你的类作为父类，你的代码最终也必须接收一个\
  \ `init` 调用，这样 `RadioStation` 才能被初始化。这在 Objective-C 的实际开发中是标准做法。当一个类被创建时，它需要告诉其父类进行初始化；而当这个类即将被销毁时，它需要告诉其父类释放自身。\n\
  \n第 3 行检查 `[super init]` 调用是否成功。如果成功，`self` 的值将不会是 `nil`（`nil` 是一个实际上表示“未初始化”的值）。\n\
  \n第 4 行和第 5 行将这个类的实例变量设置为传入该方法的参数值。\n\n第 8 行将 `self` 返回给调用者。就像对 `[super init]` 的调用一样，你的初始化函数需要将新对象返回给调用者。\n\
  \n## 使用你的新类\n\n你已经创建了一个简单的 `RadioStation` 类，但单凭它自己并不能完成太多功能。在本节中，你将创建 `Radio` 类，并让它维护一个\
  \ `RadioStation` 类的列表。\n\n\n\n### 创建项目\n\n让我们启动`Xcode`（参见图 7-1），并创建一个名为`RadioStations`的新项目。\n\
