  \n![images](img/0715.jpg)\n\n**图 7–15.** *添加另一个标签对象*\n\n## 连接代码\n\n现在所有用户界面对象都已就位，您可以开始将这些界面元素连接到程序中的变量。正如您在\
  \ 第 6 章中所见，这是通过*连接*用户界面对象和程序中的对象来实现的。\n\n1.  首先，将“电台名称”标签连接到您的变量，如图 Figure 7–16\
  \ 所示。右键单击“Station Name:”标签**旁边**的标签对象，调出连接窗口。\n\n   ![images](img/0716.jpg)\n\n\
  \   **图 7–16.** *创建连接*\n\n2.  当连接被拖放到“文件所有者”图标上时，会出现另一个小菜单。点击您希望在此标签中显示的实例变量名称——在本例中，您需要的是\
  \ `stationName` 实例变量，如图 Figure 7–17 所示。\n\n   ![images](img/0717.jpg)\n\n   **图\
  \ 7–17.** *将界面标签连接到您的 stationName 实例变量*\n\n3.  现在，界面标签对象已*连接*到 `stationName` 实例变量。无论何时设置实例变量的值，屏幕都会更新。**对“频率”和“波段”标签重复上述连接步骤。**\n\
  \n接下来，您需要将按钮连接到代码；但在那之前，您需要添加一些代码来处理实际的按钮点击，如 Listing 7–7 所示。将这些代码添加到 `ViewController.m`\
  \ 文件的底部。\n\n**Listing 7–7.** *创建 buttonClick 函数*\n\n```\n 1  - (IBAction)buttonClick:(id)sender\
  \ {\n 2      [stationName setText:[myStation name]];\n 3      [stationFrequency\
  \ setText:[NSString stringWithFormat:@\"%.1f\",\n 4                                          \
  \ [myStation frequency]]];\n 5      \n 6      if (([myStation frequency] >= [RadioStation\
  \ minFMFrequency]) &&\n 7          ([myStation frequency] <= [RadioStation maxFMFrequency]))\
  \ {\n 8          [stationBand setText:@\"FM\"];\n 9      } else {        \n10          [stationBand\
  \ setText:@\"AM\"];\n11      }\n12  }\n```\n\nListing 7–7 是一个方法，您将设置它在 iPhone 屏幕上的按钮被按下时调用。首先，在第\
  \ 1 行，您会注意到 `IBAction` 类型。这让 Xcode 知道此方法可以作为某个操作的结果而被调用。因此，当您去连接应用程序中的操作时，您会看到此方法。\n\
  \n第 2 行和第 3 行都将文本字段设置为 `RadioStation` 类中的值。\n\n```\n[stationName setText:[myStation\
  \ name]]\n```\n\n`stationName` 变量正是您刚刚连接到用户界面标签对象的变量，而 `[myStation name]` 用于返回电台的名称。\n\
  \n第 3 行实际上与第 2 行功能相同，但您必须先将 `double` 值（电台频率）转换为 `NSString`。`@\"%.1f\"` 意味着您转换一个浮点值，并且小数点后只显示一位数字。\n\
  \n第 6-11 行使用了您的实例变量和 `RadioStation` 类的类方法。在这里，您只需检查电台频率是否在 `minFMFrequency` 和 `maxFMFrequency`\
  \ 之间。如果是，则该电台为 FM 电台；否则，假设其为 AM 波段。第 8 行和第 10 行将在屏幕上显示波段值。\n\n您还需要确保界面文件包含您刚刚编写的新方法。如\
