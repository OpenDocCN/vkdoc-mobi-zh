  trans: "\n#### 随处可见\n\n如今，几乎你选择从事的任何开发工作都需要你理解面向对象的原则。在 Mac OS X 和 iOS 中，你与之交互的每个元素都是一个对象。例如，简单的窗口、按钮和文本框都是对象，并拥有属性和方法。如果你想成为一名成功的程序员，就需要理解\
    \ OOP。\n\n#### 消除冗余代码\n\n通过使用对象，你可以减少需要重复输入的代码量。如果你编写了一段代码用于在顾客结账时打印收据，那么当你需要重新打印收据时，你也希望同样的代码可用。如果你将打印收据的代码放在`Sales`类中，就无需再次重写这段代码。这不仅节省了时间，通常还能帮助你消除错误。如果你不使用\
    \ OOP，并且发票发生了变化（即使是像图形更改这样简单的事情），你就必须确保在桌面应用和移动应用中都进行了修改。如果你漏掉了其中一个，就存在两个界面行为不一致的风险。\n\
    \n#### 易于调试\n\n通过将与书籍相关的所有代码都放在一个类中，当书籍出现问题时，你就知道该去哪里查找。对于一个小型应用来说，这听起来可能没什么大不了的，但当你的应用达到数十万甚至数百万行代码时，这将为你节省大量时间。\n\
    \n#### 易于替换\n\n如果你将所有代码都放在一个类中，那么随着应用中的变化，你可以替换掉这些类，并赋予新类完全不同的功能。然而，它能够以与当前类相同的方式与应用的其他部分进行交互。这类似于汽车零件。如果你想更换汽车上的消音器，你不需要买一辆新车。如果你与发票相关的代码分散在各处，那就使得修改类的元素变得更加困难。\n\
    \n### 高级主题\n\n我们在本章中讨论了 OOP 的基础知识，但还有一些其他主题对你的理解非常重要。\n\n#### 接口\n\n正如我们在本章中讨论的，其他对象通过彼此交互的方式是使用方法。我们讨论了创建类时生成的头文件。这通常被称为接口，因为它告知其他对象它们如何与你的对象进行交互。在你的应用中实现一个标准接口，将使你的代码能够以相似的方式与不同的对象进行交互。这将显著减少你需要编写的特定于对象的代码量。\n\
    \n#### 多态性\n\n多态性是指一个类的对象能够以另一个类的对象的样子出现并被使用的能力。这通常通过创建与另一个类相似的方法和属性来实现。我们一直在使用的一个多态性的好例子是书店。在书店中，我们有三个相似的类：`Book`、`Magazine`\
    \ 和 `Newspaper`。如果我们想对我们的整个库存进行一次大甩卖，我们可以遍历所有书籍并给它们降价。然后遍历所有杂志并给它们降价，接着再遍历所有报纸并给它们降价。这样会比我们实际需要做的工作多出很多。更好的做法是确保所有类都有一个降价方法。然后我们可以对所有对象调用该方法，而无需知道它们属于哪个类，只要它们是包含所需方法的类的子类即可。这将节省大量的时间和编码工作。\n\
    \n在规划你的类时，寻找可能适用于不止一种类别的相似之处和方法。从长远来看，这将为你节省时间并加速你的应用开发。\n\n### 总结\n\n我们终于到达了本章的末尾！以下是所涵盖内容的总结。\n\
    \n*   面向对象编程（OOP）\n    *   我们讨论了 OOP 的重要性以及所有现代代码都应使用该方法的原因。\n*   对象\n    *  \
    \ 你了解了对象以及它们如何对应现实世界中的对象。我们了解到许多编程对象直接与现实世界中的对象相关。你还了解了不对应现实世界对象的抽象对象。\n*   类\n\
    \    *   你了解到类决定了每个对象将拥有的数据类型（属性）和方法。每个对象都需要有一个类。它是对象的蓝图。\n*   创建类\n    *   你学习了如何规划我们类的属性和方法。\n\
    \    *   我们使用 Xcode 创建了一个类文件。\n    *   我们编辑了类头文件以添加我们的属性和方法。\n\n### 练习\n\n*  \
    \ 尝试为其余我们规划过的类创建类文件。\n*   规划一个`Author`类。选择你需要存储的关于作者的信息种类。\n\n对于大胆和进阶的读者：\n\n\
    *   尝试创建一个名为`PrintedMaterials`的超类。规划该类可能拥有的属性。\n*   为商店可能销售的其它类型的印刷材料创建类。\n\n\
    ## 第 6 章\n\n## 学习 Objective-C 和 Xcode\n\n在很大程度上，所有计算机语言都执行任何计算机都需要执行的典型任务——存储信息、比较信息、对这些信息做出决策，并根据这些决策执行某些操作。Objective-C\
    \ 是一种让这些任务更易于理解和完成的语言。Objective-C（实际上，任何 C 语言）的真正技巧在于理解用于完成这些任务的符号和关键字。本章将继续探讨\
    \ Objective-C 和 Xcode，以便你能够更加熟悉它们。\n"
- fmt: '### A Brief History of Objective-C


    Objective-C is really a combination of two languages, C language and a lesser-known
    language called Smalltalk. Back in the 1970s, several very bright engineers from
    Bell Labs created a language named C that made it easy to port their pet project,
    the Unix operating system, from one machine to another. Prior to C, people had
    to write programs in assembly languages. The problem with assembly languages is
    that each is specific to its machine, so moving software from one machine to another
    was nearly impossible. The C language, created by Brian Kernighan and Dennis Ritchie,
    solved this problem by providing a language that wrote out the assembly language
    for whatever machine it supported, a kind of Rosetta Stone for early computer
    languages. Because of its portability, C quickly became the de facto language
    for many types of computers, especially early PCs.


    Fast forward to the early 1980s and the C language is on its way to becoming one
    of the most popular languages of the decade. Around this time, an engineer from
    a company called Stepstone was mixing the C language with another up-and-coming
    language called Smalltalk. The C Language is typically referred to as a procedural
    language, that is, a language that uses procedures to divide up processing steps.
    Smalltalk, on the other hand, was something entirely different. It was an object-oriented
    programming language. Instead of processing things procedurally, it used programming
    objects to get its work done. This new superset of the C language became known
    as “C with Objects” or more commonly, Objective-C.


    In 1985, Brad Cox sold the Objective-C language and trademark to NeXT Computer,
    Inc. NeXT was the brainchild of Steve Jobs, who had been fired from his own company,
    Apple Computer, that very same year. NeXT used the Objective-C language to build
    the NeXTSTEP operating system and its suite of development tools. In fact, the
    Objective-C language gave NeXT a competitive advantage with all of its software.
    Programmers using NeXTSTEP and Objective-C could write programs faster than those
    writing in the traditional C language. While the hardware part of NeXT computers
    never really took off, the operating system and tools did. Quite interestingly,
    NeXT was purchased by Apple Computer in late 1996 with the intention of replacing
    its aging operating system, which had been in existence since the first Macintosh
    was developed in 1984. Four years after the acquisition, what had been NeXTSTEP
    reemerged as Mac OS X—with Objective-C still at the heart of the system.


    ### Understanding the Language Symbols


    Even though Objective-C integrates a great deal of object-oriented language, at
    the heart of Objective-C is C. Here are some of the symbols and language constructs
    used in Objective-C, some of which are part of the C language and most of which
    we''ve already encountered in one way or another. It’s not important to know which
    are pure C and which are not; just know that the old and the newer symbols/constructs
    together make the Objective-C language.


    - `{` This is the begin brace. It’s used to begin what’s commonly referred to
    as a block of code. Blocks are used to define and surround a section of code and
    define its scope.

    - `}` This is the end brace. It’s used to end a block of code. Wherever there
    is a begin ( `{` ), there must always be an accompanying end ( `}` ).

    - `- (void)methodName` This is how an Objective-C method is defined. The word
    `methodName` of course can represent any name. The word `(void)` can also change.
    It represents what type of information the method represents. In this example,
    `(void)` indicates there is no data type associated with this method (data types
    were introduced in [Chapter 3](#Chapter03.html#ch3) and will be covered in more
    depth in later chapters). `(void)` could be replaced with something like `(NSString*)`.
    This will be discussed further later on.

    - `*` The asterisk (referred to as ‘star’ or ‘splat’) is used to represent what
    is called a pointer (see [Chapter 13](#Chapter13.html#ch13)). All that’s really
    important to know for now is that when you see something like `NSString*`, consider
    it part of the name. `NSString` and `NSString*` are completely different.

    - `;` The semicolon character is used to end a line of code. The thing to remember
    about a semicolon is that they aren’t used at the end of statements that control
    the flow of the program, that is, `if`, `for`, `while`, etc. You’ll eventually
    understand the rules of where they go and don’t go.

    - `[ ]` These are called brackets and are used when sending a message to an Objective-C
    object. [Chapter 7](#Chapter07.html#ch7) covers more on this topic.

    - `@` While many people associate this with an e-mail address, the at sign is
    used in Objective-C to identify an Objective-C directive. A directive is a special
    Objective-C command, such as `@interface`, `@implementation` or `@property`.

    - `#` The pound sign (or octathorpe if you like trivia) is similar to the `@`
    sign and is used to identify a C language directive, such as `#import` or `#define`.
    While originally part of the C language, the use of `#` is still found in nearly
    all Objective-C programs.


    So, let’s see an example of Objective-C code:


    ![images](images/U0601.jpg)


    Line #1 represents an Objective-C method. The `(void)` indicates this method is
    not associated with a data type and, if invoked, would not send a value back to
    the caller.


    Lines #2 and #5 are the braces that define a block of code. This block is what
    defines the method. Every method has at least one block.


    Line #3 defines an `NSString*` object and assigns it the value of `@"Hello World"`.
    Remember, the at sign (`@`) is an Objective-C directive and is a quick way of
    defining a constant string object (recall that we first saw strings in [Chapter
    3](#Chapter03.html#ch3)).


    Line #4 is a call to the `NSLog` method; it’s not an object, so we can''t send
    it a message. Instead, we’re passing the method the object to print the `hello`
    `NSString*` object.


    While it does look a little cryptic to someone who is just learning Objective-C,
    the simple and terse syntax doesn’t take too much time to learn.'
