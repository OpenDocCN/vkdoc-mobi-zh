    in the class. You will notice that the `Book` class now has significantly fewer
    properties. By using a superclass, you will significantly reduce the amount of
    redundant code in your programs.


    ![images](images/0516.jpg)


    **Figure 5–16.** *Properties of the super- and subclasses*


    ### Why Use OOP?


    Throughout this chapter, we have discussed what OOP is and we have even discussed
    how to create classes and objects. However, I think it is important to discuss
    why you want to use OOP principles in your development.


    If you take a look at the popular programming languages of the day, all of them
    use the OOP principles to a certain extent. Objective-C, C++, Visual Basic, C#,
    and Java all require the programmer to understand classes and objects to successfully
    develop in those languages. In order to become a developer in today’s world, you
    will need to understand OOP. But why use it?'
  trans: '

    #### 实现类


    既然我们已经了解了将要创建的对象，接下来就需要创建第一个对象。为此，我们将从一个新项目开始。


    1.  请启动 Xcode。点击 **文件** ![images](img/U001.jpg) **新建** ![images](img/U001.jpg)
    **新建项目**。

    2.  在左侧选择 `iOS`。在右侧选择 **Master-Detail Application**。就本章内容而言，我们可以选择任何应用程序类型（参见
    图 5–9）。点击“下一步”。


    ![images](img/0509.jpg)


    **图 5–9.** *创建新项目*


    3.  你需要输入公司名称。保留此屏幕上的复选框为默认状态。我们现在无需担心这些选项。选择一个位置保存项目，然后保存项目。你可以使用名称 `bookstore`
    或任何你喜欢的项目名。

    4.  选择屏幕左侧的 **BookStore** 文件夹（参见 图 5–10）。这是你大部分代码的存放位置。

    5.  选择 **文件** ![images](img/U001.jpg) **新建** ![images](img/U001.jpg) **新建文件**。


    ![images](img/0510.jpg)


    **图 5–10.** *选择 bookStore 文件夹*


    6.  在弹出的窗口中，在 iOS 标题下选择 **Cocoa Touch**，然后在右侧点击 **Objective-C class**（参见 图 5–11）。然后点击
    **下一步**。


    ![images](img/0511.jpg)


    **图 5–11.** *创建新的 Objective-C 类*


    7.  在下一个屏幕上，你需要选择对象的超类。这决定了你的对象默认将具有哪些属性和方法。我们现在选择 `NSObject`（参见 图 5–12）。点击 **下一步**。


    **注意：** `NSObject` 是 Objective-C 中的基类。它包含了大多数对象所需的属性和方法。


    ![images](img/0512.jpg)


    **图 5–12.** *选择超类*


    8.  现在你将有机会命名你的类。在本练习中，我们将创建 `Customer` 类。现在，将类命名为 `Customer`。然后点击 **保存**。


    **注意：** 为便于使用和理解代码，请记住，在 Objective-C 中，类名应始终以大写字母开头。对象名应始终以小写字母开头。例如，`Book` 是类的合适名称，而
    `book` 则是基于 `Book` 类的对象的绝佳名称。对于由两个单词组成的对象，例如图书作者，合适的名称是 `bookAuthor`。这种大小写格式被称为小驼峰式。


    9.  现在查看你的主项目文件夹；你应该看到两个新文件。一个名为 `Customer.h`，另一个名为 `Customer.m`。`.h` 文件是头文件，包含有关你类的信息。头文件将列出类中的所有属性和方法，但不会实际包含与它们相关的代码。`.m`
    文件是实现文件，是你编写方法代码的地方。

    10. 双击 `Customer.h` 文件，你将看到 图 5–12 所示的窗口。你会注意到它当前包含的信息不多。第一部分带有双斜线（`//`）的是注释，不视为代码的一部分。注释允许你告诉阅读你代码的人每部分代码的用途。关于头文件的其他部分，我们现在不详细讨论，只需知道类的所有属性都需要放在
    `@interface` 部分的大括号（`{}`）内即可。


    ![images](img/0513.jpg)


    **图 5–13.** *空的客户类*


    现在让我们将属性从 UML 图迁移到实际的类中。


    **提示：** 属性应始终以小写字母开头。属性名称中不能包含空格。


    对于第一个属性“First Name”，我们将下面这行代码添加到文件中。


    ```

    NSString* firstName;

    ```


    这会在我们的类中创建一个名为 `firstName` 的字符串对象。由于 `Customer` 类的所有属性也都是字符串，我们只需要对其他属性重复相同的过程即可。完成后，你的
    `@interface` 部分应该如 图 5–13 所示。


    ![images](img/0514.jpg)


    **图 5–14.** *带有属性的客户类接口*


    `@interface` 部分完成后，我们需要添加方法。方法需要放在 `@interface` 部分之外，但仍需位于头文件的 `@interface` 部分之内。我们将添加一个返回
    `NSArray` 的新方法。代码如下所示：


    ```

    -(NSArray *) listPurchaseHistory;

    ```


    **注意：** `NSString` 是一个用于存储字符串并对其执行操作的类。字符串是一组字符。`NSString` 可以包含字母、数字和标点符号。


    这就是在头文件中创建类所需做的全部工作。图 5–15 显示了最终的头文件。在下一章中，我们将更详细地介绍实现文件。


    ![images](img/0515.jpg)


    **图 5–15.** *完成的客户类头文件*


    ### 继承


    OOP 的另一个主要特性是继承。编程中的继承类似于遗传继承。你可能从你母亲那里继承了眼睛的颜色，或者从你父亲那里继承了头发的颜色，反之亦然。类可以以类似的方式从其父类继承属性和方法。在
    OOP 中，父类被称为超类，子类被称为子类。


    在 Objective-C 中，程序员创建的所有类都有一个类似于父类的超类。该类将继承该父类的特征。因此，就像在所有其他 OOP 语言中一样，该类被称为父类的子类。在本章中，我们所有的类都是
    `NSObject` 的子类。在 Objective-C 中，大多数情况下，你的类都将是 `NSObject` 的子类。在我们之前的例子中，`Customer`
    类是 `NSObject` 的子类。


    例如，我们可以创建一个印刷品基类，并使用子类来表示书籍、杂志和报纸。印刷品可能有许多共同点，因此我们可以将变量分配给印刷品超类，而不必为每个单独的类重复分配它们。通过这样做，我们可以进一步减少需要编写和调试的冗余代码量。


    在 图 5–16 中，你将看到 `Printed Material` 超类的属性布局，以及它如何影响 `Book`、`Magazine` 和 `Newspaper`
    子类。`Printed Material` 类的属性将被子类继承，因此无需在子类中显式定义它们。你会注意到 `Book` 类现在拥有的属性明显减少了。通过使用超类，你将显著减少程序中冗余代码的数量。


    ![images](img/0516.jpg)


    **图 5–16.** *超类和子类的属性*


    ### 为什么要使用 OOP？


    在本章中，我们讨论了什么是 OOP，甚至讨论了如何创建类和对象。然而，我认为讨论为什么要在开发中使用 OOP 原则非常重要。


    如果你查看当今流行的编程语言，它们都在一定程度上使用了 OOP 原则。Objective-C、C++、Visual Basic、C# 和 Java 都要求程序员理解类和对象才能成功使用这些语言进行开发。为了成为当今世界的开发者，你需要理解
    OOP。但是为什么要使用它呢？

