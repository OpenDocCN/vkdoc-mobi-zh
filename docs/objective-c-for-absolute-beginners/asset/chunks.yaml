  trans: '

    ### 开发技术栈


    我们将引导您了解 iOS 应用的开发流程以及所需的技术。不过，先整体浏览一下所有组件会很有帮助。关于表视图中的 iPhone 应用程序示例，请参见图 1。


    ![images](img/in01.jpg)


    **图 1.** *iPhone/iPad 技术栈*


    ### 所需软件、材料和设备


    Alice 的一大优点是它支持当今三大主流操作系统：


    - Windows

    - Mac

    - Linux


    Alice 的另一大优点是免费！您可以从 [`www.Alice.org`](http://www.Alice.org) 下载 Alice。


    #### 操作系统与集成开发环境


    虽然您可以在多个平台上使用 Alice，但开发人员用于开发 iOS 应用的集成开发环境（IDE）是 `Xcode`。您必须使用基于 Intel 芯片的 Mac
    才能使用 `Xcode` 并提交应用！`Xcode` 是免费的，可在 Mac App Store 中获取。


    #### 软件开发工具包


    您需要注册成为 iOS 开发者。您可以在 [`http://developer.apple.com/iphone`](http://developer.apple.com/iphone)
    完成注册。


    当您准备好将应用上传到 iTunes App Store 时，需要支付每年 99 美元的费用。


    #### 双显示器


    我们建议开发者为其电脑连接第二台显示器。在双独立显示器上同时单步调试代码、查看输出窗口和 iPad 模拟器，效果非常理想。苹果硬件使这变得很简单。只需将第二台显示器插入任何基于
    Intel 芯片的 Mac 的显示端口（当然，需要使用正确的 Mini DisplayPort 适配器），您就能拥有两台独立工作的显示器。请参见图 2。请注意，双显示器并非必需。如果您没有，只需要调整好打开的窗口以适配屏幕即可。


    ![images](img/in02.jpg)


    **图 2.** *双显示器*


    ### 免费在线研讨会、问答与 YouTube 视频


    几乎每周三太平洋夏令时晚上 7:30，我们都会举办免费在线研讨会，讨论书中的一个主题或某个热门话题。这些研讨会是免费的，您可以在 [`www.xcelme.com/free-webinars.php`](http://www.xcelme.com/free-webinars.php)
    注册参加。


    每次研讨会结束时，我们会进行问答环节。您可以就讨论的主题或书中的任何主题提问。


    此外，所有这些研讨会都会被录制并上传到 YouTube。


    请务必订阅 YouTube 频道，以便在新视频上传时收到通知。


    ![images](img/in03.jpg)


    **图 3.** *免费 Objective-C 在线研讨会与 YouTube 视频*


    #### 免费书籍论坛


    我们为此书创建了一个在线论坛，网址为 [`http://forum.xcelme.com`](http://forum.xcelme.com)。您在学习 Objective-C
    时可以在那里提问，并从作者那里获得答案。您还可以找到练习题答案以及额外的练习题来帮助学习。请参见图 3。


    您还可以获取练习题的答案，并发现有用的链接，帮助您成为成功的 iPhone/iPad 开发者，创建出色的应用。请参见图 4。那么，让我们开始吧！


    ![images](img/in04.jpg)


    **图 4.** *读者论坛：用于获取练习题答案以及向作者提问*


    ## 第一章


    ## 成为优秀的 iOS 或 Mac 程序员


    既然您已经准备好成为一名软件开发者，并且已经阅读了本书的引言部分，那么您需要熟悉几个关键概念。您的计算机程序会完全按照您的指令执行——不多也不少。它将遵循操作系统和编程语言定义的规则。您的程序不会在意您今天心情不好，也不会在意您要求它执行某件事多少次。通常，您认为您告诉程序要做的事情，与程序实际做的事情是两码事。


    **成功关键：** 如果您还没有做，请花几分钟阅读本书的引言。引言会告诉您去哪里访问每章对应的免费在线研讨会、论坛和 YouTube 视频。此外，您还能更好地理解我们为何使用
    Alice 编程环境，以及如何成功开发您的 iOS 和 Mac 应用。


    根据您的背景，处理这种非黑即白的事情可能会令人沮丧。很多时候，编程学生都哀叹：“这不是我想要它做的！”当您开始积累编程经验和信心时，您会开始像程序员一样思考。您将理解软件设计和逻辑，并体验到您的程序完全按照您的意愿执行，以及随之而来的满足感。

    '
- fmt: '### Thinking like a Developer


    Software development involves writing a computer program and then having a computer
    execute that program. A **computer program** is the set of instructions that we
    want the computer to perform. Before beginning to write a computer program, it
    is helpful to list the steps that we want our program to perform, in the order
    we want them accomplished. This step-by-step process is called an **algorithm**.


    If we want to write a computer program to toast a piece of bread, we would first
    write an algorithm. This algorithm might look something like this:


    1. Take the bread out of the bag.

    2. Place the bread in the toaster.

    3. Press the toast button.

    4. Wait for the toast to pop up.

    5. Remove the toast from the toaster.


    At first glance, this algorithm seems to solve our problem. However, our algorithm
    leaves out many details and makes many assumptions. For example:


    1. What kind of toast does the user want? Does the user want white bread, wheat,
    or some other kind of bread?

    2. How does the user want the bread toasted? Light or dark?

    3. What does the user want on the bread after it is toasted: butter, margarine,
    honey, or strawberry jam?

    4. Does this algorithm work for all users in their cultures and languages? Some
    cultures may have another word for toast or not know what toast is.


    Now, you might be thinking we are getting too detailed for just making a simple
    toast program. Over the years, software development has gained a reputation of
    taking too long, costing too much, and not being what the user wants. This reputation
    came to be because computer programmers often start writing their programs before
    they have really thought through their algorithms.


    The key ingredients to making successful applications are **design requirements**.
    Design requirements can be very formal and detailed or as simple as a list on
    a piece of paper. Design requirements are important because they help the developer
    flush out what the application should do and not do when complete. Design requirements
    should not be completed in a programmer’s vacuum, but should be produced as the
    result of collaboration between developers, users, and customers.


    **NOTE:** If you take anything away from this chapter, take away the importance
    of considering design requirements and user interface design before starting software
    development. This is the most effective (and least expensive) use of time in the
    software development cycle. Using a pencil and eraser is a lot easier and faster
    than making changes to code because you didn’t have others look at the designs
    before starting to program.


    Another key ingredient to your successful app is the **user interface (UI)** design.
    Apple recommends that you spend over 50% of the entire development process focusing
    on the UI design. The design can be simple pencil-and-paper layouts created using
    the *iPhone Application Sketch Book or the iPad Application Sketch Book* by Dean
    Kaplan (Apress, 2009) or on-screen layout created with the Omni Group’s `OmniGraffle`*(*[`www.omnigroup.com`](http://www.omnigroup.com)*)*
    software application with the `Ultimate iPhone Stencil` plug-in*(*[`www.graffletopia.com`](http://www.graffletopia.com)*)*.
    Many software developers start with the UI design, and after laying out all the
    screen elements and having many users look at paper mock-ups, they then write
    out the design requirements from their screen layouts.


    After you have done your best to flush out all the design requirements, laid out
    all the user interface screens, and had the client(s) or potential customers look
    at your design and give you feedback, coding can begin. Once coding begins, design
    requirements and user interface screens can change, but the changes are typically
    minor and easily accommodated by the development process. See [Figures 1–1](#Chapter01.html#fig_1_1)
    and [1–2](#Chapter01.html#fig_1_2).


    [Figure 1–1](#Chapter01.html#fig_1_1) shows a mock-up of a mobile banking app
    screen prior to development using `OmniGraffle`. Developing mock-up screens along
    with design requirements forces developers to think through many of the applications
    usability issues before coding begins. This enables the application development
    time to be shortened and makes for a better user experience and better reviews
    on the iTunes App Store. [Figure 1–2](#Chapter01.html#fig_1_2) shows how the view
    for the mobile banking app actually appears when completed.


    ![images](images/0101.jpg)


    **Figure 1–1.** *This is a User Interface (UI) mock-up of the Account Balance
    screen for an iPhone mobile banking app before development begins. This UI design
    mock-up was completed using `OmniGraffle`.*


    ![images](images/0102.jpg)


    **Figure 1–2.** *This screenshot shows a completed iPhone mobile banking application
    as it appeared on the iTunes App Store. This app is called Woodforest Mobile Banking.*


    ### Completing the Development Cycle


    Now that we have our design requirements and user interface designs and have written
    our program, what’s next? After programming, we need to make sure our program
    matches the design requirements and user interface design and ensure that there
    are no errors. In programming vernacular, errors are called **bugs**. Bugs are
    undesired results of our programming and must be fixed before the app is released
    to the App Store. The process of finding bugs in programs and making sure the
    program meets the design requirements is called **testing**. Typically, someone
    who is experienced in software testing methodology and who didn’t write the app
    performs this testing. Software testing is commonly referred to as **Quality Assurance
    (QA)**.


    **NOTE:** When an application is ready to be submitted to the iTunes App Store,
    `Xcode` gives the file an `.app` extension, for example, `appName.app`. That is
    why iPhone, iPad, and Mac applications are called **apps**. We will use “program,”
    “application,” and “app” to mean the same thing throughout this book.


    During the testing phase, the developer will need to work with QA staff to determine
    why the application is not working as designed. The process is called **debugging**.
    It requires the developer to step through the program to find out why the application
    is not working as designed. [Figure 1–3](#Chapter01.html#fig_1_3) shows the complete
    software development cycle.


    ![images](images/0103.jpg)


    **Figure 1–3.** *The typical software development cycle*


    Frequently during testing and debugging, changes to the requirements (design)
    must occur to make the application more usable for the customer. After the design
    requirements and user interface changes are made, the process begins over again.


    At some point, the application that everyone has been working so hard on must
    be shipped to the iTunes App Store. Many considerations are taken into account
    when this happens:


    - Cost of development

    - Budget

    - Stability of the application

    - Return on investment


    There is always the give-and-take between developers and management. Developers
    want the app perfect and management wants to start realizing revenue from the
    investment as soon as possible. If the release date were left up to the developers,
    the app would likely never ship to the App Store. Developers would continue to
    tweak the app forever, making it faster, more efficient, and more usable. At some
    point, however, the code needs to be pried from the developers’ hands and uploaded
    to the App Store so it can do what it was meant to do.'
  raw: '### Thinking like a Developer


    Software development involves writing a computer program and then having a computer
    execute that program. A **computer program** is the set of instructions that we
    want the computer to perform. Before beginning to write a computer program, it
    is helpful to list the steps that we want our program to perform, in the order
    we want them accomplished. This step-by-step process is called an **algorithm**.


    If we want to write a computer program to toast a piece of bread, we would first
    write an algorithm. This algorithm might look something like this:


    1.  Take the bread out of the bag.

    2.  Place the bread in the toaster.

    3.  Press the toast button.

    4.  Wait for the toast to pop up.

    5.  Remove the toast from the toaster.


    At first glance, this algorithm seems to solve our problem. However, our algorithm
    leaves out many details and makes many assumptions. For example,


    1.  What kind of toast does the user want? Does the user want white bread, wheat,
    or some other kind of bread?

    2.  How does the user want the bread toasted? Light or dark?

    3.  What does the user want on the bread after it is toasted: butter, margarine,
    honey, or strawberry jam?

    4.  Does this algorithm work for all users in their cultures and languages? Some
    cultures may have another word for toast or not know what toast is.


    Now, you might be thinking we are getting too detailed for just making a simple
    toast program. Over the years, software development has gained a reputation of
    taking too long, costing too much, and not being what the user wants. This reputation
    came to be because computer programmers often start writing their programs before
    they have really thought through their algorithms.


    The key ingredients to making successful applications are **design requirements**.
    Design requirements can be very formal and detailed or as simple as a list on
    a piece of paper. Design requirements are important because they help the developer
    flush out what the application should do and not do when complete. Design requirements
    should not be completed in a programmer’s vacuum, but should be produced as the
    result of collaboration between developers, users, and customers.


    **NOTE:** If you take anything away from this chapter, take away the importance
    of considering design requirements and user interface design before starting software
    development. This is the most effective (and least expensive) use of time in the
    software development cycle. Using a pencil and eraser is a lot easier and faster
    than making changes to code because you didn’t have others look at the designs
    before starting to program.


    Another key ingredient to your successful app is the **user interface (UI)** design.
    Apple recommends that you spend over 50% of the entire development process focusing
    on the UI design. The design can be simple pencil-and-paper layouts created using
    the *iPhone Application Sketch Book or the iPad Application Sketch Book* by Dean
    Kaplan (Apress, 2009) or on-screen layout created with the Omni Group’s OmniGraffle*(*[`www.omnigroup.com`](http://www.omnigroup.com)*)*
    software application with the Ultimate iPhone Stencil plug-in*(*[`www.graffletopia.com`](http://www.graffletopia.com)*)*.
    Many software developers start with the UI design, and after laying out all the
    screen elements and having many users look at paper mock-ups, they then write
    out the design requirements from their screen layouts.


    After you have done your best to flush out all the design requirements, laid out
    all the user interface screens, and had the client(s) or potential customers look
    at your design and give you feedback, coding can begin. Once coding begins, design
    requirements and user interface screens can change, but the changes are typically
    minor and easily accommodated by the development process. See [Figures 1–1](#Chapter01.html#fig_1_1)
    and [1–2](#Chapter01.html#fig_1_2).


    [Figure 1–1](#Chapter01.html#fig_1_1) shows a mock-up of a mobile banking app
    screen prior to development using OmniGraffle. Developing mock-up screens along
    with design requirements forces developers to think through many of the applications
    usability issues before coding begins. This enables the application development
    time to be shortened and makes for a better user experience and better reviews
    on the iTunes App Store. [Figure 1–2](#Chapter01.html#fig_1_2) shows how the view
    for the mobile banking app actually appears when completed.


    ![images](images/0101.jpg)


    **Figure 1–1.** *This is a User Interface (UI) mock-up of the Account Balance
    screen for an iPhone mobile banking app before development begins. This UI design
    mock-up was completed using OmniGraffle.*


    ![images](images/0102.jpg)


    **Figure 1–2.** *This screenshot shows a completed iPhone mobile banking application
    as it appeared on the iTunes App Store. This app is called Woodforest Mobile Banking.*


    ### Completing the Development Cycle


    Now that we have our design requirements and user interface designs and have written
    our program, what’s next? After programming, we need to make sure our program
    matches the design requirements and user interface design and ensure that there
    are no errors. In programming vernacular, errors are called **bugs**. Bugs are
    undesired results of our programming and must be fixed before the app is released
    to the App Store. The process of finding bugs in programs and making sure the
    program meets the design requirements is called **testing**. Typically, someone
    who is experienced in software testing methodology and who didn’t write the app
    performs this testing. Software testing is commonly referred to as **Quality Assurance(QA)**.


    **NOTE:** When an application is ready to be submitted to the iTunes App Store,
    Xcode gives the file an `.app` extension, for example, `appName.app`. That is
    why iPhone, iPad, and Mac applications are called **apps**. We will use “program,”
    “application,” and “app” to mean the same thing throughout this book.


    During the testing phase, the developer will need to work with QA staff to determine
    why the application is not working as designed. The process is called **debugging**.
    It requires the developer to step through the program to find out why the application
    is not working as designed. [Figure 1–3](#Chapter01.html#fig_1_3) shows the complete
    software development cycle.


    ![images](images/0103.jpg)


    **Figure 1–3.** *The typical software development cycle*


    Frequently during testing and debugging, changes to the requirements (design)
    must occur to make the application more usable for the customer. After the design
    requirements and user interface changes are made, the process begins over again.


    At some point, the application that everyone has been working so hard on must
    be shipped to the iTunes App Store. Many considerations are taken into account
    when this happens:


    *   Cost of development

    *   Budget

    *   Stability of the application

    *   Return on investment


    There is always the give-and-take between developers and management. Developers
    want the app perfect and management wants to start realizing revenue from the
    investment as soon as possible. If the release date were left up to the developers,
    the app would likely never ship to the App Store. Developers would continue to
    tweak the app forever, making it faster, more efficient, and more usable. At some
    point, however, the code needs to be pried from the developers’ hands and uploaded
    to the App Store so it can do what it was meant to do.'
