    \ `retain` 计数的对象。\n\n第 5 行向 `myString` 对象发送了一个 `release` 消息。`release` 从当前 retain\
    \ 计数（为 1）中减去 1。如前所述，一旦 retain 计数达到零，该对象就会被释放。因此，当第 5 行执行完毕后，`myString` 变量指向已释放的内存。\n\
    \n第 6 行将原始变量设置为 `nil`，以指示该指针现在为空。\n"
- fmt: '#### Using the Retain/Release Model


    The process of retaining and releasing memory is something that Objective-C uses
    extensively to manage memory. The alternate name of this process, reference counting,
    is a little more descriptive because the process of retaining and releasing memory
    is a way of counting how many times the memory has been retained rather than released.
    Note the term “memory” is used here generically. Memory management in Objective-C
    allocates memory for *objects* instead of just blocks of memory. The Objective-C
    base class `NSObject`, which most Objective-C objects are derived from, keeps
    track of the retain count.


    **NOTE:** If you are looking for exactness, the `NSObject` protocol group actually
    defines the reference counting messages. `NSObject` implements that protocol.


    So far, things sound fairly simple: for every `retain`, there needs to eventually
    be a `release`. This doesn’t sound too tricky, right? Well, it’s not always straightforward
    to know when an object is retained. Consider the example in [Listing 13–8](#Chapter13.html#list_13_8).


    **Listing 13–8.** *A Retain Count.*


    ![images](images/U1302.jpg)


    Looking at [Listing 13–8](#Chapter13.html#list_13_8), the retain counts of the
    `dict` and `today` objects are shown. The `dict` object looks pretty normal: it
    has a retain count of `1` whenever the object is created. The same is true for
    the `today` object on line 2.


    In line 4, things look a little odd. For some reason, the `today` retain count
    is now `2`. What happened? Well, if we look closely at the `NSMutableDictionary`
    documentation for the `setObject: forKey:` method, we see, in the documentation
    for the `setObject:`, part of the message that “the object receives a retain message
    before being added to the receiver.”


    According to the documentation, before an object is added to the dictionary, the
    object is sent a `retain` message. This is why `today` had a retain count of `2`.


    Why does the dictionary do this? Well, the answer is quite simple. If we add an
    object to the dictionary, the dictionary should then be responsible for it; we
    basically hand it over to that class. We can release any local variables to objects
    we add to the dictionary. The dictionary then becomes the owner of the objects.
    To ensure this, the `NSMutableDictionary` class sends all the data it stores a
    `retain` message so that the system knows that someone is using that object.


    Since `dict` is managing the object, line 5 is used to release our object. The
    dictionary still has the same memory that the `today` object has; we’ve just told
    the system that we’re finished with it. Had the dictionary object *not* sent a
    `retain` message, line 5 would have actually deallocated the message. The rule
    is pretty simple: Once the retain count of an object reaches zero by way of a
    `release`, the object is sent a `dealloc` message, and the memory to that object
    is actually deallocated.


    Line 6 is a simple convention to indicate we’re finished with the pointer.


    Line 7 removes the object by way of the key `TODAY`. When an object is removed
    from a dictionary, the object is automatically sent a `release` message. At this
    point, the object that `today` used to point to is sent a `release` message. Since
    this now makes the retain count of the object zero, the object is also sent a
    `dealloc` message to deallocate its memory.


    Line 8 simply sends a `release` message to the `dict` object. This will deallocate
    the memory of the object, since nowhere else is the object retained.


    #### Working with Implied Retain Messages and Autorelease


    How do we know which objects need to be released and which don’t? The answer basically
    falls under the rule of object ownership. If an object is created that has `alloc`,
    `copy`, or `new` in the message name, you own the object, and it, therefore, needs
    to be released once the program is finished using it. There are other examples,
    but no hard and fast rules unfortunately. Properly deallocating memory takes an
    understanding of the objects and what messages result in an explicit `retain`.


    While an object can be sent an explicit `retain` message, in the examples so far,
    there isn’t one `retain` because there are automatic or implied retain messages.
    For example, whenever the message `setObject: forKey:` is sent to the dictionary
    object, the object we add is automatically sent a `retain` message. As mentioned
    previously, whenever we are allocating an object a `retain` is implied:


    `NSMutableDictionary *dict = [[NSMutableDictionary alloc] init];`


    Other calls are not so obvious, as seen in the following example:


    ```

    NSDate* today = [NSDate date];

    ```


    In the case above, the object was allocated but has in implied release—called
    autorelease. As mentioned above, anything with an `alloc`, `copy`, `new` requires
    that the program manually releases the object. For anything else, the object is
    released automatically.


    The key is that the return value is a `new` date object. Because it’s a new object,
    it receives a sort of implied `retain` message. But more importantly, it will
    automatically be released since the object wasn’t created with an `alloc`/`copy`/`new`
    method. The program could just have also been written as follows:


    ```

    NSDate* today = [[[NSDate alloc] init] autorelease];

    ```


    This code would yield the exact same results. The difference is that, in the second
    example, we are explicitly allocating the memory but marking it as `autorelease`.
    The Objective-C run-time system will automatically release the memory. While using
    `autorelease` seems like the best way to handle releasing memory, it may not necessarily
    be what is needed. Variables that are marked as autoreleased don’t stick around
    very long. All iOS and some Mac applications have something called a **run-loop**.
    Basically, an application for the most part just waits around for input. If you
    touch the screen, for example, the application will perform some function and
    then eventually go back to waiting for more input. Whenever the application goes
    back to wait for more input, all autorelease variables are released; this could
    easily be as short as 1/60^(th) of a second. So, `autorelease` should be used
    with caution and only in an area where the need for a variable is within the span
    of the current run-loop. If the program needs to have an autorelease variable
    stick around for a while, then either don’t use `autorelease` (use the standard
    `alloc` and `init`) or simply send a `retain` message to the object.


    **Listing 13–9.** *Keeping an Autorelease Variable Available.*


    ```

    1   - (NSDate *)getDate

    2   {

    3       return [NSDate date];

    4   }

    5

    6   - (void)captureDate

    7   {

    8       // Capture the current date and store it in the class’s iVar

    9       currentDate = [[self getDate] retain];

    10   }

    11

    12   - (void)dealloc

    13   {

    14       // Release the memory for the current_date.

    15       [currentDate release];

    16   }

    ```


    Notice on line 9 that the `getDate` method is called and then we immediately send
    a `retain` message to the object. This is because `getDate` is set as autorelease.
    If the program didn’t do this, the memory to `currentDate` would have been autoreleased.


    **NOTE:** In any iOS application developed before Xcode 4.2, there is a line in
    the `main.m` file that looks as follows:


    ```

    NSAutoreleasePool * pool = [[NSAutoreleasePool alloc] init];

    ```


    This is the mechanism the program uses to autorelease memory that has been sent
    an `autorelease` message when it was allocated, like our example above. The `[NSDate
    date]` returns memory that is automatically added to this autorelease pool and
    then automatically deallocated at the next run-loop.'
