    Two great books that we recommend to students as they progress to becoming iOS
    developers are *Learn Objective-C on the Mac* by Mark Dalrymple and Scott Knaster,
    and *Beginning iOS 5 Development* by Dave Mark and Jeff LaMarche, both published
    by Apress.


    You will be well prepared to read these books and begin writing your own iOS apps.
    Don’t take time off—keep moving forward! Get started with these books and begin
    writing your apps. The faster you start using what you have learned, the better
    you will get. Whatever you do, don’t stop now!


    ### Summary


    In this chapter we covered why multiple inheritance is not used in Objective-C
    and how protocols and delegates work.


    There is still a lot to learn and know on your iOS journey. Keep it up and help
    others along their way.


    You should be familiar with the following terms:


    *   Multiple Inheritance

    *   Protocol

    *   Delegate


    ## Chapter 13


    ## **Memory, Addresses, and Pointers**


    Computers, just like you and me, need a place to work and store things. Think
    of computer memory like space on a desk, for example. Someone who needs to work
    on many projects at once needs to have enough desk space for all their papers
    and documents so they can be quickly and easily accessed. If the desk space is
    too small for the number of projects being juggled, some projects may have to
    be filed back into drawers so they can be quickly pulled back once there is more
    space on the desk. Making sure the desk space is used efficiently is also very
    important.


    Dealing with a computer’s memory is one of the more complicated areas of programming.
    Why is this the case? Surely these problems have been solved by now, right? Well,
    yes and no. Some languages have taken the approach to remove the need for programmers
    to manage memory at all. Some internal magic (and a little something called garbage
    collection) handles all the management of how memory is used and released when
    it is no longer being used. The negative side to this approach is that garbage
    collection does not give the programmer the ultimate say-so on how the memory
    should be used in all cases. Why is this important? Generally speaking, the issue
    is performance. With full control of memory management, the programmer also has
    full control over the performance (or lack thereof) of the program.


    This chapter will introduce the ideas of working with the memory of a Mac, iPhone,
    or iPad. Working with memory on any device has its challenges. For example, the
    iPhone and iPad, being smaller devices, have less memory to work with, which means
    that it is important that their memory is used efficiently. Fortunately, Objective-C
    provides mechanisms that keep managing memory from being a chore. You will learn
    about how to allocate memory as well as about the new Automatic Reference Counting
    (ARC) feature of Xcode 4, which makes managing allocated memory much simpler than
    earlier releases of Xcode.


    ### Understanding Memory


    While many people may have associated computer memory with that of the human brain,
    I prefer to compare computer memory to physical space that you, as a person, have
    to work. You are like the computer’s CPU, the part that actually processes information
    and does something with it. The more space you have to work, the easier it is
    to organize things and the quicker you can actually accomplish your tasks. Of
    course, we all reach that place where, no matter how much more space we get, we
    aren’t able to work any faster.


    To a computer, memory is the workspace where certain programs (or parts of programs)
    and data are stored. On the Mac, iPhone, and iPad, the most basic unit of memory
    is a **byte**. If you think of memory as nothing more than a grid of boxes, a
    byte would simply be a single box, as demonstrated in [Figure 13–1](#Chapter13.html#fig_13_1).


    ![images](images/1301.jpg)


    **Figure 13–1.** *Bytes are like a row of boxes.*


    Of course, there are generally billions of these boxes, or bytes, of memory in
    a typical modern computer. While it does seem like a vast, almost limitless amount,
    memory is the most important resource that a computer has at its disposal. Only
    programs that reside in memory can be executed and only data loaded from disk
    can be inspected or acted on. Also, on the iPhone or iPad, there is much less
    memory than on a typical PC or Mac computer. A certain degree of memory conservation
    is always a good practice.


    Okay, so memory is like a grid of boxes that each holds a byte of information.
    What good is it at this point? How does the computer put each byte in its place
    and how does it pull it back out? Certainly, if my garage was full of unlabeled
    boxes, I would have a very difficult time figuring out where, for example, all
    of my old video games were stored. A computer has exactly the same problem, so
    it goes about solving that problem in a very organized way. Before we go into
    how the computer solves this problem, you need to understand the basics of units
    of memory and addresses.


    #### Bits, Bytes, and Bases


    In [Figure 13–1](#Chapter13.html#fig_13_1), each box represents one byte, or memory
    space. Each byte can hold a total of 8 bits. A **bit** is simply a number that
    can be either a zero or a one—off or on. It is this sequence of zeros and ones
    that give the byte its value. These zeros and ones represent a **binary** numeral
    system; that is, each digit can have a maximum of two values, zero or one. This
    is sometimes referred to as base-2 numbering system (versus the base-10 or decimal
    numbering system that we all use in our everyday lives). Before we get into more
    specifics of memory, it’s very important that you understand the numbering systems
    that are typically used on modern computer hardware.


    **NOTE:** Modern computers use 8 bits per byte. In the early days of computing,
    different manufacturers of computers sometimes had different byte sizes. For example,
    Control Data Corporation’s CDC-6000 often used 12-bit bytes for display codes,
    and the DEC PDP-10 operated on bit fields, so a “byte” could be anything from
    1 bit to 36 bits. IBM, with its popular System/360, set the standard on the 8-bit
    byte, as did the microprocessors of the 1970s.


    Generally speaking, people use base-10 numbering for pretty much everything; from
    money to measurements, base-10 is the standard. However, in the realm of the modern
    computer, the base-10 system is rarely used. Instead, the computer typically uses
    base-2 (binary) or base-16 (hexadecimal).


    **NOTE:** Base-8, commonly referred to as octal, is also used but is not as common
    as hexadecimal.'
