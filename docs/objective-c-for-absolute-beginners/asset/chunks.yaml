- fmt: "### Introducing Object Oriented Programming\n\nAs discussed in detail in the\
    \ Introduction, `Alice` enables us to focus on object oriented programming (OOP)\
    \ without having to cover all the `Objective-C` programming syntax and complex\
    \ `Xcode` development environment in one big step. Instead, we can focus on learning\
    \ the basic principles of OOP and using those principles quickly to write our\
    \ first programs.\n\nFor decades, developers have been trying to figure out a\
    \ better way to develop code that is reusable, manageable, and easily maintained\
    \ over the life of a project. OOP was designed to help achieve code reuse and\
    \ maintainability while reducing the cost of software development.\n\nOOP can\
    \ be viewed as a collection of objects in a program. Actions are performed on\
    \ these objects to accomplish the design requirements.\n\nAn **object** is anything\
    \ that can be acted on. For example, an airplane, person, or screen/view on the\
    \ iPad can all be objects. We may want to act on the plane by making the plane\
    \ bank. We may want the person to walk or to change the color of the screen of\
    \ an app on the iPad. Actions are all being applied to these objects; see [Figure\
    \ 1–4](#Chapter01.html#fig_1_4).\n\n![images](images/0104.jpg)\n\n**Figure 1–4.**\
    \ *These are two objects in an Alice application, a Dropship and Fighter. Both\
    \ objects can have actions applied—takeoff and landing, turn right and turn left..*\n\
    \n`Alice` will run a program, such as the one shown in [Figure 1–4](#Chapter01.html#fig_1_4),\
    \ for you if you click the play button. When we run our `Alice` applications,\
    \ the user can apply actions to the objects in our application. Similarly, `Xcode`\
    \ is an **Integrated Development Environment (IDE)** that enables us to run our\
    \ application from within our programming environment. We can test our applications\
    \ on our computers first before running them on our iOS devices by running the\
    \ apps in Xcode’s simulator, as shown in [Figure 1–5](#Chapter01.html#fig_1_5).\n\
    \n![images](images/0105.jpg)\n\n**Figure 1–5.** *This sample iPhone app contains\
    \ a table object to organize a list of courses. Actions such as “rotate left”\
    \ or “user did select row 3” can be applied to this object.*\n\nActions that are\
    \ performed on objects are called **methods**. Methods manipulate objects to accomplish\
    \ what we want our app to do. For example, for our jet object in [Figure 1–4](#Chapter01.html#fig_1_4),\
    \ we might have the following methods:\n\n`goUp`\n`goDown`\n`bankLeft`\n`turnOnAfterBurners`\n\
    `lowerLandingGear`\n\nOur table object in [Figure 1–5](#Chapter01.html#fig_1_5)\
    \ is actually called `UITableView` when we use it in a program, and it could have\
    \ the following methods:\n\n`loadView`\n`shouldAutorotateToInterfaceOrientation`\n\
    `numberOfSectionsInTableView`\n`cellForRowAtIndexPath`\n`didSelectRowAtIndexPath`\n\
    \nAll objects have data that describes those objects. This data is defined as\
    \ **properties.** Each property describes the associated object in a specific\
    \ way. For example, the jet object’s properties might be as follows:\n\n`altitude\
    \ = 10,000 feet`\n`heading = North`\n`speed = 500 knots`\n`pitch = 10 degrees`\n\
    `yaw = 20 degrees`\n`latitude = 33.575776`\n`longitude = -111.875766`\n\nFor our\
    \ `UITableView` object in [Figure 1–5](#Chapter01.html#fig_1_5), the following\
    \ might be our properties:\n\n`backGroundColor = Red`\n`selectedRow = 3`\n`animateView\
    \ = No`\n\nAn object’s properties can be changed at any time when our program\
    \ is running, when the user interacts with the app, or when the programmer designs\
    \ the app to accomplish the design requirements. The values stored in the properties\
    \ of an object at a specific time are collectively called the **state of an object**.\n\
    \n**State** is an important concept in computer programming. When teaching students\
    \ about state, we ask them to go over to a window and find an airplane in the\
    \ sky. We then ask them to snap their fingers and make up some of the values that\
    \ the plane’s properties might have at that specific time. Those values might\
    \ be:\n\n`altitude = 10,000 feet`\n`latitude = 33.575776`\n`longitude = -111.875766`\n\
    \nThose values represent the state of the object at the specific time that they\
    \ snapped their fingers.\n\nAfter waiting a couple minutes, we ask the students\
    \ to find that same plane, snap their fingers again, and record the plane’s possible\
    \ state at that specific point in time.\n\nThe values of the properties might\
    \ then be something like:\n\n`altitude = 10,500 feet`\n`latitude = 33.575665`\n\
    `longitude = -111.875777`\n\nNotice how the state of the object changes over time.\n\
    \n### Working with the Alice Interface\n\n`Alice` offers a great approach in using\
    \ the concepts that we have just discussed without all the complexity of learning\
    \ `Xcode` and the `Objective-C` language at the same time. It takes only a few\
    \ minutes to familiarize oneself with the `Alice` interface and begin writing\
    \ a program.\n\nThe Introduction of this book describes how to download `Alice`.\
    \ After it’s downloaded and installed, you need to open `Alice`. It will look\
    \ like [Figure 1–6](#Chapter01.html#fig_1_6).\n\n![images](images/0106.jpg)\n\n\
    **Figure 1–6.** *Alice IDE running*\n\nTechnically speaking, `Alice` is not a\
    \ true IDE like `Xcode`, but it is pretty close and much easier to learn than\
    \ `Xcode`. A true IDE combines code development, user interface layout, debugging\
    \ tools, documentation, and simulator/console launching for a single application;\
    \ see [Figure 1–7](#Chapter01.html#fig_1_7). However, `Alice` offers a similar\
    \ look, feel, and features to `Xcode`. This will serve you well later when we\
    \ start writing `Objective-C` code.\n\n![images](images/0107.jpg)\n\n**Figure\
    \ 1–7.** *The Xcode integrated development environment (IDE) with the iPhone Simulator*\n\
    \nIn the next chapter, you will go through the `Alice` interface and write your\
    \ first program.\n\n### Summary\n\nCongratulations, you have finished the first\
    \ chapter of this book. It is important that you have an understanding of the\
    \ following terms because they will be reinforced throughout this book:\n\n* \
    \  Computer program\n*   Algorithm\n*   Design requirements\n*   User interface\n\
    *   Bug\n*   Quality assurance (QA)\n*   Debugging\n*   Object oriented programming\
    \ (OOP)\n*   Object\n*   Property\n*   Method\n*   State of an object\n*   Integrated\
    \ development environment (IDE)\n\n### Exercises\n\n*   Answer the following questions:\n\
    \    *   Why is it so important to spend time on your user requirements?\n   \
    \ *   What is the difference between design requirements and an algorithm?\n \
    \   *   What is the difference between a method and a property?\n    *   What\
    \ is a bug?\n    *   What is state?\n*   Write an algorithm for how a soda machine\
    \ works from the time a coin is inserted until a soda is dispensed. Assume the\
    \ price of a soda is 80 cents.\n*   Write the design requirements for an app that\
    \ will run the soda machine.\n\n## Chapter 2\n\n## Programming Basics\n\nThis\
    \ chapter will focus on the building blocks that are necessary to become a great\
    \ `Objective-C` programmer. This chapter is going to go over how to use the `Alice`\
    \ user interface, how to write our first `Alice` program, how to write our first\
    \ `Objective-C` program, and explore some new OOP terms.\n\n**NOTE:** We want\
    \ to introduce new concepts in `Alice` and later, in this chapter, enable you\
    \ to use these concepts in `Objective-C`. We have used this approach for the last\
    \ 3 years and know, from personal experience, that this approach helps you learn\
    \ the concepts quickly, without discouragement, and gives you a great foundation\
    \ to build upon."
