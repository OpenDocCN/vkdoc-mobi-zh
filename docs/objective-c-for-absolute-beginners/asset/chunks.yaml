  trans: "\n#### 创建示例 Xcode 应用\n\n现在我们来创建一个 Xcode 应用，以便开始比较数值数据。\n\n1.  启动 Xcode。在你的硬盘驱动器中，依次进入\
    \ `Developer`![images](img/U001.jpg)`Applications` 文件夹。将该文件夹拖到 Dock 栏中，因为在本书余下部分我们会经常用到它。请参见图\
    \ 9-1。\n\n![images](img/0901.jpg)\n**图 9-1.** *启动 Xcode*\n\n2.  点击“Create a New\
    \ Xcode Project”以打开一个新窗口。在该窗口左侧，iOS 下方，选择 Application。然后在右侧选择 Single View Application。点击\
    \ Next。\n\n**注意：** Window-Based Application 是 iOS 应用类型中最通用、最基本的一种。\n\n![images](img/0902.jpg)\n\
    **图 9-2.** *创建新项目*\n\n3.  在下一页，输入你的应用名称。我们使用了 `Comparison` 作为名称，但你可以选择任何你喜欢的名称。这个窗口也是你选择目标设备的地方。我们暂时将其保持为\
    \ Universal。请参见图 9-3。\n\n![images](img/0903.jpg)\n**图 9-3.** *选择项目类型和名称*\n\n**注意：**\
    \ Xcode 项目默认保存在你的用户主目录下的 Documents 文件夹中。\n\n4.  新项目创建后，你会看到标准的 Xcode 窗口。点击 `Comparison`\
    \ 文件夹旁边的展开箭头以展开它。你会看到两个文件：`ComparisonsAppDelegate.m` 和 `ComparisonsAppDelegate.h`。`.h`\
    \ 文件是头文件，此时我们不会对其做任何更改。实际文件名会根据你在创建项目时使用的名称而有所不同。在本示例中，我们将只关注 `ComparisonsAppDelegate.m`\
    \ 文件。\n5.  双击 `main.c` 文件，你会看到以下代码：\n    ```\n    #import \"ComparisonsAppDelegate.h\"\
    \n    @implementation TestingComparisonsAppDelegate\n    @synthesize window=_window;\n\
    \n    - (BOOL)application:(UIApplication *)application\n        didFinishLaunchingWithOptions:(NSDictionary\
    \ *)launchOptions\n        {\n            // Override point for customization\
    \ after application launch.\n            [self.window makeKeyAndVisible];\n\n\
    \    }\n    ```\n6.  此时，我们的应用只会启动并显示一个窗口。我们将为应用添加一点“Hello World”内容。在 `[self.window\
    \ makeKeyAndVisible]` 这一行之后，我们需要添加以下代码：`NSLog(@\"Hello World\");`\n\n这行代码会创建一个内容为“Hello\
    \ World”的新 `NSString`，并将其传递给用于调试的 `NSLog` 函数。\n\n让我们运行应用看看效果如何。\n\n1.  点击默认工具栏中的\
    \ Run 按钮。\n2.  iOS 模拟器将启动，并显示一个窗口。回到 Xcode，一个调试窗口会出现在屏幕底部，如图 9-4 所示。你可以随时通过选择\
    \ `View`![images](img/U001.jpg)`Show Debug Area` 来切换显示此窗口。\n\n![images](img/0904.jpg)\n\
    **图 9-4.** *调试器窗口*\n\n这个窗口中的大部分信息对你来说意义不大。最重要的一行是加粗部分，它实际显示了你的应用的输出。该行的第一部分显示了日期、时间和应用名称。“Hello\
    \ World”部分是由我们之前添加的 `NSLog` 行生成的。\n\n1.  回到应用，打开 `ComparisonsAppDelegate.m` 文件。\n\
    2.  找到以 `NSLog` 开头的行。正是这行负责打印“Hello World”部分。我们将通过在这行代码前面加上两个反斜杠（`//`）来注释掉它。注释掉代码会告诉\
    \ Xcode 在构建和运行应用时忽略这行代码。被注释掉的代码不会运行。\n3.  一旦你注释掉这行代码，再次运行程序时就看不到加粗的那一行了，因为应用不再输出任何内容。\n\
    4.  为了让应用输出我们比较的结果，我们需要添加一行代码：`NSLog(@\"The result is %@\", (6>5 ? @\"True\" :\
    \ @\"False\"));`\n\n**注意：** 上述代码 `(6>5 ? @\"True\" : @\"False\")` 被称为三元运算。它本质上只是编写\
    \ If/Then 语句的一种简化方式。\n\n5.  将这行代码放入你的代码中。这行代码告诉你的应用打印“The result is”。然后，如果 6 大于\
    \ 5，它会打印“True”；如果 5 大于 6，则打印“False”。\n\n因为 6 大于 5，所以它会打印出 `True`。\n\n你可以更改这行代码，以测试本章中我们编写的任何示例，或者我们之后会编写的任何示例。\n\
    \n让我们尝试另一个示例。\n\n```\nint i=5;\nint y=6;\nNSLog(@\"The result is %@\", (y>i ?\
    \ @\"True\" : @\"False\"));\n```\n\n在这个示例中，我们创建了一个整数并将其值赋为 5。然后我们创建了另一个变量并将其值赋为\
    \ 6。接着我们修改了 `NSLog` 示例，改为比较变量 `i` 和 `y`，而不是使用具体的数字。当你运行这个示例时，会得到以下结果：\n\n![images](img/0904a.jpg)\n\
    **图 9-4.** *NSLog 输出*\n\n我们现在将探讨其他类型的比较，然后回到我们的应用，测试其中的一些。\n\n### 使用布尔表达式\n\n\
    布尔表达式是所有比较中最简单的一种。布尔表达式用于确定一个值是真还是假。假被定义为 0，真被定义为非零。例如：\n\n```\nint j;\nj=5;\n\
    if(j) {\n        some_code();\n}\n```\n\n`if` 语句始终会被评估为 `true`，因为我们的变量 `j` 不等于零或空。因此，我们的程序会运行\
    \ `some_code()` 方法。\n\n```\nint j;\nj=0;\nif(j) {\n        some_code();\n}\n```\n\
    \n如果我们更改 `j` 的值，该语句会被评估为 `false`，因为现在 `j` 等于 0。这可以与 `BOOL` 和数字变量一起使用。\n\n```\n\
    int j;\nj=0;\nif(!j) {\n        some_code();\n}\n```\n\n在布尔表达式前加上一个感叹号会将其值变为相反值（`false`\
    \ 变成 `true`，`true` 变成 `false`）。现在这行代码询问的是“如果不等于 `j`”，在本例中结果为 `true`，因为 `j` 等于\
    \ 0。这是一个使用整数充当布尔变量的例子。正如我们之前讨论的，Objective C 也有名为 `BOOL` 的变量，它只有两个可能的值：`YES` 或\
    \ `NO`。\n\n**注意：** 许多编程语言使用 `TRUE` 和 `FALSE` 这两个术语，而 Objective C 使用的是 `YES` 和\
    \ `NO`。在开发 Objective C 时，C 语言还没有真正的布尔变量。\n\n让我们来看一个与书店相关的例子。我们有一个常客俱乐部，所有会员在购买任何书籍时均可享受\
    \ 15% 的折扣。这很容易检查。我们只需将变量 `clubMember` 设置为：如果是会员则设为 `YES`，如果不是则设为 `NO`。以下代码将仅对俱乐部会员应用折扣：\n\
    \n```\nint discountPercent;\nBOOL clubMember;\n\nclubMember=FALSE;\ndiscountPercent=0;\n\
    if(clubMember) {\n        discountPercent=15;\n}\n```\n"
- fmt: "### Comparing Strings\n\nStrings are a very difficult data type for most C\
    \ languages. In ANSI C (or standard C), a string is just an array of characters.\
    \ Objective-C has taken the development of the string even further and made it\
    \ an object called the `NSString`. Many more properties and methods are available\
    \ to us when working with an object. Fortunately for us, `NSString` has many methods\
    \ for comparing data, which makes our job much easier.\n\nWhile developing for\
    \ the Mac and the iPhone, you will be able to use both `NSString`s and standard\
    \ C strings. For the purposes of this book, we will be focusing on comparing the\
    \ `NSString` objects. If you have C type strings in your application, they will\
    \ need to be converted to `NSString`s in order to use the code included in this\
    \ book. Fortunately for us, this conversion is very simple.\n\n```\nchar *myCString;\n\
    NSString *myNsstring;\n\nmyCString = \"testing a string\";\nmyNsstring = [NSString\
    \ stringWithUTF8String: myCString];\n```\n\nThe first two lines are code you have\
    \ seen before. They are your variable declarations. You are declaring a standard\
    \ C string called `myCString` and an `NSString` called `myNsstring`. The third\
    \ line is just a simple initiation of your standard C string. We are assigning\
    \ a value to it.\n\nThe last line is where everything happens. You are assigning\
    \ your `NSString` object to be equal to creating a new `NSString` object, with\
    \ the value coming from a `UTF8string` and passing it to the standard C string\
    \ that we created. Once you have all of your standard C strings as `NSString`s,\
    \ we can take advantage of the powerful comparison features provided to us by\
    \ the class.\n\nLet’s look at another example. Here, we will compare passwords\
    \ to see if we should allow a user to log in.\n\n```\nNSString *enteredPassword,\
    \ *myPassword;\n\nmyPassword=@\"duck\";\nenteredPassword=@\"Duck\";\nbool continueLogin=NO;\n\
    \nif([enteredPassword isEqualToString:myPassword]) {\n        continueLogin=YES;\n\
    }\n```\n\nThe first line just declares two `NSString`s. The next two lines initialize\
    \ the strings. Remember, before you use any objects, they need to be initialized.\
    \ In your actual code, you will need to get the `enteredPassword` string from\
    \ the user. These lines use a shortcut. Notice the `@` symbol before the C style\
    \ string. The `@` symbol creates a new `NSString` from the C style string that\
    \ follows it.\n\nThe next line is the part of the code that actually does the\
    \ work. We are sending a message to the `enteredPassword` object asking it if\
    \ it is equal to the `myPassword` string. The method always needs to have an `NSString`\
    \ passed to it. The example code will always be `false`, because of the capital\
    \ on the `enteredPassword` versus the lowercase on the `myPassword`.\n\n**NOTE:**\
    \ If you need to compare two `NSString`s, regardless of case, you would simply\
    \ use the `caseInsensitiveCompare` method instead of the `isEqualToString`.\n\n\
    There are many other different comparisons you might have to perform on strings.\
    \ For example, you may want to check the length of a certain string. This is easily\
    \ done.\n\n```\nNSString *enteredPassword;\nNSString *myPassword;\nmyPassword=@\"\
    duck\";\nenteredPassword=@\"Duck\";\nbool continueLogin=NO;\n\nif([enteredPassword\
