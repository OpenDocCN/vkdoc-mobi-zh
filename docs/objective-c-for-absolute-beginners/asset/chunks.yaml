  trans: '

    #### 调试基础


    在图 14–2 所示的语句上设置一个断点。接下来，如图 14–7 所示，点击**运行**按钮来编译项目，并在 Xcode 调试器中启动运行。


    ![images](img/1407.jpg)


    **图 14–7.** *Xcode 工具栏中的构建与调试按钮*


    项目构建完成后，调试器将启动；屏幕上会显示调试窗口，程序将在该语句行停止执行，如图 14–8 所示。


    ![images](img/1408.jpg)


    **图 14–8.** *调试器视图，执行停在第 25 行*


    调试器视图会添加一些额外的窗口。让我们来逐一了解图 14–8 中调试器的各个部分。


    1.  **调试器控件**：（红色圆圈标注）调试控件可以暂停、继续、单步跳过、单步进入和单步跳出程序中的语句。其中单步执行控制最常用。左侧第一个按钮用于显示或隐藏调试区域。在图
    14–8 中，调试区域处于显示状态。

    2.  **变量：** 变量窗口显示当前作用域内的变量。点击变量名称左侧的小三角形即可展开它。

    3.  **输出窗口：** 当程序崩溃或发生异常时，输出窗口会显示非常有用的信息。此外，所有 `NSLog` 的输出也会显示在此处。

    4.  **堆栈跟踪：** 堆栈显示对象堆栈以及程序中当前活动的所有线程。堆栈是一个层级视图，展示哪些方法正在被调用。例如，`main` 调用 `UIApplication`，而
    `UIApplication` 又调用 `AppDelegate` 类。这些方法调用会“堆叠”起来，直到最终返回，堆栈因此得名。


    #### 使用调试器控件


    如前所述，调试器启动后，视图会发生变化。出现的是调试控件（图 14–8 中的项目 B）。这些控件相当直观，并在表 14–1 中进行了说明。


    ![images](img/t1401.jpg)


    #### 使用单步执行控件


    为了练习使用单步执行控件，让我们单步进入一个函数。顾名思义，**单步进入**按钮会跟随程序的执行，进入当前高亮的方法。请确保在 `MasterViewController.m`
    文件中图 14–8 所示语句行（示例中的第 25 行，你的可能不同）设置了断点，然后点击运行按钮。你的屏幕应该与图 14–9 类似。


    ![images](img/1409.jpg)


    **图 14–9.** *调试器停在 25 行*


    点击**单步进入**按钮 ![images](img/U1401.jpg)，这将使调试器进入 `Bookstore` 对象的 `init` 方法。屏幕应该看起来像图
    14–10。


    ![images](img/1410.jpg)


    **图 14–10.** *单步进入 `Bookstore` 对象的 `init` 方法*


    需要注意的是，调试器不仅进入了 `Bookstore` 对象，而且还切换到了 `Bookstore.m` 文件（之前它位于 `MasterViewController.m`
    文件中）。


    **单步跳过**控件 ![images](img/U1402.jpg) 会继续执行程序，但不会进入某个方法。它只是执行该方法并继续执行到下一行。**单步跳出**控件
    ![images](img/U1403.jpg) 则有点像**单步进入**的反向操作。如果点击**单步跳出**按钮，当前方法会继续执行直至完成。然后调试器会返回到点击**单步进入**之前的那一行。例如，如果在图
    14–9 所示的代码行点击了**单步进入**按钮，然后又点击了**单步跳出**按钮，调试器将返回到 `MasterViewController.m` 文件中图
    14–9 所示的语句（示例中的第 25 行），即执行**单步进入**操作的那一行。


    #### 查看线程窗口与调用堆栈


    如前所述，线程窗口显示当前线程（在我们的程序中只有一个）。然而，它也显示了**调用堆栈**。比较图 14–9 和 14–10 在线程窗口方面的差异，我们可以看到，图
    14–10 中现在列出了 `[Bookstore init]` 方法，因为 `[MasterViewController initWithNibName:bundle:]`
    调用了 `[Bookstore init]` 方法。


    现在，调用堆栈不仅仅是一个*已经*被调用的函数列表；相反，它是一个当前*正在*被调用的函数列表。这是一个非常重要的区别。一旦 `init` 方法执行完毕并返回（第
    17 行），`[Bookstore init]` 将不再出现在调用堆栈中。你可以把调用堆栈想象成一条面包屑踪迹。这条踪迹告诉了我们如何返回到最初开始的地方。


    #### 调试变量


    通过将鼠标悬停在变量上，可以查看变量的一些信息（除了它的内存地址）。在我们当前的 `Bookstore` 示例中，所有变量都是通过属性合成的。问题在于，它们无法通过调试器直接看到。因此，为了让调试器实际显示这些变量，我们必须显式地声明它们。要这样做，只需导航到
    `Book.h` 头文件，并添加一个名为 `title` 的实例变量，如图 14–11 所示。


    ![images](img/1411.jpg)


    **图 14–11.** *添加一个名为 `title` 的显式实例变量*


    （如果你当前正在运行应用程序，在修改 `Book.h` 文件之前，请先点击左上角的停止图标）。接下来，运行应用程序。调试器应该会停在我们在图 14–9 中放置的断点处。单步进入该语句；这会将调试器带到
    `Bookstore.m` 文件。接着，使用单步跳过命令逐步执行代码，直到调试器指向“`newBook.author = …`”这一行。


    将光标放在 `newBook` 变量出现的任何位置，并展开 `Book` 对象。你应该会看到图 14–12 中显示的内容。


    ![images](img/1412.jpg)


    **图 14–12.** *将鼠标悬停在 `newBook` 变量上会显示一些信息*


    将鼠标悬停在 `newBook` 变量上会显示它的信息。此变量是在该方法中声明的一个局部变量。它也可以在左下角的变量窗口中看到。在图 14–12 中，你可以看到展开的
    `newBook` 变量；它显示了与悬停查看相同的信息。


    `newBook` 变量中的相关信息是 `NSCFConstantString` 变量。为简化问题，只需知道 `NSCFConstantString`（Core
    Foundation 字符串）仍然是我们在构建 `Book` 类时使用的 `NSString` 类。“Core Foundation” 就是 Apple 为程序员提供的基础库类。最右侧的信息（调试器中灰色文本）是该类字符串的实际值。当变量的内容发生变化时，调试器会以蓝色斜体高亮显示变量的新内容，就像你在图
    14–13 的变量窗口中所看到的那样。由于这些是 `newBook` 类的新值，因此这些值显示为蓝色和斜体。对于未更改的值，调试器会将其保留为灰色且非斜体。


    ![images](img/1413.jpg)


    **图 14–13.** *在变量窗口中，值的变化会以蓝色斜体高亮显示。*

