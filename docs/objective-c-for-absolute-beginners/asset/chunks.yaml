- fmt: '### Data Types and Objective-C


    Now that we have covered the principles of data types and have written an Alice
    app to help show how these principles apply, let’s write an Objective-C app that
    accomplishes what we just did in Alice.


    In Objective-C, we have similar data types as we did in Alice. Some of the most
    frequently used data types for storing numbers are integers, doubles, floats,
    and longs. [Table 3–5](#Chapter03.html#tab_3_5) lists many of the basic data types.
    Many of these will be covered in later chapters.


    ![images](images/t0305.jpg)


    Our Objective-C app will add two integers and display their sum to the console.
    The app will also display the text “The program has successfully terminated.”
    This will be fun and easy, so let’s get started.


    1.  As iOS developers, Xcode is where we make our living, so open up Xcode and
    create a new project. To do this, select **File** ![images](images/U001.jpg) **New
    project** and select the options shown in [Figure 3–17](#Chapter03.html#fig_3_17).
    Click on Next.


    ![images](images/0317.jpg)


    **Figure 3–17.** *Opening a new project*


    **NOTE:** One of the most common issues new students have when creating a command
    line app is finding the project in their version of Xcode. [Figure 3–18](#Chapter03.html#fig_3_18)
    shows Xcode Version 4.2 on the Lion (10.7) operating system. Your version of Xcode
    may be newer or older and menus and selection options may be different. So, look
    around in the **File** ![images](images/U001.jpg) **New project** settings for
    the equivalent options. If you have difficulty finding these options, visit our
    forum for this book at forum.xcelme.com and go to this chapter. We will be happy
    to answer your questions.


    2.  Save the Product Name as [Chapter 3](#Chapter03.html#ch3) (see [Figure 3–18](#Chapter03.html#fig_3_18)).
    Then select the directory to save your project and click on Next.


    ![images](images/0318.jpg)


    **Figure 3–18.** *Project settings.*


    ![images](images/0319.jpg)


    **Figure 3–19.** *When created, and selecting the `main.m` file, your Xcode project
    should look this*


    3.  After you create the project, you need to open your source code file in your
    editor. Open the `main.m` source file. (see [Figure 3–19](#Chapter03.html#fig_3_19))


    If you haven’t seen `//` used in computer programming before, it enables the programmer
    to comment about his or her code. Comments are not compiled by our applications
    and are used as notes for the programmer or, more importantly, for programmers
    who follow the original developer. Comments help both the original developer and
    follow-up developers understand how the app was developed.


    Sometimes, it is necessary for comments to span several lines or just part of
    a line. This can be accomplished with the `/*` and the `*/`. All the text between
    the `/*` and the `*/` are treated as comments and are not compiled.


    In our example, we first need to declare and initialize our variables `firstNumber`
    and `secondNumber`. It is good practice to always initialize variables when they
    are declared or soon afterwards.


    We''ll then increment the variables `firstNumber` and `secondNumber` by 1. We’ll
    print the sum of `firstNumber` and `secondNumber`.


    Finally, we will print to the console, “The program has terminated successfully.”
    See [Figure 3–20](#Chapter03.html#fig_3_20)


    ![images](images/0320.jpg)


    **Figure 3–20.** *Code for printing to the console*


    `NSLog` is a function that can take one or more parameters. The first parameter
    is generally the string that is to be printed to the console. The `@` symbol in
    front of the string tells the compiler this is an Objective-C type string and
    not a C++ string. The `@` symbol is typically used in front of all your strings
    for iPhone apps. If you don’t use the `@` symbol, you will probably get a compiler
    error. `NSLog` is a very helpful function used by developers to test the execution
    of their code.


    `%d` tells the compiler an integer will be printed and to substitute the value
    of the integer for the `%d`. See [Table 3–5](#Chapter03.html#tab_3_5) for other
    `NSLog` formatting specifiers. Finally, our second parameter is the integer to
    be printed.


    [Figure 3–21](#Chapter03.html#fig_3_21) shows the completed executed output of
    our application.


    To compile and run your application, click on the **Run** button on your toolbar.
    We can see that we printed out the `NSLog` string along with the notice at the
    end by the debugger saying the app''s execution completed successfully.


    **NOTE:** If your editor doesn’t have the same menus or gutter (the left-hand
    column that contains the line numbers of the program) you saw in the previous
    screenshots, you can turn these settings on in the Xcode preferences. You can
    open the Xcode Preferences by clicking on the Xcode menu in the menu bar and then
    selecting Preferences.


    ![images](images/0321.jpg)


    **Figure 3–21.** *Console log displaying the results of our Objective-C app*


    ### Identifying Problems


    Believe it or not, your program may not run the way you thought you told it to.
    The process of hunting down problems with your app is called debugging. In order
    to track down bugs in our apps, we can set breakpoints and inspect our variables
    to see the contents. To do this, simply click in the gutter where you want to
    set a breakpoint (see [Figure 3–22](#Chapter03.html#fig_3_22)). A breakpoint will
    stop our application from executing at that line and enable us to inspect our
    variables.


    ![images](images/0322.jpg)


    **Figure 3–22.** *Setting debugging “breakpoints”*


    A blue pointer in the gutter of your editor denotes a breakpoint. When you run
    your application and your app hits a line of code that contains a breakpoint,
    your app will halt and display a blue line across the line of code with a breakpoint
    (see [Figure 3–23](#Chapter03.html#fig_3_23)). Additionally, you can inspect each
    variable by hovering over it with your mouse.


    ![images](images/0323.jpg)


    **Figure 3–23.** *Breakpoint hit*


    We will talk more about debugging your apps in [Chapter 14](#Chapter14.html#ch14).


    ### Summary


    In this chapter, you learned about how data is used by our apps. You saw how to
    initialize variables and how to assign data to them. We explained that when variables
    are declared, they have a data type associated with them and that only data of
    the same type can be assigned to variables.


    Finally, we showed you how to use variables in your first Alice app and finished
    by using variables with an Objective-C app.


    ### Exercises


    *   Write an Objective-C console app (Command-Line Tool) that multiples two integers
    together and displays the result to the console.

    *   Write an Objective-C console app that squares a float. Display the resulting
    float in the console.

    *   Write an Objective-C console app that subtracts two floats, with the result
    being stored as an integer. Note that rounding does not occur.


    ## Chapter 4'
