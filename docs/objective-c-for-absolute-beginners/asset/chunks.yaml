    \ addObject:newBook];\n20             newBook = nil;                         \
    \          \n21         }\n22\n23         return self;\n24   }\n```\n\n如果我们看一下清单\
    \ 13–6，可以清楚地看到在第 6 行分配了一个新的 `Book` 对象。然而，`ARC` 发挥作用的地方在第 12 行。在这里，我们通过分配一个新的 `Book`\
    \ 对象来重新赋值指针。按照旧的内存管理规则，我们必须先释放旧值，否则会造成内存泄漏。在 `ARC` 下，编译器知道在重新赋值之前对该指针执行释放操作。第\
    \ 20 行也是如此。实际上，第 20 行并非必需，因为当变量超出作用域时，`ARC` 会自动释放它。将它赋值为 `nil` 只是执行相同操作的一种更直接的方式。\n\
