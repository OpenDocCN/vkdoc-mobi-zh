- fmt: '### 将十进制（Base-10）转换为二进制（Base-2）


    一个典型的日常数字可能看起来像这样：`1101`。现在，大多数人会认为这个数字是“一千一百零一”。然而，在二进制（Base-2）计数法中，这个数字代表十进制数`13`。让我们看看这是如何实现的。


    如[图13-2](#Chapter13.html#fig_13_2)所示，在十进制计数法中，每个数位代表10的幂次；即从右向左，每一列的值按10的幂次（10,
    100, 1000等）递增。我们将千位（`10³`）、百位和个位相加，得到`1,101[10]`（下标表示“基数为10”）。


    ![images](images/1302.jpg)


    **图13-2.** *十进制计数系统。*


    现在，让我们看看同样的数字在二进制中是什么样，如[图13-3](#Chapter13.html#fig_13_3)所示。


    ![images](images/1303.jpg)


    **图13-3.** *二进制计数系统。*


    在二进制计数法中（如[图13-3](#Chapter13.html#fig_13_3)所示），从右向左，每一列的值按2的幂次（2, 4, 8, 16, 32等）递增。我们将`8`、`4`和`1`相加，得到值`13[10]`（这里是二进制结果）。另请注意，连续的4位（即半个字节）通常被称为一个**半字节（nibble）**。


    当然，前面提到8位（编号从0到7）构成一个字节。[图13-4](#Chapter13.html#fig_13_4)展示了一个由8位组成的完整字节示例。要获取其值，请将所有列的值相加，方法如下：


    ![images](images/1304.jpg)


    **图13-4.** *一个完整的字节，显示二进制和十进制值。*


    ### 使用十六进制（Base-16）计数法


    最后一个值得一提的、在现代计算机中广泛使用的进制是十六进制（Base-16）计数系统。在二进制中，每个数位可以有0和1两种值。在十进制中，每个数位可以有0-9共十种值。在十六进制中，每个数位可以有0-F共十六种值。是的，你没看错；最后一个是`F`。为了在单一数位中表示16个值，使用字母来表示数值就变得很有必要。对于十六进制，其数字序列从0到9，然后从`A`到`F`。表示一个字节需要两个十六进制（简称**hex**）数字；每个十六进制数字代表4位，如[图13-5](#Chapter13.html#fig_13_5)所示。


    ![images](images/1305.jpg)


    **图13-5.** *左侧：两个半字节组成一个字节。右侧是一个简单的十六进制到十进制转换表。*


    因此，十六进制数`9D`等于二进制数`10011101`，也等于十进制数`157`。如[图13-5](#Chapter13.html#fig_13_5)所示，一个字节的值可以是从`0000
    0000`到`1111 1111`（二进制）之间的任意值，也就是`0xFF`（十六进制）。


    **注意：** 在`0xFF`中，前缀`0x`在编程中用来表示该数字是一个十六进制数。虽然`FF`看起来很明显（因为只有字母），但像`10`这样的数字就不那么明确了：它是十进制的10还是十六进制的16？而`0x10`则明确了这一点。


    学习十六进制需要一些时间适应，但这段时间花得很值。这是因为在处理内存时，几乎所有东西都用十六进制表示。如同十进制计数法，每个数位都比前一位呈指数级增大，如[图13-6](#Chapter13.html#fig_13_6)所示。


    ![images](images/1306.jpg)


    **图13-6.** *一个16位的十六进制数。*


    在十进制中，数位依次是1, 10, 100, 1000，等等。在十六进制中，数位基于16，因此是1, 16, 256, 1024，等等——每一列都是16的倍数。然而，一旦你理解了十六进制，你可能也想将其转换为十进制表示。[图13-7](#Chapter13.html#fig_13_7)展示了如何将16位的十六进制数转换为十进制数。


    ![images](images/1307.jpg)


    **图13-7.** *将16位的十六进制数转换为十进制。*


    如果我们把所有列的值相加，就会得到答案：


    `8,192 + 256 + 160 + 2 = 8,610`


    因此`0x21A2`等于`8,610`。


    [图13-7](#Chapter13.html#fig_13_7)表示的是一个16位的数字。计算32位和64位数字只需要向左增加列数即可。


    **提示：** 如果你发现自己经常需要计算32位和64位的值，只需使用Mac上的计算器（切换到程序员视图），或者花点小钱买个能处理十六进制的科学计算器。


    我们希望这没有把你吓跑。在最底层理解计算机内存其实并没那么难，而且也不是所有时候都需要这样做。需要记住的重点是：处理内存时，可能有必要理解二进制（Base-2）、十进制（Base-10）和十六进制（Base-16）的值。这在调试应用程序时会变得更加清晰，如[第14章](#Chapter14.html#ch14)中所讨论的。'
  raw: '#### Converting Base-10 (Decimal) to Base-2 (Binary)


    A typical, everyday number may look like this: 1101\. Now, most people would consider
    this number to be “one-thousand, one-hundred, and one.” However in base-2 numbering,
    this number would represent the decimal number 13\. Let’s look at how this can
    be.


    As shown in [Figure 13–2](#Chapter13.html#fig_13_2), in base-10 numbering, each
    digit represents a power of 10; that is, each column increases by a power of 10
    (10, 100, 1000, etc.), right-to-left. We add the 1000s column (10³), 100s column,
    and the 1s column to get 1,101[10] (the subscript means “base-10”).


    ![images](images/1302.jpg)


    **Figure 13–2.** *Base-10 numbering system.*


    Now, let’s look at the same number in base 2, as shown in [Figure 13–3](#Chapter13.html#fig_13_3).


    ![images](images/1303.jpg)


    **Figure 13–3.** *Base-2 numbering system.*


    In base-2 numbering (shown in [Figure 13–3](#Chapter13.html#fig_13_3)), the columns
    all increase by a power of 2 (2, 4, 8, 16, 32, etc.), right-to-left. We add 8,
    4, and 1 to reach a value of 13[10] (in base-2 that is). Also note that a series
    of 4 bits, which represents half of a byte, is typically referred to as a **nibble**.


    Of course, it was mentioned earlier that 8 bits (numbered 0 to 7) make up a byte.
    [Figure 13–4](#Chapter13.html#fig_13_4) shows an example of an entire byte consisting
    of 8 bits. To get the value, add up all the columns as follows:


    ![images](images/1304.jpg)


    **Figure 13–4.** *An entire byte showing base-2 and base-10 values.*


    #### Using Base-16 (Hexadecimal) Numbering


    The last base that is worthy of mentioning, used quite ubiquitously in modern
    computers, is the base-16, or the **hexadecimal**, numbering system. In base-2,
    each digit can have one of two values, 0 and 1\. In base-10, each digit can have
    one of ten values, 0–9\. In base-16, each digit can have one of 16 values, 0–F.
    Yes, you read that correctly; the last value is **F**. To represent 16 values
    in a single column, it became necessary use letters to represent values. In the
    case of base-16, the numbering goes from 0 through 9 and A through F. It takes
    two hexadecimal (**hex** for short) digits to represent a single byte; each hex
    digit represents 4 bits, as shown in [Figure 13–5](#Chapter13.html#fig_13_5).


    ![images](images/1305.jpg)


    **Figure 13–5.** *On the left, two nibbles make a byte. A simple hex to decimal
    conversion chart appears on the right.*


    So the hex number 9D is equal to the binary number 10011101, which is equal to
    the decimal number 157\. As shown in [Figure 13–5](#Chapter13.html#fig_13_5),
    a byte can be any value between 0000 0000 and 1111 1111 (base-2), which is 0×FF
    in hex.


    **NOTE:** In “0×FF,” the “0×” that precedes the “FF” is used in programming to
    indicate that the number is a hex number. While FF seems obvious, because there
    are only letters, a number like “10” is less clear, is it 10 or 16? Well, 0×10
    makes it clear.


    Hexadecimal takes some getting used to, but learning it is time well spent. This
    is because when dealing with memory, pretty much everything is expressed in hexadecimal.
    Just like in base-10, each numeric column is an exponentially larger than the
    previous, as shown in [Figure 13–6](#Chapter13.html#fig_13_6).


    ![images](images/1306.jpg)


    **Figure 13–6.** *A 16-bit hexadecimal number.*


    In base-10, each column is 1, 10, 100, 1000, and so on. In hexadecimal, the columns
    are base-16, so you have 1, 16, 256, 1024, and so on—each column is a multiple
    of 16\. However, once you understand hexadecimal, you may want to express the
    number in decimal as well. [Figure 13–7](#Chapter13.html#fig_13_7) is an example
    of how a 16-bit hexadecimal number is converted to a decimal one.


    ![images](images/1307.jpg)


    **Figure 13–7.** *Converting a 16-bit hex number to decimal.*


    If we add all our columns together, we will have our answer:


    8,192 + 256 + 160 + 2 = 8,610

    So 0×21A2 equals 8,610.


    [Figure 13–7](#Chapter13.html#fig_13_7) represents a 16-bit number. Calculating
    32- and 64-bit numbers means simply increasing the columns to the left.


    **TIP:** If you find yourself calculating 32- and 64-bit values a lot, just use
    the calculator on the Mac (in the Programmer view), or a small investment will
    allow you to buy a scientific calculator that can work in hex.


    We hope you haven’t been scared off. Understanding computer memory at its lowest
    level is actually not that bad, and it’s something that won’t be necessary all
    the time. The important thing to remember is that when dealing with memory, it
    may be necessary to understand binary (Base-2), decimal (Base-10), and hexadecimal
    (base-16) values. This will become clearer when debugging an application, as discussed
    in [Chapter 14](#Chapter14.html#ch14).'
