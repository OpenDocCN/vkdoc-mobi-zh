    \ similarities and methods that might apply to more than one type of class. This\
    \ will save you time and speed up your application in the long run.\n\n### Summary\n\
    \nWe’ve finally reached the end of the chapter! Here is a summary of the things\
    \ that were covered.\n\n*   Object-oriented programming (OOP)\n    *   We discussed\
    \ the importance of OOP and the reasons why all modern code should use this methodology.\n\
    *   Object\n    *   You learned about objects and how they correspond to real-world\
    \ objects. We learned that many programming objects relate directly to real-world\
    \ objects. You also learned about abstract objects that do not correspond to real\
    \ world objects.\n*   Class\n    *   You learned that a class determines the types\
    \ of data (properties) and the methods that each object will have. Every object\
    \ needs to have a class. It is the blueprint for the object.\n*   Creating a class\n\
    \    *   You learned how to map out the properties and methods of our classes.\n\
    \    *   We used Xcode to create a class file.\n    *   We edited the class header\
    \ file to add our properties and methods.\n\n### Exercises\n\n*   Try creating\
    \ the class files for the rest of the classes we mapped out.\n*   Map out an `Author`\
    \ class. Choose the kind of information you would need to store about an author.\n\
    \nFor the daring and advanced:\n\n*   Try creating a superclass called `PrintedMaterials`.\
    \ Map out the properties that a class might have.\n*   Create classes for the\
    \ other types of printed materials a store might carry.\n\n## Chapter 6\n\n##\
    \ **Learning Objective-C and Xcode**\n\nFor the most part, all computer languages\
    \ perform the typical tasks any computer needs to do—store information, compare\
    \ information, make decisions about that information, and perform some action\
    \ based on those decisions. Objective-C is a language that makes these tasks easier\
    \ to understand and accomplish. The real trick with Objective-C (actually, the\
