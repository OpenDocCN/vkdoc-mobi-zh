  trans: '好的，作为一名高级文档工程师和翻译员，我将遵循您的所有注意事项和示例，将给定的英文文本翻译成中文。



    ### 引入实例变量


    我们的对象简单地命名为 `Book`，它是 `NSObject` 的子类。确实，我们有了一个对象，但目前它还不*存储*任何东西。为了使这个类有用，它需要能够保存一些信息，这通过实例变量来实现。当一个对象被使用时，它必须被实例化。一旦对象被实例化，它就可以访问其实例变量。只要对象保持在作用域内，这些变量就可以供对象使用。正如我们从第
    7 章了解的，作用域定义了对象存在的上下文。在某些情况下，对象的作用域可能是整个程序的生命周期。在其他情况下，作用域可能只是一个函数或方法。这完全取决于对象在何处声明以及如何使用它。稍后将更详细地讨论作用域。现在，让我们给我们的
    `Book` 类添加一些实例变量，使其更有用。


    **代码清单 8–11.** *为 Book.h 文件添加实例变量。*


    ```

     1  //

     2  //  Book.h

     3  //  MyBookstore

     4  //

     5  //  Created by Mitch Fisher on 8/28/11.

     6  //  Copyright 2011 www.committed-code.com. All rights reserved.

     7  //

     8  

     9  #import <Foundation/Foundation.h>

    10  

    11  @interface Book : NSObject {

    12          NSString *title;

    13          NSString *author;

    14          NSString *description;

    15  }

    16  

    17  @end

    ```


    这是和之前相同的 `Book` 对象，但现在，大括号内多了三个新的实例变量，即第 12–14 行。它们都是 `NSString` 对象，这意味着它们可以为我们的
    `Book` 对象保存文本信息。因此，`Book` 对象现在有了一个存储书名、作者和描述信息的地方。


    #### 访问实例变量


    现在我们有了实例变量，该如何使用它们呢？如何访问它们？正如你在前几章学到的，Objective-C 对象响应消息。不幸的是，仅仅声明一个实例变量并不能保证我们可以访问它。有两种方法可以访问这些变量。


    *   一种方法，当然是在我们的 `Book` 对象内部。

    *   第二种方法是从对象外部——即程序中使用 `Book` 对象的其他部分。


    如果我们在 `Book` 对象内部编写一个方法的代码，访问实例变量就相当简单。例如，你可以直接编写以下代码：


    `title = @"Test Title";`


    上面这行代码是在 `Book` 类内部编写的。在对象外部，`title` 实例变量是完全不可见的。当然，外部的对象也需要能够访问这些实例变量。为此，你需要创建两种类型的方法：getter
    和 setter。


    *   **getter** 是一个返回对象中某个值的方法，通常是像 `Book` 对象中的 `author` 变量这样的实例变量。

    *   **setter** 是一个更新或设置该实例变量的方法。


    让我们看看在 2007 年 Objective-C 2.0 引入之前常见的传统 getter 和 setter 方法。


    **提示：** 有时实例变量被称为 ivars。`Ivar` 只是 `instance variable` 的简称。


    #### 使用 Getter 和 Setter 方法


    以下是 `Book` 对象的头文件（`.h`），它包含了 `Book` 的接口定义。


    **代码清单 8–12.** *为 Book 对象定义 getter 和 setter。*


    ```

     1  #import <Foundation/Foundation.h>

     2  

     3  @interface Book : NSObject {

     4          NSString *title;

     5          NSString *author;

     6          NSString *description;

     7  }

     8  

     9  - (NSString *)title;

    10  - (void)setTitle:(NSString *)newString;

    11  

    12  @end

    ```


    在第 9 行和第 10 行声明的两个方法分别是 getter 和 setter 方法。按照惯例，getter 方法的名称与实例变量相同。在我们的例子中，我们正在获取图书对象的书名，所以我们的
    getter 方法就是 `title`。它被定义为向调用者返回一个 `NSString` 对象。


    setter 方法的命名惯例是 `set`*`实例变量名`*。因此，在我们的例子中，setter 方法被命名为 `setTitle`。请注意，实例变量名的第一个字符使用了大写字母；这也是标准惯例的一部分。


    **注意：** 一种称为驼峰命名法（或 `CamelCase`）的命名惯例使用大写字母来区分方法、变量或类名称中的不同单词。这种命名方式形似骆驼，因为大写字母倾向于形成驼峰。它使名称更易读。例如，`stringWithContentsOfURL`
    远比 `stringwithcontentsofurl` 易读。


    现在，“惯例”这个词已经被多次提及。Objective-C 并不要求方法有特定的名称。然而，由于大多数应用程序都遵循我们讨论的指导原则，这种惯例就成了*事实上的*标准。在稍后讨论属性的主题时，了解这一点变得非常重要。不过现在，我们将手动编写一个
    getter 和一个 setter 方法，以便更好地理解它们。


    首先，getter——这是最容易实现的方法：


    ```

    - (NSString *)title

    {

        return title;

    }

    ```


    在上面的例子中，`title` 方法简单地返回了名为 `title` 的局部实例变量。要访问这个方法，可以使用 `[object title]` 语法。


    看起来，实例变量和方法名可能会混淆。但由于访问实例变量与访问方法名的方式完全不同，Objective-C 运行环境在处理同名的实例变量和方法名时没有问题。


    现在，这是 setter：


    ```

    - (void)setTitle:(NSString *)newTitle

    {

        if ([newTitle length] > 0) {

            title = newTitle;

        }

    }

    ```


    这个例子比我们的 getter 方法稍微复杂一些，尽管它本可以不这么复杂。在我们的 setter 示例中，在赋值字符串之前，会检查 `newTitle` 的长度是否大于
    `0`（`NSString` 类的 `length` 方法返回字符串中的字符数）。显然，我们的 setter 代码不希望当前的书名叫什么。


    使用上面的 getter/setter 方法，它们将像以下代码片段所示那样被使用：


    ```

     1  Book *myBook = [Book alloc] init];

     2  

     3  [myBook setTitle:@”My Great Book”];  // 调用 setter

     4  

     5  NSString *title = [myBook title];  // 调用 getter 并将其放入 ‘title’ NSString 对象中。

    ```


    setter 方法的好处在于，对象可以在接受值之前对参数执行一些验证逻辑。如果对象允许直接访问实例变量，那么这种验证要么必须遍布各处，要么根本不存在验证，从而导致对象的书名可能被设置为无效值（例如空白书名）。


    现在，并不需要*总是*为每个实例变量创建 getter 和/或 setter。一个很好的例子是表示当前日期的对象。不需要设置它，只需检索它，因此只需要一个
    getter 方法。


    对象和变量的需求将决定 getter 和 setter 方法如何构建。如果一个 getter 获取值，一个 setter 设置值，那么仅仅编写对象中的所有
    getter 和 setter 就需要大量的编码工作，尤其是在有许多实例变量的情况下。幸运的是，Objective-C 2.0 引入了一种方法，可以在程序员付出最小努力的情况下减轻这种负担。Objective-C
    2.0 中的这些特性被称为属性。


    **注意：** Objective-C 2.0 于 2006 年随 Xcode 3.4 引入，并包含在 Xcode 4 及更高版本中。

