- fmt: "#### It is everywhere\n\nJust about any development you chose to do today\
    \ will require you to understand object-oriented principles. On Mac OS X and in\
    \ iOS, everything you interact with will be an object. For example, simple windows,\
    \ buttons, and text boxes are all objects and have properties and methods. If\
    \ you want to be successful as a programmer, you will need to understand OOP.\n\
    \n#### Eliminate Redundant Code\n\nBy using objects, you can reduce the amount\
    \ of code you have to retype. If you write code to print a receipt when a customer\
    \ checks out, you will want that same code available when you need to reprint\
    \ a receipt. If you placed your code to print the receipt in the `Sales` class,\
    \ you will not have to rewrite this code again. This not only saves you time,\
    \ but often will help you eliminate mistakes. If you do not use OOP and there\
    \ is a change to the invoice (even something as simple as a graphic change), you\
    \ have to make sure you make the change in your desktop application and the mobile\
    \ application. If you miss one of them, you run the risk of having the two interfaces\
    \ behave differently.\n\n#### Ease of Debugging\n\nBy having all of the code relating\
    \ to a book in one class, you know where to look when there is a problem with\
    \ the book. This may not sound like such a big deal for a little application,\
    \ but when your application gets to hundreds of thousands or even millions of\
    \ lines of code, it will save you a lot of time.\n\n#### Ease of Replacement\n\
    \nIf you place all of your code in a class, then as things change in your application,\
    \ you can change out classes and give your new class completely different functionality.\
    \ However, it can interact with the rest of the application in the same way as\
    \ your current class. This is similar to car parts. If you want to replace a muffler\
    \ on a car, you do not need to get a new car. If you have code related to your\
    \ invoice scattered all over the place, it makes it much more difficult to change\
    \ items about a class.\n\n### Advanced Topics\n\nWe have discussed the basics\
    \ of OOP throughout this chapter, but there are some other topics that are very\
    \ important to your understanding.\n\n#### Interface\n\nAs we have discussed in\
    \ this chapter, the way the other objects interact through each other is with\
    \ methods. We discussed the header files created when you create a class. This\
    \ is often called the interface because it tells other objects how they can interact\
    \ with your objects. Implementing a standard interface throughout your application\
    \ will allow your code to interact with different objects in similar ways. This\
    \ will significantly reduce the amount of object specific code you need to write.\n\
    \n#### Polymorphism\n\nPolymorphism is the ability of an object of one class to\
    \ appear and be used as an object of another class. This is usually done by creating\
    \ methods and properties that are similar to those of another class. A great example\
    \ of polymorphism that we have been using is the bookstore. In the bookstore,\
    \ we have three similar classes: `Book`, `Magazine`, and `Newspaper`. If we wanted\
    \ to have a big sale for our entire inventory, we could go through all of the\
    \ books and mark them down. Then we could go through all of the magazines and\
    \ mark them down, and then go through all of the newspapers and mark them down.\
    \ That would be more work than we would need to do. It would be better to make\
    \ sure all of the classes have a markdown method. Then we could call that on all\
    \ of the objects without needing to know which class they were as long as they\
    \ were subclasses of a class that contained the methods needed. This would save\
    \ a bunch of time and coding.\n\nAs you are planning out your classes, look for\
    \ similarities and methods that might apply to more than one type of class. This\
    \ will save you time and speed up your application in the long run.\n\n### Summary\n\
    \nWe’ve finally reached the end of the chapter! Here is a summary of the things\
    \ that were covered.\n\n*   Object-oriented programming (OOP)\n    *   We discussed\
    \ the importance of OOP and the reasons why all modern code should use this methodology.\n\
    *   Object\n    *   You learned about objects and how they correspond to real-world\
    \ objects. We learned that many programming objects relate directly to real-world\
    \ objects. You also learned about abstract objects that do not correspond to real\
    \ world objects.\n*   Class\n    *   You learned that a class determines the types\
    \ of data (properties) and the methods that each object will have. Every object\
    \ needs to have a class. It is the blueprint for the object.\n*   Creating a class\n\
    \    *   You learned how to map out the properties and methods of our classes.\n\
    \    *   We used Xcode to create a class file.\n    *   We edited the class header\
    \ file to add our properties and methods.\n\n### Exercises\n\n*   Try creating\
    \ the class files for the rest of the classes we mapped out.\n*   Map out an `Author`\
    \ class. Choose the kind of information you would need to store about an author.\n\
    \nFor the daring and advanced:\n\n*   Try creating a superclass called `PrintedMaterials`.\
    \ Map out the properties that a class might have.\n*   Create classes for the\
    \ other types of printed materials a store might carry.\n\n## Chapter 6\n\n##\
    \ Learning Objective-C and Xcode\n\nFor the most part, all computer languages\
    \ perform the typical tasks any computer needs to do—store information, compare\
    \ information, make decisions about that information, and perform some action\
    \ based on those decisions. Objective-C is a language that makes these tasks easier\
    \ to understand and accomplish. The real trick with Objective-C (actually, the\
    \ trick with any C language) is to understand the symbols and keywords used to\
    \ accomplish those tasks. This chapter continues our examination of Objective-C\
    \ and Xcode so you can become even more familiar with them."
