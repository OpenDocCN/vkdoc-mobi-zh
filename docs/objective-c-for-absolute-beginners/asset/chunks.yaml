    \ should never send a `dealloc` message to another object. There are some exceptions.\
    \ One of these is when handling the `dealloc` message itself. You will be dealing\
    \ with the `dealloc` message only for objects you create. [Listing 13–10](#Chapter13.html#list_13_10)\
    \ is a snippet of code that shows how a typical dealloc message is coded. Every\
    \ object that you create should implement a `dealloc` message except when using\
    \ ARC, garbage collection, or if there’s nothing to release.\n\n**Listing 13–10.**\
    \ *A Typical dealloc Implementation.*\n\n`1   - (void)dealloc`\n`2   {`\n`3       self.iVar1\
    \ = nil;     // If we had iivars, make sure they are deallocated.`\n`4                             //\
    \ This instance variable was a property (`[`Chapter 10`](#Chapter10.html#ch10)`)`\n\
    `5       [iVar2 release];      // Another example.  We release an instance variable`\n\
    `6                             // that we were using – it wasn’t a property.`\n\
    `7       [super dealloc];      // We finally tell our parent to deallocate itself.`\n\
    `8                             // This is one of the few times dealloc will be\
    \ called`\n`9                             // explicitly.`\n`10   }`\n\n[Listing\
    \ 13–10](#Chapter13.html#list_13_10) is strictly an example, and the instance\
    \ variable names are completely fabricated.\n\nLine 3 sets an instance variable\
    \ to `nil`. Not only is this common practice, but also, in our example, the instance\
    \ variable is a property. If the property was created with the `retain` keyword\
    \ like the code below setting the property to `nil` automatically sends a release\
    \ message to whatever object `iVar1` was pointing to first.\n\n`   @property(retain)\
    \ NSDate* iVar1`\n\nIt’s a very clean way to release an object.\n\nLine 5 shows\
    \ how a nonproperty instance variable would be released. We’ve used this method\
    \ in many of our examples so far.\n\nLine 7 is the only case in which you would\
    \ send a `dealloc` message to an object. In this case, the program is telling\
    \ its parent (the superclass) to deallocate itself. The parent would end up doing\
    \ the same, sending a `dealloc` to its parent and so on until the base object\
    \ is finally deallocated. Also note that `[super dealloc]` is the last thing the\
    \ method does—it’s not a good idea to deallocate the parent class and then continue\
    \ to do more things.\n\nDealing with the retain/release model will take some time\
    \ to get used to but overall is a fairly straightforward system of managing memory.\
    \ Here’s a word of caution though: even though our examples talked about the `retainCount`\
    \ method of an object, do not rely on this value. Since you have no idea what\
    \ parts of the framework have an interest in your objects, the retain count could\
    \ be higher than you expect. However, knowing about the `retainCount` is beneficial\
    \ in troubleshooting a potential memory leak. Continue to practice working with\
    \ the retain/release model, and make sure that you read the developer documentation\
    \ when sending or receiving objects so that you know how the object in question\
    \ is being handled.\n\n### If Things Go Wrong\n\nAllocating memory either through\
    \ the standard C mechanisms or the Objective-C object allocation methods works\
    \ most of the time. However, the programmer cannot assume that allocating an object\
    \ or allocating memory works *all* the time. When memory allocation fails, it’s\
    \ generally a sign that bigger problems are at hand, and the program may not be\
    \ around too much longer (it will crash because of memory issues). However, even\
    \ though the program may be getting into a bad state because it can’t allocate\
    \ memory, the program should not ignore the memory allocation failure signs. Here\
    \ are some conventions that are used to test if memory allocation has failed:\n\
    \n![images](images/U1303.jpg)\n\nIn this standard C example, if the `malloc` function\
    \ fails, a `NULL` pointer is returned. Recall that `NULL` pointer is nothing more\
    \ than a pointer that points to location 0×00000000\\. Memory never starts at\
    \ this location, so `NULL` can be used to indicate a *bad* memory allocation.\n\
    \nIn Objective-C, there are two main areas that we need to perform validity checks.\
    \ Here’s the first:\n\n![images](images/U1304.jpg)\n\nIn this example, we try\
    \ to create an object, but we check to see if the pointer returned is `nil` or\
    \ not. Recall that a `nil` object is basically a default empty object used as\
    \ a placeholder to mean “empty,” or “nothing.” Don’t confuse this with an empty\
    \ `MyObject`, because that it is not.\n\nThe second validity check only applies\
    \ to objects we’ve created. This check is done in the `init` method of the class:\n\
    \n![images](images/U1305.jpg)\n\nIn this example, in the object’s `init` method,\
    \ the program explicitly tests to see if `self` returns a value that is not `nil`.\
    \ If `self` is not `nil`, things are OK, and the method can continue initializing\
    \ the object. The method then returns `self`, which can be either `nil` or not.\
    \ The important thing to note here is that we are testing to ensure that the call\
    \ to `[super init]` works before proceeding to work on `self`**.**\n\n### A Note\
    \ About ARC\n\nWhile we covered a lot of the manual ways of handling memory if\
    \ ARC isn’t used, it is advisable to use ARC on any new project you create. What\
    \ you learned here is that, while ARC hides how memory is retained and released,\
    \ it is important to understand what’s really happening under the covers.\n\n\
