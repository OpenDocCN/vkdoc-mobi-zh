    ### 将十进制（Base-10）转换为二进制（Base-2）


    一个典型的日常数字可能看起来像这样：`1101`。现在，大多数人会认为这个数字是“一千一百零一”。然而，在二进制（Base-2）计数法中，这个数字代表十进制数`13`。让我们看看这是如何实现的。


    如图 13-2 所示，在十进制计数法中，每个数位代表 10 的幂次；即从右向左，每一列的值按 10 的幂次（10, 100, 1000 等）递增。我们将千位（`10³`）、百位和个位相加，得到`1,101[10]`（下标表示“基数为
    10”）。


    ![images](img/1302.jpg)


    **图 13-2.** *十进制计数系统。*


    现在，让我们看看同样的数字在二进制中是什么样，如图 13-3 所示。


    ![images](img/1303.jpg)


    **图 13-3.** *二进制计数系统。*


    在二进制计数法中（如图 13-3 所示），从右向左，每一列的值按 2 的幂次（2, 4, 8, 16, 32 等）递增。我们将`8`、`4`和`1`相加，得到值`13[10]`（这里是二进制结果）。另请注意，连续的
    4 位（即半个字节）通常被称为一个**半字节**。


    当然，前面提到 8 位（编号从 0 到 7）构成一个字节。图 13-4 展示了一个由 8 位组成的完整字节示例。要获取其值，请将所有列的值相加，方法如下：


    ![images](img/1304.jpg)


    **图 13-4.** *一个完整的字节，显示二进制和十进制值。*


    ### 使用十六进制（Base-16）计数法


    最后一个值得一提的、在现代计算机中广泛使用的进制是十六进制（Base-16）计数系统。在二进制中，每个数位可以有 0 和 1 两种值。在十进制中，每个数位可以有
    0-9 共十种值。在十六进制中，每个数位可以有 0-F 共十六种值。是的，你没看错；最后一个是`F`。为了在单一数位中表示 16 个值，使用字母来表示数值就变得很有必要。对于十六进制，其数字序列从
    0 到 9，然后从`A`到`F`。表示一个字节需要两个十六进制（简称**hex**）数字；每个十六进制数字代表 4 位，如图 13-5 所示。


    ![images](img/1305.jpg)


    **图 13-5.** *左侧：两个半字节组成一个字节。右侧是一个简单的十六进制到十进制转换表。*


    因此，十六进制数`9D`等于二进制数`10011101`，也等于十进制数`157`。如图 13-5 所示，一个字节的值可以是从`0000 0000`到`1111
    1111`（二进制）之间的任意值，也就是`0xFF`（十六进制）。


    **注意：** 在`0xFF`中，前缀`0x`在编程中用来表示该数字是一个十六进制数。虽然`FF`看起来很明显（因为只有字母），但像`10`这样的数字就不那么明确了：它是十进制的
    10 还是十六进制的 16？而`0x10`则明确了这一点。


    学习十六进制需要一些时间适应，但这段时间花得很值。这是因为在处理内存时，几乎所有东西都用十六进制表示。如同十进制计数法，每个数位都比前一位呈指数级增大，如图
    13-6 所示。


    ![images](img/1306.jpg)


    **图 13-6.** *一个 16 位的十六进制数。*


    在十进制中，数位依次是 1, 10, 100, 1000，等等。在十六进制中，数位基于 16，因此是 1, 16, 256, 1024，等等——每一列都是
    16 的倍数。然而，一旦你理解了十六进制，你可能也想将其转换为十进制表示。图 13-7 展示了如何将 16 位的十六进制数转换为十进制数。


    ![images](img/1307.jpg)


    **图 13-7.** *将 16 位的十六进制数转换为十进制。*


    如果我们把所有列的值相加，就会得到答案：


    `8,192 + 256 + 160 + 2 = 8,610`


    因此`0x21A2`等于`8,610`。


    图 13-7 表示的是一个 16 位的数字。计算 32 位和 64 位数字只需要向左增加列数即可。


    **提示：** 如果你发现自己经常需要计算 32 位和 64 位的值，只需使用 Mac 上的计算器（切换到程序员视图），或者花点小钱买个能处理十六进制的科学计算器。


    我们希望这没有把你吓跑。在最底层理解计算机内存其实并没那么难，而且也不是所有时候都需要这样做。需要记住的重点是：处理内存时，可能有必要理解二进制（Base-2）、十进制（Base-10）和十六进制（Base-16）的值。这在调试应用程序时会变得更加清晰，如第
    14 章中所讨论的。

