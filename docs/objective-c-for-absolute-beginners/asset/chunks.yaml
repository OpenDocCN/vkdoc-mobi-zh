  trans: '

    ### 创建 Alice 应用——登月，爱丽丝


    我们已经介绍了一些新术语和概念，现在是时候做程序员该做的事了——写代码。新手开发者通常会将编写一个 **Hello World** 应用作为他们的第一个程序。我们也会做类似的事情，但
    Alice 让它变得更有趣。接下来，在完成第一个 Alice 应用后，我们再来编写第一个 Objective-C 应用。


    这个 Alice 应用将在屏幕上显示三个对象：一个月球着陆器和两名宇航员。一名宇航员会说：“鹰已着陆。”另一名宇航员会说：“这是个人的一小步，却是人类的一大步。”


    Alice 确实让这类应用的开发变得简单又好玩。请确保你遵循以下步骤：


    1. 点击**文件**，然后点击**新建**。

    2. 点击**模板**选项卡。

    3. 选择 `MoonProject.a3p` 模板，并点击**打开**按钮。参见图 2-8。


    ![images](img/0208.jpg)


    **图 2–8.** *选择太空模板。*


    4. 现在，我们需要添加对象。点击**编辑场景**。这是 图 2-4 中“世界”窗口里的一个重要按钮。

    5. 在“对象库”中，从**通用 Alice 模型**中选择**太空类别**。

    6. 右键点击**月球着陆器**来查看关于该对象的一些信息。参见图 2-9。我们可以点击**“确定”**将对象添加到世界中，也可以直接从库中将它们拖放到世界中。


    **注意：** 在这个例子中，你可以看到为什么实例是对象的一个副本。我们正在创建对象的一个副本并将其放入我们的世界中。*实例化* 是对创建副本并初始化对象这一过程的一个术语描述。


    ![images](img/0209.jpg)


    **图 2–9.** *在步骤 6 中查看对象并将其添加到我们的世界中。*


    7. 点击 `Astronaut` 类别两次，向世界中添加两名宇航员。

    8. 使用 图 2-10 中方框标出的**摄像机调整**和**对象调整**工具，以达到你想要的视觉效果和视角。


    **提示：** 有时当你添加两个对象时，Alice 会将一个对象放置在另一个之上。如果发生这种情况，将上面的宇航员拖到另一名宇航员的旁边。你的世界应该看起来像
    图 2-10。


    ![images](img/0210.jpg)


    **图 2–10.** *使用“摄像机调整”工具来控制用户对世界的视角。使用“对象调整”工具来塑造和调整对象在世界中的方向。*


    9. 在右上角有**对象调整**工具。将鼠标悬停在每个图块上，以了解每个图块工具会对对象产生什么效果。注意 图 2-10 中的对象树。`ground`、`lunarLander`、`astronaut`
    和 `astronaut2` 对象都在对象树中。

    10. 点击屏幕右下角的**编辑代码**按钮。这将返回编辑器视图。

    11. 在世界窗口中点击左侧的宇航员。确保在“详细信息区域”中选中了**过程选项卡**。

    12. 现在我们要让宇航员们说些什么。记住，对对象执行动作需要方法。将 `Astronaut2|turn` 图块从“详细信息区域”拖到我们的编辑器中。从参数列表中选择**向左转**、**0.25
    旋转**。参见图 2-11。当我们运行应用时，左侧的宇航员将向左旋转四分之一圈，面向另一名宇航员。


    ![images](img/0211.jpg)


    **图 2–11.** *左侧宇航员的方法和参数。*


    13. 让我们为另一名宇航员做同样的操作。点击右侧的宇航员。将 `Astronaut|turn` 图块从“详细信息区域”拖到我们的编辑器中。从参数列表中选择**向右转**、**0.25
    旋转**。

    14. **参数**是方法对对象进行操作所需的信息。一个方法可能需要一个或多个参数。点击右侧的宇航员，将 `Astronaut2|say` 图块拖到编辑器中，**选择其他**，然后输入
    **The Eagle has landed.** 参见图 2-12。


    ![images](img/0212.jpg)


    **图 2–12.** *你的编辑器应该包含这些带有列出参数的方法。*


    15. 点击右侧的宇航员。将 `astronaut|say` 图块拖到编辑器中，**选择其他**，然后输入 **That’s one small step
    for man. . . One giant leap for mankind**。你的应用看起来应该像 图 2-12。

    16. 让我们运行第一个程序，点击**播放**。如果你正确地完成了所有步骤，你的应用在运行时应该看起来像 图 2-13。如果不是，那么你需要进行一些调试。

    17. 将应用保存为 `toTheMoonAlice.a3p`。我们稍后会用到这个应用。点击**文件** ![images](img/U001.jpg) **保存世界**，或者**文件**
    ![images](img/U001.jpg) **另存世界为**。


    ![images](img/0213.jpg)


    **图 2–13.** *从“世界运行”窗口的顶部区域，我们可以重新运行程序、暂停、继续、重启、停止以及为我们的应用拍照。我们还可以根据应用的运行速度来加快或减慢它。*


    ### 你的第一个 Objective-C 程序


    既然你已经对 OOP 有了一些了解，并且完成了第一个 Alice 程序，那么是时候编写你的第一个 Objective-C 程序，并开始理解 Objective-C
    语言、Xcode 和语法了。首先，我们必须安装 Xcode。Xcode 是我们在开发 Objective-C 应用时使用的 IDE。它相当于 Alice 的界面。

