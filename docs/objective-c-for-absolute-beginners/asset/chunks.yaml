    `speed = 500 knots`\n`pitch = 10 degrees`\n`yaw = 20 degrees`\n`latitude = 33.575776`\n\
    `longitude = -111.875766`\n\nFor our `UITableView` object in [Figure 1–5](#Chapter01.html#fig_1_5),\
    \ the following might be our properties:\n\n`backGroundColor = Red`\n`selectedRow\
    \ = 3`\n`animateView = No`\n\nAn object’s properties can be changed at any time\
    \ when our program is running, when the user interacts with the app, or when the\
    \ programmer designs the app to accomplish the design requirements. The values\
    \ stored in the properties of an object at a specific time are collectively called\
    \ the **state of an object**.\n\n**State** is an important concept in computer\
    \ programming. When teaching students about state, we ask them to go over to a\
    \ window and find an airplane in the sky. We then ask them to snap their fingers\
    \ and make up some of the values that the plane’s properties might have at that\
    \ specific time. Those values might be\n\n`altitude = 10,000 feet`\n`latitude\
    \ = 33.575776`\n`longitude = -111.875766`\n\nThose values represent the state\
    \ of the object at the specific time that they snapped their fingers.\n\nAfter\
    \ waiting a couple minutes, we ask the students to find that same plane, snap\
    \ their fingers again, and record the plane’s possible state at that specific\
    \ point in time.\n\nThe values of the properties might then be something like\n\
    \n`altitude = 10,500 feet`\n`latitude = 33.575665`\n`longitude = -111.875777`\n\
    \nNotice how the state of the object changes over time.\n\n### Working with the\
    \ Alice Interface\n\nAlice offers a great approach in using the concepts that\
    \ we have just discussed without all the complexity of learning Xcode and the\
    \ Objective-C language at the same time. It takes only a few minutes to familiarize\
    \ oneself with the Alice interface and begin writing a program.\n\nThe Introduction\
    \ of this book describes how to download Alice. After it’s downloaded and installed,\
    \ you need to open Alice. It will look like [Figure 1–6](#Chapter01.html#fig_1_6).\n\
    \n![images](images/0106.jpg)\n\n**Figure 1–6.** *Alice IDE running*\n\nTechnically\
    \ speaking, Alice is not a trueIDE like Xcode, but it is pretty close and much\
    \ easier to learn than Xcode. A true IDE combines code development, user interface\
    \ layout, debugging tools, documentation, and simulator/console launching for\
    \ a single application; see [Figure 1–7](#Chapter01.html#fig_1_7). However, Alice\
    \ offers a similar look, feel, and features to Xcode. This will serve you well\
    \ later when we start writing Objective-C code.\n\n![images](images/0107.jpg)\n\
    \n**Figure 1–7.** *The Xcode integrated development environment (IDE) with the\
    \ iPhone Simulator*\n\nIn the next chapter, you will go through the Alice interface\
    \ and write your first program.\n\n### Summary\n\nCongratulations, you have finished\
    \ the first chapter of this book. It is important that you have an understanding\
    \ of the following terms because they will be reinforced throughout this book:\n\
    \n*   Computer program\n*   Algorithm\n*   Design requirements\n*   User interface\n\
    *   Bug\n*   Quality assurance (QA)\n*   Debugging\n*   Object oriented programming\
    \ (OOP)\n*   Object\n*   Property\n*   Method\n*   State of an object\n*   Integrated\
    \ development environment (IDE)\n\n### Exercises\n\n*   Answer the following questions:\n\
    \    *   Why is it so important to spend time on your user requirements?\n   \
    \ *   What is the difference between design requirements and an algorithm?\n \
    \   *   What is the difference between a method and a property?\n    *   What\
    \ is a bug?\n    *   What is state?\n*   Write an algorithm for how a soda machine\
    \ works from the time a coin is inserted until a soda is dispensed. Assume the\
    \ price of a soda is 80 cents.\n*   Write the design requirements for an app that\
    \ will run the soda machine.\n\n## Chapter 2\n\n## **Programming Basics**\n\n\
    This chapter will focus on the building blocks that are necessary to become a\
    \ great Objective-C programmer. This chapter is going to go over how to use the\
    \ Alice user interface, how to write our first Alice program, how to write our\
    \ first Objective-C program, and explore some new OOP terms.\n\n**NOTE:** We want\
    \ to introduce new concepts in Alice and later, in this chapter, enable you to\
    \ use these concepts in Objective-C. We have used this approach for the last 3\
    \ years and know, from personal experience, that this approach helps you learn\
    \ the concepts quickly, without discouragement, and gives you a great foundation\
    \ to build upon."
  trans: "\n### 面向对象编程简介\n\n正如导言中详细讨论的那样，`Alice` 使我们能够专注于学习面向对象编程（OOP），而无需一次性掌握所有\
    \ `Objective-C` 编程语法和复杂的 `Xcode` 开发环境。相反，我们可以专注于学习 OOP 的基本原则，并快速运用这些原则编写我们的第一个程序。\n\
    \n几十年来，开发者们一直在努力寻找一种更好的方法来开发在项目生命周期内可复用、可管理且易于维护的代码。OOP 旨在帮助实现代码复用和可维护性，同时降低软件开发成本。\n\
    \nOOP 可以被视为程序中对象的集合。对这些对象执行操作以满足设计要求。\n\n一个**对象**是任何可以被操作的东西。例如，一架飞机、一个人或 iPad\
    \ 上的屏幕/视图都可以是对象。我们可能希望通过让飞机倾斜来操作它。我们可能希望让人行走，或者改变 iPad 上某个应用的屏幕颜色。操作都要应用于这些对象；参见图\
    \ 1-4。\n\n![images](img/0104.jpg)\n\n**图 1-4.** *Alice 应用程序中的两个对象：一艘运输船和一架战斗机。两个对象都可以应用操作——起飞和降落、右转和左转。*\n\
    \n如果你点击播放按钮，`Alice` 将会为你运行一个程序，例如图 1-4 中所示的程序。当我们运行 `Alice` 应用程序时，用户可以对应用程序中的对象应用操作。类似地，`Xcode`\
    \ 是一个**集成开发环境（IDE）**，它使我们能够在编程环境中运行应用程序。我们可以在将应用程序运行到 iOS 设备上之前，先在电脑上通过 Xcode\
    \ 的模拟器测试它们，如图 1-5 所示。\n\n![images](img/0105.jpg)\n\n**图 1-5.** *这个示例 iPhone 应用包含一个用于组织课程列表的表格对象。诸如“向左旋转”或“用户选择了第\
    \ 3 行”等操作可应用于此对象。*\n\n对对象执行的操作称为**方法**。方法操纵对象以实现我们希望应用执行的功能。例如，对于图 1-4 中的喷气机对象，我们可能有以下方法：\n\
    \n`goUp`\n`goDown`\n`bankLeft`\n`turnOnAfterBurners`\n`lowerLandingGear`\n\n图\
    \ 1-5 中的表格对象，在程序中实际被称为 `UITableView`，它可能有以下方法：\n\n`loadView`\n`shouldAutorotateToInterfaceOrientation`\n\
    `numberOfSectionsInTableView`\n`cellForRowAtIndexPath`\n`didSelectRowAtIndexPath`\n\
    \n所有对象都有描述这些对象的数据。这些数据被定义为**属性。**每个属性都以特定的方式描述相关联的对象。例如，喷气机对象的属性可能如下：\n\n`altitude\
    \ = 10,000 feet`\n`heading = North`\n`speed = 500 knots`\n`pitch = 10 degrees`\n\
    `yaw = 20 degrees`\n`latitude = 33.575776`\n`longitude = -111.875766`\n\n对于图 1-5\
    \ 中的 `UITableView` 对象，以下可能是我们的属性：\n\n`backGroundColor = Red`\n`selectedRow = 3`\n\
    `animateView = No`\n\n当程序运行时，当用户与应用交互时，或者当程序员设计应用以满足设计要求时，对象的属性可以随时被更改。在特定时间存储在对象属性中的值的集合统称为**对象的状态**。\n\
    \n**状态**是计算机编程中的一个重要概念。在向学生教授状态时，我们让他们走到窗边，找到天空中一架飞机。然后我们让他们打个响指，想象一下当时那架飞机的属性可能具有的一些值。这些值可能是：\n\
    \n`altitude = 10,000 feet`\n`latitude = 33.575776`\n`longitude = -111.875766`\n\
    \n这些值代表了对象在他们打响指的那个特定时刻的状态。\n\n等待几分钟后，我们让学生找到同一架飞机，再次打响指，并记录下该飞机在那个特定时间点可能的状态。\n\
    \n那么属性的值可能变成这样：\n\n`altitude = 10,500 feet`\n`latitude = 33.575665`\n`longitude\
    \ = -111.875777`\n\n请注意对象的状态是如何随时间变化的。\n\n### 使用 Alice 界面\n\n`Alice` 提供了一种很棒的方法来运用我们刚刚讨论过的概念，而无需同时面对学习\
    \ `Xcode` 和 `Objective-C` 语言的所有复杂性。只需几分钟就能熟悉 `Alice` 界面并开始编写程序。\n\n本书的导言描述了如何下载\
    \ `Alice`。下载并安装后，你需要打开 `Alice`。它的界面将如图 1-6 所示。\n\n![images](img/0106.jpg)\n\n\
    **图 1-6.** *正在运行的 Alice IDE*\n\n严格来说，`Alice` 并不是像 `Xcode` 那样的真正 IDE，但它非常接近，而且比\
    \ `Xcode` 更容易学习。真正的 IDE 将代码开发、用户界面布局、调试工具、文档以及模拟器/控制台启动功能集成为单个应用程序；参见图 1-7。然而，`Alice`\
    \ 提供了与 `Xcode` 相似的外观、感觉和功能。这将为以后我们开始编写 `Objective-C` 代码打下良好的基础。\n\n![images](img/0107.jpg)\n\
    \n**图 1-7.** *Xcode 集成开发环境（IDE）及 iPhone 模拟器*\n\n在下一章中，你将逐步了解 `Alice` 界面并编写你的第一个程序。\n\
    \n### 本章小结\n\n恭喜你，你已经完成了本书的第一章。理解以下术语非常重要，因为它们将在本书中反复强调：\n\n*   计算机程序\n*   算法\n\
    *   设计要求\n*   用户界面\n*   缺陷（Bug）\n*   质量保证（QA）\n*   调试\n*   面向对象编程（OOP）\n*   对象\n\
    *   属性\n*   方法\n*   对象的状态\n*   集成开发环境（IDE）\n\n### 练习\n\n*   回答以下问题：\n    *   为什么要花时间在用户需求上如此重要？\n\
    \    *   设计需求和算法之间有什么区别？\n    *   方法和属性有什么区别？\n    *   什么是缺陷（Bug）？\n    *   什么是状态？\n\
    *   编写一个算法，描述自动售货机从投入硬币到出苏打水的工作过程。假设一瓶苏打水的价格是 80 美分。\n*   为一个可以控制自动售货机的应用编写设计要求。\n\
    \n## 第 2 章\n\n## 编程基础\n\n本章将重点介绍成为一名优秀的 `Objective-C` 程序员所必需的构建块。本章将讲解如何使用 `Alice`\
    \ 用户界面，如何编写我们的第一个 `Alice` 程序，如何编写我们的第一个 `Objective-C` 程序，并探索一些新的 OOP 术语。\n\n**注意：**\
    \ 我们希望在 `Alice` 中引入新概念，然后在后面的章节中，让你能够在 `Objective-C` 中使用这些概念。我们在过去 3 年中一直使用这种方法，并且根据个人经验，我们知道这种方法可以帮助你快速学习这些概念，不会感到气馁，并为你打下坚实的基础。\n"
- fmt: '### Taking a Tour with Alice


    Alice’s 3D programming environment makes it easy to write your first program,
    as it applies some of the principles that you have learned in [Chapter 1](#Chapter01.html#ch1).
    First, you need to learn a little more about Alice’s user interface. When we first
    launch Alice, we are presented with a screen that looks like [Figure 2–1](#Chapter02.html#fig_2_1).


    You can start with the default blue sky and green grass template or pick another
    template with a different background. Feel free to explore and have fun. This
    is where we will spend most of our time and write our first Alice application.


    The Alice user interface is set up to help us efficiently write our applications.
    The user interface is very similar in form and function to the Xcode IDE. We will
    now explore the major sections of Alice.


    ![images](images/0201.jpg)


    **Figure 2–1.** *Opening screen in Alice*


    #### Navigation Menu


    The Navigation menu, shown in [Figure 2–2](#Chapter02.html#fig_2_2), enables us
    to open and close files, set our application preferences, and view world statistics,
    text output, and the error console. We can also access example worlds and Alice
    Help from the Navigation menu.


    **NOTE:** It is important that you save your program frequently when using Alice.
    If Alice crashes and you haven’t saved your work, you will lose all your code
    or changes since you last saved. Additionally, we recommend that you close Alice
    completely and reopen it when you want to open a new Alice program.


    ![images](images/0202.jpg)


    **Figure 2–2.** *This shows the Alice’s user interface’s main sections. Take some
    time to explore the user interface. You will see in this chapter how it compares
    with Xcode and how it will help us learn Objective-C.*


    #### World Window


    The World window shows what our virtual world will look like when it runs. This
    window is similar to the iPhone/iPad simulator that we will use later to run our
    apps. The World window enables us to take advantage of Alice’s 3D user interface
    to model our application.


    In the World window, we can move the camera around and place it where we want
    for the viewing prospective we desire. Moving the three arrow tools in [Figure
    2–3](#Chapter02.html#fig_2_3) enables incredible flexibility for bringing our
    applications to life.


    It is important to learn how to move the camera around your world in order to
    get the view you want the users to see.


    ![images](images/0203.jpg)


    **Figure 2–3.** *Camera manipulation arrows to control the camera in World window.*


    One of the most important Alice controls is the **Edit Scene** control. See [Figure
    2–4](#Chapter02.html#fig_2_4). When we click the Edit Scene button in the bottom-right
    corner of the World window, we launch Alice’s **Scene Editor**.


    ![images](images/0204.jpg)


    **Figure 2–4.** *The Edit Scene button in the World window is outlined with a
    box and is one of the most important controls. This button will launch Alice’s
    Scene Editor and enable us to add objects to our Alice World.*


    Take a minute to familiarize yourself with the Scene Editor shown in [Figure 2–5](#Chapter02.html#fig_2_5).
    The Scene Editor enables us to:


    *   Add objects to our world from the gallery.

    *   Add objects to our world from the Internet.

    *   Position the objects in our world.

    *   Adjust the camera for viewing our world.


    We will spend a lot of time adding objects and setting the camera in our worlds
    by using the Scene Editor.


    ![images](images/0205.jpg)


    **Figure 2–5.** *Alice’s Scene Editor*


    #### Classes, Objects, and Instances in Alice


    A group of objects with the same properties and same methods (actions) are called
    a **class**. For example, we could have a class called `Airplane`. In this class,
    we could have five objects:


    `boeing747`

    `lockheedSR71`

    `boeing737`

    `citation10`

    `f18Fighter`


    These objects are nearly identical. They are from the same `Airplane` class. They
    all have the same following methods:


    `land()`

    `takeOff()`

    `lowerLandingGear()`

    `raiseLandingGear()`

    `bankRight()`

    `bankLeft()`


    The only thing that differentiates the objects is the values of their properties.
    Some of the properties of the values might be:


    `wingLength = 20ft`

    `maxThrust = 200,000lbs`

    `numberOfEngines = 2`


    In your world, you may have two objects that are exactly the same. You may want
    two Boeing 737s in your view. Each copy of a class is called an **instance**.
    Adding an instance of a class to our program is called **instantiation**.


    #### Object Tree


    The **Object Tree** (see [Figure 2–6](#Chapter02.html#fig_2_6)) enables us to
    view all of the objects in our Alice world. Additionally, if the object has subparts,
    you can view these subparts by clicking the plus sign, or collapse the subparts
    by clicking the minus sign.


    ![images](images/0206.jpg)


    **Figure 2–6.** *The Object Tree*


    Many of the Alice worlds come with several built-in objects that we will need
    for our apps. The world in [Figure 2–6](#Chapter02.html#fig_2_6) comes with the
    Camera, Light, and Ground objects.


    #### Editor Area


    The Editor Area, the largest area of the Alice interface, is where we write our
    code. With Alice, we don’t have to actually type code; we can drag and drop our
    code to manipulate our objects and properties.


    **NOTE:** Don’t forget the top of the Editor Area. The top contains a row of control
    and logic tiles for looping, branching, and other logical structures that we can
    use to control the behavior of our objects.


    #### Details Area


    The **Details Area** of the Alice interface contains the tabs for properties,
    procedures, and functions that make up the object that is selected in the Object
    Tree.


    *   **Properties** contain the specific information of our selected object (e.g.,
    weight, length, and height).

    *   **Procedures (Methods)** perform actions upon the object (e.g., take off and
    land).

    *   **Functions** and methods are similar. In Alice, the difference between the
    two is that a method does not return a value. A function will return a value.


    #### Events Area


    The Events Area of the Alice interface contains a listing of all the existing
    events used by our app, and provides us with the opportunity to create new events.
    **Events** are conditions that trigger our methods. Methods (or procedures) that
    react to these events are called **event handlers**. When a specific event occurs,
    it **triggers** a signal that the event handler receives and handles.


    Some examples would be the user touching a button on an iPhone. The touching or
    swiping triggers events and the methods that handle these events act on objects
    in our app. See [Figure 2–7](#Chapter02.html#fig_2_7).


    ![images](images/0207.jpg)


    **Figure 2–7.** *Phonics Easy Reader 1, by Rock ’n’ Learn, is running on the iPad
    Simulator in the left landscape orientation. Tapping the “Read to me” or “Let
    me try” button triggers events that methods receive and act on—in this example,
    reading to the child or having the child read the words of a sentence.*'
