    *   There is another attribute to a `UITableViewCell` called the `detailTextLabel`.
    Try to make use of this by setting its text property to something.

    *   Using Xcode to modify the interface, play with changing the background color
    of the DetailViewController.xib file.


    For a tougher challenge:


    *   Sort the books in the `Bookstore` object so they appear in ascending order
    on the `MasterDetailView`.


    ## Chapter 9


    ## **Comparing Data**


    In this chapter, we will discuss one of the most basic and frequent operations
    you will perform as you program: comparing data. In our bookstore example, you
    may need to compare book titles if your clients are looking for a specific book.
    You may also need to compare authors if your clients are interested in purchasing
    books by a specific author. Comparing data is a common tasks performed by developers.
    Many of the loops you learned about in the previous chapter will require you to
    compare data so that you know when your code should stop looping.


    Comparing data in programming is like using a scale. You have one value on one
    side and another value on the other side. In the middle, you have an operator.
    The operator determines what kind of comparison is being done. Examples of operators
    are “greater than,” “less than,” or “equal to.”


    The values on either side of the scale are usually variables. We learned about
    the different types of variables in [Chapter 3](#Chapter03.html#ch3). In general,
    the comparison functions for different variables will be slightly different. It
    is imperative that you become very familiar with the functions and syntax to compare
    data, as this will form a basis for your development.


    For the purpose of this chapter, we will use an example of a bookstore application.
    This application will allow users to log in to the application, search for books,
    and purchase them. We will try to relate the different ways of comparing data
    to show how they would be used in this type of application.'
