- fmt: '#### Implementing the Classes


    Now that we understand the objects we are going to be creating, we need to create
    our first object. In order to do so, we will start with a new project.


    1.  Please launch Xcode. Click on **File** ![images](images/U001.jpg) **New**
    ![images](images/U001.jpg) **New Project**.

    2.  Select `iOS` on the left-hand side. On the right-hand side, select **Master-Detail
    Application**. For what we are doing in this chapter, we could have selected any
    of the application types (see [Figure 5–9](#Chapter05.html#fig_5_9)). Click Next.


    ![images](images/0509.jpg)


    **Figure 5–9.** *Creating a new project*


    3.  You will have to enter a company name. Leave the checkboxes on this screen
    as they appear by default. We will not be worrying about these items right now.
    Select a location to save your project and then save your project. You can use
    the name `bookstore` or any other project name you want.

    4.  Select the **BookStore** folder on the left-hand side of the screen (see [Figure
    5–10](#Chapter05.html#fig_5_10)). This is where the majority of your code will
    reside.

    5.  Select **File** ![images](images/U001.jpg) **New** ![images](images/U001.jpg)
    **New File**.


    ![images](images/0510.jpg)


    **Figure 5–10.** *Selecting the bookStore folder*


    6.  From the pop-up window, select **Cocoa Touch** under the iOS header and then
    click on **Objective-C class** on the right-hand side (see [Figure 5–11](#Chapter05.html#fig_5_11)).
    Then click **Next**.


    ![images](images/0511.jpg)


    **Figure 5–11.** *Creating a new Objective-C class*


    7.  On the next screen, you will need to select the superclass for your object.
    This is what determines what properties and methods your object will have by default.
    We will select `NSObject` for now (see [Figure 5–12](#Chapter05.html#fig_5_12)).
    Click **Next**.


    **NOTE:** `NSObject` is the base class in Objective-C. It contains properties
    and methods required for most objects used.


    ![images](images/0512.jpg)


    **Figure 5–12.** *Select the superclass*


    8.  You will now be given the opportunity to name your class. For this exercise,
    we will create the `Customer` class. For now, name the class `Customer`. Now click
    **Save**.


    **NOTE:** For ease of use and for understanding your code, remember that class
    names should always be capitalized in Objective-C. Object names should always
    start lowercase. For example, `Book` would be an appropriate name for a class,
    and `book` would be a great name for an object based on the `Book` class. For
    a two word object, such as the book author, an appropriate name would be `bookAuthor`.
    This type of capitalization is called lower camelcase.


    9.  Now look in your main project folder; you should have two new files. One is
    called `Customer.h` and the other is called `Customer.m`. The `.h` file is the
    header file that will contain information about your class. The header file will
    list all of the properties and methods in your class, but it will not actually
    contain the code related to them. The `.m` file is the implementation file, which
    is where you write the code for your methods.

    10.  Double-click on the `Customer.h` file and you will see the window shown in
    [Figure 5–12](#Chapter05.html#fig_5_12). You will notice it does not contain a
    lot of information currently. The first part, with the double slashes (`//`),
    is all comments and is not considered part of the code. Comments allow you to
    tell those who might read your code what each portion of code is meant to accomplish.
    We will not go into more detail now about the other portions of the header file,
    except to say that all of the properties of a class need to be inside the braces
    (`{}`) of the `@interface` portion.


    ![images](images/0513.jpg)


    **Figure 5–13.** *Your empty customer class*


    Now let’s transfer the properties from our UML diagram to our actual class.


    **TIP:** Properties should always start with a lowercase letter. There can be
    no spaces in an attribute name.


    For the first property, First Name, we will add this line to our file.


    ```

    NSString* firstName;

    ```


    This creates a string object in our class called `firstName`. Because all of the
    properties for the `Customer` class are strings also, we will just need to repeat
    the same procedure for the other ones. When that is complete, your `@interface`
    portion should look like [Figure 5–13](#Chapter05.html#fig_5_13).


    ![images](images/0514.jpg)


    **Figure 5–14.** *The customer class interface with properties*


    Now that the `@interface` portion is complete, we will need to add our method.
    Methods need to go outside of the `@interface` portion but still inside of the
    `@interface` portion of the header file. We will add a new method that returns
    an `NSArray`. This code will look as follows:


    ```

    -(NSArray *) listPurchaseHistory;

    ```


    **NOTE:** `NSString` is a class that holds and performs actions on a string. A
    string is a set of characters. `NSString` can hold letters, numbers, and punctuation.


    That is all that needs to be done in the header file to create our class. [Figure
    5–15](#Chapter05.html#fig_5_15) shows the final header file. In the next chapter,
    we will go into more detail about the implementation file.


    ![images](images/0515.jpg)


    **Figure 5–15.** *The finished customer class header file*


    ### Inheritance


    Another major quality of OOP is inheritance. Inheritance in programming is similar
    to genetic inheritance. You might have inherited your eye color from your mother
    or hair color from your father, or vice versa. Classes can, in a similar way,
    inherit properties and methods from their parent classes. In OOP, a parent class
    is called a superclass and a child class is called a subclass.


    In Objective-C, all classes created by a programmer have a superclass that is
    similar to a parent class. The class will inherit characteristics from that parent
    class. So, just as in all other OOP languages, the class is called a subclass
    of the parent class. In this chapter, all of our classes are subclasses of the
    `NSObject`. In Objective-C, most of the time, your classes will be subclasses
    of `NSObject`. In our previous example, the `Customer` class was a subclass of
    `NSObject`.


    We could, for example, create a class of printed materials and use subclasses
    for books, magazines, and newspapers. Printed materials can have many things in
    common, so we could assign variables to the superclass of printed materials and
    not have to redundantly assign them to each individual class. By doing this, we
    further reduce the amount of redundant code that is necessary for you to write
    and debug.


    In [Figure 5–16](#Chapter05.html#fig_5_16), you will see a layout for the properties
    of a `Printed Material` superclass and how that will affect the subclasses of
    `Book`, `Magazine`, and `Newspaper`. The properties of the `Printed Material`
    class will be inherited by the subclasses so there is no need to define them explicitly
    in the class. You will notice that the `Book` class now has significantly fewer
    properties. By using a superclass, you will significantly reduce the amount of
    redundant code in your programs.


    ![images](images/0516.jpg)


    **Figure 5–16.** *Properties of the super- and subclasses*


    ### Why Use OOP?


    Throughout this chapter, we have discussed what OOP is and we have even discussed
    how to create classes and objects. However, I think it is important to discuss
    why you want to use OOP principles in your development.


    If you take a look at the popular programming languages of the day, all of them
    use the OOP principles to a certain extent. Objective-C, C++, Visual Basic, C#,
    and Java all require the programmer to understand classes and objects to successfully
    develop in those languages. In order to become a developer in today’s world, you
    will need to understand OOP. But why use it?'
