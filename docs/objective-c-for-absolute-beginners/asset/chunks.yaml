    \n## 修改 DetailViewController\n\n在本章前面，我们修改了`DetailViewController`，使其能够显示书籍的一些详细信息。在我们刚刚完成的代码中，我们修改了`MasterViewController`，使其将选中的书籍传递给`DetailViewController`。现在剩下的就是简单地将`DetailViewController`中的`Book`对象的信息移动到屏幕上的相应字段。所有这些都在一个方法——`configureView`中完成。\n\
    \n**清单 8-22.** *将 Book 对象数据移动到我们的详细视图中。*\n\n```\n33  - (void)configureView\n34\
    \  {\n35      // Update the user interface for the detail item.\n36\n37      if\
    \ (self.detailItem) {\n38          Book *theBook = (Book *)self.detailItem;\n\
    39          self.titleLabel.text = theBook.title;\n40          self.authorLabel.text\
    \ = theBook.author;\n41          self.descriptionTextView.text = theBook.description;\n\
    42      }\n43  }\n```\n\n`configureView`方法是 Xcode 模板中包含的许多便捷方法之一，每当`DetailViewController`被初始化时都会调用它。这就是我们将选中的`Book`对象信息移动到视图中的字段的地方。\n\
    \n在`DetailViewController.m`文件中的第#38–41 行，是我们将信息从`Book`对象移动到视图的地方。如果您还记得，清单 8-21\
    \ 中的第#155 行将选中的书籍设置到了`DetailViewController`上一个名为`detailItem`的属性中。第#38 行将该项取出，放入一个名为`theBook`的`Book`对象中。\n\
    \n第#39–41 行简单地将每个`Book`对象的属性移动到了我们在本章前面构建的视图控件中。这就是我们在这个类中需要做的全部。如果您构建并运行项目，然后点击其中一本书，您应该会看到类似图\
    \ 8–16 的内容。\n\n不要忘记添加对`Book.h`文件的导入，如清单 8-23 第#10 行所示。\n\n**清单 8-23.** *导入 Book.h\
    \ 头文件。*\n\n```\n 1  //\n 2  // DetailViewController.m\n 3  // MyBookstore\n 4\
    \  //\n 5  // Created by M.R. Fisher on 8/28/11.\n 6  // Copyright (c) 2011 www.committed-code.com.\
    \ All rights reserved.\n 7  //\n 8\n 9  #import \"DetailViewController.h\"\n10\
    \  #import \"Book.h\"\n```\n\n![images](img/0816.jpg)\n\n**图 8–16.** *首次查看我们的书籍详情。*\n\
    \n## 摘要\n\n我们终于到达了这一章的结尾！以下是我们所涵盖内容的总结。\n\n- **理解集合类：** 集合类是一组非常强大的类，随 Foundation\
    \ 框架一起提供，允许我们高效地存储和检索信息。\n- **使用实例变量：** 实例变量是在类的接口文件中定义的变量，在类被实例化后即可访问。\n- **使用属性：**\
    \ 属性是创建 getter 和/或 setter 的简短方式。Getter 和 setter 用于获取或设置实例变量的值。\n- **使用`for...in`循环：**\
    \ 这个特性提供了一种新的方式来遍历枚举列表中的项。\n- **构建主从应用程序：** 我们使用 Xcode 和主从模板构建了一个简单的 Bookstore\
    \ 程序，用于显示书籍和单本书的详细信息。\n- **简单的数据模型：** 使用我们学习到的集合类，我们使用`NSMutableArray`构建了一个 Bookstore\
    \ 对象，并将其用作 Bookstore 程序中的数据源。\n- **将数据连接到视图：** 我们使用 Xcode 将`Book`对象的数据连接到界面字段。\n\
    \n## 练习\n\n- 参考原始程序，向 Bookstore 中添加更多书籍。\n- 增强`Book`类，使其能够存储另一个属性——例如价格或 ISBN\
    \ 号。\n- 修改`DetailViewController`，使其显示新的字段。记得将界面控件连接到实例变量。\n- 修改`Bookstore`对象，使其调用一个单独的方法来初始化`Book`对象列表（而不是将所有内容放在`init`方法中）。\n\
    - `UITableViewCell`还有一个名为`detailTextLabel`的属性。尝试使用它，将其文本属性设置为某些内容。\n- 使用 Xcode\
    \ 修改界面，尝试更改`DetailViewController.xib`文件的背景颜色。\n\n更难的挑战：\n\n- 对`Bookstore`对象中的书籍进行排序，使它们在`MasterDetailView`上按升序显示。\n\
    \n# 第 9 章\n\n## 比较数据\n\n在本章中，我们将讨论编程中最基本也是最频繁的操作之一：比较数据。在我们的 Bookstore 示例中，如果客户正在寻找特定的书籍，您可能需要比较书名。如果客户有兴趣购买特定作者的书，您可能还需要比较作者。比较数据是开发人员执行的常见任务。您在上一章中学到的许多循环都需要您比较数据，以便知道代码何时应停止循环。\n\
    \n编程中的比较就像使用天平。一端有一个值，另一端有另一个值。中间有一个运算符。运算符决定了进行哪种比较。运算符的示例包括\"大于\"、\"小于\"或\"\
    等于\"。\n\n天平两端的值通常是变量。我们在第 3 章中学习了不同类型的变量。通常，不同变量的比较函数会略有不同。您必须非常熟悉比较数据的函数和语法，因为这将是您开发的基础。\n\
    \n在本章中，我们将使用一个 Bookstore 应用程序的示例。该应用程序将允许用户登录应用程序、搜索书籍以及购买书籍。我们将尝试联系比较数据的不同方式，以展示它们在这类应用程序中是如何使用的。\n"
- fmt: "### 重温布尔逻辑\n\n在前面的章节中，我们介绍了布尔逻辑。由于它在编程中非常普遍，本章将重新审视这个主题，并进行更详细的讨论。\n\n你将编写应用程序执行的最常见的比较就是布尔逻辑。布尔逻辑通常以`if`\
    \ `then`语句的形式出现。布尔逻辑只能有“是”或“否”两个答案之一。以下是一些你将在应用程序中使用的布尔问题的好例子：\n\n*   `5`比`3`大吗？\n\
    *   “now”的字母数超过`5`吗？\n*   `2010年6月1日`晚于今天吗？\n\n请注意，这些问题的正确答案只有两个可能：“是”和“否”。如果你提出的问题可能有超过两个答案，那么该问题需要以不同的措辞来进行编程。\n\
    \n这些问题中的每一个都将由一个`if` `then`语句来表示（例如，如果`5`大于`3`，则向用户打印一条消息）。每个`if`语句都必须有某种关系运算符。关系运算符可以是“大于”或“等于”之类的。\n\
    \n为了开始在程序中使用这类问题，你首先需要熟悉 C 和 Objective-C 语言中可用的不同关系运算符。我们将首先介绍这些。之后，我们将探讨不同的变量如何与这些运算符一起工作。\n\
    \n### 使用关系运算符\n\nObjective-C 使用 6 个标准的关系运算符。这些是标准的代数运算符，只有一个真正的变化：在 Objective-C\
    \ 语言中，与大多数其他编程语言一样，等于运算符由两个等号（`==`）构成。在[第 4 章](#Chapter04.html#ch4)的[表 4-7](#Chapter04.html#tab_4_7)中，我们描述了作为开发者可以使用的不同运算符。\n\
    \n**注意：** 单个等号（`=`）用于给变量赋值。需要两个等号（`==`）来比较两个值。例如，`if(x=9)`会将值`9`赋值给变量`x`，并且如果`9`成功赋值给`x`，它将返回“是”，这在大多数（如果不是全部）情况下都会发生。而`if(x==9)`实际上会执行一个比较，以检查`x`是否等于`9`。\n\
    \n#### 比较数字\n\n过去开发者面临的一个难题是在比较中处理不同的数据类型。在本书的前面部分，我们讨论了不同类型的变量。你可能还记得`1`是一个整数。如果你想将一个整数与一个浮点数（如`1.2`）进行比较，这可能会引起一些问题。幸运的是，Objective-C\
    \ 在这方面帮了我们。在 Objective-C 中，你可以比较任何两个数值数据类型，而无需进行类型转换（在处理其他数据类型时，有时仍然需要进行类型转换，我们将在本章后面讨论这一点）。这让你可以编写代码，而无需担心需要比较的数据类型。\n\
    \n**注意：** 类型转换是一种将数字从一种类型转换为另一种类型的过程。\n\n在我们的应用中，我们需要以多种方式比较数字。例如，假设我们的书店为单次交易消费超过`30`美元的顾客提供折扣。我们需要计算顾客的总消费金额，然后将其与`30`美元进行比较。如果消费金额大于`30`美元，我们需要计算折扣。请参考以下示例。\n\
    \n```\nfloat totalSpent;\nint discountThreshhold;\nint discountPercent;\n\ndiscountThreshold=30;\n\
    discountPercent=0;\ntotalSpent=calculateTotalSpent();\n\nif(totalSpent>discountThreshold)\
    \ {\n        discountPercent=10;\n}\n```\n\n让我们逐行分析这段代码。首先，我们声明变量（`totalSpent`、`discountThreshhold`和`discountPercent`）。正如我们在[第\
    \ 3 章](#Chapter03.html#ch3)中讨论的，如果数字可能包含小数，我们应该将其声明为 `float` 而不是 `int`。我们知道`discountThreshold`和`discountPercent`不会包含小数，因此我们可以将它们声明为\
    \ `int`。在这个例子中，我们假设有一个名为`calculateTotalSpent`的函数，它会计算当前订单的总消费额。然后我们简单地检查总消费额是否大于折扣阈值；如果是，我们就设置折扣百分比。还请注意，在比较不同的数值数据类型时，无需告知代码转换数据。正如我们之前提到的，这一切都由\
    \ Objective-C 处理。\n\n另一个需要比较数字的操作是循环。正如在[第 4 章](#Chapter04.html#ch4)中讨论的，循环是开发中的核心操作，许多循环类型都需要某种比较来确定何时停止。让我们看一个`for`循环的例子。\n\
    \n```\nint numberOfBooks;\nnumberOfBooks=50;\n\nfor (int y = 1; y <= numberOfBooks;\
    \ y++) {\n     doSomething();\n}\n```\n\n在这个例子中，我们遍历（即循环）书店中图书的总数。`for`语句是开始发生有趣事情的地方。让我们分解一下。\n\
    \n```\nint y=1;\n```\n\n这部分代码将`y`声明为 `int` 类型，然后为其分配一个起始值`1`。\n\n```\ny <= numberOfBooks;\n\
    ```\n\n这部分告诉计算机检查我们的计数变量`y`是否小于或等于我们商店中图书的总数。如果`y`变得大于图书数量，循环将不再运行。\n\n```\ny++\n\
    ```\n\n这部分代码每次循环运行时，将 *y* 增加`1`。"
  raw: '### Revisiting Boolean Logic


    In a previous chapter in this book, we introduced Boolean logic. Due to its prevalence
    in programming, we will revisit this subject in this chapter and go into more
    detail.  


    The most common comparison that you will program your application to perform is
    Boolean logic. Boolean logic usually comes in the form of `if` `then` statements.
    Boolean logic can have only one of two answers: yes or no. The following are some
    good examples of Boolean questions that you will use in your applications:


    *   Is 5 larger than 3?

    *   Does “now” have more than 5 letters?

    *   Is 6/1/2010 later than today?


    Notice that there are only 2 possible correct answers to these questions: yes
    and no. If you are asking a question that could have more than 2 answers, that
    question will need to be worded differently for programming.


    Each of these questions will be represented by an `if` `then` statement (for example,
    if 5 is greater than 3, then print a message to the user). Each `if` statement
    is required to have some sort of relational operator. A relational operator can
    be something like "is greater than" or "is equal to".


    In order to start using these types of questions in your programs, you will first
    need to become familiar with the different relational operators available to you
    in the C and Objective-C languages. We will cover those first. After that, we
    will look into how different variables can behave with these operators.


    ### Using Relational Operators


    Objective-C uses 6 standard relational operators. These are the standard algebraic
    operators with only one real change: in the Objective-C language, as in most other
    programming languages, the equal to operator is made by two equal signs (==).
    In [chapter 4](#Chapter04.html#ch4), [Table 4–7](#Chapter04.html#tab_4_7), we
    describe the different operators available to you as a developer.


    **NOTE:** A single equal sign (=) is used to assign a value to a variable. Two
    equal signs (==) are needed to compare two values. For example, `if(x=9)` will
    assign the value of 9 to the variable `x` and return "yes" if 9 is successfully
    assigned to x, which will be in most, if not all, of the cases. `if(x==9)` will
    actually do a comparison to see if x equals 9.


    #### Comparing Numbers


    One of the difficulties developers have had in the past was dealing with different
    data types in comparisons. Earlier in this book, we discussed the different types
    of variables. You may remember that 1 is an integer. If you wanted to compare
    an integer with a float such as 1.2, this could cause some issues. Thankfully,
    Objective-C helps us out with this. In Objective-C, you can compare any two numeric
    data types without having to typecast (typecasting is still sometimes needed when
    dealing with other data types, and we cover this later in the chapter). This allows
    you to write code without worrying about the data types that need to be compared.


    **NOTE:** Typecasting is the conversion of a number from one type to another.


    In our application, we will need to compare numbers in many ways. For example,
    let’s say that our bookstore offers a discount for people who spend over $30 in
    a single transaction. We will need to add the total amount the person is spending
    and then compare this to $30\. If the amount spent is larger than $30, we will
    need to calculate the discount. See the following example.


    `float totalSpent;`

    `int discountThreshhold;`

    `int discountPercent;`


    `discountThreshold=30;`

    `discountPercent=0;`

    `totalSpent=calculateTotalSpent();`


    `if(totalSpent>discountThreshold) {`

    `        discountPercent=10;`

    `}`


    Let’s walk through the code. First, we declare our variables (`totalSpent`, `discountThreshhold`,
    and `discountPercent`). As we discussed in [Chapter 3](#Chapter03.html#ch3), if
    the number can contain decimals, we should declare it as a float rather than as
    an int. We know that the `discountThreshold` and the `discountPercent` will not
    contain decimals, so we can declare these as ints. In this example, we assume
    that we have a function called `calculateTotalSpent,` which will calculate the
    total spent in this current order. We then simply check to see if the total spent
    is larger than the discount threshold; if it is, we set the discount percent.
    Also notice that it was not necessary to tell the code to convert the data when
    comparing the different numeric data types. As we mentioned earlier, this is all
    handled by Objective-C.


    Another action that requires the comparison of numbers is looping. As discussed
    in [Chapter 4](#Chapter04.html#ch4), looping is a core action in development and
    many loop types require some sort of comparison to determine when to stop. Let’s
    take a look at a `for` loop.


    `int numberOfBooks;`

    `numberOfBooks=50;`


    `for (int y = 1; y <= numberOfBooks; y++) {`

    `     doSomething();`

    `}`


    In this example, we iterate, or loop, through the total number of books that we
    have in the bookstore. The `for` statement is where the interesting stuff starts
    to happen. Let’s break it down.


    `int y=1;`


    This portion of the code is declaring `y` as an int and then assigning it a starting
    value of 1.


    `y <= numberOfBooks;`


    This portion is telling the computer to check to see if our counting variable
    `y` is less than or equal to the total number of books we have in our store. If
    `y` becomes larger than the number of books, the loop will no longer run.


    `y++`


    This portion of code increases *y* by 1 every time the loop is run.'
