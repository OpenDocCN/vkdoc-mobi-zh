    \ `for` 循环的例子。\n\n```\nint numberOfBooks;\nnumberOfBooks=50;\n\nfor (int y = 1;\
    \ y <= numberOfBooks; y++) {\n     doSomething();\n}\n```\n\n在这个例子中，我们遍历（即循环）书店中图书的总数。`for`\
    \ 语句是开始发生有趣事情的地方。让我们分解一下。\n\n```\nint y=1;\n```\n\n这部分代码将 `y` 声明为 `int` 类型，然后为其分配一个起始值\
    \ `1`。\n\n```\ny <= numberOfBooks;\n```\n\n这部分告诉计算机检查我们的计数变量 `y` 是否小于或等于我们商店中图书的总数。如果\
    \ `y` 变得大于图书数量，循环将不再运行。\n\n```\ny++\n```\n\n这部分代码每次循环运行时，将 *y* 增加 `1`。\n"
- fmt: "#### Creating an Example Xcode App\n\nNow let's create an Xcode application\
    \ so that we can start comparing numeric data.\n\n1.  Launch Xcode. From your\
    \ hard drive, go to `Developer`![images](images/U001.jpg)`Applications` folder.\
    \ Drag it to the Dock, as we will be using it throughout the rest of this book.\
    \ See [Figure 9–1](#Chapter09.html#fig_9_1).\n\n![images](images/0901.jpg)\n**Figure\
    \ 9–1.** *Launching Xcode*\n\n2.  Click on Create a New Xcode Project to open\
    \ a new window. On the left-hand side of that window, under iOS, select Application.\
    \ Then select Single View Application on the right hand side. Click on Next.\n\
    \n**NOTE:** The Window-Based Application is the most generic and basic of the\
    \ iOS application types.\n\n![images](images/0902.jpg)\n**Figure 9–2.** *Creating\
    \ a new project*\n\n3.  On the next page, enter the name of your application.\
    \ We used `Comparison` as the name, but you can choose any name you like. This\
    \ is also the window where you will select which device you would like to target.\
    \ We will leave it as universal for the time being. See [Figure 9–3](#Chapter09.html#fig_9_3).\n\
    \n![images](images/0903.jpg)\n**Figure 9–3.** *Selecting the Project Type and\
    \ Name*\n\n**NOTE:** Xcode projects, by default, are saved in the Documents Folder\
    \ in your user home.\n\n4.  Once the new project is created, you will see the\
    \ standard Xcode Window. Select the expand arrow next to the `Comparison` folder\
    \ to expand it. You will see two files, `ComparisonsAppDelegate.m` and `ComparisonsAppDelegate.h`.\
    \ The `.h` file is a header file and we will not be changing anything in that\
    \ file at this moment. The actual names will change depending on the name you\
    \ used when creating the project. For the purpose of these examples, we are only\
    \ going to be focusing on the `ComparisonsAppDelegate.m` file.\n5.  Double-click\
    \ on the `main.c` file and you will see the following code:\n    ```\n    #import\
    \ \"ComparisonsAppDelegate.h\"\n    @implementation TestingComparisonsAppDelegate\n\
    \    @synthesize window=_window;\n\n    - (BOOL)application:(UIApplication *)application\n\
    \        didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n       \
    \ {\n            // Override point for customization after application launch.\n\
    \            [self.window makeKeyAndVisible];\n\n    }\n    ```\n6.  At this point,\
    \ our applications will just launch and display a window. We are going to add\
    \ a little \"Hello World\" to our application. After the line `[self.window makeKeyAndVisible]`,\
    \ we need to add the following code: `NSLog(@\"Hello World\");`\n\nThis line creates\
    \ a new `NSString` with the contents \"Hello World\" and passes it to the `NSLog`\
    \ function that is used for debugging.\n\nLet's run our application to see how\
    \ it works.\n\n1.  Click on the Run button in the default toolbar.\n2.  The iOS\
    \ simulator will launch. This will just display a window. Back in Xcode, a debug\
    \ window will appear at the bottom of the screen, as shown in [Figure 9–4](#Chapter09.html#fig_9_4).\
    \ You can always toggle this window by selecting `View`![images](images/U001.jpg)`Show\
    \ Debug Area`.\n\n![images](images/0904.jpg)\n**Figure 9–4.** *Debugger Window*\n\
    \nMost of the information in this window will mean very little to you. The most\
    \ important line is the bold section that actually shows the output of your application.\
    \ The first part of the line shows the date, time, and name of the application.\
    \ The \"Hello World\" part was generated by the `NSLog` line that we added before.\n\
    \n1.  Go back to the application and open the `ComparisonsAppDelegate.m` file.\n\
    2.  Go to the beginning of the line that begins with `NSLog`. This is the line\
    \ that is responsible for printing the \"Hello World\" section. We are going to\
    \ comment out this line by placing two backslashes (`//`) in front of the line\
    \ of code. Commenting out code tells Xcode to ignore it when it builds and runs\
    \ the application. Code that is commented out will not run.\n3.  Once you comment\
    \ out the line of code, you will no longer see the line in bold if you run the\
    \ program, because the application is no longer outputting any line.\n4.  In order\
    \ for the application to output the results of our comparisons, we will have to\
    \ add one line. `NSLog(@\"The result is %@\", (6>5 ? @\"True\" : @\"False\"));`\n\
    \n**NOTE:** The above code `(6>5 ? @\"True\" : @\"False\")` is called a Ternary\
    \ operation. It is essentially just a simplified way of writing an If/Then statement.\n\
    \n5.  Place this line into your code. This line is telling your application to\
    \ print out \"The result is.\" Then it will print \"True\" if 6 is greater than\
    \ 5, or \"False\" if 5 is greater than 6.\n\nBecause 6 is greater than 5, it will\
    \ print out `True`.\n\nYou can change this line to test any of the examples we\
    \ have put together thus far in this chapter, or any of the examples we will do\
    \ further on.\n\nLet's try another example.\n\n```\nint i=5;\nint y=6;\nNSLog(@\"\
    The result is %@\", (y>i ? @\"True\" : @\"False\"));\n```\n\nIn this example,\
    \ we created an integer and assigned its value to 5. We then created another variable\
    \ and assigned the value to 6. We then changed the `NSLog` example to compare\
    \ the variables `i` and `y` instead of using actual numbers. When you run this\
    \ example, you will get the following result:\n\n![images](images/0904a.jpg)\n\
    **Figure 9–4.** *NSLog output*\n\nWe will now explore other kinds of comparisons,\
    \ and then we will come back to our application and test some of them.\n\n###\
    \ Using Boolean Expressions\n\nA Boolean expression is the easiest of all comparisons.\
    \ Boolean expressions are used to determine if a value is true or false. False\
    \ is defined as 0 and true as non-zero. For example:\n\n```\nint j;\nj=5;\nif(j)\
    \ {\n        some_code();\n}\n```\n\nThe `if` statement will always evaluate to\
    \ `true` because our variable `j` is not equal to zero or null. Because of that,\
    \ our program will run the `some_code()` method.\n\n```\nint j;\nj=0;\nif(j) {\n\
    \        some_code();\n}\n```\n\nIf we change the value of `j`, the statement\
    \ will evaluate to `false`, because `j` is now 0. This can be used with `BOOL`\
    \ and number variables.\n\n```\nint j;\nj=0;\nif(!j) {\n        some_code();\n\
    }\n```\n\nPlacing an exclamation point in front of a Boolean expression will change\
    \ it to the opposite value (a `false` becomes a `true` and a `true` becomes a\
    \ `false`). This line now asks \"if not `j`,\" which, in this case, is `true`\
    \ because `j` is equal to 0. This is an example of using an integer to act as\
    \ a Boolean variable. As we discussed earlier, Objective C also has variables\
    \ called `BOOL` that have only two possible values: `YES` or `NO`.\n\n**NOTE:**\
    \ Many programming languages use the terms `TRUE` and `FALSE` instead of `YES`\
    \ and `NO` used by Objective C. When Objective C was developed, the C language\
    \ did not have true Boolean variables.\n\nLet's look at an example related to\
    \ the bookstore. We have a frequent buyer's club that entitles all members to\
    \ a 15% discount on all books that they purchase. This is easy to check. We simply\
    \ set the variable `clubMember` to `YES` if they are a member and `NO` if they\
    \ are not. The following code will apply the discount only to club members:\n\n\
    ```\nint discountPercent;\nBOOL clubMember;\n\nclubMember=FALSE;\ndiscountPercent=0;\n\
    if(clubMember) {\n        discountPercent=15;\n}\n```"
