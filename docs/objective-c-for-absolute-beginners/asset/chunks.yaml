    Sea\";\nbookTitle=@\"2000 Leagues Under the Sea\";\n\nif([bookTitle rangeOfString:searchTitle].location\
    \ !=NSNotFound) {\n        addToResults();\n}\n```\n\nThis code is very similar\
    \ to other examples we have examined. This example takes a search term and checks\
    \ to see if the book title has that same search term in it. If it does, it adds\
    \ the book to the results. This can be adapted to allow users to search for specific\
    \ terms in book titles, authors, or even descriptions.\n\n**NOTE:** All string\
    \ searches are case sensitive by default. If you want to search inside of a string,\
    \ regardless of the case, you can change the preceding call from:\n\n`[bookTitle\
    \ rangeOfString: searchTitle]`\n\nto:\n\n`[bookTitle rangeOfString: searchTitle\
    \ options:NSCaseInsensitiveSearch]`\n\nFor a complete listing of the methods supported\
    \ by `NSString`, see the Apple documentation at [`http://developer.apple.com/mac/library/documentation/cocoa/reference/Foundation/Classes/NSString_Class/Reference/NSString.html`](http://developer.apple.com/mac/library/documentation/cocoa/reference/Foundation/Classes/NSString_Class/Reference/NSString.html)."
  raw: '#### Comparing Strings


    Strings are a very difficult data type for most C languages. In ANSI C (or standard
    C), a string is just an array of characters. Objective-C has taken the development
    of the string even further and made it an object called the `NSString`.  Many
    more properties and methods are available to us when working with an object. Fortunately
    for us, `NSString` has many methods for comparing data, which makes our job much
    easier.


    While developing for the Mac and the iPhone, you will be able to use both `NSString`s
    and standard C strings. For the purposes of this book, we will be focusing on
    comparing the `NSString` objects. If you have C type strings in your application,
    they will need to be converted to `NSString`s in order to use to code included
    in this book. Fortunately for us, this conversion is very simple.


    `char *myCString;`

    `NSString *myNsstring;`


    `myCString = "testing a string";`

    `myNsstring = [NSString stringWithUTF8String: myCString];`


    The first two lines are code you have seen before. They are your variable declarations.
    You are declaring a standard C string called `myCString` and a `NSString` called
    `myNsstring`. The third line is just a simple initiation of your standard C string.
    We are assigning a value to it.


    The last line is where everything happens. You are assigning your `NSString` object
    to be equal to creating a new `NSString` object, with the value coming from a
    `UTF8string` and passing it to the standard C string that we created. Once you
    have all of your standard C strings as `NSString`s, we can take advantage of the
    powerful comparison features provided to us by the class.


    Let’s look at another example. Here, we will compare passwords to see if we should
    allow a user to log in.


    `NSString *enteredPassword, *myPassword;`


    `myPassword=@"duck";`

    `enteredPassword=@"Duck";`

    `bool continueLogin=NO;`


    `if([enteredPassword isEqualToString:myPassword]) {`

    `        continueLogin=YES;`

    `}`


    The first line just declares two `NSString`s. The next two lines initialize the
    strings. Remember, before you use any objects, they need to be initialized. In
    your actual code, you will need to get the `enteredPassword` string from the user.
    These lines use a shortcut. Notice the @ symbol before the C style string. The
    @ symbol creates a new `NSString` from the C style string that follows it.


    The next line is the part of the code that actually does the work. We are sending
    a message to the `enteredPassword` object asking it if it is equal to the `myPassword`
    string. The method always needs to have an `NSString` passed to it. The example
    code will always be `false`, because of the capital on the `enteredPassword` versus
    the lowercase on the `myPassword`.


    **NOTE:** If you need to compare two NSStrings, regardless of case, you would
    simply use the `caseInsensitiveCompare` method instead of the `isEqualToString`.


    There are many other different comparisons you might have to perform on strings.
    For example, you may want to check the length of a certain string. This is easily
    done.


    `NSString *enteredPassword;`

    `NSString *myPassword;`

    `myPassword=@"duck";`

    `enteredPassword=@"Duck";`

    `bool continueLogin=NO;`


    `if([enteredPassword length] > 5) {`

    `        continueLogin=YES;`

    `}`


    This code checks to see if the entered password is longer than 5 characters.


    There will be other times when you will have to search within a string for some
    data. Fortunately, Objective-C makes this very easy to do. `NSString` provides
    us with a function called `rangeOfString`, which allows you to search within a
    string for another string. The function `rangeOfString` only takes one argument,
    which is the string for which you are searching.


    `NSString *searchTitle, *bookTitle;`

    `searchTitle=@"Sea";`

    `bookTitle=@"2000 Leagues Under the Sea";`


    `if([bookTitle rangeOfString:searchTitle].location !=NSNotFound) {`

    `        addToResults();`

    `}`


    This code is very similar to other examples we have examined. This example takes
    a search term and checks to see if the book title has that same search term in
    it. If it does, it adds the book to the results. This can be adapted to allow
    users to search for specific terms in book titles, authors, or even descriptions.


    **NOTE:** All string searches are case sensitive by default. If you want to search
    inside of a string, regardless of the case, you can change the preceding call
    from:


    `[bookTitle rangeOfString:` searchTitle]


    to:


    `[bookTitle rangeOfString:` searchTitle `options:NSCaseInsensitiveSearch]`


    For a complete listing of the methods supported by `NSString`, see the Apple documentation
    at [`http://developer.apple.com/mac/library/documentation/cocoa/ reference/Foundation/Classes/NSString_Class/Reference/NSString.html`](http://developer.apple.com/mac/library/documentation/cocoa/reference/Foundation/Classes/NSString_Class/Reference/NSString.html)`.`'
  trans: "\n### 比较字符串\n\n对于大多数 C 语言来说，字符串是一种非常棘手的数据类型。在 ANSI C（或标准 C）中，字符串仅仅是一个字符数组。而\
    \ Objective-C 则进一步推动了字符串的发展，将其转化成一个名为`NSString`的对象。当我们使用对象时，可以调用更多的属性和方法。幸运的是，`NSString`提供了许多用于比较数据的方法，这大大简化了我们的工作。\n\
    \n在为 Mac 和 iPhone 进行开发时，你既能使用`NSString`，也能使用标准的 C 字符串。在本书的范围内，我们将重点放在比较`NSString`对象上。如果你的应用程序中包含\
    \ C 类型的字符串，则需要将它们转换为`NSString`，才能使用本书中的代码。幸运的是，这种转换非常简单。\n\n```\nchar *myCString;\n\
    NSString *myNsstring;\n\nmyCString = \"testing a string\";\nmyNsstring = [NSString\
    \ stringWithUTF8String: myCString];\n```\n\n前两行是你之前见过的代码，是变量声明。你声明了一个名为`myCString`的标准\
    \ C 字符串，以及一个名为`myNsstring`的`NSString`。第三行只是对标准 C 字符串的简单初始化，我们为其赋值。\n\n最后一行是关键所在。我们将`NSString`对象赋值为一个新创建的`NSString`对象，该对象的值来源于一个`UTF8string`，并将其传递给已创建的标准\
    \ C 字符串。一旦你将所有标准 C 字符串都转换为`NSString`，就能充分利用该类提供的强大比较功能。\n\n让我们看另一个示例。这里，我们将比较密码，以判断是否允许用户登录。\n\
    \n```\nNSString *enteredPassword, *myPassword;\n\nmyPassword=@\"duck\";\nenteredPassword=@\"\
    Duck\";\nbool continueLogin=NO;\n\nif([enteredPassword isEqualToString:myPassword])\
    \ {\n        continueLogin=YES;\n}\n```\n\n第一行声明了两个`NSString`变量。接下来两行初始化了这些字符串。请记住，在使用任何对象之前，都需要先初始化它们。在实际代码中，你需要从用户那里获取`enteredPassword`字符串。这几行代码使用了一种快捷方式。请注意\
    \ C 风格字符串前的`@`符号。`@`符号会根据其后的 C 风格字符串创建一个新的`NSString`。\n\n下一行是实际完成工作的代码部分。我们向`enteredPassword`对象发送了一条消息，询问它是否与`myPassword`字符串相等。该方法始终需要传入一个`NSString`对象。这段示例代码的结果始终为`false`，因为`enteredPassword`中包含大写字母，而`myPassword`中都是小写字母。\n\
    \n**注意：** 如果你需要比较两个`NSString`而忽略大小写，只需使用`caseInsensitiveCompare`方法，而不是`isEqualToString`。\n\
    \n你还可能需要对字符串执行许多其他不同的比较操作。例如，你可能想要检查某个字符串的长度。这很容易实现。\n\n```\nNSString *enteredPassword;\n\
    NSString *myPassword;\nmyPassword=@\"duck\";\nenteredPassword=@\"Duck\";\nbool\
    \ continueLogin=NO;\n\nif([enteredPassword length] > 5) {\n        continueLogin=YES;\n\
    }\n```\n\n这段代码会检查输入的密码长度是否大于 5 个字符。\n\n其他时候，你可能需要在一个字符串中搜索某些数据。幸运的是，Objective-C\
    \ 让这件事变得非常简单。`NSString`提供了一个名为`rangeOfString`的函数，允许你在一个字符串中搜索另一个字符串。`rangeOfString`函数只接受一个参数，即你要搜索的字符串。\n\
    \n```\nNSString *searchTitle, *bookTitle;\nsearchTitle=@\"Sea\";\nbookTitle=@\"\
    2000 Leagues Under the Sea\";\n\nif([bookTitle rangeOfString:searchTitle].location\
    \ !=NSNotFound) {\n        addToResults();\n}\n```\n\n这段代码与我们之前检查过的其他示例非常相似。此示例接受一个搜索词，并检查书名中是否包含该搜索词。如果包含，则将该书添加到结果中。这可以进行调整，允许用户在书名、作者甚至描述中搜索特定词条。\n\
    \n**注意：** 默认情况下，所有字符串搜索都是区分大小写的。如果你想在字符串内搜索而忽略大小写，可以将前面的调用：\n\n`[bookTitle rangeOfString:\
    \ searchTitle]`\n\n改为：\n\n`[bookTitle rangeOfString: searchTitle options:NSCaseInsensitiveSearch]`\n\
    \n有关`NSString`支持的方法的完整列表，请参阅苹果文档：[`http://developer.apple.com/mac/library/documentation/cocoa/reference/Foundation/Classes/NSString_Class/Reference/NSString.html`](http://developer.apple.com/mac/library/documentation/cocoa/reference/Foundation/Classes/NSString_Class/Reference/NSString.html)。\n"
- fmt: "### Comparing Dates\n\nDates are a fairly complicated variable type in any\
    \ language and, unfortunately, depending on the type of application you are writing,\
    \ they are very common. Objective-C previously used the `NSCalendarDate` class,\
    \ but recently it has been replaced with a more up-to-date `NSDate`. The new `NSDate`\
    \ has a lot of nice methods that make comparing dates easy. We will focus on the\
    \ `compare` function. The `compare` function returns an `NSComparisonResult`,\
    \ which has three possible values: `NSOrderedSame`, `NSOrderedDescending`, `NSOrderedAscending`.\n\
    \n```\nNSDate *today = [NSDate date];\n\n//Sale Date as of 12/4/2011\nNSDate *saleDate\
    \ = [NSDate dateWithString:@\"2011-12–04 04:00:00 -0700\"];\n\nNSComparisonResult\
    \ result;\nbool saleStarted;\n\nresult=[today compare:saleDate];\n\n        if(result==NSOrderedAscending)\
    \ {\n                //Sale Date is in the future\n                saleStarted=NO;\n\
    \        } else if(result==NSOrderedDescending) {\n                //Sale Date\
    \ is in the past\n                saleStarted=YES;\n        } else {\n       \
    \         //Sale Date and Today are the same\n                saleStarted=YES;\n\
    \        }\n```\n\nThis may seem like a lot of work just to compare some dates.\
    \ Let’s walk through the code and see if we can make sense of it.\n\n`NSDate *today\
    \ = [NSDate date];`\n`NSDate *saleDate = [NSDate dateWithString:@\"2011-09–04\
    \ 04:00:00 -0700\"];`\n\nHere, we declare two different `NSDate` objects. The\
    \ first one, named `today`, is initialized with the system date or your computer\
    \ or iPad date. The second one, named `saleDate`, is initialized with a date some\
    \ time in the future. We will use this date to see if this sale has begun. We\
    \ will not go into detail about the initialization of `NSDate`s, but they can\
    \ be initialized using the `dateWithString` function similar to what we showed\
    \ previously.\n\n**NOTE:** In most programming languages, dates are dealt with\
    \ in a very specific pattern. They usually start out with the 4 digit year followed\
    \ by a hyphen, then a two digit month followed by a hyphen, then a 2 digit day.\
    \ If you are using a data format with a time, these data are usually presented\
    \ in a similar manner. Times are usually presented with the hour, minute, and\
    \ second, each separated by a colon. Objective C also has time zone support. The\
    \ “-0700” tells Objective C that the time is 7 hours less than Greenwich Mean\
    \ time or Mountain Standard Time.\n\n`NSComparisonResult result;`\n\nThe results\
    \ of using the `compare` function of an `NSDate` object is an `NSComparisonResult`.\
    \ We have to declare an `NSComparisonResult` to capture the output from the `compare`\
    \ function.\n\n`result=[today compare:saleDate];`\n\nThis simple line runs the\
    \ comparison of the two dates. It places the resulting `NSComparisonResult` into\
    \ the variable called `result`.\n\n```\nif(result==NSOrderedAscending) {\n//Sale\
    \ Date is in the future\n        saleStarted=NO;\n} else if(result=NSOrderedDescending)\
    \ {\n//Sale Date is in the past\n        saleStarted=YES;\n} else {\n//Sale Date\
    \ and Today are the same\n        saleStarted=YES;\n}\n```\n\nNow we need to find\
    \ out what value is in the variable `result`. In order to accomplish this, we\
    \ perform an `if` statement that compares the result to the three different options\
    \ for the `NSComparisonResult`. The first line finds out if the sale date is greater\
    \ than today’s date. This means that the sale date is in the future, and thus\
    \ the sale has not started. We then set the variable `saleStarted` to `No`. The\
    \ next line finds out whether the sale date is less than today. If it is, then\
    \ the sale has started and we set the `saleStarted` variable to `Yes`. The next\
    \ line just says `else`. This captures all other options. We know, though, that\
    \ the only other option is `NSOrderedSame`. This means that the two dates are\
    \ exactly the same, and thus the sale is just beginning.\n\nThere are other methods\
    \ that you can use to compare `NSDate` objects. Each of these methods will be\
    \ more efficient at certain tasks. We have chosen the `compare` method because\
    \ it will handle most of your basic date comparison needs.\n\n**NOTE:** Remember\
    \ that an `NSDate` holds both a date and a time. This can affect your comparisons\
    \ with dates as it not only compares the date but the time.\n\n### Combining Comparisons\n\
    \nAs we discussed in [Chapter 4](#Chapter04.html#ch4), sometimes something more\
    \ complex than a single comparison is needed. This is where logical operators\
    \ come in. Logical operators enable you to check for more than one different requirement.\
    \ For example, if we have a special discount for people who are members of our\
    \ book club and who spend over $30, we can write one statement to check this.\n\
    \n```\nfloat totalSpent;\n int discountThreshhold;\nint discountPercent;\nBOOL\
    \ clubMember = TRUE;\n\ndiscountThreshhold=30;\ndiscountPercent=0;\ntotalSpent=calculateTotalSpent();\n\
    \nif(totalSpent > discountThreshhold && clubMember) {\n        discountPercent=15;\n\
    }\n```\n\nWe have combined two of the examples from above. The new comparison\
    \ line reads as follows: If `totalSpent` is greater than `discountThreshold` AND\
    \ `clubMember` is `true`, then we set the `discountPercent` to 15. In order for\
    \ this to return `True`, both items need to be true. `||` can be used instead\
    \ of `&&` to signify “or.” We can change the line above to this:\n\n```\nif(totalSpent>\
    \ discountThreshhold|| clubMember) {\n        discountPercent=15;\n}\n```\n\n\
    Now this reads: If `totalSpent` is greater than `discountThreshold` **OR** `clubMember`\
    \ is `true`, then set the discount percent. This will return `True` if either\
    \ of the options is `true`.\n\nYou can continue to use the logical operations\
    \ to string as many comparisons together as you need. In some cases, you may need\
    \ to group comparisons together using parentheses. This can be more complicated\
    \ and is beyond the scope of this book."
  raw: '#### Comparing Dates


    Dates are a fairly complicated variable type in any language and, unfortunately,
    depending on the type of application you are writing, they are very common. Objective-C
    previously used the `NSCalendarDate` class, but recently it has been replaced
    with a more up-to-date `NSDate`. The new `NSDate` has a lot of nice methods that
    make comparing dates easy. We will focus on the compare function. The compare
    function returns an `NSComparisonResult`, which has three possible values: `NSOrderedSame`,
    `NSOrderedDescending`, `NSOrderedAscending`.


    `NSDate *today = [NSDate date];`


    `//Sale Date as of 12/4/2011`

    `NSDate *saleDate = [NSDate dateWithString:@"2011-12–04 04:00:00 -0700"];`


    `NSComparisonResult result;`

    `bool saleStarted;`


    `result=[today compare:saleDate];`


    `        if(result==NSOrderedAscending) {`

    `                //Sale Date is in the future`

    `                saleStarted=NO;`

    `        } else if(result==NSOrderedDescending) {`

    `                //Sale Date is in the past`

    `                saleStarted=YES;`

    `        } else {`

    `                //Sale Date and Today are the same`

    `                saleStarted=YES;`

    `        }`


    This may seem like a lot of work just to compare some dates. Let’s walk through
    the code and see if we can make sense of it.


    `NSDate *today = [NSDate date];`

    `NSDate *saleDate = [NSDate dateWithString:@"2011-09–04 04:00:00 -0700"];`


    Here, we declare two different `NSDate` objects. The first one, named `today`,
    is initialized with the system date or your computer or iPad date. The second
    one, named `saleDate`, is initialized with a date some time in the future. We
    will use this date to see if this sale has begun. We will not go into detail about
    the initialization of `NSDates`, but they can be initialized using the `dateWithString`
    function similar to what we showed previously.


    **NOTE:** In most programming languages, dates are dealt with in a very specific
    pattern. They usually start out with the 4 digit year followed by a hyphen, then
    a two digit month followed by a hyphen, then a 2 digit day. If you are using a
    data format with a time, these data are usually presented in a similar manner.
    Times are usually presented with the hour, minute, and second, each separated
    by a colon. Objective C also has time zone support. The “-0700” tells Objective
    C that the time is 7 hours less than Greenwich Mean time or Mountain Standard
    Time.


    `NSComparisonResult result;`


    The results of using the compare function of an `NSDate` object is an `NSComparisonResult`.
    We have to declare an `NSComparisonResult` to capture the output from the compare
    function.


    `result=[today compare:saleDate];`


    This simple line runs the comparison of the two dates. It places the resulting
    `NSComparisonResult` into the variable called result.


    `if(result==NSOrderedAscending) {`

    `//Sale Date is in the future`

    `        saleStarted=NO;`

    `} else if(result=NSOrderedDescending) {`

    `//Sale Date is in the past`

    `        saleStarted=YES;`

    `} else {`

    `//Sale Date and Today are the same`

    `        saleStarted=YES;`

    `}`


    Now we need to find out what value is in the variable `result`. In order to accomplish
    this, we perform an `if` statement that compares the result to the three different
    options for the `NSComparisonResult`. The first line finds out if the sale date
    is greater than today’s date. This means that the sale date is in the future,
    and thus the sale has not started. We then set the variable `saleStarted` to `No`.
    The next line finds out whether the sale date is less than today. If it is, then
    the sale has started and we set the `saleStarted` variable to `Yes`. The next
    line just says `else`. This captures all other options. We know, though, that
    the only other option is `NSOrderedSame`. This means that the two dates are exactly
    the same, and thus the sale is just beginning.


    There are other methods that you can use to compare `NSDate` objects. Each of
    these methods will be more efficient at certain tasks. We have chosen the compare
    method because it will handle most of your basic date comparison needs.


    **NOTE:** Remember that an `NSDate` holds both a date and a time. This can affect
    your comparisons with dates as it not only compares the date but the time.


    #### Combining Comparisons


    As we discussed in [Chapter 4](#Chapter04.html#ch4), sometimes something more
    complex than a single comparison is needed. This is where logical operators come
    in. Logical operators enable you to check for more than one different requirement.
    For example, if we have a special discount for people who are members of our book
    club and who spend over $30, we can write one statement to check this.


    `float totalSpent;`

    ` int discountThreshhold;`

    `int discountPercent;`

    `BOOL clubMember = TRUE;`


    `discountThreshhold=30;`

    `discountPercent=0;`

    `totalSpent=calculateTotalSpent();`


    `if(totalSpent > discountThreshhold && clubMember) {`

    `        discountPercent=15;`

    `}`


    We have combined two of the examples from above. The new comparison line reads
    as follows: If `totalSpent` is greater than `discountThreshold` AND `clubMember`
    is `true`, then we set the `discountPercent` to 15. In order for this to return
    `True`, both items need to be true. `||` can be used instead of `&&` to signify
    “or.” We can change the line above to this:


    `if(totalSpent> discountThreshhold|| clubMember) {`

    `        discountPercent=15;`

    `}`


    Now this reads: If `totalSpent` is greater than `discountThreshold` **OR** `clubMember`
    is `true`, then set the discount percent. This will return `True` if either of
    the options is `true`.


    You can continue to use the logical operations to string as many comparisons together
    as you need. In some cases, you may need to group comparisons together using parentheses.
    This can be more complicated and is beyond the scope of this book.'
  trans: "\n### 比较日期\n\n在任何编程语言中，日期都是一种相当复杂的变量类型，而不幸的是，根据你编写的应用程序类型，它们又非常常见。Objective-C\
    \ 以前使用 `NSCalendarDate` 类，但最近已被更新式的 `NSDate` 所取代。新的 `NSDate` 包含许多便捷方法，使得日期比较变得简单。我们将重点介绍\
    \ `compare` 函数。`compare` 函数返回一个 `NSComparisonResult` 类型，该类型有三个可能的值：`NSOrderedSame`、`NSOrderedDescending`、`NSOrderedAscending`。\n\
    \n```\nNSDate *today = [NSDate date];\n\n//促销日期为 2011/12/4\nNSDate *saleDate =\
    \ [NSDate dateWithString:@\"2011-12–04 04:00:00 -0700\"];\n\nNSComparisonResult\
    \ result;\nbool saleStarted;\n\nresult=[today compare:saleDate];\n\n        if(result==NSOrderedAscending)\
    \ {\n                //促销日期在未来\n                saleStarted=NO;\n        } else\
    \ if(result==NSOrderedDescending) {\n                //促销日期已过去\n             \
    \   saleStarted=YES;\n        } else {\n                //促销日期与今日相同\n        \
    \        saleStarted=YES;\n        }\n```\n\n这看起来好像只是为了比较日期而做了大量工作。让我们逐步分析这段代码，看看能否理解其含义。\n\
    \n`NSDate *today = [NSDate date];`\n`NSDate *saleDate = [NSDate dateWithString:@\"\
    2011-09–04 04:00:00 -0700\"];`\n\n这里，我们声明了两个不同的 `NSDate` 对象。第一个名为 `today`，用系统日期（即你的电脑或\
    \ iPad 日期）进行初始化。第二个名为 `saleDate`，用未来的某个日期进行初始化。我们将使用这个日期来判断促销是否已经开始。我们不会详细讨论 `NSDate`\
    \ 的初始化细节，但它可以使用 `dateWithString` 函数进行初始化，就像我们前面展示的那样。\n\n**注意：** 在大多数编程语言中，日期都按照特定的格式处理。通常以四位数的年份开头，后跟连字符，然后是两位数的月份，再跟连字符，最后是两位数的日期。如果您使用带时间的数据格式，这些数据的呈现方式通常也类似。时间通常以小时、分钟和秒的形式呈现，各部分之间用冒号分隔。Objective-C\
    \ 也支持时区。“-0700”告诉 Objective-C 该时间比格林威治标准时间（即山地标准时间）早 7 小时。\n\n`NSComparisonResult\
    \ result;`\n\n使用 `NSDate` 对象的 `compare` 函数的结果是一个 `NSComparisonResult` 类型。我们必须声明一个\
    \ `NSComparisonResult` 变量来捕获 `compare` 函数的输出。\n\n`result=[today compare:saleDate];`\n\
    \n这一行代码执行了两个日期的比较。它将结果 `NSComparisonResult` 存储到名为 `result` 的变量中。\n\n```\nif(result==NSOrderedAscending)\
    \ {\n//促销日期在未来\n        saleStarted=NO;\n} else if(result==NSOrderedDescending)\
    \ {\n//促销日期已过去\n        saleStarted=YES;\n} else {\n//促销日期与今日相同\n        saleStarted=YES;\n\
    }\n```\n\n现在我们需要找出变量 `result` 中的值。为此，我们执行一条 `if` 语句，将该结果与 `NSComparisonResult`\
    \ 的三个不同选项进行比较。第一行判断促销日期是否大于今天的日期。这意味着促销日期在未来，因此促销尚未开始。我们将变量 `saleStarted` 设置为\
    \ `No`。下一行判断促销日期是否小于今天的日期。如果是，则促销已经开始，我们将 `saleStarted` 变量设置为 `Yes`。再下一行是 `else`。它涵盖了所有其他情况。不过我们知道，唯一剩下的情况是\
    \ `NSOrderedSame`。这意味着两个日期完全相同，因此促销刚开始。\n\n还有其他方法可用于比较 `NSDate` 对象。每种方法在某些特定任务中会更高效。我们选择了\
    \ `compare` 方法，因为它能处理大部分基本的日期比较需求。\n\n**注意：** 请记住，`NSDate` 同时包含日期和时间。这会影响你的日期比较，因为它不仅会比较日期，还会比较时间。\n\
    \n### 组合比较\n\n正如我们在第 4 章中讨论的，有时需要比单一比较更复杂的逻辑。这时就需要用到逻辑运算符。逻辑运算符使你能够同时检查多个不同的条件。例如，如果我们的图书俱乐部会员消费超过\
    \ 30 美元时享有特别折扣，我们可以写一条语句来检查。\n\n```\nfloat totalSpent;\n int discountThreshhold;\n\
    int discountPercent;\nBOOL clubMember = TRUE;\n\ndiscountThreshhold=30;\ndiscountPercent=0;\n\
    totalSpent=calculateTotalSpent();\n\nif(totalSpent > discountThreshhold && clubMember)\
    \ {\n        discountPercent=15;\n}\n```\n\n我们结合了上面的两个示例。新的比较行解读如下：如果 `totalSpent`\
    \ 大于 `discountThreshold` **并且** `clubMember` 为 `true`，则将 `discountPercent` 设置为\
    \ 15。要使此条件返回 `True`，两个条件都必须为真。可以使用 `||` 代替 `&&` 来表示“或”。我们可以将上面这行代码改为：\n\n```\n\
    if(totalSpent> discountThreshhold|| clubMember) {\n        discountPercent=15;\n\
    }\n```\n\n现在这行代码解读为：如果 `totalSpent` 大于 `discountThreshold` **或** `clubMember`\
    \ 为 `true`，则设置折扣百分比。如果任意一个条件为 `true`，此条件将返回 `True`。\n\n你可以继续使用逻辑运算符，根据需求将任意数量的比较串联起来。在某些情况下，你可能需要使用括号将比较条件分组。这可能更复杂，超出了本书的讨论范围。\n"
- fmt: "### Using the Switch Statement\n\nUp to this point, we’ve had several example\
    \ of comparing data by simply using the `if` statement and/or the `if`/`else`\
    \ statements.\n\n```\nif (some_value == SOME_CONSTANT) {\n    ...\n} else if (some_value\
    \ == SOME_OTHER_CONSTANT) {\n    ...\n} else if (some_value == YET_SOME_OTHER_CONSTANT)\
    \ {\n    ...\n}\n```\n\nIf you need to compare a specific ordinal type to several\
    \ constant values, you can use a different method that can simplify the comparison\
    \ code: the `switch` statement.\n\n**NOTE:** An ordinal type is a built-in C data\
    \ type that can be ordered. Examples are `int`, `long`, `char`, `BOOL`.\n\nThe\
    \ `switch` statement allows the comparison of one or more constant values against\
    \ the ordinal data type. This is important to understand. The `switch` statement\
    \ does not allow the comparison of the ordinal type to a variable. Here is an\
    \ example of a proper `switch` statement:\n\n```\nchar value;\nvalue = 'd';\n\n\
    switch (value) {        // The switch statement followed by a begin brace\ncase\
    \ 'a':       // Equivalent to if (value == 'a')\n   ...                  // Call\
    \ functions and put any other statements here after the case.\n   ...\nbreak;\
    \                  // This indicates that this is the end of the \"case 'a':\"\
    \ statement.\ncase 'b':\n    ...\n    ...\nbreak;\ncase 'c':       // If there\
    \ is a case without a break, the program continues to execute.\ncase 'd':    \
    \           //  So, in this case, if value is a 'c' or a 'd', this code will be\
    \ executed.\n    ...\n    ...\nbreak;\ndefault:                 // Default is\
    \ optional and is only used if there is no case statement\n   ...            \
    \  // for 'value'. So, if value was equal to 'x', the default part of the switch\n\
    \   ...          // statement will be executed since there is no \"case 'x':\"\
    \ present.\nbreak;\n}  // End of the switch statement.\n```\n\nThe `switch` statement\
    \ is very powerful, and it simplifies and streamlines comparisons of an ordinal\
    \ type to several possible constants. That said, this is also the limiting factor\
    \ of the `switch` statement. It is not possible, for example, to use the `switch`\
    \ statement to compare an `NSString` variable to a series of string constants.\
    \ This is because an `NSString` value is not an ordinal type. The `switch` statement\
    \ also must compare an ordinal type to a constant. Therefore, it is not possible\
    \ to write:\n\n```\nswitch (value) {\ncase variable: //case must be a constant,\
    \ not a variable.\n   ...\nbreak;\n```\n\nWhile it does seem that these are severe\
    \ limitations to the `switch` statement, the `switch` statement is still a very\
    \ powerful statement that can be used to simplify certain `if`/`else` statements.\n\
    \n### Summary\n\nWe’ve reached the end of the chapter! Here is a summary of the\
    \ things that were covered.\n\n*   **Comparisons**\n    *   Comparing data is\
    \ an integral part of any application.\n*   **Relational operators**\n    *  \
    \ You learned about the six standard relational operators and how each is used.\n\
    *   **Integers**\n    *   Integers are the easiest pieces of information to compare.\
    \ You learned how comparison of integers will be used in your programs and how\
    \ to implement it.\n*   **Example**\n    *   You created a sample application\
    \ where you could test your comparisons and make sure that you are correct in\
    \ your logic.\n    *   You learned how to change the application to add different\
    \ types of comparisons.\n*   **Boolean**\n    *   You learned how to check Boolean\
    \ values.\n*   **Strings**\n    *   You learned how strings behave differently\
    \ from other pieces of information you have tested. You learned some of the pitfalls\
    \ of comparing strings.\n*   **Objects**\n    *   You learned how difficult it\
    \ can be to compare objects and that care must be taken to make sure you are getting\
    \ the response you desire.\n\n### Exercises\n\n*   Modify the example application\
    \ to compare some string information. This can either be in the form of a variable\
    \ or a literal.\n*   Create a loop in your application to display a number using\
    \ the methods you learned in the Boolean portion of the chapter.\n*   Write an\
    \ Objective-C app that determines if the following years are leap years: 1800,\
    \ 1801, 1899, 1900, 2000, 2001, 2003, and 2010\\. Output should be written to\
    \ the console in the following format: “The year 2000 is a leap year,” or “The\
    \ year 2001 is not a leap year.”\n\n## Chapter 10\n\n## Creating User Interfaces\n\
    \nInterface Builder is an application that enables iPhone/iPad and Mac developers\
    \ to easily create their user interfaces using a powerful graphical user interface.\
    \ It provides the ability to build user interfaces by simply dragging objects\
    \ from Interface Builder’s library to your app’s user interface.\n\nInterface\
    \ Builder stores your user interface design in one or more resource files, called\
    \ XIBs. These resource files are set to interface objects and their relationships.\
    \ Changes that you make with your user interface are automatically synchronized\
    \ with Xcode.\n\nTo build a user interface, simply drag objects from Interface\
    \ Builder’s Library Pane onto your view. Actions and Outlets are two key components\
    \ of Interface Builder that help us streamline the development processes.\n\n\
    **Actions** that our objects trigged in our views are connected to our methods\
    \ in the app’s code. **Outlets** (pointers) declared in our object’s interface\
    \ file are connected to specific instance variables. See [Figure 10–1](#Chapter10.html#fig_10_1).\n\
    \n**NOTE:** Interface Builder was once a stand-alone application that developers\
    \ used to design their user interfaces. Starting with Xcode 4.0, Apple integrated\
    \ Interface Builder within Xcode.\n\n![images](images/1001.jpg)\n\n**Figure 10–1.**\
    \ *Interface Builder*\n\n### Understanding Interface Builder\n\nThe operating\
    \ system is responsible for the memory management of the objects it creates for\
    \ iPhone and iPad apps. This relieves the developer of having to allocate memory\
    \ if the developer used Interface Builder to create the object.\n\nInterface Builder\
    \ saves the user interface file as a bundle that contains the interface objects\
    \ and relationships used in the application. These bundles had the file extension\
    \ “.NIB”. With version 3.0 of Interface Builder, a new XML file format was used\
    \ and the file extension changed to “.XIB”. However, developers still call these\
    \ files “NIB” files when saying or referring to the file name.\n\nUnlike most\
    \ other graphical user interface applications, NIBs are often referred to as freeze-dried\
    \ because they contain the archived objects themselves and are ready to run.\n\
    \nThe XML file format is used to facilitate storage with source control systems\
    \ like Subversion and Git.\n\nIn the next section, we’ll discuss an app design\
    \ pattern called Model-View-Controller. This design pattern enables developers\
    \ to more easily maintain code and reuse objects over the life of an app."
