  trans: '

    # Xcode 调试器介绍


    `Xcode` 非常出色！这款工具不仅可以在苹果开发者网站上免费获取，而且实际上真的非常、非常棒！除了能够用来创建下一款出色的 Mac OS X、iPhone
    或 iPad 应用之外，`Xcode` 还内置了一个功能强大的调试器。


    那么，调试器到底是什么呢？首先，我们要明确一点：程序会*严格*按照编写的内容执行。有时，程序实际所写的功能与预期应实现的功能并不完全一致。这有时会导致程序崩溃，或者仅仅是无法按预期运行。无论哪种情况，当程序无法按计划运行时，我们就说程序存在**缺陷（bugs）**。而检查代码并修复这些问题的过程，就被称为**调试（debugging）**。


    关于术语“bug”的真正起源仍存有一些争议，但一个记录详实的案例发生在 1947 年，涉及已故的海军后备役军官、当时的程序员格蕾丝·霍珀（Grace Hopper）少将。霍珀和她的团队当时正试图解决哈佛马克二型计算机的一个问题。一名团队成员在电路中发现了一只飞蛾，正是它导致其中一个继电器出现故障。霍珀后来被引用说：“从那时起，每当计算机出问题，我们就说它里面有‘bug（虫子）’了。”^(1)


    无论起源如何，这个术语保留了下来，全世界的程序员都使用调试器（例如 `Xcode`）来帮助查找程序中的错误。真正进行调试的是人；调试工具只是帮助程序员定位问题。任何调试器，无论其名称如何暗示，都不会自己修复问题。


    本章将重点介绍 `Xcode` 调试器的一些更重要的功能，并解释如何使用它们。完成本章后，你应该能对 `Xcode` 调试器以及一般的调试过程有足够深入的了解，从而能够搜索并修复大部分编程问题。


    __________


    ¹ Michael Moritz, Alexander L. Taylor III, and Peter Stoler, “The Wizard Inside
    the Machine,” Time, Vol.123, no. 16: pp. 56–63


    ## 开始调试


    如果你曾经为了捕捉到电影全速播放时无法看清的细节而慢放观看，那么你实际上已经使用了一种类似于调试的工具。逐帧播放电影以揭示你想寻找的细节，这个思路与我们调试程序时应用的思路是相同的。对于程序来说，有时有必要放慢速度来看看发生了什么。调试器允许我们通过两个主要功能来实现这一点：设置断点并逐行单步执行程序——稍后将详细介绍这两个功能。我们先来看看如何进入调试器以及它的界面。


    首先，我们需要加载一个现有的程序。本章的示例使用了第 8 章中的 `MyBookstore` 项目，因此请打开 `Xcode` 并加载 `MyBookstore`
    项目。


    其次，确保在运行方案（Run Scheme）中选择了 **Debug** 配置，如图 14-1 所示。要编辑当前方案，请从主菜单栏选择 Product![images](img/U001.jpg)Edit
    Scheme。**Debug** 是默认选项，因此你可能无需更改。这一步很重要，因为如果配置是 **Release**，调试将完全无法工作！


    ![images](img/1401.jpg)


    **图 14-1.** *选择调试配置。*


    虽然我们不会在本书中讨论 `Xcode` 方案（Schemes），但只需知道，默认情况下，`Xcode` 为你创建的任何 Mac OS X 或 iOS 项目都提供了
    **Release** 和 **Debug** 两种配置选项。就本章而言，主要区别在于发布（Release）配置不会添加调试应用程序所需的任何程序信息，而调试（Debug）配置则会。


    ### 设置断点


    要查看程序内部发生了什么，我们需要让程序在我们作为程序员感兴趣的特定位置暂停。**断点**允许我们做到这一点。在图 14-2 中，我们在程序的第 25 行设置了一个断点。要设置断点，只需将光标放在行号上（不是程序文本，而是程序文本左侧的数字
    25 上）并单击一次。


    如果没有显示行号，请选择主菜单栏中的 Xcode ![images](img/U001.jpg) Preferences，然后点击“Text Editing”选项卡，并勾选“Line
    Numbers”复选框。


    ![images](img/1402.jpg)


    **图 14-2.** *我们的第一个断点*


    我们也可以通过将断点拖放到行号列的左侧或右侧来移除它。在图 14-3 中，断点已被拖到列的左侧。在拖放过程中，断点会变成一团烟雾。


    ![images](img/1403.jpg)


    **图 14-3.** *断点在烟雾中消失。*


    设置和删除断点是非常简单的任务。还有其他方法可以删除断点，但这种方法是最有趣的！


    ### 使用断点导航器


    对于小项目，知道所有断点的位置并不难。但是，一旦项目变得比我们那个小小的 `MyBookstore` 应用更大，管理所有断点就会变得有点困难。幸运的是，`Xcode`
    4 提供了一种简单的方法来列出应用程序中的所有断点，称为断点导航器。可以通过单击导航栏中的断点导航器图标来访问它，如图 14-4 所示。


    ![images](img/1404.jpg)


    **图 14-4.** *在 Xcode 4 中访问断点导航器*


    单击后，它将列出应用程序中当前定义的所有断点。在此处，单击某个断点将跳转到该断点所在的源文件。你也可以在此处轻松删除和禁用断点。


    要禁用/启用一个断点，只需单击列表中（或任何出现该断点的地方）的蓝色断点图标即可。不要单击行号，必须是那个蓝色的小图标，如图 14-5 所示。


    ![images](img/1405.jpg)


    **图 14-5.** *使用断点导航器启用/禁用断点*


    有时，禁用断点而不是删除它会更方便，特别是当你计划之后还要在同一位置放置断点时。禁用断点实际上非常简单。只需单击现有的断点，它就会从深蓝色变为非常浅的蓝色。调试器不会在这些褪色的断点处停止，但它们仍然保留在原位，因此可以方便地重新启用，并作为代码中重要区域的标记。


    也可以从断点导航器中删除断点。只需选择一个或多个断点，然后按 **delete** 键。确保你选择了正确的断点进行删除，因为此操作没有撤销功能。


    也可以选择与断点关联的文件。在这种情况下，如果你选择断点导航器中列出的文件并按 delete 键，该文件中的所有断点都将被删除。


    ![images](img/1406.jpg)


    **图 14-6.** *包含多个断点的文件*


    请注意，断点是指带有小断点图标的行，如图 14-5 所示。文件相对断点缩进显示；在图 14-5 中，文件是 `DetailViewController.m`
    和 `MasterViewController.m`。图 14-6 展示了一个文件包含多个断点的示例。

