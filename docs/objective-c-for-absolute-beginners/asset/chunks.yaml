- fmt: '# Launching and Using Xcode 4.2


    Xcode 4.2 is available for download from the Mac App Store for free. See [Figure
    2–14](#Chapter02.html#fig_2_14), and from the iOS Dev Center, see [Figure 2–15](#Chapter02.html#fig_2_15)
    and [Figure 2–16](#Chapter02.html#fig_2_16).


    ![images](images/0214.jpg)


    **Figure 2–14.** *Xcode 4.2 is available for download from the Mac App Store for
    free.*


    **NOTE:** This package has everything we need to write Objective-C and Mac apps.
    To develop iPhone apps, you will need to apply for the iPhone Developer Program,
    pay $99 (when ready to test on your iOS device), and download the iPhone SDK from
    Apple at [`http://developer.apple.com/iphone`](http://developer.apple.com/iphone).


    ![images](images/0215.jpg)


    **Figure 2–15.** *If you paid $99 and joined the iOS Developer Program, beta versions,
    like the example above, of Xcode and the iOS SDK, are available to download.*


    Now that we have installed Xcode, we need to begin writing Objective-C applications;
    so let’s get started. After launching Xcode, follow these steps:


    1.  Click **Create a new Xcode Project**. See [Figure 2–16](#Chapter02.html#fig_2_16).


    ![images](images/0216.jpg)


    **Figure 2–16.** *Creating our first Objective-C project.*


    **IMPORTANT:** This is where many beginners get stuck, depending on their version
    of Xcode, and if they have the iPhone SDK installed. In [Figure 2–17](#Chapter02.html#fig_2_17),
    you can see that we have the iOS SDK installed. We also have the Lion version
    of Xcode installed. If you don’t have these installed, that is OK. Just navigate
    in the left pane of your template options, click on **Applications,** and look
    for the Command Line Tool.


    2.  Select **Applications** on the left-side pane, select the **Command Line Tool**
    template, and then press **Next**. See [Figure 2–17](#Chapter02.html#fig_2_17).


    ![images](images/0217.jpg)


    **Figure 2–17.** *Select the Command Line Tool. You may have to navigate to an
    equivalent screen with other versions of Xcode. The bottom line is to navigate
    to the Command Line Tool.*


    3.  Let''s name our app **HelloWorld** and select **Foundation** as the application
    type, as shown in [Figure 2–18](#Chapter02.html#fig_2_18). Then press **Next,**
    and save your app in the directory of your choice.


    ![images](images/0218.jpg)


    **Figure 2–18.** *Name your app HelloWorld, and select the Foundation as the App
    Type.*


    4.  In the **Project Navigator**, click on the `main.m` file. See [Figure 2–19](#Chapter02.html#fig_2_19)


    Xcode does a lot of work for us and creates a directory with files and code ready
    for us to use. That is what Xcode templates do—they save us a lot of time.


    We need to become familiar with the Xcode IDE. Let''s look at two of the most
    often used features (see [Figure 2–19](#Chapter02.html#fig_2_19)):


    *   The Navigator area.

    *   The Editor area.


    These sections should look similar to what we used in Alice. The **Navigator**
    area contains files needed to build our apps. It will contain our classes, methods,
    and resources.


    The **Editor** area is the business end of the Xcode IDE; where our dreams are
    turned into reality. The editor section is where we write our code. You will notice
    that as you write your code it will change color. Sometimes, Xcode will even try
    to auto-complete words for you. The colors have meanings that will become apparent
    as we use the IDE. The Editor area will also be the place where we debug our apps.


    **NOTE:** Even if we’ve mentioned it already, it is worth saying again: you will
    learn Objective-C programming by reading this book, but you will *really* learn
    Objective-C by debugging your apps. Debugging is where developers learn and become
    great developers.


    The **Run** button turns our code from plain text to an `.app` that our Macs,
    iPhones, or iPads know how to execute. With our Alice interface, we used the play
    button to run our Alice app.


    ![images](images/0219.jpg)


    **Figure 2–19.** *You can run the app right after creating the project by clicking
    the Run button and seeing, **Hello World!** printed out in the console.*


    To run our first program, simply click the **Run** button. Xcode checks our code
    syntax, compiles our app, and if no errors are found, makes an `.app` file and
    runs it. This application runs in a console (also known as a terminal).


    When the app runs, it prints out **Hello World** in the console. Also, in the
    console window, we can see if the application terminated and why it terminated.
    In this case, it terminated normally. We can see this with the message, `Program
    ended with exit code: 0`, which means our app didn’t crash. See [Figure 2–20](#Chapter02.html#fig_2_20).


    ![images](images/0220.jpg)


    **Figure 2–20.** *Our app executing in the Debugger Console.*


    Let’s modify our application to do what we did with our astronauts:


    1.  Navigate to the `main.m` file.

    2.  Change lines 17 and 18 to be shown as in [Figure 2–21](#Chapter02.html#fig_2_21).

    3.  We are going to intentionally misplace a semicolon at the end of line 8. This
    will cause a compiler error.

    4.  Click the **Run** button.


    You can see that something will go wrong when we try to compile and run our app.
    We have a compiler error, a red pointer, and the notices in the Xcode IDE denote
    this. See [Figure 2–21](#Chapter02.html#fig_2_21).


    When we write Objective-C code, everything is important—even semicolons, capitalization,
    and parentheses. The collection of rules that enable our compiler to compile our
    code to an executable app is called **syntax**.


    `NSLog` is a function that will print out the contents of its parameters in the
    console.


    ![images](images/0221.jpg)


    **Figure 2–21.** *Our app with a syntax error caught by our Objective-C compiler.*


    Now, let’s fix our app by adding the semicolon at the end of line 18. Building
    and running the app will enable us to see the output to the debug console. See
    [Figure 2–22](#Chapter02.html#fig_2_22).


    Feel free to play around and change the text that is printed out. Have fun!


    ![images](images/0222.jpg)


    **Figure 2–22.** *Our app compiled with no compiler errors, and completion executed
    successfully with the output we wanted.*


    ## Summary


    In this chapter, we have built our first Alice app. We also installed Xcode and
    compiled, debugged, and ran our first Objective-C app together. We also covered
    new OOP terms that are key to our understanding of Objective-C.


    **KEY TO SUCCESS:** As mentioned in the Introduction, visit [`www.xcelme.com`](http://www.xcelme.com)
    and click on the Free Videos tab to view related videos on this chapter. Also
    visit [`http://forum.xcelme.com`](http://forum.xcelme.com) to ask questions on
    these chapters, and see answers to common mistakes.


    The terms that you should understand are as follows:


    *   Classes

    *   Objects

    *   Methods

    *   Parameters

    *   Instances

    *   Instantiation


    ## Exercises


    *   Extend your `toTheMoonAlice.a3p` Alice app. Place another object of your choosing
    in the world and have the object say something to the two astronauts, when they
    have finished speaking.

    *   Extend your Objective-C `HelloWorld.app` by adding a third line of code that
    prints any text of your choosing to the console.


    # Chapter 3


    ## It’s All About the Data


    As you probably know, data is stored as zeros and ones in your computer’s memory.
    However, zeros and ones are not very useful to developers or app users, so we
    need to know how our program uses data and how data is stored on our computer.


    In this chapter, we will look at how data is stored on computers and how we can
    manipulate that data. Then we’ll write a fun Alice app illustrating data storage
    and then write the same Alice app in Objective-C. So let’s get started!


    ### Numbering Systems Used in Programming


    Computers work with information differently than do humans. This section covers
    the various ways information is stored, tallied, and manipulated by devices such
    as your Mac, iPhone, and iPad.'
