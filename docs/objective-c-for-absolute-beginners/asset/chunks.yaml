  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵守您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n#### 发送 `dealloc`\
    \ 消息\n\n一般情况下，你的程序绝不应向其他对象发送 `dealloc` 消息。但也存在一些例外情况，其中之一就是在处理 `dealloc` 消息本身时。你只需为你创建的对象处理\
    \ `dealloc` 消息。代码清单 13–10 是一段代码片段，展示了如何编写一个典型的 `dealloc` 消息。除了使用 ARC、垃圾收集或没有任何需要释放的内容之外，你创建的每个对象都应该实现一个\
    \ `dealloc` 消息。\n\n**代码清单 13–10.** *一个典型的 dealloc 实现。*\n\n```\n1   - (void)dealloc\n\
    2   {\n3       self.iVar1 = nil;     // 如果我们有实例变量，确保它们被释放。\n4                \
    \             // 此实例变量是一个属性（`第 10 章`）\n5       [iVar2 release];      // 另一个例子。我们释放一个正在使用的实例变量\n\
    6                             // – 它不是一个属性。\n7       [super dealloc];      //\
    \ 最后，我们告诉父类释放它自己。\n8                             // 这是少数几次显式调用 dealloc 的情况之一。\n\
    9   }\n```\n\n代码清单 13–10 严格来说只是一个示例，其中的实例变量名完全是虚构的。\n\n第 3 行将一个实例变量设置为 `nil`。这不仅是一种常见做法，而且在这个例子中，该实例变量是一个属性。如果该属性是使用\
    \ `retain` 关键字创建的，那么像下面这样将属性设置为 `nil` 会自动向 `iVar1` 最初指向的任何对象发送一条 release 消息。\n\
    \n```\n@property(retain) NSDate* iVar1\n```\n\n这是一种非常干净的释放对象的方法。\n\n第 5 行展示了如何释放非属性的实例变量。到目前为止，我们在许多示例中都使用了这种方法。\n\
    \n第 7 行是你向对象发送 `dealloc` 消息的唯一情况。在这种情况下，程序会告诉其父类（超类）释放自身。父类最终会做同样的事情，向其父类发送 `dealloc`，依此类推，直到基础对象最终被释放。另请注意，`[super\
    \ dealloc]` 是该方法执行的最后一件事情——先释放父类然后再继续做其他事情并不是一个好主意。\n\n处理 retain/release 模型需要一些时间来适应，但总体来说，它是一个相当直接的内存管理系统。不过，这里有一个警告：尽管我们的例子中提到了对象的\
    \ `retainCount` 方法，但不要依赖这个值。因为你无法知道框架的哪些部分对你的对象感兴趣，所以保留计数可能比你预期的要高。然而，了解 `retainCount`\
    \ 对于排查潜在的内存泄漏问题是有益的。继续练习使用 retain/release 模型，并确保在发送或接收对象时阅读开发者文档，以便了解所涉及的对象是如何被处理的。\n\
    \n### 如果出现问题\n\n无论是通过标准的 C 机制还是 Objective-C 对象分配方法来分配内存，大多数情况下都能成功。但是，程序员不能假设分配对象或分配内存是*总是*成功的。当内存分配失败时，通常预示着更大的问题即将发生，程序可能无法运行太久（会因内存问题而崩溃）。然而，即使程序可能因为无法分配内存而进入不良状态，它也不应该忽略内存分配失败的信号。以下是一些用于测试内存分配是否失败的惯例：\n\
    \n![images](img/U1303.jpg)\n\n在这个标准的 C 示例中，如果 `malloc` 函数失败，将返回一个 `NULL` 指针。回顾一下，`NULL`\
    \ 指针只不过是一个指向位置 0×00000000 的指针。内存永远不会从这个位置开始，因此 `NULL` 可以用来指示一个*错误的*内存分配。\n\n在\
    \ Objective-C 中，我们需要在两个主要区域执行有效性检查。这是第一个：\n\n![images](img/U1304.jpg)\n\n在这个示例中，我们尝试创建一个对象，但我们检查返回的指针是否为\
    \ `nil`。回顾一下，`nil` 对象基本上是一个默认的空对象，用作表示“空”或“无”的占位符。不要将其与一个空的 `MyObject` 混淆，因为两者不是一回事。\n\
    \n第二个有效性检查仅适用于我们创建的对象。这个检查是在类的 `init` 方法中完成的：\n\n![images](img/U1305.jpg)\n\n\
    在这个示例中，在对象的 `init` 方法里，程序显式地测试 `self` 是否返回了一个非 `nil` 的值。如果 `self` 不是 `nil`，说明一切正常，该方法可以继续初始化对象。然后，该方法返回\
    \ `self`，它可能是 `nil` 也可能不是。这里要注意的重点是，我们在继续处理 `self` 之前，先测试了对 `[super init]` 的调用是否成功。\n\
    \n### 关于 ARC 的说明\n\n虽然我们介绍了许多在不使用 ARC 时手动处理内存的方法，但建议你在任何新创建的项目中使用 ARC。你在这里学到的是，尽管\
    \ ARC 隐藏了内存是如何被保留和释放的细节，但理解底层真正发生的事情仍然很重要。\n\n### 总结\n\n本章我们涵盖了不少内容。希望你现在对内存、地址和指针的工作方式有了更清晰的理解。在本章中，我们介绍了以下内容：\n\
    \n*   定义内存\n*   使用二进制、十进制和十六进制\n*   定义和使用内存地址\n*   定义和使用指针\n*   定义和使用解引用运算符\n\
    *   分配内存\n*   使用自动变量并注意陷阱，以免造成内存泄漏\n*   释放内存和防止内存泄漏，包括使用 `dealloc` 方法\n*   使用特殊指针\
    \ `NULL` 和 `nil`\n*   理解使用 ARC 的内存管理\n*   使用 Objective-C 及其 retain/release 模型管理内存\n\
    *   检测内存分配出错的情况。\n\n本章内容非常丰富，恭喜你坚持了下来。理解内存如何在 Mac、iPhone、iPad 或任何计算设备上工作是至关重要的。\n\
    \n### 练习\n\n*   在下面的内存空间中，这个内存块有多大？这块内存中最后一个字节的地址是什么？\n\n![images](img/U1306.jpg)\n\
    \n*   使用 代码清单 12-1 中的代码，尝试确定以下语句会做什么以及为什么：\n    *   `*(aPointer + 2) = '1';`\n\
    \    *   `(aPointer + 2) = '1';`\n*   查看 `NSMutableArray` 类的 `addObject` 方法的 Apple\
    \ 开发者文档。\n    *   `NSMutableArray` 类的 `addObject:` 方法与 `NSMutableDictionary` 类的\
    \ `setObject:forKey:` 方法有什么不同？\n    *   使用 `NSMutableArray` 将如何改变 代码清单 13–1 中的代码（如果有变化的话）？\n\
    \n## 第 14 章\n"
- fmt: '# Introducing the Xcode Debugger


    `Xcode` is fantastic! Not only is this tool provided free of charge on Apple’s
    developer site, but it is actually really, really good! Aside from being able
    to create the next great Mac OS X, iPhone, or iPad app, `Xcode` has a fantastic
    debugger built right into the tool.


    So, what exactly is a debugger? First of all, let’s get something straight—programs
    do *exactly* what they are written to do. Sometimes, what is written isn’t exactly
    what the program is really meant to do. Sometimes, this means the program crashes
    or just doesn’t do something that is expected. Whatever the case, when a program
    doesn’t work as planned, the program is said to have **bugs**. The process of
    going through the code and fixing these problems is called **debugging**.


    There is still some debate as to the real origin of the term “bug,” but one well-documented
    case from 1947 involved the late Rear Admiral Grace Hopper, a Naval reservist
    and programmer at the time. Hopper and her team were trying to solve a problem
    with the Harvard Mark II computer. One team member found a moth in the circuitry
    that was causing the problem with one of the relays. Hooper was later quoted as
    saying, “From then on, when anything went wrong with a computer, we said it had
    bugs in it.”^([1](#Chapter14.html#CH-14-FN-1))


    Regardless of the origin, the term stuck and programmers all over the world use
    debuggers, such as `Xcode`, to help find bugs in programs. People are the real
    debuggers; debugging tools merely help programmers locate problems. No debugger,
    whatever the name might imply, fixes problems all on its own.


    This chapter will highlight some of the more important features of the `Xcode`
    debugger and will explain how to use them. Once you are finished this chapter,
    you should have a good enough understanding of the `Xcode` debugger and of the
    debugging process in general to allow you to search for and fix the majority of
    programming issues.


    __________


    ¹ Michael Moritz, Alexander L. Taylor III, and Peter Stoler, “The Wizard Inside
    the Machine,” Time, Vol.123, no. 16: pp. 56–63


    ## Getting Started with Debugging


    If you’ve ever watched a movie in slow motion just so you can catch a detail you
    can’t see when the movie is played at full speed, you’ve used a tool to do something
    a little like debugging. The idea that playing the movie frame by frame will reveal
    the detail you are looking for is the same sort of idea we apply when debugging
    a program. With a program, sometimes it becomes necessary to slow things down
    a bit to see what’s happening. The debugger allows us to do this using two main
    features: setting a breakpoint and stepping through the program line by line—more
    on these two features in a bit. Let’s first look at how to get to the debugger
    and what it looks like.


    First, we need to load an existing program. Our examples in this chapter use the
    `MyBookstore` project from [Chapter 8](#Chapter08.html#ch8), so open `Xcode` and
    load the `MyBookstore` project.


    Second, make sure the **Debug** configuration is chosen on the Run Scheme, as
    shown in [Figure 14–1](#Chapter14.html#fig_14_1). To edit the current scheme,
    choose Product![images](images/U001.jpg)Edit Scheme from the main menu. **Debug**
    is the default selection, so you probably won’t have to change this. This step
    is important because if the configuration is **Release**, debugging will not work
    at all!


    ![images](images/1401.jpg)


    **Figure 14–1.** *Selecting the Debug Configuration.*


    While we won’t discuss `Xcode` Schemes in this book, just know that by default,
    `Xcode` provides both a **Release** and a **Debug** configuration option for any
    Mac OS X or iOS project you create. The main difference as it pertains to this
    chapter is that a release configuration doesn’t add in any program information
    that is necessary for debugging an application, whereas the debug configuration
    does.


    ### Setting Breakpoints


    To see what’s going on in a program, we need to make the program pause at certain
    points that we as programmers are interested in. A **breakpoint** allows us to
    do this. In [Figure 14–2](#Chapter14.html#fig_14_2), we’ve set a breakpoint on
    line 25 of the program. To do this, simply place the cursor over the line number
    (not the program text, but the number 25 to the left of the program text) and
    click once.


    If line numbers are not being displayed, simply choose Xcode ![images](images/U001.jpg)
    Preference from the main menu and then click on the “Text Editing” Tab and check
    the “Line Numbers” checkbox.


    ![images](images/1402.jpg)


    **Figure 14–2.** *Our first breakpoint*


    We can also remove the breakpoint by simply dragging the breakpoint to the left
    or right of the line number column and then dropping it. In [Figure 14–3](#Chapter14.html#fig_14_3),
    the breakpoint has been dragged to the left of the column. During the drag-and-drop
    process, the breakpoint will turn into a puff of smoke.


    ![images](images/1403.jpg)


    **Figure 14–3.** *The breakpoint disappears in a puff of smoke.*


    Setting and deleting breakpoints are pretty straightforward tasks. There are other
    ways to delete breakpoints, but this way is the most entertaining!


    ### Using the Breakpoint Navigator


    With small projects, knowing where all the breakpoints are isn’t necessarily hard.
    However, once a project gets larger than, say, our small `MyBookstore` application,
    managing all the breakpoints could be a little more difficult. Fortunately, `Xcode`
    4 provides a simple method to list all the breakpoints in an application called
    the Breakpoint Navigator. This can be found by clicking on the Breakpoint Navigator
    icon in the navigation selection bar, as shown in [Figure 14–4](#Chapter14.html#fig_14_4).


    ![images](images/1404.jpg)


    **Figure 14–4.** *Accessing the Breakpoint Navigator in Xcode 4*


    Once clicked, it will list all the breakpoints currently defined in the application.
    From here, clicking on a breakpoint will take you to the source file with the
    breakpoint. You can also easily delete and disable breakpoints from here.


    To disable/enable a breakpoint, simply click on the blue breakpoint icon in the
    list (or wherever it appears). Don’t click on the line; it has to be the little
    blue icon, as shown in [Figure 14–5](#Chapter14.html#fig_14_5).


    ![images](images/1405.jpg)


    **Figure 14–5.** *Using the breakpoint navigator to enable/disable a breakpoint*


    It is sometimes handy to disable a breakpoint instead of deleting it, especially
    if you plan to put the breakpoint back in the same place again. Disabling a breakpoint
    is actually quite simple. Just click the existing breakpoint and it will turn
    from a dark blue color to a very faded blue. The debugger will not stop on these
    faded breakpoints, but they remain in place so they can be conveniently enabled
    and act as a marker to an important area in the code.


    It’s also possible to delete breakpoints from the Breakpoint Navigator. Simply
    select one or more breakpoints and press the **delete** key. Make sure you select
    the correct breakpoints to delete since there is no undo feature.


    It’s also possible to select the file associated with the breakpoints. In this
    case, if you delete the file listed in the Breakpoint Navigator and press delete,
    all breakpoints in that file will be deleted.


    ![images](images/1406.jpg)


    **Figure 14–6.** *A file with several breakpoints*


    Please note that breakpoints are the lines with the small breakpoint icon, as
    shown in [Figure 14–5](#Chapter14.html#fig_14_5). The file is outdented from the
    breakpoint; in [Figure 14–5](#Chapter14.html#fig_14_5), the files are `DetailViewController.m`
    and `MasterViewController.m`. [Figure 14–6](#Chapter14.html#fig_14_6) shows an
    example of what a file looks like with more than a single breakpoint.'
