  trans: "\n#### 运行程序\n\n建立连接后，你就可以运行并测试程序了！只需点击 Xcode 窗口左上角的 `Run` 按钮，如图 7–20 所示。\n\
    \n![images](img/0720.jpg)\n\n**图 7–20.** *运行程序*\n\n如果没有编译错误，iPhone 模拟器将启动，你应该能看到应用程序。只需点击“My\
    \ Station”按钮，电台信息就会显示出来，如图 7–21 所示。\n\n![images](img/0721.jpg)\n\n**图 7–21.**\
    \ *显示电台信息*\n\n如果界面或运行效果不理想，请回顾操作步骤，确保所有代码和连接均已按上述说明正确配置。\n\n#### 进一步掌握类方法\n\n\
    在程序中，你尚未充分利用 `RadioStation` 的所有类方法，但本章已经介绍了什么是类方法及其用法。运用这些知识，尝试完成本章末尾提到的一些练习。通过添加或修改类方法或实例方法，在这个简单的可运行程序上进行尝试，从而理解它们的工作原理。\n\
    \n### 访问 Xcode 文档\n\n我们怎么强调 Xcode `开发者文档`对话框中蕴含的丰富信息都不为过。打开 Xcode 后，主菜单中会出现`帮助`菜单（见图\
    \ 7–10）。从中即可打开开发者文档窗口。\n\n![images](img/0722.jpg)\n\n**图 7–22.** *Xcode 帮助菜单*\n\
    \n打开后，可以使用搜索窗口查找本章中使用的任何类，包括 `NSString` 类的文档，如图 7–23 所示。\n\n![images](img/0723.jpg)\n\
    \n**图 7–23.** *开发者文档窗口*\n\n从图 7–23 中可以发现关于 `NSString` 类的多个不同知识点。通读文档以及苹果提供的各种配套指南，这将帮助你更深入地理解各类及其支持的多种方法。\n\
    \n### 本章小结\n\n我们又完成了一章的学习。再次恭喜你独自将大量信息装进了大脑！以下是本章内容的总结：\n\n*   Objective-C 类回顾\n\
    *   接口文件\n    *   实例变量\n    *   类方法\n    *   实例方法\n*   实现文件\n    *   在接口文件中定义方法接口，并在实现文件中编写该接口的代码\n\
    \    *   类方法与实例方法的使用限制\n    *   初始化类并利用实例变量\n*   使用新的 `RadioStation` 对象\n    *\
    \   构建一个使用新对象的 iPhone 应用\n    *   将接口类连接到实例变量\n    *   将用户界面事件连接到类中的方法\n\n###\
    \ 练习\n\n*   修改创建 `RadioStation` 类的代码，让电台名称远超出屏幕可显示的长度。会发生什么？\n*   通过实例变量修改 `RadioStation`\
    \ 类，用于指示电台是 AM 还是 FM（提示：你需要修改 `initWithName:Frequency:` 方法，使其接受一个用于表示无线电频段的新参数）。\n\
    *   更改当前按钮并添加一个新按钮。将按钮标记为 FM 和 AM。如果用户点击 FM 按钮，则显示一个 FM 电台。如果用户点击 AM 按钮，则显示一个\
    \ AM 电台（提示：你需要在 `RadioStationsAppDelegate.h` 接口文件中添加第二个 `RadioStation` 对象）。\n\
    *   通过确保 iPhone 应用首次启动时用户不会看到文本“Label”，对界面进行一些清理。\n    *   使用界面工具修复此问题。\n    *\
    \   你如何通过添加代码来解决这个问题？\n*   为 `(IBAction)buttonClick:(id)sender` 方法增加更多验证。目前，它验证了\
    \ FM 频段范围，但未验证 AM 频段范围。修改代码，使其也能验证 AM 频段范围。\n    *   如果电台频率超出范围，请使用现有的标签显示某种错误信息。\n\
    \n## 第 8 章\n\n## Objective-C 编程基础\n\nObjective-C 是一种非常优雅的语言。它将 C 语言的高效性与 Smalltalk\
    \ 面向对象的优点结合在一起。这种组合于 20 世纪 80 年代中期问世，至今仍在为 iPhone、iPad 和 Mac OS X 背后的出色应用提供动力。一门超过\
    \ 20 年的语言是如何在这么长时间后依然保持相关性和实用性的？其成功部分源于构成 Objective-C 的两种语言都经过了充分测试和精心设计。另一个原因则不那么明显：iPhone\
    \ 和 Mac OS X 可用的各种框架大大简化了开发功能完善的应用的过程。这些框架得益于它们已经存在了相当长的时间，这也就意味着稳定性和高功能性。最后，Objective-C\
    \ 具有高度动态性。虽然本章不会重点讨论这一特性，但 Objective-C 的动态特性提供了许多编译型语言所不具备的灵活性。凭借所有这些优秀特性，Objective-C\
    \ 及其对应的框架为创作杰作提供了一个绝佳的调色板！\n\n本章将介绍 Objective-C 的一些更常见的概念，例如属性和集合类。本章还将展示在 Xcode\
    \ 中处理用户界面元素时，如何同时使用属性和实例变量。这听起来工作量很大，但 Objective-C、Foundation 框架和 Xcode 工具提供了丰富的对象和方法，以及一种轻松构建应用的方式。\n\
    \n### 集合\n\n理解集合是学习 Objective-C 的基础。事实上，集合对象几乎是所有现代面向对象语言库的基本构造——有时它们被称为容器。简单来说，集合是一种可以容纳和管理其他对象的类。集合的全部意义在于提供一种通用且高效的方式来存储和检索对象。\n\
    \n有几种不同类型的集合。虽然它们都满足容纳其他对象的相同目的，但主要区别在于对象的检索方式。以下是 Objective-C 中最常用的集合列表：\n\n\
    *   `NSSet`\n*   `NSArray`\n*   `NSDictionary`\n*   `NSMutableSet`\n*   `NSMutableArray`\n\
    *   `NSMutableDictionary`\n\n注意，列出的三个集合类中，有一个包含单词 `Mutable`。可变的（相对于不可变的）类是指，在集合创建后可以向其中添加或移除项目的类。Mutable\
    \ 意味着它可以被修改。不可变集合必须在首次创建时使用其所有值进行初始化，之后便无法修改。\n"
- fmt: "### Using NSSet\n\nThe `NSSet` class is used to store an unordered list of\
    \ objects. *Unordered* means exactly that—the objects are stored in the set without\
    \ regard to order. The advantage of the `NSSet` is performance—it’s the fastest\
    \ collection class available. Use `NSSet` when it is necessary to store a collection\
    \ of objects and the order in which they are stored or retrieved is not crucial.\n\
    \nHere is a typical `NSSet` initialization method:\n\n```\nNSSet *mySet = [NSSet\
    \ setWithObjects:@\"String 1\", @\"String 2\", @\"Whatever\", nil];\n```\n\nAs\
    \ you can see, the set is initialized with a list of objects, in this case a list\
    \ of strings. The last object must be `nil` to indicate the end of the list of\
    \ objects. Also, the example uses strings, but an `NSSet` can be comprised of\
    \ any object or even different types of objects, including objects from other\
    \ collections!\n\n**TIP:** All collection classes have the ability to store and\
    \ manage any type of object at once. However, in typical cases, most programmers\
    \ tend to store a single type of object in any one particular collection class\
    \ to make the code less complicated.\n\nIn order to go after data in the `NSSet`,\
    \ a few typical methods of accessing the elements within an `NSSet` are used.\
    \ One method, as shown in [Listing 8–1](#Chapter08.html#list_8_1), is to use what\
    \ is referred to as a *fast enumerator* and retrieve each object one by one. Note\
    \ that the fast enumeration below (lines #3–5) works on all collection classes.\n\
    \n**Listing 8–1.** *Iterating through an NSSet via an enumerator.*\n\n```\n 1\
    \  NSSet *mySet = [NSSet setWithObjects:@\"One\", @\"Two\", @\"Three\", nil];\n\
    \ 2  \n 3  for (id value in mySet) {\n 4      NSLog(@\"%@\", value);\n 5  }\n\
    ```\n\n**NOTE:** On line #3, the class of the value is `id`. Recall that an `id`\
    \ is a generic type that represents any Objective-C class. The reason that `id`\
    \ is used is that the value that we store in the `NSSet` can be of any type. For\
    \ example, if the `NSSet` were to contain a class called `Animal` and another\
    \ class called `Zoo`, the code would fail because we don’t have a class that is\
    \ both a `Zoo` and an `Animal` type. On the other hand, if the `NSSet` always\
    \ had the same class, we could substitute that class for the `id` on line 3.\n\
    \nAnother common method of accessing an `NSSet`, especially when programming for\
    \ an iOS device capturing touches, is to use the following:\n\n**Listing 8–2.**\
    \ *Selecting any of the objects in the NSSet collection.*\n\n```\n 1  NSSet *mySet\
    \ = [NSSet setWithObjects:@\"One\", @\"Two\", @\"Three\", nil];\n 2  \n 3  NSString\
    \ *value = [mySet anyObject];\n```\n\nLine #3 calls the method `anyObject`. This\
    \ does exactly as it says; it returns any object from the set. The object returned\
    \ is determined at the set’s convenience so there can be no guarantee that the\
    \ first item will be returned. Of course, using the `anyObject` method assumes\
    \ that any object will do. As previously mentioned, when dealing with touches\
    \ on an iOS device, sometimes all that’s necessary is to know that at least one\
    \ finger has touched the screen. Each touch to the screen is stored as an entry\
    \ in the `NSSet`, one for each finger. Using `anyObject` will return any one of\
    \ the touches.\n\nThere are many other ways to actually get objects from an `NSSet`—far\
    \ too many to cover in this chapter.^([1](#Chapter08.html#CH-8-FN-1)) However,\
    \ there is one particular method that involves the next collection—the `NSArray`\
    \ class.\n\n### Using NSArray\n\nThe `NSArray` class is like any other collection,\
    \ in that it allows the programmer to manage a group of objects. The `NSArray`\
    \ differs from the `NSSet` in that the `NSArray` allows an object to be retrieved\
    \ by its *index* into the array. An index is the numeric position that an object\
    \ would occupy in the `NSArray`. For example, if there are three elements in the\
    \ `NSArray`, the objects can be referenced by an index from 0 to 2. As with most\
    \ things in the C and Objective-C languages, an index starts at 0.\n\n__________\n\
    \n¹ [http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/Foundation/Classes/NSSet_Class/Reference/Reference.html](http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/Foundation/Classes/NSSet_Class/Reference/Reference.html)\n\
    \n**Listing 8–3.** *Accessing objects within an NSArray.*\n\n```\n 1  NSArray\
    \ *myArray = [NSArray arrayWithObjects: @\"One\", @\"Two\", @\"Three\", nil];\n\
    \ 2  \n 3  NSLog (@\"%@\", [myArray objectAtIndex:0]);\n 4  NSLog (@\"%@\", [myArray\
    \ objectAtIndex:1]);\n 5  NSLog (@\"%@\", [myArray objectAtIndex:2]);\n```\n\n\
    As can be seen, objects within the `NSArray` can be retrieved via the *index*.\
    \ The index starts at 0 and can’t exceed the size of the array — 1. The size of\
    \ the array can be easily calculated by sending a `count` message to the `NSArray`\
    \ object:\n\n```\nint entries = [myArray count];\n```\n\nIn fact, every collection\
    \ type, `NSSet`, `NSArray`, `NSDictionary` (and their mutable counterparts) all\
    \ respond to the `count` message.\n\n**NOTE:** You may have noticed that the `NSLog`\
    \ command passes a string like `:@\"%@\"`. The `%@` is a format that can be used\
    \ with any Objective-C object. It simply tells the object to describe itself.\
    \ In the case of `NSString`, the description is the string itself. Different types\
    \ of objects have different descriptions. In [Listing 8–3](#Chapter08.html#list_8_3)\
    \ the `[myArray objectAtIndex:0]` returns an `NSString` object. If the argument\
    \ is NOT an Objective-C class, your program will crash!\n\nAs mentioned earlier,\
    \ there is a method to get at an `NSSet` using an `NSArray`.\n\n**Listing 8–4.**\
    \ Creating an NSArray from an existing NSSet.\n\n```\n 1  NSSet *mySet = [NSSet\
    \ setWithObjects:@\"One\", @\"Two\", @\"Three\", nil];\n 2  NSArray *myArray =\
    \ [NSSet allObjects];\n 3  \n 4  NSLog(@\"%@\", [myArray objectAtIndex:1);\n```\n\
    \nAside from *fast enumeration*, using the `allObjects` method will create an\
    \ `NSArray` from the `NSSet`. Generally, one wouldn’t create a set and then copy\
    \ it into an array— why not just create the array in the first place? Well, sometimes\
    \ a list of objects is given only in an `NSSet` (`touchesBegan: withEvent:` method\
    \ when dealing with touches on an iOS device is a perfect example)."
  raw: '#### Using NSSet


    The `NSSet` class is used to store an unordered list of objects. *Unordered* means
    exactly that—the objects are stored in the set without regard to order. The advantage
    of the `NSSet` is performance—it’s the fastest collection class available. Use
    `NSSet` when it is necessary to store a collection of objects and the order in
    which they are stored or retrieved is not crucial.


    Here is a typical NSSet initialization method:


    `NSSet *mySet = [NSSet setWithObjects:@"String 1", @"String 2", @"Whatever", nil];`


    As you can see, the set is initialized with a list of objects, in this case a
    list of strings. The last object must be `nil` to indicate the end of the list
    of objects. Also, the example uses strings, but an `NSSet` can be comprised of
    any object or even different types of objects, including objects from other collections!


    **TIP:** All collection classes have the ability to store and manage any type
    of object at once. However, in typical cases, most programmers tend to store a
    single type of object in any one particular collection class to make the code
    less complicated.


    In order to go after data in the `NSSet,` a few typical methods of accessing the
    elements within an `NSSet` are used. One method, as shown in [Listing 8–1](#Chapter08.html#list_8_1),
    is to use what is referred to as a *fast enumerator* and retrieve each object
    one by one. Note that the fast enumeration below (lines #3–5) works on all collection
    classes.


    **Listing 8–1.** *Iterating through an NSSet via an enumerator.*


    ` 1  NSSet *mySet = [NSSet setWithObjects:@"One", @"Two", @"Three", nil];`

    ` 2  `

    ` 3  for (id value in mySet) {`

    ` 4      NSLog(@"%@", value);`

    ` 5  }`


    **NOTE:** On line #3, the class of the value is id. Recall that an id is a generic
    type that represents any Objective-C class. The reason that id is used is that
    the value that we store in the `NSSet` can be of any type. For example, if the
    `NSSet` were to contain a class called `Animal` and another class called `Zoo`,
    the code would fail because we don’t have a class that is both a `Zoo` and an
    `Animal` type. On the other hand, if the `NSSet` always had the same class, we
    could substitute that class for the id on line 3.


    Another common method of accessing an `NSSet`, especially when programming for
    an iOS device capturing touches, is to use the following:


    **Listing 8–2.** *Selecting any of the objects in the NSSet collection.*


    ` 1  NSSet *mySet = [NSSet setWithObjects:@"One", @"Two", @"Three", nil];`

    ` 2  `

    ` 3  NSString *value = [mySet anyObject];`


    Line #3 calls the method `anyObject`. This does exactly as it says; it returns
    any object from the set. The object returned is determined at the set’s convenience
    so there can be no guarantee that the first item will be returned. Of course,
    using the `anyObject` method assumes that any object will do. As previously mentioned,
    when dealing with touches on an iOS device, sometimes all that’s necessary is
    to know that at least one finger has touched the screen. Each touch to the screen
    is stored as an entry in the `NSSet`, one for each finger. Using `anyObject` will
    return any one of the touches.


    There are many other ways to actually get objects from an `NSSet`—far too many
    to cover in this chapter.^([1](#Chapter08.html#CH-8-FN-1)) However, there is one
    particular method that involves the next collection—the `NSArray` class.


    #### Using NSArray


    The `NSArray` class is like any other collection, in that it allows the programmer
    to manage a group of objects. The `NSArray` differs from the `NSSet` in that the
    `NSArray` allows an object to be retrieved by its *index* into the array. An index
    is the numeric position that an object would occupy in the `NSArray`. For example,
    if there are three elements in the `NSArray`, the objects can be referenced by
    an index from 0 to 2\. As with most things in the C and Objective-C languages,
    an index starts at 0.


    __________


    ¹ [http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/Foundation/Classes/NSSet_Class/Reference/Reference.html](http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/Foundation/Classes/NSSet_Class/Reference/Reference.html)


    **Listing 8–3.** *Accessing objects within an NSArray.*


    ` 1  NSArray *myArray = [NSArray arrayWithObjects: @"One", @"Two", @"Three", nil];`

    ` 2  `

    ` 3  NSLog (@"%@", [myArray objectAtIndex:0]);`

    ` 4  NSLog (@"%@", [myArray objectAtIndex:1]);`

    ` 5  NSLog (@"%@", [myArray objectAtIndex:2]);`


    As can be seen, objects within the `NSArray` can be retrieved via the *index*.
    The index starts at 0 and can’t exceed the size of the array—1\. The size of the
    array can be easily calculated by sending a `count` message to the `NSArray` object:


    `            int entries = [myArray count];`


    In fact, every collection type, `NSSet`, `NSArray`, `NSDictionary` (and their
    mutable counterparts) all respond to the `count` message.


    **NOTE:** You may have noticed that the `NSLog` command passes a string like `:@"%@"`.
    The `%@` is a format that can be used with any Objective-C object. It simply tells
    the object to describe itself. In the case of `NSString`, the description is the
    string itself. Different types of objects have different descriptions. In [Listing
    8–3](#Chapter08.html#list_8_3) the `[myArray objectAtIndex:0]` returns an `NSString`
    object. If the argument is NOT an Objective-C class, your program will crash!


    As mentioned earlier, there is a method to get at an `NSSet` using an `NSArray`.


    **Listing 8–4.** Creating an NSArray from an existing NSSet.


    ` 1  NSSet *mySet = [NSSet setWithObjects:@"One", @"Two", @"Three", nil];`

    ` 2  NSArray *myArray = [NSSet allObjects];`

    ` 3  `

    ` 4  NSLog(@"%@", [myArray objectAtIndex:1);`


    Aside from *fast enumeration*, using the `allObjects` method will create an `NSArray`
    from the `NSSet`. Generally, one wouldn’t create a set and then copy it into an
    array— why not just create the array in the first place? Well, sometimes a list
    of objects is given only in an `NSSet` (`touchesBegan: withEvent:` method when
    dealing with touches on an iOS device is a perfect example).'
  trans: "\n### 使用 NSSet\n\n`NSSet` 类用于存储无序的对象列表。*无序*的意思就是——对象在集合中存储时没有顺序。`NSSet`\
    \ 的优势在于性能——它是可用的最快集合类。当需要存储一组对象，且存储或检索的顺序不重要时，请使用 `NSSet`。\n\n以下是一个典型的 `NSSet`\
    \ 初始化方法：\n\n```\nNSSet *mySet = [NSSet setWithObjects:@\"String 1\", @\"String\
    \ 2\", @\"Whatever\", nil];\n```\n\n如你所见，该集合通过一个对象列表进行初始化，本例中是一个字符串列表。最后一个对象必须是\
    \ `nil`，以表示对象列表的结束。另外，这个例子使用了字符串，但一个 `NSSet` 可以由任何对象组成，甚至可以包含不同类型的对象，包括来自其他集合的对象！\n\
    \n**提示：** 所有集合类都能够同时存储和管理任何类型的对象。然而，在典型情况下，大多数程序员倾向于在任何一个特定的集合类中只存储单一类型的对象，以使代码更简单。\n\
    \n为了访问 `NSSet` 中的数据，常用几种访问 `NSSet` 内部元素的方法。其中一种方法如代码清单 8–1 所示，是使用所谓的*快速枚举*，逐个检索每个对象。请注意，下面的快速枚举（第\
    \ 3-5 行）适用于所有集合类。\n\n**代码清单 8–1.** *通过枚举器遍历 NSSet。*\n\n```\n 1  NSSet *mySet =\
    \ [NSSet setWithObjects:@\"One\", @\"Two\", @\"Three\", nil];\n 2  \n 3  for (id\
    \ value in mySet) {\n 4      NSLog(@\"%@\", value);\n 5  }\n```\n\n**注意：** 在第\
    \ 3 行中，值的类型是 `id`。回忆一下，`id` 是一个泛型类型，代表任何 Objective-C 类。使用 `id` 的原因是我们存储在 `NSSet`\
    \ 中的值可以是任何类型。例如，如果 `NSSet` 包含了一个名为 `Animal` 的类和一个名为 `Zoo` 的类，代码就会失败，因为我们没有一个类既是\
    \ `Zoo` 类型又是 `Animal` 类型。另一方面，如果 `NSSet` 始终包含相同的类，我们可以用该特定类替换第 3 行中的 `id`。\n\n\
    另一种访问 `NSSet` 的常见方法，特别是在为捕捉触摸事件的 iOS 设备编程时，是使用以下方式：\n\n**代码清单 8–2.** *选择 NSSet\
    \ 集合中的任意对象。*\n\n```\n 1  NSSet *mySet = [NSSet setWithObjects:@\"One\", @\"Two\"\
    , @\"Three\", nil];\n 2  \n 3  NSString *value = [mySet anyObject];\n```\n\n第\
    \ 3 行调用了 `anyObject` 方法。这个方法名副其实；它从集合中返回任意一个对象。返回的对象由集合自行决定，因此无法保证会返回第一个项目。当然，使用\
    \ `anyObject` 方法的前提是任何对象都可以满足需求。如前所述，在处理 iOS 设备上的触摸事件时，有时只需要知道至少有一根手指触碰了屏幕即可。每次触摸屏幕都会作为一条记录存储在\
    \ `NSSet` 中，每根手指对应一条记录。使用 `anyObject` 会返回其中任意一个触摸对象。\n\n实际上还有很多其他从 `NSSet` 获取对象的方法——多到本章无法一一涵盖。^(1)\
    \ 不过，有一种特殊的方法涉及到下一个集合——`NSArray` 类。\n\n### 使用 NSArray\n\n`NSArray` 类与其他集合类似，允许程序员管理一组对象。`NSArray`\
    \ 与 `NSSet` 的不同之处在于，`NSArray` 允许通过对象在数组中的*索引*来检索对象。索引是对象在 `NSArray` 中所占据的数值位置。例如，如果\
    \ `NSArray` 中有三个元素，则可以通过从 0 到 2 的索引来引用这些对象。与 C 和 Objective-C 语言中的大多数情况一样，索引从 0\
    \ 开始。\n\n__________\n\n¹ [`developer.apple.com/library/mac/#documentation/Cocoa/Reference/Foundation/Classes/NSSet_Class/Reference/Reference.html`](http://developer.apple.com/library/mac/#documentation/Cocoa/Reference/Foundation/Classes/NSSet_Class/Reference/Reference.html)\n\
    \n**代码清单 8–3.** *访问 NSArray 中的对象。*\n\n```\n 1  NSArray *myArray = [NSArray arrayWithObjects:\
    \ @\"One\", @\"Two\", @\"Three\", nil];\n 2  \n 3  NSLog (@\"%@\", [myArray objectAtIndex:0]);\n\
    \ 4  NSLog (@\"%@\", [myArray objectAtIndex:1]);\n 5  NSLog (@\"%@\", [myArray\
    \ objectAtIndex:2]);\n```\n\n可以看出，`NSArray` 中的对象可以通过*索引*来检索。索引从 0 开始，且不能超过数组大小减\
    \ 1。数组的大小可以通过向 `NSArray` 对象发送 `count` 消息轻松计算：\n\n```\nint entries = [myArray count];\n\
    ```\n\n实际上，每一种集合类型，`NSSet`、`NSArray`、`NSDictionary`（以及它们的可变对应类）都会响应 `count` 消息。\n\
    \n**注意：** 你可能已经注意到 `NSLog` 命令传递了一个类似 `:@\"%@\"` 的字符串。`%@` 是一种格式化字符串，可用于任何 Objective-C\
    \ 对象。它只是告诉对象描述自身。对于 `NSString` 来说，描述就是字符串本身。不同类型的对象有不同的描述。在代码清单 8–3 中，`[myArray\
    \ objectAtIndex:0]` 返回一个 `NSString` 对象。如果参数不是一个 Objective-C 类，你的程序会崩溃！\n\n如前所述，有一种方法可以利用\
    \ `NSArray` 来访问 `NSSet`。\n\n**代码清单 8–4.** 从现有的 NSSet 创建 NSArray。\n\n```\n 1  NSSet\
    \ *mySet = [NSSet setWithObjects:@\"One\", @\"Two\", @\"Three\", nil];\n 2  NSArray\
    \ *myArray = [NSSet allObjects];\n 3  \n 4  NSLog(@\"%@\", [myArray objectAtIndex:1);\n\
    ```\n\n除了*快速枚举*之外，使用 `allObjects` 方法可以从 `NSSet` 创建一个 `NSArray`。通常，你不会先创建一个集合然后再将其复制到数组中——为什么不一开始就直接创建数组呢？嗯，有时对象列表只能通过\
    \ `NSSet` 给出（处理 iOS 设备触摸事件时的 `touchesBegan: withEvent:` 方法就是一个完美的例子）。\n"
- fmt: "### NSDictionary\n\n`NSDictionary`类也是一种非常有用的集合类。与`NSSet`和`NSArray`一样，它允许存储对象，但`NSDictionary`的不同之处在于它允许将*键*与条目相关联。例如，可以创建一个存储`Animal`对象列表的`NSDictionary`。与`NSArray`通过索引访问`Animal`对象不同，`NSDictionary`可以使用像“monkey”这样的`NSString`作为键。然而，所有键必须是唯一的——也就是说，“monkey”不能出现多次。根据你的程序，找到唯一的名称通常不是问题。\n\
    \n使用上面的“monkey”例子——如果有5只不同的猴子，`NSDictionary`中只会包含一个对应“monkey”的条目。不过，这个条目本身可以是另一个包含五个唯一猴子名称的`NSDictionary`：\n\
    \n`\"monkey\" -> NSDictionary object`\n\n这个`NSDictionary`对象包含：\n\n`\"Spider\"\
    \ -> Animal Object`\n`\"Capuchin\" -> Animal Object`\n`\"Tamarin\" -> Animal Object`\n\
    `\"Mandril\" -> Animal Object`\n`\"Orangutan\" -> Animal Object`\n\n当然，`NSDictionary`可以通过多种不同的方式进行组织，具体取决于键的定义方式。在大多数情况下，不会出现`NSDictionary`的条目是另一个`NSDictionary`的情况——上面的例子只是为了展示`NSDictionary`（或一般的集合）的灵活性。\n\
    \n让我们看看上面的例子在代码中是如何实现的。例如，假设已经存在一个`Animal`对象列表，我们只是将其赋值给字典：\n\n**Listing 8–5.**\
    \ *Creating an NSDictionary with another NSDictionary.*\n\n```\n 1  NSDictionary\
    \ *zoo = [NSDictionary dictionaryWithObjectsAndKeys:\n 2                     \
    \  @\"elephant\", myElephantObject,\n 3                       @\"giraffe\", myGiraffeObject,\n\
    \ 4                       @\"monkey\", [NSDictionary dictionaryWithObjectsAndKeys:\n\
    \ 5                                   @\"Spider\", mySpiderMonkey,\n 6       \
    \                            @\"Capuchin\", myCapuchinMonkey,\n 7            \
    \                       @\"Tamarin\", myTamarinMonkey,\n 8                   \
    \                @\"Mandril\", myMandrilMonkey,\n 9                          \
    \         @\"Orangutan\", myOrangutanMonkey, nil]\n10                       @\"\
    zebra\", myZebraObject, nil];\n```\n\n现在主`NSDictionary`已经设置好了，我们如何知道什么时候获取的是`Animal`对象，什么时候获取的是`NSDictionary`对象呢？（提示：请阅读下一节的标题。）\n\
    \n### Determining Class Type in a Collection\n\n当遍历集合时，我们通常使用`id`类类型来表示我们不知道集合中的具体类。每个Objective-C对象都有两个便捷的方法来帮助我们。现在让我们来看看它们。\n\
    \n以[Listing 8–3](#Chapter08.html#list_8_3)中的代码为例，考虑以下代码片段：\n\n**Listing 8–6.**\
    \ *Handling different classes within a collection.*\n\n```\n11  for (id element\
    \ in [zoo allValues]) {\n12      if ([element isKindOfClass:[Animal class]]) {\n\
    13          NSLog(@\"%@\", id);\n14      }\n15      if ([element isKindOfClass:[NSDictionary\
    \ class]]) {\n16          ... // Process the monkey dictionary above.\n17    \
    \  }\n18  }\n```\n\n在[Listing 8–6](#Chapter08.html#list_8_6)中，我们使用快速枚举来遍历我们的动物园`NSDictionary`。由于只有两种可能性：`Animal`类或`NSDictionary`（动物字典），代码需要检查两种不同的类类型。如前所述，每个Objective-C对象都有两个便捷的方法。\n\
    \n*   第一个方法是`isKindOfClass:`。如果当前类（即我们的`element`变量）是某种类型的类，此方法返回一个布尔值。\n*   第二个便捷方法是`class`方法。此方法简单地返回对象的类；第12行是`Animal`类，第15行是`NSDictionary`类。\n\
    \n结合使用`isKindOfClass:`和`class`方法，可以相当简单地处理集合中不同类型的类。\n\n### Using the Mutable\
    \ Classes\n\n到目前为止，我们只讨论了初始化后便永远无法更改的集合对象。虽然这显然在某些地方很有用，但更实用的是可以修改的集合类。每个集合类都有一个**可变**版本——我们之前只讨论了**不可变**的类。这些类在本质上是相同的，唯一的区别是可变的版本可以添加和删除元素。\n\
    \n#### NSMutableSet\n\n它可以像`NSSet`一样被初始化，也可以不包含任何值进行初始化，然后再添加值。考虑[Listing 8–7](#Chapter08.html#list_8_7)中的代码：\n\
    \n**Listing 8–7.** *Adding objects to an NSMutableSet.*\n\n```\n 1  NSMutableSet\
    \ *mySet = [[NSMutableSet alloc] init];\n 2  \n 3  [mySet addObject:@\"One\"];\n\
    \ 4  [mySet addObject:@\"Two\"];\n 5  [mySet addObject:@\"Three\"];\n 6  \n 7\
    \  for (id val in mySet) {\n 8      NSLog(@\"%@\", val);\n 9  }\n```\n\n任何可变类的优点在于，可以以编程方式添加和删除元素，而不必在声明类时一次性包含所有值。可以使用以下代码行移除集合中的所有对象：\n\
    \n```\n    [mySet removeAllObjects];\n```\n\n只要拥有对某个对象的引用，也可以移除特定的对象：\n\n**Listing\
    \ 8–8.** *Removing a specific object in an NSMutableSet.*\n\n```\n10  NSString\
    \ *testString = @\"Zero\";\n11  \n12  [mySet addObject: testString];\n13  [mySet\
    \ addObject: testString];  // Just a test\n14  \n15  for (id val in mySet) {\n\
    16      NSLog(@\"%@\", val);\n17  }\n18  \n19  [mySet removeObject:testString];\n\
    20  \n21  for (id val in mySet) {\n22      NSLog(@\"%@\", val);\n23  }\n```\n\n\
    在[Listing 8–8](#Chapter08.html#list_8_8)中，第19行将移除字符串“Zero”。我们能够这样做，仅仅是因为我们已经在`testString`变量中持有对该对象的引用。这引出了另一个要点：`NSSet`和`NSMutableSet`只会存储*唯一的*对象。两个完全相同的对象（即，相同的指针）不能被添加多次。例如，第13行实际上替换了第12行添加的第一个`testString`。\n\
    \n**提示：** 添加完全相同的对象意味着指向该对象的指针是相同的。这里不会比较被添加对象的值是否与集合中已有的对象值相同——检查的是指针。指针将在[第11章](#Chapter11.html#ch11)中深入讨论。"
  raw: '#### NSDictionary


    The `NSDictionary` class is also a very useful type of collection class. It allows
    the storage of objects, just like the `NSSet` and `NSArray,` but the `NSDictionary`
    is different in that it allows a *key* to be associated with the entry. For example,
    an `NSDictionary` could be created that stores a list of `Animal` objects. Instead
    of accessing the Animal objects by an index like an `NSArray`, the `NSDictionary`
    could use an `NSString` like “monkey”. However, all keys must be unique—that is,
    “monkey” cannot exist more than once. Depending on your program, finding unique
    names is normally not a problem.


    Using the “monkey” example above—if there are 5 different monkeys, the `NSDictionary`
    would contain one entry for “monkey”. However, that entry could be in another
    `NSDictionary` that contains five unique monkey names:


    `"monkey" -> NSDictionary object`


    The `NSDictionary` object contains:


    `"Spider" -> Animal Object`

    `"Capuchin" -> Animal Object`

    `"Tamarin" -> Animal Object`

    `"Mandril" -> Animal Object`

    `"Orangutan" -> Animal Object`


    Of course, an `NSDictionary` could be organized in many different ways, depending
    on how the keys are defined. In most cases, there aren’t `NSDictionary` entries
    of `NSDictionaries`—the above example was just provided to show how flexible the
    `NSDictionary`, or collections in general, can be.


    Let’s see how the above example would look in code. For example, assume that a
    list of `Animal` objects already exists and we’re just assigning it to the dictionary:


    **Listing 8–5.** *Creating an NSDictionary with another NSDictionary.*


    ` 1  NSDictionary *zoo = [NSDictionary dictionaryWithObjectsAndKeys:`

    ` 2                       @"elephant", myElephantObject,`

    ` 3                       @"giraffe", myGiraffeObject,`

    ` 4                       @"monkey", [NSDictionary dictionaryWithObjectsAndKeys:`

    ` 5                                   @"Spider", mySpiderMonkey,`

    ` 6                                   @"Capuchin", myCapuchinMonkey,`

    ` 7                                   @"Tamarin", myTamarinMonkey,`

    ` 8                                   @"Mandril", myMandrilMonkey,`

    `9                                   @"Orangutan", myOrangutanMonkey,` **`nil`**`]`

    `10                       @"zebra", myZebraObject,` **`nil`**`];`


    Now that the main `NSDictionary` is set up, how do we know when we get an `Animal`
    object and when we get an `NSDictionary` object? (Hint: read the next section
    title.)


    #### Determining Class Type in a Collection


    When iterating through a collection, we generally use the **id** class type to
    indicate that we don’t know what class is in the collection. Each Objective-C
    object has two nifty methods to help us out. Let’s take a look at them now.


    Using the code in [Listing 8–3](#Chapter08.html#list_8_3) as an example, consider
    the following code fragment:


    **Listing 8–6.** *Handling different classes within a collection.*


    `11  for (id element in [zoo allValues]) {`

    `12      if ([element isKindOfClass:[Animal class]]) {`

    `13          NSLog(@"%@", id);`

    `14      }`

    `15      if ([element isKindOfClass:[NSDictionary class]]) {`

    `16          ... // Process the monkey dictionary above.`

    `17      }`

    `18  }`


    In [Listing 8–6](#Chapter08.html#list_8_6), we use fast enumeration to go through
    our zoo `NSDictionary`. Since there are only two possibilities: an `Animal` class
    or an `NSDictionary` of animals, the code needs to check for two different class
    types. As previously mentioned, each Objective-C object has two handy methods.


    *   The first is the `isKindOfClass:` method. This method returns a Boolean value
    if the current class, our element variable, is a type of class.

    *   The second handy method is the `class` method. This method simply returns
    the class of the object; line #12 is the `Animal` class. Line #15 is the `NSDictionary`
    class.


    Using a combination of the `isKindOfClass:` and the `class` methods makes it fairly
    simple to process different types of classes within a collection.


    ### Using the Mutable Classes


    Up to this point, we’ve only discussed collection objects that are initialized
    once and can never change. While there are definitely places this is useful, what’s
    even more useful is a collection class that can be modified. Each of the collection
    classes has a **mutable** version—we’ve only talked about the **non-mutable**
    classes. The classes are fundamentally the same except that elements can be added
    and removed from the mutable versions.


    #### NSMutableSet


    This can be initialized the same as the `NSSet` or can be initialized without
    any values and then values added. Consider the code in [Listing 8–7](#Chapter08.html#list_8_7):


    **Listing 8–7.** *Adding objects to an NSMutableSet.*


    ` 1  NSMutableSet *mySet = [[NSMutableSet alloc] init];`

    ` 2  `

    ` 3  [mySet addObject:@"One"];`

    ` 4  [mySet addObject:@"Two"];`

    ` 5  [mySet addObject:@"Three"];`

    ` 6  `

    ` 7  for (id val in mySet) {`

    ` 8      NSLog(@"%@", val);`

    ` 9  }`


    The nice thing about any of the mutable classes is that elements can be added
    and removed programmatically instead of having to declare the class with all the
    values at once. All objects in a set can be removed with the following line:


    `    [mySet removeAllObjects];`


    A specific object can also be removed as long as we have a reference to that object:


    **Listing 8–8.** *Removing a specific object in an NSMutableSet.*


    `10  NSString *testString = @"Zero";`

    `11  `

    `12  [mySet addObject: testString];`

    `13  [mySet addObject: testString];  // Just a test`

    `14  `

    `15  for (id val in mySet) {`

    `16      NSLog(@"%@", val);`

    `17  }`

    `18  `

    `19  [mySet removeObject:testString];`

    `20  `

    `21  for (id val in mySet) {`

    `22      NSLog(@"%@", val);`

    `23  }`


    In [Listing 8–8](#Chapter08.html#list_8_8), line #19 will remove the string “Zero”.
    We can only do this because we have a reference to the object already in the `testString`
    variable. This brings up another good point: the `NSSet` and `NSMutableSet` will
    only store *unique* objects. Two objects that are exactly the same (i.e., identical)
    cannot be added more than once. For example, line #13 effectively replaces the
    first `testString` added on line #12.


    **HINT:** Adding the exact same object means that the pointer to that object is
    the same. There is no comparison to see if the value of the object being added
    is identical to what’s already in the set—it’s the pointers that are checked.
    Pointers are discussed in depth in [Chapter 11](#Chapter11.html#ch11).'
