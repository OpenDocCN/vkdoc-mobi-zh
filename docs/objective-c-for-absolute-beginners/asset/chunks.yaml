    ### 数据类型与 Objective-C


    我们已经介绍了数据类型的基本原理，并编写了一个 Alice 应用来演示这些原理的运用，现在让我们编写一个 Objective-C 应用，来完成我们刚才在 Alice
    中实现的功能。


    在 Objective-C 中，我们使用的数据类型与 Alice 中类似。一些最常用于存储数字的数据类型包括整数（int）、双精度浮点数（double）、单精度浮点数（float）和长整数（long）。表
    3–5 列出了许多基本数据类型。其中许多类型将在后续章节中介绍。


    ![images](img/t0305.jpg)


    我们的 Objective-C 应用将添加两个整数，并将其和显示在控制台中。该应用还会显示文本“程序已成功终止。”这将既有趣又简单，所以我们开始吧。


    1.  作为 iOS 开发者，Xcode 是我们的核心工作环境，因此请打开 Xcode 并创建一个新项目。为此，请选择**文件** ![images](img/U001.jpg)
    **新建项目**，然后选择图 3–17 中所示的选项。点击“下一步”。


    ![images](img/0317.jpg)


    **图 3–17.** *打开一个新项目*


    **注意：** 新手在创建命令行应用时最常见的困难之一是在特定版本的 Xcode 中找到该项目。图 3–18 展示了运行在 Lion (10.7) 操作系统上的
    Xcode 4.2 版本。您的 Xcode 版本可能更新或更旧，菜单和选择选项也可能有所不同。因此，请在**文件** ![images](img/U001.jpg)
    **新建项目** 设置中查找对应的选项。如果您在寻找这些选项时遇到困难，请访问本书论坛 forum.xcelme.com 并进入本章节。我们将乐意回答您的问题。


    2.  将产品名称保存为 第 3 章（参见图 3–18）。然后选择保存项目的目录，并点击“下一步”。


    ![images](img/0318.jpg)


    **图 3–18.** *项目设置。*


    ![images](img/0319.jpg)


    **图 3–19.** *创建完成后，选择 `main.m` 文件，您的 Xcode 项目应如图所示*


    3.  创建项目后，您需要在编辑器中打开源代码文件。打开 `main.m` 源文件。（参见图 3–19）


    如果您以前在计算机编程中没见过 `//`，它允许程序员对其代码进行注释。注释不会被应用程序编译，而是作为程序员或（更重要的）后续开发者的备注。注释有助于原始开发者和后续开发者理解应用的开发方式。


    有时，注释需要跨越多行或仅覆盖一行的一部分。这可以通过 `/*` 和 `*/` 实现。`/*` 和 `*/` 之间的所有文本都被视为注释，不会被编译。


    在我们的示例中，首先需要声明并初始化变量 `firstNumber` 和 `secondNumber`。良好的实践是在声明变量时或之后立即进行初始化。


    然后，我们将变量 `firstNumber` 和 `secondNumber` 各增加 1。接着打印 `firstNumber` 和 `secondNumber`
    的和。


    最后，我们将在控制台输出“程序已成功终止。”参见图 3–20


    ![images](img/0320.jpg)


    **图 3–20.** *用于控制台输出的代码*


    `NSLog` 是一个可以接受一个或多个参数的函数。第一个参数通常是需要打印到控制台的字符串。字符串前的 `@` 符号告诉编译器这是一个 Objective-C
    类型的字符串，而非 C++ 字符串。在 iPhone 应用中，`@` 符号通常用于所有字符串前面。如果不使用 `@` 符号，您很可能会遇到编译错误。`NSLog`
    是开发者用于测试代码执行的非常实用的函数。


    `%d` 告诉编译器将打印一个整数，并用该整数的值替换 `%d`。其他 `NSLog` 格式化说明符请参见表 3–5。最后，我们的第二个参数是要打印的整数。


    图 3–21 展示了我们应用完成执行后的输出结果。


    要编译并运行您的应用，请点击工具栏上的**运行**按钮。我们可以看到，调试器打印出了 `NSLog` 字符串以及末尾的提示信息，表明应用执行成功。


    **注意：** 如果您的编辑器没有上一屏幕截图中显示的那些菜单或装订线（包含程序行号的左侧列），您可以在 Xcode 偏好设置中开启这些选项。您可以通过点击菜单栏中的
    Xcode 菜单，然后选择“偏好设置”来打开 Xcode 偏好设置。


    ![images](img/0321.jpg)


    **图 3–21.** *显示 Objective-C 应用结果的控制台日志*


    ### 问题识别


    信不信由你，您的程序可能并不会按照您想象的方式运行。查找应用问题的过程称为调试。为了追踪应用中的错误，我们可以设置断点并检查变量以查看其内容。为此，只需在装订线中您想设置断点的位置单击即可（参见图
    3–22）。断点会阻止我们的应用在该行继续执行，并允许我们检查变量。


    ![images](img/0322.jpg)


    **图 3–22.** *设置调试“断点”*


    编辑器装订线中的蓝色指针表示一个断点。当您运行应用程序，并且应用执行到包含断点的代码行时，应用将暂停，并在该行代码上显示一条蓝色横线，同时带有断点标记（参见图
    3–23）。此外，您还可以通过将鼠标悬停在变量上来检查每个变量。


    ![images](img/0323.jpg)


    **图 3–23.** *断点命中*


    我们将在第 14 章中进一步讨论应用的调试。


    ### 总结


    在本章中，您了解了应用如何使用数据。您看到了如何初始化变量以及如何向它们分配数据。我们解释了变量在声明时都关联有一个数据类型，并且只有相同类型的数据才能分配给变量。


    最后，我们向您展示了如何在您的第一个 Alice 应用中使用变量，并通过在 Objective-C 应用中使用变量来结束本章。


    ### 练习


    *   编写一个 Objective-C 控制台应用（命令行工具），将两个整数相乘并将结果显示在控制台中。

    *   编写一个 Objective-C 控制台应用，计算一个浮点数的平方。将结果浮点数显示在控制台中。

    *   编写一个 Objective-C 控制台应用，将两个浮点数相减，并将结果存储为整数。注意：不会发生四舍五入。


