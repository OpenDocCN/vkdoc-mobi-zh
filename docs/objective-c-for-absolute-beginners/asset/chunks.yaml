- fmt: '# Planning Properties


    Let’s look at the bookstore example and some of the classes we need to create.
    First, it is important to create a `Bookstore` class. A `Bookstore` class contains
    the blueprint of the information each `Bookstore` object stores, such as the bookstore
    name, address, phone number, and logo (see [Figure 5–2](#Chapter05.html#fig_5_2)).
    Placing this information in a class rather than hard coding it in your application
    will allow you to easily make changes to this information in the future. We will
    discuss the reasons for using OOP methodologies later in this chapter. Also, if
    your bookstore becomes a huge success and you decide to open up another one, you
    will be prepared because you can create another object of class `Bookstore`.


    ![images](images/0502.jpg)


    **Figure 5–2.** *The bookstore class*


    Let’s also plan out a `Customer` class (see [Figure 5–3](#Chapter05.html#fig_5_3)).
    Notice how the name has been broken into `First` `Name` and `Last` `Name`. This
    is very important to do. There will be times in your project when you may want
    to use only the first name of a customer, and it would be hard to separate the
    first name from the last if you didn’t plan ahead. Let’s say you want to send
    a letter to a customer letting them know about an upcoming sale. You do not want
    your greeting to say, "Dear John Doe." It would look much more personal to say,
    "Dear John."


    ![images](images/0503.jpg)


    **Figure 5–3.** *The customer class*


    You will also notice how we have broken out the address into its different parts
    instead of grouping it all together. We separated the `Address Line 1`, `Address
    Line 2`, `City`, `State`, and `ZIP`. This is very important and will be used in
    your application. Let’s go back to the letter you want to send informing your
    customers of a sale in your store. You might not want to send it to all of the
    customers that live in different states. By separating the address, you can easily
    filter out those customers you do not want to include in your mailings.


    We have also added the attribute of `Favorite Book Genre` to the `Customer` class.
    We added this to show you how you can keep many different types of information
    in each class. This field may come in handy if you have a new mystery title coming
    out and you want to send an e-mail alerting customers who are especially interested
    in mysteries. By storing this type of information, you will be able to specifically
    target different portions of your customer base.


    A `Book` class is also necessary in order to create our bookstore (see [Figure
    5–3](#Chapter05.html#fig_5_3)). We will store information about the book such
    as author, publisher, genre, page count, and edition number (in case there are
    multiple editions). The `Book` class will also have the price for the book.


    ![images](images/0504.jpg)


    **Figure 5–4.** *The book class*


    We also added another class called the `Sale` class (see [Figure 5–5](#Chapter05.html#fig_5_5)).
    This class is more abstract than the other classes we have discussed because it
    does not describe a tangible object. You will notice how we have added a reference
    to a customer and a book to the `Sale` class. Because the `Sale` class will track
    sales of books, we will need to know which book was sold and to which customer.


    ![images](images/0505.jpg)


    **Figure 5–5.** *The sale class*


    Now that we have planned out the properties of the classes, we will need to look
    at some methods that each of the classes will have.


    ## Planning Methods


    We will not add all of the methods now, but the more planning you can do at the
    beginning, the easier it will be for you down the line. Not all of your classes
    will have many methods. Some may not have any methods at all.


    **NOTE:** When planning your methods, remember to have them focus on a specific
    task. The more specific the method, the more likely it is that it can be reused.


    For the time being, we will not add any methods to the `Book` class or the `Bookstore`
    class. We will focus on our other two classes.


    For the `Customer` class, we will add methods to list the purchase history of
    that client. There may be other methods that you will need to add in the future
    but we will add just that one for now. Your completed `Customer` class diagram
    should look like [Figure 5–6](#Chapter05.html#fig_5_6). You will notice the line
    near the bottom separates the properties from the methods.


    ![images](images/0506.jpg)


    **Figure 5–6.** *The completed customer class*


    For the `Sales` class, we have added three methods. We added `Charge` `Credit`
    `Card`, `Print` `Invoice`, and `Checkout` (see [Figure 5–7](#Chapter05.html#fig_5_7)).
