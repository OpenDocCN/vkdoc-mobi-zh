    - 修改`Bookstore`对象，使其调用一个单独的方法来初始化`Book`对象列表（而不是将所有内容放在`init`方法中）。\n- `UITableViewCell`还有一个名为`detailTextLabel`的属性。尝试使用它，将其文本属性设置为某些内容。\n\
    - 使用Xcode修改界面，尝试更改`DetailViewController.xib`文件的背景颜色。\n\n更难的挑战：\n\n- 对`Bookstore`对象中的书籍进行排序，使它们在`MasterDetailView`上按升序显示。\n\
    \n# 第9章\n\n## 比较数据\n\n在本章中，我们将讨论编程中最基本也是最频繁的操作之一：比较数据。在我们的Bookstore示例中，如果客户正在寻找特定的书籍，您可能需要比较书名。如果客户有兴趣购买特定作者的书，您可能还需要比较作者。比较数据是开发人员执行的常见任务。您在上一章中学到的许多循环都需要您比较数据，以便知道代码何时应停止循环。\n\
    \n编程中的比较就像使用天平。一端有一个值，另一端有另一个值。中间有一个运算符。运算符决定了进行哪种比较。运算符的示例包括“大于”、“小于”或“等于”。\n\
    \n天平两端的值通常是变量。我们在[第3章](#Chapter03.html#ch3)中学习了不同类型的变量。通常，不同变量的比较函数会略有不同。您必须非常熟悉比较数据的函数和语法，因为这将是您开发的基础。\n\
    \n在本章中，我们将使用一个Bookstore应用程序的示例。该应用程序将允许用户登录应用程序、搜索书籍以及购买书籍。我们将尝试联系比较数据的不同方式，以展示它们在这类应用程序中是如何使用的。"
