- fmt: "### Creating the View\n\nLet's start by first getting our view ready. If you\
    \ need a refresher on how to build an interface in Xcode, please refer to [Chapter\
    \ 6](#Chapter06.html#ch6).\n\n1.  Click on the `DetailViewController.xib` file\
    \ in the Navigation Window. This will display Xcode's interface builder, as shown\
    \ in [Figure 8–8](#Chapter08.html#fig_8_8).\n\n    ![images](images/0808.jpg)\n\
    \n    **Figure 8–8.** *Preparing the MyBookstore detail view.*\n\n2.  Simply delete\
    \ the existing control that is just a placeholder for the detail view. We're going\
    \ to add some new fields to display some details about a selected book. Since\
    \ we deleted this control, we also need to remove the code that references it.\n\
    \    1.  In the `DetailViewController.h` file, remove the following line: `@property\
    \ (strong, nonatomic) IBOutlet UILabel *detailDescriptionLabel;`\n    2.  In the\
    \ `DetailViewController.m` file, remove the following line near the top of the\
    \ file: `@synthesize detailDescriptionLabel = _detailDescriptionLabel;`\n    3.\
    \  In the `DetailViewController.m` file, in the method named `configureView`,\
    \ remove the following line: `self.detailDescriptionLabel.text = [self.detailItem\
    \ description];`\n\n3.  Next, click on the Utilities icon for the view, as shown\
    \ in [Figure 8–9](#Chapter08.html#fig_8_9). This will bring up the view of controls\
    \ that we can place onto the view.\n\n    ![images](images/0809.jpg)\n\n    **Figure\
    \ 8–9.** *Selecting the Utilities Window and adding some Labels.*\n\n4.  Drag\
    \ and drop some Label objects from the Object Library onto the detail view, as\
    \ shown in [Figure 8–9](#Chapter08.html#fig_8_9). Make sure that the bottom Label\
    \ controls are set to the width of the view. This is so that they can hold a fairly\
    \ long amount of text. The two Label objects with the text \"Label\" in them are\
    \ the ones we're going to hook up to hold two of the values from our Book object:\
    \ the Title and Author(s).\n\n### Adding Instance Variables\n\nNext, we're going\
    \ to add some instance variables to the `DetailViewController` class. These instance\
    \ variables will correspond to the detail view's labels.\n\n1.  First, open up\
    \ the `DetailViewController.h` file and delete the `detailDescriptionLabel` property—we've\
    \ deleted it from the interface and we don't need it anymore.\n2.  Next, we'll\
    \ add two fields that will represent the labels on the detail view that we want\
    \ to store our book data into, as shown in [Listing 8-14](#Chapter08.html#list_8_14)\n\
    \n    **Listing 8-14.** *Modifying the `DetailViewController.h` file to include\
    \ the new Labels.*\n\n    ```\n    1  #import <UIKit/UIKit.h>\n    2\n    3  @interface\
    \ DetailViewController : UIViewController\n    4\n    5  @property (strong, nonatomic)\
    \ id detailItem;\n    6\n    7  @property (strong, nonatomic) IBOutlet UILabel\
    \ *titleLabel;\n    8  @property (strong, nonatomic) IBOutlet UILabel *authorLabel;\n\
    \    9\n    10 @end\n    ```\n\n3.  If you recall from [Chapter 7](#Chapter07.html#ch7),\
    \ the `IBOutlet` identifiers included in the properties let Xcode know that these\
    \ instance variables (`titleLabel` and `authorLabel`) are controls that appear\
    \ in a view. Next, right-click on the label right below the \"Title\" and drag\
    \ a New Referencing Outlet to the topmost object called the \"File's Owner\",\
    \ as shown in [Figure 8–10](#Chapter08.html#fig_8_10).\n\n    ![images](images/0810.jpg)\n\
    \n    **Figure 8–10.** *Defining a new referencing outlet for a Label object.*\n\
    \n4.  When dropped on the File's Owner, a secondary menu will pop up asking which\
    \ variable the new outlet should be connected to. We will connect this Label to\
    \ the `titleLabel` outlet, as shown in [Figure 8–11](#Chapter08.html#fig_8_11)\
    \ and [Figure 8–12](#Chapter08.html#fig_8_12).\n\n    ![images](images/0811.jpg)\n\
    \n    **Figure 8–11\\. *Selecting the `titleLabel` outlet.***\n\n    ![images](images/0812.jpg)\n\
    \n    **Figure 8–12\\. *Connection is complete.***\n\n5.  Repeat this step for\
    \ the Label object under the \"Author:\" Label, except connect the Label to the\
    \ `authorLabel` outlet.\n\n### Adding a Description\n\nNow, we need to add the\
    \ description to the view. The description is a little different in that it can\
    \ span multiple lines. For this, we're going to use the Text View object.\n\n\
    1.  Start by adding a \"Description:\" label to the view, as shown in [Figure\
    \ 8–13](#Chapter08.html#fig_8_13).\n\n    ![images](images/0813.jpg)\n\n    **Figure\
    \ 8–13.** *Adding a new Label object for the Description.*\n\n2.  Next, add the\
    \ Text View object to the detail view, as shown in [Figure 8–14](#Chapter08.html#fig_8_14).\
    \ The advantage the text view has is that it's easy to display multiple lines\
    \ of text. While the Label can display multiple lines, it's not as clean as the\
    \ Text View object.\n\n    **NOTE:** By default, the Text View control is filled\
    \ with all kinds of seemingly random text. This text is called Lorem Ipsum text.\
    \ If you ever need to load up a page with text, you can find any number of Lorem\
    \ Ipsum generators on the web. As for our Text View, the text can stay as it is\
    \ since we'll remove it during runtime. Plus, if it's cleared, it becomes a little\
    \ more difficult spotting exactly where the Text View is on the screen—it's white\
    \ on white!\n\n    ![images](images/0814.jpg)\n\n    **Figure 8–14.** *Adding\
    \ a Text View to the detail view.*\n\n3.  In order for the program to take advantage\
    \ of the Text View, we'll need to create an outlet for it, just as we did for\
    \ the title and description. Simply add a new property to the `DetailViewController.h`\
    \ file, as shown on line #9 in [Listing 8-15](#Chapter08.html#list_8_15).\n\n\
    \    **Listing 8-15.** *Adding an outlet for the Text View to hold a description.*\n\
    \n    ```\n    1   #import <UIKit/UIKit.h>\n    2\n    3   @interface DetailViewController\
    \ : UIViewController\n    4\n    5   @property (strong, nonatomic) id detailItem;\n\
    \    6\n    7   @property (strong, nonatomic) IBOutlet UILabel *titleLabel;\n\
    \    8   @property (strong, nonatomic) IBOutlet UILabel *authorLabel;\n    9 \
    \  @property (strong, nonatomic) IBOutlet UITextView *descriptionTextView;\n \
    \   10\n    11      @end\n    ```\n\n4.  Notice that the type is `UITextView`\
    \ instead of `UILabel`—this is very important. Also, don't forget to add the `descriptionTextView`\
    \ to the `@synthesize` statement in the `DetailViewController.m` file, as shown\
    \ below: `@synthesize titleLabel, authorLabel, descriptionTextView;`\n\n5.  Next,\
    \ right-click on the Text View of the `DetailViewController.xib` and connect it\
    \ to the `descriptionTextView` outlet. The process is the same as shown in [Figure\
    \ 8–10](#Chapter08.html#fig_8_10), [8–11](#Chapter08.html#fig_8_11), and [8–12](#Chapter08.html#fig_8_12),\
    \ except that we're connected to the `descriptionTextView` outlet.\n\n**CAUTION:**\
    \ As mentioned above, it's important to make the `descriptionTextView` property\
    \ a `UITextView` type. If, for example, it was accidentally made a `UILabel` object,\
    \ when trying to connect the Text View from the screen to the outlet, Xcode won't\
    \ be able to find the `descriptionTextView` outlet. Why? Because Xcode knows that\
    \ the control is a `UITextView` and is looking for an outlet that is of type `UITextView`."
  raw: "#### Creating the View\n\nLet's start by first getting our view ready. If\
    \ you need a refresher on how to build an interface in Xcode, please refer to\
    \ [Chapter 6](#Chapter06.html#ch6).\n\n1.  Click on the DetailViewController.xib\
    \ file in the Navigation Window. This will display Xcode's interface builder,\
    \ as shown in [Figure 8–8](#Chapter08.html#fig_8_8).\n\n    ![images](images/0808.jpg)\n\
    \n    **Figure 8–8.** *Preparing the MyBookstore detail view.*\n\n2.  Simply delete\
    \ the existing control that is just a placeholder for the detail view. We're going\
    \ to add some new fields to display some details about a selected book. Since\
    \ we deleted this control, we also need to remove the code that references it.\n\
    \    1.  In the DetailViewController.h file, remove the following line: `@property\
    \ (strong, nonatomic) IBOutlet UILabel *detailDescriptionLabel;`\n    2.  In the\
    \ DetailViewController.m file, remove the following line near the top of the file:\
    \ `@synthesize detailDescriptionLabel = _detailDescriptionLabel;`\n    3.  In\
    \ the DetailViewController.m file, in the method named `configureView`, remove\
    \ the following line: `self.detailDescriptionLabel.text = [self.detailItem description];`\n\
    \n3.  Next, click on the Utilities icon for the view, as shown in [Figure 8–9](#Chapter08.html#fig_8_9).\
    \ This will bring up the view of controls that we can place onto the view.\n\n\
    \    ![images](images/0809.jpg)\n\n    **Figure 8–9.** *Selecting the Utilities\
    \ Window and adding some Labels.*\n\n4.  Drag and drop some Label objects from\
    \ the Object Library onto the detail view, as shown in [Figure 8–9](#Chapter08.html#fig_8_9).\
    \ Make sure that the bottom Label controls are set to the width of the view. This\
    \ is so that they can hold a fairly long amount of text. The two Label objects\
    \ with the text “Label” in them are the ones we're going to hook up to hold two\
    \ of the values from our Book object: the Title and Author(s).\n\n#### Adding\
    \ Instance Variables\n\nNext, we're going to add some instance variables to the\
    \ `DetailViewController` class. These instance variables will correspond to the\
    \ detail view's labels.\n\n1.  First, open up the `DetailViewController.h` file\
    \ and delete the `detailDescriptionLabel` property—we've deleted it from the interface\
    \ and we don't need it anymore.\n2.  Next, we'll add two fields that will represent\
    \ the labels on the detail view that we want to store our book data into, as shown\
    \ in [Listing 8-14](#Chapter08.html#list_8_14)\n\n    **Listing 8-14.** *Modifying\
    \ the DetailViewController.h file to include the new Labels.*\n\n    ` 1  #import\
    \ <UIKit/UIKit.h>`\n    ` 2`\n    ` 3  @interface DetailViewController : UIViewController`\n\
    \    ` 4`\n    ` 5  @property (strong, nonatomic) id detailItem;`\n    ` 6`\n\
    \    ` 7  @property (strong, nonatomic) IBOutlet UILabel *titleLabel;`\n    ` 8  @property\
    \ (strong, nonatomic) IBOutlet UILabel *authorLabel;`\n    ` 9`\n    `10 @end`\n\
    3.  If you recall from [Chapter 7](#Chapter07.html#ch7), the `IBOutlet` identifiers\
    \ included in the properties let Xcode know that these instance variables (`titleLabel`\
    \ and `authorLabel`) are controls that appear in a view. Next, right-click on\
    \ the label right below the “Title” and drag a New Referencing Outlet to the topmost\
    \ object called the “File's Owner”, as shown in [Figure 8–10](#Chapter08.html#fig_8_10).\n\
    \n    ![images](images/0810.jpg)\n\n    **Figure 8–10.** *Defining a new referencing\
    \ outlet for a Label object.*\n\n4.  When dropped on the File's Owner, a secondary\
    \ menu will pop up asking which variable the new outlet should be connected to.\
    \ We will connect this Label to the `titleLabel` outlet, as shown in [Figure 8–11](#Chapter08.html#fig_8_11)\
    \ and [Figure 8–12](#Chapter08.html#fig_8_12).\n\n    ![images](images/0811.jpg)\n\
    \n    **Figure 8–11\\. *Selecting the titleLabel outlet.***\n\n    ![images](images/0812.jpg)\n\
    \n    **Figure 8–12\\. *Connection is complete.***\n\n5.  Repeat this step for\
    \ the Label object under the “Author:” Label, except connect the Label to the\
    \ `authorLabel` outlet.\n\n#### Adding a Description\n\nNow, we need to add the\
    \ description to the view. The description is a little different in that it can\
    \ span multiple lines. For this, we're going to use the Text View object.\n\n\
    1.  Start by adding a “Description:” label to the view, as shown in [Figure 8–13](#Chapter08.html#fig_8_13).\n\
    \n    ![images](images/0813.jpg)\n\n    **Figure 8–13.** *Adding a new Label object\
    \ for the Description.*\n\n2.  Next, add the Text View object to the detail view,\
    \ as shown in [Figure 8–14](#Chapter08.html#fig_8_14). The advantage the text\
    \ view has is that it's easy to display multiple lines of text. While the Label\
    \ can display multiple lines, it's not as clean as the Text View object.\n\n \
    \   **NOTE:** By default, the Text View control is filled with all kinds of seemingly\
    \ random text. This text is called Lorem Ipsum text. If you ever need to load\
    \ up a page with text, you can find any number of Lorem Ipsum generators on the\
    \ web. As for our Text View, the text can stay as it is since we'll remove it\
    \ during runtime. Plus, if it's cleared, it becomes a little more difficult spotting\
    \ exactly where the Text View is on the screen—it's white on white!\n\n    ![images](images/0814.jpg)\n\
    \n    **Figure 8–14.** *Adding a Text View to the detail view.*\n\n3.  In order\
    \ for the program to take advantage of the Text View, we'll need to create an\
    \ outlet for it, just as we did for the title and description. Simply add a new\
    \ property to the DetailViewController.h file, as shown on line #9 in [Listing\
    \ 8-15](#Chapter08.html#list_8_15).\n\n    **Listing 8-15.** *Adding an outlet\
    \ for the Text View to hold a description.*\n\n    ` 1   #import <UIKit/UIKit.h>`\n\
    \    ` 2`\n    ` 3   @interface DetailViewController : UIViewController`\n   \
    \ ` 4`\n    ` 5   @property (strong, nonatomic) id detailItem;`\n    ` 6`\n  \
    \  ` 7   @property (strong, nonatomic) IBOutlet UILabel *titleLabel;`\n    ` 8   @property\
    \ (strong, nonatomic) IBOutlet UILabel *authorLabel;`\n    ` 9   `**`@property\
    \ (strong, nonatomic) IBOutlet UITextView *descriptionTextView;`**\n    `10`\n\
    \    `     @end`\n4.  Notice that the type is `UITextView` instead of `UILabel`—this\
    \ is very important. Also, don't forget to add the `descriptionTextView` to the\
    \ `@synthesize` statement in the `DetailViewController.m` file, as shown below:\
    \ `@synthesize titleLabel, authorLabel, descriptionTextView;  `\n5.  Next, right-click\
    \ on the Text View of the DetailViewController.xib and connect it to the `descriptionTextView`\
    \ outlet. The process is the same as shown in [Figure 8–10](#Chapter08.html#fig_8_10),\
    \ [8–11](#Chapter08.html#fig_8_11), and [8–12](#Chapter08.html#fig_8_12), except\
    \ that we're connected to the `descriptionTextView` outlet.\n\n**CAUTION:** As\
    \ mentioned above, it's important to make the `descriptionTextView` property a\
    \ `UITextView` type. If, for example, it was accidentally made a UILabel object,\
    \ when trying to connect the Text View from the screen to the outlet, Xcode won't\
    \ be able to find the `descriptionTextView` outlet. Why? Because Xcode knows that\
    \ the control is a `UITextView` and is looking for an outlet that is of type `UITextView`."
  trans: "\n### 创建视图\n\n首先，我们来准备好视图。如果你需要复习如何在 Xcode 中构建界面，请参考第 6 章。\n\n1.  在导航窗口中点击\
    \ `DetailViewController.xib` 文件。这将显示 Xcode 的界面构建器，如图 8–8 所示。\n\n    ![images](img/0808.jpg)\n\
    \n    **图 8–8.** *准备 MyBookstore 的详情视图。*\n\n2.  直接删除作为详情视图占位符的现有控件。我们将添加一些新字段来显示所选图书的详细信息。由于我们删除了此控件，还需要移除引用它的代码。\n\
    \    1.  在 `DetailViewController.h` 文件中，删除以下行：`@property (strong, nonatomic) IBOutlet\
    \ UILabel *detailDescriptionLabel;`\n    2.  在 `DetailViewController.m` 文件中，删除文件顶部附近的以下行：`@synthesize\
    \ detailDescriptionLabel = _detailDescriptionLabel;`\n    3.  在 `DetailViewController.m`\
    \ 文件中，在名为 `configureView` 的方法中，删除以下行：`self.detailDescriptionLabel.text = [self.detailItem\
    \ description];`\n\n3.  接下来，点击视图的“工具”图标，如图 8–9 所示。这将弹出我们可以放置到视图上的控件面板。\n\n   \
    \ ![images](img/0809.jpg)\n\n    **图 8–9.** *选择工具窗口并添加一些标签。*\n\n4.  从对象库中拖放一些标签对象到详情视图上，如图\
    \ 8–9 所示。确保底部的标签控件宽度设置为视图的宽度。这样它们才能容纳较长的文本。两个文本内容为“Label”的标签对象将被用来连接并显示 Book 对象中的两个值：标题和作者。\n\
    \n### 添加实例变量\n\n接下来，我们要向 `DetailViewController` 类添加一些实例变量。这些实例变量将与详情视图的标签相对应。\n\
    \n1.  首先，打开 `DetailViewController.h` 文件并删除 `detailDescriptionLabel` 属性——我们已将其从界面中删除，不再需要它。\n\
    2.  然后，我们将添加两个字段，它们代表详情视图中我们想要存储图书数据的标签，如代码清单 8-14 所示。\n\n    **代码清单 8-14.** *修改\
    \ `DetailViewController.h` 文件以包含新的标签。*\n\n    ```\n    1  #import <UIKit/UIKit.h>\n\
    \    2\n    3  @interface DetailViewController : UIViewController\n    4\n   \
    \ 5  @property (strong, nonatomic) id detailItem;\n    6\n    7  @property (strong,\
    \ nonatomic) IBOutlet UILabel *titleLabel;\n    8  @property (strong, nonatomic)\
    \ IBOutlet UILabel *authorLabel;\n    9\n    10 @end\n    ```\n\n3.  如果你还记得第 7\
    \ 章的内容，属性中包含的 `IBOutlet` 标识符让 Xcode 知道这些实例变量（`titleLabel` 和 `authorLabel`）是出现在视图中的控件。接下来，右键点击“Title”下方的标签，并将“新引用插座（New\
    \ Referencing Outlet）”拖到最顶部的对象“文件所有者（File's Owner）”上，如图 8–10 所示。\n\n    ![images](img/0810.jpg)\n\
    \n    **图 8–10.** *为标签对象定义新的引用插座。*\n\n4.  当拖放到文件所有者上时，会弹出一个次级菜单，询问新插座应连接到哪个变量。我们将此标签连接到\
    \ `titleLabel` 插座，如图 8–11 和图 8–12 所示。\n\n    ![images](img/0811.jpg)\n\n    **图\
    \ 8–11.** *选择 `titleLabel` 插座。*\n\n    ![images](img/0812.jpg)\n\n    **图 8–12.**\
    \ *连接完成。*\n\n5.  对“Author:”标签下方的标签对象重复此步骤，但要将标签连接到 `authorLabel` 插座。\n\n### 添加描述\n\
    \n现在，我们需要将描述添加到视图中。描述略有不同，因为它可以跨越多行。为此，我们将使用文本视图对象。\n\n1.  首先，向视图添加一个“Description:”标签，如图\
    \ 8–13 所示。\n\n    ![images](img/0813.jpg)\n\n    **图 8–13.** *为描述添加一个新的标签对象。*\n\
    \n2.  然后，将文本视图对象添加到详情视图，如图 8–14 所示。文本视图的优势在于它易于显示多行文本。虽然标签也能显示多行，但不如文本视图对象干净利落。\n\
    \n    **注意：** 默认情况下，文本视图控件会填充各种看似随机的文本。这些文本称为 Lorem Ipsum 文本。如果你需要加载一个包含文本的页面，可以在网上找到许多\
    \ Lorem Ipsum 生成器。至于我们的文本视图，文本可以保持原样，因为我们会在运行时移除它。此外，如果清空了文本，在屏幕上准确定位文本视图的位置就会变得更加困难——它可是白色背景上的白色！\n\
    \n    ![images](img/0814.jpg)\n\n    **图 8–14.** *向详情视图添加文本视图。*\n\n3.  为了使程序能够利用这个文本视图，我们需要为其创建一个插座，就像我们为标题和描述所做的那样。只需向\
    \ `DetailViewController.h` 文件添加一个新属性，如代码清单 8-15 中的第 9 行所示。\n\n    **代码清单 8-15.**\
    \ *为文本视图添加插座以保存描述。*\n\n    ```\n    1   #import <UIKit/UIKit.h>\n    2\n    3\
    \   @interface DetailViewController : UIViewController\n    4\n    5   @property\
    \ (strong, nonatomic) id detailItem;\n    6\n    7   @property (strong, nonatomic)\
    \ IBOutlet UILabel *titleLabel;\n    8   @property (strong, nonatomic) IBOutlet\
    \ UILabel *authorLabel;\n    9   @property (strong, nonatomic) IBOutlet UITextView\
    \ *descriptionTextView;\n    10\n    11      @end\n    ```\n\n4.  注意类型是 `UITextView`\
    \ 而不是 `UILabel`——这一点非常重要。另外，不要忘记将 `descriptionTextView` 添加到 `DetailViewController.m`\
    \ 文件中的 `@synthesize` 语句里，如下所示：`@synthesize titleLabel, authorLabel, descriptionTextView;`\n\
    \n5.  接下来，右键点击 `DetailViewController.xib` 中的文本视图，并将其连接到 `descriptionTextView`\
    \ 插座。其过程与图 8–10、8–11 和 8–12 所示相同，只不过这次我们连接到的是 `descriptionTextView` 插座。\n\n**注意：**\
    \ 如上所述，确保 `descriptionTextView` 属性是 `UITextView` 类型非常重要。例如，如果它被意外地设置为 `UILabel`\
    \ 对象，那么当尝试将屏幕上的文本视图连接到插座时，Xcode 将无法找到 `descriptionTextView` 插座。为什么呢？因为 Xcode 知道该控件是一个\
    \ `UITextView`，并且正在寻找一个类型为 `UITextView` 的插座。\n"
- fmt: '#### Creating a Simple Data Model Class


    In order for our application to work, it needs to have some data to display. To
    do this, we''re going to use the `Bookstore` object we created earlier as our
    data model class. There''s nothing different about a data model class except that
    its whole purpose is to allow an application to access data via an object.


    Modify the `Bookstore.h` file to look like [Listing 8-16](#Chapter08.html#list_8_16).


    **Listing 8-16.** *Modifying the Bookstore.h class to include an NSMutableArray.*


    ```

     1  //

     2  //  Bookstore.h

     3  //  MyBookstore

     4  //

     5  //  Created by M.R. Fisher on 8/28/11.

     6  //  Copyright (c) 2011 www.committed-code.com. All rights reserved.

     7  //

     8  

     9  #import <Foundation/Foundation.h>

    10  #import "Book.h"

    11  

    12  @interface Bookstore : NSObject

    13  

    14  @property(strong, nonatomic) NSMutableArray *theBookStore;

    15  

    16  - (NSUInteger)count;

    17  - (Book *)bookAtIndex:(NSUInteger)index;

    18  

    19  @end

    ```


    In [Listing 8-16](#Chapter08.html#list_8_16), we add an `#import "Book.h"` on
    line #10. This lets our `Bookstore` object know about the `Book` object. Next,
    on line #14, we add a property that will hold our list of books; the property
    is simply named `theBookStore`. Note that `theBookStore` is an `NSMutableArray`,
    which will allow us to add a series of objects—in this case, a set of `Book` objects.
    Lastly, we add two new methods to our class on lines #16 and #17. The first method,
    `count`, will simply return how many books are in our bookstore. The second method,
    `bookAtIndex`, will return a `Book` object, given a specific index into `theBookStore`
    array.


    Next, let''s add the code to the implementation file, `Bookstore.m`.


    **Listing 8-17.** *Implementing the Bookstore data object.*


    ```

     1  //  Bookstore.m

     2  //  MyBookstore

     3  //

     4  //  Created by M.R. Fisher on 8/28/11.

     5  //  Copyright (c) 2011 www.committed-code.com. All rights reserved.

     6  //

     7  

     8  #import "Bookstore.h"

     9  

    10  @implementation Bookstore

    11  @synthesize theBookStore;

    12  

    13  - (id)init

    14  {

    15      self = [super init];

    16      if (self) {

    17          self.theBookStore = [[NSMutableArray alloc] init];

    18          Book *newBook = [[Book alloc] init];

    19          newBook.title = @"Objective-C for Absolute Beginners";

    20          newBook.author = @"Bennett, Fisher and Lees";

    21          newBook.description = @"iOS Programming made easy.";

    22          [self.theBookStore addObject:newBook];        

    23  

    24          newBook = [[Book alloc] init];

    25          newBook.title = @"A Farewell To Arms";      

    26          newBook.author = @"Ernest Hemingway";

    27          newBook.description = @"The story of an affair between an English
    "

    28                                 "nurse and an American soldier "

    29                                 "on the Italian front "

    30                                 "during World War I.";

    31          [self.theBookStore addObject:newBook];

    32      }

    33  

    34      return self;

    35  }

    36  

    37  - (NSUInteger)count

    38  {

    39      return theBookStore.count;

    40  }

    41  

    42  - (Book *)bookAtIndex:(NSUInteger)index

    43  {

    44      return [theBookStore objectAtIndex:index];

    45  }

    46  @end

    ```


    In [Listing 8-7](#Chapter08.html#list_8_7), lines #13–35 define the `init` method
    of the object, which is called whenever the object is first initialized. In this
    method, we initialize the two books we plan to add to our bookstore. Line #17
    initializes our `theBookStore` array—this is the `NSMutableArray` object where
    the books will be stored. Line #18 is where the first `Book` object is allocated
    and initialized. Lines #19–21 add a title, author, and description to our first
    book. Finally, line #22 adds the new `Book` object to our `theBookStore` array.
    The important thing to note here is that once the object is added to the array,
    our code can forget about it; the array now owns that object. Because of this,
    line #24 is not a problem.


    Line #24 allocates a new `Book` object overwriting the old value. This tells the
    compiler that we''re no longer interested in using the old value—plus, as mentioned
    above, the `NSMutableArray` object, `theBookStore`, now owns the old `Book` object
    anyhow.


    Lines #25–31 simply add the second book to the array.


    Lines #37–40 define a method called `count`. This method simply returns the number
    of elements in our bookstore array. The method to get the number of elements in
    an array is also called `count`.


    Lines #42–45 define a method called `bookAtIndex:`. Notice that it returns a `Book`
    object and takes in an `NSUInteger` value. This method simply calls the `NSMutableArray`
    method, `objectAtIndex:`, and returns the object at that specific index. We''ll
    use this method to get at the `Book` objects in our `Bookstore`.


    That''s it! That''s all we need to define a simple data model class. Next, we
    need to allow main program access to this class so that it can start displaying
    some data.'
