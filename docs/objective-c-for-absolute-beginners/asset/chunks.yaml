    \ has addresses, except that in some ways, memory addressing is much simpler.\
    \ Earlier in this chapter, we mentioned that a computer could solve the problem\
    \ of keeping track of boxes of old video games in a garage—virtually, of course.\
    \ The first part of this process is to be able to keep track of certain locations\
    \ in memory, called `addresses`. From a program’s perspective, these addresses\
    \ are stored into variables for later reference.\n\nMemory in a computer is a\
    \ linear set of bytes (or boxes) that store information. If you were to simply\
    \ start labeling these boxes as 1, 2, 3, 4, and so on, you would have a set of\
    \ boxes starting at 1 and ending with some very large number. These numbers are\
    \ referred to as a `memory address`.\n\n[Figure 13–8](#Chapter13.html#fig_13_8)\
    \ provides a simple example of addressing memory.\n\n![images](images/1308.jpg)\n\
    \n**Figure 13–8.** *A simple example of addressing.*\n\nIf each block is one byte,\
    \ the first byte starts at address `0×1000` and ends at `0×1037`. Remember that\
    \ the “0×” that precedes the number indicates that the number, in this case, the\
    \ address, is expressed in hexadecimal. So address `0×1000`, for example, is really\
    \ 4096 and not 1000. The number `0×1000` represents the start of our memory example.\
    \ At this location is the letter “A.” Also in the example is the letter “Z.” The\
    \ value of “Z” is located at the memory address of `0×1019`. The address `0×1000`\
    \ is an example of a simple 16-bit address. A 32-bit iPhone address would look\
    \ like `0×03C06D80`. A 64-bit address would be double the 32-bit size.\n\n**NOTE:**\
    \ If our program were given access to the memory in [Figure 13–8](#Chapter13.html#fig_13_8),\
    \ it would store the starting point of the memory, `0×1000`, into a variable.\
    \ This variable is commonly referred to as a `pointer`, since the value of the\
    \ variable (the address `0×1000`, which is just a number) points to the data we\
    \ are interested in, like an arrow on a map.\n\nAnother way to think of this grid\
    \ of memory is to consider it as an array. In this example, a variable has been\
    \ declared as an array. The array size is 56 characters in length, the exact same\
    \ size as our example in [Figure 13–8](#Chapter13.html#fig_13_8). Whenever a variable\
    \ is declared as an array, like `myArray`, the variable resolves to an address,\
    \ or pointer. For argument’s sake, let’s assume that `myArray` has an address\
    \ of `0×1000`, just like our grid in [Figure 13–8](#Chapter13.html#fig_13_8).\
    \ If you were to look at the variable `myArray`, it would have a value of `0×1000`.\
    \ Remember, an array resolves to an address. So how do we access the memory in\
    \ the array?\n\n```\nchar myArray[56];\n```\n\n**NOTE:** In C and Objective-C,\
    \ all arrays are **zero-based**. This means that the first element in the array\
    \ is at element zero, not one. An array of 30 elements would start at element\
    \ 0 and end at element 29. Element 30 is outside of the bounds of the array.\n\
    \nSince C and Objective-C use zero-based arrays, if the program needs to access\
    \ the first element in the array, it would be done as follows:\n\n```\nchar letterA\
    \ = myArray[0];\n```\n\nIn this case, `letter A` would be set to the first element\
    \ in the array, which would be the letter “A” (using [Figure 13–8](#Chapter13.html#fig_13_8)\
    \ as the array). What’s really happening under the hood is that the computer is\
    \ simply using the array index and adding it to the address. Again, if the address\
    \ is `0×1000`, adding 0 results in a new address of `0×1000`, which is where the\
    \ letter “A” resides.\n\n```\nchar letterZ = myArray[25];                 // or\
    \ myArray[0×19] if you are\n                                            // getting\
    \ into this hex thing!\n```\n\nIn the preceding example, `letter Z` would be set\
    \ to the value at element 25, which is the letter “Z.” The computer adds 25 (`0×19`)\
    \ to the base address of `0×1000`, resulting in a value of `0×1019`. This is where\
    \ the letter “Z” is. Remember, arrays are zero-based, so “Z” is at element 25\
    \ because “A” started at element 0; “Z” is still the 26th element (using natural\
    \ numbers, or counting numbers, that start at one).\n\nUsing the brackets (`[\
    \ ]`) after a pointer makes it very simple to access elements within that array\
    \ of memory. There is a different way to do this that will yield the same result.\
    \ This example will hopefully help the understanding of pointers and addresses\
    \ even more.\n\n**Listing 13–1.** *Using Pointers.*\n\n![images](images/U1301.jpg)\n\
    \nIn [Listing 13–1](#Chapter13.html#list_13_1), line 3 declares a new array. The\
    \ brackets (`[ … ]`) are empty because we’re assigning the array a value of the\
    \ alphabet. In this case, since we provide the values, the compiler knows what\
    \ size the array is going to be. So, our new array is just like [Figure 13–8](#Chapter13.html#fig_13_8):\
    \ the first value at element 0 is the letter “A,” and the last value at element\
    \ 25 (`0×19`) is the letter “Z.” `myArray` is equivalent to a pointer in that\
    \ it can be assigned directly to a pointer variable, as shown in line 7. It points\
    \ to memory that has the alphabet in it.\n\nLine 4 declares a variable that is\
    \ a pointer. `aPointer` is a pointer to a `char` data type, if line 4 were `int\
    \ *aPointer`, then `aPointer` would be a pointer to data of type `int`. In our\
    \ case, we’ll keep it as `char`. Remember, a pointer is just an address, and an\
    \ address is just a number.\n\nOn line 5, the program is declaring a character\
    \ variable. We’ll be using this variable to store data from the array.\n\nLine\
    \ 7 looks a little strange, but what it’s doing is assigning the `aPointer` variable,\
    \ the value of `myArray`. As mentioned previously, a variable that is an array\
    \ always resolves to a pointer. So, `myArray` is equivalent to a pointer, which\
    \ is an address, which is just a number. That number is assigned to `aPointer`.\
    \ The program does not copy the array to `aPointer`; it just sets the value of\
    \ `aPointer` to what `myArray` is. At this point in the program, `myArray` and\
    \ `aPointer` have the same value in that they both reference, or point to, the\
    \ same area of memory.\n\nLine 8 adds 25 to the address of `myArray` and returns\
    \ the value that is 25 bytes into the array, which results in the letter “Z.”\n\
    \nLine 9 adds 2 to the value of `aPointer`. Remember, `aPointer` is equal to `myArray`.\
    \ `aPointer + 2` now points to the letter “C.” If this seems a little off mathematically,\
    \ remember zero-based arrays:\n\n- `aPointer+0` points to “A”\n- `aPointer+1`\
    \ points to “B”\n- `aPointer+2` points to “C”\n\nHopefully, you are getting used\
    \ to zero-based arrays. Line 9 also makes use of the `dereference` `operator`,\
    \ the asterisk (`*`); there is more about this in the next section.\n\nLine 10\
    \ is equivalent to line 8. Both `myArray` and `aPointer` effectively point to\
    \ the same memory, so the array operator works."
  raw: '### Understanding Memory Address Basics


    Like buildings on a street, memory has addresses, except that in some ways, memory
    addressing is much simpler. Earlier in this chapter, we mentioned that a computer
    could solve the problem of keeping track of boxes of old video games in a garage—virtually,
    of course. The first part of this process is to be able to keep track of certain
    locations in memory, called **addresses**. From a program’s perspective, these
    addresses are stored into variables for later reference.


    Memory in a computer is a linear set of bytes (or boxes) that store information.
    If you were to simply start labeling these boxes as 1, 2, 3, 4, and so on, you
    would have a set of boxes starting at 1 and ending with some very large number.
    These numbers are referred to as a **memory address**.


    [Figure 13–8](#Chapter13.html#fig_13_8) provides a simple example of addressing
    memory.


    ![images](images/1308.jpg)


    **Figure 13–8.** *A simple example of addressing.*


    If each block is one byte, the first byte starts at address 0×1000 and ends at
    0×1037\. Remember that the “0×” that precedes the number indicates that the number,
    in this case, the address, is expressed in hexadecimal. So address 0×1000, for
    example, is really 4096 and not 1000\. The number 0×1000 represents the start
    of our memory example. At this location is the letter “A.” Also in the example
    is the letter “Z.” The value of “Z” is located at the memory address of 0×1019\.
    The address 0×1000 is an example of a simple 16-bit address. A 32-bit iPhone address
    would look like 0×03C06D80\. A 64-bit address would be double the 32-bit size.


    **NOTE:** If our program were given access to the memory in [Figure 13–8](#Chapter13.html#fig_13_8),
    it would store the starting point of the memory, 0×1000, into a variable. This
    variable is commonly referred to as a **pointer**, since the value of the variable
    (the address 0×1000, which is just a number) points to the data we are interested
    in, like an arrow on a map.


    Another way to think of this grid of memory is to consider it as an array. In
    this example, a variable has been declared as an array. The array size is 56 characters
    in length, the exact same size as our example in [Figure 13–8](#Chapter13.html#fig_13_8).
    Whenever a variable is declared as an array, like `myArray`, the variable resolves
    to an address, or pointer. For argument’s sake, let’s assume that `myArray` has
    an address of 0×1000, just like our grid in [Figure 13–8](#Chapter13.html#fig_13_8).
    If you were to look at the variable `myArray`, it would have a value of 0×1000\.
    Remember, an array resolves to an address. So how do we access the memory in the
    array?


    `        char myArray[56];`


    **NOTE:** In C and Objective-C, all arrays are **zero-based**. This means that
    the first element in the array is at element zero, not one. An array of 30 elements
    would start at element 0 and end at element 29\. Element 30 is outside of the
    bounds of the array


    Since C and Objective-C use zero-based arrays, if the program needs to access
    the first element in the array, it would be done as follows:


    `        char letterA = myArray[0];`


    In this case, `letter A` would be set to the first element in the array, which
    would be the letter “A” (using [Figure 13–8](#Chapter13.html#fig_13_8) as the
    array). What’s really happening under the hood is that the computer is simply
    using the array index and adding it to the address. Again, if the address is 0×1000,
    adding 0 result in a new address of 0×1000, which is where the letter “A” resides.


    `        char letterZ = myArray[25];                 // or myArray[0×19] if you
    are`

    `                                                    // getting into this hex
    thing!`


    In the preceding example, `letter Z` would be set to the value at element 25,
    which is the letter “Z.” The computer adds 25 (0×19) to the base address of 0×1000,
    resulting in a value of 0×1019. This is where the letter “Z” is. Remember, arrays
    are zero-based, so “Z” is at element 25 because “A” started at element 0; “Z”
    is still the 26th element (using natural numbers, or counting numbers, that start
    at one).


    Using the brackets (`[ ]`) after a pointer makes it very simple to access elements
    within that array of memory. There is a different way to do this that will yield
    the same result. This example will hopefully help the understanding of pointers
    and addresses even more.


    **Listing 13–1.** *Using Pointers.*


    ![images](images/U1301.jpg)


    In [Listing 13–1](#Chapter13.html#list_13_1), line 3 declares a new array. The
    brackets (`[ … ]`) are empty because we’re assigning the array a value of the
    alphabet. In this case, since we provide the values, the compiler knows what size
    the array is going to be. So, our new array is just like [Figure 13–8](#Chapter13.html#fig_13_8):
    the first value at element 0 is the letter “A,” and the last value at element
    25 (0×19) is the letter “Z.” myArray is equivalent to a pointer in that it can
    be assigned directly to a pointer variable, as shown in line 7\. It points to
    memory that has the alphabet in it.


    Line 4 declares a variable that is a pointer. aPointer is a pointer to a `char`
    data type, if line 4 were int *aPointer, then aPointer would be a pointer to data
    of type int. In our case, we’ll keep it as char. Remember, a pointer is just an
    address, and an address is just a number.


    On line 5, the program is declaring a character variable. We’ll be using this
    variable to store data from the array.


    Line 7 looks a little strange, but what it’s doing is assigning the aPointer variable,
    the value of `myArray`. As mentioned previously, a variable that is an array always
    resolves to a pointer. So, `myArray` is equivalent to a pointer, which is an address,
    which is just a number. That number is assigned to aPointer. The program does
    not copy the array to `aPointer`; it just sets the value of aPointer to what `myArray`
    is. At this point in the program, `myArray` and `aPointer` have the same value
    in that they both reference, or point to, the same area of memory.


    Line 8 adds 25 to the address of `myArray` and returns the value that is 25 bytes
    into the array, which results in the letter “Z.”


    Line 9 adds 2 to the value of `aPointer`. Remember, aPointer is equal to `myArray`.
    `aPointer + 2` now points to the letter “C.” If this seems a little off mathematically,
    remember zero-based arrays:


    *   `aPointer+0` points to “A”

    *   `aPointer+1` points to “B”

    *   `aPointer+2` points to “C”


    Hopefully, you are getting used to zero-based arrays. Line 9 also makes use of
    the **dereference** **operator**, the asterisk (*****); there is more about this
    in the next section.


    Line 10 is equivalent to line 8\. Both `myArray` and `aPointer` effectively point
    to the same memory, so the array operator works.'
  trans: '

    ### 理解内存地址基础


    就像街道上的建筑一样，内存也有地址，只不过在某些方面，内存寻址要简单得多。在本章前面部分，我们提到计算机可以在虚拟车库中解决追踪旧游戏机盒子的难题。这个过程的第一步是能够追踪内存中的特定位置，这些位置被称为`地址`。从程序的角度来看，这些地址被存储在变量中供后续引用。


    计算机中的内存是一组线性的字节（或称为盒子），用于存储信息。如果你只是简单地将这些盒子标记为 1、2、3、4，依此类推，你就会得到一组从 1 开始、以某个非常大的数字结束的盒子。这些数字被称为`内存地址`。


    图 13–8 提供了一个寻址内存的简单示例。


    ![images](img/1308.jpg)


    **图 13–8.** *寻址的简单示例。*


    如果每个块是一个字节，那么第一个字节从地址`0×1000`开始，到`0×1037`结束。请记住，数字前的“0×”表示该数字（此处指地址）是用十六进制表示的。例如，地址`0×1000`实际上是
    4096，而不是 1000。数字`0×1000`代表我们内存示例的起始位置。在这个位置存储的是字母“A”。示例中还有字母“Z”。“Z”的值位于内存地址`0×1019`处。地址`0×1000`是一个简单的
    16 位地址示例。一个 32 位 iPhone 的地址看起来像`0×03C06D80`。64 位地址的大小将是 32 位地址的两倍。


    **注意：** 如果我们的程序可以访问图 13–8 中的内存，它将会把内存的起始点`0×1000`存储到一个变量中。这个变量通常被称为`指针`，因为该变量的值（地址`0×1000`，仅是一个数字）指向我们感兴趣的数据，就像地图上的箭头一样。


    另一种看待这个内存网格的方式是将其视为一个数组。在这个例子中，一个变量被声明为一个数组。该数组的长度是 56 个字符，与图 13–8 中示例的大小完全相同。当一个变量（如`myArray`）被声明为数组时，该变量的值会解析为一个地址或指针。为了方便讨论，我们假设`myArray`的地址是`0×1000`，就像图
    13–8 中的网格一样。如果你查看变量`myArray`，它的值会是`0×1000`。记住，数组会解析为一个地址。那么，我们如何访问数组中的内存呢？


    ```

    char myArray[56];

    ```


    **注意：** 在 C 和 Objective-C 中，所有数组都是**从零开始**的。这意味着数组的第一个元素位于索引 0，而不是索引 1。一个包含 30
    个元素的数组将从元素 0 开始，结束于元素 29。元素 30 在数组的边界之外。


    由于 C 和 Objective-C 使用从零开始的数组，如果程序需要访问数组的第一个元素，可以这样操作：


    ```

    char letterA = myArray[0];

    ```


    在这个例子中，`letterA`将被设置为数组的第一个元素，即字母“A”（使用图 13–8 作为数组）。在底层，计算机实际上只是简单地使用数组索引并将其加到地址上。同样，如果地址是`0×1000`，加上
    0 得到的新地址仍然是`0×1000`，这正是字母“A”所在的位置。


    ```

    char letterZ = myArray[25];                 // 或者如果你喜欢用十六进制，可以写成 myArray[0×19]！

    ```


    在上面的例子中，`letterZ`将被设置为索引 25 处的值，即字母“Z”。计算机将 25（`0×19`）加到基地址`0×1000`上，得到的结果是`0×1019`。这就是字母“Z”所在的位置。记住，数组是从零开始的，所以“Z”位于索引
    25，因为“A”从索引 0 开始；“Z”仍然是第 26 个元素（使用从 1 开始的自然数或计数数）。


    在指针后使用方括号（`[ ]`），可以非常简单地访问该内存数组中的元素。还有一种不同的方法可以达到同样的效果。这个例子希望能帮助你更深入地理解指针和地址。


    **清单 13–1.** *使用指针。*


    ![images](img/U1301.jpg)


    在清单 13–1 中，第 3 行声明了一个新数组。方括号（`[ … ]`）是空的，因为我们直接将字母表作为数组的值进行赋值。在这种情况下，由于我们提供了值，编译器知道数组的大小。因此，我们的新数组就像图
    13–8 一样：索引 0 处的第一个值是字母“A”，索引 25（`0×19`）处的最后一个值是字母“Z”。`myArray`等同于一个指针，因为它可以直接赋值给一个指针变量，如第
    7 行所示。它指向包含字母表的内存区域。


    第 4 行声明了一个指针变量。`aPointer`是一个指向`char`数据类型的指针。如果第 4 行是`int *aPointer`，那么`aPointer`就是一个指向`int`类型数据的指针。在我们的例子中，我们将其保留为`char`类型。记住，指针只是一个地址，而地址只是一个数字。


    在第 5 行，程序声明了一个字符变量。我们将使用这个变量来存储数组中的数据。


    第 7 行看起来有点奇怪，但它实际上是在将`myArray`的值赋给`aPointer`变量。如前所述，作为数组的变量总是解析为一个指针。所以，`myArray`等同于一个指针，这个指针是一个地址，而这个地址只是一个数字。这个数字被赋值给`aPointer`。程序并没有将数组复制给`aPointer`；它只是将`aPointer`的值设置为`myArray`的值。在此程序点上，`myArray`和`aPointer`拥有相同的值，因为它们都引用或指向同一块内存区域。


    第 8 行向`myArray`的地址加上 25，并返回数组中偏移 25 个字节处的值，结果是字母“Z”。


    第 9 行将`aPointer`的值加 2。记住，`aPointer`等于`myArray`。`aPointer + 2`现在指向字母“C”。如果这在数学上看起来有点奇怪，请记住从零开始的数组：


    - `aPointer+0` 指向 “A”

    - `aPointer+1` 指向 “B”

    - `aPointer+2` 指向 “C”


    希望你已经逐渐习惯从零开始的数组。第 9 行还使用了`解引用` `运算符`，即星号（`*`）；下一节将对此进行更多介绍。


    第 10 行等价于第 8 行。`myArray`和`aPointer`都有效地指向同一块内存，因此数组运算符可以正常工作。

