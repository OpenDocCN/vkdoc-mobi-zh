    \ an event to your new method*\n\n2.  As you did for the Label objects, drag a\
    \ connection from the ***Touch Up Inside*** event and drop it on the Radio Station\
    \ App Delegate. This will bring up the IBAction method you just created in [Listing\
    \ 7–7](#Chapter07.html#list_7_7).\n3.  Simply choose **buttonClick:** (as shown\
    \ in [Figure 7–19](#Chapter07.html#fig_7_19)). This will connect the Touch Up\
    \ Inside event to your action, which will then set the Label text values to your\
    \ Radio Station.\n\n**TIP:** The “Round Rect Button” sends the Touch Up Inside\
    \ event whenever a user touches the *inside* of the button and then releases—not\
    \ until the user lifts his or her finger does the event actually get sent.\n\n\
    ![images](images/0719.jpg)\n\n**Figure 7–19.** *Choosing an action to connect\
    \ to the Touch Up Inside event*"
  trans: "\n### 创建用户界面\n\n接下来，需要设置主窗口，以便显示您的电台信息。\n\n1.  首先，点击 `ViewController.xib`\
    \ 文件，如图 Figure 7–10 所示。该文件是 iPhone 主屏幕。\n\n   ![images](img/0710.jpg)\n\n   **图\
    \ 7–10.** *在 iPhone 屏幕上添加标签对象*\n\n2.  拖拽三个标签对象到屏幕上，如图 Figure 7–11 所示。标签可以按任意方式对齐，或如图\
    \ Figure 7–11 所示对齐。\n3.  但是，您需要预留空间。将标签对象放到 iPhone 屏幕上后，双击该标签对象以更改其文本，使 iPhone\
    \ 屏幕看起来像 Figure 7–11 所示。\n\n   ![images](img/0711.jpg)\n\n   **图 7–11.** *iPhone\
    \ 屏幕上的所有三个标签*\n\n4.  接下来，在屏幕上添加一个圆角矩形按钮对象，如图 Figure 7–12 所示。按下该按钮后，屏幕将更新显示您的电台信息。\n\
    \n   ![images](img/0712.jpg)\n\n   **图 7–12.** *在屏幕上添加一个按钮*\n\n5.  与标签对象类似，只需双击圆角矩形按钮对象，将其标题更改为\
    \ **My Station**。\n6.  接下来，您需要添加用于保存电台信息的标签字段。这些字段位于现有标签之后，如图 Figure 7–13 所示。放置标签后，需要调整其大小，使其延伸到\
    \ iPhone 屏幕边缘。\n\n   ![images](img/0713.jpg)\n\n   **图 7–13.** *添加另一个标签对象*\n\n\
    \   ![images](img/0714.jpg)\n\n   **图 7–14.** *拉伸标签对象*\n\n   **注意：** 拉伸标签对象允许标签文本包含足够长的字符串。如果您**没有**调整标签大小，文本可能会被截断（因为放不下），或者字体大小会变小^(1)。\n\
    \n7. 重复添加和调整标签对象大小的操作，将其放置在现有的“频率”和“波段”标签旁边，如图 Figure 7–15 所示。暂时保留标签的默认文本 *“Label”*\
    \ 是可以的。\n\n__________\n\n¹ 通过使用代码或界面生成器，您可以自定义标签对象对过大文本的反应方式。所描述的行为基于标签对象的典型默认设置。\n\
    \n![images](img/0715.jpg)\n\n**图 7–15.** *添加另一个标签对象*\n\n### 连接代码\n\n现在所有用户界面对象都已就位，您可以开始将这些界面元素连接到程序中的变量。正如您在\
    \ 第 6 章中所见，这是通过*连接*用户界面对象和程序中的对象来实现的。\n\n1.  首先，将“电台名称”标签连接到您的变量，如图 Figure 7–16\
    \ 所示。右键单击“Station Name:”标签**旁边**的标签对象，调出连接窗口。\n\n   ![images](img/0716.jpg)\n\n\
    \   **图 7–16.** *创建连接*\n\n2.  当连接被拖放到“文件所有者”图标上时，会出现另一个小菜单。点击您希望在此标签中显示的实例变量名称——在本例中，您需要的是\
    \ `stationName` 实例变量，如图 Figure 7–17 所示。\n\n   ![images](img/0717.jpg)\n\n   **图\
    \ 7–17.** *将界面标签连接到您的 stationName 实例变量*\n\n3.  现在，界面标签对象已*连接*到 `stationName` 实例变量。无论何时设置实例变量的值，屏幕都会更新。**对“频率”和“波段”标签重复上述连接步骤。**\n\
    \n接下来，您需要将按钮连接到代码；但在那之前，您需要添加一些代码来处理实际的按钮点击，如 Listing 7–7 所示。将这些代码添加到 `ViewController.m`\
    \ 文件的底部。\n\n**Listing 7–7.** *创建 buttonClick 函数*\n\n```\n 1  - (IBAction)buttonClick:(id)sender\
    \ {\n 2      [stationName setText:[myStation name]];\n 3      [stationFrequency\
    \ setText:[NSString stringWithFormat:@\"%.1f\",\n 4                                          \
    \ [myStation frequency]]];\n 5      \n 6      if (([myStation frequency] >= [RadioStation\
    \ minFMFrequency]) &&\n 7          ([myStation frequency] <= [RadioStation maxFMFrequency]))\
    \ {\n 8          [stationBand setText:@\"FM\"];\n 9      } else {        \n10          [stationBand\
    \ setText:@\"AM\"];\n11      }\n12  }\n```\n\nListing 7–7 是一个方法，您将设置它在 iPhone\
    \ 屏幕上的按钮被按下时调用。首先，在第 1 行，您会注意到 `IBAction` 类型。这让 Xcode 知道此方法可以作为某个操作的结果而被调用。因此，当您去连接应用程序中的操作时，您会看到此方法。\n\
    \n第 2 行和第 3 行都将文本字段设置为 `RadioStation` 类中的值。\n\n```\n[stationName setText:[myStation\
    \ name]]\n```\n\n`stationName` 变量正是您刚刚连接到用户界面标签对象的变量，而 `[myStation name]` 用于返回电台的名称。\n\
    \n第 3 行实际上与第 2 行功能相同，但您必须先将 `double` 值（电台频率）转换为 `NSString`。`@\"%.1f\"` 意味着您转换一个浮点值，并且小数点后只显示一位数字。\n\
    \n第 6-11 行使用了您的实例变量和 `RadioStation` 类的类方法。在这里，您只需检查电台频率是否在 `minFMFrequency` 和\
    \ `maxFMFrequency` 之间。如果是，则该电台为 FM 电台；否则，假设其为 AM 波段。第 8 行和第 10 行将在屏幕上显示波段值。\n\n\
    您还需要确保界面文件包含您刚刚编写的新方法。如 [Listing 7–8] 所示，只需在 `ViewController.h` 文件的 `@end` **之前**添加以下代码行：\n\
    \n**Listing 7–7.**\n\n![images](img/U0703.jpg)\n\n现在，您可以将 iPhone 屏幕上的按钮连接到新创建的方法，如图\
    \ Figure 7–18 所示。\n\n1.  右键单击按钮，调出连接窗口。\n\n   ![images](img/0718.jpg)\n\n   **图\
    \ 7–18.** *将事件连接到您的新方法*\n\n2.  与标签对象的操作类似，从 **Touch Up Inside** 事件拖拽连接，并放到“电台应用代理”上。这将弹出您在\
    \ Listing 7–7 中创建的 `IBAction` 方法。\n3.  只需选择 `buttonClick:`（如图 Figure 7–19 所示）。这将把\
    \ Touch Up Inside 事件连接到您的操作，该操作随后会将标签文本值设置为您的电台信息。\n\n**提示：** 当用户触摸按钮*内部*然后松开手指时，“圆角矩形按钮”会发送\
    \ Touch Up Inside 事件——直到用户抬起手指，该事件才会真正发送。\n\n![images](img/0719.jpg)\n\n**图 7–19.**\
    \ *选择要连接到 Touch Up Inside 事件的操作*\n"
- fmt: "#### Running the Program\n\nOnce the connection has been made, you’re ready\
    \ to run and test your program! To do this, simply click the `Run` button at the\
    \ top-left of the Xcode window, as shown in [Figure 7–20](#Chapter07.html#fig_7_20).\n\
    \n![images](images/0720.jpg)\n\n**Figure 7–20.** *Running your program*\n\nIf\
    \ there are no compile errors, the iPhone emulator should come up and you should\
    \ see your application. Simply click the “My Station” button and the radio station\
    \ information will be displayed, as shown in [Figure 7–21](#Chapter07.html#fig_7_21).\n\
    \n![images](images/0721.jpg)\n\n**Figure 7–21.** *Showing your Radio Station information*\n\
    \nIf things don’t quite look or work right, retrace your steps and make sure all\
    \ the code and connections are in place as described above.\n\n#### Taking Class\
    \ Methods to the Next Level\n\nIn your program, you’ve not taken advantage of\
    \ all the class methods for `RadioStation`, but this chapter does describe what\
    \ a class method is and how it is used. Use that knowledge to try a few of the\
    \ exercises mentioned at the end of this chapter. Just play around with this simple\
    \ working program by adding or changing class or instance methods to get an idea\
    \ of how they work.\n\n### Accessing the Xcode Documentation\n\nWe cannot emphasize\
    \ enough the wealth of information provided in the Xcode `Developer Documentation`\
    \ dialog. When Xcode is opened, the `Help` menu will appear in the main menu (see\
    \ [Figure 7–10](#Chapter07.html#fig_7_10)). This is where the Developer Documentation\
    \ window can be opened.\n\n![images](images/0722.jpg)\n\n**Figure 7–22.** *The\
    \ Xcode help menu*\n\nOnce opened, the search window can be used to look up any\
    \ of the classes we’ve used in this chapter, including the `NSString` class documentation,\
    \ as shown in [Figure 7–23](#Chapter07.html#fig_7_23).\n\n![images](images/0723.jpg)\n\
    \n**Figure 7–23.** *The developer documentation window*\n\nThere are several different\
    \ things to discover about the `NSString` class shown in [Figure 7–23](#Chapter07.html#fig_7_23).\
    \ Go through the documentation and the various companion guides that Apple provides.\
    \ This will give you a more thorough understanding of the various classes and\
    \ the various methods supported by them.\n\n### Summary\n\nHere we are at the\
    \ end of another chapter. Once again, congratulate yourself for being able to\
    \ single-handedly stuff your brain with a lot of information! Here is a summary\
    \ of what was covered in this chapter:\n\n*   Objective-C classes review\n*  \
    \ Interface files\n    *   Instance variables\n    *   Class methods\n    *  \
    \ Instance methods\n*   Implementation files\n    *   Defining the method’s interface\
    \ in the interface file and putting code to that interface in the implementation\
    \ file\n    *   Limitations of using class methods vs. instance methods\n    *\
    \   Initializing the class and making use of the instance variables\n*   Making\
    \ use of your new `RadioStation` object\n    *   Building an iPhone App that uses\
    \ your new object\n    *   Connecting interface classes to instance variables\n\
    \    *   Connecting user interface events to methods in your class.\n\n### Exercises\n\
    \n*   Change the code that creates your `RadioStation` class and make the station’s\
    \ name much longer than what can appear on the screen. What happens?\n*   Modify\
    \ the `RadioStation` class using the instance variable that will indicate whether\
    \ the station is AM or FM (hint: you’ll need to change the `initWithName:Frequency:`\
    \ method to accept a new parameter for the radio band).\n*   Change the current\
    \ button and add a new button. Label the buttons FM and AM. If the user clicks\
    \ on the FM button, show an FM station. If the user clicks on the AM button, display\
    \ an AM station (hint: you’ll need to add a second `RadioStation` object to the\
    \ `RadioStationsAppDelegate.h` interface file).\n*   Clean up the interface a\
    \ little by making sure that the user doesn’t see the text “Label” when the iPhone\
    \ application first starts.\n    *   Fix the issue by using the interface tool.\n\
    \    *   How could you fix this by adding code to the application instead?\n*\
    \   Add more validation to the `(IBAction)buttonClick:(id)sender` method. Right\
    \ now, it validates FM ranges but not AM ranges. Fix the code so that it also\
    \ validates an AM range.\n    *   If the Radio Station frequency is out of bounds,\
    \ use the existing labels to display some type of error message.\n\n## Chapter\
    \ 8\n\n## Programming Basics in Objective-C\n\nObjective-C is a very elegant language.\
    \ It mixes the efficiency of the C language with the object-oriented goodness\
    \ of Smalltalk. This combination was introduced in the mid-1980s and is still\
    \ powering the fantastic applications behind the iPhone, iPad, and Mac OS X. How\
    \ does a language that is over 20 years old stay relevant and useful after all\
    \ of that time? Well, some of its success has to do with the fact that the two\
    \ languages that make up Objective-C are very well tested and very well designed.\
    \ Another reason is less obvious; the various frameworks available for the iPhone\
    \ and Mac OS X make developing full-featured applications much easier. These frameworks\
    \ benefit from the fact that they have been around awhile, which equates to stability\
    \ and high functionality. Lastly, Objective-C is highly dynamic. While we won’t\
    \ be focusing on that particular feature in this chapter, the dynamic nature of\
    \ Objective-C provides a flexibility not found in many compiled languages. With\
    \ all of these great features, Objective-C and the corresponding frameworks provide\
    \ an excellent palette from which to create a masterpiece!\n\nThis chapter will\
    \ introduce some of the more common concepts of Objective-C, such as properties\
    \ and collection classes. This chapter will also show how properties and instance\
    \ variables are used from within Xcode when dealing with user-interface elements.\
    \ This sounds like a lot to accomplish, but Objective-C, the Foundation framework,\
    \ and the Xcode tool provide a wealth of objects and methods and a way to build\
    \ applications with ease.\n\n### Collections\n\nUnderstanding collections is a\
    \ fundamental part of learning Objective-C. In fact, collection objects are fundamental\
    \ constructs of nearly every modern object–oriented language library—sometimes\
    \ they are referred to as containers. Simply put, a collection is a type of class\
    \ that can hold and manage other objects. The whole purpose of a collection is\
    \ that it provides a common way to store and retrieve objects efficiently.\n\n\
    There are several different types of collections. While they all fulfill the same\
    \ purpose of being able to hold other objects, they differ mostly in the way objects\
    \ are retrieved. Here is a list of the most common collections used in Objective-C:\n\
    \n*   `NSSet`\n*   `NSArray`\n*   `NSDictionary`\n*   `NSMutableSet`\n*   `NSMutableArray`\n\
    *   `NSMutableDictionary`\n\nNotice that, among the three collection classes listed,\
    \ there is one that contains the word `Mutable`. A mutable (vs. non-mutable) class\
    \ is one that can have items added and removed from it after the collection has\
    \ been created. Mutable means that it can be modified. Non-mutable collections\
    \ must be initialized with all of their values when they are first created and,\
    \ thereafter, cannot be modified."
