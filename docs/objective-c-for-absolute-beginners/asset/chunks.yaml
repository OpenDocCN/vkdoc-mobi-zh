    Anderson 公司信息系统经理、Smarsh 公司产品开发经理、iNation 公司应用开发副总裁，以及亚利桑那州最大建筑公司 Orcutt/Winslow
    Partnership 的信息技术经理。布拉德毕业于亚利桑那州立大学，现与妻子娜塔莉及五个孩子居住在凤凰城。

