    ## About the Authors


    ![image](images/gary_bennett.jpg) **Gary Bennett** is president of [xcelMe.com](http://xcelMe.com).
    [xcelMe.com](http://xcelMe.com) provides iPhone/iPad programming courses online.
    Gary has taught thousands of students how to develop iPhone/iPad apps, and has
    several very popular apps in the iTunes App Store. Gary''s students have some
    of the best-selling apps in the iTunes App Store. Gary also worked for 25 years
    in the technology and defense industries. He served 10 years in the US Navy as
    a nuclear engineer aboard two nuclear submarines. After leaving the Navy, Gary
    worked for several companies as a software developer, CIO, and president. As CIO,
    he helped take VistaCare public in 2002\. Gary also coauthored *iPhone Cool Projects*
    for Apress. He lives in Scottsdale, Arizona, with his wife Stefanie and their
    four children.


    ![image](images/mitch_fisher.jpg) **Mitch Fisher** is a software developer in
    the Phoenix, Arizona, area. He was introduced to PCs back in the 1980s when 640
    KB was considered more memory than anyone could ever use. Over the last 25 years,
    Mitch has worked for several large and medium-sized companies as asoftware engineer,
    software architect, and software manager, and has led teams of developers on multimillion-dollar
    projects. Mitch now divides his time between writing iOS applications, creating
    server-side UNIX technologies, and teaching iOS development at [`xcelMe.com`](http://xcelMe.com).


    ![image](images/brad_lees.jpg) **Brad Lees** has more than 14 years of experience
    in application development and server management. He has specialized in creating
    and initiating software programs in real estate development systems and financial
    institutions. Highlights of his professional career include his positions as information
    systems manager at The Lyle Anderson Company, product development manager for
    Smarsh, vice president of application development for iNation, and information
    technology manager at The Orcutt/Winslow Partnship, the largest architectural
    firm in Arizona. A graduate of Arizona State University, Brad resides in Phoenix
    with his wife Natalie and their five children.'
