- fmt: '#### Debugging Basics


    Set a breakpoint on the statement shown in [Figure 14–2](#Chapter14.html#fig_14_2).
    Next, as shown in [Figure 14–7](#Chapter14.html#fig_14_7), click the **Run** button
    to compile the project and start running it within the Xcode debugger.


    ![images](images/1407.jpg)


    **Figure 14–7.** *The Build and Debug button in the Xcode toolbar*


    Once the project builds, the debugger will start; the screen will show the debugging
    windows and the program will stop execution on the line statement, as shown in
    [Figure 14–8](#Chapter14.html#fig_14_8).


    ![images](images/1408.jpg)


    **Figure 14–8.** *The Debugger view with execution stopped on line 25*


    The debugger view adds some additional windows. Let’s go over the different parts
    of the debugger shown in [Figure 14–8](#Chapter14.html#fig_14_8).


    1.  **Debugger controls**: (circled in red) The debugging controls can pause,
    continue, step over, step into, and step out of statements in the program. The
    stepping controls are used most often. The first button on the left is used to
    show or hide the Debug area. In [Figure 14–8](#Chapter14.html#fig_14_8), the Debug
    area is shown.

    2.  **Variables:** The variables window displays the variables currently in scope.
    Clicking on the little triangle just to the left of a variable name will expand
    it.

    3.  **Output Window:** The output window will show very useful information in
    the event of a crash or exception. Also, any `NSLog` output goes here.

    4.  **Stack Trace:** The stack shows the object stack as well as all the threads
    currently active in the program. The stack is a hierarchical view of what methods
    are being called. For example, `main` calls `UIApplication` and `UIApplication`
    calls the `AppDelegate` class. These method calls “stack” up until they finally
    return, hence the name.


    #### Working with the Debugger Controls


    As mentioned previously, once the debugger starts, the view changes. What appears
    are the debugging controls (item B in [Figure 14–8](#Chapter14.html#fig_14_8)).
    The controls are fairly straightforward and are explained in [Table 14–1](#Chapter14.html#tab_14_1).


    ![images](images/t1401.jpg)


    #### Using the Step Controls


    To practice using the step controls, let’s step into a function. As the name implies,
    the **Step Into** button follows program execution into the method that is highlighted.
    Make sure there is a breakpoint set on the line statement shown in [Figure 14–8](#Chapter14.html#fig_14_8)
    (Line 25 of the example; yours may be different) of the `MasterViewController.m`
    file and click the Run button. Your screen should look similar to [Figure 14–9](#Chapter14.html#fig_14_9).


    ![images](images/1409.jpg)


    **Figure 14–9.** *The debugger stopped on line 25.*


    Click the **Step Into** button ![images](images/U1401.jpg) this will cause the
    debugger to go into the `init` method of the `Bookstore` object. The screen should
    look like [Figure 14–10](#Chapter14.html#fig_14_10).


    ![images](images/1410.jpg)


    **Figure 14–10.** *Stepping into the `init` method of the `Bookstore` object*


    It’s important to note that not only is the debugger in the `Bookstore` object,
    but the debugger has also moved to the `Bookstore.m` file (it used to be in the
    `MasterViewController.m` file).


    The control, **Step Over**, ![images](images/U1402.jpg) continues execution of
    the program, but doesn’t go into a method. It simply executes the method and continues
    to the next line. **Step Out**, ![images](images/U1403.jpg), is a little like
    the opposite of **Step Into**. If the **Step Out** button is clicked, the current
    method continues execution until it finishes. The debugger then returns back to
    the line before **Step Into** was clicked. For example, if the **Step Into** button
    is clicked on the line shown in [Figure 14–9](#Chapter14.html#fig_14_9) and then
    the **Step Out** button is clicked, the debugger will return to the `MasterViewController.m`
    file on the statement shown in [Figure 14–9](#Chapter14.html#fig_14_9) (line 25
    in the example), the line where the **Step Into** was made.


    #### Looking at the Thread Window and Call Stack


    As mentioned earlier, the thread window displays the current thread (there is
    only one in our program). However, it also displays the **call stack**. If we
    look at the difference between [Figures 14–9](#Chapter14.html#fig_14_9) and [14–10](#Chapter14.html#fig_14_10)
    as far as the thread window goes, we can see that [Figure 14–10](#Chapter14.html#fig_14_10)
    now has the `[Bookstore init]` method listed because `[MasterViewController initWithNibName:bundle:]`
    calls the `[Bookstore init]` method.


    Now, the call stack is not simply a list of functions that *have* been called;
    rather, it’s a list of functions that are currently *being* called. That’s a very
    important distinction. Once the `init` method is finished and returns (line 17),
    `[Bookstore init]` will no longer appear in the call stack. You can think of a
    call stack almost like a breadcrumb trail. The trail shows us how to get back
    to where we started.


    #### Debugging Variables


    It is possible to view some information about a variable (other than its memory
    address) by hovering over the variable. In our current example of the `Bookstore`,
    all the variables are synthesized properties. The problem is that they are not
    visible through the debugger. So, in order for the debugger to actually show these
    variables, we’ll have to explicitly declare them. To do this, simply navigate
    to the `Book.h` header file and add an instance variable called `title`, as shown
    in [Figure 14–11](#Chapter14.html#fig_14_11).


    ![images](images/1411.jpg)


    **Figure 14–11.** *Adding an explicit instance variable called `title`*


    (If you are currently running the application, click on the STOP icon in the upper
    left corner before modifying the `Book.h` file). Next, run the application. The
    debugger should stop at the breakpoint we placed in [Figure 14–9](#Chapter14.html#fig_14_9).
    Step into the statement; this will take the debugger to the `Bookstore.m` file.
    Next, step through the code using the step over command until the debugger is
    pointing to the “`newBook.author = …`” line.


    Position the cursor over any place the `newBook` variable appears and open the
    `Book` object. You should see what is displayed in [Figure 14–12](#Chapter14.html#fig_14_12).


    ![images](images/1412.jpg)


    **Figure 14–12.** *Hovering over the `newBook` variable reveals some information*


    Hovering over the `newBook` variable reveals its information. This variable is
    a local variable declared in this method. It can also be seen in the lower left
    Variable window. In [Figure 14–12](#Chapter14.html#fig_14_12), you can see the
    `newBook` variable expanded; it shows the same information we can see by hovering.


    The pertinent information in the `newBook` variable is the `NSCFConstantString`
    variable. To simplify things, just know that `NSCFConstantString` (Core Foundation
    `String`) is still the `NSString` class we used in building the `Book` class.
    The “Core Foundation” is simply the base library of classes Apple provides programmers.
    The information to the far right (gray colored text in the debugger) is the actual
    value of the class’ strings. When a variable’s contents change, the debugger highlights
    the variable’s new contents in blue italics, as you can see in the Variable window
    in [Figure 14–13](#Chapter14.html#fig_14_13). Since these are new values to the
    `newBook` class, the values are blue and in italics. For values that are unchanged,
    the debugger leaves them colored gray and not italicized.


    ![images](images/1413.jpg)


    **Figure 14–13.** *Value changes are highlighted in blue italics in the variable
    window.*'
