    #### 使用保留/释放模型


    保留和释放内存的过程是 Objective-C 广泛用于管理内存的一种方式。这个过程还有一个别名叫做引用计数，这个名称更具描述性，因为保留和释放内存的过程本质上是计算内存被保留（而非释放）的次数。请注意，这里“内存”是一个通用术语。Objective-C
    中的内存管理是为*对象*分配内存，而不仅仅是内存块。大多数 Objective-C 对象都派生自基类 `NSObject`，它负责跟踪对象的保留计数。


    **注意：** 如果你追求精确性，实际上是一组 `NSObject` 协议定义了引用计数的消息，而 `NSObject` 类实现了该协议。


    到目前为止，事情看起来相当简单：每次 `retain`，最终都需要有一次 `release`。这听起来不难，对吧？嗯，要知道一个对象何时被保留，并不总是那么直接。考虑代码清单
    13–8 中的示例。


    **代码清单 13–8.** *保留计数示例*


    ![图片](img/U1302.jpg)


    查看代码清单 13–8，可以看到 `dict` 和 `today` 对象的保留计数。`dict` 对象看起来很正常：每当对象被创建时，它的保留计数为 `1`。第
    2 行的 `today` 对象也是如此。


    到了第 4 行，情况看起来有点奇怪。出于某种原因，`today` 的保留计数现在变成了 `2`。发生了什么？如果我们仔细查看 `NSMutableDictionary`
    的 `setObject: forKey:` 方法的文档，我们会看到在 `setObject:` 的部分说明中提到“该对象在添加到接收器之前会收到一条 retain
    消息。”


    根据文档，在一个对象被添加到字典之前，该对象会收到一条 `retain` 消息。这就是为什么 `today` 的保留计数变成了 `2`。


    为什么字典要这样做呢？答案其实很简单。如果我们将一个对象添加到字典中，那么字典就应该对该对象负责；我们基本上是将对象交给它管理。我们可以释放我们添加到字典中的任何对象对应的局部变量。字典随后成为这些对象的所有者。为了确保这一点，`NSMutableDictionary`
    类会向其存储的所有数据发送一条 `retain` 消息，以便系统知道有对象正在使用该数据。


    由于 `dict` 正在管理这个对象，第 5 行用于释放我们自己的对象。字典依然持有与 `today` 对象相同的内存；我们只是告诉系统，我们已经不再需要它了。如果字典对象*没有*发送
    `retain` 消息，那么第 5 行实际上就会导致该内存被释放。规则很简单：一旦一个对象的保留计数通过 `release` 消息变为零，该对象就会收到一条
    `dealloc` 消息，该对象所占用的内存就会被真正释放。


    第 6 行是一个简单的约定，表示我们不再使用这个指针了。


    第 7 行通过键 `TODAY` 移除了对象。当一个对象从字典中被移除时，该对象会自动收到一条 `release` 消息。此时，`today` 曾经指向的那个对象会收到一条
    `release` 消息。由于这会使该对象的保留计数变为零，该对象也会收到一条 `dealloc` 消息来释放其内存。


    第 8 行简单地给 `dict` 对象发送了一条 `release` 消息。由于没有其他地方保留这个对象，这将释放该对象的内存。


    #### 处理隐式保留消息和自动释放


    我们如何知道哪些对象需要释放，哪些不需要？答案基本上取决于对象所有权规则。如果创建对象的消息名称中包含 `alloc`、`copy` 或 `new`，那么你就拥有该对象，因此，一旦程序使用完毕，就需要释放它。还有其他一些例子，但遗憾的是，没有硬性规定。正确地释放内存需要理解对象以及哪些消息会导致显式的
    `retain`。


    虽然对象可以收到显式的 `retain` 消息，但在我们前面的例子中，没有出现任何显式的 `retain`，因为存在自动或隐式的保留消息。例如，每当向字典对象发送
    `setObject: forKey:` 消息时，我们添加的对象会自动收到一条 `retain` 消息。如前所述，每当我们分配一个对象时，就隐含了一个 `retain`：


    `NSMutableDictionary *dict = [[NSMutableDictionary alloc] init];`


    其他调用则不那么明显，如下面的例子所示：


    ```

    NSDate* today = [NSDate date];

    ```


    在上面这个例子中，对象被分配了，但带有一个隐式的释放——称为自动释放（autorelease）。如前所述，任何包含 `alloc`、`copy`、`new`
    的方法都要求程序手动释放对象。对于其他情况，对象会被自动释放。


    关键在于，返回值是一个 `new` 日期对象。因为它是一个新对象，它会收到一种隐式的 `retain` 消息。但更重要的是，它将自动被释放，因为该对象不是通过
    `alloc`/`copy`/`new` 方法创建的。这段代码也可以写成如下形式：


    ```

    NSDate* today = [[[NSDate alloc] init] autorelease];

    ```


    这段代码会产生完全相同的结果。区别在于，在第二个例子中，我们显式地分配了内存，但将其标记为 `autorelease`。Objective-C 运行时系统会自动释放这块内存。虽然使用
    `autorelease` 似乎是处理内存释放的最佳方式，但它不一定总是我们需要的。标记为自动释放的变量不会存在很长时间。所有 iOS 和一些 Mac 应用程序都有一个叫做**运行循环**（run-loop）的机制。基本上，应用程序大部分时间都在等待输入。例如，如果你触摸屏幕，应用程序会执行一些功能，然后最终回到等待更多输入的状态。每当应用程序回到等待更多输入的状态时，所有自动释放的变量都会被释放；这段时间可能短至
    1/60 秒。因此，`autorelease` 应该谨慎使用，并且仅用于变量的生命周期在当前运行循环范围内的场景中。如果程序需要让一个自动释放的变量存活更长时间，那么要么不使用
    `autorelease`（使用标准的 `alloc` 和 `init`），要么简单地给该对象发送一条 `retain` 消息。


    **代码清单 13–9.** *保持自动释放变量可用*


    ```

    1   - (NSDate *)getDate

    2   {

    3       return [NSDate date];

    4   }

    5

    6   - (void)captureDate

    7   {

    8       // 捕获当前日期并存储在类的实例变量中

    9       currentDate = [[self getDate] retain];

    10   }

    11

    12   - (void)dealloc

    13   {

    14       // 释放 current_date 的内存

    15       [currentDate release];

    16   }

    ```


    注意第 9 行，我们调用了 `getDate` 方法，然后立即向返回的对象发送了一条 `retain` 消息。这是因为 `getDate` 返回的对象被设置为自动释放。如果程序不这样做，`currentDate`
    指向的内存就会被自动释放。


    **注意：** 在任何基于 Xcode 4.2 之前版本开发的 iOS 应用程序中，`main.m` 文件里都有一行看起来像这样的代码：


    ```

    NSAutoreleasePool * pool = [[NSAutoreleasePool alloc] init];

    ```


    这就是程序用来自动释放那些在分配时（就像我们上面的例子一样）已收到 `autorelease` 消息的内存的机制。`[NSDate date]` 返回的内存会被自动添加到这个自动释放池中，然后在下一次运行循环时自动释放。

