  trans: '

    当添加`#19–22`行代码后（如图 6-11 所示），警告消息便会消失。Xcode 4 的妙处在于，无需先尝试编译和运行程序，它就会报告键入代码中的任何警告或错误。这种即时反馈有时可能让人烦恼，但确实能节省时间。


    现在我们已经有了必要的代码，但在 iPhone 上还没有界面。接下来，我们将编辑界面，为应用添加两个界面对象。


    为了编辑 iPhone 的界面，我们需要单击`ViewController.xib`文件。`.xib`文件包含单个窗口或视图的所有信息。具有多个视图的应用将包含多个`.xib`文件。我们将使用
    Xcode 的界面编辑器，将标签（Label）等 UI 对象*连接*到我们刚刚创建的代码上。连接操作就像点击和拖动一样简单。


    我们不会修改`MainWindow.xib`文件。在我们的示例中，`MainWindow.xib`文件仅包含了我们的视图，即`ViewController.xib`文件。


    ![images](img/0612.jpg)


    **图 6–12.** *我们将要修改的 iPhone 界面*


    请注意，我们点击了屏幕右上角的最后一个`view button`（视图按钮），如图 6-12 所示。这会打开界面的实用工具视图。除其他功能外，此实用工具视图会显示我们可以在应用中使用的各种界面对象。我们只需关注前两个：`Round
    Rect Button`（圆角矩形按钮）和`Label`（标签）。


    第一步是从实用工具窗口中单击`Round Rect Button`。接着，将该对象拖拽到 iPhone 视图上，如图 6-13 所示。不用担心；拖拽该对象并不会将其从实用工具视图的对象列表中移除。拖拽出来会在我们的
    iPhone 界面上创建该对象的一个新副本。


    ![images](img/0613.jpg)


    **图 6–13.** *将按钮对象移动到 iPhone 视图上*


    接下来，双击刚刚添加到 iPhone 界面上的圆角矩形按钮（Round Rect Button）。这样可以将按钮的标题从无更改为“Name”（名称），如图
    6-14 所示。许多不同的界面对象操作方式都与此类似。只需双击并更改对象的标题即可。这也可以在代码中完成，但在界面编辑器中操作要简单得多。


    更改标题后，拖拽一个标签（Label）对象并将其放置在按钮正下方，如图 6-15 所示。


    ![images](img/U0605.jpg)


    **图 6–14.** *修改按钮标题*


    ![images](img/0615.jpg)


    **图 6–15.** *向 iPhone 界面添加标签对象*


    目前，我们可以将标签的文本保留为“Label”，因为这样在界面上容易找到它。如果清除了标签的文本，该对象仍然存在，但就没有可见的内容可供点击来选择标签了。通过向右拖拽中间的蓝色球体来扩大标签的尺寸，如图
    6-16 所示。


    ![images](img/0616.jpg)


    **图 6–16.** *扩大标签尺寸*


    现在我们同时拥有了按钮和标签，接下来就可以将这些可视化对象连接到我们的程序。首先，在按钮控件上点击鼠标右键。这会调出一个连接菜单，如图 6-17 所示。


    ![images](img/0617.jpg)


    **图 6–17.** *按钮对象的连接菜单*


    接着，我们从`Touch Up Inside`（手指抬起）连接圆圈点击并拖拽到`File’s Owner`（文件所有者）图标上，如图 6-18 所示。`Touch
    Up Inside`表示用户点击了按钮的*内部区域*。将连接拖拽到文件所有者（即`ViewController`对象）上，会将`Touch Up Inside`事件连接到`ViewController`对象。这样做的作用是，每当按钮被按下时，我们的对象都能收到通知。


    ![images](img/0618.jpg)


    **图 6–18.** *将 `Touch Up Inside` 事件连接到我们的对象*


    连接建立后，会显示一个可用于该连接的方法列表，如图 6-19 所示。在我们的示例中，只有一个方法，即`showName:`方法。选择`showName:`方法会将`Touch
    Up Inside`事件连接到我们的对象。


    ![images](img/0619.jpg)


    **图 6–19.** *选择处理 `Touch Up Inside` 事件的方法*


    连接完成后，详细信息会显示在按钮的连接菜单上，如图 6-20 所示。


    ![images](img/0620.jpg)


    **图 6–20.** *连接现已完成*


    接下来，我们为标签对象创建连接。在这种情况下，我们不关心标签的事件；相反，我们希望将`ViewController`的`nameLabel`输出口连接到 iPhone
    界面上的对象。这个连接基本上告诉我们的对象，我们想要设置文本的标签位于 iPhone 界面上。


    首先，在 iPhone 界面上的标签对象上点击鼠标右键。这会调出标签的连接菜单，如图 6-21 所示。标签对象的选项没有按钮对象那么多。


    ![images](img/0621.jpg)


    **图 6–21.** *标签对象的连接菜单*


    如上所述，我们在此不是为了连接事件。相反，我们连接的是所谓的*引用输出口*（Referencing Outlet）。此连接将屏幕对象连接到`ViewController`对象中的一个变量。就像按钮一样，将连接拖拽到`File’s
    Owner`图标上，如图 6-22 所示。


    ![images](img/0622.jpg)


    **图 6–22.** *将引用输出口连接到我们的对象*


    连接拖拽到文件所有者上后，会显示`ViewController`对象中的输出口列表，如图 6-23 所示。在两个选项中，我们选择`nameLabel`。这是我们正在使用的`ViewController`对象中的变量名称。


    ![images](img/0623.jpg)


    **图 6–23.** *选择对象的变量以完成连接*


    选择`nameLabel`后，我们就可以运行程序了。点击 Xcode 窗口左上角的`Run`（运行）按钮（参见图 6-6）。这将自动保存你的文件并在 iPhone
    模拟器中启动应用程序，如图 6-24 所示。


    ![images](img/0624.jpg)


    **图 6–24.** *我们的应用运行中，按钮按下前后对比*


    点击`Name`按钮后，标签的文本将从默认值“Label”更改为“My Name is Mitch!”或你输入的任何值。如果你愿意，可以回到界面中清除默认的标签文本。


    ## 总结


    本章的示例非常简单，但希望它们能激发你使用 Objective-C 和 Xcode 开发更复杂应用的兴趣。在后续章节中，你将学习更多关于面向对象编程的知识，以及
    Objective-C 的更多功能。你已经学到了很多，值得为自己鼓掌。以下是本章讨论的主题总结：


    *   Objective-C 语言的起源和简史，

    *   Objective-C 中常用的一些语言符号，

    *   一个 Objective-C 类的示例，

    *   程序的`@interface`和`@implementation`部分，

