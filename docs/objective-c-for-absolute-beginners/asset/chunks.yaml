- fmt: "#### `NSMutableArray`\n\nAs with the `NSMutableSet`, the `NSMutableArray`\
    \ is similar to its parent, the `NSArray`. In fact, an object can be added to\
    \ the `NSMutableArray` object exactly as it’s done in the `NSMutableSet` and that\
    \ is by using the `addObject:` method. However, unlike the `NSMutableSet`, the\
    \ `NSMutableArray` can also insert elements into the array—the `NSMutableSet`\
    \ can only add objects to the set. Take a look at [Listing 8–9](#Chapter08.html#list_8_9).\n\
    \n**Listing 8–9.** *Adding and inserting values into an NSMutableArray.*\n\n```\n\
     1  NSMutableArray *myArray = [[NSMutableArray alloc] init];\n 2  \n 3  [myArray\
    \ addObject:@\"One\"];\n 4  [myArray addObject:@\"Two\"];\n 5  [myArray addObject:@\"\
    Three\"];\n 6  \n 7  for (id val in myArray) {\n 8      NSLog(@\"%@\", val);\n\
     9  }\n10  \n11  [myArray insertObject:@\"One and a Half\" atIndex:1];\n12  \n\
    13  for (id val in myArray) {\n14      NSLog(@\"%@\", val);\n15  }\n```\n\nIn\
    \ [Listing 8–9](#Chapter08.html#list_8_9) a new array is created similarly to\
    \ the `NSMutableSet`. However, on line #11 a new element is being inserted into\
    \ the array at position 1. Remember, position 0 is the first element of the array.\
    \ The contents of the array after the insert would look like:\n\n![images](images/U0801.jpg)\n\
    \nLine #11 inserted a new element—the remaining elements were moved up in the\
    \ array to make room. This is critical to know, especially if there is a code\
    \ assumption that a particular index into an array will have a specific value.\n\
    \nWith the `NSMutableArray`, there are several ways to remove an object. Following\
    \ are a few of the more commonly used methods:\n\n*   `removeAllObjects` – This\
    \ method does exactly as advertised. It removes all objects from a given `NSMutableArray`.\n\
    *   `removeLastObject` – This method removes the last object at the end of the\
    \ array. The array size is reduced by one.\n*   `removeObjectAtIndex:(NSUInteger\
    \ index)` – This methods removes an object at a given index. The value is from\
    \ 0 to the length of the array—1.\n\n#### `NSMutableDictionary`\n\nBy this point,\
    \ it must be pretty obvious to you how the mutable versions of the collection\
    \ classes work—the `NSMutableDictionary` is no different. The `NSMutableDictionary`\
    \ provides all the capabilities of `NSDictionary` but, of course, elements can\
    \ be added and removed, as shown in [Listing 8–10](#Chapter08.html#list_8_10):\n\
    \n**Listing 8–10.** *Adding objects to an NSMutableDictionary.*\n\n```\n 1  \n\
     2  NSMutableDictionary *myDict = [[NSMutableDictionary alloc] init];\n 3  \n\
     4  [myDict setObject:@\"Number One\" forKey:@”1”];\n 5  [myDict setObject:@\"\
    Number Two\" forKey:@”2”];\n 6  [myDict setObject:@\"Number Three\" forKey:@”3”];\n\
     7  \n 8  for (id val in myDict) {\n 9      NSLog(@\"%@\", val);\n10  }\n11  \n\
    12  [myDict setObject:@\"One and a Half\" forKey:@”1.5”];\n13  \n14  for (id val\
    \ in myArray) {\n15      NSLog(@\"%@\", val);\n    }\n```\n\nIn the example above,\
    \ the object `@\"One and a Half\"` is being added to the dictionary. It’s different\
    \ than an array since an object can’t be inserted into the dictionary at a specific\
    \ position, as can be done with an `NSMutableArray`.\n\n### Creating the BookStore\
    \ Application\n\nFirst things first. Let’s start by creating the base application\
    \ project. We start by opening Xcode and creating a new Master-Detail Application\
    \ project. In this project, we will create a few simple objects for what is to\
    \ become our bookstore application: a `Book` object and the `Bookstore` object\
    \ itself. We’ll visit instance variables again and see how to get and set the\
    \ value of one during this project. Lastly, we’ll put our bookstore objects to\
    \ use, and you’ll learn how to make use of objects once we’ve created them.\n\n\
    Fire up Xcode, and start by creating a new project, as shown in [Figure 8–1](#Chapter08.html#fig_8_1).\n\
    \n![images](images/0801.jpg)\n\n**Figure 8–1.** *Creating the initial project\
    \ as a Master-Detail application.*\n\n1.  Click the **Next** button, and name\
    \ the project `MyBookstore`, as shown in [Figure 8–2](#Chapter08.html#fig_8_2).\
    \ The company name is required—any company name, real or otherwise, can be used.\
    \ The example uses `com.mycompany` which is perfectly fine. Make sure the device\
    \ family is iPhone and that the option “Use Automatic Reference Counting” is checked.\n\
    \n    ![images](images/0802.jpg)\n\n    **Figure 8–2.** *Selecting the product\
    \ (application) name and options.*\n\n2.  Once everything is filled out, press\
    \ the **Next** button. Xcode will prompt you to specify a place to save the project.\
    \ Anywhere you can remember is fine—the Desktop is a good place too.\n3.  Once\
    \ you decide on a location, click on the **Create** button to create the new project.\
    \ This will create the boilerplate Bookstore project, as shown in [Figure 8–3](#Chapter08.html#fig_8_3).\n\
    \n    ![images](images/0803.jpg)\n\n    **Figure 8–3.** *The source listing of\
    \ the boilerplate project.*\n\n4.  Click on the plus (**+**) sign at the lower\
    \ left of the screen in the Navigation Area to add a new object to the project.\
    \ Choose **Cocoa Touch** under the iOS section on the left and then choose the\
    \ **Objective-C Class** on the right, as shown in [Figure 8–4](#Chapter08.html#fig_8_4).\
    \ It’s also possible to right-click over the navigation area and then select the\
    \ “New File…” menu option. There is no difference between this approach and clicking\
    \ on the plus sign—do whatever feels more natural.\n\n    ![images](images/0804.jpg)\n\
    \n    **Figure 8–4.** *Creating a new Objective-C class.*\n\n5.  We’re choosing\
    \ a plain Objective-C class, which will create a new empty Objective-C object\
    \ that we’re going to use for our `Book` class. After selecting this, click on\
    \ the **Next** button.\n\n    ![images](images/0805.jpg)\n\n    **Figure 8–5.**\
    \ *Giving our new class a name and parent class.*\n\n6.  Xcode will now prompt\
    \ for the object name and which main object we’re going to be a subclass of. Choose\
    \ the name `Book` and make `Book` a subclass of `NSObject`, as shown in [Figure\
    \ 8–5](#Chapter08.html#fig_8_5), and then click the **Next** button.\n7.  Finally,\
    \ Xcode will ask to which folder it should save the new class files. To keep things\
    \ simple, choose the `MyBookstore` folder in our project, as shown in [Figure\
    \ 8–6](#Chapter08.html#fig_8_6). This is where all the other class files for our\
    \ project are stored.\n\n    ![images](images/0806.jpg)\n\n    **Figure 8–6.**\
    \ *Choosing the place to save our new class files.*\n\n    Double-click on the\
    \ `MyBookstore` folder and then click on the **Create** button. You’ll see the\
    \ main edit window for Xcode and our new class files, `Book.m` and `Book.h`, in\
    \ the Navigation window, as shown in [Figure 8–7](#Chapter08.html#fig_8_7).\n\n\
    8.  Repeat the above steps and create a second object called `Bookstore`. This\
    \ will create a `Bookstore.m` and a `Bookstore.h` file. We’ll be using this class\
    \ later in this chapter. For now, we’ll concentrate on the `Book` object.\n\n\
    \    ![images](images/0807.jpg)\n\n    **Figure 8–7.** *Viewing our new class.*\n\
    \n9.  Click on the `Book.h` file and let’s start defining our new class!"
