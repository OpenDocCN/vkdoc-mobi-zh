    ## 关于技术审校


    ![图片](img/james_bucanek.jpg) **詹姆斯·布卡内克**在过去 30 年间一直从事微机系统编程与开发工作。他拥有广泛的技术经验，涵盖从嵌入式消费产品到工业机器人等多个领域。詹姆斯目前专注于
    Macintosh 和 iPhone 软件开发。不编程时，他沉浸于对艺术的热爱，获得了皇家舞蹈学院古典芭蕾副学士学位，并偶尔在亚当斯芭蕾学院授课。


    ## 引言


    过去三年里，我们无数次听到这样的声音：


    - “我从未编过程序，但我对 iPhone/iPad 应用有个绝妙的主意。”

    - “我真的能学会为 iPhone 或 iPad 编程吗？”


    我们总是回答：“是的，但你必须相信自己可以。”只有你自己会告诉自己你做不到。


    ### 写给新手


    本书假设你之前可能从未编过程序。本书也为那些从未使用面向对象编程（OOP）语言编过程序的人而写。市面上有许多关于 Objective-C 的书籍，但这些书都假设读者有编程经验，并且了解
    OOP 和计算机逻辑。我们希望写一本能把对计算机编程和逻辑知之甚少甚至一无所知的读者，培养成能用 Objective-C 编程的书。毕竟，Objective-C
    是 iPhone、iPad 和 Mac 的原生编程语言。


    过去三年里，我们在`xcelMe.com`上教授了超过一千名学生，让他们成为 iPhone/iPad（iOS）开发者。我们的许多学生在 iTunes App
    Store 中开发了各自类别里最成功的 iOS 应用。我们将前两门课程（面向对象编程与逻辑入门、以及面向 iPhone/iPad 开发者的 Objective-C）中的经验融入了本书。


    ### 写给更有经验的开发者


    许多多年前编程过、或使用非 OOP 语言编程的开发者，在深入 Objective-C 之前需要了解 OOP 和逻辑背景。这本书就是为你准备的。我们会循序渐进地带你了解
    OOP 及其在 iOS 开发中的应用，帮助你成为一名成功的 iOS 开发者。


    ### 为什么选择 Alice：一个创新的 3D 编程环境


    多年来，大学计算机科学系一直面临几个问题：


    - 男女比例严重失衡

    - 高辍学率

    - 毕业时间超过平均水平


    学习 Java、C++或 Objective-C 这类 OOP 语言最大的挑战之一，就是从一开始就陡峭的学习曲线。过去，学生必须同时学习以下内容：


    - 面向对象原则

    - 复杂的集成开发环境（IDE），例如 Xcode、Eclipse、Visual Studio

    - 编程语言的语法

    - 编程逻辑与原则


    因此，卡内基梅隆大学获得了美国政府资助，开发了 Alice。Alice 是一个创新的 3D 编程环境，让新手开发者轻松创建丰富的图形化应用。Alice 是学生在
    OOP 环境中学习编程的教学工具。该软件使用 3D 图形和拖放界面，提供更吸引人、更少挫败感的初次编程体验。


    Alice 使学生能够专注于学习 OOP 原则，而不必同时学习复杂的 IDE 和 Objective-C 原则。你可以逐一专注于每个主题。这有助于学生在学习过程中获得真正的成就感。


    作为拖放式编程，Alice 消除了学习 IDE 和编程语言语法的所有复杂性。你会发现编程其实很有趣，并且可以在 Alice 中开发非常酷且复杂的应用。


    在介绍完 OOP 主题，读者对内容感到熟悉后，我们再进入 Xcode，让你运用新的 OOP 知识编写 Objective-C 应用。这样，你可以专注于 Objective-C
    语法和语言本身，而无需同时学习 OOP。


    ### 不使用 Alice 学习 Objective-C


    超过一千名`xcelMe.com`的学生使用本书成功成为 iOS 开发者。每门课程结束时，我们都会询问学生前四章中的 Alice 部分是否有用。超过一半的学生认为，在前四章开头使用
    Alice 来引入章节内容，对他们的成功至关重要。不过，也有部分学生认为他们不需要前四章开头的 Alice 示例。


    我们将本书前四章安排为：每章第一部分用 Alice 介绍 OOP 主题；剩余部分则用 Objective-C 介绍该主题。因此，如果你对该主题感到熟悉，可以跳过
    Alice 的内容。


    ### 本书的组织方式


    你会发现本书始终强调成就感。我们先在 Alice 中介绍 OOP 和逻辑概念，然后将这些概念迁移到 Xcode 和 Objective-C 中。许多学生是视觉型学习者或实践型学习者。我们两种方法都采用。我们会用视觉示例带你了解主题和概念，然后通过分步示例强化这些概念。


    我们经常在不同章节重复某些主题，以巩固所学内容，并以新方式运用这些技能。这使新手程序员能够重新应用开发技能，并在学习过程中获得成就感。如果你觉得某个主题尚未掌握，不必担心，继续前进吧！


    ### 成功公式


    学习编程是程序与你之间的一个互动过程。就像学习演奏乐器一样，你需要练习。你必须完成本书中的示例和练习。理解概念并不意味着你知道如何应用和使用它。


    你会从本书中学到很多。你会通过完成书中的练习学到很多。*然而，真正让你学到东西的是调试程序。* 花时间逐步检查代码，找出它为什么没有按你期望的方式运行，这是一个无与伦比的学习过程。调试的缺点是，新手开发者可能会感到特别沮丧。如果你从未想过把电脑扔出窗外，你会有这个念头的。你会质疑自己为什么要做这件事，以及自己是否足够聪明来解决这个问题。编程非常考验人，即使对最有经验的开发者也是如此。


    像音乐家一样，练习得越多，你就越擅长。我们说的练习，就是指编程！作为程序员，你可以做出一些令人惊叹的事情。世界尽在掌握。看到自己的应用出现在 iTunes
    App Store 中，是最令人满足的成就之一。然而，这是有代价的，这个代价就是花在编码和学习上的时间。


    在教授了超过一千名学生成为 iOS 开发者之后，我们总结出了一套让学生成功的公式。以下是我们的成功公式：


    - 相信自己能做到。唯一会说你做不到的人就是你自己。所以别对自己这么说。

    - 完成本书中的所有示例和练习。

    - 编码、编码、再编码。你编码越多，就会越擅长。

    - 对自己要有耐心。如果你有幸是一个只需阅读就能记住材料的全优生，这在 Objective-C 编码中不会发生。你需要花时间编码。

    - 通过阅读本书来学习。真正学习是在调试代码时。

    - 使用本章末尾介绍的免费`xcelMe.com`网络研讨会和 YouTube 视频。

    - 不要放弃！

    '
- fmt: '### The Development Technology Stack


    We will walk you through the process of understanding the development process
    for your iOS apps and what technology you need. However, briefly looking at all
    the pieces together is helpful. For a sample iPhone app in a Table View, see [Figure
    1](#Introduction.html#fig_A_1).


    ![images](images/in01.jpg)


    **Figure 1.** *The iPhone/iPad technology stack*


    ### Required Software, Materials, and Equipment


    One of the great things about Alice is it available on the three main operating
    systems used today:


    - Windows

    - Mac

    - Linux


    The other great thing about Alice is it is free! You can download Alice at [`www.Alice.org`](http://www.Alice.org).


    #### Operating System and IDE


    Although you can use Alice on many platforms, the Integrated Development Environment
    (IDE) that developers use to develop iOS apps is `Xcode`. You have to use an Intel-based
    Mac to use `Xcode` and submit apps! `Xcode` is free and is available in the Mac
    App Store.


    #### Software Development Kits


    You will need to register as an iOS developer. You can do this at [`http://developer.apple.com/iphone`](http://developer.apple.com/iphone).


    When you are ready to upload your app to the iTunes App Store, you will need to
    pay $99/year.


    #### Dual Monitors


    We recommend developers have a second monitor connected to their computer. It
    is great to step through your code and watch your output window and iPad simulator
    at the same time on dual independent monitors. Apple hardware makes this easy.
    Just plug your second monitor into the display port of any Intel-based Mac, with
    the correct Mini DisplayPort adapter of course, and you have two monitors working
    independently of one another. See [Figure 2](#Introduction.html#fig_A_2). Note
    that dual monitors are not required. You will just have to organize your open
    windows to fit on your screen if you don''t.


    ![images](images/in02.jpg)


    **Figure 2.** *Dual monitors*


    ### Free Live Webinars, Q&A, and YouTube Videos


    Nearly every Wednesday night at 7:30 p.m. Pacific daylight time, we have live
    webinars and discuss a topic from the book or a timely item of interest. These
    webinars are free, and you can register for them at [`www.xcelme.com/free-webinars.php`](http://www.xcelme.com/free-webinars.php).


    At the end of the webinars, we do a Q&A. You can ask a question on the topic discussed
    or any topic in the book.


    Additionally, all these webinars are recorded and available on YouTube.


    Make sure you subscribe to the YouTube channel so you are notified when new recordings
    are uploaded.


    ![images](images/in03.jpg)


    **Figure 3.** *Free Objective-C webinars and YouTube videos*


    #### Free Book Forum


    We have developed an online forum for this book at [`http://forum.xcelme.com`](http://forum.xcelme.com),
    where you can ask questions while you are learning Objective-C and get answers
    from the authors. You will also find answers to the exercises and additional exercises
    to help you learn. See [Figure 3](#Introduction.html#fig_A_3).


    You can also access answers to exercises and discover helpful links to help you
    become a successful iPhone/iPad developers and create great apps. See [Figure
    4](#Introduction.html#fig_A_4). So let''s get started!


    ![images](images/in04.jpg)


    **Figure 4.** *Reader Forum for accessing answers to exercise and posting questions
    for authors*


    ## Chapter 1


    ## Becoming a Great iOS or Mac Programmer


    Now that you’re ready to become a software developer and have read the Introduction
    of this book, you need to become familiar with several key concepts. Your computer
    program will do exactly what you tell it to do—no more and no less. It will follow
    the programming rules that were defined by the operating system and programming
    language. Your program doesn’t care if you are having a bad day or how many times
    you ask it to perform something. Often, what you think you’ve told your program
    to do and what it actually does are two different things.


    **KEY TO SUCCESS:** If you haven’t already, take a few minutes to read the Introduction
    of this book. The Introduction shows you where to go to access the free webinars,
    forums, and YouTube videos that go with each chapter. Also, you’ll better understand
    why we are using the Alice programming environment and how to be successful in
    developing your iOS and Mac apps.


    Depending on your background, working with something absolutely black and white
    may be frustrating. Many times, programming students have lamented, “That’s not
    what I wanted it to do!” As you begin to gain experience and confidence programming,
    you’ll begin to think like a programmer. You will understand software design and
    logic, and you will experience having your programs perform exactly as you want
    and the satisfaction associated with this.'
