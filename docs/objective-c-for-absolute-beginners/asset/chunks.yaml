- fmt: "#### Working with the Implementation File\n\nNow that you’ve seen what an\
    \ interface file looks like, let’s take a look at the **implementation file**.\
    \ First, the interface file had an `.h` extension; `RadioStation.h`, for example.\
    \ The implementation file has an `.m` extension—like `RadioStation.m`—as shown\
    \ in [Listing 7–2](#Chapter07.html#list_7_2).\n\nAnother important thing to note\
    \ is that the interface and implementation files have the same name (excluding\
    \ the extension). This convention is used universally: while there is nothing\
    \ preventing an interface and an implementation file from having different names,\
    \ having different names can cause much confusion, and tools like Xcode won’t\
    \ work as well. For example, the Xcode key sequence Control + Command + up-arrow\
    \ (^ + ![images](images/U002.jpg) + ![images](images/uparrow.jpg)) moves between\
    \ implementation and interface files, and it will not work if the two file names\
    \ are not the same.\n\n**Listing 7–2.** *Part of Your Implementation File*\n\n\
    ![images](images/U0702.jpg)\n\nWhen Xcode creates a class, it creates a very rudimentary\
    \ stub of an implementation file. [Listing 7–2](#Chapter07.html#list_7_2) starts\
    \ with the `#import` statement to your interface file. The `#import` statement\
    \ reads in your interface file for the class. As the compiler goes through your\
    \ implementation (`.m`) file, it needs to know what class it’s implementing, and\
    \ the interface file provides all the information that it needs.\n\nAn `#import`\
    \ statement tells the compiler to read in the specified file, because the compiler\
    \ needs to know about certain predefined things. For example, in your interface\
    \ file, the `RadioStation` class is a subclass of `NSObject`. The `NSObject` class\
    \ needs to be defined for the program to compile successfully. All of these objects\
    \ are part of the iOS Framework and are included via line #1 in the interface\
    \ file from [Listing 7–1](#Chapter07.html#list_7_1).\n\n`#import <Foundation/Foundation.h>`\n\
    \n**NOTE:** Look at the `#import` statements: one uses angle brackets (`< >`)\
    \ and the other uses plain double quotation marks (`\" \"`). The difference is\
    \ that a file in the angle brackets indicates a system-level file, which is located\
    \ using a predefined path that Xcode automatically sets up for your project. Any\
    \ file that has double quotation marks is searched for in the current project.\
    \ In our example, the `RadioStation.h` interface file is part of our project,\
    \ so we use double quotation marks, whereas the `Cocoa.h` file is a system file\
    \ and uses the angle brackets.\n\n#### Coding Your Methods\n\n[Listing 7–2](#Chapter07.html#list_7_2)\
    \ is a very simple example, but it demonstrates what many methods look like in\
    \ a class. First of all, if you look at the implementation and interface files\
    \ for one of the class methods, you can see the similarities. The following line\
    \ is from the interface file:\n\n`+ (double)minAMFrequency;`\n\nAs you can see,\
    \ it’s a class method because it starts with a (`+`). The next item `(double)`\
    \ is the type of value the method will return; in this case, a double. The next\
    \ part in the interface file is simply the name of the method, `minAMFrequency`.\n\
    \nThe following line is from the implementation file:\n\n```\n+ (double)minAMFrequency\
    \ {\n        return 520.0;\n}\n```\n\nThis line represents an implementation of\
    \ the method defined in the interface. The word “implementation” indicates that\
    \ the function is coded here. It looks almost identical to the interface file,\
    \ but now contains a block with some code, rather than simply ending with a semicolon.\n\
    \nIn the preceding example, the implementation of the `minAMFrequency` class method\
    \ simply performs a return of a numeric value (a double) of 520.0.\n\nGenerally,\
    \ a class has a definition of a method in an interface file and the actual code\
    \ of the method in an implementation file.\n\nNow, we will look at the implementation\
    \ of an **instance method** (see [Listing 7–3](#Chapter07.html#list_7_3)). There\
    \ are some significant differences between an instance and a class method; for\
    \ one, instance methods have the option to use the instance variables defined\
    \ in the interface file. Also, instance methods are only available once the class\
    \ has been instantiated.\n\n**Listing 7–3.** *The Implementation of an Instance\
    \ Method*\n\n```\n1  - (id)initWithName:(NSString *)newName atFrequency:(double)newFrequency\
    \ {\n2       self = [super init];\n3       if (self != nil) {\n4           name\
    \ = newName;\n5           frequency = newFrequency;\n6       }\n7\n8       return\
    \ self;\n9  }\n```\n\n[Listing 7–3](#Chapter07.html#list_7_3) illustrates the\
    \ implementation of one of the instance methods of your radio station class. An\
    \ initialization method accepts a new station name and frequency. Many OS X and\
    \ iOS classes have similar initialization instance methods. Instead of simply\
    \ initializing the class and then individually setting various values, many class\
    \ initialization methods allow special initialization methods, or, in this case,\
    \ multiple values to be passed on initialization.\n\nIn the preceding example,\
    \ line 1 is the interface of your method, and it contains two parameters: `newName`\
    \ and `newFrequency`. To use this method, the caller would simply do the following:\n\
    \n```\nRadioStation myStation = [[RadioStation alloc] initWithName:@\"WOW FM\"\
    \n                                               atFrequency: 102.5];\n```\n\n\
    This method is also defined to return an `id` value. An `id` is a generic object,\
    \ and all Objective-C objects are of the type `id`, just like the class `RadioStation`\
    \ is an object. Now, let’s look at the rest of the implementation.\n\nLine 2 references\
    \ two special variables that you don’t have to define anywhere. The keyword `self`\
    \ is used to mean “this instance of this class,” so line 2 is assigning “this\
    \ instance of this class”—the value returned from the use of the second special\
    \ variable: `super init`. The keyword `super` is short for “superclass,” which\
    \ can be thought of as “the parent of this class.” Any initialization type of\
    \ method will typically start with something that looks similar to line 2.\n\n\
    Why is line 2 even necessary? Well, if you have an object that is derived from\
    \ another object (remember, the class is expressed as `RadioStation : NSObject`),\
    \ you must tell the parent object to initialize itself. The parent will do the\
    \ same by telling its parent to initialize itself, and so on, until the topmost\
    \ object is reached. If another class used yours as a parent, your code would\
    \ also have to eventually get an `init` call so `RadioStation` could be initialized.\
    \ This is standard issue in the real world of Objective-C. A class needs to tell\
    \ its parent to initialize when the class is created, and it needs to tell its\
    \ parent to de-allocate itself whenever the class is going away.\n\nLine 3 checks\
    \ to see whether the `[super init]` call worked. If it worked, the value of `self`\
    \ would be something other than `nil`, which is a value that effectively means\
    \ “not initialized.”\n\nLines 4 and 5 set up the instance variables of this class\
    \ to the values passed into this method.\n\nLine 8 returns `self` to the caller.\
    \ Just like the call to `[super init]`, your initialization function needs to\
    \ return the new object back to the caller.\n\n### Using Your New Class\n\nYou’ve\
    \ created a simple `RadioStation` class, but by itself, it doesn’t accomplish\
    \ a whole lot. In this section, you will create the `Radio` class and have it\
    \ maintain a list of `RadioStation` classes."
  raw: '#### Working with the Implementation File


    Now that you’ve seen what an interface file looks like, let’s take a look at the
    **implementation** **file**. First, the interface file had an `.h` extension;
    `RadioStation.h`, for example. The implementation file has an `.m` extension—like
    `RadioStation.m`—as shown in [Listing 7–2](#Chapter07.html#list_7_2).


    Another important thing to note is that the interface and implementation files
    have the same name (excluding the extension). This convention is used universally:
    while there is nothing preventing an interface and an implementation file from
    having different names, having different names can cause much confusion, and tools
    like Xcode won’t work as well. For example, the Xcode key sequence Control + Command
    + up-arrow (^ + ![images](images/U002.jpg) + ![images](images/uparrow.jpg)) moves
    between implementation and interface files, and it will not work if the two file
    names are not the same.


    **Listing 7–2.** *Part of Your Implementation File*


    ![images](images/U0702.jpg)


    When Xcode creates a class, it creates a very rudimentary stub of an implementation
    file. [Listing 7–2](#Chapter07.html#list_7_2) starts with the `#import` statement
    to your interface file. The `#import` statement reads in your interface file for
    the class. As the compiler goes through your implementation (`.m`) file, it needs
    to know what class it’s implementing, and the interface file provides all the
    information that it needs.


    An `#import` statement tells the compiler to read in the specified file, because
    the compiler needs to know about certain predefined things. For example, in your
    interface file, the `RadioStation` class is a subclass of `NSObject`. The `NSObject`
    class needs to be defined for the program to compile successfully. All of these
    objects are part of the iOS Framework and are included via line #1 in the interface
    file from [Listing 7–1](#Chapter07.html#list_7_1).


    `#import <Foundation/Foundation.h>`


    **NOTE:** Look at the #import statements: one uses angle brackets (< >) and the
    other uses plain double quotation marks (" "). The difference is that a file in
    the angle brackets indicates a system-level file, which is located using a predefined
    path that Xcode automatically sets up for your project. Any file that has double
    quotation marks is searched for in the current project. In our example, the RadioStation.h
    interface file is part of our project, so we use double quotation marks, whereas
    the Cocoa.h file is a system file and uses the angle brackets.


    #### Coding Your Methods


    [Listing 7–2](#Chapter07.html#list_7_2) is a very simple example, but it demonstrates
    what many methods look like in a class. First of all, if you look at the implementation
    and interface files for one of the class methods, you can see the similarities.
    The following line is from the interface file:


    `+ (double)minAMFrequency;`


    As you can see, it’s a class method because it starts with a (+). The next item
    `(double)` is the type of value the method will return; in this case, a double.
    The next part in the interface file is simply the name of the method, `minAMFrequency`.


    The following line is from the implementation file:


    `+ (double)minAMFrequency {`

    `        return 520.0;`

    `}`


    This line represents an implementation of the method defined in the interface.
    The word “implementation” indicates that the function is coded here. It looks
    almost identical to the interface file, but now contains a block with some code,
    rather than simply ending with a semicolon.


    In the preceding example, the implementation of the `minAMFrequency` class method
    simply performs a return of a numeric value (a double) of 520.0.


    Generally, a class has a definition of a method in an interface file and the actual
    code of the method in an implementation file.


    Now, we will look at the implementation of an **instance method** (see [Listing
    7–3](#Chapter07.html#list_7_3)). There are some significant differences between
    an instance and a class method; for one, instance methods have the option to use
    the instance variables defined in the interface file. Also, instance methods are
    only available once the class has been instantiated.


    **Listing 7–3.** *The Implementation of an Instance Method*


    `1  - (id)initWithName:(NSString *)newName atFrequency:(double)newFrequency {`

    `2       self = [super init];`

    `3       if (self != nil) {`

    `4           name = newName;`

    `5           frequency = newFrequency;`

    `6       }`

    `7`

    `8       return self;`

    `9  }`


    [Listing 7–3](#Chapter07.html#list_7_3) illustrates the implementation of one
    of the instance methods of your radio station class. An initialization method
    accepts a new station name and frequency. Many OS X and iOS classes have similar
    initialization instance methods. Instead of simply initializing the class and
    then individually setting various values, many class initialization methods allow
    special initialization methods, or, in this case, multiple values to be passed
    on initialization.


    In the preceding example, line 1 is the interface of your method, and it contains
    two parameters: `newName` and `newFrequency`. To use this method, the caller would
    simply do the following:


    `RadioStation myStation = [[RadioStation alloc] initWithName:@"WOW FM"`

    `                                               atFrequency: 102.5];`


    This method is also defined to return an `id` value. An `id` is a generic object,
    and all Objective-C objects are of the type ‘`id’`, just like the class `RadioStation`
    is an object. Now, let’s look at the rest of the implementation.


    Line 2 references two special variables that you don’t have to define anywhere.
    The keyword `self` is used to mean “this instance of this class,” so line 2 is
    assigning “this instance of this class”—the value returned from the use of the
    second special variable: `super init`. The keyword `super` is short for “superclass,”
    which can be thought of as “the parent of this class.” Any initialization type
    of method will typically start with something that looks similar to line 2.


    Why is line 2 even necessary? Well, if you have an object that is derived from
    another object (remember, the class is expressed as `RadioStation : NSObject`),
    you must tell the parent object to initialize itself. The parent will do the same
    by telling its parent to initialize itself, and so on, until the topmost object
    is reached. If another class used yours as a parent, your code would also have
    to eventually get an `init` call so `RadioStation` could be initialized. This
    is standard issue in the real world of Objective-C. A class needs to tell its
    parent to initialize when the class is created, and it needs to tell its parent
    to de-allocate itself whenever the class is going away.


    Line 3 checks to see whether the `[super init]` call worked. If it worked, the
    value of `self` would be something other than `nil`, which is a value that effectively
    means “not initialized.”


    Lines 4 and 5 set up the instance variables of this class to the values passed
    into this method.


    Line 8 returns `self` to the caller. Just like the call to `[super init]`, your
    initialization function needs to return the new object back to the caller.


    ### Using Your New Class


    You’ve created a simple `RadioStation` class, but by itself, it doesn’t accomplish
    a whole lot. In this section, you will create the `Radio` class and have it maintain
    a list of `RadioStation` classes.'
  trans: "\n#### 处理实现文件\n\n现在你已经了解了接口文件的样子，让我们来看看**实现文件**。首先，接口文件的扩展名是 `.h`，例如 `RadioStation.h`。实现文件的扩展名是\
    \ `.m`，例如 `RadioStation.m`，如代码清单 7-2 所示。\n\n另一个需要注意的重要事项是，接口文件和实现文件的名称相同（不包括扩展名）。这个约定是普遍使用的：虽然接口文件和实现文件使用不同的名称并没有任何限制，但名称不同可能会造成很大的混乱，并且像\
    \ Xcode 这样的工具也无法正常工作。例如，Xcode 的快捷键 Control + Command + 上箭头（^ + ![images](img/U002.jpg)\
    \ + ![images](img/uparrow.jpg)）用于在实现文件和接口文件之间切换，如果两个文件名不相同，这个快捷键将无法工作。\n\n**代码清单\
    \ 7-2.** *实现文件的部分内容*\n\n![images](img/U0702.jpg)\n\n当 Xcode 创建一个类时，它会生成一个非常基本的实现文件框架。代码清单\
    \ 7-2 以 `#import` 语句开头，用于引入你的接口文件。`#import` 语句会读取该类的接口文件。当编译器处理你的实现文件（`.m`）时，它需要知道正在实现的是哪个类，而接口文件提供了所有需要的信息。\n\
    \n`#import` 语句告诉编译器读取指定的文件，因为编译器需要了解某些预定义的内容。例如，在你的接口文件中，`RadioStation` 类是 `NSObject`\
    \ 的子类。为了程序能成功编译，需要先定义 `NSObject` 类。所有这些对象都是 iOS 框架的一部分，并通过代码清单 7-1 中接口文件的第 1 行包含进来。\n\
    \n`#import <Foundation/Foundation.h>`\n\n**注意：** 注意 `#import` 语句：一个使用了尖括号（`< >`），另一个使用了普通的双引号（`\"\
    \ \"`）。区别在于，尖括号中的文件表示系统级文件，它通过 Xcode 为你的项目自动设置的预定义路径来定位。使用双引号的任何文件则会在当前项目中查找。在我们的例子中，`RadioStation.h`\
    \ 接口文件属于项目的一部分，所以我们使用双引号；而 `Cocoa.h` 文件是系统文件，使用了尖括号。\n\n#### 编写方法\n\n代码清单 7-2\
    \ 是一个非常简单的例子，但它展示了类中许多方法的常见形式。首先，如果你查看某个类方法的实现文件和接口文件，就能看到它们的相似之处。下面这行代码来自接口文件：\n\
    \n`+ (double)minAMFrequency;`\n\n如你所见，这是一个类方法，因为它以 `+` 开头。接着是 `(double)`，表示该方法返回值的类型，这里是\
    \ `double` 类型。接口文件中接下来的部分只是方法的名称 `minAMFrequency`。\n\n下面这行代码来自实现文件：\n\n```\n+\
    \ (double)minAMFrequency {\n        return 520.0;\n}\n```\n\n这行代码代表了接口中定义的方法的实现。“实现”这个词表明函数在这里编写。它看起来与接口文件几乎相同，但现在包含了一个带有代码的代码块，而不是仅以分号结束。\n\
    \n在前面的例子中，`minAMFrequency` 类方法的实现只是返回一个数值（`double` 类型）520.0。\n\n通常，一个类会在接口文件中定义方法，而在实现文件中包含方法的实际代码。\n\
    \n现在，我们来看一个**实例方法**的实现（参见代码清单 7-3）。实例方法和类方法之间存在一些显著差异：例如，实例方法可以选择使用在接口文件中定义的实例变量。此外，实例方法只有在类被实例化之后才可用。\n\
    \n**代码清单 7-3.** *实例方法的实现*\n\n```\n1  - (id)initWithName:(NSString *)newName atFrequency:(double)newFrequency\
    \ {\n2       self = [super init];\n3       if (self != nil) {\n4           name\
    \ = newName;\n5           frequency = newFrequency;\n6       }\n7\n8       return\
    \ self;\n9  }\n```\n\n代码清单 7-3 演示了你的电台类中一个实例方法的实现。这个初始化方法接受新的电台名称和频率。许多 OS X 和\
    \ iOS 类都有类似的初始化实例方法。许多类初始化方法允许使用特殊的初始化方法，而不是简单地初始化类然后逐个设置各种值；或者，像本例这样，可以在初始化时传递多个值。\n\
    \n在前面的例子中，第 1 行是方法接口，它包含两个参数：`newName` 和 `newFrequency`。要使用这个方法，调用者只需执行以下操作：\n\
    \n```\nRadioStation myStation = [[RadioStation alloc] initWithName:@\"WOW FM\"\
    \n                                               atFrequency: 102.5];\n```\n\n\
    这个方法还被定义为返回一个 `id` 类型的值。`id` 是一个通用对象类型，所有 Objective-C 对象都属于 `id` 类型，就像 `RadioStation`\
    \ 类是一个对象一样。现在，让我们看看实现部分的其余内容。\n\n第 2 行引用了两个特殊变量，你无需在任何地方定义它们。关键字 `self` 用于表示“这个类的这个实例”，因此第\
    \ 2 行是在给“这个类的这个实例”赋值，其值来自使用第二个特殊变量 `super init` 所返回的结果。关键字 `super` 是“superclass”（超类）的缩写，可以理解为“这个类的父类”。任何初始化类型的方法通常都会以类似第\
    \ 2 行的代码开始。\n\n为什么第 2 行是必要的呢？好吧，如果你有一个从另一个对象派生出来的对象（回想一下，类被表示为 `RadioStation :\
    \ NSObject`），你必须告诉父对象初始化自身。父对象也会做同样的事情，告诉它的父对象初始化自身，依此类推，直到达到最顶层的对象。如果另一个类将你的类作为父类，你的代码最终也必须接收一个\
    \ `init` 调用，这样 `RadioStation` 才能被初始化。这在 Objective-C 的实际开发中是标准做法。当一个类被创建时，它需要告诉其父类进行初始化；而当这个类即将被销毁时，它需要告诉其父类释放自身。\n\
    \n第 3 行检查 `[super init]` 调用是否成功。如果成功，`self` 的值将不会是 `nil`（`nil` 是一个实际上表示“未初始化”的值）。\n\
    \n第 4 行和第 5 行将这个类的实例变量设置为传入该方法的参数值。\n\n第 8 行将 `self` 返回给调用者。就像对 `[super init]`\
    \ 的调用一样，你的初始化函数需要将新对象返回给调用者。\n\n### 使用你的新类\n\n你已经创建了一个简单的 `RadioStation` 类，但单凭它自己并不能完成太多功能。在本节中，你将创建\
    \ `Radio` 类，并让它维护一个 `RadioStation` 类的列表。\n"
- fmt: "#### Creating Your Project\n\nLet’s start up `Xcode` (see [Figure 7–1](#Chapter07.html#fig_7_1))\
    \ and create a new project named `RadioStations`.\n\n![images](images/0701.jpg)\n\
    \n**Figure 7–1.** *Open `Xcode` so you can create a new project.*\n\n1.  Make\
    \ sure you choose an iOS application and select the **Single View Application**\
    \ template, as shown in [Figure 7–2](#Chapter07.html#fig_7_2).\n2.  Once you’ve\
    \ selected the template, click the **Next** button.\n\n    ![images](images/0702.jpg)\n\
    \n    **Figure 7–2.** *Selecting a template in the new project window*\n\n3. \
    \ Next, set the Product Name (Application name) to `RadioStations`.  \n4.  Set\
    \ the Company Identifier (a pretend company will do) and set the Device Family\
    \ to iPhone (as shown in [Figure 7–3](#Chapter07.html#fig_7_3)). Also, make sure\
    \ that “Use Automatic Reference Counting” is checked.\n\n    ![images](images/0703.jpg)\n\
    \n    **Figure 7–3.** *Naming the new iPhone application*\n\n5.  Click the **Next\
    \ button** and `Xcode` will ask you where you want to save your new project. You\
    \ can save the project on your Desktop or anywhere in your Home folder. I like\
    \ the Desktop because it’s easy to spot. Once you’ve made your choice, simply\
    \ click the **Create** button.\n6.  Once the **Create** button has been clicked,\
    \ the `Xcode` Workspace Window should be visible, as shown in [Figure 7–4](#Chapter07.html#fig_7_4).\n\
    \n    ![images](images/0704.jpg)\n\n    **Figure 7–4.** *The Workspace Window\
    \ in `Xcode`*\n\n#### Adding Objects\n\nNow, you can add your new objects.\n\n\
    1.  First, create your `RadioStation` object. Right-click the **RadioStations**\
    \ group folder and select **New File…** (as shown in [Figure 7–5](#Chapter07.html#fig_7_5)).\n\
    \n    ![images](images/0705.jpg)\n\n    **Figure 7–5.** *Adding a new file*\n\n\
    2.  The next screen, shown in [Figure 7–6](#Chapter07.html#fig_7_6), asks for\
    \ the new file type. Simply choose **Objective-C class** from the Cocoa Touch\
    \ group, and then click **Next**.\n\n    ![images](images/0706.jpg)\n\n    **Figure\
    \ 7–6.** *Selecting the new file type*\n\n3.  On the next screen, enter `RadioStation`\
    \ as the class and select `NSObject` as the “Subclass Of.” This means that your\
    \ new class will be a subclass of `NSObject`, as shown in [Figure 7–7](#Chapter07.html#fig_7_7).\n\
    \n    ![images](images/0707.jpg)\n\n    **Figure 7–7.** *Choosing your new object’s\
    \ subclass*\n\n4.  The next screen asks you where to create the files. Simply\
    \ click the **Create** button, since the location in which `Xcode` chooses to\
    \ save the files is within the current project, as shown in [Figure 7–8](#Chapter07.html#fig_7_8).\n\
    \n    ![images](images/0708.jpg)\n\n    **Figure 7–8.** *Choosing where to create\
    \ your new files*\n\n5.  Your project window should now look like [Figure 7–9](#Chapter07.html#fig_7_9).\
    \ Click the `RadioStation.h` file. Notice that the stub of your new `RadioStation`\
    \ class is already present. Now, fill in the empty class so it looks like [Listing\
    \ 7–1](#Chapter07.html#list_7_1), your `RadioStation` interface file.\n\n    ![images](images/0709.jpg)\n\
    \n    **Figure 7–9.** *Your newly created file in the workspace window*\n\n####\
    \ Writing the Implementation File\n\nThe `RadioStation.h` file now defines the\
    \ instance variables, class methods, and instance methods of your new class. Let’s\
    \ move on to the implementation file.\n\n1.  The implementation file you’ll use\
    \ here has been simplified a bit from our example several pages ago, but will\
    \ work perfectly for our radio station simulation. Click the `RadioStation.m`\
    \ file, and put code to your class, as shown in [Listing 7–4](#Chapter07.html#list_7_4).\n\
    \n**Listing 7–4.** *The `RadioStation` Implementation File*\n\n```objc\n 1    #import\
    \ \"RadioStation.h\"\n 2   \n 3    @implementation RadioStation\n 4   \n 5    +\
    \ (double)minAMFrequency {\n 6        return 520.0;\n 7    }\n 8    + (double)maxAMFrequency\
    \ {\n 9        return 1610.0;\n10    }\n11    + (double)minFMFrequency {\n12        return\
    \ 88.3;\n13    }\n14    + (double)maxFMFrequency {\n15        return 107.9;\n\
    16    }\n17   \n18    - (id)initWithName:(NSString *)newName atFrequency:(double)newFrequency\
    \ {\n19        self = [super init];\n20        if (self != nil) {\n21            name\
    \ = newName;\n22            frequency = newFrequency;\n23        }\n24       \n\
    25        return self;\n26    }\n27   \n28    - (NSString *)name {\n29        return\
    \ name;\n30    }\n31   \n32    - (void)setName:(NSString *)newName {\n33      \
    \ name = newName;\n34    }\n35   \n36    - (double)frequency {\n37        return\
    \ frequency;\n38    }\n39   \n40    - (void)setFrequency:(double)newFrequency\
    \ {\n41        frequency = newFrequency;\n42    }\n43   \n44    @end\n```\n\n\
    2.  We will come back to a few items in [Listing 7–4](#Chapter07.html#list_7_4)\
    \ and explain them further in a moment; however, with the `RadioStation` class\
    \ defined, you can now write the code that will actually use it.\n3.  First, click\
    \ on the `ViewController.h` file. You’ll need to define a few instance variables\
    \ for this class to use, as shown in [Listing 7–5](#Chapter07.html#list_7_5).\n\
    \n**Listing 7–5.** The Updated `ViewController.h` Interface File\n\n```objc\n\
     1  #import <UIKit/UIKit.h>\n 2  \n 3  @class RadioStation;\n 4  \n 5  @interface\
    \ ViewController : UIViewController\n 6  {\n 7      RadioStation *myStation;\n\
     8      IBOutlet UILabel* stationName;\n 9      IBOutlet UILabel* stationFrequency;\n\
    10      IBOutlet UILabel* stationBand;\n11  }\n12  \n13  @end\n```\n\nOn Line\
    \ #3, you’ll add what’s called a *forward declaration*. This basically tells the\
    \ compiler that you’ll be using a class that you’ve not defined yet, called `RadioStation`.\
    \ You’ll be importing your header file eventually, but not here—that’s why you\
    \ need this forward declaration now.\n\nLines #6–8 define some new instance variables.\
    \ Line #8 is your `RadioStation` object. Lines #9–11 are going to be used by your\
    \ iOS interface to show some values on the screen (more on these later). Also,\
    \ don’t forget to include the curly braces ( `{ … }` ). Since the original `AppDelegate`\
    \ didn’t have any instance variables declared, there was no need for the braces.\n\
    \n4.  Next, from the main project window, click the `ViewController.m` file. [Listing\
    \ 7–5](#Chapter07.html#list_7_5) shows the top portion of the `ViewController.m`\
    \ file. The following method is called whenever the view is loaded into memory:\n\
    \n    ```objc\n    viewDidLoad\n    ```\n\n    You’ll start by putting some of\
    \ your initialization code here.\n\n**Listing 7–5.** *Allocating Your `RadioStation`\
    \ Object*\n\n```objc\n 1  #import \"ViewController.h\"\n 2  #import \"RadioStation.h\"\
    \n 3  \n 4  @implementation ViewController\n 5  \n 6  - (void)didReceiveMemoryWarning\n\
     7  {\n 8      [super didReceiveMemoryWarning];\n 9      // Release any cached\
    \ data, images, etc. that aren't in use.\n10  }\n11  \n12  #pragma mark - View\
    \ lifecycle\n13  \n14  - (void)viewDidLoad\n15  {\n16      [super viewDidLoad];\n\
    17          // Do any additional setup after loading the view, typically from\
    \ a nib.\n18      myStation = [[RadioStation alloc] initWithName:@\"STAR 94\"\n\
    19                                                     atFrequency:94.1];\n20      \n\
    21  }\n```\n\nLine #2 is the import statement that imports your `RadioStation`\
    \ Object.\n\nLines #18 and 19 allocate a new `RadioStation` object and store it\
    \ into your new instance variable, `myStation`."
