- fmt: '### Introducing Properties


    When we created instance variables for the `Book` object, we manually created
    the methods that could be used to access these variables. Now that you know how
    to do this manually, let’s look at how to take advantage of something called properties.
    A property is a short way of having the compiler create functions to get and/or
    set the value of an instance variable. As you learned earlier, instance variables
    are generally not accessible from outside of the object itself, so having methods
    to get and set these variables becomes essential.


    The following is the interface (header) file to the `Book` object that we created
    earlier. Let’s see what it takes to have the Objective-C compiler create our getters
    and setters for us.


    **Listing 8–13.** *Adding properties to the Book object.*


    ```

     1  //

     2  //  Book.h

     3  //  MyBookstore

     4  //

     5  //  Created by M.R. Fisher on 8/28/11.

     6  //  Copyright (c) 2011 www.committed-code.com. All rights reserved.

     7  //

     8  

     9  #import <Foundation/Foundation.h>

    10  

    11  @interface Book : NSObject {

    12  }

    13  

    14  @property(nonatomic,strong) NSString *title;

    15  @property(nonatomic,strong) NSString *author;

    16  @property(nonatomic,strong) NSString *description;

    17  

    18  @end

    ```


    Lines 14–16 show the property declarations for the instance variables. Properties
    are not required for all instance variables, just the ones we want to expose to
    the world. In the example, however, we are creating properties for all of our
    instance variables. Notice that the actual instance variable declarations that
    used to be between the `{ ... }` brackets are now gone. When using properties
    with Xcode 4 and over, it is no longer necessary to declare the instance variables
    **and** the properties. The compiler is now smart enough to do this for you.


    A property starts with a `@property` directive. This tells the Objective-C compiler
    to build us the automatic getter and/or setter. Whether it is a getter and/or
    setter is included in the declaration. Let’s dissect this code:


    `@property^(1) (nonatomic,strong)^(2) NSString* title^(3);`


    1.  This is the property directive.

    2.  The parentheses and the comma-separated keywords contained therein are sometimes
    optional. In our particular case, we are specifying `nonatomic` and `strong`.
    The `nonatomic` keyword tells the compiler not to generate special code for use
    in threading—we’re not using threads, so using `nonatomic` is fine. The second,
    `strong`, is used to indicate that this is a strongly typed variable—this will
    be discussed further in [Chapter 13](#Chapter13.html#ch13) when we discuss memory
    management. Many other options can be included here; one is `readonly`, which
    tells the compiler to only create a getter, not a setter, and thereby prevents
    the ability for the instance variable from being set external to the object.

    3.  Last, `NSString* title`, is the instance variable declaration. It must include
    the type and, of course, the instance variable name.


    This defines half of the property. What’s that you say, “Only half? What else
    is missing?” Well, the second half of the `@property` is declared in the implementation
    (`.m`) file.


    **Listing 8–14.** *Defining a getter and setter for the Book object.*


    ```

     1  //

     2  //  Book.m

     3  //  MyBookstore

     4  //

     5  //  Created by M.R. Fisher on 8/28/11.

     6  //  Copyright (c) 2011 www.committed-code.com. All rights reserved.

     7  //

     8  

     9  #import "Book.h"

    10  

    11  @implementation Book

    12  @synthesize title, author, description;

    13  

    14  @end

    ```


    This is the implementation file to the `Book` object. Line 12 is significant,
    because it is the second half of what is required to complete our property. This
    part is much simpler than the interface file. All that is necessary is to use
    the `@synthesize` keyword and provide a list of one or more property names. There
    can be many property names specified on a `@synthesize` statement, and there can
    be many `@synthesize` lines, too. It’s all a matter of personal preference.


    Now that we’ve created three different properties, how are the properties used?


    ### Using Properties


    Once a property has been specified in both the interface and implementation files,
    using the properties is very straightforward and simple. First, the syntax changes
    a bit. Let’s look at a traditional setter:


    `[myBookObject setTitle:newTitle]; // Traditional setter`


    Here is an example of sending a set message to set the title to our book object—like
    we said, pretty straightforward. However, when using properties, things change:


    `myBookObject.title = newTitle; // Setter example`


    Some things are very important to note. For starters, the object access is not
    within brackets (`[ ... ]`). Second, we use the property called `title`, not the
    `setTitle` method. Internally, there is still a `setTitle` method; it’s just hidden.
    Why is this important? Well, if we create our own explicit `setTitle` method,
    our new method will be called rather than the compiler-created one. This may or
    may not be the behavior we specifically want.


    For the getter, things look remarkably familiar:


    `NSString* title = myBookObject.title;  // Getter example`


    The property that gets the information is also called `title`. The significance
    here is that how the object’s property is accessed determines whether the getter
    or setter is called. If we are trying to set the variable, the setter is called.
    If we are trying to get the value of the variable, the getter is called.


    One last big difference is that the syntax to access a property now uses a period
    (`.`) between the object and the method. This is necessary because the brackets
    are gone, so the period distinguishes between using a property and sending a message
    to an object.


    ### Understanding the Importance of Conventions


    As mentioned earlier, there is a convention to naming a getter and a setter. While
    these naming guidelines are not strictly enforced, the value of understanding
    the convention comes in handy when using properties. Here is our previous example:


    ```

    - (void)setTitle:(NSString *) newTitle

    {

        if ([newTitle length] > 0) {

            title = newTitle;

        }

    }

    ```


    If we create a property like `@property title` and pair that with the `@synthesize`
    keyword, the compiler will generate two methods—one named `title` as the getter
    and one called `setTitle` as the setter. However, if we provide our own setter
    and name it according to the convention (like the preceding code), the compiler
    won’t generate its own.


    `        myBookObject.title = newTitle; // Call the custom setter`


    The preceding code will call our own custom setter instead of the standard one.
    The same would be true had we written our own getter method. Now, let''s continue
    with the Bookstore application.


    ## Finishing the MyBookstore Program


    With the understanding of instance variables and properties, we are going to now
    venture forth to create the actual bookstore program. The idea is simple enough—create
    a class called `Bookstore` that will be stocked with a few `Book` objects.'
  raw: '### Introducing Properties


    When we created instance variables for the `Book` object, we manually created
    the methods that could be used to access these variables. Now that you know how
    to do this manually, let’s look at how to take advantage of something called properties.
    A **property** is a short way of having the compiler create functions to get and/or
    set the value of an instance variable. As you learned earlier, instance variables
    are generally not accessible from outside of the object itself, so having methods
    to get and set these variables becomes essential.


    The following is the **interface** (header) file to the `Book` object that we
    created earlier. Let’s see what it takes to have the Objective-C compiler create
    our getters and setters for us.


    **Listing 8–13.** *Adding properties to the Book object.*


    ` 1  //`

    ` 2  //  Book.h`

    ` 3  //  MyBookstore`

    ` 4  //`

    ` 5  //  Created by M.R. Fisher on 8/28/11.`

    ` 6  //  Copyright (c) 2011 www.committed-code.com. All rights reserved.`

    ` 7  //`

    ` 8  `

    ` 9  #import <Foundation/Foundation.h>`

    `10  `

    `11  @interface Book : NSObject {`

    `12  }`

    `13  `

    `14  @property(nonatomic,strong) NSString *title;`

    `15  @property(nonatomic,strong) NSString *author;`

    `16  @property(nonatomic,strong) NSString *description;`

    `17  `

    `18  @end`


    Lines 14–16 show the property declarations for the instance variables. Properties
    are not required for all instance variables, just the ones we want to expose to
    the world. In the example, however, we are creating properties for all of our
    instance variables. Notice that the actual instance variable declarations that
    used to be between the { … } brackets are now gone. When using properties with
    Xcode 4 and over, it is no longer necessary to declare the instance variables
    **and** the properties. The compiler is now smart enough to do this for you.


    A property starts with a `@property` directive. This tells the Objective-C compiler
    to build us the automatic getter and/or setter. Whether it is a getter and/or
    setter is included in the declaration. Let’s dissect this code:


    `@property`^(`1`) `(nonatomic,strong)`^(`2`) `NSString* title`^(`3`)`;`


    1.  This is the property directive.

    2.  The parentheses and the comma-separated keywords contained therein are sometimes
    optional. In our particular case, we are specifying `nonatomic` and `strong`.
    The `nonatomic` keyword tells the compiler not to generate special code for use
    in threading—we’re not using threads, so using `nonatomic` is fine. The second,
    `strong`, is used to indicate that this is a strongly typed variable—this will
    be discussed further in [Chapter 13](#Chapter13.html#ch13) when we discuss memory
    management. Many other options can be included here; one is `readonly`, which
    tells the compiler to only create a getter, not a setter, and thereby prevents
    the ability for the instance variable from being set external to the object.

    3.  Last, `NSString* title`, is the instance variable declaration. It must include
    the type and, of course, the instance variable name.


    This defines half of the property. What’s that you say, “Only half? What else
    is missing?” Well, the second half of the `@property` is declared in the implementation
    (`.m`) file.


    **Listing 8–14.** *Defining a getter and setter for the Book object.*


    ` 1  //`

    ` 2  //  Book.m`

    ` 3  //  MyBookstore`

    ` 4  //`

    ` 5  //  Created by M.R. Fisher on 8/28/11.`

    ` 6  //  Copyright (c) 2011 www.committed-code.com. All rights reserved.`

    ` 7  //`

    ` 8  `

    ` 9  #import "Book.h"`

    `10  `

    `11  @implementation Book`

    `12  @synthesize title, author, description;`

    `13  `

    `14  @end`


    This is the implementation file to the `Book` object. Line 12 is significant,
    because it is the second half of what is required to complete our property. This
    part is much simpler than the interface file. All that is necessary is to use
    the `@synthesize` keyword and provide a list of one or more property names. There
    can be many property names specified on a `@synthesis` statement, and there can
    be many `@synthesize` lines, too. It’s all a matter of personal preference.


    Now that we’ve created three different properties, how are the properties used?


    #### Using Properties


    Once a property has been specified in both the interface and implementation files,
    using the properties is very straightforward and simple. First, the syntax changes
    a bit. Let’s look at a traditional setter:


    `[myBookObject setTitle:newTitle]; // Traditional setter`


    Here is an example of sending a set message to set the title to our book object—like
    we said, pretty straightforward. However, when using properties, things change:


    `myBookObject.title = newTitle; // Setter example`


    Some things are very important to note. For starters, the object access is not
    within brackets (`[ … ]`). Second, we use the property called `title`, not the
    `setTitle` method. Internally, there is still a `setTitle` method; it’s just hidden.
    Why is this important? Well, if we create our own explicit `setTitle` method,
    our new method will be called rather than the compiler-created one. This may or
    may not be the behavior we specifically want.


    For the getter, things look remarkably familiar:


    `NSString* title = myBookObject.title;  // Getter example`


    The property that gets the information is also called `title`. The significance
    here is that how the object’s property is accessed determines whether the getter
    or setter is called. If we are trying to set the variable, the setter is called.
    If we are trying to get the value of the variable, the getter is called


    One last big difference is that the syntax to access a property now uses a period
    (.) between the object and the method. This is necessary because the brackets
    are gone, so the period distinguishes between using a property and sending a message
    to an object.


    #### Understanding the Importance of Conventions


    As mentioned earlier, there is a convention to naming a getter and a setter. While
    these naming guidelines are not strictly enforced, the value of understanding
    the convention comes in handy when using properties. Here is our previous example:


    `- (void)setTitle:(NSString *) newTitle`

    `{`

    `    if ([newTitle length] > 0) {`

    `        title = newTitle;`

    `    }`

    `}`


    If we create a property like `@property title` and pair that with the `@synthesize`
    keyword, the compiler will generate two methods—one named `title` as the getter
