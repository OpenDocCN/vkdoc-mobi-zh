    # 修改 `MasterViewController`


    我们的简易应用程序包含两个视图控制器：主视图控制器名为 `MasterViewController`，另一个辅助视图控制器名为 `DetailViewController`。视图控制器是控制视图行为的对象。为了让应用程序开始显示来自数据模型的数据，我们首先需要修改
    `MasterViewController`——这是应用程序导航的起点。以下代码已经存在于 Xcode 提供的模板中，我们只需对其进行修改以加入数据模型。


    首先，需要修改 `MasterViewController.h` 文件。我们要添加一个实例变量来存储 `Bookstore` 对象。代码清单 8-18 显示了第
