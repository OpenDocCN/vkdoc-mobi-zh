    }\nif (x < y || isComplete == FALSE)\n{\n    //在此示例中，x 小于 6。\n    //对于 OR 运算，只要有一个操作数为\
    \ TRUE，结果即为 TRUE。\n//参见表 4–2 A OR 真值表\n    do stuff;\n}\n//另一种测试 TRUE 的方式\nif\
    \ (x < y && isComplete)\n{\n//在此示例中，x 小于 6 且 isComplete == TRUE\n    do stuff;\n\
    }\n//另一种测试 FALSE 的方式\nif (x < y && !isComplete)\n{\n    do stuff;\n}\nelse\n{\n\
    // isComplete == TRUE\n     do stuff;\n}\n```\n\n### 设计需求\n\n如第 1 章所述，软件开发周期中最昂贵的环节是编写代码。软件开发周期中最便宜的环节是收集应用程序的需求；然而，这个环节却是软件开发中最容易被忽视和最少使用的环节。\n\
    \n设计需求通常始于询问客户、顾客和/或利益相关者，了解应用程序应该如何工作以及应该解决哪些问题。\n\n就应用而言，需求可以包括长篇幅或短篇幅的叙述性描述、界面模拟图和公式。在编码开始之前，用文字处理器更改需求和界面模拟图，要比修改一款\
    \ iPhone/iPad/Mac 应用容易得多。以下是某 iPhone 手机银行应用一个视图的设计需求：\n\n*   **视图：** 账户视图\n* \
    \  **描述：** 显示用户拥有的账户列表。账户列表将分为以下几个部分：商业账户、个人账户及汽车贷款、个人退休账户和房屋净值贷款。\n*   **单元格**:\
    \ 每个单元格将包含账户名称、账户后四位数字、可用余额和当前余额。\n\n一图胜千言。界面模拟图对开发者和用户都很有帮助，因为他们可以直观地看到视图完成后的样子。有许多工具可以快速设计模拟图；其中一种工具是\
    \ OmniGraffle。请参见图 4–1，了解一个由 OmniGraffle 生成、用于设计需求的界面模拟图示例。\n\n![images](img/0401.jpg)\n\
    \n**图 4–1.** *使用 OmniGraffle 和 Ultimate iPhone Stencil Plug-in 制作的手机银行应用界面模拟图*\n\
    \n许多开发者认为设计需求耗时过长且不必要。图 4–1 中的“账户”屏幕呈现了大量信息。许多业务规则可以决定信息如何显示给用户，以及当出现问题时所有的错误处理方式。在设计应用时，在开发过程开始时与所有业务利益相关者合作，对于一次性成功至关重要。\n\
    \n图 4–2 是所有利益相关者都参与到应用开发中的一个示例。从一开始就让所有利益相关者参与每一个视图，将消除多次重写和应用错误。\n\n![images](img/0402.jpg)\n\
    \n**图 4–2.** *Woodforest 手机银行应用在 iTunes Connect 应用商店中的显示效果；与 图 4–1 中的应用需求“账户”屏幕进行对比。*\n\
    \n此外，苹果公司建议开发者至少将 50% 的开发时间花在用户界面的设计和开发上。\n\nApress 的 iPhone 和 iPad Sketch Books\
    \ 也是用于在纸上规划 iOS 应用外观和感觉的绝佳工具。参见图 4–3。\n\n![images](img/0403.jpg)\n\n**图 4–3.**\
    \ *Apress 的 iPhone Sketch Book 模板和 Apress 的 iPad Sketch Book 模板*\n\n### 流程图制作\n\
    \n在设计需求最终确定后，你可以通过伪代码编写应用的各个部分，来解决复杂的开发问题。**流程图制作**是一种常用的算法图示方法。算法被表示为由线条和箭头连接的不同类型的框。开发者经常使用流程图来直观地表示代码。参见图\
    \ 4–4。\n\n![images](img/0404.jpg)\n\n**图 4–4.** *示例流程图，展示了常用的图形及其对应的名称*\n\n流程图应始终有开始和结束。分支绝不应在没有结束的情况下终止。这有助于开发者确保代码中的所有分支都已考虑周全，并能干净地结束执行。\n\
    \n### 设计并绘制示例应用的流程图\n\n我们已经介绍了大量关于决策和程序流程的知识。现在该做程序员最擅长的事情了：编写应用！\n\n你要编写的应用会生成一个\
    \ 0 到 100 之间（包含 0 和 100）的随机数，并让用户猜测这个数字。用户需要一直猜，直到猜中为止。你可以使用 Alice 画廊中的任何对象来向用户询问猜测结果，你也可以为你对象所在的场景选择任意世界。该对象将为每次猜测过高、过低和猜中提供视觉提示。用户猜测的数字将显示在控制台上。当用户猜中正确答案时，系统会询问他/她是否想再玩一次。参见图\
    \ 4–5。\n\n![images](img/0405.jpg)\n\n**图 4–5.** *一个宇航员对象正在要求用户猜测一个介于 0 和 100 之间的数字*\n"
- fmt: "# The App’s Design\n\nUsing your design requirements, you can make a flowchart\
    \ for your app. See [Figure 4–6](#Chapter04.html#fig_4_6).\n\n![images](images/0406.jpg)\n\
    \n**Figure 4–6.** *Flowchart for guessing a random number app*\n\nReviewing [Figure\
    \ 4–6](#Chapter04.html#fig_4_6), you’ll notice that as you approach the end of\
    \ a block of logic in your flowchart, there are arrows that go back to a previous\
    \ section and repeat that section until some condition is met. This is called\
    \ **looping**. It enables you to repeat sections of programming logic—without\
    \ having to rewrite those sections of code over—until a condition is met.\n\n\
    # Using Loops to Repeat Program Statements\n\nA **loop** is a sequence of program\
    \ statements that is specified once, but can be repeated several times in succession.\
    \ A loop can repeat a specified number of times (count-controlled) or until some\
    \ condition (condition-controlled) occurs.\n\nIn this section, you’ll learn about\
    \ count-controlled loops and condition-controlled loops. You will also learn how\
    \ to control your loops with Boolean logic.\n\n## Count-Controlled Loops\n\nA\
    \ count-controlled loop is a loop that repeats a specified number of times. In\
    \ Objective-C and Alice, this is a **for loop**. A `for` loop has a counter variable.\
    \ This variable enables the developer to specify the number of times the loop\
    \ will be executed. See [Listing 4–3](#Chapter04.html#list_4_3).\n\n**Listing\
    \ 4–3.** *A Count-Controlled Loop*\n\n```\nint i;\nfor (i = 0; i < 10; i++)\n\
    {\n      //repeat all code in braces 10 times\n}\n....continue\n```\n\nThe loop\
    \ in [Listing 4–3](#Chapter04.html#list_4_3) will loop 10 times. The variable\
    \ `i` starts at zero and increments at the end of the `}` by one. The incrementing\
    \ is done by the `i++` in the *for* statement; `i++`, which is equivalent to `i\
    \ = i + 1`. `i`, is then incremented by 1 to 10 and then checked to see if it\
    \ is less than 10. This `for` loop will exit when `i = 9` and the `}` is reached.\n\
    \n**NOTE:** It is common for developers to confuse the number of times they think\
    \ their loops will repeat. If the loop started at 1 in [Listing 4–3](#Chapter04.html#list_4_3),\
    \ the loop would repeat nine times instead of 10.\n\nIn Objective-C, `for` loops\
    \ can have their counter variables declared in the `for` loop declaration itself.\
    \ See [Listing 4–4](#Chapter04.html#list_4_4).\n\n**Listing 4–4.** *Counter Variable\
    \ is Initialized in For Loop Declaration*\n\n```\nfor (int i = 0; i < 10; i++)\n\
    {\n      //repeat all code in braces 10 times\n}\n....continue\n```\n\nOccasionally,\
    \ you will need to repeat just one line of code in a `for` loop. This can be accomplished\
    \ by not using any `{}`. The first line of code encountered after the `for` loop\
    \ declaration is repeated, as specified in the `for` loop declaration. See [Listing\
    \ 4–5](#Chapter04.html#list_4_5).\n\n**Listing 4–5.** *Counter Variable is Initialized\
    \ in the For Loop Declaration*\n\n```\nfor (int i = 0; i < 10; i++)\n      do\
    \ this line of code 10 times;\n....continue\n```\n\n## Condition-Controlled Loops\n\
    \nObjective-C and Alice have the ability to repeat a loop until some condition\
    \ changes. You may want to repeat a section of your code until a false condition\
    \ is reached with one of your variables. This type of loop is called a **while\
    \ loop**. A `while` loop is a control flow statement that repeats based on a given\
    \ Boolean condition. A `while`-loop can be thought of as a repeating `if` statement.\
    \ See [Listing 4–6](#Chapter04.html#list_4_6).\n\n**Listing 4–6.** *An Objective-C\
    \ While Loop Repeating*\n\n```\nBOOL isTrue = TRUE;\nwhile (isTrue)\n{\n    //do\
    \ something;\n     isTrue = FALSE; // a condition occurs that sometimes sets isTrue\
    \ to FALSE\n};\n....continue\n```\n\nThe `while` loop in [Listing 4–6](#Chapter04.html#list_4_6)\
    \ first checks if the variable `isTrue` is `TRUE`—which it is—so the `{loop body}`\
    \ is entered where the code is executed. Eventually, some condition is reached\
    \ that causes `isTrue` to become `FALSE`. After completing all the code in the\
    \ loop body, the condition (`isTrue`) is checked once more, and the loop is repeated\
    \ again. This process is repeated until the variable `isTrue` is set to `FALSE`.\n\
    \n## Infinite Loops\n\nAn infinite loop repeats endlessly, either due to the loop\
    \ not having a condition that causes termination or having a terminating condition\
    \ that can never be met.\n\nGenerally, infinite loops can cause apps to become\
    \ unresponsive. They are the result of a side effect of a bug in either the code\
    \ or the logic.\n\n**Listing 4–7.** *An Example of an Infinite Loop*\n\n```\n\
    x = 0;\nwhile (x  != 5)\n{\n    do something;\n    x = x + 2;\n};\n....continue\n\
    ```\n\n[Listing 4–7](#Chapter04.html#list_4_7) is an example of an infinite loop\
    \ caused by a terminating condition that can never be met. The variable `x` will\
    \ be checked with each iteration through the `while` loop, but will never be equal\
    \ to 5. The variable `x` will always be an even number because it was initialized\
    \ to zero and incremented by 2 in the loop. This will cause the loop to repeat\
    \ endlessly. See [Listing 4–8](#Chapter04.html#list_4_8).\n\n**Listing 4–8.**\
    \ *An Example of an Infinite Loop Caused by a Terminating Condition That Can Never\
    \ Be Met*\n\n```\nwhile (TRUE)\n{\n    do something;\n};\n....continue\n```\n\n\
    # Coding the Example App in Alice\n\nNow that you have your design requirements\
    \ and flowchart completed, and understand looping, you’re ready to write your\
    \ Alice application. See [Figure 4–7](#Chapter04.html#fig_4_7).\n\n![images](images/0407.jpg)\n\
    \n**Figure 4–7.** *Random number generator app*\n\nIt is not possible to list\
    \ the source code for this Alice program in one screenshot. However, if you print\
    \ out the source code in HTML, you can view all the code. See [Figure 4–8](#Chapter04.html#fig_4_8).\n\
    \n![images](images/0408.jpg)\n\n**Figure 4–8.** *Random number generator; complete\
    \ program listing*\n\n[Figure 4–8](#Chapter04.html#fig_4_8) shows the entire program\
    \ listing for your random number generator code.\n\n**NOTE:** You can download\
    \ the complete random number generator app at `forum.xcelme.com`. The code will\
    \ be under the [Chapter 4](#Chapter04.html#ch4) topic. There is also a video showing\
    \ how to drag and drop all the tiles within the `While` and `If` code blocks in\
    \ Alice."
  raw: '#### The App’s Design


    Using your design requirements, you can make a flowchart for your app. See [Figure
    4–6](#Chapter04.html#fig_4_6).


    ![images](images/0406.jpg)


    **Figure 4–6.** *Flowchart for guessing a random number app*


    Reviewing [Figure 4–6](#Chapter04.html#fig_4_6), you’ll notice that as you approach
    the end of a block of logic in your flowchart, there are arrows that go back to
    a previous section and repeat that section until some condition is met. This is
    called **looping**. It enables you to repeat sections of programming logic—without
    having to rewrite those sections of code over—until a condition is met.


    #### Using Loops to Repeat Program Statements


    A **loop** is a sequence of program statements that is specified once, but can
    be repeated several times in succession. A loop can repeat a specified number
    of times (count-controlled) or until some condition (condition-controlled) occurs.


    In this section, you’ll learn about count-controlled loops and condition-controlled
    loops. You will also learn how to control your loops with Boolean logic.


    ##### Count-Controlled Loops


    A count-controlled loop is a loop that repeats a specified number of times. In
    Objective-C and Alice, this is a **for loop**. A for loop has a counter variable.
    This variable enables the developer to specify the number of times the loop will
    be executed. See [Listing 4–3](#Chapter04.html#list_4_3).


    **Listing 4–3.** *A Count-Controlled Loop*


    `int i;`

    `for (i = 0; i < 10; i++)`

    `{`

    `      //repeat all code in braces 10 times`

    `}`

    `....continue`


    The loop in [Listing 4–3](#Chapter04.html#list_4_3) will loop 10 times. The variable
    `i` starts at zero and increments at the end of the } by one. The incrementing
    is done by the `i++` in the *for* statement; `i++`, which is equivalent to `i
    = i +1`. `i`, is then incremented by 1 to 10 and then checked to see if it is
    less than 10. This for loop will exit when `i = 9` and the `}` is reached.


    **NOTE:** It is common for developers to confuse the number of times they think
    their loops will repeat. If the loop started at 1 in [Listing 4–3](#Chapter04.html#list_4_3),
    the loop would repeat nine times instead of 10.


    In Objective-C, for loops can have their counter variables declared in the for
    loop declaration itself. See [Listing 4–4](#Chapter04.html#list_4_4).


    **Listing 4–4.** *Counter Variable is Initialized in For Loop Declaration*


    `for (int i = 0; i < 10; i++)`

    `{`

    `      //repeat all code in braces 10 times`

    `}`

    `....continue`


    Occasionally, you will need to repeat just one line of code in a for loop. This
    can be accomplished by not using any {}. The first line of code encountered after
    the for loop declaration is repeated, as specified in the for loop declaration.
    See [Listing 4–5](#Chapter04.html#list_4_5).


    **Listing 4–5.** *Counter Variable is Initialized in the For Loop Declaration*


    `for (int i = 0; i < 10; i++)`

    `      do this line of code 10 times;`

    `....continue`


    ##### Condition-Controlled Loops


    Objective-C and Alice have the ability to repeat a loop until some condition changes.
    You may want to repeat a section of your code until a false condition is reached
    with one of your variables. This type of loop is called a **while loop**. A while
    loop is a control flow statement that repeats based on a given Boolean condition.
    A while-loop can be thought of as a repeating if statement. See [Listing 4–6](#Chapter04.html#list_4_6).


    **Listing 4–6.** *An Objective-C While Loop Repeating*


    `BOOL isTrue = TRUE;`

    `while (isTrue)`

    `{`

    `    //do something;`

    `     isTrue = FALSE; // a condition occurs that sometimes sets isTrue to FALSE`

    `};`

    `....continue`


    The while loop in [Listing 4–6](#Chapter04.html#list_4_6) first checks if the
    variable `isTrue` is `TRUE`—which it is—so the `{loop body}` is entered where
    the code is executed. Eventually, some condition is reached that causes `isTrue`
    to become `FALSE`. After completing all the code in the loop body, the condition
    (`isTrue`) is checked once more, and the loop is repeated again. This process
    is repeated until the variable `isTrue` is set to `FALSE`.


    ##### Infinite Loops


    An infinite loop repeats endlessly, either due to the loop not having a condition
    that causes termination or having a terminating condition that can never be met.


    Generally, infinite loops can cause apps to become unresponsive. They are the
    result of a side effect of a bug in either the code or the logic.


    **Listing 4–7.** *An Example of an Infinite Loop*


    `x = 0;`

    `while (x  != 5)`

    `{`

    `    do something;`

    `    x = x + 2;`

    `};`

    `....continue`


    [Listing 4–7](#Chapter04.html#list_4_7) is an example of an infinite loop caused
    by a terminating condition that can never be met. The variable `x` will be checked
    with each iteration through the while loop, but will never be equal to 5\. The
    variable `x` will always be an even number because it was initialized to zero
    and incremented by 2 in the loop. This will cause the loop to repeat endlessly.
    See [Listing 4–8](#Chapter04.html#list_4_8).


    **Listing 4–8.** *An Example of an Infinite Loop Caused by a Terminating Condition
    That Can Never Be Met*


    `while (TRUE)`

    `{`

    `    do something;`

    `};`

    `....continue`


    ### Coding the Example App in Alice


    Now that you have your design requirements and flowchart completed, and understand
    looping, you’re ready to write your Alice application. See [Figure 4–7](#Chapter04.html#fig_4_7).


    ![images](images/0407.jpg)


    **Figure 4–7.** *Random number generator app*


    It is not possible to list the source code for this Alice program in one screenshot.
    However, if you print out the source code in HTML, you can view all the code.
    See [Figure 4–8](#Chapter04.html#fig_4_8).


    ![images](images/0408.jpg)


    **Figure 4–8.** *Random number generator; complete program listing*


    [Figure 4–8](#Chapter04.html#fig_4_8) shows the entire program listing for your
    random number generator code.


    **NOTE:** You can download the complete random number generator app at `forum.xcelme.com`.
    The code will be under the [Chapter 4](#Chapter04.html#ch4) topic. There is also
    a video showing how to drag and drop all the tiles within the `While` and `If`
    code blocks in Alice.'
  trans: "\n# 应用的设计\n\n根据你的设计需求，你可以为应用绘制流程图。请参见图 4–6。\n\n![images](img/0406.jpg)\n\
    \n**图 4–6.** *猜随机数应用的流程图*\n\n回顾图 4–6，你会发现当流程图中某个逻辑块接近结束时，会有箭头指回前面的部分，并重复该部分直到某个条件满足。这被称为**循环**。它让你能够重复执行部分程序逻辑，而无需反复重写这些代码段，直到条件满足为止。\n\
    \n# 使用循环重复执行程序语句\n\n**循环**是一组只需指定一次、但可以连续重复多次的程序语句。循环可以重复指定的次数（计数控制），也可以重复直到某个条件（条件控制）发生为止。\n\
    \n在本节中，你将学习计数控制循环和条件控制循环。你还将学习如何使用布尔逻辑来控制循环。\n\n## 计数控制循环\n\n计数控制循环是指重复指定次数的循环。在\
    \ Objective-C 和 Alice 中，这就是**for 循环**。一个 `for` 循环有一个计数器变量，该变量使开发者能够指定循环将要执行的次数。请参见代码清单\
    \ 4–3。\n\n**代码清单 4–3.** *一个计数控制循环*\n\n```\nint i;\nfor (i = 0; i < 10; i++)\n\
    {\n      //重复花括号内的所有代码 10 次\n}\n....继续执行\n```\n\n代码清单 4–3 中的循环将循环 10 次。变量 `i`\
    \ 从零开始，并在 `}` 结束时增加 1。递增动作由 `for` 语句中的 `i++` 完成；`i++` 等同于 `i = i + 1`。然后 `i` 逐一增加到\
    \ 10，并检查是否小于 10。当 `i = 9` 且到达 `}` 时，这个 `for` 循环将退出。\n\n**注意：** 开发者常常会弄错他们认为循环重复的次数。如果在代码清单\
    \ 4–3 中循环从 1 开始，那么循环将重复 9 次而不是 10 次。\n\n在 Objective-C 中，`for` 循环的计数器变量可以在 `for`\
    \ 循环声明本身中进行声明。请参见代码清单 4–4。\n\n**代码清单 4–4.** *计数器变量在 for 循环声明中初始化*\n\n```\nfor\
    \ (int i = 0; i < 10; i++)\n{\n      //重复花括号内的所有代码 10 次\n}\n....继续执行\n```\n\n\
    偶尔，你需要在 `for` 循环中只重复一行代码。这可以通过不使用任何 `{}` 来实现。`for` 循环声明之后遇到的第一行代码将按声明中指定的次数重复。请参见代码清单\
    \ 4–5。\n\n**代码清单 4–5.** *计数器变量在 for 循环声明中初始化*\n\n```\nfor (int i = 0; i < 10;\
    \ i++)\n      将这行代码执行 10 次;\n....继续执行\n```\n\n## 条件控制循环\n\nObjective-C 和 Alice\
    \ 能够重复循环直到某个条件发生变化。你可能需要重复一段代码，直到某个变量达到一个假条件。这种类型的循环称为**while 循环**。`while` 循环是一种控制流语句，它基于给定的布尔条件重复执行。可以将\
    \ `while` 循环视为一个重复执行的 `if` 语句。请参见代码清单 4–6。\n\n**代码清单 4–6.** *一个 Objective-C while\
    \ 循环重复执行*\n\n```\nBOOL isTrue = TRUE;\nwhile (isTrue)\n{\n    //执行某些操作;\n    \
    \ isTrue = FALSE; // 某个条件发生，有时会将 isTrue 设置为 FALSE\n};\n....继续执行\n```\n\n代码清单 4–6\
    \ 中的 `while` 循环首先检查变量 `isTrue` 是否为 `TRUE`——它确实是——因此进入 `{循环体}` 执行代码。最终，某个条件发生导致\
    \ `isTrue` 变为 `FALSE`。完成循环体中的所有代码后，再次检查条件（`isTrue`），然后循环再次重复。这个过程不断重复，直到变量 `isTrue`\
    \ 被设置为 `FALSE`。\n\n## 无限循环\n\n无限循环会无休止地重复，这通常是因为循环没有终止条件，或者终止条件永远无法满足。\n\n一般来说，无限循环会导致应用变得无响应。它们是代码或逻辑中某个错误（bug）的副作用结果。\n\
    \n**代码清单 4–7.** *一个无限循环的例子*\n\n```\nx = 0;\nwhile (x  != 5)\n{\n    do something;\n\
    \    x = x + 2;\n};\n....继续执行\n```\n\n代码清单 4–7 是一个由永远无法满足的终止条件导致的无限循环示例。变量 `x`\
    \ 在每次迭代中都会在 `while` 循环中被检查，但永远不等于 5。变量 `x` 将始终是一个偶数，因为它被初始化为零，并在循环中每次增加 2。这将导致循环无休止地重复。请参见代码清单\
    \ 4–8。\n\n**代码清单 4–8.** *一个由永远无法满足的终止条件导致的无限循环示例*\n\n```\nwhile (TRUE)\n{\n  \
    \  do something;\n};\n....继续执行\n```\n\n# 在 Alice 中编写示例应用\n\n现在你已经完成了设计需求和流程图，并且理解了循环，就可以开始编写你的\
    \ Alice 应用了。请参见图 4–7。\n\n![images](img/0407.jpg)\n\n**图 4–7.** *随机数生成器应用*\n\n\
    无法在一张截图中列出这个 Alice 程序的全部源代码。不过，如果你用 HTML 打印出源代码，就可以看到所有代码。请参见图 4–8。\n\n![images](img/0408.jpg)\n\
    \n**图 4–8.** *随机数生成器；完整程序清单*\n\n图 4–8 显示了随机数生成器代码的完整程序清单。\n\n**注意：** 你可以在 `forum.xcelme.com`\
    \ 下载完整的随机数生成器应用。代码位于第 4 章主题下。还有一个视频展示了如何在 Alice 中的 `While` 和 `If` 代码块内拖放所有图块。\n"
- fmt: '### Coding the Example App in Objective-C


    Using your requirements and what you learned with your Alice app, try writing
    your random number generator in Objective-C.


    Your Objective-C app will run from the command line, as it asks the user to guess
    a random number.


    1.  Open Xcode and start a New Project. Choose the Command Line Tool. See [Figure
    4–9](#Chapter04.html#fig_4_9).


    ![images](images/0409.jpg)


    **Figure 4–9.** *Start a new Command Line Tool project.*


    2.  Call your project `RandomNumber` (see [Figure 4–10](#Chapter04.html#fig_4_10)).
    Select **Foundation** and make sure **Use Automatic Reference Counting** is checked.
    **Save** the project anywhere you prefer on your hard drive.


    ![images](images/0410.jpg)


    **Figure 4–10.** *Project options for* *RandomNumber*


    Now, you need to open the implementation file in the Source group. This is where
    you will write your Objective-C code.


    3.  Open the `main.m` file. Delete the following line of code: `NSLog(@"Hello,
    World!");`


    4.  You are ready to write your app. Start writing the code under `// insert code
    here…`


    See [Figure 4–11](#Chapter04.html#fig_4_11).


    ![images](images/0411.jpg)


    **Figure 4–11.** *The editor is now ready for you to write your code.*


    Following your Alice code, you will write your random number generator app. You
    will notice that most of the code is very similar to your Alice app. See [Listing
    4–9](#Chapter04.html#list_4_9).


    **Listing 4–9.** *Source Code for Your Random Number Generator App*


    ```

    11 int main (int argc, const char * argv[])

    12 {

    13

    14 @autoreleasepool {

    15

    16 // insert code here...

    17 int randomNumber = 1;

    18 int userGuess = 1;

    19 BOOL continueGuessing = TRUE;

    20 BOOL keepPlaying = TRUE;

    21 char yesNo = '' '';

    22

    23 while (keepPlaying)

    24 {

    25      randomNumber = (arc4random() % 101);

    26      NSLog(@"The random number to guess is: %d",randomNumber);

    27      while (continueGuessing)

    28      {

    29               NSLog (@"Pick a number between 0 and 100. ");

    30               scanf ("%i", &userGuess);

    31               fgetc(stdin);//remove CR/LF i.e extra character

    32              if (userGuess == randomNumber)

    33              {

    34                      continueGuessing = FALSE;

    35                      NSLog(@"Correct number!");

    36              }

    37              //nested if statement

    38              else if (userGuess > randomNumber)

    39              {

    40                      //user guessed too high

    41                      NSLog(@"Your guess is too high");

    42              }

    43              else

    44              {

    45                      // no reason to check if userGuess < randomNumber. It
    has to be.

    46                      NSLog(@"Your guess is too low");

    47              }

    48              //refactored from our Alice app. This way we only have to code
    once.

    49              NSLog(@"The user guessed %d",userGuess);

    50      }

    51      NSLog (@"Play Again? Y or N");

    52

    53      yesNo = fgetc(stdin);

    54

    55      if (yesNo == ''N'' || yesNo == ''n'')

    56      {

    57              keepPlaying = FALSE;

    58      }

    59      continueGuessing = TRUE;

    60      }

    61 }

    62 return 0;

    63 }

    ```


    In [Listing 4–9](#Chapter04.html#list_4_9), there is new code that we haven’t
    discussed before. The first new line of code (line 25) is


    ```

    randomNumber = (arc4random() % 101);

    ```


    This line will produce a random number between 0 and 100; `arc4random()` is a
    function that returns a random number. Although this will not generate a truly
    random number, it will work for this example.


    The modulus operator is called `%`. This operator returns the remainder of its
    two operands; in this case, it’s the remainder of `arc4random()` divided by 101.


    The next line of new code is


    ```

    scanf ("%i", &userGuess);

    ```


    The function `scanf` reads a value from the keyboard and stores it in `userGuess`.


    **NOTE:** The source code for this Objective-C project is available for download
    at `forum.xcelme.com`. Additionally, there is a short video explaining the source
    code and the project.


    #### Nested If Statements and Else-If Statements


    Sometimes, it is necessary to **nest if statements**. This means that you need
    to have if statements nested inside an existing if statement. Additionally, it
    is sometimes necessary to have a comparison as the first step in the else section
    of the if statement. This is called an **else-if statement** (recall line 38 in
    [Listing 4–9](#Chapter04.html#list_4_9).


    ```

    else if (userGuess > randomNumber)

    ```


    #### Removing Extra Characters


    Line 31 is another new line of code.


    ```

    fgetc(stdin); //remove CR/LF i.e extra character

    ```


    The function `scanf` can be difficult to work with. In this case, `scanf` leaves
    a remnant in your input buffer that needs to be flushed, so you can read a Y or
    N from the keyboard to determine if the user wants to play again.


    #### Improving the Code Through Refactoring


    Often, after you get your code to work, you examine the code and find more efficient
    ways to write it. The process of rewriting your code to make it more efficient,
    maintainable, and readable is called **code refactoring**.


    As you were reviewing your code in Objective-C, you noticed that you could eliminate
    some unnecessary code. Your code had the following line repeated in the if-else
    statement:


    ```

    //refactored from our Alice app. This way we only have to code once.

    NSLog(@"The user guessed %d",userGuess);

    ```


    **NOTE:** As developers, we have found that the best line of code you can write
    is the line that you don’t write—less code means less to debug and maintain.


    #### Running the App


    Press the Play button in your Objective-C project and run your app. See [Figure
    4–12](#Chapter04.html#fig_4_12).


    ![images](images/0412.jpg)


    **Figure 4–12.** *The console output of the Objective-C random number generator
    app*


    **NOTE:** If you’re not seeing the output console when you run your app, make
    sure you have selected (grayed) the same options at the top-right and bottom-right
    of the editor (see [Figure 4–12](#Chapter04.html#fig_4_12)).


    ### Moving Forward Without Alice


    You’ve used Alice to learn object-oriented programming. It has enabled you to
    focus on OOP concepts without having to deal with syntax and a compiler; however,
    it is necessary to become more familiar with the specifics of the Objective-C
    language. Alice has served you well and you can now focus on using Objective-C
    and Xcode for the remainder of the book.


    ### Summary


    In this chapter, you’ve covered a lot of important information on how to control
    your applications; program flow and decision-making are essential to every iPhone/iPad/Mac
    App. Make sure you have completed the Objective-C example in this chapter. You
    might review these examples and think you understand everything without having
    to write this app. This will be a fatal mistake that will prevent you from becoming
    a successful iPhone/iPad/Mac developer. You must spend time coding this example.


    The terms in this chapter are very important. You should be able to describe the
    following:


    *   AND

    *   OR

    *   XOR

    *   NAND

    *   NOR

    *   NOT

    *   Truth tables

    *   Negation

    *   All comparison operators

    *   Application requirement

    *   Logical AND (`&&`)

    *   Logical OR (`||`)

    *   Flowchart

    *   Loop

    *   Controlled loops

    *   For Loop

    *   Condition-controlled loops

    *   Infinite loops

    *   While loops

    *   Nested if statements

    *   Code refactoring


    ### Exercises


    *   Extend the random number generator app to print to the console how many times
    the user guessed before he or she guessed the correct random number. Do this in
    both Alice and Objective-C.

    *   Extend the random number generator app to print to the console how many times
    the user played the app. Print this value when the user quits the app. Do this
    in both Alice and Objective-C.


