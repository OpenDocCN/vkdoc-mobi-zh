    *   **Functions** and methods are similar. In Alice, the difference between the
    two is that a method does not return a value. A function will return a value.


    #### Events Area


    The Events Area of the Alice interface contains a listing of all the existing
    events used by our app, and provides us with the opportunity to create new events.
    **Events** are conditions that trigger our methods. Methods (or procedures) that
    react to these events are called **event handlers**. When a specific event occurs,
    it **triggers** a signal that the event handler receives and handles.


    Some examples would be the user touching a button on an iPhone. The touching or
    swiping triggers events and the methods that handle these events act on objects
    in our app. See [Figure 2–7](#Chapter02.html#fig_2_7).


    ![images](images/0207.jpg)


    **Figure 2–7.** *Phonics Easy Reader 1, by Rock ’n’ Learn, is running on the iPad
    Simulator in the left landscape orientation. Tapping the “Read to me” or “Let
    me try” button triggers events that methods receive and act on—in this example,
    reading to the child or having the child read the words of a sentence.*'
  trans: '

    ### 与爱丽丝一起探索


    爱丽丝的 3D 编程环境让编写第一个程序变得简单，因为它应用了你在第 1 章中学到的一些原则。首先，你需要进一步了解爱丽丝的用户界面。当我们首次启动爱丽丝时，会看到一个类似图
    2-1 的屏幕。


    你可以使用默认的蓝天绿草模板，也可以选择其他不同背景的模板。尽情探索并享受其中乐趣吧。这里将是我们花费大部分时间并编写第一个爱丽丝应用程序的地方。


    爱丽丝的用户界面旨在帮助我们高效编写应用程序。其界面在形式和功能上与 Xcode IDE 非常相似。现在，我们来探索爱丽丝的主要区域。


    ![images](img/0201.jpg)


    **图 2-1.** *爱丽丝的启动屏幕*


    #### 导航菜单


    导航菜单，如图 2-2 所示，允许我们打开和关闭文件、设置应用程序偏好、查看世界统计数据、文本输出和错误控制台。我们还可以通过导航菜单访问示例世界和爱丽丝帮助。


    **注意：** 在使用爱丽丝时，务必频繁保存程序。如果爱丽丝崩溃而你未保存工作，你将丢失自上次保存以来的所有代码或更改。此外，我们建议你在要打开新的爱丽丝程序时，完全关闭爱丽丝并重新启动。


    ![images](img/0202.jpg)


    **图 2-2.** *此图展示了爱丽丝用户界面的主要部分。花点时间探索用户界面。你将在本章中了解它如何与 Xcode 进行比较，以及它如何帮助我们学习 Objective-C。*


    #### 世界窗口


    世界窗口显示我们的虚拟世界在运行时的样子。这个窗口类似于我们稍后用于运行应用程序的 iPhone/iPad 模拟器。世界窗口使我们能够利用爱丽丝的 3D 用户界面来建模我们的应用程序。


    在世界窗口中，我们可以移动相机并将其放置到我们想要的视角位置。图 2-3 中的三个箭头工具提供了极大的灵活性，使我们的应用程序栩栩如生。


    学习如何在世界中移动相机以获取你希望用户看到的视角非常重要。


    ![images](img/0203.jpg)


    **图 2-3.** *用于在世界窗口中控制相机的相机操控箭头。*


    爱丽丝中最重要的控件之一是**编辑场景**控件。参见图 2-4。当我们点击世界窗口右下角的“编辑场景”按钮时，将启动爱丽丝的**场景编辑器**。


    ![images](img/0204.jpg)


    **图 2-4.** *世界窗口中的“编辑场景”按钮由方框标出，是最重要的控件之一。该按钮将启动爱丽丝的场景编辑器，使我们能够向爱丽丝世界添加对象。*


    花点时间熟悉图 2-5 所示的场景编辑器。场景编辑器使我们能够：


    *   从库中向世界添加对象。

    *   从互联网向世界添加对象。

    *   在世界中定位对象。

    *   调整相机以查看我们的世界。


    我们将花费大量时间通过场景编辑器向世界添加对象并设置相机。


    ![images](img/0205.jpg)


    **图 2-5.** *爱丽丝的场景编辑器*


    #### 爱丽丝中的类、对象和实例


    一组具有相同属性和相同方法（动作）的对象被称为**类**。例如，我们可以有一个名为 `Airplane` 的类。在这个类中，我们可以有五个对象：


    `boeing747`

    `lockheedSR71`

    `boeing737`

    `citation10`

    `f18Fighter`


    这些对象几乎相同。它们来自同一个 `Airplane` 类。它们都具有以下相同的方法：


    `land()`

    `takeOff()`

    `lowerLandingGear()`

    `raiseLandingGear()`

    `bankRight()`

    `bankLeft()`


    区分这些对象的唯一因素是它们属性值的不同。这些值的一些属性可能是：


    `wingLength = 20ft`

    `maxThrust = 200,000lbs`

    `numberOfEngines = 2`


    在你的世界中，你可能有两个完全相同的对象。你可能希望在视图中看到两架波音 737。类的每个副本称为一个**实例**。向程序添加类的实例称为**实例化**。


    #### 对象树


    **对象树**（参见图 2-6）使我们能够查看爱丽丝世界中的所有对象。此外，如果对象有子部件，你可以通过单击加号来查看这些子部件，或者通过单击减号来折叠子部件。


    ![images](img/0206.jpg)


    **图 2-6.** *对象树*


    许多爱丽丝世界都包含我们应用程序所需的几个内置对象。图 2-6 中的世界包含相机、灯光和地面对象。


    #### 编辑器区域


    编辑器区域是爱丽丝界面中最大的区域，我们在这里编写代码。使用爱丽丝，我们实际上不需要键入代码；我们可以拖放代码来操作我们的对象和属性。


    **注意：** 不要忘记编辑器区域的顶部。顶部包含一行用于循环、分支和其他逻辑结构的控件和逻辑模块，我们可以用它们来控制对象的行为。


    #### 详细信息区域


    爱丽丝界面中的**详细信息区域**包含用于属性、过程和函数的选项卡，这些构成了对象树中选定的对象。


    *   **属性**包含我们选定对象的具体信息（例如，重量、长度和高度）。

    *   **过程（方法）** 对对象执行动作（例如，起飞和降落）。

    *   **函数**与方法类似。在爱丽丝中，两者的区别在于方法不返回值，而函数会返回值。


    #### 事件区域


    爱丽丝界面中的事件区域包含应用程序使用的所有现有事件的列表，并为我们提供了创建新事件的机会。**事件**是触发我们方法的条件。响应这些事件的方法（或过程）称为**事件处理程序**。当特定事件发生时，它会**触发**一个信号，由事件处理程序接收和处理。


    一些例子是用户在 iPhone 上触摸按钮。触摸或滑动会触发事件，而处理这些事件的方法会对应用程序中的对象进行操作。参见图 2-7。


    ![images](img/0207.jpg)


    **图 2-7.** *Phonics Easy Reader 1（由 Rock ''n'' Learn 出品）以左侧横向方向在 iPad 模拟器上运行。点击“读给我听”或“让我试试”按钮会触发事件，方法接收并处理这些事件——在此示例中，是为孩子朗读或让孩子读出句子中的单词。*

    '
- fmt: '### Creating an Alice App—To the Moon Alice


    We have covered some new terms and concepts, and now, it is time to do what programmers
    do—write code. It is customary for new developers to write a **Hello World** app
    as their first program. We will do something similar, but Alice makes it more
    interesting. We will then follow up our first Alice app with our first Objective-C
    app.


    This Alice app will have three objects on the screen, the lunar lander object
    and two astronauts. One astronaut will say, “The Eagle has landed.” The other
    astronaut will say, “That’s one small step for man, one giant leap for mankind.”


    Alice really makes apps like this easy and fun to do. Make sure you follow these
    steps:


    1. Click **File** and then **New**.

    2. Click the **Template** tab.

    3. Choose the `MoonProject.a3p` Template, and click the **Open** button. See [Figure
    2–8](#Chapter02.html#fig_2_8).


    ![images](images/0208.jpg)


    **Figure 2–8.** *Select the Space Template.*


    4. Now, we need to add our objects. Click **Edit Scene**. It was the important
    button in the World window shown in [Figure 2–4](#Chapter02.html#fig_2_4).

    5. In the Object Gallery, select the **Space Class from the Generic Alice Models**.

    6. Right-click the **Lunar Lander** to view some of the information about the
    object. See [Figure 2–9](#Chapter02.html#fig_2_9). We can click **“OK”** to add
    our objects to our world, or we can drag and drop them from the gallery to the
    world.


    **NOTE:** You can see in this example why an instance is a copy of an object.
    We are making a copy of the object and putting it in our world. *Instantiation*
    is a big word for the process of making a copy of and initializing our object.


    ![images](images/0209.jpg)


    **Figure 2–9.** *Viewing and adding objects to our world from Step 6.*


    7. Click the `Astronaut` class twice to add our two astronauts to our world.

    8. Use the **Camera Adjustment** and **Objects Adjustment** tools, outlined in
    boxes in [Figure 2–10](#Chapter02.html#fig_2_10), to achieve the look and perspective
    you desire.


    **TIP:** Sometimes when you add two objects, Alice places one object over the
    other. Drag the top astronaut to the side of the other astronaut if this occurs.
    Your world should look like [Figure 2–10](#Chapter02.html#fig_2_10).


    ![images](images/0210.jpg)


    **Figure 2–10.** *Use the Camera Adjust tool to control the user perspective of
    the world. Use the Object Adjustment tools to shape and orientate your objects
    in your world.*


    9. At the top right corner are the **Object Adjustment** tools. Hover the mouse
    over each tile to discover what each tile tool will do to the object. Notice the
    Object Tree in [Figure 2–10](#Chapter02.html#fig_2_10). The `ground`, `lunarLander`,
    `astronaut`, and `astronaut2` objects are in the Object Tree.

    10. Click the **Edit Code** button at the bottom right of the screen. This will
    return us to the editor view.

    11. Click the left astronaut in the World window. Make sure the **Procedures tab**
    is selected in the Details Area.

    12. We are now going to make our astronauts say something. Remember actions to
    objects require methods. Drag the `Astronaut2|turn` tile from the Details Area
    to our Editor. Select **turn left**, **0.25 rotation** from the parameter list.
    See [Figure 2–11](#Chapter02.html#fig_2_11). When we run our app, the left astronaut
    will turn to their left one-quarter of a rotation and face the other astronaut.


    ![images](images/0211.jpg)


    **Figure 2–11.** *The left Astronaut’s methods and parameters.*


    13. Let''s do the same thing for the other astronaut. Click the right astronaut.
    Drag the `Astronaut|turn` tile from the Details Area to our Editor. **Select turn
    right**, **0.25 rotation** from the parameter list.

    14. A **parameter** is the information a method needs to act upon the object.
    A method may need one or more parameters for a method. Click the right astronaut,
    drag the `Astronaut2|say` tile to the editor, **select other**, and then type
    **The Eagle has landed.** See [Figure 2–12](#Chapter02.html#fig_2_12).


    ![images](images/0212.jpg)


    **Figure 2–12.** *Your Editor should have these methods within the listed parameters.*


    15. Click the right astronaut. Drag the `astronaut|say` tile to the editor, **select
    other**, and type, **That’s one small step for man. . . One giant leap for mankind**.
    Your app should look like [Figure 2–12](#Chapter02.html#fig_2_12).

    16. Let''s run our first program by clicking **Play**. If you have completed everything
    correctly, your app should look like [Figure 2–13](#Chapter02.html#fig_2_13) when
    it runs. If not, you have some debugging to do.

    17. Save the app as `toTheMoonAlice.a3p`. We will be using this app later. Click
    **File** ![images](images/U001.jpg) **Save World**, or **File** ![images](images/U001.jpg)
    **Save World As**.


    ![images](images/0213.jpg)


    **Figure 2–13.** *From the top portion of the World Running window, we can rerun
    our program, pause, resume, restart, stop, and take a picture of our app. We can
    also speed up or slow down our app, depending on how slow or fast our application
    is running.*


    ### Your First Objective-C Program


    Now that you have learned a little about OOP, and have your first Alice program
    completed, it’s time to write your first Objective-C program and begin to understand
    the Objective-C language, Xcode, and syntax. First, we have to install Xcode.
    Xcode is the IDE that we use when developing Objective-C apps. It is equivalent
    to Alice’s interface.'
