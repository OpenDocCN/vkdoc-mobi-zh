    In this chapter, you learned about how data is used by our apps. You saw how to
    initialize variables and how to assign data to them. We explained that when variables
    are declared, they have a data type associated with them and that only data of
    the same type can be assigned to variables.


    Finally, we showed you how to use variables in your first Alice app and finished
    by using variables with an Objective-C app.


    ### Exercises


    *   Write an Objective-C console app (Command-Line Tool) that multiples two integers
    together and displays the result to the console.

    *   Write an Objective-C console app that squares a float. Display the resulting
    float in the console.

    *   Write an Objective-C console app that subtracts two floats, with the result
    being stored as an integer. Note that rounding does not occur.


