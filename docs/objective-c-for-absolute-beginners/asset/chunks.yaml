    \ `ARC`。要启用或禁用 `ARC`，只需在 Xcode 4.2 项目的构建设置中查找 **自动引用计数**，如 图 13–10 所示。\n\n![images](img/1310.jpg)\n\
    \n**图 13–10.** *在 Xcode 4.2 项目中启用或禁用 ARC。*\n\n我们将探讨如何利用新的 `ARC` 特性在 Objective-C\
    \ 中管理内存。\n\n首先，`retain`/`release` 和 `autorelease`（稍后讨论）不再是有效的方法。在 `ARC` 下，这些方法已被弃用。这还包括属性中的\
