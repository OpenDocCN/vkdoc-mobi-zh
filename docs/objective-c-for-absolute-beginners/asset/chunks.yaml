    \ NSString *name;\n```\n\n现在使用 Xcode 4.2，这发生了一些变化。该属性应写成：\n\n```\n@property (nonatomic,\
    \ strong) NSString *name;\n```\n\n`strong` 关键字取代了 `retain`；`strong` 用于告诉编译器，当赋值时需要保留此对象。反之，编译器会知道，当它不再被使用或重新赋值时，也要释放此对象。\n\
    \n以下是另一个关于如何使用隐式 `strong` 变量的代码示例：\n\n**清单 13–6.** *使用自动引用计数。*\n\n```\n1   24\
