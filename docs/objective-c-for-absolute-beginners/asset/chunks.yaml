    \ and a stop. Branches should never come to an end without a stop. This helps\
    \ developers make sure all of the branches in their code are accounted for and\
    \ that they cleanly stop execution.\n\n### Designing and Flowcharting an Example\
    \ App\n\nWe have covered a lot of information about decision making and program\
    \ flow. It’s time to do what programmers do best: write apps!\n\nThe app you have\
    \ been assigned to write generates a random number between 0 and 100 inclusive,\
    \ and asks the user to guess the number. The user has to do this until the number\
    \ is guessed. You can use any object from the Alice gallery to ask the user for\
    \ his or her guess, and you can also choose any world for your object to be in.\
    \ The object will provide a visual queue for each high, low, and correct guess.\
    \ The number that the user guesses will be displayed on the console. When the\
    \ user guesses the correct answer, he or she will be asked if he or she wants\
    \ to play again. See [Figure 4–5](#Chapter04.html#fig_4_5).\n\n![images](images/0405.jpg)\n\
    \n**Figure 4–5.** *An astronaut object asking the user to guess a number between\
