  trans: "\n## 存储信息\n\n作为开发者，您会遇到许多需要存储数据的不同场景。用户期望您的应用（app）能在每次启动时记住偏好设置和其他信息。在前几章中，我们讨论了“书店”应用。对于这个应用，用户会希望它能够记住书店中的所有书籍，并将数据库位置设为默认。您的应用需要一种方式来存储、检索这些信息，并可能需要对数据进行搜索和排序。处理数据有时可能会有些棘手。幸运的是，苹果公司提供了相应的方法和框架来简化这一过程。\n\
    \n在本章中，我们将讨论两种需要存储数据的不同格式。首先从保存 Mac 和 iPhone 的偏好设置开始，然后讨论如何在应用中使用 `SQLite` 数据库来存储和检索数据。\n\
    \n### 存储考量\n\nMac 和 iPhone 在存储方面存在一些主要差异，这些差异会影响您处理数据的方式。我们先从 Mac 谈起，看看您需要如何为其进行开发。\n\
    \n在 Mac 上，默认情况下，应用存储在“应用程序”文件夹中。每个用户都有自己的个人文件夹，用于存储与该用户相关的偏好设置和信息。并非所有用户都有权限写入“应用程序”文件夹或应用包本身。\n\
    \n在 iPhone 和 iPad 上，开发者无需处理不同用户的问题。每位使用 iPhone 的用户都具有相同的权限和相同的文件夹。不过，在 iPhone\
    \ 上还有一些其他因素需要考虑。iPhone 上的每个应用都处于各自的“沙盒”之中。这意味着一个应用写入的文件只能被该应用自身查看和使用。这为 iPhone\
    \ 创造了一个更安全的环境，但也改变了我们处理数据存储的方式。\n\n### 数据库\n\n我们已经讨论了如何存储少量信息并在以后检索它们。但如果您有更多信息需要存储呢？如果您需要在这些信息中进行搜索，或者将它们按某种顺序排列呢？这些情况就需要用到数据库。\n\
    \n让我们先讨论一下什么是数据库。数据库是一种工具，用于以易于搜索或检索的方式存储大量信息。使用数据库时，通常一次只检索一小部分数据，而不是整个文件。您日常生活中使用的许多应用都基于某种数据库。您的网上银行应用从数据库中检索账户活动。超市使用数据库检索不同商品的价格。一个简单的数据库示例就是电子表格。您的电子表格中可能有许多列和许多行。电子表格中的列代表了您想要存储的不同信息片段。在数据库中，这些被称为属性。电子表格中的行则被视为数据库中的不同记录。\n\
    \n### 在数据库中存储信息\n\n数据库对开发者来说通常是一个令人望而生畏的主题；大多数开发者会将数据库与企业级数据库服务器（如 Microsoft SQL\
    \ Server 或 Oracle）联系起来。这些应用需要花费时间进行设置，并且需要持续维护。对大多数开发者来说，像 Oracle 这样的数据库系统可能过于庞大难应付。幸运的是，苹果公司在\
    \ Mac、iPhone 和 iPad 中内置了一个小巧紧凑的数据库引擎，名为 `SQLite`。这使您无需承担高昂开销就能获得复杂数据库服务器的许多功能。\n\
    \n`SQLite` 将为您的应用在存储信息方面提供极大的灵活性。它将整个数据库存储在单个文件中。它速度快、可靠性高，且易于在您的应用中实现。`SQLite`\
    \ 数据库最棒的一点是，无需安装任何软件；苹果公司已经为您考虑周全了。\n\n然而，作为开发者，您应该了解 `SQLite` 确实存在一些局限性：\n\n\
    -   `SQLite` 被设计为单用户数据库。在多人同时访问同一个数据库的环境中，不应使用 `SQLite`。这可能导致数据丢失或损坏。\n-   在商业领域，数据库可能会变得非常大。数据库管理员处理高达\
    \ 500GB 的数据库并不罕见，有时数据库甚至可能远大于此。`SQLite` 应该能够毫无问题地处理较小的数据库，但如果您的数据库开始变得过大，您将会看到性能问题。\n\
    -   `SQLite` 缺少企业级数据库解决方案中的一些备份和数据恢复功能。\n\n基于本章的目的，我们将重点使用 `SQLite` 作为我们的数据库引擎。如果您正在开发的应用存在上述任何局限性，您可能需要考虑采用企业级数据库解决方案，但这已超出本书的讨论范围。\n\
    \n**注:** `SQLite` 的名称源于结构化查询语言，或 `SQL`。`SQL` 是用于向数据库输入、搜索和检索数据的语言。\n\n苹果公司一直致力于解决数据库开发中的诸多挑战。作为开发者，您无需熟悉\
    \ `SQL`，因为苹果公司已经为您处理了直接的数据库交互。苹果公司创建了一个名为 `Core Data` 的框架，使得与数据库的交互变得容易得多。`Core\
    \ Data` 是苹果公司从 NeXT 公司的一个名为 `Enterprise Object Framework` 的产品改编而来的，它将为您处理所有数据库交互。使用\
    \ `Core Data` 比直接与 `SQLite` 数据库交互要容易得多。通过 `SQL` 直接访问数据库超出了本书的讨论范围。\n\n### Core\
    \ Data 入门\n\n让我们从创建一个新的 `Core Data` 项目开始。\n\n1.  打开 Xcode，选择 **File** ![images](img/U001.jpg)\
    \ **New Project**。要创建一个 Mac OS X `Core Data` 项目，请从左侧菜单中选择 Application。它位于 Mac\
    \ OS X 标题下方。请参见图 11-1。\n\n    ![images](img/1101.jpg)\n\n    **图 11-1.** *创建一个新项目。*\n\
    \n2.  完成后点击 Next 按钮。下一个屏幕将允许您决定项目的保存位置和想要使用的名称。基于本章的目的，我们将使用名称 `BookStoreCoreData`。\n\
    3.  靠近底部，您会看到三个复选框。第一个复选框标记为 **Use Core Data**。请确保勾选该框，然后点击 **Next**。\n\n    ![images](img/1102.jpg)\n\
    \n    **图 11-2.** *使用 Core Data。*\n\n完成后，您的新项目将打开。它看起来与标准应用类似，只是现在您会看到一个 `BookStoreCoreData.xcdatamodel`\
    \ 文件。这个文件被称为数据模型，它将包含关于您将要在 `Core Data` 中存储的数据的信息。\n"
- fmt: "### The Model\n\nIf you click on the triangle next to the folder, you will\
    \ see a file called `BookStoreCoreData.xcdatamodel`. This file will contain information\
    \ about the data you want stored in the database. Click on the model file and\
    \ it will open. You will see a window similar to the one shown in [Figure 11–3](#Chapter11.html#fig_11_3).\n\
    \n![images](images/1103.jpg)\n\n**Figure 11–3.** *The blank model.*\n\nThe window\
    \ is divided into four sections. On the left you have your entities. In more common\
    \ terms, these are the objects or items that you want to store in the database.\n\
    \nThe right top window contains the attributes. Attributes are pieces of information\
    \ about the entities. For example, a book would be an entity and the title of\
    \ the book would be an attribute of that entity.\n\n**NOTE:** In database terms,\
    \ entities are your tables and the attributes of the entities are called columns.\
    \ The objects created from those entities are referred to as rows.\n\nThe right\
    \ middle window will show you all the relationships of an entity. A relationship\
    \ connects one entity to another. For example, we will create a `Book` and an\
    \ `Author` entity. We will then relate them so that every book can have an author.\
    \ The right bottom portion deals with fetched properties. Fetched properties are\
    \ beyond the scope of this book, but they allow you to create filters for your\
    \ data.\n\nLet’s create an entity.\n\n1. Click on the plus sign in the bottom\
    \ left corner of the window, or select **Editor** ![images](images/U001.jpg) **Add\
    \ Entity** from the menu. See [Figure 11–4](#Chapter11.html#fig_11_4).\n\n![images](images/1104.jpg)\n\
    \n**Figure 11–4.** *Adding a new entity.*\n\n2. On the left hand side, you will\
    \ now have the option to name the entity. We will use the name `Book` for this\
    \ entity.\n\n**NOTE:** It is generally considered good practice to capitalize\
    \ your entities’ names.\n\n3. Now let’s add some attributes. Attributes would\
    \ be considered as the details of a book, so we will store the title, author,\
    \ price, and year the book was published. Obviously in your own applications,\
    \ you may want to store more information, such as the publisher, page count, and\
    \ genre, but we want to start out simple. Click on the plus sign at the bottom\
    \ right of the window, or select **Editor** ![images](images/U001.jpg) **Add Attribute**,\
    \ as shown in [Figure 11–5](#Chapter11.html#fig_11_5). If you do not see the option\
    \ to add an attribute, make sure that you have selected the `Book` entity on the\
    \ left-hand side.\n\n![images](images/1105.jpg)\n\n**Figure 11–5.** *Adding a\
    \ new attribute.*\n\n4. You will only be given two options for your attribute,\
    \ the name and the data type. Let’s call this attribute `title`. Unlike entities,\
    \ attribute names should be lowercased.\n5. Now, we will need to select a data\
    \ type. Selecting the correct data type is very important. It will affect how\
    \ your data is stored and retrieved from the database. The list has 12 items in\
    \ it and can be very daunting. We will discuss the most common options and, as\
    \ you become more familiar with Core Data, you can experiment with the other options.\
    \ The most common options are `String`, `Integer 32`, `Float`, and `Date`. For\
    \ the title of the book, select `String`.\n\n> **String**: This is the type of\
    \ attribute used to store text. This should be used to store any kind of information\
    \ that is not a number or a date. In this example, the book title and author will\
    \ be strings.\n> \n> **Integer 32**: There are actually three different integer\
    \ values possible for the attribute. Each of the integer types only differ in\
    \ the minimum and maximum values possible. `Integer 32` should cover most of your\
    \ needs when storing an integer. An integer is a number without a decimal. If\
    \ you try to save a decimal in an integer attribute, the decimal portion will\
    \ be truncated. In this example, the year published will be an integer.\n> \n\
    > **Float**: A float is a type of attribute that can store numbers with decimals.\
    \ A float is similar to a double attribute, but they differ in their minimum and\
    \ maximum values. A float should be able to handle any values. In this example,\
    \ we will use a float to store the price of the book.\n> \n> **Date**: A date\
    \ attribute is exactly what it sounds like. It allows you to store a date and\
    \ time, and then performs searches and lookups based on these values. We will\
    \ not use this type in this example.\n\n6. Let’s create the rest of the attributes\
    \ for the book. Now, add `price`. It should be a float. Add the year the book\
    \ was published. For two-word attributes, it is standard to make the first word\
    \ lowercase and the second word initial capped. For example, an ideal name for\
    \ the year the book was published attribute would be something like `yearPublished`.\
    \ Select `integer 32` as the attribute type. Once you have added all of your attributes,\
    \ your screen should look like [Figure 11–6](#Chapter11.html#fig_11_6).\n\n**NOTE:**\
    \ Attributes’ names cannot contain spaces.\n\n![images](images/1106.jpg)\n\n**Figure\
    \ 11–6.** *The finished book entity.*\n\n**NOTE:** If you are used to working\
    \ with databases, you will notice that we did not add a primary key. A primary\
    \ key is a field (usually a number) that is used to uniquely identify each record\
    \ in a database. In Core Data databases, there is no need to create primary keys.\
    \ The framework will manage all of that for you.\n\nNow that we have finished\
    \ the `Book` entity, let’s add an `Author` entity.\n\n1. Add a new entity and\
    \ call it `Author`.\n2. To this entity, add `lastName` and `firstName`, both of\
    \ which are considered strings.\n\nOnce this is done, you should have two entities\
    \ in your relationship window. Now we need to add the relationships.\n\n1. Click\
    \ on the `Book` entity, then click and hold on the plus sign that is located on\
    \ the bottom right of the screen. Select Add Relationship, as seen in [Figure\
    \ 11–7](#Chapter11.html#fig_11_7).\n\n![images](images/1107.jpg)\n\n**Figure 11–7.**\
    \ *Adding a new relationship.*\n\n2. You will now be given the opportunity to\
    \ name your relationship. We usually give a relationship the same name as the\
    \ entity to which it derived from. Type in `author` as the name, or select `Author`\
    \ from the drop-down menu.\n3. Now, we have created one half of our relationship.\
    \ To create the other half, click on the `Author` entity. Now, click the plus\
    \ sign located at the bottom of the screen and select Add Relationship. We will\
    \ use the entity name that we are connecting to as the name of this relationship,\
    \ so we will call it `books`. We will add an “s” to the entity name because an\
    \ author can have many books. Under Destination, select `Book`, and under Inverse,\
    \ select the relationship you made in the previous step. Your model should now\
    \ look like [Figure 11–8](#Chapter11.html#fig_11_8).\n\n**NOTE:** Sometimes in\
    \ Xcode, when working with models, it is necessary to hit the tab key for the\
    \ names of entities, attributes, and relationships to update. This little quirk\
    \ can be traced all the way back to WebObjects tools.\n\n![images](images/1108.jpg)\n\
    \n**Figure 11–8.** *The final relationship.*"
