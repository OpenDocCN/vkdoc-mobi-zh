    # 启动和使用 Xcode 4.2


    Xcode 4.2 可从 Mac App Store 免费下载，参见图 2–14；也可从 iOS 开发中心获取，参见图 2–15 和图 2–16。


    ![images](img/0214.jpg)


    **图 2–14.** *Xcode 4.2 可从 Mac App Store 免费下载。*


    **注意：** 该软件包包含我们编写 Objective-C 和 Mac 应用所需的一切。要开发 iPhone 应用，你需要申请 iPhone 开发者计划，支付
    99 美元（准备在 iOS 设备上测试时），并从苹果官网 [`http://developer.apple.com/iphone`](http://developer.apple.com/iphone)
    下载 iPhone SDK。


    ![images](img/0215.jpg)


    **图 2–15.** *如果你已支付 99 美元并加入 iOS 开发者计划，就可以下载如上图所示的 Xcode 和 iOS SDK 测试版。*


    现在我们已经安装了 Xcode，需要开始编写 Objective-C 应用程序了；让我们开始吧。启动 Xcode 后，请按照以下步骤操作：


    1.  点击 **Create a new Xcode Project**。参见图 2–16。


    ![images](img/0216.jpg)


    **图 2–16.** *创建我们的第一个 Objective-C 项目。*


    **重要提示：** 许多初学者在此处会遇到困难，具体取决于他们使用的 Xcode 版本以及是否安装了 iPhone SDK。在图 2–17 中，你可以看到我们已经安装了
    iOS SDK，同时也安装了 Lion 版本的 Xcode。如果你尚未安装这些，也没关系。只需在模板选项的左侧窗格中导航，点击 **Applications**，然后查找
    Command Line Tool 即可。


    2.  在左侧窗格中选择 **Applications**，选择 **Command Line Tool** 模板，然后点击 **Next**。参见图 2–17。


    ![images](img/0217.jpg)


    **图 2–17.** *选择 Command Line Tool。你可能需要在其他版本的 Xcode 中导航到等效界面。总之，关键是要找到 Command
    Line Tool。*


    3.  让我们将应用命名为 **HelloWorld**，并选择 **Foundation** 作为应用类型，如图 2–18 所示。然后点击 **Next**，并将应用保存到你选择的目录中。


    ![images](img/0218.jpg)


    **图 2–18.** *将应用命名为 HelloWorld，并选择 Foundation 作为应用类型。*


    4.  在 **Project Navigator** 中，点击 `main.m` 文件。参见图 2–19。


    Xcode 为我们做了大量工作，创建了一个包含文件和代码的目录，供我们直接使用。这就是 Xcode 模板的作用——它们为我们节省了大量时间。


    我们需要熟悉 Xcode IDE。让我们来看两个最常用的功能（参见图 2–19）：


    *   导航区

    *   编辑器区


    这些区域与我们在 Alice 中使用的界面类似。**导航**区包含构建应用所需的文件，包括我们的类、方法和资源。


    **编辑器**区是 Xcode IDE 的核心所在；在这里，我们的梦想变成了现实。编辑器区域是我们编写代码的地方。你会注意到，编写代码时，代码的颜色会发生变化。有时，Xcode
    甚至会尝试为你自动补全单词。这些颜色都有其含义，随着我们使用 IDE，它们会逐渐变得清晰。编辑器区域也是我们调试应用的地方。


    **注意：** 即使我们已经提过，但值得再说一次：通过阅读本书，你将学习 Objective-C 编程，但通过调试应用，你才会*真正*学会 Objective-C。调试是开发者学习并成长为优秀开发者的途径。


    **Run** 按钮将我们的代码从纯文本转换为 Mac、iPhone 或 iPad 能够执行的 `.app` 文件。在 Alice 界面中，我们使用播放按钮来运行
    Alice 应用。


    ![images](img/0219.jpg)


    **图 2–19.** *创建项目后，点击 Run 按钮即可运行应用，并在控制台中看到 **Hello World!** 的输出。*


    要运行我们的第一个程序，只需点击 **Run** 按钮。Xcode 会检查我们的代码语法，编译应用，如果未发现错误，则会生成一个 `.app` 文件并运行它。该应用程序将在控制台（也称为终端）中运行。


    当应用运行时，它会在控制台中打印出 **Hello World**。此外，在控制台窗口中，我们还可以看到应用程序是否已终止以及终止的原因。在本例中，它正常终止。我们可以通过消息
    `Program ended with exit code: 0` 看到这一点，这意味着我们的应用没有崩溃。参见图 2–20。


    ![images](img/0220.jpg)


    **图 2–20.** *我们的应用在调试器控制台中执行。*


    现在，让我们修改我们的应用，使其完成我们之前对宇航员所做的操作：


    1.  导航到 `main.m` 文件。

    2.  将第 17 行和第 18 行修改为如图 2–21 所示。

    3.  我们将在第 8 行末尾故意错误地放置一个分号。这会导致编译器错误。

    4.  点击 **Run** 按钮。


    你会看到，当我们尝试编译和运行应用时，会出现问题。我们遇到了一个编译器错误，Xcode IDE 中会显示一个红色指针和相应的提示信息。参见图 2–21。


    当我们编写 Objective-C 代码时，一切都很重要——即使是分号、大小写和括号也不例外。使编译器能够将代码编译为可执行应用的一系列规则称为**语法**。


    `NSLog` 是一个函数，它会在控制台中打印出其参数的内容。


    ![images](img/0221.jpg)


    **图 2–21.** *我们的应用出现语法错误，被 Objective-C 编译器捕获。*


    现在，让我们通过在第 18 行末尾添加分号来修复应用。构建并运行应用后，我们就能在调试控制台中看到输出。参见图 2–22。


    你可以随意尝试和修改打印出的文本。尽情享受吧！


    ![images](img/0222.jpg)


    **图 2–22.** *我们的应用编译无错误，并按预期成功完成了输出。*


    ## 总结


    在本章中，我们构建了第一个 Alice 应用。我们还一同安装了 Xcode，并编译、调试和运行了第一个 Objective-C 应用。我们还介绍了新的 OOP
    术语，这些术语对于理解 Objective-C 至关重要。


    **成功关键：** 如引言中所述，请访问 [`www.xcelme.com`](http://www.xcelme.com) 并点击“免费视频”选项卡，观看与本-章相关的视频。同时，可访问
    [`http://forum.xcelme.com`](http://forum.xcelme.com) 就本章内容提问，并查看常见错误的解答。


    你应该理解以下术语：


    *   类

    *   对象

    *   方法

    *   参数

    *   实例

    *   实例化


    ## 练习


    *   扩展你的 `toTheMoonAlice.a3p` Alice 应用。在场景中放置你选择的另一个对象，并让该对象在两名宇航员说完话后对他们说些什么。

    *   通过添加第三行代码，扩展你的 Objective-C `HelloWorld.app` 应用，该代码将你选择的任何文本打印到控制台。


    # 第 3 章


    ## 数据即为一切


    你可能知道，数据在计算机内存中以 0 和 1 的形式存储。然而，0 和 1 对开发者或应用用户来说并不太有用，因此我们需要了解程序如何使用数据以及数据在计算机上是如何存储的。


    在本章中，我们将了解数据在计算机上是如何存储的，以及我们如何操作这些数据。然后，我们将编写一个有趣的 Alice 应用来演示数据存储，接着用 Objective-C
    编写相同的 Alice 应用。让我们开始吧！


    ### 编程中使用的数制


    计算机处理信息的方式与人类不同。本节将介绍诸如你的 Mac、iPhone 和 iPad 等设备存储、计数和操作信息的各种方式。

    '
- fmt: '### Bits


    A `bit` is defined as the basic unit of information used by computers to store
    and manipulate data. A bit has a value of either `0` or `1`. When computers were
    first introduced, transistors and microprocessors didn’t exist. Data was manipulated
    and stored by vacuum tubes being turned on or off. If the vacuum tube was on,
    the value of the bit was `1` and if the vacuum tube was off, the value was `0`.
    The amount of data a computer was able to store and manipulate was directly related
    to how many vacuum tubes the computer had.


    The first recognized computer was called the Electronic Numerical Integrator And
    Computer (ENIAC). It took up more than 136 square meters and had 18,000 vacuum
    tubes. It was about as powerful as your handheld calculator.


    Today, computers use transistors to store and manipulate data. The power of a
    computer processor depends on how many transistors are placed on its chip or CPU.
    Like the vacuum tube, transistors have an off or on state. When the transistor
    is off, its value is `0`. If the transistor is on, its value is `1`. At the time
    of this writing, the A5 processor that comes in the iPhone 5 and iPad 2 has a
    dual core ARM processor with over 200 million transistors, up from 149 million
    transistors on the A4 processor that was in iPhone 4 and the first iPad. See [Figure
    3–1](#Chapter03.html#fig_3_1).


    ![images](images/0301.jpg)


    **Figure 3–1**. *Apple’s proprietary A5 processor*


    #### Moore’s Law


    The number of transistors on your iPhone’s or iPad’s processor is directly related
    to your device’s processing speed, memory capacity, and the sensors (accelerometer,
    gyroscope) available in the device. The more transistors, the more powerful your
    device is.


    In 1965, the cofounder of Intel, Gordon E. Moore, described the trend of transistors
    in a processor. He observed that the number of transistors in a processor doubled
    every 18 months from 1958 to 1965 and would likely continue “for at least 18 months.”
    The observation became famously known as “Moore’s Law” and has proven accurate
    for more than 55 years. See [Figure 3–2](#Chapter03.html#fig_3_2).


    ![images](images/0302.jpg)


    **Figure 3–2.** *Moore’s Law*


    **NOTE:** There is a downside to Moore’s Law and you have probably felt it in
    your pocket book. The problem with rapidly increasing processing capability is
    that it renders technology obsolete quickly. So when your iPhone’s two-year cell
    phone contract is up, the new iPhones on the market will be twice as powerful
    as the iPhone you had when you signed up. How convenient for everyone!


    ### Bytes


    A byte is another unit used to describe information storage on computers. A `byte`
    is composed of 8 bits and is a convenient power of 2. Whereas a bit can represent
    up to two different values, a byte can represent up to 2⁸ or 256 different values.
    A byte can contain values from 0–255.


    **NOTE:** In [Chapter 13](#Chapter13.html#ch13), we discuss Base-2, Base-10, and
    Base-16 number systems in more detail. However, it is necessary to have an introduction
    to these systems in this chapter in order to understand data types.


    The `binary` number system represents numerical symbols 0 and 1. To illustrate
    how the number `71` would be represented in binary, we will use a simple table
    of 8 bits (1 byte), with each bit represented as a power of 2. To convert the
    byte value `01000111` to decimal, simply add the on bits. See [Table 3–1](#Chapter03.html#tab_3_1).


    ![images](images/t0301.jpg)


    To represent the number `22` in binary, turn on the bits that add up to 22 or
    `00010110`. See [Table 3–2](#Chapter03.html#tab_3_2).


    ![images](images/t0302.jpg)


    To represent the number `255` in binary, turn on the bits that add up to 255 or
    `11111111`. See [Table 3–3](#Chapter03.html#tab_3_3).


    ![images](images/t0303.jpg)


    To represent the number `0` in binary, turn on the bits that add up to 0 or `00000000`.
    See [Table 3–4](#Chapter03.html#tab_3_4).


    ![images](images/t0304.jpg)


    ### Hexadecimal


    Often, it will be necessary to represent characters in another format that is
    recognized by computers, namely a hexadecimal format. You will encounter hexadecimal
    numbers when you are debugging your apps. The `Hexadecimal` system is a base-16
    number system. It uses 16 distinct symbols, 0–9, to represent values zero to nine
    and A, B, C, D, E, and F to represent values 10 to 15. For example, the hexadecimal
    number `2AF3` is equal in decimal to (2 × 16³) + (10 × 16²) + (15 × 16¹) + (3
    × 16⁰), or 10,995. [Figure 3–3](#Chapter03.html#fig_3_3) shows the ASCII table
    of characters. Because 1 byte can represent 256 characters, this works well for
    Western characters. For example, hexadecimal `20` represents a space. Hexadecimal
    `7D` represents a “}”.


    ![images](images/0303.jpg)


    **Figure 3–3.** *ASCII Characters*


    ### Unicode


    Representing characters with a byte worked well for computers until about the
    1990s, when the personal computer became widely adopted in non-Western countries
    where languages have more than 256 characters. Instead of a 1-byte character set,
    Unicode can have up to a 4-byte character set.


    In order to facilitate faster adoption, the first 256 code points are indicial
    to the ASCII character table. Unicode can have different character encodings.
    The most common encoding used for Western text is called `UTF-8`. As an iPhone
    developer, you will probably use this character encoding the most.


    ## Data Types


    Now that we’ve discussed how computers manipulate data, we need to cover a very
    important concept called `data types`. Humans can generally just look at data
    and the context in which it is being used to determine what type of data it is
    and how it will be used. Computers need to be told how to do this. The programmer
    needs to tell the computer the type of data it is being given. For example,


    `2 + 2 = 4`.


    The computer needs to know you want to add two numbers together. In this example,
    they are integers. You might first believe that adding these numbers is obvious
    to even the most casual observer, let alone a sophisticated computer. However,
    it is common for users of iPhone apps to store data as a series of characters,
    not a calculation. For example, a text message might read


    `"Everyone knows that 2 + 2 = 4".`


    In this case, we are using our previous example in a series of characters called
    a `string`. A `data type` is simply the declaration to our program that defines
    the data we want to store. A `variable` is used to store our data and is declared
    with an associated data type. All data is stored in a variable and the variable
    has to have a variable type. For example, in Objective-C, the following are variable
    declarations with their associated data types.


    ```

    int x = 10;

    int y = 2;

    int z = 0;

    char prefix = ''c'';

    NSString *submarineName  = @"USS Nevada SSBN-733";

    ```


    Data types cannot be mixed with one another. You cannot do the following.


    ```

    z = x + submarineName;

    ```


    Mixing data types will cause either compiler warnings or compiler errors and your
    app will not run.


    Most data you will use in your programs can be classified into three different
    types—Booleans, numbers, and objects. We will discuss how to work with numbers
    and object data types in the remainder of this chapter. In [Chapter 4](#Chapter04.html#ch4),
    we will talk more about Boolean data types when we write apps with decision-making.


    **NOTE:** Localizing your app is the process of writing your app so users can
    buy and use it in their native language. This process is too advanced for this
    book, but it is a simple one to complete when you plan from the beginning. Localizing
    your app greatly expands the total number of potential customers and revenue for
    your app without your having to rewrite it for each language. Be sure to localize
    your app. It is not hard to do and can easily double or triple the number of people
    who buy it.'
