- fmt: '# Making Decisions About…and Planning Program Flow


    One of the cool things about being an iPhone/iPad/Mac developer is we get to tell
    our devices exactly what we want them to do and it will be done—our devices will
    do tasks over and over again without getting tired. That’s because iPhones/iPads/Macs
    don’t care how hard they worked yesterday, and they don’t let feelings get in
    the way. These devices don’t need hugs.


    There is a downside to being developers: we have to think of all possible outcomes
    when it comes to our apps. Many students love having this kind of control. They
    enjoy focusing on the many details of their apps; however, it can be frustrating
    having to handle so many details. As we mentioned in the introduction to this
    book, there is a price to pay for developing apps . . . and that price is time.
    The more time you spend developing and debugging, the better you will get with
    all the details, and the better your apps will run. You have to pay this price
    to become a successful developer.


    Computers are black and white; there are no shades of gray. Our devices produce
    results, many of which are based on true and false conditions.


    In this chapter, you will learn about computer logic and controlling the flow
    of your apps. Processing information and arriving at results is at the heart of
    all apps. Your apps need to process data based on values and conditions. In order
    to do this, you need to understand how computers perform logical operations and
    execute code based on the information your apps have acquired.


    ## Boolean Logic


    **Boolean logic** is a system for logical operations. Boolean logic uses binary
    operators like `AND`, `OR`, and the unary operator `NOT` to determine if your
    conditions have been met. Binary operators take two operands. Unary operators
    take one operand; `AND` and `OR` are binary operators, and `NOT` is a unary operator.


    We just introduced a couple of new terms that can sound confusing; however, you
    probably use Boolean logic every day. Let’s look a couple of examples of Boolean
    logic with the binary operators `AND` and `OR` in a conversation parents sometimes
    have with their teenage children.


    "You can go to the movies tonight if your room is clean AND the dishes are put
    away."


    "You can go to the movies tonight if your room is clean OR the dishes are put
    away."


    Boolean operators’ results are either `TRUE` or `FALSE`. In Chapter 3, we briefly
    introduced the Boolean data type. A variable that is defined as Boolean can only
    contain the values `TRUE` and `FALSE`.


    `BOOL seeMovies = FALSE;`


    In the preceding example, the `AND` operator takes two operands: one to the left
    and one to the right of `AND`. Each operand can be evaluated independently with
    a `TRUE` or `FALSE`.


    For an `AND` operation to yield a `TRUE` result, both sides of the `AND` have
    to be `TRUE`. In our first example, the teenager has to clean his or her room
    `AND` have the dishes done. If either one of the conditions is `FALSE`, the result
    is `FALSE`—no movies for the teenager.


    For an `OR` operation to yield a `TRUE` result, only one operand has to be `TRUE`,
    or both conditions can be `TRUE` to yield a `TRUE` result. In our second example,
    just a clean bedroom would result in the ability to go to the movies.


    **NOTE:** Behind the scenes, your iPhone/iPad/Mac defines a `FALSE` as a 0 and
    a `TRUE` as a 1. To be technically correct, a `TRUE` is defined as any non-zero
    value; so, values of 0.1, 1, and 2 would be evaluated as a `TRUE` when evaluated
    in a Boolean expression.


    A `NOT` statement is a unary operator. It takes just one operand to yield a Boolean
    result. For example:


    "You can NOT go to the movies."


    This example takes one operand. The `NOT` operator turns a `TRUE` operand to a
    `FALSE` and a `FALSE` operand to a `TRUE`. Here, the result is a `FALSE`.


    **NOTE:** Performing a `NOT` operation is commonly referred to as *flipping-the-bit*,
    or *negating*. A `TRUE` is defined as a 1, a `FALSE` is defined as a 0, and zeros
    and ones are referred to as *bits*. A `NOT` operation turns a `TRUE` to a `FALSE`
    and a `FALSE` to a `TRUE`, hence *flipping-the-bit* or *negating* the result.


    `AND`, `OR`, and `NOT` are three very common Boolean operators. Occasionally,
    you need to use more complex operators. `XOR`, `NAND`, and `NOR` are common operations
    for iPhone/iPad/Mac developers.


    The Boolean operator `XOR` means *exclusive-or*. An easy way to remember how the
    `XOR` operator works is the `XOR` operator will return a `TRUE` result if only
    one argument is `TRUE`, not both.


    Objective-C does not have these operators built in, but consider that `NAND` and
    `NOR` mean NOT AND and NOT OR. After evaluating the `AND` or the `OR` arguments
    and results, simply negate the results.


    ### Truth Tables


    Let’s use a tool to help you evaluate all the Boolean Operators. A **truth table**
    is mathematical table used in logic to evaluate Boolean operators. They are helpful
    when trying to determine all the possibilities of a Boolean operator. Let’s look
    at some common truth tables for `AND`, `OR`, `NOT`, `XOR`, `NAND`, and `NOR`.


    In an AND truth table, there are four possible combinations of `TRUE` and `FALSE`.


    *   TRUE AND TRUE = TRUE

    *   TRUE AND FALSE = FALSE

    *   FALSE AND TRUE = FALSE

    *   FALSE AND FALSE = FALSE


    Placing these combinations in a truth table results in Table 4–1.


    ![images](images/t0401.jpg)


    An AND truth table only produces a `TRUE` result if both of its operands are `TRUE`.


    Table 4–2 illustrates an OR truth table and all possible operands.


    ![images](images/t0402.jpg)


    An OR truth table produces a `TRUE` result if one or both of its operands are
    `TRUE`.


    Table 4–3 illustrates a NOT truth table and all possible operands.


    ![images](images/t0403.jpg)


    A NOT *flips-the-bit* or negates the original operand’s Boolean value.


    Table 4–4 illustrates an XOR (or exclusive-or) truth table and all possible operands.


    ![images](images/t0404.jpg)


    The operator XOR yields a `TRUE` result if only one of the operands is `TRUE`.


    Table 4–5 illustrates a NAND truth table and all possible operands.


    ![images](images/t0405.jpg)


    Table 4–6 illustrates a NOR truth table and all possible operands.


    ![images](images/t0406.jpg)


    The easiest way to look at the NAND and NOR operators is to simply negate the
    results from the AND and OR truth tables, respectively.


    ### Comparison Operators


    In software development, the comparison of different data items is accomplished
    with **comparison operators**. These operators produce a logical TRUE or FALSE
    result. Table 4–7 shows the list of comparison operators.


    ![images](images/t0407.jpg)


    **NOTE:** If you’re constantly forgetting which way the greater than and less
    than signs go, use a crutch I learned in grade school: If the greater than and
    less than signs represent the mouth of an alligator, the alligator always eats
    the bigger value. It may sound silly, but it works.


    ## Designing Apps


    Now that we’ve introduced Boolean logic and comparison operators, you can start
    designing your apps. Sometimes, it’s important to express all or parts of your
    apps to others without having to write the actual code.


    Writing out code helps a developer think out loud and brainstorm with other developers
    regarding sections of code that are of concern—this helps to analyze problems
    and possible solutions before coding begins.'
