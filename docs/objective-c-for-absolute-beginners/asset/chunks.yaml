    ### Summary


    We''ve finally reached the end of this chapter! Here is a summary of the things
    that we covered.


    *   *Understanding Collection classes:* Collection classes are a very powerful
    set of classes that come with the Foundation and allow us to store and retrieve
    information efficiently.

    *   *Using instance variables*: Instance variables are variables that are defined
    in the interface file of the class and are accessible once the class has been
    instantiated.

    *   Working with properties*: Properties are short ways of creating getters and/or
    setters. Getters and setters get or set the values of an instance variable.*

    *   *Looping with `for...in`: This f*eature offers a new way to iterate through
    an enumerated list of items.

    *   *Building a Master-Detail application:* We used Xcode and the Master-Detail
    template to build a simple Bookstore program to display books and the detail of
    an individual book.

    *   *A simple Data Model:* Using the Collection classes we learned about, we used
    an NSMutableArray to construct a Bookstore Object and use it as a data source
    in our Bookstore program.

    *   *Connect data to the View:* We connected our `Book` object''s data to the
    interface fields using Xcode.


    ### Exercises


    *   Add more books to the bookstore using the original program as a guide.

    *   Enhance the `Book` class so it can store another attribute—a price or ISBN
    number, for example.

