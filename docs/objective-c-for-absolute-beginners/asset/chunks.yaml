    # 下一步行动


    你现在已经具备了扎实的 Objective-C 基础。在学习了最后两章——“内存、地址与指针”以及“使用 Xcode 调试程序”之后，你应该能够深入实践，成为一名出色的
    iOS 开发者。我们向正在成长为 iOS 开发者的学员推荐两本优秀著作：Mark Dalrymple 和 Scott Knaster 合著的 *在 Mac
    上学习 Objective-C*，以及 Dave Mark 和 Jeff LaMarche 合著的 *iOS 5 开发入门*，两书均由 Apress 出版。


    你将做好充分准备来阅读这些书籍，并开始编写自己的 iOS 应用。不要放松——请继续前进！立即开始阅读这些书籍并着手编写你的应用程序。你越早开始运用所学的知识，进步就会越快。无论做什么，都请不要停步！


    # 本章小结


    本章我们介绍了为什么 Objective-C 不使用多重继承，以及协议和委托的工作原理。


    在你的 iOS 学习之旅中，还有很多知识需要了解和掌握。请继续努力，并帮助他人一起前行。


    你应该熟悉以下术语：


    - 多重继承

    - 协议

    - 委托


    # 第 13 章


    # 内存、地址与指针


    计算机和我们人类一样，需要一个工作与存储的空间。例如，可以将计算机内存想象成办公桌上的空间。一个需要同时处理多个项目的人，必须有足够的桌面空间来放置所有文件与文档，以便快速便捷地取用。如果桌面空间对于同时处理的项目数量来说太小，部分项目可能不得不归档到抽屉里，等桌面腾出更多空间再迅速取出。确保桌面空间得到高效利用也非常重要。


    处理计算机内存是编程中较为复杂的领域之一。为什么会这样？这些问题按理说现在应该已经解决了，对吧？嗯，可以说是解决了，也可以说没有。有些语言采用了完全消除程序员管理内存需求的方法，通过一些内部机制（以及一种称为垃圾回收的功能）来处理内存的使用和释放。但这种方法的缺点在于，垃圾回收并不能在所有情况下让程序员对内存使用拥有最终决定权。这为什么重要？一般来说，这关乎性能。当完全掌控内存管理时，程序员也就完全掌握了程序的性能（或性能不足的问题）。


    本章将介绍在 Mac、iPhone 或 iPad 上处理内存的思路。在任何设备上处理内存都有其挑战。例如，iPhone 和 iPad 作为更小的设备，可用内存更少，这意味着高效利用其内存至关重要。幸运的是，Objective-C
    提供了一些机制，让内存管理不再是一件苦差事。你将学习如何分配内存，以及 Xcode 4 中新的自动引用计数（`ARC`）特性，这使得管理已分配内存比早期版本的
    Xcode 简单得多。


    ## 理解内存


    虽然很多人可能将计算机内存比作人类大脑，但我更倾向于将计算机内存比作你作为一个人所拥有的物理工作空间。你就像计算机的 CPU，即实际处理信息并对其执行操作的部分。你拥有的工作空间越大，整理东西就越容易，完成任务也越快。当然，我们都会到达一个临界点，无论获得多少额外空间，都无法再提高工作效率。


    对于计算机而言，内存是存储某些程序（或程序的一部分）和数据的工作区。在 Mac、iPhone 和 iPad 上，最基本的内存单元是 `字节`。如果你将内存想象成一个网格状的盒子，那么一个字节就是一个单独的盒子，如图
    13–1 所示。


    ![图片](img/1301.jpg)


    **图 13–1.** *字节就像一排盒子。*


    当然，在现代典型的计算机中，通常有数十亿个这样的盒子（即字节）。尽管看似庞大近乎无限，但内存是计算机可用作支配的最重要的资源。只有驻留在内存中的程序才能被执行，只有从磁盘加载的数据才能被查看或操作。此外，在
    iPhone 或 iPad 上，可用的内存远少于典型的 PC 或 Mac 电脑。一定程度的内存节约始终是一个好习惯。


    好了，所以内存就像一个由盒子组成的网格，每个盒子保存一个字节的信息。这到底有什么用？计算机如何将每个字节放入其位置，又如何将其取出？当然，如果我的车库里堆满了没有标签的盒子，我很难找出，比如，所有旧游戏机存放的位置。计算机也面临同样的问题，因此它以一种非常有条理的方式来解决这个问题。在深入探讨计算机如何解决这个问题之前，你需要了解内存单位和地址的基本概念。


    ### 位、字节与进制


    在 图 13–1 中，每个盒子代表一个字节，即内存空间。每个字节可以容纳总共 8 个位。一个`位`就是一个可以是 0 或 1 的数字——即关或开。正是这些
    0 和 1 的序列赋予了字节其数值。这些 0 和 1 代表一种`二进制`数字系统；也就是说，每个数字位最多可以有两个值：0 或 1。这有时被称为 base-2
    编号系统（与我们日常生活中使用的 base-10 或十进制编号系统相对）。在深入探讨内存的具体细节之前，理解现代计算机硬件上通常使用的编号系统非常重要。


    **注：** 现代计算机每字节使用 8 个位。在早期的计算时代，不同的计算机制造商有时会采用不同的字节大小。例如，Control Data Corporation
    的 CDC-6000 经常为显示代码使用 12 位字节，而 DEC PDP-10 在位字段上操作，因此一个“字节”可以是 1 位到 36 位中的任何值。IBM
    凭借其流行的 System/360 确立了 8 位字节的标准，20 世纪 70 年代的微处理器也是如此。


    一般来说，人们几乎对所有事物都使用十进制编号；从金钱到度量衡，十进制是标准。然而，在现代计算机领域，十进制系统很少使用。相反，计算机通常使用二进制（base-2）或十六进制（base-16）。


    **注：** 八进制（常称为 base-8）也有使用，但没有十六进制那么常见。

