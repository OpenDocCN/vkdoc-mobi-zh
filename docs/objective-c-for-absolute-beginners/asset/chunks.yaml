    ### 介绍属性


    当我们为 `Book` 对象创建实例变量时，我们是手动创建了用于访问这些变量的方法。既然你已经了解了如何手动操作，接下来让我们看看如何利用一种名为“属性”的特性。属性是一种简洁的方式，能让编译器自动创建用于获取和/或设置实例变量值的函数。正如你之前所学，实例变量通常无法从对象外部直接访问，因此拥有获取和设置这些变量的方法就显得至关重要。


    以下是我们之前创建的 `Book` 对象的接口（头）文件。让我们看看如何让 Objective-C 编译器自动为我们生成 getter 和 setter 方法。


    **代码清单 8–13.** *为 Book 对象添加属性。*


    ```

     1  //

     2  //  Book.h

     3  //  MyBookstore

     4  //

     5  //  Created by M.R. Fisher on 8/28/11.

     6  //  Copyright (c) 2011 www.committed-code.com. All rights reserved.

     7  //

     8  

     9  #import <Foundation/Foundation.h>

    10  

    11  @interface Book : NSObject {

    12  }

    13  

    14  @property(nonatomic,strong) NSString *title;

    15  @property(nonatomic,strong) NSString *author;

    16  @property(nonatomic,strong) NSString *description;

    17  

    18  @end

    ```


    第 14–16 行展示了实例变量的属性声明。并非所有实例变量都需要声明属性，只有那些我们希望对外暴露的才需要。不过，在这个例子中，我们为所有实例变量都创建了属性。注意，之前放在
    `{ ... }` 括号内的实际实例变量声明现在已经不见了。当在 Xcode 4 及以上版本中使用属性时，我们不再需要同时声明实例变量**和**属性。编译器已经足够智能，可以自动为你完成这项工作。


    属性以 `@property` 指令开头。这告诉 Objective-C 编译器为我们自动生成 getter 和/或 setter 方法。具体生成 getter
    还是 setter，或者两者都生成，都包含在声明中。让我们解析一下这段代码：


    `@property¹ (nonatomic,strong)² NSString* title³;`


    1.  这是属性指令。

    2.  小括号及其内部逗号分隔的关键字有时是可选的。在我们的具体例子中，我们指定了 `nonatomic` 和 `strong`。`nonatomic` 关键字告诉编译器不要生成用于多线程的特殊代码——我们没有使用线程，所以使用
    `nonatomic` 没问题。第二个关键字 `strong` 用于指示这是一个强类型变量——在第 13 章讨论内存管理时会进一步说明。这里还可以包含许多其他选项；例如
    `readonly`，它告诉编译器只创建 getter，不创建 setter，从而防止实例变量在对象外部被设置。

    3.  最后，`NSString* title` 是实例变量声明。它必须包含类型，当然还有实例变量名。


    这定义了属性的一半。你可能会问：“只有一半？还缺什么？”嗯，`@property` 的另一半是在实现文件（`.m`）中声明的。


    **代码清单 8–14.** *为 Book 对象定义 getter 和 setter。*


    ```

     1  //

     2  //  Book.m

     3  //  MyBookstore

     4  //

     5  //  Created by M.R. Fisher on 8/28/11.

     6  //  Copyright (c) 2011 www.committed-code.com. All rights reserved.

     7  //

     8  

     9  #import "Book.h"

    10  

    11  @implementation Book

    12  @synthesize title, author, description;

    13  

    14  @end

    ```


    这是 `Book` 对象的实现文件。第 12 行很重要，因为它是完成属性定义所需的另一半。这部分比接口文件简单得多。只需要使用 `@synthesize`
    关键字并提供一或多个属性名的列表即可。在一个 `@synthesize` 语句中可以指定多个属性名，也可以写多个 `@synthesize` 行。这完全取决于个人偏好。


    现在我们已经创建了三个不同的属性，那么如何使用这些属性呢？


    ### 使用属性


    一旦在接口文件和实现文件都指定了属性，使用起来就非常直接简单。首先，语法略有变化。让我们看一个传统的 setter：


    `[myBookObject setTitle:newTitle]; // 传统 setter`


    这是一个向图书对象发送 set 消息来设置标题的例子——正如我们所说，非常直接。但是，当使用属性时，情况发生了变化：


    `myBookObject.title = newTitle; // setter 示例`


    有一些非常重要的点需要说明。首先，对象访问不再使用方括号（`[ ... ]`）。其次，我们使用名为 `title` 的属性，而不是 `setTitle` 方法。在内部，仍然存在一个
    `setTitle` 方法，只是它被隐藏了。为什么这一点很重要？嗯，如果我们自己编写了一个显式的 `setTitle` 方法，那么我们的新方法将被调用，而不是编译器创建的方法。这可能是我们想要的行为，也可能不是。


    对于 getter，情况非常相似：


    `NSString* title = myBookObject.title;  // getter 示例`


    获取信息的属性也叫做 `title`。这里的关键在于，访问对象属性的方式决定了是调用 getter 还是 setter。如果我们试图设置变量，就会调用 setter。如果我们试图获取变量的值，就会调用
    getter。


    最后一个很大的区别是，访问属性的语法现在在对象和方法之间使用点号（`.`）。这是必要的，因为方括号已经没有了，所以点号用于区分使用属性和向对象发送消息。


    ### 理解命名规范的重要性


    如前所述，getter 和 setter 的命名有一套规范。虽然这些命名指南并非强制要求，但理解规范的价值在于使用属性时会非常方便。以下是我们之前的例子：


    ```

    - (void)setTitle:(NSString *) newTitle

    {

        if ([newTitle length] > 0) {

            title = newTitle;

        }

    }

    ```


    如果我们创建一个像 `@property title` 这样的属性，并将其与 `@synthesize` 关键字配对，编译器将生成两个方法——一个名为 `title`
    作为 getter，另一个名为 `setTitle` 作为 setter。但是，如果我们提供了自己的 setter 并按照规范命名（如上述代码），编译器就不会生成自己的
    setter。


    `        myBookObject.title = newTitle; // 调用自定义 setter`


    上述代码将调用我们自己定义的自定义 setter，而不是标准的 setter。如果我们编写了自己的 getter 方法，情况也是如此。现在，让我们继续完成
    Bookstore 应用程序。


    ## 完成 MyBookstore 程序


    在理解了实例变量和属性之后，我们现在将着手创建实际的图书店程序。思路很简单——创建一个名为 `Bookstore` 的类，该类将存放几个 `Book` 对象。

