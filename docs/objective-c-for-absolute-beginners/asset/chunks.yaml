  trans: "\n### 模型-视图-控制器\n\n`Model-View-Controller`（`MVC`）是 iPhone/iPad 开发中最常用的设计模式，学习它将极大简化你的开发者生涯。`MVC`\
    \ 被广泛应用于软件开发中，被视为一种架构模式。\n\n架构模式描述了开发者可在代码中复用的软件设计问题解决方案。`MVC` 模式并非苹果面向对象编程开发者独有；包括\
    \ Windows 和 Linux 平台在内的许多 IDE 厂商都在采用它。\n\n软件开发对企业而言常被视为一项昂贵且高风险的投资。应用经常超出预期开发时间、预算超支，且无法按照承诺运行。面向对象编程曾引发大量关注，让人们相信采用其方法论能节省成本，这主要归功于对象的可复用性和代码更易维护。但最初，这一愿景并未实现。\n\
    \n当工程师们探究面向对象编程为何未能达到预期时，他们发现了开发者设计对象方式的一个关键缺陷：开发者经常将对象混杂在一起，导致随着应用成熟、迁移到不同平台或硬件显示变化，代码变得难以维护。\n\
    \n对象设计时常常存在这样的问题：如果以下任何一项发生变化，就很难隔离受影响的对象：\n\n- 业务规则\n- 用户界面\n- 客户端-服务器或基于互联网的系统\n\
    \n对象可以划分为三个与任务相关的类别。开发者有责任确保每个类别中的对象不会越界到其他类别。它们分别是：\n\n1. **模型：** 业务对象\n2. **视图：**\
    \ 用户界面对象\n3. **控制器：** 与模型和视图通信的对象\n\n当对象被归类到这些组中后，应用就能随着时间的推移更轻松地开发和维护。以下是一个 iPhone\
    \ 银行应用中的对象及其对应的 `MVC` 类别示例：\n\n**模型**\n\n- 账户余额\n- 用户加密\n- 账户转账\n- 账户登录\n\n**视图**\n\
    \n- 账户余额表格单元格\n- 账户登录旋转控件\n\n**控制器**\n\n- 账户余额视图控制器\n- 账户转账视图控制器\n- 登录视图控制器\n\n\
    在 `MVC` 范式中记忆和归类对象最简单的方法如下：\n\n**模型**：代表真实世界的独特业务或应用规则及代码\n\n**视图**：独特的用户界面代码\n\
    \n**控制器**：任何控制或与模型、视图对象通信的代码\n\n`图 10–2` 展示了 `MVC` 范式。\n\n![images](img/1002.jpg)\n\
    \n**图 10–2.** *MVC 范式*\n\nXcode 和 Interface Builder 都不会强制开发者使用 `MVC` 设计模式。开发者需要自行组织对象以运用此设计模式。\n\
    \n值得一提的是，苹果*强烈*推崇 `MVC` 设计模式，其所有框架都设计为在 `MVC` 环境中运行。这意味着，如果你也遵循 `MVC` 设计模式，使用苹果的类库将更加得心应手。否则，你将如同逆水行舟。\n\
    \n### 人机界面指南（HIGs）\n\n在你过于兴奋并开始为应用设计动态用户界面之前，需要先了解一些基本规则。苹果通过 iOS 5 打造了世界上最先进的操作系统之一。此外，苹果产品以直观和用户友好著称。苹果希望用户在不同应用间获得一致的体验。\n\
    \n为确保用户体验的一致性，苹果为开发者提供了关于应用外观和感觉的指南。这些指南被称为人机界面指南（HIGs），适用于 Mac、iPhone 和 iPad。你可以从\
    \ `http://developer.apple.com` 下载这些文档。参见 `图 10–3`。\n\n![images](img/1003.jpg)\n\
    \n**图 10–3.** *适用于 iOS 设备和 Mac 的苹果人机界面指南（HIGs）*\n\n**注意：** 苹果的 HIGs 不仅仅是建议或参考。苹果对此非常重视。虽然\
    \ HIGs 并未描述如何用代码实现用户界面设计，但它们对于理解正确实现视图和控件的方法非常有帮助。\n\n以下是应用在苹果 iTunes App Store\
    \ 被拒绝的主要原因：\n\n1. 应用崩溃\n2. 违反 HIGs\n3. 使用苹果私有 API\n4. 功能与 iTunes App Store 宣传不符\n\
    \n你可以在开发应用之前阅读、学习并遵循 HIGs，或者当你的应用被苹果拒绝并需要重写部分或全部代码后，再来阅读、学习并遵循 HIGs。无论如何，所有 iOS\
    \ 开发者最终都将熟悉 HIGs。\n\n许多 iOS 新开发者是通过惨痛教训才明白这一点，但如果你从第一天起就遵循 HIGs，你的 iOS 开发体验将会愉快得多。\n\
    \n### 使用 Interface Builder 创建示例 iPhone 应用\n\n让我们开始构建一个生成并显示随机数的 iPhone 应用。参见 `图\
    \ 10–4`。这个应用将类似于我们在第 4 章创建的应用，但我们会看到添加 iOS 用户界面（UI）后应用变得多么有趣。\n\n![images](img/1004.jpg)\n\
    \n**图 10–4.** *完成的 iOS 随机数生成器应用*\n\n1. 打开 Xcode，选择**创建新项目**。确保为 iPhone 选择**单一视图应用**。参见\
    \ `图 10–5`。\n\n   ![images](img/1005.jpg)\n\n   **图 10–5.** *创建 iPhone 单一视图应用*\n\
    \n2. 将项目命名为“RandomNumber”并保存项目。参见 `图 10–6`。\n\n   ![images](img/1006.jpg)\n\n\
    \   **图 10–6.** *为我们的 iPhone 项目命名*\n\n3. 你的项目文件和设置被创建并显示出来。参见 `图 10–7`。\n\n  \
    \ ![images](img/1007.jpg)\n\n   **图 10–7.** *源文件*\n\n   尽管此项目中只有一个控制器，但在开发初期就建立\
    \ MVC 分组是良好的编程习惯。这有助于提醒开发者保持 MVC 范式，避免将所有代码不必要地塞入控制器。\n\n4. 右键点击 RandomNumber\
    \ 项目，然后选择**新建分组**。参见 `图 10–8`。\n\n   ![images](img/1008.jpg)\n\n   **图 10–8.**\
    \ *创建新分组*\n\n5. 创建模型分组、视图分组和控制器分组。\n\n6. 将 `ViewController.m` 和 `.h` 文件拖入控制器分组。拥有这些分组能提醒你在开发代码时遵循\
    \ MVC 设计模式，并防止你将所有代码都放在控制器中。参见 `图 10–9`。\n\n   开发者发现，随着项目增长，将 `XIB` 文件与控制器放在一起很有帮助。项目中拥有数十个控制器和\
    \ `XIB` 文件的情况并不罕见。将它们放在一起有助于保持一切井井有条。\n\n   ![images](img/1009.jpg)\n\n   **图\
    \ 10–9.** *包含控制器和 XIB 文件的 MVC 分组*\n\n7. 点击 `ViewController.xib` 打开 Interface Builder。\n\
    \n#### 使用 Interface Builder\n\n启动 Interface Builder 并开始处理视图的最常见方法是点击与视图相关的 `XIB`\
    \ 文件。参见 `图 10–10`。\n\n![images](img/1010.jpg)\n\n**图 10–10.** *工作区窗口中的 Interface\
    \ Builder*\n\n当 Interface Builder 打开时，我们可以在画布中看到视图显示。现在我们就能设计用户界面了。首先需要了解 Interface\
    \ Builder 中的一些子窗口。\n"
- fmt: "### The Dock\n\nThe Document window shows all the objects that our view contains.\
    \ Some examples of these objects are:\n\n- Buttons\n- Labels\n- Text fields\n\
    - Web views\n- Map views\n- iAd\n- Picker views\n- Table views\n\n**NOTE:** You\
    \ can expand the width of the dock to see a detailed list of all your objects.\
    \ See [Figure 10–11](#Chapter10.html#fig_10_11). To get more real estate for the\
    \ canvas, you can shrink or remove your file list window.\n\n![images](images/1011.jpg)\n\
    \n**Figure 10–11.** *The Doc’s width is expanded to show a detailed view of all\
    \ the objects in our XIB.*\n\n### The Library\n\nThe Library is where you can\
    \ exploit your creativity. It’s a smorgasbord of objects that you can drag and\
    \ drop into the view window.\n\n- The library window can grow and shrink by moving\
    \ the window splitter. See [Figure 10–12](#Chapter10.html#fig_10_12).\n\n![images](images/1012.jpg)\n\
    \n**Figure 10–12.** *Expand the Library Pane to see more controls. Slide the spitter\
    \ to resize the window with the mouse.*\n\nFor Cocoa Touch objects, the Library\
    \ pane is divided into the following five sections:\n\n- Controls\n- Data Views\n\
    - Gesture Recognizers\n- Objects & Controllers\n- Window & Bars\n\n![images](images/1013.jpg)\n\
    \n**Figure 10–13.** *Various Cocoa Touch Objects in the Library Pane*\n\n### Inspector\
    \ Pane and Selector Bar\n\nThe Inspector pane enables you to change the properties\
    \ of the controls to make your objects follow your command. The Inspector pane\
    \ has six tabs across the top. See [Figure 10–14](#Chapter10.html#fig_10_14).\n\
    \n- File Inspector\n- Quick Help Inspector\n- Identity Inspector\n- Attributes\
    \ Inspector\n- Size Inspector\n- Connections Inspector\n\n![images](images/1014.jpg)\n\
    \n**Figure 10–14.** *The Identity Inspector and Selector Bar*\n\n### Creating\
    \ the View\n\nOur random number generator will have three objects in the view:\
    \ one label and two buttons. One button will generate the seed, another button\
    \ will generate the random number, and the label shows the random number generated\
    \ by the app.\n\n1. Drag a Label from the Library Pane Controls section to the\
    \ View window.\n2. Drag two rounded rect buttons from the Library window to the\
    \ View Window.\n3. Click the top button and label the button **Seed Random Number\
    \ Generator**.  \n4. Click the bottom button and label it **Generate Random Number**.\
    \ See [Figure 10–15](#Chapter10.html#fig_10_15).\n\n   ![images](images/1015.jpg)\n\
    \n   **Figure 10–15.** *Placing objects in the view*\n\n   Now we get to use a\
    \ new feature with Xcode 4.2 and iOS 5. We now have the ability to quickly and\
    \ easy connect our Outlets and Actions to our code. Xcode 4.2 actually goes one\
    \ step further; it will create some of the code for us. All we have to do is drag\
    \ and drop.\n\n5. Click the Assistant Editor icon at the top right of the screen.\
    \ This will display the `.h` file for the XIB file we are working on. See [Figure\
    \ 10–16](#Chapter10.html#fig_10_16).\n\n![images](images/1016.jpg)\n\n**Figure\
    \ 10–16.** *Using the Assistant Editor to display the .h and .XIB files together*\n\
    \n### Using Outlets\n\nNow we can connect our label to our code by creating an\
    \ outlet.\n\n1. Insert curly brackets for your instance variables. Control-Drag\
    \ from the label in the view to inside the curly brackets in the `.h` file and\
    \ drop. See [Figure 10–17](#Chapter10.html#fig_10_17).\n\n   ![images](images/1017.jpg)\n\
    \n   **Figure 10–17.** *Control-Drag and drop to create the code for randNumber\
    \ outlet*\n\n   A popup window will appear. This enables us to name and specify\
    \ the type of Outlet.\n\n2. Complete the popup as in [Figure 10–18](#Chapter10.html#fig_10_18)\
    \ and **press the Connect button**.\n\n   ![images](images/1018.jpg)\n\n   **Figure\
    \ 10–18.** *Pop-up for randomNumber Outlet*\n\nThe code is now created for the\
    \ outlet and the outlet is now connected to the Label object in our `.XIB` file.\
    \ The shaded circle next to line number 14 indicates the outlet is connected to\
    \ an object in the XIB file. See [Figure 10–19](#Chapter10.html#fig_10_19).\n\n\
    ![images](images/1019.jpg)\n\n**Figure 10–19.** *Outlet instance variable code\
    \ generated and connected to the Label Object.*\n\nAs a reminder, outlets (pointers)\
    \ are declared in our object’s interface file and connected to specific instance\
    \ variables.\n\nThere is also a declaration that may be new to you called an `IBOutlet`,\
    \ commonly referred to simply as an outlet. **Outlets** signal your controller\
    \ that this instance variable is a pointer to another object that is set up in\
    \ Interface Builder. `IBOutlet` will enable Interface Builder to see the outlet\
    \ and enable you to connect the variable to the object in Interface Builder.\n\
    \nUsing the analogy of an electrical wall outlet, these instance variable outlets\
    \ are connected to objects. Using Interface Builder, we can connect these instance\
    \ variables to the appropriate object.\n\n### Connecting Actions and Objects\n\
    \nUser interface object events, also known as Actions, trigger methods.\n\nNow\
    \ we need to connect the object actions to the buttons.\n\n1. Control-Drag from\
    \ the “Seed Random Number Generator” button to below the last curly bracket and\
    \ drop. Complete the pop-up as indicated in [Figure 10–20](#Chapter10.html#fig_10_20)\
    \ and **press the connect button**. Make sure you change the connection as an\
    \ Action and not an Outlet.\n\n   ![images](images/1020.jpg)\n\n   **Figure 10–20.**\
    \ *Complete the pop-up for the Seed method.*\n\n2. Repeat Step 8 for the Generate\
    \ Random Number button.\n\n![images](images/1021.jpg)\n\n**Figure 10–21.** *Generate\
    \ and Seed actions connected to their Button Objects*\n\n### Implementation File\n\
    \nAll that is left is to complete the code for our outlet and actions in the implementation\
    \ file for the controller.\n\nOpen `ViewController.m` file and complete the `seed:`\
    \ and `generate:` methods. See [Figure 10–22](#Chapter10.html#fig_10_22).\n\n\
    ![images](images/1022.jpg)\n\n**Figure 10–22.** *The seed: and generate: methods\
    \ completed.*\n\nThere is some code we should examine a bit further: `[randNumber\
    \ setText:`. The method `setText:` sets the UILabel value in your view. The connections\
    \ you established in Interface Builder from your outlet to the Label object do\
    \ all the work for you.\n\nThat's it!\n\nTo run your iPhone app in the iPhone\
    \ simulator, click the Play button and your app should launch in the simulator.\
    \ See [Figure 10–23](#Chapter10.html#fig_10_23).\n\n![images](images/1023.jpg)\n\
    \n**Figure 10–23.** *The completed random number generator app running in the\
    \ iPhone Simulator*\n\nTo seed the random function, tap Seed Random Number Generator.\
    \ To generate the random number, tap Generate Random Number Generator.\n\n###\
    \ Summary\n\nGreat job! Interface Builder saves you a lot of time when creating\
    \ User Interfaces. You have a powerful set of objects to use in your application\
    \ and are responsible for a minimal amount of coding. Interface Builder handles\
    \ many of the details you would normally have to deal with.\n\nYou should be familiar\
    \ with the following terms:\n\n- XIB files\n- Model-View-Controller (MVC)\n- Architectural\
    \ pattern\n- Human interface guidelines (HIGs)\n- Outlets\n- Actions\n\n### Exercises\n\
    \n- Extend the random number generator app to show a date and time in a Label\
    \ when the app starts.\n- Adjust the Date and Time message for “Generator Seeded”\
    \ to fit nicely in the label.\n- After showing a date and time label, add a button\
    \ to update the data and time label with the new time.\n\n## Chapter 11"
