- fmt: "### Summary\n\nWe’ve finally reached the end of the chapter. Here is a summary\
    \ of the things that we covered.\n\n- **Preferences**: You learned to use `NSUserDefaults`\
    \ to save and read preferences from a file, both on the iPhone and a Mac OS X\
    \ computer.\n- **Database**: You learned what a database is and why using one\
    \ can be preferable to saving information in a preferences file. You also learned\
    \ about the database engine that Apple has integrated into the Mac and iPhone,\
    \ and the advantages and limitations of this database engine.\n- **Core Data**:\
    \ Apple provided a framework for interfacing with the SQLite database. This framework\
    \ makes the interface much easier to use.\n- **Book Store Application**: You created\
    \ a simple Core Data application. You used Xcode to create a data model for your\
    \ Book Store application, learned how to create a relationship between two different\
    \ Entities, and used Xcode to create a simple interface for your Core Data model.\n\
    \n### Exercises\n\n- Add more fields to the `Book` entity. Try adding the publisher,\
    \ pages, and an ISBN number.\n- Change the layout of the Book tab. Reorder the\
    \ columns.\n- Add a default value to the author’s first and last names.\n\n##\
    \ Chapter 12\n\n## Protocols and Delegates\n\nCongratulations! You are acquiring\
    \ the skills to become an iOS developer! However, there are two additional topics\
    \ that iOS developers need to understand to be successful: protocols and delegates.\
    \ It is not uncommon for new developers to get overwhelmed by these topics, so\
    \ we thought it best to introduce the foundation topics of the Objective-C language\
    \ first.\n\n### Multiple Inheritance\n\nWe discussed object inheritance in [Chapter\
    \ 1](#Chapter01.html#ch1). In a nutshell, object inheritance means that a child\
    \ can inherit all the characteristics of its parent. See [Figure 12–1](#Chapter12.html#fig_12_1).\n\
    \n![images](images/1201.jpg)\n\n**Figure 12–1.** *Typical Objective-C inheritance*\n\
    \nC++, Perl, and Python each have a feature called multiple inheritance. Multiple\
    \ inheritance enables a class to inherit behaviors and features from more than\
    \ one parent. See [Figure 12–2](#Chapter12.html#fig_12_2).\n\nHowever, problems\
    \ can arise with multiple inheritance because it allows for ambiguities to occur.\
    \ Due to this, Objective-C does not implement multiple inheritances. Instead,\
    \ it implements something called a protocol.\n\n![images](images/1202.jpg)\n\n\
    **Figure 12–2.** *Multiple inheritance*\n\n### Understanding Protocols\n\nApple\
    \ defines a protocol simply as a list of methods declarations, unattached to a\
    \ class definition. A protocol is very similar to a class interface with the exception\
    \ that it is not defining a particular class. You must implement the methods listed\
    \ for protocols. For example, the methods that report user actions for the mouse\
    \ could be placed into a protocol. See the following example:\n\n```\n- (void)mouseDown:(NSEvent\
    \ *)theEvent;\n- (void)mouseDragged:(NSEvent *)theEvent;\n- (void)mouseUp:(NSEvent\
    \ *)theEvent;\n```\n\nAny class that wants to respond to mouse events could adopt\
    \ the protocol and implement its methods. Protocols are very easy to use since\
    \ they are not related to class hierarchy and any class can implement them.\n\n\
    Throughout the book, we have used the example of a bookstore. Previously, we discussed\
    \ the fact that our bookstore may sell different types of media and have discussed\
    \ how inheritance would help out in that situation. For the purpose of explaining\
    \ protocols, let’s say that our bookstore also sells gum and candy. We would want\
    \ to create a class for those items. Call it `EdibleItem`. It would not make sense\
    \ to have gum inherit the same methods as a book or magazine, but all of the items\
    \ would need to be sold and the inventory would need to be tracked. In this case,\
    \ it would make sense to add the methods to a protocol that could be shared by\
    \ each of the items.\n\n**NOTE:** A protocol is much different than inheritance.\
    \ When a class inherits from another class, it not only receives the method declarations,\
    \ but it also receives the methods themselves. When using a protocol, the declarations\
    \ are brought over, but the methods themselves need to be written.\n\n#### Protocol\
    \ Syntax\n\nThe interface example for a protocol is:\n\n```\n@protocol InventoryItem\n\
    \n- (void)removeFromInventory;\n- (void)addToInventory;\n\n@end\n```\n\nThe implementation\
    \ file for this protocol example would be:\n\n```\n@interface MyClass : SomeSuperClass\
    \ < InventoryItem>\n@end\n```\n\nAny object that wants to implement the `InventoryItem`\
    \ protocol would include `< InventoryItem>` after the object definition.\n\nFor\
    \ example, we could create the interface for the edible objects we sell:\n\n```\n\
    @interface Edible : NSObject <InventoryItem>\n{\n}\n```\n\nIt is not uncommon\
    \ for iOS developers to have multiple protocols for their objects. This adds real\
    \ power to your objects when needed. Additional protocols are placed after the\
    \ first followed by a comma.\n\n```\n@interface EditbleItem : UITableViewController\
    \  <InventoryItem,SaleItem >\n{\n}\n```\n\nThis example illustrates the power\
    \ of delegates. `EditableItem` now has all of the method declarations from `InventoryItem`\
    \ and `SaleItem`.\n\nMethods that are defined for the object’s delegate are called\
    \ **delegate methods**.\n\n### Understanding Delegates\n\nDelegates are helper\
    \ objects. They enable us to control the behavior of our objects. The methods\
    \ listed in the protocol become helpers to our `MyClass`.\n\n**NOTE:** The key\
    \ to understanding delegates is to know that a delegate is a separate object consulted\
    \ in order to augment the behavior of a host object. Thus, you can create an application\
    \ delegate object that can affect the behavior of the iOS `NSApplication` object\
    \ without subclassing or changing the `NSApplication` class. The object you create\
    \ is the delegate object, and the messages that `NSApplication` will send your\
    \ object are called **delegate methods**. These are typically defined in a protocol\
    \ (`<UIApplicationDelegate>`) which your class must adopt. To work, a delegate\
    \ object must be set as the `delegate` property of the host.\n\nWe can now use\
    \ these methods in our object. For example, including the `<CLLocationManagerDelegate>`\
    \ protocol in our `MyClass` interface definition enables our object to be notified\
    \ by the iPhone’s GPS of our new location. The following example shows the method\
    \ that we will include and define inside our object’s implementation file:\n\n\
    ```\n- (void)locationManager:(CLLocationManager *)manager didUpdateToLocation:(CLLocation\
    \ *)newLocation fromLocation:(CLLocation *)oldLocation\n{\n    ……\n}\n```\n\n\
    The `locationManager` delegate method automatically gets called as our GPS location\
    \ changes, allowing your code to process the new and old coordinates. [Listing\
    \ 12-1](#Chapter12.html#list_12_1) is an example of how to implement `didUpdateToLocation`\
    \ and `didFailWithError` delegate methods from `CLLocationManagerDelegate` in\
    \ our class `MyCoreLocationController`.\n\n**Listing 12-1.** *Core location delegate\
    \ example*\n\n```\n@implementation MyCoreLocationController //our own controller\n\
    @synthesize locationManager;\n\n- (id) init\n{\n    self = [super init];\n   \
    \ if (self != nil) {\n        self.locationManager = [[CLLocationManager alloc]\
    \ init];\n        self.locationManager.delegate = self; // send location updates\
    \ updates to myself\n    }\n    return self;\n}\n\n- (void)locationManager:(CLLocationManager\
    \ *)manager\n    didUpdateToLocation:(CLLocation *)newLocation\n           fromLocation:(CLLocation\
    \ *)oldLocation\n{\n    NSLog(@\"Location: %@\", [newLocation description]);\n\
    }\n\n- (void)locationManager:(CLLocationManager *)manager\n           didFailWithError:(NSError\
    \ *)error\n{\n        NSLog(@\"Error: %@\", [error description]); //print error\
    \ description\n}\n\n- (void)dealloc {\n    [self.locationManager release];\n \
    \   [super dealloc];\n}\n@end\n```"
  raw: "### Summary\n\nWe’ve finally reached the end of the chapter. Here is a summary\
    \ of the things that we covered.\n\n*   Preferences\n    *   You learned to use\
    \ NSUserDefaults to save and read preferences from a file, both on the iPhone\
    \ and a Mac OS X computer.\n*   Database\n    *   You learned what a database\
    \ is and why using one can be preferable to saving information in a preferences\
    \ file.\n    *   You learned about the database engine that Apple has integrated\
    \ into the Mac and iPhone, and the advantages and limitations of this database\
    \ engine.\n*   Core Data\n    *   Apple provided a framework for interfacing with\
    \ the SQLite database. This framework makes the interface much easier to use.\n\
    *   Book Store Application\n    *   You created a simple Core Data application.\n\
    \    *   You used Xcode to create a data model for your Book Store application.\
    \ You learned how to create a relationship between two different Entities.\n \
    \   *   You used Xcode to create a simple interface for your Core Data model.\n\
    \n### Exercises\n\n*   Add more fields to the Book entity. Try adding the publisher,\
    \ pages, and an ISBN number.\n*   Change the layout of the Book tab. Reorder the\
    \ columns.\n*   Add a default value to the author’s first and last names.\n\n\
    ## Chapter 12\n\n## **Protocols and Delegates**\n\nCongratulations! You are acquiring\
    \ the skills to become an iOS developer! However, there are two additional topics\
    \ that iOS developers need to understand to be successful: protocols and delegates.\
    \ It is not uncommon for new developers to get overwhelmed by these topics, so\
    \ we thought it best to introduce the foundation topics of the Objective-C language\
    \ first.\n\n### Multiple Inheritance\n\nWe discussed object inheritance in [Chapter\
    \ 1](#Chapter01.html#ch1). In a nutshell, object inheritance means that a child\
    \ can inherit all the characteristics of its parent. See [Figure 12–1](#Chapter12.html#fig_12_1).\n\
    \n![images](images/1201.jpg)\n\n**Figure 12–1.** *Typical Objective-C inheritance*\n\
    \nC++, Perl, and Python each have a feature called multiple inheritance. **Multiple\
    \ inheritance** enables a class to inherit behaviors and features from more than\
    \ one parent. See [Figure 12–2](#Chapter12.html#fig_12_2).\n\nHowever, problems\
    \ can arise with multiple inheritance because it allows for ambiguities to occur.\
    \ Due to this, Objective-C does not implement multiple inheritances. Instead,\
    \ it implements something called a **protocol**.\n\n![images](images/1202.jpg)\n\
    \n**Figure 12–2.** *Multiple inheritance*\n\n### Understanding Protocols\n\nApple\
    \ defines a protocol simply as a list of methods declarations, unattached to a\
    \ class definition. A protocol is very similar to a class interface with the exception\
    \ that it is not defining a particular class. You must implement the methods listed\
    \ for protocols. For example, the methods that report user actions for the mouse\
    \ could be placed into a protocol. See the following example:\n\n`- (void)mouseDown:(NSEvent\
    \ *)theEvent;`\n`- (void)mouseDragged:(NSEvent *)theEvent;`\n`- (void)mouseUp:(NSEvent\
    \ *)theEvent;`\n\nAny class that wants to respond to mouse events could adopt\
    \ the protocol and implement its methods. Protocols are very easy to use since\
    \ they are not related to class hierarchy and any class can implement them.\n\n\
    Throughout the book, we have used the example of a bookstore. Previously, we discussed\
    \ the fact that our bookstore may sell different types of media and have discussed\
    \ how inheritance would help out in that situation. For the purpose of explaining\
    \ protocols, let’s say that our bookstore also sells gum and candy. We would want\
    \ to create a class for those items. Call it `EdibleItem`. It would not make sense\
    \ to have gum inherit the same methods as a book or magazine, but all of the items\
    \ would need to be sold and the inventory would need to be tracked. In this case,\
    \ it would make sense to add the methods to a protocol that could be shared by\
    \ each of the items.\n\n**NOTE:** A protocol is much different than inheritance.\
    \ When a class inherits from another class, it not only receives the method declarations,\
    \ but it also receives the methods themselves. When using a protocol, the declarations\
    \ are brought over, but the methods themselves need to be written.\n\n#### Protocol\
    \ Syntax\n\nThe interface example for a protocol is\n\n`@protocol InventoryItem`\n\
    \n`- (void)removeFromInventory;`\n`- (void)addToInventory;`\n\n`@end`\n\nThe implementation\
    \ file for this protocol example would be\n\n`@interface MyClass : SomeSuperClass\
    \ < InventoryItem>`\n`@end`\n\nAny object that wants to implement the `InventoryItem\
    \ protocol` would include `< InventoryItem>` after the object definition.\n\n\
    For example, we could create the interface for the edible objects we sell.\n\n\
    `@interface Edible : NSObject <InventoryItem>`\n`{`\n\n`}`\n\nIt is not uncommon\
    \ for iOS developers to have multiple protocols for their objects. This adds real\
    \ power to your objects when needed. Additional protocols are placed after the\
    \ first followed by a comma.\n\n`@interface EditbleItem : UITableViewController  <InventoryItem,SaleItem\
    \ >`\n`{`\n\n`}`\n\nThis example illustrates the power of delegates. `EditableItem`\
    \ now has all of the method declarations from `InventoryItem` and `SaleItem`.\n\
    \nMethods that are defined for the object’s delegate are called **delegates methods**.\n\
    \n### Understanding Delegates\n\nDelegates are helper objects. They enable us\
    \ to control the behavior of our objects. The methods listed in the protocol become\
    \ **helpers** to our `MyClass`.\n\n**NOTE:** The key to understanding delegates\
    \ is to know that a delegate is a separate object consulted in order to augment\
    \ the behavior of a host object. Thus, you can create an *application delegate*\
    \ object that can affect the behavior of the iOS NSApplication object without\
    \ subclassing or changing the NSApplication class. The object you create is the\
    \ delegate object, and the messages that NSApplication will send your object are\
    \ called *delegate methods*. These are typically defined in a protocol (<UIApplicationDelegate>)\
    \ which your class must adopt. To work, a delegate object must be set as the delegate\
    \ property of the host.\n\nWe can now use these methods in our object. For example,\
    \ including the `<CLLocationManagerDelegate>` protocol in our `MyClass` interface\
    \ definition enables our object to be notified by the iPhone’s GPS of our new\
    \ location. The following example shows the method that we will include and define\
    \ inside our object’s implementation file:\n\n`- (void)locationManager:(CLLocationManager\
    \ *)manager didUpdateToLocation:(CLLocation`\n`*)newLocation fromLocation:(CLLocation\
    \ *)oldLocation`\n`{`\n`……`\n`}`\n\nThe `locationManager` delegate method automatically\
    \ gets called as our GPS location changes, allowing your code to process the new\
    \ and old coordinates. [Listing 12-1](#Chapter12.html#list_12_1) is an example\
    \ of how to implement `didUpdateToLocation` and `didFailWithError` delegate methods\
    \ from `CLLocationManagerDelegate` in our class `MyCoreLocationController.`\n\n\
    **Listing 12-1.** *Core location delegate example*\n\n`@implementation MyCoreLocationController\
    \ //our own controller`\n`@synthesize locationManager;`\n\n`- (id) init {`\n`    self\
    \ = [super init];`\n`    if (self != nil) {`\n`        self.locationManager =\
    \ [[CLLocationManager alloc] init];`\n`        self.locationManager.delegate =\
    \ self; // send location updates updates to myself`\n`    }`\n`    return self;`\n\
    `}`\n\n`- (void)locationManager:(CLLocationManager *)manager`\n`    didUpdateToLocation:(CLLocation\
    \ *)newLocation`\n`           fromLocation:(CLLocation *)oldLocation`\n`{`\n`    NSLog(@\"\
    Location: %@\", [newLocation description]);`\n`}`\n\n`- (void)locationManager:(CLLocationManager\
    \ *)manager`\n`           didFailWithError:(NSError *)error`\n`{`\n`        NSLog(@\"\
    Error: %@\", [error description]); //print error description`\n`}`\n\n`- (void)dealloc\
    \ {`\n`    [self.locationManager release];`\n`    [super dealloc];`\n`}`\n`@end`"
  trans: "\n### 小结\n\n本章内容到此结束。以下是涉及知识点的总结。\n\n- **偏好设置**：你学会了如何使用 `NSUserDefaults`\
    \ 在 iPhone 和 Mac OS X 电脑上以文件形式保存和读取偏好设置。\n- **数据库**：你了解了数据库的概念，以及为何在某些情况下使用数据库比使用偏好设置文件更合适。你还学习了苹果集成到\
    \ Mac 和 iPhone 中的数据库引擎，以及该引擎的优势与局限性。\n- **Core Data**：苹果提供了一个用于与 SQLite 数据库交互的框架。该框架让接口的使用变得简单得多。\n\
    - **书店应用**：你创建了一个简单的 Core Data 应用。你使用 Xcode 为书店应用创建了数据模型，学习了如何在两个不同实体之间建立关系，并使用\
    \ Xcode 为 Core Data 模型创建了简单的界面。\n\n### 练习\n\n- 为 `Book` 实体添加更多字段。尝试添加出版社、页数和 ISBN\
    \ 编号。\n- 修改图书标签页的布局。重新排序列的顺序。\n- 为作者的名和姓添加默认值。\n\n## 第 12 章\n\n## 协议与委托\n\n恭喜！你正在掌握成为\
    \ iOS 开发者所需的技能！然而，要想成功，iOS 开发者还需要理解两个额外的主题：协议与委托。新手开发者常常会因这两个概念而感到不知所措，因此我们觉得最好先介绍\
    \ Objective-C 语言的基础知识。\n\n### 多重继承\n\n我们在第 1 章中讨论过对象继承。简而言之，对象继承意味着子类可以继承父类的所有特征。请参见图\
    \ 12-1。\n\n![images](img/1201.jpg)\n\n**图 12-1.** *典型的 Objective-C 继承*\n\nC++、Perl\
    \ 和 Python 都拥有一个称为多重继承的特性。多重继承允许一个类从多个父类继承行为和特性。请参见图 12-2。\n\n然而，多重继承可能会引发歧义，因此会带来问题。由于这个原因，Objective-C\
    \ 没有实现多重继承。相反，它实现了所谓的协议。\n\n![images](img/1202.jpg)\n\n**图 12-2.** *多重继承*\n\n\
    ### 理解协议\n\n苹果将协议简单地定义为：一个独立于类定义的方法声明列表。协议与类接口非常相似，不同之处在于它并不定义特定的类。你必须实现协议中列出的方法。例如，报告中鼠标用户操作的方法可以放入一个协议中。请参考以下示例：\n\
    \n```\n- (void)mouseDown:(NSEvent *)theEvent;\n- (void)mouseDragged:(NSEvent *)theEvent;\n\
    - (void)mouseUp:(NSEvent *)theEvent;\n```\n\n任何希望响应鼠标事件的类都可以采用该协议并实现其方法。协议非常易于使用，因为它们与类层次结构无关，任何类都可以实现它们。\n\
    \n在本书中，我们一直以书店为例。之前，我们讨论过书店可能销售不同类型的媒体，并讨论了继承在这种情况下如何发挥作用。为了解释协议，假设我们的书店也出售口香糖和糖果。我们希望为这些商品创建一个类，名为\
    \ `EdibleItem`。让口香糖继承与书或杂志相同的方法是没有意义的，但所有商品都需要被销售，且库存需要被追踪。在这种情况下，将方法添加到所有商品都可以共享的协议中是有道理的。\n\
    \n**注意：** 协议与继承截然不同。当一个类继承自另一个类时，它不仅接收方法声明，还接收方法本身。而使用协议时，只引入了声明，方法本身需要自行编写。\n\
    \n#### 协议语法\n\n协议的接口示例如下：\n\n```\n@protocol InventoryItem\n\n- (void)removeFromInventory;\n\
    - (void)addToInventory;\n\n@end\n```\n\n该协议示例的实现文件如下：\n\n```\n@interface MyClass\
    \ : SomeSuperClass < InventoryItem>\n@end\n```\n\n任何想要实现 `InventoryItem` 协议的对象，都需在对象定义后包含\
    \ `< InventoryItem>`。\n\n例如，我们可以为销售的可食用商品创建接口：\n\n```\n@interface Edible : NSObject\
    \ <InventoryItem>\n{\n}\n```\n\n对于 iOS 开发者来说，为对象设置多个协议并不罕见。这在需要时能赋予对象真正的能力。附加的协议放在第一个协议之后，用逗号分隔。\n\
    \n```\n@interface EditbleItem : UITableViewController  <InventoryItem,SaleItem\
    \ >\n{\n}\n```\n\n这个示例展示了委托的强大之处。`EditableItem` 现在拥有了来自 `InventoryItem` 和 `SaleItem`\
    \ 的所有方法声明。\n\n为对象委托定义的方法称为**委托方法**。\n\n### 理解委托\n\n委托是辅助对象。它们让我们能够控制自己对象的行为。协议中列出的方法成为\
    \ `MyClass` 的辅助方法。\n\n**注意：** 理解委托的关键在于要知道委托是一个独立的对象，它被用来增强宿主对象的行为。因此，你可以创建一个应用委托对象，它可以影响\
    \ iOS 的 `NSApplication` 对象的行为，而无需子类化或修改 `NSApplication` 类。你创建的这个对象就是委托对象，`NSApplication`\
    \ 将向你的对象发送的消息称为**委托方法**。这些方法通常定义在你的类必须采用的协议（`<UIApplicationDelegate>`）中。为了生效，需要将委托对象设置为宿主的\
    \ `delegate` 属性。\n\n现在我们可以在对象中使用这些方法了。例如，在我们的 `MyClass` 接口定义中包含 `<CLLocationManagerDelegate>`\
    \ 协议，使得我们的对象能够被 iPhone 的 GPS 通知其新位置。下面的示例展示了我们将包含并在对象实现文件中定义的方法：\n\n```\n- (void)locationManager:(CLLocationManager\
    \ *)manager didUpdateToLocation:(CLLocation *)newLocation fromLocation:(CLLocation\
    \ *)oldLocation\n{\n    ……\n}\n```\n\n当我们的 GPS 位置发生变化时，`locationManager` 委托方法会自动被调用，从而使你的代码能够处理新旧坐标。代码清单\
    \ 12-1 展示了如何在我们自己的类 `MyCoreLocationController` 中实现来自 `CLLocationManagerDelegate`\
    \ 的 `didUpdateToLocation` 和 `didFailWithError` 委托方法。\n\n**代码清单 12-1.** *Core Location\
    \ 委托示例*\n\n```\n@implementation MyCoreLocationController //我们自己的控制器\n@synthesize\
    \ locationManager;\n\n- (id) init\n{\n    self = [super init];\n    if (self !=\
    \ nil) {\n        self.locationManager = [[CLLocationManager alloc] init];\n \
    \       self.locationManager.delegate = self; // 将位置更新发送给我自己\n    }\n    return\
    \ self;\n}\n\n- (void)locationManager:(CLLocationManager *)manager\n    didUpdateToLocation:(CLLocation\
    \ *)newLocation\n           fromLocation:(CLLocation *)oldLocation\n{\n    NSLog(@\"\
    位置: %@\", [newLocation description]);\n}\n\n- (void)locationManager:(CLLocationManager\
    \ *)manager\n           didFailWithError:(NSError *)error\n{\n        NSLog(@\"\
    错误: %@\", [error description]); //输出错误描述\n}\n\n- (void)dealloc {\n    [self.locationManager\
    \ release];\n    [super dealloc];\n}\n@end\n```\n"
- fmt: '# Next Steps


    You now have a great Objective-C foundation. After going through the last two
    chapters, “Memory, Addresses, and Pointer” along with “Debugging Programs with
    Xcode,” you should be able to dive right into becoming a great iOS developer.
    Two great books that we recommend to students as they progress to becoming iOS
    developers are *Learn Objective-C on the Mac* by Mark Dalrymple and Scott Knaster,
    and *Beginning iOS 5 Development* by Dave Mark and Jeff LaMarche, both published
    by Apress.


    You will be well prepared to read these books and begin writing your own iOS apps.
    Don’t take time off—keep moving forward! Get started with these books and begin
    writing your apps. The faster you start using what you have learned, the better
    you will get. Whatever you do, don’t stop now!


    # Summary


    In this chapter we covered why multiple inheritance is not used in Objective-C
    and how protocols and delegates work.


    There is still a lot to learn and know on your iOS journey. Keep it up and help
    others along their way.


    You should be familiar with the following terms:


    - Multiple Inheritance

    - Protocol

    - Delegate


    # Chapter 13


    # Memory, Addresses, and Pointers


    Computers, just like you and me, need a place to work and store things. Think
    of computer memory like space on a desk, for example. Someone who needs to work
    on many projects at once needs to have enough desk space for all their papers
    and documents so they can be quickly and easily accessed. If the desk space is
    too small for the number of projects being juggled, some projects may have to
    be filed back into drawers so they can be quickly pulled back once there is more
    space on the desk. Making sure the desk space is used efficiently is also very
    important.


    Dealing with a computer’s memory is one of the more complicated areas of programming.
    Why is this the case? Surely these problems have been solved by now, right? Well,
    yes and no. Some languages have taken the approach to remove the need for programmers
    to manage memory at all. Some internal magic (and a little something called garbage
    collection) handles all the management of how memory is used and released when
    it is no longer being used. The negative side to this approach is that garbage
    collection does not give the programmer the ultimate say-so on how the memory
    should be used in all cases. Why is this important? Generally speaking, the issue
    is performance. With full control of memory management, the programmer also has
    full control over the performance (or lack thereof) of the program.


    This chapter will introduce the ideas of working with the memory of a Mac, iPhone,
    or iPad. Working with memory on any device has its challenges. For example, the
    iPhone and iPad, being smaller devices, have less memory to work with, which means
    that it is important that their memory is used efficiently. Fortunately, Objective-C
    provides mechanisms that keep managing memory from being a chore. You will learn
    about how to allocate memory as well as about the new Automatic Reference Counting
    (`ARC`) feature of Xcode 4, which makes managing allocated memory much simpler
    than earlier releases of Xcode.


    ## Understanding Memory


    While many people may have associated computer memory with that of the human brain,
    I prefer to compare computer memory to physical space that you, as a person, have
    to work. You are like the computer’s CPU, the part that actually processes information
    and does something with it. The more space you have to work, the easier it is
    to organize things and the quicker you can actually accomplish your tasks. Of
    course, we all reach that place where, no matter how much more space we get, we
    aren’t able to work any faster.


    To a computer, memory is the workspace where certain programs (or parts of programs)
    and data are stored. On the Mac, iPhone, and iPad, the most basic unit of memory
    is a `byte`. If you think of memory as nothing more than a grid of boxes, a byte
    would simply be a single box, as demonstrated in [Figure 13–1](#Chapter13.html#fig_13_1).


    ![images](images/1301.jpg)


    **Figure 13–1.** *Bytes are like a row of boxes.*


    Of course, there are generally billions of these boxes, or bytes, of memory in
    a typical modern computer. While it does seem like a vast, almost limitless amount,
    memory is the most important resource that a computer has at its disposal. Only
    programs that reside in memory can be executed and only data loaded from disk
    can be inspected or acted on. Also, on the iPhone or iPad, there is much less
    memory than on a typical PC or Mac computer. A certain degree of memory conservation
    is always a good practice.


    Okay, so memory is like a grid of boxes that each holds a byte of information.
    What good is it at this point? How does the computer put each byte in its place
    and how does it pull it back out? Certainly, if my garage was full of unlabeled
    boxes, I would have a very difficult time figuring out where, for example, all
    of my old video games were stored. A computer has exactly the same problem, so
    it goes about solving that problem in a very organized way. Before we go into
    how the computer solves this problem, you need to understand the basics of units
    of memory and addresses.


    ### Bits, Bytes, and Bases


    In [Figure 13–1](#Chapter13.html#fig_13_1), each box represents one byte, or memory
    space. Each byte can hold a total of 8 bits. A `bit` is simply a number that can
    be either a zero or a one—off or on. It is this sequence of zeros and ones that
    give the byte its value. These zeros and ones represent a `binary` numeral system;
    that is, each digit can have a maximum of two values, zero or one. This is sometimes
    referred to as base-2 numbering system (versus the base-10 or decimal numbering
    system that we all use in our everyday lives). Before we get into more specifics
    of memory, it’s very important that you understand the numbering systems that
    are typically used on modern computer hardware.


    **NOTE:** Modern computers use 8 bits per byte. In the early days of computing,
    different manufacturers of computers sometimes had different byte sizes. For example,
    Control Data Corporation’s CDC-6000 often used 12-bit bytes for display codes,
    and the DEC PDP-10 operated on bit fields, so a “byte” could be anything from
    1 bit to 36 bits. IBM, with its popular System/360, set the standard on the 8-bit
    byte, as did the microprocessors of the 1970s.


    Generally speaking, people use base-10 numbering for pretty much everything; from
    money to measurements, base-10 is the standard. However, in the realm of the modern
    computer, the base-10 system is rarely used. Instead, the computer typically uses
    base-2 (binary) or base-16 (hexadecimal).


    **NOTE:** Base-8, commonly referred to as octal, is also used but is not as common
    as hexadecimal.'
