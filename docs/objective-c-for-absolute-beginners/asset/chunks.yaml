- fmt: '# Creating the Project


    We are going to start a new project, so click the **Create a new Xcode project**
    icon. Whenever you want to start a new iOS or Mac OS X application, library, or
    anything else, use this icon. Once a project has been started and saved, the project
    will appear in the Recents list on the right-hand portion of the display.


    For this Xcode project, we’re going to choose something very simple. Make sure
    iOS Application is chosen. Then select **Single View Application**, as shown in
    [Figure 6–2](#Chapter06.html#fig_6_2). Then simply click on the **Next** button.


    ![images](images/0602.jpg)


    **Figure 6–2.** *Choosing a new project from a list of templates*


    There are several different types of templates. These templates make it easier
    to start a project from scratch in that they provide a starting point by automatically
    creating simple source files.


    Once the template has been chosen and the **Next** button pressed, Xcode presents
    us with a dialog box asking for the project’s name and some other information,
    as shown in [Figure 6–3](#Chapter06.html#fig_6_3). Type the Product Name of **MyFirstApp**.
    The Company Identifier needs to have some value, so just enter **MyCompany**.
    Also make sure the **Device Family** selection is set to **iPhone**.


    ![images](images/0603.jpg)


    **Figure 6–3.** *Setting up the product name, company, and type*


    The **Include Unit Tests** checkbox can be left as default. In our example, we
    don’t have it checked. For this example, it doesn’t matter if it’s checked or
    not. Once all the information has been supplied, click on the **Next** button.
    Xcode will ask you where to save the project. You can save it any place, but the
    desktop is a good choice because it’s always visible. Also, by default, the **Use
    Automated Reference Counting** is checked, which is preferable.^([1](#Chapter06.html#CH-6-FN-1))


    __________


    ¹ [Chapter 13](#Chapter13.html#ch13) covers more about Automated Reference Counting
    or ARC.


    ![images](images/0604.jpg)


    **Figure 6–4.** *The Xcode 4.0 main screen*


    Once the project save location is chosen, the main Xcode screen will be shown.
    On the leftmost pane is the list of source files. The right-hand two thirds of
    the screen is dedicated to the context-sensitive editor. Click on a source file
    and the editor will show the source code. Clicking on a `*.xib` (pronounced zib)
    will show the screen-interface editor.


    **NOTE:** Xcode 4 introduces a completely new environment in a single screen called
    the *Workspace Window*. For example, In Xcode 3 and earlier, Interface Builder—the
    system to build an interface—was a stand-alone program. Now, with Xcode 4, simply
    clicking on an interface file will show the interface within Xcode 4.


    Our very first app is going to be very simple. This iPhone app will simply contain
    a pushbutton. When the button is pushed, your name will appear on the screen.
    So, let’s start by first looking more closely at some of the stub source code
    that Xcode built for us. The nice thing with Xcode is that it will create a stub
    application that will execute without any modification. Before we start adding
    some code, let’s look at the main toolbar of Xcode, as shown in [Figure 6–5](#Chapter06.html#fig_6_5).


    ![images](images/0605.jpg)


    **Figure 6–5.** *The Xcode 4 toolbar*


    At first glance, there are three distinct areas of the toolbar. The left area
    is used to run/debug the application. The middle window displays status as a summary
    of compiler errors and/or warnings. The far right area contains a series of buttons
    that customize the editing view.


    ![images](images/0606.jpg)


    **Figure 6–6.** *Close-up of the left portion of the Xcode toolbar*


    As shown in [Figure 6–6](#Chapter06.html#fig_6_6), the left portion of the toolbar
    contains a *Play* button (similar to iTunes) that will compile and run the application.
    If the application is running, the *Stop* button will not be grayed out. Since
    it’s grayed out, we know the application is not running. The *Scheme* and *Breakpoints*
    can be left alone for now. They will be discussed in more detail in [Chapter 14](#Chapter14.html#ch14).


    ![images](images/0607.jpg)


    **Figure 6–7.** *Close-up of the left portion of the Xcode toolbar*


    The right side of the Xcode toolbar contains buttons that change the editor. The
    three buttons represent the *Standard Editor* (selected), the *Assistant Editor*,
    and the *Version Editor*. For now, just choose the *Standard Editor*, as shown
    in [Figure 6–7](#Chapter06.html#fig_6_7).


    Next to the Editor choices are a set of View buttons. These buttons can be toggled
    on and off. For example, the one chosen in [Figure 6–7](#Chapter06.html#fig_6_7)
    represents the current view as shown in [Figure 6–4](#Chapter06.html#fig_6_4)—a
    list of the program files on the left third of the screen and the main editor
    on the remaining two thirds. Any combination, or none, can be chosen to help customize
    the main workspace window. The last button is used to bring up the *Organizer*
    window. We’ll discuss this button more in [Chapter 14](#Chapter14.html#ch14).
    For now, let’s get back to our first iPhone app.


    ![images](images/0608.jpg)


    **Figure 6–8.** *Looking at the source code in the Xcode editor*


    Click once on the `ViewController.h` file, as shown in [Figure 6–8](#Chapter06.html#fig_6_8).
    The editor shows some Objective-C code called an *Interface* file. You can tell
    it’s an interface file because of the `@interface` Objective-C directive on line
    #11. We’ll discuss the importance of the interface file in the next chapter.


    **NOTE:** For now, we’re simply going to add a few lines of code and see what
    they do. It’s not expected that you understand what this code means right now.
    What’s important is simply going through the motions to become more familiar with
    Xcode. [Chapter 7](#Chapter07.html#ch7) goes into more depth about what makes
    up an Objective-C program and [Chapter 10](#Chapter10.html#ch10) goes into more
    depth about building an iPhone interface.


    Next, we’re going to add two lines of code into this file, as shown in [Figure
    6–9](#Chapter06.html#fig_6_9). Line #12 defines an iPhone label on the screen
    where we can put some text. Line #15 tells the compiler this Object can be sent
    a message called `showName:`. We’ll be calling this method in order to populate
    the iPhone label. A label is nothing more than an area on the screen where we
    can put some text information.


    **CAUTION:** Type the code **EXACTLY** as shown in the example. For instance,
    `UILabel` can’t be `uilabel` or `UILABEL`. Objective-C is a case-sensitive language,
    so `UILabel` is completely different from `uilabel`.


    ![images](images/0609.jpg)


    **Figure 6–9.** *Code added to the ViewController.h interface file*


    Next, we’re going to add the code to make the message `showName:` do something.
    First, click once on the `ViewController.m` file on the left. This file is an
    *implementation* file. You can tell it’s an implementation file because of the
    `@implementation` Objective-C directive on line #11, as shown in [Figure 6–10](#Chapter06.html#fig_6_10).


    ![images](images/0610.jpg)


    **Figure 6–10.** *The ViewController.m implementation file*


    Notice there is a warning symbol on line #11. Clicking on the warning will show
    the warning, Incomplete Implementation, which basically means we’ve mentioned
    a new message in the interface file, but it’s not to be added to the implementation
    file. [Figure 6–11](#Chapter06.html#fig_6_11) is the updated implementation file.


    ![images](images/0611.jpg)


    **Figure 6–11.** *Code added to the ViewController.m implementation file*'
