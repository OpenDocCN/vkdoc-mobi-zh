  trans: "\n#### `NSMutableArray`\n\n与 `NSMutableSet` 类似，`NSMutableArray` 也与其父类 `NSArray`\
    \ 相似。实际上，向 `NSMutableArray` 对象添加对象的方式与 `NSMutableSet` 完全相同，都是使用 `addObject:` 方法。然而，与\
    \ `NSMutableSet` 不同的是，`NSMutableArray` 还可以在数组中插入元素——而 `NSMutableSet` 只能向集合中添加对象。请参阅代码清单\
    \ 8–9。\n\n**代码清单 8–9.** *向 NSMutableArray 添加和插入值。*\n\n```\n 1  NSMutableArray\
    \ *myArray = [[NSMutableArray alloc] init];\n 2  \n 3  [myArray addObject:@\"\
    One\"];\n 4  [myArray addObject:@\"Two\"];\n 5  [myArray addObject:@\"Three\"\
    ];\n 6  \n 7  for (id val in myArray) {\n 8      NSLog(@\"%@\", val);\n 9  }\n\
    10  \n11  [myArray insertObject:@\"One and a Half\" atIndex:1];\n12  \n13  for\
    \ (id val in myArray) {\n14      NSLog(@\"%@\", val);\n15  }\n```\n\n在代码清单 8–9\
    \ 中，创建新数组的方式与 `NSMutableSet` 类似。然而，在第 11 行，一个新元素被插入到数组的位置 1。请记住，位置 0 是数组的第一个元素。插入操作后，数组的内容将如下所示：\n\
    \n![images](img/U0801.jpg)\n\n第 11 行插入了一个新元素——剩余元素在数组中向上移动以腾出空间。这一点至关重要，尤其是当代码假定数组中特定索引具有特定值时。\n\
    \n对于 `NSMutableArray`，有多种移除对象的方法。以下是一些较常用的方法：\n\n*   `removeAllObjects` – 此方法如其名所示。它从一个给定的\
    \ `NSMutableArray` 中移除所有对象。\n*   `removeLastObject` – 此方法移除数组末尾的最后一个对象。数组大小减一。\n\
    *   `removeObjectAtIndex:(NSUInteger index)` – 此方法移除给定索引处的对象。该值的范围是从 0 到数组长度减\
    \ 1。\n\n#### `NSMutableDictionary`\n\n至此，集合类的可变版本如何工作对你来说应该已经非常清楚了——`NSMutableDictionary`\
    \ 也不例外。`NSMutableDictionary` 提供了 `NSDictionary` 的所有功能，但当然，可以添加和删除元素，如代码清单 8–10\
    \ 所示：\n\n**代码清单 8–10.** *向 NSMutableDictionary 添加对象。*\n\n```\n 1  \n 2  NSMutableDictionary\
    \ *myDict = [[NSMutableDictionary alloc] init];\n 3  \n 4  [myDict setObject:@\"\
    Number One\" forKey:@”1”];\n 5  [myDict setObject:@\"Number Two\" forKey:@”2”];\n\
     6  [myDict setObject:@\"Number Three\" forKey:@”3”];\n 7  \n 8  for (id val in\
    \ myDict) {\n 9      NSLog(@\"%@\", val);\n10  }\n11  \n12  [myDict setObject:@\"\
    One and a Half\" forKey:@”1.5”];\n13  \n14  for (id val in myArray) {\n15      NSLog(@\"\
    %@\", val);\n    }\n```\n\n在上面的示例中，对象 `@\"One and a Half\"` 被添加到字典中。这与数组不同，因为无法像\
    \ `NSMutableArray` 那样将对象插入到字典的特定位置。\n\n### 创建 BookStore 应用程序\n\n首先，我们来创建基础应用程序项目。我们首先打开\
    \ Xcode，创建一个新的 Master-Detail Application 项目。在这个项目中，我们将为即将构建的书店应用程序创建几个简单的对象：一个\
    \ `Book` 对象和一个 `Bookstore` 对象。我们将再次了解实例变量，并学习如何在此项目中获取和设置其值。最后，我们将使用我们的书店对象，你将学习一旦创建了对象后如何利用它们。\n\
    \n启动 Xcode，然后创建一个新项目，如图 8–1 所示。\n\n![images](img/0801.jpg)\n\n**图 8–1.** *创建初始项目为\
    \ Master-Detail 应用程序。*\n\n1.  点击 **Next** 按钮，并将项目命名为 `MyBookstore`，如图 8–2 所示。公司名称是必填项——可以使用任何真实或虚构的公司名称。本例中使用的\
    \ `com.mycompany` 完全没问题。确保设备系列是 iPhone，并且勾选了“使用自动引用计数”选项。\n\n    ![images](img/0802.jpg)\n\
    \n    **图 8–2.** *选择产品（应用程序）名称和选项。*\n\n2.  所有内容填写完毕后，按下 **Next** 按钮。Xcode 会提示你指定保存项目的位置。任何你能记住的位置都可以——桌面也是一个好地方。\n\
    3.  确定位置后，点击 **Create** 按钮创建新项目。这将创建基础的 Bookstore 项目，如图 8–3 所示。\n\n    ![images](img/0803.jpg)\n\
    \n    **图 8–3.** *基础项目的源文件列表。*\n\n4.  点击导航区域左下角的加号（**+**）按钮，向项目添加新对象。在左侧的 iOS\
    \ 部分下选择 **Cocoa Touch**，然后在右侧选择 **Objective-C Class**，如图 8–4 所示。你也可以在导航区域右键单击，然后选择“New\
    \ File…”菜单选项。这两种方式没有区别——选择你觉得更自然的方式即可。\n\n    ![images](img/0804.jpg)\n\n    **图\
    \ 8–4.** *创建一个新的 Objective-C 类。*\n\n5.  我们选择一个普通的 Objective-C 类，这将创建一个新的空 Objective-C\
    \ 对象，我们将用它来构建 `Book` 类。选择此项后，点击 **Next** 按钮。\n\n    ![images](img/0805.jpg)\n\n\
    \    **图 8–5.** *为我们的新类命名并指定父类。*\n\n6.  Xcode 现在会提示输入对象名称以及我们将继承哪个主对象。选择名称 `Book`，并使\
    \ `Book` 成为 `NSObject` 的子类，如图 8–5 所示，然后点击 **Next** 按钮。\n7.  最后，Xcode 会询问将新的类文件保存到哪个文件夹。为简单起见，选择项目中的\
    \ `MyBookstore` 文件夹，如图 8–6 所示。这里存储了项目中所有其他类文件。\n\n    ![images](img/0806.jpg)\n\
    \n    **图 8–6.** *选择保存新类文件的位置。*\n\n    双击 `MyBookstore` 文件夹，然后点击 **Create** 按钮。你将看到\
    \ Xcode 的主编辑窗口，并且我们的新类文件 `Book.m` 和 `Book.h` 会出现在导航窗口中，如图 8–7 所示。\n\n8.  重复上述步骤，创建第二个名为\
    \ `Bookstore` 的对象。这将创建 `Bookstore.m` 和 `Bookstore.h` 文件。我们将在本章稍后部分使用这个类。现在，我们先集中精力处理\
    \ `Book` 对象。\n\n    ![images](img/0807.jpg)\n\n    **图 8–7.** *查看我们的新类。*\n\n9.\
    \  点击 `Book.h` 文件，开始定义我们的新类！\n"
- fmt: '### Introducing Instance Variables


    Our object is simply called `Book` and is a subclass of `NSObject`. True, we have
    an object, but it doesn’t *store* anything at this point. In order for this class
    to be useful, it needs to be able to hold some information, which is done with
    instance variables. When an object is used, it has to be instantiated. Once the
    object is instantiated, it has access to its instance variables. These variables
    are available to the object as long as the object stays in scope. As we know from
    [Chapter 7](#Chapter07.html#ch7), scope defines the context in which an object
    exists. In some cases, an object’s scope may be the life of the program. In other
    cases, the scope might be just a function or method. It all depends on where the
    object is declared and how it’s used. Scope will be discussed more later. For
    now, let’s add some instance variables to our `Book` class to make it more useful.


    **Listing 8–11.** *Adding instance variables to the Book.h file.*


    ```

     1  //

     2  //  Book.h

     3  //  MyBookstore

     4  //

     5  //  Created by Mitch Fisher on 8/28/11.

     6  //  Copyright 2011 www.committed-code.com. All rights reserved.

     7  //

     8  

     9  #import <Foundation/Foundation.h>

    10  

    11  @interface Book : NSObject {

    12          NSString *title;

    13          NSString *author;

    14          NSString *description;

    15  }

    16  

    17  @end

    ```


    This is the same `Book` object from before, but now, there are three new instance
    variables placed inside the brackets, lines 12–14. These are all `NSString` objects,
    which means that they can hold text information for our `Book` object. So, the
    `Book` object now has a place to store title, author, and description information.


    #### Accessing Instance Variables


    Now that we have some instance variables, how can we use them? How are they accessed?
    As you learned in previous chapters, Objective-C objects respond to messages.
    Unfortunately, simply declaring an instance variable doesn’t necessarily give
    us access to it. There are two ways to access these variables.


    *   One way is, of course, within our `Book` object.

    *   The second way is from outside of the object—that is, another part of the
    program that uses the `Book` object.


    If we are writing the code for a method within our `Book` object, accessing an
    instance variable is quite simple. For example, you could simply write the following:


    `title = @"Test Title";`


    The preceding line is written within the `Book` class. Outside of the object,
    the `title` instance variable is not visible at all. Of course, outside objects
    need to be able to access these instance variables as well. To accomplish this,
    you need to create two types of methods: a getter and a setter.


    *   A **getter** is a method that returns the value of something in the object,
    typically an instance variable like the `author` variable from the `Book` object.

    *   A **setter** is a method that updates or sets that instance variable.


    Let’s take a look at the traditional getter and setter methods that were common
    before the introduction of Objective-C 2.0 back in 2007.


    **TIP:** Sometimes instance variables are referred to as ivars. `Ivar` is just
    the short form of instance variable.


    #### Using Getter and Setter Methods


    Here is the `Book` object’s header (`.h`) file, which contains the `Book`''s interface
    definition.


    **Listing 8–12.** *Defining a getter and setter for the Book object.*


    ```

     1  #import <Foundation/Foundation.h>

     2  

     3  @interface Book : NSObject {

     4          NSString *title;

     5          NSString *author;

     6          NSString *description;

     7  }

     8  

     9  - (NSString *)title;

    10  - (void)setTitle:(NSString *)newString;

    11  

    12  @end

    ```


    The two methods declared on lines 9 and 10 are the getter and setter methods,
    respectively. Conventionally, the getter method is named the same as the instance
    variable. In our example, we are fetching the title of a book object so our getter
    method is simply `title`. It is defined to return an `NSString` object to the
    caller.


    The setter object is named by convention to `set`*`InstanceVariableName`*. So
    for our example, the setter method is named `setTitle`. Notice that the instance
    variable name’s first character uses an uppercase letter; this is also part of
    the standard convention.


    **NOTE:** A naming convention called camel case (or `CamelCase`) uses an uppercase
    letter to distinguish different words in a method, variable, or class name. The
    text is suggestive of a camel, since the uppercase letters tend to form humps.
    It makes the label easier to read. For example, `stringWithContentsOfURL` is much
    easier to read than `stringwithcontentsofurl`.


    Now, the word “convention” has been mentioned several times. Objective-C does
    not require that a method be named anything specific. However, since most applications
    follow the guidelines we discussed, the convention becomes the *de facto* standard.
    Knowing this becomes very important when the topic of properties is discussed
    later. For now, however, we are going to manually write a getter and a setter
    method so that they can be better understood.


    First, the getter—this is the simplest of the methods to implement:


    ```

    - (NSString *)title

    {

        return title;

    }

    ```


    In the preceding example, the method `title` simply returns the local instance
    variable called `title`. To access the method, the syntax `[object title]` is
    used.


    It might seem that the instance variable and the method name might somehow get
    confused. Because an instance variable is accessed completely differently from
    a method name, the Objective-C runtime environment doesn’t have a problem with
    instance variable and method names that are the same.


    Now, here is the setter:


    ```

    - (void)setTitle:(NSString *)newTitle

    {

        if ([newTitle length] > 0) {

            title = newTitle;

        }

    }

    ```


    This example is a little more complicated than our getter method, although it
    doesn’t have to be. In our setter example, there is a check to see if the `newTitle`
    has a length greater than `0` before assigning the string (The `NSString` class’
    `length` method returns the number of characters in the string). Clearly, our
    setter code doesn’t want the current title to be blank.


    Using the getter/setter methods above, they would be used as shown in the following
    snippet of code:


    ```

     1  Book *myBook = [Book alloc] init];

     2  

     3  [myBook setTitle:@”My Great Book”];  // Call the setter

     4  

     5  NSString *title = [myBook title];  // Call the getter and put it into the
    ‘title’

        NSString object.

    ```


    The benefit of a setter method is that the object can perform some validation
    logic on the parameters before accepting the value. If the object were to allow
    direct access to the instance variable, either this type of validation would have
    to be everywhere or there would be no validation at all and the object’s title
    could potentially be set to something invalid (like a blank title).


    Now, it is not necessary to *always* create a getter and/or a setter for every
    instance variable. A good example of this might simply be an object that represents
    today’s date. There is no need to set it, just retrieve it, so there would only
    be a getter method.


    The needs of the object and variables will dictate how the getter and setter methods
    are built. If a getter gets the value and the setter sets the value, it’s going
    to take a lot of coding to simply write all the getters and setters in an object,
    especially if there are many instance variables. Fortunately, Objective-C 2.0
    introduced a way to reduce this burden with minimal effort on the programmer’s
    part. These features in Objective-C 2.0 are called properties.


    **NOTE:** Objective-C 2.0 was introduced in 2006 with Xcode 3.4 and is included
    in Xcode 4 and later.'
