  trans: "\n### 处理代码错误和警告\n\n虽然代码错误和警告并非 Xcode 4 调试器的真正组成部分，但修复它们却是整个调试过程的一部分。在程序运行之前（无论是否使用调试器），必须修复所有错误。警告不会阻止程序构建，但可能在程序执行期间引发问题。最好是完全没有任何警告。\n\
    \n让我们来看几种不同类型的错误。首先，我们在代码中添加一个错误。在 `MasterViewController.m` 文件的第 25 行，将\n\n```\n\
    [[BookStore alloc] init]\n```\n\n改为\n\n```\n[[BookStore alloc] initialize].\n\
    ```\n\n保存更改，然后按 ![images](img/U002.jpg)+B 构建项目来构建程序。这时会出现一个错误，如图 14-14 所示，该错误可能立即显示，也可能在构建后显示。\n\
    \n![images](img/1414.jpg)\n\n**图 14-14.** *在 Xcode 中查看错误*\n\n接下来，我们点击带有感叹号的三角形图标，切换到问题导航器窗口，如图\
    \ 14-15 所示。此视图显示程序中当前的所有错误和警告——不仅仅是当前文件 `MasterViewController.m`，而是所有文件。错误以红色八边形内的白色感叹号显示。在我们的例子中，只有一个错误。另外，如果错误信息超出屏幕范围或难以阅读，只需将鼠标悬停在问题导航窗口的错误上，即可显示完整的错误信息。\n\
    \n![images](img/1415.jpg)\n\n**图 14-15.** *查看问题导航器窗口*\n\n通常，错误会指向实际问题。在上面的例子中，`BookStore`\
    \ 对象不知道一个名为 `initialize` 的方法。\n\n**提示：** 在构建项目时遇到此错误，通常意味着方法名称拼写错误，或者没有包含正确的头文件来让编译器识别该方法。如果你知道该方法确实存在，请检查头文件是否已包含。否则，可能只是一个拼写错误。\n\
    \n好了，让我们将单词 `initialize` 改为 `init` 来修复这个错误。\n\n#### 警告\n\n警告表明程序存在潜在问题。如上所述，警告不会阻止程序构建，但可能在程序执行期间引发问题。全面介绍那些可能在程序执行期间引发问题的警告超出了本书的范围；不过，消除程序中的所有警告是一个好习惯。\n\
    \n将 `MasterViewController.m` 文件中包含 `@synthesize MasterViewController` 的行（下图中第\
    \ 14 行；你的行号可能不同）注释掉，方法是在 `@synthesize myBookStore` 前面加上两个斜杠，如图 14-16 所示。然后按 ![images](img/U002.jpg)+B\
    \ 构建项目。\n\n![images](img/1416.jpg)\n\n**图 14-16.** *在问题导航器中查看警告*\n\n遗憾的是，该警告并未在\
    \ `MasterViewController.m` 文件中显示。点击问题导航器中的第一个警告，我们将定位到第一个问题，如图 14-17 所示。\n\n![images](img/1417.jpg)\n\
    \n**图 14-17.** *查看我们的第一个警告*\n\n在主窗口中，我们可以看到警告。实际上，这个警告为我们提供了一些关于代码问题的线索。警告内容如下：\n\
    \n> *“属性 ‘myBookStore’ 需要定义方法 ‘myBookStore’ – 请使用 @synthesize、@dynamic 或提供方法实现。”*\n\
    \n我们的代码中有一个 `@property`，但由于我们将其注释掉了，所以没有对应的 `@synthesize`。编译器将此视为警告，因为该方法可能在运行时被动态提供。然而，在我们的例子中，我们并没有这样做；我们只是没有在实现文件中包含\
    \ `@synthesize` 关键字。\n\n要解决此问题，只需导航回 `MasterViewController.m` 文件，并移除我们刚刚在第 14\
    \ 行添加的注释。要导航回文件列表，请点击*文件夹*图标，如图 14-18 所示（或直接点击编辑窗口顶部的返回按钮）。\n\n![images](img/1418.jpg)\n\
    \n**图 14-18.** *导航回文件列表并修复警告问题*\n\n### 本章小结\n\n在本章中，我们涵盖了免费的 Apple Xcode 调试器的高级功能。无论价格如何，Xcode\
    \ 都是一个出色的调试器。具体来说，在本章中，你学到了以下内容：\n\n- 术语“bug”的起源以及什么是调试器；\n- Xcode 调试器的高级功能：\n\
    \  - 断点\n  - 单步执行程序；\n- 如何使用调试控件：\n  - 任务（停止标志），\n  - 重启与继续（暂停），\n  - 单步跳过，\n\
    \  - 单步进入，\n  - 单步跳出；\n- 使用各种调试器视图：\n  - 线程（调用堆栈），\n  - 变量，\n  - 文本编辑器，以及\n  -\
    \ 输出；\n- 查看程序变量；以及\n- 处理错误和警告。\n\n## 索引\n\n### ![Image](img/square1.jpg)特殊字符与数字\n\
    \n3D 用户界面，15\n"
