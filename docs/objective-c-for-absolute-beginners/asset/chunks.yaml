    \n## 摘要\n\n我们终于到达了这一章的结尾！以下是我们所涵盖内容的总结。\n\n- **理解集合类：** 集合类是一组非常强大的类，随Foundation框架一起提供，允许我们高效地存储和检索信息。\n\
    - **使用实例变量：** 实例变量是在类的接口文件中定义的变量，在类被实例化后即可访问。\n- **使用属性：** 属性是创建getter和/或setter的简短方式。Getter和setter用于获取或设置实例变量的值。\n\
    - **使用`for...in`循环：** 这个特性提供了一种新的方式来遍历枚举列表中的项。\n- **构建主从应用程序：** 我们使用Xcode和主从模板构建了一个简单的Bookstore程序，用于显示书籍和单本书的详细信息。\n\
    - **简单的数据模型：** 使用我们学习到的集合类，我们使用`NSMutableArray`构建了一个Bookstore对象，并将其用作Bookstore程序中的数据源。\n\
    - **将数据连接到视图：** 我们使用Xcode将`Book`对象的数据连接到界面字段。\n\n## 练习\n\n- 参考原始程序，向Bookstore中添加更多书籍。\n\
