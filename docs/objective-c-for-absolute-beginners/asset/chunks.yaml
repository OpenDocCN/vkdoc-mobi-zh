    \ description of an algorithm you are trying to solve. Pseudo-code does not contain\
    \ the necessary programming syntax for coding; however, it does express the algorithm\
    \ that is necessary to solve the problem at hand.\n\nPseudo-code can be written\
    \ by hand on paper (or a whiteboard) or typed on a computer.\n\nUsing pseudo-code,\
    \ you can apply what you know about Boolean data types, truth tables, and comparison\
