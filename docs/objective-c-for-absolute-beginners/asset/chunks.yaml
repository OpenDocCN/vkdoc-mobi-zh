    # 创建项目


    我们将开始一个新项目，因此请点击**创建一个新的 Xcode 项目**图标。无论何时你想开始一个新的 iOS 或 Mac OS X 应用程序、库或其他任何东西，都请使用这个图标。当一个项目已创建并保存后，该项目将出现在屏幕右侧的“最近项目”列表中。


    对于这个 Xcode 项目，我们将选择一些非常简单的选项。确保选中了 iOS 应用程序。然后选择**单视图应用程序**，如图 6-2 所示。然后只需点击**下一步**按钮。


    ![images](img/0602.jpg)


    **图 6-2.** *从模板列表中选择一个新项目*


    有几种不同类型的模板。这些模板通过自动创建简单的源文件来提供一个起点，使得从头开始一个项目变得更容易。


    选择模板并点击**下一步**按钮后，Xcode 会弹出一个对话框，询问项目的名称和其他一些信息，如图 6-3 所示。输入产品名称为 **MyFirstApp**。公司标识符需要有一个值，所以只需输入
    **MyCompany**。同时确保**设备系列**设置为 **iPhone**。


    ![images](img/0603.jpg)


    **图 6-3.** *设置产品名称、公司和类型*


    **包含单元测试**复选框可以保持默认设置。在我们的示例中，我们没有勾选它。对于这个示例，勾选与否并不重要。提供所有信息后，点击**下一步**按钮。Xcode
    将询问你项目的保存位置。你可以将其保存在任何地方，但桌面是一个不错的选择，因为它总是可见的。此外，默认情况下，**使用自动引用计数**是勾选状态，这更可取。^(1)


    __________


    ¹ 第 13 章 会详细介绍自动引用计数或 ARC。


    ![images](img/0604.jpg)


    **图 6-4.** *Xcode 4.0 主屏幕*


    选择项目保存位置后，将显示 Xcode 主屏幕。最左侧的窗格是源文件列表。右侧三分之二的屏幕专用于上下文相关的编辑器。点击一个源文件，编辑器将显示源代码。点击一个
    `*.xib`（读作 zib）文件将显示屏幕界面编辑器。


    **注意：** Xcode 4 引入了一个全新的单屏幕环境，称为*工作区窗口*。例如，在 Xcode 3 及更早版本中，Interface Builder（用于构建界面的系统）是一个独立的程序。现在，在
    Xcode 4 中，只需点击一个界面文件，即可在 Xcode 4 中显示该界面。


    我们的第一个应用程序将会非常简单。这个 iPhone 应用将只包含一个按钮。当按钮被按下时，你的名字将出现在屏幕上。那么，让我们先更仔细地看一下 Xcode
    为我们创建的一些存根源代码。Xcode 的一个好处是，它会创建一个无需任何修改即可执行的存根应用程序。在我们开始添加一些代码之前，让我们看一下 Xcode
    的主工具栏，如图 6-5 所示。


    ![images](img/0605.jpg)


    **图 6-5.** *Xcode 4 工具栏*


    初看之下，工具栏有三个不同的区域。左侧区域用于运行/调试应用程序。中间窗口显示状态，作为编译器错误和/或警告的摘要。最右侧区域包含一系列用于自定义编辑视图的按钮。


    ![images](img/0606.jpg)


    **图 6-6.** *Xcode 工具栏左侧部分特写*


    如图 6-6 所示，工具栏的左侧部分包含一个*播放*按钮（类似于 iTunes），该按钮将编译并运行应用程序。如果应用程序正在运行，*停止*按钮将不会变灰。由于它是灰色的，我们知道应用程序没有运行。*方案*和*断点*目前可以不用理会。它们将在第
    14 章中更详细地讨论。


    ![images](img/0607.jpg)


    **图 6-7.** *Xcode 工具栏右侧部分特写*


    Xcode 工具栏的右侧包含用于更改编辑器的按钮。这三个按钮分别代表*标准编辑器*（已选中）、*辅助编辑器*和*版本编辑器*。目前，只需选择*标准编辑器*，如图
    6-7 所示。


    在编辑器选择旁边是一组视图按钮。这些按钮可以切换打开或关闭。例如，图 6-7 中选中的按钮代表如图 6-4 所示的当前视图——屏幕左侧三分之一是程序文件列表，其余三分之二是主编辑器。可以选择任意组合，或者都不选，以帮助自定义主工作区窗口。最后一个按钮用于打开*管理器*窗口。我们将在第
    14 章中更详细地讨论这个按钮。现在，让我们回到我们的第一个 iPhone 应用。


    ![images](img/0608.jpg)


    **图 6-8.** *在 Xcode 编辑器中查看源代码*


    点击 `ViewController.h` 文件一次，如图 6-8 所示。编辑器显示了一些称为*接口*文件的 Objective-C 代码。你可以通过第 11
    行的 `@interface` Objective-C 指令来判断这是一个接口文件。我们将在下一章讨论接口文件的重要性。


    **注意：** 目前，我们只是要添加几行代码并看看它们的作用。并不要求你现在就理解这些代码的含义。重要的是通过操作来熟悉 Xcode。第 7 章 会更深入地介绍
    Objective-C 程序的构成，第 10 章 会更深入地介绍如何构建 iPhone 界面。


    接下来，我们将在这个文件中添加两行代码，如图 6-9 所示。第 12 行在屏幕上定义了一个 iPhone 标签，我们可以在上面放置一些文本。第 15 行告诉编译器这个对象可以接收一个名为
    `showName:` 的消息。我们将调用这个方法来填充 iPhone 标签。标签只不过是屏幕上用于放置一些文本信息的区域。


    **警告：** 请**完全**按照示例所示输入代码。例如，`UILabel` 不能写成 `uilabel` 或 `UILABEL`。Objective-C
    是一种区分大小写的语言，所以 `UILabel` 与 `uilabel` 完全不同。


    ![images](img/0609.jpg)


    **图 6-9.** *添加到 ViewController.h 接口文件中的代码*


    接下来，我们将添加代码使 `showName:` 消息执行某些操作。首先，点击左侧的 `ViewController.m` 文件一次。这个文件是一个*实现*文件。你可以通过第
    11 行的 `@implementation` Objective-C 指令来判断它是一个实现文件，如图 6-10 所示。


    ![images](img/0610.jpg)


    **图 6-10.** *ViewController.m 实现文件*


    注意第 11 行有一个警告符号。点击该警告符号会显示警告“不完整的实现”，这基本上意味着我们在接口文件中提到了一个新消息，但它尚未被添加到实现文件中。图 6-11
    是更新后的实现文件。


    ![images](img/0611.jpg)


    **图 6-11.** *添加到 ViewController.m 实现文件中的代码*

