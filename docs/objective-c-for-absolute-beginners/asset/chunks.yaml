  raw: '#### Pseudo-Code


    **Pseudo-code** refers to writing out code that is a high-level description of
    an algorithm you are trying to solve. Pseudo-code does not contain the necessary
    programming syntax for coding; however, it does express the algorithm that is
    necessary to solve the problem at hand.


    Pseudo-code can be written by hand on paper (or a whiteboard) or typed on a computer.


    Using pseudo-code, you can apply what you know about Boolean data types, truth
    tables, and comparison operators. Refer to [Listing 4–1](#Chapter04.html#list_4_1)
    for pseudo-code examples.


    **Listing 4–1.** *Pseudo-Code Examples Using Conditional Operators in If-Then-Else
    Code*


    `int x = 5;`

    `int y = 6;`

    `isComplete  =  TRUE;`

    `if ( x < y)`

    `{`

    *`//in this example, x is less than 6`*

    `    do stuff;`

    `}`

    `else`

    `{`

    `     do other stuff;`

    `}`


    `if  (isComplete == TRUE)`

    `{`

    *`//in this example, isComplete is equal to TRUE`*

    `     do stuff;`

    `}`

    `else`

    `{`

    `     do other stuff;`

    `}`

    *`//another way to check isComplete == TRUE`*

    `if (isComplete)`

    `{`

    *`//in this example,  isComplete is TRUE`*

    `     do stuff;`

    `}`

    `//two ways to check if a value is false`

    `if  (isComplete == FALSE)`

    `{`

    `     do stuff;`

    `}`

    `else`

    `{`

    *`//in this example, isComplete is TRUE so the else block will be executed`*

    `}`

    *`//another way to check isComplete == FALSE`*

    `if (!isComplete)`

    `{`

    `     do stuff;`

    `}`

    `else`

    `{`

    *`//in this example,  isComplete is TRUE so the else block will be executed`*

    `}`


    Note that the **!** switches the value of the Boolean it''s applied to; so, using
    **!** makes a `TRUE` value into a `FALSE`, and a `FALSE` value into a `TRUE`.


    Often, it is necessary to combine your comparison tests. A compound relationship
    test is one or more simple relationship tests joined by either the **&&** or the
    **||** (two pipe characters).


    **&&** and **||** are verbalized as logical-and and logical-or, respectively.
    Pseudo-code in [Listing 4–2](#Chapter04.html#list_4_2) illustrates logical-and
    and logical-or operators.


    **Listing 4–2***. Using && and || Logical Operators*


    `int x = 5;`

    `int y = 6;`

    `isComplete  =  TRUE;`

    `//using the logical and`

    `if (x < y && isComplete == TRUE)`

    `{`

    *`//in this example, x is less than 6 and`* `isComplete == TRUE`

    `    do stuff;`

    `}`

    `if (x < y || isComplete == FALSE)`

    `{`

    `    //in this example, x is less than 6.`

    `    //Only one operand has to be TRUE for an OR to result in a TRUE.`

    `//See` [`Table 4–2`](#Chapter04.html#tab_4_2) `A OR Truth Table`

    `    do stuff;`

    `}`

    `//another way to test for TRUE`

    `if (x < y && isComplete)`

    `{`

    *`//in this example, x is less than 6 and`* `isComplete == TRUE`

    `    do stuff;`

    `}`

    `//another way to test for FALSE`

    `if (x < y && !isComplete)`

    `{`

    `    do stuff;`

    `}`

    `else`

    `{`

    *`//`* `isComplete == TRUE`

    `     do stuff;`

    `}`


    #### Design Requirements


    As discussed in [Chapter 1](#Chapter01.html#ch1), the most expensive process in
    the software development life cycle is writing code. The least expensive process
    in the software development life cycle is gathering the requirements for your
    application; yet, this latter process is the most overlooked and least used in
    software development.


    Design requirements usually begin by asking clients, customers, and/or stakeholders
    how the application should work and what problems it should solve.


    With respect to apps, requirements can include long or short narrative descriptions,
    screen mockups, and formulas. It is far easier to open your word processor and
    change the requirements and screen mockups before coding begins than it is to
    modify an iPhone/iPad/Mac app. The following is the design requirement for one
    view of an iPhone mobile banking app:


    *   **View:** Accounts View

    *   **Description:** Displays the list of accounts the user has. The list of accounts
    will be in the following sections: Business Accounts, Personal Accounts and Car
    Loans, IRA, and Home Equity Loans.

    *   **Cells**: Each cell will contain the account name, the last four digits of
    the account, available balance, and present balance.


    A picture is worth a thousand words. Screen mockups are helpful to developers
    and users because they can visualize how the views will look when they are completed.
    There are many tools that can quickly design mockups; one of these tools is OmniGraffle.
    See [Figure 4–1](#Chapter04.html#fig_4_1) for an example of a screen mockup used
    for design requirements generated by OmniGraffle.


    ![images](images/0401.jpg)


    **Figure 4–1.** *Screen mockup for a mobile banking app using OmniGraffle and
    the Ultimate iPhone Stencil Plug-in*


    Many developers believe that design requirements take too long and are unnecessary.
    There is a lot of information presented on the Accounts screen in [Figure 4–1](#Chapter04.html#fig_4_1).
    Many business rules can determine how information is displayed to the user, along
    with all of the error handling when things go bad. When designing your app, working
    with all the business stakeholders at the beginning of the development process
    is critical to getting it right the first time.


    [Figure 4–2](#Chapter04.html#fig_4_2) is an example of all stakeholders being
    involved in your app’s development. Having all stakeholders involved in every
    view from the beginning will eliminate multiple rewrites and application bugs.


    ![images](images/0402.jpg)


    **Figure 4–2.** *Woodforest Mobile Banking app as it appears on the iTunes Connect
    app store; Compare with the app requirements Accounts screen in [Figure 4–1](#Chapter04.html#fig_4_1).*


    Additionally, Apple recommends that developers spend at least 50% of their development
    time on the user interface’s design and development.


    Apress’s iPhone and iPad Sketch Books are also great tools for laying out your
    iOS app’s look and feel on paper. See [Figure 4–3](#Chapter04.html#fig_4_3).


    ![images](images/0403.jpg)


    **Figure 4–3.** *Apress’s iPhone Sketch Book Stencil and Apress’s iPad Sketch
    Book Stencil*


    #### Flowcharting


    After design requirements are finalized, you can pseudo-code sections of your
    app to solve complex development issues. **Flowcharting** is a common method of
    diagramming an algorithm. An algorithm is represented as different types of boxes
    connected by lines and arrows. Developers often use flowcharting to express code
    visually. See [Figure 4–4](#Chapter04.html#fig_4_4).


    ![images](images/0404.jpg)


    **Figure 4–4.** *Sample flowchart showing common figures and their associated
    names*


    Flowcharts should always have a start and a stop. Branches should never come to
    an end without a stop. This helps developers make sure all of the branches in
    their code are accounted for and that they cleanly stop execution.


    #### Designing and Flowcharting an Example App


    We have covered a lot of information about decision making and program flow. It’s
    time to do what programmers do best: write apps!


    The app you have been assigned to write generates a random number between 0 and
    100 inclusive, and asks the user to guess the number. The user has to do this
    until the number is guessed. You can use any object from the Alice gallery to
    ask the user for his or her guess, and you can also choose any world for your
    object to be in. The object will provide a visual queue for each high, low, and
    correct guess. The number that the user guesses will be displayed on the console.
    When the user guesses the correct answer, he or she will be asked if he or she
    wants to play again. See [Figure 4–5](#Chapter04.html#fig_4_5).


    ![images](images/0405.jpg)


    **Figure 4–5.** *An astronaut object asking the user to guess a number between
    0 and 100*'
