- fmt: 'Once lines `#19–22`, as shown in [Figure 6–11](#Chapter06.html#fig_6_11),
    have been added, the warning message will disappear. The nice thing with Xcode
    4 is that it will report any warnings or errors with the code typed in without
    first having to try to compile and run the program. This immediate feedback can
    sometimes be a pain, but it does save time.


    We now have the necessary code in place, but we don’t yet have an interface on
    the iPhone. Next, we’re going to edit the interface and add two interface objects
    to our app.


    In order to edit the iPhone’s interface, we need to click once on the `ViewController.xib`
    file. The `.xib` file contains all the information about a single window or view.
    Apps that have multiple views will have multiple `.xib` files. We will use Xcode’s
    interface editor to *connect* a UI object, such as a label, to the code we just
    created. Connecting is as easy as clicking and dragging.


    We’re not going to modify the `MainWindow.xib` file. In our example, the `MainWindow.xib`
    file simply holds our view, the `ViewController.xib` file.


    ![images](images/0612.jpg)


    **Figure 6–12.** *The iPhone interface that we’re going to modify*


    Note that we’ve clicked on the last `view button` in the upper right part of the
    screen, as shown in [Figure 6–12](#Chapter06.html#fig_6_12). This opens up the
    utilities view for the interface. Among other things, this utilities view shows
    us the various interface objects we can use in our App. We’re only going to be
    concerned with the first two: `Round Rect Button` and `Label`.


    The first step is to click once on the `Round Rect Button` from the utilities
    window. Next, drag the object and drop it on the iPhone view, as shown in [Figure
    6–13](#Chapter06.html#fig_6_13). Don’t worry; dragging the object doesn’t remove
    it from the list of objects in the utilities view. Dragging it out will create
    a new copy of that object on our iPhone interface.


    ![images](images/0613.jpg)


    **Figure 6–13.** *Moving a button object onto the iPhone view*


    Next, double-click on the Round Rect Button that was just added to the iPhone
    interface. This allows the title of the button to be changed from nothing to “Name”,
    as shown in [Figure 6–14](#Chapter06.html#fig_6_14). Many different interface
    objects work just like this. Simply double-click and the title of the object can
    be changed. This can also be done in the actual code, but it’s much simpler doing
    it in the interface editor.


    Once the title has been changed, drag and drop a Label object and place it right
    below the button, as shown in [Figure 6–15](#Chapter06.html#fig_6_15).


    ![images](images/U0605.jpg)


    **Figure 6–14.** *Modifying the button’s title*


    ![images](images/0615.jpg)


    **Figure 6–15.** *Adding a Label object to our iPhone interface*


    For now, we can leave the label’s text as “Label” since it makes it easy to find
    on the interface. If we clear the label’s text, the object will still be there,
    but there is nothing visible to click on in order to select the label. Expand
    the size of the label by dragging the center blue ball to the right, as shown
    in [Figure 6–16](#Chapter06.html#fig_6_16).


    ![images](images/0616.jpg)


    **Figure 6–16.** *Expanding the label’s size*


    Now that we have both the button and the label, we can actually connect these
    visual objects to our program. We start by right-mouse clicking on the button
    control. This brings up a connection menu, as shown in [Figure 6–17](#Chapter06.html#fig_6_17).


    ![images](images/0617.jpg)


    **Figure 6–17.** *Connection menu for the button object*


    Next, we click and drag from the `Touch Up Inside` connection circle to the `File’s
    Owner` icon, as shown in [Figure 6–18](#Chapter06.html#fig_6_18). `Touch Up Inside`
    means the user clicked on the *inside* of the button. Dragging the connection
    to the file’s owner (which is the `ViewController` object) connects the Touch
    Up Inside event to the `ViewController` object. What this does is cause our object
    to be notified whenever the button is pressed.


    ![images](images/0618.jpg)


    **Figure 6–18.** *Connecting the `Touch Up Inside` event to our object*


    Once the connection is dropped, a list of methods that can be used in our connection
    is displayed, as shown in [Figure 6–19](#Chapter06.html#fig_6_19). In our example,
    there is only one method and that is the `showName:` method. Selecting the `showName:`
    method connects the Touch Up Inside event to our object.


    ![images](images/0619.jpg)


    **Figure 6–19.** *Selecting the method to handle the `Touch Up Inside` event*


    Once the connection has been made, the details are shown on the button’s connection
    menu, as shown in [Figure 6–20](#Chapter06.html#fig_6_20).


    ![images](images/0620.jpg)


    **Figure 6–20.** *The connection is now complete*


    Next, we create a connection for the label object. In this case, we don’t care
    about the label events; instead, we want to connect our `ViewController`’s `nameLabel`
    outlet to the object on the iPhone interface. This connection basically tells
    our object that the label we want to set text on is on the iPhone interface.


    Start by right-clicking on the label object on the iPhone interface. This brings
    up the connection menu for the label, as shown in [Figure 6–21](#Chapter06.html#fig_6_21).
    There are not as many options for a label object as there were for the button
    object.


    ![images](images/0621.jpg)


    **Figure 6–21.** *Connection menu for the label object*


    As mentioned above, we are not here to connect an event. Instead, we connect what''s
    referred to as a *Referencing Outlet*. This connection connects a screen object
    to a variable in our `ViewController` object. Just like the button, drag and drop
    the connection to the `File’s Owner` icon, as shown in [Figure 6–22](#Chapter06.html#fig_6_22).


    ![images](images/0622.jpg)


    **Figure 6–22.** *Connecting the Referencing Outlet to our object*


    Once the connection is dropped on the file’s owner, a list of outlets in our `ViewController`
    object will be displayed, as shown in [Figure 6–23](#Chapter06.html#fig_6_23).
    Of the two choices, we want to choose `nameLabel`. This is the name of our variable
    in our `ViewController` object we are using.


    ![images](images/0623.jpg)


    **Figure 6–23.** *Selecting our object’s variable to complete the connection*


    Once `nameLabel` is chosen, we’re ready to run our program. Click on the `Run`
    button at the top left corner of the Xcode window (see [Figure 6–6](#Chapter06.html#fig_6_6)).
    This will automatically save your files and start the application in the iPhone
    emulator, as shown in [Figure 6–24](#Chapter06.html#fig_6_24).


    ![images](images/0624.jpg)


    **Figure 6–24.** *Our app running, before and after the button is pressed*


    By clicking on the `Name` button, the label’s text will change from its default
    value of “Label” to “My Name is Mitch!” or whatever value you put in. If you want
    to, go back into the interface and clear the default label text.


    ## Summary


    The examples in this chapter were very simple, but hopefully they’ve whetted your
    appetite for more complex applications using Objective-C and Xcode. In later chapters,
    you can expect to learn more about object-oriented programming and more about
    what Objective-C can do. Pat yourself on the back because you’ve learned a lot
    already. Here is a summary of the topics discussed in this chapter:


    * the origins and brief history of the Objective-C language,

    * some common language symbols used in Objective-C,

    * an Objective-C class example,

    * the `@interface` and `@implementation` sections of a program,

    * using Xcode a bit more, including entering and compiling the `HelloWorld.m`
    source file, and

    * connecting visual interface objects with methods and variables in our application
    object.'
