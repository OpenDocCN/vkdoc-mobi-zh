    ` 5  `\n` 6  - (void)didReceiveMemoryWarning`\n` 7  {`\n` 8      [super didReceiveMemoryWarning];`\n\
    ` 9      // Release any cached data, images, etc. that aren't in use.`\n`10  }`\n\
    `11  `\n`12  #pragma mark - View lifecycle`\n`13  `\n`14  - (void)viewDidLoad`\n\
    `15  {`\n`16      [super viewDidLoad];`\n`17          // Do any additional setup\
    \ after loading the view, typically from a nib.`\n**`18      myStation = [[RadioStation\
    \ alloc] initWithName:@\"STAR 94\"`**\n**`19                                                                \
    \ atFrequency:94.1];`**\n`20      `\n`21  }`\n\nLine #2 is the import statement\
    \ that imports your RadioStation Object.\n\nLines #18 and 19 allocate a new RadioStation\
    \ object and store it into your new instance variable, myStation."
  trans: "\n#### 创建项目\n\n让我们启动`Xcode`（参见图 7-1），并创建一个名为`RadioStations`的新项目。\n\n![images](img/0701.jpg)\n\
    \n**图 7-1.** *打开`Xcode`，以便创建新项目。*\n\n1.  确保选择 iOS 应用程序，并选中**单视图应用**模板，如图 图 7-2\
    \ 所示。\n2.  选择模板后，点击**下一步**按钮。\n\n    ![images](img/0702.jpg)\n\n    **图 7-2.**\
    \ *在新项目窗口中选择模板*\n\n3.  接下来，将产品名称（应用程序名称）设置为`RadioStations`。  \n4.  设置公司标识符（可以使用虚构的公司名称），并将设备系列设置为\
    \ iPhone（如图 图 7-3 所示）。同时，确保选中“使用自动引用计数”。\n\n    ![images](img/0703.jpg)\n\n  \
    \  **图 7-3.** *命名新的 iPhone 应用程序*\n\n5.  点击**下一步按钮**，`Xcode`将询问您希望将新项目保存在何处。您可以将项目保存在桌面或主文件夹中的任何位置。我喜欢保存在桌面，因为它容易找到。做出选择后，只需点击**创建**按钮。\n\
    6.  点击**创建**按钮后，`Xcode`的工作区窗口应该会显示出来，如图 图 7-4 所示。\n\n    ![images](img/0704.jpg)\n\
    \n    **图 7-4.** *`Xcode`中的工作区窗口*\n\n#### 添加对象\n\n现在，您可以添加新对象了。\n\n1.  首先，创建您的`RadioStation`对象。右键点击\
    \ **RadioStations** 组文件夹，然后选择**新建文件…**（如图 图 7-5 所示）。\n\n    ![images](img/0705.jpg)\n\
    \n    **图 7-5.** *添加新文件*\n\n2.  在接下来的屏幕中（如图 图 7-6 所示），系统会询问新文件的类型。只需从 Cocoa Touch\
    \ 组中选择 **Objective-C 类**，然后点击**下一步**。\n\n    ![images](img/0706.jpg)\n\n    **图\
    \ 7-6.** *选择新文件类型*\n\n3.  在下一个屏幕上，输入`RadioStation`作为类名，并选择`NSObject`作为“子类”。这意味着您的新类将是`NSObject`的子类，如图\
    \ 图 7-7 所示。\n\n    ![images](img/0707.jpg)\n\n    **图 7-7.** *选择新对象的子类*\n\n4.\
    \  下一个屏幕询问要在哪里创建文件。只需点击**创建**按钮，因为`Xcode`会默认将文件保存到当前项目中，如图 图 7-8 所示。\n\n    ![images](img/0708.jpg)\n\
    \n    **图 7-8.** *选择新文件的创建位置*\n\n5.  您的项目窗口现在应该类似于图 7-9。点击`RadioStation.h`文件。请注意，您的新`RadioStation`类的骨架已经存在。现在，完善这个空类，使其看起来像代码清单\
    \ 7-1，即您的`RadioStation`接口文件。\n\n    ![images](img/0709.jpg)\n\n    **图 7-9.**\
    \ *工作区窗口中您新创建的文件*\n\n#### 编写实现文件\n\n现在`RadioStation.h`文件定义了您的新类的实例变量、类方法和实例方法。接下来，我们转到实现文件。\n\
    \n1.  这里将使用的实现文件比我们几页前的示例有所简化，但对于我们的电台模拟来说，它将完美运行。点击`RadioStation.m`文件，并为您的类添加代码，如代码清单\
    \ 7-4 所示。\n\n**代码清单 7-4.** *`RadioStation` 实现文件*\n\n```objc\n 1    #import \"\
    RadioStation.h\"\n 2   \n 3    @implementation RadioStation\n 4   \n 5    + (double)minAMFrequency\
    \ {\n 6        return 520.0;\n 7    }\n 8    + (double)maxAMFrequency {\n 9        return\
    \ 1610.0;\n10    }\n11    + (double)minFMFrequency {\n12        return 88.3;\n\
    13    }\n14    + (double)maxFMFrequency {\n15        return 107.9;\n16    }\n\
    17   \n18    - (id)initWithName:(NSString *)newName atFrequency:(double)newFrequency\
    \ {\n19        self = [super init];\n20        if (self != nil) {\n21            name\
    \ = newName;\n22            frequency = newFrequency;\n23        }\n24       \n\
    25        return self;\n26    }\n27   \n28    - (NSString *)name {\n29        return\
    \ name;\n30    }\n31   \n32    - (void)setName:(NSString *)newName {\n33      \
    \ name = newName;\n34    }\n35   \n36    - (double)frequency {\n37        return\
    \ frequency;\n38    }\n39   \n40    - (void)setFrequency:(double)newFrequency\
    \ {\n41        frequency = newFrequency;\n42    }\n43   \n44    @end\n```\n\n\
    2.  稍后我们会再回来讲解代码清单 7-4 中的几项内容；不过，既然`RadioStation`类已经定义，您现在就可以编写实际使用它的代码了。\n3.\
    \  首先，点击`ViewController.h`文件。您需要为此类定义一些实例变量，以便使用，如代码清单 7-5 所示。\n\n**代码清单 7-5.**\
    \ 更新后的 `ViewController.h` 接口文件\n\n```objc\n 1  #import <UIKit/UIKit.h>\n 2  \n\
     3  @class RadioStation;\n 4  \n 5  @interface ViewController : UIViewController\n\
     6  {\n 7      RadioStation *myStation;\n 8      IBOutlet UILabel* stationName;\n\
     9      IBOutlet UILabel* stationFrequency;\n10      IBOutlet UILabel* stationBand;\n\
    11  }\n12  \n13  @end\n```\n\n在第 #3 行，您将添加一个所谓的*前向声明*。这基本上是告诉编译器，您将使用一个尚未定义的类，名为`RadioStation`。您最终会导入您的头文件，但不是在这里——这就是您现在需要这个前向声明的原因。\n\
    \n第 #6–8 行定义了一些新的实例变量。第 #8 行是您的`RadioStation`对象。第 #9–11 行将用于您的 iOS 界面，以在屏幕上显示一些值（稍后会详细说明）。另外，不要忘记包含花括号（`{\
    \ … }`）。由于原始的`AppDelegate`没有声明任何实例变量，因此不需要这些花括号。\n\n4.  接下来，从主项目窗口中，点击`ViewController.m`文件。代码清单\
    \ 7-5 显示了`ViewController.m`文件的顶部部分。每当视图被加载到内存时，会调用以下方法：\n\n    ```objc\n    viewDidLoad\n\
    \    ```\n\n    您将在此处开始放置一些初始化代码。\n\n**代码清单 7-5.** *分配您的 `RadioStation` 对象*\n\n\
    ```objc\n 1  #import \"ViewController.h\"\n 2  #import \"RadioStation.h\"\n 3  \n\
     4  @implementation ViewController\n 5  \n 6  - (void)didReceiveMemoryWarning\n\
     7  {\n 8      [super didReceiveMemoryWarning];\n 9      // 释放任何未使用的缓存数据、图像等。\n\
    10  }\n11  \n12  #pragma mark - 视图生命周期\n13  \n14  - (void)viewDidLoad\n15  {\n\
    16      [super viewDidLoad];\n17          // 执行加载视图后的任何额外设置，通常来自 nib 文件。\n18      myStation\
    \ = [[RadioStation alloc] initWithName:@\"STAR 94\"\n19                                                    \
    \ atFrequency:94.1];\n20      \n21  }\n```\n\n第 #2 行是导入语句，用于导入您的`RadioStation`对象。\n\
    \n第 #18 和 19 行分配了一个新的`RadioStation`对象，并将其存储到您的新实例变量`myStation`中。\n"
- fmt: "### Creating the User Interface\n\nNext, the main window has to be set up\
    \ in order to display your station information.\n\n1. To start off, click the\
    \ `ViewController.xib` file, as shown in [Figure 7–10](#Chapter07.html#fig_7_10).\
    \ This file is the main iPhone screen.\n\n   ![images](images/0710.jpg)\n\n  \
    \ **Figure 7–10.** *Adding a Label object to your iPhone screen*\n\n2. Drag and\
    \ drop three Label objects onto the screen, as shown in [Figure 7–11](#Chapter07.html#fig_7_11).\
    \ The labels can be aligned in any manner, or as shown in [Figure 7–11](#Chapter07.html#fig_7_11).\n\
    3. You’re going to need space, however. Once the Label objects are on the iPhone\
    \ screen, double-click the Label object in order to change its text so that the\
    \ iPhone screen looks something like [Figure 7–11](#Chapter07.html#fig_7_11).\n\
    \n   ![images](images/0711.jpg)\n\n   **Figure 7–11.** *All three labels on the\
    \ iPhone screen*\n\n4. Next, add a Round Rect Button object to the screen, as\
    \ show in [Figure 7–12](#Chapter07.html#fig_7_12). This button, when pressed,\
    \ will cause the screen to be updated with your radio station information.\n\n\
    \   ![images](images/0712.jpg)\n\n   **Figure 7–12.** *Adding a button to the\
    \ screen*\n\n5. Just like the Label object, simply double-click the Round Rect\
    \ Button object in order change its Title to **My Station**.\n6. Next, you need\
    \ to add the Label fields that will hold the Radio Station information. These\
    \ fields are situated just after the existing labels, as shown in [Figure 7–13](#Chapter07.html#fig_7_13).\
    \ Once the label is placed, it needs to be re-sized so that it extends to the\
    \ edge of the iPhone screen.\n\n   ![images](images/0713.jpg)\n\n   **Figure 7–13.**\
    \ *Adding another Label object*\n\n   ![images](images/0714.jpg)\n\n   **Figure\
    \ 7–14.** *Stretching the Label object*\n\n   **NOTE:** Stretching the Label object\
    \ allows the Label’s text to contain a reasonably long string. If you **didn’t**\
    \ have a sized label, the text would either be cut off (since it wouldn’t fit),\
    \ or the font size would get smaller^([1](#Chapter07.html#CH-7-FN-1)).\n\n7. Repeat\
    \ adding and sizing a Label object next to the existing Frequency and Band Labels,\
    \ as shown in [Figure 7–15](#Chapter07.html#fig_7_15). It’s OK to leave the default\
    \ text of the Label set to *“Label”* for now.\n\n__________\n\n¹ By using either\
    \ code or the Interface Builder, you can customize how the Label object reacts\
    \ to text that is too large to fit. The behavior described is based upon typical\
    \ defaults for the Label object.\n\n![images](images/0715.jpg)\n\n**Figure 7–15.**\
    \ *Adding another Label object*\n\n### Hooking Up the Code\n\nNow that all the\
    \ user interface objects are in place, you can begin to hook up these interface\
    \ elements to the variables in your program. As you saw in [Chapter 6](#Chapter06.html#ch6),\
    \ you do this by *connecting* the user interface objects with the objects in your\
    \ program.\n\n1. Start by connecting the label by Station Name to your variable,\
    \ as shown in [Figure 7–16](#Chapter07.html#fig_7_16). Right-click the Label object\
    \ **next** to the “Station Name:” label to bring up the Connection Window.\n\n\
    \   ![images](images/0716.jpg)\n\n   **Figure 7–16.** *Creating a connection*\n\
    \n2. When the connection is dropped on the “File’s Owner” icon, another small\
    \ menu will be shown. Click the instance variable name that you want to display\
    \ in this label—in this case, you want the `stationName` instance variable, as\
    \ shown in [Figure 7–17](#Chapter07.html#fig_7_17).\n\n   ![images](images/0717.jpg)\n\
    \n   **Figure 7–17.** *Connecting the interface Label to your stationName instance\
    \ variable*\n\n3. Now, the interface Label object is *connected* to the `stationName`\
    \ instance variable. Whenever you set the instance variable’s value, the screen\
    \ will also be updated. **Repeat the above connection steps for the Frequency\
    \ and Band labels.**\n\nNext, you need to connect the button to your code; but,\
    \ before you can do that, you need to add some code to handle the actual button-click,\
    \ as shown in [Listing 7–7](#Chapter07.html#list_7_7). Add this code to the bottom\
    \ of the `ViewController.m` file.\n\n**Listing 7–7.** *Creating the buttonClick\
    \ Function*\n\n```\n 1  - (IBAction)buttonClick:(id)sender {\n 2      [stationName\
    \ setText:[myStation name]];\n 3      [stationFrequency setText:[NSString stringWithFormat:@\"\
    %.1f\",\n 4                                           [myStation frequency]]];\n\
     5      \n 6      if (([myStation frequency] >= [RadioStation minFMFrequency])\
    \ &&\n 7          ([myStation frequency] <= [RadioStation maxFMFrequency])) {\n\
     8          [stationBand setText:@\"FM\"];\n 9      } else {        \n10          [stationBand\
    \ setText:@\"AM\"];\n11      }\n12  }\n```\n\n[Listing 7–7](#Chapter07.html#list_7_7)\
    \ is a method that you will set up to be called whenever the button on the iPhone\
    \ screen is pressed. First, on line #1, you’ll notice the `IBAction` type. This\
    \ lets Xcode know that this method can be called as a result of an action. So,\
    \ when you go to connect an action to your application, you will see this method.\n\
    \nLine #2 and Line #3 both set the text fields to the values found in your `RadioStation`\
    \ class.\n\n```\n[stationName setText:[myStation name]]\n```\n\nThe `stationName`\
    \ variable is what you just connected to the user interface Label object, and\
    \ `[myStation name]` is used to return the name of the station.\n\nLine #3 effectively\
    \ does the same thing as line #2, but you have to first convert the `double` value\
    \ (the station’s frequency) to an `NSString`. The `@\"%.1f\"` means that you convert\
    \ a floating point value and should only see one digit after the decimal point.\n\
    \nLines #6–11 make use of both your instance variables and your class methods\
    \ of the `RadioStation` class. Here, you simply check to see if the frequency\
    \ of the radio station is between `minFMFrequency` and `maxFMFrequency`. If so,\
    \ the station is an FM station; otherwise, assume it’s the AM band. Lines #8 and\
    \ #10 will show the band value on the screen.\n\nYou also need to make sure that\
    \ your interface file contains the new method that you just coded. As shown in\
    \ Listing 7–8, simply add the following line **before** the `@end` in the `ViewController.h`\
    \ file:\n\n**Listing 7–7.**\n\n![images](images/U0703.jpg)\n\nNow you can connect\
    \ your Button on the iPhone screen to the newly created method, as shown in [Figure\
    \ 7–18](#Chapter07.html#fig_7_18).\n\n1. Right-click the Button to bring up the\
    \ connection window.\n\n   ![images](images/0718.jpg)\n\n   **Figure 7–18.** *Connecting\
    \ an event to your new method*\n\n2. As you did for the Label objects, drag a\
    \ connection from the **Touch Up Inside** event and drop it on the Radio Station\
    \ App Delegate. This will bring up the `IBAction` method you just created in [Listing\
    \ 7–7](#Chapter07.html#list_7_7).\n3. Simply choose `buttonClick:` (as shown in\
    \ [Figure 7–19](#Chapter07.html#fig_7_19)). This will connect the Touch Up Inside\
    \ event to your action, which will then set the Label text values to your Radio\
    \ Station.\n\n**TIP:** The “Round Rect Button” sends the Touch Up Inside event\
    \ whenever a user touches the *inside* of the button and then releases—not until\
    \ the user lifts his or her finger does the event actually get sent.\n\n![images](images/0719.jpg)\n\
    \n**Figure 7–19.** *Choosing an action to connect to the Touch Up Inside event*"
