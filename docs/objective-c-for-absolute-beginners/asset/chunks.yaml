  trans: "\n### 使用 Switch 语句\n\n到目前为止，我们已经看到了几个通过简单使用 `if` 语句和/或 `if`/`else` 语句来比较数据的示例。\n\
    \n```\nif (some_value == SOME_CONSTANT) {\n    ...\n} else if (some_value == SOME_OTHER_CONSTANT)\
    \ {\n    ...\n} else if (some_value == YET_SOME_OTHER_CONSTANT) {\n    ...\n}\n\
    ```\n\n如果要将某个特定的有序类型与若干常量值进行比较，你可以使用一种不同的方法来简化比较代码：`switch` 语句。\n\n**注意：** 有序类型是一种可以排序的\
    \ C 语言内置数据类型。例如 `int`、`long`、`char`、`BOOL`。\n\n`switch` 语句允许将一个或多个常量值与有序数据类型进行比较。这一点至关重要，需要理解。`switch`\
    \ 语句不允许将有序类型与变量进行比较。下面是一个正确的 `switch` 语句示例：\n\n```\nchar value;\nvalue = 'd';\n\
    \nswitch (value) {        // switch 语句后跟一个左大括号\ncase 'a':       // 等同于 if (value\
    \ == 'a')\n   ...                  // 在此处调用函数并在 case 之后放置任何其他语句\n   ...\nbreak;\
    \                  // 表示 \"case 'a':\" 语句的结束\ncase 'b':\n    ...\n    ...\nbreak;\n\
    case 'c':       // 如果 case 没有 break，程序会继续执行\ncase 'd':               //  因此，在这种情况下，如果\
    \ value 是 'c' 或 'd'，此代码块将被执行\n    ...\n    ...\nbreak;\ndefault:             \
    \    // default 是可选的，仅当没有与 'value' 匹配的 case 语句时使用\n   ...              // 所以，如果\
    \ value 等于 'x'，则会执行 switch 语句的 default 部分\n   ...          // 因为没有 \"case 'x':\"\
    \ 存在\nbreak;\n}  // switch 语句结束\n```\n\n`switch` 语句非常强大，它简化并精简了将有序类型与若干可能常量进行的比较。话虽如此，这同时也是\
    \ `switch` 语句的局限性所在。例如，无法使用 `switch` 语句将 `NSString` 变量与一系列字符串常量进行比较。这是因为 `NSString`\
    \ 值不是有序类型。`switch` 语句还必须将有序类型与常量进行比较。因此，无法编写如下代码：\n\n```\nswitch (value) {\ncase\
    \ variable: //case 必须是常量，而不能是变量\n   ...\nbreak;\n```\n\n虽然这些看起来似乎是 `switch` 语句的严重限制，但\
    \ `switch` 语句仍然是一个非常强大的语句，可以用来简化某些 `if`/`else` 语句。\n\n### 总结\n\n本章到此结束！以下是涵盖内容的总结。\n\
    \n*   **比较**\n    *   数据比较是任何应用程序不可或缺的一部分。\n*   **关系运算符**\n    *   你了解了六种标准关系运算符及其各自的使用方法。\n\
    *   **整数**\n    *   整数是最容易比较的信息类型。你了解了如何在程序中使用整数比较以及如何实现它。\n*   **示例**\n    *\
    \   你创建了一个示例应用程序，在其中可以测试你的比较逻辑，确保其正确无误。\n    *   你了解了如何修改应用程序以添加不同类型的比较。\n*  \
    \ **布尔值**\n    *   你了解了如何检查布尔值。\n*   **字符串**\n    *   你了解了字符串与你测试过的其他信息类型表现有何不同。你了解到了一些比较字符串时可能遇到的陷阱。\n\
    *   **对象**\n    *   你了解到比较对象可能相当困难，并且必须小心谨慎，以确保得到你期望的响应。\n\n### 练习\n\n*   修改示例应用程序，以比较一些字符串信息。可以是变量形式或字面量形式。\n\
    *   在你的应用程序中创建一个循环，使用你在本章布尔值部分学到的方法来显示一个数字。\n*   编写一个 Objective-C 应用，判断以下年份是否为闰年：1800、1801、1899、1900、2000、2001、2003\
    \ 和 2010。输出应以如下格式写入控制台：“2000 年是闰年”，或“2001 年不是闰年”。\n\n## 第 10 章\n\n## 创建用户界面\n\n\
    Interface Builder 是一款应用程序，它使 iPhone/iPad 和 Mac 开发者能够通过一个强大的图形用户界面轻松创建他们的用户界面。它提供了只需将对象从\
    \ Interface Builder 的库中拖拽到应用的用户界面上，即可构建用户界面的能力。\n\nInterface Builder 将你的用户界面设计存储在一个或多个资源文件中，这些文件称为\
    \ XIB。这些资源文件用于设置界面对象及其关系。你在用户界面上所做的更改会自动与 Xcode 同步。\n\n要构建用户界面，只需将对象从 Interface\
    \ Builder 的库面板拖拽到你的视图上。操作和输出口是 Interface Builder 的两个关键组件，它们帮助我们简化开发流程。\n\n我们的视图中对象触发的**操作**会连接到应用代码中的方法。在对象接口文件中声明的**输出口**（指针）会连接到特定的实例变量。请参见图\
    \ 10–1。\n\n**注意：** Interface Builder 曾经是一款独立的应用程序，开发者用它来设计用户界面。从 Xcode 4.0 开始，Apple\
    \ 将 Interface Builder 集成到了 Xcode 中。\n\n![images](img/1001.jpg)\n\n**图 10–1.**\
    \ *Interface Builder*\n\n### 理解 Interface Builder\n\n对于 iPhone 和 iPad 应用，操作系统负责管理其创建的对象的生命周期。这减轻了开发者的负担，如果开发者使用\
    \ Interface Builder 创建了对象，就无需再为其分配内存。\n\nInterface Builder 将用户界面文件保存为一个 bundle，其中包含应用中使用的界面对象和关系。这些\
    \ bundle 的文件扩展名是 “.NIB”。在 Interface Builder 3.0 版本中，采用了新的 XML 文件格式，文件扩展名改为 “.XIB”。然而，开发者们在提及或引用这些文件时，仍然称其为\
    \ “NIB” 文件。\n\n与大多数其他图形用户界面应用程序不同，NIB 通常被称为“冻干”文件，因为它们包含已归档的对象本身，并且可以随时运行。\n\n\
    XML 文件格式便于与 Subversion 和 Git 等源代码控制系统一起存储。\n\n在下一节中，我们将讨论一种称为“模型-视图-控制器”的应用设计模式。这种设计模式使开发者能够更轻松地维护代码，并在应用的整个生命周期中重用对象。\n"
- fmt: "### The Model-View-Controller\n\n`Model-View-Controller` (`MVC`) is the most\
    \ prevalent design pattern used in iPhone/iPad development, and learning about\
    \ it will make your life as a developer much easier. `MVC` is used in software\
    \ development and is considered an architectural pattern.\n\nArchitectural patterns\
    \ describe solutions to software design problems that developers can use in their\
    \ code. The `MVC` pattern is not unique to Apple OOP developers; it is being adopted\
    \ by many makers of IDEs, including those running on Windows and Linux platforms.\n\
    \nSoftware development is considered an expensive and risky venture for businesses.\
    \ Frequently, apps take longer than expected to write, come in over budget, and\
    \ don’t work as promised. OOP produced a lot of hype and gave the impression that\
    \ companies would realize savings if they adopted its methodology, primarily because\
    \ of the reusability of objects and easier maintainability of the code. Initially,\
    \ this didn’t happen.\n\nAs engineers looked at why OOP wasn’t living up to these\
    \ expectations, they discovered a key shortcoming with how developers were designing\
    \ their objects: developers were frequently mixing objects together in such a\
    \ way that the code became difficult to maintain as the application matured, moved\
    \ to different platforms, or hardware displays changed.\n\nObjects were often\
    \ designed so that, if any of the following changed, it was difficult to isolate\
    \ the objects that were impacted:\n\n- Business rules\n- User interfaced\n- Client-server\
    \ or Internet-based\n\nObjects can be broken down into three task-related categories.\
    \ It is the responsibility of the developer to ensure that each of these categories\
    \ keeps their objects from drifting across other categories. They are:\n\n1. **Models:**\
    \ Business objects\n2. **Views:** User interface objects\n3. **Controllers:**\
    \ Objects that communicate with both the Models and the Views\n\nAs objects are\
    \ categorized in these groups, apps can be developed and maintained more easily\
    \ over time. The following are examples of objects and their associated `MVC`\
    \ category for an iPhone banking application:\n\n**Model**\n\n- Account balances\n\
    - User encryption\n- Account transfers\n- Account login\n\n**View**\n\n- Account\
    \ balances table cell\n- Account login spinner control\n\n**Controller**\n\n-\
    \ Account balance view controller\n- Account transfer view controller\n- Logon\
    \ view controller\n\nThe easiest way to remember and classify your objects in\
    \ the `MVC` paradigm is the following:\n\n**Model**: Unique business or application\
    \ rules or code that represent the real world\n\n**View**: Unique user interface\
    \ code\n\n**Controller**: Anything that controls or communicates with the Model\
    \ or View objects\n\n`Figure 10–2` represents the `MVC` paradigm.\n\n![images](images/1002.jpg)\n\
    \n**Figure 10–2.** *MVC paradigm*\n\nNeither Xcode nor Interface Builder force\
    \ developers to use the `MVC` design pattern. It is up to the developer to organize\
    \ their objects in such a way to use this design pattern.\n\nIt is worth mentioning\
    \ that Apple *strongly* embraces the `MVC` design pattern and all of the frameworks\
    \ are designed to work in an `MVC` world. This means that if you also embrace\
    \ the `MVC` design pattern, working with Apple’s classes will be much easier.\
    \ If you don’t, you’ll be swimming upstream.\n\n### Human Interface Guidelines\
    \ (HIGs)\n\nBefore you get too excited and begin designing dynamic user interfaces\
    \ for your app, you need to learn some of the ground rules. Apple has developed\
    \ one of the most advanced operating systems in the world with iOS 5. Additionally,\
    \ Apple’s products are known for being intuitive and user-friendly. Apple wants\
    \ users to have the same experience from one app to the next.\n\nIn order to insure\
    \ a consistent user experience, Apple provides developers guidelines on how their\
    \ apps should look and feel. These guidelines, called the human interface guidelines\
    \ (HIGs), are available for the Mac, iPhone, and iPad. You can download these\
    \ docs at `http://developer.apple.com`. See `Figure 10–3`.\n\n![images](images/1003.jpg)\n\
    \n**Figure 10–3.** *Apple’s human interface guidelines (HIGs) for iOS devices\
    \ and Macs*\n\n**NOTE:** Apple’s HIGs are more than recommendations or suggestions.\
    \ Apple takes them very seriously. While the HIGs don’t describe how to implement\
    \ your user interface designs in code, they are great for understanding the proper\
    \ way to implement your views and controls.\n\nThe following are the top reasons\
    \ apps are rejected in Apple’s iTunes App store:\n\n1. The app crashes\n2. Violation\
    \ of the HIGs\n3. Uses Apple Private APIs\n4. Doesn’t function as advertised on\
    \ iTunes App Store\n\nYou can read, learn, and follow the HIGs before you develop\
    \ your app, or you can read, learn, and follow the HIG after your app gets rejected\
    \ by Apple and you have to rewrite part or all of it. Either way, all iOS developers\
    \ will end up becoming familiar with the HIGs.\n\nMany new iOS developers find\
    \ this out the hard way, but if you the follow the HIGs from day one, your iOS\
    \ development will be a far more pleasurable experience.\n\n### Creating an Example\
    \ iPhone App with Interface Builder\n\nLet’s get started by building an iPhone\
    \ app that generates and displays a random number. See `Figure 10–4`. This app\
    \ will be similar to the app we created in Chapter 4, but we’ll see how much more\
    \ interesting the app becomes with an iOS user interface (UI).\n\n![images](images/1004.jpg)\n\
    \n**Figure 10–4.** *Completed iOS random number generator app*\n\n1. Open up Xcode\
    \ and select **Create a New Project**. Make sure you select a **Single View Application**\
    \ for the iPhone. See `Figure 10–5`.\n\n   ![images](images/1005.jpg)\n\n   **Figure\
    \ 10–5.** *Create an iPhone Single View Application*\n\n2. Name your project “RandomNumber”\
    \ and save the project. See `Figure 10–6`.\n\n   ![images](images/1006.jpg)\n\n\
    \   **Figure 10–6.** *Naming our iPhone project*\n\n3. Your project files and\
    \ settings are created and displayed. See `Figure 10–7`.\n\n   ![images](images/1007.jpg)\n\
    \n   **Figure 10–7.** *Source files*\n\n   Although we only have one controller\
    \ in this project, it’s good programming practice to make your MVC groups at the\
    \ beginning of your development. This helps remind developers to keep the MVC\
    \ paradigm and not put all of their code unnecessarily in their controller.\n\n\
    4. Right-click the RandomNumber Project, and then select **New Group**. See `Figure\
    \ 10–8`.\n\n   ![images](images/1008.jpg)\n\n   **Figure 10–8.** *Creating new\
    \ groups*\n\n5. Create a Models Group, Views Group, and Controllers Group.\n\n\
    6. Drag the `ViewController.m` and `.h` file the Controllers Group. Having these\
    \ groups reminds you to follow the MVC design pattern as you develop your code\
    \ and prevents you from placing all of your code in the controllers. See `Figure\
    \ 10–9`.\n\n   Developers have found it helpful to keep their `XIB` files with\
    \ their controllers as their projects grow. It is not uncommon to have dozens\
    \ of controllers and `XIB` files in your project. Keeping them together helps\
    \ keep everything organized.\n\n   ![images](images/1009.jpg)\n\n   **Figure 10–9.**\
    \ *MVC groups with Controller and XIB files organized*\n\n7. Click the `ViewController.xib`\
    \ to open Interface Builder.\n\n#### Using Interface Builder\n\nThe most common\
    \ way to launch Interface Builder and begin working on our view is to click the\
    \ `XIB` file related to the view. See `Figure 10–10`.\n\n![images](images/1010.jpg)\n\
    \n**Figure 10–10.** *Interface Builder in the workspace window*\n\nWhen Interface\
    \ Builder opens, we can see our view displayed in the canvas. We are now able\
    \ to design our user interface. First we need to understand some of the sub-windows\
    \ within Interface Builder."
