- fmt: "### Dealing with Code Errors and Warnings\n\nWhile coding errors and warnings\
    \ aren’t really part of the Xcode 4 debugger, fixing them is part of the entire\
    \ debugging process. Before a program can be run (with or without the debugger),\
    \ all errors must be fixed. Warnings won’t stop a program from building, but they\
    \ could cause issues during program execution. It’s best not to have warnings\
    \ at all.\n\nLet’s take a look at a couple of different types of errors. To start,\
    \ let’s add an error to our code. On line #25 of the `MasterViewController.m`\
    \ file, change\n\n```\n[[BookStore alloc] init]\n```\n\nto\n\n```\n[[BookStore\
    \ alloc] initialize].\n```\n\nSave the changes and then build the project by pressing\
    \ ![images](images/U002.jpg)+B to build the program. There will be an error, as\
    \ shown in [Figure 14–14](#Chapter14.html#fig_14_14), that may show up immediately\
    \ or after the build.\n\n![images](images/1414.jpg)\n\n**Figure 14–14.** *Viewing\
    \ the error in Xcode*\n\nNext, let’s move over to the Issue Navigator window,\
    \ as shown in [Figure 14–15](#Chapter14.html#fig_14_15), by clicking on the triangle\
    \ with the exclamation point. This view shows all the errors and warnings currently\
    \ in the program—not just the current file, `MainViewController.m`, but all files.\
    \ Errors are displayed as a white exclamation point inside a red octagon. In our\
    \ case, we simply have one error. Also, if the error doesn’t fit on the screen\
    \ or is hard to read, simply hover over the error on the Issue Navigation window\
    \ and the full error will be displayed.\n\n![images](images/1415.jpg)\n\n**Figure\
    \ 14–15.** *Viewing the Issue Navigation window*\n\nGenerally, the error points\
    \ to the real problem. In the case above, the `BookStore` object doesn’t know\
    \ about a method called `initialize`.\n\n**TIP:** Encountering this error when\
    \ building a project generally means the method name is misspelled or perhaps\
    \ the proper header file hasn’t been included to let the compiler know about this\
    \ method. If you know the method exists, then check to see if the header is included.\
    \ Otherwise, it might just be a typo.\n\nOK, let’s fix the error by changing the\
    \ word `initialize` to `init`.\n\n#### Warnings\n\nWarnings indicate potential\
    \ problems with the program. As mentioned above, warnings won’t stop a program\
    \ from building, but may cause issues during program execution. It’s outside the\
    \ scope of this book to cover those warnings that may or may not cause problems\
    \ during program execution; however, it’s good practice to eliminate all warnings\
    \ from a program.\n\nComment out line with `@synthesize MasterViewController`\
    \ (line 14 in the figure below; your line may be different) of the `MasterViewContoller.m`\
    \ file by putting two slashes in front of the `@synthesize myBookStore`, as is\
    \ shown in [Figure 14–16](#Chapter14.html#fig_14_16). Build the project by pressing\
    \ ![images](images/U002.jpg)+B to build the program.\n\n![images](images/1416.jpg)\n\
    \n**Figure 14–16.** *Viewing the warnings in the Issue Navigator*\n\nUnfortunately,\
    \ the warning doesn’t show in the `MasterViewController.m` file. Clicking on the\
    \ first warning in the Issue Navigator will bring us to the first problem, as\
    \ shown in [Figure 14–17](#Chapter14.html#fig_14_17).\n\n![images](images/1417.jpg)\n\
    \n**Figure 14–17.** *Viewing our first warning*\n\nIn the main window, we can\
    \ see the warning. In fact, this warning gives us some clue as to the problem\
    \ with the code. The warning states:\n\n> *“Property ‘myBookStore’ requires method\
    \ ‘myBookStore’ to be defined – use @synthesize, @dynamic or provide a method\
    \ implementation.”*\n\nOur code has a `@property`, but because we commented it\
    \ out, it doesn’t have a `@synthesize`. The compiler considers this a warning\
    \ because the method could be provided dynamically during runtime. In our case,\
    \ however, we aren’t doing this; we just didn’t include the `@synthesize` keyword\
    \ in the implementation file.\n\nTo fix this problem, simply navigate back to\
    \ the `MasterViewController.m` file and remove the comments we just added on line\
    \ 14. To navigate back to the file list, click on the *folder* icon, as shown\
    \ [Figure 14–18](#Chapter14.html#fig_14_18) (or simply click on the back button\
    \ located at the top of the edit window).\n\n![images](images/1418.jpg)\n\n**Figure\
    \ 14–18.** *Navigating back to the file list and fixing our warning problem*\n\
    \n### Summary\n\nIn this chapter, we covered the high-level features of the free\
    \ Apple Xcode debugger. Regardless of price, Xcode is an excellent debugger. Specifically,\
    \ in this chapter, you learned the following:\n\n- The origins of the term “bug”\
    \ and what a debugger is;\n- The high-level features of the Xcode debugger:\n\
    \  - Breakpoints\n  - Stepping through a program;\n- How to use the debugging\
    \ controls:\n  - Tasks (stop sign),\n  - Restart and continue (pause),\n  - Step\
    \ over,\n  - Step into,\n  - Step out;\n- Working with the various debugger views:\n\
    \  - Threads (call stack),\n  - Variables,\n  - Text editor, and\n  - Output;\n\
    - Looking at program variables; and\n- Dealing with errors and warnings.\n\n##\
    \ Index\n\n### ![Image](images/square1.jpg)Special Characters and Numerics\n\n\
    3D user interface, [15](#Chapter02.html#page_15)"
