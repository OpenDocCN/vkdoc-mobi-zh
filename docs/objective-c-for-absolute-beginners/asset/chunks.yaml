    # 使用解引用运算符


    第 9 行看起来与其他行有些不同，让我们更仔细地分析一下：


    ```

    letter = *(aPointer + 2);

    ```


    首先，我们来看括号内的内容：


    `aPointer + 2`


    这应该相当直接明了：我们将 2 加到指针 `aPointer` 上。如果 `aPointer` 是 0×1000，结果值将是 0×1002。此时指针*指向*了字母“C”。以这种方式使用指针与第
    8 行或第 10 行中使用方括号的方式截然不同。我们是在手动调整指针，使其指向一个新值。接下来，我们需要询问计算机：“这个指针指向什么？”在列表 13–1
    的第 8 行和第 10 行中，使用数组运算符时，这个问题是隐含的，程序会直接响应。但当我们简单地通过加法、减法等方式改变地址时，程序需要显式地提出这个问题。这就是星号（`*`）发挥作用的地方。


    在指针前使用星号可以*解引用*该地址，并返回指针所指向的值。因此，如果我们的指针是 0×1000，而字母“A”存储在 0×1000，我们可以通过解引用指针来获取字母“A”。如果我们的示例指向真实内存，`*(0×1000)`
    将返回字母“A”（但实际上不要这样做，因为 0×1000 不是一个真实地址，仅用于简化问题的示例）。请记住，指针是一个地址，而地址只是一个数字。星号要求计算机返回存储在地址中的内容，而不是返回地址本身。


    **注：** 在大多数常见编程中，程序员很少有机会直接告诉系统，例如，位置 0×1000 是我们的数据。这是因为内存是**虚拟化**的。虚拟化内存允许使用的内存量超过机器物理内存的实际容量*（虚拟内存超出本书讨论范围）*。因此，操作系统管理数据的存储位置。结果是，计算机告诉程序它的内存在哪里，而不是程序告诉计算机。尽管如此，概念是相同的。


    在硬件或设备驱动程序级别的软件开发中，使用硬编码地址更为常见。Mac OS X 或 iOS 中的典型程序永远不会使用硬编码地址。


    ## 分配内存


    在现代操作系统中，程序分配内存，操作系统通过返回一个指向所请求内存的指针来响应。在 C 和 Objective-C 中，**指针**通过在变量名前加上星号（`*`）来声明，如下例所示：


    ```

    char *theData;

    NSString *theString;

    ```


    不要将此处的星号与***解引用运算符***混淆。只有在声明变量时，星号才将变量标识为指针。


    以下是更多请求内存的示例：


    ```

    1. char data1[100];

    2. char *data2 = malloc(100);

    3. NSString *myString = [[NSString alloc] init];

    ```


    在示例 1 中，通过数组声明的方式分配内存。程序现在拥有一个数组（`data1`），它**指向** 100 字节的内存。在 C 中，只需记住任何声明为数组的变量即使没有声明为指针，也会被*视为*指针来引用。


    示例 2 稍微复杂一些。`data2` 被声明为一个指向 `char` 数据类型的指针。指针通过在文件前加上星号来声明。该行的下一部分是 `malloc(100)`，这是一个标准
    C 库函数调用。此函数分配所请求的内存大小并返回一个指向它的指针。在我们的示例中，`malloc` 被传入值 `100`。这请求分配 100 字节。当函数返回时，`data2`
    包含一个*指针*，指向这 100 字节的内存。


    示例 3 是一种更传统的 Objective-C 类型的内存分配。首先，程序声明一个指向名为 `myString` 的 `NSString` 类的指针。接下来，执行以下代码：`[[NSString
    alloc] init]`。这将为对象分配所需的内存，并返回一个*指针*指向它。


    在所有这些示例中，内存都是从操作系统请求的，并通过指针返回给程序，甚至示例 1 也不例外——只是示例 1 与其他示例略有不同。


    ### 使用自动变量和指针


    在函数或块内创建的任何变量都被视为**自动变量**，或**自动变量**。在我们之前的示例中，示例 1 将 100 个字符分配为一个数组。这是自动完成的，因为如你所知，所有变量默认都是自动变量。由于我们通过数组声明预先定义了所有空间，这块内存会自动为我们管理。示例
    2 和 3 也是自动变量，但它们分配的空间仅足以容纳一个指向内存的指针——仅此而已。回想一下，指针只是一个保存内存地址的变量，而不是内存本身。因此，`char*
    data2` 和 `NSString *myString` 实际上只是保存一个数字的变量，该数字代表一个内存地址。


    **提示：** 这样理解指针：*指针*就像一张音乐会的门票，而分配的内存就像座位。门票上带有如何到达座位的信息。如果门票被丢弃（或丢失），找到座位的能力也就丢失了。然而，座位（分配的内存）仍然存在。


    示例 2 和 3 是持有内存“门票”的自动变量，而不是内存本身（参见图 13–9）。这意味着，当函数退出且变量超出作用域时，指向内存的指针将会丢失；即“门票”丢失了。问题在于，程序还需要在指针丢失之前释放或解除分配指针所指向的内存。手动分配的内存不会随着指针一起超出作用域；分配的内存对于程序来说是全局的，直到程序退出才会被释放。


    ![images](img/1309.jpg)


    **图 13–9.** *指针不是内存本身。*


    需要记住的非常重要的一点是，手动分配的内存必须在某个时刻解除分配，具体取决于内存的使用方式。有些内存可能在程序启动时分配，直到程序退出时才需要释放。然而，最常见的内存分配在程序生命周期中会发生很多很多次，因此一旦对象不再使用，立即解除分配相关内存至关重要。手动分配的内存必须手动解除分配。自动分配的内存（例如
    `char array[100];`）会自动解除分配。

    '
- fmt: "### Deallocating Memory\n\nWhen a program allocates memory, it needs to ensure\
    \ that it’s released, or deallocated, once the program is finished using the memory.\
    \ Using the examples again, example 2 allocates memory with the `malloc` command.\
    \ When the program is finished with that memory, it needs to be deallocated. Failing\
    \ to deallocate memory is a common programming mistake and goes by the descriptive\
    \ name of **memory leak**.\n\nTo prevent memory leaks (which eventually lead to\
    \ program crashes), allocated memory must be managed with care. [Listing 13–2](#Chapter13.html#list_13_2)\
    \ shows how the code should look when properly deallocating memory for examples\
    \ 2 and 3.\n\n**Listing 13–2.** *Memory Allocation and Deallocation.*\n\n```\n\
    1   int main(void)\n2   {\n3       char *data2 = malloc(100);\n4       NSString\
    \ *myString = [[NSString alloc] init];\n5       …  // standard \"doing-stuff\"\
    \ ellipse\n6       …\n7       free(data2);  // Deallocate the 100 bytes\n8   \
    \    data2 = NULL;\n9       [myString release];\n10      myString = nil;\n11 \
    \  }\n```\n\nIn [Listing 13–2](#Chapter13.html#list_13_2), `data2` is allocated\
    \ on line 3. This type of allocation is plain old standard C and is not typical\
    \ in an Objective-C program, but it’s still very important to know and understand.\n\
    \nLine 4 declares and allocates an Objective-C object, `NSString`.\n\nLine 7 deallocates\
    \ the block of memory allocated from line 3.\n\nLine 8 sets the pointer to `NULL`.\
    \ This is a good practice and will be explained in the next section.\n\nLine 9\
    \ releases the object that was allocated on line 4. The `release` message is a\
    \ request to deallocate the object. The reason that `release` message is a *request*\
    \ to deallocate memory has to do with the mechanism of how memory is managed for\
    \ Objective-C objects. This mechanism is referred to as the **retain/release model**,\
    \ or sometimes as **reference counting**.\n\n**NOTE:** Prior to Xcode 4, the retain/release\
    \ model was the only model to use for iOS development. Xcode 4.2 introduced an\
    \ option called Automatic Reference Counting (ARC). ARC causes the compiler to\
    \ automatically include the retain and release methods on your behalf. While ARC\
    \ is optional, it defaults to being on for any new project started in Xcode 4.2.\
    \ Opening older projects created before Xcode 4.2 will still compile fine and\
    \ ARC will be disabled.\n\nWhile ARC is a nice feature, it’s still very important\
    \ to understand what is still happening under the covers. ARC doesn’t remove calls\
    \ to the retain and release methods, it just hides the implementation much like\
    \ Objective-C properties hide getter and setter methods.\n\nReference counting\
    \ makes using memory a little more efficient because it allows the objects to\
    \ know when memory should be deallocated. It’s a slightly better mechanism than\
    \ completely managing memory manually.\n\nLine 10 is equivalent to line 8. Objective-C\
    \ pointers *can* be set to `NULL` but it’s much better to set the pointer to `nil`.\
    \ A `nil` object in Objective-C has a special meaning and can actually respond\
    \ to a message. `NULL` does not have that same property.\n\nLet’s also look at\
    \ how this listing would change if we were to be using ARC:\n\n**Listing 13–3.**\
    \ *Memory Allocation with ARC*.\n\n```\n1   int main(void)\n2   {\n3       char\
    \ *data2 = malloc(100);\n4       NSString *myString = [[NSString alloc] init];\n\
    5       …  // standard \"doing-stuff\" ellipse\n6       …\n7       free(data2);\
    \  // Deallocate the 100 bytes\n8       data2 = NULL;\n9       myString = nil;\n\
    10   }\n```\n\nThe major difference between [Listing 13–2](#Chapter13.html#list_13_2)\
    \ and [Listing 13–3](#Chapter13.html#list_13_3) is the omission of `[myString\
    \ release]`. Since ARC is being used, it handles the releasing of the memory.\n\
    \n### Using Special Pointers\n\nAs you’ve learned, a pointer is just a number\
    \ that represents an address to memory. There are two special pointers that are\
    \ worth mentioning. They really aren’t pointers per se, but they represent an\
    \ empty pointer—a pointer that doesn’t point to anything. These two pointers are\
    \ `NULL` and `nil`. `NULL` is nothing more than zero, zilch, nada. Since pointers\
    \ are just numbers that represent an address, an address of `0`, or `NULL`, represents\
    \ a pointer that logically points to nothing.\n\nUsing an address of zero is a\
    \ convention that modern computers use; computers do not allow any program to\
    \ store something at the address `0`, which makes using `NULL` to represent an\
    \ empty or unused piece of memory much more meaningful. This is important to know\
    \ because if memory allocation fails, the resulting pointer returned is `NULL`.\
    \ `NULL` is also useful to indicate that the pointer is no longer valid or is\
    \ simply empty. This is true for all of standard C. Here’s how `NULL` can be used\
    \ to initialize a pointer:\n\n```\n       char *data = NULL;\n```\n\nIt should\
    \ also be used in comparisons like the code fragment in [Listing 13–4](#Chapter13.html#list_13_4).\n\
    \n**Listing 13–4.** *Using NULL to Verify and Clear a Pointer.*\n\n```\n1   char\
    \ *data = malloc(100);\n2   if (data != NULL) {\n3       // Do something with\
    \ the memory.  It‘s valid.\n4       free (data);   // Deallocate the memory, we’re\
    \ done with it.\n5       data = NULL;  // Set the pointer to NULL indicating that\
    \ it‘s empty.\n6   }\n```\n\nIn [Listing 13–4](#Chapter13.html#list_13_4), line\
    \ 2 checks to make sure that the `malloc` function worked by checking the pointer\
    \ with `NULL`. If the pointer is not `NULL`, the allocation worked and the program\
    \ can use the returned value. The memory is then deallocated on line 4 and set\
    \ to `NULL` on line 5 to indicate that the pointer is no longer pointing to anything.\n\
    \nWhen we are dealing with Objective-C objects, the equivalent of `NULL` in Objective-C\
    \ is `nil`. Like `NULL`, `nil` is a special pointer to nothing. However, in the\
    \ case of Objective-C, `nil` is actually an empty object. Since Objective-C is\
    \ heavy on sending messages to an object, an empty pointer should respond to message\
    \ sent to it, even if that pointer is empty—the `nil` empty object fulfills this\
    \ purpose. [Listing 13–5](#Chapter13.html#list_13_5) is a sample code fragment\
    \ that is similar to the standard C version.\n\n**Listing 13–5.** *Using a Property\
    \ on a Possibly Nil Object.*\n\n```\n1   NSArray *bookList = [bookstore booksOnSale];\n\
    2   for (NSUinteger i=0 i<bookList.count; ++i) {\n3       // If bookList is non-nil,\
    \ this part of the for loop will run.\n4       // If bookList is nil, then this\
    \ part of the loop will be skipped.\n5   }\n```\n\n**TIP:** When using the ticket\
    \ metaphor for deallocated memory, here is something to watch out for: If a ticket\
    \ is a pointer to a seat in a theater, what happens when the show is over? Well,\
    \ the ticket still points to that same seat, but it isn’t valid anymore; the show\
    \ is over. The same is true with memory. If the memory that a pointer points to\
    \ is deallocated, that memory is now free to be used by another memory allocation.\
    \ However, the pointer still points to that old memory. It’s important to clear\
    \ the pointer so it isn’t mistakenly used. This is what is referred to as a dangling\
    \ pointer. The practice of checking to see if the pointer is not `NULL` before\
    \ using it paired with the practice of setting a pointer to `NULL` or `nil` when\
    \ the object is deallocated is a “best practice” that should be strictly followed."
  raw: '### Deallocating Memory


    When a program allocates memory, it needs to ensure that it’s released, or **deallocated**,
    once the program is finished using the memory. Using the examples again, example
    2 allocates memory with the `malloc` command. When the program is finished with
    that memory, it needs to be deallocated. Failing to deallocate memory is a common
    programming mistake and goes by the descriptive name of **memory leak**.


    To prevent memory leaks (which eventually lead to program crashes), allocated
    memory must be managed with care. [Listing 13–2](#Chapter13.html#list_13_2) shows
    how the code should look when properly deallocating memory for examples 2 and
    3.


    **Listing 13–2.** *Memory Allocation and Deallocation.*


    `1   int main(void)`

    `2   {`

    `3       char *data2 = malloc(100);`

    `4       NSString *myString = [[NSString alloc] init];`

    `5       …  // standard “doing-stuff” ellipse`

    `6       …`

    `7       free(data2);  // Deallocate the 100 bytes`

    `8       data2 = NULL;`

    `9       [myString release];`

    `10      myString = nil;`

    `11   }`


    In [Listing 13–2](#Chapter13.html#list_13_2), `data2` is allocated on line 3\.
    This type of allocation is plain old standard C and is not typical in an Objective-C
    program, but it’s still very important to know and understand.


    Line 4 declares and allocates an Objective-C object, `NSString`.


    Line 7 deallocates the block of memory allocated from line 3.


    Line 8 sets the pointer to `NULL`. This is a good practice and will be explained
    in the next section.


    Line 9 releases the object that was allocated on line 4\. The `release` message
    is a request to deallocate the object. The reason that `release` message is a
    *request* to deallocate memory has to do with the mechanism of how memory is managed
    for Objective-C objects. This mechanism is referred to as the **retain/release
    model**, or sometimes as **reference counting**.


    **NOTE:** Prior to Xcode 4, the retain/release model was the only model to use
    for iOS development. Xcode 4.2 introduced an option called Automatic Reference
    Counting (ARC). ARC causes the compiler to automatically include the retain and
    release methods on your behalf. While ARC is optional, it defaults to being on
    for any new project started in Xcode 4.2\. Opening older projects created before
    Xcode 4.2 will still compile fine and ARC will be disabled.


    While ARC is a nice feature, it’s still very important to understand what is still
    happening under the covers. ARC doesn’t remove calls to the retain and release
    methods, it just hides the implementation much like Objective-C properties hide
    getter and setter methods.


    Reference counting makes using memory a little more efficient because it allows
    the objects to know when memory should be deallocated. It’s a slightly better
    mechanism than completely managing memory manually.


    Line 10 is equivalent to line 8\. Objective-C pointers *can* be set to `NULL`
    but it’s much better to set the pointer to `nil`. A `nil` object in Objective-C
    has a special meaning and can actually respond to a message. `NULL` does not have
    that same property.


    Let’s also look at how this listing would change if we were to be using ARC:


    **Listing 13–3.** *Memory Allocation with ARC*.


    `1   int main(void)`

    `2   {`

    `3       char *data2 = malloc(100);`

    `4       NSString *myString = [[NSString alloc] init];`

    `5       …  // standard “doing-stuff” ellipse`

    `6       …`

    `7       free(data2);  // Deallocate the 100 bytes`

    `8       data2 = NULL;`

    `9       myString = nil;`

    `10   }`


    The major difference between [Listing 13–2](#Chapter13.html#list_13_2) and [Listing
    13–3](#Chapter13.html#list_13_3) is the omission of `[myString release]`. Since
    ARC is being used, it handles the releasing of the memory.


    #### Using Special Pointers


    As you’ve learned, a pointer is just a number that represents an address to memory.
    There are two special pointers that are worth mentioning. They really aren’t pointers
    per se, but they represent an empty pointer—a pointer that doesn’t point to anything.
    These two pointers are `NULL` and `nil`. `NULL` is nothing more than zero, zilch,
    nada. Since pointers are just numbers that represent an address, an address of
    `0`, or `NULL`, represents a pointer that logically points to nothing.


    Using an address of zero is a convention that modern computers use; computers
    do not allow any program to store something at the address `0, which makes using
    NULL to represent an empty or unused piece of memory much more meaningful`. This
    is important to know because if memory allocation fails, the resulting pointer
    returned is `NULL`. `NULL` is also useful to indicate that the pointer is no longer
    valid or is simply empty. This is true for all of standard C. Here’s how NULL
    can be used to initialize a pointer:


    `       char *data = NULL;`


    It should also be used in comparisons like the code fragment in [Listing 13–4](#Chapter13.html#list_13_4).


    **Listing 13–4**. *Using NULL to Verify and Clear a Pointer.*


    `1   char *data = malloc(100);`

    `2   if (data != NULL) {`

    `3       // Do something with the memory.  It’s valid.`

    `4       free (data);   // Deallocate the memory, we’re done with it.`

    `5       data = NULL;  // Set the pointer to NULL indicating that it’s empty.`

    `6   }`


    In [Listing 13–4](#Chapter13.html#list_13_4), line 2 checks to make sure that
    the `malloc` function worked by checking the pointer with `NULL`. If the pointer
    is not `NULL`, the allocation worked and the program can use the returned value.
    The memory is then deallocated on line 4 and set to `NULL` on line 5 to indicate
    that the pointer is no longer pointing to anything.


    When we are dealing with Objective-C objects, the equivalent of `NULL` in Objective-C
    is `nil`. Like `NULL`, `nil` is a special pointer to nothing. However, in the
    case of Objective-C, `nil` is actually an empty object. Since Objective-C is heavy
    on sending messages to an object, an empty pointer should respond to message sent
    to it, even if that pointer is empty—the `nil` empty object fulfills this purpose.
    [Listing 13–5](#Chapter13.html#list_13_5) is a sample code fragment that is similar
    to the standard C version.


    **Listing 13–5.** *Using a Property on a Possibly Nil Object.*


    `1   NSArray *bookList = [bookstore booksOnSale];`

    `2   for (NSUinteger i=0 i<bookList.count; ++i) {`

    `3       // If bookList is non-nil, this part of the for loop will run.`

    `4       // If bookList is nil, then this part of the loop will be skipped.`

    `5   }`


    **TIP:** When using the ticket metaphor for deallocated memory, here is something
    to watch out for: If a ticket is a pointer to a seat in a theater, what happens
    when the show is over? Well, the ticket still points to that same seat, but it
    isn’t valid anymore; the show is over. The same is true with memory. If the memory
    that a pointer points to is deallocated, that memory is now free to be used by
    another memory allocation. However, the pointer still points to that old memory.
    It’s important to clear the pointer so it isn’t mistakenly used. This is what
    is referred to as a dangling pointer. The practice of checking to see if the pointer
    is not `NULL` before using it paired with the practice of setting a pointer to
    `NULL` or `nil` when the object is deallocated is a “best practice” that should
    be strictly followed.'
  trans: "\n### 释放内存\n\n当程序分配内存时，需要确保在使用完内存后将其释放（或称为解除分配）。再次以之前的例子为例，示例 2 使用`malloc`命令分配了内存。当程序使用完该内存后，需要将其释放。未能释放内存是一种常见的编程错误，并被形象地称为**内存泄漏**。\n\
    \n为了防止内存泄漏（最终会导致程序崩溃），分配的内存必须谨慎管理。代码清单 13–2 展示了示例 2 和示例 3 在正确释放内存时代码应有的样子。\n\n\
    **代码清单 13–2.** *内存分配与释放。*\n\n```\n1   int main(void)\n2   {\n3       char *data2\
    \ = malloc(100);\n4       NSString *myString = [[NSString alloc] init];\n5   \
    \    …  // 标准的“执行操作”省略号\n6       …\n7       free(data2);  // 释放 100 字节\n8    \
    \   data2 = NULL;\n9       [myString release];\n10      myString = nil;\n11  \
    \ }\n```\n\n在代码清单 13–2 中，`data2`在第 3 行被分配。这种分配方式是纯旧式的标准 C 语言，在 Objective-C 程序中并不典型，但了解它仍然非常重要。\n\
    \n第 4 行声明并分配了一个 Objective-C 对象，即`NSString`。\n\n第 7 行释放了第 3 行分配的内存块。\n\n第 8 行将指针设置为`NULL`。这是一个良好的实践，将在下一节中解释。\n\
    \n第 9 行释放了第 4 行分配的对象。`release`消息是一个请求解除分配该对象的消息。之所以`release`消息是*请求*释放内存，这与 Objective-C\
    \ 对象的内存管理机制有关。这种机制被称为**保留/释放模型**，有时也被称为**引用计数**。\n\n**注意：** 在 Xcode 4 之前，保留/释放模型是\
    \ iOS 开发的唯一模型。Xcode 4.2 引入了一个名为自动引用计数（ARC）的选项。ARC 会使编译器自动为你加入保留和释放方法。虽然 ARC 是可选的，但对于在\
    \ Xcode 4.2 中启动的任何新项目，它默认是开启的。打开 Xcode 4.2 之前创建的旧项目仍然可以正常编译，并且 ARC 将被禁用。\n\n尽管\
    \ ARC 是一个不错的特性，但了解底层实际发生的情况仍然非常重要。ARC 不会移除对保留和释放方法的调用，它只是隐藏了实现，就像 Objective-C\
    \ 属性隐藏了 getter 和 setter 方法一样。\n\n引用计数使内存使用更高效一些，因为它允许对象知道何时应该释放内存。这是一种比完全手动管理内存稍好一些的机制。\n\
    \n第 10 行与第 8 行等价。Objective-C 指针*可以*被设置为`NULL`，但将指针设置为`nil`要好得多。在 Objective-C 中，`nil`对象具有特殊含义，实际上可以响应消息。`NULL`不具备同样的特性。\n\
    \n我们再看看如果使用 ARC，这个代码清单会如何变化：\n\n**代码清单 13–3.** *使用 ARC 进行内存分配。*\n\n```\n1   int\
    \ main(void)\n2   {\n3       char *data2 = malloc(100);\n4       NSString *myString\
    \ = [[NSString alloc] init];\n5       …  // 标准的“执行操作”省略号\n6       …\n7       free(data2);\
    \  // 释放 100 字节\n8       data2 = NULL;\n9       myString = nil;\n10   }\n```\n\
    \n代码清单 13–2 和代码清单 13–3 的主要区别在于省略了`[myString release]`。由于使用了 ARC，它会处理内存的释放。\n\n\
    ### 使用特殊指针\n\n正如你所学的，指针只是一个表示内存地址的数字。有两个值得提及的特殊指针。严格来说，它们并非指针，而是代表空指针——即不指向任何内容的指针。这两个指针是`NULL`和`nil`。`NULL`就是零、虚无、什么也没有。由于指针只是表示地址的数字，地址为`0`或`NULL`代表一个逻辑上不指向任何内容的指针。\n\
    \n使用零地址是现代计算机采用的一种约定；计算机不允许任何程序在地址`0`处存储任何东西，这使得使用`NULL`来表示空内存或未使用内存更有意义。了解这一点很重要，因为如果内存分配失败，返回的结果指针就是`NULL`。`NULL`也可以用来指示指针不再有效或只是空了。这对于所有标准\
    \ C 语言都是如此。下面展示了如何使用`NULL`初始化指针：\n\n```\n       char *data = NULL;\n```\n\n它也应像代码清单\
    \ 13–4 中的代码片段那样用于比较。\n\n**代码清单 13–4.** *使用 NULL 验证和清除指针。*\n\n```\n1   char *data\
    \ = malloc(100);\n2   if (data != NULL) {\n3       // 使用该内存。它是有效的。\n4       free\
    \ (data);   // 释放内存，我们已完成使用。\n5       data = NULL;  // 将指针设置为 NULL，表示它已经为空。\n\
    6   }\n```\n\n在代码清单 13–4 中，第 2 行通过用`NULL`检查指针来确保`malloc`函数工作正常。如果指针不是`NULL`，则分配成功，程序可以使用返回的值。然后第\
    \ 4 行释放内存，第 5 行将指针设置为`NULL`，以表示该指针不再指向任何内容。\n\n在处理 Objective-C 对象时，`nil`是 Objective-C\
    \ 中与`NULL`对应的概念。与`NULL`一样，`nil`是一个指向空内容的特殊指针。然而，在 Objective-C 中，`nil`实际上是一个空对象。由于\
    \ Objective-C 大量依赖于向对象发送消息，因此空指针应该能够响应发送给它的消息，即使该指针是空的——`nil`空对象正满足了这一目的。代码清单\
    \ 13–5 是一个类似于标准 C 版本的示例代码片段。\n\n**代码清单 13–5.** *在可能为 nil 的对象上使用属性。*\n\n```\n1\
    \   NSArray *bookList = [bookstore booksOnSale];\n2   for (NSUinteger i=0 i<bookList.count;\
    \ ++i) {\n3       // 如果 bookList 非 nil，for 循环的这部分将会执行。\n4       // 如果 bookList\
    \ 为 nil，则循环的这部分将被跳过。\n5   }\n```\n\n**提示：** 当使用票务比喻来理解已释放的内存时，需要注意一点：如果一张票是指向剧院某个座位的指针，演出结束后会发生什么？票仍然指向那个座位，但它不再有效了；演出已经结束。内存也是如此。如果指针指向的内存被释放了，那么这块内存现在可以自由地用于其他内存分配。然而，指针仍然指向那块旧内存。清除指针很重要，这样它就不会被误用。这就是所谓的悬空指针。在使用指针前检查其是否为非`NULL`，配合上在对象释放时将指针设置为`NULL`或`nil`的做法，是一个应该严格遵守的“最佳实践”。\n"
- fmt: "### Managing Memory in Objective-C with ARC\n\nAs mentioned earlier, `ARC`\
    \ is the new feature that Xcode 4.2 introduced that hides the need for the `retain`/`release`\
    \ model. By default, `ARC` is enabled for any **new** project started in Xcode\
    \ 4.2. Older projects have `ARC` disabled. To enable or disable `ARC`, simply\
    \ look for **automatic reference counting** in the build settings of an Xcode\
    \ 4.2 project, as shown in [Figure 13–10](#Chapter13.html#fig_13_10).\n\n![images](images/1310.jpg)\n\
    \n**Figure 13–10.** *Enabling or disabling ARC in an Xcode 4.2 project.*\n\nWe’re\
    \ going to examine how we can now manage memory in Objective-C, taking advantage\
    \ of the new `ARC` feature.\n\nFirst, `retain`/`release` and `autorelease` (discussed\
    \ later) are no longer valid methods. Under `ARC`, these methods are deprecated.\
    \ This also includes the `release` keyword in a property. Prior to Xcode 4.2,\
    \ it was common to write a property like this:\n\n```\n@property (nonatomic, retain)\
    \ NSString *name;\n```\n\nNow with Xcode 4.2, this changes a little bit. The property\
    \ is written as:\n\n```\n@property (nonatomic, strong) NSString *name;\n```\n\n\
    The `strong` keyword replaces `retain`; `strong` is used to tell the compiler\
    \ that this object needs to be retained when assigned. Conversely, the compiler\
    \ will know to also release this object when it’s no longer being used or is re-assigned.\n\
    \nHere’s another code example of how an implied `strong` variable is used:\n\n\
    **Listing 13–6.** *Using Automatic Reference Counting.*\n\n```\n1   24 - (id)init\n\
    2   {\n3          self = [super init];\n4          if (self) {\n5            \
    \  self.theBookStore = [[NSMutableArray alloc] init];\n6              Book *newBook\
    \ = [[Book alloc] init];\n7              newBook.title = @\"Objective-C for Absolute\
    \ Beginners\";\n8              newBook.author = @\"Bennett, Fisher and Lees\"\
    ;\n9              newBook.description = @\"iOS Programming made easy.\";\n10 \
    \            [self.theBookStore addObject:newBook];\n11\n12             newBook\
    \ = [[Book alloc] init];\n13             newBook.title = @\"A Farwell To Arms\"\
    ;\n14             newBook.author = @\"Ernest Hemingway\";\n15             newBook.description\
    \ = @\"The story of an affair between an English \"\n16                      \
    \              \"nurse and an American soldier \"\n17                        \
    \            \"on the Italian front \"\n18                                   \
    \ \"during World War I.\";\n19             [self.theBookStore addObject:newBook];\n\
    20             newBook = nil;                                   \n21         }\n\
    22\n23         return self;\n24   }\n```\n\nIf we look at [Listing 13–6](#Chapter13.html#list_13_6),\
    \ we can clearly see that a new `Book` object is being allocated on line 6. However,\
    \ where `ARC` comes in play is line 12. Here, we reassign the pointer by allocating\
    \ a new `Book` object. Under the old rules of memory management, we would have\
    \ had to release the old value first, otherwise there would be a memory leak.\
    \ Under `ARC`, the compiler knows to perform a release on the pointer before it\
    \ is reassigned. This is also the case with line 20. Line 20 is actually not needed\
    \ since when the variable goes out of scope, `ARC` would have also auto-released\
    \ it. Assigning it to `nil` is just a more direct way of doing the same thing.\n\
    \nFurther inspection of this source file (`Bookstore.m` from the example in [Chapter\
    \ 8](#Chapter08.html#ch8)) reveals that there is no `dealloc` method. So, the\
    \ `self.theBookStore` variable **without** `ARC` would have caused a memory leak.\
    \ With `ARC`, the programmer doesn’t have to worry about releasing the `self.theBookStore`\
    \ variable because `ARC` does it automatically whenever the `Bookstore` class\
    \ is no longer being used.\n\n### Managing Memory in Objective-C Without ARC\n\
    \nWhile it is recommended to use `ARC` when starting new projects, sometimes there\
    \ is a need to manage an old project that is either earlier than iOS 4 or was\
    \ built with the `retain`/`release` model in place. For these projects, Xcode\
    \ 4 will not automatically convert them over to `ARC`. This section describes\
    \ how to handle a program without `ARC`.\n\nAs mentioned earlier, Objective-C\
    \ handles allocated memory in a slightly different way than most applications\
    \ written in standard C. Recall that the Objective-C system uses something called\
    \ the `retain`/`release` model. With this model, memory that has been allocated\
    \ by an object gets counted every time the application that is interested in the\
    \ memory sends a `retain` message to the object. At various stages of the application,\
    \ the program indicates that it’s finished using the memory and sends a `release`\
    \ message. When the number of releases equals the number of retains, the memory\
    \ associated with the object is finally deallocated. Let’s see how this model\
    \ looks like in practice. [Listing 13–7](#Chapter13.html#list_13_7) is a very\
    \ basic example.\n\n**Listing 13–7.** *Allocating an Objective-C Object.*\n\n\
    ```\n1   int main(void)\n2{   \n3       NSString* myString = [[NSString alloc]\
    \ initWithUTF8String:\"Hello World!\"];\n4       // Code to do something with\
    \ the string...\n5       [myString release];\n6       myString = nil;\n7   }\n\
    ```\n\nIn this example, line 3 allocates a new string object using `alloc`. This\
    \ line is actually very important in this situation; the reason will be explained\
    \ in a bit. So line 3 created the new string. As it’s created, the Objective-C\
    \ system automatically sends a `retain` message to the object. At this point,\
    \ the `myString` variable points to an object that has one `retain` so far.\n\n\
    Line 5 issues a `release` to the `myString` object. The `release` subtracts one\
    \ from the current retain count (which is 1). As mentioned before, once the retain\
    \ count reaches zero, the object is deallocated. So, once line 5 has finished,\
    \ the `myString` variable points to deallocated memory.\n\nLine 6 sets our original\
    \ variable to `nil` to indicate that the pointer is empty."
  raw: '### Managing Memory in Objective-C with ARC


    As mentioned earlier, ARC is the new feature that Xcode 4.2 introduced that hides
    the need for the retain/release model. By default, ARC is enabled for any **new**
    project started in Xcode 4.2\. Older projects have ARC disabled. To enable or
    disable ARC, simply look for **automatic reference counting** in the build settings
    of an Xcode 4.2 project, as shown in [Figure 13–10](#Chapter13.html#fig_13_10).


    ![images](images/1310.jpg)


    **Figure 13–10.** *Enabling or disabling ARC in an Xcode 4.2 project.*


    We’re going to examine how we can now manage memory in Objective-C, taking advantage
    of the new ARC feature.


    First, retain/release and autorelease (discussed later) are no longer valid methods.  Under
    ARC, these methods are deprecated. This also includes the `release` keyword in
    a property. Prior to Xcode 4.2, it was common to write a property like this


    `@property (nonatomic,` **`retain`**`) NSString *name;`


    Now with Xcode 4.2, this changes a little bit. The property is written as


    `@property (nonatomic,` **`strong`**`) NSString *name;`


    The `strong` keyword replaces `retain`; `strong` is used to tell the compiler
    that this object needs to be retained when assigned. Conversely, the compiler
    will know to also release this object when it’s no longer being used or is re-assigned.


    Here’s another code example of how an implied `strong` variable is used:


    **Listing 13–6.** *Using Automatic Reference Counting.*


    `1   24 - (id)init`

    `2   {`

    `3          self = [super init];`

    `4          if (self) {`

    `5              self.theBookStore = [[NSMutableArray alloc] init];`

    `6              Book *newBook = [[Book alloc] init];`

    `7              newBook.title = @"Objective-C for Absolute Beginners";`

    `8              newBook.author = @"Bennett, Fisher and Lees";`

    `9              newBook.description = @"iOS Programming made easy.";`

    `10             [self.theBookStore addObject:newBook];`

    `11`

    `12             newBook = [[Book alloc] init];`

    `13             newBook.title = @"A Farwell To Arms";`

    `14             newBook.author = @"Ernest Hemingway";`

    `15             newBook.description = @"The story of an affair between an English
    "`

    `16                                    "nurse and an American soldier "`

    `17                                    "on the Italian front "`

    `18                                    "during World War I.";`

    `19             [self.theBookStore addObject:newBook];`

    `20             newBook = nil;                                   `

    `21         }`

    `22`

    `23         return self;`

    `24   }`


    If we look at [Listing 13–6](#Chapter13.html#list_13_6), we can clearly see that
    a new `Book` object is being allocated on line 6. However, where ARC comes in
    play is line 12\. Here, we reassign the pointer by allocating a new `Book` object.
    Under the old rules of memory management, we would have had to release the old
    value first, otherwise there would be a memory leak. Under ARC, the compiler knows
    to perform a release on the pointer before it is reassigned. This is also the
    case with line 20\. Line 20 is actually not needed since when the variable goes
    out of scope, ARC would have also auto-released it. Assigning it to `nil` is just
    a more direct way of doing the same thing.


    Further inspection of this source file (*Bookstore.m* from the example in [Chapter
    8](#Chapter08.html#ch8)) reveals that there is no `dealloc` method. So, the `self.theBookStore`
    variable **without** ARC would have caused a memory leak. With ARC, the programmer
    doesn’t have to worry about releasing the `self.theBookStore` variable because
    ARC does it automatically whenever the `Bookstore` class is no longer being used.


    ### Managing Memory in Objective-C Without ARC


    While it is recommended to use ARC when starting new projects, sometimes there
    is a need to manage an old project that is either earlier than iOS 4 or was built
    with the retain/release model in place. For these projects, Xcode 4 will not automatically
    convert them over to ARC. This section describes how to handle a program without
    ARC.


    As mentioned earlier, Objective-C handles allocated memory in a slightly different
    way than most applications written in standard C. Recall that the Objective-C
    system uses something called the retain/release model. With this model, memory
    that has been allocated by an object gets counted every time the application that
    is interested in the memory sends a `retain` message to the object. At various
    stages of the application, the program indicates that it’s finished using the
    memory and sends a `release` message. When the number of releases equal the number
    of retains, the memory associated with the object is finally deallocated. Let’s
    see how this model looks like in practice. [Listing 13–7](#Chapter13.html#list_13_7)
    is a very basic example.


    **Listing 13–7.** *Allocating an Objective-C Object.*


    `1   int main(void)`

    `2{   `

    `3       NSString* myString = [[NSString alloc] initWithUTF8String:“Hello World!”];`

    `4       // Code to do something with the string…`

    `5       [myString release];`

    `6       myString = nil;`

    `7   }`


    In this example, line 3 allocates a new string object using `alloc`. This line
    is actually very important in this situation; the reason will be explained in
    a bit. So line 3 created the new string. As it’s created, the Objective-C system
    automatically sends a `retain` message to the object. At this point, the `myString`
    variable points to an object that has one `retain` so far.


    Line 5 issues a `release` to the `myString` object. The release subtracts one
    from the current retain count (which is 1). As mentioned before, once the retain
    count reaches zero, the object is deallocated. So, once line 5 has finished, the
    `myString` variable points to deallocated memory.


    Line 6 sets our original variable to `nil` to indicate that the pointer is empty.'
