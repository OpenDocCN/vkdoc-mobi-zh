  trans: "\n### 停靠面板\n\n文档窗口可显示视图所包含的所有对象。以下是这些对象的一些示例：\n\n- 按钮\n- 标签\n- 文本字段\n- 网页视图\n\
    - 地图视图\n- iAd\n- 选择器视图\n- 表格视图\n\n**注意：** 您可以展开停靠面板的宽度以查看所有对象的详细列表。请参见图 10–11。为了给画布腾出更多空间，您可以缩小或移除文件列表窗口。\n\
    \n![images](img/1011.jpg)\n\n**图 10–11.** *展开停靠面板宽度，以显示 XIB 文件中所有对象的详细视图。*\n\n\
    ### 资源库\n\n资源库是您可以发挥创造力的地方。它就像一个对象的自助餐，您可以将其拖放到视图窗口中。\n\n- 通过移动窗口分隔条，可以调整资源库窗口的大小。请参见图\
    \ 10–12。\n\n![images](img/1012.jpg)\n\n**图 10–12.** *展开资源库面板以查看更多控件。用鼠标滑动分隔条可调整窗口大小。*\n\
    \n对于 Cocoa Touch 对象，资源库面板分为以下五个部分：\n\n- 控件\n- 数据视图\n- 手势识别器\n- 对象与控制器\n- 窗口与栏\n\
    \n![images](img/1013.jpg)\n\n**图 10–13.** *资源库面板中的各种 Cocoa Touch 对象*\n\n### 检查器面板和选择器栏\n\
    \n检查器面板使您可以更改控件的属性，让对象听从您的指令。检查器面板顶部有六个选项卡。请参见图 10–14。\n\n- 文件检查器\n- 快速帮助检查器\n\
    - 身份检查器\n- 属性检查器\n- 尺寸检查器\n- 连线检查器\n\n![images](img/1014.jpg)\n\n**图 10–14.**\
    \ *身份检查器和选择器栏*\n\n### 创建视图\n\n我们的随机数生成器将在视图中包含三个对象：一个标签和两个按钮。一个按钮将生成种子，另一个按钮将生成随机数，而标签则显示应用生成的随机数。\n\
    \n1. 从资源库面板的“控件”部分将一个标签拖到视图窗口中。\n2. 从资源库窗口将两个圆角矩形按钮拖到视图窗口中。\n3. 点击顶部按钮并将其标记为 **种子随机数生成器**。\n\
    4. 点击底部按钮并将其标记为 **生成随机数**。请参见图 10–15。\n\n   ![images](img/1015.jpg)\n\n   **图\
    \ 10–15.** *在视图中放置对象*\n\n   现在，我们要使用 Xcode 4.2 和 iOS 5 的一个新特性。我们现在能够快速轻松地将我们的\
    \ Outlet 和 Action 连接到代码。Xcode 4.2 甚至更进一步；它会为我们生成部分代码。我们要做的只是拖放操作。\n\n5. 点击屏幕右上角的“辅助编辑器”图标。这将显示我们正在处理的\
    \ XIB 文件的 `.h` 文件。请参见图 10–16。\n\n![images](img/1016.jpg)\n\n**图 10–16.** *使用辅助编辑器同时显示\
    \ .h 文件和 .XIB 文件*\n\n### 使用 Outlet\n\n现在，我们可以通过创建一个 outlet 将标签连接到代码。\n\n1. 为实例变量插入花括号。按住\
    \ Control 键从视图中的标签拖到 `.h` 文件中的花括号内并释放。请参见图 10–17。\n\n   ![images](img/1017.jpg)\n\
    \n   **图 10–17.** *按住 Control 键拖放以创建 randNumber outlet 的代码*\n\n   将会出现一个弹出窗口。这使我们能够命名并指定\
    \ Outlet 的类型。\n\n2. 按照图 10–18 所示完成弹出窗口，然后**按下“连接”按钮**。\n\n   ![images](img/1018.jpg)\n\
    \n   **图 10–18.** *randomNumber Outlet 的弹出窗口*\n\n现在，outlet 的代码已创建，并且该 outlet 已连接到我们\
    \ `.XIB` 文件中的标签对象。第 14 行旁边带有阴影的圆圈表示该 outlet 已连接到 XIB 文件中的一个对象。请参见图 10–19。\n\n\
    ![images](img/1019.jpg)\n\n**图 10–19.** *生成的 outlet 实例变量代码并连接到标签对象。*\n\n提醒一下，outlet（指针）是在对象的接口文件中声明，并连接到特定的实例变量。\n\
    \n还有一个声明您可能觉得陌生，叫做 `IBOutlet`，通常简称为 outlet。**Outlet** 向控制器发出信号，表明此实例变量是一个指向在 Interface\
    \ Builder 中设置的另一个对象的指针。`IBOutlet` 将使 Interface Builder 能够看到该 outlet，并使您能够将变量连接到\
    \ Interface Builder 中的对象。\n\n以墙壁上的电源插座为类比，这些实例变量 outlet 连接到对象。使用 Interface Builder，我们可以将这些实例变量连接到相应的对象。\n\
    \n### 连接 Action 和对象\n\n用户界面对象事件，也称为 Action，会触发方法。\n\n现在我们需要将对象 action 连接到按钮。\n\
    \n1. 按住 Control 键从“种子随机数生成器”按钮拖到最后的花括号下方并释放。按照图 10–20 所示完成弹出窗口，然后**按下“连接”按钮**。确保您将连接类型更改为\
    \ Action，而不是 Outlet。\n\n   ![images](img/1020.jpg)\n\n   **图 10–20.** *为种子方法完成弹出窗口。*\n\
    \n2. 对“生成随机数”按钮重复步骤 8。\n\n![images](img/1021.jpg)\n\n**图 10–21.** *连接到其按钮对象的 Generate\
    \ 和 Seed action*\n\n### 实现文件\n\n剩下的就是在控制器的实现文件中完成我们的 outlet 和 action 的代码。\n\n\
    打开 `ViewController.m` 文件并完成 `seed:` 和 `generate:` 方法。请参见图 10–22。\n\n![images](img/1022.jpg)\n\
    \n**图 10–22.** *seed: 和 generate: 方法已完成。*\n\n有些代码我们需要进一步审视：`randNumber setText:`。方法\
    \ `setText:` 会设置视图中 UILabel 的值。您在 Interface Builder 中从 outlet 到标签对象建立的连接会为您完成所有工作。\n\
    \n就这么简单！\n\n要在 iPhone 模拟器中运行您的 iPhone 应用，请点击“播放”按钮，您的应用应在模拟器中启动。请参见[图 10–23。\n\
    \n![images](img/1023.jpg)\n\n**图 10–23.** *在 iPhone 模拟器中运行的已完成随机数生成器应用*\n\n要为随机函数设定种子，请点击“种子随机数生成器”。要生成随机数，请点击“生成随机数生成器”。\n\
    \n### 总结\n\n做得好！Interface Builder 在创建用户界面时为您节省了大量时间。您拥有强大的一组对象可在应用程序中使用，并且只需编写最少的代码。Interface\
    \ Builder 处理了许多您通常需要自己处理的细节。\n\n您应该熟悉以下术语：\n\n- XIB 文件\n- 模型-视图-控制器 (MVC)\n- 架构模式\n\
    - 人机界面指南 (HIG)\n- Outlet\n- Action\n\n### 练习\n\n- 扩展随机数生成器应用，使其在应用启动时在标签中显示日期和时间。\n\
    - 调整“生成器已设定种子”的日期和时间消息，使其在标签中完美显示。\n- 在显示日期和时间标签后，添加一个按钮以使用新时间更新日期和时间标签。\n\n##\
    \ 第 11 章\n"
- fmt: "## Storing Information\n\nAs a developer, there will be many different situations\
    \ in which you will need to store data. Users will expect your application (app)\
    \ to remember preferences and other information each time they launch it. In previous\
    \ chapters, we discussed the Book Store app. With this app, users will expect\
    \ your application to remember all of the books in the bookstore and have it default\
    \ to a database location. Your application will need a way to store this information,\
    \ retrieve it, and possibly search and sort this data. Working with data can sometimes\
    \ be difficult. Fortunately, Apple has provided methods and frameworks to make\
    \ this process easier.\n\nIn this chapter, we discuss two different formats in\
    \ which data will need to be stored. We will start by discussing saving preferences\
    \ for the Mac and the iPhone, and then move on to using a SQLite database in our\
    \ application that stores and retrieves data.\n\n### Storage Considerations\n\n\
    There are some major storage differences between the Mac and the iPhone, and these\
    \ differences will affect how you work with data. Let’s start by first discussing\
    \ the Mac and how you will need to develop for it.\n\nOn the Mac, by default,\
    \ applications are stored in the Applications folder. Each user has their own\
    \ home folder where preferences and information related to that user are stored.\
    \ Not all of the users will have access to write to the Applications folder or\
    \ to the application bundle itself.\n\nOn the iPhone and iPad, developers do not\
    \ need to deal with different users. Every person who uses the iPhone has the\
    \ same permissions and the same folders. There are some other factors to consider\
    \ with the iPhone, though. Every application on the iPhone is in its own “sand\
    \ box.” This means that files written by an application can only be seen and used\
    \ by that individual application. This makes for a more secure environment for\
    \ the iPhone, but it also presents some changes in the way we work with data storage.\n\
    \n### Databases\n\nWe have discussed how to store some small pieces of information\
    \ and retrieve them at a later point. What if you have more information that needs\
    \ to be stored? What if you need to conduct a search within this information or\
    \ put it in some sort of order? These kinds of situations call for a database.\n\
    \nLet’s start by discussing what a database is. A database is a tool for storing\
    \ a significant amount of information in a way that it can be easily searched\
    \ for or retrieved. When using a database, usually small chunks of the data are\
    \ retrieved at a time rather than the entire file. Many applications you use in\
    \ your daily life are based on databases of some sort. Your online banking application\
    \ retrieves your account activity from a database. Your supermarket uses a database\
    \ to retrieve prices for different items. A simple example of a database is a\
    \ spreadsheet. You may have many columns and many rows in your spreadsheet. The\
    \ columns in your spreadsheet represent different pieces of information you want\
    \ to store. In a database, these are considered attributes. The rows in your spreadsheet\
    \ would be considered different records in your database.\n\n### Storing Information\
    \ in a Database\n\nDatabases are usually an intimidating subject for a developer;\
    \ most developers associate databases with enterprise database servers such as\
    \ Microsoft SQL Server or Oracle. These applications can take time to set up and\
    \ require constant management. For most developers, a database system like Oracle\
    \ would be too much to handle. Luckily, Apple has included a small compact database\
    \ engine called `SQLite` in the Mac, iPhone, and iPad. This allows you to gain\
    \ many of the features of the complex database servers without the overhead.\n\
    \n`SQLite` will provide you with a lot of flexibility in storing information for\
    \ your application. It stores the entire database in a single file. It is fast,\
    \ reliable, and easy to implement in your application. The best thing about the\
    \ `SQLite` database is that there is no need to perform any installation of software;\
    \ Apple has taken care of that for you.\n\nHowever, `SQLite` does have some limitations\
    \ that, as a developer, you should be aware of:\n\n-   `SQLite` was designed to\
    \ be used as a single user database. You will not want to use `SQLite` in an environment\
    \ where more than one person will be accessing the same database. This could lead\
    \ to data loss or corruption.\n-   In the business world, databases can grow to\
    \ become very large. It is not surprising for a database manager to handle databases\
    \ as large as 500GB, and in some cases databases can become much larger than that.\
    \ `SQLite` should be able to handle smaller databases without any issues, but\
    \ you will begin to see performance issues if your database starts to get too\
    \ large.\n-   `SQLite` lacks some of the backup and data restore features of the\
    \ enterprise database solutions.\n\nFor the purposes of this chapter, we will\
    \ focus on using `SQLite` as our database engine. If any of the mentioned limitations\
    \ are present in the application you are developing, you may need to look into\
    \ an enterprise database solution, which is beyond the scope of this book.\n\n\
    **Note:** `SQLite` gets its name from structured query language or `SQL`. `SQL`\
    \ is the language used to enter, search, and retrieve data from a database.\n\n\
    Apple has worked hard to iron out a lot of the challenges of database development.\
    \ As a developer, you will not need to become familiar with `SQL`, as Apple has\
    \ taken care of the direct database interaction for you. Apple has created a framework\
    \ called `Core Data` that makes interacting with the database much easier. `Core\
    \ Data` has been adapted by Apple from a NeXT product called `Enterprise Object\
    \ Framework` and it will handle all of the database interaction for you. Working\
    \ with `Core Data` is a lot easier than interfacing directly with the `SQLite`\
    \ database. Directly accessing a database via `SQL` is beyond the scope of this\
    \ book.\n\n### Getting Started with Core Data\n\nLet’s start by creating a new\
    \ `Core Data` project.\n\n1.  Open Xcode and select **File** ![images](images/U001.jpg)\
    \ **New Project**. To create a Mac OS X `Core Data` project, select Application\
    \ from the left-hand menu. It is located underneath the Mac OS X header. See [Figure\
    \ 11–1](#Chapter11.html#fig_11_1).\n\n    ![images](images/1101.jpg)\n\n    **Figure\
    \ 11–1.** *Creating a new project.*\n\n2.  Click on the Next button when done.\
    \ The next screen will allow you to decide where to save your project and the\
    \ name you want to use. For the purposes of this chapter, we will use the name\
    \ `BookStoreCoreData`.\n3.  Near the bottom, you will see three checkboxes. The\
    \ first check box is labeled Use Core Data. Make sure this is checked and then\
    \ click on Next.\n\n    ![images](images/1102.jpg)\n\n    **Figure 11–2.** *Using\
    \ Core Data.*\n\nOnce you are done with that, your new project will open. It will\
    \ look similar to a standard application, except, now you will have a `BookStoreCoreData.xcdatamodel`.\
    \ This file is called a data model and will contain the information about the\
    \ data that you will be storing in `Core Data`."
