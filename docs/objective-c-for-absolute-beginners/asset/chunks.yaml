    methods that can actually perform some simple operations and return values. These
    methods are called **class methods**. In [Listing 7–1](#Chapter07.html#list_7_1),
    the method names that start with a plus sign (`+`) are class methods—all class
    methods must start with a `+` sign.


    Class methods have limitations. One of their biggest limitations is that none
    of the instance variables can be used. Well, technically, Xcode allows instance
    variables to be coded in a class method. The code will compile with a warning,
    but accessing or using the instance variable does nothing—just don’t do it. Being
    unable to use instance variables makes sense since we haven’t instantiated anything.
    A class method can have its own local variables within the method itself, but
    can’t use any of the variables defined as instance variables.


    A call to a class method would look like this:


    `        [`**`RadioStation`** `minAMFrequency];`


    Notice that the call is very similar to how a message is passed to an instantiated
    object. The big difference is that instead of an instance variable, the *class
    name* itself is used. Class methods are used quite extensively in the Mac OS X
    and iOS frameworks. They are used mostly for returning some fixed or well-known
    type of value, or to return a new instance of an object. These types of class
    methods are sometimes referred to as **factory methods**, since, like factories,
    they create something new; in this case, a new instance of a class. Here’s a factory
    method example:


    `    1.  [NSDate timeIntervalSinceReferenceDate]; // Returns a number`

    `    2.  [NSString stringWithFormat:@"%d", 1000]; // Returns a new NSString object`

    `    3.  [NSDictionary alloc];            // Returns a new uninitialized NSDictionary`

    `        object.`


    All of the preceding messages are class methods being called.


    Line 1 simply returns a value that represents the number of seconds since January
    1, 2001, which is the reference date.


    Line 2 returns a new `NSString` object that has been formatted and has a value
    of `1000`.


    Line 3 is a form that is very commonly used because it actually allocates a new
    object. Typically, the line is not used by itself, but in a line, like this:


    `        myDict = [[NSDictionary alloc] init];`


    The preceding call is a **compound call**. The `[NSDictionary alloc]` class method
    returns a new `NSDictionary` object. The init message is then sent to the NSDictionary
    Object, which is used within a class to initialize itself (e.g., setting up instance
    variables). The `init` function then returns the new object back to the caller.


    So when would you use a class method? As a general rule, if the method returns
    information that is NOT specific to any particular instance of the class, make
    the method a class method.  For example, the `minAMFrequency` in the preceding
    example would be the same for ALL instances of any `RadioStation` object—this
    is a great candidate for a class method.  However, the station’s name or its assigned
    frequency would be different for each instance of the class. These should not
    (and indeed could not) be class methods. The reason for this is that class methods
    cannot use any of the instance variables defined by the class.


    ##### Using Instance Methods


    Instance methods (lines 15–20 in [Listing 7–1](#Chapter07.html#list_7_1)) are
    methods that are only available once a class has been instantiated; for example:


    `1  RadioStation *myStation;             // This declares a variable to hold the
    RadioStation Object.`

    `2  myStation = [[RadioStation alloc] init]; // This creates a new object and
    puts it in my variable.`

    `3  [myStation setFrequency: 104.7];         // This sets the frequency of the
    myStation object.`

    `4  double f = [myStation frequency]           // This instance method returns
    the current frequency.`


    Lines 3 and 4 send a message to the `RadioStation` object; line 3 calls the method
    to set the frequency and line 4 retrieves it. The frequency is stored with the
    object in the `frequency` instance variable. Furthermore, instance methods have
    access to the instance variables defined in the **interface declaration** section
    of the class. All instance methods must start with a hyphen (`-`); this easily
    distinguishes them from class methods, which use a plus (+) sign.'
