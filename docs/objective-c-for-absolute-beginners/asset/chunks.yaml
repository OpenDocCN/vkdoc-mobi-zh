  trans: '

    ### 位（Bits）


    `bit`（位）被定义为计算机用来存储和处理数据的基本信息单位。一个位的值要么是`0`，要么是`1`。在计算机刚问世时，晶体管和微处理器都尚未出现。数据是通过真空管的开启或关闭来操作和存储的。如果真空管开启，位的值为`1`；如果真空管关闭，则值为`0`。计算机能够存储和处理的数据量，直接取决于它拥有多少根真空管。


    第一台被公认的计算机名为“电子数字积分计算机”（ENIAC）。它占地超过 136 平方米，拥有 18,000 根真空管，其性能大约相当于你手中的计算器。


    如今，计算机使用晶体管来存储和处理数据。计算机处理器的性能取决于其芯片或 CPU 上集成了多少个晶体管。与真空管类似，晶体管也有“关闭”或“开启”两种状态。当晶体管关闭时，其值为`0`；当晶体管开启时，其值为`1`。在撰写本文时，iPhone
    5 和 iPad 2 搭载的 A5 处理器采用双核 ARM 架构，集成了超过 2 亿个晶体管，而 iPhone 4 和初代 iPad 中使用的 A4 处理器则有
    1.49 亿个晶体管。参见图 3–1。


    ![images](img/0301.jpg)


    **图 3–1**. *苹果专有的 A5 处理器*


    #### 摩尔定律


    你的 iPhone 或 iPad 处理器上的晶体管数量，直接关系到设备的处理速度、内存容量以及设备内置的传感器（如加速度计、陀螺仪）。晶体管越多，设备性能就越强大。


    1965 年，英特尔联合创始人戈登·E·摩尔描述了处理器中晶体管数量的趋势。他观察到，从 1958 年到 1965 年，处理器中的晶体管数量每 18 个月翻一番，并且很可能会“至少再持续
    18 个月”。这一观察结果后来被广为人知地称为“摩尔定律”，并且在超过 55 年的时间里被证明是准确的。参见图 3–2。


    ![images](img/0302.jpg)


    **图 3–2.** *摩尔定律*


    **注意：** 摩尔定律也有其弊端，你很可能已经在花钱时亲身体验过了。处理能力快速提升带来的问题是它会迅速使技术变得过时。所以，当你 iPhone 的两年合约到期时，市场上的新款
    iPhone 将比你刚签合同时拥有的那台强大一倍。这对大家来说多么方便啊！


    ### 字节（Bytes）


    字节是另一个用于描述计算机信息存储的单位。一个`字节`由 8 个位组成，是一个 2 的整数次幂。一个位最多可以表示两种不同的值，而一个字节最多可以表示 2⁸，即
    256 种不同的值。一个字节可以包含 0 到 255 之间的值。


    **注意：** 在第 13 章中，我们将更详细地讨论二进制（Base-2）、十进制（Base-10）和十六进制（Base-16）数字系统。然而，为了理解数据类型，本章有必要先对这些系统进行介绍。


    `二进制`数字系统表示数字符号 0 和 1。为了说明`71`这个数字如何在二进制中表示，我们将使用一个简单的 8 位（1 字节）表格，其中每个位都表示为 2
    的幂次。要将字节值`01000111`转换为十进制，只需将值为 1 的位相加即可。参见表 3–1。


    ![images](img/t0301.jpg)


    要将数字`22`表示为二进制，就开启那些加起来等于 22 的位，即`00010110`。参见表 3–2。


    ![images](img/t0302.jpg)


    要将数字`255`表示为二进制，就开启那些加起来等于 255 的位，即`11111111`。参见表 3–3。


    ![images](img/t0303.jpg)


    要将数字`0`表示为二进制，就开启那些加起来等于 0 的位，即`00000000`。参见表 3–4。


    ![images](img/t0304.jpg)


    ### 十六进制（Hexadecimal）


    通常，有必要用计算机能够识别的另一种格式（即十六进制格式）来表示字符。在调试应用时，你会遇到十六进制数。`十六进制`系统是基数为 16 的数字系统。它使用
    16 个不同的符号，0–9 表示零到九的值，A、B、C、D、E、F 表示十到十五的值。例如，十六进制数`2AF3`等于十进制中的 (2 × 16³) + (10
    × 16²) + (15 × 16¹) + (3 × 16⁰)，即 10,995。图 3–3 展示了 ASCII 字符表。由于 1 字节可以表示 256 个字符，这对于西方字符来说效果很好。例如，十六进制`20`表示一个空格。十六进制`7D`表示“}”。


    ![images](img/0303.jpg)


    **图 3–3.** *ASCII 字符*


    ### Unicode


    用字节来表示字符在计算机领域一直运行良好，直到大约 20 世纪 90 年代，个人电脑在拥有超过 256 个字符的非西方国家得到广泛应用。Unicode 不是使用
    1 字节字符集，而是最多可以使用 4 字节字符集。


    为了促进更快的采用，前 256 个码点与 ASCII 字符表保持一致。Unicode 可以有多种字符编码。西方文本最常用的编码叫做`UTF-8`。作为一名
    iPhone 开发者，你可能会最常使用这种字符编码。


    ## 数据类型（Data Types）


    既然我们已经讨论了计算机如何处理数据，接下来需要介绍一个非常重要的概念——`数据类型`。人类通常只需查看数据及其使用上下文，就能判断出数据的类型以及它将如何被使用。计算机则需要被告知如何做到这一点。程序员需要告诉计算机它所接收的数据类型。例如：


    `2 + 2 = 4`。


    计算机需要知道你是想将两个数字相加。在这个例子中，它们是整数。你可能起初会认为，即使是最不经意的观察者也能看出这些数字相加的结果，更不用说一台复杂的计算机了。然而，iPhone
    应用的用户通常会将数据存储为一系列字符，而非一个计算结果。例如，一条短信可能这样写：


    `"Everyone knows that 2 + 2 = 4".`


    在这种情况下，我们在一个被称为`字符串`的字符序列中使用了之前的例子。`数据类型`仅仅是对我们程序的声明，用于定义我们想要存储的数据。`变量`用于存储我们的数据，并在声明时附带一个相关的数据类型。所有数据都存储在变量中，并且变量必须有变量类型。例如，在
    Objective-C 中，以下是带有其相关数据类型的变量声明。


    ```

    int x = 10;

    int y = 2;

    int z = 0;

    char prefix = ''c'';

    NSString *submarineName  = @"USS Nevada SSBN-733";

    ```


    数据类型不能相互混合。你不能执行以下操作：


    ```

    z = x + submarineName;

    ```


    混合数据类型会导致编译器警告或编译器错误，你的应用将无法运行。


    你在程序中使用的大部分数据可以分为三种类型：布尔值（Booleans）、数字（numbers）和对象（objects）。在本章的其余部分，我们将讨论如何处理数字和对象数据类型。在第
    4 章中，当我们编写具有决策功能的应用时，将进一步讨论布尔数据类型。


    **注意：** 本地化你的应用是指编写应用的过程，以便用户能够用他们的母语购买和使用它。这个过程对于本书来说过于高级，但如果你从一开始就做好规划，这是个很容易完成的任务。本地化你的应用，无需为每种语言重写，就能极大地扩展应用的潜在客户总数和收入。请务必本地化你的应用。这并不难，而且可以轻易使购买你应用的人数翻倍甚至翻三倍。

    '
- fmt: '### Using Variable and Data Types with Alice


    Now that we have learned about data types, let’s write an Alice app that adds
    two numbers and displays the sum using an object and methods.


    1. Open Alice and select **File** ![images](images/U001.jpg) **New World**.

    2. Select the Grass template and click Open. See [Figure 3–4](#Chapter03.html#fig_3_4).


    ![images](images/0304.jpg)


    **Figure 3–4.** *Choosing the Grass template*


    Next, we need to make our variables and select the data types.


    3. **Click and drag the local tile** on the top right of your editor.

    4. Name your first variable `firstNumber` and define the variable, as shown in
    [Figure 3–5](#Chapter03.html#fig_3_5).

    5. The variable’s data type is an integer. It is initialized with the value of
    2.


    ![images](images/0305.jpg)


    **Figure 3–5.** *Creating a new local variable*


    It is always good programming practice to initialize our variables when they are
    declared.


    6. Create another local variable called `secondNumber`, as shown in [Figure 3–6](#Chapter03.html#fig_3_6)
    and as done in step 5. The variable’s data type is an integer and is initialized
    with the value of 3.


    ![images](images/0306.jpg)


    **Figure 3–6.** *Creating a second local variable*


    7. Create another local variable called `totalSum`, as shown in [Figure 3–7](#Chapter03.html#fig_3_7)
    and as done in step 5. The variable’s data type is an integer and is initialized
    with the value of 0. This local variable will eventually hold the sum of `firstNumber`
    and `secondNumber`.


    ![images](images/0307.jpg)


    **Figure 3–7.** *Creating the variable totalSum*


    8. Add your two variables together. Drag the `totalSum` tile to the last row.
    Right now, 0 is assigned to the local variable `totalSum`. Click on the 0 and
    assign `firstNumber` to `totalSum`. See [Figure 3–8](#Chapter03.html#fig_3_8).


    ![images](images/0308.jpg)


    **Figure 3–8.** *Creating the variable totalSum*


    9. Now that `firstNumber` is assigned to `totalSum`, click on the `firstNumber`
    tile.

    10. Select `secondNumber` to add to `firstNumber`. See [Figure 3–9](#Chapter03.html#fig_3_9).


    ![images](images/0309.jpg)


    **Figure 3–9.** *Setting the value to math expressions*


    11. `totalNumber` is now assigned to the total of `firstNumber` and `secondNumber`.
    See [Figure 3–10](#Chapter03.html#fig_3_10).


    ![images](images/0310.jpg)


    **Figure 3–10.** *Selecting totalSum*


    Now we need to add a character to our world to display our total.


    12. Click on Edit Scene and then add any object of your choosing from the Object
    Gallery at the bottom of the screen. We have selected a bunny. See [Figure 3–11](#Chapter03.html#fig_3_11).


    ![images](images/0311.jpg)


    **Figure 3–11.** *Adding a bunny to our world*


    We need to declare a variable of type String. The variable will hold the string,
    “The sum of 2 + 3 is:5”.


    13. Click “Edit Code” in the bottom right of the scene to go back to our Editor.

    14. Select the Bunny instance. From the Procedures Tab, drag the `this.bunny say
    text:???` procedure tile to the editor. See [Figure 3–12](#Chapter03.html#fig_3_12).


    ![images](images/0312.jpg)


    **Figure 3–12.** *Adding the procedure (method) say to the editor*


    15. Click on Custom TextString and enter the string “The sum of 2 + 3 is:” as
    the parameter value. See [Figure 3–13](#Chapter03.html#fig_3_13).


    ![images](images/0313.jpg)


    **Figure 3–13.** *Entering the string parameter*


    16. Click OK and then click on the first parameter for the `say` procedure. Append
    the `totalSum` to our first parameter String. See [Figure 3–14](#Chapter03.html#fig_3_14).


    ![images](images/0314.jpg)


    **Figure 3–14.** *Adding the totalNumber to our customized string to display to
    the user*


    Alice did something very nice for us in the last step. It automatically converted
    the data type `totalSum` from an integer to a string when it appended its value
    to the “The sum of 2 + 3 is:”. We will learn how to do this using Objective-C.


    You can run the program now and will notice the customized string doesn’t display
    for very long.


    To increase the display time of our customized string, click on the option for
    a second parameter of the `say` procedure and change the duration to 2 seconds
    or any other value you like. See [Figure 3–15](#Chapter03.html#fig_3_15).


    ![images](images/0315.jpg)


    **Figure 3–15.** *The editor section*


    17. Press the play button and if you’ve done everything correctly, your app should
    look like [Figure 3–16](#Chapter03.html#fig_3_16) when it runs.


    ![images](images/0316.jpg)


    **Figure 3–16.** *The app has run successfully!*'
