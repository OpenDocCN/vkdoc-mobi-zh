- fmt: '# Modifying the `MasterViewController`


    Our simple application has two view controllers, the main view controller, which
    is called the `MasterViewController`, and a secondary one called the `DetailViewController`.
    View controllers are objects that simply control the behavior of a view. In order
    for our application to start displaying data from our data model, we need to first
    modify the `MasterViewController`—this is where the navigation of our application
    begins. The following code is already in place in the template that Xcode has
    provided. We''re just going to modify it to add in our data model.


    First, we''ll need to modify the `MasterViewController.h` file. We need to add
    in an instance variable to hold the `Bookstore` object. [Listing 8-18](#Chapter08.html#list_8_18)
    shows that the instance variable is added in as a property on line #17. Also note
    that there is what''s called a *forward reference* on line #12. This doesn''t
    define the `Bookstore` class, it just tells the compiler that there will be a
    `Bookstore` object defined at some point. This prevents line #17 from generating
    an error because the compiler doesn''t know about the `Bookstore` object.


    **Listing 8-18.** *Adding in our `Bookstore` object.*


    ```

     1  //

     2  //  MasterViewController.h

     3  //  MyBookstore

     4  //  

     5  //  Created by M.R. Fisher on 8/28/11.

     6  //  Copyright (c) 2011 www.committed-code.com. All rights reserved.

     7  //  

     8

     9  #import <UIKit/UIKit.h>

    10

    11  @class DetailViewController;

    12  @class Bookstore;

    13

    14  @interface MasterViewController : UITableViewController

    15

    16  @property (strong, nonatomic) DetailViewController *detailViewController;

    17  @property (strong, nonatomic) Bookstore *myBookStore;

    18

    19  @end

    ```


    Next, we need to modify the `MasterViewController.m` implementation file to actually
    make use of the object. First, we need to let the `MasterViewController` know
    about our `Bookstore` class. We do this by importing the header file on line #13,
    as shown in [Listing 8-19](#Chapter08.html#list_8_19).


    Line #18 is the `@synthesize` of our `myBookStore` property we declared earlier.
    Line #25 allocates a new `Bookstore` object and assigns it to our property. The
    best place to put one-time initializations like our books store is in the `initWithNibName:bundle:`
    method. This method is only called once when this class is loaded.


    **Listing 8-19.** *Allocating our `Bookstore` object.*


    ```

     1  //

     2  //  MasterViewController.m

     3  //  MyBookstore

     4  //

     5  //  Created by M.R. Fisher on 8/28/11.

     6  //  Copyright (c) 2011 www.committed-code.com. All rights reserved.

     7  //

     8

     9  #import "MasterViewController.h"

    10

    11  #import "DetailViewController.h"

    12  #import "Book.h"

    13  #import "Bookstore.h"

    14

    15  @implementation MasterViewController

    16

    17  @synthesize detailViewController = _detailViewController;

    18  @synthesize myBookStore;

    19

    20  - (id)initWithNibName:(NSString *)nibNameOrNil bundle:(NSBundle *)nibBundleOrNil

    21  {

    22      self = [super initWithNibName:nibNameOrNil bundle:nibBundleOrNil];

    23      if (self) {

    24          self.title = NSLocalizedString(@"Master", @"Master");

    25          self.myBookStore = [[Bookstore alloc] init];  

    26      }                                      

    27      return self;

    28  }

    ```


    OK, now that our `Bookstore` object is initialized, we need to tell the `MasterViewController`
    how to display our list of books—not the detail, just the book titles. To do this,
    we''ll need to modify a few methods. Fortunately, Xcode has provided a nice template
    so our modifications are small.


    Our `MasterViewController` is a subclass of what''s called a `UITableViewController`.
    This class controls the displaying of rows of data to the screen. In our case,
    these are rows of book titles (well, just two for our simple program, but a list
    nonetheless).


    There are three main methods that control what and how data is displayed in a
    `UITableViewController`.


    *   The first is `numberOfSectionsInTableView:`. Since our application only has
    one list, or section, this method returns 1.

    *   The second is `tableView:numberOfRowsInSection:`. In our program, we return
    the number of books in our bookstore array. Since this is the only section, the
    code is very straightforward.

    *   The third method is `tableView:cellForRowAtIndexPath:`. This method is called
    for each row that is to be displayed on the screen, and it''s called one row at
    a time.


    [Listing 8–20](#Chapter08.html#list_8_20) details the changes we need to make
    in order to get our list of books displaying on the view. The changes start at
    line 83 in the source file.


    **Listing 8-20.** *Setting up the view to display our books.*


    ```

    83  - (NSInteger)tableView:(UITableView *)tableView

    84  numberOfRowsInSection:(NSInteger)section

    85  {

    86      return self.myBookStore.count;

    87  }

    88  

    89  // Customize the appearance of table view cells.

    90  - (UITableViewCell *)tableView:(UITableView *)tableView  

    91           cellForRowAtIndexPath:(NSIndexPath *)indexPath

    92  {

    93      static NSString *CellIdentifier = @"Cell";

    94

    95      UITableViewCell *cell =

    96         [tableView dequeueReusableCellWithIdentifier:CellIdentifier];

    97      if (cell == nil) {

    98          cell = [[UITableViewCell alloc] initWithStyle:UITableViewCellStyleDefault

    99                                        reuseIdentifier:CellIdentifier];

    100          cell.accessoryType = UITableViewCellAccessoryDisclosureIndicator;

    101      }

    102

    103      // Configure the cell.

    104      cell.textLabel.text = [self.myBookStore bookAtIndex:indexPath.row].title;

    105      return cell;

    106  }

    ```


    Out of all of this code, we only need to modify two lines. Everything else can
    stay the way it is. This is one of the advantages of using the Xcode templates.
    Line #86 used to simply return 1; we need to change it so that it now returns
    the count of items in our `Bookstore` class.


    Line #104 looks a little more complicated. Basically, each line of the `UITableView`
    is what is called a cell (a `UITableViewCell` to be specific). Line #104 sets
    the text of the cell to the title of a book. Let''s look at that code a little
    more specifically:


    ```

    [self.myBookStore bookAtIndex:indexPath.row].title;

    ```


    First, `self.myBookStore` is our `Bookstore` object, which is pretty clear. We''re
    calling one of its methods called `bookAtIndex:`. The value `indexPath.row` specifies
    which row we''re interested in—the `indexPath.row` will always be one less than
    the total count (returned on Line #86). So, calling `[self.myBookStore bookAtIndex:indexPath.row]`
    returns a `Book` object. The last part, `.title`, accesses the title property
    from the returned `Book` object. The code below is equivalent to what we just
    did in one line:


    ```

    1  Book *book;

    2  book = [self.myBookStore bookAtIndex:indexPath.row];

    3  cell.textLabel.text = book.title;

    ```


    Now, you should be able to build and run the application and see the two books
    we created in our data model, as shown in [Figure 8–15](#Chapter08.html#fig_8_15).


    But, we''re not done yet. We need to make the application display our book when
    we click on one of them. In order to make this happen, we need to make one last
    modification to the `MasterViewController`.


    The method `tableView:didSelectRowAtIndexPath:` is called whenever a row is touched
    on the screen. The method is already there as part of our template, but it doesn''t
    do anything with our book. [Listing 8-21](#Chapter08.html#list_8_21) shows what
    small changes we need to make in order to hook up the detail view with our book
    data.


    ![images](images/0815.jpg)


    **Figure 8–15.** *Running the application for the first time.*


    **Listing 8-21.** *Selecting the book when touched.*'
