  trans: "\n### 模型\n\n如果你点击文件夹旁边的三角形，会看到一个名为 `BookStoreCoreData.xcdatamodel` 的文件。该文件将包含你要存储在数据库中的数据信息。点击这个模型文件，它就会打开。你将看到一个类似于图\
    \ 11-3 所示的窗口。\n\n![images](img/1103.jpg)\n\n**图 11-3.** *空白的模型。*\n\n窗口分为四个部分。左侧是你的实体。通俗来说，这些就是你想要存储在数据库中的对象或项目。\n\
    \n右上方的窗口包含属性。属性是关于实体的具体信息。例如，一本书是一个实体，而书的标题就是该实体的一个属性。\n\n**注意：** 在数据库术语中，实体是你的数据表，而实体的属性被称为列。由这些实体创建的对象则被称为行。\n\
    \n右中窗口将显示一个实体的所有关系。关系用于连接一个实体与另一个实体。例如，我们将创建一个 `Book` 实体和一个 `Author` 实体。然后我们会将它们关联起来，使每本书都可以有一个作者。右下方部分涉及获取属性。获取属性超出了本书的讨论范围，但它们允许你为数据创建过滤器。\n\
    \n让我们创建一个实体。\n\n1. 点击窗口左下角的加号，或者从菜单中选择 **Editor** ![images](img/U001.jpg) **Add\
    \ Entity**。参见图 11-4。\n\n![images](img/1104.jpg)\n\n**图 11-4.** *添加一个新实体。*\n\n\
    2. 在左侧，你现在可以给这个实体命名。我们将这个实体命名为 `Book`。\n\n**注意：** 通常认为将实体名称首字母大写是一种良好的实践。\n\n\
    3. 现在，让我们添加一些属性。属性可以看作是书籍的详细信息，因此我们将存储书名、作者、价格和出版年份。显然，在你自己的应用程序中，你可能想存储更多信息，比如出版社、页数和体裁，但我们希望从简单的开始。点击窗口右下角的加号，或者选择\
    \ **Editor** ![images](img/U001.jpg) **Add Attribute**，如图 11-5 所示。如果你看不到添加属性的选项，请确保你在左侧已选中了\
    \ `Book` 实体。\n\n![images](img/1105.jpg)\n\n**图 11-5.** *添加一个新属性。*\n\n4. 对于你的属性，你只有两个选项：名称和数据类型。让我们把这个属性命名为\
    \ `title`。与实体不同，属性名称应该使用小写。\n5. 现在，我们需要选择一个数据类型。选择正确的数据类型非常重要。它会影响数据在数据库中的存储和检索方式。列表中共有\
    \ 12 个选项，可能会令人望而生畏。我们将讨论最常见的选项，随着你对 Core Data 越来越熟悉，你可以尝试其他选项。最常见的选项是 `String`、`Integer\
    \ 32`、`Float` 和 `Date`。对于书名，选择 `String`。\n\n> **String**：这是用于存储文本的属性类型。它应该用于存储任何非数字或日期的信息。在此示例中，书名和作者将使用字符串。\n\
    > \n> **Integer 32**：实际上，该属性有三种不同的整数值可选。每种整数类型的区别仅在于其可能的最小值和最大值。`Integer 32` 应该可以满足你存储整数时的大部分需求。整数是不带小数的数字。如果你尝试在小数属性中保存整数，小数部分将被截断。在此示例中，出版年份将是一个整数。\n\
    > \n> **Float**：Float 是一种可以存储带小数的数字的属性类型。Float 类似于 double 属性，但它们在最小值和最大值上有所不同。Float\
    \ 应该能够处理任何数值。在此示例中，我们将使用 Float 来存储书的价格。\n> \n> **Date**：日期属性顾名思义。它允许你存储日期和时间，然后基于这些值执行搜索和查找。在此示例中，我们不会使用此类型。\n\
    \n6. 让我们为这本书创建其余属性。现在，添加 `price`。它应该是 Float 类型。添加书籍的出版年份。对于由两个单词组成的属性，标准做法是第一个单词小写，第二个单词首字母大写。例如，书籍出版年份属性的理想名称可以是\
    \ `yearPublished`。选择 `integer 32` 作为属性类型。添加完所有属性后，你的屏幕应该看起来像图 11-6。\n\n**注意：**\
    \ 属性名称不能包含空格。\n\n![images](img/1106.jpg)\n\n**图 11-6.** *完成后的图书实体。*\n\n**注意：**\
    \ 如果你习惯于使用数据库，你会注意到我们没有添加主键。主键是一个字段（通常是一个数字），用于唯一标识数据库中的每条记录。在 Core Data 数据库中，无需创建主键。框架会为你管理这一切。\n\
    \n现在我们已经完成了 `Book` 实体，让我们添加一个 `Author` 实体。\n\n1. 添加一个新实体，并将其命名为 `Author`。\n2.\
    \ 为该实体添加 `lastName` 和 `firstName`，两者都被视为字符串。\n\n完成后，你的关系窗口中应该有两个实体。现在我们需要添加关系。\n\
    \n1. 点击 `Book` 实体，然后点击并按住屏幕右下角的加号。选择 Add Relationship，如图 11-7 所示。\n\n![images](img/1107.jpg)\n\
    \n**图 11-7.** *添加一个新关系。*\n\n2. 现在，你将有机会命名你的关系。我们通常给关系起一个与其派生来源的实体相同的名称。输入 `author`\
    \ 作为名称，或者从下拉菜单中选择 `Author`。\n3. 现在，我们已经创建了关系的一半。要创建另一半，请点击 `Author` 实体。现在，点击屏幕底部的加号，并选择\
    \ Add Relationship。我们将使用我们正在连接的实体名称作为此关系的名称，因此我们将其命名为 `books`。我们在实体名称后加了一个“s”，因为一个作者可以有多本书。在\
    \ Destination 下，选择 `Book`，在 Inverse 下，选择你在上一步中创建的关系。你的模型现在应该看起来像图 11-8。\n\n**注意：**\
    \ 有时在 Xcode 中处理模型时，需要按 Tab 键来更新实体、属性和关系的名称。这个小怪癖可以追溯到 WebObjects 工具时代。\n\n![images](img/1108.jpg)\n\
    \n**图 11-8.** *最终的关系。*\n"
- fmt: '现在我们需要让代码了解我们的新实体。为此，选中`Book`实体和`Author`实体，然后选择 **Editor** ![images](images/U001.jpg)
    **Create NSManagedObject Subclass**。屏幕应如图 11–9 所示。


    ![images](images/1109.jpg)


    **Figure 11–9.** *Adding the managed objects to your project.*


    选择存储位置并将其添加到项目中。你无需更改此页面上的任何默认设置。然后点击 **Create**。你会注意到项目已添加了四个文件。`Book.h`和`Author.h`包含书籍的头部信息，而`Book.m`和`Author.m`包含实际实现。这些文件相当简单，因为
    Core Data 将负责大部分工作。你还应该注意到，如果返回模型并点击`Book`，它会有一个新类。它将不再是`NSManagedObject`，而是`Book`类。


    让我们看看`Author.h`的部分内容：


    ```

    #import <Foundation/Foundation.h>

    #import <CoreData/CoreData.h>


    @class Book;


    @interface Author : NSManagedObject {

    @private

    }

    @property (nonatomic, retain) NSString * lastName;

    @property (nonatomic, retain) NSString * firstName;

    @property (nonatomic, retain) Book * book;


    @end

    ```


    你会看到文件开头包含了 Core Data 框架。这使得 Core Data 能够管理你的信息。往下看，你会看到你创建的三个属性。


    ### Managed Object Context


    我们创建了一个名为`Book`的托管对象。Xcode 的优点是它会生成必要的代码来管理这些新的数据对象。在 Core Data 中，每个托管对象都应存在于托管对象上下文中。上下文负责跟踪对象的更改、执行撤销操作以及将数据写入数据库。在此示例中，我们无需编写代码来创建或管理对象上下文，但当你探索在自己的项目中使用
    Core Data 时，你需要意识到它的存在。目前，生成的类提供的基本功能已能正常工作。


    ### Setting Up the Interface


    以下步骤将帮助你设置界面：


    1.  在项目的 **Resources** 文件夹中，你应该有一个`MainMenu.xib`。双击此文件，Interface Builder 应在新窗口中打开。在窗口左侧，你应该有一个当前对象列表。如果没有此窗口，请单击窗口左下角的小箭头。单击`Window`对象。你的窗口将显示在屏幕右侧。参见图
    11–10。


    ![images](images/1110.jpg)


    **Figure 11–10.** *Creating the interface.*


    2.  应该有一个空白窗口。为了给窗口添加一些功能，我们需要从对象库中添加一些对象。要查看对象库，请选择 **View** ![images](images/U001.jpg)
    **Utilities** ![images](images/U001.jpg) **Object Library**。对象库将显示所有可以添加到窗口的对象。我们将从添加一个
    Array Controller（数组控制器）开始。在对象库中向下滚动，直到找到 Array Controller。将其拖到窗口左侧的 **Objects**
    窗格。参见图 11–11。


    ![images](images/1111.jpg)


    **Figure 11–11.** *New Array Controller.*


    3.  双击 Array Controller 并输入名称`BookArray`。现在选择 Array Controller 并查看该对象的绑定。


    **NOTE:** 要查看任何对象的绑定，请选择 **View** ![images](images/U001.jpg) **Utilities** ![images](images/U001.jpg)
    **Show Bindings Inspector**，或者如果已打开实用工具窗口，请单击圆形符号。


    4.  在 **Parameters** 下，如果 **managed object context** 部分未展开，请单击其旁边的箭头。现在勾选 **Bind**
    旁边的复选框，并从下拉菜单中选择`Book Store Core Data App Delegate`。

    5.  在 **Model Key Path** 中，输入`managedObjectContext`。这会将我们的 Array Controller 绑定到应用程序的默认`managedObjectContext`。这将允许我们添加、修改和保存书籍。参见图
    11–12。


    ![images](images/1112.jpg)


    **Figure 11–12.** *The Array Bindings Inspector.*


    6.  单击看起来像滑块控件的图标（也称为盾牌）。在 **Object Controller** 标题下，将模式从 **Class** 改为 **Entity
    Name**。输入`Book`作为实体名称。


    ![images](images/1113.jpg)


    **Figure 11–13.** *Assigning the Entity Name.*


    7.  我们需要设置界面。在对象库中，找到一个 Table View（表格视图）对象并将其拖到窗口。你可以轻松移动和调整其大小以符合所需的外观。

    8.  找到两个 Push Button（按钮）并将其拖到窗口。将一个按钮的文本改为`Add`，另一个改为`Delete`。


    **NOTE:** 要更改按钮和许多其他图形对象的文本，只需双击该对象即可输入替换文本。


    更改表格视图中两列的文本。双击列标题，在第一列输入`Title`，在第二列输入`Price`。窗口现在应类似于图 11–14。


    ![images](images/1114.jpg)


    **Figure 11–14.** *The window layout.*


    我们现在有一个漂亮的窗口，但所有控件都还无法执行任何操作。为了使对象有用途，我们需要将它们绑定到某些东西。


    **NOTE:** Cocoa Bindings 是一种使视图与控制器保持同步的方法。它们有助于减少需要编写的代码量。


    要将对象连接到控制器，只需按住 Control 键单击一个项目，然后将其拖动到要连接的项目。将其拖到项目后，将出现一个菜单，其中包含可用的输出口。


    1.  首先，按住 Control 键单击你的 Array Controller 并将其拖动到表格视图。将出现一个小的弹出窗口，其中仅选中了一个输出口。选择`content`。你告诉表格视图它将显示
    Array Controller 的内容。参见图 11–15。


    ![images](images/1115.jpg)


    **Figure 11–15.** *Setting the bindings.*


    2.  现在从 **Add** 按钮按住 Control 键拖动到 Array Controller，并选择`add`。从 **Delete** 按钮按住
    Control 键拖动到 Array Controller，并选择`remove`。


    **NOTE:** 当对象成功连接时，它会闪烁两次以提醒程序员。


    3.  现在我们的界面大部分应该没问题了。我们只需告诉表格视图中的每一列要显示什么。双击第一个单元格，其中显示 **Text Cell**。这将选中该列。

    4.  在 **Bindings** 窗口中，在 **Parameters** 下展开 **Value** 标题。勾选 **Bind to** 旁边的复选框，`Book
    Array`应已被选中。在 **Model Key Path** 下，输入`title`（参见图 11–16）。选择第二列，勾选 **Bind to**，但在
    **Model Key Path** 中输入`price`。


    ![images](images/1116.jpg)


    **Figure 11–16.** *Binding the columns.*


    你应该完成了。单击 **Run**，你应该能够看到新的应用程序窗口。单击 **Add**，它应在表格视图中添加一行。单击列单元格，你可以编辑**Title**
    和 **Price**。你还会注意到，当退出并重新启动应用程序时，它会记住之前存储的值。


    这是一个非常简略的 Mac OS X 和 IOS Core Data 入门介绍。Core Data 是一个功能非常强大的 API，需要花大量时间才能精通。'
  raw: 'Now we need to tell our code about our new entity. To do this, select the
    `Book` entity and the `Author` entity and then select **Editor** ![images](images/U001.jpg)
    **Create NSManagedObject Subclass**. Your screen should look like [Figure 11–9](#Chapter11.html#fig_11_9).


    ![images](images/1109.jpg)


    **Figure 11–9.** *Adding the managed objects to your project.*


    Select the storage location and add it to your project. You should not need to
    change any of the defaults on this page. Then click Create. You will notice that
    four files have been added to your project. Book.h and Author.h contain the header
    information about your book, and Book.m and Author.m contain the actual implementation.
    These files are fairly simple, as Core Data will do most of the work with them.
    You should also notice that, if you go back to your model and click on `Book`,
    it will have a new class. Instead of an `NSManagedObject`, it will have a `Book`
    class.


    Let’s look at the contents of some of Author.h:


    `#import <Foundation/Foundation.h>`

    `#import <CoreData/CoreData.h>`


    `@class Book;`


    `@interface Author : NSManagedObject {`

    `@private`

    `}`

    `@property (nonatomic, retain) NSString * lastName;`

    `@property (nonatomic, retain) NSString * firstName;`

    `@property (nonatomic, retain) Book * book;`


    `@end`


    You will see that the file starts out including the Core Data framework. This
    allows Core Data to manage your information. Further down, you will see the three
    attributes you created.


    #### Managed Object Context


    We have created a managed object called `Book`. The nice thing with Xcode is that
    it will generate the necessary code to manage these new data objects. In Core
    Data, every managed object should exist within a managed object context. The context
    is responsible for tracking changes to objects, carrying out undo operations,
    and writing the data to the database. In this example, we will not have to write
    code to create or manage the object context, but as you explore using Core Data
    in your own projects, you will need to be aware of it. For now, the base functionality
    of what is provided for the generated classes will work fine.


    #### Setting Up the Interface


    The following steps will assist you in setting up your interface:


    1.  In the Resources folder in your project, you should have a MainMenu.xib. Double-click
    on this file and Interface Builder should open in a new window. On the left-hand
    side of the window, you should have a list of current objects. If you do not have
    this window, click on the little arrow at the bottom left-hand side of the window.
    Click on the Window object. Your window will be shown on the right-hand side of
    the screen. See [Figure 11–10](#Chapter11.html#fig_11_10).


    ![images](images/1110.jpg)


    **Figure 11–10.** *Creating the interface.*


    2.  There should be a blank window. In order to add some functionality to our
    window, we are going to need to add some objects from the Object Library. To view
    the Object Library, select **View** ![images](images/U001.jpg) **Utilities** ![images](images/U001.jpg)
    **Object Library**. This Object Library will show you all of the objects you can
    add to your window. We are going to start by adding an Array Controller. In the
    Object Library, scroll down until you find the Array Controller. Drag it to your
    Objects pane on the left-hand side of the window. See [Figure 11–11](#Chapter11.html#fig_11_11).


    ![images](images/1111.jpg)


    **Figure 11–11.** *New Array Controller.*


    3.  Double click on the Array Controller and type in the name, BookArray. Now
    select the Array Controller and look at the bindings for the object.


    **NOTE:** To view the bindings of any object, select **View** ![images](images/U001.jpg)
    **Utilities** ![images](images/U001.jpg) **Show Bindings Inspector**, or if you
    already have the utility window open, click on the circular symbol.


    4.  Under Parameters, if the managed object context portion is not expanded, click
    the arrow next to it. Now check the box next to Bind and select, Book Store Core
    Data App Delegate from the drop down menu.  

    5.  In the Model Key Path, type managedObjectContext. This will bind our Array
    Controller to the default managedObjectContext of our application. This will allow
    us to add, modify, and save our books. See [Figure 11–12](#Chapter11.html#fig_11_12).


    ![images](images/1112.jpg)


    **Figure 11–12.** *The Array Bindings Inspector.*


    6.  Click on the icon that looks like a slider control (it is also referred to
    as a shield). Under the Object Controller heading, change the mode from Class
    to Entity Name. Type Book as the Entity Name.


    ![images](images/1113.jpg)


    **Figure 11–13.** *Assigning the Entity Name.*


    7.  We need to set up our interface. In the Object Library, find a Table View
    object and drag it to your window. You can move it around and size it easily to
    fit your desired look.

    8.  Find two push buttons and drag them to your window. Change the text of one
    of the buttons to Add and the text of the other to Delete.


    **NOTE:** To change the text of a button and many other graphical objects, just
    double click on the object and you can type the replacement text.


    Change the text of each of the two columns in the Table View. Double click on
    the column header and type Title in the first column and Price in the second column.
    Your window should now look something like [Figure 11–14](#Chapter11.html#fig_11_14).


    ![images](images/1114.jpg)


    **Figure 11–14.** *The window layout.*


    We now have a nice looking window, but none of the controls can do anything yet.
    In order to make the objects have a purpose, we will need to bind them to something.


    **NOTE:** Cocoa Bindings is a way to keep your views synchronized with your controller.
    They help to reduce the amount of code required for you to write.


    To connect an object to a controller, you simple have to control click on an item
    and then drag to the item you will connect it to. Once you drag it to the item,
    you will be given a menu of the possible outlets available.


    1.  To start, control-click on your Array Controller and drag it to the table
    view. A little pop over window will appear with only one outlet selected. Select
    content. You are telling the table view that it will display the contents of the
    array controller. See [Figure 11–15](#Chapter11.html#fig_11_15).


    ![images](images/1115.jpg)


    **Figure 11–15.** *Setting the bindings.*


    2.  Now control-drag from the Add button to the array controller and select Add.
    Control-drag from the Delete button to the array controller and select remove.


    **NOTE:** When an object is successfully connected it will blink twice to alert
    the programmer.


    3.  Most of our interface should be good now. We just have to tell each column
    in our Table View what to show. Double click on the first cell where the words
    Text Cell are located. This should select the column.

    4.  In the Bindings window, under Parameters, expand the Value title. Check the
    box next to Bind to and the Book Array should already be selected. Under Model
    Key Path, type the title (See [Figure 11–16](#Chapter11.html#fig_11_16)). Select
    the second column, and check Bind to, but type price in the Model Key Path.


    ![images](images/1116.jpg)


    **Figure 11–16.** *Binding the columns.*


    You should be done. Click on Run and you should be able to see your new application
    window. Click on Add and it should add a row to the Table View. Click in the Column
    cell and you can edit the Title and the Price. You will also notice that when
    you quit and relaunch your application, it will remember the values you stored
    in there before.


    This is a very cursory introduction to Core Data for Mac OS X and IOS. Core Data
    is a very powerful API and can take a lot of time to master.'
