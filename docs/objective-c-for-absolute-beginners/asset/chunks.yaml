  raw: '### Putting the “Objective” into Objective-C


    The majority of what makes Objective-C, well, objective, is its basis in Smalltalk.
    Smalltalk is a 100 percent object-oriented language and Objective-C borrows heavily
    from Smalltalk concepts and syntax. Here are a few of the high-level concepts
    borrowed from Smalltalk. Don’t worry if some of these terms seem unfamiliar; they
    will be discussed in later chapters ([Chapters 7](#Chapter07.html#ch7) and [8](#Chapter08.html#ch8)
    cover the basics).


    *   Pretty much everything is an **object**.

    *   Objects receive **messages**. In this context, the object is sometimes known
    as the **receiver** since it is receiving the message.

    *   Objects contain **instance** variables.

    *   Objects and instance variables have a defined **scope**.

    *   Classes hide an object’s **implementation**.


    **NOTE:** As we saw in [Chapter 5](#Chapter05.html#ch5), the term **class** is
    used to represent, generically, the definition or type of an object. An **object**
    is what is created from the class. For example, an SUV is a *class* of vehicle.
    A class is a blueprint of sorts. A factory builds SUVs. The results are SUV objects
    that people drive. You can’t drive a *class*, but you can drive an *object* built
    from a class.


    So how do these concepts translate to Objective-C? Well, for starters, an object
    in Objective-C is defined using two different sections, `@interface` and `@implementation`.
    The `@interface` section defines what messages the object can respond to and any
    instance variables the object will be using. The `@implementation` section contains
    the actual code of the various messages from the `@interface` section.


    Why is there a split between the interface and implementation? Well, an Objective-C
    object is defined only once within a program. However, it might be used in many
    different areas of that program. Where the object is used, the program simply
    reads in, or **imports**, the interface; it would be inefficient if the code for
    that object needed to be replicated every time it was used.


    **NOTE:** It is a common convention to have an object’s interface stored in an
    `.h` file and the implementation stored in an `.m` file. Both files are named
    after the object. So, if a `Library` object is to be defined, its interface would
    be in *Library.h* and its implementation would be in *Library.m* (remember that
    names are case-sensitive).


    Let’s look at a simple example of the complete definition of an Objective-C object
    called `HelloWorld`. Following is the interface file (*HelloWorld.h*).


    ![images](images/U0602.jpg)


    And this is the implementation file (*HelloWorld.m*):


    ![images](images/U0603.jpg)


    In the preceding example, an object, `HelloWorld`, is being defined. This object
    only has one message defined—`printGreeting`. What do all these strange symbols
    mean? Using the line numbers as a reference, we can review this code line by line.


    Line 1 contains a compiler directive, `#import <Foundation/Foundation.h>`. In
    order for this little program to know about certain other objects (for example,
    the `NSObject` on line 3), we need to have the compiler read other interface files.
    In this case, the *Foundation.h* file defines the objects and interfaces to the
    **Foundation framework**. This framework contains the definition of most non–user-interface
    base classes of the iOS and Mac OS X systems. What is important here is that we
    have a definition to the `NSObject` object. The actual start of our object is
    on line 3, as follows.


    `@interface HelloWorld : NSObject`


    `HelloWorld` is the object, but what does `: NSObject` mean? Well, the colon (`:`)
    after our object’s name indicates we plan to derive additional functionality from
    another class. In this case, `NSObject` is that class. `HelloWorld` is now a *subclass*
    of `NSObject`.


    **NOTE:** Why the name `NSObject` and not just `Object`? Well, do you recall that
    Mac OS X actually started out as a port from the NeXTSTEP system? “NS” is an abbreviation
    for NeXTSTEP and is used in many of the base objects in Mac OS X and iOS— `NSObject`,
    `NSString`, `NSDictionary`, etc.


    Lines 4 and 5 simply contain the `{` and `}` characters. This block is used to
    define instance variables used by the object, but the `HelloWorld` class is simple
    enough that instance variables are not necessary. Later, in [Chapter 9](#Chapter09.html#ch9),
    there will be examples where instance variables are defined and used.


    Line 7 contains a message definition for this object, as follows.


    `- (void)printGreeting;`


    When you’re defining a message, that line must start with either a `+` or `-`
    character. In the case of the `HelloWorld` object, we are using `-` to indicate
    this message can be used *after* the object is created. A `+` character is used
    for messages that can be used *before* the object is created. The remainder of
    the message, `(void) printGreeting`, represents the return value of the message.
    In this case, the value `(void)` is followed by the actual message name, `printGreeting`.


    In line 9, `@end` indicates the definition of the object’s interface is complete.


    That’s the complete description of the interface of the `HelloWorld` object; there’s
    not a whole lot here. More complicated objects simply just have more messages
    and more instance variables.


    For the implementation, the source code is stored in a different file, *HelloWord.m*.
    For starters, line 10 starts with the statement `#import "HelloWorld.h"`. This
    simply allows our object to know its own interface. While the separation of the
    interface and implementation files might seem a little odd at first, this convention
    is very consistent in Objective-C programming. Whenever an object is to be used,
    simply include its interface. Also, the import indicates `"HelloWorld.h"` in quotation
    marks, not `<HelloWorld.h>` alone. What’s the difference? Quite simply, doing
    an import of a file in quotation marks (for example, `"HelloWorld.h"`) indicates
    the compiler is to look in the local project to find the file, whereas the import
    of `<Foundation/Foundation.h>` indicates to the compiler the file is located in
    some global area for *all* projects. The easy way to remember is that if you created
    the file, use the double quotation marks. If not, use the angle brackets (`<`
    and `>`).


    Line 12 is the start of the implementation of the object, as follows.


    `@implementation HelloWorld`


    Line 14 is the definition of the object’s message, `printGreeting`. It looks identical
    to the message definition in the interface file. The only difference here is that
    code is being defined that implements the `printGreeting` message.


    Lines 15–17 form the block of code that implements the message `printGreeting`.
    For this simple message, the function `NSLog` is called. This base-level function
    simply takes in a formatted `NSString` object and outputs the result to the console.
    The `NSString` class is an Objective-C class that implements the behavior of a
    string of characters. Why have a class for this? For one thing, it gives the framework
    a consistent object for representing a string. Plus, there is a lot of functionality
    in `NSString` that can be used to manipulate, compare, and convert the actual
    data.


    The `NSString` object is specified here in a shorthand method. The `@"Hello World!"`
    is a way of quickly declaring an `NSString` object. The at sign (`@`) is the symbol
    used to indicate the string specified is an `NSString` object.


    Line 19 indicates to the compiler the definition of the implementation section
    is finished.


    But wait, there is more. Now that we have a new Objective-C class defined, how
    is it used? Following is another piece of code that uses the newly created class,
    the main program (*myprogram.m*).


    ![images](images/U0604.jpg)'
  trans: '

    ### 将“Objective”注入 Objective-C


    Objective-C 之所以能成为面向对象的语言，很大程度上源于其对 Smalltalk 的借鉴。Smalltalk 是一种百分之百的面向对象语言，而 Objective-C
    大量借用了 Smalltalk 的概念和语法。以下是从 Smalltalk 借鉴的几个高层概念。如果其中某些术语听起来陌生，不必担心；它们将在后续章节中讨论（第
    7 章 和 第 8 章 介绍了基础知识）。


    - 几乎所有事物都是**对象**。

    - 对象会接收**消息**。在此语境下，对象有时也被称为**接收者**，因为它正在接收消息。

    - 对象包含**实例**变量。

    - 对象和实例变量具有定义的**作用域**。

    - 类隐藏了对象的**实现**。


    **注意：** 正如我们在第 5 章中看到的，术语**类**通常用于表示对象的定义或类型。**对象**是由类创建出来的。例如，SUV 是一种*车型*。类就像是某种蓝图。工厂生产
    SUV，产出的就是人们驾驶的 SUV 对象。你无法驾驶一个*类*，但可以驾驶从类构建出的*对象*。


    那么，这些概念是如何转换到 Objective-C 中的呢？首先，Objective-C 中的对象通过两个不同的部分来定义：`@interface` 和 `@implementation`。`@interface`
    部分定义了对象可以响应哪些消息以及对象将使用的实例变量。`@implementation` 部分包含了 `@interface` 部分中各种消息的实际代码。


    为什么接口和实现要分开呢？因为在一个程序中，Objective-C 对象只被定义一次。然而，它可能在程序的许多不同地方被使用。在使用对象的地方，程序只需读入或**导入**接口即可；如果该对象的代码每次使用时都需要复制，那将是低效的。


    **注意：** 通常的惯例是，将对象的接口存储在 `.h` 文件中，实现存储在 `.m` 文件中。两个文件都以对象命名。因此，如果要定义一个 `Library`
    对象，其接口将位于 `Library.h` 中，实现位于 `Library.m` 中（请记住，名称是区分大小写的）。


    接下来，我们看一个简单的例子，这是一个名为 `HelloWorld` 的 Objective-C 对象的完整定义。下面是接口文件（`HelloWorld.h`）。


    ![images](img/U0602.jpg)


    这是实现文件（`HelloWorld.m`）：


    ![images](img/U0603.jpg)


    在上面的例子中，定义了一个名为 `HelloWorld` 的对象。这个对象只定义了一个消息——`printGreeting`。所有这些奇怪的符号是什么意思呢？我们以行号为参考，逐行分析这段代码。


    第 1 行包含一个编译器指令：`#import <Foundation/Foundation.h>`。为了让这个小程序能够识别某些其他对象（例如第 3 行的
    `NSObject`），我们需要让编译器读取其他接口文件。在这里，`Foundation.h` 文件定义了 **Foundation 框架**中的对象和接口。该框架包含了
    iOS 和 Mac OS X 系统中大多数非用户界面的基类定义。这里重要的是，我们有 `NSObject` 对象的定义。我们对象的实际起始位置在第 3 行，如下所示。


    `@interface HelloWorld : NSObject`


    `HelloWorld` 是对象，但 `: NSObject` 是什么意思呢？对象名后的冒号（`:`）表示我们计划从另一个类派生出额外的功能。在这个例子中，`NSObject`
    就是那个类。`HelloWorld` 现在是 `NSObject` 的一个*子类*。


    **注意：** 为什么叫 `NSObject` 而不是 `Object`？你还记得 Mac OS X 实际上是从 NeXTSTEP 系统移植而来的吗？“NS”是
    NeXTSTEP 的缩写，并用于 Mac OS X 和 iOS 的许多基础对象中——例如 `NSObject`、`NSString`、`NSDictionary`
    等。


    第 4 行和第 5 行仅包含 `{` 和 `}` 字符。这个代码块用于定义对象使用的实例变量，但 `HelloWorld` 类足够简单，不需要实例变量。稍后，在第
    9 章中，会有定义和使用实例变量的例子。


    第 7 行包含该对象的一个消息定义，如下所示：


    `- (void)printGreeting;`


    在定义消息时，该行必须以 `+` 或 `-` 字符开头。对于 `HelloWorld` 对象，我们使用 `-` 来表示该消息可以在对象创建*之后*使用。`+`
    字符用于可以在对象创建*之前*使用的消息。消息的其余部分 `(void) printGreeting` 代表消息的返回值。这里，`(void)` 值后面跟着实际的消息名
    `printGreeting`。


    在第 9 行，`@end` 表示对象接口的定义完成。


    以上就是 `HelloWorld` 对象接口的完整描述；内容并不多。更复杂的对象只是拥有更多的消息和更多的实例变量。


    对于实现部分，源代码存储在不同的文件 `HelloWord.m` 中。开头部分，第 10 行以语句 `#import "HelloWorld.h"` 开始。这只是为了让我们的对象知道自己的接口。虽然将接口文件和实现文件分开起初看起来有些奇怪，但这种惯例在
    Objective-C 编程中非常一致。每当要使用一个对象时，只需包含其接口即可。另外，导入时使用了引号括起来的 `"HelloWorld.h"`，而不是单独使用的
    `<HelloWorld.h>`。区别是什么？很简单，使用引号（例如 `"HelloWorld.h"`）导入文件，表示编译器应在本地项目中查找该文件；而使用
    `<Foundation/Foundation.h>` 导入，则表示该文件位于某个全局区域，适用于*所有*项目。记住的简单方法是：如果你创建了该文件，请使用双引号；如果不是，请使用尖括号（`<`
    和 `>`）。


    第 12 行是对象实现的开始，如下所示：


    `@implementation HelloWorld`


    第 14 行是对象消息 `printGreeting` 的定义。它与接口文件中的消息定义看起来完全相同。唯一的区别是，这里定义了实现 `printGreeting`
    消息的代码。


    第 15 行到第 17 行构成了实现 `printGreeting` 消息的代码块。对于这个简单的消息，调用了函数 `NSLog`。这个基础级别的函数接收一个格式化的
    `NSString` 对象，并将结果输出到控制台。`NSString` 类是一个 Objective-C 类，实现了字符串字符的行为。为什么为此专门设计一个类？一方面，它为框架提供了一种表示字符串的一致对象。此外，`NSString`
    中具有大量可用于操作、比较和转换实际数据的功能。


    这里的 `NSString` 对象是以一种简写方式指定的。`@"Hello World!"` 是一种快速声明 `NSString` 对象的方式。at 符号（`@`）用于表示指定的字符串是一个
    `NSString` 对象。


    第 19 行向编译器表示实现部分的定义已完成。


    但等等，还有更多内容。既然我们已经定义了一个新的 Objective-C 类，那么如何使用它呢？下面是另一段代码，展示了如何使用这个新创建的类，这是主程序（`myprogram.m`）。


    ![images](img/U0604.jpg)

    '
- fmt: '在`HelloWorld.h`文件中，程序首先包含了`*HelloWorld.h*`文件，这使得应用程序的这一部分能够访问`HelloWorld`对象。


    在第22行，我们有`main`函数。请记住，每个Objective-C程序都必须有一个`main`函数。


    第24行较为复杂。它定义并**实例化**了`HelloWorld`类。你首先看到文本`HelloWorld* myObject`。这定义了一个名为`myObject`的变量，其类型为`HelloWorld`，即我们的新类。星号（`*`）用于表示一个**指向**对象的**指针**。这种表示法基本上意味着我们不希望对象本身在这里；我们只希望有一种方法可以访问它，或者说一个指向它所在位置的指针。可以这样理解：就像有人给了你一张名片。你拥有名片，而不是实际的人。但名片是一种联系人的方式。


    **注意：** 实例化使得一个类成为计算机内存中的真实对象。类本身在没有实例的情况下是不可用的。以SUV为例，在没有工厂制造（实例化）出SUV之前，SUV毫无意义。只有在那之后，SUV才能被使用。


    该行的下一部分是`[[HelloWorld alloc] init]`。这是一个**嵌套**调用。最内层括号内的指令首先执行，因此`[HelloWorld
    alloc]`是第一个发送的消息。等等，我们从未定义过`alloc`消息，这怎么能行呢？嗯，当`HelloWorld`被定义时，它被定义为`NSObject`的子类。解释这种关系的另一种方式是：`NSObject`是`HelloWorld`的父类。当我们向`HelloWorld`对象发送`alloc`消息时，系统知道`HelloWorld`不认识这条特定的消息，因此它会自动将消息传递给父类；在我们的例子中，父类是`NSObject`类。


    一旦`[HelloWorld alloc]`被调用，返回值是一个指向新分配的`HelloWorld`对象的指针（**分配**意味着我们使用计算机内存的一部分来存储某些内容）。但我们还没有完成。嵌套语句的剩余部分，即`init`消息，接下来被执行：`[[HelloWorld
    alloc] init]`。因此，现在`init`消息被发送给由`[HelloWorld alloc]`创建的新`HelloWorld`对象。`init`只是执行对象的一些基本初始化。这一切的最终返回是一个指向新对象的指针，即指向`HelloWorld`对象的指针。


    **注意：** 在Objective-C中，每当向对象发送消息时，代码必须放在方括号`[`和`]`内。


    既然我们已经创建了一个新对象，就可以使用它了。第25行`[myObject printGreeting]`让我们的对象投入使用。在这段代码中，我们通过向它发送`printGreeting`消息来使用新实例化的对象。程序将输出文本`HelloWorld!`


    第27行向我们的对象发送另一条消息`release`。这条消息告诉系统，该程序已使用完该对象，并释放与其关联的任何系统资源。


    第28行向`main`函数的调用者返回值`0`。这表示执行成功。


    第29行结束代码块和程序。


    **注意：** 消息也可以接受多个参数。例如，考虑`[myCarObject switchRadioBandTo:FM andTuneToFrequncy:104.7];`。这里的消息将是`switchRadioBandTo:andTuneToFrequency:`。在每条冒号之后，当消息实际发送时，会放置参数值。你可能还会注意到，这些消息的命名方式使得解释它们实际做的事情变得容易理解。在开发类时，使用有帮助的消息名称是一个理想的约定，因为这使得类的使用更加直观。在命名消息时保持一致性也至关重要。


    ### 在Xcode中编写另一个程序


    当您首次打开Xcode时，您将看到如[图6-1](#Chapter06.html#fig_6_1)所示的屏幕。


    ![images](images/0601.jpg)


    **图6-1.** *Xcode打开界面*


    [图6-1](#Chapter06.html#fig_6_1)显示了一个在启动Xcode时始终可见的绝佳界面。在您对Xcode更加熟悉之前，请保持选中**Show
    this window when Xcode launches**复选框。此窗口允许您选择最近创建的项目、访问开发者文档（即**Getting started
    with Xcode**图标），并快速链接到Apple的开发者网站。无论选择哪个文档集，它们都为初学者和高级用户提供了丰富的信息。'
  raw: 'In this new file, the program first starts by including the *HelloWorld.h*
    file, which allows this piece of the application access to the `HelloWorld` object.


    In line 22, we have our `main` function. Remember, every Objective-C program must
    have a main function.


    Line 24 is a complicated one. It defines and **instantiates** the `HelloWorld`
    class. You first see the text `HelloWorld* myObject`. This defines a variable
    named `myObject` of the type `HelloWorld`, which is our new class. The asterisk
    (`*`) is used to represent a **pointer** **to** the object. This notation basically
    means we don’t want the object here; we just want a way to get to it or a pointer
    to where it is. Think of this like a person who gives you a business card. You
    have the card, not the actual person. But the business card is a way of getting
    in touch with the person.


    **NOTE:** Instantiation makes a class a real object in the computer’s memory.
    A class by itself is not really usable until there is an instance of it. Using
    the SUV example, an SUV means nothing until a factory builds one (instantiates
    the class). Only then can the SUV be used.


    The next part of the line is `[[HelloWorld alloc] init]`. This is a **nested**
    call. The innermost bracketed instructions are executed first, so [`HelloWorld
    alloc]` is the first message sent. Wait a second; we never defined the message
    `alloc`, so how is this going to work? Well, when `HelloWorld` was defined, it
    was defined as a subclass of `NSObject`. Another way to explain this relationship
    is to say that `NSObject` is the parent class of `HelloWorld`. When we send the
    `alloc` message to the `HelloWorld` object, the system knows that `HelloWorld`
    doesn’t know that particular message, so it automatically passes the message to
    the parent class; in our case, this is the `NSObject` class.


    Once `[HelloWorld alloc]` is called, the return value is a pointer to the newly
    allocated `HelloWorld` object (**allocation** means we use part of the computer’s
    memory to store something). But we’re not done yet. The remaining part of the
    nested statement, the `init` message, gets executed next: `[[HelloWorld alloc]
    init]`. So now the `init` message is sent to the new `HelloWorld` object created
    by `[HelloWorld alloc]`. Now, `init` simply does some base-level initialization
    of the object. The final return from all this is a pointer to the new object,
    which is the `HelloWorld` object.


    **NOTE:** In Objective-C, whenever objects are sent messages, the code must be
    within square brackets, `[` and `]`.


    Now that we’ve created a new object, it can be used. Line 25, `[myObject printGreeting]`,
    puts our object to use. In this piece of code, we use our newly instantiated object
    by sending it a message, `printGreeting`. The program will output the text `HelloWorld!`


    Line 27 sends another message to our object, the `release` message. This message
    tells the system this program is finished using the object and to release any
    system resources associated with it.


    Line 28 returns the value `0` to the caller of our `main` function. This indicates
    a successful execution.


    Line 29 ends the code block and the program.


    **NOTE:** Messages can also accept multiple arguments. Consider, for example,
    `[myCarObject switchRadioBandTo:FM andTuneToFrequncy:104.7];`. The message here
    would be `switchRadioBandTo:andTuneToFrequency`:. After each colon, the argument
    values are placed when a message is actually sent. You might also notice these
    messages are named in such a way as to make interpreting what they actually do
    easy to understand. Using helpful message names is an ideal convention to follow
    when developing classes because it makes using the classes much more intuitive.
    Being consistent in naming messages is also critical.


    ### Writing Another Program in Xcode


    When you first open Xcode, you’ll see the screen shown in [Figure 6–1](#Chapter06.html#fig_6_1).


    ![images](images/0601.jpg)


    **Figure 6–1.** *Xcode opening screen*


    [Figure 6–1](#Chapter06.html#fig_6_1) shows a great screen to always keep visible
    at the launch of Xcode. Until you are more comfortable with Xcode, keep the **Show
    this window when Xcode launches** check box checked. This window allows you to
    select the most recently created projects, access the developer documentation
    (that’s the **Getting started with Xcode** icon), and quickly link to Apple’s
    developer web site. Regardless of which document set is chosen, all have a wealth
    of information for both beginning and advanced users.'
