- fmt: '# Using the Dereference Operator


    Line 9 looked a little different from the other lines, so let’s examine it a little
    closer:


    ```

    letter = *(aPointer + 2);

    ```


    First, let’s consider what’s inside the parentheses:


    `aPointer + 2`


    This should be pretty straightforward: we are adding 2 to the pointer `aPointer`.
    If `aPointer` is 0×1000, the resulting value would be 0×1002. The pointer now
    *points* to the letter “C.” Using a pointer this way is very different from using
    the brackets in lines 8 or 10. We’re manually adjusting the pointer so that it
    results in a new value. Next, we need to ask the computer, “What does the pointer
    point to?” With the array operator on lines 8 and 10 of [Listing 13–1](#Chapter13.html#list_13_1),
    that question is implied, and the program responds. But when we simply change
    an address by adding, subtracting, and so on, the program needs to explicitly
    ask this question. This is where the asterisk (`*`) comes into play.


    Using an asterisk in front of a pointer *dereferences* the address and returns
    what value the pointer is pointing to. So, if our pointer is 0×1000 and the letter
    “A” is stored at 0×1000, we can get to the letter “A” by dereferencing the pointer.
    `*(0×1000)` would return the letter “A” if our example was pointing to real memory
    (don’t actually do this because 0×1000 is not a real address, just an example
    is used to simplify the problem). Remember, a pointer is an address and an address
    is just a number. The asterisk asks the computer to return what’s stored at the
    address rather than to return the address itself.


    **NOTE:** In most common programming, the programmer rarely gets to tell the system,
    for example, at location 0×1000 is our data. The reason for this is that memory
    is **virtualized**. Virtualized memory can allow more memory to be used than is
    physically present on the machine *(virtual memory is out of scope of this book)*.
    Because of this, the operating system manages where the data is stored. As a result,
    the computer tells the program where its memory is, rather than the program telling
    the computer. Regardless, the concept is the same.


    When developing software at the hardware or device driver level, using hard-coded
    addresses is much more common. Typical programs in Mac OS X or iOS will never
    use hard-coded addresses.


    ## Allocating Memory


    In modern operating systems, the program allocates memory, and the operating system
    complies by returning a pointer to the requested memory. In C and Objective-C,
    a **pointer** is declared by preceding the variable name with an asterisk (`*`),
    as shown in the following example:


    ```

    char *theData;

    NSString *theString;

    ```


    Don’t confuse the asterisk here with the ***dereference operator***. Only when
    declaring a variable does the asterisk identify the variable as a pointer.


    Here are some more examples of requesting memory:


    ```

    1. char data1[100];

    2. char *data2 = malloc(100);

    3. NSString *myString = [[NSString alloc] init];

    ```


    In example 1, memory is allocated in the form of an array declaration. The program
    now has an array (`data1`) that **points** to 100 bytes of memory. In C, it’s
    easier to just remember that any variable that is declared as an array is *referenced*
    as a pointer even though it’s not declared as one.


    Example 2 is a little more complex. `data2` is declared as a pointer to a `char`
    data type. A pointer is declared using an asterisk preceding the file. The next
    part of the line is `malloc(100)`, which is a standard C library function call.
    This function allocates the requested amount memory and returns a pointer to it.
    In our example, `malloc` is passed the value `100`. This requests that 100 bytes
    be allocated. When the function returns, `data2` contains a *pointer* to the 100
    bytes of memory.


    Example 3 is a more traditional Objective-C type memory allocation. First, the
    program declares a pointer to an `NSString` class named `myString`. Next, the
    following code is executed: `[[NSString alloc] init]`. This will allocate the
    necessary memory for the object and return a *pointer* to it.


    In all these examples, memory is requested from the operating system and returned
    to the program via a pointer, even in example 1—except example 1 is just a little
    different from the rest.


    ### Working with Automatic Variables and Pointers


    Any variable created within a function or block is considered an **automatic variable**,
    or **auto-variable**. In our previous examples, example 1 allocates 100 characters
    as an array. It does so automatically since, as you learned, all variables are
    auto-variables by default. Because we define all the space up front via an array
    declaration, all this memory is managed automatically for us. Examples 2 and 3
    are also auto-variables, but they allocate just enough space to hold a pointer
    to memory—that’s all. Recall that a pointer is just a variable that holds an address
    to memory; it’s not the memory itself. So, `char* data2` and `NSString *myString`
    are really just variables that hold a number, which represents an address to memory.


    **TIP:** Think of pointers this way: a *pointer* is like a ticket to a concert
    and the allocated memory is like the seat. The ticket has the information on how
    to get to the seat. If the ticket is discarded (or lost), the ability to find
    the seat is also lost. However, the seat (allocated memory) still remains.


    Examples 2 and 3 are auto-variables that hold the “ticket” to the memory, not
    the memory itself (see [Figure 13–9](#Chapter13.html#fig_13_9)). This means that,
    when the function exits and the variables go out of scope, the pointers to the
    memory will be lost; the “ticket” is lost. The problem with this is that the program
    needs to also release, or deallocate, the memory that the pointer points to before
    it is lost. The manually allocated memory does not go out of scope with the pointer;
    allocated memory is global to the program and doesn’t get released until the program
    exits.


    ![images](images/1309.jpg)


    **Figure 13–9.** *A pointer is not the memory itself.*


    What’s very important to remember is that memory that is manually allocated must
    be deallocated at some point, depending on how the memory is used. Some memory
    might be allocated at the start of the program and doesn’t have to be released
    until the program exits. However, the most common memory allocations happen many,
    many times throughout the life program, thus it is critical that the associated
    memory be deallocated as soon as the object is no longer being used. Memory that
    is allocated manually must be deallocated manually. Memory that is allocated automatically
    (i.e., `char array[100];`) is automatically deallocated.'
