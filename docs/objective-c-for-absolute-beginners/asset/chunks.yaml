    \ examples.\n\n**Listing 4–1.** *Pseudo-Code Examples Using Conditional Operators\
    \ in If-Then-Else Code*\n\n```\nint x = 5;\nint y = 6;\nisComplete  =  TRUE;\n\
    if ( x < y)\n{\n//in this example, x is less than 6\n    do stuff;\n}\nelse\n\
    {\n     do other stuff;\n}\n\nif  (isComplete == TRUE)\n{\n//in this example,\
    \ isComplete is equal to TRUE\n     do stuff;\n}\nelse\n{\n     do other stuff;\n\
    }\n//another way to check isComplete == TRUE\nif (isComplete)\n{\n//in this example,\
    \  isComplete is TRUE\n     do stuff;\n}\n//two ways to check if a value is false\n\
    if  (isComplete == FALSE)\n{\n     do stuff;\n}\nelse\n{\n//in this example, isComplete\
    \ is TRUE so the else block will be executed\n}\n//another way to check isComplete\
    \ == FALSE\nif (!isComplete)\n{\n     do stuff;\n}\nelse\n{\n//in this example,\
    \  isComplete is TRUE so the else block will be executed\n}\n```\n\nNote that\
    \ the `!` switches the value of the Boolean it's applied to; so, using `!` makes\
    \ a `TRUE` value into a `FALSE`, and a `FALSE` value into a `TRUE`.\n\nOften,\
    \ it is necessary to combine your comparison tests. A compound relationship test\
    \ is one or more simple relationship tests joined by either the `&&` or the `||`\
    \ (two pipe characters).\n\n`&&` and `||` are verbalized as logical-and and logical-or,\
    \ respectively. Pseudo-code in [Listing 4–2](#Chapter04.html#list_4_2) illustrates\
    \ logical-and and logical-or operators.\n\n**Listing 4–2.** *Using && and || Logical\
    \ Operators*\n\n```\nint x = 5;\nint y = 6;\nisComplete  =  TRUE;\n//using the\
    \ logical and\nif (x < y && isComplete == TRUE)\n{\n//in this example, x is less\
    \ than 6 and isComplete == TRUE\n    do stuff;\n}\nif (x < y || isComplete ==\
    \ FALSE)\n{\n    //in this example, x is less than 6.\n    //Only one operand\
    \ has to be TRUE for an OR to result in a TRUE.\n//See Table 4–2 A OR Truth Table\n\
    \    do stuff;\n}\n//another way to test for TRUE\nif (x < y && isComplete)\n\
    {\n//in this example, x is less than 6 and isComplete == TRUE\n    do stuff;\n\
    }\n//another way to test for FALSE\nif (x < y && !isComplete)\n{\n    do stuff;\n\
    }\nelse\n{\n// isComplete == TRUE\n     do stuff;\n}\n```\n\n### Design Requirements\n\
    \nAs discussed in [Chapter 1](#Chapter01.html#ch1), the most expensive process\
    \ in the software development life cycle is writing code. The least expensive\
    \ process in the software development life cycle is gathering the requirements\
    \ for your application; yet, this latter process is the most overlooked and least\
    \ used in software development.\n\nDesign requirements usually begin by asking\
    \ clients, customers, and/or stakeholders how the application should work and\
    \ what problems it should solve.\n\nWith respect to apps, requirements can include\
    \ long or short narrative descriptions, screen mockups, and formulas. It is far\
    \ easier to open your word processor and change the requirements and screen mockups\
    \ before coding begins than it is to modify an iPhone/iPad/Mac app. The following\
    \ is the design requirement for one view of an iPhone mobile banking app:\n\n\
    *   **View:** Accounts View\n*   **Description:** Displays the list of accounts\
    \ the user has. The list of accounts will be in the following sections: Business\
    \ Accounts, Personal Accounts and Car Loans, IRA, and Home Equity Loans.\n*  \
    \ **Cells**: Each cell will contain the account name, the last four digits of\
    \ the account, available balance, and present balance.\n\nA picture is worth a\
    \ thousand words. Screen mockups are helpful to developers and users because they\
    \ can visualize how the views will look when they are completed. There are many\
    \ tools that can quickly design mockups; one of these tools is OmniGraffle. See\
    \ [Figure 4–1](#Chapter04.html#fig_4_1) for an example of a screen mockup used\
    \ for design requirements generated by OmniGraffle.\n\n![images](images/0401.jpg)\n\
    \n**Figure 4–1.** *Screen mockup for a mobile banking app using OmniGraffle and\
    \ the Ultimate iPhone Stencil Plug-in*\n\nMany developers believe that design\
    \ requirements take too long and are unnecessary. There is a lot of information\
    \ presented on the Accounts screen in [Figure 4–1](#Chapter04.html#fig_4_1). Many\
    \ business rules can determine how information is displayed to the user, along\
    \ with all of the error handling when things go bad. When designing your app,\
    \ working with all the business stakeholders at the beginning of the development\
    \ process is critical to getting it right the first time.\n\n[Figure 4–2](#Chapter04.html#fig_4_2)\
    \ is an example of all stakeholders being involved in your app’s development.\
    \ Having all stakeholders involved in every view from the beginning will eliminate\
    \ multiple rewrites and application bugs.\n\n![images](images/0402.jpg)\n\n**Figure\
    \ 4–2.** *Woodforest Mobile Banking app as it appears on the iTunes Connect app\
    \ store; Compare with the app requirements Accounts screen in [Figure 4–1](#Chapter04.html#fig_4_1).*\n\
    \nAdditionally, Apple recommends that developers spend at least 50% of their development\
    \ time on the user interface’s design and development.\n\nApress’s iPhone and\
    \ iPad Sketch Books are also great tools for laying out your iOS app’s look and\
    \ feel on paper. See [Figure 4–3](#Chapter04.html#fig_4_3).\n\n![images](images/0403.jpg)\n\
    \n**Figure 4–3.** *Apress’s iPhone Sketch Book Stencil and Apress’s iPad Sketch\
    \ Book Stencil*\n\n### Flowcharting\n\nAfter design requirements are finalized,\
    \ you can pseudo-code sections of your app to solve complex development issues.\
    \ **Flowcharting** is a common method of diagramming an algorithm. An algorithm\
    \ is represented as different types of boxes connected by lines and arrows. Developers\
    \ often use flowcharting to express code visually. See [Figure 4–4](#Chapter04.html#fig_4_4).\n\
    \n![images](images/0404.jpg)\n\n**Figure 4–4.** *Sample flowchart showing common\
