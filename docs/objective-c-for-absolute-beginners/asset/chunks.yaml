    ## Chapter 7


    ## **Objective-C Classes, Objects, and Methods**


    If you haven’t already read [Chapter 6](#Chapter06.html#ch6), please do so before
    reading this one, because it provides a great introduction to some of the basics
    of Objective-C. This chapter builds on that foundation a bit more. By the end
    of this chapter, you can expect to have a greater understanding of the Objective-C
    language and how to use the basics to write simple programs. For Mitch personally,
    the best way to learn is to take small programs and write (or rewrite) them in
    Objective-C just to see how the language works.


    This chapter will cover what composes an Objective-C class and how to interact
    with Objective-C objects via methods. We will use a simple radio station class
    as an example of how an Objective-C class is written. This will hopefully impart
    an understanding of how an Objective-C class can be used. This chapter will teach
    you how to formulate a design for objects that are needed to solve a problem.
    We’ll touch on how to create custom objects, as well as how to use existing objects
    provided in the Foundation classes.


    If you’re coming from a C-like language, you’ll find that Objective-C shares several
    similarities. As described in [Chapter 6](#Chapter06.html#ch6), Objective-C’s
    roots are firmly planted in the C language. This chapter will expand on [Chapter
    6](#Chapter06.html#ch6)’s topics and incorporate some of the concepts described
    in [Chapter 8](#Chapter08.html#ch8).


    ### Creating an Objective-C Class


    [Chapter 6](#Chapter06.html#ch6) introduced some of the common elements of the
    Objective-C language, so let’s quickly review them.


    *   An Objective-C class is divided into two parts: a class interface and class
    Implementation.

    *   `@interface`: This keyword is used to define an interface to a new Objective-C
    class. This is written in an `.h` or header file.

    *   **Methods**: These are the blocks of code defined in the `@interface` section
    of a class and implemented in the `@implementation` section in an .m file.

    *   `@implementation`: This keyword is used to define the actual code that implements
    the methods defined in the interface. This is written in an `.m`, or Objective-C
    class file.


    As explained in [Chapter 6](#Chapter06.html#ch6), an Objective-C class consists
    of an interface and a corresponding implementation. For now, let’s concentrate
    on the interface. At the most basic level, the interface of a class tells you
    the name of the class, what class it’s derived from, and what **messages** the
    class understands.  Notice that the word *message* is used here. To communicate
    with an Objective-C object, a program will send the object messages. These messages
    translate directly to code in the implementation file—this implementation code
    is referred to as a method.


    Here is a sample of the first line from a class’s interface:


    `@interface RadioStation : NSObject`


    Here, the class name is `RadioStation`***.*** The colon (`:`) after the class
    name indicates that the class is derived from another class; that is, the `RadioStation`
    object **inherits** functionality from the `NSObject` class. Put another way,
    in our example shown in [Listing 7–1](#Chapter07.html#list_7_1), the `RadioStation`
    class is derived from the `NSObject` class.


    **TIP:** If your object is not inheriting from any other foundation class, *always*
    inherit from `NSObject`; without it, your class will be worthless. `NSObject`
    provides the base functions that make new objects behave correctly.  `NSObject`
    is the base class for all foundation classes.  So, inheriting from any foundation
    class is also fine.


    Once the class name is defined, the rest of the interface file contains the main
    components of the class (see [Listing 7–1](#Chapter07.html#list_7_1)).


    **Listing 7–1.** *An Interface File: `RadioStation.h`*


    ![images](images/U0701.jpg)


    #### Declaring Interfaces and Instance Variables


    An Objective-C class is defined by its **interface**. Since objects, for the most
    part, are communicated with using messages, the interface of an object defines
    what messages the object will respond to. Line #1 imports the Foundation class
    definitions (more on that in a bit). Lines 2–7 start the definition of the class’s
    interface by defining its name (sometimes called the **type**) and the inherited
    class. Next, there is a block, defined within the braces (`{` `}`). This block
    is used to define variables that are used by the *instance* of this class. These
    are called **instance variables**.


    Whenever the `RadioStation` class is instantiated, the resulting `RadioStation`
    object has access to these variables, which are only for specific instances. If
    there are ten `RadioStation` objects, each object has its own variables independent
    of the other objects. This is also referred to as **scope**, in that the object’s
    variables are within the scope of each object.'
