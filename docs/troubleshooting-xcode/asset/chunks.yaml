    \n## 前言\n\n`Xcode 故障排除指南` 是一本面向那些为 iOS 或 OS X 创建应用的人的指南。本书包含了针对棘手问题的解决方案——任何使用\
    \ Xcode 的开发人员迟早都会遇到的问题。\n\nXcode 是 Apple 为开发 iOS 和 OSX 应用而创建的官方工具。然而，该工具的局限性、一些错误以及其令人费解的错误信息，有时使得使用\
    \ Xcode 变得非常困难。\n\n更糟糕的是，一些关键的文档不完整、含糊不清或难以解读。\n\n为了让工作更轻松，作者首先为自己记录下所有这些问题的笔记及其相应的解决方案。一周又一周，一月又一月，多年的笔记积累下来，`Xcode\
    \ 故障排除指南` 就此诞生。\n\n`Xcode 故障排除指南` 还向您展示了如何自动化一些重复性任务，以及如何解决与 iOS 或 OS X 开发相关但位于\
