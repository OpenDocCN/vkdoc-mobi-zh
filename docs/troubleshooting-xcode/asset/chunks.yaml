    \n### Objective-C\n\n```\n#import <Foundation/Foundation.h>\n\n@interface SampleClass\
    \ : NSObject\n\n- (id)init __attribute__((unavailable(\"init is unavailable,\n\
    \                                    use initWithMode\")));\n@end\n```\n\n**注意**\
    \  \n该指令将在编译时产生错误，警告用户不应使用 `init` 方法进行初始化。\n\n## 弃用类中的某个方法\n\n你弃用了类中的一个方法，并希望警告用户更新代码以使用新方法。\n\
    \n你可以简单地为此方法添加这个编译器属性。\n\n### Swift\n\n```\n@available(*, deprecated)\nclass func\
    \ shareWithParams(params: NSDictionary) {\n  // your code...\n}\n```\n\n### Objective-C\n\
    \n```\n#import <Foundation/Foundation.h>\n\n@interface SampleClass : NSObject\n\
    \n+(void)shareWithParams:(NSDictionary *)params\n       __attribute((deprecated(\"\
    use shareWithPars:\n                                instead\")));\n@end\n```\n\
    \n**注意**  \n该编译器属性将在编译时产生错误，警告当前方法已被弃用，应使用其他方法。\n\n## Xcode 出现“沙滩球”现象\n\n当我们试图打开一个前一天还能正常工作的项目时，Xcode\
    \ 是否永远在显示“沙滩球”？\n\n**注意**  \n死亡沙滩球或旋转等待光标是一种彩色的圆形光标类型，形似沙滩球，当应用程序在 Mac OS X 上挂起时，它会取代常规鼠标指针。\n\
    \n事实证明，在 Xcode 偏好设置中禁用源代码控制可以解决此问题（图 23）。\n\n![A978-1-4842-1560-9_1_Fig23_HTML.jpg](img/A978-1-4842-1560-9_1_Fig23_HTML.jpg)\n\
    \n**图 23.** 通过禁用源代码控制解决“沙滩球”问题\n\n**注意**  \n此处描述的源代码控制问题也是导致尝试打开某些项目时 Xcode 崩溃的原因。\n\
    \n## UIButton 未变灰\n\n你正尝试使用以下代码禁用 `UIButton`，但按钮并未变灰。\n\n### Swift\n\n```\nmyButton.enabled\
    \ = false\n```\n\n### Objective-C\n\n```\nmyButton.enabled = NO;\n```\n\n`UIButton`\
    \ 对象在被禁用时不会显示为灰色。你必须强制将其标题设为灰色，以使其看起来像是“已禁用”，可使用如下代码。\n\n### Swift\n\n```\nmyButton.enabled\
    \ = false\nmyButton.setTitleColor(UIColor.grayColor(),\n                     \
    \  forState:UIControlState.Disabled)\n```\n\n### Objective-C\n\n```\nmyButton.enabled\
    \ = NO;\n[myButton setTitleColor:[UIColor grayColor]\n              forState:UIControlStateDisabled];\n\
    ```\n\n## 捕获内存损坏\n\n有些类型的 Bug 简直难以捕获。\n\n你的应用程序崩溃了，情况怪异且难以追踪。\n\n用户开始抱怨，而你无法复现问题。\n\
    \n你的应用程序可能遇到了某种内存损坏问题。\n\n以下是苹果对此的看法。\n\n> Objective-C 和 C 代码容易受到内存损坏问题的影响，例如栈和堆缓冲区溢出以及释放后使用问题。当这些内存违规发生时，你的应用程序可能会不可预测地崩溃或显示异常行为。内存损坏问题难以追踪，因为崩溃和异常行为通常难以复现，并且原因可能远离问题的源头。\n\
    \n更多信息，请访问 [`http://addfone.com/TXSanitizer`](http://addfone.com/TXSanitizer)\n\
    \n### Sanitizer（地址清理器）\n\nXcode 7 附带一个名为 Address Sanitizer 的选项，该选项会在应用程序中生成额外代码，通过指针检查每次读取和写入，如果内存中的某个地址被损坏，则会发出警告。\n\
    \n要启用此选项，请选择 Product ➤ Scheme ➤ Edit Scheme ➤ Diagnostics，然后勾选 **Enable Address\
    \ Sanitizer**（图 24）。\n\n![A978-1-4842-1560-9_1_Fig24_HTML.jpg](img/A978-1-4842-1560-9_1_Fig24_HTML.jpg)\n\
    \n**图 24.** Xcode 7 Address Sanitizer\n\n启用 Address Sanitizer 后运行你的应用程序，直到它崩溃。崩溃现在将产生丰富的错误信息，为你提供问题的线索。\n\
    \n你的用户将停止抱怨。\n\n**注意**  \nAddress Sanitizer 可能会带来显著的开销，并将你的代码速度降低至少一半。\n\n## SpriteKit\
    \ 在 didBeginContact 时崩溃\n\n> spritekit 断言失败： (typeA == b2_dynamicBody || typeB\
    \ == b2_dynamicBody)，函数 SolveTOI\n\n每次两个物体碰撞时，都会调用 `SpriteKit’s didBeginContact:`\
    \ 方法。在此方法运行期间，SpriteKit 期望至少其中一个碰撞物体是动态的（`physicsBody.dynamic = YES`）。如果其中一个物体在\
    \ `didBeginContact:` 运行时从动态变为静态，SpriteKit 将会崩溃。\n\n防止崩溃的一种解决方法是操作临时变量，而不是直接操作\
    \ `dynamic` 属性本身。请参考以下代码。\n\n### Swift\n\n```\nlet tempBody = self.physicsBody\n\
    tempBody!.dynamic = false\nself.physicsBody = tempBody\n```\n\n### Objective-C\n\
    \n```\nSKPhysicsBody *tempBody = node.physicsBody;\ntempBody.dynamic = NO;\nnode.physicsBody\
    \ = tempBody;\n```\n\n**注意**  \n此解决方案仅用于确认问题。你必须检查代码，防止在 `didBeginContact:` 期间将两个\
    \ `physicsBody` 的属性都改为静态。\n\n如果你的 `physicsBody` 属于一个已被缩放过的节点，此解决方案将无法正常工作。在这种情况下，当你将\
    \ `tempBody` 重新赋值给该对象时，它会创建一个未缩放的 `physicsBody`。\n\n## SpriteKit 对象不遵守边界？\n\n\
    你的 SpriteKit 对象使用路径作为其 `physicsBody` 边界，但这些对象不遵守其他对象的边缘/边界。\n\nSpriteKit 对象使用的所有路径必须是凸的，并且应使用按逆时针顺序绘制的顶点创建（图\
    \ 25）。\n\n![A978-1-4842-1560-9_1_Fig25_HTML.jpg](img/A978-1-4842-1560-9_1_Fig25_HTML.jpg)\n\
    \n**图 25.** 按正确顺序绘制的凸形状\n\n请检查你的路径是否遵循此规则，或者使用它们创建的任何形状是否是非凸的（图 26）。\n\n![A978-1-4842-1560-9_1_Fig26_HTML.jpg](img/A978-1-4842-1560-9_1_Fig26_HTML.jpg)\n\
    \n**图 26.** 非凸形状；顶点顺序无关紧要\n\n**注意**  \n你可以通过绘制形状内两点之间的连线来检测形状是否为非凸。如果连接线落在形状外部，则为非凸形。SpriteKit\
    \ 对象必须是凸的（图 25），并应使用按逆时针顺序绘制的顶点创建。\n\n## 关于 Cocoa 应用使用 Storyboard 的反例\n\n这是一种致命的组合：\n\
    \n- 你正在创建一个 Cocoa 应用程序。\n- 你的应用程序需要分别使用 `[NSPanel openPanel]` 和 `[NSPanel savePanel]`\
    \ 来加载和保存文件。\n- 你使用 storyboard 创建应用程序。\n- 你选择要求 OS X 10.10.0 作为应用程序所需的最低操作系统。\n\
    \n很抱歉地通知你，你的应用程序将无法工作。\n\n原因是 OS X 10.10.0 和 10.10.1 中的一个 Bug，它不仅阻止 `[NSPanel\
    \ openPanel]` 和 `[NSPanel savePanel]` 工作，而且如果你尝试使用这些方法，实际上会导致应用程序崩溃。\n\n例如，以下代码在\
    \ OS X 10.10.0 和 10.10.1 中会崩溃，但在 10.10.2 及更高版本中完美运行。\n"
- fmt: "### Swift\n\n```swift\nlet panel = NSSavePanel()\npanel.beginSheetModalForWindow(self.view.window!,\
    \ completionHandler: { (result) -> Void in\n})\n```\n\n### Objective-C\n\n```objc\n\
    NSSavePanel* panel = [NSSavePanel savePanel];\npanel beginSheetModalForWindow:self.view.window\
    \ completionHandler:^(NSInteger result){\n}];\n```\n\nFollowing is the answer\
    \ we received from Apple, after contacting them about the problem:\n\n> Our engineers\
    \ have reviewed your request and have determined that you are experiencing a known\
    \ issue, the workaround for which is to replace storyboards with xibs. Alternatively,\
    \ you may choose to require OS X 10.10.2 as the minimum OS for this app.\n\nThe\
    \ problem with storyboards for OS X applications don’t end with the `NSSavePanel`\
    \ and `NSOpenPanel`. Neither will `NSSplitControllers` and `NSTabViewControllers`\
    \ work well with storyboards, under certain circumstances.\n\nSo, until OS X 10.10\
    \ is history, we recommend not using storyboards for your OS X projects. Use XIBs\
    \ as recommended by Apple.\n\n## UIView Classes with Independent Rounded Corners\n\
    \n**Note**\n\n`UIButton`, `UILabel`, `UISegmentedControl`, and `UITextView` are\
    \ some examples of `UIView`-based classes.\n\nIf you want to create rounded-corner\
    \ `UIView` base classes and have the ability to control the radius of every corner\
    \ independently, we have created this category (\"extension\" in Swift) for you.\n\
    \n### Swift\n\n`UIView+IndependentCorners.swift`\n\n```swift\nimport UIKit\nimport\
    \ QuartzCore\n\nextension UIView {\n    func corners(corners: UIRectCorner, radius:\
    \ CGFloat) {\n        let maskPath = UIBezierPath(roundedRect: bounds,\n     \
    \                               byRoundingCorners: corners,\n                \
    \                    cornerRadii: CGSizeMake(radius, radius))\n        let cornerLayer\
    \ = CAShapeLayer()\n        cornerLayer.frame = self.bounds\n        cornerLayer.path\
    \ = maskPath.CGPath\n        layer.mask = cornerLayer\n    }\n}\n```\n\nSet the\
    \ corners by using the following code:\n\n```swift\n// set the radius of both,\
    \ the top left and\n// the bottom right corners to 20 pt\nmyView.corners(UIRectCorner.TopLeft\
    \ | UIRectCorner.BottomRight, radius: 20)\n```\n\n**Note**\n\nYou can combine\
    \ multiple corners by separating them with a pipe character (\"|\"). The options\
    \ are `UIRectCorner.TopLeft`, `UIRectCorner.TopRight`, `UIRectCorner.BottomLeft`,\
    \ `UIRectCorner.BottomRight`, and `UIRectCorner.AllCorners`.\n\n### Objective-C\n\
    \n`UIView+IndependentCorners.h`\n\n```objc\n#import <UIKit/UIKit.h>\n\n@interface\
    \ UIView (IndependentCorners)\n- (void)setCorners:(UIRectCorner)corners withRadius:(CGFloat)radius;\n\
    @end\n```\n\n`UIView+IndependentCorners.m`\n\n```objc\n#import \"UIView+IndependentCorners.h\"\
    \n\n@implementation UIView (IndependentCorners)\n- (void)setCorners:(UIRectCorner)corners\
    \ withRadius:(CGFloat)radius\n{\n    UIBezierPath *shapePath = [UIBezierPath\n\
    \        bezierPathWithRoundedRect:[self bounds]\n                byRoundingCorners:corners\n\
    \                      cornerRadii:CGSizeMake(radius, radius)];\n    CAShapeLayer\
    \ *newCornerLayer = [CAShapeLayer layer];\n    newCornerLayer.frame = [self bounds];\n\
    \    newCornerLayer.path = shapePath.CGPath;\n    [self layer].mask = newCornerLayer;\n\
    }\n@end\n```\n\nSet the corners by using the following code:\n\n```objc\n// set\
    \ the radius of both, the top left and\n// the bottom right corners to 30 pt\n\
    [myView setMaskTo:self.pickerFrom\n    byRoundingCorners:UIRectCornerBottomLeft\
    \ | UIRectCornerBottomRight\n      withCornerRadii:CGSizeMake(30.0f, 30.0f)];\n\
    ```\n\n**Note**\n\nLike the Swift example, you can combine multiple corners by\
    \ separating them with a pipe character (\"|\"). The options are `UIRectCornerTopLeft`,\
    \ `UIRectCornerTopRight`, `UIRectCornerBottomLeft`, `UIRectCornerBottomRight`,\
    \ and `UIRectCornerAllCorners`.\n\n## Making NSViews \"Compatible\" with UIViews\n\
    \nIf you create iOS and OS X applications, you have certainly wished you could\
    \ use the code you previously created for one platform for the other. One of most\
    \ classic cases involves `UIViews` and `NSViews`.\n\nThe problem with `UIViews`\
    \ and `NSViews` is that they are different animals. At the end of the day, you\
    \ have to create different codes for both classes even if you are doing the same\
    \ simple operations with them.\n\nWhile we agree that `UIViews` and `NSViews`\
    \ are different animals, we also see that they have a lot in common. It doesn’t\
    \ make sense to have different commands for the same functionality like `setAlpha:`\
    \ and `setAlphaValue:` to set the view’s transparency on iOS and OS X, respectively.\n\
    \nWe have created a class for you, to make `UIView` and `NSView` objects similar\
    \ for some simple aspects. This class also adds some power functionality to `NSViews`,\
    \ like the ability to fade in and out of these views and to set the view’s position\
    \ by its center."
