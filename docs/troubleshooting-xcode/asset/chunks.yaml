    \ an `NSArray` of `NSDictionary` objects, but what happens if you are working\
    \ with a Swift array of Swift dictionaries?\n\nIn that case you must use the following\
    \ code:\n\n```\n// creating the dictionaries\nlet dict1 : [String:AnyObject?]\
    \ = [\"object\" : \"car\",    \"date\" : date1]\nlet dict2 : [String:AnyObject?]\
    \ = [\"object\" : \"boat\",   \"date\" : date2]\nlet dict3 : [String:AnyObject?]\
    \ = [\"object\": \"plane\",  \"date\" : date3]\n\n// creating the array\nlet array\
    \ : Array = [dict1, dict2, dict3]\n\n// creating the sort\nlet result = array.sort\
    \ {\n  item1, item2 in\n  let date1 = item1[\"date\"] as! NSDate\n  let date2\
    \ = item2[\"date\"] as! NSDate\n  return date1.compare(date2) == NSComparisonResult.OrderedAscending\n\
    }\n\nlet latestDate = result.last\nprint(latestDate)\n```\n\n### Objective-C\n\
    \n```\n// the dictionaries with random dates\nNSDictionary *obj1 = @{ @\"name\"\
    :@\"car\", @\"date\":date1};\nNSDictionary *obj2 = @{ @\"name\":@\"boat\", @\"\
    date\":date2};\nNSDictionary *obj3 = @{ @\"name\":@\"plane\", @\"date\":date3};\n\
    \n// the unsorted array\nNSArray *unsortedArray = @[obj1, obj2, obj3];\n\n// create\
    \ a NSSortDescriptor to sort the array\nNSSortDescriptor *dateDescriptor = [NSSortDescriptor\
    \ sortDescriptorWithKey:@\"date\" ascending:YES];\nNSArray *sortDescriptors =\
    \ @[dateDescriptor];\n\n// sorting the array\nNSArray *sortedArray = [unsortedArray\
    \ sortedArrayUsingDescriptors:sortDescriptors];\n\n// because the array is sorted,\
    \ the last object is the\n// one with the most recent date\nNSDictionary *mostRecent\
    \ = [sortedArray lastObject];\n```\n\n## Magical Way for Counting Elements in\
    \ Arrays\n\nSuppose you have an array of dictionaries and these dictionaries have\
    \ two fields, `object` and `selected`, an `NSString` and a `BOOL` stored as an\
    \ `NSNumber`, respectively.\n\nYou want to know how many of these dictionaries\
    \ have the `selected` field equal to `YES`/`true`.\n\nThe first code that comes\
    \ to mind is shown next.\n\n### Swift\n\n```\nvar count = 0\nfor dict in array\
    \ {\n  if dict[\"selected\"] == true\n     count++\n}\n```\n\n### Objective-C\n\
    \n```\nNSInteger count = 0;\nfor (NSDictionary * dict in array) {\n  BOOL isSelected\
    \ = [dict [@\"selected\"] boolValue];\n  if (isSelected)\n    count++;\n}\n```\n\
    \nBut this code is not magical.\n\nLet's do it the magical way.\n\n### Swift:\
    \ NSArray\n\n```\n// creating the dictionaries\nlet dict1: NSDictionary = [\"\
    object\"   : \"television\",\n                           \"selected\" : true]\n\
    let dict2: NSDictionary = [\"object\"   : \"phone\",\n                       \
    \    \"selected\" : false]\nlet dict3: NSDictionary = [\"object\"   : \"book\"\
    ,\n                           \"selected\" : true]\n\n// creating the array\n\
    let array : NSArray? = [dict1, dict2, dict3]\n\n// this is the magical command\n\
    let count = array!.valueForKeyPath(\"@sum.selected\")?.integerValue\nprint(count);\
    \ // this will print 2 on console\n```\n\n### A Swift variation...\n\nThe previous\
    \ code will only work if you are using a `NSArray` of `NSDictionary` instances.\
    \ If you are using a Swift array of Swift dictionaries you should use the following\
    \ code:\n\n```\n// creating the dictionaries\nlet dict1 = [\"object\" : \"television\"\
    , \"selected\": true]\nlet dict2 = [\"object\" : \"phone\",      \"selected\"\
    : false]\nlet dict3 = [\"object\" : \"book\",       \"selected\": true]\n\n//\
    \ creating the array\nlet array = [dict1, dict2, dict3]\n\n// the magic command\n\
    let filteredArray = array.filter({$0[\"selected\"] == true})\nlet result = filteredArray.count\n\
    print(result) // this will print 2 on console\n```\n\n### Objective-C\n\n```\n\
    // creating the dictionaries\nNSDictionary *dict1 = @{@\"object\"    : @\"television\"\
    ,\n                        @\"selected\"  : @(YES) };\nNSDictionary *dict2 = @{@\"\
    object\"    : @\"phone\",\n                        @\"selected\"  : @(NO)  };\n\
    NSDictionary *dict3 = @{@\"object\"    : @\"book\",\n                        @\"\
    selected\"  : @(YES) };\n\n// creating the array\nNSArray *array = @[dict1, dict2,\
    \ dict3];\n\n// this is the magical command\nNSInteger count = [[array valueForKeyPath:@\"\
    @sum.selected\"] integerValue];\nNSLog(@\"count %@\", @(count)); // this will\
    \ print 2 on console\n```\n\n## OS X App Not Launching with the Correct Size\n\
    \nIf you have adjusted your Cocoa application to launch with a certain size but\
    \ the app is failing to do so, this section is definitely for you.\n\nWe have\
    \ seen this problem more than once, and it is usually related to some Auto Layout\
    \ constraint that is interfering with the initial `ViewController`.\n\nThe solution\
    \ for this problem would be to apply constraints to the `ViewController`'s view,\
    \ making it launch with the correct size, but these kinds of views do not accept\
    \ constraints.\n\nYou have to embed the whole interface into an `NSView` and apply\
    \ constraints to that view, defining the size you want your application to launch\
    \ (Figure 22).\n\n![Figure 22](A978-1-4842-1560-9_1_Fig22_HTML.jpg)\n\nFigure\
    \ 22. Embedding the whole interface elements into a view (before and after)\n\n\
    ## Detecting the Application Target Running\n\nYou have a project with independent\
    \ iPhone and iPad targets and at some point in the code you want to know what\
    \ target is running.\n\nUsing `UI_USER_INTERFACE_IDIOM()` is not an option because\
    \ this method will just check if the target is running on iPhone or iPad, not\
    \ the target itself.\n\nOne way to solve this problem involves adding a preprocessor\
    \ macro and testing for the existence of that macro later in code, but compiler\
    \ directives make the code clumsy and reduce readability.\n\nHowever, there is\
    \ a better way. The code shown next will read the bundle's `infoDictionary` and\
    \ discover which target is running.\n\n### Swift\n\n```\nfunc getTarget() -> NSString\
    \ {\n  let dict : NSDictionary = NSBundle.mainBundle().infoDictionary!\n  let\
    \ family  = dict[\"UIDeviceFamily\"]!\n  let device = family[0]\n  return (device.integerValue\
    \ == 1) ? \"iPhone\" : \"iPad\"\n}\n```\n\n### Objective-C\n\n```\n- (NSString\
    \ *) getTarget {\n  NSDictionary *dict = [[NSBundle mainBundle] infoDictionary];\n\
    \  NSArray *family = dict[@\"UIDeviceFamily\"];\n  NSInteger device = [family[0]\
    \ integerValue];\n  return (device == 1) ? @\"iPhone\" : @\"iPad\";\n}\n```\n\n\
    ## Disabling a Method on a Class\n\nYou have a new class that has to be initialized\
    \ using a specific method such as `initWithMode:` and you want to prevent people\
    \ from using other initialization methods that the superclass may provide.\n\n\
    The code shown next will warn people to use the correct initialization method\
    \ and disable other methods that may exist."
