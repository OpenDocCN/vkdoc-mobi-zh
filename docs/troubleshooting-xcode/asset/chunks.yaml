    \n```\nmyButton.enabled = NO;\n[myButton setTitleColor:[UIColor grayColor]\n \
    \             forState:UIControlStateDisabled];\n```\n\n## Catching Memory Corruption\n\
    \nSome kinds of bugs are simply hard to catch.\n\nYour application crashes and\
