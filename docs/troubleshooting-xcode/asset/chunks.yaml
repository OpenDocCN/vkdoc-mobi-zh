    ```\n"
- fmt: "### Objective-C\n\n```\n[myButton1 setTitleColor:[UIColor redColor]\n    \
    \       forState: UIControlStateNormal];\n[myButton2 setTitleColor:[UIColor redColor]\n\
    \           forState: UIControlStateSelected];\n[myButton3 setTitleColor:[UIColor\
    \ redColor]\n           forState: UIControlStateDisabled];\n```\n\nHow do you\
    \ do that?  \nRegular expressions will save you.\n\n### Using regular expressions\n\
    \n**Note**  \nApple documentation says that when using regular expressions with\
    \ Xcode’s search we must use the ICU syntax. The ICU syntax uses the dollar (`$`)\
    \ followed by a number to represent the capture group being referenced (`$1`,\
    \ `$2`, etc.).\n\nSelect Find ➤ Find and Replace in Project... Make sure you select\
    \ Replace with the option Regular Expression. If not, click the Text word and\
    \ select the proper option (see Figure 18 and Figure 19).\n\n![A978-1-4842-1560-9_1_Fig19_HTML.jpg](A978-1-4842-1560-9_1_Fig19_HTML.jpg)\
    \  \nFigure 19. Regular expression selected\n\n![A978-1-4842-1560-9_1_Fig18_HTML.jpg](A978-1-4842-1560-9_1_Fig18_HTML.jpg)\
    \  \nFigure 18. Regular expression option\n\n#### The Find field\n\nThe Find field\
    \ is where you type the string or, in this case, the regular expression you want\
    \ to find.\n\nFill the Find field with `\\[(.*) setTitleColor:(.*) forState:(.*)\\\
    ]`\n\n##### Explanation:\n\nYou can divide this line into several parts (see Figure\
    \ 20).\n\n![A978-1-4842-1560-9_1_Fig20_HTML.jpg](A978-1-4842-1560-9_1_Fig20_HTML.jpg)\
    \  \nFigure 20. Regular expression divided\n\n➊ Find a left square bracket `[`;\
    \  \n➋ Find anything that may exist between the left square bracket and `setTitleColor:`\
    \ string and store what you find as “group 1”;  \n➌ Find anything that may exist\
    \ between `setTitleColor:` and `forState:` and store what you find as “group 2”;\
    \  \n➍ Find anything that may exist between `setTitleColor:` and the right square\
    \ bracket and store what you find as “group 3”;  \n➎ Find a right square bracket\
    \ `]`;\n\n**Note**  \nThe question here is, Why do we use the backslash before\
    \ the bracket to search for the bracket? The answer is simple—because brackets\
    \ are themselves part of the regular expression syntax. If we use an expression\
    \ like `[0-9]` we tell Xcode to “find one number between 0 and 9.” The backslash\
    \ is there to tell Xcode that we want to find the bracket character, not to use\
    \ the bracket as a command. The backslash character is what is known as the “escape”\
    \ character, which according to Wikipedia is a character that invokes an alternative\
    \ interpretation of subsequent characters in a character sequence.\n\n#### The\
    \ Replace field\n\nThe Replace field is where you type the expression you want\
    \ to use to replace the text matching the Find field expression.\n\nFill the Replace\
    \ field with `[$1 setTitleColor:[UIColor redColor] forState:$3]`\n\nSee Figure\
    \ 21.\n\n![A978-1-4842-1560-9_1_Fig21_HTML.jpg](A978-1-4842-1560-9_1_Fig21_HTML.jpg)\
    \  \nFigure 21. Regular expressions\n\n#### Explanation\n\nVariables `$1` and\
    \ `$3` represent the capture groups of the Find field. As we said, “group 1” will\
    \ be anything that may exist between the left square bracket and the `setTitleColor:`\
    \ and “group 3” will be anything that may exist between `setTitleColor:` and the\
    \ right square bracket. By using the variables `$1` and `$3` we are “pasting”\
    \ in place the contents of “group 1” and “group 3.”\n\nIn our example:\n- “group\
    \ 1” will contain different button names: `myButton1`, `myButton2`, and `myButton3`;\n\
    - “group 2” will contain the different colors: gray, green, and orange;\n- “group\
    \ 3” will contain different control states: normal, selected, and disabled.\n\n\
    By using the expression shown in the Replace field in Figure 21, we are instructing\
    \ Xcode to build the replace string using the following method: start with a left\
    \ square bracket, the contents of “group 1,” a space, the string `setTitleColor:[UIColor\
    \ redColor] forState:`, the contents of “group 3,” and a right square bracket.\n\
    \n#### But there is the catch...\n\nThe search command we have described will\
    \ work only if you type the lines continuously, as follows:\n\n```\n[myButton1\
    \ setTitleColor:...\n                   forState:...];\n```\n\nIf the lines are\
    \ broken with line feeds, like the following ones, the search will not find them:\n\
    \n```\n[myButton1 setTitleColor:...\n                   forState:...];\n```\n\n\
    The problem occurs because there is a line feed character (represented on this\
    \ book by the `\\n` character) between one part of the command and the other and\
    \ we have not provided the search command with instructions to take that into\
    \ account.\n\nTo account for line feeds or other invisible characters, you must\
    \ add the `\\s*` instruction to the search string.\n\nIn that case, the Find field\
    \ changes to\n\n```\n\\[(.*) \\s* setTitleColor:(.*) \\s* forState:(.*)\\]\n```\n\
    \n**Note**  \nThe following characters are considered “blank characters” by the\
    \ ICU syntax: tabs, form feeds, new lines, carriage returns, and any kind of spaces\
    \ or invisible characters.  \nYou can find more about the ICU syntax by visiting\
    \ [`http://addfone.com/TXICUSyntax`](http://addfone.com/TXICUSyntax)\n\n## Extracting\
    \ a Dictionary from Array\n\nYou have an array of dictionaries and these dictionaries\
    \ have two fields, “name” and “date,” an `NSString` and an `NSDate` object, respectively.\n\
    \nAt some point, you want to extract, from that array, the dictionary with the\
    \ most recent date.\n\nYou can use a code like that shown here.\n\n### Swift:\
    \ NSArray\n\n```\n// create the dictionaries with random dates\nlet obj1 : NSDictionary?\
    \ = [\"name\":\"car\",\n                            \"date\":date1!]\nlet obj2\
    \ : NSDictionary? = [\"name\":\"boat\",\n                            \"date\"\
    :date2!]\nlet obj3 : NSDictionary? = [\"name\":\"plane\",\n                  \
    \          \"date\":date3!]\n// and store them on an array\nlet unsortedArray\
    \ : NSArray = [obj1!, obj2!, obj3!]\n// create a NSSortDescriptor to sort the\
    \ array\nlet dateDescriptor : NSSortDescriptor =\n    NSSortDescriptor(key: \"\
    date\", ascending: true)\n// sorting the array\nlet sortedArrayOfDics : NSArray\
    \ =\n    unsortedArray.sortedArrayUsingDescriptors([dateDescriptor])\n// because\
    \ the array is sorted, the last object is the\n// one with the most recent date\n\
    let mostRecent : AnyObject! = sortedArrayOfDics.lastObject\n```"
