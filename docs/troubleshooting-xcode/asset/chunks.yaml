    \ Swift 字典构成的 Swift 数组，则应使用以下代码：\n\n```\n// creating the dictionaries\nlet dict1\
    \ = [\"object\" : \"television\", \"selected\": true]\nlet dict2 = [\"object\"\
    \ : \"phone\",      \"selected\": false]\nlet dict3 = [\"object\" : \"book\",\
    \       \"selected\": true]\n\n// creating the array\nlet array = [dict1, dict2,\
