    \ option, select Product ➤ Scheme ➤ Edit Scheme ➤ Diagnostics and select **Enable\
    \ Address Sanitizer** (Figure [24](#A978-1-4842-1560-9_1_Chapter.html#Fig24)).\n\
    \n![A978-1-4842-1560-9_1_Fig24_HTML.jpg](A978-1-4842-1560-9_1_Fig24_HTML.jpg)\n\
    \n**Figure 24.** Xcode 7 Address Sanitizer\n\nRun your application after enabling\
    \ Address Sanitizer until it crashes. Crashes will now produce juicy error messages\
    \ that will give you clues about the problem.\n\nYour users will stop yelling.\n\
    \n**Note**  \nAddress Sanitizer may impose a substantial overhead and slow down\
