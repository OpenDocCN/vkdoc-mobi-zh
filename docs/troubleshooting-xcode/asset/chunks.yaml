    \ after the animation finishes\n}];\n```\n\n## Detect when the UIPickerView Stops\
    \ Spinning\n\n`UIPickerView` doesn’t have a direct way for detecting when its\
    \ wheels stop spinning, but we can use a trick to detect that.\n\nFirst, locate,\
    \ in your code, the line that puts the wheels in motion and add the code shown\
    \ next."
