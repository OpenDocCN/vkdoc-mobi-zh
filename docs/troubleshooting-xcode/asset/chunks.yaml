    ## Making NSViews “Compatible” with UIViews


    If you create iOS and OS X applications, you have certainly wished you could use
    the code you previously created for one platform for the other. One of most classic
    cases involves `UIViews` and `NSViews`.


    The problem with `UIViews` and `NSViews` is that they are different animals. At
    the end of the day, you have to create different codes for both classes even if
    you are doing the same simple operations with them.


    While we agree that `UIViews` and `NSViews` are different animals, we also see
    that they have a lot in common. It doesn’t make sense to have different commands
    for the same functionality like `setAlpha:` and `setAlphaValue:` to set the view’s
    transparency on iOS and OS X, respectively.


    We have created a class for you, to make `UIView` and `NSView` objects similar
    for some simple aspects. This class also adds some power functionality to `NSViews`,
    like the ability to fade in and out of these views and to set the view’s position
    by its center.'
  trans: "\n### Swift\n\n```swift\nlet panel = NSSavePanel()\npanel.beginSheetModalForWindow(self.view.window!,\
    \ completionHandler: { (result) -> Void in\n})\n```\n\n### Objective-C\n\n```objc\n\
    NSSavePanel* panel = [NSSavePanel savePanel];\npanel beginSheetModalForWindow:self.view.window\
    \ completionHandler:^(NSInteger result){\n}];\n```\n\n以下是我们联系苹果公司后得到的回复：\n\n>\
    \ 我们的工程师已审查您的请求，并确定您遇到的是一个已知问题，其解决方法是使用 xib 文件替代 storyboard。或者，您也可以选择将该应用的最低操作系统版本要求设为\
    \ OS X 10.10.2。\n\nOS X 应用中的 storyboard 问题并不仅限于 `NSSavePanel` 和 `NSOpenPanel`。在某些情况下，`NSSplitControllers`\
    \ 和 `NSTabViewControllers` 也无法与 storyboard 很好地协同工作。\n\n因此，在 OS X 10.10 成为历史之前，我们建议不要在\
    \ OS X 项目中使用 storyboard。请按照苹果的建议，使用 XIB 文件。\n\n## 支持独立圆角的 UIView 类\n\n**注意**\n\
    \n`UIButton`、`UILabel`、`UISegmentedControl` 和 `UITextView` 是 `UIView` 基类的一些示例。\n\
    \n如果你想创建圆角 `UIView` 基类，并且能够独立控制每个角的半径，我们为你创建了这个分类（Swift 中称为“extension”）。\n\n###\
    \ Swift\n\n`UIView+IndependentCorners.swift`\n\n```swift\nimport UIKit\nimport\
    \ QuartzCore\n\nextension UIView {\n    func corners(corners: UIRectCorner, radius:\
    \ CGFloat) {\n        let maskPath = UIBezierPath(roundedRect: bounds,\n     \
    \                               byRoundingCorners: corners,\n                \
    \                    cornerRadii: CGSizeMake(radius, radius))\n        let cornerLayer\
    \ = CAShapeLayer()\n        cornerLayer.frame = self.bounds\n        cornerLayer.path\
    \ = maskPath.CGPath\n        layer.mask = cornerLayer\n    }\n}\n```\n\n使用以下代码设置圆角：\n\
    \n```swift\n// 同时将左上角和右下角的半径设为 20 点\nmyView.corners(UIRectCorner.TopLeft | UIRectCorner.BottomRight,\
    \ radius: 20)\n```\n\n**注意**\n\n你可以通过竖线字符（\"|\"）分隔多个角来组合它们。选项包括 `UIRectCorner.TopLeft`、`UIRectCorner.TopRight`、`UIRectCorner.BottomLeft`、`UIRectCorner.BottomRight`\
    \ 和 `UIRectCorner.AllCorners`。\n\n### Objective-C\n\n`UIView+IndependentCorners.h`\n\
    \n```objc\n#import <UIKit/UIKit.h>\n\n@interface UIView (IndependentCorners)\n\
    - (void)setCorners:(UIRectCorner)corners withRadius:(CGFloat)radius;\n@end\n```\n\
    \n`UIView+IndependentCorners.m`\n\n```objc\n#import \"UIView+IndependentCorners.h\"\
    \n\n@implementation UIView (IndependentCorners)\n- (void)setCorners:(UIRectCorner)corners\
    \ withRadius:(CGFloat)radius\n{\n    UIBezierPath *shapePath = [UIBezierPath\n\
    \        bezierPathWithRoundedRect:[self bounds]\n                byRoundingCorners:corners\n\
    \                      cornerRadii:CGSizeMake(radius, radius)];\n    CAShapeLayer\
    \ *newCornerLayer = [CAShapeLayer layer];\n    newCornerLayer.frame = [self bounds];\n\
    \    newCornerLayer.path = shapePath.CGPath;\n    [self layer].mask = newCornerLayer;\n\
    }\n@end\n```\n\n使用以下代码设置圆角：\n\n```objc\n// 同时将左上角和右下角的半径设为 30 点\n[myView setMaskTo:self.pickerFrom\n\
    \    byRoundingCorners:UIRectCornerBottomLeft | UIRectCornerBottomRight\n    \
    \  withCornerRadii:CGSizeMake(30.0f, 30.0f)];\n```\n\n**注意**\n\n与 Swift 示例类似，你可以通过竖线字符（\"\
    |\"）分隔多个角来组合它们。选项包括 `UIRectCornerTopLeft`、`UIRectCornerTopRight`、`UIRectCornerBottomLeft`、`UIRectCornerBottomRight`\
    \ 和 `UIRectCornerAllCorners`。\n\n## 让 NSViews 与 UIViews 兼容\n\n如果你既开发 iOS 应用又开发\
    \ OS X 应用，你一定曾希望可以将为一个平台编写的代码用于另一个平台。其中最经典的场景之一就涉及 `UIViews` 和 `NSViews`。\n\n\
    `UIViews` 和 `NSViews` 的问题在于它们是截然不同的物种。最终，即使你用它们执行相同的简单操作，也必须为这两个类编写不同的代码。\n\n\
    虽然我们同意 `UIViews` 和 `NSViews` 是截然不同的物种，但也看到它们有很多共同之处。为同一功能（例如在 iOS 和 OS X 上分别使用\
    \ `setAlpha:` 和 `setAlphaValue:` 设置视图透明度）使用不同命令，这并不合理。\n\n我们为你创建了一个类，使 `UIView`\
    \ 和 `NSView` 对象在某些简单方面具有相似性。该类还为 `NSViews` 添加了一些增强功能，例如支持视图的淡入淡出以及通过视图中心设置其位置。\n"
- fmt: "### Swift\n\n`NSView+ CompatibleUIView.swift`\n\n```\nimport Foundation\n\
    import AppKit\n\nextension NSView {\n    typealias AnimationHandler  = () -> Void\n\
    \    typealias CompletionHandler = (finished : Bool) -> Void\n\n    var center:\
    \ CGPoint {\n        get {\n            let midX = CGRectGetMidX(frame)\n    \
    \        let midY = CGRectGetMidY(frame)\n            return CGPointMake(midX,\
    \ midY)\n        }\n        set(newCenter) {\n            var newFrame = CGRectZero\n\
    \            newFrame.size = frame.size\n            let myWidth = CGRectGetWidth(frame)\n\
    \            let myHeight = CGRectGetHeight(frame)\n            let x = floor(newCenter.x\
    \ - (myWidth / 2.0))\n            let y = floor(newCenter.y - (myHeight / 2.0))\n\
    \            newFrame.origin.x = x\n            newFrame.origin.y = y\n      \
    \      frame = newFrame\n        }\n    }\n\n    var alpha: CGFloat {\n      \
    \  get { return alphaValue }\n        set(value) { alphaValue = value }\n    }\n\
    \n    func fadeInWithDuration(duration: NSTimeInterval) {\n        wantsLayer\
    \ = true\n        NSAnimationContext.beginGrouping()\n        NSAnimationContext.currentContext().duration\
    \ = duration\n        animator().alphaValue = 1.0\n        NSAnimationContext.endGrouping()\n\
    \    }\n\n    func fadeOutWithDuration(duration: NSTimeInterval) {\n        wantsLayer\
    \ = true\n        NSAnimationContext.beginGrouping()\n        NSAnimationContext.currentContext().duration\
    \ = duration\n        animator().alphaValue = 0.0\n        NSAnimationContext.endGrouping()\n\
    \    }\n\n    func animateWithDuration(duration: NSTimeInterval, animations: AnimationHandler)\
    \ {\n        wantsLayer = true\n        NSAnimationContext.runAnimationGroup({\
    \ (context: NSAnimationContext) -> Void in\n            context.duration = duration\n\
    \            context.allowsImplicitAnimation = true\n            animations()\n\
    \        }, completionHandler: { () -> Void in })\n    }\n\n    func animateWithDuration(duration:\
    \ NSTimeInterval, animations: AnimationHandler, completion: CompletionHandler)\
    \ {\n        wantsLayer = true\n        NSAnimationContext.runAnimationGroup({\
    \ (context: NSAnimationContext) -> Void in\n            context.duration = duration\n\
    \            context.allowsImplicitAnimation = true\n            animations()\n\
    \        }, completionHandler: { () -> Void in\n            completion(finished:\
    \ true)\n        })\n    }\n}\n```\n\nThis category will make it possible to use\
    \ `setAlpha:` and `setCenter:` with your `NSViews` and, as a bonus, add some powerful\
    \ functionalities to them.\n\n**Fade in and fade out**\n\n```\n// fade in or fade\
    \ out myView in 5 seconds\nmyView.fadeInWithDuration(5)\nmyView.fadeOutWithDuration(5)\n\
    ```\n\n**Animating a NSView just like a UIView**\n\n```\n// animate myView’s alpha\
    \ from 0 to 0.7 in 5 seconds\nmyView.alpha = 0\nmyView.animateWithDuration(5.0,\
    \ animations: { () -> Void in\n    self.myView.alphaValue = 0.7\n})\n\n// or\n\
    // animate myView’s alpha from 0 to 0.7 in 5 seconds\n// and do something when\
    \ the animation finishes\nself.myView.animateWithDuration(5.0,\n    animations:\
    \ { () -> Void in\n        self.myView.alphaValue = 0.7\n    }, completion: {\
    \ (finished) -> Void in\n        // animation finished... do something here\n\
    \    })\n```\n\n### Objective-C\n\n`NSView+ CompatibleUIView.h`\n\n```\n@class\
    \ NSView;\n\n@interface NSView (CompatibleUIView)\n- (void)setAlpha:(CGFloat)point;\n\
    - (CGFloat)alpha;\n- (void)setCenter:(CGPoint)point;\n- (CGPoint)center;\n+(void)fadeOut:(NSView*)viewToDissolve\n\
    \  withDuration:(NSTimeInterval)duration;\n+(void)fadeIn:(NSView*)viewToFadeIn\n\
    withDuration:(NSTimeInterval)duration;\n+ (void)animateWithDuration:(NSTimeInterval)duration\n\
    \                 animations:(void (^)(void))animations;\n+ (void)animateWithDuration:(NSTimeInterval)duration\n\
    \                 animations:(void (^)(void))animations\n                 completion:(void\
    \ (^)(BOOL finished))completion;\n@end\n```\n\n`NSView+ CompatibleUIView.m`\n\n\
    ```\n#import \"NSView+CompatibleUIView.h\"\n#import <Cocoa/Cocoa.h>\n\n@implementation\
    \ NSView (CompatibleUIView)\n\n- (void)setAlpha:(CGFloat)point {\n    [self setAlphaValue:point];\n\
    }\n\n- (CGFloat)alpha {\n    return self.alphaValue;\n}\n\n- (void)setCenter:(CGPoint)point\
    \ {\n    CGSize size = self.frame.size;\n    CGRect newFrame = CGRectZero;\n \
    \   newFrame.size = size;\n    CGFloat width = CGRectGetWidth(self.frame);\n \
    \   CGFloat height = CGRectGetHeight(self.frame);\n    CGFloat x = floorf(point.x\
    \ - (width / 2.0f));\n    CGFloat y = floorf(point.y - (height / 2.0f));\n   \
    \ newFrame.origin.x = x;\n    newFrame.origin.y = y;\n    [self setFrame:newFrame];\n\
    }\n\n- (CGPoint)center {\n    return CGPointMake(CGRectGetMidX(self.frame),\n\
    \                       CGRectGetMidY(self.frame));\n}\n\n+(void)fadeOut:(NSView*)viewToDissolve\n\
    \  withDuration:(NSTimeInterval)duration\n{\n    [NSAnimationContext beginGrouping];\n\
    \    [[NSAnimationContext currentContext] setDuration:duration];\n    [[viewToDissolve\
    \ animator] setAlphaValue:0.0];\n    [NSAnimationContext endGrouping];\n}\n\n\
    +(void)fadeIn:(NSView*)viewToFadeIn\nwithDuration:(NSTimeInterval)duration\n{\n\
    \    [NSAnimationContext beginGrouping];\n    [[NSAnimationContext currentContext]\
    \ setDuration:duration];\n    [[viewToFadeIn animator] setAlphaValue:1.0f];\n\
    \    [NSAnimationContext endGrouping];\n}\n\n+ (void)animateWithDuration:(NSTimeInterval)duration\n\
    \                 animations:(void (^)(void))animations\n{\n    [NSAnimationContext\
    \ beginGrouping];\n    [[NSAnimationContext currentContext] setDuration:duration];\n\
    \    animations();\n    [NSAnimationContext endGrouping];\n}\n\n+ (void)animateWithDuration:(NSTimeInterval)duration\n\
    \                 animations:(void (^)(void))animations\n                 completion:(void\
    \ (^)(BOOL finished))completion\n{\n    [NSAnimationContext beginGrouping];\n\
    \    [[NSAnimationContext currentContext] setDuration:duration];\n    animations();\n\
    \    [NSAnimationContext endGrouping];\n    if(animations)\n    {\n        id\
    \ completionBlock = [completion copy];\n        [self performSelector:@selector(runEndBlock:)\n\
    \                   withObject:completionBlock\n                   afterDelay:duration];\n\
    \    }\n}\n\n+ (void)runEndBlock:(void (^)(void))completionBlock\n{\n    completionBlock();\n\
    }\n\n@end\n```\n\nThe following code shows you how to use the powerful functionalities:\n\
    \n**Fade in and fade out**\n\n```\n[NSView fadeIn:myView withDuration:1.0];\n\
    [NSView fadeOut:myView withDuration:1.0];\n```\n\n**Animating a NSView just like\
    \ a UIView**\n\n```\n[NSView animateWithDuration:1.0 animations:^{\n    [myView\
    \ setAlphaValue:0.7f];\n}]\n\n// or\n[NSView animateWithDuration:1.0 animations:^{\n\
