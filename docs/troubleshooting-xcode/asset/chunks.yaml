    \ lookupURL)\n    // 使用 iTunes API 异步请求应用数据\n    let task = session.dataTaskWithRequest(request,\n\
    \                              completionHandler: { data, response, error in\n\
    \      if !(error != nil) {\n      do {\n      let jsonResults = try\n       \
    \                   NSJSONSerialization.JSONObjectWithData(data!,\n          \
