    ] == true})\nlet result = filteredArray.count\nprint(result) // this will print\
    \ 2 on console\n```\n\n### Objective-C\n\n```\n// creating the dictionaries\n\
    NSDictionary *dict1 = @{@\"object\"    : @\"television\",\n                  \
    \      @\"selected\"  : @(YES) };\nNSDictionary *dict2 = @{@\"object\"    : @\"\
    phone\",\n                        @\"selected\"  : @(NO)  };\nNSDictionary *dict3\
    \ = @{@\"object\"    : @\"book\",\n                        @\"selected\"  : @(YES)\
    \ };\n\n// creating the array\nNSArray *array = @[dict1, dict2, dict3];\n\n//\
    \ this is the magical command\nNSInteger count = [[array valueForKeyPath:@\"@sum.selected\"\
    ] integerValue];\nNSLog(@\"count %@\", @(count)); // this will print 2 on console\n\
    ```\n\n## OS X 应用未以正确尺寸启动\n\n如果你已经调整了 Cocoa 应用，使其以特定尺寸启动，但应用却未能做到，那么本节内容绝对适合你。\n\
    \n我们不止一次看到这个问题，它通常与某些干扰初始 `ViewController` 的「自动布局」约束有关。\n\n此问题的解决方案是向 `ViewController`\
    \ 的视图应用约束，使其以正确尺寸启动，但这类视图不接受约束。\n\n你必须将整个界面嵌入到一个 `NSView` 中，并对该视图应用约束，定义你希望应用启动时的尺寸（图\
    \ 22）。\n\n![图 22](img/A978-1-4842-1560-9_1_Fig22_HTML.jpg)\n\n图 22. 将整个界面元素嵌入到一个视图中（之前和之后）\n\
    \n## 检测正在运行的应用目标\n\n你有一个包含独立 iPhone 和 iPad 目标的项目，在代码的某个地方，你想知道当前正在运行的是哪个目标。\n\n\
    使用 `UI_USER_INTERFACE_IDIOM()` 不是一个选项，因为该方法只会检查目标是在 iPhone 还是 iPad 上运行，而不是检查目标本身。\n\
    \n解决此问题的一种方法是添加一个预处理宏，然后在代码中检查该宏是否存在，但编译器指令会使代码变得笨拙并降低可读性。\n\n然而，有更好的方法。下面展示的代码将读取\
    \ bundle 的 `infoDictionary`，并找出正在运行的目标。\n\n### Swift\n\n```\nfunc getTarget()\
    \ -> NSString {\n  let dict : NSDictionary = NSBundle.mainBundle().infoDictionary!\n\
    \  let family  = dict[\"UIDeviceFamily\"]!\n  let device = family[0]\n  return\
    \ (device.integerValue == 1) ? \"iPhone\" : \"iPad\"\n}\n```\n\n### Objective-C\n\
    \n```\n- (NSString *) getTarget {\n  NSDictionary *dict = [[NSBundle mainBundle]\
    \ infoDictionary];\n  NSArray *family = dict[@\"UIDeviceFamily\"];\n  NSInteger\
    \ device = [family[0] integerValue];\n  return (device == 1) ? @\"iPhone\" : @\"\
    iPad\";\n}\n```\n\n## 禁用类上的方法\n\n你有一个新类，必须使用特定的初始化方法（如 `initWithMode:`）来初始化，并且你希望阻止人们使用父类可能提供的其他初始化方法。\n\
    \n下面展示的代码将提醒人们使用正确的初始化方法，并禁用可能存在的其他方法。\n"
- fmt: "### Swift\n\n```\n@available(*, unavailable,\n             message=\"init\
    \ is unavailable, use initWithMode\")\ninit() {\n  // your code...\n}\n```\n\n\
    ### Objective-C\n\n```\n#import <Foundation/Foundation.h>\n\n@interface SampleClass\
    \ : NSObject\n\n- (id)init __attribute__((unavailable(\"init is unavailable,\n\
    \                                    use initWithMode\")));\n@end\n```\n\n**Note**\
    \  \nThis directive will produce an error at compile time, warning users that\
