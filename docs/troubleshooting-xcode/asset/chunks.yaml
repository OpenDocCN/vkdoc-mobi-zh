    \  }\n```\n\n你必须像这样使用它：\n\n```\ngetAppVersion { (version) -> Void in\n  print(\"\
    latest version = \", version)\n}\n```\n\n### Objective-C\n\n```\n-(void)getAppVersionAndRunOnCompletion:\n\
    \       (void (^)(NSString *version))completionBlock {\n  // 获取应用的 Bundle 标识符\n\
    \  NSString *bundleIdentifier =\n                           @\"com.yourCompany.yourAppBundleID\"\
    ;\n  // 使用 iTunes API 获取应用数据\n  NSURL *lookupURL = [NSURL URLWithString:[NSString\n\
    \                             stringWithFormat: @\"http://itunes.apple.com/\n\
    \         lookup?bundleId=%@\", bundleIdentifier]];\n  NSURLSession *session =\
    \ [NSURLSession sharedSession];\n  [[session dataTaskWithURL:lookupURL\n     \
    \     completionHandler:^(NSData *data,\n                              NSURLResponse\
    \ *response,\n                              NSError *error) {\n            //\
    \ data 为 nil 或发生错误，返回 nil 并退出\n            if ( (data == nil) || (error != nil)\
    \ ) {\n              completionBlock(nil);\n              return;\n          \
    \  }\n            NSDictionary *jsonResults = [NSJSONSerialization\n         \
    \                 JSONObjectWithData:data options:0\n                        \
    \                        error:nil];\n            NSUInteger resultCount = [[jsonResults\n\
    \                        objectForKey: @\"resultCount\"]\n                   \
    \                             integerValue];\n            // jsonResults 中的对象数量为零，返回\
    \ nil 并退出\n            if (!resultCount){\n              completionBlock(nil);\n\
    \              return;\n            }\n            NSDictionary *appDetails =\
    \ [[jsonResults\n                                              objectForKey: @\"\
    results\"]\n                           firstObject];\n            NSString *latestVersion\
    \ = [appDetails\n                                                 objectForKey:\
    \ @\"version\"];\n            completionBlock(latestVersion);\n          }] resume];\n\
    }\n```\n\n你必须像这样使用它：\n\n```\n[self getAppVersionAndRunOnCompletion:^(NSString\
    \ *version) {\n    NSLog(@\"latest version on the app store = %@\", version);\n\
    }];\n```\n\n## 断点和 NSLog 不工作\n\n当出现此问题时，Xcode 不会在任何已设置的断点处暂停，并且`NSLog`也无法向 Xcode\
    \ 的控制台打印任何信息。\n\n此问题通常由两个原因之一导致：项目文件损坏或产品 Scheme 错误。\n\n出于某种原因，应用扩展和 Apple Watch\
    \ 目标更容易受到错误的 Product Scheme 影响。\n\n**注意：** 如果你在项目期间多次创建和删除 Target，Xcode 会失去对内容的控制，并且\
    \ Product Scheme 会被损坏。\n\n### 项目损坏\n\n首先，尝试按照“打开项目文件时 Xcode 崩溃？”一节的说明清理项目，并查看问题是否解决。\n\
    \n### 错误的 Product Scheme\n\n如果问题仍未解决，请点击 **Product** ➤ **Scheme** ➤ **Manage Schemes**，选择所有\
    \ Scheme，然后点击左下角的减号将其删除。接着点击 **Autocreate Schemes Now** 按钮重新创建刚刚删除的 Scheme。\n\n\
    现在你可以构建并运行你的项目，断点很可能会正常工作。\n\n## ViewControllers 之间切换缓慢\n\n如果你的应用使用了 Storyboard，并且`ViewControllers`之间的切换耗时过长，可能是因为\
    \ iOS 在加载和实例化下一个`ViewController`时遇到了困难。也许下一个`ViewController`包含了许多需要加载的元素，导致耗时过长。\n\
    \n这个问题合乎逻辑的解决方案是预加载下一个`ViewController`，但如何做到呢？\n\n我们在网络上看到一些页面建议使用`UIPageViewControllers`而不是\
    \ Storyboard 来实现`ViewControllers`之间的平滑过渡，但这远非一个好的解决方案，只会引发更多问题。\n\nStoryboard\
    \ 没有提供预加载`ViewControllers`的方法，但我们可以通过在当前`ViewController`的`viewWillAppear`方法中使用如下所示的代码来模拟这一功能。\n\
    \n### Swift\n\n```\noverride func viewWillAppear(animated: Bool) {\n  super.viewWillAppear(animated)\n\
    \  // 这将预加载下一个 ViewController\n  dispatch_async(dispatch_get_main_queue()) {\n\
    \   storyboard?.instantiateViewControllerWithIdentifier\n           (\"nextViewController\"\
    )\n  }\n}\n```\n\n### Objective-C\n\n```\n- (void)viewWillAppear:(BOOL)animated\
    \ {\n  [super viewWillAppear:animated];\n  // 这将预加载下一个 ViewController\n  dispatch_async(dispatch_get_main_queue(),\n\
    \  ^{\n     [self.storyboard\n      instantiateViewControllerWithIdentifier:\n\
    \      @\"nextViewController\"];\n  });\n}\n```\n\n这段代码会在一个单独的线程上实例化下一个`ViewController`，并将其保留在内存中。当我们\
    \ push 出下一个`ViewController`时，它将会快速且平滑地加载完成。\n"
- fmt: "# Finished Running Problem\n\nYou build and run your Mac or iOS application.\
    \ Xcode compiles everything correctly. Xcode shows the following messages: “Building\
    \ MyGreatApp...” and “Running MyGreatApp” and immediately after that terminates\
    \ the application showing “Finished Running MyGreatApp.” No error messages, no\
    \ crash, no nothing, and also no application running.\n\n## We have warned you\
    \ about the punishments\n\nAs we have said before, when the Gods punish you, they\
    \ prevent Xcode from presenting any error message that can hint about the problem.\
    \ But we can annoy these supreme entities and have the last laugh by thinking\
    \ outside the box.\n\nWe know that OS X’s `console` always shows error messages\
    \ from applications running on the system, including Xcode. So, this is the first\
    \ thing we have to check.\n\n`Console` is a log viewer present on all versions\
    \ of UNIX, including Mac OS X. It allows users to search through all of the system’s\
    \ logged messages and can alert the user when certain types of messages are logged.\n\
    \nTo launch `console`, click OS X’s `Spotlight`, type `console`, and press the\
    \ `Return` key.\n\nKeep the console window open, build and run your application\
    \ again, and see if any message pops up about your application. In our case, we\
    \ saw an entry like the following:\n\n`taskgated[98]: killed com.myGreatApp because\
    \ its use of the com.apple.developer.ubiquity-container-identifiers entitlement\
    \ is not allowed (error code -67050)`\n\nIn other words, our application was killed\
    \ by `taskgated` for trying to use a functionality not authorized by its entitlements.\
    \ In other words, OS X killed our application for trying to do something that\
    \ was not authorized by its entitlements. The question is, What exactly was it?\n\
    \nFor some strange reason that just confirms that Xcode really hates us, a key\
    \ called `Ubiquity Container Identifiers` was randomly added to our application’s\
    \ entitlements, without our knowledge and against our wishes, we swear.\n\nTo\
    \ check if your application has something wrong with its entitlements, localize\
    \ and open the application’s entitlements window by selecting the file on Xcode’s\
    \ `Project Navigator`. Figure [40](#A978-1-4842-1560-9_1_Chapter.html#Fig40) shows\
    \ the file and an example of entitlements.\n\n![A978-1-4842-1560-9_1_Fig40_HTML.jpg](A978-1-4842-1560-9_1_Fig40_HTML.jpg)\n\
    \nFigure 40. Ubiquity Container Identifiers\n\nIn Figure [40](#A978-1-4842-1560-9_1_Chapter.html#Fig40),\
    \ you can see that a key called `Ubiquity Container Identifiers` exists in the\
    \ application’s entitlements file, but this key is empty and has no value.\n\n\
    When you remove the key, the application works again.\n\nIf your problem is not\
    \ related to the application’s entitlement, the messages on console can give you\
    \ clues about it.\n\n## Handoff Between iOS and Mac Clogged\n\nThis is one of\
    \ the hardest problems we have ever encountered.\n\nYou are developing an iOS\
    \ and an OS X version of the same application and you want to use `Handoff` to\
    \ transfer activities between platforms.\n\nEverything is working fine, but suddenly\
    \ the plumbing between iOS and Mac applications clogs and `Handoff` stops working.\
    \ Your iOS application posts new `Handoff` activities, but OS X does not respond\
    \ to them.\n\nWe have prepared a systematic list of everything you must correct\
    \ to unblock the pipes.\n\n### On your iOS device\n\nPress the device’s Home Button\
    \ to go to the Home Screen. Tap Settings ➤ General ➤ Handoff & Suggested Apps\
    \ and see if Handoff, My Apps, and App Store are on (see items from ➊ to ➏ in\
    \ Figures [41](#A978-1-4842-1560-9_1_Chapter.html#Fig41), [42](#A978-1-4842-1560-9_1_Chapter.html#Fig42),\
    \ [43](#A978-1-4842-1560-9_1_Chapter.html#Fig43), and [44](#A978-1-4842-1560-9_1_Chapter.html#Fig44)).\n\
    \n![A978-1-4842-1560-9_1_Fig44_HTML.jpg](A978-1-4842-1560-9_1_Fig44_HTML.jpg)\n\
    \nFigure 44. Handoff\n\n![A978-1-4842-1560-9_1_Fig43_HTML.jpg](A978-1-4842-1560-9_1_Fig43_HTML.jpg)\n\
    \nFigure 42. Settings\n\n![A978-1-4842-1560-9_1_Fig42_HTML.jpg](A978-1-4842-1560-9_1_Fig42_HTML.jpg)\n\
    \nFigure 41. Shameless advertising showing applications created by the author\
    \ and the Home Screen\n\n![A978-1-4842-1560-9_1_Fig41_HTML.jpg](A978-1-4842-1560-9_1_Fig41_HTML.jpg)\n\
    \nFigure 43. Handoff & suggested apps\n\nMake sure Wi-Fi and Bluetooth are configured\
    \ and working on your device. Verify if you have a working Internet connection.\n\
    \n### On your Mac\n\nCheck if your Mac supports `Handoff`. Tap ➤ About This Mac\
    \ ➤ System Report ➤ Bluetooth and check if Handoff Supported entry shows as Yes\
    \ (Figure [45](#A978-1-4842-1560-9_1_Chapter.html#Fig45)).\n\n![A978-1-4842-1560-9_1_Fig45_HTML.jpg](A978-1-4842-1560-9_1_Fig45_HTML.jpg)\n\
    \nFigure 45. Handoff supported\n\nVerify if Bluetooth is on. Verify if you have\
    \ a working Internet connection.\n\n### On Mac OS X\n\nYou can increase the verbosity\
    \ level of `sharingd` (the daemon responsible for `Handoff`, among other things)\
    \ by restarting OS X after setting a sneaky preference flag. For that matter,\
    \ launch `Terminal`, type the following command, and press the Return key.\n\n\
    `defaults write com.apple.Sharing EnableDebugLogging -bool TRUE`\n\nOS X will\
    \ show `sharingd` messages on `Console`.\n\n### On your project\n\n- Check if\
    \ you are updating the `NSUserActivity` by using `addUserInfoEntriesFromDictionary`.\
    \ Do not update the `userInfo` dictionary directly.\n- Your Mac application must\
    \ be sandboxed and signed with your Team ID. Turn on App Sandbox in the Capabilities\
    \ tab of your OS X target.\n- Check if you have added keys like the following\
    \ ones to the `Info.plist` file:\n```\n<key>NSUserActivityTypes</key>\n<array>\n\
    \    <string>XXXXX</string>\n</array>\n```\nwhere `XXXXX` is the activity described\
    \ like `com.myCompany.myApp.activity`.\n\n## Stubborn App’s Ubiquitous Container\n\
    \nYour application is using iCloud Drive, but the folders and files you create\
    \ are not exposed publicly on iCloud.\n\nDebugging iCloud is a complex task, especially\
    \ because the only tool available for that matter on Xcode is the iCloud Debug\
    \ Gauge (Figure [46](#A978-1-4842-1560-9_1_Chapter.html#Fig46)), and that gauge\
    \ has been broken since Xcode 6. Chances are that the gauge will show your app’s\
    \ iCloud status as `Disabled` (➊) all the time.\n\n![A978-1-4842-1560-9_1_Fig46_HTML.jpg](A978-1-4842-1560-9_1_Fig46_HTML.jpg)\n\
    \nFigure 46. iCloud debug gauge\n\n### Verify this\n\nHere are a few things you\
    \ should verify to expose your application’s folder on iCloud:\n\n- iCloud capability\
    \ must be turned on for `iCloud Documents` using the default container or some\
    \ custom container you have defined.\n- The entitlements file must be something\
    \ like the following:\n```\n<key>com.apple.developer.icloud-container-identifiers</key>\n\
    <array>\n    <string>iCloud.$(CFBundleIdentifier)</string>\n</array>\n<key>com.apple.developer.icloud-services</key>\n\
    <array>\n    <string>CloudDocuments</string>\n</array>\n<key>com.apple.developer.ubiquity-container-identifiers</key>\n\
    <array/>\n```\n- Have you added keys like these to the `Info.plist` file?\n```\n\
    <key>NSUbiquitousContainers</key>\n<dict>\n    <key>iCloud.$(CFBundleIdentifier)</key>\n\
    \    <dict>\n        <key>NSUbiquitousContainerIsDocumentScopePublic</key>\n \
    \       <true/>\n        <key>NSUbiquitousContainerSupportedFolderLevels</key>\n\
    \        <string>Any</string>\n        <key>NSUbiquitousContainerName</key>\n\
    \        <string>MyApp</string>\n    </dict>\n</dict>\n```"
  raw: '## Finished Running Problem


    You build and run your Mac or iOS application. Xcode compiles everything correctly.
    Xcode shows the following messages: “Building MyGreatApp...” and “Running MyGreatApp”
    and immediately after that terminates the application showing “Finished Running
    MyGreatApp.” No error messages, no crash, no nothing, and also no application
    running.


    ### We have warned you about the punishments


    As we have said before, when the Gods punish you, they prevent Xcode from presenting
    any error message that can hint about the problem. But we can annoy these supreme
    entities and have the last laugh by thinking outside the box.


    We know that OS X’s `console` always shows error messages from applications running
    on the system, including Xcode. So, this is the first thing we have to check.


    `Console` is a log viewer present on all versions of UNIX, including Mac OS X.
    It allows users to search through all of the system’s logged messages and can
    alert the user when certain types of messages are logged.


    To launch `console`, click OS X’s `Spotlight`, type `console`, and press the `Return`
    key.


    Keep the console window open, build and run your application again, and see if
    any message pops up about your application. In our case, we saw an entry like
    the following:


    `taskgated[98]: killed com.myGreatApp because its use of the com.apple.developer.ubiquity-container-identifiers
    entitlement is not allowed (error code -67050)`


    In other words, our application was killed by `taskgated` for trying to use a
    functionality not authorized by its entitlements. In other words, OS X killed
    our application for trying to do something that was not authorized by its entitlements.
    The question is, What exactly was it?


    For some strange reason that just confirms that Xcode really hates us, a key called
    `Ubiquity Container Identifiers` `was randomly added to our` application’s entitlements,
    without our knowledge and against our wishes, we swear.


    To check if your application has something wrong with its entitlements, localize
    and open the application’s entitlements window by selecting the file on Xcode’s
    `Project Navigator`. Figure [40](#A978-1-4842-1560-9_1_Chapter.html#Fig40) shows
    the file and an example of entitlements.


    ![A978-1-4842-1560-9_1_Fig40_HTML.jpg](A978-1-4842-1560-9_1_Fig40_HTML.jpg)


    Figure 40.


    Ubiquity Container Identifiers


    In Figure [40](#A978-1-4842-1560-9_1_Chapter.html#Fig40), you can see that a key
    called `Ubiquity Container Identifiers` exists in the application’s entitlements
    file, but this key is empty and has no value.


    When you remove the key, the application works again.


    If your problem is not related to the application’s entitlement, the messages
    on console can give you clues about it.


    ## Handoff Between iOS and Mac Clogged


    This is one of the hardest problems we have ever encountered.


    You are developing an iOS and an OS X version of the same application and you
    want to use `Handoff` to transfer activities between platforms.


    Everything is working fine, but suddenly the plumbing between iOS and Mac applications
    clogs and `Handoff` stops working. Your iOS application posts new `Handoff` activities,
    but OS X does not respond to them.


    We have prepared a systematic list of everything you must correct to unblock the
    pipes.


    ### On your iOS device


    Press the device’s Home Button to go to the Home Screen.   Tap Settings ➤ General
    ➤ Handoff & Suggested Apps and see if Handoff, My Apps, and App Store are on (see
    items from ➊ to ➏ in Figures [41](#A978-1-4842-1560-9_1_Chapter.html#Fig41), [42](#A978-1-4842-1560-9_1_Chapter.html#Fig42),
    [43](#A978-1-4842-1560-9_1_Chapter.html#Fig43), and [44](#A978-1-4842-1560-9_1_Chapter.html#Fig44)).


    ![A978-1-4842-1560-9_1_Fig44_HTML.jpg](A978-1-4842-1560-9_1_Fig44_HTML.jpg)


    Figure 44.


    Handoff


    ![A978-1-4842-1560-9_1_Fig43_HTML.jpg](A978-1-4842-1560-9_1_Fig43_HTML.jpg)


    Figure 42.


    Settings


    ![A978-1-4842-1560-9_1_Fig42_HTML.jpg](A978-1-4842-1560-9_1_Fig42_HTML.jpg)


    Figure 41.


    Shameless advertising showing applications created by the author and the Home
    Screen


    ![A978-1-4842-1560-9_1_Fig41_HTML.jpg](A978-1-4842-1560-9_1_Fig41_HTML.jpg)


    Figure 43.


    Handoff & suggested apps  Make sure Wi-Fi and Bluetooth are configured and working
    on your device.   Verify if you have a working Internet connection.


    ### On your Mac


    Check if your Mac supports `Handoff`. Tap ➤ About This Mac ➤ System Report ➤ Bluetooth
    and check if Handoff Supported entry shows as Yes (Figure [45](#A978-1-4842-1560-9_1_Chapter.html#Fig45)).


    ![A978-1-4842-1560-9_1_Fig45_HTML.jpg](A978-1-4842-1560-9_1_Fig45_HTML.jpg)


    Figure 45.


    Handoff supported  Verify if Bluetooth is on.   Verify if you have a working Internet
    connection.


    ### On Mac OS X


    You can increase the verbosity level of `sharingd` (the daemon responsible for
    `Handoff`, among other things) by restarting OS X after setting a sneaky preference
    flag. For that matter, launch `Terminal`, type the following command, and press
    the Return key.


    `defaults write com.apple.Sharing EnableDebugLogging -bool TRUE`


    OS X will show `sharingd` messages on `Console`.


    ### On your project


    Check if you are updating the `NSUserActivity` by using `addUserInfoEntriesFromDictionary`.
    Do not update the `userInfo` dictionary directly.   Your Mac application must
    be sandboxed and signed with your Team ID. Turn on App Sandbox in the Capabilities
    tab of your OS X target.   Check if you have added keys like the following ones
    to the `Info.plist` file: `<key>NSUserActivityTypes</key>` `<array>`     `<string>XXXXX</string>`
    `</array>` where `XXXXX` is the activity described like `com.myCompany.myApp.activity`.


    ## Stubborn App’s Ubiquitous Container


    Your application is using iCloud Drive, but the folders and files you create are
    not exposed publicly on iCloud.


    Debugging iCloud is a complex task, especially because the only tool available
    for that matter on Xcode is the iCloud Debug Gauge (Figure [46](#A978-1-4842-1560-9_1_Chapter.html#Fig46)),
    and that gauge has been broken since Xcode 6\. Chances are that the gauge will
    show your app’s iCloud status as `Disabled` (➊) `all the time`.


    ![A978-1-4842-1560-9_1_Fig46_HTML.jpg](A978-1-4842-1560-9_1_Fig46_HTML.jpg)


    Figure 46.


    iCloud debug gauge


    ### Verify this


    Here are a few things you should verify to expose your application’s folder on
    iCloud:


    iCloud capability must be turned on for `iCloud Documents` using the default container
    or some custom container you have defined.   The entitlements file must be something
    like the following: `<key>com.apple.developer.icloud-container-` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)
                    `identifiers</key>` `<array>`     `<string>iCloud.$(CFBundleIdentifier)</string>`
    `</array>` `<key>com.apple.developer.icloud-services</key>` `<array>`     `<string>CloudDocuments</string>`
    `</array>` `<key>com.apple.developer.ubiquity-container-` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)
               `identifiers</key>` `<array/>`   Have you added keys like these to
    the `Info.plist` file? `<key>NSUbiquitousContainers</key>` `<dict>`     `<key>iCloud.$(CFBundleIdentifier)</key>`
        `<dict>`     `<key>NSUbiquitousContainerIsDocumentScopePublic</key>`     `<true/>`
        `<key>NSUbiquitousContainerSupportedFolderLevels</key>`     `<string>Any</string>`
        `<key>NSUbiquitousContainerName</key>`     `<string>MyApp</string>` `</dict>`'
  trans: "\n# 完成运行问题\n\n你构建并运行 Mac 或 iOS 应用程序。Xcode 正确编译了所有内容。Xcode 显示以下信息：“正在构建 MyGreatApp...”和“正在运行\
    \ MyGreatApp”，紧接着就终止了应用程序，并显示“已完成运行 MyGreatApp。”。没有任何错误信息，没有崩溃，什么也没有，同时也没有应用程序在运行。\n\
    \n## 我们曾警告过你将受到的惩罚\n\n正如我们之前所说，当神灵惩罚你时，它们会阻止 Xcode 显示任何能暗示问题的错误信息。但我们可以通过打破常规思维来激怒这些至高无上的存在，并笑到最后。\n\
    \n我们知道 OS X 的 `console` 始终会显示系统上运行的应用程序（包括 Xcode）所产生的错误信息。所以，这是我们必须检查的第一件事。\n\n\
    `Console` 是存在于所有 UNIX 版本（包括 Mac OS X）中的一个日志查看器。它允许用户搜索系统中所有已记录的日志信息，并能在记录特定类型信息时提醒用户。\n\
    \n要启动 `console`，请点击 OS X 的 `Spotlight`，输入 `console`，然后按下 `Return` 键。\n\n保持控制台窗口打开，再次构建并运行你的应用程序，查看是否有关于你应用程序的信息弹出。在我们的案例中，我们看到了一条类似这样的记录：\n\
    \n`taskgated[98]: 已终止 com.myGreatApp，因为其使用 com.apple.developer.ubiquity-container-identifiers\
    \ 授权不被允许 (错误代码 -67050)`\n\n换句话说，我们的应用程序因为试图使用其授权未许可的功能而被 `taskgated` 终止。再换句话说，OS\
    \ X 因为我们的应用程序试图执行其授权未授权的操作而终止了它。问题是，到底是什么操作呢？\n\n出于某种奇怪的原因（这恰恰证实了 Xcode 确实非常憎恨我们），一个名为\
    \ `Ubiquity Container Identifiers` 的键被随机添加到了我们应用程序的授权文件中，而且我们发誓，这绝非我们本意，也违背了我们的意愿。\n\
    \n要检查你的应用程序的授权是否有问题，请在 Xcode 的 `Project Navigator` 中选择该授权文件，定位并打开应用程序的授权窗口。图 40\
    \ 显示了该文件以及授权的一个示例。\n\n![A978-1-4842-1560-9_1_Fig40_HTML.jpg](img/A978-1-4842-1560-9_1_Fig40_HTML.jpg)\n\
    \n图 40. Ubiquity Container Identifiers\n\n在图 40 中，你可以看到应用程序的授权文件中存在一个名为 `Ubiquity\
    \ Container Identifiers` 的键，但这个键是空的，没有值。\n\n当你移除这个键后，应用程序就能再次正常运行了。\n\n如果你的问题与应用程序的授权无关，控制台上的信息也能为你提供线索。\n\
    \n## iOS 与 Mac 之间的 Handoff 堵塞\n\n这是我们遇到过的最棘手的问题之一。\n\n你正在开发同一应用程序的 iOS 和 OS X\
    \ 版本，并希望使用 `Handoff` 在平台之间传输活动。\n\n一切运行正常，但突然间，iOS 和 Mac 应用程序之间的管道堵塞了，`Handoff`\
    \ 停止了工作。你的 iOS 应用程序发布了新的 `Handoff` 活动，但 OS X 没有响应。\n\n我们准备了一份系统性的检查清单，列出了你必须修正的所有事项，以疏通这些管道。\n\
    \n### 在你的 iOS 设备上\n\n按下设备的 Home 按钮返回主屏幕。轻点“设置” ➤ “通用” ➤ “Handoff 与建议的 App”，查看\
    \ Handoff、我的 App 以及 App Store 是否已开启（参见图 41、42、43 和 44 中的 ➊ 至 ➏ 项）。\n\n![A978-1-4842-1560-9_1_Fig44_HTML.jpg](img/A978-1-4842-1560-9_1_Fig44_HTML.jpg)\n\
    \n图 44. Handoff\n\n![A978-1-4842-1560-9_1_Fig43_HTML.jpg](img/A978-1-4842-1560-9_1_Fig43_HTML.jpg)\n\
    \n图 42. 设置\n\n![A978-1-4842-1560-9_1_Fig42_HTML.jpg](img/A978-1-4842-1560-9_1_Fig42_HTML.jpg)\n\
    \n图 41. 展示作者创建的应用程序及主屏幕的无耻广告\n\n![A978-1-4842-1560-9_1_Fig41_HTML.jpg](img/A978-1-4842-1560-9_1_Fig41_HTML.jpg)\n\
    \n图 43. Handoff 与建议的 App\n\n确保你的设备上 Wi-Fi 和蓝牙已配置并正常工作。验证你是否有可用的互联网连接。\n\n### 在你的\
    \ Mac 上\n\n检查你的 Mac 是否支持 `Handoff`。点击 ➤ “关于本机” ➤ “系统报告” ➤ “蓝牙”，并检查“Handoff 支持”条目是否显示为“是”（图\
    \ 45）。\n\n![A978-1-4842-1560-9_1_Fig45_HTML.jpg](img/A978-1-4842-1560-9_1_Fig45_HTML.jpg)\n\
    \n图 45. Handoff 支持\n\n验证蓝牙是否已开启。验证你是否有可用的互联网连接。\n\n### 在 Mac OS X 上\n\n你可以通过设置一个隐蔽的首选项标志后重启\
    \ OS X，来增加 `sharingd`（负责 `Handoff` 等功能的守护进程）的日志详细程度。为此，启动 `Terminal`，输入以下命令，然后按下\
    \ Return 键。\n\n`defaults write com.apple.Sharing EnableDebugLogging -bool TRUE`\n\
    \n之后 OS X 会在 `Console` 中显示 `sharingd` 的日志信息。\n\n### 在你的项目中\n\n- 检查你是否通过使用 `addUserInfoEntriesFromDictionary`\
    \ 来更新 `NSUserActivity`。不要直接更新 `userInfo` 字典。\n- 你的 Mac 应用程序必须被沙盒化，并使用你的团队 ID 进行签名。在你的\
    \ OS X 目标的“功能”标签页中开启“App Sandbox”。\n- 检查你是否已将类似以下键值添加到 `Info.plist` 文件中：\n```\n\
    <key>NSUserActivityTypes</key>\n<array>\n    <string>XXXXX</string>\n</array>\n\
    ```\n其中 `XXXXX` 是描述的活动，例如 `com.myCompany.myApp.activity`。\n\n## 顽固的应用通用容器\n\n\
    你的应用程序正在使用 iCloud Drive，但你创建的文件夹和文件并未在 iCloud 上公开显示。\n\n调试 iCloud 是一项复杂的任务，尤其是在\
    \ Xcode 中唯一可用的相关工具是 iCloud 调试计量器（图 46），而该计量器自 Xcode 6 以来就一直存在故障。很可能会一直显示你应用的 iCloud\
    \ 状态为“已禁用”（➊）。\n\n![A978-1-4842-1560-9_1_Fig46_HTML.jpg](img/A978-1-4842-1560-9_1_Fig46_HTML.jpg)\n\
    \n图 46. iCloud 调试计量器\n\n### 验证以下内容\n\n以下是你为了在 iCloud 上公开显示应用程序文件夹需要验证的几项内容：\n\n\
    -   必须为“iCloud 文档”开启 iCloud 功能，使用默认容器或你定义的某些自定义容器。\n-   授权文件必须类似于以下内容：\n```\n\
    <key>com.apple.developer.icloud-container-identifiers</key>\n<array>\n    <string>iCloud.$(CFBundleIdentifier)</string>\n\
    </array>\n<key>com.apple.developer.icloud-services</key>\n<array>\n    <string>CloudDocuments</string>\n\
    </array>\n<key>com.apple.developer.ubiquity-container-identifiers</key>\n<array/>\n\
    ```\n-   你是否已将这些键添加到 `Info.plist` 文件中？\n```\n<key>NSUbiquitousContainers</key>\n\
    <dict>\n    <key>iCloud.$(CFBundleIdentifier)</key>\n    <dict>\n        <key>NSUbiquitousContainerIsDocumentScopePublic</key>\n\
    \        <true/>\n        <key>NSUbiquitousContainerSupportedFolderLevels</key>\n\
    \        <string>Any</string>\n        <key>NSUbiquitousContainerName</key>\n\
    \        <string>MyApp</string>\n    </dict>\n</dict>\n```\n"
- fmt: "### Here comes the secret “spell” ...\n\nEvery time you change something on\
    \ your application’s iCloud configuration, like the container name or container\
    \ identifier, increase your application `Info.plist`’s version and build –`CFBundleShortVersionString`\
    \ and `CFBundleVersion`, respectively, and make sure your application runs the\
    \ following line at launch:\n\n```\n[[NSFileManager defaultManager] URLForUbiquityContainerIdentifier:nil];\n\
    ```\n\n**Note:** Mac OS X comes with a tool called `brctl`, which is a manager\
    \ for the `CloudDocs` daemon and responsible for transferring files from your\
    \ device to iCloud. To use this tool, launch `Terminal`, type the following command,\
    \ and press the Return key:\n\n```\nbrctl log --wait --shorten\n```\n\n### Where\
    \ you can see the files...\n\nOnce the files and folders are exposed on the iCloud\
    \ Drive, you can see them in any of the following places:\n\n- On your device’s\
    \ Settings ➤ iCloud ➤ Manage Storage ➤ Documents & Data;\n- On Mac OS X’s iCloud\
    \ Drive folder;\n- Inside your application by using `UIDocumentPicker` called\
    \ by the following code:\n\n#### Swift\n\n```\n@IBAction func openImportDocumentPicker(sender\
    \ : AnyObject) {\n    let documentPicker = UIDocumentPickerViewController(documentTypes:\
    \ [\"public.image\"],\n                                                      \
    \ inMode: UIDocumentPickerMode.Import)\n    documentPicker.modalPresentationStyle\
    \ = UIModalPresentationStyle.FormSheet\n    self.presentViewController(documentPicker,\
    \ animated: true) { () -> Void in  }\n}\n```\n\n#### Objective-C\n\n```\n- (IBAction)openImportDocumentPicker:(id)sender\
    \ {\n   UIDocumentPickerViewController *documentPicker =\n                   \
    \      [[UIDocumentPickerViewController alloc]\n                             \
    \   initWithDocumentTypes:@[@\"public.image\"]\n                             \
    \                 inMode:UIDocumentPickerModeImport];\n   documentPicker.modalPresentationStyle\
    \ = UIModalPresentationFormSheet;\n   [self presentViewController:documentPicker\
    \ animated:YES completion:nil];\n}\n```\n\n## Power Tips\n\nMaking life easier\
    \ for a developer involves not only solving problems inside Xcode, as this book\
    \ has tried to do, but also doing things and using tools outside Xcode that can\
    \ help development. The following sections review some of these tools.\n\n###\
    \ CocoaPods\n\nAccording to CocoaPods’ web site, CocoaPods is the dependency manager\
    \ for Swift and Objective-C Cocoa projects. It has almost 10,000 libraries and\
    \ can help you scale your projects elegantly. Briefly, CocoaPods is a huge archive\
    \ containing thousands of libraries and open source code that you can use on your\
    \ projects—code that will not only accelerate development but also make development\
    \ easier. It is very easy to use CocoaPods on your projects, and there are a lot\
    \ of tutorials on the Web that explain it.\n\n[`www.cocoapods.org`](http://www.cocoapods.org/)\n\
    \n### GitHub\n\nAnother good source for open source code for your projects is\
    \ GitHub. Many projects hosted with GitHub can be easily imported into your projects\
    \ using CocoaPods. So, don’t forget to check them out:\n\n[`www.github.com`](http://www.github.com/)\n\
    \n### StackOverflow\n\nIf everything else fails, try StackOverflow. Following\
    \ is StackOverflow’s own official definition: “Stack Overflow is a question and\
    \ answer site for professional and enthusiast programmers. It’s built and run\
    \ by you as part of the [Stack Exchange](http://stackexchange.com/) network of\
    \ Q&A sites. With your help, we’re working together to build a library of detailed\
    \ answers to every question about programming.” StackOverflow is to our knowledge\
    \ the best web site for posting questions and getting fast and high-quality answers.\n\
    \n[`www.stackoverflow.com`](http://www.stackoverflow.com/)\n\n### fastlane Tools\n\
    \nAccording to fastlane’s web site, “fastlane lets you define and run your deployment\
    \ pipelines for different environments. It helps you unify your app’s release\
    \ process and automate the whole process. fastlane connects all fastlane tools\
    \ and third-party tools, like [CocoaPods](http://cocoapods.org/) and [xctool](https://github.com/facebook/xctool).”\
    \ By saying “automate the whole process,” fastlane means using Terminal to do\
    \ a lot of things related to the development and delivery of your apps and removing\
    \ the Calvary and suffering related with dealing with iTunesConnect and with the\
    \ Developer Portal, including the provisioning profiles nightmare.\n\n[`http://fastlane.tools`](http://fastlane.tools/)\n\
    \n### HandBrake\n\n`HandBrake` is an open source tool for converting videos from\
    \ nearly any format to a selection of modern, widely supported codecs. We have\
    \ seen `Handbrake` converting videos that are 1.2GB in size up to 16 Mb with no\
    \ noticeable loss in picture quality.\n\n[`http://handbrake.fr`](http://handbrake.fr/)\n\
    \n### Alcatraz\n\nAccording to Alcatraz’s web site, “Alcatraz is an open source\
    \ package manager for Xcode. It lets you discover and install plug-ins, templates,\
    \ and color schemes without the need for manually cloning or copying files.” In\
    \ other words, Alcatraz lets you install a lot of useful plug-ins that help you\
    \ improve Xcode.\n\n[`www.alcatraz.io`](http://www.alcatraz.io/)\n\n## Appendix\n\
    \nThe following table provides all the `NSLocale` codes used by Apple devices\
    \ for localizations. Apple uses the codes created by the International Organization\
    \ for Standardization (ISO), which is an independent, nongovernmental membership\
    \ organization and the world’s largest developer of voluntary international standards.\
    \ Visit [`www.iso.org`](http://www.iso.org/) for more information.\n\nThe table\
    \ in this appendix is a compilation of the ISO codes and shows generic entries\
    \ like “en” for “English” and specific ones like “en_AU” for “Australian English”\
    \ or “en_JM” for “Jamaican English.” The English language, itself, has almost\
    \ 30 variations. If you use a specific one, that localization will only be visible\
    \ if the device is adjusted for using that variation. By using the generic “en,”\
    \ you guarantee that all devices adjusted with a variation of English will see\
    \ the localization. That is also true when you create localizations on the App\
    \ Store from iTunesConnect."
  raw: '### Here comes the secret “spell” ...


    Every time you change something on your application’s iCloud configuration, like
    the container name or container identifier, increase your application `Info.plist`’s
    version and build `–CFBundleShortVersionString` and `CFBundleVersion`, respectively,
    and make sure your application runs the following line at launch:


    `[[NSFileManager defaultManager]` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)
    `URLForUbiquityContainerIdentifier:nil];`


    Note


    Mac OS X comes with a tool called `brctl`, which is a manager for the `CloudDocs`
    daemon and responsible for transferring files from your device to iCloud.


    To use this tool, launch `Terminal`, type the following command, and press the
    Return key:


    `brctl log --wait --shorten`


    ### Where you can see the files...


    Once the files and folders are exposed on the iCloud Drive, you can see them in
    any of the following places:


    On your device’s Settings ➤ iCloud ➤ Manage Storage ➤ Documents & Data;   On Mac
    OS X’s iCloud Drive folder;   Inside your application by using `UIDocumentPicker`
    called by the following code:


    ### Swift


    `@IBAction func openImportDocumentPicker(sender : AnyObject) {`


        `let documentPicker = UIDocumentPickerViewController` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


            `(documentTypes: ["public.image"],` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                         `inMode: UIDocumentPickerMode.Import)`


        `documentPicker.modalPresentationStyle =` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                                          `UIModalPresentationStyle.FormSheet`


        `self.presentViewController(documentPicker, animated: true)`


         `{ () -> Void in  }`


      `}`


    ### Objective-C


    `- (IBAction)openImportDocumentPicker:(id)sender {`


       `UIDocumentPickerViewController *documentPicker =` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                             `[[UIDocumentPickerViewController alloc]` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                                    `initWithDocumentTypes:@[@"public.image"]` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                  `inMode:UIDocumentPickerModeImport];`


       `documentPicker.modalPresentationStyle =` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                              `UIModalPresentationFormSheet;`


       `[self presentViewController:documentPicker`


                          `animated:YES completion:nil];`


    `}`


    ## Power Tips


    Making life easier for a developer involves not only solving problems inside Xcode,
    as this book has tried to do, but also doing things and using tools outside Xcode
    that can help development.


    The following sections review some of these tools.


    ### CocoaPods


    According to CocoaPods’ web site, CocoaPods is the dependency manager for Swift
    and Objective-C Cocoa projects. It has almost 10,000 libraries and can help you
    scale your projects elegantly.


    Briefly, CocoaPods is a huge archive containing thousands of libraries and open
    source code that you can use on your projects—code that will not only accelerate
    development but also make development easier.


    It is very easy to use CocoaPods on your projects, and there are a lot of tutorials
    on the Web that explain it.


    [`www.cocoapods.org`](http://www.cocoapods.org/)


    ### GitHub


    Another good source for open source code for your projects is GitHub. Many projects
    hosted with GitHub can be easily imported into your projects using CocoaPods.
    So, don’t forget to check them out:


    [`www.github.com`](http://www.github.com/)


    ### StackOverflow


    If everything else fails, try StackOverflow.


    Following is StackOverflow’s own official definition: “Stack Overflow is a question
    and answer site for professional and enthusiast programmers. It’s built and run
    by you as part of the [Stack Exchange](http://stackexchange.com/) network of Q&A
    sites. With your help, we’re working together to build a library of detailed answers
    to every question about programming.”


    StackOverflow is to our knowledge the best web site for posting questions and
    getting fast and high-quality answers.


    [`www.stackoverflow.com`](http://www.stackoverflow.com/)


    ### fastlane Tools


    According to fastlane’s web site, “fastlane lets you define and run your deployment
    pipelines for different environments. It helps you unify your app’s release process
    and automate the whole process. fastlane connects all fastlane tools and third-party
    tools, like [CocoaPods](http://cocoapods.org/) and [xctool](https://github.com/facebook/xctool).”


    By saying “automate the whole process,” fastlane means using Terminal to do a
    lot of things related to the development and delivery of your apps and removing
    the Calvary and suffering related with dealing with iTunesConnect and with the
    Developer Portal, including the provisioning profiles nightmare.


    [`http://fastlane.tools`](http://fastlane.tools/)


    ### HandBrake


    `HandBrake` is an open source tool for converting videos from nearly any format
    to a selection of modern, widely supported codecs. We have seen `Handbrake` converting
    videos that are 1.2GB in size up to 16 Mb with no noticeable loss in picture quality.


    [`http://handbrake.fr`](http://handbrake.fr/)


    ### Alcatraz


    According to Alcatraz’s web site, “Alcatraz is an open source package manager
    for Xcode. It lets you discover and install plug-ins, templates, and color schemes
    without the need for manually cloning or copying files.”


    In other words, Alcatraz lets you install a lot of useful plug-ins that help you
    improve Xcode.


    [`www.alcatraz.io`](http://www.alcatraz.io/)


    ## Appendix


    The following table provides all the `NSLocale` codes used by Apple devices for
    localizations.


    Apple uses the codes created by the International Organization for Standardization
    (ISO), which is an independent, nongovernmental membership organization and the
    world’s largest developer of voluntary international standards. Visit [`www.iso.org`](http://www.iso.org/)
    for more information.


    The table in this appendix is a compilation of the ISO codes and shows generic
    entries like “en” for “English” and specific ones like “en_AU” for “Australian
    English” or “en_JM” for “Jamaican English.” The English language, itself, has
    almost 30 variations. If you use a specific one, that localization will only be
    visible if the device is adjusted for using that variation. By using the generic
    “en,” you guarantee that all devices adjusted with a variation of English will
    see the localization. That is also true when you create localizations on the App
    Store from iTunesConnect.'
  trans: "\n### 秘密“咒语”在此……\n\n每次你在应用的 iCloud 配置中修改任何内容（例如容器名称或容器标识符）时，都需要增加应用 `Info.plist`\
    \ 的版本号和构建号——分别对应 `CFBundleShortVersionString` 和 `CFBundleVersion`，并确保你的应用在启动时运行以下代码行：\n\
    \n```\n[[NSFileManager defaultManager] URLForUbiquityContainerIdentifier:nil];\n\
    ```\n\n**注意：** Mac OS X 自带一个名为 `brctl` 的工具，它是 `CloudDocs` 守护进程的管理器，负责将文件从你的设备传输到\
    \ iCloud。要使用此工具，请启动 `终端`，输入以下命令，然后按回车键：\n\n```\nbrctl log --wait --shorten\n```\n\
    \n### 在哪里可以查看文件……\n\n当文件和文件夹暴露在 iCloud 云端盘上后，你可以通过以下任一位置查看它们：\n\n- 在设备的“设置”➤“iCloud”➤“管理储存空间”➤“文稿与数据”中；\n\
    - 在 Mac OS X 的 iCloud 云端盘文件夹中；\n- 在你的应用内部，通过使用 `UIDocumentPicker` 并由以下代码调用：\n\n\
    #### Swift\n\n```\n@IBAction func openImportDocumentPicker(sender : AnyObject)\
    \ {\n    let documentPicker = UIDocumentPickerViewController(documentTypes: [\"\
    public.image\"],\n                                                       inMode:\
    \ UIDocumentPickerMode.Import)\n    documentPicker.modalPresentationStyle = UIModalPresentationStyle.FormSheet\n\
    \    self.presentViewController(documentPicker, animated: true) { () -> Void in\
    \  }\n}\n```\n\n#### Objective-C\n\n```\n- (IBAction)openImportDocumentPicker:(id)sender\
    \ {\n   UIDocumentPickerViewController *documentPicker =\n                   \
    \      [[UIDocumentPickerViewController alloc]\n                             \
    \   initWithDocumentTypes:@[@\"public.image\"]\n                             \
    \                 inMode:UIDocumentPickerModeImport];\n   documentPicker.modalPresentationStyle\
    \ = UIModalPresentationFormSheet;\n   [self presentViewController:documentPicker\
    \ animated:YES completion:nil];\n}\n```\n\n## 实用技巧\n\n让开发者的工作更轻松，不仅包括解决 Xcode\
    \ 内部的问题（正如本书一直试图做到的），还包括在 Xcode 之外使用一些工具和方法来辅助开发。以下部分介绍了一些这样的工具。\n\n### CocoaPods\n\
    \n根据 CocoaPods 官网介绍，CocoaPods 是 Swift 和 Objective-C Cocoa 项目的依赖管理器。它拥有近 10,000\
    \ 个库，可以帮助你优雅地扩展项目。简而言之，CocoaPods 是一个巨大的归档库，包含数千个库和开源代码，你可以在项目中使用这些代码——这些代码不仅能加速开发，还能让开发过程更轻松。在你的项目中使用\
    \ CocoaPods 非常简单，网上也有很多教程对其进行了说明。\n\n[`www.cocoapods.org`](http://www.cocoapods.org/)\n\
    \n### GitHub\n\n为你的项目寻找开源代码的另一个好来源是 GitHub。许多托管在 GitHub 上的项目都可以通过 CocoaPods 轻松导入到你的项目中。所以，别忘了去看看它们：\n\
    \n[`www.github.com`](http://www.github.com/)\n\n### StackOverflow\n\n如果其他方法都没用，试试\
    \ StackOverflow。以下是 StackOverflow 的官方定义：“Stack Overflow 是一个面向专业和业余程序员的问答网站。它由你构建并运营，是\
    \ [Stack Exchange](http://stackexchange.com/) 问答网站网络的一部分。有了你的帮助，我们正在共同努力建立一个关于每个编程问题的详细答案库。”据我们所知，StackOverflow\
    \ 是发布问题并获得快速高质量答案的最佳网站。\n\n[`www.stackoverflow.com`](http://www.stackoverflow.com/)\n\
    \n### fastlane 工具\n\n根据 fastlane 官网介绍，“fastlane 让你能够定义并运行针对不同环境的部署流水线。它帮助你统一应用的发布流程，并自动化整个过程。fastlane\
    \ 连接了所有 fastlane 工具和第三方工具，例如 [CocoaPods](http://cocoapods.org/) 和 [xctool](https://github.com/facebook/xctool)。”所谓“自动化整个过程”，fastlane\
    \ 指的是使用终端来处理大量与应用开发和交付相关的事务，消除处理 iTunesConnect 和开发者门户时的繁琐与痛苦，包括配置文件带来的噩梦。\n\n\
    [`http://fastlane.tools`](http://fastlane.tools/)\n\n### HandBrake\n\n`HandBrake`\
    \ 是一个开源工具，用于将几乎所有格式的视频转换为一系列现代、广泛支持的编码格式。我们见过 `Handbrake` 将 1.2GB 大小的视频转换为 16MB，且画质没有明显损失。\n\
    \n[`http://handbrake.fr`](http://handbrake.fr/)\n\n### Alcatraz\n\n根据 Alcatraz\
    \ 官网介绍，“Alcatraz 是一个面向 Xcode 的开源包管理器。它让你无需手动克隆或复制文件即可发现并安装插件、模板和配色方案。”换句话说，Alcatraz\
    \ 可以让你安装许多有用的插件，帮助改进 Xcode。\n\n[`www.alcatraz.io`](http://www.alcatraz.io/)\n\n\
    ## 附录\n\n下表提供了 Apple 设备用于本地化的所有 `NSLocale` 代码。Apple 使用的是国际标准化组织（ISO）创建的代码，ISO\
    \ 是一个独立的、非政府成员组织，也是世界上最大的自愿性国际标准制定者。更多信息请访问 [`www.iso.org`](http://www.iso.org/)。\n\
    \n本附录中的表格是 ISO 代码的汇编，既包含像“en”代表“英语”这样的通用条目，也包含像“en_AU”代表“澳大利亚英语”或“en_JM”代表“牙买加英语”这样的特定条目。英语本身就有近\
    \ 30 种变体。如果你使用特定的变体，只有设备设置为使用该变体时，该本地化内容才会可见。而使用通用的“en”，则可以保证所有设置为英语变体的设备都能看到该本地化内容。当你在\
    \ iTunesConnect 的 App Store 上创建本地化时，这也同样适用。\n"
