    \n```\nSKPhysicsBody *tempBody = node.physicsBody;\ntempBody.dynamic = NO;\nnode.physicsBody\
    \ = tempBody;\n```\n\n**Note**  \nThis solution must be used just to confirm the\
    \ problem. You must check your code and prevent it from changing the properties\
    \ of both `physicsBody` to static during `didBeginContact:`\n\nThis solution does\
    \ not work correctly if your `physicsBody` belongs to a node that was scaled up\
    \ or down. In this case, when you assign the `tempBody` back to the object, it\
    \ will create a `physicsBody` that is not scaled.\n\n## SpriteKit Object Is Not\
    \ Respecting Boundaries?\n\nYou have SpriteKit objects using paths as their `physicsBody`\
    \ boundaries, but these objects are not respecting the edges/boundaries of other\
    \ objects.\n\nAll paths used by SpriteKit objects should be convex and created\
    \ with vertices drawn in counter-clockwise order (Figure [25](#A978-1-4842-1560-9_1_Chapter.html#Fig25)).\n\
    \n![A978-1-4842-1560-9_1_Fig25_HTML.jpg](A978-1-4842-1560-9_1_Fig25_HTML.jpg)\n\
    \n**Figure 25.** Convex shape drawn in the correct order\n\nVerify if your paths\
    \ are following this rule or if any shape created with them is non-convex (Figure\
    \ [26](#A978-1-4842-1560-9_1_Chapter.html#Fig26)).\n\n![A978-1-4842-1560-9_1_Fig26_HTML.jpg](A978-1-4842-1560-9_1_Fig26_HTML.jpg)\n\
    \n**Figure 26.** Non-convex shape; order of vertices doesn’t matter\n\n**Note**\
    \  \nYou can detect if a shape is non-convex by drawing a line between two points\
    \ inside the shape. If the connecting line falls outside the shape it is non-convex.\
    \ SpriteKit objects must be convex (Figure [25](#A978-1-4842-1560-9_1_Chapter.html#Fig25))\
    \ created with vertices drawn in counter-clockwise order.\n\n## A Case Against\
