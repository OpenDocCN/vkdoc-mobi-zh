    ## Breakpoints and NSLog Not Working


    When this problem occurs, Xcode will not stop on any defined breakpoint and, as
    a bonus, `NSLog` will not print anything to Xcode’s console.


    This problem is generally a result of one of two issues: a corrupted project file
    or a bad product scheme.


    For some reason, application extensions and Apple Watch targets are more likely
    to be affected by bad product schemes.


    Note


    Xcode loses control of things and product schemes are corrupted if you create
    and delete targets several times during the project.


    ### Project corruption


    First, try to clean the project by following the instructions found in the section
    “Xcode Crashing when Opening a Project File?” and see if the problem is solved.


    ### Bad product scheme


    If the problem is not solved, click Product ➤ Scheme➤ Manage Schemes, select all
    schemes, and delete them by clicking the minus sign at the bottom left. Then click
    the Autocreate Schemes Now button to re-create the schemes you just deleted.


    You can now build and run your project and the breakpoints will probably work.


    ## Slow Transitions Between ViewControllers


    If your application is using storyboards and the transitions between `ViewControllers`
    are taking too long, it is probably because iOS is having a hard time loading
    and instantiating the next `ViewController`. Perhaps the next `ViewController`
    has many elements that have to be loaded and it is taking too long.


    The logical solution to that problem would be to preload the next `ViewController`,
    but how do you do that?


    We have seen pages on the Web telling you to use `UIPageViewControllers` instead
    of storyboards to have smooth transitions between your `ViewControllers`, but
    this is far from being a good solution and will just create more problems.


    Storyboards do not offer a way to preload `ViewControllers`, but we can simulate
    that by using the code shown here in the `viewWillAppear` method of the current
    `ViewController`.


    ### Swift


    `override func viewWillAppear(animated: Bool) {`


      `super.viewWillAppear(animated)`


      `// This will preload the next ViewController`


      `dispatch_async(dispatch_get_main_queue()) {`


       `storyboard?.instantiateViewControllerWithIdentifier` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


               `("nextViewController")`


      `}`


    `}`


    ### Objective-C


    `- (void)viewWillAppear:(BOOL)animated {`


      `[super viewWillAppear:animated];`


      `// This will preload the next ViewController`


      `dispatch_async(dispatch_get_main_queue(),`


      `^{`


         `[self.storyboard` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


          `instantiateViewControllerWithIdentifier:`![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


