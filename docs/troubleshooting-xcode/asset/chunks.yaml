    \        let midY = CGRectGetMidY(frame)\n            return CGPointMake(midX,\
    \ midY)\n        }\n        set(newCenter) {\n            var newFrame = CGRectZero\n\
    \            newFrame.size = frame.size\n            let myWidth = CGRectGetWidth(frame)\n\
    \            let myHeight = CGRectGetHeight(frame)\n            let x = floor(newCenter.x\
    \ - (myWidth / 2.0))\n            let y = floor(newCenter.y - (myHeight / 2.0))\n\
    \            newFrame.origin.x = x\n            newFrame.origin.y = y\n      \
    \      frame = newFrame\n        }\n    }\n\n    var alpha: CGFloat {\n      \
    \  get { return alphaValue }\n        set(value) { alphaValue = value }\n    }\n\
    \n    func fadeInWithDuration(duration: NSTimeInterval) {\n        wantsLayer\
    \ = true\n        NSAnimationContext.beginGrouping()\n        NSAnimationContext.currentContext().duration\
    \ = duration\n        animator().alphaValue = 1.0\n        NSAnimationContext.endGrouping()\n\
    \    }\n\n    func fadeOutWithDuration(duration: NSTimeInterval) {\n        wantsLayer\
    \ = true\n        NSAnimationContext.beginGrouping()\n        NSAnimationContext.currentContext().duration\
    \ = duration\n        animator().alphaValue = 0.0\n        NSAnimationContext.endGrouping()\n\
    \    }\n\n    func animateWithDuration(duration: NSTimeInterval, animations: AnimationHandler)\
    \ {\n        wantsLayer = true\n        NSAnimationContext.runAnimationGroup({\
    \ (context: NSAnimationContext) -> Void in\n            context.duration = duration\n\
    \            context.allowsImplicitAnimation = true\n            animations()\n\
    \        }, completionHandler: { () -> Void in })\n    }\n\n    func animateWithDuration(duration:\
    \ NSTimeInterval, animations: AnimationHandler, completion: CompletionHandler)\
    \ {\n        wantsLayer = true\n        NSAnimationContext.runAnimationGroup({\
    \ (context: NSAnimationContext) -> Void in\n            context.duration = duration\n\
    \            context.allowsImplicitAnimation = true\n            animations()\n\
    \        }, completionHandler: { () -> Void in\n            completion(finished:\
    \ true)\n        })\n    }\n}\n```\n\n这一类别将允许你在你的 `NSViews` 上使用 `setAlpha:` 和\
    \ `setCenter:`，并且作为额外功能，还添加了一些强大的方法。\n\n**淡入和淡出**\n\n```\n// 在 5 秒内淡入或淡出 myView\n\
    myView.fadeInWithDuration(5)\nmyView.fadeOutWithDuration(5)\n```\n\n**像 UIView\
    \ 一样为 NSView 添加动画**\n\n```\n// 在 5 秒内将 myView 的透明度从 0 动画至 0.7\nmyView.alpha =\
    \ 0\nmyView.animateWithDuration(5.0, animations: { () -> Void in\n    self.myView.alphaValue\
    \ = 0.7\n})\n\n// 或者\n// 在 5 秒内将 myView 的透明度从 0 动画至 0.7，并在动画完成后执行某些操作\nself.myView.animateWithDuration(5.0,\n\
    \    animations: { () -> Void in\n        self.myView.alphaValue = 0.7\n    },\
    \ completion: { (finished) -> Void in\n        // 动画完成... 在此执行操作\n    })\n```\n\
    \n### Objective-C\n\n`NSView+ CompatibleUIView.h`\n\n```\n@class NSView;\n\n@interface\
    \ NSView (CompatibleUIView)\n- (void)setAlpha:(CGFloat)point;\n- (CGFloat)alpha;\n\
    - (void)setCenter:(CGPoint)point;\n- (CGPoint)center;\n+(void)fadeOut:(NSView*)viewToDissolve\n\
