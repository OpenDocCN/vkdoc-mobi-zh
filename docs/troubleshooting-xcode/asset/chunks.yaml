    `UIView.beginAnimations("animation", context: nil)`


    `UIPickerView.setAnimationDelegate(self)`


    `UIView.setAnimationDidStopSelector( Selector("animationDidStop:finished:context:")
    )`


    `// this is the line that puts the wheels in motion`


    `picker.selectRow(value, inComponent: 0, animated: true)`


    `UIView.commitAnimations()`


    This code will run when the wheels stop spinning:


    `func animationDidStop(animationID: String?,` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


            `finished: NSNumber, context: UnsafeMutablePointer<Void>) {`


      `print( "animation finished!" )`


    `}`


    ### Objective-C


    `[UIView beginAnimations:@"animation" context:nil];`


    `[UIPickerView setAnimationDelegate:self];`


    `[UIPickerView setAnimationDidStopSelector:` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                               `@selector(animationFinished:finished:context:)];`


    `// this is the line that puts the wheels in motion`


    `[self selectRow:value inComponent:0 animated:YES];`


    `[UIView commitAnimations];`


    This code will run when the wheels stop spinning:


    `- (void) animationFinished:(NSString *)animationID` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


             `finished:(BOOL)finished context:(void *)context {`


      `NSLog(@"animation finished");`


    `}`


    ## “Insane” NSDates


    Next is the code for creating a `NSDate`.


    ### Swift


    `let comps   = NSDateComponents()`


    `comps.day   = 22`


    `comps.month = 8`


    `comps.year  = 2020`


    `let gregorian = NSCalendar(identifier:` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


               `NSCalendarIdentifierGregorian)`


    `let date = gregorian?.dateFromComponents(comps)`


    `print("Date is ", date)`


    ### Objective-C


    `NSDateComponents *comps = [[NSDateComponents alloc] init];`


    `[comps setDay:22];`


    `[comps setMonth:8];`


    `[comps setYear:2020];`


    `NSCalendar *gregorian = [[NSCalendar alloc]` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                      `initWithCalendarIdentifier:` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                    `NSCalendarIdentifierGregorian];`


    `NSDate *date = [gregorian dateFromComponents:comps];`


    `NSLog(@"Date is %@", date);`


    The date is August 22, 2020, right? However, when you look at the console you
    see


    `Date is 2020-08-21 23:00:00 +0000`


    What?!! August 21, 2020???!!


    The problem is that both `NSLog` and `print` use the UTC (coordinated universal
    time) date representation that takes time zones into account.


    If you need to create a date that does not take time zones into account, or, in
    better words, a date that uses a time zone reference as “default,” add one extra
    line to your code (shown in `bold`), after creating the Gregorian variable.


    The code will be converted to


    ### Swift


    `let comps   = NSDateComponents()`


    `comps.day   = 22`


    `comps.month = 8`


    `comps.year  = 2020`


    `let gregorian = NSCalendar(identifier:` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                  `NSCalendarIdentifierGregorian)`


    `// the magical line`


    `gregorian?.timeZone = NSTimeZone(forSecondsFromGMT: 0)`


    `let date = gregorian?.dateFromComponents(comps)`


    `print("Date is ", date)`


    ### Objective-C


    `NSDateComponents *comps = [[NSDateComponents alloc] init];`


    `[comps setDay:22];`


    `[comps setMonth:8];`


    `[comps setYear:2020];`


    `NSCalendar *gregorian = [[NSCalendar alloc]` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                      `initWithCalendarIdentifier:` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


           `NSCalendarIdentifierGregorian];`


    `// the magical line`


    `gregorian.timeZone = [NSTimeZone timeZoneForSecondsFromGMT:0];`


    `NSDate *date = [gregorian dateFromComponents:comps];`


    `NSLog(@"Date is %@", date);`


    Now the result will be


    `Date is 2020-08-22 00:00:00 +0000`


    ## Localizing the Application Name


    If you want your iOS or OS X applications to have different names in the different
    countries in which they are sold, you can localize the name by using a special
    kind of file called `InfoPlist.strings`.


    Just follow these steps:


    Localize `InfoPlist.strings` to the languages you need.   Select File ➤ New ➤
    File ➤ choose iOS or OS X ➤ Resource ➤ Strings File, create a file named `InfoPlist.strings`
    and assign this file to the desired target.   Add the following keys to `InfoPlist.strings`:
    `"CFBundleDisplayName" = "AAA";` `"CFBundleName" = "BBB";` Replace `AAA` and `BBB`
    with the application’s name and the bundle name on a particular language, respectively.
      Note


    You may have noticed that `InfoPlist.strings` contain the keys `CFBundleDisplayName`
    and `CFBundleName` that are also present on `Info.plist`. The keys on `InfoPlist.strings`
    will have priority over their equivalents on `Info.plist`.


    ## Centering Views Horizontally with Auto Layout


    WARNING! You are now entering the heart of the beast, a dangerous territory from
    which no one has ever come back sane. From now on, all your fights will be epic
    ones, against creatures that have no mercy.


    Forget about logical thinking and welcome to Auto Layout.


    ### Example


    You have three simple views. All views have the same width and height and are
    equally spaced (Figure [27](#A978-1-4842-1560-9_1_Chapter.html#Fig27)). Your objective
    is to use Auto Layout and make the views appear exactly like the one in Figure
    [27](#A978-1-4842-1560-9_1_Chapter.html#Fig27) across all devices.


    ![A978-1-4842-1560-9_1_Fig27_HTML.jpg](A978-1-4842-1560-9_1_Fig27_HTML.jpg)


    Figure 27.


    Three aligned views


    ### Oops... bad idea


    The first idea to make these views look like the one in Figure [27](#A978-1-4842-1560-9_1_Chapter.html#Fig27)
    across devices is to let Xcode create the constraints for you. For that, select
    the storyboard file on Xcode’s Project Navigator and click Editor ➤Resolve Auto
    Layout Issues ➤ Reset to Suggested Constraints. The result of this action across
    devices is what you see in Figure [28](#A978-1-4842-1560-9_1_Chapter.html#Fig28).


    ![A978-1-4842-1560-9_1_Fig28_HTML.jpg](A978-1-4842-1560-9_1_Fig28_HTML.jpg)


    Figure 28.


    Result from Auto Layout


    ### What?!


    Then you think: the problem is that we have to constrain the views to have the
    “same width,” the “same height,” and the same “aspect ratio.” Nope, if you do
    that, the result is as wrong as the first one.


    Then you try another approach. You define constraints for the “width” and “height”
    of those views and to the spacing between them. No way, Jose! The result is even
    worse.


    Several tries later, you give up. No logical or intuitive thinking can save you.


    You are now alone in the jungle and the beast is watching you.'
  trans: "\n### Swift\n\n```swift\nUIView.beginAnimations(\"animation\", context:\
    \ nil)\nUIPickerView.setAnimationDelegate(self)\nUIView.setAnimationDidStopSelector(\
    \ Selector(\"animationDidStop:finished:context:\") )\n// 这一行让转轮动起来\npicker.selectRow(value,\
    \ inComponent: 0, animated: true)\nUIView.commitAnimations()\n```\n\n转轮停止转动时，将执行以下代码：\n\
    \n```swift\nfunc animationDidStop(animationID: String?, finished: NSNumber, context:\
    \ UnsafeMutablePointer<Void>) {\n  print( \"动画结束！\" )\n}\n```\n\n### Objective-C\n\
    \n```objc\n[UIView beginAnimations:@\"animation\" context:nil];\n[UIPickerView\
    \ setAnimationDelegate:self];\n[UIPickerView setAnimationDidStopSelector:\n  \
    \                       @selector(animationFinished:finished:context:)];\n// 这一行让转轮动起来\n\
    [self selectRow:value inComponent:0 animated:YES];\n[UIView commitAnimations];\n\
    ```\n\n转轮停止转动时，将执行以下代码：\n\n```objc\n- (void) animationFinished:(NSString *)animationID\n\
    \         finished:(BOOL)finished context:(void *)context {\n  NSLog(@\"动画结束\"\
    );\n}\n```\n\n## “疯狂”的 NSDates\n\n接下来是创建 `NSDate` 的代码。\n\n### Swift\n\n```swift\n\
    let comps   = NSDateComponents()\ncomps.day   = 22\ncomps.month = 8\ncomps.year\
    \  = 2020\nlet gregorian = NSCalendar(identifier:\n           NSCalendarIdentifierGregorian)\n\
    let date = gregorian?.dateFromComponents(comps)\nprint(\"日期是\", date)\n```\n\n\
    ### Objective-C\n\n```objc\nNSDateComponents *comps = [[NSDateComponents alloc]\
    \ init];\n[comps setDay:22];\n[comps setMonth:8];\n[comps setYear:2020];\nNSCalendar\
    \ *gregorian = [[NSCalendar alloc]\n                  initWithCalendarIdentifier:\n\
    \                NSCalendarIdentifierGregorian];\nNSDate *date = [gregorian dateFromComponents:comps];\n\
    NSLog(@\"日期是 %@\", date);\n```\n\n日期是 2020 年 8 月 22 日，对吧？然而，当你查看控制台时，却看到\n\n```\n\
    日期是 2020-08-21 23:00:00 +0000\n```\n\n什么？！2020 年 8 月 21 日？？？\n\n问题在于 `NSLog` 和\
    \ `print` 都使用了 UTC（协调世界时）日期表示法，这种表示法考虑了时区。\n\n如果你需要创建一个不考虑时区的日期，或者更准确地说，一个将某个时区引用视为“默认”的日期，请在创建\
    \ Gregorian 变量之后，添加一行代码（以**粗体**显示）。\n\n代码将变为：\n\n### Swift\n\n```swift\nlet comps\
    \   = NSDateComponents()\ncomps.day   = 22\ncomps.month = 8\ncomps.year  = 2020\n\
    let gregorian = NSCalendar(identifier:\n              NSCalendarIdentifierGregorian)\n\
    // 魔法行\ngregorian?.timeZone = NSTimeZone(forSecondsFromGMT: 0)\nlet date = gregorian?.dateFromComponents(comps)\n\
    print(\"日期是\", date)\n```\n\n### Objective-C\n\n```objc\nNSDateComponents *comps\
    \ = [[NSDateComponents alloc] init];\n[comps setDay:22];\n[comps setMonth:8];\n\
    [comps setYear:2020];\nNSCalendar *gregorian = [[NSCalendar alloc]\n         \
    \         initWithCalendarIdentifier:\n       NSCalendarIdentifierGregorian];\n\
    // 魔法行\ngregorian.timeZone = [NSTimeZone timeZoneForSecondsFromGMT:0];\nNSDate\
    \ *date = [gregorian dateFromComponents:comps];\nNSLog(@\"日期是 %@\", date);\n```\n\
    \n现在结果将是\n\n```\n日期是 2020-08-22 00:00:00 +0000\n```\n\n## 本地化应用名称\n\n如果你希望 iOS\
    \ 或 OS X 应用在不同销售国家拥有不同的名称，可以通过一种名为 `InfoPlist.strings` 的特殊文件来本地化名称。\n\n只需遵循以下步骤：\n\
    \n1. 将 `InfoPlist.strings` 本地化为你需要的语言。\n2. 选择 **文件 ➤ 新建 ➤ 文件 ➤ 选择 iOS 或 OS X ➤\
    \ 资源 ➤ 字符串文件**，创建一个名为 `InfoPlist.strings` 的文件，并将其分配到所需的目标中。\n3. 在 `InfoPlist.strings`\
    \ 中添加以下键值对：\n   `\"CFBundleDisplayName\" = \"AAA\";`\n   `\"CFBundleName\" = \"\
    BBB\";`\n   将 `AAA` 和 `BBB` 分别替换为特定语言下的应用名称和包名称。\n\n> **注意：** 你可能已经注意到 `InfoPlist.strings`\
    \ 包含了同样存在于 `Info.plist` 中的键 `CFBundleDisplayName` 和 `CFBundleName`。`InfoPlist.strings`\
    \ 中的键将优先于 `Info.plist` 中对应的键。\n\n## 使用 Auto Layout 水平居中视图\n\n警告！你现在正步入野兽的心脏地带，一个从未有人能全身而退的危险区域。从此刻起，你所有的战斗都将是史诗级的，对手是毫无怜悯之心的生物。\n\
    \n忘掉逻辑思维，欢迎来到 Auto Layout。\n\n### 示例\n\n你有三个简单的视图。所有视图具有相同的宽度和高度，并且间距相等（图 27）。你的目标是使用\
    \ Auto Layout，让这些视图在所有设备上都精确呈现如图 27 所示的效果。\n\n![A978-1-4842-1560-9_1_Fig27_HTML.jpg](img/A978-1-4842-1560-9_1_Fig27_HTML.jpg)\n\
    \n**图 27.** 三个对齐的视图\n\n### 哎呀……坏主意\n\n要让这些视图在不同设备上呈现图 27 的效果，第一个想法是让 Xcode 为你创建约束。为此，在\
    \ Xcode 的项目导航器中选择故事板文件，点击 **编辑器 ➤ 解析 Auto Layout 问题 ➤ 重置为建议的约束**。在不同设备上执行此操作的结果如图\
    \ 28 所示。\n\n![A978-1-4842-1560-9_1_Fig28_HTML.jpg](img/A978-1-4842-1560-9_1_Fig28_HTML.jpg)\n\
    \n**图 28.** Auto Layout 的结果\n\n### 什么？！\n\n然后你想：问题在于我们必须约束这些视图，使其具有“相同宽度”、“相同高度”和相同的“宽高比”。不，如果你这样做，结果和第一个一样错误。\n\
    \n接着你尝试另一种方法。你为这些视图的“宽度”和“高度”以及它们之间的间距定义了约束。没门，何塞！结果更糟。\n\n多次尝试之后，你放弃了。没有任何逻辑或直觉思考能拯救你。\n\
    \n你现在独自在丛林中，野兽正注视着你。\n"
- fmt: "### Logic just left the room\n\nFollowing is how you solve this problem, using\
    \ what appears to be a kind of “hack,” which apparently is the accepted way of\
    \ solving things in Auto Layout:\n\n1.  Select all views. Click the `Pin` button\
    \ at the bottom of the Interface Builder panel and select `Equal Widths`, `Equal\
    \ Heights`, and `Aspect Ratio` and click `Add 6 Constraints`. That will make all\
    \ three views have the same width, height, and aspect ratio (see Figure [29](#A978-1-4842-1560-9_1_Chapter.html#Fig29)).\n\
    \n![A978-1-4842-1560-9_1_Fig29_HTML.jpg](A978-1-4842-1560-9_1_Fig29_HTML.jpg)\n\
    \n**Figure 29.** Width, Height, and Aspect Ratio\n\n2.  Select the first view\
    \ only, return to the `Pin` menu, select `Width` and `Height`, and click `Add\
    \ 2 Constraints` (see Figure [30](#A978-1-4842-1560-9_1_Chapter.html#Fig30)).\
    \ This will define the width and height of the first view. The other views will\
    \ have the same size because of the constraints you have added on the previous\
    \ step.\n\n![A978-1-4842-1560-9_1_Fig30_HTML.jpg](A978-1-4842-1560-9_1_Fig30_HTML.jpg)\n\
    \n**Figure 30.** Width/height of the first view\n\n3.  Select all views, click\
    \ the `Alignment` button on the bottom of Interface Builder Panel, select `Horizontal\
    \ Center in Container`, `Vertical Center in Container`, and `Add 6 Constraints`\
    \ (see Figure [31](#A978-1-4842-1560-9_1_Chapter.html#Fig31)).\n\n![A978-1-4842-1560-9_1_Fig31_HTML.jpg](A978-1-4842-1560-9_1_Fig31_HTML.jpg)\n\
    \n**Figure 31.** Horizontal and vertical centers\n\n> **Note:** In step 4 we have\
    \ added a `Horizontal Center in Container` constraint to all views. By adding\
    \ this, we are telling Auto Layout to align all three views at the horizontal\
    \ container center, which is illogical, because this is not where we want the\
    \ views to be. The next step will solve the problem.\n\n### This is how you defeat\
    \ the beast\n\nSelect `Editor` ➤ `Resolve Auto Layout Issues` ➤ `Update Constraints`.\
    \ This step adds a horizontal offset to all views, solving the problem caused\
    \ by the last step. In other words, each view will be located “at the horizontal\
    \ center plus an offset.”\n\nFigure [32](#A978-1-4842-1560-9_1_Chapter.html#Fig32)\
    \ shows the final result.\n\n![A978-1-4842-1560-9_1_Fig32_HTML.jpg](A978-1-4842-1560-9_1_Fig32_HTML.jpg)\n\
    \n**Figure 32.** Final result Auto Layout\n\nAll views are the same size and have\
    \ the same spacing across devices.\n\n---\n\n## Elements Grayed-Out on Storyboard\
    \ After Copying\n\nYou have copied a view controller or its elements between storyboards\
    \ or projects and after finishing copying you notice that some of these elements\
    \ are grayed-out (Figure [33](#A978-1-4842-1560-9_1_Chapter.html#Fig33)). Why?\n\
    \n![A978-1-4842-1560-9_1_Fig33_HTML.jpg](A978-1-4842-1560-9_1_Fig33_HTML.jpg)\n\
    \n**Figure 33.** Elements grayed out on storyboard\n\nThe problem occurred because\
    \ you have copied elements between storyboards with different `Size Classes`.\n\
    \nSee the `Size Classes` selection button in Figure [34](#A978-1-4842-1560-9_1_Chapter.html#Fig34).\n\
    \n![A978-1-4842-1560-9_1_Fig34_HTML.jpg](A978-1-4842-1560-9_1_Fig34_HTML.jpg)\n\
    \n**Figure 34.** Size Class selection\n\nIf you copy an element from a storyboard\
    \ that is adjusted as `Any/Any` to another one that is not adjusted like that,\
    \ this element will be grayed out.\n\nThe `Size Classes` selection must be the\
    \ same for both storyboards or the elements will be grayed-out after copying.\n\
    \nTo solve that problem, follow these steps:\n\n1.  Make a copy of the storyboard\
    \ you will copy the elements from.\n2.  Disable `Size Classes` for that storyboard\
    \ by unchecking the correspondent box (see Figure [35](#A978-1-4842-1560-9_1_Chapter.html#Fig35)).\n\
    \n![A978-1-4842-1560-9_1_Fig35_HTML.jpg](A978-1-4842-1560-9_1_Fig35_HTML.jpg)\n\
    \n**Figure 35.** Use Size Classes option\n\n3.  Copy the desired interface elements\
    \ from this copied storyboard to the final one.\n\nElements will no longer be\
    \ grayed-out after copying.\n\n---\n\n## Debugging Core Data\n\nWhen you deal\
    \ with a database-intensive application using Core Data, many operations happen\
    \ under the hood to keep the juices flowing.\n\nWhen something strange happens\
    \ during one of these operations, the application will crash and it will probably\
    \ be very difficult to discover the problem.\n\nIn the section “Concurrency with\
    \ Core Data,” we described one of the issues that can affect Core Data applications,\
    \ but other obscure problems can crop up.\n\n### Alone in the dark\n\nIf the problem\
    \ is strange and obscure, you can enable Xcode’s ability to debug Core Data operations\
    \ by selecting `Product` ➤ `Scheme` ➤ `Edit` ➤ `Scheme` ➤ `Arguments` and adding\
    \ the key `-com.apple.CoreData.SQLDebug 3` to the `Arguments Passed on Launch`\
    \ section (Figure [36](#A978-1-4842-1560-9_1_Chapter.html#Fig36)).\n\n![A978-1-4842-1560-9_1_Fig36_HTML.jpg](A978-1-4842-1560-9_1_Fig36_HTML.jpg)\n\
    \n**Figure 36.** Debugging Core Data\n\n> **Note:** The option `-com.apple.CoreData.SQLDebug`\
    \ takes a value between 1 and 3. Higher values increase the verbosity level.\n\
    \nOnce this key is turned on, Xcode’s log displays information like that shown\
    \ in Figure [37](#A978-1-4842-1560-9_1_Chapter.html#Fig37).\n\n![A978-1-4842-1560-9_1_Fig37_HTML.jpg](A978-1-4842-1560-9_1_Fig37_HTML.jpg)\n\
    \n**Figure 37.** Core Data debug information\n\n---\n\n## The package does not\
    \ contain an Info.plist\n\nThis error message generally appears when you try to\
    \ validate or submit your application to the App Store.\n\nThis message tells\
    \ you that the `Info.plist` file is missing. In fact, the message is misleading\
    \ because this error message can appear also if some keys are missing from your\
    \ `Info.plist` file.\n\nThe following keys will trigger the error if they are\
    \ missing from the `Info.plist` file: `CFBundleVersion`, `CFBundleShortVersionString`,\
    \ and `CFBundlePackageType`.\n\n- `CFBundleVersion`: This key specifies the build\
    \ version number for the bundle.\n- `CFBundleShortVersionString`: This key stores\
    \ the release-version-number string for the bundle.\n- `CFBundlePackageType`:\
    \ This key usually contains a four-letter code identifying the bundle type. The\
    \ possible values are:\n    - `APPL` – the package is an application;\n    - `FMWK`\
    \ – the package is a framework;\n    - `BNDL` – the package is a loadable bundle.\n\
    \n> **Note:** iOS and OS X applications use all these keys.\n\nFor more information,\
    \ visit [`http://www.addfone.com/TXCFKeys`](http://www.addfone.com/TXCFKeys)\n\
    \nTo check if your `Info.plist` file has any of these keys missing, open your\
    \ target’s Info panel, right-click any of the keys, and choose `Show Raw Keys/Value`\
    \ (Figure [38](#A978-1-4842-1560-9_1_Chapter.html#Fig38)).\n\n![A978-1-4842-1560-9_1_Fig38_HTML.jpg](A978-1-4842-1560-9_1_Fig38_HTML.jpg)\n\
    \n**Figure 38.** `Info.plist` keys (friendly names)\n\nAfter selecting this option,\
    \ the keys will not be displayed with their friendly names, as in Figure [38](#A978-1-4842-1560-9_1_Chapter.html#Fig38).\
    \ Instead, they will be displayed using their unfriendly Core Foundation (CF)\
    \ names (Figure [39](#A978-1-4842-1560-9_1_Chapter.html#Fig39)), exactly what\
    \ you need.\n\n![A978-1-4842-1560-9_1_Fig39_HTML.jpg](A978-1-4842-1560-9_1_Fig39_HTML.jpg)\n\
    \n**Figure 39.** `Info.plist` keys (CF names)\n\n---\n\n## Check the Version of\
    \ an App in the App Store\n\nIf for some reason you need to check the version\
    \ of your iOS or OS X application in the App Store, use the code shown next."
  raw: "### Logic just left the room\n\nFollowing is how you solve this problem, using\
    \ what appears to be a kind of “hack,” which apparently is the accepted way of\
    \ solving things in Auto Layout:\n\nSelect all views.   Click the Pin button at\
    \ the bottom of the Interface Builder panel and select Equal Widths, Equal Heights,\
    \ and Aspect Ratio and click Add 6 Constraints. That will make all three views\
    \ have the same width, height, and aspect ratio (see Figure [29](#A978-1-4842-1560-9_1_Chapter.html#Fig29)\
    \ ).\n\n![A978-1-4842-1560-9_1_Fig29_HTML.jpg](A978-1-4842-1560-9_1_Fig29_HTML.jpg)\n\
    \nFigure 29.\n\nWidth, Height, and Aspect Ratio ).   Select the first view only,\
    \ return to the Pin menu, select Width and Height, and click Add 2 Constraints\
    \ (see Figure [30](#A978-1-4842-1560-9_1_Chapter.html#Fig30)). This will define\
    \ the width and height of the first view. The other views will have the same size\
    \ because of the constraints you have added on the previous step.\n\n![A978-1-4842-1560-9_1_Fig30_HTML.jpg](A978-1-4842-1560-9_1_Fig30_HTML.jpg)\n\
    \nFigure 30.\n\nWidth/height of the first view  Select all views, click the Alignment\
    \ `Button` on the bottom of Interface Builder Panel, select Horizontal Center\
    \ in Container, Vertical Center in Container, and Add 6 Constraints(see Figure\
    \ [31](#A978-1-4842-1560-9_1_Chapter.html#Fig31)).\n\n![A978-1-4842-1560-9_1_Fig31_HTML.jpg](A978-1-4842-1560-9_1_Fig31_HTML.jpg)\n\
    \nFigure 31.\n\nHorizontal and vertical centers   Note\n\nIn step 4 we have added\
    \ a `Horizontal Center in Container` constraint to all views. By adding this,\
    \ we are telling Auto Layout to align all three views at the horizontal container\
    \ center, which is illogical, because this is not where we want the views to be.\
    \ The next step will solve the problem.\n\n### This is how you defeat the beast\n\
    \nSelect Editor ➤ Resolve Auto Layout Issues ➤ Update Constraints. This step adds\
    \ a horizontal offset to all views, solving the problem caused by the last step.\
    \ In other words, each view will be located “at the horizontal center plus an\
    \ offset.”  \n\nFigure [32](#A978-1-4842-1560-9_1_Chapter.html#Fig32) shows the\
    \ final result.\n\n![A978-1-4842-1560-9_1_Fig32_HTML.jpg](A978-1-4842-1560-9_1_Fig32_HTML.jpg)\n\
    \nFigure 32.\n\nFinal result Auto Layout\n\nAll views are the same size and have\
    \ the same spacing across devices.\n\n## Elements Grayed-Out on Storyboard After\
    \ Copying\n\nYou have copied a view controller or its elements between storyboards\
    \ or projects and after finishing copying you notice that some of these elements\
    \ are grayed-out (Figure [33](#A978-1-4842-1560-9_1_Chapter.html#Fig33)). Why?\n\
    \n![A978-1-4842-1560-9_1_Fig33_HTML.jpg](A978-1-4842-1560-9_1_Fig33_HTML.jpg)\n\
    \nFigure 33.\n\nElements grayed out on storyboard\n\nThe problem occurred because\
    \ you have copied elements between storyboards with different `Size Classes`.\n\
    \nSee the `Size Classes` selection button in Figure [34](#A978-1-4842-1560-9_1_Chapter.html#Fig34).\n\
    \n![A978-1-4842-1560-9_1_Fig34_HTML.jpg](A978-1-4842-1560-9_1_Fig34_HTML.jpg)\n\
    \nFigure 34.\n\nSize Class selection\n\nIf you copy an element from a storyboard\
    \ that is adjusted as `Any/Any` to another one that is not adjusted like that,\
    \ this element will be grayed out.\n\nThe `Size Classes` selection must be the\
    \ same for both storyboards or the elements will be grayed-out after copying.\n\
    \nTo solve that problem, follow these steps:\n\nMake a copy of the storyboard\
    \ you will copy the elements from.   Disable Size Classes for that storyboard\
    \ by unchecking the correspondent box (see Figure [35](#A978-1-4842-1560-9_1_Chapter.html#Fig35)\
    \ ).\n\n![A978-1-4842-1560-9_1_Fig35_HTML.jpg](A978-1-4842-1560-9_1_Fig35_HTML.jpg)\n\
    \nFigure 35.\n\nUse Size Classes option ).   Copy the desired interface elements\
    \ from this copied storyboard to the final one.  \n\nElements will no longer be\
    \ grayed-out after copying.\n\n## Debugging Core Data\n\nWhen you deal with a\
    \ database-intensive application using Core Data, many operations happen under\
    \ the hood to keep the juices flowing.\n\nWhen something strange happens during\
    \ one of these operations, the application will crash and it will probably be\
    \ very difficult to discover the problem.\n\nIn the section “Concurrency with\
    \ Core Data,” we described one of the issues that can affect Core Data applications,\
    \ but other obscure problems can crop up.\n\n### Alone in the dark\n\nIf the problem\
    \ is strange and obscure, you can enable Xcode’s ability to debug Core Data operations\
    \ by selecting Product ➤ Scheme ➤ Edit ➤ Scheme ➤ Arguments and adding the key`–com.apple.CoreData.SQLDebug\
    \ 3` to the Arguments Passed on Launch section (Figure [36](#A978-1-4842-1560-9_1_Chapter.html#Fig36)).\n\
    \n![A978-1-4842-1560-9_1_Fig36_HTML.jpg](A978-1-4842-1560-9_1_Fig36_HTML.jpg)\n\
    \nFigure 36.\n\nDebugging Core Data Note\n\nThe option `-com.apple.CoreData.SQLDebug`\
    \ takes a value between 1 and 3\\. Higher values increase the verbosity level.\n\
    \nOnce this key is turned on, Xcode’s log displays information like that shown\
    \ in Figure [37](#A978-1-4842-1560-9_1_Chapter.html#Fig37).\n\n![A978-1-4842-1560-9_1_Fig37_HTML.jpg](A978-1-4842-1560-9_1_Fig37_HTML.jpg)\n\
    \nFigure 37.\n\nCore Data debug information\n\n## The package does not contain\
    \ an Info.plist\n\nThis error message generally appears when you try to validate\
    \ or submit your application to the App Store.\n\nThis message tells you that\
    \ the `Info.plist` file is missing. In fact, the message is misleading because\
    \ this error message can appear also if some keys are missing from your `Info.plist`\
    \ file.\n\nThe following keys will trigger the error if they are missing from\
    \ the `Info.plist` file: `CFBundleVersion, CFBundleShortVersionString`, and `CFBundlePackageType`.\n\
    \n*   CFBundleVersion. This key specifies the build version number for the bundle.\n\
    *   CFBundleShortVersionString. This key stores the release-version-number string\
    \ for the bundle.\n*   CFBundlePackageType. This key usually contains a four-letter\
    \ code identifying the bundle type. The possible values are\n    *   APPL – the\
    \ package is an application;\n    *   FMWK – the package is a framework;\n   \
    \ *   BNDL – the package is a loadable bundle.\n\nNote\n\niOS and OS X applications\
    \ use all these keys.\n\nFor more information, visit [`http://www.addfone.com/TXCFKeys`](http://www.addfone.com/TXCFKeys)\n\
    \nTo check if your `Info.plist` file has any of these keys missing, open your\
    \ target’s Info panel, right-click any of the keys, and choose Show Raw Keys/Value\
    \ (Figure [38](#A978-1-4842-1560-9_1_Chapter.html#Fig38)).\n\n![A978-1-4842-1560-9_1_Fig38_HTML.jpg](A978-1-4842-1560-9_1_Fig38_HTML.jpg)\n\
    \nFigure 38.\n\nInfo.plist keys (friendly names)\n\nAfter selecting this option,\
    \ the keys will not be displayed with their friendly names, as in Figure [38](#A978-1-4842-1560-9_1_Chapter.html#Fig38).\
    \ Instead, they will be displayed using their unfriendly Core Foundation (CF)\
    \ names (Figure [39](#A978-1-4842-1560-9_1_Chapter.html#Fig39)), exactly what\
    \ you need.\n\n![A978-1-4842-1560-9_1_Fig39_HTML.jpg](A978-1-4842-1560-9_1_Fig39_HTML.jpg)\n\
    \nFigure 39.\n\nInfo.plist keys (CF names)\n\n## Check the Version of an App in\
    \ the App Store\n\nIf for some reason you need to check the version of your iOS\
    \ or OS X application in the App Store, use the code shown next."
  trans: "\n### 逻辑已退出房间\n\n以下是用一种看似“取巧”的方法来解决这个问题，而这在 Auto Layout 中似乎是公认的解决方式：\n\n\
    1.  选中所有视图。点击 Interface Builder 面板底部的 `Pin` 按钮，选择 `Equal Widths`（等宽）、`Equal Heights`（等高）和\
    \ `Aspect Ratio`（宽高比），然后点击 `Add 6 Constraints`（添加 6 个约束）。这将使所有三个视图具有相同的宽度、高度和宽高比（见图\
    \ 29）。\n\n![A978-1-4842-1560-9_1_Fig29_HTML.jpg](img/A978-1-4842-1560-9_1_Fig29_HTML.jpg)\n\
    \n**图 29.** 宽度、高度和宽高比\n\n2.  仅选中第一个视图，返回 `Pin` 菜单，选择 `Width`（宽度）和 `Height`（高度），然后点击\
    \ `Add 2 Constraints`（添加 2 个约束）（见图 30）。这将定义第一个视图的宽度和高度。由于上一步添加的约束，其他视图将具有相同的大小。\n\
    \n![A978-1-4842-1560-9_1_Fig30_HTML.jpg](img/A978-1-4842-1560-9_1_Fig30_HTML.jpg)\n\
    \n**图 30.** 第一个视图的宽度/高度\n\n3.  选中所有视图，点击 Interface Builder 面板底部的 `Alignment`（对齐）按钮，选择\
    \ `Horizontal Center in Container`（容器内水平居中）和 `Vertical Center in Container`（容器内垂直居中），然后点击\
    \ `Add 6 Constraints`（添加 6 个约束）（见图 31）。\n\n![A978-1-4842-1560-9_1_Fig31_HTML.jpg](img/A978-1-4842-1560-9_1_Fig31_HTML.jpg)\n\
    \n**图 31.** 水平和垂直居中\n\n> **注意：** 在第 4 步中，我们为所有视图添加了一个 `Horizontal Center in Container`\
    \ 约束。添加此约束后，我们是在告诉 Auto Layout 将三个视图都对齐到容器的水平中心，这不符合逻辑，因为这不是我们希望视图所处的位置。下一步将解决这个问题。\n\
    \n### 这样就能击败这个“怪兽”\n\n选择 `Editor`（编辑器）➤ `Resolve Auto Layout Issues`（解决自动布局问题）➤\
    \ `Update Constraints`（更新约束）。此步骤会为所有视图添加一个水平偏移量，从而解决上一步造成的问题。换句话说，每个视图将位于“水平中心加上一个偏移量”的位置。\n\
    \n图 32 显示了最终结果。\n\n![A978-1-4842-1560-9_1_Fig32_HTML.jpg](img/A978-1-4842-1560-9_1_Fig32_HTML.jpg)\n\
    \n**图 32.** Auto Layout 的最终结果\n\n所有视图大小相同，并且在不同的设备上具有相同的间距。\n\n---\n\n## 复制后 Storyboard\
    \ 中的元素变灰\n\n你在 Storyboard 或项目之间复制了一个视图控制器或其元素，复制完成后，你注意到其中一些元素变成了灰色（图 33）。这是为什么？\n\
    \n![A978-1-4842-1560-9_1_Fig33_HTML.jpg](img/A978-1-4842-1560-9_1_Fig33_HTML.jpg)\n\
    \n**图 33.** Storyboard 中变灰的元素\n\n出现此问题是因为你在具有不同 `Size Classes`（尺寸类别）的 Storyboard\
    \ 之间复制了元素。\n\n请参见图 34 中的 `Size Classes` 选择按钮。\n\n![A978-1-4842-1560-9_1_Fig34_HTML.jpg](img/A978-1-4842-1560-9_1_Fig34_HTML.jpg)\n\
    \n**图 34.** 尺寸类别选择\n\n如果你将一个元素从设置为 `Any/Any` 的 Storyboard 复制到另一个未按此设置的 Storyboard，则该元素会变灰。\n\
    \n两个 Storyboard 的 `Size Classes` 选择必须相同，否则复制后元素会变灰。\n\n要解决此问题，请遵循以下步骤：\n\n1. \
    \ 备份一份你要从中复制元素的 Storyboard。\n2.  通过取消选中相应的复选框，禁用该 Storyboard 的 `Size Classes`（尺寸类别）（见图\
    \ 35）。\n\n![A978-1-4842-1560-9_1_Fig35_HTML.jpg](img/A978-1-4842-1560-9_1_Fig35_HTML.jpg)\n\
    \n**图 35.** 使用尺寸类别选项\n\n3.  从已复制的 Storyboard 中将所需的界面元素复制到最终的 Storyboard 中。\n\n\
    复制后，元素将不再变灰。\n\n---\n\n## 调试 Core Data\n\n当你使用 Core Data 处理数据库密集型应用程序时，幕后会进行许多操作以保持运行流畅。\n\
    \n当这些操作之一发生异常时，应用程序将崩溃，并且很可能很难发现问题。\n\n在“Core Data 的并发处理”一节中，我们描述了可能影响 Core Data\
    \ 应用程序的问题之一，但其他晦涩的问题也可能突然出现。\n\n### 在黑暗中独行\n\n如果问题奇怪且难以捉摸，你可以通过选择 `Product`（产品）➤\
    \ `Scheme`（方案）➤ `Edit`（编辑）➤ `Scheme`（方案）➤ `Arguments`（参数），并在 `Arguments Passed\
    \ on Launch`（启动时传递的参数）部分添加键值 `-com.apple.CoreData.SQLDebug 3`，来启用 Xcode 调试 Core\
    \ Data 操作的能力（图 36）。\n\n![A978-1-4842-1560-9_1_Fig36_HTML.jpg](img/A978-1-4842-1560-9_1_Fig36_HTML.jpg)\n\
    \n**图 36.** 调试 Core Data\n\n> **注意：** 选项 `-com.apple.CoreData.SQLDebug` 接受 1 到\
    \ 3 之间的值。值越高，详细程度越高。\n\n一旦启用此键，Xcode 的日志会显示如图 37 所示的信息。\n\n![A978-1-4842-1560-9_1_Fig37_HTML.jpg](img/A978-1-4842-1560-9_1_Fig37_HTML.jpg)\n\
    \n**图 37.** Core Data 调试信息\n\n---\n\n## 包中不包含 Info.plist\n\n当你尝试验证或向 App Store\
    \ 提交应用程序时，通常会出现此错误消息。\n\n此消息表明 `Info.plist` 文件缺失。实际上，这条消息具有误导性，因为如果你的 `Info.plist`\
    \ 文件中缺少某些键，也可能显示此错误消息。\n\n如果 `Info.plist` 文件中缺少以下键，则会触发该错误：`CFBundleVersion`、`CFBundleShortVersionString`\
    \ 和 `CFBundlePackageType`。\n\n- `CFBundleVersion`：此键指定包的构建版本号。\n- `CFBundleShortVersionString`：此键存储包的发布版本号字符串。\n\
    - `CFBundlePackageType`：此键通常包含一个四字母代码，用于标识包的类型。可能的值包括：\n    - `APPL` – 该包是一个应用程序；\n\
    \    - `FMWK` – 该包是一个框架；\n    - `BNDL` – 该包是一个可加载的包。\n\n> **注意：** iOS 和 OS X 应用程序都使用所有这些键。\n\
    \n欲了解更多信息，请访问 [`http://www.addfone.com/TXCFKeys`](http://www.addfone.com/TXCFKeys)\n\
    \n要检查你的 `Info.plist` 文件是否缺少任何这些键，请打开你的目标（Target）信息面板，右键单击任意键，然后选择 `Show Raw Keys/Value`（显示原始键/值）（图\
    \ 38）。\n\n![A978-1-4842-1560-9_1_Fig38_HTML.jpg](img/A978-1-4842-1560-9_1_Fig38_HTML.jpg)\n\
    \n**图 38.** `Info.plist` 键（友好名称）\n\n选择此选项后，键将不会像图 38 那样以友好的名称显示。相反，它们将使用不友好的 Core\
    \ Foundation (CF) 名称显示（图 39），这正是你所需要的。\n\n![A978-1-4842-1560-9_1_Fig39_HTML.jpg](img/A978-1-4842-1560-9_1_Fig39_HTML.jpg)\n\
    \n**图 39.** `Info.plist` 键（CF 名称）\n\n---\n\n## 检查 App Store 中应用的版本\n\n如果出于某种原因，你需要检查你的\
    \ iOS 或 OS X 应用程序在 App Store 中的版本，请使用下面显示的代码。\n"
- fmt: "### Swift\n\n```\nfunc getAppVersion ( onCompletion: (version: String) ->\
    \ Void) {\n    // get the app’s bundle identifier\n    let bundleIdentifier =\
    \ \"com.yourCompany.yourAppBundleID\"\n    // build the app path using iTunes\
    \ API\n    let path : String = \"http://itunes.apple.com/lookup?bundleId=\\(bundleIdentifier)\"\
    \n    let lookupURL : NSURL = NSURL(string:path)!\n    let session = NSURLSession.sharedSession()\n\
    \    let request = NSURLRequest(URL: lookupURL)\n    // request data about the\
    \ application, asynchronously\n    // using iTunes API\n    let task = session.dataTaskWithRequest(request,\n\
    \                              completionHandler: { data, response, error in\n\
    \      if !(error != nil) {\n      do {\n      let jsonResults = try\n       \
    \                   NSJSONSerialization.JSONObjectWithData(data!,\n          \
    \                       options: [])  as! NSDictionary\n      let results = jsonResults[\"\
    results\"]\n      let appDetails = results?.firstObject\n      // get the application\
    \ version\n      let latestVersion = appDetails!![\"version\"] as! String\n  \
    \    onCompletion(version: latestVersion)\n    }\n      catch let error as NSError\
    \ {\n      print(\"error = \\(error)\")\n    }\n      catch {   }\n      }\n \
    \     })\n    task.resume()\n  }\n```\n\nYou must use it like this:\n\n```\ngetAppVersion\
    \ { (version) -> Void in\n  print(\"latest version = \", version)\n}\n```\n\n\
    ### Objective-C\n\n```\n-(void)getAppVersionAndRunOnCompletion:\n       (void\
    \ (^)(NSString *version))completionBlock {\n  // get the app’s bundle identifier\n\
    \  NSString *bundleIdentifier =\n                           @\"com.yourCompany.yourAppBundleID\"\
    ;\n  // use iTunes API to get data about the application\n  NSURL *lookupURL =\
    \ [NSURL URLWithString:[NSString\n                             stringWithFormat:\
    \ @\"http://itunes.apple.com/\n         lookup?bundleId=%@\", bundleIdentifier]];\n\
    \  NSURLSession *session = [NSURLSession sharedSession];\n  [[session dataTaskWithURL:lookupURL\n\
    \          completionHandler:^(NSData *data,\n                              NSURLResponse\
    \ *response,\n                              NSError *error) {\n            //\
    \ data is nil or error occurred, exit with nil\n            if ( (data == nil)\
    \ || (error != nil) ) {\n              completionBlock(nil);\n              return;\n\
    \            }\n            NSDictionary *jsonResults = [NSJSONSerialization\n\
    \                          JSONObjectWithData:data options:0\n               \
    \                                 error:nil];\n            NSUInteger resultCount\
    \ = [[jsonResults\n                        objectForKey: @\"resultCount\"]\n \
    \                                               integerValue];\n            //\
    \ number of objects on jsonResults is zero,\n            // exit with nil\n  \
    \          if (!resultCount){\n              completionBlock(nil);\n         \
    \     return;\n            }\n            NSDictionary *appDetails = [[jsonResults\n\
    \                                              objectForKey: @\"results\"]\n \
    \                          firstObject];\n            NSString *latestVersion\
    \ = [appDetails\n                                                 objectForKey:\
    \ @\"version\"];\n            completionBlock(latestVersion);\n          }] resume];\n\
    }\n```\n\nYou must use it like this:\n\n```\n[self getAppVersionAndRunOnCompletion:^(NSString\
    \ *version) {\n    NSLog(@\"latest version on the app store = %@\", version);\n\
    }];\n```\n\n## Breakpoints and NSLog Not Working\n\nWhen this problem occurs,\
    \ Xcode will not stop on any defined breakpoint and, as a bonus, `NSLog` will\
    \ not print anything to Xcode’s console.\n\nThis problem is generally a result\
    \ of one of two issues: a corrupted project file or a bad product scheme.\n\n\
    For some reason, application extensions and Apple Watch targets are more likely\
    \ to be affected by bad product schemes.\n\n**Note:** Xcode loses control of things\
    \ and product schemes are corrupted if you create and delete targets several times\
    \ during the project.\n\n### Project corruption\n\nFirst, try to clean the project\
    \ by following the instructions found in the section “Xcode Crashing when Opening\
    \ a Project File?” and see if the problem is solved.\n\n### Bad product scheme\n\
    \nIf the problem is not solved, click **Product** ➤ **Scheme** ➤ **Manage Schemes**,\
    \ select all schemes, and delete them by clicking the minus sign at the bottom\
    \ left. Then click the **Autocreate Schemes Now** button to re-create the schemes\
    \ you just deleted.\n\nYou can now build and run your project and the breakpoints\
    \ will probably work.\n\n## Slow Transitions Between ViewControllers\n\nIf your\
    \ application is using storyboards and the transitions between `ViewControllers`\
    \ are taking too long, it is probably because iOS is having a hard time loading\
    \ and instantiating the next `ViewController`. Perhaps the next `ViewController`\
    \ has many elements that have to be loaded and it is taking too long.\n\nThe logical\
    \ solution to that problem would be to preload the next `ViewController`, but\
    \ how do you do that?\n\nWe have seen pages on the Web telling you to use `UIPageViewControllers`\
    \ instead of storyboards to have smooth transitions between your `ViewControllers`,\
    \ but this is far from being a good solution and will just create more problems.\n\
    \nStoryboards do not offer a way to preload `ViewControllers`, but we can simulate\
    \ that by using the code shown here in the `viewWillAppear` method of the current\
    \ `ViewController`.\n\n### Swift\n\n```\noverride func viewWillAppear(animated:\
    \ Bool) {\n  super.viewWillAppear(animated)\n  // This will preload the next ViewController\n\
    \  dispatch_async(dispatch_get_main_queue()) {\n   storyboard?.instantiateViewControllerWithIdentifier\n\
    \           (\"nextViewController\")\n  }\n}\n```\n\n### Objective-C\n\n```\n\
    - (void)viewWillAppear:(BOOL)animated {\n  [super viewWillAppear:animated];\n\
    \  // This will preload the next ViewController\n  dispatch_async(dispatch_get_main_queue(),\n\
    \  ^{\n     [self.storyboard\n      instantiateViewControllerWithIdentifier:\n\
    \      @\"nextViewController\"];\n  });\n}\n```\n\nThis code will instantiate\
    \ the next `ViewController` on a separate thread, which will be kept in memory.\
    \ When we push the next `ViewController` it will load quickly and smoothly."
