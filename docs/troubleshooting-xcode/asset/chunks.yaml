    Preface


    Troubleshooting Xcode is a guide for those who are creating applications for iOS
    or OS X. The book contains solutions for hard problems—problems that any developer
    using Xcode will face, sooner or later.


    Xcode is the official tool created by Apple for developing iOS and OSX applications.
    However, the limitations of this tool, several bugs, its enigmatic error messages
    make using Xcode, sometimes, very difficult.


    To make things worse, some key documentation is incomplete, vague, or difficult
    to decipher.


    To make life easier, first for himself, the author decided to make notes on all
    these problems and their respective solutions. Week by week, month by month, years
    of notes grew and Troubleshooting Xcode was born.


    Troubleshooting Xcode also shows you how to automate some repetitive tasks and
    how to solve problems outside Xcode that are related to iOS or OS X development.


    The code in this book is compatible with iOS 9 and OS X 10.11 “El Capitan.” For
    that reason, the Swift code shown in this book is compatible with Swift 2.0.


    We hope this book helps you to solve some of the hard questions you had during
    development. Some of these problems have multiple solutions and we have tried
    to add all options we know for each case. For that reason, this book is not a
    final guide for every solution. We are just doing our best.


    Feel free to contact the author directly at `troubleshooting-xcode@addfone.com`
    if you want to suggest some topic to be added to future editions of this book.'
