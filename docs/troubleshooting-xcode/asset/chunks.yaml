    Create one Assets Catalog file with a different name for every platform you are
    supporting. Each Assets Catalog must contain its own `AppIcon` entry with a different
    name. Every `AppIcon` entry must contain just the icons belonging to the platform.


    Don’t forget to adjust each target to use the proper Assets Catalog and `AppIcon`
    entry.


