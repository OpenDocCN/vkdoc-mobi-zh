    ## Asset Catalogs Bug


    Apple introduced Asset Catalogs on iOS 7 (Xcode 5). Using Asset Catalogs you can
    simplify management of images that your application uses as part of its user interface.


    If you are a perfectionist, you will not like to hear about this Asset Catalogs
    bug that appears under the following circumstances:


