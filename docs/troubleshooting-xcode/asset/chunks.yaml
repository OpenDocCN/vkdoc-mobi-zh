    ## NSUserDefaults Not Working for a Sandboxed App?


    We have seen this problem a couple of times.


    You are testing an application and suddenly it loses the ability to read or write
    to `NSUserDefaults`.


    The typical solution for this problem is to restart your Mac, but everybody hates
    having to do that.


    Instead, launch Terminal and type


    `ps auwx | grep cfprefsd | grep -v grep | awk ''{print $2}'' |` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


    `xargs sudo kill -9`


    This will kill Mac OS X’s `cfprefsd` daemon that provides preferences services
    for the `CFPreferences` and `NSUserDefaults` APIs (application programming interface).


    The daemon will restart automatically the next time you try to access `NSUserDefaults`
    and everything should start working correctly.


    ## Interface Elements Not Updating?


    If you have an interface element like a spinner or a text view that must be updated
    constantly but the update is not happening because the application is busy on
    a loop, add the following code to the end of the loop.


    ### Swift


    `var date : NSDate? = NSDate()`


    `date = date!.dateByAddingTimeInterval(0.0)`


    `let runLoop = NSRunLoop.currentRunLoop()`


    `runLoop.runUntilDate(date!)`


    ### Objective-C


    `[[NSRunLoop currentRunLoop] runUntilDate:`


               `[NSDate dateWithTimeIntervalSinceNow:0.0]];`


    This code will force the loop to a brief pause and the application will be able
    to update the interface.


    Note


    Bear in mind that this code will stop the current run loop for a fraction of time.
    This may slow down some apps. Use it with care. You can tweak the time interval
    if you want.


