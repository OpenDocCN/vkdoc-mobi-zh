    \    animations();\n    [NSAnimationContext endGrouping];\n}\n\n+ (void)animateWithDuration:(NSTimeInterval)duration\n\
    \                 animations:(void (^)(void))animations\n                 completion:(void\
    \ (^)(BOOL finished))completion\n{\n    [NSAnimationContext beginGrouping];\n\
    \    [[NSAnimationContext currentContext] setDuration:duration];\n    animations();\n\
    \    [NSAnimationContext endGrouping];\n    if(animations)\n    {\n        id\
    \ completionBlock = [completion copy];\n        [self performSelector:@selector(runEndBlock:)\n\
    \                   withObject:completionBlock\n                   afterDelay:duration];\n\
    \    }\n}\n\n+ (void)runEndBlock:(void (^)(void))completionBlock\n{\n    completionBlock();\n\
    }\n\n@end\n```\n\n以下代码展示了如何使用这些强大的功能：\n\n**淡入和淡出**\n\n```\n[NSView fadeIn:myView\
    \ withDuration:1.0];\n[NSView fadeOut:myView withDuration:1.0];\n```\n\n**像 UIView\
    \ 一样为 NSView 添加动画**\n\n```\n[NSView animateWithDuration:1.0 animations:^{\n  \
    \  [myView setAlphaValue:0.7f];\n}]\n\n// 或者\n[NSView animateWithDuration:1.0\
    \ animations:^{\n    [myView setAlpha:0.7f];\n} completion:^(BOOL finished) {\n\
    \    // 动画完成后执行某些操作\n}];\n```\n\n## 检测 UIPickerView 何时停止滚动\n\n`UIPickerView` 并没有提供直接的方法来检测其滚轮何时停止滚动，但我们可以使用一个小技巧来实现检测。\n\
    \n首先，在你的代码中找到让滚轮开始滚动的那一行，然后添加如下所示的代码。\n"
- fmt: "### Swift\n\n```swift\nUIView.beginAnimations(\"animation\", context: nil)\n\
    UIPickerView.setAnimationDelegate(self)\nUIView.setAnimationDidStopSelector( Selector(\"\
    animationDidStop:finished:context:\") )\n// this is the line that puts the wheels\
    \ in motion\npicker.selectRow(value, inComponent: 0, animated: true)\nUIView.commitAnimations()\n\
    ```\n\nThis code will run when the wheels stop spinning:\n\n```swift\nfunc animationDidStop(animationID:\
    \ String?, finished: NSNumber, context: UnsafeMutablePointer<Void>) {\n  print(\
    \ \"animation finished!\" )\n}\n```\n\n### Objective-C\n\n```objc\n[UIView beginAnimations:@\"\
    animation\" context:nil];\n[UIPickerView setAnimationDelegate:self];\n[UIPickerView\
    \ setAnimationDidStopSelector:\n                         @selector(animationFinished:finished:context:)];\n\
    // this is the line that puts the wheels in motion\n[self selectRow:value inComponent:0\
    \ animated:YES];\n[UIView commitAnimations];\n```\n\nThis code will run when the\
    \ wheels stop spinning:\n\n```objc\n- (void) animationFinished:(NSString *)animationID\n\
    \         finished:(BOOL)finished context:(void *)context {\n  NSLog(@\"animation\
    \ finished\");\n}\n```\n\n## \"Insane\" NSDates\n\nNext is the code for creating\
    \ an `NSDate`.\n\n### Swift\n\n```swift\nlet comps   = NSDateComponents()\ncomps.day\
    \   = 22\ncomps.month = 8\ncomps.year  = 2020\nlet gregorian = NSCalendar(identifier:\n\
    \           NSCalendarIdentifierGregorian)\nlet date = gregorian?.dateFromComponents(comps)\n\
    print(\"Date is \", date)\n```\n\n### Objective-C\n\n```objc\nNSDateComponents\
    \ *comps = [[NSDateComponents alloc] init];\n[comps setDay:22];\n[comps setMonth:8];\n\
    [comps setYear:2020];\nNSCalendar *gregorian = [[NSCalendar alloc]\n         \
    \         initWithCalendarIdentifier:\n                NSCalendarIdentifierGregorian];\n\
    NSDate *date = [gregorian dateFromComponents:comps];\nNSLog(@\"Date is %@\", date);\n\
    ```\n\nThe date is August 22, 2020, right? However, when you look at the console\
    \ you see\n\n```\nDate is 2020-08-21 23:00:00 +0000\n```\n\nWhat?!! August 21,\
    \ 2020???!!\n\nThe problem is that both `NSLog` and `print` use the UTC (coordinated\
    \ universal time) date representation that takes time zones into account.\n\n\
    If you need to create a date that does not take time zones into account, or, in\
    \ better words, a date that uses a time zone reference as \"default,\" add one\
    \ extra line to your code (shown in **bold**), after creating the Gregorian variable.\n\
    \nThe code will be converted to\n\n### Swift\n\n```swift\nlet comps   = NSDateComponents()\n\
    comps.day   = 22\ncomps.month = 8\ncomps.year  = 2020\nlet gregorian = NSCalendar(identifier:\n\
    \              NSCalendarIdentifierGregorian)\n// the magical line\ngregorian?.timeZone\
    \ = NSTimeZone(forSecondsFromGMT: 0)\nlet date = gregorian?.dateFromComponents(comps)\n\
    print(\"Date is \", date)\n```\n\n### Objective-C\n\n```objc\nNSDateComponents\
    \ *comps = [[NSDateComponents alloc] init];\n[comps setDay:22];\n[comps setMonth:8];\n\
    [comps setYear:2020];\nNSCalendar *gregorian = [[NSCalendar alloc]\n         \
    \         initWithCalendarIdentifier:\n       NSCalendarIdentifierGregorian];\n\
    // the magical line\ngregorian.timeZone = [NSTimeZone timeZoneForSecondsFromGMT:0];\n\
    NSDate *date = [gregorian dateFromComponents:comps];\nNSLog(@\"Date is %@\", date);\n\
    ```\n\nNow the result will be\n\n```\nDate is 2020-08-22 00:00:00 +0000\n```\n\
    \n## Localizing the Application Name\n\nIf you want your iOS or OS X applications\
    \ to have different names in the different countries in which they are sold, you\
    \ can localize the name by using a special kind of file called `InfoPlist.strings`.\n\
    \nJust follow these steps:\n\n1. Localize `InfoPlist.strings` to the languages\
    \ you need.\n2. Select **File ➤ New ➤ File ➤ choose iOS or OS X ➤ Resource ➤ Strings\
    \ File**, create a file named `InfoPlist.strings` and assign this file to the\
    \ desired target.\n3. Add the following keys to `InfoPlist.strings`:\n   `\"CFBundleDisplayName\"\
    \ = \"AAA\";`\n   `\"CFBundleName\" = \"BBB\";`\n   Replace `AAA` and `BBB` with\
    \ the application's name and the bundle name on a particular language, respectively.\n\
    \n> **Note:** You may have noticed that `InfoPlist.strings` contain the keys `CFBundleDisplayName`\
    \ and `CFBundleName` that are also present on `Info.plist`. The keys on `InfoPlist.strings`\
    \ will have priority over their equivalents on `Info.plist`.\n\n## Centering Views\
    \ Horizontally with Auto Layout\n\nWARNING! You are now entering the heart of\
    \ the beast, a dangerous territory from which no one has ever come back sane.\
    \ From now on, all your fights will be epic ones, against creatures that have\
    \ no mercy.\n\nForget about logical thinking and welcome to Auto Layout.\n\n###\
    \ Example\n\nYou have three simple views. All views have the same width and height\
    \ and are equally spaced (Figure [27](#A978-1-4842-1560-9_1_Chapter.html#Fig27)).\
    \ Your objective is to use Auto Layout and make the views appear exactly like\
    \ the one in Figure [27](#A978-1-4842-1560-9_1_Chapter.html#Fig27) across all\
    \ devices.\n\n![A978-1-4842-1560-9_1_Fig27_HTML.jpg](A978-1-4842-1560-9_1_Fig27_HTML.jpg)\n\
    \n**Figure 27.** Three aligned views\n\n### Oops... bad idea\n\nThe first idea\
    \ to make these views look like the one in Figure [27](#A978-1-4842-1560-9_1_Chapter.html#Fig27)\
    \ across devices is to let Xcode create the constraints for you. For that, select\
    \ the storyboard file on Xcode's Project Navigator and click **Editor ➤ Resolve\
    \ Auto Layout Issues ➤ Reset to Suggested Constraints**. The result of this action\
    \ across devices is what you see in Figure [28](#A978-1-4842-1560-9_1_Chapter.html#Fig28).\n\
    \n![A978-1-4842-1560-9_1_Fig28_HTML.jpg](A978-1-4842-1560-9_1_Fig28_HTML.jpg)\n\
    \n**Figure 28.** Result from Auto Layout\n\n### What?!\n\nThen you think: the\
    \ problem is that we have to constrain the views to have the \"same width,\" the\
    \ \"same height,\" and the same \"aspect ratio.\" Nope, if you do that, the result\
    \ is as wrong as the first one.\n\nThen you try another approach. You define constraints\
    \ for the \"width\" and \"height\" of those views and to the spacing between them.\
    \ No way, Jose! The result is even worse.\n\nSeveral tries later, you give up.\
    \ No logical or intuitive thinking can save you.\n\nYou are now alone in the jungle\
    \ and the beast is watching you."
