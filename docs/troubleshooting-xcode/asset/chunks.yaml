- fmt: "### `Info.plist` must NOT be assigned to a target\n\nSelect the `Info.plist`\
    \ file on Xcode’s `Project Navigator` (Figure [4](#A978-1-4842-1560-9_1_Chapter.html#Fig4))\
    \ and on Xcode’s right panel, click the File Inspector icon (marked with a circle\
    \ in Figure [5](#A978-1-4842-1560-9_1_Chapter.html#Fig5)). On the same right panel\
    \ shown in Figure [5](#A978-1-4842-1560-9_1_Chapter.html#Fig5), make sure that\
    \ you have not assigned the `Info.plist` file to any target (see arrow).\n\n![A978-1-4842-1560-9_1_Fig5_HTML.jpg](A978-1-4842-1560-9_1_Fig5_HTML.jpg)\n\
    \nFigure 5.\n\nDo not assign the `Info.plist` to any target\n\n![A978-1-4842-1560-9_1_Fig4_HTML.jpg](A978-1-4842-1560-9_1_Fig4_HTML.jpg)\n\
    \nFigure 4.\n\n`Info.plist` location Note\n\nDo NOT assign the `Info.plist` to\
    \ any target.\n\n## No Matching Provisioning Profiles Found\n\nThe error message\
    \ shown in Figure [7](#A978-1-4842-1560-9_1_Chapter.html#Fig7) appears when you\
    \ try to submit an application to the App Store. The occurrence of this message\
    \ relates, generally, to two things: an expired or a missing provisioning profile.\n\
    \n![A978-1-4842-1560-9_1_Fig7_HTML.jpg](A978-1-4842-1560-9_1_Fig7_HTML.jpg)\n\n\
    Figure 7.\n\nFailed to locate signing assets\n\n### Missing provisioning profile\n\
    \nFrom time to time, the Gods wake up on the wrong foot and decide to delete or\
    \ revoke some of your provisioning profiles. “Everything was just working fine\
    \ yesterday,” you say. We know.\n\nFirst, verify whether you have configured Xcode\
    \ with the correct provisioning profiles for the selected target by navigating\
    \ to the project’s `Build Settings` tab (Figure [8](#A978-1-4842-1560-9_1_Chapter.html#Fig8)).\n\
    \n![A978-1-4842-1560-9_1_Fig8_HTML.jpg](A978-1-4842-1560-9_1_Fig8_HTML.jpg)\n\n\
    Figure 8.\n\nCode signing and provisioning profile\n\nIf the provisioning profiles\
    \ are missing, download them from the `Developer Portal`.\n\nNote\n\nOK, we could\
    \ suggest that you let Xcode get the provisioning profiles for you, automatically,\
    \ but, unfortunately, this operation fails 99.99% of the time to solve this problem.\
    \ It is faster to download the provisioning profiles yourself.\n\n## Compressing\
    \ Images Better Than Photoshop\n\nIf you love to compress your own images, here\
    \ are some power tips.\n\nAs far as we know, the best application out there for\
    \ image optimization and compression for Mac OS X is `ImageOptim` ( [`www.imageoptim.com`](http://www.imageoptim.com/)\
    \ ). `ImageOptim` is a free application that combines many optimization tools\
    \ like `PNGOUT`, `Zopfli`, `Pngcrush`, `AdvPNG`, extended `OptiPNG`, `JpegOptim`,\
    \ `jpegrescan`, `jpegtran`, and `Gifsicle` on an easy-to-use interface.\n\nXcode\
    \ is configured, by default, to compress all images added to the bundle, but the\
    \ results are not as good as those of `ImageOptim`.\n\nIn order to use your own\
    \ compressed images, you have to disable Xcode’s compression flag, by disabling\
    \ `COMPRESS_PNG_FILES` on the `Build Settings` tab. Change this option from `YES`\
    \ to `NO` to prevent Xcode from compressing the images you have already compressed\
    \ (Figure [9](#A978-1-4842-1560-9_1_Chapter.html#Fig9)).\n\n![A978-1-4842-1560-9_1_Fig9_HTML.jpg](A978-1-4842-1560-9_1_Fig9_HTML.jpg)\n\
    \nFigure 9.\n\nCompress PNG option\n\n## Creating Packages for in-App Purchases\n\
    \nYou have decided to add in-app purchases to your application. The in-app purchases\
    \ will deliver content to the user and Apple will host the content. How do you\
    \ do that?\n\n### Delivering content\n\nBefore the release of iOS 6, developers\
    \ were responsible for keeping and delivering content to users after purchase.\
    \ All content was to be stored on servers maintained by the developers themselves.\n\
    \nSince Apple introduced iOS 6, it is possible to host all content with Apple,\
    \ making the process easier.\n\nTo submit your content to Apple, you must pack\
    \ all content in a special kind of file called “package.”\n\n### What is a package?\n\
    \nIn simple words, a package is a structured folder. Inside this folder is a file\
    \ called `ContentInfo.plist` and a folder called `Contents`.\n\n#### `ContentInfo.plist`\n\
    \nThe `ContentInfo.plist` file contains two keys:\n\n*   `ContentVersion`, which\
    \ represents the version number of the content;\n*   `IAPProductionIdentifier`,\
    \ which is the in-app purchase bundle identifier, something like `com.myCompany.myInAppPurchase`.\n\
    \n#### `Contents` folder\n\nThe `Contents` folder contains all files related to\
    \ a particular in-app purchase, like music, videos, images, texts, and so on,\
    \ that are associated with the content you are selling.\n\nNote\n\nYou can have\
    \ any kind of content inside your in-app purchase, except code.\n\n### Creating\
    \ a package, the faster way\n\nApple recommends using Xcode to create packages\
    \ for your in-app purchases, but the process requires endless clicks and a maze\
    \ of configurations.\n\nWe have created another way for you, easier and suitable\
    \ for bulk delivery.\n\nHere we go:\n\nUsing Mac OS X Finder, create a folder\
    \ with the name of your in-app purchase’s bundle identifier, something like `com.myCompany.myApp.pack100`.\
    \ Let’s call this folder the main package folder.   Create a folder called `Contents`\
    \ inside the main package folder.   Create a plain text file named `ContentInfo.plist`\
    \ inside the main package folder.  \n\nAt this point, you will have a structure\
    \ like the one seen in Figure [10](#A978-1-4842-1560-9_1_Chapter.html#Fig10):\n\
    \n![A978-1-4842-1560-9_1_Fig10_HTML.jpg](A978-1-4842-1560-9_1_Fig10_HTML.jpg)\n\
    \nFigure 10.\n\nIn-app purchase package structureCopy all multimedia content that\
    \ the package will deliver to the `Contents` folder.   Add a structure like the\
    \ following one to your `ContentInfo.plist` file:\n\n```xml\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple//DTD PLIST 1.0//EN\"\
    \n\"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n<plist version=\"1.0\"\
    >\n<dict>\n    <key>ContentVersion</key>\n    <string>1.0</string>\n    <key>IAPProductIdentifier</key>\n\
    \    <string>XXXXX</string>\n</dict>\n</plist>\n```\n\nReplace `XXXXX` with the\
    \ in-app purchase’s bundle ID, which, in this example, is `com.myCompany.myApp.pack100`.\n\
    \nThe folder structure is now just like the one seen in Figure [11](#A978-1-4842-1560-9_1_Chapter.html#Fig11):\n\
    \n![A978-1-4842-1560-9_1_Fig11_HTML.jpg](A978-1-4842-1560-9_1_Fig11_HTML.jpg)\n\
    \nFigure 11.\n\nIn-app purchase final structure\n\n### Creating the final package\n\
    \nIt is time to create the final package file with a `pkg` extension.\n\nLaunch\
    \ Terminal in the folder that contains the main package folder, type the following\
    \ command, and press the Return key:\n\n```bash\nproductbuild --content <pathToInAppDirectory>\
    \ <pkg-name.pkg>\n```\n\nExample:\n\n```bash\nproductbuild --content com.myCompany.myApp.pack100\
    \ com.myCompany.myApp.pack100.pkg\n```\n\nThis command will create the package\
    \ for you in the same directory. You can submit this package later to Apple using\
    \ Application Loader.\n\nNote\n\nIf the `productbuild` command fails it means\
    \ that you have to install Xcode’s command-line tools on your system. To do that,\
    \ launch Terminal and type the following command:\n\n```bash\nxcode-select –-install\n\
    ```"
  raw: '### Info.plist must NOT be assigned to a target


    Select the `Info.plist` file on Xcode’s `Project Navigator` (Figure [4](#A978-1-4842-1560-9_1_Chapter.html#Fig4))
    and on Xcode’s right panel, click the File Inspector icon (marked with a circle
    in Figure [5](#A978-1-4842-1560-9_1_Chapter.html#Fig5)). On the same right panel
    shown in Figure [5](#A978-1-4842-1560-9_1_Chapter.html#Fig5), make sure that you
    have not assigned the `Info.plist` file to any target (see arrow).


    ![A978-1-4842-1560-9_1_Fig5_HTML.jpg](A978-1-4842-1560-9_1_Fig5_HTML.jpg)


    Figure 5.


    Do not assign the Info.plist to any target


    ![A978-1-4842-1560-9_1_Fig4_HTML.jpg](A978-1-4842-1560-9_1_Fig4_HTML.jpg)


    Figure 4.


    Info.plist location Note


    Do NOT assign the Info.plist to any target.


    ## No Matching Provisioning Profiles Found


    The error message shown in Figure [7](#A978-1-4842-1560-9_1_Chapter.html#Fig7)
    appears when you try to submit an application to the App Store. The occurrence
    of this message relates, generally, to two things: an expired or a missing provisioning
    profile.


    ![A978-1-4842-1560-9_1_Fig7_HTML.jpg](A978-1-4842-1560-9_1_Fig7_HTML.jpg)


    Figure 7.


    Failed to locate signing assets


    ### Missing provisioning profile


    From time to time, the Gods wake up on the wrong foot and decide to delete or
    revoke some of your provisioning profiles. “Everything was just working fine yesterday,”
    you say. We know.


    First, verify whether you have configured Xcode with the correct provisioning
    profiles for the selected target by navigating to the project’s Build Settings
    tab (Figure [8](#A978-1-4842-1560-9_1_Chapter.html#Fig8)).


    ![A978-1-4842-1560-9_1_Fig8_HTML.jpg](A978-1-4842-1560-9_1_Fig8_HTML.jpg)


    Figure 8.


    Code signing and provisioning profile


    If the provisioning profiles are missing, download them from the `Developer Portal`.


    Note


    OK, we could suggest that you let Xcode get the provisioning profiles for you,
    automatically, but, unfortunately, this operation fails 99.99% of the time to
    solve this problem. It is faster to download the provisioning profiles yourself.


    ## Compressing Images Better Than Photoshop


    If you love to compress your own images, here are some power tips.


    As far as we know, the best application out there for image optimization and compression
    for Mac OS X is ImageOptim ( [`www.imageoptim.com`](http://www.imageoptim.com/)
    ). ImageOptim is a free application that combines many optimization tools like
    PNGOUT, Zopfli, Pngcrush, AdvPNG, extended OptiPNG, JpegOptim, jpegrescan, jpegtran,
    and Gifsicle on an easy-to-use interface.


    Xcode is configured, by default, to compress all images added to the bundle, but
    the results are not as good as those of ImageOptim.


    In order to use your own compressed images, you have to disable Xcode’s compression
    flag, by disabling COMPRESS_PNG_FILES on the Build Settings tab. Change this option
    from YES to NO to prevent Xcode from compressing the images you have already compressed
    (Figure [9](#A978-1-4842-1560-9_1_Chapter.html#Fig9)).


    ![A978-1-4842-1560-9_1_Fig9_HTML.jpg](A978-1-4842-1560-9_1_Fig9_HTML.jpg)


    Figure 9.


    Compress PNG option


    ## Creating Packages for in-App Purchases


    You have decided to add in-app purchases to your application. The in-app purchases
    will deliver content to the user and Apple will host the content. How do you do
    that?


    ### Delivering content


    Before the release of iOS 6, developers were responsible for keeping and delivering
    content to users after purchase. All content was to be stored on servers maintained
    by the developers themselves.


    Since Apple introduced iOS 6, it is possible to host all content with Apple, making
    the process easier.


    To submit your content to Apple, you must pack all content in a special kind of
    file called “package.”


    ### What is a package?


    In simple words, a package is a structured folder. Inside this folder is a file
    called `ContentInfo.plist` and a folder called `Contents`.


    #### ContentInfo.plist


    The `ContentInfo.plist` file contains two keys:


    *   ContentVersion, which represents the version number of the content;

    *   IAPProductionIdentifier, which is the in-app purchase bundle identifier, something
    like `com.myCompany.myInAppPurchase`.


    #### Contents folder


    The `Contents` folder contains all files related to a particular in-app purchase,
    like music, videos, images, texts, and so on, that are associated with the content
    you are selling.


    Note


    You can have any kind of content inside your in-app purchase, except code.


    ### Creating a package, the faster way


    Apple recommends using Xcode to create packages for your in-app purchases, but
    the process requires endless clicks and a maze of configurations.


    We have created another way for you, easier and suitable for bulk delivery.


    Here we go:


    Using Mac OS X Finder, create a folder with the name of your in-app purchase’s
    bundle identifier, something like `com.myCompany.myApp.pack100`. Let’s call this
    folder the main package folder.   Create a folder called `Contents` inside the
    main package folder.   Create a plain text file named `ContentInfo.plist` inside
    the main package folder.  


    At this point, you will have a structure like the one seen in Figure [10](#A978-1-4842-1560-9_1_Chapter.html#Fig10):


    ![A978-1-4842-1560-9_1_Fig10_HTML.jpg](A978-1-4842-1560-9_1_Fig10_HTML.jpg)


    Figure 10.


    In-app purchase package structureCopy all multimedia content that the package
    will deliver to the `Contents` folder.   Add a structure like the following one
    to your `ContentInfo.plist` file: `<?xml version="1.0" encoding="UTF-8"?>` `<!DOCTYPE
    plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)
           `"` [`http://www.apple.com/DTDs/PropertyList-1.0.dtd`](http://www.apple.com/DTDs/PropertyList-1.0.dtd)
    `">` `<plist version="1.0">` `<dict>`         `<key>ContentVersion</key>`         `<string>1.0</string>`
            `<key>IAPProductIdentifier</key>`         `<string>XXXXX</string>` `</dict>`
    `</plist>`  


    Replace `XXXXX` with the in-app purchase’s bundle ID, which, in this example,
    is `com.myCompany.myApp.pack100`.


    The folder structure is now just like the one seen in Figure [11](#A978-1-4842-1560-9_1_Chapter.html#Fig11):


    ![A978-1-4842-1560-9_1_Fig11_HTML.jpg](A978-1-4842-1560-9_1_Fig11_HTML.jpg)


    Figure 11.


    In-app purchase final structure


    ### Creating the final package


    It is time to create the final package file with a `pkg` extension.


    Launch Terminal in the folder that contains the main package folder, type the
    following command, and press the Return key:


    `productbuild --content <pathToInAppDirectory>` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                   `<pkg-name.pkg>`


    Example:


    `productbuild --content com.myCompany.myApp.pack100` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                   `com.myCompany.myApp.pack100.pkg`


    This command will create the package for you in the same directory. You can submit
    this package later to Apple using Application Loader.


    Note


    If the `productbuild` command fails it means that you have to install Xcode’s
    command-line tools on your system. To do that, launch Terminal and type the following
    command:


    `xcode-select –-install`'
  trans: "\n### `Info.plist` 不得分配给任何目标\n\n在 Xcode 的“项目导航器”（图 4）中选中 `Info.plist` 文件，然后在\
    \ Xcode 的右侧面板中，点击“文件检查器”图标（图 5 中圆圈标记处）。如图 5 所示的同一右侧面板中，请确保未将 `Info.plist` 文件分配给任何目标（见箭头）。\n\
    \n![A978-1-4842-1560-9_1_Fig5_HTML.jpg](img/A978-1-4842-1560-9_1_Fig5_HTML.jpg)\n\
    \n图 5.\n\n请勿将 `Info.plist` 分配给任何目标\n\n![A978-1-4842-1560-9_1_Fig4_HTML.jpg](img/A978-1-4842-1560-9_1_Fig4_HTML.jpg)\n\
    \n图 4.\n\n`Info.plist` 位置说明\n\n请勿将 `Info.plist` 分配给任何目标。\n\n## 未找到匹配的描述文件\n\n\
    当您尝试向 App Store 提交应用时，会出现如图 7 所示的错误信息。此信息的出现通常与两件事有关：描述文件已过期或缺失。\n\n![A978-1-4842-1560-9_1_Fig7_HTML.jpg](img/A978-1-4842-1560-9_1_Fig7_HTML.jpg)\n\
    \n图 7.\n\n未能找到签名资源\n\n### 缺失描述文件\n\n有时，上帝们早上心情不好，决定删除或吊销您的一些描述文件。“昨天一切都还运行良好，”您说道。我们理解。\n\
    \n首先，请导航至项目的“构建设置”选项卡（图 8），验证您是否已为所选目标配置了正确的描述文件。\n\n![A978-1-4842-1560-9_1_Fig8_HTML.jpg](img/A978-1-4842-1560-9_1_Fig8_HTML.jpg)\n\
    \n图 8.\n\n代码签名与描述文件\n\n如果描述文件缺失，请从“开发者门户”下载。\n\n说明\n\n好吧，我们可以建议您让 Xcode 自动获取描述文件，但不幸的是，此操作有\
    \ 99.99% 的概率无法解决此问题。还是自行下载描述文件更快。\n\n## 比 Photoshop 更好的图片压缩\n\n如果您喜欢自己压缩图像，以下是一些实用技巧。\n\
    \n据我们所知，Mac OS X 上用于图像优化和压缩的最佳应用程序是 `ImageOptim`（ [`www.imageoptim.com`](http://www.imageoptim.com/)\
    \ ）。`ImageOptim` 是一款免费应用程序，它在一个易于使用的界面中集成了许多优化工具，例如 `PNGOUT`、`Zopfli`、`Pngcrush`、`AdvPNG`、扩展的\
    \ `OptiPNG`、`JpegOptim`、`jpegrescan`、`jpegtran` 和 `Gifsicle`。\n\n默认情况下，Xcode 配置为压缩添加到包中的所有图像，但效果不如\
    \ `ImageOptim`。\n\n为了使用您自己压缩的图像，您需要通过禁用“构建设置”选项卡中的 `COMPRESS_PNG_FILES` 来禁用 Xcode\
    \ 的压缩标志。将此选项从 `YES` 更改为 `NO`，以防止 Xcode 压缩您已经压缩过的图像（图 9）。\n\n![A978-1-4842-1560-9_1_Fig9_HTML.jpg](img/A978-1-4842-1560-9_1_Fig9_HTML.jpg)\n\
    \n图 9.\n\n压缩 PNG 选项\n\n## 为 App 内购买创建包\n\n您已决定在您的应用中添加 App 内购买项目。这些 App 内购买项目将向用户提供内容，并由\
    \ Apple 托管这些内容。怎么做呢？\n\n### 提供内容\n\n在 iOS 6 发布之前，开发者负责在购买后为用户保留和提供内容。所有内容都必须存储由开发者自己维护的服务器上。\n\
    \n自从 Apple 推出 iOS 6 以来，可以将所有内容托管在 Apple，从而使过程更加简单。\n\n要将内容提交给 Apple，您必须将所有内容打包成一种特殊类型的文件，称为“包”。\n\
    \n### 什么是包？\n\n简单来说，包是一个结构化的文件夹。此文件夹内包含一个名为 `ContentInfo.plist` 的文件和一个名为 `Contents`\
    \ 的文件夹。\n\n#### `ContentInfo.plist`\n\n`ContentInfo.plist` 文件包含两个键：\n\n*   `ContentVersion`，代表内容的版本号；\n\
    *   `IAPProductionIdentifier`，即 App 内购买项目的捆绑标识符，如 `com.myCompany.myInAppPurchase`\
    \ 之类的内容。\n\n#### `Contents` 文件夹\n\n`Contents` 文件夹包含与特定 App 内购买项目相关的所有文件，例如音乐、视频、图像、文本等，这些都与您正在销售的内容相关联。\n\
    \n说明\n\n您的 App 内购买项目中可以包含任何类型的内容，但代码除外。\n\n### 创建包：更快的方法\n\nApple 推荐使用 Xcode 为您的\
    \ App 内购买项目创建包，但这个过程需要无尽的点击和复杂的配置。\n\n我们为您创建了另一种方法，更简单，适合批量交付。\n\n方法如下：\n\n使用\
    \ Mac OS X 的 Finder，创建一个以您的 App 内购买项目的捆绑标识符命名的文件夹，例如 `com.myCompany.myApp.pack100`。我们将这个文件夹称为主包文件夹。\
    \   在主包文件夹内创建一个名为 `Contents` 的文件夹。   在主包文件夹内创建一个纯文本文件，命名为 `ContentInfo.plist`。\
    \  \n\n此时，您将获得如图 10 所示的结构：\n\n![A978-1-4842-1560-9_1_Fig10_HTML.jpg](img/A978-1-4842-1560-9_1_Fig10_HTML.jpg)\n\
    \n图 10.\n\nApp 内购买包结构将包要交付的所有多媒体内容复制到 `Contents` 文件夹。   将如下结构添加到您的 `ContentInfo.plist`\
    \ 文件中：\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist\
    \ PUBLIC \"-//Apple//DTD PLIST 1.0//EN\"\n\"http://www.apple.com/DTDs/PropertyList-1.0.dtd\"\
    >\n<plist version=\"1.0\">\n<dict>\n    <key>ContentVersion</key>\n    <string>1.0</string>\n\
    \    <key>IAPProductIdentifier</key>\n    <string>XXXXX</string>\n</dict>\n</plist>\n\
    ```\n\n将 `XXXXX` 替换为 App 内购买项目的包 ID，在本例中为 `com.myCompany.myApp.pack100`。\n\n现在文件夹结构恰好如图\
    \ 11 所示：\n\n![A978-1-4842-1560-9_1_Fig11_HTML.jpg](img/A978-1-4842-1560-9_1_Fig11_HTML.jpg)\n\
    \n图 11.\n\nApp 内购买最终结构\n\n### 创建最终的包\n\n是时候创建扩展名为 `pkg` 的最终包文件了。\n\n在包含主包文件夹的目录中启动终端，键入以下命令，然后按回车键：\n\
    \n```bash\nproductbuild --content <pathToInAppDirectory> <pkg-name.pkg>\n```\n\
    \n示例：\n\n```bash\nproductbuild --content com.myCompany.myApp.pack100 com.myCompany.myApp.pack100.pkg\n\
    ```\n\n此命令将在同一目录中为您创建包。您可以稍后使用 Application Loader 将此包提交给 Apple。\n\n说明\n\n如果 `productbuild`\
    \ 命令失败，则意味着您需要在系统上安装 Xcode 的命令行工具。为此，请启动终端并键入以下命令：\n\n```bash\nxcode-select –-install\n\
    ```\n"
- fmt: "# Reduce Up to 75% of the Compiling Time\n\nOne of the most time-consuming\
    \ things about development is the time Xcode takes to compile, build, and run\
    \ your application.\n\nDepending on how you configure, it may be taking too long\
    \ to compile your code.\n\nOne of these \"wrong\" configurations will force Xcode\
    \ to generate files that are not necessary for development. One of these files\
    \ is a `dSYM` file that contains debug symbols of your compiled code. Generating\
    \ these files every time makes the compilation take a long time, unnecessarily.\n\
    \nYou can disable the `dSYM` generation for development by selecting Build Settings\
    \ ➤ Build Options ➤ Debug Information Format ➤ Debug (Figure [12](#A978-1-4842-1560-9_1_Chapter.html#Fig12))\
    \ and changing this item from `DWARF with dSYM File` to `DWARF` (Figure [12](#A978-1-4842-1560-9_1_Chapter.html#Fig12)).\n\
    \n![A978-1-4842-1560-9_1_Fig12_HTML.jpg](A978-1-4842-1560-9_1_Fig12_HTML.jpg)\n\
    \n**Figure 12.** Debug information format\n\n> **Note:** New projects created\
    \ by Xcode 7 have this option configured as `DWARF`, meaning that Xcode will not\
    \ create `dSYM` files during development.\n>\n> Previous versions of Xcode have\
    \ this same option set as `DWARF with dSYM file`, meaning that `dSYM` files will\
    \ be created during development and the project will take longer to compile.\n\
    \n> **Note:** If your project uses CocoaPods or deals with multiple target dependencies,\
    \ don't forget to change this option for all targets.\n>\n> You should keep `DWARF\
    \ with dSYM File` for the Release option or you will not be able to symbolicate\
    \ the crash logs when you get them from the App Store.\n\n> **Note:** During the\
    \ process of symbolication of a crash log, Xcode combines the raw crash log file\
    \ with the `dSYM` file and creates a human-readable version of the crash log.\
    \ That friendly version of the crash log contains information about the code that\
    \ the programmer can recognize and helps identify what caused the crash.\n\n#\
    \ Impossible \"Constants\" in Objective-C\n\nUnlike Swift, you cannot declare\
    \ a collection like an `NSArray`, `NSDictionary`, and so on, as a constant using\
    \ Objective-C; but we think we may have a solution for that.\n\nThe solution involves\
    \ creating an `NSObject`-based class and declaring static variables to back up\
    \ and simulate a \"constant\" collection.\n\n## Constants.h\n\n```\n#import <Foundation/Foundation.h>\n\
    \n@interface Constants : NSObject\n\n+ (NSArray *) myConstantArray;\n\n@end\n\
    ```\n\n## Constants.m\n\n```\n#import \"Constants.h\"\n\n@implementation Constants\n\
    \n+ (NSArray *) myConstantArray {\n     // by declaring the static on the implementation\
    \ we guarantee\n     // that other classes using this one will not make their\
    \ own copy of the static\n  static NSArray *_myConstantArray = nil;\n  @synchronized\
    \ (_myConstantArray) {\n    if (_myConstantArray == nil) {\n      _myConstantArray\
    \ = @[ /* declare your array here */ ];\n    }\n    return _myConstantArray;\n\
    \  }\n}\n\n@end\n```\n\nTo use this \"constant,\" you must use the following form:\n\
    \n```\nNSArray *anArray = [MyConstantClass myConstantArray];\n```\n\n# Concurrency\
    \ with Core Data\n\nSometimes your application may crash during Core Data operations\
    \ without a clear reason.\n\nOne of the possibilities we will explore now is that\
    \ the application may be accessing the `NSManagedObjectContext` object from different\
    \ threads, simultaneously.\n\nTo access Core Data entities from multiple threads\
    \ Apple recommends that you use thread confinement.\n\nThe pattern recommended\
    \ for concurrent programming with Core Data is thread confinement: each thread\
    \ must have its own entirely private managed object context.\n\nThere are two\
    \ possible ways to adopt the pattern:\n\n- Create a separate managed object context\
    \ for each thread and share a single persistent store coordinator. This is the\
    \ typically recommended approach.\n- Create a separate managed object context\
    \ and persistent store coordinator for each thread. This approach provides greater\
    \ concurrency at the expense of greater complexity (particularly if you need to\
    \ communicate changes between different contexts) and increased memory usage.\n\
    \nBefore you spend time developing the necessary code to support thread confinement,\
    \ you may want to confirm whether the problem your app is experiencing is really\
    \ being caused by multiple threads accessing the Core Data context object at the\
    \ same time.\n\n## The code\n\nBasically, the code is a lock mechanism in place\
    \ to control the context access. Just one thread will be able to access the context\
    \ at the same time.\n\nYou must find the point in your code where you are accessing\
    \ the context and add the following lines that are in **bold**:\n\n### Swift\n\
    \n**Entity.swift**\n\n```\nimport Foundation\nimport CoreData\n\n@objc(Entity)\n\
    class Entity: NSManagedObject {\n\n    static let lock = NSLock()\n\n    func\
    \ allObjectsInContext(context : NSManagedObjectContext)\n               -> NSArray\
    \ {\n\n        var all : NSArray?\n        // prepare a fetch request\n      \
    \  let request : NSFetchRequest? = NSFetchRequest()\n        request?.entity =\n\
    \                NSEntityDescription.entityForName(\"Entity\",\n             \
    \   inManagedObjectContext: context)\n        request?.returnsDistinctResults\
    \ = true\n\n        Entity.lock.lock()\n\n        do {\n            // this is\
    \ where you are accessing the context\n            all = try context.executeFetchRequest(request!)\n\
    \            // success ...\n        } catch let error as NSError { // failure\n\
    \            print(\"Fetch failed: \\(error.localizedDescription)\")\n       \
    \ }\n\n        Entity.lock.unlock()\n\n        return all!\n    }\n}\n```\n\n\
    ### Objective-C\n\n**Entity.h**\n\n```\n#import <Foundation/Foundation.h>\n#import\
    \ <CoreData/CoreData.h>\n\nNS_ASSUME_NONNULL_BEGIN\n\n@interface Entity : NSManagedObject\n\
    \n+ (NSArray *)allObjectsInContext:(NSManagedObjectContext *)\n              \
    \                         context;\n\n@end\n\nNS_ASSUME_NONNULL_END\n```\n\n**Entity.m**\n\
    \n```\n#import \"Entity.h\"\n\n@implementation Entity\n\n+ (NSArray *)allObjectsInContext:(NSManagedObjectContext\
    \ *)\n                                       context\n{\n  NSArray *all = nil;\n\
    \n  // prepare a fetch request\n  NSFetchRequest *request = [[NSFetchRequest alloc]\
    \ init];\n  request.entity = [NSEntityDescription\n                   entityForName:NSStringFromClass([self\
    \ class])\n          inManagedObjectContext:context];\n  [request setReturnsDistinctResults:YES];\n\
    \n  NSError *error = nil;\n\n  // this instruction will lock the context, preventing\n\
    \  // multiple accesses to it\n  @synchronized(context) {\n      // this is where\
    \ you are accessing the context\n      all = [context executeFetchRequest:request\
    \ error:&error];\n  }\n\n  return all;\n}\n\n@end\n```\n\n> **Note:** Be aware\
    \ that this mechanism may slow down your application, especially if you are dealing\
    \ with a database-intensive application. Use it for debug purposes only.\n>\n\
    > If your code stops crashing after you add the `@synchronized` line, then the\
    \ problem is confirmed and we recommend that you follow Apple's recommendations\
    \ and create independent contexts for each thread.\n\n# Creating Icons from Terminal\n\
    \nWhat about creating all icons for your iPhone, iPad, and Mac applications at\
    \ once, in seconds, without almost any effort?\n\nGood, isn't it? We have prepared\
    \ two scripts for you: one for creating icons for your iOS applications and another\
    \ for creating icons for your Mac applications."
  raw: '## Reduce Up to 75% of the Compiling Time


    One of the most time-consuming things about development is the time Xcode takes
    to compile, build, and run your application.


    Depending on how you configure, it may be taking too long to compile your code.


    One of these “wrong” configurations will force Xcode to generate files that are
    not necessary for development. One of these files is a `dSYM` file that contains
    debug symbols of your compiled code. Generating these files every time makes the
    compilation take a long time, unnecessarily.


    You can disable the `dSYM` generation for development by selecting Build Settings
    ➤ Build Options ➤ Debug Information Format ➤ Debug (Figure [12](#A978-1-4842-1560-9_1_Chapter.html#Fig12))
    and changing this item from `DWARF with dSYM` `File` to `DWARF` (Figure [12](#A978-1-4842-1560-9_1_Chapter.html#Fig12)).


    ![A978-1-4842-1560-9_1_Fig12_HTML.jpg](A978-1-4842-1560-9_1_Fig12_HTML.jpg)


    Figure 12.


    Debug information format Note


    New projects created by Xcode 7 have this option configured as `DWARF`, meaning
    that Xcode will not create `dSYM` files during development.


    Previous versions of Xcode have this same option set as `DWARF with dSYM file`,
    meaning that `dSYM` files will be created during development and the project will
    take longer to compile.


    Note


    If your project uses CocoaPods or deals with multiple target dependencies, don’t
    forget to change this option for all targets.


    You should keep `DWARF with dSYM File` for the Release option or you will not
    be able to symbolicate the crash logs when you get them from the App Store.


    Note


    During the process of symbolication of a crash log, Xcode combines the raw crash
    log file with the `dSYM` file and creates a human-readable version of the crash
    log. That friendly version of the crash log contains information about the code
    that the programmer can recognize and helps identify what caused the crash.


    ## Impossible “Constants” in Objective-C


    Unlike Swift, you cannot declare a collection like an `NSArray`, `NSDictionary`,
    and so on, as a constant using Objective-C; but we think we may have a solution
    for that.


    The solution involves creating an `NSObject`-based class and declaring static
    variables to back up and simulate a “constant” collection.


    ### Constants.h


    `#import <Foundation/Foundation.h>`


    `@interface Constants : NSObject`


    `+ (NSArray *) myConstantArray;`


    `@end`


    ### Constants.m


    `#import "Constants.h"`


    `@implementation Constants`


    `+ (NSArray *) myConstantArray {`


         `// by declaring the static on the implementation we guarantee`


         `// that other classes using this one will not make their own copy of the
    static`


      `static NSArray *_myConstantArray = nil;`


      `@synchronized (_myConstantArray) {`


        `if (_myConstantArray == nil) {`


          `_myConstantArray = @[ /* declare your array here */ ];`


        `}`


        `return _myConstantArray;`


      `}`


    `}`


    `@end`


    To use this “constant,” you must use the following form:


    `NSArray *anArray = [MyConstantClass myConstantArray];`


    ## Concurrency with Core Data


    Sometimes your application may crash during Core Data operations without a clear
    reason.


    One of the possibilities we will explore now is that the application may be accessing
    the `NSManagedObjectContext` object from different threads, simultaneously.


    To access Core Data entities from multiple threads Apple recommends that you use
    thread confinement.


    The pattern recommended for concurrent programming with Core Data is thread confinement:
    each thread must have its own entirely private managed object context.


    There are two possible ways to adopt the pattern:


    Create a separate managed object context for each thread and share a single persistent
    store coordinator. This is the typically recommended approach.   Create a separate
    managed object context and persistent store coordinator for each thread. This
    approach provides greater concurrency at the expense of greater complexity (particularly
    if you need to communicate changes between different contexts) and increased memory
    usage.  


    Before you spend time developing the necessary code to support thread confinement,
    you may want to confirm whether the problem your app is experiencing is really
    being caused by multiple threads accessing the Core Data context object at the
    same time.


    ### The code


    Basically, the code is a lock mechanism in place to control the context access.
    Just one thread will be able to access the context at the same time.


    You must find the point in your code where you are accessing the context and add
    the following lines that are in `bold`:


    #### Swift


    Entity.swift


    `import Foundation`


    `import CoreData`


    `@objc(Entity)`


    `class Entity: NSManagedObject {`


         `static let lock = NSLock()`


      `func allObjectsInContext(context : NSManagedObjectContext)` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                   `-> NSArray {`


        `var all : NSArray?`


        `// prepare a fetch request`


        `let request : NSFetchRequest? = NSFetchRequest()`


        `request?.entity =` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                 `NSEntityDescription.entityForName("Entity",` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


    `inManagedObjectContext: context)`


        `request?.returnsDistinctResults = true`


             `Entity.lock.lock()`


          `do {`


            `// this is where you are accessing the context`


            `all = try context.executeFetchRequest(request!)`


            `// success ...`


          `} catch let error as NSError { // failure`


            `print("Fetch failed: \(error.localizedDescription)")`


          `}`


              `Entity.lock.unlock()`


        `return all!`


      `}`


    `}`


    #### Objective-C


    Entity.h


    `#import <Foundation/Foundation.h>`


    `#import <CoreData/CoreData.h>`


    `NS_ASSUME_NONNULL_BEGIN`


    `@interface Entity : NSManagedObject`


    `+ (NSArray *)allObjectsInContext:(NSManagedObjectContext *)` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                                           `context;`


    `@end`


    `NS_ASSUME_NONNULL_END`


    Entity.m


    `#import "Entity.h"`


    `@implementation Entity`


    `+ (NSArray *)allObjectsInContext:(NSManagedObjectContext *)` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                                           `context`


    `{`


      `NSArray *all = nil;`


      `// prepare a fetch request`


      `NSFetchRequest *request = [[NSFetchRequest alloc] init];`


      `request.entity = [NSEntityDescription` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                       `entityForName:NSStringFromClass([self class])` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


              `inManagedObjectContext:context];`


      `[request setReturnsDistinctResults:YES];`


      `NSError *error = nil;`


      `// this instruction will lock the context, preventing`


      `// multiple accesses to it`


      `@synchronized(context) {`


          `// this is where you are accessing the context`


          `all = [context executeFetchRequest:request error:&error];`


    `}`


      `return all;`


    `}`


    `@end`


    Note


    Be aware that this mechanism may slow down your application, especially if you
    are dealing with a database-intensive application. Use it for debug purposes only.


    If your code stops crashing after you add the `@synchronized` line, then the problem
    is confirmed and we recommend that you follow Apple’s recommendations and create
    independent contexts for each thread.


    ## Creating Icons from Terminal


    What about creating all icons for your iPhone, iPad, and Mac applications at once,
    in seconds, without almost any effort?


    Good, isn’t it? We have prepared two scripts for you: one for creating icons for
    your iOS applications and another for creating icons for your Mac applications.'
  trans: "好的，作为一名高级文档工程师和翻译员，我将遵循您给出的注意事项和示例，将以下英文文本翻译成中文。\n\n\n# 将编译时间减少高达 75%\n\n\
    开发过程中最耗时的环节之一就是 Xcode 编译、构建和运行应用程序所花费的时间。\n\n根据你的配置方式，编译代码的时间可能会过长。\n\n其中一种“错误”配置会强制\
    \ Xcode 生成开发过程中不必要的文件。其中一个文件是 `dSYM` 文件，它包含编译后代码的调试符号。每次生成这些文件都会不必要地拖长编译时间。\n\n\
    你可以通过在“Build Settings”➤ “Build Options”➤ “Debug Information Format”➤ “Debug”（图\
    \ 12）中将该项从 `DWARF with dSYM File` 更改为 `DWARF`（图 12）来禁用开发环境下的 `dSYM` 文件生成。\n\n\
    ![A978-1-4842-1560-9_1_Fig12_HTML.jpg](img/A978-1-4842-1560-9_1_Fig12_HTML.jpg)\n\
    \n**图 12.** 调试信息格式\n\n> **注意：** 由 Xcode 7 创建的新项目已将此选项配置为 `DWARF`，这意味着 Xcode 在开发期间不会创建\
    \ `dSYM` 文件。\n>\n> 旧版本的 Xcode 将此选项设置为 `DWARF with dSYM file`，这意味着在开发期间会生成 `dSYM`\
    \ 文件，从而导致项目编译时间更长。\n\n> **注意：** 如果你的项目使用了 CocoaPods 或涉及多个目标依赖，请记得为所有目标更改此选项。\n\
    >\n> 你应该为 Release 选项保留 `DWARF with dSYM File`，否则在你从 App Store 获取崩溃日志时，将无法对其进行符号化。\n\
    \n> **注意：** 在崩溃日志的符号化过程中，Xcode 会将原始的崩溃日志文件与 `dSYM` 文件合并，生成一个人类可读的崩溃日志版本。这个友好的崩溃日志版本包含程序员能够识别的代码信息，有助于确定崩溃的原因。\n\
    \n# Objective-C 中不可能的“常量”\n\n与 Swift 不同，你无法使用 Objective-C 将一个像 `NSArray`、`NSDictionary`\
    \ 这样的集合声明为常量；但我们认为我们或许有一个解决方案。\n\n该方案涉及创建一个基于 `NSObject` 的类，并声明静态变量来备份和模拟一个“常量”集合。\n\
    \n## Constants.h\n\n```\n#import <Foundation/Foundation.h>\n\n@interface Constants\
    \ : NSObject\n\n+ (NSArray *) myConstantArray;\n\n@end\n```\n\n## Constants.m\n\
    \n```\n#import \"Constants.h\"\n\n@implementation Constants\n\n+ (NSArray *) myConstantArray\
    \ {\n     // 通过将静态变量声明在实现文件中，我们保证\n     // 使用此类的其他类不会创建该静态变量的副本\n  static NSArray\
    \ *_myConstantArray = nil;\n  @synchronized (_myConstantArray) {\n    if (_myConstantArray\
    \ == nil) {\n      _myConstantArray = @[ /* 在这里声明你的数组 */ ];\n    }\n    return\
    \ _myConstantArray;\n  }\n}\n\n@end\n```\n\n要使用这个“常量”，你必须使用以下形式：\n\n```\nNSArray\
    \ *anArray = [MyConstantClass myConstantArray];\n```\n\n# Core Data 的并发处理\n\n\
    有时，你的应用程序可能在执行 Core Data 操作时崩溃，且原因不明。\n\n我们现在要探讨的一种可能性是，应用程序可能同时从不同的线程访问了 `NSManagedObjectContext`\
    \ 对象。\n\n为了从多线程访问 Core Data 实体，Apple 建议你使用线程隔离。\n\nCore Data 推荐的并发编程模式是线程隔离：每个线程都必须拥有自己完全私有的托管对象上下文。\n\
    \n采用这种模式有两种可能的方法：\n\n- 为每个线程创建一个独立的托管对象上下文，并共享一个持久化存储协调器。这是通常推荐的方法。\n- 为每个线程创建一个独立的托管对象上下文和持久化存储协调器。这种方法提供了更高的并发性，但代价是更高的复杂性（特别是在不同上下文之间通信变更时）和更高的内存使用率。\n\
    \n在你花时间开发支持线程隔离的必要代码之前，你可能需要确认你的应用遇到的问题是否真的是由多个线程同时访问 Core Data 上下文对象引起的。\n\n\
    ## 代码实现\n\n基本上，这段代码是一个用于控制上下文访问的锁机制。同一时间只有一个线程能够访问上下文。\n\n你必须找到代码中访问上下文的位置，并添加以下用**粗体**标出的行：\n\
    \n### Swift\n\n**Entity.swift**\n\n```\nimport Foundation\nimport CoreData\n\n\
    @objc(Entity)\nclass Entity: NSManagedObject {\n\n    static let lock = NSLock()\n\
    \n    func allObjectsInContext(context : NSManagedObjectContext)\n           \
    \    -> NSArray {\n\n        var all : NSArray?\n        // 准备一个获取请求\n       \
    \ let request : NSFetchRequest? = NSFetchRequest()\n        request?.entity =\n\
    \                NSEntityDescription.entityForName(\"Entity\",\n             \
    \   inManagedObjectContext: context)\n        request?.returnsDistinctResults\
    \ = true\n\n        Entity.lock.lock()\n\n        do {\n            // 这就是你访问上下文的地方\n\
    \            all = try context.executeFetchRequest(request!)\n            // 成功...\n\
    \        } catch let error as NSError { // 失败\n            print(\"获取失败: \\(error.localizedDescription)\"\
    )\n        }\n\n        Entity.lock.unlock()\n\n        return all!\n    }\n}\n\
    ```\n\n### Objective-C\n\n**Entity.h**\n\n```\n#import <Foundation/Foundation.h>\n\
    #import <CoreData/CoreData.h>\n\nNS_ASSUME_NONNULL_BEGIN\n\n@interface Entity\
    \ : NSManagedObject\n\n+ (NSArray *)allObjectsInContext:(NSManagedObjectContext\
    \ *)\n                                       context;\n\n@end\n\nNS_ASSUME_NONNULL_END\n\
    ```\n\n**Entity.m**\n\n```\n#import \"Entity.h\"\n\n@implementation Entity\n\n\
    + (NSArray *)allObjectsInContext:(NSManagedObjectContext *)\n                \
    \                       context\n{\n  NSArray *all = nil;\n\n  // 准备一个获取请求\n \
    \ NSFetchRequest *request = [[NSFetchRequest alloc] init];\n  request.entity =\
    \ [NSEntityDescription\n                   entityForName:NSStringFromClass([self\
    \ class])\n          inManagedObjectContext:context];\n  [request setReturnsDistinctResults:YES];\n\
    \n  NSError *error = nil;\n\n  // 这条指令将锁住上下文，防止\n  // 对其的多次访问\n  @synchronized(context)\
    \ {\n      // 这就是你访问上下文的地方\n      all = [context executeFetchRequest:request error:&error];\n\
    \  }\n\n  return all;\n}\n\n@end\n```\n\n> **注意：** 请注意，这个机制可能会降低你的应用程序速度，尤其是在处理数据库密集型应用时。请仅将其用于调试目的。\n\
    >\n> 如果在添加 `@synchronized` 这行代码后你的代码不再崩溃，那么问题就得到了确认，我们建议你遵循 Apple 的建议，为每个线程创建独立的上下文。\n\
    \n# 从终端创建图标\n\n一次性为你的 iPhone、iPad 和 Mac 应用程序创建所有图标，只需几秒钟，几乎不费吹灰之力，怎么样？\n\n很不错，对吧？我们为你准备了两份脚本：一份用于为你的\
    \ iOS 应用创建图标，另一份用于为你的 Mac 应用创建图标。\n"
- fmt: "# Creating Icons for iOS Applications\n\nThe following script creates icons\
    \ for iOS applications:\n\n```\nmkdir -p ./icons_iphone\nmkdir -p ./icons_ipad\n\
    for x in 29 40 60\ndo\n   double=$(($x * 2))\n   triple=$(($x * 3))\n   sips --resampleWidth\
    \ $double icon.png --out ./icons_iphone/icon-$x@2x.png\n   sips --resampleWidth\
    \ $triple icon.png --out ./icons_iphone/icon-$x@3x.png\ndone\nfor x in 29 40 76\n\
    do\n   double=$(($x * 2))\n   sips --resampleWidth $x icon.png --out ./icons_ipad/icon-$x.png\n\
    \   sips --resampleWidth $double icon.png --out ./icons_ipad/icon-$x@2x.png\n\
    done\n```\n\n**Note:** This script will create two folders: one containing the\
    \ iPhone and the other containing the iPad icons.\n\niOS icons will be created\
    \ with the following sizes: 29, 40, and 60 points @2x and @3x for iPhone and 29,\
    \ 40, and 76 points @1x and @2x for iPad. Applications compiled for iOS 7 and\
    \ up use these formats.\n\n## Creating Icons for OS X Applications\n\nUse the\
    \ following script to create icons for your Mac applications:\n\n```\nmkdir -p\
    \ ./icons_mac\nfor x in 512 256 128 32 16\ndo\n   double=$(($x * 2))\n   sips\
    \ --resampleWidth $double icon.png –out ./icons_mac/icon-$x@2x.png\n   sips --resampleWidth\
    \ $x icon.png --out ./icons_mac/icon-$x.png\ndone\n```\n\n**Note:** Mac OS X icons\
    \ will be created with the following sizes (compatible with Mac OS X 10.8 and\
    \ up): 16, 32, 128, 256, and 512 points at @1x and @2x resolutions.\n\n## Using\
    \ the Scripts\n\nCreate a big version of your application’s icon with at least\
    \ 1024 x 1024 pixels and save this image as `icon.png` to the Desktop folder.\
    \ Launch Terminal in your Desktop folder. Copy (C) and paste (V) one of the scripts\
    \ listed in this section to the Terminal window and press the Return key.\n\n\
    The script will execute and pause. Press the Return key again to resume the script.\n\
    \n**Note:** Instead of copying and pasting the codes every time you want to use\
    \ them, you can use the scripts we have provided in this book and at apress.com.\n\
    \n## UINavigationBar Tint Not Working\n\nIf you are trying to change the tint\
    \ color of a navigation bar using the `tintColor` property and the color is not\
    \ changing, it turns out that the navigation bar has another tint property called\
    \ `barTintColor`. Instead, you should use the methods shown next.\n\n### Swift\n\
    \n```\nlet bar = self.navigationController?.navigationBar\nbar?.barTintColor =\
    \ UIColor.greenColor()\n```\n\n### Objective-C\n\n```\nUINavigationBar *bar =\
    \ self.navigationController.navigationBar;\nbar.barTintColor = [UIColor greenColor];\n\
    ```\n\n## Debugging an Insanely Hard Quartz Error\n\nIf your project uses Quartz\
    \ extensively and the code is crashing without giving you any clues to the problem,\
    \ you will love this section.\n\n### There Is Hope...\n\nA possible solution for\
    \ debugging a complex Quartz application is to add a `CGPostError` breakpoint\
    \ to your project.\n\nSelect the Breakpoint Navigator (1), click the + at the\
    \ bottom left of the pane (2), choose Add Symbolic Breakpoint (3), and fill the\
    \ Symbol field with `CGPostError` (Figure 13).\n\nXCode will now stop at the offending\
    \ lines if they are related to Quartz.\n\n## Adding Objects to an Array Concurrently\n\
    \nIf you ever tried to add objects to an `NSMutableArray` concurrently you know\
    \ that it is impossible. An `NSMutableArray` will not allow simultaneous access\
    \ to its contents.\n\nThis Objective-C code, for example, will crash with the\
    \ error message: \"NSArray was mutated while being enumerated.\"\n\n### Objective-C\n\
    \n```\nNSMutableArray *newArray = [[NSMutableArray alloc] init];\n[anotherArray\n\
    \   enumerateObjectsWithOptions:NSEnumerationConcurrent\n                   usingBlock:^(id\
    \ obj,\n                                NSUInteger idx, BOOL *stop)\n{\n  // add\
    \ a new object to newArray\n  [newArray addObject:newObject];\n}];\n```\n\nThe\
    \ crash happens because the enumeration runs concurrently. Any two threads trying\
    \ to add a new object to `newArray` at the same time will crash the application.\n\
    \n### Old-School C\n\nThe solution is to use an old-school C array.\n\n```\n//\
    \ cArray is an array of \"id\" elements\n// count is the number of entries the\
    \ cArray will have\nid cArray [count];\nid __strong *arrayPtr = cArray;\n/* populate\
    \ the array\n   arrayPtr[0] = ...\n   arrayPtr[1] = ...\n   arrayPtr[2] = ...\n\
    \   etc...\n*/\n[anotherArray\n    enumerateObjectsWithOptions:NSEnumerationConcurrent\n\
    \                     usingBlock:^(id obj, NSUInteger idx,\n                 \
    \                 BOOL *stop) {\n        arrayPtr[idx] = newObject;\n}];\n```\n\
    \nThis solution works because as `idx` increments, a different memory allocation\
    \ of `arrayPtr[idx]` will be given for the enumeration. There is no way for two\
    \ threads to access the same memory address. For that reason, this code will never\
    \ crash.\n\n### Back to the Future\n\nYou can later convert this C array into\
    \ a regular `NSMutableArray` by using the following:\n\n```\nNSMutableArray *array\
    \ = [NSMutableArray\n                arrayWithObjects:cArray\n               \
    \            count:count];\n```\n\n**Note:** Simultaneous access to an array in\
    \ Swift works just fine and no additional code is necessary.\n\n## The App Is\
    \ Damaged and Can’t Be Opened\n\nFollowing is part of the error message presented\
    \ by Xcode: Delete the app and download it again from the App Store.\n\n### The\
    \ Condition\n\nWe had a Cocoa application trying to validate its internal purchase\
    \ receipt at launch, but we did not find the receipt inside the bundle.\n\nFollowing\
    \ Apple's instructions, we forced the application to quit using `exit(173)`, which\
    \ instructs iTunes to retrieve the missing receipt, but we still were not able\
    \ to retrieve the receipt.\n\nFollowing is what Apple has to say about receipt\
    \ validation failure (http://addfone.com/TXReceiptValidation):\n\n- Respond to\
    \ Receipt Validation Failure\n\n> Validation can fail for a variety of reasons.\
    \ For example, when users copy your application from one Mac to another, the GUID\
    \ no longer matches, causing receipt validation to fail.\n\nExit If Validation\
    \ Fails in OS X\n\n> If validation fails in OS X, call `exit` with a status of\
    \ 173. This exit status notifies the system that your application has determined\
    \ that its receipt is invalid. At this point, the system attempts to obtain a\
    \ valid receipt and may prompt for the user's iTunes credentials.\n\nSeveral web\
    \ pages on the Internet indicate how this problem relates to certificates, but\
    \ we have experienced this problem several times before and have observed another\
    \ condition that may also cause this error: a corrupt sandbox user."
  raw: '## Creating Icons for iOS Applications


    The following script creates icons for iOS applications:


    `mkdir -p ./icons_iphone` `mkdir -p ./icons_ipad` `for x in 29 40 60` `do`


       `double=$(($x * 2))`


       `triple=$(($x * 3))`


       `sips --resampleWidth $double icon.png --out` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                               `./icons_iphone/icon-$x@2x.png`


       `sips --resampleWidth $triple icon.png --out` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                               `./icons_iphone/icon-$x@3x.png`


    `done`


    `for x in 29 40 76` `do`


       `double=$(($x * 2))`


       `sips --resampleWidth $x icon.png --out ./icons_ipad/icon-` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                                `$x.png`


       `sips --resampleWidth $double icon.png --out` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                         `./icons_ipad/icon-$x@2x.png`


    `done`


    Note


    This script will create two folders: one containing the iPhone and the other containing
    the iPad icons.


    iOS icons will be created with the following sizes: 29, 40, and 60 points @2x
    and @3x for iPhone and 29, 40, and 76 points @1x and @2x for iPad. Applications
    compiled for iOS 7 and up use these formats.


    ### Creating icons for OS X applications


    Use the following script to create icons for your Mac applications:


    `mkdir -p ./icons_mac` `for x in 512 256 128 32 16` `do`


       `double=$(($x * 2))`


       `sips --resampleWidth $double icon.png –out` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                      `./icons_mac/icon-$x@2x.png`


       `sips --resampleWidth $x icon.png --out` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                       `./icons_mac/icon-$x.png`


    `done`


    Note


    Mac OS X icons will be created with the following sizes (compatible with Mac OS
    X 10.8 and up): 16, 32, 128, 256, and 512 points at @1x and @2x resolutions.


    ### Using the scripts


    Create a big version of your application’s icon with at least 1024 x 1024 pixels
    and save this image as `icon.png` to the Desktop folder.   Launch Terminal in
    your Desktop folder.   Copy (![A978-1-4842-1560-9_1_Figb_HTML.jpg](A978-1-4842-1560-9_1_Figb_HTML.jpg)C)
    and paste (![A978-1-4842-1560-9_1_Figb_HTML.jpg](A978-1-4842-1560-9_1_Figb_HTML.jpg)V)
    one of the scripts listed in this section to the Terminal window and press the
    Return key.  


    The script will execute and pause. Press the Return key again to resume the script.


    Note


    Instead of copying and pasting the codes every time you want to use them, you
    can use the scripts we have provided in this book and at apress.com.


    ## UINavigationBar Tint Not Working


    If you are trying to change the tint color of a navigation bar using the `tintColor`
    property and the color is not changing, it turns out that the navigation bar has
    another tint property called `barTintColor`. Instead, you should use the methods
    shown next.


    ### Swift


    `let bar = self.navigationController?.navigationBar`


    `bar?.barTintColor = UIColor.greenColor()`


    ### Objective-C


    `UINavigationBar *bar = self.navigationController.navigationBar;`


    `bar.barTintColor = [UIColor greenColor];`


    ## Debugging an Insanely Hard Quartz Error


    If your project uses Quartz extensively and the code is crashing without giving
    you any clues to the problem, you will love this section.


    ### There is hope...


    A possible solution for debugging a complex Quartz application is to add a `CGPostError`
    breakpoint to your project.


    Select the Breakpoint Navigator (1), click the + at the bottom left of the pane
    (2), choose Add Symbolic Breakpoint (3), and fill the Symbol field with `CGPostError`
    (Figure [13](#A978-1-4842-1560-9_1_Chapter.html#Fig13)).


    ![A978-1-4842-1560-9_1_Fig13_HTML.jpg](A978-1-4842-1560-9_1_Fig13_HTML.jpg)


    Figure 13.


    Add symbolic breakpoint


    XCode will now stop at the offending lines if they are related to Quartz.


    ## Adding Objects to an Array Concurrently


    If you ever tried to add objects to an `NSMutableArray` concurrently you know
    that it is impossible. An `NSMutableArray` will not allow simultaneous access
    to its contents.


    This Objective-C code, for example, will crash with the error message: “NSArray
    was mutated while being enumerated.”


    ### Objective-C


    `NSMutableArray *newArray = [[NSMutableArray alloc] init];`


    `[anotherArray`


       `enumerateObjectsWithOptions:NSEnumerationConcurrent` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                        `usingBlock:^(id obj,` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                                     `NSUInteger idx, BOOL *stop)`


    `{`


      `// add a new object to newArray`


      `[newArray addObject:newObject];`


    `}];`


    The crash happens because the enumeration runs concurrently. Any two threads trying
    to add a new object to `newArray` at the same time will crash the application.


    ### Old-School C


    The solution is to use an old-school C array.


    `// cArray is an array of "id" elements`


    `// count is the number of entries the cArray will have`


    `id cArray [count];`


    `id __strong *arrayPtr = cArray;`


    `/* populate the array`


       `arrayPtr[0] = ...`


       `arrayPtr[1] = ...`


       `arrayPtr[2] = ...`


       `etc...`


    `*/`


    `[anotherArray` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


        `enumerateObjectsWithOptions:NSEnumerationConcurrent` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                         `usingBlock:^(id obj, NSUInteger idx,` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                                      `BOOL *stop) {`


            `arrayPtr[idx] = newObject;`


    `}];`


    This solution works because as `idx` increments, a different memory allocation
    of `arrayPtr[idx]` will be given for the enumeration. There is no way for two
    threads to access the same memory address. For that reason, this code will never
    crash.


    ### Back to the future


    You can later convert this C array into a regular `NSMutableArray` by using the
    following:


    `NSMutableArray *array = [NSMutableArray` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                    `arrayWithObjects:cArray` ![A978-1-4842-1560-9_1_Figa_HTML.jpg](A978-1-4842-1560-9_1_Figa_HTML.jpg)


                               `count:count];`


    Note


    Simultaneous access to an array in Swift works just fine and no additional code
    is necessary.


    ## The App Is Damaged and Can’t Be Opened


    Following is part of the error message presented by Xcode: Delete the app and
    download it again from the App Store.


    ### The Condition


    We had a Cocoa application trying to validate its internal purchase receipt at
    launch, but we did not find the receipt inside the bundle.


    Following Apple’s instructions, we forced the application to quit using `exit(173)`,
    which instructs iTunes to retrieve the missing receipt, but we still were not
    able to retrieve the receipt.


    Following is what Apple has to say about receipt validation failure ( [`http://addfone.com/TXReceiptValidation`](http://addfone.com/TXReceiptValidation)
    ):


    *   Respond to Receipt Validation Failure


    > Validation can fail for a variety of reasons. For example, when users copy your
    application from one Mac to another, the GUID no longer matches, causing receipt
    validation to fail.


    Exit If Validation Fails in OS X


    > If validation fails in OS X, call exit with a status of 173\. This exit status
    notifies the system that your application has determined that its receipt is invalid.
    At this point, the system attempts to obtain a valid receipt and may prompt for
    the user’s iTunes credentials.


    Several web pages on the Internet indicate how this problem relates to certificates,
    but we have experienced this problem several times before and have observed another
    condition that may also cause this error: a corrupt sandbox user.'
  trans: "\n# 为 iOS 应用创建图标\n\n以下脚本用于创建 iOS 应用图标：\n\n```\nmkdir -p ./icons_iphone\n\
    mkdir -p ./icons_ipad\nfor x in 29 40 60\ndo\n   double=$(($x * 2))\n   triple=$(($x\
    \ * 3))\n   sips --resampleWidth $double icon.png --out ./icons_iphone/icon-$x@2x.png\n\
    \   sips --resampleWidth $triple icon.png --out ./icons_iphone/icon-$x@3x.png\n\
    done\nfor x in 29 40 76\ndo\n   double=$(($x * 2))\n   sips --resampleWidth $x\
    \ icon.png --out ./icons_ipad/icon-$x.png\n   sips --resampleWidth $double icon.png\
    \ --out ./icons_ipad/icon-$x@2x.png\ndone\n```\n\n**注意：** 此脚本会创建两个文件夹：一个包含 iPhone\
    \ 图标，另一个包含 iPad 图标。\n\niOS 图标将按以下尺寸创建：iPhone 使用 29、40 和 60 点 @2x 和 @3x，iPad 使用\
    \ 29、40 和 76 点 @1x 和 @2x。为 iOS 7 及以上版本编译的应用使用这些格式。\n\n## 为 OS X 应用创建图标\n\n使用以下脚本为你的\
    \ Mac 应用创建图标：\n\n```\nmkdir -p ./icons_mac\nfor x in 512 256 128 32 16\ndo\n \
    \  double=$(($x * 2))\n   sips --resampleWidth $double icon.png –out ./icons_mac/icon-$x@2x.png\n\
    \   sips --resampleWidth $x icon.png --out ./icons_mac/icon-$x.png\ndone\n```\n\
    \n**注意：** Mac OS X 图标将按以下尺寸创建（兼容 Mac OS X 10.8 及以上版本）：16、32、128、256 和 512 点，分辨率分别为\
    \ @1x 和 @2x。\n\n## 使用脚本\n\n创建应用图标的大尺寸版本（至少 1024 x 1024 像素），并将此图像保存为 `icon.png`\
    \ 到桌面文件夹。在桌面文件夹中启动终端。复制（C）并粘贴（V）本节列出的其中一个脚本到终端窗口中，然后按下回车键。\n\n脚本将执行并暂停。再次按下回车键以继续执行脚本。\n\
    \n**注意：** 如果不想每次使用时都复制粘贴代码，可以使用本书和 apress.com 上提供的脚本。\n\n## UINavigationBar 色调不生效\n\
    \n如果你尝试使用 `tintColor` 属性更改导航栏的色调颜色但颜色未变化，这是因为导航栏还有另一个名为 `barTintColor` 的色调属性。你应该改用下面所示的方法。\n\
    \n### Swift\n\n```\nlet bar = self.navigationController?.navigationBar\nbar?.barTintColor\
    \ = UIColor.greenColor()\n```\n\n### Objective-C\n\n```\nUINavigationBar *bar\
    \ = self.navigationController.navigationBar;\nbar.barTintColor = [UIColor greenColor];\n\
    ```\n\n## 调试极其棘手的 Quartz 错误\n\n如果你的项目大量使用 Quartz，并且代码崩溃时没有给出任何问题线索，你会喜欢这一节。\n\n\
    ### 还有希望...\n\n调试复杂 Quartz 应用程序的一个可行解决方案是为你的项目添加一个 `CGPostError` 断点。\n\n选择断点导航器（1），点击面板左下角的\
    \ +（2），选择添加符号断点（3），然后在符号字段中填入 `CGPostError`（图 13）。\n\n如果问题行与 Quartz 相关，XCode 现在就会在出错行处停止。\n\
    \n## 并发向数组添加对象\n\n如果你曾尝试并发向 `NSMutableArray` 添加对象，你会知道这是不可能的。`NSMutableArray`\
    \ 不允许同时访问其内容。\n\n例如，以下 Objective-C 代码会崩溃，并显示错误消息：\"NSArray was mutated while being\
    \ enumerated.\"\n\n### Objective-C\n\n```\nNSMutableArray *newArray = [[NSMutableArray\
    \ alloc] init];\n[anotherArray\n   enumerateObjectsWithOptions:NSEnumerationConcurrent\n\
    \                   usingBlock:^(id obj,\n                                NSUInteger\
    \ idx, BOOL *stop)\n{\n  // 向 newArray 添加新对象\n  [newArray addObject:newObject];\n\
    }];\n```\n\n崩溃是因为枚举是并发运行的。任何两个线程同时尝试向 `newArray` 添加新对象都会导致应用程序崩溃。\n\n### 老式 C\
    \ 语言方法\n\n解决方案是使用老式的 C 语言数组。\n\n```\n// cArray 是一个 \"id\" 类型元素的数组\n// count 是\
    \ cArray 将拥有的条目数\nid cArray [count];\nid __strong *arrayPtr = cArray;\n/* 填充数组\n\
    \   arrayPtr[0] = ...\n   arrayPtr[1] = ...\n   arrayPtr[2] = ...\n   等等...\n\
    */\n[anotherArray\n    enumerateObjectsWithOptions:NSEnumerationConcurrent\n \
    \                    usingBlock:^(id obj, NSUInteger idx,\n                  \
    \                BOOL *stop) {\n        arrayPtr[idx] = newObject;\n}];\n```\n\
    \n此方法有效，因为随着 `idx` 递增，枚举时将为 `arrayPtr[idx]` 分配不同的内存地址。两个线程不可能访问同一个内存地址。因此，这段代码永远不会崩溃。\n\
    \n### 回到未来\n\n随后，你可以使用以下代码将这个 C 数组转换为普通的 `NSMutableArray`：\n\n```\nNSMutableArray\
    \ *array = [NSMutableArray\n                arrayWithObjects:cArray\n        \
    \                   count:count];\n```\n\n**注意：** Swift 中数组的并发访问完全正常，无需额外代码。\n\
    \n## 应用已损坏，无法打开\n\n以下是 Xcode 显示的错误信息的一部分：删除该应用并重新从 App Store 下载。\n\n### 情况\n\n\
    我们有一个 Cocoa 应用在启动时尝试验证其内部购买收据，但在 bundle 中未找到收据。\n\n按照 Apple 的指示，我们使用 `exit(173)`\
    \ 强制应用退出，这会指示 iTunes 检索缺失的收据，但我们仍然无法获取该收据。\n\n以下是 Apple 关于收据验证失败的说法（http://addfone.com/TXReceiptValidation）：\n\
    \n- 应对收据验证失败\n\n> 验证失败的原因有多种。例如，当用户将你的应用从一台 Mac 复制到另一台时，GUID 不再匹配，导致收据验证失败。\n\n\
    在 OS X 中验证失败则退出\n\n> 如果在 OS X 中验证失败，请以状态码 173 调用 `exit`。此退出状态通知系统你的应用已确定其收据无效。此时，系统会尝试获取有效收据，并可能提示用户输入其\
    \ iTunes 凭证。\n\n互联网上的多个网页说明了此问题与证书的关系，但我们之前多次遇到此问题，并观察到另一种可能导致此错误的情况：沙盒用户已损坏。\n"
- fmt: "### The Gods Want to Punish You\n\nYou know the drill: one day you are happy,\
    \ the sun is shining, the flowers are blooming, the birds are singing, and everything\
    \ is working fine on `Xcode`.\n\nThe day after that, the Gods wake up on the wrong\
    \ foot and punish you. Sometimes they punish you indirectly, by sentencing the\
    \ sandbox user to a miserable death by internal corruption. When that happens,\
    \ retrieving or validating purchase receipts for that user will fail.\n\nAs a\
    \ bonus, the Gods will never present you with any error message that can provide\
    \ a tip about the real reason for the problem—and you will never guess.\n\nThe\
    \ solution for a dead sandbox user is to delete the offending user and create\
    \ a new one via `iTunesConnect`.\n\n**Note**  \nAnother possible solution you\
    \ can try is to open the Mac App Store application (if you are dealing with a\
    \ Mac application) or `iTunes` (if you are dealing with an iOS application), log\
    \ out from the current account, and quit the application immediately after that.\n\
    \n### Application Failing to Obtain a Receipt\n\nYou have created a new sandbox\
    \ user as instructed in the previous section, but your application is still failing\
    \ to obtain the purchase receipt?\n\nVerify if your code is properly signed.\n\
    \nGo to the target’s Build Settings and adjust the Debug and Release fields of\
    \ `Code Signing Identity` and `Provisioning Profile` with the correspondent values\
    \ for your application (Figure [14](#A978-1-4842-1560-9_1_Chapter.html#Fig14)).\n\
    \n![A978-1-4842-1560-9_1_Fig14_HTML.jpg](A978-1-4842-1560-9_1_Fig14_HTML.jpg)\n\
    \n**Figure 14.**  \nCode Signing Identity and Provisioning Profile\n\nIn Figure\
    \ [14](#A978-1-4842-1560-9_1_Chapter.html#Fig14), you can see that the `Provisioning\
    \ Profile` section is adjusted as Automatic for the Debug and Release entries.\
    \ Click Automatic and change both entries to the respective target’s provisioning\
    \ profiles.\n\nAlso change the `iOS Developer` entries of the `Code Signing Identity`\
    \ to the correct identities for Debug and Release that will appear after adjusting\
    \ the `Provisioning Profile` section.\n\n### Classes with the Same Name on Different\
    \ Targets\n\nYou have a project with multiple targets, specifically involving\
    \ different platforms like iOS and OS X.\n\nYou have two classes called `RenderMe`,\
    \ one designed for iOS and the other one designed for OS X. The classes are similar\
    \ in functionality but the implementation is completely different, due to platform\
    \ differences.\n\nYou want the classes to have the same name, because it simplifies\
    \ project management and because they serve similar purposes.\n\nAt some point\
    \ in development, you will have to assign the classes to their respective targets\
    \ and import the classes using lines like the following:\n\n```\n#import \"RenderMe.h\"\
    \n```\n\n#### This is what you expect...\nYou expect the iOS target to import\
    \ and compile the iOS version of `RenderMe`, with the same being true for the\
    \ Mac OS X target.\n\n#### Not so fast!\nBelieve us, given the proper time and\
    \ project complexity, Xcode will import and compile the wrong class for the wrong\
    \ target. We have seen this before.\n\nYou have two solutions at this point: to\
    \ have different names for the classes or to import them using absolute paths.\n\
    \nInstead of\n\n```\n#import \" RenderMe.h\"\n```\n\nfor both targets, use lines\
    \ like\n\n```\n#import \"/absolutePathForMyIOSRenderMe/RenderMe.h\"\n#import \"\
    /absolutePathForMyMacRenderMe/RenderMe.h\"\n```\n\nfor each case. Ugly, but it\
    \ works.\n\n### A Case Against Base Internationalization\n\niOS 6 introduced an\
    \ option in Xcode called Use Base Internationalization. You can see this option\
    \ by navigating to your project’s Info tab (Figure [15](#A978-1-4842-1560-9_1_Chapter.html#Fig15)).\
    \ Base Internationalization works by defining a default language to be used as\
    \ the base language.\n\n![A978-1-4842-1560-9_1_Fig15_HTML.jpg](A978-1-4842-1560-9_1_Fig15_HTML.jpg)\n\
    \n**Figure 15.**  \nUse Base Internationalization\n\nSuppose your application\
    \ is localized in English and Portuguese and the former is the base language.\
    \ All users that have their devices configured in Portuguese will see this localization,\
    \ and all others will see the English one, because that is the base language.\n\
    \n#### Localization of interface elements\nWhen we talk about localizing interface\
    \ elements, we are talking about XIB files and storyboards.\n\nBefore iOS 6, localizing\
    \ an interface file would make Xcode generate extra copies of the XIB and storyboard\
    \ files, one per language being localized. That multiplicity of files made it\
    \ almost impossible to maintain and work with multiple localizations.\n\nApple\
    \ solved the problem by introducing an option called `Base Internationalization`.\
    \ Using this option, instead of having multiple copies of interface elements,\
    \ you now have one XIB or storyboard assigned as the base language and text files\
    \ containing the localizations for the other languages (Figure [16](#A978-1-4842-1560-9_1_Chapter.html#Fig16)).\n\
    \n![A978-1-4842-1560-9_1_Fig16_HTML.jpg](A978-1-4842-1560-9_1_Fig16_HTML.jpg)\n\
    \n**Figure 16.**  \nA storyboard localized in multiple languages\n\nThe idea of\
    \ `Base Internationalization` is nice, but you must be aware that this feature\
    \ has problems that prevent some interface elements from being localized.\n\n\
    #### Localization of UIBarButtonItem and other elements failing\nOne classic example\
    \ of the `Base Internationalization` option failing to localize an element appears\
    \ when your application uses `UIBarButtonItem` objects. The `Base Internationalization`\
    \ option will not localize these elements automatically. Xcode will not even add\
    \ their strings to the `localization files`, and adding them manually will not\
    \ localize the elements.\n\nIf you use `UIBarButtonItem` objects you will have\
    \ to localize them programmatically at runtime.\n\n**Note**  \nIf you use the\
    \ Base Internationalization option, be sure to test your application on all languages\
    \ because some other interface elements, including `UIBarButtonItems`, may also\
    \ not appear localized.\n\n### Checking for Missing Localizable.strings\n\nYou\
    \ have localized an application for several languages, but you have the feeling\
    \ that some strings are missing on one language or another.\n\nGoing through all\
    \ localization files and comparing them is too complex and counterproductive.\n\
    \nWe have good news: you can make Xcode check for missing strings for you!\n\n\
    Select Product ➤ Scheme ➤ Edit Scheme and add the option `-NSShowNonLocalizedStrings\
    \ YES` to the Arguments Passed on Launch section (see Figure [17](#A978-1-4842-1560-9_1_Chapter.html#Fig17)).\n\
    \n![A978-1-4842-1560-9_1_Fig17_HTML.jpg](A978-1-4842-1560-9_1_Fig17_HTML.jpg)\n\
    \n**Figure 17.**  \nChecking for missing Localizable.strings\n\nNext time you\
    \ run the application, you will see the missing strings on Xcode’s console, something\
    \ like the following:\n\n```\nBarButtonItemColor[23980:60b] Localizable string\
    \ \"Ahi-1h-yfI.title\" not found in strings table \"Main∼iphone\" of bundle CFBundle\
    \ 0x17d70dd0 </var/mobile/Applications/1228CFF2-DB3D-4A2D-B0D8-17DA32E7DD8A/BarButtonItemColor.app>\n\
    ```\n\nThis error message is related to an application created initially in English\
    \ (base language) and later localized to Portuguese.\n\nThe missing string on\
    \ the error message belongs to element `\"Ahi-1h-yfI.title\"`, which, not by coincidence,\
    \ is a `UIBarButtonItem`, confirming what we have said in the section “A Case\
    \ Against Base Internationalization.”\n\nAfter localizing the storyboard of that\
    \ project from the base language to Portuguese, Xcode did forget to add the `UIBarButtonItem`’s\
    \ string to the localization files and this is why Xcode was complaining.\n\n\
    Adding the missing string to the Portuguese localization file will not localize\
    \ the `UIBarButtonItem`. The only way to localize this button is to do it programmatically\
    \ at runtime.\n\n### You Are Declaring Your NSString Wrong\n\nYou need to declare\
    \ a constant `NSString` to use on your brand-new class and you are probably declaring\
    \ it as shown next."
  raw: '### The Gods want to punish you


    You know the drill: one day you are happy, the sun is shining, the flowers are
    blooming, the birds are singing, and everything is working fine on Xcode.


    The day after that, the Gods wake up on the wrong foot and punish you. Sometimes
    they punish you indirectly, by sentencing the sandbox user to a miserable death
    by internal corruption. When that happens, retrieving or validating purchase receipts
    for that user will fail.


    As a bonus, the Gods will never present you with any error message that can provide
    a tip about the real reason for the problem—and you will never guess.


    The solution for a dead sandbox user is to delete the offending user and create
    a new one via iTunesConnect.


    Note


    Another possible solution you can try is to open the Mac App Store application
    (if you are dealing with a Mac application) or iTunes (if you are dealing with
    an iOS application), log out from the current account, and quit the application
    immediately after that.


    ## Application Failing to Obtain a Receipt


    You have created a new sandbox user as instructed in the previous section, but
    your application is still failing to obtain the purchase receipt?


    Verify if your code is properly signed.


    Go to the target’s Build Settings and adjust the Debug and Release fields of Code
    Signing Identity and Provisioning Profile with the correspondent values for your
    application (Figure [14](#A978-1-4842-1560-9_1_Chapter.html#Fig14)).


    ![A978-1-4842-1560-9_1_Fig14_HTML.jpg](A978-1-4842-1560-9_1_Fig14_HTML.jpg)


    Figure 14.


    Code Signing Identity and Provisioning Profile


    In Figure [14](#A978-1-4842-1560-9_1_Chapter.html#Fig14), you can see that the
    `Provisioning Profile` section is adjusted as Automatic for the Debug and Release
    entries. Click Automatic and change both entries to the respective target’s provisioning
    profiles.


    Also change the `iOS Developer` entries of the Code Signing Identity to the correct
    identities for Debug and Release that will appear after adjusting the Provisioning
    Profile section.


    ## Classes with the Same Name on Different Targets


    You have a project with multiple targets, specifically involving different platforms
    like iOS and OS X.


    You have two classes called `RenderMe`, one designed for iOS and the other one
    designed for OS X. The classes are similar in functionality but the implementation
    is completely different, due to platform differences.


    You want the classes to have the same name, because it simplifies project management
    and because they serve similar purposes.


    At some point in development, you will have to assign the classes to their respective
    targets and import the classes using lines like the following:


    `#import "RenderMe.h"`


    ### This is what you expect...


    You expect the iOS target to import and compile the iOS version of `RenderMe`,
    with the same being true for the Mac OS X target.


    ### Not so fast!


    Believe us, given the proper time and project complexity, Xcode will import and
    compile the wrong class for the wrong target. We have seen this before.


    You have two solutions at this point: to have different names for the classes
    or to import them using absolute paths.


    Instead of


    `#import " RenderMe.h"`


    for both targets, use lines like


    `#import "/absolutePathForMyIOSRenderMe/RenderMe.h"`


    `#import "/absolutePathForMyMacRenderMe/RenderMe.h"`


    for each case. Ugly, but it works.


    ## A Case Against Base Internationalization


    iOS 6 introduced an option in Xcode called Use Base Internationalization. You
    can see this option by navigating to your project’s Info tab (Figure [15](#A978-1-4842-1560-9_1_Chapter.html#Fig15)).
    Base Internationalization works by defining a default language to be used as the
    base language.


    ![A978-1-4842-1560-9_1_Fig15_HTML.jpg](A978-1-4842-1560-9_1_Fig15_HTML.jpg)


    Figure 15.


    Use Base Internationalization


    Suppose your application is localized in English and Portuguese and the former
    is the base language. All users that have their devices configured in Portuguese
    will see this localization, and all others will see the English one, because that
    is the base language.


    ### Localization of interface elements


    When we talk about localizing interface elements, we are talking about XIB files
    and storyboards.


    Before iOS 6, localizing an interface file would make Xcode generate extra copies
    of the XIB and storyboard files, one per language being localized. That multiplicity
    of files made it almost impossible to maintain and work with multiple localizations.


    Apple solved the problem by introducing an option called `Base Internationalization`.
    Using this option, instead of having multiple copies of interface elements, you
    now have one XIB or storyboard assigned as the base language and text files containing
    the localizations for the other languages (Figure [16](#A978-1-4842-1560-9_1_Chapter.html#Fig16)).


    ![A978-1-4842-1560-9_1_Fig16_HTML.jpg](A978-1-4842-1560-9_1_Fig16_HTML.jpg)


    Figure 16.


    A storyboard localized in multiple languages


    The idea of `Base Internationalization` is nice, but you must be aware that this
    feature has problems that prevent some interface elements from being localized.


    ### Localization of UIBarButtonItem and other elements failing


    One classic example of the `Base Internationalization` option failing to localize
    an element appears when your application uses `UIBarButtonItem objects`. The `Base
    Internationalization` option will not localize these elements automatically. Xcode
    will not even add their strings to the `localization files`, and adding them manually
    will not localize the elements.


    If you use `UIBarButtonItem objects` you will have to localize them programmatically
    at runtime.


    Note


    If you use the Base Internationalization option, be sure to test your application
    on all languages because some other interface elements, including `UIBarButtonItems`,
    may also not appear localized.


    ## Checking for Missing Localizable.strings


    You have localized an application for several languages, but you have the feeling
    that some strings are missing on one language or another.


    Going through all localization files and comparing them is too complex and counterproductive.


    We have good news: you can make Xcode check for missing strings for you!


    Select Product ➤ Scheme ➤ Edit Scheme and add the option -`NSShowNonLocalizedStrings
    YES` to the Arguments Passed on Launch section (see Figure [17](#A978-1-4842-1560-9_1_Chapter.html#Fig17)).


    ![A978-1-4842-1560-9_1_Fig17_HTML.jpg](A978-1-4842-1560-9_1_Fig17_HTML.jpg)


    Figure 17.


    Checking for missing Localizable.strings


    Next time you run the application, you will see the missing strings on Xcode’s
    console, something like the following:


    `BarButtonItemColor[23980:60b] Localizable string "Ahi-1h-yfI.title" not found
    in strings table "Main∼iphone" of bundle CFBundle 0x17d70dd0 </var/mobile/Applications/1228CFF2-DB3D-4A2D-B0D8-17DA32E7DD8A/BarButtonItemColor.app>`


    This error message is related to an application created initially in English (base
    language) and later localized to Portuguese.


    The missing string on the error message belongs to element “Ahi-1h-yfI.title”,
    which, not by coincidence, is a `UIBarButtonItem`, confirming what we have said
    in the section “A Case Against Base Internationalization.”


    After localizing the storyboard of that project from the base language to Portuguese,
    Xcode did forget to add the `UIBarButtonItem`’s string to the localization files
    and this is why Xcode was complaining.


    Adding the missing string to the Portuguese localization file will not localize
    the `UIBarButtonItem`. The only way to localize this button is to do it programmatically
    at runtime.


    ## You Are Declaring Your NSString Wrong


    You need to declare a constant `NSString` to use on your brand-new class and you
    are probably declaring it as shown next.'
  trans: "\n### 众神想要惩罚你\n\n你懂的：某一天，你心情愉悦，阳光灿烂，花儿绽放，鸟儿歌唱，`Xcode`里的一切都运行良好。\n\n第二天，众神一觉醒来心情不佳，便来惩罚你。有时他们会间接惩罚你，通过内部腐败的方式判处沙盒用户“惨死”。此时，获取或验证该用户的购买收据就会失败。\n\
    \n更“贴心”的是，众神绝不会向你提供任何能提示问题真正原因的错误信息——你永远也猜不到。\n\n解决沙盒用户死亡的方法是删除有问题的用户，并通过`iTunesConnect`创建一个新用户。\n\
    \n**注意**  \n另一个可以尝试的解决方案是：打开 Mac App Store 应用（如果你处理的是 Mac 应用）或`iTunes`（如果你处理的是\
    \ iOS 应用），从当前账户注销，然后立即退出该应用。\n\n### 应用无法获取收据\n\n你已经按照上一节的说明创建了一个新的沙盒用户，但你的应用仍然无法获取购买收据？\n\
    \n请验证你的代码是否已正确签名。\n\n转到目标的构建设置，为`Code Signing Identity`和`Provisioning Profile`的\
    \ Debug 和 Release 字段调整为你应用对应的值（参见图 14）。\n\n![A978-1-4842-1560-9_1_Fig14_HTML.jpg](img/A978-1-4842-1560-9_1_Fig14_HTML.jpg)\n\
    \n**图 14.**  \n代码签名身份和配置文件\n\n在图 14 中，你可以看到`Provisioning Profile`部分在 Debug 和 Release\
    \ 条目中设置为“自动”。点击“自动”，将这两个条目更改为各自目标的配置文件。\n\n同时，将`Code Signing Identity`中的`iOS Developer`条目更改为在调整`Provisioning\
    \ Profile`部分后出现的正确的 Debug 和 Release 身份。\n\n### 不同目标中存在同名类\n\n你有一个包含多个目标的项目，特别是涉及不同平台，如\
    \ iOS 和 OS X。\n\n你有两个名为`RenderMe`的类，一个为 iOS 设计，另一个为 OS X 设计。这两个类功能相似，但由于平台差异，实现完全不同。\n\
    \n你希望这两个类同名，因为这能简化项目管理，而且它们用途相似。\n\n在开发的某个阶段，你将不得不将这些类分配给各自的目标，并使用如下代码行导入类：\n\n\
    ```\n#import \"RenderMe.h\"\n```\n\n#### 这是你所期望的...\n你期望 iOS 目标导入并编译 iOS 版本的`RenderMe`，Mac\
    \ OS X 目标也同样如此。\n\n#### 且慢！\n请相信我们，在合适的时间和项目复杂性下，Xcode 会为错误的目标导入并编译错误的类。我们之前就见过这种情况。\n\
    \n此时你有两个解决方案：为这两个类使用不同的名称，或者使用绝对路径导入它们。\n\n不要对两个目标都使用\n\n```\n#import \" RenderMe.h\"\
    \n```\n\n而要根据不同情况使用如下代码行：\n\n```\n#import \"/absolutePathForMyIOSRenderMe/RenderMe.h\"\
    \n#import \"/absolutePathForMyMacRenderMe/RenderMe.h\"\n```\n\n虽然不美观，但有效。\n\n\
    ### 反对基础国际化的案例\n\niOS 6 在 Xcode 中引入了一个名为“使用基础国际化”的选项。你可以通过导航到项目的信息标签页（图 15）来查看此选项。基础国际化的原理是定义一个默认语言作为基础语言。\n\
    \n![A978-1-4842-1560-9_1_Fig15_HTML.jpg](img/A978-1-4842-1560-9_1_Fig15_HTML.jpg)\n\
    \n**图 15.**  \n使用基础国际化\n\n假设你的应用本地化成了英语和葡萄牙语，并且英语是基础语言。所有设备语言设置为葡萄牙语的用户都将看到葡萄牙语本地化内容，而其他所有用户都将看到英语内容，因为英语是基础语言。\n\
    \n#### 界面元素的本地化\n当我们谈论本地化界面元素时，我们指的是 XIB 文件和故事板。\n\n在 iOS 6 之前，本地化一个界面文件会使 Xcode\
    \ 生成额外的 XIB 和故事板文件副本，每个要本地化的语言一个。这种文件的多重性使得维护和处理多种本地化几乎不可能。\n\n苹果通过引入一个名为`Base\
    \ Internationalization`的选项解决了这个问题。使用此选项，你不再需要拥有多个界面元素副本，而是拥有一个指定为基础语言的 XIB 或故事板，以及包含其他语言本地化内容的文本文件（图\
    \ 16）。\n\n![A978-1-4842-1560-9_1_Fig16_HTML.jpg](img/A978-1-4842-1560-9_1_Fig16_HTML.jpg)\n\
    \n**图 16.**  \n一个被本地化为多种语言的故事板\n\n`Base Internationalization`的想法很好，但你必须意识到，此功能存在一些问题，会导致某些界面元素无法被本地化。\n\
    \n#### UIBarButtonItem 及其他元素的本地化失败\n`Base Internationalization`选项在某些元素上本地化失败的一个典型例子是当你的应用使用了`UIBarButtonItem`对象时。`Base\
    \ Internationalization`选项不会自动本地化这些元素。Xcode 甚至不会将它们的字符串添加到`localization files`中，而手动添加也无法本地化这些元素。\n\
    \n如果你使用了`UIBarButtonItem`对象，你将不得不在运行时通过编程方式对它们进行本地化。\n\n**注意**  \n如果你使用“使用基础国际化”选项，请务必在所有语言上测试你的应用，因为包括`UIBarButtonItems`在内的其他一些界面元素也可能无法正常显示本地化内容。\n\
    \n### 检查缺失的 Localizable.strings\n\n你已经将应用本地化为多种语言，但你感觉某些字符串在某种语言中缺失了。\n\n逐一检查所有本地化文件并进行比较过于复杂且效率低下。\n\
    \n好消息是：你可以让 Xcode 为你检查缺失的字符串！\n\n选择“产品” ➤ “方案” ➤ “编辑方案”，并在“启动时传递的参数”部分添加选项`-NSShowNonLocalizedStrings\
    \ YES`（见图 17）。\n\n![A978-1-4842-1560-9_1_Fig17_HTML.jpg](img/A978-1-4842-1560-9_1_Fig17_HTML.jpg)\n\
    \n**图 17.**  \n检查缺失的 Localizable.strings\n\n下次运行应用时，你将看到 Xcode 的控制台中显示了缺失的字符串，类似如下内容：\n\
    \n```\nBarButtonItemColor[23980:60b] Localizable string \"Ahi-1h-yfI.title\" not\
    \ found in strings table \"Main∼iphone\" of bundle CFBundle 0x17d70dd0 </var/mobile/Applications/1228CFF2-DB3D-4A2D-B0D8-17DA32E7DD8A/BarButtonItemColor.app>\n\
    ```\n\n这个错误信息与一个最初以英语（基础语言）创建，后来本地化为葡萄牙语的应用有关。\n\n错误信息中缺失的字符串属于元素`\"Ahi-1h-yfI.title\"\
    `，这并非巧合，它正是一个`UIBarButtonItem`，证实了我们在“反对基础国际化的案例”一节中所说的内容。\n\n在将该项目的故事板从基础语言本地化为葡萄牙语之后，Xcode\
    \ 确实忘记将`UIBarButtonItem`的字符串添加到本地化文件中，这就是 Xcode 报错的原因。\n\n将缺失的字符串添加到葡萄牙语本地化文件中并不会将`UIBarButtonItem`本地化。要本地化此按钮，唯一的办法是在运行时通过编程方式实现。\n\
    \n### 你错误地声明了你的 NSString\n\n你需要为全新的类声明一个常量`NSString`，而你很可能正在像下面这样声明它。\n"
- fmt: "## Objective-C\n\n`const NSString * kMyConstant;`\n\nThis line gives you a\
    \ pointer to a constant `NSString`. That is not what you are looking for, simply\
    \ because `NSString` objects are already immutable.\n\nInstead, you should declare\
    \ it as follows:\n\n`NSString * const kMyConstant;`\n\nThis gives you a constant\
    \ pointer to an `NSString`, which is what you are looking for.\n\nThis is how\
    \ you should declare your `NSString` constants.\n\n**Note:** To declare a constant\
    \ in Swift all you have to do is declare it using the `let` keyword:\n\n`let kMyConstant\
    \ = \"something\"`\n\n## CocoaPods: /Manifest.lock: No Such File or Directory\n\
    \n`diff: /../Podfile.lock: No such file or directory`\n\n`diff: /Manifest.lock:\
    \ No such file or directory`\n\n`error: The sandbox is not in sync with the Podfile.lock.\
    \ Run 'pod install' or update your CocoaPods installation`\n\nIf your project\
    \ uses CocoaPods and it is failing to compile with this error message, try the\
    \ following:\n\nClose Xcode. Launch Terminal in the directory in which you have\
    \ your `Podfile`, type each of the lines that follow in order, press the Return\
    \ key after each one, and wait for them to finish.\n\n`sudo gem install cocoapods-deintegrate`\
    \  \n`pod deintegrate`  \n`pod install`\n\nThe first line will install `deintegrate`\
    \ on your system, which is a module of CocoaPods that removes any pods and all\
    \ references to them from a project.\n\nSkip this line if you already have `deintegrate`\
    \ installed.\n\nThe second line will remove all pods from the project and clean\
    \ any references to them.\n\nThe third line will install the same pods again.\n\
    \nReturn to Xcode and select **Product ➤ Clean**. Build the project again and\
    \ you are done. If necessary, restart Xcode.\n\n## Asset Catalogs Bug\n\nApple\
    \ introduced Asset Catalogs on iOS 7 (Xcode 5). Using Asset Catalogs you can simplify\
    \ management of images that your application uses as part of its user interface.\n\
    \nIf you are a perfectionist, you will not like to hear about this Asset Catalogs\
    \ bug that appears under the following circumstances:\n\n- Your project has two\
    \ targets: one for iPhone and one for iPad.\n- Each target has a different icon.\n\
    - You are compiling your project for iOS 7.\n- You have just one Assets Catalog\
    \ file for all icons.\n- `AppIcon` is adjusted to have device-specific icons.\n\
    - All icons are stored inside the `AppIcon` entry of Assets Catalog.\n\nI am sorry\
    \ to inform you, but this will not work as expected.\n\n### The bug\n\nThe iPhone\
    \ target running on the iPad will show the iPad icon for iOS 7.x devices.\n\n\
    ### The solution\n\nCreate one Assets Catalog file with a different name for every\
    \ platform you are supporting. Each Assets Catalog must contain its own `AppIcon`\
    \ entry with a different name. Every `AppIcon` entry must contain just the icons\
    \ belonging to the platform.\n\nDon't forget to adjust each target to use the\
    \ proper Assets Catalog and `AppIcon` entry.\n\n## App Crashing Without Giving\
    \ You Clues?\n\nThe code presented in this section is specifically valuable if\
    \ your Objective-C application is crashing with the infamous `signal SIGABRT`\
    \ message and providing no other clues about the crash.\n\nReplace the code on\
    \ your `main.m` file with something like the following:\n\n### Objective-C\n\n\
    ```\nint main(int argc, char *argv[]) {\n  int retVal;\n  @autoreleasepool {\n\
    \    @try {\n      retVal = UIApplicationMain(argc, argv, nil, nil); //***\n \
    \   }\n    @catch (NSException *exception) {\n      NSLog(@\"\\n\\nSTACK SYMBOLS\\\
    n%@\",\n            [exception callStackSymbols]);\n      NSLog(@\"\\n\\nSTACK\
    \ RETURN ADDRESSES\\n%@\",\n            [exception callStackReturnAddresses]);\n\
    \      NSLog(@\"\\n\\nOBJECT: %@\",[exception name]);\n      NSLog(@\"\\n\\nUSER\
    \ INFO DICT: %@\",[exception userInfo]);\n      NSLog(@\"\\n\\nREASON: %@\",[exception\
    \ reason]);\n      retVal = 1;\n    }\n  }\n  return retVal;\n}\n//*** this line\
    \ should be typed like it is on your main.m.\n```\n\nIn case of an application\
    \ crash, this code will dump a lot of information to the console that may help\
    \ you identify the problem.\n\n**Note:** Due to the nature of Swift, there is\
    \ no way to implement this kind of code for that language.\n\n## NSUserDefaults\
    \ Not Working for a Sandboxed App?\n\nWe have seen this problem a couple of times.\n\
    \nYou are testing an application and suddenly it loses the ability to read or\
    \ write to `NSUserDefaults`.\n\nThe typical solution for this problem is to restart\
    \ your Mac, but everybody hates having to do that.\n\nInstead, launch Terminal\
    \ and type:\n\n```\nps auwx | grep cfprefsd | grep -v grep | awk '{print $2}'\
    \ |\nxargs sudo kill -9\n```\n\nThis will kill Mac OS X's `cfprefsd` daemon that\
    \ provides preferences services for the `CFPreferences` and `NSUserDefaults` APIs\
    \ (application programming interface).\n\nThe daemon will restart automatically\
    \ the next time you try to access `NSUserDefaults` and everything should start\
    \ working correctly.\n\n## Interface Elements Not Updating?\n\nIf you have an\
    \ interface element like a spinner or a text view that must be updated constantly\
    \ but the update is not happening because the application is busy on a loop, add\
    \ the following code to the end of the loop.\n\n### Swift\n\n```\nvar date : NSDate?\
    \ = NSDate()\ndate = date!.dateByAddingTimeInterval(0.0)\nlet runLoop = NSRunLoop.currentRunLoop()\n\
    runLoop.runUntilDate(date!)\n```\n\n### Objective-C\n\n```\n[[NSRunLoop currentRunLoop]\
    \ runUntilDate:\n           [NSDate dateWithTimeIntervalSinceNow:0.0]];\n```\n\
    \nThis code will force the loop to a brief pause and the application will be able\
    \ to update the interface.\n\n**Note:** Bear in mind that this code will stop\
    \ the current run loop for a fraction of time. This may slow down some apps. Use\
    \ it with care. You can tweak the time interval if you want.\n\n## Find and Replace\
    \ Strings Using Regex\n\nSuppose your project contains multiple lines like the\
    \ ones in this section.\n\n### Swift\n\n```\nmyButton1.setTitleColor(UIColor.grayColor(),\n\
    \          forState:UIControlState.Normal)\nmyButton2.setTitleColor(UIColor.greenColor(),\n\
    \          forState:UIControlState.Selected)\nmyButton3.setTitleColor(UIColor.orangeColor(),\n\
    \          forState:UIControlState.Disabled)\n```\n\n### Objective-C\n\n```\n\
    [myButton1 setTitleColor:[UIColor grayColor]\n           forState: UIControlStateNormal];\n\
    [myButton2 setTitleColor:[UIColor greenColor]\n           forState: UIControlStateSelected];\n\
    [myButton3 setTitleColor:[UIColor orangeColor]\n           forState: UIControlStateDisabled];\n\
    ```\n\nThe buttons have different names, different colors, and different control\
    \ states.\n\nYou want to search for all lines like these and change the colors\
    \ to red, but keep the names and the control states unchanged.\n\nYou want to\
    \ change the code as shown next.\n\n### Swift\n\n```\nmyButton1.setTitleColor(UIColor.redColor(),\n\
    \          forState:UIControlState.Normal)\nmyButton2.setTitleColor(UIColor.redColor(),\n\
    \          forState:UIControlState.Selected)\nmyButton3.setTitleColor(UIColor.redColor(),\n\
    \          forState:UIControlState.Disabled)\n```"
