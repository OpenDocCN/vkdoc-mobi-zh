- fmt: '# Troubleshooting Xcode


    Electronic supplementary material The online version of this chapter (doi:[10.1007/978-1-4842-1560-9_1](http://dx.doi.org/10.1007/978-1-4842-1560-9_1))
    contains supplementary material, which is available to authorized users.


    ## Fighting Back


    Because the development problems we describe are complex, this book is not a definitive
    guide to all problems with Xcode, iTunesConnect, and the Developer Portal.


    The problems you will face during development are interconnected. Sometimes more
    than one issue can cause the same error message. We hope this book helps you solve
    most of these problems and gives you the insight to solve others we have not mentioned.


    So, prepare your boxing gloves and let the first round begin.


    ## Xcode Crashing when Opening a Project File?


    This kind of crash is generally a sign that the project file is corrupted.


    Unfortunately, due to Xcode’s internal issues and bugs, projects get corrupted
    very easily, especially complex ones. A complex project using Auto Layout is an
    explosive combination that will lead to project corruption sooner or later. Probably
    sooner.


    The most common cause for this problem is a corruption of internal files related
    to the project’s workspace. These internal files can be easily removed to make
    the project fine again.


    There are several steps available to solve the crashing problem.


    ### If you are not using CocoaPods


    Back up your project folder. Locate the project file inside the project’s folder
    (the one with a `xcodeproj` extension). Right-click the project file and select
    Show Package Contents. Delete `project.xworkspace` file and `xcuserdata` directory.


    That’s it. Try to open the project file now and Xcode will not crash.


    **Note**


    The bad news is that Xcode uses these files and directories you have deleted to
    store workspace information (which windows and tabs are open and some debugger
    settings).


    The good news is that your code is intact and the files you have deleted will
    be re-created the next time you open the project.


    ### If you are using CocoaPods


    Execute steps 1 to 4. Return to your project’s folder and delete the file with
    a `xcworkspace` extension. Also delete the `Podfile.lock` file on the same directory.
    Launch Terminal in your project’s folder, type the following command, and press
    the Return key: `pod deintegrate`


    **Note**


    Terminal is a program included with all versions of [Mac OS X](http://guides.macrumors.com/Mac_OS_X).
    It is located in the [Utilities folder](http://guides.macrumors.com/Utilities_folder)
    within the [Applications folder](http://guides.macrumors.com/Applications_folder).
    When launched, it provides a way to control the underpinnings of any UNIX-based
    operating system, like Mac OS X.


    To launch the Terminal application, click Spotlight, type `terminal`, and press
    the Return key.


    To switch Terminal to your project’s folder, type the following command and press
    the Return key:


    `cd /thePathToYourProject`


    If the path contains spaces, you must precede every space with a backslash.


    Example


    `/Mobile Documents` must be written as `/Mobile \ Documents`.


    **Note**


    If you do not have `deintegrate` installed on your system, launch Terminal and
    type the following command:


    `sudo gem install cocoapods-deintegrate`


    Return to Terminal, type the following command, and press the Return key: `pod
    install`


    This will reinstall all pods your project is using and restore the `xcworkspace`
    file.


    Now you can open the workspace file again and Xcode will not crash.


    **Note**


    When you use CocoaPods your project file is the one with the `.xcworkspace` extension.


    ## The Identity Used to Sign the Executable Is Invalid


    ![A978-1-4842-1560-9_1_Fig1_HTML.jpg](A978-1-4842-1560-9_1_Fig1_HTML.jpg)


    Figure 1. Identity used to sign is invalid


    This error message suggests that a signing identity is no longer valid or there
    is a problem with the device’s clock. Even Xcode is not sure about the issue.


    You can confirm the validity of all signing identities by visiting the `Developer
    Portal`, but I can bet there is nothing wrong with them.


    We have seen this error before and the solution involves re-creating the provisioning
    profiles.


    Follow these steps:


    - Using the `Developer Portal`, regenerate all provisioning profiles related to
    the project but give them new names.

    - Download the new certificates and drag them into Xcode’s icon.

    - Restart Xcode.

    - Delete all files found while executing the last step by typing the following
    command and pressing the Return key for every file found: `rm YYYYY` where `YYYYY`
    is the filename to be deleted.

    - Locate all provisioning profiles related to your project by typing the following
    command and pressing the Return key: `grep -alir "XXXXX" *` where `XXXXX` is the
    bundle ID of your application. For example, `grep –alir "com.myCompany.myGreatApp"
    *`

    - Launch Terminal, type the following command, and press the Return key: `cd ∼/Library/MobileDevice/Provisioning\
    Profiles` This line will place Terminal inside the directory where Xcode stores
    the provisioning profiles.


    ## Xcode Fails to Compile and Blames “SBPartialInfo”


    > The file myapp-SBPartialInfo.plist couldn’t be opened because there is no such
    file


    When you present an error message to the user, the general consensus is that:


    - If the user can solve the problem, tell him how to do it.

    - If the problem is with a file created by the user, explain how the user can
    fix the file.

    - Never present error messages that talk about files the user has not created
    and about problems the user cannot solve. Why create confusion?


    This error message violates all commonsense rules because it mentions a file that
    the user did not create; a file that the user has no knowledge of. Worse than
    that, the user cannot guess the problem even by consulting the most powerful Ouija
    board available.


    After a few years using Xcode, we know that several problems can cause this kind
    of error message. The first problem is that there is something wrong with an Auto
    Layout constraint.


    ### Problem with a NSLayoutConstraint


    Most of the time, this `SBPartialInfo` error has to do with a problematic `NSLayoutConstraint`.
    Yes, you read correctly, the good and old Auto Layout constraint, our crash buddy.


    To solve this problem, follow these steps:


    Select the Report Navigator, by clicking the last icon of the top part of Xcode’s
    `Project Navigator` panel (Figure 2) or by pressing ![A978-1-4842-1560-9_1_Figb_HTML.jpg](A978-1-4842-1560-9_1_Figb_HTML.jpg)8.


    ![A978-1-4842-1560-9_1_Fig2_HTML.jpg](A978-1-4842-1560-9_1_Fig2_HTML.jpg)


    Figure 2. Report Navigator


    Select the top report and read it carefully, until you find the offending `NSAutoLayoutConstraint`.


    There is also another kind of problem that can cause the error message seen in
    Figure 1: an incorrect path to the `Info.plist` file.


    ### Incorrect path to Info.plist


    Check your target’s Build Settings if the path to your `Info.plist` file is correct.


    Select the target in question (1), click Build Settings (2), select the Packaging
    section (3), and check whether the `Info.plist` file line (4) has the correct
    path and name of your `Info.plist` file (see Figure 3).


    ![A978-1-4842-1560-9_1_Fig3_HTML.jpg](A978-1-4842-1560-9_1_Fig3_HTML.jpg)


    Figure 3. Info.plist path


    There is a third kind of problem that can also cause the error message seen in
    Figure 1: having the `Info.plist` file assigned to a target.'
