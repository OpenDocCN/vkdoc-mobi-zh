- "# Xcode 故障排除\n\n电子补充材料 本章在线版本 (doi:[10.1007/978-1-4842-1560-9_1](http://dx.doi.org/10.1007/978-1-4842-1560-9_1))\
  \ 包含补充资料，仅供授权用户查阅。\n\n## 反击\n\n由于我们描述的开发问题较为复杂，本书并非针对 Xcode、iTunes Connect 和开发者门户所有问题的权威指南。\n\
  \n你在开发过程中面临的问题是相互关联的。有时，同一个错误信息可能由多个原因引起。我们希望本书能帮助你解决大部分问题，并为你提供解决其他未提及问题的思路。\n\n\
  因此，请戴上你的拳击手套，让第一回合开始吧。\n\n## 打开项目文件时 Xcode 崩溃？\n\n这类崩溃通常表明项目文件已损坏。\n\n不幸的是，由于 Xcode\
  \ 的内部问题和 bug，项目文件很容易损坏，尤其是复杂项目。使用 Auto Layout 的复杂项目就像一颗定时炸弹，迟早（更可能是早）会导致项目损坏。\n\n\
  此问题最常见的原因是项目工作区相关的内部文件损坏。这些内部文件可以轻松移除，让项目恢复正常。\n\n以下是解决崩溃问题的几个步骤。\n\n### 如果你没有使用\
  \ CocoaPods\n\n备份你的项目文件夹。在项目文件夹中找到项目文件（扩展名为 `.xcodeproj` 的文件）。右键点击项目文件，选择“显示包内容”。删除\
  \ `project.xworkspace` 文件和 `xcuserdata` 目录。\n\n就这么简单。现在尝试打开项目文件，Xcode 就不会崩溃了。\n\n\
  **注意**\n\n坏消息是，Xcode 使用你删除的这些文件和目录来存储工作区信息（哪些窗口和标签页是打开的，以及一些调试器设置）。\n\n好消息是你的代码完好无损，下次打开项目时，你删除的文件会被重新创建。\n\
  \n### 如果你正在使用 CocoaPods\n\n执行步骤 1 到 4。回到项目文件夹，删除扩展名为 `.xcworkspace` 的文件。同时删除同一目录下的\
  \ `Podfile.lock` 文件。在项目文件夹中启动终端，输入以下命令并按下回车键：`pod deintegrate`\n\n**注意**\n\n终端是所有版本的\
  \ [Mac OS X](http://guides.macrumors.com/Mac_OS_X) 都包含的程序。它位于[应用程序文件夹](http://guides.macrumors.com/Applications_folder)内的[实用工具文件夹](http://guides.macrumors.com/Utilities_folder)中。启动后，它可以控制任何基于\
  \ UNIX 的操作系统（如 Mac OS X）的底层机制。\n\n要启动终端应用，点击 Spotlight，输入 `terminal`，然后按回车键。\n\n\
  要将终端切换到你的项目文件夹，输入以下命令并按回车键：\n\n`cd /你的项目路径`\n\n如果路径中包含空格，必须在每个空格前加反斜杠。\n\n例如\n\n\
  `/Mobile Documents` 必须写成 `/Mobile \\ Documents`。\n\n**注意**\n\n如果你的系统没有安装 `deintegrate`，请启动终端并输入以下命令：\n\
  \n`sudo gem install cocoapods-deintegrate`\n\n返回终端，输入以下命令并按回车键：`pod install`\n\n\
  这将重新安装项目使用的所有 Pod，并恢复 `xcworkspace` 文件。\n\n现在你可以再次打开工作区文件，Xcode 不会崩溃。\n\n**注意**\n\
  \n当你使用 CocoaPods 时，你的项目文件是扩展名为 `.xcworkspace` 的那个文件。\n\n## 用于签署可执行文件的身份无效\n\n![A978-1-4842-1560-9_1_Fig1_HTML.jpg](img/A978-1-4842-1560-9_1_Fig1_HTML.jpg)\n\
  \n图 1. 用于签署的身份无效\n\n这条错误信息表明某个签名身份已失效，或者设备的时钟有问题。连 Xcode 也无法确定问题所在。\n\n你可以通过访问 `开发者门户`\
  \ 来确认所有签名身份的有效性，但我敢打赌它们都没问题。\n\n我们之前见过这个错误，解决方案是重新创建配置文件。\n\n请遵循以下步骤：\n\n- 使用 `开发者门户`，重新生成所有与项目相关的配置文件，但为它们命名新名称。\n\
  - 下载新的证书，并将其拖放到 Xcode 的图标上。\n- 重启 Xcode。\n- 输入以下命令删除执行上一步时找到的所有文件，每找到一个文件就按一次回车键：`rm\
  \ YYYYY`，其中 `YYYYY` 是要删除的文件名。\n- 输入以下命令并按回车键，查找所有与项目相关的配置文件：`grep -alir \"XXXXX\"\
  \ *`，其中 `XXXXX` 是你的应用的 Bundle ID。例如：`grep –alir \"com.myCompany.myGreatApp\" *`\n\
  - 启动终端，输入以下命令并按回车键：`cd ∼/Library/MobileDevice/Provisioning\\ Profiles` 这行命令会将终端定位到\
  \ Xcode 存放配置文件的目录。\n\n## Xcode 编译失败并报错“SBPartialInfo”\n\n> 无法打开文件 myapp-SBPartialInfo.plist，因为不存在该文件\n\
  \n当向用户呈现错误信息时，普遍共识是：\n\n- 如果用户能解决问题，告诉他怎么做。\n- 如果问题出在用户创建的文件上，解释如何修复该文件。\n- 永远不要显示涉及非用户创建文件或用户无法解决的问题的错误信息。为什么要制造困惑？\n\
  \n这条错误信息违反了所有常识规则，因为它提到了一个用户未创建的文件，一个用户毫不知情的文件。更糟糕的是，即使使用最强大的通灵板，用户也无法猜出问题所在。\n\n\
  经过几年使用 Xcode 的经验，我们知道有几个问题会导致这类错误信息。第一个问题是 Auto Layout 约束出了问题。\n\n### NSLayoutConstraint\
  \ 问题\n\n大多数情况下，`SBPartialInfo` 错误与一个有问题的 `NSLayoutConstraint` 有关。是的，你没看错，就是那个好用的老式\
  \ Auto Layout 约束，我们的崩溃老友。\n\n要解决此问题，请遵循以下步骤：\n\n选择报告导航器，点击 Xcode 的 `项目导航器` 面板顶部最后一个图标（图\
  \ 2），或按下 ![A978-1-4842-1560-9_1_Figb_HTML.jpg](img/A978-1-4842-1560-9_1_Figb_HTML.jpg)8。\n\
  \n![A978-1-4842-1560-9_1_Fig2_HTML.jpg](img/A978-1-4842-1560-9_1_Fig2_HTML.jpg)\n\
  \n图 2. 报告导航器\n\n选择顶部的报告并仔细阅读，直到找到出问题的 `NSAutoLayoutConstraint`。\n\n还有一种问题也会导致图 1\
  \ 中的错误信息：`Info.plist` 文件路径不正确。\n\n### Info.plist 路径不正确\n\n检查你目标的构建设置，确认 `Info.plist`\
  \ 文件的路径是否正确。\n\n选择相关目标（1），点击构建设置（2），选择打包部分（3），检查 `Info.plist` 文件行（4）是否有正确的路径和 `Info.plist`\
  \ 文件名（见图 3）。\n\n![A978-1-4842-1560-9_1_Fig3_HTML.jpg](img/A978-1-4842-1560-9_1_Fig3_HTML.jpg)\n\
  \n图 3. Info.plist 路径\n\n还有第三种问题也会导致图 1 中的错误信息：`Info.plist` 文件分配给了某个目标。\n\n\n\n###\
  \ `Info.plist` 不得分配给任何目标\n\n在 Xcode 的“项目导航器”（图 4）中选中 `Info.plist` 文件，然后在 Xcode 的右侧面板中，点击“文件检查器”图标（图\
  \ 5 中圆圈标记处）。如图 5 所示的同一右侧面板中，请确保未将 `Info.plist` 文件分配给任何目标（见箭头）。\n\n![A978-1-4842-1560-9_1_Fig5_HTML.jpg](img/A978-1-4842-1560-9_1_Fig5_HTML.jpg)\n\
  \n图 5.\n\n请勿将 `Info.plist` 分配给任何目标\n\n![A978-1-4842-1560-9_1_Fig4_HTML.jpg](img/A978-1-4842-1560-9_1_Fig4_HTML.jpg)\n\
  \n图 4.\n\n`Info.plist` 位置说明\n\n请勿将 `Info.plist` 分配给任何目标。\n\n## 未找到匹配的描述文件\n\n当您尝试向\
  \ App Store 提交应用时，会出现如图 7 所示的错误信息。此信息的出现通常与两件事有关：描述文件已过期或缺失。\n\n![A978-1-4842-1560-9_1_Fig7_HTML.jpg](img/A978-1-4842-1560-9_1_Fig7_HTML.jpg)\n\
  \n图 7.\n\n未能找到签名资源\n\n### 缺失描述文件\n\n有时，上帝们早上心情不好，决定删除或吊销您的一些描述文件。“昨天一切都还运行良好，”您说道。我们理解。\n\
  \n首先，请导航至项目的“构建设置”选项卡（图 8），验证您是否已为所选目标配置了正确的描述文件。\n\n![A978-1-4842-1560-9_1_Fig8_HTML.jpg](img/A978-1-4842-1560-9_1_Fig8_HTML.jpg)\n\
  \n图 8.\n\n代码签名与描述文件\n\n如果描述文件缺失，请从“开发者门户”下载。\n\n说明\n\n好吧，我们可以建议您让 Xcode 自动获取描述文件，但不幸的是，此操作有\
  \ 99.99% 的概率无法解决此问题。还是自行下载描述文件更快。\n\n## 比 Photoshop 更好的图片压缩\n\n如果您喜欢自己压缩图像，以下是一些实用技巧。\n\
  \n据我们所知，Mac OS X 上用于图像优化和压缩的最佳应用程序是 `ImageOptim`（ [`www.imageoptim.com`](http://www.imageoptim.com/)\
  \ ）。`ImageOptim` 是一款免费应用程序，它在一个易于使用的界面中集成了许多优化工具，例如 `PNGOUT`、`Zopfli`、`Pngcrush`、`AdvPNG`、扩展的\
  \ `OptiPNG`、`JpegOptim`、`jpegrescan`、`jpegtran` 和 `Gifsicle`。\n\n默认情况下，Xcode 配置为压缩添加到包中的所有图像，但效果不如\
  \ `ImageOptim`。\n\n为了使用您自己压缩的图像，您需要通过禁用“构建设置”选项卡中的 `COMPRESS_PNG_FILES` 来禁用 Xcode\
  \ 的压缩标志。将此选项从 `YES` 更改为 `NO`，以防止 Xcode 压缩您已经压缩过的图像（图 9）。\n\n![A978-1-4842-1560-9_1_Fig9_HTML.jpg](img/A978-1-4842-1560-9_1_Fig9_HTML.jpg)\n\
  \n图 9.\n\n压缩 PNG 选项\n\n## 为 App 内购买创建包\n\n您已决定在您的应用中添加 App 内购买项目。这些 App 内购买项目将向用户提供内容，并由\
  \ Apple 托管这些内容。怎么做呢？\n\n### 提供内容\n\n在 iOS 6 发布之前，开发者负责在购买后为用户保留和提供内容。所有内容都必须存储由开发者自己维护的服务器上。\n\
  \n自从 Apple 推出 iOS 6 以来，可以将所有内容托管在 Apple，从而使过程更加简单。\n\n要将内容提交给 Apple，您必须将所有内容打包成一种特殊类型的文件，称为“包”。\n\
  \n### 什么是包？\n\n简单来说，包是一个结构化的文件夹。此文件夹内包含一个名为 `ContentInfo.plist` 的文件和一个名为 `Contents`\
  \ 的文件夹。\n\n#### `ContentInfo.plist`\n\n`ContentInfo.plist` 文件包含两个键：\n\n*   `ContentVersion`，代表内容的版本号；\n\
  *   `IAPProductionIdentifier`，即 App 内购买项目的捆绑标识符，如 `com.myCompany.myInAppPurchase`\
  \ 之类的内容。\n\n#### `Contents` 文件夹\n\n`Contents` 文件夹包含与特定 App 内购买项目相关的所有文件，例如音乐、视频、图像、文本等，这些都与您正在销售的内容相关联。\n\
  \n说明\n\n您的 App 内购买项目中可以包含任何类型的内容，但代码除外。\n\n### 创建包：更快的方法\n\nApple 推荐使用 Xcode 为您的\
  \ App 内购买项目创建包，但这个过程需要无尽的点击和复杂的配置。\n\n我们为您创建了另一种方法，更简单，适合批量交付。\n\n方法如下：\n\n使用 Mac\
  \ OS X 的 Finder，创建一个以您的 App 内购买项目的捆绑标识符命名的文件夹，例如 `com.myCompany.myApp.pack100`。我们将这个文件夹称为主包文件夹。\
  \   在主包文件夹内创建一个名为 `Contents` 的文件夹。   在主包文件夹内创建一个纯文本文件，命名为 `ContentInfo.plist`。  \n\
  \n此时，您将获得如图 10 所示的结构：\n\n![A978-1-4842-1560-9_1_Fig10_HTML.jpg](img/A978-1-4842-1560-9_1_Fig10_HTML.jpg)\n\
  \n图 10.\n\nApp 内购买包结构将包要交付的所有多媒体内容复制到 `Contents` 文件夹。   将如下结构添加到您的 `ContentInfo.plist`\
  \ 文件中：\n\n```xml\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC\
  \ \"-//Apple//DTD PLIST 1.0//EN\"\n\"http://www.apple.com/DTDs/PropertyList-1.0.dtd\"\
  >\n<plist version=\"1.0\">\n<dict>\n    <key>ContentVersion</key>\n    <string>1.0</string>\n\
  \    <key>IAPProductIdentifier</key>\n    <string>XXXXX</string>\n</dict>\n</plist>\n\
  ```\n\n将 `XXXXX` 替换为 App 内购买项目的包 ID，在本例中为 `com.myCompany.myApp.pack100`。\n\n现在文件夹结构恰好如图\
  \ 11 所示：\n\n![A978-1-4842-1560-9_1_Fig11_HTML.jpg](img/A978-1-4842-1560-9_1_Fig11_HTML.jpg)\n\
  \n图 11.\n\nApp 内购买最终结构\n\n### 创建最终的包\n\n是时候创建扩展名为 `pkg` 的最终包文件了。\n\n在包含主包文件夹的目录中启动终端，键入以下命令，然后按回车键：\n\
  \n```bash\nproductbuild --content <pathToInAppDirectory> <pkg-name.pkg>\n```\n\n\
  示例：\n\n```bash\nproductbuild --content com.myCompany.myApp.pack100 com.myCompany.myApp.pack100.pkg\n\
  ```\n\n此命令将在同一目录中为您创建包。您可以稍后使用 Application Loader 将此包提交给 Apple。\n\n说明\n\n如果 `productbuild`\
  \ 命令失败，则意味着您需要在系统上安装 Xcode 的命令行工具。为此，请启动终端并键入以下命令：\n\n```bash\nxcode-select –-install\n\
  ```\n\n\n好的，作为一名高级文档工程师和翻译员，我将遵循您给出的注意事项和示例，将以下英文文本翻译成中文。\n\n\n"
- '# 将编译时间减少高达 75%


  开发过程中最耗时的环节之一就是 Xcode 编译、构建和运行应用程序所花费的时间。


  根据你的配置方式，编译代码的时间可能会过长。


  其中一种“错误”配置会强制 Xcode 生成开发过程中不必要的文件。其中一个文件是 `dSYM` 文件，它包含编译后代码的调试符号。每次生成这些文件都会不必要地拖长编译时间。


  你可以通过在“Build Settings”➤ “Build Options”➤ “Debug Information Format”➤ “Debug”（图 12）中将该项从
  `DWARF with dSYM File` 更改为 `DWARF`（图 12）来禁用开发环境下的 `dSYM` 文件生成。


  ![A978-1-4842-1560-9_1_Fig12_HTML.jpg](img/A978-1-4842-1560-9_1_Fig12_HTML.jpg)


  **图 12.** 调试信息格式


  > **注意：** 由 Xcode 7 创建的新项目已将此选项配置为 `DWARF`，这意味着 Xcode 在开发期间不会创建 `dSYM` 文件。

  >

  > 旧版本的 Xcode 将此选项设置为 `DWARF with dSYM file`，这意味着在开发期间会生成 `dSYM` 文件，从而导致项目编译时间更长。


  > **注意：** 如果你的项目使用了 CocoaPods 或涉及多个目标依赖，请记得为所有目标更改此选项。

  >

  > 你应该为 Release 选项保留 `DWARF with dSYM File`，否则在你从 App Store 获取崩溃日志时，将无法对其进行符号化。


  > **注意：** 在崩溃日志的符号化过程中，Xcode 会将原始的崩溃日志文件与 `dSYM` 文件合并，生成一个人类可读的崩溃日志版本。这个友好的崩溃日志版本包含程序员能够识别的代码信息，有助于确定崩溃的原因。


  '
- "# Objective-C 中不可能的“常量”\n\n与 Swift 不同，你无法使用 Objective-C 将一个像 `NSArray`、`NSDictionary`\
  \ 这样的集合声明为常量；但我们认为我们或许有一个解决方案。\n\n该方案涉及创建一个基于 `NSObject` 的类，并声明静态变量来备份和模拟一个“常量”集合。\n\
  \n## Constants.h\n\n```\n#import <Foundation/Foundation.h>\n\n@interface Constants\
  \ : NSObject\n\n+ (NSArray *) myConstantArray;\n\n@end\n```\n\n## Constants.m\n\n\
  ```\n#import \"Constants.h\"\n\n@implementation Constants\n\n+ (NSArray *) myConstantArray\
  \ {\n     // 通过将静态变量声明在实现文件中，我们保证\n     // 使用此类的其他类不会创建该静态变量的副本\n  static NSArray\
  \ *_myConstantArray = nil;\n  @synchronized (_myConstantArray) {\n    if (_myConstantArray\
  \ == nil) {\n      _myConstantArray = @[ /* 在这里声明你的数组 */ ];\n    }\n    return _myConstantArray;\n\
  \  }\n}\n\n@end\n```\n\n要使用这个“常量”，你必须使用以下形式：\n\n```\nNSArray *anArray = [MyConstantClass\
  \ myConstantArray];\n```\n\n"
- "# Core Data 的并发处理\n\n有时，你的应用程序可能在执行 Core Data 操作时崩溃，且原因不明。\n\n我们现在要探讨的一种可能性是，应用程序可能同时从不同的线程访问了\
  \ `NSManagedObjectContext` 对象。\n\n为了从多线程访问 Core Data 实体，Apple 建议你使用线程隔离。\n\nCore\
  \ Data 推荐的并发编程模式是线程隔离：每个线程都必须拥有自己完全私有的托管对象上下文。\n\n采用这种模式有两种可能的方法：\n\n- 为每个线程创建一个独立的托管对象上下文，并共享一个持久化存储协调器。这是通常推荐的方法。\n\
  - 为每个线程创建一个独立的托管对象上下文和持久化存储协调器。这种方法提供了更高的并发性，但代价是更高的复杂性（特别是在不同上下文之间通信变更时）和更高的内存使用率。\n\
  \n在你花时间开发支持线程隔离的必要代码之前，你可能需要确认你的应用遇到的问题是否真的是由多个线程同时访问 Core Data 上下文对象引起的。\n\n##\
  \ 代码实现\n\n基本上，这段代码是一个用于控制上下文访问的锁机制。同一时间只有一个线程能够访问上下文。\n\n你必须找到代码中访问上下文的位置，并添加以下用**粗体**标出的行：\n\
  \n#### Swift\n\n**Entity.swift**\n\n```\nimport Foundation\nimport CoreData\n\n\
  @objc(Entity)\nclass Entity: NSManagedObject {\n\n    static let lock = NSLock()\n\
  \n    func allObjectsInContext(context : NSManagedObjectContext)\n             \
  \  -> NSArray {\n\n        var all : NSArray?\n        // 准备一个获取请求\n        let\
  \ request : NSFetchRequest? = NSFetchRequest()\n        request?.entity =\n    \
  \            NSEntityDescription.entityForName(\"Entity\",\n                inManagedObjectContext:\
  \ context)\n        request?.returnsDistinctResults = true\n\n        Entity.lock.lock()\n\
  \n        do {\n            // 这就是你访问上下文的地方\n            all = try context.executeFetchRequest(request!)\n\
  \            // 成功...\n        } catch let error as NSError { // 失败\n          \
  \  print(\"获取失败: \\(error.localizedDescription)\")\n        }\n\n        Entity.lock.unlock()\n\
  \n        return all!\n    }\n}\n```\n\n#### Objective-C\n\n**Entity.h**\n\n```\n\
  #import <Foundation/Foundation.h>\n#import <CoreData/CoreData.h>\n\nNS_ASSUME_NONNULL_BEGIN\n\
  \n@interface Entity : NSManagedObject\n\n+ (NSArray *)allObjectsInContext:(NSManagedObjectContext\
  \ *)\n                                       context;\n\n@end\n\nNS_ASSUME_NONNULL_END\n\
  ```\n\n**Entity.m**\n\n```\n#import \"Entity.h\"\n\n@implementation Entity\n\n+\
  \ (NSArray *)allObjectsInContext:(NSManagedObjectContext *)\n                  \
  \                     context\n{\n  NSArray *all = nil;\n\n  // 准备一个获取请求\n  NSFetchRequest\
  \ *request = [[NSFetchRequest alloc] init];\n  request.entity = [NSEntityDescription\n\
  \                   entityForName:NSStringFromClass([self class])\n          inManagedObjectContext:context];\n\
  \  [request setReturnsDistinctResults:YES];\n\n  NSError *error = nil;\n\n  // 这条指令将锁住上下文，防止\n\
  \  // 对其的多次访问\n  @synchronized(context) {\n      // 这就是你访问上下文的地方\n      all = [context\
  \ executeFetchRequest:request error:&error];\n  }\n\n  return all;\n}\n\n@end\n\
  ```\n\n> **注意：** 请注意，这个机制可能会降低你的应用程序速度，尤其是在处理数据库密集型应用时。请仅将其用于调试目的。\n>\n> 如果在添加 `@synchronized`\
  \ 这行代码后你的代码不再崩溃，那么问题就得到了确认，我们建议你遵循 Apple 的建议，为每个线程创建独立的上下文。\n\n"
- '# 从终端创建图标


  一次性为你的 iPhone、iPad 和 Mac 应用程序创建所有图标，只需几秒钟，几乎不费吹灰之力，怎么样？


  很不错，对吧？我们为你准备了两份脚本：一份用于为你的 iOS 应用创建图标，另一份用于为你的 Mac 应用创建图标。




  '
- "# 为 iOS 应用创建图标\n\n以下脚本用于创建 iOS 应用图标：\n\n```\nmkdir -p ./icons_iphone\nmkdir -p\
  \ ./icons_ipad\nfor x in 29 40 60\ndo\n   double=$(($x * 2))\n   triple=$(($x *\
  \ 3))\n   sips --resampleWidth $double icon.png --out ./icons_iphone/icon-$x@2x.png\n\
  \   sips --resampleWidth $triple icon.png --out ./icons_iphone/icon-$x@3x.png\n\
  done\nfor x in 29 40 76\ndo\n   double=$(($x * 2))\n   sips --resampleWidth $x icon.png\
  \ --out ./icons_ipad/icon-$x.png\n   sips --resampleWidth $double icon.png --out\
  \ ./icons_ipad/icon-$x@2x.png\ndone\n```\n\n**注意：** 此脚本会创建两个文件夹：一个包含 iPhone 图标，另一个包含\
  \ iPad 图标。\n\niOS 图标将按以下尺寸创建：iPhone 使用 29、40 和 60 点 @2x 和 @3x，iPad 使用 29、40 和 76\
  \ 点 @1x 和 @2x。为 iOS 7 及以上版本编译的应用使用这些格式。\n\n## 为 OS X 应用创建图标\n\n使用以下脚本为你的 Mac 应用创建图标：\n\
  \n```\nmkdir -p ./icons_mac\nfor x in 512 256 128 32 16\ndo\n   double=$(($x * 2))\n\
  \   sips --resampleWidth $double icon.png –out ./icons_mac/icon-$x@2x.png\n   sips\
  \ --resampleWidth $x icon.png --out ./icons_mac/icon-$x.png\ndone\n```\n\n**注意：**\
  \ Mac OS X 图标将按以下尺寸创建（兼容 Mac OS X 10.8 及以上版本）：16、32、128、256 和 512 点，分辨率分别为 @1x 和\
  \ @2x。\n\n## 使用脚本\n\n创建应用图标的大尺寸版本（至少 1024 x 1024 像素），并将此图像保存为 `icon.png` 到桌面文件夹。在桌面文件夹中启动终端。复制（C）并粘贴（V）本节列出的其中一个脚本到终端窗口中，然后按下回车键。\n\
  \n脚本将执行并暂停。再次按下回车键以继续执行脚本。\n\n**注意：** 如果不想每次使用时都复制粘贴代码，可以使用本书和 apress.com 上提供的脚本。\n\
  \n## UINavigationBar 色调不生效\n\n如果你尝试使用 `tintColor` 属性更改导航栏的色调颜色但颜色未变化，这是因为导航栏还有另一个名为\
  \ `barTintColor` 的色调属性。你应该改用下面所示的方法。\n\n#### Swift\n\n```\nlet bar = self.navigationController?.navigationBar\n\
  bar?.barTintColor = UIColor.greenColor()\n```\n\n#### Objective-C\n\n```\nUINavigationBar\
  \ *bar = self.navigationController.navigationBar;\nbar.barTintColor = [UIColor greenColor];\n\
  ```\n\n## 调试极其棘手的 Quartz 错误\n\n如果你的项目大量使用 Quartz，并且代码崩溃时没有给出任何问题线索，你会喜欢这一节。\n\n\
  ### 还有希望...\n\n调试复杂 Quartz 应用程序的一个可行解决方案是为你的项目添加一个 `CGPostError` 断点。\n\n选择断点导航器（1），点击面板左下角的\
  \ +（2），选择添加符号断点（3），然后在符号字段中填入 `CGPostError`（图 13）。\n\n如果问题行与 Quartz 相关，XCode 现在就会在出错行处停止。\n\
  \n## 并发向数组添加对象\n\n如果你曾尝试并发向 `NSMutableArray` 添加对象，你会知道这是不可能的。`NSMutableArray` 不允许同时访问其内容。\n\
  \n例如，以下 Objective-C 代码会崩溃，并显示错误消息：\"NSArray was mutated while being enumerated.\"\
  \n\n#### Objective-C\n\n```\nNSMutableArray *newArray = [[NSMutableArray alloc]\
  \ init];\n[anotherArray\n   enumerateObjectsWithOptions:NSEnumerationConcurrent\n\
  \                   usingBlock:^(id obj,\n                                NSUInteger\
  \ idx, BOOL *stop)\n{\n  // 向 newArray 添加新对象\n  [newArray addObject:newObject];\n\
  }];\n```\n\n崩溃是因为枚举是并发运行的。任何两个线程同时尝试向 `newArray` 添加新对象都会导致应用程序崩溃。\n\n### 老式 C 语言方法\n\
  \n解决方案是使用老式的 C 语言数组。\n\n```\n// cArray 是一个 \"id\" 类型元素的数组\n// count 是 cArray 将拥有的条目数\n\
  id cArray [count];\nid __strong *arrayPtr = cArray;\n/* 填充数组\n   arrayPtr[0] = ...\n\
  \   arrayPtr[1] = ...\n   arrayPtr[2] = ...\n   等等...\n*/\n[anotherArray\n    enumerateObjectsWithOptions:NSEnumerationConcurrent\n\
  \                     usingBlock:^(id obj, NSUInteger idx,\n                   \
  \               BOOL *stop) {\n        arrayPtr[idx] = newObject;\n}];\n```\n\n\
  此方法有效，因为随着 `idx` 递增，枚举时将为 `arrayPtr[idx]` 分配不同的内存地址。两个线程不可能访问同一个内存地址。因此，这段代码永远不会崩溃。\n\
  \n### 回到未来\n\n随后，你可以使用以下代码将这个 C 数组转换为普通的 `NSMutableArray`：\n\n```\nNSMutableArray\
  \ *array = [NSMutableArray\n                arrayWithObjects:cArray\n          \
  \                 count:count];\n```\n\n**注意：** Swift 中数组的并发访问完全正常，无需额外代码。\n\n##\
  \ 应用已损坏，无法打开\n\n以下是 Xcode 显示的错误信息的一部分：删除该应用并重新从 App Store 下载。\n\n### 情况\n\n我们有一个\
  \ Cocoa 应用在启动时尝试验证其内部购买收据，但在 bundle 中未找到收据。\n\n按照 Apple 的指示，我们使用 `exit(173)` 强制应用退出，这会指示\
  \ iTunes 检索缺失的收据，但我们仍然无法获取该收据。\n\n以下是 Apple 关于收据验证失败的说法（http://addfone.com/TXReceiptValidation）：\n\
  \n- 应对收据验证失败\n\n> 验证失败的原因有多种。例如，当用户将你的应用从一台 Mac 复制到另一台时，GUID 不再匹配，导致收据验证失败。\n\n\
  在 OS X 中验证失败则退出\n\n> 如果在 OS X 中验证失败，请以状态码 173 调用 `exit`。此退出状态通知系统你的应用已确定其收据无效。此时，系统会尝试获取有效收据，并可能提示用户输入其\
  \ iTunes 凭证。\n\n互联网上的多个网页说明了此问题与证书的关系，但我们之前多次遇到此问题，并观察到另一种可能导致此错误的情况：沙盒用户已损坏。\n\n\
  \n\n### 众神想要惩罚你\n\n你懂的：某一天，你心情愉悦，阳光灿烂，花儿绽放，鸟儿歌唱，`Xcode`里的一切都运行良好。\n\n第二天，众神一觉醒来心情不佳，便来惩罚你。有时他们会间接惩罚你，通过内部腐败的方式判处沙盒用户“惨死”。此时，获取或验证该用户的购买收据就会失败。\n\
  \n更“贴心”的是，众神绝不会向你提供任何能提示问题真正原因的错误信息——你永远也猜不到。\n\n解决沙盒用户死亡的方法是删除有问题的用户，并通过`iTunesConnect`创建一个新用户。\n\
  \n**注意**  \n另一个可以尝试的解决方案是：打开 Mac App Store 应用（如果你处理的是 Mac 应用）或`iTunes`（如果你处理的是 iOS\
  \ 应用），从当前账户注销，然后立即退出该应用。\n\n### 应用无法获取收据\n\n你已经按照上一节的说明创建了一个新的沙盒用户，但你的应用仍然无法获取购买收据？\n\
  \n请验证你的代码是否已正确签名。\n\n转到目标的构建设置，为`Code Signing Identity`和`Provisioning Profile`的\
  \ Debug 和 Release 字段调整为你应用对应的值（参见图 14）。\n\n![A978-1-4842-1560-9_1_Fig14_HTML.jpg](img/A978-1-4842-1560-9_1_Fig14_HTML.jpg)\n\
  \n**图 14.**  \n代码签名身份和配置文件\n\n在图 14 中，你可以看到`Provisioning Profile`部分在 Debug 和 Release\
  \ 条目中设置为“自动”。点击“自动”，将这两个条目更改为各自目标的配置文件。\n\n同时，将`Code Signing Identity`中的`iOS Developer`条目更改为在调整`Provisioning\
  \ Profile`部分后出现的正确的 Debug 和 Release 身份。\n\n### 不同目标中存在同名类\n\n你有一个包含多个目标的项目，特别是涉及不同平台，如\
  \ iOS 和 OS X。\n\n你有两个名为`RenderMe`的类，一个为 iOS 设计，另一个为 OS X 设计。这两个类功能相似，但由于平台差异，实现完全不同。\n\
  \n你希望这两个类同名，因为这能简化项目管理，而且它们用途相似。\n\n在开发的某个阶段，你将不得不将这些类分配给各自的目标，并使用如下代码行导入类：\n\n\
  ```\n#import \"RenderMe.h\"\n```\n\n#### 这是你所期望的...\n你期望 iOS 目标导入并编译 iOS 版本的`RenderMe`，Mac\
  \ OS X 目标也同样如此。\n\n#### 且慢！\n请相信我们，在合适的时间和项目复杂性下，Xcode 会为错误的目标导入并编译错误的类。我们之前就见过这种情况。\n\
  \n此时你有两个解决方案：为这两个类使用不同的名称，或者使用绝对路径导入它们。\n\n不要对两个目标都使用\n\n```\n#import \" RenderMe.h\"\
  \n```\n\n而要根据不同情况使用如下代码行：\n\n```\n#import \"/absolutePathForMyIOSRenderMe/RenderMe.h\"\
  \n#import \"/absolutePathForMyMacRenderMe/RenderMe.h\"\n```\n\n虽然不美观，但有效。\n\n###\
  \ 反对基础国际化的案例\n\niOS 6 在 Xcode 中引入了一个名为“使用基础国际化”的选项。你可以通过导航到项目的信息标签页（图 15）来查看此选项。基础国际化的原理是定义一个默认语言作为基础语言。\n\
  \n![A978-1-4842-1560-9_1_Fig15_HTML.jpg](img/A978-1-4842-1560-9_1_Fig15_HTML.jpg)\n\
  \n**图 15.**  \n使用基础国际化\n\n假设你的应用本地化成了英语和葡萄牙语，并且英语是基础语言。所有设备语言设置为葡萄牙语的用户都将看到葡萄牙语本地化内容，而其他所有用户都将看到英语内容，因为英语是基础语言。\n\
  \n#### 界面元素的本地化\n当我们谈论本地化界面元素时，我们指的是 XIB 文件和故事板。\n\n在 iOS 6 之前，本地化一个界面文件会使 Xcode\
  \ 生成额外的 XIB 和故事板文件副本，每个要本地化的语言一个。这种文件的多重性使得维护和处理多种本地化几乎不可能。\n\n苹果通过引入一个名为`Base Internationalization`的选项解决了这个问题。使用此选项，你不再需要拥有多个界面元素副本，而是拥有一个指定为基础语言的\
  \ XIB 或故事板，以及包含其他语言本地化内容的文本文件（图 16）。\n\n![A978-1-4842-1560-9_1_Fig16_HTML.jpg](img/A978-1-4842-1560-9_1_Fig16_HTML.jpg)\n\
  \n**图 16.**  \n一个被本地化为多种语言的故事板\n\n`Base Internationalization`的想法很好，但你必须意识到，此功能存在一些问题，会导致某些界面元素无法被本地化。\n\
  \n#### UIBarButtonItem 及其他元素的本地化失败\n`Base Internationalization`选项在某些元素上本地化失败的一个典型例子是当你的应用使用了`UIBarButtonItem`对象时。`Base\
  \ Internationalization`选项不会自动本地化这些元素。Xcode 甚至不会将它们的字符串添加到`localization files`中，而手动添加也无法本地化这些元素。\n\
  \n如果你使用了`UIBarButtonItem`对象，你将不得不在运行时通过编程方式对它们进行本地化。\n\n**注意**  \n如果你使用“使用基础国际化”选项，请务必在所有语言上测试你的应用，因为包括`UIBarButtonItems`在内的其他一些界面元素也可能无法正常显示本地化内容。\n\
  \n### 检查缺失的 Localizable.strings\n\n你已经将应用本地化为多种语言，但你感觉某些字符串在某种语言中缺失了。\n\n逐一检查所有本地化文件并进行比较过于复杂且效率低下。\n\
  \n好消息是：你可以让 Xcode 为你检查缺失的字符串！\n\n选择“产品” ➤ “方案” ➤ “编辑方案”，并在“启动时传递的参数”部分添加选项`-NSShowNonLocalizedStrings\
  \ YES`（见图 17）。\n\n![A978-1-4842-1560-9_1_Fig17_HTML.jpg](img/A978-1-4842-1560-9_1_Fig17_HTML.jpg)\n\
  \n**图 17.**  \n检查缺失的 Localizable.strings\n\n下次运行应用时，你将看到 Xcode 的控制台中显示了缺失的字符串，类似如下内容：\n\
  \n```\nBarButtonItemColor[23980:60b] Localizable string \"Ahi-1h-yfI.title\" not\
  \ found in strings table \"Main∼iphone\" of bundle CFBundle 0x17d70dd0 </var/mobile/Applications/1228CFF2-DB3D-4A2D-B0D8-17DA32E7DD8A/BarButtonItemColor.app>\n\
  ```\n\n这个错误信息与一个最初以英语（基础语言）创建，后来本地化为葡萄牙语的应用有关。\n\n错误信息中缺失的字符串属于元素`\"Ahi-1h-yfI.title\"\
  `，这并非巧合，它正是一个`UIBarButtonItem`，证实了我们在“反对基础国际化的案例”一节中所说的内容。\n\n在将该项目的故事板从基础语言本地化为葡萄牙语之后，Xcode\
  \ 确实忘记将`UIBarButtonItem`的字符串添加到本地化文件中，这就是 Xcode 报错的原因。\n\n将缺失的字符串添加到葡萄牙语本地化文件中并不会将`UIBarButtonItem`本地化。要本地化此按钮，唯一的办法是在运行时通过编程方式实现。\n\
  \n### 你错误地声明了你的 NSString\n\n你需要为全新的类声明一个常量`NSString`，而你很可能正在像下面这样声明它。\n\n\n\n####\
  \ Objective-C\n\n`const NSString * kMyConstant;`\n\n这一行代码定义了一个指向常量 `NSString` 的指针。但这并非你想要的结果，原因很简单：`NSString`\
  \ 对象本身已经是不可变的。\n\n相反，你应该像下面这样声明：\n\n`NSString * const kMyConstant;`\n\n这定义了一个指向\
  \ `NSString` 的常量指针，这才是你需要的。\n\n这才是声明 `NSString` 常量的正确方式。\n\n**注意：** 在 Swift 中声明常量，只需使用\
  \ `let` 关键字：\n\n`let kMyConstant = \"something\"`\n\n## CocoaPods: /Manifest.lock:\
  \ 没有那个文件或目录\n\n`diff: /../Podfile.lock: No such file or directory`\n\n`diff: /Manifest.lock:\
  \ No such file or directory`\n\n`error: The sandbox is not in sync with the Podfile.lock.\
  \ Run 'pod install' or update your CocoaPods installation`\n\n如果你的项目使用了 CocoaPods，并且编译时遇到此错误信息，请尝试以下步骤：\n\
  \n关闭 Xcode。在存放 `Podfile` 的目录中启动终端，依次输入以下每一行命令，每输入一行后按回车键，等待命令执行完毕。\n\n`sudo gem\
  \ install cocoapods-deintegrate`  \n`pod deintegrate`  \n`pod install`\n\n第一行命令会在你的系统上安装\
  \ `deintegrate`，这是 CocoaPods 的一个模块，用于从项目中移除所有 Pod 及其相关引用。\n\n如果你已经安装了 `deintegrate`，请跳过这一行。\n\
  \n第二行命令会从项目中移除所有 Pod，并清理所有相关引用。\n\n第三行命令会重新安装这些 Pod。\n\n返回 Xcode，选择 **Product ➤\
  \ Clean**。然后重新构建项目即可。如有必要，请重启 Xcode。\n\n## Asset Catalogs 错误\n\nApple 在 iOS 7（Xcode\
  \ 5）中引入了 Asset Catalogs。使用 Asset Catalogs，你可以简化应用程序中用户界面所用图片的管理。\n\n如果你是个完美主义者，你可能不想听到下面这种情况下的\
  \ Asset Catalogs 错误：\n\n- 你的项目有两个 target：一个针对 iPhone，一个针对 iPad。\n- 每个 target 有不同的图标。\n\
  - 你的项目是为 iOS 7 编译的。\n- 所有图标共用一个 Assets Catalog 文件。\n- `AppIcon` 被设置为包含特定设备的图标。\n\
  - 所有图标都存储在 Assets Catalog 的 `AppIcon` 条目中。\n\n很遗憾地通知你，这样是无法正常工作的。\n\n### 错误表现\n\n\
  在 iPad 上运行的 iPhone target 会为 iOS 7.x 设备显示 iPad 图标。\n\n### 解决方案\n\n为你支持的每个平台分别创建一个不同名称的\
  \ Assets Catalog 文件。每个 Assets Catalog 必须包含自己名称不同的 `AppIcon` 条目。每个 `AppIcon` 条目只能包含属于该平台的图标。\n\
  \n不要忘记为每个 target 配置正确的 Assets Catalog 和 `AppIcon` 条目。\n\n## 应用崩溃且无任何线索？\n\n如果你的\
  \ Objective-C 应用崩溃并显示臭名昭著的 `signal SIGABRT` 消息，且没有提供任何其他崩溃线索，那么本节提供的代码将特别有用。\n\n\
  将 `main.m` 文件中的代码替换为类似下面的内容：\n\n#### Objective-C\n\n```\nint main(int argc, char\
  \ *argv[]) {\n  int retVal;\n  @autoreleasepool {\n    @try {\n      retVal = UIApplicationMain(argc,\
  \ argv, nil, nil); //***\n    }\n    @catch (NSException *exception) {\n      NSLog(@\"\
  \\n\\nSTACK SYMBOLS\\n%@\",\n            [exception callStackSymbols]);\n      NSLog(@\"\
  \\n\\nSTACK RETURN ADDRESSES\\n%@\",\n            [exception callStackReturnAddresses]);\n\
  \      NSLog(@\"\\n\\nOBJECT: %@\",[exception name]);\n      NSLog(@\"\\n\\nUSER\
  \ INFO DICT: %@\",[exception userInfo]);\n      NSLog(@\"\\n\\nREASON: %@\",[exception\
  \ reason]);\n      retVal = 1;\n    }\n  }\n  return retVal;\n}\n//*** 这一行应与你 `main.m`\
  \ 中的写法保持一致。\n```\n\n如果应用崩溃，这段代码会向控制台输出大量信息，可能会帮助你识别问题。\n\n**注意：** 由于 Swift 的特性，无法为该语言实现此类代码。\n\
  \n## 沙盒应用的 NSUserDefaults 失效？\n\n这个问题我们见过几次。\n\n你在测试一个应用时，它突然失去了读取或写入 `NSUserDefaults`\
  \ 的能力。\n\n这个问题的典型解决方案是重启你的 Mac，但每个人都讨厌这样做。\n\n相反，你可以启动终端并输入：\n\n```\nps auwx | grep\
  \ cfprefsd | grep -v grep | awk '{print $2}' |\nxargs sudo kill -9\n```\n\n这会杀死\
  \ macOS 的 `cfprefsd` 守护进程，该进程为 `CFPreferences` 和 `NSUserDefaults` API（应用程序编程接口）提供偏好设置服务。\n\
  \n下次尝试访问 `NSUserDefaults` 时，该守护进程会自动重启，一切应该就能恢复正常。\n\n## 界面元素不更新？\n\n如果你有一个界面元素（如旋转指示器或文本视图）需要持续更新，但由于应用忙于循环而无法更新，请在循环末尾添加以下代码。\n\
  \n#### Swift\n\n```\nvar date : NSDate? = NSDate()\ndate = date!.dateByAddingTimeInterval(0.0)\n\
  let runLoop = NSRunLoop.currentRunLoop()\nrunLoop.runUntilDate(date!)\n```\n\n####\
  \ Objective-C\n\n```\n[[NSRunLoop currentRunLoop] runUntilDate:\n           [NSDate\
  \ dateWithTimeIntervalSinceNow:0.0]];\n```\n\n这段代码会强制循环短暂暂停，从而让应用能够更新界面。\n\n**注意：**\
  \ 请记住，这段代码会停止当前运行循环极短的时间。这可能会拖慢某些应用。请谨慎使用。如果需要，你可以调整时间间隔。\n\n## 使用正则表达式查找和替换字符串\n\
  \n假设你的项目中包含类似本节中的多行代码。\n\n#### Swift\n\n```\nmyButton1.setTitleColor(UIColor.grayColor(),\n\
  \          forState:UIControlState.Normal)\nmyButton2.setTitleColor(UIColor.greenColor(),\n\
  \          forState:UIControlState.Selected)\nmyButton3.setTitleColor(UIColor.orangeColor(),\n\
  \          forState:UIControlState.Disabled)\n```\n\n#### Objective-C\n\n```\n[myButton1\
  \ setTitleColor:[UIColor grayColor]\n           forState: UIControlStateNormal];\n\
  [myButton2 setTitleColor:[UIColor greenColor]\n           forState: UIControlStateSelected];\n\
  [myButton3 setTitleColor:[UIColor orangeColor]\n           forState: UIControlStateDisabled];\n\
  ```\n\n这些按钮具有不同的名称、不同的颜色和不同的控件状态。\n\n你想要搜索所有类似的行，并将颜色改为红色，但保留名称和控件状态不变。\n\n你想要将代码修改为如下所示：\n\
  \n#### Swift\n\n```\nmyButton1.setTitleColor(UIColor.redColor(),\n          forState:UIControlState.Normal)\n\
  myButton2.setTitleColor(UIColor.redColor(),\n          forState:UIControlState.Selected)\n\
  myButton3.setTitleColor(UIColor.redColor(),\n          forState:UIControlState.Disabled)\n\
  ```\n\n\n\n#### Objective-C\n\n```\n[myButton1 setTitleColor:[UIColor redColor]\n\
  \           forState: UIControlStateNormal];\n[myButton2 setTitleColor:[UIColor\
  \ redColor]\n           forState: UIControlStateSelected];\n[myButton3 setTitleColor:[UIColor\
  \ redColor]\n           forState: UIControlStateDisabled];\n```\n\n如何实现？  \n正则表达式可以拯救你。\n\
  \n### 使用正则表达式\n\n**注意**  \n苹果文档指出，在使用 Xcode 搜索功能并配合正则表达式时，必须使用 ICU 语法。ICU 语法使用美元符号（`$`）后跟数字来表示引用的捕获组（`$1`、`$2`\
  \ 等）。\n\n选择 Find ➤ Find and Replace in Project... 确保你选择了“替换”选项并勾选了“Regular Expression”（正则表达式）。如果没有，请点击“Text”字样并选择正确选项（参见图\
  \ 18 和图 19）。\n\n![A978-1-4842-1560-9_1_Fig19_HTML.jpg](img/A978-1-4842-1560-9_1_Fig19_HTML.jpg)\
  \  \n图 19. 已选中正则表达式\n\n![A978-1-4842-1560-9_1_Fig18_HTML.jpg](img/A978-1-4842-1560-9_1_Fig18_HTML.jpg)\
  \  \n图 18. 正则表达式选项\n\n#### “查找”字段\n\n“查找”字段用于输入要查找的字符串，或者在本例中，输入你想要查找的正则表达式。\n\n\
  在“查找”字段中填入 `\\[(.*) setTitleColor:(.*) forState:(.*)\\]`\n\n##### 说明：\n\n你可以将这个表达式分为几个部分（参见图\
  \ 20）。\n\n![A978-1-4842-1560-9_1_Fig20_HTML.jpg](img/A978-1-4842-1560-9_1_Fig20_HTML.jpg)\
  \  \n图 20. 分解后的正则表达式\n\n➊ 查找左方括号 `[`；  \n➋ 查找左方括号与字符串 `setTitleColor:` 之间可能存在的任何内容，并将结果存储为“组\
  \ 1”；  \n➌ 查找 `setTitleColor:` 与 `forState:` 之间可能存在的任何内容，并将结果存储为“组 2”；  \n➍ 查找 `setTitleColor:`\
  \ 与右方括号之间可能存在的任何内容，并将结果存储为“组 3”；  \n➎ 查找右方括号 `]`；\n\n**注意**  \n这里的问题是，为什么要在方括号前加上反斜杠来进行搜索？答案很简单——因为方括号本身是正则表达式语法的一部分。如果我们使用像\
  \ `[0-9]` 这样的表达式，就是在告诉 Xcode“查找一个介于 0 到 9 之间的数字”。反斜杠的作用是告诉 Xcode，我们要查找的是方括号这个字符，而不是将方括号当作命令来使用。反斜杠字符被称为“转义”字符，根据维基百科的解释，它是一个能够引发对字符序列中后续字符进行另一种解释的字符。\n\
  \n#### “替换”字段\n\n“替换”字段用于输入你希望用来替换匹配“查找”字段表达式的文本的表达式。\n\n在“替换”字段中填入 `[$1 setTitleColor:[UIColor\
  \ redColor] forState:$3]`\n\n参见图 21。\n\n![A978-1-4842-1560-9_1_Fig21_HTML.jpg](img/A978-1-4842-1560-9_1_Fig21_HTML.jpg)\
  \  \n图 21. 正则表达式\n\n#### 说明\n\n变量 `$1` 和 `$3` 代表“查找”字段中的捕获组。如前所述，“组 1”将是左方括号与 `setTitleColor:`\
  \ 之间可能存在的任何内容，而“组 3”将是 `setTitleColor:` 与右方括号之间可能存在的任何内容。通过使用变量 `$1` 和 `$3`，我们相当于将“组\
  \ 1”和“组 3”的内容“粘贴”到了相应位置上。\n\n在我们的示例中：\n- “组 1”将包含不同的按钮名称：`myButton1`、`myButton2`\
  \ 和 `myButton3`；\n- “组 2”将包含不同的颜色：灰色、绿色和橙色；\n- “组 3”将包含不同的控件状态：normal、selected 和\
  \ disabled。\n\n通过使用图 21 中“替换”字段所示的表达式，我们指示 Xcode 按以下方法构建替换字符串：以左方括号开头，接着是“组 1”的内容，然后是一个空格，接着是字符串\
  \ `setTitleColor:[UIColor redColor] forState:`，再接着是“组 3”的内容，最后以右方括号结尾。\n\n#### 但有一个问题...\n\
  \n我们描述的搜索命令只有在连续书写这些代码行时才会生效，如下所示：\n\n```\n[myButton1 setTitleColor:...\n      \
  \             forState:...];\n```\n\n如果这些行被换行符分隔，像下面这样，搜索将无法找到它们：\n\n```\n[myButton1\
  \ setTitleColor:...\n                   forState:...];\n```\n\n问题出现的原因在于，命令的不同部分之间存在换行符（在本书中用\
  \ `\\n` 字符表示），而我们没有在搜索命令中提供相应的指令来考虑这一点。\n\n为了处理换行符或其他不可见字符，你需要在搜索字符串中添加 `\\s*` 指令。\n\
  \n在这种情况下，“查找”字段将变为：\n\n```\n\\[(.*) \\s* setTitleColor:(.*) \\s* forState:(.*)\\\
  ]\n```\n\n**注意**  \nICU 语法将以下字符视为“空白字符”：制表符、换页符、换行符、回车符以及任何类型的空格或不可见字符。  \n你可以通过访问\
  \ [`http://addfone.com/TXICUSyntax`](http://addfone.com/TXICUSyntax) 了解更多关于 ICU\
  \ 语法的信息。\n\n## 从数组中提取字典\n\n你有一个字典数组，这些字典包含两个字段：“name”和“date”，分别对应一个 `NSString` 对象和一个\
  \ `NSDate` 对象。\n\n在某个时候，你想要从这个数组中提取出日期最近的字典。\n\n你可以使用如下所示的代码。\n\n### Swift: NSArray\n\
  \n```\n// 创建带有随机日期的字典\nlet obj1 : NSDictionary? = [\"name\":\"car\",\n         \
  \                   \"date\":date1!]\nlet obj2 : NSDictionary? = [\"name\":\"boat\"\
  ,\n                            \"date\":date2!]\nlet obj3 : NSDictionary? = [\"\
  name\":\"plane\",\n                            \"date\":date3!]\n// 将它们存储到一个数组中\n\
  let unsortedArray : NSArray = [obj1!, obj2!, obj3!]\n// 创建一个 NSSortDescriptor 来对数组进行排序\n\
  let dateDescriptor : NSSortDescriptor =\n    NSSortDescriptor(key: \"date\", ascending:\
  \ true)\n// 对数组进行排序\nlet sortedArrayOfDics : NSArray =\n    unsortedArray.sortedArrayUsingDescriptors([dateDescriptor])\n\
  // 因为数组已排序，最后一个对象就是\n// 日期最近的那个\nlet mostRecent : AnyObject! = sortedArrayOfDics.lastObject\n\
  ```\n\n\n好的，作为高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n### Swift 变体...\n\
  \n如果你正在处理一个包含 `NSDictionary` 对象的 `NSArray`，前面的代码是有效的，但如果你使用的是 Swift 字典构成的 Swift\
  \ 数组，那又该如何呢？\n\n在这种情况下，你必须使用以下代码：\n\n```\n// creating the dictionaries\nlet dict1\
  \ : [String:AnyObject?] = [\"object\" : \"car\",    \"date\" : date1]\nlet dict2\
  \ : [String:AnyObject?] = [\"object\" : \"boat\",   \"date\" : date2]\nlet dict3\
  \ : [String:AnyObject?] = [\"object\": \"plane\",  \"date\" : date3]\n\n// creating\
  \ the array\nlet array : Array = [dict1, dict2, dict3]\n\n// creating the sort\n\
  let result = array.sort {\n  item1, item2 in\n  let date1 = item1[\"date\"] as!\
  \ NSDate\n  let date2 = item2[\"date\"] as! NSDate\n  return date1.compare(date2)\
  \ == NSComparisonResult.OrderedAscending\n}\n\nlet latestDate = result.last\nprint(latestDate)\n\
  ```\n\n#### Objective-C\n\n```\n// the dictionaries with random dates\nNSDictionary\
  \ *obj1 = @{ @\"name\":@\"car\", @\"date\":date1};\nNSDictionary *obj2 = @{ @\"\
  name\":@\"boat\", @\"date\":date2};\nNSDictionary *obj3 = @{ @\"name\":@\"plane\"\
  , @\"date\":date3};\n\n// the unsorted array\nNSArray *unsortedArray = @[obj1, obj2,\
  \ obj3];\n\n// create a NSSortDescriptor to sort the array\nNSSortDescriptor *dateDescriptor\
  \ = [NSSortDescriptor sortDescriptorWithKey:@\"date\" ascending:YES];\nNSArray *sortDescriptors\
  \ = @[dateDescriptor];\n\n// sorting the array\nNSArray *sortedArray = [unsortedArray\
  \ sortedArrayUsingDescriptors:sortDescriptors];\n\n// because the array is sorted,\
  \ the last object is the\n// one with the most recent date\nNSDictionary *mostRecent\
  \ = [sortedArray lastObject];\n```\n\n## 计算数组中元素数量的神奇方法\n\n假设你有一个字典数组，这些字典包含两个字段：`object`（一个\
  \ `NSString` 类型）和 `selected`（一个存储在 `NSNumber` 中的 `BOOL` 类型）。\n\n你想知道这些字典中有多少个的 `selected`\
  \ 字段等于 `YES`/`true`。\n\n接下来展示的是首先想到的代码。\n\n#### Swift\n\n```\nvar count = 0\nfor\
  \ dict in array {\n  if dict[\"selected\"] == true\n     count++\n}\n```\n\n####\
  \ Objective-C\n\n```\nNSInteger count = 0;\nfor (NSDictionary * dict in array) {\n\
  \  BOOL isSelected = [dict [@\"selected\"] boolValue];\n  if (isSelected)\n    count++;\n\
  }\n```\n\n但这段代码不够“神奇”。\n\n让我们用神奇的方式来实现它。\n\n### Swift: NSArray\n\n```\n// creating\
  \ the dictionaries\nlet dict1: NSDictionary = [\"object\"   : \"television\",\n\
  \                           \"selected\" : true]\nlet dict2: NSDictionary = [\"\
  object\"   : \"phone\",\n                           \"selected\" : false]\nlet dict3:\
  \ NSDictionary = [\"object\"   : \"book\",\n                           \"selected\"\
  \ : true]\n\n// creating the array\nlet array : NSArray? = [dict1, dict2, dict3]\n\
  \n// this is the magical command\nlet count = array!.valueForKeyPath(\"@sum.selected\"\
  )?.integerValue\nprint(count); // this will print 2 on console\n```\n\n### Swift\
  \ 变体...\n\n前面的代码只有在使用 `NSDictionary` 实例构成的 `NSArray` 时才有效。如果你使用的是 Swift 字典构成的 Swift\
  \ 数组，则应使用以下代码：\n\n```\n// creating the dictionaries\nlet dict1 = [\"object\" : \"\
  television\", \"selected\": true]\nlet dict2 = [\"object\" : \"phone\",      \"\
  selected\": false]\nlet dict3 = [\"object\" : \"book\",       \"selected\": true]\n\
  \n// creating the array\nlet array = [dict1, dict2, dict3]\n\n// the magic command\n\
  let filteredArray = array.filter({$0[\"selected\"] == true})\nlet result = filteredArray.count\n\
  print(result) // this will print 2 on console\n```\n\n#### Objective-C\n\n```\n\
  // creating the dictionaries\nNSDictionary *dict1 = @{@\"object\"    : @\"television\"\
  ,\n                        @\"selected\"  : @(YES) };\nNSDictionary *dict2 = @{@\"\
  object\"    : @\"phone\",\n                        @\"selected\"  : @(NO)  };\n\
  NSDictionary *dict3 = @{@\"object\"    : @\"book\",\n                        @\"\
  selected\"  : @(YES) };\n\n// creating the array\nNSArray *array = @[dict1, dict2,\
  \ dict3];\n\n// this is the magical command\nNSInteger count = [[array valueForKeyPath:@\"\
  @sum.selected\"] integerValue];\nNSLog(@\"count %@\", @(count)); // this will print\
  \ 2 on console\n```\n\n## OS X 应用未以正确尺寸启动\n\n如果你已经调整了 Cocoa 应用，使其以特定尺寸启动，但应用却未能做到，那么本节内容绝对适合你。\n\
  \n我们不止一次看到这个问题，它通常与某些干扰初始 `ViewController` 的「自动布局」约束有关。\n\n此问题的解决方案是向 `ViewController`\
  \ 的视图应用约束，使其以正确尺寸启动，但这类视图不接受约束。\n\n你必须将整个界面嵌入到一个 `NSView` 中，并对该视图应用约束，定义你希望应用启动时的尺寸（图\
  \ 22）。\n\n![图 22](img/A978-1-4842-1560-9_1_Fig22_HTML.jpg)\n\n图 22. 将整个界面元素嵌入到一个视图中（之前和之后）\n\
  \n## 检测正在运行的应用目标\n\n你有一个包含独立 iPhone 和 iPad 目标的项目，在代码的某个地方，你想知道当前正在运行的是哪个目标。\n\n\
  使用 `UI_USER_INTERFACE_IDIOM()` 不是一个选项，因为该方法只会检查目标是在 iPhone 还是 iPad 上运行，而不是检查目标本身。\n\
  \n解决此问题的一种方法是添加一个预处理宏，然后在代码中检查该宏是否存在，但编译器指令会使代码变得笨拙并降低可读性。\n\n然而，有更好的方法。下面展示的代码将读取\
  \ bundle 的 `infoDictionary`，并找出正在运行的目标。\n\n#### Swift\n\n```\nfunc getTarget() ->\
  \ NSString {\n  let dict : NSDictionary = NSBundle.mainBundle().infoDictionary!\n\
  \  let family  = dict[\"UIDeviceFamily\"]!\n  let device = family[0]\n  return (device.integerValue\
  \ == 1) ? \"iPhone\" : \"iPad\"\n}\n```\n\n#### Objective-C\n\n```\n- (NSString\
  \ *) getTarget {\n  NSDictionary *dict = [[NSBundle mainBundle] infoDictionary];\n\
  \  NSArray *family = dict[@\"UIDeviceFamily\"];\n  NSInteger device = [family[0]\
  \ integerValue];\n  return (device == 1) ? @\"iPhone\" : @\"iPad\";\n}\n```\n\n\
  ## 禁用类上的方法\n\n你有一个新类，必须使用特定的初始化方法（如 `initWithMode:`）来初始化，并且你希望阻止人们使用父类可能提供的其他初始化方法。\n\
  \n下面展示的代码将提醒人们使用正确的初始化方法，并禁用可能存在的其他方法。\n\n\n\n#### Swift\n\n```\n@available(*, unavailable,\n\
  \             message=\"init is unavailable, use initWithMode\")\ninit() {\n  //\
  \ your code...\n}\n```\n\n#### Objective-C\n\n```\n#import <Foundation/Foundation.h>\n\
  \n@interface SampleClass : NSObject\n\n- (id)init __attribute__((unavailable(\"\
  init is unavailable,\n                                    use initWithMode\")));\n\
  @end\n```\n\n**注意**  \n该指令将在编译时产生错误，警告用户不应使用 `init` 方法进行初始化。\n\n## 弃用类中的某个方法\n\n\
  你弃用了类中的一个方法，并希望警告用户更新代码以使用新方法。\n\n你可以简单地为此方法添加这个编译器属性。\n\n#### Swift\n\n```\n@available(*,\
  \ deprecated)\nclass func shareWithParams(params: NSDictionary) {\n  // your code...\n\
  }\n```\n\n#### Objective-C\n\n```\n#import <Foundation/Foundation.h>\n\n@interface\
  \ SampleClass : NSObject\n\n+(void)shareWithParams:(NSDictionary *)params\n    \
  \   __attribute((deprecated(\"use shareWithPars:\n                             \
  \   instead\")));\n@end\n```\n\n**注意**  \n该编译器属性将在编译时产生错误，警告当前方法已被弃用，应使用其他方法。\n\n\
  ## Xcode 出现“沙滩球”现象\n\n当我们试图打开一个前一天还能正常工作的项目时，Xcode 是否永远在显示“沙滩球”？\n\n**注意**  \n死亡沙滩球或旋转等待光标是一种彩色的圆形光标类型，形似沙滩球，当应用程序在\
  \ Mac OS X 上挂起时，它会取代常规鼠标指针。\n\n事实证明，在 Xcode 偏好设置中禁用源代码控制可以解决此问题（图 23）。\n\n![A978-1-4842-1560-9_1_Fig23_HTML.jpg](img/A978-1-4842-1560-9_1_Fig23_HTML.jpg)\n\
  \n**图 23.** 通过禁用源代码控制解决“沙滩球”问题\n\n**注意**  \n此处描述的源代码控制问题也是导致尝试打开某些项目时 Xcode 崩溃的原因。\n\
  \n## UIButton 未变灰\n\n你正尝试使用以下代码禁用 `UIButton`，但按钮并未变灰。\n\n#### Swift\n\n```\nmyButton.enabled\
  \ = false\n```\n\n#### Objective-C\n\n```\nmyButton.enabled = NO;\n```\n\n`UIButton`\
  \ 对象在被禁用时不会显示为灰色。你必须强制将其标题设为灰色，以使其看起来像是“已禁用”，可使用如下代码。\n\n#### Swift\n\n```\nmyButton.enabled\
  \ = false\nmyButton.setTitleColor(UIColor.grayColor(),\n                       forState:UIControlState.Disabled)\n\
  ```\n\n#### Objective-C\n\n```\nmyButton.enabled = NO;\n[myButton setTitleColor:[UIColor\
  \ grayColor]\n              forState:UIControlStateDisabled];\n```\n\n## 捕获内存损坏\n\
  \n有些类型的 Bug 简直难以捕获。\n\n你的应用程序崩溃了，情况怪异且难以追踪。\n\n用户开始抱怨，而你无法复现问题。\n\n你的应用程序可能遇到了某种内存损坏问题。\n\
  \n以下是苹果对此的看法。\n\n> Objective-C 和 C 代码容易受到内存损坏问题的影响，例如栈和堆缓冲区溢出以及释放后使用问题。当这些内存违规发生时，你的应用程序可能会不可预测地崩溃或显示异常行为。内存损坏问题难以追踪，因为崩溃和异常行为通常难以复现，并且原因可能远离问题的源头。\n\
  \n更多信息，请访问 [`http://addfone.com/TXSanitizer`](http://addfone.com/TXSanitizer)\n\n\
  ### Sanitizer（地址清理器）\n\nXcode 7 附带一个名为 Address Sanitizer 的选项，该选项会在应用程序中生成额外代码，通过指针检查每次读取和写入，如果内存中的某个地址被损坏，则会发出警告。\n\
  \n要启用此选项，请选择 Product ➤ Scheme ➤ Edit Scheme ➤ Diagnostics，然后勾选 **Enable Address\
  \ Sanitizer**（图 24）。\n\n![A978-1-4842-1560-9_1_Fig24_HTML.jpg](img/A978-1-4842-1560-9_1_Fig24_HTML.jpg)\n\
  \n**图 24.** Xcode 7 Address Sanitizer\n\n启用 Address Sanitizer 后运行你的应用程序，直到它崩溃。崩溃现在将产生丰富的错误信息，为你提供问题的线索。\n\
  \n你的用户将停止抱怨。\n\n**注意**  \nAddress Sanitizer 可能会带来显著的开销，并将你的代码速度降低至少一半。\n\n## SpriteKit\
  \ 在 didBeginContact 时崩溃\n\n> spritekit 断言失败： (typeA == b2_dynamicBody || typeB ==\
  \ b2_dynamicBody)，函数 SolveTOI\n\n每次两个物体碰撞时，都会调用 `SpriteKit’s didBeginContact:` 方法。在此方法运行期间，SpriteKit\
  \ 期望至少其中一个碰撞物体是动态的（`physicsBody.dynamic = YES`）。如果其中一个物体在 `didBeginContact:` 运行时从动态变为静态，SpriteKit\
  \ 将会崩溃。\n\n防止崩溃的一种解决方法是操作临时变量，而不是直接操作 `dynamic` 属性本身。请参考以下代码。\n\n#### Swift\n\n\
  ```\nlet tempBody = self.physicsBody\ntempBody!.dynamic = false\nself.physicsBody\
  \ = tempBody\n```\n\n#### Objective-C\n\n```\nSKPhysicsBody *tempBody = node.physicsBody;\n\
  tempBody.dynamic = NO;\nnode.physicsBody = tempBody;\n```\n\n**注意**  \n此解决方案仅用于确认问题。你必须检查代码，防止在\
  \ `didBeginContact:` 期间将两个 `physicsBody` 的属性都改为静态。\n\n如果你的 `physicsBody` 属于一个已被缩放过的节点，此解决方案将无法正常工作。在这种情况下，当你将\
  \ `tempBody` 重新赋值给该对象时，它会创建一个未缩放的 `physicsBody`。\n\n## SpriteKit 对象不遵守边界？\n\n你的\
  \ SpriteKit 对象使用路径作为其 `physicsBody` 边界，但这些对象不遵守其他对象的边缘/边界。\n\nSpriteKit 对象使用的所有路径必须是凸的，并且应使用按逆时针顺序绘制的顶点创建（图\
  \ 25）。\n\n![A978-1-4842-1560-9_1_Fig25_HTML.jpg](img/A978-1-4842-1560-9_1_Fig25_HTML.jpg)\n\
  \n**图 25.** 按正确顺序绘制的凸形状\n\n请检查你的路径是否遵循此规则，或者使用它们创建的任何形状是否是非凸的（图 26）。\n\n![A978-1-4842-1560-9_1_Fig26_HTML.jpg](img/A978-1-4842-1560-9_1_Fig26_HTML.jpg)\n\
  \n**图 26.** 非凸形状；顶点顺序无关紧要\n\n**注意**  \n你可以通过绘制形状内两点之间的连线来检测形状是否为非凸。如果连接线落在形状外部，则为非凸形。SpriteKit\
  \ 对象必须是凸的（图 25），并应使用按逆时针顺序绘制的顶点创建。\n\n## 关于 Cocoa 应用使用 Storyboard 的反例\n\n这是一种致命的组合：\n\
  \n- 你正在创建一个 Cocoa 应用程序。\n- 你的应用程序需要分别使用 `[NSPanel openPanel]` 和 `[NSPanel savePanel]`\
  \ 来加载和保存文件。\n- 你使用 storyboard 创建应用程序。\n- 你选择要求 OS X 10.10.0 作为应用程序所需的最低操作系统。\n\n\
  很抱歉地通知你，你的应用程序将无法工作。\n\n原因是 OS X 10.10.0 和 10.10.1 中的一个 Bug，它不仅阻止 `[NSPanel openPanel]`\
  \ 和 `[NSPanel savePanel]` 工作，而且如果你尝试使用这些方法，实际上会导致应用程序崩溃。\n\n例如，以下代码在 OS X 10.10.0\
  \ 和 10.10.1 中会崩溃，但在 10.10.2 及更高版本中完美运行。\n\n\n\n#### Swift\n\n```swift\nlet panel\
  \ = NSSavePanel()\npanel.beginSheetModalForWindow(self.view.window!, completionHandler:\
  \ { (result) -> Void in\n})\n```\n\n#### Objective-C\n\n```objc\nNSSavePanel* panel\
  \ = [NSSavePanel savePanel];\npanel beginSheetModalForWindow:self.view.window completionHandler:^(NSInteger\
  \ result){\n}];\n```\n\n以下是我们联系苹果公司后得到的回复：\n\n> 我们的工程师已审查您的请求，并确定您遇到的是一个已知问题，其解决方法是使用\
  \ xib 文件替代 storyboard。或者，您也可以选择将该应用的最低操作系统版本要求设为 OS X 10.10.2。\n\nOS X 应用中的 storyboard\
  \ 问题并不仅限于 `NSSavePanel` 和 `NSOpenPanel`。在某些情况下，`NSSplitControllers` 和 `NSTabViewControllers`\
  \ 也无法与 storyboard 很好地协同工作。\n\n因此，在 OS X 10.10 成为历史之前，我们建议不要在 OS X 项目中使用 storyboard。请按照苹果的建议，使用\
  \ XIB 文件。\n\n## 支持独立圆角的 UIView 类\n\n**注意**\n\n`UIButton`、`UILabel`、`UISegmentedControl`\
  \ 和 `UITextView` 是 `UIView` 基类的一些示例。\n\n如果你想创建圆角 `UIView` 基类，并且能够独立控制每个角的半径，我们为你创建了这个分类（Swift\
  \ 中称为“extension”）。\n\n#### Swift\n\n`UIView+IndependentCorners.swift`\n\n```swift\n\
  import UIKit\nimport QuartzCore\n\nextension UIView {\n    func corners(corners:\
  \ UIRectCorner, radius: CGFloat) {\n        let maskPath = UIBezierPath(roundedRect:\
  \ bounds,\n                                    byRoundingCorners: corners,\n   \
  \                                 cornerRadii: CGSizeMake(radius, radius))\n   \
  \     let cornerLayer = CAShapeLayer()\n        cornerLayer.frame = self.bounds\n\
  \        cornerLayer.path = maskPath.CGPath\n        layer.mask = cornerLayer\n\
  \    }\n}\n```\n\n使用以下代码设置圆角：\n\n```swift\n// 同时将左上角和右下角的半径设为 20 点\nmyView.corners(UIRectCorner.TopLeft\
  \ | UIRectCorner.BottomRight, radius: 20)\n```\n\n**注意**\n\n你可以通过竖线字符（\"|\"）分隔多个角来组合它们。选项包括\
  \ `UIRectCorner.TopLeft`、`UIRectCorner.TopRight`、`UIRectCorner.BottomLeft`、`UIRectCorner.BottomRight`\
  \ 和 `UIRectCorner.AllCorners`。\n\n#### Objective-C\n\n`UIView+IndependentCorners.h`\n\
  \n```objc\n#import <UIKit/UIKit.h>\n\n@interface UIView (IndependentCorners)\n-\
  \ (void)setCorners:(UIRectCorner)corners withRadius:(CGFloat)radius;\n@end\n```\n\
  \n`UIView+IndependentCorners.m`\n\n```objc\n#import \"UIView+IndependentCorners.h\"\
  \n\n@implementation UIView (IndependentCorners)\n- (void)setCorners:(UIRectCorner)corners\
  \ withRadius:(CGFloat)radius\n{\n    UIBezierPath *shapePath = [UIBezierPath\n \
  \       bezierPathWithRoundedRect:[self bounds]\n                byRoundingCorners:corners\n\
  \                      cornerRadii:CGSizeMake(radius, radius)];\n    CAShapeLayer\
  \ *newCornerLayer = [CAShapeLayer layer];\n    newCornerLayer.frame = [self bounds];\n\
  \    newCornerLayer.path = shapePath.CGPath;\n    [self layer].mask = newCornerLayer;\n\
  }\n@end\n```\n\n使用以下代码设置圆角：\n\n```objc\n// 同时将左上角和右下角的半径设为 30 点\n[myView setMaskTo:self.pickerFrom\n\
  \    byRoundingCorners:UIRectCornerBottomLeft | UIRectCornerBottomRight\n      withCornerRadii:CGSizeMake(30.0f,\
  \ 30.0f)];\n```\n\n**注意**\n\n与 Swift 示例类似，你可以通过竖线字符（\"|\"）分隔多个角来组合它们。选项包括 `UIRectCornerTopLeft`、`UIRectCornerTopRight`、`UIRectCornerBottomLeft`、`UIRectCornerBottomRight`\
  \ 和 `UIRectCornerAllCorners`。\n\n## 让 NSViews 与 UIViews 兼容\n\n如果你既开发 iOS 应用又开发 OS\
  \ X 应用，你一定曾希望可以将为一个平台编写的代码用于另一个平台。其中最经典的场景之一就涉及 `UIViews` 和 `NSViews`。\n\n`UIViews`\
  \ 和 `NSViews` 的问题在于它们是截然不同的物种。最终，即使你用它们执行相同的简单操作，也必须为这两个类编写不同的代码。\n\n虽然我们同意 `UIViews`\
  \ 和 `NSViews` 是截然不同的物种，但也看到它们有很多共同之处。为同一功能（例如在 iOS 和 OS X 上分别使用 `setAlpha:` 和 `setAlphaValue:`\
  \ 设置视图透明度）使用不同命令，这并不合理。\n\n我们为你创建了一个类，使 `UIView` 和 `NSView` 对象在某些简单方面具有相似性。该类还为\
  \ `NSViews` 添加了一些增强功能，例如支持视图的淡入淡出以及通过视图中心设置其位置。\n\n\n\n#### Swift\n\n`NSView+ CompatibleUIView.swift`\n\
  \n```\nimport Foundation\nimport AppKit\n\nextension NSView {\n    typealias AnimationHandler\
  \  = () -> Void\n    typealias CompletionHandler = (finished : Bool) -> Void\n\n\
  \    var center: CGPoint {\n        get {\n            let midX = CGRectGetMidX(frame)\n\
  \            let midY = CGRectGetMidY(frame)\n            return CGPointMake(midX,\
  \ midY)\n        }\n        set(newCenter) {\n            var newFrame = CGRectZero\n\
  \            newFrame.size = frame.size\n            let myWidth = CGRectGetWidth(frame)\n\
  \            let myHeight = CGRectGetHeight(frame)\n            let x = floor(newCenter.x\
  \ - (myWidth / 2.0))\n            let y = floor(newCenter.y - (myHeight / 2.0))\n\
  \            newFrame.origin.x = x\n            newFrame.origin.y = y\n        \
  \    frame = newFrame\n        }\n    }\n\n    var alpha: CGFloat {\n        get\
  \ { return alphaValue }\n        set(value) { alphaValue = value }\n    }\n\n  \
  \  func fadeInWithDuration(duration: NSTimeInterval) {\n        wantsLayer = true\n\
  \        NSAnimationContext.beginGrouping()\n        NSAnimationContext.currentContext().duration\
  \ = duration\n        animator().alphaValue = 1.0\n        NSAnimationContext.endGrouping()\n\
  \    }\n\n    func fadeOutWithDuration(duration: NSTimeInterval) {\n        wantsLayer\
  \ = true\n        NSAnimationContext.beginGrouping()\n        NSAnimationContext.currentContext().duration\
  \ = duration\n        animator().alphaValue = 0.0\n        NSAnimationContext.endGrouping()\n\
  \    }\n\n    func animateWithDuration(duration: NSTimeInterval, animations: AnimationHandler)\
  \ {\n        wantsLayer = true\n        NSAnimationContext.runAnimationGroup({ (context:\
  \ NSAnimationContext) -> Void in\n            context.duration = duration\n    \
  \        context.allowsImplicitAnimation = true\n            animations()\n    \
  \    }, completionHandler: { () -> Void in })\n    }\n\n    func animateWithDuration(duration:\
  \ NSTimeInterval, animations: AnimationHandler, completion: CompletionHandler) {\n\
  \        wantsLayer = true\n        NSAnimationContext.runAnimationGroup({ (context:\
  \ NSAnimationContext) -> Void in\n            context.duration = duration\n    \
  \        context.allowsImplicitAnimation = true\n            animations()\n    \
  \    }, completionHandler: { () -> Void in\n            completion(finished: true)\n\
  \        })\n    }\n}\n```\n\n这一类别将允许你在你的 `NSViews` 上使用 `setAlpha:` 和 `setCenter:`，并且作为额外功能，还添加了一些强大的方法。\n\
  \n**淡入和淡出**\n\n```\n// 在 5 秒内淡入或淡出 myView\nmyView.fadeInWithDuration(5)\nmyView.fadeOutWithDuration(5)\n\
  ```\n\n**像 UIView 一样为 NSView 添加动画**\n\n```\n// 在 5 秒内将 myView 的透明度从 0 动画至 0.7\n\
  myView.alpha = 0\nmyView.animateWithDuration(5.0, animations: { () -> Void in\n\
  \    self.myView.alphaValue = 0.7\n})\n\n// 或者\n// 在 5 秒内将 myView 的透明度从 0 动画至 0.7，并在动画完成后执行某些操作\n\
  self.myView.animateWithDuration(5.0,\n    animations: { () -> Void in\n        self.myView.alphaValue\
  \ = 0.7\n    }, completion: { (finished) -> Void in\n        // 动画完成... 在此执行操作\n\
  \    })\n```\n\n#### Objective-C\n\n`NSView+ CompatibleUIView.h`\n\n```\n@class\
  \ NSView;\n\n@interface NSView (CompatibleUIView)\n- (void)setAlpha:(CGFloat)point;\n\
  - (CGFloat)alpha;\n- (void)setCenter:(CGPoint)point;\n- (CGPoint)center;\n+(void)fadeOut:(NSView*)viewToDissolve\n\
  \  withDuration:(NSTimeInterval)duration;\n+(void)fadeIn:(NSView*)viewToFadeIn\n\
  withDuration:(NSTimeInterval)duration;\n+ (void)animateWithDuration:(NSTimeInterval)duration\n\
  \                 animations:(void (^)(void))animations;\n+ (void)animateWithDuration:(NSTimeInterval)duration\n\
  \                 animations:(void (^)(void))animations\n                 completion:(void\
  \ (^)(BOOL finished))completion;\n@end\n```\n\n`NSView+ CompatibleUIView.m`\n\n\
  ```\n#import \"NSView+CompatibleUIView.h\"\n#import <Cocoa/Cocoa.h>\n\n@implementation\
  \ NSView (CompatibleUIView)\n\n- (void)setAlpha:(CGFloat)point {\n    [self setAlphaValue:point];\n\
  }\n\n- (CGFloat)alpha {\n    return self.alphaValue;\n}\n\n- (void)setCenter:(CGPoint)point\
  \ {\n    CGSize size = self.frame.size;\n    CGRect newFrame = CGRectZero;\n   \
  \ newFrame.size = size;\n    CGFloat width = CGRectGetWidth(self.frame);\n    CGFloat\
  \ height = CGRectGetHeight(self.frame);\n    CGFloat x = floorf(point.x - (width\
  \ / 2.0f));\n    CGFloat y = floorf(point.y - (height / 2.0f));\n    newFrame.origin.x\
  \ = x;\n    newFrame.origin.y = y;\n    [self setFrame:newFrame];\n}\n\n- (CGPoint)center\
  \ {\n    return CGPointMake(CGRectGetMidX(self.frame),\n                       CGRectGetMidY(self.frame));\n\
  }\n\n+(void)fadeOut:(NSView*)viewToDissolve\n  withDuration:(NSTimeInterval)duration\n\
  {\n    [NSAnimationContext beginGrouping];\n    [[NSAnimationContext currentContext]\
  \ setDuration:duration];\n    [[viewToDissolve animator] setAlphaValue:0.0];\n \
  \   [NSAnimationContext endGrouping];\n}\n\n+(void)fadeIn:(NSView*)viewToFadeIn\n\
  withDuration:(NSTimeInterval)duration\n{\n    [NSAnimationContext beginGrouping];\n\
  \    [[NSAnimationContext currentContext] setDuration:duration];\n    [[viewToFadeIn\
  \ animator] setAlphaValue:1.0f];\n    [NSAnimationContext endGrouping];\n}\n\n+\
  \ (void)animateWithDuration:(NSTimeInterval)duration\n                 animations:(void\
  \ (^)(void))animations\n{\n    [NSAnimationContext beginGrouping];\n    [[NSAnimationContext\
  \ currentContext] setDuration:duration];\n    animations();\n    [NSAnimationContext\
  \ endGrouping];\n}\n\n+ (void)animateWithDuration:(NSTimeInterval)duration\n   \
  \              animations:(void (^)(void))animations\n                 completion:(void\
  \ (^)(BOOL finished))completion\n{\n    [NSAnimationContext beginGrouping];\n  \
  \  [[NSAnimationContext currentContext] setDuration:duration];\n    animations();\n\
  \    [NSAnimationContext endGrouping];\n    if(animations)\n    {\n        id completionBlock\
  \ = [completion copy];\n        [self performSelector:@selector(runEndBlock:)\n\
  \                   withObject:completionBlock\n                   afterDelay:duration];\n\
  \    }\n}\n\n+ (void)runEndBlock:(void (^)(void))completionBlock\n{\n    completionBlock();\n\
  }\n\n@end\n```\n\n以下代码展示了如何使用这些强大的功能：\n\n**淡入和淡出**\n\n```\n[NSView fadeIn:myView\
  \ withDuration:1.0];\n[NSView fadeOut:myView withDuration:1.0];\n```\n\n**像 UIView\
  \ 一样为 NSView 添加动画**\n\n```\n[NSView animateWithDuration:1.0 animations:^{\n    [myView\
  \ setAlphaValue:0.7f];\n}]\n\n// 或者\n[NSView animateWithDuration:1.0 animations:^{\n\
  \    [myView setAlpha:0.7f];\n} completion:^(BOOL finished) {\n    // 动画完成后执行某些操作\n\
  }];\n```\n\n## 检测 UIPickerView 何时停止滚动\n\n`UIPickerView` 并没有提供直接的方法来检测其滚轮何时停止滚动，但我们可以使用一个小技巧来实现检测。\n\
  \n首先，在你的代码中找到让滚轮开始滚动的那一行，然后添加如下所示的代码。\n\n\n\n#### Swift\n\n```swift\nUIView.beginAnimations(\"\
  animation\", context: nil)\nUIPickerView.setAnimationDelegate(self)\nUIView.setAnimationDidStopSelector(\
  \ Selector(\"animationDidStop:finished:context:\") )\n// 这一行让转轮动起来\npicker.selectRow(value,\
  \ inComponent: 0, animated: true)\nUIView.commitAnimations()\n```\n\n转轮停止转动时，将执行以下代码：\n\
  \n```swift\nfunc animationDidStop(animationID: String?, finished: NSNumber, context:\
  \ UnsafeMutablePointer<Void>) {\n  print( \"动画结束！\" )\n}\n```\n\n#### Objective-C\n\
  \n```objc\n[UIView beginAnimations:@\"animation\" context:nil];\n[UIPickerView setAnimationDelegate:self];\n\
  [UIPickerView setAnimationDidStopSelector:\n                         @selector(animationFinished:finished:context:)];\n\
  // 这一行让转轮动起来\n[self selectRow:value inComponent:0 animated:YES];\n[UIView commitAnimations];\n\
  ```\n\n转轮停止转动时，将执行以下代码：\n\n```objc\n- (void) animationFinished:(NSString *)animationID\n\
  \         finished:(BOOL)finished context:(void *)context {\n  NSLog(@\"动画结束\");\n\
  }\n```\n\n## “疯狂”的 NSDates\n\n接下来是创建 `NSDate` 的代码。\n\n#### Swift\n\n```swift\nlet\
  \ comps   = NSDateComponents()\ncomps.day   = 22\ncomps.month = 8\ncomps.year  =\
  \ 2020\nlet gregorian = NSCalendar(identifier:\n           NSCalendarIdentifierGregorian)\n\
  let date = gregorian?.dateFromComponents(comps)\nprint(\"日期是\", date)\n```\n\n####\
  \ Objective-C\n\n```objc\nNSDateComponents *comps = [[NSDateComponents alloc] init];\n\
  [comps setDay:22];\n[comps setMonth:8];\n[comps setYear:2020];\nNSCalendar *gregorian\
  \ = [[NSCalendar alloc]\n                  initWithCalendarIdentifier:\n       \
  \         NSCalendarIdentifierGregorian];\nNSDate *date = [gregorian dateFromComponents:comps];\n\
  NSLog(@\"日期是 %@\", date);\n```\n\n日期是 2020 年 8 月 22 日，对吧？然而，当你查看控制台时，却看到\n\n```\n\
  日期是 2020-08-21 23:00:00 +0000\n```\n\n什么？！2020 年 8 月 21 日？？？\n\n问题在于 `NSLog` 和 `print`\
  \ 都使用了 UTC（协调世界时）日期表示法，这种表示法考虑了时区。\n\n如果你需要创建一个不考虑时区的日期，或者更准确地说，一个将某个时区引用视为“默认”的日期，请在创建\
  \ Gregorian 变量之后，添加一行代码（以**粗体**显示）。\n\n代码将变为：\n\n#### Swift\n\n```swift\nlet comps\
  \   = NSDateComponents()\ncomps.day   = 22\ncomps.month = 8\ncomps.year  = 2020\n\
  let gregorian = NSCalendar(identifier:\n              NSCalendarIdentifierGregorian)\n\
  // 魔法行\ngregorian?.timeZone = NSTimeZone(forSecondsFromGMT: 0)\nlet date = gregorian?.dateFromComponents(comps)\n\
  print(\"日期是\", date)\n```\n\n#### Objective-C\n\n```objc\nNSDateComponents *comps\
  \ = [[NSDateComponents alloc] init];\n[comps setDay:22];\n[comps setMonth:8];\n\
  [comps setYear:2020];\nNSCalendar *gregorian = [[NSCalendar alloc]\n           \
  \       initWithCalendarIdentifier:\n       NSCalendarIdentifierGregorian];\n//\
  \ 魔法行\ngregorian.timeZone = [NSTimeZone timeZoneForSecondsFromGMT:0];\nNSDate *date\
  \ = [gregorian dateFromComponents:comps];\nNSLog(@\"日期是 %@\", date);\n```\n\n现在结果将是\n\
  \n```\n日期是 2020-08-22 00:00:00 +0000\n```\n\n## 本地化应用名称\n\n如果你希望 iOS 或 OS X 应用在不同销售国家拥有不同的名称，可以通过一种名为\
  \ `InfoPlist.strings` 的特殊文件来本地化名称。\n\n只需遵循以下步骤：\n\n1. 将 `InfoPlist.strings` 本地化为你需要的语言。\n\
  2. 选择 **文件 ➤ 新建 ➤ 文件 ➤ 选择 iOS 或 OS X ➤ 资源 ➤ 字符串文件**，创建一个名为 `InfoPlist.strings` 的文件，并将其分配到所需的目标中。\n\
  3. 在 `InfoPlist.strings` 中添加以下键值对：\n   `\"CFBundleDisplayName\" = \"AAA\";`\n  \
  \ `\"CFBundleName\" = \"BBB\";`\n   将 `AAA` 和 `BBB` 分别替换为特定语言下的应用名称和包名称。\n\n> **注意：**\
  \ 你可能已经注意到 `InfoPlist.strings` 包含了同样存在于 `Info.plist` 中的键 `CFBundleDisplayName` 和\
  \ `CFBundleName`。`InfoPlist.strings` 中的键将优先于 `Info.plist` 中对应的键。\n\n## 使用 Auto Layout\
  \ 水平居中视图\n\n警告！你现在正步入野兽的心脏地带，一个从未有人能全身而退的危险区域。从此刻起，你所有的战斗都将是史诗级的，对手是毫无怜悯之心的生物。\n\
  \n忘掉逻辑思维，欢迎来到 Auto Layout。\n\n### 示例\n\n你有三个简单的视图。所有视图具有相同的宽度和高度，并且间距相等（图 27）。你的目标是使用\
  \ Auto Layout，让这些视图在所有设备上都精确呈现如图 27 所示的效果。\n\n![A978-1-4842-1560-9_1_Fig27_HTML.jpg](img/A978-1-4842-1560-9_1_Fig27_HTML.jpg)\n\
  \n**图 27.** 三个对齐的视图\n\n### 哎呀……坏主意\n\n要让这些视图在不同设备上呈现图 27 的效果，第一个想法是让 Xcode 为你创建约束。为此，在\
  \ Xcode 的项目导航器中选择故事板文件，点击 **编辑器 ➤ 解析 Auto Layout 问题 ➤ 重置为建议的约束**。在不同设备上执行此操作的结果如图\
  \ 28 所示。\n\n![A978-1-4842-1560-9_1_Fig28_HTML.jpg](img/A978-1-4842-1560-9_1_Fig28_HTML.jpg)\n\
  \n**图 28.** Auto Layout 的结果\n\n### 什么？！\n\n然后你想：问题在于我们必须约束这些视图，使其具有“相同宽度”、“相同高度”和相同的“宽高比”。不，如果你这样做，结果和第一个一样错误。\n\
  \n接着你尝试另一种方法。你为这些视图的“宽度”和“高度”以及它们之间的间距定义了约束。没门，何塞！结果更糟。\n\n多次尝试之后，你放弃了。没有任何逻辑或直觉思考能拯救你。\n\
  \n你现在独自在丛林中，野兽正注视着你。\n\n\n\n### 逻辑已退出房间\n\n以下是用一种看似“取巧”的方法来解决这个问题，而这在 Auto Layout\
  \ 中似乎是公认的解决方式：\n\n1.  选中所有视图。点击 Interface Builder 面板底部的 `Pin` 按钮，选择 `Equal Widths`（等宽）、`Equal\
  \ Heights`（等高）和 `Aspect Ratio`（宽高比），然后点击 `Add 6 Constraints`（添加 6 个约束）。这将使所有三个视图具有相同的宽度、高度和宽高比（见图\
  \ 29）。\n\n![A978-1-4842-1560-9_1_Fig29_HTML.jpg](img/A978-1-4842-1560-9_1_Fig29_HTML.jpg)\n\
  \n**图 29.** 宽度、高度和宽高比\n\n2.  仅选中第一个视图，返回 `Pin` 菜单，选择 `Width`（宽度）和 `Height`（高度），然后点击\
  \ `Add 2 Constraints`（添加 2 个约束）（见图 30）。这将定义第一个视图的宽度和高度。由于上一步添加的约束，其他视图将具有相同的大小。\n\
  \n![A978-1-4842-1560-9_1_Fig30_HTML.jpg](img/A978-1-4842-1560-9_1_Fig30_HTML.jpg)\n\
  \n**图 30.** 第一个视图的宽度/高度\n\n3.  选中所有视图，点击 Interface Builder 面板底部的 `Alignment`（对齐）按钮，选择\
  \ `Horizontal Center in Container`（容器内水平居中）和 `Vertical Center in Container`（容器内垂直居中），然后点击\
  \ `Add 6 Constraints`（添加 6 个约束）（见图 31）。\n\n![A978-1-4842-1560-9_1_Fig31_HTML.jpg](img/A978-1-4842-1560-9_1_Fig31_HTML.jpg)\n\
  \n**图 31.** 水平和垂直居中\n\n> **注意：** 在第 4 步中，我们为所有视图添加了一个 `Horizontal Center in Container`\
  \ 约束。添加此约束后，我们是在告诉 Auto Layout 将三个视图都对齐到容器的水平中心，这不符合逻辑，因为这不是我们希望视图所处的位置。下一步将解决这个问题。\n\
  \n### 这样就能击败这个“怪兽”\n\n选择 `Editor`（编辑器）➤ `Resolve Auto Layout Issues`（解决自动布局问题）➤\
  \ `Update Constraints`（更新约束）。此步骤会为所有视图添加一个水平偏移量，从而解决上一步造成的问题。换句话说，每个视图将位于“水平中心加上一个偏移量”的位置。\n\
  \n图 32 显示了最终结果。\n\n![A978-1-4842-1560-9_1_Fig32_HTML.jpg](img/A978-1-4842-1560-9_1_Fig32_HTML.jpg)\n\
  \n**图 32.** Auto Layout 的最终结果\n\n所有视图大小相同，并且在不同的设备上具有相同的间距。\n\n---\n\n## 复制后 Storyboard\
  \ 中的元素变灰\n\n你在 Storyboard 或项目之间复制了一个视图控制器或其元素，复制完成后，你注意到其中一些元素变成了灰色（图 33）。这是为什么？\n\
  \n![A978-1-4842-1560-9_1_Fig33_HTML.jpg](img/A978-1-4842-1560-9_1_Fig33_HTML.jpg)\n\
  \n**图 33.** Storyboard 中变灰的元素\n\n出现此问题是因为你在具有不同 `Size Classes`（尺寸类别）的 Storyboard\
  \ 之间复制了元素。\n\n请参见图 34 中的 `Size Classes` 选择按钮。\n\n![A978-1-4842-1560-9_1_Fig34_HTML.jpg](img/A978-1-4842-1560-9_1_Fig34_HTML.jpg)\n\
  \n**图 34.** 尺寸类别选择\n\n如果你将一个元素从设置为 `Any/Any` 的 Storyboard 复制到另一个未按此设置的 Storyboard，则该元素会变灰。\n\
  \n两个 Storyboard 的 `Size Classes` 选择必须相同，否则复制后元素会变灰。\n\n要解决此问题，请遵循以下步骤：\n\n1.  备份一份你要从中复制元素的\
  \ Storyboard。\n2.  通过取消选中相应的复选框，禁用该 Storyboard 的 `Size Classes`（尺寸类别）（见图 35）。\n\n\
  ![A978-1-4842-1560-9_1_Fig35_HTML.jpg](img/A978-1-4842-1560-9_1_Fig35_HTML.jpg)\n\
  \n**图 35.** 使用尺寸类别选项\n\n3.  从已复制的 Storyboard 中将所需的界面元素复制到最终的 Storyboard 中。\n\n复制后，元素将不再变灰。\n\
  \n---\n\n## 调试 Core Data\n\n当你使用 Core Data 处理数据库密集型应用程序时，幕后会进行许多操作以保持运行流畅。\n\n当这些操作之一发生异常时，应用程序将崩溃，并且很可能很难发现问题。\n\
  \n在“Core Data 的并发处理”一节中，我们描述了可能影响 Core Data 应用程序的问题之一，但其他晦涩的问题也可能突然出现。\n\n### 在黑暗中独行\n\
  \n如果问题奇怪且难以捉摸，你可以通过选择 `Product`（产品）➤ `Scheme`（方案）➤ `Edit`（编辑）➤ `Scheme`（方案）➤ `Arguments`（参数），并在\
  \ `Arguments Passed on Launch`（启动时传递的参数）部分添加键值 `-com.apple.CoreData.SQLDebug 3`，来启用\
  \ Xcode 调试 Core Data 操作的能力（图 36）。\n\n![A978-1-4842-1560-9_1_Fig36_HTML.jpg](img/A978-1-4842-1560-9_1_Fig36_HTML.jpg)\n\
  \n**图 36.** 调试 Core Data\n\n> **注意：** 选项 `-com.apple.CoreData.SQLDebug` 接受 1 到 3\
  \ 之间的值。值越高，详细程度越高。\n\n一旦启用此键，Xcode 的日志会显示如图 37 所示的信息。\n\n![A978-1-4842-1560-9_1_Fig37_HTML.jpg](img/A978-1-4842-1560-9_1_Fig37_HTML.jpg)\n\
  \n**图 37.** Core Data 调试信息\n\n---\n\n## 包中不包含 Info.plist\n\n当你尝试验证或向 App Store 提交应用程序时，通常会出现此错误消息。\n\
  \n此消息表明 `Info.plist` 文件缺失。实际上，这条消息具有误导性，因为如果你的 `Info.plist` 文件中缺少某些键，也可能显示此错误消息。\n\
  \n如果 `Info.plist` 文件中缺少以下键，则会触发该错误：`CFBundleVersion`、`CFBundleShortVersionString`\
  \ 和 `CFBundlePackageType`。\n\n- `CFBundleVersion`：此键指定包的构建版本号。\n- `CFBundleShortVersionString`：此键存储包的发布版本号字符串。\n\
  - `CFBundlePackageType`：此键通常包含一个四字母代码，用于标识包的类型。可能的值包括：\n    - `APPL` – 该包是一个应用程序；\n\
  \    - `FMWK` – 该包是一个框架；\n    - `BNDL` – 该包是一个可加载的包。\n\n> **注意：** iOS 和 OS X 应用程序都使用所有这些键。\n\
  \n欲了解更多信息，请访问 [`http://www.addfone.com/TXCFKeys`](http://www.addfone.com/TXCFKeys)\n\
  \n要检查你的 `Info.plist` 文件是否缺少任何这些键，请打开你的目标（Target）信息面板，右键单击任意键，然后选择 `Show Raw Keys/Value`（显示原始键/值）（图\
  \ 38）。\n\n![A978-1-4842-1560-9_1_Fig38_HTML.jpg](img/A978-1-4842-1560-9_1_Fig38_HTML.jpg)\n\
  \n**图 38.** `Info.plist` 键（友好名称）\n\n选择此选项后，键将不会像图 38 那样以友好的名称显示。相反，它们将使用不友好的 Core\
  \ Foundation (CF) 名称显示（图 39），这正是你所需要的。\n\n![A978-1-4842-1560-9_1_Fig39_HTML.jpg](img/A978-1-4842-1560-9_1_Fig39_HTML.jpg)\n\
