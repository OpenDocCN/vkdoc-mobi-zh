  \ [`www.iso.org`](http://www.iso.org/)。\n\n本附录中的表格是 ISO 代码的汇编，既包含像“en”代表“英语”这样的通用条目，也包含像“en_AU”代表“澳大利亚英语”或“en_JM”代表“牙买加英语”这样的特定条目。英语本身就有近\
  \ 30 种变体。如果你使用特定的变体，只有设备设置为使用该变体时，该本地化内容才会可见。而使用通用的“en”，则可以保证所有设置为英语变体的设备都能看到该本地化内容。当你在\
