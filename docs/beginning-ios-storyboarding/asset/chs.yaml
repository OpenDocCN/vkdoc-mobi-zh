  \n3. 现在，将一个`Table View cell`拖入新的`Table View`，如图 7-10 所示。\n\n![images](img/9781430242727_Fig07-11.jpg)\n\
  \n**图 7-11.** *将表格视图单元格样式更改为基本样式。*\n\n4. 对于这个`Table View`，你将使用`Dynamic Prototypes`。实际上，你的`Table\
  \ View`将显示三种不同类型的单元格。第一种是基本样式，仅显示一个标签，内容为数据库中每个分类的名称。这种单元格在`Table View`中的数量将与数据库中的分类数量相同。第二种单元格将显示“全部图书”标签，当用户点击该单元格时，会显示数据库中所有图书，无论分类如何。这个单元格将始终显示在分类列表的末尾。第三种单元格是“新增”单元格，让用户能够向数据库添加新的分类。这个单元格也会始终显示，并且总是`Table\
  \ View`的最后一个单元格。修改你的`Table View Prototype`内容以实现此目的。首先，点击你已添加的单元格，并将其样式更改为`Basic`，如图\
