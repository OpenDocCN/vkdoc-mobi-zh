  \n![images](img/9781430242727_Fig07-16.jpg)\n\n**图 7-16.** *更改文本颜色。*\n\n9. 更改“新增”文本的颜色，以便用户可以轻松看出“新增”与其他选项不同。单击文本“新增”一次，将其颜色改为蓝色，如图\
