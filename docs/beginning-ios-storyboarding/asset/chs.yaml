  - 安装并运行 `DemoMonkey`\n\n我们来逐一详细说明这些内容。\n\n### 获取 Mac\n\n如果你的 Mac 是 2006 年之后制造的，那就没问题。作者之一特意用一台\
  \ 2008 年购买的 MacBook 编写所有程序。网上的所有视频都是从刘易斯博士 2006 年的 MacBook 上录制的；如果他从 2010 年的 iMac\
  \ 播送，也会先在他 2006 年购买的 MacBook 上运行。\n\n- 你不需要最新款的 Mac。如果你还没买，我们建议你买一台基础配置、无多余功能的 MacBook\
  \ Air。\n- 如果你确实有一台较旧的 Mac，也许可以增加一些内存。在 Apple Store 的 Genius Bar 预约一次免费咨询，询问他们是否能为你旧型号的\
