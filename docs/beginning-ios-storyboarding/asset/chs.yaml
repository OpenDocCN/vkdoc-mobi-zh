  \n**图 7-72.** *选择新的跳转*\n\n23.  嗯……一个漂亮的跳转被创建了。让我们稍微调整一下它。选中它，如图 7-72 所示。\n\n![images](img/9781430242727_Fig07-73.jpg)\n\
  \n**图 7-73.** *更改跳转类型*\n\n24.  选中新跳转后，使用属性检查器将其“Transition”类型更改为“Flip Transition”，如图\
  \ 7-73 所示——因为如前所述，尝试不同的跳转类型有助于熟悉它们。同时将跳转的“Identifier”属性设置为*AddNewBook*。\n\n![images](img/9781430242727_Fig07-74.jpg)\n\
  \n**图 7-74.** *最后一步：创建一个新的表视图控制器*\n\n25.  您最后需要做的是允许用户选择一个可用的类别或作者。为此，创建一个非常基本的表视图控制器。但有趣的是：我们不会创建两个表视图控制器（一个用于作者，一个用于类别），而是向你展示\
  \ Storyboard 如何让你使用同一个表视图来满足这两种需求！拖出另一个表视图控制器，并将其放置在“Add Book Scene”的右侧，如图 7-74\
  \ 所示。\n\n![images](img/9781430242727_Fig07-75.jpg)\n\n**图 7-75.** *修改表视图，然后从“Select\
  \ category”单元格连接一个跳转*\n\n26.  如前所述，这个新的表视图将非常基础——没有装饰。选择自动添加到表视图中的原型单元格，在属性检查器中将它的“Style”设置为“Basic”，并在“Identifier”属性中输入*Cell*。这个单元格最终将显示类别名称或\
  \ Apress 作者姓名。现在退一步思考一下用户将如何进入这个场景。你的用户必须选择“Select category”单元格或“Select author”单元格。这意味着你需要两个跳转，每个单元格各一个。首先选择“Select\
  \ category”单元格，并按住 Control 键拖动到表视图控制器上，如图 7-75 所示。释放跳转连接器时，从 Storyboard Segues 菜单中选择“Push”选项。在属性检查器中将该跳转的“Identifier”设置为*SelectCategory*，就像你在本章中多次操作的那样。\n\
