- "# 第四章\n\n## 构建一个工具型应用\n\n到目前为止，在本书中，你已经使用 Storyboard 构建了两个单视图应用。在第二章中你构建了 AlienView，在第三章中你构建了\
  \ FlickrPhotoMap。现在我们继续前进，你将要使用 Storyboard 构建一个工具型应用。当你想要创建易于使用、由两个页面组成的应用时——一个是主视图页面，另一个是带有翻转动画过渡效果的视图页面——通常会用到工具型应用。工具型应用会为这两个页面设置两个关键按钮：一个信息按钮和一个完成按钮。信息按钮会将用户从主视图翻转到翻转视图，而完成按钮则会将用户翻转回主视图。\n\
  \n你可能没有意识到，但你很可能非常熟悉 iPhone 自带的一个工具型应用，那就是天气应用，如图 4-1 所示。天气应用是工具型应用的完美范例，因为它优化了一个只需最少用户交互的简单任务。\n\
  \n工具型应用也是三个特殊模板之一，它与基于导航的应用和基于窗口的应用一样，是唯一三个提供自动包含 Core Data 支持选项的项目模板。此外，工具型应用是\
  \ Xcode 中最全面的模板之一——它从一开始就实现了一个功能完整的工具型应用。\n\n我们将通过编码一个非常酷的应用来介绍使用 Storyboard 的工具型应用，这个应用教会音乐人何时为特定的流派或情绪选择特定的音阶。它在原声吉他和电吉他的指板上显示指法标记，并为每个音阶附带相应的声音。\n\
  \n![images](img/9781430242727_Fig04-01.jpg)\n\n**图 4-1.** *iPhone 自带的天气应用可能是最著名且最常用的工具型应用。*\n\
  \n### utilityScales：一个工具型应用\n\n首先，我们来谈谈我们的 utilityScales 设计决策：我们选择通过创建一个让你能听到原声吉他和电吉他上各种音阶的应用，来演示工具型应用模板的使用。我们选择了八种音乐音阶来展示这个概念。\n\
  \n我们需要显示一个音阶列表，以及每个音阶所关联的流派和情绪。考虑到这一点，我们决定使用翻转视图控制器中已有的表视图来列出音阶。我们还为表格单元格选择了副标题布局，以便同时显示每个音阶的类别及其名称。我们选择\
  \ iPad 布局，因为它为音阶指法图片提供了更多空间。我们为程序创建了资源，包括两种吉他的各 8 种音阶、16 个相关的音阶指法图、每个吉他用于播放按钮的小图片、一个加载（或默认）屏幕、一个应用图标等等。这意味着总共需要\
  \ 16 个音频文件和 23 个图形文件。\n\n我们决定让用户界面有些非标准，因为希望为每种吉他类型都设置播放/停止按钮。它们需要具有相同的功能，因此我们将功能封装在一个专用的\
  \ `PlayButton` 类中。为了整合音频播放功能——包括加载文件、启动和停止播放等所需的特殊配置和方法——我们选择将这些功能封装在它自己的类中（一个拥有自己\
  \ `.h`/`.m` 文件的对象）。\n\n最后，我们有八种音阶，每种都有两个音频文件、两张图片、一个标题和一个描述——所有这些我们都选择存储在名为 `Scale`\
  \ 的新类（也是一个拥有自己 `.h`/`.m` 文件的对象）的实例中。这让我们可以编写八个初始化语句，而不是必须用所有这些属性来初始化许多不同的数组。\n\n\
  在 Storyboard 文件中，我们设置了主显示的初始背景、具有自定义颜色的导航栏，以及一个半透明的“面板”，我们在上面通过编程方式放置了两个播放按钮。在 Storyboard\
  \ 的翻转部分，我们配置并命名了单个动态单元格模板，并配置了标题栏的颜色和文本。\n\n我们将此项目分为不同阶段：一个用于在 Xcode 中设置项目，一个用于设置\
  \ Storyboard，两个用于编码。具体如下：\n\n*   **设置**：使用模板进行设置、调整项目设置、拖入资源并添加框架。\n*   **准备 Storyboard**：在主页视图和第二个视图中，你将调整导航栏、颜色和按钮等，并添加\
  \ `UIImagesViews`、`UITableViews` 和着陆视图。\n*   **编码主视图控制器**：编码和连接。\n\n### 预备知识\n\n\
  与第二章和第三章类似，我们在 [`http://bit.ly/sMRvAP`](http://bit.ly/sMRvAP) 提供了本章所需的所有文件和代码，如图\
  \ 4-2 所示。和往常一样，请花时间清理你的桌面，并将所有图片和音频文件下载到桌面上，然后你就可以开始了。如果需要更多帮助，请访问 [`http://bit.ly/oLVwpY`](http://bit.ly/oLVwpY)\
  \ 上的论坛。特别要确保在开始之前，你已经从 [`http://bit.ly/sMRvAP`](http://bit.ly/sMRvAP) 下载了 DemoMonkey\
  \ 文件，并将其解压到桌面上。\n\n![images](img/9781430242727_Fig04-02.jpg)\n\n**图 4-2.** *选择工具型应用。*\n\
  \n\n\n### 步骤 1：项目设置\n\n项目设置是本项目四个步骤中的第一步。你需要创建一个新的 iPad 实用工具应用项目，将其命名为 `utilityScales`，并通过取消选中竖屏和上下颠倒选项来调整项目设置。接着，你需要将图片、类和音频资源拖入项目中。最后，你需要添加必要的框架。完成这些操作后，你的项目设置就完成了，可以准备在第二步中编辑故事板。\n\
  \n1.  打开 Xcode，按下 `![images](img/U003.jpg)![images](img/U004.jpg)N`（`文件 ![images](img/U001.jpg)新建\
  \ ![images](img/U001.jpg)项目`），选中“实用工具应用”模板，然后点击“下一步”。\n2.  将应用命名为 `utilityScales`。我们使用的公司标识符是\
  \ `com.apress`。你可以随意命名，但如果你觉得可能需要随时与我们的代码进行对比，那么也请像我们一样将其命名为 `com.apress`，这样可以减少混淆的可能性。我们不会使用类前缀。确保选中“iPad”，并勾选“使用故事板”和“使用\
  \ ARC”，如图 4-3 所示。创建完成后，将其保存到你的桌面上。\n\n![images](img/9781430242727_Fig04-03.jpg)\n\
  \n**图 4-3.** *将新项目命名为 `utilityScales`。*\n\n3.  将其保存到桌面后，`Project` 文件夹就会打开。你只会使用横屏方向，因为这更有利于显示吉他的琴颈。这意味着你需要取消选中默认的竖屏和上下颠倒方向。接下来，打开你从\
  \ [`http://bit.ly/sMRvAP`](http://bit.ly/sMRvAP) 下载并解压到桌面上的 `utilityScales Assets`\
  \ 文件夹。首先选中 `Default-Landscape~ipad.png` 文件，并将其拖入“横屏”插槽中，如图 4-4 所示。\n\n![images](img/9781430242727_Fig04-04.jpg)\n\
  \n**图 4-4.** *取消选中竖屏和上下颠倒选项，并拖入 `Default-Landscape~ipad.png`。*\n\n4.  在这一步中，你需要执行两个任务。首先，将\
  \ `Default-Landscape~ipad.png` 从 `utilityScales` 目标 iOS SDK 5.0 的根目录（右上角的蓝色文件夹）移动到\
  \ `Supporting Files` 文件夹中。然后，将 `Images` 和 `Audio Files` 文件夹添加到 `Supporting Files`\
  \ 文件夹中。为此，从桌面上的 `UtilityScales Assets` 文件夹中同时选中 `Audio Files` 文件夹和 `Images` 文件夹，然后将它们拖放到\
  \ `Supporting Files` 文件夹中，如图 4-5 所示。\n\n![images](img/9781430242727_Fig04-05.jpg)\n\
  \n**图 4-5.** *将所有图片放入 `Supporting Files` 文件夹。*\n\n5.  会弹出“选择添加这些文件的选项”对话框。确保你选中了“将项目复制到目标组的文件夹中（如果需要）”选项。同时选中“为添加的文件夹创建组”选项。最后，确保你添加了目标，如图\
  \ 4-6 所示。这样做的目的是确保应用能在其他设备上运行。只有将这些图片、添加的文件夹和目标都内嵌并封装到你的应用中时，才能执行此操作。有时，学生在提交作业时没有选中这些选项，这会导致在提交评分时，应用丢失所有图片、文件夹、音频文件以及目标——当然，由于缺少这些内容，他们的项目也无法构建。\n\
  \n![images](img/9781430242727_Fig04-06.jpg)\n\n**图 4-6.** *确保你选中了“复制项目”和“创建组”到 `utilityScales`\
  \ 目标。*\n\n6.  确保你的 `Supporting Files` 文件夹看起来与图 4-7 中所示一致。由于我们选中了“组”选项，`Audio Files`\
  \ 和 `Images` 文件夹被完美地实例化在 `Supporting Files` 文件夹中。这是良好的编码习惯，并且能向查看你代码的人表明你具有良好的实践。\n\
  \n![images](img/9781430242727_Fig04-07.jpg)\n\n**图 4-7.** *一个美观的文件结构。*\n\n7.  为了方便你操作，我们创建了三个类文件（因为我们希望你将重点放在故事板编辑上，而不是创建文件上）：一个\
  \ `AudioPlayer` 类（`AudioPlayer.h` 和 `AudioPlayer.m`）、一个 `PlayButton` 类（`PlayButton.h`\
  \ 和 `PlayButton.m`）和一个 `Scale` 类（`Scale.h` 和 `Scale.m`）。你也需要将这些代码添加到你的应用中。从 `utilityScales\
  \ Assets` 文件夹中获取这六个文件，并将其拖到你的 `utilityScales` 文件夹中，如图 4-8 左上角图片所示。当“选择选项”对话框出现时，选中“将项目复制到目标”并勾选“创建组”复选框。完成此操作后，点击“下一步”，如图\
  \ 4-8 右上角图片所示。最后，进入“构建阶段”，点击添加按钮，并选中三个实现文件，如图 4-8 下方中央图片所示。\n\n![images](img/9781430242727_Fig04-08.jpg)\n\
  \n**图 4-8.** *导入我们为你创建的类文件。*\n\n8.  确保你的 `utilityScales` 文件夹看起来与图 4-9 中所示一致。如果出于某种原因，它没有包含相同的文件和文件夹，请返回并重做之前的步骤，确保你的\
  \ `utilityScales` 文件夹最终状态与我们的一致。\n\n![images](img/9781430242727_Fig04-09.jpg)\n\n\
  **图 4-9.** *你的 `utilityScales` 文件夹已准备就绪。*\n\n9.  正如你已经知道的，你将在此应用中播放音频文件。现在，如果你尝试构建此应用（如果你愿意，可以试试，你会看到很多错误），你会遇到问题，因为你没有任何播放音频文件的手段——即使你已经定义了类并导入了音频文件。你需要添加音频框架。点击编辑器顶部的“摘要”按钮，在摘要页面的底部附近找到“链接的框架和库”部分（你可能需要滚动页面才能看到）。在此部分的底部，点击\
  \ `[+]` 按钮。现在，选择 `AudioToolbox.framework`，如图 4-10 所示。\n\n![images](img/9781430242727_Fig04-10.jpg)\n\
  \n**图 4-10.** *添加两个必要框架中的第一个。选择 `AudioToolbox.framework`。*\n\n10. 在离开框架和库添加对话框之前，你需要添加另一个框架。你刚刚添加了音频框架，但看起来你还需要一个\
  \ Objective-C 接口，以便从我们的代码中与刚刚包含的这个底层框架进行交互。因此，还要添加 `AVFoundation` 框架，你会从代码中调用它来播放音频文件。它进而调用更低层的\
  \ `AudioToolbox` 框架来执行实际的播放操作。因此，除了 `AudioToolbox.framework` 之外，还要选择 `AVFoundation.framework`（通过按住\
  \ Command 键点击 `AVFoundation.framework`，使两者都被选中），如图 4-11 所示。最后，点击“添加”按钮，将这两个框架都添加到项目的\
  \ `utilityScales` 目标中。\n\n![images](img/9781430242727_Fig04-11.jpg)\n\n**图 4-11.**\
  \ *同时添加 `AVFoundation.framework`。*\n\n11. 添加完这两个框架后，你会看到它们位于 `utilityScales` 文件夹的根目录中。将它们拖入你的\
  \ `Frameworks` 文件夹。现在，你应该拥有实用工具应用的三个核心框架，以及新增的 `AVFoundation` 和 `AudioToolbox` 框架，如图\
  \ 4-12 所示。\n\n![images](img/9781430242727_Fig04-12.jpg)\n\n**图 4-12.** *将新框架移至 `Frameworks`\
  \ 文件夹。*\n\n\n\n#### 步骤 2：准备故事板\n\n首先，通过给导航栏着色并将“信息”按钮改为“音阶”来准备主视图。接下来，你将添加一个不包含任何用户交互的\
  \ `UIImageView` 图像。然后，你将添加一个播放按钮的放置区域，同样也不会有任何用户交互。完成这些后，你将把这个放置区域标记为“视图 - 播放按钮区域”。至此，第一个视图就完成了。\n\
  \n第二个视图也需要准备——首先，为导航栏着色并添加标题。接下来，你将添加一个 `UITableView`，它使用动态单元格并采用分组样式。你还需要将它的数据源和代理设置为你的\
  \ `ViewController`。\n\n1.  如前所述，实用工具应用包含两个视图：主视图和翻转视图。用户通过点击主视图导航栏右侧的信息按钮进入翻转视图。让我们看看这个，并开始设置故事板。打开故事板，你确实会看到主视图和翻转视图，如图\
  \ 4-13 所示。你可以看到 segue 已经构建好了，一切就绪。请注意，在 iPad 上，翻转视图显示为弹出视图。\n\n   ![images](img/9781430242727_Fig04-13.jpg)\n\
  \n   **图 4-13.** *打开故事板文件，查看主视图和翻转视图。*\n\n2.  点击选中标题栏（导航控制器），然后使用属性检查器找到色调选择器。选择青色，如图\
  \ 4-14 所示。\n\n   ![images](img/9781430242727_Fig04-14.jpg)\n\n   **图 4-14.** *首先为标题栏着色。*\n\
  \n3.  现在你想要自定义信息按钮。首先点击信息按钮（点击两次，确保选中按钮本身，而非栏目标题），然后在属性检查器的“栏项目”部分找到“标题”框，将名称改为“音阶”。你希望它和导航栏颜色相同，所以继续将颜色改为青色，如图\
  \ 4-15 所示。请注意，你可能编程过其他应用，重置了“样式”和“标识符”的默认值；如果是这种情况，请确保你的选择和我们的图 4-15 一致。\n\n   ![images](img/9781430242727_Fig04-15.jpg)\n\
  \n   **图 4-15.** *自定义信息按钮。*\n\n4.  主屏幕将放置一张带有指法的吉他指板图像。这意味着你需要将一个“图像视图”拖到画布上，并让它自动调整大小，如图\
  \ 4-16 所示。根据你的显示器分辨率，你可能需要先缩小视图才能正确操作。\n\n   ![images](img/9781430242727_Fig04-16.jpg)\n\
  \n   **图 4-16.** *拖入一个图像视图。*\n\n5.  你需要在画布上找一个地方放置播放按钮。（你可以先偷瞄一眼，在图 4-59 和 4-60\
  \ 中看看播放按钮的样子。）为此，在现有“图像视图”的左上角附近拖入另一个视图，如图 4-17 所示。请注意，该视图在库的底部以浅灰色高亮显示。\n\n   ![images](img/9781430242727_Fig04-17.jpg)\n\
  \n   **图 4-17.** *为播放按钮创建一个空间。*\n\n6.  选中这个新的小视图后，在属性检查器中将颜色改为青色。接下来，转到身份检查器，将其标签设置为“视图\
  \ - 播放按钮区域”（这允许你在文档大纲中清晰识别这个新的小视图）。最后，保持新的小视图仍被选中（现在已是青色），转到尺寸检查器，将视图放置为距左 20 像素、距顶\
  \ 64 像素。然后，将视图的宽度设为 190 像素，高度设为 110 像素，如图 4-18 所示。\n\n   ![images](img/9781430242727_Fig04-18.jpg)\n\
  \n   **图 4-18.** *自定义“播放按钮区域”视图。*\n\n7.  要显示你放入 `Supporting Files` 文件夹中的默认图像，请在“主视图控制器场景”中点击\
  \ `UIImageView`，然后在属性检查器中，从下拉菜单中选择 `Default-Landscape-ipad.png`，如图 4-19 所示。\n\n\
  \   ![images](img/9781430242727_Fig04-19.jpg)\n\n   **图 4-19.** *将默认图像设置为主视图中的初始图像。*\n\
  \n8.  现在转到“翻转视图控制器场景”，选择导航栏标题（在翻转视图控制器场景的文档大纲中，点击“导航项 - 标题”这一行）。然后在属性检查器中将标题重命名为“音阶”，如图\
  \ 4-20 所示。\n\n   ![images](img/9781430242727_Fig04-20.jpg)\n\n   **图 4-20.** *自定义翻转视图控制器。*\n\
  \n9.  你可能希望主视图的导航栏和翻转视图的导航栏颜色相同，所以点击翻转视图的导航栏（在文档大纲中），然后在属性检查器的色调选择器中再次选择青色。现在你想将“完成”按钮改为青色，所以点击它并在属性检查器中选择青色。最后，考虑一下你希望翻转视图这里是什么样。你希望这是一个音阶列表，供用户选择（参考图\
  \ 4-58）。这意味着你需要拖入一个表格视图。拖入表格视图并让它自动调整大小后，你的翻转视图应该看起来像我们图 4-21 中的样子。\n\n   ![images](img/9781430242727_Fig04-21.jpg)\n\
  \n   **图 4-21.** *将导航栏和“完成”按钮设为青色，然后更改标题并引入一个表格视图。*\n\n10. 当你的表格视图在翻转视图中大小调整好后，保持它被选中，转到属性检查器，在“内容”下拉菜单的“内容结构”类型中选择“动态原型”。你这样做是因为你不仅想要表格中的标题，还想要副标题。动态原型让你可以调整单元格样式，而无需提供单元格内容。将原型单元格的数量设置为\
  \ 1（从 0 开始）。你还希望为你的表格选择分组样式，这样你就可以为表格中的音阶条目组设置一个头部（参考图 4-58），所以在“样式”下拉菜单中，选择“分组”。此时，你的表格视图应该看起来像我们的图\
  \ 4-22 中的样子。\n\n    ![images](img/9781430242727_Fig04-22.jpg)\n\n    **图 4-22.**\
  \ *自定义表格视图。*\n\n11. 你会希望每个单元格都有副标题。为此，点击单元格本身将其选中，然后在属性检查器的“样式”下拉菜单中选择“副标题”。同时在“选择”下拉菜单中，将默认的蓝色改为灰色。最后，你需要通过代码构建这些单元格，因此你需要给它们命名，以便你可以在故事板文件中定位它们，并在需要时将其加载到你的代码中。为此，在属性检查器中将标识符命名为\
  \ `ScaleCell`，如图 4-23 所示。\n\n    ![images](img/9781430242727_Fig04-23.jpg)\n\n \
  \   **图 4-23.** *自定义单元格。*\n\n\n\n#### 第三步：编写翻转视图控制器\n\n为了保持极简风格，首先设置头文件和实现文件，然后添加\
  \ `ImageView` 和 `NavTitle` 的 `IBOutlet`。\n\n1.  首先编写向用户显示音阶的代码——如你所见，这些音阶显示在翻转视图中。为此，请前往你的桌面，打开\
  \ `demoMonkey` 文件，并将其放置在屏幕的右侧。你可能希望调整 Xcode 窗口的大小，以便能在屏幕右侧看到打开的 `demoMonkey` 文件（Xcode\
  \ 在左侧）。现在，在 Xcode 中，单击项目导航窗格（位于 Xcode 窗口左侧）中的文件，打开 `FlipsideViewController` 的实现文件（`.m`），如图\
  \ 4-24 所示。\n\n    ![images](img/9781430242727_Fig04-24.jpg)\n\n    **图 4-24.** *打开\
  \ FlipsideViewController 实现文件。*\n\n2.  你将希望使用代码和 Storyboard 双屏进行编码。为此，请单击助理编辑器，如图\
  \ 4-25 所示。这会将你主要关注的文件放置在 Xcode 窗口编辑器区域的左侧，将相关文件放置在右侧。（例如，当选中一个实现文件时，左侧显示该实现文件，右侧显示与该实现文件关联的头文件。）\n\
  \n    ![images](img/9781430242727_Fig04-25.jpg)\n\n    **图 4-25.** *单击助理编辑器。*\n\n\
  3.  如前所述，你正在构建你的翻转视图控制器。为此，从 DemoMonkey 拖入“01 FlipView.h – add include”代码片段，该片段包含\
  \ `#import \"Scale.h\"` 的包含语句，因为这会引入我们为你构建的 `Scale` 类的头文件。接下来，拖入“02 FlipView.h –\
  \ add protocol message signature”文件，该文件在你已有的协议基础上添加了更多内容以及注释。然后引入“03 FlipView.h\
  \ – add protocol adheres to”，它表明翻转视图遵循表视图的数据源和委托协议。最后，拖入“04 FlipView.h – add scaleType\
  \ property”，该属性记录/指示用户从表视图中选择了哪个音阶。现在，按如下代码所示进行拖拽，然后查看 图 4-26，确保你最终得到的文件内容与图中的代码一致。\n\
  \n    ![images](img/9781430242727_UFig04-01.jpg)\n\n    ![images](img/9781430242727_Fig04-26.jpg)\n\
  \n    **图 4-26.** *将前四个 DemoMonkey 代码片段拖入 FlipsideViewController.h 文件中。*\n\n4. \
  \ 现在，回到你的 Storyboard 文件并连接表视图。因此，在保持双屏助理模式的同时，打开 Storyboard，如图 4-27 所示。\n\n    ![images](img/9781430242727_Fig04-27.jpg)\n\
  \n    **图 4-27.** *重新打开 Storyboard。*\n\n5.  你需要添加一个 `IBOutlet` 来连接 `TableView` 和\
  \ `FlipsideViewController`。如图 4-28 左侧所示，首先在文档大纲中找到翻转视图控制器场景。接着打开 `FlipsideViewController`，然后打开视图，最后当找到表视图时，单击选中它，然后按住\
  \ Control 键从中拖拽到 `FlipsideViewController.h` 文件中第二个 `@property` 的正下方，如图 4.28 所示。拖到目标位置后，松开鼠标。\n\
  \n    ![images](img/9781430242727_Fig04-28.jpg)\n\n    **图 4-28.** *将表视图连接到 FlipsideViewController。*\n\
  \n6.  我们将其命名为表视图 (`tv`) 音阶表 (`tvScaleTable`)。命名后，单击“连接”按钮，如图 4-29 所示。通过使用 Control-拖拽技术，正如你所知，Xcode\
  \ 现已为你创建了属性声明，以及属性合成和在对象释放时清除属性的代码，后两项是它在类实现文件中进行的修改。\n\n    ![images](img/9781430242727_Fig04-29.jpg)\n\
  \n    **图 4-29.** *为 IBOutlet 命名为 tvScaleTable。*\n\n7.  养成一个好习惯：当你使用 Control-拖拽到代码中时，务必检查连接是否正确建立。寻找连接标记即可轻松验证。查看\
  \ 图 4-30，你会看到两个圆点，一个表示 `@property` 已与 Storyboard 对象建立连接，另一个表示 `IBAction` 已建立连接。现在，如果将鼠标指针移到新\
  \ `@property` 旁边的圆点上，你会看到 Storyboard 视图中的表视图高亮显示，表明连接已建立。很棒，对吧？现在，将鼠标悬停在 `IBAction`\
  \ 的圆点上，看看哪个对象连接到了该操作！（提示：应该是“完成”按钮。）至此，你已完成了向 `FlipsideViewController.h`（头文件）添加代码的工作。接下来，转到它的实现文件。\n\
  \n    ![images](img/9781430242727_Fig04-30.jpg)\n\n    **图 4-30.** *确保 IBOutlet\
  \ 已连接。*\n\n8.  打开的实现文件应如图 4-31 所示。\n\n    ![images](img/9781430242727_Fig04-31.jpg)\n\
  \n    **图 4-31.** *打开 FlipsideViewController 实现文件。*\n\n9.  `FlipsideViewController`\
  \ 有一个方法和一个实例变量，它们不需要公开引用（即，从类本身外部访问）。因此，我们选择在实现文件的顶部将它们声明为私有。我们有一个可变数组来存储音阶，并且将设置一个属性来记录用户选择的音阶。从\
  \ DemoMonkey 中将“05 FlipView.m – add private interface”代码片段拖入你的实现文件中，紧跟在 `@interface\
  \ FlipsideViewController ()` 代码行的右侧。你最后得到的代码应如图 4-32 所示。\n\n    ![images](img/9781430242727_Fig04-32.jpg)\n\
  \n    **图 4-32.** *创建私有接口。*\n\n    **注意：** 私有实例变量、方法和属性通常通过将它们放置在实现文件顶部的未命名类别中来声明。你会注意到，Xcode\
  \ 生成的最新模板已在你生成的实现文件顶部为你声明了此私有接口。这旨在提醒你在向这些生成的文件添加代码时，应将此类项放置在哪里。\n\n    现在，你需要合成你所创建的\
  \ scaleType，因此从 DemoMonkey 中拖入“06 FlipView.m – add scaleType synthesis”，并将其放置在 `@synthesize\
  \ tvScaleTable = _tvScaleTable;` 行下方，如下列代码所示：\n\n    ```\n    @implementation FlipsideViewController\n\
  \    \n    @synthesize delegate = _delegate;\n    @synthesize tvScaleTable = _tvScaleTable;\n\
  \    @synthesize selectedScaleType;  \n    ```\n\n    ![images](img/U002.jpg) **06FlipView.m\
  \ – add scaleType synthesis**\n\n10. 现在你已经合成了 scaleType 属性的 setter/getter 方法，需要在应用首次加载时将音阶数据加载到内存中。从\
  \ DemoMonkey 中拖入“07 FlipView.m – add viewDidload code”，并将其放置在 `viewDidLoad` 方法内部的\
  \ `[super viewDidLoad];` 正下方。这里可以看到，我们创建了八个 `Scale` 对象并将其添加到数组中，如图 4-33 所示。\n\n\
  \    ![images](img/9781430242727_Fig04-33.jpg)\n\n    **图 4-33.** *添加到数组中的八个音阶对象。*\n\
  \n11. 当视图首次出现时，你有责任显示上次查看过的音阶。或者，如果尚未选择任何音阶——例如在应用首次使用时——则显示第一个音阶。为此，从 DemoMonkey\
  \ 中拖入“08 FlipView.m – add viewWillAppear code”中的代码，并将其直接放置在 `viewDidLoad` 方法的结束大括号之后，如图\
  \ 4-34 所示。\n\n    ![images](img/9781430242727_Fig04-34.jpg)\n\n    **图 4-34.** *添加\
  \ viewWillAppear 方法。*\n\n12. 在此步骤中，你将拖入来自 DemoMonkey 的四个代码片段。首先，在 `-(BOOL)shouldAutorotateToInterfaceOrientation`\
  \ 行之前，通过拖入“09 FlipView.m – add SelectedScaleforType method”来设置一个用于按类型设置音阶的方法。接下来，替换\
  \ `- (BOOL)shouldAutorotateToInterfaceOrientation:` 方法内部的代码，该方法通常会决定视图的旋转方向。在此情况下，你只需使用横屏模式（以显示吉他琴颈）。选中\
