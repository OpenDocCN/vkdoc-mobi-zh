  \ *你可以通过按下播放按钮来更改吉他类型。*\n\n\n\n## 为基于页面的应用编排故事板\n\n我们的第四个故事板应用，可以说是一个相当离奇的尝试。你将构建一个基于页面的应用程序，它包含一个动态的电子手册，而这份手册实际上由\
  \ 4 个微型手册组成。有趣的是，你的“客户”是一家能够穿越过去和未来的时间旅行机构！我们将这个应用命名为`futureTravel`。当你使用它来提升你的故事板技巧时，你将学到许多酷炫的工具和方法。\n\
  \n请注意，应用 1 到 3 侧重于标准的故事板技能和代码。应用 4 到 7 将专注于更高级的故事板功能和方法，这些功能和方法建立在前几节讨论的理论代码基础之上。\n\
  \n`FutureTravel`将四个手册合而为一。这意味着，当用户进入四页中的第二页时，用户可以从四个可能的目的地中选择一个。做出选择后，剩余的两页会自动根据用户选择的目的地进行定制。如果用户决定探索其他三个目的地，`futureTravel`允许她简单地往回翻页并选择另一个目的地，然后再次向前翻页，页面会动态更新，关联到新选择的目的地。\n\
  \n使用基于页面的应用模板，关键在于用你自己的数据模型替换内置的数据模型。页面导航只是让你能够查看由这个底层模型生成的页面。你将使用 iPad 布局，因为它为你的旅行宣传单页面提供了更大的文本空间。你将用自己的一组页面替换内置模型，每个页面包含一张图片和页码。你将把这些页面数据封装到自己的类中（包含`.h`/`.m`文件的对象）。在`ModelController`的启动方法中，你将在运行时构建页面数据的数组。在故事板文件中，你可以根据需要调整\
  \ UI。\n\n### futureTravel：一个基于页面的应用\n\n我们将这个项目分为五个步骤。首先，从模板创建项目，然后准备故事板。步骤 3 到 5\
  \ 包括编写`ModelController`、`DataViewController`和`RootViewController`的代码。这个项目本质上会变得相当有层次结构，因此你可能需要留意我们编码策略的总体大纲：\n\
  \n1.  *从模板创建*：首先，我们启动一个新的基于页面的应用，命名为`futureTravel`，使用`com.apress`作为标识符，选择 iPad，并启用\
  \ ARC。然后，我们通过取消选中竖屏和倒置功能来调整项目设置。接下来，我们将资源文件（如`Default-Lanscape*~ipad.png`和`ModelPageData`类文件（`.h`和`.m`））拖入`futureTravel`组。为了测试一切正常，我们构建项目。\n\
  2.  *准备故事板*：这里需要考虑两部分：根视图和数据视图。对于根视图，我们为视图背景着色：`RGB(254,196,37)`，即 Apress 的黄色。数据视图稍微复杂一些。这里我们也为视图背景着色：`RGB(253,224,145)`，这是我们之前使用的\
  \ Apress 黄色的较浅版本，但我们需要做更多工作。我们移除从属视图，并在其位置添加一个`UIImageView`，它将与我们的加载图片一致（`20,20\
  \ 984x679`）。这不会有任何用户交互。完成后，我们调整所有四个边缘，并启用两个方向的自动调整大小。我们还调整了标签的位置和配置，并正确定位它。最后，我们将文本改为右对齐，并将其颜色改为深灰色。\n\
  3.  `编写 ModelController`。\n4.  `编写 DataViewController`。\n5.  `编写 RootViewController`。\n\
  \n### 准备工作\n\n我们为程序创建了资源，包括一个启动画面和最初的两张图片（旅行介绍和目的地选择），然后为四个目的地各创建了两张图片。我们为所有这些文件生成了`@2x`版本，如果我们在新的\
  \ iPad（Retina 显示屏版本）上运行此应用，这些版本将自动被使用。我们还创建了一张特殊图片，用于标记客户的目的地选择。这样，我们为该项目总共生成了 23\
  \ 张图片。你可以在此处下载图片、资源、附加文件和 DemoMonkey 文件：[`http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter05_futureTravel%20Assets.zip`](http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter05_futureTravel%20Assets.zip)。你可以在此处下载我们拍摄视频时编写的源代码：[`http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter05_futureTravel.zip`](http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter05_futureTravel.zip)。和往常一样，我们建议你开始之前清理桌面，下载所有图片，并打开你的\
  \ DemoMonkey 文件。\n\n\n\n#### 步骤 1：从模板创建\n\n![images](img/9781430242727_Fig05-01.jpg)\n\
  \n**图 5-1.** *iBooks 与我们的应用——基于页面的应用。*\n\n1. 在深入探讨之前，我们先确保你理解了何时需要使用基于页面的应用。苹果在\
  \ App Store 发布 iBook 应用后，市场立刻出现了对实现炫酷翻页效果代码的需求。作为回应，苹果在 Xcode 4 中引入了一个名为“基于页面的应用”的新模板。该模板使用单个视图控制器，根据用户导航到的每个页面动态替换内容。苹果提供这样一个模板，其复杂度远超其通常提供的精简基础框架，这多少有些不同寻常。通过这个模板，苹果实际上提供了一个示例应用。不过，在本章中，我们将非常仔细地讲解一些巧妙的技巧和隐藏的陷阱。\n\
  \n**注意：** 当你想要创建一个旨在为每个新视图展示一个页面的应用项目时，建议使用“基于页面的应用”模板。\n\n![images](img/9781430242727_Fig05-02.jpg)\n\
  \n**图 5-2.** *在 Xcode 中新建一个基于页面的应用项目。*\n\n2. 打开 Xcode，按 `+N`，选择“基于页面的应用”，然后点击“下一步”，如图\
  \ 5-2 所示。\n\n![images](img/9781430242727_Fig05-03.jpg)\n\n**图 5-3.** *将应用命名为 futureTravel，然后取消勾选“竖屏”和“倒置竖屏”。*\n\
  \n3. 输入 `com.apress` 作为公司标识符。我们不使用类前缀。确保选择 iPad，并勾选“使用自动引用计数”。不要勾选“包含单元测试”（图 5-2）。创建完成后，将其保存到桌面。你会看到新的\
  \ `futureTravel` 项目被打开。如前所述，我们只为 iPad 制作这个应用——而且为了兼容我们将要使用的文本图片，我们还会将其设置为仅横屏模式。这些图片中的文本是横向排列的，因此请取消勾选“竖屏”和“倒置竖屏”，如图\
  \ 5-3 所示。有趣的是，看看这里少了什么……你注意到了吗？注意，这个基于页面的应用没有提供不使用 Storyboard 的选项。\n\n**注意：** 在使用“基于页面的模型”模板时，你的目标只有一个：进入代码，将页面内容的模型替换为你自己的页面内容模型。接下来，你将通过添加自己的数据对象并改造现有对象以使用新数据对象来开始这项工作。\n\
  \n![images](img/9781430242727_Fig05-04.jpg)\n\n**图 5-4.** *将启动图片拖入你的根目录。*\n\n1.\
  \ 打开你从 `http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter05_futureTravel%20Assets.zip`\
  \ 下载的 `futureTravel` 资源文件夹，并将其解压到桌面。选中两个启动图片文件 `Default-Landscape@2x~ipad.png` 和\
  \ `Default-Landscape~ipad.png`，然后将它们拖拽到根目录。请注意，你还可以看到适用于新 iPad（Retina iPad）的图片，如果你打算将应用直接编译到\
  \ Retina iPad 上，则可以使用它们，如图 5-4 所示。\n\n![images](img/9781430242727_Fig05-05.jpg)\n\
