  \n21. 此步骤是可选的。选中应用程序打印出的 URL，如图 3-26 所示，将其粘贴到你的 Web 浏览器的地址栏中，然后按 Enter 键。如果 URL\
  \ 字符串中没有错误，你应该会收到来自 Flickr 的响应，类似于图 3-27 所示（左侧：标准的未格式化响应，右侧：由 JSONView 插件为你格式化的用户友好格式响应）。你从\
  \ Flickr 下载的是 JSON 数据。为了能够使用其中存储的信息，你必须对其进行解析。\n\n![images](img/9781430242727_Fig03-26.jpg)\n\
  \n**图 3-26.** *复制 URL 并粘贴到 Web 浏览器的地址栏中。*\n\n\n\n22. 在 图 3-27 的 JSON 示例中，你可以看到 Flickr\
  \ 的响应并不包含实际的图像数据。要下载图像并获取其地理空间数据，你需要提取“photo”集合中每张图片的信息，并执行几个额外的步骤。在这种情况下，最便捷的方式是利用\
  \ iOS 5 的新特性：`NSJSONSerialization` 类。它是一个原生 JSON 解析器，可以将 JSON 转换为 Foundation 对象（通常根据\
  \ JSON 文档结构转换为 `NSDictionary` 或 `NSArray`），反之亦然。`NSJSONSerialization` 类有一个名为 `JSONObjectWithData:options:error`\
  \ 的静态方法。你将用它把 Flickr JSON 数据转换成 `NSDictionary`。\n\n![images](img/9781430242727_Fig03-27.jpg)\n\
  \n**图 3-27.** *在 Chrome 浏览器中显示的 Flickr JSON 响应*\n\n23. 让我们为步骤 18 中提到的 `saveData:`\
  \ 方法添加实现。在 `MapViewController.m` 文件中找到它的占位符，并插入 图 3-28 所示的代码（DemoMonkey 步骤“[09 MapViewController.m\
  \ saveData:]”）。\n\n这个方法初看可能有点复杂，但实际上非常简单。因为你在步骤 19 中看到了 JSON 响应的层级结构，所以你知道结果字典中的哪个键能让你访问到你感兴趣的照片数组。以下代码将\
  \ JSON 数据解析为 `NSDictionary`，并将存储在 `photo` 键下的照片信息项数组保存到 `NSArray` 中以便进一步处理：\n\n\
  ```\nNSError *error = nil;\nNSMutableDictionary *response = [NSJSONSerialization\
  \ JSONObjectWithData:data\noptions:NSJSONReadingMutableContainers error:&error];\n\
  NSArray *photos = [[response objectForKey:@\"photos\"] objectForKey:@\"photo\"];\n\
  ```\n\n![images](img/9781430242727_Fig03-28.jpg)\n\n**图 3-28.** *添加 saveData: 方法实现。*\n\
  \n24. 在这个例子中，`photos` 数组是一个 `NSDictionary` 对象的数组。每个字典都包含照片的信息，例如 ID、农场、服务器、标题等，你可以根据这些信息构建\
  \ URL，以便从 Flickr 获取实际的图像数据和图像地理位置。\n\n请注意，我们使用 `NSJSONReadingMutableContainers`\
  \ 选项来解析 JSON 数据。这样做是为了能够向解析后的对象追加额外信息（如缩略图 URL、图像 URL 和地理编码）。\n\n25. 回到 `saveData:`\
  \ 方法的其余代码：解析 JSON 数据之后，初始化步骤 11 中声明的变量，并开始枚举数组。在这个 `for` 循环中，你只需根据每张照片信息字典中存储的属性，构造三种类型的\
  \ URL 字符串。稍后你将使用这些 URL 来加载每张照片的缩略图、中等尺寸图像和图像地理空间数据。构造上述 URL 的规则可在 Flickr API 文档\
  \ [`www.flickr.com/services/api/misc.urls.html`](http://www.flickr.com/services/api/misc.urls.html)\
  \ 中找到。最后，将包含每张照片数据的字典保存到 `parsedDataDictionary` 变量中。使用照片 ID 字符串作为键，以便稍后可以通过照片 ID\
  \ 直接检索并更新每张照片字典的地理空间数据。方法中的最后一个代码块与步骤 18 中的几乎相同。由于照片的地理位置数据单独存储在 Flickr 上，你需要使用刚为每张照片构建的\
  \ `photoGeoInfoURLString` 再次调用 API 来获取其位置数据：\n\n```\ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
  \ 0), ^{\n    NSData *data = [NSData dataWithContentsOfURL:[NSURL\n    URLWithString:photoGeoInfoURLString]];\n\
  \    [self performSelectorOnMainThread:@selector(saveGeoCodeData:) withObject:data\n\
  \    waitUntilDone:YES];\n    });\n```\n\n一旦数据完全获取，将调用 `saveGeoCodeData:` 方法进行解析和保存，接下来你将实现这个方法。\n\
  \n26. 找到 `saveGeoCodeData:` 的占位符，并插入 图 3-29 所示的代码（如果你使用 DemoMonkey，将步骤“[10 MapViewController.m\
  \ saveGeoCodeData:]”拖放到方法占位符中）。这个方法与上一步讨论的 `saveData:` 方法非常相似，不同之处在于这里你只需要从 JSON\
  \ 响应中检索两个值（照片拍摄地点的纬度和经度）。因此，你使用相同的 `NSJSONSerialization` 类解析 JSON 数据，如果没有错误，则将地理编码值保存到通过照片\
  \ ID 键从 `parsedPhotosDictionary` 变量中检索到的对应照片信息字典中。请注意，这次解析选项设置为 `kNilOptions` 常量，因为你在此情况下不需要解析后的对象是可修改的。\n\
  \n当所有对象都更新完毕后，停止进度指示器并调用将在 `MapView` 上标注照片的方法：\n\n```\n  if (updatesCount == totalNumberOfPhotos)\
