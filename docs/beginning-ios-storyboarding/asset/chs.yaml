- "# 第 1 章\n\n### 准备工作\n\n本章作为引言，将确保你拥有所有必要的工具和配件，以便能够充满信心地全面展开。阅读本书的可能有三类读者。第一类读者可以立即跳到第\
  \ 2 章，无需阅读第 1 章。第二类读者可能只需要阅读第 1 章中的一个小节，然后继续。第三类读者在继续之前应该非常仔细地阅读第 1 章。\n\n- *第一组*：你拥有一台\
  \ Mac。你有在 Mac 上使用 Xcode 编码的经验。你拥有最新的 iOS SDK 和最新版本的 Xcode。你还有使用 DemoMonkey 的经验，并且它已安装在你的机器上。如果上述条件都满足，我们第\
  \ 2 章见。\n- *第二组*：你拥有一台 Mac。你有在 Mac 上使用 Xcode 编码的经验。你拥有最新的 iOS SDK 和最新版本的 Xcode。但是，你没有使用\
  \ DemoMonkey 的经验，或者它没有安装在你的机器上。请查看本章中的“安装 DemoMonkey”一节，然后我们第 2 章见。\n- *第三组*：你是一位知识探索者，已经开始踏上一条奇妙的道路。我们需要检查你的“背包”，确保你拥有旅途中所需的所有工具。那么，让我们从这开始吧。\n\
  \n\n\n## 必需品与配件\n\n为了给 iPhone 和/或 iPad 编写程序，并跟随本书中的练习、教程和示例进行操作，你需要满足 6 个最低要求。你现在可能不完全理解这些要求，但没关系，请暂时跟着我的节奏，我将在逐步讲解中解释所有内容。\n\
  \n**注意：** 每当提到 *iPhone* 或 *iPad* 时，我们都指的是任何 iPhone 或 iPad OS 设备，包括 iPod touch。此外，当我们提到\
  \ *Macintosh HD* 时，你的设备可能名称不同。\n\n简而言之，你需要六样东西：\n\n- 一台基于 Intel 的 Macintosh\n- 适合你的\
  \ Mac 的正确操作系统（OS X 10.7.4 Lion 或更高版本）\n- 成为注册开发者或使用模拟器（本章后面将详细讨论）\n- 适合你的 iPhone\
