  20.  选中表视图控制器后，选择 Editor ![images](img/U001.jpg) Embed In ![images](img/U001.jpg)\
  \ Navigation Controller，如图 7-69 所示。\n\n![images](img/9781430242727_Fig07-70.jpg)\n\
  \n**图 7-70.** *创建新的导航控制器*\n\n21.  一个崭新的导航控制器被创建了，它与你即将命名为“Add Book View”的视图形成了根视图控制器关系。双击视图标题并将其命名为*Add\
  \ Book*，如图 7-70 所示。\n\n![images](img/9781430242727_Fig07-71.jpg)\n\n**图 7-71.**\
  \ *创建一个跳转以进入“Add Book”场景*\n\n22.  现在您需要稍微思考一下。为了进入这个场景，用户需要点击“Books View”中的“Add\
  \ New”单元格。目前这些场景之间没有连接，因此您需要创建一个新的跳转。点击“Add New”单元格并按住 Control 键拖动到导航控制器上，如图 7-71\
  \ 所示。由于这是一个模态场景——仅用于输入数据——这次，您不会使用让下一个视图滑入的 Push 跳转，而是使用让下一个视图翻转入场的 Flip 跳转。释放跳转连接器时，从\
