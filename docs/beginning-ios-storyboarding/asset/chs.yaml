- "# 第 7 章\n\n## 掌握故事板中的表格视图：设计流程\n\n你已经完成了 `bookManager` 主从应用程序的基础搭建（在 3 步操作的第 1\
  \ 步，第 6 章），现在可以开始学习本章应用程序的第 2 步了。你已经导入了所有图片和书籍信息，并设置了 SQLite 数据库。很酷吧！不过，如果你觉得这已经很酷了，那么等你看到我们在故事板中布局整个应用程序工作流程的精彩内容时，一定会更加惊叹。在第\
  \ 7 章中，你将轻松自如地路由和连接各个元素——如果你曾尝试过不使用故事板来完成这些工作，一定会感到无比惊奇。\n\n### 第 2 步：为应用程序制作故事板\n\
  \n好了——我们开始吧。\n\n#### 配置主场景\n\n![图片](img/9781430242727_Fig07-01.jpg)\n\n**图 7-1.**\
  \ *打开故事板。*\n\n1.  既然已经设置好了数据模型，现在就可以开始设计界面了。打开故事板。你会立刻看到 Xcode 已经为主从应用程序创建了一个基本的层级结构。一个基本的导航控制器连接到一个主视图控制器，该控制器通过\
  \ segue 连接到详细视图控制器，如图 7-1 所示。你将使用这个模板来满足需求。\n\n![图片](img/9781430242727_Fig07-02.jpg)\n\
  \n**图 7-2.** *将标题重命名为“我的图书馆”。*\n\n2.  双击主视图控制器标题栏上的“Master”标题，将其重命名为“我的图书馆”，然后点击一次原型单元格以选中它，如图\
  \ 7-2 所示。\n\n![图片](img/9781430242727_Fig07-03.jpg)\n\n**图 7-3.** *将单元格的行高改为 50。*\n\
  \n3.  选择“实用工具”视图，然后点击“大小检查器”。在“行高”属性中输入 `50`，如图 7-3 所示，然后按回车键。\n\n![图片](img/9781430242727_Fig07-04.jpg)\n\
  \n**图 7-4.** *选择表格视图。*\n\n4.  你正在处理的场景将成为应用程序中的第一个视图。在这种情况下，它将允许用户在你的图书馆的两个顶级层级中选择：书籍和作者。因此，你很清楚要在表格视图中显示多少个单元格：两个单元格。这使得它非常适合作为静态表格视图——这是故事板独有的一项出色新功能，允许你在故事板中静态地布局表格视图的内容，在运行时显示它，甚至在用户选择某个单元格时切换到其他视图，而无需编写任何代码！让我们将表格视图转换为静态格式：点击原型单元格下方的位置来选择表格视图，如图\
  \ 7-4 所示。\n\n![图片](img/9781430242727_Fig07-05.jpg)\n\n**图 7-5.** *更改表格视图内容类型。*\n\
  \n5.  选择“属性检查器”，将“内容”类型从“动态原型”改为“静态单元格”。你会看到三个相同的单元格出现，如图 7-5 所示。\n\n**注意：** 动态表格视图显示动态内容，在这种情况下，表格视图行数较多（有时甚至不限量）。动态表格视图使用可重用的动态单元格原型来高效地显示非常大的数据集。静态表格视图本质上就是“所见即所得”。对于静态内容，表格视图的行数是已知且固定的，因此你可以在界面生成器中设计所有行。请注意，静态表格视图只能通过故事板创建，并且必须由表格视图控制器的子类来控制。\n\
  \n![图片](img/9781430242727_Fig07-06.jpg)\n\n**图 7-6.** *命名层级树的根节点。*\n\n6.  点击三个单元格中的一个并将其删除，这样只剩下两个单元格。现在让我们思考一下。你将拥有两个数据树：一个按书籍查看数据库，另一个按作者查看数据库。这意味着你的根节点有两个选择：书籍和作者。将这两个单元格的标签文本从“Title”分别改为“书籍”和“作者”，如图\
  \ 7-6 所示。现在，你将删除连接主视图控制器到详细视图控制器的 segue：点击该 segue，如图 7-6 所示，将其选中，然后删除。\n\n![图片](img/9781430242727_Fig07-07.jpg)\n\
  \n**图 7-7.** *删除 `MasterViewController.m` 中 `@end` 和 `@implementation` 之间的代码——箭头指示了原来代码所在的位置。*\n\
  \n7.  在进行下一步之前，还有一件最后的事情要做，以确保你的静态表格视图能正确显示。你需要删除主视图控制器的一些现有代码。Xcode 在主从应用程序模板中，为你在\
  \ `MasterViewController.m` 中创建了一些代码。这些代码实现了 `UITableViewDelegate` 和 `UITableViewDataSource`\
  \ 协议方法，如果它们存在，将会覆盖你在故事板中定义的静态表格视图内容。因此，在项目导航器中点击 `MasterViewController.m` 文件，选中\
  \ `@implementation` 和 `@end` 之间的所有代码，并将其删除，如图 7-7 所示。\n\n**注意：** 因为这是一个静态表格，所以不需要任何额外的代码。稍后，你将分别为“书籍”和“作者”这两个静态单元格创建\
  \ segue，连接到它们各自要跳转到的视图控制器。这就是为什么目前主视图控制器和详细视图控制器之间没有 segue 连接的原因。\n\n\n\n#### 设计顶层视图：分类场景\n\
  \n![images](img/9781430242727_Fig07-08.jpg)\n\n**图 7-8.** *拖入一个新的视图控制器。*\n\n1. 根据应用流程，当用户点击`Books`单元格时，你需要显示一个可用分类列表。因此，你需要一个额外的`View\
  \ Controller`来展示书籍的各种分类。现在，将之前从`Master View Controller`中断开连接的当前`Detail View Controller`移到右侧。你可以在图\
  \ 7-8 右侧看到它的左侧部分。这样做是为了给即将拖入的新`View Controller`腾出空间。一旦空间足够，从你的`Object Library`中拖入一个新的`View\
  \ Controller`，如图 7-8 所示。\n\n![images](img/9781430242727_Fig07-09.jpg)\n\n**图 7-9.**\
