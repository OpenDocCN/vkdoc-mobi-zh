  \n**注意：** 如你所见，`Storyboard`使得复制单元格并根据需要修改它们以创建原型变得异常简单。理解并充分利用这一概念至关重要。我们仍然看到有经验的程序员手工编写这些代码，仅仅是因为他们还没有“领悟”到——Storyboarding\
  \ 如何让创建新原型变得如此简单。\n\n![images](img/9781430242727_Fig07-15.jpg)\n\n**图 7-15.** *创建“新增”单元格。*\n\
  \n8. 你需要再制作一个单元格。这个新单元格将允许用户添加任意名称的新分类。想一想：你将创建一个单元格，未来无需你或用户编写任何代码，它就可以被命名为“最佳\
  \ Apress 图书”、“Monkey”或其他任何名称——太棒了！按照你在图 7-14 中所做的操作：点击已有的两个单元格中的任意一个以选中它，按 ![images](img/U003.jpg)\
  \ + `C` 复制，再按 ![images](img/U003.jpg) + `V` 粘贴，并将单元格的标签重命名为“新增”。为了使其外观不同，让我们找点乐子，更改几个属性。将`Accessory`类型设置为`Detail\
