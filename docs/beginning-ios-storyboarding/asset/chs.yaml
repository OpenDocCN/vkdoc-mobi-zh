  \ @\"Status: whoa, found aliens!\" :\n    @\"Status: no aliens found\";\n}\n```\n\
  \n**注意** 这段代码根据参数`bIsHere`的状态，将两条消息之一放入屏幕上的标签中。还要注意，你将这段消息文本写入用户界面对象的`.text`属性，根据名称的`lbl`前缀，你知道这应该是一个标签。\n\
