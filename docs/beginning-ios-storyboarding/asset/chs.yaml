  \n**注意：** 为什么我们要使用“跳转到定义”这个技巧？因为在为 iOS 编写代码时，你需要了解大量的协议和对象接口。最佳的学习方式是在每次使用协议或接口时，刷新你对它的了解。通过直接跳转到协议声明，你有机会提醒自己该协议中声明的其他方法。看到了吗？这就是在工作中的持续学习！\n\
