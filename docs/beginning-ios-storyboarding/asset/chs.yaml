  ![images](img/9781430242727_Fig02-24.jpg)\n\n**图 2-24.** *从协议中获取方法。*\n\n13.  现在，选择并复制`alien:saysIAmHere:`方法的签名，如图\
  \ 2-24 所示（你正在抓取的代码已高亮显示）。\n\n**注意：** 你是否注意到你复制的方法行上方的`@required`指令？这意味着任何声明遵循你的委托协议的对象（在这个例子中是`ViewController`）*必须*已经实现了`alien:saysIAmHere:`方法。当你在协议定义中声明`@required`，并且在另一个类中声明遵循该协议时，如果你尚未实现协议的一个或多个`@required`方法，编译器将生成错误。这有助于确保你已经编写了处理该协议所需的最少代码。\n\
  \n![images](img/9781430242727_Fig02-25.jpg)\n\n**图 2-25.** *粘贴委托方法。*\n\n14.  继续创建委托协议方法：回到`ViewController.m`文件。将你刚复制的方法粘贴到`@end`前面，如图\
