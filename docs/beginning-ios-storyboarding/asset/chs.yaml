  \n5. 点击`Size Inspector`，如图 7-12 所示，然后将`Row Height`从你当前的高度改为`50`（我们手动调整到了`54`，但请将你的高度改为`50`）。\n\
  \n![images](img/9781430242727_Fig07-13.jpg)\n\n**图 7-13.** *更改标识符和辅助功能属性。*\n\n6.\
  \ 返回`Attributes Inspector`，将`Identifier`改为一个在代码中有意义的名称——我们称之为`Cell`，因为这是你将复用以显示分类的标准单元格原型。现在点击`Accessory`选项，从下拉菜单中选择`Disclosure\
  \ Indicator`，如图 7-13 所示。双击`Table View Cell`原型中的`Title`标签，将其重命名为“分类名称”。然后确保你刚刚配置的单元格被选中（高亮为蓝色），并按\
  \ ![images](img/U003.jpg) + `C` 复制它。\n\n![images](img/9781430242727_Fig07-14.jpg)\n\
  \n**图 7-14.** *复制第一个单元格。*\n\n7. 按 ![images](img/U003.jpg) + `V` 粘贴复制的“分类名称”单元格，如图\
  \ 7-14 所示。双击你刚刚粘贴的新单元格，将其名称改为“全部图书”，因为该单元格将用户带到包含所有 Apress 图书的页面。而常规的“分类名称”单元格则会将用户带到属于\
