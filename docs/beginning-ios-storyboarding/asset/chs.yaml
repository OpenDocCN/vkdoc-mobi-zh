  \n### 成为开发者\n\n你需要通过 iPhone/iPad 软件开发工具包（SDK）注册成为开发者，费用为 99 美元。或者，你可以支付 0 美元获得入门级的简单功能。\n\
  \n#### 做出选择\n\n如果你是学生，很可能你的教授已经处理了这件事，你可能已经注册在你的教授名下。如果你不是学生，你需要决定你想成为哪种类型的开发者。以下是你的选择：\n\
