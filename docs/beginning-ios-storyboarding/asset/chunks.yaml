    \ down to just before the `@end` as shown in [Figure 8-54](#Chapter08.html#fig_8_54).\n\
    \nIn the pop-up dialog for the Action, name it `editPressed`. Now, make sure before\
    \ you click Connect, because you’ve always been leaving everything in its default,\
    \ that you select `UIBarButtonItem` from the drop-down menu in the Type field.\
    \ Before proceeding, make sure your `IBAction` looks as follows:\n\n`- (IBAction)editPressed:(UIBarButtonItem\
    \ *)sender {`\n    `}`\n    `@end` ![images](images/9781430242727_Fig08-55.jpg)\n\
    \n**Figure 8-55.** *Make IBAction capable of toggling.*\n\n19.  Press Return after\
    \ the first bracket located after `sender {` and create a line between the beginning\
    \ and ending brackets so that you can code inside the method. You need to write\
    \ code so that you can toggle the editing mode for the Table View on and off.\
    \ Type the following code:\n\n`- (IBAction)editPressed:(UIBarButtonItem *)sender\
    \ {`\n    `  if (self._tableView.editing) {`\n    `    self._tableView.editing\
    \ = NO;`\n    `    sender.title = @\"Edit\";`\n    `  }`\n    `  else {`\n   \
    \ `    self._tableView.editing = YES;`\n    `    sender.title = @\"Done\";`\n\
    \    `  }`\n    `}`\n\nRefer to [Figure 8-55](#Chapter08.html#fig_8_55) for details.\n\
    \n#### Adding Code for the Categories Scene\n\n![images](images/9781430242727_Fig08-56.jpg)\n\
    \n**Figure 8-56.** *Create the CategoriesViewController.*\n\n1.  The next View\
    \ Controller you’ll create is the Categories View Controller. Press ![images](images/U003.jpg)+N\
