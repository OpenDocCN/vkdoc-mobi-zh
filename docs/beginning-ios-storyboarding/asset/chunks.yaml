    9.  Click `futureTravel` at the root of the Navigation tree. In Target settings
    on the left, pick the Build Phases tab at the top. Now expand the Compile Sources
    section. If you don''t see the `ModelPageData.m` file in this list, click the
    + (plus) button, select the `ModelPageData.m` implementation file, and click Add
    as shown in [Figure 5-12](#Chapter05.html#fig_5_12). This will add `ModelPageData.m`
    to the project. In case the desired files aren’t shown in the “Choose items to
    add” list, click the Add Other button and find the files you want to add in your
    directory structure.


    ![images](images/9781430242727_Fig05-13.jpg)


    **Figure 5-13.** *Another way to do this…*


    10.  This is not the only way to do this if, by the time you read this, Apple
    has not fixed it. If you go to your `futureTravel` folder, right-click it, and
    select Add Files to futureTravel, as shown in [Figure 5-13](#Chapter05.html#fig_5_13),
