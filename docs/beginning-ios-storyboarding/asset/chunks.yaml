    \ Control 拖拽到`@end`之前，如图 8-54 所示。\n\n在弹出的操作对话框中，将其命名为`editPressed`。现在，在单击 Connect\
    \ 之前，请确保你从 Type 字段的下拉菜单中选择`UIBarButtonItem`（因为你之前一直保留所有默认设置）。在继续之前，请确保你的`IBAction`如下所示：\n\
    \n```\n- (IBAction)editPressed:(UIBarButtonItem *)sender {\n    }\n    @end\n\
    ```\n\n![images](images/9781430242727_Fig08-55.jpg)\n\n**图 8-55.** *使 IBAction\
    \ 能够切换状态。*\n\n19.  在`sender {`之后的第一个大括号处按回车，在开始和结束大括号之间创建一行，以便你可以在方法内部编写代码。你需要编写代码，以便可以切换表格视图的编辑模式。输入以下代码：\n\
