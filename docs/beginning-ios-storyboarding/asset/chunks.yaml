  trans: '

    我们将为你简要概述在开始为 App 制作故事板之前需要了解的主要高级概念。


    图 2-0D 展示了一个标准故事板文件的主要组件，当你在项目中选用“主-从应用程序”模板时，Xcode 会为你创建该文件。现在，我们将解释这些关键组件的作用以及它们是如何协同工作的。


    ![images](img/9781430242727_Fig02-0D.jpg)


    **图 2-0D.** *故事板的主-从应用程序模板*


    故事板中有两个主要概念：场景（Scene）和转场（Segue）。


    *场景*是一个视图控制器，它可以表示 App 中的一个屏幕，也可以仅仅表示一个主要的组件区域（例如分割视图控制器中的一个分割视图面板）。你可以在这里进行所有之前在
    nib 文件中操作过的事情：拖放并重新排列 UI 元素（如标签、文本字段和图片），调整它们的大小，在属性检查器中设置它们的属性，等等。


    *转场*定义了故事板中的导航。它指示如何从点 A 到达点 B。你通常通过选择一个事件源（例如按钮或表格视图单元格）并选择一个要过渡到的场景来创建转场。你还可以选择想要使用的动画类型。只需进行简单的选择，即可使用所有
    Apple 内置的动画。此外，你甚至可以为自定义转场创建自己的自定义动画。


    因此，你将使用场景和转场来构建你的应用程序 UI。


    **注意：** 你的 App 中可以有多个故事板。你只需要在 `[appName]-Info.plist` 文件中，于“Main storyboard file
    base name”（主故事板文件基本名称）键下指定主故事板的名称即可，该键的默认值是 `MainStoryboard`。


    你从一个代表第一个场景（初始视图控制器）的视图控制器对象开始。要为你的故事板获取视图控制器，你需要从对象库中选择“对象和控制器”（就像你对 nib 文件中所有其他
    UI 元素所做的那样），然后将你需要的视图控制器拖放到故事板画布上。每个视图控制器始终管理着你的 App 中的一个场景。


    **注意：** 在 iPhone 上，每个场景代表单个屏幕的内容。对于 iPad 应用程序，一个屏幕可以由多个场景的内容组成（例如在分割视图控制器的情况下）。


    其中最重要的概念之一是数据如何传递。这里有一个非常经典的场景：一个主-从应用程序，你在表格视图中显示一些数据，当用户点击某个单元格时，会显示一个详细视图，展示关于所选内容的附加信息。在这种情况下，你必须将对所选对象的引用发送给详细视图，以便它确切知道要显示什么。


    故事板为此提供了相应的 API。每个 `UIViewController` 都有一个名为 `prepareForSegue:sender:` 的方法，该方法旨在被重写。你可以在这里编写代码，这些代码将在每次触发转场时生效。


    转场和标签、图像视图一样，都是 UI 元素。你可以在故事板中选择一个转场并检查其属性。你可以通过检查每个转场的标识符属性来区分它们，该属性可以在属性检查器中设置。在本章中，我们将向你展示如何执行此操作，并涵盖其他几个主要的故事板方面。


    ![images](img/9781430242727_Fig02-0E.jpg)


    **图 2-0E.** *故事板在专业环境中的应用*


    为了说明故事板确实被广泛使用，即使是在大型项目中，图 2-0E 展示了在作者的一位客户那里正在使用的九个基于故事板的项目之一。此图表明，即使在专业层面，故事板也已站稳脚跟。


    那么，闲话少说，让我们开始吧。


    ### helloAlien：一个快速示例应用程序


    首先，我们将向你介绍故事板的四个基本概念：


    *   用很少甚至不用代码即可轻松创建视图间的过渡。

    *   将信息从次级视图传回主视图。

    *   将信息从主视图发送到次级视图。

    *   使用用户创建的视觉效果在视图之间进行过渡。


    在我们的示例应用程序中，我们通过以下方式演示这四个概念：


    *   创建一个按钮，用于触发从主视图到次级视图的过渡。

    *   将一个“是/否”值从次级视图（外星人视图）传递到主视图。

    *   将用户输入的文本从主视图发送到次级视图（外星人视图）。

    *   创建一个自定义的转场（读作“segway”），用于在两个视图之间实现淡出/淡入效果。


    为此，我们将编写一个简单的 App，询问外星人是否存在。转到次级视图，你会看到一个开关，外星人可以将其打开——当然，前提是外星人存在。如果外星人将开关拨到“开”的位置，那么当你返回主视图时，会出现一条消息，表示他确实存在。然后，你可以对外星人说些什么，你会在次级视图的外太空空间中看到这条消息。最后，你将创建一个自定义转场，以一种美观的方式将你从主视图带到次级视图。那么，让我们开始吧！


    #### 准备工作


    与所有章节一样，我们为你提供了 Dr. Lewis 完全按照本书所述编写和运行代码的视频。你也可以下载视频中的代码，并直接“按原样”在本书中使用。你还可以下载每章中使用的
    DemoMonkey 文件和图像。


    这些下载文件位于 [`http://bit.ly/sMRvAP`](http://bit.ly/sMRvAP)，如 图 2-1 所示。


    ![images](img/9781430242727_Fig02-01.jpg)


    **图 2-1.** *本章的视频、代码和文件*


    在 图 2-1 中，箭头 1 指向本章视频的一张图片，位于 [`http://bit.ly/tNKUij`](http://bit.ly/tNKUij)。箭头
    2 指向一个 Xcode 图标，链接到本章的 Xcode 项目，位于 [`http://bit.ly/QSYAV6`](http://bit.ly/QSYAV6)。箭头
    3 指向一个图标，链接到本章所需的所有文件，包括位于 [`http://bit.ly/Qxr16s`](http://bit.ly/Qxr16s) 的图像和
    DemoMonkey 文件。如果你需要更多帮助，请访问论坛 [`http://bit.ly/oLVwpY`](http://bit.ly/oLVwpY)。


    在开始之前，请确保你已经下载了位于 [`http://bit.ly/Qxr16s`](http://bit.ly/Qxr16s) 的图像和 DemoMonkey
    文件，并在桌面上打开了它们。

