  trans: "\n29.  由于“添加图书”场景是一个模态场景，你需要添加两个栏按钮项。一个用于保存用户刚刚创建的条目，另一个用于让用户取消当前操作并返回到上一个视图控制器。从对象库中拖入第一个栏按钮项，如图\
    \ Figure 7-78 所示。\n\n![images](img/9781430242727_Fig07-79.jpg)\n\n**图 7-79.**\
    \ *添加两个栏按钮项。*\n\n30.  将第一个 `Bar button item` 拖到标题的右侧，并将其命名为 `Save`。然后再拖一个到标题的右侧，命名为\
    \ `Cancel`，如图 Figure 7-79 所示。\n\n#### 进行最终调整\n\n![images](img/9781430242727_Fig07-80.jpg)\n\
    \n**图 7-80.** *应用到目前为止的故事流程。*\n\n1.  图 7-80 展示了到目前为止的故事板。看起来相当不错！它展示了应用完整的故事情节和逻辑流程。你甚至无需考虑编写任何代码，就能看到应用各部分是如何结合在一起的。是不是很令人兴奋？最后，你可以对数据流再进行一次微小的改进。考虑一种情况：作者只有一本书，这意味着无需进入图书列表（图书场景）。在这种情况下，更合理的做法是直接跳转到图书详情场景（位于图书场景的右侧）。要实现这一点，你需要修改一些设置。\n\
    \n    ![images](img/9781430242727_Fig07-81.jpg)\n\n    **图 7-81.** *删除 `ShowAuthorBooks`\
    \ 转场。*\n\n2.  选中从作者场景到图书场景的转场（即分配了 `ShowAuthorBooks` 标识符的那条），如图 Figure 7-81 所示，然后将其删除。\n\
    \n    ![images](img/9781430242727_Fig07-82.jpg)\n\n    **图 7-82.** *从实际的视图控制器创建一个新的转场。*\n\
    \n3.  现在，你将不再从“作者姓名”单元格跳转到图书列表，而是从视图控制器本身创建一个转场。点击作者场景的 Dock（底部的黑色条）选中它。然后选择视图控制器，如图\
    \ Figure 7-82 所示。\n\n    ![images](img/9781430242727_Fig07-83.jpg)\n\n    **图\
    \ 7-83.** *按住 Control 键拖拽到图书场景。*\n\n4.  从视图控制器按住 Control 键拖拽到图书场景，如图 Figure 7-83\
    \ 所示。松开转场连接器后，从故事板转场菜单中选择 `Push`。为其分配 `ShowAuthorBooks` 标识符，就像你之前设置的那样。\n\n  \
    \  ![images](img/9781430242727_Fig07-84.jpg)\n\n    **图 7-84.** *对图书详情场景重复相同操作。*\n\
    \n5.  对详情视图控制器执行完全相同的操作，如图 Figure 7-84 所示——区别在于创建转场时，需要为其分配一个不同的标识符。\n\n    ![images](img/9781430242727_Fig07-85.jpg)\n\
    \n    **图 7-85.** *为新转场分配标识符。*\n\n6.  将此转场命名为 `ShowAuthorBookDetail`（如图 Figure\
    \ 7-85 所示）。从视图控制器创建转场的诀窍在于，你可以在满足特定条件时，通过代码手动执行这些转场。在这个例子中，当用户点击表视图单元格时，你将根据该作者拥有的图书数量来决定执行两个转场中的哪一个。\n\
    \n    ![images](img/9781430242727_Fig07-86.jpg)\n\n    **图 7-86.** *最终的故事板布局！*\n\
    \n7.  此时，你最终的故事板应该看起来像 Figure 7-86 所示。是时候运行你的应用，看看效果了！\n\n    ![images](img/9781430242727_Fig07-87.jpg)\n\
    \n    **图 7-87.** *运行成功！*\n\n8.  从 图 7-87 可以看出，应用确实可以工作，并从根视图导航到类别和作者场景——但是，当你将其与图\
    \ 6-0A 和图 6-0B（应用的最终外观）比较时，你会发现列表中没有数据。这是因为尽管故事板功能正常，但底层缺少将视图和表格连接到 SQLite 数据库的代码。这部分内容你将在下一章中处理。\n\
    \n## 第 8 章\n\n## 使用故事板掌握表视图：编写后端代码\n\n到目前为止，在未编写任何代码的情况下，你已经设计了一个相当复杂的库存系统，该系统可以追踪项目（本例中为\
    \ Apress 图书），并允许从应用本身向数据库添加项目。正如你在第 7 章的图 7-87 中看到的，除应用未链接任何数据外，一切功能正常。\n\n在第\
    \ 8 章中，作为应用三步开发流程中的第三步，你将编写代码，将 SQLite 数据库连接到你在第 7 章中创建的每个视图控制器。\n\n### 第 3 步：在故事板元素后面编写代码并调整一些故事板必要设置\n\
    \n让我们从创建自定义的 `UITableViewCell` 子类开始这第三步的工作。\n"
- fmt: "# Creating a Custom `UITableViewCell` subclass\n\n![images](images/9781430242727_Fig08-01.jpg)\n\
    \n**Figure 8-1.** *Create a new class to connect to your custom cell prototypes.*\n\
    \n1. The `UITableViewCell` located at the root of the Storyboard you created in\
    \ [Figure 7-29](#Chapter07.html#fig_7_29) is a good place to start because most\
    \ of the connections lead out from there. However, you'll first need to create\
    \ a subclass of `UITableViewCell` that will provide you with all the necessary\
    \ outlets to connect the elements in your custom cell prototypes. Press ![images](images/U003.jpg)+N\
    \ to create a new class and, after selecting the Objective-C class, click Next\
    \ as shown in [Figure 8-1](#Chapter08.html#fig_8_1).\n\n   ![images](images/9781430242727_Fig08-02.jpg)\n\
    \n   **Figure 8-2.** *Make sure it's a subclass of `UITableViewCell`.*\n\n2. Typically,\
    \ you go screaming past this dialog box, but please slow down and make sure that\
    \ this is a subclass of `UITableViewCell`. You'll call this class `CustomCell`.\
    \ Click Next as shown in [Figure 8-2](#Chapter08.html#fig_8_2). Use the default\
    \ save settings in the next dialog by clicking Create.\n\n   ![images](images/9781430242727_Fig08-03.jpg)\n\
    \n   **Figure 8-3.** *Define the outlets.*\n\n3. By default, Xcode will open the\
    \ implementation file but we want you to first open the header file. Go to `CustomCell.h`\
    \ in the Project Navigator and open it. The first thing you'll do here is define\
    \ the outlets you'll need for your interface. Start by dragging the `10 CustomCell.h\
    \ IBOutlets` snippet from DemoMonkey, which is the first snippet in PART THREE.\
    \ Place it where you always define outlets, before `@end`. You are defining four\
    \ outlets here: `leftImageView`, `mainLabel`, `detailLabel1`, and `detailLabel2`,\
    \ as shown in [Figure 8-3](#Chapter08.html#fig_8_3) and as follows:\n\n   ```\n\
    \   #import <UIKit/UIKit.h>\n\n   @interface CustomCell : UITableViewCell\n\n\
    \   @property (nonatomic, strong) IBOutlet UIImageView *leftImageView;\n   @property\
    \ (nonatomic, strong) IBOutlet UILabel *mainLabel;\n   @property (nonatomic, strong)\
    \ IBOutlet UILabel *detailLabel1;\n   @property (nonatomic, strong) IBOutlet UILabel\
    \ *detailLabel2;\n\n   @end\n   ```\n\n   All the properties here are pretty self-explanatory.\
    \ You'll learn what roles they play soon, when you connect them to your UI in\
    \ the Storyboard. Save the header file, and let's add a few things to its implementation.\n\
    \n   ![images](images/9781430242727_Fig08-04.jpg)\n\n   **Figure 8-4.** *Synthesize\
    \ the four outlets.*\n\n4. Jump over to the `CustomCell.m` implementation file\
    \ and synthesize the four `IBOutlets` you just defined. Drag in the `11 CustomCell.m\
    \ @synthesize` snippet from DemoMonkey and place it right after the `@implementation\
    \ CustomCell` as shown in [Figure 8-4](#Chapter08.html#fig_8_4) and as follows:\n\
    \n   ```\n   #import \"CustomCell.h\"\n\n   @implementation CustomCell\n   @synthesize\
    \ leftImageView;\n   @synthesize mainLabel;\n   @synthesize detailLabel1;\n  \
    \ @synthesize detailLabel2;\n   ```\n\n# Modifying the Detail View Controller\n\
    \n![images](images/9781430242727_Fig08-05.jpg)\n\n**Figure 8-5.** *Select the\
    \ Book Details Scene.*\n\n1. In [Chapter 7](#Chapter07.html#ch7) you already created\
    \ connections from Table View cells located at the root of your Storyboard. Now\
    \ you'll go backwards from the leaves of each branch of the Storyboard toward\
    \ the root and add the code for all these scenes. Start with the Detail View Controller.\
    \ Click the Storyboard, open it up, and then select the Book Details Scene as\
    \ shown in [Figure 8-5](#Chapter08.html#fig_8_5).\n\n   ![images](images/9781430242727_Fig08-06.jpg)\n\
    \n   **Figure 8-6.** *Open the Assistant editor.*\n\n2. You'll be dragging connections\
    \ from the Storyboard over to your code, so as you've done in the past, you'll\
    \ need to have Storyboard open on the left and the code on the right. Open up\
    \ the Assistant editor as shown in [Figure 8-6](#Chapter08.html#fig_8_6).\n\n\
    \   ![images](images/9781430242727_Fig08-07.jpg)\n\n   **Figure 8-7.** *Control-drag\
    \ from the Title label over to the `DetailViewController.m`.*\n\n3. Looking at\
    \ the Book Details, before getting immersed in the code, think about this: you\
    \ have UI elements that you want to connect to the SQLite database, so they can\
    \ display data, right? You need outlets that your code can use to do this. So\
    \ you need outlets for each of the elements you have here. You'll go a step further\
    \ than simply creating them—you'll also make them private interfaces, because\
    \ you don't need to access them from outside this class. You have the Assistant\
    \ open, but make sure it has the `DetailViewController.m` file open. If not, switch\
    \ to it using the drop-down right above the code. We added a couple spaces after\
    \ the `-(void)configureView` so there would be some room. Now Control-drag from\
    \ the Title over to the code as shown in [Figure 8-7](#Chapter08.html#fig_8_7).\n\
    \n   ![images](images/9781430242727_Fig08-08.jpg)\n\n   **Figure 8-8.** *Creating\
    \ the Outlet connection.*\n\n4. Release the Control-drag and leave all the defaults\
    \ in the pop-up that will configure the Outlet connection. All you need to do\
    \ is give it a name. Let's call it `_titleLabel`, as shown in [Figure 8-8](#Chapter08.html#fig_8_8)\
    \ and as follows:\n\n   ```\n   #import \"DetailViewController.h\"\n   #import\
    \ \"DBBook.h\"\n\n   @interface DetailViewController ()\n   - (void)configureView;\n\
    \n   @property (weak, nonatomic) IBOutlet UILabel *_titleLabel;\n\n   @end\n \
    \  ```\n\n   ![images](images/9781430242727_Fig08-09.jpg)\n\n   **Figure 8-9.**\
    \ *Repeat for the next three of five elements.*\n\n5. You now need to repeat the\
    \ process of [Figures 8-7](#Chapter08.html#fig_8_7) and [8-8](#Chapter08.html#fig_8_8)\
    \ five more times, one for each of the three right-hand labels: the Category Label,\
    \ Author Label, and Year Label. Control-drag from Category Label to the implementation\
    \ file as shown in [Figure 8-9](#Chapter08.html#fig_8_9) and name it `_categoryLabel`\
    \ just as you named Title `_titleLabel` in [Figure 8-8](#Chapter08.html#fig_8_8).\
    \ Repeat two more times: Control-drag from Author Label to the implementation\
    \ file and name it `_authorLabel`; Control-drag from Year Label to the implementation\
    \ file and name it `_yearLabel`.\n\n   The three labels are shown here:\n\n  \
    \ ```\n   #import \"DetailViewController.h\"\n   #import \"DBBook.h\"\n\n   @interface\
    \ DetailViewController ()\n   - (void)configureView;\n\n   @property (weak, nonatomic)\
    \ IBOutlet UILabel *_titleLabel;\n   @property (weak, nonatomic) IBOutlet UILabel\
    \ *_categoryLabel;\n   @property (weak, nonatomic) IBOutlet UILabel *_authorLabel;\n\
    \   @property (weak, nonatomic) IBOutlet UILabel *_yearLabel;\n\n   @end\n   ```\n\
    \n   ![images](images/9781430242727_Fig08-10.jpg)\n\n   **Figure 8-10.** *Connect\
    \ the book image.*\n\n6. Click the image of the book as shown in [Figure 8-10](#Chapter08.html#fig_8_10),\
    \ Control-drag from it to the implementation file, and name the outlet `_bookImage`\
    \ as shown here:\n\n   ```\n   #import \"DetailViewController.h\"\n   #import\
    \ \"DBBook.h\"\n\n   @interface DetailViewController ()\n   - (void)configureView;"
