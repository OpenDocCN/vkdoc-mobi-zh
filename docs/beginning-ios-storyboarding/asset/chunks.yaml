  trans: "\n### 图 5-51. *打开实现文件并导入页面数据对象。*\n\n8.  请注意，因为你是通过 Storyboard 对 `ivPageImage`\
    \ 进行拖放操作的，所以 Xcode 也为你添加了必要的实现代码：`@synthesis` 以及 `viewDidUnload` 中设置为 `nil` 的\
    \ `ivPageImage`。现在你需要导入 `pageData` 对象的接口。将 “13 DataViewController.m – add import\
    \ and pageData object (`#import \"ModelPageData.h\"`)” 代码片段拖入，并插入到 `#import \"\
    DataViewController.h\"` 下方。\n\n你还需要向私有接口添加一些方法。将 “14 DataViewController.m – add\
    \ methods to private interface” 代码片段拖入，并与 `@interface DataViewController` 并列放置（而非其下方），如图\
    \ 图 5-51 所示。\n\n添加到 `DataViewController.m` 文件中的私有方法声明如下：\n\n```\n-(void)onButtonPress:(UIButton*)sender;\n\
    -(void)showHideImageSelectionIndicator:(NSInteger)imageNbr;\n-(void)placeImageSelectorButtonAtLocation:(CGPoint)location\
    \ tag:(NSInteger)tag;\n-(void)placeSelectionIndicatorAtLocation:(CGPoint)location\
    \ label:(NSString*)text;\n```\n\n![images](img/9781430242727_Fig05-52.jpg)\n\n\
    ### 图 5-52. *引入 setter 覆盖方法。*\n\n请注意，到目前为止，你还没有合成委托属性。这是有原因的，你马上就会看到。你*不会*合成委托的\
    \ setter 和 getter。相反，你将添加一个显式的 setter 和 getter 对。这有点巧妙，因为你要通过引用此类所有实例中的单个变量来与委托和所选页面通信。为此，你使用静态类变量（`s_pDelegate`\
    \ 和 `s_nSelectedDestinationNumber`）而不是实例变量。这样一来，一旦设置，每个实例的这些变量都具有相同的值。（实例变量对于类的每个实例都有单独的值。类变量对于类的所有实例都有一个共享值。）\n\
    \n将 “15 DataViewController.m – add static variables and their getters/setters”\
    \ 代码片段拖入，并放到 `@synthesize dataObject = _dataObject;` 下方，如图 图 5-52 所示。\n\n![images](img/9781430242727_Fig05-53.jpg)\n\
    \n### 图 5-53. *让 `viewWillAppear` 遵循我们自己的文本。*\n\n9.  你可能会注意到，在 `viewWillAppear`\
    \ 中，它实际上是在用数据对象 `[self.dataObject description]` 的描述来设置标签文本 `self.dataLabel.text`，而该描述结果就是月份对象。\n\
    \n```\n- (void)viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \    self.datalabel.text = [self.dataObject description];\n}\n```\n\n如你所知，这是 Apple\
    \ 为了方便而随机选择用于通用基于页面的应用示例的默认“应用”。然而，你正在制作一份旅行宣传册，因此需要更改它：将 “16 DataViewController.m\
    \ – in viewWill Appear: replace datalabel assignment code with …” 拖入，并插入到 `[super\
    \ viewWillAppear:animated];` 下方（确保删除它当前下方的代码行）。\n\n这现在设定了你希望在视图出现之前执行的任务。具体来说，你想将图像和新的标签文本设置为当前\
    \ `pageObject` 中存储的内容：\n\n```\nself.ivPageImage.image = [UIImage imageNamed:self.pageObject.filename];\n\
    self.dataLabel.text = self.pageObject.pageTitle;\n```\n\n现在，一旦你打开手册并进入第二页，你会在图像上放置透明按钮：\n\
    \n```\n[self placeImageSelectorButtonAtLocation:CGPointMake( 50, 100) tag:1];\n\
    [self placeImageSelectorButtonAtLocation:CGPointMake(510,  90) tag:2];\n[self\
    \ placeImageSelectorButtonAtLocation:CGPointMake(180, 350) tag:3];\n[self placeImageSelectorButtonAtLocation:CGPointMake(610,\
    \ 350) tag:4];\n```\n\n然后在图像上放置一组标记以指示用户选择（这些标记将一次显示一个）：\n\n```\n[self placeSelectionIndicatorAtLocation:CGPointMake(190,\
    \  85) label:@\"1\"];\n[self placeSelectionIndicatorAtLocation:CGPointMake(660,\
    \ 100) label:@\"2\"];\n[self placeSelectionIndicatorAtLocation:CGPointMake(345,\
    \ 360) label:@\"3\"];\n[self placeSelectionIndicatorAtLocation:CGPointMake(750,\
    \ 330) label:@\"4\"];\n```\n\n你在这里还可以选择显示和隐藏标记：\n\n```\n[self showHideImageSelectionIndicator:s_nSelectedDestinationNumber];\n\
    ```\n\n这显示在 图 5-53 中。\n\n![images](img/9781430242727_Fig05-54.jpg)\n\n### 图 5-54.\
    \ *仅更改为横向。*\n\n10. 默认的模板应用同时支持横向和纵向，但你的应用仅支持横向。你需要通过修改 `shouldAutorotateToInterfaceOrientation:`\
    \ 使其仅对横向返回 `true` 来更改这一点。将 “17 DataViewController.m –replace rotation ok code”\
    \ 拖入，并替换 `return YES;` 代码，如图 图 5-54 所示。\n\n![images](img/9781430242727_Fig05-55.jpg)\n\
    \n### 图 5-55. *添加我们的私有方法。*\n\n11. 现在你需要实现我们一直在讨论的所有私有方法。将 “18 DataViewController.m\
    \ – insert utility methods - just before @end” 拖入，并插入到 `@end` 之前。\n\n在这里，你实现了创建和定位隐藏按钮与标记的私有方法（参见\
    \ 图 5-54）：\n\n`placeImageSelectorButtonAtLocation` 和 `placeSelectionIndicatorAtLocation`\n\
    \n查看 `placeSelectionIndicatorAtLocation:` 方法的实现，请注意它只是创建一个 `UIButton` 实例，设置其位置和背景图像，并将标记按钮添加到视图中：\n\
    \n```\n[btnImageIndicator setBackgroundImage:[UIImage imageNamed:@\"LetsGoCloud\"\
    ]\n                             forState:UIControlStateNormal];\n```\n\n你还为每个按钮定义了一个标签，以便稍后仅显示用户当前选中的那个，并使其不可触摸：\n\
    \n```\nbtnImageIndicator.tag = [text intValue] + 10;\nbtnImageIndicator.userInteractionEnabled\
    \ = NO;  // 不可触摸！\n```\n\n我们还编写了按钮代码，以便如果用户点击四个隐藏按钮中的任何一个，会调用一个操作方法：\n\n```\n\
    -(void)onButtonPress:(UIButton*)sender\n{\n    s_nSelectedDestinationNumber =\
    \ sender.tag;\n    [self showHideImageSelectionIndicator:s_nSelectedDestinationNumber];\n\
    \    [self.delegate dataViewControllerSelectedDestination:s_nSelectedDestinationNumber];\n\
    }\n```\n\n当它被调用时，会调用委托方法 `[self.delegate dataViewControllerSelectedDestination:s_nSelectedDestinationNumber];`，该方法进而告诉你的\
    \ `RootViewController` 要加载哪个页面集。\n\n这显示在 图 5-55 中。\n\n12. 现在你可以构建并查看一切是否正常工作。如果你没有遗漏任何内容，应该会看到“构建成功”的消息。\n"
- fmt: "### Step 5: Code: `RootViewController`\n\n![images](images/9781430242727_Fig05-56.jpg)\n\
    \n**Figure 5-56.** *Let’s code the `RootViewController` to handle the communication\
    \ it will be receiving.*\n\n1. Open up the `RootViewController.h` file. Drag in\
    \ \"19 `RootViewController.h` – add include\" and insert it right after the `#import\
    \ <UIKit/UIKit.h>` as shown in [Figure 5-56](#Chapter05.html#fig_5_56). You do\
    \ this because you need make the `DataViewControllerDelegate` protocol visible\
    \ to the `RootViewController`, because you’re going to make it conform to this\
    \ new protocol. But it’s not there yet, so let’s add it in. Remove the closing\
    \ angle bracket at the end of `@interface` line, drag in \"20 `RootViewController.h`\
    \ – add protocol,\" and insert it right alongside `UIPageViewControllerDelegate`,\
    \ as shown here:\n\n```\n#import <UIKit/UIKit.h>\n#import \"DataViewController.h\"\
    \n\n@interface RootViewController : UIViewController <UIPageViewControllerDelegate,\n\
    DataViewControllerDelegate> {\n}\n\n@property (strong, nonatomic) UIPageViewController\
    \ *pageViewController;\n@end\n```\n\n![images](images/9781430242727_Fig05-57.jpg)\n\
    \n**Figure 5-57.** *Finish the implementation.*\n\n2. You’re done with the header.\
    \ It’s time to finish the implementation. Navigate to `RootViewController.m`.\
    \ The first thing you want to take care of is that you no longer need `#import\
    \ \"DataViewController.h\"` because it’s in your header file, so delete it. Note\
    \ the warning on line 23 in [Figure 5-57](#Chapter05.html#fig_5_57). That’s there\
    \ because your protocol method isn’t implemented yet. So first set the delegate.\
    \ Find the `viewDidLoad` method implementation, drag in \"21 `RootViewController.m`\
    \ – set delegate (`startingViewController.delegate = self;`),\" and insert it\
    \ right after the `DataViewController *startingViewController` instantiation and\
    \ before `NSArray *viewControllers` as shown here:\n\n```\nDataViewController\
    \ *startingViewController = [self.modelController\nviewControllerAtIndex:0 storyboard:self.storyboard];\n\
    startingViewController.delegate = self;  // tell object we want to hear from it\n\
    \    NSArray *viewControllers = [NSArray arrayWithObject:startingViewController];\n\
    ```\n\nYou have to do this because you, not Apple, support this delegate, so you\
    \ need to insert code to actually set the delegate. The `RootViewController` will\
    \ now receive the messages from the `DataViewController`.\n\n![images](images/9781430242727_Fig05-58.jpg)\n\
    \n**Figure 5-58.** *Support Landscape only.*\n\n3. Again you need to show that\
    \ you support Landscape only. Go to `shouldAutorotateToInterfaceOrientation:`,\
    \ delete the `return YES;` line of code, drag in \"22 `RootViewController.m` –\
    \ replace rotation ok code,\" and insert it as shown in [Figure 5-58](#Chapter05.html#fig_5_58).\n\
    \n![images](images/9781430242727_Fig05-59.jpg)\n\n**Figure 5-59.** *Adjust the\
    \ `PageViewController`.*\n\n4. You need to adjust the `PageViewController` now,\
    \ considering that with an iPad, if you’re in Portrait it will be a single presentation.\
    \ If you’re in Landscape, it goes to a dual page presentation with left and right\
    \ pages by default. You’re not going to do this. You’re going to use the Portrait-only\
    \ option (although displaying the app in Landscape mode). So find the `pageViewController:spineLocationForInterfaceOrientation:`\
    \ method, select the bottom portion of its code that’s related to the Landscape\
    \ option (it starts with the `// In landscape orientation…` comment), and delete\
    \ it as shown in [Figure 5-59](#Chapter05.html#fig_5_59). Lastly, remove the surrounding\
    \ `if (UIInterfaceOrientationIsPortrait(orientation)) {}` statement, so only the\
    \ code inside the `if`-statement is left in the implementation.\n\n![images](images/9781430242727_Fig05-60.jpg)\n\
    \n**Figure 5-60.** *Final view of the `pageViewController`*\n\n5. [Figure 5-60](#Chapter05.html#fig_5_60)\
    \ is a final view of the deleting we did in the previous step. It doesn’t fit\
    \ in the figure so we’ve placed it here in smaller font for your convenience:\n\
    \n```\n- (void)pageViewController:(UIPageViewController *)pageViewController\n\
    didFinishAnimating:(BOOL)finished previousViewControllers:(NSArray\n*)previousViewControllers\
    \ transitionCompleted:(BOOL)completed\n{}\n */\n- (UIPageViewControllerSpineLocation)pageViewController:(UIPageViewController\n\
    *)pageViewController\nspineLocationForInterfaceOrientation:(UIInterfaceOrientation)orientation\n\
    {\n  // In portrait orientation: Set the spine position to \"min\" and the page\
    \ view\ncontroller's view controllers array to contain just one view controller.\
    \ Setting\nthe spine position to 'UIPageViewControllerSpineLocationMid' in landscape\n\
    orientation sets the doubleSided property to YES, so set it to NO here.\n  UIViewController\
    \ *currentViewController =\n[self.pageViewController.viewControllers objectAtIndex:0];\n\
    \  NSArray *viewControllers = [NSArray arrayWithObject:currentViewController];\n\
    \  [self.pageViewController setViewControllers:viewControllers\ndirection:UIPageViewControllerNavigationDirectionForward\
    \ animated:YES\ncompletion:NULL];\n  self.pageViewController.doubleSided = NO;\n\
    \  return UIPageViewControllerSpineLocationMin;\n}\n@end\n```\n\n![images](images/9781430242727_Fig05-61.jpg)\n\
    \n**Figure 5-61.** *Insert the delegate response methods and run it.*\n\n6. Insert\
    \ the delegate response methods by dragging in \"23 `RootViewController.m` – add\
    \ DVC - delegate method\" and inserting it right before the `@end` as shown in\
    \ [Figure 5-61](#Chapter05.html#fig_5_61). We know you’ve been waiting for this\
    \ for a while. Go ahead and Run it!\n\n![images](images/9781430242727_Fig05-62.jpg)\n\
    \n**Figure 5-62.** *Initial splash*\n\n7. The initial splash screen to the four-page\
    \ flyer is shown in [Figure 5-62](#Chapter05.html#fig_5_62), with the red circle\
    \ showing from where to swipe (or tap) to turn the page.\n\n![images](images/9781430242727_Fig05-63.jpg)\n\
    \n**Figure 5-63.** *The page navigation*\n\n8. Once the user enters the flyer\
    \ they see that we have four destinations. As the user taps on them, they see\
    \ that they are clickable. The \"Let’s go here\" indicator appears on the one\
    \ the user has tapped and is immediately hidden on the one the user last tapped.\
    \ You want to make sure that whatever image the user selects correctly selects\
    \ the expected next page when they tap to go to the next page as shown in the\
    \ right-hand picture in [Figure 5-63](#Chapter05.html#fig_5_63). Sure enough,\
    \ the trip to Los Angeles 2 million years ago appears. Similarly, [Figure 5-64](#Chapter05.html#fig_5_64)\
    \ shows Cape Town, 1.3 million years ago. Wow!\n\n![images](images/9781430242727_Fig05-64.jpg)\n\
    \n**Figure 5-64.** *More views*\n\n## Chapter 6"
