  trans: '

    # 第四章


    # 构建一个工具型应用


    到目前为止，在本书中，你已经使用 Storyboard 构建了两个单视图应用。在第二章中你构建了 AlienView，在第三章中你构建了 FlickrPhotoMap。现在我们继续前进，你将要使用
    Storyboard 构建一个工具型应用。当你想要创建易于使用、由两个页面组成的应用时——一个是主视图页面，另一个是带有翻转动画过渡效果的视图页面——通常会用到工具型应用。工具型应用会为这两个页面设置两个关键按钮：一个信息按钮和一个完成按钮。信息按钮会将用户从主视图翻转到翻转视图，而完成按钮则会将用户翻转回主视图。


    你可能没有意识到，但你很可能非常熟悉 iPhone 自带的一个工具型应用，那就是天气应用，如图 4-1 所示。天气应用是工具型应用的完美范例，因为它优化了一个只需最少用户交互的简单任务。


    工具型应用也是三个特殊模板之一，它与基于导航的应用和基于窗口的应用一样，是唯一三个提供自动包含 Core Data 支持选项的项目模板。此外，工具型应用是
    Xcode 中最全面的模板之一——它从一开始就实现了一个功能完整的工具型应用。


    我们将通过编码一个非常酷的应用来介绍使用 Storyboard 的工具型应用，这个应用教会音乐人何时为特定的流派或情绪选择特定的音阶。它在原声吉他和电吉他的指板上显示指法标记，并为每个音阶附带相应的声音。


    ![images](img/9781430242727_Fig04-01.jpg)


    **图 4-1.** *iPhone 自带的天气应用可能是最著名且最常用的工具型应用。*


    ## utilityScales：一个工具型应用


    首先，我们来谈谈我们的 utilityScales 设计决策：我们选择通过创建一个让你能听到原声吉他和电吉他上各种音阶的应用，来演示工具型应用模板的使用。我们选择了八种音乐音阶来展示这个概念。


    我们需要显示一个音阶列表，以及每个音阶所关联的流派和情绪。考虑到这一点，我们决定使用翻转视图控制器中已有的表视图来列出音阶。我们还为表格单元格选择了副标题布局，以便同时显示每个音阶的类别及其名称。我们选择
    iPad 布局，因为它为音阶指法图片提供了更多空间。我们为程序创建了资源，包括两种吉他的各 8 种音阶、16 个相关的音阶指法图、每个吉他用于播放按钮的小图片、一个加载（或默认）屏幕、一个应用图标等等。这意味着总共需要
    16 个音频文件和 23 个图形文件。


    我们决定让用户界面有些非标准，因为希望为每种吉他类型都设置播放/停止按钮。它们需要具有相同的功能，因此我们将功能封装在一个专用的 `PlayButton`
    类中。为了整合音频播放功能——包括加载文件、启动和停止播放等所需的特殊配置和方法——我们选择将这些功能封装在它自己的类中（一个拥有自己 `.h`/`.m`
    文件的对象）。


    最后，我们有八种音阶，每种都有两个音频文件、两张图片、一个标题和一个描述——所有这些我们都选择存储在名为 `Scale` 的新类（也是一个拥有自己 `.h`/`.m`
    文件的对象）的实例中。这让我们可以编写八个初始化语句，而不是必须用所有这些属性来初始化许多不同的数组。


    在 Storyboard 文件中，我们设置了主显示的初始背景、具有自定义颜色的导航栏，以及一个半透明的“面板”，我们在上面通过编程方式放置了两个播放按钮。在
    Storyboard 的翻转部分，我们配置并命名了单个动态单元格模板，并配置了标题栏的颜色和文本。


    我们将此项目分为不同阶段：一个用于在 Xcode 中设置项目，一个用于设置 Storyboard，两个用于编码。具体如下：


    *   **设置**：使用模板进行设置、调整项目设置、拖入资源并添加框架。

    *   **准备 Storyboard**：在主页视图和第二个视图中，你将调整导航栏、颜色和按钮等，并添加 `UIImagesViews`、`UITableViews`
    和着陆视图。

    *   **编码主视图控制器**：编码和连接。


    ## 预备知识


    与第二章和第三章类似，我们在 [`http://bit.ly/sMRvAP`](http://bit.ly/sMRvAP) 提供了本章所需的所有文件和代码，如图
    4-2 所示。和往常一样，请花时间清理你的桌面，并将所有图片和音频文件下载到桌面上，然后你就可以开始了。如果需要更多帮助，请访问 [`http://bit.ly/oLVwpY`](http://bit.ly/oLVwpY)
    上的论坛。特别要确保在开始之前，你已经从 [`http://bit.ly/sMRvAP`](http://bit.ly/sMRvAP) 下载了 DemoMonkey
    文件，并将其解压到桌面上。


    ![images](img/9781430242727_Fig04-02.jpg)


    **图 4-2.** *选择工具型应用。*

