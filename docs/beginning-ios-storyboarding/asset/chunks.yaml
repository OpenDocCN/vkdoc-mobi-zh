  trans: '

    # 设计顶层视图：作者场景


    ![images](img/9781430242727_Fig07-20.jpg)


    **图 7-20.** *选择“分类”场景并复制它。*


    1.  你已经完成了第一个根视图“图书”的设计，它会导向分类。接下来需要的视图是“作者”。这个视图会与刚才制作的“分类”视图非常相似。为了节省时间，可以像图
    7-20 所示，点击该场景，然后按下 ![images](img/U003.jpg)+C 将其复制并粘贴到你的故事板中。


    ![images](img/9781430242727_Fig07-21.jpg)


    **图 7-21.** *粘贴新场景。*


    2.  在故事板背景（蓝色方格纸外观）上单击一次，然后按 ![images](img/U003.jpg)+V，如图 7-21 所示。


    **注意：** 一开始看起来似乎什么都没发生，因为它被直接粘贴到了原始场景的上方。


    ![images](img/9781430242727_Fig07-22.jpg)


    **图 7-22.** *缩小视图并重新排列。*


    3.  你需要拖动刚才创建的新场景，它目前位于“分类”场景的上面。首先缩小视图，然后按照图 7-22 所示，将新场景拖动到“分类”场景正下方的位置。


    **注意：** 严格来说，称其为 `[YourName] View Controller Scene` 是正确的。然而，在各个 Xcode 社区中，有些人选择将其简称为视图或场景。因此，即使在苹果内部，对此也存在争议。Xcode
    书籍、博客和会议论文也未达成一致。我们使用这两个术语来帮助你习惯人们可能会用其中任何一种方式来指代。


    ![images](img/9781430242727_Fig07-23.jpg)


    **图 7-23.** *在 Master 中选择“作者”静态单元格。*


    4.  放大回来，如图 7-23 所示，点击主视图控制器中的“作者”单元格，然后开始按住 Control 键拖向新添加的场景。


    ![images](img/9781430242727_Fig07-24.jpg)


    **图 7-24.** *将主视图控制器的“作者”单元格连接到“作者”场景。*


    5.  继续从主视图控制器按住 Control 键拖动，当到达“作者”场景的表格视图时松开，如图 7-24 所示。


    ![images](img/9781430242727_Fig07-25.jpg)


    **图 7-25.** *创建 Push 转场。*


    6.  松开后，从故事板转场菜单中选择 Push 选项，如图 7-25 所示。选择该转场，并在属性检查器中将其 `Identifier` 属性设置为 `ShowAuthors`，方法与你在步骤
    17 中对 `ShowCategories` 转场所做的一样。


    ![images](img/9781430242727_Fig07-26.jpg)


    **图 7-26.** *一些修改*


    7.  将导航栏上的“分类”标题改为“作者”，并将顶部原型单元格的“分类名称”标签改为“作者姓名”。此外，由于我们在这里不需要“所有图书”单元格，将其删除。现在你的“作者”场景应该看起来就像图
    7-26 所示的那样。


    ![images](img/9781430242727_Fig07-27.jpg)


    **图 7-27.** *创建另一个视图控制器。*


    8.  下一个视图是用来显示图书列表的，这些图书属于用户选择的分类或作者。这意味着你必须创建另一个视图控制器。它与你刚才为“作者”场景复制的那个非常相似——你可以再次将其用作这个新视图控制器的基础。除非你之后复制了其他内容，否则剪贴板中应该还有“分类”场景的副本，所以只需点击蓝色故事板画布上的任意位置，然后按
    ![images](img/U003.jpg)+V 再次粘贴（否则，将“分类”场景再次复制到剪贴板并粘贴到故事板画布上）。缩小视图，将详细视图控制器移到右侧，留出足够空间，以便将新的视图控制器放置在其左侧，如图
    7-27 所示。


    # 布局主图书列表视图：图书场景


    ![images](img/9781430242727_Fig07-28.jpg)


    **图 7-28.** *创建自定义单元格。*


    1.  在此视图中，用户会看到一个图书列表，每一行都显示书名和图书封面缩略图。你在第 6 章中拖入了一些图书图片。我们需要在这里做的，是将现在的 Basic
    类型的“分类名称”单元格更改为自定义单元格，以便添加自定义 UI 元素。点击该单元格，然后在属性检查器中将样式从 Basic 改为 Custom，如图 7-28
    所示。


    ![images](img/9781430242727_Fig07-29.jpg)


    **图 7-29.** *向自定义单元格中拖入一个 UIImageView 和三个标签。*


    2.  选中顶部单元格，打开尺寸检查器，将行高改为 87，以适应图书封面图片的高度。你还需要一个 `UIImageView` 来承载图书图片，因此将一个 `UIImageView`
    拖入单元格。将图像视图的宽度设为 50，高度设为 66（可以使用尺寸检查器或鼠标）。你还需要显示三个关于图书的信息标签：标题、出版年份和作者。将一个标签拖到图像视图的右侧，配置好之后，将其复制并粘贴两次。图
    7-29 显示了正在将第一个标签拖入单元格。


    ![images](img/9781430242727_Fig07-30.jpg)


    **图 7-30.** *复制并粘贴第一个标签。*


    3.  将第一个标签复制并粘贴两次，然后将这些标签上下对齐排列好。拖动每个标签的右侧边缘，使其占据单元格的大部分区域——或者使用尺寸检查器将它们的宽度都设为
    200 点。选中顶部标签，回到属性检查器，取消选中 Autoshrink 选项，将字体改为 System Bold 17.0，并将其颜色改为蓝色。然后，将每个标签的文本分别改为“标题”、“作者”和“出版年份”，如图
    7-30 所示。我们还将*出版年份*的字体大小改为了 System 15.0，因为原来的字号看起来有点太大了。保存你的工作。


    **注意：** 你在原型单元格中添加文本仅为了辅助设计过程。由于它是原型单元格，所有标签标题都将在运行时动态分配，但向我们的元素中添加占位符数据有助于指导你完成布局和自定义过程。


    ![images](img/9781430242727_Fig07-31.jpg)


    **图 7-31.** *添加子视图*


    4.  你还希望能够随时显示任何分类中的图书总数。这可以通过在表格视图内容底部、原型单元格下方放置一个任意 `UIView` 来轻松实现。如图 7-31 所示，从对象库中拖一个基本的
    `UIView` 到表格视图中。


    ![images](img/9781430242727_Fig07-32.jpg)


    **图 7-32.** *在标签中输入临时文本。*


    5.  你还需要添加一个文本标签来告知用户计数，所以从对象库中拖入一个 `UILabel`，并将其放置在你上一步添加的 `UIView` 内部。拖拽两侧的控点使其覆盖整个视图，将文本居中，然后输入临时文本“5
    books”，如图 7-32 所示。（之后你可能还想将文本颜色改为深灰色，字体改为 System Bold 15。）


    **注意：** 这个页脚视图可以包含任何内容，比如图像、按钮、文本视图、地图——只要是应用程序需要的都可以。使用故事板可以轻松布局多样化的应用 UI，而无需在故事板背后编写大量代码。


    ![images](img/9781430242727_Fig07-33.jpg)


    **图 7-33.** *查看图片的显示效果。*

    '
- fmt: '6. To get even better visual overview of the appearance of your custom cell
    at runtime, check out an example book cover image. When the app is running, it
    will retrieve the images for each book based on data stored in the SQLite database.
    But for now, click the blank Image View, locate the `Image` property in the Attributes
    Inspector, and enter `1.png` or choose any other image filename from your `Supporting
    Files` images folder. If you do select the `1.png` file, then it should look similar
    to what’s shown in [Figure 7-33](#Chapter07.html#fig_7_33). While you’re in the
    Attributes Inspector, also change the `Background` color of the Image View to
    Light Gray, just so it stays visible in case you don’t have an image to display
    for some of the books.


    ![images](images/9781430242727_Fig07-34.jpg)


    **Figure 7-34.** *Connect the “Category name” prototype cell to the newly created
    scene.*


    7.  You want the book list to display a specific list of books whenever a user
    taps a cell in the parent View Controller (the “Category name,” “All books,” and
    “Author name” cells). This means you still need to make segues from each of the
    three parent cells to your newly created View Controller Scene. Select “Category
    name” prototype cell and Control-drag to the newly created View Controller as
    shown in [Figure 7-34](#Chapter07.html#fig_7_34). When you release the segue connector,
    choose `Push` from the Storyboard Segues menu.


    ![images](images/9781430242727_Fig07-35.jpg)


    **Figure 7-35.** *Connect the “All books” cell to the newly created scene.*


    8.  Select the “All books” cell and Control-drag to the same View Controller as
    in the previous step, which is shown in [Figure 7-35](#Chapter07.html#fig_7_35).
    Make it a `Push` segue as well.


    ![images](images/9781430242727_Fig07-36.jpg)


    **Figure 7-36.** *Connect the “Author name” prototype cell to the newly created
    scene.*


    9.  Scroll down to the Authors Scene, select the “Author name” cell, and Control-drag
    up to the newly created View Controller as shown in [Figure 7-36](#Chapter07.html#fig_7_36).
    When you release the segue connector, choose the `Push` option from the Storyboard
    Segues menu.


    ![images](images/9781430242727_Fig07-37.jpg)


    **Figure 7-37.** *Specify unique identifiers for each segue.*


    10.  Now that you’ve connected the segues, you need to do one more step because
    you have to pass additional data to the book list View Controller. You need to
    specify an identifier for each segue so you can access them later when you code.
    Select the “Category name” cell segue (1a in [Figure 7-37](#Chapter07.html#fig_7_37))
    and in the Attributes Inspector, enter `ShowCategoryBooks` as its `Identifier`
    property (1b in [Figure 7-37](#Chapter07.html#fig_7_37)). Select the “All books”
    cell segue (2a in [Figure 7-37](#Chapter07.html#fig_7_37)) and set its `Identifier`
    to `ShowAllBooks` (2b in [Figure 7-37](#Chapter07.html#fig_7_37)). Select the
    “Author name” cell segue (3a in [Figure 7-37](#Chapter07.html#fig_7_37)) and set
    the `Identifier` property to `ShowAuthorBooks` (3b in [Figure 7-37](#Chapter07.html#fig_7_37)).


    ![images](images/9781430242727_Fig07-38.jpg)


    **Figure 7-38.** *Change the Categories title to Books.*


    11.  As you may have noticed, your book list view still displays the title Categories
    because you created it by copying the Categories scene and modifying it. Let’s
    change it to match its contents. Double-click the text and replace it with `Books`
    as shown in [Figure 7-38](#Chapter07.html#fig_7_38). You may also get rid of the
    “All books” cell prototype, as it doesn’t apply to this View Controller (although
    it won’t cause any problems if you leave it as is; that cell will just never get
    used for this Table View).


    ![images](images/9781430242727_Fig07-39.jpg)


    **Figure 7-39.** *Modifying the “Author name” cell*


    12.  Let’s make the Authors Scene a bit more interesting by making each author’s
    cell display a count, at the end of the cell, of how many books by this author
    are in the database. (In real life you may create, for example, an inventory app
    wherein your client can immediately see the tally of items in stock. This data
    will be calculated on the back end and displayed inside each cell. This step is
    a perfect example to teach you how to do that.) So, modify the “Author name” cell.
    Select it and in the Attributes Inspector change the `Style` property from `Basic`
    to `Custom`. Also drag a label onto the cell, placing it on its left-hand side
    as shown in [Figure 7-39](#Chapter07.html#fig_7_39).


    ![images](images/9781430242727_Fig07-40.jpg)


    **Figure 7-40.** *Adjust the two labels.*


    13.  Drag a second label (this one will hold the count) onto the right-hand side
    of the cell as shown in [Figure 7-40](#Chapter07.html#fig_7_40). With it still
    selected, in the Attributes Inspector set its `Text` attribute to any number,
    so you can remember its role later. We gave ours the number `5`. Also, align the
    text to the right, make it `System Bold 16.0` font, and change the font color
    to blue.


    ![images](images/9781430242727_Fig07-41.jpg)


    **Figure 7-41.** *Change Label to Author.*


    14.  Now select the first label you brought in, make it wide enough to take all
    the space up to the beginning of the count label, set its font to `System Bold
    20`, and change its text to `Author name` as shown in [Figure 7-41](#Chapter07.html#fig_7_41).'
