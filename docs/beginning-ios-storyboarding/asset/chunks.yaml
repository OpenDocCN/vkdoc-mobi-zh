  trans: "\n22. 在 图 3-27 的 JSON 示例中，你可以看到 Flickr 的响应并不包含实际的图像数据。要下载图像并获取其地理空间数据，你需要提取“photo”集合中每张图片的信息，并执行几个额外的步骤。在这种情况下，最便捷的方式是利用\
    \ iOS 5 的新特性：`NSJSONSerialization` 类。它是一个原生 JSON 解析器，可以将 JSON 转换为 Foundation 对象（通常根据\
    \ JSON 文档结构转换为 `NSDictionary` 或 `NSArray`），反之亦然。`NSJSONSerialization` 类有一个名为 `JSONObjectWithData:options:error`\
    \ 的静态方法。你将用它把 Flickr JSON 数据转换成 `NSDictionary`。\n\n![images](img/9781430242727_Fig03-27.jpg)\n\
    \n**图 3-27.** *在 Chrome 浏览器中显示的 Flickr JSON 响应*\n\n23. 让我们为步骤 18 中提到的 `saveData:`\
    \ 方法添加实现。在 `MapViewController.m` 文件中找到它的占位符，并插入 图 3-28 所示的代码（DemoMonkey 步骤“[09\
    \ MapViewController.m saveData:]”）。\n\n这个方法初看可能有点复杂，但实际上非常简单。因为你在步骤 19 中看到了 JSON\
    \ 响应的层级结构，所以你知道结果字典中的哪个键能让你访问到你感兴趣的照片数组。以下代码将 JSON 数据解析为 `NSDictionary`，并将存储在\
    \ `photo` 键下的照片信息项数组保存到 `NSArray` 中以便进一步处理：\n\n```\nNSError *error = nil;\nNSMutableDictionary\
    \ *response = [NSJSONSerialization JSONObjectWithData:data\noptions:NSJSONReadingMutableContainers\
    \ error:&error];\nNSArray *photos = [[response objectForKey:@\"photos\"] objectForKey:@\"\
    photo\"];\n```\n\n![images](img/9781430242727_Fig03-28.jpg)\n\n**图 3-28.** *添加\
    \ saveData: 方法实现。*\n\n24. 在这个例子中，`photos` 数组是一个 `NSDictionary` 对象的数组。每个字典都包含照片的信息，例如\
    \ ID、农场、服务器、标题等，你可以根据这些信息构建 URL，以便从 Flickr 获取实际的图像数据和图像地理位置。\n\n请注意，我们使用 `NSJSONReadingMutableContainers`\
    \ 选项来解析 JSON 数据。这样做是为了能够向解析后的对象追加额外信息（如缩略图 URL、图像 URL 和地理编码）。\n\n25. 回到 `saveData:`\
    \ 方法的其余代码：解析 JSON 数据之后，初始化步骤 11 中声明的变量，并开始枚举数组。在这个 `for` 循环中，你只需根据每张照片信息字典中存储的属性，构造三种类型的\
    \ URL 字符串。稍后你将使用这些 URL 来加载每张照片的缩略图、中等尺寸图像和图像地理空间数据。构造上述 URL 的规则可在 Flickr API 文档\
    \ [`www.flickr.com/services/api/misc.urls.html`](http://www.flickr.com/services/api/misc.urls.html)\
    \ 中找到。最后，将包含每张照片数据的字典保存到 `parsedDataDictionary` 变量中。使用照片 ID 字符串作为键，以便稍后可以通过照片\
    \ ID 直接检索并更新每张照片字典的地理空间数据。方法中的最后一个代码块与步骤 18 中的几乎相同。由于照片的地理位置数据单独存储在 Flickr 上，你需要使用刚为每张照片构建的\
    \ `photoGeoInfoURLString` 再次调用 API 来获取其位置数据：\n\n```\ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0), ^{\n    NSData *data = [NSData dataWithContentsOfURL:[NSURL\n    URLWithString:photoGeoInfoURLString]];\n\
    \    [self performSelectorOnMainThread:@selector(saveGeoCodeData:) withObject:data\n\
    \    waitUntilDone:YES];\n    });\n```\n\n一旦数据完全获取，将调用 `saveGeoCodeData:` 方法进行解析和保存，接下来你将实现这个方法。\n\
    \n26. 找到 `saveGeoCodeData:` 的占位符，并插入 图 3-29 所示的代码（如果你使用 DemoMonkey，将步骤“[10 MapViewController.m\
    \ saveGeoCodeData:]”拖放到方法占位符中）。这个方法与上一步讨论的 `saveData:` 方法非常相似，不同之处在于这里你只需要从 JSON\
    \ 响应中检索两个值（照片拍摄地点的纬度和经度）。因此，你使用相同的 `NSJSONSerialization` 类解析 JSON 数据，如果没有错误，则将地理编码值保存到通过照片\
    \ ID 键从 `parsedPhotosDictionary` 变量中检索到的对应照片信息字典中。请注意，这次解析选项设置为 `kNilOptions`\
    \ 常量，因为你在此情况下不需要解析后的对象是可修改的。\n\n当所有对象都更新完毕后，停止进度指示器并调用将在 `MapView` 上标注照片的方法：\n\
    \n```\n  if (updatesCount == totalNumberOfPhotos) {\n           [self.activityIndicator\
    \ stopAnimating];\n           [self populateMapWithPhotoAnnotations];\n      }\n\
    ```\n\n![images](img/9781430242727_Fig03-29.jpg)\n\n**图 3-29.** *添加 saveGeoCodeData:\
    \ 方法实现。*\n\n27. 找到 `populateMapWithPhotoAnnotation` 方法的占位符，并插入 图 3-30 所示的代码（DemoMonkey\
    \ 步骤“11 MapViewController.m populateMapWithPhotoAnnotation”）。在这一步中，你将添加代码以在 `MapView`\
    \ 上标注具有地理标签的照片。为此，遍历你保存在 `parsedPhotosDictionary` 中的对象。如果 `latitude` 和 `longitude`\
    \ 值不为空，则为该照片创建一个 `PhotoAnnotation` 对象，使用照片信息字典中的必要数据（标题、地理编码、URL 等）对其进行初始化，并将其保存到一个临时的\
    \ `NSArray` 中。最后，将所有创建的标注添加到 `MapView`。此时，你不再需要 `parsedPhotosDictionary` 变量中存储的数据，因此只需将其值设置为\
    \ nil 即可释放它所占用的内存。\n\n![images](img/9781430242727_Fig03-30.jpg)\n\n**图 3-30.**\
    \ *添加 populateMapWithPhotoAnnotation 方法实现。*\n\n28. 现在你应该能够看到你的工作成果，如 图 3-31 所示。如果你点击任意标注，将会弹出一个标注气泡，显示该标注所代表的照片名称。\n\
    \n![images](img/9781430242727_Fig03-31.jpg)\n\n**图 3-31.** *构建并运行 App。*\n"
- fmt: '### Step 2: Making a Transition to a Secondary Scene from Annotation Callouts


    In the second of your three steps you’ll create a secondary scene in Storyboard,
    which will display a medium-size image represented by a selected `MapView` annotation
    and the full image name. You’re going to make the app transition to that scene
    every time the user clicks the selected annotation’s callout disclosure button.


    1.  [Chapter 2](#Chapter02.html#ch2) showed you how to embed a View Controller
    into a Navigation Controller using an Xcode menu. This step shows you an alternative
    way of accomplishing the same task. You can use either, based on your preference.
    Go the Storyboard file and drag a Navigation Controller from the Object Library
    onto the canvas. Place it to the left of your `MapViewController` as shown in
    [Figure 3-32](#Chapter03.html#fig_3_32).


    ![images](images/9781430242727_Fig03-32.jpg)


    **Figure 3-32.** *Drag a Navigation Controller onto the Storyboard.*


    2.  You can get rid of the default Root View Controller that was automatically
    added to the scene by selecting it and pressing Delete. Additionally, grab the
    Initial View Controller arrow that’s pointing to the `MapView` Controller and
    drag it onto the newly added Navigation Controller as shown in [Figure 3-33](#Chapter03.html#fig_3_33).


    ![images](images/9781430242727_Fig03-33.jpg)


    **Figure 3-33.** *Set the Navigation Controller to be the Initial View Controller.*


    3.  Create the `rootViewController` relationship between the Navigation Controller
    and the `MapView` Controller by Control-dragging from the Navigation Controller
    to the `MapView` Controller as shown in [Figure 3-34](#Chapter03.html#fig_3_34).
    Let it go and select Relationship – `rootViewController` from the menu as shown
    in [Figure 3-35](#Chapter03.html#fig_3_35).


    ![images](images/9781430242727_Fig03-34.jpg)


    **Figure 3-34.** *Control-drag from the Navigation Controller to the MapView Controller.*


    ![images](images/9781430242727_Fig03-35.jpg)


    **Figure 3-35.** *Create the rootViewController relationship.*


    4.  Select the Navigation Controller and in the Attributes Inspector set its Top
    Bar to Translucent Black Navigation Bar as shown in [Figure 3-36](#Chapter03.html#fig_3_36).


    ![images](images/9781430242727_Fig03-36.jpg)


    **Figure 3-36.** *Set the Top Bar property of the Navigation Controller to Translucent
    Black Navigation Bar.*


    5.  Drag another View Controller from the Object Library onto the canvas. Place
    it just to the right of the `MapView` Controller as shown in [Figure 3-37](#Chapter03.html#fig_3_37).


    ![images](images/9781430242727_Fig03-37.jpg)


    **Figure 3-37.** *Add a new View Controller to the Storyboard.*


    6.  Create a Storyboard Segue by Control-dragging from the `MapView` Controller
    icon to View Controller as shown in [Figure 3-38](#Chapter03.html#fig_3_38). Release
    it and choose Push as the segue type from the menu as shown in [Figure 3-39](#Chapter03.html#fig_3_39).
    Select the new segue and set its `Identifier` property in the Attributes Inspector
    to `ShowFullSizeImageSegue` as shown in [Figure 3-40](#Chapter03.html#fig_3_40).
    Lastly, double-click the View Controller’s Navigation Bar and set its title to
    `Selected Photo` as shown in [Figure 3-41](#Chapter03.html#fig_3_41).


    ![images](images/9781430242727_Fig03-38.jpg)


    **Figure 3-38.** *Control-drag from the MapView Controller to the new View Controller.*


    ![images](images/9781430242727_Fig03-39.jpg)


    **Figure 3-39.** *Create Push segue.*


    ![images](images/9781430242727_Fig03-40.jpg)


    **Figure 3-40.** *Set the segue’s Identifier.*


    ![images](images/9781430242727_Fig03-41.jpg)


    **Figure 3-41.** *Set the View Controller’s title.*


    7.  You’re now ready to add the rest of the elements to your new scene. You’re
    going to need a `UIImageView` to display the downloaded Flickr image and a `UILabel`
    to show its title. So go ahead and drag an Image View onto the View Controller‘s
    view, make it approximately 230 points high and 320 points wide, and position
    it closer to the top as shown in [Figure 3-42](#Chapter03.html#fig_3_42).


    ![images](images/9781430242727_Fig03-42.jpg)


    **Figure 3-42.** *Add an Image View to the scene.*


    8.  Now find a Label in the Object Library and drag it onto the View as well.
    Adjust its width and position it below the Image View as shown in [Figure 3-43](#Chapter03.html#fig_3_43).
