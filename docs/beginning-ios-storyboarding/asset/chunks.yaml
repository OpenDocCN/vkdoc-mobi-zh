- fmt: '# Designing the Top Level Views: Authors Scene


    ![images](images/9781430242727_Fig07-20.jpg)


    **Figure 7-20.** *Select the Categories Scene and copy it.*


    1.  You’re finished with the first of your two Root Views: Books that leads to
    Categories. The next view you need is Authors. That view will be very similar
    to the Categories View you just made. To save time you can simply copy this scene
    and paste it into your Storyboard by clicking the scene as shown in [Figure 7-20](#Chapter07.html#fig_7_20)
    and pressing ![images](images/U003.jpg)+C.


    ![images](images/9781430242727_Fig07-21.jpg)


    **Figure 7-21.** *Paste the new scene.*


    2.  Click once on the Storyboard background (indicated by the blue graph paper
    look) and press ![images](images/U003.jpg)+V as shown in [Figure 7-21](#Chapter07.html#fig_7_21).


    **NOTE:** It will look like nothing happened at first because it’s been pasted
    right on top of the original scene.


    ![images](images/9781430242727_Fig07-22.jpg)


    **Figure 7-22.** *Zoom out and reorganize.*


    3.  You need to drag the new scene you created, which is currently residing on
    top of the Categories Scene. First zoom out and then drag the new scene as shown
    in [Figure 7-22](#Chapter07.html#fig_7_22) to a position directly below the Categories
    Scene.


    **NOTE:** Strictly speaking, it’s correct to call it the `[YourName] View Controller
    Scene`. However, in various Xcode communities some have chosen to shorten the
    name to either View or Scene. Hence, even within Apple, there are arguments on
    this matter. Xcode books, blogs, and conference proceedings also don’t yet agree.
    We refer to them using both terms in order to get you used to people referring
    to it either way.


    ![images](images/9781430242727_Fig07-23.jpg)


    **Figure 7-23.** *Select the Authors static cell in Master.*


    4.  Zoom back in, click the Authors cell in the Master View Controller as shown
    in [Figure 7-23](#Chapter07.html#fig_7_23), and begin to Control-drag toward the
    newly added scene.


    ![images](images/9781430242727_Fig07-24.jpg)


    **Figure 7-24.** *Connect the Authors cell of Master View Controller to the Authors
    Scene.*


    5.  Continue Control-dragging from the Master View Controller and release it when
    you get to the Table View of the Authors Scene as shown in [Figure 7-24](#Chapter07.html#fig_7_24).


    ![images](images/9781430242727_Fig07-25.jpg)


    **Figure 7-25.** *Create a Push segue.*


    6.  When you release, select the Push option from the Storyboard Segues menu as
    shown in [Figure 7-25](#Chapter07.html#fig_7_25). Select the segue and set its
    `Identifier` property to `ShowAuthors` in the Attributes Inspector as you did
    for the `ShowCategories` segue in step 17.


    ![images](images/9781430242727_Fig07-26.jpg)


    **Figure 7-26.** *Some modifications*


    7.  Change the Categories title on the Navigation Bar to Authors, and the “Category
    name” label of the top prototype cell to “Author name.” Also, because we don’t
    need the “All Books” cell here, delete it. Your Authors Scene should now look
    just like the one shown in [Figure 7-26](#Chapter07.html#fig_7_26).


    ![images](images/9781430242727_Fig07-27.jpg)


    **Figure 7-27.** *Create another View Controller.*


    8.  The next view is the one to display a list of books, belonging either to a
    category or author that the user selects. This means you have to create another
    View Controller. It’s going to be very similar to the one you just copied for
    the Authors Scene—you can use it again as a basis for this new View Controller.
    You still have a copy of the Categories Scene in your clipboard unless you’ve
    copied something else since, so just click anywhere on the blue Storyboard canvas
    and press ![images](images/U003.jpg)+V to paste it again (otherwise copy the Categories
    Scene to the clipboard again and paste it onto the Storyboard canvas). Zoom out,
    moving the Detail View Controller over to the right-hand side to make enough room
    to position the new View Controller just to the left of it as shown in [Figure
    7-27](#Chapter07.html#fig_7_27).


    # Laying Out the Main Book List View: Books Scene


    ![images](images/9781430242727_Fig07-28.jpg)


    **Figure 7-28.** *Create the Custom cell.*


    1.  In this view users see a list of books in which each row displays the title
    and a thumbnail of the book cover. You dragged in some book images in [Chapter
    6](#Chapter06.html#ch6). What we need to do here is change the “Category name”
    cell, which is now a Basic cell, to a Custom cell you can add custom UI elements
    to. Click the cell and in the Attributes Inspector change the Style from Basic
    to Custom as shown in [Figure 7-28](#Chapter07.html#fig_7_28).


    ![images](images/9781430242727_Fig07-29.jpg)


    **Figure 7-29.** *Drag one UIImageView and three labels into the Custom cell.*


    2.  With the top cell selected, open the Size Inspector and change the row height
    to 87 to accommodate the height of the book cover images. You also need a `UIImageView`
    to hold the book image, so drag a `UIImageView` into the cell. Make the Image
    View width 50 and the Image View height 66 (using either the Size Inspector or
    your mouse). You also need to display three information labels for the book cover:
    title, publishing year, and author. Drag a label to the right of the Image View
    and, after configuring it, copy and paste it twice. [Figure 7-29](#Chapter07.html#fig_7_29)
    shows the first label being dragged onto the cell.


    ![images](images/9781430242727_Fig07-30.jpg)


    **Figure 7-30.** *Copy and paste the first label.*


    3.  Copy and paste the first labels two times and align the labels under each
    other nicely. Drag the right side of each label over so that it fills the majority
    of the cell—or make them all 200 points in width using the Size Inspector. With
    the top label selected, go back to the Attributes Inspector, uncheck the Autoshrink
    option, change the font to System Bold 17.0, and change its color to blue. Then
    change the text of each label to “Title,” “Author.” and “publication year” respectively
    as shown in [Figure 7-30](#Chapter07.html#fig_7_30). We also changed the font
    size of *publication year* to be System 15.0 because it just looked a little too
    big. Save your work.


    **NOTE:** You’re adding text to prototype cells solely to help the design process.
    Because it’s a prototype cell, all the label titles will be assigned dynamically
    during the runtime, but adding placeholder data to our elements helps guide you
    through the layout and customization process.


    ![images](images/9781430242727_Fig07-31.jpg)


    **Figure 7-31.** *Adding a subview*


    4.  You also want the ability to show, at all times, a total count of the books
    you have in any category. You can easily achieve that by placing an arbitrary
    `UIView` at the bottom of our Table View contents, underneath the prototype cells.
    Drag a basic `UIView` from the Object Library into the Table View as shown in
    [Figure 7-31](#Chapter07.html#fig_7_31).


    ![images](images/9781430242727_Fig07-32.jpg)


    **Figure 7-32.** *Enter temporary text into the label.*


    5.  You also need to add a text label to tell the user what the count is, so drag
    a `UILabel` from the Object Library and place it inside the `UIView` you added
    in the previous step. Pull the handles out on each side to cover the entire view,
    center the text, and enter the temporary text “5 books” as shown in [Figure 7-32](#Chapter07.html#fig_7_32).
    (You may then want to change the text color to Dark Gray Color and the font to
    System Bold 15.)


    **NOTE:** This footer view can contain anything, such as an image, a button, a
    text view, a map—whatever the application needs. Using Storyboards makes it easy
    to lay out diverse application UIs without having to code much behind the Storyboard.


    ![images](images/9781430242727_Fig07-33.jpg)


    **Figure 7-33.** *See what an image will look like.*'
