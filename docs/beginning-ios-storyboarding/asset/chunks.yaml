  trans: "\n#### 创建 SelectionViewController\n\n![images](img/9781430242727_Fig08-14.jpg)\n\
    \n**图 8-14.** *创建 SelectionViewController。*\n\n1. 故事板中的另一个“叶子”场景允许用户在创建新书时选择作者或类别。按下\
    \ ![images](img/U003.jpg)+N 创建新的子类，选择 Objective-C 类后，点击“下一步”，步骤与 图 8-1 中相同。将这个类命名为\
    \ `SelectionViewController`，确保它是 `UITableViewController` 的子类，然后点击“下一步”，如 图 8-14\
    \ 所示。\n\n![images](img/9781430242727_Fig08-15.jpg)\n\n**图 8-15.** *替换 SelectionViewController.h\
    \ 中的代码。*\n\n2. 你将彻底修改 `SelectionViewController` 的头文件，因此为节省时间，你只需替换整个代码，原因会在后续步骤中解释。首先，选中\
    \ `SelectionViewController.h` 中的所有原始代码并删除。从 DemoMonkey 中拖入“13 SelectionViewController.h\
    \ interface + Protocol”代码片段，并将其放置在文件底部，如 图 8-15 和本步骤后续内容所示。\n\n首先，你定义了一个数组，该数组将在转场过程中传递给视图控制器。它将包含\
    \ `DBAuthor` 或 `DBCategory` 对象的集合，具体取决于用户点击的单元格。通过以下代码实现：\n\n`@property (nonatomic,\
    \ strong) NSArray *objects;`\n\n然后，你需要返回用户所做的图书或类别选择。这意味着你需要一个委托对象，将选择结果传回给它。通过以下代码实现：\n\
    \n`@property (nonatomic, assign) id<SelectionVCDelegate> delegate;`\n\n最后，你定义了一个包含\
    \ `selectionViewController:didSelectObject:` 方法的协议，用于将选择结果传回给委托：\n\n`@protocol\
    \ SelectionVCDelegate <NSObject>`\n    `- (void)selectionVC:(SelectionViewController\
    \ *)aVC didSelectObject:(id)anObject;`\n\n![images](img/9781430242727_Fig08-16.jpg)\n\
    \n**图 8-16.** *合成并导入你在头文件中添加的内容。*\n\n3. 现在，你需要合成在头文件中创建的 `delegate` 和 `objects`\
    \ 属性。打开 `SelectionViewController.m` 文件。此处没有对应的 DemoMonkey 步骤，因此只需在 `@implementation\
    \ SelectionViewController` 下方输入 `@synthesize delegate;` 和 `@synthesize objects;`。你还需要导入\
    \ Author 和 Category 数据库实体的头文件，因为你需要访问它们的属性。从 DemoMonkey 中拖入“--SelectionViewController.m\
    \ imports”代码片段，并将其放置在 `#import \"SelectionViewController.h\"` 下方，如 图 8-16 和以下代码所示：\n\
    \n```\n#import \"SelectionViewController.h\"\n    #import \"DBAuthor.h\"\n   \
    \ #import \"DBCategory.h\"\n\n@interface SelectionViewController ()\n\n@end\n\n\
    @implementation SelectionViewController\n    @synthesize delegate;\n    @synthesize\
    \ objects;\n\n- (id)initWithStyle:(UITableViewStyle)style\n```\n\n![images](img/9781430242727_Fig08-17.jpg)\n\
    \n**图 8-17.** *替换 UITableViewDataSource 协议方法。*\n\n4. 现在，你将添加表格视图的代码。你将替换 Xcode\
    \ 已为你插入的 `TableViewDataSource` 协议方法，用自己的代码替换，以避免混淆。向下滚动到刚才操作的位置下方。转到 `shouldAutorotateToInterfaceOrientation`\
    \ 方法的末尾，选中从那里到 `@end` 之前的所有内容并删除。从 DemoMonkey 中拖入“14 SelectionViewController.m\
    \ TableView Datasource and Delegate”代码片段，并将其放置在 `@end` 之前，如 图 8-17 所示。\n\n由于你将此表格视图控制器同时用于类别和作者，因此在\
    \ `cellForRowAtIndexPath:(NSIndexPath *)indexPath` 方法中检查数组中对象的类，如果是类别，则从数据库中显示类别名称。\n\
    \n```\nif ([object isKindOfClass:[DBCategory class]]) {\n        cell.textLabel.text\
    \ = ((DBCategory *)object).categoryName;\n    }\n```\n\n……如果是作者，则显示作者姓名：\n\n```\n\
    if ([object isKindOfClass:[DBAuthor class]]) {\n        cell.textLabel.text =\
    \ ((DBAuthor *)object).fullName;\n    }\n```\n\n然后，当用户做出选择时，回调委托，将用户选择的对象传递过去：\n\
    \n```\nif ([self.delegate respondsToSelector:@selector(selectionVC:didSelectObject:)])\
    \ {\n        [self.delegate selectionVC:self didSelectObject:[objects\n      \
    \  objectAtIndex:indexPath.row]];\n    }\n```\n\n现在保存文件，因为你需要返回故事板，将此 `ViewController`\
    \ 类分配给对应的场景。\n\n![images](img/9781430242727_Fig08-18.jpg)\n\n**图 8-18.** *点击“选择场景”并将其与\
    \ SelectionViewController 关联。*\n\n5. 打开故事板，转到“添加图书场景”右侧的表格视图控制器（请参见 图 7-77）。单击一次表格视图控制器图标，如\
    \ 图 8-18 中左侧箭头所示。选中视图控制器后，转到身份检查器，将其类设置为你刚刚编码的：`SelectionViewController`，如 图 8-18\
    \ 中右侧箭头所示。选中原型单元格，切换到属性检查器，并确保其标识符属性设置为 `Cell`。\n"
- fmt: "# Coding the Add Book View Controller\n\n![images](images/9781430242727_Fig08-19.jpg)\n\
    \n**Figure 8-19.** *Create the next class, AddBookViewController.*\n\n1. Press\
    \ ![images](images/U003.jpg)+N to create a new subclass and, after selecting the\
    \ Objective-C class, click Next. Name it `AddBookViewController` and make it a\
    \ subclass of `UITableViewController` as shown in [Figure 8-19](#Chapter08.html#fig_8_19).\
    \ Once saved, you’ll first want to add outlets to it, so let’s go back to Storyboard.\n\
    \n![images](images/9781430242727_Fig08-20.jpg)\n\n**Figure 8-20.** *Add Outlets\
    \ to AddBookViewController.*\n\n2. Open up Storyboard and select the Add Book\
    \ Table View Controller just as you selected the Selection View Controller in\
    \ [Figure 8-18](#Chapter08.html#fig_8_18). With the Table View Controller selected,\
    \ go to the Identity Inspector and make the Class adhere to what you just created,\
    \ the `AddBookViewController` as shown in [Figure 8-20](#Chapter08.html#fig_8_20).\n\
    \n![images](images/9781430242727_Fig08-21.jpg)\n\n**Figure 8-21.** *Select the\
    \ AddBookViewController implementation file.*\n\n3. Switch to the Assistant editor\
    \ mode. In the right-hand pane you’ll see that by default Xcode brings up the\
    \ header file. You want to work in the implementation file, so in the selection\
    \ ribbon above the code of the header file select the implementation file as shown\
    \ in [Figure 8-21](#Chapter08.html#fig_8_21).\n\n![images](images/9781430242727_Fig08-22.jpg)\n\
    \n**Figure 8-22.** *Create outlets for the title and year attributes.*\n\n4. You\
    \ want to make outlets for the title of the book and the year of the book first.\
    \ Click once on the title text field area to the right of the title label and\
    \ Control-drag over to the implementation file below the `@interface` as shown\
    \ in [Figure 8-22](#Chapter08.html#fig_8_22). Name it `_titleTextField` in the\
    \ pop-up dialog. Repeat the same for the year text field and name it `_yearTextField`.\
    \ Your outlet code should now look like the following:\n\n```\n#import \"AddBookViewController.h\"\
    \n\n@interface AddBookViewController () {\n    NSMutableDictionary *_bookDict;\n\
    }\n\n@property (weak, nonatomic) IBOutlet UITextField *_titleTextField;\n@property\
    \ (weak, nonatomic) IBOutlet UITextField *_yearTextField;\n...\n```\n\n![images](images/9781430242727_Fig08-23.jpg)\n\
    \n**Figure 8-23.** *Create an outlet for the Description text.*\n\n5. You need\
    \ to make one more `IBOutlet` here. The tricky part is to make sure to only click\
    \ the text as shown in [Figure 8-23](#Chapter08.html#fig_8_23) and that you only\
    \ click it once. Once correctly selected, Control-drag over to the implementation\
    \ file and name the outlet `_descriptionTextView` as shown here:\n\n```\n#import\
    \ \"AddBookViewController.h\"\n\n@interface AddBookViewController () {\n    NSMutableDictionary\
    \ *_bookDict;\n}\n\n@property (weak, nonatomic) IBOutlet UITextField *_titleTextField;\n\
    @property (weak, nonatomic) IBOutlet UITextField *_yearTextField;\n@property (weak,\
    \ nonatomic) IBOutlet UITextView *_descriptionTextView;\n...\n```\n\nWhile focused\
    \ on this Text View, you can really empty the text out of here because users will\
    \ be entering data into it when they create a new book. So, with the text View\
    \ still selected, go to the Attributes Inspector and delete all the text in the\
    \ text box.\n\n![images](images/9781430242727_Fig08-24.jpg)\n\n**Figure 8-24.**\
    \ *Set up the delegate for your text fields.*\n\n6. You need to set the delegate\
    \ of your text fields to be the Add Book View Controller so you can save the data\
    \ that the user types into them. Control-drag from the title text field to the\
    \ Table View Controller icon in the Dock as shown in [Figure 8-24](#Chapter08.html#fig_8_24).\
    \ Another dialog connection window appears with options, divided under two sections:\
    \ Storyboard Segues and Outlets. You want this to be an outlet, so select delegate,\
    \ nested inside the Outlets option. Repeat the exact same procedure with the year\
    \ text field.\n\n![images](images/9781430242727_Fig08-25.jpg)\n\n**Figure 8-25.**\
    \ *Set up the delegate for Description Text View.*\n\n7. You now need to set up\
    \ the delegate for your Description Text View. Control-drag from the Text View\
    \ as shown in [Figure 8-25](#Chapter08.html#fig_8_25). Again, you want this to\
    \ be an outlet, so select delegate nested inside the Outlets option.\n\n![images](images/9781430242727_Fig08-26.jpg)\n\
    \n**Figure 8-26.** *Editing the new interface*\n\n8. Close the Assistant and open\
    \ the Standard editor. Open the `AddBookViewController.h` header file so you can\
    \ modify the interface. Delete the three lines of code that appear by default\
    \ and replace them with the next snippet you saved in DemoMonkey. Drag in the\
    \ “15 AddBookViewController.h interface and protocol” snippet from DemoMonkey\
    \ and place it where you just deleted the original header text. This is shown\
    \ in [Figure 8-26](#Chapter08.html#fig_8_26).\n\nThe `delegate` property and `AddBookVCDelegate`\
    \ protocol you included in the header file\n\n```\n@property (nonatomic, assign)\
    \ id<AddBookVCDelegate> delegate;\n```\n\nis what you’ll use to notify the parent\
    \ View Controller when the new database entity has been created, which will be\
    \ passed up to the implementation file so it can be displayed as follows:\n\n\
    ```\n- (void)addBookVC:(AddBookViewController *)aVC didCreateObject:(id)anObject;\n\
    ```\n\nBefore you forget, let’s synthesize the delegate.\n\n![images](images/9781430242727_Fig08-27.jpg)\n\
    \n**Figure 8-27.** *Synthesize the delegate.*\n\n9. Open up the `AddBookViewController.m`\
    \ file and synthesize the delegate as shown in [Figure 8-27](#Chapter08.html#fig_8_27)\
    \ and as follows:\n\n```\n@interface AddBookViewController () {\n    ...\n   \
    \ ...\n    @end\n\n@implementation AddBookViewController\n    @synthesize _titleTextField;\n\
    \    @synthesize _yearTextField;\n    @synthesize _descriptionTextView;\n    @synthesize\
    \ delegate;\n...\n```\n\n![images](images/9781430242727_Fig08-28.jpg)\n\n**Figure\
    \ 8-28.** *Add mutable dictionary and #import your database entities.*\n\n10.\
    \ While the user is entering the information about the new book, such as title,\
    \ year and book description, you need a place to safely and temporarily store\
    \ the data until they tap Save. You could do this in many ways: one of them is\
    \ to use a mutable dictionary. That means you need an `NSMutableDictionary` instance\
    \ variable, from which you’ll create a new entity later. Call it `_bookDict`.\
    \ Declare it inside a set of curly braces right under the `@interface` in the\
    \ private declarations section, as shown in the following code. You need to import\
    \ all your database entities. Drag in the “-- AddBookViewController.m Imports”\
    \ snippet from DemoMonkey and place it under the `#import` as shown in [Figure\
    \ 8-28](#Chapter08.html#fig_8_28) and as follows.\n\n```\n#import \"AddBookViewController.h\"\
    \n#import \"DBBook.h\"\n#import \"DBCategory.h\"\n#import \"DBAuthor.h\"\n\n@interface\
    \ AddBookViewController () {\n    NSMutableDictionary *_bookDict;\n}\n\n@property\
    \ (weak, nonatomic) IBOutlet UITextField *_titleTextField;\n...\n...\n```\n\n\
    ![images](images/9781430242727_Fig08-29.jpg)\n\n**Figure 8-29.** *Bring in the\
    \ text field delegate methods.*\n\n11. Because this is a Static Table View, you\
    \ don’t need to implement `dataSources` or delegate methods, so delete everything\
    \ between the end of the `shouldAutorotateToInterface` rotation method to just\
    \ before the `@end`. In its place bring in things you do need, such as the text\
    \ field delegate methods and the Text View delegate methods, which will help you\
    \ save the data as the user enters the information. Starting with the text field\
    \ delegate methods, drag in the “16 AddBookViewController.m Text Field Delegate\
    \ Methods” snippet from DemoMonkey and place it before the `@end`. It should look\
    \ like what’s shown in [Figure 8-29](#Chapter08.html#fig_8_29).\n\n![images](images/9781430242727_Fig08-30.jpg)\n\
    \n**Figure 8-30.** *Bring in the text view delegate methods.*"
