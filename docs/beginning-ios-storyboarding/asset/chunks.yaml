    \ 组合键，确保所有内容都能正确构建，如图 5-43 所示。\n\n**注意：** 您本可以使用“10 ModelController.m – 在 viewControllerAfterViewController:\
    \ 中，用...替换最终等号右侧的内容”代码片段，但大多数人会像我们一样复制粘贴 `MAX_PAGES`。\n\n### 第 4 步：代码：DataViewController\n\
    \n![images](img/9781430242727_Fig05-44.jpg)\n\n**图 5-44.** *打开 `DataViewController`。*\n\
    \n1. 首先，请记住，`DataViewController` 是一个负责管理您希望用户查看和交互的视图的类，它与负责呈现页面的 `RootViewController`\
    \ 和 `ModelController` 协同工作。因此，按图 5-44 所示打开 `DataViewController`。\n\n![images](img/9781430242727_Fig05-45.jpg)\n\
    \n**图 5-45.** *为我们的前向声明添加协议委托。*\n\n2. 您首先需要添加一个协议前向声明。拖入“11 DataViewController.h\
    \ – 添加协议前向声明”代码片段，并将其放在 `@interface` 之前，如图 5-45 所示。您需要 `@protocol DataViewControllerDelegate`；前向声明的原因是您需要声明一个遵循此协议的委托属性（这意味着协议定义的方法将由委托类实现）。然后，当您的用户选择一个目的地时，这个\
    \ `DataViewController` 将通过此协议中的某个方法，通知正在监听的对象（即委托）所选目的地的编号。您将在后续步骤中看到这一点。\n\n\
    接下来，`DataViewController` 需要一个新属性。您已经有了数据标签 `*dataLabel`，但您在 Storyboard 中创建了一个新的图像视图，而目前您*没有*办法在其中显示图像。因此，您需要跳回\
    \ Storyboard 并添加它。让我们快速处理一下。\n\n![images](img/9781430242727_Fig05-46.jpg)\n\n\
    **图 5-46.** *打开 Storyboard。*\n\n3. 按图 5-46 所示打开 Storyboard，但确保同时点击助理编辑器，这在图 5-46\
    \ 中没有显示。\n\n![images](img/9781430242727_Fig05-47.jpg)\n\n**图 5-47.** *确保助理编辑器的默认设置设为“自动”。*\n\
    \n4. 确保助理编辑器的默认设置设为“自动”。我们之前设置的是“手动”，您的可能也是如此。点击“前向”和“后向”两个箭头右侧的标签，该标签可能显示“自动”或“手动”，如图\
    \ 5-47 所示。\n\n![images](img/9781430242727_Fig05-48.jpg)\n\n**图 5-48.** *按住 Control\
    \ 键拖拽到头文件。*\n\n5. 选择助理编辑器并将其设为“自动”后，按住 Control 键从 `UIImageView` 拖拽到您现有属性旁边的 `DataViewController.h`\
    \ 文件中，如图 5-48 所示。\n\n![images](img/9781430242727_Fig05-49.jpg)\n\n**图 5-49.**\
    \ *命名 `UIImageView` 数据类型。*\n\n6. Xcode 知道这是一个 `UIImageView` 数据类型，因此对话框弹出后您无需更改。不过，您确实需要给它起个名字。这是您的页面图像变量，所以在名字“`PageImage`”前面加上“`iv`”（我们使用数据类型名称以便记住每个变量引用的类型）。如图\
    \ 5-49 所示，将其命名为 `ivPageImage`。好了，我们已经完成了最初在 Storyboard 中忘记做的事情，因此让我们回到 `DataViewController`\
    \ 的头文件（您可以关闭助理编辑器，切换回标准编辑器）。\n\n![images](img/9781430242727_Fig05-50.jpg)\n\n\
    **图 5-50.** *将新的委托属性添加到头文件中。*\n\n7. 拖入“12 DataViewController.h – 插入两个属性和协议 - 就在\
    \ @end 之前”代码片段，并将其插入到 `@end` 之前。这里我们插入了新的委托属性以及我们在第 44 步中前向声明的协议定义。如图 5-50 所示，您会看到几个警告，这是因为您尚未完成实现，这属于正常情况。让我们转到实现文件，让一切正常运行起来！\n\
    \n![images](img/9781430242727_Fig05-51.jpg)\n"
- fmt: "### Figure 5-51. *Open the implementation file and import the page data objects.*\n\
    \n8.  Notice that because you did the drag-and-drop for `ivPageImage` through\
    \ the Storyboard, Xcode added the necessary implementation code for you as well:\
    \ `@synthesis` and the `ivPageImage` in the `viewDidUnload` is set to `nil`. Now\
    \ you need to import the interface for the `pageData` object. Drag in the “13\
    \ DataViewController.m – add import and pageData object (`#import \"ModelPageData.h\"\
    `)” snippet and insert it under the `#import \"DataViewController.h\"`.\n\nYou\
    \ also need to add some methods to the private interface. Drag in the “14 DataViewController.m\
    \ – add methods to private interface” snippet and insert it alongside, not under,\
    \ the `@interface DataViewController` as shown [Figure 5-51](#Chapter05.html#fig_5_51).\n\
    \nThe private method declarations added to the `DataViewController.m` file are\
    \ as follows:\n\n```\n-(void)onButtonPress:(UIButton*)sender;\n-(void)showHideImageSelectionIndicator:(NSInteger)imageNbr;\n\
    -(void)placeImageSelectorButtonAtLocation:(CGPoint)location tag:(NSInteger)tag;\n\
    -(void)placeSelectionIndicatorAtLocation:(CGPoint)location label:(NSString*)text;\n\
    ```\n\n![images](images/9781430242727_Fig05-52.jpg)\n\n### Figure 5-52. *Bring\
    \ in the setter overrides.*\n\nNote that as of yet you don’t have your delegate\
    \ property synthesized. There’s a reason for this, and you’re just about to see\
    \ it. You’re *not* going to synthesize the delegate setter and getter. Rather,\
    \ you’re going to add an explicit setter and getter pair. This is a little bit\
    \ sneaky because you’re going to communicate with the delegate and the selected\
    \ page by referencing a single variable from all instances of this class. You\
    \ do this by using your static class variables (`s_pDelegate` and `s_nSelectedDestinationNumber`)\
    \ rather than instance variables. This way every instance has the same value for\
    \ these guys once they are set. (Instance variables have separate values for each\
    \ instance of a class. Class variables have a single shared value for all instances\
    \ of a class.)\n\nDrag in the “15 DataViewController.m – add static variables\
    \ and their getters/setters” snippet and drop it in below the `@synthesize dataObject\
    \ = _dataObject;` as shown in [Figure 5-52](#Chapter05.html#fig_5_52).\n\n![images](images/9781430242727_Fig05-53.jpg)\n\
    \n### Figure 5-53. *Make `viewWillAppear` adhere to our own text.*\n\n9.  You\
    \ may notice in `viewWillAppear` that it’s actually setting a label text `self.dataLabel.text`\
    \ with a description of the data object `[self.dataObject description]`, which\
    \ turns out to be the month object.\n\n```\n- (void)viewWillAppear:(BOOL)animated\n\
    {\n    [super viewWillAppear:animated];\n    self.datalabel.text = [self.dataObject\
    \ description];\n}\n```\n\nAs you know by now, this is the default “app” that\
    \ Apple, for our convenience, randomly chose to use for the generic Page-Based\
    \ App sample. However, you are doing a travel flyer, so you need to change this\
    \ by dragging in “16 DataViewController.m – in viewWill Appear: replace datalabel\
    \ assignment code with …” and inserting it under `[super viewWillAppear:animated];`\
    \ (making sure you remove the line that’s currently underneath it).\n\nThis now\
    \ sets out the tasks that you want to execute just before the view appears. Specifically,\
    \ you want to set the image and the new label text to the ones stored in the current\
    \ `pageObject`:\n\n```\nself.ivPageImage.image = [UIImage imageNamed:self.pageObject.filename];\n\
    self.dataLabel.text = self.pageObject.pageTitle;\n```\n\nNow, once you open up\
    \ the brochure and are on the second page, you put transparent buttons over the\
    \ images:\n\n```\n[self placeImageSelectorButtonAtLocation:CGPointMake( 50, 100)\
    \ tag:1];\n[self placeImageSelectorButtonAtLocation:CGPointMake(510,  90) tag:2];\n\
    [self placeImageSelectorButtonAtLocation:CGPointMake(180, 350) tag:3];\n[self\
    \ placeImageSelectorButtonAtLocation:CGPointMake(610, 350) tag:4];\n```\n\nThen\
    \ put a set of markers on the images to indicate user selection (these will be\
    \ displayed one at a time):\n\n```\n[self placeSelectionIndicatorAtLocation:CGPointMake(190,\
    \  85) label:@\"1\"];\n[self placeSelectionIndicatorAtLocation:CGPointMake(660,\
    \ 100) label:@\"2\"];\n[self placeSelectionIndicatorAtLocation:CGPointMake(345,\
    \ 360) label:@\"3\"];\n[self placeSelectionIndicatorAtLocation:CGPointMake(750,\
    \ 330) label:@\"4\"];\n```\n\nYou’re also choosing to show and hide the markers\
    \ here:\n\n```\n[self showHideImageSelectionIndicator:s_nSelectedDestinationNumber];\n\
    ```\n\nThis is shown in [Figure 5-53](#Chapter05.html#fig_5_53).\n\n![images](images/9781430242727_Fig05-54.jpg)\n\
    \n### Figure 5-54. *Change to Landscape only.*\n\n10.  The default template app\
    \ is designed for both Landscape and Portrait orientations, but yours is Landscape\
    \ only. You need to change this by modifying `shouldAutorotateToInterfaceOrientation:`\
    \ to return true only for Landscape. Drag in “17 DataViewController.m –replace\
    \ rotation ok code” and insert in place of the `return YES;` code as shown in\
    \ [Figure 5-54](#Chapter05.html#fig_5_54).\n\n![images](images/9781430242727_Fig05-55.jpg)\n\
    \n### Figure 5-55. *Add our private methods.*\n\n11.  You now need to implement\
    \ all the private methods we’ve been talking about. Drag in “18 DataViewController.m\
    \ – insert utility methods - just before @end” and insert it right before the\
    \ `@end`.\n\nHere you implement the private methods that create and position the\
    \ hidden buttons and markers (see [Figure 5-54](#Chapter05.html#fig_5_54)):\n\n\
    `placeImageSelectorButtonAtLocation` and `placeSelectionIndicatorAtLocation`\n\
    \nLooking at the implementation of `placeSelectionIndicatorAtLocation:` method,\
    \ note that it simply creates a `UIButton` instance, sets its position and background\
    \ image, and adds the marker button to the view:\n\n```\n[btnImageIndicator setBackgroundImage:[UIImage\
    \ imageNamed:@\"LetsGoCloud\"]\n                             forState:UIControlStateNormal];\n\
    ```\n\nYou also define a tag for each button so you can later show only the one\
    \ that’s currently selected by the user, as well as make it non-touchable:\n\n\
    ```\nbtnImageIndicator.tag = [text intValue] + 10;\nbtnImageIndicator.userInteractionEnabled\
    \ = NO;  // not touchable!\n```\n\nWe also have coded our buttons so that if your\
    \ user taps on any of the four hidden buttons, an action method gets called:\n\
    \n```\n-(void)onButtonPress:(UIButton*)sender\n{\n    s_nSelectedDestinationNumber\
    \ = sender.tag;\n    [self showHideImageSelectionIndicator:s_nSelectedDestinationNumber];\n\
    \    [self.delegate dataViewControllerSelectedDestination:s_nSelectedDestinationNumber];\n\
    }\n```\n\nWhen it’s called it invokes the delegate method `[self.delegate dataViewControllerSelectedDestination:s_nSelectedDestinationNumber];`\
    \ which in turn tells your `RootViewController` which page set to load.\n\nThis\
    \ is shown in [Figure 5-55](#Chapter05.html#fig_5_55).\n\n12.  You’re now ready\
    \ to Build and see if it all works. If you didn’t miss anything, you should see\
    \ a “Build Succeeded” message."
