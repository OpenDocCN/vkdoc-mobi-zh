- fmt: "```objc\n- (UITableViewCell *)tableView:(UITableView *)tableView\n    cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *cellIdentifier = nil;\n    if (indexPath.row\
    \ < _categories.count) {\n        cellIdentifier = @\"Cell\";\n    }\n    else\
    \ if (indexPath.row == _categories.count) {\n        cellIdentifier = @\"AllCell\"\
    ;\n    }\n    else {\n        cellIdentifier = @\"AddCell\";\n    }\n```\n![images](images/9781430242727_Fig08-64.jpg)\n\
    \n**Figure 8-64.** Bring in code that will delete the categories.\n\n9.  You now\
    \ need to bring in code that will delete the categories. Drag in the “29 CategoriesViewController.m\
    \ Delete Categories” snippet from DemoMonkey and place it right before the `@end`\
    \ as shown in [Figure 8-64](#Chapter08.html#fig_8_64). You may notice that this\
    \ is almost identical to Delete Books in [Figure 8-51](#Chapter08.html#fig_8_51).\n\
    \n![images](images/9781430242727_Fig08-65.jpg)\n\n**Figure 8-65.** Add a new category.\n\
    \n10.  Adding a new category is a little different, though. Because you only need\
    \ to capture the category name, you don’t need a whole new View Controller for\
    \ that—you can do it using a `UIAlertView`. Drag in the “30 CategoriesViewController.m\
    \ Add New Category” snippet from DemoMonkey and place it right before the `@end`\
    \ as shown in [Figure 8-65](#Chapter08.html#fig_8_65).\n\nHere, once the user\
    \ clicks the “Add new” cell\n\n```objc\nif ([cell.reuseIdentifier isEqualToString:@\"\
    AddCell\"]) {\n```\n\nyou simply pop a standard `UIAlertView` that contains a\
    \ built-in `UITextField`:\n\n```objc\nUIAlertView *alertView = [[UIAlertView alloc]\
    \ initWithTitle:@\"Add Category\"\n    message:nil delegate:self cancelButtonTitle:@\"\
    Cancel\" otherButtonTitles:@\"Add\",\n    nil];\nalertView.alertViewStyle = UIAlertViewStylePlainTextInput;\n\
    UITextField *alertTextField = [alertView textFieldAtIndex:0];\n```\n\nYou then\
    \ implement the `UIAlertViewDelegate` method:\n\n```objc\n- (void)alertView:(UIAlertView\
    \ *)alertView\n    didDismissWithButtonIndex:(NSInteger)buttonIndex\n```\n\nSave\
    \ the category into the database and add it to the `_categories` array:\n\n```objc\n\
    DBCategory *newCategory = [DBCategory createEntityWithDictionary:[NSDictionary\n\
    \    dictionaryWithObject:categoryName forKey:@\"categoryName\"]];\n[_categories\
    \ insertObject:newCategory atIndex:0];\n```\n\nInsert a new row into the Table\
    \ View:\n\n```objc\n[self._tableView insertRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\n\
    \    withRowAnimation:UITableViewRowAnimationAutomatic];\n```\n![images](images/9781430242727_Fig08-66.jpg)\n\
    \n**Figure 8-66.** Implement the `prepareForSegue:` method.\n\n11.  Next you’ll\
    \ implement the `prepareForSegue:` method. Drag in the “31 CategoriesViewController.m\
    \ PrepareForSegue” snippet from DemoMonkey and place it right before the `@end`\
    \ as shown in [Figure 8-66](#Chapter08.html#fig_8_66).\n\nWhile storyboarding\
    \ your UI, you specified two segues from the Categories Scene, between which you\
    \ must distinguish:\n\n```objc\n([[segue identifier] isEqualToString:@\"ShowCategoryBooks\"\
    ])\n```\n\nand\n\n```objc\nif ([[segue identifier] isEqualToString:@\"ShowAllBooks\"\
    ])\n```\n\nIn the first case, you set the Category property of the destination\
    \ View Controller, which is `BooksViewController`, to the currently selected Category,\
    \ and also reset its Author property to nil, in case it was previously assigned\
    \ a value:\n\n```objc\n[(BooksViewController *)[segue destinationViewController]\
    \ setCategory:object];\n[(BooksViewController *)[segue destinationViewController]\
    \ setAuthor:nil];\n```\n\nThis way you make sure `BooksViewController` will only\
    \ display the books that belong to the selected Category.\n\nIn the second case,\
    \ you set both the Category and the Author to nil:\n\n```objc\n[(BooksViewController\
    \ *)[segue destinationViewController] setCategory:nil];\n[(BooksViewController\
