  trans: "\n### 排版后的文本\n\n**图 10-11.** 将复制的按钮移动到场景左侧。\n\n- **场景 2:** 复制现有场景。\n   \
    \ - **场景 2:** 重命名。\n    - **场景 2:** 整理图形。\n    - **场景 2:** 隐藏不适用的元素。\n       \
    \ - **场景 2:** 编辑按钮。\n        - **场景 2:** 用新图像替换图像。\n        - **场景 2:** 配置新按钮。\n\
    \        - **场景 2:** 复制按钮。\n        - **场景 2:** 重置参数。\n    - **场景 2:** 建立连接。\n\
    \n5.  在新场景中，你可以看到用户在此有两个选项：向左或向右。为了满足这一需求，你需要提供两个按钮，每个方向一个。点击右侧可见的按钮，然后按下 `![images](img/U003.jpg)`\
    \ + `D` 进行复制。现在将其大致移动到场景的左侧，如图 10-11 所示。\n\n`![images](img/9781430242727_Fig10-12.jpg)`\n\
    \n**图 10-12.** 设置原始（最右侧）按钮的位置和尺寸。\n\n- **场景 2:** 复制现有场景。\n    - **场景 2:** 重命名。\n\
    \    - **场景 2:** 整理图形。\n        - **场景 2:** 隐藏不适用的元素。\n        - **场景 2:** 编辑按钮。\n\
    \        - **场景 2:** 用新图像替换图像。\n        - **场景 2:** 配置新按钮。\n        - **场景 2:**\
    \ 复制按钮。\n        - **场景 2:** 重置按钮参数。\n        - **场景 2:** 右侧按钮。\n        - **场景\
    \ 2:** 左侧按钮。\n    - **场景 2:** 建立连接。\n\n6.  确保这两个按钮放置正确且尺寸合适，以便对用户而言合情合理。选中原始按钮后，在尺寸检查器中输入属性。你会经常执行此操作，因此我们将提供一组数字来指示按钮在场景中的\
    \ x 和 y 坐标，以及按钮的垂直和水平尺寸，使其完美契合在相应位置。我们会在一组数字中完成所有操作——我们只说明：590,90,80,450，这意味着\
    \ x 位置为 590，y 位置为 90，按钮的宽度为 80，高度为 450。我们不会每次都提醒你需要选中按钮并打开尺寸检查器。590, 90,80,450\
    \ 意思是你要打开尺寸检查器，并输入如图 10-12 所示的值。\n\n`![images](img/9781430242727_Fig10-13.jpg)`\n\
    \n**图 10-13.** 设置新（最左侧）按钮的位置和尺寸。\n\n- **场景 2:** 复制现有场景。\n    - **场景 2:** 重命名。\n\
    \    - **场景 2:** 整理图形。\n        - **场景 2:** 隐藏不适用的元素。\n        - **场景 2:** 编辑按钮。\n\
    \        - **场景 2:** 用新图像替换图像。\n        - **场景 2:** 配置新按钮。\n        - **场景 2:**\
    \ 复制按钮。\n        - **场景 2:** 重置按钮参数。\n            - **场景 2:** 按钮 – 右侧。\n     \
    \       - **场景 2:** 按钮 – 左侧。\n    - **场景 2:** 建立连接。\n\n7.  在设置新按钮的参数之前，你需要始终对其进行重命名，因为当前它仍沿用被复制按钮的名称。选中新按钮，在身份检查器的标签框中，将其名称从\
    \ *Button – Right* 重命名为 *Button – Left*。返回尺寸检查器，将参数设置为 150,85,100,600，如图 10-13\
    \ 所示。\n\n`![images](img/9781430242727_Fig10-14.jpg)`\n\n**图 10-14.** 再次将所有按钮设置为透明。\n\
    \n- **场景 2:** 复制现有场景。\n    - **场景 2:** 重命名。\n    - **场景 2:** 整理图形。\n        -\
    \ **场景 2:** 隐藏不适用的元素。\n        - **场景 2:** 编辑按钮。\n        - **场景 2:** 用新图像替换图像。\n\
    \        - **场景 2:** 配置新按钮。\n        - **场景 2:** 复制按钮。\n        - **场景 2:** 重置按钮参数。\n\
    \        - **场景 2:** 再次将所有按钮设置为透明。\n    - **场景 2:** 建立连接。\n\n8.  配置完新场景的按钮后，你始终要做的最后一件事是确保将它们设为透明。记住，你不想向用户透露任何线索。选择一个按钮，在属性检查器中选择“Custom”（自定义）。我们首先在新按钮上执行此操作，然后将第二个按钮也改为“Custom”，如图\
    \ 10-14 所示。\n\n`![images](img/9781430242727_Fig10-15.jpg)`\n\n**图 10-15.** 修正错误：确保设置“Shows\
    \ Touch On Highlight”（触摸时高亮显示）。\n\n- **场景 2:** 复制现有场景。\n    - **场景 2:** 重命名。\n\
    \    - **场景 2:** 整理图形。\n    - **场景 2:** 隐藏不适用的元素。\n    - **场景 2:** 编辑按钮。\n   \
    \ - **场景 2:** 用新图像替换图像。\n    - **场景 2:** 配置新按钮。\n        - **场景 2:** 复制按钮。\n \
    \       - **场景 2:** 重置按钮参数。\n        - **场景 2:** 再次将所有按钮设置为透明。\n        - **场景\
    \ 2:** 必要时修正错误。\n    - **场景 2:** 建立连接。\n\n**注意：** 到本书出版时，新版本的 Xcode 很可能会修正你即将读到的这个错误。我们已经提醒了苹果公司并引起了他们的注意。但这是目前存在的错误。\n\
    \n9.  请注意，你复制了一个每个按钮都设置了“Shows Touch On Highlight”（触摸时高亮显示）的视图。但复制的按钮并未正确设置此值。有时，出于不明显的原因，此属性的设置未能正确复制，并且由于不一致，这意味着此处存在一个错误。你需要做的是检查这些按钮是否会显示触摸高亮。选中每个按钮，并将其改为“Shows\
    \ Touch On Highlight”（触摸时高亮显示）。我们首先修正了右侧按钮，然后修正了左侧按钮，如图 10-15 所示。\n\n`![images](img/9781430242727_Fig10-16.jpg)`\n\
    \n**图 10-16.** 连接“Opening Scene”（开场场景）：“Button – Right”（右侧按钮）到场景 2。\n\n- **场景\
    \ 2:** 复制现有场景。\n    - **场景 2:** 重命名。\n    - **场景 2:** 整理图形。\n    - **场景 2:** 建立连接。\n\
    \        - **场景 2:** 从按钮按住 Control 键拖拽到新场景。\n\n10. 用户进入场景 2 的方式是点击右侧按钮——换句话说，就是选择迷宫中的右侧入口。你需要将右侧按钮通过一个\
    \ segue（转场）连接到场景 2。如果你的文档大纲未打开，请将其打开，在“View Controller – Opening Scene”（视图控制器\
    \ – 开场场景）中选择“Button – Right”（右侧按钮），然后按住 Control 键从它拖拽到“View Controller – Scene\
    \ 2”（视图控制器 – 场景 2），如图 10-16 所示。\n\n`![images](img/9781430242727_Fig10-17.jpg)`\n\
    \n**图 10-17.** 选择“Custom”（自定义）segue 类型。\n\n- **场景 2:** 复制现有场景。\n    - **场景 2:**\
    \ 重命名。\n    - **场景 2:** 整理图形。\n    - **场景 2:** 建立连接。\n        - **场景 2:** 从按钮按住\
    \ Control 键拖拽到新场景。\n        - **场景 2:** 选择“Custom”（自定义）segue。\n\n11. 将 Control\
    \ 拖拽释放到“View Controller – Opening Scene”（视图控制器 – 开场场景）上后，从样式菜单中选择“Custom”（自定义），如图\
    \ 10-17 所示。\n\n**注意：** 我们不会再重复 *Select custom segue*（选择自定义 segue）这一步，因为你将始终使用自定义\
    \ segue。从现在开始，我们只会简单地说 *Control-drag from button (name) to new scene (name)*（从按钮（名称）按住\
    \ Control 键拖拽到新场景（名称））。然后你将自动选择“Custom”（自定义）segue 选项。\n\n`![images](img/9781430242727_Fig10-18.jpg)`\n\
    \n**图 10-18.** 编辑新 segue 的属性。\n"
- fmt: "# 排版后的文本\n\n- Scene 2: Copy an existing scene.\n  - Scene 2: Rename.\n  -\
    \ Scene 2: Organize graphics.\n  - Scene 2: Make connections.\n    - Scene 2:\
    \ Control-drag from button to new scene.\n    - Scene 2: Edit the segue attributes.\n\
    \n12. You’ll now see a new custom segue linking the two views. You can see that\
    \ it’s custom because it has the `{}` inside the segue linking the two views as\
    \ shown in [Figure 10-39](#Chapter10.html#fig_10_39). You need to associate the\
    \ correct class with the new view. To do this, select the segue, in the Attributes\
    \ Inspector name the Segue class `MovementSegue`, keep the Style as Custom, and\
    \ change the Identifier to `Right` as shown in [Figure 10-18](#Chapter10.html#fig_10_18).\n\
    \n**NOTE:** Regarding the Identifier: you’ll want to note that this is a right\
