  raw: "Also, remember that your `AddBookViewController` is embedded into the Navigation\
    \ Controller. But here’s the issue: in order to get to the `AddBookViewController`,\
    \ you must follow the Navigation Controller hierarchy as indicated here:\n\n`AddBookViewController\
    \ *addBookVC = (AddBookViewController`\n    `*)navigationVC.topViewController;`\n\
    \n**NOTE:** This is a very common pitfall. Remember that whenever your segue’s\
    \ primary destination View Controller is a Navigation Controller, you must access\
    \ its `topViewController` and cast it to the appropriate class in order to get\
    \ to the View Controller you’re likely intending to prepare for segue.\n\n![images](images/9781430242727_Fig08-53.jpg)\n\
    \n**Figure 8-53.** *Implement delegate methods to receive the newly added book\
    \ objects.*\n\n17.  Additionally, you’ll implement the delegate method for the\
    \ `AddBooksViewController`, in which you can access the object that’s been created\
    \ by the user and add it to the Table View. Drag in the “26 BooksViewController.m\
    \ Add Books” snippet from DemoMonkey and place it right before the `@end` as shown\
    \ in [Figure 8-53](#Chapter08.html#fig_8_53). In this method, `addBookVC:didCreateObject:`,\
    \ you’re checking whether you’re currently displaying books per a certain category\
    \ or per a certain author, and if so, whether the book you’re about to add to\
    \ the Table View belongs to one of those groups:\n\n`self.category != nil && ((DBBook\
    \ *)anObject).category != self.category) ||`\n    `self.author != nil && ((DBBook\
    \ *)anObject).author != self.author))`\n\nIf that’s not the case, you don’t update\
    \ the current list of books—otherwise, if the object passes the tests, you add\
    \ a new row to the very top of the Table View:\n\n`NSIndexPath *indexPath = [NSIndexPath\
    \ indexPathForRow:0 inSection:0];`\n    `[self._tableView insertRowsAtIndexPaths:[NSArray\
    \ arrayWithObject:indexPath]`\n    `withRowAnimation:UITableViewRowAnimationAutomatic];`\
    \ ![images](images/9781430242727_Fig08-54.jpg)\n\n**Figure 8-54.** *Control-drag\
    \ from the edit button to make an IBAction.*\n\n18.  Finally, you need to specify\
    \ an `IBAction` for the Edit button in your Navigation Bar. Remember that once\
    \ the user taps this Edit button, the Table View will switch to the editing mode,\
    \ and the user will be able to delete cells. So open up Storyboard and navigate\
    \ to Books Table View. Then open up the Assistant editor and make sure the right-hand\
    \ pane is the implementation file of `BooksViewController`. Click inside it and\
