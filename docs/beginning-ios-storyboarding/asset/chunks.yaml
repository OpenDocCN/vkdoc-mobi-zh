  trans: "\n# 第 10 章\n\n## 单视图 #3：漫游板第二部分\n\n你已经搭建好了第一个场景。在本章中，你将在第 3 步中向视图控制器的头文件和实现文件添加代码。这为你进入第\
    \ 4 步做好了准备，在第 4 步中，你将高效地创建另外 17 个场景！第 4 步分为两个部分。第一部分即第 4a 步，将在本章结束，对于这一步，你仍将获得我们的协助和指导。然后在第\
    \ 11 章中，你将完成第 4b 步，这一部分提供的指导会少很多。\n\n### 第 3 步：完成 ViewController 头文件和实现文件\n\n\
    ![images](img/9781430242727_Fig10-01.jpg)\n\n**图 10-1.** *拖入属性和操作方法签名。*\n\n1.\
    \ 确保你已经打开 DemoMonkey，并将其放在你最喜欢的位置，以便在编码时能够随时访问。打开 `ViewController.m` 文件，然后打开助理编辑器，使其在右侧窗格中显示头文件。从\
    \ DemoMonkey 中拖入第一个代码片段“01 ViewController.h – add new property and action signature”，并将其放在头文件中\
    \ `@interface` 代码行的末尾，如图 10-1 和以下代码所示：\n\n```\n#import <UIKit/UIKit.h>\n@interface\
    \ ViewController : UIViewController {\n}\n\n@property (weak, nonatomic) IBOutlet\
    \ UIButton *btnReverse;\n\n(IBAction)onReversePress:(id)sender;\n\n@end\n```\n\
    \n你对视图控制器所做的全部操作就是添加一个新的属性和一个操作方法签名。你正在为用户提供一种能力，让他们在迷宫遇到死胡同时能够表示需要后退。用户通过你的后退按钮（`*btnReverse`）实现这一点，点击该按钮后会调用这个\
    \ `IBAction` 方法。这就是你对头文件所做的全部工作，因此接下来可以处理实现文件了。\n\n![images](img/9781430242727_Fig10-02.jpg)\n\
    \n**图 10-2.** *导入 viewWillAppear 方法代码。*\n\n2. 切换回标准编辑器（或者直接在左侧的实现文件中操作），你需要建立对自定义\
    \ Segue 对象的访问权限，因为如前所述，你不想使用自定义 Segues。正如你将看到的，自定义 Segues 完全是数据驱动的，这意味着数据驱动代码的行为。换句话说，代码会查看视图数据，并根据所看到的数据来决定如何行动。因此，回到\
    \ DemoMonkey，拖入“02 ViewController.m – add import of customSegue Object”，并将其放在\
    \ `#import ViewController.h` 之后。现在，既然你已经在公共接口中为后退按钮声明了一个属性，你还需要告诉编译器合成后退按钮属性的设置器和获取器代码。为此，拖入“03\
    \ ViewController.m – add property synthesis”，并将其放在 `@implementation` 行之后。\n\n\
    正如你在实现文件中所看到的，Xcode 默认实例化了`- (void)viewDidLoad` 和 `- (void)viewDidUnload` 方法。但当视图出现时，你想要隐藏导航栏。因此，添加一个\
    \ `-(void)viewWillAppear` 方法来实现这一点。拖入“04 ViewController.m – add viewWillAppear”，并将其放在\
    \ `- (void)viewDidLoad` 和 `- (void)viewDidUnload` 方法之间，如图 10-2 和以下代码所示：\n\n```\n\
    #import \"ViewController.h\"\n#import \"MovementSegue.h\"\n@interface ViewController\
    \ ()\n@end\n@implementation ViewController\n@synthesize btnReverse;\n- (void)viewDidLoad{\
    \ ... }\n-(void)viewWillAppear:(BOOL)animated {\n  [super viewWillAppear:animated];\n\
    \  [self.navigationController setNavigationBarHidden:YES];\n  BOOL bIsMovToParent\
    \ = [self isMovingToParentViewController];\n\n  if(bIsMovToParent && self.btnReverse.tag\
    \ == 1)\n        { self.btnReverse.hidden = YES;}\n  else if(self.btnReverse.tag\
    \ == 1)\n{self.btnReverse.hidden = NO;} }\n- (void)viewDidUnload { ...\n```\n\n\
    **注意：** 为了节省空间，我们在上述代码中删除了注释。\n\n从代码中可以看到，你使用 `[super viewWillAppear:animated];`\
    \ 让父类执行其在视图将要出现时需要执行的操作。然后使用 `[self.navigationController setNavigationBarHidden:YES];`\
    \ 隐藏导航栏，并处理你是如何到达这个视图的。你想知道自己是正在走向死胡同，还是正在从死胡同中退出。调用 `[self isMovingToParentViewController]`\
    \ 会告诉你部分答案。你可以在代码注释中看到（上述代码未显示），对于非终点的死胡同屏幕，你给后退按钮设置了 `tag=1`。相反，终点死胡同屏幕被设置了 `tag=0`。但如果你是在走向死胡同的过程中到达这个屏幕，那么你使用\
    \ `self.btnReverse.hidden = YES` 隐藏后退按钮。最后，如果用户是通过点击后退按钮（从死胡同中退出）返回到这一点，那么你确实希望在这个场景中显示后退按钮，使用\
    \ `self.btnReverse.hidden = NO;`（如果这个场景中有后退按钮的话）。\n\n![images](img/9781430242727_Fig10-03.jpg)\n\
    \n**图 10-3.** *用允许两种横向方向的代码替换现有代码。*\n\n3. 现在你需要释放后退按钮，通过拖入“05 ViewController.m\
    \ – add release button (inviewDidUnload)”，并将其放入 `ViewDidUnload` 中，位于 `[super viewDidUnload];`\
    \ 之上，如图 10-3 和以下代码所示：\n\n```\n- (void)viewDidUnload\n{\n  [self setBtnReverse:nil];\n\
    \  [super viewDidUnload];\n}\n(BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
    {\n  return UIInterfaceOrientationIsLandscape(interfaceOrientation);\n}\n```\n\
    \n接下来要做的是将视图旋转限制为横向。而不是说你支持所有方向，你将使用一个宏来询问当前是否为横向方向。为此，拖入“06 ViewController.m\
    \ – in ‘shouldAutorotate …’ replace”，并将其放入 `shouldAutorotateToInterfaceOrientation`\
    \ 方法内部，如图 10-3 所示。它应该替换该方法中已存在的 `return YES;` 行。在插入新行后，你可能需要删除这一行。\n\n现在不再是简单地返回\
    \ YES 以支持所有方向，而是使用宏 `UIInterfaceOrientationIsLandscape` 来判断当前是否为横向方向，并返回其结果。\n\
    \n![images](img/9781430242727_Fig10-04.jpg)\n\n**图 10-4.** *引入 prepareForSegue:sender:\
    \ 和 onReversePress: 方法。*\n\n4. 你花了一些时间创建透明按钮，以便让用户通过自定义 Segues 在迷宫中导航。现在你需要引入响应这些按钮点击的代码。拖入“07\
    \ ViewController.m – add prepareForSegue sender and onReversePress methods”，并将其放在\
    \ `shouldAutorotateToInterfaceOrientation` 方法和 `@end` 语句之间，如图 10-4 所示。你可以看到，你正在检测用户是选择向左、向右还是向前，并将这个选择记录在视图的“tag”中。如果用户试图通过点击后退按钮从死胡同中退出，你则使用\
    \ `popViewControllerAnimated:YES` 执行弹出操作。现在进行构建，应该一切正常。\n\n恭喜！你已经完成了这个应用的所有代码。是的，上述代码就是这个应用中你将使用的全部代码。现在运行一下，看看效果。你会注意到，现在你的起点看起来像第\
    \ 9 章的图 9-0A，因为导航栏已经不再显示，而它在图 9-21 中还是存在的。\n\n从这一点开始，你将着手创建迷宫路径。\n"
- fmt: "# Step 4a: Create the Next Eight Scenes with Assistance\n\nSo far you’ve set\
    \ up your app with its images and created the `Storyboard` and the code for the\
    \ first scene. That’s very often the case when you create a game with many scenes.\
    \ At the University of Colorado at Colorado Springs Computer Science Department,\
    \ we offer a Bachelor of Science in Gaming. It’s often interesting to see how\
    \ students panic when they realize that halfway through the semester they’ve yet\
    \ to complete the code for the first scene, nor all the characters. The trick\
    \ is to have the first scene and characters down so well that it makes creating\
    \ the rest of the game a breeze.\n\nHere, you have everything set up so you’ll\
    \ be as efficient as you can as you repeat the steps necessary to create each\
    \ of the remaining 17 scenes.\n\n**NOTE:** You’ll be using a 4-step process to\
    \ create each new scene. We begin by explaining each step. As we move through\
    \ and continue to repeat, we let the leash loosen a little by not always explaining\
    \ each step and all its intricacies but merely reminding you to do it as you did\
    \ previously.\n\n![images](images/9781430242727_Fig10-05.jpg)\n\n**Figure 10-5.**\
    \ *Set the Title of first scene’s View Controller.*\n\n1. Before you begin our\
    \ repeating methodology to efficiently create your remaining 17 scenes, you need\
    \ to do a little house cleaning. The naming of scenes and entities is critical.\
    \ Start by going back to the `Storyboard`. After clicking the View Controller’s\
    \ scene dock (the bar at the bottom of the scene on the canvas) and going to the\
    \ Attributes Inspector, name it by setting the `Title` to *Opening Scene* as shown\
    \ in [Figure 10-5](#Chapter10.html#fig_10_5).\n\n   ![images](images/9781430242727_Fig10-06.jpg)\n\
    \n   **Figure 10-6.** *Name the Navigator.*\n\n2. Click the Navigation Controller\
    \ scene dock. You can just call this *Navigation* as shown in [Figure 10-6](#Chapter10.html#fig_10_6).\n\
    \n## Scene 2\n\nYou’re finished cleaning up loose ends and can now focus on the\
    \ steps you’ll repeat and grind through 17 more times. At a very high level, you’ll\
    \ be repeating four steps:\n\n* Scene #: Copy an existing scene.\n* Scene #: Rename.\n\
    * Scene #: Organize graphics.\n* Scene #: Make connections.\n\n**NOTE:** We’ll\
    \ indicate the **current step** or **sub-step** in bold so that you’ll instantly\
    \ know where you are in terms of the broader view.\n\n![images](images/9781430242727_Fig10-07.jpg)\n\
    \n**Figure 10-7.** *Starting your first duplication, click Opening Scene’s dock.*\n\
    \n1. You’ll begin with step 1 for *Scene 2: Copy an existing scene*. You only\
    \ have one existing scene to choose from, so go ahead and click the View Controller’s\
    \ scene dock and press `D` to duplicate as shown in [Figure 10-7](#Chapter10.html#fig_10_7).\
    \ Immediately you’ll see that it looks a little bit thicker. That’s because the\
    \ duplicated item is now sitting on top of the original scene.\n\n![images](images/9781430242727_Fig10-08.jpg)\n\
    \n**Figure 10-8.** *Change the Title of the new scene.*\n\n* Scene 2: Copy an\
    \ existing scene.\n  * Scene 2: Rename.\n    * Scene 2: Change the `Title`.\n\
    \  * Scene 2: Organize graphics.\n  * Scene 2: Make connections.\n\n2. Select\
    \ the duplicated scene and drag it to the right of the original scene. In the\
    \ Attributes Inspector change the `Title` to *Scene 2* as shown in [Figure 10-8](#Chapter10.html#fig_10_8).\n\
    \n![images](images/9781430242727_Fig10-09.jpg)\n\n**Figure 10-9.** *Make the transparent\
    \ button visible.*\n\n* Scene 2: Copy an existing scene.\n  * Scene 2: Rename.\n\
    \    * Scene 2: Change the `Title`.\n  * Scene 2: Organize graphics.\n    * Scene\
    \ 2: Hide inapplicable elements.\n    * Scene 2: Edit buttons.\n    * Scene 2:\
    \ Make buttons visible.\n    * Scene 2: Replace image with new image.\n  * Scene\
    \ 2: Make connections.\n\n3. Scene 2 doesn’t have a welcome label, so select it\
    \ and delete it. (Note that in all future scenes you create, you’ll be hiding\
    \ elements—in this case, you’re deleting the label because it’s unnecessary for\
    \ any future scenes.) Scene 2 does have buttons in it, so you need to first make\
    \ the transparent button visible so you can edit it. Select the transparent button\
    \ still in place from scene 1 and, with it selected, in the Attributes Inspector\
    \ make it visible by choosing Rounded Rect as shown in [Figure 10-9](#Chapter10.html#fig_10_9).\n\
    \n![images](images/9781430242727_Fig10-10.jpg)\n\n**Figure 10-10.** *Replace Image\
    \ with correct image for Scene 2.*\n\n* Scene 2: Copy an existing scene.\n  *\
    \ Scene 2: Rename.\n  * Scene 2: Organize graphics.\n    * Scene 2: Hide inapplicable\
    \ elements.\n    * Scene 2: Edit buttons.\n    * Scene 2: Make buttons visible.\n\
    \    * Scene 2: Replace Image with new image.\n  * Scene 2: Make connections.\n\
    \n4. You now need to get rid of the image background `wanderboard-cam01.png` and\
    \ replace it with Scene 2’s image `wanderboard-cam02.png`. To do this, select\
    \ the view and with it still selected, in the Attributes Inspector change the\
    \ Image name to `wanderboard-cam02.png` from the drop-down menu as shown in [Figure\
    \ 10-10](#Chapter10.html#fig_10_10).\n\n**NOTE:** See how the existing button\
    \ from Scene 1 is still showing in [Figure 10-10](#Chapter10.html#fig_10_10)?\
    \ This is correct. You want this. Editing the buttons is a two-step process.\n\
    \n**First:** Make sure you have the correct buttons to transfer over to the new\
    \ scene. Do that by making visible the existing buttons in the original scene\
    \ (Organize graphics → Edit buttons → Make buttons visible) and/or hiding buttons\
    \ (Hide inapplicable elements). So far, you haven’t had to hide a button.\n\n\
    **Second:** Change the dimensions and positions of the buttons so they’re placed\
    \ and fit correctly into the new scene. Then make them invisible again.\n\n![images](images/9781430242727_Fig10-11.jpg)"
