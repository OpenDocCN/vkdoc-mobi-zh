    \ 场景 9：整理图形。\n   - 场景 9：建立连接。\n\n2. 将标题更改为 *Scene 9*，如图 10-54 所示。\n\n   ![images](img/9781430242727_Fig10-55.jpg)\n\
    \n   **图 10-55.** *场景 9：更改图像。*\n\n   - 场景 9：复制一个现有场景。\n   - 场景 9：重命名。\n     -\
    \ 场景 9：更改标题。\n     - 场景 9：更改图像。\n   - 场景 9：整理图形。\n   - 场景 9：建立连接。\n\n3. 将图像更改为\
    \ `wanderBoard-cam09.png`，如图 10-55 所示。\n\n   ![images](img/9781430242727_Fig10-56.jpg)\n\
    \n   **图 10-56.** *连接场景 6：右侧按钮到场景 9。*\n\n   - 场景 9：复制一个现有场景。\n   - 场景 9：重命名。\n\
    \   - 场景 9：整理图形。\n   - 场景 9：建立连接。\n     - 场景 9：按住 Control 键从按钮拖拽到新场景。\n     -\
    \ 场景 9：编辑转场的属性。\n\n4. 转向场景 9 的转场始于场景 6 的右侧按钮。按住 Control 键从它拖拽到场景 9，如图 10-56 所示。选中创建好的转场，在属性检查器中，将\
    \ Segue 类命名为 `MovementSegue`，保持样式为“自定义”，并将标识符更改为 *Right*。\n\n   ![images](img/9781430242727_Fig10-57.jpg)\n\
    \n   **图 10-57.** *场景 9：编辑“右侧”按钮的大小和位置。*\n\n   - 场景 9：复制一个现有场景。\n   - 场景 9：重命名。\n\
    \   - 场景 9：整理图形。\n     - 场景 9：隐藏不适用的元素。\n     - 场景 9：编辑按钮。\n       - 场景 9：使按钮可见。\n\
    \     - 场景 9：用新图像替换图像（已完成）。\n     - 场景 9：配置新按钮。\n       - 场景 9：复制按钮。\n       -\
    \ 场景 9：重置按钮参数。\n         - 场景 9：“右侧”按钮。\n       - 场景 9：再次设为透明。\n       - 场景 9：修复错误。\n\
    \   - 场景 9：建立连接。\n\n5. 在这种情况下，你的方向确实有两个选项，因此请保留两个按钮。首先显示左侧按钮，然后显示右侧按钮，使它们都可见。将右侧按钮从\
    \ 875,45,100,680（如图 10-57 所示）更改为 875,45,100,680，并将左侧按钮设为 20,20,100,710。将它们改回透明状态，并确保它们都启用了“显示触摸时高亮”。\n\
    \n至此，你已经完成了第 4a 步以及本章的全部内容。你已经完成了 wanderBoard 的所有代码，并完成了前九个场景的实现。干得好！\n\n在下一章中，你将完成剩余的场景，并在此过程中进行一些修补。到下一章结束时，你将测试并运行完整的\
