    \    - Scene 3: If dead-end, make button.\n\n8. Now you’re going to do something\
    \ new. You may not know it yet, but you’re heading down a dead-end. You’ll need\
    \ to repeat these steps each time you head down a dead-end. Essentially, you have\
    \ to deal with the reverse buttons showing up so that once users get to the dead-end,\
    \ they can backtrack. You undoubtedly remember all the code you did to enable\
    \ this. You handle this by first dragging a new Round Rect button onto the canvas\
    \ as shown in [Figure 10-27](#Chapter10.html#fig_10_27).\n\n![images](images/9781430242727_Fig10-28.jpg)\n\
    \n**Figure 10-28.** *Scene 3: Set Image of the new reverse button.*\n\n- Scene\
    \ 3: Copy an existing scene.\n  - Scene 3: Rename.\n  - Scene 3: Organize graphics.\n\
    \  - Scene 3: Make connections.\n    - Scene 3: Control-drag from button to new\
    \ scene.\n    - Scene 3: Edit the segue’s attributes.\n    - Scene 3: If dead-end,\
    \ make reverse button.\n\n9. This reverse button is a custom button, and you have\
    \ an image for it. In the Attributes Inspector, make it Custom and select `back001.png`\
    \ for the Image as shown in [Figure 10-28](#Chapter10.html#fig_10_28). Finally,\
    \ set it up as `295,680,389,68`.\n\n![images](images/9781430242727_Fig10-29.jpg)\n\
    \n**Figure 10-29.** *Scene 3: Set Tag field value of 1 for new reverse button.*\n\
    \n- Scene 3: Copy an existing scene.\n  - Scene 3: Rename.\n  - Scene 3: Organize\
    \ graphics.\n  - Scene 3: Make connections.\n    - Scene 3: Control-drag from\
    \ button to new scene.\n    - Scene 3: Edit the segue’s attributes.\n    - Scene\
    \ 3: If dead-end, make reverse button.\n    - Scene 3: Edit Tag field.\n    -\
    \ Scene 3: Title the button.\n\n10. You’re also going to set up the tag for the\
    \ reverse button using the second case of data being set. Nearly all objects in\
    \ Storyboard have a Tag field. Set the Tag field to `1` in the view section of\
    \ the Attributes Inspector as shown in [Figure 10-29](#Chapter10.html#fig_10_29).\
    \ You’re going to use the tag of your red reverse button here so that when you\
    \ head into a dead-end it has a Tag field of `0`. As shown in the code, the button\
    \ is hidden when the tag is `0` and is visible when the tag is `1`. That way,\
    \ users don’t see the reverse button as they head into the dead-end. But upon\
    \ hitting the dead-end they see the button, because now it’s set to `1`, and can\
    \ navigate back out.\n\nYou also need to title the button. With it selected in\
    \ the Identity Inspector’s Identity section, enter *Button - Reverse* in the Label\
    \ box. Now you’re ready to move on to Scene 4.\n\n## Scene 4\n\n![images](images/9781430242727_Fig10-30.jpg)\n\
    \n**Figure 10-30.** *Duplicate Scene 3 to create Scene 4 and drag it to right\
