    Step 12 shows you how to tell XCode to build these new files.


    ![images](images/9781430242727_Fig05-11.jpg)


    **Figure 5-11.** *Copy the files.*


    8.  Again check all the proper boxes as shown in [Figure 5-11](#Chapter05.html#fig_5_11).


