  trans: '

    ### 步骤 1：从模板创建


    ![images](img/9781430242727_Fig05-01.jpg)


    **图 5-1.** *iBooks 与我们的应用——基于页面的应用。*


    1. 在深入探讨之前，我们先确保你理解了何时需要使用基于页面的应用。苹果在 App Store 发布 iBook 应用后，市场立刻出现了对实现炫酷翻页效果代码的需求。作为回应，苹果在
    Xcode 4 中引入了一个名为“基于页面的应用”的新模板。该模板使用单个视图控制器，根据用户导航到的每个页面动态替换内容。苹果提供这样一个模板，其复杂度远超其通常提供的精简基础框架，这多少有些不同寻常。通过这个模板，苹果实际上提供了一个示例应用。不过，在本章中，我们将非常仔细地讲解一些巧妙的技巧和隐藏的陷阱。


    **注意：** 当你想要创建一个旨在为每个新视图展示一个页面的应用项目时，建议使用“基于页面的应用”模板。


    ![images](img/9781430242727_Fig05-02.jpg)


    **图 5-2.** *在 Xcode 中新建一个基于页面的应用项目。*


    2. 打开 Xcode，按 `+N`，选择“基于页面的应用”，然后点击“下一步”，如图 5-2 所示。


    ![images](img/9781430242727_Fig05-03.jpg)


    **图 5-3.** *将应用命名为 futureTravel，然后取消勾选“竖屏”和“倒置竖屏”。*


    3. 输入 `com.apress` 作为公司标识符。我们不使用类前缀。确保选择 iPad，并勾选“使用自动引用计数”。不要勾选“包含单元测试”（图 5-2）。创建完成后，将其保存到桌面。你会看到新的
    `futureTravel` 项目被打开。如前所述，我们只为 iPad 制作这个应用——而且为了兼容我们将要使用的文本图片，我们还会将其设置为仅横屏模式。这些图片中的文本是横向排列的，因此请取消勾选“竖屏”和“倒置竖屏”，如图
    5-3 所示。有趣的是，看看这里少了什么……你注意到了吗？注意，这个基于页面的应用没有提供不使用 Storyboard 的选项。


    **注意：** 在使用“基于页面的模型”模板时，你的目标只有一个：进入代码，将页面内容的模型替换为你自己的页面内容模型。接下来，你将通过添加自己的数据对象并改造现有对象以使用新数据对象来开始这项工作。


    ![images](img/9781430242727_Fig05-04.jpg)


    **图 5-4.** *将启动图片拖入你的根目录。*


    1. 打开你从 `http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter05_futureTravel%20Assets.zip`
    下载的 `futureTravel` 资源文件夹，并将其解压到桌面。选中两个启动图片文件 `Default-Landscape@2x~ipad.png` 和
    `Default-Landscape~ipad.png`，然后将它们拖拽到根目录。请注意，你还可以看到适用于新 iPad（Retina iPad）的图片，如果你打算将应用直接编译到
    Retina iPad 上，则可以使用它们，如图 5-4 所示。


    ![images](img/9781430242727_Fig05-05.jpg)


    **图 5-5.** *确保将启动图片复制到你的项目中。*


    2. 当弹出“选择添加这些文件的选项”对话框时，勾选“将项目复制到目标组的文件夹中”。同时勾选“为添加的文件夹创建组”。确保你的目标项目是 `futureTravel`
    并且已被勾选（图 5-5）。


    ![images](img/9781430242727_Fig05-06.jpg)


    **图 5-6.** *Xcode 自动引入这些图片。*


    3. 注意，Xcode 会检测到这些图片是用于横屏和 Retina 显示屏的，并自动将它们放入相应的启动图片框中，如图 5-6 所示。


    ![images](img/9781430242727_Fig05-07.jpg)


    **图 5-7.** *将 Images 文件夹拖入 Supporting Files 文件夹。*


    4. 现在，选中整个 `Images` 文件夹，将其拖入 `Supporting Files` 文件夹中，如图 5-7 所示。


    ![images](img/9781430242727_Fig05-08.jpg)


    **图 5-8.** *将启动图片文件夹复制到你的项目中。*


    5. 与步骤 5 类似，当弹出“选择添加这些文件的选项”对话框时，勾选“将项目复制到目标组的文件夹中”和“为添加的文件夹创建组”。确保你的目标项目是 `futureTravel`
    并且已被勾选，如图 5-8 所示。


    ![images](img/9781430242727_Fig05-09.jpg)


    **图 5-9.** *注意 Xcode 为你创建的新组。*


    6. Xcode 会在 `Supporting Files` 文件夹内实例化一个全新的组，如图 5-9 所示。


    ![images](img/9781430242727_Fig05-10.jpg)


    **图 5-10.** *拖入 Data 类。*


    7. 因为我们将重点放在 Storyboard 方面，所以我们决定为你创建数据模型代码。我们将在本章后面部分详细描述这些代码，但现在只需选择 `ModelPageData.h`
    和 `ModelPageData.m` 这两个文件，然后将它们拖入你的项目，如图 5-10 所示。如果你使用的是旧版 Xcode，可能需要指示 Xcode
    编译这些新文件。（到本书出版时，这个问题可能已经修复。）步骤 12 展示了如何告诉 Xcode 编译这些新文件。


    ![images](img/9781430242727_Fig05-11.jpg)


    **图 5-11.** *复制文件。*


    8. 再次勾选所有合适的选项，如图 5-11 所示。


    ![images](img/9781430242727_Fig05-12.jpg)


    **图 5-12.** *如果新文件尚未被编译，手动添加它。*


    9. 点击导航树根部的 `futureTravel`。在左侧的目标设置中，选择顶部的“构建阶段”标签。然后展开“编译源代码”部分。如果你在此列表中未看到 `ModelPageData.m`
    文件，请点击 +（加号）按钮，选择 `ModelPageData.m` 实现文件，然后点击“添加”，如图 5-12 所示。这会将 `ModelPageData.m`
    添加到项目中。如果在“选择要添加的项目”列表中未显示所需文件，请点击“添加其他”按钮，然后在你的目录结构中查找想要添加的文件。


    ![images](img/9781430242727_Fig05-13.jpg)


    **图 5-13.** *另一种操作方法……*


    10. 如果到你阅读本书时苹果仍未修复此问题，这并不是唯一的解决方法。你可以转到你的 `futureTravel` 文件夹，右键单击它，选择“将文件添加到
    `futureTravel`”，如图 5-13 所示，然后导航到桌面上的文件夹并选择文件，它便会自动将源文件添加到编译列表中。这样，你就有两种不同的方法来解决新版
    Xcode 在 Lion 系统下存在的这个小问题。

    '
- fmt: '### Step 2: Prep Storyboard


    ![images](images/9781430242727_Fig05-14.jpg)


    **Figure 5-14.** *Open Storyboard.*


    1. We’re going to work on the real thing now: the Storyboard. Let’s open your
    Storyboard! Go to the Project Navigator and click your Storyboard file as shown
    in [Figure 5-14](#Chapter05.html#fig_5_14).


    ![images](images/9781430242727_Fig05-15.jpg)


    **Figure 5-15.** *Wow! The Storyboard itself is already set up!*


    2. When you open the Storyboard, you will probably be amazed how the Page-Based
    Application template has instantiated a fully working paging app! You see two
    scenes, the Root View Controller and the Data View Controller, as shown in [Figure
    5-15](#Chapter05.html#fig_5_15). Remember that the Root View Controller is the
    frame that shows the pages. The Data View Controller shows you an instance of
    a page. It’s sometimes difficult for students to get it that all the pages will
    be procured through each instance of the Data View Controller. You don’t get to
    add a whole lot of other UI elements into this, but you can tweak it.


    ![images](images/9781430242727_Fig05-16.jpg)


    **Figure 5-16.** *Change the color of the Root View Controller to Apress Yellow*


    3. You''re going to change the background color of the Root View Controller from
    the default brown color to the Apress yellow. Start by clicking the Root View
    Controller. You can see that in the View being highlighted on the left side of
    [Figure 5-16](#Chapter05.html#fig_5_16). The Apress colors are Red@254, Green@196
    and Blue@37\. Change the three primary colors in the Colors dialog as shown in
    the right image in [Figure 5-16](#Chapter05.html#fig_5_16).


    ![images](images/9781430242727_Fig05-17.jpg)


    **Figure 5-17.** *Adjusting the Data View Controller.*


    4. We do like the frame Apple gave us here, but we will arrange some of the other
    default attributes as follows. We want to keep the label but we want it to be
    at the bottom. Simply grab it and move it down to the bottom by selecting it in
    the Document Outline as shown on the left side in [Figure 5-17](#Chapter05.html#fig_5_17).
    Or simply click the actual label itself and drag it down. Use the guideline to
    center it as needed. Open the Attributes Inspector tab and make the text align
    to the right as shown on the right side in [Figure 5-17](#Chapter05.html#fig_5_17).
    Lastly, change the Text Color property to Dark Grey Color as shown in [Figure
    5-18](#Chapter05.html#fig_5_18). Also move the internal content View up a little,
    so it doesn’t intersect with the Label—you can either drag it up using the mouse
    or select it, going to the Size Inspector pane on the right and changing the Frame
    Rectangle’s Y attribute to 20.


    ![images](images/9781430242727_Fig05-18.jpg)


    **Figure 5-18.** *Set the font color.*


    5. You need to house images in the scene, so drag an Image View from the Library
    and place it inside the current View in the center of the scene.


    ![images](images/9781430242727_Fig05-19.jpg)


    **Figure 5-19.** *Replace and delete the old view.*


    6. If you didn’t care about the amount of objects you have, then you could leave
    the nesting of layers as they are—but there is a lesson here. What you want to
    do is develop good practices, so what we want you to do is replace the View with
    the Image View. Look at [Figure 5-19](#Chapter05.html#fig_5_19): in 1 you select
    the Image View. In 2 you drag it above the View and below the Label - Label. In
    3 you select the old View. In 4 you delete this old View you just selected. In
    5 you select the Image View so you can bring it back to position on the Storyboard
    in the next step.


    ![images](images/9781430242727_Fig05-20.jpg)


    **Figure 5-20.** *Move the View to its correct position.*


    7. Move the main View until you see the square dotted lines on both the left and
    right upper sides of the Data View Controller as shown in [Figure 5-20](#Chapter05.html#fig_5_20).


    ![images](images/9781430242727_Fig05-21.jpg)


    **Figure 5-21.** *Make sure the Image View scales correctly.*


    8. Click the Image View and then go to the View in Size Inspector and see that
    the red rectangle in the Example scales appropriately. It will look like it stretches
    with the window, and this is correct. But the label needs to be grounded, so click
    the label and in the Autosizing box select the bottom, left, and horizontal middle
    red anchors. Deselect the top one. Your label should be grounded as shown in [Figure
    5-21](#Chapter05.html#fig_5_21). This means that as the View that contains the
    label changes its size, the label maintains its proper position and size. The
    property you’ve just set visually by selecting appropriate anchor points is called
    `autoResizingMask`. Every `UIView` subclass has it. In fact, it’s a very handy
    attribute, especially when you’re developing an app that supports multiple device
    orientations.


    ![images](images/9781430242727_Fig05-22.jpg)


    **Figure 5-22.** *Select the View that holds the label and Image View for a final
    edit.*


    9. We have one more adjustment to make to the main View. Select the main View
    that holds the Label - Label and the Image View as shown in [Figure 5-22](#Chapter05.html#fig_5_22).


    ![images](images/9781430242727_Fig05-23.jpg)


    **Figure 5-23.** *Change the color of the View to Apress yellow.*


    10. Once you’ve selected the View, in the Attributes Inspector open the Colors
    dialog by clicking the Background color swatch. Open the RGB selection from the
    drop-down menu and set Red@253, Green@224, and Blue@145 as shown in [Figure 5-23](#Chapter05.html#fig_5_23).
    Close it. You now can run the app and see what you have.


    ![images](images/9781430242727_Fig05-24.jpg)


    **Figure 5-24.** *A beautiful launch image starts the app.*


    11. Sure enough, once the app builds and runs, it begins with the beautiful launch
    image you inserted that displays while the application finishes starting up. Notice
    how it automatically starts in Landscape regardless of how you’re holding it.
    The image also fits beautifully onto the page as shown in [Figure 5-24](#Chapter05.html#fig_5_24).


    ![images](images/9781430242727_Fig05-25.jpg)


    **Figure 5-25.** *Beautiful page curls all done for you.*


    12. As mentioned at the beginning of this chapter, it’s unprecedented for Apple
    to provide such a turnkey Xcode framework. Once the launch image is completed,
    you go immediately to the first page and see the Apress yellow, the grey font,
    and the placement of the labels—all of which you took care of in the Storyboard.
    Then, selecting the page to turn on the very right hand side of the page, as shown
    in [Figure 5-25](#Chapter05.html#fig_5_25), you see a beautiful page curl appear,
    all without coding a single line. Wow! The only thing missing now is your page
    content, which is what we do in step 3 of 5\. So let’s get to it!'
  raw: '### Step 2: Prep Storyboard


    ![images](images/9781430242727_Fig05-14.jpg)


    **Figure 5-14.** *Open Storyboard.*


    1.  We’re going to work on the real thing now: the Storyboard. Let’s open your
    Storyboard! Go to the Project Navigator and click your Storyboard file as shown
    in [Figure 5-14](#Chapter05.html#fig_5_14).


    ![images](images/9781430242727_Fig05-15.jpg)


    **Figure 5-15.** *Wow! The Storyboard itself is already set up!*


    2.  When you open the Storyboard, you will probably be amazed how the Page-Based
    Application template has instantiated a fully working paging app! You see two
    scenes, the Root View Controller and the Data View Controller, as shown in [Figure
    5-15](#Chapter05.html#fig_5_15). Remember that the Root View Controller is the
    frame that shows the pages. The Data View Controller shows you an instance of
    a page. It’s sometimes difficult for students to get it that all the pages will
    be procured through each instance of the Data View Controller. You don’t get to
    add a whole lot of other UI elements into this, but you can tweak it.


    ![images](images/9781430242727_Fig05-16.jpg)


    **Figure 5-16.** *Change the color of the Root View Controller to Apress Yellow*


    3.  You''re going to change the background color of the Root View Controller from
    the default brown color to the Apress yellow. Start by clicking the Root View
    Controller. You can see that in the View being highlighted on the left side of
    [Figure 5-16](#Chapter05.html#fig_5_16). The Apress colors are Red@254, Green@196
    and Blue@37\. Change the three primary colors in the Colors dialog as shown in
    the right image in [Figure 5-16](#Chapter05.html#fig_5_16).


    ![images](images/9781430242727_Fig05-17.jpg)


    **Figure 5-17.** *Adjusting the Data View Controller.*


    4.  We do like the frame Apple gave us here, but we will arrange some of the other
    default attributes as follows. We want to keep the label but we want it to be
    at the bottom. Simply grab it and move it down to the bottom by selecting it in
    the Document Outline as shown on the left side in [Figure 5-17](#Chapter05.html#fig_5_17).
    Or simply click the actual label itself and drag it down. Use the guideline to
    center it as needed. Open the Attributes Inspector tab and make the text align
    to the right as shown on the right side in [Figure 5-17](#Chapter05.html#fig_5_17).
    Lastly, change the Text Color property to Dark Grey Color as shown in [Figure
    5-18](#Chapter05.html#fig_5_18). Also move the internal content View up a little,
    so it doesn’t intersect with the Label—you can either drag it up using the mouse
    or select it, going to the Size Inspector pane on the right and changing the Frame
    Rectangle’s Y attribute to 20.


    ![images](images/9781430242727_Fig05-18.jpg)


    **Figure 5-18.** *Set the font color.*


    5.  You need to house images in the scene, so drag an Image View from the Library
    and place it inside the current View in the center of the scene.


    ![images](images/9781430242727_Fig05-19.jpg)


    **Figure 5-19.** *Replace and delete the old view.*


    6.  If you didn’t care about the amount of objects you have, then you could leave
    the nesting of layers as they are—but there is a lesson here. What you want to
    do is develop good practices, so what we want you to do is replace the View with
    the Image View. Look at [Figure 5-19](#Chapter05.html#fig_5_19): in 1 you select
    the Image View. In 2 you drag it above the View and below the Label - Label. In
    3 you select the old View. In 4 you delete this old View you just selected. In
    5 you select the Image View so you can bring it back to position on the Storyboard
    in the next step.


    ![images](images/9781430242727_Fig05-20.jpg)


    **Figure 5-20.** *Move the View to its correct position.*


    7.  Move the main View until you see the square dotted lines on both the left
    and right upper sides of the Data View Controller as shown in [Figure 5-20](#Chapter05.html#fig_5_20).


    ![images](images/9781430242727_Fig05-21.jpg)


    **Figure 5-21.** *Make sure the Image View scales correctly.*


    8.  Click the Image View and then go to the View in Size Inspector and see that
    the red rectangle in the Example scales appropriately. It will look like it stretches
    with the window, and this is correct. But the label needs to be grounded, so click
    the label and in the Autosizing box select the bottom, left, and horizontal middle
    red anchors. Deselect the top one. Your label should be grounded as shown in [Figure
    5-21](#Chapter05.html#fig_5_21). This means that as the View that contains the
    label changes its size, the label maintains its proper position and size. The
    property you’ve just set visually by selecting appropriate anchor points is called
    `autoResizingMask`. Every `UIView` subclass has it. In fact, it’s a very handy
    attribute, especially when you’re developing an app that supports multiple device
    orientations.


    ![images](images/9781430242727_Fig05-22.jpg)


    **Figure 5-22.** *Select the View that holds the label and Image View for a final
    edit.*


    9.  We have one more adjustment to make to the main View. Select the main View
    that holds the Label - Label and the Image View as shown in [Figure 5-22](#Chapter05.html#fig_5_22).


    ![images](images/9781430242727_Fig05-23.jpg)


    **Figure 5-23.** *Change the color of the View to Apress yellow.*


    10.  Once you’ve selected the View, in the Attributes Inspector open the Colors
    dialog by clicking the Background color swatch. Open the RGB selection from the
    drop-down menu and set Red@253, Green@224, and Blue@145 as shown in [Figure 5-23](#Chapter05.html#fig_5_23).
    Close it. You now can run the app and see what you have.


    ![images](images/9781430242727_Fig05-24.jpg)


    **Figure 5-24.** *A beautiful launch image starts the app.*


    11.  Sure enough, once the app builds and runs, it begins with the beautiful launch
    image you inserted that displays while the application finishes starting up. Notice
    how it automatically starts in Landscape regardless of how you’re holding it.
    The image also fits beautifully onto the page as shown in [Figure 5-24](#Chapter05.html#fig_5_24).


    ![images](images/9781430242727_Fig05-25.jpg)


    **Figure 5-25.** *Beautiful page curls all done for you.*


    12.  As mentioned at the beginning of this chapter, it’s unprecedented for Apple
    to provide such a turnkey Xcode framework. Once the launch image is completed,
    you go immediately to the first page and see the Apress yellow, the grey font,
    and the placement of the labels—all of which you took care of in the Storyboard.
    Then, selecting the page to turn on the very right hand side of the page, as shown
    in [Figure 5-25](#Chapter05.html#fig_5_25), you see a beautiful page curl appear,
    all without coding a single line. Wow! The only thing missing now is your page
    content, which is what we do in step 3 of 5\. So let’s get to it!'
  trans: '

    ### 第 2 步：准备故事板


    ![images](img/9781430242727_Fig05-14.jpg)


    **图 5-14.** *打开故事板。*


    1.  现在我们要处理正题了：故事板。我们来打开您的故事板吧！前往项目导航器，点击您的故事板文件，如图 5-14 所示。


    ![images](img/9781430242727_Fig05-15.jpg)


    **图 5-15.** *哇！故事板本身已经设置好了！*


    2.  打开故事板时，您可能会惊讶地发现，基于页面的应用程序模板已经实例化了一个功能完整的翻页应用！您会看到两个场景：根视图控制器和数据视图控制器，如图 5-15
    所示。请记住，根视图控制器是显示页面的框架。数据视图控制器则显示一个页面实例。对于学生们来说，有时很难理解所有页面都将通过数据视图控制器的每个实例来获取。您不能在此添加大量其他
    UI 元素，但可以进行微调。


    ![images](img/9781430242727_Fig05-16.jpg)


    **图 5-16.** *将根视图控制器的颜色更改为 Apress 黄色*


    3.  您要将根视图控制器的背景颜色从默认的棕色更改为 Apress 黄色。首先点击根视图控制器。您可以在图 5-16 左侧看到视图被高亮显示。Apress
    的颜色值为红@254、绿@196、蓝@37。如图 5-16 右侧所示，在颜色对话框中更改这三种基色。


    ![images](img/9781430242727_Fig05-17.jpg)


    **图 5-17.** *调整数据视图控制器。*


    4.  我们确实喜欢苹果提供的这个框架，但我们将按如下方式调整一些其他默认属性。我们希望保留标签，但将其放置到底部。只需选中它并将其向下移动到底部，如图 5-17
    左侧所示，在文档大纲中选择它即可。或者直接点击标签本身并将其拖拽到底部。使用参考线根据需要将其居中。打开属性检查器选项卡，将文本对齐方式设置为右对齐，如图
    5-17 右侧所示。最后，将文本颜色属性更改为深灰色，如图 5-18 所示。同时，将内部内容视图稍微上移一点，使其不与标签相交——您可以用鼠标将其拖拽上去，或者选中它，转到右侧的尺寸检查器面板，将框架矩形的
    Y 属性更改为 20。


    ![images](img/9781430242727_Fig05-18.jpg)


    **图 5-18.** *设置字体颜色。*


    5.  您需要在场景中放置图片，所以从库中拖拽一个图像视图，并将其放置在场景中心的当前视图内部。


    ![images](img/9781430242727_Fig05-19.jpg)


    **图 5-19.** *替换并删除旧视图。*


    6.  如果您不关心对象的数量，那么可以保持现有的图层嵌套——但这里有个经验教训。您要做的是培养良好的习惯，所以我们希望您用图像视图替换视图。看看图 5-19：在步骤
    1 中，选中图像视图。在步骤 2 中，将其拖拽到视图上方、标签下方。在步骤 3 中，选中旧视图。在步骤 4 中，删除刚刚选中的旧视图。在步骤 5 中，选中图像视图，以便在下一步中将其重新定位到故事板上。


    ![images](img/9781430242727_Fig05-20.jpg)


    **图 5-20.** *将视图移动到正确位置。*


    7.  移动主视图，直到看到数据视图控制器的左右两侧出现正方形虚线，如图 5-20 所示。


    ![images](img/9781430242727_Fig05-21.jpg)


    **图 5-21.** *确保图像视图正确缩放。*


    8.  点击图像视图，然后转到尺寸检查器中的视图选项，确保示例中的红色矩形正确缩放。它看起来会随着窗口伸展，这是正确的。但标签需要固定位置，所以点击标签，在自动调整大小框中选中底部、左侧和水平居中的红色锚点。取消选中顶部锚点。您的标签应该被固定，如图
    5-21 所示。这意味着，当包含标签的视图改变大小时，标签能保持其正确的位置和大小。您通过选择适当锚点来直观设置的属性称为`autoResizingMask`。每个`UIView`子类都有这个属性。事实上，这是一个非常便利的属性，尤其是在开发支持多种设备方向的应用时。


    ![images](img/9781430242727_Fig05-22.jpg)


    **图 5-22.** *选中包含标签和图像视图的视图进行最终编辑。*


    9.  我们还需要对主视图进行一项调整。选中包含标签和图像视图的主视图，如图 5-22 所示。


    ![images](img/9781430242727_Fig05-23.jpg)


    **图 5-23.** *将视图的颜色更改为 Apress 黄色。*


    10. 选中视图后，在属性检查器中，通过点击背景色色板打开颜色对话框。从下拉菜单中选择 RGB 选择方式，设置红@253、绿@224、蓝@145，如图 5-23
    所示。关闭对话框。现在您可以运行应用，看看效果了。


    ![images](img/9781430242727_Fig05-24.jpg)


    **图 5-24.** *一个漂亮的启动画面启动了应用。*


    11. 果然，一旦应用构建并运行，它就会以您插入的漂亮启动画面开始，在应用程序完成启动期间显示。请注意，无论您如何手持设备，它都会自动以横屏模式启动。图片也完美地适配页面，如图
    5-24 所示。


    ![images](img/9781430242727_Fig05-25.jpg)


    **图 5-25.** *精美的翻页效果全部自动完成。*


    12. 正如本章开头所述，苹果能提供如此即开即用的 Xcode 框架是前所未有的。启动画面完成后，您立即进入第一页，看到 Apress 黄色背景、灰色字体以及标签的放置位置——所有这些都是您在故事板中处理好的。然后，选择页面最右侧进行翻页，如图
    5-25 所示，您会看到精美的翻页效果出现，而无需编写一行代码。哇！现在唯一缺少的就是您的页面内容，这正是我们在五步中的第三步要做的。那么，让我们开始吧！

