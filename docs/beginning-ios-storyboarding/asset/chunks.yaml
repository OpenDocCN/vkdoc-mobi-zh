    \n    ![images](images/9781430242727_Fig06-12.jpg)\n\n    **Figure 6-12.** *Drag\
    \ the MagicalRecord folder into your project.*\n\n12.  Drag the `MagicalRecord`\
    \ folder into your project inside the `Source` folder you created in step 9, as\
    \ shown in [Figure 6-12](#Chapter06.html#fig_6_12), and select the same saving\
    \ protocols that you did a few steps ago back in [Figure 6-2](#Chapter06.html#fig_6_2).\n\
    \n    ![images](images/9781430242727_Fig06-13.jpg)\n\n    **Figure 6-13.** *Open\
    \ the project’s .pch file.*\n\n13.  Now that you’ve added the MagicalRecord source\
    \ code to your project, you need to make it visible to your project so you can\
    \ enjoy all the various extensions to Core Data that it provides. Essentially,\
    \ MagicalRecord is a collection of categories that extend main Core Data functionality\
    \ and simplify its usage. All the important header files necessary for it to function\
    \ properly are listed in the `CoreData+MagicalRecord.h` file. You can make MagicalRecord\
    \ visible to the entire project by simply putting this header file into the `bookManager-Prefix.pch`\
    \ file. Navigate to the `Supporting Files` folder and click the `.pch` (pre-compile\
    \ header) file to open it as shown in [Figure 6-13](#Chapter06.html#fig_6_13).\n\
    \n    **NOTE:** Xcode has a high-level command called ProcessPCH that informs\
    \ the compiler which header files it needs to precompile and include into the\
    \ project based on information in .pch file. These pre-compiled headers are kept\
    \ in a subdirectory of `/Library/Caches` and then automatically included in every\
    \ file during compilation. The files included into prefix header are usually the\
    \ files that rarely change, which can speed up the compilation process. This lets\
    \ you include a file without adding an `import` statement to every file that uses\
    \ it, thus making it globally “visible” throughout the entire project.\n\n   \
    \ ![images](images/9781430242727_Fig06-14.jpg)\n\n    **Figure 6-14.** *Open the\
    \ DemoMonkey file and drag the first step into the project’s .pch file.*\n\n14.\
    \  Open the `.demoMonkey` file supplied with this chapter and keep it in a handy\
    \ place on your desktop. Start by dragging the “01 CoreData + MagicalRecord.h”\
    \ snippet from `DemoMonkey` into the `bookManager - Prefix.pch` file, immediately\
    \ under the `#import <Availability.h>` line of code as shown in [Figure 6-14](#Chapter06.html#fig_6_14)\
    \ and as follows:\n\n    `#import <Availability.h>`\n    `#import \"CoreData+MagicalRecord.h`\n\
    \n    This header now makes the MagicalRecord framework available throughout the\
    \ project without the need to import any additional files.\n\n15.  When adding\
    \ a new library/framework to your project, it’s good practice to immediately run\
    \ or at least build it to check your work, as this is a critical juncture, and\
    \ errors need to be immediately corrected before you continue to code. Click Run\
    \ and make sure your project compiles successfully. Sometimes things change pretty\
    \ quickly in the open source community, and fact is of course beyond our control.\
    \ In this book we’re using MagicalRecord-2.0.3-12-g1d9e0db. If you followed all\
    \ the steps carefully, and your project doesn’t compile at this point, check your\
    \ version of MagicalRecord-if it doesn’t match ours, replace your MagicalRecord\
    \ source folder with the one provided in the `Assets` bundle for this chapter\
    \ and try again.\n\n    ![images](images/9781430242727_Fig06-15.jpg)\n\n    **Figure\
    \ 6-15.** *Initialize the SQLite database.*\n\n16.  You’re now going to embark\
    \ on a task that frustrates many computer science students and is a huge obstacle\
    \ for many Xcoders out there: connecting a database to Xcode. In this case you’re\
    \ going to set up a SQLite database using the MagicalRecord API, and you’re going\
    \ to love it! Open the `AppDelegate.m` file and drag the “02 AppDelegate.m initiate\
    \ CoreData with MagicalRecord 1” snippet from DemoMonkey right before the `return\
    \ YES`, as shown in [Figure 6-15](#Chapter06.html#fig_6_15) and as follows:\n\n\
    \    `#import \"AppDelegate.h\"`\n    `@implementation AppDelegate`\n    `@synthesize\
    \ window = _window;`\n    `- (BOOL)application:(UIApplication *)application didFinishLaunching`\n\
    \    **`...`**`*)launchOptions`\n    `{`\n    `  // Override point for customization\
    \ after application launch.`\n    **`[MagicalRecord setupCoreDataStackWithStoreNamed:@\"\
    MyDatabase.sqlite\"];`**\n    `  return YES; ...`\n\n    **NOTE:** With MagicalRecord\
    \ you can initialize the entire SQLite database with a single line of code! It’s\
    \ not difficult—it just requires you to focus on exactly what you’re doing and\
    \ why you’re doing it. So let’s do it!\n\n    ![images](images/9781430242727_Fig06-16.jpg)\n\
    \n    **Figure 6-16.** *Clean the persistence store.*\n\n17.  You also need to\
    \ clean your persistence store in the `applicationWillTerminate` method. Do that\
    \ by dragging the “03 AppDelegate.m initiate CoreData with Magic Record 2” snippet\
    \ from DemoMonkey and placing it as shown in [Figure 6-16](#Chapter06.html#fig_6_16).\n\
    \n    ![images](images/9781430242727_Fig06-17.jpg)\n\n    **Figure 6-17.** *Creating\
    \ Data Model*\n\n18.  To create your data model, create data files inside a new\
    \ group called `Data Model`. Starting with creating the group, right-click the\
    \ `bookManager` folder and select New Group as shown on the left in [Figure 6-17](#Chapter06.html#fig_6_17).\
    \ Once the new group is created, a folder called `New Group` appears. Rename it\
    \ `Data Model`. Right-click the `Data Model` folder and select New File as shown\
    \ on the right in [Figure 6-17](#Chapter06.html#fig_6_17).\n\n    ![images](images/9781430242727_Fig06-18.jpg)\n\
    \n    **Figure 6-18.** *Create a Core Data data model.*\n\n19.  A dialog box asks\
    \ you to choose a template for your new file. By default the Cocoa Touch selection\
    \ under iOS in the left-hand pane is selected. Ignore this and choose the Core\
    \ Data ( Data Model template as shown on the left in [Figure 6-18](#Chapter06.html#fig_6_18).\
    \ A new dialog box asks you whether you would like to save the data model. Replace\
    \ the default `Model.xcdatamodeld` with `datamodel.xcdatamodeld` as shown on the\
    \ right in [Figure 6-18](#Chapter06.html#fig_6_18).\n\n    ![images](images/9781430242727_Fig06-19.jpg)\n\
    \n    **Figure 6-19.** *Create your SQLite entities.*\n\n20.  Your database will\
    \ hold a selection of Apress books that you’ll define in terms of three *tables*\
    \ (also called *entities*):\n\n    *   The author\n    *   The book\n    *   The\
    \ book’s category (such as iOS, Android, web, and so on)\n\n    You need to tell\
    \ the SQLite database about that. Click the `+` icon at the bottom of the data\
    \ model canvas and name the first entity `DBAuthor`. Repeat this two more times,\
    \ naming the two new entities `DBBook` and `DBCategory` respectively, as illustrated\
    \ in [Figure 6-19](#Chapter06.html#fig_6_19).\n\n    ![images](images/9781430242727_Fig06-20.jpg)\n\
    \n    **Figure 6-20.** *Create the attributes for the Category records.*\n\n21.\
    \  After your three entities are created, you need to create the attributes for\
    \ each entity. We’ll go through the creation of the `Category` entity in detail\
    \ and then assign the remaining two for you to do on your own with less help.\
    \ With the `DBCategory` entity selected, click the `+` button as shown on the\
    \ left in [Figure 6-20](#Chapter06.html#fig_6_20). When you first add an attribute,\
    \ the default name will simply be `attribute`. You need a way to give each category\
    \ (such as iOS, Android, or web) a name and an ID. So, name the first attribute\
    \ `categoryId`. Click the `+` button again and name the next attribute `categoryName`.\
    \ Click the selection button to the right of the `Type` column on the `categoryId`\
    \ row and choose Integer 32\\. Then click the selection button on the `categoryName`\
    \ row and select `String` as shown on the right in [Figure 6-20](#Chapter06.html#fig_6_20).\n\
    \n    ![images](images/9781430242727_Fig06-21.jpg)\n\n    **Figure 6-21.** *Finish\
    \ the attributes for DBAuthor and DBBook.*\n\n22.  Now you have to repeat the\
    \ process for the author and book entities. For your `Author` entity, you only\
    \ need an `authorId`, `firstName`, and `lastName` set of attributes. Make the\
    \ `authorId` be Integer 32 and the first and last names `String`. For the `Book`\
    \ entity you need seven attributes (of course, you could have many more, but for\
    \ this exercise seven will suffice). You’ll bring in the `authorId` and `categoryId`\
    \ from `DBAuthor` and `DBCategory` as foreign keys, so you find a corresponding\
    \ author and category for each book. You also need a unique `bookId`. And you\
    \ need four more attributes describing each book: a short description, an image\
    \ name associated with each book that you’ll later link to the cover image of\
    \ each book, the book title, and the book’s publishing year. With that said, make\
    \ `authorId`, `bookId`, and `categoryId` all as type Integer 32. Make `bookDescription`,\
    \ `imageName`, `title`, and `year` all be type `String` as shown in [Figure 6-21](#Chapter06.html#fig_6_21).\n\
    \n    **NOTE:** A *foreign key* points to another entity in the database and is\
    \ a way to link different entities together. For example, you’re linking a book\
    \ to its author and its category using foreign keys.\n\n    ![images](images/9781430242727_Fig06-22.jpg)\n\
    \n    **Figure 6-22.** *Generate classes for all the entities.*\n\n23.  Now that\
    \ you’ve defined the necessary tables and fields, you need to generate classes\
    \ for all the entities so you can manipulate them from code. Select all three\
    \ attributes `DBAuthor`, `DBBook`, and `DBCategory` by selecting the first one,\
    \ holding down the Shift key, and clicking the last one. Click Editor and choose\
    \ Create NSManagedObject Subclass as shown in [Figure 6-22](#Chapter06.html#fig_6_22).\
    \ An options dialog box will appear—press Enter or click the Create button, keeping\
    \ the default settings.\n\n    ![images](images/9781430242727_Fig06-23.jpg)\n\n\
    \    **Figure 6-23.** *Success!*\n\n24.  You’ll know you’ve been successful when\
    \ you see header and implementation files for all your entities neatly lined up\
    \ inside your `Data Model` folder. This may not seem like a big deal now, but\
    \ when you have a few hundred entities in you database, having Xcode automatically\
    \ create these is a miracle of sorts. You can now add custom methods to each of\
    \ these entities. Make sure your `Data Model` folder, entities, and attributes\
    \ look exactly like ours in [Figure 6-23](#Chapter06.html#fig_6_23) before moving\
    \ on.\n\n    ![images](images/9781430242727_Fig06-24.jpg)\n\n    **Figure 6-24.**\
    \ *Before moving on ...*\n\n25.  Also before moving on, you should check a couple\
    \ of things so you’re aware of what you’ve created so far. Click the `DBCategory.h`\
    \ file. As you can see in [Figure 6-24](#Chapter06.html#fig_6_24), Xcode has generated\
    \ all the properties for you based on the data fields you’ve specified in your\
    \ data model over the last few steps. What you’ll be doing over the next few steps\
    \ is adding methods to these properties so that you can retrieve the data.\n\n\
    \    **NOTE:** Over the next six steps, all the methods you’ll be adding essentially\
    \ do the same thing: they either create or delete a new entity with the values\
    \ provided in a dictionary or they allow you to retrieve other data based on foreign\
    \ key relationships, such as books wanting authors’ names and authors wanting\
    \ category names.\n\n    ![images](images/9781430242727_Fig06-25.jpg)\n\n    **Figure\
    \ 6-25.** *Setting up the DBBook.h file*\n\n26.  Select `DBBook.h` in the Project\
    \ Navigator. Drag in the “04 DBBook.h Methods and Extra Properties Declaration”\
    \ snippet from DemoMonkey and place it right before the `@end`. Then type in two\
    \ `#imports`, for `DBAuthor.h` and `DBCategory.h`, as shown in [Figure 6-25](#Chapter06.html#fig_6_25)\
    \ and as follows:\n\n    `#import <Foundation/Foundation.h>`\n    `#import <CoreData/CoreData.h>`\n\
    \    **`#import \"DBAuthor.h\"`**\n    **`#import \"DBCategory.h\"`**\n\n    `@interface\
    \ DBBook : NSManagedObject`\n    `...`\n    `@property (nonatomic, retain) NSString\
    \ * imageName;`\n    **`- (DBAuthor *)author;`**\n    **`- (DBCategory *)category;`**\n\
    \    **`...`**\n    **`- (void)deleteEntity;`**\n    `@end` ![images](images/9781430242727_Fig06-26.jpg)\n\
    \n    **Figure 6-26.** *Setting up the DBBook.m file*\n\n27.  Navigate to `DBBook.m`.\
    \ Drag in the “05 DBBook.m Methods and Extra Properties Implementation” snippet\
    \ from DemoMonkey and place it right before the `@end` as shown in [Figure 6-26](#Chapter06.html#fig_6_26).\n\
    \n    ![images](images/9781430242727_Fig06-27.jpg)\n\n    **Figure 6-27.** *Setting\
    \ up the DBCategory.h file*\n\n28.  Open `DBCategory.h` and drag in the “06 DBCategory.h\
    \ Methods and Extra Properties Declaration” snippet from DemoMonkey. Place it\
    \ between the last `@property` and the `@end` as shown in [Figure 6-27](#Chapter06.html#fig_6_27).\n\
    \n    ![images](images/9781430242727_Fig06-28.jpg)\n\n    **Figure 6-28.** *Setting\
    \ up the DBCategory.m file*\n\n29.  Now go to `DBCategory.m`, drag in the “07\
    \ DBCategory.m Methods and Extra Properties Implementation” snippet from DemoMonkey,\
    \ and place it between the last `@dynamic` and the `@end`. Also add `#import \"\
    DBBook.h\"` right after `#import \"DBCategory.h\"` as shown in [Figure 6-28](#Chapter06.html#fig_6_28)\
    \ and as follows:\n\n    `#import \"DBCategory.h\"`\n    **`#import \"DBBook.h\"\
    `** ![images](images/9781430242727_Fig06-29.jpg)\n\n    **Figure 6-29.** *Setting\
    \ up the DBAuthor.h file*\n\n30.  Open `DBAuthor.h` and drag in the “08 DBAuthor.h\
    \ Methods and Extra Properties Declaration” snippet from DemoMonkey. Place it\
    \ between the last `@property` and the `@end` as shown in [Figure 6-29](#Chapter06.html#fig_6_29).\n\
    \n    ![images](images/9781430242727_Fig06-30.jpg)\n\n    **Figure 6-30.** *Setting\
    \ up the DBAuthor.m file*\n\n31.  Navigate to `DBAuthor.m`. Drag in the “09 DBAuthor.m\
    \ Methods and Extra Properties Implementation” snippet from DemoMonkey and place\
    \ it between the last `@dynamic` and the `@end`. Also add `#import \"DBBook.h\"\
    ` right after the `#import \"DBAuthor.h`\" as shown in [Figure 6-30](#Chapter06.html#fig_6_30)\
    \ and as follows:\n\n    `#import \"DBAuthor.h\"`\n    **`#import \"DBBook.h\"\
    `**\n\n    That’s it! You’ve got through the setup and are ready to get on with\
    \ designing the app using Storyboarding in [Chapter 7](#Chapter07.html#ch7)."
  trans: "\n### 步骤 1/3：设置文件、图片、Core Data 和数据模型\n\n![images](img/9781430242727_Fig06-01.jpg)\n\
    **图 6-1.** *创建一个 Master-Detail 应用程序。*\n\n1. 打开 Xcode，按下 ![Images](img/U003.jpg)+![Images](img/U004.jpg)+`N`，然后选择\
    \ Master-Detail Application，如图 6-1 所示。\n\n   ![images](img/9781430242727_Fig06-02.jpg)\n\
    \   **图 6-2.** *为 bookManager 应用选择选项。*\n\n2. 在 Product Name 中输入 `bookManager`，在\
    \ Company Identifier 中输入 `com.storyboarding`。我们不使用类前缀。确保选择 iPhone 并勾选 Use Storyboards\
    \ 和 Use Automatic Reference Counting，如图 6-2 所示。保持 Use Core Data 和 Include Unit\
    \ Tests 为未选中状态。将项目保存到你的桌面。\n\n   **注意：** 我们在此项目模板中仅为了不让 Xcode 为我们生成 CoreData 设置代码而取消了\
    \ Use Core Data 选项。由于我们将在此应用中使用 MagicalRecord，因此上述代码已集成到其中。\n\n   ![images](img/9781430242727_Fig06-03.jpg)\n\
    \   **图 6-3.** *打开你的资源文件夹。*\n\n3. 现在，你将把资源拖入到项目中。如果你还没有从 [`http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter06_bookManager%20Assets.zip`](http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter06_bookManager%20Assets.zip)\
    \ 下载 `assets` 文件夹，请立即下载。将其保存到桌面后，解压缩。选择 `images` 文件夹和 `bookdata.plist`，如图 6-3\
    \ 所示。将这两项拖到 `bookManager` 文件夹内的 `Supporting Files` 文件夹中，如图 6-3 中的箭头所示。你的 `Supporting\
    \ Files` 文件夹应该看起来类似于图 6-3 中显示的我们的 `Supporting Files` 文件夹。\n\n   ![images](img/9781430242727_Fig06-04.jpg)\n\
    \   **图 6-4.** *将项目复制到目标组的文件夹中。*\n\n4. 你需要确保文件和 plist 的实际内容内置于应用中，因此请确保选择“Copy\
    \ items into destination group’s folder (if needed)”（将项目复制到目标组的文件夹（如果需要））和“Create\
    \ groups for any added folders”（为任何添加的文件夹创建组），并且你的目标将是此应用 `bookManager`。这在图 6-4\
    \ 中进行了说明。\n\n   ![images](img/9781430242727_Fig06-05.jpg)\n   **图 6-5.** *将 CoreData\
    \ 框架添加到项目中。*\n\n5. 你将在此应用中大量使用数据库——这是 Core Data 框架的一部分。从头开始编写数据库将耗费大量资源、时间和精力。Core\
    \ Data 提供了用于数据管理的预构建类和工具，并且它以这样一种方式完成：你只需在 Core Data 提供的基本功能之上构建自定义代码即可。要进行设置，请在项目导航器中选择主项目文件，在\
    \ Targets 下选择 `bookManager`，然后点击 Build Phases 选项卡，如图 6-5 所示。\n\n   ![images](img/9781430242727_Fig06-06.jpg)\n\
    \   **图 6-6.** *点击添加按钮。*\n\n6. 打开 Build Phases 选项卡后，转到 Link Binary with Libraries\
    \ 部分并将其展开。要将 Core Data 框架添加到此列表中，请点击添加 (+) 按钮，如图 6-6 所示。\n\n   ![images](img/9781430242727_Fig06-07.jpg)\n\
    \   **图 6-7.** *搜索并选择 CoreData 框架。*\n\n7. 点击 + 后，在搜索字段中输入 *coredata*。这将产生 `CoreData.framework`\
    \ 图标。选择它，如图 6-7 所示，然后点击 Add。\n\n   ![images](img/9781430242727_Fig06-08.jpg)\n\
    \   **图 6-8.** *CoreData.framework 现在位于你的 bookManager 目标内部。*\n\n8. 添加 `CoreData.framework`\
    \ 后，它将出现在你的 `bookManager` 目标内部，如图 6-8 左侧图像所示。将其移动到 `Frameworks` 文件夹中，如图 6-8 右侧图像所示。\n\
    \n   ![images](img/9781430242727_Fig06-09.jpg)\n   **图 6-9.** *在项目导航器中创建一个名为 Source\
    \ 的新组。*\n\n9. 在项目导航器中，继续在 `bookManager` 组内创建一个名为 `Source` 的新子组，如图 6-9 所示。稍后你将用到它。\n\
    \n**MAGICALRECORD**\n\nCore Data 并非本书的重点，因此我们不会深入探讨其所有细节。不过，为了简化工作，我们将引入一个开源的辅助库，它被许多备受尊敬的\
    \ Xcode 开发者广泛使用——包括我们那些现在正在苹果工作的学生。这个开源框架使 Core Data 的使用变得异常简单。它叫做 MagicalRecord，可以在\
    \ GitHub 上的 [`https://github.com/magicalpanda/MagicalRecord`](https://github.com/magicalpanda/MagicalRecord)\
    \ 获取。要直接下载 zip 文件，你可以使用 [`https://github.com/magicalpanda/MagicalRecord/zipball/master`](https://github.com/magicalpanda/MagicalRecord/zipball/master)，或者你也可以从之前为本章节下载的\
    \ `assets` 文件夹中获取。不过，请听从我们的建议，去探索一下 GitHub。如果你还没有 GitHub 账号，可以去申请一个。它是免费的！\n\n\
    **注意：** 这里有一份资源可以帮助你熟悉 MagicalRecord 的设置：[`http://yannickloriot.com/2012/03/magicalrecord-how-to-make-programming-with-core-data-pleasant/`](http://yannickloriot.com/2012/03/magicalrecord-how-to-make-programming-with-core-data-pleasant/)。\n\
    \n![images](img/9781430242727_Fig06-10.jpg)\n**图 6-10.** *下载 MagicalRecord。*\n\
    \n10. 进入 GitHub 后，你可以搜索 *MagicalRecord* 或 *MagicalPanda*，你应该会到达 [`https://github.com/magicalpanda/MagicalRecord`](https://github.com/magicalpanda/MagicalRecord)。点击\
    \ Zip 按钮，下载将开始，如图 6-10 中的箭头所示。\n\n    ![images](img/9781430242727_Fig06-11.jpg)\n\
    \    **图 6-11.** *解压缩并导航到 MagicalRecord 文件夹。*\n\n11. 成功将 `magicalpanda-MagicalRecord`\
    \ zip 文件下载到桌面后，将其解压缩并导航到 `MagicalRecord` 文件夹。选择该文件夹，如图 6-11 所示。\n\n    ![images](img/9781430242727_Fig06-12.jpg)\n\
    \    **图 6-12.** *将 MagicalRecord 文件夹拖入你的项目。*\n\n12. 将 `MagicalRecord` 文件夹拖入你在第\
    \ 9 步创建的 `Source` 文件夹内的项目中，如图 6-12 所示，并选择与你在先前图 6-2 中执行过的相同的保存协议。\n\n    ![images](img/9781430242727_Fig06-13.jpg)\n\
    \    **图 6-13.** *打开项目的 .pch 文件。*\n\n13. 现在你已经将 MagicalRecord 源代码添加到项目中，你需要让其对项目可见，以便你可以享受它所提供的对\
    \ Core Data 的各种扩展。本质上，MagicalRecord 是扩展主要 Core Data 功能并简化其使用的类别集合。所有使其正常运行所需的重要头文件都列在\
    \ `CoreData+MagicalRecord.h` 文件中。你可以通过简单地将此头文件放入 `bookManager-Prefix.pch` 文件中，使\
    \ MagicalRecord 对整个项目可见。导航到 `Supporting Files` 文件夹，点击 `.pch`（预编译头）文件将其打开，如图 6-13\
    \ 所示。\n\n    **注意：** Xcode 有一个名为 ProcessPCH 的高级命令，它根据 `.pch` 文件中的信息，告知编译器需要预编译并包含到项目中的头文件。这些预编译头文件保存在\
    \ `/Library/Caches` 的子目录中，然后在编译期间自动包含在每个文件中。包含在预编译头中的文件通常是不怎么变化的文件，这可以加快编译过程。这让你无需在每一个使用某个文件的文件中添加\
    \ `import` 语句，即可包含该文件，从而使其在整个项目中全局“可见”。\n\n    ![images](img/9781430242727_Fig06-14.jpg)\n\
    \    **图 6-14.** *打开 DemoMonkey 文件，并将第一步拖入项目的 .pch 文件中。*\n\n14. 打开本章提供的 `.demoMonkey`\
    \ 文件，并将其放在桌面上一个方便的位置。首先，将 DemoMonkey 中的“01 CoreData + MagicalRecord.h”代码片段拖入 `bookManager\
    \ - Prefix.pch` 文件中，紧跟在 `#import <Availability.h>` 代码行下方，如图 6-14 所示，如下所示：\n\n\
    \    ```\n    #import <Availability.h>\n    #import \"CoreData+MagicalRecord.h\n\
    \    ```\n\n    现在，这个头文件使 MagicalRecord 框架在整个项目中可用，而无需导入任何其他文件。\n\n15. 向项目添加新库/框架时，最佳实践是立即运行或至少构建它以检查你的工作，因为这是一个关键时刻，在继续编码之前需要立即纠正错误。点击\
    \ Run 并确保你的项目编译成功。有时开源社区的事情变化很快，这当然超出了我们的控制范围。在本书中，我们使用的是 MagicalRecord-2.0.3-12-g1d9e0db。如果你仔细遵循了所有步骤，但此时项目无法编译，请检查你的\
    \ MagicalRecord 版本——如果与我们的版本不匹配，请将你的 MagicalRecord 源文件夹替换为本章 Assets 包中提供的文件夹，然后重试。\n\
    \n    ![images](img/9781430242727_Fig06-15.jpg)\n    **图 6-15.** *初始化 SQLite 数据库。*\n\
    \n16. 现在，你将开始一项让许多计算机科学学生感到沮丧，并且是许多 Xcode 开发者的巨大障碍的任务：将数据库连接到 Xcode。在这里，你将使用 MagicalRecord\
    \ API 设置一个 SQLite 数据库，并且你会爱上它！打开 `AppDelegate.m` 文件，并将 DemoMonkey 中的“02 AppDelegate.m\
    \ initiate CoreData with MagicalRecord 1”代码片段拖到 `return YES` 之前，如图 6-15 所示，如下所示：\n\
    \n    ```\n    #import \"AppDelegate.h\"\n    @implementation AppDelegate\n  \
    \  @synthesize window = _window;\n    - (BOOL)application:(UIApplication *)application\
    \ didFinishLaunching\n    ...*)launchOptions\n    {\n      // Override point for\
    \ customization after application launch.\n      [MagicalRecord setupCoreDataStackWithStoreNamed:@\"\
    MyDatabase.sqlite\"];\n      return YES; ...\n    ```\n\n    **注意：** 使用 MagicalRecord，你可以用一行代码初始化整个\
    \ SQLite 数据库！这并不困难——它只需要你专注于你正在做什么以及为什么这样做。那么，让我们开始吧！\n\n    ![images](img/9781430242727_Fig06-16.jpg)\n\
    \    **图 6-16.** *清理持久化存储。*\n\n17. 你还需要在 `applicationWillTerminate` 方法中清理持久化存储。通过将\
    \ DemoMonkey 中的“03 AppDelegate.m initiate CoreData with Magic Record 2”代码片段拖入并放置在如图\
    \ 6-16 所示的位置来执行此操作。\n\n    ![images](img/9781430242727_Fig06-17.jpg)\n    **图\
    \ 6-17.** *创建数据模型。*\n\n18. 要创建你的数据模型，请在一个名为 `Data Model` 的新组内创建数据文件。首先创建组，右键点击\
    \ `bookManager` 文件夹并选择 New Group，如图 6-17 左侧所示。创建新组后，会出现一个名为 `New Group` 的文件夹。将其重命名为\
    \ `Data Model`。右键点击 `Data Model` 文件夹并选择 New File，如图 6-17 右侧所示。\n\n    ![images](img/9781430242727_Fig06-18.jpg)\n\
    \    **图 6-18.** *创建一个 Core Data 数据模型。*\n\n19. 会弹出一个对话框，要求你为新文件选择一个模板。默认情况下，左侧窗格中\
    \ iOS 下的 Cocoa Touch 选项是被选中的。忽略此选项，选择 Core Data（数据模型模板，如图 6-18 左侧所示）。一个新的对话框询问你是否想要保存数据模型。将默认的\
    \ `Model.xcdatamodeld` 替换为 `datamodel.xcdatamodeld`，如图 6-18 右侧所示。\n\n    ![images](img/9781430242727_Fig06-19.jpg)\n\
    \    **图 6-19.** *创建你的 SQLite 实体。*\n\n20. 你的数据库将保存一组 Apress 图书，你将通过三个*表*（也称为*实体*）来定义这些图书：\n\
    \n    * 作者\n    * 图书\n    * 图书的类别（例如 iOS、Android、Web 等）\n\n    你需要告知 SQLite 数据库相关信息。点击数据模型画布底部的\
    \ `+` 图标，并将第一个实体命名为 `DBAuthor`。再重复此操作两次，将两个新实体分别命名为 `DBBook` 和 `DBCategory`，如图\
    \ 6-19 所示。\n\n    ![images](img/9781430242727_Fig06-20.jpg)\n    **图 6-20.** *为\
    \ Category 记录创建属性。*\n\n21. 创建完三个实体后，你需要为每个实体创建属性。我们将详细讲解 `Category` 实体的创建过程，然后剩下的两个实体将由你自己在较少帮助下完成。选中\
    \ `DBCategory` 实体，点击 `+` 按钮，如图 6-20 左侧所示。首次添加属性时，默认名称将为 `attribute`。你需要一种方法来为每个类别（例如\
    \ iOS、Android 或 Web）提供名称和 ID。因此，将第一个属性命名为 `categoryId`。再次点击 `+` 按钮，并将下一个属性命名为\
    \ `categoryName`。点击 `categoryId` 行上 `Type` 列右侧的选择按钮，选择 Integer 32。然后点击 `categoryName`\
    \ 行上的选择按钮，选择 `String`，如图 6-20 右侧所示。\n\n    ![images](img/9781430242727_Fig06-21.jpg)\n\
    \    **图 6-21.** *完成 DBAuthor 和 DBBook 的属性。*\n\n22. 现在，你必须为作者和图书实体重复此过程。对于你的 `Author`\
    \ 实体，你只需要 `authorId`、`firstName` 和 `lastName` 这组属性。将 `authorId` 设为 Integer 32，将名字和姓氏设为\
    \ `String`。对于 `Book` 实体，你需要七个属性（当然，你可以有更多，但对于本练习来说七个就足够了）。你将引入来自 `DBAuthor` 和\
    \ `DBCategory` 的 `authorId` 和 `categoryId` 作为外键，以便为每本图书找到对应的作者和类别。你还需要一个唯一的 `bookId`。并且你需要另外四个描述每本图书的属性：简短描述、与每本图书关联的图像名称（稍后你将链接到每本图书的封面图像）、图书标题以及图书的出版年份。就此而言，将\
    \ `authorId`、`bookId` 和 `categoryId` 都设为 Integer 32 类型。将 `bookDescription`、`imageName`、`title`\
    \ 和 `year` 都设为 `String` 类型，如图 6-21 所示。\n\n    **注意：** *外键* 指向数据库中的另一个实体，是将不同实体链接在一起的一种方式。例如，你使用外键将一本图书与其作者及其类别相关联。\n\
    \n    ![images](img/9781430242727_Fig06-22.jpg)\n    **图 6-22.** *为所有实体生成类。*\n\
    \n23. 既然你已经定义了必要的表和字段，你需要为所有实体生成类，以便能够从代码中对它们进行操作。同时选中所有三个实体 `DBAuthor`、`DBBook`\
    \ 和 `DBCategory`：先选中第一个，按住 Shift 键，再点击最后一个。点击 Editor 并选择 Create NSManagedObject\
    \ Subclass，如图 6-22 所示。将出现一个选项对话框——按 Enter 键或点击 Create 按钮，保持默认设置。\n\n    ![images](img/9781430242727_Fig06-23.jpg)\n\
    \    **图 6-23.** *成功！*\n\n24. 当你看到所有实体的头文件和实现文件整齐地排列在你的 `Data Model` 文件夹中时，你就知道你已经成功了。现在这可能看起来没什么大不了的，但当你的数据库中有几百个实体时，让\
    \ Xcode 自动创建这些文件可以说是一种奇迹。你现在可以向这些实体中的每一个添加自定义方法。在继续之前，请确保你的 `Data Model` 文件夹、实体和属性与我们\
    \ 图 6-23 中的完全一致。\n\n    ![images](img/9781430242727_Fig06-24.jpg)\n    **图 6-24.**\
    \ *在继续之前……*\n\n25. 同样在继续之前，你应该检查一些事项，以便了解到目前为止你创建了什么。点击 `DBCategory.h` 文件。正如你在图\
    \ 6-24 中所见，Xcode 已经根据你在前面步骤中在数据模型中指定的数据字段为你生成了所有属性。在接下来的几个步骤中，你将添加方法来操作这些属性，以便能够检索数据。\n\
    \n    **注意：** 在接下来的六个步骤中，你将添加的所有方法基本上都做同样的事情：它们要么使用字典中提供的值创建或删除新实体，要么允许你基于外键关系检索其他数据，例如图书需要作者姓名，作者需要类别名称。\n\
    \n    ![images](img/9781430242727_Fig06-25.jpg)\n    **图 6-25.** *设置 DBBook.h\
    \ 文件。*\n\n26. 在项目导航器中选择 `DBBook.h`。将 DemoMonkey 中的“04 DBBook.h Methods and Extra\
    \ Properties Declaration”代码片段拖入，并放置在 `@end` 之前。然后为 `DBAuthor.h` 和 `DBCategory.h`\
    \ 输入两个 `#import` 语句，如图 6-25 所示，如下所示：\n\n    ```\n    #import <Foundation/Foundation.h>\n\
    \    #import <CoreData/CoreData.h>\n    #import \"DBAuthor.h\"\n    #import \"\
    DBCategory.h\"\n\n    @interface DBBook : NSManagedObject\n    ...\n    @property\
    \ (nonatomic, retain) NSString * imageName;\n    - (DBAuthor *)author;\n    -\
    \ (DBCategory *)category;\n    ...\n    - (void)deleteEntity;\n    @end\n    ```\n\
    \n    ![images](img/9781430242727_Fig06-26.jpg)\n    **图 6-26.** *设置 DBBook.m\
    \ 文件。*\n\n27. 导航到 `DBBook.m`。将 DemoMonkey 中的“05 DBBook.m Methods and Extra Properties\
    \ Implementation”代码片段拖入，并放置在 `@end` 之前，如图 6-26 所示。\n\n    ![images](img/9781430242727_Fig06-27.jpg)\n\
    \    **图 6-27.** *设置 DBCategory.h 文件。*\n\n28. 打开 `DBCategory.h`，将 DemoMonkey 中的“06\
    \ DBCategory.h Methods and Extra Properties Declaration”代码片段拖入。将其放置在最后一个 `@property`\
    \ 和 `@end` 之间，如图 6-27 所示。\n\n    ![images](img/9781430242727_Fig06-28.jpg)\n \
    \   **图 6-28.** *设置 DBCategory.m 文件。*\n\n29. 现在转到 `DBCategory.m`，将 DemoMonkey\
    \ 中的“07 DBCategory.m Methods and Extra Properties Implementation”代码片段拖入，并放置在最后一个\
    \ `@dynamic` 和 `@end` 之间。同时，在 `#import \"DBCategory.h\"` 之后立即添加 `#import \"DBBook.h\"\
    `，如图 6-28 所示，如下所示：\n\n    ```\n    #import \"DBCategory.h\"\n    #import \"DBBook.h\"\
    \n    ```\n\n    ![images](img/9781430242727_Fig06-29.jpg)\n    **图 6-29.** *设置\
    \ DBAuthor.h 文件。*\n\n30. 打开 `DBAuthor.h`，将 DemoMonkey 中的“08 DBAuthor.h Methods\
    \ and Extra Properties Declaration”代码片段拖入。将其放置在最后一个 `@property` 和 `@end` 之间，如图\
    \ 6-29 所示。\n\n    ![images](img/9781430242727_Fig06-30.jpg)\n    **图 6-30.** *设置\
    \ DBAuthor.m 文件。*\n\n31. 导航到 `DBAuthor.m`。将 DemoMonkey 中的“09 DBAuthor.m Methods\
    \ and Extra Properties Implementation”代码片段拖入，并放置在最后一个 `@dynamic` 和 `@end` 之间。同时，在\
    \ `#import \"DBAuthor.h\"` 之后立即添加 `#import \"DBBook.h\"`，如图 6-30 所示，如下所示：\n\n\
    \    ```\n    #import \"DBAuthor.h\"\n    #import \"DBBook.h\"\n    ```\n\n就是这样！你已经完成了设置，准备开始使用\
    \ Storyboarding 来设计应用，这将在第 7 章中进行。\n"
- fmt: '# Chapter 7


    ## Mastering Table Views with Storyboarding: Designing the Flow


    You’ve finished setting up the foundation for the `bookManager` Master-Detail
    Application (in step 1 of 3, [Chapter 6](#Chapter06.html#ch6)) and are ready to
    move on to step 2 of the app in this chapter. You’ve brought in all the images
    and the info about the books and set up the SQLite database. Cool! Well, if you
    think *that* was cool, wait until you see what we have in store for you as we
    lay out the entire app’s workflow in the Storyboard. Here in [Chapter 7](#Chapter07.html#ch7)
    you’ll be routing and connecting elements with such ease it will amaze you—particularly
    if you ever tried that sans Storyboard.


    ## Step 2: Storyboarding the App


    Okay—let’s go.


    ### Configuring the Master Scene


    ![images](images/9781430242727_Fig07-01.jpg)


    **Figure 7-1.** *Open the Storyboard.*


    1.  Now that you’ve set up your data model, you can start designing your interface.
    Open the Storyboard. You will immediately see that Xcode has already created a
    basic hierarchy of the Master-Detail Application for you. A basic Navigation Controller
    is connected to a Master View Controller that segues to a Detail View Controller
    as shown in [Figure 7-1](#Chapter07.html#fig_7_1). You’ll be using this template
    to fulfill your requirements.


    ![images](images/9781430242727_Fig07-02.jpg)


    **Figure 7-2.** *Rename the title to My Library.*


    2.  Double-click the title Master on the header of the Master View Controller,
    rename it My Library, and then click once on the prototype cell to select it as
    shown in [Figure 7-2](#Chapter07.html#fig_7_2).


    ![images](images/9781430242727_Fig07-03.jpg)


    **Figure 7-3.** *Change the Row Height of the cell to 50.*


    3.  Select the Utilities View and click the Size Inspector. Enter `50` for the
    Row Height attribute as shown in [Figure 7-3](#Chapter07.html#fig_7_3) and press
    Enter.


    ![images](images/9781430242727_Fig07-04.jpg)


    **Figure 7-4.** *Select the Table View.*


    4.  The scene you’re working on is going to be the first view in your app. In
    this case, it will let the user choose between the two top hierarchies of your
    library: Books and Authors. So, you know exactly how many cells you’re going to
    display in your Table View: two cells. That makes it a great candidate for being
    a Static Table View—a wonderful new feature only available with Storyboarding
    that allows you to lay out the content of your Table View statically in Storyboard,
    display it at the runtime, and even transition to other views when user selects
    a cell, all without writing any code at all! Let’s convert the Table View to static
    format: select the Table View by clicking below the prototype cell as shown in
    [Figure 7-4](#Chapter07.html#fig_7_4).


    ![images](images/9781430242727_Fig07-05.jpg)


    **Figure 7-5.** *Change the Table View Content type.*


    5.  Select the Attributes Inspector and change the Content type from Dynamic Prototypes
    to Static Cells. You’ll see three identical cells appear as shown in [Figure 7-5](#Chapter07.html#fig_7_5).


    **NOTE:** Dynamic Table Views display dynamic content, and in that case Table
    View is a large (and sometimes unbounded) number of rows. Dynamic Table Views
    use reusable Dynamic Cell Prototypes to display quite large data sets very efficiently.
    Static Table Views are basically “what you see is what you get.” With static content,
    the number of rows in a Table View is a known and fixed number, so you can design
    all rows in the Interface Builder. Note that Static Table Views can only be created
    using Storyboards and must be controlled by a Table View Controller subclass.


    ![images](images/9781430242727_Fig07-06.jpg)


    **Figure 7-6.** *Name the roots of the hierarchical tree.*


    6.  Click one of the three cells and delete it so that only two remain. Now let’s
    think about things. You’ll have two trees of data, flowing from looking at the
    database in terms of Books, or looking at the database in terms of Authors. This
    means your root node has two choices: Books and Authors. Change the label text
    of the two cells from Title to Books and Authors as shown in [Figure 7-6](#Chapter07.html#fig_7_6).
    Now you’re going to delete the segue connecting the Master View Controller to
    the Detail View Controller: click the segue, as shown in [Figure 7-6](#Chapter07.html#fig_7_6),
    to select it and then delete it.


    ![images](images/9781430242727_Fig07-07.jpg)


    **Figure 7-7.** *Delete the code between `@end` and `@implementation` in `MasterViewController.m`—the
    arrow indicates the place where the code used to be.*


    7.  Before moving on to the next step, there’s one last thing you must do for
    your Static Table View to display properly. You need to delete some of the existing
    code for the Master View Controller. Xcode created some code for you in `MasterViewController.m`
    as part of the Master-Detail Application template. This code implements the `UITableViewDelegate`
    and `UITableViewDataSource` protocol methods, which will override the Static Table
    View content you defined in the Storyboard if they are present. So click the `MasterViewController.m`
    file in the Project Navigator, select all the code between `@implementation` and
    `@end`, and remove it as shown in [Figure 7-7](#Chapter07.html#fig_7_7).


    **NOTE:** Because this is a static table it doesn’t require any additional code.
    Later you’ll create segues from each of the static cells Books and Authors to
    their respective View Controllers you want them to transition to. That’s why for
    now you won’t have a segue connecting the Master View Controller to the Detail
    View Controller.'
