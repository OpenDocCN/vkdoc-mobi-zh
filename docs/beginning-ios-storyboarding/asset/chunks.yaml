  trans: '

    ### 步骤 1：设置文件、项目设置和资源


    和往常一样，先清理你的桌面。然后访问 [`www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter07_WanderBoard-Assets.zipdownload`](http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter07_WanderBoard-Assets.zipdownload)，下载文件，并将文件夹解压到桌面。


    ![images](img/9781430242727_Fig09-01.jpg)


    **图 9-1.** *创建一个单一视图应用，并将其保存为 `wanderBoard`。*


    1. 打开 Xcode，按下 ![images](img/U003.jpg)+![images](img/U004.jpg)+`N`，然后选择“单一视图应用”（Single
    View Application）。将其命名为 `wanderBoard`。在公司标识符（Company Identifier）中输入 `com.apress`，这样如果你需要将我们的一些代码与你自己的代码进行比较或替换，它们将完全匹配。选择
    iPad，因为此应用仅适用于 iPad，你将使用自动引用计数（Automatic Reference Counting），当然还会使用 Storyboard，如
    图 9-1 所示。将其保存到你的桌面。


    ![images](img/9781430242727_Fig09-02.jpg)


    **图 9-2.** *将应用设置为仅横向模式。*


    2. 现在你将设置我们的应用，然后从你从网上下载的 `WanderBoard - Assets` 文件夹中拖入一些资源。将应用设置为仅横向模式，这样你就不必为不同的方向创建大量额外的图片了（顺便提醒一下，如果你自己创建一个包含许多图片的游戏，请注意这一点——目前你已经有了
    18 张图片）。在“摘要”（Summary）的“支持的设备方向”（Supported Device Orientations）部分，取消勾选“竖屏”（Portrait）和“倒置”（Upside
    Down）选项，如 图 9-2 所示。图 9-2 中显示了图底部“启动图像”（Launch Images）部分的两张横向图片——你要通过将从文件夹中找到的两张启动画面
    `Default-Landscape@2x~ipad.png` 和 `Default-Landscape~ipad.png` 一起拖入根目录来实现，如 图
    9-2 左上角所示。将文件拖入目录时，请务必像往常一样选择“将项目复制到项目文件夹中”（copy items into the project folder）。你会看到，当你拖入它们时，它们会自动出现在“启动图像”中，因为它们设置了正确的分辨率并具有正确的名称。


    ![images](img/9781430242727_Fig09-03.jpg)


    **图 9-3.** *拖入应用图标。*


    3. 上一步已自动为“启动图像”找到了正确的分辨率并完成了工作。然而，对于图标来说，情况则有所不同。将 `icon72x72.png` 和 `icon144x144.png`
    分别从你的文件夹拖入“应用图标”（App Icons）对应的插槽中，其中 `icon144x144.png` 图标放入“Retina 显示屏”（Retina
    Display）插槽，如 图 9-3 所示。稍后，你会将这些默认存储在项目根文件夹中的图标移动到 `Supporting Files` 文件夹中。


    ![images](img/9781430242727_Fig09-04.jpg)


    **图 9-4.** *确保正确设置拖入图片文件夹的选项。*


    4. 现在选择你下载文件夹中的 `Images` 文件夹，并将其拖入你的 `Supporting Files` 文件夹。当“选择选项”（Choose Options）对话框出现时，选择“创建副本”和“分组”，如
    图 9-4 所示。确保你的 `Supporting Files` 文件夹看起来与我们的一致。如果不一致，你可能不小心将它们放在了 `Supporting Files`
    文件夹之外。


    ![images](img/9781430242727_Fig09-05.jpg)


    **图 9-5.** *引入转场代码。*


    5. 现在将我们为你制作的转场代码文件 `MovementSegue.h` 和 `MovementSegue.m` 拖入 `wanderBoard` 文件夹中，如
    图 9-5 所示。请记住，Xcode 不知道如何构建实现文件，因为这种框架设置方式并非预期的方式。所以你需要设置一个新的编译源。


    **注意：** 你添加类文件的方式与以往不同。你不是选择分组然后选择“将文件添加到 {分组}”，而是直接从访达（Finder）将 `.m` 和 `.h` 文件拖拽到分组中。在撰写本文时，当你使用这种拖放方式添加类文件时，Xcode
    不会添加编译 `.m` 文件的指令。这就是为什么你需要接下来的步骤。如果你使用了“添加文件...”方法，你会发现 `.m` 文件的编译指令已经被自动添加了。


    ![images](img/9781430242727_Fig09-06.jpg)


    **图 9-6.** *设置一个新的编译源。*


    6. 要为转场类创建新的编译源，请点击“构建阶段”（Build Phases）标签（如果你找不到，图 9-2 中有显示），然后选择“编译源”（Compile
    Sources）（3 项）。你需要添加一个将作为转场的新编译源。点击“源文件”（Sources）（3 项）下方的 `+` 按钮，然后从访达对话框中选择 `MovementSegue.m`
    文件，如 图 9-6 所示。


    ![images](img/9781430242727_Fig09-07.jpg)


    **图 9-7.** *将图标文件移动到 Images 文件夹中。*


    7. 你差不多快拖完资源了。现在只需做一点整理工作。将两个图标文件 `icon72x72.png` 和 `icon144x144.png` 拖入位于内部的
    `Images` 文件夹中，如 图 9-7 所示。


    ![images](img/9781430242727_Fig09-08.jpg)


    **图 9-8.** *通过构建代码来确保设置正确。*


    8. 现在你已经将所有资源拖入了项目。在进入下一节开始编写应用代码之前，首先要确保你做的一切都正确。按下 ![images](img/U003.jpg)+`B`，如
    图 9-8 所示，并确保构建成功。请注意，在 图 9-8 中，我们关闭了 `Supporting Files` 文件夹。你的文件夹可能仍然处于打开状态。

    '
- fmt: "### Step 2: Prep the Storyboard\n\nIn this section you’ll set up your Storyboard.\
    \ You’ll start by working on the first scene by adding your `ViewController`,\
    \ `UIImageViews`, welcome label, and buttons. After you code this in the next\
    \ section, bear in mind that you’ll have to repeat it for the remaining 17 scenes.\n\
    \n![images](images/9781430242727_Fig09-09.jpg)\n\n**Figure 9-9.** *Create the\
    \ Navigation Controller.*\n\n1.  Open the Storyboard and you’ll see the iPad default\
    \ canvas on your screen. Think about this for a second. To make it easier to wander\
    \ through a maze, where the user will often back up and then go forward again,\
    \ it would serve you well to use a Navigation Controller inside your Navigation\
    \ Controller as you’ve done in the past. Remember, doing so gives you the ability\
    \ to push and pop views. Select the view on the Storyboard and choose Editor ![images](images/U001.jpg)\
    \ Embed In ![images](images/U001.jpg) Navigation Controller as shown in [Figure\
    \ 9-9](#Chapter09.html#fig_9_9). Now you’ll see by looking at the Storyboard that\
    \ you’ve taken your Single View, selected it, and embedded it inside the Navigation\
    \ Controller so that everything begins from the Navigation Controller.\n\n   \
    \ ![images](images/9781430242727_Fig09-10.jpg)\n\n    **Figure 9-10.** *Setting\
    \ up metrics*\n\n2.  To set the metrics, click your `ViewController` (the one\
    \ on the right-hand side) and open the Attributes Inspector. Navigate to the Simulated\
    \ Metrics section, where you want to make sure that the size is iPad Full Screen\
    \ and the orientation will stay Landscape. Leave everything else as Inferred as\
    \ shown in [Figure 9-10](#Chapter09.html#fig_9_10).\n\n    ![images](images/9781430242727_Fig09-11.jpg)\n\
    \n    **Figure 9-11.** *Drag in an image view from the Library.*\n\n3.  Leave\
    \ the View Controller you just set up in step 10 right there, because you’ll be\
    \ adding labels and buttons and things any project heavy with graphics would have.\
    \ Start by bringing in an Image View from the Library. It will automatically size\
    \ to the correct dimensions as shown in [Figure 9-11](#Chapter09.html#fig_9_11).\
    \ Once that happens, drop it into your view.\n\n    ![images](images/9781430242727_Fig09-12.jpg)\n\
    \n    **Figure 9-12.** *Make sure the image is configured to automatically resize.*\n\
    \n4.  You’ll soon be taking out the Navigation Bar because you want your user\
    \ to have the full-screen experience on the iPad. For our image to resize itself\
    \ as we insert or take objects out of the view, we need to make sure now while\
    \ we are creating this first scene that the Image View is set to automatically\
    \ resize. Go to the Size Inspector and make sure the Autosizing option is configured\
    \ as shown in [Figure 9-12](#Chapter09.html#fig_9_12). While you’re there, note\
    \ that Interface Builder has resized the Image View to the size it needs to be\
    \ with the Navigation Bar there. The `x` and `y` positions show that it’s positioned\
    \ in the upper left-hand corner which is correct.\n\n    ![images](images/9781430242727_Fig09-13.jpg)\n\
    \n    **Figure 9-13.** *Setting your first image.*\n\n5.  You’re now able to set\
    \ your first image. With the Image View still selected, in the Attributes Inspector\
    \ select the image that shows the view from camera 1. This step is necessary because\
    \ you may want to make sure, if you design a game with a 3D landscape, that you\
    \ identify in your image filename, which camera number the view is coming from.\
    \ Here, you’re selecting camera view number 1, named `wanderBoard-cam01.png` from\
    \ the drop-down menu as shown in [Figure 9-13](#Chapter09.html#fig_9_13). If the\
    \ filename of the image you want to show isn’t visible in the list of images,\
    \ you may need to scroll down to see more names.\n\n    Awesome! You’re now standing\
    \ at the entrance to the maze. You’re now going to use Storyboarding and Xcode\
    \ to walk a user through this maze, and that is a really cool concept.\n\n   \
    \ ![images](images/9781430242727_Fig09-14.jpg)\n\n    **Figure 9-14.** *Make a\
    \ multi-line welcome label.*\n\n6.  You want to have a welcome label that greets\
    \ users as they enter the maze. Grab a label from the Library, drag to the upper\
    \ portion of the right-hand wall, and enlarge it a little. In the Attributes Inspector\
    \ you’re going to do something interesting that you may not have come across yet:\
    \ make a multi-line label. You have to use a special key to make a soft return:\
    \ In the Label text box, enter *Welcome* and press Option+Return to create the\
    \ new line as shown in [Figure 9-14](#Chapter09.html#fig_9_14). On the new line\
    \ enter *to our*, create another new line, and enter *Maze!* as shown in [Figure\
    \ 9-15](#Chapter09.html#fig_9_15). Next you have to adjust the Lines count from\
    \ 1 to 3 (as shown) before the label will show all three lines. Choose Mocha as\
    \ the text color by selecting it in the crayon box color selection (Mocha is the\
    \ left-most crayon in the 2nd row from the top). Also choose light grey for the\
    \ shadow color, with the shadow offsets at a distance of 1 for Horizontal and\
    \ 1 for Vertical.\n\n    ![images](images/9781430242727_Fig09-15.jpg)\n\n    **Figure\
    \ 9-15.** *Change the font style.*\n\n7.  While in the Attributes Inspector, with\
    \ the font selected change the font to Noteworthy Bold by clicking the `T` icon\
    \ in the drop-down menu and selecting Noteworthy. Select Bold for Style and 40\
    \ (points) for Size as shown in the left-hand image in [Figure 9-15](#Chapter09.html#fig_9_15).\
    \ In the Size Inspector make the `x`, `y` position 700, 80. Set the Width of the\
    \ text box to 250 and the Height to 200 as shown on the right in [Figure 9-15](#Chapter09.html#fig_9_15).\n\
    \n    ![images](images/9781430242727_Fig09-16.jpg)\n\n    **Figure 9-16.** *Bring\
    \ in the first button.*\n\n8.  To navigate from screen to screen, you’d like to\
    \ use buttons, but you don’t really want the user to see the buttons because that\
    \ would give away which way to go. You’ll use the Size Inspector to set the sizes\
    \ and positions of buttons correctly. Then in the Attributes Inspector you’ll\
    \ make it invisible by changing it to Custom, which by default sets it to transparent.\n\
    \n    Drag in a button from your Library and place it about where you see ours\
    \ in [Figure 9-16](#Chapter09.html#fig_9_16). In the Size Inspector set the `x`-position\
    \ to 530, `y`-position to 80, Width to 140, and Height to 450.\n\n    ![images](images/9781430242727_Fig09-17.jpg)\n\
    \n    **Figure 9-17.** *Make the button invisible.*\n\n9.  To make the button\
    \ transparent, in the Attributes Inspector select Custom for Type. The button\
    \ will become transparent as shown in [Figure 9-17](#Chapter09.html#fig_9_17).\n\
    \n    ![images](images/9781430242727_Fig09-18.jpg)\n\n    **Figure 9-18.** *Allow\
    \ users to see when they tap the button.*\n\n10.  You’ve made the button transparent,\
    \ but you need to let users see when they’ve tapped it. Put a check mark next\
    \ to the Drawing attribute Shows Touch On Highlight so that when the user taps\
    \ the button it creates a little flash that tells the user when the button got\
    \ hit. This is shown in [Figure 9-18](#Chapter09.html#fig_9_18).\n\n    ![images](images/9781430242727_Fig09-19.jpg)\n\
    \n    **Figure 9-19.** *Naming the buttons*\n\n11.  Even in this small 18-scene\
    \ maze, each scene will have two to three options for where to go next, which\
    \ could add up to 40 buttons. You need a naming system so you can easily identify\
    \ buttons in your document outline just by name. This button you’ve selected allows\
    \ the user to go to the right, so with the button still selected, in the Identity\
    \ Inspector label it `Button - Right` as shown in [Figure 9-19](#Chapter09.html#fig_9_19).\n\
    \n    ![images](images/9781430242727_Fig09-20.jpg)\n\n    **Figure 9-20.** *Check\
    \ the status.*\n\n12.  This is a critical step, so let’s be overly cautious that\
    \ this aspect of the project is working perfectly before moving on. First check\
    \ it in the Document Outline and then run it. Open the Document Outline Panel\
    \ in Storyboard if it’s not already open and go to the View Controller Scene.\
    \ Under View, if you open it up, you should see Image View…, Label - Welcome to\
    \ our Maze!, and Button - Right as shown in [Figure 9-20](#Chapter09.html#fig_9_20).\
    \ Let’s move on and build it. If it builds correctly, run it.\n\n    ![images](images/9781430242727_Fig09-21.jpg)\n\
    \n    **Figure 9-21.** *Click the transparent (invisible) button and see the flash!*\n\
    \n13.  When the iPad Simulator appears, click where you know the transparent button\
    \ is. You should see a flash indicator as shown in [Figure 9-21](#Chapter09.html#fig_9_21).\
    \ Note that wherever you click, it will still show the flash. That’s important\
    \ because different people may choose different segments of the button. You’ve\
    \ accomplished an important part of creating the app. Good job!"
