  trans: "\n11.  现在确保`ViewController`遵循你刚创建的`AlienViewControllerDelegate`协议。为此，首先打开`ViewController.h`文件，将“06\
    \ VC.h - 导入 AlienVC 头文件”拖放到`#import <UIKit/UIKit.h>`这一行下方。接下来，通过拖放“07 VC.h - 显示遵循协议”内容，将`@interface\
    \ ViewController : UIViewController`添加到协议一致性声明中，如图 2-22 所示。\n\n![images](img/9781430242727_Fig02-23.jpg)\n\
    \n**图 2-23.** *选择“跳转到定义”。*\n\n12.  接下来，将新的协议方法添加到代码中。直接从协议声明中复制方法签名，以确保完全正确。点击协议名称（位于`<\
    \ >`括号内），然后选择右键菜单项“跳转到定义”，直接跳转到你的新协议。（注意，你可能需要先构建（按下![images](img/U003.jpg)`+B`）代码一次，让这个名称被识别。）\n\
    \n**注意：** 为什么我们要使用“跳转到定义”这个技巧？因为在为 iOS 编写代码时，你需要了解大量的协议和对象接口。最佳的学习方式是在每次使用协议或接口时，刷新你对它的了解。通过直接跳转到协议声明，你有机会提醒自己该协议中声明的其他方法。看到了吗？这就是在工作中的持续学习！\n\
    \n如果你在代码行业有一定经验，你是否注意到你不需要知道协议在哪个文件中声明？Xcode 会自动为你找到它。谢谢你，Xcode（以及构建它的开发者们！）\n\
    \n![images](img/9781430242727_Fig02-24.jpg)\n\n**图 2-24.** *从协议中获取方法。*\n\n13.\
    \  现在，选择并复制`alien:saysIAmHere:`方法的签名，如图 2-24 所示（你正在抓取的代码已高亮显示）。\n\n**注意：** 你是否注意到你复制的方法行上方的`@required`指令？这意味着任何声明遵循你的委托协议的对象（在这个例子中是`ViewController`）*必须*已经实现了`alien:saysIAmHere:`方法。当你在协议定义中声明`@required`，并且在另一个类中声明遵循该协议时，如果你尚未实现协议的一个或多个`@required`方法，编译器将生成错误。这有助于确保你已经编写了处理该协议所需的最少代码。\n\
    \n![images](img/9781430242727_Fig02-25.jpg)\n\n**图 2-25.** *粘贴委托方法。*\n\n14.  继续创建委托协议方法：回到`ViewController.m`文件。将你刚复制的方法粘贴到`@end`前面，如图\
    \ 2-25 所示。将分号替换为花括号，并在这些花括号内添加来自“08 VC.m - 协议方法内容”的代码，该代码会在发现外星人时向你发送一条消息（将文本写入你的新标签）。我们碰巧使用了`Status:\
    \ whoa, found aliens!`作为文本，但你当然可以插入任何你想要的内容。现在，这个新方法看起来像这样：\n\n```\n-(void)alien:(AlienViewController\
    \ *)view saysIAmHere:(BOOL)bIsHere\n{\n    self.lblFindStatus.text = (bIsHere)\
    \ ? @\"Status: whoa, found aliens!\" :\n    @\"Status: no aliens found\";\n}\n\
    ```\n\n**注意** 这段代码根据参数`bIsHere`的状态，将两条消息之一放入屏幕上的标签中。还要注意，你将这段消息文本写入用户界面对象的`.text`属性，根据名称的`lbl`前缀，你知道这应该是一个标签。\n\
    \n15.  你已经有了 segue 名称`ShowAlienView`，并将委托协议方法添加到了`ViewController`，这样当外星人视图告诉它是否存在外星人时，它就知道该怎么做。但现在你需要在应用程序首次启动时初始化显示的文本，表明你尚未发现外星人。因此，留在`ViewController.m`文件中，找到`viewDidLoad`方法，并拖入另一行代码“09\
    \ VC.m - ViewDidLoad 内容”，使该方法现在看起来如下：\n\n```\n- (void)viewDidLoad\n{\n    [super\
    \ viewDidLoad];\n    [self alien:nil saysIAmHere:NO];\n}\n```\n\n**注意** 这段代码调用了相同的协议方法，但这是在`ViewController`内部，而不是从`AlienViewController`调用的。你不是`AlienViewController`，所以第一个参数传入`nil`，而你最初希望的状态是“没有发现外星人”，所以第二个参数传入`NO`。方便的是，`viewDidLoad`方法在你首次启动应用程序时只执行一次，因此当你第一次看到屏幕标签时，它已经按你的需要设置好了。\n\
    \n![images](img/9781430242727_Fig02-26.jpg)\n\n**图 2-26.** *添加 prepareForSegue\
    \ 方法。*\n\n16.  现在你需要告诉`AlienViewController`，`ViewController`可以处理它发送给委托的数据。通过告知`AlienViewController`，`ViewController`就是委托来实现这一点。`prepareForSegue`方法的存在正是为了让你做这类事情。让我们添加一个`prepareForSegue`方法，并设置`AlienViewController`的委托属性。将“10\
    \ VC.m - prepareForSegue 方法”拖放到`shouldAutorotateTo`... 下方，最终结果如下：\n\n```\n- (void)prepareForSegue:(UIStoryboardSegue\
    \ *)segue sender:(id)sender\n{\n    if ([[segue identifier] isEqualToString:@\"\
    ShowAlienView\"]) {\n        [[segue destinationViewController] setDelegate:self];\n\
    \    }\n}\n```\n\n**注意：** 此方法首先检查 segue 是否是你想要的那个（`ShowAlienView`）。如果是，则将目标视图控制器的委托属性设置为`self`（这个`ViewController`实例）。现在，当目标视图出现并希望通过调用`alien:saysIAmHere:`方法将信息传递给委托时，`ViewController`中匹配的方法将被调用，从而设置你的标签文本。\n\
    \n![images](img/9781430242727_Fig02-27.jpg)\n\n**图 2-27.** *将开关的初始状态设置为“关”。*\n\
    \n17.  现在，你已经在名为`ShowAlienView`的 segue 中，将委托属性设置为`ViewController`实例，以便它能显示外星人存在状态。但我们的外星人需要能够告诉你它的存在！那么，加一个简单的“存在”开关如何？去给外星人视图添加一个开关和描述标签。打开\
    \ Storyboard 文件，选择外星人视图控制器场景，将一个开关拖到外星人视图上。将开关状态设置为关，如图 2-27 所示。\n\n![images](img/9781430242727_Fig02-28.jpg)\n\
    \n**图 2-28.** *左对齐，白色文字*\n\n18.  你还需要说明文字，所以将一个标签拖到画布上，放在开关的左侧。将其设置为左对齐，文字颜色设置为白色，并将文字设置为*Can\
    \ I be seen?*，如图 2-28 所示。\n\n![images](img/9781430242727_Fig02-29.jpg)\n\n**图\
    \ 2-29.** *为开关添加 IBAction。*\n\n![images](img/9781430242727_Fig02-30.jpg)\n\n**图\
    \ 2-30.** *将 IBAction 方法命名为 onSwitchValueChanged。*\n\n19.  现在你需要为开关添加一个`IBAction`方法。打开助理编辑器，确保`AlienViewController.h`文件位于外星人视图的右侧。按住\
    \ Control 键从开关拖拽到委托属性下方的空行，如图 2-29 所示。从“连接”下拉菜单中选择“操作”，并输入名称 *onSwitchValueChanged*，如图\
    \ 2-30 所示。\n\n![images](img/9781430242727_Fig02-31.jpg)\n\n**图 2-31.** *创建一个变量来保存开关的值。*\n"
- fmt: "20.  Xcode has generated a method shell for this in the implementation file\
    \ that you now need to code to get the value from the switch. But before you do\
    \ this, you need to first create a variable that will hold the switch state. So,\
    \ let’s first declare this variable. Go to the `AlienViewController.m` file and\
    \ drag “11 AlienVC.m -add instance variable” just to the right end of the `@interface\
    \ AlienViewController ()` line, so that you now have the code as shown In [Figure\
    \ 2-31](#Chapter02.html#fig_2_31): `@interface AlienViewController () {`\n   \
    \ `@private   // unneccessary, but reminds us!`\n    `    BOOL m_bIsAlienSeen;`\n\
    \    `}`\n\n21.  You need to set up the initial state of this variable and return\
    \ the state of this variable to your delegate. Conveniently, you can use `viewWillAppear`\
    \ to set the initial state and `viewWillDisappear` to report the switch value\
    \ as you’re leaving. To add these two methods, drag “12 AlienVC.m -add viewWillAppear/Disappear\
    \ methods” to just after the `viewDidLoad` method, so that we now have the code\
    \ as shown in [Figure 2-32](#Chapter02.html#fig_2_32).\n\n![images](images/9781430242727_Fig02-32.jpg)\n\
    \n**Figure 2-32.** *Add the two methods* `viewWillAppear` *and* `viewWillDisappear`.\n\
    \n![images](images/9781430242727_Fig02-33.jpg)\n\n**Figure 2-33.** *Add code to\
    \ capture the current switch value when it changes.*\n\n22.  Finally, you’re in\
    \ a position to capture the switch value whenever it’s changed. Drag “13 AlienVC.m\
    \ - add action method content” inside the curly braces of the `onSwitchValueChanged:`\
    \ method so that the code appears as shown in [Figure 2-33](#Chapter02.html#fig_2_33).\n\
    \n![images](images/9781430242727_Fig02-34.jpg)\n\n**Figure 2-34.** *Whoa! Found\
    \ the Alien!*\n\n23.  You’ve completed the code modifications for Step 2. Let’s\
    \ run the code in the iPhone Simulator to see if you have it all working! Click\
    \ the Run button at the top left of the Xcode window. When the Simulator starts,\
    \ click Find Alien to go to the Alien View. Your new switch should be there. Toggle\
    \ the switch to On and click the back button (top left of Navigation Bar) to return\
    \ to the Main View. Did your Status: text change? Did you find your Alien? [Figure\
    \ 2-34](#Chapter02.html#fig_2_34) illustrates this test sequence.\n\n### Step\
    \ 3: Send Information Out to the Secondary View (Alien View)\n\nIn this section\
    \ we’re going to demonstrate a common technique for passing information out to\
    \ the destination view. In this case, you’re going to add a text field to your\
    \ Alien Finder main screen and pass the text on to the Alien’s universe! Let’s\
    \ get started.\n\n![images](images/9781430242727_Fig02-35.jpg)\n\n**Figure 2-35.**\
    \ *Say something to the Alien.*\n\n1.  You now want to send a message to the Alien\
    \ once he tells us he exists. Drag a text field onto the Main View above the Find\
    \ Alien button. Center the text and enter *Say something to the Alien* as the\
    \ Placeholder text (this text informs the user of the purpose of the Text Field)\
    \ as illustrated in [Figure 2-35](#Chapter02.html#fig_2_35).\n\n![images](images/9781430242727_Fig02-36.jpg)\n\
    \n**Figure 2-36.** *Control-drag from the Text Field down to the View Controller\
    \ icon.*\n\n2.  You now need to assign the View Controller as the Text Field’s\
    \ delegate so that it can know when the editing is done—so you can dismiss the\
    \ keyboard. Control-drag from the “Say Something to the Alien!” Text Field down\
    \ to the View Controller icon right below as shown in [Figure 2-36](#Chapter02.html#fig_2_36).\n\
    \n![images](images/9781430242727_Fig02-37.jpg)\n\n**Figure 2-37.** *Connect to\
    \ the “delegate” outlet.*\n\n3.  In the drop-down menu, connect it to the “delegate”\
    \ outlet as illustrated in [Figure 2-37](#Chapter02.html#fig_2_37).\n\n![images](images/9781430242727_Fig02-38.jpg)\n\
    \n**Figure 2-38.** *Create the property for the string message to the Alien.*\n\
    \n4.  Next create and synthesize a property for your message string to the Alien.\
    \ Go to the `ViewController.h` file and under the `lblFindStatus` property add\
    \ a new property by dragging “14 VC.h - add alienText property” as illustrated\
    \ in [Figure 2-38](#Chapter02.html#fig_2_38). To synthesize it, go back to the\
    \ `ViewController.m` file under the `lblFindStatus` synthesis and add the new\
    \ property synthesis by dragging “15 VC.m - synthesize AlienText property” into\
    \ place.\n\n![images](images/9781430242727_Fig02-38.jpg)\n\n**Figure 2-39.** *Controlling\
    \ the text editing to the Alien.*\n\n5.  When you enter text, you need two sets\
    \ of code—one method to dismiss the keyboard, and the other to capture the text\
    \ that was entered in the text field. You’ll do this with `textFieldDidEndEditing`\
    \ and `textFieldShouldReturn` delegate methods that are provided by the `UITextFieldDelegate`\
    \ protocol. All you need to do is to add implementation for both methods. Staying\
    \ in the `ViewController.m` file, drag “16 VC.m - add Text Editing support methods”\
    \ as illustrated in [Figure 2-39](#Chapter02.html#fig_2_39).\n\n![images](images/9781430242727_Fig02-40.jpg)\n\
    \n**Figure 2-40.** *The property for the message to the Alien*\n\n6.  You need\
    \ to create and synthesize a property, but this time it’s for you to capture the\
    \ text you’re sending to the Alien. In the `AlienViewController.h` file, add a\
    \ property by dragging in “17 AlienVC.h - add messageForAlien property” as illustrated\
    \ in [Figure 2-40](#Chapter02.html#fig_2_40).\n\n![images](images/9781430242727_Fig02-41.jpg)\n\
    \n**Figure 2-41.** *Synthesize the message to the Alien property.*\n\n7.  In the\
    \ `AlienViewController.m` file, under the `lblFindStatus` synthesis, add the new\
    \ property synthesis using “18 AVC.m synthesize messageForAlien property” as illustrated\
    \ in [Figure 2-41](#Chapter02.html#fig_2_41).\n\n![images](images/9781430242727_Fig02-42.jpg)\n\
    \n**Figure 2-42.** *Create a means for Alien to receive the text.*\n\n8.  Now\
    \ you need to create a means to have the Alien receive the text being written\
    \ to the Alien. Go to Storyboard and drag a label onto the Alien View. Center\
    \ it, make it yellow, and empty out its text as illustrated in [Figure 2-42](#Chapter02.html#fig_2_42).\n\
    \n![images](images/9781430242727_Fig02-43.jpg)\n\n**Figure 2-43.** *Create the\
    \ new label IBOutlet.*"
