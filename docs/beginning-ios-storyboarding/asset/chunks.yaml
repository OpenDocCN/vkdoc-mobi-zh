    \n![images](images/9781430242727_Fig10-32.jpg)\n\n**Figure 10-32.** *Connect Scene\
    \ 3: Button – Right to Scene 4.*\n\n- Scene 4: Copy an existing scene.\n  - Scene\
    \ 4: Rename.\n  - Scene 4: Organize graphics.\n  - Scene 4: Make connections.\n\
