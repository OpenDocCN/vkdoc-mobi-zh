  trans: '14.  了解在 Storyboard 中创建和重新排列分节是多么容易是很重要的，因为您或您的客户可能希望更改这些分节的顺序。假设您要将“Category”分节移到“Author”分节之上，只需单击一次并向上拖动，如图
    7-64 所示。

    15.  您希望允许用户为书籍添加“Book info”、“Category”、“Author”和“Description”数据，就像您在 SQLite 数据库中设计的那样。为此，您需要再添加一个分节。再次复制并粘贴“Author”分节，就像第
    60 步一样。没错，一旦您完成了第一个分节，现在就这么简单了！


    ![images](img/9781430242727_Fig07-65.jpg)


    **图 7-65.** *选择新分节。*


    16.  点击标题，将其从*Author*改为*Description*。然后单击一次以选中最后一个单元格，如图 7-65 所示。


    ![images](img/9781430242727_Fig07-66.jpg)


    **图 7-66.** *更改单元格的样式*


    17.  “Description”分节是用户添加其描述的地方。您需要修改刚刚粘贴的内容以满足这一基本需求。在属性检查器中，将样式从“Basic”改为“Custom”，如图
    7-66 所示。同时将“Selection”从“Blue”改为“None”。这个单元格不需要展开指示器图标，因此也将“Accessory”从“Disclosure
    Indicator”改为“None”。


    ![images](img/9781430242727_Fig07-67.jpg)


    **图 7-67.** *向单元格添加文本视图*


    18.  您需要让单元格具有足够的高度，以容纳用户输入描述所添加书籍的文本行数。您还需要一个文本视图。选中该单元格后，在大小检查器中将单元格高度改为 100。这将为用户提供足够的空间，让他们看到自己输入文本的几行内容（如果只能读一两行，输入文本会很困难）。接下来，您需要添加一个文本视图，如图
    7-67 所示。拖动其控制手柄使其完美地填充单元格。我们将它设置为 281 点宽、88 点高。


    ![images](img/9781430242727_Fig07-68.jpg)


    **图 7-68.** *选择表视图控制器以嵌入*


    19.  这个场景将是一个模态场景，因此您需要将其嵌入到一个导航控制器中，以便在此视图中使用导航栏。为此，选择表视图控制器，如图 7-68 所示。请注意，图
    7-68 左侧的文档大纲显示，表视图控制器在“Table View Controller Scene”内被选中。在开始嵌入之前，请确保您的项目中同样如此——如果不是的话，您可能会很不愉快，因为您必须从头开始。


    ![images](img/9781430242727_Fig07-69.jpg)


    **图 7-69.** *将表视图控制器嵌入到导航控制器中*


    20.  选中表视图控制器后，选择 Editor ![images](img/U001.jpg) Embed In ![images](img/U001.jpg)
    Navigation Controller，如图 7-69 所示。


    ![images](img/9781430242727_Fig07-70.jpg)


    **图 7-70.** *创建新的导航控制器*


    21.  一个崭新的导航控制器被创建了，它与你即将命名为“Add Book View”的视图形成了根视图控制器关系。双击视图标题并将其命名为*Add Book*，如图
    7-70 所示。


    ![images](img/9781430242727_Fig07-71.jpg)


    **图 7-71.** *创建一个跳转以进入“Add Book”场景*


    22.  现在您需要稍微思考一下。为了进入这个场景，用户需要点击“Books View”中的“Add New”单元格。目前这些场景之间没有连接，因此您需要创建一个新的跳转。点击“Add
    New”单元格并按住 Control 键拖动到导航控制器上，如图 7-71 所示。由于这是一个模态场景——仅用于输入数据——这次，您不会使用让下一个视图滑入的
    Push 跳转，而是使用让下一个视图翻转入场的 Flip 跳转。释放跳转连接器时，从 Storyboard Segues 菜单中选择“Modal”选项。


    ![images](img/9781430242727_Fig07-72.jpg)


    **图 7-72.** *选择新的跳转*


    23.  嗯……一个漂亮的跳转被创建了。让我们稍微调整一下它。选中它，如图 7-72 所示。


    ![images](img/9781430242727_Fig07-73.jpg)


    **图 7-73.** *更改跳转类型*


    24.  选中新跳转后，使用属性检查器将其“Transition”类型更改为“Flip Transition”，如图 7-73 所示——因为如前所述，尝试不同的跳转类型有助于熟悉它们。同时将跳转的“Identifier”属性设置为*AddNewBook*。


    ![images](img/9781430242727_Fig07-74.jpg)


    **图 7-74.** *最后一步：创建一个新的表视图控制器*


    25.  您最后需要做的是允许用户选择一个可用的类别或作者。为此，创建一个非常基本的表视图控制器。但有趣的是：我们不会创建两个表视图控制器（一个用于作者，一个用于类别），而是向你展示
    Storyboard 如何让你使用同一个表视图来满足这两种需求！拖出另一个表视图控制器，并将其放置在“Add Book Scene”的右侧，如图 7-74
    所示。


    ![images](img/9781430242727_Fig07-75.jpg)


    **图 7-75.** *修改表视图，然后从“Select category”单元格连接一个跳转*


    26.  如前所述，这个新的表视图将非常基础——没有装饰。选择自动添加到表视图中的原型单元格，在属性检查器中将它的“Style”设置为“Basic”，并在“Identifier”属性中输入*Cell*。这个单元格最终将显示类别名称或
    Apress 作者姓名。现在退一步思考一下用户将如何进入这个场景。你的用户必须选择“Select category”单元格或“Select author”单元格。这意味着你需要两个跳转，每个单元格各一个。首先选择“Select
    category”单元格，并按住 Control 键拖动到表视图控制器上，如图 7-75 所示。释放跳转连接器时，从 Storyboard Segues 菜单中选择“Push”选项。在属性检查器中将该跳转的“Identifier”设置为*SelectCategory*，就像你在本章中多次操作的那样。


    ![images](img/9781430242727_Fig07-76.jpg)


    **图 7-76.** *以相同方式连接“Select author”单元格*


    27.  现在选择“Select author”单元格，并按住 Control 键拖动到表视图控制器上，如图 7-76 所示。释放跳转连接器时，从 Storyboard
    Segues 菜单中选择“Push”。像往常一样，在属性检查器中将该跳转的“Identifier”设置为*SelectAuthor*。


    ![images](img/9781430242727_Fig07-77.jpg)


    **图 7-77.** *修改视图标题*


    28.  双击视图标题并将其改为*Select*，如图 7-77 所示。


    ![images](img/9781430242727_Fig07-78.jpg)


    **图 7-78.** *将按钮添加到模态场景中*'
- fmt: "29.  Because the Add Book Scene is a Modal Scene, you need to have two Bar\
    \ button items. One will be to save the entry that the user has just created,\
    \ and the other will let the user cancel out of the situation and return back\
    \ to the previous View Controller. Drag in your first Bar button item from the\
    \ Object Library as shown in [Figure 7-78](#Chapter07.html#fig_7_78).\n\n![images](images/9781430242727_Fig07-79.jpg)\n\
    \n**Figure 7-79.** *Add two Bar button items.*\n\n30.  Drag the first `Bar button\
    \ item` onto the right side of the header and name it `Save`. Then drag another\
    \ out to the right side of the header and name that one `Cancel` as shown in [Figure\
    \ 7-79](#Chapter07.html#fig_7_79).\n\n#### Making Final Tweaks\n\n![images](images/9781430242727_Fig07-80.jpg)\n\
    \n**Figure 7-80.** *App’s story flow so far.*\n\n1.  [Figure 7-80](#Chapter07.html#fig_7_80)\
    \ shows the Storyboard so far. Looking pretty good! It tells you the entire app’s\
    \ story and logical flow. You can see how the parts of your app fit together without\
    \ even thinking about writing any code at all. Isn’t that exciting? Finally, you\
    \ can make one more minor improvement to your data flow. Consider a situation\
    \ in which the author only has one book, meaning there’s no need to go to a list\
    \ of books (Books Scene). In that case, it makes more sense to just jump right\
    \ to the Book Details Scene (to the right of the Books Scene). To implement this,\
    \ you need to modify a couple things.\n\n    ![images](images/9781430242727_Fig07-81.jpg)\n\
    \n    **Figure 7-81.** *Delete the `ShowAuthorBooks` segue.*\n\n2.  Select the\
    \ segue going from the Authors Scene to Books Scene (the one that has the `ShowAuthorBooks`\
    \ Identifier assigned to it) as shown in [Figure 7-81](#Chapter07.html#fig_7_81)\
    \ and delete it.\n\n    ![images](images/9781430242727_Fig07-82.jpg)\n\n    **Figure\
    \ 7-82.** *Create a new segue from the actual View Controller.*\n\n3.  Now, instead\
    \ of going from the “Author name” cell to the list of books, you’ll create a segue\
    \ from the View Controller itself. Select the Authors Scene by clicking its Dock\
    \ (the black bar at the bottom). Then choose the View Controller as shown in [Figure\
    \ 7-82](#Chapter07.html#fig_7_82).\n\n    ![images](images/9781430242727_Fig07-83.jpg)\n\
    \n    **Figure 7-83.** *Control-drag to the Books Scene.*\n\n4.  Control-drag\
    \ from the View Controller out to the Books Scene as shown in [Figure 7-83](#Chapter07.html#fig_7_83).\
    \ When you release the segue connector, choose `Push` from the Storyboard Segues\
    \ menu. Assign the `ShowAuthorBooks` Identifier to it, just as you previously\
    \ had it set up.\n\n    ![images](images/9781430242727_Fig07-84.jpg)\n\n    **Figure\
    \ 7-84.** *Repeat to the Book Detail Scene.*\n\n5.  You’ll do the exact same thing\
    \ for the Detail View Controller as shown in [Figure 7-84](#Chapter07.html#fig_7_84)—except\
    \ that when segue is created, make sure to assign a different Identifier to it.\n\
    \n    ![images](images/9781430242727_Fig07-85.jpg)\n\n    **Figure 7-85.** *Assign\
    \ the Identifier to the new segue.*\n\n6.  Name this one `ShowAuthorBookDetail`\
    \ (shown in [Figure 7-85](#Chapter07.html#fig_7_85)). The trick with creating\
    \ the segues from the View Controller is that you can manually perform those segues\
    \ from the code when certain conditions are met. In this case, you’ll determine\
    \ which one of the two segues to perform when user taps the Table View Cell based\
    \ on the number of books the particular author has.\n\n    ![images](images/9781430242727_Fig07-86.jpg)\n\
    \n    **Figure 7-86.** *The final Storyboard layout!*\n\n7.  At this point, your\
    \ final Storyboard should look just like [Figure 7-86](#Chapter07.html#fig_7_86).\
    \ It’s time to run your app and see what you have!\n\n    ![images](images/9781430242727_Fig07-87.jpg)\n\
    \n    **Figure 7-87.** *It works!*\n\n8.  As can be seen from [Figure 7-87](#Chapter07.html#fig_7_87),\
    \ the app actually works and navigates from the Root View to Categories and Authors\
    \ Scenes—except, when you compare it to Figures 6-0A and 6-0B (the final look\
    \ of the app), you can see that the lists aren’t populated. This is because even\
    \ though the Storyboard is functional, there’s no code underneath it that would\
    \ connect the views and tables to the SQLite database. That’s the part you’re\
    \ going to tackle in the next chapter.\n\n## Chapter 8\n\n## Mastering Table Views\
    \ with Storyboarding: Coding the Back End\n\nSo far, without writing any code,\
    \ you’ve designed a pretty complex Inventory system that will keep track of items—in\
    \ this case, Apress books—and add items to the database from the app itself. As\
    \ you saw in [Chapter 7](#Chapter07.html#ch7)’s [Figure 7-87](#Chapter07.html#fig_7_87),\
    \ it all works except that you don’t have any data linked to the app.\n\nHere\
    \ in [Chapter 8](#Chapter08.html#ch8), in step 3 of 3 for the app, you’ll be writing\
    \ code that will connect your SQLite database to each of the View Controllers\
    \ you created in [Chapter 7](#Chapter07.html#ch7).\n\n### Step 3: Insert the Code\
    \ Behind the Storyboard Elements and Tweak a Couple Storyboard Necessities\n\n\
    Let’s start this third step by creating a custom `UITableViewCell` subclass."
