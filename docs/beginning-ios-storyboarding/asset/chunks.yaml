  trans: "\n![images](img/9781430242727_Fig05-32.jpg)\n\n**图 5-32.** *为页数添加定义，然后删除旧数据模型的日期格式。*\n\
    \n7. 你需要为数组将要处理的页数提供一个定义。将“05 ModelController.m – add anonymous enum”代码段拖入，并放置在刚刚放置的合成语句下方，如图\
    \ 5-32 所示。现在需要移除旧模型的生成代码，因为如前所述，你将不再使用日期，并用自定义数据来替代它。因此，选中图 5-32 中显示的三行代码，将其删除。\n\
    \n![images](img/9781430242727_Fig05-33.jpg)\n\n**图 5-33.** *用你的数据模型替换旧数据模型。*\n\
    \n8. 将“06 ModelController.m – replace init code (within if {})”代码段拖入，并精确放置在图 5-33\
    \ 中已删除代码的位置，位于 `if` 语句内部，如图 5-34 所示。你可以看到，我们通过 `self.destinationNumber = 1;` 预置了目标页面\
    \ 1。你还需要设置一个页面数组，但由于我们的宣传册并非只有 4 页，而是将 4 本宣传册整合为一本，因此最终你会得到一个 8 页的包加上 2 个封面页，总共\
    \ 10 页——而每次遍历宣传册时，最大页数仅为 4 页。接下来我们要这样处理：\n\n* 始终将 `\"01-Intro.png\"` 保留给数组中的槽位\
    \ 1\n    * 始终将 `\"02-Pick.png\"` 保留给数组中的槽位 2\n\n现在数组中只剩下 2 个槽位，而我们需要填入 8 页。解决方案：\n\
    \n* `newPageDescription` `\"n-Aspect-ni.png\"` 用于数组中的槽位 3\n    * `newPageDescription`\
    \ `\"n-Aspect-ni+1.png\"` 用于数组中的槽位 4\n\n进一步展开如下：\n\n```\nModelPageData ….\"01-Intro.png\"\
    \ andPageNbr:1 ofMax:MAX_PAGES];…;\n    newPageDescription …\"02-Pick.png\" andPageNbr:2\
    \ ofMax:MAX_PAGES];…;\n    newPageDescription …\"1-Aspect-1.png\" andPageNbr:3\
    \ ofMax:MAX_PAGES];…;\n    newPageDescription …\"1-Aspect -2.png\" andPageNbr:4\
    \ ofMax:MAX_PAGES];…;\n```\n\n```\nnewPageDescription …\"4-Aspect-1.png\" andPageNbr:3\
    \ ofMax:MAX_PAGES];…;\n    newPageDescription …\"4-Aspect-2.png\" andPageNbr:4\
    \ ofMax:MAX_PAGES];…;\n```\n\n我们这样做克服了用 4 槽位数组处理 10 页内容的障碍。但你需要调整 `DataViewController`\
