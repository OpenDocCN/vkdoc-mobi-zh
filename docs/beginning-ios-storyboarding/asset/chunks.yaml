  trans: "\n![images](img/9781430242727_Fig08-47.jpg)\n\n**图 8-47.** *连接 dataSource\
    \ 输出口*\n\n11. 在出现的对话框连接窗口中，选择嵌套在 Outlets 选项中的 `dataSource`，如图 8-47 所示。重复完全相同的步骤来连接\
    \ Table View 的 `delegate` 输出口。\n\n![images](img/9781430242727_Fig08-48.jpg)\n\n\
    **图 8-48.** *添加 `DBCategory` 和 `DBAuthor` 类型的两个附加属性*\n\n12. 打开 Standard 编辑器并打开\
    \ `BooksViewController.h` 文件。选中全部三行默认代码并将其删除。您需要向 `BooksViewController` 添加两个附加属性：categories\
    \ 和 author。将 DemoMonkey 中的“21 BooksViewController.h Interface”代码片段拖入，并将其放置在视图主体中，如图\
    \ 8-48 所示。\n\n这两个新属性是 category 和 author：\n\n```\n@property (nonatomic, strong)\
    \ DBCategory *category;\n@property (nonatomic, strong) DBAuthor *author;\n```\n\
    \n![images](img/9781430242727_Fig08-49.jpg)\n\n**图 8-49.** *合成、导入头文件及其他调整*\n\n\
    13. 保存您的工作，离开 `BooksViewController.h`，并打开其实现文件。为 `_tableView`、`_countLabel`、`category`\
    \ 和 `author` 编写合成语句。此外，您需要一个变量来存储书籍。同样，使用可变数组并将其命名为 `_books`。为此，请将其声明添加到 `@interface`\
    \ 下方的私有接口部分。确保将其括在花括号中：\n\n```\n@interface BooksViewController () {\n    NSMutableArray\
    \ *_books;\n}\n```\n\n现在您需要导入必要的头文件。将 DemoMonkey 中的“-- BooksViewController.h Imports”代码片段拖入，并将其直接放置在唯一的现有头文件\
    \ `#import \"BooksViewController.h\"` 下方，如图 8-49 所示。\n\n最后，在 `viewDidLoad` 中，您将用\
    \ `DBBook` 对象填充 books 数组。将 DemoMonkey 中的“22 BooksViewController.m ViewDidLoad”代码片段拖入，并将其放置在\
    \ `viewDidLoad` 方法中 `//Do any additional setup …` 注释的正下方，如图 8-49 和下文所示：\n\n```\n\
    - (void)viewDidLoad\n{\n    [super viewDidLoad];\n    // Do any additional setup\
    \ after loading the view.\n\n    if (self.category != nil) {\n        _books =\
    \ [NSMutableArray arrayWithArray:self.category.books];\n    }\n    else if (self.author\
    \ != nil) {\n        _books = [NSMutableArray arrayWithArray:self.author.books];\n\
    \    }\n    else {\n        _books = [NSMutableArray arrayWithArray:[DBBook allBooks]];\n\
    \    }\n}\n```\n\n您可以看到，您正在使用 category 属性 `self.category` 和 author 属性 `self.author`\
    \ 来决定需要显示哪些书籍：属于指定类别或选定作者的书籍。但是，如果用户未定义这些属性中的任何一个，您将显示 SQLite 数据库中已有的所有书籍：\n\n\
    ```\nelse {\n    _books = [NSMutableArray arrayWithArray:[DBBook allBooks]];\n\
    }\n```\n\n![images](img/9781430242727_Fig08-50.jpg)\n\n**图 8-50.** *设置 Table View\
    \ 以显示书籍*\n\n14. 要在 Table View 中显示书籍数据，您必须实现委托方法。将 DemoMonkey 中的“23 BooksViewController.m\
    \ Display Books”代码片段拖入，并将其放置在 `@end` 之前，如图 8-50 所示。\n\n您希望 Table View 的最底部单元格显示静态内容（“Add\
    \ new”单元格），该内容将始终可见，并且点击此单元格将允许用户创建新的书籍记录。\n\n为了实现这一点，您在以下方法中做了一个小技巧：\n\n```\n\
    - (NSInteger)tableView:(UITableView *)tableView\nnumberOfRowsInSection:(NSInteger)section\n\
    ```\n\n方法是通过在 `_books` 数组中对象数量的基础上为 Table View 增加额外的一行：\n\n```\nreturn _books.count\
    \ + 1;\n```\n\n这保证您在 Table View 中始终至少有一个单元格，因此您只需让 Table View 根据特定条件从 Storyboard\
    \ 加载正确的原型单元格即可。\n\n请注意，在此方法中您还会更新 `_countLabel` 的文本——这样它始终保持最新。\n\n您通过其标识符 `\"\
    Cell\"` 或 `\"AddCell\"`（您在设计时已指定）来出列相应的单元格：\n\n```\nNSString *cellIdentifier =\
    \ (indexPath.row < _books.count) ? @\"Cell\" :\n    @\"AddCell\";\n    CustomCell\
    \ *cell = [tableView\n    dequeueReusableCellWithIdentifier:cellIdentifier];\n\
    ```\n\n根据重用标识符，相应地更新单元格的内容：\n\n```\nif ([cell.reuseIdentifier isEqualToString:@\"\
    Cell\"]) {\n    DBBook *object = [_books objectAtIndex:indexPath.row];\n    cell.mainLabel.text\
    \ = object.title;\n    cell.detailLabel1.text = object.author.fullName;\n    cell.detailLabel2.text\
    \ = object.year;\n    cell.leftImageView.image = [UIImage imageNamed:[NSString\n\
    \    stringWithFormat:@\"%@.png\", object.bookId]];\n}\n```\n\n**注意：** 单元格的重用标识符是您告诉\
    \ Table View 对于某一行要出列并显示哪种 Storyboard 原型单元格的方式。因此，正确设置标识符非常重要。如果标识符未设置或无效，`dequeueReusableCellWithIdentifier:cellIdentifier`\
    \ 方法将返回 nil，并且应用程序会崩溃。这是在 Storyboard 中原型化 Table View 单元格时最常见的错误之一。\n\n![images](img/9781430242727_Fig08-51.jpg)\n\
    \n**图 8-51.** *设置编辑模式*\n\n15. 添加允许用户编辑 Table View 和删除书籍记录的方法。将 DemoMonkey 中的“24\
    \ BooksViewController.m Delete Books”代码片段拖入，并将其放置在 `@end` 之前，如图 8-51 所示。此处您实现了负责\
    \ Table View 编辑的标准 `UITableViewDataSource` 方法。当用户在编辑模式下点击 Table View 的标准删除按钮时，他们将获得该行对应的\
    \ `DBBook` 对象。这允许用户从 `_books` 数组中移除该对象，然后使用 MagicalRecord API 从数据库中删除该实体。最后，通过动画移除该记录的\
    \ Table View 行，这一切都由 Table View 本身优雅地为您处理：\n\n```\nif (editingStyle == UITableViewCellEditingStyleDelete)\
    \ {\n    DBBook *object = [_books objectAtIndex:indexPath.row];\n    [object deleteEntity];\n\
    \    [_books removeObjectAtIndex:indexPath.row];\n    [tableView deleteRowsAtIndexPaths:[NSArray\
    \ arrayWithObject:indexPath]\n    withRowAnimation:UITableViewRowAnimationFade];\n\
    }\n```\n\n![images](img/9781430242727_Fig08-52.jpg)\n\n**图 8-52.** *实现 `prepareForSegue:`\
    \ 方法*\n\n16. 接下来，将 DemoMonkey 中的“25 BooksViewController.m prepareForSegue:”代码片段拖入，并将其放置在\
    \ `@end` 之前，如图 8-52 所示。在 `prepareForSegue:` 方法中，您查找两个不同的 Segue 标识符：ShowBookDetails\
    \ 标识符和 AddNewBook 标识符。在第一种情况下，您只需要将选定的 `DBBook` 对象发送到目标视图控制器，即您的设置中的 `DetailViewController`：\n\
    \n```\nNSIndexPath *indexPath = [self._tableView indexPathForSelectedRow];\nDBBook\
    \ *object = [_books objectAtIndex:indexPath.row];\n[(DetailViewController *)[segue\
    \ destinationViewController]\nsetDetailItem:object];\n```\n\n在第二种情况下，您需要设置一个代理，以便您可以从\
    \ `AddBookViewController` 获取新添加的对象：\n\n```\nAddBookViewController *addBookVC =\
    \ (AddBookViewController\n*)navigationVC.topViewController;\n[addBookVC setDelegate:self];\n\
    ```\n"
- fmt: "当然，这是根据您的要求进行排版优化后的 Markdown 内容：\n\n同时，请记住你的`AddBookViewController`是嵌入在导航控制器（Navigation\
