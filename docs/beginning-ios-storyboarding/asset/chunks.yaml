- fmt: '14.  It’s important that you know how easy it is to create and rearrange sections
    in Storyboards when you’re programming your own app because you or your client
    may want to change the order of these sections. So, pretend that you want to move
    the Category section above the Author section. Simply click it once and drag it
    up as shown in [Figure 7-64](#Chapter07.html#fig_7_64).

    15.  You want to allow the user to add Book info, Category, Author, and Description
    data for a book just as you have it in your SQLite database. To do that, you need
    to add one more section. Copy and paste the Author section again, just as in step
    60. Yup, it’s now that easy once you get past that first section!


    ![images](images/9781430242727_Fig07-65.jpg)


    **Figure 7-65.** *Select the new section.*


    16.  Click the header and change its title from *Author* to *Description*. Then
    select the last cell by clicking it once as shown in [Figure 7-65](#Chapter07.html#fig_7_65).


    ![images](images/9781430242727_Fig07-66.jpg)


    **Figure 7-66.** *Changing the cell’s Style*


    17.  The Description section is where users can add their own description. You
    need to modify what you just pasted to accommodate this basic need. In the Attributes
    Inspector change the style from Basic to Custom as shown in [Figure 7-66](#Chapter07.html#fig_7_66).
    Also change Selection from Blue to None. There’s no need for the disclosure icon
    in this cell, so also change Accessory from Disclosure Indicator to None.


    ![images](images/9781430242727_Fig07-67.jpg)


    **Figure 7-67.** *Adding Text View to the cell*


    18.  You’ll need the cell to have enough height to accommodate the lines of text
    the user will enter to describe the book being added. You’ll also need to have
    a Text View. With the cell selected, in the Size Inspector change the cell height
    to 100. This will give users enough room to see a few rows of the text they’re
    entering (it’s difficult to type text when you can only read one or two lines).
    The next thing you need to do is add a Text View as shown in [Figure 7-67](#Chapter07.html#fig_7_67).
    Drag the handles so that it fills the cell nicely. We made ours 281 points wide
    and 88 points high.


    ![images](images/9781430242727_Fig07-68.jpg)


    **Figure 7-68.** *Select the Table View Controller for embedding.*


    19.  This scene is going to be a Modal Scene, so you need to embed it into a Navigation
    Controller to be able to use the Navigation Bar in this view. To do that, select
    the Table View Controller as shown in [Figure 7-68](#Chapter07.html#fig_7_68).
    Note that the Document Outline on the left of [Figure 7-68](#Chapter07.html#fig_7_68)
    shows that the Table View Controller is selected inside the Table View Controller
    Scene. Make sure this is the case with your project before you start to embed—you
    won’t be happy if it’s not, because you’ll have to start all over.


    ![images](images/9781430242727_Fig07-69.jpg)


    **Figure 7-69.** *Embed the Table View Controller into a Navigation Controller.*


    20.  With the Table View Controller selected, choose Editor ![images](images/U001.jpg)
    Embed In ![images](images/U001.jpg) Navigation Controller as shown in [Figure
    7-69](#Chapter07.html#fig_7_69).


    ![images](images/9781430242727_Fig07-70.jpg)


    **Figure 7-70.** *The new Navigation Controller is created.*


    21.  A beautiful, brand spanking new Navigation Controller is created with a Root
    View Controller relationship to what you’ll now name the Add Book View. Double-click
    the view title and name it *Add Book* as shown in [Figure 7-70](#Chapter07.html#fig_7_70).


    ![images](images/9781430242727_Fig07-71.jpg)


    **Figure 7-71.** *Create a segue to get to the Add Book Scene.*


    22.  Now you need to do a little thinking. In order to get to this scene, the
    user needs to tap the Add New cell in the Books View. Right now, nothing connects
    these scenes, so you need to create a new segue. Click the Add New cell and Control-drag
    over to the Navigation Controller as shown in [Figure 7-71](#Chapter07.html#fig_7_71).
    Because this is a Modal Scene—which is only presented to enter data—this time,
    rather than do a Push segue that makes the next view slide in, you’ll do a Flip
    segue that makes the next view flip in. This time when you release the segue connector,
    select the Modal option from the Storyboard Segues menu.


    ![images](images/9781430242727_Fig07-72.jpg)


    **Figure 7-72.** *Select the new segue.*


    23.  Ahh… a beautiful new segue is created. Let’s tweak it a little bit. Select
    it as shown in [Figure 7-72](#Chapter07.html#fig_7_72).


    ![images](images/9781430242727_Fig07-73.jpg)


    **Figure 7-73.** *Change the Transition type.*


    24.  With the new segue selected, change the Transition type to Flip Transition
    using the Attributes Inspector as shown in [Figure 7-73](#Chapter07.html#fig_7_73)—because
    as mentioned earlier, it’s nice to experiment with different transition types
    so that you become familiar with them. Also set the segue’s Identifier attribute
    to *AddNewBook*.


    ![images](images/9781430242727_Fig07-74.jpg)


    **Figure 7-74.** *Last thing: create a new Table View Controller*


    25.  The last thing you need to do is allow the user to select a category or author
    that’s available. To do that, make a really basic Table View Controller. But here’s
    something fun: rather than make two Table View Controllers, one for Authors and
    one for Categories, we’ll show you how Storyboarding lets you use the same Table
    View for both needs! Drag out another Table View Controller and place it in the
    right-hand side of the Add Book Scene as shown in [Figure 7-74](#Chapter07.html#fig_7_74).


    ![images](images/9781430242727_Fig07-75.jpg)


    **Figure 7-75.** *Modify the Table View and then connect a segue from the “Select
    category” cell.*


    26.  This new Table View, as mentioned, will be a very basic—no frills. Select
    the Prototype cell that was automatically added to the Table View for you, in
    the Attributes Inspector set its Style to Basic, and enter *Cell* for the Identifier
    property. This cell will eventually hold either the name of the Category or the
    name of the Apress Author in it. Now step back and think about how your user is
    going to get to this scene. Your user must select either the “Select category”
    cell or the “Select author” cell. This means you’ll need two segues, one from
    each of those cells. First select the “Select category” cell and Control-drag
    over to the Table View Controller as shown in [Figure 7-75](#Chapter07.html#fig_7_75).
    When you release the segue connector, select the Push option from the Storyboard
    Segues menu. Enter *SelectCategory* as the Identifier to the segue in the Attributes
    Inspector, as you’ve done multiple times throughout the chapter.


    ![images](images/9781430242727_Fig07-76.jpg)


    **Figure 7-76.** *Connect the “Select author” cell in the same way.*


    27.  Now select the “Select author” cell and Control-drag over to the Table View
    Controller as shown in [Figure 7-76](#Chapter07.html#fig_7_76). When you release
    the segue connector, choose Push from the Storyboard Segues menu. Enter *SelectAuthor*
    as the Identifier to the segue in the Attributes Inspector as usual.


    ![images](images/9781430242727_Fig07-77.jpg)


    **Figure 7-77.** *Modify the View Title.*


    28.  Double-click the View Title and change it to *Select* as shown in [Figure
    7-77](#Chapter07.html#fig_7_77).


    ![images](images/9781430242727_Fig07-78.jpg)


    **Figure 7-78.** *Add the buttons to the Modal Scene.*'
