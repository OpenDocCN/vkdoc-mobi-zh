    \  - 场景 4：更改标题。\n  - 场景 4：更改图像。\n- 场景 4：整理图形。\n- 场景 4：建立连接。\n\n1. 这个操作与你之前在图 10-20\
    \ 中所做的类似。点击场景 3 的停靠区，按`⌘`+D 复制，然后将新场景移动到场景 3 的右侧。同时，如图图 10-30 所示，将标题改为 *Scene\
    \ 4*。选择图像，将其更改为`wanderBoard-cam04.png`，就像你在图 10-21 中所做的那样。\n\n![images](img/9781430242727_Fig10-31.jpg)\n\
    \n**图 10-31.** *隐藏不适用的元素：选择按钮 – 向左。*\n\n- 场景 4：复制现有场景。\n  - 场景 4：重命名。\n  - 场景\
    \ 4：整理图形。\n    - 场景 4：隐藏不适用的元素。\n  - 场景 4：建立连接。\n\n2. 这是一个死胡同，所以你需要隐藏向右和向左的按钮，就像你在图\
    \ 10-22 中所做的那样。参见图 10-31。\n\n![images](img/9781430242727_Fig10-32.jpg)\n\n**图\
    \ 10-32.** *连接场景 3：按钮 – 向右 到 场景 4。*\n\n- 场景 4：复制现有场景。\n  - 场景 4：重命名。\n  - 场景 4：整理图形。\n\
    \  - 场景 4：建立连接。\n    - 场景 4：按住 Control 键从按钮拖拽到新场景。\n\n3. 在视图控制器——场景 3 场景中，如图图\
    \ 10-32 所示，将按钮 – 向右连接到视图控制器——场景 4 场景。\n\n![images](img/9781430242727_Fig10-33.jpg)\n\
    \n**图 10-33.** *点击两个场景之间的转场图标以选中该转场。*\n\n- 场景 4：复制现有场景。\n  - 场景 4：重命名。\n  - 场景\
    \ 4：整理图形。\n  - 场景 4：建立连接。\n    - 场景 4：按住 Control 键从按钮拖拽到新场景。\n    - 场景 4：编辑转场的属性。\n\
    \n4. 根据按钮标签可知这是一个右转弯，因此如图图 10-33 所示选中该转场。在属性检查器中将转场类命名为`MovementSegue`，保持样式为 Custom，并将标识符改为\
    \ *Right*。没错，你会经常重复这个操作！注意，当你点击转场时，它会显示你选中的是哪个按钮！这在事情变得复杂时非常有用。\n\n![images](img/9781430242727_Fig10-34.jpg)\n\
    \n**图 10-34.** *场景 4：将返回按钮的标签字段设为 0（零）。*\n\n- 场景 4：复制现有场景。\n  - 场景 4：重命名。\n  -\
    \ 场景 4：整理图形。\n  - 场景 4：建立连接。\n    - 场景 4：按住 Control 键从按钮拖拽到新场景。\n    - 场景 4：编辑转场的属性。\n\
    \    - 场景 4：如果是死胡同：创建返回按钮。\n    - 场景 4：编辑标签字段。\n\n5. 你希望这个在死胡同中的返回按钮始终显示，因此如图图\
    \ 10-34 所示，将其标签设为`0`。\n\n构建并运行，看看效果。运行时，你会发现返回按钮似乎没有工作。此时能够调试至关重要，而这就是你在场景中命名按钮的原因。现在让我们开始调试。\n\
    \n![images](img/9781430242727_Fig10-35.jpg)\n\n**图 10-35.** *调试场景 3：将返回按钮连接到它的属性。*\n"
