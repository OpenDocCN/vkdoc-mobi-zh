    ## 前言：关于作者


    三位作者找到了一种绝妙的方式，既能引导初学者入门 Storyboarding，又能向使用 Objective-C 的老派程序员展示一种学习与调试这一神奇工具的新颖方法。本质上，你拥有一位向初学者解释复杂
    Objective-C 的专家、一位前苹果 iOS 实习生，以及一位极为成功的老派程序员，他们共同引导来自不同背景的众多人士，全面掌握 Storyboard
    从创建、调试到优化的全过程。


    ![images](img/rory_lewis.jpg)


    Rory Lewis 博士


    ![images](img/stephen_moraco.jpg)


    Stephen M. Moraco


    ![images](img/yulia_mccarthy.jpg)


    Yulia McCarthy


    ### Rory Lewis 博士


    Rory 和我于 1983 年在洛杉矶相识。他让我想起我最喜欢的电影角色之一：Buckaroo Banzai——总是同时向六个方向前进。如果你拦住他问他正在做什么，他会给出全面且细节惊人的回答。他自律、风趣且友好，拥有一种不可思议的能力，能用简单且生动的方式解释高度抽象的概念。他总是能完成自己设定的目标，并且也会帮助你实现同样的目标。

