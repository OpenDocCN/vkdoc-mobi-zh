    \ the outlet as shown in [Figure 8-75](#Chapter08.html#fig_8_75).\n\n![images](images/9781430242727_Fig08-76.jpg)\n\
    \n**Figure 8-76.** *Name the outlet _tableView.*\n\n7.  Once the Connection pop-up\
    \ appears, name the outlet `_tableView` as shown in [Figure 8-76](#Chapter08.html#fig_8_76).\n\
    \n![images](images/9781430242727_Fig08-77.jpg)\n\n**Figure 8-77.** *Connect the\
    \ outlets to your custom Table View cell.*\n\n8.  Close the Assistant editor,\
    \ go back to the Standard editor, and connect the outlets to your custom Table\
    \ View cell. Click the cell once as shown in [Figure 8-77](#Chapter08.html#fig_8_77).\n\
    \n![images](images/9781430242727_Fig08-78.jpg)\n\n**Figure 8-78.** *Set the cell’s\
    \ Class to CustomCell.*\n\n9.  Set its Class to *CustomCell* as shown in [Figure\
    \ 8-78](#Chapter08.html#fig_8_78).\n\n![images](images/9781430242727_Fig08-79.jpg)\n\
    \n**Figure 8-79.** *Connect the mainLabel to “Author name.”*\n\n10.  With the\
    \ top cell still selected, open the Connections Inspector and connect the `mainLabel`\
    \ outlet to the “Author name” label as shown in [Figure 8-79](#Chapter08.html#fig_8_79).\n\
    \n![images](images/9781430242727_Fig08-80.jpg)\n\n**Figure 8-80.** *Connect the\
    \ detailLabel1.*\n\n11.  Connect the `detailLabel1` to “Label – 5” as shown in\
    \ [Figure 8-80](#Chapter08.html#fig_8_80).\n\n![images](images/9781430242727_Fig08-81.jpg)\n\
    \n**Figure 8-81.** *Final connections*\n\n12.  Your final connections should look\
    \ like ours as shown in [Figure 8-81](#Chapter08.html#fig_8_81).\n\n![images](images/9781430242727_Fig08-82.jpg)\n\
    \n**Figure 8-82.** *Add new authors (slight variation).*\n\n13.  Now go back to\
    \ the `AuthorsViewController.m` and drag in the “36 AuthorsViewController.m Add\
    \ NewAuthors + Drill Down” snippet from DemoMonkey. Place it right before the\
    \ `@end` as shown in [Figure 8-82](#Chapter08.html#fig_8_82). As you may remember,\
    \ when you were designing this scene you created two segues that originated from\
    \ the Authors View Controller itself rather than a cell or a button. Thus, you\
    \ must perform those segues manually from the code when certain conditions are\
    \ met. In your case, you’ll perform the segues once the user selects a Table View\
    \ cell. In the `tableView:didSelectRowAtIndexPath:` method, you manually perform\
    \ a segue with a specific identifier (`ShowAuthorBooks` or `ShowAuthorBookDetail`)\
    \ based on how many books the selected author has:\n\n`if (object.books.count\
    \ > 1 || object.books.count == 0) {`\n    `      [self performSegueWithIdentifier:@\"\
    ShowAuthorBooks\" sender:[tableView`\n    `cellForRowAtIndexPath:indexPath]];`\n\
    \    `    }`\n    `    else if (object.books.count == 1) {`\n    `      [self\
    \ performSegueWithIdentifier:@\"ShowAuthorBookDetail\" sender:[tableView`\n  \
    \  `cellForRowAtIndexPath:indexPath]];`\n    `    }`\n\nIf there’s exactly one\
    \ book, you’ll perform the `ShowAuthorBookDetail` segue to show the Book Details\
    \ Scene for this book; if the author has more than one book or no books at all,\
    \ you’ll perform the `ShowAuthorBooks` segue to display the Books Scene with the\
    \ list of books associated with this author.\n\nIf the selected cell’s identifier\
    \ is not *Cell*, which leaves you with the `AddCell` option, you’ll pop up a `UIAlertView`\
    \ with text field and Add button, almost identical to the one you did for the\
    \ Categories Scene. Once the user taps the alert view’s Add button, you create\
    \ a new author entity with the provided name. Now, add the new author to the `_authors`\
    \ array, and insert a new row at the top of the Table View.\n\n![images](images/9781430242727_Fig08-83.jpg)\n\
    \n**Figure 8-83.** *IBAction same as for Categories*\n\n14.  The `IBAction` for\
    \ the Edit button here is the same as in Categories. It toggles the editing mode\
    \ for the Authors Table View in exactly same way. Drag in the “37 AuthorsViewController.m\
    \ IBAction” snippet from DemoMonkey and place it right before the `@end` as shown\
    \ in [Figure 8-83](#Chapter08.html#fig_8_83).\n\n![images](images/9781430242727_Fig08-84.jpg)\n\
    \n**Figure 8-84.** *Add the prepareForSegue: method implementation.*\n\n15.  Finally,\
    \ you’ll implement the `prepareForSegue:` method. Drag in the “38 AuthorsViewController.m\
    \ prepareForSegue:” snippet from DemoMonkey and place it right before the `@end`\
    \ as shown in [Figure 8-84](#Chapter08.html#fig_8_84). The code here is a hybrid\
    \ between the implementations you wrote for `CategoriesViewController` and `BooksViewController`.\n\
    \n![images](images/9781430242727_Fig08-85.jpg)\n\n**Figure 8-85.** *Connect the\
    \ Edit button.*\n\n16.  Back in Storyboard, Control-drag from the Edit button\
    \ to the Authors View Controller icon in the Dock as shown in [Figure 8-85](#Chapter08.html#fig_8_85).\
    \ Select `editPressed:` from the pop-up dialog and save the file."
  trans: "\n#### 实现作者场景\n\n![images](img/9781430242727_Fig08-70.jpg)\n\n**图 8-70.**\
    \ *创建最后一个视图控制器类！*\n\n1.  你需要创建的最后一个视图控制器是作者视图控制器。按下 `⌘N` 创建一个新子类，在选择 Objective-C\
    \ 类后，点击“下一步”。将其命名为 `AuthorsViewController`，并使其成为 `UIViewController` 的子类，如图 8-70\
    \ 所示。\n\n**注意：** 接下来关于作者场景的几个步骤与你在类别场景中所做的操作相同，因此这些说明将很简短。但我们会提供图片。\n\n![images](img/9781430242727_Fig08-71.jpg)\n\
    \n**图 8-71.** *拖入导入语句、类别和作者显示。*\n\n2.  打开 `AuthorsViewController.m` 文件，从 DemoMonkey\
    \ 拖入“-- AuthorsViewController.m Imports”代码片段，并将其放置在 `#import \"AuthorsViewController.h\"\
    ` 的正下方，如图 8-71 所示。这些导入语句是 `DBBook.h`、`BooksViewController.h`、`DetailViewController.h`\
    \ 和 `CustomCell.h`。像处理类别时那样创建 `mutableArray`。\n\n将 `@interface AuthorsViewController\
    \ ()` 更改为：\n\n```\n@interface AuthorsViewController () {\n    NSMutableArray *_authors;\n\
    }\n```\n\n从 DemoMonkey 拖入“33 AuthorsViewController.m ViewDidLoad”代码片段，并将其放置在 `viewDidLoad:`\
    \ 方法内部，就像你在类别场景中所做的那样。\n\n从 DemoMonkey 拖入“34 AuthorsViewController.m Display Authors”代码片段，并将其放置在\
    \ `@end` 之前。\n\n![images](img/9781430242727_Fig08-72.jpg)\n\n**图 8-72.** *拖入删除作者代码片段。*\n\
    \n3.  从 DemoMonkey 拖入“35 AuthorsViewController.m Delete Authors”代码片段，并将其放置在 `@end`\
    \ 之前，如图 8-72 所示。\n\n![images](img/9781430242727_Fig08-73.jpg)\n\n**图 8-73.** *为表格视图创建输出口。*\n\
    \n4.  你还需要为表格视图创建一个输出口。打开 Storyboard 并导航到作者场景。点击一次“View Controller – Authors”以选中它，如图\
    \ 8-73 所示。\n\n![images](img/9781430242727_Fig08-74.jpg)\n\n**图 8-74.** *设置作者场景的类。*\n\
    \n5.  选中“View Controller – Authors”后，将 Class 设置为 `AuthorsViewController`，如图 8-74\
    \ 所示。\n\n![images](img/9781430242727_Fig08-75.jpg)\n\n**图 8-75.** *打开助理编辑器并创建输出口。*\n\
    \n6.  打开助理编辑器，确保右侧窗格中打开的是 `AuthorsViewController.m`，然后从“Authors Table View”拖拽到\
    \ `AuthorsViewController.m` 以创建输出口，如图 8-75 所示。\n\n![images](img/9781430242727_Fig08-76.jpg)\n\
    \n**图 8-76.** *将输出口命名为 `_tableView`。*\n\n7.  一旦出现“连接”弹出窗口，将输出口命名为 `_tableView`，如图\
    \ 8-76 所示。\n\n![images](img/9781430242727_Fig08-77.jpg)\n\n**图 8-77.** *将输出口连接到你的自定义表格视图单元格。*\n\
    \n8.  关闭助理编辑器，返回标准编辑器，并将输出口连接到你的自定义表格视图单元格。点击一次单元格，如图 8-77 所示。\n\n![images](img/9781430242727_Fig08-78.jpg)\n\
    \n**图 8-78.** *将单元格的 Class 设置为 `CustomCell`。*\n\n9.  将其 Class 设置为 `CustomCell`，如图\
    \ 8-78 所示。\n\n![images](img/9781430242727_Fig08-79.jpg)\n\n**图 8-79.** *将 `mainLabel`\
    \ 连接到“作者姓名”。*\n\n10.  在顶部单元格仍被选中的状态下，打开连接检查器，并将 `mainLabel` 输出口连接到“作者姓名”标签，如图\
    \ 8-79 所示。\n\n![images](img/9781430242727_Fig08-80.jpg)\n\n**图 8-80.** *连接 `detailLabel1`。*\n\
    \n11.  将 `detailLabel1` 连接到“Label – 5”，如图 8-80 所示。\n\n![images](img/9781430242727_Fig08-81.jpg)\n\
    \n**图 8-81.** *最终连接*\n\n12.  你的最终连接应该与我们的类似，如图 8-81 所示。\n\n![images](img/9781430242727_Fig08-82.jpg)\n\
    \n**图 8-82.** *添加新作者（略有变化）。*\n\n13.  现在返回到 `AuthorsViewController.m`，从 DemoMonkey\
    \ 拖入“36 AuthorsViewController.m Add NewAuthors + Drill Down”代码片段。将其放置在 `@end`\
    \ 之前，如图 8-82 所示。你可能还记得，在设计此场景时，你创建了两个源自“作者视图控制器”本身（而非某个单元格或按钮）的 Segue。因此，当满足特定条件时，你必须在代码中手动执行这些\
    \ Segue。在本例中，当用户选择一个表格视图单元格时，你将执行这些 Segue。在 `tableView:didSelectRowAtIndexPath:`\
    \ 方法中，根据所选作者拥有的书籍数量，手动执行带有特定标识符（`ShowAuthorBooks` 或 `ShowAuthorBookDetail`）的 Segue：\n\
    \n```\nif (object.books.count > 1 || object.books.count == 0) {\n    [self performSegueWithIdentifier:@\"\
    ShowAuthorBooks\" sender:[tableView\n    cellForRowAtIndexPath:indexPath]];\n\
    }\nelse if (object.books.count == 1) {\n    [self performSegueWithIdentifier:@\"\
    ShowAuthorBookDetail\" sender:[tableView\n    cellForRowAtIndexPath:indexPath]];\n\
    }\n```\n\n如果恰好有一本书，你将执行 `ShowAuthorBookDetail` Segue 来显示该本书的书籍详情场景；如果作者有多本书或没有书，你将执行\
    \ `ShowAuthorBooks` Segue 来显示书籍场景，其中包含与此作者关联的书籍列表。\n\n如果所选单元格的标识符不是 *Cell*（也就是说剩下\
    \ `AddCell` 这个选项），你将弹出一个带有文本字段和“添加”按钮的 `UIAlertView`，这与你在类别场景中所做的几乎相同。一旦用户点击警告视图的“添加”按钮，你将使用提供的名称创建一个新的作者实体。然后，将新作者添加到\
    \ `_authors` 数组，并在表格视图的顶部插入一个新行。\n\n![images](img/9781430242727_Fig08-83.jpg)\n\
    \n**图 8-83.** *IBAction 与类别场景相同*\n\n14.  这里的“编辑”按钮的 `IBAction` 与类别场景中的相同。它以完全相同的方式切换作者表格视图的编辑模式。从\
    \ DemoMonkey 拖入“37 AuthorsViewController.m IBAction”代码片段，并将其放置在 `@end` 之前，如图 8-83\
    \ 所示。\n\n![images](img/9781430242727_Fig08-84.jpg)\n\n**图 8-84.** *添加 `prepareForSegue:`\
    \ 方法的实现。*\n\n15.  最后，你将实现 `prepareForSegue:` 方法。从 DemoMonkey 拖入“38 AuthorsViewController.m\
    \ prepareForSegue:”代码片段，并将其放置在 `@end` 之前，如图 8-84 所示。这里的代码是你为 `CategoriesViewController`\
    \ 和 `BooksViewController` 所写实现的一个混合体。\n\n![images](img/9781430242727_Fig08-85.jpg)\n\
    \n**图 8-85.** *连接“编辑”按钮。*\n\n16.  回到 Storyboard，按住 Control 键从“编辑”按钮拖拽到 Dock 中的“作者视图控制器”图标，如图\
    \ 8-85 所示。从弹出对话框中选择 `editPressed:`，然后保存文件。\n"
- fmt: "#### Wrapping Up and Loading Test Data\n\n![images](images/9781430242727_Fig08-86.jpg)\n\
    \n**Figure 8-86.** *Connect the first Table View.*\n\n1.  Control-drag from the\
    \ Table View to the Authors View Controller icon in the Dock as shown in [Figure\
    \ 8-86](#Chapter08.html#fig_8_86).\n\n    ![images](images/9781430242727_Fig08-87.jpg)\n\
    \n    **Figure 8-87.** *Select dataSource.*\n\n2.  In the Connection dialog that\
    \ appears, select `dataSource` nested inside the Outlets option as shown in [Figure\
    \ 8-87](#Chapter08.html#fig_8_87). Repeat the exact same procedure to connect\
    \ the `delegate` outlet of the Table View.\n\n    ![images](images/9781430242727_Fig08-88.jpg)\n\
    \n    **Figure 8-88.** *Repeat for Categories as well.*\n\n3.  Now you need to\
    \ repeat for Categories what you just did with Authors. Connect the Table View\
    \ with the Categories View Controller icon as shown in [Figure 8-88](#Chapter08.html#fig_8_88)\
    \ and select `dataSource` from the Option dialog. Repeat again to similarly connect\
    \ the `delegate` outlet.\n\n    ![images](images/9781430242727_Fig08-89.jpg)\n\
    \n    **Figure 8-89.** *Populate the database with test data.*\n\n4.  You’re almost\
    \ ready to run your app! Although it’s not required, and you should be able to\
    \ run the app with an empty database, we recommend that you add one last piece\
    \ of code. You’ve prepared a test database for this app, so you can test its functionality\
    \ without the need to create many records yourself. Let’s plug it in and see how\
    \ the app works. Navigate to `AppDelegate.m` and drag in the “-- AppDelegate.m\
    \ Imports” snippet from DemoMonkey. Place it below the `#import \"AppDelegate.h\"\
    ` line. Then find the following method:\n\n    ```\n    - (BOOL)application:(UIApplication\
    \ *)application\n    didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n\
    \    ```\n\n    Drag in the very last “-- AppDelegate.m Data for Testing” snippet\
    \ from DemoMonkey. Insert it at the end of the method implementation right below\
    \ the following:\n\n    ```\n    [MagicalRecord setupCoreDataStackWithStoreNamed:@\"\
    MyDatabase.sqlite\"];\n    ```\n\n    See [Figure 8-89](#Chapter08.html#fig_8_89)\
    \ for the final view of the `AppDelegate.m` after the two modifications you just\
    \ made.\n\n    ![images](images/9781430242727_Fig08-90.jpg)\n\n    **Figure 8-90.**\
    \ *Run it!*\n\n5.  Run it and test out the path from My Library to Books and then\
    \ the path from My Library to Authors as shown in [Figure 8-90](#Chapter08.html#fig_8_90).\n\
    \n    ![images](images/9781430242727_Fig08-91.jpg)\n\n    **Figure 8-91.** *Three\
    \ views working*\n\n6.  In [Figure 8-91](#Chapter08.html#fig_8_91), the first\
    \ image shows the Books View reached from Authors after selecting author Rory\
    \ Lewis from the Table View. The middle image shows the Books View from Categories.\
    \ The third image shows Deleting books. All working correctly.\n\n    ![images](images/9781430242727_Fig08-92.jpg)\n\
    \n    **Figure 8-92.** *Adding*\n\n7.  The Adding Categories and adding Authors\
    \ also works perfectly.\n\nYou can now say you’ve experienced, in detail, how\
    \ you use the Master-Detail Application template to make an iPhone act like it\
    \ was programmed with a Navigation-based Application template—or make an iPad\
    \ act like it was programmed with a Split View-based Application template. This\
    \ is huge, because now you know how to use the Master-Detail Application template\
    \ when you want to work with lists, databases, and tables, particularly if you\
    \ want to give the user the ability to drill down through your data in a hierarchical\
    \ manner. You’ve also had experience now with the database component, and as mentioned,\
    \ it’s very difficult for employers to find Xcoders who have any experience at\
    \ all with SQL.\n\nGood job! Now get ready for your last app.\n\n## Chapter 9\n\
    \n## Single View #3: wanderBoard Part I\n\nIn this final Storyboarding app, you’ll\
    \ build a simple maze-wandering game that allows the user to walk through a 3D\
    \ maze that has one correct path among dead ends. As with the last app, this one\
    \ is divided into three chapters: [Chapter 9](#Chapter09.html#ch9)–[11](#Chapter11.html#ch11).\n\
    \nIn this app you’ll include a means to have the user graphically steer through\
    \ the maze that implies motion. You’ll be using mostly graphical images and Storyboarding\
    \ techniques to develop this app while using as little code as possible. Similarly\
    \ to [Chapter 2](#Chapter02.html#ch2)’s AlienView and [Chapter 3](#Chapter03.html#ch3)’s\
    \ FlickrPhotoMap, this is also a Single View Application with Storyboards—but\
    \ it’s considerably more advanced. By the time you’re done with this app, you’ll\
    \ have designed a serious graphical game using mostly Storyboarding."
