    \n7.  最后，在“描述”字段的正下方单击一次，然后按住 Control 键，从高亮显示的框拖拽到实现文件中，如图 8-11 所示。将输出口命名为 `_descriptionTextView`，如下所示：\n\
    \n`#import \"DetailViewController.h\"`\n`#import \"DBBook.h\"`\n\n`@interface\
