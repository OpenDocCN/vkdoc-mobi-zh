  trans: "```objc\n- (UITableViewCell *)tableView:(UITableView *)tableView\n    cellForRowAtIndexPath:(NSIndexPath\
    \ *)indexPath\n{\n    static NSString *cellIdentifier = nil;\n    if (indexPath.row\
    \ < _categories.count) {\n        cellIdentifier = @\"Cell\";\n    }\n    else\
    \ if (indexPath.row == _categories.count) {\n        cellIdentifier = @\"AllCell\"\
    ;\n    }\n    else {\n        cellIdentifier = @\"AddCell\";\n    }\n```\n![images](img/9781430242727_Fig08-64.jpg)\n\
    \n**图 8-64.** 引入用于删除类别的代码。\n\n9.  现在，你需要引入用于删除类别的代码。将 DemoMonkey 中的“29 CategoriesViewController.m\
    \ Delete Categories”代码片段拖入，并放置到 `@end` 之前，如图 8-64 所示。你可能会注意到，这与图 8-51 中的“Delete\
    \ Books”几乎完全相同。\n\n![images](img/9781430242727_Fig08-65.jpg)\n\n**图 8-65.** 添加一个新类别。\n\
    \n10. 不过，添加新类别稍有不同。由于你只需捕获类别名称，因此不需要一个全新的视图控制器——你可以使用 `UIAlertView` 来完成。将 DemoMonkey\
    \ 中的“30 CategoriesViewController.m Add New Category”代码片段拖入，并放置到 `@end` 之前，如图 8-65\
    \ 所示。\n\n在这里，当用户点击“添加新”单元格时\n\n```objc\nif ([cell.reuseIdentifier isEqualToString:@\"\
    AddCell\"]) {\n```\n\n你只需弹出一个标准的 `UIAlertView`，其中包含一个内置的 `UITextField`：\n\n```objc\n\
    UIAlertView *alertView = [[UIAlertView alloc] initWithTitle:@\"添加类别\"\n    message:nil\
    \ delegate:self cancelButtonTitle:@\"取消\" otherButtonTitles:@\"添加\",\n    nil];\n\
    alertView.alertViewStyle = UIAlertViewStylePlainTextInput;\nUITextField *alertTextField\
    \ = [alertView textFieldAtIndex:0];\n```\n\n然后，你需要实现 `UIAlertViewDelegate` 方法：\n\
    \n```objc\n- (void)alertView:(UIAlertView *)alertView\n    didDismissWithButtonIndex:(NSInteger)buttonIndex\n\
    ```\n\n将类别保存到数据库，并将其添加到 `_categories` 数组中：\n\n```objc\nDBCategory *newCategory\
    \ = [DBCategory createEntityWithDictionary:[NSDictionary\n    dictionaryWithObject:categoryName\
    \ forKey:@\"categoryName\"]];\n[_categories insertObject:newCategory atIndex:0];\n\
    ```\n\n在表视图中插入一个新行：\n\n```objc\n[self._tableView insertRowsAtIndexPaths:[NSArray\
    \ arrayWithObject:indexPath]\n    withRowAnimation:UITableViewRowAnimationAutomatic];\n\
    ```\n![images](img/9781430242727_Fig08-66.jpg)\n\n**图 8-66.** 实现 `prepareForSegue:`\
    \ 方法。\n\n11. 接下来，你将实现 `prepareForSegue:` 方法。将 DemoMonkey 中的“31 CategoriesViewController.m\
    \ PrepareForSegue”代码片段拖入，并放置到 `@end` 之前，如图 8-66 所示。\n\n在通过故事板设计 UI 时，你为类别场景指定了两个转场，你需要区分它们：\n\
    \n```objc\n([[segue identifier] isEqualToString:@\"ShowCategoryBooks\"])\n```\n\
    \n以及\n\n```objc\nif ([[segue identifier] isEqualToString:@\"ShowAllBooks\"])\n\
    ```\n\n在第一种情况下，你将目标视图控制器（即 `BooksViewController`）的 `Category` 属性设置为当前选中的类别，并将其\
    \ `Author` 属性重置为 `nil`，以防之前已经赋过值：\n\n```objc\n[(BooksViewController *)[segue destinationViewController]\
    \ setCategory:object];\n[(BooksViewController *)[segue destinationViewController]\
    \ setAuthor:nil];\n```\n\n这样，你就能确保 `BooksViewController` 只显示属于所选类别的书籍。\n\n在第二种情况下，你将\
    \ `Category` 和 `Author` 都设置为 `nil`：\n\n```objc\n[(BooksViewController *)[segue\
    \ destinationViewController] setCategory:nil];\n[(BooksViewController *)[segue\
    \ destinationViewController] setAuthor:nil];\n```\n\n在这种情况下，你或许还记得，`BooksViewController`\
    \ 的 `viewDidLoad` 将会加载你拥有的所有书籍。\n\n![images](img/9781430242727_Fig08-67.jpg)\n\
    \n**图 8-67.** 为编辑按钮设置另一个 IBAction。\n\n12. 最后，你将创建一个与之前为 `BooksViewController`\
    \ 创建的完全相同的 `IBAction` 方法，该方法用于切换表视图的编辑模式。将 DemoMonkey 中的“32 CategoriesViewController.m\
    \ IBAction”代码片段拖入，并放置到 `@end` 之前，如图 8-67 所示。\n\n![images](img/9781430242727_Fig08-68.jpg)\n\
    \n**图 8-68.** 将编辑按钮连接到类别视图控制器。\n\n![images](img/9781430242727_Fig08-69.jpg)\n\n\
    **图 8-69.** 从“已发送操作”中选择 `editPressed:`。\n\n13. 你只需要将其连接到视图控制器上的编辑按钮即可。在故事板中，将编辑按钮连接到类别视图控制器，如图\
    \ 8-68 和图 8-69 所示。"
- fmt: "#### Implementing the Authors Scene\n\n![images](images/9781430242727_Fig08-70.jpg)\n\
    \n**Figure 8-70.** *Create the last View Controller class!*\n\n1.  The last View\
    \ Controller you need to create is the Authors View Controller. Press `⌘N` to\
    \ create a new subclass and, after selecting the Objective-C class, click Next.\
    \ Name it `AuthorsViewController` and make it a subclass of `UIViewController`\
    \ as shown in [Figure 8-70](#Chapter08.html#fig_8_70).\n\n**NOTE:** The next few\
    \ steps for Authors repeat what you did for Categories, so these instructions\
    \ will be brief. But we’ll supply the images.\n\n![images](images/9781430242727_Fig08-71.jpg)\n\
    \n**Figure 8-71.** *Drag in the imports, Categories, and Author Display.*\n\n\
    2.  Open up the `AuthorsViewController.m` file, drag in the “-- AuthorsViewController.m\
    \ Imports” snippet from DemoMonkey, and place it right under the `#import \"AuthorsViewController.h\"\
    ` as shown in [Figure 8-71](#Chapter08.html#fig_8_71). These imports are `DBBook.h`,\
    \ `BooksViewController.h`, `DetailViewController.h`, and `CustomCell.h`. Create\
    \ the `mutableArray` just as you did for Categories.\n\nChange `@interface AuthorsViewController\
    \ ()` to:\n\n```\n@interface AuthorsViewController () {\n    NSMutableArray *_authors;\n\
    }\n```\n\nDrag in the “33 AuthorsViewController.m ViewDidLoad” snippet from DemoMonkey\
    \ and place it inside the `viewDidLoad:` as you did for Categories.\n\nDrag in\
    \ the “34 AuthorsViewController.m Display Authors” snippet from DemoMonkey and\
    \ place it right before the `@end`.\n\n![images](images/9781430242727_Fig08-72.jpg)\n\
    \n**Figure 8-72.** *Drag in the Delete Authors snippet.*\n\n3.  Drag in the “35\
    \ AuthorsViewController.m Delete Authors” snippet from DemoMonkey and place it\
    \ right before the `@end` as shown in [Figure 8-72](#Chapter08.html#fig_8_72).\n\
    \n![images](images/9781430242727_Fig08-73.jpg)\n\n**Figure 8-73.** *Make the outlet\
    \ for the Table View.*\n\n4.  You’ll also need an outlet for the Table View. Open\
    \ Storyboard and navigate to the Authors Scene. Click View Controller – Authors\
    \ once to select it as shown in [Figure 8-73](#Chapter08.html#fig_8_73).\n\n![images](images/9781430242727_Fig08-74.jpg)\n\
    \n**Figure 8-74.** *Set the Class for Authors Scene.*\n\n5.  With View Controller\
    \ – Authors selected, set the Class to `AuthorsViewController` as shown in [Figure\
    \ 8-74](#Chapter08.html#fig_8_74).\n\n![images](images/9781430242727_Fig08-75.jpg)\n\
    \n**Figure 8-75.** *Open the Assistant and create the outlet.*\n\n6.  Open the\
    \ Assistant editor, make sure the `AuthorsViewController.m` is open in the right-hand\
    \ pane, and drag from the Authors Table View to `AuthorsViewController.m` to create\
    \ the outlet as shown in [Figure 8-75](#Chapter08.html#fig_8_75).\n\n![images](images/9781430242727_Fig08-76.jpg)\n\
    \n**Figure 8-76.** *Name the outlet `_tableView`.*\n\n7.  Once the Connection\
    \ pop-up appears, name the outlet `_tableView` as shown in [Figure 8-76](#Chapter08.html#fig_8_76).\n\
    \n![images](images/9781430242727_Fig08-77.jpg)\n\n**Figure 8-77.** *Connect the\
    \ outlets to your custom Table View cell.*\n\n8.  Close the Assistant editor,\
    \ go back to the Standard editor, and connect the outlets to your custom Table\
    \ View cell. Click the cell once as shown in [Figure 8-77](#Chapter08.html#fig_8_77).\n\
    \n![images](images/9781430242727_Fig08-78.jpg)\n\n**Figure 8-78.** *Set the cell’s\
    \ Class to `CustomCell`.*\n\n9.  Set its Class to `CustomCell` as shown in [Figure\
    \ 8-78](#Chapter08.html#fig_8_78).\n\n![images](images/9781430242727_Fig08-79.jpg)\n\
    \n**Figure 8-79.** *Connect the `mainLabel` to “Author name.”*\n\n10.  With the\
    \ top cell still selected, open the Connections Inspector and connect the `mainLabel`\
    \ outlet to the “Author name” label as shown in [Figure 8-79](#Chapter08.html#fig_8_79).\n\
    \n![images](images/9781430242727_Fig08-80.jpg)\n\n**Figure 8-80.** *Connect the\
    \ `detailLabel1`.*\n\n11.  Connect the `detailLabel1` to “Label – 5” as shown\
    \ in [Figure 8-80](#Chapter08.html#fig_8_80).\n\n![images](images/9781430242727_Fig08-81.jpg)\n\
    \n**Figure 8-81.** *Final connections*\n\n12.  Your final connections should look\
    \ like ours as shown in [Figure 8-81](#Chapter08.html#fig_8_81).\n\n![images](images/9781430242727_Fig08-82.jpg)\n\
    \n**Figure 8-82.** *Add new authors (slight variation).*\n\n13.  Now go back to\
    \ the `AuthorsViewController.m` and drag in the “36 AuthorsViewController.m Add\
    \ NewAuthors + Drill Down” snippet from DemoMonkey. Place it right before the\
    \ `@end` as shown in [Figure 8-82](#Chapter08.html#fig_8_82). As you may remember,\
    \ when you were designing this scene you created two segues that originated from\
    \ the Authors View Controller itself rather than a cell or a button. Thus, you\
    \ must perform those segues manually from the code when certain conditions are\
    \ met. In your case, you’ll perform the segues once the user selects a Table View\
    \ cell. In the `tableView:didSelectRowAtIndexPath:` method, you manually perform\
    \ a segue with a specific identifier (`ShowAuthorBooks` or `ShowAuthorBookDetail`)\
    \ based on how many books the selected author has:\n\n```\nif (object.books.count\
    \ > 1 || object.books.count == 0) {\n    [self performSegueWithIdentifier:@\"\
    ShowAuthorBooks\" sender:[tableView\n    cellForRowAtIndexPath:indexPath]];\n\
    }\nelse if (object.books.count == 1) {\n    [self performSegueWithIdentifier:@\"\
    ShowAuthorBookDetail\" sender:[tableView\n    cellForRowAtIndexPath:indexPath]];\n\
    }\n```\n\nIf there’s exactly one book, you’ll perform the `ShowAuthorBookDetail`\
    \ segue to show the Book Details Scene for this book; if the author has more than\
    \ one book or no books at all, you’ll perform the `ShowAuthorBooks` segue to display\
    \ the Books Scene with the list of books associated with this author.\n\nIf the\
    \ selected cell’s identifier is not *Cell*, which leaves you with the `AddCell`\
    \ option, you’ll pop up a `UIAlertView` with text field and Add button, almost\
    \ identical to the one you did for the Categories Scene. Once the user taps the\
    \ alert view’s Add button, you create a new author entity with the provided name.\
    \ Now, add the new author to the `_authors` array, and insert a new row at the\
    \ top of the Table View.\n\n![images](images/9781430242727_Fig08-83.jpg)\n\n**Figure\
    \ 8-83.** *IBAction same as for Categories*\n\n14.  The `IBAction` for the Edit\
    \ button here is the same as in Categories. It toggles the editing mode for the\
    \ Authors Table View in exactly same way. Drag in the “37 AuthorsViewController.m\
    \ IBAction” snippet from DemoMonkey and place it right before the `@end` as shown\
    \ in [Figure 8-83](#Chapter08.html#fig_8_83).\n\n![images](images/9781430242727_Fig08-84.jpg)\n\
    \n**Figure 8-84.** *Add the `prepareForSegue:` method implementation.*\n\n15.\
    \  Finally, you’ll implement the `prepareForSegue:` method. Drag in the “38 AuthorsViewController.m\
    \ prepareForSegue:” snippet from DemoMonkey and place it right before the `@end`\
    \ as shown in [Figure 8-84](#Chapter08.html#fig_8_84). The code here is a hybrid\
    \ between the implementations you wrote for `CategoriesViewController` and `BooksViewController`.\n\
    \n![images](images/9781430242727_Fig08-85.jpg)\n\n**Figure 8-85.** *Connect the\
    \ Edit button.*\n\n16.  Back in Storyboard, Control-drag from the Edit button\
    \ to the Authors View Controller icon in the Dock as shown in [Figure 8-85](#Chapter08.html#fig_8_85).\
    \ Select `editPressed:` from the pop-up dialog and save the file."
