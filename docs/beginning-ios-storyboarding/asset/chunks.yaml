  trans: '

    # 必需品与配件


    为了给 iPhone 和/或 iPad 编写程序，并跟随本书中的练习、教程和示例进行操作，你需要满足 6 个最低要求。你现在可能不完全理解这些要求，但没关系，请暂时跟着我的节奏，我将在逐步讲解中解释所有内容。


    **注意：** 每当提到 *iPhone* 或 *iPad* 时，我们都指的是任何 iPhone 或 iPad OS 设备，包括 iPod touch。此外，当我们提到
    *Macintosh HD* 时，你的设备可能名称不同。


    简而言之，你需要六样东西：


    - 一台基于 Intel 的 Macintosh

    - 适合你的 Mac 的正确操作系统（OS X 10.7.4 Lion 或更高版本）

    - 成为注册开发者或使用模拟器（本章后面将详细讨论）

    - 适合你的 iPhone 的正确操作系统（iOS 5 或更高版本）

    - 适合你的 iPhone 的正确软件开发工具包（SDK），用于运行名为 Xcode 的程序（4.3 及以上版本）

    - 安装并运行 `DemoMonkey`


    我们来逐一详细说明这些内容。


    ## 获取 Mac


    如果你的 Mac 是 2006 年之后制造的，那就没问题。作者之一特意用一台 2008 年购买的 MacBook 编写所有程序。网上的所有视频都是从刘易斯博士
    2006 年的 MacBook 上录制的；如果他从 2010 年的 iMac 播送，也会先在他 2006 年购买的 MacBook 上运行。


    - 你不需要最新款的 Mac。如果你还没买，我们建议你买一台基础配置、无多余功能的 MacBook Air。

    - 如果你确实有一台较旧的 Mac，也许可以增加一些内存。在 Apple Store 的 Genius Bar 预约一次免费咨询，询问他们是否能为你旧型号的
    Mac 增加内存，如果可以，再询问最大可增加多少内存。然后明确地问：“这台旧电脑能运行 Lion（*至少* 10.7.1）和 Xcode 4.3 或更高版本吗？”请注意，本书中的某些应用程序可以在
    Snow Leopard 系统上使用 Xcode 4.3 运行。但如果可能，尽量使用 Lion（至少 Mac OS X 10.7.4）和 iOS SDK 4.3。

    - 如果你没有 Mac，又想跟着本书学习或编写 Objective-C 来制作 iPhone 应用程序，就需要买一台。请记住，如前所述，我们特意选择在 Apple
    最小、最便宜的机型 MacBook 上编写和运行本书中的每一个程序。Apple 已停产 MacBook；目前销售 MacBook Air，售价 999 美元，比作者的
    MacBook 更先进。你可以在 eBay 和其他类似网站上购买 MacBook。请参见图 1-1。


    ![images](img/9781430242727_Fig01-01.jpg)


    **图 1-1.** *作者使用市场上最便宜的 2006 年 Mac——MacBook 来完成本书中的所有编码和编译工作。作者的许多学生购买了图中所示的 999
    美元 MacBook Air。*


    ## 获取 OS X


    你需要正确版本的 OS X。在撰写本文时，该版本是 OS X 10.7.4。我们需要确保你的 Mac 内安装了最新最好的操作系统。我们收到很多电子邮件和论坛提问，发现你们很多人会想：“*啊，我的代码可能编译不正确，因为刘易斯博士的机器上有不同版本的
    OS X 或 iOS……*”


    **注意：** 即使你认为所有内容都是最新的，我们也建议你按照本节中的步骤操作，确保你的系统安装了最新的 OS X 和最新的 iOS。我们这么说是因为，随着你跟随本书学习并处理所有程序，有时你的代码在首次运行时可能无法正常工作。


    为了确保你的系统足够新以配合本书内容，请执行以下操作：


    1. 关闭 Mac 上所有正在运行的程序，只保留访达运行。

    2. 点击屏幕左上角的小苹果图标，选择“关于本机”。你将看到图 1-2 所示的窗口。请确认显示的是 OS X 10.7.4。


    ![images](img/9781430242727_Fig01-02.jpg)


    **图 1-2.** *这里可以看到刘易斯博士的 MacBook 使用的是 OS X 10.7.4。*


    现在，确保你的 Mac 上安装了最新软件：


    1. 关闭除访达之外的所有程序，再次点击左上角的苹果图标，选择“软件更新……”，如图 1-3 所示。

    2. 如果有可用更新，点击“继续”并按照说明和四个屏幕提示进行操作，如图 1-3 所示。


    ![images](img/9781430242727_Fig01-03.jpg)


    **图 1-3.** *顶部：检查新软件。从上数第二：下载新软件。从下数第二：等待软件下载。底部：点击“重新启动”让 Mac 正确安装新软件。*


    如果你在阅读本书时发现你的 OS X 或 iOS 版本使得我的图片看起来过时了，请不要惊慌。我们有一个在线论坛，我和志愿者们乐于帮助他人。我们经常更新论坛，发布关于
    OS X 和 iOS 最新更新的消息。你可以在这里访问论坛：


    `www.rorylewis.com/ipad_forum/`

    `http://bit.ly/oLVwpY`


    ## 成为开发者


    你需要通过 iPhone/iPad 软件开发工具包（SDK）注册成为开发者，费用为 99 美元。或者，你可以支付 0 美元获得入门级的简单功能。


    ### 做出选择


    如果你是学生，很可能你的教授已经处理了这件事，你可能已经注册在你的教授名下。如果你不是学生，你需要决定你想成为哪种类型的开发者。以下是你的选择：


    - *0 美元选项*：你可以前往 App Store 免费下载 Xcode。这没问题，但请记住，除非你成为开发者（支付 99 美元），否则你只能在 iPhone
    或 iPad *模拟器*上看到你在本书中编写和编程的应用程序。这意味着你无法在真实的物理 iPad 或 iPhone 上运行它们。你也不能在 iTunes
    Store 上销售你的应用程序。最后，你将无法登录开发者网站查看代码片段和更新、测试新产品，或加入 Apple 在线社区。对于不确定是否要继续使用 Xcode
    和编程的人来说，这可能是一个非常好的选择。如果是这种情况，请从 [`https://developer.apple.com/xcode/`](https://developer.apple.com/xcode/)
    下载最新版本的 Xcode，然后在图 1-13 处与我相见。

    - *99 美元选项*：如果你确实想在实际的物理设备（如真实的 iPad 或 iPhone）上运行你的应用程序，在 iTunes Store 上销售应用程序，并成为
    Apple 开发者群体的一员——请继续阅读。

    '
- fmt: '### Installing Xcode


    Let''s get started installing Xcode.


    1. Go to [`http://developer.apple.com/programs/ios/`](http://developer.apple.com/programs/ios/)
    or [`http://bit.ly/rrrdjc`](http://bit.ly/rrrdjc). You’ll see a page similar to
    the one shown in [Figure 1-4](#Chapter01.html#fig_1_4). Click the Enroll Now button.


    ![images](images/9781430242727_Fig01-04.jpg)


    **Figure 1-4.** *Click the Enroll Now button.*


    2. Click the Continue button, as illustrated in [Figure 1-5](#Chapter01.html#fig_1_5).


    ![images](images/9781430242727_Fig01-05.jpg)


    **Figure 1-5.** *Click the Continue button.*


    3. Most people reading this book will select the “I need to create a new account
    for…” option (arrow 1 in [Figure 1-6](#Chapter01.html#fig_1_6)). Next, click the
    Continue button (arrow 2). (If you already have an existing account, then you
    have been through this process before; go ahead with the process beginning with
    the “I currently have an Apple ID... ” option, and I’ll meet you at step 6, where
    you’ll log in to the iPhone/iPad development page and download the SDK.)


    ![images](images/9781430242727_Fig01-06.jpg)


    **Figure 1-6.** *Click the “I need to create a new account …” option to proceed.*


    4. You are probably going to be enrolling as an individual, so click the Individual
    link shown in [Figure 1-7](#Chapter01.html#fig_1_7). If you are enrolling as a
    company, click the Company option to the right and follow the appropriate steps;
    Skip to step 6.


    ![images](images/9781430242727_Fig01-07.jpg)


    **Figure 1-7.** *Click the Individual option.*


    5. Enter all your information as shown in [Figure 1-8](#Chapter01.html#fig_1_8)
    and pay your fee of $99 for the Standard Program. This provides all the tools,
    resources, and technical support you will need. (If you’re reading this book,
    you really don’t want to buy the Enterprise program at $299—it’s for commercial
    in‑house applications.) After paying, save your Apple ID and username; then receive
    and interact with your confirmation email appropriately.


    ![images](images/9781430242727_Fig01-08.jpg)


    **Figure 1-8.** *Enter all your information accordingly.*


    **NOTE:** Before you move on to step 6, make sure you have received your confirmation
    email and chosen a password to complete the last step of setting you up as a bona
    fide registered Apple developer. Congratulations!


    6. Use your Apple ID to log in to the main iOS development page at [`http://developer.apple.com`](http://developer.apple.com).
    This page has three icons for the three types of Apple programmers. As shown on
    [Figure 1-9](#Chapter01.html#fig_1_9), click the iOS Dev Center icon, which leads
    to the download page for iOS development software.


    ![images](images/9781430242727_Fig01-09.jpg)


    **Figure 1-9.** *For now click on the iOS Dev Center icon as indicated by the
    arrow. Later you may want to also program apps for the Mac Computer or the Safari
    Web Browser.*


    7. After logging in with your username and password as described in step 6, you
    will see a screen similar to [Figure 1-10](#Chapter01.html#fig_1_10). The iOS
    Dev Center contains all the tools necessary to build iOS apps. Later on you will
    spend time here, but for now just go to the Developer Page of the latest build
    of the iOS SDK. Click the icon indicated by the arrow.


    ![images](images/9781430242727_Fig01-10.jpg)


    **Figure 1-10.** *The Downloads link takes you to the bottom of the page as shown
    in [Figure 1-11](#Chapter01.html#fig_1_11).*


    **NOTE:** At the time of writing, Xcode 4.3 and iOS SDK 5 are the latest environments.
    There is a great chance that by the time you read this book these may have larger
    numbers. This is not a problem—just go on to step 8. If by chance there is something
    that has really thrown us a curve ball, it will be discussed and solved for you
    in our forum located at [`www.rorylewis.com/ipad_forum/`](http://www.rorylewis.com/ipad_forum/)
    or [`http://bit.ly/oLVwpY`](http://bit.ly/oLVwpY).


    8. For now we want you to click on the latest version. The figures in this section
    show the latest version at the time of print. These *will* be different by the
    time you read this. Right now the latest version is Xcode 4.3 for Lion, so click
    the link indicated by the arrow in [Figure 1-11](#Chapter01.html#fig_1_11).


    ![images](images/9781430242727_Fig01-11.jpg)


    **Figure 1-11.** *Clicking the Download Xcode 4 button takes you to the Xcode
    4 Developer page.*


    9. Click the View in Mac App Store button. Remember that if it’s a later version
    than shown in [Figure 1-12](#Chapter01.html#fig_1_12) things may look slightly
    different, but we have confidence in you.


    ![images](images/9781430242727_Fig01-12.jpg)


    **Figure 1-12.** *Click the View in Mac App Store link.*


    10. Click the Install button, as shown in [Figure 1-13](#Chapter01.html#fig_1_13).
    As the download continues, the Install button changes to say “Installing.” When
    it has completed downloading Xcode and iOS SDK, it changes to “Installed.” Included
    with `Xcode`''s iOS SDK is Apple’s Integrated Development Environment (IDE). This
    is the programming platform that contains a suite of tools, sub‑applications,
    and boilerplate code that enable programmers to do their jobs more easily.


    ![images](images/9781430242727_Fig01-13.jpg)


    **Figure 1-13.** *Click Install and then wait for the download to complete.*


    With your `Xcode` and iPhone/iPad Simulator tools installed and ready to access
    easily, you’re almost ready to roll.


    #### About DemoMonkey


    Before you load the final tool — called `DemoMonkey` — let’s step back and have
    a look at where we’re going.


    Through the years we have found that the most efficient means to teach students
    code is to take what we call the subsystem approach, teaching you what pieces
    or sections of code will serve you in which situations. In this book we will use
    a cool program you may have seen if you watched the latest WWDC: it’s called `DemoMonkey`.
    Essentially, you drag a heading explaining what needs to be done from the `DemoMonkey`
    palette, and as you drop it into your code at the appropriate section of your
    Xcode file, it magically transforms into code that the author of the `DemoMonkey`
    file wrote. Before you can download and compile the Xcode project that creates
    `DemoMonkey`, you need to make sure `Xcode` works. So in the next section you
    first run a simple app to make sure all is in order in Xcode land.'
