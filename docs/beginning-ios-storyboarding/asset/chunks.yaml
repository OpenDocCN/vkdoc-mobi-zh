    \ 图标，然后从上下文菜单中选择“在 Finder 中显示”，如 图 1-21 所示。\n\n   ![images](img/9781430242727_Fig01-21.jpg)\n\
    \n   **图 1-21.** *展开项目导航器，并从上下文菜单中选择“在 Finder 中显示”。*\n\n4. 最后，当 Finder 打开包含你刚构建的应用的文件夹时，将\
    \ `DemoMonkey.app` 拖到你的“应用程序”文件夹中，如 图 1-22 所示。\n\n   ![images](img/9781430242727_Fig01-22.jpg)\n\
