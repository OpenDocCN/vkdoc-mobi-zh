    \n![images](images/9781430242727_Fig08-60.jpg)\n\n**Figure 8-60.** *Create the\
    \ Table View outlet.*\n\n5.  Open the Assistant editor and make sure you have\
    \ the `CategoriesViewController` implementation file on the right-hand pane of\
    \ the Assistant. Now, Control-drag from the Table View to right before the `@end`\
