- fmt: "22. In the JSON sample in [Figure 3-27](#Chapter03.html#fig_3_27), you can\
    \ see that the response from Flickr does not contain the actual image data. To\
    \ download the images and get their geospatial data, you need to extract the information\
    \ for each image in the “photo” collection and perform several additional steps.\
    \ In this case, the most convenient way to accomplish that is to use a new iOS\
    \ 5 feature: the `NSJSONSerialization` class. It’s a native JSON parser that converts\
    \ JSON to Foundation objects (usually an `NSDictionary` or an `NSArray` based\
    \ on the structure of your JSON document) and vice versa. The `NSJSONSerialization`\
    \ class has a static method called `JSONObjectWithData:options:error`. You’re\
    \ going to use it to turn your Flickr JSON data into an `NSDictionary`.\n\n![images](images/9781430242727_Fig03-27.jpg)\n\
    \n**Figure 3-27.** *Flickr JSON response displayed in the Chrome browser*\n\n\
    23. Let's add implementation for the `saveData:` method mentioned in step 18.\
    \ Find its placeholder in the `MapViewController.m` file and insert the code shown\
    \ in [Figure 3-28](#Chapter03.html#fig_3_28) (DemoMonkey step “[09 MapViewController.m\
    \ saveData:”).\n\nThis method may seem a bit overwhelming at first, but it’s actually\
    \ quite simple. Because you saw the hierarchy of the JSON response in step 19,\
    \ you know which key in the results dictionary will get you access to the array\
    \ of photos you’re interested in. The following code parses the JSON data into\
    \ an `NSDictionary` and saves the array of photo info items stored in it under\
    \ `photo` key into an `NSArray` for further processing:\n\n```\nNSError *error\
    \ = nil;\nNSMutableDictionary *response = [NSJSONSerialization JSONObjectWithData:data\n\
    options:NSJSONReadingMutableContainers error:&error];\nNSArray *photos = [[response\
    \ objectForKey:@\"photos\"] objectForKey:@\"photo\"];\n```\n\n![images](images/9781430242727_Fig03-28.jpg)\n\
    \n**Figure 3-28.** *Add the saveData: method implementation.*\n\n24. In this case,\
    \ the `photos` array is an array of `NSDictionary` objects. Each dictionary contains\
    \ information about the photo, such as ID, farm, server, title, and so forth,\
    \ from which you can construct the URLs to retrieve the actual image data and\
    \ image geolocation from Flickr.\n\nNote that we use the `NSJSONReadingMutableContainers`\
    \ option for parsing JSON data. We do this to be able to append additional information\
    \ to the parsed objects (like thumbnail URL, image URL, and geocode).\n\n25. Getting\
    \ back to the rest of the `saveData:` method code: after parsing the JSON data,\
    \ initialize the variables declared in step 11 and start enumerating through the\
    \ array. In this `for` loop you simply construct three types of URL strings based\
    \ on the attributes stored in each photo info dictionary. You’ll use these URLs\
    \ later to load thumbnail, medium size image, and image geo-spatial data for each\
    \ photo. The rules for constructing mentioned URLs are in the Flickr API Documentation\
    \ at [`www.flickr.com/services/api/misc.urls.html`](http://www.flickr.com/services/api/misc.urls.html).\
    \ Finally, save the dictionaries containing data about each photo into a `parsedDataDictionary`\
    \ variable. Use photo id string as a key so later you can update each photo dictionary\
    \ with geo-spatial data by simply retrieving it via photo id. The last code block\
    \ in the method is almost identical to the one from step 18. Because the geolocation\
    \ data of the photos is stored separately on Flickr, you have to make another\
    \ API call using the `photoGeoInfoURLString` you’ve just constructed for each\
    \ photo to retrieve its location data:\n\n```\ndispatch_async(dispatch_get_global_queue(DISPATCH_QUEUE_PRIORITY_DEFAULT,\
    \ 0), ^{\n    NSData *data = [NSData dataWithContentsOfURL:[NSURL\n    URLWithString:photoGeoInfoURLString]];\n\
    \    [self performSelectorOnMainThread:@selector(saveGeoCodeData:) withObject:data\n\
    \    waitUntilDone:YES];\n    });\n```\n\nOnce the data is fully fetched, it will\
    \ be parsed and saved by invoking the `saveGeoCodeData:` method, which you’ll\
    \ implement next.\n\n26. Find the placeholder for `saveGeoCodeData:` and insert\
    \ the code shown in [Figure 3-29](#Chapter03.html#fig_3_29) (if you’re using DemoMonkey,\
    \ drag step “[10 MapViewController.m saveGeoCodeData:” into the method placeholder).\
    \ This method is quite similar to the `saveData:` method discussed in the previous\
    \ step, except that in this case you only need to retrieve two values from the\
    \ JSON response (latitude and longitude of where photo was taken). Thus, you parse\
    \ the JSON data using the same `NSJSONSerialization` class and, if there were\
    \ no errors, save the geocode values into the corresponding photo info dictionary\
    \ retrieved from the `parsedPhotosDictionary` variable by photo ID key. Note that\
    \ the parsing options this time are set to `kNilOptions` constant because you\
    \ don’t need the parsed objects to be modifiable in this case.\n\nOnce all objects\
    \ are updated, stop the progress indicator and call the method that will annotate\
    \ your photos on the `MapView`:\n\n```\n  if (updatesCount == totalNumberOfPhotos)\
    \ {\n           [self.activityIndicator stopAnimating];\n           [self populateMapWithPhotoAnnotations];\n\
    \      }\n```\n\n![images](images/9781430242727_Fig03-29.jpg)\n\n**Figure 3-29.**\
    \ *Add the saveGeoCodeData: method implementation.*\n\n27. Find the placeholder\
    \ for the `populateMapWithPhotoAnnotation` method and insert the code shown in\
    \ [Figure 3-30](#Chapter03.html#fig_3_30) (DemoMonkey step “11 MapViewController.m\
    \ populateMapWithPhotoAnnotation”). In this step you’re adding the code to annotate\
    \ your geotagged photos on the `MapView`. To accomplish that, loop through the\
    \ objects you saved into `parsedPhotosDictionary`. If `latitude` and `longitude`\
    \ values aren’t nil, you create a `PhotoAnnotation` object for that photo, initialize\
    \ it with the necessary data from the photo info dictionary (title, geocode, URLs,\
    \ and so on), and save it into a temporary `NSArray`. Finally you add all created\
    \ annotations to the `MapView`. At this point you no longer need the data stored\
    \ in the `parsedPhotosDictionary` variable, so you free the memory occupied by\
    \ it simply by setting its value to nil.\n\n![images](images/9781430242727_Fig03-30.jpg)\n\
    \n**Figure 3-30.** *Add the populateMapWithPhotoAnnotation method implementation.*\n\
    \n28. You should now be able to see the results of your work as shown in [Figure\
    \ 3-31](#Chapter03.html#fig_3_31). If you click any annotation, a callout bubble\
    \ will show up with the name of the photo the annotation represents.\n\n![images](images/9781430242727_Fig03-31.jpg)\n\
    \n**Figure 3-31.** *Build and run the app.*"
