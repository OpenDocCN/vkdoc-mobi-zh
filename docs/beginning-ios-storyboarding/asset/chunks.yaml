- fmt: "### Step 2: Prepping the Storyboard\n\nYou’ll start by prepping the Main View\
    \ by coloring the Navigation Bar and changing the Info button to Scales. Next\
    \ you’ll add a `UIImageView` image that doesn’t have any user interaction! You’ll\
    \ then add a landing area for your play buttons that, again, won’t have any user\
    \ interaction. Once you do that you’ll label the landing area “View - Play button\
    \ area.” This completes the First View.\n\nThe Second View will also need prepping—you’ll\
    \ start by coloring and adding a title to the Navigation Bar. Next you’ll add\
    \ a `UITableView` that will have dynamic cells and be grouped. You’ll also set\
    \ the datasource and delegate to your `ViewController`.\n\n1. As mentioned earlier,\
    \ the Utility Application comprises two Views: a Main View and a Flipside View.\
    \ The user gets to the Flipside View by tapping the Info button found on the right\
    \ side of the Navigation Bar in the Main View. Let's have a look at this and start\
    \ setting up the Storyboard. Open the Storyboard and you will indeed see the Main\
    \ View and the Flipside View as shown in [Figure 4-13](#Chapter04.html#fig_4_13).\
    \ You can see that the segue has already been built, and it’s all there. Note\
    \ that in the iPad, the Flipside View is shown as a Popover View.\n\n   ![images](images/9781430242727_Fig04-13.jpg)\n\
    \n   **Figure 4-13.** *Open the Storyboard file and see the Main View and Flipside\
    \ View.*\n\n2. Select the Title Bar (Navigation Controller) by clicking it and\
    \ then use the Attributes Inspector to navigate to the Tint selector. Select the\
    \ Teal color as shown in [Figure 4-14](#Chapter04.html#fig_4_14).\n\n   ![images](images/9781430242727_Fig04-14.jpg)\n\
    \n   **Figure 4-14.** *Start by colorizing the Title Bar.*\n\n3. Now you want\
    \ to customize the Info button. First click the Info button (click twice to get\
    \ the button itself and not the bar title) and then in the Attribute Inspector\
    \ go to the Title box in the Bar Item section and change the name to Scales. You\
    \ also want it to be the same color as the Navigation Bar, so go ahead and change\
    \ the color to teal as shown in [Figure 4-15](#Chapter04.html#fig_4_15). Note\
    \ that you may have programmed another application that has reset the default\
    \ of Style and Identifier; if this is the case, make sure your selections are\
    \ like ours in [Figure 4-15](#Chapter04.html#fig_4_15).\n\n   ![images](images/9781430242727_Fig04-15.jpg)\n\
    \n   **Figure 4-15.** *Customize the Info Button.*\n\n4. The main screen will\
    \ house an image of a guitar fretboard with fingerings on it. This means you need\
    \ to drag an Image View onto the canvas and allow it to autosize appropriately\
    \ as shown in [Figure 4-16](#Chapter04.html#fig_4_16). Depending on the resolution\
    \ of your display, you may need to first zoom out to do this properly.\n\n   ![images](images/9781430242727_Fig04-16.jpg)\n\
    \n   **Figure 4-16.** *Drag in an Image View.*\n\n5. You’ll need a place on the\
    \ canvas to put your play buttons. (You may want to take a sneak peek and see\
    \ the play buttons in [Figures 4-59](#Chapter04.html#fig_4_59) and 4-60.) To do\
    \ that, drag another view near the top left-hand corner of the existing Image\
    \ View as shown in [Figure 4-17](#Chapter04.html#fig_4_17). Note that the view\
    \ is highlighted with light grey at the bottom of the Library.\n\n   ![images](images/9781430242727_Fig04-17.jpg)\n\
    \n   **Figure 4-17.** *Create a space for the play buttons.*\n\n6. With this new\
    \ smaller view selected, in the Attributes Inspector change the color to teal.\
    \ Next go to the Identity Inspector and set the label to “View - Play Button Area”\
    \ (this allows you to clearly identify this new smaller view in your document\
    \ outline). Finally, with the new smaller view still selected, and now a teal\
    \ color, go to the Size Inspector and place the view 20 pixels from the left and\
    \ 64 pixels from the top. Now make the view have a width of 190 pixels with a\
    \ height of 110 as shown in [Figure 4-18](#Chapter04.html#fig_4_18).\n\n   ![images](images/9781430242727_Fig04-18.jpg)\n\
    \n   **Figure 4-18.** *Customize the “play button area\" view.*\n\n7. To show\
    \ the Default image you placed into the `Supporting Files` folder, click the `UIImageView`\
    \ in the Main View Controller Scene and then in the Attributes Inspector select\
    \ `Default-Landscape-ipad.png` from the drop-down menu as shown in [Figure 4-19](#Chapter04.html#fig_4_19).\n\
    \n   ![images](images/9781430242727_Fig04-19.jpg)\n\n   **Figure 4-19.** *Set\
    \ your Default image as the initial image within the Main View.*\n\n8. Now go\
    \ to the Flipside View Controller Scene and select the Navigation Bar Title (in\
    \ the document outline within the Flipside View Controller Scene, click the “Navigation\
    \ Item – Title” line). Then in the Attributes Inspector rename the title to Scales\
    \ as shown in [Figure 4-20](#Chapter04.html#fig_4_20).\n\n   ![images](images/9781430242727_Fig04-20.jpg)\n\
    \n   **Figure 4-20.** *Customize the Flipside View Controller.*\n\n9. You probably\
    \ want both the Navigation Bar of the Main View and the Navigation Bar of the\
    \ Flipside View to be the same color, so click the Flipside View's Navigation\
    \ Bar (in the document outline) and then select teal again in the Attributes Inspector's\
    \ Tint selector. Now you want to change the Done button to teal, so click it and\
    \ select teal from the Attributes Inspector. Lastly, think about what you want\
    \ here in the Flipside View. You want this to be a Table of scales that the user\
    \ can choose from (refer to [Figure 4-58](#Chapter04.html#fig_4_58)). This means\
    \ you’ll have to drag in a Table View. Once you’ve dragged in your Table View\
    \ and allowed it to autosize itself, your Flipside View should look like ours\
    \ does in [Figure 4-21](#Chapter04.html#fig_4_21).\n\n   ![images](images/9781430242727_Fig04-21.jpg)\n\
    \n   **Figure 4-21.** *Set the Navigation Bar and Done button to teal and then\
    \ change the Title and bring in a Table View.*\n\n10. Once your Table View is\
    \ nicely sized inside your Flipside View, with it still selected go to the Attributes\
    \ Inspector and select Dynamic Prototypes as the Type of Content structure in\
    \ the Content drop-down menu. You do this because not only do you want a heading\
    \ in your table, but you also want subtitles. Dynamic Prototypes let you adjust\
    \ the cell style without providing cell content. Set the number of Prototype cells\
    \ to 1 (from 0). You also want to select the grouped style for your table so you\
    \ can have a header for your group of scale entries in your table (refer to [Figure\
    \ 4-58](#Chapter04.html#fig_4_58)), so in the Style drop-down menu, select Grouped.\
    \ At this point your Table View should look like ours in [Figure 4-22](#Chapter04.html#fig_4_22).\n\
    \n    ![images](images/9781430242727_Fig04-22.jpg)\n\n    **Figure 4-22.** *Customizing\
    \ the Table View.*\n\n11. You’ll want to have subtitles in each cell. To do that,\
    \ click the cell itself to select it and in the Attributes Inspector select Subtitle\
    \ from the drop-down menu in Style. Also change the default blue color to gray\
    \ in the Selection drop-down menu. Finally you want to build these cells from\
    \ code, so you need to name them so you can locate them within the Storyboard\
    \ file and load them into your code whenever you need them. To do that, name the\
    \ Identifier in the Attributes Inspector to `ScaleCell` as shown in [Figure 4-23](#Chapter04.html#fig_4_23).\n\
    \n    ![images](images/9781430242727_Fig04-23.jpg)\n\n    **Figure 4-23.** *Customizing\
    \ the cells.*"
  raw: '### Step 2: Prepping the Storyboard


    You’ll start by prepping the Main View by coloring the Navigation Bar and changing
    the Info button to Scales. Next you’ll add a `UIImageView` image that doesn’t
    have any user interaction! You’ll then add a landing area for your play buttons
    that, again, won’t have any user interaction. Once you do that you’ll label the
    landing area “View - Play button area.” This completes the First View.


    The Second View will also need prepping—you’ll start by coloring and adding a
    title to the Navigation Bar. Next you’ll add a `UITableView` that will have dynamic
    cells and be grouped. You’ll also set the datasource and delegate to your `ViewController`.


    1.  As mentioned earlier, the Utility Application comprises two Views: a Main
    View and a Flipside View. The user gets to the Flipside View by tapping the Info
    button found on the right side of the Navigation Bar in the Main View. Let''s
    have a look at this and start setting up the Storyboard. Open the Storyboard and
    you will indeed see the Main View and the Flipside View as shown in [Figure 4-13](#Chapter04.html#fig_4_13).
    You can see that the segue has already been built, and it’s all there. Note that
    in the iPad, the Flipside View is shown as a Popover View.


    ![images](images/9781430242727_Fig04-13.jpg)


    **Figure 4-13.** *Open the Storyboard file and see the Main View and Flipside
    View.*


    2.  Select the Title Bar (Navigation Controller) by clicking it and then use the
    Attributes Inspector to navigate to the Tint selector. Select the Teal color as
    shown in [Figure 4-14](#Chapter04.html#fig_4_14).


    ![images](images/9781430242727_Fig04-14.jpg)


    **Figure 4-14.** *Start by colorizing the Title Bar.*


    3.  Now you want to customize the Info button. First click the Info button (click
    twice to get the button itself and not the bar title) and then in the Attribute
    Inspector go to the Title box in the Bar Item section and change the name to Scales.
    You also want it to be the same color as the Navigation Bar, so go ahead and change
    the color to teal as shown in [Figure 4-15](#Chapter04.html#fig_4_15). Note that
    you may have programmed another application that has reset the default of Style
    and Identifier; if this is the case, make sure your selections are like ours in
    [Figure 4-15](#Chapter04.html#fig_4_15).


    ![images](images/9781430242727_Fig04-15.jpg)


    **Figure 4-15.** *Customize the Info Button.*


    4.  The main screen will house an image of a guitar fretboard with fingerings
    on it. This means you need to drag an Image View onto the canvas and allow it
    to autosize appropriately as shown in [Figure 4-16](#Chapter04.html#fig_4_16).
    Depending on the resolution of your display, you may need to first zoom out to
    do this properly.


    ![images](images/9781430242727_Fig04-16.jpg)


    **Figure 4-16.** *Drag in an Image View.*


    5.  You’ll need a place on the canvas to put your play buttons. (You may want
    to take a sneak peek and see the play buttons in [Figures 4-59](#Chapter04.html#fig_4_59)
    and 4-60.) To do that, drag another view near the top left-hand corner of the
    existing Image View as shown in [Figure 4-17](#Chapter04.html#fig_4_17). Note
    that the view is highlighted with light grey at the bottom of the Library.


    ![images](images/9781430242727_Fig04-17.jpg)


    **Figure 4-17.** *Create a space for the play buttons.*


    6.  With this new smaller view selected, in the Attributes Inspector change the
    color to teal. Next go to the Identity Inspector and set the label to “View -
    Play Button Area” (this allows you to clearly identify this new smaller view in
    your document outline). Finally, with the new smaller view still selected, and
    now a teal color, go to the Size Inspector and place the view 20 pixels from the
    left and 64 pixels from the top. Now make the view have a width of 190 pixels
    with a height of 110 as shown in [Figure 4-18](#Chapter04.html#fig_4_18).


    ![images](images/9781430242727_Fig04-18.jpg)


    **Figure 4-18.** *Customize the “play button area" view.*


    7.  To show the Default image you placed into the `Supporting Files` folder, click
    the `UIImageView` in the Main View Controller Scene and then in the Attributes
    Inspector select `Default-Landscape-ipad.png` from the drop-down menu as shown
    in [Figure 4-19](#Chapter04.html#fig_4_19).


    ![images](images/9781430242727_Fig04-19.jpg)


    **Figure 4-19.** *Set your Default image as the initial image within the Main
    View.*


    8.  Now go to the Flipside View Controller Scene and select the Navigation Bar
    Title (in the document outline within the Flipside View Controller Scene, click
    the “Navigation Item – Title” line). Then in the Attributes Inspector rename the
    title to Scales as shown in [Figure 4-20](#Chapter04.html#fig_4_20).


    ![images](images/9781430242727_Fig04-20.jpg)


    **Figure 4-20.** *Customize the Flipside View Controller.*


    9.  You probably want both the Navigation Bar of the Main View and the Navigation
    Bar of the Flipside View to be the same color, so click the Flipside View''s Navigation
    Bar (in the document outline) and then select teal again in the Attributes Inspector''s
    Tint selector. Now you want to change the Done button to teal, so click it and
    select teal from the Attributes Inspector. Lastly, think about what you want here
    in the Flipside View. You want this to be a Table of scales that the user can
    choose from (refer to [Figure 4-58](#Chapter04.html#fig_4_58)). This means you’ll
    have to drag in a Table View. Once you’ve dragged in your Table View and allowed
    it to autosize itself, your Flipside View should look like ours does in [Figure
    4-21](#Chapter04.html#fig_4_21).


    ![images](images/9781430242727_Fig04-21.jpg)


    **Figure 4-21.** *Set the Navigation Bar and Done button to teal and then change
    the Title and bring in a Table View.*


    10.  Once your Table View is nicely sized inside your Flipside View, with it still
    selected go to the Attributes Inspector and select Dynamic Prototypes as the Type
    of Content structure in the Content drop-down menu. You do this because not only
    do you want a heading in your table, but you also want subtitles. Dynamic Prototypes
    let you adjust the cell style without providing cell content. Set the number of
    Prototype cells to 1 (from 0). You also want to select the grouped style for your
    table so you can have a header for your group of scale entries in your table (refer
    to [Figure 4-58](#Chapter04.html#fig_4_58)), so in the Style drop-down menu, select
    Grouped. At this point your Table View should look like ours in [Figure 4-22](#Chapter04.html#fig_4_22).


    ![images](images/9781430242727_Fig04-22.jpg)


    **Figure 4-22.** *Customizing the Table View.*


    11.  You’ll want to have subtitles in each cell. To do that, click the cell itself
    to select it and in the Attributes Inspector select Subtitle from the drop-down
    menu in Style. Also change the default blue color to gray in the Selection drop-down
    menu. Finally you want to build these cells from code, so you need to name them
    so you can locate them within the Storyboard file and load them into your code
    whenever you need them. To do that, name the Identifier in the Attributes Inspector
    to ScaleCell as shown in [Figure 4-23](#Chapter04.html#fig_4_23).


    ![images](images/9781430242727_Fig04-23.jpg)


    **Figure 4-23.** *Customizing the cells.*'
  trans: "\n### 步骤 2：准备故事板\n\n首先，通过给导航栏着色并将“信息”按钮改为“音阶”来准备主视图。接下来，你将添加一个不包含任何用户交互的\
    \ `UIImageView` 图像。然后，你将添加一个播放按钮的放置区域，同样也不会有任何用户交互。完成这些后，你将把这个放置区域标记为“视图 - 播放按钮区域”。至此，第一个视图就完成了。\n\
    \n第二个视图也需要准备——首先，为导航栏着色并添加标题。接下来，你将添加一个 `UITableView`，它使用动态单元格并采用分组样式。你还需要将它的数据源和代理设置为你的\
    \ `ViewController`。\n\n1.  如前所述，实用工具应用包含两个视图：主视图和翻转视图。用户通过点击主视图导航栏右侧的信息按钮进入翻转视图。让我们看看这个，并开始设置故事板。打开故事板，你确实会看到主视图和翻转视图，如图\
    \ 4-13 所示。你可以看到 segue 已经构建好了，一切就绪。请注意，在 iPad 上，翻转视图显示为弹出视图。\n\n   ![images](img/9781430242727_Fig04-13.jpg)\n\
    \n   **图 4-13.** *打开故事板文件，查看主视图和翻转视图。*\n\n2.  点击选中标题栏（导航控制器），然后使用属性检查器找到色调选择器。选择青色，如图\
    \ 4-14 所示。\n\n   ![images](img/9781430242727_Fig04-14.jpg)\n\n   **图 4-14.** *首先为标题栏着色。*\n\
    \n3.  现在你想要自定义信息按钮。首先点击信息按钮（点击两次，确保选中按钮本身，而非栏目标题），然后在属性检查器的“栏项目”部分找到“标题”框，将名称改为“音阶”。你希望它和导航栏颜色相同，所以继续将颜色改为青色，如图\
    \ 4-15 所示。请注意，你可能编程过其他应用，重置了“样式”和“标识符”的默认值；如果是这种情况，请确保你的选择和我们的图 4-15 一致。\n\n \
    \  ![images](img/9781430242727_Fig04-15.jpg)\n\n   **图 4-15.** *自定义信息按钮。*\n\n\
    4.  主屏幕将放置一张带有指法的吉他指板图像。这意味着你需要将一个“图像视图”拖到画布上，并让它自动调整大小，如图 4-16 所示。根据你的显示器分辨率，你可能需要先缩小视图才能正确操作。\n\
    \n   ![images](img/9781430242727_Fig04-16.jpg)\n\n   **图 4-16.** *拖入一个图像视图。*\n\
    \n5.  你需要在画布上找一个地方放置播放按钮。（你可以先偷瞄一眼，在图 4-59 和 4-60 中看看播放按钮的样子。）为此，在现有“图像视图”的左上角附近拖入另一个视图，如图\
    \ 4-17 所示。请注意，该视图在库的底部以浅灰色高亮显示。\n\n   ![images](img/9781430242727_Fig04-17.jpg)\n\
    \n   **图 4-17.** *为播放按钮创建一个空间。*\n\n6.  选中这个新的小视图后，在属性检查器中将颜色改为青色。接下来，转到身份检查器，将其标签设置为“视图\
    \ - 播放按钮区域”（这允许你在文档大纲中清晰识别这个新的小视图）。最后，保持新的小视图仍被选中（现在已是青色），转到尺寸检查器，将视图放置为距左 20\
    \ 像素、距顶 64 像素。然后，将视图的宽度设为 190 像素，高度设为 110 像素，如图 4-18 所示。\n\n   ![images](img/9781430242727_Fig04-18.jpg)\n\
    \n   **图 4-18.** *自定义“播放按钮区域”视图。*\n\n7.  要显示你放入 `Supporting Files` 文件夹中的默认图像，请在“主视图控制器场景”中点击\
    \ `UIImageView`，然后在属性检查器中，从下拉菜单中选择 `Default-Landscape-ipad.png`，如图 4-19 所示。\n\n\
    \   ![images](img/9781430242727_Fig04-19.jpg)\n\n   **图 4-19.** *将默认图像设置为主视图中的初始图像。*\n\
    \n8.  现在转到“翻转视图控制器场景”，选择导航栏标题（在翻转视图控制器场景的文档大纲中，点击“导航项 - 标题”这一行）。然后在属性检查器中将标题重命名为“音阶”，如图\
    \ 4-20 所示。\n\n   ![images](img/9781430242727_Fig04-20.jpg)\n\n   **图 4-20.** *自定义翻转视图控制器。*\n\
    \n9.  你可能希望主视图的导航栏和翻转视图的导航栏颜色相同，所以点击翻转视图的导航栏（在文档大纲中），然后在属性检查器的色调选择器中再次选择青色。现在你想将“完成”按钮改为青色，所以点击它并在属性检查器中选择青色。最后，考虑一下你希望翻转视图这里是什么样。你希望这是一个音阶列表，供用户选择（参考图\
    \ 4-58）。这意味着你需要拖入一个表格视图。拖入表格视图并让它自动调整大小后，你的翻转视图应该看起来像我们图 4-21 中的样子。\n\n   ![images](img/9781430242727_Fig04-21.jpg)\n\
    \n   **图 4-21.** *将导航栏和“完成”按钮设为青色，然后更改标题并引入一个表格视图。*\n\n10. 当你的表格视图在翻转视图中大小调整好后，保持它被选中，转到属性检查器，在“内容”下拉菜单的“内容结构”类型中选择“动态原型”。你这样做是因为你不仅想要表格中的标题，还想要副标题。动态原型让你可以调整单元格样式，而无需提供单元格内容。将原型单元格的数量设置为\
    \ 1（从 0 开始）。你还希望为你的表格选择分组样式，这样你就可以为表格中的音阶条目组设置一个头部（参考图 4-58），所以在“样式”下拉菜单中，选择“分组”。此时，你的表格视图应该看起来像我们的图\
    \ 4-22 中的样子。\n\n    ![images](img/9781430242727_Fig04-22.jpg)\n\n    **图 4-22.**\
    \ *自定义表格视图。*\n\n11. 你会希望每个单元格都有副标题。为此，点击单元格本身将其选中，然后在属性检查器的“样式”下拉菜单中选择“副标题”。同时在“选择”下拉菜单中，将默认的蓝色改为灰色。最后，你需要通过代码构建这些单元格，因此你需要给它们命名，以便你可以在故事板文件中定位它们，并在需要时将其加载到你的代码中。为此，在属性检查器中将标识符命名为\
    \ `ScaleCell`，如图 4-23 所示。\n\n    ![images](img/9781430242727_Fig04-23.jpg)\n\n\
    \    **图 4-23.** *自定义单元格。*\n"
- fmt: "### Step 3: Coding the Flipside View Controller\n\nKeeping it really simple,\
    \ first you set up the header and implementation files. Then you add `ImageView`\
    \ and `NavTitle` `IBOutlet`s.\n\n1.  Start by working on the code that will present\
    \ the scales to the user—which, as you've seen, are shown on the Flipside View.\
    \ Do that by going to your desktop, opening your `demoMonkey` file, and placing\
    \ it on the right-hand side of your screen. You’ll probably want to resize your\
    \ Xcode window to allow you to see your open `demoMonkey` file on the right-hand\
    \ side of your screen (Xcode on the left). Now in Xcode open your `FlipsideViewController`\
    \ implementation file (`.m`) as shown in [Figure 4-24](#Chapter04.html#fig_4_24)\
    \ by clicking it in the Project Navigator pane on the left-hand of the Xcode window.\n\
    \n    ![images](images/9781430242727_Fig04-24.jpg)\n\n    **Figure 4-24.** *Open\
    \ the FlipsideViewController implementation file.*\n\n2.  You’re going to want\
    \ to code using dual screens of code and Storyboard. To do that, click the Assistant\
    \ Editor as shown in [Figure 4-25](#Chapter04.html#fig_4_25). This places your\
    \ main file of interest on the left and a related file on the right of the editor\
    \ area in the Xcode window. (For example, when an implementation file is selected,\
    \ the implementation file is shown on the left and the header file associated\
    \ with the implementation file is shown on the right.)\n\n    ![images](images/9781430242727_Fig04-25.jpg)\n\
    \n    **Figure 4-25.** *Click the Assistant Editor.*\n\n3.  As mentioned, you’re\
    \ building your Flipside View Controller. You do that by dragging in from DemoMonkey\
    \ the “01 FlipView.h – add include” snippet, which contains the include `#import\
    \ \"Scale.h\"`, as this includes the header for the `Scale` class we built for\
    \ you. Next drag in the “02 FlipView.h – add protocol message signature” file\
    \ that adds a little more to the protocol than what you already have, along with\
    \ comments. Then bring in the “03 FlipView.h – add protocol adheres to,” which\
    \ indicates that the Flipside View adheres to Table View datasource and delegate\
    \ protocols. Finally drag in “04 FlipView.h – add scaleType property,” which remembers/indicates\
    \ which scale the user selected from the Table View. Now do the drags as shown\
    \ in the following code and then review [Figure 4-26](#Chapter04.html#fig_4_26)\
    \ to ensure that you ended up with the file content looking like the code in the\
    \ figure.\n\n    ![images](images/9781430242727_UFig04-01.jpg)\n\n    ![images](images/9781430242727_Fig04-26.jpg)\n\
    \n    **Figure 4-26.** *Drag the first four DemoMonkey snippets into your FlipsideViewController.h\
    \ file.*\n\n4.  You’re now going to go back to your Storyboard file and hook up\
    \ the Table View. So while still in the dual-screen Assistant mode, open up Storyboard\
    \ as shown in [Figure 4-27](#Chapter04.html#fig_4_27).\n\n    ![images](images/9781430242727_Fig04-27.jpg)\n\
    \n    **Figure 4-27.** *Reopen Storyboard.*\n\n5.  You want to add an `IBOutlet`\
    \ connecting the `TableView` to the `FlipsideViewController`. As shown on the\
    \ left-hand side of [Figure 4-28](#Chapter04.html#fig_4_28), start by locating\
    \ the Flipside View Controller Scene in the document outline. Next open the `FlipsideViewController`,\
    \ and then the view, and finally when you get to the Table View, click to select\
    \ it and then Control-drag from it over to the `FlipsideViewController.h` file\
    \ just under the second `@property` as shown in [Figure 4.28](#Chapter04.html#fig_4_28).\
    \ Once you’re there, release it.\n\n    ![images](images/9781430242727_Fig04-28.jpg)\n\
    \n    **Figure 4-28.** *Connect the Table View to the FlipsideViewController.*\n\
    \n6.  We’ll name it Table View (`tv`) Scale Table (`tvScaleTable`). Once you’ve\
    \ named it, click the Connect button as shown in [Figure 4-29](#Chapter04.html#fig_4_29).\
    \ By using the Control-drag technique, as you already know, Xcode has now created\
    \ the property declaration for you, along with the property synthesis and the\
    \ clearing of the property at object deallocation, the last two of which were\
    \ modifications it made in the class implementation file.\n\n    ![images](images/9781430242727_Fig04-29.jpg)\n\
    \n    **Figure 4-29.** *Name the IBOulet tvScaleTable.*\n\n7.  It’s a good habit\
    \ to make sure that when you Control-drag into code, you always check that the\
    \ connection was correctly made. This is easy to see if you look for it. Looking\
    \ at [Figure 4-30](#Chapter04.html#fig_4_30), you see two dots, one showing that\
    \ the `@property` has a connection with a Storyboard object and the second indicating\
    \ that the `IBAction` has a connection. Now, if you move your mouse pointer over\
    \ the dot next to the new `@property`, you’ll see the Table View highlight in\
    \ the Storyboard View, indicating that the connection has been established. Nice,\
    \ right? Now go hover over the `IBAction` dot to see what’s connected to the action!\
    \ (Hint: it should be the Done button.) You’ve completed adding code to the `FlipsideViewController.h`\
    \ (header file). Now move on to its implementation file.\n\n    ![images](images/9781430242727_Fig04-30.jpg)\n\
    \n    **Figure 4-30.** *Make sure the IBOutlet connected.*\n\n8.  The open implementation\
    \ file should look as shown in [Figure 4-31](#Chapter04.html#fig_4_31).\n\n  \
    \  ![images](images/9781430242727_Fig04-31.jpg)\n\n    **Figure 4-31.** *Open\
    \ the FlipsideViewController implementation file.*\n\n9.  The `FlipsideViewController`\
    \ has a method and an instance variable that do not need to be referenced publicly\
    \ (that is, from outside the class itself.) Therefore, we choose to declare them\
    \ as private at the top of this implementation file. We have a mutable array of\
    \ musical scales and we're going to have a property in which we record the scale\
    \ that’s been selected by the user. Drag the “05 FlipView.m – add private interface”\
    \ snippet from DemoMonkey into your implementation immediately to the right of\
    \ the `@interface FlipsideViewController ()` line of code. You should end up with\
    \ the code looking like [Figure 4-32](#Chapter04.html#fig_4_32).\n\n    ![images](images/9781430242727_Fig04-32.jpg)\n\
    \n    **Figure 4-32.** *Create the private interface.*\n\n    **NOTE:** Private\
    \ instance variables, methods, and properties are declared most often by placing\
    \ them in the unnamed category at the top of the implementation file. You'll notice\
    \ that the latest templates generated by Xcode already have this private interface\
    \ declared for you at the top of generated implementation files. This serves to\
    \ remind you where to put these items as you’re adding code to these generated\
    \ files.\n\n    You now want to synthesize the scale type that you created, so\
    \ drag in “06 FlipView.m – add scaleType synthesis” from DemoMonkey and place\
    \ it under the `@synthesize tvScaleTable = _tvScaleTable;` line as shown in the\
    \ following code:\n\n    ```\n    @implementation FlipsideViewController\n   \
    \ \n    @synthesize delegate = _delegate;\n    @synthesize tvScaleTable = _tvScaleTable;\n\
    \    @synthesize selectedScaleType;  \n    ```\n\n    ![images](images/U002.jpg)\
    \ **06FlipView.m – add scaleType synthesis**\n\n10.  Now that you’ve synthesized\
    \ the set/get methods for the scale type property, you want to load the scales\
    \ into memory the first time you load the app. Drag in “07 FlipView.m – add viewDidload\
    \ code” and place it directly under `[super viewDidLoad];` inside your `viewDidLoad`.\
    \ Here you can see that we have created eight `Scale` objects and added them to\
    \ our array, as shown in [Figure 4-33](#Chapter04.html#fig_4_33).\n\n    ![images](images/9781430242727_Fig04-33.jpg)\n\
    \n    **Figure 4-33.** *Eight scale objects to add to our array.*\n\n11.  When\
    \ the view first appears, you have a responsibility to show what scale was viewed\
    \ the last time. Or, if no scale has been selected yet—as in the first time that\
    \ the app is used—you’ll show the first scale. To do this, drag in the code in\
    \ “08 FlipView.m – add viewWillAppear code” and place it directly after the close\
    \ of the `viewDidLoad` method as shown in [Figure 4-34](#Chapter04.html#fig_4_34).\n\
    \n    ![images](images/9781430242727_Fig04-34.jpg)\n\n    **Figure 4-34.** *Add\
    \ the viewWillAppear method.*\n\n12.  In this step you’ll drag in four snippets\
    \ of code from DemoMonkey. First set a method that will set up the scale for type\
    \ by dragging in the “09 FlipView.m – add SelectedScaleforType method” just before\
    \ the `-(BOOL)shouldAutorotateToInterfaceOrientation` line. Next replace the code\
    \ inside the `- (BOOL)shouldAutorotateToInterfaceOrientation:`, which would normally\
