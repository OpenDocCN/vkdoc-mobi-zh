    # 使用 MapView 进行故事板设计


    在构建第二个故事板应用时，你将开发一个非常有趣的基于导航的应用程序，它使用了 `MapKit` 和 `CoreLocation` 框架。你将利用 `Flickr`
    作为数据源，检索在特定位置拍摄的照片，并将它们标注在 `MapView` 上。故事板的主题包括：为转场设置不同的过渡类型、使用 `MapView` 和静态
    `TableView` 构建故事板场景，以及从 `MapView` 的标注气泡初始化到其他视图的转场。我们还将演示一些实用的编程技巧，例如处理 `NSURL`
    和解析从远程服务器接收的基本 JavaScript 对象表示法（JSON）数据——随着 iOS 5 的发布，这些操作已变得简单得多。


    图 3-1 是最终应用的截图。左侧图片显示了地图放大到我们在科罗拉多州科罗拉多斯普林斯的位置。你会看到许多蓝色图钉，它们标示了在指定位置附近拍摄、已上传到与此应用关联的
    Flickr 账户，并现在显示在 `MapView` 上的图片。选择最南边的图钉，你会看到标题为“Great Sand Dunes”的图片（该信息已从 Flickr
    服务器解析而来）。点击蓝色 V 形展开按钮（根据应用故事板的设定），你会跳转到该图片的详细视图，并带有一个返回按钮让用户回到主视图。显示的图片是我们露营时在科罗拉多著名的沙丘附近拍摄的，其地理位置正好与地图上标示的一致。拍照时，我的
    iPhone 自动捕获了照片的 GPS 位置。之后我们将这张图片上传到了 Flickr 网站。


    ![images](img/9781430242727_Fig03-01.jpg)


    **图 3-1.** *这是本章应用的最终版本。*


    对于这个练习，你将重点关注故事板设计方面，因此，我们建议你暂时直接使用我们的 Flickr 账户来掌握故事板设计的要领。一旦你掌握了，设置你自己的 Flickr
    账户就会变得轻而易举。我们这么说是因为这个应用的学习曲线相当陡峭，你可能不希望因为关注使用了哪些图片、哪个 Flickr 账户等问题而分心。当你沉浸在这个非常有趣和酷炫的应用中时，已经足够让你全神贯注了。


    ## `flickrPhotoMap`：一个单视图应用


    我们将这个项目分为三个阶段：


    *   创建一个简单的 `MapView` 场景，建立数据连接，并在地图上显示带有地理标签的照片

    *   在故事板中创建第二个场景，并通过点击每个标注气泡的展开按钮使应用跳转到该场景

    *   创建到另一个场景的模态转场，让用户点击标注的缩略图后能为照片评分


    在每一步中，我们都会将第 2 章的基本故事板设计技巧应用到实际场景中，并演示 iOS 5 的故事板如何让处理像 `MapView` 和 `TableView`
    这样更复杂的 UI 元素变得不再令人生畏。


    ### 准备工作


    与所有章节一样，我们在此为你提供本项目所需的所有文件和代码。不过，我们不会展示具体去哪里获取图片，因为它们都存放在 [`http://bit.ly/sMRvAP`](http://bit.ly/sMRvAP)，如图
    3-2 所示。


    查看图 3-2，箭头 1 显示了本章视频中的一张图片，该图片链接到视频；箭头 2 和 3 指向 Xcode 项目以及本章所需所有文件（包括图片和 DemoMonkey
    文件）的下载图标。如果你需要更多帮助，请访问论坛 [`http://bit.ly/oLVwpY`](http://bit.ly/oLVwpY)。开始之前，请确保你已从
    [`http://bit.ly/sMRvAP`](http://bit.ly/sMRvAP) 下载了图片和 DemoMonkey 文件，并将它们在桌面上打开。


    ![images](img/9781430242727_Fig03-02.jpg)


    **图 3-2.** *本章的视频、代码和文件*


    在开始这三个步骤之前，请记住以下几点：


    *   在步骤 1 中，你将设置步骤 2 中将要实现的故事板功能背后的代码。

    *   步骤 2 将是故事板设计本身。

    *   步骤 3 将结合代码和故事板设计，对我们这个非常酷的应用进行微调。

