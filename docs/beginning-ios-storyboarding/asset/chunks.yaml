- fmt: "### Why Write This Book?\n\nThe reasons Dr. Lewis wrote this book are the\
    \ same reasons he originally decided to create a class for both engineering and\
    \ non-engineering majors: the challenge and the fun! According to Lewis, the iPhone\
    \ and iPad are “… some of the coolest, most powerful, and most technologically\
    \ advanced tools ever made—period!”\n\nHe is fascinated by the fact that, just\
    \ underneath the appealing touchscreen of high-resolution images and fun little\
    \ icons, the iPhone and iPad are programmed in `Objective-C`, an incredibly difficult\
    \ and advanced language. More and more, Lewis was approached by students and colleagues\
    \ who wanted to program apps for the iPhone and would ask his opinion on their\
    \ ideas. It seemed that with every new update of the iPhone, not to mention the\
    \ advent of the expanded interface of the iPad, the floodgates of interest in\
    \ programming apps were thrown open wider and wider. Wonderful and innovative\
    \ ideas just needed the proper channel to flow into the appropriate format and\
    \ then out to the world.\n\nGenerally speaking, however, the people who write\
    \ books about `Objective-C` write for people who know `Java`, `C#`, or `C++` at\
    \ an advanced level. So, because there seemed to be no help for the average person\
    \ who has no such knowledge but who has a great idea for an iPhone/iPad app, Dr.\
    \ Lewis decided to launch such a class. He realized it would be wise to use his\
    \ own notes for the first half of the course and then explore the best existing\
    \ resources he could find.\n\nAs he forged ahead with this plan, Lewis was most\
    \ impressed with *Beginning iPhone 3 Development: Exploring the iPhone SDK*. This\
    \ best-selling instructional book from Apress was written by Dave Mark and Jeff\
    \ Lamarche. Lewis concluded that their book would provide an excellent, high-level\
    \ target for his lessons, a “stepping-stones” approach to comprehensive and fluent\
    \ programming for all of Apple’s multitouch devices.\n\nAfter Dr. Lewis’s course\
    \ had been successfully presented, and during a subsequent conversation with a\
    \ representative from Apress, Lewis happened to mention that he’d only started\
    \ using that book about halfway through the semester, as he had to bring his non-engineering\
    \ students up to speed first. The editor suggested converting his notes and outlines\
    \ into a primer—an introductory book tuned to the less-technical programming crowd.\
    \ At that point, it was only a matter of time and details—like organizing and\
    \ revising Dr. Lewis’s popular instructional videos to make them available to\
    \ other non-engineers excited to program their own iPhone and/or iPad apps.\n\n\
    So, that’s the story of how a wacky professor came to write this book. We hope\
    \ you’re inspired to take this home and begin. Arm yourself with this knowledge\
    \ and begin now to change your life!\n\nBen Easton  \nAuthor, Teacher, Editor\n\
    \n### Stephen M. Moraco\n\nStephen has more than 30 years of experience in software\
    \ engineering. He’s developed projects writing in high-level languages such as\
    \ `PL/I`, `RPG`, `ANSI C`, `C++`, `C#`, `Objective-C`, and assembly languages\
    \ for more microprocessors than he can count on two hands. Prior to joining Hewlett-Packard/Agilent\
    \ Technologies 1989, he was an embedded-systems designer/developer. Stephen is\
    \ a past member of the Large-scale Logic Analyzer Team, building system recovery\
    \ media and writing triggering/capture drivers for multichannel custom data capture\
    \ `ASIC`s. As a software process engineer, he worked with medium-sized R&D teams\
    \ developing techniques to improve the rate of release and initial release quality\
    \ of software products. Stephen also designed and wrote an operating system for\
    \ optical drives produced by Hewlett-Packard.\n\nStephen’s profession is also\
    \ his hobby. He is a strong believer in constant learning and of constantly practicing\
    \ what he’s learning. All during his career Stephen developed on non-work-related\
    \ projects as a form of self-training. He enjoys designing and building his own\
    \ hardware/software systems for home control and general experimentation. Stephen\
    \ also developed firmware for key integration systems that fly aboard amateur\
    \ radio satellites and developed hardware and software for testing these systems.\n\
    \nStephen and his son Steve both enjoy building large LEGO models and working\
    \ with LEGO Mindstorms robotics. Son Steve is studying photography, and together\
    \ they’ve volunteered with Colorado First LEGO League for the past five years,\
    \ with Dad refereeing the Mindstorms Robotics tournaments for 9–14 year-olds throughout\
    \ Colorado while son Steve documents the excitement of the events though his photography.\n\
    \nIn the fall of 2009, father Stephen and son Steve took an `Objective-C`, iOS\
    \ programming class together at the University of Colorado at Colorado Springs.\
    \ Shortly thereafter Stephen started his company Iron Sheep Productions LLC, the\
    \ name under which he sells the hardware and software he’s developed. After a\
    \ successful 22-year career with Hewlett-Packard/Agilent Technologies, Stephen\
    \ is now a retired professional software engineer and … a successful iPhone and\
    \ iPad app programmer who sells his apps on the iTunes store.\n\n### Yulia McCarthy\n\
    \nYulia is a Senior iOS Developer at InspireSmart Solutions, Inc., a local Denver\
    \ firm specializing in innovative mobile business solutions. After graduating\
    \ from one of the best classic universities in Russia with a BS in Mathematics,\
    \ she went on to conquer the snowy peaks of Colorado, pursuing her dream of snowboarding\
    \ and adventure. Soon she decided to pursue a graduate career in Computer Science\
    \ at University of Colorado at Denver where, after taking an iPhone development\
    \ class with Dr. Lewis, she quickly converted into a Mac user and transferred\
    \ all her passion and incredible ability to program and solve complex problems\
    \ into developing iPhone and iPad apps, which has been her new passion ever since.\
    \ Her amazing talent soon attracted iOS recruiters at Apple, and now Yulia is\
    \ even more inspired and devoted to Cocoa Touch programming after her invaluable\
    \ experience as an iOS Apps and Frameworks intern at Apple’s headquarters in Cupertino,\
    \ California during the summer of 2011. She believes that life is all about constantly\
    \ reaching for new horizons and challenging yourself. As a programmer, this concept\
    \ is very close to Yulia’s heart.\n\nFrom Russia to UC Denver to Apple’s iOS Division\
    \ at Cupertino, Yulia believes that everything is possible if we follow our dreams.\n\
    \n## About the Contributing Author\n\n![image](images/ben_easton.jpg) **Ben Easton**\
    \ is a graduate of Washington & Lee University and has a BA in Philosophy. His\
    \ eclectic background includes music, banking, sailing, hang gliding, and retail.\
    \ Most of his work has involved education in one form or another. Ben taught school\
    \ for 17 years, mostly middle-school mathematics. More recently, his experience\
    \ as a software trainer and implementer reawakened his long-time affinity for\
    \ technical subjects. As a freelance writer, he has written several science fiction\
    \ stories and screenplays, as well as feature articles for magazines and newsletters.\
    \ Ben resides in Austin, Texas, and is currently working on his first novel.\n\
    \n## About the Technical Reviewer\n\n![image](images/matthew_knott.jpg) **Matthew\
    \ Knott** is a Learning Platform developer and SharePoint expert. He has been\
    \ programming since a young age and hasn’t stopped learning since. An experienced\
    \ `C` and `C#` developer, Matthew has recently started developing iOS apps to\
    \ mobilize the Learning Platform. He lives in Wales, United Kingdom, with his\
    \ wife and two children and likes to write on his blog (`mattknott.com`) from\
    \ time to time."
  raw: '##### Why Write This Book?


    The reasons Dr. Lewis wrote this book are the same reasons he originally decided
    to create a class for both engineering and non-engineering majors: the challenge
    and the fun! According to Lewis, the iPhone and iPad are “… some of the coolest,
    most powerful, and most technologically advanced tools ever made—period!”


    He is fascinated by the fact that, just underneath the appealing touchscreen of
    high-resolution images and fun little icons, the iPhone and iPad are programmed
    in Objective-C, an incredibly difficult and advanced language. More and more,
    Lewis was approached by students and colleagues who wanted to program apps for
    the iPhone and would ask his opinion on their ideas. It seemed that with every
    new update of the iPhone, not to mention the advent of the expanded interface
    of the iPad, the floodgates of interest in programming apps were thrown open wider
    and wider. Wonderful and innovative ideas just needed the proper channel to flow
    into the appropriate format and then out to the world.


    Generally speaking, however, the people who write books about Objective-C write
    for people who know Java, C#, or C++ at an advanced level. So, because there seemed
    to be no help for the average person who has no such knowledge but who has a great
    idea for an iPhone/iPad app, Dr. Lewis decided to launch such a class. He realized
    it would be wise to use his own notes for the first half of the course and then
    explore the best existing resources he could find.


    As he forged ahead with this plan, Lewis was most impressed with *Beginning iPhone
    3 Development: Exploring the iPhone SDK*. This best-selling instructional book
    from Apress was written by Dave Mark and Jeff Lamarche. Lewis concluded that their
    book would provide an excellent, high-level target for his lessons, a “stepping-stones”
    approach to comprehensive and fluent programming for all of Apple’s multitouch
    devices.


    After Dr. Lewis’s course had been successfully presented, and during a subsequent
    conversation with a representative from Apress, Lewis happened to mention that
    he’d only started using that book about halfway through the semester, as he had
    to bring his non-engineering students up to speed first. The editor suggested
    converting his notes and outlines into a primer—an introductory book tuned to
    the less-technical programming crowd. At that point, it was only a matter of time
    and details—like organizing and revising Dr. Lewis’s popular instructional videos
    to make them available to other non-engineers excited to program their own iPhone
    and/or iPad apps.


    So, that’s the story of how a wacky professor came to write this book. We hope
    you’re inspired to take this home and begin. Arm yourself with this knowledge
    and begin now to change your life!


    Ben Easton

    Author, Teacher, Editor


    ##### Stephen M. Moraco


    Stephen has more than 30 years of experience in software engineering. He’s developed
    projects writing in high-level languages such as PL/I, RPG, ANSI C, C++, C#, Objective-C,
    and assembly languages for more microprocessors than he can count on two hands.
    Prior to joining Hewlett-Packard/Agilent Technologies 1989, he was an embedded-systems
    designer/developer. Stephen is a past member of the Large-scale Logic Analyzer
    Team, building system recovery media and writing triggering/capture drivers for
    multichannel custom data capture ASICs. As a software process engineer, he worked
    with medium-sized R&D teams developing techniques to improve the rate of release
    and initial release quality of software products. Stephen also designed and wrote
    an operating system for optical drives produced by Hewlett-Packard.


    Stephen’s profession is also his hobby. He is a strong believer in constant learning
    and of constantly practicing what he’s learning. All during his career Stephen
    developed on non-work-related projects as a form of self-training. He enjoys designing
    and building his own hardware/software systems for home control and general experimentation.
    Stephen also developed firmware for key integration systems that fly aboard amateur
    radio satellites and developed hardware and software for testing these systems.


    Stephen and his son Steve both enjoy building large LEGO models and working with
    LEGO Mindstorms robotics. Son Steve is studying photography, and together they’ve
    volunteered with Colorado First LEGO League for the past five years, with Dad
    refereeing the Mindstorms Robotics tournaments for 9–14 year-olds throughout Colorado
    while son Steve documents the excitement of the events though his photography.


    In the fall of 2009, father Stephen and son Steve took an Objective-C, iOS programming
    class together at the University of Colorado at Colorado Springs. Shortly thereafter
    Stephen started his company Iron Sheep Productions LLC, the name under which he
    sells the hardware and software he’s developed. After a successful 22-year career
    with Hewlett-Packard/Agilent Technologies, Stephen is now a retired professional
    software engineer and … a successful iPhone and iPad app programmer who sells
    his apps on the iTunes store.


    ##### Yulia McCarthy


    Yulia is a Senior iOS Developer at InspireSmart Solutions, Inc., a local Denver
    firm specializing in innovative mobile business solutions. After graduating from
    one of the best classic universities in Russia with a BS in Mathematics, she went
    on to conquer the snowy peaks of Colorado, pursuing her dream of snowboarding
    and adventure. Soon she decided to pursue a graduate career in Computer Science
    at University of Colorado at Denver where, after taking an iPhone development
    class with Dr. Lewis, she quickly converted into a Mac user and transferred all
    her passion and incredible ability to program and solve complex problems into
    developing iPhone and iPad apps, which has been her new passion ever since. Her
    amazing talent soon attracted iOS recruiters at Apple, and now Yulia is even more
    inspired and devoted to Cocoa Touch programming after her invaluable experience
    as an iOS Apps and Frameworks intern at Apple’s headquarters in Cupertino, California
    during the summer of 2011\. She believes that life is all about constantly reaching
    for new horizons and challenging yourself. As a programmer, this concept is very
    close to Yulia’s heart.


    From Russia to UC Denver to Apple’s iOS Division at Cupertino, Yulia believes
    that everything is possible if we follow our dreams.


    ## About the Contributing Author


    ![image](images/ben_easton.jpg) **Ben Easton** is a graduate of Washington & Lee
    University and has a BA in Philosophy. His eclectic background includes music,
    banking, sailing, hang gliding, and retail. Most of his work has involved education
    in one form or another. Ben taught school for 17 years, mostly middle-school mathematics.
    More recently, his experience as a software trainer and implementer reawakened
    his long-time affinity for technical subjects. As a freelance writer, he has written
    several science fiction stories and screenplays, as well as feature articles for
    magazines and newsletters. Ben resides in Austin, Texas, and is currently working
    on his first novel.


    ## About the Technical Reviewer


    ![image](images/matthew_knott.jpg) **Matthew Knott** is a Learning Platform developer
    and SharePoint expert. He has been programming since a young age and hasn’t stopped
    learning since. An experienced C and C# developer, Matthew has recently started
    developing iOS apps to mobilize the Learning Platform. He lives in Wales, United
    Kingdom, with his wife and two children and likes to write on his blog (`mattknott.com`)
    from time to time.'
  trans: "\n### 为何撰写本书？\n\n刘易斯博士撰写本书的原因，与他最初决定为工程专业与非工程专业学生开设课程的原因如出一辙：挑战与乐趣并存！刘易斯认为，iPhone\
    \ 和 iPad 是“……有史以来最酷、最强大、技术最先进的工具之一——毫无疑问！”\n\n令他着迷的是，在炫丽的高清图像和有趣的小图标构成的触摸屏之下，iPhone\
    \ 和 iPad 是用`Objective-C`（一门极其复杂且高级的语言）进行编程的。越来越多的学生和同事找到刘易斯，想为 iPhone 开发应用程序，并向他请教其想法的可行性。似乎每一次\
    \ iPhone 系统更新（更不用说 iPad 扩展界面的问世），都使得人们对编程应用程序的兴趣之潮愈发汹涌。那些绝妙而富有创意的想法，只需找到合适的渠道，就能转化为恰当的格式，继而推向世界。\n\
    \n然而，一般而言，撰写`Objective-C`书籍的作者，其目标读者是那些精通`Java`、`C#`或`C++`的高级开发者。因此，对于那些没有此类知识背景、却对\
    \ iPhone/iPad 应用程序有绝妙想法、但似乎无从求助的普通人，刘易斯博士决定开设这样一门课程。他意识到，明智的做法是：课程前半部分使用自己的笔记，而后半部分则去探索他能找到的最佳现有资源。\n\
    \n在按此计划推进的过程中，刘易斯对《Beginning iPhone 3 Development: Exploring the iPhone SDK》一书印象最为深刻。这本由\
    \ Apress 出版的畅销教学书籍，作者是 Dave Mark 和 Jeff Lamarche。刘易斯断定，他们的书为他的课程提供了一个极佳的高级目标，是一种“踏脚石”式的方法，旨在帮助学习者全面、流畅地为苹果所有多点触控设备进行编程。\n\
    \n在刘易斯博士的课程成功授课后，一次与 Apress 代表的交谈中，他偶然提到自己直到学期中期才开始使用那本书，因为他必须首先让非工程专业的学生跟上进度。编辑建议将他的笔记和提纲改编成一本入门指南——一本面向技术水平较低的编程人群的入门书籍。此后，剩下的就只是时间和细节问题了——比如整理和修订刘易斯博士广受欢迎的教学视频，使其能够提供给其他那些渴望为自己编程\
    \ iPhone 和/或 iPad 应用程序的非工程专业学习者。\n\n于是，这便是这位古怪教授撰写本书的缘由。我们希望你能受到鼓舞，将此书带回家中，开始学习。用这些知识武装自己，现在就开始改变你的人生吧！\n\
    \n本·伊斯顿  \n作者、教师、编辑\n\n### 斯蒂芬·M·莫拉科\n\n斯蒂芬拥有超过 30 年的软件工程经验。他参与过使用高级语言（如`PL/I`、`RPG`、`ANSI\
    \ C`、`C++`、`C#`、`Objective-C`）以及他两只手都数不过来的多种微处理器的汇编语言进行开发的项目。在 1989 年加入惠普/安捷伦科技之前，他曾是一名嵌入式系统设计师/开发者。斯蒂芬曾是大型逻辑分析仪团队的成员，负责构建系统恢复介质，并为多通道定制数据采集`ASIC`编写触发/捕获驱动程序。作为一名软件过程工程师，他曾与中型研发团队合作，开发提高软件产品发布速度和初始发布质量的技术。斯蒂芬还设计并为惠普生产的光盘驱动器编写了一个操作系统。\n\
    \n斯蒂芬的职业同时也是他的爱好。他坚信要不断学习，并不断实践所学。在他的整个职业生涯中，他都将参与非工作相关的项目开发作为自我培训的一种方式。他喜欢为自己设计并构建家庭控制和通用实验用的软硬件系统。斯蒂芬还为搭载在业余无线电卫星上的关键集成系统开发了固件，并为测试这些系统开发了硬件和软件。\n\
    \n斯蒂芬和他的儿子史蒂夫都喜欢搭建大型乐高模型，并研究乐高 Mindstorms 机器人。儿子史蒂夫正在学习摄影，过去五年里，他们一起为科罗拉多州第一届乐高联盟做志愿者。史蒂芬爸爸在科罗拉多州各地为\
    \ 9 至 14 岁的孩子举办的 Mindstorms 机器人锦标赛中担任裁判，而儿子史蒂夫则通过摄影记录下这些赛事的激动瞬间。\n\n2009 年秋天，父亲斯蒂芬和儿子史蒂夫一起在科罗拉多大学斯普林斯分校参加了一门`Objective-C`和\
    \ iOS 编程课程。此后不久，斯蒂芬创办了自己的公司 Iron Sheep Productions LLC，并以该公司名义销售他开发的硬件和软件。在惠普/安捷伦科技度过了成功的\
    \ 22 年职业生涯后，斯蒂芬现已退休，是一名专业的软件工程师，同时也是一位成功的 iPhone 和 iPad 应用程序开发者，在 iTunes 商店销售他的应用。\n\
    \n### 尤莉娅·麦卡锡\n\n尤莉娅是 InspireSmart Solutions, Inc.公司的一名高级 iOS 开发者，这家公司位于丹佛本地，专注于创新的移动商业解决方案。她从俄罗斯一所顶尖的古典大学获得数学学士学位后，前往科罗拉多州征服白雪皑皑的山峰，追寻她滑雪和冒险的梦想。不久后，她决定在科罗拉多大学丹佛分校攻读计算机科学研究生学位。在那里，选修了刘易斯博士的\
    \ iPhone 开发课程后，她很快转投 Mac 用户阵营，并将自己所有的热情以及在编程和解决复杂问题方面的惊人能力，都倾注到了 iPhone 和 iPad\
    \ 应用的开发中，这自此成为了她新的激情所在。她惊人的天赋很快吸引了苹果公司的 iOS 招聘人员。在 2011 年夏季于加州库比蒂诺的苹果总部担任 iOS\
    \ 应用与框架实习生，这段宝贵的经历之后，尤莉娅对 Cocoa Touch 编程的热情更加高涨，也愈发投入。她相信，人生就是不断追求新的地平线并挑战自我。作为一名程序员，这一理念与尤莉娅的内心非常契合。\n\
    \n从俄罗斯到科罗拉多大学丹佛分校，再到苹果公司位于库比蒂诺的 iOS 部门，尤莉娅相信，只要我们追随梦想，一切皆有可能。\n\n## 关于合作作者\n\n\
    ![image](img/ben_easton.jpg) **本·伊斯顿** 毕业于华盛顿与李大学，拥有哲学学士学位。他多元的背景涵盖音乐、银行业、航海、悬挂式滑翔和零售业。他的大部分工作都以某种形式与教育相关。本曾在学校任教\
    \ 17 年，主要教授初中数学。最近，他作为软件培训师和实施顾问的经历，重新唤醒了他长久以来对技术领域的热情。作为一名自由撰稿人，他撰写过多篇科幻故事和剧本，以及为杂志和通讯供稿专题文章。本现居德克萨斯州奥斯汀，目前正在创作他的第一部小说。\n\
    \n## 关于技术审校\n\n![image](img/matthew_knott.jpg) **马修·诺特** 是一名学习平台开发者和 SharePoint\
    \ 专家。他从小就学习编程，并从未停止过学习。作为一名经验丰富的`C`和`C#`开发者，马修最近开始开发 iOS 应用，以实现学习平台的移动化。他与妻子和两个孩子住在英国威尔士，并时常在自己的博客（`mattknott.com`）上撰写文章。\n"
- fmt: '# Introduction


    In editions of Rory’s previous book *iPhone and iPad Apps for Absolute Beginners*
    (Apress), there were only two ways to teach the reader how to make an iOS app
    user interface. The first was to write everything in code, and the other was to
    use Interface Builder to compose a Windows-based app. But things have changed
    with Storyboarding … boy, have they!


    Storyboarding first appeared with `Xcode` version 4.2. When we first saw the scenes
    that made up an app, we thought Storyboard was fantastic. It was wonderful how
    Storyboard allowed us to navigate a path through out app in a visual way. Almost
    immediately Rory found freshmen students coming into his office, knee-deep in
    trouble using Storyboards. Meanwhile Xcode experts were pooh-poohing Storyboards.
    This book helps the novice understand the power of Storyboards and can help even
    experts in Xcode to unleash it.


    In this book you’ll discover how Xcode’s Interface Builder’s support for Storyboarding
    in iOS 5 makes designing your iOS apps so much easier. Storyboarding lets you
    graphically arrange all your views within a single design canvas, where you can
    then define the app’s logical flow and even assign transition animations. You’ll
    be able to learn how to use Storyboards to quickly go from concept to a fully
    functional iOS application.


    First, we go over the fundamental concepts of Storyboarding and the technology
    behind it. We then walk you through building seven complete projects that advance
    you through using various Storyboarding features, covering the most important
    aspects you need to know to successfully create your own apps from start to finish.
    By the end of this book, you’ll eventually see how to use Storyboarding with almost
    every application template offered by `Xcode` and you’ll learn which Storyboarding
    techniques are most suitable in certain scenarios.


    Working with Storyboarding involves much more than simply dragging and dropping
    View Controllers onto a canvas. In this book we show how to start from scratch
    and build complete apps using Storyboarding. Along the way we demonstrate using
    common iOS technologies as Map Views, Page View Controllers, Split View Controllers,
    Core Data, Table Views, and more—and we tell you how they all fit together with
    the new Storyboarding feature.


    ## What You’ll Learn


    In [Chapter 1](#Chapter01.html#ch1), we help you to get started in iOS development
    by walking you through Apple’s iOS Developer Program registration process and
    installing Xcode and other tools you’ll be using throughout this book.


    [Chapter 2](#Chapter02.html#ch2) talks about the basics of Storyboard structure
    and introduces the main Storyboarding concepts, including standard view transitions,
    passing information around, and creating custom transitions between the views.


    [Chapter 3](#Chapter03.html#ch3) explains how to create a map-driven app using
    Storyboarding and how to transition to other scenes from a Map View. It also demonstrates
    several important Storyboarding concepts, such as triggering manual segues and
    instantiating View Controllers designed in the Storyboard from within the code.
    Additionally, you’ll learn how to easily parse JSON data from a remote server
    (such as Flickr) using nothing but the new iOS 5 API.


    In [Chapter 4](#Chapter04.html#ch4), you’ll find out how to develop a fun utility
    app using Storyboarding targeted for the iPad. You’ll learn the foundation of
    many apps, which is how to place controls on the settings screen of a utility
    application and to return those settings to the Main View of the app via the Settings
    View delegate protocol. You’ll get a good grasp of the main Storyboarding specifics
    of the iPad environment, including Split View Controllers, Popover View, and iPad-specific
    segues. As a part of building this chapter’s project, you’ll also demonstrate
    how you can use a build-it media framework to enable your app to play audio files.


    In [Chapter 5](#Chapter05.html#ch5), we explore a very special Xcode template:
    the Page-Based Application template. Unlike other templates, it doesn’t let you
    opt out of using Storyboarding. In this chapter, you’ll learn the powerful tools
    that let you create Page View Controller transitions. We dig deep into the ins
    and outs of how to use the `UIPageViewController` to build an iPad brochure with
    beautiful, built-in page-curl animations and custom layout.


    [Chapters 6](#Chapter06.html#ch6)–[8](#Chapter08.html#ch8) bring to you a whole
    new world of Storyboarding features that dramatically change the way to program
    Table Views. We walk you through a more advanced Table Views-based project that
    utilizes Core Data in the back end. You’ll learn critical Storyboarding techniques
    such as Dynamic Cell Prototyping and designing Static Table Views. Most importantly,
    in this chapter we show you how to design your entire app workflow entirely in
    the Storyboard before doing any coding at all.


    In [Chapters 9](#Chapter09.html#ch9)–[11](#Chapter11.html#ch11) you’ll learn to
    develop a cool game app that stretches your knowledge of how segues can be used
    to provide much more complex navigation paths between screens.


    ## Who Should Read This Book?


    This book is for readers of Rory Lewis’s last book, *iPhone and iPad Apps for
    Absolute Beginners*, but it’s also for the beginner who’s never programmed but
    who can use the Storyboarding tool in Xcode to get up and running fast. This book
    is also for experienced iOS developers who want to learn Storyboarding to quickly
    cut down on app development and debugging time.


    For the beginner who has never programmed, *Beginning iOS Storyboarding with Xcode*
    shows how to extract those cool and innovative app ideas you have in your head
    into a working app ready for sale on the App Store. Even if you’re an intermediate
    or pro-level Objective-C developer, you can still learn the ins and outs of Xcode’s
    new Storyboarding feature—and find new ways of building and debugging your new
    Storyboarding app. Yup: This book is for you, too.


    Regardless of your skill level, we’re extremely happy to have you on board and
    hope you enjoy the ride. Let’s get to Storyboarding!


    # Chapter 1


    ## Preliminaries


    This introductory chapter will make sure that you have all the required tools
    and accessories to proceed fully and confidently. Three types of readers are likely
    reading this book. One group can skip to [Chapter 2](#Chapter02.html#ch2) immediately
    without reading [Chapter 1](#Chapter01.html#ch1). Another group may only need
    to read one small section in [Chapter 1](#Chapter01.html#ch1) and then move on
    to Chapter. The third group should read [Chapter 1](#Chapter01.html#ch1) very
    carefully before moving on.


    - *Group 1*: You own a Mac. You have experience coding with Xcode on your Mac.
    You have an up-to-date iOS SDK and an up-to-date version of Xcode. You also have
    experience with DemoMonkey, and it''s installed on your machine. If all this is
    true, meet me in [Chapter 2](#Chapter02.html#ch2).

    - *Group 2*: You own a Mac. You have experience coding with Xcode on your Mac.
    You have an up-to-date iOS SDK and an up-to-date version of Xcode. However, you
    don''t have experience with DemoMonkey or it''s not installed on your machine.
    Please check out the section “Installing DemoMonkey” in this chapter and then
    meet me in [Chapter 2](#Chapter02.html#ch2).

    - *Group 3*: You are a seeker of knowledge and have begun travelling down a wonderful
    road. We need to check your backpack and make sure you have all the tools you''ll
    need for your journey. So let''s start right here.'
