  trans: "\n#### 收尾与加载测试数据\n\n![images](img/9781430242727_Fig08-86.jpg)\n\n**图 8-86.**\
    \ *连接第一个表格视图。*\n\n1.  从表格视图按住 Control 键拖拽至 Dock 中的“作者视图控制器”图标，如图 8-86 所示。\n\n\
    \    ![images](img/9781430242727_Fig08-87.jpg)\n\n    **图 8-87.** *选择 dataSource。*\n\
    \n2.  在出现的连接对话框中，选择嵌套在“输出口”选项下的 `dataSource`，如图 8-87 所示。重复完全相同的过程，以连接表格视图的 `delegate`\
    \ 输出口。\n\n    ![images](img/9781430242727_Fig08-88.jpg)\n\n    **图 8-88.** *对“分类”重复相同操作。*\n\
    \n3.  现在，你需要针对“分类”重复你刚对“作者”所做的操作。将表格视图与“分类视图控制器”图标连接，如图 8-88 所示，并从选项对话框中选择 `dataSource`。再次重复，以类似方式连接\
    \ `delegate` 输出口。\n\n    ![images](img/9781430242727_Fig08-89.jpg)\n\n    **图\
    \ 8-89.** *用测试数据填充数据库。*\n\n4.  你几乎已经准备好运行应用了！尽管非必需，并且你本可以在数据库为空的情况下运行应用，但我们还是建议你添加最后一段代码。你已经为此应用准备了一个测试数据库，这样你无需自己创建大量记录即可测试其功能。让我们把它接入并看看应用是如何工作的。导航到\
    \ `AppDelegate.m`，并从 DemoMonkey 中拖入“-- AppDelegate.m Imports”代码片段。将其放在 `#import\
    \ \"AppDelegate.h\"` 这一行下方。然后找到以下方法：\n\n    ```\n    - (BOOL)application:(UIApplication\
    \ *)application\n    didFinishLaunchingWithOptions:(NSDictionary *)launchOptions\n\
    \    ```\n\n    从 DemoMonkey 中拖入最后一条“-- AppDelegate.m Data for Testing”代码片段。将其插入到方法实现的末尾，紧接在以下代码的下方：\n\
    \n    ```\n    [MagicalRecord setupCoreDataStackWithStoreNamed:@\"MyDatabase.sqlite\"\
    ];\n    ```\n\n    有关刚完成两次修改后 `AppDelegate.m` 的最终视图，请参见图 8-89。\n\n    ![images](img/9781430242727_Fig08-90.jpg)\n\
    \n    **图 8-90.** *运行它！*\n\n5.  运行它，并测试从“我的资料库”到“书籍”，再到从“我的资料库”到“作者”的路径，如图 8-90\
    \ 所示。\n\n    ![images](img/9781430242727_Fig08-91.jpg)\n\n    **图 8-91.** *三个视图正常工作。*\n\
    \n6.  在图 8-91 中，第一张图片展示了从“作者”视图（选择表格视图中的作者罗里·刘易斯后）进入的“书籍”视图。中间图片展示了从“分类”视图进入的“书籍”视图。第三张图片展示了删除书籍的操作。所有功能均正常工作。\n\
    \n    ![images](img/9781430242727_Fig08-92.jpg)\n\n    **图 8-92.** *添加功能。*\n\n\
    7.  添加“分类”和添加“作者”的功能也完美运行。\n\n现在你可以说，你已经详细体验了如何使用主从应用程序模板，让 iPhone 表现得像用导航应用程序模板编程一样——或者让\
    \ iPad 表现得像用拆分视图应用程序模板编程一样。这意义重大，因为现在你知道了，当你想处理列表、数据库和表格时，特别是当你希望让用户能够以层级方式深入浏览数据时，该如何使用主从应用程序模板。此外，你还获得了数据库组件的使用经验，并且如前所述，雇主很难找到对\
    \ SQL 有任何经验的 Xcode 开发者。\n\n干得漂亮！现在准备好迎接你的最后一个应用吧。\n\n## 第 9 章\n\n## 单视图 #3：wanderBoard\
    \ 第一部分\n\n在这个最终的故事板应用中，你将构建一个简单的迷宫漫游游戏，允许用户穿行于一个只有一个正确路径、其余都是死胡同的 3D 迷宫中。与上一个应用一样，这个应用也分为三章：第\
    \ 9 章 至 第 11 章。\n\n在这个应用中，你将包含一种方法，让用户通过图形方式在迷宫中导航，从而产生移动感。你将主要使用图形图像和故事板技术来开发这个应用，并尽可能少用代码。与第\
    \ 2 章 的 AlienView 和第 3 章 的 FlickrPhotoMap 类似，这也是一个使用故事板的单视图应用程序——但它要复杂得多。完成这个应用后，你将主要使用故事板设计出一个严肃的图形游戏。\n"
- fmt: '# wanderBoard: A Single-View App


    We’ve designed the visuals to look as if you’re in the maze looking left, right,
    or straight ahead. When you start the app you’re dropped at the opening of a maze,
    as shown in [Figure 9-0A](#Chapter09.html#fig_9_0A), and you tap apparent openings
    in the walls to navigate from each location to the next. Occasionally, you wander
    down a path that goes nowhere and see a red arrow indicating that you can back
    up. Tapping the arrow returns you to your previous position in the maze, and you
    can keep tapping arrows to back all the way out of the dead-end path until the
    arrows stop appearing. Then you can continue forward in another direction to keep
    exploring the maze as shown in [Figure 9-0B](#Chapter09.html#fig_9_0B).


    ![images](images/9781430242727_Fig09-0A.jpg)


    **Figure 9-0A.** *wanderBoard’s “Welcome to our Maze” start: The view changes
    appropriately as the app keeps track of where you are in the virtual 3D space.*


    ![images](images/9781430242727_Fig09-0B.jpg)


    **Figure 9-0B.** *Dead ends look like the left-hand image. “You’ve made it!” signals
    you’re out of the maze (right-hand image).*


    We chose the iPad Landscape layout because it gives more room for maze presentation
    and room for navigation controls. The View Controller behavior is data-driven,
    meaning we encode information within the onscreen objects to control behavior
    of the application in a couple of ways:


    *   The `object.tag` property indicates mid-section or the end of dead-end paths.

    *   Segue identifiers indicate directions of travel Left, Right, or Forward, so
    the segue animation can also reflect the direction taken. This results in very
    little code being added to the View Controller template.


    You’ll use a Single View Controller object behind all 18 Maze Views. It’s been
    given a special ability to determine whether and when to show a Reverse button
    (the red arrow) and it passes on segue direction by looking at the segue identifier
    and determining what to pass to the custom segue to affect its behavior. This
    View Controller uses a property of all View Controllers (`isMovingToParentViewController`)
    to determine when you’re entering a dead-end path or leaving the path. Upon entry,
    the intermediate Reverse buttons are hidden, so you can’t reverse until you get
    to the very end of a dead-end path. The ViewController code knows which buttons
    are intermediate by inspecting the `.tag` property of the Reverse buttons (which
    may or may not be present). The tag values are: `tag=1` means mid-location, and
    `tag=0` means end of path.


    We also introduce some professional-level architectural designs in this app:


    *   A custom segue class handles the maze movement transitions (`MovementSegue.m/.h`).

    *   The Storyboard file encloses the Single View Controller within a Navigation
    Controller so that entering new locations and backing up when needed are simply
    push and pop operations. We configure the Single View as the entry to the maze
    and end by adding 17 more View Controllers, each with custom segues between them.


    The `wanderBoard` app keeps track of how you move through a pseudo-geospatial
    area. In fact there are 18 scenes that the user can be in. Segues track where
    the user is by keeping track of which scene the user is in.


    **NOTE:** There appears to be a bug in Xcode v4.3.2 (4E2002 in our case) wherein
    a duplicate of a `UIButton` from within Storyboard appears to occasionally fail
    to copy the “Shows Touch on Highlight” property. You may have to set this even
    though the button was duplicated! We will address this when we get there.


    There will be a serious amount of repetition as you build the 18 scenes. And unfortunately,
    as noted in the nearby Note, there seems to be a bug with Xcode v4.3.2 that, as
    you will later see, prohibits us from completely automating the repetition of
    the 18 steps. With that in mind, we divide the project into four steps. First,
    you set up the files, adjust your project settings, and drag in your assets. Then
    you prep the Storyboard by adding your Navigation Controller, Image View, welcome
    label, and add the buttons. Next, you finish your View Controller header and implementation
    files. Finally, in `MainStoryboard`, you create the remaining 17 scenes (we give
    this step with and without assistance). This chapter covers the first two steps.
    The next two (the final one with assistance) are found in [Chapter 10](#Chapter10.html#ch10).
    The final step without assistance is in [Chapter 11](#Chapter11.html#ch11).


    ## Preliminaries


    As always, we supply you with all the files and code necessary for this chapter
    at [`http://bit.ly/sMRvAP`](http://bit.ly/sMRvAP). You can also download the final
    version of the app at [`http://bit.ly/Od8IUE`](http://bit.ly/Od8IUE). For an app
    of this size, you may want to download the `Assets` folder from [`http://bit.ly/Od9a5v`](http://bit.ly/Od9a5v)
    and take note of the following: when you download the `Assets.zip` file, you’ll
    see seven files. These are: `Default-Landscape@2x~ipad.png`, `Default-Landscape~ipad.png`,
    `icon72x72.png`, `icon144x144.png`, `MovementSegue.h`, `MovementSegue.m`, and
    `wanderBoard.demoMonkey`, together with the two folders `Images` and `Sources`.
    You’ll use the four `.png` files for icons and Landscape launch images. (We explain
    the `MovementSegue` files later, and of course you know what the `demoMonkey`
    file is all about.)


    The `Images` folder contains 19 images, 18 of which you’ll be using in the maze.
    Don’t worry, we explain in detail how you can generate your own 3D landscapes.
    The 19th image is the red arrow image that tells users they have to start backtracking
    (shown in the left-hand image in [Figure 9-0B](#Chapter09.html#fig_9_0B)). The
    `Sources` folder contains the OmniGraffle and Sweet Home 3D files we used to make
    the 3D images.


    **NOTE:** You may or may not want to find out how we created the 3D images used
    in the maze. If you’re not interested in creating 3D imagery, skip ahead to the
    section “Step 1: Set Up the Files, Project Settings, and Assets.” If you are interested,
    continue reading.


    ### How We Created Our 3D Landscape


    Because our focus is Storyboarding, we won’t spend too much time explaining how
    to create 3D images. (We have an extensive 28-minute video of Stephen explaining
    exactly how to download, create, and integrate the OmniGraffle files with the
    Sweet Home 3D files at [http://bit.ly/sMRvAP—see](http://bit.ly/sMRvAP&mdash;see)
    “Chapter 9_wanderBoard: How we created the 3D Maze for our Xcode” towards the
    bottom of the page.)


    We used a simple tool called OmniGraffle to design the floor plan and camera views
    that users see as they go through the maze ([Figure 9-0C](#Chapter09.html#fig_9_0C)).
    We then used the OmniGraffle images to guide our data entry into Sweet Home 3D
    to make the maze come to life with perspectives, walls and bricks, light sources,
    shadows, ornaments, desks, shelves, and other goodies we dragged into the file
    to create the scenes ([Figures 9-0D](#Chapter09.html#fig_9_0D) and [0E](#Chapter09.html#fig_9_0E)).
    We’re sure these two tools can be used in a much more sophisticated way. We’ve
    seen examples of what other people have done with these tools and they are absolutely
    amazing.


    ![images](images/9781430242727_Fig09-0C.jpg)


    **Figure 9-0C.** *OmniGraffle provided a very easy, intuitive way for us to design
    the maze.*


    ![images](images/9781430242727_Fig09-0D.jpg)


    **Figure 9-0D.** *In this image we superimposed the OmniGraffle and Sweet Home
    3D files on top of the Sweet Home 3D web site. We hand-entered the walls as shown
    in our drawing into Sweet Home 3D.*


    ![images](images/9781430242727_Fig09-0E.jpg)


    **Figure 9-0E.** *The exit of the maze in OmniGraffle depicted by the bird in
    the yellow circle at the bottom right of the image is replaced by a desk in Sweet
    Home 3D.*'
