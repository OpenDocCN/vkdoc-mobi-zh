    \ *复制场景 6 以创建场景 9，并将其放置在场景 7 的正下方。*\n\n- 场景 9：复制一个现有场景。\n  - 场景 9：将其放置在上一场景的上方或下方。\n\
    - 场景 9：重命名。\n- 场景 9：整理图形。\n- 场景 9：建立连接。\n\n1. 要创建右侧部分，请复制场景 6，并将其拖到场景 6 的右侧并稍微偏下的位置，如图\
