  trans: '

    # wanderBoard：单视图应用


    我们将视觉设计得仿佛你身处迷宫之中，可以向左看、向右看或向前看。当你启动应用时，会出现在迷宫入口处，如图 Figure 9-0A 所示，你点击墙壁上看似出口的开口，即可从一个位置导航到下一个位置。偶尔，你会走入一条死路，并看到一个红色箭头，表示你可以后退。点击箭头即可返回迷宫中的上一个位置，你可以继续点击箭头一直退出死路，直到箭头不再出现。然后，你可以朝另一个方向继续前进，探索迷宫，如图
    Figure 9-0B 所示。


    ![images](img/9781430242727_Fig09-0A.jpg)


    **图 9-0A.** *wanderBoard 的“欢迎来到我们的迷宫”起始画面：随着应用追踪你在虚拟 3D 空间中的位置，视图会相应改变。*


    ![images](img/9781430242727_Fig09-0B.jpg)


    **图 9-0B.** *死路看起来像左图所示。“你成功了！”表示你走出了迷宫（右图）。*


    我们选择了 iPad 横向布局，因为它能为迷宫展示和导航控件提供更多空间。视图控制器的行为是数据驱动的，这意味着我们通过屏幕对象中的编码信息，以如下两种方式控制应用的行为：


    *   `object.tag` 属性指示迷宫的中段位置或死路终点。

    *   Segue 标识符指示移动方向（左、右或向前），因此 segue 动画也能反映所采取的方向。这导致视图控制器模板中增加的代码非常少。


    你将在所有 18 个迷宫视图后面使用一个单视图控制器对象。它被赋予了一项特殊能力：判断是否以及何时显示“返回”按钮（红色箭头），并通过查看 segue 标识符来决定传递给自定义
    segue 的内容以影响其行为，从而传递导航方向。此视图控制器使用所有视图控制器的一个属性（`isMovingToParentViewController`）来判断你是进入死路还是离开死路。进入时，中间的“返回”按钮会被隐藏，因此你无法在到达死路终点之前返回。视图控制器代码通过检查“返回”按钮的
    `.tag` 属性（可能存在也可能不存在）来识别哪些按钮是中间的。标签值如下：`tag=1` 表示中间位置，`tag=0` 表示路径终点。


    我们还在本应用中引入了一些专业级架构设计：


    *   一个自定义 segue 类处理迷宫移动过渡（`MovementSegue.m/.h`）。

    *   Storyboard 文件将一个单视图控制器包裹在导航控制器内，这样进入新位置和需要时后退就只是简单的 push 和 pop 操作。我们将单视图配置为迷宫入口，并通过添加另外
    17 个视图控制器（每个之间都有自定义 segue）来完成设置。


    `wanderBoard` 应用会追踪你在一个伪地理空间中的移动方式。实际上，用户可能处于 18 个场景中。Segue 通过追踪用户当前所在的场景来记录用户的位置。


    **注意：** Xcode v4.3.2（在我们的版本中是 4E2002）似乎存在一个 bug：从 Storyboard 中复制 `UIButton` 时，有时会无法拷贝“Shows
    Touch on Highlight”属性。即使按钮是复制出来的，你也可能需要手动设置此属性！我们将在后续步骤中解决这个问题。


    构建 18 个场景时会有大量重复工作。不幸的是，正如旁边的注意中提到的，Xcode v4.3.2 似乎有一个 bug，后面你会看到，这个 bug 使我们无法完全自动化地重复这
    18 个步骤。有鉴于此，我们将项目分为四个步骤。首先，你设置文件、调整项目设置并拖入资源。然后，你通过添加导航控制器、图像视图、欢迎标签和按钮来准备 Storyboard。接下来，你完成视图控制器的头文件和实现文件。最后，在
    `MainStoryboard` 中，你创建剩余的 17 个场景（我们给出的是有辅助和无辅助两种方式）。本章涵盖前两个步骤。接下来的两个步骤（最后一个步骤有辅助）在第
    10 章中。最后一个无辅助步骤在第 11 章中。


    ## 准备工作


    像往常一样，我们在[`http://bit.ly/sMRvAP`](http://bit.ly/sMRvAP)为你提供了本章所需的所有文件和代码。你也可以在[`http://bit.ly/Od8IUE`](http://bit.ly/Od8IUE)下载应用的最终版本。对于这种规模的应用，你可能需要从[`http://bit.ly/Od9a5v`](http://bit.ly/Od9a5v)下载
    `Assets` 文件夹，并注意以下事项：下载 `Assets.zip` 文件后，你会看到七个文件。它们是：`Default-Landscape@2x~ipad.png`、`Default-Landscape~ipad.png`、`icon72x72.png`、`icon144x144.png`、`MovementSegue.h`、`MovementSegue.m`
    和 `wanderBoard.demoMonkey`，以及两个文件夹 `Images` 和 `Sources`。你将使用这四个 `.png` 文件作为图标和横向启动图像。（我们稍后会解释
    `MovementSegue` 文件，当然你知道 `demoMonkey` 文件是干什么用的。）


    `Images` 文件夹包含 19 张图片，其中 18 张将用于迷宫中。别担心，我们会详细解释如何生成你自己的 3D 场景。第 19 张图片是红色箭头图片，用于告诉用户需要开始回溯（如图
    9-0B 左图所示）。`Sources` 文件夹包含我们用来制作 3D 图像的 OmniGraffle 和 Sweet Home 3D 文件。


    **注意：** 你可能想了解，也可能不想了解我们是如何创建迷宫中使用的 3D 图像的。如果你对创建 3D 图像不感兴趣，请跳到“步骤 1：设置文件、项目设置和资源”一节。如果你感兴趣，请继续阅读。


    ### 我们如何创建 3D 场景


    因为我们的重点是 Storyboarding，所以不会花太多时间解释如何创建 3D 图像。（我们有一个长达 28 分钟的视频，斯蒂芬在其中详细解释了如何下载、创建并将
    OmniGraffle 文件与 Sweet Home 3D 文件集成在一起，视频地址为 [`bit.ly/sMRvAP——请参见`](http://bit.ly/sMRvAP)页面底部的“第
    9 章 _wanderBoard：我们如何为 Xcode 创建 3D 迷宫”。）


    我们使用了一个名为 OmniGraffle 的简单工具来设计用户穿越迷宫时看到的平面图和相机视图（图 9-0C）。然后我们使用 OmniGraffle 图像来指导我们在
    Sweet Home 3D 中输入数据，通过透视图、墙壁和砖块、光源、阴影、装饰物、书桌、书架以及我们拖入文件以创建场景的其他内容，让迷宫活灵活现（图 9-0D
    和 0E）。我们确信这两个工具可以以更复杂的方式使用。我们见过其他人使用这些工具的例子，效果绝对令人惊叹。


    ![images](img/9781430242727_Fig09-0C.jpg)


    **图 9-0C.** *OmniGraffle 为我们提供了一种非常简单、直观的方式来设计迷宫。*


    ![images](img/9781430242727_Fig09-0D.jpg)


    **图 9-0D.** *在此图中，我们将 OmniGraffle 和 Sweet Home 3D 文件叠加在 Sweet Home 3D 网站之上。我们按照绘图中的样式，在
    Sweet Home 3D 中手动输入了墙壁。*


    ![images](img/9781430242727_Fig09-0E.jpg)


    **图 9-0E.** *在 OmniGraffle 中，迷宫出口由图像右下角黄色圆圈内的鸟表示，而在 Sweet Home 3D 中，它被一张书桌替代。*

    '
- fmt: '### Step 1: Set Up the Files, Project Settings, and Assets


    As always, clear out your desktop. Then go to [http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter07_WanderBoard-Assets.zipdownload](http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter07_WanderBoard-Assets.zipdownload),
    download the file, and unzip the folder to your desktop.


    ![images](images/9781430242727_Fig09-01.jpg)


    **Figure 9-1.** *Start a Single View Application and save it as `wanderBoard`.*


    1. Open Xcode, press ![images](images/U003.jpg)+![images](images/U004.jpg)+`N`,
    and select a Single View Application. Name it `wanderBoard`. For Company Identifier,
    enter `com.apress` so if you have to compare or substitute some of our code with
    your code, it will all match. Select iPad because this app is an iPad-only app,
    you''ll use Automatic Reference Counting and you''ll of course use Storyboards
    as shown in [Figure 9-1](#Chapter09.html#fig_9_1). Save it to your desktop.


    ![images](images/9781430242727_Fig09-02.jpg)


    **Figure 9-2.** *Set up the app as Landscape-only.*


    2. You''re now going to set up our app and then drag in some of the assets from
    the `WanderBoard - Assets` folder you downloaded from the web. Make the app Landscape-only
    so you don''t have to create a bunch of extra images for the different orientations
    (you already have 18 as it is—bear this caution in mind, by the way, if you create
    a game of your own that has many images). Uncheck the Portrait and Upside Down
    options in the Supported Device Orientations section in your Summary as shown
    in [Figure 9-2](#Chapter09.html#fig_9_2). [Figure 9-2](#Chapter09.html#fig_9_2)
    shows two Landscape images in the Launch Images section at the bottom of the figure—you
    accomplish that by dragging in your two splash screens `Default-Landscape@2x~ipad.png`
    and `Default-Landscape~ipad.png` together from your folder into your root directory
    as shown in the top left-hand corner in [Figure 9-2](#Chapter09.html#fig_9_2).
    When you drop it in the directory, make sure to copy items into the project folder
    as always. What you will see is that as you drag them in, they automatically show
    up in the Launch Images because they''re set at the proper resolutions and have
    the correct names.


    ![images](images/9781430242727_Fig09-03.jpg)


    **Figure 9-3.** *Drag in the app icons.*


    3. The last step automatically found the correct resolutions for the Launch Images
    and did the work for you. For the icons, however, it''s a different story. Drag
    `icon72x72.png` and `icon144x144.png` individually from your folder into the App
    Icons slots, with the `icon144x144.png` icon going into the Retina Display slot
    as shown in [Figure 9-3](#Chapter09.html#fig_9_3). Later you''ll move these icons,
    currently stored by default in your project''s root folder, into the `Supporting
    Files` folder.


    ![images](images/9781430242727_Fig09-04.jpg)


    **Figure 9-4.** *Make sure to set the options correctly for the drag of your images
    folder.*


    4. Now select your `Images` folder inside your downloaded folder and drag it into
    your `Supporting Files` folder. When the Choose Options dialog box appears, create
    a copy and groups as shown in [Figure 9-4](#Chapter09.html#fig_9_4). Make sure
    your `Supporting Files` folder looks like ours. If not, you may have accidently
    placed them outside the `Supporting Files` folder.


    ![images](images/9781430242727_Fig09-05.jpg)


    **Figure 9-5.** *Bring in the segue code.*


    5. Now drag in the segue code `MovementSegue.h` and `MovementSegue.m` files we
    made for you into the `wanderBoard` folder as shown in [Figure 9-5](#Chapter09.html#fig_9_5).
    Remember that Xcode doesn''t know how to build the implementation file because
    this is an unexpected way for the framework to have been set up. So you need to
    set up a new compile source.


    **NOTE:** You added the class files differently than you''ve done in the past.
    Instead of selecting the group and then picking "Add files to {group}," you simply
    dragged the `.m` and `.h` files to the group from Finder. At the time of this
    writing, Xcode doesn''t add the instruction to compile the `.m` file when you
    use this drag-and-drop method of adding class files. That''s why you need the
    following step. If you used the "Add files..." method, you should find that the
    compilation of the `.m` file was already added for you.


    ![images](images/9781430242727_Fig09-06.jpg)


    **Figure 9-6.** *Setting up a new compile source*


    6. To create a new compile source for the segue class, click the Build Phases
    tab (visible in [Figure 9-2](#Chapter09.html#fig_9_2) if you can''t find it) and
    then select Compile Sources (3 items). You need to add a new compile source, which
    will be the segue. Click the `+` button under Sources (3 items) and select the
    `MovementSegue.m` file from the Finder dialog as shown in [Figure 9-6](#Chapter09.html#fig_9_6).


    ![images](images/9781430242727_Fig09-07.jpg)


    **Figure 9-7.** *Move the icon files into the Images folder.*


    7. You''re almost done dragging in the assets. You just need to do a little housecleaning
    now. Drag the two icon files `icon72x72.png` and `icon144x144.png` into your `Images`
    folder, located inside as shown in [Figure 9-7](#Chapter09.html#fig_9_7).


    ![images](images/9781430242727_Fig09-08.jpg)


    **Figure 9-8.** *Make sure you''re set up correctly by building the code.*


    8. You''ve now dragged all the assets into the project. Before moving on to the
    next section where you start programming the app, first make sure you''ve done
    everything correctly. Press ![images](images/U003.jpg)+`B` as shown in [Figure
    9-8](#Chapter09.html#fig_9_8) and make sure it builds correctly. Note that in
    [Figure 9-8](#Chapter09.html#fig_9_8) we''ve closed the `Supporting Files` folder.
    Yours may still be open.'
