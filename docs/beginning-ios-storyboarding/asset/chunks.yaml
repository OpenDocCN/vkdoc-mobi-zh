  trans: "\n#### 第 1 步：创建一个能跳转到次级视图的按钮\n\n![图片](img/9781430242727_Fig02-02.jpg)  \n\
    **图 2-2.** *启动一个单视图应用程序。*\n\n1. 打开 Xcode，点击 ![图片](img/U003.jpg)`+`![图片](img/U004.jpg)`+N`（文件\
    \ ![图片](img/U001.jpg) 新建 ![图片](img/U001.jpg) 项目），如图 2-2 所示。选择“单视图应用程序”并按回车键。将其命名为\
    \ `helloAlien`。我们使用了公司标识符 `com.apress`。你可以随意命名，但如果你觉得有可能需要随时将你的代码与我们的进行比较，请像我们一样将其命名为\
    \ `com.apress`，以减少混淆的可能性。我们不会使用类前缀。确保选择 iPhone，并勾选“使用 Storyboard”和“使用自动引用计数”。点击“下一步”，系统会提示你选择保存项目的位置。选择一个位置并点击“创建”。\n\
    \n![图片](img/9781430242727_Fig02-03.jpg)  \n**图 2-3.** *拖入图片。*\n\n2. 点击导航树根部的项目图标，导航到你的目标设置，并将两个名为\
    \ `iPhone 57.png` 和 `iPhone4 114.png` 的外星人图标文件拖入图标框（如图 2-3 所示）。`iPhone57` 图片放入常规图标框，`iPhone4\
    \ 114` 图片放入 Retina 图标框。同时将 `Alien.png` 和 `Alien Face.png` 图片文件拖入你的 `Supporting\
    \ Files` 文件夹。确保勾选“将项目复制到目标组的文件夹中”。\n\n![图片](img/9781430242727_Fig02-04.jpg)  \n\
    **图 2-4.** *同时将根文件夹中的图标拖入 Supporting Files 文件夹。*\n\n3. 一旦这些文件被复制到你的 `Supporting\
    \ Files` 文件夹中，再将图标图片文件拖入 `Supporting Files` 文件夹，如图 2-4 所示。在“支持的设备方向”部分，取消勾选“横向（左）”和“横向（右）”，因为此应用仅支持纵向方向。\n\
    \n![图片](img/9781430242727_Fig02-05.jpg)  \n**图 2-5.** *添加一个导航控制器。*\n\n4. 为了简化视图切换的处理，我们将让导航控制器来协调切换。通过左侧的“项目导航器”窗格，点击\
    \ `MainStoryboard.storyboard` 将其打开。在这个新的 Storyboard 文件中，你将定义应用中大多数（如果不是全部）视图（在\
    \ Storyboarding 中称为*场景*），并指定它们之间的切换。现在选择视图控制器（单击其下方的黑色条）。选中视图控制器后，点击“编辑器” ![图片](img/U001.jpg)\
    \ “嵌入” ![图片](img/U001.jpg) “导航控制器”，如图 2-5 所示。这将在现有视图控制器场景的左侧放置一个导航控制器，并用箭头连接两者，指示它们之间的关系。它还会为现有视图控制器添加一个导航栏。导航控制器会在导航栏上放置按钮，以指示如何以及何时可以返回到你离开的视图。当你稍后运行新创建的应用程序时，就会看到这一效果。\n\
    \n![图片](img/9781430242727_Fig02-06.jpg)  \n**图 2-6.** *将 `Alien.png` 分配给主视图。*\n\
    \n5. 你将把当前视图命名为 *View*。双击视图控制器导航栏的中央，输入名称 *View*。（你会在导航控制器创建的按钮中看到这个名称——运行此应用时，你需要从另一个视图返回到此视图。）现在，通过将一个图像视图拖到现有视图控制器场景的画布上，为你的视图添加一张图片。拖动图像视图到视图上时，让它自动调整为视图的完整大小，并居中。进入“属性检查器”，选择\
    \ `Alien.png` 作为要显示的图片。图片将出现，显示场景现在的样子。参见图 2-6。\n\n![图片](img/9781430242727_Fig02-07.jpg)\
    \  \n**图 2-7.** *添加一个按钮和视图控制器。*\n\n6. 接下来你需要在当前场景中添加一个按钮，并添加一个新的视图控制器场景，这将作为第二个“外星人”视图。首先，将一个圆角矩形按钮拖到画布上，双击它并将其命名为\
    \ *Find Alien*。拉伸按钮以使文本显示出来，然后将按钮居中放置在视图内。要添加新场景，请从对象库中拖动一个视图控制器到现有视图控制器的右侧。按住它一会儿，现有场景会向左移动。移动后，将新的视图控制器放置到已向左移动的主视图控制器场景的右侧。如图\
    \ 2-7 所示。\n\n![图片](img/9781430242727_Fig02-08.jpg)  \n**图 2-8.** *将按钮连接到新的视图控制器。*\n\
    \n7. 现在你需要执行 Storyboarding 最酷的功能之一——无缝连接从一个视图到下一个视图的转场。在这里，你要将刚创建的按钮连接起来，使其转场到已添加的新场景。在过去，这需要大量的代码。现在你只需\
    \ Control-拖拽。要将 Find Alien 按钮连接到新的视图控制器，请从 Find Alien 按钮 Control-拖拽到新的视图控制器，如图\
    \ 2-8 所示。\n\n![图片](img/9781430242727_Fig02-09.jpg)  \n**图 2-9.** *选择 Push。*\n\n\
    8. 一旦你 Control-拖拽到新的视图控制器上，松开鼠标，你会看到一个菜单，如图 2-9 所示，你可以在此设置 Storyboard 转场过渡样式。现在先使用\
    \ Push 样式。从 Storyboard 转场弹出菜单中选择 Push 过渡样式。\n\n![图片](img/9781430242727_Fig02-10.jpg)\
    \  \n**图 2-10.** *命名新的视图控制器并设置图片。*\n\n9. 将第二个视图控制器命名为 *Alien View*。与第一个视图的操作一样，双击新视图控制器的导航栏，将其命名为\
    \ *Alien View*。趁此机会，我们来创建外星人的图像视图。将一个图像视图拖到视图控制器的画布上。保持图像视图为选中状态，在属性检查器中，选择 `Alien\
    \ Face.png` 作为其图片。如图 2-10 所示。\n\n![图片](img/9781430242727_Fig02-11.jpg)  \n**图\
    \ 2-11.** *转场生效了！无需代码！*\n\n10. 信不信由你，你已经拥有一个可运行的应用程序了！点击 Xcode 左上角的“运行”按钮来运行它，如图\
    \ 2-11 所示，它完美运行。点击按钮，你会跳转到外星人视图。点击外星人视图导航栏左侧名为 View 的返回按钮，你就会回到主视图。完美！\n"
- fmt: "#### Step 2: Pass Information Back from a Secondary View (Alien View) to the\
    \ Main View\n\nIn this step we show the typical pattern for passing information\
    \ back from a Secondary View to the Main View. You do this most often by describing\
    \ the communication as a protocol, and with the Main View setting itself up as\
    \ the delegate of the Secondary View. Let’s see how this is done.\n\n![images](images/9781430242727_Fig02-12.jpg)\n\
    \n**Figure 2-12.** *Drag a label onto the Main View.*\n\n1. When passing back\
    \ results from the Alien View, you need some way to display the fact that the\
    \ results have been returned. You’re going to show text on the Main View that\
    \ changes based on the value returned. Add a label where you can indicate whether\
    \ the Alien exists. Drag a label onto the Main View under the button. Center it,\
    \ set the text color to white, and enter `Status will appear here` into the Text\
    \ box as shown in [Figure 2-12](#Chapter02.html#fig_2_12).\n\n![images](images/9781430242727_Fig02-13.jpg)\n\
    \n**Figure 2-13.** *Control-drag from the Label to `ViewController.h`.*\n\n2.\
    \ To be able to set the label text from our code, you need to have a connection\
    \ to this new label. Let’s create the Label’s `IBOutlet` (your connection). Open\
    \ the Assistant (its icon is in the white circle in [Figure 2-13](#Chapter02.html#fig_2_13))\
    \ and make sure it has correlated the `ViewController.h` file onto the right-hand\
    \ pane of the Split View. Control-drag from the label to the `ViewController.h`\
    \ file, dropping it directly under the `@interface ViewController` line as shown\
    \ in [Figure 2-13](#Chapter02.html#fig_2_13).\n\n![images](images/9781430242727_Fig02-14.jpg)\n\
    \n**Figure 2-14.** *Control-drag from the Label to `ViewController.h`.*\n\n3.\
    \ After you drop the connector into the `ViewController.h` file, a connection\
    \ dialog box appears. Keep this connection type as an Outlet and name it `lblFindStatus`.\
    \ (The `lbl` prefix reminds you that a label is connected to this outlet.) This\
    \ dialog is illustrated in [Figure 2-14](#Chapter02.html#fig_2_14).\n\n![images](images/9781430242727_Fig02-15.jpg)\n\
    \n**Figure 2-15.** *Add a new View Controller subclass.*\n\n4. You now need to\
    \ add custom code to the View Controller for your Alien View. Do this by creating\
    \ a new derived View Controller class. Select the `helloAlien` group in the Project\
    \ Navigator (so the new files are placed within this group). Press `+N` and select\
    \ the Objective-C class option as shown on the left in [Figure 2-15](#Chapter02.html#fig_2_15).\
    \ After clicking Next, name the new class `AlienViewController`, select the `UIViewController`\
    \ subclass option as shown on the right in [Figure 2-15](#Chapter02.html#fig_2_15),\
    \ and click Next. Don’t change any options—save them. Note that the two new files\
    \ (`AlienViewController.h` and `.m`) were placed below the `Supporting Files`\
    \ group. Drag them back above the group so they appear with the rest of the files.\n\
    \n![images](images/9781430242727_Fig02-16.jpg)\n\n**Figure 2-16.** *Assign the\
    \ new Detail View.*\n\n5. You need to assign the new `AlienViewController` class\
    \ you’ve just created to your Alien View. Go back into the Storyboard file and\
    \ select the Alien View—but you need to be precise here. In Document Outline Navigator,\
    \ go to the View Controller – Alien View Scene View Controller – Alien View and\
    \ click it to select it. With it properly selected, in the Utilities’ Identity\
    \ Inspector in the Custom Class area select the class `AlienViewController` as\
    \ illustrated in [Figure 2-16](#Chapter02.html#fig_2_16).\n\n**NOTE:** In the\
    \ remainder of this chapter you’re going to do things like Apple Developers do\
    \ onstage at conferences like WWDC. You’re going to drag snippets of code into\
    \ your project while we describe what you're doing. This is intended to save you\
    \ a lot of time (because you don’t have to type the code), yet still give you\
    \ an opportunity to study the code with each drag-and-drop. To get started, open\
    \ the DemoMonkey file you downloaded along with the images you’ve already placed\
    \ into this project. Locate the file named `Chapter2.demoMonkey` and continue\
    \ on the next page.\n\n![images](images/9781430242727_Fig02-17.jpg)\n\n**Figure\
    \ 2-17.** *Open DemoMonkey.*\n\n6. Open the `Chapter2.demoMonkey` file. The window\
    \ first appears very small as you see in [Figure 2-17](#Chapter02.html#fig_2_17).\
    \ Simply grab a corner and stretch the window so that the lines are visible.\n\
    \n![images](images/9781430242727_Fig02-18.jpg)\n\n**Figure 2-18.** *Expand the\
    \ DemoMonkey window and place it on the side.*\n\n7. In [Figure 2-18](#Chapter02.html#fig_2_18)\
    \ you can see that we’ve placed the DemoMonkey file to the right of the Xcode\
    \ window and stretched it so that the lines can be seen. Some of them may be off\
    \ the bottom of the screen, depending on your display resolution. If they are,\
    \ scroll the DemoMonkey window when you need to get to these off-screen lines.\n\
    \n![images](images/9781430242727_Fig02-19.jpg)\n\n**Figure 2-19.** *Name the segue\
    \ `ShowAlienView`.*\n\n8. In order for the code to know which segue is taking\
    \ place, give each segue a name. The code can then look for this name to know\
    \ which segue has occurred and take the actions appropriate to the named segue.\
    \ To name the segue, select it by clicking the circled icon in the middle of the\
    \ segue arrow and then choosing the Attributes Inspector in the Utility area as\
    \ shown in [Figure 2-19](#Chapter02.html#fig_2_19). Click in the Identifier text\
    \ box and then drag the “01 segueName” DemoMonkey snippet onto the Identifier\
    \ text box and drop it there. The name `ShowAlienView` appears in the Identifier\
    \ box.\n\n![images](images/9781430242727_Fig02-20.jpg)\n\n**Figure 2-20.** *Create\
    \ delegate protocol forward-declaration.*\n\n9. You’ll use a delegate protocol\
    \ to talk back to the Main View’s controller. So, let’s create it now:\n\n   1.\
    \ Open the `AlienViewController.h` file, insert a declaration of the name of your\
    \ new protocol by dragging the “02 AlienVC.h - protocol forward declaration” snippet\
    \ to just under the `#import <UIKit/UIKit.h>` line.\n   2. Add your delegate property\
    \ by dragging in the “03 AlienVC.h - delegate property” snippet to just under\
    \ the `@interface AlienViewController : UIViewController` line.\n   3. Create\
    \ a definition for your `AlienViewControllerDelegate` protocol. Do this by dragging\
    \ “04 AlienVC.h - protocol definition” and placing it after the `@end` line of\
    \ the interface (at the end of the file) as shown in [Figure 2-20](#Chapter02.html#fig_2_20).\n\
    \n![images](images/9781430242727_Fig02-21.jpg)\n\n**Figure 2-21.** *Synthesize\
    \ the AlienViewController Delegate property.*\n\n10. Quick recap: You’ve declared\
    \ the protocol and declared the delegate property that refers to an object which\
    \ must conform to this protocol. Now you need to synthesize the delegate property.\
    \ To do that, first open the `AlienViewController.m` file and simply drag out\
    \ from “05 AlienVC.m - synthesize delegate” and drop it under the `@implementation\
    \ AlienViewController` line as shown in [Figure 2-21](#Chapter02.html#fig_2_21).\n\
    \n**NOTE:** In Xcode, to *synthesize* means to generate code. In this case you’re\
    \ generating the setter and getter for your delegate property. The purpose of\
    \ the `@synthesize` directive is to save work for coders because we no longer\
    \ have to write the setter and getter methods for every property we create.\n\n\
    ![images](images/9781430242727_Fig02-22.jpg)\n\n**Figure 2-22.** *Make the Main\
    \ View Controller adhere to the `AlienViewControllerDelegate` protocol.*"
