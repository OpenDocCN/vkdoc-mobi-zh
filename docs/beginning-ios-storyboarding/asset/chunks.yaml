    \n- 场景 3：复制现有场景。\n  - 场景 3：重命名。\n  - 场景 3：整理图形。\n  - 场景 3：建立连接。\n    - 场景 3：按住\
    \ Control 键从按钮拖拽到新场景。\n    - 场景 3：编辑转场的属性。\n    - 场景 3：如果是死胡同，创建返回按钮。\n\n8. 现在我们要做点新操作。你或许还没意识到，但你已经走到了一个死胡同。每次遇到死胡同，你都需要重复这些步骤。本质上，你需要处理返回按钮的显示逻辑，这样用户到达死胡同时就能原路返回。你肯定还记得为了实现这一点所写的所有代码。处理方法如下：首先，如图图\
    \ 10-27 所示，将一个全新的圆角矩形按钮拖拽到画布上。\n\n![images](img/9781430242727_Fig10-28.jpg)\n\n\
    **图 10-28.** *场景 3：设置新的返回按钮的图像。*\n\n- 场景 3：复制现有场景。\n  - 场景 3：重命名。\n  - 场景 3：整理图形。\n\
    \  - 场景 3：建立连接。\n    - 场景 3：按住 Control 键从按钮拖拽到新场景。\n    - 场景 3：编辑转场的属性。\n    -\
    \ 场景 3：如果是死胡同，创建返回按钮。\n\n9. 这个返回按钮是一个自定义按钮，你手头有它的图片。在属性检查器中，将其类型设为 Custom，并在 Image\
    \ 中选择`back001.png`，如图图 10-28 所示。最后，将其尺寸设置为`295,680,389,68`。\n\n![images](img/9781430242727_Fig10-29.jpg)\n\
    \n**图 10-29.** *场景 3：为新的返回按钮设置标签字段值为 1。*\n\n- 场景 3：复制现有场景。\n  - 场景 3：重命名。\n  -\
    \ 场景 3：整理图形。\n  - 场景 3：建立连接。\n    - 场景 3：按住 Control 键从按钮拖拽到新场景。\n    - 场景 3：编辑转场的属性。\n\
    \    - 场景 3：如果是死胡同，创建返回按钮。\n    - 场景 3：编辑标签字段。\n    - 场景 3：为按钮添加标题。\n\n10. 你还需要利用第二种数据设置情况来配置返回按钮的标签。Storyboard\
    \ 中几乎所有对象都有一个标签字段。如图图 10-29 所示，在属性检查器的视图部分，将标签字段设置为`1`。这里你将使用红色返回按钮的标签，这样当进入死胡同时，它的标签字段值为`0`。如代码所示，当标签为`0`时按钮隐藏，当标签为`1`时按钮可见。这样一来，用户在进入死胡同时不会看到返回按钮，但到达死胡同后就能看到按钮（因为此时标签已设为`1`），从而可以导航返回。\n\
    \n你还需要为按钮添加标题。在身份检查器的身份部分选中该按钮，在标签框中输入 *Button - Reverse*。至此，你就可以继续处理场景 4 了。\n\
