- fmt: '### Designing the Top Level Views: Categories Scene


    ![images](images/9781430242727_Fig07-08.jpg)


    **Figure 7-8.** *Drag in a new View Controller.*


    1. According to the app’s flow, you want to display a list of available categories
    when the user taps the `Books` cell. Thus you’ll need an additional `View Controller`
    that will display the various categories for the books. Now you’ll move the current
    `Detail View Controller`, which you disconnected from the `Master View Controller`
    in the previous step, over to the right. You can just see the left-hand side of
    it on the right in [Figure 7-8](#Chapter07.html#fig_7_8). You’re doing this to
    make space for the new `View Controller` you’re going to drag in. Once you have
    enough space, drag in a new `View Controller` from your `Object Library` as shown
    in [Figure 7-8](#Chapter07.html#fig_7_8).


    ![images](images/9781430242727_Fig07-09.jpg)


    **Figure 7-9.** *Drag in a Table View.*


    2. Find a `Table View` in the `Object Library` and drag it onto your new `View
    Controller` as shown in [Figure 7-9](#Chapter07.html#fig_7_9).


    ![images](images/9781430242727_Fig07-10.jpg)


    **Figure 7-10.** *Drag in a Table View cell.*


    3. Now drag a `Table View cell` into your new `Table View` as shown in [Figure
    7-10](#Chapter07.html#fig_7_10).


    ![images](images/9781430242727_Fig07-11.jpg)


    **Figure 7-11.** *Change the Table View Cell Style to Basic.*


    4. For this `Table View` you’ll use `Dynamic Prototypes`. In fact, your `Table
    View` will display three different types of cells. One will be a basic style that
    will just display a label with a category name for each category you have in your
    database. There will be as many cells of this kind in the `Table View` as you
    have categories in your database. A second type of cell will display the “All
    books” label that when the user taps the cell shows all the books in the database
    regardless of category. This cell will be displayed at all times at the end of
    the list of categories. The third type of cell will be an “Add new” cell that
    gives the user an ability to add new category to the database. This cell will
    also be displayed all the time and is always the very last cell of the `Table
    View`. Modify your `Table View Prototype` content to achieve this. First, click
    the cell you’ve already added and change its style to `Basic` as shown in [Figure
    7-11](#Chapter07.html#fig_7_11).


    ![images](images/9781430242727_Fig07-12.jpg)


    **Figure 7-12.** *Change Cell’s Row Height.*


    5. Click the `Size Inspector` as shown in [Figure 7-12](#Chapter07.html#fig_7_12)
    and then change the `Row Height` from whatever your height is to `50` (we had
    manually adjusted ours to `54`, but change whatever height you have in your case
    to `50`).


    ![images](images/9781430242727_Fig07-13.jpg)


    **Figure 7-13.** *Change the Identifier and Accessory attributes.*


    6. Go back to the `Attributes Inspector` and change the `Identifier` to a name
    that will mean something in your code—let’s call it `Cell`, because this is the
    standard cell prototype you’ll be reusing to display your categories. Now click
    the `Accessory` option and from the drop-down menu select `Disclosure Indicator`
    as shown in [Figure 7-13](#Chapter07.html#fig_7_13). Double-click the `Title`
    label inside the `Table View Cell` prototype and rename it “Category name.” Then
    make sure the cell you just configured is selected (highlighted blue) and press
    ![images](images/U003.jpg) + `C` to copy it.


    ![images](images/9781430242727_Fig07-14.jpg)


    **Figure 7-14.** *Duplicate the first cell.*


    7. Press ![images](images/U003.jpg) + `V` and paste the duplicated “Category name”
    cell as shown in [Figure 7-14](#Chapter07.html#fig_7_14). Double-click the new
    cell you just pasted and change its name to “All books,” because this cell takes
    the user to a page containing all the Apress books. The regular “Category name”
    cell takes the user to books that belong to iOS, Android, or any other category
    you may choose. Once you’ve changed the name to “All books,” change its `Identifier`
    (which is still showing up as `Cell` from the paste you made of the first cell)
    to `AllCell`. Once your identifier shows `AllCell`, continue to the next step.


    **NOTE:** As you’ve now seen, the `Storyboard` makes it incredibly easy to copy
    cells and modify them to your needs as you create prototypes. It’s key that you
    wrap your head around this concept and use it as much as you can. We still see
    experienced coders coding this by hand because they just haven’t “gotten it”—how
    Storyboarding makes it so easy to create new prototypes.


    ![images](images/9781430242727_Fig07-15.jpg)


    **Figure 7-15.** *Create the “Add new” cell.*


    8. You need to make one more cell. This new cell will be the one that allows the
    user to add a new category that can be anything the user wants. Think about this
    for a second: you’re going to create a cell that in the future, without you or
    the user doing any coding, can be named Best Apress Books, Monkey, or anything
    else—amazing! Do what you did in [Figure 7-14](#Chapter07.html#fig_7_14): click
    either of the two cells you already have to select it and press ![images](images/U003.jpg)
    + `C` to copy it. Press ![images](images/U003.jpg) + `V` and rename the cell’s
    label to “Add new.” To make it look different, let’s have some fun and change
    a few properties. Set the `Accessory` type to `Detail Disclosure` as shown in
    [Figure 7-15](#Chapter07.html#fig_7_15). You’ll have to rename the `Identifier`
    to something unique, because this is a special cell, so change it to `AddCell`.


    ![images](images/9781430242727_Fig07-16.jpg)


    **Figure 7-16.** *Change the text color.*


    9. Change the color of the “Add new” text so that the user can easily see that
    “Add new” is different from the other options. Click once on the text “Add new”
    and change the color to blue as shown in [Figure 7-16](#Chapter07.html#fig_7_16).


    **NOTE:** Make sure you’re saving your work as you go along!


    ![images](images/9781430242727_Fig07-17.jpg)


    **Figure 7-17.** *Create a Push segue from the Books cell to Categories.*


    10. We are now ready to create a `Push` segue from the `Books` cell of the `Master
    View Controller` to the scene you’ve just set up. Because you have a `Static Table
    View` in the `Master`, you can initiate segues right from the cell itself. So
    click the `Books` cell in `Master` and Control-drag from it to the `View Controller`
    (see 1 in [Figure 7-17](#Chapter07.html#fig_7_17)) that will display our categories,
    release it, and choose `Push` (see 2 in [Figure 7-17](#Chapter07.html#fig_7_17))
    from the pop-up.


    ![images](images/9781430242727_Fig07-18.jpg)


    **Figure 7-18.** *Set the segue Identifier and change the destination view’s title.*


    11. Select the new segue and set its `Identifier` option in the `Attributes Inspector`
    to `ShowCategories` (see 1 in [Figure 7-18](#Chapter07.html#fig_7_18)). Also double-click
    the destination `View Controller`’s `Navigation Bar` and set its title to `Categories`
    (see 2 in [Figure 7-18](#Chapter07.html#fig_7_18)).


    **NOTE:** An *identifier* is a string that your application uses to distinguish
    one segue from another. You assign different identifiers to each segue so that
    the `prepareForSegue:sender:` method in your `Source View Controller` can tell
    them apart and prepare each segue appropriately. You always assign identifiers
    to your segues.


    ![images](images/9781430242727_Fig07-19.jpg)


    **Figure 7-19.** *Create an Edit Bar button item.*


    12. As mentioned, you’re going to let the user edit the `Table View` and remove
    cells. This means you need a button on the `Navigation Bar` to switch the `Table
    View` into editing mode. Drag a `Bar button item` from your `Object Library` onto
    the right side of your `Navigation Bar`. Double-click its default title `Item`
    and change the text to `Edit` as shown in [Figure 7-19](#Chapter07.html#fig_7_19).'
