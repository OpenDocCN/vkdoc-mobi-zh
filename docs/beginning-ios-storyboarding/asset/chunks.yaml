  trans: '

    ### 安装 Xcode


    让我们开始安装 Xcode。


    1.  访问 [`http://developer.apple.com/programs/ios/`](http://developer.apple.com/programs/ios/)
    或 [`http://bit.ly/rrrdjc`](http://bit.ly/rrrdjc)。您将看到一个与图 1-4 类似的页面。点击“立即注册”按钮。


    ![images](img/9781430242727_Fig01-04.jpg)


    **图 1-4.** *点击“立即注册”按钮。*


    2.  如图 图 1-5 所示，点击“继续”按钮。


    ![images](img/9781430242727_Fig01-05.jpg)


    **图 1-5.** *点击“继续”按钮。*


    3.  阅读本书的多数人会选择“我需要为……创建一个新账户”选项（图 1-6 中的箭头 1）。接着，点击“继续”按钮（箭头 2）。（如果您已有账户，说明您已经经历过此流程；请从“我目前拥有一个
    Apple ID……”选项开始操作，我将在步骤 6 等您，届时您将登录 iPhone/iPad 开发页面并下载 SDK。）


    ![images](img/9781430242727_Fig01-06.jpg)


    **图 1-6.** *点击“我需要为……创建一个新账户”选项以继续。*


    4.  您很可能以个人身份注册，因此请点击 图 1-7 中所示的“个人”链接。如果您是以公司身份注册，请点击右侧的“公司”选项并按照相应步骤操作；然后跳到步骤
    6。


    ![images](img/9781430242727_Fig01-07.jpg)


    **图 1-7.** *点击“个人”选项。*


    5.  如 图 1-8 所示输入您的所有信息，并支付标准计划 $99 的费用。这将提供您需要的所有工具、资源和技术支持。（如果您正在阅读本书，您其实不需要购买
    $299 的企业计划——它适用于商业内部应用程序。）付款后，请妥善保存您的 Apple ID 和用户名；然后接收并适当处理您的确认邮件。


    ![images](img/9781430242727_Fig01-08.jpg)


    **图 1-8.** *相应地输入您的所有信息。*


    **注意：** 在进入步骤 6 之前，请确保您已收到确认邮件并选择了一个密码，以完成成为一位真实的、已注册 Apple 开发者的最后一步。恭喜！


    6.  使用您的 Apple ID 登录主 iOS 开发页面 [`http://developer.apple.com`](http://developer.apple.com)。该页面有三种类型的
    Apple 开发人员图标。如 图 1-9 所示，点击 iOS 开发中心图标，该图标将引导您进入 iOS 开发软件下载页面。


    ![images](img/9781430242727_Fig01-09.jpg)


    **图 1-9.** *现在请按箭头所示点击 iOS 开发中心图标。稍后您可能还需要为 Mac 电脑或 Safari 浏览器编写应用程序。*


    7.  按照步骤 6 的描述使用您的用户名和密码登录后，您将看到一个类似于 图 1-10 的屏幕。iOS 开发中心包含构建 iOS 应用程序所需的所有工具。稍后您会在此处停留，但现在只需前往最新版
    iOS SDK 的开发者页面。点击箭头指示的图标。


    ![images](img/9781430242727_Fig01-10.jpg)


    **图 1-10.** *“下载”链接将带您到页面底部，如 图 1-11 所示。*


    **注意：** 在编写本书时，Xcode 4.3 和 iOS SDK 5 是最新的环境。当您阅读本书时，这些版本号很可能会更高。这不成问题——只需继续执行步骤
    8。如果万一遇到了我们未曾预料的情况，这些问题将在我们的论坛中为您讨论和解决，论坛地址是 [`www.rorylewis.com/ipad_forum/`](http://www.rorylewis.com/ipad_forum/)
    或 [`http://bit.ly/oLVwpY`](http://bit.ly/oLVwpY)。


    8.  现在我们希望您点击最新版本。本节中的图示展示了印刷时的最新版本。当您阅读本书时，这些*肯定*会有所不同。目前最新版本是适用于 Lion 的 Xcode
    4.3，因此请点击 图 1-11 中箭头指示的链接。


    ![images](img/9781430242727_Fig01-11.jpg)


    **图 1-11.** *点击“下载 Xcode 4”按钮将带您进入 Xcode 4 开发者页面。*


    9.  点击“在 Mac App Store 中查看”按钮。请记住，如果版本高于 图 1-12 所示，界面可能略有不同，但我们相信您能应对。


    ![images](img/9781430242727_Fig01-12.jpg)


    **图 1-12.** *点击“在 Mac App Store 中查看”链接。*


    10. 如 图 1-13 所示，点击“安装”按钮。在下载过程中，“安装”按钮会变为“正在安装”。当 Xcode 和 iOS SDK 下载完成后，它会变为“已安装”。`Xcode`
    的 iOS SDK 中包含 Apple 的集成开发环境 (IDE)。这是一个编程平台，包含一套工具、子应用程序和样板代码，使程序员能更轻松地完成工作。


    ![images](img/9781430242727_Fig01-13.jpg)


    **图 1-13.** *点击“安装”，然后等待下载完成。*


    安装好 `Xcode` 和 iPhone/iPad 模拟器工具并确保它们易于访问后，您就差不多可以开始行动了。


    #### 关于 DemoMonkey


    在加载最后一个名为 `DemoMonkey` 的工具之前，让我们先退一步，看看我们的目标。


    多年来，我们发现教授学生代码最有效的方法是采用我们所谓的子系统方法，即教您哪些代码片段或部分适用在哪些情境下。在本书中，我们将使用一个很酷的程序，如果您看过最近的
    WWDC，可能见过它：它叫做 `DemoMonkey`。本质上，您从 `DemoMonkey` 面板中拖出一个说明需要完成内容的标题，然后将其放入 Xcode
    文件中相应部分的代码中，它就会神奇地转换为 `DemoMonkey` 文件的作者编写的代码。在您下载并编译创建 `DemoMonkey` 的 Xcode 项目之前，您需要确保
    `Xcode` 能正常工作。因此，在下一节中，您将首先运行一个简单的应用程序，以确保 Xcode 环境一切正常。

    '
- fmt: "# Getting Ready for Your First iPhone/iPad Project\n\nBefore starting on your\
    \ first Storyboarding app, you need to make sure that everything runs. Assuming\
    \ you’ve already downloaded and installed `Xcode`, open up `Xcode`.\n\n1. Press\
    \ `Command + Shift + N` (![images](images/U003.jpg)![images](images/U004.jpg)N),\
    \ simultaneously. This will open a new window that showcases the different types\
    \ of project templates in the land of `Xcode`.\n2. [Figure 1-14](#Chapter01.html#fig_1_14)\
    \ displays the project templates: Master-Detail Application, OpenGL Game, Page-Based\
    \ Application, Single View Application, Tabbed Application, Utility Application,\
    \ and Empty Application. Click Single View Application as shown in [Figure 1-14](#Chapter01.html#fig_1_14)\
    \ and then click Next.\n\n   ![images](images/9781430242727_Fig01-14.jpg)\n\n\
    \   **Figure 1-14.** *Select the Single View Application and then click Next.*\n\
    \n3. On your screen you should see something very similar to [Figure 1-15](#Chapter01.html#fig_1_15).\
    \ First call your project `test` as indicated by arrow 1. Choose iPhone (arrow\
    \ 2) and then click Next (arrow 3).\n\n   ![images](images/9781430242727_Fig01-15.jpg)\n\
    \n   **Figure 1-15.** *Let’s go for a test drive.*\n\n   **NOTE:** For this test\
    \ we are not using Storyboarding; we just want to see that `Xcode` builds a simple\
    \ app. So keep everything unchecked—yes, including “Use Storyboard” for now (as\
    \ shown in [Figure 1-15](#Chapter01.html#fig_1_15)).\n\n4. [Figure 1-16](#Chapter01.html#fig_1_16)\
    \ shows the initial view of `Xcode`’s IDE. Click the `ViewController.h` file as\
    \ indicated by the arrow.\n\n   ![images](images/9781430242727_Fig01-16.jpg)\n\
    \n   **Figure 1-16.** *The initial Integrated Development Environment (IDE) screen.*\n\
    \n5. This will bring up the screen shown in [Figure 1-17](#Chapter01.html#fig_1_17)\
    \ where we want you to run your blank app by clicking on the “go” button, as indicated\
    \ by the arrow. Oh yeah!\n\n   ![images](images/9781430242727_Fig01-17.jpg)\n\n\
    \   **Figure 1-17.** *Run it!*\n\n6. The iPhone Simulator pops up, as illustrated\
    \ in [Figure 1-18](#Chapter01.html#fig_1_18).\n\n   ![images](images/9781430242727_Fig01-18.jpg)\n\
    \n   **Figure 1-18.** *Your first test drive.*\n\nCongratulations! You've loaded\
    \ `Xcode` and you've taken it for a test drive. Now let's get DemoMonkey running\
    \ and start Storyboarding.\n\n## Installing DemoMonkey\n\n`DemoMonkey` is an optional\
    \ tool intended to help you follow along with the book projects. You only need\
    \ it if you choose to use our `.demoMonkey` files for each chapter, which will\
    \ allow you to drag and drop ready-to-use code snippets into the `Xcode` for most\
    \ of the steps. Otherwise, you can still type the code yourself, and if you choose\
    \ not to use `DemoMonkey` for this book, you can skip the rest of this chapter.\n\
    \n`DemoMonkey` will make life easier for you and let you focus more on the code\
    \ you are using—but you will still be challenged in this book, and that's simply\
    \ part of our pedagogy. The issue is really how to handle things when you get\
    \ challenged.\n\n**NOTE:** When you do find yourself in one of those tough spots,\
    \ you can always reread the section, rewind the video examples, or—most importantly—go\
    \ visit the forum where there are often many people, including us, online and\
    \ ready to help you immediately. We may refer you to somebody else's solution\
    \ or we may help you directly. So go to the forum, say “hello” to the crowd, and\
    \ become immersed by first seeking help from others and then going back to help\
    \ others at the forum, located at [`www.rorylewis.com/ipad_forum/`](http://www.rorylewis.com/ipad_forum/)\
    \ or [`http://bit.ly/oLVwpY`](http://bit.ly/oLVwpY).\n\nWith your `Xcode` running\
    \ and building apps, you can now install `DemoMonkey`.\n\n1. Apple provides `DemoMonkey`\
    \ as an OS X sample code project that is available for download to anyone. Go\
    \ to [`http://developer.apple.com/library/mac/#samplecode/DemoMonkey/Introduction/Intro.html`](http://developer.apple.com/library/mac/#samplecode/DemoMonkey/Introduction/Intro.html)\
    \ or [`http://bit.ly/v3BuKI`](http://bit.ly/v3BuKI), as shown in [Figure 1-19](#Chapter01.html#fig_1_19).\
    \ Click Download Sample Code as indicated by the arrow and save the zip file into\
    \ a desired location on your machine.\n\n   ![images](images/9781430242727_Fig01-19.jpg)\n\
    \n   **Figure 1-19.** *Download Sample Code*\n\n2. Unzip the zip file by double-clicking\
    \ it, open the folder, and then double click on the `DemoMonkey.xcodeproj` file,\
    \ as indicated by the arrow in [Figure 1-20](#Chapter01.html#fig_1_20). Once the\
    \ Xcode project is open, press `Command + B` (![images](images/U003.jpg)B) simultaneously\
    \ to compile the project.\n\n   ![images](images/9781430242727_Fig01-20.jpg)\n\
    \n   **Figure 1-20.** *Open the `DemoMonkey.xcodeproj` file inside your `DemoMonkey`\
    \ folder.*\n\n3. After the “Build Succeeded” message shows up, expand the Project\
    \ Navigator, right-click on the `DemoMonkey.app` icon, and then choose Show in\
    \ Finder from the context menu, as shown in [Figure 1-21](#Chapter01.html#fig_1_21).\n\
    \n   ![images](images/9781430242727_Fig01-21.jpg)\n\n   **Figure 1-21.** *Expand\
    \ the Project Navigator and choose Show in Finder from the context menu.*\n\n\
    4. Lastly, once Finder opens the folder containing the application you just built,\
    \ drag the `DemoMonkey.app` to your `Applications` folder, as shown in [Figure\
    \ 1-22](#Chapter01.html#fig_1_22).\n\n   ![images](images/9781430242727_Fig01-22.jpg)\n\
    \n   **Figure 1-22.** *Drag the `DemoMonkey.app` to your `Applications` folder.*\n\
    \n**NOTE:** If for some reason you were unable to reproduce the steps in this\
    \ section, you can download a compiled `DemoMonkey.app` from our site using this\
    \ link: [`www.rorylewis.com/docs/02_iPad_iPhone/Storyboarding%20Book/Storyboarding%20Video%20Tutorials.html`](http://www.rorylewis.com/docs/02_iPad_iPhone/Storyboarding%20Book/Storyboarding%20Video%20Tutorials.html).\
    \ Then simply drag it to your `Applications` folder.\n\nYou're ready to roll now!\n\
    \n# Chapter 2"
