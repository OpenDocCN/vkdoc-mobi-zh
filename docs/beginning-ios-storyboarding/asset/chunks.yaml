  trans: "\n#### 场景 7\n\n![images](img/9781430242727_Fig10-46.jpg)\n\n**图 10-46.**\
    \ *复制场景 3 以创建场景 7。*\n\n- 场景 7：复制一个现有的中间死路场景。\n  - 场景 7：将其放置在前一个场景的上方或下方。\n- 场景\
    \ 7：**重命名**。\n  - 场景 7：更改标题。\n  - 场景 7：更改图片。\n- 场景 7：整理图形元素。\n- 场景 7：建立连接。\n\n\
    1. 左转通向另一条死路。下一个场景将是一个中间死路场景，意为通往死路的途中。你需要复制现有的唯一一个中间死路场景，即视图控制器 – 场景 3。选中场景 3，按\
    \ `![images](img/U003.jpg)+D` 组合键复制它，如图 10-46 所示。将其放置在场景 6 的右上方。将标题更改为 *场景 7*。\n\
    \n   ![images](img/9781430242727_Fig10-47.jpg)\n\n   **图 10-47.** *将场景 6 的“按钮\
    \ – 左”连接到场景 7。*\n\n   - 场景 7：复制现有场景。\n   - 场景 7：重命名。\n   - 场景 7：整理图形元素。\n   -\
    \ 场景 7：建立连接。\n     - 场景 7：从按钮按住 Control 键拖拽到新场景。\n     - 场景 7：编辑转场的属性。\n\n2. 你需要将场景\
    \ 6 的左按钮连接到这个新视图。这次我们用一种略有不同的方式来做，只是为了好玩。从场景 6 的左按钮按住 Control 键拖拽到视图控制器 – 场景 7\
    \ 的场景停靠区，如图 10-47 所示。选中创建的转场，在属性检查器中将转场类命名为 `MovementSegue`，保持样式为“自定义”，并将标识符更改为\
    \ *Left*。\n\n   ![images](img/9781430242727_Fig10-48.jpg)\n\n   **图 10-48.** *场景\
    \ 7：更改图片。*\n\n   - 场景 7：复制现有场景。\n     - 场景 7：将其放置在前一个场景的上方或下方。\n   - 场景 7：**重命名**。\n\
    \     - 场景 7：更改标题。\n     - 场景 7：更改图片。\n   - 场景 7：整理图形元素。\n   - 场景 7：建立连接。\n\n\
    3. 选中图片，在属性检查器中，将 Image 更改为 `wanderBoard-cam07.png`，如图 10-48 所示。\n\n   ![images](img/9781430242727_Fig10-49.jpg)\n\
    \n   **图 10-49.** *场景 7：编辑“按钮 – 右”。*\n\n   - 场景 7：复制现有场景。\n   - 场景 7：重命名。\n  \
    \ - 场景 7：整理图形元素。\n     - 场景 7：隐藏不适用元素。\n     - 场景 7：编辑按钮。\n       - 场景 7：使按钮可见。\n\
    \     - 场景 7：用新图片替换旧图片（已完成）。\n     - 场景 7：配置新按钮。\n       - 场景 7：复制按钮。\n      \
    \ - 场景 7：重置按钮参数。\n         - 场景 7：按钮 – 右。\n       - 场景 7：再次设为透明。\n       - 场景\
    \ 7：修正错误。\n   - 场景 7：建立连接。\n     - 场景 7：从按钮按住 Control 键拖拽到新场景。\n     - 场景 7：编辑转场的属性。\n\
    \     - 场景 7：如果是死路，创建返回按钮。\n       - 场景 7：编辑“标签”字段。\n\n4. 选中场景 7 中的右按钮并使其可见。然后选中左按钮，确保它被隐藏。当然，返回按钮将会显示出来。回到右按钮，选中它，并将其设置为\
    \ 510,65,155,620，如图 10-49 所示。通过将其设置为“触摸时显示高亮”并使其透明来修正这个错误。同时不要忘记点击返回按钮，并记住这是一个中间返回按钮，将其\
    \ `Tag` 设置为 1。接下来该继续处理场景 8 了。\n\n#### 场景 8\n\n![images](img/9781430242727_Fig10-50.jpg)\n\
    \n**图 10-50.** *复制场景 4 以创建场景 8。*\n\n- 场景 8：复制一个现有的死路场景。\n  - 场景 8：将其放置在前一个场景的上方或下方。\n\
    - 场景 8：重命名。\n- 场景 8：整理图形元素。\n- 场景 8：建立连接。\n\n1. 这次你需要复制一个死路场景。选中视图控制器 – 场景 4 的场景停靠区，按\
    \ `![images](img/U003.jpg)+D` 组合键复制它，如图 10-50 所示。将其放置在场景 7 的右侧。\n\n   ![images](img/9781430242727_Fig10-51.jpg)\n\
    \n   **图 10-51.** *场景 8：更改标题。*\n\n   - 场景 8：复制现有的死路场景。\n   - 场景 8：**重命名**。\n \
    \    - 场景 8：更改标题。\n   - 场景 8：整理图形元素。\n   - 场景 8：建立连接。\n\n2. 将标题更改为 *场景 8*，如图 10-51\
    \ 所示。\n\n   ![images](img/9781430242727_Fig10-52.jpg)\n\n   **图 10-52.** *将场景\
    \ 7 的“按钮 – 右”连接到场景 8。*\n\n   - 场景 8：复制现有场景。\n   - 场景 8：重命名。\n     - 场景 8：更改标题。\n\
    \     - 场景 8：更改图片。\n   - 场景 8：整理图形元素。\n   - 场景 8：建立连接。\n     - 场景 8：从按钮按住 Control\
    \ 键拖拽到新场景。\n     - 场景 8：编辑转场的属性。\n\n3. 场景 7 的右按钮是你的转场触发点，所以按住 Control 键从它拖拽到场景\
    \ 8 的视图控制器，如图 10-52 所示。选中创建的转场，在属性检查器中将转场类命名为 `MovementSegue`，保持样式为“自定义”，并将标识符更改为\
    \ *Right*。选中图片，将其更改为 `wanderBoard-cam08.png`。现在我们可以继续处理场景 9 了。\n"
