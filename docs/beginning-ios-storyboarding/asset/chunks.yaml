    How cool, right?!


    ### Final Thoughts


    As we were putting this book together, a few more aspects of Storyboarding came
    up in discussions we had with other developers and our online research:


    *   The ability to use multiple Storyboard files in a single application

    *   The effect that putting all the views/View Controllers in one Storyboard file
    (instead of many `.xib` files) has on team development

    *   The fact that not all scenes can be placed in Storyboard files


    The first two of these topics are somewhat related. Let’s look as each in a bit
    more detail.


    #### Multiple Storyboard Files in One Application


    Actually, using multiple Storyboard files in a single application is fairly easy
    to do. You’ll want to review the class documentation for `UIStoryboard`, paying
    particular attention to two methods:


    *   *The class method*: `+storyboardWithName:bundle:`

    *   *The instance method*: `-instantiateInitialViewController`


    The first establishes connection to your next Storyboard file, and the second
    (as its name implies) loads the initial scene as identified within your next Storyboard
    file. Sounds simple, but why would you want to create multiple Storyboard files?


    The main reason to split up an application’s scenes across multiple Storyboard
    files is probably best understood by looking at a hypothetical example. Let’s
    say you have a main menu from which you can enter four independent regions of
    the application:


    *   Player selection with player configuration

    *   Game settings

    *   Scores for past games

    *   Help, which contains text-based help, image-based help, and a video tutorial


    Each of these sections stands on its own, without the others, and each has a single
    entry point scene which one arrives at after choosing the appropriate menu item.
    In this example app, each of these sections could easily be its own Storyboard
    file. Keeping them in separate files does a number of good things for you. If
    you want to change the order of the help scenes (for example), or add one, and
    so on, you can simply edit the one Storyboard file that contains the help subsystem.
    It only contains help screens, so you can quickly rearrange things to get a new
    screen in place. And you know that, having only modified the help Storyboard file,
    it won’t break or cause problems with any of the other Storyboards. In effect
    you reduce the numbers of scenes you have to wade through to get the fix in place,
    and you’ve isolated changes to only the help subsystem scenes. Make sense?


    #### Having All .xib Files in One Storyboard Basket


    This is really only a larger issue that often comes up when many developers work
    on a single application. If two developers both want to make changes to a single
    file, then changes have to be somehow later combined so that both sets of changes
    are delivered in the next release. We call this *merging the changes*. There are
    tools to help you merge text files, but there are no tools as of this writing
    that can help you merge Storyboard files. The only way to merge these files is
    to recreate the changes of one file into the second file. Of course, this inability
    to merge files isn’t unique to Storyboard files. Think of any non-text file you
    have in a project (XML, HTML, CoreData object model diagrams/data, videos, and
    so forth)—these are all file types that make changes difficult to merge, if it’s
    possible at all.


    The software engineering community has developed a number of ways to deal with
    this need to merge changes. The simplest solution is to avoid the need to merge
    at all. In practice, this means that you don’t allow two or more engineers to
    modify the same file if at all possible. Here are three ideas that can help you
    work around this problem:


    *   Assign engineers to work on different areas of the same application so their
    changes don’t affect the same files.

    *   Make different changes in different releases, so that only one is being made
    for the next outgoing release.

    *   Separate functional areas within the application into separate files so that
    when changes are being made, the likelihood of overlap is lower.


    As for the effect this has on Storyboard files, consider the transition from `.xib`
    files to the use of a Storyboard file—effectively, you’re rolling up all the `.xib`s
    into this Storyboard file. It wonderfully increases your ability to see the overall
    shape of the application on one canvas and makes it so much easier to specify
    transitions between scenes on the canvas, but this transition also has the undesirable
    effect of focusing all your visual changes on this one Storyboard file. Multiple
    engineers now have to all work in this one file! Here is where these two topics
    are related: the best mitigation of this effect is to break up the Storyboard
    scenes into separate, but related, groups of scenes and placing each group into
    one Storyboard file.


    Having more Storyboard files helps prevent changes from needing to occur in the
    same file because now you have more than just the one file. As our example tried
    to show, it can be fairly easy to find regions of related scenes in an application,
    and therefore it can be fairly easy to break an application into multiple Storyboard
    files.


    #### What Do You Mean, Not All Scenes Are Appropriately Placed in Storyboard Files?


    All through this book you’ve been seeing scenes segueing to other scenes. You’ve
    seen user actions cause a scene to change to another scene (by row selection or
    button press, for example), and you’ve specified which type of transition will
    occur when the new scene is presented. In fact, there is a requirement that all
    scenes within a Storyboard file are arrived at from other scenes in the same Storyboard
    file, except for the initial scene (the one that has the arrow pointing into it
    coming from nowhere).


    However, it’s not too hard to find types of scenes that don’t come from a single
    point in the main flow from scene to scene. Think of messages like *Networking
    error*, *Invalid user name*, or *Failed to load page*, for example. These messages
    aren’t generated from the main flow of an application; they often happen asynchronously
    to the application flow. You can also think of these messages as needing to be
    sent to the display from your code—not from user action in the application interface.


    In the end, you’ll find it to be a bit more effort and rather unnatural to use
    Storyboards for showing scenes whose display is caused by code, such as scenes
    showing custom alert views, custom pickers, or custom action sheets. You can place
    custom scenes each in their own Storyboard file and then show them from the code.
    And you can create visual effects and placement onscreen so that these custom
    scenes look and behave like their built-in counterparts—but as we said, it’s a
    bit more effort.


    ### Hey, I Have Questions!


    If you have more questions about these final topics or, of course, about anything
    in this book, please visit our forums. We’ll be glad to answer your questions.
    See you on the forums!


