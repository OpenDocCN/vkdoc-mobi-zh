    \ instance variables, properties, and then our instance methods at the end. We\
    \ will call these sections as we guide you to where you should place your `DemoMonkey`\
    \ snippets as shown in [Figure 5-29](#Chapter05.html#fig_5_29). This view, however,\
    \ is with the Assistant editor. We’ll be switching back and forth between the\
    \ Assistant editor and the Standard editor as shown in [Figure 5-30](#Chapter05.html#fig_5_30).\n\
    \n![images](images/9781430242727_Fig05-30.jpg)\n\n**Figure 5-30.** *Same header\
    \ file but now viewed in the Standard editor.*\n\n5.  The reason we’re going over\
    \ this is because, as you know, these screen shots are directly from the video,\
    \ and because we switch between the Assistant and Standard editors constantly,\
    \ you need to be able to recognize them. For example, [Figure 5-30](#Chapter05.html#fig_5_30)\
    \ shows the same header file shown in [Figure 5-29](#Chapter05.html#fig_5_29),\
    \ except we’ve switched off the Assistant editor and clicked the Standard editor.\n\
    \n![images](images/9781430242727_Fig05-31.jpg)\n\n**Figure 5-31.** *Open the ModelController\
    \ implementation file and drag the first of the three snippets into the implementation\
    \ file.*\n\n6.  Open the `ModelController.m`. You will drag in three snippets.\n\
    \n*   First drag in the “02 ModelController.m – add import of pageData object”\
    \ snippet, which connects the implementation file with the class you brought into\
    \ the project in [Figure 5-10](#Chapter05.html#fig_5_10). We will dig deeper into\
    \ why we connect it and what the class does, but for now just import it as seen\
    \ on line 12 in [Figure 5-31](#Chapter05.html#fig_5_31).\n    *   Now looking\
    \ at line 14, right after the `/*`, delete the first line of text and replace\
    \ it with “03 ModelController.m – replace one-liner description” just to remind\
    \ yourself that this is a controller object that manages an array, or collection\
    \ of data objects.\n    *   This model was originally written to support the number\
    \ of elements in an array, but that’s no longer true for us. We have a fixed value\
    \ for max pages, so what you will do is after adding the property synthesis for\
    \ the new property you’ve added is simply add a definition for the number of pages.\n\
    \n**NOTE:** Another way you could have done this would be to make a property getter\
    \ override with a property for the number of pages that would always return the\
    \ same value.\n\nThe reason we chose our method to change the array with `destinationNumber\
    \ = m_nDestinationNumber;` rather than the option described in the nearby gray\
    \ box is because our method is fun and teaches you a couple of really cool techniques\
    \ to use with Storyboarding:\n\n*   We have an anonymous enumeration `enum` that’s\
    \ not given any name. `enum {`\n            `    MAX_PAGES = 4`\n            `};`\n\
    \        *   We also work with no instance variables tied to this enumeration.\
    \ Our method abides strictly to the value that we can now use by name.\n     \
    \   *   It’s similar in a way to creating a `#define` directive but it’s not treated\
    \ as a text substitution by the compiler. Instead, this mechanism creates a constant\
    \ integer value for each name within the `enum`, which means we’re showing you\
    \ a cool way to create a number of unrelated named integer constants without using\
    \ an array and then use them should your application require. In our case, we\
    \ will use only `MAX_PAGES`. But for you, this way frees you and opens the door\
    \ to using this method for your specific purposes in any other future applications.\n\
    \nNow go back and do what we’ve outlined with the bullets. Start off by adding\
    \ the property synthesis. Drag in the “04 ModelController.m – add property synthesis”\
    \ snippet and place it directly under `@synthesize pageData = _pageData;` as shown\
    \ in [Figure 5-31](#Chapter05.html#fig_5_31)."
  trans: "\n### 步骤三：编码：`ModelController`\n\n在开始编码之前，我们先花一分钟回顾一下，环顾四周，既见树木也见森林。你还有三个步骤要完成。第一步是设置项目。第二步是调整你的\
    \ Storyboard。现在你将编码步骤三的`ModelController`、步骤四的`DataViewController`和步骤五的`RootViewController`。这三个步骤的安排是有充分理由的，因为基于页面的应用程序（Page-Based\
    \ Application）正好提供了这三个类：`RootViewController`、`ModelController`和`DataViewController`。本章接下来的部分，你将花时间来编写这三个类的代码。\n\
    \n**注意：** 我们强烈建议你在为自己的项目使用基于页面的应用程序模板时，*也*将项目分为五个步骤：首先，初步分配文件；其次，调整 Storyboard；最后，编写所提供三个类的代码。\n\
    \n在基于页面的应用中，记住这些类的一个简单方法如下：\n\n- `DataViewController` 管理你希望用户看到的实际数据和视图。\n- `RootViewController`\
    \ 跟踪用户请求的当前视图和新视图（页面）。\n- `ModelController` 接收并创建从`RootViewController`请求的新视图（页面）。\n\
    \n好了，重新回顾了我们之前的位置、现在的位置以及未来的方向之后，让我们开始编码吧。\n\n**注意：** 我们会稍微打乱顺序，先从`ModelController`开始。原因在于，如果按顺序构建代码（从`DataViewController`到`RootViewController`再到`ModelController`），那么很难测试代码是否构建正确。相反，按照我们现在的逆序构建，你可以在每一部分结束时直接按下\
    \ `⌘+B`，如果没有编译错误或警告，你就知道做对了。本质上，我们采用反向顺序，是为了能够边构建边测试。\n\n**图 5-26.** *打开`ModelController.m`并搭建环境。*\n\
    \n1. 首先，你需要重新组织 Xcode 窗口以便编码。先选择`ModelController.m`实现文件，然后参考图 5-26 右侧的图像，如果你的标准编辑器（Standard\
    \ editor）处于开启状态，请通过选择助理编辑器（Assistant editor）来关闭它。保持导航器（Navigator）开启，关闭调试区（Debug\
    \ area），并取消选中工具面板（Utilities pane），如图 5-26 所示。\n\n**图 5-27.** *你的 Xcode 编码画布，便于跟随我们一起编码。*\n\
    \n2. 当你用`ModelController`实现文件（位于左侧窗格）及其头文件（位于右侧窗格）搭建好 Xcode 环境后，打开`DemoMonkey`，根据你的屏幕尺寸，将其放置在与图\
    \ 5-27 所示大致相同的位置。\n\n**图 5-28.** *从`DemoMonkey`中拖入第一个代码片段。*\n\n3. 我们需要添加一个名为`destinationNumber`的新属性，因为在你制作的旅行宣传册中，有四个可能的目的地，你希望在翻阅宣传册时看到它们。随着我们继续，我们将深入探讨这个属性。现在，首先将“01\
    \ ModelController.h – add new property”代码片段从`demoMonkey`拖到头文件中，置于 `@interface\
    \ ModelController` 代码行下方，如图 5-28 所示。\n\n**图 5-29.** *关于如何布置文件的一般性回顾。*\n\n4. 在深入拖拽代码片段到`ModelController.h`文件之前，让我们快速回顾一下我们用于设置每个页面的格式，这也是我们强烈建议你遵循的格式。从上到下依次是：我们的公共接口（public\
    \ interface）、实例变量（instance variables）部分、属性（properties）部分，最后是实例方法（instance methods）部分。在我们指导你放置`DemoMonkey`代码片段时，会引用这些部分，如图\
    \ 5-29 所示。但此视图是使用助理编辑器（Assistant editor）显示的。我们会在助理编辑器和标准编辑器之间来回切换，如图 5-30 所示。\n\
    \n**图 5-30.** *同一个头文件，但这次在标准编辑器中查看。*\n\n5. 我们之所以详细讲解这些，是因为正如你所知，这些截图直接来自视频，并且由于我们不断在助理编辑器和标准编辑器之间切换，你需要能够识别它们。例如，图\
    \ 5-30 显示了与图 5-29 相同的头文件，只是我们关闭了助理编辑器并点击了标准编辑器。\n\n**图 5-31.** *打开 ModelController\
    \ 实现文件，并将三个代码片段中的第一个拖入实现文件。*\n\n6. 打开`ModelController.m`。你需要拖入三个代码片段。\n\n   -\
    \ 首先拖入“02 ModelController.m – add import of pageData object”代码片段，它将实现文件与你之前在（图\
    \ 5-10 中）引入项目的类连接起来。我们将深入探讨为何要连接它以及该类的作用，但目前只需像图 5-31 中第 12 行所示那样导入即可。\n     -\
    \ 现在看第 14 行，紧跟在`/*`之后，删除第一行文本，并将其替换为“03 ModelController.m – replace one-liner\
    \ description”，以提醒自己这是一个管理数组或数据对象集合的控制器对象。\n     - 这个模型最初是为支持数组中的元素数量而编写的，但对我们来说情况已不再如此。我们有固定的最大页数值，因此你要做的是，在为新添加的属性添加属性合成（property\
    \ synthesis）之后，直接添加一个页面数量的定义。\n\n**注意：** 另一种实现方式是，通过属性重写 getter 方法，让页面数量属性始终返回相同的值。\n\
    \n我们之所以选择用 `destinationNumber = m_nDestinationNumber;` 来修改数组，而不是采用旁边灰框中描述的选项，是因为我们的方法很有趣，并且能教你几个在\
    \ Storyboarding 中使用的超酷技巧：\n\n- 我们有一个未命名的匿名枚举 `enum`。\n  ```\n  enum {\n      MAX_PAGES\
    \ = 4\n  };\n  ```\n- 我们也没有使用与此枚举绑定的实例变量。我们的方法严格遵守我们现在可以通过名称使用的值。\n- 这在某种程度上类似于创建`#define`指令，但编译器不会将其视为文本替换。相反，这种机制为`enum`中的每个名称创建了一个常量整数值，这意味着我们正在向你展示一种创建多个不相关的命名整数常量的酷炫方法，而无需使用数组，从而在你的应用程序需要时使用它们。在我们的案例中，我们只会用到`MAX_PAGES`。但对你而言，这种方法为你解放了思路，并为你在未来其他应用程序中根据特定目的使用此方法打开了大门。\n\
    \n现在返回并按照项目符号列出的内容进行操作。从添加属性合成开始。将“04 ModelController.m – add property synthesis”代码片段拖入，并放置在\
    \ `@synthesize pageData = _pageData;` 的正下方，如图 5-31 所示。\n"
