  trans: '

    ### 步骤 2：通过标注气泡跳转到辅助场景


    在这三个步骤中的第二步，你将在 Storyboard 中创建一个辅助场景，用于显示所选 `MapView` 标注所代表的中等尺寸图像以及完整的图像名称。每当用户点击所选标注的气泡展开按钮时，应用将跳转至该场景。


    1.  第 2 章介绍了如何使用 Xcode 菜单将视图控制器嵌入导航控制器。本步骤将展示另一种实现相同任务的方法。你可以根据个人偏好选择其中一种。打开 Storyboard
    文件，从对象库中拖一个导航控制器到画布上。将其放置在 `MapViewController` 的左侧，如图 3-32 所示。


    ![images](img/9781430242727_Fig03-32.jpg)


    **图 3-32.** *将导航控制器拖到 Storyboard 中。*


    2.  你可以删除默认自动添加到场景中的根视图控制器：选中它并按 Delete 键。此外，抓住指向 `MapView` 控制器的初始视图控制器箭头，将其拖到新添加的导航控制器上，如图
    3-33 所示。


    ![images](img/9781430242727_Fig03-33.jpg)


    **图 3-33.** *将导航控制器设置为初始视图控制器。*


    3.  通过按住 Control 键从导航控制器拖到 `MapView` 控制器来创建两者之间的 `rootViewController` 关联关系，如图
    3-34 所示。松开鼠标，然后从菜单中选择关联关系 – `rootViewController`，如图 3-35 所示。


    ![images](img/9781430242727_Fig03-34.jpg)


    **图 3-34.** *按住 Control 键从导航控制器拖到 MapView 控制器。*


    ![images](img/9781430242727_Fig03-35.jpg)


    **图 3-35.** *创建 rootViewController 关联关系。*


    4.  选中导航控制器，在属性检查器中将其顶部栏设置为“半透明黑色导航栏”，如图 3-36 所示。


    ![images](img/9781430242727_Fig03-36.jpg)


    **图 3-36.** *将导航控制器的顶部栏属性设置为半透明黑色导航栏。*


    5.  从对象库中再拖一个视图控制器到画布上。将其放置在 `MapView` 控制器的右侧，如图 3-37 所示。


    ![images](img/9781430242727_Fig03-37.jpg)


    **图 3-37.** *在 Storyboard 中添加一个新的视图控制器。*


    6.  通过按住 Control 键从 `MapView` 控制器图标拖到视图控制器来创建一个 Storyboard Segue，如图 3-38 所示。松开鼠标，然后从菜单中选择“Push”作为转场类型，如图
    3-39 所示。选中新创建的 Segue，并在属性检查器中将其 `Identifier` 属性设置为 `ShowFullSizeImageSegue`，如图
    3-40 所示。最后，双击视图控制器的导航栏，将其标题设置为“已选照片”，如图 3-41 所示。


    ![images](img/9781430242727_Fig03-38.jpg)


    **图 3-38.** *按住 Control 键从 MapView 控制器拖到新的视图控制器。*


    ![images](img/9781430242727_Fig03-39.jpg)


    **图 3-39.** *创建 Push 转场。*


    ![images](img/9781430242727_Fig03-40.jpg)


    **图 3-40.** *设置转场的标识符。*


    ![images](img/9781430242727_Fig03-41.jpg)


    **图 3-41.** *设置视图控制器的标题。*


    7.  现在，你可以向新场景添加其余元素了。你将需要一个 `UIImageView` 来显示下载的 Flickr 图像，以及一个 `UILabel` 来显示其标题。继续操作，将一个图像视图拖到视图控制器的视图上，使其高度约为
    230 点，宽度约为 320 点，并将其定位在靠近顶部的位置，如图 3-42 所示。


    ![images](img/9781430242727_Fig03-42.jpg)


    **图 3-42.** *向场景添加一个图像视图。*


    8.  现在，在对象库中找到标签，也将其拖到视图上。调整其宽度并将其放置在图像视图下方，如图 3-43 所示。为了保持条理，可以先将其标题设置为“照片标题”。运行时，该标题将被替换为实际照片的标题。同时，在属性检查器中设置标签的属性如下：字体：系统粗体
    18 号，文本颜色：白色，对齐方式：居中。你可能注意到，标签在屏幕上不再可见了。单击主视图内的任意位置以选中它，然后在属性检查器中将背景颜色更改为黑色，如图
    3-44 所示。


    ![images](img/9781430242727_Fig03-43.jpg)


    **图 3-43.** *向场景添加标签并调整其属性。*


    ![images](img/9781430242727_Fig03-44.jpg)


    **图 3-44.** *更改主视图的背景颜色。*


    9.  在这一步中，你将创建一个新的 `UIViewController` 子类，用于控制你的辅助场景。按下 ![images](img/U003.jpg)`N`
    键，选择 Objective-C 类选项，然后点击“下一步”。确保在“Subclass of”部分选中了 `UIViewController`，如图 3-45
    所示。将类命名为 `PhotoViewController` 并保存。


    ![images](img/9781430242727_Fig03-45.jpg)


    **图 3-45.** *创建一个新的 UIViewController 子类。*


    10. 在 Storyboard 中选中第二个视图控制器，然后在身份检查器中将其类设置为新创建的 `PhotoViewController` 类，如图 3-46
    所示。


    ![images](img/9781430242727_Fig03-46.jpg)


    **图 3-46.** *将辅助视图控制器的类设置为 PhotoViewController。*


    11. 点击助手图标。如果助手没有自动显示 `PhotoViewController.h` 文件，你可以从“相关文件选项”菜单（位于屏幕分隔线顶部）下的“最近文件”子菜单中选择它。现在，你将创建并连接
    `PhotoViewController` 类的 `IBOutlet`。按住 Control 键从 `UIImageView` 拖到 `PhotoViewController.h`
    文件中，放在 `@end` 之前，松开鼠标，如图 3-47 所示。将其命名为 `photoImageView`。类似地，按住 Control 键从标签拖出，并将属性命名为
    `photoTitleLabel`。


    ![images](img/9781430242727_Fig03-47.jpg)


    **图 3-47.** *为 PhotoViewController 创建 IBOutlets。*


    12. 至此，Storyboard 部分就完成了。现在需要添加几行代码来让一切正常运行。关闭助手，导航到 `PhotoViewController.h` 文件。在
    `@interface` 之前添加 `PhotoAnnotation` 类的前向声明 `"@class PhotoAnnotation;"`，并创建另一个名为
    `photoAnnotation` 的属性，如图 3-48 所示（DemoMonkey 步骤“12 `PhotoViewController.h` 添加 `photoAnnotation`
    属性”）。这个新属性将存储一个对所选标注的引用，以便你可以访问下载和显示实际照片所需的数据。不要忘记在 `PhotoViewController.m` 中合成这个新属性，并通过在文件顶部添加以下代码使
    `PhotoAnnotation` 类对 `PhotoViewController` 可见：


    ```

    import "PhotoAnnotation.h"

    ```

    '
- fmt: "`#import \"PhotoViewController.h\"`\n`#import \"PhotoAnnotation.h\"`\n`@interface\
    \ PhotoViewController ()`\n`@end`\n`@implementation PhotoViewController`\n`@synthesize\
    \ photoImageView;`\n`@synthesize photoTitleLabel;`\n`@synthesize photoAnnotation;`\n\
    `…`\n![images](images/9781430242727_Fig03-48.jpg)\n\n**Figure 3-48.** *Add the\
    \ photoAnnotation property.*\n\n13.  Here you’re going to add implementation for\
    \ the `viewDidLoad` method. Find the `viewDidLoad` method in the `PhotoViewController.m`\
    \ file and insert the code shown in [Figure 3-49](#Chapter03.html#fig_3_49). This\
    \ code will update the UI so it displays the appropriate image and title for the\
    \ annotation that will be passed by `MapViewController` right before the segue\
    \ is performed.\n\n![images](images/9781430242727_Fig03-49.jpg)\n\n**Figure 3-49.**\
    \ *Add the viewDidLoad implementation in PhotoViewController.m.*\n\n14.  In this\
    \ step you’ll implement two additional `MKMapViewDelegate` protocol methods, which\
    \ you need in order to display the secondary scene. First, switch to `MapViewController.m`\
    \ and import `PhotoViewController.h` to make it visible to this class. Then navigate\
    \ to the `MKMapViewDelegate` protocol pragma section as shown in [Figure 3-50](#Chapter03.html#fig_3_50).\n\
    \n![images](images/9781430242727_Fig03-50.jpg)\n\n**Figure 3-50.** *Navigate to\
    \ the MKMapViewDelegate Protocol pragma section.*\n\n15.  Add implementation for\
    \ the following two methods right before `@end` as shown in [Figure 3-51](#Chapter03.html#fig_3_51)\
    \ (DemoMonkey step “[14 MapViewController.m Other MapView Delegate Protocol Methods”):\n\
    \n`- (void)mapView:(MKMapView *)aMapView annotationView:(MKAnnotationView *)view`\n\
    `calloutAccessoryControlTapped:(UIControl *)control`\n`{ … }`\n`and`\n`- (void)mapView:(MKMapView\
    \ *)MapView didSelectAnnotationView:(MKAnnotationView`\n`*)view`\n`{ … }`\n\n\
    The first of the two MapView callback methods gets called when the user clicks\
    \ a callout disclosure button. In that case, you invoke\n\n`[self performSegueWithIdentifier:@\"\
    ShowFullSizeImageSegue\"`\n`sender:photoAnnotation];`\n\non your `MapViewController`,\
    \ which will perform the Storyboard Segue created in step 31. This little line\
    \ of code is all it takes to initiate a secondary scene transition from a MapView\
    \ callout. In the second delegate callback, which happens when the user selects\
    \ an annotation on the map, you simply call the `updateSubtitle` method on the\
    \ selected annotation so its coordinate is reverse-geocoded and the location name\
    \ is displayed in the callout subtitle.\n\n![images](images/9781430242727_Fig03-51.jpg)\n\
    \n**Figure 3-51.** *Implement the remaining MKMapViewDelegate protocol methods.*\n\
    \nFinally, you must pass the selected annotation from `MapViewController` to the\
    \ destination `PhotoViewController` before the transition takes place. Do this\
    \ in the `prepareForSegue:` method. Scroll up to the `#pragma mark - Flickr API\
    \ Processing` section and insert the code shown in [Figure 3-52](#Chapter03.html#fig_3_52)\
    \ right before it (DemoMonkey step “15 MapViewController.m prepareForSegue:”).\
    \ Here you check the Identifier of the invoking segue, and if it matches the desired\
    \ one, you simply set the `photoAnnotation` property of `PhotoViewController`\
    \ (which is the destination View Controller) to the sender object, for which,\
    \ as you remember from the previous step, you passed the selected `PhotoAnnotation`\
    \ object. As a minor cleanup, you should implement the `viewWillAppear` method\
    \ (DemoMonkey step “16 MapViewController.m viewWillAppear:]”). Add the following\
    \ code right before `viewDidUnload`:\n\n```\n- (void)viewWillAppear:(BOOL)animated\
    \ {\n    [super viewWillAppear:animated];\n    self.navigationController.navigationBarHidden\
    \ = YES;\n}\n```\n![images](images/9781430242727_Fig03-52.jpg)\n\n**Figure 3-52.**\
    \ *Implement the prepareForSegue: method for MapViewController*\n\nIn this method\
    \ you set the `navigationBarHidden` property of the Navigation Controller to `YES`,\
    \ which insures that once you return from the secondary scene, the Navigation\
    \ Bar doesn’t cover the MapView.\n\n16.  Build and run the app. You should now\
    \ be able to click the annotation and see the callout with the photo title and\
    \ the name of the place where it was taken. If you tap the blue disclosure button,\
    \ the secondary view displaying the actual photo will appear as demonstrated on\
    \ [Figure 3-53](#Chapter03.html#fig_3_53).\n\n![images](images/9781430242727_Fig03-53.jpg)\n\
    \n**Figure 3-53.** *Implement the prepareForSegue: method for MapViewController.*"
