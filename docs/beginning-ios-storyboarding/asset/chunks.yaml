  trans: "好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成高质量的中文。\n\n---\n\n\n###\
    \ 第 2 步：准备故事板\n\n在本节中，你将设置故事板。首先从处理第一个场景开始，添加你的`ViewController`、`UIImageViews`、欢迎标签和按钮。在下一节编写完代码后，请记住，你还需要为剩下的\
    \ 17 个场景重复此操作。\n\n![images](img/9781430242727_Fig09-09.jpg)\n\n**图 9-9.** *创建导航控制器。*\n\
    \n1.  打开故事板，你会看到 iPad 的默认画布。我们先思考一下。为了让用户在迷宫中更容易地探索（用户通常会后退然后再前进），像你过去做的那样，在导航控制器内部再使用一个导航控制器会非常有用。记住，这样做可以让你实现视图的推入和弹出。选择故事板上的视图，然后选择\
    \ Editor ![images](img/U001.jpg) Embed In ![images](img/U001.jpg) Navigation Controller，如图\
    \ 9-9 所示。现在，通过观察故事板，你会看到已经选中了你的单视图，并将其嵌入到导航控制器中，这样一切操作都从导航控制器开始。\n\n    ![images](img/9781430242727_Fig09-10.jpg)\n\
    \n    **图 9-10.** *设置度量参数*\n\n2.  要设置度量参数，点击你的`ViewController`（右侧的那个），然后打开属性检查器。导航到模拟度量部分，确保尺寸设置为\
    \ iPad 全屏，方向保持为横屏。其他所有选项保持为“推断”，如图 9-10 所示。\n\n    ![images](img/9781430242727_Fig09-11.jpg)\n\
    \n    **图 9-11.** *从库中拖入一个图像视图。*\n\n3.  将你刚在第 10 步中设置好的视图控制器留在原地，因为你要添加标签、按钮以及任何图形密集型项目都会有的元素。首先从库中引入一个图像视图。它会自动调整到正确的尺寸，如图\
    \ 9-11 所示。完成此操作后，将其拖放到你的视图中。\n\n    ![images](img/9781430242727_Fig09-12.jpg)\n\
    \n    **图 9-12.** *确保图像已配置为自动调整大小。*\n\n4.  你很快就会移除导航栏，因为你希望用户在 iPad 上获得全屏体验。为了让我们的图像在插入或移除视图中的对象时能自动调整大小，我们需要在创建第一个场景的现在就确保图像视图已设置为自动调整大小。前往尺寸检查器，确保自动调整大小选项配置如图\
    \ 9-12 所示。在这里你还可以注意到，界面生成器已根据导航栏的存在将图像视图调整到所需的大小。`x`和`y`坐标显示它位于左上角，这是正确的。\n\n\
    \    ![images](img/9781430242727_Fig09-13.jpg)\n\n    **图 9-13.** *设置你的第一个图像。*\n\
    \n5.  现在你可以设置第一个图像了。保持图像视图处于选中状态，在属性检查器中，选择显示来自摄像机 1 的视图的图像。这一步是必要的，因为如果你设计一个带有\
    \ 3D 场景的游戏，你可能需要确保在图像文件名中标识视图来自哪个摄像机编号。在这里，你从下拉菜单中选择摄像机视图编号 1，文件名为 `wanderBoard-cam01.png`，如图\
    \ 9-13 所示。如果你想显示的图像文件名在图像列表中不可见，你可能需要向下滚动以查看更多名称。\n\n    太棒了！你现在正站在迷宫的入口处。接下来，你将使用故事板和\
    \ Xcode 引导用户穿过这个迷宫，这是一个非常酷的概念。\n\n    ![images](img/9781430242727_Fig09-14.jpg)\n\
    \n    **图 9-14.** *创建一个多行欢迎标签。*\n\n6.  你需要一个欢迎标签，在用户进入迷宫时向他们致意。从库中抓取一个标签，拖到右侧墙壁的上部，并稍微放大一点。在属性检查器中，你将做一些你可能还没接触过的有趣操作：创建一个多行标签。你必须使用一个特殊的键来执行软回车：在标签文本框中，输入\
    \ *Welcome*，然后按 Option+Return 来创建新行，如图 9-14 所示。在新行上输入 *to our*，再创建另一个新行，然后输入 *Maze!*，如图\
    \ 9-15 所示。接下来，你需要将“行数”从 1 调整为 3（如图所示），然后标签才能显示所有三行。通过在蜡笔盒颜色选择中选择 Mocha（Mocha 是顶部第二行最左边的蜡笔），以选择“摩卡”作为文本颜色。同时选择浅灰色作为阴影颜色，并将阴影偏移的水平距离和垂直距离都设置为\
    \ 1。\n\n    ![images](img/9781430242727_Fig09-15.jpg)\n\n    **图 9-15.** *更改字体样式。*\n\
    \n7.  在属性检查器中，选中字体后，点击下拉菜单中的 `T` 图标并选择 Noteworthy，将字体更改为 Noteworthy Bold。将样式选择为\
    \ Bold，大小选择为 40（磅），如图 9-15 左侧图像所示。在尺寸检查器中，将`x`、`y`坐标设置为 700, 80。将文本框的宽度设置为 250，高度设置为\
    \ 200，如图 9-15 右侧所示。\n\n    ![images](img/9781430242727_Fig09-16.jpg)\n\n    **图\
    \ 9-16.** *引入第一个按钮。*\n\n8.  为了在屏幕之间导航，你可能想使用按钮，但你并不希望用户看到这些按钮，因为那会暴露前进的方向。你将使用尺寸检查器来正确设置按钮的大小和位置。然后在属性检查器中，通过将其类型更改为“自定义”，使其变为不可见（默认情况下自定义类型会使其透明）。\n\
    \n    从库中拖入一个按钮，并将其放置在我们图 9-16 所示的大致位置。在尺寸检查器中，将`x`坐标设置为 530，`y`坐标设置为 80，宽度设置为\
    \ 140，高度设置为 450。\n\n    ![images](img/9781430242727_Fig09-17.jpg)\n\n    **图 9-17.**\
    \ *使按钮不可见。*\n\n9.  要使按钮透明，在属性检查器中将“类型”选择为“自定义”。按钮将变为透明，如图 9-17 所示。\n\n    ![images](img/9781430242727_Fig09-18.jpg)\n\
    \n    **图 9-18.** *允许用户看到他们何时点击了按钮。*\n\n10. 你已经让按钮变得透明，但你需要让用户知道他们何时点击了它。勾选“绘图”属性下的“触摸时显示高亮”复选框，这样当用户点击按钮时，会产生一个小闪光，告知用户按钮已被按下。如图\
    \ 9-18 所示。\n\n    ![images](img/9781430242727_Fig09-19.jpg)\n\n    **图 9-19.**\
    \ *命名按钮*\n\n11. 即使在这个只有 18 个场景的小迷宫中，每个场景也有两到三个前往下一处的选项，加起来可能有 40 个按钮。你需要一个命名系统，以便仅通过名称就能在文档大纲中轻松识别按钮。你选择的这个按钮允许用户向右走，因此保持按钮处于选中状态，在身份检查器中将其标记为\
    \ `Button - Right`，如图 9-19 所示。\n\n    ![images](img/9781430242727_Fig09-20.jpg)\n\
    \n    **图 9-20.** *检查状态。*\n\n12. 这是一个关键步骤，让我们在继续之前谨慎地确认项目的这一方面运行完美。首先在文档大纲中检查，然后运行它。如果故事板的文档大纲面板尚未打开，请将其打开，然后转到视图控制器场景。在“视图”下，如果展开它，你应该看到\
    \ Image View…、Label - Welcome to our Maze! 和 Button - Right，如图 9-20 所示。我们继续并构建它。如果构建成功，就运行它。\n\
    \n    ![images](img/9781430242727_Fig09-21.jpg)\n\n    **图 9-21.** *点击透明（不可见）按钮，看到闪光！*\n\
    \n13. 当 iPad 模拟器出现时，点击你知道透明按钮所在的位置。你应该会看到一个闪光指示器，如图 9-21 所示。请注意，无论你在哪里点击，它仍然会显示闪光。这一点很重要，因为不同的人可能会点击按钮的不同区域。你已经完成了创建这个应用的一个重要部分。干得好！\n"
- fmt: "# Chapter 10\n\n## Single View #3: wanderBoard Part II\n\nYou’ve now set up\
    \ the first scene. In this chapter, you’ll add code to the View Controller’s header\
    \ and implementation files in Step 3. That sets you up for Step 4, in which you\
    \ efficiently create 17 more scenes! Step 4 is divided into two parts. The first\
    \ part, Step 4a, concludes this chapter, and for that step you will still receive\
    \ assistance and guidance from us. Then in [Chapter 11](#Chapter11.html#ch11),\
    \ we have you work on Step 4b, which comes with much less assistance.\n\n### Step\
    \ 3: Finish the ViewController Header and Implementation Files\n\n![images](images/9781430242727_Fig10-01.jpg)\n\
    \n**Figure 10-1.** *Drag in the property and action method signature.*\n\n1. Make\
    \ sure you’ve opened up DemoMonkey and placed it in your favorite spot so you\
    \ can access it while you code. Open the `ViewController.m` file and then open\
    \ the Assistant Editor so that it opens up its header file in the right-hand pane.\
    \ From DemoMonkey, drag in the first snippet “01 ViewController.h – add new property\
    \ and action signature” and drop it at the end of the `@interface` line of code\
    \ in the header file as shown in [Figure 10-1](#Chapter10.html#fig_10_1) and as\
    \ follows:\n\n```\n#import <UIKit/UIKit.h>\n@interface ViewController : UIViewController\
    \ {\n}\n\n@property (weak, nonatomic) IBOutlet UIButton *btnReverse;\n\n(IBAction)onReversePress:(id)sender;\n\
    \n@end\n```\n\nAll you’re doing to the View Controller is adding a new property\
    \ and an action method signature. You’re setting up the ability for users to communicate\
    \ that they need to back up in the maze when they get to a dead-end. They accomplish\
    \ that with your reverse button (`*btnReverse`) which, upon being tapped, invokes\
    \ this `IBAction` method. This is all you’ll be doing to the header file, so it’s\
    \ time to on to the implementation file.\n\n![images](images/9781430242727_Fig10-02.jpg)\n\
    \n**Figure 10-2.** *Import viewWillAppear method code.*\n\n2. Switching back to\
    \ the Standard Editor (or simply working now in the implementation file on the\
    \ left), you want to establish access to your custom segue object because, as\
    \ shown earlier, you don’t want to use custom segues. The custom segues, as you\
    \ will see, are completely data-driven, meaning that data drives the behavior\
    \ of the code. Put yet another way, the code looks at the view data and based\
    \ on what it sees, it makes a decision on how to act. So go to DemoMonkey and\
    \ drag in the “02 ViewController.m – add import of customSegue Object” and drop\
    \ it after the `#import ViewController.h`. Now that in your public interface you’ve\
    \ declared a property for a reverse button, you also need to tell the compiler\
    \ to synthesize the reverse button property setter and getter code. To do this,\
    \ drag in the “03 ViewController.m – add property synthesis,” placing it immediately\
    \ after the `@implementation` line.\n\nAs you can see in the implementation file,\
    \ Xcode has, by default, instantiated the methods `- (void)viewDidLoad` and `-\
    \ (void)viewDidUnload`. But when the view appears, you want to hide the Navigation\
    \ Bar. So add a `-(void)viewWillAppear` method to do this. Drag in “04 ViewController.m\
    \ – add viewWill Appear” and drop it in between the `- (void)viewDidLoad` and\
    \ `- (void)viewDidUnload` methods as shown in [Figure 10-2](#Chapter10.html#fig_10_2)\
    \ and as follows:\n\n```\n#import \"ViewController.h\"\n#import \"MovementSegue.h\"\
    \n@interface ViewController ()\n@end\n@implementation ViewController\n@synthesize\
    \ btnReverse;\n- (void)viewDidLoad{ ... }\n-(void)viewWillAppear:(BOOL)animated\
    \ {\n  [super viewWillAppear:animated];\n  [self.navigationController setNavigationBarHidden:YES];\n\
    \  BOOL bIsMovToParent = [self isMovingToParentViewController];\n\n  if(bIsMovToParent\
    \ && self.btnReverse.tag == 1)\n        { self.btnReverse.hidden = YES;}\n  else\
    \ if(self.btnReverse.tag == 1)\n{self.btnReverse.hidden = NO;} }\n- (void)viewDidUnload\
    \ { ...\n```\n\n**NOTE:** To save space we deleted the comments in the preceding\
    \ code.\n\nFrom the code you can see that you’re letting the super class do what\
    \ it needs to do on `viewWillAppear` with `[super viewWillAppear:animated];`.\
    \ Then you hide the Navigation Bar with `[self.navigationController setNavigationBarHidden:YES];`\
    \ and deal with how you arrived at this view. You want to know if you’re heading\
    \ toward a dead-end or backing out of a dead-end. The call `[self isMovingToParentViewController]`\
    \ tells you part of the answer. You can see in the comments in the code (not shown\
    \ in the preceding code) that for our non-terminal dead-end screens, you’ve given\
    \ the reverse button a `tag=1`. Conversely, the dead-end end screens are given\
    \ a `tag=0`. But if you arrived at this screen while heading toward the dead-end,\
    \ then you hide the reverse button with `self.btnReverse.hidden = YES`. Finally,\
    \ if the user returned to this point via a reverse button tap (backing out of\
    \ the dead-end), then you do want to display the reverse button in this scene\
    \ with `self.btnReverse.hidden = NO;` (if there is a reverse button in this scene).\n\
    \n![images](images/9781430242727_Fig10-03.jpg)\n\n**Figure 10-3.** *Replace code\
    \ with code that allows both Landscape orientations.*\n\n3. You now need to release\
    \ the reverse button by dragging in “05 ViewController.m – add release button\
    \ (inviewDid Unload)” and dropping it into `ViewDidUnload` right above `[super\
    \ viewDidUnload];` as shown in [Figure 10-3](#Chapter10.html#fig_10_3) and as\
    \ follows:\n\n```\n- (void)viewDidUnload\n{\n  [self setBtnReverse:nil];\n  [super\
    \ viewDidUnload];\n}\n(BOOL)shouldAutorotateToInterfaceOrientation:(UIInterfaceOrientation)interfaceOrientation\n\
    {\n  return UIInterfaceOrientationIsLandscape(interfaceOrientation);\n}\n```\n\
    \nThe next thing to do is constrain view rotation to Landscape. Rather than say\
    \ you support any orientation, you’ll use a macro to ask whether you’re in a Landscape\
    \ orientation or not. To do this, drag in “06 ViewController.m – in ‘shouldAutorotate\
    \ …’ replace” and drop it inside the `shouldAutorotateToInterfaceOrientation`\
    \ as shown in [Figure 10-3](#Chapter10.html#fig_10_3). It should replace the `return\
    \ YES;` line that’s already present in this method. You may need to remove this\
    \ line after the insert of the new lines.\n\nInstead of simply returning YES to\
    \ all orientations, you now use the macro to determining if you’re in a landscape\
    \ orientation, `UIInterfaceOrientationIsLandscape`, and return its result.\n\n\
    ![images](images/9781430242727_Fig10-04.jpg)\n\n**Figure 10-4.** *Bring in the\
    \ prepareForSegue:sender: and onReversePress: methods.*\n\n4. You’ve spent some\
    \ time creating transparent buttons to have your user navigate through the maze\
    \ using your custom segues. You now have to bring in code that will respond to\
    \ taps on these buttons. Drag in “07 ViewController.m – add prepareForSegue sender\
    \ and onReversePress methods” and drop it in between the `shouldAutorotateToInterfaceOrientation`\
    \ method and the `@end` statement as shown in [Figure 10-4](#Chapter10.html#fig_10_4).\
    \ You can see how you’re looking for the user to choose to go left, right, or\
    \ forward and you record this choice in the views “tag.” If the user is instead\
    \ trying to back out of a dead-end by tapping the back button, you execute a pop\
    \ with `popViewControllerAnimated:YES`. Now do a build, and it should all build\
    \ correctly.\n\nCongratulations! You’ve finished all the code for this app. Yes,\
    \ the aforementioned code is the sum of all the code you’ll employ in this app.\
    \ Now do a run and see what you have. You’ll notice that now your beginning point\
    \ looks like [Chapter 9](#Chapter09.html#ch9)’s Figure 9-0A in the sense that\
    \ the Navigation Bar is no longer there, as it was in [Figure 9-21](#Chapter09.html#fig_9_21).\n\
    \nFrom this point on, you’ll be making the maze paths."
