  trans: "\n20.  Xcode 已为此在实现文件中生成了一个方法框架，你现在需要编写代码以从开关中获取值。但在执行此操作之前，你首先需要创建一个用于保存开关状态的变量。那么，我们先声明这个变量。前往\
    \ `AlienViewController.m` 文件，将“11 AlienVC.m - 添加实例变量”拖放到 `@interface AlienViewController\
    \ ()` 行的右端，这样你就获得了如图 2-31 所示的代码：`@interface AlienViewController () {`\n    `@private\
    \   // 非必需，但能提醒我们！`\n    `    BOOL m_bIsAlienSeen;`\n    `}`\n\n21.  你需要设置此变量的初始状态，并将此变量的状态返回给你的委托。方便的做法是，你可以使用\
    \ `viewWillAppear` 来设置初始状态，并使用 `viewWillDisappear` 在你离开时报告开关值。要添加这两个方法，请将“12 AlienVC.m\
    \ - 添加 viewWillAppear/Disappear 方法”拖放到 `viewDidLoad` 方法之后，这样我们就有了如图 2-32 所示的代码。\n\
    \n![images](img/9781430242727_Fig02-32.jpg)\n\n**图 2-32.** *添加 `viewWillAppear`\
    \ 和 `viewWillDisappear` 这两个方法。*\n\n![images](img/9781430242727_Fig02-33.jpg)\n\
    \n**图 2-33.** *添加代码以在开关值改变时捕获当前值。*\n\n22.  最后，你可以在开关值发生改变时捕获它了。将“13 AlienVC.m\
    \ - 添加操作方法的代码内容”拖放到 `onSwitchValueChanged:` 方法的花括号内，使代码如图 2-33 所示。\n\n![images](img/9781430242727_Fig02-34.jpg)\n\
    \n**图 2-34.** *哇！找到外星人了！*\n\n23.  你已经完成了步骤 2 的代码修改。现在在 iPhone 模拟器中运行代码，看看是否一切正常！点击\
    \ Xcode 窗口左上角的“运行”按钮。当模拟器启动后，点击“寻找外星人”进入外星人视图。新的开关应该在那里。将开关切换到“开”，然后点击返回按钮（导航栏的左上角）返回主视图。你的“状态：”文本改变了吗？你找到外星人了吗？图\
    \ 2-34 展示了这个测试流程。\n\n### 步骤 3：将信息发送到二级视图（外星人视图）\n\n在本节中，我们将演示一种向目标视图传递信息的常用技术。在这个案例中，你将向外星人查找器主屏幕添加一个文本字段，并将文本传递到外星人的宇宙中！让我们开始吧。\n\
    \n![images](img/9781430242727_Fig02-35.jpg)\n\n**图 2-35.** *对外星人说点什么。*\n\n1. \
    \ 现在，一旦外星人告知我们他的存在，你就想向他发送一条消息。将一个文本字段拖放到主视图中“寻找外星人”按钮的上方。将文本居中对齐，并输入*对外星人说点什么*作为占位符文本（此文本告知用户文本字段的用途），如图\
    \ 2-35 所示。\n\n![images](img/9781430242727_Fig02-36.jpg)\n\n**图 2-36.** *从文本字段按住\
    \ Control 键拖放到视图控制器图标上。*\n\n2.  现在你需要将视图控制器指定为文本字段的委托，以便它能在编辑完成时得知——这样你就可以关闭键盘。从“对外星人说点什么！”文本字段按住\
    \ Control 键向下拖放到下方的视图控制器图标上，如图 2-36 所示。\n\n![images](img/9781430242727_Fig02-37.jpg)\n\
    \n**图 2-37.** *连接到“delegate”输出口。*\n\n3.  在下拉菜单中，将其连接到“delegate”输出口，如图 2-37 所示。\n\
    \n![images](img/9781430242727_Fig02-38.jpg)\n\n**图 2-38.** *为发送给外星人的字符串消息创建属性。*\n\
    \n4.  接下来，为发送给外星人的消息字符串创建并合成一个属性。前往 `ViewController.h` 文件，在 `lblFindStatus` 属性下方，通过拖放“14\
    \ VC.h - 添加 alienText 属性”来添加一个新属性，如图 2-38 所示。为了合成它，回到 `ViewController.m` 文件，在\
    \ `lblFindStatus` 的合成代码下方，通过拖放“15 VC.m - 合成 AlienText 属性”来添加新的属性合成代码。\n\n![images](img/9781430242727_Fig02-38.jpg)\n\
    \n**图 2-39.** *控制发送给外星人的文本编辑。*\n\n5.  在输入文本时，你需要两组代码——一个方法用于关闭键盘，另一个方法用于捕获在文本字段中输入的文本。你将通过\
    \ `UITextFieldDelegate` 协议提供的 `textFieldDidEndEditing` 和 `textFieldShouldReturn`\
    \ 委托方法来实现。你只需为这两个方法添加实现。停留在 `ViewController.m` 文件中，拖放“16 VC.m - 添加文本编辑支持方法”，如图\
    \ 2-39 所示。\n\n![images](img/9781430242727_Fig02-40.jpg)\n\n**图 2-40.** *用于发送给外星人消息的属性。*\n\
    \n6.  你需要创建并合成一个属性，但这次是为了捕获你要发送给外星人的文本。在 `AlienViewController.h` 文件中，通过拖放“17 AlienVC.h\
    \ - 添加 messageForAlien 属性”来添加一个属性，如图 2-40 所示。\n\n![images](img/9781430242727_Fig02-41.jpg)\n\
    \n**图 2-41.** *合成发送给外星人的消息属性。*\n\n7.  在 `AlienViewController.m` 文件中，在 `lblFindStatus`\
    \ 合成代码下方，使用“18 AVC.m 合成 messageForAlien 属性”添加新的属性合成代码，如图 2-41 所示。\n\n![images](img/9781430242727_Fig02-42.jpg)\n\
    \n**图 2-42.** *为外星人创建一个接收文本的方法。*\n\n8.  现在，你需要创建一种方法，让外星人能接收到写入给他的文本。前往故事板，将一个标签拖放到外星人视图上。将其居中对齐，背景设为黄色，并清空其文本，如图\
    \ 2-42 所示。\n\n![images](img/9781430242727_Fig02-43.jpg)\n\n**图 2-43.** *创建新的标签\
    \ IBOutlet。*\n"
- fmt: "# 排版后内容\n\n9.  You need an outlet for the label you created in step 41, so\
    \ open the Assistant Editor and Control-drag from the label to the header file\
    \ and drop it below the `messageForAlien` property as illustrated in [Figure 2-43](#Chapter02.html#fig_2_43).\n\
    \n![images](images/9781430242727_Fig02-44.jpg)\n\n**Figure 2-44.** *Name it `lblMessageForAlien`.*\n\
    \n10.  Keep it as an Outlet and name it `lblMessageForAlien` as illustrated in\
    \ [Figure 2-44](#Chapter02.html#fig_2_44).\n\n![images](images/9781430242727_Fig02-45.jpg)\n\
    \n**Figure 2-45.** *Add code to assign text to your onscreen label.*\n\n11.  You\
    \ need to make sure that the `viewWillAppear` method will show the label’s text.\
    \ Go to the `AlienViewController.m` file and drag in \"19 AlienVC.m - add `viewWillAppear`\
    \ content\" as shown in [Figure 2-45](#Chapter02.html#fig_2_45) and illustrated\
    \ here:\n\n```\n-(void)viewWillAppear:(BOOL)animated\n{\n    [super viewWillAppear:animated];\n\
    \    // preset to switch is off\n    m_bIsAlienSeen = NO;\n\n    // place given\
    \ text on screen\n    lblMessageToAlien.text = self.messageForAlien\n}\n```\n\n\
    ![images](images/9781430242727_Fig02-46.jpg)\n\n**Figure 2-46.** *Adjust the `prepareForSegue`\
    \ method.*\n\n12.  Lastly, and this should look quite familiar to you, pass the\
    \ text to the Alien View by setting the Alien View property to the value of the\
    \ Main View property. Open `ViewController.m` and scroll down to the `prepareForSegue:`\
    \ method. Drag \"20 VC.m - add `prepareForSegue` content\" placing it within the\
    \ `if` statement after the `setDelegate:` call as shown in [Figure 2-46](#Chapter02.html#fig_2_46).\n\
    \n![images](images/9781430242727_Fig02-47.jpg)\n\n**Figure 2-47.** *Hello Mr.\
    \ Alien!*\n\n13.  You’ve completed modifying the code. Run the code on the iPhone\
    \ Simulator once again to prove that your changes work as expected. When the Main\
    \ View appears, enter text into your new text field. Click Find Alien, and when\
    \ the new view appears, there’s your message out in the Alien universe! [Figure\
    \ 2-47](#Chapter02.html#fig_2_47) shows what your result should look like.\n\n\
    Congratulations. You’ve just completed adding the code to receive text from the\
    \ user, passing it as a string from the source view to the destination view, and\
    \ showing it on the destination view when the view appears. Easy, right?\n\n###\
    \ Step 4: Custom Segue\n\nThis section demonstrates the ease with which you can\
    \ substitute a custom segue you created for the default segue you’ve been using.\n\
    \n![images](images/9781430242727_Fig02-48.jpg)\n\n**Figure 2-48.** *A new class\
    \ for your segue override*\n\n1.  To create a new view transition for segue use,\
    \ you now can simply create a specialized class of `UIStoryboardSegue` and override\
    \ the default `perform` method. Let’s create the new derived class by clicking\
    \ the `helloAlien` group in the Project Navigator and pressing `+N` (![images](images/U003.jpg))\
    \ as illustrated in [Figure 2-48](#Chapter02.html#fig_2_48). The new dialog appears.\
    \ Choose \"Objective-C Class\" and click Next.\n\n    ![images](images/9781430242727_Fig02-49.jpg)\n\
    \n    **Figure 2-49.** *Name it `CustomAlienSegue`.*\n\n2.  In the \"Choose options\
    \ for your new file\" dialog, enter the name `CustomAlienSegue` for your class.\
    \ Make it a subclass of `UIStoryboardSegue` as is illustrated in [Figure 2-49](#Chapter02.html#fig_2_49).\
    \ Click Next to create the class files.\n\n    ![images](images/9781430242727_Fig02-50.jpg)\n\
    \n    **Figure 2-50.** *Paste the new `CustomAlienSegue` code.*\n\n3.  In the\
    \ `CustomAlienSegue.m` file, delete all the code, leaving just the comments at\
    \ the top of the file. Now add your custom implementation by dragging in \"21\
    \ `CustomAlienSegue.m` - replace implementation\" as illustrated in [Figure 2-50](#Chapter02.html#fig_2_50).\n\
    \n    ![images](images/9781430242727_Fig02-51.jpg)\n\n    **Figure 2-51.** *Select\
    \ the Custom segue type.*\n\n4.  You need to tell the Storyboard to use your custom\
    \ segue. So go to the Storyboard file and select the segue (by clicking the circle\
    \ in the middle of the segue arrow between the two View Controllers). In the Utility\
    \ area’s Attribute Inspector, change the Storyboard Segue Style from Push to Custom\
    \ in the drop-down menu as illustrated in [Figure 2-51](#Chapter02.html#fig_2_51).\n\
    \n    ![images](images/9781430242727_Fig02-52.jpg)\n\n    **Figure 2-52.** *Enter\
    \ your new class name `CustomAlienSegue`.*\n\n5.  A Segue Class option appears.\
    \ Enter the custom segue’s name, `CustomAlienSegue`, as illustrated in [Figure\
    \ 2-52](#Chapter02.html#fig_2_52).\n\n    ![images](images/9781430242727_Fig02-53.jpg)\n\
    \n    **Figure 2-53.** *Custom segue fade.*\n\n6.  You’ve completed the modifications\
    \ for Step 4 of this chapter’s four steps. Run your application in the iPhone\
    \ Simulator to see the result of your latest work. When your application starts,\
    \ click Find Alien and watch your new custom segue in action (shown in [Figure\
    \ 2-53](#Chapter02.html#fig_2_53)). If the Main View faded out to black, and your\
    \ Alien View faded in from black, then you’ve activated the custom segue correctly.\
    \ Congratulations!\n\n**NOTE:** Are you wondering what the custom segue does?\
    \ We use a couple key facts to make a quick and simple effect. The `UIStoryboardSegue`\
    \ object, upon which our custom class is based, knows which `viewController` is\
    \ going away and which `viewController` is going to be shown. Also, to show or\
    \ hide a User Interface object (our views), you can adjust its alpha setting.\
    \ An alpha value of 1.0 is showing, and a value of 0.0 is hidden. This alpha change\
    \ can be animated. Using these facts, we created three methods as follows:\n\n\
    We override the only `UIStoryboardSegue` method `perform`. In our `perform` method,\
    \ we tell the leaving view to animate a fade-out (by adjusting its alpha from\
    \ 1.0 to 0.0 over time). But we also want to fade-in the appearing view, so we\
    \ tell the animation to call our `finishedFadeOut` method when the fade-out is\
    \ complete. In this `finishedFadeOut` method, we tell the view that’s going to\
    \ be shown to do a fade-in animation (again, by adjusting its alpha this time\
    \ from 0.0 to 1.0 over time) and when it’s been completed to call our final `finishedFadeIn`\
    \ method. In our last method we simply set our first view, which is no longer\
    \ showing, back to a faded-in state. See? Simple!\n\n## Chapter 3"
