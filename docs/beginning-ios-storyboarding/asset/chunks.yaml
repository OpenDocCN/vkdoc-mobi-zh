- fmt: '### Step 1: Setting Up the Data Connection and Displaying Geotagged Photos
    on a Map


    In the first step you’ll create a single-View scene in which, upon the app start,
    you’ll download the information about our geotagged photos from our Flickr account
    and display annotations on the map representing locations where the photos were
    taken. Note that for this application to run successfully, you must be connected
    to the Internet. You can follow along using the API key we have set up for this
    book, but if you want to use the Flickr service *in your own project* you will
    need to apply for your own unique API key. You can apply for an API key online
    at [`www.flickr.com/services/api/misc.api_keys.html`](http://www.flickr.com/services/api/misc.api_keys.html).


    1.  Open Xcode, press ![images](images/U003.jpg)![images](images/U004.jpg)`N`,
    and select a Single View Application. Name it `FlickrPhotoMap`. Name the Company
    Identifier `com.storyboarding`. We will not use a Class Prefix. Make sure to select
    iPhone in the Device Family drop-down and check both Use Storyboard and Use Automatic
    Reference Counting, as shown in [Figure 3-3](#Chapter03.html#fig_3_3). Once created,
    save it onto your desktop.


    ![images](images/9781430242727_Fig03-03.jpg)


    **Figure 3-3.** *Start with a Single View Application template.*


    **NOTE:** In this app you’ll be using `MapView` and Reverse Geocoding. To use
    those features you must link required frameworks to your project. Click the project
    title at the top of the Navigation tree. In the target settings on the right,
    select the Build Phases tab, open up the Link Binary With Libraries section, and
    click the plus button at the bottom. Then, in the pop-up window, search for `MapKit`,
    as shown in [Figure 3-4](#Chapter03.html#fig_3_4), select it in the list, and
    click the Add button. Repeat the steps again to add the `CoreLocation` framework.


    ![images](images/9781430242727_Fig03-04.jpg)


    **Figure 3-4.** *Add MapKit and CoreLocation frameworks to the project.*


    2.  If the newly added framework files end up outside the project Navigation tree,
    drag them into Frameworks group as shown in [Figure 3-5](#Chapter03.html#fig_3_5).
    You also need to drag the `Images` folder into the Xcode project. The folder is
    located in your download pack from the author''s site. Navigate to the `Images`
    folder and drag the entire folder, in as shown in [Figure 3-6](#Chapter03.html#fig_3_6).
    Also make sure the box “Copy items into destination group’s folder (if needed)”
    is checked, as shown in [Figure 3-7](#Chapter03.html#fig_3_7).


    ![images](images/9781430242727_Fig03-05.jpg)


    **Figure 3-5.** *Move newly added files to the Frameworks folder.*


    ![images](images/9781430242727_Fig03-06.jpg)


    **Figure 3-6.** *Drag the images for this app into the Supporting Files group.*


    ![images](images/9781430242727_Fig03-07.jpg)


    **Figure 3-7.** *“Copy images into destination group’s folder…” must be checked*


    3.  Now select both `ViewController.h` and `ViewController.m` files and hit Delete.
    In the confirmation dialog, click Move to Trash, not Remove References.

    4.  You will now create your own main View Controller. Hit ![images](images/U003.jpg)`N`
    and select the Objective-C class option as shown in [Figure 3-8](#Chapter03.html#fig_3_8).
    Click Next, select the `UIViewController` subclass, and name it `MapViewController`,
    as shown in [Figure 3-9](#Chapter03.html#fig_3_9). Do not change any options.
    Save it.


    ![images](images/9781430242727_Fig03-08.jpg)


    **Figure 3-8.** *Create a new Objective-C class.*


    ![images](images/9781430242727_Fig03-09.jpg)


    **Figure 3-9.** *Name new class MapViewController.*


    5.  Now go to the `MainStoryboard.storyboard` file, select the View Controller
    icon at the bottom of the main scene as shown in [Figure 3-10](#Chapter03.html#fig_3_10),
    open the Utilities Pane, select the Identity Inspector, and change the Custom
    Class to `MapViewController`. Save the changes.


    ![images](images/9781430242727_Fig03-10.jpg)


    **Figure 3-10.** *Select View Controller icon at the bottom of the main scene.*


    6.  Find `MapView` in the Object Library and drag it to the View Controller canvas
    as shown in [Figure 3-11](#Chapter03.html#fig_3_11).


    ![images](images/9781430242727_Fig03-11.jpg)


    **Figure 3-11.** *Place a MapView onto the main view.*


    7.  Also place an Activity Indicator on top of the `MapView` as shown in [Figure
    3-12](#Chapter03.html#fig_3_12), because it may take time to download data from
    the Internet, and it would be helpful to see the progress. Center it towards the
    top. Then, while it’s still selected, go to the Attributes Inspector and check
    the Hides When Stopped option.


    ![images](images/9781430242727_Fig03-12.jpg)


    **Figure 3-12.** *Drag an Activity Indicator onto the View.*


    8.  Click the Assistant icon. If Assistant doesn’t display the `MapViewController.h`
    file automatically, you can select it from Recent Files submenu under the Related
    Files Options menu (at the top of the screen divider as circled on [Figure 3-13](#Chapter03.html#fig_3_13)).
    You’ll now create and connect `IBOutlet`s for your `MapViewController` class.
    Control-drag from `MapView` onto the `MapViewController.h` file and drop it right
    before `@end` as shown in [Figure 3-13](#Chapter03.html#fig_3_13). Name it `mapView`.


    ![images](images/9781430242727_Fig03-13.jpg)


    **Figure 3-13.** *Control-drag from the MapView into the MapViewController.h file
    to create an IBOutlet.*


    9.  Repeat the process to create an `IBOutlet` for the Activity Indicator and
    name it `activityIndicator` as shown in [Figure 3-14](#Chapter03.html#fig_3_14).


    ![images](images/9781430242727_Fig03-14.jpg)


    **Figure 3-14.** *Create IBOutlet for the Activity Indicator.*


    10.  To be able to access `MapKit` features, you must import the framework’s header.
    Add `#import <MapKit/MapKit.h>` and specify that your `MapViewController` class
    is going to implement the `MKMapViewDelegate` protocol: add `<MKMapViewDelegate>`
    at the end of the line with class name declaration as shown in [Figure 3-15](#Chapter03.html#fig_3_15).


    ![images](images/9781430242727_Fig03-15.jpg)


    **Figure 3-15.** *Import MapKit header files.*


    11.  Turn off the Assistant. Open the `MapViewController.m` file. If Xcode has
    already created an empty private declaration section like the one highlighted
    on [Figure 3-16](#Chapter03.html#fig_3_16), remove it and replace it with the
    code shown in [Figure 3-17](#Chapter03.html#fig_3_17) (you can also achieve that
    by dragging and dropping the DemoMonkey step “01 MapViewController.m Private Declarations
    + API Constants” right before `@implementation`). Here you simply declare constants,
    variables, and signatures of the methods you need in this View Controller. You’re
    going to use these variables and methods to request and process the data from
    the Flickr service. You’ll discover what role each of these data members plays
    in the following steps. As mentioned earlier, to get access to the Flickr API,
    you must supply a unique API key in your web request. In this case, we also need
    to provide a user ID, because we only want to download photos from our own Flickr
    account. Both of those constants are defined here.


    ![images](images/9781430242727_Fig03-16.jpg)


    **Figure 3-16.** *Default private declaration section created by Xcode*


    ![images](images/9781430242727_Fig03-17.jpg)


    **Figure 3-17.** *Add private declaration section.*


    12.  To avoid any unexpected problems, add placeholders for the methods you’ve
    just declared. Insert the code shown in [Figure 3-18](#Chapter03.html#fig_3_18)
    at the bottom of the file right before `@end` (DemoMonkey step “02 MapViewController.m
    Methods Placeholders”). You’ll add implementation for these methods as you move
    along with the project.


    ![images](images/9781430242727_Fig03-18.jpg)


    **Figure 3-18.** *Add methods placeholders.*'
