    \ interact with it a bit more. You will create an additional Storyboarding scene,\
    \ which is going to contain a very simple static `TableView` fully created in\
    \ the Storyboard. Once the user clicks a thumbnail, which you’re going to add\
    \ to the Left Callout Accessory View of the annotation callout, you’ll present\
    \ a modal scene with a basic `TableView` displaying rating choices. When user\
    \ selects a cell in this `TableView`, the modal View Controller will be dismissed,\
    \ and the pin color of the affected annotation will change according to the rating\
    \ picked.\n\n1.  Open the Storyboard. Find a Table View Controller in the Object\
    \ Library and drag it onto Storyboard canvas right above the Photo View Controller\
    \ as shown in [Figure 3-54](#Chapter03.html#fig_3_54).\n\n    ![images](images/9781430242727_Fig03-54.jpg)\n\
    \n    **Figure 3-54.** *Add a Table View Controller to the Storyboard.*\n\n2.\
    \  You’re now going to use one of the best Storyboarding features—Cell Prototyping.\
    \ It makes customizing your `TableView` cells a real breeze.\n\n    First, select\
    \ the `TableView` and change the Row Height in the Size Inspector to 64\\. Then\
    \ drag an `ImageView` and a label into the cell as shown in [Figure 3-55](#Chapter03.html#fig_3_55).\n\
    \n    ![images](images/9781430242727_Fig03-55.jpg)\n\n    **Figure 3-55.** *Creating\
    \ a Prototype Cell.*\n\n3.  Select the `UIImageView` and set its `Image` property\
    \ to `BluePin.png` in the Attributes Inspector and then switch to the Size Inspector\
    \ and adjust Image View width and height as shown in [Figure 3-56](#Chapter03.html#fig_3_56).\
    \ Also make the label wider and set its text to “Decide later.” Re-align the elements\
    \ if needed to center them inside the cell. You can leave all other properties\
    \ as default.\n\n    ![images](images/9781430242727_Fig03-56.jpg)\n\n    **Figure\
    \ 3-56.** *Adjust and position cell elements.*\n\n4.  Select the `TableView` and\
    \ change its Content type to Static Cells and Style to Grouped as shown in [Figure\
    \ 3-57](#Chapter03.html#fig_3_57) (if the height of the cells shrank back to 44,\
    \ switch to the Size Inspector and set it to 64 again). Select the Table View\
    \ section by clicking on the striped background at the very top of the Table View\
    \ (you can also navigate to it by expanding the Document Outline pane located\
    \ on the left side of the Storyboard canvas). Change the Table View Section Rows\
    \ and Header properties as shown on [Figure 3-58](#Chapter03.html#fig_3_58). Lastly,\
    \ using the Attribute Inspector, change the label text and the image for each\
    \ cell to match the ones shown in [Figure 3-59](#Chapter03.html#fig_3_59) (use\
    \ `RedPin.png`, `GreenPin.png`, and `YellowPin.png` images respectively).\n\n\
    \    ![images](images/9781430242727_Fig03-57.jpg)\n\n    **Figure 3-57.** *Change\
    \ Table View properties.*\n\n    ![images](images/9781430242727_Fig03-58.jpg)\n\
    \n    **Figure 3-58.** *Change Table View Section properties.*\n\n    ![images](images/9781430242727_Fig03-59.jpg)\n\
    \n    **Figure 3-59.** *Change images and text for the rest of the static Table\
    \ View cells.*\n\n5.  Create a new segue between the MapView Controller and Table\
    \ View Controller by Control-dragging from the MapView Controller icon to the\
    \ Table View Controller as shown in [Figure 3-60](#Chapter03.html#fig_3_60). Release\
    \ it and select Modal for segue type from the menu. Select the new segue, set\
    \ its Identifier property in the Attributes Inspector to `ShowPinChoicesSegue`,\
    \ and change its Transition type to Flip Horizontal as shown in [Figure 3-61](#Chapter03.html#fig_3_61).\n\
    \n    ![images](images/9781430242727_Fig03-60.jpg)\n\n    **Figure 3-60.** *Control-drag\
    \ from the MapView Controller to the Table View Controller.*\n\n    ![images](images/9781430242727_Fig03-61.jpg)\n\
    \n    **Figure 3-61.** *Set segue attributes.*\n\n6.  In this step you’ll create\
    \ a new `UIViewController` subclass, which will control your Table View scene.\
    \ Hit ![images](images/U003.jpg)N, select the Objective-C class option, and click\
    \ Next. Make sure `UITableViewController` is selected as the Subclass option.\
    \ Name the class `PinSelectionViewController` and save it.\n\n    **NOTE:** Static\
    \ `TableView`s designed in a Storyboard can only be used with a `UITableViewController`\
    \ subclass.\n\n7.  In the Storyboard, select the Table View Controller and in\
    \ the Identity Inspector set its class to the newly created `PinSelectionViewController`\
    \ class as shown in [Figure 3-62](#Chapter03.html#fig_3_62).\n\n    ![images](images/9781430242727_Fig03-62.jpg)\n\
    \n    **Figure 3-62.** *Set the Table View Controller’s class to PinSelectionViewController.*\n\
    \n8.  Hit ![images](images/U003.jpg)N and select the Objective-C protocol option\
    \ as shown in [Figure 3-63](#Chapter03.html#fig_3_63). Click Next, name the file\
    \ `PinSelectionDelegateProtocol`, and save it.\n\n    ![images](images/9781430242727_Fig03-63.jpg)\n\
    \n    **Figure 3-63.** *Create an Objective-C protocol.*\n\n9.  Open the newly\
    \ added `PinSelectionDelegateProtocol.h` file and replace the code in it with\
    \ the one shown in [Figure 3-64](#Chapter03.html#fig_3_64) (DemoMonkey step “17\
    \ PinSelectionDelegateProtocol.h”). Here you define `AnnotationPinType` enum for\
    \ convenience and a method, which will be implemented by your `MapViewController`\
    \ class (this method will get called when the user selects the rating cell in\
    \ the Table View scene).\n\n    ![images](images/9781430242727_Fig03-64.jpg)\n\
    \n    **Figure 3-64.** *Add code to PinSelectionDelegateProtocol.h*\n\n10.  Go\
    \ to the `PinSelectionViewController.h` file and replace the code in it with that\
    \ shown in [Figure 3-65](#Chapter03.html#fig_3_65) (refer to DemoMonkey step “18\
    \ PinSelectionViewController.h Interface”). Here you’re creating two properties:\
    \ `delegate` and `currentPinType`. The first one will be used to notify your `MapViewController`\
    \ about user selection and update its UI. The second one will be used to display\
    \ the current rating of the photo. As always, go to `PinSelectionViewController.m`\
    \ and add `@synthesize` statements for both of the properties right below @implementation\
    \ (DemoMonkey step “19 PinSelectionViewController.m Synthesize Properties”):\n\
    \n    `#import \" PinSelectionViewController.h\"`\n    `@interface PinSelectionViewController\
    \ ()`\n    `@end`\n    `@implementation PinSelectionViewController`\n    **`@synthesize\
    \ delegate;`**\n    **`@synthesize currentPinType;`**\n    `…` ![images](images/9781430242727_Fig03-65.jpg)\n\
    \n    **Figure 3-65.** *Change the PinSelectionViewController class interface.*\n\
    \n11.  Scroll to the `#pragma mark - Table view data source` section of the code,\
    \ select everything all the way till `@end` and replace the selected code with\
    \ that shown in [Figure 3-66](#Chapter03.html#fig_3_66) (DemoMonkey step “20 PinSelectionViewController.m\
    \ TableView Delegate and Datasource Methods”). Note that because you’re using\
    \ a static Table View you don’t need to implement any standard Table View Data\
    \ Source methods. The only Data Source method we chose to implement is `tableView\
    \ willDisplayCell:forRowAtIndexPath:`. In this method we simply set the `accessoryType`\
    \ property of the cell, for which the `indexPath.row` matches the `currentPinType`,\
    \ to checkmark, thus indicating the current rating of the selected photo. In the\
    \ `tableView:didSelectRowAtIndexPath:` method you notify the delegate about the\
    \ row number that was selected by invoking the method you defined in `PinSelectionDelegateProtocol`.\
    \ The programming technique used here is one of the most common and most widely\
    \ used design patterns in iOS development (the delegate pattern).\n\n    ![images](images/9781430242727_Fig03-66.jpg)\n\
    \n    **Figure 3-66.** *Replace the TableViewDelegate and TableViewDataSource\
    \ methods.*\n\n12.  Go to the `PhotoAnnotation.h` file. First add `#import PinSelectionDelegateProtocol.h`\
    \ right above the `@interface`. Then create two new properties as shown in [Figure\
    \ 3-67](#Chapter03.html#fig_3_67) (DemoMonkey step “21 PhotoAnnotation.h Two New\
    \ Properties”). In `PhotoAnnotation.m` add `synthesize` `pinType` property only.\
    \ You don’t need to synthesize the `annotationViewImageName` property here because\
    \ it’s `readonly`, and you’re going to specify a custom getter for it in the next\
    \ step.\n\n    ![images](images/9781430242727_Fig03-67.jpg)\n\n    **Figure 3-67.**\
    \ *Modify the PhotoAnnotation.h file.*\n\n13.  Add the getter method for the `annotationViewImageName`\
    \ property as shown in [Figure 3-68](#Chapter03.html#fig_3_68) (refer to DemoMonkey\
    \ step “22 PhotoAnnotation.m Custom Getter Method for pinType Property”). In this\
    \ method you define the image name for annotation View based on its type, which\
    \ will be set when the user rates the photo represented by the annotation. The\
    \ default image for unrated photos will be `BluePin.png`.\n\n    ![images](images/9781430242727_Fig03-68.jpg)\n\
    \n    **Figure 3-68.** *Add the getter method for the annotationViewImageName\
    \ property.*\n\n14.  You need to modify a few things in the `MapViewController`\
    \ class. First go to `MapViewController.m` and import `PinSelectionViewController.h`\
    \ at the top of the file.\n15.  To add a button with a photo thumbnail, add the\
    \ code shown in [Figure 3-69](#Chapter03.html#fig_3_69) at the end of the `mapView:didSelectAnnotationView:`\
    \ method implementation (use the code from DemoMonkey step “[23 MapViewController.m\
    \ Add Left Callout Button Code”).\n\n    ![images](images/9781430242727_Fig03-69.jpg)\n\
    \n    **Figure 3-69.** *Modify the mapView:didSelectAnnotationView: method.*\n\
    \n16.  When the thumbnail is touched, the `onLeftCalloutAccessoryViewTouched`:\
    \ method will be called. Add implementation for this method as shown in [Figure\
    \ 3-70](#Chapter03.html#fig_3_70) (DemoMonkey step “[24 MapViewController.m onLeftCalloutAccessoryViewTouched:”).\
    \ In this method you invoke your second Storyboard Segue with the `ShowPinChoicesSegue`\
    \ Identifier, which will present a modal Table View Controller designed in the\
    \ Storyboard.\n\n    ![images](images/9781430242727_Fig03-70.jpg)\n\n    **Figure\
    \ 3-70.** *Add implementation for the onLeftCalloutAccessoryViewTouched: method.*\n\
    \n17.  Modify the `prepareForSegue:` method by inserting additional code at the\
    \ end of the method implementation as shown in [Figure 3-71](#Chapter03.html#fig_3_71)\
    \ (use DemoMonkey step “25 MapViewController.m Modify prepareForSegue:”). Here\
    \ you add a condition for the second segue, where you set the `PinSelectionViewController`’s\
    \ delegate and pass the current pin type of the selected annotation, so the correct\
    \ Table View cell is marked.\n\n    ![images](images/9781430242727_Fig03-71.jpg)\n\
    \n    **Figure 3-71.** *Modify the prepareForSegue: method.*\n\n18.  Scroll to\
    \ `mapView:viewForAnnotation:` and replace each occurrence of the string `@\"\
    PhotoAnnotation\"` and `@\"BluePin.png\"` with the following expression (as shown\
    \ in [Figure 3-72](#Chapter03.html#fig_3_72)):\n\n    `((PhotoAnnotation *)annotation).annotationViewImageName`\n\
    \n    There should be a total of three replacements. You’re doing this to distinguish\
    \ the annotations with different ratings. Because the annotation Views are being\
    \ constantly reused by the MapView, you must specify a unique `reuseIdentifier`\
    \ for each pin color. In this case the name of the pin image is perfectly suitable\
    \ to be used as `reuseIdentifier`. Because the default pin type is `BLUE_PIN =\
    \ 0`, each annotation will display blue by default.\n\n    ![images](images/9781430242727_Fig03-72.jpg)\n\
    \n    **Figure 3-72.** *Modify the mapView:viewForAnnotation: method.*\n\n19.\
    \  To make sure the right segue gets performed when one or the other Callout Accessory\
    \ View is touched, replace the last line of code in the `mapView:calloutAccessoryControlTapped:`\
    \ method with the one shown in [Figure 3-73](#Chapter03.html#fig_3_73) (DemoMonkey\
    \ step “[26 MapViewController.m Modify mapView:calloutAccessoryControlTapped:”).\n\
    \n    ![images](images/9781430242727_Fig03-73.jpg)\n\n    **Figure 3-73.** *Modify\
    \ the mapView:calloutAccessoryControlTapped: method.*\n\n20.  Now go to the `MapViewController.h`\
    \ file and add an `import` statement as shown in [Figure 3-74](#Chapter03.html#fig_3_74).\
    \ Also add a comma and add `PinSelectionDelegate` in the angle brackets of the\
    \ class declaration.\n\n    ![images](images/9781430242727_Fig03-74.jpg)\n\n \
    \   **Figure 3-74.** *Import PinSelectionDelegateProtocol.h in MapViewController.h.*\n\
    \n21.  Finally, implement the `PinSelectionDelegate` Protocol method as shown\
    \ in [Figure 3-75](#Chapter03.html#fig_3_75) (drag DemoMonkey step “28 MapViewController.m\
    \ Add Implementation for PinSelectionDelegate Protocol Method”). This method gets\
    \ called when user selects a cell in `PinSelectionViewController`’s Table View.\
    \ Here, you change the pin type based on the received rating, remove the selected\
    \ annotation from the MapView, and add it back in to force its annotation View\
    \ to reload. Last, dismiss the modal `PinSelectionViewController`.\n\n    ![images](images/9781430242727_Fig03-75.jpg)\n\
    \n    **Figure 3-75.** *Add the implementation for PinSelectionDelegate Protocol\
    \ method.*\n\n22.  Build and run. Congratulations! You should now be able to see\
    \ the screens as shown in [Figure 3-76](#Chapter03.html#fig_3_76) when you click\
    \ the left or right callout accessory View.\n\n![images](images/9781430242727_Fig03-76.jpg)\n\
    \n**Figure 3-76.** *Final look of the app.*"
  trans: "\n### 步骤 3：创建一个允许用户为照片打分的模态场景\n\n在这一步中，你将为应用增加一些趣味性，并让用户与之进行更多交互。你将创建一个额外的\
    \ Storyboarding 场景，其中包含一个在 Storyboard 中完全创建的、非常简单的静态 `TableView`。一旦用户点击了你将添加到标注标注气泡的左侧呼出辅助视图（Left\
    \ Callout Accessory View）中的缩略图，你将以模态场景的形式呈现一个带有基本 `TableView` 的评分选择界面。当用户在此 `TableView`\
    \ 中选择某个单元格时，模态视图控制器将被关闭，并且受影响的标注的大头针颜色将根据所选的评分发生变化。\n\n1.  打开 Storyboard。在对象库中找到\
    \ Table View Controller，将其拖拽到 Storyboard 画布上，位于 Photo View Controller 的正上方，如图\
    \ 3-54 所示。\n\n    ![images](img/9781430242727_Fig03-54.jpg)\n\n    **图 3-54.**\
    \ *在 Storyboard 中添加一个 Table View Controller。*\n\n2.  现在你将使用 Storyboarding 最强大的功能之一——Cell\
    \ 原型化。它能让自定义你的 `TableView` 单元格变得轻松自如。\n\n    首先，选择 `TableView`，并在 Size Inspector\
    \ 中将其行高（Row Height）修改为 64。然后，将一个 `ImageView` 和一个标签拖入单元格中，如图 3-55 所示。\n\n    ![images](img/9781430242727_Fig03-55.jpg)\n\
    \n    **图 3-55.** *创建原型单元格。*\n\n3.  选择 `UIImageView`，在 Attributes Inspector 中将其\
    \ `Image` 属性设置为 `BluePin.png`，然后切换到 Size Inspector，调整 Image View 的宽度和高度，如图 3-56\
    \ 所示。同时将标签加宽，并将文本设置为“稍后决定。”如有必要，重新对齐元素以便它们居中于单元格内。你可以将所有其他属性保留为默认值。\n\n    ![images](img/9781430242727_Fig03-56.jpg)\n\
    \n    **图 3-56.** *调整并定位单元格元素。*\n\n4.  选择 `TableView`，将其内容类型（Content）更改为静态单元格（Static\
    \ Cells），样式（Style）更改为分组（Grouped），如图 3-57 所示（如果单元格高度缩回为 44，请切换到 Size Inspector\
    \ 并将其重新设置为 64）。通过点击 Table View 最顶部的条纹背景来选择该 Table View 的节（section）（你也可以通过展开位于\
    \ Storyboard 画布左侧的文档大纲面板来导航到它）。更改 Table View 节的“行数”和“页眉”属性，如图 3-58 所示。最后，使用 Attributes\
    \ Inspector，将每个单元格的标签文本和图像修改为与图 3-59 中所示匹配（分别使用 `RedPin.png`、`GreenPin.png` 和\
    \ `YellowPin.png` 图像）。\n\n    ![images](img/9781430242727_Fig03-57.jpg)\n\n  \
    \  **图 3-57.** *更改 Table View 的属性。*\n\n    ![images](img/9781430242727_Fig03-58.jpg)\n\
    \n    **图 3-58.** *更改 Table View 节的属性。*\n\n    ![images](img/9781430242727_Fig03-59.jpg)\n\
    \n    **图 3-59.** *为其余的静态 Table View 单元格更改图像和文本。*\n\n5.  通过从 MapView Controller\
    \ 图标按住 Control 键拖拽到 Table View Controller 来创建一个新的 Segue，如图 3-60 所示。松开鼠标，并从菜单中选择“模态”（Modal）作为\
    \ Segue 类型。选择这个新 Segue，在 Attributes Inspector 中将其 `Identifier` 属性设置为 `ShowPinChoicesSegue`，并将其过渡（Transition）类型更改为“水平翻转”（Flip\
    \ Horizontal），如图 3-61 所示。\n\n    ![images](img/9781430242727_Fig03-60.jpg)\n\n\
    \    **图 3-60.** *从 MapView Controller 按住 Control 键拖拽到 Table View Controller。*\n\
    \n    ![images](img/9781430242727_Fig03-61.jpg)\n\n    **图 3-61.** *设置 Segue 属性。*\n\
    \n6.  在此步骤中，你将创建一个新的 `UIViewController` 子类，它将控制你的 Table View 场景。按下 ![images](img/U003.jpg)N，选择\
    \ Objective-C 类选项，然后点击“下一步”。确保在“子类”（Subclass）选项中选择了 `UITableViewController`。将该类命名为\
    \ `PinSelectionViewController` 并保存。\n\n    **注意：** 在 Storyboard 中设计的静态 `TableView`\
    \ 只能与 `UITableViewController` 子类一起使用。\n\n7.  在 Storyboard 中，选择 Table View Controller，并在\
    \ Identity Inspector 中将其类设置为你新创建的 `PinSelectionViewController` 类，如图 3-62 所示。\n\
    \n    ![images](img/9781430242727_Fig03-62.jpg)\n\n    **图 3-62.** *将 Table View\
    \ Controller 的类设置为 PinSelectionViewController。*\n\n8.  按下 ![images](img/U003.jpg)N，并选择\
    \ Objective-C 协议选项，如图 3-63 所示。点击“下一步”，将文件命名为 `PinSelectionDelegateProtocol` 并保存。\n\
    \n    ![images](img/9781430242727_Fig03-63.jpg)\n\n    **图 3-63.** *创建一个 Objective-C\
    \ 协议。*\n\n9.  打开新添加的 `PinSelectionDelegateProtocol.h` 文件，并将其中的代码替换为图 3-64 所示的代码（DemoMonkey\
    \ 步骤“17 PinSelectionDelegateProtocol.h”）。这里为了方便起见定义了一个 `AnnotationPinType` 枚举以及一个方法，该方法将由你的\
    \ `MapViewController` 类实现（当用户在 Table View 场景中选择评分单元格时，将调用此方法）。\n\n    ![images](img/9781430242727_Fig03-64.jpg)\n\
    \n    **图 3-64.** *在 PinSelectionDelegateProtocol.h 中添加代码。*\n\n10. 转到 `PinSelectionViewController.h`\
    \ 文件，将其中的代码替换为图 3-65 所示的代码（请参考 DemoMonkey 步骤“18 PinSelectionViewController.h Interface”）。这里你创建了两个属性：`delegate`\
    \ 和 `currentPinType`。第一个属性将用于通知你的 `MapViewController` 用户的选择并更新其 UI。第二个属性将用于显示当前照片的评分。和往常一样，转到\
    \ `PinSelectionViewController.m`，并在 `@implementation` 正下方为这两个属性添加 `@synthesize`\
    \ 语句（DemoMonkey 步骤“19 PinSelectionViewController.m Synthesize Properties”）：\n\n\
    \    ```\n    #import \" PinSelectionViewController.h\"\n    @interface PinSelectionViewController\
    \ ()\n    @end\n    @implementation PinSelectionViewController\n    @synthesize\
    \ delegate;\n    @synthesize currentPinType;\n    …\n    ```\n\n    ![images](img/9781430242727_Fig03-65.jpg)\n\
    \n    **图 3-65.** *更改 PinSelectionViewController 类的接口。*\n\n11. 滚动到代码的 `#pragma\
    \ mark - Table view data source` 部分，选择从那里一直到 `@end` 的所有内容，并将所选代码替换为图 3-66 中所示的代码（DemoMonkey\
    \ 步骤“20 PinSelectionViewController.m TableView Delegate and Datasource Methods”）。请注意，因为你使用的是一个静态的\
    \ Table View，所以无需实现任何标准的 Table View 数据源方法。我们选择实现的唯一数据源方法是 `tableView:willDisplayCell:forRowAtIndexPath:`。在此方法中，我们只需将\
    \ `indexPath.row` 与 `currentPinType` 匹配的单元格的 `accessoryType` 属性设置为复选标记，从而指示所选照片的当前评分。在\
    \ `tableView:didSelectRowAtIndexPath:` 方法中，通过调用你在 `PinSelectionDelegateProtocol`\
    \ 中定义的方法，将选中的行号通知给委托。这里使用的编程技术是 iOS 开发中最常见、应用最广泛的设计模式之一（委托模式）。\n\n    ![images](img/9781430242727_Fig03-66.jpg)\n\
    \n    **图 3-66.** *替换 TableViewDelegate 和 TableViewDataSource 方法。*\n\n12. 转到 `PhotoAnnotation.h`\
    \ 文件。首先在 `@interface` 正上方添加 `#import PinSelectionDelegateProtocol.h`。然后创建两个新的属性，如图\
    \ 3-67 所示（DemoMonkey 步骤“21 PhotoAnnotation.h Two New Properties”）。在 `PhotoAnnotation.m`\
    \ 中，仅添加 `@synthesize` `pinType` 属性。这里不需要为 `annotationViewImageName` 属性生成 getter\
    \ 方法，因为它是 `readonly` 的，你将在下一步为其指定一个自定义 getter 方法。\n\n    ![images](img/9781430242727_Fig03-67.jpg)\n\
    \n    **图 3-67.** *修改 PhotoAnnotation.h 文件。*\n\n13. 为 `annotationViewImageName`\
    \ 属性添加 getter 方法，如图 3-68 所示（请参考 DemoMonkey 步骤“22 PhotoAnnotation.m Custom Getter\
    \ Method for pinType Property”）。在此方法中，你根据标注的类型（该类型将在用户对标注所代表的照片进行评分时被设置）为标注视图定义图像名称。未评分照片的默认图像将是\
    \ `BluePin.png`。\n\n    ![images](img/9781430242727_Fig03-68.jpg)\n\n    **图 3-68.**\
    \ *为 annotationViewImageName 属性添加 getter 方法。*\n\n14. 你需要在 `MapViewController`\
    \ 类中修改一些内容。首先转到 `MapViewController.m`，并在文件顶部导入 `PinSelectionViewController.h`。\n\
    15. 要添加一个带有照片缩略图的按钮，请在 `mapView:didSelectAnnotationView:` 方法实现的末尾添加图 3-69 中所示的代码（使用\
    \ DemoMonkey 步骤“23 MapViewController.m Add Left Callout Button Code”中的代码）。\n\n\
    \    ![images    **图 3-69.** *修改 mapView:didSelectAnnotationView: 方法。*16. 当缩略图被触摸时，将调用\
    \ `onLeftCalloutAccessoryViewTouched:` 方法。为该方法添加实现，如图 3-70 所示（DemoMonkey 步骤“24\
    \ MapViewController.m onLeftCalloutAccessoryViewTouched:”）。在此方法中，你使用 `ShowPinChoicesSegue`\
    \ 标识符调用你的第二个 Storyboard Segue，这将呈现一个在 Storyboard 中设计的模态 Table View Controller。\
    \    ![images    **图 3-70.** *为 onLeftCalloutAccessoryViewTouched: 方法添加实现。*17.\
    \ 通过在方法实现的末尾插入额外的代码来修改 `prepareForSegue:` 方法，如图 3-71 所示（使用 DemoMonkey 步骤“25 MapViewController.m\
    \ Modify prepareForSegue:”）。这里你为第二个 Segue 添加了一个条件，在其中设置 `PinSelectionViewController`\
    \ 的委托并传递所选标注的当前大头针类型，以便正确的 Table View 单元格被标记出来。    ![images](img/9781430242727_Fig03-71.jpg)\n\
    \n    **图 3-71.** *修改 prepareForSegue: 方法。*\n\n18. 滚动到 `mapView:viewForAnnotation:`，并将每个出现的字符串\
    \ `@\"PhotoAnnotation\"` 和 `@\"BluePin.png\"` 替换为以下表达式（如图 3-72 所示）：\n\n    `((PhotoAnnotation\
    \ *)annotation).annotationViewImageName`\n\n    总共应该有三处替换。你这样做是为了区分具有不同评分的标注。由于标注视图会被\
    \ MapView 不断地重复使用，你必须为每一种大头针颜色指定一个唯一的 `reuseIdentifier`。在这种情况下，大头针图像的名称非常适合用作\
    \ `reuseIdentifier`。因为默认的大头针类型是 `BLUE_PIN = 0`，所以每个标注默认将显示蓝色。\n\n    ![images](img/9781430242727_Fig03-72.jpg)\n\
    \n    **图 3-72.** *修改 mapView:viewForAnnotation: 方法。*\n\n19. 为确保在触摸一个或另一个呼出辅助视图时执行正确的\
    \ Segue，请将 `mapView:calloutAccessoryControlTapped:` 方法中的最后一行代码替换为图 3-73 中所示代码（DemoMonkey\
    \ 步骤“26 MapViewController.m Modify mapView:calloutAccessoryControlTapped:”）。\n\
    \n    ![images    **图 3-73.** *修改 mapView:calloutAccessoryControlTapped: 方法。*20.\
    \ 现在转到 `MapViewController.h` 文件，并添加一条 `import` 语句，如图 3-74 所示。同时在类声明的尖括号中添加一个逗号并添加\
    \ `PinSelectionDelegate`。    ![images](img/9781430242727_Fig03-74.jpg)\n\n   \
    \ **图 3-74.** *在 MapViewController.h 中导入 PinSelectionDelegateProtocol.h。*\n\n\
    21. 最后，实现 `PinSelectionDelegate` 协议方法，如图 3-75 所示（拖入 DemoMonkey 步骤“28 MapViewController.m\
    \ Add Implementation for PinSelectionDelegate Protocol Method”）。当用户在 `PinSelectionViewController`\
    \ 的 Table View 中选择某个单元格时，会调用此方法。在这里，你根据接收到的评分更改大头针类型，从 MapView 中移除选中的标注，然后将其重新添加回来，以强制重新加载其标注视图。最后，关闭模态的\
    \ `PinSelectionViewController`。\n\n    ![images](img/9781430242727_Fig03-75.jpg)\n\
    \n    **图 3-75.** *为 PinSelectionDelegate 协议方法添加实现。*\n\n22. 构建并运行。恭喜！当您点击左侧或右侧的呼出辅助视图时，现在应该能够看到如图\
    \ 3-76 所示的界面。\n\n![images](img/9781430242727_Fig03-76.jpg)\n\n**图 3-76.** *应用的最终外观。*\n"
- fmt: '# Chapter 4


    # Building a Utility Application


    So far in this book you’ve built two Single View Applications with Storyboards.
    In [Chapter 2](#Chapter02.html#ch2) you built AlienView and in [Chapter 3](#Chapter03.html#ch3)
    you built FlickrPhotoMap. We are now moving forward, and you’re going to build
    a Utility Application using Storyboards. You typically use Utility Applications
    when you want to create easy-to-use apps that consist of two pages: a one-page
    Main View and a second View that comes with a flip animation transition. The Utility
    Application sets up these two pages with two essential buttons: an Info button
    and a Done button. The Info button flips the user from the Main View to the Flipside
    View, and the Done button flips the user back to the Main View.


    You may not know it but you’re probably very familiar with a Utility application
    that comes with your iPhone, and that is the Weather app, shown in [Figure 4-1](#Chapter04.html#fig_4_1).
    The Weather app is a perfect example of a Utility Application in the sense that
    it optimizes a simple task that requires a minimal amount of user interaction.


    The Utility Application is also one of three special templates in that it, along
    with the Navigation-Based Application and the Window-Based Application, are the
    only three project templates that offer the option to automatically include support
    for Core Data. Furthermore, the Utility Application is one of the most extensive
    templates in Xcode—it implements a fully working Utility Application right at
    the get-go.


    We introduce the Utility Application with Storyboarding by coding a very cool
    app that teaches musicians when to select a particular scale for a particular
    genre or mood. It displays finger notations on both acoustic guitar and electric
    guitar fretboards, along with accompanying sounds for each scale.


    ![images](images/9781430242727_Fig04-01.jpg)


    **Figure 4–1.** *The Weather app that comes along with the iPhone is probably
    the most famous and most used Utility Application.*


    ## utilityScales: A Utility App


    Let’s first talk about our utilityScales design decisions: We chose to illustrate
    the use of the Utility Application template by creating an application with which
    you can hear various scales on both acoustic and electric guitars. We chose eight
    musical scales to demonstrate this concept.


    We needed to display a list of scales and the genres and moods each scale would
    be associated with. With this in mind we decided to use the Table View already
    present in the Flipside View Controller to list the scales. We also selected the
    Subtitle layout for the table cells so that we could show both the category of
    each scale as well as its name. We chose the iPad layout because it gave us more
    room for the scale-fingering images. We created the assets for the program, which
    consisted of 8 scales each for two guitars, 16 associated scale-fingering diagrams,
    a smaller image of each guitar for the play buttons, a loading (or Default) screen,
    an application icon, and more. It meant a total of 16 audio recordings and 23
    graphic files in all.


    We decided to make the user interface somewhat nonstandard in that we wanted to
    have play/stop buttons for each guitar type. They both needed to have identical
    functionality, so we encapsulated their functionality in a dedicated `PlayButton`
    class. To incorporate the audio playback functionality—which consists of special
    configuration and methods to load the files, start and stop playback of each,
    and so on—we chose to encapsulate this functionality in its own class (an object
    with its own `.h`/`.m` files).


    Lastly, we have eight scales, each with two audio files, two images, a title,
    and a description—all of which we chose to store in instances of a new `Scale`
    class (also an object with its own `.h`/`.m` files). This lets us have eight initialization
    statements instead of having to initialize many different arrays with each of
    these attributes.


    In the Storyboard file we set up the initial background of the main display, the
    Navigation Bar for the display with its custom colors, and a semitransparent “pad”
    on which we placed the two play buttons programmatically. On the flipside portion
    of the Storyboard, we configured and named the single dynamic cell template and
    we configured the title bar coloring and text.


    We have divided this project into different phases: one for setting up the project
    in Xcode, one for setting up the Storyboard, and two for coding. They are as follows:


    *   *Setup*: Setting up with the template, adjusting the project settings, dragging
    in the assets, and adding the frameworks.

    *   *Prepping the Storyboard*: In the Main View and Second View, you’ll be tweaking
    the Navigation Bars, the colors and buttons and so forth, and adding `UIImagesViews`,
    `UITableViews`, and the landing Views.

    *   *Coding the Main ViewController*: Coding and connecting.


    ## Preliminaries


    Similarly to [Chapters 2](#Chapter02.html#ch2) and [3](#Chapter03.html#ch3), we
    supply you with all the files and code necessary for this chapter at [`http://bit.ly/sMRvAP`](http://bit.ly/sMRvAP)
    as illustrated in [Figure 4-2](#Chapter04.html#fig_4_2). Again, as always, take
    the time to clean up your desktop and download all image and audio files to your
    desktop, and you’re ready to roll. If you need more help, go to the forum at [`http://bit.ly/oLVwpY`](http://bit.ly/oLVwpY).
    In particular, make sure before you start that you’ve downloaded the DemoMonkey
    files at [`http://bit.ly/sMRvAP`](http://bit.ly/sMRvAP) and unzipped it on your
    desktop.


    ![images](images/9781430242727_Fig04-02.jpg)


    **Figure 4-2.** *Select Utility Application.*'
