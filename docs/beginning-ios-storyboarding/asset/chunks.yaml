- fmt: "![images](images/9781430242727_Fig08-47.jpg)\n\n**Figure 8-47.** *Connecting\
    \ the dataSource outlet*\n\n11.  In the dialog connection window that appears,\
    \ select `dataSource` nested inside the Outlets option as shown in Figure 8-47.\
    \ Repeat the exact same procedure to connect the `delegate` outlet of the Table\
    \ View.\n\n![images](images/9781430242727_Fig08-48.jpg)\n\n**Figure 8-48.** *Add\
    \ in two additional properties of `DBCategory` and `DBAuthor` type.*\n\n12.  Open\
    \ the Standard editor and open the `BooksViewController.h` file. Select all three\
    \ lines of default code and delete it. You want to add two additional properties\
    \ of categories and author into `BooksViewController`. Drag in the “21 BooksViewController.h\
    \ Interface” snippet from DemoMonkey and place it in the body of the view as shown\
    \ in Figure 8-48.\n\nThe two new properties are category and author:\n\n```\n\
    @property (nonatomic, strong) DBCategory *category;\n@property (nonatomic, strong)\
    \ DBAuthor *author;\n```\n\n![images](images/9781430242727_Fig08-49.jpg)\n\n**Figure\
    \ 8-49.** *Synthesize, import header files, and other tweaks*\n\n13.  Save your\
    \ work, leave `BooksViewController.h`, and open its implementation file. Type\
    \ in syntheses statements for `_tableView`, `_countLabel`, `category`, and `author`.\
    \ Additionally, you’ll need a variable to store the books in. Again, use a mutable\
    \ array and call it `_books`. To do this, add its declaration to the private interface\
    \ section right below the `@interface`. Make sure to enclose it in curly braces:\n\
    \n```\n@interface BooksViewController () {\n    NSMutableArray *_books;\n}\n```\n\
    \nNow you need to import the necessary header files. Drag in the “-- BooksViewController.h\
    \ Imports” snippet from DemoMonkey and place it directly under the only existing\
    \ header file `#import \"BooksViewController.h\"` as shown in Figure 8-49.\n\n\
    Lastly, on `viewDidLoad` you’ll populate the books array with `DBBook` objects.\
    \ Drag in the “22 BooksViewController.m ViewDidLoad” snippet from DemoMonkey and\
    \ place it in the `viewDidLoad` method directly under the `//Do any additional\
    \ setup …` comment as shown in Figure 8-49 and as follows:\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    // Do any additional setup after loading the\
    \ view.\n\n    if (self.category != nil) {\n        _books = [NSMutableArray arrayWithArray:self.category.books];\n\
    \    }\n    else if (self.author != nil) {\n        _books = [NSMutableArray arrayWithArray:self.author.books];\n\
    \    }\n    else {\n        _books = [NSMutableArray arrayWithArray:[DBBook allBooks]];\n\
    \    }\n}\n```\n\nYou can see you’re using the category property `self.category`\
    \ and the author property `self.author` to decide which books you need to display:\
    \ the ones that belong to a specified category or a selected author. However,\
    \ if none of those properties is defined by the user, you’ll display all the books\
    \ you have in the SQLite database:\n\n```\nelse {\n    _books = [NSMutableArray\
    \ arrayWithArray:[DBBook allBooks]];\n}\n```\n\n![images](images/9781430242727_Fig08-50.jpg)\n\
    \n**Figure 8-50.** *Set up the Table View to display books.*\n\n14.  To display\
    \ the books data in the Table View, you must implement the delegate methods. Drag\
    \ in the “23 BooksViewController.m Display Books” snippet from DemoMonkey and\
    \ place it right before the `@end` as shown in Figure 8-50.\n\nYou want the very\
    \ bottom cell of the Table View to display static content (“Add new” cell), which\
    \ will be visible at all times, and tapping this cell will allow the user to create\
    \ a new book record.\n\nTo achieve that, you do a little trick here in\n\n```\n\
    - (NSInteger)tableView:(UITableView *)tableView\nnumberOfRowsInSection:(NSInteger)section\n\
    ```\n\nby adding one extra row to your Table View in addition to the number of\
    \ objects you have in the `_books` array:\n\n```\nreturn _books.count + 1;\n```\n\
    \nThis guarantees that you’ll always have at least one cell in the Table View,\
    \ so you simply need to get your Table View to load the right Prototype cell from\
    \ the Storyboard, based on certain conditions.\n\nNotice that in this method you\
    \ also update the text of the `_countLabel`—this way it’s always up-to-date.\n\
    \nYou de-queue the appropriate cell by its identifier, `\"Cell\"` or `\"AddCell\"\
    `, which you’ve specified at design time:\n\n```\nNSString *cellIdentifier = (indexPath.row\
    \ < _books.count) ? @\"Cell\" :\n    @\"AddCell\";\n    CustomCell *cell = [tableView\n\
    \    dequeueReusableCellWithIdentifier:cellIdentifier];\n```\n\nBased on the reuse\
    \ identifier, you update the cell’s content accordingly:\n\n```\nif ([cell.reuseIdentifier\
    \ isEqualToString:@\"Cell\"]) {\n    DBBook *object = [_books objectAtIndex:indexPath.row];\n\
    \    cell.mainLabel.text = object.title;\n    cell.detailLabel1.text = object.author.fullName;\n\
    \    cell.detailLabel2.text = object.year;\n    cell.leftImageView.image = [UIImage\
    \ imageNamed:[NSString\n    stringWithFormat:@\"%@.png\", object.bookId]];\n}\n\
    ```\n\n**NOTE:** The cell’s reuse identifier is the means for you to tell your\
    \ Table View what kind of Storyboard Prototype cell you want to be de-queued and\
    \ displayed for a certain row. Thus, it’s very important to set the identifiers\
    \ correctly. If the identifier isn’t set or is invalid, the `dequeueReusableCellWithIdentifier:cellIdentifier`\
    \ method will return nil, and the app will crash. This is one the most common\
    \ mistakes when prototyping Table View cells in a Storyboard.\n\n![images](images/9781430242727_Fig08-51.jpg)\n\
    \n**Figure 8-51.** *Set up editing mode.*\n\n15.  Add the methods that will allow\
    \ the user to edit the Table View and remove the book records. Drag in the “24\
