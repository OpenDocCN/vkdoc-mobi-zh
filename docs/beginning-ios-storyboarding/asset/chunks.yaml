  trans: "\n# 编写“添加图书”视图控制器\n\n![images](img/9781430242727_Fig08-19.jpg)\n\n**图 8-19.**\
    \ *创建下一个类 AddBookViewController。*\n\n1. 按下 ![images](img/U003.jpg)+N 创建一个新子类，选择\
    \ Objective-C 类后，点击“下一步”。将其命名为 `AddBookViewController`，并设为 `UITableViewController`\
    \ 的子类，如图 8-19 所示。保存后，首先需要为其添加输出口，那么我们先回到 Storyboard。\n\n![images](img/9781430242727_Fig08-20.jpg)\n\
    \n**图 8-20.** *为 AddBookViewController 添加输出口。*\n\n2. 打开 Storyboard，选择“添加图书”表格视图控制器，操作方式与你在图\
    \ 8-18 中选择 Selection 视图控制器相同。选中表格视图控制器后，前往标识检查器，将类设置为你刚创建的 `AddBookViewController`，如图\
    \ 8-20 所示。\n\n![images](img/9781430242727_Fig08-21.jpg)\n\n**图 8-21.** *选择 AddBookViewController\
    \ 的实现文件。*\n\n3. 切换到助理编辑器模式。在右侧窗格中，你会看到 Xcode 默认显示头文件。你需要操作的是实现文件，因此在头文件代码上方的选择栏中选择实现文件，如图\
    \ 8-21 所示。\n\n![images](img/9781430242727_Fig08-22.jpg)\n\n**图 8-22.** *为标题和年份属性创建输出口。*\n\
    \n4. 首先需要为图书的标题和年份创建输出口。点击标题标签右侧的标题文本字段区域一次，然后按住 Control 键拖拽到 `@interface` 下方的实现文件中，如图\
    \ 8-22 所示。在弹出的对话框中命名为 `_titleTextField`。对年份文本字段重复相同操作，命名为 `_yearTextField`。现在你的输出口代码应该如下所示：\n\
    \n```\n#import \"AddBookViewController.h\"\n\n@interface AddBookViewController\
    \ () {\n    NSMutableDictionary *_bookDict;\n}\n\n@property (weak, nonatomic)\
    \ IBOutlet UITextField *_titleTextField;\n@property (weak, nonatomic) IBOutlet\
    \ UITextField *_yearTextField;\n...\n```\n\n![images](img/9781430242727_Fig08-23.jpg)\n\
    \n**图 8-23.** *为描述文本创建输出口。*\n\n5. 这里你还需要再创建一个 `IBOutlet`。关键是要确保只点击文本字段（如图 8-23\
    \ 所示），并且只点击一次。正确选中后，按住 Control 键拖拽到实现文件中，并将输出口命名为 `_descriptionTextView`，如下所示：\n\
    \n```\n#import \"AddBookViewController.h\"\n\n@interface AddBookViewController\
    \ () {\n    NSMutableDictionary *_bookDict;\n}\n\n@property (weak, nonatomic)\
    \ IBOutlet UITextField *_titleTextField;\n@property (weak, nonatomic) IBOutlet\
    \ UITextField *_yearTextField;\n@property (weak, nonatomic) IBOutlet UITextView\
    \ *_descriptionTextView;\n...\n```\n\n在此文本视图处于焦点时，你可以清空其中的文本内容，因为用户创建新书时会在其中输入数据。因此，仍在选中文本视图的状态下，前往属性检查器，删除文本框中的所有文本。\n\
    \n![images](img/9781430242727_Fig08-24.jpg)\n\n**图 8-24.** *为文本字段设置委托。*\n\n6.\
    \ 你需要将文本字段的委托设置为“添加图书”视图控制器，以便保存用户输入的数据。按住 Control 键，从标题文本字段拖拽到 Dock 中的表格视图控制器图标，如图\
    \ 8-24 所示。会出现另一个连接对话框，包含分为两部分选项：Storyboard 转场和输出口。你需要将其设为输出口，因此选择嵌套在输出口选项下的“委托”。对年份文本字段重复完全相同的过程。\n\
    \n![images](img/9781430242727_Fig08-25.jpg)\n\n**图 8-25.** *为描述文本视图设置委托。*\n\n\
    7. 现在你需要为描述文本视图设置委托。按图 8-25 所示，从文本视图按住 Control 键拖拽。同样，你需要将其设为输出口，因此选择嵌套在输出口选项下的“委托”。\n\
    \n![images](img/9781430242727_Fig08-26.jpg)\n\n**图 8-26.** *编辑新的接口。*\n\n8. 关闭助理编辑器，打开标准编辑器。打开\
    \ `AddBookViewController.h` 头文件，以便修改接口。删除默认出现的三行代码，替换为你在 DemoMonkey 中保存的下一个代码片段。从\
    \ DemoMonkey 中拖入“15 AddBookViewController.h 接口和协议”片段，放置在你刚删除原始头文件文本的位置。如图 8-26\
    \ 所示。\n\n你在头文件中包含的 `delegate` 属性和 `AddBookVCDelegate` 协议：\n\n```\n@property (nonatomic,\
    \ assign) id<AddBookVCDelegate> delegate;\n```\n\n将用于在创建新的数据库实体时通知父视图控制器，该实体将被传递到实现文件以便显示，具体如下：\n\
    \n```\n- (void)addBookVC:(AddBookViewController *)aVC didCreateObject:(id)anObject;\n\
    ```\n\n在忘记之前，我们来合成委托。\n\n![images](img/9781430242727_Fig08-27.jpg)\n\n**图 8-27.**\
    \ *合成委托。*\n\n9. 打开 `AddBookViewController.m` 文件，按图 8-27 和以下代码所示，合成委托：\n\n```\n\
    @interface AddBookViewController () {\n    ...\n    ...\n    @end\n\n@implementation\
    \ AddBookViewController\n    @synthesize _titleTextField;\n    @synthesize _yearTextField;\n\
    \    @synthesize _descriptionTextView;\n    @synthesize delegate;\n...\n```\n\n\
    ![images](img/9781430242727_Fig08-28.jpg)\n\n**图 8-28.** *添加可变字典并 #import 你的数据库实体。*\n\
    \n10. 当用户输入新图书的信息（如标题、年份和图书描述）时，你需要一个地方安全地临时存储这些数据，直到他们点击“保存”。实现方法有很多：其中一种是使用可变字典。这意味着你需要一个\
    \ `NSMutableDictionary` 实例变量，稍后你将从中创建新实体。将其命名为 `_bookDict`。在 `@interface` 下方的私有声明部分的一对花括号内声明它，如以下代码所示。你需要导入所有数据库实体。从\
    \ DemoMonkey 中拖入“-- AddBookViewController.m Imports”片段，放在 `#import` 下方，如图 8-28\
    \ 和以下代码所示。\n\n```\n#import \"AddBookViewController.h\"\n#import \"DBBook.h\"\n\
    #import \"DBCategory.h\"\n#import \"DBAuthor.h\"\n\n@interface AddBookViewController\
    \ () {\n    NSMutableDictionary *_bookDict;\n}\n\n@property (weak, nonatomic)\
    \ IBOutlet UITextField *_titleTextField;\n...\n...\n```\n\n![images](img/9781430242727_Fig08-29.jpg)\n\
    \n**图 8-29.** *引入文本字段委托方法。*\n\n11. 由于这是一个静态表格视图，你无需实现 `dataSources` 或委托方法，因此删除从\
    \ `shouldAutorotateToInterface` 旋转方法结尾到 `@end` 之前的所有内容。在此位置引入你确实需要的内容，例如文本字段委托方法和文本视图委托方法，这将帮助你在用户输入信息时保存数据。从文本字段委托方法开始，从\
    \ DemoMonkey 中拖入“16 AddBookViewController.m Text Field Delegate Methods”片段，放在\
    \ `@end` 之前。它应该看起来像图 8-29 所示。\n\n![images](img/9781430242727_Fig08-30.jpg)\n\n\
    **图 8-30.** *引入文本视图委托方法。*\n"
- fmt: "12. Continuing with the text view delegate methods, drag in the \"17 AddBookViewController.m\
    \ Text View Delegate Methods\" snippet from DemoMonkey and place it between the\
    \ `@end` and the text field delegate method you placed in [Figure 8-29](#Chapter08.html#fig_8_29).\
    \ This is illustrated in [Figure 8-30](#Chapter08.html#fig_8_30).\n\n**NOTE:**\
    \ The delegate methods you added in the last two steps are part of the standard\
    \ `UITextFieldDelegate` and `UITextViewDelegate` protocols declared in the UIKit\
    \ framework. These methods are the most common way to pass notifications from\
    \ your text fields and Text Views about changes in their editing state. In your\
    \ case, simply save the data typed by the user into the `_bookDict` dictionary\
    \ object once each `UITextField` (or `UITextView`) notifies your `AddBookViewController`,\
    \ which you assigned to be the delegate, that the user finished editing. The latter\
    \ is achieved via `textFieldDidEndEditing:` (`textViewDidEndEditing:`) method\
    \ callbacks, which get invoked every time a text field (Text View) loses focus\
    \ or programmatically resigns First Responder after a Return key is pressed. The\
    \ data collected into the `_bookDict` dictionary will eventually be saved into\
    \ the database once the editing is complete and the Save button is pressed.\n\n\
    ![images](images/9781430242727_Fig08-31.jpg)\n\n**Figure 8-31.** *Implement the\
    \ prepareForSegue: method.*\n\n13. Still in the `AddBookViewController.m` file,\
    \ implement the `prepareForSegue:` method. Drag in the \"18 AddBookViewController.m\
    \ prepareForSegue\" snippet from DemoMonkey and place it just before the `@end`\
    \ as shown in [Figure 8-31](#Chapter08.html#fig_8_31).\n\nIn this method you first\
    \ check for the segue identifier\n\n```\nif ([[segue identifier] isEqualToString:@\"\
    SelectCategory\"]) {\n    …\n```\n\nor\n\n```\nif ([[segue identifier] isEqualToString:@\"\
    SelectAuthor\"]) {\n    …\n```\n\nand then you pass the array of categories\n\n\
    ```\n[(SelectionViewController *)[segue destinationViewController]\n    setObjects:[DBCategory\
    \ allCategories]];\n```\n\nor the array of authors\n\n```\n[(SelectionViewController\
    \ *)[segue destinationViewController]\n    setObjects:[DBAuthor allAuthors]];\n\
    ```\n\nto the destination View Controller, which is the `SelectionViewController`\
    \ in both cases.\n\nFinally, you set the delegate of the `SelectionViewController`\
    \ to your `AddViewController` so that once the user selects an author or a category,\
    \ you can save that selection into your `_bookDict` dictionary:\n\n```\n[(SelectionViewController\
    \ *)[segue destinationViewController]\n    setDelegate:self];\n```\n\n![images](images/9781430242727_Fig08-32.jpg)\n\
    \n**Figure 8-32.** *Implement the delegate method to choose category or author.*\n\
    \n14. Continuing to focus on the code users will need as they enter a new book,\
    \ author, and category, you still have a couple more chores to fulfill. Once the\
    \ user selects the category or the author, you want to receive a delegate callback\
    \ from the `SelectionViewController`, so you need to implement this delegate method.\
    \ Drag in the \"19 AddBookViewController.m Choose Category of Author\" snippet\
    \ from DemoMonkey and place it just before the `@end` as shown in [Figure 8-32](#Chapter08.html#fig_8_32).\n\
    \nYou defined this delegate method in the `SelectionViewController.h` file:\n\n\
    ```\n- (void)selectionVC:(SelectionViewController *)aVC\n    didSelectObject:(id)anObject;\n\
    ```\n\nHere, based on what kind of class the received object is,\n\n```\nif ([anObject\
    \ isKindOfClass:[DBCategory class]]) {\n```\n\nyou'll either save the category\
    \ ID\n\n```\n[_bookDict setObject:((DBCategory *)anObject).categoryId forKey:@\"\
    categoryId\"];\n```\n\nor the author ID\n\n```\n[_bookDict setObject:((DBAuthor\
    \ *)anObject).authorId forKey:@\"authorId\"];\n```\n\nand display the category\
    \ name\n\n```\ncell.textLabel.text = ((DBCategory *)anObject).categoryName;\n\
    ```\n\nor display the author name\n\n```\ncell.textLabel.text = ((DBAuthor *)anObject).fullName;\n\
    ```\n\nin the corresponding cell. After all that's done, you'll pop the View Controller\
    \ off the stack\n\n```\n[self.navigationController popViewControllerAnimated:YES];\n\
    ```\n\nso the user can return back to the `AddBookViewController` and continue\
    \ editing book info.\n\n![images](images/9781430242727_Fig08-33.jpg)\n\n**Figure\
    \ 8-33.** *Implement two IBActions for the Save and Cancel buttons.*\n\n15. The\
    \ last thing you need to do here in the `AddBookViewController.m` is implement\
    \ two IBActions, one for the Save button and another for the Cancel button. Drag\
    \ in the \"20 AddBookViewController.m IBAction\" snippet from DemoMonkey and place\
    \ it just before the `@end` as shown in [Figure 8-33](#Chapter08.html#fig_8_33).\n\
    \nFor the Cancel button, you have the `cancelPressed:` method\n\n```\n- (IBAction)cancelPressed:(id)sender\
    \ {\n```\n\nin which you'll simply dismiss the `ModalViewController` without saving\
    \ any changes:\n\n```\n[self dismissModalViewControllerAnimated:YES];\n```\n\n\
    In the `savePressed:` method,\n\n```\n- (IBAction)savePressed:(id)sender\n```\n\
    \nwill resign the First Responders (title, year, or description text fields) if\
    \ there are any. This will dismiss the keyboard if it's still up:\n\n```\n[self._titleTextField\
    \ resignFirstResponder];\n[self._yearTextField resignFirstResponder];\n[self._descriptionTextView\
    \ resignFirstResponder];\n```\n\nYou then verify that the user has modified any\
    \ fields so that the book info dictionary has been created and isn't nil. And\
    \ you create a new entity from the `_bookDict` dictionary using the `DBBook` helper\
    \ method you implemented in [Chapter 6](#Chapter06.html#ch6):\n\n```\nif (_bookDict\
    \ != nil) {\n    DBBook *newBook = [DBBook createEntityWithDictionary:_bookDict];\n\
    ```\n\nFinally, you notify the delegate about the creation of this object so it\
    \ can be added to the list of books right away if needed:\n\n```\nif ([self.delegate\
    \ respondsToSelector:@selector(addBookVC:didCreateObject:)]) {\n    [self.delegate\
    \ addBookVC:self didCreateObject:newBook];\n```\n\nAnd dismiss the `AddBookViewController`:\n\
    \n```\n[self dismissModalViewControllerAnimated:YES];\n```\n\n![images](images/9781430242727_Fig08-34.jpg)\n\
    \n**Figure 8-34.** *Connect the IBActions you created.*\n\n16. Now you need to\
    \ connect the IBActions you created for the Edit and Cancel buttons. So save your\
    \ work and open the Storyboard. Go to Add Book and Control-drag from the Save\
    \ button to the Add Book View Controller as shown in [Figure 8-34](#Chapter08.html#fig_8_34).\n\
    \n![images](images/9781430242727_Fig08-35.jpg)\n\n**Figure 8-35.** *Select savePressed:\
    \ Sent Actions.*\n\n17. When the pop-up appears, select the `savePressed:` method\
    \ nested inside the Sent Actions section as shown in [Figure 8-35](#Chapter08.html#fig_8_35).\n\
    \n![images](images/9781430242727_Fig08-36.jpg)\n\n**Figure 8-36.** *Repeat for\
    \ Cancel.*\n\n18. Control-drag from Cancel to the Add Book View Controller as\
    \ shown in [Figure 8-36](#Chapter08.html#fig_8_36). This time, however, when the\
    \ pop-up appears, select the `cancelPressed:` option nested inside the Sent Actions\
    \ options as you did in [Figure 8-35](#Chapter08.html#fig_8_35)."
