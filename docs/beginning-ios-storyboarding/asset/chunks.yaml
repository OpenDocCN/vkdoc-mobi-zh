  trans: '

    # 基础


    随着 iOS 5 的发布，苹果为 iOS 开发者提供了包含超过 1500 个 API 的更新版 SDK，其中**故事板（Storyboarding）** 是最引人入胜的功能之一。


    那么，什么是故事板？它又如何让 iOS 开发者的工作变得更加轻松呢？


    在介绍故事板时，我们将一步步探索这个出色的新工具。故事板允许你利用 Xcode 设计工具中内置的新故事板功能来布局应用的工作流程。故事板专为使用导航栏和标签栏在视图之间进行切换的应用而设计，通过为你管理视图控制器来简化开发过程。你可以指定在视图间切换时使用的转场和连线（segues），而无需手动编写代码。通过故事板，你可以无缝交互并连接应用中的所有屏幕，免去了在屏幕间转场以及触发转场的控件所需编写的繁琐代码。这让你能以图形化方式查看应用中所有可能的路径，极大地减少了为复杂的多视图应用编写代码的工作量。


    在深入探讨使用故事板创建应用的所有细节之前，让我们先快速了解一下这个新开发者工具背后的原理。


    你可能已经知道，自 Xcode 4 发布以来，界面构建器（IB）已完全集成到 Xcode IDE 中，因此不再需要单独的应用程序来构建用户界面（UI）。在项目中选择一个界面文件（`.nib`/`.xib`）即可在
    Xcode 中打开 IB 编辑器，在那里你可以随心所欲地调整 UI。


    故事板是 Xcode 4.2 中引入的一种新的 IB 文件，它允许你在一个地方查看应用的整个 UI，包括应用各部分之间的转场以及触发这些转场的控件，因此你可以非常方便地概览整个应用。它类似于
    `.nib`/`.xib` 文件，区别在于它为你管理多个视图控制器，并允许你指定从一个视图切换到另一个视图时使用的转场，而无需手动编码。你可以将故事板视为一组迷你
    `.xib` 文件及其之间的转场和/或关系的集合。


    借助内置的故事板功能，你现在可以在编写任何代码之前，以可视化的方式布局应用的工作流程！它还能减少为复杂的多屏幕应用编写代码的工作量。


    是否曾好奇神秘的 `.storyboard` 文件背后是什么？答案可能会让你惊讶：它是 XML（可扩展标记语言）——没错，就是那个在 Web 服务器通信和各种
    Web 应用中广泛使用的老牌 XML。因此，在底层，故事板只是一个以特殊方式格式化的文本文档，它定义了应用 UI 的对象图，iOS 在运行时根据文档中指定的规则解释并渲染
    UI 元素。这个 XML 文件记录了故事板中每个 UI 元素的所有属性，以及它们之间的转场和/或关系。


    事实上，你可以亲自验证这一点。打开 Xcode 并创建一个新项目。在第一个对话框屏幕中选择“单视图应用”模板。点击“下一步”。为你喜欢的项目命名，但确保勾选了“使用故事板”选项。将其保存到你喜欢的位置。打开新项目后，你会看到
    Xcode 为你创建了一个名为 `MainStoryboard.storyboard` 的文件。在项目导航器中选择该文件，如图 2.0A 所示。现在，点击主工具栏右上角的“版本编辑器”图标，然后点击右下角的“日志模式”图标，如图
    2-0B 所示。你现在可以看到故事板文件背后的 XML 了。是不是不太美观？想象一下，当你向其中添加大量 UI 元素后，它会变得多么复杂和难以阅读？幸运的是，界面构建器会以图形元素的形式为你优雅地渲染它，与原始
    XML 相比，交互体验要愉悦得多。


    ![images](img/9781430242727_Fig02-0A.jpg)


    **图 2-0A.** *单视图应用模板的标准故事板文件*


    ![images](img/9781430242727_Fig02-0B.jpg)


    **图 2-0B.** *以 XML 文档形式查看的故事板文件*


    现在你已了解故事板实现背后的秘密，让我们快速一瞥它初看起来的样子。


    你可能已经注意到，Xcode 为单视图应用模板创建的基本故事板与你之前见过的任何常规 `.xib` 文件几乎相同，只有少数例外：有一个指向主视图的传入箭头，并且在主视图下方有一个写着“视图控制器”的黑色容器。这两个元素都有非常明确的用途。由于故事板可以包含多个视图控制器，你需要一种方法来指定应用启动时应加载哪一个；箭头指向的视图控制器将是应用启动时呈现给用户的第一个视图。要更改应用的初始视图控制器，请将箭头拖放到故事板中你想要首先呈现的任何视图控制器上。


    那么黑色容器呢？它是每个视图控制器场景所谓的“停靠栏”。如前所述，故事板可以被视为一组 nib 文件，每个 nib 文件都由一个视图控制器类（默认或自定义）和一个第一响应者控制。


    **注意：** 第一响应者是一个占位符对象，代表响应者链中的第一个对象，由 UIKit 框架在运行时动态确定。该对象首先接收多种事件，例如触摸、按键事件、动作消息等。在
    iOS 应用中，没有单一的第一响应者对象——第一响应者始终是触摸目标所在的视图，通常是当前选中的对象或最前面窗口中具有当前焦点的对象。


    停靠栏让你可以轻松访问刚才描述的两个对象，在常规的 nib 文件中，你通常会在文档大纲的顶部看到它们。通过点击停靠栏，你可以看到代表视图控制器和第一响应者占位符对象的图标，如图
    2-0C 所示。你可以使用这些引用图标快速连接 `IBOutlet` 并为你的 UI 元素指定 `IBAction`。故事板中的每个视图控制器都有一组这两个对象，因此你可以通过每次只专注于一个特定屏幕，方便地编辑每个故事板场景的所有必要细节。此外，停靠栏可能包含添加到场景中的其他对象，例如手势识别器、导航项等。当你进行实际编码时，你会更好地理解如何使用它们。


    ![images](img/9781430242727_Fig02-0C.jpg)


    **图 2-0C.** *带有第一响应者和视图控制器对象的场景停靠栏*

    '
- fmt: 'We’ll give you a short overview of the main high-level concepts you should
    understand before we start Storyboarding apps.


    [Figure 2-0D](#Chapter02.html#fig_2_0D) depicts the main components of a standard
    Storyboard file that gets created for you by Xcode when you pick a Master-Detail
    Application template for your project. We’ll now explain the role those key components
    play and how they fit together.


    ![images](images/9781430242727_Fig02-0D.jpg)


    **Figure 2-0D.** *Storyboards’ Master-Detail Application template*


    There are two main concepts in Storyboarding: scene and segue.


    *Scene* is a View Controller that either represents a screen in the app or just
    one major component area (like a split View pane in a Split View Controller).
    You can do everything here you used to do in a nib file: drag and rearrange UI
    elements (like labels, text fields, and images), resize them, set their properties
    in the Attribute Inspector, and so on.


    *Segue* defines navigation in your Storyboard. It indicates how to get from point
    A to B. You usually create a segue by picking an event source (like a button or
    a table View cell) and choosing a scene to transition to. You can also choose
    the type of animation you want to use. All Apple built-in animations are available
    to you by making a simple selection. Additionally, you can even create your own
    custom animations for custom segues.


    As a result, you use scene and segue to build your application UI.


    **NOTE:** You can have multiple Storyboards in your app. You just need to specify
    the name of the main one in your `[appName]-Info.plist` under the “Main storyboard
    file base name” key, which has the default value `MainStoryboard`.


    You start with a View Controller object that represents your first scene (the
    initial View Controller). To get View Controllers for your Storyboard, you select
    Objects and Controllers from the Object Library (just as you did with all other
    UI elements in nib files) and drag the View Controllers you need onto the Storyboard
    canvas. Each View Controller always manages a single scene of your app.


    **NOTE:** On the iPhone, each scene represents the contents of a single screen.
    For iPad applications, a screen can be composed of the contents of more than one
    scene (as in the case of a Split View Controller).


    One of the most important concepts is how data is passed around. Here is a very
    classic scenario: a Master-Detail application where you display some data in a
    Table View, and when user taps on a cell, a Detail View is presented that displays
    additional information about the selection. In this case you must send a reference
    to the selected object to the Detail View so it knows exactly what to display.


    Storyboarding comes with an API for that. A method called `prepareForSegue:sender:`
    on every `UIViewController`, and it is intended to be overridden. You can write
    code here that will take effect whenever each segue fires.


    Segues are UI elements just like labels and Image Views are. You can select a
    segue in the Storyboard and inspect its properties. You can distinguish between
    segues by checking each segue''s identifier property, which can be set in the
    Attributes Inspector. We show you how to do that and we cover several other major
    Storyboarding aspects in this chapter.


    ![images](images/9781430242727_Fig02-0E.jpg)


    **Figure 2-0E.** *Storyboarding in use in the professional environment.*


    To illustrate that Storyboards are indeed used quite extensively, even for large-scale
    projects, [Figure 2-0E](#Chapter02.html#fig_2_0E) shows one of nine Storyboard-based
    projects being used at one of the author’s clients. This figure is indicative
    of how, even at the professional level, Storyboards are here to stay.


    So without further ado, let’s get going.


    ### helloAlien: A Quick Example Application


    We’ll start by introducing you to our four fundamental concepts of Storyboarding:


    *   Easily create transitions between views with little or no code.

    *   Pass information back from a Secondary View to a Main View.

    *   Send information to a Secondary View from a Main View.

    *   Transition between views with user-created visual effects.


    In our example application we demonstrate these four concepts by


    *   Creating a button that invokes a transition from a Main View to a Secondary
    View.

    *   Passing a Yes/No value from a Secondary View (Alien View) to the Main View.

    *   Sending user-entered text to the Secondary View (Alien View) from the Main
    View.

    *   Create a custom segue (pronounced “segway”) which implements a fade-out/fade-in
    between the two views.


    To do this we’ll write a simple app that asks an Alien whether he’s out there.
    Going to the Secondary View, you’ll see there is a switch that the Alien can switch
    on—if, of course, the Alien exists. If the Alien switches the switch to the on
    position, when you go back to the Main View, a message appears saying he does
    exist. You can then say something to the Alien, and you’ll see the message out
    there in outer Alien space in the Secondary View. Lastly, you’ll create a custom
    segue that transports you from the Main View to the Secondary View in a beautiful
    way. So let’s get to it!


    #### Preliminaries


    As in all the chapters, we supply you with a video of Dr. Lewis writing and running
    the code exactly as described here in the book. You can also download the code
    that’s from the video and used precisely “as is” here in this book. And you can
    download the DemoMonkey files and images used in each chapter.


    These download files are at [`http://bit.ly/sMRvAP`](http://bit.ly/sMRvAP) as
    illustrated in [Figure 2-1](#Chapter02.html#fig_2_1).


    ![images](images/9781430242727_Fig02-01.jpg)


    **Figure 2-1.** *Videos, code, and files for this chapter*


    In [Figure 2-1](#Chapter02.html#fig_2_1), arrow 1 points to an image from the
    video of this chapter, located at [`http://bit.ly/tNKUij`](http://bit.ly/tNKUij).
    Arrow 2 points to an Xcode icon that links to the Xcode of this chapter, located
    at [`http://bit.ly/QSYAV6`](http://bit.ly/QSYAV6). Arrow 3 points to an icon that
    links to all the files necessary for this chapter, including the images and the
    DemoMonkey files located at [`http://bit.ly/Qxr16s`](http://bit.ly/Qxr16s). If
    you need more help, go to the forum [`http://bit.ly/oLVwpY`](http://bit.ly/oLVwpY).


    Before you start, make sure you’ve downloaded the images and DemoMonkey file at
    [`http://bit.ly/Qxr16s`](http://bit.ly/Qxr16s) and that you have opened them up
    on your desktop.'
