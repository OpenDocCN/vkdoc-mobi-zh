    # 第十二章


    ## 你已经走了多远


    这段通过 Storyboards 和 iOS 的旅程涵盖了 Storyboards 的四个基本概念：


    - 只需少量甚至无需代码即可轻松创建视图之间的转场。

    - 将信息从次要视图传回主视图。

    - 将信息从主视图发送到次要视图。

    - 使用用户创建的视觉效果在视图之间进行转场。


    你构建了演示这些概念的应用程序。事实上，如果你一直跟随本书进行操作，那么你现在已经亲手编写了代码，实践了所有四个 Storyboarding 概念。至此，你应该对自己在应用程序中使用
    Storyboards 感到非常得心应手了。


    是不是很酷？！


    ### 最终思考


    在我们编写本书的过程中，通过与其他开发者的讨论以及在线研究，又出现了几个关于 Storyboarding 的方面：


    - 在单个应用程序中使用多个 Storyboard 文件的能力

    - 将所有视图/视图控制器放在一个 Storyboard 文件中（而不是多个 `.xib` 文件）对团队开发的影响

    - 并非所有场景都能放入 Storyboard 文件这一事实


    前两个主题有些关联。让我们更详细地逐一分析。


    #### 在单个应用中使用多个 Storyboard 文件


    实际上，在单个应用程序中使用多个 Storyboard 文件是相当容易的。你需要查看 `UIStoryboard` 的类文档，特别注意两个方法：


    - 类方法：`+storyboardWithName:bundle:`

    - 实例方法：`-instantiateInitialViewController`


    第一个方法建立与下一个 Storyboard 文件的连接，第二个方法（如其名称所示）加载该 Storyboard 文件中标识的初始场景。听起来很简单，但为什么要创建多个
    Storyboard 文件呢？


    将应用程序的场景拆分到多个 Storyboard 文件中的主要原因，可能最好通过一个假设的例子来理解。假设你有一个主菜单，从该菜单可以进入应用程序的四个独立区域：


    - 玩家选择与玩家配置

    - 游戏设置

    - 过去游戏的分数

    - 帮助，包含基于文本的帮助、基于图片的帮助和视频教程


    每个部分都是独立的，互不依赖，并且每个部分都有一个入口点场景，用户在选择相应的菜单项后进入该场景。在这个示例应用中，每个部分都可以轻松地作为自己的 Storyboard
    文件。将它们保存在不同的文件中会为你带来许多好处。例如，如果你想更改帮助场景的顺序，或者添加一个场景等，你可以直接编辑包含帮助子系统的那个 Storyboard
    文件。它只包含帮助屏幕，因此你可以快速重新排列，加入一个新屏幕。并且你知道，由于只修改了帮助的 Storyboard 文件，它不会破坏或导致任何其他 Storyboard
    出现问题。实际上，你减少了需要浏览的场景数量，以便进行修复，并且将更改隔离到了帮助子系统的场景中。这有意义吗？


    #### 将所有 `.xib` 文件放在一个 Storyboard 的“篮子”里


    这实际上是一个在多个开发者共同开发一个应用时经常出现的大问题。如果两个开发者都想修改同一个文件，那么后续必须将修改合并起来，以便两组修改都能包含在下一个版本中。我们称之为*合并修改*。有工具可以帮助你合并文本文件，但截至撰写本文时，还没有工具可以帮助你合并
    Storyboard 文件。合并这些文件的唯一方法是手动将一个文件的修改重新应用到另一个文件中。当然，这种无法合并文件的问题并非 Storyboard 文件所独有。想想项目中的任何非文本文件（XML、HTML、CoreData
    对象模型图/数据、视频等）——如果可能的话，这些文件类型都使得合并修改变得困难。


    软件工程社区已经开发了许多方法来应对这种合并修改的需求。最简单的解决方案是避免合并的需求。在实践中，这意味着尽可能不允许两个或更多的工程师修改同一个文件。这里有三个想法可以帮助你解决这个问题：


    - 分配工程师处理同一应用程序的不同领域，这样他们的修改就不会影响相同的文件。

    - 在不同的版本中进行不同的修改，这样下一个即将发布的版本中只包含一个修改。

    - 将应用程序中的功能区域分离到不同的文件中，这样在进行修改时，重叠的可能性就会降低。


    至于这对 Storyboard 文件的影响，考虑从 `.xib` 文件过渡到使用一个 Storyboard 文件——实际上，你将所有 `.xib` 文件都汇总到了这一个
    Storyboard 文件中。这极大地提高了你在一个画布上查看应用程序整体架构的能力，并且使指定画布上场景之间的转场变得容易得多，但这种过渡也有一个不良后果，那就是将你的所有视觉修改都集中到了这一个
    Storyboard 文件上。多个工程师现在必须都在这一个文件中工作！这就是这两个主题关联的地方：缓解此影响的最佳方法是，将 Storyboard 场景拆分成独立但相关的场景组，并将每组放入一个
    Storyboard 文件中。


    拥有更多的 Storyboard 文件有助于避免修改需要发生在同一个文件中，因为现在你拥有的文件不止一个。正如我们的示例所试图展示的，在应用程序中找到相关的场景区域通常是相当容易的，因此将一个应用程序拆分成多个
    Storyboard 文件也相当容易。


    #### 你是什么意思，并非所有场景都适合放在 Storyboard 文件中？


    在本书中，你一直在看到场景通过 Segue 跳转到其他场景。你看到了用户操作（例如，通过行选择或按钮按下）导致场景切换到另一个场景，并且你指定了当新场景呈现时将发生哪种类型的转场。事实上，在
    Storyboard 文件中，除了初始场景（即那个有无穷远处箭头指向它的场景）之外，所有场景都必须来自同一个 Storyboard 文件中的其他场景。


    然而，不难发现有些类型的场景并非源自场景间主流程中的某一个点。例如，想想像*网络错误*、*无效的用户名*或*页面加载失败*之类的消息。这些消息并非从应用程序的主流程中产生；它们通常异步地发生在应用流程中。你也可以认为这些消息需要通过你的代码发送到显示器——而不是通过应用程序界面中的用户操作。


    最后，你会发现使用 Storyboards 来展示由代码触发的场景（例如展示自定义警告视图、自定义选择器或自定义操作表的场景）会需要更多的努力，并且显得不太自然。你可以将自定义场景各自放在它们自己的
    Storyboard 文件中，然后通过代码来展示它们。并且你可以创建屏幕上的视觉效果和布局，使这些自定义场景看起来和行为都像它们的内置对应物——但正如我们所说，这需要更多的努力。


    ### 嘿，我有问题！


    如果你对这些最终主题，或者当然，对本书中的任何内容有更多问题，请访问我们的论坛。我们将很乐意回答你的问题。论坛见！

