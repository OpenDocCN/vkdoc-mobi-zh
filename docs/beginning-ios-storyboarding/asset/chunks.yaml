    \ automatic as shown in [Figure 4-39](#Chapter04.html#fig_4_39). If automatic\
    \ is selected, then the interface file will be shown for the currently selected\
    \ scene.\n\n    ![images](images/9781430242727_Fig04-39.jpg)\n\n    **Figure 4-39.**\
    \ *Make sure your second screen is displaying the MainViewController.h file.*\n\
    \n17.  Control-drag from the Image View in the document outline to the `MainViewController.h`\
    \ file, just under the `@property` as shown in [Figure 4-40](#Chapter04.html#fig_4_40).\n\
    \n    ![images](images/9781430242727_Fig04-40.jpg)\n\n    **Figure 4-40.** *Connect\
    \ the Image View to the MainViewController.*\n\n18.  This is an Image View (`iv`)\
    \ which you want to be showing your background image, so name it `ivBackground`\
    \ as shown in [Figure 4-41](#Chapter04.html#fig_4_41). After entering the name,\
    \ click Connect.\n\n    ![images](images/9781430242727_Fig04-41.jpg)\n\n    **Figure\
    \ 4-41.** *Name the property ivBackground.*\n\n19.  Now let's hook up the “Play\
    \ Button Area” View. Select it in the document outline and Control-drag from it\
    \ to under the `@property` you added in the previous step. This is illustrated\
    \ in [Figure 4-42](#Chapter04.html#fig_4_42).\n\n    ![images](images/9781430242727_Fig04-42.jpg)\n\
    \n    **Figure 4-42.** *Now you hook up the button.*\n\n20.  This is just a View\
    \ (`vw`) and is the button's place, so name it `vwButtonPlace`. Once entered,\
    \ click Connect as shown in [Figure 4-43](#Chapter04.html#fig_4_43).\n\n    ![images](images/9781430242727_Fig04-43.jpg)\n\
    \n    **Figure 4-43.** *Name the property vwButtonPlace.*\n\n21.  Because you\
    \ want to set the title from code, you’ll also need to hook up the Navigation\
    \ Bar Title to the `MainViewController`. So Control-drag from the Navigation Item\
    \ - Title to below the previous `@properties` as shown in [Figure 4-44](#Chapter04.html#fig_4_44).\n\
    \n    ![images](images/9781430242727_Fig04-44.jpg)\n\n    **Figure 4-44.** *Hook\
    \ up the Navigation Bar Title.*\n\n22.  This is a navigation item (`ni`) and it’s\
    \ the title, so name it `niTitle` as shown in [Figure 4-45](#Chapter04.html#fig_4_45).\n\
    \n    ![images](images/9781430242727_Fig04-45.jpg)\n\n    **Figure 4-45.** *Name\
    \ the property niTitle.*\n\n23.  While you’re here, you need to set the datasource\
    \ and delegate for the table to the `FlipsideViewController`. We forgot about\
    \ this in the video, and the book follows directly along with the code generated\
    \ by the video. Right-click the `Table View` cells and connect the datasource\
    \ to the `FlipsideViewController` as shown in [Figure 4-46](#Chapter04.html#fig_4_46).\n\
    \n    ![images](images/9781430242727_Fig04-46.jpg)\n\n    **Figure 4-46.** *Start\
    \ setting the datasets and delegates for the flipside.*\n\n24.  Connect the delegate\
    \ as shown in [Figure 4-47](#Chapter04.html#fig_4_47).\n\n    ![images](images/9781430242727_Fig04-47.jpg)\n\
    \n    **Figure 4-47.** *Now connect the delegate.*\n\n25.  Open up the `MainViewController`’s\
    \ implementation file as shown in [Figure 4-48](#Chapter04.html#fig_4_48).\n\n\
    \    ![images](images/9781430242727_Fig04-48.jpg)\n\n    **Figure 4-48.** *Open\
    \ up the MainViewController’s implementation file.*\n\n26.  Leaving the Assistant\
    \ editor mode and going back to the Standard Editor mode (one screen), drag in\
    \ two DemoMonkey snippets. First add in the includes: `#import \"Scale.h\"` and\
    \ `#import \"PlayButton.h\"` with “15 MainView.m – add includes.” The `MainView`\
    \ also has a private interface, so also drag in “16 MainView.m – add private interface.”\
    \ In this case you have instance variables for the selected scale, the audio player,\
    \ and a reference to the last play button pressed. You also have two private properties\
    \ that contain references to your two play buttons, and last, you have some methods\
    \ that are invoked when the electric guitar or acoustic guitar play buttons are\
    \ pressed. This is illustrated in [Figure 4-49](#Chapter04.html#fig_4_49).\n\n\
    \    ![images](images/9781430242727_Fig04-49.jpg)\n\n    **Figure 4-49.** *The\
    \ implementation file after the next two code additions.*\n\n27.  You now need\
    \ to synthesize the private properties, so drag in “17 MainView.m – add synth\
    \ of private buttons” as shown in [Figure 4-50](#Chapter04.html#fig_4_50).\n\n\
    \    ![images](images/9781430242727_Fig04-50.jpg)\n\n    **Figure 4-50.** *More\
    \ synthesis is necessary for acoustic and electric guitar play buttons.*\n\n28.\
    \  Remember that when the view loads the first time you want to continue setting\
    \ up the application, so within the `viewDidLoad` method you set up details of\
    \ the audio player and keep track of the last button that was played. Also round\
    \ the corners of the buttons themselves, as well as the corners of the button\
    \ place View you've just had. You also need to hide the buttons when you start.\
    \ Drag in “18 MainView.m – add viewDidLoad code” and place it under the comment\
    \ of the super `viewDidLoad` (`// Do any additional setup after loading the view,\
    \ typically from a nib`) as shown in [Figure 4-51](#Chapter04.html#fig_4_51).\n\
    \n    ![images](images/9781430242727_Fig04-51.jpg)\n\n    **Figure 4-51.** *Customize\
    \ the viewDidLoad method.*\n\n29.  In `viewDidUnload`, you need to remove your\
    \ two private buttons from the view and remove references to them. Here you’ll\
    \ need to drag in “19 MainView.m – add viewDidUnload code” and place it in the\
    \ `viewDidUnload` method as shown in [Figure 4-52](#Chapter04.html#fig_4_52).\n\
    \n    ![images](images/9781430242727_Fig04-52.jpg)\n\n    **Figure 4-52.** *Customize\
    \ the viewDidUnload method.*\n\n30.  When the view first appears, you're going\
    \ to set up the title so that the user is told to go ahead and select a scale\
    \ for the first time. Drag in “20 add viewWillAppear code,” placing it immediately\
    \ after the `viewDidUnload` method you just modified. Drag in “21 MainView.m –\
    \ add playButtonsAreHidden method” and place it right after the closing parenthesis\
    \ of `- (void)viewWillAppear` as shown in [Figure 4-53](#Chapter04.html#fig_4_53).\
    \ You’ll do the same thing with orientation left and right. Drag in “22 MainView.m\
    \ – replace shouldAutoRotate code” and after deleting the existing autorotate\
    \ code (`return YES;`), place this in its place. You also want to hide the buttons\
    \ when you start so that the user will be prompted to first choose a scale. Drag\
    \ in the “23 MainView.m – add flipsideViewControllerDidFinish” code as the new\
    \ first line of that method.\n\n    ![images](images/9781430242727_Fig04-53.jpg)\n\
    \n    **Figure 4-53.** *After the second of your four code additions.*\n\n31.\
    \  You also want to set a method that will identify the scale that was selected\
    \ by the View Controller. Drag in “24 MainView.m – add fccSelctedScalemethod”\
    \ and place this after `flipsideViewControllerDidFinish` as shown in [Figure 4-54](#Chapter04.html#fig_4_54).\
    \ And you need to tell the view what scale is selected so that it will show itself.\
    \ Drag in “25 MainView.m – add prepforsegue code.”\n\n    ![images](images/9781430242727_Fig04-54.jpg)\n\
    \n    **Figure 4-54.** *Identify the scale.*\n\n32.  You need to add an audio\
    \ player delegate. Drag “26 MainView.m – add audioPlayerDelegate methods” and\
    \ place it right before the `@end` as shown in [Figure 4-55](#Chapter04.html#fig_4_55).\n\
    \n    ![images](images/9781430242727_Fig04-55.jpg)\n\n    **Figure 4-55.** *Add\
    \ the audio player delegate method.*\n\n33.  Finally you need to add the methods\
    \ in support of the play button delegate protocol. Drag in “27 MainView.m – add\
    \ playButtonDelegate methods” and place it right before the `@end` as shown in\
    \ [Figure 4-56](#Chapter04.html#fig_4_56). And that is it! Click Run and see your\
    \ beautiful app run.\n\n    ![images](images/9781430242727_Fig04-56.jpg)\n\n \
    \   **Figure 4-56.** *Add the PlayButtonDelegate methods.*\n\n34.  It starts up\
    \ and asks you to select a scale; when you select a scale, the first image appears.\
    \ In this case, we first selected Major Pentatonic and then, as shown in [Figure\
    \ 4-57](#Chapter04.html#fig_4_57), we’re about to choose a new scale. When the\
    \ new scale is selected, the image changes dynamically. [Figure 4-58](#Chapter04.html#fig_4_58)\
    \ illustrates how the button appears when you say Done. [Figure 4-59](#Chapter04.html#fig_4_59)\
    \ shows how you can switch between looking at the scales on an acoustic guitar\
    \ and an electric guitar.\n\n![images](images/9781430242727_Fig04-57.jpg)\n\n\
    **Figure 4-57.** *It works!*\n\n![images](images/9781430242727_Fig04-58.jpg)\n\
    \n**Figure 4-58.** *Now when we say Done … the button appears.*\n\n![images](images/9781430242727_Fig04-59.jpg)\n\
    \n**Figure 4-59.** *You can change the type of guitar by pressing the play buttons.*"
  trans: "\n### 第三步：编写翻转视图控制器\n\n为了保持极简风格，首先设置头文件和实现文件，然后添加 `ImageView` 和 `NavTitle`\
    \ 的 `IBOutlet`。\n\n1.  首先编写向用户显示音阶的代码——如你所见，这些音阶显示在翻转视图中。为此，请前往你的桌面，打开 `demoMonkey`\
    \ 文件，并将其放置在屏幕的右侧。你可能希望调整 Xcode 窗口的大小，以便能在屏幕右侧看到打开的 `demoMonkey` 文件（Xcode 在左侧）。现在，在\
    \ Xcode 中，单击项目导航窗格（位于 Xcode 窗口左侧）中的文件，打开 `FlipsideViewController` 的实现文件（`.m`），如图\
    \ 4-24 所示。\n\n    ![images](img/9781430242727_Fig04-24.jpg)\n\n    **图 4-24.**\
    \ *打开 FlipsideViewController 实现文件。*\n\n2.  你将希望使用代码和 Storyboard 双屏进行编码。为此，请单击助理编辑器，如图\
    \ 4-25 所示。这会将你主要关注的文件放置在 Xcode 窗口编辑器区域的左侧，将相关文件放置在右侧。（例如，当选中一个实现文件时，左侧显示该实现文件，右侧显示与该实现文件关联的头文件。）\n\
    \n    ![images](img/9781430242727_Fig04-25.jpg)\n\n    **图 4-25.** *单击助理编辑器。*\n\
    \n3.  如前所述，你正在构建你的翻转视图控制器。为此，从 DemoMonkey 拖入“01 FlipView.h – add include”代码片段，该片段包含\
    \ `#import \"Scale.h\"` 的包含语句，因为这会引入我们为你构建的 `Scale` 类的头文件。接下来，拖入“02 FlipView.h\
    \ – add protocol message signature”文件，该文件在你已有的协议基础上添加了更多内容以及注释。然后引入“03 FlipView.h\
    \ – add protocol adheres to”，它表明翻转视图遵循表视图的数据源和委托协议。最后，拖入“04 FlipView.h – add scaleType\
    \ property”，该属性记录/指示用户从表视图中选择了哪个音阶。现在，按如下代码所示进行拖拽，然后查看 图 4-26，确保你最终得到的文件内容与图中的代码一致。\n\
    \n    ![images](img/9781430242727_UFig04-01.jpg)\n\n    ![images](img/9781430242727_Fig04-26.jpg)\n\
    \n    **图 4-26.** *将前四个 DemoMonkey 代码片段拖入 FlipsideViewController.h 文件中。*\n\n4.\
    \  现在，回到你的 Storyboard 文件并连接表视图。因此，在保持双屏助理模式的同时，打开 Storyboard，如图 4-27 所示。\n\n \
    \   ![images](img/9781430242727_Fig04-27.jpg)\n\n    **图 4-27.** *重新打开 Storyboard。*\n\
    \n5.  你需要添加一个 `IBOutlet` 来连接 `TableView` 和 `FlipsideViewController`。如图 4-28 左侧所示，首先在文档大纲中找到翻转视图控制器场景。接着打开\
    \ `FlipsideViewController`，然后打开视图，最后当找到表视图时，单击选中它，然后按住 Control 键从中拖拽到 `FlipsideViewController.h`\
    \ 文件中第二个 `@property` 的正下方，如图 4.28 所示。拖到目标位置后，松开鼠标。\n\n    ![images](img/9781430242727_Fig04-28.jpg)\n\
    \n    **图 4-28.** *将表视图连接到 FlipsideViewController。*\n\n6.  我们将其命名为表视图 (`tv`) 音阶表\
    \ (`tvScaleTable`)。命名后，单击“连接”按钮，如图 4-29 所示。通过使用 Control-拖拽技术，正如你所知，Xcode 现已为你创建了属性声明，以及属性合成和在对象释放时清除属性的代码，后两项是它在类实现文件中进行的修改。\n\
    \n    ![images](img/9781430242727_Fig04-29.jpg)\n\n    **图 4-29.** *为 IBOutlet\
    \ 命名为 tvScaleTable。*\n\n7.  养成一个好习惯：当你使用 Control-拖拽到代码中时，务必检查连接是否正确建立。寻找连接标记即可轻松验证。查看\
    \ 图 4-30，你会看到两个圆点，一个表示 `@property` 已与 Storyboard 对象建立连接，另一个表示 `IBAction` 已建立连接。现在，如果将鼠标指针移到新\
    \ `@property` 旁边的圆点上，你会看到 Storyboard 视图中的表视图高亮显示，表明连接已建立。很棒，对吧？现在，将鼠标悬停在 `IBAction`\
    \ 的圆点上，看看哪个对象连接到了该操作！（提示：应该是“完成”按钮。）至此，你已完成了向 `FlipsideViewController.h`（头文件）添加代码的工作。接下来，转到它的实现文件。\n\
    \n    ![images](img/9781430242727_Fig04-30.jpg)\n\n    **图 4-30.** *确保 IBOutlet\
    \ 已连接。*\n\n8.  打开的实现文件应如图 4-31 所示。\n\n    ![images](img/9781430242727_Fig04-31.jpg)\n\
    \n    **图 4-31.** *打开 FlipsideViewController 实现文件。*\n\n9.  `FlipsideViewController`\
    \ 有一个方法和一个实例变量，它们不需要公开引用（即，从类本身外部访问）。因此，我们选择在实现文件的顶部将它们声明为私有。我们有一个可变数组来存储音阶，并且将设置一个属性来记录用户选择的音阶。从\
    \ DemoMonkey 中将“05 FlipView.m – add private interface”代码片段拖入你的实现文件中，紧跟在 `@interface\
    \ FlipsideViewController ()` 代码行的右侧。你最后得到的代码应如图 4-32 所示。\n\n    ![images](img/9781430242727_Fig04-32.jpg)\n\
    \n    **图 4-32.** *创建私有接口。*\n\n    **注意：** 私有实例变量、方法和属性通常通过将它们放置在实现文件顶部的未命名类别中来声明。你会注意到，Xcode\
    \ 生成的最新模板已在你生成的实现文件顶部为你声明了此私有接口。这旨在提醒你在向这些生成的文件添加代码时，应将此类项放置在哪里。\n\n    现在，你需要合成你所创建的\
    \ scaleType，因此从 DemoMonkey 中拖入“06 FlipView.m – add scaleType synthesis”，并将其放置在\
    \ `@synthesize tvScaleTable = _tvScaleTable;` 行下方，如下列代码所示：\n\n    ```\n    @implementation\
    \ FlipsideViewController\n    \n    @synthesize delegate = _delegate;\n    @synthesize\
    \ tvScaleTable = _tvScaleTable;\n    @synthesize selectedScaleType;  \n    ```\n\
    \n    ![images](img/U002.jpg) **06FlipView.m – add scaleType synthesis**\n\n10.\
    \ 现在你已经合成了 scaleType 属性的 setter/getter 方法，需要在应用首次加载时将音阶数据加载到内存中。从 DemoMonkey 中拖入“07\
    \ FlipView.m – add viewDidload code”，并将其放置在 `viewDidLoad` 方法内部的 `[super viewDidLoad];`\
    \ 正下方。这里可以看到，我们创建了八个 `Scale` 对象并将其添加到数组中，如图 4-33 所示。\n\n    ![images](img/9781430242727_Fig04-33.jpg)\n\
    \n    **图 4-33.** *添加到数组中的八个音阶对象。*\n\n11. 当视图首次出现时，你有责任显示上次查看过的音阶。或者，如果尚未选择任何音阶——例如在应用首次使用时——则显示第一个音阶。为此，从\
    \ DemoMonkey 中拖入“08 FlipView.m – add viewWillAppear code”中的代码，并将其直接放置在 `viewDidLoad`\
    \ 方法的结束大括号之后，如图 4-34 所示。\n\n    ![images](img/9781430242727_Fig04-34.jpg)\n\n\
    \    **图 4-34.** *添加 viewWillAppear 方法。*\n\n12. 在此步骤中，你将拖入来自 DemoMonkey 的四个代码片段。首先，在\
    \ `-(BOOL)shouldAutorotateToInterfaceOrientation` 行之前，通过拖入“09 FlipView.m – add\
    \ SelectedScaleforType method”来设置一个用于按类型设置音阶的方法。接下来，替换 `- (BOOL)shouldAutorotateToInterfaceOrientation:`\
    \ 方法内部的代码，该方法通常会决定视图的旋转方向。在此情况下，你只需使用横屏模式（以显示吉他琴颈）。选中 `return YES;` 语句并删除它。通过拖入“10\
    \ FlipView.m – replace shouldRotateOrientation code”将新代码放在花括号内，该代码会调用一个宏，用于确定传入的旋转方向是否为两个可接受的横屏方向之一，如果是则返回\
    \ yes。现在，*如果用户按下了“完成”按钮*，你需要获取音阶数据，告知主视图选择了哪个音阶，然后让主视图销毁此视图。因此，拖入“11 FlipView.m\
    \ – add [done] action code”并将其放置在 `- (IBAction)done:(id)sender` 花括号内已有代码行的前面。四个片段中的最后一个，如图\
    \ 4-35 所示，包含了“12 FlipView.m – add Tableview delegate(s) methods”中的代码。将其放置在代码的\
    \ `@end` 之前。这是 `UITableView` 的委托代码，它实际上响应用户对音阶的选择。在此，你会看到我们添加了 `UITableViewDataSource`\
    \ 协议方法和 `UITableViewDelegate` 协议方法。\n\n    ![images](img/9781430242727_Fig04-35.jpg)\n\
    \n    **图 4-35.** *添加第四个片段后的实现文件。*\n\n13. 现在你已经处理完了翻转视图，让我们继续处理控制器！打开 `MainViewController`\
    \ 的头文件，如图 4-36 所示。同时，让我们暂时退出助理编辑器，在标准编辑器中工作。单击助理编辑器左侧的按钮（如 图 4-25 所示），将 Xcode\
    \ 窗口的编辑器部分恢复为单个编辑器窗格。\n\n    ![images](img/9781430242727_Fig04-36.jpg)\n\n   \
    \ **图 4-36.** *打开 MainViewController。*\n\n14. 首先，通过“13 MainView.h – add includes”添加两个包含语句（`#import\
    \ \"AudioPlayer.h\"` 和 `#import \"PlayButton.h\"`）。这样做是因为你需要从音频和播放按钮的头文件中获取信息。接下来，确保此对象支持\
    \ `FlipsideViewControllerDelegate`、`UIPopoverControllerDelegate` 和 `AudioPlayer`\
    \ 协议。如图 4-37 所示，通过拖入“14 MainView.h – add protocols”来完成。\n\n    ![images](img/9781430242727_Fig04-37.jpg)\n\
    \n    **图 4-37.** *开始定制 mainView 的接口文件。*\n\n15. 现在，你需要为主视图中的一些对象添加属性，这意味着你需要回到\
    \ Storyboard 文件中。同时，选择助理编辑器，以便在一个屏幕中看到接口代码，另一个屏幕中看到 Storyboard。重新打开 Storyboard\
    \ 文件，如图 4-38 所示。\n\n    ![images](img/9781430242727_Fig04-38.jpg)\n\n    **图 4-38.**\
    \ *回到 Storyboard。*\n\n16. 你将再次创建 `IBOutlet`，但在从 Storyboard 对象 Control-拖拽到 `MainViewController.h`\
    \ 之前，你需要确保第二个屏幕确实显示的是 `MainViewController.h` 文件。在文档大纲中，单击 `MainViewController`\
    \ 场景中的 `MainViewController`。如果右侧配置正确，它现在应显示 `MainViewController.h`。如果它没有显示你的 `.h`\
    \ 文件，你需要如图 4-39 所示重新选择自动选项。如果选择了自动，那么接口文件将针对当前选中的场景显示。\n\n    ![images](img/9781430242727_Fig04-39.jpg)\n\
    \n    **图 4-39.** *确保第二个屏幕显示的是 MainViewController.h 文件。*\n\n17. 从文档大纲中的图像视图 Control-拖拽到\
    \ `MainViewController.h` 文件中，放置在 `@property` 下方，如图 4-40 所示。\n\n    ![images](img/9781430242727_Fig04-40.jpg)\n\
    \n    **图 4-40.** *将图像视图连接到 MainViewController。*\n\n18. 这是一个图像视图 (`iv`)，你希望它显示你的背景图像，因此将其命名为\
    \ `ivBackground`，如图 4-41 所示。输入名称后，单击“连接”。\n\n    ![images](img/9781430242727_Fig04-41.jpg)\n\
    \n    **图 4-41.** *将属性命名为 ivBackground。*\n\n19. 现在，我们来连接“播放按钮区域”视图。在文档大纲中选中它，然后\
    \ Control-拖拽到你在上一步中添加的 `@property` 下方。如图 4-42 所示。\n\n    ![images](img/9781430242727_Fig04-42.jpg)\n\
    \n    **图 4-42.** *现在连接按钮。*\n\n20. 这只是一个视图 (`vw`)，是按钮的占位区域，因此将其命名为 `vwButtonPlace`。输入名称后，如图\
    \ 4-43 所示单击“连接”。\n\n    ![images](img/9781430242727_Fig04-43.jpg)\n\n    **图 4-43.**\
    \ *将属性命名为 vwButtonPlace。*\n\n21. 因为你想要通过代码设置标题，所以还需要将导航栏标题连接到 `MainViewController`。因此，从导航项-标题\
    \ Control-拖拽到之前的 `@properties` 下方，如图 4-44 所示。\n\n    ![images](img/9781430242727_Fig04-44.jpg)\n\
    \n    **图 4-44.** *连接导航栏标题。*\n\n22. 这是一个导航项 (`ni`)，并且是标题，因此将其命名为 `niTitle`，如图\
    \ 4-45 所示。\n\n    ![images](img/9781430242727_Fig04-45.jpg)\n\n    **图 4-45.**\
    \ *将属性命名为 niTitle。*\n\n23. 在此处，你需要为表视图设置数据源和委托，使其指向 `FlipsideViewController`。我们在视频中忘记了这个步骤，而本书直接沿用了视频生成的代码。右键单击\
    \ `表视图` 单元格，并将数据源连接到 `FlipsideViewController`，如图 4-46 所示。\n\n    ![images](img/9781430242727_Fig04-46.jpg)\n\
    \n    **图 4-46.** *开始为翻转侧设置数据源和委托。*\n\n24. 连接委托，如图 4-47 所示。\n\n    ![images](img/9781430242727_Fig04-47.jpg)\n\
    \n    **图 4-47.** *现在连接委托。*\n\n25. 打开 `MainViewController` 的实现文件，如图 4-48 所示。\n\
    \n    ![images](img/9781430242727_Fig04-48.jpg)\n\n    **图 4-48.** *打开 MainViewController\
    \ 的实现文件。*\n\n26. 退出助理编辑器模式，回到标准编辑器模式（单个屏幕），拖入两个 DemoMonkey 代码片段。首先，通过“15 MainView.m\
    \ – add includes”添加包含语句：`#import \"Scale.h\"` 和 `#import \"PlayButton.h\"`。`MainView`\
    \ 也有一个私有接口，因此也拖入“16 MainView.m – add private interface”。在此例中，你拥有用于所选音阶、音频播放器以及最后按下的播放按钮引用的实例变量。你还有两个私有属性，包含对你两个播放按钮的引用，最后，还有一些方法在按下电吉他或原声吉他播放按钮时被调用。如图\
    \ 4-49 所示。\n\n    ![images](img/9781430242727_Fig04-49.jpg)\n\n    **图 4-49.**\
    \ *进行两次代码添加后的实现文件。*\n\n27. 现在你需要合成私有属性，因此如图 4-50 所示，拖入“17 MainView.m – add synth\
    \ of private buttons”。\n\n    ![images](img/9781430242727_Fig04-50.jpg)\n\n  \
    \  **图 4-50.** *需要为原声吉他和电吉他播放按钮进行更多合成。*\n\n28. 请记住，当视图首次加载时，你想继续设置应用程序，因此在 `viewDidLoad`\
    \ 方法中设置音频播放器的细节，并跟踪最后播放的按钮。同时，对按钮本身以及你刚添加的按钮占位视图的边角进行圆角处理。你还需要在启动时隐藏按钮。拖入“18 MainView.m\
    \ – add viewDidLoad code”，并将其放置在父类 `viewDidLoad` 的注释下方（`// Do any additional setup\
    \ after loading the view, typically from a nib`），如图 4-51 所示。\n\n    ![images](img/9781430242727_Fig04-51.jpg)\n\
    \n    **图 4-51.** *定制 viewDidLoad 方法。*\n\n29. 在 `viewDidUnload` 方法中，你需要从视图中移除你的两个私有按钮，并移除对它们的引用。此处，你需要拖入“19\
    \ MainView.m – add viewDidUnload code”，并将其放置在 `viewDidUnload` 方法中，如图 4-52 所示。\n\
    \n    ![images](img/9781430242727_Fig04-52.jpg)\n\n    **图 4-52.** *定制 viewDidUnload\
    \ 方法。*\n\n30. 当视图首次出现时，你将设置标题，以提示用户首次选择音阶。拖入“20 add viewWillAppear code”，将其紧接在你刚刚修改的\
    \ `viewDidUnload` 方法之后。拖入“21 MainView.m – add playButtonsAreHidden method”，将其放置在\
    \ `- (void)viewWillAppear` 的结束大括号之后，如图 4-53 所示。对左右横屏方向也进行同样的操作。拖入“22 MainView.m\
    \ – replace shouldAutoRotate code”，在删除现有的自动旋转代码（`return YES;`）后，将其放在该位置。你还希望在启动时隐藏按钮，以便提示用户首先选择一个音阶。拖入“23\
    \ MainView.m – add flipsideViewControllerDidFinish”代码，作为该方法的新的第一行。\n\n    ![images](img/9781430242727_Fig04-53.jpg)\n\
    \n    **图 4-53.** *四次代码添加中的第二次之后。*\n\n31. 你还需要设置一个方法，用于识别视图控制器选择的音阶。拖入“24 MainView.m\
    \ – add fccSelctedScalemethod”，并将其放置在 `flipsideViewControllerDidFinish` 之后，如图\
    \ 4-54 所示。并且你需要告诉视图选定了哪个音阶，以便它能够正确显示。拖入“25 MainView.m – add prepforsegue code”。\n\
    \n    ![images](img/9781430242727_Fig04-54.jpg)\n\n    **图 4-54.** *识别音阶。*\n\n\
    32. 你需要添加一个音频播放器委托。拖入“26 MainView.m – add audioPlayerDelegate methods”，并将其放置在\
    \ `@end` 之前，如图 4-55 所示。\n\n    ![images](img/9781430242727_Fig04-55.jpg)\n\n \
    \   **图 4-55.** *添加音频播放器委托方法。*\n\n33. 最后，你需要添加支持播放按钮委托协议的方法。拖入“27 MainView.m –\
    \ add playButtonDelegate methods”，并将其放置在 `@end` 之前，如图 4-56 所示。这样就完成了！单击“运行”，查看你漂亮的应用程序运行。\n\
    \n    ![images](img/9781430242727_Fig04-56.jpg)\n\n    **图 4-56.** *添加 PlayButtonDelegate\
    \ 方法。*\n\n34. 应用程序启动后，会要求你选择一个音阶；当你选择一个音阶时，第一张图像出现。在此例中，我们首先选择了“Major Pentatonic”（大调五声音阶），然后，如图\
    \ 4-57 所示，我们即将选择一个新的音阶。当选择新音阶时，图像会动态变化。图 4-58 展示了当你点击“完成”时按钮是如何出现的。图 4-59 展示了如何在原声吉他和电吉他之间切换查看音阶。\n\
    \n![images](img/9781430242727_Fig04-57.jpg)\n\n**图 4-57.** *运行成功！*\n\n![images](img/9781430242727_Fig04-58.jpg)\n\
    \n**图 4-58.** *现在，当我们点击“完成”……按钮出现了。*\n\n![images](img/9781430242727_Fig04-59.jpg)\n\
    \n**图 4-59.** *你可以通过按下播放按钮来更改吉他类型。*\n"
- fmt: '# Storyboarding a Page-Based App


    Our fourth Storyboarding app is a pretty zany endeavor to say the least. You’ll
    be building a Page-Based Application that will house a dynamic, electronic brochure
    that actually consists of 4 mini-brochures. The fun thing is that your “client”
    is a time travel agency that has the ability to travel forward and backwards in
    time! We’re calling this the `futureTravel` application, and you will learn many
    cool tools and methods as you use it to move forward in your Storyboarding skills.


    Note that apps 1 through 3 were based on standard Storyboarding skills with an
    emphasis on the code. Apps 4 through 7 will focus on advanced Storyboarding features
    and methods that build on the theoretical code covered in earlier sections.


    `FutureTravel` encapsulates four brochures in one. This means that as the user
    lands on the second page of four, the user may choose one of the four possible
    destinations. After this choice is made, the remaining two pages are then automatically
    customized to the user’s choice of destination. If the user decides that she wants
    to explore the other three destinations, `futureTravel` allows her to simply page
    back and select a different destination and then page forward again with new dynamic
    pages associated with the new choice of destination.


    Using the Page-Based Application template is all about replacing the built-in
    data model with your own. The page navigation simply lets you view the pages generated
    from this underlying model. You’ll use the iPad layout as it gives you more room
    for text on the pages of your travel flyer. You’ll replace the built-in model
    with your own set of pages, with an image for the page and the page number. You’ll
    encapsulate this page data in its own class (object with own `.h`/`.m` files).
    And you’ll build the array of pages data at runtime in the `ModelController` startup
    methods. In the Storyboard file you adjust the UI to your liking.


    ## futureTravel: A Page-Based App


    We divide this project into five steps. First you create the project from a template
    and then you prep the Storyboard. Steps 3 through 5 consist of coding the `ModelController`,
    `DataViewController`, and `RootViewController`. This project will become quite
    hierarchical in nature, so you may want to note the general outline of our coding
    strategy:


    1.  *Create from Template*: First we start a new Page-Based Application called
    `futureTravel`, with `com.apress`, iPad, and using ARC. Then we adjust project
    settings by deselecting portrait and upside-down capabilities. Next we drag in
    assets such as the `Default-Lanscape*~ipad.png` and the `ModelPageData` class
    files (`.h` & `.m`) to the `futureTravel` group. To test that it’s all working,
    we build the project.

    2.  *Prep Storyboard*: Two parts to think about here: the Root View and the Data
    View. For the Root View we color the view background: `RGB(254,196,37)`, the color
    of Apress yellow. The Data view is a little more complex. Here we also color the
    view background: `RGB(253,224,145)`, a lighter version of Apress yellow we used
    earlier, but we need to do more here. We remove subordinate view and add a `UIImageView`
    in its place, which will be the same as our load image (`20,20 984x679`). This
    will not have any user interaction. With this done, we adjust all four edges and
    autosize in both directions. We also adjust the placement and configuration of
    the label and place it correctly. Finally we change the text to right-aligned
    and its color to Dark Gray Color.

    3.  `Code ModelController`.

    4.  `Code DataViewController`.

    5.  `Code RootViewController`.


    ## Preliminaries


    We created the assets for the program, which consist of a launch image and the
    first two images (travel introduction and destination selection), and then we
    created two images for each of the four destinations. We generated `@2x` versions
    of all these files, which will automatically be used if we run this application
    on the new iPad (Retina display version). We also created a special image, used
    to mark the client’s destination selection. This leaves us with a total of 23
    images generated for this project. You can download the images, assets, extras,
    and DemoMonkey files here: [`http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter05_futureTravel%20Assets.zip`](http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter05_futureTravel%20Assets.zip).
    You can download the source code we programmed while filming the video here: [`http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter05_futureTravel.zip`](http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter05_futureTravel.zip).
    As always, we suggest that you clean up your desktop, download all the images,
    and open up your DemoMonkey file before you begin.'
