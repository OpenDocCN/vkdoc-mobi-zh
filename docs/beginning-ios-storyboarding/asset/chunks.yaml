- fmt: "### Step 1 of 3: Set Up Files, Images, Core Data and Data Model\n\n![images](images/9781430242727_Fig06-01.jpg)\n\
    **Figure 6-1.** *Start a Master-Detail Application.*\n\n1. Open Xcode, press ![Images](images/U003.jpg)+![Images](images/U004.jpg)+`N`,\
    \ and select Master-Detail Application as shown in [Figure 6-1](#Chapter06.html#fig_6_1).\n\
    \n   ![images](images/9781430242727_Fig06-02.jpg)\n   **Figure 6-2.** *Select\
    \ the options for the bookManager app.*\n\n2. For Product Name, enter `bookManager`,\
    \ and for the Company Identifier enter `com.storyboarding`. We won’t use a class\
    \ prefix. Make sure to select iPhone and put a check mark next to Use Storyboards\
    \ and Use Automatic Reference Counting as shown in [Figure 6-2](#Chapter06.html#fig_6_2).\
    \ Leave Use Core Data and Include Unit Tests unchecked. Save the project to your\
    \ desktop.\n\n   **NOTE:** We left Use Core Data option unchecked for this project\
    \ template only to prevent Xcode from generating CoreData setup code for us. Since\
    \ we are going to use MagicalRecord in this app the above-mentioned code is already\
    \ integrated into it.\n\n   ![images](images/9781430242727_Fig06-03.jpg)\n   **Figure\
    \ 6-3.** *Open up your assets folder.*\n\n3. You’ll now drag assets into your\
    \ project. If you have not downloaded the `assets` folder from [`http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter06_bookManager%20Assets.zip`](http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter06_bookManager%20Assets.zip),\
    \ do it now. After saving it to you desktop, unzip it. Select the `images` folder\
    \ and `bookdata.plist` as shown in [Figure 6-3](#Chapter06.html#fig_6_3). Drag\
    \ both items over into the `Supporting Files` folder inside the `bookManager`\
    \ folder as indicated by the arrows in [Figure 6-3](#Chapter06.html#fig_6_3).\
    \ Your `Supporting Files` folder should look similar to our `Supporting Files`\
    \ folder shown in [Figure 6-3](#Chapter06.html#fig_6_3).\n\n   ![images](images/9781430242727_Fig06-04.jpg)\n\
    \   **Figure 6-4.** *Copy items into destination group’s folder.*\n\n4. You need\
    \ to make sure that the actual contents of the file and the plist are inherent\
    \ in the app, so make sure you select \"Copy items into destination group’s folder\
    \ (if needed)\" and \"Create groups for any added folders\" and that your target\
    \ will be this app, `bookManager`. This is illustrated in [Figure 6-4](#Chapter06.html#fig_6_4).\n\
    \n   ![images](images/9781430242727_Fig06-05.jpg)\n   **Figure 6-5.** *Add the\
    \ CoreData frameworks to the project.*\n\n5. You’ll be using a database quite\
    \ extensively in this app—this is part of the Core Data framework. Coding a database\
    \ from scratch would take a huge amount of resources, time, and effort. Core Data\
    \ provides pre-built classes and tools for data management, and it’s done in a\
    \ way that you simply build your custom code on top of the basic functionality\
    \ provided in Core Data. To set this up, select the main project file in the Project\
    \ Navigator, select `bookManager` under Targets, and click the Build Phases tab\
    \ as shown in [Figure 6-5](#Chapter06.html#fig_6_5).\n\n   ![images](images/9781430242727_Fig06-06.jpg)\n\
    \   **Figure 6-6.** *Click the add button.*\n\n6. Once the Build Phases tab is\
    \ open go to the Link Binary with Libraries section and expand it. To add Core\
    \ Data framework to this list, click the add (+) button as shown in [Figure 6-6](#Chapter06.html#fig_6_6).\n\
    \n   ![images](images/9781430242727_Fig06-07.jpg)\n   **Figure 6-7.** *Search\
    \ for and then select CoreData framework.*\n\n7. After you click +, enter *coredata*\
    \ into the search field. This will yield the `CoreData.framework` icon. Select\
    \ it as shown in [Figure 6-7](#Chapter06.html#fig_6_7) and then click Add.\n\n\
    \   ![images](images/9781430242727_Fig06-08.jpg)\n   **Figure 6-8.** *The CoreData.framework\
    \ is now inside your bookManager target.*\n\n8. Once you’ve added the `CoreData.framework`,\
    \ it will appear inside your `bookManager` target as shown in the left-hand image\
    \ in [Figure 6-8](#Chapter06.html#fig_6_8). Move it to the `Frameworks` folder\
    \ as shown in the right-hand image in [Figure 6-8](#Chapter06.html#fig_6_8).\n\
    \n   ![images](images/9781430242727_Fig06-09.jpg)\n   **Figure 6-9.** *Create\
    \ a new group called Source in Project Navigator.*\n\n9. While in the Project\
    \ Navigator, go ahead and create a new subgroup inside the `bookManger` group\
    \ called `Source` as shown in [Figure 6-9](#Chapter06.html#fig_6_9). You’ll use\
    \ this in a moment.\n\n**MAGICALRECORD**\n\nCore Data is not the emphasis of this\
    \ book, so we won’t go too deeply into all its details. To make life easier, though,\
    \ we’ll bring in an open source helper that’s being used extensively by many highly\
    \ respected Xcoders—including our students who are now working at Apple. This\
    \ open source framework makes working with Core Data incredibly easy. It’s called\
    \ MagicalRecord, and it’s available on GitHub at [`https://github.com/magicalpanda/MagicalRecord`](https://github.com/magicalpanda/MagicalRecord).\
    \ To download the zip file directly, you can use [`https://github.com/magicalpanda/MagicalRecord/zipball/master`](https://github.com/magicalpanda/MagicalRecord/zipball/master)\
    \ or you can get it from the `assets` folder you downloaded earlier for this chapter.\
    \ Take our advice, though, and explore GitHub. If you don’t already have a GitHub\
    \ account, you can go ahead and get one. It’s free!\n\n**NOTE:** Here’s a resource\
    \ for getting yourself familiar with MagicalRecord’s setup: [`http://yannickloriot.com/2012/03/magicalrecord-how-to-make-programming-with-core-data-pleasant/`](http://yannickloriot.com/2012/03/magicalrecord-how-to-make-programming-with-core-data-pleasant/).\n\
    \n![images](images/9781430242727_Fig06-10.jpg)\n**Figure 6-10.** *Download MagicalRecord.*\n\
    \n10. Once you’re inside GitHub, you can search for *MagicalRecord* or *MagicalPanda*\
    \ and you should arrive at [`https://github.com/magicalpanda/MagicalRecord`](https://github.com/magicalpanda/MagicalRecord).\
    \ Click the Zip button, and the download will begin as indicated by the arrows\
    \ in [Figure 6-10](#Chapter06.html#fig_6_10).\n\n    ![images](images/9781430242727_Fig06-11.jpg)\n\
    \    **Figure 6-11.** *Unzip and navigate to the MagicalRecord folder.*\n\n11.\
    \ Once you have successfully downloaded the `magicalpanda-MagicalRecord` zip file\
    \ to your desktop, unzip it and navigate your way to the `MagicalRecord` folder.\
    \ Select the folder as shown in [Figure 6-11](#Chapter06.html#fig_6_11).\n\n \
    \   ![images](images/9781430242727_Fig06-12.jpg)\n    **Figure 6-12.** *Drag the\
    \ MagicalRecord folder into your project.*\n\n12. Drag the `MagicalRecord` folder\
    \ into your project inside the `Source` folder you created in step 9, as shown\
    \ in [Figure 6-12](#Chapter06.html#fig_6_12), and select the same saving protocols\
    \ that you did a few steps ago back in [Figure 6-2](#Chapter06.html#fig_6_2).\n\
    \n    ![images](images/9781430242727_Fig06-13.jpg)\n    **Figure 6-13.** *Open\
    \ the project’s .pch file.*\n\n13. Now that you’ve added the MagicalRecord source\
    \ code to your project, you need to make it visible to your project so you can\
    \ enjoy all the various extensions to Core Data that it provides. Essentially,\
    \ MagicalRecord is a collection of categories that extend main Core Data functionality\
    \ and simplify its usage. All the important header files necessary for it to function\
    \ properly are listed in the `CoreData+MagicalRecord.h` file. You can make MagicalRecord\
    \ visible to the entire project by simply putting this header file into the `bookManager-Prefix.pch`\
    \ file. Navigate to the `Supporting Files` folder and click the `.pch` (pre-compile\
    \ header) file to open it as shown in [Figure 6-13](#Chapter06.html#fig_6_13).\n\
    \n    **NOTE:** Xcode has a high-level command called ProcessPCH that informs\
    \ the compiler which header files it needs to precompile and include into the\
    \ project based on information in `.pch` file. These pre-compiled headers are\
    \ kept in a subdirectory of `/Library/Caches` and then automatically included\
    \ in every file during compilation. The files included into prefix header are\
    \ usually the files that rarely change, which can speed up the compilation process.\
    \ This lets you include a file without adding an `import` statement to every file\
    \ that uses it, thus making it globally \"visible\" throughout the entire project.\n\
    \n    ![images](images/9781430242727_Fig06-14.jpg)\n    **Figure 6-14.** *Open\
    \ the DemoMonkey file and drag the first step into the project’s .pch file.*\n\
    \n14. Open the `.demoMonkey` file supplied with this chapter and keep it in a\
    \ handy place on your desktop. Start by dragging the \"01 CoreData + MagicalRecord.h\"\
    \ snippet from `DemoMonkey` into the `bookManager - Prefix.pch` file, immediately\
    \ under the `#import <Availability.h>` line of code as shown in [Figure 6-14](#Chapter06.html#fig_6_14)\
    \ and as follows:\n\n    ```\n    #import <Availability.h>\n    #import \"CoreData+MagicalRecord.h\n\
    \    ```\n\n    This header now makes the MagicalRecord framework available throughout\
    \ the project without the need to import any additional files.\n\n15. When adding\
    \ a new library/framework to your project, it’s good practice to immediately run\
    \ or at least build it to check your work, as this is a critical juncture, and\
    \ errors need to be immediately corrected before you continue to code. Click Run\
    \ and make sure your project compiles successfully. Sometimes things change pretty\
    \ quickly in the open source community, and fact is of course beyond our control.\
    \ In this book we’re using MagicalRecord-2.0.3-12-g1d9e0db. If you followed all\
    \ the steps carefully, and your project doesn’t compile at this point, check your\
    \ version of MagicalRecord—if it doesn’t match ours, replace your MagicalRecord\
    \ source folder with the one provided in the `Assets` bundle for this chapter\
    \ and try again.\n\n    ![images](images/9781430242727_Fig06-15.jpg)\n    **Figure\
    \ 6-15.** *Initialize the SQLite database.*\n\n16. You’re now going to embark\
    \ on a task that frustrates many computer science students and is a huge obstacle\
    \ for many Xcoders out there: connecting a database to Xcode. In this case you’re\
    \ going to set up a SQLite database using the MagicalRecord API, and you’re going\
    \ to love it! Open the `AppDelegate.m` file and drag the \"02 AppDelegate.m initiate\
    \ CoreData with MagicalRecord 1\" snippet from DemoMonkey right before the `return\
    \ YES`, as shown in [Figure 6-15](#Chapter06.html#fig_6_15) and as follows:\n\n\
    \    ```\n    #import \"AppDelegate.h\"\n    @implementation AppDelegate\n   \
    \ @synthesize window = _window;\n    - (BOOL)application:(UIApplication *)application\
    \ didFinishLaunching\n    ...*)launchOptions\n    {\n      // Override point for\
    \ customization after application launch.\n      [MagicalRecord setupCoreDataStackWithStoreNamed:@\"\
    MyDatabase.sqlite\"];\n      return YES; ...\n    ```\n\n    **NOTE:** With MagicalRecord\
    \ you can initialize the entire SQLite database with a single line of code! It’s\
    \ not difficult—it just requires you to focus on exactly what you’re doing and\
    \ why you’re doing it. So let’s do it!\n\n    ![images](images/9781430242727_Fig06-16.jpg)\n\
    \    **Figure 6-16.** *Clean the persistence store.*\n\n17. You also need to clean\
    \ your persistence store in the `applicationWillTerminate` method. Do that by\
    \ dragging the \"03 AppDelegate.m initiate CoreData with Magic Record 2\" snippet\
    \ from DemoMonkey and placing it as shown in [Figure 6-16](#Chapter06.html#fig_6_16).\n\
    \n    ![images](images/9781430242727_Fig06-17.jpg)\n    **Figure 6-17.** *Creating\
    \ Data Model.*\n\n18. To create your data model, create data files inside a new\
    \ group called `Data Model`. Starting with creating the group, right-click the\
    \ `bookManager` folder and select New Group as shown on the left in [Figure 6-17](#Chapter06.html#fig_6_17).\
    \ Once the new group is created, a folder called `New Group` appears. Rename it\
    \ `Data Model`. Right-click the `Data Model` folder and select New File as shown\
    \ on the right in [Figure 6-17](#Chapter06.html#fig_6_17).\n\n    ![images](images/9781430242727_Fig06-18.jpg)\n\
    \    **Figure 6-18.** *Create a Core Data data model.*\n\n19. A dialog box asks\
    \ you to choose a template for your new file. By default the Cocoa Touch selection\
    \ under iOS in the left-hand pane is selected. Ignore this and choose the Core\
    \ Data (Data Model template as shown on the left in [Figure 6-18](#Chapter06.html#fig_6_18).\
    \ A new dialog box asks you whether you would like to save the data model. Replace\
    \ the default `Model.xcdatamodeld` with `datamodel.xcdatamodeld` as shown on the\
    \ right in [Figure 6-18](#Chapter06.html#fig_6_18).\n\n    ![images](images/9781430242727_Fig06-19.jpg)\n\
    \    **Figure 6-19.** *Create your SQLite entities.*\n\n20. Your database will\
    \ hold a selection of Apress books that you’ll define in terms of three *tables*\
    \ (also called *entities*):\n\n    * The author\n    * The book\n    * The book’s\
    \ category (such as iOS, Android, web, and so on)\n\n    You need to tell the\
    \ SQLite database about that. Click the `+` icon at the bottom of the data model\
    \ canvas and name the first entity `DBAuthor`. Repeat this two more times, naming\
    \ the two new entities `DBBook` and `DBCategory` respectively, as illustrated\
    \ in [Figure 6-19](#Chapter06.html#fig_6_19).\n\n    ![images](images/9781430242727_Fig06-20.jpg)\n\
    \    **Figure 6-20.** *Create the attributes for the Category records.*\n\n21.\
    \ After your three entities are created, you need to create the attributes for\
    \ each entity. We’ll go through the creation of the `Category` entity in detail\
    \ and then assign the remaining two for you to do on your own with less help.\
    \ With the `DBCategory` entity selected, click the `+` button as shown on the\
    \ left in [Figure 6-20](#Chapter06.html#fig_6_20). When you first add an attribute,\
    \ the default name will simply be `attribute`. You need a way to give each category\
    \ (such as iOS, Android, or web) a name and an ID. So, name the first attribute\
    \ `categoryId`. Click the `+` button again and name the next attribute `categoryName`.\
    \ Click the selection button to the right of the `Type` column on the `categoryId`\
    \ row and choose Integer 32. Then click the selection button on the `categoryName`\
    \ row and select `String` as shown on the right in [Figure 6-20](#Chapter06.html#fig_6_20).\n\
    \n    ![images](images/9781430242727_Fig06-21.jpg)\n    **Figure 6-21.** *Finish\
    \ the attributes for DBAuthor and DBBook.*\n\n22. Now you have to repeat the process\
    \ for the author and book entities. For your `Author` entity, you only need an\
    \ `authorId`, `firstName`, and `lastName` set of attributes. Make the `authorId`\
    \ be Integer 32 and the first and last names `String`. For the `Book` entity you\
    \ need seven attributes (of course, you could have many more, but for this exercise\
    \ seven will suffice). You’ll bring in the `authorId` and `categoryId` from `DBAuthor`\
    \ and `DBCategory` as foreign keys, so you find a corresponding author and category\
    \ for each book. You also need a unique `bookId`. And you need four more attributes\
    \ describing each book: a short description, an image name associated with each\
    \ book that you’ll later link to the cover image of each book, the book title,\
    \ and the book’s publishing year. With that said, make `authorId`, `bookId`, and\
    \ `categoryId` all as type Integer 32. Make `bookDescription`, `imageName`, `title`,\
    \ and `year` all be type `String` as shown in [Figure 6-21](#Chapter06.html#fig_6_21).\n\
    \n    **NOTE:** A *foreign key* points to another entity in the database and is\
    \ a way to link different entities together. For example, you’re linking a book\
    \ to its author and its category using foreign keys.\n\n    ![images](images/9781430242727_Fig06-22.jpg)\n\
    \    **Figure 6-22.** *Generate classes for all the entities.*\n\n23. Now that\
    \ you’ve defined the necessary tables and fields, you need to generate classes\
    \ for all the entities so you can manipulate them from code. Select all three\
    \ attributes `DBAuthor`, `DBBook`, and `DBCategory` by selecting the first one,\
    \ holding down the Shift key, and clicking the last one. Click Editor and choose\
    \ Create NSManagedObject Subclass as shown in [Figure 6-22](#Chapter06.html#fig_6_22).\
    \ An options dialog box will appear—press Enter or click the Create button, keeping\
    \ the default settings.\n\n    ![images](images/9781430242727_Fig06-23.jpg)\n\
    \    **Figure 6-23.** *Success!*\n\n24. You’ll know you’ve been successful when\
    \ you see header and implementation files for all your entities neatly lined up\
    \ inside your `Data Model` folder. This may not seem like a big deal now, but\
    \ when you have a few hundred entities in you database, having Xcode automatically\
    \ create these is a miracle of sorts. You can now add custom methods to each of\
    \ these entities. Make sure your `Data Model` folder, entities, and attributes\
    \ look exactly like ours in [Figure 6-23](#Chapter06.html#fig_6_23) before moving\
    \ on.\n\n    ![images](images/9781430242727_Fig06-24.jpg)\n    **Figure 6-24.**\
    \ *Before moving on ...*\n\n25. Also before moving on, you should check a couple\
    \ of things so you’re aware of what you’ve created so far. Click the `DBCategory.h`\
    \ file. As you can see in [Figure 6-24](#Chapter06.html#fig_6_24), Xcode has generated\
    \ all the properties for you based on the data fields you’ve specified in your\
    \ data model over the last few steps. What you’ll be doing over the next few steps\
    \ is adding methods to these properties so that you can retrieve the data.\n\n\
    \    **NOTE:** Over the next six steps, all the methods you’ll be adding essentially\
    \ do the same thing: they either create or delete a new entity with the values\
    \ provided in a dictionary or they allow you to retrieve other data based on foreign\
    \ key relationships, such as books wanting authors’ names and authors wanting\
    \ category names.\n\n    ![images](images/9781430242727_Fig06-25.jpg)\n    **Figure\
    \ 6-25.** *Setting up the DBBook.h file*\n\n26. Select `DBBook.h` in the Project\
    \ Navigator. Drag in the \"04 DBBook.h Methods and Extra Properties Declaration\"\
    \ snippet from DemoMonkey and place it right before the `@end`. Then type in two\
    \ `#import` statements, for `DBAuthor.h` and `DBCategory.h`, as shown in [Figure\
    \ 6-25](#Chapter06.html#fig_6_25) and as follows:\n\n    ```\n    #import <Foundation/Foundation.h>\n\
    \    #import <CoreData/CoreData.h>\n    #import \"DBAuthor.h\"\n    #import \"\
    DBCategory.h\"\n\n    @interface DBBook : NSManagedObject\n    ...\n    @property\
    \ (nonatomic, retain) NSString * imageName;\n    - (DBAuthor *)author;\n    -\
    \ (DBCategory *)category;\n    ...\n    - (void)deleteEntity;\n    @end\n    ```\n\
    \n    ![images](images/9781430242727_Fig06-26.jpg)\n    **Figure 6-26.** *Setting\
    \ up the DBBook.m file*\n\n27. Navigate to `DBBook.m`. Drag in the \"05 DBBook.m\
    \ Methods and Extra Properties Implementation\" snippet from DemoMonkey and place\
    \ it right before the `@end` as shown in [Figure 6-26](#Chapter06.html#fig_6_26).\n\
    \n    ![images](images/9781430242727_Fig06-27.jpg)\n    **Figure 6-27.** *Setting\
    \ up the DBCategory.h file*\n\n28. Open `DBCategory.h` and drag in the \"06 DBCategory.h\
    \ Methods and Extra Properties Declaration\" snippet from DemoMonkey. Place it\
    \ between the last `@property` and the `@end` as shown in [Figure 6-27](#Chapter06.html#fig_6_27).\n\
    \n    ![images](images/9781430242727_Fig06-28.jpg)\n    **Figure 6-28.** *Setting\
    \ up the DBCategory.m file*\n\n29. Now go to `DBCategory.m`, drag in the \"07\
    \ DBCategory.m Methods and Extra Properties Implementation\" snippet from DemoMonkey,\
    \ and place it between the last `@dynamic` and the `@end`. Also add `#import \"\
    DBBook.h\"` right after `#import \"DBCategory.h\"` as shown in [Figure 6-28](#Chapter06.html#fig_6_28)\
    \ and as follows:\n\n    ```\n    #import \"DBCategory.h\"\n    #import \"DBBook.h\"\
    \n    ```\n\n    ![images](images/9781430242727_Fig06-29.jpg)\n    **Figure 6-29.**\
    \ *Setting up the DBAuthor.h file*\n\n30. Open `DBAuthor.h` and drag in the \"\
    08 DBAuthor.h Methods and Extra Properties Declaration\" snippet from DemoMonkey.\
    \ Place it between the last `@property` and the `@end` as shown in [Figure 6-29](#Chapter06.html#fig_6_29).\n\
    \n    ![images](images/9781430242727_Fig06-30.jpg)\n    **Figure 6-30.** *Setting\
    \ up the DBAuthor.m file*\n\n31. Navigate to `DBAuthor.m`. Drag in the \"09 DBAuthor.m\
    \ Methods and Extra Properties Implementation\" snippet from DemoMonkey and place\
    \ it between the last `@dynamic` and the `@end`. Also add `#import \"DBBook.h\"\
    ` right after the `#import \"DBAuthor.h\"` as shown in [Figure 6-30](#Chapter06.html#fig_6_30)\
    \ and as follows:\n\n    ```\n    #import \"DBAuthor.h\"\n    #import \"DBBook.h\"\
    \n    ```\n\nThat’s it! You’ve got through the setup and are ready to get on with\
    \ designing the app using Storyboarding in [Chapter 7](#Chapter07.html#ch7)."
