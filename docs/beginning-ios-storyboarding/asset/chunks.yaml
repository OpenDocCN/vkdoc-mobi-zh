    \ // 用于返回...代码片段，并将其放到您在图 5-39 中删除代码的位置。如图 5-40 所示。\n\n![images](img/9781430242727_Fig05-41.jpg)\n\
    \n**图 5-41.** *选中 `MAX_PAGES`。*\n\n16. 您需要确保将 `MAX_PAGES` 用作数组计数的想法是可行的，因此需要将其与\
    \ `pageViewController` 关联起来。按图 5-41 所示复制它。\n\n![images](img/9781430242727_Fig05-42.jpg)\n\
    \n**图 5-42.** *粘贴 `MAX_PAGES`。*\n\n17. 复制好 `MAX_PAGES` 后，向下滚动到 `if (index == [self.pageData\
    \ count])` 这一行，并将其粘贴覆盖 `[self.pageData count]`，如下所示：\n\n```\nindex++;\n    if\
    \ (index == [self.pageData count]) {\n         return nil;\n    }\n```\n\n将 `self.pageData.count`\
    \ 替换为：\n\n```\nindex++;\n    if (index == MAX_PAGES) {\n        return nil;\n\
