  trans: "\n6.  返回 Storyboard，选择“返回”按钮，打开辅助编辑器，并确保右侧显示的是你的 `ViewController.h` 文件。你会发现你还没有设置按钮是什么，以及点击它时执行什么操作（没错，就是你在\
    \ `helloWorld` 中做过的那一套！）。因此，在你的第一个视图中，即 View Controller – Scene 3 场景，按住 Control\
    \ 键从“返回”按钮拖拽到头文件中的 `btnReverse` 属性，如图 10-35 所示。\n\n![images](img/9781430242727_Fig10-36.jpg)\n\
    \n**图 10-36.** *调试场景 3：将“返回”按钮连接到操作方法。*\n\n7.  你还需要设置将要执行的操作。再次选择“返回”按钮，按住 Control\
    \ 键拖拽到头文件中的操作方法签名中。在图 10-36 中，该方法左侧原本为空的圆圈现在将被填充。\n\n![images](img/9781430242727_Fig10-37.jpg)\n\
    \n**图 10-37.** *调试场景 4：将“返回”按钮连接到操作方法。*\n\n8.  在场景 4 中再次选择“返回”按钮，重复你在 图 10-35\
    \ 中执行的步骤 1，然后执行 图 10-37 中显示的步骤 2。如你所见，你正在使用为每个视图实例化的同一个 `ViewController` 对象。因此，即使它显示已经连接过一次，你仍需要为每个视图重新连接。这就是我们“忘记”做的事情，以便能够切实强调这一点。\n\
    \n运行它，你会看到，当你进入死胡同时，“返回”按钮在你到达那里时才出现，并且现在它们能正常工作，帮助你离开。\n\n非常棒。你在首次进入并走出死胡同上取得了很大进展。现在你已经掌握了构建迷宫其余部分所需的所有工具。\n\
    \n#### 场景 5\n\n![images](img/9781430242727_Fig10-38.jpg)\n\n**图 10-38.** *复制场景\
    \ 2 以创建场景 5。*\n\n*   场景 5：复制现有场景。\n    *   场景 5：将其放置到前一个场景的上方或下方。\n*   场景 5：**重命名**。\n\
    \    *   场景 5：更改标题。\n    *   场景 5：更改图像。\n*   场景 5：整理图形。\n*   场景 5：建立连接。\n\n1.\
    \  到目前为止，你一直从入口沿着迷宫的右手边路径前进。现在你需要处理左手边的路径。切换回标准编辑器模式。首先选择场景 2，然后按 `⌘`+D 键复制它，如图\
    \ 10-38 所示。现在，将副本移动到场景 2 的上方和右侧，并将标题更改为*场景 5*，就像你在 图 10-8 中所做的那样。\n\n    **注意：**\
    \ 我们使用了场景 2，因为场景 3 和场景 4 包含“返回”按钮，而场景 5 并不需要这些按钮。\n\n    ![images](img/9781430242727_Fig10-39.jpg)\n\
    \n    **图 10-39.** *连接场景 2：按钮 – 左侧连接到场景 5。*\n\n    *   场景 5：复制现有场景。\n    *   场景\
    \ 5：重命名。\n    *   场景 5：整理图形。\n    *   场景 5：建立连接。\n        *   场景 5：按住 Control\
    \ 键从按钮拖拽到新场景。\n        *   场景 5：编辑转场的属性。\n2.  按住 Control 键从场景 2 中的左侧按钮拖拽到场景 5\
    \ 的 View Controller，如图 10-39 所示，就像你在 图 10-16 中所做的那样。选择创建的转场，在属性检查器中将转场类命名为 `MovementSegue`，保持样式为“自定义”，并将标识符更改为\
    \ *Left*。\n\n    ![images](img/9781430242727_Fig10-40.jpg)\n\n    **图 10-40.**\
    \ *场景 5：更改图像。*\n\n    *   场景 5：复制现有场景。\n    *   场景 5：**重命名**。\n        *   场景\
    \ 5：更改标题。\n        *   场景 5：更改图像。\n    *   场景 5：整理图形。\n    *   场景 5：建立连接。\n3.\
    \  我们这里稍微打乱了顺序——将图像更改为 `wanderBoard-cam05.png`，如图 10-40 所示。\n\n    ![images](img/9781430242727_Fig10-41.jpg)\n\
    \n    **图 10-41.** *场景 5：隐藏左侧按钮。*\n\n    *   场景 5：复制现有场景。\n    *   场景 5：重命名。\n\
    \    *   场景 5：整理图形。\n        *   场景 5：隐藏不适用的元素。\n    *   场景 5：建立连接。\n4.  对于场景\
    \ 5 的按钮，你并没有一个左侧出口，因此选择“按钮 – 左侧”并将其隐藏，如图 10-41 所示。\n\n    ![images](img/9781430242727_Fig10-42.jpg)\n\
    \n    **图 10-42.** *场景 5：编辑右侧按钮。*\n\n    *   场景 5：复制现有场景。\n    *   场景 5：重命名。\n\
    \    *   场景 5：整理图形。\n        *   场景 5：隐藏不适用的元素。\n        *   场景 5：编辑按钮。\n    \
    \    *   场景 5：使按钮可见。\n        *   场景 5：将图像替换为新图像（已完成）。\n        *   场景 5：配置新按钮。\n\
    \            *   场景 5：复制按钮。\n            *   场景 5：重置按钮参数。\n            *   场景\
    \ 5：按钮 – 右侧。\n            *   场景 5：再次设置为透明。\n            *   场景 5：纠正错误。\n    *\
    \   场景 5：建立连接。\n5.  你确实有一个右侧按钮。你现在已经熟悉流程了。使其可见，并将其位置大小设置为(685, 40, 220, 675)，如图\
    \ 10-42 所示。现在，通过将其设置为“显示触摸高亮”来纠正错误。然后我们继续处理场景 6。\n\n#### 场景 6\n\n![images](img/9781430242727_Fig10-43.jpg)\n\
    \n**图 10-43.** *复制场景 5 以创建场景 6。*\n\n*   场景 6：复制现有场景。\n    *   场景 6：将其放置到前一个场景的上方或下方。\n\
    *   场景 6：**重命名**。\n    *   场景 6：更改标题。\n    *   场景 6：更改图像。\n*   场景 6：整理图形。\n* \
    \  场景 6：建立连接。\n\n1.  你知道这是一个右侧出口，并且没有特殊情况，所以只需复制你刚才创建的那个。点击场景 5 的停靠栏，然后按 `⌘`+D\
    \ 键复制它，如图 10-43 所示。将标题更改为*场景 6*，并将图像更改为 `wanderBoard-cam06.png`。\n\n    ![images](img/9781430242727_Fig10-44.jpg)\n\
    \n    **图 10-44.** *连接场景 5：按钮 – 右侧连接到场景 6。*\n\n    *   场景 6：复制现有场景。\n    *   场景\
    \ 6：重命名。\n    *   场景 6：整理图形。\n    *   场景 6：建立连接。\n        *   场景 6：按住 Control\
    \ 键从按钮拖拽到新场景。\n        *   场景 6：编辑转场的属性。\n2.  你需要创建一个向右的转场以到达场景 6。按住 Control 键从场景\
    \ 5 的 View Controller 中的右侧按钮拖拽到场景 6 的 View Controller，如图 10-44 所示。完成后，选择创建的转场，在属性检查器中将转场类命名为\
    \ `MovementSegue`，保持样式为“自定义”，并将标识符更改为 *Right*。\n\n    ![images](img/9781430242727_Fig10-45.jpg)\n\
