    \    `{`\n    `  [super viewDidLoad];`\n    `      // Do any additional setup\
    \ after loading the view.`\n    **`  _categories = [NSMutableArray arrayWithArray:[DBCategory\
    \ allCategories]];`**\n    `}` ![images](images/9781430242727_Fig08-63.jpg)\n\n\
    **Figure 8-63.** *Display the items in the Table View.*\n\n8.  Next, you need\
    \ to display the items in the `CategoriesViewController`. Drag in the “28 CategoriesViewController.m\
    \ Display Categories” snippet from DemoMonkey and place it right before the `@end`\
    \ as shown in [Figure 8-63](#Chapter08.html#fig_8_63).\n\nThe way you display\
    \ the items in the Table View is very similar to the one you did in the `BooksViewController`,\
    \ except that here in the `(NSInteger)tableView:(UITableView *)tableView numberOfRowsInSection:(NSInteger)section\
    \ you` display two static rows at the end of the Table View in addition to the\
