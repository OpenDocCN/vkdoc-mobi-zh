- fmt: '# Fundamentals


    With the release of iOS 5, Apple has given iOS developers an updated SDK with
    more than 1500 APIs, among which Storyboarding is one of the most intriguing.


    So what is Storyboarding? And how can it make your life as iOS developer easier?


    For our introduction to Storyboarding, we will navigate our way through this awesome
    new tool. Storyboarding allows one to lay out the workflow of your app using the
    new Storyboards feature built into the design tools of Xcode. Created for apps
    that use Navigation and Tab Bars to transition between Views, Storyboards ease
    the development by managing the View Controllers for you. You can specify the
    transitions and segues that are used when switching between Views without having
    to code them by hand. Storyboarding enables you to interact seamlessly and link
    all the screens in your application without the cumbersome code you had to write
    for the transitions between the screens and the controls used to trigger the transitions.
    This allows you to see every possible path through your application graphically,
    greatly reducing the amount of code you need to write for a complex multi-View
    application.


    Before we dive into all the nuts and bolts of creating apps using Storyboarding,
    let’s take a quick tour of what lies behind this new developer tool.


    As you may already know, since the release of Xcode 4, Interface Builder (IB)
    has been completely integrated within the Xcode IDE so there is no longer a separate
    application for building your user interface (UI). Selecting an interface file
    (`.nib`/`.xib`) in your project simply opens the IB Editor within Xcode, where
    you tweak your UI just the way you want it.


    Storyboard is a new IB file, introduced in Xcode 4.2, which allows you to view
    the entire UI of your app in one place, including the transitions between the
    parts of your app and the triggers that initiated those transitions, so you can
    very conveniently get an overview of the app. It is very similar to a `.nib`/`.xib`
    file except that it manages multiple View Controllers for you and allows you to
    specify the transitions used when switching from one View to another without having
    to code them manually. You can think of a Storyboard as a collection of mini `.xib`s
    and transitions and/or relationships between them.


    With the built-in Storyboarding feature, you can now lay out the workflow of your
    app visually before writing any code at all! It also reduces the amount of code
    you need to write for complex multiscreen applications.


    Ever wondered what lies behind the mysterious `.storyboard` files? The answer
    may surprise you: it’s XML (Extensible Markup Language)—yes, good ol’ XML that’s
    so widely used in web-server communication and a variety of web applications.
    So, at the low level, Storyboard is just a text document formatted in a special
    way that defines an object graph of your application UI, and which iOS interprets
    at runtime to render the UI elements, based on the rules specified in the document.
    This XML file keeps track of all the attributes for every UI element in the Storyboard
    as well as transitions and/or relationships between them.


    In fact, you can check it out for yourself. Open Xcode and create a new project.
    Select the Single View Application template in the first dialog screen. Hit Next.
    Name the project whatever you like, but make sure the `Use Storyboards` option
    is checked. Save it to your preferred location. Once the new project opens up,
    you’ll see that Xcode has created a file for you called `MainStoryboard.storyboard`.
    Select the file in the Project Navigator as shown in [Figure 2.0A](#Chapter02.html#fig_2_0A).
    Now click the Version Editor icon in the top right-hand corner of the main toolbar
    and then click the Log mode icon in the bottom right-hand corner as shown in [Figure
    2-0B](#Chapter02.html#fig_2_0B). You can now see the XML behind your Storyboard
    file. Not very pretty, huh? Imagine how complex and hard to read it gets after
    you add tons of UI elements to it? Luckily, Interface Builder nicely renders it
    for you in the form of graphical elements that are much more pleasant to interact
    with than raw XML.


    ![images](images/9781430242727_Fig02-0A.jpg)


    **Figure 2-0A.** *Standard Storyboard file of the Single View Application template*


    ![images](images/9781430242727_Fig02-0B.jpg)


    **Figure 2-0B.** *Storyboard file viewed as XML document*


    Now that you know the secret behind the Storyboard implementation, let’s take
    a quick peek at how it looks at first sight.


    As you probably noticed, the basic Storyboard created by the Xcode for Single
    View Application template is almost identical to any regular `.xib` file you may
    have seen before, with just a few exceptions: there’s an incoming arrow pointing
    towards the main View, and there’s a black container below the main View that
    says “View Controller.” Both of these elements serve a very clear purpose. Because
    Storyboard can have multiple View Controllers, you need a way to specify which
    one of those should load when the app starts; the arrow is pointing towards the
    View Controller that will be the first View presented to the user when the app
    is launched. To change the Initial View Controller of your application, drag and
    drop the arrow onto any View Controller in the Storyboard that you want to be
    presented first.


    What about the black container? It’s a so-called Dock for each View Controller
    scene. As we mentioned earlier, Storyboard can be seen as a collection of nibs,
    and each one of them has a View Controller class it’s controlled by (default or
    custom) and a First Responder.


    **NOTE:** First Responder is a placeholder object that represents the first object
    in the responder chain, which is determined dynamically at runtime by the UIKit
    framework. This object first receives many kinds of events like touches, key events,
    action messages, and so on. In iOS applications, there is no single First Responder
    object—the First Responder is always the View that is the target of a touch, which
    is typically the currently selected object or the object with the current focus
    in the frontmost window.


    The Dock gives you easy access to the two objects just described, which you would
    normally see at the top of the Document Outline in a regular nib file. You can
    see the icons representing View Controller and First Responder placeholder objects
    by clicking the Dock as shown in [Figure 2-0C](#Chapter02.html#fig_2_0C). You
    can use these referencing icons to quickly connect the `IBOutlet`s and specify
    `IBAction` for your UI elements. Each View Controller in the Storyboard has a
    set of those two objects, so you can conveniently edit all the necessary details
    of each Storyboard scene by focusing on just one particular screen at a time.
    Additionally, the Dock may contain other objects added to a scene, such as Gesture
    Recognizers, Navigation Items, and others. You’ll get a better understanding of
    how to use them when you get to actual coding.


    ![images](images/9781430242727_Fig02-0C.jpg)


    **Figure 2-0C.** *Scene’s Dock with First Responder and View Controller objects*'
