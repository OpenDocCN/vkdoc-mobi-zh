  trans: "\n### 步骤 5：代码：`RootViewController`\n\n![图片](img/9781430242727_Fig05-56.jpg)\n\
    \n**图 5-56.** *让我们编写`RootViewController`的代码，以处理它将接收的通信。*\n\n1.  打开 `RootViewController.h`\
    \ 文件。拖入“19 `RootViewController.h` – 添加包含”并将其插入到 `#import <UIKit/UIKit.h>` 之后，如图\
    \ 5-56 所示。这样做是因为你需要使`DataViewControllerDelegate`协议对`RootViewController`可见，因为你将使其遵循这个新协议。但目前它还不存在，所以让我们添加它。删除`@interface`行末尾的右尖括号，拖入“20\
    \ `RootViewController.h` – 添加协议”，并将其与`UIPageViewControllerDelegate`并列插入，如下所示：\n\
    \n```\n#import <UIKit/UIKit.h>\n#import \"DataViewController.h\"\n\n@interface\
    \ RootViewController : UIViewController <UIPageViewControllerDelegate,\nDataViewControllerDelegate>\
    \ {\n}\n\n@property (strong, nonatomic) UIPageViewController *pageViewController;\n\
    @end\n```\n\n![图片](img/9781430242727_Fig05-57.jpg)\n\n**图 5-57.** *完成实现。*\n\n\
    2.  头文件部分已经完成，现在来完成实现。导航到 `RootViewController.m`。首先要注意的是，你不再需要 `#import \"DataViewController.h\"\
    `，因为它已经在头文件中了，所以请删除它。注意图 5-57 中第 23 行的警告。这是因为你的协议方法尚未实现。所以首先设置委托。找到 `viewDidLoad`\
    \ 方法的实现，拖入“21 `RootViewController.m` – 设置委托（`startingViewController.delegate =\
    \ self;`）”，并将其插入到 `DataViewController *startingViewController` 实例化之后、`NSArray\
    \ *viewControllers` 之前，如下所示：\n\n```\nDataViewController *startingViewController\
    \ = [self.modelController\nviewControllerAtIndex:0 storyboard:self.storyboard];\n\
    startingViewController.delegate = self;  // 告诉对象我们想接收其消息\n    NSArray *viewControllers\
    \ = [NSArray arrayWithObject:startingViewController];\n```\n\n你必须这样做，因为这个委托是由你（而非\
    \ Apple）支持的，所以你需要插入代码来实际设置委托。现在 `RootViewController` 将接收来自 `DataViewController`\
    \ 的消息。\n\n![图片](img/9781430242727_Fig05-58.jpg)\n\n**图 5-58.** *仅支持横屏。*\n\n3.\
    \  再次需要声明你仅支持横屏。转到 `shouldAutorotateToInterfaceOrientation:`，删除 `return YES;`\
    \ 这行代码，拖入“22 `RootViewController.m` – 替换旋转确认代码”，并将其插入，如图 5-58 所示。\n\n![图片](img/9781430242727_Fig05-59.jpg)\n\
    \n**图 5-59.** *调整 `PageViewController`。*\n\n4.  现在你需要调整 `PageViewController`，考虑到在\
    \ iPad 上，如果是竖屏模式，它将显示单页；如果是横屏模式，默认会显示双页（左右两页）。但我们不会这样做。我们将使用仅竖屏选项（尽管应用在横屏模式下显示）。所以找到\
    \ `pageViewController:spineLocationForInterfaceOrientation:` 方法，选中其代码中与横屏选项相关的底部部分（以\
    \ `// In landscape orientation…` 注释开头），并将其删除，如图 5-59 所示。最后，移除外层的 `if (UIInterfaceOrientationIsPortrait(orientation))\
    \ {}` 语句，只保留 `if` 语句内部的代码在实现中。\n\n![图片](img/9781430242727_Fig05-60.jpg)\n\n**图\
    \ 5-60.** `pageViewController` 的最终视图。\n\n5.  图 5-60 是我们上一步删除操作后的最终视图。由于它无法在图中完整显示，我们将其以小字体放在这里供您参考：\n\
    \n```\n- (void)pageViewController:(UIPageViewController *)pageViewController\n\
    didFinishAnimating:(BOOL)finished previousViewControllers:(NSArray\n*)previousViewControllers\
    \ transitionCompleted:(BOOL)completed\n{}\n */\n- (UIPageViewControllerSpineLocation)pageViewController:(UIPageViewController\n\
    *)pageViewController\nspineLocationForInterfaceOrientation:(UIInterfaceOrientation)orientation\n\
    {\n  // 竖屏方向：将脊柱位置设置为\"min\"，页面视图控制器的视图控制器数组仅包含一个视图控制器。\n在横屏方向将脊柱位置设置为'UIPageViewControllerSpineLocationMid'会将\
    \ doubleSided 属性设置为 YES，因此在这里将其设置为 NO。\n  UIViewController *currentViewController\
    \ =\n[self.pageViewController.viewControllers objectAtIndex:0];\n  NSArray *viewControllers\
    \ = [NSArray arrayWithObject:currentViewController];\n  [self.pageViewController\
    \ setViewControllers:viewControllers\ndirection:UIPageViewControllerNavigationDirectionForward\
    \ animated:YES\ncompletion:NULL];\n  self.pageViewController.doubleSided = NO;\n\
    \  return UIPageViewControllerSpineLocationMin;\n}\n@end\n```\n\n![图片](img/9781430242727_Fig05-61.jpg)\n\
    \n**图 5-61.** *插入委托响应方法并运行。*\n\n6.  通过拖入“23 `RootViewController.m` – 添加 DVC 委托方法”来插入委托响应方法，并将其插入到\
    \ `@end` 之前，如图 5-61 所示。我们知道你已经等这一刻很久了。继续运行它吧！\n\n![图片](img/9781430242727_Fig05-62.jpg)\n\
    \n**图 5-62.** *初始启动画面*\n\n7.  四页传单的初始启动画面如图 5-62 所示，红色圆圈标明了从哪里滑动（或点击）来翻页。\n\n\
    ![图片](img/9781430242727_Fig05-63.jpg)\n\n**图 5-63.** *页面导航*\n\n8.  用户进入传单后，会看到我们有四个目的地。当用户点击它们时，会发现它们是可点击的。“我们去吧”指示器会出现在用户点击的目的地上，并立即在上一次点击的目的地上隐藏。你需要确保用户选择的任何图片，在点击“下一页”时都能正确地显示出预期的下一页，如图\
    \ 5-63 右侧图片所示。果然，前往 200 万年前的洛杉矶之旅出现了。同样，图 5-64 显示了 130 万年前的开普敦。哇！\n\n![图片](img/9781430242727_Fig05-64.jpg)\n\
    \n**图 5-64.** *更多视图*\n\n## 第 6 章\n"
- fmt: '# Mastering Table Views with Storyboarding: Core Data Setup


    The last two apps you’ll work on in this book are more complex and professional.
    Accordingly, we are dividing each one into three chapters. The Master-Detail Application:
    `bookManager` app is covered in [Chapters 6](#Chapter06.html#ch6), [7](#Chapter07.html#ch7),
    and [8](#Chapter08.html#ch8). The final app, Single View #3: `wanderBoard`, is
    covered in [Chapters 9](#Chapter09.html#ch9), [10](#Chapter10.html#ch10), and
    [11](#Chapter11.html#ch11).


    In this chapter, you’ll begin to develop a fairly intricate book manager application
    that will demonstrate how Storyboarding simplifies the building of apps that extensively
    utilize Table Views. Before diving in to this project, appreciating a little bit
    about the iOS history behind the Master-Detail Application will help you decide
    whether to use this template in the future. Remember how in [Chapter 4](#Chapter04.html#ch4)
    you used the Utility Application template to make an iPad Split View (see that
    chapter’s [Figure 4-57](#Chapter04.html#fig_4_57))? You created a Main View by
    coding a `MainViewController` and then created a Secondary View by coding a `FlipSideViewController`.


    Well, that wasn’t always so easy. When we first began coding for the iPad with
    the iOS SDK 3.2, it took a whole lot of work to create a Split View. Now in iOS
    5 Apple has integrated the Split View-based Application template into the Navigation-based
    Application template and called it the Master-Detail Application template. Simply
    put, when you use the Master-Detail Application template and a user runs your
    app on an iPhone, it acts like it was programmed with a Navigation-based Application
    template. When a user runs your app on an iPhone, it acts like it was programmed
    with a Split View-based Application template.


    On the Internet, most Master-Detail Application “tutorials” show instructions
    for coding the Split View Controller, *not* using Storyboard but still doing things
    the old-fashioned way—by going back to `xibs`. That method ignores the reason
    why Apple created the Master-Detail Application template. Remember to use the
    Master-Detail Application template when you know you’ll be working with lists,
    databases, and tables—particularly if you want to let the user drill down through
    your data in a hierarchical manner.


    In this app, you’ll learn Storyboarding for lists and tables using the Master-Detail
    Application template. You’ll also learn how to connect this data dynamically to
    a SQLite database. We’ve included the database component because it’s certainly
    a game changer when you can say you know how to hook up data to a database. Finding
    Xcoders who have any experience at all with SQL is difficult for employers. As
    if that weren’t enough, we will also introduce you to `MagicalRecord`, an open
    source library available on GitHub and used by many of the coders. `MagicalRecord`
    is a very efficient and amazingly easy-to-use framework created by MagicalPanda
    Software specifically for interacting with Core Data.


    We explain all that later in the chapter. For now, feel good that you are about
    to embark on learning how to encapsulate the following:


    * SQLite

    * GitHub (a repository for software development projects using the git revision
    control system)

    * Core Data into a Master-Detail Application template!


    Awesome!


    ## bookManager: A Master-Detail App


    The `bookManager` app keeps track of a select group of Apress books, including
    their categories, titles, and authors. It also provides the ability to add, edit,
    and delete books in the SQLite database.


    The top of the hierarchical tree is the My Library node, which has two categories,
    Books and Authors, as shown in the left-hand image in [Figure 6-0A](#Chapter06.html#fig_6_0A).
    Tapping Books drills down to the Categories node, where the user can choose a
    category of Apress books, edit them, or go back to My Library as shown in the
    center image in [Figure 6-0A](#Chapter06.html#fig_6_0A). Tapping Authors in the
    left-hand image leads to the Authors node, where the user can select an Apress
    author, edit the authors, or go back to My Library as shown in the right-hand
    image in [Figure 6-0A](#Chapter06.html#fig_6_0A).


    ![images](images/9781430242727_Fig06-0A.jpg)


    **Figure 6-0A.** *The `bookManager` app’s My Library at the root level.*


    The `bookManager` app has three views in which one can see the Apress books. First,
    as illustrated in [Figure 6-0B](#Chapter06.html#fig_6_0B), when the user taps
    Books from the Author selection; second, when the user taps Books from the Categories
    selection; and third, when the user wants to edit, delete, or add a book. The
    `bookManager` app also provides two distinct dialog boxes for adding a new category
    or a new author, illustrated in [Figure 6-0C](#Chapter06.html#fig_6_0C).


    ![images](images/9781430242727_Fig06-0B.jpg)


    **Figure 6-0B.** *Books from Authors, from Categories, and editing from Categories*


    ![images](images/9781430242727_Fig06-0C.jpg)


    **Figure 6-0C.** *Adding a Category and adding an Author*


    The project is divided into three chapters. In this chapter, you set up the files,
    images, Core Data, and data model. In [Chapter 7](#Chapter07.html#ch7), you design
    the entire app using only Storyboard. And in [Chapter 8](#Chapter08.html#ch8),
    you insert the code behind the Storyboard elements and tweak a couple of Storyboard
    necessities.


    ## Preliminaries


    This chapter is the most challenging yet. We provide a substantial set of assets
    to help you in case you get stuck along the way. Again, as in all the chapters,
    we supply you with all the files and code necessary at [`http://bit.ly/sMRvAP`](http://bit.ly/sMRvAP)
    and on the book’s page at `apress.com`. You can also download the final version
    of the app here at [`http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter06_bookManager.zip`](http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter06_bookManager.zip)
    but just downloading the final version won’t really help you learn how to use
    GitHub, `MagicalRecord`, or SQLite, so we suggest downloading the `assets` folder
    now and taking note of the following: when you download the `assets` zip file
    from at [`http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter06_bookManager%20Assets.zip`](http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter06_bookManager%20Assets.zip)
    you will see two files, `bookdata.plist` and `chapter6.demoMonkey`, together with
    two folders, `images` and `MagicalRecord`.


    You will be using the plist file for database creation, the `DemoMonkey` file
    for the code, and the `images` folder for your images. If you can’t get your head
    wrapped around GitHub and `MagicalRecord`, don’t worry. We also provide the entire
    folder `MagicalRecord`, which is what you end up with after going through the
    GitHub exercise, so you can drag it entirely into your project and continue following
    along. We suggest using `MagicalRecord` and exploring GitHub. It will certainly
    elevate you into an elite set of coders if you can say that you have GitHub and
    Core Data experience.


    Clear out your desktop, download [`http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter06_bookManager%20Assets.zip`](http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter06_bookManager%20Assets.zip),
    unzip the folder, and let’s get going.'
