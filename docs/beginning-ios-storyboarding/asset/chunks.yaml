    \ nonatomic) IBOutlet UIImageView *_bookImage;`\n`@property (weak, nonatomic)\
    \ IBOutlet UITextView *_descriptionTextView;`\n\n`@end`\n\n![images](img/9781430242727_Fig08-12.jpg)\n\
    \n**图 8-12.** *编辑 DetailViewController.m 文件。*\n\n8.  现在，你已经将 Storyboard 中的元素连接到了\
    \ `DetailViewController.m` 文件中，还需要添加一些额外的代码片段。具体来说，你需要导入 `DBBook.h` 文件，以便访问该类的接口。打开\
    \ `DetailViewController` 的实现文件，将 DemoMonkey 中的 \"—— DetailViewController.m Imports\"\
    \ 代码片段拖入，并放置在 `#import \"DetailViewController\"` 之后，如图 8-12 和以下代码所示：\n\n`#import\
    \ \"DetailViewController.h\"`\n`#import \"DBBook.h\"`\n\n`@interface DetailViewController\
    \ ()`\n    `- (void)configureView;`\n\n`@property (weak, nonatomic) IBOutlet UILabel\
    \ *_titleLabel;`\n\n![images](img/9781430242727_Fig08-13.jpg)\n\n**图 8-13.** *为\
    \ configureView 方法添加代码。*\n\n9.  你需要使用来自 SQLite 数据库的数据更新书籍详情场景的用户界面，该数据库包含了用户所选书籍的所有关键详细信息。为此，你需要编辑并调整\
    \ `configureView` 方法。我们已经为你编写好了 `configureView` 的额外元素，你可以始终将其作为模板使用。首先，注释掉当前存在的代码行：\n\
    \n`//self.detailDescriptionLabel.text = [self.detailItem description];`\n\n将 DemoMonkey\
    \ 中的 \"12 DetailViewController.m configureView\" 代码片段拖入，并放置在 `configureView` 方法实现中，紧跟在注释掉的代码行下方，如图\
    \ 8-13 和以下代码所示：\n\n```\n- (void)configureView\n{\n    // 为用户界面的详情项进行更新。\n\n  \
    \  if (self.detailItem) {\n        //self.detailDescriptionLabel.text = [self.detailItem\
    \ description];\n        DBBook *object = self.detailItem;\n        self._titleLabel.text\
    \ = object.title;\n        self._authorLabel.text = object.author.fullName;\n\
    \        self._categoryLabel.text = object.category.categoryName;\n        self._yearLabel.text\
    \ = object.year;\n        self._descriptionTextView.text = object.bookDescription;\n\
    \        self._bookImage.image = [UIImage imageNamed:[NSString\n        stringWithFormat:@\"\
    %@big.png\", object.imageName]];\n    }\n}\n```\n\n在 `DBBook object = self.detailItem`\
    \ 这一行中，你获取到了在跳转过程中传递给你的 `detailItem`。然后，接下来的六行代码，从 `self.*` 开始，为你在图 8-7 至 8-11\
    \ 中创建的文本和图片输出口分配了所有属性。\n\n**注意：** 你可能需要导航到你的“数据模型”文件夹，并打开 `DBBook.h` 文件，以理解为什么在第\
    \ 6 章中创建了 `bookId`、`categoryId`、`authorId`、`title`、`year` 和 `bookDescription`。你可以看到\
    \ `DetailViewController` 将如何使用这些属性来显示存储在数据库实体中的数据。\n\n至此，`DetailViewController`\
    \ 中需要添加的内容就结束了。接下来，你将开始创建另一个视图控制器类——`SelectionViewController`。\n"
- fmt: "#### Creating the SelectionViewController\n\n![images](images/9781430242727_Fig08-14.jpg)\n\
    \n**Figure 8-14.** *Create the SelectionViewController.*\n\n1. Another “leaf”\
    \ scene in your Storyboard is the one that allows users to choose the author or\
    \ the category when they are creating a new book. Press ![images](images/U003.jpg)+N\
    \ to create a new subclass and after selecting the Objective-C class, click Next\
    \ just as you did in [Figure 8-1](#Chapter08.html#fig_8_1). Call this class the\
    \ `SelectionViewController`, make sure it’s a subclass of `UITableViewController`,\
    \ and then click Next as shown in [Figure 8-14](#Chapter08.html#fig_8_14).\n\n\
    ![images](images/9781430242727_Fig08-15.jpg)\n\n**Figure 8-15.** *Replace the\
    \ code in SelectionViewController.h.*\n\n2. You’re going to radically change the\
    \ `SelectionViewController`’s header file, so to save time you’ll simply replace\
    \ the entire code for reasons that’ll be explained as you go along. First, select\
    \ all the original code in `SelectionViewController.h` and delete it. Drag in\
    \ the “13 SelectionViewController.h interface + Protocol” snippet from DemoMonkey\
    \ and place it at the bottom of the file as shown in [Figure 8-15](#Chapter08.html#fig_8_15)\
    \ and in the rest of this step.\n\nFirst, you have set out an array that will\
    \ be passed to the View Controller during the segue. It will contain a collection\
    \ of `DBAuthor` or `DBCategory` objects, based on which cell the user taps. You\
    \ do this with the following:\n\n`@property (nonatomic, strong) NSArray *objects;`\n\
    \nThen you need to return the book or category selection the user makes. That\
    \ means you need a delegate object you’ll be passing the selection back to. You\
    \ do this with the following:\n\n`@property (nonatomic, assign) id<SelectionVCDelegate>\
    \ delegate;`\n\nLastly, you define a protocol with the `selectionViewController:didSelectObject:`\
    \ method, which you’ll use to pass that selection back to the delegate:\n\n`@protocol\
    \ SelectionVCDelegate <NSObject>`\n    `- (void)selectionVC:(SelectionViewController\
    \ *)aVC didSelectObject:(id)anObject;`\n\n![images](images/9781430242727_Fig08-16.jpg)\n\
    \n**Figure 8-16.** *Synthesize and import what you added into the header file.*\n\
    \n3. You now need to synthesize the `delegate` and `objects` properties you created\
    \ in your header file. Open the `SelectionViewController.m` file. You haven’t\
    \ made a DemoMonkey step for this, so just type `@synthesize delegate;` and `@synthesize\
    \ objects;` under `@implementation SelectionViewController`. You also need to\
    \ import the header files for the database entities of Author and Category because\
    \ you need to have access to their attributes. Drag in the “--SelectionViewController.m\
    \ imports” snippet from DemoMonkey and place it under `#import \"SelectionViewController.h\"\
    ` as shown in [Figure 8-16](#Chapter08.html#fig_8_16) and as follows:\n\n```\n\
    #import \"SelectionViewController.h\"\n    #import \"DBAuthor.h\"\n    #import\
    \ \"DBCategory.h\"\n\n@interface SelectionViewController ()\n\n@end\n\n@implementation\
    \ SelectionViewController\n    @synthesize delegate;\n    @synthesize objects;\n\
    \n- (id)initWithStyle:(UITableViewStyle)style\n```\n\n![images](images/9781430242727_Fig08-17.jpg)\n\
    \n**Figure 8-17.** *Replace the UITableViewDataSource protocol methods.*\n\n4.\
    \ You’ll now add the code for your Table View. You’ll replace the `TableViewDataSource`\
    \ protocol methods that Xcode has already inserted for you with your own to make\
    \ things less confusing. Scroll down from where you’ve just been working. Go to\
    \ the end of `shouldAutorotateToInterfaceOrientation`, select everything from\
    \ there to just before the `@end`, and delete it. Drag in the “14 SelectionViewController.m\
    \ TableView Datasource and Delegate” snippet from DemoMonkey and put it right\
    \ before the `@end` as shown in [Figure 8-17](#Chapter08.html#fig_8_17).\n\nBecause\
    \ you’re using this Table View Controller for both Categories and Authors, in\
    \ the `cellForRowAtIndexPath:(NSIndexPath *)indexPath` method check the class\
    \ of the object you have in the array and then display the category name from\
    \ the database if it’s a Category.\n\n```\nif ([object isKindOfClass:[DBCategory\
    \ class]]) {\n        cell.textLabel.text = ((DBCategory *)object).categoryName;\n\
    \    }\n```\n\n… or the author’s name from the database if it’s an Author:\n\n\
    ```\nif ([object isKindOfClass:[DBAuthor class]]) {\n        cell.textLabel.text\
    \ = ((DBAuthor *)object).fullName;\n    }\n```\n\nThen, when the user selects\
    \ a choice, make a call back to the delegate to pass the object the user selected:\n\
    \n```\nif ([self.delegate respondsToSelector:@selector(selectionVC:didSelectObject:)])\
    \ {\n        [self.delegate selectionVC:self didSelectObject:[objects\n      \
    \  objectAtIndex:indexPath.row]];\n    }\n```\n\nSave it now because you need\
    \ to go back into Storyboard to assign this `ViewController` class to the corresponding\
    \ scene.\n\n![images](images/9781430242727_Fig08-18.jpg)\n\n**Figure 8-18.** *Click\
    \ Select Scene and associate it with SelectionViewController.*\n\n5. Open up Storyboard\
    \ and go to the Table View Controller, which is directly to the right of Add Book\
    \ Scene (refer back to [Figure 7-77](#Chapter07.html#fig_7_77)). Click the Table\
    \ View Controller icon once as indicated by the left arrow in [Figure 8-18](#Chapter08.html#fig_8_18).\
    \ With the View Controller selected, go to your Identity Inspector and make its\
    \ Class adhere to what you just coded: `SelectionViewController`, shown by the\
    \ right arrow in [Figure 8-18](#Chapter08.html#fig_8_18). Select the Prototype\
    \ cell, switch to the Attributes Inspector, and make sure its Identifier property\
    \ is set to `Cell`."
