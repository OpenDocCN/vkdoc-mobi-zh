  raw: '#### Storyboarding the Detail View: Book Detail Scene


    ![images](images/9781430242727_Fig07-42.jpg)


    **Figure 7-42.** *Start editing the Detail Scene for the selected book.*


    1.  You’ll now start designing your Detail View Controller. You first have to
    navigate your way to the very right-hand side of the canvas. Click the “Detail
    view content goes here” label and delete it as shown in [Figure 7-42](#Chapter07.html#fig_7_42).


    ![images](images/9781430242727_Fig07-43.jpg)


    **Figure 7-43.** *Start bringing in the labels.*


    2.  Jump ahead to [Figure 7-46](#Chapter07.html#fig_7_46) just for a minute—you’ll
    see that you need a Title and three lines of text, each of which includes two
    labels. What you’ll do is bring on a label for the Title, stretch it over the
    width of the view, format it, bring in two labels for the first of the three lines,
    format them as well, and then copy and paste them both twice. So, drag in your
    first label and change the text to *Title*. Make it almost as wide as the view
    itself, center it, set the font to System Bold 16.0, and change the text color
    to blue. Drag in another label and place it left-aligned, directly under Title.
    Change the text to *Category:* and set the font to System Bold 17.0\. Then pull
    it to the right to stretch it just enough to accommodate the text. Now bring in
    another label and place it to the right of the one you just added as shown in
    [Figure 7-43](#Chapter07.html#fig_7_43). Drag the right-hand handle of the label
    out almost to the right-hand edge of the canvas and change its text to *Category
    Label*.


    ![images](images/9781430242727_Fig07-44.jpg)


    **Figure 7-44.** *Paste and align two more lines.*


    3.  Select the Title label and set its Alignment in the Attributes Inspector to
    center the text. Now select both Category: and Category Label, press ![images](images/U003.jpg)+C
    to copy them both, and then press ![images](images/U003.jpg)+V twice. Now start
    to align them as shown in [Figure 7-44](#Chapter07.html#fig_7_44). Once you have
    them nicely aligned—perfectly under one another—move on to the next step.


    ![images](images/9781430242727_Fig07-45.jpg)


    **Figure 7-45.** *Rename and drag in a UIImageView for the book cover.*


    4.  Rename the two lines you just pasted to *Author:* with *Author Label* and
    *Year:* with *Year Label*. Now drag in a `UIImageView` from the Library to accommodate
    an image of the book’s cover. Go to the Size Inspector and set the dimensions
    to 111 × 160\. Then center the image as shown in [Figure 7-45](#Chapter07.html#fig_7_45).


    ![images](images/9781430242727_Fig07-46.jpg)


    **Figure 7-46.** *Finish off the view.*


    5.  Two last things you’ll do is associate the Image View to the temporary larger
    image `1big.png` and drag in a Text View, as shown in [Figure 7-46](#Chapter07.html#fig_7_46),
    that will accommodate the short book description we’ve provided for you. The text
    for Text View is selected from the database along with the appropriate name of
    the image.


    ![images](images/9781430242727_Fig07-47.jpg)


    **Figure 7-47.** *Align and rename the text of the Text View.*


    6.  Once you place the Text View onto the canvas, center it. In the Attributes
    Inspector uncheck the Editable option and enter *Description* in the Text box
    as shown in [Figure 7-47](#Chapter07.html#fig_7_47). Please keep saving each step
