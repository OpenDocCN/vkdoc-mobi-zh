  trans: '

    # 为基于页面的应用编排故事板


    我们的第四个故事板应用，可以说是一个相当离奇的尝试。你将构建一个基于页面的应用程序，它包含一个动态的电子手册，而这份手册实际上由 4 个微型手册组成。有趣的是，你的“客户”是一家能够穿越过去和未来的时间旅行机构！我们将这个应用命名为`futureTravel`。当你使用它来提升你的故事板技巧时，你将学到许多酷炫的工具和方法。


    请注意，应用 1 到 3 侧重于标准的故事板技能和代码。应用 4 到 7 将专注于更高级的故事板功能和方法，这些功能和方法建立在前几节讨论的理论代码基础之上。


    `FutureTravel`将四个手册合而为一。这意味着，当用户进入四页中的第二页时，用户可以从四个可能的目的地中选择一个。做出选择后，剩余的两页会自动根据用户选择的目的地进行定制。如果用户决定探索其他三个目的地，`futureTravel`允许她简单地往回翻页并选择另一个目的地，然后再次向前翻页，页面会动态更新，关联到新选择的目的地。


    使用基于页面的应用模板，关键在于用你自己的数据模型替换内置的数据模型。页面导航只是让你能够查看由这个底层模型生成的页面。你将使用 iPad 布局，因为它为你的旅行宣传单页面提供了更大的文本空间。你将用自己的一组页面替换内置模型，每个页面包含一张图片和页码。你将把这些页面数据封装到自己的类中（包含`.h`/`.m`文件的对象）。在`ModelController`的启动方法中，你将在运行时构建页面数据的数组。在故事板文件中，你可以根据需要调整
    UI。


    ## futureTravel：一个基于页面的应用


    我们将这个项目分为五个步骤。首先，从模板创建项目，然后准备故事板。步骤 3 到 5 包括编写`ModelController`、`DataViewController`和`RootViewController`的代码。这个项目本质上会变得相当有层次结构，因此你可能需要留意我们编码策略的总体大纲：


    1.  *从模板创建*：首先，我们启动一个新的基于页面的应用，命名为`futureTravel`，使用`com.apress`作为标识符，选择 iPad，并启用
    ARC。然后，我们通过取消选中竖屏和倒置功能来调整项目设置。接下来，我们将资源文件（如`Default-Lanscape*~ipad.png`和`ModelPageData`类文件（`.h`和`.m`））拖入`futureTravel`组。为了测试一切正常，我们构建项目。

    2.  *准备故事板*：这里需要考虑两部分：根视图和数据视图。对于根视图，我们为视图背景着色：`RGB(254,196,37)`，即 Apress 的黄色。数据视图稍微复杂一些。这里我们也为视图背景着色：`RGB(253,224,145)`，这是我们之前使用的
    Apress 黄色的较浅版本，但我们需要做更多工作。我们移除从属视图，并在其位置添加一个`UIImageView`，它将与我们的加载图片一致（`20,20
    984x679`）。这不会有任何用户交互。完成后，我们调整所有四个边缘，并启用两个方向的自动调整大小。我们还调整了标签的位置和配置，并正确定位它。最后，我们将文本改为右对齐，并将其颜色改为深灰色。

    3.  `编写 ModelController`。

    4.  `编写 DataViewController`。

    5.  `编写 RootViewController`。


    ## 准备工作


    我们为程序创建了资源，包括一个启动画面和最初的两张图片（旅行介绍和目的地选择），然后为四个目的地各创建了两张图片。我们为所有这些文件生成了`@2x`版本，如果我们在新的
    iPad（Retina 显示屏版本）上运行此应用，这些版本将自动被使用。我们还创建了一张特殊图片，用于标记客户的目的地选择。这样，我们为该项目总共生成了 23
    张图片。你可以在此处下载图片、资源、附加文件和 DemoMonkey 文件：[`http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter05_futureTravel%20Assets.zip`](http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter05_futureTravel%20Assets.zip)。你可以在此处下载我们拍摄视频时编写的源代码：[`http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter05_futureTravel.zip`](http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter05_futureTravel.zip)。和往常一样，我们建议你开始之前清理桌面，下载所有图片，并打开你的
    DemoMonkey 文件。

    '
- fmt: '### Step 1: Create from Template


    ![images](images/9781430242727_Fig05-01.jpg)


    **Figure 5-1.** *iBooks and our app, the Page-Based Application.*


    1. Before proceeding too far let’s make sure you understand when you’d want to
    use a Page-Based Application. After Apple released the iBook app in the App Store,
    there was an immediate demand to code the cool page-curling effect. In response,
    Apple introduced a new template called Page-Based Application in Xcode 4. The
    Page-Based Application uses a single View Controller that dynamically replaces
    content based on each page the user navigates to. It’s somewhat strange for Apple
    to provide the one and only instance where Xcode provides a template that is so
    far beyond the stripped-down, basic foundation it usually provides. With the Page-Based
    Application, Apple actually provides a sample application. However, we will go
    over some cool tricks and hidden traps very carefully in this chapter.


    **NOTE:** You will want to use the Page-Based Application template when you want
    to create a project containing an application designed to display a page for each
    new view.


    ![images](images/9781430242727_Fig05-02.jpg)


    **Figure 5-2.** *Start a new Page-Based Application project in Xcode.*


    2. Open Xcode, press `+N`, select a Page-Based Application, and click Next as
    shown in [Figure 5-2](#Chapter05.html#fig_5_2).


    ![images](images/9781430242727_Fig05-03.jpg)


    **Figure 5-3.** *Name the app futureTravel and then deselect Portrait and Upside
    Down.*


    3. Enter `com.apress` as the Company Identifier. We won’t use a class prefix.
    Make sure to select iPad and check Use Automated Reference Counting. Do not check
    Include Unit Tests ([Figure 5-2](#Chapter05.html#fig_5_2)). Once created, save
    it onto your desktop. You will see the new `futureTravel` project open up. As
    mentioned, we’re making this app for the iPad only—we’ll also make it Landscape
    only for the text images that we will be using. They have text orientated in Landscape
    orientation, so uncheck Portrait and Upside Down as shown in [Figure 5-3](#Chapter05.html#fig_5_3).
    Interesting to see what is missing here … can you see it? Notice there’s no option
    of not using the Storyboard with this Page-Based App.


    **NOTE:** When using the Page-Based model template, you have one goal: to go in
    and replace the model for the page content with your own model for the page content.
    You will now start this by adding your own data object and reworking the existing
    object to use the new data object.


    ![images](images/9781430242727_Fig05-04.jpg)


    **Figure 5-4.** *Drag the startup images into your root directory.*


    1. Open up your `futureTravel` Assets folder you downloaded from `http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter05_futureTravel%20Assets.zip`
    and unzip it onto your desktop. Select both of the startup images `Default-Landscape@2x~ipad.png`
    and `Default-Landscape~ipad.png` and drag them over to the root directory. Notice
    that you also have images for the new iPad (the Retina iPad), if you choose to
    compile this app directly onto the Retina iPad, as shown in [Figure 5-4](#Chapter05.html#fig_5_4).


    ![images](images/9781430242727_Fig05-05.jpg)


    **Figure 5-5.** *Make sure you copy the startup images into your project.*


    2. When the “Choose options for adding these files” dialog pops up, check “Copy
    items into destination group’s folder.” Also check “Create groups for any added
    folders.” Make sure your target is `futureTravel` and that it is checked ([Figure
    5-5](#Chapter05.html#fig_5_5)).


    ![images](images/9781430242727_Fig05-06.jpg)


    **Figure 5-6.** *Xcode automatically brings in the images.*


    3. Notice that Xcode detects that these images are for the Landscape and the Retina
    display and automatically drops them into the appropriate Launch Image boxes as
    shown in [Figure 5-6](#Chapter05.html#fig_5_6).


    ![images](images/9781430242727_Fig05-07.jpg)


    **Figure 5-7.** *Drag the Images folder into the Supporting Files folder.*


    4. Now select the entire `Images` folder and drag it into the `Supporting Files`
    folder as shown in [Figure 5-7](#Chapter05.html#fig_5_7).


    ![images](images/9781430242727_Fig05-08.jpg)


    **Figure 5-8.** *Copy the startup images folder into your project.*


    5. As in step 5, when the “Choose options for adding these files” dialog pops
    up, check “Copy items into destination group’s folder” and “Create groups for
    any added folders.” Make sure your target is `futureTravel` and that it is checked
    as shown in [Figure 5-8](#Chapter05.html#fig_5_8).


    ![images](images/9781430242727_Fig05-09.jpg)


    **Figure 5-9.** *Notice the new group that Xcode has now created for you.*


    6. Xcode instantiates a brand new group inside the `Supporting Files` folder as
    shown in [Figure 5-9](#Chapter05.html#fig_5_9).


    ![images](images/9781430242727_Fig05-10.jpg)


    **Figure 5-10.** *Drag in the Data class.*


    7. Because we’re focusing on the Storyboard aspect, we decided to create the data
    model code for you. We describe this code in detail later in the chapter, but
    for now just select both the `ModelPageData.h` and the `ModelPageData.m` files
    and drag them into your project as shown in [Figure 5-10](#Chapter05.html#fig_5_10).
    If you have one of the older versions of Xcode, you may have to instruct Xcode
    to build these new files. (By the time this book comes out, this may be fixed.)
    Step 12 shows you how to tell Xcode to build these new files.


    ![images](images/9781430242727_Fig05-11.jpg)


    **Figure 5-11.** *Copy the files.*


    8. Again check all the proper boxes as shown in [Figure 5-11](#Chapter05.html#fig_5_11).


    ![images](images/9781430242727_Fig05-12.jpg)


    **Figure 5-12.** *Manually add the new file to be built, if not already there.*


    9. Click `futureTravel` at the root of the Navigation tree. In Target settings
    on the left, pick the Build Phases tab at the top. Now expand the Compile Sources
    section. If you don''t see the `ModelPageData.m` file in this list, click the
    + (plus) button, select the `ModelPageData.m` implementation file, and click Add
    as shown in [Figure 5-12](#Chapter05.html#fig_5_12). This will add `ModelPageData.m`
    to the project. In case the desired files aren’t shown in the “Choose items to
    add” list, click the Add Other button and find the files you want to add in your
    directory structure.


    ![images](images/9781430242727_Fig05-13.jpg)


    **Figure 5-13.** *Another way to do this…*


    10. This is not the only way to do this if, by the time you read this, Apple has
    not fixed it. If you go to your `futureTravel` folder, right-click it, and select
    Add Files to `futureTravel`, as shown in [Figure 5-13](#Chapter05.html#fig_5_13),
    and then go out to your folder on your desktop and select the files, it automatically
    adds the sources to the compile list. This way you have two different ways to
    get around this minor bug with the new Xcode working in Lion.'
  raw: '### Step 1: Create from Template


    ![images](images/9781430242727_Fig05-01.jpg)


    **Figure 5-1.** *iBooks and our app, the Page-Based Application.*


    1.  Before proceeding too far let’s make sure you understand when you’d want to
    use a Page-Based Application. After Apple released the iBook app in the App Store,
    there was an immediate demand to code the cool page-curling effect. In response,
    Apple introduced a new template called Page-Based Application in Xcode 4\. The
    Page-Based Application uses a single View Controller that dynamically replaces
    content based on each page the user navigates to. It’s somewhat strange for Apple
    to provide the one and only instance where Xcode provides a template that is so
    far beyond the stripped-down, basic foundation it usually provides. With the Page-Based
    Application, Apple actually provides a sample application. However, we will go
    over some cool tricks and hidden traps very carefully in this chapter.


    **NOTE** You will want to use the Page-Based Application template when you want
    to create a project containing an application designed to display a page for each
    new view.


    ![images](images/9781430242727_Fig05-02.jpg)


    **Figure 5-2.** *Start a new Page-Based Application project in Xcode.*


    2.  Open Xcode, press ![images](images/U003.jpg)`+`![images](images/U004.jpg)`+N`,
    select a Page-Based Application, and click Next as shown in [Figure 5-2](#Chapter05.html#fig_5_2).


    ![images](images/9781430242727_Fig05-03.jpg)


    **Figure 5-3.** *Name the app futureTravel and then deselect Portrait and Upside
    Down.*


    3.  Enter `com.apress` as the Company Identifier. We won’t use a class prefix.
    Make sure to select iPad and check Use Automated Reference Counting. Do not check
    Include Unit Tests ([Figure 5-2](#Chapter05.html#fig_5_2)). Once created, save
    it onto your desktop. You will see the new futureTravel project open up. As mentioned,
    we’re making this app for the iPad only—we’ll also make it Landscape only for
    the text images that we will be using. They have text orientated in Landscape
    orientation, so uncheck Portrait and Upside Down as shown in [Figure 5-3](#Chapter05.html#fig_5_3).
    Interesting to see what is missing here … can you see it? Notice there’s no option
    of not using the Storyboard with this Page-Based App.


    **NOTE:** When using the Page-Based model template, you have one goal: to go in
    and replace the model for the page content with your own model for the page content.
    You will now start this by adding your own data object and reworking the existing
    object to use the new data object.


    ![images](images/9781430242727_Fig05-04.jpg)


    **Figure 5-4.** *Drag the startup images into your root directory.*


    1.  Open up your futureTravel Assets folder you downloaded from [`http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter05_futureTravel%20Assets.zip`](http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter05_futureTravel%20Assets.zip)
    and unzip it onto your desktop. Select both of the startup images `Default-Landscape@2x~ipad.png`
    and `Default-Landscape~ipad.png` and drag them over to the root directory. Notice
    that you also have images for the new iPad (the Retina iPad), if you choose to
    compile this app directly onto the Retina iPad, as shown in [Figure 5-4](#Chapter05.html#fig_5_4).


    ![images](images/9781430242727_Fig05-05.jpg)


    **Figure 5-5.** *Make sure you copy the startup images into your project.*


    2.  When the “Choose options for adding these files” dialog pops up, check “Copy
    items into destination group’s folder.” Also check “Create groups for any added
    folders.” Make sure your target is futureTravel and that it is checked ([Figure
    5-5](#Chapter05.html#fig_5_5)).


    ![images](images/9781430242727_Fig05-06.jpg)


    **Figure 5-6.** *Xcode automatically brings in the images.*


    3.  Notice that Xcode detects that these images are for the Landscape and the
    Retina display and automatically drops them into the appropriate Launch Image
    boxes as shown in [Figure 5-6](#Chapter05.html#fig_5_6).


    ![images](images/9781430242727_Fig05-07.jpg)


    **Figure 5-7.** *Drag the Images folder into the Supporting Files folder.*


    4.  Now select the entire `Images` folder and drag it into the `Supporting Files`
    folder as shown in [Figure 5-7](#Chapter05.html#fig_5_7).


    ![images](images/9781430242727_Fig05-08.jpg)


    **Figure 5-8.** *Copy the startup images folder into your project.*


    5.  As in step 5, when the “Choose options for adding these files” dialog pops
    up, check “Copy items into destination group’s folder” and “Create groups for
    any added folders.” Make sure your target is futureTravel and that it is checked
    as shown in [Figure 5-8](#Chapter05.html#fig_5_8).


    ![images](images/9781430242727_Fig05-09.jpg)


    **Figure 5-9.** *Notice the new group that Xcode has now created for you.*


    6.  Xcode instantiates a brand new group inside the `Supporting Files` folder
    as shown in [Figure 5-9](#Chapter05.html#fig_5_9).


    ![images](images/9781430242727_Fig05-10.jpg)


    **Figure 5-10.** *Drag in the Data class.*


    7.  Because we’re focusing on the Storyboard aspect, we decided to create the
    data model code for you. We describe this code in detail later in the chapter,
    but for now just select both the `ModelPageData.h` and the `ModelPageData.m` files
    and drag them into your project as shown in [Figure 5-10](#Chapter05.html#fig_5_10).
    If you have one of the older versions of Xcode, you may have to instruct Xcode
