    \ and as follows:\n\n`@interface CategoriesViewController ()` **`{`**\n    **`  NSMutableArray\
    \ *_categories;`**\n    `}` ![images](images/9781430242727_Fig08-58.jpg)\n\n**Figure\
    \ 8-58.** *Select the View Controller – Categories.*\n\n3.  You now need an outlet\
    \ for the Table View that you have in the Categories Scene. Open up Storyboard\
    \ and navigate to View Controller – Categories. Click it once to select it as\
    \ shown in [Figure 8-58](#Chapter08.html#fig_8_58).\n\n![images](images/9781430242727_Fig08-59.jpg)\n\
    \n**Figure 8-59.** *Set the Class for the Categories Scene.*\n\n4.  With the View\
    \ Controller – Categories selected, open the Identity Inspector and set the Class\
