- fmt: "#### Step 1: Create a Button That Segues to a Secondary View  \n\n![images](images/9781430242727_Fig02-02.jpg)\
    \  \n**Figure 2-2.** *Start a Single View Application.*  \n\n1. Open Xcode and\
    \ click ![images](images/U003.jpg)`+`![images](images/U004.jpg)`+N` (File ![images](images/U001.jpg)\
    \ New ![images](images/U001.jpg) Project), as shown in [Figure 2-2](#Chapter02.html#fig_2_2).\
    \ Select Single View Application and press Enter/Return. Name it `helloAlien`.\
    \ We’ve used the Company Identifier `com.apress`. You can name yours whatever\
    \ you like, but if you feel there is a chance you will need to compare your code\
    \ to ours at any time, go ahead and name it `com.apress` like ours so that there\
    \ will be less chance of confusion. We won’t use a class prefix. Make sure to\
    \ select iPhone and check both Use Storyboard and Use Automatic Reference Counting.\
    \ Click Next, and you will be prompted for the location where you want to save\
    \ your project. Choose a location and click Create.  \n\n![images](images/9781430242727_Fig02-03.jpg)\
    \  \n**Figure 2-3.** *Drag in the images.*  \n\n2. Navigate to your Target Settings\
    \ by clicking the project icon at the root of the Navigation tree and drag the\
    \ two Alien icon image files named `iPhone 57.png` and `iPhone4 114.png` into\
    \ the icon boxes ([Figure 2-3](#Chapter02.html#fig_2_3)). The `IPhone57` image\
    \ goes into the regular icon box, and the `iPhone4 114` image goes into the Retina\
    \ box. Also drag the `Alien.png` and `Alien Face.png` image files into your `Supporting\
    \ Files` folder. Make sure to check “Copy Items into destination group’s folder.”\
    \  \n\n![images](images/9781430242727_Fig02-04.jpg)  \n**Figure 2-4.** *Also drag\
    \ the icons from the root folder to the Supporting Files folder.*  \n\n3. Once\
    \ these files are copied into your `Supporting Files` folder, drag the icon image\
    \ files into your `Supporting Files` folder as shown in [Figure 2-4](#Chapter02.html#fig_2_4).\
    \ Deselect the Landscape Left and Landscape Right images within the Supported\
    \ Device Orientations section, because this application only supports the Portrait\
    \ orientation.  \n\n![images](images/9781430242727_Fig02-05.jpg)  \n**Figure 2-5.**\
    \ *Add a Navigation Controller.*  \n\n4. To make handling view transitions simple,\
    \ we’ll let a Navigation Controller coordinate the transitioning for us. Open\
    \ the Storyboard file by going to the Project Navigator pane on the left and click\
    \ `MainStoryboard.storyboard` to open it. It’s in this new Storyboard file that\
    \ you’ll define most, if not all, of the views (called *scenes* in Storyboarding)\
    \ in the application and specify the transitions between them. Now select the\
    \ View Controller (by single-clicking the black bar below it). With the View Controller\
    \ selected, click Editor ![images](images/U001.jpg) Embed In ![images](images/U001.jpg)\
    \ Navigation Controller as shown in [Figure 2-5](#Chapter02.html#fig_2_5). This\
    \ will place a Navigation Controller to the left of your existing View Controller\
    \ Scene and connect the two with an arrow indicating the relationship between\
    \ them. It will also add a Navigation Bar to your existing View Controller. The\
    \ Navigation Controller places buttons on the Navigation Bar to indicate how/when\
    \ you can return to views you have left. You’ll see this in action shortly when\
    \ you run the newly created application.  \n\n![images](images/9781430242727_Fig02-06.jpg)\
    \  \n**Figure 2-6.** *Assign `Alien.png` to the Main View.*  \n\n5. You’re going\
    \ to name the current View to *View*. Double-click the center of the View Controller’s\
    \ Navigation Bar and enter the name *View*. (You’ll see this name being used in\
    \ buttons created by the Navigation Controller — you need to return to this view\
    \ from another view when you run this app.) Now add an image to your view by dragging\
    \ an Image View onto the existing View Controller Scene’s canvas. Let it autosize\
    \ to the full View size and center it in the View as you drag the Image View onto\
    \ the View. Go to the Attributes Inspector and select `Alien.png` as the image\
    \ it should show. The image will appear showing what the Scene now looks like.\
    \ See [Figure 2-6](#Chapter02.html#fig_2_6).  \n\n![images](images/9781430242727_Fig02-07.jpg)\
    \  \n**Figure 2-7.** *Add a button and View Controller.*  \n\n6. Next you need\
    \ to add a button to this scene and add a new View Controller Scene that will\
    \ become the Secondary “Alien” View. First drag a Round Rect button onto the canvas\
    \ and name it *Find Alien* by first double-clicking it. Stretch the button so\
    \ the text shows and then center the button within the view. To add a new scene,\
    \ drag a View Controller from the Object Library to the right-hand side of the\
    \ existing View Controller scene. Hold it there for a second, and the existing\
    \ scene will shift to the left. Once it does, place the new View Controller to\
    \ the right of the Main View Controller scene that has shifted to the left. This\
    \ is illustrated in [Figure 2-7](#Chapter02.html#fig_2_7).  \n\n![images](images/9781430242727_Fig02-08.jpg)\
    \  \n**Figure 2-8.** *Connect the button to the new View Controller.*  \n\n7.\
    \ You now need to perform one of the coolest things Storyboarding can do—seamlessly\
    \ connect segues from one view to the next. In this case you want to connect the\
    \ button you just created to segue to the new scene you’ve added. In the olden\
    \ days this took huge amounts of code. Now you just Control-drag. To connect the\
    \ Find Alien button to the new View Controller, Control-drag from the Find Alien\
    \ button to the new View Controller as shown in [Figure 2-8](#Chapter02.html#fig_2_8).\
    \  \n\n![images](images/9781430242727_Fig02-09.jpg)  \n**Figure 2-9.** *Select\
    \ Push.*  \n\n8. Once you’ve Control-dragged over to the new View Controller,\
    \ let it go and you will see a menu as shown in [Figure 2-9](#Chapter02.html#fig_2_9)\
    \ where you set the Storyboard segue transition style. Use the Push style for\
    \ now. Select the Push transition style from the Storyboard Segues pop-up menu.\
    \  \n\n![images](images/9781430242727_Fig02-10.jpg)  \n**Figure 2-10.** *Name\
    \ the new View Controller and set the image.*  \n\n9. Name this second View Controller\
    \ *Alien View*. To do this, as you did with the first view, double-click the new\
    \ View Controller’s Navigation Bar and name it *Alien View*. While we’re here\
    \ let’s create the Alien’s Image View. Drag an Image View onto the View Controller’s\
    \ canvas. With the image View still selected, in Attributes Inspector select `Alien\
    \ Face.png` as its Image. This is illustrated in [Figure 2-10](#Chapter02.html#fig_2_10).\
    \  \n\n![images](images/9781430242727_Fig02-11.jpg)  \n**Figure 2-11.** *The segue\
    \ works! No Code!*  \n\n10. Believe it or not, you already have a running app!\
    \ Run it by clicking the Run button in the top left-hand corner of Xcode, and\
    \ as shown in [Figure 2-11](#Chapter02.html#fig_2_11) it works beautifully. Click\
    \ the button, and you go to the Alien View. Click the back button entitled View\
    \ on the left-hand side of the Navigation Bar in the Alien View, and you return\
    \ to the Main View. Beautiful!"
