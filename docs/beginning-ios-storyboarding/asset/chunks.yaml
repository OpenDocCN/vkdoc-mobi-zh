  trans: '

    ### 第一步：建立数据连接并在地图上显示地理标记照片


    在第一步中，你将创建一个单视图场景，应用启动后会从我们的 Flickr 账户下载地理标记照片的信息，并在地图上显示代表照片拍摄位置的大头针标注。请注意，此应用需要连接互联网才能正常运行。你可以使用我们为本书设置的
    API 密钥继续操作，但如果要在*你自己的项目*中使用 Flickr 服务，则需申请自己专属的 API 密钥。你可以通过以下网址在线申请 API 密钥：[`www.flickr.com/services/api/misc.api_keys.html`](http://www.flickr.com/services/api/misc.api_keys.html)。


    1.  打开 Xcode，按下![images](img/U003.jpg)![images](img/U004.jpg)`N`，然后选择“Single View
    Application”。将其命名为`FlickrPhotoMap`。公司标识符设为`com.storyboarding`。我们不会使用类前缀。确保在“设备系列”下拉菜单中选择
    iPhone，并勾选“使用故事板”和“使用自动引用计数”，如图 3-3 所示。创建完成后，将其保存到桌面。


    ![images](img/9781430242727_Fig03-03.jpg)


    **图 3-3.** *从单视图应用模板开始。*


    **注意：** 此应用将使用`MapView`和反向地理编码。要使用这些功能，你必须将所需的框架链接到项目中。点击导航树顶部的项目标题，在右侧的目标设置中选择“Build
    Phases”标签页，展开“Link Binary With Libraries”部分，点击底部的加号按钮。然后在弹出的窗口中搜索`MapKit`，如图 3-4
    所示，在列表中选中它，并点击“Add”按钮。重复上述步骤，添加`CoreLocation`框架。


    ![images](img/9781430242727_Fig03-04.jpg)


    **图 3-4.** *将 MapKit 和 CoreLocation 框架添加到项目中。*


    2.  如果新添加的框架文件出现在项目导航树外部，请将它们拖入“Frameworks”组中，如图 3-5 所示。你还需要将`Images`文件夹拖入 Xcode
    项目。该文件夹位于从作者网站下载的压缩包中。导航到`Images`文件夹，将整个文件夹拖入，如图 3-6 所示。同时确保勾选了“将项目复制到目标组文件夹中（如果需要）”，如图
    3-7 所示。


    ![images](img/9781430242727_Fig03-05.jpg)


    **图 3-5.** *将新添加的文件移动到 Frameworks 文件夹。*


    ![images](img/9781430242727_Fig03-06.jpg)


    **图 3-6.** *将此应用的图片拖入 Supporting Files 组。*


    ![images](img/9781430242727_Fig03-07.jpg)


    **图 3-7.** *必须勾选“将图片复制到目标组文件夹中...”*


    3.  现在选择`ViewController.h`和`ViewController.m`文件，按下 Delete 键。在确认对话框中，点击“移到废纸篓”，而不是“移除引用”。

    4.  现在你将创建自己的主视图控制器。按下![images](img/U003.jpg)`N`，选择 Objective-C 类选项，如图 3-8 所示。点击“Next”，选择`UIViewController`子类，并将其命名为`MapViewController`，如图
    3-9 所示。不要更改任何选项。保存它。


    ![images](img/9781430242727_Fig03-08.jpg)


    **图 3-8.** *创建一个新的 Objective-C 类。*


    ![images](img/9781430242727_Fig03-09.jpg)


    **图 3-9.** *将新类命名为 MapViewController。*


    5.  现在转到`MainStoryboard.storyboard`文件，选择主场景底部的视图控制器图标，如图 3-10 所示，打开工具面板，选择标识检查器，将自定义类改为`MapViewController`。保存更改。


    ![images](img/9781430242727_Fig03-10.jpg)


