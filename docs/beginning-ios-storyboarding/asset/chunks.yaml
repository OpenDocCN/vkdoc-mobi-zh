    ![images](images/9781430242727_Fig03-20.jpg)


    **Figure 3-20.** *Run the app to make sure the MapView was connected properly.*


    15.  Now you’re going to create an `NSObject<MKAnnotation>` subclass so you can
    display custom photo annotations on the MapView. Hit ![images](images/U003.jpg)`N`
    and select the Objective-C class option. On the next screen make sure `NSObject`
    is chosen in the “Subclass of” section and name it `PhotoAnnotation`. Save it.
    Then replace all the code in the `PhotoAnnotation.h` file with that shown in [Figure
    3-21](#Chapter03.html#fig_3_21) (you can drag and drop the code from DemoMonkey
    step “04 PhotoAnnotation.h Interface”). Here you’re declaring several properties—three
    standard ones (`coordinate`, `title`, and `subtitle`) and four custom properties
    that you’re going to use specifically for storing information about photos represented
    by the annotations (`image`, `thumbnail`, `imageURL`, and `thumbnailURL`). You’ll
    also declared two methods: a custom initializer to create the `PhotoAnnotatation`
    objects (used to initialize custom properties when annotations are created) and
    the `updateSubtitle` method, which we’ll talk about in more detail in the next
    step.


    ![images](images/9781430242727_Fig03-21.jpg)


    **Figure 3-21.** *Select the code you will replace in PhotoAnnotation.h.*


    16.  Select the `PhotoAnnotation.m` file in the Project Navigator and replace
    the code in it as shown in [Figure 3-22](#Chapter03.html#fig_3_22) (DemoMonkey
    step “05 PhotoAnnotation.m Implementation”). Most of the code here is self-explanatory
    or has descriptive comments. The method `updateSubtitle` will be called when user
    touches an annotation on the map. It will update the annotation callout’s subtitle
    to display the name of the place where the photo was taken. It’s using the latest
    iOS 5 feature, reverse geocoder, which is a part of the CoreLocation framework.
    It provides the easiest way to reverse geocode a location and get the information
    associated with it, called placemark. You create an instance of `CLGeocoder` and
    invoke the `reverseGeocodeLocation:completionHandler:` method, from which you
    get an array of placemarks, with the most relevant one being at index 0\. You
    then extract the information you need from the `CLPlacemark` object using the
    `placemarkToString:` helper method and update subtitle for that annotation.


    ![images](images/9781430242727_Fig03-22.jpg)


    **Figure 3-22.** *Replace the code in PhotoAnnotation.m.*


    17.  Once you have the `PhotoAnnotation` class in place, you can start working
    on adding annotation to the MapView. First of all, let''s make the newly created
    class visible to the main View Controller. Go to the `MapViewController.m` file
    and add `#import "PhotoAnnotation.h"` to the imports section at the top (DemoMonkey
    step “06 MapViewController.m Import PhotoAnnotation.h”). Now you can implement
    the `MKMapViewDelegate` protocol method in which you’ll tell the MapView how your
    annotations should look like once you add them to the map. Add the implementation
    for the `mapView:viewForAnnotation:` method to the end of the file right before
    `@end` as shown in [Figure 3-23](#Chapter03.html#fig_3_23) (alternatively you
    can drag DemoMonkey step “07 MapViewController.m mapView: viewForAnnotation:”.


    ![images](images/9781430242727_Fig03-23.jpg)


    **Figure 3-23.** *Add implementation for the mapView:viewForAnnotation: method.*


    18.  In this step you’ll add implementation for the `searchFlickrPhotos` method.
    Find the empty placeholder for the method, which was added in step 12, and insert
    code for it as shown in [Figure 3-24](#Chapter03.html#fig_3_24) (DemoMonkey step
    “08 MapViewController.m searchFlickrPhotos”). In this method you construct a URL
    string that will initiate a search request to the Flickr server (the format of
    the URL request and available parameters are provided in Flickr documentation,
    at [`http://flickr.com/services/api/`](http://flickr.com/services/api/); in our
    case, we specified the API key, user ID, geotag option, and response format).
    Note that you’re outputting the URL you just built to the console for testing
    purposes. In the next couple of lines, you create an NSURL object with the constructed
    string and dispatch synchronous download request for the contents of that URL
    by calling the `dataWithContentsOfURL:` static method on `NSData`. Note that the
    download request is performed in a background thread—otherwise the UI may become
    unresponsive to the user. Right before the request is sent, start your Activity
    Indicator, so you can see the progress. (Upon completion of the data transfer
    you’ll invoke the `saveData:` selector, in which you parse the JSON data, save
    it in a usable format, and perform other necessary operations with the fetched
    data. This step is coming shortly.)


    ![images](images/9781430242727_Fig03-24.jpg)


    **Figure 3-24.** *Add searchFlickrPhotos method implementation.*


    19.  As the result the Flickr server will return a JSON string containing a list
    of all the photos for the specified user ID that have location information associated
    with them.

    20.  By now you should be able to run the app and see the URL string printed in
    the console window as shown in [Figure 3-25](#Chapter03.html#fig_3_25).


    ![images](images/9781430242727_Fig03-25.jpg)


    **Figure 3-25.** *Run the app to check out the URL string you’ve constructed.*


    21.  This step is optional. Select the URL that was printed by the app as shown
    in [Figure 3-26](#Chapter03.html#fig_3_26), paste it into your web browser’s address
    bar, and hit Enter. If there were no errors in the URL string, you should get
    a response from Flickr similar to the one shown in [Figure 3-27](#Chapter03.html#fig_3_27)
    (on the left: standard unformatted response, on the right: response in a user-friendly
    format formatted for you by the JSONView plug-in). What you downloaded from Flickr
    is JSON data. To be able to use the information stored in it, you must parse it.


    ![images](images/9781430242727_Fig03-26.jpg)


    **Figure 3-26.** *Copy the URL and paste it into a web browser’s address bar.*'
