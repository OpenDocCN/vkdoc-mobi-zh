    \ in the \"-- DetailViewController.m Imports\" snippet from DemoMonkey, and place\
    \ it right after the `#import \"DetailViewController\"` as shown in [Figure 8-12](#Chapter08.html#fig_8_12)\
    \ and as follows:\n\n`#import \"DetailViewController.h\"`\n`#import \"DBBook.h\"\
    `\n\n`@interface DetailViewController ()`\n    `- (void)configureView;`\n\n`@property\
    \ (weak, nonatomic) IBOutlet UILabel *_titleLabel;`\n\n![images](images/9781430242727_Fig08-13.jpg)\n\
    \n**Figure 8-13.** *Add in code for the configureView method.*\n\n9.  You need\
    \ to update UI for the Book Details Scene with data from the SQLite database comprising\
    \ all these essential details of whatever book the user selects. To do this, you\
    \ edit and tweak the `configureView` method. We've written out these additional\
    \ elements for `configureView` for you in a way that you can always use it as\
    \ a template. First of all, comment out the line of code that's currently there:\n\
    \n`//self.detailDescriptionLabel.text = [self.detailItem description];`\n\nDrag\
    \ in the \"12 DetailViewController.m configureView\" snippet from DemoMonkey and\
    \ place it inside the `configureView` method implementation, right below the commented-out\
    \ line as shown in [Figure 8-13](#Chapter08.html#fig_8_13) and as follows:\n\n\
    ```\n- (void)configureView\n{\n    // Update the user interface for the detail\
    \ item.\n\n    if (self.detailItem) {\n        //self.detailDescriptionLabel.text\
    \ = [self.detailItem description];\n        DBBook *object = self.detailItem;\n\
    \        self._titleLabel.text = object.title;\n        self._authorLabel.text\
    \ = object.author.fullName;\n        self._categoryLabel.text = object.category.categoryName;\n\
    \        self._yearLabel.text = object.year;\n        self._descriptionTextView.text\
    \ = object.bookDescription;\n        self._bookImage.image = [UIImage imageNamed:[NSString\n\
    \        stringWithFormat:@\"%@big.png\", object.imageName]];\n    }\n}\n```\n\
    \nIn `DBBook object = self.detailItem`, you get the `detailItem` passed to you\
    \ during the segue. Then for the next six lines, beginning with the `self.*`,\
    \ you assign all the properties for the text and image outlets you created in\
    \ Figures [8-7](#Chapter08.html#fig_8_7)–[8-11](#Chapter08.html#fig_8_11).\n\n\
    **NOTE:** You may want to navigate to your `Data Model` folder and open the `DBBook.h`\
    \ file to understand why you created the `bookId`, `categoryId`, `authorId`, `title`,\
    \ `year`, and `bookDescription` in [Chapter 6](#Chapter06.html#ch6). You can see\
    \ how the `DetailViewController` is going to use those attributes to display the\
    \ data stored in the database entity.\n\nThis ends what you need to add in the\
    \ `DetailViewController`. You'll now move onto creating another `ViewController`\
    \ class, the `SelectionViewController`."
