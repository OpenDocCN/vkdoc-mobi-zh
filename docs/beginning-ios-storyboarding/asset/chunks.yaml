  trans: "\n# 步骤 4a：借助辅助创建后续八个场景\n\n到目前为止，您已经为应用程序设置好了图像，创建了`Storyboard`，并编写了第一个场景的代码。在创建包含多个场景的游戏时，这通常是常见情况。在科罗拉多大学科罗拉多斯普林斯分校计算机科学系，我们提供了游戏学理学士学位。有趣的是，当学生们意识到学期过半却仍未完成第一个场景的代码及所有角色时，他们往往会惊慌失措。诀窍在于将第一个场景和角色设计得足够完善，使得创建游戏其余部分变得轻而易举。\n\
    \n现在，您已经完成了所有设置，因此可以在重复创建剩余 17 个场景的必要步骤时，尽可能高效地工作。\n\n**注意：** 您将使用一个 4 步流程来创建每个新场景。我们首先解释每个步骤。随着我们逐步推进并不断重复，我们会适当放松指导，不再每次都详细解释每个步骤及其所有细节，而是仅提醒您像之前那样操作。\n\
    \n![图像](img/9781430242727_Fig10-05.jpg)\n\n**图 10-5.** *设置第一个场景视图控制器的标题。*\n\n\
    1. 在开始使用重复方法高效创建其余 17 个场景之前，您需要做一些清理工作。场景和实体的命名至关重要。首先回到`Storyboard`。点击视图控制器的场景停靠区（画布上场景底部的栏），然后进入属性检查器，通过将`Title`设置为*Opening\
    \ Scene*来为其命名，如图 10-5 所示。\n\n   ![图像](img/9781430242727_Fig10-06.jpg)\n\n   **图\
    \ 10-6.** *为导航器命名。*\n\n2. 点击导航控制器的场景停靠区。您可以将其命名为*Navigation*，如图 10-6 所示。\n\n##\
    \ 场景 2\n\n您已经完成了收尾工作，现在可以专注于接下来要重复进行 17 次的步骤了。从宏观角度来看，您将重复以下四个步骤：\n\n* 场景#：复制现有场景。\n\
    * 场景#：重命名。\n* 场景#：整理图形。\n* 场景#：建立连接。\n\n**注意：** 我们将用粗体表示**当前步骤**或**子步骤**，以便您能立即了解当前在整体流程中的位置。\n\
    \n![图像](img/9781430242727_Fig10-07.jpg)\n\n**图 10-7.** *开始第一次复制，点击 Opening Scene\
    \ 的停靠区。*\n\n1. 您将从*场景 2*的步骤 1 开始：复制现有场景。您目前只有一个现有场景可供选择，因此继续点击视图控制器的场景停靠区，并按`D`键进行复制，如图\
    \ 10-7 所示。您会立刻发现它看起来厚了一点。这是因为复制的项目现在位于原始场景之上。\n\n![图像](img/9781430242727_Fig10-08.jpg)\n\
    \n**图 10-8.** *更改新场景的标题。*\n\n* 场景 2：复制现有场景。\n  * 场景 2：重命名。\n    * 场景 2：更改`Title`。\n\
    \  * 场景 2：整理图形。\n  * 场景 2：建立连接。\n\n2. 选择复制的场景，并将其拖拽到原始场景的右侧。在属性检查器中，将`Title`更改为*Scene\
    \ 2*，如图 10-8 所示。\n\n![图像](img/9781430242727_Fig10-09.jpg)\n\n**图 10-9.** *使透明按钮可见。*\n\
    \n* 场景 2：复制现有场景。\n  * 场景 2：重命名。\n    * 场景 2：更改`Title`。\n  * 场景 2：整理图形。\n    *\
    \ 场景 2：隐藏不适用的元素。\n    * 场景 2：编辑按钮。\n    * 场景 2：使按钮可见。\n    * 场景 2：用新图像替换图像。\n\
    \  * 场景 2：建立连接。\n\n3. 场景 2 没有欢迎标签，因此选中它并删除。（请注意，在您创建的所有后续场景中，您将隐藏元素——但在此情况下，您删除了标签，因为它在任何后续场景中都不需要。）场景\
    \ 2 中有按钮，因此您需要首先使透明按钮可见，以便进行编辑。选中场景 1 中仍存在的透明按钮，在属性检查器中通过选择圆角矩形使其可见，如图 10-9 所示。\n\
    \n![图像](img/9781430242727_Fig10-10.jpg)\n\n**图 10-10.** *将图像替换为场景 2 的正确图像。*\n\n\
    * 场景 2：复制现有场景。\n  * 场景 2：重命名。\n  * 场景 2：整理图形。\n    * 场景 2：隐藏不适用的元素。\n    * 场景\
    \ 2：编辑按钮。\n    * 场景 2：使按钮可见。\n    * 场景 2：用新图像替换图像。\n  * 场景 2：建立连接。\n\n4. 现在您需要移除图像背景`wanderboard-cam01.png`，并将其替换为场景\
    \ 2 的图像`wanderboard-cam02.png`。为此，选中视图，然后在属性检查器中，从下拉菜单中将图像名称更改为`wanderboard-cam02.png`，如图\
    \ 10-10 所示。\n\n**注意：** 看到图 10-10 中仍显示着场景 1 的现有按钮了吗？这是正确的。您需要保留它。编辑按钮是一个两步过程。\n\
    \n**第一步：** 确保您有正确的按钮可以转移到新场景。通过使原始场景中的现有按钮可见（整理图形 → 编辑按钮 → 使按钮可见）和/或隐藏按钮（隐藏不适用的元素）来完成。到目前为止，您还不需要隐藏按钮。\n\
    \n**第二步：** 更改按钮的尺寸和位置，使其正确放置并适应新场景。然后再次将它们设为不可见。\n\n![图像](img/9781430242727_Fig10-11.jpg)\n"
- fmt: "### 排版后的文本\n\n**Figure 10-11.** Move duplicated button to left side of scene.\n\
    \n- **Scene 2:** Copy an existing scene.\n    - **Scene 2:** Rename.\n    - **Scene\
    \ 2:** Organize graphics.\n    - **Scene 2:** Hide inapplicable elements.\n  \
    \      - **Scene 2:** Edit buttons\n        - **Scene 2:** Replace image with\
    \ new image.\n        - **Scene 2:** Configure new buttons.\n        - **Scene\
    \ 2:** Duplicate buttons.\n        - **Scene 2:** Reset parameters.\n    - **Scene\
    \ 2:** Make connections.\n\n5.  In the new scene you can see that your user has\
    \ two options here: go left or right. To accommodate this, you need to offer two\
    \ buttons, one for each direction. Click the right-hand visible button and press\
    \ `![images](images/U003.jpg)` + `D` to duplicate. Now move it roughly to the\
    \ left-hand side of the scene as shown in [Figure 10-11](#Chapter10.html#fig_10_11).\n\
    \n`![images](images/9781430242727_Fig10-12.jpg)`\n\n**Figure 10-12.** Set the\
    \ position and size of the original (right-most) button.\n\n- **Scene 2:** Copy\
    \ an existing scene.\n    - **Scene 2:** Rename.\n    - **Scene 2:** Organize\
    \ graphics.\n        - **Scene 2:** Hide inapplicable elements.\n        - **Scene\
    \ 2:** Edit buttons.\n        - **Scene 2:** Replace image with new image.\n \
    \       - **Scene 2:** Configure new buttons.\n        - **Scene 2:** Duplicate\
    \ buttons.\n        - **Scene 2:** Reset parameters of buttons.\n        - **Scene\
    \ 2:** Button Right.\n        - **Scene 2:** Button Left.\n    - **Scene 2:**\
    \ Make connections.\n\n6.  Make sure these two buttons are correctly placed and\
    \ sized so it makes sense to the user. With the original button selected, in the\
    \ Size Inspector enter the attributes. You’ll be doing this a lot, so we’ll give\
    \ you the x and y coordinates that place the button on the scene, and then the\
    \ vertical and horizontal dimensions of the button so that it fits snugly into\
    \ position. We’ll do this all in one set of numbers—we’ll simply state: 590,90,80,450,\
    \ and that means that the x-position is 590, the y-position is 90, the width of\
    \ the button is 80 and the height is 450\\. We won’t remind you that you need\
    \ to select the button and go to the Size Inspector. 590, 90,80,450 means you\
    \ go to the Size Inspector and enter the values as shown in [Figure 10-12](#Chapter10.html#fig_10_12).\n\
    \n`![images](images/9781430242727_Fig10-13.jpg)`\n\n**Figure 10-13.** Set the\
