    # 精通表格视图与故事板：Core Data 设置


    本书中你将要完成的最后两个应用会更为复杂和专业。因此，我们将每个应用都分为三章来讲解。主从应用：`bookManager` 应用在第 6 章、第 7 章和第
    8 章中介绍。最后一个应用，单一视图 #3：`wanderBoard`，则在第 9 章、第 10 章和第 11 章中介绍。


    在本章中，你将开始开发一个相当复杂的图书管理应用，它会演示故事板如何简化大量使用表格视图的应用构建过程。在深入了解这个项目之前，先简单了解一些主从应用背后的
    iOS 历史，将有助于你决定将来是否使用这个模板。还记得在第 4 章中，你如何使用工具应用模板来创建 iPad 的分割视图吗（参见该章的图 4-57）？你通过编写
    `MainViewController` 创建了一个主视图，然后通过编写 `FlipSideViewController` 创建了一个次要视图。


    嗯，这在过去并不总是那么容易。当我们在 iOS SDK 3.2 中首次开始为 iPad 编写代码时，创建分割视图需要大量的工作。现在，在 iOS 5 中，苹果公司将基于分割视图的应用模板集成到了基于导航的应用模板中，并将其称为主从应用模板。简单来说，当你使用主从应用模板，并且用户在
    iPhone 上运行你的应用时，它的表现就像是用基于导航的应用模板编程的一样。当用户在 iPad 上运行你的应用时，它的表现就像是用基于分割视图的应用模板编程的一样。


    在互联网上，大多数主从应用“教程”展示的是编写分割视图控制器的说明，*并未*使用故事板，而是仍然沿用老方法——通过回到 `xibs` 来实现。这种方法忽略了苹果创建主从应用模板的初衷。当你确定要处理列表、数据库和表格时，尤其是当你希望允许用户以层次结构的方式深入浏览数据时，请记得使用主从应用模板。


    在这个应用中，你将学习如何使用主从应用模板为列表和表格构建故事板。你还将学习如何将这些数据动态连接到 SQLite 数据库。我们包含了数据库组件，因为当你能说出如何将数据连接到数据库时，这无疑会是一个重要的加分项。对于雇主来说，很难找到有任何
    SQL 经验的 Xcode 开发者。似乎这还不够，我们还将向你介绍 `MagicalRecord`，这是一个在 GitHub 上可用的开源库，并被许多开发者使用。`MagicalRecord`
    是由 MagicalPanda Software 创建的一个非常高效且极其易用的框架，专门用于与 Core Data 交互。


    我们会在本章后面解释所有这些。现在，请为你即将踏上学习如何封装以下内容之旅而感到高兴：


    * SQLite

    * GitHub（一个使用 git 版本控制系统的软件开发项目仓库）

    * 将 Core Data 集成到一个主从应用模板中！


    太棒了！


    ## bookManager：一个主从应用


    `bookManager` 应用用于追踪一组精选的 Apress 图书，包括它们的类别、标题和作者。它还提供了在 SQLite 数据库中添加、编辑和删除图书的功能。


    层次树结构的顶部是“我的图书馆”节点，它有两个类别：“图书”和“作者”，如图 6-0A 左侧图片所示。点击“图书”会向下钻取到“类别”节点，用户可以在其中选择
    Apress 图书的类别、进行编辑，或返回到“我的图书馆”，如图 6-0A 中间图片所示。点击左侧图片中的“作者”会进入“作者”节点，用户可以在其中选择一位
    Apress 作者、编辑作者，或返回到“我的图书馆”，如图 6-0A 右侧图片所示。


    ![images](img/9781430242727_Fig06-0A.jpg)


    **图 6-0A.** *`bookManager` 应用的根级“我的图书馆”。*


    `bookManager` 应用有三个视图可以查看 Apress 图书。首先，如图 6-0B 所示，当用户从作者选择中点击“图书”时；其次，当用户从类别选择中点击“图书”时；第三，当用户想要编辑、删除或添加图书时。`bookManager`
    应用还提供了两个不同的对话框用于添加新类别或新作者，如图 6-0C 所示。


    ![images](img/9781430242727_Fig06-0B.jpg)


    **图 6-0B.** *来自作者的图书、来自类别的图书以及从类别中进行编辑*


    ![images](img/9781430242727_Fig06-0C.jpg)


    **图 6-0C.** *添加类别和添加作者*


    该项目分为三个章节。在本章中，你将设置文件、图片、Core Data 和数据模型。在第 7 章中，你将仅使用故事板来设计整个应用。在第 8 章中，你将插入故事板元素背后的代码，并调整一些故事板的必要设置。


    ## 准备工作


    本章是最具挑战性的一章。我们提供了大量的资源来帮助你在遇到困难时继续前进。再次强调，与所有章节一样，我们在 [`http://bit.ly/sMRvAP`](http://bit.ly/sMRvAP)
    以及本书在 `apress.com` 的页面上提供了所有必要的文件和代码。你也可以在 [`http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter06_bookManager.zip`](http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter06_bookManager.zip)
    下载应用的最终版本，但仅仅下载最终版本并不能真正帮助你学习如何使用 GitHub、`MagicalRecord` 或 SQLite，因此我们建议你现在就下载
    `assets` 文件夹，并注意以下事项：当你从 [`http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter06_bookManager%20Assets.zip`](http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter06_bookManager%20Assets.zip)
    下载 `assets` 压缩包时，你会看到两个文件 `bookdata.plist` 和 `chapter6.demoMonkey`，以及两个文件夹 `images`
    和 `MagicalRecord`。


    你将使用 plist 文件进行数据库创建，使用 `DemoMonkey` 文件获取代码，以及使用 `images` 文件夹获取图片。如果你无法理解 GitHub
    和 `MagicalRecord`，不用担心。我们还提供了完整的 `MagicalRecord` 文件夹，这就是你在完成 GitHub 练习后最终得到的内容，因此你可以将其直接拖入你的项目并继续操作。我们建议使用
    `MagicalRecord` 并探索 GitHub。如果你能声称自己有 GitHub 和 Core Data 的经验，这无疑会让你跻身精英开发者之列。


    清理你的桌面，下载 [`http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter06_bookManager%20Assets.zip`](http://www.rorylewis.com/xCode/StoryBoarding%20in%20Xcode/Chapter06_bookManager%20Assets.zip)，解压文件夹，然后让我们开始吧。

