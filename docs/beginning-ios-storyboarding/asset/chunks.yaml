    \        *   场景 6：使按钮可见。\n        *   场景 6：将图像替换为新图像（已完成）。\n        *   场景 6：配置新按钮。\n\
    \            *   场景 6：复制按钮。\n            *   场景 6：重置按钮参数。\n                * \
