  trans: '

    ### 为何你会与刘易斯博士产生共鸣


    在雪城大学攻读计算机工程专业期间，罗里挣扎着通过课程并赚取足够的钱来养活妻子和两个年幼的女儿。1990 年，他在 L.C.史密斯工程学院的计算机实验室获得了一份理想的校内勤工俭学岗位——担任监考员。尽管他当时在电气工程专业的课程上也很吃力，但他始终坚守在服务台前。这对罗里来说是一次令人望而生畏的经历，因为他原本的职责只是协助同学们解决计算机实验室的*设备*问题，但他发现同学们总会提出更深更难的问题：“哥们，你搞懂微积分作业了吗？能教教我吗？！”


    这些学生认为，既然罗里是监考员，他自然知道答案。内心充满恐惧和自我怀疑的他，寻找着既能帮助同学又不暴露自身不足的方法。罗里学会了这样开场：“我们回到基础来回顾一下。还记得上周教授给我们展示的那个方程吗……？”通过回溯基本原理，重新阐述并重塑这些概念，罗里开始掌握一种技巧，这种方法十有八九能引导出可行的解决方案。到了大四那年，罗里值班的夜晚，服务台前常常排起等候的学生长队。


    ### 跨越 17 年后


    想象一下，一位长发、古怪的教授走进科罗拉多大学斯普林斯分校的校园，他身穿一种老派与不羁的惊人混搭装束。当他步入工程学院大楼时，迎接他的是学生和教职员工的笑脸和热情的问候，而他们或许都在心里对他的花呢夹克、感恩而死乐队的
    T 恤、卡其裤和人字拖摇头不已。当他走进计算机科学系的走廊时，办公室外已经站着一排学生。这让人回想起早年他在计算机实验室担任监考员时，在服务台前等待他的那排学生。他们转身向他打招呼：“早上好，刘易斯博士！”这些
    UCCS 的学生中，许多人甚至不是他班上的，但他们知道刘易斯博士无论如何都会见他们并给予帮助。


    ### 过去——现在——未来


    刘易斯博士拥有三个学位。他在雪城大学获得了计算机工程理学学士学位。雪城大学的 L.C.史密斯工程学院是全美顶尖的学院之一。英特尔、AMD 和微软都会将他们的顶尖员工送到那里攻读博士学位。


    完成学士学位（专注于微处理器中电子电路的数学）后，他穿过校园广场，进入了雪城大学法学院。在法学院的第一年暑假，全美业务最繁忙的律师事务所 Fulbright
    & Jaworski 招募罗里去其奥斯汀办公室工作，那里的一些律师专攻高科技知识产权专利诉讼。作为其书记员工作的一部分，刘易斯参与了著名的 *AMD 诉 Intel*
    案；他负责帮助高级合伙人评估微处理器电路数学的算法。


    在法学院的第二年暑假，另一家共同参与 *AMD 诉 Intel* 案工作的律师事务所——Skjerven, Morrill, MacPherson, Franklin,
    & Friel——招募罗里去其硅谷分部（圣何塞和旧金山）工作。在沉浸法律领域数年后，刘易斯在雪城大学获得了法学博士学位，他意识到自己的热情在于计算机的*数学*，而非硬件和软件的法律后果。他更偏爱一个培育性和创造性的环境，而不是法律本身固有的争斗和辩论。


    离开学术界三年后，罗里·刘易斯南下前往北卡罗来纳大学夏洛特分校攻读计算机科学博士学位。在那里，他师从兹比格涅夫·W·拉斯博士，后者因其在数据挖掘算法与方法、分布式数据挖掘、本体论以及多媒体数据库方面的创新而享誉全球。在攻读博士学位期间，刘易斯为计算机工程专业的本科生讲授计算机科学课程，并为
    MBA 学生讲授电子商务和编程课程。


    获得计算机科学博士学位后，罗里接受了科罗拉多大学斯普林斯分校计算机科学系的终身教职，他的研究方向是神经科学的计算数学。最近，他合著了一份关于癫痫起源（涉及下丘脑）数学分析的资助申请书。然而，随着苹果革命性的
    iPhone 及其独特灵活的平台——*以及市场*——对于迷你应用、游戏和个人计算工具的出现，他变得兴奋起来，开始为了个人乐趣而进行实验和编程。在自己熟练掌握之后，刘易斯认为他可以开设一门包含*非*工程师也能参与的
    iPhone 应用课程。凭借作为 iPhone beta 测试者的内部知识，甚至在 2010 年 4 月正式发布之前，他就开始将拟议的 iPad 平台参数整合到他的教学计划中。


    这门课程获得了巨大成功，来自学生和同事的反馈都是压倒性的积极。当有人提出将他的课程改编成一本由 Apress 出版社出版的书籍时，刘易斯博士欣然抓住了这个机会。他高兴地接受了邀请，将他的课程大纲、课堂笔记和视频转化成了您现在手中的这本书。

