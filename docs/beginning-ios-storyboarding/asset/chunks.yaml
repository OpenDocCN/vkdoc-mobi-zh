    \ Segue 的视图控制器。\n\n![images](images/9781430242727_Fig08-53.jpg)\n\n**图 8-53.**\
    \ *实现代理方法以接收新增的图书对象。*\n\n17.  接下来，你需要为`AddBooksViewController`实现代理方法，通过该方法可以访问用户创建的对象并将其添加到表格视图中。从\
    \ DemoMonkey 拖入“26 BooksViewController.m Add Books”代码片段，并将其放置在`@end`之前，如图 8-53\
    \ 所示。在这个`addBookVC:didCreateObject:`方法中，你正在检查当前是否按特定类别或特定作者显示书籍，如果是，则检查即将添加到表格视图中的图书是否属于这些组之一：\n\
    \n```\nself.category != nil && ((DBBook *)anObject).category != self.category)\
    \ ||\n    self.author != nil && ((DBBook *)anObject).author != self.author))\n\
    ```\n\n如果不是这种情况，则不更新当前图书列表；否则，如果对象通过了这些测试，则在表格视图的最顶部添加一个新行：\n\n```\nNSIndexPath\
    \ *indexPath = [NSIndexPath indexPathForRow:0 inSection:0];\n    [self._tableView\
    \ insertRowsAtIndexPaths:[NSArray arrayWithObject:indexPath]\n    withRowAnimation:UITableViewRowAnimationAutomatic];\n\
    ```\n\n![images](images/9781430242727_Fig08-54.jpg)\n\n**图 8-54.** *从编辑按钮（Edit）拖拽连线以创建\
    \ IBAction。*\n\n18.  最后，你需要为导航栏中的编辑按钮（Edit）指定一个`IBAction`。请记住，一旦用户点击此编辑按钮，表格视图将切换到编辑模式，用户将能够删除单元格。因此，打开\
