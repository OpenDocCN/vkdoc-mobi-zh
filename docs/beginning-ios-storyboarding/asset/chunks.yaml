    ### 第 4b 步：创建最终的九个场景


    我们认为你已经做得足够多了，现在只需要有限的一些指令，就像客户、老板或熟练的同事/导师可能会给你的那样。


    ![images](img/9781430242727_Fig11-01.jpg)


    **图 11-1.** 复制场景 8 以创建场景 10。


    - 场景 10：复制一个现有的死胡同场景。

    - 场景 10：将其放置在上一场景的上方或下方。

    - 场景 10：重命名。

    - 场景 10：更改标题。

    - 场景 10：整理图形。

    - 场景 10：建立连接。


    1. 这次你需要复制死胡同场景。选择视图控制器 – 场景 8 的场景停靠区，并按 `Command`+`D` 进行复制，如图 11-1 所示。将其放置在场景
    9 的右下方，并将标题更改为“场景 10”。


    ![images](img/9781430242727_Fig11-02.jpg)


    **图 11-2.** 场景 10：设置所需的图像。


    - 场景 10：复制一个现有的死胡同场景。

    - 场景 10：将其放置在上一场景的上方或下方。

    - 场景 10：重命名。

    - 场景 10：更改标题。

    - 场景 10：更改图像。

    - 场景 10：整理图形。

    - 场景 10：建立连接。


    2. 将图像更改为 `wanderBoard-cam10.png`，如图 11-2 所示。这里你正在创建另一个死胡同。你之前没有完成上一个死胡同的“后退”按钮的连线，所以让我们在完成场景
    10 之前修复场景 7 和场景 8。


    ![images](img/9781430242727_Fig11-03.jpg)


    **图 11-3.** 选择场景 7，以便完成一些遗漏的步骤。


    3. 还记得上次运行测试时，你不得不返回去将红色按钮连接到代码吗？我们不要再重复那个错误了。我们现在就来做这件事。选择场景 7，如图 11-3 所示。


    ![images](img/9781430242727_Fig11-04.jpg)


    **图 11-4.** 将场景 7 的“后退”按钮连接到其属性。


    4. 打开助理编辑器，并确保你的头文件在右侧。从按钮按住 Control 键拖拽到头文件，如图 11-4 所示，将按钮连接到其属性。


    ![images](img/9781430242727_Fig11-05.jpg)


    **图 11-5.** 将场景 7 的“后退”按钮连接到其操作方法。


    5. 从场景 7 中的按钮按住 Control 键拖拽到头文件，将按钮连接到操作方法，如图 11-5 所示。


    ![images](img/9781430242727_Fig11-06.jpg)


    **图 11-6.** 将场景 8 的“后退”按钮连接到属性。


    6. 现在对场景 8 执行相同操作。选择场景 8 后，从按钮按住 Control 键拖拽到头文件中的属性处，如图 11-6 所示。


    ![images](img/9781430242727_Fig11-07.jpg)


    **图 11-7.** 将场景 8 的“后退”按钮连接到其操作方法。


    7. 从场景 8 中的按钮按住 Control 键拖拽到头文件，连接到操作方法，如图 11-7 所示。


    ![images](img/9781430242727_Fig11-08.jpg)


    **图 11-8.** 将场景 10 的“后退”按钮连接到其属性。


    8. 现在，回到场景 10。选择场景 10，并从按钮按住 Control 键拖拽到头文件，如图 11-8 所示，建立连接到属性的关系。


    ![images](img/9781430242727_Fig11-09.jpg)


    **图 11-9.** 将场景 10 的按钮连接到其操作方法。


