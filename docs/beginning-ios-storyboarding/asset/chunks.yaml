  trans: "\n12. 继续处理文本视图的委托方法，从 DemoMonkey 中拖入“17 AddBookViewController.m Text View\
    \ Delegate Methods”代码片段，并将其放置在 `@end` 与你在图 8-29 中放置的文本字段委托方法之间。如图图 8-30 所示。\n\n\
    **注意：** 你在上两步中添加的委托方法，是 UIKit 框架中声明的标准 `UITextFieldDelegate` 和 `UITextViewDelegate`\
    \ 协议的一部分。这些方法是将文本字段和文本视图的编辑状态变更通知传递给你的最常见方式。在本例中，只需在每个 `UITextField`（或 `UITextView`）通知你指定为委托的\
    \ `AddBookViewController` 用户已完成编辑时，将用户输入的数据保存到 `_bookDict` 字典对象中即可。后者是通过 `textFieldDidEndEditing:`（`textViewDidEndEditing:`)\
    \ 方法回调实现的，每当文本字段（文本视图）失去焦点，或按下 Return 键后以编程方式辞去第一响应者时，都会调用该方法。收集到 `_bookDict`\
    \ 字典中的数据，最终会在编辑完成并按下“保存”按钮后保存到数据库中。\n\n![images](img/9781430242727_Fig08-31.jpg)\n\
    \n**图 8-31.** *实现 prepareForSegue: 方法。*\n\n13. 仍然在 `AddBookViewController.m` 文件中，实现\
    \ `prepareForSegue:` 方法。从 DemoMonkey 中拖入“18 AddBookViewController.m prepareForSegue”代码片段，并将其放置在\
    \ `@end` 之前，如图图 8-31 所示。\n\n在此方法中，你首先检查 segue 标识符：\n\n```\nif ([[segue identifier]\
    \ isEqualToString:@\"SelectCategory\"]) {\n    …\n```\n\n或\n\n```\nif ([[segue\
    \ identifier] isEqualToString:@\"SelectAuthor\"]) {\n    …\n```\n\n然后传递分类数组：\n\
    \n```\n[(SelectionViewController *)[segue destinationViewController]\n    setObjects:[DBCategory\
    \ allCategories]];\n```\n\n或作者数组：\n\n```\n[(SelectionViewController *)[segue destinationViewController]\n\
    \    setObjects:[DBAuthor allAuthors]];\n```\n\n给目标视图控制器，在此两种情况下目标视图控制器都是 `SelectionViewController`。\n\
    \n最后，你将 `SelectionViewController` 的委托设置为你的 `AddViewController`，以便一旦用户选择了作者或分类，你可以将该选择保存到你的\
    \ `_bookDict` 字典中：\n\n```\n[(SelectionViewController *)[segue destinationViewController]\n\
    \    setDelegate:self];\n```\n\n![images](img/9781430242727_Fig08-32.jpg)\n\n\
    **图 8-32.** *实现用于选择分类或作者的委托方法。*\n\n14. 继续关注用户在输入新书、作者和分类时需要用到的代码，你还有几个待办事项需要完成。一旦用户选择了分类或作者，你需要接收来自\
    \ `SelectionViewController` 的委托回调，因此需要实现这个委托方法。从 DemoMonkey 中拖入“19 AddBookViewController.m\
    \ Choose Category of Author”代码片段，并将其放置在 `@end` 之前，如图图 8-32 所示。\n\n你在 `SelectionViewController.h`\
    \ 文件中定义了该委托方法：\n\n```\n- (void)selectionVC:(SelectionViewController *)aVC\n  \
    \  didSelectObject:(id)anObject;\n```\n\n此处，根据接收到的对象属于哪个类：\n\n```\nif ([anObject\
    \ isKindOfClass:[DBCategory class]]) {\n```\n\n你将保存分类 ID：\n\n```\n[_bookDict setObject:((DBCategory\
    \ *)anObject).categoryId forKey:@\"categoryId\"];\n```\n\n或保存作者 ID：\n\n```\n[_bookDict\
    \ setObject:((DBAuthor *)anObject).authorId forKey:@\"authorId\"];\n```\n\n并显示分类名称：\n\
    \n```\ncell.textLabel.text = ((DBCategory *)anObject).categoryName;\n```\n\n或显示作者名称：\n\
    \n```\ncell.textLabel.text = ((DBAuthor *)anObject).fullName;\n```\n\n在相应的单元格中。完成所有操作后，你将视图控制器从栈中弹出：\n\
    \n```\n[self.navigationController popViewControllerAnimated:YES];\n```\n\n以便用户可以返回到\
    \ `AddBookViewController` 并继续编辑书籍信息。\n\n![images](img/9781430242727_Fig08-33.jpg)\n\
    \n**图 8-33.** *为“保存”和“取消”按钮实现两个 IBAction。*\n\n15. 在 `AddBookViewController.m`\
    \ 中，你需要做的最后一件事是实现两个 IBAction，一个用于“保存”按钮，另一个用于“取消”按钮。从 DemoMonkey 中拖入“20 AddBookViewController.m\
    \ IBAction”代码片段，并将其放置在 `@end` 之前，如图图 8-33 所示。\n\n对于“取消”按钮，你有 `cancelPressed:`\
    \ 方法：\n\n```\n- (IBAction)cancelPressed:(id)sender {\n```\n\n在此方法中，你将简单地关闭 `ModalViewController`，不保存任何更改：\n\
    \n```\n[self dismissModalViewControllerAnimated:YES];\n```\n\n在 `savePressed:`\
    \ 方法中：\n\n```\n- (IBAction)savePressed:(id)sender\n```\n\n如果有活动的第一响应者（标题、年份或描述文本字段），将辞去它们。这将关闭键盘（如果键盘仍显示）：\n\
    \n```\n[self._titleTextField resignFirstResponder];\n[self._yearTextField resignFirstResponder];\n\
    [self._descriptionTextView resignFirstResponder];\n```\n\n然后，你验证用户是否修改了任何字段，以确保书籍信息字典已创建且不为\
    \ nil。接着，你使用你在第 6 章中实现的 `DBBook` 辅助方法，根据 `_bookDict` 字典创建一个新实体：\n\n```\nif (_bookDict\
    \ != nil) {\n    DBBook *newBook = [DBBook createEntityWithDictionary:_bookDict];\n\
    ```\n\n最后，你通知委托该对象已创建，以便在需要时立即将其添加到书籍列表中：\n\n```\nif ([self.delegate respondsToSelector:@selector(addBookVC:didCreateObject:)])\
    \ {\n    [self.delegate addBookVC:self didCreateObject:newBook];\n```\n\n然后关闭\
    \ `AddBookViewController`：\n\n```\n[self dismissModalViewControllerAnimated:YES];\n\
    ```\n\n![images](img/9781430242727_Fig08-34.jpg)\n\n**图 8-34.** *连接你创建的两个 IBAction。*\n\
    \n16. 现在，你需要连接你为“编辑”和“取消”按钮创建的两个 IBAction。保存你的工作并打开故事板。转到“添加书籍”，按住 Control 键从“保存”按钮拖到“添加书籍视图控制器”，如图图\
    \ 8-34 所示。\n\n![images](img/9781430242727_Fig08-35.jpg)\n\n**图 8-35.** *选择 savePressed:\
    \ 发送动作。*\n\n17. 弹出窗口出现时，选择嵌套在“发送动作”部分内的 `savePressed:` 方法，如图图 8-35 所示。\n\n![images](img/9781430242727_Fig08-36.jpg)\n\
    \n**图 8-36.** *对“取消”按钮重复此操作。*\n\n18. 按住 Control 键从“取消”按钮拖到“添加书籍视图控制器”，如图图 8-36\
    \ 所示。不过，这次弹出窗口出现时，选择嵌套在“发送动作”选项内的 `cancelPressed:` 选项，就像你在图 8-35 中所做的那样。\n"
- fmt: '### Hooking Up the Books Scene


    ![images](images/9781430242727_Fig08-37.jpg)


    **Figure 8-37.** *Create the BookViewController.*


    1. Let’s move on now to the next View Controller. Press ![images](images/U003.jpg)+N
    to create a new subclass and after selecting the Objective-C class, click Next.
    Name it `BooksViewController` and make it a subclass of `UIViewController` as
    shown in [Figure 8-37](#Chapter08.html#fig_8_37). Save it in its default location
    as you’ve always done in this book. When you’re done, go back into Storyboard.


    ![images](images/9781430242727_Fig08-38.jpg)


    **Figure 8-38.** *Connect the leftImageView outlet to the Book cover image.*


    2. Once you’ve opened up Storyboard, navigate to the Books scene. Remember that
    in the Books Table View you’re using custom cells, so you need to connect the
    outlets to the custom cell subclass you created earlier in steps 1–4. Select the
    top cell containing the Book Image, Title, and so on, and then open up the Identity
    Inspector and in the Class field click CustomCell (refer to [Figure 8-18](#Chapter08.html#fig_8_18)
    or 8-43 if you need a memory refresher). With the Cell Prototype still selected,
    open the Connections Inspector to see a list of all available outlets. Drag out
    from the `leftImageView` outlet and connect it to the book’s cover image, which
    for now, in this case, is `1.png`. This is shown in [Figure 8-38](#Chapter08.html#fig_8_38).
    This outlet will enable your connectivity to the SQLite database so you can display
    whatever associated image is saved in the database, not the static `1.png`.


    ![images](images/9781430242727_Fig08-39.jpg)


    **Figure 8-39.** *Connect the mainLabel outlet to the Title.*


    3. Control-drag from the `mainLabel` outlet and connect it to Title as shown in
    [Figure 8-39](#Chapter08.html#fig_8_39).


    ![images](images/9781430242727_Fig08-40.jpg)


    **Figure 8-40.** *Connect the detailLabel1 outlet to the Author.*


    4. Control-drag from the `detailLabel1` outlet and connect it to Author as shown
    in [Figure 8-40](#Chapter08.html#fig_8_40).


    ![images](images/9781430242727_Fig08-41.jpg)


    **Figure 8-41.** *Connect the detailLabel2 outlet to the publication year.*


    5. Control drag from the `detailLabel2` outlet and connect it to publication year
    as shown in [Figure 8-41](#Chapter08.html#fig_8_41). Save it, and let’s move on.


    ![images](images/9781430242727_Fig08-42.jpg)


    **Figure 8-42.** *Select the View Controller.*


    6. You also need to create `IBOutlet`s for the Table View and the Book count label.
    So select View Controller - Books as shown in [Figure 8-42](#Chapter08.html#fig_8_42)
    so that you can assign a class to it.


    ![images](images/9781430242727_Fig08-43.jpg)


    **Figure 8-43.** *Name the class BooksViewController.*


    7. With View Controller - Books still selected, in the Identity Inspector click
    `BooksViewController` in the Class field as shown in [Figure 8-43](#Chapter08.html#fig_8_43).


    ![images](images/9781430242727_Fig08-44.jpg)


    **Figure 8-44.** *Connect to the implementation file.*


    8. Open the Assistant editor and make sure the `BooksViewController.m` file is
    the Xcode file that appears in the right-hand panel. Click once in the Table View
    section of Books and Control-drag over to the implementation file, releasing it
    right under the `@interface` as shown in [Figure 8-44](#Chapter08.html#fig_8_44).
    When the pop-up appears, name it `_tableView` and leave all the other defaults
    of the outlet as is.


    ![images](images/9781430242727_Fig08-45.jpg)


    **Figure 8-45.** *Connect the _countLabel outlet.*


    9. Now select the book counter and Control-drag over to the implementation file,
    dropping it right below the previous outlet as shown in [Figure 8-45](#Chapter08.html#fig_8_45).
    Name it `_countLabel` and again leave the defaults as is. Save your work.


    ![images](images/9781430242727_Fig08-46.jpg)


    **Figure 8-46.** *Control-drag to the View Controller icon in the Dock.*


    10. Lastly, Control-drag from the Table View to the View Controller icon in the
    Dock as shown in [Figure 8-46](#Chapter08.html#fig_8_46).'
