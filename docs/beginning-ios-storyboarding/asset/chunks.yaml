  trans: '

    ## 制作详情视图的故事板：图书详情场景


    ![images](img/9781430242727_Fig07-42.jpg)


    **图 7-42.** *开始编辑所选图书的详情场景。*


    1.  现在开始设计你的详情视图控制器。首先需要导航到画布的最右侧。点击“详情视图内容显示在此处”标签，然后将其删除，如图 7-42 所示。


    ![images](img/9781430242727_Fig07-43.jpg)


    **图 7-43.** *开始引入标签。*


    2.  先快速跳到 图 7-46——你会看到需要标题和三行文字，每行包含两个标签。你需要做的是：引入一个标题标签，将其拉伸至视图宽度，设置格式；然后为前三行中的第一行引入两个标签，同样设置格式；接着将这两个标签复制粘贴两次。因此，拖入第一个标签，将文本改为
    *标题*。将其宽度调整为几乎与视图本身等宽，居中对齐，设置字体为 System Bold 16.0，并将文本颜色改为蓝色。拖入另一个标签，将其左对齐放置在标题正下方。将文本改为
    *类别：*，设置字体为 System Bold 17.0。然后向右拖动，使其宽度刚好能容纳文本。接着，再拖入一个标签，放在刚添加的标签右侧，如图 7-43
    所示。将此标签的右侧手柄拖至画布右边缘附近，并将其文本改为 *类别标签*。


    ![images](img/9781430242727_Fig07-44.jpg)


    **图 7-44.** *粘贴并对齐另外两行。*


    3.  选择标题标签，在属性检查器中将其对齐方式设置为居中。现在同时选中“类别：”和“类别标签”，按下 `Cmd+C` 复制它们，然后按两次 `Cmd+V`
    进行粘贴。现在开始按照 图 7-44 所示对齐这些内容。将它们整齐对齐——完美地上下排列后——继续执行下一步。


    ![images](img/9781430242727_Fig07-45.jpg)


    **图 7-45.** *重命名并拖入一个用于显示图书封面的 UIImageView。*


    4.  将刚刚粘贴的两行分别重命名为“作者：”搭配“作者标签”，以及“年份：”搭配“年份标签”。现在从资源库中拖入一个 `UIImageView`，用于放置图书封面图片。前往尺寸检查器，将其尺寸设置为
    111 × 160。然后将图像居中，如图 7-45 所示。


    ![images](img/9781430242727_Fig07-46.jpg)


    **图 7-46.** *完成视图设置。*


    5.  最后要做的两件事是：将图像视图与临时的大图 `1big.png` 关联起来，并拖入一个文本视图，如图 7-46 所示，用于容纳我们为你提供的简短图书描述。文本视图中显示的文本以及相应的图片名称都将从数据库中选取。


    ![images](img/9781430242727_Fig07-47.jpg)


    **图 7-47.** *对齐并重命名文本视图中的文本。*


    6.  将文本视图放置到画布上后，将其居中对齐。在属性检查器中，取消勾选“可编辑”选项，然后在文本框中输入 *描述*，如图 7-47 所示。请记得在每一步操作后都保存进度。


    ![images](img/9781430242727_Fig07-48.jpg)


    **图 7-48.** *将图书列表连接到详情视图控制器。*


    7.  此视图在用户点击列表中的任何图书时都会出现，因此我们将在故事板中安排这个导航。选择“图书场景”中的顶部单元格，然后按住 Control 键拖拽到详情视图控制器，如图
    7-48 所示。释放连接线后，从故事板转场菜单中选择“推送”选项。


    ![images](img/9781430242727_Fig07-49.jpg)


    **图 7-49.** *将视图标题重命名为“图书详情”。*


    8.  连接好转场后，你会看到导航栏出现在详情视图中。双击标题文本，将其重命名为 *图书详情*，如图 7-49 所示。


    ![images](img/9781430242727_Fig07-50.jpg)


    **图 7-50.** *指定标识符。*


    9.  你需要为这个新转场分配一个唯一的标识符，因此请点击指向详情视图控制器的转场。选中后，切换到属性检查器，为此转场的标识符命名为 `ShowBookDetails`，如图
    7-50 所示。

    '
- fmt: '### Creating the UI for Entering and Saving New Data: Add Book Scene


    One of the cool things about your app is that it will allow the user to do something
    that used to be very difficult to program: add new content into the app and save
    it. Storyboarding has made this task a lot easier—furthermore, it’s an incredible
    skill to have.


    ![images](images/9781430242727_Fig07-51.jpg)


    **Figure 7-51.** *Creating the Add Book Scene*


    1.  You’ll now start designing a new scene that will display a simple form where
    the user can enter basic information about a book and save it into the database.
    Because you know what kind of data you need to capture for a book, it makes sense
    to make a Static Table View for it. To create a Static Table in Storyboards you
    must use a Table View Controller. Drag out a Table View Controller from the Object
    Library onto your Storyboard canvas as shown in [Figure 7-51](#Chapter07.html#fig_7_51).


    ![images](images/9781430242727_Fig07-52.jpg)


    **Figure 7-52.** *Edit the Table View cell of the Static Table View.*


    2.  Click the top cell and in the Size Inspector set the Row Height to 50. Because
    you don’t need this cell to be highlighted on touch, with the cell still selected
    switch to the Attributes Inspector and change the Selection property from Blue
    to None. Drag out a label and place it on the left-hand side of the cell. Then
    in the Attributes Inspector change Text to *title*, set the font to System Bold
    14.0, and make it any color you choose (we picked a grey-blue color from the standard
    palette). Also change the text from being left-aligned to right-aligned. Now for
    a pretty cool trick, use an Image View as a separator to sit between the field’s
    header and the information the user will be entering. Bring in a UIImage View
    and place it in the cell. In the Attributes Inspector set the Background color
    to Light Grey. Back in the Size Inspector, set the width to 1 and the height to
    50 so it looks just like thin grey line separator. Finally, set the Y value to
    0 as shown in [Figure 7-52](#Chapter07.html#fig_7_52).


    ![images](images/9781430242727_Fig07-53.jpg)


    **Figure 7-53.** *Drag in the Text Field.*


    3.  To be able to add new content into a SQLite database from the app, you need
    to be able to type data into the app. You’ll need to use a Text Field for this.
    Drag a Text Field from the Object Library into your cell and expand it until it
    reaches about 233 points as shown in [Figure 7-53](#Chapter07.html#fig_7_53).
    In the Attributes Inspector set the Border Style of the Text Field to be invisible.
    That’s the first button to the left.


    ![images](images/9781430242727_Fig07-54.jpg)


    **Figure 7-54.** *Select the Table View for further edits.*


    4.  You want to set your Table View to Grouped so you can provide sections for
    it. Make sure as you go through the next steps that the Table View is selected.
    You can click anywhere inside the Table View below the prototype cell to select
    it as shown in [Figure 7-54](#Chapter07.html#fig_7_54).


    ![images](images/9781430242727_Fig07-55.jpg)


    **Figure 7-55.** *Group the Table View.*


    5.  With the Table View selected, in the Attributes Inspector change the Style
    from Plain to Grouped as shown in [Figure 7-55](#Chapter07.html#fig_7_55).


    ![images](images/9781430242727_Fig07-56.jpg)


    **Figure 7-56.** *Change the Table Content type.*


    6.  Change the Content type from Dynamic Prototypes to Static Cells as shown in
    [Figure 7-56](#Chapter07.html#fig_7_56). After that you will see three static
    cells appear. You only need two. Select one and delete it.


    ![images](images/9781430242727_Fig07-57.jpg)


    **Figure 7-57.** *Selecting the Table View Section in Document Outline.*


    7.  Change the left label’s text of the bottom cell to *year* (see 1 in [Figure
    7-57](#Chapter07.html#fig_7_57)). Now click carefully anywhere on the striped
    grouped Table View background (see 2 in [Figure 7-57](#Chapter07.html#fig_7_57))
    and make sure you don’t select one of the cells or the Table View itself. You
    can open the Document Outline pane and select the Table View Section as shown
    on the right in [Figure 7-57](#Chapter07.html#fig_7_57).


    ![images](images/9781430242727_Fig07-58.jpg)


    **Figure 7-58.** *Set the Header to Book Info.*


    8.  With the Table View Section selected, in the Attributes Inspector enter *Book
    Info* as the Header attribute of the Table View Section as shown in [Figure 7-58](#Chapter07.html#fig_7_58).


    ![images](images/9781430242727_Fig07-59.jpg)


    **Figure 7-59.** *Create another section*


    9.  Now you can simply copy the first section and paste it. Make sure you click
    Table View Section – Book Info in the Document Outline again to select it—otherwise
    these instructions may not produce the desired results. With the section selected,
    press `![images](images/U003.jpg)+C` and then immediately press `![images](images/U003.jpg)+V`
    as shown in [Figure 7-59](#Chapter07.html#fig_7_59).


    ![images](images/9781430242727_Fig07-60.jpg)


    **Figure 7-60.** *Modify the new section.*


    10.  You’ll let the user do something really cool here. Rather than have users
    remember an author’s name, you’ll let them select a name from a list. Double-click
    the header of the new section you just pasted and change its text from *Book Info*
    to *Author*. You also have too many cells in this section—delete one cell so only
    one remains. Select the cell and in the Attributes Inspector change the following
    properties: set Style to Basic (see 1 in [Figure 7-60](#Chapter07.html#fig_7_60)),
    Selection to Blue, and Accessory to Disclosure Indicator (see 2 in [Figure 7-60](#Chapter07.html#fig_7_60)).
    Double-click the Title label that appeared after you changed the cell’s style
    and change its text to *Select author* (see 3 in [Figure 7-60](#Chapter07.html#fig_7_60))
    so users know they’re now going to select from one of Apress’s authors. The final
    look of this section is shown in [Figure 7-60](#Chapter07.html#fig_7_60).


    ![images](images/9781430242727_Fig07-61.jpg)


    **Figure 7-61.** *Click once on the Author header to select the section and press
    `![images](images/U003.jpg)+C`.*


    11.  Unlike the copying in the first section, where you used Document Outline
    to help select the right section object, your sections are now clearly identified
    by headers. You can easily select the second section in the view canvas itself
    to copy and paste it. Click the Author header text to highlight it, press `![images](images/U003.jpg)+C`
    to copy it as shown in [Figure 7-61](#Chapter07.html#fig_7_61), and immediately
    press `![images](images/U003.jpg)+V` to paste it.


    ![images](images/9781430242727_Fig07-62.jpg)


    **Figure 7-62.** *Making another section*


    12.  You should now see the third section appear at the bottom of the Table View,
    which is identical to the one right above it, as shown in [Figure 7-62](#Chapter07.html#fig_7_62).
    Double-click the header and change its text to *Category*.


    ![images](images/9781430242727_Fig07-63.jpg)


    **Figure 7-63.** *Edit the third section.*


    13.  Also change the “Select author” label’s text to *Select category*. The final
    look of the section is shown in [Figure 7-63](#Chapter07.html#fig_7_63).


    ![images](images/9781430242727_Fig07-64.jpg)


    **Figure 7-64.** *Rearrange sections exercise*'
