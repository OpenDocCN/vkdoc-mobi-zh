    It will be changed to the title of the actual photo during runtime. Also set Label
    properties in the Attributes Inspector as follows: Font: System Bold of size 18,
    Text Color: White Color, Alignment: Center. As you probably noticed, the label
    is no longer visible on the screen. Click anywhere inside the main View to select
    it and change the background color to Black in the Attributes Inspector as shown
    in [Figure 3-44](#Chapter03.html#fig_3_44).


    ![images](images/9781430242727_Fig03-43.jpg)


    **Figure 3-43.** *Add a label to the scene and adjust its properties.*


    ![images](images/9781430242727_Fig03-44.jpg)


    **Figure 3-44.** *Change the background color of the main View.*


    9.  In this step you’re going to create a new `UIViewController` subclass, which
    will control your secondary scene. Hit ![images](images/U003.jpg)`N`, select the
    Objective-C class option, and click Next. Make sure the `UIViewController` is
    selected in the “Subclass of” section as shown in [Figure 3-45](#Chapter03.html#fig_3_45).
    Name the class `PhotoViewController` and save it.


    ![images](images/9781430242727_Fig03-45.jpg)


    **Figure 3-45.** *Create a new UIViewController subclass.*


    10.  In the Storyboard select the second View Controller, and in the Identity
    Inspector set its class to the newly created `PhotoViewController` class as shown
    in [Figure 3-46](#Chapter03.html#fig_3_46).


    ![images](images/9781430242727_Fig03-46.jpg)


    **Figure 3-46.** *Set the secondary View Controller’s class to PhotoViewController.*


    11.  Click the Assistant icon. If Assistant didn’t display the `PhotoViewController.h`
    file automatically, you can select it from Recent Files submenu under the Related
    Files Options menu (at the top of the screen divider). You’ll now create and connect
    `IBOutlet`s for your `PhotoViewController` class. Control-drag from `UIImageView`
    into the `PhotoViewController.h` file and drop it right before `@end` as shown
    in [Figure 3-47](#Chapter03.html#fig_3_47). Name it `photoImageView`. Similarly,
    Control-drag from the label and name the property `photoTitleLabel`.


    ![images](images/9781430242727_Fig03-47.jpg)


    **Figure 3-47.** *Create IBOutlets for PhotoViewController.*


    12.  At this point, you’re done with the Storyboard. You now need to add a few
    more lines of code to make everything work. Close the Assistant and navigate to
    the `PhotoViewController.h` file. Add the forward declaration of the `PhotoAnnotation`
    class `"@class PhotoAnnotation;"` right before the `@interface` and create another
    property called `photoAnnotation` as shown in [Figure 3-48](#Chapter03.html#fig_3_48)
    (DemoMonkey step “12 `PhotoViewController.h` Add `photoAnnotation` Property”).
    This new property will store a reference to the selected annotation so you can
    get access to the data necessary to download and display the actual photo. Don’t
    forget to synthesize the new property in `PhotoViewController.m` and make the
    `PhotoAnnotation` class visible to `PhotoViewController` by adding the following
    code at the top of the file:


    ```

    import "PhotoAnnotation.h"

    ```'
