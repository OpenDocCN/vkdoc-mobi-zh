    **Figure 7-64.** *Rearrange sections exercise*'
  trans: '

    ### 创建输入和保存新数据的界面：添加图书场景


    你的应用有一个很酷的功能，它将允许用户执行一项过去很难编程实现的操作：向应用中添加新内容并将其保存。故事板使这项任务变得容易得多——而且，这是一项非常宝贵的技能。


    ![images](img/9781430242727_Fig07-51.jpg)


    **图 7-51.** *创建添加图书场景*


    1.  现在，你将开始设计一个新场景，该场景将显示一个简单的表单，用户可以在其中输入图书的基本信息并将其保存到数据库中。因为你已经知道需要为图书捕获哪些类型的数据，所以为其创建一个静态表视图是合理的。要在故事板中创建静态表，你必须使用表视图控制器。从对象库中拖出一个表视图控制器到你的故事板画布上，如图
    7-51 所示。


    ![images](img/9781430242727_Fig07-52.jpg)


    **图 7-52.** *编辑静态表视图的表视图单元格。*


    2.  单击顶部单元格，在尺寸检查器中将行高设置为 50。因为不需要这个单元格在触摸时高亮显示，在保持单元格选中的状态下，切换到属性检查器，将选择属性从蓝色更改为无。拖出一个标签，并将其放置在单元格的左侧。然后，在属性检查器中将文本更改为*标题*，将字体设置为
    System Bold 14.0，并选择你喜欢的任何颜色（我们从标准调色板中挑选了一种灰蓝色）。另外，将文本从左对齐改为右对齐。现在，有一个非常酷的技巧，使用图像视图作为分隔线，位于字段标题和用户将要输入的信息之间。拖入一个
    UIImage 视图并将其放置在单元格中。在属性检查器中，将背景色设置为浅灰色。回到尺寸检查器，将宽度设置为 1，高度设置为 50，使其看起来像一条细灰线分隔符。最后，将
    Y 值设置为 0，如图 7-52 所示。


    ![images](img/9781430242727_Fig07-53.jpg)


    **图 7-53.** *拖入文本字段。*


    3.  为了能够从应用向 SQLite 数据库添加新内容，你需要能够在应用中输入数据。为此，你需要使用文本字段。从对象库中拖出一个文本字段到你的单元格中，并将其展开至大约
    233 点，如图 7-53 所示。在属性检查器中，将文本字段的边框样式设置为不可见，即最左边的第一个按钮。


    ![images](img/9781430242727_Fig07-54.jpg)


    **图 7-54.** *选择表视图进行进一步编辑。*


    4.  你想要将表视图设置为分组样式，以便为其提供分区。请确保在接下来的步骤中选择了表视图。你可以点击原型单元格下方表视图内的任意位置来选择它，如图 7-54
    所示。


    ![images](img/9781430242727_Fig07-55.jpg)


    **图 7-55.** *将表视图分组。*


    5.  选中表视图后，在属性检查器中将其样式从 Plain 更改为 Grouped，如图 7-55 所示。


    ![images](img/9781430242727_Fig07-56.jpg)


    **图 7-56.** *更改表内容类型。*


    6.  将内容类型从动态原型更改为静态单元格，如图 7-56 所示。之后，你会看到三个静态单元格出现。你只需要两个，选择一个并将其删除。


    ![images](img/9781430242727_Fig07-57.jpg)


    **图 7-57.** *在文档大纲中选择表视图分区。*


    7.  将底部单元格左侧标签的文本更改为*年份*（参见图 7-57 中的 1）。现在，仔细点击条纹分组表视图背景的任意位置（参见图 7-57 中的 2），并确保没有选中某个单元格或表视图本身。你可以打开文档大纲窗格，选择表视图分区，如图
    7-57 右侧所示。


    ![images](img/9781430242727_Fig07-58.jpg)


    **图 7-58.** *将页眉设置为图书信息。*


    8.  选中表视图分区后，在属性检查器中，将表视图分区的页眉属性设置为*图书信息*，如图 7-58 所示。


    ![images](img/9781430242727_Fig07-59.jpg)


    **图 7-59.** *创建另一个分区*


    9.  现在，你可以简单地复制第一个分区并粘贴。确保再次在文档大纲中选择“表视图分区 – 图书信息”，否则这些说明可能无法产生预期结果。选中分区后，按 `![images](img/U003.jpg)+C`，然后立即按
    `![images](img/U003.jpg)+V`，如图 7-59 所示。


    ![images](img/9781430242727_Fig07-60.jpg)


    **图 7-60.** *修改新分区。*


    10.  你将让用户执行一个非常酷的操作。与其让用户记住作者姓名，不如让他们从列表中选择一个姓名。双击你刚刚粘贴的新分区的页眉，将其文本从*图书信息*更改为*作者*。这个分区的单元格也太多了——删除一个单元格，只保留一个。选择该单元格，在属性检查器中更改以下属性：将样式设置为
    Basic（参见图 7-60 中的 1），将选择设置为蓝色，将附件设置为展开指示器（参见图 7-60 中的 2）。双击更改单元格样式后出现的标题标签，将其文本更改为*选择作者*（参见图
    7-60 中的 3），这样用户就知道他们将要选择 Apress 的一位作者。这个分区的最终外观如图 7-60 所示。


    ![images](img/9781430242727_Fig07-61.jpg)


    **图 7-61.** *单击一次作者页眉以选择分区，然后按 `![images](img/U003.jpg)+C`。*


    11.  与复制第一个分区时使用文档大纲来帮助选择正确的分区对象不同，你现在的分区已通过页眉清晰标识。你可以直接在视图画布中轻松选择第二个分区进行复制和粘贴。单击作者页眉文本以高亮显示它，按
    `![images](img/U003.jpg)+C` 复制它，如图 7-61 所示，然后立即按 `![images](img/U003.jpg)+V` 粘贴它。


    ![images](img/9781430242727_Fig07-62.jpg)


    **图 7-62.** *制作另一个分区*


    12.  现在，你应该看到第三个分区出现在表视图的底部，与它正上方的那个分区完全相同，如图 7-62 所示。双击页眉并将其文本更改为*类别*。


    ![images](img/9781430242727_Fig07-63.jpg)


    **图 7-63.** *编辑第三个分区。*


    13.  同时将“选择作者”标签的文本更改为*选择类别*。该分区的最终外观如图 7-63 所示。


    ![images](img/9781430242727_Fig07-64.jpg)


    **图 7-64.** *调整分区顺序练习*

