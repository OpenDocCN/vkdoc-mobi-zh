- fmt: '### Step 4b: Create the Final Nine Scenes


    We think you’ve done this enough now that you just need a limited amount of instructions,
    such as a client, boss, or skilled co-worker/mentor may give you.


    ![images](images/9781430242727_Fig11-01.jpg)


    **Figure 11-1.** Duplicate Scene 8 to create Scene 10.


    - Scene 10: Copy an existing dead-end scene.

    - Scene 10: Place above or below previous scene.

    - Scene 10: Rename.

    - Scene 10: Change the Title.

    - Scene 10: Organize graphics.

    - Scene 10: Make connections.


    1. This time you need to duplicate the dead-end scene. Select the scene dock of
    the View Controller – Scene 8 and duplicate it by pressing `Command`+`D` as shown
    in Figure 11-1. Place it to the right and slightly below Scene 9 and change the
    Title to Scene 10.


    ![images](images/9781430242727_Fig11-02.jpg)


    **Figure 11-2.** Scene 10: Set the desired image.


    - Scene 10: Copy an existing dead-end scene.

    - Scene 10: Place above or below previous scene.

    - Scene 10: Rename.

    - Scene 10: Change the Title.

    - Scene 10: Change the Image.

    - Scene 10: Organize graphics.

    - Scene 10: Make connections.


    2. Change the image to `wanderBoard-cam10.png` as shown in Figure 11-2. Here you’re
    creating another dead-end. You didn’t complete the wiring up of the reverse button
    for the previous dead-end, so let’s fix up Scenes 7 and 8 before we finish Scene
    10.


    ![images](images/9781430242727_Fig11-03.jpg)


    **Figure 11-3.** Select Scene 7 so you can finish some missed steps.


    3. Remember when you ran your last test and had to go back and connect the red
    button to the code? Let’s not repeat that mistake. Let’s do that here. Select
    Scene 7 as shown in Figure 11-3.


    ![images](images/9781430242727_Fig11-04.jpg)


    **Figure 11-4.** Connect the Scene 7 reverse button to its property.


    4. Open the Assistant Editor and make sure your header file is on the right. Control-drag
    from the button to the header file as shown in Figure 11-4 to connect the button
    to its property.


    ![images](images/9781430242727_Fig11-05.jpg)


    **Figure 11-5.** Connect the Scene 7 reverse button to its action method.


    5. Control-drag from the button in scene 7 to the header file to connect the button
    to the action method as shown in Figure 11-5.


    ![images](images/9781430242727_Fig11-06.jpg)


    **Figure 11-6.** Connect the Scene 8 reverse button to the property.


    6. Now do the same for Scene 8. After selecting Scene 8, Control-drag from the
    button to its property in the header file as shown in Figure 11-6.


    ![images](images/9781430242727_Fig11-07.jpg)


    **Figure 11-7.** Connect the Scene 8 reverse button to its action method.


    7. Control-drag from the button in Scene 8 to the header file to connect to the
    action method as shown in Figure 11-7.


    ![images](images/9781430242727_Fig11-08.jpg)


    **Figure 11-8.** Connect the Scene 10 reverse button to its property.


    8. Now, back to Scene 10. Select Scene 10 and Control-drag from the button to
    the header file as shown in Figure 11-8, establishing the connection to the property.


    ![images](images/9781430242727_Fig11-09.jpg)


    **Figure 11-9.** Connect the Scene 10 button to its action method.


    9. Control-drag from the button in Scene 10 to the header file to connect the
    action method as shown in Figure 11-9.


    ![images](images/9781430242727_Fig11-10.jpg)


    **Figure 11-10.** Create the segue from Scene 9: Button – Right to Scene 10.


    - Scene 10: Copy an existing scene.

    - Scene 10: Rename.

    - Scene 10: Organize graphics.

    - Scene 10: Make connections.

    - Scene 10: Control-drag from button to new scene.

    - Scene 10: Edit the segue’s attributes.


    10. As discussed, you need to go from the right button in Scene 9 to Scene 10,
    as shown in Figure 11-10. You can switch off the Assistant Editor, select the
    created segue, go to the Attributes Inspector, name the Segue class `MovementSegue`,
    keep the Style as Custom, and change the Identifier to Right.


    ![images](images/9781430242727_Fig11-11.jpg)


    **Figure 11-11.** Duplicate Scene 9 to create Scene 11.


    - Scene 11: Copy an existing dead-end scene.

    - Scene 11: Place above or below previous scene.

    - Scene 11: Rename.

    - Scene 11: Change the Title.

    - Scene 11: Organize graphics.

    - Scene 11: Make connections.


    11. Scene 11 is not going to be a dead-end, so take Scene 9 and duplicate it as
    shown in Figure 11-11. Drag over to the right and top of Scene 9—you’ll notice
    it doesn’t fit. Zoom out and move the upper run of views higher to make some space.
    Now change the Title to Scene 11.


    ![images](images/9781430242727_Fig11-12.jpg)


    **Figure 11-12.** Change the Image of Scene 11.


    - Scene 11: Copy an existing dead-end scene.

    - Scene 11: Place above or below previous scene.

    - Scene 11: Rename.

    - Scene 11: Change the Title.

    - Scene 11: Change the Image.

    - Scene 11: Organize graphics.

    - Scene 11: Make connections.


    12. Change the Image of Scene 11 to `wanderBoard-cam11.png` as shown in Figure
    11-12.


    ![images](images/9781430242727_Fig11-13.jpg)


    **Figure 11-13.** Make the segue from Scene 10: Button – Left to Scene 11.


    - Scene 11: Copy an existing scene.

    - Scene 11: Rename.

    - Scene 11: Organize graphics.

    - Scene 11: Make connections.

    - Scene 11: Control-drag from button to new scene.

    - Scene 11: Edit the segue’s attributes.


    13. Connect the left button in Scene 9 to Scene 11 as shown in Figure 11-13. Now
    select the created segue, in the Attributes Inspector name the segue class `MovementSegue`,
    keep the Style as Custom, and change the Identifier to Left.


    ![images](images/9781430242727_Fig11-14.jpg)


    **Figure 11-14.** Scene 11: Setting size and location of Button – Left.


    - Scene 11: Copy an existing scene.

    - Scene 11: Rename.

    - Scene 11: Organize graphics.

    - Scene 11: Delete inapplicable elements.

    - Scene 11: Edit buttons.

    - Scene 11: Make button visible.

    - Scene 11: Replace Image with new image (done).

    - Scene 11: Configure new buttons.

    - Scene 11: Duplicate buttons (done).

    - Scene 11: Reset parameters of buttons.

    - Scene 11: Button-Right.

    - Scene 11: Make transparent again.

    - Scene 11: Correct bug.

    - Scene 11: Make connections.


    14. Select Scene 11’s two buttons and make them visible. Set the right button
    to `585,40,420,90` and the left button to `295,40,240,680` as shown in Figure
    11-14. Now change them back to transparent and make sure they both show Touch
    on Highlight.


    **NOTE:** As you move on to Scenes 12–17 you’ll no longer use the steps. We’ll
    simply talk to you in prose, and you should be able to follow along at this point.


    ![images](images/9781430242727_Fig11-15.jpg)


    **Figure 11-15.** Duplicate Scene 7 to create Scene 12.


    15. Scene 12 is going to be another dead-end—specifically, an intermediate dead-end.
    So duplicate Scene 7 as shown in Figure 11-15 and place it to the upper-right
    side of Scene 11. Change the Title to Scene 12 and change the Image to `wanderBoard-cam12.png`.


    ![images](images/9781430242727_Fig11-16.jpg)


    **Figure 11-16.** Scene 12: Configure the buttons.


    16. For Scene 12 you can go reverse, and left but not right. So hide right and
    make left shown and visible at `85,45,180,680` as shown in Figure 11-16. Now make
    it transparent again and make sure it shows Touch on Highlight. Set the reverse
    button’s tag to the intermediate level—so set it at 1. Remember to connect the
    reverse button to both the property and the action method!


    ![images](images/9781430242727_Fig11-17.jpg)


    **Figure 11-17.** Connect Scene 11: Button – Left to Scene 12.


    17. Connect Scene 11’s left button to Scene 12 as shown in Figure 11-17. Now select
    the created segue, in the Attributes Inspector name the Segue class `MovementSegue`,
    keep the Style as Custom, and change the Identifier to Left.


    ![images](images/9781430242727_Fig11-18.jpg)


    **Figure 11-18.** Duplicate Scene 8 to create Scene 13.


    18. You know that after the intermediate dead-end of Scene 12 comes the real dead-end,
    and that will be Scene 13. So duplicate Scene 8 as shown in Figure 11-18. Place
    it to the right of Scene 12. Change the Title to Scene 13.


    ![images](images/9781430242727_Fig11-19.jpg)


    **Figure 11-19.** Connect scene 12: Button – Left to Scene 13.


    19. Connect the left button in Scene 12 to Scene 13 as shown in Figure 11-19.
    Select the created segue, in the Attributes Inspector name the Segue class `MovementSegue`,
    keep the Style as Custom, and change the Identifier to Left. Change the Image
    to `wanderBoard-cam13.png`.


    ![images](images/9781430242727_Fig11-20.jpg)


    **Figure 11-20.** Scene 13: Configure the buttons.


    20. Make sure the right button is hidden, the left button is hidden, and the reverse
    button is tagged at 0 as shown in Figure 11-20. Also, don’t forget to hook up
    the reverse button to the property and the action method!


    ![images](images/9781430242727_Fig11-21.jpg)


    **Figure 11-21.** Duplicate Scene 11 to create Scene 14.


    21. You’re not going down a dead-end anymore, so duplicate Scene 11 as shown in
    Figure 11-21. Place it to the right and slightly under Scene 11.


    ![images](images/9781430242727_Fig11-22.jpg)


    **Figure 11-22.** Set the Scene 14 title.


    22. Set the Title to Scene 14 as shown in Figure 11-22.


    ![images](images/9781430242727_Fig11-23.jpg)


    **Figure 11-23.** Connect Scene 11: Button – Right to Scene 14.


    23. You need a segue from the right button of Scene 11 to Scene 14 as shown in
    Figure 11-23. Select the created segue, in the Attributes Inspector name the Segue
    class `MovementSegue`, keep the Style as Custom, and change the Identifier to
    Right. Change the Image to `wanderBoard-cam14.png`.


    ![images](images/9781430242727_Fig11-24.jpg)


    **Figure 11-24.** Configure the Scene 14 buttons.


    24. You only have a single place to go, and that is left. So make the right button
    hidden. Make the left visible and then set it to `20,20,420,720` as shown in Figure
    11-24. Then make it transparent and Touches with Highlight.


    ![images](images/9781430242727_Fig11-25.jpg)


    **Figure 11-25.** Duplicate Scene 14 to create Scene 15.


    25. Duplicate Scene 14 as shown in Figure 11-25 and place it to the left of Scene
    14.


    ![images](images/9781430242727_Fig11-26.jpg)


    **Figure 11-26.** Connect Scene 14: Button – Left to Scene 15.


    26. Change the Title to Scene 15. Because it can only go left, connect Scene 14’s
    left button to Scene 15 as shown in Figure 11-26. Select the created segue, in
    the Attributes Inspector name the Segue class `MovementSegue`, keep the Style
    as Custom, and change the Identifier to Left. Change the Image to `wanderBoard-cam15.png`.


    ![images](images/9781430242727_Fig11-27.jpg)


    **Figure 11-27.** Scene 15: Duplicate Button – Right to make a new forward button.


    27. You need to create a forward button. Duplicate the right button and then move
    it up as shown in Figure 11-27.


    ![images](images/9781430242727_Fig11-28.jpg)


    **Figure 11-28.** Scene 15: Name the new forward button.


    28. Name the forward button Button-Forward as shown in Figure 11-28.


    ![images](images/9781430242727_Fig11-29.jpg)


    **Figure 11-29.** Configure the Scene 15 forward button.


    29. Make sure that right and left are hidden and make the forward button be `270,30,450,690`
    as shown in Figure 11-29.


    ![images](images/9781430242727_Fig11-30.jpg)


    **Figure 11-30.** Duplicate Scene 14 to create Scene 16.


    30. You don’t need a forward button anymore, so just duplicate Scene 14 as shown
    in Figure 11-30. Place it to the right of Scene 15. Change the Title to Scene
    16.


    ![images](images/9781430242727_Fig11-31.jpg)


    **Figure 11-31.** Scene 16: Select Image View and change name.


    31. Sometimes it’s easier to select the Image View in the side bar as shown in
    Figure 11-31 than try to pick things around the buttons. So select it and change
    the Image to `wanderBoard-cam16.png`. Also, because you copied this scene, your
    Button – Left may already be in the correct location, but please check that it’s
    `20,20,420,710`, not hidden, and that it’s set to show Touch on Highlight.


    ![images](images/9781430242727_Fig11-32.jpg)


    **Figure 11-32.** Connect Scene 15: Button – Forward to Scene 16.


    32. Your segue goes from the special forward button you just made to Scene 16
    here. So, connect them as shown in Figure 11-32. Select the created segue, in
    the Attributes Inspector name the Segue class `MovementSegue`, keep the Style
    as Custom, and change the Identifier to Forward.


    ![images](images/9781430242727_Fig11-33.jpg)


    **Figure 11-33.** Duplicate Scene 16 to create Scene 17.


    33. Duplicate Scene 16 as shown in Figure 11-33 and make it Scene 17. Place it
    to the right of Scene 16. Set the Title to Scene 17 and set the Image to `wanderBoard-cam17.png`.


    ![images](images/9781430242727_Fig11-34.jpg)


    **Figure 11-34.** Connect Scene 16: Button – Left to Scene 17.


    34. Connect Scene 16’s left button to Scene 17 as shown in Figure 11-34. Select
    the created segue, in the Attributes Inspector name the Segue class `MovementSegue`,
    keep the Style as Custom, and change the Identifier to Left.


    ![images](images/9781430242727_Fig11-35.jpg)


    **Figure 11-35.** Configure Scene 17 buttons.


    35. Back in the new Scene 17, let’s configure the buttons. Ensure that your Button
    – Left is hidden (because you’re not using it). Ensure that Button – Right is
    visible and change it from `414,20,552,708` as shown in Figure 11-35. Make it
    transparent and make sure it shows Touches on Highlight.


    ![images](images/9781430242727_Fig11-36.jpg)


    **Figure 11-36.** Duplicate Scene 17 to create the Final Scene (Scene 18).


    36. Duplicate Scene 17 as shown in Figure 11-36. Place it to the right of Scene
    17.


    ![images](images/9781430242727_Fig11-37.jpg)


    **Figure 11-37.** Scene 18: Set the final Title.


    37. Change the Title to Scene 18 (end) as shown in Figure 11-37.


    ![images](images/9781430242727_Fig11-38.jpg)


    **Figure 11-38.** Connect Scene 17: Button – Right to Scene 18.


    38. Connect the right button in Scene 17 to the final scene as shown in Figure
    11-38. Select the created segue, in the Attributes Inspector name the Segue class
    `MovementSegue`, keep the Style as Custom, and change the Identifier to Right.
    You have no buttons on this one, so hide all the buttons by changing them to hidden.


    ![images](images/9781430242727_Fig11-39.jpg)


    **Figure 11-39.** Scene 18: Change the last image.


    39. You have finally reached the end of the maze! Change the Image to `wanderBoard-cam18.png`
    as shown in Figure 11-39. Let’s build it and run it. Uh-oh, we have some errors,
    with buttons not working.


    ![images](images/9781430242727_Fig11-40.jpg)


    **Figure 11-40.** Debug: Find and fix last problems (Scene 6, the first to find
    and fix).


    40. Our left button in Scene 6 wasn’t working, so we select it as shown in Figure
    11-40, and sure enough it was still hidden. Uncheck the hidden check box.

    41. Repeat the same steps for the left button in Scene 9.

    42. Repeat the same steps for the left button in Scene 11.


    ![images](images/9781430242727_Fig11-41.jpg)


    **Figure 11-41.** It works!


    43. Run it and … Congratulations! It works (Figure 11-41)!


    Congratulations on completing the wanderBoard app! In this application you’ve
    seen that with very little code and a bit of Storyboard content, you can create
    a rather fun but simple application. You’ve experienced the power of duplicating
    views on the Storyboard canvas when there are common components you want in each
    of the views. Duplicating really saves time compared to creating each view piece-by-piece
    from the ground up. The speed in which we were able to create this application
    really surprised us. We hope we’ve shared some of this surprise along with the
    fun of creating this app with you.'
