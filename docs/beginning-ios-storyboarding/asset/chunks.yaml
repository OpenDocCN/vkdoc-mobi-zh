- fmt: '# Necessities and Accessories


    In order to program for the iPhone and/or iPad, and to follow along with the exercises,
    tutorials, and examples presented in this book, you’ll need to have 6 minimal
    requirements which you may not completely understand right now but that’s OK just
    roll with me for a second, I’ll explain everything as we go through these steps.


    **NOTE:** Whenever we say *iPhone* or *iPad*, we’re referring to any iPhone or
    iPad OS device, including the iPod touch. Also when we say *Macintosh HD*, yours
    may be named something different.


    Briefly, you will need six things:


    - An Intel-based Macintosh

    - The correct operating system for your Mac (OS X 10.7.4 Lion or later)

    - Be a registered developer or be simulator-based (discussed in detail later in
    this chapter)

    - To have the correct operating system for your iPhone (iOS 5 or above)

    - To have the correct Software Development Kit (SDK) for your iPhone that runs
    a program called Xcode (version 4.3 and above)

    - To install and run `DemoMonkey`


    Let''s go into each of these in a bit more detail.


    ## Getting a Mac


    If your Mac was manufactured after 2006, you’re okay. One of the authors purposefully
    programs everything on a MacBook bought in 2008. All the videos on the net are
    screencast from Dr. Lewis''s MacBook from 2006; or if he broadcasts from his 2010
    iMac, he first runs it on his MacBook bought in 2006.


    - You don’t need the latest revved-up Mac. If you haven’t bought one yet, we suggest
    you get a basic, no-frills MacBook Air.

    - If you do own an older Mac, you may be able to add some RAM. Make a free appointment
    at the Genius Bar at an Apple Store and ask whether they can increase the RAM
    on your older model Mac, and if so, ask about the maximum the RAM can be increased.
    Then ask explicitly: “Can this old computer run Lion, *at least* 10.7.1, and Xcode
    4.3 or later?” Note that some of the apps in this book will work using Xcode 4.3
    on Snow Leopard. But if possible, try to get Lion (at least Mac OS X 10.7.4) and
    iOS SDK 4.3.

    - If you don''t have a Mac, you''ll need to buy one if you want to follow along
    with this book and or program Objective-C to make iPhone apps. Keep in mind that,
    as mentioned, we have made a point to code and run every program in this book
    on Apple’s smallest and cheapest model, the MacBook. Apple has discontinued the
    MacBook; it now sells the MacBook Air for $999, which is more advanced than the
    Author''s MacBook. You can purchase a MacBook on eBay and other such sites. See
    [Figure 1-1](#Chapter01.html#fig_1_1).


    ![images](images/9781430242727_Fig01-01.jpg)


    **Figure 1-1.** *The authors use the cheapest 2006 Mac on the market, the MacBook,
    to perform all the coding and compiling in this book. Many of the authors’ students
    purchase the MacBook Air for $999 as illustrated here.*


    ## Getting OS X


    You will need the correct version of OS X. At the time of this writing, that version
    is OS X 10.7.4. We need to make sure that you have the latest greatest operating
    system inside your Mac. We see a lot of emails and forum questions revealing that
    many of you will think: “*Ah, my code probably did not compile correctly because
    Dr. Lewis has a different version of OS X or/and iOS on his machine…*”


    **NOTE:** Even if you think everything is up to date, we suggest you follow along
    with the procedure in this section and make sure your system has the latest OS
    X and the latest iOS inside it. We say this because as you follow along in this
    book and tackle all the programs, there will be times when your code doesn’t work
    the first time you run it.


    To make sure your system is recent enough to follow along with the book, please
    do the following:


    1. Close every program running on your Mac so that only the Finder is running.

    2. Click the little apple in the upper left-hand corner of your screen and select
    About This Mac. You''ll see the window shown in [Figure 1-2](#Chapter01.html#fig_1_2).
    Make sure it says OS X 10.7.4.


    ![images](images/9781430242727_Fig01-02.jpg)


    **Figure 1-2.** *Here you can see that Dr. Lewis’s MacBook is using is OS X 10.7.4.*


    Now to make sure you have the latest software on your Mac:


    1. With all your programs closed except for the Finder, click the apple in the
    upper left-hand corner again and select Software Update… as illustrated in [Figure
    1-3](#Chapter01.html#fig_1_3).

    2. If updates are available, click Continue and follow the instructions and four
    screen prompts, as shown in [Figure 1-3](#Chapter01.html#fig_1_3).


    ![images](images/9781430242727_Fig01-03.jpg)


    **Figure 1-3.** *Top: Checking for new software. Second from top: Download the
    new software. Second from bottom: Wait for software to download. Bottom: Click
    Restart to have your Mac properly install the new software.*


    If by the time you are reading this book, you realize that your version of OS
    X or iOS makes my pictures seemed dated, don''t freak out. We have an online forum
    where we and volunteers love to help others. We always update the forum with news
    about recent updates of OS X and iOS. You can visit the forum here:


    `www.rorylewis.com/ipad_forum/`

    `http://bit.ly/oLVwpY`


    ## Become a Developer


    You will need to become a registered developer via the iPhone/iPad Software Development
    Kit (SDK) for $99. Or you can pay $0 for an introductory set of bells and whistles.


    ### Making Your Choice


    If you are a student, it’s likely that your professor has already taken care of
    this, and you may already be registered under your professor’s name. If you are
    not a student, you need to decide which type of developer you would like to be.
    Here are your options:


    - *$0 option*: You can go to the App Store and download Xcode for free. This is
    fine, but bear in mind that unless you become a developer ($99), you will only
    be able to see the apps you code and program in this book running on the iPhone
    or iPad *Simulator*. That means you can''t run them on a real physical iPad or
    iPhone. You also won''t be able to sell your apps on the iTunes store. Lastly,
    you won''t be able to log in to the developer site to view code snippets and updates,
    beta-test new products, or be a part of the Apple online community. This may be
    a very good choice for the person who isn''t sure whether they want to continue
    with Xcode and programming. If that''s the case, then download the latest version
    of Xcode from [`https://developer.apple.com/xcode/`](https://developer.apple.com/xcode/)
    and meet me at [Figure 1-13](#Chapter01.html#fig_1_13).

    - *$99 option*: If you do want to run your apps on a physical device such as a
    real iPad or iPhone, sell apps on the iTunes store, and be a part of the developer
    group at Apple—simply continue reading.'
