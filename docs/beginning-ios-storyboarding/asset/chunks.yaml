- fmt: "### Step 3: Code: `ModelController`\n\nBefore you start coding, we’d like\
    \ to take a minute to recap, look around, and view the forest as well as the trees.\
    \ You have three steps left. The first was setting up the project. The second\
    \ was adjusting your Storyboard. Now you will code step 3, the `ModelController`,\
    \ step 4, the `DataViewController`, and step 5, the `RootViewController`. There\
    \ is a good reason for these three steps, because the Page-Based Application provides\
    \ exactly these three classes: `RootViewController`, `ModelController`, and `DataViewController`.\
    \ You will now spend the rest of this chapter coding these three classes.\n\n\
    **NOTE:** We strongly suggest that when you use the Page-Based Application template\
    \ for your own projects, you *too* divide your project into five steps: first,\
    \ preliminary files allocation; second, Storyboard adjusting; and lastly coding\
    \ the three provided classes.\n\nAn easy way to remember these classes in the\
    \ Page-Based Apps is as follows:\n\n- The `DataViewController` manages the actual\
    \ data and Views you want your user to see.\n- `RootViewController` keeps track\
    \ of current and new Views (pages) requested by your user.\n- `ModelController`\
    \ receives and creates new Views (pages) requested from `RootViewController`.\n\
    \nSo now that you have a refresher on where we’ve been, where we’re at, and where\
    \ we’re going, let’s start coding.\n\n**NOTE:** We’re going to go a little out\
    \ of order and start with the `ModelController` first. The reason for this is\
    \ that if you start building the code in order, `DataViewController` to `RootViewController`\
    \ to `ModelController`, then it will be difficult to test whether the code is\
    \ building correctly. Alternatively, building it in the reverse order as we are\
    \ coding, you can literally press `+B` at the end of every section, and if there\
    \ are no compile errors or warnings you know you’re doing it correctly. Essentially,\
    \ we’re going backwards so that we can test by building as we go.\n\n**Figure\
    \ 5-26.** *Open the `ModelController.m` and set the stage.*\n\n1. You need to\
    \ first reorganize the Xcode windows for coding. First select the `ModelController.m`\
    \ implementation file and then, looking at the right-hand image in Figure 5-26,\
    \ if your Standard editor is on, deselect it by selecting the Assistant editor.\
    \ Keep the `Navigator` on, close the `Debug area`, and deselect the `Utilities\
    \ pane` as shown in Figure 5-26.\n\n**Figure 5-27.** *Your Xcode canvas for coding\
    \ and following along with us.*\n\n2. Once you’ve set the Xcode stage with the\
    \ `ModelController` implementation file on your left pane and its header file\
    \ on your right pane, open up `DemoMonkey` and, depending upon the size of your\
    \ screen, place it at about the same position shown in Figure 5-27.\n\n**Figure\
    \ 5-28.** *Drag in your first snippet from `DemoMonkey`.*\n\n3. We want to add\
    \ a new property called `destinationNumber` because in the travel flyer you’re\
    \ making, you have four possible destinations that you want to see as you’re paging\
    \ through the flyer. As we move forward we will dig deeper into this property.\
    \ For now, start by dragging the “01 ModelController.h – add new property” snippet\
    \ from `demoMonkey` into the header file immediately under the `@interface ModelController`\
    \ line of code as shown in Figure 5-28.\n\n**Figure 5-29.** *A general review\
    \ of how to set out your files.*\n\n4. Before you go too far dragging snippets\
    \ onto the `ModelController.h` file, let’s quickly go over the format we use in\
    \ setting up each page, which is the format we strongly suggest that you adhere\
    \ to. From the top, our public interface, a section for instance variables, properties,\
    \ and then our instance methods at the end. We will call these sections as we\
    \ guide you to where you should place your `DemoMonkey` snippets as shown in Figure\
    \ 5-29. This view, however, is with the Assistant editor. We’ll be switching back\
    \ and forth between the Assistant editor and the Standard editor as shown in Figure\
    \ 5-30.\n\n**Figure 5-30.** *Same header file but now viewed in the Standard editor.*\n\
    \n5. The reason we’re going over this is because, as you know, these screen shots\
    \ are directly from the video, and because we switch between the Assistant and\
    \ Standard editors constantly, you need to be able to recognize them. For example,\
    \ Figure 5-30 shows the same header file shown in Figure 5-29, except we’ve switched\
    \ off the Assistant editor and clicked the Standard editor.\n\n**Figure 5-31.**\
    \ *Open the ModelController implementation file and drag the first of the three\
    \ snippets into the implementation file.*\n\n6. Open the `ModelController.m`.\
    \ You will drag in three snippets.\n\n   - First drag in the “02 ModelController.m\
    \ – add import of pageData object” snippet, which connects the implementation\
    \ file with the class you brought into the project in Figure 5-10. We will dig\
    \ deeper into why we connect it and what the class does, but for now just import\
    \ it as seen on line 12 in Figure 5-31.\n     - Now looking at line 14, right\
    \ after the `/*`, delete the first line of text and replace it with “03 ModelController.m\
    \ – replace one-liner description” just to remind yourself that this is a controller\
    \ object that manages an array, or collection of data objects.\n     - This model\
    \ was originally written to support the number of elements in an array, but that’s\
    \ no longer true for us. We have a fixed value for max pages, so what you will\
    \ do is after adding the property synthesis for the new property you’ve added\
    \ is simply add a definition for the number of pages.\n\n**NOTE:** Another way\
    \ you could have done this would be to make a property getter override with a\
    \ property for the number of pages that would always return the same value.\n\n\
    The reason we chose our method to change the array with `destinationNumber = m_nDestinationNumber;`\
    \ rather than the option described in the nearby gray box is because our method\
    \ is fun and teaches you a couple of really cool techniques to use with Storyboarding:\n\
    \n- We have an anonymous enumeration `enum` that’s not given any name.\n  ```\n\
    \  enum {\n      MAX_PAGES = 4\n  };\n  ```\n- We also work with no instance variables\
    \ tied to this enumeration. Our method abides strictly to the value that we can\
    \ now use by name.\n- It’s similar in a way to creating a `#define` directive\
    \ but it’s not treated as a text substitution by the compiler. Instead, this mechanism\
    \ creates a constant integer value for each name within the `enum`, which means\
    \ we’re showing you a cool way to create a number of unrelated named integer constants\
    \ without using an array and then use them should your application require. In\
    \ our case, we will use only `MAX_PAGES`. But for you, this way frees you and\
    \ opens the door to using this method for your specific purposes in any other\
    \ future applications.\n\nNow go back and do what we’ve outlined with the bullets.\
    \ Start off by adding the property synthesis. Drag in the “04 ModelController.m\
    \ – add property synthesis” snippet and place it directly under `@synthesize pageData\
    \ = _pageData;` as shown in Figure 5-31."
