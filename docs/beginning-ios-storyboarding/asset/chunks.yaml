  trans: '

    6.  为了更好地预览自定义单元格在运行时的视觉效果，可以查看示例图书封面图片。当应用运行时，它会根据 SQLite 数据库中存储的数据为每本书检索图片。但目前，请点击空白的
    Image View，在属性检查器中找到 `Image` 属性，输入 `1.png`，或从 `Supporting Files` 图片文件夹中选择任意其他图片文件名。如果你确实选择了
    `1.png` 文件，那么它看起来应该与图 7-33 所示类似。在属性检查器中，同时将 Image View 的 `Background` 颜色更改为浅灰色，这样即使某些书籍没有图片显示，也能保持可见。


    ![images](img/9781430242727_Fig07-34.jpg)


    **图 7-34.** *将“分类名称”原型单元格连接到新创建的场景。*


    7.  您希望当用户点击父视图控制器（“分类名称”、“全部图书”和“作者名称”单元格）中的一个单元格时，图书列表能显示特定的书籍列表。这意味着您仍然需要从三个父单元格分别连接到新创建的视图控制器场景。选择“分类名称”原型单元格，按住
    Control 键并拖拽至新创建的视图控制器，如图 7-34 所示。释放连线连接器后，从 Storyboard Segues 菜单中选择 `Push`。


    ![images](img/9781430242727_Fig07-35.jpg)


    **图 7-35.** *将“全部图书”单元格连接到新创建的场景。*


    8.  选择“全部图书”单元格，按住 Control 键并拖拽到与上一步相同的视图控制器，如图 7-35 所示。同样将其设置为 `Push` 类型的 Segue。


    ![images](img/9781430242727_Fig07-36.jpg)


    **图 7-36.** *将“作者名称”原型单元格连接到新创建的场景。*


    9.  向下滚动到作者场景，选择“作者名称”单元格，然后按住 Control 键向上拖拽到新创建的视图控制器，如图 7-36 所示。释放连线连接器后，从 Storyboard
    Segues 菜单中选择 `Push` 选项。


    ![images](img/9781430242727_Fig07-37.jpg)


    **图 7-37.** *为每个 Segue 指定唯一标识符。*


    10. 既然已经连接好了 Segue，还需要再完成一步，因为您需要将额外的数据传递给图书列表视图控制器。您需要为每个 Segue 指定一个标识符，以便后续在编写代码时可以访问它们。选择“分类名称”单元格的
    Segue（图 7-37 中的 1a），在属性检查器中，将其 `Identifier` 属性设置为 `ShowCategoryBooks`（图 7-37 中的
    1b）。选择“全部图书”单元格的 Segue（图 7-37 中的 2a），并将其 `Identifier` 设置为 `ShowAllBooks`（图 7-37
    中的 2b）。选择“作者名称”单元格的 Segue（图 7-37 中的 3a），并将 `Identifier` 属性设置为 `ShowAuthorBooks`（图
    7-37 中的 3b）。


    ![images](img/9781430242727_Fig07-38.jpg)


    **图 7-38.** *将“分类”标题更改为“图书”。*


    11. 您可能已经注意到，您的图书列表视图仍然显示标题“分类”，因为这是通过复制“分类”场景并修改而来的。让我们将其更改为与其内容匹配。双击文本并将其替换为
    `Books`，如图 7-38 所示。您也可以删除“全部图书”单元格原型，因为它不适用于此视图控制器（尽管保留它不会造成任何问题；该单元格只是永远不会在这个表格视图中被使用）。


    ![images](img/9781430242727_Fig07-39.jpg)


    **图 7-39.** *修改“作者名称”单元格*


    12. 让我们让作者场景更有趣一些，使每个作者的单元格在末尾显示该作者在数据库中的图书数量。（在现实中，例如，您可以创建一个库存应用，让客户能立即看到库存物品的数量。这些数据将在后端计算并在每个单元格内显示。这一步是一个完美的示例，教您如何实现这一点。）因此，修改“作者名称”单元格。选择它，然后在属性检查器中将
    `Style` 属性从 `Basic` 更改为 `Custom`。同时将一个标签拖到单元格上，将其放置在左侧，如图 7-39 所示。


    ![images](img/9781430242727_Fig07-40.jpg)


    **图 7-40.** *调整两个标签。*


    13. 将第二个标签（用于显示数量）拖到单元格的右侧，如图 7-40 所示。保持选中状态，在属性检查器中将其 `Text` 属性设置为任意数字，以便稍后记住其作用。我们将其设置为
    `5`。此外，将文本右对齐，设置字体为 `System Bold 16.0`，并将字体颜色更改为蓝色。


    ![images](img/9781430242727_Fig07-41.jpg)


    **图 7-41.** *将标签改为“作者”。*


    14. 现在选择您添加的第一个标签，将其宽度调整到能占据数量标签开始之前的所有空间，设置其字体为 `System Bold 20`，并将其文本更改为 `Author
    name`，如图 7-41 所示。

