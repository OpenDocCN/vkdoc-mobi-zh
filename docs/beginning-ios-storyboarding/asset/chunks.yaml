    \n**Figure 8-61.** *Name the outlet _tableView.*\n\n6.  Name the outlet `_tableView`\
    \ as shown in [Figure 8-61](#Chapter08.html#fig_8_61). Click Connect and save\
    \ everything.\n\n![images](images/9781430242727_Fig08-62.jpg)\n\n**Figure 8-62.**\
    \ *Populate the _categories array with the objects from the database*\n\n7.  Open\
