  trans: "\n# 排版后的文本\n\n- 场景 2：复制现有场景。\n  - 场景 2：重命名。\n  - 场景 2：整理图形。\n  - 场景 2：建立连接。\n\
    \    - 场景 2：从按钮按住 Control 键拖拽到新场景。\n    - 场景 2：编辑转场属性。\n\n12. 现在，你会看到一个新的自定义转场连接了两个视图。你可以看到它是自定义的，因为连接两个视图的转场内部包含了\
    \ `{}`，如图 10-39 所示。你需要将正确的类关联到新视图。为此，选择转场，在属性检查器中将转场类命名为 `MovementSegue`，保持样式为“自定义”，并将标识符更改为\
    \ `Right`，如图 10-18 所示。\n\n**注意：** 关于标识符：你需要留意这是一个向右的转场。通过将标识符值设置为 `Right`，自定义转场类可以查看该标识符，知道它要向右、向左还是向前，并选择相应的动画来执行。还记得我们之前提到你的转场是数据驱动的吗？`Right`\
    \ 值就是“驱动”正确动画选择的数据。\n\n![图片](img/9781430242727_Fig10-19.jpg)\n\n**图 10-19.** *你所完成操作的缩略图*\n\
    \n13. 在你彻底迷失之前，先缩小视图看个大概。如图 10-19 所示，你可以看到有一个开场场景和场景 2。场景 2 是迷宫中的下一个位置，你用了四个基本步骤来创建场景\
    \ 2。现在，你将创建场景 3，但将减少手把手的指导和解释。\n\n## 场景 3\n\n![图片](img/9781430242727_Fig10-20.jpg)\n\
    \n**图 10-20.** *复制场景 2 以创建场景 3。*\n\n- 场景 3：复制现有场景。\n- 场景 3：重命名。\n- 场景 3：整理图形。\n\
    - 场景 3：建立连接。\n\n1. 类似于你在 图 10-7 中所做的操作，点击场景 2 的停靠栏，按下 `![图片](img/U003.jpg)+D`\
    \ 键进行复制，然后将副本向右拖拽，如图 10-20 所示。\n\n![图片](img/9781430242727_Fig10-21.jpg)\n\n**图\
    \ 10-21.** *场景 3：选择正确的图片。*\n\n- 场景 3：复制现有场景。\n  - 场景 3：放置在上一个场景的上方或下方。\n- 场景 3：**重命名**。\n\
    \  - 场景 3：更改标题。\n  - 场景 3：更改图片。\n- 场景 3：整理图形。\n- 场景 3：建立连接。\n\n2. 现在，你将开始一个新的约定。你可以向左或向右转。我们把向右的场景放在底部，向左的场景放在顶部（左侧目标场景位于右侧目标场景之上）。因此，从现在开始，将右转放在底部，左转放在顶部。这样，你只需看一眼故事板，就能知道你是要向右还是向左移动。如你在\
    \ 图 10-8 中所做，你需要更改标题——将标题从 `Scene 2` 改为 `Scene 3`，以便记住它是什么。\n\n在此处，将图片更改为 `wanderBoard-cam03.png`，就像你在\
    \ 图 10-10 中所做的一样。这显示在 图 10-21 中。\n\n![图片](img/9781430242727_Fig10-22.jpg)\n\n\
    **图 10-22.** *场景 3：隐藏不适用的元素：选择“左侧按钮”。*\n\n- 场景 3：复制现有场景。\n  - 场景 3：重命名。\n  - 场景\
    \ 3：整理图形。\n    - 场景 3：隐藏不适用的元素。\n  - 场景 3：建立连接。\n\n3. 选择“左侧按钮”，如图 10-22 所示，以便将其隐藏。\n\
    \n![图片](img/9781430242727_Fig10-23.jpg)\n\n**图 10-23.** *场景 3：将选中的“左侧按钮”标记为“隐藏”。*\n\
    \n- 场景 3：复制现有场景。\n  - 场景 3：重命名。\n  - 场景 3：整理图形。\n    - 场景 3：隐藏不适用的元素。\n  - 场景\
    \ 3：建立连接。\n\n4. 选中“左侧按钮”后，勾选“隐藏”选项将其隐藏，如图 10-23 所示。\n\n![图片](img/9781430242727_Fig10-24.jpg)\n\
    \n**图 10-24.** *场景 3：编辑右侧按钮的位置和大小。*\n\n- 场景 3：复制现有场景。\n  - 场景 3：重命名。\n  - 场景 3：整理图形。\n\
    \    - 场景 3：隐藏不适用的元素。\n    - 场景 3：编辑按钮。\n      - 场景 3：使按钮可见。\n    - 场景 3：用新图片替换旧图片（已完成）。\n\
    \    - 场景 3：配置新按钮。\n      - 场景 3：复制按钮。\n      - 场景 3：重置按钮参数。\n      - 场景 3：右侧按钮。\n\
    \    - 场景 3：再次设为透明。\n      - 场景 3：修正 bug。\n  - 场景 3：建立连接。\n\n5. 现在选择“右侧按钮”，并按照你在\
    \ 图 10-9 中的操作使其可见。下一步，你需要让右侧按钮在场景中适当匹配。选中它，并将其设置为 `680,80,80,605`，如图 10-24 所示。按照你在\
    \ 图 10-35 中的操作，再次将其设为透明。最后，按照你在 图 10-15 中的操作，通过将其设置为“触摸时显示高亮”来修正 bug。\n\n**注意：**\
    \ 当某一步骤无需执行时，我 ~~会划掉它~~。\n\n![图片](img/9781430242727_Fig10-25.jpg)\n\n**图 10-25.**\
    \ *连接场景 2：右侧按钮连接到场景 3。*\n"
