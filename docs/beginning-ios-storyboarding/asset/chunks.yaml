- fmt: '# Step 1: Setup


    Setup is the first of the four steps you will follow for this project. You''ll
    create a new iPad Utility Application project, name it `utilityScales`, and adjust
    the project settings by deselecting the portrait and upside-down options. Then
    you''ll drag image, class, and audio assets into the project. Finally, you''ll
    add necessary frameworks. With that completed, you''ll have set up your project
    and will be ready to prep the Storyboard in the second step.


    1.  Open Xcode, press `![images](images/U003.jpg)![images](images/U004.jpg)N`
    (`File ![images](images/U001.jpg) New ![images](images/U001.jpg) Project`), select
    the Utility Application template, and click Next.

    2.  Name the app `utilityScales`. We''ve used a Company Identifier called `com.apress`.
    You can name yours whatever you like, but if you feel there is a chance you will
    need to compare your code to ours at any time, go ahead and name it `com.apress`
    like ours so there will be less chance of confusion. We won''t use a class prefix.
    Make sure to select iPad and check both Use Storyboard and Use ARC as shown in
    [Figure 4-3](#Chapter04.html#fig_4_3). Once created, save it to your desktop.


    ![images](images/9781430242727_Fig04-03.jpg)


    **Figure 4-3.** *Name the new project `utilityScales`.*


    3.  Once you''ve saved it to your desktop, the `Project` folder opens. You''re
    only going to use Landscape orientation because it''s better for displaying the
    neck of the guitar. This means you need to deselect the default Portrait and Upside
    Down orientations. Next, open your `utilityScales Assets` folder that you downloaded
    and unzipped onto your desktop from [`http://bit.ly/sMRvAP`](http://bit.ly/sMRvAP).
    First select the `Default-Landscape~ipad.png` file and drag the image into the
    Landscape slot as shown in [Figure 4-4](#Chapter04.html#fig_4_4).


    ![images](images/9781430242727_Fig04-04.jpg)


    **Figure 4-4.** *Deselect the Portrait and Upside Down options and drag in `Default-Landscape~ipad.png`.*


    4.  You''ll perform two tasks in this step. First move the `Default-Landscape~ipad.png`
    from the root directory of `utilityScales` target iOS SDK 5.0 (the blue folder
    in the upper right-hand corner) to the `Supporting Files` folder. Then add the
    `Images` and `Audio Files` folders into the `Supporting Files` folder. To do this,
    select both the `Audio Files` folder and the `Images` folder from inside the `UtilityScales
    Assets` folder on your desktop and drag and drop them over to the `Supporting
    Files` folder as shown in [Figure 4-5](#Chapter04.html#fig_4_5).


    ![images](images/9781430242727_Fig04-05.jpg)


    **Figure 4-5.** *Place all images into the `Supporting Files` folder.*


    5.  The "Choose options for adding these files" dialog opens. Make sure you select
    the "Copy items into the destination group''s folder (if needed)" option. Also
    select the "Create groups for any added folders" option. Finally make sure you
    "Add targets" as shown in [Figure 4-6](#Chapter04.html#fig_4_6). You do this to
    make sure that it will work on other devices. You can do this only if these images,
    added folders, and targets are all inherent and encapsulated into your app. Sometimes
    students send us their homework without selecting these options, which makes the
    app, upon arrival for grading, void of all the images, folders, audio files, and
    targets—and of course with these missing, their project does not build.


    ![images](images/9781430242727_Fig04-06.jpg)


    **Figure 4-6.** *Make sure you select Copy Items and Create Groups to the `utilityScales`
    target.*


    6.  Make sure that your `Supporting Files` folder looks as our does in [Figure
    4-7](#Chapter04.html#fig_4_7). Because we selected the "groups" option, the `Audio
    Files` and `Images` folders are beautifully instantiated inside the `Supporting
    Files` folder. This is good coding and something that tells those who view your
    code that you have good practices.


    ![images](images/9781430242727_Fig04-07.jpg)


    **Figure 4-7.** *A beautiful file structure.*


    7.  We''ve created three class files for your convenience because we want you
    to focus on Storyboarding, not creating files: an `AudioPlayer` class (`AudioPlayer.h`
    and `AudioPlayer.m`), a `PlayButton` class (`PlayButton.h` and `PlayButton.m`),
    and a `Scale` class (`Scale.h` and `Scale.m`). You want to add this code as well
    to your application. Grab these six files from the `utilityScales Assets` folder
    and drag them to your `utilityScales` folder as shown in on the upper left-hand
    image in [Figure 4-8](#Chapter04.html#fig_4_8). When the "Choose options" dialog
    appears, select "Copy items into destination" and check the "Create groups" check
    boxes. When you have done this, click Next as shown on the upper right-hand image
    in [Figure 4-8](#Chapter04.html#fig_4_8). Finally go to Build Phases, click the
    add button, and select the three implementation files as shown on the lower center
    image in [Figure 4-8](#Chapter04.html#fig_4_8).


    ![images](images/9781430242727_Fig04-08.jpg)


    **Figure 4-8.** *Bring in the class files we''ve created for you.*


    8.  Make sure your `utilityScales` folder looks like ours in [Figure 4-9](#Chapter04.html#fig_4_9).
    If for some reason it doesn''t have the same files and folders, go back and retrace
    your steps, making sure that you get to this point with your `utilityScales` folder
    looking like ours.


    ![images](images/9781430242727_Fig04-09.jpg)


    **Figure 4-9.** *Your `utilityScales` folder ready to go.*


    9.  As you already know, you''ll be playing audio files in this app. Right now
    if you tried to build this app (try it if you like, you''ll see many errors) you''d
    have a problem because you don''t have any means to play audio files—even though
    you''ve defined the class and imported the audio files. You need to add the audio
    framework. Click the Summary button at the top of the editor, look towards the
    bottom of the summary page for the section called "Linked Frameworks and Libraries"
    (you may have to scroll the page to see it). At the bottom of this section, click
    the `[+]` button. Now select the `AudioToolbox.framework` as shown in [Figure
    4-10](#Chapter04.html#fig_4_10).


    ![images](images/9781430242727_Fig04-10.jpg)


    **Figure 4-10.** *Add the first of two necessary frameworks. Select the `AudioToolbox.framework`.*


    10.  Before leaving the frameworks and libraries add dialog, you need to add another
    framework. You''ve just added the audio framework, but it seems you also need
    an Objective-C interface in order to interact with this just included lower-level
    framework from our code. Therefore, also add the `AVFoundation` framework, which
    you call from the code to play audio files. It, in turn, calls the lower level
    `AudioToolbox` framework to do the actual file playing. So select the `AVFoundation.framework`
    in addition to the `AudioToolbox.framework` (by Command-clicking on the `AVFoundation.framework`
    so that both are selected) as shown in [Figure 4-11](#Chapter04.html#fig_4_11).
    Finally, click Add button to add both frameworks to the `utilityScales` target
    of the project.


    ![images](images/9781430242727_Fig04-11.jpg)


    **Figure 4-11.** *Also add the `AVFoundation.framework`.*


    11.  Once you''ve added your two frameworks, you''ll see them located in the root
    directory of the `utilityScales` folder. Drag them into your `Frameworks` folder.
    Now you should have the three core frameworks of a Utility Application, along
    with the new `AVFoundation` and `AudioToolbox` frameworks, as shown in [Figure
    4-12](#Chapter04.html#fig_4_12).


    ![images](images/9781430242727_Fig04-12.jpg)


    **Figure 4-12.** *Move your new frameworks to the `Frameworks` folder.*'
  raw: '### Step 1: Setup


    Setup is the first of the four steps you will follow for this project. You’ll
    create a new iPad Utility Application project, name it utilityScales, and adjust
    the project settings by deselecting the portrait and upside-down options. Then
    you’ll drag image, class, and audio assets into the project. Finally, you’ll add
    necessary frameworks. With that completed, you’ll have set up your project and
    will be ready to prep the Storyboard in the second step.


    1.  Open Xcode, press ![images](images/U003.jpg)![images](images/U004.jpg)`N (`File
    ![images](images/U001.jpg) New ![images](images/U001.jpg) Project), select the
    Utility Application template, and click Next.

    2.  Name the app utilityScales. We’ve used a Company Identifier called com.apress.
    You can name yours whatever you like, but if you feel there is a chance you will
    need to compare your code to ours at any time, go ahead and name it com.apress
    like ours so there will be less chance of confusion. We won’t use a class prefix.
    Make sure to select iPad and check both Use Storyboard and Use ARC as shown in
    [Figure 4-3](#Chapter04.html#fig_4_3). Once created, save it to your desktop.


    ![images](images/9781430242727_Fig04-03.jpg)


    **Figure 4-3.** *Name the new project utilityScales.*


    3.  Once you’ve saved it to your desktop, the `Project` folder opens. You’re only
    going to use Landscape orientation because it''s better for displaying the neck
    of the guitar. This means you need to deselect the default Portrait and Upside
    Down orientations. Next, open your `utilityScales Assets` folder that you downloaded
    and unzipped onto your desktop from [`http://bit.ly/sMRvAP`](http://bit.ly/sMRvAP).
    First select the `Default-Landscape~ipad.png` file and drag the image into the
    Landscape slot as shown in [Figure 4-4](#Chapter04.html#fig_4_4).


    ![images](images/9781430242727_Fig04-04.jpg)


    **Figure 4-4.** *Deselect the Portrait and Upside Down options and drag in Default-Landscape~ipad.png.*


    4.  You’ll perform two tasks in this step. First move the `Default-Landscape~ipad.png`
    from the root directory of `utilityScales` target iOS SDK 5.0 (the blue folder
    in the upper right-hand corner) to the `Supporting Files` folder. Then add the
    `Images` and `Audio Files` folders into the `Supporting Files` folder. To do this,
    select both the `Audio Files` folder and the `Images` folder from inside the `UtilityScales
    Assets` folder on your desktop and drag and drop them over to the `Supporting
    Files` folder as shown in [Figure 4-5](#Chapter04.html#fig_4_5).


    ![images](images/9781430242727_Fig04-05.jpg)


    **Figure 4-5.** *Place all images into the Supporting Files folder.*


    5.  The “Choose options for adding these files” dialog opens. Make sure you select
    the “Copy items into the destination group''s folder (if needed)” option. Also
    select the “Create groups for any added folders” option. Finally make sure you
    “Add targets” as shown in [Figure 4-6](#Chapter04.html#fig_4_6). You do this to
    make sure that it will work on other devices. You can do this only if these images,
    added folders, and targets are all inherent and encapsulated into your app. Sometimes
    students send us their homework without selecting these options, which makes the
    app, upon arrival for grading, void of all the images, folders, audio files, and
    targets—and of course with these missing, their project does not build.


    ![images](images/9781430242727_Fig04-06.jpg)


    **Figure 4-6.** *Make sure you select Copy Items and Create Groups to the utilityScales
    target.*


    6.  Make sure that your `Supporting Files` folder looks as our does in [Figure
    4-7](#Chapter04.html#fig_4_7). Because we selected the “groups” option, the `Audio
    Files` and `Images` folders are beautifully instantiated inside the `Supporting
    Files` folder. This is good coding and something that tells those who view your
    code that you have good practices.


    ![images](images/9781430242727_Fig04-07.jpg)


    **Figure 4-7.** *A beautiful file structure.*


    7.  We’ve created three class files for your convenience because we want you to
    focus on Storyboarding, not creating files: an `AudioPlayer` class (`AudioPlayer.h`
    and `AudioPlayer.m`), a `PlayButton` class (`PlayButton.h` and `PlayButton.m`),
    and a `Scale` class (`Scale.h` and `Scale.m`). You want to add this code as well
    to your application. Grab these six files from the `utilityScales Assets` folder
    and drag them to your `utilityScales` folder as shown in on the upper left-hand
    image in [Figure 4-8](#Chapter04.html#fig_4_8). When the “Choose options” dialog
    appears, select “Copy items into destination” and check the “Create groups” check
    boxes. When you have done this, click Next as shown on the upper right-hand image
    in [Figure 4-8](#Chapter04.html#fig_4_8). Finally go to Build Phases, click the
    add button, and select the three implementation files as shown on the lower center
    image in [Figure 4-8](#Chapter04.html#fig_4_8).


    ![images](images/9781430242727_Fig04-08.jpg)


    **Figure 4-8.** *Bring in the class files we’ve created for you.*


    8.  Make sure your `utilityScales` folder looks like ours in [Figure 4-9](#Chapter04.html#fig_4_9).
    If for some reason it doesn’t have the same files and folders, go back and retrace
    your steps, making sure that you get to this point with your `utilityScales` folder
    looking like ours.


    ![images](images/9781430242727_Fig04-09.jpg)


    **Figure 4-9.** *Your utilityScales folder ready to go.*


    9.  As you already know, you’ll be playing audio files in this app. Right now
    if you tried to build this app (try it if you like, you''ll see many errors) you’d
    have a problem because you don’t have any means to play audio files—even though
    you’ve defined the class and imported the audio files. You need to add the audio
    framework. Click the Summary button at the top of the editor, look towards the
    bottom of the summary page for the section called “Linked Frameworks and Libraries”
    (you may have to scroll the page to see it). At the bottom of this section, click
    the [+] button. Now select the `AudioToolbox.framework` as shown in [Figure 4-10](#Chapter04.html#fig_4_10).


    ![images](images/9781430242727_Fig04-10.jpg)


    **Figure 4-10.** *Add the first of two necessary frameworks. Select the AudioToolbox.framework.*


    10.  Before leaving the frameworks and libraries add dialog, you need to add another
    framework. You’ve just added the audio framework, but it seems you also need an
    Objective-C interface in order to interact with this just included lower-level
    framework from our code. Therefore, also add the `AVFoundation` framework, which
    you call from the code to play audio files. It, in turn, calls the lower level
    `AudioToolbox` framework to do the actual file playing. So select the `AVFoundation.framework`
    in addition to the `AudioToolbox.framework` (by Command-clicking on the `AVFoundation.framework`
    so that both are selected) as shown in [Figure 4-11](#Chapter04.html#fig_4_11).
    Finally, click Add button to add both frameworks to the utilityScales target of
    the project.


    ![images](images/9781430242727_Fig04-11.jpg)


    **Figure 4-11.** *Also add the AVFoundation.framework.*


    11.  Once you’ve added your two frameworks, you’ll see them located in the root
    directory of the `utilityScales` folder. Drag them into your `Frameworks` folder.
    Now you should have the three core frameworks of a Utility Application, along
    with the new `AVFoundation` and `AudioToolbox` frameworks, as shown in [Figure
    4-12](#Chapter04.html#fig_4_12).


    ![images](images/9781430242727_Fig04-12.jpg)


    **Figure 4-12.** *Move your new frameworks to the Frameworks folder.*'
  trans: '

    # 步骤 1：项目设置


    项目设置是本项目四个步骤中的第一步。你需要创建一个新的 iPad 实用工具应用项目，将其命名为 `utilityScales`，并通过取消选中竖屏和上下颠倒选项来调整项目设置。接着，你需要将图片、类和音频资源拖入项目中。最后，你需要添加必要的框架。完成这些操作后，你的项目设置就完成了，可以准备在第二步中编辑故事板。


    1.  打开 Xcode，按下 `![images](img/U003.jpg)![images](img/U004.jpg)N`（`文件 ![images](img/U001.jpg)新建
    ![images](img/U001.jpg)项目`），选中“实用工具应用”模板，然后点击“下一步”。

    2.  将应用命名为 `utilityScales`。我们使用的公司标识符是 `com.apress`。你可以随意命名，但如果你觉得可能需要随时与我们的代码进行对比，那么也请像我们一样将其命名为
    `com.apress`，这样可以减少混淆的可能性。我们不会使用类前缀。确保选中“iPad”，并勾选“使用故事板”和“使用 ARC”，如图 4-3 所示。创建完成后，将其保存到你的桌面上。


    ![images](img/9781430242727_Fig04-03.jpg)


    **图 4-3.** *将新项目命名为 `utilityScales`。*


    3.  将其保存到桌面后，`Project` 文件夹就会打开。你只会使用横屏方向，因为这更有利于显示吉他的琴颈。这意味着你需要取消选中默认的竖屏和上下颠倒方向。接下来，打开你从
    [`http://bit.ly/sMRvAP`](http://bit.ly/sMRvAP) 下载并解压到桌面上的 `utilityScales Assets`
    文件夹。首先选中 `Default-Landscape~ipad.png` 文件，并将其拖入“横屏”插槽中，如图 4-4 所示。


    ![images](img/9781430242727_Fig04-04.jpg)


    **图 4-4.** *取消选中竖屏和上下颠倒选项，并拖入 `Default-Landscape~ipad.png`。*


    4.  在这一步中，你需要执行两个任务。首先，将 `Default-Landscape~ipad.png` 从 `utilityScales` 目标 iOS
    SDK 5.0 的根目录（右上角的蓝色文件夹）移动到 `Supporting Files` 文件夹中。然后，将 `Images` 和 `Audio Files`
    文件夹添加到 `Supporting Files` 文件夹中。为此，从桌面上的 `UtilityScales Assets` 文件夹中同时选中 `Audio
    Files` 文件夹和 `Images` 文件夹，然后将它们拖放到 `Supporting Files` 文件夹中，如图 4-5 所示。


    ![images](img/9781430242727_Fig04-05.jpg)


    **图 4-5.** *将所有图片放入 `Supporting Files` 文件夹。*


    5.  会弹出“选择添加这些文件的选项”对话框。确保你选中了“将项目复制到目标组的文件夹中（如果需要）”选项。同时选中“为添加的文件夹创建组”选项。最后，确保你添加了目标，如图
    4-6 所示。这样做的目的是确保应用能在其他设备上运行。只有将这些图片、添加的文件夹和目标都内嵌并封装到你的应用中时，才能执行此操作。有时，学生在提交作业时没有选中这些选项，这会导致在提交评分时，应用丢失所有图片、文件夹、音频文件以及目标——当然，由于缺少这些内容，他们的项目也无法构建。


    ![images](img/9781430242727_Fig04-06.jpg)


    **图 4-6.** *确保你选中了“复制项目”和“创建组”到 `utilityScales` 目标。*


    6.  确保你的 `Supporting Files` 文件夹看起来与图 4-7 中所示一致。由于我们选中了“组”选项，`Audio Files` 和 `Images`
    文件夹被完美地实例化在 `Supporting Files` 文件夹中。这是良好的编码习惯，并且能向查看你代码的人表明你具有良好的实践。


    ![images](img/9781430242727_Fig04-07.jpg)


    **图 4-7.** *一个美观的文件结构。*


    7.  为了方便你操作，我们创建了三个类文件（因为我们希望你将重点放在故事板编辑上，而不是创建文件上）：一个 `AudioPlayer` 类（`AudioPlayer.h`
    和 `AudioPlayer.m`）、一个 `PlayButton` 类（`PlayButton.h` 和 `PlayButton.m`）和一个 `Scale`
    类（`Scale.h` 和 `Scale.m`）。你也需要将这些代码添加到你的应用中。从 `utilityScales Assets` 文件夹中获取这六个文件，并将其拖到你的
    `utilityScales` 文件夹中，如图 4-8 左上角图片所示。当“选择选项”对话框出现时，选中“将项目复制到目标”并勾选“创建组”复选框。完成此操作后，点击“下一步”，如图
    4-8 右上角图片所示。最后，进入“构建阶段”，点击添加按钮，并选中三个实现文件，如图 4-8 下方中央图片所示。


    ![images](img/9781430242727_Fig04-08.jpg)


    **图 4-8.** *导入我们为你创建的类文件。*


    8.  确保你的 `utilityScales` 文件夹看起来与图 4-9 中所示一致。如果出于某种原因，它没有包含相同的文件和文件夹，请返回并重做之前的步骤，确保你的
    `utilityScales` 文件夹最终状态与我们的一致。


    ![images](img/9781430242727_Fig04-09.jpg)


    **图 4-9.** *你的 `utilityScales` 文件夹已准备就绪。*


    9.  正如你已经知道的，你将在此应用中播放音频文件。现在，如果你尝试构建此应用（如果你愿意，可以试试，你会看到很多错误），你会遇到问题，因为你没有任何播放音频文件的手段——即使你已经定义了类并导入了音频文件。你需要添加音频框架。点击编辑器顶部的“摘要”按钮，在摘要页面的底部附近找到“链接的框架和库”部分（你可能需要滚动页面才能看到）。在此部分的底部，点击
    `[+]` 按钮。现在，选择 `AudioToolbox.framework`，如图 4-10 所示。


    ![images](img/9781430242727_Fig04-10.jpg)


    **图 4-10.** *添加两个必要框架中的第一个。选择 `AudioToolbox.framework`。*


    10. 在离开框架和库添加对话框之前，你需要添加另一个框架。你刚刚添加了音频框架，但看起来你还需要一个 Objective-C 接口，以便从我们的代码中与刚刚包含的这个底层框架进行交互。因此，还要添加
    `AVFoundation` 框架，你会从代码中调用它来播放音频文件。它进而调用更低层的 `AudioToolbox` 框架来执行实际的播放操作。因此，除了
    `AudioToolbox.framework` 之外，还要选择 `AVFoundation.framework`（通过按住 Command 键点击 `AVFoundation.framework`，使两者都被选中），如图
    4-11 所示。最后，点击“添加”按钮，将这两个框架都添加到项目的 `utilityScales` 目标中。


    ![images](img/9781430242727_Fig04-11.jpg)


    **图 4-11.** *同时添加 `AVFoundation.framework`。*


    11. 添加完这两个框架后，你会看到它们位于 `utilityScales` 文件夹的根目录中。将它们拖入你的 `Frameworks` 文件夹。现在，你应该拥有实用工具应用的三个核心框架，以及新增的
    `AVFoundation` 和 `AudioToolbox` 框架，如图 4-12 所示。


    ![images](img/9781430242727_Fig04-12.jpg)


    **图 4-12.** *将新框架移至 `Frameworks` 文件夹。*

