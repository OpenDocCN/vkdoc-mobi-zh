  trans: "\n#### 第 2 步：将信息从辅助视图（外星视图）传回主视图\n\n在这一步中，我们将展示将信息从辅助视图传回主视图的典型模式。最常见的做法是将通信描述为一个协议，并让主视图设置为辅助视图的委托。我们来看看具体如何实现。\n\
    \n![images](img/9781430242727_Fig02-12.jpg)\n\n**图 2-12.** *将一个标签拖到主视图上。*\n\n\
    1. 当从外星视图传回结果时，你需要某种方式来显示结果已返回。你将在主视图上显示文本，并根据返回的值进行更改。添加一个标签，用于指示外星人是否存在。将一个标签拖到按钮下方的主视图上。将其居中，将文本颜色设置为白色，并在文本框内输入`Status\
    \ will appear here`，如图 2-12 所示。\n\n![images](img/9781430242727_Fig02-13.jpg)\n\
    \n**图 2-13.** *从标签按住 Control 键拖到 `ViewController.h`。*\n\n2. 为了能够通过代码设置标签文本，你需要与此新标签建立连接。让我们创建标签的\
    \ `IBOutlet`（你的连接）。打开助理编辑器（其图标位于图 2-13 的白色圆圈内），并确保它将`ViewController.h`文件关联到了分屏视图的右侧窗格。从标签按住\
    \ Control 键拖到`ViewController.h`文件，直接放置在`@interface ViewController`行下方，如图 2-13\
    \ 所示。\n\n![images](img/9781430242727_Fig02-14.jpg)\n\n**图 2-14.** *从标签按住 Control\
    \ 键拖到 `ViewController.h`。*\n\n3. 将连接器放入`ViewController.h`文件后，会出现一个连接对话框。保持此连接类型为\
    \ Outlet，并将其命名为`lblFindStatus`。（`lbl`前缀提醒你有一个标签连接到了此输出口。）此对话框如图 2-14 所示。\n\n![images](img/9781430242727_Fig02-15.jpg)\n\
    \n**图 2-15.** *添加一个新的视图控制器子类。*\n\n4. 现在你需要为外星视图的视图控制器添加自定义代码。通过创建一个新的派生视图控制器类来实现这一点。在项目导航器中选择`helloAlien`组（这样新文件就会放置在此组内）。按`+N`键并选择\
    \ Objective-C 类选项，如图 2-15 左侧所示。点击“下一步”后，将新类命名为`AlienViewController`，选择`UIViewController`子类选项，如图\
    \ 2-15 右侧所示，然后点击“下一步”。不要更改任何选项——直接保存。注意，这两个新文件（`AlienViewController.h`和`.m`）被放置在`Supporting\
    \ Files`组下方。将它们拖回到该组上方，使其与其他文件显示在一起。\n\n![images](img/9781430242727_Fig02-16.jpg)\n\
    \n**图 2-16.** *分配新的详细视图。*\n\n5. 你需要将刚创建的`AlienViewController`类分配给你的外星视图。返回到 Storyboard\
    \ 文件并选择外星视图——但这里需要精确操作。在文档大纲导航器中，找到“视图控制器 – 外星视图场景 视图控制器 – 外星视图”并点击选择它。正确选中后，在实用工具区域的标识检查器中，在“自定义类”区域选择类`AlienViewController`，如图\
    \ 2-16 所示。\n\n**注意：** 在本章的剩余部分，你将像苹果开发者在 WWDC 等会议的舞台上那样操作。我们将一边描述你在做什么，一边将代码片段拖入你的项目中。这样做旨在为你节省大量时间（因为你无需手动输入代码），同时让你有机会在每次拖放操作中学习代码。首先，打开你随已放入项目的图片一起下载的\
    \ DemoMonkey 文件。找到名为`Chapter2.demoMonkey`的文件，然后继续下一页。\n\n![images](img/9781430242727_Fig02-17.jpg)\n\
    \n**图 2-17.** *打开 DemoMonkey。*\n\n6. 打开`Chapter2.demoMonkey`文件。窗口初始时非常小，如图 2-17\
    \ 所示。只需抓住一角并拉伸窗口，使各行代码可见。\n\n![images](img/9781430242727_Fig02-18.jpg)\n\n**图\
    \ 2-18.** *展开 DemoMonkey 窗口并将其放置在侧面。*\n\n7. 在图 2-18 中，你可以看到我们将 DemoMonkey 文件放置在\
    \ Xcode 窗口的右侧，并拉伸了它，以便可以看到各行代码。根据你的显示分辨率，有些代码行可能位于屏幕底部之外。如果是这样，当你需要查看这些屏幕外的行时，请滚动\
    \ DemoMonkey 窗口。\n\n![images](img/9781430242727_Fig02-19.jpg)\n\n**图 2-19.** *将转场命名为\
    \ `ShowAlienView`。*\n\n8. 为了让代码知道正在发生哪个转场，请为每个转场命名。代码随后可以根据此名称判断发生了哪个转场，并针对该命名转场执行相应的操作。要命名转场，请点击转场箭头中间的圆圈图标来选择它，然后在实用工具区域中选择属性检查器，如图\
    \ 2-19 所示。点击标识符文本框，然后将“01 segueName” DemoMonkey 代码片段拖到标识符文本框中并放下。名称`ShowAlienView`会出现在标识符框中。\n\
    \n![images](img/9781430242727_Fig02-20.jpg)\n\n**图 2-20.** *创建委托协议的前向声明。*\n\n\
    9. 你将使用委托协议来与主视图的控制器进行通信。那么，现在我们来创建它：\n\n   1. 打开`AlienViewController.h`文件，通过将“02\
    \ AlienVC.h - protocol forward declaration”代码片段拖到`#import <UIKit/UIKit.h>`行下方，插入新协议的名称声明。\n\
    \   2. 通过将“03 AlienVC.h - delegate property”代码片段拖到`@interface AlienViewController\
    \ : UIViewController`行下方，添加你的委托属性。\n   3. 为你的`AlienViewControllerDelegate`协议创建一个定义。通过将“04\
    \ AlienVC.h - protocol definition”拖放到接口的`@end`行之后（文件末尾），如图 2-20 所示。\n\n![images](img/9781430242727_Fig02-21.jpg)\n\
    \n**图 2-21.** *合成 AlienViewController 的委托属性。*\n\n10. 快速回顾：你已经声明了协议，并声明了引用必须符合此协议对象的委托属性。现在你需要合成委托属性。为此，首先打开`AlienViewController.m`文件，然后将“05\
    \ AlienVC.m - synthesize delegate”拖放到`@implementation AlienViewController`行下方，如图\
    \ 2-21 所示。\n\n**注意：** 在 Xcode 中，*合成*意味着生成代码。在这里，你正在为你的委托属性生成设置器和获取器。`@synthesize`指令的目的是为编码人员节省工作，因为我们不再需要为我们创建的每个属性编写设置器和获取器方法。\n\
    \n![images](img/9781430242727_Fig02-22.jpg)\n\n**图 2-22.** *使主视图控制器遵循 `AlienViewControllerDelegate`\
    \ 协议。*\n"
- fmt: "11.  You now want to make sure that the `ViewController` adheres to the `AlienViewControllerDelegate`\
    \ protocol you’ve just created. To do that, first open the `ViewController.h`\
    \ file and drag “06 VC.h - import AlienVC header” to just below the `#import <UIKit/UIKit.h>`\
    \ line. Now you need to add `@interface ViewController : UIViewController` onto\
    \ the protocol conformance declaration by dragging “07 VC.h - show that adheres\
    \ to protocol” as shown in [Figure 2-22](#Chapter02.html#fig_2_22).\n\n![images](images/9781430242727_Fig02-23.jpg)\n\
    \n**Figure 2-23.** *Select Jump to Definition.*\n\n12.  Next add the new protocol\
    \ method to the code. Copy the method signature directly from the protocol declaration\
    \ so you get it exactly correct. Click the protocol name (found in the `< >` brackets)\
    \ and then select the right-mouse menu item Jump to Definition to jump directly\
    \ to your new protocol. (Note you may have to build (press ![images](images/U003.jpg)`+B)`\
    \ the code once to get this name recognized.)\n\n**NOTE:** Why did we use this\
    \ Jump to Definition technique? Because you have to learn about a very large number\
    \ of protocols and object interfaces when writing code for iOS. The best way to\
    \ learn is to refresh what you know about a protocol or interface each time you\
    \ use it. By going directly to the protocol declaration, you get a chance to remind\
    \ yourself of the other methods declared to be part of the protocol. See? Continuous\
    \ training as you work!\n\nIf you’ve been around in the code business for a while,\
    \ did you notice that you don’t have to know which file the protocol is declared\
    \ in? Xcode found it for you automatically. Thank you, Xcode (and the developers\
    \ who built it)!\n\n![images](images/9781430242727_Fig02-24.jpg)\n\n**Figure 2-24.**\
    \ *Grab the method from the protocol.*\n\n13.  Now select and copy the signature\
    \ of the `alien:saysIAmHere:` method as shown in [Figure 2-24](#Chapter02.html#fig_2_24)\
    \ (the code you’re grabbing is highlighted).\n\n**NOTE:** Did you notice the `@required`\
    \ directive just above the method line you’re copying? That means any object that\
    \ indicates it conforms to your delegate protocol (in this case, the `ViewController`)\
    \ *must* have implemented the method `alien:saysIAmHere:`. When you state `@required`\
    \ in your protocol definition, and you state in another class that you conform\
    \ to the protocol, the compiler generates an error when you haven’t yet implemented\
    \ one or more of the `@required` methods of the protocol. This helps ensure that\
    \ you’ve written all the code you minimally need to handle the protocol.\n\n![images](images/9781430242727_Fig02-25.jpg)\n\
    \n**Figure 2-25.** *Paste the delegate method.*\n\n14.  Continuing with the creation\
    \ of the delegate protocol method: Go back to the `ViewController.m` file. Paste\
    \ the method you just copied right before the `@end` as shown in [Figure 2-25](#Chapter02.html#fig_2_25).\
    \ Add the curly braces in place of the semicolon and add the code from “08 VC.m\
    \ - protocol-method content” inside these braces that tells you a message (writes\
    \ text to your new label) when the Alien is found. We happen to say `Status: whoa,\
    \ found aliens!` but you of course can insert anything you want. The new method\
    \ now looks like this:\n\n```\n-(void)alien:(AlienViewController *)view saysIAmHere:(BOOL)bIsHere\n\
    {\n    self.lblFindStatus.text = (bIsHere) ? @\"Status: whoa, found aliens!\"\
    \ :\n    @\"Status: no aliens found\";\n}\n```\n\n**NOTE** This code simply places\
    \ one of two messages into the onscreen label depending on the state of the parameter\
    \ `bIsHere`. Notice too that you’re writing this message text to the `.text` property\
    \ of the User Interface object, which you know should be a label due to the `lbl`\
    \ prefix of the name.\n\n15.  You have the segue name `ShowAlienView` and you\
    \ have added the delegate protocol method to `ViewController` so that it knows\
    \ what to do when the Alien View tells it whether an Alien is present. But now\
    \ you need to initialize the displayed text when the application first starts\
    \ to say that you’ve not found an Alien yet. So, staying in the `ViewController.m`\
    \ file, go to the `viewDidLoad` method and drag in another line of code “09 VC.m\
    \ - ViewDidLoad content” so the method now looks as follows:\n\n```\n- (void)viewDidLoad\n\
    {\n    [super viewDidLoad];\n    [self alien:nil saysIAmHere:NO];\n}\n```\n\n\
    **NOTE** This code invokes the same new protocol method, but within `ViewController`,\
    \ not from `AlienViewController`. You’re not the `AlienViewController` so pass\
    \ `nil` as the first parameter, and the state you initially want is “NO alien\
    \ found,” so pass `NO` as the second parameter. Conveniently, the `viewDidLoad`\
    \ method happens once when you first start the application, so the onscreen label\
    \ is set as you need, when you first see it.\n\n![images](images/9781430242727_Fig02-26.jpg)\n\
    \n**Figure 2-26.** *Add prepareForSegue method.*\n\n16.  Now you need to tell\
    \ the `AlienViewController` that `ViewController` can handle data it sends to\
    \ its delegate. Do this by telling the `AlienViewController` that `ViewController`\
    \ is the delegate. The `prepareForSegue` method exists just so you can do things\
    \ like this. Let’s add a `prepareForSegue` method and set the `AlienViewController`\
    \ delegate property. Dragging “10 VC.m - prepareForSegue method” to just under\
    \ `shouldAutorotateTo`...: yields:\n\n```\n- (void)prepareForSegue:(UIStoryboardSegue\
    \ *)segue sender:(id)sender\n{\n    if ([[segue identifier] isEqualToString:@\"\
    ShowAlienView\"]) {\n        [[segue destinationViewController] setDelegate:self];\n\
    \    }\n}\n```\n\n**NOTE:** This method first checks to see whether the segue\
    \ is the one you want (`ShowAlienView`). If it is, you set the destination view’s\
    \ delegate property to `self` (this `ViewController` instance). Now when the destination\
    \ view appears and wants to pass information to the delegate by invoking the `alien:saysIAmHere:`\
    \ method, the matching method in `ViewController` is invoked which then sets your\
    \ label text.\n\n![images](images/9781430242727_Fig02-27.jpg)\n\n**Figure 2-27.**\
    \ *Set initial state of switch to Off.*\n\n17.  You now have the segue named `ShowAlienView`\
    \ setting the delegate property to the `ViewController` instance so that it can\
    \ display alien-exists statuses. But our Alien needs to be able to tell you that\
    \ it exists! So how about a simple “exist” switch? Go add a switch to the Alien\
    \ View along with a description label. Open the Storyboard file, select the Alien\
    \ View Controller Scene, and drag a switch onto the Alien View. Set the Switch\
    \ State to Off as shown in [Figure 2-27](#Chapter02.html#fig_2_27).\n\n![images](images/9781430242727_Fig02-28.jpg)\n\
    \n**Figure 2-28.** *Left-aligned with white text*\n\n18.  You also need instructional\
    \ text, so drag a label onto the canvas to the left of the switch. Make it left-aligned,\
    \ set the Text Color to white, and set the Text to *Can I be seen?* as shown in\
    \ [Figure 2-28](#Chapter02.html#fig_2_28).\n\n![images](images/9781430242727_Fig02-29.jpg)\n\
    \n**Figure 2-29.** *Add an IBAction for the switch.*\n\n![images](images/9781430242727_Fig02-30.jpg)\n\
    \n**Figure 2-30.** *Name the IBAction method onSwitchValueChanged.*\n\n19.  Now\
    \ you need to add an `IBAction` method for the switch. Open the Assistant Editor\
    \ and make sure the `AlienViewController.h` file is to the right of the Alien\
    \ View. Control-drag from the switch to the blank line after the delegate property\
    \ as shown in [Figure 2-29](#Chapter02.html#fig_2_29). Select Action from the\
    \ Connection drop-down and enter the name *onSwitchValueChanged* as shown in [Figure\
    \ 2-30](#Chapter02.html#fig_2_30).\n\n![images](images/9781430242727_Fig02-31.jpg)\n\
    \n**Figure 2-31.** *Create a variable to hold the value of the switch.*"
