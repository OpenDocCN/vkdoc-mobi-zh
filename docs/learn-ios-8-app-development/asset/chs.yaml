- "# 为我画一幅画\n\n你已经到达了掌握 iOS 开发的一个关键点。在向应用添加现有视图对象方面，你已积累了相当丰富的经验。你让它们显示你的数据，将它们连接到你的自定义控制器逻辑，并自定义了它们的外观和感觉。但你仍然局限于苹果为你编写的视图类。没有什么可以替代创建你自己的视图对象——一个能够绘制出别人未曾想象过的东西的对象。\n\
  \n好吧，这话不完全正确。你确实创建过自定义视图对象，但在这两种情况下，我都忽略了它们是如何工作的。相反，只附带了一条小注释：“请忽略幕后的视图；一切将在第 11\
  \ 章中解释。”欢迎来到第 11 章！在本章中，你将（更多地）了解以下内容：\n\n*   创建视图子类\n*   视图几何学\n*   视图的绘制方式与时机\n\
  *   Core Graphics\n*   Bézier 路径\n*   动画\n*   手势识别器\n*   离屏绘制\n\n本章会有点技术性，但我认为你已经准备好了。\n\
  \n### 创建自定义视图类\n\n你可以通过继承 `UIView` 或 `UIControl` 来创建自定义视图，具体取决于你的意图是创建一个显示对象，还是创建一个类似于控件（例如一种新型开关）的东西。在本章中，你只会继承\
  \ `UIView`。\n\n**警告** 不要为了“摆弄” `UIButton` 或 `UISwitch` 等具体视图类的功能而去继承它们。这将是灾难的根源。它们的内部工作机制并未公开，并且经常随\
  \ iOS 版本更新而改变，这意味着你的类可能在不久的将来就无法正常工作。设计用于被继承的视图类，如 `UIControl`，都有清晰的文档说明，通常在其文档中有一个名为“Subclassing\
  \ Notes”的章节。\n\n要创建你自己的视图类，你需要理解三点。\n\n*   视图坐标系\n*   用户界面更新事件\n*   如何在 Core Graphics\
  \ 上下文中进行绘制\n\n让我们从字面上理解——从顶部开始。\n\n#### 视图坐标\n\n设备的屏幕、窗口和视图都有一个图形*坐标系*。坐标系确定了你在设备上看到的一切物体（屏幕、窗口、视图、图像和形状）的位置和大小。每个视图对象都有自己的坐标系。坐标系的远点位于其左上角，坐标为\
  \ (0,0)，如图 11-1 所示。\n\n![9781484202098_Fig11-01.jpg](img/9781484202098_Fig11-01.jpg)\n\
  \n图 11-1. 图形坐标系\n\nX 坐标向右增加，Y 坐标向下增加。Y 轴与你上学时学到的（或者闲暇时阅读几何书了解的）笛卡尔坐标系是上下颠倒的。对于计算机程序来说，这种排列更方便；大多数内容从左上角“流动”，因此从左上角进行计算通常比从左下角计算更简单。\n\
  \n**注意** 如果你做过任何 OS X 编程，你会注意到 iOS 和 OS X 的视图对象有很多相似之处。然而，从 OS X 的角度来看，iOS 没有翻转坐标——它们始终是翻转的。\n\
  \n在 iOS 中，有四种用于描述坐标、位置、大小和区域的关键类型，全部在表 11-1 中进行了描述。\n\n表 11-1. 坐标值类型\n\n| 类型 | 描述\
  \ |\n| --- | --- |\n| `CGFloat` | 基本的标量值。`CGFloat` 是一种浮点类型，用于表示单个坐标或距离。 |\n| `CGPoint`\
  \ | 一对 `CGFloat` 值，用于指定坐标系中的一个点 (`x`,`y`)。 |\n| `CGSize` | 一对 `CGFloat` 值，用于描述某物的尺寸\
  \ (`width`,`height`)。 |\n| `CGRect` | 一个点 (`CGPoint`) 和一个尺寸 (`CGSize`) 的组合，共同描述一个矩形区域。\
  \ |\n\n#### 框架与边界\n\n视图对象有两个矩形 (`CGRect`) 属性：`bounds` 和 `frame`。`bounds` 属性描述了对象的坐标系。该视图的所有图形内容（包括任何子视图）都使用此坐标系。真正重要的是要理解，视图内容的所有绘制都是由该视图自身执行的，并且是使用该视图的坐标系来完成的——这通常被称为其*局部坐标*。\n\
  \n\n\n#### 移动视图\n\n在视图中移动视图（在其父视图内）不会改变视图的坐标系。该视图对象内的所有图形元素相对于其原点（左上角）保持位置不变。在图\
  \ 11-1 中，子视图尺寸为宽 160 点、高 50 点。因此，其`bounds`矩形为`((0,0),(160,50))`；原点坐标(x,y)为`(0,0)`，尺寸(宽度,高度)为`(160,50)`。当子视图进行绘制时，它会在该矩形范围内进行。\n\
  \n`frame`属性以父视图的坐标系来描述视图。换句话说，`frame`表示子视图在另一个视图中的位置——通常称为*父视图坐标*。在图 11-1 中，子视图的原点为`(20,60)`。视图尺寸为`(160,50)`，因此其`frame`为`((20,60),(160,50))`。如果视图向下移动\
  \ 10 点，其`frame`将变为`((20,70),(160,50))`。视图绘制的一切内容都会向下移动 10 点，但这不会改变视图的`bounds`或视图内部绘制内容的相对坐标。\n\
  \n`bounds`与`frame`的尺寸是关联的。改变`frame`的尺寸会改变其`bounds`的尺寸，反之亦然。若图 11-1 中子视图的`frame`变窄\
  \ 60 点，其`frame`将变为`((20,60),(100,50))`。这一变化会使其`bounds`变为`((0,0),(100,50))`。同样地，若`bounds`从`((0,0),(160,50))`改为`((0,0),(100,40))`，则`frame`会自动变为`((20,60),(100,40))`。\n\
  \n**注意**  “`frame`的尺寸始终等于`bounds`的尺寸”这一规则存在少数例外。你已见过一个例外：滚动视图。滚动视图内容（`bounds`）的尺寸由其`contentSize`属性控制，该属性独立于其帧尺寸（即屏幕显示部分）。其他例外发生在应用变换时，我将在后文讨论。\n\
  \n`UIView`还提供了一个合成的`center`属性。该属性返回视图`frame`矩形的中心点。从技术上讲，`center`始终等于`(frame.midX,\
  \ frame.midY)`。若改变`center`属性，视图的`frame`将被移动，使其居中于该点。`center`属性便于在不调整尺寸的情况下移动和居中子视图。你将在本章后续内容中使用此功能。\n\
  \n#### 坐标系转换\n\n你可能需要一段时间——我当年也花了很久——才能掌握不同坐标系的区别，并学会何时使用`bounds`、何时使用`frame`，以及如何在两者之间转换。以下是几条快速记忆的规则：\n\
  \n*   `bounds`是视图的*内部坐标*：即视图内部所有内容的坐标。\n*   `frame`是视图的*外部坐标*：即该视图在其父视图中的位置。\n\n\
  如需进行坐标系转换，有以下多种函数可用。最常用的四个是表 11-2 列出的`UIView`函数。举例来说，假设你已知图 11-1 中子视图右下角在其本地坐标系中的坐标为`(160,50)`。若想获取同一点在父视图坐标系中的坐标，可调用函数`superview.convertPoint(CGPoint(160,50),\
  \ fromView: subview)`。该语句将返回点`(180,110)`，即同一坐标点在父视图坐标系中的表示。\n\n表 11-2 `UIView`中的坐标转换函数\n\
  \n| `UIView`函数 | 描述 |\n| --- | --- |\n| `convertPoint(_:, toView:)` | 将视图本地坐标系中的点转换为另一视图本地坐标系中的同一点\
  \ |\n| `convertPoint(_:, fromView:)` | 将另一视图坐标系中的点转换为此视图的本地坐标系 |\n| `convertRect(_:,\
  \ toView:)` | 将视图本地坐标系中的矩形转换为另一视图本地坐标系中的同一矩形 |\n| `convertRect(_:, fromView:)` |\
  \ 将另一视图坐标系中的矩形转换为此视图的本地坐标系 |\n\n此外，所有传递坐标的事件相关类都会以特定视图的坐标系报告坐标。例如，`UITouch`类没有`location`属性，而是提供了`locationInView(_:)`函数，用于将触摸点转换为当前操作视图的本地坐标。\n\
  \n#### 视图的绘制时机\n\n在第 4 章中，你了解到 iOS 应用是事件驱动的程序。用户界面的刷新（即程序员所说的屏幕绘制）同样由事件循环触发。当视图需要绘制内容时，它并不会立即绘制，而是先记录下待绘制的内容，然后请求绘制事件消息。当应用的事件循环决定更新显示时，它会向所有需要重绘的视图发送用户界面更新消息。因此，视图的绘制生命周期遵循以下模式：\n\
  \n1.  更改待绘制的数据。\n2.  调用视图对象的`setNeedsDisplay()`函数。这会将视图标记为需要重绘。\n3.  当事件循环准备更新显示时，iOS\
  \ 会调用视图的`drawRect(_:)`函数。\n\n你通常无需调用其他视图的`setNeedsDisplay()`函数。大多数视图在自身发生变化（需重新绘制时）会自动发送该消息。例如，当你设置`UILabel`对象的`text`属性时，标签对象会调用自己的`setNeedsDisplay()`以使新标签显示出来。同理，当视图发生需要重绘自身的变更（如被添加到新的父视图）时，该视图会自动获得`setNeedsDisplay()`调用。\n\
  \n但这并不意味着视图的每次变化都会触发`drawRect(_:)`调用。当视图绘制自身时，生成的图像会被 iOS 保存或*缓存*——就像拍了一张快照。不影响该图像的变更（例如仅移动视图在屏幕上的位置，而不改变其尺寸）不会导致额外的`drawRect(_:)`调用；iOS\
  \ 只需重复使用已有的视图快照即可。\n\n**注意**  传递给`drawRect(rect:)`函数的`rect`参数是视图中需要重绘的部分。大多数情况下，它等同于`bounds`，这意味着你需要重绘全部内容。在极少数情况下，它可能是更小的区域。大多数`drawRect(rect:)`函数对此并不特别关注，而是直接绘制整个视图。绘制超出需求的范围不会产生问题；但绘制不足则会造成显示缺失。如果你的绘制代码非常复杂且耗时，可以尝试仅更新`rect`参数指定区域以节省时间。\n\
  \n现在你已经了解了视图绘制自身的时机和原因，接下来只需了解绘制方法。\n\n#### 绘制视图\n\n当视图对象收到`drawRect(_:)`调用时，它必须进行自我绘制。简单来说，iOS\
  \ 会准备一块“画布”，由你的视图对象进行“绘画”。最终生成的杰作将被 iOS 用于在屏幕上呈现该视图——直到需要再次重绘为止。\n\n\n\n你的“画布”是一个\
  \ `Core Graphics` 上下文，也称为你的*当前上下文*或简称*上下文*。它本身不是一个对象，而是一个在你的对象的 `drawRect(_:)` 函数被调用前预先准备好的绘图环境。当你的\
  \ `drawRect(_:)` 函数执行时，你的代码可以使用任何 Core Graphics 绘图例程来“绘制”到这个准备好的上下文中。该上下文在你的 `drawRect(_:)`\
  \ 函数返回之前一直有效，之后便会消失。\n\n**警告** 你的视图的 Core Graphics 上下文仅在 iOS 调用你的 `drawRect(_:)`\
  \ 函数时才存在。因此，你永远不应调用视图的 `drawRect(_:)` 函数，也绝不要在 `drawRect(_:)` 函数之外使用任何 Core Graphics\
  \ 绘图函数。（“离屏”绘图是个例外，我将在本章末尾介绍）。\n\n对于大多数面向对象的绘图函数，当前上下文是隐含的。也就是说，你调用一个绘制函数（`myShape.fill()`），该函数就会在当前上下文中绘制。如果你使用任何\
  \ C 语言的绘图函数，则需要获取当前上下文的引用，并将其作为调用的第一个参数传入，如下所示：\n\n```\nlet currentContext = UIGraphicsGetCurrentContext()\n\
  CGContextSetAlpha(currentContext, 0.5)\n```\n\n绘图的许多细节是由当前上下文的状态隐含决定的。上下文*状态*包括在该上下文中绘图时将要使用的所有设置和属性。这包括填充形状的颜色、线条颜色、线条宽度、混合模式、裁剪区域等等。\n\
  \n你无需为每个操作（比如绘制一条线）都指定所有这些变量，而是先为每个属性设置好状态。假设你想绘制一个形状（`myShape`），用红色填充，并用黑色绘制其轮廓。\n\
  \n```\nredColor.setFill()\nblackColor.setStroke()\nmyShape.fill()\nmyShape.stroke()\n\
  ```\n\n`setFill()` 和 `setStroke()` 函数设置了上下文中当前的填充和描边颜色。`fill()` 函数使用上下文的当前填充颜色，而\
  \ `stroke()` 使用当前的描边颜色。这种安排使得使用相同或相似的参数高效绘制多个形状或效果成为可能。\n\n现在唯一剩下的问题是你有什么工具可以用来绘图。你的基本绘图工具如下：\n\
  \n- 简单的填充和描边\n- 贝塞尔路径（填充和描边）\n- 图像\n\n听起来好像不多，但综合来看，它们具有非凡的灵活性。让我们从最简单的开始：填充函数。\n\
  \n### 填充和描边函数\n\nCore Graphics 框架包含少量用于用颜色填充上下文区域的函数。两个主要的函数是 `CGContextFillRect`\
  \ 和 `CGContextFillEllipseInRect`。前者用当前的填充颜色填充一个矩形。后者填充一个恰好内切于给定矩形的椭圆（如果矩形是正方形，则为一个圆）。\n\
  \n`CGContextFillRect` 经常用于在绘制视图细节之前填充整个视图的背景。`drawRect(_:)` 函数以类似这样的方式开头并不少见：\n\n\
  ```\noverride func drawRect(rect: CGRect) {\n    let context = UIGraphicsGetCurrentContext()\n\
  \    backgroundColor.set()\n    CGContextFillRect(context,rect)\n```\n\n这段代码首先获取当前上下文（调用\
  \ `CGContextFillRect` 时需要用到它）。然后获取该视图的背景颜色（`backgroundColor`），并将该颜色设为当前填充颜色。接着用该颜色填充视图需要绘制的部分（`rect`）。之后绘制的所有内容都将覆盖在用\
  \ `backgroundColor` 绘制的背景之上。\n\n**提示** 在 Core Graphics 上下文中绘图，很像在真实的画布上绘画。每当你绘制一些东西时，你都是在之前绘制的内容之上进行覆盖。所以，就像绘画一样，你通常从用一种中性颜色覆盖整个表面开始——艺术家称之为*底色*。然后你在其上用不同的颜色和形状进行绘制，直到绘制完所有内容。\n\
  \n函数 `CGContextStrokeRect` 和 `CGContextStrokeEllipseInRect` 执行类似的功能，但它们不是填充矩形或椭圆内部，而是使用当前的线条颜色、线条宽度和线条连接样式，在矩形或椭圆的轮廓上绘制一条线。*描边*是用来描述绘制线条行为的术语。\n\
  \n### 贝塞尔路径\n\n你会注意到，几乎没有任何 Core Graphics 函数是用来绘制真正简单的东西，比如直线。又或者，绘制 iOS 中随处可见的圆角矩形、三角形或任何其他形状呢？iOS\
  \ 的设计者们没有为你提供无数个用于绘制每种形状的函数，而是为你提供了一个近乎神奇的工具，它能让你绘制所有这些甚至更多形状：贝塞尔路径。\n\n贝塞尔路径以法国工程师皮埃尔·贝塞尔的名字命名，可以表示任何直线或曲线的组合，如图\
  \ 11-2 所示。它既可以简单如一个正方形，也可以复杂如加拿大的海岸线。一个贝塞尔路径可以是封闭的（圆、三角形、饼图），也可以是开放的（一条线、一条弧线、字母\
  \ *W*）。\n\n![9781484202098_Fig11-02.jpg](img/9781484202098_Fig11-02.jpg)\n\n图 11-2。贝塞尔路径\n\
  \n你通过首先创建一个 `UIBezierPath` 对象来定义一个贝塞尔路径。然后通过添加直线和曲线线段来构建路径。构建完成后，你可以使用该路径对象通过绘制其内部（填充）、绘制其轮廓（描边）或同时进行两者来在上下文中绘图。你可以根据需要随意重用同一个路径。\n\
  \n**提示** 对于常见的形状，例如正方形、矩形、圆形、椭圆、圆角矩形和弧线，`UIBezierPath` 类提供了便捷的初始化方法，可以用一条语句创建一个具有该形状的贝塞尔路径。\n\
  \n为了向你展示创建路径是多么容易，你将编写一个在视图中绘制贝塞尔路径的应用。但在那之前，让我们简要谈谈视图内容的最后一个主要来源。\n\n### 图像\n\n\
  图像就是图片，不需要过多解释。从第 2 章开始，你一直在使用图像（`UIImage`）对象。到目前为止，你将它们分配给 `UIImageView` 对象（和其他控件），由它们为你绘制图像。但\
  \ `UIImage` 对象也很容易绘制到你自己的视图上下文中。两个最常用的 `UIImage` 绘图函数是 `drawAtPoint(_:)` 和 `drawInRect(_:)`。第一个函数以原始大小将图像绘制到你的上下文中，其原点（左上角）位于给定的坐标。第二个函数将图像绘制到给定的矩形中，并根据需要缩放和拉伸图像。\n\
  \n当我说一个图像被“绘制”到你的上下文时，我实际上是在说它被复制了。图像是一个二维像素数组，而你的上下文画布也是一个二维像素数组。因此，实际上，“绘制”一幅图片不过是用图像中的像素覆盖视图像素的一部分。例外情况是具有透明像素的图像，或者你使用了非典型的混合模式，这两者我稍后会讲到。\n\
  \n本章稍后，我将通过重新审视你已经编写过的一个应用，详细解释如何在你的自定义视图中创建、转换和绘制图像。但在那之前，让我们先绘制一些贝塞尔路径。\n\n##\
  \ 形状优美的应用\n\n\n\n您将创建一个应用，使用贝塞尔路径在自定义视图中绘制简单形状。通过几次迭代，您将扩展该应用以包含移动和调整大小手势，并学习变换和动画，同时掌握大量`UIView`和贝塞尔路径的精髓。应用设计非常简单，如图\
  \ 11-3 所示。\n\n![9781484202098_Fig11-03.jpg](img/9781484202098_Fig11-03.jpg)\n\n\
  图 11-3. Shapely 应用设计\n\n应用将有一排用于创建新形状的按钮。形状出现在中间区域，可以移动、调整大小和重新排序。首先创建一个新项目。在 Xcode\
  \ 中，执行以下操作：\n\n1.  基于单视图应用模板创建一个新项目。\n2.  将项目命名为 `Shapely`。\n3.  将语言设置为 `Swift`。\n\
  4.  将设备设置为 `Universal`。\n\n接下来要创建自定义视图类。您已经多次执行此操作了。在项目导航器中选择 `Shapely` 组，选择新建文件（从文件菜单或按住\
  \ Control 键并右键单击该组），然后执行以下操作：\n\n1.  从 iOS 组中选择 Swift 类模板。\n2.  将文件命名为 `ShapeView`。\n\
  3.  将其添加到项目中。\n\n### 以编程方式创建视图\n\n在本应用中，您将以编程方式创建视图对象，而不是使用 Interface Builder。实际上，几乎所有内容都将以编程方式创建。到本章结束时，您应该能熟练掌握了。\n\
  \n创建任何对象时，都必须对其进行初始化。这通过使用类的*初始化函数*之一来完成。某些类（如 `NSURL`）提供了多种初始化方法，以便您以不同方式创建它们：`NSURL(string:)`、`NSURL(scheme:,\
  \ host:, path:)`、`NSURL(string:, relativeToURL:)`、`NSURL(fileURLWithPath:)` 等等。其中一些初始化方法被称为*便捷初始化方法*，原因显而易见，它们使对象创建更加方便。\n\
  \n`UIView` 类有一个所谓的*指定初始化方法*。此初始化方法（`UIView(frame:)`）是您在构造 `UIView` 的子类时必须使用的。您的子类可以自由定义自己的初始化方法，但它必须调用指定初始化方法（通过\
  \ `super.init(frame:)`），以便正确设置 `UIView` 超类。\n\n**注意**  `UIView` 类实际上有两个指定初始化方法。另一个用于创建在\
  \ Interface Builder 文件中定义的对象，这将在第 15 章中介绍。您在此处使用的指定初始化方法适用于以编程方式创建的 `UIView` 对象。\n\
  \n您将定义一个初始化方法来创建新的 `ShapeView` 对象，该对象将绘制特定的形状（正方形、圆形等）。对象的 frame 将设置为一个预定义的占位 frame，稍后您会重新定位它。因此，您需要一个自定义初始化函数，告诉新对象它将绘制哪种形状。您的视图将以特定颜色绘制其形状，因此您还需要一个用于存储其颜色的属性。首先编辑\
  \ `ShapeView.swift` 文件。将其修改为如下所示：\n\n```\nimport UIKit\n\nenum ShapeSelector: Int\
  \ {\n    case Square = 1\n    case Rectangle\n    case Circle\n    case Oval\n \
  \   case Triangle\n    case Star\n}\n\nclass ShapeView: UIView {\n}\n```\n\n`enum`\
  \ 语句创建了一个枚举，用于确定视图将绘制的形状。*枚举*是分配给名称的常量值序列。您列出名称，编译器会为每个名称分配一个值。在本例中，您指定该枚举与 `Int`\
  \ 类型兼容，因此所有分配的值都将具有对应的整数——稍后您需要用到这一点。通常您不关心值是如何分配的，但对于本应用，您希望它们从 1 开始（`Square`=`1`，`Rectangle`=`2`，`Circle`=`3`，依此类推）。\n\
  \n下一句是重头戏；它声明了一个新类（`ShapeView`），该类是 `UIView` 的子类。您所有的工作都将在此进行。\n\n首先添加一些属性（新代码以粗体显示）：\n\
  \n```\nclass ShapeView: UIView {\n    let initialSize = CGSize(width: 100.0, height:\
  \ 100.0)\n    let alternateHeight: CGFloat = 100.0/2\n    let strokeWidth = CGFloat(8.0)\n\
  \nlet shape: ShapeSelector\n    var color: UIColor = UIColor.whiteColor()\n```\n\
  \n以 `let` 开头的属性是常量。它们是不可变的值，永远不会改变。您定义了视图初始尺寸的常量（`initialSize`、`alternateHeight`）、用于绘制形状的线条宽度（`strokeWidth`）以及要绘制的形状（`shape`）。`color`\
  \ 是一个变量属性，用于存储绘制形状所用的 `UIColor`。这允许您稍后更改形状的颜色。默认颜色为白色。\n\n现在您已拥有了编写初始化函数所需的所有部分。\n\
  \n### 初始化您的对象\n\n每个类至少有一个初始化函数，通常有多个。添加一个自定义初始化方法，用于为给定的 `ShapeSelector` 构造一个新的\
  \ `ShapeView` 对象。\n\n```\ninit(shape: ShapeSelector) {\n    self.shape = shape\n\
  \    var frame = CGRect(origin: CGPointZero, size: initialSize)\n    if shape ==\
  \ .Rectangle || shape == .Oval {\n        frame.size.height = alternateHeight\n\
  \    }\n    super.init(frame: frame)\n    opaque = false\n    backgroundColor =\
  \ nil\n    clearsContextBeforeDrawing = true\n}\n```\n\n每当您通过 `ShapeSelector` 创建新的\
  \ `ShapeView` 对象时（例如 `ShapeView(.Circle)`），都会调用此初始化函数。第一条语句将 `shape` 属性设置为调用者选择的值。\n\
  \n现在，您可能会说：“等一下，先生。`shape` 属性是不可变的（`let`）值，不能被赋值！”嗯，您说得基本正确。`shape` 属性确实是不可变的，但仅在对象*创建之后*。在调用对象的初始化方法期间，有一个短暂的机会窗口可以设置不可变属性，使您能够为对象的整个生命周期确定它们的值。\n\
  \n接下来的四行代码为视图构造了一个初始 frame。其原点为 (0.0,0.0)，宽高为 100.0 x 100.0 点，除非是矩形或椭圆，在这种情况下其高度将为一半。\n\
  \n然后，通过调用 `super.init(frame: frame)` 将占位 frame 传递给超类的指定初始化方法。超类完成对象的构造过程。当它返回时，对象已完全初始化，您可以开始使用它了。\n\
  \n实际上，您甚至可以在初始化函数返回之前就开始使用它。接下来的三行代码更改了对象的默认属性（刚刚由 `super.init(frame:)` 设置好的属性值）。最重要的是重置\
  \ `opaque` 属性。如果您的视图对象具有透明区域，则必须声明您的视图不透明。`background` 属性被设置为 `nil`，因为此视图不用颜色填充其背景。我稍后会解释\
  \ `clearsContextBeforeDrawing` 属性。\n\n**注意**  如果您的视图的任何部分保持透明或半透明，您*必须*将视图的 `opaque`\
  \ 属性设置为 `false`，否则它可能无法正确显示在屏幕上。\n\n奇怪的是，编译器现在提示您的类未实现所有必需的函数。事实证明，关于哪些初始化方法您可以、不可以以及必须实现，有很多规则（在第\
  \ 20 章中解释）。此处我不深入细节，但由于您定义了一个自定义初始化方法，现在还必须定义一个必需的初始化方法。\n\n```\nrequired init(coder\
  \ decoder: NSCoder!) {\n    shape = .Square\n    super.init(coder: decoder)\n}\n\
  ```\n\n\n\n每当你的对象从文档或 Interface Builder 文件中构建时，就会调用这个初始化器。具体如何发生，在第 15 章和第 19 章中有说明。现在，只需放入这段代码，编译器就不会再报错了。\n\
  \n### `drawRect(_:)` 函数\n\n我认为是时候编写你的`drawRect(_:)`函数了。这是任何自定义视图类的核心。请将这个函数添加到你的`ShapeView.swift`文件中：\n\
  \n```\noverride func drawRect(rect: CGRect) {\n    color.setStroke()\n    path.stroke()\n\
  }\n```\n\n哇！就这些？是的，你的类只需要这些代码就能绘制其形状。它从`path`属性获取贝塞尔路径对象，该路径定义了视图将要绘制的形状轮廓。然后设置要绘制的颜色，`stroke()`函数会绘制出形状的轮廓。线条的绘制方式（宽度、连接点形状等）的细节，都是`path`对象的属性。\n\
  \n你还会注意到，你不需要先填充上下文（正如我在“填充与描边”一节中解释的那样）。这是因为你设置了视图的`clearsContextBeforeDrawing`属性。将其设为`true`，iOS\
  \ 会在调用你的`drawRect(_:)`函数之前，用（黑色的）透明像素预填充你的上下文。对于需要以透明“画布”开始的视图（就像这个视图一样），何不让 iOS\
  \ 为你完成这项工作？如果你的视图总是用图像或颜色填充其上下文，请将`clearsContextBeforeDrawing`设为`false`；保持`true`只会无意义地填充上下文两次，从而拖慢你的应用并浪费\
  \ CPU 资源。\n\n### 创建贝塞尔路径\n\n显然，繁重的工作在于创建贝塞尔路径对象。现在就来完成它。将这个计算属性添加到你的类中：\n\n```\n\
  var path: UIBezierPath {\n    var rect = bounds\n    rect.inset(dx: strokeWidth/2.0,\
  \ dy: strokeWidth/2.0)\n    var shapePath: UIBezierPath!\n    switch shape {\n \
  \       case .Square, .Rectangle:\n            shapePath = UIBezierPath(rect: rect)\n\
  \        default:\n            // TODO: Add cases for remaining shapes\n       \
  \     shapePath = UIBezierPath()\n    }\n    shapePath.lineWidth = strokeWidth\n\
  \    shapePath.lineJoinStyle = kCGLineJoinRound\n    return shapePath\n}\n```\n\n\
  这段代码声明了一个名为`path`的只读变量，它为对象赋予了一个`UIBezierPath`属性。`path`是一个计算属性。*计算属性*不像`shape`和`color`属性那样存储值。相反，当你请求`path`属性值时，会执行这段代码块。代码会构造一个新的`UIBezierPath`对象，描述该视图绘制的形状（正方形、矩形、圆形等），并精确适配其当前大小（`bounds`）。\n\
  \n**注意**：`path`属性只提供了获取值的代码，因此你不能设置`path`属性。虽然这使得该属性不可变（无法设置），但它仍然是一个`var`（变量）而非`let`（常量），因为其返回的值在对象的生命周期内可能会改变。\n\
  \n前两行代码创建了一个`CGRect`变量，描述了形状的外部尺寸。它比`bounds`小`strokeWidth/2.0`像素的原因，在“避免像素恐惧症：坐标与像素”侧边栏中有说明。\n\
  \n### 避免像素恐惧症：点与像素\n\nCore Graphics 中的所有坐标都是数学空间中的点；它们不针对单个像素。这是一个需要理解的重要概念。将坐标视为显示或图像像素之间无限细的线。这有三个影响。\n\
  \n*   点或坐标*不是*像素。\n*   绘制发生在线上以及线内部，而不是像素上或像素内部。\n*   一个点可能不代表一个像素。\n\n当你填充一个形状时，你填充的是定义该形状的无限细线内部的像素。在下图中，一个矩形`((2,1),(5,2))`被填充为深色。低分辨率显示器在坐标空间中每个点对应一个物理像素，如左图所示。右侧是“视网膜”显示屏，每个坐标空间对应四个物理像素。\n\
  \n![9781484202098_unFig11-01.jpg](img/9781484202098_unFig11-01.jpg)\n\n矩形定义了一个数学上精确的区域，落在该区域内的像素会被填充颜色。这种精确性避免了一种常见的程序员疾病——*像素恐惧症*：即不清楚特定绘制操作究竟会影响哪些像素的焦虑，这种问题在许多其他图形库中很常见。\n\
  \n这种数学上的精确性可能会带来意想不到的副作用。一种常见的伪像出现在绘制奇数宽度的线时——“奇数”意味着“不能被 2 整除”。线条的描边是居中在数学线条或曲线上的。在下图中，在两个坐标之间绘制了一条水平线段，描边宽度为`1.0`。下图中上面的线在低分辨率显示器上无法绘制成实线，因为描边只覆盖了线条两侧各一半的像素。Core\
  \ Graphics 使用抗锯齿技术绘制部分像素，这意味着这些像素的颜色会使用描边颜色值的一半进行调整。在 2.0 视网膜显示屏上，这种情况不会发生，因为每个像素相当于半个坐标值。\n\
  \n![9781484202098_unFig11-02.jpg](img/9781484202098_unFig11-02.jpg)\n\n下图中下面的线通过将线条居中在两个坐标之间，避免了“半像素”问题。现在宽度为`1.0`的线条恰好填满了坐标边界之间的空间，整齐地覆盖了像素，对用户来说呈现为一条干净、实心的线。\n\
  \n如果像素完美对齐对你的应用至关重要，你可能需要查阅`UIView`或其 trait 集合的`contentScaleFactor`属性。它会揭示两个整坐标值之间的物理屏幕像素数量。在撰写本文时，它可能取三个值之一：低分辨率显示器为`1.0`，Retina\
  \ 显示屏为`2.0`，Retina HD 显示屏为`3.0`。\n\n下一段代码声明了一个`UIBezierPath`变量，然后根据`shape`常量进行 switch\
  \ 来构建所需的形状。目前，`case`语句仅处理正方形和矩形形状的路径，如图 11-4 所示。稍后你将补充其他情况。\n\n![9781484202098_Fig11-04.jpg](img/9781484202098_Fig11-04.jpg)\n\
  \n图 11-4. 未完成的`path`函数\n\n**提示**：如果你以`//`开头的注释以`MARK:`、`TODO:`或`FIXME:`开头，该注释会自动显示在编辑区域顶部的文件导航菜单中，如图\
  \ 11-4 所示。这是一个非常方便的方式，可以记下你稍后需要处理的事情，因为它会醒目地显示在你的文件导航菜单中，直到你删除它。\n\n眼尖的读者会注意到，创建正方形形状和矩形形状的代码是相同的。这是因为这些形状之间的区别在于视图的宽高比，而这一点在对象创建时的`init(shape:)`中就已确定。如果你回头查看`init(shape:)`，会看到这段代码：\n\
  \n```\nif shape == .Rectangle || shape == .Oval {\n    frame.size.height = alternateHeight\n\
  }\n```\n\n当视图的 frame 被初始化时，如果形状是矩形或椭圆形，其高度会被设为一半。所有其他形状的视图在创建时都以正方形 frame 开始。\n\n\
  最后，形状的线宽被设置为`strokeWidth`，连接点样式被设置为`kCGLineJoinRound`。最后一个属性决定了连接点（一条线段结束、下一条线段开始的位置）的绘制方式。将其设置为`kCGLineJoinRound`会绘制带有圆角的形状。\n\
  \n### 测试正方形\n\n\n\n这段代码足以绘制一个正方形视图，接下来将其连接到某个对象上进行测试。`Shapely` 应用在用户点击按钮时会创建新形状，因此先定义一个按钮来进行测试。按钮需要使用自定义图像，所以首先将这些图像资源添加到项目中。在导航器中选择\
  \ `Images.xcassets` 资源目录项。找到 `Learn iOS Development Projects` ![image](img/arrow.jpg)\
  \ `Ch 11` ![image](img/arrow.jpg) `Shapely (Resources)` 文件夹，然后将全部 12 个图像文件（`addcircle.png`、`addcircle@2x.png`、`addoval.png`、`addoval@2x.png`、`addrect.png`、`addrect@2x.png`、`addsquare.png`、`addsquare@2x.png`、`addstar.png`、`addstar@2x.png`、`addtriangle.png`\
  \ 和 `addtriangle@2x.png`）拖入资源目录中，如图 11-5 所示。`Shapely (Icons)` 文件夹中还有一些应用图标，你也可以随意将它们放入\
  \ `AppIcon` 组中。\n\n![9781484202098_Fig11-05.jpg](img/9781484202098_Fig11-05.jpg)\n\
  \n图 11-5。添加按钮图像资源\n\n选择 `Main.storyboard` 文件。打开对象库（View ![image](img/arrow.jpg)\
  \ Utilities ![image](img/arrow.jpg) Show Object Library），将一个按钮拖到界面的左上角，如图 11-6 所示。\n\
  \n![9781484202098_Fig11-06.jpg](img/9781484202098_Fig11-06.jpg)\n\n图 11-6。添加第一个按钮\n\
  \n选择该按钮并点击“固定属性”控件。将高度和宽度固定为 `44` 点，同样如图 11-6 所示。选择“在视图控制器中添加缺失的约束”命令，可以通过固定约束控件旁边的布局问题控件或\
  \ `Editor` 菜单来执行。\n\n切换到属性检查器，选择根视图对象，并将其背景属性更改为 `Black Color`。再次选择新按钮并进行以下更改：\n\
  \n1.  将其类型更改为 `Custom`。\n2.  擦除其标题（将 `Button` 替换为空）。\n3.  将其图像更改为 `addsquare.png`。\n\
  \n现在，你要将按钮的操作连接到一个新的 Swift 函数，并且将使用一个非常巧妙的 Interface Builder 技巧来完成。首先切换到助理编辑器（View\
  \ ![image](img/arrow.jpg) Assistant Editor ![image](img/arrow.jpg) Show Assistant\
  \ Editor）。视图控制器的源代码（`ViewController.swift`）将显示在右侧窗格中。如果没有显示，请从右侧编辑器窗格正上方的导航栏中选择\
  \ `ViewController.swift` 文件。在 `ViewController.swift` 文件（右侧编辑窗格）中，添加一个新的操作。\n\n```\n\
  @IBAction func addShape(sender: AnyObject!) {\n    if let button = sender as? UIButton\
  \ {\n        let shapeView = ShapeView(shape: .Square)\n        view.addSubview(shapeView)\n\
  \n        var shapeFrame = shapeView.frame\n        let safeRect = CGRectInset(view.bounds,\
  \ shapeFrame.width, \n                                                shapeFrame.height)\n\
  \        var randomCenter = safeRect.origin\n        randomCenter.x += CGFloat(arc4random_uniform(UInt32(safeRect.width)))\n\
  \        randomCenter.y += CGFloat(arc4random_uniform(UInt32(safeRect.height)))\n\
  \        shapeView.center = randomCenter\n    }\n}\n```\n\n简而言之，前两行代码创建了一个用于绘制正方形的\
  \ `ShapeView` 对象。然后将这个新的视图对象添加到根 `view` 中，这样它就会出现在你的界面中。如果只做这些，一个白色正方形将会绘制在显示器的左上角。其余代码只是选择一个随机位置并将新视图移动到该位置。`safeRect`\
  \ 根据新视图的高度和宽度进行了内缩，因此在 `safeRect` 内随机选择的位置可以确保新视图安全地处于视图边界内。\n\n在本书中，到目前为止，你一直在使用\
  \ Interface Builder 创建和添加视图对象。这段代码演示了如何通过编程方式来实现。任何你使用 Interface Builder 添加到视图的内容都可以通过编程方式创建和添加，并且你可以在代码中创建一些在\
  \ Interface Builder 中无法创建的内容。\n\n**注意**  `addSubview(_:)` 函数将一个视图添加到另一个视图中。被添加的视图会成为另一个视图（即其父视图）的子视图。子视图将出现在其框架坐标处，位于父视图的本地坐标系中。一个视图一次只能添加到一个父视图上；一个视图不能同时出现在两个父视图中。要移除一个视图，请调用该视图的\
  \ `removeFromSuperview()` 函数。\n\n现在来看 Interface Builder 的技巧。请注意，在你的 `addShape(_:)`\
  \ 函数旁边的边距中出现了一个小的连接插座。它的作用与连接检查器中的连接器完全相同。通过将 `addShape(_:)` 函数旁边的连接插座拖到新按钮上，将按钮连接到操作，如图\
  \ 11-7 所示。\n\n![9781484202098_Fig11-07.jpg](img/9781484202098_Fig11-07.jpg)\n\n\
  图 11-7。连接第一个按钮\n\n助理编辑器允许你在视图控制器中为属性和操作编写 Swift 代码，然后将它们直接连接到界面中的视图对象，而无需切换文件或窗口。这大大节省了时间。\n\
  \n启动 iPad 模拟器并运行你的应用，如图 11-8 所示。点击按钮几次以创建一些形状视图对象，如图 11-8 右侧所示。\n\n![9781484202098_Fig11-08.jpg](img/9781484202098_Fig11-08.jpg)\n\
  \n图 11-8。正在工作的正方形形状视图\n\n到目前为止，你已经设计了一个自定义的 `UIView` 对象，它使用贝塞尔路径绘制形状。你已经创建了一个操作，用于通过编程方式创建新的视图对象并将其添加到视图中。这是一个很好的开始，但你仍然希望绘制不同颜色、不同形状，因此要扩展应用来实现这一点。\n\
  \n### 更多形状，更多颜色\n\n回到 Xcode，停止应用并再次切换到 `Main.storyboard` 文件。你的应用将绘制六种形状，因此再创建五个按钮。我是通过按住\
  \ Option 键并拖出第一个 `UIButton` 对象的副本来实现的，如图 11-9 所示。或者，你也可以复制并粘贴第一个按钮。如果你有受虐倾向，也可以从库中拖入新的按钮对象，并逐个修改它们以匹配第一个按钮。我把这些决定留给你自己。\n\
  \n![9781484202098_Fig11-09.jpg](img/9781484202098_Fig11-09.jpg)\n\n图 11-9。复制第一个按钮\n\
  \n就像在 DrumDub 中一样，你将使用按钮的 `tag` 属性来标识它将创建的形状。由于你复制了第一个按钮，所有按钮都连接到 `ViewController`\
  \ 中的同一个 `addShape(_:)` 函数。（如果没有连接，现在请连接它们。）从左到右，使用属性检查器根据表 11-3 设置按钮的 `tag` 和 `image`\
  \ 属性。\n\n表 11-3。新形状按钮属性\n\n| 标签 | 图片 |\n| --- | --- |\n| 1 | `addsquare.png` |\n\
  | 2 | `addrect.png` |\n| 3 | `addcircle.png` |\n| 4 | `addoval.png` |\n| 5 | `addtriangle.png`\
  \ |\n| 6 | `addstar.png` |\n\n你会注意到，这些标签值巧妙地与你之前在 `ShapeView.swift` 中定义的 `enum`\
  \ 常量相匹配。你需要修改 `ViewController.swift` 中 `addShape(_:)` 的第一行代码，使用按钮的 `tag` 值来代替 `.Square`\
  \ 常量，这样每个按钮就会创建不同的形状。\n\n\n\n当然，`ShapeView`中的`path`属性目前仍然只知道如何为正方形和矩形创建形状；你很快就会纠正这一点。但在离开`ViewConroller.swift`之前，修改你的`addShape(_:)`函数，使其根据标签（tag）选择新的形状，并为其赋予随机颜色——只是为了让它更美观。找到你的`addShape(_:)`函数并进行以下更改（以粗体显示）：\n\
  \n```swift\nlet colors = [ UIColor.redColor(), UIColor.greenColor(),\n         \
  \      UIColor.blueColor(), UIColor.yellowColor(),\n               UIColor.purpleColor(),\
  \ UIColor.orangeColor(),\n               UIColor.grayColor(), UIColor.whiteColor()\
  \ ]\n\n@IBAction func addShape(sender: AnyObject!) {\n    if let button = sender\
  \ as? UIButton {\n        if let shapeSelector = ShapeSelector(rawValue: button.tag)\
  \ {\n            let shapeView = ShapeView(shape: shapeSelector)\n            shapeView.color\
  \ = \n                        colors[Int(arc4random_uniform(UInt32(colors.count)))]\n\
  \            view.addSubview(shapeView)\n            ...\n        }\n```\n\n修改后的函数获取按钮的`tag`，并使用枚举器内置的`fromRaw()`函数将整数转换为`ShapeSelector`值，然后将其传递给`ShapeView`的初始化器。现在，形状将由点击的按钮决定。然后选择一个随机颜色并分配给新形状。\n\
  \n**注意**：枚举器的`init(rawValue:)`初始化器返回一个可选值。换句话说，如果没有与给定整数值对应的枚举值，它将根本不返回任何值。因此，如果`tag`值无效（例如\
  \ 0 或 42），`if`语句将失败，且不会执行任何代码。关于可选值的说明，请参阅第 20 章。\n\n要绘制这些形状，你的`ShapeView`对象仍需进行一些工作。切换到`ShapeView.swift`文件，找到`path`属性的\
  \ getter 函数，并使用列表 11-1 中以粗体显示的代码完成它。哦，你还可以从未完成的版本中移除`default:`分支；因为`switch`语句现在涵盖了所有可能的情况，你不再需要它了。\n\
  \n***列表 11-1***. 完成的路径属性 Getter 函数\n\n```swift\nvar path: UIBezierPath {\n    var\
  \ rect = bounds\n    rect.inset(dx: strokeWidth/2.0, dy: strokeWidth/2.0)\n\nvar\
  \ shapePath: UIBezierPath!\n    switch shape {\n        case .Square, .Rectangle:\n\
  \            shapePath = UIBezierPath(rect: rect)\n        case .Circle, .Oval:\n\
  \            shapePath = UIBezierPath(ovalInRect: rect)\n        case .Triangle:\n\
  \            shapePath = UIBezierPath()\n            shapePath.moveToPoint(CGPoint(x:\
  \ rect.midX, y: rect.minY))\n            shapePath.addLineToPoint(CGPoint(x: rect.maxX,\
  \ y: rect.maxY))\n            shapePath.addLineToPoint(CGPoint(x: rect.minX, y:\
  \ rect.maxY))\n            shapePath.closePath()\n        case .Star:\n        \
  \    shapePath = UIBezierPath()\n            let armRotation = CGFloat(M_PI)*2.0/5.0\n\
  \            var angle = armRotation\n            let distance = rect.width*0.38\n\
  \            var point = CGPoint(x: rect.midX, y: rect.minY)\n            shapePath.moveToPoint(point)\n\
  \            for _ in 0..<5 {\n                point.x += CGFloat(cos(Double(angle)))*distance\n\
  \                point.y += CGFloat(sin(Double(angle)))*distance\n             \
  \   shapePath.addLineToPoint(point)\n                angle -= armRotation\n    \
  \            point.x += CGFloat(cos(Double(angle)))*distance\n                point.y\
  \ += CGFloat(sin(Double(angle)))*distance\n                shapePath.addLineToPoint(point)\n\
  \                angle += armRotation*2\n            }\n            shapePath.closePath()\n\
  \    }\n    shapePath.lineWidth = strokeWidth\n    shapePath.lineJoinStyle = kCGLineJoinRound\n\
  \    return shapePath\n}\n```\n\n`.Circle`和`.Oval`情况使用了另一个`UIBezierPath`便捷初始化器来创建一个完整的路径对象，该对象描绘了一个完全适合给定矩形内部的椭圆。\n\
  \n`.Triangle`情况是事情变得有趣的地方。它展示了如何创建一个贝塞尔路径，一次一个线段。你通过调用`moveToPoint(_:)`来开始一个贝塞尔路径，以建立形状中的第一个点。之后，通过进行一系列`addLineToPoint(_:)`调用来添加线段。每个调用为形状添加一条边，就像玩“连线游戏”一样。最后一条边是使用`closePath()`函数创建的，该函数做两件事：它将最后一个点连接到第一个点，并使其成为一个闭合路径——一个描述实心形状的路径。\n\
  \n**注意**：此应用仅使用直线创建贝塞尔路径，但你也可以混合调用`addArcWithCenter(_:,radius:,startAngle:,endAngle:,clockwise:)`、`addCurveToPoint(_:,controlPoint1:,controlPoint2:)`和`addQuadCurveToPoint(_:,controlPoint:)`，以任意组合方式为路径添加曲线段。\n\
  \n`.Star`创建了一个更复杂的形状。如果你对细节感到好奇，请阅读完成的 Shapely 项目代码中的注释，你可以在`Learn iOS Development\
  \ Projects` → `Ch 11` → `Shapely`文件夹中找到。简而言之，该代码创建了一条从视图顶部中心（星形的顶端）开始的路径，添加一条向下倾斜到星形内部点的线条，然后再添加一条（水平的）线条向外回到星形的右侧点。然后它旋转\
  \ 72°，并重复这些步骤四次，以创建一个五角星。\n\n**提示**：三角函数计算以弧度为单位。如果你的三角技能有些生疏，角度以弧度表示时，是常数π的分数，π等于\
  \ 180°。iOS 数学库包含π（`M_PI`或 180°）、π/2（`M_PI_2`或 90°）和π/4（`M_PI_4`或 45°）的常量，以及其他常用常量（*e*、2\
  \ 的平方根等）。\n\n再次运行你的应用（参见图 11-10），然后制作一堆形状吧！\n\n![9781484202098_Fig11-10.jpg](img/9781484202098_Fig11-10.jpg)\n\
  \n图 11-10. 多彩形状\n\n**变换**\n\n接下来应用功能列表中的内容是拖拽和调整形状大小。为了实现这一点，你将重新审视手势识别器并学习一些全新的东西。让我们从手势识别器开始。\n\
  \n与视图对象类似，你可以以编程方式创建、配置和连接手势识别器。iOS 提供的具体手势识别器类（轻点、捏合、旋转、轻扫、平移和长按）拥有识别这些常见手势所需的所有逻辑。你所要做的就是创建一个，进行一些简单的配置，然后将它们连接起来。\n\
  \n回到`ViewController.swift`中的`addShape(_:)`函数。在函数末尾，添加以下代码：\n\n```swift\nlet pan\
  \ = UIPanGestureRecognizer(target: self, action: \"moveShape:\")\npan.maximumNumberOfTouches\
  \ = 1\nshapeView.addGestureRecognizer(pan)\n```\n\n前两个语句创建了一个新的平移（拖拽）手势识别器对象。该识别器将向其动作消息（`\"\
  moveShape:\"`）发送到你的`ViewController`对象（`self`）。`maximumNumberOfTouches`属性被设置为`1`。这将配置该对象仅识别单指拖拽手势；它会忽略任何两指或三指的拖拽。最后，将识别器对象附加到刚刚创建的形状视图上。\n\
  \n**注意**：这段代码等价于进入 Interface Builder 文件，将一个`Pan Gesture Recognizer`拖拽到`ShapeView`对象中，选中它，将其`Maximum\
  \ Touches`更改为`1`，然后将识别器连接到控制器的`moveShape(_:)`动作。当我说“等价”时，我的意思是“完全相同”。\n\n现在你所需要的只是一个`moveShape(_:)`函数。在你的`ViewController`类中，现在添加它。\n\
  \n\n\n```swift\nfunc moveShape(gesture: UIPanGestureRecognizer) {\n    if let shapeView\
  \ = gesture.view as? ShapeView {\n        let dragDelta = gesture.translationInView(shapeView.superview)\n\
  \        switch gesture.state {\n            case .Began, .Changed:\n          \
  \      shapeView.transform = \n                    CGAffineTransformMakeTranslation(dragDelta.x,\
  \ dragDelta.y)\n            case .Ended:\n                shapeView.transform =\
  \ CGAffineTransformIdentity\n                shapeView.frame = \n              \
  \      CGRectOffset(shapeView.frame, dragDelta.x, dragDelta.y)\n            default:\n\
  \                shapeView.transform = CGAffineTransformIdentity\n        }\n  \
  \  }\n}\n```\n\n`Gesture`（手势）识别器会分析并吸收发送给视图对象的底层触摸事件，并将其转化为高级的手势事件。与许多高级事件类似，它们拥有一个*阶段*。连续手势（如拖拽）的阶段会按可预测的顺序推进：*可能*、*开始*、*改变*，最后是*结束*或*取消*。\n\
  \n你的 `moveShape(_:)` 函数首先获取触发手势动作的视图；这将是用户触摸的视图，也是你将要移动的视图。然后它获取一些关于用户拖拽距离以及手势状态的信息。只要手势处于“开始”或“改变”状态，就意味着用户触摸了视图并在屏幕上拖拽手指。当用户松开手指时，状态会变为“结束”。在极少数情况下，它可能会变为“取消”或“失败”，此时你会忽略该手势。\n\
  \n当用户拖拽手指时，你希望按屏幕上相同的距离调整形状视图的原点，这会让用户产生一种实际上是在屏幕上拖拽视图的错觉。（希望你不会认为你真的可以通过触摸来移动 iPhone\
  \ 屏幕里的东西。）实现这一点要用到 `UIView` 类一个卓越的特性：`transform` 属性。\n\n**注** 注意，你无需在 `moveShape(_:)`\
  \ 函数开头添加 `@IBAction` 关键字。这是因为你通过*编程方式*将其连接到了手势识别器。只有当你想让动作显示在 Interface Builder\
  \ 中并通过它进行连接时，才需要 `@IBAction` 关键字。\n\n### 应用平移变换\n\niOS 以多种不同方式使用仿射变换。*仿射变换*是一个 3x3\
  \ 的矩阵，用于描述坐标系的变换。通俗地说，它是一组（看似）神奇的数值数组，能够描述各种复杂的坐标转换。它可以移动、调整大小、倾斜、翻转和旋转任意点集。既然几乎所有东西（视图对象、图像和贝塞尔路径）都是“点集”，那么仿射变换就可以用来移动、翻转、缩放、缩小和旋转这些对象。更神奇的是，单个仿射变换可以在一次操作中完成所有这些转换。\n\
  \n**仿射变换**\n\niOS 提供了用于创建和组合三种常见变换的函数：平移（位移）、缩放和旋转。这些在下图中有所展示。灰色形状代表原始形状，深色图形代表其变换后的形状：\n\
  \n![9781484202098_unFig11-03.jpg](img/9781484202098_unFig11-03.jpg)\n\n你可以使用函数 `CGAffineTransformMakeTranslation`、`CGAffineTransformMakeScale`\
  \ 或 `CGAffineTransformMakeRotation` 来创建基本变换。如果你是个数学高手，也可以使用 `CGAffineTransformMake`\
  \ 创建任意变换。\n\n特殊的单位变换（`CGAffineTransformIdentity`）不进行任何平移。这是 `transform` 属性的默认值，也是当你不想进行任何变换时使用的常量。\n\
  \n变换可以组合。其效果如下图所示：\n\n![9781484202098_unFig11-04.jpg](img/9781484202098_unFig11-04.jpg)\n\
  \n要组合变换，请使用函数 `CGAffineTransformTranslate`、`CGAffineTransformScale`、`CGAffineTransformRotate`\
  \ 和 `CGAffineTransformConcat`。这些函数接收一个变换（可能已经是其他变换的组合结果），应用一个额外的变换，并返回组合后的变换。然后，你可以使用这个组合变换值，一次操作完成所有单独的变换。\n\
  \n`moveShape(_:)` 中针对“开始”和“改变”状态的手势分支，会获取用户拖拽手指的距离，并用其创建一个平移变换。请快速念三遍“平移变换”（translate\
  \ transform）。`transform` 属性被设置为这个值，这样就完成了。但确切来说，这个神奇属性到底做了什么？\n\n当你设置一个视图的 `transform`\
  \ 属性时，该视图在其父视图中所占用的所有坐标，在显示到屏幕之前都会被转换。视图的内容和位置（其 frame）并没有改变。改变的是视图图像在父视图中的显示位置。我喜欢将\
  \ `UIView` 的 `transform` 想象为一个“投射”视图的透镜，使其显示在其他地方或以不同方式显示。如果你应用一个平移变换（正如你刚才在 `moveShape(_:)`\
  \ 中所做的那样），那么视图将会显示在一组不同的坐标上。\n\n**警告** 如果你将 `transform` 属性设置为除单位变换之外的任何值，`frame`\
  \ 属性的值将变得无意义。并非完全无意义，但对于大多数实际用途来说是不可用的。请记住这一点：当你将 `transform` 设置为除单位变换之外的任何值后，不要再使用\
  \ `frame`。\n\n如果你将 `transform` 属性重置为单位变换（`CGAffineTransformIdentity`），视图将重新出现在其原始位置。程序员称\
  \ `transform` 属性为*非破坏性变换*，因为设置它不会改变对象的任何其他属性。将其重置，一切都会恢复到原来的样子。在 `default:` 分支中，情况正是如此。`default:`\
  \ 分支通过将 `transform` 属性重置为单位变换来处理“取消”和“失败”状态。\n\n手势的“结束”分支是真正执行工作的部分。首先，视图的 `transform`\
  \ 属性被重置为单位变换。然后，基于用户拖拽视图的总距离，更新视图的 `frame` 原点。更新后的 `frame` 会将视图对象永久重定位到其新位置。\n\n\
  **注** 在使用 `frame` 属性更改其位置*之前*，视图的 `transform` 属性会被重置为单位变换。\n\n运行你的项目并尝试一下。我没有提供示意图，因为（正如我的出版商向我解释的那样）书中的插图是不会移动的。创建几个形状并拖动它们。这非常有趣。玩够了之后，准备好在其中添加缩放和捏合功能吧。\n\
  \n不过在此之前，让我分享一些关于仿射变换的知识点。变换可以在多种地方使用，而不仅仅是扭曲视图的 frame。它们可以用于在你绘制视图时变换当前上下文的坐标系。本质上，这种用法是将一个变换应用于视图的边界，从而改变你在视图中绘制内容的效果，而不是平移视图的最终结果。例如，你可能有一个复杂的绘图，希望它在视图中上下移动，或者可能想将其上下颠倒地绘制。与其重新计算所有想要绘制的坐标，不如使用\
  \ `CGContextTranslateCTM`、`CGContextRotateCTM` 或 `CGContextScaleCM` 函数来平移、旋转或缩放所有绘制操作。你将在第\
  \ 16 章中使用这些函数。\n\n**提示** 你也可以通过更改 `bounds` 属性的 `origin` 来平移视图的绘图坐标。\n\n\n\n"
- "# 变换与动效\n\n变换同样可以用于修改贝塞尔路径中的点。只需创建所需的变换，然后调用路径的 `applyTransform(_:)` 函数即可，路径中的所有点都将通过该变换被修改。这是一种*破坏性*的转换：路径中原有的点将会丢失。\n\
  \n### 应用缩放变换\n\n如果说一个手势识别器很有意思，那么两个就能开派对了。现在，我们将添加一个捏合/缩放手势，用于调整形状视图的大小。和之前一样，首先在\
  \ `addShape(_:)` 函数的末尾（位于 `ViewController.swift` 中）创建并附加第二个手势识别器对象。\n\n```\nlet\
  \ pinch = UIPinchGestureRecognizer(target: self, action: \"resizeShape:\")\nshapeView.addGestureRecognizer(pinch)\n\
  ```\n\n捏合手势识别器对象无需任何配置，因为捏合/缩放始终是双指手势。\n\n现在添加以下 `resizeShape(_:)` 函数：\n\n```\n\
  func resizeShape(gesture: UIPinchGestureRecognizer) {\n    if let shapeView = gesture.view\
  \ as? ShapeView {\n        let pinchScale = gesture.scale\n        switch gesture.state\
  \ {\n            case .Began, .Changed:\n                shapeView.transform = \n\
  \                    CGAffineTransformMakeScale(pinchScale, pinchScale)\n      \
  \      case .Ended:\n                shapeView.transform = CGAffineTransformIdentity\n\
  \                var frame = shapeView.frame\n                let xDelta = frame.width*pinchScale-frame.width\n\
  \                let yDelta = frame.height*pinchScale-frame.height\n           \
  \     frame.size.width += xDelta\n                frame.size.height += yDelta\n\
  \                frame.origin.x -= xDelta/2\n                frame.origin.y -= yDelta/2\n\
  \                shapeView.frame = frame\n                shapeView.setNeedsDisplay()\n\
  \            default:\n                shapeView.transform = CGAffineTransformIdentity\n\
  \        }\n    }\n}\n```\n\n此函数的模式与 `moveShape(_:)` 相同。唯一显著的区别在于调整视图最终尺寸和位置的代码，这比拖拽函数需要更多的数学运算。\n\
  \n运行项目并测试。创建形状，然后用双指调整其大小，如图 11-11 所示。\n\n![9781484202098_Fig11-11.jpg](img/9781484202098_Fig11-11.jpg)\n\
  \n图 11-11. 使用变换调整大小\n\n**提示：** 如果你在使用模拟器，请按住 Option 键来模拟双指捏合手势。你首先需要将形状定位在视图中央，因为模拟器中的第二根“手指”会以屏幕中心点为对称轴镜像，你需要让两根“手指”都位于视图内，才能被识别为捏合手势。\n\
  \n你会注意到，当大幅缩小形状时，其图像会出现“锯齿”：这是由于放大较小图像而产生的走样伪影。这是因为在捏合手势过程中，你并没有真正调整视图的大小，而只是对原始视图的图像应用了变换。贝塞尔路径是与分辨率无关的，在任何尺寸下都能平滑绘制。但变换只能基于视图当前图像的像素进行操作。在捏合手势结束时，形状视图的大小会被调整并重绘。这会以新的尺寸创建新的贝塞尔路径，一切又恢复平滑，如图\
  \ 11-11 右侧所示。\n\n你的应用现在看起来相当生动，但我认为还可以再增添一点活力。加上一些动效怎么样？\n\n### 动效：不仅仅是漫画的专属\n\n\
  动效已成为现代应用中不可或缺且备受期待的功能。没有动效，即使应用实现了所有预期功能，看起来也会显得枯燥乏味。幸运的是，iOS 的设计者深知这一点，并为此付出了巨大努力，让你能够轻松地为应用添加动效。主要有（广义上的）四种方式为应用增添动态效果。\n\
  \n*   内置功能\n*   自行实现 (DIY)\n*   核心动画 (Core Animation)\n*   OpenGL、Sprite Kit、Scene\
  \ Kit 和 Metal\n\n“内置功能”包括 iOS API 中那些会自动为你添加动效的地方。从视图控制器到表格视图，无数函数都包含一个布尔类型的 `animated`\
  \ 参数。如果你想让你视图控制器滑动呈现、页面向上翻卷、工具栏按钮平滑调整大小、表格视图行灵动地跳到新位置、或者进度指示器平稳过渡到新值，你只需为 `animated`\
  \ 参数传入 `true`，iOS 类就会完成所有工作。因此，请留意那些 `animated` 参数并善加利用。\n\n**提示：** 某些视图属性有两个设置方法：一个从不带动画，另一个可以带动画。例如，`UIProgressView`\
  \ 类有一个可设置的 `progress` 属性（从不带动画）和一个 `setProgress(_:,animated:)` 函数（可选带动画）。如果你正在设置一个视觉属性，请查阅文档，看是否有带动画的替代方法。\n\
  \n在自行实现 (DIY) 动画方案中，你的代码会逐帧进行更改，以实现界面的动效。这通常包含以下步骤：\n\n1.  创建一个每秒触发 30 次的定时器。\n\
  2.  定时器触发时，更新某个视图的位置/外观/大小/内容。\n3.  标记该视图需要重绘。\n4.  重复步骤 2 和 3，直到动画结束。\n\n讽刺的是，DIY\
  \ 方法正是业余开发者最常滥用的方式。它在少数情况下可能“还行”，但大多数时候，它会遭遇许多无法避免的性能缺陷。最大的问题是时机把握。要平衡动画的速度使其看起来流畅，但又不会因运行过快而浪费\
  \ CPU 资源、消耗电池寿命、拖慢应用乃至整个 iOS 系统，这非常困难。\n\n### 使用核心动画\n\n聪明的 iOS 开发者——既然你在读这本书，说的就是你——会使用核心动画\
  \ (Core Animation)。核心动画已经为你解决了一切棘手的性能、负载均衡、后台线程以及效率问题。你只需告诉它你想要动效的对象，然后让它施展魔法即可。\n\
  \n动态内容绘制在*图层* (`CALayer`) 对象中。图层对象就像 `UIView` 一样；它是一个可以使用 Core Graphics 绘制的画布。绘制完成后，就可以使用\
  \ Core Animation 对该图层进行动效处理。简而言之，你告诉 Core Animation 你希望图层如何变化（移动、缩小、旋转、卷曲、翻转等）、持续多长时间以及变化速度。然后你就可以完全不管，让\
  \ Core Animation 去完成所有工作。Core Animation 甚至不会打扰你应用的事件循环；它会在后台安静地工作，根据可用的 CPU 资源平衡动画工作，因此不会干扰应用需要执行的任何其他任务。这确实是一个非凡的系统。\n\
  \n请记住，Core Animation 并不会改变图层对象的内容。它只是临时对图层的副本进行动效，当动效结束后，这个副本就会消失。我喜欢把 Core Animation\
  \ 看作是“实时”变换；它临时投射出一个扭曲的、动态版本的图层，但永远不会改变图层本身。\n\n哦，我刚才是不是说“图层对象就像 `UIView`？”我应该说，“图层对象，*就像\
  \ `UIView` 中的那个*”，因为 `UIView` 本身就是基于 Core Animation 图层的。当你在 `drawRect(_:)` 中绘制视图时，你实际上是在一个\
  \ `CALayer` 对象中绘图。如果你需要直接操作图层对象，可以通过 `layer` 属性获取 `UIView` 的图层对象。关键点在于：*所有* `UIView`\
  \ 对象都可以使用 Core Animation 进行动效处理。这下你可算掌握了精髓！\n\n### 为 Shapely 添加动效\n\n\n\n要让 Core\
  \ Animation 为你工作，有三种途径。我已经介绍了第一种：所有那些“内置的” `animated:` 参数都基于 Core Animation——这并不奇怪。第二种传统的\
  \ Core Animation 技术是创建一个动画（`CAAnimation`）对象。一个动画对象控制一个动画序列。它决定动画何时开始、何时停止、动画的速度（称为*动画曲线*）、动画执行什么动作、是否重复、重复次数等等。`CAAnimation`\
  \ 有一些子类，可以对视图的特定属性进行动画处理，或者对转场效果（视图对象的添加、删除或交换）进行动画处理。甚至还有一个动画类（`CAAnimationGroup`）可以同步多个动画对象。\n\
  \n说实话，创建 `CAAnimation` 对象并不容易。因为它可能非常复杂，所以有大量简便的构造方法和函数试图让它尽可能无痛——但这仍然是一项艰巨的任务。你必须定义被动画属性在开始和结束时的值。你必须定义时间和动画曲线；然后你必须启动动画并在适当的时间更改实际的属性值。请记住，动画不会改变原始视图，所以如果你想让一个视图从左向右滑动，你必须创建一个从左侧开始、在右侧结束的动画，然后必须将原始视图的位置设置为右侧，否则动画结束时视图会重新出现在左侧。这很繁琐。\n\
  \n幸运的是，iOS 的“神灵”感受到了你的痛苦，并创建了一种非常简单的方法来创建基础动画，称为**基于块的动画函数**。这些 `UIView` 函数允许你编写几行代码，告诉\
  \ Core Animation 你希望如何更改视图的属性。然后，Core Animation 会负责创建、配置和启动 `CAAnimation` 对象。它甚至还会更新你视图的属性，所以当动画结束时，你的属性会处于动画的结束值——这正是你想要的。\n\
  \n那么，这些基于块的动画函数使用起来有多简单呢？你来评判一下。在 `ViewController.swift` 中找到你的 `addShape(_:)` 函数。找到随机定位新视图的代码，并将其编辑成如下所示（用粗体代码替换语句\
  \ `shapeView.center = randomCenter`）：\n\n```\nvar shapeFrame = shapeView.frame\n\
  let safeRect = CGRectInset(view.bounds, shapeFrame.width, shapeFrame.height)\nvar\
  \ randomCenter = safeRect.origin\nrandomCenter.x += CGFloat(arc4random_uniform(UInt32(safeRect.width)))\n\
  randomCenter.y += CGFloat(arc4random_uniform(UInt32(safeRect.height)))\nshapeView.center\
  \ = button.center\nshapeView.transform = CGAffineTransformMakeScale(0.4, 0.4)\n\
  UIView.animateWithDuration(0.5) {\n    shapeView.center = randomCenter\n    shapeView.transform\
  \ = CGAffineTransformIdentity\n}\n```\n\n新代码首先将新视图的中心设置成用户点击的按钮的中心，本质上就是将新视图定位到按钮的正上方。应用了一个变换，将形状的大小缩小到其原始大小的\
  \ 40%（大约与按钮大小相同）。如果在这个阶段停下来，你的形状视图会正好出现在你点击的按钮之上，将其覆盖。\n\n最后一条语句是神奇之处。它启动了一个持续半秒（`0.5`）的动画。闭包表达式描述了你想要动画化的内容，而所谓“描述”，我的意思是你只需编写代码来设置你想要动画化的属性。就这么简单。`UIView`\
  \ 会自动对以下七个属性中的任何一个进行动画处理：\n\n*   `frame`\n*   `bounds`\n*   `center`\n*   `transform`\n\
  *   `alpha`\n*   `backgroundColor`\n*   `contentStretch`\n\n如果你想让一个视图移动或改变大小，就对它的\
  \ `center` 或 `frame` 进行动画处理。想让视图淡出？将它的 `alpha` 属性从 `1.0` 动画化到 `0.0`。想让视图平滑地向右旋转？将它的\
  \ `transform` 从恒等变换动画化到一个旋转变换。你可以做上述任何一项，甚至同时做多项（同时改变 `alpha` 和 `center`）。就是这么简单。\n\
  \n`animateWithDuration()` 函数有许多变体，可以提供不同的效果，甚至提供更多的控制。使用这些函数，你可以轻松完成以下所有操作：\n\n\
  *   延迟动画的开始\n*   在两个视图之间进行转场动画\n*   指定自定义动画选项，例如：\n    *   从当前动画值开始此动画（中断另一个动画）\n\
  \    *   选择不同的动画曲线（缓入、缓出等）\n    *   选择转场样式（翻转、翻页、交叉溶解等）\n    *   在动画期间重绘视图的内容\n\
  \    *   反转动画\n*   提供动画完成时执行的代码，其中可以包含启动另一个动画的代码，从而轻松创建动画序列\n\n请参阅 `UIView` 文档中的“使用块对象进行视图动画处理”部分，以获取完整的函数列表。\n\
  \n再次运行你的应用并创建一些形状。很酷吧？（再次说明，没有图）。每当你点击“添加形状”按钮时，新的形状会从你的手指下方飞出进入你的视图，就像某个疯狂的街机游戏。如果你动作快，可以同时让好几个形状动起来。而这只需要五行代码。\n\
  \n如果你想对除了这七个属性之外的其他内容进行动画处理，或者创建循环运行的动画、沿弧线移动的动画或反向运行的动画，该怎么办？为此，你需要深入研究 Core Animation\
  \ 并创建自己的动画对象。你可以在 Xcode 的“文档和 API 参考”中找到的 *Core Animation 编程指南* 中了解相关信息。\n\n###\
  \ OpenGL、Sprite Kit、Scene Kit 和 Metal\n\n哎呀，我差点忘了那些其他的动画技术。现代计算机系统，即使是像 iPod 这样微小的系统，实际上也是合二为一的双计算机系统：一个中央处理器（CPU）负责计算机的常规工作，以及一个图形处理器（GPU）负责将位图数据放到屏幕上。每个处理器都有自己的一套处理单元和内存。两者之间没有太多重叠，除了一些允许数据和指令交换的通道。虽然\
  \ CPU 在处理许多任务时速度很快，但它不太适合绘制和动画化图形所需的大规模并行计算。而这正是 GPU 真正擅长的领域。GPU 拥有数十个，有时甚至数百个小型、简单但速度极快的处理单元。我喜欢将\
  \ GPU 视为“我的像素小兵大军”。\n\n在过去二十年中，计算机图形学和动画的大多数进步都是通过将越来越多的数据和计算从 CPU 转移到 GPU 来实现的。这需要大量的协调工作。你不是在\
  \ CPU 中保留一个包含绘制该视图所有数据和逻辑的对象（如 `UIView`），而是创建了一种混合解决方案：CPU 准备绘制视图所需的数据并将其交给 GPU。GPU\
  \ 可以在收到指令后渲染该视图。CPU 仅持有图像信息的引用（通常称为*纹理*），而实际的图像数据驻留在 GPU 中。\n\n一种更高级的解决方案是编写称为*着色器*的小型程序，这些程序在\
  \ GPU 中执行你的代码。这与用 Swift 编程的体验截然不同，但优势巨大。生成和绘制图形及场景所需的所有逻辑（数据和计算机代码）现在完全位于 GPU 中。CPU\
  \ 只是在导演这出戏，告诉 GPU 它需要绘制什么以及何时绘制。\n\n\n\n其效果可能令人叹为观止。如果你曾运行过 3D 飞行模拟器、射击游戏或冒险游戏，你看到的就是在利用\
  \ GPU 强大性能的代码。\n\niOS 上可用的各种动画技术，可以通过你（程序员）与 GPU 实际操作细节的隔离程度来大致区分。一端是你已经用过的 Core\
  \ Animation。从你的角度来看，一切都是在 CPU 中发生的。没有提及纹理缓冲区、着色器或管道调度。Core Animation 为你完成了这些工作。虽然无知可能是福，但如果你愿意踏入\
  \ GPU 的世界，也会有很多可能性。以下是你的选择。\n\n### Sprite Kit\n\nSprite Kit 出现在 iOS 7 中，因此它对 iOS\
  \ 来说相对较新。Sprite Kit 的视图类基于 `SKNode` 而不是 `UIView`，但许多属性和关系对你来说会很熟悉。你会发现关于 `UIView`\
  \ 的很多知识在 `SKNode` 中同样适用。（例如，`SKNode` 也是 `UIResponder` 的子类，因此事件处理程序的工作方式相同。）\n\n\
  Sprite Kit 和 `UIView` 都旨在绘制和动画化 2D 图形。然而，Sprite Kit 是专门为*持续*动画和交互而设计的。Core Animation\
  \ 通常最适合简短、简单的序列。Sprite Kit 旨在让图像始终保持运动状态，这就是为什么它成为 2D 游戏的绝佳选择。你将在第 14 章中创建一个 Sprite\
  \ Kit 游戏。\n\nSprite Kit 还拥有一个强大的物理模拟引擎。你可以为 Sprite Kit 节点编程设置形状、质量、速度和碰撞规则，然后让 Sprite\
  \ Kit 自动动画化它们的行为。\n\n**注意** Cocoa Touch 也有一个名为 View Dynamics 的物理模拟引擎，你可以与 `UIView`\
  \ 对象一起使用。我将在第 16 章中向你展示如何操作。\n\n### Scene Kit\n\nScene Kit 是 iOS 8 的新特性，尽管它在 OS\
  \ X 上已经存在了一段时间。与 Sprite Kit 类似，它专为高速渲染和动画而设计。最大的区别在于 Scene Kit 主要专注于 3D 建模和动画。\n\
  \nScene Kit 是 Apple 对 OpenGL 的替代方案。它基于相同的底层技术设计，但与 Sprite Kit 一样，它使用 Cocoa Touch\
  \ 程序员熟悉且方便的对象、结构、数据、概念和编程语言。Scene Kit 和 Metal 超出了本书的范围，但 Apple 有出色的教程和指南供你入门。\n\n\
  ### Metal\n\niOS 8 中的新成员是 Metal。而且，就像它的名字一样，Metal 让你可以直接访问 GPU 的全部能力。使用 Metal，可以创建性能甚至超过\
  \ Scene Kit 和 OpenGL 的 2D 和 3D 动画。当然，它在技术上也非常复杂。\n\nMetal 也可以用于非图形计算。GPU 单元每秒可以执行的浮点运算次数（称为\
  \ FLOP）是惊人的。有很多应用程序可以利用这一点。通过并行运行数百个小计算（这正是 GPU 的设计目的），密码学、场计算和线性数学问题可以大大加速。Metal\
  \ 提供了一个用于运行和管理这些计算的 API。\n\n### OpenGL\n\nOpenGL 是 Open Graphics Library（开放图形库）的缩写。它是一个用于\
  \ 2D 和 3D 动画的跨语言、跨平台 API，是所有 GPU 控制库的鼻祖。在 Sprite Kit、Scene Kit 和 Metal 出现之前，OpenGL\
  \ 是在 iOS 中充分发挥 GPU 能力的唯一途径。iOS 中包含的 OpenGL 版本是 OpenGL for Embedded Systems（OpenGL\
  \ ES）。它是 OpenGL 的精简版本，适合在小型计算机系统（如 iOS 设备）上运行。\n\nOpenGL 的优势在于它是一个行业标准。有很多 OpenGL\
  \ 知识和代码可以在 iOS 上运行。这让你可以访问庞大的源代码和解决方案库。而且你在 iOS 上进行的 OpenGL 工作也可以移植到其他平台。\n\n缺点是\
  \ OpenGL 是另一个世界。OpenGL 视图是使用一种称为 OpenGL 着色语言（GLSL）的特殊类 C 计算机语言编程的。要使用它，你需要编写*顶点*和*片段*着色器程序。¹\
  \ 这完全不像 Swift。即使在 CPU 端，OpenGL 编程通常也是用 C++ 编写的，而不是 Swift，甚至不是 Objective-C。虽然一些 C\
  \ API 可以从 Swift 调用，但我对完全用 Swift 编写 OpenGL 应用程序持保留态度。\n\n尽管我试图引导你远离 OpenGL，但我必须承认它是一项强大的技术，并且在\
  \ iOS 中运行良好——一旦你克服了学习曲线和语言障碍。可以从 Xcode 的“文档与 API 参考”中的 *OpenGL ES Programming Guide\
  \ for iOS* 开始。但请注意，在理解该文档的大部分内容之前，你需要学习大量 OpenGL 基础知识。\n\n## 事物的顺序\n\n当 Shapely\
  \ 项目仍在打开时，我希望你稍微操作一下视图对象的顺序。子视图有一个特定的顺序，称为它们的 *Z 轴顺序*。它决定了重叠视图的绘制方式。这并不复杂。后面的视图先绘制，后续的视图绘制在其上方（如果它们重叠）。如果重叠的视图是不透明的，它会遮挡其后面的任何视图。如果其部分区域是透明的，则后面的视图会通过这些“孔”露出来。\n\
  \n这比解释更容易看到，所以给 Shapely 再添加两个手势识别器。再次回到 `ViewController.swift` 中的 `addShape(_:)`\
  \ 动作函数。在附加了另外两个手势识别器的代码之后，立即插入以下内容：\n\n```\nlet dblTap = UITapGestureRecognizer(target:\
  \ self, action: \"changeColor:\")\ndblTap.numberOfTapsRequired = 2\nshapeView.addGestureRecognizer(dblTap)\n\
  \nlet trplTap = UITapGestureRecognizer(target: self, action: \"sendShapeToBack:\"\
  )\ntrplTap.numberOfTapsRequired = 3\nshapeView.addGestureRecognizer(trplTap)\n```\n\
  \n这段代码添加了双击和三击手势识别器，它们分别调用 `changeColor(_:)` 和 `sendShapeToBack(_:)`。现在添加这两个新函数：\n\
  \n```\nfunc changeColor(gesture: UITapGestureRecognizer) {\n    if gesture.state\
  \ == .Ended {\n        if let shapeView = gesture.view as? ShapeView {\n       \
  \     let currentColor = shapeView.color\n            var newColor: UIColor!\n \
  \           do {\n                newColor = \n                    colors[Int(arc4random_uniform(UInt32(colors.count)))]\n\
  \            } while currentColor == newColor\n            shapeView.color = newColor\n\
  \        }\n    }\n}\n\nfunc sendShapeToBack(gesture: UITapGestureRecognizer) {\n\
  \    if gesture.state == .Ended {\n        view.sendSubviewToBack(gesture.view)\n\
  \    }\n}\n```\n\n`changeColor(_:)` 函数主要用于娱乐。它确定形状的颜色，并为其随机选择一种新颜色。\n\n`sendShapeToBack(_:)`\
  \ 函数演示了视图如何重叠。当你向视图添加子视图时（使用 `UIView` 的 `addSubview(_:)` 函数），新视图会位于顶部。但这不是你唯一的选择。如果视图顺序很重要，有许多函数可以将子视图插入到特定索引处，或者立即位于另一个（已知）视图的下方或上方。你还可以使用\
  \ `bringSubviewToFront(_:)` 和 `sendSubviewToBack(_:)` 调整现有视图的顺序，你将在这使用它们。你的三击手势会将该子视图“推”到后面，位于所有其他形状之后。\n\
  \n为了使这种效果更明显，对 `ShapeView.swift` 中的 `drawRect(_:)` 函数进行一个小修改，添加粗体部分的代码：\n\n```\n\
  override func drawRect(rect: CGRect) {\n    let shapePath = path\n    UIColor.blackColor().colorWithAlphaComponent(0.4).setFill()\n\
  \    shapePath.fill()\n    color.setStroke()\n    shapePath.stroke()\n}\n```\n\n\
  \n\n新代码会以 40% 不透明度（60% 透明度）的黑色填充形状。这样你的形状就会有一个“烟熏”的中间部分，使绘制在它后面的任何形状变暗。这样一来，观察形状如何重叠就变得容易了。\n\
  \n运行你的应用，创建几个形状，调整它们的大小，然后移动它们使其重叠，如图 11-12 所示。\n\n![9781484202098_Fig11-12.jpg](img/9781484202098_Fig11-12.jpg)\n\
  \n图 11-12。使用半透明填充的重叠形状\n\n你最后添加的形状位于最先添加的形状“之上”。现在尝试双击一个形状来改变其颜色。我等着。\n\n我还在等。\n\
  \n出问题了吗？双击似乎无法改变形状的颜色？可能有两个原因：`changeColor(_:)` 函数没有被调用。通过在 Xcode 中设置断点来测试。在 `changeColor(_:)`\
  \ 函数第一行代码旁边的边距处单击一次。再次双击形状。Xcode 会在 `changeColor(_:)` 函数处停止你的应用，如图 11-13 所示，所以问题不在这里。删除或禁用该断点，然后点击“继续”按钮（在调试控制栏中）以恢复应用执行。\n\
  \n![9781484202098_Fig11-13.jpg](img/9781484202098_Fig11-13.jpg)\n\n图 11-13。判断 `changeColor(_:)`\
  \ 是否被调用\n\n另一个可能的问题是颜色确实改变了，但并未显示出来。你可以通过调整形状大小来测试这一点。如果你双击一个形状然后调整其大小，你会看到颜色发生了变化。好吧，原来是后者。花点时间来修复这个问题。\n\
