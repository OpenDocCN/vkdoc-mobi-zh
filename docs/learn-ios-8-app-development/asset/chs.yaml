  \ 的 `ColorModel`\n\n这个版本的应用代表了 MVC 模式更高级的用法。现在，你不再是将简单的值“喂”给视图对象，而是有一个能够理解你的数据模型并直接获取所需值的视图对象。但是，控制器仍然必须在更改数据模型时记得刷新所有视图。让我们换一种方式，让数据模型在发生变化时通知控制器。\n\
  \n### 成为一个敏锐的观察者\n\n\n\n"
- "# 回顾\"MVC 通信\"章节\n\n在之前的\"MVC 通信\"章节中，我描述了一个简单的架构：数据模型向视图对象发送通知（参见图 8-1），告知它们何时需要更新显示。你在`MyStuff`应用中已经实现了这一点——在`MyWhatsit`类中添加了`postDidChangeNotification()`方法。该方法会通知所有感兴趣的监听者：数据模型中的某个条目发生了变化。你的表视图控制器则监听这些通知，并在必要时重新绘制表格。\n\
  \n使用`NSNotificationCenter`将数据模型的变化通知给视图——这是 MVC 通信的*绝佳*范例。请将它纳入你的\"iOS 解决方案锦囊\"\
  中。此处不再赘述这一方案，而是向你展示一种更精妙的数据模型变更观察方法。\n\n### 键值观察\n\n我曾说过，设计模式在 iOS 中根深蒂固。现在你将见证究竟有多深。MVC\
  \ 通信部分地基于观察者模式。*观察者模式*是一种设计模式：当一个对象（主体）中发生某种事件时，另一个对象（观察者）会收到消息。在 MVC 中，数据模型（主体）在每次发生变更时通知视图或控制器对象（观察者）。这样一来，控制器无需在修改数据模型时还要记得更新视图对象（即调用`updateColor()`）。现在，控制器——或任何其他对象——可以随意更改数据模型；任何变更都会向观察者发送通知。\n\
  \n在`MyStuff`中，你通过`NSNotification`对象实现了这一功能。而在`ColorModel`中，你将使用一种名为*键值观察*（KVO）的\
  \ Cocoa Touch 魔法。KVO 是一种在对象属性被赋值时自动通知观察者的技术。没错，你只需要设置属性值，任何观察该属性的对象就会自动收到通知。\n\n\
  ### 观察键值变化\n\n在 Swift 对象中观察属性变化需要三个步骤：\n\n1.  确保你的属性是可观察的。\n2.  成为该属性（由*键*标识）的观察者。\n\
  3.  实现`observeValueForKeyPath(_:, ofObject:, change:, context:)`函数。\n\n第一步是让`Color`类符合\
  \ KVO 的要求。（你可以在`Learn iOS Development Projects` → `Ch 8` → `ColorModel-5` → `ColorModel`文件夹中找到完成的项目。）切换到`Color.swift`文件，对类进行如下修改（新代码加粗显示）：\n\
  \n```swift\nclass Color: NSObject {\n    dynamic var hue: Float = 0.0\n    dynamic\
  \ var saturation: Float = 0.0\n    dynamic var brightness: Float = 0.0\n```\n\n\
  如果你想知道为何需要做这些修改，请参阅边栏\"Swift 与 KVO\"。\n\n### Swift 与 KVO\n\n键值观察依赖于动态派发方法。通俗地说，当你调用对象的实例方法时，CPU\
  \ 要么直接跳转到对应代码（*静态调用*），要么由调用者查询对象并询问应运行代码的地址（*动态派发*）。后者更为灵活，因为对象可以在方法被调用时动态改变执行的代码。在\
  \ Swift 的前身 Objective-C 中，所有方法和属性都是动态派发的。\n\n动态派发方法的缺点是性能问题。每次调用方法或访问属性时，都需要询问\"\
  方法 X 应执行哪段代码？\"并得到回答，这需要时间。Swift 在可能的情况下倾向于使用静态派发，这也是它通常比 Objective-C 更快的原因。问题在于，像\
  \ KVO 这样依赖动态派发的技术，无法与静态调用的函数兼容。\n\n但这并不意味着 Swift 无法使用动态派发方法。实际上，Swift 一直在使用它们。Swift\
  \ 也能与任何使用动态派发方法的 Objective-C 对象兼容。要在 Swift 对象中使用 KVO，你只需让 Swift 在你感兴趣的属性和方法上启用动态派发。\n\
  \n第一步是让你的类继承自`NSObject`。`NSObject`是所有 Objective-C 类的基类（Swift 没有公共基类）。通过将对象设为`NSObject`的子类，你实际上将其转变为\
  \ Objective-C 类，而非纯 Swift 类。这对你应用的其余部分几乎无影响；如前所述，Swift 使用 Objective-C 对象就像使用原生 Swift\
  \ 对象一样轻松。事实上，它甚至不会给你的对象带来太多改变。但一个重要副作用是：它继承了`NSObject`中定义的所有标准 KVO 方法。\n\n第二步是告诉\
  \ Swift 在你想要观察的属性上专门使用动态派发。这通过`dynamic`关键字实现。在`var`或`func`前加上`dynamic`，即告诉 Swift\
  \ 你希望该属性或函数始终使用动态派发。在底层，动态属性会创建两个隐藏函数（均为动态派发）：一个用于获取值的*getter*函数，和一个用于修改值的*setter*函数。KVO\
  \ 正是通过拦截这个 setter 函数来施展其魔法。\n\n老实说，我不知道 KVO 在 Swift 中的未来会如何。截至本书撰写时，Swift 仍处于 1.0\
  \ 版本，且仍在持续开发中。Swift 官方文档对 KVO 的描述仅为\"待定\"。你仍然可以通过利用 Swift 对 Objective-C 的支持（后者原生支持\
  \ KVO 及类似技术）在 Swift 项目中使用 KVO。但我无法预测 KVO 与原生 Swift 类的命运。Swift 追求高效与特性的力量之间存在着天然博弈。我衷心希望苹果能找到在\
  \ Swift 中高效支持 KVO 的方法——祈祷吧。\n\n第二步相当简单。在你的`ViewController.swift`文件中，找到`viewDidLoad()`函数，修改以下代码，将新代码加粗显示：\n\
  \n```swift\nsuper.viewDidLoad()\ncolorModel.addObserver(self, forKeyPath: \"hue\"\
  ,         options: .allZeros, context: nil)\ncolorModel.addObserver(self, forKeyPath:\
  \ \"saturation\",  options: .allZeros, context: nil)\ncolorModel.addObserver(self,\
  \ forKeyPath: \"brightness\",  options: .allZeros, context: nil)\ncolorModel.addObserver(self,\
  \ forKeyPath: \"color\",       options: .allZeros, context: nil)\ncolorView.colorModel\
  \ = colorModel\n```\n\n每一条语句都将你的`ViewController`对象（`self`）注册为接收对象（`colorModel`）某个属性（键路径）的观察者。\n\
  \n此后，每当`colorModel`中被观察的属性发生变化，你的控制器就会收到`observeValueForKeyPath(_:, ofObject:, change:,\
  \ context:)`调用。第一个参数标识了`ofObject`参数上发生变化的属性。利用这些参数判断变化内容并采取相应操作。\n\n你的新`observeValueForKeyPath(_:,\
  \ ofObject:, change:, context:)`函数将取代旧的`updateColor()`函数，因为它们功能相同。将`updateColor()`替换为代码清单\
  \ 8-2 中的代码。加粗部分表示新增内容。\n\n**代码清单 8-2**. `observeValueForKeyPath(_:, ofObject:, change:,\
  \ context:)`\n\n\n\n```swift\noverride func observeValueForKeyPath(keyPath: String!,\
  \ ofObject object: AnyObject!, \n                 change: [NSObject : AnyObject]!,\
  \ context: UnsafeMutablePointer<Void>) {\n    switch keyPath {\n        case \"\
  hue\":\n            hueLabel.text = \"\\(Int(colorModel.hue))°\"\n        case \"\
  saturation\":\n            saturationLabel.text = \"\\(Int(colorModel.saturation))%\"\
  \n        case \"brightness\":\n            brightnessLabel.text = \"\\(Int(colorModel.brightness))%\"\
  \n        case \"color\":\n            colorView.setNeedsDisplay()\n           \
  \ var red: CGFloat = 0, green: CGFloat = 0, blue: CGFloat = 0, alpha: CGFloat =\
  \ 0\n            colorModel.color.getRed(&red, green: &green, blue: &blue, alpha:\
  \ &alpha)\n            webLabel.text = NSString(format: \"#%02X%02X%02X\",\n   \
  \                                         CInt(red*255),CInt(green*255),CInt(blue*255))\n\
  \        default:\n            break\n    }\n}\n```\n\n这段代码很直观。它检查 `keyPath` 参数是否与您预期会更改的属性名称之一匹配。每个\
  \ `case` 都会更新受该属性变化影响的视图对象。\n\n现在您可以移除所有对 `updateColor()` 的引用。您的 `changeHue(_:)`\
  \ 函数将如下所示：\n\n```swift\n@IBAction func changeHue(sender: AnyObject!) {\n    if let\
  \ slider = sender as? UISlider {\n        colorModel.hue = slider.value\n    }\n\
  }\n```\n\n任何修改数据模型属性的方法都不再需要手动更新视图，因为每当属性发生变化时，数据模型对象会自动通知您的控制器。运行您的应用来试试，如图 图 8-25\
  \ 所示。\n\n![9781484202098_Fig08-25.jpg](img/9781484202098_Fig08-25.jpg)\n\n图 8-25.\
  \ 有缺陷的 KVO\n\n部分功能可以工作，但显然有些地方不对劲。让我们思考一下这个问题。\n\n### 创建 KVO 依赖关系\n\n您的控制器正在接收 `hue`、`saturation`\
  \ 和 `brightness` 属性的变化通知，因为三个标签对象得到了更新。然而，`colorView` 和 `webLabel` 对象从未变化。您的控制器没有收到\
  \ `color` 属性的变化通知。\n\n这是因为没有任何东西会改变 `color` 属性。（它甚至不允许被改变，因为它是一个不可变属性。）问题在于 `color`\
  \ 是一个合成属性值：您编写的代码基于 `hue`、`saturation` 和 `brightness` 的值生成 `color` 值。Swift 和 iOS\
  \ 并不知道这一点。它们只知道没有人设置过 `color` 属性（`colorModel.color = newColor`），因此它永远不会发送任何通知。\n\
  \n有两种直接的方法可以解决这个问题。第一种是在控制器中添加代码，使其在收到其他三个属性（`hue`、`saturation` 或 `brightness`）中任何一个发生变化的通知时，更新与\
  \ `color` 相关的视图。这是一个完全可接受的解决方案，但还有另一种选择。\n\n您可以让 KVO 系统了解某个属性（*派生键*）受到其他属性（其*依赖键*）变化的影响。打开您的\
  \ `Color.swift` 文件并添加这个特殊的类函数：\n\n```swift\nclass func keyPathsForValuesAffectingColor()\
  \ -> NSSet {\n    return NSSet(array: [\"hue\", \"saturation\", \"brightness\"])\n\
  }\n```\n\n现在重新运行您的应用，看看这一个函数带来的差异（见图 图 8-26）。\n\n![9781484202098_Fig08-26.jpg](img/9781484202098_Fig08-26.jpg)\n\
  \n图 8-26. 正常工作下的 KVO 更新\n\n那么，这是怎么回事？特殊的类函数 `keyPathsForValuesAffectingColor()`²\
  \ 告诉 KVO 系统，有三个属性（键路径）会影响 `color` 属性的值：`hue`、`saturation` 和 `brightness`。现在，每当 KVO\
  \ 机制检测到前三个属性中的任何一个发生变化时，它就知道 `color` 也发生了变化，并会为 `\"color\"` 键路径发送第二个通知。\n\n\n\n\
  **提示** KVO 非常灵活，有多种描述依赖键的方式。你还可以编写代码精确决定何时发送何种属性变更通知，以及这些通知应包含哪些信息。如需更深入的说明，请查阅\
  \ Xcode 文档与 API 参考中的*键值观察编程指南*。\n\n我相信你会觉得这很酷，但你可能也认为这并不比你在上一节中编写的 `updateColor()`\
  \ 函数省力多少。你说的没错，确实如此。但这也因为你所有的数据模型变更都来自同一个源头（滑块控件），并且修改数据模型的地方相对较少。然而，一旦情况发生变化，这就完全是另一回事了。\n\
  \n### 多向量数据模型变更\n\n随着应用逐渐成熟，它很可能会变得更加复杂，数据模型的变更也可能发生在更多地方。KVO 的精妙之处在于，变更通知与变更本身发生在同一位置——即数据模型中。\n\
  \n当只有三个滑块操作能改变颜色时，调用 `changeColor()` 是可行的。但如果你新增了第四个也能改变颜色的控件视图对象呢——或者五个、九个呢？\n\n\
  举个例子。你应用中的滑块固然不错，但它们实在是太……二十世纪了。我们生活在触控界面的时代。直接触摸色相/饱和度图表，指向你想要的颜色，难道不是更棒吗？让我们来实现它。\n\
  \n### 处理触摸事件\n\n你应该已经知道如何实现这一点——除非你跳过了第 4 章。如果是这样，请回去现在阅读。为你的自定义 `ColorView` 类添加触摸事件处理方法。这些方法将利用颜色图表内的坐标来选择新的\
  \ `hue`（色相）和 `saturation`（饱和度）。既然你知道该怎么做，那就先在 `ColorView.swift` 中添加三个触摸事件处理方法吧。（你可以在\
  \ `Learn iOS Development Projects` ![image](img/arrow.jpg) `Ch 8` ![image](img/arrow.jpg)\
  \ `ColorModel-6` ![image](img/arrow.jpg) `ColorModel` 文件夹中找到完成的项目。）\n\n```\noverride\
  \ func touchesBegan(touches: NSSet, withEvent event: UIEvent) {\n    changeColorTo(touch:\
  \ touches.anyObject() as? UITouch)\n}\n\noverride func touchesMoved(touches: NSSet,\
  \ withEvent event: UIEvent) {\n    changeColorTo(touch: touches.anyObject() as?\
  \ UITouch)\n}\n\noverride func touchesEnded(touches: NSSet, withEvent event: UIEvent)\
  \ {\n    changeColorTo(touch: touches.anyObject() as? UITouch)\n}\n```\n\n这三个处理器会捕获所有触摸开始、移动和结束事件；提取出单个触摸对象，并将其传递给\
  \ `changeColorTo(touch:)` 函数。\n\n**注意**  请记住，默认情况下，视图对象的 `multipleTouchEnabled`\
  \ 属性为 `false`，这意味着即使你的用户用多根手指触摸视图，其触摸事件处理方法在 `touches` 参数中也只会接收到一个触摸对象。\n\n显然，核心操作都在\
  \ `changeColorTo(touch:)` 函数中。将这两个函数添加到你的类中：\n\n```\nfunc changeColorTo(# touch:\
  \ UITouch? ) {\n    if let contact = touch {\n        changeColorTo(point: contact.locationInView(self))\n\
  \    }\n}\n\nfunc changeColorTo(# point: CGPoint ) {\n    if let color = colorModel\
  \ {\n        let bounds = self.bounds\n        if bounds.contains(point) {\n   \
  \         color.hue = Float((point.x-bounds.minX)/bounds.width*360)\n          \
  \  color.saturation = Float((point.y-bounds.minY)/bounds.height*100)\n        }\n\
  \    }\n}\n```\n\n`changeColorTo(touch:)` 函数只是简单地检查是否存在可用的 `UITouch` 对象。如果存在，它会提取触摸在颜色视图坐标系中的位置，并将其传递给\
  \ `changeColorTo(point:)`。\n\n`changeColorTo(point:)` 函数执行实际工作。它将本地坐标转换为视图中该位置的色相和饱和度，并使用这些值更新数据模型。\n\
  \n请注意，它只需完成这些工作。它并没有向控制器发送动作消息。它本来可以这样做——那也是一种完全合理的实现。但由于你使用了 KVO，所以无需如此。任何对象都可以直接修改数据模型，所有观察者都会收到必要的通知。\n\
  \n试试看。运行你的应用。将亮度滑块从 0% 移开，然后用你的手指（或鼠标）在颜色图表内拖动。当你拖动手指时，色相和饱和度会随之改变，如图 8-27 所示。\n\
  \n![9781484202098_Fig08-27.jpg](img/9781484202098_Fig08-27.jpg)\n\n图 8-27. 将 ColorView\
  \ 转变为控件\n\n### 绑定滑块\n\n唯一不正常的是，当你触摸颜色视图时，色相和饱和度滑块不会移动。这是因为它们仍然仅作为输入。到目前为止，改变色相和饱和度的唯一方式是移动滑块。现在有了修改这些属性的其他途径，你也需要保持滑块与数据模型的同步。\n\
  \n你需要与三个滑块建立连接，因此请将其添加到你的 `ViewController.swift` 文件中：\n\n```\n@IBOutlet var hueSlider:\
  \ UISlider!\n@IBOutlet var saturationSlider: UISlider!\n@IBOutlet var brightnessSlider:\
  \ UISlider!\n```\n\n切换到 `Main.storyboard` Interface Builder 文件，将这些来自视图控制器对象的新输出口连接到三个\
  \ `UISlider` 控件。\n\n在 `ViewController.swift` 中找到 `observeValueForKeyPath(_:,ofObject:,change:,context:)`\
  \ 函数，并插入以下三行粗体代码：\n\n```\nswitch keyPath {\n    case \"hue\":\n        hueLabel.text\
  \ = \"\\(Int(colorModel.hue))°\"\n        hueSlider.value = colorModel.hue;\n  \
  \  case \"saturation\":\n        saturationLabel.text = \"\\(Int(colorModel.saturation))%\"\
  \n        saturationSlider.value = colorModel.saturation\n    case \"brightness\"\
  :\n        brightnessLabel.text = \"\\(Int(colorModel.brightness))%\"\n        brightnessSlider.value\
  \ = colorModel.brightness\n```\n\n现在，当色相值改变时，即使更改源自色相滑块本身，色相滑块也会随之更新。\n\n**警告**\
  \  移动滑块不会导致无休止的消息循环：滑块向控制器发送动作，控制器修改数据模型，数据模型更新滑块，滑块再向控制器发送动作，如此循环。这是因为滑块控件仅在用户拖动它们时发送动作消息，而在其值被程序化设置时不会发送。然而，并非所有视图都如此智能，因此有可能创建无尽的\
  \ MVC 消息循环。解决方法是仅在值实际发生变化时发送动作或通知。\n\n现在，只要数据模型发生变化，颜色视图和滑块都会更新，并且颜色视图可以直接修改数据模型。软件工程师会说，这些视图*绑定*到了数据模型的属性上。*绑定*是数据模型和视图之间直接的双向链接。\n\
  \n### 最终润色\n\n你现在还可以轻松修复应用中的一个恼人错误。应用启动时，色相、饱和度和亮度的显示值（360°、100% 和 100%）是错误的。数据模型中的值是\
  \ 0°、0% 和 0%。切换到 `ViewController.swift`，在 `viewDidLoad()` 末尾添加以下代码：\n\n```\ncolorModel.hue\
  \ = 60\ncolorModel.saturation = 50\ncolorModel.brightness = 100\n```\n\n由于这段代码在你控制器开始观察数据模型变更之后执行，因此这些语句不仅会将你的数据模型初始化为一种非黑色的颜色，还会更新所有相关的视图以匹配该颜色。试试看吧！\n\
  \n在 `Learn iOS Development Projects` ![image](img/arrow.jpg) `Ch 8` ![image](img/arrow.jpg)\
  \ `ColorModel (Icons)` 文件夹中还有一些图标资源。像之前做项目一样，将它们添加到 `Images.xcassets` 项的 `AppIcon`\
  \ 组中。\n\n\n\n"
- "# MVC 设计模式与 iOS 开发实践\n\n`model-view-controller`（模型-视图-控制器）设计模式将提升你的代码质量，使应用更易于编写和维护，并赋予你令人愉悦的、健康的光彩。然而，切勿沉迷于其魔力而成为它的奴隶。\n\
  \n虽然使用设计模式能让你在成为优秀 iOS 开发者的道路上占据优势，但我告诫你不要为了使用而使用它们。实用主义者称这种做法为**过度工程化**。有时简单的解决方案才是最好的。看看这个例子：\n\
  \n```\nclass MyScoreController {\n    var score = 0\n    @IBOutlet var scoreView:\
  \ UILabel!\n\n    @IBAction func incrementScore(sender: AnyObject!) {\n        score\
  \ += 1\n        scoreView.text = \"\\(score)\"\n    }\n}\n```\n\n这个控制器有什么问题？MVC\
  \ 纯粹主义者会指出这里没有数据模型对象。控制器同时扮演了数据模型的角色，存储并操作`score`属性。这既违反了 MVC 设计模式，也违反了单一职责原则。\n\
  \n你想知道我的看法吗？这个解决方案完全没有问题；它只是一个该死的整数！为了保存一个数字而创建一个新类毫无意义，而且这样做会浪费大量时间。\n\n如果将来某天，你的数据模型增长到包含三个整数、一个字符串和一个本地化对象，那么当然可以：重构你的应用，将整数从控制器中提取出来，移到一个真正的数据模型对象中。但在那一天到来之前，不必担心。\n\
  \n有一种称为**敏捷开发**的编程纪律，它重视已完成、可工作的软件，而非计划和完美的设计。在这些情况下，我的建议是使用最简单的解决方案来完成工作。要意识到你何时在\
  \ MVC 设计中走捷径，并制定计划在问题出现时（如果确实会出现）修复它，但不要将自己束缚在一种设计哲学上。设计模式应该让开发更轻松，而不是更困难。\n\n"
- '# 总结


  概括来说，MVC 是好的。


  所有这些计算机科学的学习是否让你想休息一下，听听喜欢的音乐？那么，下一章就是为你准备的。


  ## 练习


  虽然你的`ColorModel`应用非常接近理想化的 MVC 通信模型，但它仍然依赖控制器来观察变化并将更新事件转发给视图对象。基于你目前所做的工作，让颜色视图直接观察数据模型的变化会有多困难？


  其实并不难，这就是本章的练习。修改`ViewController`和`ColorView`，使`ColorView`成为`Color`对象中“颜色”变化的直接观察者。


  这是在具有复杂数据模型和大量自定义视图对象的较大型应用中常见的模式。其优势在于每个视图对象承担起观察特定于该视图的数据模型变化的职责，从而减轻控制器对象的负担。


  你可以在`Learn iOS Development Projects`![image](img/arrow.jpg)`Ch 8`![image](img/arrow.jpg)`ColorModel`![image](img/arrow.jpg)`E1`文件夹中找到我对这个练习的解决方案。


  ¹ 对于这条规则有一个例外，我将在本章末尾进行描述。

  ² 派生属性的名称实际上是函数名的一部分。当你观察一个属性键（例如`anyProp`）时，KVO 会检查你是否实现了名为`keyPathsForValuesAffectingAnyProp()`的类函数。如果你实现了，它会调用该函数来发现其依赖键。


