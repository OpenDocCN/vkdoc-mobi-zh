  ¹ 蒙太古家族和凯普莱特家族是戏剧《罗密欧与朱丽叶》中两个疏远的家族。如果你的阅读清单偏向儒勒·凡尔纳而不是威廉·莎士比亚，我在这里提一下。


  ² 在 Swift 中，你不能将一个`Player`结构体传递给一个期望`Person`结构体的函数，即使`Player`结构体以`Person`结构体开始。你可以在更原始的语言（如
  C）中这样做，许多早期的编程思想正是在 C 中萌芽的。


