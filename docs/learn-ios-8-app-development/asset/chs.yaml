  \ `0` 的“尾部”（或“前导”，任选）对齐约束。\n\n**提示**：无法选中按钮？当 Interface Builder 画布大小改变时，视图对象可能会“掉出”边缘，使其不可见或无法选中。不必担心。场景的所有对象都列在左侧。在视图层次结构中双击缺失的按钮对象；这将在画布中将其选中（即使您看不见它）。使用箭头键移动视图（按住\
  \ Shift 键可加速移动），或使用大小检查器更改其原点，使其在画布中重新可见。\n\n最后这两个约束将最后一个按钮相对于第二个按钮（水平方向）和第三个按钮（垂直方向）进行定位，从而完成网格布局。完成的布局如图\
