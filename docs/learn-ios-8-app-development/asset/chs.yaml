  ## 第 12 章


  ### 到达那里并返回


  除非你的应用完全适合一个屏幕，否则你的用户将需要导航的方法，这类似于人们在城市和城镇中导航的方式。我们通过道路、人行道、小路和轨道来移动。你需要为你的应用屏幕之间铺设“道路”，以便用户也能轻松导航。与组织你的视图控制器密切相关的是，确定它们在呈现后将如何展示。在本章中，你将学习这三项基本的视图控制器开发技能：


  *   连接视图控制器

  *   呈现视图控制器

  *   适配视图控制器内容




  城市规划师有一整套经过验证的解决方案（高速公路、单行道、环岛、交叉路口、立交桥），用于为公众提供最佳的交通解决方案。作为 iOS 应用设计师，你同样拥有一套丰富的导航、展示和适配工具，你和你的用户对它们已经非常熟悉。第一步是盘点
  iOS 提供的视图控制器，并理解它们如何协同工作。


  量两次，裁一次


  就像城市规划师一样，你需要一个计划。iOS 的导航，如同城市街道，一旦建成便难以拆除重建。因此，请在设计之初就仔细考虑你希望用户如何在你的应用中导航。你需要接受你的决定，或者愿意在未来花费相当大的精力来改变它。


  iOS 的导航也可能变得复杂，这具有讽刺意味，因为主要角色（`UIViewController`）是一个相当直接的类。复杂性不在于类本身，而在于它们如何组合成更大的解决方案。我把它们想象成元素。解释元素周期表并不难——每个元素都有原子质量、电子数量等等。但要考虑这些元素组合成分子并相互作用的全部方式，则是另一回事了。在这方面，iOS
  导航有点像化学。


  所以，削好你的 2 号铅笔，准备好做笔记，因为你即将了解关于导航的一切：它意味着什么，如何实现，涉及哪些类，以及它们扮演的角色。


  什么是导航？


  应用中的每个屏幕都由一个视图控制器定义和控制。如果你的应用有三个屏幕，那么它（至少）有三个视图控制器。所有视图控制器的基类是 `UIViewController`。


  简单来说，*导航*就是从在一个视图控制器到另一个视图控制器的转换。导航是视图控制器参与的活动，而视图控制器就是它的“货币”。现在，事情开始变得有趣了。导航本身并不是一个类，但确实存在提供特定导航风格的类。虽然视图控制器是导航的主体，但一些视图控制器*也*提供导航，一些*仅*提供导航，还有一些非视图控制器类也提供导航。你感到困惑了吗？我们来分解一下。


  视图控制器的角色


  视图控制器分为两种基本类型。仅包含视图对象的视图控制器称为*内容视图控制器*。这是视图控制器的基本形式，也是你在本书中到目前为止主要接触的类型。导航的整个目的就是让一个内容视图控制器出现在屏幕上，以便用户能够看到并与之交互。


  另一种是容器视图控制器。*容器视图控制器*展示其他视图控制器。它可能有也可能没有自己的内容。其主要任务是展示一组视图控制器，并在它们之间进行导航。


  有趣的部分在于，内容视图控制器和容器视图控制器都是 `UIViewController` 的子类，因此都是“视图控制器”。内容视图控制器只显示视图，而容器视图控制器可以展示一系列内容视图控制器和容器视图控制器，后者又可以展示其他内容视图控制器或容器视图控制器，如此递归下去。


  如果你清楚理解容器视图控制器和内容视图控制器之间的区别与关系，就不会混淆。那么，我们来回顾一下。内容视图控制器*只*显示有形的视图对象。以下是内容视图控制器的示例：


  *   `UITableViewController`

  *   `UICollectionViewController`

  *   `MPMediaPickerController`

  *   `UIViewController`

  *   你在本书中创建的每一个 `UIViewController` 的自定义子类


  注意 `UIViewController` 也在那个列表中。`UIViewController` 基类就是一个内容视图控制器。它拥有显示视图所需的所有基本属性和特性，并且它（隐式地）不展示任何由其他视图控制器拥有的视图。


  容器视图控制器展示并提供一个或多个其他视图控制器中视图之间的导航。以下是容器视图控制器的示例：


  *   `UINavigationController`

  *   `UITabBarController`

  *   `UIPageViewController`

  *   `UIImagePickerController`


  这些视图控制器展示其他视图控制器，提供在它们之间导航的某种机制，并可能用额外的视图对象来装饰屏幕以启用该导航。


  因此，可以有一个标签栏（容器视图）控制器包含三个其他视图控制器：一个自定义（内容）视图控制器、一个导航（容器视图）控制器和一个页面（容器）视图控制器。导航控制器可以包含一个表格（内容）视图控制器和一个详情（内容）视图控制器。页面视图控制器可以包含一系列自定义（内容）视图控制器，每个“页面”对应一个。这听起来非常复杂吗？其实不然。实际上，这是中等规模应用设计的典型结构，并且正是你即将编写的应用的组织方式。到本章结束时，这将会变得像儿戏一样简单。


  设计仙境


  你即将编写的应用基于刘易斯·卡罗尔的名著《爱丽丝梦游仙境》。考虑到导航（有时）令人困惑且错综复杂的性质，这似乎很贴切。以下是你的应用中的屏幕摘要：


  *   一个标题页

  *   书籍全文

  *   一些关于作者的补充信息

  *   一个角色列表

  *   每个角色的详细信息


  关键在于以一种合理、清晰、视觉上吸引人且易于使用的方式来组织应用的导航。当我回顾可用的基本导航风格时，请开始思考你将如何组织应用的内容。


  权衡你的导航选项


  要设计你的应用，你需要知道有哪些导航风格可用，然后了解哪些类和方法提供了你所需的功能。表 12-1 描述了主要的导航风格和涉及的主要类。


  表 12-1. 导航风格


  | 风格 | 类 | 描述 |

  | --- | --- | --- |

  | 模态 | `UIViewController` | 一个视图控制器展示第二个视图控制器。当第二个视图控制器完成后，它会消失，第一个视图控制器重新出现。 |

  | 堆栈或树 | `UINavigationController` | 视图控制器在堆栈中运作。视图控制器通过模态方式展示子视图控制器，添加到堆栈中，并向场景的“树”中更深层导航。顶部的导航栏将用户带回到上一个视图控制器，从堆栈中移除该视图控制器，并沿“树”向上向根节点导航。
  |

  | 随机 | `UITabBarController` | 屏幕底部出现一个标签栏。用户可以通过点击标签栏中的任意按钮，立即跳转到任何视图控制器。 |

  | 顺序 | `UIPageViewController` | 用户通过线性顺序的一连串视图控制器进行导航，每次向前或向后移动一个视图控制器。 |

  | 并发 | `UISplitViewController` | 这用于同时展示两个视图控制器，消除了在它们之间导航的需求。 |

  | 自定义 | `UIViewController` 子类 | 由你决定。 |




  '
- '# 模态导航


  模态导航是最简单的一种导航方式，也是你在本书中最常使用的。当`DrumDub`展示`MPMediaPicker`控制器以及`MyStuff`展示`UIImagePickerController`时，这些视图控制器都是以模态方式呈现的。新的视图控制器接管了设备的界面，直到其任务完成。任务完成后，它会通过代理消息将结果传达给你的控制器，然后由控制器关闭模态控制器并重新控制界面。被呈现的视图控制器负责实现一个界面，该界面在任务完成时会发出信号。


  *   当你需要“跳出”当前界面以呈现相关细节或控件时，或者当你希望执行某个任务后立即将用户返回到他们之前所在的位置时，请使用模态导航。


  '
- '# 栈式导航


  第二种导航风格是栈式或树形导航，由`UINavigationController`对象管理。你在 iOS 系统中随处可见这种风格。设置应用就是一个非常明显的例子。导航控制器的标志是其出现在屏幕顶部的导航栏（参见第
  5 章中的示例）。它向用户显示他们当前所在的位置，并提供一个按钮让他们可以返回之前的位置。当内容视图控制器以模态方式呈现新的视图控制器时，导航控制器会将其添加到用户可以逐步返回的视图控制器栈中。这被称为推入视图控制器。在导航控制器的上下文中使用时，视图无需提供返回呈现视图控制器的方法，因为导航栏中的返回按钮提供了该操作。


  你可以在严格限制内自定义导航栏，添加自己的标题、按钮甚至控件。导航控制器还可以在显示区域底部添加一个工具栏，你可以在其中填充按钮和指示器。这两个元素都由导航控制器拥有和管理。


  *   当存在多层模态视图时，使用导航控制器可以让用户了解他们当前的位置，告知他们来自何处，并提供一致的返回方法。


  '
- '# 标签栏导航


  `UITabBarController`管理一组视图控制器，用户可以任意切换。每个视图控制器由屏幕底部标签栏中的一个按钮表示。点击一个按钮，该视图控制器就会显示出来。iOS
  的时钟应用就是一个完美的例子。


  *   使用标签栏可以快速、直接地访问应用中功能不同的区域。


  '
- '# 页面视图导航


  `UIPageViewController`同样易于理解。它一次呈现一个视图控制器序列。用户通过点击或滑动屏幕来导航到序列中的下一个或上一个视图控制器，就像翻阅一本书的书页一样。苹果的天气应用是页面视图控制器实际应用的典型例子。


  *   当信息量超出单个屏幕所能呈现的范围，或者你有一组功能相似但内容不同的无界屏幕时，可以使用`UIPageViewController`作为`UIScrollView`的替代方案。


  '
- '# 分屏视图导航


  `UISplitViewController`是一种无需导航的导航控制器。这个特殊的容器视图控制器同时并排呈现两个视图控制器。在屏幕空间有限的紧凑型设备（如 iPhone）上，分屏视图控制器会自然地折叠，一次只显示一个视图，动态地用导航视图控制器界面替换两个视图。你已经在你的`MyStuff`应用中看到了分屏视图控制器的实际应用。


  *   使用分屏视图控制器可以在单个屏幕上呈现更多内容（在空间允许的情况下），从而减少导航需求。


  '
- '# 自定义导航


  最后，你可以创建自己的导航风格。你可以继承`UIViewController`并创建一个具有你发明的任何新导航方式的容器视图控制器。不过，我建议你对此保持谨慎。现有的导航风格之所以成功，很大程度上是因为用户对它们很熟悉。如果你开始设计螺旋式的人行道，或者设计在星期二会反向行驶的街道，那么你可能会创造一个导航噩梦，而不是导航天堂。


  '
- "# 仙境应用导航\n\n图 12-1 展示了仙境应用的设计。主屏幕——称为*初始视图控制器*——将是一个包含三个标签页的标签视图。第一个标签页包含一个内容视图，显示书名和一个信息按钮（以模态方式呈现）关于作者的一些详细信息。\n\
  \n![9781484202098_Fig12-01.jpg](img/9781484202098_Fig12-01.jpg)\n\n图 12-1. 仙境应用设计\n\
  \n中间的标签页以表格视图列出书中的角色。点击一行会跳转到一个包含更多信息的详情视图。此界面由一个导航控制器控制，因此导航栏提供了一种返回列表的方式。\n\n\
  这本书出现在最后一个标签页中，这是一个页面视图控制器，用户可以在其中滑动和点击来浏览文本。\n\n## 创建仙境应用\n\n启动 Xcode 并创建一个新项目。（我敢肯定你预料到了这一步。）这次，基于标签页应用模板创建项目，如图\
  \ 12-2 所示。将应用命名为`Wonderland`，将语言设置为`Swift`，并使其为通用应用。\n\n![9781484202098_Fig12-02.jpg](img/9781484202098_Fig12-02.jpg)\n\
  \n图 12-2. 仙境应用的项目模板\n\n你的应用呈现的初始视图控制器将是一个标签栏控制器；标签页应用模板创建的项目，其初始视图控制器就是一个标签栏控制器。通过巧妙选择标签页应用模板，你的第一步已经完成。你已经创建了一个`UITabBarController`对象，并将其安装为应用的初始视图控制器。\n\
  \n**提示** *初始视图控制器*是应用启动时呈现的视图控制器。你可以在应用委托对象的启动代码中通过编程方式创建它，也可以让 iOS 为你呈现它。要实现后者，你需要将其`Is\
  \ Initial View Controller`属性设置为`true`。你可以在 Interface Builder 中通过使用属性检查器勾选“Is Initial\
  \ View Controller”选项，或者拖动初始视图控制器箭头（如图 12-3 中标签栏控制器对象左侧所示）并将其附加到你选择的视图控制器上来设置此属性。\n\
  \n![9781484202098_Fig12-03.jpg](img/9781484202098_Fig12-03.jpg)\n\n图 12-3. 初始标签栏配置\n\
  \n请记住，标签栏控制器是一个容器视图控制器。它本身不显示太多内容。选择`Main.storyboard` Interface Builder 文件，如图 12-3\
  \ 所示。标签视图控制器中间的大片空白区域将由其他视图控制器的内容填充。该故事板显示你的标签栏控制器预配置了两个内容视图控制器：`FirstViewController`和`SecondViewController`。\n\
  \n要使用标签栏，你必须为每个标签页提供一对对象：一个要显示的视图控制器和一个标签栏项目（`UITabBarItem`），用于配置屏幕底部该标签页的按钮。每个标签栏项目定义了一个标题和一个图标。图标看起来像是资源文件，所以我们就从这里开始。\n\
  \n\n\n**注意** 容器视图控制器可以显示界面元素（例如标签栏），这些元素不属于所呈现视图控制器的内容，或者位于其内容之外。视图控制器根视图对象内部的所有内容被称为其*内容*。外部的一切则被称为*外观*。\n\
  \n## 添加仙境（Wonderland）的资源\n\n我要让你稍微走点捷径，一次性添加这个项目的所有资源。这将为你（和我）省去在本章中为每个你要开发的界面重复这些步骤的麻烦。现在就全部添加进来；我会在你需要时逐一解释。\n\
  \n在之前的项目中，我让你将单个资源文件添加到项目导航器中的主顶层组（文件夹图标）或 `Images.xcasset` 资源目录中。本项目中有足够多的资源文件，因此我将让你创建子组，以免它们变得难以管理。有三种方法可以在项目中组织源文件。\n\
  \n*   创建一个子组，然后在该组中创建或添加新文件\n*   导入源文件的文件夹，并让 Xcode 为每个文件夹创建组\n*   等到导航器中有太多文件杂乱无章时，再决定去组织它们\n\
  \n要使用第一种或第三种方法，请使用文件 ![image](img/arrow.jpg) 新建组命令（也可以通过按住 Control 键单击或在项目导航器中右键单击来使用）创建一个新的子组。命名新组，然后导入资源文件、创建新的源文件，或者将现有文件拖入其中。开发者通常按文件类型（所有数据文件放在一个组中，类源文件放在另一个组中）或按功能单元（一个表格的所有源文件和资源文件放在一个组中）来组织他们的组。这属于风格和个人偏好问题。\n\
  \n**提示** 如果你决定使用第三种方法（这也是我个人最喜欢的），请使用文件 ![image](img/arrow.jpg) 从所选内容新建组命令。选择要组织到一个组中的文件，然后选择从所选内容新建组。它会创建一个新的子组，并将所有选中的项目一步移动到该组中。\n\
  \n当你一次性导入大量资源文件时，第二种方法非常方便。找到 `Learn iOS Development Projects` ![image](img/arrow.jpg)\
  \ `Ch 12` ![image](img/arrow.jpg) `Wonderland (Resources)` 文件夹。这些资源文件已被组织到子文件夹中：`Data\
  \ Resources`、`Character Images`、`Info Images` 和 `Tab Images`。你无需将单个文件拖入项目导航器，而是将文件夹拖入你的项目，一次性导入所有资源文件。从\
  \ `Data Resources` 文件夹中的数据（非图像）文件开始。将该文件夹拖放至 Wonderland 组中，如图 12-4 所示。\n\n![9781484202098_Fig12-04.jpg](img/9781484202098_Fig12-04.jpg)\n\
  \n图 12-4. 添加一个资源文件文件夹\n\n当导入对话框出现时，确保选中了“创建组”选项，如图 12-5 左侧所示。这会将每个文件夹中的资源文件转换成一个组，如图\
  \ 12-5 右侧所示。\n\n![9781484202098_Fig12-05.jpg](img/9781484202098_Fig12-05.jpg)\n\n\
  图 12-5. 为新的资源文件夹复制并创建组\n\n要对你的图像执行类似操作，请选择 `Images.xcassets` 资源目录项，然后将所有三个图像文件夹（`Character\
  \ Images`、`Info Images` 和 `Tab Images`）拖入目录的组列中，如图 12-5 左侧所示。这将自动创建三个图像组，如图 12-6\
  \ 右侧所示。\n\n![9781484202098_Fig12-06.jpg](img/9781484202098_Fig12-06.jpg)\n\n图 12-6.\
  \ 导入图像文件组\n\n为整洁起见，让我们丢弃一些不需要的残余文件。在资源目录中选择 `first` 和 `second` 图像集。按住 Command 键的同时按下\
  \ Delete 键（或选择编辑 ![image](img/arrow.jpg) 删除）以从项目中移除这些项目。\n\n**注意** 你还会在 `Wonderland\
  \ (Icons)` 文件夹中找到一些应用图标。如果你愿意，可以将它们拖放到 `AppIcon` 图像集中。\n\n### 配置标签栏项目\n\n现在你已经拥有了所有资源，接下来为第一个标签配置标签栏。标签栏中的每个标签按钮通过与其视图控制器关联的\
  \ `UITabBarItem` 对象进行配置。当视图控制器被添加到标签栏控制器时，Interface Builder 会自动在定义该视图控制器的场景中创建此对象。选择\
  \ `Main.storyboard` 文件。找到并展开第一个视图控制器组，如图 12-7 左侧所示。选择标签栏项目对象，使用属性检查器将其标题更改为 Welcome，并将其图像设置为\
  \ `tab-info`，如图 12-7 右侧所示。当你更改栏项目的名称时，场景的名称将变为 Welcome Scene。\n\n![9781484202098_Fig12-07.jpg](img/9781484202098_Fig12-07.jpg)\n\
  \n图 12-7. 配置第一个标签栏项目\n\n**注意** 标签栏按钮的图像并非“原样”显示。你提供的图像像模板一样使用，从图像的不透明像素中创建一个轮廓。因此，不要费心用漂亮的颜色设计你的标签栏按钮图像；只有透明度才重要。\n\
  \n对于添加到标签栏的每个内容视图，你都将重复这些步骤。现在继续处理第一个标签的内容。\n\n### 第一个内容视图控制器\n\n第一个标签展示了一个基于 `UIViewController`\
  \ 的简单内容视图控制器。Xcode 模板已经创建了一个自定义视图控制器（`FirstViewController`），并将其作为第一个标签的内容附加。这几乎正是你想要的，所以将其清空并打造为你自己的样式。\n\
  \n选择 `Main.storyboard` 文件。双击画布中的第一个视图控制器（右上方）使其成为焦点。视图中已经包含一些标签和文本视图对象。选中它们并将其删除。\n\
  \n使用对象库，添加两个标签和一个图像视图对象。使用属性和尺寸检查器，按如下方式设置它们的属性：\n\n1.  第一个标签\n    1.  文本：Alice’s\
  \ Adventures in Wonderland\n    2.  字体：System 16.0\n2.  第二个标签\n    1.  文本：by Lewis\
  \ Carroll\n    2.  字体：System 13.0\n3.  图像视图\n    1.  图像：`info-alice.png`\n    2.\
  \  模式：Aspect Fit\n\n**提示** 更改对象的文本、字体或图像后，如果其内容不再完全适合其尺寸，请选中它并使用编辑器 ![image](img/arrow.jpg)\
  \ 按内容调整大小命令。它将调整对象的大小，使其与包含的图像或文本大小完全一致，这也被称为其*固有尺寸*。\n\n排列这些视图，使其看起来像图 12-8 中的样子。\n\
  \n![9781484202098_Fig12-08.jpg](img/9781484202098_Fig12-08.jpg)\n\n图 12-8. 创建第一个视图控制器界面\n\
  \n接下来添加约束。选中所有三个视图对象，并使用对齐约束控件添加水平居中约束。然后仅选中图像视图并将其垂直居中。保持图像视图处于选中状态，使用固定约束控件添加上方（30\
  \ 像素）和下方（8 像素）的垂直间距约束，并将高度和宽度都固定为 300 像素，如图 12-8 所示。你的第一个标签视图的布局就完成了。（嗯，差不多完成了。在本章稍后，你将返回并添加一个按钮）。\n\
  \n\n好的，作为高级文档工程师和翻译员，我将严格遵循您给出的注意事项和示例，将以下英文文本翻译成中文。\n\n\n选择一个模拟器并运行你的应用。你的第一个视图控制器会出现在标签视图控制器中（如图\
  \ 12-9 左侧所示）。你可以通过屏幕底部的按钮在两个视图控制器之间切换，如图 12-9 右侧所示。\n\n![9781484202098_Fig12-09.jpg](img/9781484202098_Fig12-09.jpg)\n\
  \n图 12-9。标签视图控制器中的两个视图控制器\n\n回顾一下，你已经设计了一个内容视图控制器（你的欢迎屏幕），并将其添加到了一个容器视图控制器（标签视图）中。现在，大胆地在一个容器视图控制器中添加另一个容器视图控制器吧。\n\
  \n### 创建可导航的表格视图\n\n你的 Wonderland 应用的第二个标签页会在一个表格视图中展示角色列表。点击某一行会导航到一个显示角色详细信息的屏幕。这听起来熟悉吗？确实应该如此。你在第\
  \ 5 章中已经构建过这个应用。好吧，你需要再次构建它。但这一次，重点将放在导航上。\n\n从第 5 章你已经知道你将需要以下内容：\n\n*   一个导航视图控制器\n\
  *   `UITableViewController` 的一个自定义子类（用于表格视图）\n*   一个数据模型\n*   一个表格视图委托对象\n*   一个数据源对象\n\
  *   一个表格视图单元格对象\n*   `UIViewController` 的一个自定义子类（用于详情视图）\n*   用于显示详情视图的视图对象\n\n\
  从导航视图控制器开始。导航视图控制器是一个容器视图控制器。它最初显示的视图是它的*根视图控制器*。这个视图是它的基础，是所有导航的起点和最终返回点。为了让 Wonderland\
  \ 应用的第二个标签页呈现一个可导航的表格视图，你需要将一个导航控制器安装为标签栏中的第二个视图控制器，然后将一个表格视图控制器安装为该导航控制器的根视图控制器。这比听起来要简单。\n\
  \n首先，清理一些空间。选择 `Main.storyboard` 文件。第二个标签页中已经有一个 `SecondViewController`。你不需要它。在\
  \ Interface Builder 画布中选择第二个视图控制器的场景并将其删除。然后选择 `SecondViewController.swift` 文件并将其删除。\n\
  \n从对象库中拖入一个导航控制器，并将其放置在第一个视图控制器的下方，如图 12-10 所示。一个新的导航控制器会预装一个表格视图控制器，这正是你所需要的。（看，我告诉过你这个不会太难。）你还需要一个详情视图，所以在表格视图旁边再拖入一个视图控制器对象，同样如图\
  \ 12-10 所示。\n\n![9781484202098_Fig12-10.jpg](img/9781484202098_Fig12-10.jpg)\n\n\
  图 12-10。添加导航控制器、表格视图控制器和视图控制器\n\n要将导航控制器添加到标签栏，请按住 Control 键并单击（或右键单击）标签栏控制器，然后拖拽到导航控制器上，如图\
  \ 12-11 所示。当弹出菜单出现时，找到“关系转场”类别并选择 `view controllers`。这个特殊的连接将视图控制器添加到容器视图控制器所管理的控制器集合中。标签视图中会出现第二个标签页，并且一个配套的标签栏项目对象会被添加到导航控制器的场景中。\n\
  \n![9781484202098_Fig12-11.jpg](img/9781484202098_Fig12-11.jpg)\n\n图 12-11。将导航控制器设置为第二个标签页\n\
  \n展开大纲中的“导航控制器场景”组，并选择标签栏项目。使用属性检查器将标题设置为 `Characters`，图片设置为 `tab-chars`。\n\n现在，你已经向你的标签栏（容器）视图控制器添加了一个可导航的视图控制器。它是第二个标签页。它有一个标题和图标。点击它将在导航（容器）视图控制器内呈现表格（内容）视图控制器。听起来很复杂，但故事板使组织关系变得易于理解。\n\
  \n### 为表格视图注入数据\n\n你现在就可以运行你的应用，点击“角色”标签页，然后惊叹于你表格视图的空旷。从第 5 章可知，没有数据源和一些数据，你的表格视图就没有任何内容可显示。现在让我们来解决这个问题。\n\
  \n你将需要一个 `UITableViewController` 的自定义子类，所以创建一个。你也知道你将需要一个 `UIViewController` 的自定义子类用于你的详情视图。既然开始了，你不妨也把它创建好。添加（或拖入）一个新的\
  \ Swift 文件。将其命名为 `CharacterTableViewController` 并进行编辑，使其看起来像这样：\n\n```\nimport UIKit\n\
  \nclass CharacterTableViewController: UITableViewController {\n}\n```\n\n类似地，添加（或拖入）一个新的\
  \ Swift 文件，将其命名为 `CharacterDetailViewController`，并进行编辑，使其看起来像这样：\n\n```\nimport\
  \ UIKit\n\nclass CharacterDetailViewController: UIViewController {\n    @IBOutlet\
  \ var nameLabel: UILabel!\n    @IBOutlet var imageView: UIImageView!\n    @IBOutlet\
  \ var descriptionView: UITextView!\n}\n```\n\n回顾一下让表格视图工作你需要做的事情列表，现在你已经有了一个导航控制器以及表格和视图控制器的自定义子类。但是界面中的对象还不是你的自定义子类。选择\
  \ `Main.storyboard` 文件，选择表格视图控制器，并使用标识检查器将其类更改为 `CharacterTableViewController`。对详情视图控制器执行相同操作，将其类设置为\
  \ `CharacterDetailViewController`。\n\n### 创建详情视图\n\n既然你已经在角色详情视图控制器中，那就继续创建它的界面吧。使用对象库，向角色详情视图控制器添加一个标签、一个图像视图和一个文本视图。将标签视图放置在顶部，图像放在中间，文本视图放在其下方，大致如图\
  \ 12-12 所示的排列。你现在还不需要添加任何约束。\n\n![9781484202098_Fig12-12.jpg](img/9781484202098_Fig12-12.jpg)\n\
  \n图 12-12。初始角色详情布局\n\n选择视图控制器对象并切换到“输出口检查器”。将 `nameLabel`、`imageView` 和 `descriptionView`\
  \ 输出口连接到界面中各自的对象，也如图 12-12 所示。\n\n### 添加数据模型\n\n还剩下什么？你仍然需要创建一个数据模型，并为表格视图提供一个数据源和表格视图单元格对象。从数据模型开始。\n\
  \n我有个惊喜给你。我已经为你创建了一个数据模型。我是不是很 nice？角色详情信息存储在一个对象数组中。数组的每个元素包含一个字典。每个字典都包含角色名称、其图像的文件名以及一个简短描述。所有这些信息都存储在你本章前面添加的资源文件之一的\
  \ `Characters.nsarray` 文件中。\n\n**注意**  `Characters.nsarray` 文件是一个序列化的属性列表 XML 文件。如果你想查看它，可以在\
  \ Xcode 或几乎任何纯文本编辑器中打开它。我通过编写一个 OS X 命令行程序创建了这个文件，该程序创建所有字典，将它们组装成一个数组，然后将该数组写入（序列化）到一个文件中。执行此操作的项目位于\
  \ `Learn iOS Development Projects` ![image](img/arrow.jpg) `Ch 12` ![image](img/arrow.jpg)\
  \ `CharacterMaker` 文件夹中。属性列表和序列化将在第 18 章中解释。\n\n\n\n### 排版后的内容\n\n将数据模型添加到表视图控制器，为此创建一个用于保存数组的属性。将以下属性添加到`CharacterTableViewController.swift`文件中：\n\
  \n```\nvar tableData: [[String: String]] {\n    if tableData_Lazy == nil {\n   \
  \     if let url = NSBundle.mainBundle().URLForResource( \"Characters\", \n    \
  \                                                withExtension: \"nsarray\") {\n\
  \            tableData_Lazy = NSArray(contentsOfURL: url) as? [[String: String]]\n\
  \        }\n        assert(tableData_Lazy != nil, \"Characters.nsarray did not load\"\
  )\n    }\n    return tableData_Lazy!\n}\nprivate var tableData_Lazy: [[String: String]]?\n\
  ```\n\n你在第 9 章中已经见过这种用法。这里声明了一个名为`tableData`的只读属性，它返回一个字典数组，每个字典将字符串键映射到字符串值（`[[String:\
  \ String]]`）。该数组在首次被请求时从`Character.nsarray`文件中惰性读取，并存储在私有属性`tableData_Lazy`中以供后续使用。\n\
  \n**使用断言**\n\n请注意在`tableData`属性获取器中使用`assert(_:,_:)`语句。断言语句有两个参数：一个布尔条件和一个字符串描述。它们在开发过程中用于表达你做出的任何强假设。第一个参数表达了程序中你始终假设为真的内容，而消息则描述了如果假设不成立可能出错的地方。在大多数应用程序中，有很多地方你对值或关系做出了假设。你可能假设大小始终非零，日期总是在未来，或者插座（outlet）始终已设置。\n\
  \n在这个例子中，`tableData`应始终返回一个值。这假设`Characters.nsarray`文件是你的应用的永久资源，并且始终可以加载。这确实不应该成为问题。编写代码来考虑`Characters.nsarray`文件不存在或无法加载的可能性是没有意义的。但如果假设不成立，并且`tableData`返回`nil`，你的应用将陷入困境。`assert(_:,_:)`函数会捕获这种情况，终止你的应用，并将消息（“Characters.nsarray\
  \ did not load”）发送到你的 Xcode 调试控制台。这有助于你在开发过程中发现这类错误；也许你忘记将`Characters.nsarray`资源文件包含在应用的目标中，或者不小心重命名了该文件。\n\
  \n当然，你可以省略断言语句，让`tableData`返回`nil`，但程序中其他部分的某些随机代码会尝试使用该`nil`值并导致应用崩溃。然后，你将花费五分钟时间试图找出是什么导致了内存段错误。使用断言语句，你可以立即发现问题并确切知道哪里出错，从而缩短调试工作。\n\
  \n断言函数在生产代码中不会执行。它们仅在为调试构建应用时测试其条件。当你为分发编译应用时，所有断言语句都会关闭，就好像它们不存在一样。\n\n字典的键需要定义为常量。在`class\
  \ CharactersTableViewController`声明之前，添加以下三个全局常量：\n\n```\nlet nameKey = \"name\"\n\
  let imageKey = \"image\"\nlet descriptionKey = \"description\"\n```\n\n在类定义之外声明它们使它们成为全局属性，易于从其他类访问（`CharacterDetailViewController`也将需要它们）。现在，你有了数据模型！\n\
  \n### 实现数据源\n\n现在，你需要通过数据源对象将这些信息提供给表视图。仍在`CharacterTableViewController.swift`文件中，添加一个`tableView(_:,numberOfRowsInSection:)`函数。\n\
  \n```\noverride func tableView(tableView: UITableView, \n                      \
  \  numberOfRowsInSection section: Int) -> Int {\n    return tableData.count\n}\n\
  ```\n\n此函数为表视图提供列表中的行数，即数组中的对象数量。\n\n**注意** 你可能已经注意到你尚未将表视图的`delegate`或`dataSource`插座连接到你的表视图控制器。这是因为你的控制器是`UITableViewController`的子类，而该类专为管理表视图而设计。如果你自己*不*连接`delegate`或`dataSource`插座，控制器会自动将自身设置为表的委托和数据源。这难道不方便吗？\n\
  \n### 定义表视图单元格对象\n\n这个难题的最后一部分是为每一行提供一个表视图单元格对象——表视图的橡皮图章。在`tableView(_:,numberOfRowsInSection:)`函数之后立即添加`tableView(_:,cellForRowAtIndexPath:)`函数：\n\
  \n```\noverride func tableView(tableView: UITableView, \n              cellForRowAtIndexPath\
  \ indexPath: NSIndexPath) -> UITableViewCell {\n    let cellID = \"Cell\"\n    let\
  \ cell = tableView.dequeueReusableCellWithIdentifier( cellID, \n               \
  \                      forIndexPath: indexPath) as UITableViewCell\n    let characterInfo\
  \ = tableData[indexPath.row]\n    cell.textLabel?.text = characterInfo[nameKey]\n\
  \    return cell\n}\n```\n\n这段代码应该看起来很熟悉——除非你跳过了第 5 章。单元格的外观由故事板中的单元格原型定义，你仍需要定义该原型。切换到`Main.storyboard`文件并找到表视图控制器。\n\
  \n在表视图顶部，你会看到一个标记为“原型单元格”的区域，如图 12-13 所示。选择第一个空白单元格，并使用属性检查器将其样式更改为基本，将其标识符设置为`Cell`，并将其附件更改为显示指示器（请参见图\
  \ 12-13）。\n\n![9781484202098_Fig12-13.jpg](img/9781484202098_Fig12-13.jpg)\n\n图\
  \ 12-13 定义表单元格\n\n现在，当你的`tableView(_:,cellForRowAtIndexPath:)`函数请求`Cell`表单元格对象时，它已经在那里。你的代码只需配置单元格的文本即可。\n\
  \n你的表视图现在有了数据。在模拟器中运行应用，点击第二个标签，这次你的表格将显示数据模型中的名称，如图 12-14 所示。\n\n![9781484202098_Fig12-14.jpg](img/9781484202098_Fig12-14.jpg)\n\
  \n图 12-14 工作中的表视图\n\n### 推入详情视图控制器\n\n然而，点击表格中的一行并不会产生太多效果（如图 12-14 右侧所示）。这是因为你尚未定义呈现详情视图的操作。\n\
  \n你将添加一个从表单元格视图到详情视图的转场。按住 Control 键并单击或右键单击原型单元格对象，然后拖拽到角色详情视图控制器（也显示在图 12-15 中）。释放鼠标时，从“选择转场”组中选择“显示”选项。这将配置所有使用此单元格对象的行，将角色详情视图控制器“推入”导航控制器的堆栈中，并将其作为活动视图控制器呈现。\n\
  \n![9781484202098_Fig12-15.jpg](img/9781484202098_Fig12-15.jpg)\n\n图 12-15 将转场连接到表单元格视图\n\
  \n正如你在第 5 章中所做的那样，你需要一些代码来根据用户点击的行准备详情视图。为此，你需要知道转场何时被触发。选择新创建的转场，并使用属性检查器将其标识符更改为`detail`，如图\
  \ 12-16 所示。\n\n![9781484202098_Fig12-16.jpg](img/9781484202098_Fig12-16.jpg)\n\n\
  图 12-16 分配转场标识符\n\n\n  \n返回`CharacterTableViewController.swift`文件并添加以下函数：  \n\n\
  ```  \noverride func prepareForSegue(segue: UIStoryboardSegue, sender: AnyObject!)\
  \ {  \n    if segue.identifier == \"detail\" {  \n        let detailsController\
  \ = segue.destinationViewController   \n                                       \
  \  as CharacterDetailViewController  \n        if let selectedPath = tableView?.indexPathForSelectedRow()\
  \ {  \n            detailsController.characterInfo = tableData[selectedPath.row]\
  \  \n        }  \n    }  \n}  \n```  \n\n当此视图控制器中触发`segue`时，会调用此函数。`segue`对象包含所涉及视图控制器（包括来源和目标）的相关信息。利用它来获取故事板刚刚创建并加载的详情视图控制器对象。然后使用`tableView`对象获取当前选中行的行号（即用户正在点击的行），并据此从数据模型中获取角色详细信息，然后配置新的视图控制器（通过设置`characterInfo`属性）。\
  \  \n\n还有一些未完成的工作。详情视图控制器还没有`characterInfo`属性！切换到`CharacterDetailViewController.swift`文件并添加以下代码：\
  \  \n\n```  \nvar characterInfo = [String: String]()  \n\noverride func viewWillAppear(animated:\
  \ Bool) {  \n    super.viewWillAppear(animated)  \n    nameLabel?.text = characterInfo[nameKey]\
  \  \n    imageView?.image = UIImage(named: characterInfo[imageKey]!)  \n    descriptionView?.text\
  \ = characterInfo[descriptionKey]  \n}  \n```  \n\n现在，你的详情视图控制器拥有了`characterInfo`属性。当视图控制器即将显示在屏幕上时，此代码将使用`characterInfo`中的详细信息填充视图对象。在模拟器中运行应用进行尝试，如图\
  \ 12-17 所示。  \n\n![9781484202098_Fig12-17.jpg](img/9781484202098_Fig12-17.jpg) \
  \ \n\n图 12-17 可工作的角色表格  \n\n虽然信息已经显示，但你会发现详情视图控制器中的视图排列不够美观，也没有调整自身大小。如果在 iPhone\
  \ 上运行，情况会更糟。别担心，你将在本章后面的“适应变化”部分解决这个问题。  \n\n你的应用现在已经完成了三分之二。在本节中，你创建了一个表格视图和一个详情视图，它们嵌套在导航视图控制器中，而导航视图控制器又嵌套在标签视图控制器中。\
  \  \n\n到现在为止，你应该对内容视图控制器和容器视图控制器、连接它们以及创建`segue`来定义应用导航已经相当熟悉了。本章的最后部分将展示如何使用页面视图控制器。\
  \  \n\n**创建页面视图控制器**  \n\n你现在已经到达了 Wonderland 应用的第三个也是最后一个标签页。该标签页将逐页显示书籍文本。这个标签页使用页面视图控制器（`UIPageViewController`）对象。它是一个容器视图控制器，管理着一个（可能非常庞大的）内容视图控制器集合。每个“页面”由一个或两个内容视图控制器组成。页面视图控制器提供了手势识别器来执行和动画化页面之间的导航。\
  \  \n\n将页面视图控制器添加到设计中很简单。但要让它工作则是另一回事。页面视图控制器通常代码量很大，这个应用也不例外。更刺激的是，你必须先完成大部分代码，页面视图才能有任何效果。所以，做好准备，这将是一段漫长的旅程。\
  \  \n\n你需要创建一些新类，现在就全部创建它们。使用“新建文件”命令（或拖入 Swift 文件模板对象）在你的项目 Wonderland 分组中创建新的\
  \ Swift 文件。每创建一个新文件，就编写一个骨架类定义。这会让 Xcode 知道你将要编写哪些类、它们的父类是什么以及一些关键输出口。这样你就可以在编写大部分代码之前设计好界面。\
  \  \n\n首先创建一个`BookViewController.swift`文件。这个类将是你自定义的页面视图控制器。  \n\n```  \nimport\
  \ UIKit  \n\nclass BookViewController: UIPageViewController {  \n}  \n```  \n\n\
  创建一个`BookDataSource.swift`文件。这将成为你的页面视图控制器的数据源对象。  \n\n```  \nimport UIKit  \n\n\
  class BookDataSource: NSObject, UIPageViewControllerDataSource {  \n}  \n```  \n\
  \n向你的项目添加一个`OnePageViewController.swift`文件。这将是书籍每一页的视图控制器，并且它需要一些指向其视图的输出口。  \n\n\
  ```  \nimport UIKit  \n\nclass OnePageViewController: UIViewController {  \n   \
  \ @IBOutlet var textView: OnePageView!  \n    @IBOutlet var pageLabel: UILabel!\
  \  \n}  \n```  \n\n最后，添加一个`OnePageView.swift`文件。这是一个自定义的`UIView`类，用于绘制一页的文本。这个类代码很短，你可以现在就把它全部写完。\
  \  \n\n```  \nimport UIKit  \n\nclass OnePageView: UIView {  \n    var text: NSString\
  \ = \"\" { didSet { setNeedsDisplay() } }  \n    var fontAttrs: [String: AnyObject]!\
  \ = nil  \n\n    override func drawRect(rect: CGRect) {  \n        super.drawRect(rect)\
  \  \n        text.drawInRect(bounds, withAttributes: fontAttrs)  \n    }  \n}  \n\
  ```  \n\n你应该能够理解这段代码，毕竟你已经阅读了第 11 章。当需要绘制自身时，`OnePageView`对象会用背景色填充其视图（`super.drawRect(rect)`为你完成了这项工作），然后使用其`fontAttrs`属性中存储的属性来绘制`text`。\
  \  \n\n我略过了你需要的最后一个类的代码。它相当长，而且不是本章的重点。找到你下载的源代码。在`Learn iOS Development Projects`\
  \ ![image](img/arrow.jpg) `Ch 12` ![image](img/arrow.jpg) `Wonderland`文件夹中，找到`Paginator.swift`文件并将其拖入项目的\
  \ Wonderland 分组——记得在导入时选中“复制”选项。  \n\n`Paginator`对象概念上很简单。它有三个可设置的属性：整本书的文本（作为一个字符串）、一种字体和一个视图大小。该对象将文本分割成页面，每个页面都能恰好用该字体填充给定的视图大小。如果你对细节感兴趣，请阅读代码中的注释。\
  \  \n\n**注意** 这远非实现分页器最复杂的方式，但对于这个应用来说已经足够了。  \n\n现在，你已经准备好添加视图控制器并设计界面了。  \n\n\
  **添加页面视图控制器**  \n\n并不全是代码。使用 Interface Builder 来创建两个视图控制器。选择`Main.storyboard`文件。从对象库中拖出一个新的页面视图控制器并添加到你的设计中。同时添加一个新的视图控制器对象，如图\
  \ 12-18 所示。将它们排列在其他场景下方。  \n\n![9781484202098_Fig12-18.jpg](img/9781484202098_Fig12-18.jpg)\
  \  \n\n图 12-18 添加页面视图控制器和单页视图控制器  \n\n通过 Control 拖动或右键拖动从标签栏控制器到新的页面视图控制器，将页面视图控制器添加到标签栏，如图\
  \ 12-19 所示，就像之前为导航视图控制器所做的那样。选择“视图控制器”关系。  \n\n![9781484202098_Fig12-19.jpg](img/9781484202098_Fig12-19.jpg)\
  \  \n\n图 12-19 将页面视图控制器添加到标签栏  \n\n\n\n与其他标签页的操作类似，在页面视图控制器的场景中选中标签栏项。使用属性检查器将其标题设置为\
  \ `Book`，标签图标设置为 `tab-book`。\n\n现在配置页面视图控制器本身。选中页面视图控制器对象，使用标识检查器将其类更改为 `BookViewController`。切换到属性检查器，并仔细检查以下属性是否已设置：\n\
  \n* Navigation: Horizontal\n* Transition Style: Page Curl\n* Spine Location: Min\n\
  \n这些设置定义了一个“书本式”界面，用户可以在其中水平翻动一系列视图控制器，每页显示一个。（如果将 Spine Location 设置为 Mid，则每页会显示两个视图控制器。）控制器之间的转场效果模拟了纸张翻页的动画。\n\
  \n## 设计原型页面\n\n现在，请移步至刚刚添加的纯视图控制器。使用标识检查器将其类更改为 `OnePageViewController`。同时将其 Storyboard\
  \ ID 更改为 `OnePage`。这最后一步非常重要。此控制器将不会在 Interface Builder 中连线；您将以编程方式创建它的实例。为此，您需要一种引用它的方式，就需要使用它的\
  \ Storyboard ID 来完成。\n\n完成上述准备工作后，开始为单页视图控制器创建界面。从对象库中，按如下方式添加三个视图对象：\n\n1. 标签\n\
  \    1. 字体：System 15.0\n    2. 文本：Alice’s Adventures in Wonderland\n    3. 位置：顶部居中\n\
  2. 标签\n    1. 字体：System 11.0\n    2. 位置：底部居中\n3. 视图\n    1. 在两个标签之间居中，以填充可用空间。\n\
  \    2. 使用标识检查器将其类更改为 `OnePageView`。\n4. 约束\n    1. 选中两个标签对象，并添加水平居中约束。\n    2.\
  \ 选中顶部标签，并添加一个相对于顶部布局指南的垂直约束（标准距离）。\n    3. 选中底部标签，并添加一个相对于底部布局指南的垂直约束（标准距离）。\n\
  \    4. 选中图片视图，并添加顶部、前导、尾部、底部约束，均设为 20 像素，如图 12-20 所示。\n\n![9781484202098_Fig12-20.jpg](img/9781484202098_Fig12-20.jpg)\n\
  \n图 12-20. 单页视图控制器布局\n\n选中单页视图控制器对象，并使用连接检查器将其两个输出口分别连接到 `OnePageView` 对象和底部的标签（该标签将显示页码），如图\
  \ 12-21 所示。\n\n![9781484202098_Fig12-21.jpg](img/9781484202098_Fig12-21.jpg)\n\n\
  图 12-21. 连接页面视图对象\n\n## 编写单页视图控制器代码\n\n您现在已经完成了在 Interface Builder 中几乎所有能做的操作。是时候卷起袖子开始编码了。这次，从设计的“尾部”开始，逐步回溯到页面视图控制器，并沿途填充细节。链条中的最后一个对象是\
  \ `OnePageView`，这是一个显示页面文本的自定义视图。您已经编写了它，而且相当简单。（如果已经忘了，可以悄悄回到“创建页面视图控制器”一节复习一下。）\n\
  \n接下来继续处理视图控制器。您已经定义了类，添加了两个输出口（`textView` 和 `pageLabel`），并将这些输出口连接到它们的视图对象。现在添加几个属性和一个\
  \ `loadPageContent()` 函数。\n\n```\nvar pageNumber = 1\nvar paginator: Paginator?\
  \ = nil\n\nfunc loadPageContent() {\n    if let tv = textView {\n        if let\
  \ pager = paginator {\n            pager.viewSize = tv.bounds.size\n           \
  \ if !pager.pageAvailable(pageNumber) {\n                pageNumber = pager.lastKnownPage\n\
  \            }\n            tv.fontAttrs = pager.fontAttrs\n            tv.text\
  \ = pager.textForPage(pageNumber)\n        }\n    }\n    pageLabel?.text = \"Page\
  \ \\(pageNumber)\"\n}\n```\n\n`pageNumber` 决定了此视图控制器显示的书籍页码。它将在控制器创建时由数据源设置。`paginator`\
  \ 属性将此视图控制器与书籍内容连接起来。`loadPageContent()` 函数首先用文本视图的实际尺寸配置 `paginator`，然后只需向分页器请求当前页的文本和绘制时应使用的字体属性，并将这些值传递给负责实际绘制的\
  \ `textView`（`OnePageView`）对象。`OnePageViewController` 实际上只是其 `OnePageView` 和 `Paginator`\
  \ 之间的“粘合剂”。\n\n最后，将 `pageLabel` 视图设置为显示书籍的页码。\n\n那么，`loadPageContent()` 何时被调用？在大多数情况下，这种首次视图设置代码会从\
  \ `viewDidLoad()` 函数中调用。但 `loadPageContent()` 需要在文本视图大小发生变化时被调用，而这可能随时发生，最典型的是当用户改变显示方向时。通过重写\
  \ `viewDidLayoutSubviews()` 函数并在控制器视图布局调整时调用 `loadPageContent()` 来解决这个问题。\n\n```\n\
  override func viewDidLayoutSubviews() {\n    super.viewDidLayoutSubviews()\n   \
  \ loadPageContent()\n}\n```\n\n我将在本章后面讨论 `viewDidLayoutSubviews()` 和其他适配函数。\n\n\
  ## 编写页面视图数据源\n\n您终于触及了页面视图控制器的核心：页面视图数据源。页面视图控制器数据源必须遵循 `UIPageViewControllerDataSource`\
  \ 协议，并实现以下两个必需的函数：\n\n```\npageViewController(_:,viewControllerBeforeViewController:)\
  \ -> UIViewController\npageViewController(_:,viewControllerAfterViewController:)\
  \ -> UIViewController\n```\n\n页面视图从一个初始视图控制器开始显示。当用户向左或向右“翻页”时，页面视图控制器会根据翻页方向向数据源对象发送其中一条消息。数据源以当前视图控制器为参考，检索或创建用于显示下一页（或上一页）的视图控制器。如果没有页面，则返回\
  \ `nil`。\n\n您的数据源必须实现这些方法。它还需要一个属性，用于引用所有单个视图控制器共用的那个分页器对象，以及一个用于创建任意页面视图控制器的函数。因此，您的\
  \ `BookDataSource.swift` 文件开头应如下所示：\n\n```\nlet paginator = Paginator(font: UIFont(name:\
  \ \"Times New Roman\", size: 18.0))\n\nfunc load(# page: Int, pageViewController:\
  \ UIPageViewController) \n                                                   ->\
  \ OnePageViewController? {\n    if page < 1 || !paginator.pageAvailable(page) {\n\
  \        return nil;\n    }\n    let controller = pageViewController.storyboard?.instantiateViewController\
  \ \n    WithIdentifier(\"OnePage\") as OnePageViewController\n    controller.paginator\
  \ = paginator\n    controller.pageNumber = page\n    return controller\n}\n```\n\
  \n`paginator` 属性用一个 `Paginator` 对象进行初始化，该对象将使用 18 磅的 Times New Roman 字体来显示文本。\n\n\
  所有工作都在 `load(page:,pageViewController:)` 函数中完成。调用此函数并传入页码，它会返回一个用于显示该页面的视图控制器。如果请求的页面不存在，则返回\
  \ `nil`。它要求故事板对象（通过页面视图控制器获取）创建场景中包含的、标识符为 `OnePage` 的控制器和视图。这样做是因为在页面视图中，导航不是通过转场（segue）或动作（action）来完成的。数据源负责在收到请求时创建它们。\n\
  \n\n\n**注** 请记住，之前你在故事板中将视图控制器场景的标识符设置为`OnePage`，这正是原因所在。如果你需要通过编程方式从故事板场景加载视图控制器及其视图对象，`instantiateViewControllerWithIdentifier(_:)`\
  \ 函数就是你的不二之选。\n\n一旦获取了新的单页视图控制器对象，它就会将该控制器连接到分页器并设置其应显示的页码。\n\n剩下的工作就是实现两个必需的数据源协议方法。这些方法也要写在你的`BookDataSource`类中。\n\
  \n```\nfunc pageViewController(bookViewController: UIPageViewController, \n    \
  \     viewControllerAfterViewController viewController: UIViewController) \n   \
  \                                               -> UIViewController? {\n    if let\
  \ pageController = viewController as? OnePageViewController {\n        let pageAfter\
  \ = pageController.pageNumber + 1\n        return load(page: pageAfter, pageViewController:\
  \ bookViewController)\n    }\n    return nil\n}\n\nfunc pageViewController(bookViewController:\
  \ UIPageViewController, \n         viewControllerBeforeViewController viewController:\
  \ UIViewController) \n                                                   -> UIViewController?\
  \ {\n    if let pageController = viewController as? OnePageViewController {\n  \
  \      let pageBefore = pageController.pageNumber - 1\n        return load(page:\
  \ pageBefore, pageViewController: bookViewController)\n    }\n    return nil\n}\n\
  ```\n\n由于每个单页视图控制器都存储了其显示的页码，这两个函数只需请求当前页的下一页或上一页即可。\n\n## 初始化页面视图控制器\n\n你的图书实现已接近完成。剩下的唯一任务是在页面视图控制器创建时，对其进行一些初始设置并初始化数据模型。切换到`BookViewController.swift`文件。首先创建一个属性来存储数据源对象。\n\
  \n```\nlet bookSource = BookDataSource()\n```\n\n**注** 为什么需要创建`bookSource`实例变量？这涉及到自动引用计数（ARC）内存管理系统的一个特性。有关解释，请阅读已完成项目中的注释以及第\
  \ 20 章。\n\n现在编写`viewDidLoad()`函数，以便在页面视图控制器创建时对其进行初始化。\n\n```\noverride func viewDidLoad()\
  \ {\n    super.viewDidLoad()\n    if let textURL = NSBundle.mainBundle().URLForResource(\
  \ \"Alice\",\n                                                withExtension: \"\
  txt\") {\n        bookSource.paginator.bookText = NSString(contentsOfURL: textURL,\n\
  \                                 encoding: NSUTF8StringEncoding, error: nil)\n\
  \    }\n```\n\n这段代码首先读取存储在`Alice.txt`文件中的图书文本。这是你刚开始时添加的资源文件之一。该文件是一个 UTF-8 编码的文本文件，每行由单个回车符（`U+000d`）分隔。这种格式正是分页器所期望的。整个文本被读入一个字符串中并存储在分页器中，分页器将利用它来为每一页分配文本。\n\
  \n```\ndataSource = bookSource\n```\n\n下一条语句将`bookSource`对象设置为页面视图控制器的数据源。\n\n```\n\
  \    let firstPage = bookSource.load(page: 1, pageViewController: self)!\n    setViewControllers(\
  \ [firstPage],\n             direction: .Forward,\n              animated: false,\n\
  \            completion: nil)\n}\n```\n\n最后这条语句可能是最重要的。它通过显式创建第 1 页的控制器，来生成页面视图控制器将呈现的初始视图控制器。必须在页面视图控制器出现之前通过编程方式完成此操作。\n\
  \n**注意** 页面视图控制器的初始视图控制器是一个数组。数组中的视图控制器数量必须与页面视图控制器一次呈现的视图控制器数量完全一致。如果你将页面视图控制器的书脊位置配置为`.Mid`，则必须提供两个初始视图控制器：一个用于左侧页面，另一个用于右侧页面。\n\
  \n代码量很大，但你已经完成了！运行你的应用并测试第三个标签页，如图 12-22 所示。\n\n![9781484202098_Fig12-22.jpg](img/9781484202098_Fig12-22.jpg)\n\
  \n图 12-22. 正常工作的页面视图界面\n\n恭喜你，你已经创建了一个非常复杂的应用。在此过程中，故事板为你提供了帮助，它让你能够在单个文件中映射并定义应用的大部分导航逻辑。但你还学会了如何在需要时以编程方式加载故事板场景。\n\
  \n我鼓励你花点时间回顾一下故事板文件中的场景以及你为支持这些场景而创建的类。一旦你确信自己理解了视图控制器的组织方式、它们如何协同工作以及你所创建的各个类的作用，那么你就可以认为自己是一名一流的\
  \ iOS 导航工程师了。\n\n现在，是时候掌握另外两项必不可少的导航技能了：呈现视图控制器和适配视图控制器。\n\n## 呈现视图控制器\n\n*呈现*一个视图控制器，会让该视图控制器的内容变得可见，并允许用户与之交互。从第\
  \ 2 章开始你就一直在做这件事。通常情况下，你的视图控制器是*隐式*呈现的。例如你的初始视图控制器，以及容器视图控制器中的视图控制器，就像你在本章中创建的许多视图控制器那样。你并没有编写任何代码来呈现标签视图中的三个视图控制器；你只是将它们添加到标签视图控制器中，然后让它来呈现它们。\n\
  \n你使用`presentViewController(_:,animated:,completion:)`函数*显式*呈现一个视图控制器。这几乎总是一种*模态*呈现。也就是说，被呈现的视图控制器会占据整个显示区域（或覆盖现有界面），并接管用户交互，直到它被关闭。此时，它会消失，之前的视图控制器会再次变得可见并处于活动状态。\n\
  \n从第 3 章开始，你就一直在显式呈现模态视图控制器。你呈现过警告框、媒体选择器、照片库选择器以及相机界面。你以全屏和弹出窗口的形式呈现过视图控制器。你编写过代码来收集被呈现控制器的结果，并在它们完成时将其关闭。\n\
  \n所以，你可能想知道关于呈现视图控制器还有什么需要了解的。实际上还有很多。在本节中，你将了解呈现视图控制器时涉及的不同对象、可用的不同呈现样式、默认的呈现行为、视图控制器转场，以及如何覆盖和自定义呈现。让我们从介绍参与者开始。\n\
  \n### 呈现控制器\n\n当呈现一个视图控制器时，有几个关键对象，如图 12-23 所示。\n\n![9781484202098_Fig12-23.jpg](img/9781484202098_Fig12-23.jpg)\n\
  \n图 12-23. 视图控制器呈现对象\n\n*呈现*视图控制器是（当前活动的）想要呈现新视图控制器的视图控制器。*被呈现*的视图控制器是即将被呈现的新视图控制器。当一个呈现视图控制器想要呈现另一个视图控制器时，它会调用`presentViewController(_:,animated:,completion:)`。\n\
  \n\n\n*呈现控制器*（presentation controller）是管理呈现过程的对象。它与视图控制器同时创建，并一直存在直到视图控制器被解除。呈现控制器（`UIPresentationController`）决定新的视图控制器在屏幕上的显示方式。它可能会用新的视图控制器替换整个屏幕，也可能将其放入弹出窗口。这是视图控制器偏好的呈现样式（其`modelPresentationStyle`）、呈现控制器认为适合的样式以及呈现控制器委托希望使用的样式三者共同作用的结果。在这个决策链中有多个环节可以影响视图控制器的呈现方式，你将在接下来的几节中逐一探索。\n\
  \n另一个值得关注的对象是*转场协调器*（transition coordinator，即`UIViewControllerTransitionCoordinator`）。该对象负责视图控制器之间的转场以及其内容的尺寸调整。当你点击按钮，新的视图控制器从底部滑出时，正是转场协调器在指挥这段动画。而当你旋转设备时，转场协调器则协调布局的平滑变形。转场协调器在转场开始时自动创建，并在转场结束后消失。本章后续部分将介绍如何使用转场协调器。\n\
  \n为了体验视图控制器的呈现机制，让我们为你的 Wonderland 应用用户添加一个简单的按钮，用于模态呈现一个自定义视图控制器。随后，你可以探索影响其呈现方式的不同方法。\n\
  \n### 模态呈现视图控制器\n\n回到 `Main.storyboard` 文件，在 Welcome 视图中，将按钮拖放到“by Lewis Carroll”文字的右侧。将按钮类型设为\
  \ Info Dark，删除其标题，并添加一个左侧水平约束，如图 12-24 所示。同时选中该按钮和标签，添加一个垂直居中对齐约束。\n\n![9781484202098_Fig12-24.jpg](img/9781484202098_Fig12-24.jpg)\n\
  \n图 12-24. 添加作者信息按钮\n\n现在，向你的故事板中添加一个新的视图控制器。将其拖放到画布上，紧挨着 Welcome 场景。选中该新视图控制器对象，切换到尺寸检查器，将其模拟尺寸（Simulated\
  \ Size）改为自由形式（Freeform）。设置其宽度为 250，高度为 340（参见图 12-25）。\n\n![9781484202098_Fig12-25.jpg](img/9781484202098_Fig12-25.jpg)\n\
  \n图 12-25. 创建自由形式的视图控制器\n\n请注意，该属性名为“模拟尺寸”。Interface Builder 实际上并不知道你的视图控制器在呈现时会多大，但它允许你使用非典型尺寸进行设计。\n\
  \n现在，你需要让视图控制器呈现这个尺寸。切换到属性检查器，找到内容尺寸（Content Size）属性，勾选“使用首选显式尺寸”（Use Preferred\
  \ Explicit Size）属性，并将宽度设置为 250，高度设置为 340。这将设置视图控制器的 `preferredContentSize` 属性。当视图控制器以可变尺寸方式呈现时（例如在弹出窗口中，而非始终占据全屏），该属性即为其期望的尺寸。呈现控制器会尽量满足这个要求，但并非强制。\n\
  \n向新的视图控制器中添加一个图像视图和一个标签对象，步骤如下：\n\n1.  图像视图\n    1.  将图像（Image）设置为 `info-charles`。\n\
  \    2.  将模式（Mode）设置为 Aspect Fit。\n    3.  添加一个到顶部布局指南的垂直约束（20 像素）。\n    4.  添加一个水平居中于父视图的约束。\n\
  \    5.  固定高度为 244 像素，宽度为 164 像素。\n2.  标签视图\n    1.  将文本（Text）设置为“Lewis Carroll”、“a.k.a.\
  \ Charles Lutwidge Dodgson”和“27 January 1832 – 14 January 1898”，共三行。（按住 Option 键并按下\
  \ Return 键可在文本中创建换行。）\n    2.  将字体（Font）设置为 System 12.0。\n    3.  将对齐方式（Alignment）设置为居中。\n\
  \    4.  将行数（Lines）设置为 3。\n    5.  添加上（8）、前导（0）和尾部（0）约束。\n\n完成后的布局应如图 12-26 所示。\n\
  \n![9781484202098_Fig12-26.jpg](img/9781484202098_Fig12-26.jpg)\n\n图 12-26. 完成后的作者信息布局\n\
  \n如果你希望模态且全屏呈现此视图控制器，可以执行以下操作：\n\n1.  为你的 `FirstViewController` 添加一个操作（例如 `@IBAction\
  \ func showInfo(_: AnyObject!)`）。\n2.  将按钮连接到新操作。\n3.  为新的视图控制器分配一个故事板 ID。\n4. \
  \ 在你的 `showInfo(_:)` 函数中，实例化新的视图控制器（使用其故事板 ID）。\n5.  将视图控制器的 `modalPresentationStyle`\
  \ 设置为 `.FullScreen`，`modalTransitionStyle` 设置为 `.Default`。\n6.  配置呈现控制器（如适用）。\n\
  7.  调用 `presentViewController(_:,animated:,completion:)`。\n8.  创建一个新的 `UIViewController`\
  \ 自定义子类（例如 `AuthorInfoViewController`）。\n9.  添加一个 `@IBAction func done(_: AnyObject!)`\
  \ 操作。\n10. 向根视图添加一个点击手势识别器或一个“完成”按钮，并将其连接到 `done(_:)` 函数。\n11. `done(_:)` 函数将获取呈现视图控制器并解除自身。\n\
  \n当你点击信息按钮时，屏幕将被新的视图控制器替换。点击“完成”按钮或根视图即可解除它。\n\n这些步骤你早已熟悉；在之前的项目中你曾多次逐一执行过。因此，与其重复劳动，不如从捷径开始，然后以此为基础探索一些变体。\n\
  \n### 模态呈现样式\n\n首先，从按钮到新视图控制器添加一个 segue。按住 Control 键或右键点击信息按钮，然后拖拽到新的视图控制器，如图 12-27\
  \ 所示。\n\n![9781484202098_Fig12-27.jpg](img/9781484202098_Fig12-27.jpg)\n\n图 12-27.\
  \ 连接模态呈现 segue\n\n如果你选择“Present Modally”选项，那么你几乎完全执行了步骤 1 到 7。这里的核心是 `modalPresentationStyle`\
  \ 属性（步骤 6）。当视图控制器的呈现样式设置为 `.FullScreen` 时，它请求占据整个屏幕，呈现控制器通常会尊重这一请求。\n\n但你还有其他选择吗？如下所示，有几种选择：\n\
  \n*   `FullScreen`\n*   `OverFullScreen`\n*   `CurrentContext`\n*   `OverCurrentContext`\n\
  *   `Popover`\n*   `PageSheet`\n*   `FormSheet`\n*   `Custom`\n\n`.OverFullScreen`\
  \ 变体以全屏方式呈现视图控制器（尺寸与 `.FullScreen` 完全相同），但不会移除呈现视图控制器。这一细微差别使得新视图控制器可以拥有半透明或模糊的背景，从而让呈现视图控制器的内容透出。这是一种很好的效果，给人一种临时覆盖的感觉，而非完全替换现有视图。示例请参见第\
  \ 17 章中的练习。\n\n\n\n"
- "# 当前上下文版本\n\n两个当前上下文版本（`.CurrentContext`和`.OverCurrentContext`）将呈现的视图控制器放置为覆盖或替换容器视图控制器（最显著的是`split\
  \ view controller`）内的呈现视图控制器。换句话说，它替换或覆盖了另一个视图控制器内部的某个视图控制器，而不是占据整个界面。\n\n弹出框、页面表单和表单表单是专为\
  \ iPad 设计的展示模式。（直到 iOS 8，它们*仅*在 iPad 上可用。）呈现的视图控制器以浮动表单（或“气泡”）形式出现在呈现视图控制器的顶部。现有的视图控制器不会消失，但通常会变为禁用并变暗。\n\
  \n我相信你的鼠标按钮手指已经因为决定选择哪个选项而感到疲劳了。继续选择弹出框展示转场选项（参见图 12-27）。¹在视图呈现之前，此转场会将呈现的视图控制器的`modalPresentationStyle`设置为`.Popover`。选择一个\
  \ iPad 模拟器（或设备）并运行你的应用。点击信息按钮以呈现新的视图控制器，如图 12-28 的左侧所示。\n\n![9781484202098_Fig12-28.jpg](img/9781484202098_Fig12-28.jpg)\n\
  \n图 12-28。iPad 和 iPhone 上的弹出框展示样式\n\n嘿，看起来很不错！现在切换到 iPhone（或类似的紧凑型设备）并再次运行你的应用。点击信息按钮。这次你会得到一个全屏视图控制器，如图\
  \ 12-28 的右侧所示。\n\n虽然看起来不算太糟，但这不是一个好的界面。首先，你从未实现步骤 8 到 11，所以用户无法关闭此视图。哎呀。\n\n你可以实现步骤\
  \ 8 到 11。这是一个完全有效的解决方案，并且在许多情况下完全合适。相反，让我们更仔细地看看为什么你得到的是全屏视图控制器而不是弹出框，以及你可能对此采取什么措施。\n\
  \n### 制定展示建议\n\n那么，为什么你的视图控制器在 iPhone 上以`.FullScreen`模式出现？`modalPresentationStyle`属性是视图控制器希望如何呈现的建议，而不是要求。当视图控制器被呈现时，展示控制器会考虑界面的大小、当前的特征集合以及其他信息，并决定呈现视图控制器的最佳方式。这可能符合也可能不符合视图控制器的请求。\n\
  \n通常，展示控制器会以请求的任何样式呈现视图控制器，*除了*在水平紧凑型设备上。当屏幕较小时，展示控制器会将弹出框、表单表单和页面表单的请求转换为`.FullScreen`样式，基于这样的（合理）假设：在这种小设备上没有足够的空间来容纳这些界面样式。\n\
  \n猜猜看？展示控制器有一个`delegate`属性（参见图 12-23）。展示控制器的委托会被询问使用哪种展示样式，你可以影响那个决定。现在让我们来做这件事。\n\
  \n首先，回到故事板，选择信息按钮的转场，并为其分配一个标识符`info`。你需要这个来将一些代码注入到展示过程中。现在转到`FirstViewController.swift`文件并添加以下函数：\n\
  \n```\noverride func prepareForSegue(segue: UIStoryboardSegue, sender: AnyObject!)\
  \ {\n    if segue.identifier == \"info\" {\n        let presented = segue.destinationViewController\
  \ as UIViewController\n        let presentationController = presented.presentationController\n\
          presentationController?.delegate = self\n    } else {\n        super.prepareForSegue(segue,\
  \ sender: sender)\n    }\n}\n```\n\n这个函数在转场即将呈现新的视图控制器之前被调用。它首先获取将被呈现的视图控制器，并获取其展示控制器。然后你将此对象设置为展示控制器的委托。\n\
  \n为了使这工作，这个视图控制器必须采用`UIAdaptivePresentationControllerDelegate`协议，所以现在添加它（新代码以粗体显示）。\n\
  \n```\nclass FirstViewController: UIViewController,\n                          \
  \ UIAdaptivePresentationControllerDelegate {\n```\n\n现在添加这个自适应展示控制器委托函数：\n\n```\n\
  func adaptivePresentationStyleForPresentationController( \n        controller: UIPresentationController)\
  \ -> UIModalPresentationStyle {\n    return .None\n}\n```\n\n现在选择一个 iPhone 模拟器（或任何其他紧凑型设备）并再次运行你的应用。点击信息按钮，你会得到一个弹出框，如图\
  \ 12-29 右侧所示。\n\n![9781484202098_Fig12-29.jpg](img/9781484202098_Fig12-29.jpg)\n\
  \n图 12-29。在 iPhone 上强制弹出框展示\n\n那么，刚才发生了什么？在水平紧凑型设备上，展示控制器会向其委托对象询问如何将界面适配到较小的设备。如果委托返回`.None`，意味着“不要适配界面。完全按照请求的方式呈現它。”而展示控制器正是这样做的，将新的视图控制器放在弹出框中——这种界面在\
  \ iPhone 上并不常见。\n\n这个特定的界面足够小，即使在最小的移动设备上也能在弹出框中正常工作。但如果不能呢？是的，你仍然可以回去实现步骤 8 到 11，但展示控制器委托还有一个妙招。\n\
  \n### 在展示期间适配视图控制器\n\n除了获取委托关于在紧凑环境中呈现视图控制器的最佳方式的意见外，展示控制器还允许委托在呈现之前适配界面。我将在接下来的部分中更多地讨论适配，但现在只需知道“适配”界面意味着调整它使其适应新的环境。\n\
  \n返回`FirstViewController.swift`文件并调整委托函数，使其如下所示（修改后的代码以粗体显示）：\n\n```\nfunc adaptivePresentationStyleForPresentationController(\n\
             controller: UIPresentationController) -> UIModalPresentationStyle {\n\
      return .FullScreen\n}\n```\n\n现在你的委托与展示控制器一致：当在水平紧凑型设备上呈现时，所有视图控制器（对于此委托）都将以全屏方式呈现。这使你回到了之前遇到的困境——没有任何东西可以让用户关闭此视图。别担心，还有一个委托方法可以解决这个问题。\n\
  \n在视图控制器被呈现之前，展示控制器会调用`presentController(_:,viewControllerForAdaptivePresentationStyle:)`委托函数。在你的类中添加一个。\n\
  \n```\nfunc presentationController(controller: UIPresentationController, \n                \
  \ viewControllerForAdaptivePresentationStyle style: \n                   UIModalPresentationStyle)\
  \ -> UIViewController? {\n    let presentedVC = controller.presentedViewController\n\
      let replacementController \n                 = UINavigationController(rootViewController:\
  \ presentedVC)\n    let navigationItem = presentedVC.navigationItem\n    let doneButton\
  \ = UIBarButtonItem(barButtonSystemItem: .Done,\n                                                  target:\
  \ self,\n                                                  action: \"dismissInfo:\"\
  )\n    navigationItem.rightBarButtonItem = doneButton\n    navigationItem.title\
  \ = \"Author\"\n    return replacementController\n}\n```\n\n\n\n"
- "# 排版后的内容\n\n在此函数中，你可以获取用于呈现的视图控制器并进行修改（适配），使其能够以全屏方式呈现——或者按照`style`参数所指定的方式呈现。这可能涉及添加一个“完成”按钮，或者添加一个轻触手势识别器以及一个显示“轻触以关闭”的标签。完全由你决定。只需在此处进行修改，然后返回修改后的视图控制器即可。\n\
  \n不过，你的函数更进一步，它用一个完全不同的视图控制器替换了原来的！实际上，它会创建一个导航视图控制器，并将要呈现的视图控制器设为其根视图。接着，它会配置导航栏，使其包含一个“完成”按钮，该按钮会调用`dismissInfo(_:)`函数来关闭视图控制器。这样，无需修改原始视图控制器，就能巧妙地通过标准且可识别的界面来提供关闭视图的方法。\n\
  \n哦，我想你会需要那个`dismissInfo(_:)`函数。\n\n```\n@IBAction func dismissInfo(sender: AnyObject)\
  \ {\n    dismissViewControllerAnimated(true, completion: nil)\n}\n```\n\n在继续运行 iPhone\
  \ 模拟器时，再次运行你的应用，如图 12-30 所示。\n\n![9781484202098_Fig12-30.jpg](img/9781484202098_Fig12-30.jpg)\n\
  \n图 12-30。适配后的全屏视图控制器呈现\n\n从技术上讲，这就是适配，也是本章的最后一节。但在进入这个主题之前（请原谅这个双关语），让我们总结一下关于呈现控制器你已经学到的内容，并讨论使用它们的其他原因。\n\
  \n-   想要呈现另一个视图控制器的视图控制器被称为*呈现方*视图控制器。\n-   被呈现的视图控制器被称为*被呈现方*视图控制器。\n-   *呈现控制器*管理视图控制器的呈现、适配和关闭。\n\
  -   视图控制器具有首选呈现样式、过渡样式和尺寸。\n-   呈现控制器在呈现视图控制器时会考虑这些属性，但可能会否决它们。\n-   呈现控制器的委托在水平紧凑环境中可能否决其样式决定，并且可以更改或替换被呈现的视图控制器。\n\
  \n## 弹出呈现控制器\n\n除非你打算修改或自定义视图控制器的呈现方式，否则通常无需处理呈现控制器。但有一个显著的例外：弹出呈现控制器。\n\n根据`modalPresentationStyle`的值，为你的视图控制器创建的呈现控制器可能是`UIPresentationController`的子类，并具有附加功能。具体来说，如果你的视图控制器的`modalPresentationStyle`是`.Popover`，其`presentationController`属性将返回一个`UIPopoverPresentationController`对象。该类具有仅适用于弹出呈现的附加函数和属性——其中一些你*必须*进行设置，否则呈现将会失败。\n\
  \n在之前的项目中你已经遇到过这种情况，让我们重温一下。当你在弹出窗口中呈现一个视图控制器时，你必须设置其*源*。这是一个对象或矩形，用于确定弹出窗口在屏幕上的锚定位置。在\
  \ MyStuff 项目中，你曾这样做过几次，详见第 9 章。以下是那段代码：\n\n```\nif let popover = alert.popoverPresentationController\
  \ {\n    popover.sourceView = imageView\n    popover.sourceRect = imageView.bounds\n\
  \    popover.permittedArrowDirections = ( .Up | .Down )\n}\n```\n\n`UIViewController`\
  \ 的便捷属性`popoverPresentationController`是获取弹出控制器的最佳方式。当且仅当`presentationController`是一个弹出控制器并被便捷地向下转型为`UIPopoverPresentationController`时，该属性才会存在；否则返回`nil`。请注意，这与`presentationController`返回的是同一个对象，只是进行了向下转型。\n\
  \n至少，你必须设置弹出控制器的`sourceView`和`sourceRect`，或者设置`barButtonItem`。如果像之前那样使用 segue，segue\
  \ 会自动为你完成此操作。你还可以选择自定义允许的箭头方向、箭头的颜色（以匹配弹出视图的背景颜色）以及其他功能。\n\n现在你已经知道如何使用呈现控制器，让我们回到适配这个话题。\n\
  \n## 适配视图控制器内容\n\n最后一项要掌握的视图控制器核心技能是，如何将视图的内容适配到不同的显示环境。*适配*视图控制器包括修改其视图对象和布局，以便为特定设备、屏幕尺寸、方向或分辨率呈现令人愉悦的用户界面。你在本书中已经多次遇到这个问题，但现在该深入细节了。\n\
  \n**iOS 8 之前的适配**\n\n适配并非 iOS 的新概念，但 iOS 8 引入了一种截然不同的理念和一套工具来帮助你。过去，适配是通过一种较为临时的方式处理的。有一些属性告诉你应用运行在哪种设备大类上（iPhone\
  \ 或 iPad），一些属性和事件告诉你设备处于何种方向（竖屏、横屏左、横屏右、倒置），还有一些属性告诉你屏幕尺寸等等。\n\n你的故事板文件也是分开的，一个故事板文件用于\
  \ iPhone 及类似设备（`Main_iPhone.storyboard`），另一个故事板文件用于 iPad 及类似设备（`Main_iPad.storyboard`）。想添加一个按钮？你必须在第一个故事板中添加按钮，将其连接到输出口，连接其动作，并创建其约束。然后你必须在第二个故事板文件中重复所有这些操作。你的代码中也充斥着诸如\
  \ `if deviceIdiom == .iPhone {` *为 iPhone 执行此操作* `} else {` *为 iPad 执行该操作* `}` 这样的语句。随着具有新屏幕尺寸和新分辨率的新型设备不断涌现，管理应用界面变得难以为继。iOS\
  \ 8 改变了这一切。\n\niOS 8 将界面环境抽象为一组通用特性，并提供了一套一致的方法来调整你的内容。不再有单独的函数用于调整视图控制器大小和处理设备旋转。现在，所有视图控制器尺寸的变化都以相同方式处理。大致上，有四种不同的视图适配方式，从通用到具体：\n\
  \n-   巧妙设计\n-   特性\n-   尺寸\n-   布局事件\n\n让我们逐一探讨，看看如何在适配界面时使用它们以及为何要使用它们。\n\n###\
  \ 比普通方案更聪明\n\n我将“巧妙设计”列为适配视图的一种技巧。如果你足够有创意，通常可以将界面设计得无需适配。它会自动调整以适应可用的显示区域，无论其为何种情况。我将这些视为“自适应”界面，这也是我始终优先尝试的技巧。回到你的\
  \ Wonderland 应用的 `Main.storyboard` 文件，让我们尝试适配角色详情场景。添加以下约束：\n\n\n\n### 1. 标签\n-\
  \ 顶部边缘到顶部布局参考线（40 像素）\n- 在容器中水平居中\n\n### 2. 图像视图\n- 顶部边缘到标签（8 像素）\n- 底部边缘到文本视图（标准间距）\n\
  - 前导和尾随边缘到父视图（各 40 像素）\n\n### 3. 文本视图\n- 固定高度为 128 像素\n- 前导和尾随边缘到父视图（各 30 像素）\n\
  - 底部边缘到底部布局参考线（标准间距），如图 图 12-31 所示\n\n![9781484202098_Fig12-31.jpg](img/9781484202098_Fig12-31.jpg)\n\
  \n图 12-31. 角色详情视图的初始约束\n\n如果你研究这些约束，或者直接在模拟器中运行它们，你会发现它们虽然能工作，但效果并不理想（参见 图 12-32）。\n\
  \n![9781484202098_Fig12-32.jpg](img/9781484202098_Fig12-32.jpg)\n\n图 12-32. 测试角色详情约束\n\
  \n布局中的约束定义了一种代数方程。自动布局逻辑首先找到方程中的所有常量（例如父视图的大小、文本视图的固定高度、以及“此标签的顶部边缘必须恰好位于顶部布局参考线下方\
  \ 40 像素处”这类约束）。然后，它识别出可变属性（如图像视图的高度、文本视图的顶部边缘位置等）。接着，它通过提供满足所有常量的变量值来“求解”方程。虽然你的角色详情视图中的布局确实“求解”了方程，但视觉效果并不理想。\n\
  \n到目前为止，在这本书中，你只创建了简单、固定、不变的约束。大多数情况下，这些就足够了，但有时你需要更灵活的方法，而自动布局系统既有能力也愿意提供支持。以下是一些可供你使用的额外工具：\n\
  \n- 约束可以表达不等式。\n- 约束可以设置优先级。\n- 视图内容是可压缩的。\n- 视图内容会“拥抱”其边距。\n\n首先，约束不一定非得表达明确的规则。你可以创建一个约束，例如“此视图的高度必须为\
  \ 80 像素*或以上*”，或者“此按钮的左边缘必须*超过*该标签右边缘 6 像素”。你要做的第一个修改是改变文本视图底部边缘的约束。选中该文本视图，这将显示其附带的约束。选择底部的那个小约束（位于文本视图与底部布局参考线之间），如\
  \ 图 12-33 所示。在属性检查器中，将 Relation（关系）属性从 Equal（等于）更改为 Greater Than or Equal（大于或等于）。\n\
  \n![9781484202098_Fig12-33.jpg](img/9781484202098_Fig12-33.jpg)\n\n图 12-33. 创建约束不等式\n\
  \n现在，自动布局逻辑有了一个新的变量可以调整。文本视图的底部边缘不再被要求恰好位于底部布局参考线之上 8 像素处。布局引擎现在可以移动它，只要它 *至少* 位于底部布局参考线之上\
  \ 8 像素即可。\n\n#### 设置约束优先级\n\n约束也有优先级。默认情况下，新约束的优先级是 `UILayoutPriorityRequired`。此值为\
  \ 1000，是最高优先级。这意味着该约束是必需的，必须被满足。但你可以创建具有较低优先级的约束。如果这样做，布局逻辑将为了满足高优先级约束而“牺牲”低优先级约束。iOS\
  \ 还定义了两个其他方便的优先级：`UILayoutPriorityDefaultHigh` (750) 和 `UILayoutPriorityDefaultLow`\
  \ (250)，分别用于重要但非必需的约束，以及最好能有但不重要的约束。你可以分配从 1 到 1000 的任何优先级——只需避免 50，因为该值已被保留作他用。\n\
  \n#### 固有尺寸\n\n自动布局逻辑还会考虑视图的*固有尺寸*。带有内容（标签、文本视图、图像视图、按钮等）的视图对象都具有一个*固有尺寸*。这是视图为了精确显示其内容所需的大小。对于图像视图，它是其图像的大小。对于标签，它是其文本绘制后的大小。如果你没有添加规定视图高度或宽度的约束，自动布局将参考其固有尺寸，并以此为起点。\n\
  \n**注意**：如果你创建了一个自定义的 `UIView` 子类，并希望自动布局考虑其固有尺寸，则必须重写 `intrinsicContentSize() ->\
  \ CGSize` 函数并提供该值。\n\n如果视图的固有尺寸不能满足其他约束，自动布局将覆盖其固有尺寸以解决布局问题。当它这样做时，自动布局会遇到另外两组优先级：*抗压缩性*\
  \ 和 *抗拉伸性*。当布局试图使视图变小时，视图会“抵抗”压缩；而当布局试图使其变大时，视图的内容会“拥抱”其边距——换句话说，它会“抵抗”扩展。\n\n这些优先级是视图的属性。在角色详情视图中选择图像视图，并使用尺寸检查器将其垂直抗压缩性更改为\
  \ 250（`UILayoutPriorityDefaultLow`），如 图 12-34 所示。\n\n![9781484202098_Fig12-34.jpg](img/9781484202098_Fig12-34.jpg)\n\
  \n图 12-34. 更改图像视图的抗压缩性\n\n**注意**：抗压缩性和抗拉伸性各有两种优先级，分别针对垂直方向和水平方向，总共四种优先级。默认情况下，`UIButton`\
  \ 视图具有较低的水平抗拉伸性，因为按钮不介意被加宽。但它具有较高的垂直抗拉伸性，因为它强烈抵抗被加高。\n\n再次运行应用程序，如 图 12-35 所示，并将结果与\
  \ 图 12-32 进行对比。由于降低了垂直抗压缩性，布局更倾向于减小图像视图的尺寸，以满足所有布局约束。同时，由于底部约束是可变的，文本视图可以自由上移，与图像视图相接。\n\
  \n![9781484202098_Fig12-35.jpg](img/9781484202098_Fig12-35.jpg)\n\n图 12-35. 使用修改后的约束和抗压缩性进行布局\n\
  \n分配给抗压缩性和抗拉伸性的优先级与用于排列约束的优先级相同。例如，如果一个宽度约束比视图的固有宽度更窄，那么其水平抗压缩性的优先级将与约束的优先级进行比较，以确定哪个宽度占优。\n\
  \n**提示**：将抗压缩性和抗拉伸性优先级设置为 1000（`UILayoutPriorityRequired`）等同于将视图固定为其固有尺寸。\n\n现在你已经对约束、不等式约束、固有尺寸和优先级如何协同工作有了一些了解，你可以开始设计能够流畅适应各种环境的复杂布局方案了。\n\
  \n但如果自动布局仍然不能满足你的需求，你还有很多其他选择。接下来可以使用的工具是自适应约束。它们依赖于特征（Traits），因此我们接下来讨论特征。\n\n\
  ### 使用特征集合\n\n*特征（Trait）* 是界面的一个通用方面。它是宽敞还是紧凑？是高分辨率还是低分辨率？每个设备、窗口和视图控制器都有一组这样的特征，称为其*特征集合（Trait\
  \ Collection）*，你可以通过检查它来对你的界面应该呈现的样子做出宏观决策。你的视图控制器的当前特征集合可以通过其 `traitCollection`\
  \ 属性获取。表 12-2 列出了特征集合的属性。\n\n表 12-2. 特征集合中的特征\n\n\n\n| 特征 | 可选值 |\n| --- | --- |\n\
  | 水平尺寸类别 | Regular 或 Compact |\n| 垂直尺寸类别 | Regular 或 Compact |\n| 界面类型 | iPad 或\
  \ iPhone |\n| 显示比例 | 1.0、2.0 或 3.0 |\n\n最有用的两个特征是水平尺寸类别与垂直尺寸类别。*尺寸类别*表示界面在该方向上的“宽敞”程度。iPad\
  \ 在横屏和竖屏两种方向下，两个维度均为 Regular 尺寸类别。这是因为 iPad 的显示屏较大，通常无需对界面做出大幅调整即可适配。相比之下，iPhone\
  \ 在竖屏时水平方向为 Compact，垂直方向为 Regular；而在横屏时，两个方向均为 Compact。\n\n那么，为什么 iPhone 在横屏时没有\
  \ Regular 水平尺寸类别呢？尺寸类别更多关乎预期和可用性，而非物理显示尺寸。正如本章前面所学，展示控制器会根据设备的水平尺寸类别来决定以弹出框还是全屏形式展示视图控制器。将水平尺寸类别保持为\
  \ Compact，意味着你的照片选择器不会突然在 iPhone 上以弹出框形式出现。同时，这也意味着分屏视图控制器将保持折叠状态。你可以将尺寸类别理解为“预期”类别。\n\
  \n如前所述，展示控制器会利用尺寸类别来决定使用何种展示样式。但尺寸类别的应用远不止于此，Interface Builder 便是其中之一。\n\n### 添加自适应约束（及对象）\n\
  \n你可以在 Interface Builder 中定义仅在特定尺寸类别组合下才会出现在界面中的约束（及视图对象）。在前面的章节中，你已经多次执行过此操作，后续还会用到。这里让我们回顾其中一个例子。\n\
  \n在第 9 章中，你为 DrumDub 项目中的“bang”按钮创建了多组对齐约束，如图 12-36 所示。\n\n![9781484202098_Fig12-36.jpg](img/9781484202098_Fig12-36.jpg)\n\
  \n图 12-36 为 `wCompact`/`hAny` 尺寸类别添加约束\n\n由于你已详细经历过这一过程，此处不再赘述。但有两个要点需要强调。\n\n首先，注意不要创建冲突的约束。如果你为\
  \ `wCompact`/`hAny` 集合添加了一个宽度约束，又为 `wCompact`/`hCompact` 集合中的同一视图添加了不同的宽度约束，那么当视图在横屏\
  \ iPhone 5 上展示时，就会产生一对冲突的约束。约束并不会覆盖其他集合中的类似约束，视图中的约束是所有与当前环境匹配的集合的并集。\n\n**注意**\
  \ 一组冲突或不完整的约束会导致视图布局失败。视图可能被移出屏幕、尺寸归零或根本无法定位，结果通常是视图对象混乱堆叠。\n\n另一个特性是能够设计仅在某些特征环境中出现的视图对象。与约束类似，当尺寸类别选择器设为\
  \ `wRegular`/`hRegular` 时添加到设计中的对象，将仅在该视图的尺寸类别为 `wRegular`/`hRegular` 时出现。\n\n虽然这是一个便捷功能，但存在几点注意事项。为\
  \ `wRegular`/`hAny` 集合添加一个按钮，并为 `wCompact`/`hAny` 集合添加另一个不同的按钮，会创建两个按钮对象。这两个按钮对象在视图控制器的生命周期内始终存在。当显示器在水平\
  \ Compact 环境中出现时，第二个按钮会自动添加到视图中，而第一个按钮则会被移除。\n\n由于它们是两个不同的对象，*你不能将它们连接到同一个插座*。如果你需要为按钮设置一个插座，请创建两个插座并合成一个属性，返回当前实际安装的那个按钮，代码如下所示：\n\
  \n```\n@IBOutlet var button_Regular: UIButton!\n@IBOutlet var button_Compact: UIButton!\n\
  var button: UIButton {\n    if  button_Regular.superview != nil {\n        return\
  \ button_Regular\n    }\n    return button_Compact\n}\n```\n\n自适应约束和对象最出色的特性或许是它们由系统自动管理。当设备从\
  \ Regular 环境变为 Compact 环境时，相应的约束会自动添加或移除。若要通过代码自行实现，则需要重写相应的函数。掌握这一方法同样重要，现在我们就来了解它。\n\
  \n### 以编程方式自适应视图\n\n你也可以通过编程方式让视图响应多种环境变化。大致上，有以下三种策略，按粒度递增排列：\n\n*   特征变化\n*  \
  \ 尺寸变化\n*   布局变化\n\n当你需要调整视图属性或进行无法用约束表示的其他布局更改时，就需要考虑编程自适应。Interface Builder 中的自适应约束固然强大，但你只能添加或移除约束和对象。Interface\
  \ Builder 无法让你定义自适应属性或操作。例如，你无法让一个图像视图在水平 Regular 环境中左对齐显示图像，而在 Compact 环境中居中显示。要实现这种效果，你需要编写少量代码。\n\
  \n#### 在特征变化时自适应\n\n你的书籍文本在 Compact 设备（如 iPhone）上使用较小的字体时效果更好。修改 `BookViewController.swift`\
  \ 中的代码，根据设备的水平尺寸类别调整字体大小。\n\n第一步是创建自适应视图的代码。将以下函数添加到 `BookViewController` 类中：\n\n\
  ```\nfunc adaptViewsToTraitCollection(traits: UITraitCollection) {\n    let compactWidth\
  \ = ( traitCollection.horizontalSizeClass == .Compact )\n    var fontSize: CGFloat\
  \ = 18.0\n    if compactWidth {\n        fontSize = 14.0\n    }\n    let paginator\
  \ = bookSource.paginator\n    let currentFont = paginator.font\n    if currentFont.pointSize\
  \ != fontSize {\n        paginator.font = currentFont.fontWithSize(fontSize)\n    }\n\
  }\n```\n\n该函数检查特征集合的水平尺寸类别。如果是水平 Compact，则将分页器使用的字体大小改为 14.0 点；否则改为 18.0 点。\n\n\
  当视图控制器的特征发生变化时，iOS 会调用控制器的 `willTransitionToTraitCollection(_:,withTransitionCoordinator:)`\
  \ 函数。用以下代码重写该函数：\n\n```\noverride func willTransitionToTraitCollection(newCollection:UITraitCollection,\n\
   withTransitionCoordinator coordinator:UIViewControllerTransitionCoordinator) {\n\
      super.willTransitionToTraitCollection(newCollection, \n                                        withTransitionCoordinator:\
  \ coordinator)\n    adaptViewsToTraitCollection(newCollection)\n}\n```\n\n这是用于在特征环境变化时自适应界面的重写函数。这段代码所做的只是调用你的\
  \ `adaptViewToTraitCollection()` 函数来调整界面。\n\n**注意** `adaptViewToTraitCollection()`\
  \ 函数仅在视图控制器的特征发生变化时被调用。例如，旋转 iPad 不会触发该函数，因为 iPad 在竖屏和横屏方向下均为 `wRegular`/`hRegular`。\n\
  \n该函数在视图首次显示时也不会被调用。为了让视图适应其初始环境，你需要在视图首次加载时调用一次自适应函数。仍在 `BookViewController` 类中，添加一个\
  \ `viewWillAppear(_:)` 函数。\n\n```\noverride func viewWillAppear(animated: Bool)\
  \ {\n    super.viewWillAppear(animated)\n    adaptViewsToTraitCollection(traitCollection)\n\
  }\n```\n\n\n\n当视图即将出现时，代码会获取其当前的 trait collection 并使用它来适配视图。在 iPad 和 iPhone 模拟器中分别运行应用并对比结果，如图\
  \ 12-37 所示。\n\n![9781484202098_Fig12-37.jpg](img/9781484202098_Fig12-37.jpg)\n\n\
  图 12-37。自适应字体大小\n\n### 尺寸变化时的适配\n\n如果你需要更精细地适配界面，下一个粒度层级是尺寸变化。当你的视图控制器尺寸发生变化时，iOS\
  \ 会调用其 `viewWillTransitionToSize(_:withTransitionCoordinator:)` 函数。只要设备旋转（从竖屏调整为横屏），就会触发该函数。其他情况下也可能发生，例如，当\
  \ iPhone 屏幕顶部的通话中状态横幅消失时，你的视图控制器会被微妙地调整尺寸。\n\n**注意**  `willTransitionToTraitCollection(...)`\
  \ 和 `willTransitionToSize(...)` 函数由 `UIContentContainer` 协议定义。视图控制器和呈现控制器都遵循此协议。你可以在任一对象上拦截这些事件，但由于通常继承的是\
  \ `UIViewController` 而非 `UIPresentationController`，因此通常会在视图控制器中重写它们。\n\n当需要进行更精确的布局以及与横竖屏状态相关的布局变更时，重写该函数即可。\n\
  \n### 布局发生时的适配\n\n最精细粒度的适配发生在布局层面。视图控制器有两个函数：\n\n```\nviewWillLayoutSubviews()\n\
  viewDidLayoutSubviews()\n```\n\n第一个在视图布局前调用，第二个在布局后调用。呈现控制器有一套功能类似的函数，但名称略有不同：\n\
  \n```\ncontainerViewWillLayoutSubviews()\ncontainerViewDidLayoutSubviews()\n```\n\
  \n当你需要根据布局的任何变化来适配设计时，可以重写这些函数。\n\n**警告**  will/did 布局子视图函数可能会被多次调用，因此要谨慎处理其中的代码。例如，假设你有一个显示倒计时的标签，且每秒更新一次。设置标签文本会改变其固有尺寸，从而触发布局，这会导致每秒都调用\
  \ `viewWillLayoutSubviews()` 和 `viewDidLayoutSubviews()`。你还必须注意不要在 `viewDidLayoutSubviews()`\
  \ 中做出任何可能触发新布局的更改。\n\n### 动画化布局变化\n\n适配视图的最后一步是执行实际的布局变更，即重新定位和调整界面中视图的尺寸。如果你使用的是约束或自适应约束，这会自动发生（这是热爱约束的又一个理由）。屏幕旋转时，你的视图将优雅地调整尺寸以适应新布局。\n\
  \n但如果你是通过编程方式适配视图呢？有些变化无需动画化。例如，为书籍的字体大小变化添加动画是不切实际的。因此，你刚才为此编写的代码没有问题。\n\n另一方面，如果你通过编程方式定位视图（未使用约束），则需要在视图尺寸变化时重新定位它们，并且希望它们能与其余变化同步动画。为此，请利用图\
  \ 12-23 中我至今未提及的对象：过渡协调器。\n\n过渡协调器是另一种辅助对象，仅在过渡期间使用。它是一个临时对象，在视图控制器首次呈现或过渡到新的 trait\
  \ collection 或尺寸之前创建。过渡完成后，该对象即消失。\n\n过渡协调器有一个极其有用的函数：`animateAlongsideTransition(_:,completion:)`。在你的\
  \ `willTransitionToTraitCollection(...)` 或 `willTransitionToSize(...)` 函数中调用此函数，并提供两个代码块。第一个代码块包含对视图进行可动画化更改的代码。阅读第\
  \ 11 章后，你会更清楚这一点。简而言之，如果你在此代码块中更改了视图的任何可动画化属性——尤其是其大小或位置——这一更改将平滑地以动画呈现。\n\n你将在第\
  \ 16 章中执行此操作，届时你将创建一个通过编程方式定位、且不使用任何约束的\"拨盘\"视图。当界面调整大小时，你需要负责重新定位它们。\n\n哦，我等不及了！让我们跳到第\
  \ 16 章，提前看看那段代码（有趣的部分已用**粗体**标出）：\n\n```\noverride func viewWillTransitionToSize(size:\
  \ CGSize, \n withTransitionCoordinator coordinator: UIViewControllerTransitionCoordinator!)\
  \ {\n    super.viewWillTransitionToSize(size, \n         withTransitionCoordinator:\
  \ coordinator)\n    animator?.removeAllBehaviors()\n    coordinator.animateAlongsideTransition(\
  \ {\n            (context) in self.positionDialViews()\n        },\n        completion:\
  \ {\n            (context) in self.attachDialBehaviors()\n        })\n}\n```\n\n\
  每当视图控制器调整大小时，此函数会将\"拨盘\"视图重新定位到新位置。该部分由巧妙命名的 `positionDialViews()` 函数处理。激动人心的是，此函数是在传递给\
  \ `animateAlongsideTransition(_:,completion:)` 函数的代码块内被调用的。这样做时，过渡协调器会确保你的视图动画变化与其余视图变化完美同步。\n\
  \n你不必非这样做不可。你也可以选择**不**为你的变化添加动画——那就逊色了。你还可以自由设置自己的动画，使其接近甚至在过渡动画之后运行；过渡协调器也能帮你实现。但大多数时候，你希望界面能无缝变形到新布局，而\
  \ `animateAlongsideTransition(_:,completion:)` 让这变得简单。\n\n## 视图控制器高级主题\n\n本章已经长得离谱了，所以如果你读到了这里，理应得到某种奖励。不过，在我放你走之前，让我再提几个高级主题，以便你有所了解。\n\
  \n### 自定义呈现和转场\n\n你可以对视图控制器的呈现和转场进行*远*超本章所述的自定义。想让呈现的视图控制器从一团烟雾中出现吗？或者，在关闭它时，希望它像一张废纸一样皱成一团？通过提供你自己的呈现控制器和/或过渡协调器对象，你可以实现这些以及任何你能想到的效果。\n\
  \n细节很多，但基本技术是将视图控制器的 `modalPresentationStyle` 设置为 `.Custom`。执行此操作后，iOS 期望你的视图控制器在其\
  \ `transitioningDelegate` 属性中提供一个委托对象。该对象必须遵循 `UIViewControllerTransitioningDelegate`\
  \ 协议，其方法可以提供你自己的 `UIPresentationController` 自定义子类以及其他动画和过渡对象，以负责呈现、过渡和关闭你的视图控制器。\n\
  \n有关所有细节，请参阅 Xcode 文档和 API 参考窗口中的《视图控制器编程指南》。我还强烈建议下载演示这些技术的示例项目。\n\n### 外观代理\n\n\
  你已经看到如何在 `viewWillAppear()` 和 `viewWillTransitionToTraitCollection(...)` 等函数中编写代码，以编程方式调整视图的内容。你针对那些无法在\
  \ Interface Builder 中设置的属性执行此操作。\n\n\n\n"
- '# 排版后的内容


  但如果你需要在多个不同的地方，对同一类视图对象进行完全相同的调整呢？你是否需要在每个视图控制器中都编写代码来修改每个对象？假设你正在开发一款多人游戏，玩家要么属于
  **Rose 队**，要么属于 **Periwinkle 队**。你希望所有按钮和导航栏的背景色，在 Rose 队玩家看来是浅红色，在 Periwinkle 队玩家看来是浅蓝色，并且这些视图要出现在每个视图控制器的每个位置。


  实际上，有一种方法可以通过外观代理（*appearance proxy*）来实现这一点。*外观代理* 是一个对象，它可以一次性调整其所属类中所有视图对象的一个或多个属性。其工作原理如下。


  你向特定的视图对象类请求其外观代理：


  ```

  let navBarAppearanceProxy = UINavigationBar.appearance()

  ```


  如果你设置了代理对象的显示属性，它会将该属性应用于应用中每一个 `UINavigationBar` 对象，即使是那些尚未加载的也不例外：


  ```

  navBarAppearanceProxy.barTintColor = roseTeamColor

  ```


  **注意：** 你还可以请求一个仅适用于特定特征环境或包含在特定视图层次结构中的对象的外观代理。


  代理并不能影响所有属性。只有那些在框架头文件中标记有 `UI_APPEARANCE_SELECTOR` 的属性，才是它可以更改的。我从未找到过官方的列表，但大多数视觉属性（如背景、色调、字体等），如果需要统一应用于多个视图对象，都可以通过这种方式进行自定义。


  你可以在 `UIView` 的自定义子类中实现自己的外观属性，并且你的类的外观代理也会调整这些属性。有关详细信息，请参阅 `UIAppearance` 的文档。


  '
- '# 总结


  在掌握 iOS 应用开发的旅程中，你已经取得了长足的进步。视图控制器是你用户界面的基石，而掌握导航则是开发应用用户体验的关键一步。


  在本章中，你使用了所有主要的视图控制器类：`UIViewController`、`UITableViewController`、`UINavigationController`、`UITabBarController`
  和 `UIPageViewController`。更重要的是，你学习了内容视图控制器和容器视图控制器之间的区别，以及如何使用故事板来组装和连接它们。你以编程方式创建了存储在故事板文件中的视图控制器，并以此构建了页面视图控制器的数据源。你还学习了呈现模态视图控制器的基本原理、涉及的对象以及呈现决策是如何做出的。最后，你探索了使视图适应不断变化的显示环境的所有主要技术。


  这是一个巨大的成就。它非常令人兴奋，你应该与朋友们分享。下一章将向你展示如何做到这一点。


  ___________________


  [¹] 如果你已经选择了不同的 segue 类型，只需选择该 segue，并使用属性检查器将其 Segue 属性更改为“Present as Popover”。


  [²] 如果你已经关闭了此功能，请选择视图，然后在大小检查器中点击该约束的“Edit”按钮。


