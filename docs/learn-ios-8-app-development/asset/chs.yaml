- "# 控制 Interface Builder 文件\n\n既然你已经理解了 Interface Builder 文件是什么以及它们如何工作，你就可以轻松地向应用中添加新文件，并在需要时加载它们。这介于视图控制器完全自动使用\
  \ Interface Builder 文件与完全用代码创建视图对象这两种方式之间。在本节中，你将学习以下内容：\n\n- 向项目中添加独立的 Interface\
  \ Builder 文件\n- 以编程方式加载 Interface Builder 文件\n- 指定多个占位对象，供 Interface Builder 对象连接\n\
  \n在第 11 章中，你编写了 Shapely 应用。每次点击按钮，你都会创建一个新的 `ShapeView` 对象，对其进行配置，并附加一堆手势识别器——全程只使用\
  \ Swift。其中有多少代码可以用 Interface Builder 来完成？让我们一探究竟。\n\n## 声明占位对象\n\n从第 11 章中完成的 Shapely\
  \ 项目开始，向项目中添加一个 Interface Builder 文件：将模板库中的 `View` 模板拖入导航器中，如图 15-10 所示。或者，你也可以选择“新建文件”命令，并从模板选择器中选取\
  \ `View` 模板。你可以在 iOS ![image](img/arrow.jpg) 用户界面组下找到它。将文件命名为 `SquareShape`。现在，你拥有一个独立的\
  \ Interface Builder 文件（`SquareShape.xib`），它创建了一个单一的 `UIView` 对象。\n\n![9781484202098_Fig15-10.jpg](img/9781484202098_Fig15-10.jpg)\n\
  \n图 15-10. 添加一个新的 Interface Builder 文件\n\n你的 `.xib` 文件需要一个所有者对象。与其使用现有对象，不如专门为此创建一个新对象。添加一个新的\
  \ Swift 类文件（从模板库中），并将其命名为 `ShapeFactory`。编辑该文件，使用以下代码为类创建一个存根：\n\n```\nimport UIKit\n\
  \nclass ShapeFactory: NSObject {\n    @IBOutlet var view: ShapeView! = nil\n    @IBOutlet\
  \ var dblTapGesture: UITapGestureRecognizer! = nil\n    @IBOutlet var trplTapGesture:\
  \ UITapGestureRecognizer! = nil\n}\n```\n\n`ShapeFactory` 类将成为该文件的所有者。这是你的第一个占位对象。要使用所有者对象，请在导航器中选择新的\
  \ `SquareShape.xib` 文件，然后在占位对象组中选择“文件的所有者”，并使用身份检查器将其类更改为 `ShapeFactory`，如图 15-11\
  \ 所示。我还编辑了对象的标签，以便识别。\n\n![9781484202098_Fig15-11.jpg](img/9781484202098_Fig15-11.jpg)\n\
  \n图 15-11. 设置文件所有者的类\n\n你还需要将对象——特别是某些手势识别器——连接到你的视图控制器。为此，你需要第二个占位对象。从对象库中找到“外部对象”对象，并将其拖入大纲中，如图\
  \ 15-12 左侧所示。*外部对象*是一个占位符，代表你将在加载 `.xib` 文件时提供的对象。\n\n![9781484202098_Fig15-12.jpg](img/9781484202098_Fig15-12.jpg)\n\
  \n图 15-12. 添加一个外部对象占位符\n\n选择它，并在身份检查器中将其类更改为 `ViewController`。在外部对象仍处于选中状态时，使用属性检查器为其分配一个标识符\
  \ `viewController`。额外的占位对象通过名称标识，因此你必须为每个对象分配一个唯一的标识符字符串。\n\n现在，你拥有一个 `.xib` 文件，它可以创建一个\
  \ `UIView` 对象，并在加载时预期能够访问两个现有对象——一个 `ShapeFactory` 对象和一个 `ViewController` 对象。\n\n\
  具体计划如下：\n\n\n\n1.  你将更改 `UIView` 对象的类，使其创建一个 `ShapeView` 对象。\n2.  你将用所需的属性配置 `ShapeView`\
  \ 对象。\n3.  你将把形状视图连接到 `ShapeFactory` 的 `view` 输出口，以便工厂对象能够轻松访问新的视图对象。\n4.  你将在 `.xib`\
  \ 文件中设计四个手势识别器对象，将它们添加到 `ShapeView` 对象，并将其操作连接到视图控制器占位符。\n5.  你将把其中两个手势识别器连接到形状工厂占位符，以便工厂对象能够执行一些无法在\
  \ Interface Builder 文件中完成的额外内务处理。\n\n完成后的文件，概念上看起来将类似于 图 15-13 中的对象关系图。\n\n![9781484202098_Fig15-13.jpg](img/9781484202098_Fig15-13.jpg)\n\
  \n图 15-13. SquareShape.xib 对象关系图\n\n## 设计 ShapeView\n\n计划中的前两步是将 `.xib` 文件中当前的 `UIView`\
  \ 对象转变为一个完全配置好的 `ShapeView` 对象。在 `SquareShape.xib` 文件中选择该单个视图对象，并使用标识检查器，将其类更改为\
  \ `ShapeView`。第一步完成。\n\n切换到属性检查器。Xcode 实际上并不了解你将如何在 Interface Builder 文件中使用这些对象。默认情况下，它假定顶层视图对象将成为界面的根视图，因此它会将视图大小设置为\
  \ iPhone 或 iPad 屏幕的尺寸，并添加一个模拟的状态栏。对于 `ShapeView` 来说，情况并非如此，因此请关闭所有这些假设。将模拟尺寸更改为自由形式，并将状态栏更改为无，如\
  \ 图 15-14 所示。现在使用属性和尺寸检查器设置以下属性：\n\n*   将背景设置为默认（无）。\n*   取消勾选不透明属性。\n*   确保已勾选清除图形上下文。\n\
  *   将其尺寸设置为 100 x 100 点。\n\n![9781484202098_Fig15-14.jpg](img/9781484202098_Fig15-14.jpg)\n\
  \n图 15-14. 设计 ShapeView 对象\n\n至此，你已经复制了使用 `.xib` 文件创建新 `ShapeView` 对象的工作——唯一遗漏的是\
  \ `shape` 属性，稍后你将处理它。\n\n选择 `ShapeView.swift` 文件，使用以下代码将 `shape` 属性从常量改为变量（新代码以粗体显示）：\n\
  \n```\nvar shape: ShapeSelector = .Square\n```\n\n这样做的原因是，你不会在对象创建时（在 `.xib` 文件中）设置它的形状，因此它必须是一个可变属性。仍在\
  \ `ShapeView.swift` 文件中，进行以下更改：\n\n1.  删除 `initialSize` 和 `alternateHeight` 的定义。它们曾用于定义视图的初始尺寸，而现在该尺寸在\
  \ `.xib` 文件中声明。\n2.  删除整个 `init(shape:,origin:)` 初始化函数。现在视图将完全在 `.xib` 文件中创建和配置。\n\
