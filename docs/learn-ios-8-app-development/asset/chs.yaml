- '# 在物理 iOS 设备上测试


  你可以使用 Xcode 的 iPhone 和 iPad 模拟器测试你的大量应用，但有一些事情模拟器无法模拟。其中两件事是多次（超过两次）触摸和真实的加速度计事件。要测试这些功能，你需要一个真实的
  iOS 设备，带有真实的加速度计硬件，并且你可以用真实的手指触摸它。


  第一步是将 Xcode 连接到你的 iOS 开发者账户。选择 Xcode ![image](img/arrow.jpg) Preferences 并切换到 Accounts
  标签。从窗口底部的 + 按钮选择 Add Apple ID，如 Figure 4-15 所示。


  ![9781484202098_Fig04-15.jpg](img/9781484202098_Fig04-15.jpg)


  Figure 4-15. 将新的 Apple ID 添加到 Xcode


  提供你的 Apple ID 和密码，然后点击 Add 按钮。如果你还不是 iOS Developer Program 的成员，有一个方便的 Join Program
  按钮，会将你带到 Apple 的网站。


  **注意** 在设备上运行应用之前，你必须先成为 iOS Developer Program 的成员。请访问`http://developer.apple.com/programs/ios`了解如何成为会员。一旦你成为会员，Xcode
  将使用你的 Apple ID 来下载和安装配置设备所需的安全证书。


  将 iPhone、iPad 或 iPod Touch 插入电脑的 USB 端口。打开 Xcode 的设备窗口（Window ![image](img/arrow.jpg)
  Devices）。你插入的 iOS 设备将出现在左侧，如 Figure 4-16 所示。如果你的设备上出现“信任”对话框，如 Figure 4-16 右侧所示，你需要授予
  Xcode 访问你的设备的权限。


  ![9781484202098_Fig04-16.jpg](img/9781484202098_Fig04-16.jpg)


  Figure 4-16. 设备管理


  在侧边栏中选择你的 iOS 设备。如果显示“Use for Development”按钮，点击它，Xcode 将准备你的设备进行开发，这个过程称为*配置*。这将允许你直接通过
  Xcode 构建、安装和运行大多数 iOS 项目。


  一旦你的设备配置完成，返回你的项目工作区窗口。将方案设置从某个模拟器更改为你的实际设备。我配置了一个名为 iPad 4 的 iPad，因此 iPad 4 现在作为运行目标之一出现在
  Figure 4-17 中。


  ![9781484202098_Fig04-17.jpg](img/9781484202098_Fig04-17.jpg)


  Figure 4-17. 选择用于测试的 iOS 设备


  再次运行 EightBall 应用。这次，你的应用将被构建，复制到你的 iOS 设备上，并在那里开始运行。很酷吧？


  令人惊叹的是 Xcode 仍然在控制之中——所以暂时不要拔掉你的 USB 连接！你可以设置断点、冻结应用、检查变量，并且通常可以做任何在模拟器中能做的事情。


  当 EightBall 应用运行时，摇晃你的设备，看看会发生什么。完成后，点击 Xcode 工具栏中的 Stop 按钮。你会注意到你的 EightBall 应用现在已安装在你的设备上。你可以随意拔掉
  USB 连接并随身携带；毕竟，这是你的应用。


  '
- "# 响应者链的其他用途\n\n趁你对响应者链的概念还记忆犹新，在你继续学习低级事件之前，我想提一下响应者链的其他几个用途。响应者链不仅仅用于处理事件。它在操作、编辑和其他服务中也扮演着重要角色。\n\
  \n在之前的项目中，你将按钮和文本字段的操作连接到特定对象。在 Interface Builder 中连接操作会设置两部分信息。\n\n*   将接收操作的对象（`ViewController`）\n\
  *   要调用的操作函数（`shortenURL(_:)`）\n\n\n\n也可以将动作发送到响应链，而非特定对象。在 Interface Builder 中，你可以通过将动作连接到第一响应者占位对象来实现这一点，如图\
  \ 4-18 所示。\n\n![9781484202098_Fig04-18.jpg](img/9781484202098_Fig04-18.jpg)\n\n\
  图 4-18. 将动作连接到响应链\n\n当按钮的动作被发送时，它会首先到达第一响应者对象——无论该对象是什么。对于动作，iOS 会检测该对象是否实现了预期的函数（本例中为\
  \ `loadLocation(_:)`）。如果是，则该对象会接收到那条消息。如果不是，iOS 就会沿着响应链逐级查找，直到找到一个实现了该函数的对象。\n\n\
  这在较复杂的应用中尤其有用，当动作消息的接收者位于 Interface Builder 文件或故事板场景的作用域之外时尤为如此。你只能在同一个场景中的对象之间建立连接。如果你需要一个按钮向另一个视图控制器或应用对象本身发送动作，在\
  \ Interface Builder 中是无法建立这种连接的。但你可以将按钮连接到第一响应者。只要预期的接收者在按钮触发动作时位于响应链中，你的对象就能接收到它。\n\
  \n编辑功能也高度依赖响应链。在 iOS 中开始编辑文本时（比如 Shorty 应用中的 URL 字段），该对象会成为第一响应者。当用户使用键盘（虚拟键盘或其他键盘）输入时，这些按键事件会被发送给第一响应者。同一屏幕中可以包含多个文本字段，但只有一个会成为第一响应者。所有按键事件、复制粘贴命令等，都会发送给当前活动的文本字段。\n\
  \n## Touchy 应用\n\n你已经了解了很多关于所谓的高层事件、初始响应者和响应链的知识。现在是时候深入底层事件处理了，我们从最常用的底层事件开始：触摸事件。\n\
  \nTouchy 应用是一个演示应用。它唯一的功能就是向你展示你正在触摸屏幕的位置。它既有助于观察实际操作过程，也有助于探索触摸事件处理中的一些细微之处。你还将学到一项非常重是\
  \ Interface Builder 新技能：在界面中创建自定义对象。\n\n#### 设计\n\nTouchy 应用的界面也极其简单，如图 4-19 所示。Touchy\
  \ 将显示你触摸视图对象的一个或多个位置。为了让应用不那么无聊，我们会添加一些额外图形来点缀一下，但这并非此次探索的重点。\n\n![9781484202098_Fig04-19.jpg](img/9781484202098_Fig04-19.jpg)\n\
  \n图 4-19. Touchy 应用草图\n\n该应用将通过一个自定义视图对象来拦截触摸事件。你的自定义视图对象将提取每个活动触摸点的坐标，并用这些坐标来绘制它们的位置。\n\
  \n### 创建项目\n\n按照前几次的方式，首先创建一个基于“单视图 iOS 应用程序”模板的新 Xcode 项目。将项目命名为 Touchy，语言设置为 Swift，设备选择通用。\n\
  \n选择位置保存新项目并创建它。在项目导航器中，选择项目，选择 Touchy 目标，选择摘要标签页，然后更改设备方向，仅启用竖屏方向。\n\n### 创建自定义视图\n\
  \n我们将改变前几个应用中的开发模式。你不再将代码添加到 `ViewController` 类中，而是创建一个新的 `UIView` 自定义子类。“为什么”将在第\
  \ 11 章中解释。“如何做”现在就来解释。\n\n在项目导航器中选中 Touchy 组（而不是项目）。从文件模板库中，拖入一个新的 Swift 文件，并将其放到你的项目中，放置在\
  \ `ViewController.swift` 文件下方，如图 4-20 所示。将该文件命名为 `TouchyView` 并添加到你的项目中。\n\n![9781484202098_Fig04-20.jpg](img/9781484202098_Fig04-20.jpg)\n\
  \n图 4-20. 添加新的 Swift 源文件\n\n将单一的 `import Foundation` 语句替换为 `import UIKit` 语句，后跟一个\
  \ `class TouchyView: UIView { }` 声明，如图 4-21 所示。\n\n![9781484202098_Fig04-21.jpg](img/9781484202098_Fig04-21.jpg)\n\
  \n图 4-21. 定义一个新的 Swift 类\n\n你已成功创建了一个新的 Swift 类！你的类是 `UIView` 的子类，因此它继承了 `UIView`\
  \ 对象的所有行为和特性，并且可以在任何使用 `UIView` 对象的地方使用。\n\n### 处理触摸事件\n\n现在你将自定义你的 `UIView` 对象来处理触摸事件。请记住，基类\
  \ `UIResponder` 和 `UIView` 并不处理触摸事件。相反，它们只是将事件沿响应链向上传递。通过实现你自己的触摸事件处理函数，你将改变这一行为，使你的视图直接响应触摸操作。\n\
  \n正如你已经知道的，触摸事件会被传递到它们所发生的视图对象。如果你还不知道这一点，请返回阅读“命中测试”部分。你只需在你的类中添加适当的事件处理函数即可。将以下代码添加到你的\
  \ `TouchyView` 类中：\n\n```\noverride func touchesBegan(touches: NSSet, withEvent\
  \ event: UIEvent) {\n    updateTouches(event.allTouches())\n}\n\noverride func touchesMoved(touches:\
  \ NSSet, withEvent event: UIEvent) {\n    updateTouches(event.allTouches())\n}\n\
  \noverride func touchesEnded(touches: NSSet, withEvent event: UIEvent) {\n    updateTouches(event.allTouches())\n\
  }\n\noverride func touchesCancelled(touches: NSSet!, withEvent event: UIEvent) {\n\
  \    updateTouches(event.allTouches())\n}\n```\n\n**注意** Xcode 会在你的源代码中显示一些错误。先忽略它们；等你添加了\
  \ `updateTouches(_:)` 函数后就会修复。\n\n每个触摸事件消息都包含两个对象：一个包含相关触摸对象的 `NSSet` 对象，以及一个概括了导致函数被调用的事件的\
  \ `UIEvent` 对象。\n\n在典型的应用中，你的函数可能只关心 `touches` 集合。这个集合（或无序集合）中的每个对象对应一个与该事件相关的触摸，都包含一个\
  \ `UITouch` 对象。每个 `UITouch` 对象描述一个触摸位置：其坐标、相位、发生时间、点击次数等。\n\n对于“开始”事件，touches 集合将包含刚刚开始的触摸所对应的\
  \ `UITouch` 对象。对于“移动”事件，它只包含那些发生了移动的触摸点。对于“结束”事件，它只包含那些从屏幕上移除的触摸对象。从编程角度来看这很方便，因为大多数视图对象只关心与该事件相关的\
  \ `UITouch` 对象。\n\n然而，Touchy 应用略有不同。Touchy 希望始终跟踪所有活动的触摸。你其实并不关心刚刚发生了什么。相反，你想要的是“全局视图”：当前与屏幕接触的所有触摸点的列表。为此，我们需要转向\
  \ `event` 对象。\n\n`UIEvent` 对象的主要目的是描述刚刚发生的单个事件，或者更准确地说，是刚刚从事件队列中取出的单个事件。但 `UIEvent`\
  \ 还携带了一些其他有趣的信息。其中之一是 `allTouches` 属性，它包含了设备上所有触摸点的当前状态，无论它们与哪个视图相关联。\n\n\n\n现在我可以解释你所有的事件处理函数在做什么了。它们一直在等待设备触摸状态的任何变化，忽略具体的变化细节，深入`event`对象找到所有活跃触摸对象的状态，然后将这些状态传递给你的`updateTouches(_:)`函数。这个函数会记录所有活跃触摸的位置，并利用这些信息在屏幕上绘制这些位置。\n\
  \n那么，我想你需要编写这个函数了！紧接在`TouchyView.swift`中刚刚添加的触摸事件处理函数之后，添加以下函数：\n\n```\nvar touchPoints\
  \ = [CGPoint]()\n\nfunc updateTouches( touches: NSSet? ) {\n    touchPoints = []\n\
  \    touches?.enumerateObjectsUsingBlock() { (element, stop) in\n        if let\
  \ touch = element as? UITouch {\n            switch touch.phase {\n            \
  \    case .Began, .Moved, .Stationary:\n                    self.touchPoints.append(touch.locationInView(self))\n\
  \                default:\n                    break\n            }\n        }\n\
  \    }\n    setNeedsDisplay()\n}\n```\n\n`updateTouches(_:)`函数首先将`touchPoints`数组对象设置为空数组。这是你要存储感兴趣信息的地方。然后`updateTouches(_:)`遍历集合中的每个`UITouch`对象，并检查其*阶段（phase）*。触摸的阶段是其当前状态：“开始（began）”、“移动（moved）”、“静止（stationary）”、“结束（ended）”或“取消（canceled）”。Touchy\
  \ 只对表示手指仍接触屏幕的状态（“开始”、“移动”和“静止”）感兴趣。`switch`语句匹配这三个状态，并获取相对于此视图对象的触摸坐标。然后将这个`CGPoint`值添加到`touchPoints`数组中。\n\
  \n一旦收集完所有活跃触摸的坐标，你的视图对象会调用其`setNeedsDisplay()`函数。这个函数告知视图对象需要重绘自身。\n\n### 绘制你的视图\n\
  \n到目前为止，你还没有编写任何绘制内容的代码。你只是拦截了发送到视图的触摸事件，并提取了关于设备触摸状态所需的信息。在 iOS 中，你并不是在事件发生时立刻绘制内容，而是记录下需要绘制的内容，等待\
  \ iOS 告知你的对象何时进行绘制。绘制由我在本章开头提到的用户界面更新事件触发。\n\n关于绘制的工作原理在第 11 章中有描述，因此这里我不再深入细节。只需知道当\
  \ iOS 希望你的视图进行自绘制时，会调用对象的`drawRect(_:)`函数。请将这个`drawRect(_:)`函数添加到你的类中：\n\n```\n\
  override func drawRect(rect: CGRect) {\n    let context = UIGraphicsGetCurrentContext()\n\
  \    UIColor.blackColor().set()\n    CGContextFillRect(context, rect)\n\nvar connectionPath:\
  \ UIBezierPath?\n    if touchPoints.count > 1 {\n        for location in touchPoints\
  \ {\n            if let path = connectionPath {\n                path.addLineToPoint(location)\n\
  \            }\n            else {\n                connectionPath = UIBezierPath()\n\
  \                connectionPath!.moveToPoint(location)\n            }\n        }\n\
  \        if touchPoints.count > 2 {\n            connectionPath!.closePath()\n \
  \       }\n    }\n\nif let path = connectionPath {\n        UIColor.lightGrayColor().set()\n\
  \        path.lineWidth = 6\n        path.lineCapStyle = kCGLineCapRound\n     \
  \   path.lineJoinStyle = kCGLineJoinRound\n        path.stroke()\n    }\n\nvar touchNumber\
  \ = 0\n    let fontAttributes = [\n            NSFontAttributeName:            UIFont.boldSystemFontOfSize(180),\n\
  \            NSForegroundColorAttributeName: UIColor.yellowColor()\n           \
  \ ];\n    for location in touchPoints {\n        let text: NSString = \"\\(++touchNumber)\"\
  \n        let size = text.sizeWithAttributes(fontAttributes)\n        let textCorner\
  \ = CGPoint(x: location.x - size.width / 2,\n                                 y:\
  \ location.y - size.height / 2)\n        text.drawAtPoint(textCorner, withAttributes:\
  \ fontAttributes)\n    }\n\n}\n```\n\n哇，代码真多。同样，细节并不重要，但你可以自由研究这段代码以了解其功能。我仅在此概述其作用。\n\
  \n第一部分将整个视图填充为黑色。\n\n中间部分是一个大循环，它创建了一个贝塞尔路径（以法国工程师皮埃尔·贝塞尔命名）。贝塞尔路径几乎可以表示任何线条、多边形、曲线、椭圆或这些元素的任意组合。基本上，只要是一个形状，贝塞尔路径就能绘制它。你将在第\
  \ 11 章中全面了解贝塞尔路径。在这里，它用于在两个或更多触摸点之间绘制浅灰色线条。这纯粹是为了视觉美观，即使去掉`drawRect(_:)`函数的这一部分，应用仍然可以正常运行。\n\
  \n最后一部分是有趣的部分。它遍历触摸坐标，并在触摸屏幕的每个手指下方居中绘制一个大的黄色数字“1”、“2”或“3”。\n\n现在你已经拥有了一个自定义视图类，它可以收集触摸事件、跟踪它们并在屏幕上绘制。这个谜题的最后一个部分是，如何将你的自定义对象引入到界面中。\n\
  \n### 在 Interface Builder 中添加自定义对象\n\n选择你的`Main.storyboard` Interface Builder 文件，然后选择视图控制器场景中的唯一一个视图对象。切换到身份检查器。身份检查器会显示所选对象的类。在本例中，它是项目模板创建的普通`UIView`对象。\n\
  \n这里有一个很酷的技巧：你可以使用身份检查器将通用视图对象的类更改为你创建的任何`UIView`子类。将该视图对象的类从`UIView`更改为`TouchyView`，如图\
  \ 4-22 所示。你可以使用下拉菜单或直接输入类名来完成此操作。\n\n![9781484202098_Fig04-22.jpg](img/9781484202098_Fig04-22.jpg)\n\
  \n图 4-22. 更改 Interface Builder 对象的类\n\n现在，你的应用将不再创建`UIView`对象作为根视图，而是创建一个`TouchyView`对象，并包含你定义的所有函数、属性、输出口和操作。你可以对界面中的任何现有对象执行此操作。如果你想创建一个新的自定义对象，请在库中找到基类对象（如`NSObject`、`UIView`等），添加该对象，然后将其类更改为你的自定义类。\n\
  \n你新的`TouchyView`对象仍然有一些属性需要定制才能正常工作。保持选中`TouchyView`对象，切换到属性检查器，然后勾选“交互”下的“多点触控”选项。默认情况下，视图对象不接收多点触摸事件。换句话说，即使存在多个触摸点，`touches*SomePhase*(_:withEvent:)`函数也永远不会包含超过一个`UITouch`对象。为了让你的视图接收所有触摸，你必须开启多点触控选项。\n\
  \n**注意**  如果你愿意，也可以给 Touchy 添加一个图标。打开`Touchy (Resources)`文件夹，找到五个`TouchyIcon....png`文件，然后将它们拖入`images.xcassets`资源目录的`AppIcon`组中，就像你为八球应用所做的那样。\n\
  \n### 测试 Touchy\n\n将你的运行方案设置为 iPhone 或 iPad 模拟器，然后运行项目。界面将完全（并且不祥地）变为黑色，如图 4-23\
  \ 左侧所示。\n\n![9781484202098_Fig04-23.jpg](img/9781484202098_Fig04-23.jpg)\n\n图 4-23.\
  \ 在模拟器中运行 Touchy\n\n点击界面，数字“1”就会出现，如图 4-23 中间所示。尝试拖动它。Touchy 会跟踪触摸界面的所有变化，进行更新，然后在每次触摸的确切位置下方绘制一个数字。\n\
  \n\n\n"
- '# 高级事件处理


  按住 `Option` 键并再次点击。屏幕上会出现两个位置，如图 4-23 右侧所示。当你按住 `Option` 键时，模拟器可以让你测试简单的双指手势。仅使用
  `Option` 键，就能测试捏合与缩放手势。同时按住 `Option` 键和 `Shift` 键则可测试双指滑动。


  不过，模拟器的功能仅限于此。要测试其他任何触摸事件的组合，你必须在真实的 iOS 设备上运行你的应用。回到 Xcode，停止你的应用，并将方案更改为 iOS 设备（iPhone、iPad
  或 iPod Touch——即你已连接的设备）。再次运行你的应用。


  现在在 iOS 设备上尝试 Touchy 应用。尝试用两根、三根、四根甚至五根手指触摸。移动它们，抬起一根手指，再放下。这出奇地有趣。


  '
- '# 高级事件处理


  我想提及几个高级事件处理主题，并附上一些良好建议。先从建议说起。


  请保持事件处理及时。如你现在所知，你的应用是通过主线程的运行循环（run loop）来“保持存活”的。该运行循环将所有内容交付给你的应用：触摸事件、通知、用户界面更新等等。你的应用处理的每一个事件、动作和消息，都必须在下一个事件被处理之前执行完毕并返回。这意味着，如果你编写的任何代码执行时间过长，你的应用就会像死掉一样。而且，如果编写的代码需要极长时间才能完成，你的应用*确实会*死掉——iOS
  会因为应用停止响应事件而终止它。


  我相信你肯定遇到过应用“卡死”的情况：屏幕冻结，对触摸、晃动或任何操作都没有反应。这就是当应用的运行循环在处理其他事务而非处理事件时发生的情况。这很不愉快。大多数
  iOS 中可能耗时较长的功能都提供异步函数（就像你在 Shorty 中使用过的那些），这样这些耗时的任务就不会占用你的主线程。请使用这些异步函数，留意你的程序执行各项操作所花费的时间，并准备好重构应用，以避免“锁死”运行循环。我将在后续章节中演示所有这些技巧。


  其次，处理多个触摸事件可能很棘手，甚至令人困惑。iOS 会尽力理清触摸事件的复杂性，并以合理且易于理解的形式呈现给你的对象。iOS 提供了五项功能，能使你的触摸事件处理更简单。


  *   手势识别器（Gesture recognizers）

  *   过滤掉其他视图的触摸事件

  *   禁止多点触摸事件

  *   提供独占触摸事件处理

  *   暂停触摸事件


  手势识别器是代表视图对象拦截触摸事件的特殊对象。每个识别器检测特定的触摸手势，从简单的点击到复杂的多指滑动。如果它检测到编程设定的手势，就会发送一个动作——这与你之前项目中用过的按钮对象完全一样。你只需要将该动作连接到
  Interface Builder 中的一个对象即可完成。仅此一项功能就已为 iOS 开发人员节省了数万行触摸事件处理代码。我将在后续章节中向你展示如何使用手势识别器对象。


  正如我之前所述，触摸事件（例如 `touchesMoved(_:,withEvent:)`）仅在 `touches` 参数中包含相关的触摸对象——即那些起始于你的视图对象的触摸。你的代码无需担心同一时间可能发生在其他视图中的其他触摸。在
  Touchy 应用中，这实际上是一个缺点，你不得不从 `UIEvent` 对象中挖掘出全局的触摸对象集合。但通常，你只需要关注自己视图中的触摸。


  你也看到了 iOS 如何使用 `UIView` 的 `multipleTouchEnabled` 属性来禁止多点触摸事件。如果该属性为 `false`，即使实际用户正在用多根手指触摸你的视图，iOS
  也只会发送与首次触摸相关的视图对象事件。为了让 Touchy 应用获取所有触摸事件，你不得不将该属性设为 `true`。如果你的视图仅解释单点触摸事件，请将此属性设为
  `false`，这样你就不必编写任何处理同时多点触摸的代码了。


  如果你不希望 iOS 同时向两个视图对象发送触摸事件，可以将 `UIView` 的 `exclusiveTouch` 属性设为 `true`。如果设置，一旦触摸序列在你的视图中开始，iOS
  就会阻止将触摸事件发送到任何其他视图（反之亦然）。


  最后，如果你的应用需要，你可以暂时暂停所有向特定视图甚至整个应用发送的触摸事件。如果你想让某个单独的视图对触摸事件“充耳不闻”，请将其 `userInteractionEnabled`
  属性设为 `false`。你也可以调用应用对象的 `beginIgnoringInteractionEvents()` 函数，这样应用的所有触摸事件都会被静默。通过调用
  `endIgnoringInteractionEvents()` 可以重新开启它们。这对于防止触摸事件干扰正在进行的其他操作（例如，一个短动画）非常有用，但不要长时间保持关闭状态。


  '
- '# 总结


  到现在为止，你对于消息和事件如何进入你的应用以及它们如何被处理，已经有了相当扎实的理解。你了解了事件队列和运行循环。你知道队列中的事件会被分发给应用中的对象。你知道其中一些事件直接发送给你的对象，触摸事件使用命中测试（hit
  testing），其余的事件则被发送给第一响应者。


  你学到了很多关于响应者链的知识。在 iOS 中，响应者链除了传递事件之外，还执行许多重要任务。


  你知道了如何配置一个对象来处理或忽略特定类型的事件。你编写了两个应用，一个处理高级事件，另一个追踪低级触摸事件。


  甚至更令人惊叹的是，你构建并运行了应用在真实的 iOS 设备上！也可以随意在设备上运行其他项目。创建一款可以随身携带的你自己的 iOS 应用，是一项令人印象深刻的成就！


  在下一章中，你将学习一些关于数据模型的知识，以及复杂的数据集如何转化为屏幕上的滚动列表。


  ## 练习题


  根据魔术八球（Magic Eight Ball）附带的说明，你不应该摇晃它；这会导致液体中产生气泡。当然，这从未阻止过我和我兄弟把它晃得够呛。相反，你应该把球“8”面朝上放在桌子上，问一个问题，轻轻地将它翻转过来，然后读取答案。


  作为附加题，请重写 EightBall 应用，使其使用设备方向事件（而非晃动运动事件）来让消息消失和出现。设备的方向可以是：竖屏、向左横屏、向右横屏、倒置、屏幕朝上或屏幕朝下。


  设备方向的变化是通过通知传递的。你还没有使用过通知，但可以将它们视为另一种事件（至少在此上下文中如此）。与事件不同，你的对象必须显式请求它想要接收的通知。每当设备改变方向时，例如用户将
  iPhone 翻转过来，你的对象就会收到一条通知消息。


  请求和处理设备方向更改通知所需的所有代码，都在《iOS 事件处理指南》的“使用 UIDevice 获取当前设备方向”部分中。在 Xcode 中，选择“帮助”![图片](img/arrow.jpg)“文档和
  API 参考”，然后搜索“事件处理指南”（*Event Handling Guide*）。




