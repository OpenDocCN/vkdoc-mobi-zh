- '# 总结


  给自己鼓掌吧；你在本章中涉及了大量的内容。你学习了 Xcode 的使用方法，向项目添加了资源，并使用 Interface Builder 来创建、配置和连接界面中的对象；你还学到了很多关于自动布局约束的知识。令人惊讶的是，你做所有这些事都没有编写一行计算机代码。


  本章的重点并非避免编写 Swift 代码。毕竟，我们是计算机程序员。如果我们不写代码，那我们的报酬从何而来？重点是向你展示，使用 Interface Builder
  和 iOS 对象，你可以添加多少功能，以及可以避免多少繁琐的细节。


  你的编码手指是不是已经痒了？在下一章中，你将编写一个更传统的应用——一个包含代码的应用。


  '
- '# 第 3 章


  '
- "# 旋转网页\n\n活动一下你的编码手指。本章将向你介绍 iOS 应用开发的一些核心技能，以及大量的 Swift 代码。你在本章中创建的应用以及将要采取的步骤，是构建\
  \ iOS 应用的典型方式。从这个角度来看，这将是你第一个“真正的”iOS 应用。\n\n你已经学会了使用 Interface Builder 向应用添加库对象、自定义它们并建立连接。在本章中，你将执行以下操作：\n\
  \n- 自定义一个 Swift 类\n- 使用 Swift 为你自定义的类添加 `outlet` 和 `action`\n- 使用 Interface Builder\
  \ 将这些 `outlet` 连接到对象\n- 使用 Interface Builder 将对象连接到你的自定义 `action`\n- 通过将库对象连接到 `delegate`\
  \ 来改变其行为\n\n你要构建的应用是一个 URL 缩短应用。这个应用依赖于许多可用的 URL 缩短服务之一。这些服务接收任意长度的 URL，并生成一个更短的\
  \ URL，这在阅读、电话口述或在推特中使用时要方便得多。URL 缩短服务的工作原理是记住原始 URL。当世界上任何人试图加载这个短 URL 对应的网页时，该服务会返回一个*重定向*响应，将浏览器引导至原始\
  \ URL。\n\n为了制作这个应用，你将学习如何在其中嵌入一个网页浏览器——这是一个有多种用途的技巧。它还将向你展示如何以编程方式从你的应用发送和接收 HTTP\
  \ 请求，这是创建使用互联网服务的应用的有用工具。\n\n> **注**：对于计算机程序员来说，*编程方式（programmatically）* 一词的意思是“通过编写计算机代码”。这意味着你通过使用诸如\
  \ Swift 之类的计算机语言编写指令来完成某事，而不是通过其他任何方式。例如，Interface Builder 允许你通过在两个对象之间拖拽一条线来连接它们。你也可以编写\
  \ Swift 代码来连接这两个相同的对象。如果你使用了后一种方法，你可以说你是“以编程方式设置了连接”。\n\n#### 设计\n\n这个应用需要一些基本元素。用户需要一个输入和编辑\
  \ URL 的字段。内置一个网页浏览器会很好，这样他们可以查看该 URL 的页面，并点击链接跳转到其他 URL。还需要一个按钮将长 URL 转换为短 URL，以及一个显示缩短后\
  \ URL 的地方。\n\n这个设计并不特别复杂，所有内容应该能轻松地放在一个屏幕上，如图 3-1 的草图所示。让我们再加入一个额外功能：一个用于将缩短后的 URL\
  \ 复制到 iOS 剪贴板的按钮。现在，用户可以方便地将缩短后的 URL 粘贴到其他应用中。\n\n![9781484202098_Fig03-01.jpg](img/9781484202098_Fig03-01.jpg)\n\
  \n*图 3-1. Shorty 应用草图*\n\n你的应用将在所有 iOS 设备上运行，并且同时支持竖屏和横屏方向。现在你已经有了基本设计，是时候启动 Xcode\
  \ 并开始动手了。\n\n### 创建项目\n\n与任何应用一样，首先在 Xcode 中创建一个新项目。这是一个单屏幕应用，所以显而易见的选择是 `Single\
  \ View Application` 模板。\n\n填写项目详细信息，如图 3-2 所示。将项目命名为 `Shorty`，将语言设置为 `Swift`，并为设备选择\
  \ `Universal`。\n\n![9781484202098_Fig03-02.jpg](img/9781484202098_Fig03-02.jpg)\n\
  \n*图 3-2. Shorty 项目详细信息*\n\n点击 `Next` 按钮。选择一个位置来保存你的新项目，然后点击 `Save`。\n\n### 构建网页浏览器\n\
  \n首先构建应用的网页浏览器部分。这将由一个文本字段（用户在此输入他们想要访问/转换的 URL）和一个显示该页面的网页视图组成。让我们再加一个刷新按钮，用于重新加载当前\
  \ URL 的页面。\n\n在导航器中选择 `Main.storyboard` 文件。在对象库中，找到 `Navigation Bar` 对象并将其拖入视图，靠近顶部，如图\
  \ 3-3 所示。导航栏对象通常由导航控制器创建，用于显示标题、返回按钮等。你在 Surrealist 应用中已经见过。不过，这里你将单独使用一个。\n\n![9781484202098_Fig03-03.jpg](img/9781484202098_Fig03-03.jpg)\n\
  \n*图 3-3. 添加导航栏*\n\n将导航栏定位为视图的全宽。确保它仍处于选中状态，然后点击画布右下角的“Pin 约束”控件（四个按钮中的第二个）。在“Pin\
  \ 约束”弹出窗口中，点击以设置顶部、左侧和右侧边缘约束，如图 3-4 所示。\n\n![9781484202098_Fig03-04.jpg](img/9781484202098_Fig03-04.jpg)\n\
  \n*图 3-4. 为导航栏添加约束*\n\n确保所有三个约束的值都是 `0`。这告诉 iOS 将导航栏定位在屏幕顶部的推荐位置（就在系统状态栏下方），并且它将是显示器的全宽。点击\
  \ `Add 3 Constraints` 按钮。如图 3-4 右侧所示，点击“解决自动布局问题”控件（四个按钮中的第三个），然后选择 `Update Frames`\
  \ 命令。这将根据你刚设置的约束在 Interface Builder 中重新定位视图。\n\n现在添加网页视图。在库中找到 `Web View` 对象，并将其拖入屏幕的下半部分。移动并调整网页视图的大小，使其恰好填满视图的其余部分——从导航栏到屏幕底部，如图\
  \ 3-5 所示。\n\n![9781484202098_Fig03-05.jpg](img/9781484202098_Fig03-05.jpg)\n\n*图\
  \ 3-5. 添加网页视图*\n\n再次点击“解决自动布局问题”控件，但这次选择 `Add Missing Constraints in View Controller`。Interface\
  \ Builder 会使用你已建立的约束，并填充任何额外的约束，以在所有设备上建立此布局。\n\n在库中找到 `Bar Button Item` 对象，并将其拖入导航栏的右侧，如图\
  \ 3-6 所示。栏按钮项是专门为放置在导航栏或工具栏中而设计的按钮对象。\n\n![9781484202098_Fig03-06.jpg](img/9781484202098_Fig03-06.jpg)\n\
  \n*图 3-6. 向导航栏添加按钮*\n\n放置好后，选中它。切换到属性检查器，将新按钮的 `Identifier` 设置改为 `Refresh`（见图 3-7）。按钮的图标将变为一个圆形箭头。\n\
  \n![9781484202098_Fig03-07.jpg](img/9781484202098_Fig03-07.jpg)\n\n*图 3-7. 将按钮标识符改为\
  \ Refresh*\n\n\n\n### 图 3-7. 在导航栏中创建刷新按钮\n\n在库中找到文本字段（注意不是文本视图！）对象，并将其拖入导航栏中央。该对象会替换通常显示的默认标题。抓住右侧或左侧的调整大小手柄，拉伸该字段使其填满导航栏中的大部分空闲空间，如图\
  \ 3-8 所示。\n\n![9781484202098_Fig03-08.jpg](img/9781484202098_Fig03-08.jpg)\n\n###\
  \ 图 3-8. 调整 URL 字段大小\n\n用户将在该字段中输入他们的 URL。对其进行配置，使其针对输入和编辑 URL 进行优化。选中新的文本字段对象，然后使用属性检查器更改以下属性：\n\
  \n*   将 `text` 设置为 `http://`。\n*   将 `Placeholder Text` 设置为 `http://`。\n*   将 `Clear\
  \ Button` 更改为 `Appears while editing`。\n*   将 `Correction` 更改为 `No`。\n*   将 `Keyboard\
  \ Type` 更改为 `URL`。\n*   将 `Return Key` 更改为 `Go`。\n\n这些设置将字段的初始内容设为 `http://`（这样用户就不必输入它），如果用户清除了该字段，一个半透明的\
  \ `http://` 会提示他们输入一个网页 URL。关闭拼写校正功能是合适的（URL 并非口语）。当键盘出现时，它会针对 URL 输入进行优化，并且键盘上的\
  \ Return 键将显示单词 *Go*，表示用户点击该键时将会加载 URL。\n\n你已经创建并布局了你的网页浏览器的所有可视化元素。现在你需要编写一些代码来连接这些部分，使它们协同工作。\n\
  \n### 编码一个网页浏览器\n\n在项目导航器中选择 `ViewController.swift` 文件（见图 3-9）。该文件定义了你的 `ViewController`\
  \ 类。这是一个你创建的自定义类——好吧，严格来说，它是由项目模板为你创建的，但你可以将其归功于自己。我不会告诉别人的。你的 `ViewController`\
  \ 对象的工作是增强功能并管理其所连接的视图对象的交互。你的应用程序只有一个视图，因此你只需要一个视图控制器。\n\n![9781484202098_Fig03-09.jpg](img/9781484202098_Fig03-09.jpg)\n\
  \n### 图 3-9. 向 `ViewController.swift` 添加属性\n\n不同的对象在你的应用程序中扮演着不同的角色。这些角色将在第 8 章中进行解释。当你向应用程序添加代码时，你需要决定将其添加到哪个类中。这个应用很简单；你将把所有自定义内容添加到\
  \ `ViewController` 类中。\n\n> **提示**: *类*和*对象*这两个术语让你困惑了吗？请阅读第 6 章的前半部分以获取解释。\n\n\
  你的 `ViewController` 类是 `UIViewController` 类的一个子类，`UIViewController` 由 Cocoa Touch\
  \ 框架定义。这意味着你的 `ViewController` 类继承了 `UIViewController` 的所有特性和行为——这很多，因为 `UIViewController`\
  \ 相当复杂。如果你什么都不做，你的 `ViewController` 对象的行为将与任何其他 `UIViewController` 对象完全一样。\n\n乐趣在于编辑\
  \ `ViewController.swift` 以添加新功能或更改其继承的行为。\n\n### 向 `ViewController` 添加输出口\n\n首先，向\
  \ `ViewController` 添加两个新属性。一个*属性*定义了一个与对象关联的值。在其最简单的形式中，它仅仅是创建了一个对象会记住的新变量。将这些属性添加到\
  \ `ViewController.swift` 中（新代码以粗体表示）：\n\n```\nclass ViewController: UIViewController\
  \ {\n    @IBOutlet var urlField: UITextField!\n    @IBOutlet var webView: UIWebView!\n\
  ```\n\n完成后，你的类定义应类似于图 3-9 中的那个。那么，这一切都意味着什么呢？让我们详细分析这些声明：\n\n*   `@IBOutlet` 是一个重要的关键字，使该属性在\
  \ Interface Builder 中显示为*输出口*。\n*   `var` 定义一个*变*量属性。\n*   `urlField`/`webView`\
  \ 是该属性的*名称*。\n*   `UITextField`/`UIWebView` 是该属性的*类型*。在这种情况下，它指的是该属性所存储对象的类。\n*\
  \   `!` 表示它是一个可选变量，但假定其包含一个有效的对象引用。可选类型将在第 20 章中解释。\n\n通过将这些属性添加到 `ViewController`，你使得任何\
  \ `ViewController` 对象都可以直接连接到一个文本字段对象（通过其 `urlField` 属性）和一个网页视图对象（通过其 `webView`\
  \ 属性）。\n\n你已经定义了连接到其他两个对象的可能性，但还没有连接它们。为此，你将使用 Interface Builder。\n\n### 连接自定义输出口\n\
  \n点击项目导航器中的 `Main.storyboard` 文件。在侧边栏或视图上方的 Dock 中找到并选择视图控制器对象，两者都如图 3-10 所示。\n\n\
  ![9781484202098_Fig03-10.jpg](img/9781484202098_Fig03-10.jpg)\n\n### 图 3-10. 为场景选择视图控制器对象\n\
  \n在大多数情况下，iOS 中的屏幕由一个视图控制器对象和一组视图对象定义。当需要显示该屏幕时，iOS 会从 `.storyboard` 文件中读取信息，并使用该信息来构建该场景中所有对象的新实例。除了创建对象之外，它还会使用你设置的输出口和连接来连接这些对象。完成后，你的视图控制器及其所有视图对象都已被创建、初始化并连接好。\n\
  \n> **注意**: 如果你不能立刻理解这个概念，请不要担心。Interface Builder 优雅而简单，但大多数人需要一段时间才能完全掌握其工作原理。请查看第\
  \ 15 章以深入了解 Interface Builder 是如何施展其魔法的。\n\n到目前为止，你已经将对象添加到场景中，但尚未连接它们。现在就来做这件事。选择视图控制器对象并显示连接检查器。在其中，你将看到刚刚添加到\
  \ `ViewController.swift` 的 `urlField` 和 `webView` 属性。它们之所以出现在 Interface Builder\
  \ 中，是因为你在属性声明中包含了 `@IBOutlet` 关键字。\n\n将连接圆圈拖到 `urlField` 的右侧，并将其连接到导航栏中的文本字段，如图\
  \ 3-11 所示。现在，当加载 `ViewController` 场景时，你的视图控制器对象的 `urlField` 属性将引用界面中的文本字段。很酷，对吧？\n\
  \n![9781484202098_Fig03-11.jpg](img/9781484202098_Fig03-11.jpg)\n\n### 图 3-11. 将输出口连接到对象\n\
  \n另一种方便的设置连接方法是 Control+拖动或右键+拖动从具有连接的对象到你想要连接的目标对象。按住 Control 键，点击视图控制器对象（无论是在侧边栏中还是场景顶部），然后向下拖动到网页视图对象，如图\
  \ 3-12 所示。\n\n![9781484202098_Fig03-12.jpg](img/9781484202098_Fig03-12.jpg)\n\n\
  ### 图 3-12. 连接网页视图输出口\n\n当你释放鼠标按钮时，会弹出一个菜单，要求你选择要设置哪个输出口。选择 `webView`。\n\n### 向\
  \ `ViewController` 添加操作\n\n\n\n"
- "# 为何要创建 Outlet 并连接它们？\n\n你的控制器对象需要获取用户输入的 URL 值，并将其传递给网页视图对象，以便网页视图知道要加载哪个 URL。你的视图控制器对象在此扮演了联络员或管理者的角色，从一个对象（文本字段）获取数据，并将任务分配给另一个对象（网页视图）。现在你明白为什么它被称为*控制器*了吧？\n\
  \n这是一个简单的任务，但需要编写一些代码来实现。在项目导航器中选择 `ViewController.swift` 文件。在项目模板包含的现有函数之后、类声明的结束花括号\
  \ `}` 之前，添加这个新函数：\n\n```\nfunc loadLocation( AnyObject ) {\n    var urlText = urlField.text\n\
  \n    if !urlText.hasPrefix(\"http:\") && !urlText.hasPrefix(\"https:\") {\n   \
  \     if !urlText.hasPrefix(\"//\") {\n            urlText = \"//\" + urlText\n\
  \        }\n        urlText = \"http:\" + urlText\n    }\n\n    let url = NSURL(string:\
  \ urlText)\n    webView.loadRequest(NSURLRequest(URL: url))\n}\n```\n\n这个函数完成一个简单的任务：加载用户在\
  \ URL 栏中输入的网页。这需要三个基本步骤。\n\n1.  获取用户在文本字段中输入的字符串字符。\n2.  将该字符串字符转换为 URL 对象。\n3.\
  \  请求网页视图对象加载该 URL 的页面。\n\n以下是这段代码的解析：\n\n```\nvar urlText = urlField.text\n```\n\
  \n第一行声明了一个名为 `urlText` 的新字符串对象变量，并将其赋值为该对象的 `urlField` 属性的 `text` 属性值。`urlField`\
  \ 属性就是你刚刚添加到这个类的属性。你的 `urlField` 引用的是界面中的 `UITextField` 对象，因为你在 Interface Builder\
  \ 中连接了它。一个 `UITextField` 对象有一个 `text` 属性，其中包含当前字段中的字符——无论是用户输入的还是你通过编程方式放入的。（看，我又用了*编程方式*这个词）。\n\
  \n**提示**：要查看任何类或常量的文档，请按住 Option 键，然后单击（快速查看）或双击（完整文档）其名称。要查看 `UITextField` 类的属性和函数，请按住\
  \ Option 键并双击 `.swift` 文件中的 `UITextField` 一词。\n\n任务的第一部分已经完成；你已经使用定义并连接的 `urlField`\
  \ 属性获取了 URL 的文本。接下来的几行代码可能看起来有点奇怪。\n\n```\nif !urlText.hasPrefix(\"http:\") && !urlText.hasPrefix(\"\
  https:\") {\n    if !urlText.hasPrefix(\"//\") {\n        urlText = \"//\" + urlText\n\
  \    }\n    urlText = \"http:\" + urlText\n}\n```\n\n如果你熟悉 Swift，请仔细看看这段代码。它对你的应用来说并非关键；即使删掉它，你的应用也能正常工作。不过，它确实为用户提供了一个便利。它会检查用户输入的字符串是否以\
  \ `http://` 或 `https://` 开头，即网页的标准协议。如果缺少这些标准 URL 元素，这段代码会自动插入一个。\n\n计算机往往比较死板，但你的应用应该宽容且友好。前面的代码允许用户只输入\
  \ `www.apple.com`（例如），而不是正确的 `http://www.apple.com`，页面仍然会加载。这样讲得通吗？我们继续往下看。\n\n\
  面向对象编程的核心在于将事物的复杂性封装在对象中。虽然一个字符串对象可以表示 URL 的字符，但它仍然只是一个字符串（一组字符）。大多数处理 URL 的函数期望的是\
  \ URL 对象。在 Cocoa Touch 中，URL 对象的类是 `NSURL`。如何将从文本字段获取的 `String` 转换为可以在网页视图中使用的 `NSURL`？我想你会问这个问题。\n\
  \n```\nlet url = NSURL(string: urlText)\n```\n\n这行代码从一个字符串对象创建了一个新的 URL 对象。在 Swift\
  \ 中，你可以使用对象的类名（`NSURL`）后跟一对圆括号（`()`）来创建新对象，就像调用函数一样。这会创建该类的一个新实例并执行其初始化器。一个类可以声明多种创建方式，而\
  \ `NSURL` 类提供了一个初始化器，可以直接从 `String` 对象创建 `NSURL` 对象。如你所见，将字符串对象转换为 URL 对象相当容易，也存在反向转换的函数，你将在本章后面用到。\n\
  \n第二步完成后，最后要做的就是在网页视图中显示该 URL 的网页。这通过函数中的最后一行代码实现。\n\n```\nwebView.loadRequest(NSURLRequest(URL:\
  \ url))\n```\n\n`webView` 是你之前创建的 `webView` 属性，它连接到屏幕上的网页视图对象。你调用该对象的 `loadRequest()`\
  \ 函数来加载页面。然而，事实证明，网页视图需要的是一个 URL 请求（`NSURLRequest`）对象，而不仅仅是一个简单的 URL 对象。URL 请求不仅表示一个\
  \ URL，还描述了该 URL 应如何通过网络传输。就你的需求而言，一个简单的 HTTP GET 请求就足够了，而表达式 `NSURLRequest(URL:url)`\
  \ 会根据给定的 URL 创建一个新的 `NSURLRequest` 对象，然后将其传递给 `loadRequest(_:)`。剩下的工作由网页视图完成。\n\n\
  ### 设置动作连接\n\n让我们回顾一下到目前为止你已完成的工作。\n\n-   你创建了一个文本字段对象，用户可以在其中输入 URL。\n-   你创建了一个网页视图对象，该对象将显示该\
  \ URL 的网页。\n-   你向你的 `ViewController` 类添加了两个 Outlet（属性）。\n-   你将文本字段和网页视图对象连接到了这些\
  \ Outlet。\n-   你编写了一个 `loadLocation(_:)` 函数，该函数获取文本视图中的 URL 并将其加载到网页视图中。\n\n缺少什么？问题是“`loadLocation(_:)`\
  \ 函数如何被调用？”这是一个非常重要的问题，而目前答案是“永远不会被调用”。下一步也是最后一步，是将 `loadLocation(_:)` 函数连接到某个东西上，以便它能够运行并加载网页。\n\
  \n首先，将 `@IBAction` 关键字添加到你的函数中。在你的 `ViewController.swift` 文件中，找到 `func loadLocation()`\
  \ 声明并将其编辑为如下形式：\n\n```\n@IBAction func loadLocation( AnyObject ) {\n```\n\n`@IBAction`\
  \ 关键字告诉 Interface Builder，这个函数可以被界面对象调用，就像 `@IBOutlet` 关键字告诉 Interface Builder 属性可以引用界面对象一样。能够在界面中被对象（如按钮和文本字段）调用的函数称为*动作*。\n\
  \n再次选择 `Main.storyboard` 文件。选择文本字段对象并切换到连接检查器。向下滚动，直到在“已发送事件”部分找到 `Did End On Exit`。将连接圆圈拖到\
  \ `View Controller` 对象上并释放鼠标，如图 3-13 所示。会弹出一个菜单，询问你希望将该事件连接到哪个动作；选择 `loadLocation:`（目前这是唯一的动作）。\n\
  \n![9781484202098_Fig03-13.jpg](img/9781484202098_Fig03-13.jpg)\n\n图 3-13. 设置 Did\
  \ End On Exit 动作连接\n\n你还希望在用户点击刷新按钮时加载网页，因此将刷新按钮连接到同一个动作。刷新按钮比文本字段更简单，它只发送一种事件（“我被点击了”）。使用\
  \ Interface Builder 快捷方式连接它。按住 Control 键，点击刷新按钮，并将连接拖到 `View Controller` 对象上。释放鼠标按钮，并选择\
  \ `loadLocation:` 已发送动作，如图 3-14 所示。\n\n\n\n![9781484202098_Fig03-14.jpg](img/9781484202098_Fig03-14.jpg)\n\
  \n图 3-14. 设置刷新按钮的动作\n\n### 测试网页浏览器\n\n是不是很兴奋？你应该感到兴奋。你刚刚为 iOS 编写了一个网页浏览器应用！确保构建目标设置为\
  \ iPhone 模拟器（参见图 3-15），然后点击运行按钮。\n\n![9781484202098_Fig03-15.jpg](img/9781484202098_Fig03-15.jpg)\n\
  \n图 3-15. 设置 iPhone 模拟器目标\n\n你的应用将在 iPhone 模拟器中构建并启动，如图 3-16 左侧所示。点击文本字段，一个针对 URL\
  \ 优化过的键盘会弹出。输入一个 URL（我在此示例中使用的是 `www.apple.com`），然后点击 Go 按钮。键盘收起，Apple 的主页便会出现在网页视图中。这真是太棒了。\n\
  \n![9781484202098_Fig03-16.jpg](img/9781484202098_Fig03-16.jpg)\n\n图 3-16. 测试你的网页浏览器\n\
  \n那么，它是如何工作的呢？文本字段对象会根据其状态变化触发多种事件。你将 `Did End On Exit` 事件连接到了 `loadLocation(_:)`\
  \ 函数。当用户通过点击键盘中的操作按钮（Go）来“结束”编辑时，便会发送此事件。当你运行应用并点击 Go 后，文本字段触发了它的 `Did End On Exit`\
  \ 事件，进而调用了你 `ViewController` 中的 `loadLocation(_:)` 函数。该函数获取了用户输入的 URL，并指示网页视图加载它。*瞧*！网页便出现了。\n\
  \n**注意** iOS 模拟器使用你电脑的网络连接来模拟设备的 Wi-Fi 或蜂窝数据连接。如果你是荒岛在阅读本章节，你的应用可能无法正常工作。\n\n###\
  \ 调试网页视图\n\n到目前为止你所开发的内容已相当出色。继续吧——尝试打开任意网页，我等着。不过有两件事让我不太满意。其一，当你点击页面中的链接时，文本字段中的\
  \ URL 不会更新。其二，网页的尺寸大得离谱。\n\n第二个问题很容易解决。退出模拟器或切换回 Xcode，点击工具栏中的 Stop 按钮。在 `Main.storyboard`\
  \ 文件中选中网页视图对象，并切换到属性检查器，如图 3-17 所示。找到并勾选“缩放页面以适配”选项。现在，当网页视图加载页面时，它会缩放页面，以便你能看到完整内容。\n\
  \n![9781484202098_Fig03-17.jpg](img/9781484202098_Fig03-17.jpg)\n\n图 3-17. 设置“缩放页面以适配”属性\n\
  \n第一个问题的解决稍显复杂，需要编写更多代码。我将在你为应用添加其余功能时解决这个问题。\n\n### 添加 URL 缩短功能\n\n现在你有了一个允许输入\
  \ URL 并在网页浏览器中浏览该 URL 的应用。下一步，也是这个应用的核心目的，就是将页面的长 URL 转换为短 URL。\n\n为此，你需要在 Interface\
  \ Builder 中创建并布局新的可视化对象，在你的控制器类中创建输出口和操作，然后将这些输出口和操作连接到可视化对象，就像你在本章第一部分所做的那样。如果你还没猜到，这就是应用开发的基本工作流程：设计界面、编写代码、并将两者连接起来。\n\
  \n首先，完善界面其余部分。编辑 `Main.storyboard`，选择网页视图对象，抓住其底部的调整手柄，向上拖动，以便在屏幕底部为一些新的视图对象腾出空间，如图\
  \ 3-18 所示。选中视图下方的垂直约束（也在图 3-18 中显示），然后将其删除（按下 Delete 键或选择 编辑 ![image](img/arrow.jpg)\
  \ 删除）。你不再希望网页视图的底部边缘与它的父视图底部边缘对齐；你现在希望它与即将添加的工具栏视图紧密贴合。\n\n![9781484202098_Fig03-18.jpg](img/9781484202098_Fig03-18.jpg)\n\
  \n图 3-18. 为新视图腾出空间\n\n在对象库中，找到工具栏对象（不是外观相似的导航栏对象），并将其拖入视图，如图 3-19 所示。将其放置在视图底部，使其紧密贴合。\n\
  \n![9781484202098_Fig03-19.jpg](img/9781484202098_Fig03-19.jpg)\n\n图 3-19. 添加一个工具栏\n\
  \n在对象库中找到栏按钮项对象，并向工具栏添加新的按钮对象，如图 3-20 所示，直到你有三个按钮为止。\n\n![9781484202098_Fig03-20.jpg](img/9781484202098_Fig03-20.jpg)\n\
  \n图 3-20. 向工具栏添加额外的按钮对象\n\n你将定制这三个按钮的外观，以使它们为在应用中的角色做好准备。左侧按钮将变为“缩短 URL”操作，中间按钮用于显示缩短后的\
  \ URL，右侧按钮将变为“将短 URL 复制到剪贴板”操作。切换到属性检查器并进行以下更改：\n\n1. 选择最左侧的按钮。\n   1. 将标识符更改为 Play。\n\
  \   2. 取消勾选“已启用”。\n2. 选择中间的按钮。\n   1. 将样式设置为 Plain。\n   2. 将标题更改为“点击箭头以缩短”。\n  \
  \ 3. 将色调更改为“黑色”。\n3. 选择最右侧的按钮。\n   1. 将标题更改为“复制”。\n   2. 取消勾选“已启用”。\n\n现在选择并调整网页视图的大小，使其接触新的工具栏。通过点击“解决自动布局问题”按钮中的“在视图控制器中添加缺失的约束”来完成布局。最终的布局应如图\
  \ 3-21 所示。\n\n![9781484202098_Fig03-21.jpg](img/9781484202098_Fig03-21.jpg)\n\n\
  图 3-21. 完成的界面\n\n和先前一样，你需要在 `ViewController` 类中添加三个输出口，以便你的对象能够访问这三个按钮。在项目导航器中选择\
  \ `ViewController.swift` 文件，并在你现有的输出口之后立即添加以下三个声明：\n\n```swift\n@IBOutlet var shortenButton:\
  \ UIBarButtonItem!\n@IBOutlet var shortLabel: UIBarButtonItem!\n@IBOutlet var clipboardButton:\
  \ UIBarButtonItem!\n```\n\n选择 `Main.storyboard` Interface Builder 文件，选择视图控制器对象，然后切换到连接检查器。三个新的输出口会出现在检查器中。将\
  \ `shortenButton` 输出口连接到左侧按钮，将 `shortLabel` 输出口连接到中间按钮，将 `clipboardButton` 输出口连接到右侧按钮，如图\
  \ 3-22 所示。\n\n![9781484202098_Fig03-22.jpg](img/9781484202098_Fig03-22.jpg)\n\n\
  图 3-22. 将输出口连接到工具栏按钮\n\n### 设计 URL 缩短代码\n\n界面完成后，是时候卷起袖子编写实现此功能的代码了。以下是你的应用预期表现：\n\
  \n\n\n1. 用户向文本字段中输入一个 `URL` 并点击“前往”。`Web` 视图将加载该 `URL` 对应的网页并显示。\n2. 页面加载成功后，会发生两件事：\n\
  \    1. `URL` 字段会更新，以反映实际加载的 `URL`。\n    2. “缩短 `URL`”按钮会被启用，允许用户点击。\n3. 用户点击“缩短\
  \ `URL`”按钮后，会向 `URL` 缩短服务发送一个请求。\n4. 当 `URL` 缩短服务发送其响应时，会发生两件事：\n    1. 缩短后的 `URL`\
  \ 会显示在工具栏中。\n    2. “复制到剪贴板”按钮会被启用，允许用户点击。\n5. 当用户点击“复制到剪贴板”按钮时，短 `URL` 会被复制到 `iOS`\
  \ 剪贴板。\n\n你已经可以大致看出这其中的工作方式。“缩短 `URL`”和“复制到剪贴板”按钮对象将连接到执行这些功能的操作上。你刚刚创建的出口（`outlet`）将允许你的代码更改它们的状态，例如在按钮准备就绪时启用它们。\n\
  \n这些步骤之间的环节则略显神秘。“当页面成功加载时”这一概念很好理解，但你的应用程序如何得知网页何时加载完成或加载是否成功呢？同样，“当 `URL` 缩短服务发送其响应时”也是如此。这发生在什么时候？这些问题的答案在于多任务处理（`multitasking`）和委托（`delegate`）。\n\
  \n“多什么？”你可能会问。*多任务处理*是指同时处理多件事情。通常，你编写的代码一次只做一件事，并且在前一件事完成之前不会执行下一件事。然而，有一些技术可以让你的应用程序触发一个将并行执行的代码块，从而使这两个代码块或多或少地并发运行。这将在第\
  \ 24 章中详细解释。你在自己的应用程序中已经做过类似的事情，只是可能没有意识到。\n\n```\nwebView.loadRequest(NSURLRequest(URL:\
  \ url))\n```\n\n`Web` 视图对象的 `loadRequest(_:)` 函数并不会加载 `URL`；它仅仅是*启动*加载 `URL` 的过程。对这个函数的调用会立即返回，然后你的代码继续执行其他操作。这被称为一个*异步*函数。你希望持续执行的任务之一是对用户的触摸操作做出响应——这将在第\
  \ 4 章中介绍。这一点很重要，因为它能让你的应用保持响应。\n\n与此同时，属于 `UIWebView` 类的代码开始独立运行，静静地发送请求到 `Web`\
  \ 服务器，收集并解释响应，最终在 `Web` 视图中显示渲染完成的页面。这通常被称为一个*后台线程*或*后台任务*，因为它独立于你的主应用（称为*前台线程*）默默地完成其工作。\n\
  \n### 成为 Web 视图的委托\n\n所有这些多任务处理理论都很棒，但它仍然没有回答你的应用程序如何得知网页是否加载完成的问题。任务之间可以通过多种方式进行通信。其中一种方式是使用*委托*。委托是一个对象，它同意为另一个对象承担某些决策或任务，或者希望在特定事件发生时得到通知。你将在这个应用中使用委托的这最后一个特性。\n\
  \n`Web` 视图类有一个`delegate` 出口。你需要将其连接到将成为其委托的对象上。委托是 `iOS` 中一种流行的编程模式。如果你查看一下 `Cocoa\
  \ Touch` 库，你会发现很多类都有一个`delegate` 出口。第 6 章会详细介绍委托。\n\n成为委托包含三个步骤：\n\n1.  在你的自定义类中，采用委托的协议（`protocol`）。\n\
  2.  实现适当的协议函数。\n3.  将对象的`delegate` 出口连接到你的委托对象。\n\n*协议*是一个契约或承诺，它表明你的类将实现特定的函数。这能让其他对象知道你的对象已同意承担某些责任。一个协议可以声明两种函数：*必需*的（`required`）和*可选*的（`optional`）。所有必需函数都必须包含在你的类中。如果遗漏了任何一个，你就违反了契约，你的项目将无法编译。\n\
  \n要实现哪些可选函数由你自己决定。如果你实现了一个可选函数，该函数就会被调用。如果不实现，它就不会被调用。就这么简单。大多数 `Cocoa Touch` 委托函数都是可选的。\n\
  \n**提示** 少数较老的类依赖于所谓的*非正式协议*（`informal protocol`）。它实际上根本不是协议，而是一组有文档记载的、你的委托需要实现的函数。该类的文档会说明你应该使用哪些函数。使用非正式协议的步骤与上述所有步骤相同，只是不需要在你的类中添加正式的协议名称。\n\
  \n第一步是决定哪个对象将充当委托，并采用适当的协议。选择你的`ViewController.swift`文件。修改声明该类的行，使其内容如下：\n\n```\n\
  class ViewController: UIViewController, UIWebViewDelegate {\n```\n\n所做的更改是在类声明的末尾添加了`UIWebViewDelegate`。将此项添加到你的类定义中，意味着你的类同意定义`UIWebViewDelegate`\
  \ 协议所要求的函数，并准备好连接到`UIWebView` 的`delegate` 出口。\n\n查阅`UIWebViewDelegate` 协议，你会发现它列出了四个函数，且全部都是可选的。\n\
  \n```\noptional func webView(webView: UIWebView!, \n                      shouldStartLoadWithRequest\
  \ request: NSURLRequest!, \n                      navigationType: UIWebViewNavigationType)\
  \ -> Bool\noptional func webViewDidStartLoad(webView: UIWebView!)\noptional func\
  \ webViewDidFinishLoad(webView: UIWebView!)\noptional func webView(webView: UIWebView!,\
  \ \n                      didFailLoadWithError error: NSError!)\n```\n\n第一个函数`webView(_:,shouldStartLoadWithRequest:...)`\
  \ 在用户点击链接时被调用。它允许你的委托决定是否应该打开该链接。例如，你可以创建一个将用户限制在特定网站（如学校日历）上的 `Web` 浏览器。你的委托可以阻止任何将用户带到其他网站的链接，或者只是为了警告他们正在离开当前网站。这个应用不需要做任何类似的事情，所以忽略这个函数即可。通过省略这个函数，`Web`\
