  ## 不拘一格


  我是一名“老派”程序员。我从最底层的二进制位开始学习编程（毫不夸张）。不怕暴露年龄，我写的第一个程序是在一个 4 位微控制器上，用拨动开关输入机器指令。因此，在我开始使用
  BASIC 和 C 等“高级”语言编程之前，我已经几乎掌握了机器代码的一切知识。在为我（当时革命性的）Macintosh 电脑编写第一个图形用户界面（GUI）应用程序时，这些都已成为过往。


  虽然我珍视这些积累的知识，其中许多仍然有用，但我意识到，如今为 iOS 开发出色的应用，严格的“自底向上”方法并非必需。过去几十年软件开发的许多进步，都在于将开发者——也就是您——与
  CPU 指令、硬件接口和软件设计的细枝末节隔离开来。这让您能够专注于利用这些技术将想法变为现实，而不是把所有时间花在担忧寄存器分配和内存管理上。


  所以，激动人心的是，您只需具备最基础的计算机编程知识，甚至对底层技术知之甚少，就能直接上手创建功能完备的 iOS 应用。这正是本书前几章要做的事——向您展示如何在不进行任何传统编程的情况下创建一个
  iOS 应用。


  这并非说您不需要这些技能就能掌握 iOS 开发。恰恰相反；您对编程、性能和内存管理了解得越多，就越得心应手。变化在于，这些技能已不再是过往那样的先决条件了。现在，您可以在探索
  iOS 开发新领域的同时，并行学习它们。


  ## 如何使用本书


  本书提倡“边探索边前进”的方法。有些章节会引导您完成创建使用相机或播放音乐的 iOS 应用的整个过程。这些章节可能会略过许多细节。在其间，您会找到讲解基础软件开发技能的章节。书中还有关于良好软件设计、充分利用示例代码以及
  Swift 编程语言的章节。


