  布局对象是特殊的视图对象，仅用于辅助约束。每个对象代表视图中可用内容开始的位置。某些视觉元素位于视图控制器之外，比如通常位于 iPhone 屏幕顶部的状态栏。然而，某些视觉元素会被插入到你的视图中，比如当你的视图呈现时，导航控制器会添加的导航栏。在这些情况下，顶部和底部布局向导会移动以适应新的元素。使你的视图相对于这些向导进行布局，可以保持它们可见且位置整齐。


