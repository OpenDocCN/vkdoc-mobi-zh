- '# 内存管理


  我之前写了整本书，直到这里，竟然都没有提过内存管理，这简直是不可思议。最初，iOS 中的内存管理给程序员带来了沉重的负担。随着最近自动引用计数 (ARC) 的引入，情况有所改善，但即使如此，仍然存在大量异常、限制和注意事项。


  Swift 从一张白纸开始重新设计。iOS，以及 Swift，仍然使用 ARC。但是 Swift 处理 ARC 的方式非常完美，以至于程序员几乎不需要做什么，只需将过去用于内存管理的那部分大脑重新用于更愉快的事情。


  这并不是说你在 iOS 中不需要了解任何关于内存管理的知识。粗略地理解是极其有帮助的。ARC 是一项了不起的技术，但它有一个**致命**的缺陷。在某些情况下，你可能会在应用中造成内存泄漏。而你用来对抗这些泄漏的工具有时也会产生其他不想要的副作用。所以，欢迎来到内存管理
  101。（别担心，这是一门速成课程。）


  ## 垃圾回收


  最初，有手动内存管理。程序员负责分配他们需要的每一个内存块，并在使用完后将其释放回系统。随着程序复杂度的增加，很快人们就发现这不是一个高效的解决方案。哦，而且程序员对一遍又一遍地编写相同的代码感到非常厌倦。


  随之而来的是各种形式的自动内存管理。其中之一被称为垃圾回收。*垃圾回收* 负责回收你不再使用的值和对象，将这些内存返还给操作系统。下次你需要创建一个对象或连接一个字符串时，就有可用的内存来完成这些操作。


  从概念上讲，垃圾回收很简单。在图 20-3 所示的示例中，你有两个按钮对象。这些按钮对象又引用了属性字符串，而这些属性字符串又引用了字符串、字典和字体对象。


  ![9781484202098_Fig20-03.jpg](img/9781484202098_Fig20-03.jpg)


  **图 20-3.** 应用中的对象引用


  现在你决定更改一个按钮的标题。你创建一个新的属性字符串，可能会重用之前使用过的字符串和字体对象，并将这个新对象分配给按钮的 `attributedString`
  属性，如图 20-4 所示。


  ![9781484202098_Fig20-04.jpg](img/9781484202098_Fig20-04.jpg)


  **图 20-4.** 替换属性字符串对象


  问题来了，Swift 如何处理旧的属性字符串对象？它已经不再被使用了。如果允许它和其他所有未使用的对象继续占用内存，你的应用很快就会耗尽内存并崩溃。事实上，世界上几乎所有的应用都会很快耗尽内存。


  我们需要做的是销毁那些不再使用的对象，并回收它们的内存。但是 “不再使用” 是什么意思？在这个例子中，这是一个有趣的组合。显然，旧的属性字符串对象不再有任何用途。它的字符串和字典对象也是如此。但是字典所引用的字符串和字体对象仍在被其他对象使用。所以，你不能简单地销毁旧的属性字符串对象及其引用的所有东西。


  一种解决方案是确定正在使用的对象图。这包括你应用的根对象（你的 `UIApplication` 对象）、它所引用的所有对象（你的视图控制器对象）、这些对象所引用的所有对象（视图对象），以及这些对象所引用的所有对象（字符串、字体、颜色等）。完成后，你就得到了你应用正在使用的所有对象的完整集合。这些被称为
  *可达对象*。其他所有东西都是 *垃圾*，如图 20-5 所示。


  ![9781484202098_Fig20-05.jpg](img/9781484202098_Fig20-05.jpg)


  **图 20-5.** 垃圾回收


  这是传统的垃圾回收。垃圾回收的绝妙之处在于，你，作为程序员，无需做任何事情。你只需创建并使用你需要的对象。只要你停止使用某个对象，操作系统就会替你处理它。这听起来很像你在
  Swift 中编写的代码。那么，Swift 一定在使用垃圾回收，对吗？


  不幸的是，这种内存管理在计算上过于密集，无法为移动设备提供有效的解决方案。iOS 使用了一种不同的内存管理方式，它试图完成与垃圾回收相同的事情，但开销要小得多。


  ## 引用计数


  iOS 使用一种名为 *引用计数* 的技术。在引用计数中，所有对象都维护一个引用计数。引用计数是仍在“使用”（持有对该对象的引用）该对象的数量。如果你将一个对象赋值给一个属性，它的引用计数就会增加。当你从该属性中移除这个对象时，引用计数就会减少。当引用计数变为零时，就没有对该对象的引用了，它就会被销毁。Swift
  会自动为每一个对象引用执行此操作。


  图 20-6 显示了与图 20-3 中相同的对象集合，但这次使用了引用计数。所有对象的引用计数都不为零，因此它们仍在使用中。


  ![9781484202098_Fig20-06.jpg](img/9781484202098_Fig20-06.jpg)


  **图 20-6.** 带有引用计数的对象


  当你将一个*新*的属性字符串赋值给按钮时，会发生以下情况。新对象的引用计数会增加，并作为新的属性值存储起来，如图 20-7 所示。这被称为 *保留*。当属性字符串在构建过程中，它会保留它引用的所有对象，也如图
  20-7 所示。


  ![9781484202098_Fig20-07.jpg](img/9781484202098_Fig20-07.jpg)


  **图 20-7.** 保留新对象




  随后，前一个属性值的引用计数会递减，如图 20-8 所示。这被称为**释放**。由于按钮是其唯一的引用，其计数变为零，该对象被销毁。在销毁过程中，它会释放其引用的所有对象，此过程会重复进行。


  ![9781484202098_Fig20-08.jpg](img/9781484202098_Fig20-08.jpg)


  图 20-8. 释放旧对象


  当整个过程结束时，旧的属性字符串对象及其正在使用的字符串和字典对象都已消失。但字典所引用的字符串和字体对象仍然存在，因为它们继续被其他对象引用。


  引用计数快速、简单且高效，最终结果与垃圾回收相同。嗯，在大多数情况下确实如此。但有一种情况下引用计数无法很好地工作，你需要了解这一点。


  ## 循环保留


  让我们来看一个不同的情况。你正在创建一个注册系统。其中有`Teacher`对象和`Student`对象。教师持有对每个学生的引用，而所有学生也都持有对其教师的引用。这些对象及其引用计数如图
  20-9 所示。


  ![9781484202098_Fig20-09.jpg](img/9781484202098_Fig20-09.jpg)


  图 20-9. 循环引用


  每个`Student`都有一个保留计数（来自教师的引用）。`Teacher`的引用计数为四——一个来自其拥有者，三个来自其三位学生。


  现在拥有者已经完成了这些对象的操作，并释放了`Teacher`，如图 20-10 所示。这会释放教师对象，递减其引用计数，然后……什么也没发生。教师的引用计数仍然是三，所以它没有被销毁。因为它没有被销毁，它也从未释放其学生对象，因此学生对象也从未释放它们的教师。


  ![9781484202098_Fig20-10.jpg](img/9781484202098_Fig20-10.jpg)


  图 20-10. 释放`Teacher`对象


  这被称为**循环保留周期**。它也被称为**内存泄漏**。这些对象将永远存在，除非终止你的应用，否则无法清除它们。


  有一种方法可以摆脱这个陷阱。解决方案是不让`Student`对象保留`Teacher`对象。Swift 提供了一种特殊类型，称为**弱引用**；它是一种不保留其所引用对象的对象引用。常规的引用类型称为**强引用**。


  让我们将学生的`teacher`引用替换为弱引用，看看会发生什么，如图 20-11 所示。


  ![9781484202098_Fig20-11.jpg](img/9781484202098_Fig20-11.jpg)


  图 20-11. 使用弱引用


  弱引用仍然包含`Teacher`值，但这些不会增加其引用计数。现在当教师对象被释放时，它会被销毁，并且会销毁其引用的所有学生对象。以下语句声明了一个弱引用：


  ```

  weak var teacher: Teacher?

  ```


  搞定！问题解决了。但你知道那句老话：“每个伟大的解决方案都会带来自己的问题。” 或许没人这么说；也许只是我杜撰的。无论如何，弱引用也有自己的一系列问题。以下是需要你了解的内容：


  - 弱引用指向一个对象，但不会保留它。

  - 如果弱引用中的对象被销毁，该值会被静默地设置为 `nil`。

  - 弱引用必须是可选类型或隐式解包可选类型（因为它随时可能被设置为 `nil`）。


  弱引用非常适合“树状”或“父子”对象关系，其中子对象持有对其父对象的引用。你还会在代理和数据源属性中发现弱引用的使用。实际上——你在本书中一直这样做——对象的代理对象通常是其自身或其父对象，例如视图控制器。这会产生与图
  20-9 所示相同的循环保留周期。（是的，一个对象可以保留自身。）


  但这也会带来后果。你在第 12 章的 Wonderland 应用中已经处理过这个问题。在 `BookViewController.swift` 文件中，你创建了一个属性来存储书籍视图的数据源，如下所示：


  ```

  let bookSource = BookDataSource()

  ...

  dataSource = bookSource

  ```


  随后，你将 `bookSource` 赋值给页面视图控制器的 `dataSource`，但仍在 `bookSource` 属性中保留了相同的引用。这是因为 `dataSource`
  是一个弱引用。如果你没有至少一个对 `BookDataSource` 对象的强引用，它会被立即销毁，那么你的页面视图控制器就没有数据源了。相信我，这种问题调试起来会令人抓狂。


  保留周期可能很隐蔽。另一个可能出现的地方是闭包，其中闭包引用了拥有该闭包的对象。在《The Swift Programming Language》中有一大节关于循环保留的内容。既然你已经理解了这个问题，不妨花点时间快速浏览那一节。


  就像可选类型有其隐式解包的兄弟一样，弱引用也有一个危险的表亲。**无主引用**是一个具有弱引用特性的非可选变量。你可以使用 `unowned` 关键字声明一个无主变量，如下所示：


  ```

  unowned var teacher: Teacher = ...

  ```


  你可能猜到了，只有当你绝对确定引用中的对象在你再次使用它之前不会被销毁时，才应使用此方式。如果你在 `Teacher` 对象被销毁后使用此变量，应用将会崩溃。更糟的是，它不是可选类型；无法测试它是否为
  `nil`。考虑改用弱引用的隐式解包变量。


  ## 还有更多 Swift 特性


  但等等，还有更多！Swift 语言内容繁多，这一章的长度就足以证明——而本章本应是“快速”入门。然而，我仍然没有涉及到一些精彩的内容。随着你 Swift 技能的日益成熟，以下还有一些主题值得你探索：




  *   类型别名可以为现有类型创建一个新名称，这很类似于 C 语言的 `typedef`。

  *   你可以对运算符进行重载。例如，一个类可以为 `==` 和 `!=` 运算符定义自己的代码，实际上就是定义该类中两个对象“相等”的含义。

  *   你也可以创建自己的运算符。没错，你可以自行创造运算符。如果你觉得你的枚举需要一个`+&-`运算符，以便写出 `myEnum +&- 3`，那就尽管去做吧。（我为之后必须弄懂这代码含义的程序员感到同情。）

  *   函数可以拥有可变参数。这是对接受不定数量参数的函数的形象称呼，比如 `NSString(format:,_:...)` 初始化器。这里的 `...` 表示你可以用任意数量的额外参数来调用这个函数。

  *   Swift 支持泛型。泛型是一种能以类型安全的方式根据不同类型进行变异的类型。通俗来说，你可以创建一个能处理不同类型对象的类。当你使用这个类时，你告诉它你正在处理的类型，然后
  Swift 就会像为这个类创建一个专门针对该类型的新子类一样。Swift 中所有的集合类型都是泛型。只有一种 `Array` 类型，但当你声明一个 `UITouch`
  对象数组（`[UITouch]`）时，Swift 会创建一个仅能存储 `UITouch` 对象的数组，其他对象一概不行。

  *   Swift 提供了一套字节访问类型，它们能赋予你大部分 C 语言指针的能力。你可以使用字节访问类型来处理原始数据，如图像像素缓冲区，并与仍使用指针的 C
  函数进行交互。


  '
- '# 总结


  你已经学到了很多关于 Swift 的知识。我是说，*很多*——足以编写专业级别的 iOS 应用。我也不指望你第一次就能记住本章的全部内容。包括我本人在内，大多数开发者都是花了许多年时间才学会这些编程语言知识。你可以把本章当作参考手册，或者当感觉记忆模糊时再回来翻阅。


  我认为是时候运用所有这些新的 Swift 知识来做些不凡之事了，比如创建一个框架。


  **练习**


  我在“switch 语句”一节中提到，元组 case 可以包含常量、表达式、通配符、绑定和范围的组合。请将使用 `where` 子句的 `switch` 语句示例，改写成仅使用元组模式的形式。


  你可以在 `Control E1.playground` 文件中找到我的解决方案。


  ¹*二进制兼容* 意味着用 Swift 编写的代码可以直接调用现有的 C 函数并使用 Objective-C 对象，反之亦然。


  ## 第 21 章：框架搭建


  既然你已经掌握了这些高超的 Swift 技能，那就让我们把它们派上用场。这最后一章将稍微深入 iOS 开发的深水区。你将开发一个扩展——这是 iOS 8 的一个激动人心的新特性——为此，你需要创建一个框架。


  *框架*是一个自包含的代码、资源和接口包。一个框架可以包含编译后的代码（类和函数）、资源（图片、声音、故事板）以及 API（允许你使用的类、属性和函数列表）。简而言之，它包含了使用他人编写的代码集合所需的一切。如果你在其他平台上使用过
  DLL 或静态库，或者可能用过 Java 的 `.jar` 文件，那么你对这概念应该不陌生。


  框架在 iOS 中被广泛使用。事实上，iOS（几乎）不过是一个庞大的框架集合。框架使得将完整编程解决方案所需的一切打包在一起变得容易。以 MapKit 框架为例，它包含了诸如
  `MKMapView` 等类的代码，包含了像标准图钉地图标注图像这样的资源，还包含了所有让你在编写 `import MapKit` 时能在应用中使用的接口。


  从 iOS 8 开始，Apple 允许应用开发者创建框架并将其捆绑在自己的应用中。这为引入一个能为应用提供完整解决方案的框架打开了大门。你现在可以嵌入来自其他开发者的完整框架，在你自己多个应用之间共享解决方案，甚至可以创建并发布一个框架供其他开发者使用。


  更令人兴奋的是，iOS 8 引入了新的系统级特性，你可以通过将代码打包到特殊框架中来扩展这些特性。在本章中，你将进行以下操作：


  *   了解扩展

  *   创建一个 Action 扩展

  *   创建一个框架

  *   共享一个框架

  *   运用你关于闭包的新知识


  你将重温第 3 章中的 Shorty 应用。哇，那感觉像是很久以前的事了。有一个可以浏览网页然后缩短 URL 的应用很棒。但是，如果你正在 Safari、Chrome
  或全新的中土世界浏览器（能将一切翻译成精灵语）中上网冲浪，突然需要缩短一个 URL，你该怎么办呢？当然，你需要阅读本章的剩余内容。


  ### 扩展


  iOS 8 将扩展添加到了应用生态系统中。*扩展*是一个捆绑在你的应用中的框架，它提供了一种服务来增强 iOS 在应用之外的体验。目前，iOS 中有六种类型的扩展。


  *   *分享 (Share)*：提供分享信息的新方式。

  *   *操作 (Action)*：对用户的信息做一些新颖的处理。

  *   *今日 (Today)*：在锁屏上添加实时、交互式的通知。

  *   *照片编辑 (Photo Editing)*：为其他应用添加新的照片滤镜和效果。

  *   *文档提供程序 (Document Provider)*：让其他应用访问你应用中的文档。

  *   *自定义键盘 (Custom Keyboard)*：用你自己的键盘替换标准的屏幕键盘。


  你将创建最简单的扩展，一个非 UI 的 Action 扩展。我说过我们是要涉足深水区，而不是直接头朝下跳进去。但别担心，仍然有很多工作要做。在开始之前，有几件关于扩展的事情你需要了解。


  首先，我们来看看扩展是如何工作的。假设用户正在“照片”应用中浏览他们的图片，突然发现了一张甘道夫的特别棒的照片。他们想和夏尔的朋友分享，于是点击了界面中的活动按钮。然后弹出了常见的分享选项：Facebook、Twitter、新浪微博、iMessage、电子邮件，可能还有其他选项。


  现在，在 iOS 8 中，“其他”类别已经被完全打开。夏尔的居民们使用他们自己的社交网络 ShireShare。iOS 8 发现了一个捆绑在 ShireShare
  应用内部的 Share 扩展框架。这个扩展被加载并添加到列表中，与 Twitter 等其他选项并列。如果用户点击 ShireShare 按钮，扩展中的代码就会接管并呈现其分享界面。这可以是它自己的界面，也可以由
  Cocoa Touch 提供的标准化界面构建而成。然后，这个扩展负责将图片连同一条消息或任何其他相关数据上传到 ShireShare 网站。运行扩展的进程随后终止，用户继续浏览他们的照片。


  重要的是要注意，ShireShare 应用在此期间从未运行或启动过。整个过程发生在“照片”应用作为前台应用时。ShireShare 应用中的 Sharing 扩展只是提供了一项新服务，这项服务独立于其容器应用。其他类型的扩展则提供不同的体验。


  ### 创建扩展


  扩展被打包在一个框架中。你将其作为项目的一部分构建，编译后的框架会像其他任何资源一样被包含在你的应用里。以下是一些要点：




  '
- "# 文档格式\n\n-   *包含应用*是你的应用，它包含作为资源的扩展框架。\n-   *宿主应用*是想使用你扩展的应用。\n-   你扩展中的代码在单独的进程中执行，与包含应用和宿主应用相互隔离。\n\
  -   扩展的生命周期独立于包含应用和宿主应用，通常相当短暂。\n-   每个扩展只定义*一种*服务类型。如果你希望应用提供三种不同的服务，你的应用必须包含三个独立的扩展。\n\
  -   你的应用可以直接使用框架中的代码。一个框架*不能*使用你应用中的代码，尽管它可以引用其他框架的代码。\n\n我们不妨开始吧。这个项目没有用户界面设计，因为\
  \ Action 扩展没有 UI。从第 3 章中找到 Shorty 项目。从文件菜单中，选择新建 ![image](img/arrow.jpg) 目标命令。在目标模板选择器中，选择\
  \ iOS 应用扩展组并选取 Action 扩展，如图 21-1 所示。\n\n![9781484202098_Fig21-01.jpg](img/9781484202098_Fig21-01.jpg)\n\
  \n图 21-1. 选择 Action 扩展模板\n\n将新扩展的产品名称设置为 `ShortenAction`，如图 21-2 所示。确保语言为 Swift。将\
  \ Action Type 设置为 No User Interface。Xcode 会自动将此新目标设为现有应用的一部分，并将框架嵌入到你的 Shorty 应用中。这正是你所需要的。\n\
  \n![9781484202098_Fig21-02.jpg](img/9781484202098_Fig21-02.jpg)\n\n图 21-2. 设置 Action\
  \ 扩展详细信息\n\n点击“完成”按钮后，你很可能会看到另一个对话框，提示 Xcode 正在为你的新扩展准备运行方案。到目前为止，本书中你一直使用默认的运行方案来在各种模拟器和设备上调试应用。然而，要调试扩展，你不能直接运行扩展。记住，扩展在特殊进程中运行，并且受另一个（宿主）应用的调用。Xcode\
  \ 会便捷地创建一个运行方案，该方案启动另一个应用，并让 Xcode 准备好在该宿主应用加载你的扩展时拦截其中的代码。设置这类事情比较棘手，所以当 Xcode\
  \ 询问时，请务必点击“激活”按钮。\n\n**提示** Xcode 为你的扩展创建的运行方案每次运行时都会询问你要使用哪个宿主应用。如果你反复使用同一个宿主应用，可以编辑该方案，让它改为运行特定的宿主应用，这样你就不必每次都选择了。\n\
  \n一个目标会在你的项目中生成某种产物。到目前为止，你实际上只使用了一个目标，即你的应用目标。还有其他目标，比如单元测试目标，但本书尚未涉及这些。现在，你的项目有两个重要的目标：一个应用目标和一个扩展目标。\n\
  \nXcode 刚刚做了相当多的工作，所以在继续进行之前，我们先回顾一下刚刚发生的情况。当你添加一个扩展目标时，Xcode 执行了以下操作：\n\n-   Xcode\
  \ 在你的项目中创建了一个名为 `ShortenAction` 的新目标。该目标生成一个名为 `ShortenAction.appex` 的扩展框架。\n- \
  \  Xcode 将 `ShortenAction` 目标添加为 `Shorty` 目标的*依赖目标*。*依赖目标*是指必须在父目标构建之前完成构建的目标。这确保了当你构建\
  \ `Shorty` 应用目标时，`ShortenAction` 目标也会被构建。\n-   `ShortenAction.appex` 包（即 `ShortenAction`\
  \ 目标的产物）已被添加到嵌入到你的 `Shorty` 应用中的二进制文件列表中。*嵌入的二进制文件*是一个包含可执行代码的库或框架，这些代码会被复制到你的成品应用中作为资源。\n\
  -   `ShortenAction.appex` 也被添加到了嵌入的应用扩展列表中。这准备了嵌入的框架，使其能被识别为扩展。没有这一步，iOS 将无法识别你的扩展。\n\
  \n### 连接你的扩展\n\n所有扩展都通过一个扩展点来工作。*扩展点*是 iOS 提供的一项服务，扩展在此处可以拓展用户的选择。当用户点击活动按钮时，共享扩展会提供更多共享选项。键盘扩展会增加用户可选择的键盘布局数量，以此类推。\n\
  \n一个扩展连接到一个扩展点，该扩展点在其 `Info.plist 文件中指定。选择 `ShortenAction` 目标的 `Info.plist` 文件，如图\
  \ 21-3 所示。你可以在 `ShortenAction` 组的 Supporting Files 分组中找到扩展的 `Info.plist` 文件。这是你的扩展的属性列表，其中包含关于它是什么类型扩展的重要信息，决定了它在何种情况下可用，甚至决定了它的显示名称。我们先处理简单的部分。\n\
  \n![9781484202098_Fig21-03.jpg](img/9781484202098_Fig21-03.jpg)\n\n图 21-3. Action\
  \ 扩展的 `Info.plist`\n\n编辑 Bundle 显示名称的值为 `Copy Short URL`，如图 21-3 所示。这是该操作名称将向用户呈现的样子。接下来的问题是“它何时以及如何出现？”答案在\
  \ `NSExtension` 字典中。展开该条目以查看详情。\n\n`NSExtension` 中使用的第一个值是 `NSExtensionPointIdentifier`。这告诉\
  \ iOS 你的扩展适用于哪种扩展点。`com.apple.service` 标识符表示你的扩展是一个无 UI 的 Action。其余属性主要取决于该扩展的类型。\n\
  \n对于无 UI 的 Action 扩展，iOS 需要知道提供你服务的对象所属的类。这存储在 `NSExtensionPrincipleClass` 属性中，并被设置为\
  \ `ActionRequestHandler`。iOS 将创建一个 `ActionRequestHandler` 对象，然后调用它来执行工作。\n\n如果这是一个带有用户界面的扩展，过程略有不同。`NSExtensionMainStoryboard`\
  \ 属性将包含你的扩展主故事板文件的名称。这个文件又包含了一个包含实现用户界面的 `UIViewController` 的场景。\n\n这就解释了“如何”的问题，现在你必须描述“何时”使用。有些扩展是上下文相关的。假设你创建了一个用于分享电影的共享扩展。如果用户试图分享地图位置或联系人信息，那么向他们展示该共享扩展就不合适。你在\
  \ `NSExtensionActivationRule` 属性中描述应使用扩展的上下文。有两种方法可以实现这一点。第一种也是最简单的方法，是存储一个预定义规则的字典，如图\
  \ 21-3 所示。\n\n\n\n每个`Info.plist`中的值都定义了一条简单的规则，用于指定你的扩展应在何种情况下被使用。例如，`NSExtensionActivationSupportsImageWithMaxCount`规则是你的扩展能够处理的最大图片数量。如果该值设为`3`，用户最多可以使用你的扩展一次性分享三张图片。在模板中，它被设置为`0`，这意味着你的扩展不处理图片。你可以将这些规则保留为`0`或`NO`，或者直接将其从`Info.plist`中删除。这两种做法效果相同，因为表示的意义一致。\n\
  \n你需要关注的规则是`NSExtensionActivationSupportsWebURLWithMaxCount`，并应将其设置为`1`。当用户想要对单个\
  \ URL 进行操作时，此规则将激活你的扩展。\n\n**注意**：不要将`NSExtensionActivationSupportsWebURLWithMaxCount`与`NSExtensionActivationSupportsWebPageWithMaxCount`混淆。前者通过\
  \ URL 激活你的扩展，后者则通过网页内容激活扩展——该页面可能包含也可能不包含 URL。\n\n另一种确定“何时”激活扩展的方法是编写一条激活规则谓词语句，并将其作为字符串属性存储在`NSExtensionActivationRule`中。如果\
  \ iOS 检测到一个字符串值，它会执行该谓词语句来决定是否应激活你的扩展。*谓词语句*是一种类似数据库查询的表达式，能够进行各种复杂的决策。例如，它可以判断用户想要分享的\
  \ URL 是否已被缩短。在这种情况下，你可以停用扩展，因为再次缩短一个已缩短的 URL 毫无意义。有关谓词语言的详细说明，请参阅*谓词编程指南*。\n\n在解决了“如何”和“何时”这两个问题之后，让我们继续实际操作。\n\
  \n### 运行你的 Action\n\n与其他优秀的模板一样，Xcode 创建了一个开箱即用的 Action 扩展。选择`ShortenAction`方案（即\
  \ Xcode 为你创建的那个），然后选择一个目标，如图 Figure 21-4 所示。\n\n![9781484202098_Fig21-04.jpg](img/9781484202098_Fig21-04.jpg)\n\
  \n**Figure 21-4** 选择扩展方案\n\n运行你的扩展。扩展的运行方案需要一个宿主应用。宿主应用是请求使用你的扩展的应用。Xcode 会提示你选择要启动的宿主应用，如图\
  \ Figure 21-5 所示。在此次测试中，请选择`Safari`。\n\n![9781484202098_Fig21-05.jpg](img/9781484202098_Fig21-05.jpg)\n\
  \n**Figure 21-5** 选择宿主应用\n\n`Safari`在模拟器中启动，如图 Figure 21-6 左侧所示。选择`Safari`是因为它是一个能够分享\
  \ URL 的应用，这正是你的扩展工作的上下文。在`Safari`中访问任意页面，然后点击操作按钮。活动选择器会出现，如图[Figure 21-6]中部所示。选择器中同时显示分享活动和操作。滑动操作列表，你会发现一个新的`Copy\
  \ Short URL`操作，但明显缺少图标，如图[Figure 21-6]右侧所示。\n\n![9781484202098_Fig21-06.jpg](img/9781484202098_Fig21-06.jpg)\n\
  \n**Figure 21-6** ShortenAction 扩展出现在活动选择器中\n\n恭喜！你的扩展已经成功出现在`Safari`中。现在，如果它能做点有用的事情就好了。\n\
  \n### 灯光，代码，Action\n\n在 Xcode 中停止正在运行的应用，并返回你的项目。是时候熟悉 Action 的内部工作机制了。\n\n选择`ActionRequestHandler.swift`文件，查看其中的代码。这就是你的\
  \ Action 发生的地方。对于一个无界面的 Action 扩展，你需要定义一个执行工作的类。该类必须遵循`NSExtensionRequestHandling`协议，并实现`beginRequestWithExtensionContext(_:)`函数。\n\
  \n**提示**：实现扩展的类可以是任何你想要的类。但如果你更改了它，别忘了同时更新`Info.plist`中的`NSExtensionPrincipalClass`属性以保持一致。\n\
  \n如果你查看模板中的代码，会发现它做了相当多的事情。实际上，它并没有做什么实质性的工作；它只是演示了如何实现某些复杂功能。模板代码展示了如何对用户的网页运行\
  \ JavaScript 探针。这个 JavaScript 可以从页面中提取各种信息，供你的扩展使用。例如，设想一个旅行应用中的扩展：它可以从网页中提取预订信息，并自动将其添加到用户的行程中。如果你需要做类似的事情，请仔细研究模板代码。\n\
  \n你的扩展不需要这些。你需要精简`ActionRequestHandling`类，并用缩短 URL 的代码替换它。不幸的是，这部分代码目前固化在`Shorty`应用中的`ViewController`类里。\n\
  \n### 每个扩展都是一座孤岛\n\n正如我之前提到的，扩展是一个框架。框架*提供*类、代码和资源给消费者（通常是应用）。它不能*消费*来自包含或托管它的应用中的任何类、代码或资源。框架就是一座孤岛；如果它没有自带，那就没有。\n\
  \n显然，下一步是与扩展共享执行 URL 缩短的代码，以便两者都能使用。有几种方法可以实现这一点。以下是其中两种显而易见的方式：\n\n- 为扩展编写第二份相同的代码。\n\
  - 重新组织代码，将 URL 缩短逻辑封装在一个可移植的类中。\n\n我甚至不打算讨论第一种方法。\n\n在你的应用项目中拖入一个新的 Swift 文件，并将其命名为`Squeezer.swift`。你将把\
  \ URL 缩短逻辑整合到这个类中。添加新文件时，请确保只将该文件添加到`Shorty`目标中，如图 Figure 21-7 所示。\n\n![9781484202098_Fig21-07.jpg](img/9781484202098_Fig21-07.jpg)\n\
  \n**Figure 21-7** 将 Squeezer 添加到应用目标\n\n你想重新组织 URL 缩短逻辑，使其能够为你的应用和扩展执行相同的功能。你的应用需要异步进行\
  \ URL 缩短，因为应用绝不应阻塞其主事件循环。扩展对此没有严格要求，但这样做也无妨。两者都需要的是在转换完成后，能够轻松获取缩短后的 URL，因为应用和扩展会对结果进行不同的处理。因此，计划如下：\n\
  \n- `Squeezer`类将拥有一个`shortenURL(longURL:, completion:)`方法。\n- 该函数将接收长 URL，构建缩短请求，启动网络事务进行转换，并立即返回。\n\
  - 当获得结果时，它将调用由调用者提供的完成闭包。\n- 该完成闭包接收两个参数：缩短后的 URL 或发生的错误。\n\n这与应用当前的处理方式类似，但重新打包了代码，以便于在其他方面轻松重用。以下是完成后的`Squeezer.swift`代码：\n\
  \n```\nimport Foundation\n\nlet GoDaddyAccountKey = \"0123456789abcdef0123456789abcdef\"\
  \n```\n\n\n\n```swift\npublic class Squeezer {\n    public class func shortenURL(longURL:\
  \ NSURL, completion: ((NSURL?, NSError?) -> Void)) {\n        if let absoluteURL\
  \ = longURL.absoluteString {\n            if let encodedURL = absoluteURL.stringByAddingPercentEscapesUsingEncoding(NSUTF8StringEncoding)\
  \ {\n                let urlString = \"http://api.x.co/Squeeze.svc/text/\\(GoDaddyAccountKey)?url=\\\
  (encodedURL)\"\n                let request = NSURLRequest(URL: NSURL(string: urlString)!)\n\
  \                NSURLConnection.sendAsynchronousRequest(request, queue: NSOperationQueue.mainQueue())\
  \ {\n                    (_, shortURLData, error) in\n                    if error\
  \ == nil && shortURLData != nil {\n                        var shortURL: NSURL?\n\
  \                        if let data = shortURLData {\n                        \
  \    if let short = NSString(data: data, encoding: NSUTF8StringEncoding) {\n   \
  \                             shortURL = NSURL(string: short)\n                \
  \            }\n                        }\n                        completion(shortURL,\
  \ nil)\n                    } else {\n                        completion(nil, error)\n\
  \                    }\n                }\n            }\n        }\n    }\n}\n\
  ```\n\n就像在第 3 章中一样，你需要将 `GoDaddyAccountKey` 的值替换为你的 X.co 账户密钥。\n\n这个新版本完成了 Shorty\
  \ 中 `ViewController` 类的所有功能。在 Shorty 中，你创建了 `NSURLRequest` 的委托和数据源，异步启动 `NSURLRequest`，然后等待委托调用以收集响应数据并完成事务。\n\
  \n这是一个非常常见的任务，以至于 iOS 8 新增了一个便捷方法，只需一次调用就能完成所有操作：`sendAsynchronousRequest(_:,queue:,completion:)`。无需定义委托方法，你只需提供一个闭包，在事务完成后执行该闭包即可。\n\
  \n`shortenURL(longURL:,completion:)` 中的完成块会检查结果以确定是否成功。如果成功，它会解码响应数据并将其转换为 `NSURL`\
  \ 对象——就像该应用之前所做的那样。然后，它调用传递给 `shortenURL(longURL:,completion:)` 函数的完成闭包，并将转换后的 `NSURL`\
  \ 对象或错误信息传递给它。\n\n你现在可以大幅简化 `ViewController` 中的代码了。选择 `ViewController.swift` 文件，并进行以下修改：\n\
  \n1. 从类声明中移除 `NSURLConnectionDelegate` 和 `NSURLConnectionDataDelegate` 协议。你不再需要这些协议了；`Squeezer`\
  \ 现在会处理所有的通信任务。\n2. 删除 `GoDaddyAccountKey`、`shortenURLConnection` 和 `shortURLData`\
  \ 属性。\n3. 删除 `connection(_:,didFailWithError:)`、`connection(_:,didReceiveData:)`\
  \ 和 `connectionDidFinishLoading(_:)` 函数。\n4. 按如下方式重写 `shortenURL(_:)` 操作方法：\n\n\
  ```swift\n@IBAction func shortenURL(AnyObject) {\n    if let toShorten = webView.request?.URL\
  \ {\n        Squeezer.shortenURL(longURL: toShorten) { (shortURL, _) in\n      \
  \      if let urlString = shortURL?.absoluteString {\n                self.shortLabel.title\
  \ = urlString\n                self.clipboardButton.enabled = true\n           \
  \ } else {\n                self.shortLabel.title = \"failed\"\n               \
  \ self.clipboardButton.enabled = false\n                self.shortenButton.enabled\
  \ = true\n            }\n        }\n        shortenButton.enabled = false\n    }\n\
  }\n```\n\n现在 `Squeezer` 负责所有通信和 URL 缩短工作。成功和失败两种情况都由闭包处理。\n\n花一点时间运行你的 Shorty 应用——将目标方案切换回\
  \ Shorty——并再次确认它仍能正常工作。在重新组织代码后重新测试应用总是一个好习惯。\n\n### 获取用户数据\n\n将缩短逻辑封装在 `Squeezer`\
  \ 中后，你现在可以复用它来实现你的扩展。选择 `ActionRequestHandler.swift` 文件。保留 `extensionContext` 属性，并将\
  \ `beginRequestWithExtensionContext(_:)` 函数替换为以下内容：\n\n```swift\nfunc beginRequestWithExtensionContext(context:\
  \ NSExtensionContext) {\n    self.extensionContext = context\n    for item in context.inputItems\
  \ as [NSExtensionItem] {\n        if let attachments = item.attachments as? [NSItemProvider]\
  \ {\n            for itemProvider in attachments {\n                let urlType\
  \ = String(kUTTypeURL)\n                if itemProvider.hasItemConformingToTypeIdentifier(urlType)\
  \ {\n                    itemProvider.loadItemForTypeIdentifier(urlType, options:\
  \ nil) {\n                        (item, error) in\n                        dispatch_async(dispatch_get_main_queue())\
  \ {\n                            if let url = item as? NSURL {\n               \
  \                 self.actionWithURL(url)\n                            }\n     \
  \                   }\n                    }\n                }\n            }\n\
  \        }\n    }\n}\n```\n\n当用户点击你的扩展时，此函数会被调用。它首先将 `NSExtensionContext` 保存到一个属性中。你的代码稍后还会需要这个上下文。\n\
  \n`NSExtensionContext` 对象包含你的扩展处理用户选择所需的所有信息。首先，它会检查 `inputItems`，这是一个由 `NSExtensionItem`\
  \ 对象组成的数组。每个项目都是一种数据类型，每个数据包含一个或多个附件。你需要检查这些项目，然后提取你的扩展需要处理的附件。\n\n### 带有界面的 NSExtensionContext\n\
  \n对于像这样需要 `NSExtensionContext` 的无界面扩展，扩展上下文会作为参数传递给 `beginRequestWithExtensionContext(_:)`。然而，如果你的扩展有界面，你需要通过另一种途径获取扩展上下文。\n\
  \n你的界面会放在 storyboard 中。扩展点会加载你的 storyboard。在此过程中，会创建实现界面的 `UIViewController`。在你的视图控制器被呈现之前，iOS\
  \ 8 会设置其 `extensionContext` 属性为活动的扩展上下文（这是在 iOS 8 中新增的一个属性）。\n\n当你的视图控制器代码开始执行时，你可以从视图控制器的\
  \ `extensionContext` 属性中获取用户想要处理的项目的相关信息。之后的操作都是一样的。\n\n假设用户选择了两个图片和一个电影进行分享。上下文将包含两个项目：一个用于图片，另一个用于电影。图片项目包含两个附件，电影项目包含一个附件。\n\
  \n回到你的代码中，两个循环会遍历所有附件，寻找 URL 类型的附件。这是通过使用 `hasItemConformingToTypeIdentifier(_:)`\
  \ 函数实现的。你向此函数传递一个 URL 的通用类型标识符，或者任何你感兴趣的类型，如果附件是该类型或可以转换为该类型，则返回 `true`。\n\n一旦你找到了想要处理的附件，下一步就是提取它。附件可能代表大量数据——例如，整个电影。附件内容是使用\
  \ `loadItemForTypeIdentifier(_:,options:,completionHandler:)` 函数异步获取的。该函数会获取附件的内容，可能将其转换为目标类型，然后在准备就绪时执行一个闭包。你的闭包会调用\
  \ `actionWithURL(_:)` 函数，这个函数你还没有编写。\n\n在此之前，删除模板中包含的任何其他方法。你也可以从项目中删除 `Action.js`\
  \ 文件；你不会用到它。\n\n### 复用 Squeezer\n\n按如下所示，将 `actionWithURL(_:)` 函数的代码添加到 `ActionRequestHandler`\
  \ 类中。这个是实现你的操作的函数。\n\n\n\n```swift\nfunc actionWithURL(url: NSURL) {\n    Squeezer.shortenURL(longURL:\
  \ url) { (shortURL, error) in\n        if error == nil {\n            if let url\
  \ = shortURL {\n                UIPasteboard.generalPasteboard().URL = url\n   \
  \         }\n            self.extensionContext?.completeRequestReturningItems( nil,\n\
  \                                                   completionHandler: nil)\n  \
  \      } else {\n            self.extensionContext?.cancelRequestWithError(error!)\n\
  \        }\n    }\n}\n```\n\n这段代码复用了 `Squeezer` 在后台进行 URL 缩短。任务完成后，它会执行闭包。闭包会检查转换是否成功。如果成功，就将缩短后的\
  \ URL 放入剪贴板。\n\n现在到了重要部分。一旦你的扩展完成了它的任务，你*必须*调用一开始收到的 `NSExtensionContext` 对象的 `completeRequestReturningItems(_:,completionHandler:)`\
  \ 或 `cancelRequestWithError(_:)` 函数。这些调用告诉扩展点：你的操作已完成，或者用户（或某些不可见的力量）取消了它。\n\n这里的时机非常重要。扩展必须快速进入、完成任务然后退出。如果你的扩展执行的是直接且快速的操作，它应该执行完毕后就调用这些函数之一。这个\
  \ Action 扩展就属于此类。缩短一个 URL 最多只需要一两秒钟。因此，你的代码会等待 URL 转换完成，然后发出完成信号。\n\n另一方面，如果你的扩展需要执行耗时的操作，例如将整个电影上传到服务器，你应该启动一个后台上传任务，然后立即发出扩展已完成信号。上传操作会在后台继续，而用户可以继续做其他事情。*《App\
  \ Extension Programming Guide》* 中有一节名为“执行上传和下载”，解释了如何设置。\n\n这一切都很好，但这并不是你最大的问题。Xcode\
  \ 告诉你没有名为 `Squeezer` 的类，这没错；你的扩展（框架）中确实没有名为 `Squeezer` 的类。请记住，框架无法访问其容器应用中的代码或资源。\n\
  \n你再次回到了那个问题：如何让应用和扩展共享 URL 缩短代码。最简单的方法之一不是共享，而是复制。选中 `Squeezer.swift` 文件，使用文件检查器更改该文件的目标成员关系，使其同时属于\
  \ Shorty 和 ShortenAction 目标，如图 21-8 所示。\n\n![9781484202098_Fig21-08.jpg](img/9781484202098_Fig21-08.jpg)\n\
  \n图 21-8. 编译 Squeezer 两次\n\n通过将 `Squeezer.swift` 文件设置为两个目标的成员，该文件会被编译两次：一次在构建 ShortenAction\
  \ 框架时，另一次在构建 Shorty 应用时。最终的效果是，你的应用和扩展都可以使用同一个类。\n\n现在让我们来实际测试一下。再次选择 ShortenAction\
  \ 方案（参见图 21-4），并在 Safari 中测试。浏览一个页面，点击操作按钮，然后点击你的“复制短 URL”操作。如果一切正常，页面的 URL 将被缩短并复制到剪贴板。为了验证这一点，在\
  \ `actionWithURL(_:)` 函数中设置一个断点，如图 21-9 所示。\n\n![9781484202098_Fig21-09.jpg](img/9781484202098_Fig21-09.jpg)\n\
  \n图 21-9. 检查运行中的 `actionWithURL(_:)`\n\n当操作执行时，它会调用 `actionWithURL(_:)` 来转换 URL。如图\
  \ 21-9 所示，单步执行闭包代码时，你可以在变量面板中看到成功缩短后的 URL，并逐步执行将其放入剪贴板的代码。\n\n这非常了不起。只需很少的工作，你就创建了一个新的操作，用户可以在成千上万个分享\
  \ URL 的应用中使用它。同样的基本技术也可用于创建新的分享服务、照片滤镜和交互式通知。\n\n但你的工作还没有完成。还有一些外观问题和更严重的工程问题需要处理。所以，在你把这本书放回书架之前，让我们先来解决这些问题。\n\
  \n### 操作图标\n\nAction 扩展有自己的图标。这很不寻常；大多数扩展使用其容器应用的图标。原因是操作图标并非普通图标，它们是模板。*模板*是一种利用图像\
  \ Alpha 通道（决定每个像素透明度的图像层）创建的图标。像素颜色被忽略，Alpha 通道用于创建单色按钮。\n\n第一步是将必要的图像文件添加到你的项目中，特别是扩展的资源中。首先设置你的扩展，使其拥有图标资源。在项目导航器中选择\
  \ Shorty 项目，选择 ShortenAction 目标，然后选择常规（General）选项卡。找到“应用图标与启动图像”部分，点击“应用图标来源”旁边的“使用资源目录”按钮，如图\
  \ 21-10 所示。\n\n![9781484202098_Fig21-10.jpg](img/9781484202098_Fig21-10.jpg)\n\n\
  图 21-10. 为扩展配置图标来源\n\n在对话框中，将迁移选项改为“新建资源目录”，并确保“同时迁移启动图像”选项未被勾选（扩展没有启动图像，你也不需要提供）。\n\
  \n点击“迁移”按钮，Xcode 会为你的扩展创建一个新的资源目录。我建议更改该目录的名称，以免与容器应用的资源目录混淆，如图 21-11 所示。\n\n![9781484202098_Fig21-11.jpg](img/9781484202098_Fig21-11.jpg)\n\
  \n图 21-11. 重命名扩展的资源目录\n\n如果新的资源目录中有一个 AppIcon 组，请选中并删除它。选中 `ActionImages.xcassets`\
  \ 目录后，添加一个新的应用图标，如图 21-12 所示。\n\n![9781484202098_Fig21-12.jpg](img/9781484202098_Fig21-12.jpg)\n\
  \n图 21-12. 添加新的应用图标集\n\n找到 `Learn iOS Development Projects` ![image](img/arrow.jpg)\
  \ `Ch 21` ![image](img/arrow.jpg) `ShortenAction (Resources)` 文件夹。将四个图像文件拖入新目录的\
  \ AppIcon 集中，如图 21-13 所示。这些是模板图像，其 Alpha 层包含了实际设计。图像的彩色像素是多余的，但为了在处理时不会显示为空白，将它们设置为灰色。\n\
  \n![9781484202098_Fig21-13.jpg](img/9781484202098_Fig21-13.jpg)\n\n图 21-13. 添加操作图标模板\n\
  \n再次在 Safari 中测试你的扩展，如图 21-14 所示。这次，你的操作将像其他操作一样拥有一个模板生成的图标，如图 21-14 右侧所示。如果看不到，请尝试使用\
  \ iOS 模拟器的“重置内容和设置”命令，然后重新运行测试。此命令相当于将 iOS 设备恢复出厂设置，焕然一新。它会抹掉设备上的所有应用、文档和偏好设置。iOS\
  \ 倾向于缓存扩展的信息，可能不会注意到后台所做的细微更改。重置模拟器会强制它重新开始。\n\n![9781484202098_Fig21-14.jpg](img/9781484202098_Fig21-14.jpg)\n\
  \n图 21-14. 你的扩展图标\n\n\n您的操作扩展已经完成，可以发布了。你可以就此止步，也可以迈入更广阔的领域。\n\n### 真正复用 Squeezer\n\
  \n像这样的小项目，把 `Squeezer` 类编译两次或许没什么问题。但项目不会一直停留在小规模。随着你添加更多扩展，并且这些扩展的能力不断增长，你需要与主应用共享的代码也会越来越多，有时甚至会大幅增长。显然，你需要共享所有的数据模型类。如果你有自定义文档类，你的扩展可能也想使用它们。此外，还有用于确保上传图片不会太大的降采样代码、防止魔多（Mordor）截获消息的加密程序、获取夏尔（Shire）当前天气预报的代码等等，不胜枚举。\n\
  \n你需要某种方法，将编译后的代码和资源打包，以便主应用和扩展都能使用它们。朋友，这正是*框架*的定义。在本节中，你将创建第二个框架，一个专门用于共享代码的框架，并在你的主应用和扩展中使用它。让我们开始吧。\n\
  \n### 创建一个框架\n\n首先，向你的项目添加一个新的框架目标。在项目导航器中选择 `Shorty`。如果目标已折叠，请展开它们。点击目标底部的 `+`\
  \ 按钮。在出现的“目标选择器”中，选择 `iOS Framework & Library` 组，然后选择添加一个 `Cocoa Touch Framework`，如图\
  \ Figure 21-15 所示。\n\n![9781484202098_Fig21-15.jpg](img/9781484202098_Fig21-15.jpg)\n\
  \n图 21-15. 选择框架模板\n\n在下一个对话框中，将产品命名为 `SqueezeKit`，如图 Figure 21-16 所示。确保 `Project`\
  \ 和 `Embed in Application` 两个设置都设为 `Shorty`。这会将新框架作为该项目的一部分，然后自动将该框架嵌入到 `Shorty`\
  \ 应用中。它将成为 `Shorty` 应用的一个资源，就像 `ShortenAction` 现在这样。\n\n![9781484202098_Fig21-16.jpg](img/9781484202098_Fig21-16.jpg)\n\
  \n图 21-16. 创建框架\n\n### 向框架添加代码\n\n下一步是向框架中添加一些内容。选择 `Squeezer.swift` 文件，如图 Figure\
  \ 21-17 所示，并使用文件检查器更改其目标成员身份。你希望 `Squeezer` 类在 `SqueezeKit` 目标中编译，但不在主应用或扩展中编译。\n\
  \n![9781484202098_Fig21-17.jpg](img/9781484202098_Fig21-17.jpg)\n\n图 21-17. 将 `Squeezer`\
  \ 设为 `SqueezeKit` 的成员\n\n为了更清晰地体现这种新关系，将 `Squeezer.swift` 文件从项目导航器中的当前位置拖放到 `SqueezeKit`\
  \ 组中。\n\n### 真正移动 `SQUEEZER.SWIFT`\n\n你可以随意拖拽项目导航器中的项目，并按任何你喜欢的方式组织它们。然而，导航器中的组织方式与文件在你的文件系统中的组织方式是相互独立的。当你将\
  \ `Squeezer.swift` 从顶层项目组移动到 `SqueezeKit` 组时，源文件并不会实际移动。\n\n如果你使用源代码控制系统，或者像我一样有点洁癖，希望项目的文件夹结构能够反映其组织方式，那么你还需要将源文件移动到框架的子文件夹中。以下是最简单的操作方法：\n\
  \n1.  选择源文件。\n2.  右键点击或 Control+点击该文件，然后选择 `Show in Finder` 命令。这样你就知道真实文件在哪里了。\n\
  3.  回到 Xcode，从项目中删除该文件，并选择 `Remove Reference`；不要将其移到废纸篓。\n4.  回到 Finder，将文件移动到新位置。在本例中，即\
  \ `SqueezeKit` 文件夹内。\n5.  将移动后的文件从 Finder 拖回您的项目（放在 `SqueezeKit` 组内）。当 Xcode 询问时，将“新”文件仅添加到\
  \ `SqueezeKit` 目标。\n\n虽然还有其他不删除并重新添加文件到项目就能进行重定位的方法，但本技巧可以避免很多操作中可能出现的奇怪问题。\n\n\
  现在，你的 `Squeezer` 类在一个框架中编译，并且该框架已嵌入并链接到你的应用。你应该可以在任何地方使用它了，对吧？还不行。\n\n尝试构建你的应用，看看会发生什么。在\
  \ `ViewController.swift` 文件中，编译器现在报告找不到 `Squeezer` 类。这是因为 `Squeezer` 现在位于一个框架中。要使用框架中的代码，你必须导入它。在\
  \ `ViewController.swift` 文件的顶部，为 `SqueezeKit` 框架添加一条 `import` 语句，如下所示（新代码以粗体显示）：\n\
  \n```swift\nimport UIKit\nimport SqueezeKit\n```\n\n再次构建你的应用，然而（！）编译器依然说找不到这个类。还记得\
  \ 第 20 章 开头提到过访问控制指令，并且说过在开始构建框架之前通常可以忽略它们吗？现在你不能再忽略它们了。\n\n`Squeezer` 类及其所有属性和方法都被赋予了默认的\
  \ `internal` 访问权限，这意味着该类及其成员仅在其编译所在的应用或框架内可见。当你之前在自己的应用中编译它时，这不成问题。现在问题来了。\n\n选择\
  \ `Squeezer.swift` 文件，并为该类及其方法添加 `public` 访问关键字，如下所示（新代码以粗体显示）：\n\n```swift\npublic\
  \ class Squeezer {\npublic class func shortenURL(# longURL: NSURL, ...\n```\n\n\
  再次编译你的应用，编译错误消失了！恭喜你，你已经创建了一个框架，用有用的代码填充了它，决定了代码的哪些部分是公开的，并在你的应用中使用了它。\n\n对于 `Shorty`\
  \ 来说，你还没完全完成。现在你在 `ActionRequestHandler` 类的 `actionWithURL(_:)` 函数中看到了相同的错误。这与之前是同一个问题。在\
  \ `ActionRequestHandler.swift` 的开头添加一条新的 `import` 语句，就像你为 `ViewController.swift`\
  \ 所做的那样。\n\n```swift\nimport UIKit\nimport MobileCoreServices\nimport SqueezeKit\n\
  ```\n\n### 与扩展共享框架\n\n在收工之前，还有一个很小的细节需要你处理。扩展在受控环境中运行。为了保护该环境，iOS 禁止扩展使用某些 Cocoa\
  \ Touch 类和方法。例如，你无法获得运行你扩展的进程的 `UIApplication` 对象。\n\nXcode 通过一个特殊的编译器标志来帮助你避免尝试做不允许做的事情，如果你试图使用超出范围的内容，该标志会发出警告。你扩展中的代码是在该标志开启的情况下编译的。但你的框架中的代码并非如此。如果你在扩展中使用了一个框架，你也应该在该框架中设置此标志。这样，框架就不会让你编译那些在扩展中无法使用的代码。\n\
  \n在导航器中选择 `Shorty` 项目，选择 `SqueezeKit` 目标，然后切换到 `Build Settings` 标签页。确保你查看的是 `All`\
  \ 设置。在搜索字段中输入术语 **safe**，然后找到 `Require Only App-Extension-Safe API` 设置，如图 Figure\
  \ 21-18 所示。点击 `SqueezeKit` 目标的设置值，并将其更改为 `YES`，同样如图 Figure 21-18 所示。\n\n就这样，大功告成！\n\
  \n![9781484202098_Fig21-18.jpg](img/9781484202098_Fig21-18.jpg)\n\n\n图 21-18. 让\
  \ SqueezeKit 扩展安全可靠\n\n"
