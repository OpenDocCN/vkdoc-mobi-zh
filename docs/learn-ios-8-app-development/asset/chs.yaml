  \n图 5-23. 连接文本字段输出口\n\n### 配置详情视图\n\n你可能会问，`MyWhatsit` 对象的值将如何传入你刚刚创建的两个 `UITextField`\
  \ 对象。这是个好问题。这将在用户点击表格视图中的某一行时发生。从点击操作到进入详情视图的大部分机制已经为你写好（作为主从项目模板的一部分），但理解其工作原理会很有帮助。让我们来逐步解析点击一行的过程。\n\
  \n有几种不同的方法可以响应用户在表格中点击一行。传统的做法是重写表格视图委托函数 `tableView(_:,didSelectRowAtIndexPath:)`。这个顾名思义的函数会在用户选择（点击）表格中的某一行时被调用。你的代码可以决定要如何处理。\n\
  \n然而，使用 storyboard，你无需编写任何代码来响应点击。主从模板提供了一个原型单元格，它已经附加了一个标识符为 `showDetail` 的 Segue。当用户点击某一行时，该\
