  \n你的`ThingsDocument`对象现在是你应用的数据模型。这是一个重要的步骤。将文档和数据模型合并为一个对象并不重要，但重要的是你将所有对数据模型的更改（计数、获取、删除和创建项目）封装在自己的方法后面，而不是仅仅使用数组方法。你很快就会明白原因。\n\
  \n你可能会认为你已经编写了足够的代码，使你的应用能够将`MyWhatsit`对象（至少是名称和位置信息）存储在文档中并再次检索它们。但是文档拼图仍然缺少几个小部分。\n\
  \n## 跟踪更改\n\n你还没有编写任何保存文档的代码。你已经编写了将数据模型对象转换为可保存格式的代码，但你从未请求`UIDocument`对象保存自身。\n\
  \n而且你也不会这样做。\n\n至少，这不是理想的技术。`UIDocument`采用了*自动保存文档模型*，其中用户的文档在操作期间定期保存到持久存储，并在应用退出前自动再次保存。这是\
  \ iOS 应用首选的文档保存模型。\n\n为了使自动保存工作，你的代码必须通知文档已进行了更改。然后`UIDocument`会在后台安排并执行新数据的保存。有两种方法可以向文档传达更改：调用`updateChangeCount(_:_)`函数或使用文档的`NSUndoManager`对象。当你向`NSUndoManager`注册更改时，它会自动通知其文档对象有关更改的信息。\n\
  \n**注意** 使用撤销管理器和自动保存的替代方法是显式调用`saveToURL(_:,forSaveOperation:,completionHandler:)`（或密切相关的函数之一）来保存文档。这将意味着一个更像传统桌面应用程序的界面，用户必须刻意保存他们的文档。\n\
  \n对于这个应用，你不会使用`NSUndoManager`——尽管它是一个值得考虑的伟大功能，而且使用起来并不困难。因此，你需要在每次发生更改时调用文档对象的`updateChangeCount(_:)`函数。`UIDocument`会处理后续工作。\n\
  \n那么，你的数据模型何时会发生变化？一个明显的地方是添加或删除项目时。选择`ThingsDocument.swift`文件。找到`removeWhatsitAtIndex(_:)`和`anotherWhatsit()`函数。在`removeWhatsitAtIndex(_:)`的末尾以及在`anotherWhatsit()`中的`return`语句之前，添加以下语句：\n\
  \n```\nupdateChangeCount(.Done)\n```\n\n此消息告诉文档对象其内容已更改，并且这些更改是`.Done`的。还有其他类型的更改（例如，由于撤消或重做操作导致的更改），但除非你创建了自己的撤销管理器，否则这是你需要传递的唯一常量。\n\
  \n文档发生更改的另一个地方是用户编辑单个项目时。你早在第 4 章就已经解决了这个问题！每当编辑`MyWhatsit`对象时，你的对象会发布一个`MyWhatsitDidChange`通知。你的文档需要做的就是观察该通知。\n\
  \n仍在你的`ThingsDocument.swift`文件中，添加以下初始化和反初始化方法：\n\n```\noverride init?(fileURL url:\
  \ NSURL) {\n    super.init(fileURL: url)\n    let center = NSNotificationCenter.defaultCenter()\n\
  \    center.addObserver( self,\n              selector: \"thingsDidChange:\",\n\
  \                  name: WhatsitDidChangeNotification,\n                object:\
  \ nil)\n}\n\ndeinit {\n    NSNotificationCenter.defaultCenter().removeObserver(self)\n\
  }\n```\n\n初始化方法注册你的文档以接收`WhatsitDidChangeNotification`通知，反初始化方法在文档对象被销毁前取消注册。\n\n\
  最后，添加新的通知处理方法。\n\n```\nfunc thingsDidChange(notification: NSNotification) {\n  \
  \  if indexOfWhatsit(notification.object as MyWhatsit) != nil {\n        updateChangeCount(.Done)\n\
  \    }\n}\n```\n\n它唯一的目的就是通知文档此文档中的`MyWhatsit`对象已更改，并且它正是这样做的。\n\n## 测试你的文档\n\n\n\
  \n想必您现在已经编写了足够多的代码，足以看到文档的实际运行效果。在模拟器或已配置的设备上运行您的应用程序。首次启动时，界面是空的，如图 19-1 左侧所示。请为几个项目输入详细信息。\n\
  \n![9781484202098_Fig19-01.jpg](img/9781484202098_Fig19-01.jpg)\n\n图 19-1. 测试文档存储\n\
  \n现在，等待大约 20 秒，或者按下主页按钮将应用程序推入后台状态。当您创建新项目时，文档会收到变更通知。`UIDocument` 的自动保存功能会在用户没有其他操作时定期保存文档，并在应用程序移至后台状态时立即保存。\n\
  \n在数据安全保存到文档后，停止应用程序并从 Xcode 再次运行它。您之前输入的项目列表应该会出现，以奖励您的辛勤工作。\n\n然而，您看到的却是一个空白屏幕，如图\
  \ 19-1 右侧所示。\n\n那么，哪里出错了？也许您的文档在应用程序启动时没有被打开？也许它一开始就没有被保存？您知道的是，代码中肯定存在一个错误；是时候使用调试器了。\n\
  \n### 设置断点\n\n切换回 Xcode，在您的 `contentsForType(_:,error:)` 方法中，通过点击代码左侧的装订线区域来设置一个断点，如图\
  \ 19-2 所示。断点会显示为一个蓝色标签。\n\n![9781484202098_Fig19-02.jpg](img/9781484202098_Fig19-02.jpg)\n\
  \n图 19-2. 在 `contentsForType(_:,error:)` 中设置断点\n\n在您的设备或模拟器上卸载“我的物品”应用程序。（长按主屏幕上的“我的物品”应用图标，直到它开始抖动，点击删除[x]按钮，确认删除应用，然后再次按下主页按钮。）这将删除您的应用程序以及存储在设备上的所有数据，包括任何文档。再次运行应用程序。Xcode\
  \ 将重新安装该应用，并以全新状态启动。\n\n几乎立刻，Xcode 就会在 `contentsForType(_:,error:)` 函数的断点处停下，如图\
  \ 19-2 所示。如果您查看左侧的堆栈跟踪，可以看到 `contentsForType(_:,error:)` 函数是由 `document()` 函数调用的，而\
  \ `document()` 函数又是由 `MasterViewController.init()` 调用的。这表明，当文档不存在时，系统会调用 `contentsForType(_:,error:)`\
  \ 来创建初始的空文档。请记住，当文档不存在时，`document()` 所做的第一件事就是通过保存空文档对象来创建一个文档。\n\n### 单步执行代码并检查变量\n\
  \n那么，我们知道空文档已被保存。下一步呢？点击调试器工具栏中的“继续”按钮（同样显示在图 19-2 中）。这将让您的应用程序恢复正常执行。添加一些新对象，然后稍等片刻或按下主页按钮将应用程序推入后台。Xcode\
  \ 将再次停在 `contentsForType(_:,error:)` 的断点处。这表明您的文档在您对其做出更改时正在进行自动保存。到目前为止，一切顺利。\n\
  \n如果文档被正确写入，那也许问题出在加载环节。在 `loadFromContent(_:,ofType:,error:)` 方法中设置另一个断点，然后再次运行应用程序，如图\
  \ 19-3 所示。一旦 Xcode 停在该函数内，点击“单步跳过”按钮（紧挨着“继续执行”按钮）来一次执行一条语句。反复点击，直到设置 `things` 数组的语句被执行，如图\
  \ 19-3 所示。\n\n![9781484202098_Fig19-03.jpg](img/9781484202098_Fig19-03.jpg)\n\n\
  图 19-3. 单步执行 `contentsForType(_:,error:)`\n\n**提示** “单步跳过”会执行源代码中的一条完整语句，并在执行完毕后停止。“单步进入”会执行一条语句；如果该语句是一个函数调用，则会进入该函数内部并再次停止。“单步跳出”允许执行完当前函数的剩余部分，并在返回到其调用者时再次停止。\n\
  \n这是用于加载文档内容的函数。它会对数据进行解归档，并填充 `things` 数组。查看工作区窗口底部的调试器区域，您将看到该函数中的所有活动变量。其中之一是\
  \ `self`，即正在被操作的文档对象。展开它以检查其属性值。在其中，您会找到一行类似于以下内容的语句：\n\n```\nthings = ([MyStuff.MyWhatsit])\
  \ 2 values\n```\n\n该语句表明，您的文档对象的 `things` 属性由一组 `MyWhatsit` 对象组成的数组，并且当前包含两个对象。这太棒了！这意味着您的文档已成功读取，并且之前序列化的数据已被重构为两个\
  \ `MyWhatsit` 对象。\n\n那么，为什么它们没有显示在您的表格视图中呢？让我们来找出原因。定位到 `whatsitCount` 属性，并在其唯一的返回语句上设置一个断点。（保留其他已设置的断点。）再次运行您的应用程序。表格视图首先会做的事情之一，就是通过其数据源委托获取表格中的行数。而该函数又会读取您的\
  \ `whatsitCount` 属性。果然，一旦您运行应用程序，Xcode 就会在您的 `whatsitCount` 属性 getter 方法处停下，如图 19-4\
  \ 所示。\n\n![9781484202098_Fig19-04.jpg](img/9781484202098_Fig19-04.jpg)\n\n图 19-4.\
  \ 检查 `whatsitCount` 属性\n\n再次，在调试窗格中展开 `self` 变量并查看 `things` 属性。这次它是空的。您已经找出问题所在了吗？点击“继续执行”按钮，让您的应用程序运行。接下来发生的事情是，您将命中断点\
  \ `loadFromContent(_:,ofType:,error:)`。您现在搞清楚问题了吗？\n\n**提示** 顺便说一句，这被称为“分而治之”调试技术。判断您的代码应该执行什么操作，在流程中间某处设置一个断点，并观察该步骤是否正确执行。如果不正确，问题要么就在此处，要么在代码更早的位置。如果正确执行，那么问题就在此之后。选择另一个断点并重复此过程，直到找到错误。\n\
  \n问题就在这里。`UIDocument` 的 `openWithCompletionHandler(_:)` 函数（从 `document()` 中调用）是*异步*的。它会在后台启动检索文档数据的过程，并立即返回。您的应用程序代码继续执行，显示表格视图，而此时的数据模型仍然是空的。\n\
  \n过了一段时间，文档的数据加载完成，并传递给 `loadFromContents(_:,ofType:,error:)` 以转换成数据模型。这个转换是成功的，但表格视图对此一无所知，并继续显示它认为的空列表。\n\
  \n您的文档需要做的，是在数据模型更新后通知您的视图控制器，以便表格视图能够刷新自身。您可以使用通知来实现这一点，但我认为最合理的解决方案是使用委托函数。作为额外收获，您将获得创建自己协议的经验。\n\
  \n**提示** 将断点拖出装订线区域即可移除。将断点拖到新位置即可重新定位。单击断点可禁用或启用它。\n\n## 创建 `ThingsDocument` 委托\n\
  \n定义一个全新的委托协议。您可以为了这个协议专门向项目中添加一个新的 Swift 文件，但由于它与 `ThingsDocument` 类紧密相关，我建议将其直接添加到\
  \ `ThingsDocument.swift` 文件中。\n\n```\nprotocol ThingsDocumentDelegate {\n    func\
  \ gotThings(document: ThingsDocument)\n}\n```\n\n\n\n\n该协议定义了一个包含单个函数（`gotThings(_:)`）的协议，当你的文档对象从文档中加载新内容时，会调用该函数。在\
  \ `ThingsDocument` 类中，添加一个新的委托属性，如下所示（新增代码以**粗体**标注）：\n\n```\nclass ThingsDocument:\
  \ UIDocument, ImageStorage {\n    var delegate: ThingsDocumentDelegate?\n```\n\n\
  找到 `document(atURL:)` 函数。将打开文档的语句修改为以下内容（修改后的代码以**粗体**标注）：\n\n```\ndocument.openWithCompletionHandler()\
  \ { (success) in\n    if success {\n        document.delegate?.gotThings(document)\n\
  \    }\n}\n```\n\n修改后的代码会在文档加载完成后执行一个操作，其中包括对数据模型对象进行解归档。现在，它会调用委托函数 `gotThings(_:)`，从而让委托对象（你的视图控制器）知道数据模型已发生改变。\n\
  \n切换到 `MasterViewController.swift` 文件，让你的视图控制器成为文档委托对象（新增代码以**粗体**标注）。\n\n```\n\
  class MasterViewController: UITableViewController, ThingsDocumentDelegate {\n```\n\
  \n找到 `awakeFromNib()` 函数，并在末尾添加一条语句，使视图控制器成为文档的 `delegate` 对象（新增代码以**粗体**标注）。\n\n\
  ```\ndocument.delegate = self\n```\n\n最后，编写协议函数 `gotThings(_:)`，如下所示：\n\n```\nfunc\
  \ gotThings(_: ThingsDocument) {\n    tableView.reloadData()\n}\n```\n\n再次运行你的应用，如图\
  \ 19-5 所示，瞧！文档中的数据就出现在表格视图中了。\n\n![9781484202098_Fig19-05.jpg](img/9781484202098_Fig19-05.jpg)\n\
  \n图 19-5。工作中的文档\n\n进行修改或添加新项目。按下 Home 键，给 `UIDocument` 一个保存文档的机会，然后停止应用，重新启动，你的修改将会保留。MyStuff\
  \ 唯一不保存的内容是你添加的任何图片。这是因为图片不属于归档对象数据的一部分。你将直接把图片数据添加到文档的目录包装器中，所以接下来要解决这个问题。\n\n\
  **提示** 调试 ![image](img/arrow.jpg) 停用断点命令会禁用项目中的所有断点，让你能够不间断地运行和测试应用。\n\n## 存储图片文件\n\
  \n在前面的章节中，你学习了序列化数据模型对象、将其存储在文档文件中以及重新检索它们的所有基础知识。图片数据的存储方式与 `MyWhatsit` 对象中的其他属性不同。其工作原理如下：\n\
  \n- 当一个新的或更新过的图片（`UIImage`）对象被添加到 `MyWhatsit` 对象时，该图片会被转换为可移植网络图形（PNG）数据格式，并以文件包装器的形式存储在文档中。`MyWhatsit`\
  \ 对象会记住该文件包装器的键。\n- 当文档被保存时，`UIDocument` 会将文档包装器中所有文件包装器的数据包含进来。图片文件包装器的键由 `MyWhatsit`\
  \ 对象进行归档。\n- 当文档再次被打开时，图片数据的文件包装器对象会被恢复。\n- 当客户代码请求 `MyWhatsit` 对象的图片属性时，`MyWhatsit`\
  \ 会使用其保存的键来定位并加载文件包装器中的数据，最终将其转换回原始的 `UIImage` 对象。\n\n这种设计的关键（无意双关）在于 `MyWhatsit`\
  \ 对象与文档对象之间的关系。`MyWhatsit` 对象将使用文档对象来存储，并在之后检索单个图片的数据。然而，从软件设计的角度来看，我们希望将实际存储和检索图片数据的代码保留在\
  \ `MyWhatsit` 对象之外。单一职责原则鼓励 `MyWhatsit` 对象做好自己的事情（表示数据模型中的值），而文档对象也做好自己的事情（管理文档数据的存储和转换），避免用一方的职责污染另一方。\n\
  \n解决方案是在 `ThingsDocument` 类中创建一个**抽象层**或**抽象服务**，用于存储和检索图片。`MyWhatsit` 仍将发起图片管理，但这些图片如何转换为文件包装器的具体机制则保留在\
  \ `ThingsDocument` 内部。让我们开始吧。\n\n在 `ThingsDocument.swift` 文件中添加第二个协议，如下所示：\n\n```\n\
  protocol ImageStorage {\n    func keyForImage(newImage: UIImage?, existingKey: String?)\
  \ -> String?\n    func imageForKey(key: String?) -> UIImage?\n}\n```\n\n该协议定义了一个服务，用于存储和检索图片。第一个函数将存储、替换或移除存储中的图片，并返回一个可用于后续检索的键。第二个函数执行检索操作。你的\
  \ `ThingsDocument` 类将提供此服务，因此将其添加到它的功能列表中（修改后的代码以**粗体**标注）。\n\n```\nclass ThingsDocument:\
  \ UIDocument, ImageStorage {\n```\n\n现在修改 `MyWhatsit`，使其使用这些方法来保存和恢复其图片属性。选择 `MyWhatsit.swift`\
  \ 文件，并添加两个新属性，如下所示，一个用于图片存储提供者，另一个用于记住图片在存储中的键：\n\n```\nvar imageStorage: ImageStorage?\n\
  var imageKey: String?\n```\n\n现在重写 `image` 属性。你将把它从一个简单的存储属性改成一个计算属性，该属性在请求时从 `imageStore`\
  \ 延迟获取图片，并在设置时将图片编码到 `imageStore` 中。按如下方式重写 `var image`（新增代码以**粗体**标注）：\n\n```\n\
  var image: UIImage? {\n    get {\n        if image_private == nil {\n          \
  \  image_private = imageStorage?.imageForKey(imageKey)\n        }\n        return\
  \ image_private\n    }\n    set {\n        image_private = newValue\n        imageKey\
  \ = imageStorage?.keyForImage(newValue, existingKey: imageKey)\n        postDidChangeNotification()\n\
  \    }\n}\nprivate var image_private: UIImage?\n```\n\n你已经重构了 `image` 属性，使其能够从外部源存储和检索其图片，具体的实现细节只有\
  \ `imageStorage` 知道。使用 `image` 属性的代码无需更改。就应用的其余部分而言，你的 `MyWhatsit` 对象仍然有一个可以获取或设置的\
  \ `image` 属性。\n\n为了在下次加载文档时检索图片，你的新 `MyWhatsit` 对象必须记住从 `keyForImage(_:,existingKey:)`\
  \ 返回的键。修改你的 `NSCoding` 函数，如下所示，以便 `imageKey` 属性也能被序列化（新增代码以**粗体**标注）：\n\n```\nlet\
  \ nameKey = \"name\"\nlet locationKey = \"location\"\nlet imageKeyKey = \"image.key\"\
  \n\nrequired init(coder decoder: NSCoder) {\n    name = decoder.decodeObjectForKey(nameKey)\
  \ as String\n    location = decoder.decodeObjectForKey(locationKey) as String\n\
  \    imageKey = decoder.decodeObjectForKey(imageKeyKey) as? String\n}\n\nfunc encodeWithCoder(coder:\
  \ NSCoder) {\n    coder.encodeObject(name, forKey: nameKey)\n    coder.encodeObject(location,\
  \ forKey: locationKey)\n    coder.encodeObject(imageKey, forKey: imageKeyKey)\n\
  }\n```\n\n**注意** 你的 `NSCoding` 方法不会对对象的 `image` 或 `document` 属性进行编码或解码。当对象被解归档时，这些属性值将为\
  \ `nil`。这使得它们成为**瞬态**属性。通过归档保留的属性称为**持久**属性。\n\n至此，对 `MyWhatsit` 类的大部分修改就完成了。现在，你实际上需要提供你在协议中承诺的图片存储服务。选择\
  \ `ThingsDocument.swift` 文件。首先编写图片存储函数，如下所示：\n\n\n\n\n`keyForImage(newImage:existingKey:)`函数如下：\n\
  \n```swift\nfunc keyForImage(newImage: UIImage?, existingKey: String?) -> String?\
  \ {\n    if let key = existingKey {\n        if let wrapper = docWrapper.fileWrappers[key]\
  \ as? NSFileWrapper {\n            docWrapper.removeFileWrapper(wrapper)\n     \
  \   }\n    }\n    var newKey: String? = nil\n    if let image = newImage {\n   \
  \     let imageData = UIImagePNGRepresentation(image)\n        newKey = docWrapper.addRegularFileWithContents(imageData,\n\
  \                                     preferredFilename: imagePreferredName)\n \
  \   }\n    updateChangeCount(.Done)\n    return newKey\n}\n```\n\n`newImage`参数要么是要存储的图像，要么是`nil`（表示不应存储图像）。图像通过转换为\
  \ PNG 文件格式并存储为常规文件包装器中的数据来保存。\n\n`existingKey`参数是之前存储图像的键，如果没有则为`nil`。如果提供了该键，则首先用于丢弃之前存储的图像文件。\n\
  \n函数返回用于检索存储图像（如果有）的键。通过使用不同的值和`nil`组合，该函数可用于存储新图像（有图像，无键）、替换图像（有图像和键）或删除图像（无图像，有键）。\n\
  \n### 检索图像\n\n上述函数负责在文档中存储新图像以及用新图像替换现有图像。现在添加从文档中检索图像的代码，如下所示：\n\n```swift\nfunc\
  \ imageForKey(imageKey: String?) -> UIImage? {\n    if let key = imageKey {\n  \
  \      if let wrapper = docWrapper.fileWrappers[key] as? NSFileWrapper {\n     \
  \       return UIImage(data: wrapper.regularFileContents!)\n        }\n    }\n \
  \   return nil\n}\n```\n\n此函数使用`imageKey`在文档中查找文件包装器，调用包装器的`regularFileContents()`函数检索其数据，并使用该数据重构原始的`UIImage`对象，然后将其返回给调用者。\n\
  \n**注意**：常规文件包装器所表示的数据在调用其`regularFileContents()`函数之前不会读入内存。文件包装器只是持久化存储中数据的轻量级占位符，直到你请求这些数据为止。\n\
  \n### 删除图像\n\n巧妙的是，还有一处会从文档中移除图像——当用户删除`MyWhatsit`对象时。找到`removeWhatsitAtIndex(_:)`函数。在该方法开头添加代码，以在移除项目之前，移除该项目的图像文件包装器。\n\
  \n但这段代码应该是什么样的？就像你不希望数据模型类密切了解图像如何存储在文档中一样，你的文档对象也不应密切了解数据模型类如何使用`ImageStorage`。因此，让我们将这种了解保留在`MyWhatsit`类中。将以下代码添加到`removeWhatsitAtIndex(_:)`函数中（新代码以粗体显示）：\n\
  \n```swift\nfunc removeWhatsitAtIndex(index: Int) {\n    let thing = whatsitAtIndex(index)\n\
  \    thing.willRemoveFromStorage()\n    thing.imageStorage = nil\n    things.removeAtIndex(index)\n\
  \    updateChangeCount(.Done)\n}\n```\n\n你不是直接移除它的图像文件包装器，而是简单地让`MyWhatsit`对象知道它即将从文档中移除。然后它会自行处理移除自身所需的一切。最后，你将其与文档（图像）存储断开连接，使其再次表现为独立的`MyWhatsit`对象。\n\
  \n哦，你最好将那个函数添加到你的`MyWhatsit.swift`文件中，如下所示：\n\n```swift\nfunc willRemoveFromStorage()\
  \ {\n    imageStorage?.keyForImage(nil, existingKey: imageKey)\n    imageKey = nil\n\
  }\n```\n\n## 连接文档与数据模型\n\n所有从文档中保存、检索和删除图像的机制都已就位。遗憾的是，它们都不会工作。`MyWhatsit`必须通过其`imageStore`属性连接到正在工作的`ThingsDocument`对象，这些新代码才能起作用。目前，还没有人设置该属性。\n\
  \n那么，`imageStore`属性应该在何处设置，以及哪个对象应该负责设置它？答案是`ThingsDocument`对象。它应该负责维护自身与其数据模型对象之间的连接。\n\
  \n事实证明，这是一个非常容易解决的问题，因为只有两个位置会创建`MyWhatsit`对象：解档文档时以及用户创建新项目时。从`anotherWhatsit()`函数开始，添加一条语句来设置新对象的`imageStore`属性（新代码以粗体显示），如下所示：\n\
  \n```swift\nfunc anotherWhatsit() -> (object: MyWhatsit, index: Int) {\n    let\
  \ newThing = MyWhatsit(name: \"My Item \\(whatsitCount+1)\")\n    newThing.imageStorage\
  \ = self\n```\n\n**注意**：诸如`anotherWhatsit()`之类的函数被称为工厂方法。*工厂方法*会为客户端创建新的、正确配置的对象。这些对象可能是不同的类，或者需要以特殊方式初始化——例如添加到集合中并在返回前设置其`imageStore`属性——再返回。编写工厂方法来创建那些需要以调用者不应负责的方式创建的对象。\n\
  \n找到`loadFromContents(_:ofType:error:)`函数。在`things`数组解档之后立即添加一个循环，将此文档指定为所有对象的图像存储（新代码以粗体显示）。\n\
  \n```swift\nthings = NSKeyedUnarchiver.unarchiveObjectWithData(data) as [MyWhatsit]\n\
  for thing in things {\n    thing.imageStorage = self\n}\ndocWrapper = contentWrapper\n\
  return true\n```\n\n你的文档实现终于完成了！通过运行 MyStuff 来试一试。添加一些项目，附加一些图片，然后退出应用程序，如图 19-6\
  \ 所示。在 Xcode 中停止应用程序并重新启动。所有项目及其图片都保留在文档中。\n\n![9781484202098_Fig19-06.jpg](img/9781484202098_Fig19-06.jpg)\n\
  \n图 19-6. 测试图像存储\n\n**注意**：在匆忙为`MyWhatsit`对象添加图像存储功能的过程中，我想确保你没有错过一个显著的事实：你并未更改数据模型的接口。任何使用`MyWhatsit`对象的代码（例如`DetailViewController`中的代码）都不需要修改。这是因为`image`属性的含义和用法从未改变。唯一改变的是这些数据如何存储。这就是封装和重构的效果。\n\
  \n如果你在已配置的设备上运行 MyStuff，你可以在 Xcode 的设备窗口（Window ![image](img/arrow.jpg) Devices）中查看应用的文档文件。打开设备窗口并选择你的设备，设备上安装的应用程序就会列出，如图\
  \ 19-7 所示。选择 MyStuff 应用程序，然后选择“Show Container”命令，同样如图 19-7 所示。\n\n![9781484202098_Fig19-07.jpg](img/9781484202098_Fig19-07.jpg)\n\
  \n图 19-7. 显示 MyStuff 的沙盒容器\n\n在出现的面板中（见图 19-8），你可以浏览构成应用沙盒的文件。你可以清楚地看到应用`Documents`文件夹中的`Things\
  \ I Own.mystuff`文档包。那些奇怪的文件名（例如`1__#$!@%!#__image.png`）是`UIDocument`处理两个或多个具有相同首选名称的文件包装器的方式。它会为文件分配奇葩的名称，以便它们都可以存储在同一目录中。\n\
  \n![9781484202098_Fig19-08.jpg](img/9781484202098_Fig19-08.jpg)\n\n图 19-8. MyStuff\
  \ 沙盒中的文件\n\n如果你需要获取这些文件，请改用“Download Container”命令（见图 19-7）。Xcode 会将文件从你的 iOS 设备复制到你的硬盘驱动器，你可以在那里使用它们。\n\
  \n## 杂项\n\n\n\n"
- '# 你已取得的成果


  你在 `MyStuff` 中已经完成了大量工作，但这实际上只是实现文档集成所需的最低限度支持。我还跳过了许多功能和问题。现在，我们来回顾其中几个。


  '
- '# iCloud 存储


  你可以将文档存储在云端，这与第 18 章中将属性列表值存储在云端的方式非常相似。当然，文档的处理会稍微复杂一些。


  苹果的指南建议你提供一个设置选项，允许用户将所有文档放在云端，或者完全不放在云端。不建议采用逐个文档处理的方式。当用户改变主意时，你的应用需要负责将本地存储的文档移动（复制）到云端，或者反向操作。这并非一项简单的任务，它涉及多任务处理，而这要等到第
  24 章才会讲到。


  一旦文档进入云端，你打开、修改和保存文档的方式与在本地沙盒中基本相同。你为 `contentsForType(_:,error:)` 和 `loadFromContents(_:,ofType:,error:)`
  编写的所有代码都不需要修改（前提是你编写正确）；你只需使用不同的 URL 即可。实际上，“云”文档的数据是本地存储在设备上的。任何变更都会在后台与 iCloud
  存储服务器同步，但你始终保留数据的本地副本，这既是为了速度，也是为了防止与云端的网络连接中断。


  本地文档和云端文档之间存在一些细微（甚至不那么细微）的差异。其中一个重要的差异就是变更。云端文档的变更可能随时发生。用户可以在另一台设备上自由编辑同一个文档，而网络中断可能会延迟这些变更到达你的应用。


  通常，你的应用会监听 `UIDocumentStateChangedNotification` 通知。如果 iCloud 服务检测到版本冲突（本地版本与服务端版本），你的文档状态会变为
  `UIDocumentStateInConflict`。这时，你的应用需要比较两个文档，并决定保留哪些内容、丢弃哪些内容。你可以询问用户意见，也可以让应用自动处理。


  **注** Homer the Pigeon 应用提供了一个基于云的 `UIDocument` 存储和同步示例。与 MyStuff 类似，Homer 允许用户将图像附加到保存的位置，导致数据量过大，无法使用通用的键值存储进行共享。你可以从
  `https://github.com/JamesBucanek/Pigeon` 下载 Homer 的源代码。


  要了解更多关于 iCloud 文档的信息，请从 *Document-Based App Programming Guide for iOS* 开始阅读，你可以在
  Xcode 的文档和 API 参考窗口中找到它。这是一本很好的读物，如果你计划进行更多涉及 `UIDocument` 的开发，我强烈建议你仔细阅读。其中“Managing
  the Life Cycle of a Document”和“Resolving Document Version Conflicts”这两章直接涵盖了云存储的内容。


  '
- '# 归档版本控制


  在实现 `NSCoding` 时，你可能需要考虑类发生变化时会发生什么。将对象归档到持久化存储中的一个后果是，数据是——嗯——持久的。用户会期望你的应用能够打开多年前创建的文档。我一直在努力改进我的软件，我相信你也是如此。我经常向类中添加新的属性，或者更改属性的类型和范围。这通常意味着创建新类，并定期废弃旧类。所有这些更改都会改变类的编码方式，并在解档由你软件的旧版本（有时甚至是新版本）创建的数据时带来挑战。


  有许多处理归档兼容性的技术。你的新代码可以使用不同的键来编码其值。在解码时，你的软件可以测试该键是否存在，以确定归档数据是由新版本还是旧版本软件创建的。你可以在归档数据中编码一个“版本”值，并在解码时测试该版本。较新的软件可以用新格式和旧格式编码同一个值，这样旧版软件（对新格式一无所知）仍然可以解释文档数据。


  甚至还有在解档过程中用一个类替换另一个类的技术。（你在第 14 章中实际上已经用到了，将归档文件中的 `SKScene` 类替换为你的 `GameScene`
  类。）这可以解决编码类已不存在的问题。关于这些问题的详细讨论以及一些解决方案，请参阅 *Archives and Serializations Programming
  Guide* 中的“Forward and Backward Compatibility for Keyed Archives”章节。


  '
- '# 总结


  采用 `UIDocument` 为你的应用增加了一层现代数据存储功能，用户既欣赏这种功能，也已经习以为常。你学会了如何以及在哪里存储应用的文档。更重要的是，你理解了对象和方法各自扮演的不同角色，它们协同工作，将模型对象转换为原始数据，再转换回来。你学会了如何构建可以增量保存和延迟加载的多文件文档。在此过程中，你还学会了如何归档对象，以及如何创建可归档的对象。


  你已经走了很长的路，应该对自己的 iOS 能力很有信心了。为应用添加持久化存储，实际上是你需要完成的最后一项主要的 iOS 技能。下一章将深入探讨 Swift，以磨练你的语言知识和熟练度。


  ---


  ¹Blob 实际上是一个数据库术语，意思是二进制大对象（Binary Large Object），有时写作 BLOb。


  ²所有属性列表对象都采用 `NSCoding` 协议。因此，属性列表对象是可归档对象的一个子集。


  ---


  '
- '# 第 20 章 看 Swift，看 Swift 奔跑


  正如承诺的那样，我在本书开始时并没有先讲枯燥的 Swift 课程。你直接上手开始创建应用——我认为这非常棒。Xcode 甚至能让新手程序员设计和制作出高质量的
  iOS 应用，这打开了一个充满可能性的世界。但你可能不希望永远停留在新手阶段；新手在修道院的食堂里可坐不到好位置，也从来不会有粉丝来信。我并不是说读完这一章就能让你成为
  Swift 大师，但这绝对能提升你的水平。


  如果你对 Swift 感到吃力，或者只是相对新手，请认真阅读本章。这基本上是一个速成课程，能为你打下坚实的基础。本章并非旨在成为 Swift 的权威指南，毕竟它只是一章。苹果有两本优秀的
  Swift 语言指南，我强烈建议你下载并随时查阅。这两本书都是免费的。你可以通过 Mac 或 iOS 设备上的 Apple iBooks 应用下载它们。


  *   *The Swift Programming Guide*

  *   *Using Swift with Cocoa and Objective-C*


  这些是苹果官方的语言指南。第一本包含优秀的教程以及语言的技术描述。你可以把本章看作是 *The Swift Programming Guide* 的“速成笔记”。这是一次对所有主要特性的快速浏览，尤其是那些你日常会用到的特性。它旨在让你立即开始使用
  Swift 的出色功能，而不会深究其细节。在本章中，你将学习以下内容：




  '
- "# Swift 语言入门\n\n*   学习如何声明类以及创建对象\n*   发现 `Swift` 的诸多快捷方式\n*   理解不同类型的属性\n*   使用协议和扩展来增强类\n\
  *   掌握闭包的使用\n*   学习如何最佳地使用可选类型和可选链\n*   探索数组、字典、结构体、枚举、元组以及其他基本数据类型\n*   了解如何避免一些内存管理陷阱\n\
  \n本章没有项目。取而代之的是，你将使用 `Xcode` 的一个创新功能——`playground`。`playground` 是一个空白页面，你可以在其中交互式地探索\
  \ `Swift` 语言。让我们开始吧，而最好的起点就是最开始。\n\n## Swift 的（简短）历史\n\n大多数计算机语言的历史可以追溯到几十年前。`Swift`\
  \ 是一个例外，它像智慧女神雅典娜从宙斯的额头中全副武装地诞生一样——或者，在这个例子中，是来自苹果公司。`Swift` 的概念只有几年历史，直到苹果公司在 2014\
  \ 年全球开发者大会上发布它之前，几乎没有任何苹果公司以外的人听说过它。\n\n`Swift` 融合了许多现代语言特性，但并未（至少目前还没有）受到遗留特性和语法的拖累。它是一种简洁、快速、高效、精炼、安全、现代且灵活的语言。令人惊讶的是，它在实现所有这些目标的同时，还能与现有的\
  \ `C`、`Objective-C` 和 `Objective-C++` 代码保持二进制兼容¹。在深入了解 `Swift` 的具体使用之前，让我简要解释一下这些概念。\n\
  \n`Swift` 是一种简洁的语言。这里的简洁，我指的是它是正交且规整的——这些是描述一致性的技术术语。在许多较老的语言中，新特性被叠加在其他特性之上，而这些特性又是叠加在原始语言之上的。最终你会得到一个语法和规则拼凑起来的补丁，而这些规则并不总是一致的。例如，在\
  \ `Objective-C` 中，你使用一种语法来表示 `Objective-C` 字符串字面量，使用另一种语法来表示 `C` 字符串字面量，再用第三种语法来表示字符字面量；而且这三种类型彼此不兼容。`Swift`\
  \ 消除了这种不一致性——只要在逻辑上是可能的。\n\n`Swift` 是快速的。在过去的几十年里，编译器开发者们学到了很多关于如何将你编写的代码转换为高效机器指令的知识。其中一条经验是：编译器越了解程序员想要做什么，它就能越高效地生成代码。`Swift`\
  \ 的语法旨在巧妙地将这些信息传达给编译器。`Swift` 语法倾向于描述你*想要*发生什么，而不是你*希望*它如何发生。这让编译器能够为你找到最佳解决方案。\n\
  \n`Swift` 也是一种完全现代化的语言，借鉴了诸如 `Rust`、`Haskell`、`Ruby`、`Python` 等语言的创新特性。然而，这并不是什么新鲜事。软件工程的世界里充斥着各种计算机语言的“遗骸”，这些语言引入了各种强大的新编程范式，其中大部分由计算机科学家开发。这些语言中的大多数最终被淘汰，因为它们也未能满足行业对性能和兼容性的要求。相比之下，`Swift`\
  \ 最初是由一位“编译器专家”构思和设计的。`Chris Lattner`，苹果公司首席编译器工程师，也是 `LLVM` 和 `clang` 编译器的主要开发者之一，构想了\
  \ `Swift` 作为一种不会牺牲速度或兼容性的现代语言。换句话说，你终于可以“鱼与熊掌兼得”了。\n\n最重要的是，`Swift` 是一种安全的语言。它的语法和规则旨在禁止许多常见以及一些不常见的编程错误，这些错误是全世界软件开发人员的祸根。2014\
  \ 年，科技界因保护互联网数据的核心加密算法之一中发现的漏洞而震动。这个漏洞是由一行 `C` 代码中一个误放的分号（`;`）引起的，这是自该语言诞生以来 `C`\
  \ 程序员就一直犯的经典错误。`Swift` 的语法经过精心设计，旨在帮助你避免犯这类简单但有时是灾难性的错误。（这并不意味着你不能写出有缺陷的软件；只是更不太可能归咎于\
  \ `Swift` 本身。）\n\n最后，`Swift` 是精炼的，但不晦涩。所谓精炼，是指用 `Swift` 编写的同一个程序，很可能比用 `C`、`C++`、`Java`、`C#`\
  \ 或 `Objective-C` 编写的相同代码要短。这意味着你的代码量更少，更易于阅读，也更易于编写。这间接意味着你需要写的东西更少，而且你写的东西也更容易理解。以下\
  \ `Objective-C` 语句将一个 `Person` 对象数组按出生日期升序排序：\n\n```\n[people sortUsingComparator:^NSComparisonResult(id\
  \ l, id r) {\n        Person *p1 = (Person*)l;\n        Person *p2 = (Person*)r;\n\
  \        return [p1.birthdate compareDate:p2.birthdate];\n    }];\n```\n\n将其与 `Swift`\
  \ 中的相同代码进行比较：\n\n```\npeople.sort { $0.birthdate < $1.birthdate }\n```\n\n相比之下，一门晦涩的语言（例如\
  \ `Perl`）可以用少得惊人的代码完成任务，但牺牲了可读性。例如，下面是用 `Perl` 编写的一个完整程序：\n\n```\nprint(\"\".(($line=join(\"\
  \",<>))=~s/.*\\n/$h{$&}++?\"\":$&/ge,$line));\n```\n\n如果你读了那段语句并说道“哦，是的，那是读取一个文件并使用哈希表消除所有重复记录”，那么你是一位天生的计算机语言大神，可以跳过本章的其余部分了。\n\
  \n现在大神们已经离开了，我应该指出，`Swift` 在很大程度上仍是一项进行中的工作。我在 2014 年 10 月撰写的 `Swift` 版本，在很多方面，与几个月前在苹果公司\
  \ `WWDC` 上发布的版本有着显著的不同。我预计 `Swift` 会继续变化，有时甚至是剧烈变化，随着它的发展。因此，请对你在此读到的东西持保留态度，并阅读有关\
  \ `Swift` 最新改进的资料。一个好的起点是 `Swift` 博客：`http://developer.apple.com/swift/blog/`。是的，`Swift`\
  \ 有一个博客。\n\n## 类\n\n到目前为止，你已经看到过这个上百次了，我在第 6 章中也解释过，但在这里再次呈现它的完整面貌。在 `Swift` 中，类通过一个\
  \ `class` 指令声明，如下所示：\n\n```\nclass ClassName: SuperClassName, ProtocolName {\n \
  \   private var instanceVariable: Int = -1\n    func instanceFunction(firstParam:\
  \ Int, secondParam: Int) -> Bool {\n        return firstParam >= secondParam\n \
  \   }\n}\n```\n\n以下是重点：\n\n*   `class` 声明通知编译器你在声明一个新类，它继承自哪个类，采用哪些协议，拥有哪些属性，以及定义了哪些方法（实例函数）。\n\
  \    *   父类是可选的。如果你的类不继承自现有类，可以省略父类名称。\n    *   协议是可选的。如果你的类不采用任何协议，可以省略协议名称列表。\n\
  *   类的主体由它的属性和函数组成。在 `class` 语句内部声明的任何内容都属于这个类。\n*   你可以在属性或函数声明之前，选择性地插入访问控制指令（`public`、`private`\
  \ 或 `internal`）。\n\n**提示** 按照惯例，类型名称以大写字母开头（`MyClass`、`ViewController`、`Weekday`\
  \ 等）。变量名称以小写字母开头（`dataSource`、`frame`、`userInteractionEnabled` 等）。\n\n\n\n"
- "# 访问控制\n\n到目前为止，您应该已经理解本章的大部分内容。唯一尚未提及的关键字是访问控制指令。变量或函数的可见性决定了哪些代码可以访问它们。表 20-1\
  \ 列出了这些选项。\n\n**表 20-1.** 访问控制指令\n\n| 指令 | 含义 |\n| --- | --- |\n| `public` | 任何代码都可以使用此属性或函数。\
  \ |\n| `internal` | 只有定义该类的应用或框架内的代码才能访问此属性或函数。 |\n| `private` | 只有此类中的函数才能访问此属性或函数。\
  \ |\n\n当我说“访问”时，是指在任何语句中引用该属性或调用该函数。`internal`关键字仅在开发框架时才有意义。它是`private`和`public`之间的中间地带。对于同一应用或框架内的代码，它的行为类似于`public`访问。对于应用或框架外部的代码，它的行为类似于`private`访问。\n\
  \n**注意：** 如果您省略访问控制，则默认为`internal`。几乎在所有情况下，这意味着您的属性和函数将是`public`。如果您开始在框架中使用您的类，则需要使用`public`关键字显式声明您的公共接口。\n\
  \n## 游乐场\n\n但不要只相信我的话。创建一个新的游乐场，并尝试本章中的任何代码片段，或您想在 Swift 中尝试的任何其他内容。游乐场是一个交互式 Swift\
  \ 文档，可以同时编译并运行您放入其中的任何代码。\n\n从 Xcode 的“文件”菜单中选择“新建”![image](img/arrow.jpg)“游乐场”命令，或者创建一个新文件并选择“游乐场”模板。为游乐场指定一个文件名并保存在某个位置。您现在拥有一个空白画布来尝试\
  \ Swift 功能，如图 20-1 所示。\n\n![9781484202098_Fig20-01.jpg](img/9781484202098_Fig20-01.jpg)\n\
  \n**图 20-1.** Swift 游乐场\n\n您在左侧输入代码，结果会出现在右侧。右侧窗格将向您显示设置了哪些值、表达式的结果是什么、循环运行了多少次、函数返回的最后一个值等等。更改您的代码后，所有内容都会重新计算。\n\
  \n本章大部分章节都有游乐场文件。它们包含了此处描述的代码片段，以及额外的示例和注释。本章的游乐场文件可以在`Learn iOS Development Projects`\
  \ ![image](img/arrow.jpg)`Ch 20`文件夹中找到，并且都有相当明显的名称。本节的游乐场文件是`Classes.playground`。\n\
  \n## 属性\n\n*属性*是归属于该类实例（即对象）的值。有两种属性：存储属性和计算属性。*存储属性*在对象内分配变量空间以保留一个值。您按如下方式声明一个存储属性：\n\
  \n```\nclass ClassStoringProperties {\n    let constantProperty: String = \"never\
  \ changes\"\n    var variableProperty: Int = 1\n}\n```\n\n`let`定义了一个常量（不可变）属性。`var`定义了一个变量（可变）属性。您可以获取两者的值，但只能更改（改变）`var`的值。\n\
  \n一个属性有名称、类型和可选的默认值。您可以省略类型或值。如果您省略类型，则会根据您为其设置的值来推断类型，如下所示：\n\n```\nlet constantProperty\
  \ = \"never changes\"\nvar variableProperty = 1\n```\n\n这两个属性与之前的两个属性完全相同。它们的类型（`String`和`Int`）是从其默认值的类型推断出来的。如果您没有指定属性的类型，其类型将是您为其设置的值的类型。\n\
  \n在 Swift 中，*所有*变量在声明时必须被初始化。严格禁止声明没有设置初始值的变量或常量。这消除了由未初始化变量引起的整类常见编程错误。\n\n在类（或结构体）内部，您可以稍微放宽此规则。您可以声明一个没有默认值的存储属性，只要您在对象初始化时提供其初始值。在类中，编写以下内容是合法的：\n\
  \n```\nvar uninitializedProperty: Int\n```\n\n如果这样做，您必须提供一个初始化函数，在对象可以被使用之前将`uninitializedProperty`设置为一个值。我将在本节稍后部分介绍初始化程序的要求。\n\
  \n## 计算属性\n\n*计算属性*，有时被称为*合成属性*，是由代码块计算出的属性值。它们没有与之关联的变量存储，但通常在计算中使用其他存储属性。以下是计算属性的示例：\n\
  \n```\nclass ClassCalculatingProperties {\n    var height: Double = 0.0\n    var\
  \ width: Double = 0.0\n    var area: Double {\n        get {\n            return\
  \ height * width\n        }\n        set(newArea) {\n            width = sqrt(newArea)\n\
  \            height = width\n        }\n    }\n}\n```\n\n这个类有两个存储属性和一个计算属性。计算出的`area`属性可以像任何其他属性一样使用，如下所示，但其取值时的值由属性`get`块中的代码决定。这被称为属性的*getter*。getter\
  \ 是必需的。\n\n```\nlet calculatingObject = ClassCalculatingProperties()\ncalculatingObject.height\
  \ = 9.0\ncalculatingObject.width = 5.0\nlet area = calculatingObject.area /* area\
  \ = 45.0 */\n```\n\n如果您希望该属性是可变的，您也可以提供一个*setter*函数，如图所示。`set(newArea)`代码块的参数包含要设置的值。如果您省略\
  \ setter，则该属性是只读的。这也意味着您可以使用一种省略`get { ... }`部分的简写语法，如下所示：\n\n```\nvar area: Double\
  \ { return height * width }\n```\n\n即使只读计算属性返回的值永远不会改变，您仍然必须使用`var`关键字声明该属性。逻辑是值可能会改变——Swift\
  \ 无法知道是否改变——因此必须声明为变量。\n\n## 属性观察者\n\n您还可以将代码附加到存储属性。当存储属性被设置时，您有两个机会执行代码：`willSet`和`didSet`代码块。您可以在存储属性之后立即声明它们，就像计算属性一样，如下所示：\n\
  \n```\nclass ObservantView: UIView {\n    var text: String = \"\" {\n        didSet(oldText)\
  \ {\n            if text != oldText {\n                setNeedsDisplay()\n     \
  \       }\n        }\n    }\n}\n```\n\n在这个例子中，每当`text`属性被赋值时，`didSet(oldText)`块中的代码就会执行。`didSet`代码块在属性被更新*之后*执行；参数包含先前的值。这里，它用于确定字符串是否实际发生了变化，并且仅在发生变化时重绘视图。\n\
  \n类似地，`willSet`代码块在存储属性被更新*之前*执行。它的单个参数是要设置的新值。如果您想覆盖正在设置的值，可以在`didSet`函数中将属性的值更改为不同于已设置的值。\n\
  \n**提示：** 当编写`set`、`willSet`和`didSet`代码块时，您可以为单个参数选择一个名称，也可以省略它。如果您省略它，Swift 会分别提供一个名为`newValue`、`newValue`或`oldValue`的参数供您在代码中使用。\n\
  \n您不能附加在读取存储属性时执行的代码。并且您不能将属性观察者附加到计算属性。后者会是多余的，因为 setter 代码可以执行属性观察者可以做的任何事情。\n\
  \n\n\n"
- "# 方法\n\n类中的函数被称为*方法*、*实例方法*、*实例函数*，有时也称为*成员函数*。它是在对象上下文中运行的函数。你可以在类体中像声明函数一样声明方法，如下所示：\n\
  \n```\nfunc pokeUser(name: String, message: String) -> Bool {\n    return true\n\
  }\n```\n\n这个方法接收两个参数并返回一个布尔值。你可以使用如下语句来调用它：\n\n```\nlet result = object.pokeUser(\"\
  james\", message: \"Is that an ice cream truck I hear?\")\n```\n\n如果函数不返回值，可以省略参数列表后面的返回类型（`->\
  \ ReturnType`）。\n\n## 类方法\n\n类方法类似于全局函数，但它属于该类。类方法不在对象上下文中执行。通过使用`class`关键字来声明类方法，如下所示：\n\
  \n```\nclass GoldenAge {\n    class func timeRemaining() -> Double { ...\n```\n\n\
  你可以使用类名（而非对象引用）来调用类方法，如下所示：\n\n```\nlet remaining = GoldenAge.timeRemaining()\n\
  ```\n\n由于类方法不在对象上下文中执行，因此你不能直接引用该类的任何属性或实例函数。常量也不例外。\n\n类方法通常用于提供对全局资源的访问，作为单例的\
  \ getter，或作为创建已配置对象的工厂方法。\n\n## 参数名\n\n函数中的每个参数都有两个名称：*外部参数名*和*局部参数名*。以下函数有三个参数，共有六个名称：\n\
  \n```\nfunc poke(user name: String, say message: String, important priority: Bool)\
  \ -> Bool {\n    if priority {\n        sendMessage(message, toPerson: name)\n \
  \       return true\n    }\n    return false\n}\n```\n\n在此示例中，每个参数都有外部参数名和局部参数名，且各不相同。在函数代码中，你使用局部参数名（`name`、`message`和`priority`）来引用它们的值。\n\
  \n调用函数时，你使用外部参数名（`user`、`say`、`important`）。以下语句将调用该函数：\n\n```\npoke(user: \"james\"\
  , say: \"Wouldn't some ice cream be great?\", important: true)\n```\n\n## 可选参数名\n\
  \n局部参数名和外部参数名都是可选的。如果没有外部参数名，则调用的参数列表只包含值。以下函数和函数调用展示了这一点：\n\n```\nfunc pokeUser(name:\
  \ String, message: String) { ... }\n\npokeUser(\"james\", \"I swore I heard the\
  \ ice cream truck!\")\n```\n\n如果省略外部参数名，Swift 可能会将局部参数名用作外部参数名。例如，以下两个方法声明是相同的：\n\
  \n```\nclass ExternalNamesInAClass {\n    func pokeUser(name: String, message: String)\
  \ { ... }\n    func pokeUser(name: String, message message: String) { ... }\n}\n\
  ```\n\n在两个函数中，第一个参数没有外部名称，而最后一个参数有。在第一个函数中，Swift 将最后一个参数的局部名称用作其外部名称。这两个函数都必须按如下方式调用：\n\
  \n```\npokeUser(\"james\", message: \"I'm going to get ice cream.\")\n```\n\n那么，为什么会这样呢？Swift\
  \ 对外部参数名的期望根据函数的上下文而有所不同，具体如下：\n\n*   在类、结构体或枚举外部声明的函数（有时称为*全局函数*）不期望有任何外部参数名。如果声明了外部名称，则在调用函数时必须使用它。如果省略，则该参数将是一个裸参数。\n\
  *   方法（在类中声明的函数）不期望第一个参数有外部名称，但期望其余所有参数都有。如果省略外部名称，则从第二个参数开始，局部名称将用作外部名称。\n*   如果你的参数提供了默认值（请参阅“默认参数值”一节），Swift\
  \ 期望它有一个外部名称。\n*   类或结构体的初始化函数（`init()`）期望所有参数都有外部名称。如果省略任何一个，则局部名称将被用作外部名称。\n\n\
  第一条规则使 Swift 函数与 C、Java 和类似语言保持一致。如果你不声明外部参数名，你的函数调用看起来会像那些传统语言。你可以选择使用 Swift 更具表现力的命名参数，但这并非必须。\n\
  \n第二条规则旨在便于在类内部采用 Objective-C 的方法命名约定。Objective-C 不区分函数名和参数名。Objective-C 的方法名实际上只是一系列分隔参数的标记。因此，Objective-C\
  \ 方法的第一个标记通常也命名第一个参数，例如 `setBool(_:,forKey:)` 方法（或者用 Objective-C 写成的 `-setBool:(bool)b\
  \ forKey:(NSString)key`）。第一个参数是布尔值，已经在函数名中标识出来了。你不会想要写成 `setBool(bool: true, forKey:\
  \ \"key\")`。\n\n最后一条规则是为了便于创建多个初始化函数而不至于混淆。所有函数都必须有唯一的签名。由于所有初始化函数的函数名都是 `init`，Swift\
  \ 必须使用唯一的外部参数名来区分它们。\n\n## 参数名快捷方式\n\n如果你想指定一个外部参数（在 Swift 不强制的环境下），并且你的外部参数名和局部参数名相同，则可以通过使用`#`（井号或哈希符号）作为外部名称来为两者使用同一个名称。以下两个函数声明是相同的：\n\
  \n```\nfunc function(parameter parameter: Int)\nfunc function(# parameter: Int)\n\
  ```\n\n相反，你可以强制 Swift *不*使用外部参数名——在通常应该使用的情况下——方法是用`_`（下划线）字符替换外部名称。你可以通过如下方式编写\
  \ `poke(_:,message:)` 函数来抑制外部参数名：\n\n```\nfunc poke(name: String, _ message: String)\n\
  ```\n\n现在你可以简单地调用此函数为 `object.poke(\"james\",\"What flavor?\")`。\n\n你还可以忽略局部参数名。当你对该参数不感兴趣时可以这样做。例如，`UIControl`\
  \ 类通过调用一个方法来发送动作，该方法的唯一参数是引起动作的控制对象。一个典型的动作方法如下所示：\n\n```\n@IBAction func sendPoke(sender:\
  \ AnyObject)\n```\n\n很多时候，动作方法并不需要使用`sender`参数。你可以通过用`_`（下划线）字符替换局部参数名来表示你不感兴趣，如下所示：\n\
  \n```\n@IBAction func sendPoke(_: AnyObject)\n```\n\n参数仍然存在，调用者仍然需要提供它，但函数的代码会忽略它。\n\
  \n## 默认参数值\n\n你可以为一个或多个参数提供默认值。如果这样做，你可以选择在函数调用中省略该参数，函数将接收默认值。你可以在函数声明中分配默认值，如下所示：\n\
  \n```\nfunc pokeUser(name: String, message: String = \"Poke!\", important: Bool\
  \ = false )\n```\n\n\n\n第二和第三个参数拥有默认值。在函数调用时，可以省略其中一个或全部两个。如果你在调用时省略了某个参数，该参数将被设置为默认值。以下四个语句都调用了这个函数：\n\
  \n```\ndefaulter.pokeUser(\"james\")\ndefaulter.pokeUser(\"james\", message: \"\
  Where's my ice cream?\")\ndefaulter.pokeUser(\"james\", important: true)\ndefaulter.pokeUser(\"\
  james\", message: \"The ice cream is melting!\", important: true)\n```\n\n为清晰起见，带有默认值的参数应具有外部名称。Swift\
  \ 会自行处理此问题：如果你省略了外部名称，它会将局部名称用作外部名称。为避免歧义，后续的任何参数也应具有外部名称。\n\n## 继承\n\n一个类可以继承自另一个类。发生继承时，它会获取其超类所有的属性和方法。然后，该类会通过添加额外的属性和方法来扩充这个基础。\n\
  \n一个类可以重写其超类的方法。当你这样做时，必须在该方法前加上 `override` 关键字，如下所示。这可以防止你因恰好选择了一个已被实现的函数名而意外重写方法。\n\
  \n```\nclass BaseClass {\n    var lastUserPoked: String = \"james\"\n    func pokeUser(name:\
  \ String) {\n        sendMessage(\"Poke!\", toUser: name)\n        lastUserPoked\
  \ = name\n    }\n}\n\nclass SubClass: BaseClass {\n    override func pokeUser(name:\
  \ String) {\n        println(\"someone poked \\(name)\")\n    }\n}\n```\n\n方法有一个特殊的\
  \ `super` 变量，用于引用其超类的方法和属性。使用 `super` 变量可以调用超类的方法，而不是你的类重写后的版本，如下所示：\n\n```\nclass\
  \ SubClass: BaseClass {\n    override func pokeUser(name: String) {\n        super.pokeUser(name)\n\
  \        println(\"someone poked \\(name)\")\n    }\n}\n```\n\n## 重写属性\n\n你也可以用计算属性重写任何属性。你重写的属性可以是存储属性，也可以是另一个计算属性。同样，你使用\
  \ `override` 关键字来表明意图。在以下示例中，子类正在创建一个计算属性 `lastUserPoked`，用于重写基类中定义的存储属性（`lastUserPoked`）。\n\
  \n```\nclass SubClass: BaseClass {\n    override var lastUserPoked: String {\n \
  \       get {\n            return super.lastUserPoked\n        }\n        set {\n\
  \            if newValue != lastUserPoked {\n                println(\"caller is\
  \ poking a different user\")\n            }\n            super.lastUserPoked = newValue\n\
  \        }\n    }\n}\n```\n\n请注意计算属性是如何使用 `super.lastUserPoked` 语法来访问基类中定义的存储属性的。\n\
  \n或者，你也可以重写属性观察器，如下所示：\n\n```\noverride var lastUserPoked: String {\n    didSet\
  \ {\n        ...\n    }\n}\n```\n\n被继承的属性可以是存储属性或计算属性，但它必须是可变的；属性观察器仅在值被设置时执行。\n\
  \n## 阻止继承\n\n如果你想切断类、方法或属性的任何继承者，请使用 `final` 关键字。以下类定义了一个属性和一个方法，它们都是 final 的：\n\
  \n```\nclass ClassWithLimitedInheritance {\n    final var trustFundName: String\
  \ = \"Scrooge McDuck\"\n    final func giveToCharity(amount: Double) {\n       \
  \ if amount > 2.00 {\n            println(\"Too much!\")\n        }\n    }\n}\n\
  ```\n\n你可以创建 `ClassWithLimitedInheritance` 的子类并扩展它，但不能重写它的 `trustFundName` 属性或 `giveToCharity(_:)`\
  \ 方法。如果你想禁止所有的子类化，将 `final` 关键字添加到类本身，如下所示：\n\n```\nfinal class EndOfTheLine: ClassWithLimitedInheritance\
  \ { ...\n```\n\n## 对象创建\n\n创建 Swift 对象的方式是将类名当作函数调用来编写。以下语句创建了一个新的 `ClassCalculatingProperties`\
  \ 对象，并将其赋值给 `calculatingObject`：\n\n```\nlet calculatingObject = ClassCalculatingProperties()\n\
  ```\n\n\n\n\n此语法用于分配新对象并调用类的某个初始化函数。在示例中，调用的是`init()`——即无参数的初始化函数。你可以编写自己的类初始化函数。编写方式与成员函数类似，但需注意：省略`func`关键字，函数名固定为`init`，且无返回值，如下所示：\n\
  \n```\nclass SimpleInitializerClass {\n    var name: String\n    init() {\n    \
  \    name = \"james\"\n    }\n}\n```\n\n每个类必须至少有一个初始化函数，否则将无法创建对象。在下面的类中，所有存储属性都有默认值，且该类未声明任何自己的初始化函数。在这种情况下，Swift\
  \ 会自动为你创建一个`init()`初始化函数。\n\n```\nclass AutomaticInitializerClass {\n    var name\
  \ = \"james\"\n    var superUser = true\n    // init() 由 Swift 提供\n}\n```\n\n你可以根据需要定义任意数量的初始化函数。它们也可以包含默认参数值，如下所示：\n\
  \n```\nclass IceCream {\n    var flavor: String\n    var scoops: Int = 1\n    init()\
  \ {\n        flavor = \"Vanilla\"\n    }\n    init(flavor: String, scoops: Int =\
  \ 2) {\n        self.flavor = flavor\n        self.scoops = scoops\n    }\n}\n```\n\
  \n**提示** 如果局部变量名与属性名相同，请使用`self`变量来区分它们。`flavor`指代局部参数。`self.flavor`指代对象的`flavor`属性。\n\
  \n你的初始化函数通过其外部参数名称来区分（因为它们函数名都相同）。Swift 会根据参数名称选择相应的初始化函数，如下所示：\n\n```\nlet plain\
  \ = IceCream()\nlet yummy = IceCream(flavor: \"Chocolate\")\nlet monster = IceCream(flavor:\
  \ \"Rocky Road\", scoops: 3)\n```\n\n**注意** *所有*Swift 值都使用相同的语法创建。表达式`CGFloat(1.0)`会创建一个新的`CGFloat`值，等同于`Double`常量`1.0`。表达式`Weekday(rawValue:\
  \ 1)`会创建一个等于`.Monday`的枚举值，以此类推。\n\n## 子类初始化函数\n\n如果你的类是子类，那么它的初始化函数必须显式调用父类的某个初始化函数。在下面的子类中，初始化函数先设置自身的属性，然后调用父类的初始化函数，以便父类初始化其属性：\n\
  \n```\nclass IceCreamSundae: IceCream {\n    var topping: String\n    var nuts:\
  \ Bool = true\n    init(flavor: String, topping: String = \"Caramel syrup\") {\n\
  \        self.topping = topping\n        super.init(flavor: flavor, scoops: 3)\n\
  \        }\n    }\n}\n```\n\n## 安全初始化\n\nSwift 一贯强调，在任何变量都被初始化之前，不能使用任何值、类或结构体。Swift\
  \ 也允许你将存储属性的初始化推迟到初始化函数中执行。这可能会导致一个“先有鸡还是先有蛋”的问题。\n\n让我通过向`IceCream`类添加一个`addCherry()`函数，然后在`IceCreamSundae`类中重写它来演示这个问题，如下所示：\n\
  \n```\nclass IceCream {\n    ...\n    init(flavor: String, scoops: Int = 2) {\n\
  \        self.flavor = flavor\n        self.scoops = scoops\n        addCherry()\n\
  \    }\n    func addCherry() {\n    }\n}\n\nclass IceCreamSundae: IceCream {\n \
  \   ...\n    init(flavor: String, topping: String = \"Caramel syrup\") {\n     \
  \   super.init(flavor: flavor, scoops: 3)  // <-- 无效的初始化函数\n    }\n    override\
  \ func addCherry() {\n        if topping == \"Whipped Cream\" {\n            ...\n\
  \        }\n    }\n}\n```\n\n考虑一下`IceCreamSundae`对象是如何被创建的。当`IceCreamSundae`的初始化函数开始执行时，`topping`属性尚未初始化，因为它没有默认值。此时还不能调用父类初始化函数（`super.init(flavor:,scoops:)`），因为它可能会调用你重写后的`addCherry()`函数，而该函数可能会访问尚未初始化的`toppings`属性。\n\
  \n为了解决这个难题，Swift 要求所有初始化函数按以下顺序分三个阶段执行其工作：\n\n1.  初始化所有存储常量和变量，无论是显式初始化还是依赖属性的默认值。\n\
  2.  调用父类初始化函数来初始化父类。\n3.  执行任何需要调用方法或使用计算属性的额外设置。\n\n`IceCreamSundae`初始化函数首先要做的是确保其所有属性都已初始化。编写`IceCreamSundae`初始化函数的正确方式如下：\n\
  \n```\nclass IceCreamSundae: IceCream {\n    ...\n    init(flavor: String, topping:\
  \ String = \"Caramel syrup\") {\n        self.topping = topping\n        super.init(flavor:\
  \ flavor, scoops: 3)\n}\n```\n\n单条`self.topping = topping`语句就满足了第一阶段的要求。`topping`属性没有默认值，必须显式设置。`nuts`属性有默认值；如果你没有将其设置为其他值，Swift\
  \ 会为你将其设置为`true`。此时，所有子类属性都已初始化完成。\n\n**注意** 在对象初始化期间，属性观察器永远不会被执行。\n\n这也是 Swift\
  \ 中为数不多的可以设置不可变常量的地方。即使一个属性被声明为常量（`let preferDarkChocolate = true`），你也可以在对象初始化的第一阶段对其进行设置。\n\
  \n第二阶段必须调用父类初始化函数。这将初始化父类的所有属性、父类的父类的属性，依此类推。\n\n当父类初始化函数返回时，对象已完全初始化。此时，可以安全地调用任何成员函数或使用任何属性来为对象的使用做准备。\n\
  \n你的初始化函数可能会缺少其中的某些阶段。\n\n*   **如果类没有存储属性或所有存储属性都有默认值**，则不需要第一阶段。\n*   **如果类没有父类**，则无需调用父类初始化函数，也没有第二阶段。\n\
  *   **如果类除了 Swift 的要求之外没有任何初始化工作**，则不会有第三阶段。\n\n## 便捷初始化函数\n\n到目前为止我介绍的初始化函数被称为指定初始化函数。*指定初始化函数*\
  \ 是实现了上一节所述三个阶段的初始化函数。\n\n你也可以创建便捷初始化函数。*便捷初始化函数* 通过提供简化的接口来简化对象的创建，但将初始化对象的重要工作委托给*同一类中*的另一个初始化函数。使用`convenience`关键字声明便捷初始化函数。以下代码为`IceCreamSundae`类添加了一个便捷初始化函数：\n\
  \n```\nconvenience init(special dayOfWeek: Weekday) {\n    switch dayOfWeek {\n\
  \        case .Sunday:\n            self.init(flavor: \"Strawberry\", topping: \"\
  Whipped Cream\")\n        case .Friday:\n            self.init(flavor: \"Chocolate\"\
  , topping: \"Chocolate syrup\")\n        default:\n            self.init(flavor:\
  \ \"Vanilla\")\n    }\n}\n```\n\n现在，你可以使用以下语句创建*今日特色*圣代冰淇淋：\n\n```\nlet sundaySundae\
  \ = IceCreamSundae(special: .Sunday)\n```\n\n注意使用了`self.init(...)`来调用同一类中的另一个初始化函数。被调用的初始化函数必须属于同一个类，并且必须是一个指定初始化函数，或者是另一个最终能调用到指定初始化函数的便捷初始化函数。\n\
  \n## 初始化函数的继承\n\n初始化函数的继承稍微有点复杂。完整说明请参考 iBooks 中的 *The Swift Programming Guide*，但以下是基本规则：\n\
  \n\n\n- 如果子类未定义自己的任何初始化器，且所有存储属性都有默认值，则子类继承父类的所有初始化器。（技术上，`Swift`会自动生成所有指定初始化器。）\n\
  - 如果子类重写了一个初始化器，则必须加上`override`关键字前缀，就像方法或属性一样。\n- 如果子类声明了任何未初始化的存储属性变量或常量，则必须实现指定初始化器来设置这些值。\n\
  - 如果子类实现了自己的任何初始化器，它将不会自动继承任何指定初始化器。如果希望在子类中使用相同的指定初始化器，则必须重写并重新实现它们全部。\n- 只有调用子类也提供的指定初始化器（通过继承或重写）的便捷初始化器才会被继承。\n\
  \n例如，以下`BananaSplit`类继承自`IceCreamSundae`。它没有声明没有默认值的存储属性。如果仅此而已，它本可以继承`IceCreamSundae`的所有初始化器。但它选择重写了指定初始化器`init(flavor:,topping:)`，如下所示：\n\
  \n```\nclass BananaSplit: IceCreamSundae {\n    override init(flavor: String = \"\
  Vanilla, Chocolate, Strawberry\",\n                  topping: String = \"Caramel\
  \ syrup\") {\n        super.init(flavor: flavor, topping: topping)\n        scoops\
  \ = 3  // 香蕉船总是有三个球\n    }\n}\n```\n\n以下代码创建了一个`BananaSplit`对象：\n\n```\nlet split\
  \ = BananaSplit(flavor: \"Vanilla, Pineapple, Cherry\")\n```\n\n因为它实现了**至少一个**初始化器，所以不会继承任何其他指定初始化器。但它会自动继承便捷初始化器`init(special:)`，因为该便捷初始化器依赖于指定初始化器`init(flavor:,topping:)`，而该指定初始化器已在子类中实现。以下代码演示了使用继承的便捷初始化器创建香蕉船（`banana\
  \ split`）：\n\n```\nlet sundaySplit = BananaSplit(special: .Sunday)\n```\n\n必要初始化器\n\
  \n为了让初始化器更复杂（也就是说，更复杂），你可以使用`required`关键字声明初始化器是必需的，如下所示：\n\n```\nrequired init(flavor:\
  \ String, scoops: Int) { ...\n```\n\n必要初始化器**必须**由子类重写并重新实现。子类可以选择仅重写初始化器，或再次将其声明为必需的。如果只是重写初始化器，则子类的子类不需要再次实现该初始化器。如果重新要求初始化器（再次使用`required`关键字），则子类的子类也必须实现它。\n\
  \n最常见的必要初始化器是你在第 19 章中使用的`NSCoding`协议中的反序列化初始化器。`init(coder: NSCoder)`初始化器应在每个子类中重新实现，以便每个子类都能正确地从归档数据流中重构对象。子类必须重新实现`init(coder:\
  \ NSCoder)`，并且应将其标记为`required`，以便该类的任何子类也必须这样做。\n\n闭包\n\n*闭包*是一个封装了代码块及其执行所需变量的对象。将闭包视为一个自包含的功能包，可以像其他任何值一样传递。这个名字来源于闭包在创建时“闭合”其引用的变量的方式。以下代码片段演示了闭包的一般形式：\n\
  \n```\nvar externalValue = 2\nlet closure = { (parameter: Int) -> ReturnType in\n\
  \    return codeThatDoesSomething(parameter+externalValue)\n}\n```\n\n闭包写成大括号内一个独立自由的代码块。以下是关键点：\n\
  \n- 像函数一样，闭包可以有参数。调用者在执行闭包时提供这些值。\n- 闭包参数没有外部名称，也不能声明默认值。\n- 必须指定闭包的返回类型。对于不返回值的闭包，使用`->\
  \ Void`。\n- 闭包的参数和返回类型在`in`关键字之前声明。闭包的代码在`in`关键字之后。无参数闭包写法为`() -> ReturnType`。\n\
  - 闭包可以使用其参数、在代码块中声明的变量以及代码块外部的变量。后者在闭包创建时被“闭合”。\n- 闭包通常被称为*代码块*，这让人联想到`Objective-C`中的类似功能。许多其他语言将此类功能称为*lambda*。\n\
  \n通常，一旦变量超出作用域，它就会停止存在。例如，函数参数仅在函数生命周期内存在。函数结束时，其参数变量（以及它创建的任何局部变量）也会消失。在以下代码中，参数`number`在函数调用时创建，并在函数返回时消失：\n\
  \n```\nfunc inScope(number: Int) {\n    // 使用 number 执行某些操作的代码\n}\n```\n\n在以下版本的`inScope(_:)`中，函数返回一个闭包给调用者。该闭包在创建时捕获了`number`参数。\n\
  \n```\nfunc inScope(number: Int) -> ((Int) -> Int) {\n    return { (multiplier:\
  \ Int) -> Int in\n        return number * multiplier\n        }\n}\n```\n\n函数返回时，其`number`参数通常应该停止存在。但因为它被闭包“闭合”，所以现在它也存在于闭包的作用域中，并将随着闭包的生命周期而存在。\n\
  \n函数返回后，其对`number`参数的引用消失。该参数现在实际上是闭包中的一个私有变量——因为没有其他引用指向它。每次调用函数时，都会创建一个新的参数变量，并且新的闭包会捕获该变量，如下所示：\n\
  \n```\nlet times5 = inScope(5)\nlet times3 = inScope(3)\n```\n\n我们可以通过执行这两个闭包来演示这一点。通过将闭包变量视为函数来执行闭包，如下所示：\n\
  \n```\nvar result = times5(7)  // 返回 35 (5*7)\nresult = times3(7)      // 返回 21\
  \ (3*7)\n```\n\n这两个闭包各自将提供的参数与在早期调用`inScope()`时捕获的值相乘。\n\n在另一种场景中，考虑闭包捕获一个变量且该变量仍然存在的情况。闭包捕获的是变量的*引用*，而不是其值。（值和引用之间的区别将在本章稍后讨论。）闭包内外的所有代码都引用同一个变量。为了演示这一点，我们创建一个持久变量和一个捕获它的闭包。\n\
  \n```\nvar multiplier =  3\nlet sharedVariable = { (number: Int) -> Int in\n   \
  \ return number * multiplier\n}\n```\n\n当执行闭包时，它会将参数值与捕获的`multiplier`变量的值相乘，如下所示：\n\
  \n```\nresult = sharedVariable(4)        // 返回 12 (4 * multiplier)\n```\n\n如果随后修改`multiplier`变量，闭包将使用修改后的值，如下所示：\n\
  \n```\nmultiplier = 5\nresult = sharedVariable(4)        // 返回 20 (4 * multiplier)\n\
  ```\n\n捕获 self\n\n`Swift`充满了快捷键，允许你只编写表达意图所需的代码。然而，有少数地方`Swift`要求你明确写出显而易见的内容，这样才名副其实。闭包就是其中之一。考虑以下视图控制器，它动画显示标签的外观：\n\
  \n```\nclass LabelViewController: UIViewController {\n    @IBOutlet var label: UILabel!\n\
  ```\n\n\n\n```swift\noverride func viewDidAppear(animated: Bool) {\n    UIView.animateWithDuration(1.5,\
  \ animations: { label.alpha = 1.0 })\n}\n```\n\n请仔细查看这个闭包，告诉我它“捕获”了哪个变量。（提示：答案**不是**\
  \ `label`。）\n\n没错，正确答案是 `self`。当你在方法中引用某个属性或函数时，实际上是在隐式地引用上下文对象的实例变量或实例函数。在 `viewDidAppear(_:)`\
  \ 函数的上下文中，表达式 `storyboard` 的实际含义是 `self.storyboard`，而函数调用 `setEditing(true, animated:\
  \ false)` 实际上就是 `self.setEditing(true, animated: false)`。\n\n闭包中的这一区别非常重要。前面的闭包捕获的是\
  \ `self` 变量（指向视图控制器对象的引用），而不是指向特定 `UILabel` 对象的引用。这一点至关重要，因为正如你所见，闭包会保持对其所捕获变量的引用。\n\
  \n假设我创建了这个闭包，但紧接着将 `label` 属性替换为一个不同的 `UILabel` 对象。当闭包执行时，它会使用新的 `UILabel` 对象，因为它捕获的是\
  \ `self`，而不是原始的 `UILabel` 对象。这也正是 Swift 不允许你编写前面那段代码的原因。你必须将闭包写成如下形式：\n\n```swift\n\
  override func viewDidAppear(animated: Bool) {\n    UIView.animateWithDuration(1.5,\
  \ animations: { self.label.alpha = 1.0 })\n}\n```\n\nSwift 要求你在编写闭包时必须写出 `self.label`、`self.storyboard`\
  \ 和 `self.setEditing(true, animated: false)`。这明确地表明你捕获的是 `self`，而不是 `label` 或 `storyboard`。\n\
  \n## 使用闭包\n\n使用闭包再简单不过了。当你创建一个闭包时，它就变成了一个值——你可以将其赋值给一个变量，或作为参数传递。你对闭包的使用很可能从作为参数开始。iOS\
  \ 提供了许多机会，让你将代码块传递给那些最终会执行该闭包以完成任务的函数。看看本书中的几乎任何一个项目，你都会看到闭包的实际应用。在第 16 章中，当显示区域调整大小时，代码会传递两个闭包给过渡协调器，如下所示：\n\
  \n```swift\ncoordinator.animateAlongsideTransition( { (context) in self.positionDialViews()\
  \ },\n                            completion: { (context) in self.attachDialBehaviors()\
  \ })\n```\n\n`animateAlongsideTransition(_:,completion:)` 方法接受两个参数，这两个参数都是闭包。第一个闭包用于在过渡期间给你的视图施加动画效果，第二个闭包则在过渡完成后执行。\n\
  \n请注意，每个闭包中的参数都没有指定类型。这是因为 Swift 提供了许多快捷方式，让你能够编写简洁的闭包。\n\n## 闭包快捷方式\n\nSwift 允许你使用多种快捷方式来简化闭包。\n\
  \n*   如果闭包的参数类型和返回类型已由参数或你为其赋值的变量隐式指定，则可以省略这些类型。\n*   你可以省略参数名称，而使用其简写名称。\n*   如果闭包的代码可以写成单个返回语句，那么你可以只写返回表达式。\n\
  *   如果闭包是函数调用的最后一个参数，你可以使用尾随闭包语法。\n\n第一个快捷方式简化了闭包的参数。在类似 `animateAlongsideTransition(_:,completion:)`\
  \ 方法的情况下，方法的声明已经确定了闭包的描述。如果你查看该方法的声明，会看到类似如下的内容：\n\n```swift\nfunc animateAlongsideTransition(\n\
  \    _ animation: ((UIViewControllerTransitionCoordinatorContext!) -> Void)!,\n\
  \    # completion: ((UIViewControllerTransitionCoordinatorContext!) -> Void)!) ->\
  \ Bool\n```\n\n这个函数描述了两个参数。两者都期望一个闭包，该闭包有一个参数（类型为 `UIViewControllerTransitionCoordinatorContext`）且没有返回值（`->\
  \ Void`）。你作为参数传递给该调用的闭包*必须*符合这个描述。因为 Swift 已经知道了参数的数量、类型以及闭包将返回的类型，所以 Swift 会为你补充这些细节。你所需要做的只是给参数命名，如下所示：\n\
  \n```swift\n{ (context) in self.positionDialViews() }\n```\n\n`context` 参数的类型以及闭包的返回类型都是隐含的。在这种情况下，你还可以去掉括号来节省几个按键操作，如下所示：\n\
  \n```swift\n{ context in self.positionDialViews() }\n```\n\n如果某个参数无关紧要，你可以用 `_`（下划线）替换它的名称，如下所示：\n\
  \n```swift\n{ _ in self.positionDialView() }\n```\n\n### 简写参数名称\n\n如果你不想给参数命名，可以使用它们的简写名称：`$0`、`$1`、`$2`，以此类推。如果你这样做，就可以省略闭包开头的整个参数子句。以\
  \ `SKAction` 的 `customActionWithDuration(_:,actionBlock:)` 方法为例。该函数的定义如下：\n\n```swift\n\
  func customActionWithDuration(_ seconds: NSTimeInterval,\n                     \
  \ actionBlock block: (SKNode!, CGFloat) -> Void)\n         -> SKAction\n```\n\n\
  第二个参数是一个闭包，它接收两个参数（一个 `SKNode` 和一个 `CGFloat`）。当你调用这个函数时，可以像这样编写闭包：\n\n```swift\n\
  SKAction.customActionWithDuration( 3.0,\n                      actionBlock: {\n\
  \                          (node, elapsedTime) in\n                          if\
  \ elapsedTime > 0.5 {\n                              node.alpha = elapsedTime/3.0\n\
  \                          }\n                      })\n```\n\n`actionBlock` 参数的闭包测试了\
  \ `elapsedTime` 参数。如果过去了超过半秒，它会根据经过的时间按比例设置节点的 `alpha`。你可以这样编写同样的代码：\n\n```swift\n\
  SKAction.customActionWithDuration( 3.0,\n                      actionBlock: { if\
  \ $1 > 0.5 { $0.alpha = $1/3.0 } } )\n```\n\n在第二个例子中，整个参数声明都被省略了。Swift 将第一个参数分配简写名称\
  \ `$0`，第二个参数分配 `$1`，以此类推。使用这些简写名称的方法与你使用命名参数完全相同。\n\n**提示：** 仅在参数的含义和类型显而易见的上下文中使用简写名称。第二个例子远不如第一个例子清晰明了。\n\
  \n### 单表达式闭包\n\n对于返回值的闭包，还有一种更简短的形式。如果整个闭包的代码可以写成一个返回语句，你可以省略 `return` 语句并将闭包写成一个表达式。这在诸如\
  \ Swift 的 `sort(_:)` 和 `map(_:)` 数组方法中特别有用。让我们用以下代码创建一个简单的待办事项数组：\n\n```swift\n\
  struct ToDoItem {\n    let priority: Int\n    let note: String\n}\nvar toDoList\
  \ = [ ToDoItem(priority: 3, note: \"回收冰淇淋杯\"),\n                 ToDoItem(priority:\
  \ 1, note: \"买冰淇淋\"),\n                 ToDoItem(priority: 2, note: \"邀请朋友来\") ]\n\
  ```\n\n你可以使用数组的 `sort(_:)` 函数对该数组进行排序。该函数接受一个用于比较数组中任意两个元素的闭包。闭包接收两个参数（要比较的两个数组元素）并返回一个布尔值，指示在新的顺序中第一个（左侧）参数是否应该排在第二个（右侧）参数之前。（你可以在\
  \ `Learn iOS Development Projects` ![image](img/arrow.jpg) `Ch 20` ![image](img/arrow.jpg)\
  \ `Closures.playground` 文件中找到相关示例。）\n\n让我们按优先级顺序对数组进行排序。使用命名参数编写这个闭包看起来像下面这样：\n\n\
  ```swift\ntoDoList.sort( { (left, right) in return left.priority < right.priority\
  \ } )\n```\n\n\n\n正如你之前所学，你也可以使用简写参数名来编写闭包，如下所示：\n\n```\ntoDoList.sort( { return\
  \ $0.priority < $1.priority } )\n```\n\n但由于整个闭包是单一返回语句，Swift 允许你省略 `return`，只将闭包写为表达式。以下两条语句与之前的两条等价：\n\
  \n```\ntoDoList.sort( { (left, right) in left.priority < right.priority } )\ntoDoList.sort(\
  \ { $0.priority < $1.priority } )\n```\n\n## 尾随闭包\n\n闭包可以变得更短——呃，也许不是闭包本身，而是将闭包作为参数传递的语法。如果函数调用的最后一个参数是闭包参数，你可以省略该参数，并在函数调用后直接编写闭包。这被称为*尾随闭包*。`SKNode`\
  \ 类有一个 `enumerateChildNodesWithName(_:,usingBlock:)` 方法。以下示例展示了如何将闭包作为常规参数来调用该方法：\n\
  \n```\nlet scene = SKScene()\nscene.enumerateChildNodesWithName(\"firefly\", usingBlock:\
  \ {\n        (node, _) in\n        node.hidden = false\n    })\n```\n\n要使用尾随闭包编写同样的代码，请省略最后一个参数，并在函数调用后紧跟闭包，如下所示：\n\
  \n```\nscene.enumerateChildNodesWithName(\"firefly\") { (node, _) in node.hidden\
  \ = false }\n```\n\n同样，这对于像 `sort(_:)` 这样的函数特别有用。使用之前的单一表达式示例，你最终可以将排序函数写成如下形式：\n\
  \n```\ntoDoList.sort() { $0.priority < $1.priority }\n```\n\n最后一个示例结合了类型推断、简写参数名、单一表达式以及尾随闭包这些简写特性。\n\
  \n## 闭包变量\n\n当你准备将闭包存储到变量中，或者编写一个将闭包作为参数的函数时，你需要编写一个闭包类型。*闭包类型*是闭包的签名（`in` 关键字之前的部分）放在括号内。编写一个存储闭包的变量如下所示：\n\
  \n```\nvar closure: ((Int, String) -> Int)\n```\n\n这个变量存储一个接收两个参数（一个 `Int` 和一个 `String`）并返回一个\
  \ `Int` 的闭包。闭包参数没有外部名称或默认值，因此只列出了参数类型。你之后可以将一个闭包赋值给这个变量，然后像下面这样执行它：\n\n```\nclosure\
  \ = { (number,name) in return 1 }\nclosure(7,\"deborah\")\n```\n\n类似地，一个带有闭包参数的函数编写如下：\n\
  \n```\nfunc closureAsParameter(key: String, master: ((String) -> Int)) {\n    unlockDoor(master(key))\n\
  }\n```\n\n由于闭包是最后一个参数，这个函数适合使用尾随闭包语法，如下所示：\n\n```\nclosureAsParameter(\"The Key\"\
  ) { (key) in return key.hash }\n```\n\n## 协议\n\n*协议*是一组属性或方法，类（或其他类型）可以采纳它们。一个协议实际上就是承诺实现一组特定的功能。一旦你的类履行了这个承诺，你的类就可以在任何一个希望使用该协议类型的场景中使用。一个采纳了协议的类被称为*符合*该协议。\n\
  \n声明协议的方式与声明类非常相似，使用 `protocol` 关键字。作为一个简单示例，让我们创建一个 `Flavor` 协议，如下所示。这些示例以及其他示例可以在\
  \ `Learn iOS Development Projects` ![image](img/arrow.jpg) `Ch 20` ![image](img/arrow.jpg)\
  \ `Protocols.playground` 文件中找到。\n\n```\nprotocol Flavor {\n    var flavor: String\
  \ { get }\n    func tastesLike(flavor otherFlavor: Flavor) -> Bool\n}\n```\n\n该协议要求一个名为\
  \ `flavor` 的 `String` 属性，以及一个名为 `tastesLike(flavor:)` 且返回 `Bool` 的函数。\n\n你的类通过在父类名称（如果有的话）之后列出协议来采纳它们，如下所示：\n\
  \n```\nclass IceCream {\n    var flavor: String = \"Vanilla\"\n    var scoops: Int\
  \ = 1\n}\n\nclass Sundae: IceCream, Flavor {\n    func tastesLike(flavor otherFlavor:\
  \ Flavor) -> Bool {\n        return flavor == otherFlavor.flavor\n    }\n}\n```\n\
  \n在这个示例中，类 `Sundae` 是 `IceCream` 的子类，并采纳了 `Flavor` 协议。采纳该协议要求它具备一个 `flavor` 属性和一个\
  \ `tastesLike(flavor:)` 函数。前者已从其父类继承而来，因此实现该函数就是采纳该协议所需的全部操作。\n\n**注意**  Objective-C\
  \ 可以定义具有可选属性和方法的协议。你的类可以选择不实现某个可选方法，但仍符合该协议。Swift 协议没有可选成员。\n\n采纳协议的类可以通过使用存储属性或计算属性（实现、重写或继承）来满足属性要求。协议不关心类如何实现接口，只关心是否实现了它。协议中的每个属性后面都跟着\
  \ `{ get }` 或 `{ get set }`。任何属性都能满足前者。如果协议声明属性为 `{ get set }`，则你必须实现一个可变属性。\n\n\
  一旦 `Sundae` 采纳了 `Flavor`，它就可以在任何一个类型为 `Sundae`、`IceCream` 或 `Flavor` 的变量中使用。这使得不相关的类只要都采纳了同一协议，就能被视为一种通用类型。在以下示例中，完全不相关的类\
  \ `Tofu` 也采纳了 `Flavor` 协议：\n\n```\nclass Tofu: Flavor {\n    var flavor: String\
  \ = \"Plain\"\n    var weight: Double = 1.0\n\nfunc tastesLike(flavor _: Flavor)\
  \ -> Bool {\n        // 豆腐和其他任何东西的味道都不像\n        return false\n    }\n}\n```\n\n\
  现在你可以声明类型为 `Flavor` 的变量和参数，并互换使用 `Tofu` 和 `Sundae` 对象，如下所示：\n\n```\nvar dessert:\
  \ Flavor = Sundae()\nvar chicken: Flavor = Tofu()\nif dessert.tastesLike(flavor:\
  \ chicken) { ...\n```\n\n协议通常用于委托。一个类会使用协议来定义委托的接口，然后声明一个 `delegate` 属性，该属性可以存储任何采纳该协议的对象。只需看看几乎任何一个具有\
  \ `delegate` 属性的 Cocoa Touch 类即可。\n\n### 扩展\n\n扩展可以向现有的类（或其他类型）添加属性或方法。你可以向几乎任何东西添加方法和计算属性，即使是你没有编写的类。回想一下第\
  \ 7 章，我曾告诉你向 `MyWhatsit` 类添加一个 `imageView` 属性是不良的 MVC 设计，因为 `MyWhatsit` 类是数据模型，而\
  \ `imageView` 实际上是一个视图方法。通过扩展，你可以在保持设计的同时，仍然向 `MyWhatsit` 添加一个 `imageView` 属性。从（简化版的）原始类开始，如下所示：\n\
  \n```\nclass MyWhatsit {\n    var name: String\n    var location: String\n    var\
  \ image: UIImage?\n    ...\n}\n```\n\n在一个单独的源文件中，你可以创建一个针对 `MyWhatsit` 的扩展来添加额外的方法，如下所示。`extension`\
  \ 关键字用于表明你是在*扩展*现有的类（或其他类型），而不是定义一个全新的类。\n\n```\nextension MyWhatsit {\n    var\
  \ viewImage: UIImage {\n        return image ?? UIImage(named: \"camera\")!\n  \
  \  }\n}\n```\n\n现在当你创建 `MyWhatsit` 对象时，它们都会拥有一个 `viewImage` 属性，就像你在原始类中定义了这个属性一样。\n\
  \n```\nvar thing = MyWhatsit(name: \"Robby the Robot\")\ndetailImageView.image =\
  \ thing.viewImage\n```\n\n这保持了 MVC 的分离，因为管理数据模型的代码与处理视图对象职责的代码是分开的，即使两者属于同一个对象。在另一个程序中，你可能会在没有这个扩展的情况下复用\
  \ `MyWhatsit` 类，在这种情况下，这些相同的对象将不会有 `viewImage` 属性。\n\n\n\n"
- "# Swift 扩展、结构体、元组和枚举\n\n### 扩展\n\n扩展（Extensions）也可以方便地为常见类添加新函数。如果你需要为`String`类型添加一个`inKlingon`属性，可以在扩展中实现。然后你可以编写`\"\
  Hello\".inKlingon`，Swift 将按如下方式执行翻译：\n\n```\nextension String {\n    var inKlingon:\
  \ String { return self == \"Hello\" ? \"nuqneH\" : \"nuqjatlh?\" }\n}\n...\nlet\
  \ greeting = \"Hello\"\nprintln(greeting.inKlingon)\n```\n\n扩展有一些限制：\n\n- 扩展不能向现有类型添加存储属性。你只能添加方法和计算属性。\n\
  - 不能在扩展中重写现有属性或方法。\n\n## 结构体\n\nSwift 中的结构体（structure 或 struct）与类非常相似。与大多数其他语言不同，Swift\
  \ 结构体与类的共同点比不同点更多。以下是一个 Swift 结构体的示例：\n\n```\nstruct SwiftStruct {\n    var storedProperty:\
  \ String = \"Remember me?\"\n    let someFixedNumber = 9\n    var computedProperty:\
  \ String {\n        get {\n            return storedProperty.lowercaseString\n \
  \       }\n        set {\n            storedProperty = newValue\n        }\n   \
  \ }\n\n    static func globalMethod() {\n    }\n    func instanceMethod() {\n  \
  \  }\n    init(what: String) {\n        storedProperty = what\n    }\n}\n```\n\n\
  在 Swift 中，结构体与类共享以下特征：\n\n- 可以定义存储属性（存储属性可以有观察者）\n- 可以定义计算属性\n- 可以定义方法（实例函数）\n-\
  \ 可以定义全局函数\n- 可以拥有自定义初始化器\n- 可以遵循协议\n- 可以通过扩展进行增强\n\n在类和结构体之间，这些特征在能力或语法上几乎没有区别。不过也存在一些重要和次要的差异：\n\
  \n- 结构体不能继承另一个结构体。\n- 结构体是值类型，而不是引用类型。\n- 结构体没有`deinit`函数。\n- 结构体中的全局函数使用`static`关键字声明，而不是`class`关键字。\n\
  \n第一点可能是最大的区别。每个结构体都是一个独立的类型。结构体不形成继承层次结构，不能参与子类型多态，也不能测试其类型（这毫无意义，因为它们只能是单一类型）。\n\
  \n结构体是值类型。我稍后会解释值类型和引用类型的区别。现在只需知道，结构体是存储属性的集合。当你将其赋值给变量或作为参数传递时，整个结构体会被复制。对副本所做的更改不会影响原始结构体。\n\
  \n与类一样，如果所有存储属性都有默认值，Swift 会自动创建默认初始化器。与类不同的是，结构体还会获得一个成员逐一初始化器——前提是它没有定义任何自定义初始化器。*成员逐一初始化器*是一个`init`方法，其参数是所有存储属性的名称。以下示例定义了一个包含两个存储属性的结构体。后续代码使用其自动生成的初始化器创建了该结构体的两个实例：\n\
  \n```\nstruct StructWithDefaults {\n    var number: Int = 1\n    var name: String\
  \ = \"amber\"\n}\n\nlet struct1 = StructWithDefaults()\nlet struct2 = StructWithDefaults(number:\
  \ 3, name: \"john\")\n```\n\n## 元组\n\n元组（Tuples）是临时的、匿名的结构体。元组是一种便捷的方式，可以将几个相关的值组合在一起，并将其视为单个值。编写元组时，用括号括起一个值列表，如下所示：\n\
  \n```\nvar iceCreamOrder = (\"Vanilla\", 1)\n```\n\n该语句创建了一个包含两个值的元组，一个`String`和一个`Int`，并将其赋值给单个变量`iceCreamOrder`。以下示例创建了相同类型的元组，但为其成员指定了名称：\n\
  \n```\nlet wantToGet = (flavor: \"Chocolate\", scoops: 4)\n```\n\n元组的类型就是其内容的类型。你可以将元组赋值给任何具有相同类型的变量，如下所示：\n\
  \n```\niceCreamOrder = wantToGet\n```\n\n**注意**：元组中可以包含多少个值或哪种类型的值，实际上没有限制。元组可以由浮点数、字符串、数组、对象、结构体、枚举、字典、闭包甚至其他元组组成。\n\
  \n元组对于从函数返回多个值非常方便。你在第 14 章的`score()`函数中使用过这一点；它返回了玩家的数字分数和一个指示游戏是否获胜的标志，以元组形式返回。在以下示例中，`nextOrder()`函数返回一个`(String,\
  \ Int)`元组。请在这些示例所在的`Learn iOS Development Projects` → `Ch 20` → `Tuples.playground`文件中进行尝试。\n\
  \n```\nfunc nextOrder() -> (flavor: String, scoops: Int) {\n    return (\"Vanilla\"\
  , 4)\n}\n...\nlet order = nextOrder()\n```\n\n你可以像访问结构体或类的属性一样访问元组中的各个值。如果元组成员有名称，你可以像属性一样访问它们，如下所示：\n\
  \n```\nif order.scoops > 3 {\n    println(\"\\(order.scoops) scoops of \\(order.flavor)\
  \ in a dish.\")\n} else {\n    println(\"\\(order.flavor) cone\")\n}\n```\n\n如果元组的某个成员是匿名的（即它们没有像`iceCreamOrder`中的成员名称），你仍然可以使用索引来访问该成员。*元组成员索引*是一个从\
  \ 0 开始的数字，分配给元组中的每个成员值。你可以像使用属性名称一样使用索引，如下所示：\n\n```\nif iceCreamOrder.0 == \"Chocolate\"\
  \ {\n    println(\"\\(iceCreamOrder.1) scoops of the good stuff.\")\n}\n```\n\n\
  还有第三种方式可以访问元组的各个值。当你赋值元组时，可以将元组*分解*为单独的变量，如下所示：\n\n```\nlet (what, howMany) = nextOrder()\n\
  if howMany > 3 {\n    println(\"\\(howMany) scoops of \\(what) in a dish.\")\n}\
  \ else {\n    println(\"\\(what) cone\")\n}\n```\n\n第一条语句声明了两个新变量`what`和`howMany`。每个变量都被赋值为元组中的一个值。这是一种为具有匿名成员的元组分配名称或更直接地访问每个值的便捷方式。如果你对某个特定值不感兴趣，可以用`_`（下划线）替换其变量名，就像忽略参数一样，例如`let\
  \ (what, _) = nextOrder()`。\n\n## 枚举\n\n*枚举*（enumeration 或 enum）为一组唯一的字面值分配符号名称。编写枚举时，列出要定义的符号，如下所示：\n\
  \n```\nenum Weekday {\n    case Sunday\n    case Monday\n    case Tuesday\n    case\
  \ Wednesday\n    case Thursday\n    case Friday\n    case Saturday\n}\n```\n\n这定义了一个新类型`Weekday`，可以像任何其他类型一样使用。该枚举定义了七个唯一值。以下语句定义了一个`Weekday`类型的新变量（`dueDay`），并将其赋值为`Thursday`：\n\
  \n```\nvar dueDay = Weekday.Thursday\n```\n\n当 Swift 已经知道变量或参数的类型时，你可以省略枚举类型名称，如下所示：\n\
  \n```\ndueDay = .Friday\n```\n\n这在将枚举值作为参数传递时特别方便。\n\n### 原始值\n\nSwift 对枚举值的内部表示是不透明的——用计算机术语来说就是“你不知道，也无法知道”。你只需要知道这些值是唯一的，并且可以赋值给该枚举类型的变量。\n\
  \n你可以选择定义枚举中的值与另一种类型中的值之间的关系。这个替代值称为枚举的*原始值*。\n\n在以下示例中，定义了一个包含七个值的枚举。每个值都可以与对应的`Int`值进行相互转换。\n\
  \n\n```swift\nenum WeekdayNumber: Int {\n    case Sunday = 0\n    case Monday\n\
  \    case Tuesday\n    case Wednesday\n    case Thursday\n    case Friday\n    case\
  \ Saturday\n}\n```\n\n原始值的选择包括整数、浮点数、字符串或字符。如果选择整数类型，则会像前面展示的那样，为每个枚举值自动分配一个唯一的数字。当然，你也可以为特定枚举值指定具体数值，就像对\
  \ `Sunday` 所展示的那样。\n\n枚举值可以通过其 `rawValue` 属性转换为原始值。反之，也可以使用其 `init(rawValue:)` 初始化器从原始值创建枚举值，这两种方式都在此处展示：\n\
  \n```swift\nlet dayNumber = WeekdayNumber.Wednesday.rawValue\nlet dayFromNumber\
  \ = WeekdayNumber(rawValue: 3)\n```\n\n**注意**  从原始值转换为枚举可能会失败；所有枚举值都有唯一的原始值，但并非所有原始值都有对应的枚举值。有关可失败初始化器的更多信息，请参阅“可选值”部分。\n\
  \n`dayNumber` 是一个值为 `3` 的 `Int` 类型。这是通过将 `WeekdayNumber.Wednesday` 值转换为其原始值获得的。`dayFromNumber`\
  \ 是一个包含值 `Wednesday` 的 `WeekdayNumber` 变量，该值是通过将原始值 `3` 转换为 `WeekdayNumber` 获得的。\n\
  \n原始值也可以是字符串或字符。在下面的示例中，定义了一个具有字符串原始值的枚举。对于非整数值，你必须为每个枚举值提供一个原始值，并且不能有重复。\n\n```swift\n\
  enum WeekdayName: String {\n    case Sunday = \"Sunday\"\n    case Monday = \"Monday\"\
  \n    case Tuesday = \"Tuesday\"\n    case Wednesday = \"Wednesday\"\n    case Thursday\
  \ = \"Thursday\"\n    case Friday = \"Friday\"\n    case Saturday = \"Saturday\"\
  \n}\n```\n\n与数字原始值一样，你可以与枚举值进行相互转换。以下代码将打印消息“报告应在星期一提交。”\n\n```swift\nlet reportDay:\
  \ WeekdayName = .Monday\nprintln(\"Reports are due on \\(reportDay.rawValue).\"\
  )\n```\n\n## 关联值\n\n每个枚举值还可以存储一个其他值的元组，称为*关联值*。这允许你将其他有意义的值与特定的枚举值打包在一起。例如，一个表示失败原因的枚举可能具有包含每种特定失败类型信息的关联值。`.DocumentNotFound`\
  \ 值可能包含缺失文档的名称，而 `.SessionExpired` 值可能包含会话结束的时间。\n\n当你为枚举添加关联值时，会为这些额外的元组预留存储空间。每个元组与一个特定的枚举值配对。该元组仅在枚举变量被设置为该值时才能使用。\n\
  \n通过一个例子来解释更容易理解。在下面的代码中，几个 `WeekdayChild` 枚举值具有关联值：\n\n```swift\nenum Sadness {\n\
  \    case Sad\n    case ReallySad\n    case SuperSad\n}\n\nenum WeekdayChild {\n\
  \    case Sunday\n    case Monday\n    case Tuesday(sadness: Sadness)\n    case\
  \ Wednesday\n    case Thursday(distanceRemaining: Double)\n    case Friday(friends:\
  \ Int, charities: Int)\n    case Saturday(workHours: Float)\n}\n```\n\n`.Tuesday`\
  \ 和 `.Saturday` 值存储一个关联的浮点数。`.Friday` 值存储两个额外的整数值。而 `.Thursday` 值则更进一步，存储了另一个枚举值。其他枚举值没有关联值；像对待任何其他枚举那样对待它们即可。\n\
  \n枚举及其关联值通过初始化器来构造。以下是一些示例，你也可以在 `Learn iOS Development Projects` → `Ch 20` → `Enumerations.playground`\
  \ 文件中找到它们。\n\n```swift\nlet graceful = WeekdayChild.Monday\nlet woeful = WeekdayChild.Tuesday(sadness:\
  \ .ReallySad)\nlet traveler = WeekdayChild.Thursday(distanceRemaining: 100.0)\n\
  let social = WeekdayChild.Friday(friends: 23, charities: 4)\nlet worker = WeekdayChild.Saturday(workHours:\
  \ 90.5)\n```\n\n**提示**  关联值元组成员的外部名称是可选的。你可以省略它们，直接使用值，例如 `WeekdayChild.Friday(23,4)`。\n\
  \n奇怪的是，你无法直接访问关联值。检索它们的唯一机制是通过 `switch` 语句，像这样：\n\n```swift\nvar child = traveler\n\
  switch child {\n    case .Sunday, .Monday, .Wednesday:\n        break\n    case\
  \ .Tuesday(let mood):\n        if mood == .ReallySad {\n            println(\"Tuesday's\
  \ child is really sad.\")\n        }\n    case .Thursday(let miles):\n        println(\"\
  Thursday's child has \\(miles) miles to go.\")\n    case .Friday(let friendCount,\
  \ let charityCount):\n        println(\"Friday's child has \\(friendCount) friends.\"\
  )\n    case .Saturday(let hours):\n        println(\"Saturday's child is working\
  \ \\(hours) hours this week.\")\n}\n```\n\n如上所示，你通过在每个 `switch` case 中使用 `let` 语句分解元组来获取关联值。这种特殊机制的原因在于，枚举值理论上可以包含任何可能的枚举值。但关联值仅当它被设置为特定枚举值时才是有效的。`switch`\
  \ case 确保仅允许访问该特定枚举值的关联值。\n\n## 扩展枚举\n\n枚举是完整的类型，类似于类和结构体。枚举可以定义计算属性，并拥有静态方法和实例方法。它可以采纳协议，可以通过扩展进行扩展，并且可以拥有自定义初始化器。你不能添加存储属性；为此请使用关联值。以下是一个具有计算属性、方法和特殊初始化器的枚举：\n\
  \n```swift\nenum WeekdayNumber: Int {\n    case Sunday = 0\n    case Monday\n  \
  \  case Tuesday\n    case Wednesday\n    case Thursday\n    case Friday\n    case\
  \ Saturday\n\n    var weekend: Bool { return self == .Sunday || self == .Saturday\
  \ }\n    var weekday: Bool { return !weekend }\n    init(random: Bool) {\n     \
  \   if random {\n            nextWeekDayNumber = Int(arc4random_uniform(7))\n  \
  \      }\n        self = WeekdayNumber(rawValue: nextWeekDayNumber)!\n        nextWeekDayNumber++\n\
  \        if nextWeekDayNumber > WeekdayNumber.Saturday.rawValue {\n            nextWeekDayNumber\
  \ = WeekdayNumber.Sunday.rawValue\n        }\n    }\n    func dayOfJulienDate(date:\
  \ NSTimeInterval) -> WeekdayNumber {\n        return WeekdayNumber(rawValue: Int(date)\
  \ % 7 + 2)!\n    }\n}\nvar nextWeekDayNumber: Int = WeekdayNumber.Monday.rawValue\n\
  ```\n\n当编写在枚举上下文中的代码时，`self` 变量代表其当前值。你通过给 `self` 赋值来在初始化器中设定枚举的值。你可以像使用结构体或对象那样使用这些特性，如下所示：\n\
  \n```swift\nlet today = WeekdayNumber(random: true)\nif today.weekend {\n    clock.alarm.enabled\
  \ = false\n}\n```\n\n## 数值类型\n\n现在，你将接触到最简单的类型，但可能仍然会有一些惊喜等着你。Swift 拥有整数和浮点数数值类型。你在本书中一直在使用它们。\n\
  \n整数类型有多种大小和符号：`Int`、`UInt`、`Int8`、`UInt8`、`Int16`、`UInt16`、`Int32`、`UInt32`、`Int64`\
  \ 和 `UInt64`。你可以在 `Learn iOS Development Projects` → `Ch 20` → `Numbers.playground`\
  \ 文件中找到它们的示例。\n\n绝大多数情况下，你应该使用 `Int`，偶尔使用 `UInt`，几乎不使用其他类型。稍后你会明白原因。其余类型仅在处理特定数据大小（例如二进制消息格式）时才有用。\n\
  \n\n"
- "# 浮点数\n\n浮点数有两种类型：`Float` 和 `Double`。`Float` 始终是 32 位，`Double` 始终是 64 位。\n\n在 32\
  \ 位处理器上运行 Swift 程序时，`Int` 和 `UInt` 类型的宽度为 32 位（相当于 `Int32` 和 `UInt32`）。为 64 位处理器编译时，它们都是\
  \ 64 位宽。iOS Foundation 库定义了 `CGFloat` 类型。为 32 位处理器编译时，它是 32 位（`Float`）；在 64 位处理器上，则为\
  \ 64 位（`Double`）。Cocoa Touch 框架广泛使用了 `CGFloat`。\n\n## 隐式类型转换\n\n与你可能遇到的大多数计算机语言不同，Swift\
  \ 没有隐式类型转换。当你赋值变量、传递参数值或对两个值执行操作时，提供的值必须*精确*匹配期望的类型（只有少数例外，稍后会谈到）。下面的例子展示了这一点：\n\
  \n```\nvar signed: Int = 1\nvar unsigned: UInt = 2\nvar double: Double = 3.0\nvar\
  \ float: Float = 4.0\nsigned = unsigned // <-- 无效\nunsigned = signed // <-- 无效\n\
  double = float    // <-- 无效\n```\n\nSwift 能够推断类型（让你无需重复输入类型）的原因之一，是因为数字或表达式是什么类型从来没有任何歧义，也绝不可能通过赋值或转换意外丢失数值精度。这也意味着你必须有意转换任何类型不正确的值。\n\
  \n这就是我建议尽可能使用 `Int` 的原因。如果你的所有整数都是 `Int`，就不需要做任何转换。\n\n如果你有一种类型但需要另一种类型，则必须显式创建所需的类型。创建整数和浮点类型的方式与创建对象、结构和枚举完全相同。下面的代码通过创建新的、兼容的类型，修复了前面展示的类型不匹配问题：\n\
  \n```\nsigned = Int(unsigned)\nunsigned = UInt(signed)\ndouble = Double(float)\n\
  ```\n\n`Int` 类型拥有接受所有其他整数和浮点类型的初始化器，反之亦然。通常，如果转换无法完成，这些构造函数会通过抛出异常来防止数据丢失。下面的例子会导致错误，因为\
  \ 300 这个整数值无法用 8 位整数表示：\n\n```\nlet tooBigToFit = UInt8(300) // 错误\n```\n\n唯一的例外是浮点数值的整数初始化器。这些初始化器会静默地截断数值的小数部分。表达式\
  \ `Int(2.6)` 的结果将是整数值 `2`。\n\n## 数字字面量\n\n相比之下，数字字面量灵活得多。Swift 能识别多种数字格式，如表 20-2\
  \ 所示。\n\n表 20-2. 字面量数字格式\n\n| 形式 | 描述 |\n| --- | --- |\n| `123` | 正整数 |\n| `-86`\
  \ | 负整数 |\n| `0xa113cafe` | 十六进制数 |\n| `0o557` | 八进制数 |\n| `0b010110110` | 二进制数\
  \ |\n| `1.5` | 浮点数 |\n| `6.022e23` | 带指数的浮点数 |\n| `0x2ff0.7p2` | 带指数的十六进制浮点数 |\n\
  \n任何数字字面量都可以包含前导零，并混合使用下划线以提高可读性。这都不会改变数值。这让你可以写 `23_000_000_000` 而不是 `23000000000`。如果字面量的类型未被暗示或指定，表\
  \ 20-2 中的前五种格式会产生一个 `Int` 值。其余三种格式则为 `Double`。在下面的例子中，变量是 `Double` 类型，因为字面量默认为 `Double`\
  \ 类型且你未指定类型：\n\n```\nlet avogadroNumber = 6.022_141_29e23\n```\n\n然而，当你将字面量赋值给变量或将其作为参数传递时，Swift\
  \ 会尽可能地将字面量转换为接收类型。这几乎是 Swift 自动为你转换类型的唯一场景。在下面的例子中，一个整数字面量被赋值给一个 `Double` 变量：\n\
  \n```\nvar double: Double = 3\n```\n\n字面量 `3` 是一个整数。但由于你将它赋值给一个浮点变量，Swift 会自动将 `3`\
  \ 转换为 `3.0`，就像你写了 `var double: Double = Double(3)` 一样。\n\n## 数字也是类型\n\n出乎意料的是，在\
  \ Swift 中，即使是简单的数字类型也是完整的类型。数字类型可以拥有计算属性和方法，并且可以通过扩展进行扩展。下面的扩展为 `Int` 类型添加了一个 `casualName`\
  \ 属性：\n\n```\nextension Int {\n    var casualName: String {\n        switch self\
  \ {\n            case 0:\n                return \"no\"\n            case 1:\n \
  \               return \"just one\"\n            case 2:\n                return\
  \ \"a couple\"\n            case 3:\n                return \"a few\"\n        \
  \    default:\n                return \"many\"\n        }\n    }\n}\n```\n\n现在，任何\
  \ `Int` 值都有一个可以像其他任何属性一样使用的属性。下面的代码会打印消息“There are a few people here for ice cream.”\n\
  \n```\nlet headCount: Int = 3\nprintln(\"There are \\(headCount.casualName) people\
  \ here for ice cream.\")\n```\n\n标准数字类型已经拥有许多有用的属性。例如，`min` 和 `max` 属性返回该类型能表示的最小值和最大值。表达式\
  \ `Int.max` 将是你可以在 `Int` 变量中存储的最大正数。\n\n## 溢出和下溢\n\nSwift 拥有常用的数学运算集：加法（`+`）、减法（`-`）、乘法（`*`）、除法（`/`）、取余（`%`）、自增（`++`，前缀和后缀形式）和自减（`--`，前缀和后缀形式）。还有一套标准的重新赋值运算符：加等于（`+=`）、减等于（`-=`）、乘等于（`*=`）、除等于（`/=`）等等。再加上位移运算符（`<<`\
  \ 和 `>>`）、按位逻辑运算（`&`、`|` 和 `^`）以及布尔逻辑运算符（`&&` 和 `||`）。你应该熟悉所有这些运算符。如果有具体问题，请参考 iBooks\
  \ 中的《Swift 编程指南》。\n\nSwift 在所有算术运算中严格检查溢出和下溢。如果你增加一个整数，而结果超出了该类型能表示的范围，Swift 会抛出程序异常。在下面的例子中，两个数相乘的结果超过了\
  \ `Int.max` 的值，导致程序终止：\n\n```\nlet big: Int = 999_999_999\nlet bigger: Int = 9_999_999_999\n\
  let wayTooBig = big * bigger // <-- 溢出\n```\n\n如果你有理由接受或忽略这种情况，Swift 提供了一组忽略溢出和下溢的运算符：忽略溢出乘法（`&*`）、忽略溢出除法（`&/`）、忽略溢出取余（`&%`）、忽略溢出加法（`&+`）、忽略溢出减法（`&-`）等。\n\
  \n## 字符串和字符\n\n字符串和字符是 Swift 中的基础类型。Swift 中的 `String` 是一个值类型。这意味着如果你将字符串作为参数传递，你传递的是该字符串的一个副本，而不是对原始字符串的引用。作为一种值类型，字符串可以是变量（可变）或常量（不可变），如下所示：\n\
  \n```\nvar string: String = \"Hello!\"\nlet immutableString: String = \"Salut!\"\
  \n```\n\n### 字符串和字符字面量\n\n字符串字面量写在双引号之间。字符串字面量可识别多种转义序列，所有转义序列都以单个 `\\`（反斜杠）字符开头。表\
  \ 20-3 显示了可以在字符串中包含的转义码。\n\n表 20-3. 字符串字面量转义码\n\n\n\n### Swift 字符串详解\n\n#### 转义序列\n\
  \n| 转义序列 | 字符串中的字符 |\n| --- | --- |\n| `\\\\` | 一个 `\\` 字符 |\n| `\\\"` | 一个 `\"\
  ` 字符 |\n| `\\'` | 一个 `'` 字符 |\n| `\\t` | 水平制表符 |\n| `\\r` | 回车符 |\n| `\\0` | 空字符\
  \ |\n| `\\u{`*nnnn*`}` | 十六进制代码为 *nnnn* 的 Unicode 标量 |\n| `\\(`*expression*`)` |\
  \ 表达式的字符串表示（字符串插值） |\n\nSwift 对字符字面量使用相同的语法。字符串字面量的默认类型是 `String` 类型。但与数字字面量类似，当单个字符的字符串字面量被赋值给\
  \ `Character` 类型，或者你显式创建了一个 `Character` 值时，Swift 会将其转换为字符字面量。以下示例演示了这一点：\n\n```\n\
  let thisIsAString = \"String\"\nlet thisIsAlsoAString = \"c\"\nlet thisIsACharacter\
  \ = Character(\"c\")\nlet thisIsAlsoACharacter: Character = \"c\"\n```\n\n当期望的类型是\
  \ `Character` 时，包含单个字符的字符串字面量会被转换为 `Character` 类型。否则，它会表现得像 `String` 类型。\n\n如果你需要创建一个空的\
  \ `String`，可以使用空字符串字面量（`\"\"`）或创建一个空的 `String` 值（`String()`）。\n\n#### Unicode\n\n\
  Swift 完全支持 Unicode 字符集。所有 Swift 字符串都使用 Unicode 编码。此外，Swift 源文件接受 Unicode 编码，因此你可以直接在程序的源文件中包含任何\
  \ Unicode 字符。以下字符串字面量是一个完美的例子：\n\n```\nlet hungary = \"Üdvözlöm!\"\n```\n\nUnicode\
  \ 字符在 Swift 语言中也是可接受的。变量、类、方法、参数和属性名称都可以包含 Unicode 字符。基本上，任何不属于 Swift 语言本身的字符在符号名中都是有效的。以下两个变量名在\
  \ Swift 中都是合法的，并且可以在任何普通变量名使用的地方使用。（请参阅 `Learn iOS Development Projects` ![image](img/arrow.jpg)\
  \ `Ch 20` ![image](img/arrow.jpg) `Strings.playground` 文件，查看使用 Emoji 字符的变量名示例。）\n\
  \n```\nlet olá = \"Hello!\"\nlet π = 3.14159265359\nreturn π * (r*r)\n```\n\n**提示**\
  \ Swift 字符串由 ASCII 双引号字符（`\"`，Unicode 0x22）分隔。更符合印刷习惯的“花引号”（例如包围“curly quotes”这个词的引号）不会被识别为字符串分隔符。这意味着你可以在字符串中包含单花引号和双花引号而无需转义，就像这样：`\"\
  Rose said \"Let's Go!\"\"`.\n\nUnicode 编码通常是透明的，但偶尔会产生奇怪的副作用。Swift 使用一种特定的编码风格，要求某些\
  \ Unicode 字符由两个或多个值表示。某些字符串方法会处理字符串中的各个值，而其他方法则会解释字符串中的字符。在以下示例中，`tricky` 值包含一个由两个\
  \ Unicode 标量组成的 Unicode 字符：\n\n```\nlet tricky = \"\\u{E9}\\u{20DD}\" // é\n```\n\
  \n如果你查询这个字符串的 `length`，它会返回 2。如果你查询它有多少个字符，它会返回 1。有关详细信息，请参阅 *The Swift Programming\
  \ Guide* 中关于 Unicode 字符编码和转换的章节。\n\n#### 字符串插值\n\n字符串插值只是一个花哨的名称，用于在字符串字面量中嵌入表达式。表达式会被转换为字符串，并成为结果字符串的一部分。你在前面的章节中已经多次看到这一点。在以下示例中，`aboutPi`\
  \ 变量被设置为 \"The value of π is approximately 3.14159265359.\"\n\n```\nlet aboutPi\
  \ = \"The value of π is approximately \\(π)\"\nlet truth = \"The character count\
  \ of \\\"\\(tricky)\\\" is \\(countElements(tricky))\"\n```\n\n之前创建的 `π` 变量被解释并转换为字符串，然后替换了字符串字面量中的\
  \ `\\(`*expression*`)`。表达式可以是任何 Swift 可以转换为字符串的内容（公式、对象、函数调用）。\n\n**提示** 要想让自定义类的对象将自己转换为字符串，请重写\
  \ `description` 属性。\n\n虽然极其方便，但字符串插值没有提供任何格式化控制。表达式会按照 Swift 认为的最佳方式转换为字符串；你只能接受或放弃。如果你需要控制值的格式化方式，例如你想将一个整数值转换为十六进制，可以求助于\
  \ `NSString` 类。以下示例使用 `NSString(format:)` 初始化器来创建一个具有精确格式的字符串：\n\n```\nlet aboutPi:\
  \ String = NSString(format: \"The value of %C is about %.4f\", 0x03c0, π)\n```\n\
  \n以 `%`（百分号）开头的格式说明符可以执行多种转换，并且你可以对其格式进行大量控制。例如，`%f` 转换可以限制小数点后的有效数字位数。在这个例子中，它被限制为四位数字。数字\
  \ `0x03c0` 本来可以转换为十进制或八进制数字，但这里使用 `%C` 将其转换为其 Unicode 字符。结果得到的 `NSString` 被赋值给 `aboutPi`\
  \ 变量，这将我们引向下一个主题。\n\n#### 字符串即 NSString\n\nSwift 的 `String` 值可以与 Objective-C 的 `NSString`\
  \ 对象互换使用。你可以在需要 `NSString` 对象引用的地方使用 `String` 值，反之亦然。在上一节中，创建了一个 `NSString` 对象，然后将其赋值给\
  \ `aboutPi: String` 变量。你可以像使用任何 `String` 一样使用它，然后将其传递给任何期望 `NSString` 参数的函数。\n\n\
  然而，Swift 仍然将 `String` 值和 `NSString` 对象视为不同的类型。如果你创建了一个 `String` 值，Swift 假定它只具有 `String`\
  \ 的方法和属性。如果你有一个 `NSString` 变量，Swift 假定它只具有 `NSString` 类的方法和属性——尽管它实际上两者都具备。要在 `String`\
  \ 值上使用 `NSString` 的方法，只需将一种类型转换为另一种类型，如下所示：\n\n```\nlet sparkRange = (string as\
  \ NSString).rangeOfString(\"spark\")\nlet objcString = string as NSString\nlet words\
  \ = objcString.componentsSeparatedByString(\" \")\n```\n\n在第一条语句中，`String` 值被临时转换为\
  \ `NSString` 类型，并用于调用 `rangeOfString(_:)` 函数。在第二条语句中，字符串再次被转换为 `NSString` 对象，但随后被赋值给一个变量。由于变量的类型是\
  \ `NSString`，你无需转换即可使用任何 `NSString` 的属性或方法。你也可以反向操作，将任何 `NSString` 对象转换为 `String`\
  \ 值。\n\n**注意** 一个 `String`，即使它是可变的，也不能被转换为 `NSMutableString` 对象。\n\n`NSString` 是一个庞大的类，拥有许多有用的函数。相比之下，`String`\
  \ 类型拥有的函数非常少。通过将 `String` 转换为 `NSString`，你可以立即获得对 `NSString` 大量功能的访问权限。请参阅 `NSString`\
  \ 类文档以了解其提供的功能。\n\n#### 字符串拼接\n\n`String` 值提供的一个功能是字符串和字符拼接。`+` 运算符可以通过拼接两个字符串来创建一个新字符串，如下所示：\n\
  \n```\nlet message = \"Amber says \" + hungary\n```\n\n你可以使用 `+=` 运算符将一个字符串添加到可变字符串的末尾。你也可以使用\
  \ `append(_:)` 函数来追加一个字符串或单个字符，如下所示：\n\n```\nvar mutableString = \"¡Hola!\"\nmutableString\
  \ += \" James\"\nlet exclamation: Character = \"!\"\nmutableString.append(exclamation)\n\
  ```\n\n当这段代码执行完毕时，`mutableString` 变量包含 \"¡Hola! James!\"\n\n#### 属性字符串\n\n\n\n您在本章中已经看到许多`UIView`类和绘图方法使用的是属性字符串，而非普通字符串。*属性字符串*会将属性值与字符串中的字符范围关联起来。属性可以表示字符的字体（字体系列、字号、样式）、颜色、排版调整（字符间距）、对齐方式（右对齐、上标、下标）、文本装饰（下划线、删除线）等。属性字符串非常灵活，能够描述各种复杂的排版。虽然概念上并不复杂，但在实际使用中可能会有些繁琐。\n\
  \n属性以值字典的形式表示。键用于标识属性的种类。然后，该字典与一个字符范围关联。以下示例展示了如何构建属性字符串，您可以在`/Learn iOS Development\
  \ Projects/Ch 20/AttributedString`项目中找到这些示例：\n\n```\nlet fancyString = NSMutableAttributedString(string:\
  \ \"iOS \")\nlet iOSAttrs = [ NSFontAttributeName:            UIFont.italicSystemFontOfSize(80),\n\
  \                 NSForegroundColorAttributeName: UIColor.redColor(),\n        \
  \         NSKernAttributeName:            NSNumber(integer: 4) ]\nfancyString.setAttributes(iOSAttrs,\
  \ range: NSRange(location: 0, length: 3))\n```\n\n第一段代码从一个普通字符串创建了一个可变属性字符串。然后，它创建了一个字典，定义了三个属性：80\
  \ 号的斜体系统字体、红色以及 4 磅的字距（字符间距）。这些属性被应用于字符串的前三个字符。请注意，空格字符（字符串中的第四个字符）没有属性。\n\n该技术使用了`NSMutableAttributedString`类。当您希望逐步组合属性字符串，或希望为字符串中的特定范围分配不同属性时，请使用此类。下一个示例使用了一种更简单的技术：\n\
  \n```\nlet shadow = NSShadow()\nshadow.shadowOffset = CGSize(width: 5, height: 5)\n\
  shadow.shadowBlurRadius = 3.5\n\nlet appAttrs = [ NSFontAttributeName:         \
  \  UIFont.boldSystemFontOfSize(78),\n                 NSShadowAttributeName:   \
  \      shadow ]\nlet secondString = NSAttributedString(string: \"App!\", attributes:\
  \ appAttrs)\n```\n\n第二种技术直接从字符串和属性字典创建了一个属性字符串。`appAttrs`字典描述了 78 号的系统粗体字体。它还应用了一个投影，其偏移量为（5.0，5.0），模糊半径为\
  \ 3.5。当以这种方式创建属性字符串时，属性会应用于所有字符，并且该对象是不变的。\n\n```\nfancyString.appendAttributedString(secondString)\n\
  label.attributedText = fancyString\n```\n\n最后，第二个属性字符串被追加到第一个字符串。追加的字符串保留其所有属性。现在，`fancyString`对象有八个字符，前三个字符有一套属性，后四个字符有另一套属性，而两者之间的空格字符仍然没有属性。所有属性都有默认值，每个字符对任何缺失的属性都将使用默认值。\n\
  \n当属性字符串被分配给`UILabel`时（如图 20-2 所示），其属性决定了它的绘制方式。\n\n![9781484202098_Fig20-02.jpg](img/9781484202098_Fig20-02.jpg)\n\
  \n图 20-2。标签中的属性字符串\n\n以下是使用属性字符串的一些提示：\n\n*   属性字符串*不是*`String`或`NSString`的子类。它包含一个`NSString`（即它的`string`属性），但它不是`NSString`，您不能将它用作`String`或`NSString`。\n\
  *   如果属性适用于整个字符串，您可以使用`NSAttributedString(string:,attributes:)`创建一个同质化的、不可变的属性字符串。\n\
  *   如果您想创建一个包含多种不同属性的属性字符串，则必须创建一个`NSMutableAttributedString`并逐步构建它。\n*   使用可变属性字符串，您可以为某个字符范围设置属性（`setAttributes(_:,range:)`），这会替换该范围之前的任何属性。您还可以添加（`addAttributes(_:,range:)`）或移除（`removeAttributes(_:,range:)`）属性。这些方法会与现有属性结合，或从现有属性中选择性地移除。\n\
  \n**注意**：切勿通过修改已分配给某个范围的属性字典中的值对象来更改属性。您必须始终替换属性来更改它们。\n\n在 Xcode 的“文档和 API 参考”窗口中查找\
  \ *NSAttributedString UIKit Additions Reference*。“常量”部分列出了 iOS 支持的所有属性键以及为每个键应提供的值对象类型。\n\
  \n## 集合\n\nSwift 有两种原生集合类型：数组和字典。数组是有序的值集合。您通过数值索引访问单个元素。字典将键映射到值。您使用其键访问每个元素。字典有时被称为*关联数组*。\n\
  \n您已经在本书中一直使用数组和字典。我不会赘述细节（尽管很多可以在 *The Swift Programming Guide* 中找到），但这里有一些您应该了解的事情。\n\
  \n首先，所有 Swift 数组和字典都有类型；它们不是通用的集合对象。一个`[Int]`类型的数组只能存储`Int`值。对于字典，您需要同时指定键的类型和值的类型。声明数组类型的首选语法是`[Type]`。对于字典，则是`[Type:Type]`，其中第一个是键的类型，第二个是值的类型。以下示例展示了一些数组变量的声明：\n\
  \n```\nvar emptyArrayOfInts: [Int] = []\nvar anotherEmptyArrayOfInts = [Int]()\n\
  var arrayTypeInferredFromElements = [ 1, 2, 3 ]\nvar arrayWithADozenPis = Double\n\
  ```\n\n`emptyArrayOfInts`被显式声明为`Int`值数组。其默认值为一个空数组。`anotherEmptyArrayOfInts`变量具有相同的类型，从其默认值的类型推断而来。这是用于创建特定类型空数组的语法。`arrayTypeInferredFromElements`也是一个`Int`值数组。Swift\
  \ 通过查看字面量数组中值的类型来确定其类型。\n\n最后，`arrayWithADozenPis`变量使用了一个特殊的数组初始化器，该初始化器生成一个任意大小的数组，并用相同的值填充每个元素。以下是字典的一些示例：\n\
  \n```\nvar emptyDictionary = [String:String]()\nvar dictionaryTypesInferredFromElements\
  \ = [\"red\": UIColor.redColor() ]\n```\n\n`emptyDictionary`包含一个空字典，它将`String`键映射到`String`值。`dictionaryTypesInferredFromElements`变量具有`String`键和`UIColor`值，这些值从默认值推断而来。\n\
  \n字面量数组的语法是`[` *元素*`,` *元素* `]`。字面量数组可以包含任意数量（甚至零个）的元素，用逗号分隔。字面量字典的书写形式为`[` *键*`:`\
  \ *值*`,` *键*`:` *值* `]`。如果您将集合赋值给变量或参数，所有元素、键和值必须与数组或字典的类型兼容。\n\n\n\n与`String`值类似，数组可与`NSArray`对象互换，字典可与`NSDictionary`对象互换。同样与`String`值一样，数组和字典也是值类型。当你将数组或字典作为参数传递时，整个集合都会被复制。\n\
  \n**注意** 数组和字典在作为参数传递时实际上并不会被立即复制。Swift 采用一种称为“惰性复制”的技术，只有当被调用的函数真正尝试修改集合时才会进行复制。由于大多数函数不会修改传递给它们的集合，Swift\
  \ 避免了反复复制集合的开销，同时保持了“集合始终会被复制”的表象。\n\n以下是关于访问和修改数组的快速入门指南：\n\n-   使用下标语法获取元素的值：`array[1]`\n\
  -   通过赋值并使用下标语法替换元素：`array[1] = value`\n-   使用`append(_:)`函数在数组末尾追加一个元素：`array.append(value)`\n\
  -   使用连接赋值（`+=`）运算符将另一个数组追加到当前数组末尾：`array += [ value, value ]`\n-   使用`insert(_:,atIndex:)`函数在任意位置插入一个元素：`array.insert(value,\
  \ atIndex: 3)`\n-   使用`removeAtIndex(_:)`函数移除一个元素：`array.removeAtIndex(2)`\n-  \
  \ 从`count`属性获取数组中的元素数量：`array.count`\n-   从其`isEmpty`属性查看数组是否为空：`array.isEmpty`\n\
  \n使用字典类似，但并非通过索引而是通过键来访问每个元素。\n\n-   使用下标语法和键获取一个值：`dictionary[\"key\"]`\n-   通过赋值并使用下标语法和键来添加或替换值：`dictionary[\"\
  key\"] = value`\n-   使用`updateValue(_:,forKey:)`函数添加或替换值，同时确定被替换的值：`let previousValue\
  \ = dictionary.updateValue(value,\"key\")`\n-   通过将值设为`nil`并使用下标语法来移除一个值：`dictionary[\"\
  key\"] = nil`\n-   使用`removeValueForKey(_:)`函数移除一个值并获知被移除的值：`let removedValue =\
  \ dictionary.removeValueForKey(\"key\")`\n\n字典中的键是唯一的。为已有键设置新值会替换该键之前存储的值。字典的键通常是字符串，但也可以是任何符合`Hashable`协议的类型。Swift\
  \ 中的`String`、`Int`、`Double`和`Bool`类型都是合适的键。符合`Hashable`协议的类型必须提供以下内容：\n\n-   它实现`==`运算符，以便能够与相同类型的其他值进行比较。\n\
  -   它高效地实现一个`hashValue`属性。\n\n你还需要做的另一件事是遍历数组、字典甚至字符串中的值。为此，你需要对`for`循环有一定了解。\n\n\
  ## 控制语句\n\n与所有类 C 语言一样，Swift 拥有常见的控制语句：`if`、`if-else`、`else-if`、`for`、`while`、`do-while`和`switch`。`if`、`if-else`、`else-if`、`while`和`do-while`没有什么特别之处，但\
  \ Swift 与类似语言之间存在一些形式上的差异。\n\n-   条件表达式不必用括号括起来。\n-   条件必须是布尔表达式。\n-   条件代码块的花括号是必需的。\n\
  \n以下是一些简单示例。你可以在 `Learn iOS Development Projects` ![image](img/arrow.jpg) `Ch 20`\
  \ ![image](img/arrow.jpg) `Control.playground` 文件中找到它们。\n\n```\nvar condition =\
  \ true\nvar otherCondition = true\n\nif condition {\n    // condition 为 true\n}\n\
  \nif condition {\n    // condition 为 true\n} else {\n    // condition 为 false\n\
  }\n\nif condition {\n    // condition 为 true\n} else if otherCondition {\n    //\
  \ condition 为 false 且 otherCondition 为 true\n} else {\n    // condition 和 otherCondition\
  \ 均为 false\n}\n```\n\n\n\n"
- '# Swift 控制流：`while` 和 `for` 循环与 `switch` 语句


  '
- "# `while` 循环\n\n`while` 循环在每次迭代开始时检查条件。如果条件为 `true`，则执行循环体，然后再次检查条件。语法如下：\n\n```\n\
  while condition {\n    // 当条件为 true 时重复执行\n    condition = done\n}\n\ndo {\n   \
  \ // 执行一次\n    otherCondition = done\n    // 重复执行直到 otherCondition 为 false\n} while\
  \ otherCondition\n```\n\n"
- "# `for` 循环\n\nSwift 的 `for` 和 `switch` 语句功能丰富。让我们先看看 `for` 循环。\n\n### `for` 循环简介\n\
  \nSwift 的 `for` 循环有三种形式：传统形式、范围形式和集合形式。传统版本是所有类 C 语言中常见的 `init` / `while` / `increment`\
  \ 组合形式。示例如下：\n\n```\nfor condition = true; condition; condition = false {\n}\n```\n\
  \n第一个语句执行一次以初始化循环。然后，只要条件表达式为 `true`，循环就会重复。每次循环结束时，执行增量语句，并重新评估条件表达式。这些都很直观。\n\n\
  另外两种形式通常被称为 `for`-`in` 语句，它们会遍历数值范围或集合中的元素。范围形式如下所示：\n\n```\nfor i in 0..<100 {\n\
  \    // 执行 100 次，i 从 0 到 99\n}\n\nfor i in 0...100 {\n    // 执行 101 次，i 从 0 到 100\n\
  }\n```\n\n`for`-`in` 范围循环遍历由范围描述的一系列数字。*闭区间* `0...100` 包含从 0 到 100 的所有值（总共 101 个数字）。*半开区间*\
  \ `0..<100` 包含从 0 到 99 的数字。请注意，范围中的任一值可以是任何数值表达式，例如 `0..<inventory.count`。\n\n**警告**\
  \  范围的起始值必须小于或等于结束值。\n\n第二种 `for`-`in` 循环格式遍历集合的内容。这可用于遍历数组、字典或字符串中的值。对于数组和字符串（在这种情况下，字符串被视为字符数组），格式很简单，如下所示：\n\
  \n```\nlet notes = [ \"do\", \"re\", \"mi\", \"fa\", \"sol\", \"la\", \"ti\" ]\n\
  for note in notes {\n    // 循环执行 7 次：第一次 note 是 \"do\"，第二次是 \"re\"，依此类推\n}\nfor\
  \ character in \"When you know the notes to sing, you can sing most anything\" {\n\
  \    // 循环执行 59 次，字符串中的每个字符一次\n}\n```\n\n当与字典一起使用时，循环变量是一个包含每个条目的 `(key, value)`\
  \ 对的元组。您可以使用元组循环变量，或者将其解构为键和值变量。两种方式都在以下示例中展示：\n\n```\nlet doReMi = [ \"doe\": \"\
  a deer, a female deer\",\n               \"ray\": \"a drop of golden sun\",\n  \
  \             \"me\":  \"a name, I call myself\",\n               \"far\": \"a long\
  \ long way to run\",\n               \"sew\": \"a needle pulling thread\",\n   \
  \            \"la\":  \"a note to follow so\",\n               \"tea\": \"I drink\
  \ with jam and bread\" ]\nfor note in doReMi {\n    // 元组循环变量\n    println(\"\\\
  (note.0): \\(note.1)\")\n}\n\nfor (noteName, meaning) in doReMi {\n    // 解构后的变量\n\
  \    println(\"\\(noteName): \\(meaning)\")\n}\n```\n\n请注意，永远不要为循环变量放置 `let`、`var`\
  \ 或类型。它总是一个常量（`let`），其类型由范围或集合的元素类型决定。还要记住，数组和字符串总是按顺序处理的，但字典是无序集合，元素的顺序是不确定的。\n\
  \n"
- "# `switch` 语句\n\nSwift 的 `switch` 语句是一个功能强大的工具集，其能力远超同类语言中的 `switch` 语句。让我们从一个简单的例子开始，你对此应该很熟悉。\n\
  \n```\nlet number = 9\nswitch number {\n    case 1:\n        println(\"最孤独的数字\"\
  )\n    case 2:\n        println(\"足够跳探戈\")\n    case 3, 5, 7:\n        println(\"\
  \\(number) 是质数\")\n    case 4, 6, 8:\n        println(\"\\(number) 是偶数\")\n    case\
  \ 13:\n        println(\"被认为不吉利\")\n    default:\n        println(\"\\(number) 是我并不熟悉的数字\"\
  )\n}\n```\n\n你应该了解其许多特性：\n\n*   你可以对大多数 Swift 类型（整数、字符串、枚举、元组以及任何遵循 `Equatable`\
  \ 协议的对象或结构体）进行 `switch`。\n*   多个匹配条件可以在单个 `case` 语句中列出，用逗号分隔。\n*   没有“贯穿”机制。每个 `case`\
  \ 代码块执行完毕后，语句的执行就结束了。如果你希望一个块贯穿到下一个，请以特殊的 `fallthrough` 语句结束该块。\n*   因为没有“贯穿”，所以不需要\
  \ `break` 语句，但你仍然可以使用它来提前退出一个块。如果你的某个 `case` 没有代码，请使用一个单独的 `break` 语句；每个 `case`\
  \ 必须有一个代码块，而 `break` 满足该要求。\n*   所有 `switch` 语句必须是穷尽的，这意味着它们必须覆盖每一种可能的情况。对于枚举，这意味着你必须为每个枚举值提供一个\
  \ `case`。如果你的 `case` 不是穷尽的（或者 Swift 无法确定它们是穷尽的），你必须包含一个 `default` 情况。\n\n使 `switch`\
  \ 语句如此强大的原因是它的 `case` 表达式。一个 `case` 表达式实际上是一个模式匹配机制。它可以是一个常量（如前所示）、一个范围、一个任意表达式，或一个包含多个模式的元组。你可以将元组值绑定到新变量，或者用任意的布尔条件来限定\
  \ `case` 表达式。让我们逐一看看这些变体。\n\n### 范围案例\n\n一个 `case` 也可以是一个范围，如下例所示：\n\n```\nlet testScore\
  \ = 91\nswitch testScore {\n    case 94...100:\n        println(\"优秀！\")\n    case\
  \ 86...93:\n        println(\"非常体面\")\n    case 75...85:\n        println(\"相当不错\"\
  )\n    case 60...74:\n        println(\"还行\")\n    default:\n        println(\"\
  不及格\")\n}\n```\n\n整数 `testScore` 会与每个闭区间进行比较。你可能会问：“范围可以重叠吗？”，“它们可以包含变量或表达式吗？”。是的，可以。看看下面的\
  \ `switch` 语句：\n\n```\nlet passingScore = 55\nswitch testScore {\n    case 94...100:\n\
  \        println(\"优秀！\")\n    case (100+passingScore)/2...100:\n        println(\"\
  非常体面\")\n    case passingScore...100:\n        println(\"足够好\")\n    default:\n\
  \        println(\"不及格\")\n}\n```\n\n其中一些范围由变量决定，另一些则包含表达式。这些范围也存在重叠。这个 `case` 语句之所以能工作，是因为以下规则：\n\
  \n*   案例是按顺序评估的。\n*   执行第一个匹配该值的案例。\n\n如果你有两个重叠的案例，请对它们进行排序，使优先级较高的案例在 `case` 列表中靠前。\n\
  \n### 切换元组\n\n现在来看看对元组进行 `switch` 操作，如下例所示：\n\n```\nvar sandwich = (\"pastrami\"\
  , \"swiss\")\nvar name = \"\"\nswitch sandwich {\n    case (\"tuna\", \"cheddar\"\
  ):\n        name = \"金枪鱼三明治\"\n    case (\"ground beef\", \"cheddar\"):\n      \
  \  name = \"芝士汉堡\"\n    case (\"ground beef\", _):\n        name = \"汉堡\"\n    case\
  \ (\"steak\", \"cheddar\"):\n        name = \"芝士牛排三明治\"\n    case (\"ham\", \"american\"\
  ):\n        name = \"火腿芝士三明治\"\n    case (\"ham\", \"gruyère\"):\n        name =\
  \ \"法式火腿干酪三明治\"\n    case (\"ham\", \"swiss\"):\n        name = \"古巴三明治\"\n    default:\n\
  \        name = \"\\(sandwich.0) 配 \\(sandwich.1)\"\n}\n```\n\n每个 `case` 中的模式都应用于\
  \ `switch` 元组中对应的值。如果全部匹配，则执行该 `case`。在这个例子中，大多数模式都是常量。但它们中的任何一个都可以是变量、表达式或范围，就像非元组的\
  \ `switch` 语句一样。\n\n你也可以使用一个*通配符*，它总是匹配元组中的一个值。如果你想忽略该值，请将元组模式替换为 `_`（下划线），如前一个例子中的\
  \ `(\"ground beef\", _)` 情况所示。如果你想匹配所有值，并在代码中检查该值，请使用 `let` 语句绑定该值，如下例所示：\n\n\n\n\
  ```swift\nsandwich = (\"ground beef\", \"blue cheese\")\nswitch sandwich {\n   \
  \ case (\"tuna\", \"cheddar\"):\n        name = \"Tuna melt\"\n    case (\"ground\
  \ beef\", let cheese):\n        name = \"Hamburger with \\(cheese)\"\n    default:\n\
  \        name = \"Today's Speical\"\n}\n```\n\n`let cheese`模式匹配`sandwich.1`的每一个可能值，然后将该值绑定到`cheese`变量。现在在该`case`的代码中，你可以互换使用`cheese`和`sandwich.1`。\n\
  \n回到“枚举”章节，`switch`语句也被用于访问枚举的关联值。凭借你对`switch`语句的新认识，你可能想再看一下那个示例。\n\n如果这还不够灵活，你还可以用任意条件限定任何`case`——比如附加一个额外的`if`语句。你可以在`case`语句后面跟一个`where`表达式。如果`case`模式匹配，则会计算`where`条件。如果条件为真，则执行`case`块。如果不为真，则该`case`不匹配，并考虑下一个`case`。以下示例演示了这一点：\n\
  \n```swift\nlet now = NSDate()\nlet cal = NSCalendar.currentCalendar()\nlet when\
  \ = cal.components(.HourCalendarUnit | .WeekdayCalendarUnit, fromDate: now)\nvar\
  \ special = \"\"\nswitch when.weekday {\n    case 1, 7 where when.hour<13:     \
  \    // 周末（周日或周六）下午 1 点前\n        special = \"Eggs Benedict\"\n    case 1, 7:  \
  \                          // 周末，当天剩余时间\n        special = \"Cobb Salad\"\n    case\
  \ 2 where when.hour<8:             // 周一，早上 8 点前\n        special = \"Ham with Red-eye\
  \ Gravy\"\n    case 3, 5 where when.hour<10:         // 周二或周四，上午 10 点前\n       \
  \ special = \"Fried Egg Sandwich\"\n    case 4:                               //\
  \ 周三，全天\n        special = \"Ruben\"\n    case 5, 6:                           \
  \ // 周四（上午 10 点后）或周五任何时间\n        special = \"Egg Salad Sandwich\"\n    default:\
  \                              // 其他任何时间\n        special = \"Cheeseburger\"\n}\n\
  ```\n\n`when`变量包含当前日期和时间的日历组件。日历组件是可理解的时间单位，例如星期几、月份名称等。这个`case`语句结合使用了模式来匹配星期几，并结合布尔表达式来限定一天中的时间。这些表达式可以是任何内容，也可能考虑是否是假日或黑色星期五。\n\
  \n## 可选值\n\n半个多世纪以来，程序员一直在一个问题上挣扎：值什么时候不是值？经常有这样的情况：一个变量（比如日期）可能有时包含一个有效的日期对象，有时却不包含。很久以前，程序员约定用存储一个零值作为指针或对象引用的值，来表示它不引用有效的对象。他们称这个值为`NULL`或`nil`。\n\
  \n**注意** 这种做法变得非常普遍，以至于现代计算机内存硬件现在被设计为在地址`0x00000000`处或附近永远不会有任何有效内存。这可以防止空指针引用与有效数据混淆。（这也是一种让程序快速崩溃的方法。）\n\
  \n早期的编程语言允许任何指针或对象引用被设置为`nil`。这意味着任何对象引用（在任何变量、参数以及任何函数中）都可能是`nil`。你要么必须测试每一个传入的值是否为`nil`，要么只能希望调用者永远不会在你预期之外向你发送`nil`引用。这个难题无疑是导致\
  \ iOS 及大多数其他平台上程序崩溃的最常见单一原因。\n\n对于整数这样的值，情况变得更糟。你必须保留一个值来表示该数字无效。有时这可以简单地是`0`或`-1`，但如果这些值也是有用的数字，你可能不得不选择一个像`-999`或`9223372036854775807`这样的数字。而且对此没有约定，所以如果有一天`-999`变成了一个可用的数字，所有相关代码都得改变。对于更小的类型，情况会更糟。考虑一个布尔值。你会选择`true`还是`false`来表示它既不是`true`也不是`false`？\n\
  \nSwift 通过可选值解决了这个问题以及许多其他问题。*可选*类型是一种可以持有值或根本没有值的类型。每种 Swift 类型都有一个可选类型，通过在类型名称后跟一个问号（`?`）来表示。`Int`类型总是存储一个整数值。`Int?`类型可以存储任意整数值，或者根本没有值。\n\
  \n可选类型让程序员能够做他们一直需要做的事情：声明一个可能有值也可能没有值的变量。但 Swift 以一种非常清晰且深思熟虑的方式做到了这一点，并且没有预留任何值。\n\
  \n更重要的是，当你没有使用可选值时，Swift 保证该变量将包含一个有效值。始终如此。毫无疑问。如果你有一个`NSDate`参数，该参数将*始终*包含一个有效的日期对象。你永远不必测试它是否为`nil`，你的程序也永远不会因为忘记测试`nil`而崩溃。\n\
  \n## 使用可选值\n\n通过在任意类型后面加上`?`来声明可选值，如下面的示例所示：\n\n```swift\nvar sometimesAnObject:\
  \ NSDate? = NSDate()\nvar sometimesAString: String? = nil\nvar sometimesAnInt: Int?\n\
  var sometimesAnAnswer: Bool?\n```\n\n在第一个例子中，`sometimesAnObject`可以存储一个`NSDate`对象或特殊值`nil`。在\
  \ Swift 中，`nil`不代表零；它是一个保留的特殊值，意思是“没有值”，并且不等同于任何其他值。`sometimesAString`变量存储一个可选的字符串，预设为“没有值”。当你声明一个可选值时，你不必提供默认值；Swift\
  \ 会自动将其设置为`nil`。`sometimesAnInt`和`sometimeAnAnswer`都被预初始化为`nil`。\n\n你可以使用“老派”方法测试可选值是否为`nil`，就像在另一种语言中测试指针是否为`NULL`一样。在下面的示例中，`sometimesAnObject`与`nil`进行比较，然后相应地使用：\n\
  \n```swift\nif sometimesAnObject != nil {\n    println(\"The date is \\(sometimesAnObject!)\"\
  )\n} else {\n    println(\"I better not use sometimesAnObject\")\n}\n```\n\n你通过将可选值与`nil`进行比较（或者使用`optional\
  \ == nil`，或者使用`optional != nil`）来确定可选值是否有值。事实上，这是你能直接对可选值做的唯一一件事。一旦你确定该变量有值，你就可以使用`optional!`语法访问它的值。感叹号*解包*了可选值，访问了其底层值。\n\
  \n而危险就在这里。如果你解包了一个没有值的可选值，你的程序可能会像在 C 语言中使用`NULL`指针一样快速崩溃。为了帮助你避免过去的错误，Swift 提供了一个专门用于处理可选值的特殊`if`语句。以下代码与前面的示例等效：\n\
  \n```swift\nif let date = sometimesAnObject {\n    println(\"The date is \\(date)\"\
  )\n} else {\n    // 此块中没有 'date' 变量\n}\n```\n\n`if let variable = optional`语句被称为*可选绑定*，它一步完成了三件事。它首先检查`sometimesAnObject`是否包含一个值（`sometimesAnObject\
  \ != nil`）。如果包含，它会创建一个新常量（`let date: NSDate`），然后解包可选值并将其赋值给该常量（`= sometimesAnObject!`）。然后执行`if`语句的代码块。由于该常量（`date`）不是可选值，你可以在块体中自由使用它——无需解包。\n\
  \n\n\n如果`sometimesAnObject`不包含值，则不会发生任何操作，`if`块不会执行。如果存在`else`块，则会执行它，但其中没有定义`date`值。\n\
  \n你可能会想象你的代码现在会充斥着`if optional != nil`和`if let value = optional`语句。别担心，Swift 有一个简化在许多情况下测试`nil`的快捷方式，我稍后会介绍。\n\
  \n## 可选类型携带\n\n可选类型是一种类型，与其他任何类型都不同。当你让 Swift 选择变量的类型时，最终可能会在你意想不到的地方得到可选类型。以下是一个简单的例子：\n\
  \n```\nvar dictionary = [String:String]()\nlet key = \"key\"\nlet value = dictionary[key]\
  \        // value: String?\nif let existingValue = value {\n    println(\"The value\
  \ for key \\\"\\(key)\\\" is \\(existingValue).\")\n} else {\n    println(\"There\
  \ is no value for key \\\"\\(key)\\\".\")\n}\n```\n\n变量`value`的类型是`String?`。“为什么？”你可能会问。因为字典下标访问器的返回类型是可选类型。字典可能没有与该特定键关联的值。因此，返回类型是一个可选类型，它也可以返回“无值”作为答案。\n\
  \n副作用是，你创建了一个可选变量（`value`），如果你想使用结果，必须考虑键`\"key\"`可能没有值的可能性。\n\n## 可选链\n\n测试可选类型是否有值的一个明显原因是避免访问不存在的值、不存在的属性，或调用无法工作的函数。Swift\
  \ 有一种*可选链（optional chaining）*语法，它测试一个变量，并且仅当该变量包含值时才执行表达式的下一部分（属性访问、函数调用等）。如果不包含，则表达式不执行任何操作。示例如下：\n\
  \n```\nclass Cat {\n    var quote: String { return \"Most everyone's mad here.\"\
  \ }\n    var directions: String?\n    var friend: Hatter?\n    func disappear()\
  \ { println(\"I'm not all here myself.\") }\n}\nvar cheshire: Cat?\n\ncheshire?.disappear()\n\
  ```\n\n变量`cheshire`包含一个可选类型`Cat?`对象。语句`cheshire?.disappear()`使用了可选链。`cheshire`变量后面的`?`表示：“检查`cheshire`是否包含值，如果包含，则执行表达式其余部分。”这个简单的语句大致等价于以下代码：\n\
  \n```\nif cheshire != nil {\n    cheshire!.disappear()\n}\n```\n\n可选链也可以用于安全地设置属性，如下所示：\n\
  \n```\ncheshire?.directions = \"Return to the Tulgey woods.\"\n```\n\n当与属性或方法的返回值一起使用时，可选链会将任何属性或返回值转变为可选类型。在以下示例中，变量`words`变成了可选类型：\n\
  \n```\nlet words = cheshire?.quote\n```\n\n常量`words`是一个`String?`。属性`quote`不是可选的，但由于它是通过链式调用（chaining）可选调用的，因此表达式变成了可选类型。当求值`cheshire?`时，Swift\
  \ 会检查它是否为`nil`。如果是`nil`，Swift 会停止求值表达式并立即返回`nil`。所以，即使`quote`永远不能返回`nil`值，`cheshire?.quote`也可能返回`nil`。在下一个示例中，可选链与一个可选属性复合使用：\n\
  \n```\nlet whereToGo = cheshire?.directions\n```\n\n变量`whereToGo`仍然是一个`String?`。属性`directions`也是可选的，但\
  \ Swift 中没有“可选的可选”。此表达式将返回`nil`或一个`String`。如果返回`nil`，则无法（除非你去检查）知道是因为`cheshire`是`nil`还是`directions`是`nil`。可选链可以像你希望的那样嵌套多层，如下例所示：\n\
  \n```\nclass Mouse {\n    func recitePoem() { }\n}\nclass Hatter {\n    var doorMouse:\
  \ Mouse?\n    func changePlaces() { }\n}\n\ncheshire?.friend?.doorMouse?.recitePoem()\n\
  ```\n\n最后一条语句仅当`cheshire`、它的`friend`属性以及该属性的`doorMouse`属性都有值时，才会调用`Mouse`对象的`recitePoem()`函数。如果任何一个不存在，该语句什么也不做。\n\
  \n虽然不太明显，但可选链会将*任何*语句转变为可选类型。你可能不认为`recitePoem()`函数会返回值，但对 Swift 来说它确实会，并且你可以利用这一点。\n\
  \n这有点深奥，但在 Swift 中，`Void`类型仍然是一种类型，并且它返回一个值，即空元组（`()`），一个没有值的值。因此，当`recitePoem()`函数变成可选类型时，你可以测试它是返回了空值还是`nil`。（我说过这有点深奥。）以下示例演示了这一点：\n\
  \n```\nif cheshire?.friend?.doorMouse?.recitePoem() != nil {\n    // cheshire has\
  \ a friend with a doormouse that recited a poem\n}\n```\n\n如果所有变量和属性都包含值，则`recitePoem()`函数会执行并返回\
  \ void 元组（`()`）。如果任何一个为`nil`，表达式就会停止并结果为`nil`。你可以测试是得到了 void 结果还是`nil`，这告诉你函数是否执行了。看，这并没有那么复杂。\n\
  \n## 可失败的初始化器\n\n初始化器也可以是可选的。这些被称为*可失败的初始化器（failable initializers）*。可失败的初始化器可能会决定它无法创建特定的对象、结构体、枚举器或你试图构建的任何东西。它会中止新类型的构造并返回`nil`。你在前面的章节中使用过可失败的初始化器。在\
  \ MyStuff 应用中，你使用类似于以下的代码从项目中的资源创建了一个`UIImage`：\n\n```\nlet noSuchImage = UIImage(named:\
  \ \"SevenImpossibleImages\")\n```\n\n名为`SevenImpossibleImages`的资源完全有可能不在你的应用包中。`UIImage`无法构造，并且可选类型`noSuchImage`被设置为`nil`。\n\
  \n你可以使用`init?`函数名编写自己的可失败初始化器。以下示例展示了一个代表地图上兴趣点的类。它有一个已知位置及其坐标的数据库。如果兴趣点未知，则无法创建该对象。\n\
  \n```\nclass PointOfInterest {\n    let name: String\n    let location = CLLocationCoordinate2D(latitude:\
  \ 0, longitude: 0)\n\n    init?(placeName name: String) {\n        self.name = name\n\
  \        if let loc = locationForPointOfInterest(name) {\n            self.location\
  \ = loc\n        } else {\n            return nil\n        }\n    }\n}\n\nlet castle\
  \ = PointOfInterest(placeName: \"Mystery Castle\")\n```\n\n初始化器函数决定对象是否可以创建。如果不行，它故意返回`nil`，表明初始化失败。这使得初始化器的返回类型为`PointOfInterest?`。\n\
  \n## 隐式解包\n\n我把最糟糕的留到了最后。Swift 允许你通过声明一个隐式解包变量（implicitly unwrapped variable）直接回到上个世纪，如下所示：\n\
  \n```\nvar dangerWillRobinson: String!\n```\n\n变量`dangerWillRobinson`是一个可选类型，但没有正常的安全保障。你仍然可以将其视为可选类型——与`nil`比较、条件绑定以及使用可选链——但这不是必须的。如果你直接使用变量名，它会被自动解包。如果它是`nil`，结果可能从有趣到灾难性。\n\
  \n隐式解包变量有其用武之地，但它们应该是你的最后选择。按偏好顺序：\n\n*   只要有可能，就使用非可选变量。Swift 确保它们始终包含一个有效值。这消除了所有歧义。\n\
  *   对于可能合理缺失的值，或者你需要在该变量可以初始化之前很久就创建它，请使用可选类型。\n*   将隐式解包可选类型保留给那些不能立即初始化，但你可以合理保证在使用前会是有效的值。\n\
  \n\n\nInterface Builder 使用了隐式解包变量。每当你使用 `@IBOutlet` 修饰符时，它都要求变量进行隐式解包。到目前为止，你在本书中已经无数次看到过这样的用法，例如：\n\
  \n```\n@IBOutlet var label: UILabel!\n```\n\n当视图控制器对象被创建时，这个变量无法被设置。但是当场景从故事板加载时，它会通过连接（outlet\
  \ connection）被设置。因此，当你的代码执行时，它（应该）会有一个值，并且你的代码可以安全地假设它有一个值。\n\n解包有一些优点。如果谨慎使用，它可以通过将可选类型重新变回非可选值来简化代码。回顾一下\
  \ `UIImage` 的问题，假设你有一个作为应用永久组成部分的图像资源。没有理由假设该图像无法加载。你可以使用解包将其变回你所知道的常规值，如下列代码所示：\n\
  \n```\nlet placeholderImage = UIImage(\"placeholder\")!\n```\n\n这里的 `!` 盲目地解包了可选类型并返回其值，我们相信这个值总是有效的。\n\
  \n如果你对隐式解包变量感到不安，可以考虑在代码中添加 `assert` 语句。以下代码假设 `CheshireCat` 资源存在，但通过添加 `assert`\
  \ 语句来规避风险：\n\n```\nvar cheshireImage: UIImage! = UIImage(named: \"CheshireCat\"\
  )\nassert(cheshireImage != nil, \"无法加载 CheshireCat 资源\")\ncatView.image = cheshireImage\n\
  ```\n\n如果 `CheshireCat` 图像由于某种原因无法加载，`assert` 条件将为假，程序会立即停止，你就能立刻发现这个问题——至少在开发过程中会如此。\n\
  \n## 类型转换\n\n有时，你可能会发现自己有一个基类类型的变量，比如 `IceCream`，而它实际上包含了一个 `BananaSplit` 对象。你可能需要将其作为\
  \ `BananaSplit` 对象与之交互，从而访问特定子类的属性和方法。将一种类型视为另一种类型被称为*类型转换*。Swift 提供了工具来探查变量的类并将其转换为另一种类型。\n\
  \n如果你只想知道一个对象的类是否是某个特定子类，可以使用 `is` 操作符。下面的示例创建了三个不同类的对象，它们都与 `IceCream` 类兼容：\n\n\
  ```\nlet cone = IceCream()\nlet sundae = IceCreamSundae()\nlet split = BananaSplit()\n\
  \nlet mysteryDessert1: IceCream = cone\nlet mysteryDessert2: IceCream = sundae\n\
  let mysteryDessert3: IceCream = split\n\nmysteryDessert1 is IceCreamSundae   //\
  \ false\nmysteryDessert2 is IceCreamSundae   // true\nmysteryDessert3 is IceCreamSundae\
  \   // true\n\nmysteryDessert1 is BananaSplit      // false\nmysteryDessert2 is\
  \ BananaSplit      // false\nmysteryDessert3 is BananaSplit      // true\n```\n\n\
  `BananaSplit` 是 `IceCreamSundae` 的子类，而 `IceCreamSundae` 又是 `IceCream` 的子类。所有三个对象都被赋值给了\
  \ `IceCream` 变量。如果对象实际是给定类型的类或其子类，`is` 操作符就求值为 `true`。`cone` 既不是 `IceCreamSundae`\
  \ 也不是 `BananaSplit`。`sundae` 是 `IceCreamSundae`，但不是 `BananaSplit`。`split` 既是 `BananaSplit`\
  \ 又是 `IceCreamSundae`。\n\n**注意：** Swift 不允许你写出同义反复的表达式 `split is BananaSplit`。`split`\
  \ 变量已经是 `BananaSplit` 类型，所以根据定义，它必定是一个 `BananaSplit` 对象（或其子类）。\n\n## 向下转型\n\n了解对象的类很有意思，但你实际想做的是使用特定子类型的属性和函数。当你将\
  \ `split` 赋值给 `mysteryDessert3` 时，Swift 对对象进行了*向上转型*；它拿了一个 `BananaSplit` 对象，并将其存储在了更通用（但兼容）的\
  \ `IceCream` 变量中。要将 `mysteryDessert3` 再次作为 `BananaSplit` 对象来操作，你必须对对象进行*向下转型*，如下所示：\n\
  \n```\nlet mySundae = mysteryDessert2 as? IceCreamSundae\n```\n\n`as?` 操作符检查对象并确定其是否与目标类型兼容。如果是，它就向下转型该对象并返回同一个对象，只是其类型变为\
  \ `IceCreamSundae`。现在，你可以对 `mySundae` 做任何你曾对 `sundae` 能做的事情。`as?` 操作符，你可能已经猜到了，返回一个可选类型。如果对象无法安全地向下转型，则返回\
  \ `nil`。从技术上讲，表达式 `object as? Type` 的类型是 `Type?`。以下代码演示了向下转型的使用。它来自 第 11 章 的 Shapely\
  \ 应用。\n\n```\n@IBAction func addShape(sender: AnyObject!) {\n    if let button =\
  \ sender as? UIButton {\n        ...\n    }\n}\n```\n\nObjective-C 不像 Swift 那样使用强类型。因此，Objective-C\
  \ 对象中的很多参数和属性只是 `AnyObject`——一种可以持有任何对象引用的泛型类型。为了有用，你必须将值向下转型为某种有意义的类型。在 `addShape(_:)`\
  \ 中，`sender` 参数是发送动作的 `UIControl`。我们只将 `UIButton` 对象连接到了这个动作，所以 `sender` 应该是一个 `UIButton`（或某个子类）。`if\
  \ let button = sender as? UIButton` 检查确保它是一个 `UIButton`，向下转型它，将其绑定到 `button` 变量，并执行你的代码，所有这些都在一条语句中完成。如果由于某种原因，`sender`\
  \ 不是一个 `UIButton`，你的动作不会做太多事情——但也不会崩溃。\n\n**注意：** 如果 `object` 是 `nil`，表达式 `object\
  \ as? Type` 也会返回 `nil`。在 `let button = sender as? UIButton` 语句中，`sender` 是一个隐式解包可选类型。该语句也能保护你的代码免受\
  \ `sender` 为 `nil` 的可能性影响。\n\n一个巧妙的技巧是将可选向下转型操作符与可选链结合使用，像这样：\n\n```\n(mysteryDessert2\
  \ as? IceCreamSundae)?.nuts = true\n```\n\n向下转型操作符有一个危险的“兄弟”：强制向下转型操作符。它的工作方式与 `as?`\
  \ 类似，但它不返回可选类型；它只是假设向下转换会成功，就像 `!` 假设你的可选类型包含一个值一样。在你绝对确定向下转型会成功的情况下使用它，如下所示：\n\n\
  ```\nlet string = \"We want ice cream.\"\nlet screaming = (string as NSString).uppercaseString\n\
  \nif mysteryDessert2 is IceCreamSundae {\n    let mySundae = mysteryDessert2 as\
  \ IceCreamSundae\n    mySundae.nuts = true\n}\n```\n\n将 `String` 视为 `NSString` 或将\
  \ `Array` 视为 `NSArray` 总是安全的。在第二个示例中，`if` 语句已经确定性地判明了 `mysteryDessert2` 是一个 `IceCreamSundae`，因此表达式\
  \ `as IceCreamSundae` 总是会成功。不过，我建议使用绑定和可选向下转型来做这件事，因为它更短、更安全且更易读。\n\n## 向下转型集合\n\
  \n数组或字典只是另一种类型，你可以像向下转型对象一样向下转型集合。Objective-C 的数组和字典不像 Swift 那样有类型。因此，每当你从 Objective-C\
  \ 对象接收到一个集合时，它都会是一个泛型的 `[AnyObject]` 数组或 `[AnyObject:AnyObject]` 字典。你可以将其向下转型为更具体的类型，如下所示。（你可以在\
  \ `Learn iOS Development Projects` → `Ch 20` → `Casting.playground` 文件中找到更多示例。）\n\
  \n```\nUIImagePickerController.availableMediaTypesForSourceType(.PhotoLibrary) as\
  \ [String]\n```\n\n`availableMediaTypesForSourceType(_:)` 函数返回一个典型的 `[AnyObject]`\
  \ 类型 Objective-C 数组。要将其用作 `String` 对象数组，你需要将其向下转型为 `[String]`。\n\n**注意：** 当你向下转型一个集合时，Swift\
  \ 会检查集合中*每个*元素的类型，以确保它们都与目标类型兼容。\n\n\n\n在`SpaceSalad`项目中（来自第 14 章），你已经完成过此操作。一个触摸事件包含所有触摸点的集合，这些点是`UITouch`对象。但由于`UIEvent`是一个\
  \ Objective-C 类，`allObjects`是一个泛型数组。你通过以下表达式将其转换为`UITouch`对象数组：\n\n```\nlet fingers\
  \ = touches.allObjects as [UITouch]\n```\n\n## 值 vs 引用 vs 常量 vs 变量\n\nSwift 类型分为两种：值类型和引用类型。**值类型**是存储值的变量，如整数或结构体，十分简单。**引用类型**是存储值引用的变量，类就是引用类型。持有`UILabel`对象的变量并不直接包含该`UILabel`对象，该对象分配在动态内存中，变量中存储的是指向该对象的*引用*。\n\
  \n理解这一点之所以重要，是因为当你在参数间传递值或将值存入其他变量时，行为会不同。以下是基本规则：\n\n-   值类型总是被复制。将`Int`变量作为参数传入函数时，形参将是该整数值的一份*副本*。修改原始整数变量或形参，不会影响对方。\n\
  -   引用类型始终指向同一个对象。将对象变量传入函数时，形参会引用同一个对象。对该对象的所有修改，会通过所有持有其引用的变量可见。\n-   尽管字符串、数组和字典在底层是对象（悄悄告诉你），Swift\
  \ 仍将它们视为值类型。如果你将数组传递给函数并修改它，你修改的是数组的副本。\n\n了解何时复制值、何时传递值的引用有时很重要，尤其对于可变对象。例如，如果你使用`NSMutableSet`这样的集合对象，将其传给函数后函数修改了该集合，函数返回时你的集合也会被修改；但如果你使用的是数组（值类型），就不会发生这种情况。\n\
  \n想象另一个场景：你创建了一个`NSMutableAttributedString`，然后用这个格式化字符串设置`UIButton`。按钮现在持有同一个可变属性字符串的引用。如果你随后再次修改属性字符串对象，会发生什么？\n\
  \n实际上，什么也不会发生。Cocoa Touch 框架的作者并不愚蠢，他们知道这可能会引发问题。有两种技术可以防止这种混淆，你将在整个 iOS 开发中看到它们。\n\
  \n许多基本类型是不可变的。`UIColor`、`UIFont`、`NSURL`以及许多其他类都创建不可变对象。一旦你拥有一个`UIColor`对象，就不能更改它的颜色。其优势在于，你可以在任意多的地方使用该对象的引用，因为没人能更改它，所以它不会影响任何其他地方的使用。\n\
  \n`UILabel`类中的`attributedString`等属性在设置时会复制对象。因此当你为`UIButton`的`title`设置`attributedString`时，`UIButton`对象会复制你的属性字符串并保留副本。之后你可以自由修改原始字符串，不会影响按钮。\n\
  \n在你的代码中也应使用这些技巧。如果你不希望某个参数或属性受后续对象修改的影响，要么在获取对象时复制它，要么使用不可变对象。Swift 有一个特殊的`@NSCopying`关键字，可以添加到存储属性中，如下所示。它会在设置属性时创建对象的副本。\n\
  \n```\nclass SafeClass: NSObject {\n    @NSCopying var fancyTitle: NSAttributedString?\n\
  }\n```\n\n## `let`和`var`引用\n\n在 Swift 中，`let`创建常量（不可变值），`var`创建变量（可变值）。那么，为什么可以写出以下代码？\n\
  \n```\nlet button = sender as UIButton\nbutton.enabled = false\n```\n\n`button`是一个常量`UIButton`对象。为什么可以修改`UIButton`？因为`button`是一个指向可变`UIButton`对象的常量*引用*。你可以改变变量所引用的按钮对象，但不能改变变量本身，使其后续指向另一个不同的`UIButton`对象。\n\
  \n正因如此，在整个 Swift 中你会看到`let`被广泛用于你实际上打算修改的对象。相反，你不能写出以下代码：\n\n```\nlet companyName\
  \ = \"Yahoo\"\ncompanyName.append(Character(\"!\"))   // <-- 无效，companyName 不可修改\n\
  ```\n\n在 Swift 中，字符串是值类型。`let`字符串是不可变的，无法更改。对于数组和字典也是如此。但这不适用于 Objective-C 集合，它们是普通对象。`let`引用的`NSMutableArray`仍然是可修改的。\n\
  \n## `var`参数\n\n通常情况下，函数调用的参数是常量，参数值不能在函数体内修改。我猜你可能没注意到这一点。这是因为函数的参数通常是函数执行的输入，你利用输入做某事，很少对输入本身做修改。但有两种技术可以让你做到这一点。\n\
  \n第一种是使用`var`关键字声明可变参数。这不会改变参数的工作方式，但参数值在函数体内是可变的。以下示例来自`Learn iOS Development Projects`\
  \ ![image](img/arrow.jpg) `Ch 20` ![image](img/arrow.jpg) `References.playground`文件：\n\
  \n```\nfunc pad(var # string: String, with char: Character, var # count: Int) ->\
  \ String {\n    while count > 0 {\n        string.append(char)\n        count--\n\
  \    }\n    return string\n}\n```\n\n通常，你不能在`string`参数上使用`append(_:)`函数，也不能递减`count`参数。通过指定它们为`var`参数，它们变成了可变的局部变量。\n\
  \n注意，`string`参数是一个值参数，在函数调用时仍会被复制。因此函数中修改的字符串并不是传入的原始字符串。你可以通过以下示例验证：\n\n```\nlet\
  \ originalString = \"Yahoo\"\nlet paddedString = pad(string: originalString, with:\
  \ \"!\", count: 4)\n```\n\n这段代码执行后，`originalString`仍然是“Yahoo”。但如果你确实想要修改原始字符串呢？也有办法实现。\n\
  \n## 值的引用（`inout`）\n\n你已经看到闭包如何创建对现有值的引用，即使是值类型。你可以在函数参数中做类似的事情。如果用`inout`关键字标记参数，它会将你的值参数转换为引用参数。示例如下：\n\
  \n```\nfunc padSurPlace(inout # string: String, with char: Character, var # count:\
  \ Int) -> String {\n    while count > 0 {\n        string.append(char)\n       \
  \ count--\n    }\n    return string\n}\n```\n\n`inout`关键字将`string`参数转换为对`String`值的引用。调用函数时，需要在变量前加上`&`（与号），如下所示。这是你传递变量引用（而非值副本）的视觉提示。\n\
  \n```\nvar mutableString = \"Yahoo\"\npadSurPlace(string: &mutableString, with:\
  \ \"!\", count: 3)\n```\n\n当`padSurPlace(string:,with:,count:)`函数执行时，其`string`参数引用的是你传入的变量。任何修改都会影响原始变量。这段代码执行后，`mutableString`的值将是“Yahoo!!!”这适用于任何类型。\n\
  \n**注意**：如果将参数设为`inout`，它只能与可变变量一起使用，不能传递常量或字面值作为该参数。\n\n## 使用 C 和 Objective-C\n\
  \n\n\nSwift 与 C 和 Objective-C 的协作天衣无缝，你几乎不需要深入了解其中任何一门语言，就能用 Swift 编写应用。事实上，本书至此你所使用的几乎所有内容，除了你自己用\
  \ Swift 编写的部分外，很可能都是 Objective-C 类或 C 函数。\n\nSwift 可以像使用 Swift 类一样使用任何 Objective-C\
  \ 类。Objective-C 也可以将大多数 Swift 类当作 Objective-C 类来使用。如果你向 Objective-C 项目中添加 Swift\
  \ 代码，或反之亦然，Xcode 会自动生成转换接口，将你的 Swift 类描述给 Objective-C，并将你的 Objective-C 类描述给 Swift。\n\
  \n这里我只想提两点。如果你还需要了解 Swift、Objective-C 和 C 三者如何协同工作的其他知识，请参考 Apple 的 *Using Swift\
  \ with Cocoa and Objective-C*，这本书也在 iBooks 上免费提供。它是 *The Swift Programming Language*\
  \ 的姊妹篇，将解答你所有关于跨语言的问题，甚至可能包括一些你没想到的问题。\n\n### 无缝桥接\n\n在 Swift 中，你可以无缝地将 Objective-C\
  \ 方法与 Core Foundation 中的 C 函数一起使用。这意味着你可以轻松混合使用 Swift 值、Objective-C 对象和 Core Foundation\
  \ 类型。其中有几种类型是重叠且可互换的。表 20-4 列出了等价的 Swift、Objective-C 和 C 类型。\n\n表 20-4. 无缝桥接类型\n\
  \n| Swift | Objective-C | C |\n| --- | --- | --- |\n| `Array` | `NSArray` | `CFArrayRef`\
  \ |\n|   | `NSAttributedString` | `CFAttributedStringRef` |\n|   | `NSCharacterSet`\
  \ | `CFCharacterSetRef` |\n|   | `NSData` | `CFDataRef` |\n|   | `NSDate` | `CFDateRef`\
  \ |\n| `Dictionary` | `NSDictionary` | `CFDictionaryRef` |\n|   | `NSMutableArray`\
  \ | `CFMutableArrayRef` |\n|   | `NSMutableAttributedString` | `CFMutableAttributedStringRef`\
  \ |\n|   | `NSMutableCharacterSet` | `CFMutableCharacterSetRef` |\n|   | `NSMutableData`\
  \ | `CFMutableDataRef` |\n|   | `NSMutableDictionary` | `CFMutableDictionaryRef`\
  \ |\n|   | `NSMutableSet` | `CFMutableSetRef` |\n|   | `NSMutableString` | `CFMutableStringRef`\
  \ |\n|   | `NSNumber` | `CFNumberRef` |\n|   | `NSSet` | `CFSetRef` |\n| `String`\
  \ | `NSString` | `CFStringRef` |\n|   | `NSURL` | `CFURLRef` |\n\n这并非完整列表，但包含了常见的类型。你在\
  \ MyStuff 应用中设置图片选择器时（参见第 7 章）已经遇到过这种情况。图片选择器的 `mediaTypes` 属性是一个 URI 类型数组。这些类型在\
  \ Core Foundation 中定义为 `CFStringRef` 值。要在应用中使用它，你需要编写如下代码：\n\n```\npicker.mediaTypes\
  \ = [kUTTypeImage as NSString, kUTTypeMovie as NSString]\n```\n\n`kUTTypeImage`\
  \ 符号是一个 Core Foundation 字符串值，但你只需将其转换为所需类型，就可以在需要 `NSString` 或 `String` 类型的任何地方使用它。\n\
  \n再举一个简单的例子：假设你从一个框架中收到了一个 `CFUUIDRef` 类型（Core Foundation 通用唯一标识符）。你更希望它变成 Swift\
  \ 的 `String` 类型。有一个 Core Foundation 函数可以将 `CFUUIDRef` 转换为 `CFStringRef`。你只需将返回的\
  \ `CFStringRef` 转换为所需类型，如下代码所示：\n\n```\nlet uuid = CFUUIDCreate(nil)\nlet uuidString:\
  \ String = CFUUIDCreateString(nil, uuid) as String\n```\n\n### 方法签名\n\nObjective-C\
  \ 中的方法和 Swift 中的函数都有签名。**签名**是函数名称中用于标识自身的那部分。签名用于将函数调用与函数进行匹配。它们也用作**选择器**，即用于动态选择要执行方法的值。\n\
  \nSwift 签名源于 Objective-C 签名，因此我们先从 Objective-C 开始。以下方法在 Objective-C 的 `UIImage`\
  \ 类中定义：\n\n```\n- (void)drawAtPoint:(CGPoint)point blendMode:(CGBlendMode)mode alpha:(CGFloat)alpha\n\
  ```\n\n将其与 Swift 的 `UIImage` 类中相同的方法进行比较。\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，对给定的英文文本进行专业、准确的中文翻译。\n\
