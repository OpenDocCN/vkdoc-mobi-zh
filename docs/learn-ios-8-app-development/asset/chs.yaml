  \n使用助理编辑器和预览检查您的工作，如图 9-24 所示。如果一切正确，您将看到适用于 4 英寸 iPhone、3.5 英寸 iPhone 和 iPad 的令人满意的按钮布局。\n\
  \n![9781484202098_Fig09-24.jpg](img/9781484202098_Fig09-24.jpg)\n\n图 9-24. 在多台设备上预览按钮布局\n\
  \n您的应用程序可以在截然不同的界面设计之间无缝切换，这仅通过提供替代约束集即可实现。这一切都很有教育意义，但我相信您非常想继续让那些声音按钮工作起来。\n\n\
  ### 制造噪音\n\n返回到常规编辑器和 `ViewController.swift` 文件。完成您的 `bang(_:)` 函数（新代码以粗体显示）。\n\n\
  ```\n@IBAction func bang(sender: AnyObject!) {\n    if let button = sender as? UIButton\
  \ {\n        let index = button.tag-1\n        if index >= 0 && index < players.count\
  \ {\n            let player = players[index]\n            player.pause()\n     \
  \       player.currentTime = 0.0\n            player.play()\n        }\n    }\n\
  }\n```\n\n所有四个按钮发送相同的操作。您使用其 `tag` 属性来确定哪个按钮发送了消息。您的四个按钮的 `tag` 值介于 1 到 4 之间，您将其用作索引（0\
  \ 到 3）来获取该按钮的 `AVAudioPlayer` 对象。\n\n一旦有了按钮的 `AVAudioPlayer`，首先调用其 `pause()` 函数。如果声音正在播放，这将暂停播放；否则不执行任何操作。\n\
  \n然后将 `currentTime` 属性设置为 `0`。此属性是播放器的逻辑“播放头”，指示播放器当前正在播放或即将开始播放的位置（以秒为单位）。将其设置为\
  \ `0` 会“回绕”声音，以便从头开始播放。\n\n最后，`play()` 函数启动声音播放。`play()` 函数是异步的；它启动一个后台任务来播放和管理声音，然后立即返回。\n\
  \n在声音能够播放之前，还有两个细节需要处理。\n\n### 激活音频会话\n\n虽然不是严格必需，但 `AVAudioSession` 类的文档建议您的应用程序在启动时以及音频会话被中断时激活它。您将借此机会同时准备音频播放器对象。您将在\
  \ `activateAudioSession()` 函数中完成此操作，稍后您将添加该函数。在视图首次加载时调用它一次。找到 `viewDidLoad()` 函数并添加该调用（新行以粗体显示）。\n\
  \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    activateAudioSession()\n\
  }\n```\n\n现在编写 `activateAudioSession()` 函数。\n\n```\nfunc activateAudioSession()\
  \ {\n    let active = AVAudioSession.sharedInstance().setActive(true, error: nil)\n\
  \    if active {\n        if players.count == 0 {\n            createAudioPlayers()\n\
  \        }\n    } else {\n        destroyAudioPlayers()\n    }\n    for i in 0..<soundNames.count\
  \ {\n        if let button = view.viewWithTag(i+1) as? UIButton {\n            button.enabled\
  \ = active\n        }\n    }\n}\n```\n\n\n\n第一行获取你应用的音频会话对象（与你之前在`application(_:,\
  \ didFinishLaunchingWithOptions:)`中配置的是同一个对象）。你调用它的`setActive(_:, error:)`函数来激活或重新激活音频会话。\n\
  \n`setActive(_:, error:)`函数在当前音频会话已激活时返回`true`。少数情况下会失败（返回`false`），你的应用应妥善处理这种情况。\n\
  \n在这个应用中，你检查会话是否已激活，然后调用`createAudioPlayers()`来准备`AVAudioPlayer`对象进行播放。如果会话无法激活（这意味着你的应用无法使用任何音频），那么你将销毁之前创建的所有`AVAudioPlayer`对象，并禁用界面中所有音效按钮。\n\
  \n由于你没有连接到这些按钮的插座，你将通过它们的`tag`来获取它们。`viewWithTag(_:)`函数会搜索视图对象的层次结构，并返回第一个与该标签匹配的子视图。你的“猛敲”按钮是唯一具有标签值\
  \ 1、2、3 和 4 的视图。该循环获取每个按钮视图并启用或禁用它。\n\n**提示** 标签是一种管理一组视图对象的便捷方式，无需为每个视图创建插座。\n\n\
  你应用的功能部分现已完成。所谓功能，是指你可以运行应用、播放音乐，并用低劣的打击乐器噪音打扰房间里的其他人，如图 9-25 所示。\n\n![9781484202098_Fig09-25.jpg](img/9781484202098_Fig09-25.jpg)\n\
  \n图 9-25. 可运行的 DrumDub 应用\n\n中断与绕行\n\n在“更广阔的世界”一节中，我描述了那些使你的应用对音频的使用复杂化的多种事件和情况。大多数人讨厌被打断或被迫绕行，我怀疑应用开发者也不例外。但优雅地处理这些事件是精心打造的\
  \ iOS 应用的标志。首先介绍的是中断。\n\n处理中断\n\n当另一个应用或服务需要激活其音频会话时，就会发生*中断*。最常见的中断源是来电和提醒（由闹钟、信息、通知和提醒事项触发）。\n\
  \n处理中断的大部分工作已经为你完成。当你的应用的音频会话被中断时，iOS 会淡出你的音频并停用你的会话。然后，接管会话接管并开始播放用户的铃声或提醒音。你的应用、音频和音乐播放器代理随后会收到“开始中断”消息。\n\
  \n你的应用应做任何适当的事情来响应中断。通常，这不需要做太多。你可能会更新界面以指示你不再播放音乐。大多数情况下，你的应用只需记下它正在做什么，以便在中断结束时能够恢复。\n\
  \n中断可能很短，例如闹钟的几秒钟。或者它们可能非常（非常）长，例如一小时或更久，如果你接听了爱唠叨的梅阿姨的来电。不要对中断将持续多长时间做任何假设；只需等待\
  \ iOS 在中断结束时通知你的应用。\n\n当中断结束时，你的应用将收到“结束中断”消息。这是工作开始的地方。首先，你的应用应显式地重新激活其音频会话。这不是一个严格的要求，但建议这样做。它让你的应用有机会捕获（非常罕见的）音频会话无法重新激活的情况。\n\
  \n然后，你需要恢复播放、重新加载音频对象、更新界面，或你的应用需要做的任何其他事情，以便它再次运行，就像中断发生前一样。在 DrumDub 中，需要做的工作出奇地少，因为默认的音乐和音频播放器行为正是你想要的。尽管如此，仍有一些基本的中断处理你需要添加。\n\
  \n添加你的中断处理程序\n\n可以通过多种方式接收中断通知。你的应用只需观察那些它需要且方便的通知；无需观察所有通知。开始和结束中断消息被发送给以下对象：\n\
  \n*   音频会话中断通知（`AVAudioSessionInterruptionNotification`）的任何观察者\n*   所有音频播放器代理（`AVAudioPlayerDelegate`）\n\
  *   音乐播放器状态变更通知（`MPMusicPlayerControllerPlaybackStateDidChangeNotification`）的任何观察者\n\
  \n决定你希望你的应用如何响应中断，然后实现方便你做到这一点的处理程序。当有东西中断 DrumDub 时，你希望执行以下操作：\n\n*   暂停音乐播放\n\
  *   停止任何正在播放的打击乐器声音（这样它不会在中断结束时恢复）\n\n当中断结束时，你希望 DrumDub 执行以下操作：\n\n*   重新激活音频会话并检查问题\n\
  *   恢复音乐播放\n\n暂停和恢复音乐播放器无需代码。`MPMusicPlayerController`类会自动响应中断来执行此操作。你甚至不需要添加任何代码来更新界面。当音乐播放器被中断时，其`playbackState`变为`MPMusicPlaybackStateInterrupted`，并且你的控制器会收到`playbackStateDidChangeNotification(_:)`调用，从而更新你的播放和暂停按钮。当中断结束时，音乐播放器恢复播放并发送另一个状态变更通知。\n\
  \n因此，DrumDub 唯一非标准的行为是在中断到来时静音任何正在播放的打击乐器声音。这是为了防止中断结束时声音片段的“尾部”再次开始播放（这是默认行为）。开始编写你的`audioInterruption(_:)`函数并在其第一个`case`中处理该情况。\n\
  \n```\nfunc audioInterruption(notification: NSNotification) {\n    if let typeValue\
  \ = \n       notification.userInfo?[AVAudioSessionInterruptionTypeKey] as? NSNumber\
  \ {\n        if let type = AVAudioSessionInterruptionType.fromRaw( \n          \
  \                                      typeValue.unsignedLongValue) {\n        \
  \    switch type {\n                case .Began:\n                    for player\
  \ in players {\n                        player.pause()\n                    }\n\
  ```\n\n列表上的最后一个任务是在中断结束时重新激活音频会话。你已经在`activateAudioSession()`中编写了执行此操作的代码；你只需调用它即可。在第二个`case`中执行此操作。\n\
  \n```\n                case .Ended:\n                    activateAudioSession()\n\
  \            }\n        }\n    }\n}\n```\n\n要获取这些通知，请在`viewDidLoad()`函数中将你的视图控制器添加为观察者（新代码以粗体显示）。\n\
  \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    activateAudioSession()\n\
  \    let center = NSNotificationCenter.defaultCenter()\n    center.addObserver(\
  \ self,\n              selector: \"audioInterruption:\",\n                  name:\
  \ AVAudioSessionInterruptionNotification,\n                object: nil)\n```\n\n\
  处理完棘手的中断问题后，接下来处理绕行（线路变更）。\n\n处理音频线路变更\n\n音频线路是数据到达听众耳膜的路径。你的 iPhone 可能已与汽车扬声器配对。当你下车时，你的\
  \ iPhone 会切换到内置扬声器。当你插入耳机时，它会停止通过扬声器播放，并开始通过耳机播放。这些事件中的每一个都是音频线路变更。\n\n\n\n处理音频线路变更的方式与处理中断完全相同：决定您的应用在每种情况下应执行的操作，然后编写处理器来观察这些事件并实施您的策略。在\
  \ DrumDub 中，您希望实现 Apple 推荐的默认行为：当用户拔掉耳机或断开与外部扬声器的连接时，停止音乐播放。如果这些是游戏中的音效或类似内容，那么让它们继续播放是合适的。但\
  \ DrumDub 的音乐会在耳机拔掉时停止播放，因此乐器声音也应当停止。\n\n音频线路通知由 `AVAudioSession` 对象发布，您需要做的只是观察它们。首先，请求您的\
  \ `ViewController` 对象接收音频线路变更通知。在 `viewDidLoad()` 函数的末尾，添加以下代码：\n\n```\ncenter.addObserver(\
  \ self,\n          selector: \"audioRouteChange:\",\n              name: AVAudioSessionRouteChangeNotification,\n\
  \            object: nil)\n```\n\n现在，添加您的线路变更处理函数。\n\n```\nfunc audioRouteChange(notification:\
  \ NSNotification) {\n    if let reasonValue = \n       notification.userInfo?[AVAudioSessionRouteChangeReasonKey]\
  \ as? NSNumber {\n        if reasonValue.unsignedLongValue == \n           AVAudioSessionRouteChangeReason.OldDeviceUnavailable.toRaw()\
  \ {\n            for player in players {\n                player.pause()\n     \
  \       }\n        }\n    }\n}\n```\n\n该函数首先检查音频线路变更的原因。它从通知的 `userInfo` 字典中获取此信息。如果与\
  \ `AVAudioSessionRouteChangeReasonKey` 关联的值是 `AVAudioSessionRouteChangeReasonOldDeviceUnavailable`，则表示之前激活的音频线路已不可用。这发生在耳机被拔掉、设备从基座连接器移除、无线扬声器系统断开连接等情况。如果是这种情况，它会停止所有四个音频播放器的播放。\n\
  \n至此，这个应用就完成了！请继续运行它，确保一切正常。您需要测试中断和音频线路变更的逻辑，可以执行以下操作：\n\n*  设置闹钟来中断播放\n* 用另一部手机呼叫您的\
  \ iPhone\n* 插拔耳机\n\n在执行这些操作时，在您的 `audioInterruption(_:)` 和 `audioRouteChange(_:)`\
  \ 函数中设置断点，以验证它们是否被调用。在尽可能多的场景下测试您的应用，是应用开发中的一个重要部分。\n\n### 其他音频主题\n\n本章甚至还未涉及音频录制或信号处理的主题。要开始学习这些以及类似的主题，请从《多媒体编程指南》开始。它提供了在\
  \ iOS 中播放、录制和处理音频与视频的概览和路线图。\n\n如果您需要执行高级或底层音频任务（例如分析或编码音频），请参考《Core Audio 概述》。所有这些文档都可以在\
  \ Xcode 的“文档与 API 参考”中找到。\n\n还有另一个值得关注的内容：如果您需要在视图中呈现音频或视频，希望您的应用在后台播放音乐（即当您的应用未运行时），或需要处理远程事件，请查看\
  \ `AVPlayer` 和 `AVPlayerLayer` 类。前者是一个近乎通用的音视频媒体播放器，类似于 `MPMusicPlayerController`\
  \ 和 `AVAudioPlayer`。它稍微复杂一些，但功能也更强大。它可以与 `AVPlayerLayer` 对象结合使用，在视图中呈现视觉内容（电影），因此您可以创建自己的\
  \ YouTube 风格视频播放器。\n\n"
- '# 总结


  声音为您的应用增添了丰富的维度。您已经学会了如何从 iPod 音乐库以及应用中捆绑的资源文件播放和控制音频。您也理解了配置音频会话以及智能处理中断和音频线路变更的重要性。与其他音频源“和谐共处”能够创造出用户喜爱并愿意反复使用的体验。


  但 iOS 界面只有标签、按钮和图像视图吗？请加入下一章，一探究竟。


  ## 练习


  通过使用系统音乐播放器代替应用内音乐播放器，将 DrumDub 更深入地融入 iOS 体验。这需要做一些细微的改动，如下所示：


  * 通过调用 `systemMusicPlayer()` 而非 `applicationMusicPlayer()` 来获取音乐播放器对象。

  * 在视图加载后立即创建并初始化音乐播放器，而不是在用户选择歌曲时才执行延迟初始化。

  * 不要随意更改播放器的设置（如随机播放或重复模式）。请记住，您修改的是用户的 iPod 设置；大多数人不会喜欢您的应用随意摆弄他们的 iPod。


  完成后，DrumDub 将“接入”用户的 iPod 应用。如果用户在启动 DrumDub 时正在播放 iPod 音乐，那么应用启动时就会显示该歌曲。如果用户开始播放一首歌然后退出
  DrumDub，音乐会继续播放。


  您可以在 `Learn iOS Development Projects` ![image](img/arrow.jpg) `Ch 9` ![image](img/arrow.jpg)
  `DrumDub E1` 文件夹中找到我对这个练习的解决方案。


  ---


  ¹暂时降低一个音频源的音量，以便您能听到另一个音频源，这被称为“闪避”。


