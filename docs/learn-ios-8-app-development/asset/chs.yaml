  ### 构建界面


  点击项目导航器中的 `Main.storyboard` 文件。Xcode 的 Interface Builder 编辑器会出现在编辑区域中，如图 2-5 所示。


  ![9781484202098_Fig02-05.jpg](img/9781484202098_Fig02-05.jpg)


  图 2-5. Interface Builder




  `Interface Builder`是苹果应用厨房里的秘密配料。简而言之，它是一个无需编写代码即可在应用中添加、配置和互连对象的工具。你可以在`Interface
  Builder`中定义应用的大部分视觉元素。`Interface Builder`编辑`storyboard`、`xib`和（遗留的）`nib`文件。


  **注意**  现代`Interface Builder`文件的扩展名为`.xib`或`.storyboard`。遗留的`Interface Builder`文件扩展名为`.nib`（读作“nib”），你仍然会听到程序员泛称它们为“nib”文件。`NIB`是`Next
  Interface Builder`的缩写，因为`Xcode`、`Interface Builder`和`Cocoa Touch`框架的根源都可以追溯到史蒂夫·乔布斯的“另一”家公司——`NeXT`。在本书的后续部分，你会看到许多以`NS`开头的类名，这是`NeXTStep`（`NeXT`操作系统的名称）的缩写。


  `Interface Builder`以两种视图显示文件中的对象。左侧（参见图 2-5）是组织成层级列表的对象，称为*大纲*。某些对象可以包含其他对象，就像文件夹可以包含子文件夹一样，大纲反映了这一点。使用展开三角形来显示包含的对象。


  **提示**  大纲可以折叠为仅显示顶级对象图标的*停靠栏*。点击画布窗格左下角（图 2-5 底部中央）的展开按钮，可在两种视图之间切换。


  右侧的视图称为*画布*。在这里你可以找到`Interface Builder`文件中的视觉对象。只有视觉对象（如按钮、标签、图像等）会出现在画布上。不具有视觉方面的对象将仅列出在大纲中。如果一个对象同时出现在两个视图中，你操作哪一个都无关紧要——它们是同一个对象。


  **注意**  如果你一直在学习面向对象编程语言，那么你会知道什么是对象。如果你还不知道什么是对象，请不要惊慌。现在，只需将对象视为乐高积木——它是一个在应用中执行特定任务的离散包，并且可以与其他对象连接以构建更大的东西。如果你想立即了解对象，可以跳到第
  6 章。


