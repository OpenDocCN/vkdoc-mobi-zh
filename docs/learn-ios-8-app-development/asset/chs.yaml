  ## 练习


  `SpaceSalad` 是一款很可爱的游戏，但操作有些生涩。也就是说，培养皿在拖拽时经常抖动。请花点时间尝试解决这个问题。


  精灵的行为是所有物理体属性、几何形状以及作用于这些物理体的力的综合结果。你可以调整的属性不止一两个，每个属性都会对精灵的行为产生微妙——或并不微妙——的影响。


  以下几点值得研究。玩家的拖拽位置与培养皿的拇指节点之间的“弹簧”关节具有 `damping`（阻尼）和 `frequency`（频率）属性。这些属性控制弹簧能量损失的速率以及振荡的快慢。这里的微小变化会显著影响相连节点的交互方式。物理体还有一个
  `mass`（质量）属性，它是其 `area`（面积）和 `density`（密度）属性的综合结果。试着通过降低 `density`（密度）属性来让培养皿“更轻”。试着增加或减少蔬菜的阻力（`linearDamping`）。尝试调整这些属性及其他属性。如果你将蔬菜节点的
  `restitution`（弹性）设置为 `0.0`，游戏玩法会发生什么变化？如果你为不同节点分配不同的弹性值，又会发生什么？这是一款游戏，尽情享受吧！


