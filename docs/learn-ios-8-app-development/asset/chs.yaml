  ### 调试你的应用


  你可以运行应用，它——大致上——能按你设计的方式运行。但是，哇，看起来真糟糕！第一个屏幕上的按钮大小不合适，而且其中一些按钮之间还有奇怪的间隙。第二个屏幕显示了画作，但文本视图却不知所踪。这是怎么回事？


  我不想这么说，但你的应用有 bug。Bug 通常用来描述计算机代码中的缺陷，但应用行为或操作中的任何缺陷都是 bug，你需要修复它。追踪和修复 bug 的过程称为调试。在这个案例中，问题与视图在不同设备上的调整大小或重新定位有关。问题在于你的界面没有适应
  iPhone 的显示尺寸。


  **注意** “bug”一词源于一只飞蛾在一台早期的数字计算机中死亡，导致计算机故障。我没开玩笑。在格蕾丝·赫柏的维基百科页面（`http://en.wikipedia.org/wiki/Grace_hopper`）上，有一张这只飞蛾的照片。


  iOS 8 引入了一种新的界面设计理念。你不再需要为特定设备设计界面，而是为一种“通用”设备设计一次——就是你一直在 Interface Builder 中处理的那个大方块。它并不代表任何特定设备或任何特定方向。它只是一个用于组织视图的容器。当需要在应用中呈现该视图时，必须让视图适应实际的设备、屏幕尺寸、分辨率和方向。你还没有告诉
  iOS 如何做到这一点。


  有许多方法可以适配界面，你将在后续章节中探索大部分内容，但首选的工具是自动布局。自动布局基于一组约束来定位和调整视图对象的大小。约束是一条描述视图几何形状某个方面的规则。约束可以像“此视图的高度为
  20 点”这样简单。约束也可以相对于其他视图，例如“此视图的左边缘距离那个按钮的右边缘正好 8 点”。创建正确的约束集后，无论用户的设备是大、小、高还是宽，iOS
  都能重新组织你的视图。



