  \n### 平面上的精灵\n\n与`UIView`类似，`SKNode`具有 Z 轴顺序。`UIView`按照它们在`subviews`数组中出现的顺序绘制。而`SKNode`则有一个`zPosition`属性。`zPosition`值越大，节点离用户越近。离用户更近的节点绘制在更远节点的上方。SpriteKit\
  \ 中的 Z 轴顺序与你将节点添加到场景的顺序完全无关，并且可以随时更改。\n\n如果两个节点具有相同的`zPosition`值，SpriteKit 不保证哪个节点会绘制在另一个之上。这有时可能很危险。例如，你的背景节点与场景中所有其他节点具有相同的`zPosition`。在某个时候，SpriteKit\
  \ 可能会决定将背景绘制在蔬菜之上，使你的沙拉消失！你肯定不希望发生这种情况。\n\n对于 SpaceSalad，你希望背景是场景中最远的精灵。然后你希望培养皿绘制在背景之上，但在蔬菜之下。你希望蔬菜绘制在培养皿之上，但在烧杯之下。\n\
  \n**提示** 作为规则，重叠的精灵应该具有不同的`zPosition`值。不重叠（或不应重叠）的精灵，比如你的蔬菜，可以共享相同的`zPosition`值。\n\
  \n通过为精灵分配`zPosition`值，将它们组织到不同的平面中。首先，将以下枚举添加到`GameScene.swift`文件中，放在类定义之外，如下所示：\n\
