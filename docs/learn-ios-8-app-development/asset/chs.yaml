  ### 添加关系约束


  这些按钮提出了更大的挑战。你希望它们填满界面，并且均匀平铺。填满界面听起来很像你刚刚添加到图像视图上的约束。而在它们的内边缘之间添加一些间距约束，应该能使它们紧密排列并平铺。听起来是个好计划。


  幸运的是，你可以一步创建所有这些约束。你本质上希望所有四个按钮具有相同的约束：顶部、左侧、右侧和底部边缘应紧贴最近的视图或界面边缘。选中所有四个按钮，然后点击固定约束控件（Pin
  constraints control），如图 2-36 所示。


  ![9781484202098_Fig02-36.jpg](img/9781484202098_Fig02-36.jpg)


  图 2-36。固定按钮


  再次，取消选中`Constrain to Margins`选项。点击支柱（struts）为所有四个视图添加上、左、右、下的距离约束。编辑距离值，使它们都为 0，如图
  2-36 所示。点击`Add 14 Constraints`按钮。


  *瞧*！完成了，对吧？尝试从“解决自动布局问题”控件中选择`Update Frames`命令。你可能会得到类似图 2-37 的结果。


  ![9781484202098_Fig02-37.jpg](img/9781484202098_Fig02-37.jpg)


  图 2-37。一个不可接受的布局解决方案


  有点滑稽的是，图 2-37 中的布局满足了所有约束，但显然不是你想要的。你需要更多或不同的约束才能得到所需的几何形状。思考这个问题，你希望所有四个按钮的大小相同——而且正好有一个用于此目的的约束。


  选中顶部两个按钮，再次点击固定约束控件。当选中多个视图时，`Equal Widths`（等宽）约束变为可用，如图 2-38 所示。勾选`Equal Widths`约束，然后点击`Add
  1 Constraints`按钮。你现在添加了一个约束，告诉自动布局这两个视图的宽度应该相同，无论具体是多少。


  ![9781484202098_Fig02-38.jpg](img/9781484202098_Fig02-38.jpg)


  图 2-38。添加等宽约束


  现在对底部两个按钮重复此操作。继续这个模式，选中左侧两个按钮并添加等高（Equal Heights）约束。对右侧两个按钮重复此操作。


  再次运行你的应用。现在一切看起来都符合预期，如图 2-39 所示。即使在不同的设备上，这些按钮也会根据可用显示区域对齐和调整大小。


  ![9781484202098_Fig02-39.jpg](img/9781484202098_Fig02-39.jpg)


  图 2-39。使用约束平铺的按钮


  这不是解决这个问题的唯一方法。事实上，我能想到至少五组不同的约束可以实现相同的布局。就像编程一样，没有哪一组约束是“正确”的。某些约束集可能比其他约束集更优雅，但最终它们要么有效，要么无效。关于约束说得够多了，让我们来收尾这个应用。


  ### 完成你的应用


  返回到 Xcode 工作区窗口，点击工具栏中的`Stop`按钮停止你的应用。你可以通过为其他三位艺术家重复“添加新场景”部分中的步骤来完成应用。但这对我来说听起来太像工作了。


  选择 Remedios Varo 的视图控制器并将其复制到剪贴板，如图 2-40 所示。点击画布的空白区域（以取消选中任何对象）并粘贴三份视图控制器的副本。排列它们使其不重叠。


  ![9781484202098_Fig02-40.jpg](img/9781484202098_Fig02-40.jpg)


  图 2-40。复制第一个视图控制器


  视图控制器中的所有内容都被复制了。没有被复制的是视图控制器之外的对象和连线（segues）。通过`Control`+点击或右键点击其他按钮，并将每个按钮连接到新的视图控制器之一，再创建三个连线，如图
  2-41 所示。和之前一样，选择显示连线（show segue）。


  ![9781484202098_Fig02-41.jpg](img/9781484202098_Fig02-41.jpg)


  图 2-41。将按钮连接到新的视图控制器


  现在，用与之关联的艺术家的信息编辑新控制器的内容。从连接到`Key Sage`按钮的场景开始。按如下方式编辑其内容：


  1.  选中图像视图，将其`Image`属性更改为`KeySage2`。

  2.  找到`Prose – Kay Sage`文本文件，将文本复制到文本视图对象中。

  3.  选中视图控制器对象，将其标题更改为`Kay Sage`。


  对其余两个视图控制器重复此操作，使用与所连接按钮相对应的图像、文本和标题。完成后，你的设计应如图 2-42 所示。


  ![9781484202098_Fig02-42.jpg](img/9781484202098_Fig02-42.jpg)


  图 2-42。完成的应用设计


  现在运行你的应用，确保一切正常，如图 2-43 所示。


  ![9781484202098_Fig02-43.jpg](img/9781484202098_Fig02-43.jpg)


  图 2-43。可运行的超现实主义应用


  这是一个相当简单的应用，但在宣布完成之前，你仍然需要测试许多内容。




  - 检查所有屏幕布局在不同设备上是否美观。

  - 确保每个按钮都能正确跳转到对应的屏幕。

  - 测试文本是否正确且可以滚动。

  - 检查所有标题。


  一切正常？那么你的第一个 iOS 应用就成功了！


