  \ 初始化函数的全部目的就是创建和配置一个新的 `ShapeView` 对象。现在这些工作大部分都在你的新 Interface Builder 文件中完成了。\n\
  \n## 连接手势识别器\n\n回到 `SquareShape.xib` 文件，现在是添加手势识别器的时候了。从对象库中，拖出一个平移手势识别器，并将其放入 Shape\
  \ View 对象中，如 图 15-15 所示。选择该识别器对象，并使用属性检查器将其最小和最大触摸次数设置为 `1`。\n\n![9781484202098_Fig15-15.jpg](img/9781484202098_Fig15-15.jpg)\n\
  \n图 15-15. 添加平移手势识别器\n\n\n\n切换到连接检查器，将其“已发送操作”（Sent Action）连接到视图控制器占位符中的`moveShape:`操作，如图\
  \ Figure 15-16 所示。\n\n![9781484202098_Fig15-16.jpg](img/9781484202098_Fig15-16.jpg)\n\
  \nFigure 15-16. 连接平移手势识别器的操作\n\n你现在已经创建了一个只能识别单指拖拽手势的平移手势识别器。它被附加到形状视图对象上，并在触发时向视图控制器发送`moveShape:`操作。生成的手势识别器对象与你在`ViewController`的`addShape(_:)`函数中创建、配置和连接的对象完全相同。\n\
  \n按如下方式添加其他三个手势识别器：\n\n1.  将一个捏合手势识别器（Pinch Gesture Recognizer）拖入形状视图。\n    1. \
  \ 将其已发送操作连接到视图控制器的`resizeShape:`操作。\n2.  将一个轻拍手势识别器（Tap Gesture Recognizer）拖入形状视图。\n\
  \    1.  将其“轻拍次数”（Taps）设置为`2`。\n    2.  将其“触摸点数”（Touches）设置为`1`。\n    3.  将其已发送操作连接到`changeColor:`操作。\n\
  3.  将一个轻拍手势识别器拖入形状视图。\n    1.  将其“轻拍次数”设置为`3`。\n    2.  将其“触摸点数”设置为`1`。\n    3.\
  \  将其已发送操作连接到`sendShapeToBack:`操作。\n\n你在`addShape(_:)`函数中编写的大部分代码现在已通过 Interface\
  \ Builder 复制。有两个步骤无法在 Interface Builder 中完成；你将稍后在代码中处理它们。\n\n---\n\n构建你的形状工厂（Shape\
  \ Factory）\n\n你的形状工厂对象定义了一些需要连接到形状视图和所选手势识别器的输出口（outlets）。选择`SquareShape.xib`文件，选择文件所有者（File’s\
  \ Owner）（如果你重命名了它，则选择形状工厂），并使用连接检查器将`shapeView`、`dblTapGesture`和`trplTapGesture`输出口连接到各自的对象，如图\
  \ Figure 15-17 所示。保存文件。（说真的，通过选择 File ![image](img/arrow.jpg) Save 来保存文件；这很重要。）\n\
  \n![9781484202098_Fig15-17.jpg](img/9781484202098_Fig15-17.jpg)\n\nFigure 15-17.\
  \ 连接工厂的输出口\n\n**提示** 确保将正确的输出口连接到正确的对象，因为两个对象在轮廓中都以“轻拍手势识别器”（Tap Gesture Recognizer）出现。如果你有容易混淆的\
  \ Interface Builder 对象，请使用身份检查器（identity inspector）将对象的标签更改为更具描述性的名称。在 Figure 15-17\
  \ 中，我将它们的标签更改为“双击…”（Double Tap…）和“三击…”（Triple Tap…），这样我就能区分它们了。对象标签是装饰性的，不会以任何方式改变你的\
  \ Interface Builder 设计的功能。\n\n---\n\n抱歉用了这个双关语——尚未解决的一个方面是正方形、长方形、圆形和椭圆形形状之间的差异。如果你还记得，`init(shape:,origin:)`会为长方形和椭圆形形状创建一个\
  \ 100×50 点的视图，而为其他所有形状创建一个 100×100 点的视图。在这个版本中，你将使用两个 Interface Builder 文件来复制该逻辑。`ShapeFactory`将选择加载哪一个。\n\
  \n首先创建第二个 Interface Builder 文件。选择`SquareShape.xib`文件，然后选择 Edit ![image](img/arrow.jpg)\
  \ Duplicate 命令，如图 Figure 15-18 所示。\n\n![9781484202098_Fig15-18.jpg](img/9781484202098_Fig15-18.jpg)\n\
  \nFigure 15-18. 创建`RectangleShape.xib`文件\n\n将文件命名为`RectangleShape`。选择新文件，选择形状视图对象，并使用大小检查器（size\
  \ inspector）将形状视图的高度更改为`50`。现在你有两个 Interface Builder 文件，一个生成 100×100 的视图，另一个创建 100×50\
  \ 的视图。\n\n现在切换到`ShapeFactory.swift`文件。添加一个类方法，该方法将根据给定的形状选择加载哪个 Interface Builder\
  \ 文件（`SquareShape`或`RectangleShape`），如下所示：\n\n```\nclass func nibNameForShape(shape:\
  \ ShapeSelector) -> String {\n    switch shape {\n        case .Rectangle, .Oval:\n\
  \            return \"RectangleShape\"\n        default:\n            return \"\
  SquareShape\"\n    }\n}\n```\n\n---\n\n加载一个 Interface Builder 文件\n\n你现在已经准备好通过加载一个\
  \ Interface Builder 文件来创建你的形状视图和手势识别器对象。（是时候了！）添加`-loadShape:forViewController:`方法。\n\
  \n```\nfunc load(# shape: ShapeSelector, inViewController viewController: UIViewController)\
  \ \n                                                         -> ShapeView {\n  \
  \  let placeholders =  [ \"viewController\": viewController ]\n    let options =\
  \  [ UINibExternalObjects: placeholders ]\n    NSBundle.mainBundle().loadNibNamed(\
  \ ShapeFactory.nibNameForShape(shape),\n                                 owner:\
  \ self,\n                               options: options)\n    assert(view != nil,\
  \ \"shape view not connected in xib file\")\n    view.shape =  shape\n    dblTapGesture.requireGestureRecognizerToFail(trplTapGesture)\n\
  \    return view!\n}\n```\n\n前两个语句准备将视图控制器作为加载 Interface Builder 文件时的占位符对象。你可以根据需要传递任意数量的占位符对象；只需确保它们的类和标识符与你之前在\
  \ Interface Builder 文件中定义的外部对象一致。\n\n第三个语句是神奇发生的地方。`loadNibNamed(_:,owner:,options:)`函数在你的应用包中搜索具有该名称的\
  \ Interface Builder 文件。名称（`SquareShape`或`RectangleShape`）由你之前添加的`nibNameForShape(_:)`函数确定。`owner`参数成为文件所有者占位符对象。`options`参数是一个特殊选项的字典。在本例中，唯一的特殊选项是额外的占位符对象（`UINibExternalObjects`）。\n\
  \n当调用`loadNibNamed(_:,owner:,options:)`时，所有者以及任何额外的占位符对象会取代文件的所有者以及文件中定义的相应外部对象。文件中的对象被创建，对象的属性根据你编辑的属性进行设置，最后所有的输出口和操作连接都被建立起来。\n\
  \n**提示** 如果你有需要在 Interface Builder 文件创建对象时执行的代码，请重写你对象的`awakeFromNib()`函数。当加载一个\
  \ Interface Builder 文件或场景时，它创建的每个对象都会收到一个`awakeFromNib()`调用。这发生在所有属性和连接都已设置之后。\n\
  \n该函数返回一个数组，其中包含文件中创建的所有顶级对象。你可以通过此数组或通过你连接到占位符的输出口来访问文件创建的对象。在这个应用中，你使用了后一种技术。\n\
  \n**注意** 创建`ShapeFactory`类的主要原因是为了提供一个所有者对象，该对象具有能方便地提供对你感兴趣的形状视图和识别器对象引用的输出口。另一种解决方案是让视图控制器成为文件的所有者，然后遍历返回的顶级对象数组以找到形状视图和识别器对象。\n\
  \n最后两个语句处理了无法在 Interface Builder 中完成的两个步骤。视图的`shape`属性被设置，并且双击/三击依赖关系被建立。\n\n---\n\
  \n替换代码\n\n切换到`ViewController.swift`文件。找到`addShape(_:)`函数，并将以编程方式创建新的`ShapeView`对象的代码替换为以下内容（修改过的代码以粗体显示）：\n\
  \n```\n@IBAction func addShape(sender: AnyObject!) {\n    if let button =  sender\
  \ as? UIButton {\n        if let shapeSelector =  ShapeSelector(rawValue: button.tag)\
  \ {\n            let shapeView = ShapeFactory().load(shape: shapeSelector,\n   \
  \                                  inViewController: self)\n```\n\n\n\n`ShapeFactory`是一个辅助类的例子。辅助类是一种对象，其唯一目的是协助其他对象完成某些任务。这些通常是不适合那些其他类的目的或职责的逻辑。\n\
  \n现在，进入有趣的部分。找到`addShape(_:)`中创建、配置并连接四个手势识别器的其余代码，并全部删除。你现在不再需要这些。所有四个手势识别器都已经通过\
  \ Interface Builder 文件创建、配置并连接到视图和视图控制器。\n\n运行完成后的应用并观察结果。你应该无法区分这个版本的 Shapely 与第\
  \ 11 章中的版本有何不同，这正是关键所在。这个练习虽然简单，但它演示了直接使用 Interface Builder 文件的所有关键方式，以及它们的优缺点。\n\
  \n- 在 Interface Builder 中，对象很容易创建、配置和连接。这减少了需要编写的代码量，节省了时间，并可能减少错误。（这是一个优点）。\n-\
  \ 某些属性和对象关系（例如双击/三击依赖关系）无法在 Interface Builder 中设置，必须通过编程方式实现。（这是一个缺点）。\n- 可以轻松在多个\
  \ Interface Builder 文件之间选择。无需编写大量的`if`/`else`或`switch`语句，只需选择不同的 Interface Builder\
  \ 文件即可创建完全不同的对象集。（这是一个优点）。\n- 你受到 Interface Builder 支持的配置和初始化方法的限制。在 Shapely 中，你必须提供一个可设置的`shape`属性，以便在对象创建后“修复”它，因为你无法再使用`init(shape:,origin:)`函数。（这是一个缺点）。\n\
  - Interface Builder 使得创建复杂的对象集变得容易，尤其是手势识别器和布局约束这样的对象。通常需要数页密集且难以阅读的代码才能重现许多界面所需的布局约束。（这是一个巨大的优点）。\n\
  - 有时需要花费相当大的精力来获取在 Interface Builder 文件中创建的对象的引用。你可能需要创建特殊的占位符对象，或者费力地遍历`loadNibNamed(_:,owner:,options:)`返回的顶层对象。在本节中，你创建了一个类（`ShapeFactory`），其唯一目的是为形状视图和手势识别器的引用提供出口。（这有时是一个缺点）。\n\
  \nInterface Builder 文件并非适用于所有界面的最佳解决方案；有时，几行优秀的代码就足够了。但在许多情况下，Interface Builder\
  \ 可以让你免于编写、维护和调试（字面意义上的）数千行代码。它是一个极其灵活且高效的工具，可以让你免去数小时的工作，并提高应用的质量。你只需要知道它如何工作以及如何让它为你工作。\n\
  \n**总结**\n\nInterface Builder 是 Xcode 的基石之一，也是 iOS 应用开发如此流畅的原因。直接加载 Interface Builder\
  \ 文件正是 Interface Builder 真正灵活性的体现。现在，你知道如何定义几乎任何界面、界面的一个片段，或仅仅是一些任意对象，将它们放在 Interface\
  \ Builder 文件中，并在需要时加载。你知道如何创建任何你喜欢的对象，设置其自定义属性，并将其与应用中的现有对象连接起来。这是一个触手可及的极其有用的工具。\n\
  \n**第 16 章 具有姿态的应用**\n\n在一项会让 Wayne Szalinski¹感到自豪的微型化壮举中，大多数 iOS 设备配备了一系列传感器，用于检测加速度、旋转和磁方向——这有很多“率”。这些传感器的组合输出，加上一些数学运算，会以惊人的精度告诉你的应用设备持有的姿态、是否在移动或旋转（以及速度）、重力方向以及磁北方向。你可以将其整合到应用中，赋予其一种不可思议的直接感。你可以根据用户手持设备的方向呈现信息，通过物理手势控制游戏，告诉他们即将拍摄的照片是否水平，以及更多。\n\
  \n在第 4 章中，你使用了高级的“设备摇晃”和“方向改变”事件来触发 EightBall 应用中的动画。在本章中，你将直接接入低级的加速度计信息，并对设备位置的瞬时变化做出反应。在本章中，你将学习以下内容：\n\
  \n- 收集加速度计和其他设备运动数据\n- 使用定时器\n\n你还将获得更多在自定义视图对象中使用仿射变换的实践，并利用 iOS 7 中新增的一些花哨动画功能。让我们开始吧。\n\
  \n**注意** 你需要一个已配置的 iOS 设备来测试本章中的代码。iOS 模拟器不模拟加速度计数据。\n\n**水平仪**\n\n你要创建的应用是一个简单的数字水平仪，称为\
  \ Leveler。² 它是一个单屏应用，显示一个刻度盘，指示设备的倾斜度（与假想铅垂线的角度），如图 16-1 所示。\n\n![9781484202098_Fig16-01.jpg](img/9781484202098_Fig16-01.jpg)\n\
  \n*图 16-1. Leveler 设计*\n\n**创建 Leveler**\n\n创建一个新的 Xcode 项目，步骤如下：\n\n1. 使用单视图应用模板。\n\
  2. 将产品名称设置为`Leveler`。\n3. 将语言设置为 Swift。\n4. 将设备设置为通用（Universal）。\n5. 创建项目后，编辑支持的界面方向以支持所有设备方向。\n\
  \nLeveler 需要一些图像和源代码资源。你可以在`Learn iOS Development Projects` ![image](img/arrow.jpg)\
  \ `Ch 16` ![image](img/arrow.jpg) `Leveler (Resources)`文件夹中找到图像文件。将`hand.png`和`hand@2x.png`文件添加到`Images.xcassets`图像目录中。在完成的`Leveler-1`项目文件夹中，找到`DialView.swift`文件。也将其添加到你的项目中，放在其他源文件旁边。记得在导入对话框中选中“将项目复制到目标组的文件夹中”选项。你还会在`Leveler\
  \ (Icons)`文件夹中找到一组应用图标，可以将其拖入图像目录的`AppIcon`组。\n\n在开始编写收集加速度计数据的代码之前，你将首先布局并连接显示倾斜度的视图。\n\
  \n**思考 DialView**\n\n你刚刚添加的源文件包含一个自定义`UIView`对象的代码，该对象绘制一个圆形“刻度盘”。阅读第 11 章后，你应该不难理解它是如何工作的。最有趣的方面是在图形上下文中使用仿射变换。在第\
  \ 11 章中，你将仿射变换应用于视图对象，使其看起来相对于实际框架发生了偏移或缩放。在`DialView`中，在绘制之前，将仿射变换应用于图形上下文。之后绘制的任何内容都会使用该变换进行平移。\n\
  \n在`DialView`中，这种技术用于在“刻度盘”内部绘制刻度线和角度标签。如果你感兴趣，可以在`DialView.swift`中找到`drawRect(_:)`函数。关键的代码部分已用粗体标出。分散注意力的代码已用省略号替换。\n\
  \n\n```markdown\n\n```\nlet circleDegrees = 360\nlet minorTickDegrees = 3\n...\n\
  \noverride func drawRect(rect: CGRect) {\n    let context = UIGraphicsGetCurrentContext()\n\
  \    let bounds = self.bounds\n    let radius = bounds.height/2.0\n    ...\n   \
  \ CGContextTranslateCTM(context,radius,radius)\n    let tickAngle = CGFloat(minorTickDegrees)*CGFloat(M_PI/180.0)\n\
  \    let rotation = CGAffineTransformMakeRotation(tickAngle)\n    for var angle\
  \ = 0; angle < circleDegrees; angle += minorTickDegrees {\n        ... draw one\
  \ vertical tick and label ...\n        CGContextConcatCTM(context,rotation);\n \
  \   }\n}\n```\n\n`drawRect(_:)`函数首先对上下文应用平移变换。这会偏移绘图坐标，有效地将视图本地坐标系的原点移动到视图的中心（视图始终是正方形，稍后你会看到）。应用此变换后，如果你在`(0,0)`绘制形状，它将绘制在视图中心，而不是左上角。\n\
  \n循环绘制一个垂直刻度线及其下方的可选文本标签。在循环结束时，上下文的绘图坐标旋转 3°。第二次循环时，刻度线和标签将旋转 3°。第三次循环时，所有绘图将旋转\
  \ 6°，依此类推，直到整个表盘绘制完成。上下文变换是累积的。\n\n要理解的关键概念是，应用于 Core Graphics 上下文的变换会影响绘制到视图中的内容的坐标系，如图\
  \ Figure 16-2 所示。上下文变换不会改变视图的`frame`、`bounds`或其在其父视图中的位置。\n\n![9781484202098_Fig16-02.jpg](img/9781484202098_Fig16-02.jpg)\n\
  \nFigure 16-2. 图形上下文变换\n\n要更改视图在其父视图中的显示方式，可以设置视图的`transform`属性，就像在 Shapely 应用中所做的那样。这正是视图控制器稍后将要做的事情——旋转屏幕上的表盘。这凸显了在绘图时使用仿射变换与使用变换来改变最终视图外观之间的区别。\n\
  \n还要注意，视图只绘制一次。`drawRect(_:)`中所有这些复杂的代码仅在视图首次绘制或调整大小时执行。一旦视图绘制完成，表盘的缓存图像就会显示在屏幕上，并由视图的`transform`属性旋转。这种第二次使用变换只是转录缓存图像中的像素；它不会导致视图以新角度重新绘制。在这方面，绘图是高效的。这一点很重要，因为稍后你将对其进行动画处理。\n\
  \n## 创建视图\n\n你将向故事板文件添加一个标签对象，然后在`ViewController`中编写代码，以编程方式创建`DialView`和显示表盘“指针”的图像视图。从`Main.storyboard`文件开始。\n\
  \n将一个标签对象拖入界面。使用属性检查器，更改以下内容：\n\n*   *文本*: 360°（按 Option+Shift+8 输入度数符号）\n*   *颜色*:\
  \ 白色\n*   *字体*: System 90.0\n*   *对齐*: 居中\n\n选择标签对象，然后选择 Editor ![image](img/arrow.jpg)\
  \ Size to Fit Content。选择根视图对象，并将其背景颜色更改为黑色。此时，你的界面应类似于 Figure 16-3 所示。\n\n![9781484202098_Fig16-03.jpg](img/9781484202098_Fig16-03.jpg)\n\
  \nFigure 16-3. 向界面添加角度标签\n\n选择标签并点击固定约束控件。添加一个顶部约束并将其值设为 0，如 Figure 16-4 左侧所示。点击对齐约束控件。添加一个容器中的水平居中约束，如\
  \ Figure 16-4 右侧所示，并确保其值也为 0。\n\n![9781484202098_Fig16-04.jpg](img/9781484202098_Fig16-04.jpg)\n\
  \nFigure 16-4. 添加标签约束\n\n**注意**：注意没有为标签视图设置高度、宽度、左、右或底部的约束，但 Interface Builder 对布局完全满意。这是因为像`UILabel`这样的视图具有*固有大小*。对于标签来说，它就是标签中文本的大小。在没有确定视图大小（高度和宽度）的约束时，iOS\
  \ 会使用其固有大小，这足以确定其`frame`。\n\n切换到助理编辑器。编辑窗格将分割，`ViewController.swift`文件将出现在右侧窗格中。向`ViewController`类添加此输出口属性：\n\
  \n```\n@IBOutlet var angleLabel: UILabel!\n```\n\n将输出口连接到界面中的标签视图，如 Figure 16-5\
  \ 所示。\n\n![9781484202098_Fig16-05.jpg](img/9781484202098_Fig16-05.jpg)\n\nFigure\
  \ 16-5. 连接角度标签输出口\n\n你将通过编程方式创建并定位其他两个视图。切换回标准编辑器并选择`ViewController.swift`文件。你需要图像资源文件的名称和一些实例变量来保持对表盘和图像视图对象的引用。首先将这些添加到`ViewController`类的开头（新代码以粗体显示）：\n\
  \n```\nclass ViewController: UIViewController {\n    let handImageName = \"hand\"\
  \n    @IBOutlet var angleLabel: UILabel!\n    var dialView: DialView!\n    var needleView:\
  \ UIImageView!\n```\n\n当视图控制器加载其视图时创建这两个视图。由于这是应用中唯一的视图控制器，这只会发生一次。找到`viewDidLoad()`函数并添加以下粗体代码：\n\
  \n```\noverride func viewDidLoad() {\n    super.viewDidLoad()\n    dialView = DialView(frame:\
  \ CGRect(x: 0, y: 0, width: 100, height: 100))\n    view.addSubview(dialView)\n\
  \    needleView = UIImageView(image: UIImage(named: handImageName))\n    needleView.contentMode\
  \ = .ScaleAspectFit\n    view.insertSubview(needleView, aboveSubview: dialView)\n\
  \    adaptInterface()\n}\n```\n\n当视图加载时，附加代码会创建新的`DialView`和`UIImageView`对象，并将两者添加到视图中。注意`needleView`被刻意放置在`dialView`前面。\n\
  \n这里没有尝试调整或定位这些视图的位置。这发生在视图显示或旋转时。通过添加以下两个函数来捕获这些事件：\n\n```\noverride func viewWillAppear(animated:\
  \ Bool) {\n    super.viewWillAppear(animated)\n    positionDialViews()\n}\n\noverride\
  \ func viewWillTransitionToSize(size: CGSize, \n            withTransitionCoordinator\
  \ coordinator: \n            UIViewControllerTransitionCoordinator) {\n    coordinator.animateAlongsideTransition(\
  \ {\n        (context) in self.positionDialViews()\n        },\n        completion:\
  \ nil )\n}\n```\n\n在视图首次显示之前，调用`positionDialViews()`来定位`dialView`和`needleView`对象。每当视图控制器更改大小时，都会调用第二个函数。对于像\
  \ Leveler 这样的单一视图应用，这仅会在设备旋转时发生。在此函数中，再次调用`positionDialViews()`以动画过渡到新的大小。这是因为你作为第一个参数传递的闭包块作为基于块的动画执行。正如你在第\
  \ 11 章中所知，在动画块中你需要做的就是设置你想要动画的视图属性——这正是`positionDialViews()`所做的。\n\n你还需要为 iPhone\
  \ 版本添加此函数：\n\n```\noverride func supportedInterfaceOrientations() -> Int {\n   \
  \ return Int(UIInterfaceOrientationMask.All.rawValue)\n}\n```\n\n```\n\n\n在编辑应用支持的屏幕方向时，请记住（来自第\
  \ 14 章），每个视图控制器决定了它支持哪些方向。默认情况下，iPhone 的`UIViewController`不支持倒置方向。以下代码覆盖了该设置，以允许所有方向。\n\
  \n最后，你需要`adaptInterface()`（见代码清单 16-1）和`positionDialViews()`（见代码清单 16-2）的代码。\n\n\
  ***代码清单 16-1***. `adaptInterface()`\n\n```\nfunc adaptInterface() {\n    if let\
  \ label = angleLabel {\n        var fontSize: CGFloat = 90.0\n        if traitCollection.horizontalSizeClass\
  \ == .Compact {\n            fontSize = 60.0\n        }\n        label.font = UIFont.systemFontOfSize(fontSize)\n\
  \    }\n}\n```\n\n你的`adaptInterface()`函数会检查`horizontalSizeClass`，并根据设备类型调整角度标签的字体大小：对于紧凑型设备（iPhone、iPod）设为\
  \ 60.0 点，对于大屏幕界面（iPad）保留 90.0 点。`horizontalSizeClass`在旋转过程中不会改变，因此`adaptInterface()`只需在`viewDidLoad()`中调用一次。如果`adaptInterface()`做了其他调整，或者苹果发布了新设备，其`horizontalSizeClass`可能在应用运行时发生变化，那么你需要从`viewWillTransitionToTraitCollection(...)`中调用它。\n\
  \n***代码清单 16-2***. `positionDialViews()`\n\n```\nfunc positionDialViews() {\n  \
  \  let viewBounds = view.bounds\n    let labelFrame = angleLabel.frame\n    let\
  \ topEdge = ceil(labelFrame.maxY+labelFrame.height/3.0)\n    let dialRadius = viewBounds.maxY-topEdge\n\
  \    let dialHeight = dialRadius*2.0\n    dialView.transform = CGAffineTransformIdentity\n\
  \    dialView.frame = CGRect(x: 0.0,\n                            y: 0.0,\n    \
  \                    width: dialHeight,\n                       height: dialHeight)\n\
  \    dialView.center = CGPoint(x: viewBounds.midX,\n                           \
  \   y: viewBounds.maxY)\n    dialView.setNeedsDisplay()\n\nlet needleSize = needleView.image.size\n\
  \    let needleScale = dialRadius/needleSize.height\n    var needleFrame = CGRect(x:\
  \ 0.0,\n        y: 0.0,\n        width: needleSize.width*needleScale,\n        height:\
  \ needleSize.height*needleScale)\n    needleFrame.origin.x = viewBounds.midX-needleFrame.width/2.0\n\
  \    needleFrame.origin.y = viewBounds.maxY-needleFrame.height\n    needleView.frame\
  \ = CGRectIntegral(needleFrame)\n}\n```\n\n`positionDialViews()`看起来代码很多，但它所做的只是将`dialView`设置为正方形，将其中心定位在视图底部中央，并调整其大小使其顶部边缘紧贴标签视图的底部边缘。然后`needleView`被定位在中心，锚定到底部边缘，并按比例缩放，使其高度等于表盘的可见高度。这用文字描述比直观看到要困难得多，所以运行应用，看看图\
  \ 16-6 中的效果。\n\n![9781484202098_Fig16-06.jpg](img/9781484202098_Fig16-06.jpg)\n\n\
  图 16-6. 表盘与指针视图的定位\n\n这基本上完成了所有视图设计和布局。现在你需要获取加速度计信息，让你的应用动起来。\n\n## 获取运动数据\n\n\
  所有 iOS 设备（截至撰写本文时）都配备了加速度计硬件。加速度计感应沿三个轴（x、y 和 z）的加速度力。如果你面对竖屏方向的 iPhone 或 iPad 屏幕，x\
  \ 轴是水平的，y 轴是垂直的，z 轴是从你出发，穿过设备中部，垂直于屏幕表面的线，如图 16-7 所示。\n\n![9781484202098_Fig16-07.jpg](img/9781484202098_Fig16-07.jpg)\n\
  \n图 16-7. 加速度计轴的方向\n\n你可以使用加速度计信息来确定设备何时改变速度以及方向。假设设备没有（明显）加速，你还可以利用这些信息推断重力的方向，因为重力对静止物体施加恒定的力。iOS\
  \ 正是利用这些信息来判断你何时将 iPad 侧翻或摇晃 iPhone。\n\n除了加速度计，最近的 iOS 设备还包括陀螺仪和磁力计。前者检测围绕三个轴（俯仰、横滚、偏航）的旋转变化，后者检测磁场方向。在没有磁干扰的情况下，这将告诉你设备相对于磁北的姿态（通俗地说，就是它有一个指南针）。\n\
  \n你的应用通过一个单一的看门人类`CMMotionManager`来获取所有这些信息。`CMMotionManager`类收集、解释并向你的应用传递运动和姿态信息。你告诉它你想要什么类型的信息（加速度计、陀螺仪、指南针）、更新频率以及如何将更新传递给应用。你的\
  \ Leveler 应用将仅使用加速度计信息，但通用模式对所有类型的运动数据都是一样的：\n\n1. 创建`CMMotionManager`的实例。\n2. 设置更新频率。\n\
  3. 选择你想要的信息以及应用获取它的方式（拉取或推送）。\n4. 准备就绪后，启动信息传递。\n5. 处理运动数据。\n6. 完成后，停止信息传递。\n\n\
  没有比第一步更好的开始了。\n\n### 创建`CMMotionManager`\n\n`CoreMotion`不属于标准`UIKit`框架。在`ViewController.swift`文件的开头，引入`CoreMotion`框架的定义（新代码以粗体显示）：\n\
  \n```\nimport UIKit\nimport CoreMotion\n```\n\n你需要一个变量来存储`CMMotionManager`对象，以及一个常量来指定运动数据更新的速度。将两者添加到你的`ViewController`类中：\n\
  \n```\nlazy var motionManager = CMMotionManager()\nlet accelerometerPollingInterval:\
  \ NSTimeInterval = 1.0/15.0\n```\n\n`motionManager`变量会自动初始化为一个`CMMotionManager`对象。注意该属性是`lazy`的。Swift\
  \ 中的惰性属性会自动初始化，但并非在创建`ViewController`对象时初始化，而是等到有人首次请求该值时才初始化。这将`CMMotionManager`对象的构造推迟到真正需要的时候。\n\
  \n你已经完成了使用运动数据的第一步——一个新的`CMMotionManager`对象将被创建并存储在`motionManager`属性中。\n\n**注意**  不要创建`CMMotionManager`的多个实例。如果你的应用有两个或更多控制器需要运动数据，它们必须共享一个`CMMotionManager`实例。建议在你的应用委托中创建一个返回单例`CMMotionManager`对象的属性，该对象随后可以与任何其他需要它的对象共享。\n\
  \n现在执行使用运动数据的第二步。找到`viewWillAppear()`函数，并在其末尾添加以下代码：\n\n```\nmotionManager.accelerometerUpdateInterval\
  \ = accelerometerPollingInterval\n```\n\n这条语句告诉管理器测量之间的等待时间。该属性以秒为单位。对于大多数应用，每秒\
  \ 10 到 30 次就足够了，但极端应用可能需要每秒 100 次更新。对于这个应用，你将`accelerometerUpdateInterval`属性设置为\
  \ 1/15 秒，从每秒 15 次更新开始。\n\n### 启动和停止更新\n\n为了执行获取运动数据的第三步和第四步，回到`viewWillAppear()`函数，并在其末尾添加以下语句：\n\
  \n```\nmotionManager.startAccelerometerUpdates()\n```\n\n\n\n在创建并配置运动管理器后，你需要让它开始收集加速计数据。在启动更新流程之前，`CMMotionManager`\
  \ 报告的加速计信息既不准确，甚至不会变化。一旦启动，运动管理器代码便会在后台持续运行，监控加速度的任何变化，并向你的应用报告这些变化。\n\n**提示** 为了节省电池电量，你的应用*只应*在需要时向运动管理器请求更新。对于本应用，运动事件在整个应用生命周期内都会使用，因此没有代码来停止它们。然而，如果你添加了第二个不使用加速计的视图控制器，则需要添加代码到\
  \ `viewWillDisappear()` 中来调用 `stopAccelerometerUpdates()`。\n\n## 推与拉\n\n看起来你可能没有完成获取运动数据的第三步，但实际上你做到了。当你调用\
  \ `startAccelerometerUpdates()` 函数时，这一步就已经隐含完成了。此函数开始收集运动数据，但需要你的应用定期询问这些数值。这被称为*拉取*方式；`CMMotionManager`\
  \ 对象会持续更新运动数据，而你的应用则按需从中拉取数据。\n\n另一种方式是*推送*方式。要使用这种方式，请调用 `startAccelerometerUpdatesToQueue(_:,withHandler:)`\
  \ 函数。你需要向其传递一个操作队列和一个闭包，该闭包会在运动数据更新时立即执行。这种方式实现起来复杂得多，因为闭包代码在单独的线程上执行，因此所有运动数据处理代码都必须是线程安全的。只有当你的应用必须绝对、立刻处理运动数据的*那一瞬间*，你才真正需要这种方式。属于这一类的应用很少。\n\
  \n## 时机就是一切\n\n现在你可能在想，你的应用是如何“定期”拉取它感兴趣的运动数据的。运动管理器不会发布任何通知，也不会向你的对象发送任何委托消息。你需要的是一个能在固定时间间隔提醒你的应用执行某个操作的对象。它被称为*定时器*，而\
  \ iOS 正好提供了它。在 `viewWillAppear()` 函数的末尾，添加以下语句：\n\n```\nNSTimer.scheduledTimerWithTimeInterval(\
  \ accelerometerPollingInterval,\n                                target: self,\n\
                                selector: \"updateAccelerometerTime:\",\n                              userInfo:\
  \ nil,\n                               repeats: true)\n```\n\n一个 `NSTimer` 对象为你的应用提供了一个定时器。它是我在第\
  \ 4 章中提到但一直没有机会详谈的事件源之一。\n\n**注意** 创建一个可工作的定时器分为两步：你必须先创建定时器对象，然后将其添加到运行循环中。`scheduledTimerWithTimeInterval(_:,target:,selector:,userInfo:,repeats:)`\
  \ 函数会同时为你完成这两步。如果你直接创建定时器对象，则必须在线程的运行循环对象上调用 `addTimer(_:,forMode:)` 函数，定时器才能生效。\n\
  \n定时器有两种类型：单次触发或重复触发。定时器具有一个 `timeInterval` 属性和一个将在对象上调用的函数。当 `timeInterval` 属性指定的一段时间过去后，定时器就会*触发*。在接下来合适的机会，事件循环会调用目标对象的函数。如果是单次触发定时器，这就结束了；定时器变为无效并停止。如果是重复触发定时器，它会继续运行，等待另一个\
  \ `timeInterval` 时间过去后再次触发。重复触发定时器会持续触发，直到你调用其 `invalidate()` 函数。\n\n**警告** 不要使用定时器来轮询事件（例如等待网页加载完成），这些事件本可以通过事件消息、委托函数、通知或代码块来确定。定时器应仅用于与时间相关的事件和定期更新。如果你想知道原因，请重新阅读第\
  \ 4 章的开头部分。\n\n你添加到 `viewWillAppear()` 中的代码创建并安排了一个定时器，该定时器大约每秒调用你的视图控制器对象的 `updateAccelerometerTime(_:)`\
  \ 函数 15 次。这与运动管理器更新其加速计信息的频率相同。检测更新的速度比 `CMMotionManager` 对象收集数据的速度更快或更慢都是没有意义的。\n\
  \n一切就绪，只差 `updateAccelerometerTime(_:)` 和 `rotateDialView(_:)` 函数。仍在 `ViewController.swift`\
  \ 中，添加第一个函数。\n\n```\nfunc updateAccelerometerTime(timer: NSTimer) {\n    if let\
  \ data = motionManager.accelerometerData {\n        let acceleration = data.acceleration\n\
          let rotation = atan2(-acceleration.x,-acceleration.y)\n        rotateDialView(rotation)\n\
      }\n}\n```\n\n第一条语句获取运动管理器的 `accelerometerData` 属性。由于你只开始收集加速计信息，这是唯一有效的运动数据属性。该属性是一个\
  \ `CMAccelerometerData` 对象，而该对象只有一个属性：`acceleration`。`acceleration` 属性包含三个数值：`x`、`y`\
  \ 和 `z`。每个值都是沿该轴施加的瞬时力，以 G 值测量。³ 假设设备没有移动，这些测量值可以组合起来确定*重力矢量*；换句话说，你可以判断出哪个方向是向下。\n\
  \n你的应用不需要全部三个数值。你只需要确定 x-y 平面上哪个方向是向上，因为表盘就在这个平面上。忽略沿 z 轴的力，反正切函数计算的是 x-y 平面上重力矢量的角度。结果用于将\
  \ `dialView` 旋转相同的角度。很简单，不是吗？\n\n**注意** 你可能会质疑为什么反正切函数被赋予了 x 和 y 的负值。这是因为表盘指向向上，而不是向下。翻转力的方向值计算的是*远离*重力的角度。\n\
  \n通过编写 `rotateDialView(_:)` 函数来完成应用：\n\n```\nfunc rotateDialView(rotation: Double)\
  \ {\n    dialView.transform = CGAffineTransformMakeRotation(CGFloat(rotation))\n\
  \nvar degrees = Int(round(-rotation*180.0/M_PI))\n    if degrees < 0 {\n        degrees\
  \ += 360\n    }\n    angleLabel.text = \"\\(degrees)°\"\n}\n```\n\n函数中的第一条语句将 `rotation`\
  \ 参数转换为一个仿射变换，用于旋转 `dialView`。其余代码将 `rotation` 值从弧度转换为度，确保它不是负数，并用它来更新标签视图。\n\n\
  现在是时候插入你已配置的 iOS 设备，运行你的应用，并体验效果了，如图 16-8 所示。注意当你旋转设备时，应用是如何切换方向的。如果你锁定了设备的方向，它就不会切换，但表盘仍然可以工作。\n\
  \n![9781484202098_Fig16-08.jpg](img/9781484202098_Fig16-08.jpg)\n\n图 16-8. 工作中的水平仪应用\n\
  \n## 抖动的烦恼\n\n你的应用能工作了，而且编写起来相当简单，但天哪，它看起来真费劲。如果它在我设备上的运行方式和这里描述的一样，那么表盘会不断抖动。除非设备完全静止，否则几乎无法读数。\n\
  \n如果表盘能够更平滑地移动——非常平滑——那就太好了。这听起来像是动画的任务。你需要的是一种动画，让表盘看起来具有质量，平滑地趋向于硬件报告的瞬时倾斜角度。\n\
  \n\n\n"
- "# 排版后的文本\n\n这听起来很像你在第 14 章中使用的 Sprite Kit 物理实体。遗憾的是，Sprite Kit 的物理模拟仅适用于`SKNode`对象。要使用\
  \ Sprite Kit，你必须围绕`SKView`重新设计整个视图，然后使用`SKNode`重新创建指针、刻度盘和标签。而`SKNode`不会自行绘制，因此你还必须重写`drawRect(_:)`函数，将内容绘制到屏幕外图像中，再将其提供给`SKSpriteNode`。想想看，你倒不如创建一个新项目，从头开始。\n\
  \n另一种方法是通过限制视图旋转的速率来自己平滑更新。为了让效果更美观，你甚至可能进一步添加一些计算，为刻度盘模拟质量、加速度、阻力等属性。但正如我在第 11\
  \ 章中提到的，自行实现动画的方法充满复杂性，通常工作量很大，而且往往效果不佳。\n\n别慌！iOS 提供了一种解决方案，能让你在已有的工作基础上继续构建。它被称为“视图动力学”（View\
  \ Dynamics），是一个专为`UIVIew`对象设计的物理引擎。它比 Sprite Kit 中的物理模拟器更简单，但这正是设计意图所在。与 Core Animation\
  \ 一样，它的目标是让为`UIView`对象添加简单的物理行为变得容易——而不是用来创建小行星游戏。\n\n与 Sprite Kit 类似，你通过描述作用在视图上的“力”来使用视图动力学，然后让动态动画师（dynamic\
  \ animator）创建一个模拟视图对这些力产生反应的动画。与 Sprite Kit 不同的是，这些属性并非`UIView`的一部分。相反，你要创建一组*行为*（behavior）对象，并将它们附加到你想动画化的视图上。让我们开始吧。\n\
  \n## 使用动态动画\n\n动态动画涉及三个角色。\n\n* 动态动画师对象\n* 一个或多个行为对象\n* 一个或多个视图对象\n\n*动态动画师*是执行动画的对象。它包含一个非常智能的复杂物理引擎。你需要创建一个动态动画师的单一实例。\n\
  \n当你创建行为对象并将它们添加到动态动画师时，动画就会发生。一个*行为*描述了对视图的单一驱动力或属性。iOS 内置了重力、加速度、摩擦力、碰撞、连接等预定义行为，你也可以自由发明自己的行为。一个行为与一个或多个视图（`UIView`）对象相关联，将该特定行为赋予其所有视图。动态动画师负责将单个视图的多个行为（例如加速度加重力加摩擦力）组合起来，以决定该视图将如何反应。\n\
  \n因此，动态动画的基本公式如下：\n\n1. 创建一个`UIDynamicAnimator`实例。\n2. 创建一个或多个`UIDynamicBehavior`对象，并附加到`UIView`对象上。\n\
  3. 将`UIDynamicBehavior`对象添加到`UIDynamicAnimator`中。\n4. 坐下来欣赏效果。\n\n现在，你已经准备好为“水平仪”应用添加视图动力学了。\n\
  \n## 创建动态动画师\n\n你需要创建一个动态动画师对象，并且需要一个实例变量来保存它，因此在你的`ViewController`类中添加一个动画师的实例变量。趁现在，再添加一些常量和变量来容纳一个附着行为，所有这些稍后都会解释。\n\
  \n```\nvar animator: UIDynamicAnimator!\nlet springAnchorDistance: CGFloat = 4.0\n\
  let springDamping: CGFloat = 0.7\nlet springFrequency: CGFloat = 0.5\nvar springBehavior:\
  \ UIAttachmentBehavior?\n```\n\n开始一个新函数来创建这些行为。将其命名为`attachDialBehaviors()`。\n\n\
  ```\nfunc attachDialBehaviors() {\n    if animator != nil {\n        animator.removeAllBehaviors()\n\
  \    } else {\n        animator = UIDynamicAnimator(referenceView: view)\n    }\n\
  ```\n\n**注意** 你可以在`Learn iOS Development Projects` ![image](img/arrow.jpg) `Ch 16`\
  \ ![image](img/arrow.jpg) `Leveler-2`文件夹中找到使用视图动力学的“水平仪”最终版本。\n\n你要做的第一件事是创建一个新的`UIDynamicAnimator`对象（如果尚未创建）。创建动态动画师时，必须指定一个视图来建立其坐标系。动态动画师使用自己的坐标系，称为*参考坐标系*，这样位于不同视图层次结构（每个都有其自己的坐标系）中的视图对象可以在统一的坐标空间中相互交互。利用参考坐标系，例如，你可以让内容视图控制器中的一个视图与工具栏中的一个按钮发生碰撞，即使它们位于不同的父视图中。\n\
  \n**注意** 你不能在变量的初始化语句中创建动态动画师（`var animator = UIDynamicAnimator(referenceView: view)`），因为`UIDynamicAnimator`的初始化器需要视图控制器的`view`属性。在对象初始化期间，继承的`view`属性尚未初始化，因此无法使用——这是一个经典的先有鸡还是先有蛋的问题。解决方案是在对象初始化器之外创建动态动画师。对象初始化的顺序和规则将在第\
  \ 20 章中解释。\n\n对你的应用而言，将参考坐标系设置为视图控制器根视图的坐标系。这将使所有动态动画师的坐标与你的本地视图坐标相同。这难道不是很方便吗？（是的，确实如此。）\n\
  \n`if`语句的前半部分会丢弃所有已添加的行为，以防动态动画师已被创建。这种情况本不应发生，但它确保`attachDialBehaviors()`从干净的状态开始。\n\
  \n## 定义行为\n\n那么，你认为刻度盘视图应该具有哪些行为呢？如果你浏览 iOS 提供的所有行为，你不会找到“旋转”行为。但如果作用在视图上的力会导致它旋转，动态动画师会旋转该视图。因此，旋转刻度盘视图并不比旋转唱片转盘、旋转木马、便当转盘或任何类似的东西更困难：固定对象的中心，然后对其中一个边缘施加一个倾斜的力。\n\
  \n你将使用两个附着行为来实现这一点。一个*附着行为*（attachment behavior）将视图中的一个点与另一个视图中的类似点或空间中的一个固定点（称为*锚点*）连接起来。附着的长度可以是刚性的，从而建立一种“牵引杆”关系，使附着点保持固定距离；也可以是弹性的，从而建立一种“弹簧”关系，当附着另一端移动时会对视图施加拉力。为了旋转刻度盘视图，你将各使用一个，如图图\
  \ 16-9 所示。\n\n![9781484202098_Fig16-09.jpg](img/9781484202098_Fig16-09.jpg)\n\n\
  图 16-9. *dialView 附着行为*\n\n回到你新建的`attachDialBehaviors()`函数，创建用于固定刻度盘视图中心的行为。\n\n\
  ```\nlet dialCenter = dialView.center\nlet pinBehavior = UIAttachmentBehavior(item:\
  \ dialView,\n                                       attachedToAnchor: dialCenter)\n\
  animator.addBehavior(pinBehavior)\n```\n\n这个附着行为定义了一个从刻度盘视图中心到同一位置固定锚点的刚性附着。当你创建一个附着行为时，两个附着点之间的现有距离定义了其初始长度，在此情况下为\
  \ 0。由于附着是刚性的且长度为 0，最终效果就是将视图的中心固定在该坐标处。视图的中心无法移离那个位置。\n\n\n\n**注意** 大多数动态行为都可以与任意数量的视图对象关联。例如，`Gravity`\
  \ 可以同等地应用于多个视图对象。但附着行为在两个附着点之间创建关系，因此仅与一个或两个视图对象关联。\n\n剩下的工作就是将该行为添加到动态动画器中。仅此操作本身效果有限，只能防止视图被移动到新位置。当你使用以下代码添加第二个附着行为时，事情就变得有趣了：\n\
  \n```\nlet dialRect = dialView.frame\nlet topCenter = CGPoint(x: dialRect.midX,\
  \ y: dialRect.minY)\nlet topOffset = UIOffset(horizontal: 0.0, vertical: topCenter.y-dialCenter.y)\n\
  springBehavior = UIAttachmentBehavior(item: dialView,\n                        \
  \  offsetFromCenter: topOffset,\n                          attachedToAnchor: topCenter)\n\
  springBehavior!.damping = springDamping\nspringBehavior!.frequency = springFrequency\n\
  animator.addBehavior(springBehavior)\n}\n```\n\n前两条语句计算视图顶部中心的点。接着创建第二个附着行为。这次附着点不在视图中心，而在其顶部中心（以相对于中心的偏移量表示）。\n\
  \n同样，锚点与附着点位于同一位置，创建了一个零长度的附着。不同之处在于，随后将 `damping` 和 `frequency` 属性设置为非默认值。这会在锚点和附着点之间创建一个“弹簧式”连接。但由于当前锚点和附着点位置相同，因此（暂时）不会有任何力作用。\n\
  \n当然，在调用 `attachDialBehaviors()` 之前，这些行为都不会被创建。你需要在视图初始定位时，在 `viewWillAppear(_:)`\
  \ 中执行此操作（新增代码以粗体显示）。\n\n```\noverride func viewWillAppear(animated: Bool) {\n  \
  \  super.viewWillAppear(animated)\n    positionDialViews()\n    attachDialBehaviors()\n\
  ```\n\n如果视图大小发生变化，你需要再次执行此操作。此时，你应取消所有动态动画，让尺寸转换完成，然后为调整后的新视图重新创建它们。修改 `viewWillTransitionToSize(...)`\
  \ 中的代码，使其如下所示（新增代码以粗体显示）：\n\n```\nanimator?.removeAllBehaviors()\ncoordinator.animateAlongsideTransition({\
  \ (context) in\n        self.positionDialViews()\n        },\n    completion: {\
  \ (context) in\n        self.attachDialBehaviors()\n        })\n```\n\n### 旋转拨盘动画\n\
  \n舞台已就绪，所有元素都已到位。你定义了一个将拨盘中心固定到特定位置的行为，以及第二个将顶部中心点“拉向”第二个锚点的行为。当你移动第二个锚点时，动作便开始了，如图\
  \ Figure 16-9 所示。\n\n找到 `rotateDialView(_:)` 函数，并删除第一条语句——即创建仿射变换并将其应用于视图的那条语句。用以下代码替换该段代码（新增代码以粗体显示）：\n\
  \n```\nfunc rotateDialView(rotation: Double) {\n    if let spring = springBehavior\
  \ {\n        let center = dialView.center\n        let radius = dialView.frame.height/2.0\
  \ + springAnchorDistance\n        let anchorPoint = CGPoint(x: center.x+CGFloat(sin(rotation))*radius,\n\
  \                                  y: center.y-CGFloat(cos(rotation))*radius )\n\
  \        spring.anchorPoint = anchorPoint\n    }\n```\n\n不同于传统方法——直接告诉图形系统你想要什么变化（例如将视图旋转一定角度），这里你描述的是对物理环境的改变，让动态动画器模拟其结果。在这个应用中，你移动了附着在视图顶部中心点的锚点。移动锚点会在新锚点与视图内的附着点之间产生引力。由于视图中心被第一个行为固定，视图顶部点为了靠近新锚点的唯一方法就是旋转视图——而这正是实际发生的情况。\n\
  \n运行应用查看效果。拨盘的表现更像一个“真实的”拨盘。它会有加速、减速，甚至振荡。这些效果全都归功于动态动画器中的物理引擎。\n\n尝试修改 `springAnchorDistance`、`springDamping`\
  \ 和 `springFrequency` 的值，观察它们如何影响拨盘。为了额外加分，添加第三个行为为拨盘增加一些“阻力”。创建一个 `UIDynamicItemBehavior`\
  \ 对象，将其与拨盘视图关联，并将它的 `angularResistance` 属性设置为非 `0` 的值；建议从 `2.0` 开始尝试。不要忘记将完成的行为添加到动态动画器中。你的代码应该类似这样：\n\
  \n```\nlet drag = UIDynamicItemBehavior(items: [dialView])\ndrag.angularResistance\
  \ = 2.0\nanimator.addBehavior(drag)\n```\n\n现在你拥有一个精致顺滑、赏心悦目的倾斜仪了。既然你已经了解如何轻松地将运动数据添加到应用，并使用视图动态模拟运动，那么让我们来看看其他一些运动数据源。\n\
  \n### 获取其他类型的运动数据\n\n截至撰写本文时，你的应用还可以使用其他三种运动数据。你可以收集并使用这些其他类型的数据，来代替加速度计数据或作为其补充。以下是\
  \ iOS 提供的运动数据类型：\n\n*   **陀螺仪**：测量设备绕其三轴旋转的速率\n*   **磁力计**：测量周围磁场的方位\n*   **设备运动**：结合加速度计、磁力计和陀螺仪的信息，生成关于设备运动和空间位置的有用值\n\
  \n使用其他类型的运动数据与你使用加速度计数据的操作方式相同，只有一个例外。并非所有 iOS 设备都配备陀螺仪或磁力计。你需要决定你的应用是必须具备这些功能，还是可以在没有它们的情况下运行。这个决定将指导你如何配置应用项目并编写代码。让我们从陀螺仪开始。\n\
  \n### 陀螺仪数据\n\n如果你对设备旋转的瞬时速率感兴趣——逻辑上等同于加速度计数据，但针对的是角力——请收集陀螺仪数据。收集陀螺仪数据的方式几乎与加速度计数据完全相同。首先设置运动管理器的\
  \ `gyroUpdateInterval` 属性，然后调用 `startGyroUpdates()` 或 `startGyroUpdatesToQueue(_:,withHandler:)`\
  \ 函数。\n\n`gyroData` 属性返回一个 `CMGyroData` 对象，该对象包含一个单独的 `rotationRate` 属性值。此属性有三个值：`x`、`y`\
  \ 和 `z`。每个值代表绕该轴旋转的速率，单位为弧度每秒。\n\n你必须考虑用户设备可能没有陀螺仪的情况。有两种处理方法。\n\n*   如果你的应用需要陀螺仪硬件才能运行，请将\
  \ `gyroscope` 值添加到应用属性列表的 `UIRequiredDeviceCapabilities` 中。\n*   如果你的应用可以在有或没有陀螺仪的情况下运行，请测试运动管理器的\
  \ `gyroAvailable` 属性。\n\n\n\n"
- '# 陀螺仪硬件要求与磁力计数据


  第一种方法使陀螺仪硬件成为应用运行的必要条件。如果将此要求添加到应用的属性列表中，iOS 将不允许在不具备陀螺仪的设备上安装该应用。App Store 可能会向没有陀螺仪的用户隐藏该应用，或提醒他们该应用可能无法在其设备上运行。


  添加此`key`的方式与您在第 14 章中添加`gamekit`能力要求的方式完全相同。请找到第 14 章中的“将 GameKit 添加到您的应用”部分，按照编辑`Required
  Device Capabilities`集合的说明操作，将`gyroscope`替换为`gamekit`。


  如果您的应用可以使用陀螺仪数据但并非必需，请通过读取运动管理器对象的`gyroAvailable`属性来检测陀螺仪的存在。如果其值为`true`，请放心启动并使用陀螺仪数据；如果为`false`，则需另做安排。


  ### 磁力计数据


  通过磁力计数据可以获取设备周围磁场的强度和方向。到了这一步，这听起来可能像是老生常谈。


  1. 使用`magnetometerUpdateInterval`属性设置磁力计更新的频率。

  2. 调用`startMagnetometerUpdates()`或`startMagnetometerUpdatesToQueue(_:,withHandler:)`函数启动磁力计测量。

  3. `magnetometerData`属性返回一个包含当前读数的`CMMagnetometerData`对象。

  4. `CMMagnetometerData`对象的唯一属性是`magneticField`属性，该属性包含三个值：`x`、`y`和`z`。每个值代表沿该轴方向的磁场强度和方向，单位为μT（微特斯拉）。

  5. 将`magnetometer`值添加到应用的`Required Device Capabilities`属性中，或检查`magnetometerAvailable`属性以确定设备是否具备磁力计。


  与加速度计和陀螺仪数据类似，`magnetometerDate`属性返回原始、未经滤波的磁场信息。这将是地球磁场、设备自身的磁偏置、任何环境磁场、磁干扰等的组合。


  从这些数据中解析出磁北方向有点棘手。看起来像北方的信号可能来自微波炉。类似地，加速度计数据可能会因为设备倾斜或处于移动的汽车中（或两者兼有）而发生变化。您可以通过收集和关联来自多个仪器的数据来解开这些相互矛盾的指标。例如，通过检查加速度计和陀螺仪的变化，您可以区分倾斜和水平移动：倾斜会同时改变两者，但水平移动仅会在加速度计上记录变化。


  如果您开始感到自己应该在物理和数学课上更专心听课的懊恼，请放心：iOS 已经为您考虑周全了。


  ### 设备运动与姿态


  `CMMotionManager`还通过其设备运动接口提供了设备物理位置和运动的统一视图。设备运动属性和函数结合了来自加速度计、陀螺仪，有时还包括磁力计的信息。它整合所有这些数据，并生成一个经过滤波、统一和校准的设备在空间中的运动与位置图景。


  使用设备运动的方式与使用前述三种仪器非常相似。


  1. 使用`deviceMotionUpdateInterval`属性设置设备运动更新的频率。

  2. 调用以下函数之一启动设备运动更新：`startDeviceUpdates()`、`startDeviceMotionUpdatesToQueue(_:,withHandler:)`、`startDeviceMotionUpdatesUsingReferenceFrame(_:)`或`startDeviceMotionUpdatesUsingReferenceFrame(_:,toQueue:,withHandler:)`。

  3. `deviceMotion`属性返回一个包含当前运动和姿态信息的`CMDeviceMotion`对象。

  4. 使用`deviceMotionAvailable`属性确定设备运动数据是否可用。


  设备运动与之前接口有两个主要区别。启动更新时，您可以提供一个`CMAttitudeReferenceFrame`常量，为设备选择一个*参考系*。有四个选项：


  - 设备方向任意

  - 方向任意，但使用磁力计消除“航向漂移”

  - 方向校准至磁北

  - 方向校准至真北（需要定位服务）


  设备的参考位置可以想象为：将您的 iPhone 或 iPad 平放在面前的桌子上，屏幕朝上，Home 键朝向您。从 Home 键到设备顶部的线是 y 轴。x 轴从左侧水平延伸到右侧。z
  轴垂直穿过设备。


  设备在桌上保持平放时旋转，会改变其*方向*。参考系关注的就是这个方向。如果方向不重要，您可以使用任意参考系。如果您需要了解相对于真北或磁北的方向，请使用校准后的参考系。


  **注意** 并非所有姿态参考系在每个设备上都可用。使用`availableAttitudeReferenceFrames()`函数确定设备支持哪些参考系。


  第二个主要区别是`CMDeviceMotion`对象。与其他运动数据对象不同，该对象有多个属性，如表 16-1 所示。


  **表 16-1.** 关键 `CMDeviceMotion` 属性


  | 属性 | 描述 |

  | --- | --- |

  | `attitude` | 一个`CMAttitude`对象，描述设备的实际姿态（空间位置），表示为三个属性值（`pitch`、`roll`和`yaw`）的三元组。其他属性以数学上等效的形式（旋转矩阵和四元数）描述相同信息。
  |

  | `rotationRate` | 一个包含三个值（`x`、`y`和`z`）的结构，描述绕这些轴的旋转速率。 |

  | `userAcceleration` | 一个`CMAcceleration`结构（`x`、`y`和`z`），描述设备的运动。 |

  | `magneticField` | 一个`CMCalibratedMagneticField`结构（`x`、`y`、`z`和`accuracy`），描述地球磁场的方向。
  |


  乍一看，所有这些信息似乎与来自加速度计、陀螺仪和磁力计的数据相同——只是重新打包。但事实并非如此。`CMDeviceMotion`对象结合了来自多个仪器的信息，以推断出设备正在做什么的更全面图景。具体来说：


  - `attitude`属性结合了来自陀螺仪的角度变化测量、来自加速度计的重力方向确定，有时还结合了磁力计来校准方向（绕 z 轴旋转）并防止漂移。

  - `userAcceleration`属性关联加速度计和陀螺仪数据，排除重力和姿态变化的影响，以提供准确的加速度测量。

  - `magneticField`属性针对设备偏置进行调整，并尝试补偿磁干扰。


  总体而言，设备运动接口信息更丰富、更智能。如果说有缺点，那就是它需要更多的处理能力，这会消耗应用性能并缩短电池续航。如果您的应用只需要了解运动或旋转的大致情况，那么加速度计或陀螺仪的原始数据就足够了。但如果您确实需要了解设备的位置、方向或朝向，那么设备运动接口已经为您计算好了。


  **注意** 设备可能需要以圆形图案倾斜，以帮助校准磁力计。如果您将`CMMotionManager`的`showsDeviceMovementDisplay`属性设置为`true`，iOS
  会自动显示一个提示用户执行此操作的界面。


  '
