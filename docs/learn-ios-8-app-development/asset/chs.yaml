  松开鼠标后，会弹出一个菜单，列出这两个对象之间所有可能的连接。点击 `root view controller` 连接。现在，当你的应用启动时，导航控制器将会把这个视图控制器作为第一个屏幕显示出来。


  我确实承诺过教你两种连接对象的方法。第二种方法是使用实用工具区域中的连接检查器。选择 View ![image](img/arrow.jpg) Utilities
  ![image](img/arrow.jpg) Show Connections Inspector，或者点击实用工具面板中的小箭头图标，如图 Figure 2-10
