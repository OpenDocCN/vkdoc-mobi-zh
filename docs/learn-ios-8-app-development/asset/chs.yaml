  本书假定您是 iOS 应用开发新手，且编程经验有限。如果您一直在学习 Apple 的新编程语言 Swift，那就再好不过了。如果您熟悉 Objective-C、C、Java、C#
  或 C++，跟随本书学习应该也不会有太大困难，而且第 20 章还提供了 Swift 入门指南，建议您阅读。如果您是编程领域的绝对新手，我建议先阅读一本基础的 Swift
  编程书籍——例如 Gary Bennett 和 Brad Lees 合著的《*Swift for Absolute Beginners*》——作为先行或同步学习。iOS
  应用可使用 Objective-C 或 Swift 开发，但本书将完全采用 Swift。


  本书将讲解 iOS 应用设计、构建和部署的基本原理。您将养成一些良好的设计习惯，掌握核心编程技能，并熟悉用于创建应用的开发工具。


  本书并非针对某一技术的深度论述。它的设计旨在通过扎实地引导您构建利用多种设备功能的应用——例如在地图上定位、使用加速计、用内置相机拍照、创建动态动画、参与社交网络以及将信息存储在云端——来激发您的想象力。在此基础上，您可以超越这些示例，去创造下一个伟大的
