  \ 创建 `AVAudioPlayer` 对象\n\n你将使用 `AVAudioPlayer` 对象来播放声音样本文件。你需要四个这样的对象。与其创建四个 `AVAudioPlayer`\
  \ 变量并编写四个播放动作，不如创建一个数组来存放所有对象，以及一个函数来播放其中任何一个。先从 `AVAudioPlayer` 对象开始。在 `ViewController.swift`\
  \ 文件中添加以下语句：\n\n```\nlet soundNames = [\"snare\", \"bass\", \"tambourine\", \"maraca\"\
  ]\nvar players = [AVAudioPlayer]()\n```\n\n第一行声明了一个包含声音资源文件名称的字符串常量数组。`players`\
  \ 变量是一个 `AVAudioPlayer` 对象的数组，初始化为空数组。语法看起来有点奇怪，但它只是在创建一个新对象。这个新对象是一个包含 `AVAudioPlayer`\
  \ 对象的数组（`[AVAudioPlayer]`），通过默认的对象初始化器（`()`）创建。\n\n这些编译器错误看起来很眼熟吧？就像你为 `AppDelelgate`\
  \ 类所做的那样，在 `ViewController.swift` 文件的开头添加这个 `import` 语句：\n\n```\nimport AVFoundation\n\
  ```\n\n函数 `createAudioPlayers()` 和 `destroyAudioPlayers()` 将一次性创建和销毁所有四个音频播放器对象。现在将它们添加进去。\n\
  \n```\nfunc createAudioPlayers() {\n    destroyAudioPlayers()\n    for soundName\
  \ in soundNames {\n        if let soundURL = NSBundle.mainBundle().URLForResource(soundName,\
  \ \n                                                     withExtension: \"m4a\"\
  ) {\n            let player = AVAudioPlayer(contentsOfURL: soundURL, error: nil)\n\
  \            player.prepareToPlay()\n            players.append(player)\n      \
  \  }\n    }\n}\n\nfunc destroyAudioPlayers() {\n    players = []\n}\n```\n\n`createAudioPlayers()`\
  \ 遍历声音名称常量数组（`soundNames`），并使用它来创建一个指向你之前添加的 `m4a` 声音资源文件的 URL。这个 URL 用于创建和初始化一个新的\
  \ `AVAudioPlayer` 对象，该对象将播放那个声音文件。\n\n然后应用了一些优化。对每个声音播放器调用了 `prepareToPlay()` 函数。这会预先准备播放器对象，使其能够立即播放声音。最后，将新的播放器对象追加到\
  \ `players` 数组中。当循环结束时，你将拥有一个 `AVAudioPlayer` 对象的数组，每个对象都配置好播放 `soundNames` 数组中对应的声音文件。\n\
  \n**注意**  通常，播放器对象会进行惰性准备，即等到你要求它们播放时，才实际读取声音样本数据文件、分配缓冲区、配置硬件编解码器等。所有这些都需要时间。当用户点击声音按钮时，他们不想等待声音播放；他们希望立即播放。`prepareToPlay()`\
  \ 函数消除了这种初始延迟。\n\n`destroyAudioPlayers()` 函数不言自明，你现在还不需要它。它将在后续“登场”。\n\n接下来是用于播放这些声音的按钮以及实现该功能的动作函数。首先添加一个\
  \ `bang(_:)` 动作的桩代码。\n\n```\n@IBAction func bang(sender: AnyObject!) {\n}\n```\n\
  \n现在你可以设计界面了。\n\n### 添加声音按钮\n\n返回你的 `Main.storyboard` 界面构建器文件。拖入一个新的 `UIButton`\
