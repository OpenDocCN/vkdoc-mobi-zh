  \ 函数中拦截从表格视图到详情视图的转场。在 `MasterViewController.swift` 文件中找到该函数。嘿，看起来有人注释掉了它的所有代码！没问题。选中被注释的行，再次选择“编辑器”![image](img/arrow.jpg)“结构”![image](img/arrow.jpg)“注释选择”命令。这将“取消注释”之前被注释的行。\n\
  \n既然你已经修正了详情视图控制器中 `detailItem` 属性的类型，你可以修改这段代码使其能够编译。将代码编辑为如下所示（修改后的代码以粗体显示）：\n\
