  \n找到 `tableView(_:,numberOfRowsInSection:)` 函数。它的代码如下：\n\n```swift\noverride func\
  \ tableView(tableView: UITableView, \n                        numberOfRowsInSection\
  \ section: Int) -> Int {\n    return things.count\n}\n```\n\n这里无需做任何更改。该函数已经精确完成了你需要它做的事情：返回表格中的行数（`MyWhatsit`\
  \ 对象）。\n\n接下来看 `tableView(_:,cellForRowAtIndexPath:)` 函数。当前代码如下所示：\n\n```swift\n\
  override func tableView(tableView: UITableView, cellForRowAtIndexPath indexPath:\n\
  \                                                NSIndexPath) -> UITableViewCell\
  \ {\n    let cell = tableView.dequeueReusableCellWithIdentifier(\"Cell\", \n   \
  \                                forIndexPath: indexPath) as UITableViewCell\n \
  \   let object = things[indexPath.row] as NSDate\n    cell.textLabel.text = object.description\n\
  \    return cell\n}\n```\n\n这就是你的橡皮印章。每当表格视图需要绘制一行时，就会调用这个函数。你的任务是准备一个 `UITableViewCell`\
  \ 对象来绘制该行，并将其返回给调用者。这分两步完成。第一步是获取要使用的 `UITableViewCell` 对象。暂时先忽略这一步；我将在下一节（“表格单元格缓存”）中描述这个过程。\n\
  \n第二步是配置单元格，使其正确绘制该行。最后三条语句就是负责这一点的。目前，它期望从数组中获取一个 `NSDate` 对象，并将单元格的标签设置为其 `description`。这就是你需要替换的代码。将该函数中的最后三条语句替换为以下内容（修改的代码以粗体表示）：\n\
  \n```swift\nlet thing = things[indexPath.row] as MyWhatsit\ncell.textLabel?.text\
  \ = thing.name\ncell.detailTextLabel?.text = thing.location\nreturn cell\n```\n\n\
  现在，你的橡皮印章会从 `indexPath` 对象中获取要绘制的行的 `MyWhatsit` 对象，并将其存储在 `thing` 变量中。然后，它使用 `name`\
  \ 和 `location` 属性来设置单元格的 `textLabel.text`（标题）和 `detailTextLabel.text`（副标题）。\n\n\
  **注意：** 表格视图使用 `NSIndexPath` 对象来标识表格中的行。`UITableView` 使用的 `NSIndexPath` 对象具有 `section`\
  \ 属性和 `row` 属性，可以明确标识每一行。由于你的表格只有一个分区，因此可以忽略 `section` 属性；它始终是 `0`。\n\n你返回的单元格将用于绘制该行。这是简单部分。现在后退一步，重新审视该函数的第一部分。\n\
  \n### 表格单元格缓存\n\n在橡皮印章的比喻中，我说过表格视图“给你一个橡皮印章，并让你配置它”。我撒谎了——至少撒了一点点。表格视图并不会给你要使用的单元格对象，因为它不知道你需要哪种单元格对象。相反，单元格对象是由故事板或你编写的代码创建的，表格视图会保留它，以便你下次可以再次重用。这被称为*表格单元格缓存*。\n\
  \n使用表格单元格缓存有三种方式：\n\n- 让故事板创建单元格对象\n- 在需要时通过编程方式延迟创建单元格对象\n- 完全忽略缓存\n\n在这个应用中，你将采用第一种方法。主-从项目模板已经定义了一个单一的表格单元格对象，标识符为\
  \ `Cell`。选择 `Main.storyboard` 文件，并选择“主场景”中的表格视图对象，如图 5-14 所示。\n\n![9781484202098_Fig05-14.jpg](img/9781484202098_Fig05-14.jpg)\n\
  \n图 5-14. 带有原型表格单元格的表格视图\n\n在表格视图的顶部，你会看到一个“原型单元格”区域。这就是 Interface Builder 让你设计表格视图将使用的橡皮印章——呃，单元格对象的地方。“原型单元格”计数（显示在图\
  \ 5-14 右侧的属性检查器中）声明了你的表格定义了多少个不同的单元格对象。你只需要一个。\n\n点击唯一的一个原型单元格模板，如图 5-15 所示。现在你正在编辑一个单一的表格单元格对象。注意，“标识符”属性设置为\
  \ `Cell`；这用于在缓存中标识该单元格，并且必须与你传入 `dequeueReusableCellWithIdentifier(_:,forIndexPath:)`\
  \ 调用中的标识符完全匹配。\n\n![9781484202098_Fig05-15.jpg](img/9781484202098_Fig05-15.jpg)\n\
  \n图 5-15. 编辑表格单元格原型\n\n你的表格将显示对象的名称及其位置。符合该描述的标准单元格类型是副标题样式（`UITableViewCellStyle.Subtitle`）。将单元格的样式更改为“副标题”，如图\
  \ 5-15 右上角所示。\n\n你的表格视图设计就完成了。你已经定义了一个单一的单元格对象，其标识符为 `Cell`，并且使用了副标题表格单元格样式。\n\n\
  #### 单元格对象标识符与重用\n\n表格视图单元格缓存使你的 `tableView(_:,cellForRowAtIndexPath:)` 函数能够高效地重用表格单元格视图对象，并且有多种不同的使用方式。\n\
  \n使用表格单元格缓存的传统方式是根据需要以编程方式创建表格单元格视图对象。这也被称为*延迟*对象创建。你可以通过检查所需单元格对象是否已在缓存中来做到这一点，只有在不存在时才创建一个。实现该功能的代码如下所示：\n\
  \n```swift\nlet cellIdent = \"LazyCell\"\nvar cell = tableView.dequeueReusableCellWithIdentifier(\n\
  \                                            cellIdent) as? UITableViewCell\nif\
  \ cell == nil {\n    cell = UITableViewCell(style: .Subtitle, reuseIdentifier: cellIdent)\n\
  \    cell!.accessoryType = .DisclosureIndicator\n}\n```\n\n这段代码询问表格单元格缓存是否已经添加了标识符为\
  \ `LazyCell` 的单元格。如果没有，该消息将返回 `nil`，表示缓存中没有这样的单元格。你的代码通过创建一个新的单元格对象并为其分配相同的单元格标识符来响应。当你将此单元格对象返回给表格视图时，它会自动将其添加到缓存中。下一次，该单元格视图对象就会位于缓存中。\n\
  \n一种更现代的方法是使用 `registerClass(_:,forCellReuseIdentifier:)` 或 `registerNib(_:,forCellReuseIdentifier:)`\
  \ 函数向表格注册一个单元格视图类或 Interface Builder 文件。完成此操作后，当请求一个具有该标识符但不在缓存中的单元格时，表格会自动使用故事板文件中定义的原型单元格为你创建一个。当你使用故事板设计原型单元格时，这会自动发生，这也是你在\
  \ MyStuff 中使用的技术。\n\n使用单元格标识符，你还可以维护一个由不同单元格对象组成的稳定小集合。在你的 MyStuff 应用中，也许有一天你会决定为《星球大战》纪念品设计一种不同的行样式，而为从祖母那里得到的东西设计另一种行样式。你需要为每个单元格对象分配其自己的标识符（`\"\
  Cell\"`、`\"Star Wars\"`、`\"Me Ma\"`）。这样，表格视图单元格缓存在你调用任何 `dequeueReusableCellWithIdentifier(_:...)`\
  \ 函数时，会保存所有三个单元格对象，并返回相应的那一个。要使用故事板实现这一点，请将“原型单元格”计数设置为 `3`，并为每个原型单元格分配一个唯一的标识符。\n\
  \n在另一个极端，你完全可以不使用缓存。你的`tableView(_:,cellForRowAtIndexPath:)`函数可以在每次被调用时都返回一个新的单元格对象。这适用于行数极少、每行完全不同或行数固定的情况——例如你在“设置”应用中看到的那种界面。\n\
  \nXcode 允许你在 Interface Builder 中直接创建这种表格。使用属性检查器，将表格视图的 `Content` 属性从 `Dynamic`\
  \ 改为 `Static`。现在，你添加到表格中的单元格就是表格将要显示的那些单元格。对于这种表格，你不需要重写`tableView(_:,numberOfRowsInSection:)`或`tableView(_:,cellForRowAtIndexPath:)`函数。\n\
  \n你可以自由地混合搭配这些技术。单个表格可以包含一些在故事板中定义的单元格视图对象，以及其他通过类名注册并由代码创建的单元格，而你的代码还可以惰性地创建剩余的部分。\n\
  \n在这里，将导航栏中的标题从 `Master` 改为 `My Stuff`。双击表格视图上方导航栏中的 `Master` 标题，或者找到导航项对象来实现（参见图\
  \ 5-16）。现在，你已经实现了在表格视图中显示 `MyWhatsit` 对象所需的全部代码，但还有一些问题。你更改了原始 `objects` 数组的类型（和名称），并且项目模板中残留的一些代码仍然把它当作\
  \ `NSDate` 对象数组来使用。Swift 对值的类型要求非常精确，因此这段代码无法编译。\n\n![9781484202098_Fig05-16.jpg](img/9781484202098_Fig05-16.jpg)\
  \  \n图 5-16. 重命名主视图\n\n导致问题的代码现在并不重要，我们先忽略它。找到`MasterViewController.swift`文件中的`insertNewObject(sender:)`和`prepareForSegue(_:,sender:)`函数，并“注释掉”它们的代码：选中外层`{`和`}`大括号内的语句，然后选择\
  \ Editor ![image](img/arrow.jpg) Structure ![image](img/arrow.jpg) Comment Selection\
  \ 命令，如图 5-17 所示。\n\n![9781484202098_Fig05-17.jpg](img/9781484202098_Fig05-17.jpg)\
  \  \n图 5-17. “注释”一段代码块\n\n还有一个小问题。当您用`[MyWhatsit]()`数组替换`NSMutableArray()`时，你不经意间将数组的类型从\
  \ Foundation 的`NSArray`对象改为了原生 Swift 数组对象。这两种数组类型在很大程度上可以互换，但（再次强调）Swift 对它们的使用方式很挑剔。`NSArray`有一个`removeObjectAtIndex()`函数。Swift\
