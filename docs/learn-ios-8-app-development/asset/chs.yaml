  \n这并不像看起来那么容易，对吧？同时请注意，你添加的代码提供了它自己的调试辅助工具。当`debugAids`为`true`时，创建附着节点的代码会生成可见节点（`SKSpriteNode`），而不是不可见节点（`SKNode`）。这让你在调试时能看到附着节点的位置。\n\
