  \n您已将第二个按钮定位在第一个按钮右侧 20 像素处，并保持垂直位置相同。继续添加约束以定位剩余两个按钮：\n\n5.  将第三个按钮拖到第一个按钮下方。\n\
  6.  选中第一个和第三个按钮，添加一个值为 `0` 的“前导对齐”约束。\n7.  在第一个和第三个按钮之间添加一个值为 `20` 的“垂直间距”约束。\n\
