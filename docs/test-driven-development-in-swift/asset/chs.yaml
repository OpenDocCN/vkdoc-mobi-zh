  \ .0 : Text\n    ▿ storage : Storage\n    ▿ anyTextStorage : \n    ▿ modifiers :\
  \ 1 element\n    ▿ 0 : Modifier\n    - anyTextModifier : \n    ▿.1 : Text\n    ▿\
  \ storage : Storage\n    ▿ anyTextStorage : \n    - modifiers : 0 elements\n   \
  \ ```\n\n2.  让难以测试的对象摆脱行为束缚的想法，由 Michael Feathers 在其论文 *The Humble Dialog Box* 中首次提出，随后由\
  \ Gerard Meszaros 在 *xUnit Test Patterns*（第 695 页）中将其形式化为 **Humble Object** 模式。\n\
  \n"
- "# 测试动态 SwiftUI 视图\n\n*如何测试视图在接收新数据时的更新行为？*\n\n*将更新过程封装在 ViewModel 的* `@Published`\
  \ *属性中，并使用异步预期进行测试。*\n\n在前一章中，我们看到 SwiftUI 视图难以测试，而解决之道在于绕开它们，将所有展示逻辑迁移到专门的对象——ViewModel\
  \ 中。当所有展示逻辑都位于 ViewModel 时，你既能测试动态视图，也能测试静态视图。\n\nSwiftUI 和 Combine 能让你在数据可用时无缝更新视图。你可以让\
  \ ViewModel 使用 Combine *发布*属性，如果将视图订阅到这些属性，那么每当新值被发布时，SwiftUI 都会触发重新渲染。\n\n由于 SwiftUI\
  \ 管理视图更新，你只需测试 ViewModel 是否发布了正确的值。\n\n在本章中，我们将探讨如何运用测试驱动开发（TDD）让 ViewModel 通过 Combine\
  \ 暴露数据，以及如何利用*依赖倒置原则（DIP）*将其与具体数据源解耦。\n\n我们将处理异步代码；如果你需要回顾这种执行模式与我们之前使用的同步逻辑有何不同，请前往第\
  \ 2 章的“异步代码的预期”部分。\n\nAlberto 喜欢根据当季食材和农产品市场能买到的便宜货频繁更换菜单。你决定从远程 API 读取菜单，这样无需发布新版本应用就能更新菜单。\n\
  \n从远程 API 加载菜单涉及以下步骤：\n\n*   通过 HTTP 从 API 获取数据\n*   将 API 响应中的数据转换为应用可理解的格式\n*\
  \   在用户界面中展示获取到的数据\n\n让我们从 UI 工作开始。其余任务将在后续章节中处理。\n\n从面向用户的层开始，能让我们更快地获得功能的最早可测试版本，这与我们在第\
  \ 4 章的做法类似。我们可以与 Alberto 共享一个动态加载虚拟数据的应用版本，看看他的想法。如果我们先构建网络组件，就无法与他共享，因为它需要有 UI\
  \ 才能供用户操作。\n\n我们将编写的代码高度依赖 `SwiftUI` 和 `Combine`。在开始之前，先快速了解一下 `SwiftUI` 中的数据流。\n\
  \n## SwiftUI 与 Combine 如何实现无缝视图更新\n\n`SwiftUI` 与其前身 `UIKit` 和 `AppKit` 的一个主要区别在于，它的视图是不可变的。正如我们在前一章所见，视图是状态的函数，而非事件序列。状态是框架推导视图的唯一数据源。我们的代码无法直接改变视图；我们只能改变应用的状态。仅凭这一特性，SwiftUI\
  \ 就消除了由视图中状态不一致导致的整类错误。\n\n`SwiftUI` 的不可变性与 `Combine` 的流式处理能力相结合，提供了优雅的方式来保持视图与*流动*的数据同步。\n\
  \n异步操作的工具之一是 `Combine` 的 `Publisher`（发布者）类型，它可以随时间流式传输新值，并且对象可以订阅它。创建 `Publisher`\
  \ 的一种便捷方式是：获取一个对象，使其遵循 `ObservableObject` 协议，并在其一个或多个属性上使用 `@Published` 包装器。该包装器会生成一个\
  \ `Publisher`，每当属性发生变化时，它就会发送一个新值。\n\n而这两个框架之间的集成在此处真正大放异彩：`SwiftUI` 为遵循 `ObservableObject`\
  \ 的类型提供了一个 `@ObservedObject` 属性包装器。每当 `@ObservedObject` 的 `@Published` 属性发出新值时，`SwiftUI`\
  \ 就会自动触发视图的重新渲染。\n\n理论已经足够，让我们开始编码吧。\n\n\n\n## 使用 `ObservableObject` 让 ViewModel\
  \ 流式更新\n\n为了让 SwiftUI 能够承担繁重工作，使视图与我们从 API 加载的数据保持同步，我们需要为其提供一个 `ObservableObject`，该对象通过一个或多个\
  \ `@Published` 属性来公开数据。\n\n在第 6 章中，我们了解了如何使用 ViewModel 让视图摆脱展示逻辑。ViewModel 是成为视图\
  \ `@ObservedObject` 的最佳候选者。这是其职责的自然延伸：从保存供视图读取的静态数据，扩展到保存供视图读取并同步的静态和动态数据。\n\n当从远程\
  \ API 获取菜单时，`MenuList.ViewModel` 应该如何表现？以下是一个初步方案：\n\n-   获取开始时，应发布一个空的 `[MenuSection]`。\n\
  -   获取成功时，应发布接收到的菜单，并将其转换为 `[MenuSection]` 并进行适当分组。\n-   获取失败时，应发布一个错误。\n\n我们可以将这些需求转化为测试列表：\n\
  \n```swift\n// MenuList.ViewModelTests.swift\n// ...\nclass MenuList.ViewModelTests:\
  \ XCTestCase {\n    // ...\n    func testWhenFetchingStartsPublishesEmptyMenu()\
  \ {}\n    func testWhenFecthingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()\
  \ {}\n    func testWhenFetchingFailsPublishesAnError() {}\n}\n```\n\n让我们从最简单的场景开始，为构建实现打下基础：\n\
  \n```swift\nfunc testWhenFetchingStartsPublishesEmptyMenu() {\n    let viewModel\
  \ = MenuList.ViewModel(menu: [.fixture()])\n    XCTAssertTrue(viewModel.sections.isEmpty)\n\
  }\n```\n\n这个测试失败了，如果我们查看 ViewModel 的当前实现，原因显而易见：`MenuList.ViewModel` 尚未获取或发布数据。我们为静态屏幕编写的\
  \ `MenuList.ViewModel` 版本使用其 `init [MenuItem]` 参数来生成 `sections`：\n\n```swift\n//\
  \ MenuList.ViewModel.swift\nextension MenuList {\n    struct ViewModel {\n     \
  \   let sections: [MenuSection]\n        init(\n            menu: [MenuItem],\n\
  \            menuGrouping: @escaping ([MenuItem]) -> [MenuSection] = groupMenuByCategory\n\
  \        ) {\n            self.sections = menuGrouping(menu)\n        }\n    }\n\
  }\n```\n\n为了让测试通过，我们能做的最简单的事情就是将 `menuGrouping` 应用于空数组的结果赋值给 `sections`：\n\n```swift\n\
  // MenuList.ViewModel.swift\nextension MenuList {\n    struct ViewModel {\n    \
  \    let sections: [MenuSection]\n        init(\n            menu: [MenuItem],\n\
  \            menuGrouping: @escaping ([MenuItem]) -> [MenuSection] = groupMenuByCategory\n\
  \        ) {\n            self.sections = menuGrouping([])\n        }\n    }\n}\n\
  ```\n\n我们刚刚所做的更改是*最简单*的做法，而非*最佳*做法。这是一个小的改动，使我们的新测试通过，建立了一个绿色基线，在此基础上我们可以进行更实质性的改动：移除\
  \ `[MenuItem] init` 参数。\n\n新测试可能通过了，但针对原始行为的测试现在失败了。这没关系：我们有意识地改变了该测试所断言的行为，使其过时。当测试过时时，删除它们是合适的。然而，与其删除它，不如暂时跳过它，因为我们稍后可能在测试成功路径时需要用到其中的一些代码：\n\
  \n```swift\nfunc testCallsGivenGroupingFunction() throws {\n    try XCTSkipIf(true,\
  \ \"暂时跳过此项，保留它以便稍后复用部分代码\")\n    // ...\n}\n```\n\n跳过测试比注释测试更好。对于每个跳过的测试，你会在 Xcode\
  \ 的测试导航器以及内联通知中看到一条记录。而被注释的测试则不易察觉。被注释的代码容易被遗忘并在代码库中腐化；而跳过的测试则更难被忽略。\n\n图 7-1 和\
  \ 7-2 展示了 Xcode 如何在代码编辑器中内联显示以及如何在测试导航器中显示跳过的测试。\n\n![../images/501287_1_En_7_Chapter/501287_1_En_7_Fig2_HTML.jpg](img/501287_1_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2：Xcode 在测试导航器中报告跳过的测试\n\n![../images/501287_1_En_7_Chapter/501287_1_En_7_Fig1_HTML.png](img/501287_1_En_7_Fig1_HTML.png)\n\
  \n图 7-1：Xcode 在代码编辑器中内联报告跳过的测试\n\n我们对 ViewModel `init` 的修改使其忽略了 `menu` 和 `menuGrouping`\
  \ 这两个参数。通常，我会鼓励你在达到绿色状态后，在重构步骤中移除未使用的代码。在这种情况下，我们可以预期在后续实现中会用到这些代码，因此最好保留它们。\n\n\
  我们可以利用绿色测试作为安全防护，对 `MenuList.ViewModel` 进行重构，使其符合 `ObservableObject`。如果在重构过程中，我们的某个更改破坏了行为，测试会告诉我们。\n\
  \n让我们让 `MenuList.ViewModel` 遵循 `ObservableObject`，并将 `sections` 包装在 `@Published`\
  \ 中：\n\n```swift\n// MenuList.ViewModel.swift\nimport Combine\nextension MenuList\
  \ {\n    class ViewModel: ObservableObject {\n        @Published private(set) var\
  \ sections: [MenuSection]\n        init(\n            menu: [MenuItem],\n      \
  \      menuGrouping: @escaping ([MenuItem]) -> [MenuSection] = groupMenuByCategory\n\
  \        ) {\n            self.sections = menuGrouping([])\n        }\n    }\n}\n\
  ```\n\n这次更改中有几点需要注意。首先，我们必须 `import Combine`，因为正是这个框架定义了 `ObservableObject` 协议和\
  \ `@Published` 属性包装器。\n\n`MenuList.ViewModel` 必须成为一个 `class`，因为 `ObservableObject`\
  \ 要求遵循它的类型必须是类。\n\n`sections` 属性必须从 `let` 改为 `var`。这是使用 `@Published` 包装的要求。这很合理：被发布的值会随时间变化。\n\
  \n最后，为了确保只有 `MenuList.ViewModel` 内部的代码才能修改 `sections`，其访问级别现在设为 `private(set)`：消费者可以读取它，但不能更新它。\n\
  \n完成这些更改后，测试仍然通过。重构成功了。\n\n现在我们已经将 `MenuList.ViewModel` 配置为一个带有 `@Published` 属性的\
  \ `ObservableObject`，是时候开始通过它发布值了。为此，我们还需要编写两个测试：一个用于请求成功的正向路径，另一个用于后端返回错误的失败路径。\n\
  \n我通常建议先处理失败场景，以避免忽视错误处理，因为一旦完成正向路径的实现，很容易就转向下一个功能。然而，在本例中，正向路径与我们已实现的获取开始行为类似：从一个空数组变为包含元素的数组。从这里入手门槛较低，是向前迈进的一小步：\n\
  \n```swift\n// MenuList.ViewModelTests.swift\n// ...\nfunc testWhenFecthingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()\
  \ {\n    // 安排 ViewModel 及其数据源\n    // 对 ViewModel 执行操作以触发更新\n    // 断言预期行为\n}\n\
  ```\n\n编写这个测试的结构引出了两个问题：\n\n-   当我们没有真实的网络组件作为数据源时，如何模拟成功的获取操作？\n-   预期行为是 `@Published`\
  \ 的 sections 会更新；我们如何测试 `@Published` 的值？\n\n让我们先集中讨论如何在菜单获取中模拟接收一个值。\n\n\n\n## 依赖倒置原则\n\
  \n为了模拟获取菜单时接收一个值或错误，我们需要一个能首先获取菜单的对象。最终那会是网络组件，但我们尚未构建它。由于我们正在处理获取行为的 UI 侧，构建网络组件就太绕远了；这会拖慢我们的反馈循环。为解决这个先有鸡还是先有蛋的问题，我们需要退一步审视我们的设计。\n\
  \n与其在`MenuList.ViewModel`中期待一个具体的菜单获取类型，不如定义一个抽象并与它交互。在 Swift 中实现这一点的方法是使用`protocol`：\n\
  \n```\n// MenuFetching.swift\nimport Combine\nprotocol MenuFetching {\nfunc fetchMenu()\
  \ -> AnyPublisher\n}\n```\n\n`fetchMenu`方法返回一个`AnyPublisher`，其输出为`[MenuItem]`。Combine\
  \ 将`AnyPublisher`定义为一种仅供消费的专用`Publisher`；你无法从中`发送`新值，只能订阅。\n\n在《敏捷软件开发：原则、模式与实践》中，罗伯特·C·马丁将这种定义组件间抽象的技术称为**依赖倒置原则**，简称\
  \ DIP。\n\nDIP 指出：“高层模块不应依赖低层模块。两者都应依赖抽象。”也就是说，`MenuList.ViewModel`不应依赖执行网络请求的对象，而应依赖菜单获取操作的抽象。在我们的上下文中，这意味着定义一个`protocol`来表示抽象——`MenuFetching`，并让`MenuList.ViewModel`将其作为菜单获取组件所期待的类型使用。\n\
  \n“倒置”一词指的是从该原则提出时面向对象设计方法中使用的依赖关系转变，那时高层模块依赖低层模块。在传统模型中，由于直接依赖，低层模块的变更会要求高层模块也随之变更。“这种困境荒谬至极！”马丁感叹道。“应该是设定政策的高层模块去影响低层的具体模块。包含高层业务规则的模块应优先于并独立于包含实现细节的模块。”\n\
  \n应用依赖倒置在生产代码和测试代码中都会带来积极的实践后果。在生产代码中，我们可以在等待网络组件就绪时，构建一个简单的符合`MenuFetching`协议的对象供\
  \ ViewModel 使用。在测试中，我们可以创建一个符合该协议的对象，并用它模拟获取操作的不同结果，以验证 ViewModel 的行为。测试中用于模拟生产对象的对象被称为*测试替身*，我们将在下一章学习它们。\n\
  \n## 依赖倒置 vs. 依赖注入\n\n尽管名称相似，但切记不要混淆依赖*倒置*与*注入*。\n\n依赖倒置原则指出，你应该为组件定义其所依赖的抽象，以便低层组件的变更不会影响使用它的高层组件。\n\
  \n依赖注入则是指让你的对象要求系统内它们需要交互的其他组件的实例，而非在内部创建这些实例。\n\nDIP 和 DI 都能让你的软件设计更灵活，但方式微妙不同：一个涉及对象应如何交互，另一个涉及对象应如何构建。\n\
  \n## 用 DIP 将 ViewModel 与数据获取解耦\n\n我们已经看到，要将 ViewModel 与数据获取实现细节解耦，需要让它依赖`MenuFetching`抽象。我们从生产代码开始实现这一更改。\n\
  \n你可能会问：“为什么不从测试开始？”在实践 TDD 时，你是在优化快速反馈循环。正如我们在第 3 章所见，编译器也是 TDD 工作流的一部分。在这种情况下，从生产代码而非测试开始变更能提供更快的反馈，因为编译器会指出所有需要更新的代码：\n\
  \n```\n// MenuList.ViewModel.swift\nextension MenuList {\nclass ViewModel: ObservableObject\
  \ {\n@Published private(set) var sections: [MenuSection]\ninit(\nmenuFetching: MenuFetching,\n\
  menuGrouping: @escaping ([MenuItem]) -> [MenuSection] = groupMenuByCategory\n) {\n\
  self.sections = menuGrouping([])\n}\n}\n}\n```\n\n如果你尝试使用键盘快捷键`Shift Cmd U`构建应用及其测试目标，你会在`AlbertosApp.swift`中看到一个编译器错误：\n\
  \n```\nMenuList(viewModel: .init(menu: menu))\n// 编译器报错：\n// - Extra argument 'menu'\
  \ in call\n// - Missing argument for parameter 'menuFetching' in call\n```\n\n编译器告诉我们`AlbertosApp`需要向`MenuList.ViewModel\
  \ init`提供一个符合`MenuFetching`的类型实例。\n\n这意味着，为了让应用能编译，我们需要更新 ViewModel 的调用点，为其提供一个`MenuFetching`实例。为此，我们首先需要创建一个符合`MenuFetching`的对象。\n\
  \n正如我们讨论过的，与其提供“真正”的实现，不如快速构建一个占位符，这样我们就能专注于动态更新 UI。由于最终实现也会符合`MenuFetching`，我们可以在它就绪后轻松替换，而`MenuList.ViewModel`毫不知情：\n\
  \n```\n// MenuFetchingPlaceholder.swift\nimport Combine\nimport Foundation\nclass\
  \ MenuFetchingPlaceholder: MenuFetching {\nfunc fetchMenu() -> AnyPublisher {\n\
  return Future { $0(.success(menu)) }\n// 使用延迟模拟异步获取\n.delay(for: 0.5, scheduler:\
  \ RunLoop.main)\n.eraseToAnyPublisher()\n}\n}\n```\n\n[`Future`](https://developer.apple.com/documentation/combine/future)\
  \ 是 Combine 中一种便捷类型，用于创建“一个最终产生单个值然后完成或失败的发布者”。`Future { $0(.success(menu)) }` 创建了一个发出`menu`然后完成的`Publisher`。`menu`是我们在第\
  \ 4 章中作为应用第一次迭代的一部分硬编码的全局`MenuItem`数组。\n\n现在我们有了更新源代码中`MenuList.ViewModel`调用点所需的一切：\n\
  \n```\n// AlbertosApp.swift\n@main\nstruct AlbertosApp: App {\nvar body: some Scene\
  \ {\nWindowGroup {\nNavigationView {\nMenuList(\nviewModel: .init(\nmenuFetching:\
  \ MenuFetchingPlaceholder()\n)\n)\n}\n}\n}\n}\n```\n\n如果再次运行`Shift Cmd U`，你会看到构建仍然失败，但这次是在测试目标中。我们之前没有看到这些错误，因为\
  \ Xcode 只会在生产代码构建成功后尝试构建测试目标。\n\n这些新的编译器错误同样是由于`MenuList.ViewModel init`调用未使用`MenuFetching`。我们可以像处理生产代码一样修复它们：使用`MenuFetchingPlaceholder`。\n\
  \n从这样：\n\n```\nlet viewModel = MenuList.ViewModel(menu: [.fixture()])\n```\n\n改成这样：\n\
  \n```\nlet viewModel = MenuList.ViewModel(\nmenuFetching: MenuFetchingPlaceholder()\n\
  )\n```\n\n现在测试可以构建了，如果你运行它们，你会看到它们也通过了。\n\n我们已经建立了抽象层，并且回到了绿色状态：让我们继续前进，实现当菜单获取成功时\
  \ ViewModel 如何更新其 sections 的测试。\n\n\n\n## 测试 `@Published` 属性的异步更新\n\n我们要验证的是，当菜单获取成功时，由接收到的\
  \ `[MenuItem]` 生成的各个 section 会更新 `@Published` 属性值。\n\n当用 `@Published` 包装一个属性时，编译器会为该属性创建一个\
  \ `Publisher`。这个 `Publisher` 会在每次属性更新时发布一个新值，你可以通过 `$` 前缀来访问它。因此，测试 `@Published`\
  \ 属性如何更新，实际上就是测试其 `Publisher` 的行为。\n\n`Publisher` 随时间传输一系列值；它们的行为是异步的。正如我们在第 2 章讨论过的，XCTest\
  \ 中测试异步代码的主要工具是 `XCTExpectation`。\n\n以下是该测试：\n\n```swift\n// MenuList.ViewModelTests.swift\n\
  // ...\nclass MenuListViewModelTests: XCTestCase {\n    var cancellables = Set<AnyCancellable>()\n\
  \    // ...\n    func testWhenFecthingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()\
  \ {\n        var receivedMenu: [MenuItem]?\n        let expectedSections = [MenuSection.fixture()]\n\
  \        let spyClosure: ([MenuItem]) -> [MenuSection] = { items in\n          \
  \  receivedMenu = items\n            return expectedSections\n        }\n      \
  \  let viewModel = MenuList.ViewModel(menuFetching: MenuFetchingPlaceholder(), menuGrouping:\
  \ spyClosure)\n        let expectation = XCTestExpectation(\n            description:\
  \ \"Publishes sections built from received menu and given grouping closure\"\n \
  \       )\n        viewModel\n            .$sections\n            .dropFirst()\n\
  \            .sink { value in\n                // 确保分组闭包接收到了正确的菜单数据\n          \
  \      XCTAssertEqual(receivedMenu, menu)\n                // 确保发布的值是分组闭包的执行结果\n\
  \                XCTAssertEqual(value, expectedSections)\n                expectation.fulfill()\n\
  \            }\n            .store(in: &cancellables)\n        wait(for: [expectation],\
  \ timeout: 1)\n    }\n    // ...\n}\n```\n\n我们来解析一下这段测试代码。该测试：\n\n1. 像在静态版本测试中一样，设置了一个\
  \ spy 闭包。\n2. 实例化了 `MenuList.ViewModel`，并向其传递了一个 `MenuFetchingPlaceholder` 实例。这使我们能够模拟菜单获取成功的场景。\n\
  3. 定义了一个 `XCTestExpectation` 来测试异步发布行为。\n4. 通过 `$` 前缀，访问 ViewModel 中 `@Published\
  \ sections` 属性的 `Publisher`。\n5. 调用 `dropFirst()` 来跳过接收到的第一个值。第一个发布的值是属性定义中设置的默认值。忽略它之后，我们就可以读取下一个到达的值，并检查它是否符合我们的预期，而无需追踪\
  \ `Publisher` 发出的多个值，从而简化了测试设置。\n6. 使用 `.sink` 将一个订阅者闭包附加到 `Publisher` 流上。\n7. 在观察者中，断言\
  \ `value` 是 `MenuFetchingPlaceholder` 返回的 `menu`，并且是使用给定的分组闭包构建的，然后满足 `expectation`。\n\
  8. 将 `sink` 调用返回的 `AnyCancellable` 存储到一个 `Set` 中。我们需要这样做，以便持有事件流的内存引用，否则，在其有机会发出值之前，其分配的内存就会被释放。\n\
  \n该测试目前会失败，错误信息是“异步等待失败：超过了 1 秒的超时时间，且存在未满足的期望：'Publishes sections build from received\
  \ menu and given grouping closure'。”为了使测试通过，让我们添加代码来订阅菜单获取器的 `Publisher`，并在新值到达时更新我们的\
  \ sections：\n\n```swift\n// MenuList.ViewModel.swift\n// ...\ninit(\n    menuFetching:\
  \ MenuFetching,\n    menuGrouping: @escaping ([MenuItem]) -> [MenuSection] = groupMenuByCategory\n\
  ) {\n    sections = []\n    menuFetching\n        .fetchMenu()\n        .sink(\n\
  \            receiveCompletion: { _ in },\n            receiveValue: { [weak self]\
  \ value in\n                self?.sections = menuGrouping(value)\n            }\n\
  \        )\n        .store(in: &cancellables)\n}\n```\n\n测试现在通过了。我们只剩下一步：让 `MenuList`\
  \ 观察这个 ViewModel，以便 SwiftUI 能在数据可用时更新它。这只需将 `viewModel` 属性用 `@ObservedObject` 包装一下即可：\n\
  \n```swift\n@ObservedObject var viewModel: ViewModel\n```\n\n如果你现在运行这个应用，你会看到它的行为跟之前一样，只有一点小区别：菜单会在屏幕上延迟片刻后出现——准确地说，是\
  \ 0.5 秒，即我们在 `MenuFetchingPlaceholder` 中设置的值。\n\n当前流程中明显缺少的一个东西是加载状态的管理。没有任何指示表明应用正在加载数据；用户只能盯着一个空白屏幕，直到菜单突然出现。\n\
  \n正确处理加载状态是每个应用必不可少的功能，但为了继续学习新概念，我们在此不会实现它。你可以将其作为练习自行尝试。\n\n一个简单的实现方案可以是：利用菜单数组的内容作为加载状态的代理：如果数组为空，那么应用肯定在等待响应。一个更优雅、更健壮的解决方案是，使用一个\
  \ `enum` 来表示视图所有可能的状态（未请求、加载中、加载成功、加载失败）。可以查看 [`RemoteData`](https://github.com/mokagio/RemoteData)\
  \ 获取这种做法的示例。\n\n## 神秘访客\n\n我们刚刚编写的测试中，有一些不够理想的地方。一个了解上下文较少的读者可能无法立即理解，为什么我们要断言接收到的菜单等于一个名为\
  \ `menu` 的全局变量。这个值在测试中就像一个神秘的访客；它从哪里来、为什么在那里，都不是一目了然的。\n\n当测试输入和输出之间的因果关系不够直接时，理解测试就会变得更加困难，而且如果测试失败了，找到失败原因也会更难。你应该避免在测试中出现“神秘访客”，并始终努力为读者提供理解代码所需的所有信息。我们很快就会看到如何消除这个特定的“神秘访客”。\n\
  \n在本章中，我们将*分解问题，逐一解决*的方法应用到了从远程 API 获取菜单并将其加载到屏幕上的任务中。我们选择从更新 UI 的逻辑开始，以便在菜单数据可用时更新界面。我们的实现还很粗糙，也不完整，但它是可行的。这是一个坚实的根基，我们可以在此基础上继续构建。\n\
  \n我们将初期的静态 ViewModel 演进成了从一个异步源获取数据，并利用 SwiftUI 和 Combine 的原生数据流机制将其变更流式传输给使用者的\
  \ ViewModel。充分利用这些框架极大地简化了我们的工作，因为我们只需要关注请求数据和转换数据，而它们则负责保持视图的更新。\n\n通过应用*依赖反转原则*，在\
  \ ViewModel 和网络层之间定义了一个抽象层，我们在没有真正从网络获取数据的情况下就实现了一个可工作的版本。通过在抽象层背后放置一个网络部分的占位符，我们得以先编写测试，然后实现了\
  \ `MenuList.ViewModel` 在 API 返回成功值时的期望行为。\n\n我们还需要处理失败场景。至于如何消除“神秘访客”？这正是我们在下一章要解决的问题。\n\
  \n## 练习时间\n\n我们为 `@Published` 属性编写的测试隐含了一个假设：在默认的初始值之后，只会发布一个值。这是我们期望从远程 REST API\
  \ 的网络请求中得到的行为：发起一个 HTTP 调用，要么成功，要么失败。\n\n另一方面，`Publisher` 可以随时间发出*多个*值。\n\n为了学习如何处理\
  \ `Publisher` 发送的多个值，请尝试在不使用 `dropFirst()` 的情况下重写该测试，并验证接收到的第一个值是空数组，而第二个值符合菜单转换的预期。\n\
  \n\n\n## 关键要点\n\n- SwiftUI 和 Combine 通过 `ObservableObject`、`@Published` 和 `@ObservedObject`，让视图在新数据出现时轻松更新。使用这些工具，框架会在每次发布新值时自动更新视图。\n\
  - 应用依赖倒置原则，通过抽象层将 ViewModel 与数据获取的实现细节解耦。你可以为 ViewModel 定义一个 `protocol` 来请求数据，而不是使用具体类型。\n\
  - 抽象层允许你为尚未准备好的组件提供占位实现。你可以专注于一次构建一个部分，而无需先绕道构建其依赖项。\n- 你可以使用 `sink` 和 `XCTestExpectation`\
  \ 测试 `@Published` 属性的异步更新。通过订阅与 `@Published` 属性关联的 `Publisher`，你可以测试其随时间的变化。\n-\
  \ 使用 `XCTSkipIf(_:, _:)` 代替注释那些你还没准备好删除的测试代码。此 API 会在测试报告中生成一条记录，从而更难忘记代码，并避免因过时注释污染代码库。\n\
  \n"
- "# 8. 测试基于间接输入的代码\n\n*如何隔离测试依赖于间接输入的行为？*\n\n*通过为依赖项构建一个测试专用的替代品，你可以用它来控制依赖项提供给被测系统的间接输入。*\n\
  \n我们正在构建从远程 API 获取新菜单功能的 UI 组件。我们从 UI 开始，以拥有动态更新的*最早可测试*版本，但这意味着我们还没有真实的网络组件。\n\n\
  在上一章中，我们应用了*依赖注入原则*，并为 ViewModel 所依赖的 `MenuFetching` 定义了一个抽象，这使我们能够使用网络对象的占位实现，并专注于当前任务。这让我们能够编写测试，驱动\
  \ `MenuList.ViewModel` 在收到菜单数据后更新视图，但这些测试并不完整：我们还没有测试错误处理，并且成功的获取测试中存在一个“神秘嘉宾”。\n\
  \n测试 `MenuList.ViewModel` 行为的挑战在于，它依赖于 `MenuFetching` 提供的间接输入。到目前为止，我们测试的组件都是通过方法接收输入并返回输出，但\
  \ `MenuList.ViewModel` 的输入来自于它在内部调用 `MenuFetching.fetchMenu()` 时获得的返回值。\n\n在本章中，我们将学习如何使用*桩测试替身*来解决这个限制，从而对\
  \ `MenuFetching` 发送给 `MenuList.ViewModel` 的间接输入进行细粒度控制。\n\n## 桩测试替身\n\n在上一章中，我们为成功的菜单获取场景编写了以下测试：\n\
  \n```\n// MenuList.ViewModelTests.swift\nfunc testWhenFecthingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()\
  \ {\n    var receivedMenu: [MenuItem]?\n    let expectedSections = [MenuSection.fixture()]\n\
  \    let spyClosure: ([MenuItem]) -> [MenuSection] = { items in\n        receivedMenu\
  \ = items\n        return expectedSections\n    }\n    let viewModel = MenuList.ViewModel(menuFetching:\
  \ MenuFetchingPlaceholder(), menuGrouping: spyClosure)\n    let expectation = XCTestExpectation(\n\
  \        description: \"Publishes sections built from received menu and given grouping\
  \ closure\"\n    )\n    viewModel\n        .$sections\n        .dropFirst()\n  \
  \      .sink { value in\n            // 确保分组闭包被调用时传入的是接收到的菜单\n            XCTAssertEqual(receivedMenu,\
  \ menu)\n            // 确保发布的值是分组闭包的结果\n            XCTAssertEqual(value, expectedSections)\n\
  \            expectation.fulfill()\n        }\n        .store(in: &cancellables)\n\
  \    wait(for: [expectation], timeout: 1)\n}\n```\n\n该测试使用全局的 `menu` 常量来断言 ViewModel\
  \ 正确调用其分组闭包。`menu` 是一个*神秘嘉宾*：除非你最近看过 `MenuFetchingPlaceholder` 的实现，否则你不会知道这就是它返回的值。\n\
  \n难以理解的测试是一种负担：当它们失败时，弄清楚原因以及修复它们会花费更长的时间。一个匆忙或不懂得测试价值的开发者可能会注释掉测试“稍后修复”，但我们都知道“稍后”永远不会到来。\n\
  \n我们如何让间接输入与结果行为之间的关系变得清晰？有没有一种方法可以在“安排”阶段，像我们之前处理直接输入一样，以同样直接的方式配置间接输入？是的，有办法。\n\
  \n因为 `MenuList.ViewModel` 依赖于抽象而非具体类型，我们可以构建另一个 `MenuFetching` 实现，在其中配置它提供的间接输入，并在测试中使用它，这毫无阻碍。\n\
  \n在 *xUnit 测试模式* 中，Gerard Meszaros 将被测系统依赖的这种“测试专用等价物”称为*测试替身*。\n\n根据依赖项在测试行为中所扮演的角色，我们可以使用不同类型的测试替身。我们即将构建的是*桩*。\n\
  \n桩是一种测试替身，它提供对被测系统间接输入的控制：\n\n```\n// MenuFetchingStub.swift\n@testable import\
  \ Albertos\nimport Combine\nimport Foundation\n\nclass MenuFetchingStub: MenuFetching\
  \ {\n    let result: Result<[MenuItem], Error>\n\n    init(returning result: Result<[MenuItem],\
  \ Error>) {\n        self.result = result\n    }\n\n    func fetchMenu() -> AnyPublisher<[MenuItem],\
  \ Error> {\n        return result.publisher\n            // 使用延迟来模拟现实世界的异步行为\n \
  \           .delay(for: 0.1, scheduler: RunLoop.main)\n            .eraseToAnyPublisher()\n\
  \    }\n}\n```\n\n桩的工作方式取决于它所替代的依赖项类型，但指导原则始终是提供一种配置所需输入的方法，并在桩的实现中使用它。\n\n在这个例子中，我们用响应的\
  \ `Result` 初始化桩，然后将其转换为 `AnyPublisher` 作为 `fetchMenu()` 的返回值。\n\n另外，注意用于模拟异步行为的延迟。有时，通过提供立即返回所需值的测试替身来从测试中移除异步行为是有用的。然而，在这个例子中，异步行为正是我们要实现的。移除延迟会使测试脱离真实行为，并可能导致误报。\n\
  \n现在，我们可以通过用 `MenuFetchingStub` 替换 `MenuFetchingPlaceholder` 来驱逐神秘的 `menu` 访客：\n\
  \n```\nfunc testWhenFecthingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()\
  \ {\n    var receivedMenu: [MenuItem]?\n    let expectedSections = [MenuSection.fixture()]\n\
  \    let spyClosure: ([MenuItem]) -> [MenuSection] = { items in\n        receivedMenu\
  \ = items\n        return expectedSections\n    }\n    let expectedMenu = [MenuItem.fixture()]\n\
  \    let menuFetchingStub = MenuFetchingStub(returning: .success(expectedMenu))\n\
  \    let viewModel = MenuList.ViewModel(menuFetching: menuFetchingStub, menuGrouping:\
  \ spyClosure)\n    let expectation = XCTestExpectation(\n        description: \"\
  Publishes sections built from received menu and given grouping closure\"\n    )\n\
  \    viewModel\n        .$sections\n        .dropFirst()\n        .sink { value\
  \ in\n            // 确保分组闭包被调用时传入的是接收到的菜单\n            XCTAssertEqual(receivedMenu,\
  \ expectedMenu)\n            // 确保发布的值是分组闭包的结果\n            XCTAssertEqual(value,\
  \ expectedSections)\n            expectation.fulfill()\n        }\n        .store(in:\
  \ &cancellables)\n    wait(for: [expectation], timeout: 1)\n}\n```\n\n测试仍然通过。对于\
  \ `MenuList.ViewModel` 来说，没有任何变化。ViewModel 不知道也不关心我们给它的是哪个具体的 `MenuFetching` 实现——无论是占位实现、测试替身还是真实的实现。\n\
  \n我们现在对被测系统的间接输入与其输出之间有了清晰的因果关系。接下来让我们转向列表中最后一个同样重要的测试：错误处理的测试。\n\n\n\n### 使用 `Result`\
  \ 显式处理错误\n\n目前，`sections` 属性的类型是 `[MenuSection]`，但 `MenuFetching` 也可能抛出错误，而视图需要能显示这个错误。\n\
  \n为了处理这两种情况，我们可以使用 `Result` 类型。`Sections` 可以变成 `Result<[MenuSection], Error>`，我们可以更新\
  \ `MenuList`，让它根据结果是 `success` 还是 `failure` 来渲染不同的内容。\n\n像 `Result` 这样的枚举的妙处在于，它能在类型系统层面明确地表达成功和失败情况之间的互斥关系。视图要么处于成功状态，要么处于失败状态，而\
  \ `Result` 实例要么是 `.success` 情况，要么是 `.failure` 情况。\n\n让我们利用编译器错误作为快速反馈机制来进行这项修改：\n\
  \n```\n// MenuList.ViewModel.swift\n// ...\nclass ViewModel: ObservableObject {\n\
  @Published private var sections: Result = .success([])\ninit(\nmenuFetching: MenuFetching,\n\
  menuGrouping: @escaping ([MenuItem]) -> [MenuSection] = groupMenuByCategory\n) {\n\
  menuFetching\n.fetchMenu()\n.sink(\nreceiveCompletion: { _ in },\nreceiveValue:\
  \ { [weak self] value in\nself?.sections = .success(menuGrouping(value))\n}\n)\n\
  .store(in: &cancellables)\n```\n\n在我们更新 `MenuList.ViewModel` 后，由于类型变化，它的视图无法构建：\n\
  \n```\n// MenuList.swift\n// ...\nvar body: some View {\nList {\nForEach(viewModel.sections)\
  \ { section in\n// 编译器提示：无法将类型 'Result' 的值\n// 转换为预期的参数类型 'Range'\n//\n// 后续访问 sections\
  \ 时还会出现更多错误...\n```\n\n我们需要更新 `MenuList` 来处理 `Result` 类型的 `success` 和 `failure`\
  \ 两种情况：\n\n```\n// MenuList.swift\n// ...\nvar body: some View {\nswitch viewModel.sections\
  \ {\ncase .success(let sections):\nList {\nForEach(sections) { section in\nSection(header:\
  \ Text(section.category)) {\nForEach(section.items) { item in\nMenuRow(viewModel:\
  \ .init(item: item))\n}\n}\n}\n}\ncase .failure(let error):\nText(\"发生了一个错误：\")\n\
  Text(error.localizedDescription).italic()\n}\n}\n```\n\n更新 `MenuList` 后，源代码构建成功，但测试无法通过。正如我们在前一章中讨论过的，我们现在才看到这个失败，是因为\
  \ Xcode 在构建生产目标之前不会构建测试目标。\n\n编译器高亮显示了测试中需要更新的代码，伴随的失败提示如下：\n\n```\n// MenuList.ViewModelTests.swift\n\
  // ...\nXCTAssertTrue(viewModel.sections.isEmpty)\n// 编译器提示：无法将类型 'Result' 的值\n\
  // 转换为预期的参数类型 'Range'\n```\n\n我们先来更新默认值行为的测试：\n\n```\n// MenuList.ViewModelTests.swift\n\
  // ...\nfunc testWhenFetchingStartsPublishesEmptyMenu() throws {\nlet viewModel\
  \ = MenuList.ViewModel(menuFetching: MenuFetchingStub(returning: .success([.fixture()])))\n\
  let sections = try viewModel.sections.get()\nXCTAssertTrue(sections.isEmpty)\n}\n\
  ```\n\n`.get()` 是一个方便的 `Result` 方法，它会返回成功实例的关联值，否则会抛出异常。\n\n确保 `Result` 值为 `success`\
  \ 的另一种方法是使用 `guard case` 语句。下面是在成功场景测试中的应用示例：\n\n```\n// MenuList.ViewModelTests.swift\n\
  // ...\nfunc testWhenFetchingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()\
  \ {\n// ...\nviewModel\n.$sections\n.dropFirst()\n.sink { value in\nguard case .success(let\
  \ sections) = value else {\nreturn XCTFail(\"期望一个成功的 Result，得到：\\(value)\")\n}\n\
  // 确保分组闭包是用接收到的菜单调用的\nXCTAssertEqual(receivedMenu, expectedMenu)\n// 确保发布的值是分组闭包的结果\n\
  XCTAssertEqual(sections, expectedSections)\nexpectation.fulfill()\n}\n.store(in:\
  \ &cancellables)\n// ...\n}\n```\n\n现在代码可以编译，测试也仍然是绿色的。我们终于可以继续处理失败行为的测试了。我们已经学习了如何为\
  \ `@Published` 属性和 `Result` 类型编写测试；现在只需要使用不同的状态设置和预期即可。\n\n为了给我们的 SUT 提供来自 `MenuFetching`\
  \ 的失败结果，我们需要用一个 `failure` 值来初始化 `MenuFetchingStub`。我们应该用什么作为错误呢？\n\n`sections` 类型在其定义中使用了泛型\
  \ `Error`，但测试中需要一个具体的错误类型。我们可以为测试定义一个专用的错误类型：\n\n```\n// TestError.swift\nstruct\
  \ TestError: Equatable, Error {\nlet id: Int\n}\n```\n\n通过让 `TestError` 遵循 `Equatable`\
  \ 协议，我们可以将其与 `XCTAssertEqual` 一起使用，使测试变得直接明了。\n\n让我们配置 Stub 让它返回一个已知的测试错误，并确保我们的代码将其传递到\
  \ `sections`：\n\n```\nfunc testWhenFetchingFailsPublishesAnError() {\nlet expectedError\
  \ = TestError(id: 123)\nlet menuFetchingStub = MenuFetchingStub(returning: .failure(expectedError))\n\
  let viewModel = MenuList.ViewModel(menuFetching: menuFetchingStub, menuGrouping:\
  \ { _ in [] })\nlet expectation = XCTestExpectation(description: \"发布一个错误\")\nviewModel\n\
  .$sections\n.dropFirst()\n.sink { value in\nguard case .failure(let error) = value\
  \ else {\nreturn XCTFail(\"期望一个失败的 Result，得到：\\(value)\")\n}\nXCTAssertEqual(error\
  \ as? TestError, expectedError)\nexpectation.fulfill()\n}\n.store(in: &cancellables)\n\
  wait(for: [expectation], timeout: 1)\n}\n```\n\n测试因超时而失败。为了让它通过，我们需要在 ViewModel\
  \ 中处理 `MenuFetching` 可能发布的 `.failure` 情况：\n\n```\n// MenuList.ViewModel.swift\n\
  // ...\nmenuFetching\n.fetchMenu()\n.sink(\nreceiveCompletion: { [weak self] completion\
  \ in\nguard case .failure(let error) = completion else { return }\nself?.sections\
  \ = .failure(error)\n},\nreceiveValue: { [weak self] value in\nself?.sections =\
  \ .success(menuGrouping(value))\n}\n)\n.store(in: &cancellables)\n```\n\n现在我们已经处于绿态，功能也完成了，是时候问一下我们是否可以改进到目前为止编写的代码了。\n\
  \n一个不错的改进是将从 `[MenuItem]` 到 `[MenuSection]` 的转换提取为一个专门的步骤：\n\n```\nmenuFetching\n\
  .fetchMenu()\n.map(menuGrouping)\n.sink(\nreceiveCompletion: { [weak self] completion\
  \ in\nguard case .failure(let error) = completion else { return }\nself?.sections\
  \ = .failure(error)\n},\nreceiveValue: { [weak self] value in\nself?.sections =\
  \ .success(value)\n}\n)\n.store(in: &cancellables)\n```\n\n这种对输入的处理与对 `@Published`\
  \ 属性的赋值之间的分离，使数据流更加清晰。\n\n*依赖倒置原则*指出，高层模块不应依赖低层模块，而应依赖抽象。结合本章和前一章，我们看到了应用这一原则所带来的实际好处。\n\
  \n我们已经构建了一个功能完整的动态更新 UI，用于显示从远程 API 获取的菜单列表，尽管我们还没有网络组件。我们确信我们的实现现在可以正常工作，并且在接入真实\
  \ API 获取时也能工作，因为指导编写它的测试使用了一个 *Stub* 来模拟 `MenuFetching` 遵循类型可能产生的各种输入。\n\n现在，靠近视图层的代码已经就位，下一步是向下移动一层，将\
  \ JSON 数据转换为 `MenuItem`。\n\n## 练习时间\n\n你决定通过添加重试功能来增强菜单 UX 的弹性。失败视图应该有一个按钮，能让 ViewModel\
  \ 重新开始获取菜单。\n\n你如何测试这个新行为？\n\n**提示**\n\n一种可行的方法就是让 Stub 发布不同的值，例如先发布一个错误，再发布一个成功，然后编写一个测试来执行重试方法并验证发布值的序列。\n\
  \n\n\n## 关键要点\n\n*   **应用依赖倒置原则可以让你使用测试替身编写测试**。测试替身是受测系统依赖项的“测试专用等价物”，可用于保持测试隔离并模拟不同的行为。\n\
  *   **用桩对象替换依赖项，以控制其向受测系统提供的间接输入**。使用桩对象，你可以测试许多不同的间接输入场景，始终让输入与输出之间的因果关系清晰明确。\n\
  *   **使用** `enum` **来描述 SwiftUI 视图可能处于的互斥状态**。例如，使用 `Result` 来表示由成功或失败操作生成的内容。\n\
  \n"
- "# 9. 测试 JSON 解码\n\n*如何通过测试来驱动编写将 JSON 数据解码为模型对象的逻辑？*\n\n*通过向测试提供预定义的 JSON 输入，并验证解码后产生的值与之匹配。*\n\
  \nSwift 的 `Decodable` 协议提供了一种类型安全的方式来描述如何将 `Data`（例如 HTTP 响应正文中的 JSON）转换为对象或值类型。既然\
  \ `Decodable` 承担了大部分繁重的工作，那么使用测试来驱动 JSON 解码逻辑的实现是否值得呢？\n\n当 JSON 对象的键和值的名称与类型直接映射到\
  \ Swift 时，实际上并不需要编写任何解码逻辑。在这种情况下，你可能会觉得无需单元测试的帮助，直接编写源代码即可。但如果 JSON 对象结构复杂，或者你希望将其解码为具有不同结构的\
  \ Swift 类型，那么测试将助你一臂之力。\n\n是否采用 TDD 来实现 JSON 解码逻辑是一个权衡问题。你在编写测试上多花的时间，是否值得它所带来的反馈？一旦测试就位，它能否防止那些可能被忽略的回归问题？\n\
  \n要回答这些问题，你首先需要知道如何编写这类测试。在本章中，我们将探索两种不同的技术来编写 JSON 解码测试，并进一步思考将 TDD 应用于应用程序这一部分实现的投资回报率。\n\
  \n我们正在稳步推进，让我们的应用程序能够从远程 API 获取菜单。在前面的章节中，我们已经构建了这个新功能的视图部分。现在是时候向技术栈下方再迈进一步，编写代码将网络请求返回的原始\
  \ `Data` 转换为 `MenuItem` 领域模型。\n\nSwift 提供了通过 `Decodable` 协议将 `Data` 解码为不同类型的一种便捷方式。我们的任务就是让\
  \ `MenuItem` 遵守该协议，并验证解码是否成功。\n\n作为你与 Alberto 应用程序开发协议的一部分，你也在构建他的后端服务。你选择使用一个 REST\
  \ API，它会以以下形式返回 JSON 菜单：\n\n```\n[\n{\n\"name\": \"spaghetti carbonara\",\n\"category\"\
  : \"pasta\",\n\"spicy\": false\n},\n{\n\"name\": \"penne all'arrabbiata\",\n\"category\"\
  : \"pasta\",\n\"spicy\": true\n}\n]\n```\n\n我们如何通过 TDD 从那个 JSON 得到 `MenuItem`？一如既往，我们从测试开始。在这个例子中，我们将为解码行为编写一个测试。\n\
  \n编写测试时要问的问题是，如何验证期望的行为是否发生。我们期望的行为是成功的 JSON 解码。为了验证它，我们需要设计一个测试，断言在给定特定 JSON 输入的情况下，解码后的\
  \ Swift 对象具有匹配的属性：\n\n```\n// MenuItemTests.swift\n@testable import Albertos\nimport\
  \ XCTest\nclass MenuItemTests: XCTestCase {\nfunc testWhenDecodedFromJSONDataHasAllTheInputProperties()\
  \ {\n// 安排 JSON 数据输入\n// 执行：从 Data 解码一个 MenuItem 实例\n// 断言：MenuItem 与输入匹配\n}\n}\n\
  ```\n\n如果输入是：\n\n```\n{\n\"name\": \"a name\",\n\"category\": \"a category\",\n\"\
  spicy\": true\n}\n```\n\n那么我们的期望应当是：\n\n```\n// MenuItemTests.swift\n// ...\nfunc\
  \ testWhenDecodedFromJSONDataHasAllTheInputProperties() {\n// 安排 JSON 数据输入\n// 执行：从\
  \ Data 解码一个 MenuItem 实例\nXCTAssertEqual(item.name, \"a name\")\nXCTAssertEqual(item.category,\
  \ \"a category\")\nXCTAssertEqual(item.spicy, true)\n}\n```\n\nSwift 的 `JSONDecoder`\
  \ 是用来从输入的 JSON `Data` 中获取 `item` 实例的类型：\n\n```\n// MenuItemTests.swift\n// ...\n\
  func testWhenDecodedFromJSONDataHasAllTheInputProperties() throws {\n// 安排 JSON\
  \ 数据输入\nlet item = try JSONDecoder()    .decode(MenuItem.self, from: data)\nXCTAssertEqual(item.name,\
  \ \"a name\")\nXCTAssertEqual(item.category, \"a category\")\nXCTAssertEqual(item.spicy,\
  \ true)\n}\n```\n\n我们如何为测试安排 JSON 输入呢？让我们看看两种不同的方法。\n\n## 选项 1：内联字符串\n\n生成 JSON\
  \ 输入的一种方法是将其定义为测试中的内联 `String`，然后将其转换为 `Data`：\n\n```\n// MenuItemTests.swift\n\
  // ...\nfunc testWhenDecodedFromJSONDataHasAllTheInputProperties() throws {\nlet\
  \ json = #\"{ \"name\": \"a name\", \"category\": \"a category\", \"spicy\": true\
  \ }\"#\nlet data = try XCTUnwrap(json.data(using: .utf8))\n// 编译器说：实例方法 'decode(_:from:)'\
  \ 要求\n// 'MenuItem' 遵守 'Decodable'\nlet item = try JSONDecoder().decode(MenuItem.self,\
  \ from: data)\nXCTAssertEqual(item.name, \"a name\")\nXCTAssertEqual(item.category,\
  \ \"a category\")\nXCTAssertEqual(item.spicy, true)\n}\n```\n\n编译器指出我们的 `MenuItem`\
  \ 没有遵守 `Decodable`。让我们来满足这个条件：\n\n```\n// MenuItem.swift\nstruct MenuItem {\n//\
  \ ...\n}\n// ...\nextension MenuItem: Decodable {}\n```\n\n现在测试可以构建了。它也已经通过了，因为\
  \ `MenuItem` 中属性的名称与 JSON 输入中键的名称匹配，所以编译器为我们处理了所有解码工作。\n\n测试在我们仅添加了遵守某个 `protocol`\
  \ 而没有编写任何额外代码的情况下就通过了，这引发了一个问题：我们是在测试我们自己代码的行为，还是在测试 `Decodable` 的行为？\n\n正如本章引言中提到的，在某些情况下，使用测试来驱动\
  \ JSON 解码实现可能是不必要的开销。我们正在学习如何编写这类测试，以便判断它们何时有用、何时无用。让我们看看“安排”阶段的另一个选项，然后讨论何时适合将\
  \ TDD 用于 JSON 解码。\n\n\n\n## 选项 2：JSON 文件\n\n为测试提供输入的另一种方式是使用 JSON 文件来保存输入值。\n\n\
  要向测试目标添加 JSON 文件：\n\n1. 在项目导航器中选择测试目标文件夹。\n2. 右键点击它，然后点击“新建文件…”或按下 `Cmd N`。\n3.\
  \ 选择“其他”➤“空文件”，然后点击“下一步”或按下 `Enter`。\n\n图 9-1 展示了 Xcode“新建文件…”对话框中的“空文件”选项。\n\n\
  ![../images/501287_1_En_9_Chapter/501287_1_En_9_Fig1_HTML.jpg](img/501287_1_En_9_Fig1_HTML.jpg)\n\
  \n**图 9-1** Xcode“新建文件…”对话框，已筛选为仅显示空文件模板\n\n4. 为文件名添加 `.json` 扩展名，然后选择“创建”或按下 `Enter`。\n\
  \n图 9-2 展示了“新建文件…”流程中的最终对话框，你可以在其中选择文件的名称、位置和目标。\n\n![../images/501287_1_En_9_Chapter/501287_1_En_9_Fig2_HTML.jpg](img/501287_1_En_9_Fig2_HTML.jpg)\n\
  \n**图 9-2** Xcode 中用于命名文件并将其添加到文件系统和项目目标的对话框\n\n5. 用菜单项的 JSON 数据填充该文件：\n\n```\n\
  // menu_item.json\n{\n\"name\": \"a name\",\n\"category\": \"a category\",\n\"spicy\"\
  : true\n}\n```\n\n或者，你也可以使用你喜欢的文本编辑器创建 JSON 文件，并将其保存到测试目标文件夹中。然后，在 Xcode 中右键点击测试目标文件夹，选择“将文件添加到‘`<测试目标名称>`’…”或按下\
  \ `Cmd Alt A`，即可打开文件导航器来选择你的 JSON 文件。\n\n一旦文件成为项目的一部分，你就可以像这样在测试中加载它：\n\n```\n//\
  \ MenuItemTests.swift\n// ...\nfunc testDecodesFromJSONData() throws {\n    let\
  \ url = try XCTUnwrap(\n        Bundle(for: type(of: self)).url(forResource: \"\
  menu_item\", withExtension: \"json\")\n    )\n    let data = try Data(contentsOf:\
  \ url)\n    let item = try JSONDecoder().decode(MenuItem.self, from: data)\n   \
  \ XCTAssertEqual(item.name, \"a name\")\n    XCTAssertEqual(item.category, \"a category\"\
  )\n    XCTAssertEqual(item.spicy, true)\n}\n```\n\n如果你还没有删除上一个示例中我们编写的源码更改，那么这个测试会立即通过。\n\
  \n通过将文件读取逻辑提取到一个辅助函数中，我们可以让测试代码更整洁。如果你有不止一两个用于模型解码的测试，这会很有用：\n\n```\n// XCTestCase+JSON.swift\n\
  import XCTest\nextension XCTestCase {\n    func dataFromJSONFileNamed(_ name: String)\
  \ throws -> Data {\n        let url = try XCTUnwrap(\n            Bundle(for: type(of:\
  \ self)).url(forResource: name, withExtension: \"json\")\n        )\n        return\
  \ try Data(contentsOf: url)\n    }\n}\n```\n\n```\n// MenuItemTests.swift\n// ...\n\
  func testDecodesFromJSONData() throws {\n    let data = try dataFromJSONFileNamed(\"\
  menu_item\")\n    let item = try JSONDecoder().decode(MenuItem.self, from: data)\n\
  \    XCTAssertEqual(item.name, \"a name\")\n    XCTAssertEqual(item.category, \"\
  a category\")\n    XCTAssertEqual(item.spicy, true)\n}\n```\n\n## 该选择哪个选项？\n\n使用内联字符串的优势在于，你可以将输入值与其支持的期望值放在一起。使用\
  \ JSON 文件选项时，不清楚“a name”、“a category”和 `true` 来自哪里，唯一确认的方法就是同时检查 JSON 文件。\n\n另一方面，使用\
  \ JSON 文件能让测试更整洁。随着输入 JSON 数据的规模增大，内联字符串方法会导致测试方法越来越长，而从文件加载数据的测试则无需更多的输入设置代码。\n\
  \n如果你能够从 API 自动生成 JSON 文件，那么使用 JSON 文件也很有用，这样无需建立完整的端到端集成测试套件，就能确保解码内容是最新的。\n\n\
  如果输入数据变化很大，最终你会有很多 JSON 文件，每种变化对应一个。在这种情况下，通过字符串插值生成输入可能更容易维护：\n\n```\n// MenuItem+JSONFixture.swift\n\
  @testable import Albertos\nextension MenuItem {\n    static func jsonFixture(\n\
  \        name: String = \"a name\",\n        category: String = \"a category\",\n\
  \        spicy: Bool = false\n    ) -> String {\n        return \"\"\"\n       \
  \ {\n        \"name\": \"\\(name)\",\n        \"category\": \"\\(category)\",\n\
  \        \"spicy\": \\(spicy)\n        }\"\"\"\n    }\n}\n```\n\n```\n// MenuItemTests.swift\n\
  // ...\nfunc testWhenDecodedFromJSONDataHasAllTheInputProperties() throws {\n  \
  \  let json = MenuItem.jsonFixture(name: \"a name\", category: \"a category\", spicy:\
  \ false)\n    let data = try XCTUnwrap(json.data(using: .utf8))\n    let item =\
  \ try JSONDecoder().decode(MenuItem.self, from: data)\n    XCTAssertEqual(item.name,\
  \ \"a name\")\n    XCTAssertEqual(item.category, \"a category\")\n    XCTAssertEqual(item.spicy,\
  \ false)\n}\n```\n\n选择哪个选项取决于你的领域模型。如果你的 API 有许多实体，且每个实体都有丰富的属性，那么使用文件可能会让你更容易浏览测试套件。\n\
  \n除非你正在基于现有 API 构建应用，并且已经知道自己要处理什么，否则我建议先从内联字符串开始，并优先优化测试的可理解性。\n\n现在我们已经探讨了 JSON\
  \ 解码测试的*方式*，让我们退一步，看一下*时机*。什么时候 TDD 对实现 JSON 解码有用？\n\n\n\n## 测试 JSON 解码值得吗？\n\n\
  视情况而定。与软件开发中的其他事项一样，这涉及权衡取舍。\n\n在我们之前编写的测试中，大部分测试内容都是 Swift 的 `JSONDecoder` 的行为。这段代码我们无法控制，而且由于它来自\
  \ Swift 标准库，我们可以安全地假设它能按预期工作。\n\n如果你需要做的仅仅是将 `Decodable` 添加到某个类型遵循的协议列表中，以解码来自 API\
  \ 的 JSON 数据，那么测试可能不值得。如果你仍想为代码变更提供一道安全防线，可以编写一个更简单的测试，只需确保解码过程不会抛出错误即可：\n\n```\n\
  func testWhenDecodingFromJSONDataDoesNotThrow() throws {\nlet json = #\"{ \"name\"\
  : \"a name\", \"category\": \"a category\", \"spicy\": true }\"#\nlet data = try\
  \ XCTUnwrap(json.data(using: .utf8))\nXCTAssertNoThrow(try JSONDecoder().decode(MenuItem.self,\
  \ from: data))\n}\n```\n\n如果你在解码过程中进行了某些非平凡的操作，那么编写一个测试来确保一切工作正常就很有价值了。\n\n例如，假设\
  \ JSON 中 `category` 字段对应的是一个对象，而不是一个普通字符串：\n\n```\n{\n\"name\": \"tortellini alla\
  \ panna\",\n\"category\": {\n\"name\": \"pasta\",\n\"id\": 123\n},\n\"spicy\": false\n\
  }\n```\n\n要将这个 JSON 解码成我们的 `MenuItem` 对象，我们需要在编译器通过 `Decodable` 为我们合成的代码之外，添加一些额外的代码：\n\
  \n让我们用这个输入更新初始测试，看看会发生什么：\n\n```\n// MenuItemTests.swift\n// ...\nfunc testWhenDecodedFromJSONDataHasAllTheInputProperties()\
  \ throws {\nlet json = \"\"\"\n{\n\"name\": \"a name\",\n\"category\": {\n\"name\"\
  : \"a category\",\n\"id\": 123\n},\n\"spicy\": false\n}\n\"\"\"\nlet data = try\
  \ XCTUnwrap(json.data(using: .utf8))\nlet item = try JSONDecoder()    .decode(MenuItem.self,\
  \ from: data)\nXCTAssertEqual(item.name, \"a name\")\nXCTAssertEqual(item.category,\
  \ \"a category\")\nXCTAssertEqual(item.spicy, false)\n}\n```\n\n测试失败，错误信息如下：\n\n\
  ```\ntypeMismatch(\nSwift.String,\nSwift.DecodingError.Context(\ncodingPath: [\n\
  CodingKeys(stringValue: \"category\", intValue: nil)\n],\ndebugDescription: \"Expected\
  \ to decode String but found a dictionary instead.\", underlyingError: nil\n)\n\
  )\n```\n\n错误信息很密集，但通过阅读，你可以理解解码过程正在为 \"category\" 键寻找一个 `String`，但实际却得到一个字典。这正是我们修改\
  \ JSON 输入后所预期的错误。\n\n一种能使该测试通过的实现方案是引入一个嵌套的私有对象来解码 category，并将其名称转发给 `category`\
  \ 属性：\n\n```\n// MenuItem.swift\nstruct MenuItem {\nlet name: String\nlet spicy:\
  \ Bool\nprivate let categoryObject: Category\nvar category: String { categoryObject.name\
  \ }\nenum CodingKeys: String, CodingKey {\ncase name, spicy\ncase categoryObject\
  \ = \"category\"\n}\nstruct Category: Equatable, Decodable {\nlet name: String\n\
  }\n}\n// ...\nextension MenuItem: Decodable {}\n// 这是为了让使用了 // 硬编码菜单的现有代码能够编译。\n\
  extension MenuItem {\ninit(category: String, name: String, spicy: Bool) {\nself.categoryObject\
  \ = Category(name: category)\nself.name = name\nself.spicy = spicy\n}\n}\n```\n\n\
  对于像本例中这样非平凡的 JSON 结构，我认为测试是一种有用的反馈机制，可以指导解码的实现。\n\n还需要记住的一点是，我们总是在网络请求或其他类型的数据传输过程中调用\
  \ JSON 解码；这不是我们可能在 ViewModel 中直接调用的东西。因为 `MenuFetching` 中 `fetchMenu` 的返回类型是 `AnyPublisher<[MenuItem],\
  \ Error>`，从远程 API 获取菜单的组件也必须将接收到的数据解码为 `[MenuItem]`。只要解码过程没有自定义逻辑，那么如果出现问题，网络组件的测试就会失败。也就是说，测试网络代码会间接地执行\
  \ JSON 解码逻辑。\n\n如果你的 API 可以通过很少甚至无需自定义代码就能解码，那么最好直接跳到实现网络代码，省下为解码逻辑编写测试的时间。这是因为\
  \ Swift 标准库负责处理解码；测试它不是你的责任。\n\n然而，如果存在一定量的特定解码逻辑，就像前面的例子那样，那么一组有针对性的测试将帮助你实现它，并确保它不会出错。\n\
  \n一个 TDD 纯粹主义者现在可能会抓狂并对我愤怒地尖叫。我怎敢在一本关于测试驱动开发的书中建议不写测试也是可以的？！\n\n**测试驱动开发是一种实践，而非一种生活方式。如果写某些代码的测试优先方法，无论短期还是长期回报都不值得，那么不为其编写测试也是可以的。**\n\
  \n我们已经探讨了何时适合应用 TDD 来编写 JSON 解码逻辑，并看到了几种实现方式。现在是时候通过构建我们功能中的最后一个组件——负责从 API 获取菜单数据的组件——来将这一逻辑付诸实践了。\n\
  \n## 实践时间\n\n我们在本章中看到的 API 响应都是扁平的 JSON 数组，这意味着只要 `MenuItem` 本身遵循了 `Decodable`，我们就可以解码\
  \ `MenuItem` 的数组。如果响应是一个对象，你将如何解码 `MenuItem`？例如：\n\n```\n{\n\"items\": [\n{\n\"\
  name\": \"spaghetti carbonara\",\n\"category\": \"pasta\",\n\"spicy\": false\n},\n\
  {\n\"name\": \"penne all'arrabbiata\",\n\"category\": \"pasta\",\n\"spicy\": true\n\
  }\n]\n}\n```\n\n## 关键要点\n\n- **测试 JSON 解码逻辑的一种方法是定义一个内联的 `String`，将其转换为 `Data`，并将其作为\
  \ `JSONDecoder` 的输入。** 这种方法适用于键较少且需要明确输入值到模型属性关系的输入 JSON。\n\n- **另一种选择是在专门的 JSON\
  \ 文件中定义输入，并在测试中将其转换为 `Data`。** 这种方法适用于具有许多键的输入对象，但会在输入和最终的 SUT 属性之间增加一层间接性。\n\n\
  - **通过将 JSON 转换为 `Data` 的逻辑提取到辅助函数中，保持测试的整洁性。**\n\n- **如果需要自定义逻辑来遵循 `Decodable`，那么测试\
  \ JSON 解码逻辑就是有价值的。** 如果所有模型属性都与输入 JSON 的键匹配，Swift 会为我们处理一切，那么为其编写测试就是多余的。\n\n##\
  \ 尾注\n\n1. 除了 REST 之外，还有其他用于 API 后端的选项。其中越来越受欢迎的两种是 [GraphQL](https://graphql.org/)\
  \ 和 [ProtoBufs](https://developers.google.com/protocol-buffers)。两者都为 API 添加了一层类型安全层，你可以（并且应该）利用它来自动生成\
  \ API 响应与应用程序领域对象之间的所有转换逻辑。\n\n   ProtoBufs 以一种自定义的、比 JSON 更高效的格式序列化数据。GraphQL 以\
  \ JSON 对象响应，但其查询语言脱颖而出。你无需为不同资源设置不同端点，而是通过向 GraphQL 后端发送一条描述所需信息的查询来请求数据。\n\n  \
  \ 在我们这样的小型应用程序中，采用这两种解决方案所带来的开销，远大于我们在可维护性和效率方面能获得的好处。\n\n\n\n"
- '# 10. 测试网络代码


  *如何为与网络交互的代码编写测试？*


  *通过使用`Stub`规避网络交互，来模拟不同行为并避免不稳定的测试。*


  测试网络代码时常见的问题是网络既不可预测又缓慢，这会导致非确定性的测试——测试可能这次通过，下次就失败。


  在本章中，我们将学习如何运用*依赖反转原则*和*桩测试替身*技术，将代码与网络的现实限制解耦。


  远程菜单加载功能已接近完成。我们构建了一个能够在远程 API 数据传入时更新的视图，并使领域模型`Decodable`。现在是实现从网络加载数据的逻辑的时候了。我们将负责此功能的对象称为`MenuFetcher`。


  Apple 在 Foundation 框架中通过`URLSession`提供了一个先进且通用的网络调用系统，我们将用它来实现网络功能。我们还知道`MenuFetcher`必须遵循`MenuFetching`，这是我们在第
  7 章定义的抽象。该`protocol`是 ViewModel 与底层组件之间关于如何从远程资源获取菜单的契约。


  `MenuFetching`定义了我们需要实现的行为。当请求成功时，它应返回接收到的`Data`并转换为`[MenuItem]`。当请求失败时，它应传递接收到的错误。让我们根据这个规范为`MenuFetcher`编写测试列表：


  ```

  // MenuFetcherTests.swift

  @testable import Albertos

  import XCTest

  class MenuFetcherTests: XCTestCase {

  func testWhenRequestSucceedsPublishesDecodedMenuItems() {}

  func testWhenRequestFailsPublishesReceivedError() {}

  }

  ```


  这里一个自然的起点是使用`URLSession`直接调用远程 API，并断言结果符合我们的预期。


  在单元测试中直接访问网络是不可取的。这会导致测试缓慢且不稳定，并且难以覆盖所有不同场景。让我们看看原因以及应对方法。


  ## 为什么不应在单元测试中发起网络请求


  为了理解测试直接网络调用的局限性，让我们自己编写这样一个测试。


  到目前为止，我们在本书中对于大多数新代码都使用了愿望驱动编程。当你还不确定代码应采用何种形态时，愿望驱动编程有助于开始编写代码，但我们现在对 Combine 已有足够了解，可以清晰地知道应使用的结构。让我们从`MenuFetcher`的不完整实现开始，这样我们就可以编写一个没有编译错误的完整测试：


  ```

  // MenuFetcher.swift

  import Combine

  class MenuFetcher: MenuFetching {

  func fetchMenu() -> AnyPublisher {

  return Future { $0(.success([])) }.eraseToAnyPublisher()

  }

  }

  ```


  获取请求返回一个 `AnyPublisher<[MenuItem], Error>`，它会发送异步更新。我们在第 7 章已经看到，可以通过使用`sink`订阅它，并使用`XCTestExpectation`等待新值来测试这类代码：


  ```

  // MenuFetcherTests.swift

  // ...

  func testWhenRequestSucceedsPublishesDecodeMenuItems() {

  let menuFetcher = MenuFetcher()

  let expectation = XCTestExpectation(description: "Publishes decoded [MenuItem]")

  menuFetcher.fetchMenu()

  .sink(

  receiveCompletion: { _ in },

  receiveValue: { items in

  // 如何测试 items 的值是否正确？

  expectation.fulfill()

  }

  )

  .store(in: &cancellables)

  wait(for: [expectation], timeout: 1)

  }

  ```


  编写这个测试引出一个问题：我们如何断言`MenuFetcher`发布了正确的值？


  由于数据来自远程 API，唯一知道期望值的方法就是查看远程数据。一旦我们知道后端保存了哪些值，就可以使用一些粗略的断言，例如，检查数量是否相同，以及第一个和最后一个元素是否匹配。


  你可以在[`https://github.com/mokagio/tddinswift_fake_api/`](https://github.com/mokagio/tddinswift_fake_api/)找到一个假
  API 版本。为了遵循小步前进、只编写必要代码的原则，这个假 API 实际上只是一个 JSON 文件的容器。菜单列表的端点不过是假响应静态 JSON 的 URL。


  从远程资源获取静态 JSON 是模拟与完整 API 后端交互的真实行为的绝佳方法：


  ```

  // MenuFetcherTests.swift

  // ...

  menuFetcher.fetchMenu()

  .sink(

  receiveCompletion: { _ in },

  receiveValue: { items in

  XCTAssertEqual(items.count, 42)

  XCTAssertEqual(items.first?.name, "spaghetti carbonara")

  XCTAssertEqual(items.last?.name, "pasta all''arrabbiata")            expectation.fulfill()

  }

  )

  ```


  在这种情况下使用较宽松的断言是可以的，因为我们在前一章已经为解码编写了全面的测试。如果不是这种情况，并且 JSON 解码逻辑并不简单，我会鼓励你至少检查数组中的一个元素是否具有其对应
  JSON 中的所有预期属性。


  使用`Cmd U`键盘快捷键运行测试将显示失败。这并不意外：我们的初始实现返回一个硬编码的空数组。


  让我们使用`URLSession`和 Combine 实现一个真正的网络调用：


  ```

  // MenuFetcher.swift

  import Combine

  import Foundation

  class MenuFetcher: MenuFetching {

  func fetchMenu() -> AnyPublisher {

  let url = URL(string:

  "https://raw.githubusercontent.com/mokagio/tddinswift_fake_api/trunk/menu_response.json")!

  URLSession.shared

  .dataTaskPublisher(for: URLRequest(url: url))

  .map { $0.data }

  .decode(type: [MenuItem].self, decoder: JSONDecoder())

  .eraseToAnyPublisher()

  }

  }

  ```


  现在测试应该通过了。我之所以说*应该*，是因为有几个因素可能导致它失败。


  首先，如果后端菜单发生变化，测试将会失败。例如，如果 Alberto 添加了一道新菜，那么关于数量的预期就会失败。




  ## 根据变量值进行测试的局限


  **根据变量值进行测试会使你的单元测试变得不可预测，并且需要持续更新测试套件。** 为菜单设置专用 API 的全部意义在于简化更新过程；我们可以预期菜单在未来会多次变更。每次远程菜单发生变化时，测试都可能会失败。你可能正在开发一个新功能，却意外发现这个测试突然失败了。


  另一个导致此测试不可预测的因素是它对网络的依赖。API 可能因为连接质量差而响应缓慢，或者在没有互联网连接时完全不响应。如果发生这种情况，测试会失败，但原因是外部因素而非你的源代码。


  取决于你的连接质量，在`wait(for:, timeout:)`中使用的 1 秒可能不够，测试将会超时。你可能需要使用更长的时间间隔来使测试对慢速网络更健壮，但这会以测试套件运行缓慢为代价。


  即使使用更长的超时时间，你仍然容易受到其他网络故障的影响。要验证这一点，请从模拟器中删除应用程序以清除任何缓存值，通过关闭 Wi-Fi 或拔下以太网电缆断开 Mac
  的互联网连接，然后重新运行测试。测试将失败并显示：


  *   异步等待失败：超出 1 秒超时，存在未满足的期望：“发布已解码的 [MenuItem]。”


  **与网络交互会因响应时间的开销而拖慢你的单元测试**。测试驱动开发的优势之一是其快速的反馈循环，但从测试中执行真实的网络请求会降低其速度，使整个过程效率降低。


  即使你愿意忽略这些限制，当 API 请求失败时，你又该如何测试代码的行为呢？


  解决之道是应用*依赖反转原则*。


  ## 强制解包可选值


  你可能已经注意到，代码通过调用`URL(string:)`并传入一个硬编码值来获取 URL。`URL(string:)`返回一个`Optional`值，我们使用`!`后缀来[强制解包](https://docs.swift.org/swift-book/LanguageGuide/TheBasics.html%2523ID332)它。


  强制解包一个`Optional`是告诉 Swift 编译器我们相信其值在运行时永远不会是`none`的方式，从而避免使用`if let`或`guard let`手动解包的需求。


  通常最好避免强制解包：如果由于某种原因，该值在运行时为`none`，应用程序将会崩溃。最好多写几行代码来显式解包`Optional`，并处理它们没有值的情况。


  虽然避免强制解包是明智的做法，但这个`URL(string:)`调用只有在编写硬编码值的开发者犯错时才会返回`none`。正如 Chris Eidhof、Daniel
  Eggert 和 Florian Kugler[论证](https://www.objc.io/blog/2018/03/27/unwrapping-optionals/)的那样，这种强制解包的使用是一种通过让应用程序尽早崩溃来暴露程序员错误的有用方式。由于我们实践
  TDD，并且大部分代码都被测试覆盖，像这样的程序员错误导致崩溃而不被发现的可能性很小，因此我们可以在这些特定情况下放心使用强制解包。


  ## 如何将单元测试与网络解耦


  `MenuFetcher`依赖于`URLSession`来访问网络。正如我们在第 7 章中所见，高层组件不应依赖于低层组件；它们都应该依赖于抽象。这就是*依赖反转原则*。


  网络只是我们系统的另一个依赖。我们可以在`MenuFetcher`和`URLSession`之间放置一个抽象层，并构建一个*Stub 测试替身*来模拟网络提供给
  SUT 的间接输入。


  我们使用了`URLSession dataTaskPublisher(for:)`方法来执行网络请求，该方法返回一个`AnyPublisher<(Data, URLResponse),
  URLError>`。我们将要定义的抽象应该具有类似的签名，区别在于我们的业务逻辑不需要读取`URLResponse`：


  ```

  // NetworkFetching.swift

  import Combine

  import Foundation

  protocol NetworkFetching {

  func load(_ request: URLRequest) -> AnyPublisher

  }

  ```


  我们可以通过一个简洁的`extension`使`URLSession`符合`NetworkFetching`协议：


  ```

  // URLSession+NetworkFetching.swift

  import Combine

  import Foundation

  extension URLSession: NetworkFetching {

  func load(_ request: URLRequest) -> AnyPublisher {

  return dataTaskPublisher(for: request)

  .map { $0.data }

  .eraseToAnyPublisher()

  }

  }

  ```


  保持符合`protocol`的代码尽可能简单且不含自定义逻辑至关重要，因为我们不会对其进行测试。通过这样的实现，所有代码都不在我们的控制之下，因为它是 Apple
  的代码。测试`URLSession`不是我们的责任，我们可以相对确信它会始终按预期运行。¹


  让我们应用 DIP 并重构`MenuFetcher`，使其依赖于`NetworkFetching`而不是直接调用`URLSession`：


  ```

  // MenuFetcher.swift

  import Combine

  import Foundation

  class MenuFetcher: MenuFetching {

  let networkFetching: NetworkFetching

  init(networkFetching: NetworkFetching = URLSession.shared) {

  self.networkFetching = networkFetching

  }

  func fetchMenu() -> AnyPublisher {

  let url = URL(string:

  "https://raw.githubusercontent.com/mokagio/tddinswift_fake_api/trunk/menu_response.json")!

  networkFetching

  .load(URLRequest(url: url))

  .decode(type: [MenuItem].self, decoder: JSONDecoder())

  .eraseToAnyPublisher()

  }

  }

  ```


  测试仍然通过了，但存在前面讨论过的注意事项和局限性。现在是时候为`NetworkFetching`构建一个*Stub*，并用它来模拟我们希望测试的不同行为了。




  ## 使用桩模拟网络请求


  为了编写测试，我们需要一种方法为测试提供预定义的输入以供校验：要么是用于解码的 `Data`，要么是一个 `URLError` 值。为此，我们可以使用在第 8
  章学到的相同技术构建一个桩测试替身：


  ```

  // NetworkFetchingStub.swift

  @testable import Albertos

  import Combine

  import Foundation

  class NetworkFetchingStub: NetworkFetching {

  private let result: Result

  init(returning result: Result) {

  self.result = result

  }

  func load(_ request: URLRequest) -> AnyPublisher {

  return result.publisher

  // 添加延迟以模拟真实世界的异步行为

  .delay(for: 0.01, scheduler: RunLoop.main)

  .eraseToAnyPublisher()

  }

  }

  ```


  我们可以使用这个桩来解除与网络非确定性特性的耦合，从而更好地控制测试的输入：


  ```

  // MenuFetcherTests.swift

  // ...

  func testWhenRequestSucceedsPublishesDecodedMenuItems() throws {

  let json = """

  [

  { "name": "a name", "category": "a category", "spicy": true },

  { "name": "another name", "category": "a category", "spicy": true }

  ]

  """

  let data = try XCTUnwrap(json.data(using: .utf8))

  let menuFetcher = MenuFetcher(networkFetching: NetworkFetchingStub(returning: .success(data)))

  let expectation = XCTestExpectation(description: "发布已解码的 [MenuItem]")

  menuFetcher.fetchMenu()

  .sink(

  receiveCompletion: { _ in },

  receiveValue: { items in

  XCTAssertEqual(items.count, 2)

  XCTAssertEqual(items.first?.name, "a name")

  XCTAssertEqual(items.last?.name, "another name")

  expectation.fulfill()

  }

  )

  .store(in: &cancellables)

  wait(for: [expectation], timeout: 1)

  }

  ```


  使用桩消除了对网络的依赖，使测试运行更快、更健壮。如果你现在尝试离线运行测试，会发现它们都能通过。


  在网络测试中使用桩也有助于明确断言中使用的值来自何处：它们现在已是测试本身的一部分。


  接下来，我们来看失败处理的测试：


  ```

  // MenuFetcherTests.swift

  // ...

  func testWhenRequestFailsPublishesReceivedError() {

  let expectedError = URLError(.badServerResponse)

  let menuFetcher = MenuFetcher(networkFetching: NetworkFetchingStub(returning: .failure(expectedError)))

  let expectation = XCTestExpectation(description: "发布接收到的 URLError")

  menuFetcher.fetchMenu()

  .sink(

  receiveCompletion: { completion in

  guard case .failure(let error) = completion else { return }

  XCTAssertEqual(error as? URLError, expectedError)

  expectation.fulfill()

  },

  receiveValue: { items in

  XCTFail("期望失败，但成功获取了 \(items)")

  }

  )

  .store(in: &cancellables)

  wait(for: [expectation], timeout: 1)

  }

  ```


  这个测试已经能通过。原因是我们测试的是 Combine 对 `URLSession` 扩展的默认行为。


  尽管有人可能认为这个测试是多余的，但我建议你保留它。确保代码能够妥善处理失败，是构建优秀用户体验的健壮软件的关键。为此编写明确的测试，表明我们认真对待错误处理。错误处理全部由
  Combine 在底层完成这一事实是具体的实现细节，未来可能会发生变化。一个专门的测试能确保一旦错误处理逻辑改变，你能立即知晓。


  ### 第三方替代方案


  本书仅涉及原生 `XCTest`，但在测试网络代码方面，有一个值得提及的第三方库：[OHHTTPStubs](https://github.com/AliSoftware/OHHTTPStubs)。该库允许你直接在
  `URLSession` 层面桩化网络请求，而无需创建专门的抽象层，这使其成为为大型遗留代码库添加测试的绝佳选择——这类代码库在重构前往往难以修改。


  通过将测试与网络本身隔离，你可以专注于测试应用如何发起请求并处理其结果，从而测试网络逻辑。


  通过定义一个抽象来隐藏 `URLSession` 的内部细节，你可以模拟来自网络的任何响应，并使用桩测试替身编写全面的测试，同时消除真实 HTTP 请求带来的固有非确定性影响。


  请尽量保持遵循该抽象层的代码量最少，最好只使用 Apple 提供的方法。即使没有为它编写测试，你也能对其正确行为充满信心。


  ## 练习时间


  假设 API 有另一个返回单个条目的“今日推荐菜”端点。你将如何运用测试驱动开发来实现从该端点读取数据？你会将功能添加到 `MenuFetching` 中，还是创建一个新的专用抽象？`NetworkFetchingStub`
  是否需要变更，还是它已准备好支持这个测试？


  你可以在 [`https://raw.githubusercontent.com/mokagio/tddinswift_fake_api/trunk/dish_of_the_day.json`](https://raw.githubusercontent.com/mokagio/tddinswift_fake_api/trunk/dish_of_the_day.json)
  找到该端点的响应数据。


  这里还有一个练习给你。目前，`MenuFetcher` 使用一个硬编码值作为 API 端点。硬编码值有助于快速入门，但它们不够灵活。例如，你无法通过硬编码的 URL
  让一个版本的应用连接预发布环境、另一个版本连接生产环境的后端。


  更好的方法是使用基础 URL 参数初始化 `MenuFetcher`，使其不关心 API 部署在何处。在内部，`MenuFetcher` 可以通过将适当路径附加到基础值来构造端点
  URL。你可以编写哪些测试来实现这一改进？


  **提示**


  修改桩，使其期望一个 `URLRequest` 和 `Result` 配对，并仅当传入 `load(_:)` 的 `URLRequest` 与给定的相匹配时，才返回给定的
  `Result`。


  ## 关键要点


  -   **不要在单元测试中发起网络请求**。访问网络会因真实世界的物理限制使测试产生非确定性并变慢。


  -   **定义一个抽象层，将源代码和测试代码与底层的网络实现解耦**。通过应用依赖倒置原则，你将构建出更模块化的软件，并能够使用测试替身。


  -   **围绕 `URLSession` 使用尽可能薄的封装**。由于这部分代码无法直接测试，它应该尽可能精简和简单。


  -   **使用桩测试替身来模拟来自网络的成功和失败响应**。借助桩，你可以为网络组件提供任何类型的输入。


  ## 尾注


  1.  如果你想更进一步，对 `URLSession` 的行为进行安全检查，可以编写一个集成测试来验证 `URLSession` 上的 `NetworkFetching`
  方法实现。正如我们所见，与真实网络交互会使测试产生非确定性并变慢。该测试应放在一个专用的测试目标中，不与单元测试一起运行。当你升级到新版本的 Xcode 时，可以将其作为安全检查来使用。




