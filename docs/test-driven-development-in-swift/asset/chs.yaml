  \n```\n// MenuItemDetail.ViewModelTests.swift\nfunc testWhenItemIsInOrderButtonActionRemovesIt()\
  \ {\n    let item = MenuItem.fixture()\n    let orderController = OrderController()\n\
  \    orderController.addToOrder(item: item)\n    let viewModel = MenuItemDetail.ViewModel(item:\
  \ item, orderController: orderController)\n    viewModel.addOrRemoveFromOrder()\n\
  \    XCTAssertFalse(orderController.order.items.contains { $0 == item })\n}\n\n\
  func testWhenItemIsNotInOrderButtonActionAddsIt() {\n    let item = MenuItem.fixture()\n\
  \    let orderController = OrderController()\n    let viewModel = MenuItemDetail.ViewModel(item:\
  \ item, orderController: orderController)\n    viewModel.addOrRemoveFromOrder()\n\
  \    XCTAssertTrue(orderController.order.items.contains { $0 == item })\n}\n\n//\
  \ MenuItemDetail.ViewModel.swift\nfunc addOrRemoveFromOrder() {\n    if (orderController.order.items.contains\
  \ { $0 == item }) {\n        orderController.removeFromOrder(item: item)\n    }\
  \ else {\n        orderController.addToOrder(item: item)\n    }\n}\n```\n\n\n\n\
  ### 依赖注入 vs. 直接访问共享实例\n\n使用依赖注入比在 ViewModel 实现中访问共享的 `OrderController` 好在哪里？因为后者会导致每个测试都更新同一个\
  \ `Order`，从而将测试结果与前面测试的执行耦合在一起。\n\n为了验证这一点，你可以像这样定义一个共享的 `OrderController` 实例：\n\
  \n```\n// OrderController.swift\n// ...\nclass OrderController: ObservableObject\
  \ {\n    static let shared = OrderController()\n    // ...\n}\n```\n\n更新 `MenuItemDetail.ViewModel`，将\
  \ `init` 中的参数访问替换为 `OrderController.shared`，从而使用共享实例而非传入的参数。接下来，更新针对按钮动作行为的断言，使其检查共享实例中的值。现在运行测试，你会发现它们全部失败。\n\
  \n你可以通过添加 `setUp` 和 `tearDown` 调用来解决这些失败，在每次测试前将 `OrderController.shared` 恢复到干净状态。另一种选择是对测试进行排序，使得某个测试对\
  \ `OrderController` 的更新恰好为下一个测试准备好所需状态。这两种替代方案都需要额外的工作，并且使测试设置更加僵化；使用依赖注入是更好的选择。\n\
  \n依赖注入让你的代码变得诚实。共享实例和单例允许你的对象获取并与其接口未声明的组件进行交互。正如 Miško Hevery 所说，它们让你的 API 变成了一个[*病态的骗子*](https://web.archive.org/web/20190618100426/http:/misko.hevery.com:80/2008/08/17/singletons-are-pathological-liars/)。在允许随意读取全局状态的代码库中，你无法信任调用的方法没有副作用，或者只与其签名中的依赖项协作，除非你检查它们的实现。代码推理变得困难，因为你永远不确定方法是否如其所述，或者背后是否还有更多操作。\n\
  \nTDD 引导你使用依赖注入。如果传入所有依赖项，而不是在实现中访问它们，那么从测试开始编写代码会更容易。这种从\"先写测试、快速获得反馈\"的需求中涌现出的软件设计，只包含显式依赖，因此更容易推理。\n\
  \nViewModel 的实现现已完成。是时候将其与视图层连接起来了。\n\n### 使用 `@EnvironmentObject` 进行依赖注入\n\n`MenuItemDetail.ViewModel`\
  \ 可以独立运行，但正如 `TODO` 注释提醒我们的，它使用的是专用的 `OrderController` 实例，而不是共享实例。我们需要用与应用程序其余部分将使用的相同\
  \ `OrderController` 引用来实例化 `MenuItemDetail.ViewModel`。\n\n当用户选择一个菜品时，`MenuList`\
  \ 负责创建 `MenuItemDetail` 及其 ViewModel，因此它需要传入一个 `OrderController` 实例。`MenuList` 如何获取一个实例呢？我们可以应用相同的思路，让负责创建\
  \ `MenuList` 的组件为其提供 `MenuItemDetail` 所需的 `OrderController` 实例。`AlbertosApp` 创建了\
  \ `MenuList`，并且由于它是视图层次结构中的顶层元素，我们可以让它构建并持有 `OrderController` 值，以便在应用程序中共享。\n\n\
  正如我们已经讨论过的，这种方法并不理想。在 Alberto 应用相对扁平的视图层次结构中，这看起来还行，但你会看到这是一个滑坡：视图层次结构越深、越复杂，你就需要编写更多代码来向下传递依赖。更重要的是，让\
  \ `MenuList` 在其 `init` 中要求一个 `OrderController` 会给人错误的印象，以为它需要使用它，而实际上它只是将其传递下去，从未与之交互。\n\
  \nSwiftUI 的 [`@EnvironmentObject`](https://developer.apple.com/documentation/swiftui/environmentobject)\
  \ 有助于扩展应用程序，而无需用长长的依赖注入链使视图层次结构臃肿。视图可以使用这个属性包装器从它们的环境中加载一个符合 `ObservableObject`\
  \ 协议的属性值。我们可以在视图访问它的某个祖先中，使用 [`environmentObject(_:)`](https://developer.apple.com/documentation/swiftui/view/environmentobject%2528_:%2529)\
  \ 方法将对象注册到环境中。\n\n`@EnvironmentObject` 让我们可以干净地共享对共享对象的访问，而无需将它们传递到视图层次结构的每一层。需要读取或与\
  \ `OrderController` 交互的 ViewModel 可以在其 `init` 参数中请求一个引用。实例化它们的视图可以通过 `@EnvironmentObject`\
  \ 从环境中获取共享实例并提供给它。\n\n让我们开始更新 `MenuItemDetail`，以使用其 ViewModel 中的新逻辑来驱动按钮行为：\n\n\
  ```\n// MenuItemDetail.swift\nimport SwiftUI\nstruct MenuItemDetail: View {\n  \
  \  @ObservedObject private(set) var viewModel: ViewModel\n    var body: some View\
  \ {\n        // ...\n        Button(viewModel.addOrRemoveFromOrderButtonText) {\n\
  \            viewModel.addOrRemoveFromOrder()\n        }\n        // ...\n    }\n\
  }\n```\n\n如果你现在运行应用，点击按钮时会看到\"添加到订单\"按钮变为\"从订单中移除\"。再次得益于 TDD，我们在第一次尝试时就得到了一个可工作的应用。\n\
  \n我们继续处理之前遗留的 `TODO` 注释，并移除默认的 `OrderController` 值：\n\n```\n// MenuItemDetail.ViewModel.swift\n\
  init(item: MenuItem, orderController: OrderController) {\n    // ...\n}\n```\n\n\
  现在编译器无法构建 `MenuList`：\n\n```\n// MenuList.swift\nvar body: some View {\n    // ...\n\
  \    List {\n        ForEach(sections) { section in\n            Section(header:\
  \ Text(section.category)) {\n                ForEach(section.items) { item in\n\
  \                    NavigationLink(destination: MenuItemDetail(viewModel: .init(item:\
  \ item))) {\n                        // 编译器说：调用中缺少参数\n                        //\
  \ 'orderController'\n                    }\n                }\n            }\n \
  \       }\n    }\n}\n```\n\n让我们从环境中获取一个 `OrderController` 的引用，并用它来实例化 ViewModel：\n\
  \n```\n// MenuList.swift\n// ...\n@EnvironmentObject var orderController: OrderController\n\
  var body: some View {\n    // ...\n    List {\n        ForEach(sections) { section\
  \ in\n            Section(header: Text(section.category)) {\n                ForEach(section.items)\
  \ { item in\n                    NavigationLink(destination: destination(for: item))\
  \ {\n                        // ...\n                    }\n                }\n\
  \            }\n        }\n    }\n}\n\nfunc destination(for item: MenuItem) -> MenuItemDetail\
  \ {\n    return MenuItemDetail(viewModel: .init(item: item, orderController: orderController))\n\
  }\n```\n\n应用现在可以编译了，但如果你运行它，会看到它崩溃：\n\n- 致命错误：未找到类型为 `OrderController` 的 `ObservableObject`。作为此视图的祖先，可能缺少\
  \ `View.environmentObject(_:)` 的调用以提供 `OrderController`。\n\n\n\n### `@EnvironmentObject`\
  \ 的缺点\n\n我们刚刚收到的崩溃信息清楚地指出了问题所在：我们没有在 `MenuList` 的祖先视图上调用 `environmentObject(_:)`。当\
  \ SwiftUI 运行时试图访问 `OrderController` 属性时，未能找到它，从而导致崩溃。\n\n发生崩溃的可能性是使用 `@EnvironmentObject`\
  \ 的一个缺点。如果你忘记调用 `environmentObject(_:)`，或者有人不小心移除了一个现有的调用，应用就会崩溃。\n\n不过在实践中，你不太可能交付一份没有为每个\
  \ `@EnvironmentObject` 注册对应值的代码。这种类型的崩溃在你手动测试已完成功能时就会立即被发现。\n\n你*可以*采用另一种方式来创建 ViewModel，即在不使用\
  \ `@EnvironmentObject` 的情况下传递它们的依赖。例如，你可以使用一个 ViewModel 工厂对象，该对象负责实例化并持有所有依赖，视图可以从中获取预构建的\
  \ ViewModel。不过，这种选择需要额外的工作，并且会“对抗”框架本身。\n\n`@EnvironmentObject` 是一个好用得让人无法不用的 API。\n\
  \n此外，这种崩溃只可能因开发者错误而发生。正如我们在第 10 章中关于对硬编码字符串调用 `URL(string:)` 的返回值进行强制解包的讨论一样，开发阶段的早期崩溃是发现开发者错误的一种可接受方式。\n\
  \n与其使用不同的依赖注入策略，你更应该投资于自动化和流程，来捕获缺失的 `environmentObject(_:)` 调用。\n\n让应用正常工作的最后一步是在视图环境中注册一个\
  \ `OrderController`。最佳的位置是在根视图组件中：\n\n```swift\n// AlbertosApp.swift\nimport SwiftUI\
  \ @main\nstruct AlbertosApp: App {\n    let orderController = OrderController()\n\
  \    var body: some Scene {\n        WindowGroup {\n            NavigationView {\n\
  \                MenuList(\n                    viewModel: .init(\n            \
  \            menuFetching: MenuFetcher()\n                    )\n              \
  \  )\n                .navigationTitle(\"Alberto's ![../images/501287_1_En_11_Chapter/501287_1_En_11_Figa_HTML.gif](img/501287_1_En_11_Figa_HTML.gif)\"\
  )\n            }\n            .environmentObject(orderController)\n        }\n \
  \   }\n}\n```\n\n### `@EnvironmentObject` 与直接访问共享实例\n\n在视图的实现细节中，使用 `@EnvironmentObject`\
  \ 看起来与访问一个共享实例非常相似。\n\n区别在于 `@EnvironmentObject` 被限制只能用于 SwiftUI 视图；如果你尝试在非视图类型的类型上通过这个属性包装器访问一个值，应用将会崩溃。在我们基于测试驱动开发的\
  \ SwiftUI 方法中，视图是薄层组件，不包含任何展示逻辑。虽然使用 `@EnvironmentObject` 确实能让它们在底层访问某些值，但它们仅用这些值来初始化其子视图的\
  \ ViewModel。\n\n除此之外，请记住我们需要通过 `environmentObject(_:)` 在环境中显式注册对象。如果你在你的 `App` 实现中注册了所有共享对象，那么总会有一个单一的位置可以去查看和发现环境中所有可用的内容。相比之下，并没有直接的方法可以了解有多少个共享实例属性可用，以及应用实际访问了多少个。\n\
  \n随着我们应用的成长，视图和业务逻辑组件的数量也会随之增长。许多独立的小型视图组件在单独处理时更舒适，但这也会导致视图层级变得深且复杂。通过这样的层级结构手动传递视图完成其工作所需的每一个依赖会变得繁琐且难以维护。\n\
  \n`@EnvironmentObject` 为视图提供其依赖的方式既干净又易于维护，无论它们在层级结构中处于多深的位置。\n\n菜单项详情屏幕现已完成。图 11-2\
  \ 展示了图 11-1 中的订单流程，其中新屏幕已替换了原来的占位符。\n\n![../images/501287_1_En_11_Chapter/501287_1_En_11_Fig2_HTML.png](img/501287_1_En_11_Fig2_HTML.png)\n\
  \n图 11-2：使用正式界面的应用内订单流程\n\n更新其余视图的过程类似，所以我将把它留作练习给你。在本章中，我们为用户提供了组合订单的方式；在下一章中，我们将让他们能够进行支付。\n\
  \n## 练习时间\n\n一旦订单状态发生变化，`OrderButton` 和 `OrderDetail` 都应该反映这一变化。当顾客未选择任何东西时，`OrderButton`\
  \ 的文本应为 \"Your Order\"；当订单中有商品时，文本应为 \"Your Order $ `<订单总额>`\"。`OrderDetail` 中的菜品列表和总价摘要也应反映订单状态的变化。\n\
  \n为此，两个 ViewModel 都应该期望接收一个 `OrderController` 引用，并用它来读取这些信息。\n\n请使用 `@EnvironmentObject`\
  \ 注入方法来实现。\n\n## 关键要点\n\n-   **使用依赖注入将同一个对象共享给不同组件，而不是让它们在内部访问一个共享实例。** DI 通过使所有依赖关系显式化，让你的代码更易于测试和推理。\n\
  -   **在 SwiftUI 视图中使用 `@EnvironmentObject` 来获取共享资源的引用。** 这个属性包装器允许你将依赖注入到层级结构深处的组件，而无需通过所有祖先视图传递它们。\n\
  -   **实例化子视图 ViewModel 的视图可以使用 `@EnvironmentObject` 为其提供依赖。**\n\n\n\n"
- "# 12. 测试副作用\n\n*如何为一个不返回输出、而是改变另一个对象状态的系统编写测试？*\n\n*通过* *监视* *受被测系统影响的对象。*\n\n\
  如果你能控制发生副作用的对象，你可以检查它的状态以验证是否符合预期，但如果不能呢？例如，你如何验证一个对象在特定操作后调用了第三方 SDK 的方法？\n\n本章介绍一种新的测试替身，它允许我们精确地做到这一点：*间谍*。使用间谍，你可以将被测系统的真实依赖替换为一个能够记录它收到哪些方法调用以及传递给它们的参数的依赖，这样你就可以断言交互是否按预期发生。\n\
  \n自从接手 Alberto 的应用开发以来，我们已经取得了长足的进步。一次一个测试，我们从显示硬编码菜单的应用，发展成为能够从远程 API 加载菜单并允许顾客选择他们想要订购的菜肴的应用。\n\
  \n最后的拼图是提交订单并支付。图 12-1 显示了支付流程：当用户点击结账按钮时，应用向处理支付并将订单排入厨房队列的远程服务提交订单。当服务完成时，应用通知用户结果。使用警报是在屏幕上显示结果的一种简单方式。这是“分解问题并顺序解决”技巧的一个应用。首先，构建流程的一个可用版本，然后你可以迭代并优化其用户体验。\n\
  \n![../images/501287_1_En_12_Chapter/501287_1_En_12_Fig1_HTML.png](img/501287_1_En_12_Fig1_HTML.png)\n\
  \n图 12-1\n\n支付流程\n\n管理支付是出了名的困难：有必要的安全措施，以及用户期望从一开始就能使用的不同供应商。作为一个单人团队，你决定将管理支付的责任外包给第三方服务。\n\
  \n你选择的提供商 Hippo Payments 提供了一个 Swift SDK，用于将所有支付作为黑盒管理；你调用它，它负责身份验证、供应商选择和订单履行。\n\
  \n以下是 Hippo Payments SDK 接口：\n\n```\nclass HippoPaymentsProcessor {\n    init(apiKey:\
  \ String)\n    func processPayment(\n        payload: [String : Any],\n        onSuccess:\
  \ @escaping () -> Void,\n        onFailure: @escaping (HippoPaymentsError) -> Void\n\
  \    )\n}\n```\n\n我们可以在 `OrderDetail` 视图中添加一个按钮，当点击该按钮时，会触发支付流程，最终调用 SDK 的 `processPayment`。\n\
  \n此行为的测试列表包含一个测试：\n\n```\n// OrderDetail.ViewModelTests.swift\n// ...\nfunc testWhenCheckoutButtonTappedStartsPaymentProcessingFlow()\
  \ {}\n```\n\n实现方式可以类似于我们为用户交互所做的：将 SDK 实例传递给 `OrderDetail.ViewModel`，并公开一个方法供 `OrderDetail`\
  \ 用作按钮操作，其中包含调用 SDK 的逻辑。\n\n当结账按钮操作在 `HippoPaymentProcessing` 中不会导致任何可见状态更改时，我们如何测试它启动了支付流程？\n\
  \n让我们更新 `OrderDetail.ViewModel` 的初始化方法，使其期望一个 `HippoPaymentsProcessor`，看看是否能给我们一些提示。尝试是解决编码问题摆脱困境的好方法。我们全面的测试套件赋予我们在代码库中进行尝试的自由和信心。\n\
  \n## 第三方依赖与其他所有依赖相同\n\n以下是 ViewModel 包含 `HippoPaymentsProcessor init` 参数和属性时的样子：\n\
  \n```\n// OrderDetail.ViewModel.swift\nimport Combine\nimport HippoPayments\nextension\
  \ OrderDetail {\n    struct ViewModel {\n        // ...\n        private let paymentProcessor:\
  \ HippoPaymentsProcessor\n        // ...\n        // TODO: 仅为使代码编译通过而使用 HippoPaymentsProcessor\
  \ 的默认值。\n        // 完全集成后将移除它。\n        init(\n            orderController: OrderController,\n\
  \            paymentProcessor: HippoPaymentsProcessor = .init(apiKey: \"A1B2C3\"\
  )\n        ) {\n            self.paymentProcessor = paymentProcessor\n         \
  \   // ...\n```\n\n如果你不知道 `HippoPaymentsProcessor` 来自不同的 Swift 模块，你会说它与 `OrderController`\
  \ 有什么不同吗？\n\n从 `OrderDetail.ViewModel` 的角度来看，第一方和第三方依赖没有区别：它们都是外部对象。\n\n第三方依赖与第一方依赖或\
  \ Apple 框架没有区别，依赖注入原则同样适用于它们。如果第三方依赖与其他依赖没有区别，那么我们可以应用相同的策略来测试与它们交互的代码：定义一个抽象层并构建一个测试替身。\n\
  \n## 抽象化第三方依赖的好处\n\n抽象化第三方依赖特别有益，因为它使从一个供应商迁移到另一个供应商变得更容易。如果你能将特定供应商的实现细节抽象到特定于你领域的\
  \ `protocol` 之后，那么采用不同的选项只需使其同样符合该 `protocol` 即可。\n\n另一个优点是，由于你可以控制抽象层的外观，因此可以使第三方依赖适应你的代码库风格。`HippoPaymentsProcessor`\
  \ 为成功和失败处理程序有两个闭包参数，但代码库使用 Combine 的 `Publisher` 来管理异步工作。我们可以使用我们喜欢的人体工程学来定义我们的抽象层，然后扩展\
  \ `HippoPaymentsProcessor` 以使其符合该抽象层。\n\n## 为第三方依赖构建包装器\n\n```\n// PaymentProcessing.swift\n\
  import Combine\nprotocol PaymentProcessing {\n    func process(order: Order) ->\
  \ AnyPublisher\n}\n```\n\n为了使 `HippoPaymentsProcessor` 符合 `PaymentProcessing`，我们可以使用\
  \ Combine 的 `Future` 类型：\n\n```\n// HippoPaymentsProcessor+PaymentProcessing.swift\n\
  import Combine\nimport HippoPayments\nextension HippoPaymentsProcessor: PaymentProcessing\
  \ {\n    func process(order: Order) -> AnyPublisher {\n        return Future { promise\
  \ in\n            self.processPayment(\n                payload: ???,\n        \
  \        onSuccess: { promise(.success(())) },\n                onFailure: { promise(.failure($0))\
  \ }\n            )\n        }\n        .eraseToAnyPublisher()\n    }\n}\n```\n\n\
  `payload` 值应该用什么？假设 SDK 文档说明它应该是一个字典，包含订单中所有项目名称的数组，键为 `\"items\"`：\n\n```\n[ \"\
  items\": [ \"Arancini Balls\", \"Penne all'Arrabbiata\" ] ]\n```\n\n我们需要一个测试来指导我们实现\
  \ payload 逻辑。我们无法直接为 `HippoPaymentsProcessor` 编写测试，所以让我们在我们控制的地方构建这个功能：\n\n```\n\
  // Order+HippoPayments.swift\nextension Order {\n    var hippoPaymentsPayload: [String:\
  \ Any] { [:] }\n}\n```\n\n我们可以对这个逻辑使用 TDD，我将把它留作练习。\n\n现在，让我们更新 `OrderDetail.ViewModel`，使其期望一个符合\
  \ `PaymentProcessing` 的类型，而不是具体的 `HippoPaymentsProcessor` 实例。这样做是依赖倒置原则的一个应用——我们使不同的组件依赖于抽象而不是具体类型：\n\
  \n```\n// OrderDetail.ViewModel.swift\nextension OrderDetail {\n    struct ViewModel\
  \ {\n        // ...\n        // TODO: 仅为使代码编译通过而使用 HippoPaymentsProcessor 的默认值。\n\
  \        // 完全集成后将移除它。\n        init(\n            orderController: OrderController,\n\
  \            paymentProcessor: PaymentProcessing = HippoPaymentsProcessor.init(apiKey:\
  \ \"A1B2C3\")\n        ) {\n            // ...\n```\n\n多亏了依赖倒置，我们现在可以构建一个测试替身来验证结账按钮操作启动了支付流程。\n\
  \n\n\n## 间谍测试替身\n\n我们如何验证点击结账按钮会启动 `OrderDetail.ViewModelTests` 中的支付流程？\n\n我们无法访问\
  \ `HippoPaymentsProcessor` 来检查其状态或是否向其后端发送了请求。此外，我们在第 10 章已经讨论过在测试中发出真实网络请求的弊端。我们也没有办法检查应用程序状态的变化，因为我们是隔离测试\
  \ `ViewModel` 的。我们*可以*做的是利用我们创建的抽象作为接缝（seam），从而在测试中插入我们可以控制的内容。\n\n我们可以编写一个符合 `PaymentProcessing`\
  \ 协议的测试替身（Test Double），它能够记录对启动流程的方法的调用，以便我们后续进行检查：这就是*间谍（Spy）*。Spy 这个名称指的是替身“暗中监视”消费者如何调用依赖项：\n\
  \n```\n// PaymentProcessingSpy.swift\n@testable import Albertos\nimport Combine\n\
  class PaymentProcessingSpy: PaymentProcessing {\nprivate(set) var receivedOrder:\
  \ Order?\nfunc process(order: Order) -> AnyPublisher {\nreceivedOrder = order\n\
  return Result.success(()).publisher.eraseToAnyPublisher()\n}\n}\n```\n\n我们可以编写一个使用该\
  \ Spy 来验证期望行为的测试：\n\n```\n// OrderDetail.ViewModelTests.swift\nfunc testWhenCheckoutButtonTappedStartsPaymentProcessingFlow()\
  \ {\n// 创建一个 OrderController 并向其中添加一些商品\nlet orderController = OrderController()\n\
  orderController.addToOrder(item: .fixture(name: \"name\"))\norderController.addToOrder(item:\
  \ .fixture(name: \"other name\"))\n// 创建 Spy\nlet paymentProcessingSpy = PaymentProcessingSpy()\n\
  let viewModel = OrderDetail.ViewModel(\norderController: orderController,\npaymentProcessor:\
  \ paymentProcessingSpy\n)\nviewModel.checkout()\nXCTAssertEqual(paymentProcessingSpy.receivedOrder,\
  \ orderController.order)\n}\n```\n\n为了让测试通过，我们只需要在视图模型中调用 `process(order:)` 方法：\n\
  \n```\n// OrderDetail.ViewModel.swift\nfunc checkout() {\npaymentProcessor.process(order:\
  \ orderController.order)\n}\n```\n\n测试通过了，但 Xcode 会给出一个警告：“Result of call to ' `process(order:)`\
  \ ' is unused。” 这是一个很好的提醒：即使我们发起了处理订单的调用，我们并没有将结果告知用户。我们将在下一章处理这个问题。\n\n接下来，让我们使用刚刚编写的逻辑，为\
  \ `OrderDetail` 更新一个按钮：\n\n```\n// OrderDetail.swift\n// ...\nstruct OrderDetail:\
  \ View {\n// ...\nvar body: some View {\nVStack(alignment: .center, spacing: 8)\
  \ {\n// ...\nButton {\nviewModel.checkout()\n} label: {\nText(viewModel.checkoutButtonText)\n\
  .font(.callout)\n.bold()\n.padding(12)\n.foregroundColor(.white)\n.background(Color.crimson)\n\
  .cornerRadius(10.0)\n}\n// ...\n```\n\n## 使用 Spy 的缺点\n\n得益于 Spy，我们实现并验证了订单提交和支付启动的行为。\n\
  \nSpy 是验证导致其他对象中方法调用或内部状态变化的行为的有用工具。然而，使用 Spy 有一个缺点：它将测试与代码的实现细节紧密耦合在一起。\n\n编写可维护测试的一个关键规则是：你应该*测试行为，而非实现*。专注于行为的测试允许你多次重构实现，但过度依赖实现细节的测试一旦开始重构就会出错。为了让你的测试套件发挥最大价值，请保持它专注于断言行为。\n\
  \nSpy 违背了行为与实现的准则，因为它们完全依赖于其所模拟类型的接口。\n\n这就是为什么你应该只有在没有其他设计选项可用时，才考虑使用 Spy 或任何其他测试替身。在本章的示例中，无法通过返回一个值的方法来实现我们的行为，也无法询问\
  \ `HippoPaymentsProcessor` 处理是否已启动，因此使用 Spy 是唯一的选择。\n\n## 练习时间\n\n假设你想要从应用中记录事件以进行数据分析，例如追踪顾客查看商品详情与下单次数的比率。为此，你决定使用\
  \ Hippo Payments 的姊妹产品 Hippo Analytics，你可以在本章的配套源代码中找到它。\n\n你将如何使用 TDD 来集成事件并确保它们记录了正确的数据？\n\
  \n## 关键要点\n\n*   **你可以像对待第一方依赖一样，将依赖倒置原则应用于第三方依赖**。\n*   **抽象第三方依赖使得更换供应商更容易，并允许你使用与代码库其余部分一致的\
  \ API**。当你让第三方 SDK 符合你的抽象时，就可以使其采用你代码库的编码风格。\n*   **使用 Spy 测试替身来确保你的组件按预期与第三方交互**。借助\
  \ Spy，你可以记录方法调用和状态变化，以验证其按预期发生。\n\n"
- "# 13. 测试条件性视图展示\n\n*当展示视图的代码需要存在于 SwiftUI 层时，如何测试其条件逻辑？*\n\n*通过将尽可能多的逻辑提取到 ViewModel\
  \ 层，并保持 SwiftUI 实现足够精简。*\n\n有时，展示视图是直接明了的，例如从列表中选择一个项目时加载详情页面。其他时候，则会涉及逻辑，比如用户应该根据操作结果看到不同的警告（Alert）。\n\
  \n每当展示视图涉及逻辑时，使用测试来驱动其实现是确保其正确性的最佳方法，并且比将逻辑保留在 UI 中并手动验证要高效得多。\n\n在本章中，我们将学习如何使用测试驱动开发（TDD）来根据不同的支付处理结果展示不同的`Alert`。为此，我们将把条件逻辑的核心部分移到`ViewModel`层，并基于\
  \ SwiftUI 的`Binding`机制来修改视图的展示状态。\n\n\n\n## 告知用户结账完成\n\n在上一章中，我们编写了代码，通过让 `OrderDetail.ViewModel`\
  \ 的 `checkout()` 方法调用 `PaymentProcessing` 的 `process(order:)`，并传入 `OrderController`\
  \ 中存储的 `Order`，从而启动订单处理流程。\n\n我们需要一种方式来告知用户订单结果：支付是否成功、厨房是否已收到订单，或者流程中是否出现错误。\n\n\
  测试驱动开发的核心在于小步迭代。这个流程中“最早可测试”的版本是什么？我们可以先尝试在支付完成后简单显示一个弹窗。\n\nSwiftUI 拥有专门用于显示弹窗的类型和\
  \ API。展示弹窗的最简单方式是在 `View` 中拥有一个 `@State` 包装的属性，用于表示弹窗是否应显示在屏幕上，然后使用 `View` 的方法 `alert(isPresented:,\
  \ content:)`，在该属性为 `true` 时定义要展示的 `Alert`：\n\n```\nstruct ExampleView: View {\n\
  @State var showingAlert = false\nvar body: some View {\nButton {\nself.showingAlert.toggle()\n\
  } label: {\nText(\"显示弹窗\")\n}\n.alert(isPresented: $showingAlert) {\nAlert(\ntitle:\
  \ Text(\"你好\"),\nmessage: Text(\"嗨，我是一个弹窗\"),\ndismissButton: .default(Text(\"再见\"\
  ))\n)\n}\n}\n}\n```\n\n`alert(isPresented:, content:)` 期望 `isPresented` 的值为 `Binding<Bool>`。\
  \ [`Binding<Value>`](https://developer.apple.com/documentation/swiftui/binding)\
  \ 是 SwiftUI 的一种类型和属性包装器，它创建了“存储数据的属性与显示并更改数据的视图之间的双向连接”。\n\n通过 `Binding`，当用户点击关闭按钮时，`Alert`\
  \ 可以改变 `showingAlert` 的值。\n\n我们刚刚讨论的选项是介绍弹窗展示的好方法，但所有逻辑都集中在视图中，并且不支持条件逻辑。为了根据支付处理的结果显示不同的弹窗，我们可以使用更精细的\
  \ `alert(item:, content:)` API。`alert(item:, content:)` 期望 `item` 是一个 `Binding<Optional<Identifiable>>`。`Binding`\
  \ 包装器允许 SwiftUI 在弹窗展示或关闭后更新被包装的值。`Optional` 告诉框架：当值从 `none` 变为 `some` 时，应该显示弹窗。`content`\
  \ 参数必须是 `(Identifiable) -> Alert` 闭包，SwiftUI 会调用它来获取要显示的 `Alert`。\n\n得益于这个 API，我们可以将所有与弹窗展示相关的条件逻辑提取到独立于\
  \ SwiftUI 的类型中，从而能够使用测试驱动开发来构建它们。\n\n1.  为弹窗定义一个 ViewModel。\n2.  向 `OrderDetail.ViewModel`\
  \ 添加一个 `@Published` 属性，其类型为 `Optional` 的弹窗 ViewModel。\n3.  让 `OrderDetail.ViewModel`\
  \ 根据支付处理结果更新此属性。\n4.  让 `OrderDetail` 读取与 `@Published` 属性关联的 `Binding` 值（使用 `$`\
  \ 前缀）。\n\n弹窗的 ViewModel 可以是一个简单的 `struct`：\n\n```\n// Alert.ViewModel.swift\nimport\
  \ SwiftUI\nextension Alert {\nstruct ViewModel: Identifiable {\nlet title: String\n\
  let message: String\nlet buttonText: String\nvar id: String { title + message +\
  \ buttonText }\n}\n}\n```\n\n下一步是向 `OrderDetail.ViewModel` 添加一个 `Alert.ViewModel\
  \ @Published` 属性：\n\n```\n// OrderDetail.ViewModel.swift\n// ...\nextension OrderDetail\
  \ {\nclass ViewModel: ObservableObject {\n// ...\n@Published private(set) var alertToShow:\
  \ Alert.ViewModel?\n// ...\n}\n}\n```\n\n如果你在此更改后使用快捷键 `Shift Cmd U` 构建测试代码，你会发现即使我们没有更新\
  \ `OrderDetail.ViewModel` 的 `init` 方法，代码仍然可以编译。原因是 Swift 编译器可以将 `Optional` 变量（如\
  \ `var alertToShow: Alert.ViewModel?`）的默认值推断为 `none`。这正是我们想要的值，因为我们只应在支付处理完成后才显示弹窗。\n\
  \n让我们为这个行为编写测试列表：\n\n```\n// OrderDetail.ViewModelTests.swift\n@testable import\
  \ Albertos\nimport XCTest\nclass OrderDetailViewModelTests: XCTestCase {\n// ...\n\
  func testWhenPaymentSucceedsUpdatesPropertyToShowConfirmationAlert() {}\nfunc testWhenPaymentFailsUpdatesPropertyToShowErrorAlert()\
  \ {}\n}\n```\n\n我们从失败场景开始，以确保我们对错误处理给予了应有的重视。\n\n为了测试支付处理失败，我们需要在 `PaymentProcessing`\
  \ 依赖中模拟这个场景。我们可以使用桩测试替身来实现，正如我们在第 8 章中学到的那样：\n\n```\n// PaymentProcessingStub.swift\n\
  @testable import Albertos\nimport Combine\nimport Foundation\nclass PaymentProcessingStub:\
  \ PaymentProcessing {\nlet result: Result\ninit(returning result: Result) {\nself.result\
  \ = result\n}\nfunc process(order: Order) -> AnyPublisher {\nreturn result.publisher\n\
  // 使用延迟模拟真实世界的异步行为\n.delay(for: 0.01, scheduler: RunLoop.main)\n.eraseToAnyPublisher()\n\
  }\n}\n```\n\n通过桩对象，我们可以安排被测系统的输入，并通过调用 `checkout()` 方法来触发操作：\n\n```\nfunc testWhenPaymentFailsUpdatesPropertyToShowErrorAlert()\
  \ {\nlet viewModel = OrderDetail.ViewModel(\norderController: OrderController(),\n\
  paymentProcessor: PaymentProcessingStub(returning: .failure(TestError(id: 123)))\n\
  )\nviewModel.checkout()\n// 断言结果：？？？\n}\n```\n\n当支付处理失败时，我们如何验证持有 ViewModel 的 `@Published`\
  \ 属性已改变为我们期望的值？\n\n我们正在处理的代码是异步的，但它没有回调或 `Publisher` 来让我们附加处理器以完成 `XCTestExpectation`，就像我们在第\
  \ 10 章测试网络行为时那样。\n\n一个简单的选择是移除桩对象中的人为延迟，使测试变为同步。\n\n不过，我想借此机会向您展示另一种测试异步代码的方法。\n\
  \n\n\n## 如何在没有回调时测试异步代码\n\n`XCTest` 提供了一种基于给定谓词来验证其满足条件的异步期望：`XCTNSPredicateExpectation`。当被测异步代码没有回调，导致我们无法显式满足期望时，就可以使用它：\n\
  \n```\nfunc testWhenPaymentFailsUpdatesPropertyToShowErrorAlert() {\n    let viewModel\
  \ = OrderDetail.ViewModel(\n        orderController: OrderController(),\n      \
  \  paymentProcessor: PaymentProcessingStub(returning: .failure(TestError(id: 123)))\n\
  \    )\n    let predicate = NSPredicate { _, _ in viewModel.alertToShow != nil }\n\
  \    let expectation = XCTNSPredicateExpectation(predicate: predicate, object: .none)\n\
  \    viewModel.checkout()\n    wait(for: [expectation], timeout: 2)\n    XCTAssertEqual(viewModel.alertToShow?.title,\
  \ \"\")\n    XCTAssertEqual(\n        viewModel.alertToShow?.message,\n        \"\
  您的订单出现错误，请联系服务员。\"\n    )\n    XCTAssertEqual(viewModel.alertToShow?.buttonText,\
  \ \"好的\")\n}\n```\n\n注意，`NSPredicate` 仅仅验证 `alertViewModel` 是否不为 nil，而关于内容属性的断言则只在期望满足后才执行。这样做比将所有检查都放在谓词中，能提供更细粒度的失败信息。\n\
  \n使用 `Cmd U` 运行测试，会显示类似 \"异步等待失败：超出 2 秒超时，存在未满足的期望：...\" 的错误。这并不意外：我们还没有处理支付流程。\n\
  \n现在，我们来订阅支付处理器 `Publisher` 以处理错误，让测试通过：\n\n```\n// OrderDetail.ViewModel.swift\n\
  func checkout() {\n    paymentProcessor.process(order: orderController.order)\n\
  \        .sink(\n            receiveCompletion: { [weak self] completion in\n  \
  \              guard case .failure = completion else { return }\n              \
  \  self?.alertToShow = Alert.ViewModel(\n                    title: \"\",\n    \
  \                message: \"您的订单出现错误，请联系服务员。\",\n                    buttonText:\
  \ \"好的\"\n                )\n            },\n            receiveValue: { _ in\n\
  \            }\n        )\n        .store(in: &cancellables)\n}\n```\n\n现在测试通过了。\n\
  \n你可能注意到了测试中奇怪的超时设置。为什么要设为 2 秒？根据我的经验，当使用基于 `NSPredicate` 的期望时，等待 1 秒有时会导致意外的超时。\n\
  \n不幸的是，`XCTNSPredicateExpectation` 的性能不如其他异步测试方案，因为它使用了轮询机制，正如苹果工程师 Stuart Montgomery\
  \ 在 2018 年 WWDC 演讲 [*测试技巧与窍门*](https://developer.apple.com/videos/play/wwdc2018/417/%253Ftime%253D2073)\
  \ 中所指出的。匹配器库 [Nimble](https://github.com/Quick/Nimble/)（参见附录 B）提供了性能更好的方式来编写这些期望。如果你的代码需要多次使用这种方式，不妨考虑采用\
  \ Nimble。\n\n当使用非标准超时时，将其提取为常量可以在其他测试中复用，并让未来的读者明白你为何选择这个特定值：\n\n```\n// XCTestCase+Timeouts.swift\n\
  import XCTest\nextension XCTestCase {\n    /// 使用大约 1 秒的等待时间，在使用\n    /// `XCTNSPredicateExpectation`\
  \ 时似乎会导致\n    /// 偶发的测试超时失败。\n    var timeoutForPredicateExpectations: Double {\
  \ 2.0 }\n}\n\n// OrderDetail.ViewModelTests.swift\nwait(for: [expectation], timeout:\
  \ timeoutForPredicateExpectations)\n```\n\n接下来，我们来处理支付成功时显示提示框的逻辑。我们可以采用与上一个测试相同的策略：\n\
  \n```\n// OrderDetail.ViewModelTests.swift\nfunc testWhenPaymentSucceedsUpdatesPropertyToShowConfirmationAlert()\
  \ {\n    let viewModel = OrderDetail.ViewModel(\n        orderController: OrderController(),\n\
  \        paymentProcessor: PaymentProcessingStub(returning: .success(()))\n    )\n\
  \    let predicate = NSPredicate { _, _ in viewModel.alertToShow != nil }\n    let\
  \ expectation = XCTNSPredicateExpectation(predicate: predicate, object: .none)\n\
  \    viewModel.checkout()\n    wait(for: [expectation], timeout: timeoutForPredicateExpectations)\n\
  \    XCTAssertEqual(viewModel.alertToShow?.title, \"\")\n    XCTAssertEqual(\n \
  \       viewModel.alertToShow?.message,\n        \"支付成功，您的美食很快就会送到。\"\n    )\n \
  \   XCTAssertEqual(viewModel.alertToShow?.buttonText, \"好的\")\n}\n\n// OrderDetail.ViewModel\n\
  func checkout() {\n    paymentProcessor.process(order: orderController.order)\n\
  \        .sink(\n            receiveCompletion: { [weak self] completion in\n  \
  \              guard case .failure = completion else { return }\n              \
  \  self?.alertToShow = Alert.ViewModel(\n                    title: \"\",\n    \
  \                message: \"您的订单出现错误，请联系服务员。\",\n                    buttonText:\
  \ \"好的\"\n                )\n            },\n            receiveValue: { [weak self]\
  \ _ in\n                self?.alertToShow = Alert.ViewModel(\n                 \
  \   title: \"\",\n                    message: \"支付成功，您的美食很快就会送到。\",\n         \
  \           buttonText: \"好的\"\n                )\n            }\n        )\n  \
  \      .store(in: &cancellables)\n}\n```\n\nViewModel 的逻辑至此已经完成。我们通过单元测试验证了它的行为，确信它在隔离环境中能够正常工作。现在是时候将其与视图层连接起来了。\n\
  \n## 连接视图\n\n由于 ViewModel 负责配置和触发提示框显示的所有条件逻辑，我们在视图中呈现提示框唯一要做的，就是将 ViewModel 连接到合适的\
  \ SwiftUI API 上：\n\n```\n// OrderDetail.swift\n// ...\nstruct OrderDetail: View\
  \ {\n    @ObservedObject private(set) var viewModel: ViewModel\n    var body: some\
  \ View {\n        VStack(alignment: .center, spacing: 8) {\n            // ...\n\
  \        }\n        .alert(item: $viewModel.alertToShow) { alertViewModel in\n \
  \           Alert(\n                title: Text(alertViewModel.title),\n       \
  \         message: Text(alertViewModel.message),\n                dismissButton:\
  \ .default(Text(alertViewModel.buttonText))\n            )\n        }\n    }\n}\n\
  ```\n\n就是这样。你可以运行应用来验证集成效果。本章源代码中的 `HippoPaymentsProcessor` 总是返回成功，但如果你想验证失败场景，可以修改它让其返回错误。\n\
  \n图 13-1 展示了成功和失败场景的提示框。\n\n![../images/501287_1_En_13_Chapter/501287_1_En_13_Fig1_HTML.png](img/501287_1_En_13_Fig1_HTML.png)\n\
  \n图 13-1\n\n通知支付成功（左）或失败（右）的提示框\n\n`Alert.ViewModel` 并不依赖于 `OrderDetail`。如果你希望对整个提示框展示流程有更多信心，可以将根据\
  \ `Binding<Alert.ViewModel?>` 值展示提示框的逻辑提取到 `View` 的扩展中，并为它编写一个专门的 UI 测试。\n\n\n\n\
  ## 测试警告框关闭行为\n\n目前，当用户点击警告框的“确定”按钮时，订单页面仍然保留。更好的用户体验是让屏幕与警告框一同关闭。\n\n纯 SwiftUI 的做法是在\
  \ `OrderDetail` 上定义一个 `@Binding` 属性，用于追踪 `OrderButton` 的 `showDetail` 值，并在需要关闭屏幕时切换它：\n\
  \n```\n// OrderDetail.swift\n// ...\nstruct OrderDetail: View {\n// ...\n@Binding\
  \ private(set) var isPresented: Bool\n// ...\n}\n// OrderButton.swift\n// ...\n\
  struct OrderButton: View {\n// ...\n@State private(set) var showingDetail: Bool\
  \ = false\nvar body: some View {\n// ...\n.sheet(isPresented: $showingDetail) {\n\
  OrderDetail(\nviewModel: .init(orderController: orderController)),\nisPresented:\
  \ $showingDetail\n)\n}\n}\n}\n```\n\n想必您现在知道，我不推荐纯 SwiftUI 方案，因为我们无法用测试来辅助实现。为 `OrderDetail`\
  \ 添加一个属性来告知其是否被展示，也会降低其可复用性：这隐含了它应该始终以表单（sheet）形式被呈现。\n\n有一种方法可以让 `OrderDetail`\
  \ 不受导航和展示层级结构的影响，并使部分展示逻辑可测试：将尽可能多的逻辑从纯 SwiftUI 组件中分离出来。\n\n首先，我们为 `Alert.ViewModel`\
