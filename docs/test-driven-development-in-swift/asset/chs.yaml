- "# 1. 为什么选择测试驱动开发？\n\n## 什么是测试？\n\n《牛津英语词典》将名词 *test* 定义为：“*一种旨在确定某物的质量、性能或可靠性的程序，尤其是在其被广泛使用之前。*”在软件开发领域，我们可以将此定义调整为：“*一种旨在确定软件质量、性能或可靠性的程序，尤其是在其交付给用户之前。*”\n\
  \n测试我们的软件，本质上就是运行它并验证其行为是否符合预期。\n\n以这个“Hello, world!”脚本为例：\n\n```\n#!/usr/bin/env\
  \ xcrun swift\nfunc main() {\n    guard CommandLine.argc > 1 else {\n        print(\"\
  Hello, world!\")\n        return\n    }\n    print(\"Hello, \\(CommandLine.arguments[1])!\"\
  )\n}\nmain()\n```\n\n一个测试可以是：无输入运行它，即 `./hello_world.swift`，并检查它是否输出“Hello, world!”。然后，我们可以用特定输入运行它，并验证它是否在问候语中使用了该输入。例如，`./hello_world.swift\
  \ Ada` 应输出“Hello, Ada!”。\n\n同样，你可以启动 iOS 模拟器中的应用，点击其 UI 检查其行为是否按编程设定运行。或者，你可以在 Web\
  \ 应用中通过表单提交数据，然后检查数据库是否包含该数据。\n\n以上所有例子都有一个共同特征：需要有人来运行软件并验证其行为。这些是*手动*测试。\n\n要按计划持续交付高质量软件，仅靠手动测试是不够的。\n\
  \n## 手动测试效率低下\n\n我们可以手动彻底测试像 `hello_world.swift` 这样的小脚本，因为其功能集有限，但实际程序并非如此简单。即使是最小的应用，也存在许多可能的代码路径、代码接受的输入排列组合以及用户可在系统中采取的步骤。要手动测试所有这些，将花费*大量*时间。\n\
  \n手动测试既耗时又成本高昂。无论执行测试的是谁，无论是软件或质量保证工程师、产品负责人还是第三方公司，真人需要支付薪水。他们还需要休息时间、会生病、可能忘记事情，而且不可避免地会犯错。\n\
  \n然而，为了节省时间和金钱而跳过测试将是一个糟糕的举动。如果我们不在交付前测试产品，用户就会替我们测试。这远非理想。虽然我们可能会为发现一个 bug 而庆祝，但用户却会感到沮丧，并可能转而使用竞争对手的产品。\n\
  \n必须有一种方法，能够高度可信地测试我们的软件，速度快，且无需人类完成所有工作。\n\n\n\n## 检验代码的代码\n\n软件开发者编写代码来自动完成原本需要手动执行的任务。正如投资人马克·安德森[在\
  \ 2011 年的一篇文章](https://a16z.com/2011/08/20/why-software-is-eating-the-world/)中所言，过去几十年里，软件一直在“吞噬世界”。\n\
  \n过去人们用传真机发送签名文件，在车里放一本大地图册，用名片夹存储商业联系人。如今，我们使用带有数字签名的电子邮件、利用智能手机 GPS 的导航应用，以及 CRM\
  \ 网络工具。\n\n软件也可以实现其他软件的自动化，从通过读取与会者的日历来确定最佳会议时间、生成带视频通话链接的邀请，到按计划发布预先撰写的内容。\n\n\
  验证软件的行为只是另一个适合自动化的任务。你可以编写代码来检查你写的代码是否按预期运行。\n\n检查其他代码的代码——这就是自动化测试的本质。\n\n为了理解“编写检查其他代码的代码”的含义，让我们来看编程面试中经久不衰的经典——“fizz-buzz”算法：\n\
  \n- 给定一个整数，如果它能被 3 整除，输出“fizz”；如果能被 5 整除，输出“buzz”；如果能同时被 3 和 5 整除，输出“fizz-buzz”；否则，输出该数字本身。\n\
  \n以下是一种可能的实现：\n\n```\nfunc fizzBuzz(_ number: Int) -> String {\n    let divisibleBy3\
  \ = number % 3 == 0\n    let divisibleBy5 = number % 5 == 0\n    switch (divisibleBy3,\
  \ divisibleBy5) {\n    case (false, false): return \"\\(number)\"\n    case (true,\
  \ false): return \"fizz\"\n    case (false, true): return \"buzz\"\n    case (true,\
  \ true): return \"fizz-buzz\"\n    }\n}\n```\n\n为了测试这段代码，我们可以用一个脚本，用不同的数字调用`fizzBuzz(_:)`，如果返回值正确则打印“PASSED”，否则打印“FAILED”：\n\
  \n```\nfunc testFizzBuzz() {\n    if fizzBuzz(3) == \"fizz\" {\n        print(\"\
  PASSED\")\n    } else {\n        print(\"FAILED\")\n    }\n    if fizzBuzz(5) ==\
  \ \"buzz\" {\n        print(\"PASSED\")\n    } else {\n        print(\"FAILED\"\
  )\n    }\n    // 以此类推\n}\n```\n\n为每个测试重复`if/else`结构会使测试变得冗长且乏味。让我们把检查值与预期值是否一致的逻辑提取到一个专门的函数中：\n\
  \n```\nfunc test(value: String, matches expected: String) {\n    if value == expected\
  \ {\n        print(\"PASSED\")\n    } else {\n        print(\"FAILED\")\n    }\n\
  }\n\nfunc testFizzBuzz() {\n    test(value: fizzBuzz(1), matches: \"1\")\n    test(value:\
  \ fizzBuzz(3), matches: \"fizz\")\n    test(value: fizzBuzz(5), matches: \"buzz\"\
  )\n    test(value: fizzBuzz(15), matches: \"fizz-buzz\")\n}\n```\n\n现在我们有了一个自动化测试脚本来验证我们的`fizzBuzz(_:)`函数。如果输出全部是“PASSED”，那么实现就是正确的——或者更准确地说，符合我们以单个测试形式列举的预期。\n\
  \n自动化测试将输入数据、读取输出并验证其正确性这些工作外包给了计算机。计算机执行这些任务的速度和准确性都远超我们人类。\n\n由于速度快，我们可以更频繁地运行自动化测试，从而更有可能及早发现问题和捕获回归。\n\
  \n我们还可以自动化运行这些自动化测试，确保永远不会忘记执行它们。例如，如果你使用 Git，可以设置一个钩子，在每次提交前运行这些测试。\n\n任何人都可以运行所有测试，因为脚本将这些测试编码化了。反之，在一个人能手动测试一个复杂产品之前，他需要接受相关培训，否则不知道预期结果是什么。而任何新员工都可以运行测试脚本，并立即判断所有检查是否通过。\n\
  \n为某个行为编写自动化测试可能比手动测试花费的时间更长。然而，一旦你支付了这笔一次性的设置成本，你就可以在手动测试所需时间的一小部分内，无数次地运行该测试。\n\
  \n自动化测试是你在软件随着新功能和变更而进化时，维护其质量所能做的最佳投资。相比机械的手动测试，它们是一种更快、更便宜且可扩展的替代方案。\n\n## 单元测试、集成测试、UI\
  \ 测试……天哪！\n\n阅读关于软件测试的资料时，你会接触到各种自动化测试的名称。单元测试、集成测试、UI 测试、基于属性的测试、探索性测试、特征化测试……清单还很长。至少可以说，这令人眼花缭乱，更糟的是，不同的人或资料对某些名称的实际含义有着不同的解释。\n\
  \n一些学者将任何不涉及与应用程序实际 UI 交互的自动化测试都称为单元测试；另一些人则采用更严格的定义，只将在隔离状态下测试某个组件的测试视为单元测试。\n\n\
  在本书中，我们将遵循罗伊·奥谢罗夫在《单元测试的艺术》中对单元测试的定义：\n\n- 单元测试是一段调用某个工作单元并检查该工作单元的一个特定最终结果的代码。\n\
  \n其中，工作单元是“从调用系统中的公共方法到系统测试能观察到的一个显著最终结果之间所发生的一系列动作的总和”。\n\n另外两个值得给出的定义是集成测试和 UI\
  \ 测试。\n\n在进行测试驱动开发时，单元测试是最适合编写的测试，因为它们聚焦明确，能够实现更快的反馈循环。因此，本书只关注单元测试。\n\n在本书中，除非另有说明，每次提到“测试”时，指的都是单元测试。\n\
  \n\n\n## 从编写测试到先编写测试\n\n为已有的代码编写测试存在一个问题：你无法真正信任一个从未见过失败的测试。\n\n要确保你的测试不会产生误报——即代码有误时测试依然通过——唯一的方法是修改代码的行为以强制其失败，然后观察测试能否捕获该错误。\n\
  \n为了验证测试的正确性而强制修改生产代码并非高效的做法。这需要更改你已写好的代码，而验证测试后又要立即撤销改动。\n\n如何才能在不费心创建临时性失败的情况下，验证我们的测试是正确的呢？\n\
  \n答案是将流程反转过来，**先**编写测试。\n\n通过为你尚未实现的功能编写测试，你可以确保该测试能够捕获错误。这是因为如果该行为的代码尚不存在，测试*必须*失败；如果没有失败，则说明测试编写有误。\n\
  \n让我们再看一下 fizz-buzz 的例子。这次，我们将从一个空实现开始，然后为预期行为编写一个测试：\n\n```\nfunc fizzBuzz(_ number:\
  \ Int) -> String {\nreturn \"\"\n}\nfunc testFizzBuzz() {\ntest(value: fizzBuzz(1),\
  \ matches: \"1\")\n}\n```\n\n运行 `testFizzBuzz()` 会打印 \"FAILED\"。为了让测试通过，我们只需修改实现，将输入的\
  \ `Int` 转换为 `String`：\n\n```\nfunc fizzBuzz(_ number: Int) -> String {\nreturn \"\
  \\(number)\"\n}\n```\n\n如果现在调用 `testFizzBuzz()`，它会打印 \"PASSED\"。\n\n让我们继续逐个测试地实现\
  \ `fizzBuzz(_:)`，并添加一个测试来确保能被三整除的输入返回 \"fizz\"：\n\n```\ntest(value: fizzBuzz(3),\
  \ matches: \"fizz\")\n```\n\n为了让两个测试都通过，我们可以将 `fizzBuzz(_:)` 的实现更新为：\n\n```\nguard\
  \ number % 3 == 0 else { return \"\\(number)\" }\nreturn \"fizz\"\n```\n\n然后我们可以继续处理下一个行为方面——能被五整除的输入应返回\
  \ \"buzz\"：\n\n```\ntest(value: fizzBuzz(5), matches: \"buzz\")\n```\n\n为了让这个新测试和其他两个测试都通过，我们可以将\
  \ `fizzBuzz(_:)` 更新为：\n\n```\nswitch (number % 3 == 0, number % 5 == 0) {\ncase\
  \ (true, false): return \"fizz\"\ncase (false, true): return \"buzz\"\ndefault:\
  \ return \"\\(number)\"\n}\n```\n\n我们只剩下一个场景需要覆盖——能被十五整除的数字应返回 \"fizz-buzz\"：\n\n\
  ```\ntest(value: fizzBuzz(15), matches: \"fizz-buzz\")\n```\n\n让我们更新 `fizzBuzz(_:)`，让这最后一个测试也通过：\n\
  \n```\nswitch (number % 3 == 0, number % 5 == 0) {\ncase (false, false): return\
  \ \"\\(number)\"\ncase (true, false): return \"fizz\"\ncase (false, true): return\
  \ \"buzz\"\ncase (true, true): return \"fizz-buzz\"\n}\n```\n\n我们通过一步步构建，始终从一个失败的测试开始，最终得到了一个可用的\
  \ \"fizz-buzz\" 实现。由于每个测试都代表了整个 \"fizz-buzz\" 行为的一个特定用例，迭代之间的代码改动始终是最小的。在每一步中，新行为的测试帮助我们验证新代码是否有效，而无需多次手动调用它，同时已有的测试则确保了新代码不会破坏其余逻辑。\n\
  \n这种先测试、逐步进行、快速反馈的编码方式极为高效。这是一种独特的软件开发方式，称为测试驱动开发，简称 TDD。\n\n测试驱动开发是有意识且持续地利用测试反馈来指导软件实现的过程。但实践\
  \ TDD 不仅仅是在生产代码之前编写测试；其副产品远比仅仅知道软件行为符合预期更有价值。\n\n## 从先编写测试到测试驱动开发\n\n先编写测试会对你的软件设计施加有益的压力。环境约束和自然选择造就了构成我们世界动植物群的那些美丽而高级的物种。同样，强迫自己先编写测试会将你和你的代码库推向更高的标准。\n\
  \n当你先编写测试时，你立刻就能看出你的设计是否易于测试。直接且隔离的行为比复杂的行为更容易测试。一个具有许多依赖关系的大型对象比一个只有少数几个 `init`\
  \ 参数的较小对象更难放入测试框架中。\n\n如果代码易于测试，那么它在生产环境中的使用也会很简单。这是因为测试是代码公共 API 的消费者。在测试中使用代码与在生产环境中使用代码是相似的。\n\
  \n由于编写简单的测试比编写复杂的测试更容易，你自然会倾向于编写隔离且只做一件事的代码。你将构建由高内聚、低耦合的组件组成的软件。\n\nTDD 还能帮助你更好地理解产品需求。要测试代码的行为，你首先需要知道它是什么：你需要具体地定义输入及其预期输出。要做到这一点，你需要恰当地吸收软件应满足的需求。这种前置分析使代码实现变得简单明了。先编写测试消除了跳过这一关键步骤的诱惑。\n\
  \nTDD 为你提供了心理优势。一次一个测试地开发软件设定了可持续的节奏，而当我们看到终点在望时，大脑能更好地实现目标。\n\n一次一个测试地攻克大型复杂应用程序的开发，就像马拉松运动员对待长跑比赛的方式：一步一步，脚踏实地。\n\
  \n测试驱动开发是软件质量的关键习惯。当日复一日地应用时，它会对开发者的生产力、幸福感以及软件设计质量产生巨大的连锁效应。\n\n正如测试驱动开发的创造者（或者像他自称的那样，再发现者¹）肯特·贝克在《测试驱动开发：实战》中所说：\n\
  \n> “如果你乐于拼凑出差不多能用的代码，并且乐于再也不看结果，那么 TDD 不适合你。TDD 建立在一个天真而可爱的极客式假设之上：如果你写出更好的代码，你就会更成功。TDD\
  \ 帮助你在正确的时间关注正确的问题，这样你就能让设计更清晰，并在学习过程中不断完善设计。”\n\n在本书中，你将学习如何使用 TDD 构建 Swift 应用程序，了解该语言强大的类型系统如何增强你编写测试的能力，以及如何使用\
  \ Apple 提供的 Xcode IDE 和 XCTest 框架高效地做到这一点。你将看到这种节奏稳定、先测试的方法如何帮助你应对任何规模和复杂性的问题。你将培养一种以反馈为先的思维方式，无论是对于软件还是产品开发，从而帮助你更快地交付，并更多地了解什么对你的业务有价值。\n\
  \n## 关键要点\n\n*   **自动化测试是使用代码来测试其他代码**；它比手动测试更廉价、更有效，而且远不易出错。\n*   **先编写测试比在实现完成后才编写更好**；通过观察测试在被测行为尚无实现时失败，你可以相信它将捕获未来的回归错误。\n\
  *   **测试驱动开发是一贯且有意识地以测试为起点编写软件的实践**；这一实践能够产生由高内聚、低耦合组件组成的更优秀的软件，每个组件负责一个微小且定义明确的行为。\n\
  \n\n\n## 尾注\n\n1.  引用 Kent Beck 本人的话：\"测试驱动开发的原始描述出自一本关于编程的古书。书中说，你拿一条输入磁带，手动输入你期望的输出磁带，然后编程直到实际输出磁带与期望输出匹配。我在\
  \ Smalltalk 中编写了第一个 xUnit 框架后，想起曾读过这段描述，并尝试了一下。这对我来说就是 TDD 的起源。当向老一辈程序员描述 TDD 时，我经常听到他们说，'当然。不这样编程还能怎样？'因此，我将自己的角色称为'重新发现'TDD。\"\
  \ 来源：[`https://www.quora.com/Why-does-Kent-Beck-referto-the-rediscovery-of-test-driven-development-Whats-the-historyof-test-driven-development-before-Kent-Becks-rediscovery/answer/Kent-Beck`](https://www.quora.com/Why-does-Kent-Beck-referto-the-rediscovery-of-test-driven-development-Whats-the-historyof-test-driven-development-before-Kent-Becks-rediscovery/answer/Kent-Beck)\n\
  \n"
- "# 2. `XCTest` 简介\n\n在上一章中，我们学习了如何编写测试代码的代码。虽然构建几个辅助函数来完成这项工作很有趣，但为了提高效率和专业性，使用测试库会更好。\n\
  \n一个测试库（在 Swift 术语中称为框架）提供了构建测试、运行测试并收集测试结果所需的脚手架。在 Apple 生态系统中，`XCTest` 是默认的测试框架，它随\
  \ Xcode IDE 一起提供。\n\n如果你喜欢在开始使用工具之前先了解它们，那么你会喜欢下面的 `XCTest` 概述。另一方面，如果你迫不及待地想编写一些*真正的*代码，可以随时跳到下一章，需要时再回来阅读。\n\
  \nSwift 开源社区还提供了其他测试框架，但在本书中，我们只专注于使用纯 `XCTest` 编写的测试，因为它是标准的 Apple 技术，无需任何额外设置。无论你是仅使用普通的\
  \ `XCTest`，还是通过其他测试库增强设置，测试驱动开发的应用方式都相同。请前往附录 B 了解开源框架 [Quick](https://github.com/Quick/Quick)\
  \ 和 [Nimble](https://github.com/Quick/Nimble)。\n\n## Xcode 单元测试 Target\n\n`XCTest`\
  \ 提供了一个与 Xcode 集成的测试工具，使得在 IDE 中运行测试并查看结果变得非常容易。\n\n当你创建新项目时，Xcode 会让你选择是否添加测试。如果选择添加，Xcode\
  \ 将基于 `XCTest` 为你创建两个额外的 target，一个用于单元测试，一个用于 UI 测试。\n\n图 2-1 展示了在创建新应用时如何添加测试。\n\
  \n![../images/501287_1_En_2_Chapter/501287_1_En_2_Fig1_HTML.jpg](img/501287_1_En_2_Fig1_HTML.jpg)\n\
  \n图 2-1\n\nXcode 新应用向导，高亮显示了向项目添加测试 target 的选项\n\n正如我们在上一章中讨论的，单元测试和 UI 测试的区别在于，UI\
  \ 测试将应用程序作为一个黑盒进行交互，就像用户一样，而单元测试则针对单个组件进行测试。UI 测试有其用武之地，但你不能用它们来驱动软件的实现；要对一个功能进行\
  \ UI 测试，你需要已经编写了它的大部分代码。\n\n相反，单元测试 target 中的测试在宿主应用中运行，并且可以访问其源代码中的所有对象和类型。这正是我们编写测试优先并将其用作实现正确性的快速反馈机制所需要的。\n\
  \n在 Xcode 单元测试 target 中，你不仅限于测试对象与被测程序其余部分隔离的场景；你还可以编写集成测试以及任何其他可能需要直接实例化源代码中某些对象的测试，例如快照测试或基于属性的测试。\n\
  \n如果你的应用没有单元测试 target，你可以从项目编辑器添加一个，选择图 2-2 中高亮的按钮。这将弹出一个向导，见图 2-3，让你选择 target 的类型。如果你筛选\
  \ \"test\"，就会找到单元测试和 UI 测试 target 的选项。\n\n![../images/501287_1_En_2_Chapter/501287_1_En_2_Fig3_HTML.jpg](img/501287_1_En_2_Fig3_HTML.jpg)\n\
  \n图 2-3\n\nXcode 新建 target 对话框，已筛选项仅显示测试 target\n\n![../images/501287_1_En_2_Chapter/501287_1_En_2_Fig2_HTML.png](img/501287_1_En_2_Fig2_HTML.png)\n\
  \n图 2-2\n\nXcode 项目编辑器，高亮显示了添加新 target 的按钮\n\n现在我们知道了如何为应用添加测试 target，让我们通过将上一章中编写的定制测试转换为\
  \ `XCTest` 来充实它。\n\n## `XCTestCase` 和相等性断言\n\n每个测试的起点是 `XCTestCase` 类，它提供了运行测试和报告其结果所需的所有基础设施和钩子。要创建一个新测试，你需要创建\
  \ `XCTestCase` 的子类，就像你创建 `UIViewController` 的子类一样：\n\n```swift\nimport XCTest\n\
  class FizzBuzzTests: XCTestCase { }\n```\n\n不过，`XCTestCase` 只是测试的容器。要定义测试，你需要向该类添加一个以\
  \ \"test\" 开头的实例方法：\n\n```swift\nclass FizzBuzzTests: XCTestCase {\n    func testFizzBuzzDivisibleBy3ReturnsFizz()\
  \ { }\n    func testFizzBuzzDivisibleBy5ReturnsBuzz() { }\n    func testFizzBuzzDivisibleBy15ReturnsFizzBuzz()\
  \ { }\n    func testFizzBuzzNotDivisibleBy3Or5ReturnsInput() { }\n}\n```\n\n我们可以用\
  \ `XCTAssertEqual` 函数替换我们自定义的检查两个 `String` 是否相等的函数：\n\n```swift\nfunc testFizzBuzzDivisibleBy3ReturnsFizz()\
  \ {\n    XCTAssertEqual(fizzBuzz(3), \"fizz\")\n}\n```\n\n`XCTAssertEqual` 适用于遵循\
  \ `Equatable` 协议的类型，因此你可以将其用于多种类型，而不仅仅是 `String`。\n\n如果值不相等，断言将失败，框架会显示一条消息：\n\n\
  ```swift\nfunc testFizzBuzzDivisibleBy3() {\n    XCTAssertEqual(fizzBuzz(4), \"\
  fizz\")\n}\n// XCTAssertEqual failed: (\"4\") is not equal to (\"fizz\")\n```\n\n\
  ## 其他断言\n\n你会发现自己经常使用 `XCTAssertEqual`，但这并不是该框架提供的唯一断言。\n\n你可以测试 `Bool` 值：\n\n```swift\n\
  XCTAssertTrue(true)\nXCTAssertFalse(false)\n```\n\n你可以测试 `nil` 值：\n\n```swift\n\
  XCTAssertNil(nil)\nXCTAssertNotNil(\"this is not nil\")\n```\n\n有一些断言可用于比较遵循 `Comparable`\
  \ 协议的类型的值：\n\n```swift\nXCTAssertLessThan(1, 2)\nXCTAssertGreaterThan(2, 1)\nXCTAssertLessThanOrEqual(2,\
  \ 2)\nXCTAssertGreaterThanOrEqual(2, 1)\n```\n\n你甚至可以测试某段代码是否会抛出错误：\n\n```swift\n\
  XCTAssertThrowsError(try aFunctionThatThrows())\nXCTAssertNoThrow(try aFunctionThatThrows())\n\
  ```\n\n\n\n## 解包可选值\n\nSwift 提供了一种名为 `Optional` 的类型，用于封装那些可能为 `nil` 的值。\n\n假设你正在为\
  \ `UserRepository` 对象的 `getUserWithId(_:)` 方法编写测试，该方法若找到匹配给定 ID 的 `User` 实例则返回该实例，否则返回\
  \ `nil`。因此，该方法的返回类型是 `Optional<User>`，或者等效的简写形式 `User?`：\n\n```\nlet user: User?\
  \ = userRepository.getUserWithId(1)\nXCTAssertEqual(user?.firstName, \"John\")\n\
  XCTAssertEqual(user?.lastName, \"Appleseed\")\n```\n\n由于 `user` 是`Optional`，上述代码使用后缀可选链操作符\
  \ `?` 来访问其属性。如果 `userRepository` 无法找到 ID 为 `1` 的用户，测试将出现两次失败，每个断言各一次。\n\nXCTest\
  \ 提供了一个特殊的 API，用于尝试解包可选值，并在值为 `nil` 时使测试失败，我们可以用它来改进上述测试：\n\n```\nlet user: User\
  \ = try XCTUnwrap(userRepository.getUserWithId(1))\nXCTAssertEqual(user.firstName,\
  \ \"John\")\nXCTAssertEqual(user.lastName, \"Appleseed\")\n```\n\n使用 `XCTUnwrap`\
  \ 后，如果 `getUserWithId` 返回 `nil`，测试将在此处立即失败。这不仅让问题原因更清晰，而且只出现一次失败而非两次。作为额外好处，省略 `?`\
  \ 后语法也更简洁。\n\n`XCTUnwrap` 也优于使用 `!` 强制解包可选值。如果测试遇到一个为 `nil` 的强制解包 `Optional`，会导致崩溃。当测试套件中的某个测试崩溃时，整个套件会停止运行，因此你只能获取到崩溃前已执行的测试信息。更重要的是，崩溃测试的错误信息不如失败测试清晰，尤其是在\
  \ Xcode 之外运行时。防止你的测试套件因意外发现 `nil` 的 `Optional` 值而崩溃，将有助于更轻松地排查测试失败原因。\n\n## 异步代码的期望\n\
  \n测试异步逻辑需要额外几个步骤。考虑一个通过回调异步计算两个 `Int` 之和的函数：`asyncSum(_ a: Int, _ b: Int, @escaping\
  \ (Int) -> Void)`。如果我们像之前编写测试那样为 `asyncSum` 编写测试，它会失败：\n\n```\nvar sum = 0\nasyncSum(1,\
  \ 2) { result in\nsum = result\n}\nXCTAssertEqual(sum, 3)\nXCTAssertEqual failed:\
  \ (\"0\") is not equal to (\"3\")\n```\n\n失败的原因是：由于 `asyncSum` 是异步的，将求和结果赋值给 `sum`\
  \ 的回调会在断言**之后**执行。\n\n如果使用同步断言来检查异步代码的行为，代码可能在断言执行之前就已运行，最佳情况下会导致误报，最坏情况下会让你花费大量时间调试行为不一致的测试。\n\
  \n以下是在 XCTest 中测试异步代码的方法：\n\n```\nvar sum = 0\nlet expectation = XCTestExpectation(description:\
  \ \"Async sum completed.\")\nasyncSum(1, 2) { result in\nsum = result\nexpectation.fulfill()\n\
  }\n// 这段代码等待 `expectation` 被满足（即\n// 其 `fulfill()` 方法被调用），超时时间为\n// `timeout` 秒。\n\
  wait(for: [expectation], timeout: 0.2)\nXCTAssertEqual(sum, 3)\n```\n\n在运行异步代码之前，你需要实例化一个\
  \ `XCTExpectation`，它将异步地被满足。然后你可以指示测试在继续执行之前，等待期望被满足或超时时间到期，之后再运行你的断言。\n\n编写上述测试的更好方式是在回调中直接执行断言。这省去了在回调外部定义变量来保存值的麻烦，使测试更简洁：\n\
  \n```\nlet expectation = XCTestExpectation(description: \"Async sum completed.\"\
  )\nasyncSum(1, 2) { result in\nXCTAssertEqual(result, 3)\nexpectation.fulfill()\n\
  }\nwait(for: [expectation], timeout: 0.1)\n```\n\n由于我们在测试中包含了 `wait`，因此可以保证断言会执行，否则测试会因超时而失败。\n\
  \n需要测试异步代码的常见场景包括网络操作，我们将在第 10 章中看到。\n\n在 WWDC 2021 上，Apple 引入了一种新的编写异步代码的替代方式，即使用\
  \ Swift 5.5 中提供的 async/await 模式，适用于目标系统为 iOS 15 或 macOS 12 的应用程序。在撰写本书时，该实现仍处于测试阶段，并且由于操作系统版本要求，发布后只有有限的应用程序子集能够采用它。因此，本书不涵盖\
  \ async/await。\n\n\n\n## `XCTestCase` 生命周期\n\n关于 `XCTest` 在入门阶段还有一个值得了解的特性，尽管我强烈建议你除非万不得已，否则尽量不要使用它。`XCTestCase`\
  \ 提供了一些方法，用于在所有测试运行之前或每个测试之前运行代码，以及在所有测试运行之后或每个测试之后运行代码：\n\n```\nclass LifeCycleExampleTest:\
  \ XCTestCase {\n    override class func setUp() {\n        print(\"This runs before\
  \ all tests\")\n    }\n    override func setUpWithError() throws {\n        print(\"\
  This runs before each test\")\n    }\n    override func tearDownWithError() throws\
  \ {\n        print(\"This runs after each test\")\n    }\n    override class func\
  \ tearDown() {\n        print(\"This runs after all tests\")\n    }\n    func testA()\
  \ throws {\n        print(\"This is test A\")\n    }\n    func testB() throws {\n\
  \        print(\"This is test B\")\n    }\n}\n```\n\n这是运行 `LifeCycleExampleTest`\
  \ 后我们在控制台看到的输出：\n\n```\nTest Suite 'LifeCycleExampleTest' started at ...\nThis runs\
  \ before all tests\nTest Case '-[Tests.LifeCycleExampleTest testA]' started.\nThis\
  \ runs before each test\nThis is test A\nThis runs after each test\nTest Case '-[Tests.LifeCycleExampleTest\
  \ testA]' passed ...\nTest Case '-[Tests.LifeCycleExampleTest testB]' started.\n\
  This runs before each test\nThis is test B\nThis runs after each test\nTest Case\
  \ '-[Tests.LifeCycleExampleTest testB]' passed ...\nThis runs after all tests\n\
  Test Suite 'LifeCycleExampleTest' passed at ...\nExecuted 2 tests, with 0 failures\
  \ (0 unexpected) in 0.003 (0.003) seconds\n```\n\n随着代码变得越来越复杂，你可能会倾向于通过在 `setUp`\
  \ 方法中准备所需组件来简化测试，或者在测试运行后通过 `tearDown` 方法来清理应用状态。\n\n当你的测试设置变得复杂时，这其实是在向你发出信号：软件设计也正在变得复杂。在大多数情况下，使用\
  \ `setUp` 和 `tearDown` 并不是保持测试整洁的正确解决方案。\n\n更好的做法是退一步，简化你的设计。例如，将职责过多的对象拆分为两个，或者通过注入配置而不是依赖全局状态来实现。我将在本书中向你展示这些以及其他的技巧。\n\
  \n不过，我认为 `setUp` 和 `tearDown` 在两种情况下是有用的。第一种情况是，在为依赖于全局状态且在修改前没有测试的代码添加测试时。在这里，你应该在对代码进行任何修改之前添加测试，因此生命周期方法有助于开始编写测试。一旦测试就位，你就可以放心地进行重构，消除对全局状态的依赖以及挂钩测试生命周期的需要。\n\
  \n第二种适合使用 `setUp` 和 `tearDown` 的场景是 UI 测试。我们在引言中提到，UI 测试将应用视为一个黑盒：你无法访问单个组件，并且操纵应用的全局状态要困难得多。`setUp`\
  \ 和 `tearDown` 对于准备应用以执行某些 UI 测试，并在测试后清理其状态非常有用。\n\n`XCTest` 还有更多功能，例如跳过测试、定义执行上下文，或者在\
  \ Xcode 中定义多个测试计划，以在不同条件的组合下测试应用。不过，目前的理论知识已经足够了。\n\n现在你已经熟悉了这些工具，是时候使用它们了。在下一章中，我们将了解在\
  \ Swift 中使用 `XCTest` 进行测试驱动开发的基础知识。\n\n## 关键要点\n\n*   `XCTest` 是 Apple 提供的用于在 Swift\
  \ 中编写测试的框架。\n*   `XCTest` 中的测试是通过 `XCTestCase` 的子类创建的，方法名以 \"test\" 开头。\n*   `XCTest`\
  \ 提供了多种用于测试代码的断言函数，例如 `XCTAssertEqual`、`XCTAssertTrue` 和 `XCTAssertFalse`。\n*  \
  \ 使用 `XCTUnwrap` 来解包 `Optionals`；如果值为 `nil`，则测试将会失败。\n*   要测试异步代码，定义一个或多个 `XCTExpectation`，测试将等待它们，并在异步逻辑中调用它们的\
  \ `fulfill()` 方法。\n*   使用 `XCTAssertThrows` 测试会抛出错误的代码。\n*   使用 `setUpWithError`\
  \ 和 `tearDownWithError` 在每个测试之前或之后运行逻辑。请谨慎使用这些方法；尽量编写不需要额外设置或清理的测试。\n*   使用类方法 `setUp`\
  \ 和 `tearDown` 在所有测试运行之前或之后运行逻辑。同样要谨慎使用这些方法。\n\n"
- "# 3. 测试驱动开发入门\n\n在前面的章节中，我们讨论了使用测试来驱动代码设计的优势，以及如何使用 Apple 的 `XCTest` 框架编写测试。现在是时候看看测试驱动开发的具体例子了。\n\
  \n我们将学习如何通过编写测试然后使其通过的迭代过程来实现一段逻辑。我们将看到 TDD 如何让我们首先专注于让代码正确，然后再使其整洁。最后，我们将发现在 Swift\
  \ 这样的语言中，编译器如何补充驱动软件实现的反馈循环，以及如何利用这一点。\n\n测试驱动开发利用测试的反馈来指导生产代码的实现。\n\n如何开始这个过程？如何从测试开始，使用\
  \ `XCTest` 编写 Swift 代码？第一步是理解你需要实现的行为。\n\n让我们来看看来自 [exercism.io](https://exercism.io/)\
  \ 的这个问题，这是一个磨练你软件技能的好地方：\n\n*   编写一个函数，给定一个代表年份的整数，判断该年份是否为闰年。\n*   在公历中，闰年发生在所有能被\
  \ 4 整除的年份，除了所有能被 100 整除的年份，除非该年份同时也能被 400 整除。\n*   例如，2021 年不是闰年，但 2020 年是。1900\
  \ 年不是闰年，但 2000 年是。\n\n以下是该函数的一个虚拟版本，它可以编译但不包含任何必要的逻辑：\n\n```\nfunc isLeap(_ year:\
  \ Int) -> Bool {\n    return false\n}\n```\n\n我们可以编写什么样的测试来验证我们的代码实现了问题描述中的行为呢？\n\
  \n## 测试列表\n\n描述本身已经突出了行为细节，甚至提供了输入和输出的示例来验证：\n\n*   能被 4 整除的年份是闰年，例如 2020 年。\n*\
  \   能被 100 整除的年份不是闰年，例如 2100 年。\n*   能被 400 整除的年份是闰年，例如 2000 年。\n*   任何其他年份都不是闰年，例如\
  \ 2021 年。\n\n我们可以为每一项编写一个测试：\n\n```\nimport XCTest\nclass LeapYearTests: XCTestCase\
  \ {\n    func testEvenlyDivisibleBy4IsLeap() {}\n    func testEvenlyDivisibleBy100IsNotLeap()\
  \ {}\n    func testEvenlyDivisibleBy400IsLeap() {}\n    func testNotEvenlyDivisibleBy4Or400IsNotLeap()\
  \ {}\n}\n```\n\n注意，我只写了测试函数的名字，内部没有代码。这就是一个*测试列表*。\n\n编写测试列表是开始理解你正在处理的代码需要完成哪些不同细节的一种方式。\n\
  \n定义测试列表后的下一步是编写一个（且仅一个）测试。在 TDD 中，我们采用小步、增量式的方式进行，一次解决一个问题。这也适用于选择编写哪些测试以及如何编写它们。你希望尽快获得反馈。编写一个测试比编写所有测试要快。\n\
  \n\n\n## 伪装……直到成功\n\n你该从哪个测试开始？选择一个你认为能轻松通过的测试是个好主意。从最简单的测试入手，是另一种让反馈时间尽可能短的方法。\n\
  \n在本例中，所有测试在我看来难度相当，所以我会从第一个开始：\n\n```\nfunc testEvenlyDivisibleBy4IsLeap() {\n\
  XCTAssertTrue(isLeap(2020))\n}\nXCTAssertTrue failed\n```\n\n我们能让这个测试通过的最简单方法是什么？只需返回一个能让测试通过的值，稍后再处理实际实现：\n\
  \n```\nfunc isLeap(_ year: Int) -> Bool {\nreturn true\n}\n```\n\n这种返回硬编码值以使测试通过的技术被称为“伪装”。“伪装”让你在不确定实现细节时能轻松开始编写代码。先使用一个伪造的实现，这样你可以先运行一些测试，并从它们中学习。\n\
  \n对于`leapYear`这样实现简单的场景，“伪装”可能有些大材小用。如果脑中已经浮现出一个能让测试通过的明显实现方案，尽管直接写，无需先伪装。不过你可能会惊讶，“伪装”在很多情况下正是你突破困局、开始解决问题的关键。\n\
  \n借助这个伪造的实现，我们的测试现在变成了绿色。下一步是什么？\n\n既然我们已经通过绿色测试建立了基准，就可以着手实际实现了，只要保持测试通过，代码的正确性就有保障。另一方面，我们还有更多测试要写，所以在这种情况下，我会继续写下一个测试。\n\
  \n下一个值得编写的测试是针对不能被 4 整除的输入，也就是刚才那个测试的反面：\n\n```\nfunc testNotEvenlyDivisibleBy4Or400IsNotLeap()\
  \ {\nXCTAssertFalse(isLeap(2021))\n}\nXCTAssertFalse failed\n```\n\n我们现在已经到达无法再继续“伪装”实现的地步。再使用另一个硬编码值将无法同时通过两个测试：\n\
  \n```\nfunc isLeap(_ year: Int) -> Bool {\nreturn year % 4 == 0\n}\n```\n\n让我们继续下一个测试：\n\
  \n```\nfunc testEvenlyDivisibleBy100IsNotLeap() {\nXCTAssertFalse(isLeap(2100))\n\
  }\nXCTAssertFalse failed\n```\n\n我能想到让这个测试通过的最简单方法是添加一个守卫语句：\n\n```\nfunc isLeap(_\
  \ year: Int) -> Bool {\nguard year % 100 != 0 else { return false }\nreturn year\
  \ % 4 == 0\n}\n```\n\n我们只剩一个测试要写了：\n\n```\nfunc testEvenlyDivisibleBy400IsLeap()\
  \ {\nXCTAssertTrue(isLeap(2000))\n}\nXCTAssertTrue failed\n```\n\n和前文一样，我能想到的最简单方法还是一个守卫：\n\
  \n```\nfunc isLeap(_ year: Int) -> Bool {\nguard year % 400 != 0 else { return true\
  \ }\nguard year % 100 != 0 else { return false }\nreturn year % 4 == 0\n}\n```\n\
  \n我们所有的测试都通过了。现在有了一个完整的函数，用于判断给定年份是否为闰年。\n\n我们通过以下步骤达到了这个结果：编写一个测试，观察它失败，利用失败信息编写刚好能让测试通过的代码，然后对下一个测试重复这个过程。红色，绿色，红色，绿色，红色，绿色。\n\
  \n我们并没有给自己设定一步到位写出可用实现的高远目标。相反，我们利用测试的反馈，几乎一点一点地构建它，每次都编写尽可能简单的代码。\n\n通常，为了让测试通过，你编写的代码会相当丑陋。这没关系。记住：小步增量。先让代码工作，再让它变得整洁。\n\
  \n拥有测试，并且知道它们覆盖了代码的行为——因为你亲眼看到它们从红色变为绿色——能给你重构的自信。重构意味着在不影响行为的前提下改变代码的外观。重构是测试驱动开发（TDD）的核心部分。\n\
  \n在探讨重构如何融入工作流程之前，我先就测试的结构说几句。\n\n## 安排、执行、断言\n\n我们用于驱动闰年实现的测试都是一行代码。被测对象、其输入和输出，以及针对预期行为的断言，都整齐地放在一行中：\n\
  \n```\nfunc testEvenlyDivisibleBy4IsLeap() {\nXCTAssertTrue(isLeap(2020))\n}\n```\n\
  \n当被测行为不像一个接收一个输入并返回`Bool`的方法那么简单时，通过将测试显式分为三个阶段来组织测试会很有帮助：\n\n* **安排**：准备输入。\n\
  * **执行**：执行被测行为。\n* **断言**：验证输出是否符合预期。\n\n让我们按照“安排、执行、断言”重写上面的测试：\n\n```\nfunc testEvenlyDivisibleBy4IsLeap()\
  \ {\nlet year = 2020         // 安排\nlet leap = isLeap(year) // 执行\nXCTAssertTrue(leap)\
  \     // 断言\n}\n```\n\n清晰且一致地组织你的测试将有助于你浏览它们，因为所有测试都会呈现相同的结构。无论是寻找输入、被测试的方法，还是断言，都会更容易，因为它们总是位于测试中的相同位置。“万物各得其所”这句谚语不仅适用于你的家，也适用于你的代码库。\n\
  \n这三个阶段的另一种表述是“给定、当、则”。给定一个能被 4 整除的年份，当调用`isLeap(_:)`时，则结果为`true`。\n\n“给定、当、则”更适合高层次测试，比如那些着眼于完整用户旅程的\
  \ UI 测试：给定一个已认证用户，当加载设置页面时，则显示认证提示。由于本书专注于单元测试，我们将使用“安排、执行、断言”。\n\n现在我们已经学会了如何组织测试，让我们看看重构在测试驱动开发流程中的位置。\n\
  \n\n\n## 先让测试通过；再让代码整洁\n\n测试驱动开发（TDD）让你摆脱既要写出能工作的代码、又要写出整洁代码的双重心理负担。首先，测试会引导你写出能工作的代码；随后，它们又赋予你信心，让你能专注于让代码变得整洁。\n\
  \n假设你定义了一个如下的 `Product` 值类型：\n\n```\nstruct Product {\nlet category: String\nlet\
  \ price: Double\n}\n```\n\n你需要编写一个函数，该函数接收一个已售 `Product` 数组和一个类别值，并返回该类别的总销售额：\n\
  \n```\nfunc sumOf(_ products: [Product], withCategory category: String) -> Double\
  \ {\nreturn 0.0\n}\n```\n\n我们先把测试清单列出来：\n\n```\nimport XCTest\nclass SumOfProductsTests:\
  \ XCTestCase {\nfunc testSumOfEmptyArrayIsZero() {}\nfunc testSumOfOneItemIsItemPrice()\
  \ {}\nfunc testSumIsSumOfItemsPricesForGivenCategory() {}\n}\n```\n\n让我们从第一个测试开始：空数组的产品类别总和应该为零。像这样的行为*边界*案例通常更容易实现。在这种情况下，由于输入数组为空，我们知道实现过程涉及的逻辑会非常少，这给了我们一个机会来搭建行为框架，后续我们就能在此基础上构建完整的行为：\n\
  \n```\nfunc testSumOfEmptyArrayIsZero() {\nlet category = \"books\"\nlet products\
  \ = [Product]()\nlet sum = sumOf(products, withCategory: category)\nXCTAssertEqual(sum,\
  \ 0 )\n}\n```\n\n因为函数的实现很简单，返回了 `0`，所以测试已经通过了。我觉得没问题。我知道随着我们添加更多测试，它们会要求实现逻辑变得正确。\n\
  \n让我们通过处理另一个行为边界案例来逐步构建完整的实现：\n\n```\nfunc testSumOfOneItemIsItemPrice {\nlet category\
  \ = \"books\"\nlet products = [Product(category: category, price: 3)]\nlet sum =\
  \ sumOf(products, withCategory: category)\nXCTAssertEqual(sum, 3)\n}\nXCTAssertEqual\
  \ failed: (\"0.0\") is not equal to (\"3.0\")\n```\n\n这是我想到的第一个实现：\n\n```\nvar sum\
  \ = 0.0\nfor product in products {\nsum += product.price\n}\nreturn sum\n```\n\n\
  现在测试通过了。是时候问一个问题了：有没有更好的方式来写这段代码？\n\n我更喜欢集合操作，而不是 `for` 循环。这样看起来如何？\n\n```\nreturn\
  \ products.reduce(0.0) { $0 + $1.price }\n```\n\n测试仍然通过，并且我们不再需要定义一个 `var` 来在遍历数组时累加总和。\n\
  \n测试帮助我们确保代码实现上的改动没有影响其行为。这正是重构的定义：改变代码的编写方式，但不改变其行为。\n\n现在只剩下一个测试需要编写了，即针对函数主要用例的测试：\n\
  \n```\nfunc testSumIsSumOfItemsPricesForGivenCategory() {\nlet category = \"books\"\
  \nlet products = [\nProduct(category: category, price: 3),\nProduct(category: \"\
  movies\", price: 2),\nProduct(category: category, price: 1)\n]\nlet sum = sumOf(products,\
  \ withCategory: category)\nXCTAssertEqual(sum, 4)\n}\nXCTAssertEqual failed: (\"\
  6.0\") is not equal to (\"4.0\")\n```\n\n这个测试没有通过，因为我们没有逻辑来只选择与给定类别匹配的 `Product`：\n\
  \n```\nreturn products.reduce(0.0) {\nguard $1.category == category else { return\
  \ $0 }\nreturn $0 + $1.price\n}\n```\n\n使用这个更新后的实现，测试通过了；因此，实现是正确的。再次，让我们问一下：我们能改进它吗？\n\
  \n我喜欢代码只遍历数组一次的做法，但我更希望将过滤操作与求和操作分开：\n\n```\nreturn products\n.filter { $0.category\
  \ == category }\n.reduce(0.0) { $0 + $1.price }\n```\n\n我认为这样可读性更好；它清晰地表明：“给定一些商品，取出匹配某个类别的商品，然后合计它们的价格。”\n\
  \n我们又一次从红色状态（测试失败）过渡到了绿色状态（测试通过），然后重构了代码。\n\n**红色、绿色、重构。这就是 TDD 的咒语**。\n\n强迫自己写出能工作、优雅且没有重复的代码，比单独解决这些问题需要更多的精力。测试驱动开发为你提供了一种过程，让你能一次只全神贯注于一个问题。\n\
  \n这并非是说，如果你已经想到了更好的解决方案，却还要故意写出肮脏或次优的代码只是为了通过测试。写出你脑海中浮现的第一个实现，然后，一旦让测试变绿，问问自己是否还能改进代码。你会惊讶且高兴地发现，很多时候答案是肯定的。\n\
  \n我们已经看到，一个失败的测试既是对代码正确性的反馈机制，也是对下一步该实现什么的建议。在 Swift 中，我们可以利用另一个与失败测试同样强大的反馈机制：编译器。\n\
  \n## 编译器是 TDD 过程的一部分\n\n2014 年 Swift 的推出是苹果开发生态系统的一次重大革命。凭借其强类型系统，它背离了 Objective-C\
  \ 的动态本质。\n\n强类型系统消除了整类运行时类型不匹配的错误。如果你将一个函数修改为返回 `Array<String>` 而不是 `String`，它的所有调用者将无法编译，并报错“无法将类型\
  \ ‘`Array<String>`’ 的值转换为指定类型 ‘`String`’”。在动态语言中，应用程序仍会运行，直到它尝试对返回的数组值调用 `String`\
  \ 方法时才会失败。\n\n强类型还能帮助你使不一致的状态*无法被表示*。我最喜欢的例子是使用 `enum` 来表示相互排斥的状态，而不是为每个可能的值设置一组可为空的属性：\n\
  \n```\nlet responseValue: Value?\nlet responseError: Error?\n// 对比\nlet response:\
  \ Result\n```\n\n使用 `responseValue` 和 `responseError` 这对属性，你需要编写一个测试来确保如果一个为 `nil`，另一个有值，并且它们不同时为\
  \ `nil`。使用 `Result` 枚举则将这个测试转移到了类型系统层面。编译器强制了这种互斥关系；你无需为其编写测试。\n\n当你通过测试的视角来看待代码时，拥有一个强类型系统会让一整类测试变得多余。\n\
  \n在强类型语言中，TDD 既是测试驱动开发，也是*类型驱动*开发。编译器错误就像测试失败：它们针对代码的正确性给你反馈，并且你可以将测试编码进你的对象和函数的类型签名中。\n\
  \n让我们看看如何利用编译器来了解下一步该写什么代码，就像我们从阅读测试失败信息中得出的结论一样。\n\n\n\n## 理想化编码（Wishful Coding）\n\
  \n在`leapYear`练习中，我们在编写测试之前从一个虚拟函数实现开始。另一种不同的方法是仅在编译器错误提示我们需要某个函数时才编写它：\n\n```\n\
  import XCTest\nclass LeapYearTests: XCTestCase {\nfunc testEvenlyDivisibleBy4IsLeap()\
  \ {\nXCTAssertTrue(isLeap(4))\n// Compiler says: Cannot find 'isLeap' in scope\n\
  }\n}\n```\n\n编译器找不到与我们编写的签名匹配的函数。我们处于红色状态，只不过这次不是测试失败，而是编译器错误。与测试失败类似，编译器错误会提示接下来应该做什么才能进入绿色状态。如果编译器找不到名为`isLeap`的函数，那么我们就为它定义一个：\n\
  \n```\nfunc isLeap(_ year: Int) {}\n```\n\n现在编译器有了一个新的错误：\n\n```\nXCTAssertTrue(isLeap(4))\
  \ // Compiler says: Cannot convert value\n// of type '()' to expected argument\n\
  // type 'Bool`\n```\n\n`XCTAssertTrue`期望一个`Bool`值进行检查，但我们的`isLeap`函数当前没有返回任何内容，更准确地说，它返回`()`，也就是`Void`：\n\
  \n```\nfunc isLeap(_ year: Int) -> Bool {\nreturn true\n}\n```\n\n现在代码可以编译了，我们可以运行测试来验证实现是否正常工作。\n\
  \n我们在这里所做的是，在定义代码之前，先编写我们期望存在的代码，然后使用编译器错误作为指导来得出函数定义。这种技术称为**Wishful Coding（理想化编码）**。\n\
  \nWishful Coding 可能看起来是一个过于漫长的过程，尤其是对于像`leapYear`函数这样直接的代码。我是在倡导你应该*始终*使用这种方法吗？不，但我希望你了解这种技术。\n\
  \n下次当你为事先确定函数签名而感到困扰时，不妨在测试断言中编写你期望存在的代码，然后观察编译如何失败，并从这个错误开始着手解决。\n\n我鼓励你尝试这种方法，即使你感觉可能会慢一点。在拳击电影《洛奇\
  \ 3》中，阿波罗·克里德将悲伤而失落的洛奇带到游泳池，让他“锻炼并使用那些他从未意识到的肌肉”。洛奇一开始笨拙而缓慢，但最终在鼓舞人心的配乐中一圈又一圈地游泳，并最终夺回了他的冠军头衔。\n\
  \n像 Wishful Coding 和 Fake It 这样的技术就像是你未曾意识到的肌肉。你需要锻炼并强化它们，这样当需要使用它们的时候，它们就能随时投入行动。\n\
  \n既然我们已经了解了测试驱动开发的核心要素，现在是时候将它们应用到真实世界中了。在下一章中，我们将开始一个全新应用的测试驱动开发。\n\n## 关键要点\n\n\
  *   **测试列表**：开始列出你可能需要的所有测试，以验证你需要实现的代码的行为。\n\n*   **红、绿、重构**。一次只处理一个测试，编写测试，观察它因为该行为没有实现而失败，然后将失败作为指导，让测试通过。一旦测试通过，问问自己代码是否可以改进。\n\
  \n*   **TDD 让你先专注于让代码工作，然后再让其变得整洁**。分别处理每个任务比同时尝试两者更容易。测试给了你迭代实现的信心。\n\n*   **将测试分为三个阶段：安排、执行、断言**。清晰且一致地分离输入、被测行为以及对其输出的期望，可以减少阅读测试的认知负担。\n\
  \n*   **编译器错误也是一种反馈来源**。\n\n*   **Fake It（假实现）**。如果你不确定如何实现某些功能，先硬编码能让测试通过的值。一旦测试通过，你就可以有信心地处理真正的实现。\n\
  \n*   **Wishful Coding（理想化编码）**：如果你不确定如何定义函数或类型，先在测试中编写它的用法，然后将编译器的失败消息作为定义的起点。\n\
  \n"
- "# 4. 真实世界中的测试驱动开发\n\n*如何从使用测试驱动实现像前几章中那样小巧且独立的问题，过渡到构建一个完整的应用程序？*\n\n*通过取巧。与其将应用程序视为一个整体问题，不如将其分解为越来越小的问题。最终，你会达到一个规模，其中每个问题都是小巧且独立的。*\n\
  \n在本章中，我们将开始构建一个真实世界的应用程序，它将在本书中作为我们的实验场。我们将应用*分解问题并顺序解决*技术来识别初始功能集，并决定从哪一个开始。然后，我们将使用测试来驱动第一个核心功能，学习为什么要使用最严格的断言，以及为什么不应该让测试崩溃。\n\
  \n## 菜单点餐应用\n\nAlberto 是你当地意大利餐厅的老板，他雇佣你来构建他的新点餐应用。\n\n你们做的第一件事是定义最小可行功能集。在 1.0\
  \ 版本中，客户将能够浏览菜单、选择菜品、提交并支付订单。\n\n这个初始版本是最小且精简的，但仍有若干问题需要回答。以下是一些问题，在开发过程中可能还会出现更多：\n\
  \n*   菜单数据来自哪里？\n*   顾客如何构建他们的订单？\n*   他们如何付款？\n*   订单如何发送到厨房？\n*   如果出现错误会发生什么？\n\
  \n好消息是，你现在不需要回答所有这些问题！\n\n试图提前回答每个设计问题可能会妨碍架构的有效性。随着软件实现需要答案时，逐一处理每个决策，能让你有更多时间理解需求并发现项目的细微差别。随着你不断开发应用，你会对要解决的问题获得更多背景和经验。这能让你处于更有利的位置，做出最优的设计决策。\n\
  \n如果编写代码有助于产生指导应用设计的理解，那么你应该从编写哪些代码开始呢？\n\n## 从哪里开始？\n\n关于从何处开始构建应用，有几种选择。一种是从最难的事情开始，也就是你学习最多的地方。未知领域是项目风险的主要来源，因此提前处理它们有助于避免后续出现令人讨厌的意外。\n\
  \n你也可以从最容易的事情开始——也就是说，从你已经知道如何做的事情开始。这样做的好处是你能快速启动并建立开发过程的动力。\n\n另一种选择是从能够使后续工作成为可能的事情开始。在我们的应用中，显示菜单正好介于一个直接了当且涉及较少变动的任务，以及作为其他功能的前置条件之间；没有菜单，顾客就无法下单。\n\
  \n从显示菜单开始还有一个优势，那就是我们可以尽早向 Alberto 展示一些成果：一个不完整但可运行的应用版本来展示我们的进展。\n\n\n\n## 问题分解与顺序解决\n\
  \n践行测试驱动开发本身就是一种**分解**与**顺序性**的练习。你需要将方法需求分解为一系列测试，并逐一顺序执行。针对每个测试，你都要将**让测试通过**和**清理实现代码**这两个步骤分开。首先编写刚好能让状态变为绿色的必要代码，然后继续优化生产代码。\n\
  \n我将这种方法称为*问题分解与顺序解决*。这个策略具有分形特性；我们可以反复应用它，从宏观的应用整体架构，到微观的单个测试。上一节的设计决策列表，难道不就是构建应用这一高层级任务的分解视图吗？\n\
  \n让我们将“问题分解与顺序解决”应用于应用的起点——显示菜单。将其拆解为需要回答的核心问题：\n\n- 用户界面长什么样？\n- 数据从哪里来？\n- 数据在\
  \ UI 中如何组织？\n\n我们不需要立刻给这些问题一个最终答案。我们关心的是尽快构建出可用的东西，以便从过程中学习。\n\n*用户界面长什么样？* 先用标准\
  \ UI 就好；等我们奠定了坚实的功能核心后，再来打磨外观和交互。\n\n*数据从哪里来？* 远程 API（这样数据总是最新）？还是应用内打包的文件？为了显示数据，我们无需现在就决定数据来源：先用一个硬编码的列表即可。\n\
  \n*数据如何组织？* 我们首先仿照实体菜单的做法。菜品按类别分组：开胃菜、意面、饮品和甜品。\n\n通过暂时搁置 UI 和数据源的问题，我们可以完全专注于实现应用内数据组织的核心任务。\n\
  \n不要把推迟给这些问题最终答案的行为与懒惰混为一谈。通过简化问题，我们为自己设定了一个可实现的目标，并能在其上取得具体进展。这样我们就能尽早拿出成果与客户分享。\n\
  \nHenrik Kniberg 将这种方法称为[最早可测试/可用/可爱版](https://blog.crisp.se/2016/01/25/henrikkniberg/making-sense-of-mvp)。假设我们的任务是为用户构建一种高效的交通工具。更好的做法是从一块滑板开始，逐步迭代升级到电动汽车，而不是先造轮子、再造车架……我们可以更快地交付滑板而非汽车。人们可以用滑板移动；而一个孤零零的汽车轮子哪儿也去不了。\n\
  \n另外请注意，这些简化并不会限制系统，反而使其更灵活。通过暂缓决定数据来源，我们为所有可能性都留出了空间。\n\n经过这样的分解过程，我们现在有了“最早可测试版本”的规格：一个用标准列表视图显示按类别分组的硬编码菜单的应用。开始编码吧。\n\
  \n## 构建菜单\n\n假设我们的菜单数据是一个扁平的菜品数组。要按类别排序显示，我们需要一个函数：它接收一个菜品数组，返回一个分区数组，每个分区包含某个单一类别的所有项目。\n\
  \n这个行为是否存在边界情况？\n\n- 如果数组中的所有菜品都属于同一类别，则应当只有一个分区。\n- 如果输入数组为空，输出的分区数组也应为空。\n\n让我们在测试目标中创建一个新文件，并将这些需求转化为测试列表：\n\
  \n```swift\n// MenuGroupingTests.swift\n@testable import Albertos\nimport XCTest\n\
  \nclass MenuGroupingTests: XCTestCase {\n    func testMenuWithManyCategoriesReturnsOneSectionPerCategory()\
  \ {}\n    func testMenuWithOneCategoryReturnsOneSection() {}\n    func testEmptyMenuReturnsEmptySections()\
  \ {}\n}\n```\n\n我们应该从哪个测试开始？如前一章所述，一个有把握让它通过的测试是很好的起点。行为边界通常更简单；“空输入产生空输出”这个测试应该很直接。\n\
  \n从边界向内部推进，也让我们有机会先构建函数骨架，然后逐块铺设组成完整行为的砖块。\n\n我们应该从哪里开始编写测试呢？从行为实现后能通过的断言开始。在这个测试中，我们要断言分区数组为空：\n\
  \n```swift\nfunc testEmptyMenuReturnsEmptySections() {\n    // 准备输入：空菜单\n    //\
  \ 对被测系统执行操作，获取输出：分区数组\n    XCTAssertTrue(sections.isEmpty)\n}\n```\n\n`sections`\
  \ 从何而来？它是我们正在编写的函数的返回值：\n\n```swift\nfunc testEmptyMenuReturnsEmptySections() {\n\
  \    // 准备输入：空菜单\n    let sections = ???\n    XCTAssertTrue(sections.isEmpty)\n\
  }\n```\n\n返回 `sections` 的函数长什么样？它应该接收一个空数组作为输入，其作用是将扁平菜单按类别分组：\n\n```swift\nfunc\
  \ testEmptyMenuReturnsEmptySections() {\n    let menu = [MenuItem]()\n    let sections\
  \ = groupMenuByCategory(menu)\n    XCTAssertTrue(sections.isEmpty)\n}\n```\n\n此时测试已就绪，但无法编译：\n\
  \n```swift\nlet sections = groupMenuByCategory(menu) // 编译器报错：\n// 找不到作用域中的 'groupMenuByCategory'\n\
  ```\n\n编译器错误提示了我们下一步该做什么：需要定义 `groupMenuByCategory()`：\n\n```swift\nfunc groupMenuByCategory(_\
  \ menu: [MenuItem]) -> [MenuSection] {\n    return []\n}\n```\n\n在定义函数的同时，我们也写出了它涉及的类型名称，但由于尚未定义这些类型，代码仍然无法编译。\n\
  \n我使用了第 3 章介绍的*愿望驱动编程*技术，以便更清晰地展示完整的测试驱动流程。\n\n随着你对 TDD 越发熟练，你可以在测试之前就写出空的函数和类型定义，并利用\
  \ Xcode 的自动补全功能来略微提速。\n\n编译器报错：\n\n- 找不到作用域中的类型 `MenuItem`\n- 找不到作用域中的类型 `MenuSection`\n\
  \n让我们在应用目标中创建专用文件来定义这些类型：\n\n```swift\n// MenuItem.swift\nstruct MenuItem {}\n\n\
  // MenuSection.swift\nstruct MenuSection {}\n```\n\n现在代码可以编译了。使用 `Cmd U` 快捷键运行测试，你会看到它们通过了。\n\
  \n为什么我们没有给 `MenuItem` 或 `MenuSection` 添加任何属性？当然，这些类型需要属性才能有用，但我们应等到出现需要它们的测试时再添加。TDD\
  \ 推动你小步前进，尽快获得反馈，并且只写刚好够用的代码。\n\n写恰好足够的代码也是防止过度设计的绝佳护栏。因为我们在生产代码之前编写测试，并且只为当前应用所需的行为编写测试，最终的生产代码恰恰正是我们需要的，不多不少。\n\
  \n\n\n## 单元测试的严格断言与清晰断言\n\n继续从边界情况向内推进，下一个要处理的测试是：输入项全部来自同一类别：\n\n```swift\nfunc\
  \ testMenuWithOneCategoryReturnsOneSection() {\n    let menu = [???]\n    let sections\
  \ = groupMenuByCategory(menu)\n    XCTAssertEqual(sections.count, 1)\n}\n```\n\n\
  如何构建一个所有菜单项都属于同一类别的输入数组？在测试中，我们可以这样写：\n\n```swift\nlet menu = [\n    MenuItem(category:\
  \ \"pastas\"),\n    MenuItem(category: \"pastas\")\n]\n```\n\n但这段代码无法编译：\n\n```swift\n\
  let menu = [\n    MenuItem(category: \"pastas\"),         // Compiler says: Argument\
  \ passed to call\n    // that takes no arguments\n    MenuItem(category: \"pastas\"\
  )        // Compiler says: Argument passed to call\n    // that takes no arguments\n\
  ]\n```\n\n因为我们的`MenuItem`没有属性，编译器生成的初始化器不接受参数。我们可以通过定义所需的属性来让代码通过编译：\n\n```swift\n\
  struct MenuItem {\n    let category: String\n}\n```\n\n现在测试能够编译，但仍然是红色的。是时候第一次尝试返回`MenuSection`数组了。\n\
  \n这个测试的唯一要求是返回值包含一个元素。我们可以简单地使用所有输入的`MenuItem`来创建`MenuSection`数组，等到某个测试要求我们按类别分组时再考虑分组逻辑：\n\
  \n```swift\nfunc groupMenuByCategory(_ menu: [MenuItem]) -> [MenuSection] {\n  \
  \  guard menu.isEmpty == false else { return [] }\n    return [MenuSection()]\n\
  }\n```\n\n现在两个测试都通过了，但你可能会注意到当前行为中有些奇怪的地方：给定一个所有`MenuItem`都属于同一类别的输入数组，我们得到了一个只包含单个`MenuSection`的数组，但这个分段没有任何信息，因为该类型没有属性。从返回值中，我们只能知道输入项数大于零。\n\
  \n我们的目标是在从一个测试推进到下一个测试的过程中，逐步实现*可工作的*实现。目前我们做得还不够。我之所以让大家走到这一步，是因为我使用了不够严格的断言。\n\
  \n## 尽可能使用最严格的断言\n\n在审查单元测试时，一个有用的思维实验是：思考你是否能编写出虽然错误但依然能让测试通过的代码。如果你能做到，那么测试网络中就有了漏洞。\n\
  \n这正是我们目前所处的状态：从测试的角度看代码是正确的，但它并没有实现预期的行为——无论现阶段这个行为多么不完整。\n\n我们如何让测试更严格？给定我们提供的`[MenuItem]`输入，正确的`[MenuSection]`输出应该具有哪些属性？\n\
  \n返回的`MenuSection`应该包含输入`[MenuItem]`中的所有元素。正如我们刚才看到的，仅仅计算数组中的元素个数是不够的；我们还需要一种方法来比较分段中的`MenuItem`，确保它们全部出现在输出中。\n\
  \n我们需要为`MenuSection`添加一个`items: [MenuItem]`属性，并为`MenuItem`添加一个`name: String`属性。我们从一开始就知道需要这些属性，但现在才添加，因为我们终于有了一个可以验证它们的测试。\n\
  \n像往常一样，第一步是在测试中编写我们希望存在的代码：\n\n```swift\nfunc testMenuWithOneCategoryReturnsOneSection\
  \ throws {\n    let menu = [\n        MenuItem(category: \"pastas\", name: \"name\"\
  ),                  // Compiler says: Extra argument\n        // 'name' in call\n\
  \        MenuItem(category: \"pastas\", name: \"other name\"),                 \
  \ // Compiler says: Extra argument\n        // 'name' in call\n    ]\n    let sections\
  \ = groupMenuByCategory(menu)\n    XCTAssertEqual(sections.count, 1)\n    let section\
  \ = try XCTUnwrap(sections.first)\n    XCTAssertEqual(section.items.count, 2)  \
  \                             // Compiler says: Value of type 'MenuSection'\n  \
  \  // has no member 'items'\n    XCTAssertEqual(section.items.first, \"name\") \
  \                       // Compiler says: Value of type 'MenuSection'\n    // has\
  \ no member 'items'\n    XCTAssertEqual(section.items.last, \"other name\")    \
  \               // Compiler says: Value of type 'MenuSection'\n    // has no member\
  \ 'items'\n}\n```\n\n在处理编译器错误之前，我们先来看看测试中的断言。\n\n在检查`sections`只包含一个元素之后，我们使用`XCTUnwrap`来获取一个非可选引用，从而避免使用`?`后缀可选链式操作符访问其元素。更多关于`XCTUnwrap`的信息请参见第\
  \ 2 章。\n\n接下来，我们检查`section.items`是否包含两个元素，也就是说分段包含了输入中的所有元素。\n\n我们本可以就此打住，但为了确保结果不仅包含该类别*所有*的`MenuItem`，而且*只包含*这些菜单项，我们还通过比较它们的名称来验证分段中的项是否与输入一致。\n\
  \n要实现严格的检查，我们需要这两个断言。检查名称可以确保分段包含所有输入的`MenuItem`；检查数量可以确保分段*只包含*给定类别的输入`MenuItem`。\n\
  \n编译器错误都是因为值类型的定义中还没有这些新属性：\n\n```swift\n// MenuItem.swift\nstruct MenuItem {\n\
  \    let category: String\n    let name: String\n}\n\n// MenuSection.swift\nstruct\
  \ MenuSection {\n    let items: [MenuItem]\n}\n```\n\n这个更改之后，我们又遇到了一个新的编译器错误：\n\n\
  ```swift\nfunc groupMenuByCategory(_ menu: [MenuItem]) -> [MenuSection] {\n    guard\
  \ menu.isEmpty == false else { return [] }\n    return [MenuSection()]     // Compiler\
  \ says:     // Missing argument for parameter 'items' in call\n}\n```\n\n因为我们更新了`MenuSection`的定义，编译器生成的初始化器也发生了变化。让测试通过编译的最简单方法是返回一个空数组：\n\
  \n```swift\nreturn [MenuSection(items: [])]\n```\n\n现在我们的测试失败了，错误信息如下：\n\n```\n\
  XCTAssertEqual(section.items.count, 2)\n// XCTAssertEqual failed:     // (\"0\"\
  ) is not equal to (\"2\")\nXCTAssertEqual(section.items.first?.name, \"name\")\n\
  // XCTAssertEqual failed:     // (\"nil\") is not equal to (\"Optional(\"name\"\
  )\")\nXCTAssertEqual(section.items.last?.name, \"other name\")\n// XCTAssertEqual\
  \ failed:     // (\"nil\") is not equal to (\"Optional(\"other name\")\")\n```\n\
  \n为了完成这部分行为，只需将输入菜单作为`items`的值即可：\n\n```swift\nreturn [MenuSection(items: menu)]\n\
  ```\n\n现在我们回到了绿色状态；行为尚不完整，但我们知道它是正确的。\n\n断言的严格程度会影响测试的准确性，因此请记住尽可能深入地进行检查。\n\n##\
  \ 尽可能使用最清晰的断言\n\n在使用测试断言时，还要注意另一件事：使用哪种断言会影响测试失败信息的可理解性。\n\n考虑以下两个验证相同条件的断言：\n\n\
  ```swift\nXCTAssertTrue(sections.count == 1)\nXCTAssertEqual(sections.count, 1)\n\
  ```\n\n如果`sections`数组包含多个元素，第一个断言会失败并显示：\n\n```\nXCTAssertTrue failed\n```\n\n而第二个断言会失败并显示：\n\
  \n```\nXCTAssertEqual failed: (\"1\") is not equal to (\"2\")\n```\n\n你觉得哪一个更能体现出数组数量并非预期？\n\
  \n测试失败的方式是修复失败问题的起点。让测试失败信息越清晰，就越容易找到失败的原因。\n\n\n\n### 不要让测试崩溃\n\n我们只需要编写最后一个测试：针对主路径（happy\
  \ path）行为的测试。\n\n之前的测试帮助我们定义了最终行为的脚手架——即类型和方法签名构成。现在我们可以专注于核心逻辑本身了。\n\n任务是要验证：给定一个包含不同类别条目的数组，该函数应返回每个类别对应的一个分区。为此，我们可以采用与之前测试相同的方法：\n\
  \n```\nfunc testMenuWithManyCategoriesReturnsOneSectionPerCategory() {\nlet menu\
  \ = [\nMenuItem(category: \"pastas\", name: \"a pasta\"),\nMenuItem(category: \"\
  drinks\", name: \"a drink\"),\nMenuItem(category: \"pastas\", name: \"another pasta\"\
  ),\nMenuItem(category: \"desserts\", name: \"a dessert\"),\n]\nlet sections = groupMenuByCategory(menu)\n\
  XCTAssertEqual(sections.count, 3)\n// 我们如何验证每个类别都有一个分区？\n}\n```\n\n与之前的测试类似，仅仅断言\
  \ `sections.count` 等于 `3` 并不足以验证完整的行为。我们如何确保这三个 `MenuSection` 各自持有不同的类别？\n\n`MenuSection`\
  \ 之间如何区分？`MenuSection` 将用于在视图中渲染每个类别。它应该拥有一个保存类别名称的属性：\n\n```\nXCTAssertEqual(sections[0].category,\
  \ \"pastas\")                     // 编译器说：'MenuSection' 类型\n// 没有成员 'category'\n\
  XCTAssertEqual(sections[1].category, \"drinks\")                     // 编译器说：'MenuSection'\
  \ 类型\n// 没有成员 'category'\nXCTAssertEqual(sections[2].category, \"desserts\")   \
  \                // 编译器说：'MenuSection' 类型\n// 没有成员 'category'\n```\n\n我们是否还应该为每个分区的内容添加断言？这样做会让测试更加彻底，但考虑到我们在之前的测试中已经验证了给定类别的所有条目都属于该类别的分区，这感觉像是重复劳动。如果我们在处理最终实现部分时破坏了这一预期，那个测试会告诉我们。\n\
  \n编译器告诉我们，需要向 `MenuSection` 添加 `category`：\n\n```\nstruct MenuSection {\nlet category:\
  \ String\nlet items: [MenuItem]\n}\n```\n\n做了这个更改后，`groupMenuByCategory` 函数现在会编译失败：\n\
  \n```\nreturn [MenuSection(items: menu)]     // 编译器说：\n// 调用中缺少参数 'category'\n```\n\
  \n为了让编译通过，我们能做的最简单的事情就是放一个硬编码的值：\n\n```\nreturn [MenuSection(category: \"\", items:\
  \ menu)]\n```\n\n代码可以编译，但测试崩溃了：\n\n```\nXCTAssertEqual(sections.count, 3)\nXCTAssertEqual(sections[0].category,\
  \ \"pastas\")\nXCTAssertEqual(sections[1].category, \"drinks\")    // Xcode 说：\n\
  // Thread 1: Fatal error: Index out of range\nXCTAssertEqual(sections[2].category,\
  \ \"desserts\")\n```\n\n当我们的测试崩溃时，我们会丢失有价值的信息。我们目前的代码只返回了一个分区，所以当我们试图访问索引为 `1` 的对象时，程序崩溃，但\
  \ Xcode 并没有在 `section.count` 的断言上报告测试失败。虽然崩溃本身可以被视为测试失败，但关于失败的信息越多，就越容易解决它。\n\n\
  为了避免测试中出现索引越界崩溃，我喜欢添加这个用于安全下标访问的扩展：\n\n```\n// Collection+Safe.swift\nextension\
  \ Collection {\n/// 如果给定索引在范围内，则返回该索引处的元素，否则返回 nil。\nsubscript(safe index: Index)\
  \ -> Element? {\nreturn indices.contains(index) ? self[index] : nil\n}\n}\n```\n\
  \n使用安全下标后，如果索引超出范围，我们会得到 `nil`，这会使测试失败但不会崩溃：\n\n```\nXCTAssertEqual(sections.count,\
  \ 3)\n// XCTAssertEqual 失败：    // (\"1\") 不等于 (\"3\")\nXCTAssertEqual(sections[safe:\
  \ 0]?.category, \"pastas\")\n// XCTAssertEqual 失败：    // (\"Optional(\"\")\") 不等于\
  \ (\"Optional(\"pastas\")\")\nXCTAssertEqual(sections[safe: 1]?.category, \"drinks\"\
  )\n// XCTAssertEqual 失败：    // (\"nil\") 不等于 (\"Optional(\"drinks\")\")\nXCTAssertEqual(sections[safe:\
  \ 2]?.category, \"desserts\")\n// XCTAssertEqual 失败：    // (\"nil\") 不等于 (\"Optional(\"\
  desserts\")\")\n```\n\n测试失败告诉我们，我们的代码只返回了一个 `MenuSection`，并且 `category` 值错误。为了让测试通过，我们需要编写按类别将条目分组到分区的生产逻辑。\n\
  \n我们可以使用这个便捷的 `Dictionary` 初始化器，根据给定的标准对 `Array` 的元素进行分组：\n\n```\nDictionary(grouping:\
  \ menu, by: { $0.category })\n```\n\n一旦我们有了一个将 `MenuItem` 按 `category` 分组的字典，我们就可以将每个键值对转换成一个\
  \ `MenuSection`：\n\n```\nMenuSection(category: key, items: value)\n```\n\n`Dictionary`\
  \ 不保证其键的顺序，因此我们还需要为我们的分区强制执行一个顺序。\n\n很巧的是，Alberto 的菜单类别是按反向字母顺序排列的：starters, pastas,\
  \ drinks, desserts。我们可以暂时采用这个顺序；如果随着应用开发的推进，出现自定义排序策略的需求，我们到时再添加逻辑。\n\n整合起来\n\n\
  ```\nfunc groupMenuByCategory(_ menu: [MenuItem]) -> [MenuSection] {\nguard menu.isEmpty\
  \ == false else { return [] }\nreturn Dictionary(grouping: menu, by: { $0.category\
  \ })\n.map { key, value in             MenuSection(category: key, items: value)\
  \         }\n.sorted { $0.category > $1.category }\n}\n```\n\n\n\n### 测试命名约定\n\n\
  测试方法的名称应始终反映其验证的行为。由于我们引入了逆字母排序来优化这一行为，因此有必要更新测试名称：\n\n```\nfunc testMenuWithManyCategoriesReturnsAsManySectionsInReverseAlphabeticalOrder()\n\
  ```\n\n诚然，这是一个*很长的*方法名。命名是编程中最复杂的部分之一，测试也不例外。\n\n使用特定的测试名称能让控制台中的测试输出信息更丰富，有助于在\
  \ Xcode 之外（例如在持续集成服务中）进行检查。\n\nXCTest 缺乏对测试描述注释的支持，使得这些描述无法出现在测试输出中，这是一个遗憾。\n\n\
  折中方案是像苹果在 [XCTest 文档](https://developer.apple.com/documentation/xctest/defining_test_cases_and_test_methods)\
  \ 中提供的少数示例那样，使用不太具体的测试名称，并辅以文档注释：\n\n```\n/// 给定一个包含多个类别的菜单，按逆字母顺序返回相应数量的分区\nfunc\
  \ testMenuWithManyCategories()\n```\n\nSwift 文档注释与标准注释不同，因为它以 `///` 开头并支持 Markdown\
  \ 格式。生成文档的工具会查找以 `///` 开头的注释，而忽略以 `//` 开头的注释。\n\n苹果的做法牺牲了测试输出的清晰度，换取了更简洁的测试方法名称。\n\
  \n另一种选择是采用 Roy Osherove 在《单元测试的艺术》中推荐的流行约定，按照以下公式命名测试：\n\n```\n[工作单元名称]_[测试场景]_[预期行为]\n\
  ```\n\n需要注意的是，XCTest 需要 `test` 前缀来识别一个方法为要运行的测试，因此我们示例中的名称将变为：\n\n```\nfunc test_groupMenuByCategory_MenuWithManyCategories_ReturnsAsManySectionsInReverseAlphabeticalOrder()\n\
  ```\n\n这比我们刚开始的命名*还要长*！不过，下划线将名称分段，对某些读者来说更容易解析。如果你能接受混合驼峰命名法（`FooBar`）与蛇形命名法（`foo_bar`）的别扭感，这种命名约定可以帮助读者浏览你的测试。\n\
  \n还有一种选择是采用开源库 [Quick](https://github.com/Quick/Quick)，它提供了一个使用字符串描述测试方法的 DSL。附录\
  \ B 概述了如何使用 Quick 编写测试。\n\n我们刚刚讨论的每种方案都有其优点和权衡。每个方案可能非常适合某个项目，同时又不适合另一个项目。\n\n在团队中工作时，不同成员可能有不同的偏好风格，但关键是要选择一种并坚持使用。一致性消除了为了理解代码含义而去解析其结构的思维负担，让你的队友和未来的自己都能更快速理解代码。\n\
  \n在本书中，我们将继续使用纯驼峰命名法命名测试方法。这并非对这种风格的评判，而是为了保持测试代码和生成代码的一致性，从而减少我们学习过程中的额外负担。\n\n\
  ### 红、绿，别忘重构\n\n现在所有测试都通过了，但我们还没有完成。是时候考虑是否可以改进代码了。\n\n让我们看一下生产代码：\n\n```\nfunc\
  \ groupMenuByCategory(_ menu: [MenuItem]) -> [MenuSection] {\n    guard menu.isEmpty\
  \ == false else { return [] }\n    return Dictionary(grouping: menu, by: { $0.category\
  \ })\n        .map { key, value in MenuSection(category: key, items: value) }\n\
  \        .sorted { $0.category > $1.category }\n}\n```\n\n由于我们是在操作序列，因此无需在处理前检查输入是否为空。即使输入空数组，序列操作仍会运行，但不会进行任何实际处理，最终输出一个空数组。\n\
  \n以下是函数的最终版本：\n\n```\nfunc groupMenuByCategory(_ menu: [MenuItem]) -> [MenuSection]\
  \ {\n    return Dictionary(grouping: menu, by: { $0.category })\n        .map {\
  \ key, value in MenuSection(category: key, items: value) }\n        .sorted { $0.category\
  \ > $1.category }\n}\n```\n\n如果我们重新运行测试，它们仍然会通过。\n\n一旦你建立了单元测试的框架，尝试修改生产代码的实现细节就变得很容易：进行你想要尝试的修改，然后如果测试仍然通过，你就可以确信没有破坏任何东西。\n\
  \n现在我们拥有了一小段纯粹的业务逻辑核心，我们知道它能正常工作，因为在构建它的过程中，我们见证了测试从红色变为绿色。让我们把它和用户界面连接起来。\n\n##\
  \ 连接用户界面\n\n在 Apple 生态系统中构建应用时，有两种编写 UI 代码的选择：新兴的 SwiftUI 或更早的 UIKit、WatchKit 和\
  \ AppKit。你可以在两者之间混合使用，但在本书中，我们将只使用 SwiftUI。\n\nSwiftUI 仍然年轻——当我编写本章时，距离它在 WWDC 2019\
  \ 上推出还不到两年——但毫无疑问，它将成为我们未来构建用户界面的主要方式。\n\n我们将学习的测试策略也适用于较旧的框架。如果你想知道更多关于 TDD 和 UIKit\
  \ 的内容，请前往附录 C。\n\n没有直接的方式为 SwiftUI 视图编写单元测试。我们将在第 6 章和第 7 章了解更多关于为什么会出现这种情况，以及为什么我们不必为此担忧。\n\
  \n目前，我们只需要观察到生成视图内容的所有逻辑都已在 `groupMenuByCategory(_:)` 中定义。我们不需要测试来指导实现菜单视图，因为我们要做的只是在\
  \ SwiftUI 中描述布局，并将 `groupMenuByCategory(_:)` 的返回值传入。让视图不包含展示或行为逻辑，可以使它们更容易编写，并允许你使用\
  \ TDD 在其他地方构建这些逻辑。\n\n以下是视图的实现：\n\n```\n// MenuList.swift\nimport SwiftUI\nstruct\
  \ MenuList: View {\n    let sections: [MenuSection]\n    var body: some View {\n\
  \        List {\n            ForEach(sections) { section in\n                Section(header:\
  \ Text(section.category)) {\n                    ForEach(section.items) { item in\n\
  \                        Text(item.name)\n                    }\n              \
  \  }\n            }\n        }\n    }\n}\n```\n\n为了让 `MenuItem` 和 `MenuSection`\
  \ 能在 `ForEach` 中工作，我们需要让它们遵循 `Identifiable` 协议：\n\n```\n// MenuItem.swift\nextension\
  \ MenuItem: Identifiable {\n    var id: String { name }\n}\n// MenuSection.swift\n\
  extension MenuSection: Identifiable {\n    var id: String { category }\n}\n```\n\
  \n最后，我们可以在根 SwiftUI `App` 中将它们整合在一起：\n\n```\n// AlbertosApp.swift\nimport SwiftUI\n\
  \n@main\nstruct AlbertosApp: App {\n    var body: some Scene {\n        WindowGroup\
  \ {\n            NavigationView {\n                MenuList(sections: groupMenuByCategory(menu))\n\
  \                    .navigationTitle(\"Alberto's ![../images/501287_1_En_4_Chapter/501287_1_En_4_Figa_HTML.gif](img/501287_1_En_4_Figa_HTML.gif)\"\
  )\n            }\n        }\n    }\n}\n```\n\n```\n// 在第一次迭代中，菜单是一个硬编码的数组\nlet menu\
  \ = [\n    MenuItem(category: \"starters\", name: \"Caprese Salad\"),\n    MenuItem(category:\
  \ \"starters\", name: \"Arancini Balls\"),\n    MenuItem(category: \"pastas\", name:\
  \ \"Penne all'Arrabbiata\"),\n    MenuItem(category: \"pastas\", name: \"Spaghetti\
  \ Carbonara\"),\n    MenuItem(category: \"drinks\", name: \"Water\"),\n    MenuItem(category:\
  \ \"drinks\", name: \"Red Wine\"),\n    MenuItem(category: \"desserts\", name: \"\
  Tiramisù\"),\n    MenuItem(category: \"desserts\", name: \"Crema Catalana\"),\n\
  ]\n```\n\n在图 4-1 中，你可以看到 SwiftUI 代码在模拟器中的渲染效果。\n\n![../images/501287_1_En_4_Chapter/501287_1_En_4_Fig1_HTML.png](img/501287_1_En_4_Fig1_HTML.png)\n\
  \n图 4-1 使用了模拟数据的 SwiftUI 视图在 iPhone 模拟器中的渲染效果\n\n\n\n## 纯函数\n\n我们在本章及前一章中研究的函数有两个共同点：\n\
  \n1.  如果使用相同输入调用，每次都会返回相同结果。这是因为它们不会在调用间跟踪内部状态，也不会考虑任何外部状态（例如调用时的时间日期）。\n2.  它们没有副作用。无论你调用函数一次、两次还是从不调用，应用状态都不会改变。\n\
  \n具备这些特性的函数在数学意义上等同于函数。因此，我们称它们为*纯*函数。\n\n纯函数是你最好的朋友。因为它们的输出仅依赖于输入（特性 1），所以测试它们只需要一个能产生期望输出的输入。并且由于它们不会改变调用程序的自身状态（特性\
  \ 2），你可以在测试用例中无需进行任何状态管理的情况下使用它们（参见第[2]章(#501287_1_En_2_Chapter.xhtml)中的“`XCTestCase\
  \ 生命周期`”）。\n\n不幸的是，我们无法只使用纯函数构建整个应用。在某个时刻，我们不得不与有状态组件（如数据库或网络）进行交互。\n\n尽管如此，我们仍可以尝试将尽可能多的逻辑实现在纯函数中，并只使用一个薄薄的*非纯*层将它们粘合起来。先编写测试的压力恰恰会促使你这样做。\n\
  \n我们构建了一个可运行的应用，却从未在模拟器中启动过它，而是使用测试来获得更快的反馈。\n\n因为我们把问题分解成了小块，现在我们有了一个能独立运行的成果，尽管还远未完成。我们可以将其作为早期进展的标志与客户分享。这使我们能够像处理代码那样，加快与他们的反馈循环。\n\
  \n在下一章中，我们将研究一种技术，以保持测试的清洁和专注，并让我们能够轻松地迭代构成应用的各个类型。\n\n## 关键要点\n\n-   **分解问题并依次解决**：应用由功能构成；功能由协作的对象构成；对象由可独立审视的方法和类型构成。\n\
  \n-   **从边界情况开始构建行为**。这让你能够构建出支撑完整实现的基础。\n\n-   **在测试中使用尽可能严格和清晰的断言**。它们能为你提供更清晰的下一步构建方向指引，并使未来的测试失败分类变得更容易。\n\
  \n-   **不要让测试崩溃**。当测试崩溃时，你会丢失有价值的信息。使用`XCTUnwrap`和安全`Collection`下标访问等技术来避免崩溃。\n\n\
  -   **纯函数易于测试，因为它们没有外部依赖和副作用**。先编写测试有助于你以纯函数的思维进行思考。\n\n-   **保持 SwiftUI 层无行为**。将逻辑从\
  \ SwiftUI `View`中分离出来，以便你能利用更快的测试驱动反馈循环来对其进行处理和改进。\n\n"
- "# 5. 使用 Fixtures 变更测试\n\n*如何在修改生产代码的类型签名时，无需更新使用这些类型的测试？*\n\n*通过将测试与生产对象的初始化代码解耦。*\n\
  \n测试驱动开发承诺帮助开发者以稳定的节奏工作。为了实现这一点，仅先编写测试是不够的；我们需要像维护生产代码那样维护测试代码，使其保持灵活和易于操作。正如 Robert\
  \ C. Martin 在 *Clean Code: 敏捷软件工艺手册*中所说：\n\n- 测试代码和生产代码同等重要。它不是二等公民。它需要思考、设计和关怀。它必须像生产代码一样保持整洁。\n\
  \n本章介绍一种技术，它允许你更新生产类型的结构，而无需不断地返回并更新你的测试：*fixture*。\n\n我们将了解什么是 fixture，如何为我们的类型定义它们，以及这种方法如何帮助我们编写不仅更易于维护，而且更清晰的测试。\n\
  \n## 源码变更的隐藏成本\n\nAlberto 很高兴收到我们在前一章中构建的应用早期版本，并给出了一些反馈。对于他的菜单来说，一项重要的信息是显示哪些菜品是辣的。他不希望他的顾客因为不喜欢辣食而点了一道最终却无法享受的菜。¹\n\
  \nAlberto 希望在每个辛辣菜品旁边有一个视觉提示，就像他的纸质菜单一样。你同意从使用一个辣椒表情符号开始，![../images/501287_1_En_5_Chapter/501287_1_En_5_Figa_HTML.gif](img/501287_1_En_5_Figa_HTML.gif)。（当你无法接触到设计师或没有时间绘制图标时，表情符号是增添色彩和模拟图标的好方法。）\n\
  \n为了做出这一更改，你需要更新数据模型来跟踪`MenuItem`是否辛辣，并更新 UI 层为那些辛辣的菜品添加视觉提示。让我们先看看数据模型。我们将在下一章讨论视图。\n\
  \n我们可以像这样更新`MenuItem`以添加辛辣信息：\n\n```\n// MenuItem.swift\nstruct MenuItem {\n   \
  \ let name: String\n    let category: String\n    let spicy: Bool\n}\n```\n\n如果进行此更改，我们将遇到一堆编译失败，并显示如下错误：\n\
  \n```\nMenuItem(category: \"pastas\", name: \"name\")\n// 编译器说：调用中缺少参数 'spicy'\n\
  ```\n\n`MenuItem`中的新属性意味着编译器将生成一个新的初始化器，这使得我们之前使用的初始化器变得无效。\n\n要恢复到绿色状态，我们需要更新所有实例化`MenuItem`的调用点。这样做的工作量与实例化次数成正比：实例化越多，更新它们的工作量就越大。在生产代码中你可能没有很多更新要做，因为一个类型通常只被实例化几次，但在测试中，我们可能对`init`方法有数十次调用。\n\
  \n单元测试旨在节省开发者的时间；如果维护测试代码变成一项耗时的任务，测试驱动开发就会从提高生产力的最佳盟友变成最差的敌人。\n\n我们需要一种方法，将测试中创建值的方式与其实际的`init`解耦，这样我们就能在更新`init`时，无需总是修改测试中的所有初始化代码。\n\
  \n\n\n## 固定装置（Fixtures）\n\n为了降低更新 `MenuItem.init()` 的成本，我们可以让测试在一个集中的位置初始化它，这样每当它的结构发生变化时，我们只需更新一处代码。\n\
  \n我们可以在测试目标中扩展 `MenuItem`，提供一个静态方法供测试使用，以获取该类型的一个实例。这种方法被称为固定装置（fixture），由于我们在扩展中定义固定装置，这种技术被称为\
  \ *固定装置扩展（Fixture Extension）*：\n\n```\n// MenuItem+Fixture.swift\n@testable import\
  \ Albertos\nextension MenuItem {\nstatic func fixture(\ncategory: String = \"category\"\
  ,\nname: String = \"name\"\n) -> MenuItem {\nMenuItem(category: category, name:\
  \ name)\n}\n}\n```\n\n所有输入参数的默认值是降低测试套件维护成本的关键。\n\n当你添加一个新属性时，只需更新固定装置并提供一个默认值即可。你无需更新任何现有测试，并且在编写需要该属性的新测试时，你可以直接使用包含新属性的固定装置。当你删除一个属性时，唯一需要更新的测试是那些在调用固定装置时传入了该属性自定义值的测试。\n\
  \n我们可以像下面这样更新测试以使用固定装置：\n\n```\n// MenuGroupingTests.swift\nfunc testMenuWithOneCategoryReturnsOneSection()\
  \ throws {\nlet menu = [\nMenuItem.fixture(category: \"pastas\", name: \"name\"\
  ),\nMenuItem.fixture(category: \"pastas\", name: \"other name\"),\n]\nlet sections\
  \ = groupMenuByCategories(menu)\nXCTAssertEqual(sections.count, 1)\nlet section\
  \ = try XCTUnwrap(sections.first)\nXCTAssertEqual(section.items.count, 2)\nXCTAssertEqual(section.items.first,\
  \  \"name\")\nXCTAssertEqual(section.items.last, \"other name\")\n}\n```\n\n现在，要添加\
  \ `spicy` 属性，唯一需要修改的代码就在固定装置的定义中：\n\n```\n// MenuItem.swift\nstruct MenuItem {\n\
  let name: String\nlet category: String\nlet spicy: Bool\n}\n// MenuItem+Fixture.swift\n\
  extension MenuItem {\nstatic func fixture(\ncategory: String = \"category\",\nname:\
  \ String = \"name\",\nspicy: Bool = false,\n) -> MenuItem {\nMenuItem(\ncategory:\
  \ category,\nname: name,\nspicy: spicy\n)\n}\n}\n```\n\n## 固定装置（Fixtures）与便利初始化器（Convenience\
  \ Initializers）\n\n为什么要定义固定装置而不是带有默认值的便利初始化器？因为清晰性。\n\n当阅读 `let item = MenuItem.fixture(name:\
  \ \"a name\")` 时，这个实例携带了专为测试目的选择的默认值，这比阅读 `let item = MenuItem(name: \"a name\"\
  )` 要清晰得多。调用 `MenuItem(...)` 看起来像生产代码；而 `MenuItem.fixture(...)` 则是属于测试套件的内容。\n\n\
  让你的代码清晰易读具有巨大的投资回报：你只编写一次代码，但你和你的队友会阅读它很多次。这对于测试代码和生产代码同样适用。\n\n## 固定装置（Fixtures）使测试的行动者（Actors）更明确\n\
  \n一旦你建立了固定装置，就可以通过只关注那些真正影响被测行为的输入元素来编写更清晰的测试。\n\n让我们看看上一章中这个没有使用固定装置的测试：\n\n```\n\
  func testMenuWithManyCategoriesReturnsOneSectionPerCategoryInReverseAlphabeticalOrder()\
  \ {\nlet menu = [\nMenuItem(            category: \"pastas\", name: \"a pasta\"\
  , spicy: false        ),\nMenuItem(            category: \"drinks\", name: \"a drink\"\
  , spicy: false        ),\nMenuItem(            category: \"pastas\", name: \"another\
  \ pasta\", spicy: false        ),\nMenuItem(            category: \"desserts\",\
  \ name: \"a dessert\", spicy: false        ),\n]\nlet sections = groupMenuByCategories(menu)\n\
  XCTAssertEqual(sections.count, 3)\nXCTAssertEqual(sections[0].category,  \"pastas\"\
  )\nXCTAssertEqual(sections[1].category,  \"drinks\")\nXCTAssertEqual(sections[2].category,\
  \ \"desserts\")\n}\n```\n\n我们正在测试生成的分类（sections）是否与输入的类别（categories）匹配，并且是否按字母逆序排列。在输入的所有属性中，唯一影响输出的是\
  \ `category`。然而，我们准备输入代码时，却不得不为所有其他无关属性添加值。\n\n使用固定装置，我们可以去除这些噪声，使输入只关注真正重要的内容：\n\
  \n```\nlet menu = [\nMenuItem.fixture(category: \"pastas\"),\nMenuItem.fixture(category:\
  \ \"drinks\"),\nMenuItem.fixture(category: \"pastas\"),\nMenuItem.fixture(category:\
  \ \"dessert\")\n]\n```\n\n**额外提示**\n\n你可以通过定义数组类型，然后在调用函数时省略 `MenuItem` 来使代码更紧凑；Swift\
  \ 编译器会自行推断。\n\n```\nlet menu: [MenuItem] = [\n.fixture(category: \"pastas\"),\n\
  .fixture(category: \"drinks\"),\n.fixture(category: \"pastas\"),\n.fixture(category:\
  \ \"dessert\")\n]\n```\n\n除了使你的测试对读者更清晰，并消除修改源代码时的摩擦之外，固定装置还能在你编写测试本身时节省时间。你无需考虑与被测行为无关的属性的赋值，也无需输入它们。\n\
  \n## 固定装置（Fixtures）是可组合的\n\n你可以使用固定装置来定义新的固定装置。例如，下面展示了如何为 `MenuSection` 定义一个固定装置：\n\
  \n```\n// MenuSection+Fixture.swift\n@testable import Albertos\nextension MenuSection\
  \ {\nstatic func fixture(\ncategory: String = \"a category\",\nitems: [MenuItem]\
  \ = [.fixture()]\n) -> MenuSection {\nreturn MenuSection(category: category, items:\
  \ items)\n}\n}\n```\n\n## 尽早引入固定装置（Fixtures）\n\n引入固定装置就像为退休储蓄；由于复利效应，你开始得越早，获得的价值就越大。\n\
  \n为一个类型定义固定装置并将其应用于现有测试，短期内会拖慢你的速度，但当需要更改该类型的结构时，你很快就能弥补回来。\n\n*三次法则* 是决定何时引入固定装置的一个良好启发式方法。如果你已经在两个测试中调用了某个类型的\
  \ `init`，那么在调用第三个之前，就为它定义一个固定装置。\n\n## 练习时间\n\n为了亲身体验固定装置的价值，请为 `MenuItem` 添加新的属性。例如，在后续开发中，我们可能需要一个表示菜肴价格的属性。尝试添加它，并看看你需要在生产和测试代码中修改哪些部分：\n\
  \n```\n// MenuItem.swift\nstruct MenuItem {\nlet name: String\nlet category: String\n\
  let spicy: Bool\nlet price: Double\n}\n```\n\n## 要点总结\n\n*   **使用固定装置扩展（Fixture\
  \ Extension）来消除更新生产代码类型结构时的摩擦**。通过在测试中创建值的方式与其 `init` 之间增加一层间接性，当你编辑、添加或删除类型的属性时，将无需更新每一个测试调用点。\n\
  *   **固定装置帮助你将测试聚焦于关键的行动者（Actors）**。得益于其默认值，固定装置允许你省略那些不影响被测行为的 `init` 参数。\n*  \
  \ **固定装置是可组合的**。你可以将一个固定装置用作另一个固定装置某个属性的默认值。\n*   **尽早引入固定装置**。固定装置节省时间的效果会随着时间的推移而累积；你可以采用“三次法则”这个启发式方法来决定何时添加它们。\n\
  \n## 尾注\n\n1.  有人可能会争辩说，在开发的这个阶段，为辛辣食物添加 UI 提示并非最高优先级，我们应该专注于构建应用核心功能的骨架，例如网络 API\
  \ 和点单功能。绝对正确！然而，从学习如何通过测试驱动开发 iOS 应用程序的角度来看，在继续探讨更高级的主题之前，学习为生成 UI 数据的逻辑编写单元测试是非常有用的。\n\
  \n\n\n"
- "# 6. 测试静态 SwiftUI 视图\n\n*当没有直接的方法来测试 SwiftUI 视图时，你该如何在视图层运用测试驱动开发？*\n\n*通过将所有视图配置逻辑提取到一个专用对象中，并转而测试该对象。*\n\
  \nXcode 预览和手动测试并非确保视图行为正确的唯一途径。在本章中，我们将学习如何利用测试来指导我们实现视图行为。关键在于让视图变得*谦逊*，剥离所有逻辑，并让它向一个不绑定\
  \ SwiftUI 的对象询问显示内容，这样我们就能轻松地以测试优先的方式实现它。我们将这个对象称为 *ViewModel*，并探讨如何为我们的两个视图构建它。\n\
  \n## 视图层呈现逻辑的问题\n\n在上一章中，我们为 `MenuItem` 添加了一个 `spicy` 属性，以开始实现 Alberto 提出的视觉提示需求，用以标识哪些菜品是辣的。该功能\
  \ UI 的第一个迭代可以是一个简单的辣椒表情符号：![../images/501287_1_En_6_Chapter/501287_1_En_6_Figb_HTML.gif](img/501287_1_En_6_Figb_HTML.gif)。\n\
  \n我们可能会忍不住在现有的 `MenuList` 代码中添加所需的呈现逻辑，从而将\n\n```\nText(item.name)\n```\n\n改为\n\n\
  ```\nText(item.spicy ? \"\\(item.name) \U0001F336\" : item.name)\n```\n\n这种方法首先面临一个实际问题：将呈现逻辑嵌入视图层会迅速使其臃肿不堪，难以阅读。添加辣度指示符的代码虽然只有一行，但情况并非总是如此；有时可能需要处理一个枚举进行分支判断，或读取多个值。\n\
  \n即使你不介意臃肿的视图文件，测试这些代码也是问题。截至目前，苹果并未提供直接对 SwiftUI 视图编写单元测试的方法，而是鼓励开发者使用 Xcode 预览进行迭代。\n\
  \n预览虽然是了解布局效果的绝佳反馈机制，但无法像测试那样，以同等精细度告诉你逻辑是否正确。\n\n为 SwiftUI 视图编写测试并不方便，因为我们唯一能检查的出口是其*不透明*（[`opaque`](https://docs.swift.org/swift-book/LanguageGuide/OpaqueTypes.html)）的\
  \ `body` 属性。我们可以这样定义一个视图：\n\n```\nimport SwiftUI\nstruct ExampleView: View {\nvar\
  \ body: some View {\nVStack {\nText(\"Title\").bold()\nText(\"Subtitle\")\n}\n}\n\
  }\n```\n\n但在运行时访问 `body` 属性时，它实际上是一个非常复杂的对象：¹\n\n```\nVStack>(_tree: SwiftUI._VariadicView.Tree<SwiftUI._VStackLayout,\
  \ ...\n```\n\n这看似是一种限制，但该框架的声明式哲学使得使用者无需担心 `body` 的内容。\n\n“视图是状态的函数，而非事件的序列，”苹果的\
  \ SwiftUI 工程师 Luca Bernardi 在 WWDC 2019 的演讲 [*SwiftUI 中的数据流*](https://developer.apple.com/videos/play/wwdc2019/226/%253Ftime%253D589)\
  \ 中解释道。SwiftUI 的单向数据流架构意味着，开发者影响视图的唯一旋钮就是作为输入提供状态。\n\n编写测试来检查视图本身价值不大，因为 body 的运行时值是\
  \ SwiftUI 工作方式的实现细节。只要我们遵循框架的规则，就可以相信，如果为视图提供正确的状态，它就会按预期渲染在屏幕上。\n\n**SwiftUI 并未限制可测试性，反而增强了它！**\
  \ 它使应用 *划分问题并顺序解决* 变得既简单又安全。\n\n## 从视图实现中解耦呈现逻辑\n\n在上述内联方法中，`MenuList` 负责两件事：定义菜单行的布局，以及决定是否为每个菜品添加辣度指示符。它承担了两项职责，也即在解决两个问题。\n\
  \n布局定义是 SwiftUI 领域的问题；`MenuList` 是解决它的最佳位置。然而，评估是否添加 \U0001F336 符号的呈现逻辑没有理由与 SwiftUI\
  \ 框架绑定：我们可以独立构建它。\n\n让 `MenuList` 既负责定义布局又决定其内容，这会膨胀其“自我认知”。我们最好让它变得*谦逊*²，只处理它最擅长的事情：定义布局。\n\
  \n为了限制 `MenuList` 的野心，我们可以将决定其显示内容所需的逻辑提取到一个专用对象中，并使用 TDD 构建该对象。完成后，我们将让 `MenuList`\
  \ 向这个新组建询问显示内容。\n\n## 预备重构：缩小工作范围\n\n添加辣度提示是对单个菜单行级别的改动，但我们访问行的唯一途径是 `MenuList`。为了简化工作，让我们重构视图，隔离出需要处理的部分：\n\
  \n```\n// MenuList.swift\nimport SwiftUI\nstruct MenuList: View {\nlet sections:\
  \ [MenuSection]\nvar body: some View {\nList {\nForEach(sections) { section in\n\
  Section(header: Text(section.category)) {\nForEach(section.items) { item in\nMenuRow(item:\
  \ item)\n}\n}\n}\n}\n}\n}\n// MenuRow.swift\nimport SwiftUI\nstruct MenuRow: View\
  \ {\nlet item: MenuItem\nvar body: some View {\nText(item.name)\n}\n}\n```\n\n缩小代码作用范围使得推理和操作都更加容易。\n\
  \n由于我们目前还没有视图的测试，确认这次重构是否成功的唯一方法就是查看 Xcode 预览或启动应用。\n\n\n\n## ViewModel\n\n下一步，我们将为\
  \ `MenuRow` 编写一个测试，该测试针对一个用于承载展示逻辑的对象。我们应该如何称呼这个对象？\n\n`ViewModel` 是这类对象的一个常见名称。该术语源自\
  \ MVVM 模式，该模式用于构建 UI 应用程序，[由微软在 2005 年提出](https://docs.microsoft.com/en-us/archive/blogs/johngossman/introduction-to-modelviewviewmodel-pattern-for-building-wpf-apps)，它代表了“视图的模型，[...]\
  \ 是视图可用于数据绑定的模型的一种特殊化”。\n\n另一个可选名称是“展示模型”（Presentation Model），如同 [Martin Fowler\
  \ 所定义](https://martinfowler.com/eaaDev/PresentationModel.html)。我更倾向于使用 `ViewModel`，特别是考虑到\
  \ SwiftUI 提供的数据绑定能力——更多内容将在下一章中介绍。\n\n像往常一样，我们从测试列表开始：\n\n```\n// MenuRowViewModelTests.swift\n\
  @testable import Albertos\nimport XCTest\nclass MenuRowViewModelTests: XCTestCase\
  \ {\nfunc testWhenItemIsNotSpicyTextIsItemNameOnly() {}\nfunc testWhenItemIsSpicyTextIsItemNameWithChiliEmoji()\
  \ {}\n}\n```\n\n最应该先处理的最简单场景是什么？是那种我们无需做任何额外工作的场景：\n\n```\nfunc testWhenItemIsNotSpicyTextIsItemNameOnly()\
  \ {\nlet item = MenuItem.fixture(name: \"name\", spicy: false)\nlet viewModel =\
  \ MenuRow.ViewModel(item: item)\n// 编译器报错：         // Type 'MenuRow' has no member\
  \ 'ViewModel'\nXCTAssertEqual(viewModel.text, \"name\")\n}\n```\n\n编译器指出还没有 `ViewModel`\
  \ 类型。由于 `ViewModel` 与单个视图绑定，使用[嵌套类型](https://docs.swift.org/swift-book/LanguageGuide/NestedTypes.html)可以清晰地表明这种一对一关系。当然，使用独立的\
  \ `MenuRowViewModel` 也同样可行。\n\n当使用嵌套类型方法时，我们仍然应该将 `ViewModel` 放在一个专用文件中，以便在使用 Xcode\
  \ 的“快速打开”功能时更容易找到它：\n\n```\n// MenuRow.ViewModel.swift\nextension MenuRow {\nstruct\
  \ ViewModel {\nlet text: String\ninit(item: MenuItem) {\ntext = \"\"\n}\n}\n}\n\
  ```\n\n现在第一个测试可以编译，但由于我们将 `text` 值设置为空字符串而失败。\n\n让我们更新 `MenuRow.ViewModel init`\
  \ 来让测试通过，修改为：\n\n```\ninit(item: MenuItem) {\ntext = item.name\n}\n```\n\n现在，我们来为添加辣椒表情编写测试：\n\
  \n```\nfunc testWhenItemIsSpicyTextIsItemNameWithChiliEmoji() {\n    let item =\
  \ MenuItem.fixture(name: \"name\", spicy: true)\n    let viewModel = MenuRow.ViewModel(item:\
  \ item)\n    XCTAssertEqual(viewModel.text, \"name \U0001F336\")\n}\n```\n\n测试失败了。我们可以复用在章节开始时使用的三元运算符来让它通过，并完成实现：\n\
  \n```\ninit(item: MenuItem) {\n    text = item.spicy ? \"\\(item.name) \U0001F336\
  \" : item.name\n}\n```\n\n我们现在处于绿色通过状态。是否有任何可以重构的地方来改进实现？暂时想不出来，那么让我们继续将 `ViewModel`\
  \ 连接到它的视图。\n\n## 在视图中使用 ViewModel\n\n是时候更新 `body` 结果构建器来从 `ViewModel` 中读取数据了。这将使视图保持谦逊，将所有展示逻辑委托给它的\
  \ `ViewModel` 实例：\n\n```\n// MenuRow.swift\nstruct MenuRow: View {\nlet viewModel:\
  \ ViewModel\nvar body: some View {\nText(viewModel.text)\n}\n}\n// MenuList.swift\n\
  struct MenuList: View {\nlet sections: [MenuSection]\nvar body: some View {\nList\
  \ {\nForEach(sections) { section in\nSection(header: Text(section.category)) {\n\
  ForEach(section.items) { item in\nMenuRow(viewModel: .init(item: item))\n}\n}\n\
  }\n}\n}\n}\n```\n\n图 6-1 显示了带有辣度指示器的菜单列表。\n\n![../images/501287_1_En_6_Chapter/501287_1_En_6_Fig1_HTML.png](img/501287_1_En_6_Fig1_HTML.png)\n\
  \n**图 6-1** iPhone 模拟器中渲染的带有辣度指示器的菜单列表\n\n## 超越可测试性\n\n得益于 `MenuRow.ViewModel`，我们实现了条件逻辑，可以在隔离环境中、并在测试反馈的指导下向用户显示辣度的视觉提示。再次强调，我们只需要在实现过程的最后阶段运行应用程序，作为最终检查以确保所有内容都连接在一起。\n\
  \n视图本身仍然没有专用的测试，但其中不太可能出错。因为它没有行为，唯一可能出现的错误是读取了错误的 `ViewModel` 属性，这是一个相对容易发现的问题。\n\
  \n由于 `ViewModel` 已经就位，我们将来可以为 `MenuRow` 的任何新展示细节使用 TDD，而无需额外的设置成本。\n\n解耦还意味着我们可以轻松地调整\
  \ UI 布局，因为它已经精简，并且没有冗长的行为代码。\n\n将展示逻辑与布局实现分离，在团队协作时可以实现并行化。根据一个视图的规格说明，两名开发人员可以结对定义其\
  \ `ViewModel` 的属性，然后并排工作。一个可以使用 TDD 实现设置这些属性的展示逻辑，另一个可以使用反馈驱动的 Xcode 预览流程来定义 `View`\
  \ 布局。\n\n我们在 SwiftUI 视图和数据模型之间插入 `ViewModel` 所额外编写的代码，其价值会随着时间的推移而体现。类型是廉价的。在一个由许多高度内聚、松散耦合的小对象组成的代码库中工作，远比处理几个包含所有代码的大型组件要愉悦得多。\n\
  \n\n\n## ViewModel 无处不在！\n\n视图模型让我们能够将呈现逻辑与布局定义解耦。将逻辑放在独立对象中，使代码更易于测试和修改，因为它既不依赖\
  \ SwiftUI 的实现要求，也不依赖 UIKit 视图的生命周期。\n\n如果你的视图除了一对一显示模型对象的数据之外还有任何其他动作，就应该为其创建一个\
  \ `ViewModel`。\n\n我们知道菜单列表视图需要比加载静态分组列表更复杂的行为。在第 4 章分解最小可行功能集时，我们确定菜单可能来自文件或远程 API\
  \ 等来源。\n\n现在是重构 `MenuList` 以使用 `ViewModel` 的最佳时机。\n\n由于 `MenuList` 显示分组，其 `ViewModel`\
  \ 应负责生成这些分组。也就是说，`MenuList.ViewModel` 应该暴露一个 `sections` 属性供 `MenuList` 读取，就像 `MenuRow.ViewModel`\
  \ 为 `MenuRow` 暴露一个 `text` 属性一样。\n\n一种选择是将调用 `groupMenuByCategory` 的责任从 SwiftUI app\
  \ 的实现转移到 `MenuList.ViewModel`。我们可以更新该函数的现有测试，使其实例化一个视图模型并读取其 `section` 属性，并将测试从\
  \ `MenuGroupingTests` 重命名为 `MenuListViewModelTests`。\n\n另一种方法是将菜单分组逻辑移入一个专用对象，然后将其传递给\
  \ `MenuList.ViewModel`。这将简化测试 `ViewModel` 的工作：我们只需验证它使用了给定的对象来生成分组。\n\n还有一种方法，也是我想向你展示的，就是使用*函数注入*。由于函数是\
  \ Swift 中的一等公民，我们可以将它们用作其他函数的参数。这样，我们可以通过让 `ViewModel` 要求传入一个闭包来生成分组，从而构建一个与分组实现细节无关的\
  \ `ViewModel`。\n\n## 依赖注入\n\n在学习软件设计和测试时，最终都会遇到“依赖注入”（Dependency Injection，简称 DI）这个术语。它听起来可能令人生畏，但正如\
  \ James Shore [所说](http://www.jamesshore.com/v2/blog/2006/dependency-injection-demystified)，依赖注入是“一个价值\
  \ 5 美分的概念，却用了个 25 美元的词”。\n\n注入依赖关系，简单来说就是将依赖作为值传递给需要它们的对象或方法，而不是在对象或方法内部自行获取依赖。当一个组件明确要求其所有依赖时，它的接口就变得诚实，代码阅读者不会因为隐藏的副作用而感到意外。\n\
  \n虽然存在允许运行时依赖注入的框架，但它们带有相当大的配置开销，只有在少数情况下才值得投资。\n\n函数注入是 DI 的一种情况，其中依赖关系封装在单个函数中。\n\
  \n以下是利用函数注入编写测试的方法：\n\n```\n// MenuList.ViewModelTests.swift\n@testable import Albertos\n\
  import XCTest\n\nclass MenuListViewModelTests: XCTestCase {\n    func testCallsGivenGroupingFunction()\
  \ {\n        var called = false\n        let inputSections = [MenuSection.fixture()]\n\
  \        let spyClosure: ([MenuItem]) -> [MenuSection] = { items in\n          \
  \  called = true\n            return inputSections\n        }\n        let viewModel\
  \ = MenuList.ViewModel(menu: [.fixture()], menuGrouping: spyClosure)\n        let\
  \ sections = viewModel.sections\n        // 检查给定的闭包是否被调用\n        XCTAssertTrue(called)\n\
  \        // 检查返回值是否由闭包构建\n        XCTAssertEqual(sections, inputSections)\n    }\n\
  }\n```\n\n此测试通过使用“间谍”闭包来检查 `MenuList.ViewModel` 的行为。闭包在调用时设置一个标志并返回一个常量值。然后我们可以通过检查该标志变为\
  \ `true` 并且返回值来自该闭包，来断言 `ViewModel` 使用了该闭包生成分组。我们将在第 12 章中进一步讨论代码中的监视（spying）技术。\n\
  \n为了让 `XCTAssertEqual` 在 `[MenuSection]` 上生效，我们需要让 `MenuSection` 和 `MenuItem` 都遵循\
  \ `Equatable` 协议：\n\n```\n// MenuItem.swift\nextension MenuItem: Equatable {}\n\n\
  // MenuSection.swift\nextension MenuSection: Equatable {}\n```\n\n以下是使测试通过的 `MenuList.ViewModel`\
  \ 实现：\n\n```\n// MenuList.ViewModel.swift\nextension MenuList {\n    struct ViewModel\
  \ {\n        let sections: [MenuSection]\n\n        init(\n            menu: [MenuItem],\n\
  \            menuGrouping: @escaping ([MenuItem]) -> [MenuSection] = groupMenuByCategory\n\
  \        ) {\n            self.sections = menuGrouping(menu)\n        }\n    }\n\
  }\n```\n\n函数注入与 Swift 的默认参数值相结合，意味着生产代码中的调用者无需关心要为 `menuGrouping` 传递什么值。\n\n最后一步是更新\
  \ `MenuList` 以使用其 `ViewModel`，并更新 `AlbertosApp` 为 `MenuList` 提供一个 `ViewModel`：\n\
  \n```\n// MenuList.swift\nimport SwiftUI\n\nstruct MenuList: View {\n    let viewModel:\
  \ ViewModel\n\n    var body: some View {\n        List {\n            ForEach(viewModel.sections)\
  \ { section in\n                Section(header: Text(section.category)) {\n    \
  \                ForEach(section.items) { item in\n                        MenuRow(viewModel:\
  \ .init(item: item))\n                    }\n                }\n            }\n\
  \        }\n    }\n}\n\n// AlbertosApp.swift\n@main\nstruct AlbertosApp: App {\n\
  \    var body: some Scene {\n        WindowGroup {\n            NavigationView {\n\
  \                MenuList(viewModel: .init(menu: menu))\n                    .navigationTitle(\"\
  Alberto's ![../images/501287_1_En_6_Chapter/501287_1_En_6_Figa_HTML.gif](img/501287_1_En_6_Figa_HTML.gif)\"\
  )\n            }\n        }\n    }\n}\n```\n\n函数注入对于解耦需要协调不同行为的对象与这些行为的具体实现细节非常有用。ViewModel\
  \ 通常扮演这种协调角色；它们是视图与提供要显示数据的各种业务逻辑组件之间的*粘合剂*。\n\n这种方法现在看起来可能有点大材小用，但一旦 `MenuList.ViewModel`\
  \ 需要负责协调视图与数据加载逻辑，它就会派上用场。\n\n我们已经看到，使用 ViewModel 模式如何让我们能够将 SwiftUI 视图仅专注于布局，并让纯\
  \ Swift 对象负责呈现逻辑。由于 SwiftUI 视图是状态的函数，该框架与 TDD 完美契合。你通过测试优先的方式编写逻辑来提供输入，以保证其正确性，而\
  \ SwiftUI 则确保屏幕上的输出保持一致。\n\n本章中构建的 ViewModel 都是静态的，但实际情况并非总是如此。大多数应用程序从一个或多个来源加载数据并用其更新视图。数据和视图都会随时间变化。\n\
  \nApple 的 Combine 框架提供了优雅地管理随时间变化的数据流的工具，并与 SwiftUI 紧密集成。在下一章中，我们将了解如何演变我们的 ViewModel\
  \ 来处理应用状态的动态变化。\n\n## 关键要点\n\n- **视图不必同时负责决定*如何*显示数据和*显示什么*数据。** 它可以保持谦逊，只声明布局，同时将呈现逻辑委托出去。\n\
  - **使用 `ViewModel` 来容纳所有呈现逻辑。** 通过将其与 SwiftUI 实现分离，你可以像对待其他业务逻辑对象一样使用 TDD。\n- **让\
  \ `View` 询问 `ViewModel` 要显示什么。** 这使视图仅专注于布局，非常适合利用 Xcode 预览进行快速迭代。\n- **使用函数注入将非平凡行为与依赖它的组件隔离开来。**\
  \ 这让你可以将 `ViewModel` 仅用作协调层，从而更容易为其及其视图添加更多功能。\n- **许多各自只做一件事的独立对象，比少数做许多事且相互依赖的对象更容易处理。**\n\
  \n\n\n## 尾注\n\n1.  作为参考，这是通过 Xcode 控制台中 `lldb` 的 `po` 命令打印出的 `body` 完整内容：\n\n  \
  \  ```\n    ▿ VStack>\n    ▿ _tree : Tree>\n    ▿ root : _VStackLayout\n    ▿ alignment\
  \ : HorizontalAlignment\n    ▿ key : AlignmentKey\n    - bits : 140735441946104\n\
