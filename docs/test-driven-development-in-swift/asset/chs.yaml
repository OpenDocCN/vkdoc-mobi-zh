  \n图 13-2\n\n生产环境下的支付流程\n\n恭喜！您现在已完成 1.0.0-beta.1 版本。是时候与阿尔贝托和他的一些最忠实的客户分享，以供测试了。如果他们提出在正式发布前还需要实现一些最终调整，我也不会感到惊讶。\n\
  \nSwiftUI 是一个出色的框架，能以声明式方式构建应用的视图层，并且只需很少的工作即可使其与所需显示的数据保持同步。其不可变架构——视图是状态的函数，而非一系列事件——帮助我们将所有展示和行为逻辑隔离到专用对象中，并通过测试驱动开发（TDD）进行扩展。在本章中，我们看到了这样一个例子。我们将生成确认`警告框`和配置其回调的所有逻辑移入一个专用的\
  \ ViewModel，然后编写了一个轻薄的、谦逊的 SwiftUI 层来消费它。\n\n## 关键要点\n\n*   **每当需要条件逻辑来呈现视图时，应将其从\
  \ SwiftUI 层中提取出来**。这样您就可以使用 TDD 来实现它，以获得更快的反馈和更高的信心。\n*   **通过为警告框配置构建 ViewModel，您可以将其与\
  \ SwiftUI 解耦**。\n*   **`XCTNSPredicateExpectation` 对于测试没有回调的异步代码很有用，但性能较差**。考虑在同一个测试中使用谓词期望来批处理多个断言，或者如果测试中有多个此类断言，则采用\
  \ Nimble。\n\n## 使用 TDD 修复 Bug 和更改现有代码\n\n*如何应用测试驱动开发来更改现有代码的行为或修复 Bug？*\n\n*与编写新代码的方式相同：利用测试的反馈来确定需要做出的更改。*\n\
  \n在更新现有行为时，您可以先编辑其测试。相反，如果要修复 Bug，您首先编写一个重现该 Bug 的失败测试，然后通过使测试通过来修复它。\n\n\n\n##\
  \ 通过测试驱动修复 Bug\n\nBeta 测试者的早期反馈报告了应用中的一个 bug。提交订单后，客户仍然能看到“结账”按钮，这让他们不确定付款是否成功。\n\
  \n让我们通过在支付成功后清除存储在 `OrderController` 中的订单来修复这个 bug。我们应该从哪里开始？\n\n在 TDD 圈子里有句老话：“一个\
  \ bug 就是一个尚未编写的测试。”\n\n要使用 TDD 修复 bug，你首先要编写一个能复现该 bug 的失败测试。从那里开始，工作流程与我们一直在实践的完全相同。跟随测试失败来识别需要编写的代码，使其通过，从而修复\
  \ bug：\n\n```swift\n// OrderDetail.ViewModelTests .swift\n// ...\nfunc testWhenPaymentSucceedsDismissingTheAlertResetsTheOrder()\
  \ {\n    // 用有效的订单（包含商品的订单）安排输入状态\n    let orderController = OrderController()\n\
  \    orderController.addToOrder(item: .fixture())\n    let viewModel = OrderDetail.ViewModel(\n\
  \        orderController: orderController,\n        onAlertDismiss: {},\n      \
  \  paymentProcessor: PaymentProcessingStub(returning: .success(()))\n    )\n   \
  \ // 执行结账并等待其成功\n    let predicate = NSPredicate { _, _ in viewModel.alertToShow\
  \ != nil }\n    let expectation = XCTNSPredicateExpectation(predicate: predicate,\
  \ object: .none)\n    viewModel.checkout()\n    wait(for: [expectation], timeout:\
  \ timeoutForPredicateExpectations)\n    // 执行警报解除代码\n    viewModel.alertToShow?.buttonAction?()\n\
  \    // 验证订单已被重置\n    XCTAssertTrue(orderController.order.items.isEmpty)\n}\n```\n\
  \n如果你使用聚焦测试的快捷键 `Ctrl Cmd U` 运行此测试，你会看到它失败。\n\n为了使测试通过并修复 bug，我们需要让 `OrderController`\
  \ 在警报解除动作中重置其 order 属性：\n\n```swift\n// OrderController.swift\n// ...\nfunc resetOrder()\
  \ {\n    order = Order(items: [])\n}\n// OrderDetail.ViewModel.swift\n// ...\nfunc\
  \ checkout() {\n    paymentProcessor.process(order: orderController.order)\n   \
  \     .sink(\n            receiveCompletion: { [weak self] completion in\n     \
  \           // ...\n            },\n            receiveValue: { [weak self] _ in\n\
  \                guard let self = self else { return }\n                self.alertToShow\
  \ = Alert.ViewModel(\n                    title: \"\",\n                    message:\
  \ \"支付成功。您的食物很快就会送达。\",\n                    buttonText: \"好的\",\n             \
  \       buttonAction: {\n                        self.orderController.resetOrder()\n\
  \                        self.onAlertDismiss()\n                    }\n        \
  \        )\n            }\n        )\n        .store(in: &cancellables)\n}\n```\n\
  \n现在测试通过了，bug 已被修复。如果你运行应用程序并提交订单，你会看到在订单详情界面消失后，“您的订单”按钮显示一个空的订单。\n\n## 通过测试驱动修改现有代码\n\
  \n早期的测试者认为辣度指示器不清晰，因此你决定用火焰表情（![../images/501287_1_En_14_Chapter/501287_1_En_14_Figb_HTML.gif](img/501287_1_En_14_Figb_HTML.gif)）替换辣椒表情（![../images/501287_1_En_14_Chapter/501287_1_En_14_Figa_HTML.gif](img/501287_1_En_14_Figa_HTML.gif)）。我们如何利用测试来驱动代码库中的这一改动？\n\
  \n我们已经有一个关于辣度指示器行为的测试。测试是你代码预期行为的活文档。要修改现有行为，从修改其测试开始：\n\n*// MenuRow.ViewModelTests\
  \ .swift*\n*// ...*\n\n```swift\nfunc testWhenItemIsSpicyTextIsItemNameWithFireEmoji()\
  \ {\n    let item = MenuItem.fixture(name: \"name\", spicy: true)\n    let viewModel\
  \ = MenuRow.ViewModel(item: item)\n    XCTAssertEqual(viewModel.text, \"name ![../images/501287_1_En_14_Chapter/501287_1_En_14_Fige_HTML.gif](img/501287_1_En_14_Fige_HTML.gif)\"\
  )\n        // 测试失败，因为：\n        // XCTAssertEqual 失败: (\"name ![../images/501287_1_En_14_Chapter/501287_1_En_14_Figd_HTML.gif](img/501287_1_En_14_Figd_HTML.gif)\"\
  ) 不等于 (\"name ![../images/501287_1_En_14_Chapter/501287_1_En_14_Fige_HTML.gif](img/501287_1_En_14_Fige_HTML.gif)\"\
  )\n}\n```\n\n现在我们有一个针对更新行为的失败测试，可以跟随它的指引来实现改动：\n\n*// MenuRow.ViewModel.swift*\n\
  *// ...*\n\n```swift\ninit(item: MenuItem) {\n    text = item.spicy ? \"\\(item.name)\
  \ ![../images/501287_1_En_14_Chapter/501287_1_En_14_Figf_HTML.gif](img/501287_1_En_14_Figf_HTML.gif)\"\
  \ : item.name\n}\n```\n\n运行测试，你会看到它们通过了。\n\n通常情况下，软件开发意味着编辑现有代码，而不是编写新代码。这些简单的例子展示了持续实践\
  \ TDD 将如何帮助你维护不断成熟的代码库，以及当你从绿地开发转向既有代码库时如何应对。\n\n当你需要修复一个 bug 时，很可能存在一个现有测试，你可以复制并调整它以复现错误的运行行为。相反，如果你需要修改现有行为，那么只需查看它的测试。用新的预期结果更新断言，并观察它们如何失败。现有测试为你提供了修改行为的清晰起点。\n\
  \n当代码库和团队规模增长时，拥有一套测试套件作为探索工具极具价值。当你需要修改不熟悉的代码区域时，优先查看其测试：它们会指引你需要前往的方向。\n\n## 关键要点\n\
  \n* **TDD 不仅有助于编写新功能，还能帮助你维护现有代码。**\n* **要使用 TDD 修复 bug，先编写一个能复现它的测试，然后使其通过。**\n\
  * **要更新现有代码，请更新测试以断言新行为，然后跟随其反馈来实现它。**\n\n"
- '# 15. 使用假件保持测试隔离，使用傀儡保持测试清晰


  *当被测系统依赖全局状态时，如何保持测试隔离？*


  *通过将依赖项转移到内存中，使用假件测试双打。*


  *如何清晰区分哪些依赖影响被测试的行为，哪些不影响？*


  *通过使用一个不做任何事的傀儡测试双打来替换那些不影响行为的依赖项。*


  我们已经了解了测试双打，即被测系统依赖项的“测试专用等价物”，以及如何使用其中两种：存根控制被测系统的输入（第 8 章和第 10 章），间谍记录其对其他对象产生的影响效果（第
  12 章）。


  你可能偶尔还会用到另外两种测试双打。*假件* 用一个更简单的实现替换依赖项，并复现其行为。*傀儡* 提供一个不做任何事的实现来填充依赖项。在本章中，我们将学习如何使用它们以及何时使用。




  ## 假对象（Fake）：如何绕过缓慢或有状态的依赖


  假设你想要让订单在应用重启后依然保持，这样用户切换到其他应用且被系统回收时就不会丢失订单。为了保持示例简洁，我们使用 `UserDefaults` 作为存储层。


  第一步是为 `Order` 存储功能定义一个抽象，并让 `UserDefaults` 遵循该协议：


  ```

  // OrderStoring.swift

  protocol OrderStoring {

  func getOrder() -> Order

  func updateOrder(_ order: Order)

  }

  ```


  `UserDefaults` 如何实现 `OrderStoring` 协议的细节与我们此处要探讨的内容无关。你可以在本章的源码中找到可运行的版本。


  下一步是重构 `OrderController`，让它使用遵循 `OrderStoring` 协议的类型来读取和更新订单：


  ```

  // OrderController.swift

  import Combine

  import Foundation

  class OrderController: ObservableObject {

  @Published private(set) var order: Order

  private let orderStoring: OrderStoring

  init(orderStoring: OrderStoring = UserDefaults.standard) {

  self.orderStoring = orderStoring

  order = orderStoring.getOrder()

  }

  func isItemInOrder(_ item: MenuItem) -> Bool {

  return order.items.contains { $0 == item }

  }

  func addToOrder(item: MenuItem) {

  updateOrder(with: Order(items: order.items + [item]))

  }

  func removeFromOrder(item: MenuItem) {

  let items = order.items

  guard let indexToRemove = items.firstIndex(where: { $0.name == item.name }) else
  { return }

  let newItems = items.enumerated().compactMap { (index, element) -> MenuItem? in

  guard index == indexToRemove else { return element }

  return .none

  }

  updateOrder(with: Order(items: newItems))

  }

  func resetOrder() {

  updateOrder(with: Order(items: []))

  }

  private func updateOrder(with newOrder: Order) {

  orderStoring.updateOrder(newOrder)

  order = newOrder

  }

  }

  ```


  重构之后，你预期测试能够通过，但实际情况并非如此。不仅测试会失败，而且多次运行时会出现不同的失败结果。


  这些测试会执行生产代码，由于 `OrderController init` 中的默认值，生产代码使用了 `UserDefaults.standard`。


  `UserDefaults` 是一个存储组件：它是有状态的。当测试运行时，它们通过存储值来改变 `UserDefaults` 的状态，并且这些更改会在测试和应用程序启动之间持续存在。


  测试还从 `UserDefaults.standard` 读取数据，这意味着它们依赖于一个有状态的组件，并且不再孤立。而**假对象（Fake Test Double）**可以让我们打破这种依赖关系。


  我们可以为 `OrderStoring` 构建一个 Fake，它的行为类似于 `UserDefaults`，但不会在单个测试执行或应用程序启动之间持久化其更改。这样，我们就可以让测试再次变得孤立且无状态。让我们用一个
  Fake 来初始化 `OrderDetail.ViewModel`：


  ```

  // OrderStoringFake.swift

  @testable import Albertos

  class OrderStoringFake: OrderStoring {

  private var order: Order = Order(items: [])

  func getOrder() -> Order {

  return order

  }

  func updateOrder(_ order: Order) {

  self.order = order

  }

  }

  // OrderDetail.ViewModelTests.swift

  // ...

  class OrderDetailViewModelTests: XCTestCase {

  func testWhenCheckoutButtonTappedStartsPaymentProcessingFlow() {

  let orderController = OrderController(orderStoring: OrderStoringFake())

  // ...

  ```


  得益于 `OrderStoringFake`，每个测试现在都使用一个新的 `OrderStoring` 实例运行。测试是隔离的：一个测试对它的 `OrderStoringFake`
  所做的更改不会影响其他测试。


  我们可以通过在 `setUp` 和 `tearDown` 方法中重置其内容来解决 `UserDefaults` 的有状态问题，但这样做需要更多的工作，并且会使测试用例更长。此外，我们还需要在使用
  `OrderDetail.ViewModel` 的每个测试用例中重复编写 `setUp` 和 `tearDown` 框架。总的来说，使用 Fake 需要更少的代码和维护量。


  当依赖项速度缓慢时，Fake 也很有用。在第 10 章，我们使用了一个 Stub 来用恒定的 0.1 秒延迟替换不可预测的网络响应时间，并控制其发送的响应。类似地，我们的生产系统可能依赖缓慢或异步的计算，我们可以在测试中用更快的版本替换它们。


  ## 哑对象（Dummy）：如何提供测试所需但与行为无关的依赖


  ViewModel 这样的对象通常需要`协调`与其视图交互的不同组件。例如，`OrderDetail.ViewModel`负责定义视图要显示的内容、启动支付流程并对其结果做出反应。


  针对 `OrderDetail.ViewModel` 展示逻辑的测试需要一个遵循 `PaymentProcessing` 协议的实例来实例化 SUT，即使它们测试的输出不依赖于支付结果。


  使用我们到目前为止看到的任何 Test Double 都能让测试编译通过，但也可能误导读者认为该依赖与测试相关。使用 Spy 会造成混淆，因为我们设置了它却从未读取它的任何属性。使用
  Fake 或 Stub 则可能暗示该依赖提供了影响测试结果的间接输入：


  ```

  // OrderDetail.ViewModelTests.swift

  func testWhenOrderIsEmptyShouldNotShowTotalAmount() {

  let viewModel = OrderDetail.ViewModel(

  orderController: OrderController(

  orderStoring: OrderStoringFake()

  ),

  paymentProcessor: ???

  onAlertDismiss: {}

  )

  XCTAssertNil(viewModel.totalText)

  }

  ```


  我们如何能清楚地表明 `PaymentProcessing` 实例不会影响这些测试？使用一个什么都不做的 Test Double——即 **Dummy（哑对象）**：


  ```

  // PaymentProcessingDummy .swift

  @testable import Albertos

  import Combine

  class PaymentProcessingDummy: PaymentProcessing {

  func process(order: Order) -> AnyPublisher<Void, Error> {

  return Result.success(())

  .publisher

  .eraseToAnyPublisher()

  }

  }

  ```


  注意，这个 Dummy 的 `process(order:)` 实现中发布了一个 `Void` 值。我将 Dummy 定义为什么都不做的替身，但我们仍然需要编写它们使其能编译通过。在实现必须返回结果的
  Dummy 时，选择你能想到的最简单的代码。Dummy 仅作为占位符使用，因此它们提供什么输出并不重要。


  现在我们已经为 `PaymentProcessing` 构建了一个 Dummy，我们可以更新那些不直接依赖支付处理的测试，让它们使用它，例如：


  ```

  // OrderDetail.ViewModelTests.swift

  func testWhenOrderIsEmptyShouldNotShowTotalAmount() {

  let viewModel = OrderDetail.ViewModel(

  orderController: OrderController(

  orderStoring: OrderStoringFake()

  ),

  paymentProcessor: PaymentProcessingDummy(),

  onAlertDismiss: {}

  )

  XCTAssertNil(viewModel.totalText)

  }

  ```


  正如 Gerard Meszaros 在 [*xUnit Test Patterns*](http://xunitpatterns.com/) 中解释的那样，Dummy
  通过“省略构建真实对象所必需的不相关代码，并明确指出哪些对象和值不被 SUT 使用”来改进我们的测试。正如我们在第 4 章关于测试固件的讨论中提到的，一个测试越容易阅读和理解，就越容易使用。


  我们同样可以将 Dummy 的思想应用于 `onAlertDismiss` 值，以表明它也不会影响测试：


  ```

  // OrderDetail.ViewModelTests .swift

  // ...

  class OrderDetailViewModelTests: XCTestCase {

  let alertDismissDummy: () -> Void = {}

  // ...

  func testWhenOrderIsEmptyShouldNotShowTotalAmount() {

  let viewModel = OrderDetail.ViewModel(

  orderController: OrderController(

  orderStoring: OrderStoringFake()

  ),

  paymentProcessor: PaymentProcessingDummy(),

  onAlertDismiss: alertDismissDummy

  )

  XCTAssertNil(viewModel.totalText)

  }

  }

  ```


  将 Fake 和 Dummy 与 Stub 和 Spy 一起添加到你的 Test Double 工具箱中，以便为任何类型的行为编写测试。使用 Fake 来避免依赖全局状态和缓慢的计算，并使用
  Dummy 来明确那些是必需的但与测试无关的组件。




  '
- '# 当你需要使用 Fake 或 Dummy 时，可能并不会立刻显现出来，但对于实践 TDD 的开发者来说，这不成问题。迭代是测试驱动开发的核心。如果使用 Spy
  是你为了让测试能编译通过而最先想到的方法，那就放手去做；一旦测试通过，你会有时间退一步思考，看看其他测试替身是否更合适。


  ## 关键要点


  *   **着力保持测试套件的无状态、快速且简洁**。在 TDD 中，你在代码库的测试端花费的时间与在生产端一样多；测试套件内的工作越容易，效果就越好。


  *   **Fake 测试替身通过将依赖替换为简化版本来绕过有状态或耗时的计算**。使用 Fake 来保持测试的隔离性和快速性。


  *   **Dummy 测试替身将依赖替换为一个什么都不做的版本，以表明它不影响行为**。在测试中使用 Dummy 来明确那些代码构建所必需但对待测实际结果没有输入的依赖。


  '
- '# 16. 结论


  贯穿本书，我们使用测试驱动开发构建了一个功能完备的应用。我们在测试和编译器的反馈指导下，以小步快跑的方式前进。


  我们从一个展示静态内容的单一屏幕开始，通过迭代，最终打造出一个动态的订购应用：它可从后端进行配置，将支付处理委托给第三方服务，并在本地存储中持久化状态。


  在此过程中，我们学习了不同的 TDD 技术与方法。一切的基础是“红、绿、重构”工作流：从一个失败的测试开始，然后用你能想到的任何方式让它通过。最初的版本是否丑陋、非最优或直接复制粘贴并不重要，重要的是测试通过。不要害怕从硬编码值开始。*先造假，再实现（Fake
  It, Till You Make It）*。只有在测试变绿后，才着手消除重复，并将实现重构为令你自豪的代码。


  我们多次运用了“分解问题，逐一解决”的技术，以进行小规模迭代并缩短反馈循环。问题可以被拆解成更小的组件，我们可以一次专注于一个组件，隔离处理。缩小工作范围能让我们更专注，因为我们可以将整个问题保留在工作记忆中。每一次通过的测试和成功的重构都是一次小小的胜利。沿着测试列表一步步推进，能给你带来进步感和动力。


  我们学习了通过抽象让组件交互的价值，了解了依赖倒置原则，以及依赖注入——即让对象显式请求其依赖——是如何产生“诚实”的可测试代码的。


  应用依赖倒置和依赖注入使我们能够构建测试替身，以应对被测试系统并非纯函数的情况。


  我们可以使用 Stub 来控制依赖如何影响被测系统的行为，并使用 Spy 来处理依赖受被测系统影响的情况。Fake 将我们的测试与本地存储的状态性解耦，而 Dummy
  则清晰地表明某个必需的依赖对测试结果没有贡献。


  我们发现 SwiftUI 是 TDD 工作流的强大盟友。状态是唯一的真实来源，我们无法直接操作视图。这意味着我们可以完全专注于生成输入状态的业务逻辑，并相信框架会按指令渲染它。这形成了一个薄而谦逊的视图层，该视图层与一个从
  SwiftUI 中解耦出来的展示与行为层交互。我们可以快速迭代这两者：前者使用 Xcode Previews，后者使用测试。


  业务逻辑层的测试覆盖率接近 100%，因为我们为了构建它所编写的每一行代码都是由一个失败的测试驱动的。那些管理层强制设定测试覆盖率目标的团队，常常需要在功能完成后回头补充测试以达到目标；而我们无需任何额外努力就达到了这一点。


  拥有广泛的代码覆盖率非常棒，但这只是冰山一角。TDD 给予我们的远不止这些价值。


  ## 不仅仅是测试


  一旦你体会到为代码编写自动化测试的价值，首先编写单元测试就是下一个显而易见的步骤。它带给你信心和及时性，并让你免于为了验证测试而修改已完成的生产代码。


  测试驱动开发不仅仅是为你代码编写测试的一种有效方法。事实上，它最重要的好处并不在于测试覆盖率。无数开发者采用 TDD 是因为他们关心测试，而坚持使用它则是因为获得了设计质量和生产力的提升。


  ## TDD 与软件设计


  TDD 对我们编写代码的方式施加了一种有益的压力，这是一种自然选择，只让最简单的测试存活下来。


  正如我们在本书中看到的，从测试开始编写代码使得处理小组件和引入抽象成为必要。否则，测试将难以编写，反馈周期也会很慢。不断地问自己：“我怎样才能获得更快的反馈？”你将构建出由松耦合、高内聚组件构成的代码库。


  一个典型的例子：必须采用测试优先的方法处理 UI 代码，这迫使我们把布局声明与生成填充值的逻辑分离开。结果，我们得到了一个不含逻辑的精简 SwiftUI 层，可以轻松将其插入
  Previews。视图将其智能委托给它们的 `ViewModels`，后者代表了视图本身的抽象，并且我们对其实现了完全的代码覆盖。理论上，我们可以将 ViewModels
  插入不同的布局，甚至无需任何修改就能用它们来驱动一个命令行应用。


  使用 TDD 也帮助我们处理了不受我们控制的依赖，例如网络和第三方支付 SDK。为了测试与它们交互的代码而必须引入的抽象，产生了一个积极的副作用：使我们的设计模块化——我们可以替换网络或支付组件的实现，而无需触及应用的其余部分。


  模块化也使我们能够并行工作。一旦定义了抽象的 `protocol`，不同的团队成员就可以同时处理具体实现及其消费者。


  你*并不需要*测试驱动开发来做出优秀的软件设计选择。然而，**TDD 会引导你走向优秀的设计**。


  来自测试的实时反馈清晰地表明你是否走在正确的方向上。如果你发现为某些代码编写测试很麻烦，这是一个信号，表明这些代码在生产环境中也不会易于处理，是时候退一步重新审视设计了。




  ## 测试驱动开发（TDD）与生产力


  也许人们对测试驱动开发最大的怀疑之一是，它看起来会让编写代码变得更耗时。毕竟，你得先写测试，然后只写刚好能让测试通过的代码，接着再回头进行重构。直接编写最终实现，避免所有这些来回折腾，不是更快吗？


  当人们因为觉得 TDD 会降低编码速度而避开它时，他们最终会陷入一个*局部最优*的困境。他们以牺牲长期有效性为代价来优化短期生产力。是的，事后编写测试——或者根本不写测试——可能会更快，但随着时间的推移，在这样构建的代码库中工作会变得越来越耗时。


  测试驱动开发有助于在代码库体量和复杂性增长时保持敏捷性——尤其是在增长时——因为它能产生广泛测试覆盖和精心设计代码的双重效果。测试网络能帮助你在更改代码时，无需担心遗漏某个副作用而导致破坏应用的其他部分。基于测试反馈产生的模块化、定制化设计，使得代码易于更新、重构和替换实现。


  当你一次只通过一个测试时，你离稳定的绿灯状态总是一步之遥。你可以轻松地进行实验。如果某个方案行不通，抛弃最后一次改动，你就能回到安全状态。


  红绿重构工作流会将看似无法完成的大量工作，分解成一个个小模块。终点始终在望：一旦你让一个测试通过，你就有了一个可工作的成果，尽管它可能尚未完成。


  一旦你的代码进入绿灯状态，你就可以稍作休息，因为你知道你留下的是一个稳定的代码库，并且清楚地知道下一步该做什么——要么重构当前实现，要么进行列表中的下一个测试。当你的大脑知道代码能正常工作，并且知道清晰的下一步时，它就不会在后台浪费精力去担忧。用效率大师戴维·艾伦的话来说，你*关闭了一个开放式回路*。


  **测试驱动开发通过保持代码库的可塑性，并让你以可实现且有成就感的小步骤进行工作，从而帮助你保持高效。**


  ## TDD 与产品开发


  红绿重构；红绿重构；红绿重构。测试驱动开发是一个迭代过程。


  以这种方式工作，并不断问自己“这个我目前需要吗？”以及“让这个测试通过的最简单方法是什么？”，这种做法是具有感染力的。你会发现自己在越来越广泛的范围内应用`分解问题`和`顺序求解`的思维。


  从编写某个功能的代码放大到设计该功能本身，你将发现可以设计出一个简化版本来更快地实现和发布。这有双重好处：更早地向客户交付价值，并更快地了解工作系统。


  再放大一步，到产品设计层面，你会发现自己在安全的小步骤中开始迭代和实验，使用诸如纸面原型和 A/B 测试等工具，在投入昂贵的开发阶段之前收集数据并验证假设。


  再次声明，TDD 并不是这种产品开发方法的先决条件。尽管如此，**TDD 使以小周期思考和工作成为一种习惯**。它将你的工作流塑造成一个以收集反馈为最重要事项的模式。


  正如 Spotify 首席执行官丹尼尔·埃克在[一份股东报告](https://www.businesswire.com/news/home/20190731005324/en/Spotify-Technology-S.A.-Announces-Financial-Results-for-Second-Quarter-2019)中所写，“迭代速度将胜过迭代质量。”1
  在一个变化日益加速的世界里，知道如何快速行动以学习和调整你的路线，是一个获胜的优势。


  测试驱动开发有一个学习曲线。你可能不清楚要写什么测试，如何塑造代码接口以注入`Test Double`，或者如何从让测试通过的虚假实现过渡到真实实现。


  不要让这些阻碍你。


  任何向前迈进都比原地踏步要好。持续前进并纠正航向。如果你不知道从什么测试开始，那就先写一个初始化`SUT`并断言它不是`nil`的测试。一旦你有了那个测试，尝试添加另一个断言，看看它会把你引向何处。


  如果你持续应用我们共同见过的这个工作流，先写测试最终将成为你的第二天性。就像尼奥深入矩阵内部看到其代码源流一样，当你阅读代码的规格说明时，你就会开始看到测试你尚未编写的代码的方法。


  发现测试驱动开发加速了我作为软件工程师的成长。通过这本书，我希望我也能帮助你成长，激发你对编写干净代码并以小步迭代前进的兴趣。


  本书到此结束，但你的 TDD 之旅才刚刚开始。祝你玩得愉快！


