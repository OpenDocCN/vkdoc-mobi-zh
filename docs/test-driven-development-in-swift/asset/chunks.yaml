    "https://raw.githubusercontent.com/mokagio/tddinswift_fake_api/trunk/menu_response.json")!

    URLSession.shared

    .dataTaskPublisher(for: URLRequest(url: url))

    .map { $0.data }

    .decode(type: [MenuItem].self, decoder: JSONDecoder())

    .eraseToAnyPublisher()

    }

    }

    ```


    The test should now pass. I say *should* because there are a few factors that
    might make it fail.


    First of all, if the menu in the backend changes, the test will fail. For example,
    if Alberto adds a new dish, the expectation on the count will fail.'
  trans: '

    # 10. 测试网络代码


    *如何为与网络交互的代码编写测试？*


    *通过使用`Stub`规避网络交互，来模拟不同行为并避免不稳定的测试。*


    测试网络代码时常见的问题是网络既不可预测又缓慢，这会导致非确定性的测试——测试可能这次通过，下次就失败。


    在本章中，我们将学习如何运用*依赖反转原则*和*桩测试替身*技术，将代码与网络的现实限制解耦。


    远程菜单加载功能已接近完成。我们构建了一个能够在远程 API 数据传入时更新的视图，并使领域模型`Decodable`。现在是实现从网络加载数据的逻辑的时候了。我们将负责此功能的对象称为`MenuFetcher`。


    Apple 在 Foundation 框架中通过`URLSession`提供了一个先进且通用的网络调用系统，我们将用它来实现网络功能。我们还知道`MenuFetcher`必须遵循`MenuFetching`，这是我们在第
    7 章定义的抽象。该`protocol`是 ViewModel 与底层组件之间关于如何从远程资源获取菜单的契约。


    `MenuFetching`定义了我们需要实现的行为。当请求成功时，它应返回接收到的`Data`并转换为`[MenuItem]`。当请求失败时，它应传递接收到的错误。让我们根据这个规范为`MenuFetcher`编写测试列表：


    ```

    // MenuFetcherTests.swift

    @testable import Albertos

    import XCTest

    class MenuFetcherTests: XCTestCase {

    func testWhenRequestSucceedsPublishesDecodedMenuItems() {}

    func testWhenRequestFailsPublishesReceivedError() {}

    }

    ```


    这里一个自然的起点是使用`URLSession`直接调用远程 API，并断言结果符合我们的预期。


    在单元测试中直接访问网络是不可取的。这会导致测试缓慢且不稳定，并且难以覆盖所有不同场景。让我们看看原因以及应对方法。


    ## 为什么不应在单元测试中发起网络请求


    为了理解测试直接网络调用的局限性，让我们自己编写这样一个测试。


    到目前为止，我们在本书中对于大多数新代码都使用了愿望驱动编程。当你还不确定代码应采用何种形态时，愿望驱动编程有助于开始编写代码，但我们现在对 Combine
    已有足够了解，可以清晰地知道应使用的结构。让我们从`MenuFetcher`的不完整实现开始，这样我们就可以编写一个没有编译错误的完整测试：


    ```

    // MenuFetcher.swift

    import Combine

    class MenuFetcher: MenuFetching {

    func fetchMenu() -> AnyPublisher {

    return Future { $0(.success([])) }.eraseToAnyPublisher()

    }

    }

    ```


    获取请求返回一个 `AnyPublisher<[MenuItem], Error>`，它会发送异步更新。我们在第 7 章已经看到，可以通过使用`sink`订阅它，并使用`XCTestExpectation`等待新值来测试这类代码：


    ```

    // MenuFetcherTests.swift

    // ...

    func testWhenRequestSucceedsPublishesDecodeMenuItems() {

    let menuFetcher = MenuFetcher()

    let expectation = XCTestExpectation(description: "Publishes decoded [MenuItem]")

    menuFetcher.fetchMenu()

    .sink(

    receiveCompletion: { _ in },

    receiveValue: { items in

    // 如何测试 items 的值是否正确？

    expectation.fulfill()

    }

    )

    .store(in: &cancellables)

    wait(for: [expectation], timeout: 1)

    }

    ```


    编写这个测试引出一个问题：我们如何断言`MenuFetcher`发布了正确的值？


    由于数据来自远程 API，唯一知道期望值的方法就是查看远程数据。一旦我们知道后端保存了哪些值，就可以使用一些粗略的断言，例如，检查数量是否相同，以及第一个和最后一个元素是否匹配。


    你可以在[`https://github.com/mokagio/tddinswift_fake_api/`](https://github.com/mokagio/tddinswift_fake_api/)找到一个假
    API 版本。为了遵循小步前进、只编写必要代码的原则，这个假 API 实际上只是一个 JSON 文件的容器。菜单列表的端点不过是假响应静态 JSON 的 URL。


    从远程资源获取静态 JSON 是模拟与完整 API 后端交互的真实行为的绝佳方法：


    ```

    // MenuFetcherTests.swift

    // ...

    menuFetcher.fetchMenu()

    .sink(

    receiveCompletion: { _ in },

    receiveValue: { items in

    XCTAssertEqual(items.count, 42)

    XCTAssertEqual(items.first?.name, "spaghetti carbonara")

    XCTAssertEqual(items.last?.name, "pasta all''arrabbiata")            expectation.fulfill()

    }

    )

    ```


    在这种情况下使用较宽松的断言是可以的，因为我们在前一章已经为解码编写了全面的测试。如果不是这种情况，并且 JSON 解码逻辑并不简单，我会鼓励你至少检查数组中的一个元素是否具有其对应
    JSON 中的所有预期属性。


    使用`Cmd U`键盘快捷键运行测试将显示失败。这并不意外：我们的初始实现返回一个硬编码的空数组。


    让我们使用`URLSession`和 Combine 实现一个真正的网络调用：


    ```

    // MenuFetcher.swift

    import Combine

    import Foundation

    class MenuFetcher: MenuFetching {

    func fetchMenu() -> AnyPublisher {

    let url = URL(string:

    "https://raw.githubusercontent.com/mokagio/tddinswift_fake_api/trunk/menu_response.json")!

    URLSession.shared

    .dataTaskPublisher(for: URLRequest(url: url))

    .map { $0.data }

    .decode(type: [MenuItem].self, decoder: JSONDecoder())

    .eraseToAnyPublisher()

    }

    }

    ```


    现在测试应该通过了。我之所以说*应该*，是因为有几个因素可能导致它失败。


    首先，如果后端菜单发生变化，测试将会失败。例如，如果 Alberto 添加了一道新菜，那么关于数量的预期就会失败。

    '
- fmt: '# 根据变量值进行测试的局限


    **根据变量值进行测试会使你的单元测试变得不可预测，并且需要持续更新测试套件。** 为菜单设置专用 API 的全部意义在于简化更新过程；我们可以预期菜单在未来会多次变更。每次远程菜单发生变化时，测试都可能会失败。你可能正在开发一个新功能，却意外发现这个测试突然失败了。


    另一个导致此测试不可预测的因素是它对网络的依赖。API 可能因为连接质量差而响应缓慢，或者在没有互联网连接时完全不响应。如果发生这种情况，测试会失败，但原因是外部因素而非你的源代码。


    取决于你的连接质量，在`wait(for:, timeout:)`中使用的 1 秒可能不够，测试将会超时。你可能需要使用更长的时间间隔来使测试对慢速网络更健壮，但这会以测试套件运行缓慢为代价。


    即使使用更长的超时时间，你仍然容易受到其他网络故障的影响。要验证这一点，请从模拟器中删除应用程序以清除任何缓存值，通过关闭 Wi-Fi 或拔下以太网电缆断开
    Mac 的互联网连接，然后重新运行测试。测试将失败并显示：


    *   异步等待失败：超出 1 秒超时，存在未满足的期望：“发布已解码的 [MenuItem]。”


    **与网络交互会因响应时间的开销而拖慢你的单元测试**。测试驱动开发的优势之一是其快速的反馈循环，但从测试中执行真实的网络请求会降低其速度，使整个过程效率降低。


    即使你愿意忽略这些限制，当 API 请求失败时，你又该如何测试代码的行为呢？


    解决之道是应用*依赖反转原则*。


    ## 强制解包可选值


    你可能已经注意到，代码通过调用`URL(string:)`并传入一个硬编码值来获取 URL。`URL(string:)`返回一个`Optional`值，我们使用`!`后缀来[强制解包](https://docs.swift.org/swift-book/LanguageGuide/TheBasics.html%2523ID332)它。


    强制解包一个`Optional`是告诉 Swift 编译器我们相信其值在运行时永远不会是`none`的方式，从而避免使用`if let`或`guard let`手动解包的需求。


    通常最好避免强制解包：如果由于某种原因，该值在运行时为`none`，应用程序将会崩溃。最好多写几行代码来显式解包`Optional`，并处理它们没有值的情况。


    虽然避免强制解包是明智的做法，但这个`URL(string:)`调用只有在编写硬编码值的开发者犯错时才会返回`none`。正如 Chris Eidhof、Daniel
    Eggert 和 Florian Kugler[论证](https://www.objc.io/blog/2018/03/27/unwrapping-optionals/)的那样，这种强制解包的使用是一种通过让应用程序尽早崩溃来暴露程序员错误的有用方式。由于我们实践
    TDD，并且大部分代码都被测试覆盖，像这样的程序员错误导致崩溃而不被发现的可能性很小，因此我们可以在这些特定情况下放心使用强制解包。


    ## 如何将单元测试与网络解耦


    `MenuFetcher`依赖于`URLSession`来访问网络。正如我们在第 [7]( #501287_1_En_7_Chapter.xhtml )章中所见，高层组件不应依赖于低层组件；它们都应该依赖于抽象。这就是*依赖反转原则*。


    网络只是我们系统的另一个依赖。我们可以在`MenuFetcher`和`URLSession`之间放置一个抽象层，并构建一个*Stub 测试替身*来模拟网络提供给
    SUT 的间接输入。


    我们使用了`URLSession dataTaskPublisher(for:)`方法来执行网络请求，该方法返回一个`AnyPublisher<(Data,
    URLResponse), URLError>`。我们将要定义的抽象应该具有类似的签名，区别在于我们的业务逻辑不需要读取`URLResponse`：


    ```

    // NetworkFetching.swift

    import Combine

    import Foundation

    protocol NetworkFetching {

    func load(_ request: URLRequest) -> AnyPublisher

    }

    ```


    我们可以通过一个简洁的`extension`使`URLSession`符合`NetworkFetching`协议：


    ```

    // URLSession+NetworkFetching.swift

    import Combine

    import Foundation

    extension URLSession: NetworkFetching {

    func load(_ request: URLRequest) -> AnyPublisher {

    return dataTaskPublisher(for: request)

    .map { $0.data }

    .eraseToAnyPublisher()

    }

    }

    ```


    保持符合`protocol`的代码尽可能简单且不含自定义逻辑至关重要，因为我们不会对其进行测试。通过这样的实现，所有代码都不在我们的控制之下，因为它是 Apple
    的代码。测试`URLSession`不是我们的责任，我们可以相对确信它会始终按预期运行。[¹](#501287_1_En_10_Chapter.xhtml#Par1000)


    让我们应用 DIP 并重构`MenuFetcher`，使其依赖于`NetworkFetching`而不是直接调用`URLSession`：


    ```

    // MenuFetcher.swift

    import Combine

    import Foundation

    class MenuFetcher: MenuFetching {

    let networkFetching: NetworkFetching

    init(networkFetching: NetworkFetching = URLSession.shared) {

    self.networkFetching = networkFetching

    }

    func fetchMenu() -> AnyPublisher {

    let url = URL(string:

    "https://raw.githubusercontent.com/mokagio/tddinswift_fake_api/trunk/menu_response.json")!

    networkFetching

    .load(URLRequest(url: url))

    .decode(type: [MenuItem].self, decoder: JSONDecoder())

    .eraseToAnyPublisher()

    }

    }

    ```


    测试仍然通过了，但存在前面讨论过的注意事项和局限性。现在是时候为`NetworkFetching`构建一个*Stub*，并用它来模拟我们希望测试的不同行为了。'
  raw: '**Depending on live values makes your unit tests non-deterministic and will
    require constant updates to the suite**. The whole point of having a dedicated
    API for the menu is to make updating it easier; we can expect it to change many
    times in the future. Every time the remote menu changes, the test could fail.
    You might be working on a new feature and be surprised by this test failing out
    of the blue.


    Another factor that makes this test non-deterministic is the dependency on the
    network. The API might respond slowly because of a poor connection or not reply
    at all if there is no Internet available. If that happens, the test will fail,
    but the cause is outside your source code.


    Depending on your connection’s quality, the 1 second used in `wait(for:, timeout:)`
    might not be enough, and the test will time out. You might need to use a longer
    time interval to make the test robust against slow networks, but this comes at
    the cost of having a slow test suite.


    Even with a longer timeout, you are still susceptible to other network failures.
    To verify this, delete the app from your Simulator to remove any cached value,
    disconnect your Mac from the Internet by turning the Wi-Fi off or unplugging the
    Ethernet cable, and rerun the tests. The test will fail with


    *   Asynchronous wait failed: Exceeded timeout of 1 seconds, with unfulfilled
    expectations: “Publishes decoded [MenuItem].”


    **Interfacing** **with the network slows down your unit tests** with the overhead
    of its response time. One of the advantages of Test-Driven Development is its
    fast feedback cycle but performing real network requests from your tests slows
    it down, making the whole process less effective.


    Even if you’re willing to go past these limitations, how can you test the code’s
    behavior when the API request fails?


    The way forward is to apply the *Dependency Inversion Principle*.


    Force-Unwrapping Optionals


    You might have noticed the code obtains the URL by calling `URL(string:)` with
    a hardcoded value. `URL(string:)` returns an `Optional` value, and we use the
    `!` suffix to [force-unwrap](https://docs.swift.org/swift-book/LanguageGuide/TheBasics.html%2523ID332)
    it.


    Force-unwrapping an `Optional` is a way to tell the Swift compiler that we trust
    its value will never be `none` at runtime and bypass the need to manually unwrap
    it using `if let` or `guard let`.


    It’s usually best to avoid force-unwrapping: if by any chance the value turns
    out to be `none` at runtime, the app will crash. It’s better to write a few extra
    lines of code to explicitly unwrap `Optional`s and handle the case when they don’t
    have a value.


    While it’s wise to avoid force-unwrapping, this `URL(string:)` call would return
    `none` only if the developer who wrote the hardcoded value made a mistake. As
    Chris Eidhof, Daniel Eggert, and Florian Kugler [argue](https://www.objc.io/blog/2018/03/27/unwrapping-optionals/),
    this use of force-unwrapping is a useful way to expose programmer errors by making
    the application crash early. Since we practice TDD and most of our code is covered
    by tests, the chance of a crash caused by a programmer error like this one going
    unnoticed is slim, so we can confidently use force-unwrap in these particular
    cases.


    ## How to Decouple the Unit Tests from the Network


    `MenuFetcher` depends on `URLSession` to access the network. As we’ve seen in
    Chapter [7](#501287_1_En_7_Chapter.xhtml), high-level components should not depend
    on low-level ones; they should both depend on abstractions. That’s the *Dependency
    Inversion Principle*.


    The network is just another dependency of our system. We can place an abstraction
    layer between `MenuFetcher` and `URLSession` and build a *Stub Test Double* to
    simulate the indirect input the network provides to the SUT.


    We used the `URLSession dataTaskPublisher(for:)` method to perform the network
    request, which returns an `AnyPublisher<(Data, URLResponse), URLError>`. The abstraction
    we’ll define should have a similar signature, with the difference that our business
    logic doesn’t need to read the `URLResponse`:


    ```

    // NetworkFetching.swift

    import Combine

    import Foundation

    protocol NetworkFetching {

    func load(_ request: URLRequest) -> AnyPublisher

    }

    ```


    We can make `URLSession` conform to the `NetworkFetching` in a thin `extension`:


    ```

    // URLSession+NetworkFetching.swift

    import Combine

    import Foundation

    extension URLSession: NetworkFetching {

    func load(_ request: URLRequest) -> AnyPublisher {

    return dataTaskPublisher(for: request)

    .map { $0.data }

    .eraseToAnyPublisher()

    }

    }

    ```


    It’s crucial to keep the code conforming to the `protocol` as simple as possible
    and free from custom logic because we won’t be testing it. With an implementation
    like that, all the code is outside our control because it’s Apple code. It’s not
    our responsibility to test `URLSession`, and we can be relatively confident it
    will always behave as expected.[¹](#501287_1_En_10_Chapter.xhtml#Par1000)


    Let’s apply DIP and refactor `MenuFetcher` to depend on the `NetworkFetching`
    instead of calling `URLSession` directly:


    ```

    // MenuFetcher.swift

    import Combine

    import Foundation

    class MenuFetcher: MenuFetching {

    let networkFetching: NetworkFetching

    init(networkFetching: NetworkFetching = URLSession.shared) {

    self.networkFetching = networkFetching

    }

    func fetchMenu() -> AnyPublisher {

    let url = URL(string:

    "https://raw.githubusercontent.com/mokagio/tddinswift_fake_api/trunk/menu_response.json")!

    networkFetching

    .load(URLRequest(url: url))

    .decode(type: [MenuItem].self, decoder: JSONDecoder())

    .eraseToAnyPublisher()

    }

    }

    ```


    The tests are still passing, with the caveat and limitations discussed earlier.
    It’s now time to build a *Stub* for `NetworkFetching` and use it to simulate the
    different behaviors we want to test.'
