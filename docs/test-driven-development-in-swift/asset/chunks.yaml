    \ angels that kept me from falling: my children motivated and helped me unplug;\
    \ my wife patiently waited through all my \"I just need five more minutes.\"\n\
    \nMany thanks to the team at Apress for taking a chance on me as a first-time\
    \ author. In particular, thank you to Jessica Vakili: you’ve been patient and\
    \ helpful. I owe a lot to Luca Ferrari and Mattia Toso. More than a decade ago,\
    \ while attending Università degli Studi di Ferrara, they approached me to collaborate\
    \ on a startup idea. We ended up using Ruby on Rails, which is how I stumbled\
    \ upon Test-Driven Development. Also, thanks to Giulio Grillanda, Marco Bersani,\
    \ and Matteo Bonora, who joined us and made the dream come true. You’ve all been\
    \ incredible friends and supporters over the years – sorry for flying away and\
    \ leaving you a pair of hands short.\n\nSince 2014, I’ve been calling Melbourne,\
    \ Australia, my home. Here, I’ve been lucky to find a friendly and welcoming community\
    \ of like-minded folks with whom to share and sharpen ideas. Thanks to Aron Bury,\
    \ Audrey Tam, Matt Delves, Pete Goldsmith, Stew Gleadow, and the Itty Bitty Apps\
    \ crew for all the conversations and support and for being good friends. Special\
    \ thanks to Adam Johnson, Charlie Scheer, Martin Heroux, and Richard Moult for\
    \ the feedback on my early drafts and to Samuele Fiorini for the initial encouragement.\
    \ I also want to thank Chris Toomey and Steph Viccari, who keep sharing ideas\
    \ on testing week after week on The Bike Shed podcast, which is also where I heard\
    \ the beautiful “helpful pressure” analogy, and Ben Orenstein, from whom I learned\
    \ about the Mystery Guest pattern. Thank you to all those who deserve to be here,\
    \ but that, in my distraction, I forgot to mention.\n\nEchoing Lynne Truss in\
    \ *Eats, Shoots & Leaves*, I’d like to thank the learned copy and technical editors\
    \ who have attempted to sort out my writing and save me from embarrassment. Where\
    \ faults obstinately remain, they are mine alone. Thank you to everyone who ever\
    \ visited my blog, [`mokacoding.com`](https://mokacoding.com). Your feedback and\
    \ support keeps fueling my work.\n\nFinally, thank YOU, dear reader. Thank you\
    \ for deciding to pick up this book and share your valuable time with me.\n\n\
    # About the Author / About the Technical Reviewer\n\n# 1. Why Test-Driven Development?\n\
    \n## What Is a Test?\n\nThe Oxford English Dictionary defines the noun *test*\
    \ as: “*a procedure intended to establish the quality, performance, or reliability\
    \ of something, especially before it is taken into widespread use.*” In the context\
    \ of software development, we can adapt the definition to: “*a procedure intended\
    \ to establish the software quality, performance, or reliability, especially before\
    \ it is shipped to the users.*”\n\nTo test our software essentially means to run\
    \ it and verify it behaves as desired.\n\nTake this “Hello, world!” script, for\
    \ example:\n\n```\n#!/usr/bin/env xcrun swift\nfunc main() {\n    guard CommandLine.argc\
    \ > 1 else {\n        print(\"Hello, world!\")\n        return\n    }\n    print(\"\
    Hello, \\(CommandLine.arguments[1])!\")\n}\nmain()\n```\n\nA test for it could\
    \ be to run it with no input, `./hello_world.swift`, and check that it prints\
    \ “Hello, world!”. We can then run it with a specific input and verify it uses\
    \ it in the salutation. For example, `./hello_world.swift Ada` should print “Hello,\
    \ Ada!”.\n\nIn the same way, you can launch an iOS app in the Simulator and click\
    \ through its UI to check it behaves as you programmed it to. Or you can submit\
    \ data using a form in a web application and then check that the database contains\
    \ it.\n\nAll the preceding examples share a trait: someone has to exercise the\
    \ software and verify its behavior. They are *manual* tests.\n\nTo consistently\
    \ ship quality software on a schedule, manual testing is not enough.\n\n## Manual\
    \ Testing Is Inefficient\n\nWe can manually test a little script like `hello_world.swift`\
    \ thoroughly because of its narrow feature set, but real-world programs are not\
    \ as simple. Even in the smallest application, there are many possible code paths,\
    \ many permutations of inputs the code accepts, and steps a user can take within\
    \ the system. To test them all manually would take *a lot* of time.\n\nManual\
    \ testing is costly as well as time consuming. Regardless of who performs the\
    \ tests, whether it’s software or QA engineers, product owners, or a third-party\
    \ firm, real people have salaries to be paid. They also need time off to rest,\
    \ get sick, may forget things, and, inevitably, make mistakes.\n\nSkipping testing\
    \ to save time and money would be a terrible move, though. If we don’t test our\
    \ products before shipping them, the users will do it for us. That’s far from\
    \ ideal. While we might celebrate discovering a bug, a user would get frustrated\
    \ and possibly leave our product for a competitor.\n\nThere must be a way to test\
    \ our software to a high degree of confidence, fast, and without requiring humans\
    \ to do all the work."
