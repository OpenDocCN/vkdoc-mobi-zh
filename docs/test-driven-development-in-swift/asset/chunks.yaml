    func testMenuWithManyCategories()\n```\n\nSwift 文档注释与标准注释不同，因为它以 `///` 开头并支持 Markdown\
    \ 格式。生成文档的工具会查找以 `///` 开头的注释，而忽略以 `//` 开头的注释。\n\n苹果的做法牺牲了测试输出的清晰度，换取了更简洁的测试方法名称。\n\
    \n另一种选择是采用 Roy Osherove 在《单元测试的艺术》中推荐的流行约定，按照以下公式命名测试：\n\n```\n[工作单元名称]_[测试场景]_[预期行为]\n\
    ```\n\n需要注意的是，XCTest 需要 `test` 前缀来识别一个方法为要运行的测试，因此我们示例中的名称将变为：\n\n```\nfunc test_groupMenuByCategory_MenuWithManyCategories_ReturnsAsManySectionsInReverseAlphabeticalOrder()\n\
    ```\n\n这比我们刚开始的命名*还要长*！不过，下划线将名称分段，对某些读者来说更容易解析。如果你能接受混合驼峰命名法（`FooBar`）与蛇形命名法（`foo_bar`）的别扭感，这种命名约定可以帮助读者浏览你的测试。\n\
    \n还有一种选择是采用开源库 [Quick](https://github.com/Quick/Quick)，它提供了一个使用字符串描述测试方法的 DSL。附录\
    \ B 概述了如何使用 Quick 编写测试。\n\n我们刚刚讨论的每种方案都有其优点和权衡。每个方案可能非常适合某个项目，同时又不适合另一个项目。\n\n\
    在团队中工作时，不同成员可能有不同的偏好风格，但关键是要选择一种并坚持使用。一致性消除了为了理解代码含义而去解析其结构的思维负担，让你的队友和未来的自己都能更快速理解代码。\n\
    \n在本书中，我们将继续使用纯驼峰命名法命名测试方法。这并非对这种风格的评判，而是为了保持测试代码和生成代码的一致性，从而减少我们学习过程中的额外负担。\n\
    \n### 红、绿，别忘重构\n\n现在所有测试都通过了，但我们还没有完成。是时候考虑是否可以改进代码了。\n\n让我们看一下生产代码：\n\n```\n\
    func groupMenuByCategory(_ menu: [MenuItem]) -> [MenuSection] {\n    guard menu.isEmpty\
    \ == false else { return [] }\n    return Dictionary(grouping: menu, by: { $0.category\
    \ })\n        .map { key, value in MenuSection(category: key, items: value) }\n\
    \        .sorted { $0.category > $1.category }\n}\n```\n\n由于我们是在操作序列，因此无需在处理前检查输入是否为空。即使输入空数组，序列操作仍会运行，但不会进行任何实际处理，最终输出一个空数组。\n\
    \n以下是函数的最终版本：\n\n```\nfunc groupMenuByCategory(_ menu: [MenuItem]) -> [MenuSection]\
    \ {\n    return Dictionary(grouping: menu, by: { $0.category })\n        .map\
    \ { key, value in MenuSection(category: key, items: value) }\n        .sorted\
    \ { $0.category > $1.category }\n}\n```\n\n如果我们重新运行测试，它们仍然会通过。\n\n一旦你建立了单元测试的框架，尝试修改生产代码的实现细节就变得很容易：进行你想要尝试的修改，然后如果测试仍然通过，你就可以确信没有破坏任何东西。\n\
    \n现在我们拥有了一小段纯粹的业务逻辑核心，我们知道它能正常工作，因为在构建它的过程中，我们见证了测试从红色变为绿色。让我们把它和用户界面连接起来。\n\n\
    ## 连接用户界面\n\n在 Apple 生态系统中构建应用时，有两种编写 UI 代码的选择：新兴的 SwiftUI 或更早的 UIKit、WatchKit\
    \ 和 AppKit。你可以在两者之间混合使用，但在本书中，我们将只使用 SwiftUI。\n\nSwiftUI 仍然年轻——当我编写本章时，距离它在 WWDC\
    \ 2019 上推出还不到两年——但毫无疑问，它将成为我们未来构建用户界面的主要方式。\n\n我们将学习的测试策略也适用于较旧的框架。如果你想知道更多关于\
    \ TDD 和 UIKit 的内容，请前往附录 C。\n\n没有直接的方式为 SwiftUI 视图编写单元测试。我们将在第 6 章和第 7 章了解更多关于为什么会出现这种情况，以及为什么我们不必为此担忧。\n\
    \n目前，我们只需要观察到生成视图内容的所有逻辑都已在 `groupMenuByCategory(_:)` 中定义。我们不需要测试来指导实现菜单视图，因为我们要做的只是在\
    \ SwiftUI 中描述布局，并将 `groupMenuByCategory(_:)` 的返回值传入。让视图不包含展示或行为逻辑，可以使它们更容易编写，并允许你使用\
    \ TDD 在其他地方构建这些逻辑。\n\n以下是视图的实现：\n\n```\n// MenuList.swift\nimport SwiftUI\nstruct\
    \ MenuList: View {\n    let sections: [MenuSection]\n    var body: some View {\n\
    \        List {\n            ForEach(sections) { section in\n                Section(header:\
    \ Text(section.category)) {\n                    ForEach(section.items) { item\
    \ in\n                        Text(item.name)\n                    }\n       \
    \         }\n            }\n        }\n    }\n}\n```\n\n为了让 `MenuItem` 和 `MenuSection`\
    \ 能在 `ForEach` 中工作，我们需要让它们遵循 `Identifiable` 协议：\n\n```\n// MenuItem.swift\nextension\
    \ MenuItem: Identifiable {\n    var id: String { name }\n}\n// MenuSection.swift\n\
    extension MenuSection: Identifiable {\n    var id: String { category }\n}\n```\n\
    \n最后，我们可以在根 SwiftUI `App` 中将它们整合在一起：\n\n```\n// AlbertosApp.swift\nimport SwiftUI\n\
    \n@main\nstruct AlbertosApp: App {\n    var body: some Scene {\n        WindowGroup\
    \ {\n            NavigationView {\n                MenuList(sections: groupMenuByCategory(menu))\n\
    \                    .navigationTitle(\"Alberto's ![../images/501287_1_En_4_Chapter/501287_1_En_4_Figa_HTML.gif](img/501287_1_En_4_Figa_HTML.gif)\"\
    )\n            }\n        }\n    }\n}\n```\n\n```\n// 在第一次迭代中，菜单是一个硬编码的数组\nlet\
    \ menu = [\n    MenuItem(category: \"starters\", name: \"Caprese Salad\"),\n \
    \   MenuItem(category: \"starters\", name: \"Arancini Balls\"),\n    MenuItem(category:\
    \ \"pastas\", name: \"Penne all'Arrabbiata\"),\n    MenuItem(category: \"pastas\"\
    , name: \"Spaghetti Carbonara\"),\n    MenuItem(category: \"drinks\", name: \"\
    Water\"),\n    MenuItem(category: \"drinks\", name: \"Red Wine\"),\n    MenuItem(category:\
    \ \"desserts\", name: \"Tiramisù\"),\n    MenuItem(category: \"desserts\", name:\
    \ \"Crema Catalana\"),\n]\n```\n\n在图 4-1 中，你可以看到 SwiftUI 代码在模拟器中的渲染效果。\n\n![../images/501287_1_En_4_Chapter/501287_1_En_4_Fig1_HTML.png](img/501287_1_En_4_Fig1_HTML.png)\n\
    \n图 4-1 使用了模拟数据的 SwiftUI 视图在 iPhone 模拟器中的渲染效果\n"
- fmt: "# Pure Functions\n\nThe functions we worked on in this and the previous chapter\
    \ have two things in common:\n\n1. If called with the same inputs, they return\
    \ the same result every time. That’s because they don’t track internal state between\
    \ calls, nor do they take into account any external state (e.g., the date at the\
    \ time of calling).\n2. They have no side effects. There is no change in the app\
    \ state whether you call the function once, twice, or never.\n\nFunctions with\
    \ these properties equate to functions in the mathematical sense. As such, we\
    \ call them *pure* functions.\n\nPure functions are your best friends. Because\
    \ their output depends only on their input (property 1), a test for them requires\
    \ only an input that will produce your desired output. And because they don’t\
    \ alter the state of the program that calls them (property 2), you can exercise\
    \ them without having to do any state management in the test case (see “`XCTestCase\
    \ Life Cycle`” in Chapter [2](#501287_1_En_2_Chapter.xhtml)).\n\nUnfortunately,\
    \ we cannot build a whole app only with pure functions. At some point, we’ll have\
    \ to interface with some stateful component like a database or the network.\n\n\
    Still, we can try to implement as much logic as possible into pure functions and\
    \ only have a thin *impure* layer gluing them together. The pressure of writing\
    \ tests first pushes you to do exactly that.\n\nWe built a working app without\
    \ ever launching it in the Simulator, using tests to get faster feedback instead.\n\
    \nBecause we decomposed the problem in small pieces, we now have something that\
    \ stands on its own, even though far from finished. We can share it with our client\
    \ as a sign of early progress. This allows us to make the feedback loop with them\
    \ faster, the same way as we did with our code.\n\nIn the next chapter, we’ll\
    \ look at a technique to keep our test clean and focused and allow us to iterate\
    \ on the types that make up the app with ease.\n\n# Key Takeaways\n\n- **Partition\
    \ Problems and Solve Sequentially**: Apps are made of features; features are made\
    \ of objects collaborating together; objects are made of methods and types that\
    \ can be looked at in isolation.\n\n- **Build the behavior starting from the edge\
    \ cases**. This allows you to build up the foundation on which the complete implementation\
    \ will stand.\n\n- **Use the strictest and clearest assertions possible in your\
    \ tests**. They will give you clearer feedback on what to build next and make\
    \ triaging test failure in the future easier.\n\n- **Don’t let your tests crash**.\
    \ When the tests crash, you lose valuable information. Use techniques like `XCTUnwrap`\
    \ and safe `Collection` subscript access to avoid crashes.\n\n- **Pure functions\
    \ are easy to test because they have no external dependencies and no side effects**.\
    \ Writing tests first helps you think in terms of pure functions.\n\n- **Keep\
    \ the SwiftUI layer behavior-free**. Keep logic away from the SwiftUI `View`,\
    \ so that you can work and iterate on it with the faster test-driven feedback\
    \ loop.\n\n# 5. Changing Tests with Fixtures\n\n*How can you modify the type signatures\
    \ of your production code without having to update the tests that consume them\
    \ too?*\n\n*By decoupling* *the tests from the production object initialization\
    \ code.*\n\nTest-Driven Development promises to help developers work at a steady\
    \ pace. For this to happen, writing tests first is not enough; we need to maintain\
    \ the test code like the production one, keep it nimble and simple to work with.\
    \ As Robert C. Martin puts it in *Clean Code: A Handbook of Agile Software Craftsmanship*:\n\
    \n- Test code is just as important as production code. It is not a second-class\
    \ citizen. It requires thought, design, and care. It must be kept as clean as\
    \ production code.\n\nThis chapter introduces a technique that allows you to update\
    \ the shape of your production types without having to constantly go back and\
    \ update your tests: the *fixture*.\n\nWe’ll see what fixtures are, how to define\
    \ them for our types, and how this approach can help us write tests that are not\
    \ only simpler to maintain but also clearer to read.\n\n# The Hidden Cost of Source\
    \ Changes\n\nAlberto was excited to receive the early version of the app we built\
    \ in the previous chapter and sent some feedback. Something important for his\
    \ menu is to show which items are spicy. He doesn’t want his customers to order\
    \ a dish they won’t end up enjoying because they don’t like hot food.[¹](#501287_1_En_5_Chapter.xhtml#Par1000)\n\
    \nAlberto wants a visual hint next to each spicy item, like in his paper menu.\
    \ You agree to start with a chili emoji, ![../images/501287_1_En_5_Chapter/501287_1_En_5_Figa_HTML.gif](images/501287_1_En_5_Chapter/501287_1_En_5_Figa_HTML.gif).\
    \ (Emojis are a great way to add color and simulate icons when you don’t have\
    \ access to a designer or time to draw them.)\n\nTo make this change, you’ll need\
    \ to update the data model to track whether a `MenuItem` is spicy and also update\
    \ the UI layer to add the visual hint for those items that are spicy. Let’s look\
    \ at the data model first. We’ll think about the view in the next chapter.\n\n\
    We can update `MenuItem` to add spiciness information like this:\n\n```\n// MenuItem.swift\n\
    struct MenuItem {\n    let name: String\n    let category: String\n    let spicy:\
    \ Bool\n}\n```\n\nIf we make that change, we’ll get a bunch of compilation failures\
    \ with this error:\n\n```\nMenuItem(category: \"pastas\", name: \"name\")\n//\
    \ Compiler says: Missing argument for parameter 'spicy' in call\n```\n\nThe new\
    \ property in `MenuItem` means the compiler will generate a new initializer, making\
    \ the one we used before invalid.\n\nTo go back to the green state, we’d need\
    \ to update all the call sites where we instantiate `MenuItem`. Doing so scales\
    \ linearly with the number of instantiations: the more we have, the more work\
    \ it will be to update them. You might not have a lot of updates to do in the\
    \ production code, where usually a type is instantiated only a handful of times,\
    \ but in the tests we may have dozens of calls to the `init` method.\n\nUnit tests\
    \ are meant to save developers’ time; if maintaining the test code becomes a time-consuming\
    \ task, Test-Driven Development goes from being your productivity’s best ally\
    \ to its worst enemy.\n\nWe need a way to decouple how we create values in the\
    \ tests from their actual `init`, so we can update the `init` without having to\
    \ always touch all of the initializations in the tests."
  raw: '## Pure Functions


    The functions we worked on in this and the previous chapter have two things in
    common:


    1.  If called with the same inputs, they return the same result every time. That’s
    because they don’t track internal state between calls, nor do they take into account
    any external state (e.g., the date at the time of calling).


    2.  They have no side effects. There is no change in the app state whether you
    call the function once, twice, or never.


    Functions with these properties equate to functions in the mathematical sense.
    As such, we call them *pure* functions.


    Pure functions are your best friends. Because their output depends only on their
    input (property 1), a test for them requires only an input that will produce your
    desired output. And because they don’t alter the state of the program that calls
    them (property 2), you can exercise them without having to do any state management
    in the test case (see “XCTestCase Life Cycle” in Chapter [2](#501287_1_En_2_Chapter.xhtml)).


    Unfortunately, we cannot build a whole app only with pure functions. At some point,
    we’ll have to interface with some stateful component like a database or the network.


    Still, we can try to implement as much logic as possible into pure functions and
    only have a thin *impure* layer gluing them together. The pressure of writing
    tests first pushes you to do exactly that.


    We built a working app without ever launching it in the Simulator, using tests
    to get faster feedback instead.


    Because we decomposed the problem in small pieces, we now have something that
    stands on its own, even though far from finished. We can share it with our client
    as a sign of early progress. This allows us to make the feedback loop with them
    faster, the same way as we did with our code.


    In the next chapter, we’ll look at a technique to keep our test clean and focused
    and allow us to iterate on the types that make up the app with ease.


    ## Key Takeaways


    *   **Partition Problems and Solve Sequentially**: Apps are made of features;
    features are made of objects collaborating together; objects are made of methods
    and types that can be looked at in isolation.


    *   **Build the behavior starting from the edge cases**. This allows you to build
    up the foundation on which the complete implementation will stand.


    *   **Use the strictest and clearest assertions possible in your tests**. They
    will give you clearer feedback on what to build next and make triaging test failure
    in the future easier.


    *   **Don’t let your tests crash**. When the tests crash, you lose valuable information.
    Use techniques like `XCTUnwrap` and safe `Collection` subscript access to avoid
    crashes.


    *   **Pure functions are easy to test because they have no external dependencies
    and no side effects**. Writing tests first helps you think in terms of pure functions.


    *   **Keep the SwiftUI layer behavior-free**. Keep logic away from the SwiftUI
    `View`, so that you can work and iterate on it with the faster test-driven feedback
    loop.


    # 5. Changing Tests with Fixtures


    *How can you modify the type signatures of your production code without having
    to update the tests that consume them too?*


    *By decoupling* *the tests from the production object initialization code.*


    Test-Driven Development promises to help developers work at a steady pace. For
    this to happen, writing tests first is not enough; we need to maintain the test
    code like the production one, keep it nimble and simple to work with. As Robert
    C. Martin puts it in *Clean Code: A Handbook of Agile Software Craftsmanship*


    *   Test code is just as important as production code. It is not a second-class
    citizen. It requires thought, design, and care. It must be kept as clean as production
    code.


    This chapter introduces a technique that allows you to update the shape of your
    production types without having to constantly go back and update your tests: the
    *fixture*.


    We’ll see what fixtures are, how to define them for our types, and how this approach
    can help us write tests that are not only simpler to maintain but also clearer
    to read.


    ## The Hidden Cost of Source Changes


    Alberto was excited to receive the early version of the app we built in the previous
    chapter and sent some feedback. Something important for his menu is to show which
    items are spicy. He doesn’t want his customers to order a dish they won’t end
    up enjoying because they don’t like hot food.[¹](#501287_1_En_5_Chapter.xhtml#Par1000)


    Alberto wants a visual hint next to each spicy item, like in his paper menu. You
    agree to start with a chili emoji, ![../images/501287_1_En_5_Chapter/501287_1_En_5_Figa_HTML.gif](images/501287_1_En_5_Chapter/501287_1_En_5_Figa_HTML.gif).
    (Emojis are a great way to add color and simulate icons when you don’t have access
    to a designer or time to draw them.)


    To make this change, you’ll need to update the data model to track whether a `MenuItem`
    is spicy and also update the UI layer to add the visual hint for those items that
    are spicy. Let’s look at the data model first. We’ll think about the view in the
    next chapter.


    We can update `MenuItem` to add spiciness information like this:


    ```

    // MenuItem.swift

    struct MenuItem {

    let name: String

    let category: String

    let spicy: Bool

    }

    ```


    If we make that change, we’ll get a bunch of compilation failures with this error:


    ```

    MenuItem(category: "pastas", name: "name")

    // Compiler says: Missing argument for parameter ''spicy'' in call

    ```


    The new property in `MenuItem` means the compiler will generate a new initializer,
    making the one we used before invalid.


    To go back to the green state, we’d need to update all the call sites where we
    instantiate `MenuItem`. Doing so scales linearly with the number of instantiations:
    the more we have, the more work it will be to update them. You might not have
    a lot of updates to do in the production code, where usually a type is instantiated
    only a handful of times, but in the tests we may have dozens of calls to the `init`
    method.


    Unit tests are meant to save developers’ time; if maintaining the test code becomes
    a time-consuming task, Test-Driven Development goes from being your productivity’s
    best ally to its worst enemy.


    We need a way to decouple how we create values in the tests from their actual
    `init`, so we can update the `init` without having to always touch all of the
    initializations in the tests.'
  trans: "\n# 纯函数\n\n我们在本章及前一章中研究的函数有两个共同点：\n\n1.  如果使用相同输入调用，每次都会返回相同结果。这是因为它们不会在调用间跟踪内部状态，也不会考虑任何外部状态（例如调用时的时间日期）。\n\
    2.  它们没有副作用。无论你调用函数一次、两次还是从不调用，应用状态都不会改变。\n\n具备这些特性的函数在数学意义上等同于函数。因此，我们称它们为*纯*函数。\n\
    \n纯函数是你最好的朋友。因为它们的输出仅依赖于输入（特性 1），所以测试它们只需要一个能产生期望输出的输入。并且由于它们不会改变调用程序的自身状态（特性\
    \ 2），你可以在测试用例中无需进行任何状态管理的情况下使用它们（参见第[2]章(#501287_1_En_2_Chapter.xhtml)中的“`XCTestCase\
    \ 生命周期`”）。\n\n不幸的是，我们无法只使用纯函数构建整个应用。在某个时刻，我们不得不与有状态组件（如数据库或网络）进行交互。\n\n尽管如此，我们仍可以尝试将尽可能多的逻辑实现在纯函数中，并只使用一个薄薄的*非纯*层将它们粘合起来。先编写测试的压力恰恰会促使你这样做。\n\
    \n我们构建了一个可运行的应用，却从未在模拟器中启动过它，而是使用测试来获得更快的反馈。\n\n因为我们把问题分解成了小块，现在我们有了一个能独立运行的成果，尽管还远未完成。我们可以将其作为早期进展的标志与客户分享。这使我们能够像处理代码那样，加快与他们的反馈循环。\n\
    \n在下一章中，我们将研究一种技术，以保持测试的清洁和专注，并让我们能够轻松地迭代构成应用的各个类型。\n\n# 关键要点\n\n-   **分解问题并依次解决**：应用由功能构成；功能由协作的对象构成；对象由可独立审视的方法和类型构成。\n\
    \n-   **从边界情况开始构建行为**。这让你能够构建出支撑完整实现的基础。\n\n-   **在测试中使用尽可能严格和清晰的断言**。它们能为你提供更清晰的下一步构建方向指引，并使未来的测试失败分类变得更容易。\n\
    \n-   **不要让测试崩溃**。当测试崩溃时，你会丢失有价值的信息。使用`XCTUnwrap`和安全`Collection`下标访问等技术来避免崩溃。\n\
    \n-   **纯函数易于测试，因为它们没有外部依赖和副作用**。先编写测试有助于你以纯函数的思维进行思考。\n\n-   **保持 SwiftUI 层无行为**。将逻辑从\
    \ SwiftUI `View`中分离出来，以便你能利用更快的测试驱动反馈循环来对其进行处理和改进。\n\n# 5. 使用 Fixtures 变更测试\n\n\
    *如何在修改生产代码的类型签名时，无需更新使用这些类型的测试？*\n\n*通过将测试与生产对象的初始化代码解耦。*\n\n测试驱动开发承诺帮助开发者以稳定的节奏工作。为了实现这一点，仅先编写测试是不够的；我们需要像维护生产代码那样维护测试代码，使其保持灵活和易于操作。正如\
    \ Robert C. Martin 在 *Clean Code: 敏捷软件工艺手册*中所说：\n\n- 测试代码和生产代码同等重要。它不是二等公民。它需要思考、设计和关怀。它必须像生产代码一样保持整洁。\n\
    \n本章介绍一种技术，它允许你更新生产类型的结构，而无需不断地返回并更新你的测试：*fixture*。\n\n我们将了解什么是 fixture，如何为我们的类型定义它们，以及这种方法如何帮助我们编写不仅更易于维护，而且更清晰的测试。\n\
    \n# 源码变更的隐藏成本\n\nAlberto 很高兴收到我们在前一章中构建的应用早期版本，并给出了一些反馈。对于他的菜单来说，一项重要的信息是显示哪些菜品是辣的。他不希望他的顾客因为不喜欢辣食而点了一道最终却无法享受的菜。¹\n\
    \nAlberto 希望在每个辛辣菜品旁边有一个视觉提示，就像他的纸质菜单一样。你同意从使用一个辣椒表情符号开始，![../images/501287_1_En_5_Chapter/501287_1_En_5_Figa_HTML.gif](img/501287_1_En_5_Figa_HTML.gif)。（当你无法接触到设计师或没有时间绘制图标时，表情符号是增添色彩和模拟图标的好方法。）\n\
    \n为了做出这一更改，你需要更新数据模型来跟踪`MenuItem`是否辛辣，并更新 UI 层为那些辛辣的菜品添加视觉提示。让我们先看看数据模型。我们将在下一章讨论视图。\n\
    \n我们可以像这样更新`MenuItem`以添加辛辣信息：\n\n```\n// MenuItem.swift\nstruct MenuItem {\n \
    \   let name: String\n    let category: String\n    let spicy: Bool\n}\n```\n\n\
    如果进行此更改，我们将遇到一堆编译失败，并显示如下错误：\n\n```\nMenuItem(category: \"pastas\", name: \"name\"\
    )\n// 编译器说：调用中缺少参数 'spicy'\n```\n\n`MenuItem`中的新属性意味着编译器将生成一个新的初始化器，这使得我们之前使用的初始化器变得无效。\n\
    \n要恢复到绿色状态，我们需要更新所有实例化`MenuItem`的调用点。这样做的工作量与实例化次数成正比：实例化越多，更新它们的工作量就越大。在生产代码中你可能没有很多更新要做，因为一个类型通常只被实例化几次，但在测试中，我们可能对`init`方法有数十次调用。\n\
    \n单元测试旨在节省开发者的时间；如果维护测试代码变成一项耗时的任务，测试驱动开发就会从提高生产力的最佳盟友变成最差的敌人。\n\n我们需要一种方法，将测试中创建值的方式与其实际的`init`解耦，这样我们就能在更新`init`时，无需总是修改测试中的所有初始化代码。\n"
- fmt: '# Fixtures


    To keep the cost of updating the `MenuItem.init()` low, we can make the tests
    initialize it in a centralized location, so that every time its shape changes,
    we only have to update one piece of code.


    We can extend `MenuItem` in the test target to provide a static method the tests
    can use to get an instance of the type. This approach is known as fixture, and
    because we define the fixture in an extension, this technique is called *Fixture
    Extension*:


    ```

    // MenuItem+Fixture.swift

    @testable import Albertos

    extension MenuItem {

    static func fixture(

    category: String = "category",

    name: String = "name"

    ) -> MenuItem {

    MenuItem(category: category, name: name)

    }

    }

    ```


    What keeps the effort of updating the test suite low are the default values of
    all the input parameters.


    When you add a new property, you only need to update the fixture and provide a
    default value. You won’t need to update any of the existing tests, and you’ll
    be able to use the fixture with the new property when writing new tests that need
    it. When you remove a property, the only tests that will need an update are those
    passing a custom value to it in the fixture invocation.


    We can update our tests to use fixtures like this:


    ```

    // MenuGroupingTests.swift

    func testMenuWithOneCategoryReturnsOneSection() throws {

    let menu = [

    MenuItem.fixture(category: "pastas", name: "name"),

    MenuItem.fixture(category: "pastas", name: "other name"),

    ]

    let sections = groupMenuByCategories(menu)

    XCTAssertEqual(sections.count, 1)

    let section = try XCTUnwrap(sections.first)

    XCTAssertEqual(section.items.count, 2)

    XCTAssertEqual(section.items.first,  "name")

    XCTAssertEqual(section.items.last, "other name")

    }

    ```


    Now, to add the `spicy` property, the only code that we need to change is in the
    fixture definition:


    ```

    // MenuItem.swift

    struct MenuItem {

    let name: String

    let category: String

    let spicy: Bool

    }

    // MenuItem+Fixture.swift

    extension MenuItem {

    static func fixture(

    category: String = "category",

    name: String = "name",

    spicy: Bool = false,

    ) -> MenuItem {

    MenuItem(

    category: category,

    name: name,

    spicy: spicy

    )

    }

    }

    ```


    ## Fixtures vs. Convenience Initializers


    Why defining a fixture instead of a convenience initializer with default values?
    Because of clarity.


    When reading `let item = MenuItem.fixture(name: "a name")`, the fact that the
    instance comes with default values chosen for the purpose of testing is much clearer
    than if we were reading `let item = MenuItem(name: "a name")`. Calling `MenuItem(...)`
    looks like production code; `MenuItem.fixture(...)` is something that belongs
    to the test suite.


    Making your code clear to read has a huge return on investment: you write your
    code once, but you and your teammates will read it many times over. This is true
    for test and production code alike.


    ## Fixtures Make the Test Actors Explicit


    Once you have your fixtures in place, you can write clearer tests by focusing
    only on the input elements that actually affect the behavior under test.


    Let’s take a look at this test from the previous chapter, written without using
    fixtures:


    ```

    func testMenuWithManyCategoriesReturnsOneSectionPerCategoryInReverseAlphabeticalOrder()
    {

    let menu = [

    MenuItem(            category: "pastas", name: "a pasta", spicy: false        ),

    MenuItem(            category: "drinks", name: "a drink", spicy: false        ),

    MenuItem(            category: "pastas", name: "another pasta", spicy: false        ),

    MenuItem(            category: "desserts", name: "a dessert", spicy: false        ),

    ]

    let sections = groupMenuByCategories(menu)

    XCTAssertEqual(sections.count, 3)

    XCTAssertEqual(sections[0].category,  "pastas")

    XCTAssertEqual(sections[1].category,  "drinks")

    XCTAssertEqual(sections[2].category, "desserts")

    }

    ```


    We’re testing whether the generated sections match the input categories and are
    in reverse alphabetical order. Of all the properties of the input, the only one
    that affects the output is `category`. The code we have to prepare the input,
    though, has to add values for all of the other irrelevant properties.


    Using fixtures, we can remove the noise, keeping the input focused only on what
    really matters:


    ```

    let menu = [

    MenuItem.fixture(category: "pastas"),

    MenuItem.fixture(category: "drinks"),

    MenuItem.fixture(category: "pastas"),

    MenuItem.fixture(category: "dessert")

    ]

    ```


    **Bonus tip**


    You can make the code more compact by defining the type of the array and then
    omitting the `MenuItem` when calling the function; the Swift compiler infers it.


    ```

    let menu: [MenuItem] = [

    .fixture(category: "pastas"),

    .fixture(category: "drinks"),

    .fixture(category: "pastas"),

    .fixture(category: "dessert")

    ]

    ```


    Alongside making your tests clearer to the reader and removing the friction in
    changing the source code, fixtures also save you time when writing the tests themselves.
    You don’t have to think about the values for properties that are irrelevant to
    the behavior under test nor type them.


    ## Fixtures Are Composable


    You can use fixtures to define new fixtures. For example, here’s how to define
    a fixture for `MenuSection`:


    ```

    // MenuSection+Fixture.swift

    @testable import Albertos

    extension MenuSection {

    static func fixture(

    category: String = "a category",

    items: [MenuItem] = [.fixture()]

    ) -> MenuSection {

    return MenuSection(category: category, items: items)

    }

    }

    ```


    ## Introduce Fixtures As Early As Possible


    Introducing fixtures is like saving for retirement; the sooner you start, the
    more value you’ll get out of them because of the compounding effect.


    Defining a fixture for a type and adopting it in your existing tests slows you
    down in the short term, but you’ll quickly make up for it when you need to change
    the shape of that type.


    The *rule of three* is a good heuristic to decide when to introduce fixtures.
    If you already called the `init` of a type in two tests, define a fixture for
    it before calling in a third.


    ## Practice Time


    To experience the value of fixtures firsthand, add new properties to `MenuItem`.
    For example, we’ll need a property for the price of the dishes later in the development.
    Try adding it and see what you need to change in the production and test code:


    ```

    // MenuItem.swift

    struct MenuItem {

    let name: String

    let category: String

    let spicy: Bool

    let price: Double

    }

    ```


    ## Key Takeaways


    * **Use a Fixture Extension to remove friction when updating the shape of a production
    code type**. By adding a layer of indirection between how you create values in
    the tests and their `init`, you won’t need to update every test call site when
    you edit, add, or remove properties from a type.


    * **Fixtures help you keep your tests focused on the key actors**. Thanks to their
    default values, fixtures allow you to omit `init` parameters that do not affect
    the behavior you are testing.


    * **Fixtures are composable**. You can use a fixture as the default value for
    a property of another fixture.


    * **Introduce fixtures early**. The time-saving value of fixtures compounds over
    time; you can adopt the rule of three heuristic to know when to add them.


    ## Endnote


    1. One could argue that adding a UI hint for spicy food is not top priority at
    this point of the development and that we should focus on building out the skeleton
    of functionality around which the app will revolve, such as networking APIs and
    ordering items. Absolutely true! From the point of view of learning how to test-drive
    the implementation of an iOS app, though, it’s useful to learn how to write unit
    tests for the logic that generates the data for the UI before moving forward with
    more advanced topics.'
