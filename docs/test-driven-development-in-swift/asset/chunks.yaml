    )\n}\n```\n\n现在我们有一个针对更新行为的失败测试，可以跟随它的指引来实现改动：\n\n*// MenuRow.ViewModel.swift*\n\
    *// ...*\n\n```swift\ninit(item: MenuItem) {\n    text = item.spicy ? \"\\(item.name)\
