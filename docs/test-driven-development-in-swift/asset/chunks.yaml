    # 使用桩模拟网络请求


    为了编写测试，我们需要一种方法为测试提供预定义的输入以供校验：要么是用于解码的 `Data`，要么是一个 `URLError` 值。为此，我们可以使用在第
    8 章学到的相同技术构建一个桩测试替身：


    ```

    // NetworkFetchingStub.swift

    @testable import Albertos

    import Combine

    import Foundation

    class NetworkFetchingStub: NetworkFetching {

    private let result: Result

    init(returning result: Result) {

    self.result = result

    }

    func load(_ request: URLRequest) -> AnyPublisher {

    return result.publisher

    // 添加延迟以模拟真实世界的异步行为

    .delay(for: 0.01, scheduler: RunLoop.main)

    .eraseToAnyPublisher()

    }

    }

    ```


    我们可以使用这个桩来解除与网络非确定性特性的耦合，从而更好地控制测试的输入：


    ```

    // MenuFetcherTests.swift

    // ...

    func testWhenRequestSucceedsPublishesDecodedMenuItems() throws {

    let json = """

    [

    { "name": "a name", "category": "a category", "spicy": true },

    { "name": "another name", "category": "a category", "spicy": true }

    ]

    """

    let data = try XCTUnwrap(json.data(using: .utf8))

    let menuFetcher = MenuFetcher(networkFetching: NetworkFetchingStub(returning:
    .success(data)))

    let expectation = XCTestExpectation(description: "发布已解码的 [MenuItem]")

    menuFetcher.fetchMenu()

    .sink(

    receiveCompletion: { _ in },

    receiveValue: { items in

    XCTAssertEqual(items.count, 2)

    XCTAssertEqual(items.first?.name, "a name")

    XCTAssertEqual(items.last?.name, "another name")

    expectation.fulfill()

    }

    )

    .store(in: &cancellables)

    wait(for: [expectation], timeout: 1)

    }

    ```


    使用桩消除了对网络的依赖，使测试运行更快、更健壮。如果你现在尝试离线运行测试，会发现它们都能通过。


    在网络测试中使用桩也有助于明确断言中使用的值来自何处：它们现在已是测试本身的一部分。


    接下来，我们来看失败处理的测试：


    ```

    // MenuFetcherTests.swift

    // ...

    func testWhenRequestFailsPublishesReceivedError() {

    let expectedError = URLError(.badServerResponse)

    let menuFetcher = MenuFetcher(networkFetching: NetworkFetchingStub(returning:
    .failure(expectedError)))

    let expectation = XCTestExpectation(description: "发布接收到的 URLError")

    menuFetcher.fetchMenu()

    .sink(

    receiveCompletion: { completion in

    guard case .failure(let error) = completion else { return }

    XCTAssertEqual(error as? URLError, expectedError)

    expectation.fulfill()

    },

    receiveValue: { items in

    XCTFail("期望失败，但成功获取了 \(items)")

    }

    )

    .store(in: &cancellables)

    wait(for: [expectation], timeout: 1)

    }

    ```


    这个测试已经能通过。原因是我们测试的是 Combine 对 `URLSession` 扩展的默认行为。


    尽管有人可能认为这个测试是多余的，但我建议你保留它。确保代码能够妥善处理失败，是构建优秀用户体验的健壮软件的关键。为此编写明确的测试，表明我们认真对待错误处理。错误处理全部由
    Combine 在底层完成这一事实是具体的实现细节，未来可能会发生变化。一个专门的测试能确保一旦错误处理逻辑改变，你能立即知晓。


    ### 第三方替代方案


    本书仅涉及原生 `XCTest`，但在测试网络代码方面，有一个值得提及的第三方库：[OHHTTPStubs](https://github.com/AliSoftware/OHHTTPStubs)。该库允许你直接在
    `URLSession` 层面桩化网络请求，而无需创建专门的抽象层，这使其成为为大型遗留代码库添加测试的绝佳选择——这类代码库在重构前往往难以修改。


    通过将测试与网络本身隔离，你可以专注于测试应用如何发起请求并处理其结果，从而测试网络逻辑。


    通过定义一个抽象来隐藏 `URLSession` 的内部细节，你可以模拟来自网络的任何响应，并使用桩测试替身编写全面的测试，同时消除真实 HTTP 请求带来的固有非确定性影响。


    请尽量保持遵循该抽象层的代码量最少，最好只使用 Apple 提供的方法。即使没有为它编写测试，你也能对其正确行为充满信心。


    ## 练习时间


    假设 API 有另一个返回单个条目的“今日推荐菜”端点。你将如何运用测试驱动开发来实现从该端点读取数据？你会将功能添加到 `MenuFetching` 中，还是创建一个新的专用抽象？`NetworkFetchingStub`
    是否需要变更，还是它已准备好支持这个测试？


    你可以在 [`https://raw.githubusercontent.com/mokagio/tddinswift_fake_api/trunk/dish_of_the_day.json`](https://raw.githubusercontent.com/mokagio/tddinswift_fake_api/trunk/dish_of_the_day.json)
    找到该端点的响应数据。


    这里还有一个练习给你。目前，`MenuFetcher` 使用一个硬编码值作为 API 端点。硬编码值有助于快速入门，但它们不够灵活。例如，你无法通过硬编码的
    URL 让一个版本的应用连接预发布环境、另一个版本连接生产环境的后端。


    更好的方法是使用基础 URL 参数初始化 `MenuFetcher`，使其不关心 API 部署在何处。在内部，`MenuFetcher` 可以通过将适当路径附加到基础值来构造端点
    URL。你可以编写哪些测试来实现这一改进？


    **提示**


    修改桩，使其期望一个 `URLRequest` 和 `Result` 配对，并仅当传入 `load(_:)` 的 `URLRequest` 与给定的相匹配时，才返回给定的
    `Result`。


    ## 关键要点


    -   **不要在单元测试中发起网络请求**。访问网络会因真实世界的物理限制使测试产生非确定性并变慢。


    -   **定义一个抽象层，将源代码和测试代码与底层的网络实现解耦**。通过应用依赖倒置原则，你将构建出更模块化的软件，并能够使用测试替身。


    -   **围绕 `URLSession` 使用尽可能薄的封装**。由于这部分代码无法直接测试，它应该尽可能精简和简单。


    -   **使用桩测试替身来模拟来自网络的成功和失败响应**。借助桩，你可以为网络组件提供任何类型的输入。


    ## 尾注


    1.  如果你想更进一步，对 `URLSession` 的行为进行安全检查，可以编写一个集成测试来验证 `URLSession` 上的 `NetworkFetching`
    方法实现。正如我们所见，与真实网络交互会使测试产生非确定性并变慢。该测试应放在一个专用的测试目标中，不与单元测试一起运行。当你升级到新版本的 Xcode 时，可以将其作为安全检查来使用。

