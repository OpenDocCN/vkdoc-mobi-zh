  raw: '## Wishful Coding


    In the `leapYear` exercise, we started with a dummy function implementation before
    writing the tests. A different approach is to write the function only when there
    is a compiler error telling us it’s needed:


    ```

    import XCTest

    class LeapYearTests: XCTestCase {

    func testEvenlyDivisibleBy4IsLeap() {

    XCTAssertTrue(isLeap(4))

    // Compiler says: Cannot find ''isLeap'' in scope

    }

    }

    ```


    The compiler can’t find a function with a signature matching the one we wrote.
    We are in the red state, only we don’t have a test failure but a compiler one.
    Like test failures, compiler errors are suggestions on what to do next to get
    to the green state. If the compiler can’t find a function called `isLeap`, let’s
    define one for it:


    ```

    func isLeap(_ year: Int) {}

    ```


    The compiler has a new error now:


    ```

    XCTAssertTrue(isLeap(4)) // Compiler says: Cannot convert value

    // of type ''()'' to expected argument

    // type ''Bool`

    ```


    `XCTAssertTrue` expects a `Bool` to check, but our `isLeap` function is not returning
    anything right now, or rather, it returns `()`, which means `Void`:


    ```

    func isLeap(_ year: Int) -> Bool {

    return true

    }

    ```


    Now the code compiles, and we can run the tests to see if the implementation works.


    What we did here was writing the code we wished we had before defining it and
    then using the compiler errors as a guide on how to get to the function definition.
    This technique is called Wishful Coding.


    Wishful Coding may seem like an overly long process, especially for straightforward
    code like the `leapYear` function. Am I advocating you should *always* use this
    approach? No, but I want you to be aware of this technique.


    Next time you feel stuck coming up with a function signature up front, write the
    code you wish you had in the test assertion, then see how the compilation fails,
    and start by addressing that error.


    I encourage you to try this, even if you feel like you might be going a bit slower.
    In the boxing movie *Rocky III*, Apollo Creed brings a sad and defeated Rocky
    to the swimming pool to “strengthen and use muscles he never thought he had.”
    Rocky is awkward and slow at first but eventually swims laps upon laps – accompanied
    by an inspiring soundtrack – and goes off to reclaim his title.


    Techniques like Wishful Coding and Fake It are like muscles you didn’t know you
    had. You need to exercise and strengthen them so that when the time will come
    to use them, they’ll be ready to spring into action.


    Now that we’ve seen what the staples of Test-Driven Development are, it’s time
    to apply them in the real world. In the next chapter, well start the Test-Driven
    Development of a new application.


    ## Key Takeaways


    *   **Test List**: Start listing all the tests you might need to verify the behavior
    of the code you need to implement.


    *   **Red, green, refactor**. Tackling one test at a time, write the test, watch
    it fail because there is no implementation for that behavior, and then use the
    failure as a guide on what to do to make the test pass. Once the test passes,
    ask yourself whether the code can be improved.


    *   **TDD lets you focus on making the code work first and then making it clean**.
    Tackling each task in isolation is easier than trying to do both at the same time.
    The tests give you the confidence to iterate on your implementation.


    *   **Structure your tests in three stages: Arrange, Act, Assert**. Clearly and
    consistently separating the inputs, the behavior under test, and the expectation
    on its output will reduce the cognitive load of reading tests.


    *   **Compiler errors are a source of feedback too**.


    *   **Fake It**. If you are not sure how to implement something, start by hardcoding
    the value that will make the test pass. Once you have a green test, you can work
    on the real implementation with confidence.


    *   **Wishful Coding**: If you are not sure how to define a function or type,
    start by writing its usage in the test and use the compiler’s failure message
    as the starting point for the definition.


    # 4. Test-Driven Development in the Real World


    *How do you go from using tests to drive the implementation of small, self-contained
    problems like the ones we’ve seen in the previous chapters to building a full
    application?*


    *By cheating. Instead of seeing the application as a whole problem, you can break
    it apart into smaller and smaller ones. Eventually, you’ll reach a scale where
    each problem is small and self-contained.*


    In this chapter, we’ll start building the real-world application that we’ll use
    as our playground throughout the book. We’ll apply the *Partition Problem and
    Solve Sequentially* technique to identify the initial feature set and decide which
    to begin with. We’ll then use tests to drive the first kernel of functionality,
    learning why you should use the strictest assertions possible and why you shouldn’t
    let your tests crash.


    ## The Menu Ordering App


    Alberto, the owner of your local Italian restaurant, hired you to build his new
    ordering app.


    The first thing you did together was defining the minimum viable feature set.
    In version 1.0, customers will be able to browse the menu, select dishes, and
    submit and pay their orders.


    This initial version is minimal and streamlined, but there are nevertheless a
    number of questions to answer. Here are some, and more will likely arise as you
    progress in the development:


    *   Where does the data for the menu come from?


    *   How do patrons build up their order?


    *   How do they pay?


    *   How is the order sent to the kitchen


    *   What happens if there is an error?


    The good news is you don’t need to answer them all right now!


    Trying to answer every design question up front can impede the effectiveness of
    your architecture. Addressing each decision individually as the software implementation
    demands an answer gives you time to better understand the requirements and discover
    the project’s nuances. As you keep developing the app, you gain more context and
    experience on the problem you’re trying to solve. That puts you in a better position
    to make an optimal design decision.


    If writing the code helps generate the understanding that will inform the application’s
    design, which code should you begin to write?


    ## Where to Begin?


    There are a few options for where to begin building your app. One is to start
    with the hardest thing, the task where you have the most learning to do. Unknowns
    are where most of the project risk is, so it’s helpful to tackle them up front
    to avoid nasty surprises later down the track.


    You could also start from the easiest thing – that is, something you already know
    how to do. Here the advantage is that you get the ball rolling quickly and build
    momentum in your development process.


    Yet another option is to begin with something that makes later work possible.
    In our app, displaying the menu sits nicely in between being a straightforward
    task with few moving parts and being a precondition for other features; without
    the menu, customers can’t make an order.


    Starting with displaying the menu also has the advantage of giving us something
    to share with Alberto early on: an incomplete but functioning version of the app
    to show our progress.'
