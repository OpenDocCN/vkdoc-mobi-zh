- fmt: '# Injecting Dependencies with `@EnvironmentObject`


    *How do you share the same instance of an object between SwiftUI views without
    injecting it through all their common ancestors in the view hierarchy?*


    *By using `@EnvironmentObject` to access it from the environment, the context
    in which all the views live.*


    In this chapter, you’ll learn how to share business logic components between views
    with `@EnvironmentObject` in a testable way.


    Our app is getting closer to being fully functional. To get there, we need to
    build the UI and business logic to let customers select dishes and make their
    orders.


    What’s the Earliest Testable ordering functionality we can build? We can start
    with merely adding and removing items to and from the order and show users their
    order on a screen with a read-only view, as illustrated in Figure [11-1](#501287_1_En_11_Chapter.xhtml#Fig1).
    From that screen, they’ll eventually be able to submit a payment. Let’s work on
    the order building and showing in this chapter, leaving the submission for the
    next.


    ![../images/501287_1_En_11_Chapter/501287_1_En_11_Fig1_HTML.png](images/501287_1_En_11_Chapter/501287_1_En_11_Fig1_HTML.png)


    Figure 11-1


    The ordering flow


    For customers to assemble their order by selecting dishes from the menu, we’ll
    need:


    * A detail screen for each menu item, including its price, and a button to add
    it to the order

    * A screen showing the order summary and a button to submit it

    * An object to hold and update the order model


    Let’s start from the object in charge of providing an interface and coordinating
    updates to the order, which we shall call `OrderController`.


    The implementation details of `OrderController` are not interesting for this chapter,
    only its interface. I’ll leave building it with TDD as an exercise for you. You
    can find a version in the source code that comes with this book.


    Here are the interfaces for `OrderController` and its `Order` model:


    ```

    // Order.swift

    struct Order {

    let items: [MenuItem]

    var total: Double { ... }

    }

    // OrderController.swift

    import Combine

    class OrderController: ObservableObject {

    @Published private(set) var order: Order

    init(order: Order = Order(items: [])) { ... }

    func isItemInOrder(_ item: MenuItem) -> Bool { ... }

    func addToOrder(item: MenuItem) { ... }

    func removeFromOrder(item: MenuItem) { ... }

    }

    ```


    You’ll find the initial version of `MenuItemDetail`, `OrderButton`, and `OrderDetail`
    views and their ViewModels in this chapter’s companion source code.


    To access the same order, the views need to interact with the same instance of
    `OrderController`. `MenuItemDetail.ViewModel` will use `OrderController` to add
    or remove its item to or from the order, `OrderButton.ViewModel` to show the total
    amount, and `OrderDetail.ViewModel` to read and show the items in the order. We
    need a way to share the same reference between all these components.


    One option could be defining a `static` instance in the global namespace or as
    a `sharedInstance` property on the `OrderController` type itself. It would solve
    the problem of sharing the same value across multiple objects, but how could we
    write tests for it?


    The behavior depends on the state of the `Order` held by `OrderController`: if
    all the tests modify the same shared instance, the way a test leaves the order
    will affect the next test’s result. The tests lose their isolation and become
    dependent on each other. When the operation a test performs changes the result
    of another test, the suite becomes brittle and hard to work with.


    To test each ViewModel in isolation, we need to use a different `OrderController`
    instance in each.


    As we’ve already discussed, *Dependency Injection* is the technique of providing
    an object or a method with all its dependencies without requiring it to create
    them in its implementation.


    By injecting the `OrderController` dependency into each ViewModel, we’ll be able
    to test them in isolation. We can then use the `@EnvironmentObject` property wrapper
    that SwiftUI provides to access a shared instance of `OrderController` when instantiating
    the ViewModels.


    Let’s see how this works in practice by working on adding and removing the order
    to and from the new menu item screen.'
