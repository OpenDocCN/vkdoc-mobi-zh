  raw: '### Test Naming Conventions


    A test method’s name should always reflect the behavior it verifies. Because we
    refined the behavior by introducing the reverse alphabetical ordering, it would
    be appropriate to update the test name:


    ```

    func testMenuWithManyCategoriesReturnsAsManySectionsInReverseAlphabeticalOrder()

    ```


    Admittedly, that’s a *long* method name. Naming things is one of the most complex
    parts of programming, and tests are no exception.


    Using specific test names makes the test output in the console informative, which
    helps inspect it outside of Xcode, such as in a Continuous Integration service.


    The lack of support for annotating tests with descriptions that would appear in
    the test output is an unfortunate XCTest limitation.


    One compromise is to do like Apple does in the few examples available in the [XCTest
    documentation](https://developer.apple.com/documentation/xctest/defining_test_cases_and_test_methods)
    and use less specific test names complemented by a documentation comment:


    ```

    /// Given a menu with many categories, returns as many /// sections, in reverse
    alphabetical order

    func testMenuWithManyCategories()

    ```


    Swift documentation comments differ from standard comments because they start
    with `///` and support markdown formatting. Tools that generate documentation
    will look for comments starting with `///` and skip those beginning with `//`.


    Apple’s approach trades clarity in the test output for test method names that
    are less verbose.


    Another option is to use the popular convention Roy Osherove recommends in *The
    Art of Unit Testing* and name our tests following the formula


    ```

    [UnitOfWorkName]_[ScenarioUnderTest]_[ExpectedBehavior]

    ```


    Keeping in mind that XCTest needs the `test` prefix to identify a method as a
    test to run, the name in our example would become


    ```

    func test_groupMenuByCategory_MenuWithManyCategories_ReturnsAsManySectionsInReverseAlphabeticalOrder()

    ```


    That’s *even longer* than the one we began with! However, the underscores break
    the name up and make it easier to parse for some readers. If you can get past
    the awkwardness of mixing camel casing (`FooBar`) with snake casing (`foo_bar`),
    this naming convention can help readers navigate your tests.


    Yet another option is to adopt the open source library [Quick](https://github.com/Quick/Quick),
    which provides a DSL to describe test methods using strings. Appendix B includes
    an overview of how to write tests using Quick.


    Each of the options we just discussed has its merits and its tradeoffs. Each could
    be an excellent fit for a project and a poor fit for another.


    When working in a team, individuals may have different preferred styles, but it’s
    crucial to choose one and stick with it. Consistency removes the mental overhead
    of having to parse the code’s structure to get to its meaning, making the path
    to understanding shorter for both your teammates and your future self.


    In this book, we’ll keep naming our test methods with plain camel casing. That’s
    not a judgment call on this particular style over the others, but an attempt to
    keep the test and production code homogeneous to add less overhead to what we’re
    trying to learn.


    ### Red, Green, and Don’t Forget Refactor


    All the tests are passing now, but we are not done yet. It’s time to ask whether
    we can improve the code.


    Let’s take a look at the production code:


    ```

    func groupMenuByCategory(_ menu: [MenuItem]) -> [MenuSection] {

    guard menu.isEmpty == false else { return [] }

    return Dictionary(grouping: menu, by: { $0.category })

    .map { key, value in MenuSection(category: key, items: value)

    }

    .sorted { $0.category > $1.category }

    }

    ```


    Since we are manipulating sequences, there is no need to check whether the input
    is empty before processing it. With an empty array as input, the sequence manipulation
    will still run on it but won’t manipulate anything, producing an empty array as
    the output.


    Here’s the final version of our function:


    ```

    func groupMenuByCategory(_ menu: [MenuItem]) -> [MenuSection] {

    return Dictionary(grouping: menu, by: { $0.category })

    .map { key, value in             MenuSection(category: key, items: value)         }

    .sorted { $0.category > $1.category }

    }

    ```


    If we rerun the tests, they are still green.


    Once you have your unit tests lattice, experimenting with the production code
    implementation details becomes easy: make the change you want to try, and then
    if the tests still pass, you can be confident nothing broke.


    We now have a little kernel of pure business logic, which we know works because
    we’ve seen its tests go from red to green as we built it. Let’s hook it up with
    the UI.


    ## Wiring Up the UI


    When building applications in the Apple ecosystem, there are two options to write
    UI code: the recent SwiftUI or the older UIKit, WatchKit, and AppKit. You can
    mix and match between the two, but we’ll be working with SwiftUI only in this
    book.


    SwiftUI is still young – as I’m writing this chapter, not even two years have
    passed since its introduction at WWDC 2019 – but there is not doubt it is how
    we’ll be building user interfaces in the years to come.


    The testing strategies that we’ll learn apply to the older frameworks too. If
    you want to know more about TDD and UIKit, head over to Appendix C.


    There isn’t a straightforward way to write unit tests for SwiftUI views. We’ll
    learn more about why that’s the case and why it shouldn’t concern for us in Chapters
    [6](#501287_1_En_6_Chapter.xhtml) and [7](#501287_1_En_7_Chapter.xhtml).


    For the moment, we just need to observe that all the logic to generate the content
    of our view is already defined in `groupMenuByCategory(_:)`. We don’t need a test
    to guide us in implementing the menu view because the only thing we have to do
    is describe the layout in SwiftUI and feed it the `groupMenuByCategory(_:)` return
    value. Having views free from presentation or behavior logic makes them straightforward
    to write and allows you to build that logic elsewhere using TDD.


    Here’s the view implementation:


    ```

    // MenuList.swift

    import SwiftUI

    struct MenuList: View {

    let sections: [MenuSection]

    var body: some View {

    List {

    ForEach(sections) { section in

    Section(header: Text(section.category)) {

    ForEach(section.items) { item in

    Text(item.name)

    }

    }

    }

    }

    }

    }

    ```


    To make `MenuItem` and `MenuSection` work in the `ForEach`, we need to conform
    them to `Identifiable`:


    ```

    // MenuItem.swift

    extension MenuItem: Identifiable {

    var id: String { name }

    }

    // MenuSection.swift

    extension MenuSection: Identifiable {

    var id: String { category }

    }

    ```


    Finally, we can bring it all together in the root SwiftUI `App` :


    *// AlbertosApp.swift*


    **import** SwiftUI


    @main


    **struct AlbertosApp: App** {


        **var** body: some **Scene** {


            **WindowGroup** {


                **NavigationView** {


                    **MenuList**(sections: groupMenuByCategory(menu))


                        .navigationTitle("Alberto''s ![../images/501287_1_En_4_Chapter/501287_1_En_4_Figa_HTML.gif](images/501287_1_En_4_Chapter/501287_1_En_4_Figa_HTML.gif)")


                }


            }


        }


    }


    ```

    // In this first iteration the menu is an hard-coded array

    let menu = [

    MenuItem(category: "starters", name: "Caprese Salad"),

    MenuItem(category: "starters", name: "Arancini Balls"),

    MenuItem(category: "pastas", name: "Penne all''Arrabbiata"),

    MenuItem(category: "pastas", name: "Spaghetti Carbonara"),

    MenuItem(category: "drinks", name: "Water"),

    MenuItem(category: "drinks", name: "Red Wine"),

    MenuItem(category: "desserts", name: "Tiramisù"),

    MenuItem(category: "desserts", name: "Crema Catalana"),

    ]

    ```


    In Figure [4-1](#501287_1_En_4_Chapter.xhtml#Fig1), you can see how the SwiftUI
    code renders in the Simulator.


    ![../images/501287_1_En_4_Chapter/501287_1_En_4_Fig1_HTML.png](images/501287_1_En_4_Chapter/501287_1_En_4_Fig1_HTML.png)


    Figure 4-1


    The SwiftUI view rendered in the iPhone Simulator with the fake data'
