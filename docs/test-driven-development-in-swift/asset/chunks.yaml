    \ test or all the tests did run:\n\n```\nclass LifeCycleExampleTest: XCTestCase\
    \ {\n    override class func setUp() {\n        print(\"This runs before all tests\"\
    )\n    }\n    override func setUpWithError() throws {\n        print(\"This runs\
    \ before each test\")\n    }\n    override func tearDownWithError() throws {\n\
    \        print(\"This runs after each test\")\n    }\n    override class func\
    \ tearDown() {\n        print(\"This runs after all tests\")\n    }\n    func\
    \ testA() throws {\n        print(\"This is test A\")\n    }\n    func testB()\
    \ throws {\n        print(\"This is test B\")\n    }\n}\n```\n\nThis is the console\
    \ output we’d get if we run `LifeCycleExampleTest`:\n\n```\nTest Suite 'LifeCycleExampleTest'\
    \ started at ...\nThis runs before all tests\nTest Case '-[Tests.LifeCycleExampleTest\
    \ testA]' started.\nThis runs before each test\nThis is test A\nThis runs after\
    \ each test\nTest Case '-[Tests.LifeCycleExampleTest testA]' passed ...\nTest\
    \ Case '-[Tests.LifeCycleExampleTest testB]' started.\nThis runs before each test\n\
    This is test B\nThis runs after each test\nTest Case '-[Tests.LifeCycleExampleTest\
    \ testB]' passed ...\nThis runs after all tests\nTest Suite 'LifeCycleExampleTest'\
    \ passed at ...\nExecuted 2 tests, with 0 failures (0 unexpected) in 0.003 (0.003)\
    \ seconds\n```\n\nAs your code becomes more complicated, it might seem tempting\
    \ to simplify your tests by preparing the components needed in the `setUp` methods\
    \ or to clean up the state of the app after the tests run in the `tearDown` methods.\n\
    \nWhen your tests become complicated to set up, they are sending you a signal\
    \ that the software design is getting complicated too. More often than not, using\
    \ `setUp` and `tearDown` is the wrong answer to the problem of keeping tests tidy.\n\
    \nYou’re better off taking a step back and simplifying your design, perhaps by\
    \ dividing an object with too many responsibilities into two or by injecting configurations\
    \ rather than depending on the global state. I’ll show you these and other techniques\
    \ throughout the book.\n\nThere are two scenarios, though, in which I find `setUp`\
    \ and `tearDown` useful. The first is when adding tests to code that depends on\
    \ global state and doesn’t have tests before making a change. Here, you should\
