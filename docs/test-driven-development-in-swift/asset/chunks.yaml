    About the Author About the Technical Reviewer


    # 1. Why Test-Driven Development?


    ## What Is a Test?


    The Oxford English Dictionary defines the noun *test* as: “*a procedure intended
    to establish the quality, performance, or reliability of something, especially
    before it is taken into widespread use*.”


    In the context of software development, we can adapt the definition to: “*a procedure
    intended to establish the software quality, performance, or reliability, especially
    before it is shipped to the users*.”


    To test our software essentially means to run it and verify it behaves as desired.


    Take this “Hello, world!” script, for example:


    ```

    #!/usr/bin/env xcrun swift

    func main() {

    guard CommandLine.argc > 1 else {

    print("Hello, world!")

    return

    }

    print("Hello, \(CommandLine.arguments[1])!")

    }

    main()

    ```


    A test for it could be to run it with no input, `./hello_world.swift`, and check
    that it prints “Hello, world!”. We can then run it with a specific input and verify
    it uses it in the salutation. For example, `./hello_world.swift Ada` should print
    “Hello, Ada!”.


    In the same way, you can launch an iOS app in the Simulator and click through
    its UI to check it behaves as you programmed it to. Or you can submit data using
    a form in a web application and then check that the database contains it.


    All the preceding examples share a trait: someone has to exercise the software
    and verify its behavior. They are *manual* tests.


    To consistently ship quality software on a schedule, manual testing is not enough.


    ## Manual Testing Is Inefficient


    We can manually test a little script like `hello_world.swift` thoroughly because
    of its narrow feature set, but real-world programs are not as simple. Even in
    the smallest application, there are many possible code paths, many permutations
    of inputs the code accepts, and steps a user can take within the system. To test
    them all manually would take *a lot* of time.


    Manual testing is costly as well as time consuming. Regardless of who performs
    the tests, whether it’s software or QA engineers, product owners, or a third-party
    firm, real people have salaries to be paid. They also need time off to rest, get
    sick, may forget things, and, inevitably, make mistakes.


    Skipping testing to save time and money would be a terrible move, though.


    If we don’t test our products before shipping them, the users will do it for us.
    That’s far from ideal. While we might celebrate discovering a bug, a user would
    get frustrated and possibly leave our product for a competitor.


    There must be a way to test our software to a high degree of confidence, fast,
    and without requiring humans to do all the work.'
