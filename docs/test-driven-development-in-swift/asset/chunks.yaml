    \ `OrderController` 实例：\n\n```\n// OrderController.swift\n// ...\nclass OrderController:\
    \ ObservableObject {\n    static let shared = OrderController()\n    // ...\n\
    }\n```\n\n更新 `MenuItemDetail.ViewModel`，将 `init` 中的参数访问替换为 `OrderController.shared`，从而使用共享实例而非传入的参数。接下来，更新针对按钮动作行为的断言，使其检查共享实例中的值。现在运行测试，你会发现它们全部失败。\n\
    \n你可以通过添加 `setUp` 和 `tearDown` 调用来解决这些失败，在每次测试前将 `OrderController.shared` 恢复到干净状态。另一种选择是对测试进行排序，使得某个测试对\
    \ `OrderController` 的更新恰好为下一个测试准备好所需状态。这两种替代方案都需要额外的工作，并且使测试设置更加僵化；使用依赖注入是更好的选择。\n\
    \n依赖注入让你的代码变得诚实。共享实例和单例允许你的对象获取并与其接口未声明的组件进行交互。正如 Miško Hevery 所说，它们让你的 API 变成了一个[*病态的骗子*](https://web.archive.org/web/20190618100426/http:/misko.hevery.com:80/2008/08/17/singletons-are-pathological-liars/)。在允许随意读取全局状态的代码库中，你无法信任调用的方法没有副作用，或者只与其签名中的依赖项协作，除非你检查它们的实现。代码推理变得困难，因为你永远不确定方法是否如其所述，或者背后是否还有更多操作。\n\
    \nTDD 引导你使用依赖注入。如果传入所有依赖项，而不是在实现中访问它们，那么从测试开始编写代码会更容易。这种从\"先写测试、快速获得反馈\"的需求中涌现出的软件设计，只包含显式依赖，因此更容易推理。\n\
    \nViewModel 的实现现已完成。是时候将其与视图层连接起来了。\n\n### 使用 `@EnvironmentObject` 进行依赖注入\n\n\
    `MenuItemDetail.ViewModel` 可以独立运行，但正如 `TODO` 注释提醒我们的，它使用的是专用的 `OrderController`\
    \ 实例，而不是共享实例。我们需要用与应用程序其余部分将使用的相同 `OrderController` 引用来实例化 `MenuItemDetail.ViewModel`。\n\
    \n当用户选择一个菜品时，`MenuList` 负责创建 `MenuItemDetail` 及其 ViewModel，因此它需要传入一个 `OrderController`\
    \ 实例。`MenuList` 如何获取一个实例呢？我们可以应用相同的思路，让负责创建 `MenuList` 的组件为其提供 `MenuItemDetail`\
    \ 所需的 `OrderController` 实例。`AlbertosApp` 创建了 `MenuList`，并且由于它是视图层次结构中的顶层元素，我们可以让它构建并持有\
    \ `OrderController` 值，以便在应用程序中共享。\n\n正如我们已经讨论过的，这种方法并不理想。在 Alberto 应用相对扁平的视图层次结构中，这看起来还行，但你会看到这是一个滑坡：视图层次结构越深、越复杂，你就需要编写更多代码来向下传递依赖。更重要的是，让\
    \ `MenuList` 在其 `init` 中要求一个 `OrderController` 会给人错误的印象，以为它需要使用它，而实际上它只是将其传递下去，从未与之交互。\n\
    \nSwiftUI 的 [`@EnvironmentObject`](https://developer.apple.com/documentation/swiftui/environmentobject)\
    \ 有助于扩展应用程序，而无需用长长的依赖注入链使视图层次结构臃肿。视图可以使用这个属性包装器从它们的环境中加载一个符合 `ObservableObject`\
    \ 协议的属性值。我们可以在视图访问它的某个祖先中，使用 [`environmentObject(_:)`](https://developer.apple.com/documentation/swiftui/view/environmentobject%2528_:%2529)\
    \ 方法将对象注册到环境中。\n\n`@EnvironmentObject` 让我们可以干净地共享对共享对象的访问，而无需将它们传递到视图层次结构的每一层。需要读取或与\
    \ `OrderController` 交互的 ViewModel 可以在其 `init` 参数中请求一个引用。实例化它们的视图可以通过 `@EnvironmentObject`\
    \ 从环境中获取共享实例并提供给它。\n\n让我们开始更新 `MenuItemDetail`，以使用其 ViewModel 中的新逻辑来驱动按钮行为：\n\n\
    ```\n// MenuItemDetail.swift\nimport SwiftUI\nstruct MenuItemDetail: View {\n\
    \    @ObservedObject private(set) var viewModel: ViewModel\n    var body: some\
    \ View {\n        // ...\n        Button(viewModel.addOrRemoveFromOrderButtonText)\
    \ {\n            viewModel.addOrRemoveFromOrder()\n        }\n        // ...\n\
    \    }\n}\n```\n\n如果你现在运行应用，点击按钮时会看到\"添加到订单\"按钮变为\"从订单中移除\"。再次得益于 TDD，我们在第一次尝试时就得到了一个可工作的应用。\n\
    \n我们继续处理之前遗留的 `TODO` 注释，并移除默认的 `OrderController` 值：\n\n```\n// MenuItemDetail.ViewModel.swift\n\
    init(item: MenuItem, orderController: OrderController) {\n    // ...\n}\n```\n\
    \n现在编译器无法构建 `MenuList`：\n\n```\n// MenuList.swift\nvar body: some View {\n   \
    \ // ...\n    List {\n        ForEach(sections) { section in\n            Section(header:\
    \ Text(section.category)) {\n                ForEach(section.items) { item in\n\
    \                    NavigationLink(destination: MenuItemDetail(viewModel: .init(item:\
    \ item))) {\n                        // 编译器说：调用中缺少参数\n                       \
    \ // 'orderController'\n                    }\n                }\n           \
    \ }\n        }\n    }\n}\n```\n\n让我们从环境中获取一个 `OrderController` 的引用，并用它来实例化 ViewModel：\n\
    \n```\n// MenuList.swift\n// ...\n@EnvironmentObject var orderController: OrderController\n\
    var body: some View {\n    // ...\n    List {\n        ForEach(sections) { section\
    \ in\n            Section(header: Text(section.category)) {\n                ForEach(section.items)\
    \ { item in\n                    NavigationLink(destination: destination(for:\
    \ item)) {\n                        // ...\n                    }\n          \
    \      }\n            }\n        }\n    }\n}\n\nfunc destination(for item: MenuItem)\
    \ -> MenuItemDetail {\n    return MenuItemDetail(viewModel: .init(item: item,\
    \ orderController: orderController))\n}\n```\n\n应用现在可以编译了，但如果你运行它，会看到它崩溃：\n\n\
    - 致命错误：未找到类型为 `OrderController` 的 `ObservableObject`。作为此视图的祖先，可能缺少 `View.environmentObject(_:)`\
    \ 的调用以提供 `OrderController`。\n"
- fmt: "### The Downside of `@EnvironmentObject`\n\nThe crash message we just received\
    \ is clear on what went wrong: we didn't call `environmentObject(_:)` on an ancestor\
    \ of `MenuList`. When the SwiftUI runtime tried to access the `OrderController`\
    \ property, it didn't find it and crashed.\n\nThe chance of crashing is a downside\
    \ of using `@EnvironmentObject`. If you forget to call `environmentObject(_:)`\
    \ or if someone accidentally removes an existing call, the app will crash.\n\n\
    In practice, though, it's unlikely you'll ship code that doesn't register a value\
    \ for each `@EnvironmentObject`. The kind of crash that comes with it is something\
    \ you would immediately notice when doing a manual pass of your finished feature.\n\
    \nYou *could* use a different approach to creating ViewModels that passes their\
    \ dependencies without using `@EnvironmentObject`. For example, you could use\
    \ a ViewModel factory object that instantiates and holds all of the dependencies\
    \ and that the views can use to get a prebuilt ViewModel. This option, though,\
    \ requires extra work and \"fights\" against the framework.\n\n`@EnvironmentObject`\
    \ is an API too convenient not to use it.\n\nBesides, this kind of crash can only\
    \ occur as the result of a developer error. As we've elaborated in Chapter 10\
    \ in the context of force-unwrapping the return value of a `URL(string:)` call\
    \ when the string is hardcoded, an early crash in development is an acceptable\
    \ way to notice a developer error.\n\nYou are better off investing in automation\
    \ and processes to catch missing `environmentObject(_:)` calls rather than using\
    \ a different Dependency Injection strategy.\n\nThe final step to make the app\
    \ work properly is to register an `OrderController` in the view environment. The\
    \ best place to do this is in the root view component:\n\n```swift\n// AlbertosApp.swift\n\
    import SwiftUI @main\nstruct AlbertosApp: App {\n    let orderController = OrderController()\n\
    \    var body: some Scene {\n        WindowGroup {\n            NavigationView\
    \ {\n                MenuList(\n                    viewModel: .init(\n      \
    \                  menuFetching: MenuFetcher()\n                    )\n      \
    \          )\n                .navigationTitle(\"Alberto's ![../images/501287_1_En_11_Chapter/501287_1_En_11_Figa_HTML.gif](images/501287_1_En_11_Chapter/501287_1_En_11_Figa_HTML.gif)\"\
    )\n            }\n            .environmentObject(orderController)\n        }\n\
    \    }\n}\n```\n\n### `@EnvironmentObject` vs. Directly Accessing Shared Instances\n\
    \nUsing `@EnvironmentObject` looks deceivingly similar to accessing a shared instance\
    \ in the view's implementation detail.\n\nThe difference is that `@EnvironmentObject`\
    \ is constrained to work with SwiftUI views; if you try to access a value via\
    \ this property wrapper on a type that is not a view, the app will crash. In our\
    \ Test-Driven Development approach to SwiftUI, views are thin components free\
    \ from any presentation logic. While it's true that using `@EnvironmentObject`\
    \ lets them access values under the hood, they only use them to initialize their\
    \ subviews' ViewModels.\n\nOn top of that, remember that we need to explicitly\
    \ register objects in the environment with `environmentObject(_:)`. If you register\
    \ all of the shared objects in your `App` implementation, there will always be\
    \ a single place where to go and discover everything available in the environment.\
    \ By contrast, there is no straightforward way to learn how many shared instance\
    \ properties are available and how many the app actually accesses.\n\nAs our application\
    \ grows, the number of view and business logic components will grow with it. Many\
    \ small self-contained view components are more comfortable to work with in isolation\
    \ but also make for a deep and intricate view hierarchy. Manually passing every\
    \ dependency a view needs to do its job through such hierarchy becomes cumbersome\
    \ and hard to maintain.\n\n`@EnvironmentObject` makes providing views their dependency\
    \ clean and straightforward to maintain, regardless of their depth in the hierarchy.\n\
    \nThe menu item detail screen is now complete. Figure 11-2 shows the order flow\
    \ from Figure 11-1 with the new screens instead of their placeholders.\n\n![../images/501287_1_En_11_Chapter/501287_1_En_11_Fig2_HTML.png](images/501287_1_En_11_Chapter/501287_1_En_11_Fig2_HTML.png)\n\
    \nFigure 11-2: The order flow through the app with the production screens\n\n\
    The process to update the remaining views is similar, so I'll leave it as an exercise\
    \ for you. In this chapter, we gave the user a way to compose their order; in\
    \ the next, we'll give them a way to pay for it.\n\n## Practice Time\n\nOnce the\
    \ order changes state, both `OrderButton` and `OrderDetail` should reflect it.\
    \ `OrderButton`'s text should be \"Your Order\" when the customer hasn't selected\
    \ anything and \"Your Order $ `<order total>`\" when there are items in the order.\
    \ The list of dishes and the total price summary in `OrderDetail` should also\
    \ reflect changes in the order state.\n\nTo do that, both ViewModels should expect\
    \ an `OrderController` reference and use it to read that information.\n\nImplement\
    \ that using the `@EnvironmentObject` injection approach.\n\n## Key Takeaways\n\
    \n- **Use Dependency Injection to share the same object with different components\
    \ instead of letting them access a shared instance internally.** DI makes your\
    \ code easier to test and reason about by making all of its dependencies explicit.\n\
    - **Use `@EnvironmentObject` to get a reference to a shared resource in a SwiftUI\
    \ view.** This property wrapper allows you to inject dependencies to components\
    \ that are deep in the view hierarchy without passing them through all the ancestors.\n\
    - **The view instantiating a child view's ViewModel can provide it with its dependencies\
    \ using `@EnvironmentObject`.**"
  raw: '### The Downside of `@EnvironmentObject`


    The crash message we just received is clear on what went wrong: we didn’t call
    `environmentObject(_:)` on an ancestor of `MenuList`. When the SwiftUI runtime
    tried to access the `OrderController` property, it didn’t find it and crashed.


    The chance of crashing is a downside of using `@EnvironmentObject`. If you forget
    to call `environmentObject(_:)` or if someone accidentally removes an existing
    call, the app will crash.


    In practice, though, it’s unlikely you’ll ship code that doesn’t register a value
    for each `@EnvironmentObject`. The kind of crash that comes with it is something
    you would immediately notice when doing a manual pass of your finished feature.


    You *could* use a different approach to creating ViewModels that passes their
    dependencies without using `@EnvironmentObject`. For example, you could use a
    [ViewModel factory](https://mokacoding.com/blog/swiftuidependency-injection/%2523view-models-view-model-factory)
    object that instantiates and holds all of the dependencies and that the views
    can use to get a prebuilt ViewModel. This option, though, requires extra work
    and “fights” against the framework.


    `@EnvironmentObject` is an API too convenient not to use it.


    Besides, this kind of crash can only occur as the result of a developer error.
    As we’ve elaborated in Chapter [10](#501287_1_En_10_Chapter.xhtml) in the context
    of force-unwrapping the return value of a `URL(string:)` call when the string
    is hardcoded, an early crash in development is an acceptable way to notice a developer
    error.


    You are better off investing in automation and processes to catch missing `environmentObject(_:)`
    calls rather than using a different Dependency Injection strategy.


    The final step to make the app work properly is to register an `OrderController`
    in the view environment. The best place to do this is in the root view component:


    ```

    // AlbertosApp.swift

    import SwiftUI @main

    struct AlbertosApp: App {

    let orderController = OrderController()

    var body: some Scene {

    WindowGroup {

    NavigationView {

    MenuList(

    viewModel: .init(

    menuFetching: MenuFetcher()

    )

    )

    ```


                    .navigationTitle("Alberto''s ![../images/501287_1_En_11_Chapter/501287_1_En_11_Figa_HTML.gif](images/501287_1_En_11_Chapter/501287_1_En_11_Figa_HTML.gif)")


    ```

    }

    .environmentObject(orderController)

    }

    }

    }

    ```


    ### `@EnvironmentObject` vs. Directly Accessing Shared Instances


    Using `@EnvironmentObject` looks deceivingly similar to accessing a shared instance
    in the view’s implementation detail.


    The difference is that `@EnvironmentObject` is constrained to work with SwiftUI
    views; if you try to access a value via this property wrapper on a type that is
    not a view, the app will crash. In our Test-Driven Development approach to SwiftUI,
    views are thin components free from any presentation logic. While it’s true that
    using `@EnvironmentObject` lets them access values under the hood, they only use
    them to initialize their subviews’ ViewModels.


    On top of that, remember that we need to explicitly register objects in the environment
    with `environmentObject(_:)`. If you register all of the shared objects in your
    `App` implementation, there will always be a single place where to go and discover
    everything available in the environment. By contrast, there is no straightforward
    way to learn how many shared instance properties are available and how many the
    app actually accesses.


    As our application grows, the number of view and business logic components will
    grow with it. Many small self-contained view components are more comfortable to
    work with in isolation but also make for a deep and intricate view hierarchy.
    Manually passing every dependency a view needs to do its job through such hierarchy
    becomes cumbersome and hard to maintain.


    `@EnvironmentObject` makes providing views their dependency clean and straightforward
    to maintain, regardless of their depth in the hierarchy.


    The menu item detail screen is now complete. Figure [11-2](#501287_1_En_11_Chapter.xhtml#Fig2)
    shows the order flow from Figure [11-1](#501287_1_En_11_Chapter.xhtml#Fig1) with
    the new screens instead of their placeholders.


    ![../images/501287_1_En_11_Chapter/501287_1_En_11_Fig2_HTML.png](images/501287_1_En_11_Chapter/501287_1_En_11_Fig2_HTML.png)


    Figure 11-2


    The order flow through the app with the production screens


    The process to update the remaining views is similar, so I’ll leave it as an exercise
    for you. In this chapter, we gave the user a way to compose their order; in the
    next, we’ll give them a way to pay for it.


    ## Practice Time


    Once the order changes state, both `OrderButton` and `OrderDetail` should reflect
    it. `OrderButton`’s text should be “Your Order” when the customer hasn’t selected
    anything and “Your Order $ `<order total>`” when there are items in the order.
    The list of dishes and the total price summary in `OrderDetail` should also reflect
    changes in the order state.


    To do that, both ViewModels should expect an `OrderController` reference and use
    it to read that information.


    Implement that using the `@EnvironmentObject` injection approach.


    ## Key Takeaways


    *   **Use Dependency Injection to share the same object with different components
    instead of letting them access a shared instance internally**. DI makes your code
    easier to test and reason about by making all of its dependencies explicit.


    *   **Use** **@EnvironmentObject** **to get a reference to a shared resource in
    a** **SwiftUI** **view**. This property wrapper allows you to inject dependencies
    to components that are deep in the view hierarchy without passing them through
    all the ancestors.


    *   **The view instantiating a child view’s ViewModel can provide it with its
    dependencies using** **@EnvironmentObject**.'
  trans: "\n### `@EnvironmentObject` 的缺点\n\n我们刚刚收到的崩溃信息清楚地指出了问题所在：我们没有在 `MenuList`\
    \ 的祖先视图上调用 `environmentObject(_:)`。当 SwiftUI 运行时试图访问 `OrderController` 属性时，未能找到它，从而导致崩溃。\n\
    \n发生崩溃的可能性是使用 `@EnvironmentObject` 的一个缺点。如果你忘记调用 `environmentObject(_:)`，或者有人不小心移除了一个现有的调用，应用就会崩溃。\n\
    \n不过在实践中，你不太可能交付一份没有为每个 `@EnvironmentObject` 注册对应值的代码。这种类型的崩溃在你手动测试已完成功能时就会立即被发现。\n\
    \n你*可以*采用另一种方式来创建 ViewModel，即在不使用 `@EnvironmentObject` 的情况下传递它们的依赖。例如，你可以使用一个\
    \ ViewModel 工厂对象，该对象负责实例化并持有所有依赖，视图可以从中获取预构建的 ViewModel。不过，这种选择需要额外的工作，并且会“对抗”框架本身。\n\
    \n`@EnvironmentObject` 是一个好用得让人无法不用的 API。\n\n此外，这种崩溃只可能因开发者错误而发生。正如我们在第 10 章中关于对硬编码字符串调用\
    \ `URL(string:)` 的返回值进行强制解包的讨论一样，开发阶段的早期崩溃是发现开发者错误的一种可接受方式。\n\n与其使用不同的依赖注入策略，你更应该投资于自动化和流程，来捕获缺失的\
    \ `environmentObject(_:)` 调用。\n\n让应用正常工作的最后一步是在视图环境中注册一个 `OrderController`。最佳的位置是在根视图组件中：\n\
    \n```swift\n// AlbertosApp.swift\nimport SwiftUI @main\nstruct AlbertosApp: App\
    \ {\n    let orderController = OrderController()\n    var body: some Scene {\n\
    \        WindowGroup {\n            NavigationView {\n                MenuList(\n\
    \                    viewModel: .init(\n                        menuFetching:\
    \ MenuFetcher()\n                    )\n                )\n                .navigationTitle(\"\
    Alberto's ![../images/501287_1_En_11_Chapter/501287_1_En_11_Figa_HTML.gif](img/501287_1_En_11_Figa_HTML.gif)\"\
    )\n            }\n            .environmentObject(orderController)\n        }\n\
    \    }\n}\n```\n\n### `@EnvironmentObject` 与直接访问共享实例\n\n在视图的实现细节中，使用 `@EnvironmentObject`\
    \ 看起来与访问一个共享实例非常相似。\n\n区别在于 `@EnvironmentObject` 被限制只能用于 SwiftUI 视图；如果你尝试在非视图类型的类型上通过这个属性包装器访问一个值，应用将会崩溃。在我们基于测试驱动开发的\
    \ SwiftUI 方法中，视图是薄层组件，不包含任何展示逻辑。虽然使用 `@EnvironmentObject` 确实能让它们在底层访问某些值，但它们仅用这些值来初始化其子视图的\
    \ ViewModel。\n\n除此之外，请记住我们需要通过 `environmentObject(_:)` 在环境中显式注册对象。如果你在你的 `App`\
    \ 实现中注册了所有共享对象，那么总会有一个单一的位置可以去查看和发现环境中所有可用的内容。相比之下，并没有直接的方法可以了解有多少个共享实例属性可用，以及应用实际访问了多少个。\n\
    \n随着我们应用的成长，视图和业务逻辑组件的数量也会随之增长。许多独立的小型视图组件在单独处理时更舒适，但这也会导致视图层级变得深且复杂。通过这样的层级结构手动传递视图完成其工作所需的每一个依赖会变得繁琐且难以维护。\n\
    \n`@EnvironmentObject` 为视图提供其依赖的方式既干净又易于维护，无论它们在层级结构中处于多深的位置。\n\n菜单项详情屏幕现已完成。图\
    \ 11-2 展示了图 11-1 中的订单流程，其中新屏幕已替换了原来的占位符。\n\n![../images/501287_1_En_11_Chapter/501287_1_En_11_Fig2_HTML.png](img/501287_1_En_11_Fig2_HTML.png)\n\
    \n图 11-2：使用正式界面的应用内订单流程\n\n更新其余视图的过程类似，所以我将把它留作练习给你。在本章中，我们为用户提供了组合订单的方式；在下一章中，我们将让他们能够进行支付。\n\
    \n## 练习时间\n\n一旦订单状态发生变化，`OrderButton` 和 `OrderDetail` 都应该反映这一变化。当顾客未选择任何东西时，`OrderButton`\
    \ 的文本应为 \"Your Order\"；当订单中有商品时，文本应为 \"Your Order $ `<订单总额>`\"。`OrderDetail` 中的菜品列表和总价摘要也应反映订单状态的变化。\n\
    \n为此，两个 ViewModel 都应该期望接收一个 `OrderController` 引用，并用它来读取这些信息。\n\n请使用 `@EnvironmentObject`\
    \ 注入方法来实现。\n\n## 关键要点\n\n-   **使用依赖注入将同一个对象共享给不同组件，而不是让它们在内部访问一个共享实例。** DI 通过使所有依赖关系显式化，让你的代码更易于测试和推理。\n\
    -   **在 SwiftUI 视图中使用 `@EnvironmentObject` 来获取共享资源的引用。** 这个属性包装器允许你将依赖注入到层级结构深处的组件，而无需通过所有祖先视图传递它们。\n\
    -   **实例化子视图 ViewModel 的视图可以使用 `@EnvironmentObject` 为其提供依赖。**\n"
- fmt: "# 12. Testing Side Effects\n\n*How do you write tests for a system that does\
    \ not return an output but changes another object’s state instead?*\n\n*By* *spying*\
    \ *on the object affected by the SUT.*\n\nIf you have control over the object\
    \ on which the side effect occurs, you can inspect its state to verify it matches\
    \ your expectation, but what if you don’t? For example, how can you verify that\
    \ an object calls a method on a third-party SDK as a result of a particular operation?\n\
    \nThis chapter introduces a new kind of Test Double that allows us to do precisely\
    \ that: the *Spy*. Using a Spy, you can replace a real dependency of your SUT\
    \ with one that records which method calls it receives and the arguments passed\
    \ to them, so you can assert the interaction occurred as expected.\n\nWe’ve come\
    \ a long way since starting to work on Alberto’s app. One test at a time, we went\
    \ from an app showing a hardcoded menu to one that loads it from a remote API\
    \ and allows customers to select the dishes they want to order.\n\nThe final piece\
    \ of the puzzle is to submit the order and pay for it. Figure [12-1](#501287_1_En_12_Chapter.xhtml#Fig1)\
    \ shows the payment flow: when the user clicks the checkout button, the app submits\
    \ the order to a remote service that processes the payment and queues it in the\
    \ kitchen. When the service finishes, the app notifies the user of the result.\
    \ Using an alert is a simple way to show the outcome on-screen. It’s an application\
    \ of the Partition Problem and Solve Sequentially technique. First, build a working\
    \ version of the flow, and then you can iterate and refine its UX.\n\n![../images/501287_1_En_12_Chapter/501287_1_En_12_Fig1_HTML.png](images/501287_1_En_12_Chapter/501287_1_En_12_Fig1_HTML.png)\n\
    \nFigure 12-1\n\nThe payment flow\n\nManaging payments is notoriously hard: there\
    \ are required safety measures and different vendors that users expect available\
    \ from the get-go. As a one-person shop, you decide to outsource the responsibility\
    \ of managing payments to a third-party service.\n\nHippo Payments, the provider\
    \ you chose, offers a Swift SDK to manage all your payments as a black box; you\
    \ call it, and it takes care of authentication, vendor selection, and fulfillment.\n\
    \nHere’s the Hippo Payments SDK interface:\n\n```\nclass HippoPaymentsProcessor\
    \ {\n    init(apiKey: String)\n    func processPayment(\n        payload: [String\
    \ : Any],\n        onSuccess: @escaping () -> Void,\n        onFailure: @escaping\
    \ (HippoPaymentsError) -> Void\n    )\n}\n```\n\nWe can add a button to the `OrderDetail`\
    \ view that, when tapped, triggers the payment flow, eventually calling the `processPayment`\
    \ from the SDK.\n\nThe test list for this behavior consists of a single test:\n\
    \n```\n// OrderDetail.ViewModelTests.swift\n// ...\nfunc testWhenCheckoutButtonTappedStartsPaymentProcessingFlow()\
    \ {}\n```\n\nThe implementation can be similar to what we did for the user interaction:\
    \ pass an SDK instance to `OrderDetail.ViewModel` and expose a method for `OrderDetail`\
    \ to use as the button action with the logic to call the SDK.\n\nHow can we test\
    \ that the checkout button action starts the payment flow when that doesn’t result\
    \ in any visible state change in `HippoPaymentProcessing`?\n\nLet’s update `OrderDetail.ViewModel`’s\
