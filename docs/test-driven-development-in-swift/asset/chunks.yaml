    \ : item.name\n}\n```\n\n运行测试，你会看到它们通过了。\n\n通常情况下，软件开发意味着编辑现有代码，而不是编写新代码。这些简单的例子展示了持续实践\
    \ TDD 将如何帮助你维护不断成熟的代码库，以及当你从绿地开发转向既有代码库时如何应对。\n\n当你需要修复一个 bug 时，很可能存在一个现有测试，你可以复制并调整它以复现错误的运行行为。相反，如果你需要修改现有行为，那么只需查看它的测试。用新的预期结果更新断言，并观察它们如何失败。现有测试为你提供了修改行为的清晰起点。\n\
    \n当代码库和团队规模增长时，拥有一套测试套件作为探索工具极具价值。当你需要修改不熟悉的代码区域时，优先查看其测试：它们会指引你需要前往的方向。\n\n#\
    \ 关键要点\n\n* **TDD 不仅有助于编写新功能，还能帮助你维护现有代码。**\n* **要使用 TDD 修复 bug，先编写一个能复现它的测试，然后使其通过。**\n\
    * **要更新现有代码，请更新测试以断言新行为，然后跟随其反馈来实现它。**\n\n# 15. 使用假件保持测试隔离，使用傀儡保持测试清晰\n\n*当被测系统依赖全局状态时，如何保持测试隔离？*\n\
    \n*通过将依赖项转移到内存中，使用假件测试双打。*\n\n*如何清晰区分哪些依赖影响被测试的行为，哪些不影响？*\n\n*通过使用一个不做任何事的傀儡测试双打来替换那些不影响行为的依赖项。*\n\
    \n我们已经了解了测试双打，即被测系统依赖项的“测试专用等价物”，以及如何使用其中两种：存根控制被测系统的输入（第 8 章和第 10 章），间谍记录其对其他对象产生的影响效果（第\
    \ 12 章）。\n\n你可能偶尔还会用到另外两种测试双打。*假件* 用一个更简单的实现替换依赖项，并复现其行为。*傀儡* 提供一个不做任何事的实现来填充依赖项。在本章中，我们将学习如何使用它们以及何时使用。\n"
- fmt: '# Fake: How to Bypass Slow or Stateful Dependencies


    Suppose you wanted to make the order persist between app launches so that users
    won’t risk losing it if they switch to another app and the OS kills yours. For
    the sake of keeping this example short, let’s use `UserDefaults` as the storage
    layer.


    Your first step is to define an abstraction for the `Order` storing capability
    and make `UserDefaults` conform to it:


    ```

    // OrderStoring.swift

    protocol OrderStoring {

    func getOrder() -> Order

    func updateOrder(_ order: Order)

    }

    ```


    The implementation details of how `UserDefaults` conforms to `OrderStoring` are
    irrelevant for what we want to explore here. You can find a working version in
    the source code for this chapter.


    The next step is refactoring `OrderController` to use an `OrderStoring`-conforming
    type to read and update the order:


    ```

    // OrderController.swift

    import Combine

    import Foundation

    class OrderController: ObservableObject {

    @Published private(set) var order: Order

    private let orderStoring: OrderStoring

    init(orderStoring: OrderStoring = UserDefaults.standard) {

    self.orderStoring = orderStoring

    order = orderStoring.getOrder()

    }

    func isItemInOrder(_ item: MenuItem) -> Bool {

    return order.items.contains { $0 == item }

    }

    func addToOrder(item: MenuItem) {

    updateOrder(with: Order(items: order.items + [item]))

    }

    func removeFromOrder(item: MenuItem) {

    let items = order.items

    guard let indexToRemove = items.firstIndex(where: { $0.name == item.name }) else
    { return }

    let newItems = items.enumerated().compactMap { (index, element) -> MenuItem? in

    guard index == indexToRemove else { return element }

    return .none

    }

    updateOrder(with: Order(items: newItems))

    }

    func resetOrder() {

    updateOrder(with: Order(items: []))

    }

    private func updateOrder(with newOrder: Order) {

    orderStoring.updateOrder(newOrder)

    order = newOrder

    }

    }

    ```


    After this refactoring, you’d expect the tests to pass, but that’s not the case.
    Not only do they fail but running them multiple times results in different failures.


    The tests exercise the production code, which uses `UserDefaults.standard` because
    of the default value in the `OrderController init`.


    `UserDefaults` is a storage component: it’s stateful. When the tests run, they
    change the `UserDefaults` state by storing values in it, and those changes persist
    between tests and app launches.


    The tests also read from `UserDefaults.standard`, meaning they depend on a stateful
    component and are no longer isolated. The Fake Test Double allows us to break
    this dependency.


    We can build a Fake for `OrderStoring` that behaves like `UserDefaults` but doesn’t
    persist its changes between individual test executions or app launches. This way,
    we can make the tests isolated and stateless again. Let’s initialize `OrderDetail.ViewModel`
    with a Fake:


    ```

    // OrderStoringFake.swift

    @testable import Albertos

    class OrderStoringFake: OrderStoring {

    private var order: Order = Order(items: [])

    func getOrder() -> Order {

    return order

    }

    func updateOrder(_ order: Order) {

    self.order = order

    }

    }

    // OrderDetail.ViewModelTests.swift

    // ...

    class OrderDetailViewModelTests: XCTestCase {

    func testWhenCheckoutButtonTappedStartsPaymentProcessingFlow() {

    let orderController = OrderController(orderStoring: OrderStoringFake())

    // ...

    ```


    Thanks to `OrderStoringFake`, each test now runs with a fresh `OrderStoring` instance.
    The tests are isolated: the changes that one makes in its `OrderStoringFake` won’t
    affect the others.


    We could have worked around the `UserDefaults` statefulness by resetting its content
    in the `setUp` and `tearDown` methods, but doing so would have required more work
    and made the test case longer. Plus, we would need to replicate the `setUp` and
    `tearDown` harness in every test case using `OrderDetail.ViewModel`. Overall,
    using a Fake requires less code and less maintenance.


    Fakes are also useful when the dependency is slow. In Chapter [10](#501287_1_En_10_Chapter.xhtml),
    we used a Stub to replace the unpredictable network response time with a constant
    0.1-second delay and control the response it sent. Similarly, our production system
    might depend on slow or asynchronous computations, which we can replace with a
    much faster version in the tests.


    ## Dummy: How to Provide Dependencies That Are Required but Irrelevant for the
    Behavior Being Tested


    Objects such as ViewModels often *coordinate* different components interacting
    with their view. For example, `OrderDetail.ViewModel` is responsible for defining
    the content for the view to show, starting the payment process, and reacting to
    its result.


    The tests for the presentation logic in `OrderDetail.ViewModel` need an instance
    conforming to `PaymentProcessing` to instantiate the SUT, even though the output
    they’re testing doesn’t depend on the payment outcome.


    Using any of the Test Doubles we’ve seen so far would make the test compile but
    could also trick a reader into thinking the dependency is relevant for the test.
    A Spy would be confusing because we’d set it but never read any of its properties.
    Using a Fake or a Stub might suggest that the dependency provides an indirect
    input that affects the test outcome:


    ```

    // OrderDetail.ViewModelTests.swift

    func testWhenOrderIsEmptyShouldNotShowTotalAmount() {

    let viewModel = OrderDetail.ViewModel(

    orderController: OrderController(

    orderStoring: OrderStoringFake()

    ),

    paymentProcessor: ???

    onAlertDismiss: {}

    )

    XCTAssertNil(viewModel.totalText)

    }

    ```


    How can we make it clear that the `PaymentProcessing` instance doesn’t affect
    those tests? With a Test Double that doesn’t do anything – the Dummy:


    ```

    // PaymentProcessingDummy .swift

    @testable import Albertos

    import Combine

    class PaymentProcessingDummy: PaymentProcessing {

    func process(order: Order) -> AnyPublisher {

    return Result.success(())

    .publisher

    .eraseToAnyPublisher()

    }

    }

    ```


    Notice that this Dummy publishes a `Void` value in its `process(order:)` implementation.
    I defined Dummies as doubles that don’t do anything, but we still need to write
    them so they compile. When implementing a Dummy that has to return a result, choose
    the simplest code you can come up with. Dummies work as placeholders only so it
    doesn’t matter what output they provide.


    Now that we built a Dummy for `PaymentProcessing`, we can update those tests that
    don’t directly depend on the order payment processing to use it, for example:


    ```

    // OrderDetail.ViewModelTests.swift

    func testWhenOrderIsEmptyShouldNotShowTotalAmount() {

    let viewModel = OrderDetail.ViewModel(

    orderController: OrderController(

    orderStoring: OrderStoringFake()

    ),

    paymentProcessor: PaymentProcessingDummy(),

    onAlertDismiss: {}

    )

    XCTAssertNil(viewModel.totalText)

    }

    ```


    Dummies improve our tests “by leaving out the irrelevant code that would be necessary
    to build real objects and by making it clear which objects and values are not
    used by the SUT,” as Gerard Meszaros explains in [*xUnit Test Patterns*](http://xunitpatterns.com/).
    As we discussed in Chapter [4](#501287_1_En_4_Chapter.xhtml) regarding fixtures,
    the easier a test is to read and reason about, the easier it will be to work with
    it.


    We can apply the idea of a Dummy to the `onAlertDismiss` value as well, to show
    that it does not affect the test either:


    ```

    // OrderDetail.ViewModelTests .swift

    // ...

    class OrderDetailViewModelTests: XCTestCase {

    let alertDismissDummy: () -> Void = {}

    // ...

    func testWhenOrderIsEmptyShouldNotShowTotalAmount() {

    let viewModel = OrderDetail.ViewModel(

    orderController: OrderController(

    orderStoring: OrderStoringFake()

    ),

    paymentProcessor: PaymentProcessingDummy(),

    onAlertDismiss: alertDismissDummy

    )

    XCTAssertNil(viewModel.totalText)

    }

    }

    ```


    Add Fakes and Dummies next to Stubs and Spies in your Test Double toolbox to write
    tests for any kind of behavior. Avoid depending on global state and slow computations
    with a Fake, and make it clear when there are components that are required but
    irrelevant with a Dummy.'
