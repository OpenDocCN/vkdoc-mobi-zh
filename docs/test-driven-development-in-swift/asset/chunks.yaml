    \ with inline strings and optimizing your tests’ understandability.\n\nNow that\
    \ we’ve explored the *how* of JSON decoding testing, let’s take a step back and\
    \ look at the *when*. When is TDD useful to implement JSON decoding?"
  raw: '## Option 2: JSON Files


    Another option to provide the input for our test is to have JSON files holding
    the input values.


    To add a JSON file to your test target


    1.  Select the test target folder in the project navigator.


    2.  Right-click it and click “New File…” or press `Cmd N`.


    3.  Select the Other ➤ Empty file and then click “Next” or press `Enter`.


    Figure [9-1](#501287_1_En_9_Chapter.xhtml#Fig1) shows the Empty file option from
    the Xcode “New File…” dialog.


    ![../images/501287_1_En_9_Chapter/501287_1_En_9_Fig1_HTML.jpg](images/501287_1_En_9_Chapter/501287_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    The Xcode New File… dialog, filtered to show only empty file templates


    1.  Add the `.json` extension to the file name and select “Create” or press `Enter`.


    Figure [9-2](#501287_1_En_9_Chapter.xhtml#Fig2) shows the final dialog in the
    “New File…” sequence, where you can choose the name, location, and target for
    the file.


    ![../images/501287_1_En_9_Chapter/501287_1_En_9_Fig2_HTML.jpg](images/501287_1_En_9_Chapter/501287_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    The Xcode dialog to name and add a new file to the file system and project targets


    1.  Populate the file with the JSON for the menu item:


    ```

    // menu_item.json

    {

    "name": "a name",

    "category": "a category",

    "spicy": true

    }

    ```


    Alternatively, you can create the JSON file with your favorite text editor and
    save it into the test target folder. From Xcode, you can then right-click the
    test target folder and select “Add Files To ‘`<test target name>`’…” or press
    `Cmd Alt A` to reveal a file navigator where to select your JSON file.


    Once the file is part of the project, you can load it in the tests like this:


    ```

    // MenuItemTests.swift

    // ...

    func testDecodesFromJSONData() throws {

    let url = try XCTUnwrap(

    Bundle(for: type(of: self)).url(forResource: "menu_item", withExtension: "json")

    )

    let data = try Data(contentsOf: url)

    let item = try JSONDecoder().decode(MenuItem.self, from: data)

    XCTAssertEqual(item.name, "a name")

    XCTAssertEqual(item.category, "a category")

    XCTAssertEqual(item.spicy, true)

    }

    ```


    If you haven’t removed the source changes we wrote in the previous example, this
    test will immediately pass.


    We can make the test code tidier by extracting the file-reading logic into a helper
    function. This is useful to do if you have more than a couple of tests for model
    decoding:


    ```

    // XCTestCase+JSON.swift

    import XCTest

    extension XCTestCase {

    func dataFromJSONFileNamed(_ name: String) throws -> Data {

    let url = try XCTUnwrap(

    Bundle(for: type(of: self)).url(forResource: name, withExtension: "json")

    )

    return try Data(contentsOf: url)

    }

    }

    ```


    ```

    // MenuItemTests.swift

    // ...

    func testDecodesFromJSONData() throws {

    let data = try dataFromJSONFileNamed("menu_item")

    let item = try JSONDecoder()    .decode(MenuItem.self, from: data)

    XCTAssertEqual(item.name, "a name")

    XCTAssertEqual(item.category, "a category")

    XCTAssertEqual(item.spicy, true)

    }

    ```


    ## Which Option to Choose?


    The advantage of using inline strings is that you can keep the input values close
    to the expectation they support. With the JSON file option, it’s unclear where
    “a name,” “a category,” and `true` come from, the only way to be sure is to check
    the JSON file as well.


    On the other hand, using JSON files makes our tests tidier. As your input JSON
    grows in size, the inline string approach will result in longer and longer test
    methods, whereas tests loading the data from a file won’t need more input setup
    code.


    Using JSON files is also useful if you can automate generating them from your
    API, making sure the decoding is up to date without putting in place a full end-to-end
    integration test suite.


    If you have input data that varies a lot, you’ll end up with many JSON files,
    one for each variation. In this case, generating the input via string interpolation
    might be easier to maintain:


    ```

    // MenuItem+JSONFixture.swift

    @testable import Albertos

    extension MenuItem {

    static func jsonFixture(

    name: String = "a name",

    category: String = "a category",

    spicy: Bool = false

    ) -> String {

    return """

    {

    "name": "\(name)",

    "category": "\(category)",

    "spicy": \(spicy)

    }"""

    }

    }

    // MenuItemTests.swift

    // ...

    func testWhenDecodedFromJSONDataHasAllTheInputProperties() throws {

    let json = MenuItem.jsonFixture(    name: "a name",     category: "a category",     spicy:
    false)

    let data = try XCTUnwrap(json.data(using: .utf8))

    let item = try JSONDecoder().decode(MenuItem.self, from: data)

    XCTAssertEqual(item.name, "a name")

    XCTAssertEqual(item.category, "a category")

    XCTAssertEqual(item.spicy, false)

    }

    ```


    Which option to choose depends on your domain model. If your API has many entities,
    each rich with properties, then using files might make it easier to navigate your
    test suite.


    Unless you are building an app against an existing API and already know what you’re
    dealing with, I recommend starting with inline strings and optimizing your tests’
    understandability.


    Now that we’ve explored the *how* of JSON decoding testing, let’s take a step
    back and look at the *when*. When is TDD useful to implement JSON decoding?'
  trans: "\n# 选项 2：JSON 文件\n\n为测试提供输入的另一种方式是使用 JSON 文件来保存输入值。\n\n要向测试目标添加 JSON 文件：\n\
    \n1. 在项目导航器中选择测试目标文件夹。\n2. 右键点击它，然后点击“新建文件…”或按下 `Cmd N`。\n3. 选择“其他”➤“空文件”，然后点击“下一步”或按下\
    \ `Enter`。\n\n图 9-1 展示了 Xcode“新建文件…”对话框中的“空文件”选项。\n\n![../images/501287_1_En_9_Chapter/501287_1_En_9_Fig1_HTML.jpg](img/501287_1_En_9_Fig1_HTML.jpg)\n\
    \n**图 9-1** Xcode“新建文件…”对话框，已筛选为仅显示空文件模板\n\n4. 为文件名添加 `.json` 扩展名，然后选择“创建”或按下\
    \ `Enter`。\n\n图 9-2 展示了“新建文件…”流程中的最终对话框，你可以在其中选择文件的名称、位置和目标。\n\n![../images/501287_1_En_9_Chapter/501287_1_En_9_Fig2_HTML.jpg](img/501287_1_En_9_Fig2_HTML.jpg)\n\
    \n**图 9-2** Xcode 中用于命名文件并将其添加到文件系统和项目目标的对话框\n\n5. 用菜单项的 JSON 数据填充该文件：\n\n```\n\
    // menu_item.json\n{\n\"name\": \"a name\",\n\"category\": \"a category\",\n\"\
    spicy\": true\n}\n```\n\n或者，你也可以使用你喜欢的文本编辑器创建 JSON 文件，并将其保存到测试目标文件夹中。然后，在 Xcode\
    \ 中右键点击测试目标文件夹，选择“将文件添加到‘`<测试目标名称>`’…”或按下 `Cmd Alt A`，即可打开文件导航器来选择你的 JSON 文件。\n\
    \n一旦文件成为项目的一部分，你就可以像这样在测试中加载它：\n\n```\n// MenuItemTests.swift\n// ...\nfunc testDecodesFromJSONData()\
    \ throws {\n    let url = try XCTUnwrap(\n        Bundle(for: type(of: self)).url(forResource:\
    \ \"menu_item\", withExtension: \"json\")\n    )\n    let data = try Data(contentsOf:\
    \ url)\n    let item = try JSONDecoder().decode(MenuItem.self, from: data)\n \
    \   XCTAssertEqual(item.name, \"a name\")\n    XCTAssertEqual(item.category, \"\
    a category\")\n    XCTAssertEqual(item.spicy, true)\n}\n```\n\n如果你还没有删除上一个示例中我们编写的源码更改，那么这个测试会立即通过。\n\
    \n通过将文件读取逻辑提取到一个辅助函数中，我们可以让测试代码更整洁。如果你有不止一两个用于模型解码的测试，这会很有用：\n\n```\n// XCTestCase+JSON.swift\n\
    import XCTest\nextension XCTestCase {\n    func dataFromJSONFileNamed(_ name:\
    \ String) throws -> Data {\n        let url = try XCTUnwrap(\n            Bundle(for:\
    \ type(of: self)).url(forResource: name, withExtension: \"json\")\n        )\n\
    \        return try Data(contentsOf: url)\n    }\n}\n```\n\n```\n// MenuItemTests.swift\n\
    // ...\nfunc testDecodesFromJSONData() throws {\n    let data = try dataFromJSONFileNamed(\"\
    menu_item\")\n    let item = try JSONDecoder().decode(MenuItem.self, from: data)\n\
    \    XCTAssertEqual(item.name, \"a name\")\n    XCTAssertEqual(item.category,\
    \ \"a category\")\n    XCTAssertEqual(item.spicy, true)\n}\n```\n\n## 该选择哪个选项？\n\
    \n使用内联字符串的优势在于，你可以将输入值与其支持的期望值放在一起。使用 JSON 文件选项时，不清楚“a name”、“a category”和 `true`\
    \ 来自哪里，唯一确认的方法就是同时检查 JSON 文件。\n\n另一方面，使用 JSON 文件能让测试更整洁。随着输入 JSON 数据的规模增大，内联字符串方法会导致测试方法越来越长，而从文件加载数据的测试则无需更多的输入设置代码。\n\
    \n如果你能够从 API 自动生成 JSON 文件，那么使用 JSON 文件也很有用，这样无需建立完整的端到端集成测试套件，就能确保解码内容是最新的。\n\n\
    如果输入数据变化很大，最终你会有很多 JSON 文件，每种变化对应一个。在这种情况下，通过字符串插值生成输入可能更容易维护：\n\n```\n// MenuItem+JSONFixture.swift\n\
    @testable import Albertos\nextension MenuItem {\n    static func jsonFixture(\n\
    \        name: String = \"a name\",\n        category: String = \"a category\"\
    ,\n        spicy: Bool = false\n    ) -> String {\n        return \"\"\"\n   \
    \     {\n        \"name\": \"\\(name)\",\n        \"category\": \"\\(category)\"\
    ,\n        \"spicy\": \\(spicy)\n        }\"\"\"\n    }\n}\n```\n\n```\n// MenuItemTests.swift\n\
    // ...\nfunc testWhenDecodedFromJSONDataHasAllTheInputProperties() throws {\n\
    \    let json = MenuItem.jsonFixture(name: \"a name\", category: \"a category\"\
    , spicy: false)\n    let data = try XCTUnwrap(json.data(using: .utf8))\n    let\
    \ item = try JSONDecoder().decode(MenuItem.self, from: data)\n    XCTAssertEqual(item.name,\
    \ \"a name\")\n    XCTAssertEqual(item.category, \"a category\")\n    XCTAssertEqual(item.spicy,\
    \ false)\n}\n```\n\n选择哪个选项取决于你的领域模型。如果你的 API 有许多实体，且每个实体都有丰富的属性，那么使用文件可能会让你更容易浏览测试套件。\n\
    \n除非你正在基于现有 API 构建应用，并且已经知道自己要处理什么，否则我建议先从内联字符串开始，并优先优化测试的可理解性。\n\n现在我们已经探讨了 JSON\
    \ 解码测试的*方式*，让我们退一步，看一下*时机*。什么时候 TDD 对实现 JSON 解码有用？\n"
- fmt: "# Is Testing JSON Decoding Worth It?\n\nIt depends. Like everything else in\
    \ software development, it's a matter of tradeoffs.\n\nIn the tests we wrote earlier,\
    \ most of what we're testing is the behavior of Swift's `JSONDecoder`. That's\
    \ code that we can't control, and, since it comes from the Swift standard library,\
    \ it's safe to assume it works as advertised.\n\nIf all you need to decode JSON\
    \ data coming from an API is adding `Decodable` to the list of protocols a type\
    \ conforms to, then a test may not be worth it. If you still want to have a safeguard\
    \ against the code breaking, you can write a simpler test, one that merely ensures\
    \ the decoding doesn't throw an error:\n\n```\nfunc testWhenDecodingFromJSONDataDoesNotThrow()\
    \ throws {\nlet json = #\"{ \"name\": \"a name\", \"category\": \"a category\"\
    , \"spicy\": true }\"#\nlet data = try XCTUnwrap(json.data(using: .utf8))\nXCTAssertNoThrow(try\
    \ JSONDecoder().decode(MenuItem.self, from: data))\n}\n```\n\nIf you're doing\
    \ something nontrivial in the decoding, then a test to make sure everything is\
    \ working correctly is valuable.\n\nFor example, let's say the JSON comes with\
    \ an object for the `category` instead of a plain string:\n\n```\n{\n\"name\"\
    : \"tortellini alla panna\",\n\"category\": {\n\"name\": \"pasta\",\n\"id\": 123\n\
    },\n\"spicy\": false\n}\n```\n\nTo decode this JSON into our `MenuItem` object,\
    \ we need some extra code on top of what the compiler synthesizes for us via `Decodable`:\n\
    \nLet's update our initial test with this input and see what happens:\n\n```\n\
    // MenuItemTests.swift\n// ...\nfunc testWhenDecodedFromJSONDataHasAllTheInputProperties()\
    \ throws {\nlet json = \"\"\"\n{\n\"name\": \"a name\",\n\"category\": {\n\"name\"\
    : \"a category\",\n\"id\": 123\n},\n\"spicy\": false\n}\n\"\"\"\nlet data = try\
    \ XCTUnwrap(json.data(using: .utf8))\nlet item = try JSONDecoder()    .decode(MenuItem.self,\
    \ from: data)\nXCTAssertEqual(item.name, \"a name\")\nXCTAssertEqual(item.category,\
    \ \"a category\")\nXCTAssertEqual(item.spicy, false)\n}\n```\n\nThe test fails\
    \ with\n\n```\ntypeMismatch(\nSwift.String,\nSwift.DecodingError.Context(\ncodingPath:\
    \ [\nCodingKeys(stringValue: \"category\", intValue: nil)\n],\ndebugDescription:\
    \ \"Expected to decode String but found a dictionary instead.\", underlyingError:\
    \ nil\n)\n)\n```\n\nThe error is dense, but by reading through it, you can understand\
    \ that the decoding was looking for a `String` for the \"category\" key but got\
    \ a dictionary instead. That's exactly the error we'd expect from the change we\
    \ made in the JSON input.\n\nOne possible implementation that makes this test\
    \ pass is introducing a nested private object to decode the category and forward\
    \ its name to the `category` property:\n\n```\n// MenuItem.swift\nstruct MenuItem\
    \ {\nlet name: String\nlet spicy: Bool\nprivate let categoryObject: Category\n\
    var category: String { categoryObject.name }\nenum CodingKeys: String, CodingKey\
    \ {\ncase name, spicy\ncase categoryObject = \"category\"\n}\nstruct Category:\
    \ Equatable, Decodable {\nlet name: String\n}\n}\n// ...\nextension MenuItem:\
    \ Decodable {}\n// This is required to make the existing code with the // hardcoded\
    \ menu compile.\nextension MenuItem {\ninit(category: String, name: String, spicy:\
    \ Bool) {\nself.categoryObject = Category(name: category)\nself.name = name\n\
    self.spicy = spicy\n}\n}\n```\n\nIn the case of a nontrivial JSON structure like\
    \ the one in this example, I feel a test is a useful feedback mechanism to guide\
    \ the decoding implementation.\n\nSomething else to keep in mind is that we always\
    \ call JSON decoding as part of a network request or some other kind of data transferring;\
    \ it's not something we might call directly in a ViewModel. Because the return\
    \ type of the `fetchMenu` in `MenuFetching` is `AnyPublisher<[MenuItem], Error>`,\
    \ a component fetching the menu from the remote API will also have to decode the\
    \ received data into a `[MenuItem]`. As long as the decoding has no custom logic,\
    \ the tests for the networking component will fail if something goes wrong. That\
    \ is, testing the networking code implicitly exercises the JSON decoding logic.\n\
    \nIf your API is such that you can decode it with little to no custom code, you're\
    \ better off jumping straight to implementing the networking code and saving yourself\
    \ the time to write tests for the decoding logic. That's because the Swift standard\
    \ library takes care of the decoding; it's not your responsibility to test that.\n\
    \nIf there is a certain amount of ad hoc decoding logic, though, like in the previous\
    \ example, then a set of focused tests will help you implement it and make sure\
    \ it doesn't break.\n\nA TDD purist would be pulling their hair out and scream\
    \ at me in frustration right now. How dare I suggest that it's okay not to write\
    \ tests in a book about Test-Driven Development?!\n\n**Test-Driven Development\
    \ is a practice, not a way of life. If the return on investment of writing some\
    \ code test-first is not worth it, both in the short and long term, then it's\
    \ okay not to write a test for that code.**\n\nWe've wrestled with when deploying\
    \ TDD is appropriate for writing JSON decoding logic and seen a couple of options\
    \ on how to do so. It's now time to put this logic in action by building the final\
    \ component in our feature: the one responsible for fetching the menu data from\
    \ the API.\n\n## Practice Time\n\nThe API responses we've seen in the chapter\
    \ have all been flat JSON arrays, meaning we can decode an array of `MenuItem`s\
    \ as long as `MenuItem` itself is `Decodable`. How would you decode `MenuItem`\
    \ if the response was an object? For example:\n\n```\n{\n\"items\": [\n{\n\"name\"\
    : \"spaghetti carbonara\",\n\"category\": \"pasta\",\n\"spicy\": false\n},\n{\n\
    \"name\": \"penne all'arrabbiata\",\n\"category\": \"pasta\",\n\"spicy\": true\n\
    }\n]\n}\n```\n\n## Key Takeaways\n\n- **One approach to test JSON decoding logic\
    \ is to define an inline `String`, convert it to `Data`, and use it as the input\
    \ for `JSONDecoder`.** This approach is useful for input JSONs that have few keys\
    \ and to make the input value to model property relationship clear.\n\n- **Another\
    \ option is to define the input in a dedicated JSON file and convert that to `Data`\
    \ in the test.** This approach is useful for input objects with many keys but\
    \ adds a layer of indirection between the input and the resulting SUT properties.\n\
    \n- **Keep your tests tidy by extracting the logic to convert from JSON to `Data`\
    \ into helper functions.**\n\n- **Testing JSON decoding logic is valuable if there\
    \ is custom logic required to conform to `Decodable`.** If all the model properties\
    \ match the input JSON's keys, Swift takes care of everything for us, and a test\
    \ for it is redundant.\n\n## Endnote\n\n1. There are options other than REST for\
    \ an API backend. Two that are gaining more and more popularity are [GraphQL](https://graphql.org/)\
    \ and [ProtoBufs](https://developers.google.com/protocol-buffers). Both of them\
    \ add a type-safety layer to the API, which you can – and should – leverage to\
    \ code-generate all the conversion logic between API responses and application\
    \ domain objects.\n\n   ProtoBufs serializes data in a custom format that is more\
    \ efficient than JSON. GraphQL responds with JSON objects, but stands out for\
    \ its query language. Rather than having different endpoints for different resources,\
    \ you ask a GraphQL backend for data by sending it a query that describes the\
    \ information you need.\n\n   In a small application like ours, the overhead of\
    \ adopting either of those solutions dwarfs the benefits we would get in terms\
    \ of maintainability and efficiency."
