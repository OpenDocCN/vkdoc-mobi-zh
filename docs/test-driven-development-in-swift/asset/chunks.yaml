  trans: '

    # 假对象（Fake）：如何绕过缓慢或有状态的依赖


    假设你想要让订单在应用重启后依然保持，这样用户切换到其他应用且被系统回收时就不会丢失订单。为了保持示例简洁，我们使用 `UserDefaults` 作为存储层。


    第一步是为 `Order` 存储功能定义一个抽象，并让 `UserDefaults` 遵循该协议：


    ```

    // OrderStoring.swift

    protocol OrderStoring {

    func getOrder() -> Order

    func updateOrder(_ order: Order)

    }

    ```


    `UserDefaults` 如何实现 `OrderStoring` 协议的细节与我们此处要探讨的内容无关。你可以在本章的源码中找到可运行的版本。


    下一步是重构 `OrderController`，让它使用遵循 `OrderStoring` 协议的类型来读取和更新订单：


    ```

    // OrderController.swift

    import Combine

    import Foundation

    class OrderController: ObservableObject {

    @Published private(set) var order: Order

    private let orderStoring: OrderStoring

    init(orderStoring: OrderStoring = UserDefaults.standard) {

    self.orderStoring = orderStoring

    order = orderStoring.getOrder()

    }

    func isItemInOrder(_ item: MenuItem) -> Bool {

    return order.items.contains { $0 == item }

    }

    func addToOrder(item: MenuItem) {

    updateOrder(with: Order(items: order.items + [item]))

    }

    func removeFromOrder(item: MenuItem) {

    let items = order.items

    guard let indexToRemove = items.firstIndex(where: { $0.name == item.name }) else
    { return }

    let newItems = items.enumerated().compactMap { (index, element) -> MenuItem? in

    guard index == indexToRemove else { return element }

    return .none

    }

    updateOrder(with: Order(items: newItems))

    }

    func resetOrder() {

    updateOrder(with: Order(items: []))

    }

    private func updateOrder(with newOrder: Order) {

    orderStoring.updateOrder(newOrder)

    order = newOrder

    }

    }

    ```


    重构之后，你预期测试能够通过，但实际情况并非如此。不仅测试会失败，而且多次运行时会出现不同的失败结果。


    这些测试会执行生产代码，由于 `OrderController init` 中的默认值，生产代码使用了 `UserDefaults.standard`。


    `UserDefaults` 是一个存储组件：它是有状态的。当测试运行时，它们通过存储值来改变 `UserDefaults` 的状态，并且这些更改会在测试和应用程序启动之间持续存在。


    测试还从 `UserDefaults.standard` 读取数据，这意味着它们依赖于一个有状态的组件，并且不再孤立。而**假对象（Fake Test Double）**可以让我们打破这种依赖关系。


    我们可以为 `OrderStoring` 构建一个 Fake，它的行为类似于 `UserDefaults`，但不会在单个测试执行或应用程序启动之间持久化其更改。这样，我们就可以让测试再次变得孤立且无状态。让我们用一个
    Fake 来初始化 `OrderDetail.ViewModel`：


    ```

    // OrderStoringFake.swift

    @testable import Albertos

    class OrderStoringFake: OrderStoring {

    private var order: Order = Order(items: [])

    func getOrder() -> Order {

    return order

    }

    func updateOrder(_ order: Order) {

    self.order = order

    }

    }

    // OrderDetail.ViewModelTests.swift

    // ...

    class OrderDetailViewModelTests: XCTestCase {

    func testWhenCheckoutButtonTappedStartsPaymentProcessingFlow() {

    let orderController = OrderController(orderStoring: OrderStoringFake())

    // ...

    ```


    得益于 `OrderStoringFake`，每个测试现在都使用一个新的 `OrderStoring` 实例运行。测试是隔离的：一个测试对它的 `OrderStoringFake`
    所做的更改不会影响其他测试。


    我们可以通过在 `setUp` 和 `tearDown` 方法中重置其内容来解决 `UserDefaults` 的有状态问题，但这样做需要更多的工作，并且会使测试用例更长。此外，我们还需要在使用
    `OrderDetail.ViewModel` 的每个测试用例中重复编写 `setUp` 和 `tearDown` 框架。总的来说，使用 Fake 需要更少的代码和维护量。


    当依赖项速度缓慢时，Fake 也很有用。在第 10 章，我们使用了一个 Stub 来用恒定的 0.1 秒延迟替换不可预测的网络响应时间，并控制其发送的响应。类似地，我们的生产系统可能依赖缓慢或异步的计算，我们可以在测试中用更快的版本替换它们。


    ## 哑对象（Dummy）：如何提供测试所需但与行为无关的依赖


    ViewModel 这样的对象通常需要`协调`与其视图交互的不同组件。例如，`OrderDetail.ViewModel`负责定义视图要显示的内容、启动支付流程并对其结果做出反应。


    针对 `OrderDetail.ViewModel` 展示逻辑的测试需要一个遵循 `PaymentProcessing` 协议的实例来实例化 SUT，即使它们测试的输出不依赖于支付结果。


    使用我们到目前为止看到的任何 Test Double 都能让测试编译通过，但也可能误导读者认为该依赖与测试相关。使用 Spy 会造成混淆，因为我们设置了它却从未读取它的任何属性。使用
    Fake 或 Stub 则可能暗示该依赖提供了影响测试结果的间接输入：


    ```

    // OrderDetail.ViewModelTests.swift

    func testWhenOrderIsEmptyShouldNotShowTotalAmount() {

    let viewModel = OrderDetail.ViewModel(

    orderController: OrderController(

    orderStoring: OrderStoringFake()

    ),

    paymentProcessor: ???

    onAlertDismiss: {}

    )

    XCTAssertNil(viewModel.totalText)

    }

    ```


    我们如何能清楚地表明 `PaymentProcessing` 实例不会影响这些测试？使用一个什么都不做的 Test Double——即 **Dummy（哑对象）**：


    ```

    // PaymentProcessingDummy .swift

    @testable import Albertos

    import Combine

    class PaymentProcessingDummy: PaymentProcessing {

    func process(order: Order) -> AnyPublisher<Void, Error> {

    return Result.success(())

    .publisher

    .eraseToAnyPublisher()

    }

    }

    ```


    注意，这个 Dummy 的 `process(order:)` 实现中发布了一个 `Void` 值。我将 Dummy 定义为什么都不做的替身，但我们仍然需要编写它们使其能编译通过。在实现必须返回结果的
    Dummy 时，选择你能想到的最简单的代码。Dummy 仅作为占位符使用，因此它们提供什么输出并不重要。


    现在我们已经为 `PaymentProcessing` 构建了一个 Dummy，我们可以更新那些不直接依赖支付处理的测试，让它们使用它，例如：


    ```

    // OrderDetail.ViewModelTests.swift

    func testWhenOrderIsEmptyShouldNotShowTotalAmount() {

    let viewModel = OrderDetail.ViewModel(

    orderController: OrderController(

    orderStoring: OrderStoringFake()

    ),

    paymentProcessor: PaymentProcessingDummy(),

    onAlertDismiss: {}

    )

    XCTAssertNil(viewModel.totalText)

    }

    ```


    正如 Gerard Meszaros 在 [*xUnit Test Patterns*](http://xunitpatterns.com/) 中解释的那样，Dummy
    通过“省略构建真实对象所必需的不相关代码，并明确指出哪些对象和值不被 SUT 使用”来改进我们的测试。正如我们在第 4 章关于测试固件的讨论中提到的，一个测试越容易阅读和理解，就越容易使用。


    我们同样可以将 Dummy 的思想应用于 `onAlertDismiss` 值，以表明它也不会影响测试：


    ```

    // OrderDetail.ViewModelTests .swift

    // ...

    class OrderDetailViewModelTests: XCTestCase {

    let alertDismissDummy: () -> Void = {}

    // ...

    func testWhenOrderIsEmptyShouldNotShowTotalAmount() {

    let viewModel = OrderDetail.ViewModel(

    orderController: OrderController(

    orderStoring: OrderStoringFake()

    ),

    paymentProcessor: PaymentProcessingDummy(),

    onAlertDismiss: alertDismissDummy

    )

    XCTAssertNil(viewModel.totalText)

    }

    }

    ```


    将 Fake 和 Dummy 与 Stub 和 Spy 一起添加到你的 Test Double 工具箱中，以便为任何类型的行为编写测试。使用 Fake 来避免依赖全局状态和缓慢的计算，并使用
    Dummy 来明确那些是必需的但与测试无关的组件。

    '
- fmt: '# It might not be immediately evident when you need to use a Fake or a Dummy,
    but that’s not a problem for a developer practicing TDD. Iteration is at the core
    of Test-Driven Development. If using a Spy is the first thing that comes to mind
    to get the test to compile, go for it; you’ll have time to take a step back once
    the test passes and see whether a different double works better.


    ## Key Takeaways


    * **Invest in keeping your test suite stateless, fast, and straightforward**.
    With TDD, you spend as much time in the test side of the codebase as you do in
    the production one; the easier it is to work within the test suite, the better.


    * **The Fake Test Double replaces a dependency with a simpler version to bypass
    statefulness or time-consuming computations**. Use a Fake to keep your tests isolated
    and fast.


    * **The Dummy Test Double replaces a dependency with one that doesn’t do anything
    to make it evident it does not affect the behavior**. Use a Dummy in your tests
    to clarify when there are dependencies necessary for the code to build but with
    no input on the actual outcome being tested.


    # 16. Conclusion


    Throughout this book, we used Test-Driven Development to build a fully functioning
    app. We moved in little steps, guided by the feedback from the tests and the compiler.


    We started with a single screen showing static content and iterated our way to
    a dynamic ordering app, configurable from a backend, delegating payment processing
    to a third-party service, and persisting state on local storage.


    Along the way, we learned different TDD techniques and approaches. At the base
    of everything is the red, green, refactor workflow: start with a failing test
    and make it pass in whichever way you can. It doesn’t matter if the first version
    is ugly, suboptimal, or copy-pasted, only that the test passes. Don’t be afraid
    of starting with hardcoded values. *Fake It, Till You Make It*. Only once the
    test is green, move to removing duplication and refactoring the implementation
    into something you are proud of.


    Many times, we deployed the Partition Problem and Solve Sequentially technique
    to move in small iterations and shorten the feedback loop. Problems can be disassembled
    in smaller components that we can address one at a time in isolation. Reducing
    the scope of our work gives us better focus because we can hold the entire problem
    in our working memory. Each passing test and successful refactor is a little victory.
    Working your way through a test list gives you a feeling of progress and momentum.


    We learned the value of making components interact through abstractions, the Dependency
    Inversion Principle, and how Dependency Injection, having objects explicitly request
    their dependencies, results in “honest” testable code.


    Applying Dependency Inversion and Injection allowed us to build Test Doubles to
    tackle those scenarios where the system under test wasn’t a pure function.


    We can use Stubs to control how dependencies affect the behavior of the system
    under test and Spies when it’s the dependency that is affected by it. Fakes decouple
    our tests from the statefulness of local storage, and Dummies make it clear when
    a required dependency does not contribute to the test outcome.


    We discovered that SwiftUI is a mighty ally to the TDD workflow. State is the
    single source of truth, and we cannot manipulate views directly. That means we
    can concentrate solely on the business logic that generates the input state and
    trust the framework will render it as instructed. This results in a thin and humble
    view layer interfacing with a presentation and behavior one that is detached from
    SwiftUI. We can iterate fast on both, using Xcode Previews for the former and
    tests for the latter.


    The business logic layer has close to 100% test coverage because each line we
    wrote to build it was motivated by a failing test. Teams whose management imposes
    test coverage goals often have to go back after a feature is ready and add tests
    to meet the target; we got there without any extra effort.


    Having extensive code coverage is terrific, but that’s only the tip of the iceberg.
    TDD gave us benefits far more valuable.


    ## More Than Just Testing


    Once you appreciate the value of having automated tests for your code, writing
    unit tests first is the next obvious step. It gives you confidence and timeliness
    and saves you from modifying the finished production code to verify the tests.


    Test-Driven Development is more than just an effective approach to writing tests
    for your code. In fact, its most significant benefits are not in terms of test
    coverage. Scores of developers have adopted TDD because they cared about testing
    and then stuck with it because of the design quality and productivity boost they
    gained.


    ## TDD and Software Design


    TDD puts a helpful pressure on how we write code, a sort of natural selection
    that makes only the simplest tests survive.


    As we’ve seen throughout the book, writing code starting from its tests makes
    it necessary to work with small components and introduce abstractions. Doing otherwise
    would result in tests that are painful to work with and a slow feedback cycle.
    Continually ask yourself, “How can I get faster feedback?” and you’ll shape your
    codebase in loosely coupled, highly cohesive components.


    Case in point: The need to approach the UI code test-first forced us to separate
    the layout declaration from the logic that generates the values to populate it.
    As a result, we have a lean SwiftUI layer that is logic-free, and we can easily
    plug it into Previews. Views delegate their intelligence to their `ViewModels`,
    which represent an abstraction of the view itself and on which we have total code
    coverage. We could theoretically plug the ViewModels in different layouts or even
    use them to power a CLI application without any modification.


    Using TDD also helped how we worked with dependencies outside of our control,
    such as the network and the third-party payment SDK. The abstractions we had to
    introduce to test code interacting with them had the positive side effect of making
    our design modular: we can replace the networking or payment component’s implementation
    without touching the rest of the app.


    Modularity also enables us to work in parallel. Once the `protocol` with the abstraction
    definition is in place, different team members can work on the concrete implementation
    and its consumers simultaneously.


    You don’t *need* Test-Driven Development to make good software design choices.
    Still, **TDD nudges you toward good design**.


    The real-time feedback from the tests makes it obvious whether you are going in
    the right direction. If you find it’s cumbersome to write a test for some code,
    that’s a signal that the code won’t be straightforward to work with in production
    either and it’s time to take a step back and revisit the design.'
