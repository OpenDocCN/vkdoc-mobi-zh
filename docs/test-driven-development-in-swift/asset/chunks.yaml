    The only way to make sure your tests are not giving you a false positive – that
    they pass even though the code is wrong – is to modify the code’s behavior to
    force a failure and see if they catch it.


    Forcing failures in production code to verify the tests’ correctness is not an
    efficient approach. It requires changing code you already wrote, only to undo
    the change right after, once you validated the test.


    How can we verify that our tests are correct without going through the trouble
    of creating ad hoc failures?


    The answer is by spinning the process around and writing the tests *first*.


    By writing a test for something you haven’t implemented yet, you can ensure the
    test will catch errors. That’s because if there is not code for the behavior yet,
    the test *must* fail; if it doesn’t, then it’s not written correctly.


    Let’s look at the fizz-buzz example again. This time, we’ll start with an empty
    implementation and then write one test for the expected behavior:


    ```

    func fizzBuzz(_ number: Int) -> String {

    return ""

    }

    func testFizzBuzz() {

    test(value: fizzBuzz(1), matches: "1")

    }

    ```


    Running `testFizzBuzz()` will print “FAILED.” To make the test pass, we need only
    to change the implementation to convert the input `Int` into a `String`:


    ```

    func fizzBuzz(_ number: Int) -> String {

    return "\(number)"

    }

    ```


    If you now call `testFizzBuzz()`, it will print “PASSED.”


    Let’s keep implementing `fizzBuzz(_:)` one test at a time and add a test to make
    sure an input divisible by three returns “fizz”:


    ```

    test(value: fizzBuzz(3), matches: "fizz")

    ```


    To make both tests pass, we can update the `fizzBuzz(_:)` implementation to


    ```

    guard number % 3 == 0 else { return "\(number)" }

    return "fizz"

    ```


    We can then continue with the next behavior facet – an input divisible by five
    should return “buzz”:


    ```

    test(value: fizzBuzz(5), matches: "buzz")

    ```


    To make this new test and the other two pass, we can update `fizzBuzz(_:)` to


    ```

    switch (number % 3 == 0, number % 5 == 0) {

    case (true, false): return "fizz"

    case (false, true): return "buzz"

    default: return "\(number)"

    }

    ```


    We only have one scenario left to cover – numbers divisible by fifteen should
    return “fizz-buzz”:


    ```

    test(value: fizzBuzz(15), matches: "fizz-buzz")

    ```


    Let’s update `fizzBuzz(_:)` to make this final test pass too:


    ```

    switch (number % 3 == 0, number % 5 == 0) {

    case (false, false): return "\(number)"

    case (true, false): return "fizz"

    case (false, true): return "buzz"

    case (true, true): return "fizz-buzz"

    }

    ```


    We got to a working “fizz-buzz” implementation by building it one step at a time,
    always starting from a failing test. Because each test represented a specific
    case of the overall “fizz-buzz” behavior, the code changed between iterations
    was always minimal. On each step, the test for the new behavior helped us verify
    if our new code worked without the need to call it manually multiple times, while
    the already existing tests ensured it didn’t break the rest of the logic.


    This test-first, step-by-step, fast-feedback way of writing code is incredibly
    effective. It’s a unique way of building software called Test-Driven Development,
    TDD for short.


    Test-Driven Development is the intentional and consistent use of the tests’ feedback
    to inform the software implementation. But practicing TDD is more than just writing
    tests before production code; its by-products are far more valuable than the mere
    knowledge that your software behaves as expected.


    ## From Writing Tests First to Test-Driven Development


    Writing tests first puts helpful pressure on your software design. Environmental
    constraints and natural selection resulted in the evolution of the beautiful and
    advanced species that make up our world’s flora and fauna. In the same way, forcing
    yourself to write tests first will push you and your codebase to a higher standard.


    When you write tests first, you immediately see if your design is simple to test.
    Straightforward and isolated behavior is simpler to test than complicated one.
    A big object with many dependencies is harder to put in a test harness than a
    smaller one with only a few `init` parameters.


    If code is straightforward to test, it will also be straightforward to work with
    it in production. That’s because tests are consumers of the code’s public API.
    Using code in the test is similar to using it in production.


    Because writing simple tests is easier than writing complicated ones, you’ll naturally
    gravitate toward code that is isolated and does only one thing. You’ll build software
    made up of highly cohesive and loosely coupled components.


    TDD also helps you have a better understanding of your products’ requirements.
    To test your code’s behavior, you need to know what it is first: you need to define
    inputs and their expected outputs concretely. To do so, you need to have appropriately
    assimilated the requirements for what the software should do. This upfront analysis
    makes implementing the code straightforward. Writing tests first removes the temptation
    to skip this critical step.


    TDD gives you a psychological advantage. Developing your software one test at
    a time sets a sustainable pace, and our brains achieve goals better when the end
    is in sight.


    Tackling the development of large complex applications one test at a time is the
    equivalent of how marathon runners approach their long races: putting one foot
    in front of the other.


    **Test-Driven Development is the keystone habit of software quality. When applied
    day after day, it has huge ripple effects on developer productivity, happiness,
    and software design quality.**


    As Kent Beck, the creator Test-Driven Development (or re-discoverer as he refers
    to himself[¹](#501287_1_En_1_Chapter.xhtml#Par1000)), puts it in *Test-Driven
    Development: By Example*:


    > “If you’re happy slamming some code together that more or less works and you’re
    happy never looking at the result again, TDD is not for you. TDD rests on a charmingly
    naïve geekoid assumption that if you write better code, you’ll be more successful.
    TDD helps you to pay attention to the right issues at the right time so you can
    make your designs cleaner, you can refine your designs as you learn.”


    In this book, you’ll learn how to use TDD to build Swift applications, how the
    language strong type system augments your ability to write tests, and how to do
    so effectively using the Xcode IDE and XCTest framework provided by Apple. You’ll
    see how this steady-paced, test-first approach can help you tackle problems of
    any size and complexity. You’ll develop a feedback-first mindset, both for software
    and product development, to help you ship faster and learn more about what is
    valuable for your business.


    ## Key Takeaways


    *   **Automated testing is the use of code to test other code**; it is cheaper,
    more effective, and far less error-prone than manual testing.


    *   **Writing tests first is better than doing so after the implementation is
    complete**; by seeing a test fail when there is no implementation for the behavior
    under test, you can trust it will catch future regressions.


    *   **Test-Driven Development is the practice of consistently and intentionally
    writing software starting from its tests**; this practice results in better software
    made up of highly cohesive and loosely coupled components, each responsible for
    a small and well-defined behavior.'
  trans: '

    # 从编写测试到先编写测试


    为已有的代码编写测试存在一个问题：你无法真正信任一个从未见过失败的测试。


    要确保你的测试不会产生误报——即代码有误时测试依然通过——唯一的方法是修改代码的行为以强制其失败，然后观察测试能否捕获该错误。


    为了验证测试的正确性而强制修改生产代码并非高效的做法。这需要更改你已写好的代码，而验证测试后又要立即撤销改动。


    如何才能在不费心创建临时性失败的情况下，验证我们的测试是正确的呢？


    答案是将流程反转过来，**先**编写测试。


    通过为你尚未实现的功能编写测试，你可以确保该测试能够捕获错误。这是因为如果该行为的代码尚不存在，测试*必须*失败；如果没有失败，则说明测试编写有误。


    让我们再看一下 fizz-buzz 的例子。这次，我们将从一个空实现开始，然后为预期行为编写一个测试：


    ```

    func fizzBuzz(_ number: Int) -> String {

    return ""

    }

    func testFizzBuzz() {

    test(value: fizzBuzz(1), matches: "1")

    }

    ```


    运行 `testFizzBuzz()` 会打印 "FAILED"。为了让测试通过，我们只需修改实现，将输入的 `Int` 转换为 `String`：


    ```

    func fizzBuzz(_ number: Int) -> String {

    return "\(number)"

    }

    ```


    如果现在调用 `testFizzBuzz()`，它会打印 "PASSED"。


    让我们继续逐个测试地实现 `fizzBuzz(_:)`，并添加一个测试来确保能被三整除的输入返回 "fizz"：


    ```

    test(value: fizzBuzz(3), matches: "fizz")

    ```


    为了让两个测试都通过，我们可以将 `fizzBuzz(_:)` 的实现更新为：


    ```

    guard number % 3 == 0 else { return "\(number)" }

    return "fizz"

    ```


    然后我们可以继续处理下一个行为方面——能被五整除的输入应返回 "buzz"：


    ```

    test(value: fizzBuzz(5), matches: "buzz")

    ```


    为了让这个新测试和其他两个测试都通过，我们可以将 `fizzBuzz(_:)` 更新为：


    ```

    switch (number % 3 == 0, number % 5 == 0) {

    case (true, false): return "fizz"

    case (false, true): return "buzz"

    default: return "\(number)"

    }

    ```


    我们只剩下一个场景需要覆盖——能被十五整除的数字应返回 "fizz-buzz"：


    ```

    test(value: fizzBuzz(15), matches: "fizz-buzz")

    ```


    让我们更新 `fizzBuzz(_:)`，让这最后一个测试也通过：


    ```

    switch (number % 3 == 0, number % 5 == 0) {

    case (false, false): return "\(number)"

    case (true, false): return "fizz"

    case (false, true): return "buzz"

    case (true, true): return "fizz-buzz"

    }

    ```


    我们通过一步步构建，始终从一个失败的测试开始，最终得到了一个可用的 "fizz-buzz" 实现。由于每个测试都代表了整个 "fizz-buzz" 行为的一个特定用例，迭代之间的代码改动始终是最小的。在每一步中，新行为的测试帮助我们验证新代码是否有效，而无需多次手动调用它，同时已有的测试则确保了新代码不会破坏其余逻辑。


    这种先测试、逐步进行、快速反馈的编码方式极为高效。这是一种独特的软件开发方式，称为测试驱动开发，简称 TDD。


    测试驱动开发是有意识且持续地利用测试反馈来指导软件实现的过程。但实践 TDD 不仅仅是在生产代码之前编写测试；其副产品远比仅仅知道软件行为符合预期更有价值。


    ## 从先编写测试到测试驱动开发


    先编写测试会对你的软件设计施加有益的压力。环境约束和自然选择造就了构成我们世界动植物群的那些美丽而高级的物种。同样，强迫自己先编写测试会将你和你的代码库推向更高的标准。


    当你先编写测试时，你立刻就能看出你的设计是否易于测试。直接且隔离的行为比复杂的行为更容易测试。一个具有许多依赖关系的大型对象比一个只有少数几个 `init`
    参数的较小对象更难放入测试框架中。


    如果代码易于测试，那么它在生产环境中的使用也会很简单。这是因为测试是代码公共 API 的消费者。在测试中使用代码与在生产环境中使用代码是相似的。


    由于编写简单的测试比编写复杂的测试更容易，你自然会倾向于编写隔离且只做一件事的代码。你将构建由高内聚、低耦合的组件组成的软件。


    TDD 还能帮助你更好地理解产品需求。要测试代码的行为，你首先需要知道它是什么：你需要具体地定义输入及其预期输出。要做到这一点，你需要恰当地吸收软件应满足的需求。这种前置分析使代码实现变得简单明了。先编写测试消除了跳过这一关键步骤的诱惑。


    TDD 为你提供了心理优势。一次一个测试地开发软件设定了可持续的节奏，而当我们看到终点在望时，大脑能更好地实现目标。


    一次一个测试地攻克大型复杂应用程序的开发，就像马拉松运动员对待长跑比赛的方式：一步一步，脚踏实地。


    测试驱动开发是软件质量的关键习惯。当日复一日地应用时，它会对开发者的生产力、幸福感以及软件设计质量产生巨大的连锁效应。


    正如测试驱动开发的创造者（或者像他自称的那样，再发现者¹）肯特·贝克在《测试驱动开发：实战》中所说：


    > “如果你乐于拼凑出差不多能用的代码，并且乐于再也不看结果，那么 TDD 不适合你。TDD 建立在一个天真而可爱的极客式假设之上：如果你写出更好的代码，你就会更成功。TDD
    帮助你在正确的时间关注正确的问题，这样你就能让设计更清晰，并在学习过程中不断完善设计。”


    在本书中，你将学习如何使用 TDD 构建 Swift 应用程序，了解该语言强大的类型系统如何增强你编写测试的能力，以及如何使用 Apple 提供的 Xcode
    IDE 和 XCTest 框架高效地做到这一点。你将看到这种节奏稳定、先测试的方法如何帮助你应对任何规模和复杂性的问题。你将培养一种以反馈为先的思维方式，无论是对于软件还是产品开发，从而帮助你更快地交付，并更多地了解什么对你的业务有价值。


    ## 关键要点


    *   **自动化测试是使用代码来测试其他代码**；它比手动测试更廉价、更有效，而且远不易出错。

    *   **先编写测试比在实现完成后才编写更好**；通过观察测试在被测行为尚无实现时失败，你可以相信它将捕获未来的回归错误。

    *   **测试驱动开发是一贯且有意识地以测试为起点编写软件的实践**；这一实践能够产生由高内聚、低耦合组件组成的更优秀的软件，每个组件负责一个微小且定义明确的行为。

    '
- fmt: "## Endnote\n\n1.  引用 Kent Beck 本人的话：\"The original description of TDD was\
    \ in an ancient book about programming. It said you take the input tape, manually\
    \ type in the output tape you expect, then program until the actual output tape\
    \ matches the expected output. After I'd written the first xUnit framework in\
    \ Smalltalk I remembered reading this and tried it out. That was the origin of\
    \ TDD for me. When describing TDD to older programmers, I often hear, 'Of course.\
    \ How else could you program?' Therefore I refer to my role as 'rediscovering'\
    \ TDD.\" 来源：[`https://www.quora.com/Why-does-Kent-Beck-referto-the-rediscovery-of-test-driven-development-Whats-the-historyof-test-driven-development-before-Kent-Becks-rediscovery/answer/Kent-Beck`](https://www.quora.com/Why-does-Kent-Beck-referto-the-rediscovery-of-test-driven-development-Whats-the-historyof-test-driven-development-before-Kent-Becks-rediscovery/answer/Kent-Beck)\n\
    \n# 2. `XCTest` 简介\n\n在上一章中，我们学习了如何编写测试代码的代码。虽然构建几个辅助函数来完成这项工作很有趣，但为了提高效率和专业性，使用测试库会更好。\n\
    \n一个测试库（在 Swift 术语中称为框架）提供了构建测试、运行测试并收集测试结果所需的脚手架。在 Apple 生态系统中，`XCTest` 是默认的测试框架，它随\
    \ Xcode IDE 一起提供。\n\n如果你喜欢在开始使用工具之前先了解它们，那么你会喜欢下面的 `XCTest` 概述。另一方面，如果你迫不及待地想编写一些*真正的*代码，可以随时跳到下一章，需要时再回来阅读。\n\
    \nSwift 开源社区还提供了其他测试框架，但在本书中，我们只专注于使用纯 `XCTest` 编写的测试，因为它是标准的 Apple 技术，无需任何额外设置。无论你是仅使用普通的\
    \ `XCTest`，还是通过其他测试库增强设置，测试驱动开发的应用方式都相同。请前往附录 B 了解开源框架 [Quick](https://github.com/Quick/Quick)\
    \ 和 [Nimble](https://github.com/Quick/Nimble)。\n\n## Xcode 单元测试 Target\n\n`XCTest`\
    \ 提供了一个与 Xcode 集成的测试工具，使得在 IDE 中运行测试并查看结果变得非常容易。\n\n当你创建新项目时，Xcode 会让你选择是否添加测试。如果选择添加，Xcode\
    \ 将基于 `XCTest` 为你创建两个额外的 target，一个用于单元测试，一个用于 UI 测试。\n\n图 [2-1](#501287_1_En_2_Chapter.xhtml#Fig1)\
    \ 展示了在创建新应用时如何添加测试。\n\n![../images/501287_1_En_2_Chapter/501287_1_En_2_Fig1_HTML.jpg](images/501287_1_En_2_Chapter/501287_1_En_2_Fig1_HTML.jpg)\n\
    \n图 2-1\n\nXcode 新应用向导，高亮显示了向项目添加测试 target 的选项\n\n正如我们在上一章中讨论的，单元测试和 UI 测试的区别在于，UI\
    \ 测试将应用程序作为一个黑盒进行交互，就像用户一样，而单元测试则针对单个组件进行测试。UI 测试有其用武之地，但你不能用它们来驱动软件的实现；要对一个功能进行\
    \ UI 测试，你需要已经编写了它的大部分代码。\n\n相反，单元测试 target 中的测试在宿主应用中运行，并且可以访问其源代码中的所有对象和类型。这正是我们编写测试优先并将其用作实现正确性的快速反馈机制所需要的。\n\
    \n在 Xcode 单元测试 target 中，你不仅限于测试对象与被测程序其余部分隔离的场景；你还可以编写集成测试以及任何其他可能需要直接实例化源代码中某些对象的测试，例如快照测试或基于属性的测试。\n\
    \n如果你的应用没有单元测试 target，你可以从项目编辑器添加一个，选择图 [2-2](#501287_1_En_2_Chapter.xhtml#Fig2)\
    \ 中高亮的按钮。这将弹出一个向导，见图 [2-3](#501287_1_En_2_Chapter.xhtml#Fig3)，让你选择 target 的类型。如果你筛选\
    \ \"test\"，就会找到单元测试和 UI 测试 target 的选项。\n\n![../images/501287_1_En_2_Chapter/501287_1_En_2_Fig3_HTML.jpg](images/501287_1_En_2_Chapter/501287_1_En_2_Fig3_HTML.jpg)\n\
    \n图 2-3\n\nXcode 新建 target 对话框，已筛选项仅显示测试 target\n\n![../images/501287_1_En_2_Chapter/501287_1_En_2_Fig2_HTML.png](images/501287_1_En_2_Chapter/501287_1_En_2_Fig2_HTML.png)\n\
    \n图 2-2\n\nXcode 项目编辑器，高亮显示了添加新 target 的按钮\n\n现在我们知道了如何为应用添加测试 target，让我们通过将上一章中编写的定制测试转换为\
    \ `XCTest` 来充实它。\n\n## `XCTestCase` 和相等性断言\n\n每个测试的起点是 `XCTestCase` 类，它提供了运行测试和报告其结果所需的所有基础设施和钩子。要创建一个新测试，你需要创建\
    \ `XCTestCase` 的子类，就像你创建 `UIViewController` 的子类一样：\n\n```swift\nimport XCTest\n\
    class FizzBuzzTests: XCTestCase { }\n```\n\n不过，`XCTestCase` 只是测试的容器。要定义测试，你需要向该类添加一个以\
    \ \"test\" 开头的实例方法：\n\n```swift\nclass FizzBuzzTests: XCTestCase {\n    func testFizzBuzzDivisibleBy3ReturnsFizz()\
    \ { }\n    func testFizzBuzzDivisibleBy5ReturnsBuzz() { }\n    func testFizzBuzzDivisibleBy15ReturnsFizzBuzz()\
    \ { }\n    func testFizzBuzzNotDivisibleBy3Or5ReturnsInput() { }\n}\n```\n\n我们可以用\
    \ `XCTAssertEqual` 函数替换我们自定义的检查两个 `String` 是否相等的函数：\n\n```swift\nfunc testFizzBuzzDivisibleBy3ReturnsFizz()\
    \ {\n    XCTAssertEqual(fizzBuzz(3), \"fizz\")\n}\n```\n\n`XCTAssertEqual` 适用于遵循\
    \ `Equatable` 协议的类型，因此你可以将其用于多种类型，而不仅仅是 `String`。\n\n如果值不相等，断言将失败，框架会显示一条消息：\n\
    \n```swift\nfunc testFizzBuzzDivisibleBy3() {\n    XCTAssertEqual(fizzBuzz(4),\
    \ \"fizz\")\n}\n// XCTAssertEqual failed: (\"4\") is not equal to (\"fizz\")\n\
    ```\n\n## 其他断言\n\n你会发现自己经常使用 `XCTAssertEqual`，但这并不是该框架提供的唯一断言。\n\n你可以测试 `Bool`\
    \ 值：\n\n```swift\nXCTAssertTrue(true)\nXCTAssertFalse(false)\n```\n\n你可以测试 `nil`\
    \ 值：\n\n```swift\nXCTAssertNil(nil)\nXCTAssertNotNil(\"this is not nil\")\n```\n\
    \n有一些断言可用于比较遵循 `Comparable` 协议的类型的值：\n\n```swift\nXCTAssertLessThan(1, 2)\nXCTAssertGreaterThan(2,\
    \ 1)\nXCTAssertLessThanOrEqual(2, 2)\nXCTAssertGreaterThanOrEqual(2, 1)\n```\n\
    \n你甚至可以测试某段代码是否会抛出错误：\n\n```swift\nXCTAssertThrowsError(try aFunctionThatThrows())\n\
    XCTAssertNoThrow(try aFunctionThatThrows())\n```"
  raw: '## Endnote


    1.  In Kent’s own words: ‘The original description of TDD was in an ancient book
    about programming. It said you take the input tape, manually type in the output
    tape you expect, then program until the actual output tape matches the expected
    output. After I’d written the first xUnit framework in Smalltalk I remembered
    reading this and tried it out. That was the origin of TDD for me. When describing
    TDD to older programmers, I often hear, “Of course. How else could you program?”
    Therefore I refer to my role as “rediscovering” TDD.’ Source: [`https://www.quora.com/Why-does-Kent-Beck-referto-the-rediscovery-of-test-driven-development-Whats-the-historyof-test-driven-development-before-Kent-Becks-rediscovery/answer/Kent-Beck`](https://www.quora.com/Why-does-Kent-Beck-referto-the-rediscovery-of-test-driven-development-Whats-the-historyof-test-driven-development-before-Kent-Becks-rediscovery/answer/Kent-Beck)


    # 2. XCTest Introduction


    In the previous chapter, we saw how to write code that tests code. While it was
    fun to construct a few functions to help us with that, to be productive and professional,
    it’s much better to use a testing library.


    A testing library, or framework in Swift terminology, provides the scaffold on
    which to build tests, run them, and gather their results. In the Apple ecosystem,
    XCTest is the default testing framework, and it comes bundled with the Xcode IDE.


    If you like to get to know your tools before starting to work with them, you’ll
    enjoy the following XCTest overview. If, on the other hand, you can’t wait to
    write some *real* code, feel free to jump ahead to the next chapter and come back
    here later if you need.


    There are other testing frameworks for Swift made by the open source community,
    but in this book we’ll focus only on tests written in plain XCTest because it’s
    the standard Apple technology and doesn’t require any extra setup. The same Test-Driven
    Development applies, whether you use *vanilla* XCTest only or augment your setup
    with other testing libraries. Head over to Appendix B to learn about the open
    source frameworks [Quick](https://github.com/Quick/Quick) and [Nimble](https://github.com/Quick/Nimble).


    ## The Xcode Unit Test Target


    XCTest offers a test harness that integrates with Xcode making it easy to run
    tests and see their results in the IDE.


    When you create a new project, Xcode lets you choose whether to add tests to it.
    If you choose so, Xcode will create two additional targets for you based on XCTest,
    one for unit tests and one for UI tests.


    Figure [2-1](#501287_1_En_2_Chapter.xhtml#Fig1) shows how to add tests when creating
    a new app.


    ![../images/501287_1_En_2_Chapter/501287_1_En_2_Fig1_HTML.jpg](images/501287_1_En_2_Chapter/501287_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    The Xcode new application wizard, highlighting the option to add test targets
    to the project


    As we discussed in the previous chapter, unit and UI tests differ in that UI tests
    interact with the application as a black box, the same way a user would, while
    unit tests work on individual components. UI tests have their place, but you can’t
    use them to drive the implementation of your software; to UI test a feature, you
    need to have written most of it already.


    Conversely, tests in the unit test target run hosted in the application and have
    access to all the objects and types from its source code. This is exactly what
    we need to write tests first and use them as a fast-feedback mechanism on the
    correctness of the implementation.


    In an Xcode unit test target, you are not limited to test where the object under
    inspection is isolated from the rest of the program; you can also write integration
    tests and any other kind of test where you may need to instantiate some of the
    objects in the source code directly, like snapshot or property-based testing.


    If your app doesn’t have a unit test target, you can add one from the project
    editor, selecting the button highlighted in Figure [2-2](#501287_1_En_2_Chapter.xhtml#Fig2).
    This will bring up a wizard, see Figure [2-3](#501287_1_En_2_Chapter.xhtml#Fig3),
    which lets you choose the type of target. If you filter for “test,” you’ll find
    the unit and UI test target options.


    ![../images/501287_1_En_2_Chapter/501287_1_En_2_Fig3_HTML.jpg](images/501287_1_En_2_Chapter/501287_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    The Xcode new target dialog, filtered for test targets only


    ![../images/501287_1_En_2_Chapter/501287_1_En_2_Fig2_HTML.png](images/501287_1_En_2_Chapter/501287_1_En_2_Fig2_HTML.png)


    Figure 2-2


    The Xcode project editor, highlighting the button to add a new target


    Now that we learned how to add the test target to our app, let’s fill it up with
    tests by converting the bespoke tests we wrote in the previous chapter to XCTest.


    ## **XCTestCase** and Equality Assertion


    The starting point of every test is the `XCTestCase` class , which provides all
    the infrastructure and hooks to run tests and report their outcome. To create
    a new test, you make a subclass of `XCTestCase`, much like you would do with `UIViewController`:


    ```

    import XCTest

    class FizzBuzzTests: XCTestCase { }

    ```


    `XCTestCase` is only the container for the tests, though. To define tests, you
    add an instance method to the class with a name starting with “test”:


    ```

    class FizzBuzzTests: XCTestCase {

    func testFizzBuzzDivisibleBy3ReturnsFizz() { }

    func testFizzBuzzDivisibleBy5ReturnsBuzz() { }

    func testFizzBuzzDivisibleBy15ReturnsFizzBuzz() { }

    func testFizzBuzzNotDivisibleBy3Or5ReturnsInput() { }

    }

    ```


    We can replace our custom function to check whether two `String`s are equal with
    the `XCTAssertEqual` function :


    ```

    func testFizzBuzzDivisibleBy3ReturnsFizz() {

    XCTAssertEqual(fizzBuzz(3), "fizz")

    }

    ```


    `XCTAssertEqual` works with types conforming to `Equatable`, so you can use it
    for many kinds of types, not only `String`.


    If the values are not equal, the assertion will fail, and the framework will show
    a message:


    ```

    func testFizzBuzzDivisibleBy3() {

    XCTAssertEqual(fizzBuzz(4), "fizz")

    }

    XCTAssertEqual failed: ("4") is not equal to ("fizz")

    ```


    ## Other Assertions


    You’ll find yourself using `XCTAssertEqual` a lot, but that’s not the only assertion
    the framework offers.


    You can test `Bool` values:


    ```

    XCTAssertTrue(true)

    XCTAssertFalse(false)

    ```


    You can test for `nil` values:


    ```

    XCTAssertNil(nil)

    XCTAssertNotNil("this is not nil")

    ```


    There are assertions you can use to compare the values of types conforming to
    the `Comparable` protocol:


    ```

    XCTAssertLessThan(1, 2)

    XCTAssertGreaterThan(2, 1)

    XCTAssertLessThanOrEqual(2, 2)

    XCTAssertGreaterThanOrEqual(2, 1)

    ```


    You can even test whether some code throws an error:


    ```

    XCTAssertThrowsError(try aFunctionThatThrows())

    XCTAssertNoThrow(try aFunctionThatThrows())

    ```'
