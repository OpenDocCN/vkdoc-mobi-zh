  trans: "\n# 使用 `@EnvironmentObject` 注入依赖\n\n*如何在不通过视图层级中所有共同祖先传递的情况下，在 SwiftUI 视图间共享对象的同一实例？*\n\
    \n*通过使用 `@EnvironmentObject` 从环境中（即所有视图所在的上下文）访问它即可。*\n\n在本章中，你将学习如何使用 `@EnvironmentObject`\
    \ 以可测试的方式在视图间共享业务逻辑组件。\n\n我们的应用正趋近于功能完备。为此，我们需要构建用户界面和业务逻辑，让顾客能够选择菜品并下单。\n\n我们能构建的最早可测试的下单功能是什么？我们可以先从在订单中添加和移除菜品开始，并通过一个只读视图向用户展示其订单，如图\
    \ 11-1 所示。用户最终将能通过该屏幕提交付款。本章我们先实现订单的构建与展示，将提交功能留到下一章。\n\n![../images/501287_1_En_11_Chapter/501287_1_En_11_Fig1_HTML.png](img/501287_1_En_11_Fig1_HTML.png)\n\
    \n图 11-1\n\n下单流程\n\n为了让顾客通过菜单选择菜品来组装订单，我们需要：\n\n* 每个菜单项的详情屏幕，包含价格及将其添加到订单的按钮\n\
    * 显示订单摘要的屏幕及提交按钮\n* 一个用于保存和更新订单模型的对象\n\n我们从一个负责提供接口并协调订单更新的对象开始，将其命名为 `OrderController`。\n\
    \n`OrderController` 的实现细节（仅接口除外）对本章而言并不重要。我将把使用 TDD 构建它留作你的练习。你可以在本书附带的源代码中找到其一个版本。\n\
    \n以下是 `OrderController` 及其 `Order` 模型的接口：\n\n```\n// Order.swift\nstruct Order\
    \ {\n    let items: [MenuItem]\n    var total: Double { ... }\n}\n// OrderController.swift\n\
    import Combine\nclass OrderController: ObservableObject {\n    @Published private(set)\
    \ var order: Order\n    init(order: Order = Order(items: [])) { ... }\n    func\
    \ isItemInOrder(_ item: MenuItem) -> Bool { ... }\n    func addToOrder(item: MenuItem)\
    \ { ... }\n    func removeFromOrder(item: MenuItem) { ... }\n}\n```\n\n你可以在本章附带的源代码中找到\
    \ `MenuItemDetail`、`OrderButton` 和 `OrderDetail` 视图及其 ViewModel 的初始版本。\n\n为了访问同一个订单，这些视图需要与\
    \ `OrderController` 的同一实例交互。`MenuItemDetail.ViewModel` 将使用 `OrderController` 在订单中添加或移除其菜品，`OrderButton.ViewModel`\
    \ 用于显示总金额，而 `OrderDetail.ViewModel` 用于读取并显示订单中的菜品。我们需要一种方式在所有组件间共享同一引用。\n\n一种选择是在全局命名空间中定义一个\
    \ `static` 实例，或将其作为 `OrderController` 类型本身的 `sharedInstance` 属性。这确实能解决多个对象间共享同一值的问题，但我们该如何为其编写测试呢？\n\
    \n行为依赖于 `OrderController` 所持有的 `Order` 状态：如果所有测试都修改同一个共享实例，那么某个测试留下的订单状态将影响下一个测试的结果。测试会失去隔离性，变得相互依赖。当一个测试执行的操作改变了另一个测试的结果时，测试套件将变得脆弱且难以维护。\n\
    \n要隔离测试每个 ViewModel，我们需要在每个测试中使用不同的 `OrderController` 实例。\n\n正如我们之前讨论过的，*依赖注入*是一种技术：为对象或方法提供其所有依赖项，而无需在其实现中创建这些依赖项。\n\
    \n通过将 `OrderController` 依赖项注入每个 ViewModel，我们将能够隔离测试它们。然后，在实例化 ViewModel 时，我们可以使用\
    \ SwiftUI 提供的 `@EnvironmentObject` 属性包装器来访问 `OrderController` 的共享实例。\n\n接下来，让我们通过在新菜单项屏幕上实现添加和移除订单的功能，来看看这在实际中如何运作。\n"
- fmt: "# How Dependency Injection Keeps Each Test Isolated\n\nHere’s the test list\
    \ for how `MenuItemDetail.ViewModel` should manage the button to update the order\
    \ through `OrderController`:\n\n```\n// MenuItemDetail.ViewModelTests.swift\n\
    // ...\nfunc testWhenItemIsInOrderButtonSaysRemove() {}\nfunc testWhenItemIsNotInOrderButtonSaysAdd()\
    \ {}\nfunc testWhenItemIsInOrderButtonActionRemovesIt() {}\nfunc testWhenItemIsNotInOrderButtonActionAddsIt()\
    \ {}\n```\n\nLet’s start with the test for the button text value when the ViewModel’s\
    \ item is already in the order:\n\n```\nfunc testWhenItemIsInOrderButtonSaysRemove()\
    \ {\n    // Arrange inputs\n    // Act by reading the button text from the ViewModel\n\
    \    XCTAssertEqual(text, \"Remove from order\")\n}\n```\n\nWhere does the `text`\
    \ we are checking come from? From a property of the ViewModel, the one the `View`\
    \ will eventually read:\n\n```\nfunc testWhenItemIsInOrderButtonSaysRemove() {\n\
    \    // Arrange inputs\n    let text = viewModel.addOrRemoveFromOrderButtonText()\n\
    \    XCTAssertEqual(text, \"Remove from order\")\n}\n```\n\n`MenuItemDetail.ViewModel`\
    \ needs a `MenuItem` to show and the `OrderController` to use to check if the\
    \ item is in the order. The state that should result in the “Remove from order”\
    \ text requires that the input `MenuItem` is part of the order stored in `OrderController`:\n\
    \n```\nfunc testWhenItemIsInOrderButtonSaysRemove() {\n    let item = MenuItem.fixture()\n\
    \    let orderController = OrderController()\n    orderController.addToOrder(item:\
    \ item)\n    let viewModel = MenuItemDetail.ViewModel(item: item, orderController:\
    \ orderController)\n    // Compiler says: Extra argument 'orderController' in\
    \ call\n    let text = viewModel.addOrRemoveFromOrderButtonText\n    XCTAssertEqual(text,\
    \ \"Remove from order\")\n}\n```\n\nLet’s update the ViewModel with the simplest\
    \ code that can make the test compile and pass:\n\n```\n// MenuItemDetail.ViewModel\
    \ .swift\n// ...\nextension MenuItemDetail {\n    struct ViewModel {\n       \
    \ // ...\n        let addOrRemoveFromOrderButtonText = \"Remove from order\"\n\
    \        private let orderController: OrderController\n        // TODO: Using\
    \ default value for OrderController while\n        // working on the ViewModel\
    \ implementation.\n        // We'll remove it once done and inject it from the\
    \ view.\n        init(item: MenuItem, orderController: OrderController = OrderController())\
    \ {\n            self.item = item\n            self.orderController = orderController\n\
    \            // ...\n        }\n    }\n}\n```\n\nNotice how I used a default value\
    \ for the `OrderController` parameter. A default value saves us from updating\
    \ the view to pass the correct value to its ViewModel: extra work that would only\
    \ delay the feedback cycle. It’s better to stay focused on the ViewModel, make\
    \ it work properly, and only then move on updating the view.\n\nI also added a\
    \ comment prefixed with `\"TODO\"` to note the compromise made by using the default\
    \ value.\n\n`TODO` comments are a way to leave reminders in the codebase. You\
    \ can use a script or a tool like [SwiftLint](https://github.com/realm/SwiftLint)\
    \ to add a Build Phase Run Script step that generates warnings for each `TODO`\
    \ comment, so you won’t forget about them.\n\n`TODO`s are great to leave yourself\
    \ quick notes while in the TDD flow, but you should address all of them before\
    \ considering your work finished. Avoid opening pull requests against your main\
    \ branch that have `TODO`s in them. If you can’t take care of a `TODO` because\
    \ it’s out of scope or you are waiting on something else, then move it to your\
    \ project management system: leftover `TODO` warnings create extra noise in the\
    \ codebase that could hide new genuine warnings.\n\nIf you now run the tests for\
    \ `MenuItemDetail.ViewModel` using the `Ctrl Option Cmd U` keyboard shortcut,\
    \ you’ll see they pass.\n\nWith a green baseline established, we can now refactor\
    \ the ViewModel implementation to be an `ObservableObject` that publishes its\
    \ `addOrRemoveFromOrderButtonText` property, so the view will automatically update\
    \ as the user adds or removes the item to or from their order:\n\n```\n// MenuItemDetail.ViewModel.swift\n\
    import Combine\nextension MenuItemDetail {\n    class ViewModel: ObservableObject\
    \ {\n        // ...\n        @Published private(set) var addOrRemoveFromOrderButtonText\
    \ = \"Remove from order\"\n        // ...\n    }\n}\n```\n\nIf we rerun the tests\
    \ using the `Ctrl Option Cmd G` keyboard shortcut, we can see they still pass.\
    \ There isn’t any real logic, though: the property value is hardcoded. Writing\
    \ the test for when the item is not in the order will force us to come up with\
    \ a real implementation:\n\n```\n// MenuItemDetail.ViewModelTests .swift\n// ...\n\
    func testWhenItemIsNotInOrderButtonSaysAdd() {\n    let item = MenuItem.fixture()\n\
    \    let orderController = OrderController()\n    let viewModel = MenuItemDetail.ViewModel(item:\
    \ item, orderController: orderController)\n    let text = viewModel.addOrRemoveFromOrderButtonText\n\
    \    XCTAssertEqual(text, \"Add to order\")\n}\n```\n\nHere’s how to make the\
    \ test pass:\n\n```\n// MenuItemDetail.ViewModel.swift\n// ...\nextension MenuItemDetail\
    \ {\n    class ViewModel: ObservableObject {\n        // ...\n        private\
    \ var cancellables = Set<AnyCancellable>()\n        // TODO: Using default value\
    \ for OrderController while\n        // Working on the ViewModel implementation.\n\
    \        // We'll remove it once done and inject it from the view.\n        init(item:\
    \ MenuItem, orderController: OrderController = OrderController()) {\n        \
    \    // ...\n            self.orderController.$order\n                .sink {\
    \ [weak self] order in\n                    guard let self = self else { return\
    \ }\n                    if (order.items.contains { $0 == self.item }) {\n   \
    \                     self.addOrRemoveFromOrderButtonText = \"Remove from order\"\
    \n                    } else {\n                        self.addOrRemoveFromOrderButtonText\
    \ = \"Add to order\"\n                    }\n                }\n             \
    \   .store(in: &cancellables)\n        }\n    }\n}\n```\n\nThe approach is the\
    \ same for the method holding the action for `Button` to perform in the view layer:\n\
    \n```\n// MenuItemDetail.ViewModelTests.swift\nfunc testWhenItemIsInOrderButtonActionRemovesIt()\
    \ {\n    let item = MenuItem.fixture()\n    let orderController = OrderController()\n\
    \    orderController.addToOrder(item: item)\n    let viewModel = MenuItemDetail.ViewModel(item:\
    \ item, orderController: orderController)\n    viewModel.addOrRemoveFromOrder()\n\
    \    XCTAssertFalse(orderController.order.items.contains { $0 == item })\n}\n\n\
    func testWhenItemIsNotInOrderButtonActionAddsIt() {\n    let item = MenuItem.fixture()\n\
    \    let orderController = OrderController()\n    let viewModel = MenuItemDetail.ViewModel(item:\
    \ item, orderController: orderController)\n    viewModel.addOrRemoveFromOrder()\n\
    \    XCTAssertTrue(orderController.order.items.contains { $0 == item })\n}\n\n\
    // MenuItemDetail.ViewModel.swift\nfunc addOrRemoveFromOrder() {\n    if (orderController.order.items.contains\
    \ { $0 == item }) {\n        orderController.removeFromOrder(item: item)\n   \
    \ } else {\n        orderController.addToOrder(item: item)\n    }\n}\n```"
  raw: '## How Dependency Injection Keeps Each Test Isolated


    Here’s the test list for how `MenuItemDetail.ViewModel` should manage the button
    to update the order through `OrderController` :


    ```

    // MenuItemDetail.ViewModelTests.swift

    // ...

    func testWhenItemIsInOrderButtonSaysRemove() {}

    func testWhenItemIsNotInOrderButtonSaysAdd() {}

    func testWhenItemIsInOrderButtonActionRemovesIt() {}

    func testWhenItemIsNotInOrderButtonActionAddsIt() {}

    ```


    Let’s start with the test for the button text value when the ViewModel’s item
    is already in the order:


    ```

    func testWhenItemIsInOrderButtonSaysRemove() {

    // Arrange inputs

    // Act by reading the button text from the ViewModel

    XCTAssertEqual(text, "Remove from order")

    }

    ```


    Where does the `text` we are checking come from? From a property of the ViewModel,
    the one the `View` will eventually read:


    ```

    func testWhenItemIsInOrderButtonSaysRemove() {

    // Arrange inputs

    let text = viewModel.addOrRemoveFromOrderButtonText()

    XCTAssertEqual(text, "Remove from order")

    }

    ```


    `MenuItemDetail.ViewModel` needs a `MenuItem` to show and the `OrderController`
    to use to check if the item is in the order. The state that should result in the
    “Remove from order” text requires that the input `MenuItem` is part of the order
    stored in `OrderController` :


    ```

    func testWhenItemIsInOrderButtonSaysRemove() {

    let item = MenuItem.fixture()

    let orderController = OrderController()

    orderController.addToOrder(item: item)

    let viewModel = MenuItemDetail.ViewModel(item: item, orderController: orderController)

    // Compiler says: Extra argument ''orderController'' in call

    let text = viewModel.addOrRemoveFromOrderButtonText

    XCTAssertEqual(text, "Remove from order")

    }

    ```


    Let’s update the ViewModel with the simplest code that can make the test compile
    and pass:


    ```

    // MenuItemDetail.ViewModel .swift

    // ...

    extension MenuItemDetail {

    struct ViewModel {

    // ...

    let addOrRemoveFromOrderButtonText = "Remove from order"

    private let orderController: OrderController

    // TODO: Using default value for OrderController while

    // working on the ViewModel implementation.

    // We''ll remove it once done and inject it from the view.

    init(item: MenuItem, orderController: OrderController = OrderController()) {

    self.item = item

    self.orderController = orderController

    // ...

    }

    }

    ```


    Notice how I used a default value for the `OrderController` parameter. A default
    value saves us from updating the view to pass the correct value to its ViewModel:
    extra work that would only delay the feedback cycle. It’s better to stay focused
    on the ViewModel, make it work properly, and only then move on updating the view.


    I also added a comment prefixed with `"TODO"` to note the compromise made by using
    the default value.


    `TODO` comments are a way to leave reminders in the codebase. You can use a script
    or a tool like [SwiftLint](https://github.com/realm/SwiftLint) to add a Build
    Phase Run Script step that generates warnings for each `TODO` comment , so you
    won’t forget about them.


    `TODO`s are great to leave yourself quick notes while in the TDD flow, but you
    should address all of them before considering your work finished. Avoid opening
    pull requests against your main branch that have `TODO`s in them. If you can’t
    take care of a `TODO` because it’s out of scope or you are waiting on something
    else, then move it to your project management system: leftover `TODO` warnings
    create extra noise in the codebase that could hide new genuine warnings.


    If you now run the tests for `MenuItemDetail.ViewModel` using the `Ctrl Option
    Cmd U` keyboard shortcut, you’ll see they pass.


    With a green baseline established, we can now refactor the ViewModel implementation
    to be an `ObservableObject` that publishes its `addOrRemoveFromOrderButtonText`
    property, so the view will automatically update as the user adds or removes the
    item to or from their order:


    ```

    // MenuItemDetail.ViewModel.swift

    import Combine

    extension MenuItemDetail {

    class ViewModel: ObservableObject {

    // ...

    @Published private(set) var addOrRemoveFromOrderButtonText = "Remove from order"

    // ...

    }

    ```


    If we rerun the tests using the `Ctrl Option Cmd G` keyboard shortcut, we can
    see they still pass. There isn’t any real logic, though: the property value is
    hardcoded. Writing the test for when the item is not in the order will force us
    to come up with a real implementation:


    ```

    // MenuItemDetail.ViewModelTests .swift

    // ...

    func testWhenItemIsNotInOrderButtonSaysAdd() {

    let item = MenuItem.fixture()

    let orderController = OrderController()

    let viewModel = MenuItemDetail.ViewModel(item: item, orderController: orderController)

    let text = viewModel.addOrRemoveFromOrderButtonText

    XCTAssertEqual(text, "Add to order")

    }

    ```


    Here’s how to make the test pass:


    ```

    // MenuItemDetail.ViewModel.swift

    // ...

    extension MenuItemDetail {

    class ViewModel: ObservableObject {

    // ...

    private var cancellables = Set()

    // TODO: Using default value for OrderController while

    // Working on the ViewModel implementation.

    // We''ll remove it once done and inject it from the view.

    init(item: MenuItem, orderController: OrderController = OrderController()) {

    // ...

    self.orderController.$order

    .sink { [weak self] order in

    guard let self = self else { return }

    if (order.items.contains { $0 == self.item }) {

    self.addOrRemoveFromOrderButtonText = "Remove from order"

    } else {

    self.addOrRemoveFromOrderButtonText = "Add to order"

    }

    }

    .store(in: &cancellables)

    }

    }

    }

    ```


    The approach is the same for the method holding the action for `Button` to perform
    in the view layer:


    ```

    // MenuItemDetail.ViewModelTests.swift

    func testWhenItemIsInOrderButtonActionRemovesIt() {

    let item = MenuItem.fixture()

    let orderController = OrderController()

    orderController.addToOrder(item: item)

    let viewModel = MenuItemDetail.ViewModel(item: item, orderController: orderController)

    viewModel.addOrRemoveFromOrder()

    XCTAssertFalse(orderController.order.items.contains { $0 == item })

    }

    func testWhenItemIsNotInOrderButtonActionAddsIt() {

    let item = MenuItem.fixture()

    let orderController = OrderController()

    let viewModel = MenuItemDetail.ViewModel(item: item, orderController: orderController)

    viewModel.addOrRemoveFromOrder()

    XCTAssertTrue(orderController.order.items.contains { $0 == item })

    }

    // MenuItemDetail.ViewModel.swift

    func addOrRemoveFromOrder() {

    if (orderController.order.items.contains { $0 == item }) {

    orderController.removeFromOrder(item: item)

    } else {

    orderController.addToOrder(item: item)

    }

    }

