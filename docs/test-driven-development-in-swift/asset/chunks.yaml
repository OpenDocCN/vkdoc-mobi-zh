  raw: '## ViewModel


    The next step is to write a test for the object in which we’ll move the presentation
    logic for the `MenuRow`. How should we call this?


    *ViewModel* is a popular name for this kind of object. The term comes from the
    MVVM pattern for building UI applications [introduced by Microsoft in 2005](https://docs.microsoft.com/en-us/archive/blogs/johngossman/introduction-to-modelviewviewmodel-pattern-for-building-wpf-apps)
    and represents the “Model of a View, [...] a specialization of the Model that
    the View can use for data-binding.”


    An alternative name could be Presentation Model, as [defined by Martin Fowler](https://martinfowler.com/eaaDev/PresentationModel.html).
    I tend to prefer ViewModel , especially because of the data-binding capabilities
    that SwiftUI offers – more on those in the next chapter.


    As usual, let’s start with the test list:


    ```

    // MenuRowViewModelTests.swift

    @testable import Albertos

    import XCTest

    class MenuRowViewModelTests: XCTestCase {

    func testWhenItemIsNotSpicyTextIsItemNameOnly() {}

    func testWhenItemIsSpicyTextIsItemNameWithChiliEmoji() {}

    }

    ```


    What’s the simplest scenario to tackle first? The one where we don’t have to do
    any extra work:


    ```

    func testWhenItemIsNotSpicyTextIsItemNameOnly() {

    let item = MenuItem.fixture(name: "name", spicy: false)

    let viewModel = MenuRow.ViewModel(item: item)

    // Compiler says:         // Type ''MenuRow'' has no member ''ViewModel''

    XCTAssertEqual(viewModel.text, "name")

    }

    ```


    The compiler points out that there is no ViewModel type yet. Because a ViewModel
    is tied to a single view, using a [nested type](https://docs.swift.org/swift-book/LanguageGuide/NestedTypes.html)
    makes the one-to-one relationship clear. Of course, a standalone `MenuRowViewModel`
    would do as well.


    When using the nested type approach, we should still place the ViewModel in a
    dedicated file, to make it easier to find it when using Xcode’s Open Quickly functionality:


    ```

    // MenuRow.ViewModel.swift

    extension MenuRow {

    struct ViewModel {

    let text: String

    init(item: MenuItem) {

    text = ""

    }

    }

    }

    ```


    The first test now compiles but fails because of the empty string we set as the
    `text` value.


    Let’s make the test pass by updating the `MenuRow.ViewModel init` to


    ```

    init(item: MenuItem) {

    text = item.name

    }

    ```


    Now, let’s write a test for the chili addition:


    **func testWhenItemIsSpicyTextIsItemNameWithChiliEmoji**() {


        **let** `item =` **MenuItem.**`fixture(name: "name", spicy: true)`


        **let** `viewModel =` **MenuRow.ViewModel**`(item: item)`


        **XCTAssertEqual**`(viewModel.text, "name` ![../images/501287_1_En_6_Chapter/501287_1_En_6_Fige_HTML.gif](images/501287_1_En_6_Chapter/501287_1_En_6_Fige_HTML.gif)`")`


    `}`


    The test fails. We can recycle the ternary operator from the start of this chapter
    to make it pass and complete the implementation:


    **init**`(item:` **MenuItem**`) {`


        `text = item.spicy ? "\(item.name)` ![../images/501287_1_En_6_Chapter/501287_1_En_6_Figf_HTML.gif](images/501287_1_En_6_Chapter/501287_1_En_6_Figf_HTML.gif)`":
    item.name`


    `}`


    We’re in the green state. Is there any refactor we could apply to improve the
    implementation? Nothing comes to mind, so let’s proceed to wire the ViewModel
    to its view.


    ## Using the ViewModel in the View


    It’s time to update the `body` result builder to read from the `ViewModel`. This
    will keep the view humble, entrusting all the presentation logic to its `ViewModel`
    instance :


    ```

    // MenuRow.swift

    struct MenuRow: View {

    let viewModel: ViewModel

    var body: some View {

    Text(viewModel.text)

    }

    }

    // MenuList.swift

    struct MenuList: View {

    let sections: [MenuSection]

    var body: some View {

    List {

    ForEach(sections) { section in

    Section(header: Text(section.category)) {

    ForEach(section.items) { item in

    MenuRow(viewModel: .init(item: item))

    }

    }

    }

    }

    }

    }

    ```


    Figure [6-1](#501287_1_En_6_Chapter.xhtml#Fig1) shows the menu list with the spiciness
    indicator.


    ![../images/501287_1_En_6_Chapter/501287_1_En_6_Fig1_HTML.png](images/501287_1_En_6_Chapter/501287_1_En_6_Fig1_HTML.png)


    Figure 6-1


    The menu list rendered in the iPhone Simulator with the spiciness indicator


    ## Beyond Testability


    Thanks to `MenuRow.ViewModel`, we implemented the conditional logic to show the
    spiciness visual hint to the user in isolation and with the tests’ feedback to
    guide us. Once again, we only had to run the app at the end of the implementation
    process as a final check to ensure everything was wired up together.


    The view itself still doesn’t have a dedicated test, but there’s not much that
    can go wrong in there. Because it’s behavior-free, the only mistake that can happen
    is reading from the wrong `ViewModel` property, something that’s relatively easy
    to spot.


    With the ViewModel already in place, we’ll be able to use TDD for any new presentation
    detail in `MenuRow` with no extra setup cost.


    The decoupling also means that we can tinker with the UI layout easily because
    it’s streamlined and free from bulky behavioral code.


    Separating presentation logic from layout implementation enables parallelization
    when working in a team. Given a specification for a view, two developers can pair
    to define its `ViewModel` properties and then work side by side. One can implement
    the presentation logic that sets those properties with TDD, the other can define
    the `View` layout using the feedback-driven Xcode Preview process.


    The extra code we had to write to wedge the `ViewModel` between the SwiftUI view
    and the data model will pay off over time. Types are cheap. Working in a codebase
    made up of many little highly cohesive, loosely coupled objects is far more pleasurable
    than dealing with a few huge components containing all of the code.'
  trans: "\n# ViewModel\n\n下一步，我们将为 `MenuRow` 编写一个测试，该测试针对一个用于承载展示逻辑的对象。我们应该如何称呼这个对象？\n\
    \n`ViewModel` 是这类对象的一个常见名称。该术语源自 MVVM 模式，该模式用于构建 UI 应用程序，[由微软在 2005 年提出](https://docs.microsoft.com/en-us/archive/blogs/johngossman/introduction-to-modelviewviewmodel-pattern-for-building-wpf-apps)，它代表了“视图的模型，[...]\
    \ 是视图可用于数据绑定的模型的一种特殊化”。\n\n另一个可选名称是“展示模型”（Presentation Model），如同 [Martin Fowler\
    \ 所定义](https://martinfowler.com/eaaDev/PresentationModel.html)。我更倾向于使用 `ViewModel`，特别是考虑到\
    \ SwiftUI 提供的数据绑定能力——更多内容将在下一章中介绍。\n\n像往常一样，我们从测试列表开始：\n\n```\n// MenuRowViewModelTests.swift\n\
    @testable import Albertos\nimport XCTest\nclass MenuRowViewModelTests: XCTestCase\
    \ {\nfunc testWhenItemIsNotSpicyTextIsItemNameOnly() {}\nfunc testWhenItemIsSpicyTextIsItemNameWithChiliEmoji()\
    \ {}\n}\n```\n\n最应该先处理的最简单场景是什么？是那种我们无需做任何额外工作的场景：\n\n```\nfunc testWhenItemIsNotSpicyTextIsItemNameOnly()\
    \ {\nlet item = MenuItem.fixture(name: \"name\", spicy: false)\nlet viewModel\
    \ = MenuRow.ViewModel(item: item)\n// 编译器报错：         // Type 'MenuRow' has no\
    \ member 'ViewModel'\nXCTAssertEqual(viewModel.text, \"name\")\n}\n```\n\n编译器指出还没有\
    \ `ViewModel` 类型。由于 `ViewModel` 与单个视图绑定，使用[嵌套类型](https://docs.swift.org/swift-book/LanguageGuide/NestedTypes.html)可以清晰地表明这种一对一关系。当然，使用独立的\
    \ `MenuRowViewModel` 也同样可行。\n\n当使用嵌套类型方法时，我们仍然应该将 `ViewModel` 放在一个专用文件中，以便在使用\
    \ Xcode 的“快速打开”功能时更容易找到它：\n\n```\n// MenuRow.ViewModel.swift\nextension MenuRow\
    \ {\nstruct ViewModel {\nlet text: String\ninit(item: MenuItem) {\ntext = \"\"\
    \n}\n}\n}\n```\n\n现在第一个测试可以编译，但由于我们将 `text` 值设置为空字符串而失败。\n\n让我们更新 `MenuRow.ViewModel\
    \ init` 来让测试通过，修改为：\n\n```\ninit(item: MenuItem) {\ntext = item.name\n}\n```\n\
    \n现在，我们来为添加辣椒表情编写测试：\n\n```\nfunc testWhenItemIsSpicyTextIsItemNameWithChiliEmoji()\
    \ {\n    let item = MenuItem.fixture(name: \"name\", spicy: true)\n    let viewModel\
    \ = MenuRow.ViewModel(item: item)\n    XCTAssertEqual(viewModel.text, \"name \U0001F336\
    \")\n}\n```\n\n测试失败了。我们可以复用在章节开始时使用的三元运算符来让它通过，并完成实现：\n\n```\ninit(item: MenuItem)\
    \ {\n    text = item.spicy ? \"\\(item.name) \U0001F336\" : item.name\n}\n```\n\
    \n我们现在处于绿色通过状态。是否有任何可以重构的地方来改进实现？暂时想不出来，那么让我们继续将 `ViewModel` 连接到它的视图。\n\n## 在视图中使用\
    \ ViewModel\n\n是时候更新 `body` 结果构建器来从 `ViewModel` 中读取数据了。这将使视图保持谦逊，将所有展示逻辑委托给它的\
    \ `ViewModel` 实例：\n\n```\n// MenuRow.swift\nstruct MenuRow: View {\nlet viewModel:\
    \ ViewModel\nvar body: some View {\nText(viewModel.text)\n}\n}\n// MenuList.swift\n\
    struct MenuList: View {\nlet sections: [MenuSection]\nvar body: some View {\n\
    List {\nForEach(sections) { section in\nSection(header: Text(section.category))\
    \ {\nForEach(section.items) { item in\nMenuRow(viewModel: .init(item: item))\n\
    }\n}\n}\n}\n}\n}\n```\n\n图 6-1 显示了带有辣度指示器的菜单列表。\n\n![../images/501287_1_En_6_Chapter/501287_1_En_6_Fig1_HTML.png](img/501287_1_En_6_Fig1_HTML.png)\n\
    \n**图 6-1** iPhone 模拟器中渲染的带有辣度指示器的菜单列表\n\n## 超越可测试性\n\n得益于 `MenuRow.ViewModel`，我们实现了条件逻辑，可以在隔离环境中、并在测试反馈的指导下向用户显示辣度的视觉提示。再次强调，我们只需要在实现过程的最后阶段运行应用程序，作为最终检查以确保所有内容都连接在一起。\n\
    \n视图本身仍然没有专用的测试，但其中不太可能出错。因为它没有行为，唯一可能出现的错误是读取了错误的 `ViewModel` 属性，这是一个相对容易发现的问题。\n\
    \n由于 `ViewModel` 已经就位，我们将来可以为 `MenuRow` 的任何新展示细节使用 TDD，而无需额外的设置成本。\n\n解耦还意味着我们可以轻松地调整\
    \ UI 布局，因为它已经精简，并且没有冗长的行为代码。\n\n将展示逻辑与布局实现分离，在团队协作时可以实现并行化。根据一个视图的规格说明，两名开发人员可以结对定义其\
    \ `ViewModel` 的属性，然后并排工作。一个可以使用 TDD 实现设置这些属性的展示逻辑，另一个可以使用反馈驱动的 Xcode 预览流程来定义 `View`\
    \ 布局。\n\n我们在 SwiftUI 视图和数据模型之间插入 `ViewModel` 所额外编写的代码，其价值会随着时间的推移而体现。类型是廉价的。在一个由许多高度内聚、松散耦合的小对象组成的代码库中工作，远比处理几个包含所有代码的大型组件要愉悦得多。\n"
- fmt: "# ViewModels Everywhere!\n\nView models allow us to decouple the presentation\
    \ logic from the layout definition. Having the logic live in a standalone object\
    \ makes the code easier to test and modify because there are no ties to the SwiftUI\
    \ implementation requirements or the UIKit views’ life cycle.\n\nIf your view\
    \ does anything more than a 1-to-1 displaying of data from a model object, you\
    \ should have a `ViewModel` for it.\n\nWe know the menu list view will need more\
    \ complicated behavior than loading a static list of sections. While decomposing\
    \ the minimum viable feature set in Chapter [4](#501287_1_En_4_Chapter.xhtml),\
    \ we established the menu will likely come from a source such as a file or a remote\
    \ API.\n\nNow it’s the best time to refactor `MenuList` to use a `ViewModel`.\n\
    \nSince `MenuList` displays sections, its `ViewModel` should take care of generating\
    \ those sections. That is, `MenuList.ViewModel` should expose a `sections` property\
    \ for `MenuList` to read the same way `MenuRow.ViewModel` exposes a `text` property\
    \ for `MenuRow`.\n\nOne option could be to move the responsibility of calling\
    \ `groupMenuByCategory` from the SwiftUI app implementation to `MenuList.ViewModel`.\
    \ We could update the existing tests for the function to instantiate a view model\
    \ and read its `section` property, renaming them from `MenuGroupingTests` to `MenuListViewModelTests`.\n\
    \nA different approach could be moving the menu grouping logic into a dedicated\
    \ object instead and pass that to `MenuList.ViewModel`. This would simplify the\
    \ job of testing the `ViewModel`: we’d simply need to verify it uses the given\
    \ object to generate the sections.\n\nYet another approach, the one I want to\
    \ show you, is using *Function Injection*. Because functions are first-class citizens\
    \ in Swift, we can use them as arguments for other functions. This way, we can\
    \ build a `ViewModel` agnostic of the grouping implementation details by making\
    \ it ask for a closure to call to generate the sections.\n\n## Dependency Injection\n\
    \nWhen learning about software design and testing, the term Dependency Injection,\
    \ or DI, eventually comes up. It may sound daunting, but, as James Shore [puts\
    \ it](http://www.jamesshore.com/v2/blog/2006/dependency-injection-demystified),\
    \ Dependency Injection “is a 25-dollar term for a 5-cent concept.”\n\nInjecting\
    \ dependencies simply means passing them as values to the objects or methods that\
    \ need them, as opposed to getting a hold of the dependencies in the objects or\
    \ methods themselves. When a component explicitly asks for all of its dependencies,\
    \ it’s interface becomes honest, and a reader of the code won’t be surprised by\
    \ a hidden side effect.\n\nWhile there are frameworks that allow runtime dependency\
    \ injection, they come with such configuration overhead that is worth the investment\
    \ only in a few cases.\n\nFunction Injection is a case of DI where the dependency\
    \ is encapsulated in a single function.\n\nHere’s how to write a test that leverages\
    \ Function Injection:\n\n```\n// MenuList.ViewModelTests.swift\n@testable import\
    \ Albertos\nimport XCTest\n\nclass MenuListViewModelTests: XCTestCase {\n    func\
    \ testCallsGivenGroupingFunction() {\n        var called = false\n        let\
    \ inputSections = [MenuSection.fixture()]\n        let spyClosure: ([MenuItem])\
    \ -> [MenuSection] = { items in\n            called = true\n            return\
    \ inputSections\n        }\n        let viewModel = MenuList.ViewModel(menu: [.fixture()],\
    \ menuGrouping: spyClosure)\n        let sections = viewModel.sections\n     \
    \   // Check that the given closure was called\n        XCTAssertTrue(called)\n\
    \        // Check that the returned value was built with the closure\n       \
    \ XCTAssertEqual(sections, inputSections)\n    }\n}\n```\n\nThis test checks `MenuList.ViewModel`’s\
    \ behavior by using a “spy” closure. The closure sets a flag when called and returns\
    \ a constant value. We can then assert the `ViewModel` uses the closure to generate\
    \ the sections by checking that the flag became `true` and the returned value\
    \ is the one from the closure. We’ll talk more about spying on our code in Chapter\
    \ [12](#501287_1_En_12_Chapter.xhtml).\n\nFor the `XCTAssertEqual` on `[MenuSection]`\
    \ to work, we need to make both `MenuSection` and `MenuItem` conform to `Equatable`:\n\
    \n```\n// MenuItem.swift\nextension MenuItem: Equatable {}\n\n// MenuSection.swift\n\
    extension MenuSection: Equatable {}\n```\n\nHere’s an implementation of `MenuList.ViewModel`\
    \ that makes the test pass:\n\n```\n// MenuList.ViewModel.swift\nextension MenuList\
    \ {\n    struct ViewModel {\n        let sections: [MenuSection]\n\n        init(\n\
    \            menu: [MenuItem],\n            menuGrouping: @escaping ([MenuItem])\
    \ -> [MenuSection] = groupMenuByCategory\n        ) {\n            self.sections\
    \ = menuGrouping(menu)\n        }\n    }\n}\n```\n\nThe combination of Function\
    \ Injection and Swift’s default parameter values means callers in the production\
    \ code don’t need to concern themselves with what value to pass to `menuGrouping`.\n\
    \nThe final step is updating `MenuList` to use its `ViewModel` and `AlbertosApp`\
    \ to provide `MenuList` with one:\n\n```\n// MenuList.swift\nimport SwiftUI\n\n\
    struct MenuList: View {\n    let viewModel: ViewModel\n\n    var body: some View\
    \ {\n        List {\n            ForEach(viewModel.sections) { section in\n  \
    \              Section(header: Text(section.category)) {\n                   \
    \ ForEach(section.items) { item in\n                        MenuRow(viewModel:\
    \ .init(item: item))\n                    }\n                }\n            }\n\
    \        }\n    }\n}\n\n// AlbertosApp.swift\n@main\nstruct AlbertosApp: App {\n\
    \    var body: some Scene {\n        WindowGroup {\n            NavigationView\
    \ {\n                MenuList(viewModel: .init(menu: menu))\n                \
    \    .navigationTitle(\"Alberto's ![../images/501287_1_En_6_Chapter/501287_1_En_6_Figa_HTML.gif](images/501287_1_En_6_Chapter/501287_1_En_6_Figa_HTML.gif)\"\
    )\n            }\n        }\n    }\n}\n```\n\nFunction Injection is useful to\
    \ decouple an object that needs to coordinate different behaviors from the implementation\
    \ details of such behaviors. ViewModels often take up that coordination role;\
    \ they are the *glue* between the view and the different business logic components\
    \ that provide the data to show.\n\nThis approach might seem overkill right now\
    \ but will come in handy once `MenuList.ViewModel` becomes responsible for coordinating\
    \ between the view and the data loading logic.\n\nWe’ve seen how using the ViewModel\
    \ pattern allows us to keep SwiftUI views focused only on the layout and have\
    \ pure Swift objects responsible for the presentation logic. Because SwiftUI views\
    \ are a function of state, the framework marries perfectly with TDD. You write\
    \ the logic to provide the input test-first to guarantee its correctness, and\
    \ SwiftUI ensures the output on screen will be consistent.\n\nThe ViewModels we\
    \ built in this chapter are both static, but that’s seldom the case. Most applications\
    \ load data from one or more sources and update their views with it. The data\
    \ and the view change over time.\n\nApple’s Combine framework provides the tools\
    \ to manage the flow of data over time elegantly and with tight integration with\
    \ SwiftUI. In the next chapter, we’ll see how to evolve our ViewModels to handle\
    \ dynamic changes in the app’s state.\n\n## Key Takeaways\n\n- **The view doesn’t\
    \ have to be responsible for deciding both *how* to show data and *what* data\
    \ to show.** It can be humble and only declare the layout while delegating the\
    \ presentation logic.\n- **Use a `ViewModel` to hold all the presentation logic.**\
    \ By detaching it from the SwiftUI implementation, you can use TDD like on any\
    \ other business logic object.\n- **Make the `View` ask the `ViewModel` what to\
    \ show.** This keeps the view focused on layout only, a perfect fit for quickly\
    \ iterating with Xcode Previews.\n- **Use Function Injection to isolate nontrivial\
    \ behavior from components depending on it.** This lets you use the `ViewModel`\
    \ as a coordination layer only, making it easier to add more functionality to\
    \ it and its view.\n- **Many isolated objects doing only one thing each are easier\
    \ to work with than a few interdependent ones doing many things each.**"
  raw: '## ViewModels Everywhere!


    View models allow us to decouple the presentation logic from the layout definition.
    Having the logic live in a standalone object makes the code easier to test and
    modify because there are no ties to the SwiftUI implementation requirements or
    the UIKit views’ life cycle.


    If your view does anything more than a 1-to-1 displaying of data from a model
    object, you should have a ViewModel for it.


    We know the menu list view will need more complicated behavior than loading a
    static list of sections. While decomposing the minimum viable feature set in Chapter
    [4](#501287_1_En_4_Chapter.xhtml), we established the menu will likely come from
    a source such as a file or a remote API.


    Now it’s the best time to refactor `MenuList` to use a ViewModel.


    Since `MenuList` displays sections, its ViewModel should take care of generating
    those sections. That is, `MenuList.ViewModel` should expose a `sections` property
    for `MenuList` to read the same way `MenuRow.ViewModel` exposes a `text` property
    for `MenuRow`.


    One option could be to move the responsibility of calling `groupMenuByCategory`
    from the SwiftUI app implementation to `MenuList.ViewModel`. We could update the
    existing tests for the function to instantiate a view model and read its `section`
    property, renaming them from `MenuGroupingTests` to `MenuListViewModelTests`.


    A different approach could be moving the menu grouping logic into a dedicated
    object instead and pass that to `MenuList`.`ViewModel`. This would simplify the
    job of testing the ViewModel: we’d simply need to verify it uses the given object
    to generate the sections.


    Yet another approach, the one I want to show you, is using *Function Injection*
    . Because functions are first-class citizens in Swift, we can use them as arguments
    for other functions. This way, we can build a ViewModel agnostic of the grouping
    implementation details by making it ask for a closure to call to generate the
    sections.


    Dependency Injection


    When learning about software design and testing, the term Dependency Injection,
    or DI , eventually comes up. It may sound daunting, but, as James Shore [puts
    it](http://www.jamesshore.com/v2/blog/2006/dependency-injection-demystified),
    Dependency Injection “is a 25-dollar term for a 5-cent concept.”


    Injecting dependencies simply means passing them as values to the objects or methods
    that need them, as opposed to getting a hold of the dependencies in the objects
    or methods themselves. When a component explicitly asks for all of its dependencies,
    it’s interface becomes honest, and a reader of the code won’t be surprised by
    a hidden side effect.


    While there are frameworks that allow runtime dependency injection, they come
    with such configuration overhead that is worth the investment only in a few cases.


    Function Injection is a case of DI where the dependency is encapsulated in a single
    function.


    Here’s how to write a test that leverages Function Injection:


    ```

    // MenuList.ViewModelTests.swift

    @testable import Albertos

    import XCTest

    class MenuListViewModelTests: XCTestCase {

    func testCallsGivenGroupingFunction() {

    var called = false

    let inputSections = [MenuSection.fixture()]

    let spyClosure: ([MenuItem]) -> [MenuSection] = { items in

    called = true

    return inputSections

    }

    let viewModel = MenuList.ViewModel(menu: [.fixture()], menuGrouping: spyClosure)

    let sections = viewModel.sections

    // Check that the given closure was called

    XCTAssertTrue(called)

    // Check that the returned value was built with the  // closure

    XCTAssertEqual(sections, inputSections)

    }

    }

    ```


    This test checks `MenuList.ViewModel`’s behavior by using a “spy” closure. The
    closure sets a flag when called and returns a constant value. We can then assert
    the ViewModel uses the closure to generate the sections by checking that the flag
    became `true` and the returned value is the one from the closure. We’ll talk more
    about spying on our code in Chapter [12](#501287_1_En_12_Chapter.xhtml).


    For the `XCTAssertEqual` on `[MenuSection]` to work, we need to make both `MenuSection`
    and `MenuItem` conform to `Equatable`:


    ```

    // MenuItem.swift

    extension MenuItem: Equatable {}

    // MenuSection.swift

    extension MenuSection: Equatable {}

    ```


    Here’s an implementation of `MenuList.ViewModel` that makes the test pass:


    ```

    // MenuList.ViewModel.swift

    extension MenuList {

    struct ViewModel {

    let sections: [MenuSection]

    init(

    menu: [MenuItem],

    menuGrouping: @escaping ([MenuItem]) -> [MenuSection] = groupMenuByCategory

    ) {

    self.sections = menuGrouping(menu)

    }

    }

    }

    ```


    The combination of Function Injection and Swift’s default parameter values means
    callers in the production code don’t need to concern themselves with what value
    to pass to `menuGrouping`.


    The final step is updating `MenuList` to use its `ViewModel` and `AlbertosApp`
    to provide `MenuList` with one:


    ```

    // MenuList.swift

    import SwiftUI

    struct MenuList: View {

    let viewModel: ViewModel

    var body: some View {

    List {

    ForEach(viewModel.sections) { section in

    Section(header: Text(section.category)) {

    ForEach(section.items) { item in

    MenuRow(viewModel: .init(item: item))

    }

    }

    }

    }

    }

    }

    // AlbertosApp.swift

    @main

    struct AlbertosApp: App {

    var body: some Scene {

    WindowGroup {

    NavigationView {

    MenuList(viewModel: .init(menu: menu))

    ```


    `.navigationTitle("Alberto''s` ![../images/501287_1_En_6_Chapter/501287_1_En_6_Figa_HTML.gif](images/501287_1_En_6_Chapter/501287_1_En_6_Figa_HTML.gif)`")`


    ```

    }

    }

    }

    }

    ```


    Function Injection is useful to decouple an object that needs to coordinate different
    behaviors from the implementation details of such behaviors. ViewModels often
    take up that coordination role; they are the *glue* between the view and the different
    business logic components that provide the data to show.


    This approach might seem overkill right now but will come in handy once `MenuList.ViewModel`
    becomes responsible for coordinating between the view and the data loading logic.


    We’ve seen how using the ViewModel pattern allows us to keep SwiftUI views focused
    only on the layout and have pure Swift objects responsible for the presentation
    logic. Because SwiftUI views are a function of state, the framework marries perfectly
    with TDD. You write the logic to provide the input test-first to guarantee its
    correctness, and SwiftUI ensures the output on screen will be consistent.


    The ViewModels we built in this chapter are both static, but that’s seldom the
    case. Most applications load data from one or more sources and update their views
    with it. The data and the view change over time.


    Apple’s Combine framework provides the tools to manage the flow of data over time
    elegantly and with tight integration with SwiftUI. In the next chapter, we’ll
    see how to evolve our ViewModels to handle dynamic changes in the app’s state.


    ## Key Takeaways


    *   **The view doesn’t have to be responsible for deciding both** ***how*** **to
    show data and** ***what*** **data to show**. It can be humble and only declare
    the layout while delegating the presentation logic.


    *   **Use a** **ViewModel** **to hold all the presentation logic**. By detaching
    it from the SwiftUI implementation, you can use TDD like on any other business
    logic object.


    *   **Make the** **View** **ask the** **ViewModel** **what to show**. This keeps
    the view focused on layout only, a perfect fit for quickly iterating with Xcode
    Previews.


    *   **Use Function Injection to isolate nontrivial behavior from components depending
    on it**. This lets you use the ViewModel as a coordination layer only, making
    it easier to add more functionality to it and its view.


    *   **Many isolated objects doing only one thing each are easier to work with
    than a few interdependent ones doing many things each**.'
  trans: "\n# ViewModel 无处不在！\n\n视图模型让我们能够将呈现逻辑与布局定义解耦。将逻辑放在独立对象中，使代码更易于测试和修改，因为它既不依赖\
    \ SwiftUI 的实现要求，也不依赖 UIKit 视图的生命周期。\n\n如果你的视图除了一对一显示模型对象的数据之外还有任何其他动作，就应该为其创建一个\
    \ `ViewModel`。\n\n我们知道菜单列表视图需要比加载静态分组列表更复杂的行为。在第 4 章分解最小可行功能集时，我们确定菜单可能来自文件或远程\
    \ API 等来源。\n\n现在是重构 `MenuList` 以使用 `ViewModel` 的最佳时机。\n\n由于 `MenuList` 显示分组，其\
    \ `ViewModel` 应负责生成这些分组。也就是说，`MenuList.ViewModel` 应该暴露一个 `sections` 属性供 `MenuList`\
    \ 读取，就像 `MenuRow.ViewModel` 为 `MenuRow` 暴露一个 `text` 属性一样。\n\n一种选择是将调用 `groupMenuByCategory`\
    \ 的责任从 SwiftUI app 的实现转移到 `MenuList.ViewModel`。我们可以更新该函数的现有测试，使其实例化一个视图模型并读取其\
    \ `section` 属性，并将测试从 `MenuGroupingTests` 重命名为 `MenuListViewModelTests`。\n\n另一种方法是将菜单分组逻辑移入一个专用对象，然后将其传递给\
    \ `MenuList.ViewModel`。这将简化测试 `ViewModel` 的工作：我们只需验证它使用了给定的对象来生成分组。\n\n还有一种方法，也是我想向你展示的，就是使用*函数注入*。由于函数是\
    \ Swift 中的一等公民，我们可以将它们用作其他函数的参数。这样，我们可以通过让 `ViewModel` 要求传入一个闭包来生成分组，从而构建一个与分组实现细节无关的\
    \ `ViewModel`。\n\n## 依赖注入\n\n在学习软件设计和测试时，最终都会遇到“依赖注入”（Dependency Injection，简称\
    \ DI）这个术语。它听起来可能令人生畏，但正如 James Shore [所说](http://www.jamesshore.com/v2/blog/2006/dependency-injection-demystified)，依赖注入是“一个价值\
    \ 5 美分的概念，却用了个 25 美元的词”。\n\n注入依赖关系，简单来说就是将依赖作为值传递给需要它们的对象或方法，而不是在对象或方法内部自行获取依赖。当一个组件明确要求其所有依赖时，它的接口就变得诚实，代码阅读者不会因为隐藏的副作用而感到意外。\n\
    \n虽然存在允许运行时依赖注入的框架，但它们带有相当大的配置开销，只有在少数情况下才值得投资。\n\n函数注入是 DI 的一种情况，其中依赖关系封装在单个函数中。\n\
    \n以下是利用函数注入编写测试的方法：\n\n```\n// MenuList.ViewModelTests.swift\n@testable import\
    \ Albertos\nimport XCTest\n\nclass MenuListViewModelTests: XCTestCase {\n    func\
    \ testCallsGivenGroupingFunction() {\n        var called = false\n        let\
    \ inputSections = [MenuSection.fixture()]\n        let spyClosure: ([MenuItem])\
    \ -> [MenuSection] = { items in\n            called = true\n            return\
    \ inputSections\n        }\n        let viewModel = MenuList.ViewModel(menu: [.fixture()],\
    \ menuGrouping: spyClosure)\n        let sections = viewModel.sections\n     \
    \   // 检查给定的闭包是否被调用\n        XCTAssertTrue(called)\n        // 检查返回值是否由闭包构建\n\
    \        XCTAssertEqual(sections, inputSections)\n    }\n}\n```\n\n此测试通过使用“间谍”闭包来检查\
    \ `MenuList.ViewModel` 的行为。闭包在调用时设置一个标志并返回一个常量值。然后我们可以通过检查该标志变为 `true` 并且返回值来自该闭包，来断言\
    \ `ViewModel` 使用了该闭包生成分组。我们将在第 12 章中进一步讨论代码中的监视（spying）技术。\n\n为了让 `XCTAssertEqual`\
    \ 在 `[MenuSection]` 上生效，我们需要让 `MenuSection` 和 `MenuItem` 都遵循 `Equatable` 协议：\n\
    \n```\n// MenuItem.swift\nextension MenuItem: Equatable {}\n\n// MenuSection.swift\n\
    extension MenuSection: Equatable {}\n```\n\n以下是使测试通过的 `MenuList.ViewModel` 实现：\n\
    \n```\n// MenuList.ViewModel.swift\nextension MenuList {\n    struct ViewModel\
    \ {\n        let sections: [MenuSection]\n\n        init(\n            menu: [MenuItem],\n\
    \            menuGrouping: @escaping ([MenuItem]) -> [MenuSection] = groupMenuByCategory\n\
    \        ) {\n            self.sections = menuGrouping(menu)\n        }\n    }\n\
    }\n```\n\n函数注入与 Swift 的默认参数值相结合，意味着生产代码中的调用者无需关心要为 `menuGrouping` 传递什么值。\n\n最后一步是更新\
    \ `MenuList` 以使用其 `ViewModel`，并更新 `AlbertosApp` 为 `MenuList` 提供一个 `ViewModel`：\n\
    \n```\n// MenuList.swift\nimport SwiftUI\n\nstruct MenuList: View {\n    let viewModel:\
    \ ViewModel\n\n    var body: some View {\n        List {\n            ForEach(viewModel.sections)\
    \ { section in\n                Section(header: Text(section.category)) {\n  \
    \                  ForEach(section.items) { item in\n                        MenuRow(viewModel:\
    \ .init(item: item))\n                    }\n                }\n            }\n\
    \        }\n    }\n}\n\n// AlbertosApp.swift\n@main\nstruct AlbertosApp: App {\n\
    \    var body: some Scene {\n        WindowGroup {\n            NavigationView\
    \ {\n                MenuList(viewModel: .init(menu: menu))\n                \
    \    .navigationTitle(\"Alberto's ![../images/501287_1_En_6_Chapter/501287_1_En_6_Figa_HTML.gif](img/501287_1_En_6_Figa_HTML.gif)\"\
    )\n            }\n        }\n    }\n}\n```\n\n函数注入对于解耦需要协调不同行为的对象与这些行为的具体实现细节非常有用。ViewModel\
    \ 通常扮演这种协调角色；它们是视图与提供要显示数据的各种业务逻辑组件之间的*粘合剂*。\n\n这种方法现在看起来可能有点大材小用，但一旦 `MenuList.ViewModel`\
    \ 需要负责协调视图与数据加载逻辑，它就会派上用场。\n\n我们已经看到，使用 ViewModel 模式如何让我们能够将 SwiftUI 视图仅专注于布局，并让纯\
    \ Swift 对象负责呈现逻辑。由于 SwiftUI 视图是状态的函数，该框架与 TDD 完美契合。你通过测试优先的方式编写逻辑来提供输入，以保证其正确性，而\
    \ SwiftUI 则确保屏幕上的输出保持一致。\n\n本章中构建的 ViewModel 都是静态的，但实际情况并非总是如此。大多数应用程序从一个或多个来源加载数据并用其更新视图。数据和视图都会随时间变化。\n\
    \nApple 的 Combine 框架提供了优雅地管理随时间变化的数据流的工具，并与 SwiftUI 紧密集成。在下一章中，我们将了解如何演变我们的 ViewModel\
    \ 来处理应用状态的动态变化。\n\n## 关键要点\n\n- **视图不必同时负责决定*如何*显示数据和*显示什么*数据。** 它可以保持谦逊，只声明布局，同时将呈现逻辑委托出去。\n\
    - **使用 `ViewModel` 来容纳所有呈现逻辑。** 通过将其与 SwiftUI 实现分离，你可以像对待其他业务逻辑对象一样使用 TDD。\n-\
    \ **让 `View` 询问 `ViewModel` 要显示什么。** 这使视图仅专注于布局，非常适合利用 Xcode 预览进行快速迭代。\n- **使用函数注入将非平凡行为与依赖它的组件隔离开来。**\
    \ 这让你可以将 `ViewModel` 仅用作协调层，从而更容易为其及其视图添加更多功能。\n- **许多各自只做一件事的独立对象，比少数做许多事且相互依赖的对象更容易处理。**\n"
- fmt: "# Endnotes\n\n1.  For reference, here’s the full printout of the `body` via\
    \ `po` in the Xcode console with `lldb`:\n\n    ```\n    ▿ VStack>\n    ▿ _tree\
    \ : Tree>\n    ▿ root : _VStackLayout\n    ▿ alignment : HorizontalAlignment\n\
    \    ▿ key : AlignmentKey\n    - bits : 140735441946104\n    - spacing : nil\n\
    \    ▿ content : TupleView\n    ▿ value : 2 elements\n    ▿ .0 : Text\n    ▿ storage\
    \ : Storage\n    ▿ anyTextStorage : \n    ▿ modifiers : 1 element\n    ▿ 0 : Modifier\n\
    \    - anyTextModifier : \n    ▿.1 : Text\n    ▿ storage : Storage\n    ▿ anyTextStorage\
    \ : \n    - modifiers : 0 elements\n    ```\n\n2.  The idea of making a hard-to-test\
    \ object free from behavior was introduced by Michael Feathers in his paper “The\
    \ Humble Dialog Box” and then formalized into the Humble Object pattern by Gerard\
    \ Meszaros in *xUnit Test Patterns* (p. 695).\n\n# Testing Dynamic SwiftUI Views\n\
    \n*How do you test the way a view updates when it receives new data?*\n\n*By wrapping\
    \ the updates in a* `@Published` *property of the ViewModel and test that using\
    \ asynchronous expectations.*\n\nIn the previous chapter, we saw that SwiftUI\
    \ views are hard to test and that the trick is to bypass them, moving all of the\
    \ presentation logic in a dedicated object, the ViewModel. When all your presentation\
    \ logic is in the ViewModel, you can test dynamic views as well as static ones.\n\
    \nSwiftUI and Combine let you seamlessly update the view as new data becomes available.\
    \ You can make the ViewModel *publish* properties using Combine, and, if you subscribe\
    \ the view to them, SwiftUI will trigger a re-render every time a new value is\
    \ published.\n\nBecause SwiftUI manages the view update, you only need to test\
    \ that the ViewModel publishes correct values.\n\nIn this chapter, we’ll look\
    \ at how to use Test-Driven Development to make a ViewModel expose data with Combine\
    \ and how to decouple it from the concrete data source using the *Dependency Inversion\
    \ Principle (DIP)*.\n\nWe’ll be working with asynchronous code; if you need a\
    \ reminder on how this mode of execution differs from the synchronous logic we’ve\
    \ worked with so far, head over to the “Expectations for Asynchronous Code” section\
    \ in Chapter [2](#501287_1_En_2_Chapter.xhtml).\n\nAlberto likes to change his\
    \ menu frequently, depending on what’s in season and what bargains he can get\
    \ at the produce market. You decide to read the menu from a remote API to update\
    \ it without requiring a new app version.\n\nLoading the menu from a remote API\
    \ involves:\n\n*   Fetching the data from the API via HTTP\n*   Converting the\
    \ data from the API response into something the app understands\n*   Showing the\
    \ fetched data in the UI\n\nLet’s start with the UI work. We’ll address the other\
    \ tasks in the following chapters.\n\nStarting from the user-facing layer is a\
    \ way to get to an Earliest Testable version of our feature faster, similarly\
    \ to what we did in Chapter [4](#501287_1_En_4_Chapter.xhtml). We can share a\
    \ version of the app dynamically loading dummy data with Alberto to see what he\
    \ thinks of it. If we built the network component first, we couldn't share it\
    \ with him because it needs a UI to be exercised by a user.\n\nThe code we’ll\
    \ write relies heavily on `SwiftUI` and `Combine`. Before getting started, here’s\
    \ a quick overview of how data flows in `SwiftUI`.\n\n## How SwiftUI and Combine\
    \ Make Seamless View Updates Possible\n\nA major difference between `SwiftUI`\
    \ and its predecessors `UIKit` and `AppKit` is that its views are immutable. As\
    \ we’ve seen in the previous chapter, views are a function of state, not a sequence\
    \ of events. The state is the single source of truth from which the framework\
    \ derives the view. Our code cannot directly mutate the view; we can only change\
    \ the application’s state. This SwiftUI trait alone removes the possibility of\
    \ a whole set of bugs caused by the state held in the view becoming inconsistent.\n\
    \n`SwiftUI`’s immutability marries with `Combine`’s streaming capabilities to\
    \ provide elegant ways to keep views in sync as data *flows* through.\n\nOne tool\
    \ for asynchronous operations is `Combine`’s `Publisher` type, which can stream\
    \ new values over time and to which objects can subscribe. A convenient way to\
    \ create `Publisher`s is to take an object, make it conform to the `ObservableObject`\
    \ protocol, and use the `@Published` wrapper on one or more of its properties.\
    \ The wrapper generates a `Publisher` that sends a new value every time the property\
    \ changes.\n\nAnd here’s where the integration between the two frameworks really\
    \ shines: `SwiftUI` provides an `@ObservedObject` property wrapper for types conforming\
    \ to `ObservableObject`. Every time a `@Published` property of an `@ObservedObject`\
    \ emits a new value, `SwiftUI` will automatically trigger a new render of the\
    \ view.\n\nBut enough theory. Let’s get coding."
