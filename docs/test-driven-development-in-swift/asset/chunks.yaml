    \ are useful to start writing tests. Once you have your tests in place, you can\
    \ refactor with confidence and remove the dependency on global state and the need\
    \ to hook into the test life cycle.\n\nThe second case in which `setUp` and `tearDown`\
    \ are the right tool for the job is in UI testing. We mentioned in the introduction\
    \ that UI tests work with the app as a black box: you can’t access individual\
    \ components, and it’s much harder to manipulate the global state of the application.\
    \ `setUp` and `tearDown` are useful to prepare the app for the execution of certain\
    \ UI tests and to clean up its state afterward.\n\n`XCTest` has much more to offer,\
    \ like skipping tests, defining execution context, or defining multiple test plans\
    \ within Xcode to test the app in a permutation of different conditions. But that’s\
    \ enough theory for the moment.\n\nNow that you’ve acquainted yourself with the\
    \ tools, it’s time to use them. In the next chapter, we’ll see the basics of Test-Driven\
    \ Development in Swift with `XCTest`.\n\n## Key Takeaways\n\n* `XCTest` is the\
    \ framework Apple provides to write tests in Swift.\n* Tests in `XCTest` are created\
    \ with subclasses of `XCTestCase`, in functions with names starting with “test.”\n\
    * `XCTest` offers several assertion functions to test code, like `XCTAssertEqual`,\
    \ `XCTAssertTrue`, and `XCTAssertFalse`.\n* Use `XCTUnwrap` to unwrap `Optionals`;\
    \ if the value is `nil`, the test will fail.\n* To test asynchronous code, define\
    \ one or more `XCTExpectations` that the test will wait for and call their `fulfill()`\
    \ method in the async logic.\n* Test code that `throws` with `XCTAssertThrows`.\n\
    * Use `setUpWithError` and `tearDownWithError` to run logic before or after every\
    \ test. Use those methods sparingly; try to write tests that don’t need extra\
    \ setup or cleanup instead.\n* Use the class `setUp` and `tearDown` methods to\
    \ run logic before or after all of the tests run. Use these methods sparingly\
    \ too.\n\n# 3. Getting Started with Test-Driven Development\n\nIn the previous\
    \ chapters, we talked about the advantages of using tests to drive the design\
    \ of the code and how to write tests using Apple’s `XCTest` framework. It’s now\
    \ time to see concrete examples of Test-Driven Development.\n\nWe’ll learn how\
    \ to implement a piece of logic as an iterative process of writing tests and then\
    \ making them pass. We’ll see how TDD lets us focus first on getting the code\
    \ right and then on making it clean. Finally, we’ll discover how, in a language\
    \ like Swift, the compiler complements the feedback loop that drives the software\
    \ implementation and how to leverage it.\n\nTest-Driven Development uses the feedback\
    \ from the tests to guide the implementation of the production code.\n\nHow do\
    \ you get this process going? How do you write Swift code starting from its tests\
    \ with `XCTest`? The first step is understanding the behavior you need to implement.\n\
    \nLet’s take this problem from [exercism.io](https://exercism.io/), a great place\
    \ to hone your software skills:\n\n* Write a function that, given an integer representing\
    \ a year, tells whether the year is leap or not.\n* A leap year in the Gregorian\
