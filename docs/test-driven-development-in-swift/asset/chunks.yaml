- fmt: "### Dependency Injection vs. Directly Accessing Shared Instances\n\nHow is\
    \ using Dependency Injection better than having a shared `OrderController` and\
    \ accessing it within the ViewModel implementation? Because with the latter each\
    \ test would update the same `Order`, coupling the result of a test to work done\
    \ by those before it.\n\nTo verify that, you can define a shared `OrderController`\
    \ instance like this:\n\n```\n// OrderController.swift\n// ...\nclass OrderController:\
    \ ObservableObject {\n    static let shared = OrderController()\n    // ...\n\
    }\n```\n\nUpdate `MenuItemDetail.ViewModel` to access the shared instance instead\
    \ of the parameter from its `init` by replacing any `self.orderController` occurrence\
    \ access with `OrderController.shared`. Next, update the assertions for the button\
    \ action behavior to check the value from the shared instance. Now run the tests\
    \ and notice how they fail.\n\nYou can work around those failures by adding `setUp`\
    \ and `tearDown` calls that restore `OrderController.shared` to a clean state\
    \ before each test. Another option is to order the tests so that the way one updates\
    \ `OrderController` leaves it in the state the next one expects. Both alternatives\
    \ require extra work and make the test setup more rigid; using Dependency Injection\
    \ is a much better option.\n\nDependency Injection makes your code honest. Shared\
    \ instances and singletons allow your objects to get hold of and interact with\
    \ components that their interfaces do not declare. As Miško Hevery puts it, they\
    \ make your API into a [*pathological liar*](https://web.archive.org/web/20190618100426/http:/misko.hevery.com:80/2008/08/17/singletons-are-pathological-liars/).\
    \ In a codebase where freely reading from the global state is allowed, you cannot\
    \ trust that the methods you call have no side effects or collaborate only with\
    \ the dependencies in their signatures unless you inspect their implementation.\
    \ Reasoning about code becomes challenging because you’re never sure if methods\
    \ do what they say they do or if there’s more going on under the hood.\n\nTDD\
    \ nudges you toward using Dependency Injection. Writing your code starting by\
    \ its tests is easier if you pass all the dependencies instead of accessing them\
    \ in the implementation. The software design that emerges from the necessity of\
    \ writing tests first and getting feedback fast has only explicit dependencies\
    \ and is, therefore, more straightforward to reason about.\n\nThe ViewModel implementation\
    \ is now complete. It’s time to wire it up with the view layer.\n\n### Dependency\
    \ Injection with `@EnvironmentObject`\n\n`MenuItemDetail.ViewModel` works in isolation,\
    \ but, as the `TODO` comment reminds us, it’s using a dedicated `OrderController`\
    \ instance, not a shared one. We need to instantiate `MenuItemDetail.ViewModel`\
    \ with a reference to the same `OrderController` that the rest of the application\
    \ will use.\n\n`MenuList` is responsible for creating a `MenuItemDetail` and its\
    \ ViewModel when the user selects an item, so it’s up to it to pass an `OrderController`\
    \ instance. How can `MenuList` get a hold of one? We could apply the same reasoning\
    \ and make the component responsible for creating `MenuList` give it the `OrderController`\
    \ instance it needs for `MenuItemDetail`. `AlbertosApp` creates `MenuList`, and\
    \ since it’s the top-level element in the view hierarchy, we can make it build\
    \ and hold the `OrderController` value to share through the app.\n\nAs we’ve already\
    \ discussed, this approach is not ideal. It might seem alright in the relatively\
    \ flat view hierarchy of Alberto’s app, but you can see how it’s a slippery slope:\
    \ the deeper and richer your view hierarchy, the more code you’ll have to write\
    \ to pass dependencies down through it. On top of that, making `MenuList` require\
    \ an `OrderController` in its `init` can give the false impression that it needs\
    \ to use it, while it’s merely passing it along without ever interacting with\
    \ it.\n\nSwiftUI’s [`@EnvironmentObject`](https://developer.apple.com/documentation/swiftui/environmentobject)\
    \ helps growing applications without bloating the view hierarchy with long Dependency\
    \ Injection chains. Views can use this property wrapper to load an `ObservableObject`-conforming\
    \ property value from their environment. We can register objects in the environment\
    \ with the [`environmentObject(_:)`](https://developer.apple.com/documentation/swiftui/view/environmentobject%2528_:%2529)\
    \ method in one ancestor of the view accessing it.\n\n`@EnvironmentObject` lets\
    \ us cleanly share access to shared objects without having to pass them through\
    \ each view hierarchy layer. The ViewModels that need to read from or interact\
    \ with `OrderController` can request a reference as part of their `init` parameters.\
    \ The views that instantiate them can provide the shared instance by fetching\
    \ it from the environment via `@EnvironmentObject`.\n\nLet’s start by updating\
    \ `MenuItemDetail` to use the new logic from its ViewModel to drive the button’s\
    \ behavior:\n\n```\n// MenuItemDetail.swift\nimport SwiftUI\nstruct MenuItemDetail:\
    \ View {\n    @ObservedObject private(set) var viewModel: ViewModel\n    var body:\
    \ some View {\n        // ...\n        Button(viewModel.addOrRemoveFromOrderButtonText)\
    \ {\n            viewModel.addOrRemoveFromOrder()\n        }\n        // ...\n\
    \    }\n}\n```\n\nIf you run the app now, you’ll see that the “Add to order” button\
    \ changes to “Remove from order” when clicked. Once again, we got to a working\
    \ app on our first attempt, thanks to TDD.\n\nLet’s move on to addressing the\
    \ `TODO` comment we left earlier and remove the default `OrderController` value:\n\
    \n```\n// MenuItemDetail.ViewModel.swift\ninit(item: MenuItem, orderController:\
    \ OrderController) {\n    // ...\n}\n```\n\nThe compiler now cannot build `MenuList`:\n\
    \n```\n// MenuList.swift\nvar body: some View {\n    // ...\n    List {\n    \
    \    ForEach(sections) { section in\n            Section(header: Text(section.category))\
    \ {\n                ForEach(section.items) { item in\n                    NavigationLink(destination:\
    \ MenuItemDetail(viewModel: .init(item: item))) {\n                        //\
    \ Compiler says: Missing argument for\n                        // parameter 'orderController'\
    \ in call\n                    }\n                }\n            }\n        }\n\
    \    }\n}\n```\n\nLet’s get a reference to `OrderController` from the environment\
    \ and instantiate the ViewModel with it:\n\n```\n// MenuList.swift\n// ...\n@EnvironmentObject\
    \ var orderController: OrderController\nvar body: some View {\n    // ...\n  \
    \  List {\n        ForEach(sections) { section in\n            Section(header:\
    \ Text(section.category)) {\n                ForEach(section.items) { item in\n\
    \                    NavigationLink(destination: destination(for: item)) {\n \
    \                       // ...\n                    }\n                }\n   \
    \         }\n        }\n    }\n}\n\nfunc destination(for item: MenuItem) -> MenuItemDetail\
    \ {\n    return MenuItemDetail(viewModel: .init(item: item, orderController: orderController))\n\
    }\n```\n\nThe app now compiles, but if you run it, you’ll see that it crashes:\n\
    \n- Fatal error: No `ObservableObject` of type `OrderController` found. A `View.environmentObject(_:)`\
    \ for `OrderController` may be missing as an ancestor of this view"
  raw: '### Dependency Injection vs. Directly Accessing Shared Instances


    How is using Dependency Injection better than having a shared `OrderController`
    and accessing it within the ViewModel implementation? Because with the latter
    each test would update the same `Order`, coupling the result of a test to work
    done by those before it.


    To verify that, you can define a shared `OrderController` instance like this:


    ```

    // OrderController.swift

    // ...

    class OrderController: ObservableObject {

    static let shared = OrderController()

    // ...

    }

    ```


    Update `MenuItemDetail.ViewModel` to access the shared instance instead of the
    parameter from its `init` by replacing any `self.orderController` occurrence access
    with `OrderController.shared`. Next, update the assertions for the button action
    behavior to check the value from the shared instance. Now run the tests and notice
    how they fail.


    You can work around those failures by adding `setUp` and `tearDown` calls that
    restore `OrderController.shared` to a clean state before each test. Another option
    is to order the tests so that the way one updates `OrderController` leaves it
    in the state the next one expects. Both alternatives require extra work and make
    the test setup more rigid; using Dependency Injection is a much better option.


    Dependency Injection makes your code honest. Shared instances and singletons allow
    your objects to get hold of and interact with components that their interfaces
    do not declare. As Miško Hevery puts it, they make your API into a [*pathological
    liar*](https://web.archive.org/web/20190618100426/http:/misko.hevery.com:80/2008/08/17/singletons-are-pathological-liars/).
    In a codebase where freely reading from the global state is allowed, you cannot
    trust that the methods you call have no side effects or collaborate only with
    the dependencies in their signatures unless you inspect their implementation.
    Reasoning about code becomes challenging because you’re never sure if methods
    do what they say they do or if there’s more going on under the hood.


    TDD nudges you toward using Dependency Injection. Writing your code starting by
    its tests is easier if you pass all the dependencies instead of accessing them
    in the implementation. The software design that emerges from the necessity of
    writing tests first and getting feedback fast has only explicit dependencies and
    is, therefore, more straightforward to reason about.


    The ViewModel implementation is now complete. It’s time to wire it up with the
    view layer.


    ### Dependency Injection with `@EnvironmentObject`


    `MenuItemDetail.ViewModel` works in isolation, but, as the `TODO` comment reminds
    us, it’s using a dedicated `OrderController` instance, not a shared one. We need
    to instantiate `MenuItemDetail.ViewModel` with a reference to the same `OrderController`
    that the rest of the application will use.


    `MenuList` is responsible for creating a `MenuItemDetail` and its ViewModel when
    the user selects an item, so it’s up to it to pass an `OrderController` instance.
    How can `MenuList` get a hold of one? We could apply the same reasoning and make
    the component responsible for creating `MenuList` give it the `OrderController`
    instance it needs for `MenuItemDetail`. `AlbertosApp` creates `MenuList`, and
    since it’s the top-level element in the view hierarchy, we can make it build and
    hold the `OrderController` value to share through the app.


    As we’ve already discussed, this approach is not ideal. It might seem alright
    in the relatively flat view hierarchy of Alberto’s app, but you can see how it’s
    a slippery slope: the deeper and richer your view hierarchy, the more code you’ll
    have to write to pass dependencies down through it. On top of that, making `MenuList`
    require an `OrderController` in its `init` can give the false impression that
    it needs to use it, while it’s merely passing it along without ever interacting
    with it.


    SwiftUI’s [`@EnvironmentObject`](https://developer.apple.com/documentation/swiftui/environmentobject)
    helps growing applications without bloating the view hierarchy with long Dependency
    Injection chains. Views can use this property wrapper to load an `ObservableObject`-conforming
    property value from their environment. We can register objects in the environment
    with the [`environmetObject(_:)`](https://developer.apple.com/documentation/swiftui/view/environmentobject%2528_:%2529)
    method in one ancestor of the view accessing it.


    `@EnvironmentObject` lets us cleanly share access to shared objects without having
    to pass them through each view hierarchy layer. The ViewModels that need to read
    from or interact with `OrderController` can request a reference as part of their
    `init` parameters. The views that instantiate them can provide the shared instance
    by fetching it from the environment via `@EnvironmentObject`.


    Let’s start by updating `MenuItemDetail` to use the new logic from its ViewModel
    to drive the button’s behavior:


    ```

    // MenuItemDetail.swift

    import SwiftUI

    struct MenuItemDetail: View {

    @ObservedObject private(set) var viewModel: ViewModel

    var body: some View {

    // ...

    Button(viewModel.addOrRemoveFromOrderButtonText) {

    viewModel.addOrRemoveFromOrder()

    }

    // ...

    }

    ```


    If you run the app now, you’ll see that the “Add to order” button changes to “Remove
    from order” when clicked. Once again, we got to a working app on our first attempt,
    thanks to TDD.


    Let’s move on to addressing the `TODO` comment we left earlier and remove the
    default `OrderController` value:


    ```

    // MenuItemDetail.ViewModel.swift

    init(item: MenuItem, orderController: OrderController) {

    // ...

    }

    ```


    The compiler now cannot build `MenuList`:


    ```

    // MenuList.swift

    var body: some View {

    // ...

    List {

    ForEach(sections) { section in

    Section(header: Text(section.category)) {

    ForEach(section.items) { item in

    NavigationLink(destination: MenuItemDetail(viewModel: .init(item: item))) {

    // Compiler says: Missing argument for // parameter ''orderController'' in call

    ```


    Let’s get a reference to `OrderController` from the environment and instantiate
    the ViewModel with it:


    ```

    // MenuList.swift

    // ...

    @EnvironmentObject var orderController: OrderController

    var body: some View {

    // ...

    List {

    ForEach(sections) { section in

    Section(header: Text(section.category)) {

    ForEach(section.items) { item in

    NavigationLink(destination: destination(for: item)) {

    // ...

    func destination(for item: MenuItem) -> MenuItemDetail {

    return MenuItemDetail(viewModel: .init(item: item, orderController: orderController))

    }

    ```


    The app now compiles, but if you run it, you’ll see that it crashes:


    *   Fatal error: No `ObservableObject` of type `OrderController` found. A `View.environmentObject(_:)`
    for `OrderController` may be missing as an ancestor of this view'
  trans: "\n### 依赖注入 vs. 直接访问共享实例\n\n使用依赖注入比在 ViewModel 实现中访问共享的 `OrderController`\
