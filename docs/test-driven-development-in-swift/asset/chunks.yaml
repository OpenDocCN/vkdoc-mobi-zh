    \ the different details of what the code you’re working on has to do.\n\nThe next\
    \ step after defining the Test List is to write one and only one test. In TDD,\
    \ we move in small, incremental steps, solving one problem at a time. That also\
    \ applies to choosing which tests to write and how to write them. You want to\
    \ get feedback as fast as possible. Writing one test is faster than writing all\
