    like we did when testing the networking behavior in Chapter [10](#501287_1_En_10_Chapter.xhtml).


    One easy option would be removing the artificial delay from the Stub to make the
    test synchronous.


    I want to take this occasion, though, to show you another approach to testing
    asynchronous code.'
  trans: '

    ## 告知用户结账完成


    在上一章中，我们编写了代码，通过让 `OrderDetail.ViewModel` 的 `checkout()` 方法调用 `PaymentProcessing`
    的 `process(order:)`，并传入 `OrderController` 中存储的 `Order`，从而启动订单处理流程。


    我们需要一种方式来告知用户订单结果：支付是否成功、厨房是否已收到订单，或者流程中是否出现错误。


    测试驱动开发的核心在于小步迭代。这个流程中“最早可测试”的版本是什么？我们可以先尝试在支付完成后简单显示一个弹窗。


    SwiftUI 拥有专门用于显示弹窗的类型和 API。展示弹窗的最简单方式是在 `View` 中拥有一个 `@State` 包装的属性，用于表示弹窗是否应显示在屏幕上，然后使用
    `View` 的方法 `alert(isPresented:, content:)`，在该属性为 `true` 时定义要展示的 `Alert`：


    ```

    struct ExampleView: View {

    @State var showingAlert = false

    var body: some View {

    Button {

    self.showingAlert.toggle()

    } label: {

    Text("显示弹窗")

    }

    .alert(isPresented: $showingAlert) {

    Alert(

    title: Text("你好"),

    message: Text("嗨，我是一个弹窗"),

    dismissButton: .default(Text("再见"))

    )

    }

    }

    }

    ```


    `alert(isPresented:, content:)` 期望 `isPresented` 的值为 `Binding<Bool>`。 [`Binding<Value>`](https://developer.apple.com/documentation/swiftui/binding)
    是 SwiftUI 的一种类型和属性包装器，它创建了“存储数据的属性与显示并更改数据的视图之间的双向连接”。


    通过 `Binding`，当用户点击关闭按钮时，`Alert` 可以改变 `showingAlert` 的值。


    我们刚刚讨论的选项是介绍弹窗展示的好方法，但所有逻辑都集中在视图中，并且不支持条件逻辑。为了根据支付处理的结果显示不同的弹窗，我们可以使用更精细的 `alert(item:,
    content:)` API。`alert(item:, content:)` 期望 `item` 是一个 `Binding<Optional<Identifiable>>`。`Binding`
    包装器允许 SwiftUI 在弹窗展示或关闭后更新被包装的值。`Optional` 告诉框架：当值从 `none` 变为 `some` 时，应该显示弹窗。`content`
    参数必须是 `(Identifiable) -> Alert` 闭包，SwiftUI 会调用它来获取要显示的 `Alert`。


    得益于这个 API，我们可以将所有与弹窗展示相关的条件逻辑提取到独立于 SwiftUI 的类型中，从而能够使用测试驱动开发来构建它们。


    1.  为弹窗定义一个 ViewModel。

    2.  向 `OrderDetail.ViewModel` 添加一个 `@Published` 属性，其类型为 `Optional` 的弹窗 ViewModel。

    3.  让 `OrderDetail.ViewModel` 根据支付处理结果更新此属性。

    4.  让 `OrderDetail` 读取与 `@Published` 属性关联的 `Binding` 值（使用 `$` 前缀）。


    弹窗的 ViewModel 可以是一个简单的 `struct`：


    ```

    // Alert.ViewModel.swift

    import SwiftUI

    extension Alert {

    struct ViewModel: Identifiable {

    let title: String

    let message: String

    let buttonText: String

    var id: String { title + message + buttonText }

    }

    }

    ```


    下一步是向 `OrderDetail.ViewModel` 添加一个 `Alert.ViewModel @Published` 属性：


    ```

    // OrderDetail.ViewModel.swift

    // ...

    extension OrderDetail {

    class ViewModel: ObservableObject {

    // ...

    @Published private(set) var alertToShow: Alert.ViewModel?

    // ...

    }

    }

    ```


    如果你在此更改后使用快捷键 `Shift Cmd U` 构建测试代码，你会发现即使我们没有更新 `OrderDetail.ViewModel` 的 `init`
    方法，代码仍然可以编译。原因是 Swift 编译器可以将 `Optional` 变量（如 `var alertToShow: Alert.ViewModel?`）的默认值推断为
    `none`。这正是我们想要的值，因为我们只应在支付处理完成后才显示弹窗。


    让我们为这个行为编写测试列表：


    ```

    // OrderDetail.ViewModelTests.swift

    @testable import Albertos

    import XCTest

    class OrderDetailViewModelTests: XCTestCase {

    // ...

    func testWhenPaymentSucceedsUpdatesPropertyToShowConfirmationAlert() {}

    func testWhenPaymentFailsUpdatesPropertyToShowErrorAlert() {}

    }

    ```


    我们从失败场景开始，以确保我们对错误处理给予了应有的重视。


    为了测试支付处理失败，我们需要在 `PaymentProcessing` 依赖中模拟这个场景。我们可以使用桩测试替身来实现，正如我们在第 8 章中学到的那样：


    ```

    // PaymentProcessingStub.swift

    @testable import Albertos

    import Combine

    import Foundation

    class PaymentProcessingStub: PaymentProcessing {

    let result: Result

    init(returning result: Result) {

    self.result = result

    }

    func process(order: Order) -> AnyPublisher {

    return result.publisher

    // 使用延迟模拟真实世界的异步行为

    .delay(for: 0.01, scheduler: RunLoop.main)

    .eraseToAnyPublisher()

    }

    }

    ```


    通过桩对象，我们可以安排被测系统的输入，并通过调用 `checkout()` 方法来触发操作：


    ```

    func testWhenPaymentFailsUpdatesPropertyToShowErrorAlert() {

    let viewModel = OrderDetail.ViewModel(

    orderController: OrderController(),

    paymentProcessor: PaymentProcessingStub(returning: .failure(TestError(id: 123)))

    )

    viewModel.checkout()

    // 断言结果：？？？

    }

    ```


    当支付处理失败时，我们如何验证持有 ViewModel 的 `@Published` 属性已改变为我们期望的值？


    我们正在处理的代码是异步的，但它没有回调或 `Publisher` 来让我们附加处理器以完成 `XCTestExpectation`，就像我们在第 10 章测试网络行为时那样。


    一个简单的选择是移除桩对象中的人为延迟，使测试变为同步。


    不过，我想借此机会向您展示另一种测试异步代码的方法。

    '
- fmt: "# How to Test Asynchronous Code When There Is No Callback\n\n`XCTest` offers\
    \ an asynchronous expectation that uses a given predicate to verify its fulfillment:\
    \ `XCTNSPredicateExpectation`. We can use it when we cannot explicitly fulfill\
    \ an expectation because the async code under test has no callback:\n\n```\nfunc\
    \ testWhenPaymentFailsUpdatesPropertyToShowErrorAlert() {\n    let viewModel =\
    \ OrderDetail.ViewModel(\n        orderController: OrderController(),\n      \
    \  paymentProcessor: PaymentProcessingStub(returning: .failure(TestError(id: 123)))\n\
    \    )\n    let predicate = NSPredicate { _, _ in viewModel.alertToShow != nil\
    \ }\n    let expectation = XCTNSPredicateExpectation(predicate: predicate, object:\
    \ .none)\n    viewModel.checkout()\n    wait(for: [expectation], timeout: 2)\n\
    \    XCTAssertEqual(viewModel.alertToShow?.title, \"\")\n    XCTAssertEqual(\n\
    \        viewModel.alertToShow?.message,\n        \"There's been an error with\
    \ your order. Please contact a waiter.\"\n    )\n    XCTAssertEqual(viewModel.alertToShow?.buttonText,\
    \ \"Ok\")\n}\n```\n\nNotice how the `NSPredicate` only verifies that `alertViewModel`\
    \ is not nil while the assertions on the content properties run only after the\
    \ expectation fulfilled. Doing so will give us more granular failure messages\
    \ than if we put all of the checks in the predicate.\n\nRunning the tests with\
    \ `Cmd U` will show a failure with “Asynchronous wait failed: Exceeded timeout\
    \ of 2 seconds, with unfulfilled expectations: …” That’s no surprise: we don’t\
    \ have any handling of the payment processing.\n\nLet’s subscribe to the payment\
    \ processor `Publisher` to handle errors and make the test pass:\n\n```\n// OrderDetail.ViewModel.swift\n\
    func checkout() {\n    paymentProcessor.process(order: orderController.order)\n\
    \        .sink(\n            receiveCompletion: { [weak self] completion in\n\
    \                guard case .failure = completion else { return }\n          \
    \      self?.alertToShow = Alert.ViewModel(\n                    title: \"\",\n\
    \                    message: \"There's been an error with your order. Please\
    \ contact a waiter.\",\n                    buttonText: \"Ok\"\n             \
    \   )\n            },\n            receiveValue: { _ in\n            }\n     \
    \   )\n        .store(in: &cancellables)\n}\n```\n\nNow the test passes.\n\nYou\
    \ might have noticed an odd timeout in the test. Why 2 seconds? In my experience,\
    \ waiting for 1 second with `NSPredicate`-based expectations can sometimes result\
    \ in unexpected timeouts.\n\nUnfortunately, `XCTNSPredicateExpectation` is less\
    \ performant than other asynchronous testing alternatives because it uses polling,\
    \ as Apple engineer Stuart Montgomery points out in the 2018 WWDC talk [*Testing\
    \ Tips & Tricks*](https://developer.apple.com/videos/play/wwdc2018/417/%253Ftime%253D2073).\
    \ The matchers library [Nimble](https://github.com/Quick/Nimble/) (see Appendix\
    \ B) has a more performant way to write these expectations. If you find your code\
    \ needing more than a few of these, you should consider adopting it.\n\nWhen using\
    \ a nonstandard timeout, extracting it in a constant will make it reusable in\
    \ other tests and clarify to future readers why you chose that particular value:\n\
    \n```\n// XCTestCase+Timeouts.swift\nimport XCTest\nextension XCTestCase {\n \
    \   /// Using a wait time of around 1 second seems to result in\n    /// occasional\
    \ test timeout failures when using\n    /// `XCTNSPredicateExpectation`.\n   \
    \ var timeoutForPredicateExpectations: Double { 2.0 }\n}\n\n// OrderDetail.ViewModelTests.swift\n\
    wait(for: [expectation], timeout: timeoutForPredicateExpectations)\n```\n\nLet’s\
    \ move on to presenting an alert for a successful payment. We can adopt the same\
    \ tactic we used for the previous test:\n\n```\n// OrderDetail.ViewModelTests.swift\n\
    func testWhenPaymentSucceedsUpdatesPropertyToShowConfirmationAlert() {\n    let\
    \ viewModel = OrderDetail.ViewModel(\n        orderController: OrderController(),\n\
    \        paymentProcessor: PaymentProcessingStub(returning: .success(()))\n  \
    \  )\n    let predicate = NSPredicate { _, _ in viewModel.alertToShow != nil }\n\
    \    let expectation = XCTNSPredicateExpectation(predicate: predicate, object:\
    \ .none)\n    viewModel.checkout()\n    wait(for: [expectation], timeout: timeoutForPredicateExpectations)\n\
    \    XCTAssertEqual(viewModel.alertToShow?.title, \"\")\n    XCTAssertEqual(\n\
    \        viewModel.alertToShow?.message,\n        \"The payment was successful.\
    \ Your food will be with you shortly.\"\n    )\n    XCTAssertEqual(viewModel.alertToShow?.buttonText,\
    \ \"Ok\")\n}\n\n// OrderDetail.ViewModel\nfunc checkout() {\n    paymentProcessor.process(order:\
    \ orderController.order)\n        .sink(\n            receiveCompletion: { [weak\
    \ self] completion in\n                guard case .failure = completion else {\
    \ return }\n                self?.alertToShow = Alert.ViewModel(\n           \
    \         title: \"\",\n                    message: \"There's been an error with\
    \ your order. Please contact a waiter.\",\n                    buttonText: \"\
    Ok\"\n                )\n            },\n            receiveValue: { [weak self]\
    \ _ in\n                self?.alertToShow = Alert.ViewModel(\n               \
    \     title: \"\",\n                    message: \"The payment was successful.\
    \ Your food will be with you shortly.\",\n                    buttonText: \"Ok\"\
    \n                )\n            }\n        )\n        .store(in: &cancellables)\n\
    }\n```\n\nThe ViewModel logic is complete. We’ve seen it in action through its\
    \ unit tests, and we’re confident it works in isolation. It’s time to connect\
    \ it with the view layer.\n\n## Wiring Up the View\n\nBecause the ViewModel takes\
    \ care of all the conditional logic to configure and trigger the alert presentation,\
    \ the only thing we have to do to present the alert in the view is connecting\
    \ the ViewModel to the appropriate SwiftUI APIs:\n\n```\n// OrderDetail.swift\n\
    // ...\nstruct OrderDetail: View {\n    @ObservedObject private(set) var viewModel:\
    \ ViewModel\n    var body: some View {\n        VStack(alignment: .center, spacing:\
    \ 8) {\n            // ...\n        }\n        .alert(item: $viewModel.alertToShow)\
    \ { alertViewModel in\n            Alert(\n                title: Text(alertViewModel.title),\n\
    \                message: Text(alertViewModel.message),\n                dismissButton:\
    \ .default(Text(alertViewModel.buttonText))\n            )\n        }\n    }\n\
    }\n```\n\nThat’s it. You can run the app to verify the integration. The `HippoPaymentsProcessor`\
    \ in the source code for this chapter always succeeds, but if you want to verify\
    \ the failure scenario, you can modify it to return an error.\n\nFigure [13-1](#501287_1_En_13_Chapter.xhtml#Fig1)\
    \ shows the alerts for the success and failure scenarios.\n\n![../images/501287_1_En_13_Chapter/501287_1_En_13_Fig1_HTML.png](images/501287_1_En_13_Chapter/501287_1_En_13_Fig1_HTML.png)\n\
    \nFigure 13-1\n\nAlerts notifying of a successful (left) or failed (right) payment\n\
    \n`Alert.ViewModel` does not depend on `OrderDetail`. If you wanted extra confidence\
    \ on the whole alert presentation flow, you could extract the logic to present\
    \ an alert giving a `Binding<Alert.ViewModel?>` value into its own `View` extension\
    \ and write a dedicated UI test for it."
  raw: '## How to Test Asynchronous Code When There Is No Callback


    XCTest offers an asynchronous expectation that uses a given predicate to verify
    its fulfillment: `XCTNSPredicateExpectation`. We can use it when we cannot explicitly
    fulfill an expectation because the async code under test has no callback:


    ```

    func testWhenPaymentFailsUpdatesPropertyToShowErrorAlert() {

    let viewModel = OrderDetail.ViewModel(

    orderController: OrderController(),

    paymentProcessor: PaymentProcessingStub(returning: .failure(TestError(id: 123)))

    )

    let predicate = NSPredicate { _, _ in viewModel.alertToShow != nil }

    let expectation = XCTNSPredicateExpectation(predicate: predicate, object: .none)

    viewModel.checkout()

    wait(for: [expectation], timeout: 2)

    XCTAssertEqual(viewModel.alertToShow?.title, "")

    XCTAssertEqual(

    viewModel.alertToShow?.message,

    "There''s been an error with your order. Please contact a waiter."

    )

    XCTAssertEqual(viewModel.alertToShow?.buttonText, "Ok")

    }

    ```


    Notice how the `NSPredicate` only verifies that `alertViewModel` is not nil while
    the assertions on the content properties run only after the expectation fulfilled.
    Doing so will give us more granular failure messages than if we put all of the
    checks in the predicate.


    Running the tests with `Cmd U` will show a failure with “Asynchronous wait failed:
    Exceeded timeout of 2 seconds, with unfulfilled expectations: …” That’s no surprise:
    we don’t have any handling of the payment processing.


    Let’s subscribe to the payment processor `Publisher` to handle errors and make
    the test pass:


    ```

    // OrderDetail.ViewModel.swift

    func checkout() {

    paymentProcessor.process(order: orderController.order)

    .sink(

    receiveCompletion: { [weak self] completion in

    guard case .failure = completion else { return }

    self?.alertToShow = Alert.ViewModel(

    title: "",

    message: "There''s been an error with your order. Please contact a waiter.",

    buttonText: "Ok"

    )

    },

    receiveValue: { _ in

    }

    )

    .store(in: &cancellables)

    }

    ```


    Now the test passes.


    You might have noticed an odd timeout in the test. Why 2 seconds? In my experience,
    waiting for 1 second with `NSPredicate`-based expectations can sometimes result
    in unexpected timeouts.


    Unfortunately, `XCTNSPredicateExpectation` is less performant than other asynchronous
    testing alternatives because it uses polling, as Apple engineer Stuart Montgomery
    points out in the 2018 WWDC talk [*Testing Tips & Tricks*](https://developer.apple.com/videos/play/wwdc2018/417/%253Ftime%253D2073).
    The matchers library [Nimble](https://github.com/Quick/Nimble/) (see Appendix
    B) has a more performant way to write these expectations. If you find your code
    needing more than a few of these, you should consider adopting it.


    When using a nonstandard timeout, extracting it in a constant will make it reusable
    in other tests and clarify to future readers why you chose that particular value:


    ```

    // XCTestCase+Timeouts.swift

    import XCTest

    extension XCTestCase {

    /// Using a wait time of around 1 second seems to result in

    /// occasional test timeout failures when using

    /// `XCTNSPredicateExpectation`.

    var timeoutForPredicateExpectations: Double { 2.0 }

    }

    // OrderDetail.ViewModelTests.swift

    wait(for: [expectation], timeout: timeoutForPredicateExpectations)

    ```


    Let’s move on to presenting an alert for a successful payment. We can adopt the
    same tactic we used for the previous test:


    ```

    // OrderDetail.ViewModelTests.swift

    func testWhenPaymentSucceedsUpdatesPropertyToShowConfirmationAlert() {

    let viewModel = OrderDetail.ViewModel(

    orderController: OrderController(),

    paymentProcessor: PaymentProcessingStub(returning: .success(()))

    )

    let predicate = NSPredicate { _, _ in viewModel.alertToShow != nil }

    let expectation = XCTNSPredicateExpectation(predicate: predicate, object: .none)

    viewModel.checkout()

    wait(for: [expectation], timeout: timeoutForPredicateExpectations)

    XCTAssertEqual(viewModel.alertToShow?.title, "")

    XCTAssertEqual(

    viewModel.alertToShow?.message,

    "The payment was successful. Your food will be with you shortly."

    )

    XCTAssertEqual(viewModel.alertToShow?.buttonText, "Ok")

    }

    // OrderDetail.ViewModel

    func checkout() {

    paymentProcessor.process(order: orderController.order)

    .sink(

    receiveCompletion: { [weak self] completion in

    guard case .failure = completion else { return }

    self?.alertToShow = Alert.ViewModel(

    title: "",

    message: "There''s been an error with your order. Please contact a waiter.",

    buttonText: "Ok"

    )

    },

    receiveValue: { [weak self] _ in

    self?.alertToShow = Alert.ViewModel(

    title: "",

    message: "The payment was successful. Your food will be with you shortly.",

    buttonText: "Ok"

    )

    }

    )

    .store(in: &cancellables)

    }

    ```


    The ViewModel logic is complete. We’ve seen it in action through its unit tests,
    and we’re confident it works in isolation. It’s time to connect it with the view
    layer.


    ## Wiring Up the View


    Because the ViewModel takes care of all the conditional logic to configure and
    trigger the alert presentation, the only thing we have to do to present the alert
    in the view is connecting the ViewModel to the appropriate SwiftUI APIs:


    ```

    // OrderDetail.swift

    // ...

    struct OrderDetail: View {

    @ObservedObject private(set) var viewModel: ViewModel

    var body: some View {

    VStack(alignment: .center, spacing: 8) {

    // ...

    }

    .alert(item: $viewModel.alertToShow) { alertViewModel in

    Alert(

    title: Text(alertViewModel.title),

    message: Text(alertViewModel.message),

    dismissButton: .default(Text(alertViewModel.buttonText))

    )

    }

    }

    }

    ```


    That’s it. You can run the app to verify the integration. The `HippoPaymentsProcessor`
    in the source code for this chapter always succeeds, but if you want to verify
    the failure scenario, you can modify it to return an error.


    Figure [13-1](#501287_1_En_13_Chapter.xhtml#Fig1) shows the alerts for the success
    and failure scenarios.


    ![../images/501287_1_En_13_Chapter/501287_1_En_13_Fig1_HTML.png](images/501287_1_En_13_Chapter/501287_1_En_13_Fig1_HTML.png)


    Figure 13-1


    Alerts notifying of a successful (left) or failed (right) payment


    `Alert.ViewModel` does not depend on `OrderDetail`. If you wanted extra confidence
    on the whole alert presentation flow, you could extract the logic to present an
    alert giving a `Binding<Alert.ViewModel?>` value into its own `View` extension
    and write a dedicated UI test for it.'
  trans: "\n# 如何在没有回调时测试异步代码\n\n`XCTest` 提供了一种基于给定谓词来验证其满足条件的异步期望：`XCTNSPredicateExpectation`。当被测异步代码没有回调，导致我们无法显式满足期望时，就可以使用它：\n\
    \n```\nfunc testWhenPaymentFailsUpdatesPropertyToShowErrorAlert() {\n    let viewModel\
    \ = OrderDetail.ViewModel(\n        orderController: OrderController(),\n    \
    \    paymentProcessor: PaymentProcessingStub(returning: .failure(TestError(id:\
    \ 123)))\n    )\n    let predicate = NSPredicate { _, _ in viewModel.alertToShow\
    \ != nil }\n    let expectation = XCTNSPredicateExpectation(predicate: predicate,\
    \ object: .none)\n    viewModel.checkout()\n    wait(for: [expectation], timeout:\
    \ 2)\n    XCTAssertEqual(viewModel.alertToShow?.title, \"\")\n    XCTAssertEqual(\n\
    \        viewModel.alertToShow?.message,\n        \"您的订单出现错误，请联系服务员。\"\n    )\n\
    \    XCTAssertEqual(viewModel.alertToShow?.buttonText, \"好的\")\n}\n```\n\n注意，`NSPredicate`\
    \ 仅仅验证 `alertViewModel` 是否不为 nil，而关于内容属性的断言则只在期望满足后才执行。这样做比将所有检查都放在谓词中，能提供更细粒度的失败信息。\n\
    \n使用 `Cmd U` 运行测试，会显示类似 \"异步等待失败：超出 2 秒超时，存在未满足的期望：...\" 的错误。这并不意外：我们还没有处理支付流程。\n\
    \n现在，我们来订阅支付处理器 `Publisher` 以处理错误，让测试通过：\n\n```\n// OrderDetail.ViewModel.swift\n\
    func checkout() {\n    paymentProcessor.process(order: orderController.order)\n\
    \        .sink(\n            receiveCompletion: { [weak self] completion in\n\
    \                guard case .failure = completion else { return }\n          \
    \      self?.alertToShow = Alert.ViewModel(\n                    title: \"\",\n\
    \                    message: \"您的订单出现错误，请联系服务员。\",\n                    buttonText:\
    \ \"好的\"\n                )\n            },\n            receiveValue: { _ in\n\
    \            }\n        )\n        .store(in: &cancellables)\n}\n```\n\n现在测试通过了。\n\
    \n你可能注意到了测试中奇怪的超时设置。为什么要设为 2 秒？根据我的经验，当使用基于 `NSPredicate` 的期望时，等待 1 秒有时会导致意外的超时。\n\
    \n不幸的是，`XCTNSPredicateExpectation` 的性能不如其他异步测试方案，因为它使用了轮询机制，正如苹果工程师 Stuart Montgomery\
    \ 在 2018 年 WWDC 演讲 [*测试技巧与窍门*](https://developer.apple.com/videos/play/wwdc2018/417/%253Ftime%253D2073)\
    \ 中所指出的。匹配器库 [Nimble](https://github.com/Quick/Nimble/)（参见附录 B）提供了性能更好的方式来编写这些期望。如果你的代码需要多次使用这种方式，不妨考虑采用\
    \ Nimble。\n\n当使用非标准超时时，将其提取为常量可以在其他测试中复用，并让未来的读者明白你为何选择这个特定值：\n\n```\n// XCTestCase+Timeouts.swift\n\
    import XCTest\nextension XCTestCase {\n    /// 使用大约 1 秒的等待时间，在使用\n    /// `XCTNSPredicateExpectation`\
    \ 时似乎会导致\n    /// 偶发的测试超时失败。\n    var timeoutForPredicateExpectations: Double\
    \ { 2.0 }\n}\n\n// OrderDetail.ViewModelTests.swift\nwait(for: [expectation],\
    \ timeout: timeoutForPredicateExpectations)\n```\n\n接下来，我们来处理支付成功时显示提示框的逻辑。我们可以采用与上一个测试相同的策略：\n\
    \n```\n// OrderDetail.ViewModelTests.swift\nfunc testWhenPaymentSucceedsUpdatesPropertyToShowConfirmationAlert()\
    \ {\n    let viewModel = OrderDetail.ViewModel(\n        orderController: OrderController(),\n\
    \        paymentProcessor: PaymentProcessingStub(returning: .success(()))\n  \
    \  )\n    let predicate = NSPredicate { _, _ in viewModel.alertToShow != nil }\n\
    \    let expectation = XCTNSPredicateExpectation(predicate: predicate, object:\
    \ .none)\n    viewModel.checkout()\n    wait(for: [expectation], timeout: timeoutForPredicateExpectations)\n\
    \    XCTAssertEqual(viewModel.alertToShow?.title, \"\")\n    XCTAssertEqual(\n\
    \        viewModel.alertToShow?.message,\n        \"支付成功，您的美食很快就会送到。\"\n    )\n\
    \    XCTAssertEqual(viewModel.alertToShow?.buttonText, \"好的\")\n}\n\n// OrderDetail.ViewModel\n\
    func checkout() {\n    paymentProcessor.process(order: orderController.order)\n\
    \        .sink(\n            receiveCompletion: { [weak self] completion in\n\
    \                guard case .failure = completion else { return }\n          \
    \      self?.alertToShow = Alert.ViewModel(\n                    title: \"\",\n\
    \                    message: \"您的订单出现错误，请联系服务员。\",\n                    buttonText:\
    \ \"好的\"\n                )\n            },\n            receiveValue: { [weak\
    \ self] _ in\n                self?.alertToShow = Alert.ViewModel(\n         \
    \           title: \"\",\n                    message: \"支付成功，您的美食很快就会送到。\",\n\
    \                    buttonText: \"好的\"\n                )\n            }\n  \
    \      )\n        .store(in: &cancellables)\n}\n```\n\nViewModel 的逻辑至此已经完成。我们通过单元测试验证了它的行为，确信它在隔离环境中能够正常工作。现在是时候将其与视图层连接起来了。\n\
