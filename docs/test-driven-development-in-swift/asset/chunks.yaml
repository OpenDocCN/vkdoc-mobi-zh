    \ reported a bug in the app. After submitting an order, customers still see the\
    \ checkout button, making them unsure whether their payment went through.\n\n\
    Let’s fix this bug by flushing the order stored in `OrderController` once the\
    \ payment succeeds. Where should we begin?\n\nThere is a saying in the TDD circles,\
    \ “A bug is just a test that hasn’t been written yet.”\n\nTo fix a bug with TDD,\
    \ you first write a failing test that reproduces it. From there, the workflow\
    \ is the same as what we’ve been practicing so far. Follow the test failure to\
    \ identify the code to write to make it pass and, as a result, fix the bug:\n\n\
    ```swift\n// OrderDetail.ViewModelTests .swift\n// ...\nfunc testWhenPaymentSucceedsDismissingTheAlertResetsTheOrder()\
    \ {\n    // Arrange the input state with a valid order, one that has items\n \
    \   let orderController = OrderController()\n    orderController.addToOrder(item:\
    \ .fixture())\n    let viewModel = OrderDetail.ViewModel(\n        orderController:\
    \ orderController,\n        onAlertDismiss: {},\n        paymentProcessor: PaymentProcessingStub(returning:\
    \ .success(()))\n    )\n    // Perform the checkout and wait for it to succeed\n\
    \    let predicate = NSPredicate { _, _ in viewModel.alertToShow != nil }\n  \
    \  let expectation = XCTNSPredicateExpectation(predicate: predicate, object: .none)\n\
    \    viewModel.checkout()\n    wait(for: [expectation], timeout: timeoutForPredicateExpectations)\n\
    \    // Run the alert dismiss code\n    viewModel.alertToShow?.buttonAction?()\n\
    \    // Verify the order has been reset\n    XCTAssertTrue(orderController.order.items.isEmpty)\n\
    }\n```\n\nIf you run this test with the focused test keyboard shortcut `Ctrl Cmd\
    \ U`, you’ll see it fails.\n\nTo make the test passes and fix the bug, we need\
    \ to make `OrderController` reset its order property as part of the alert dismiss\
    \ action:\n\n```swift\n// OrderController.swift\n// ...\nfunc resetOrder() {\n\
    \    order = Order(items: [])\n}\n// OrderDetail.ViewModel.swift\n// ...\nfunc\
    \ checkout() {\n    paymentProcessor.process(order: orderController.order)\n \
    \       .sink(\n            receiveCompletion: { [weak self] completion in\n \
    \               // ...\n            },\n            receiveValue: { [weak self]\
    \ _ in\n                guard let self = self else { return }\n              \
    \  self.alertToShow = Alert.ViewModel(\n                    title: \"\",\n   \
    \                 message: \"The payment was successful. Your food will be with\
    \ you shortly.\",\n                    buttonText: \"Ok\",\n                 \
    \   buttonAction: {\n                        self.orderController.resetOrder()\n\
    \                        self.onAlertDismiss()\n                    }\n      \
    \          )\n            }\n        )\n        .store(in: &cancellables)\n}\n\
    ```\n\nThe test now passes, and the bug has been fixed. If you run the app and\
    \ submit an order, you’ll see the “Your Order” button shows an empty order after\
    \ the order detail screen dismisses.\n\n# Changing Existing Code Driven by Tests\n\
    \nThe early testers found the spiciness indicator unclear, so you decide to replace\
    \ the chili emoji (![../images/501287_1_En_14_Chapter/501287_1_En_14_Figa_HTML.gif](images/501287_1_En_14_Chapter/501287_1_En_14_Figa_HTML.gif))\
    \ with a fire one (![../images/501287_1_En_14_Chapter/501287_1_En_14_Figb_HTML.gif](images/501287_1_En_14_Chapter/501287_1_En_14_Figb_HTML.gif)).\
    \ How can we use the tests to drive this change in the codebase?\n\nWe already\
    \ have a test for the spiciness indicator behavior. Tests are a living specification\
    \ of your code’s expected behavior. To change existing behavior, start by changing\
    \ its tests:\n\n*// MenuRow.ViewModelTests .swift*\n*// ...*\n\n```swift\nfunc\
    \ testWhenItemIsSpicyTextIsItemNameWithChiliEmoji() {\n    let item = MenuItem.fixture(name:\
    \ \"name\", spicy: true)\n    let viewModel = MenuRow.ViewModel(item: item)\n\
    \    XCTAssertEqual(viewModel.text, \"name ![../images/501287_1_En_14_Chapter/501287_1_En_14_Figc_HTML.gif](images/501287_1_En_14_Chapter/501287_1_En_14_Figc_HTML.gif)\"\
    )\n        // Test fails with:\n        // XCTAssertEqual failed: (\"name ![../images/501287_1_En_14_Chapter/501287_1_En_14_Figd_HTML.gif](images/501287_1_En_14_Chapter/501287_1_En_14_Figd_HTML.gif)\"\
    ) is not equal to (\"name ![../images/501287_1_En_14_Chapter/501287_1_En_14_Fige_HTML.gif](images/501287_1_En_14_Chapter/501287_1_En_14_Fige_HTML.gif)\"\
    )\n}\n```\n\nNow that we have a failing test for the updated behavior, we can\
    \ follow its lead to implement the change:\n\n*// MenuRow.ViewModel.swift*\n*//\
    \ ...*\n\n```swift\ninit(item: MenuItem) {\n    text = item.spicy ? \"\\(item.name)\
    \ ![../images/501287_1_En_14_Chapter/501287_1_En_14_Figf_HTML.gif](images/501287_1_En_14_Chapter/501287_1_En_14_Figf_HTML.gif)\"\
    \ : item.name\n}\n```\n\nRun the tests, and you’ll see they pass.\n\nMore often\
    \ than not, developing software means editing existing code, not writing new one.\
    \ These simple examples show how consistently practicing TDD will help you maintain\
    \ your codebase as it matures and you shift away from a greenfield to an established\
    \ codebase.\n\nWhen you have a bug to fix, there will likely be an existing test\
    \ you can duplicate and adapt to reproduce the incorrect behavior. If, instead,\
    \ you need to modify existing behavior, then you have to look no further than\
    \ its tests. Update the assertions with the new expected result and see how they\
    \ fail. Existing tests give you a clear starting point to change behavior.\n\n\
    Having a test suite is incredibly valuable as a discovery tool when the codebase\
    \ and team size grow. When you need to change an area of the code you are not\
    \ familiar with, look at its tests first: they’ll point you to where you’ll need\
    \ to go.\n\n# Key Takeaways\n\n* **TDD helps you maintain existing code as well\
    \ as write new features.**\n* **To fix a bug with TDD, write a test that reproduces\
    \ it, then make it pass.**\n* **To update existing code, update the tests to assert\
    \ the new behavior, then follow their feedback to implement it.**\n\n# 15. Keeping\
    \ Tests Isolated with Fakes and Clear with Dummies\n\n*How can you keep tests\
    \ isolated when the SUT relies on global state?*\n\n*By shifting the dependency\
    \ to in-memory with a Fake Test Double.*\n\n*How can you make it clear which dependencies\
    \ affect the behavior under test and which don’t?*\n\n*By using a Dummy Test Double\
    \ that doesn’t do anything to replace those dependencies that do not affect the\
    \ behavior.*\n\nWe already learned about Test Doubles, “test-specific equivalents”\
    \ of the system under test dependencies, and how to use two of them. Stubs control\
    \ the SUT inputs (Chapter 8 and Chapter 10), and Spies record the effects they\
    \ produce on other objects (Chapter 12).\n\nThere are two more Test Doubles you\
    \ might need to reach from time to time. The *Fake* replaces a dependency reproducing\
    \ its behavior with a simpler implementation. The *Dummy* fills in for a dependency\
    \ providing an implementation that doesn’t do anything. In this chapter, we’ll\
    \ learn how and when to use them."
  raw: '## Fixing Bugs Driven by Tests


    The early feedback from the beta testers reported a bug in the app. After submitting
    an order, customers still see the checkout button, making them unsure whether
    their payment went through.


    Let’s fix this bug by flushing the order stored in `OrderController` once the
    payment succeeds. Where should we begin?


    There is a saying in the TDD circles, *“A bug is just a test that hasn’t been
    written yet.”*


    To fix a bug with TDD, you first write a failing test that reproduces it. From
    there, the workflow is the same as what we’ve been practicing so far. Follow the
    test failure to identify the code to write to make it pass and, as a result, fix
    the bug:


    ```

    // OrderDetail.ViewModelTests .swift

    // ...

    func  testWhenPaymentSucceedsDismissingTheAlertResetsTheOrder() {

    // Arrange the input state with a valid order, one that // has items

    let orderController = OrderController()

    orderController.addToOrder(item: .fixture())

    let viewModel = OrderDetail.ViewModel(

    orderController: orderController,

    onAlertDismiss: {},

    paymentProcessor: PaymentProcessingStub(returning: .success(()))

    )

    // Perform the checkout and wait for it to succeed

    let predicate = NSPredicate { _, _ in viewModel.alertToShow != nil }

    let expectation = XCTNSPredicateExpectation(predicate: predicate, object: .none)

    viewModel.checkout()

    wait(for: [expectation], timeout: timeoutForPredicateExpectations)

    // Run the alert dismiss code

    viewModel.alertToShow?.buttonAction?()

    // Verify the order has been reset

    XCTAssertTrue(orderController.order.items.isEmpty)

    }

    ```


    If you run this test with the focused test keyboard shortcut `Ctrl Cmd U`, you’ll
    see it fails.


    To make the test passes and fix the bug, we need to make `OrderController` reset
    its order property as part of the alert dismiss action:


    ```

    // OrderController.swift

    // ...

    func resetOrder() {

    order = Order(items: [])

    }

    // OrderDetail.ViewModel.swift

    // ...

    func checkout() {

    paymentProcessor.process(order: orderController.order)

    .sink(

    receiveCompletion: { [weak self] completion in

    // ...

    },

    receiveValue: { [weak self] _ in

    guard let self = self else { return }

    self.alertToShow = Alert.ViewModel(

    title: "",

    message: "The payment was successful. Your food will be with you shortly.",

    buttonText: "Ok",

    buttonAction: {

    self.orderController.resetOrder()

    self.onAlertDismiss()

    }

    )

    }

    )

    .store(in: &cancellables)

    }

    ```


    The test now passes, and the bug has been fixed. If you run the app and submit
    an order, you’ll see the “Your Order” button shows an empty order after the order
    detail screen dismisses.


    ## Changing Existing Code Driven by Tests


    The early testers found the spiciness indicator unclear, so you decide to replace
    the chili emoji (![../images/501287_1_En_14_Chapter/501287_1_En_14_Figa_HTML.gif](images/501287_1_En_14_Chapter/501287_1_En_14_Figa_HTML.gif))
    with a fire one (![../images/501287_1_En_14_Chapter/501287_1_En_14_Figb_HTML.gif](images/501287_1_En_14_Chapter/501287_1_En_14_Figb_HTML.gif)).
    How can we use the tests to drive this change in the codebase?


    We already have a test for the spiciness indicator behavior. Tests are a living
    specification of your code’s expected behavior. To change existing behavior, start
    by changing its tests:


    *//* *MenuRow.ViewModelTests* *.swift*


    *// ...*


    **func testWhenItemIsSpicyTextIsItemNameWithChiliEmoji**`() {`


        **let** `item =` **MenuItem.**`fixture(name: "name", spicy: true)`


        **let** `viewModel =` **MenuRow.ViewModel**`(item: item)`


        **XCTAssertEqual**`(viewModel.text, "name` ![../images/501287_1_En_14_Chapter/501287_1_En_14_Figc_HTML.gif](images/501287_1_En_14_Chapter/501287_1_En_14_Figc_HTML.gif)`")`


            *// Test fails with:*


            *// XCTAssertEqual failed: ("name* ![../images/501287_1_En_14_Chapter/501287_1_En_14_Figd_HTML.gif](images/501287_1_En_14_Chapter/501287_1_En_14_Figd_HTML.gif)
    *") is not equal to ("name* ![../images/501287_1_En_14_Chapter/501287_1_En_14_Fige_HTML.gif](images/501287_1_En_14_Chapter/501287_1_En_14_Fige_HTML.gif)
    *")*


    }


    Now that we have a failing test for the updated behavior, we can follow its lead
    to implement the change:


    *// MenuRow.ViewModel.swift*


    *// ...*


    **init**`(item:` **MenuItem**) {


        `text = item.spicy ? "\(item.name)` ![../images/501287_1_En_14_Chapter/501287_1_En_14_Figf_HTML.gif](images/501287_1_En_14_Chapter/501287_1_En_14_Figf_HTML.gif)
    `" : item.name`


    }


    Run the tests, and you’ll see they pass.


    More often than not, developing software means editing existing code, not writing
    new one. These simple examples show how consistently practicing TDD will help
    you maintain your codebase as it matures and you shift away from a greenfield
    to an established codebase.


    When you have a bug to fix, there will likely be an existing test you can duplicate
    and adapt to reproduce the incorrect behavior. If, instead, you need to modify
    existing behavior, then you have to look no further than its tests. Update the
    assertions with the new expected result and see how they fail. Existing tests
    give you a clear starting point to change behavior.


    Having a test suite is incredibly valuable as a discovery tool when the codebase
    and team size grow. When you need to change an area of the code you are not familiar
    with, look at its tests first: they’ll point you to where you’ll need to go.


    ## Key Takeaways


    *   **TDD helps you maintain existing code as well as write new features.**


    *   **To fix a bug with TDD, write a test that reproduces it, then make it pass.**


    *   **To update existing code, update the tests to assert the new behavior, then
    follow their feedback to implement it.**


    # 15. Keeping Tests Isolated with Fakes and Clear with Dummies


    *How can you keep tests isolated when the SUT relies on global state?*


    *By shifting* *the* *dependency to in-memory with a* *Fake Test Double.*


    *How can you make it clear which dependencies affect the behavior under test and
    which don’t?*


    *By using* *a Dummy Test Double that doesn’t do anything* *to replace those dependencies
    that do not affect the behavior.*


    We already learned about Test Doubles, “test-specific equivalents” of the system
    under test dependencies, and how to use two of them. Stubs control the SUT inputs
    (Chapter [8](#501287_1_En_8_Chapter.xhtml) and Chapter [10](#501287_1_En_10_Chapter.xhtml)),
    and Spies record the effects they produce on other objects (Chapter [12](#501287_1_En_12_Chapter.xhtml)).


    There are two more Test Doubles you might need to reach from time to time. The
    *Fake* replaces a dependency reproducing its behavior with a simpler implementation.
    The *Dummy* fills in for a dependency providing an implementation that doesn’t
    do anything. In this chapter, we’ll learn how and when to use them.'
  trans: "\n# 通过测试驱动修复 Bug\n\nBeta 测试者的早期反馈报告了应用中的一个 bug。提交订单后，客户仍然能看到“结账”按钮，这让他们不确定付款是否成功。\n\
    \n让我们通过在支付成功后清除存储在 `OrderController` 中的订单来修复这个 bug。我们应该从哪里开始？\n\n在 TDD 圈子里有句老话：“一个\
    \ bug 就是一个尚未编写的测试。”\n\n要使用 TDD 修复 bug，你首先要编写一个能复现该 bug 的失败测试。从那里开始，工作流程与我们一直在实践的完全相同。跟随测试失败来识别需要编写的代码，使其通过，从而修复\
    \ bug：\n\n```swift\n// OrderDetail.ViewModelTests .swift\n// ...\nfunc testWhenPaymentSucceedsDismissingTheAlertResetsTheOrder()\
    \ {\n    // 用有效的订单（包含商品的订单）安排输入状态\n    let orderController = OrderController()\n\
    \    orderController.addToOrder(item: .fixture())\n    let viewModel = OrderDetail.ViewModel(\n\
