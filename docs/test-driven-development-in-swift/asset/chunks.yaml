    end up trapped in a *local maxima*. They optimize for short-term productivity
    at the cost of long-term effectiveness. Yes, it might be faster to write tests
    after the fact – or not write tests at all – but, over time, it will take longer
    and longer to work in a codebase built like that.


    Test-Driven Development helps work nimbly even as – especially as – your codebase
    grows in size and complexity because of the combined effect of extensive test
    coverage and fine-tuned design that it produces. The test network helps you change
    code without fearing you’ll miss a side effect and break a different area of the
    app. The modular and tailored design that emerged from the tests’ feedback makes
    it easy to update, refactor, and swap implementations.


    When you move one test at a time, you are never far from the stable green state.
    You can experiment with ease. If something doesn’t work, discard the last change
    and you’re back to safety.


    The red, green, refactor workflow disassembles what may look like an untamable
    amount of work in bite-sized components. The end is always in sight: as soon as
    you make a test pass, you have something working, even though it might not be
    finished.


    Once you bring your code to the green state, you can take a break knowing that
    you are leaving it in a stable place and with a clear next step – either refactor
    your current implementation or move to the next test in the list. When your brain
    knows your code works and you have a clear next step to take, it won’t be wasting
    energy worrying about it in the background. To use productivity guru David Allen’s
    terminology, you *close an open loop*.


    **Test-Driven Development helps you stay productive by keeping your codebase malleable
    while letting you work in small achievable and rewarding steps.**


    ## TDD and Product Development


    Red, green, refactor; red, green, refactor; red, green, refactor. Test-Driven
    Development is an iterative process.


    Working in this way and always asking yourself “Do I need this yet?” and “What’s
    the simplest way to make this test pass?” is contagious. You’ll find yourself
    applying Partition Problem and Solve Sequentially at a broader and broader scope.


    Zoom up from writing the code for a feature to designing the feature itself, and
    you’ll discover you can devise a simplified version to implement and ship faster.
    The benefit is twofold: deliver value to your customers earlier and learn about
    the system of work faster.


    Zoom up even further, up to the product design level, and you’ll begin iterating
    and experimenting in safe small steps, with tools like paper prototypes and A/B
    tests to collect data and verify assumptions before committing to expensive development
    phases.


    Once again, TDD is not a prerequisite for this kind of product development approach.
    Still, **TDD makes thinking and working in small iterations a habit**. It shapes
    your workflow to one where gathering feedback is the most important thing.


    As Spotify CEO Daniel Ek wrote [in a shareholders report](https://www.businesswire.com/news/home/20190731005324/en/Spotify-Technology-S.A.-Announces-Financial-Results-for-Second-Quarter-2019),
    “speed of iteration will trump quality of iteration.”[1](#501287_1_En_16_Chapter.xhtml#Par1050)
    Knowing how to move quickly to learn and adjust your trajectory is a winning advantage
    in a world changing at an ever-increasing speed.


    Test-Driven Development comes with a learning curve. It might not be clear what
    test to write, how to shape your code’s interface to inject a Test Double, or
    how to go from the fake implementation that made the test pass to a real one.


    Don’t let that stop you.


    Any forward motion is better than no forward motion. Keep moving and course correct.
    If you don’t know what test to begin with, write a test that initializes the SUT
    and asserts it’s not nil. Once you have that test in place, try adding another
    assertion and see where that leads you.


    Writing tests first will eventually become second nature if you consistently apply
    this workflow we’ve seen together. Like Neo seeing the Matrix’s source when inside
    it, you’ll start seeing ways to test the code you haven’t written yet as soon
    as you read its specification.


    Discovering Test-Driven Development fast-tracked my growth as a software engineer.
    With this book, I hope I have helped you grow too, fostering your interest for
    writing clean code that works and moving in small iterative steps.


    The book is over, but your TDD journey has just begun. Have fun!


    ## Endnote


    1.  Daniel Ek himself elaborated on this quote in a 2020 [interview on The Tim
    Ferriss Show podcast](https://tim.blog/2020/12/03/daniel-ek/), at 1:16:29.'
