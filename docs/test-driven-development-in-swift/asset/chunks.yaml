  raw: '# 12. Testing Side Effects


    *How do you write tests for a system that does not return an output but changes
    another object’s state instead?*


    *By* *spying* *on the object affected by the SUT.*


    If you have control over the object on which the side effect occurs, you can inspect
    its state to verify it matches your expectation, but what if you don’t? For example,
    how can you verify that an object calls a method on a third-party SDK as a result
    of a particular operation?


    This chapter introduces a new kind of Test Double that allows us to do precisely
    that: the *Spy*. Using a Spy, you can replace a real dependency of your SUT with
    one that records which method calls it receives and the arguments passed to them,
    so you can assert the interaction occurred as expected.


    We’ve come a long way since starting to work on Alberto’s app. One test at a time,
    we went from an app showing a hardcoded menu to one that loads it from a remote
    API and allows customers to select the dishes they want to order.


    The final piece of the puzzle is to submit the order and pay for it. Figure [12-1](#501287_1_En_12_Chapter.xhtml#Fig1)
    shows the payment flow: when the user clicks the checkout button, the app submits
    the order to a remote service that processes the payment and queues it in the
    kitchen. When the service finishes, the app notifies the user of the result. Using
    an alert is a simple way to show the outcome on-screen. It’s an application of
    the Partition Problem and Solve Sequentially technique. First, build a working
    version of the flow, and then you can iterate and refine its UX.


    ![../images/501287_1_En_12_Chapter/501287_1_En_12_Fig1_HTML.png](images/501287_1_En_12_Chapter/501287_1_En_12_Fig1_HTML.png)


    Figure 12-1


    The payment flow


    Managing payments is notoriously hard: there are required safety measures and
    different vendors that users expect available from the get-go. As a one-person
    shop, you decide to outsource the responsibility of managing payments to a third-party
    service.


    Hippo Payments, the provider you chose, offers a Swift SDK to manage all your
    payments as a black box; you call it, and it takes care of authentication, vendor
    selection, and fulfillment.


    Here’s the Hippo Payments SDK interface:


    ```

    class HippoPaymentsProcessor {

    init(apiKey: String)

    func processPayment(

    payload: [String : Any],

    onSuccess: @escaping () -> Void,

    onFailure: @escaping (HippoPaymentsError) -> Void

    )

    }

    ```


    We can add a button to the `OrderDetail` view that, when tapped, triggers the
    payment flow, eventually calling the `processPayment` from the SDK.


    The test list for this behavior consists of a single test:


    ```

    // OrderDetail.ViewModelTests.swift

    // ...

    func testWhenCheckoutButtonTappedStartsPaymentProcessingFlow() {}

    ```


    The implementation can be similar to what we did for the user interaction: pass
    an SDK instance to `OrderDetail.ViewModel` and expose a method for `OrderDetail`
    to use as the button action with the logic to call the SDK.


    How can we test that the checkout button action starts the payment flow when that
    doesn’t result in any visible state change in `HippoPaymentProcessing`?


    Let’s update `OrderDetail.ViewModel`’s init to expect a `HippoPaymentsProcessor`
    and see if that gives us a hint. Experimenting is a great way to get unstuck when
    solving a coding problem. Our comprehensive test suite grants us the freedom and
    confidence to play with our codebase.


    ## Third-Party Dependencies Are the Same As All Dependencies


    Here’s how the ViewModel would look like with a `HippoPaymentsProcessor init`
    parameter and property:


    ```

    // OrderDetail.ViewModel.swift

    import Combine

    import HippoPayments

    extension OrderDetail {

    struct ViewModel {

    // ...

    private let paymentProcessor: HippoPaymentsProcessor

    // ...

    // TODO: Using a default value for HippoPaymentsProcessor

    // only to make the code compile.

    // We''ll remove it once fully integrated.

    init(

    orderController: OrderController,

    paymentProcessor: HippoPaymentsProcessor = .init(apiKey: "A1B2C3")

    ) {

    self.paymentProcessor = paymentProcessor

    // ...

    ```


    If you didn’t know that `HippoPaymentsProcessor` comes from a different Swift
    module than the rest of the code, would you say there’s something different between
    it and `OrderController`?


    From `OrderDetail.ViewModel`’s point of view, there is no difference between first-
    and third-party dependencies: they are both external objects.


    Third-party dependencies are no different from first-party dependencies or Apple
    frameworks, and the Dependency Injection Principle applies to them, too. If third-party
    dependencies are no different than other dependencies, then we can apply the same
    playbook for testing code interacting with them: define an abstraction layer and
    build a Test Double.


    ## The Benefit of Abstracting Third-Party Dependencies


    Abstracting third-party dependencies is particularly beneficial because it makes
    it easier to migrate from one vendor to another. If you can abstract the implementation
    details of a particular vendor behind a `protocol` specific to your domain, adopting
    a different option will only be a matter of making it conform to the `protocol`
    too.


    Another advantage is that, because you are in control of how the abstraction layer
    looks like, you can make third-party dependencies fit your codebase style. `HippoPaymentsProcessor`
    has two closure parameters for success and failure handlers, but the codebase
    uses Combine `Publisher`s to manage asynchronous work. We can define our abstraction
    layer with our favorite ergonomics and then extend `HippoPaymentsProcessor` to
    conform to it.


    ## Build Wrappers for Third-Party Dependencies


    ```

    // PaymentProcessing.swift

    import Combine

    protocol PaymentProcessing {

    func process(order: Order) -> AnyPublisher

    }

    ```


    To make `HippoPaymentsProcessor` conform to `PaymentProcessing` , we can use Combine’s
    `Future` type:


    ```

    // HippoPaymentsProcessor+PaymentProcessing.swift

    import Combine

    import HippoPayments

    extension HippoPaymentsProcessor: PaymentProcessing {

    func process(order: Order) -> AnyPublisher {

    return Future { promise in

    self.processPayment(

    payload: ???,

    onSuccess: { promise(.success(())) },

    onFailure: { promise(.failure($0)) }

    )

    }

    .eraseToAnyPublisher()

    }

    }

    ```


    What should we use for the `payload` value? Let’s pretend the SDK documentation
    says it should be a dictionary with an array of all the items’ names in the order
    under the “items” key:


    ```

    [ "items": [ "Arancini Balls", "Penne all''Arrabbiata" ] ]

    ```


    We need a test to guide us through the payload logic implementation. We can’t
    write a test for `HippoPaymentsProcessor` directly, so let’s build this functionality
    someplace we control:


    ```

    // Order+HippoPayments.swift

    extension Order {

    var hippoPaymentsPayload: [String: Any] { [:] }

    }

    ```


    We can use TDD for this logic, which I’ll leave as an exercise for you.


    Now, let’s update `OrderDetail.ViewModel` to expect a type conforming to `PaymentProcessing`
    instead of a concrete `HippoPaymentsProcessor` instance. Doing so is an application
    of the Dependency Inversion Principle – we are making the different components
    depend upon abstractions instead of concrete types:


    ```

    // OrderDetail.ViewModel.swift

    extension OrderDetail {

    struct ViewModel {

    // ...

    // TODO: Using a default value for HippoPaymentsProcessor

    // only to make the code compile.

    // We''ll remove it once fully integrated.

    init(

    orderController: OrderController,

    paymentProcessor: PaymentProcessing = HippoPaymentsProcessor.init(apiKey: "A1B2C3")

    ) {

    // ...

    ```


    Thanks to Dependency Inversion, we can now build a Test Double to verify the checkout
    button action starts the payment flow.'
  trans: "\n# 12. 测试副作用\n\n*如何为一个不返回输出、而是改变另一个对象状态的系统编写测试？*\n\n*通过* *监视* *受被测系统影响的对象。*\n\
    \n如果你能控制发生副作用的对象，你可以检查它的状态以验证是否符合预期，但如果不能呢？例如，你如何验证一个对象在特定操作后调用了第三方 SDK 的方法？\n\
    \n本章介绍一种新的测试替身，它允许我们精确地做到这一点：*间谍*。使用间谍，你可以将被测系统的真实依赖替换为一个能够记录它收到哪些方法调用以及传递给它们的参数的依赖，这样你就可以断言交互是否按预期发生。\n\
    \n自从接手 Alberto 的应用开发以来，我们已经取得了长足的进步。一次一个测试，我们从显示硬编码菜单的应用，发展成为能够从远程 API 加载菜单并允许顾客选择他们想要订购的菜肴的应用。\n\
    \n最后的拼图是提交订单并支付。图 12-1 显示了支付流程：当用户点击结账按钮时，应用向处理支付并将订单排入厨房队列的远程服务提交订单。当服务完成时，应用通知用户结果。使用警报是在屏幕上显示结果的一种简单方式。这是“分解问题并顺序解决”技巧的一个应用。首先，构建流程的一个可用版本，然后你可以迭代并优化其用户体验。\n\
    \n![../images/501287_1_En_12_Chapter/501287_1_En_12_Fig1_HTML.png](img/501287_1_En_12_Fig1_HTML.png)\n\
    \n图 12-1\n\n支付流程\n\n管理支付是出了名的困难：有必要的安全措施，以及用户期望从一开始就能使用的不同供应商。作为一个单人团队，你决定将管理支付的责任外包给第三方服务。\n\
    \n你选择的提供商 Hippo Payments 提供了一个 Swift SDK，用于将所有支付作为黑盒管理；你调用它，它负责身份验证、供应商选择和订单履行。\n\
    \n以下是 Hippo Payments SDK 接口：\n\n```\nclass HippoPaymentsProcessor {\n    init(apiKey:\
    \ String)\n    func processPayment(\n        payload: [String : Any],\n      \
    \  onSuccess: @escaping () -> Void,\n        onFailure: @escaping (HippoPaymentsError)\
    \ -> Void\n    )\n}\n```\n\n我们可以在 `OrderDetail` 视图中添加一个按钮，当点击该按钮时，会触发支付流程，最终调用\
    \ SDK 的 `processPayment`。\n\n此行为的测试列表包含一个测试：\n\n```\n// OrderDetail.ViewModelTests.swift\n\
    // ...\nfunc testWhenCheckoutButtonTappedStartsPaymentProcessingFlow() {}\n```\n\
    \n实现方式可以类似于我们为用户交互所做的：将 SDK 实例传递给 `OrderDetail.ViewModel`，并公开一个方法供 `OrderDetail`\
    \ 用作按钮操作，其中包含调用 SDK 的逻辑。\n\n当结账按钮操作在 `HippoPaymentProcessing` 中不会导致任何可见状态更改时，我们如何测试它启动了支付流程？\n\
    \n让我们更新 `OrderDetail.ViewModel` 的初始化方法，使其期望一个 `HippoPaymentsProcessor`，看看是否能给我们一些提示。尝试是解决编码问题摆脱困境的好方法。我们全面的测试套件赋予我们在代码库中进行尝试的自由和信心。\n\
    \n## 第三方依赖与其他所有依赖相同\n\n以下是 ViewModel 包含 `HippoPaymentsProcessor init` 参数和属性时的样子：\n\
    \n```\n// OrderDetail.ViewModel.swift\nimport Combine\nimport HippoPayments\n\
    extension OrderDetail {\n    struct ViewModel {\n        // ...\n        private\
    \ let paymentProcessor: HippoPaymentsProcessor\n        // ...\n        // TODO:\
    \ 仅为使代码编译通过而使用 HippoPaymentsProcessor 的默认值。\n        // 完全集成后将移除它。\n        init(\n\
    \            orderController: OrderController,\n            paymentProcessor:\
    \ HippoPaymentsProcessor = .init(apiKey: \"A1B2C3\")\n        ) {\n          \
    \  self.paymentProcessor = paymentProcessor\n            // ...\n```\n\n如果你不知道\
    \ `HippoPaymentsProcessor` 来自不同的 Swift 模块，你会说它与 `OrderController` 有什么不同吗？\n\n\
    从 `OrderDetail.ViewModel` 的角度来看，第一方和第三方依赖没有区别：它们都是外部对象。\n\n第三方依赖与第一方依赖或 Apple\
    \ 框架没有区别，依赖注入原则同样适用于它们。如果第三方依赖与其他依赖没有区别，那么我们可以应用相同的策略来测试与它们交互的代码：定义一个抽象层并构建一个测试替身。\n\
    \n## 抽象化第三方依赖的好处\n\n抽象化第三方依赖特别有益，因为它使从一个供应商迁移到另一个供应商变得更容易。如果你能将特定供应商的实现细节抽象到特定于你领域的\
    \ `protocol` 之后，那么采用不同的选项只需使其同样符合该 `protocol` 即可。\n\n另一个优点是，由于你可以控制抽象层的外观，因此可以使第三方依赖适应你的代码库风格。`HippoPaymentsProcessor`\
    \ 为成功和失败处理程序有两个闭包参数，但代码库使用 Combine 的 `Publisher` 来管理异步工作。我们可以使用我们喜欢的人体工程学来定义我们的抽象层，然后扩展\
    \ `HippoPaymentsProcessor` 以使其符合该抽象层。\n\n## 为第三方依赖构建包装器\n\n```\n// PaymentProcessing.swift\n\
    import Combine\nprotocol PaymentProcessing {\n    func process(order: Order) ->\
    \ AnyPublisher\n}\n```\n\n为了使 `HippoPaymentsProcessor` 符合 `PaymentProcessing`，我们可以使用\
    \ Combine 的 `Future` 类型：\n\n```\n// HippoPaymentsProcessor+PaymentProcessing.swift\n\
    import Combine\nimport HippoPayments\nextension HippoPaymentsProcessor: PaymentProcessing\
    \ {\n    func process(order: Order) -> AnyPublisher {\n        return Future {\
    \ promise in\n            self.processPayment(\n                payload: ???,\n\
    \                onSuccess: { promise(.success(())) },\n                onFailure:\
    \ { promise(.failure($0)) }\n            )\n        }\n        .eraseToAnyPublisher()\n\
    \    }\n}\n```\n\n`payload` 值应该用什么？假设 SDK 文档说明它应该是一个字典，包含订单中所有项目名称的数组，键为 `\"items\"\
    `：\n\n```\n[ \"items\": [ \"Arancini Balls\", \"Penne all'Arrabbiata\" ] ]\n```\n\
    \n我们需要一个测试来指导我们实现 payload 逻辑。我们无法直接为 `HippoPaymentsProcessor` 编写测试，所以让我们在我们控制的地方构建这个功能：\n\
    \n```\n// Order+HippoPayments.swift\nextension Order {\n    var hippoPaymentsPayload:\
    \ [String: Any] { [:] }\n}\n```\n\n我们可以对这个逻辑使用 TDD，我将把它留作练习。\n\n现在，让我们更新 `OrderDetail.ViewModel`，使其期望一个符合\
    \ `PaymentProcessing` 的类型，而不是具体的 `HippoPaymentsProcessor` 实例。这样做是依赖倒置原则的一个应用——我们使不同的组件依赖于抽象而不是具体类型：\n\
    \n```\n// OrderDetail.ViewModel.swift\nextension OrderDetail {\n    struct ViewModel\
    \ {\n        // ...\n        // TODO: 仅为使代码编译通过而使用 HippoPaymentsProcessor 的默认值。\n\
    \        // 完全集成后将移除它。\n        init(\n            orderController: OrderController,\n\
    \            paymentProcessor: PaymentProcessing = HippoPaymentsProcessor.init(apiKey:\
    \ \"A1B2C3\")\n        ) {\n            // ...\n```\n\n多亏了依赖倒置，我们现在可以构建一个测试替身来验证结账按钮操作启动了支付流程。\n"
- fmt: '## The Spy Test Double


    How can we verify that clicking the checkout button starts the payment''s flow
    in the `OrderDetail.ViewModelTests`?


    We don''t have access to `HippoPaymentsProcessor` to check its state or whether
    it sent a request to its backend. Besides, we already discussed the disadvantages
    of making real network requests in our tests in Chapter [10](#501287_1_En_10_Chapter.xhtml).
    We don''t have a way to check for changes in the application state either, since
    we are testing the `ViewModel` in isolation. What we *can* do is leverage the
    abstraction we put in place as a seam to insert something we can control in the
    tests.


    We can write a Test Double conforming to `PaymentProcessing` that registers calls
    to the method to start the flow that we can then inspect: a *Spy*. The name Spy
    refers to the double "spying" on how consumers call the dependency:


    ```

    // PaymentProcessingSpy.swift

    @testable import Albertos

    import Combine

    class PaymentProcessingSpy: PaymentProcessing {

    private(set) var receivedOrder: Order?

    func process(order: Order) -> AnyPublisher {

    receivedOrder = order

    return Result.success(()).publisher.eraseToAnyPublisher()

    }

    }

    ```


    We can write a test that uses the Spy to verify the desired behavior:


    ```

    // OrderDetail.ViewModelTests.swift

    func testWhenCheckoutButtonTappedStartsPaymentProcessingFlow() {

    // Create an OrderController and add some items to it

    let orderController = OrderController()

    orderController.addToOrder(item: .fixture(name: "name"))

    orderController.addToOrder(item: .fixture(name: "other name"))

    // Create the Spy

    let paymentProcessingSpy = PaymentProcessingSpy()

    let viewModel = OrderDetail.ViewModel(

    orderController: orderController,

    paymentProcessor: paymentProcessingSpy

    )

    viewModel.checkout()

    XCTAssertEqual(paymentProcessingSpy.receivedOrder, orderController.order)

    }

    ```


    To make the test pass, we only need to call the `process(order:)` method from
    the view model:


    ```

    // OrderDetail.ViewModel.swift

    func checkout() {

    paymentProcessor.process(order: orderController.order)

    }

    ```


    The test passes, but Xcode gives us a warning: "Result of call to '' `process(order:)`
    '' is unused." That''s a good reminder that even though we fired the call to process
    the order, we do not inform the user about its result. We''ll take care of that
    in the next chapter.


    Next, let''s update `OrderDetail` with a button using the new logic we wrote:


    ```

    // OrderDetail.swift

    // ...

    struct OrderDetail: View {

    // ...

    var body: some View {

    VStack(alignment: .center, spacing: 8) {

    // ...

    Button {

    viewModel.checkout()

    } label: {

    Text(viewModel.checkoutButtonText)

    .font(.callout)

    .bold()

    .padding(12)

    .foregroundColor(.white)

    .background(Color.crimson)

    .cornerRadius(10.0)

    }

    // ...

    ```


    ## The Downside of Using Spies


    Thanks to the Spy, we implemented and verified the order submission and payment
    initiation behavior.


    Spies are a useful tool to verify behavior that results in method calls or internal
    state changes in other objects. Using a Spy has a downside, though: it tightly
    couples the test with the code''s implementation details.


    A key rule for writing maintainable tests is that you should *test behavior, not
    implementation*. A test focused on behavior allows you to refactor the implementation
    many times, but one that depends too much on implementation details will break
    as soon as you start refactoring. To get the most value out of your test suite,
    keep it focused on asserting behavior.


    Spies go against the behavior-vs.-implementation guideline because they depend
    entirely on the interface of the type they duplicate.


    That''s why you should reach for a Spy, or any other Test Double for the matter,
    only when there is no other design option left available. In this chapter''s example,
    there was no way to implement our behavior via a method returning a value nor
    a way to ask `HippoPaymentsProcessor` whether the processing started, so using
    a Spy was the only option left.


    ## Practice Time


    Imagine you want to log events from the app to run analytics, such as tracking
    the ratio between the times patrons look at an item''s details and the times they
    order it. To do that, you decide to use Hippo Payments'' sister product, Hippo
    Analytics, which you''ll find in this chapter''s companion source code.


