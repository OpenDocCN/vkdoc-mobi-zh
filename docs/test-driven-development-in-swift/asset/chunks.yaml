  raw: '## **XCTestCase** Life Cycle


    There is one last feature of XCTest that is worth knowing about when getting started,
    although it is one I strongly encourage you to avoid using unless you absolutely
    have to. `XCTestCase` offers methods to run code before each test or all the tests
    will run, as well as after each test or all the tests did run:


    ```

    class LifeCycleExampleTest: XCTestCase {

    override class func setUp() {

    print("This runs before all tests")

    }

    override func setUpWithError() throws {

    print("This runs before each test")

    }

    override func tearDownWithError() throws {

    print("This runs after each test")

    }

    override class func tearDown() {

    print("This runs after all tests")

    }

    func testA() throws {

    print("This is test A")

    }

    func testB() throws {

    print("This is test B")

    }

    }

    ```


    This is the console output we’d get if we run `LifeCycleExampleTest`:


    ```

    Test Suite ''LifeCycleExampleTest'' started at ...

    This runs before all tests

    Test Case ''-[Tests.LifeCycleExampleTest testA]'' started.

    This runs before each test

    This is test A

    This runs after each test

    Test Case ''-[Tests.LifeCycleExampleTest testA]'' passed ...

    Test Case ''-[Tests.LifeCycleExampleTest testB]'' started.

    This runs before each test

    This is test B

    This runs after each test

    Test Case ''-[Tests.LifeCycleExampleTest testB]'' passed ...

    This runs after all tests

    Test Suite ''LifeCycleExampleTest'' passed at ...

    Executed 2 tests, with 0 failures (0 unexpected) in 0.003 (0.003) seconds

    ```


    As your code becomes more complicated, it might seem tempting to simplify your
    tests by preparing the components needed in the `setUp` methods or to clean up
    the state of the app after the tests run in the `tearDown` methods.


    When your tests become complicated to set up, they are sending you a signal that
    the software design is getting complicated too. More often than not, using `setUp`
    and `tearDown` is the wrong answer to the problem of keeping tests tidy.


    You’re better off taking a step back and simplifying your design, perhaps by dividing
    an object with too many responsibilities into two or by injecting configurations
    rather than depending on the global state. I’ll show you these and other techniques
    throughout the book.


    There are two scenarios, though, in which I find `setUp` and `tearDown` useful.
    The first is when adding tests to code that depends on global state and doesn’t
    have tests before making a change. Here, you should add your tests before making
    any change to the code, and so the life cycle methods are useful to start writing
    tests. Once you have your tests in place, you can refactor with confidence and
    remove the dependency on global state and the need to hook into the test life
    cycle.


    The second case in which `setUp` and `tearDown` are the right tool for the job
    is in UI testing. We mentioned in the introduction that UI tests work with the
    app as a black box: you can’t access individual components, and it’s much harder
    to manipulate the global state of the application. `setUp` and `tearDown` are
    useful to prepare the app for the execution of certain UI tests and to clean up
    its state afterward.


    XCTest has much more to offer, like skipping tests, defining execution context,
    or defining multiple test plans within Xcode to test the app in a permutation
    of different conditions. But that’s enough theory for the moment.


    Now that you’ve acquainted yourself with the tools, it’s time to use them. In
    the next chapter, we’ll see the basics of Test-Driven Development in Swift with
    XCTest.


    ## Key Takeaways


    *   **XCTest is the framework Apple provides to write tests in Swift**.


    *   **Tests in XCTest are created with subclasses of** **XCTestCase, in functions
    with names starting with “test.”**


    *   **XCTest offers several assertion functions to test code, like** **XCTAssertEqual,**
    **XCTAssertTrue, and** **XCTAssertFalse**.


    *   **Use** **XCTUnwrap** **to unwrap** **Optionals**; if the value is nil, the
    test will fail.


    *   **To test asynchronous code, define one or more** **XCTExpectations** **that
    the test will wait for and call their** **fulfill()** **method in the async logic**.


    *   **Test code that** **throws** **with** **XCTAssertThrows**.


    *   **Use** **setUpWithError** **and** **tearDownWithError** **to run logic before
    or after every test**. Use those methods sparingly; try to write tests that don’t
    need extra setup or cleanup instead.


    *   **Use the class** **setUp** **and** **tearDown** **methods to run logic before
    or after all of the tests run**. Use these methods sparingly too.


    # 3. Getting Started with Test-Driven Development


    In the previous chapters, we talked about the advantages of using tests to drive
    the design of the code and how to write tests using Apple’s XCTest framework.
    It’s now time to see concrete examples of Test-Driven Development.


    We’ll learn how to implement a piece of logic as an iterative process of writing
    tests and then making them pass. We’ll see how TDD lets us focus first on getting
    the code right and then on making it clean. Finally, we’ll discover how, in a
    language like Swift, the compiler complements the feedback loop that drives the
    software implementation and how to leverage it.


    Test-Driven Development uses the feedback from the tests to guide the implementation
    of the production code.


    How do you get this process going? How do you write Swift code starting from its
    tests with XCTest? The first step is understanding the behavior you need to implement.


    Let’s take this problem from [exercism.​io](https://exercism.io/), a great place
    to hone your software skills:


    *   Write a function that, given an integer representing a year, tells whether
    the year is leap or not.


    *   A leap year in the Gregorian calendar occurs on every year that is evenly
    divisible by 4, except every year that is evenly divisible by 100, unless the
    year is also evenly divisible by 400.


    *   For example, 2021 is not a leap year, but 2020 is. 1900 is not a leap year,
    but 2000 is.


    Here’s a dummy version of the function, one that compiles but doesn’t contain
    any of the necessary logic:


    ```

    func isLeap(_ year: Int) -> Bool {

    return false

    }

    ```


    What sort of tests can we write to verify our code implements the behavior from
    the problem description?


    ## Test List


    The description itself already highlights the behavior details and even provides
    examples of inputs and outputs to verify:


    *   A year evenly divisible by 4 is leap, for example, 2020.


    *   A year evenly divisible by 100 is not leap, for example, 2100.


    *   A year evenly divisible by 400 is leap, for example, 2000.


    *   Any other year is not leap, for example, 2021.


    We can write a test for each of those:


    ```

    import XCTest

    class LeapYearTests: XCTestCase {

    func testEvenlyDivisibleBy4IsLeap() {}

    func testEvenlyDivisibleBy100IsNotLeap() {}

    func testEvenlyDivisibleBy400IsLeap() {}

    func testNotEvenlyDivisibleBy4Or400IsNotLeap() {}

    }

    ```


    Notice I only wrote the test function’s name, with no code inside. That’s a *Test
    List*.


    Writing a Test List is a way to start understanding the different details of what
    the code you’re working on has to do.


    The next step after defining the Test List is to write one and only one test.
    In TDD, we move in small, incremental steps, solving one problem at a time. That
    also applies to choosing which tests to write and how to write them. You want
    to get feedback as fast as possible. Writing one test is faster than writing all
    of them.'
