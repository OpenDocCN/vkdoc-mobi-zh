  trans: '

    ## 依赖倒置原则


    为了模拟获取菜单时接收一个值或错误，我们需要一个能首先获取菜单的对象。最终那会是网络组件，但我们尚未构建它。由于我们正在处理获取行为的 UI 侧，构建网络组件就太绕远了；这会拖慢我们的反馈循环。为解决这个先有鸡还是先有蛋的问题，我们需要退一步审视我们的设计。


    与其在`MenuList.ViewModel`中期待一个具体的菜单获取类型，不如定义一个抽象并与它交互。在 Swift 中实现这一点的方法是使用`protocol`：


    ```

    // MenuFetching.swift

    import Combine

    protocol MenuFetching {

    func fetchMenu() -> AnyPublisher

    }

    ```


    `fetchMenu`方法返回一个`AnyPublisher`，其输出为`[MenuItem]`。Combine 将`AnyPublisher`定义为一种仅供消费的专用`Publisher`；你无法从中`发送`新值，只能订阅。


    在《敏捷软件开发：原则、模式与实践》中，罗伯特·C·马丁将这种定义组件间抽象的技术称为**依赖倒置原则**，简称 DIP。


    DIP 指出：“高层模块不应依赖低层模块。两者都应依赖抽象。”也就是说，`MenuList.ViewModel`不应依赖执行网络请求的对象，而应依赖菜单获取操作的抽象。在我们的上下文中，这意味着定义一个`protocol`来表示抽象——`MenuFetching`，并让`MenuList.ViewModel`将其作为菜单获取组件所期待的类型使用。


    “倒置”一词指的是从该原则提出时面向对象设计方法中使用的依赖关系转变，那时高层模块依赖低层模块。在传统模型中，由于直接依赖，低层模块的变更会要求高层模块也随之变更。“这种困境荒谬至极！”马丁感叹道。“应该是设定政策的高层模块去影响低层的具体模块。包含高层业务规则的模块应优先于并独立于包含实现细节的模块。”


    应用依赖倒置在生产代码和测试代码中都会带来积极的实践后果。在生产代码中，我们可以在等待网络组件就绪时，构建一个简单的符合`MenuFetching`协议的对象供
    ViewModel 使用。在测试中，我们可以创建一个符合该协议的对象，并用它模拟获取操作的不同结果，以验证 ViewModel 的行为。测试中用于模拟生产对象的对象被称为*测试替身*，我们将在下一章学习它们。


    ## 依赖倒置 vs. 依赖注入


    尽管名称相似，但切记不要混淆依赖*倒置*与*注入*。


    依赖倒置原则指出，你应该为组件定义其所依赖的抽象，以便低层组件的变更不会影响使用它的高层组件。


    依赖注入则是指让你的对象要求系统内它们需要交互的其他组件的实例，而非在内部创建这些实例。


    DIP 和 DI 都能让你的软件设计更灵活，但方式微妙不同：一个涉及对象应如何交互，另一个涉及对象应如何构建。


    ## 用 DIP 将 ViewModel 与数据获取解耦


    我们已经看到，要将 ViewModel 与数据获取实现细节解耦，需要让它依赖`MenuFetching`抽象。我们从生产代码开始实现这一更改。


    你可能会问：“为什么不从测试开始？”在实践 TDD 时，你是在优化快速反馈循环。正如我们在第 3 章所见，编译器也是 TDD 工作流的一部分。在这种情况下，从生产代码而非测试开始变更能提供更快的反馈，因为编译器会指出所有需要更新的代码：


    ```

    // MenuList.ViewModel.swift

    extension MenuList {

    class ViewModel: ObservableObject {

    @Published private(set) var sections: [MenuSection]

    init(

    menuFetching: MenuFetching,

    menuGrouping: @escaping ([MenuItem]) -> [MenuSection] = groupMenuByCategory

    ) {

    self.sections = menuGrouping([])

    }

    }

    }

    ```


    如果你尝试使用键盘快捷键`Shift Cmd U`构建应用及其测试目标，你会在`AlbertosApp.swift`中看到一个编译器错误：


    ```

    MenuList(viewModel: .init(menu: menu))

    // 编译器报错：

    // - Extra argument ''menu'' in call

    // - Missing argument for parameter ''menuFetching'' in call

    ```


    编译器告诉我们`AlbertosApp`需要向`MenuList.ViewModel init`提供一个符合`MenuFetching`的类型实例。


    这意味着，为了让应用能编译，我们需要更新 ViewModel 的调用点，为其提供一个`MenuFetching`实例。为此，我们首先需要创建一个符合`MenuFetching`的对象。


    正如我们讨论过的，与其提供“真正”的实现，不如快速构建一个占位符，这样我们就能专注于动态更新 UI。由于最终实现也会符合`MenuFetching`，我们可以在它就绪后轻松替换，而`MenuList.ViewModel`毫不知情：


    ```

    // MenuFetchingPlaceholder.swift

    import Combine

    import Foundation

    class MenuFetchingPlaceholder: MenuFetching {

    func fetchMenu() -> AnyPublisher {

    return Future { $0(.success(menu)) }

    // 使用延迟模拟异步获取

    .delay(for: 0.5, scheduler: RunLoop.main)

    .eraseToAnyPublisher()

    }

    }

    ```


    [`Future`](https://developer.apple.com/documentation/combine/future) 是 Combine
    中一种便捷类型，用于创建“一个最终产生单个值然后完成或失败的发布者”。`Future { $0(.success(menu)) }` 创建了一个发出`menu`然后完成的`Publisher`。`menu`是我们在第
    4 章中作为应用第一次迭代的一部分硬编码的全局`MenuItem`数组。


    现在我们有了更新源代码中`MenuList.ViewModel`调用点所需的一切：


    ```

    // AlbertosApp.swift

    @main

    struct AlbertosApp: App {

    var body: some Scene {

    WindowGroup {

    NavigationView {

    MenuList(

    viewModel: .init(

    menuFetching: MenuFetchingPlaceholder()

    )

    )

    }

    }

    }

    }

    ```


    如果再次运行`Shift Cmd U`，你会看到构建仍然失败，但这次是在测试目标中。我们之前没有看到这些错误，因为 Xcode 只会在生产代码构建成功后尝试构建测试目标。


    这些新的编译器错误同样是由于`MenuList.ViewModel init`调用未使用`MenuFetching`。我们可以像处理生产代码一样修复它们：使用`MenuFetchingPlaceholder`。


    从这样：


    ```

    let viewModel = MenuList.ViewModel(menu: [.fixture()])

    ```


    改成这样：


    ```

    let viewModel = MenuList.ViewModel(

    menuFetching: MenuFetchingPlaceholder()

    )

    ```


    现在测试可以构建了，如果你运行它们，你会看到它们也通过了。


    我们已经建立了抽象层，并且回到了绿色状态：让我们继续前进，实现当菜单获取成功时 ViewModel 如何更新其 sections 的测试。

    '
- fmt: "# Testing Async Updates of `@Published` Properties\n\nWe want to verify that,\
    \ when the menu fetch succeeds, the `@Published` value updates with the sections\
    \ generated from the received `[MenuItem]`.\n\nWhen you wrap a property with `@Published`,\
    \ the compiler creates a `Publisher` for it. This `Publisher` will publish a new\
    \ value every time the property updates, and you can access it using the `$` prefix.\
    \ Therefore, to test how a `@Published` property updates means to test the behavior\
    \ of its `Publisher`.\n\n`Publisher`s transmit a sequence of values over time;\
    \ they behave asynchronously. As we discussed in Chapter [2](#501287_1_En_2_Chapter.xhtml),\
    \ XCTest’s primary tool for testing asynchronous code is `XCTExpectation`.\n\n\
    Here’s the test:\n\n```swift\n// MenuList.ViewModelTests.swift\n// ...\nclass\
    \ MenuListViewModelTests: XCTestCase {\n    var cancellables = Set<AnyCancellable>()\n\
    \    // ...\n    func testWhenFecthingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()\
    \ {\n        var receivedMenu: [MenuItem]?\n        let expectedSections = [MenuSection.fixture()]\n\
    \        let spyClosure: ([MenuItem]) -> [MenuSection] = { items in\n        \
    \    receivedMenu = items\n            return expectedSections\n        }\n  \
    \      let viewModel = MenuList.ViewModel(menuFetching: MenuFetchingPlaceholder(),\
    \ menuGrouping: spyClosure)\n        let expectation = XCTestExpectation(\n  \
    \          description: \"Publishes sections built from received menu and given\
    \ grouping closure\"\n        )\n        viewModel\n            .$sections\n \
    \           .dropFirst()\n            .sink { value in\n                // Ensure\
    \ the grouping closure is called with\n                // the received menu\n\
    \                XCTAssertEqual(receivedMenu, menu)\n                // Ensure\
    \ the published value is the result of\n                // the grouping closure\n\
    \                XCTAssertEqual(value, expectedSections)\n                expectation.fulfill()\n\
    \            }\n            .store(in: &cancellables)\n        wait(for: [expectation],\
    \ timeout: 1)\n    }\n    // ...\n}\n```\n\nLet’s unpack what’s happening. The\
    \ test:\n\n1. Sets up the spy closure as we did in the static version of the test.\n\
    2. Instantiates `MenuList.ViewModel` passing it a `MenuFetchingPlaceholder` instance.\
    \ This allows us to simulate the successful menu fetching scenario.\n3. Defines\
    \ an `XCTestExpectation` to test the asynchronous publishing behavior.\n4. Accesses\
    \ the `Publisher` from the `@Published sections` property of the ViewModel using\
    \ the `$` prefix.\n5. Calls `dropFirst()` to skip the first received value. The\
    \ first published value is the default one set in the property definition. By\
    \ ignoring it, we can read the next one that comes and see if it matches our expectation\
    \ without tracking the multiple values the `Publisher` emits, simplifying the\
    \ test setup.\n6. Attaches a subscriber closure to the `Publisher` stream using\
    \ `.sink`.\n7. In the observer, asserts that `value` is the `menu` returned by\
    \ `MenuFetchingPlaceholder` and was built using the given grouping closure and\
    \ then fulfills the `expectation`.\n8. Stores the `AnyCancellable` returned by\
    \ the `sink` call into a `Set`. We need to do this to have a memory reference\
    \ to the stream of events, or its allocated memory will be released before it\
    \ gets a chance to emit values.\n\nThe test is failing with “Asynchronous wait\
    \ failed: Exceeded timeout of 1 seconds, with unfulfilled expectations: ‘Publishes\
    \ sections build from received menu and given grouping closure’.” To make it pass,\
    \ let’s add the code to subscribe to menu fetcher `Publisher` and update our sections\
    \ when a new value arrives:\n\n```swift\n// MenuList.ViewModel.swift\n// ...\n\
    init(\n    menuFetching: MenuFetching,\n    menuGrouping: @escaping ([MenuItem])\
    \ -> [MenuSection] = groupMenuByCategory\n) {\n    sections = []\n    menuFetching\n\
    \        .fetchMenu()\n        .sink(\n            receiveCompletion: { _ in },\n\
    \            receiveValue: { [weak self] value in\n                self?.sections\
    \ = menuGrouping(value)\n            }\n        )\n        .store(in: &cancellables)\n\
    }\n```\n\nThe test now passes. We only have one step left: make `MenuList` observe\
    \ the ViewModel so SwiftUI can update it when the data becomes available. That’s\
    \ as easy as wrapping the `viewModel` property in `@ObservedObject`:\n\n```swift\n\
    @ObservedObject var viewModel: ViewModel\n```\n\nIf you run the app now, you’ll\
    \ see it behaves just as before, only with the little difference that the menu\
    \ appears on-screen a moment’s delay – 0.5 seconds to be precise, the value we\
    \ set in `MenuFetchingPlaceholder`.\n\nSomething noticeably missing from the current\
    \ flow is the loading state management. There’s no indication the app is loading\
    \ data; customers stare at an empty screen until, suddenly, the menu appears.\n\
    \nProper handling of the loading state is a must-have for every app, but, in the\
    \ interest of moving forward with learning new concepts, we won’t be implementing\
    \ it here. Feel free to work on it as an exercise.\n\nA simple implementation\
    \ could be using the content of the menu array as a proxy for the loading state:\
    \ if it’s empty, then the app must be waiting for a response. A more elegant and\
    \ robust solution would be to represent all the view’s possible states (not asked,\
    \ loading, loaded, failed to load) in an `enum`. Have a look at [`RemoteData`](https://github.com/mokagio/RemoteData)\
    \ for a sample of this approach.\n\n## Mystery Guest\n\nThere’s something suboptimal\
    \ about the test we just wrote. A reader with less context than us may not immediately\
    \ understand why we assert that the received menu is equal to a global value called\
    \ `menu`. This value is a mysterious guest in the test; it’s not immediately clear\
    \ where it came from or why it’s there.\n\nWhen the cause-effect relationship\
    \ between the inputs and outputs of a test is not straightforward, understanding\
    \ the test becomes harder and, if the test fails, so does finding the source of\
    \ the failure. You should avoid having Mystery Guests in your test and always\
    \ strive to give a reader all the information they need to understand the code.\
    \ We’ll see how to remove this particular Mystery Guest instance shortly.\n\n\
    In this chapter, we applied *Partition Problem and Solve Sequentially* to the\
    \ task of fetching the menu from a remote API and loading it on-screen. We chose\
    \ to start with the logic to update the UI when the menu data becomes available.\
    \ Our implementation is rough and incomplete, but it works nevertheless. It’s\
    \ a solid foundation on which to keep building.\n\nWe evolved our initial static\
    \ ViewModel into one that fetches its data from an asynchronous source, streaming\
    \ the change to its consumer using one of the SwiftUI and Combine native data\
    \ flow mechanisms. Leveraging the frameworks vastly simplified our job as we had\
    \ to focus only on asking and transforming the data while they handled keeping\
    \ the view up-to-date.\n\nWe got to a working implementation without real data\
    \ fetching from the network by applying the *Dependency Inversion Principle* to\
    \ define an abstraction layer between ViewModel and networking. By having a placeholder\
    \ for the networking part behind the abstraction layer, we were able to implement\
    \ the desired `MenuList.ViewModel` behavior for when the API returns a successful\
    \ value test first.\n\nWe still need to tackle the failure scenario. And what\
    \ about removing the Mystery Guest? That’s what we’ll work on in the next chapter.\n\
    \n## Practice Time\n\nThe test for the `@Published` property we wrote has the\
    \ implicit assumption that there’s going to be only one value published after\
    \ the default initial one. That’s the behavior we expect from a network request\
    \ to a remote REST API: make an HTTP call that can either succeed or fail.\n\n\
    A `Publisher`, on the other hand, can emit *many* values over time.\n\nTo learn\
    \ how to work with the multiple values a `Publisher` sends, try rewriting the\
    \ test without using `dropFirst()` and verify that the first value received is\
    \ an empty array and the second matches the menu transformation expectation."
  raw: '## How to Test Async Updates of **@Published** Properties


    We want to verify that, when the menu fetch succeeds, the `@Published` value updates
    with the sections generated from the received `[MenuItem]`.


    When you wrap a property with `@Published`, the compiler creates a `Publisher`
    for it. This `Publisher` will publish a new value every time the property updates,
    and you can access it using the `$` prefix. Therefore, to test how a `@Published`
    property updates means to test the behavior of its `Publisher`.


    `Publisher`s transmit a sequence of values over time; they behave asynchronously.
    As we discussed in Chapter [2](#501287_1_En_2_Chapter.xhtml), XCTest’s primary
    tool for testing asynchronous code is `XCTExpectation`.


    Here’s the test:


    ```

    // MenuList.ViewModelTests.swift

    // ...

    class MenuListViewModelTests: XCTestCase {

    var cancellables = Set()

    // ...

    func testWhenFecthingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()
    {

    var receivedMenu: [MenuItem]?

    let expectedSections = [MenuSection.fixture()]

    let spyClosure: ([MenuItem]) -> [MenuSection] = { items in

    receivedMenu = items

    return expectedSections

    }

    let viewModel = MenuList.ViewModel(menuFetching: MenuFetchingPlaceholder(), menuGrouping:
    spyClosure)

    let expectation = XCTestExpectation(

    description: "Publishes sections built from received menu and given grouping closure"

    )

    viewModel

    .$sections

    .dropFirst()

    .sink { value in

    // Ensure the grouping closure is called with

    // the received menu

    XCTAssertEqual(receivedMenu, menu)

    // Ensure the published value is the result of

    // the grouping closure

    XCTAssertEqual(value, expectedSections)

    expectation.fulfill()

    }

    .store(in: &cancellables)

    wait(for: [expectation], timeout: 1)

    }

    // ...

    }

    ```


    Let’s unpack what’s happening. The test


    1.  Sets up the spy closure as we did in the static version of the test.


    2.  Instantiates `MenuList.ViewModel` passing it a `MenuFetchingPlaceholder` instance.
    This allows us to simulate the successful menu fetching scenario.


    3.  Defines an `XCTestExpectation` to test the asynchronous publishing behavior.


    4.  Accesses the `Publisher` from the `@Published sections` property of the ViewModel
    using the `$` prefix.


    5.  Calls `dropFirst()` to skip the first received value. The first published
    value is the default one set in the property definition. By ignoring it, we can
    read the next one that comes and see if it matches our expectation without tracking
    the multiple values the `Publisher` emits, simplifying the test setup.


    6.  Attaches a subscriber closure to the `Publisher` stream using `.sink`.


    7.  In the observer, asserts that `value` is the `menu` returned by `MenuFetchingPlaceholder`
    and was built using the given grouping closure and then fulfills the `expectation`.


    8.  Stores the `AnyCancellable` returned by the `sink` call into a `Set`. We need
    to do this to have a memory reference to the stream of events, or its allocated
    memory will be released before it gets a chance to emit values.


    The test is failing with “Asynchronous wait failed: Exceeded timeout of 1 seconds,
    with unfulfilled expectations: ‘Publishes sections build from received menu and
    given grouping closure’.” To make it pass, let’s add the code to subscribe to
    menu fetcher `Publisher` and update our sections when a new value arrives:


    ```

    // MenuList.ViewModel.swift

    // ...

    init(

    menuFetching: MenuFetching,

    menuGrouping: @escaping ([MenuItem]) -> [MenuSection] = groupMenuByCategory

    ) {

    sections = []

    menuFetching

    .fetchMenu()

    .sink(

    receiveCompletion: { _ in },

    receiveValue: { [weak self] value in

    self?.sections = menuGrouping(value)

    }

    )

    .store(in: &cancellables)

    }

    ```


    The test now passes. We only have one step left: make `MenuList` observe the ViewModel
    so SwiftUI can update it when the data becomes available. That’s as easy as wrapping
    the `viewModel` property in `@ObservedObject`:


    ```

    @ObservedObject var viewModel: ViewModel

    ```


    If you run the app now, you’ll see it behaves just as before, only with the little
    difference that the menu appears on-screen a moment’s delay – 0.5 seconds to be
    precise, the value we set in `MenuFetchingPlaceholder`.


    Something noticeably missing from the current flow is the loading state management.
    There’s no indication the app is loading data; customers stare at an empty screen
    until, suddenly, the menu appears.


    Proper handling of the loading state is a must-have for every app, but, in the
    interest of moving forward with learning new concepts, we won’t be implementing
    it here. Feel free to work on it as an exercise.


    A simple implementation could be using the content of the menu array as a proxy
    for the loading state: if it’s empty, then the app must be waiting for a response.
    A more elegant and robust solution would be to represent all the view’s possible
    states (not asked, loading, loaded, failed to load) in an `enum`. Have a look
    at [`RemoteData`](https://github.com/mokagio/RemoteData) for a sample of this
    approach.


    ## Mystery Guest


    There’s something suboptimal about the test we just wrote. A reader with less
    context than us may not immediately understand why we assert that the received
    menu is equal to a global value called `menu`. This value is a mysterious guest
    in the test; it’s not immediately clear where it came from or why it’s there.


    When the cause-effect relationship between the inputs and outputs of a test is
    not straightforward, understanding the test becomes harder and, if the test fails,
    so does finding the source of the failure. You should avoid having Mystery Guests
    in your test and always strive to give a reader all the information they need
    to understand the code. We’ll see how to remove this particular Mystery Guest
    instance shortly.


    In this chapter, we applied *Partition Problem and Solve Sequentially* to the
    task of fetching the menu from a remote API and loading it on-screen. We chose
    to start with the logic to update the UI when the menu data becomes available.
    Our implementation is rough and incomplete, but it works nevertheless. It’s a
    solid foundation on which to keep building.


    We evolved our initial static ViewModel into one that fetches its data from an
    asynchronous source, streaming the change to its consumer using one of the SwiftUI
    and Combine native data flow mechanisms. Leveraging the frameworks vastly simplified
    our job as we had to focus only on asking and transforming the data while they
    handled keeping the view up-to-date.


    We got to a working implementation without real data fetching from the network
    by applying the *Dependency Inversion Principle* to define an abstraction layer
    between ViewModel and networking. By having a placeholder for the networking part
    behind the abstraction layer, we were able to implement the desired `MenuList.ViewModel`
    behavior for when the API returns a successful value test first.


    We still need to tackle the failure scenario. And what about removing the Mystery
    Guest? That’s what we’ll work on in the next chapter.


    ## Practice Time


    The test for the `@Published` property we wrote has the implicit assumption that
    there’s going to be only one value published after the default initial one. That’s
    the behavior we expect from a network request to a remote REST API: make an HTTP
    call that can either succeed or fail.


    A `Publisher`, on the other hand, can emit *many* values over time.


    To learn how to work with the multiple values a `Publisher` sends, try rewriting
    the test without using `dropFirst()` and verify that the first value received
    is an empty array and the second matches the menu transformation expectation.'
  trans: "\n# 测试 `@Published` 属性的异步更新\n\n我们要验证的是，当菜单获取成功时，由接收到的 `[MenuItem]` 生成的各个\
    \ section 会更新 `@Published` 属性值。\n\n当用 `@Published` 包装一个属性时，编译器会为该属性创建一个 `Publisher`。这个\
    \ `Publisher` 会在每次属性更新时发布一个新值，你可以通过 `$` 前缀来访问它。因此，测试 `@Published` 属性如何更新，实际上就是测试其\
    \ `Publisher` 的行为。\n\n`Publisher` 随时间传输一系列值；它们的行为是异步的。正如我们在第 2 章讨论过的，XCTest 中测试异步代码的主要工具是\
    \ `XCTExpectation`。\n\n以下是该测试：\n\n```swift\n// MenuList.ViewModelTests.swift\n\
    // ...\nclass MenuListViewModelTests: XCTestCase {\n    var cancellables = Set<AnyCancellable>()\n\
    \    // ...\n    func testWhenFecthingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()\
    \ {\n        var receivedMenu: [MenuItem]?\n        let expectedSections = [MenuSection.fixture()]\n\
    \        let spyClosure: ([MenuItem]) -> [MenuSection] = { items in\n        \
    \    receivedMenu = items\n            return expectedSections\n        }\n  \
    \      let viewModel = MenuList.ViewModel(menuFetching: MenuFetchingPlaceholder(),\
    \ menuGrouping: spyClosure)\n        let expectation = XCTestExpectation(\n  \
    \          description: \"Publishes sections built from received menu and given\
    \ grouping closure\"\n        )\n        viewModel\n            .$sections\n \
    \           .dropFirst()\n            .sink { value in\n                // 确保分组闭包接收到了正确的菜单数据\n\
    \                XCTAssertEqual(receivedMenu, menu)\n                // 确保发布的值是分组闭包的执行结果\n\
    \                XCTAssertEqual(value, expectedSections)\n                expectation.fulfill()\n\
    \            }\n            .store(in: &cancellables)\n        wait(for: [expectation],\
    \ timeout: 1)\n    }\n    // ...\n}\n```\n\n我们来解析一下这段测试代码。该测试：\n\n1. 像在静态版本测试中一样，设置了一个\
    \ spy 闭包。\n2. 实例化了 `MenuList.ViewModel`，并向其传递了一个 `MenuFetchingPlaceholder` 实例。这使我们能够模拟菜单获取成功的场景。\n\
    3. 定义了一个 `XCTestExpectation` 来测试异步发布行为。\n4. 通过 `$` 前缀，访问 ViewModel 中 `@Published\
    \ sections` 属性的 `Publisher`。\n5. 调用 `dropFirst()` 来跳过接收到的第一个值。第一个发布的值是属性定义中设置的默认值。忽略它之后，我们就可以读取下一个到达的值，并检查它是否符合我们的预期，而无需追踪\
    \ `Publisher` 发出的多个值，从而简化了测试设置。\n6. 使用 `.sink` 将一个订阅者闭包附加到 `Publisher` 流上。\n7.\
    \ 在观察者中，断言 `value` 是 `MenuFetchingPlaceholder` 返回的 `menu`，并且是使用给定的分组闭包构建的，然后满足\
    \ `expectation`。\n8. 将 `sink` 调用返回的 `AnyCancellable` 存储到一个 `Set` 中。我们需要这样做，以便持有事件流的内存引用，否则，在其有机会发出值之前，其分配的内存就会被释放。\n\
    \n该测试目前会失败，错误信息是“异步等待失败：超过了 1 秒的超时时间，且存在未满足的期望：'Publishes sections build from\
    \ received menu and given grouping closure'。”为了使测试通过，让我们添加代码来订阅菜单获取器的 `Publisher`，并在新值到达时更新我们的\
    \ sections：\n\n```swift\n// MenuList.ViewModel.swift\n// ...\ninit(\n    menuFetching:\
    \ MenuFetching,\n    menuGrouping: @escaping ([MenuItem]) -> [MenuSection] = groupMenuByCategory\n\
    ) {\n    sections = []\n    menuFetching\n        .fetchMenu()\n        .sink(\n\
    \            receiveCompletion: { _ in },\n            receiveValue: { [weak self]\
    \ value in\n                self?.sections = menuGrouping(value)\n           \
    \ }\n        )\n        .store(in: &cancellables)\n}\n```\n\n测试现在通过了。我们只剩下一步：让\
    \ `MenuList` 观察这个 ViewModel，以便 SwiftUI 能在数据可用时更新它。这只需将 `viewModel` 属性用 `@ObservedObject`\
    \ 包装一下即可：\n\n```swift\n@ObservedObject var viewModel: ViewModel\n```\n\n如果你现在运行这个应用，你会看到它的行为跟之前一样，只有一点小区别：菜单会在屏幕上延迟片刻后出现——准确地说，是\
    \ 0.5 秒，即我们在 `MenuFetchingPlaceholder` 中设置的值。\n\n当前流程中明显缺少的一个东西是加载状态的管理。没有任何指示表明应用正在加载数据；用户只能盯着一个空白屏幕，直到菜单突然出现。\n\
    \n正确处理加载状态是每个应用必不可少的功能，但为了继续学习新概念，我们在此不会实现它。你可以将其作为练习自行尝试。\n\n一个简单的实现方案可以是：利用菜单数组的内容作为加载状态的代理：如果数组为空，那么应用肯定在等待响应。一个更优雅、更健壮的解决方案是，使用一个\
    \ `enum` 来表示视图所有可能的状态（未请求、加载中、加载成功、加载失败）。可以查看 [`RemoteData`](https://github.com/mokagio/RemoteData)\
    \ 获取这种做法的示例。\n\n## 神秘访客\n\n我们刚刚编写的测试中，有一些不够理想的地方。一个了解上下文较少的读者可能无法立即理解，为什么我们要断言接收到的菜单等于一个名为\
    \ `menu` 的全局变量。这个值在测试中就像一个神秘的访客；它从哪里来、为什么在那里，都不是一目了然的。\n\n当测试输入和输出之间的因果关系不够直接时，理解测试就会变得更加困难，而且如果测试失败了，找到失败原因也会更难。你应该避免在测试中出现“神秘访客”，并始终努力为读者提供理解代码所需的所有信息。我们很快就会看到如何消除这个特定的“神秘访客”。\n\
    \n在本章中，我们将*分解问题，逐一解决*的方法应用到了从远程 API 获取菜单并将其加载到屏幕上的任务中。我们选择从更新 UI 的逻辑开始，以便在菜单数据可用时更新界面。我们的实现还很粗糙，也不完整，但它是可行的。这是一个坚实的根基，我们可以在此基础上继续构建。\n\
    \n我们将初期的静态 ViewModel 演进成了从一个异步源获取数据，并利用 SwiftUI 和 Combine 的原生数据流机制将其变更流式传输给使用者的\
    \ ViewModel。充分利用这些框架极大地简化了我们的工作，因为我们只需要关注请求数据和转换数据，而它们则负责保持视图的更新。\n\n通过应用*依赖反转原则*，在\
    \ ViewModel 和网络层之间定义了一个抽象层，我们在没有真正从网络获取数据的情况下就实现了一个可工作的版本。通过在抽象层背后放置一个网络部分的占位符，我们得以先编写测试，然后实现了\
    \ `MenuList.ViewModel` 在 API 返回成功值时的期望行为。\n\n我们还需要处理失败场景。至于如何消除“神秘访客”？这正是我们在下一章要解决的问题。\n\
    \n## 练习时间\n\n我们为 `@Published` 属性编写的测试隐含了一个假设：在默认的初始值之后，只会发布一个值。这是我们期望从远程 REST\
    \ API 的网络请求中得到的行为：发起一个 HTTP 调用，要么成功，要么失败。\n\n另一方面，`Publisher` 可以随时间发出*多个*值。\n\n\
    为了学习如何处理 `Publisher` 发送的多个值，请尝试在不使用 `dropFirst()` 的情况下重写该测试，并验证接收到的第一个值是空数组，而第二个值符合菜单转换的预期。\n"
- fmt: "# Key Takeaways\n\n- SwiftUI and Combine make updating a view as new data\
    \ comes out easy with `ObservableObject`, `@Published`, and `@ObservedObject`.\
    \ Use these tools to have the frameworks automatically update your view every\
    \ time new values are published.\n- Apply the Dependency Inversion Principle to\
    \ decouple ViewModels from the implementation details of data fetching using an\
    \ abstraction layer. You can define a `protocol` for the ViewModel to request\
    \ instead of a concrete type.\n- An abstraction layer allows you to provide placeholder\
    \ implementations for components that are not ready yet. You can focus on building\
    \ one piece at a time without going off a tangent to build its dependencies first.\n\
    - You can test async updates of `@Published` properties using `sink` and `XCTestExpectation`.\
    \ By subscribing to the `Publisher` associated with a `@Published` property, you\
    \ can test how it changes over time.\n- Use `XCTSkipIf(_:, _:)` instead of commenting\
    \ test code you are not ready to delete yet. This API generates an entry in the\
    \ test report, making it harder to forget about the code and pollute the codebase\
    \ with out-of-date comments.\n\n# 8. Testing Code Based on Indirect Inputs\n\n\
    *How do you test behavior that depends on indirect inputs in isolation?*\n\n*By\
    \ building a test-specific replacement for the dependency, which you can use to\
    \ control the indirect inputs it provides to the system under test.*\n\nWe’re\
    \ in the middle of building the UI component of the new menu fetching from a remote\
    \ API functionality. We started from the UI to have an *Earliest Testable* version\
    \ of the dynamic update, but that means we don’t have the real networking component\
    \ yet.\n\nIn the previous chapter, we applied the *Dependency Injection Principle*\
    \ and defined an abstraction for the ViewModel to depend upon, `MenuFetching`,\
    \ which lets us use a placeholder implementation for the networking object and\
    \ stay focused on the current task. That allowed us to write tests to drive making\
    \ `MenuList.ViewModel` update the view once it receives the menu data, but those\
    \ tests are incomplete: we haven’t tested error handling, and there’s a Mystery\
    \ Guest in the successful fetching test.\n\nThe challenge in testing how `MenuList.ViewModel`\
    \ behaves is that it depends on the indirect input `MenuFetching` feeds it. So\
    \ far, we tested components with methods expecting an input and returning an output,\
    \ but `MenuList.ViewModel`’s input comes from the return value it gets when calling\
    \ `MenuFetching.fetchMenu()` internally.\n\nIn this chapter, we’ll learn how to\
    \ work around this constraint using a *Stub Test Double* to get granular control\
    \ over the indirect input that `MenuFetching` sends `MenuList.ViewModel`.\n\n\
    ## The Stub Test Double\n\nIn the previous chapter, we wrote the following test\
    \ for the successful menu fetching scenario:\n\n```\n// MenuList.ViewModelTests.swift\n\
    func testWhenFecthingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()\
    \ {\n    var receivedMenu: [MenuItem]?\n    let expectedSections = [MenuSection.fixture()]\n\
    \    let spyClosure: ([MenuItem]) -> [MenuSection] = { items in\n        receivedMenu\
    \ = items\n        return expectedSections\n    }\n    let viewModel = MenuList.ViewModel(menuFetching:\
    \ MenuFetchingPlaceholder(), menuGrouping: spyClosure)\n    let expectation =\
    \ XCTestExpectation(\n        description: \"Publishes sections built from received\
    \ menu and given grouping closure\"\n    )\n    viewModel\n        .$sections\n\
    \        .dropFirst()\n        .sink { value in\n            // Ensure the grouping\
    \ closure is called with the\n            // received menu\n            XCTAssertEqual(receivedMenu,\
    \ menu)\n            // Ensure the published value is the result of the\n    \
    \        // grouping closure\n            XCTAssertEqual(value, expectedSections)\n\
    \            expectation.fulfill()\n        }\n        .store(in: &cancellables)\n\
    \    wait(for: [expectation], timeout: 1)\n}\n```\n\nThe test uses the global\
    \ `menu` constant to assert the ViewModel calls its grouping closure correctly.\
    \ `menu` is a *Mystery Guest*: unless you recently looked at the `MenuFetchingPlaceholder`\
    \ implementation, you won’t know that’s the value it returns.\n\nTests that are\
    \ hard to understand are a liability: when they fail, it will take longer to figure\
    \ out why and, consequently, to fix them. A developer who’s in a rush or doesn’t\
    \ appreciate the value of testing might end up commenting the test \"to fix later,\"\
    \ but we all know later is never.\n\nHow can we make the relationship between\
    \ the indirect input and the resulting behavior clear? Is there a way to configure\
    \ the indirect input in the Arrange phase in the same straightforward way we’ve\
    \ done for the direct inputs of the tests we’ve seen so far? Yes, there is.\n\n\
    Because `MenuList.ViewModel` depends on an abstraction instead of a concrete type,\
    \ nothing stops us from building another `MenuFetching` implementation where we\
    \ can configure the indirect input it delivers and use it in the tests.\n\nIn\
    \ *xUnit Test Patterns*, Gerard Meszaros calls this kind of \"test-specific equivalent\"\
    \ of a dependency of the system under test a *Test Double*.\n\nThere are different\
    \ kinds of Test Doubles we can use depending on the role the dependency plays\
    \ in the behavior being tested. The one we’re about to build is a *Stub*.\n\n\
    A Stub is a Test Double that provides control over the indirect inputs of the\
    \ system under test:\n\n```\n// MenuFetchingStub.swift\n@testable import Albertos\n\
    import Combine\nimport Foundation\n\nclass MenuFetchingStub: MenuFetching {\n\
    \    let result: Result<[MenuItem], Error>\n\n    init(returning result: Result<[MenuItem],\
    \ Error>) {\n        self.result = result\n    }\n\n    func fetchMenu() -> AnyPublisher<[MenuItem],\
    \ Error> {\n        return result.publisher\n            // Use a delay to simulate\
    \ the real world async behavior\n            .delay(for: 0.1, scheduler: RunLoop.main)\n\
    \            .eraseToAnyPublisher()\n    }\n}\n```\n\nHow a Stub works depends\
    \ on the kind of dependency it replaces, but the guiding rule is to always provide\
    \ a way to configure the desired input and use it in the Stub’s implementation.\n\
    \nIn this case, we initialize the Stub with a `Result` for the response and then\
    \ convert it to an `AnyPublisher` to use as the return value of `fetchMenu()`.\n\
    \nAlso, notice the delay to simulate the asynchronous behavior. Sometimes, it’s\
    \ useful to remove asynchronous behavior from the tests by providing them with\
    \ Test Doubles that immediately return the desired value. In this case, however,\
    \ the asynchronous behavior is precisely what we’re trying to implement. Removing\
    \ the delay would separate the test from the real behavior and might result in\
    \ a false positive.\n\nWe can now expel the mysterious `menu` guest by replacing\
    \ `MenuFetchingPlaceholder` with `MenuFetchingStub`:\n\n```\nfunc testWhenFecthingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()\
    \ {\n    var receivedMenu: [MenuItem]?\n    let expectedSections = [MenuSection.fixture()]\n\
    \    let spyClosure: ([MenuItem]) -> [MenuSection] = { items in\n        receivedMenu\
    \ = items\n        return expectedSections\n    }\n    let expectedMenu = [MenuItem.fixture()]\n\
    \    let menuFetchingStub = MenuFetchingStub(returning: .success(expectedMenu))\n\
    \    let viewModel = MenuList.ViewModel(menuFetching: menuFetchingStub, menuGrouping:\
    \ spyClosure)\n    let expectation = XCTestExpectation(\n        description:\
    \ \"Publishes sections built from received menu and given grouping closure\"\n\
    \    )\n    viewModel\n        .$sections\n        .dropFirst()\n        .sink\
    \ { value in\n            // Ensure the grouping closure is called with the\n\
    \            // received menu\n            XCTAssertEqual(receivedMenu, expectedMenu)\n\
    \            // Ensure the published value is the result of the\n            //\
    \ grouping closure\n            XCTAssertEqual(value, expectedSections)\n    \
    \        expectation.fulfill()\n        }\n        .store(in: &cancellables)\n\
    \    wait(for: [expectation], timeout: 1)\n}\n```\n\nThe test still passes. As\
    \ far as `MenuList.ViewModel` is concerned, nothing has changed. The ViewModel\
    \ doesn’t know or care which concrete `MenuFetching` implementation we give to\
    \ it, whether it’s a placeholder, a Test Double, or the real one.\n\nWe now have\
    \ a clear cause-effect relationship between the SUT indirect input and its output.\
    \ Let’s move to the last but equally important test in our list: the one for error\
    \ handling."
  raw: '## Key Takeaways


    *   **SwiftUI and Combine make updating a view as new data comes out easy with**
    **ObservableObject,** **@Published, and** **@ObservedObject**. Use these tools
    to have the frameworks automatically update your view every time new values are
    published.


    *   **Apply the Dependency Inversion Principle to decouple ViewModels from the
    implementation details of data fetching using an abstraction layer**. You can
    define a `protocol` for the ViewModel to request instead of a concrete type.


    *   **An** **abstraction layer** **allows you to provide placeholder implementations
    for components that are not ready yet**. You can focus on building one piece at
    a time without going off a tangent to build its dependencies first.


    *   **You can test async updates of** **@Published** **properties using** **sink**
    **and** **XCTestExpectation**. By subscribing to the `Publisher` associated with
    a `@Published` property, you can test how it changes over time.


    *   **Use** **XCTSkipIf(_:, _:)** **instead of commenting test code you are not
    ready to delete yet**. This API generates an entry in the test report, making
    it harder to forget about the code and pollute the codebase with out-of-date comments.


    # 8. Testing Code Based on Indirect Inputs


    *How do you test behavior that depends on indirect inputs* *in isolation?*


    *By building a test-specific replacement for the dependency, which you can use
    to control the indirect inputs it provides to the system under test.*


    We’re in the middle of building the UI component of the new menu fetching from
    a remote API functionality. We started from the UI to have an *Earliest Testable*
    version of the dynamic update, but that means we don’t have the real networking
    component yet.


    In the previous chapter, we applied the *Dependency Injection Principle* and defined
    an abstraction for the ViewModel to depend upon, `MenuFetching`, which lets us
    use a placeholder implementation for the networking object and stay focused on
    the current task. That allowed us to write tests to drive making `MenuList.ViewModel`
    update the view once it receives the menu data, but those tests are incomplete:
    we haven’t tested error handling, and there’s a Mystery Guest in the successful
    fetching test.


    The challenge in testing how `MenuList.ViewModel` behaves is that it depends on
    the indirect input `MenuFetching` feeds it. So far, we tested components with
    methods expecting an input and returning an output, but `MenuList.ViewModel`’s
    input comes from the return value it gets when calling `MenuFetching fetchMenu()`
    internally.


    In this chapter, we’ll learn how to work around this constraint using a *Stub
    Test Double* to get granular control over the indirect input that `MenuFetching`
    sends `MenuList.ViewModel`.


    ## The Stub Test Double


    In the previous chapter, we wrote the following test for the successful menu fetching
    scenario:


    ```

    // MenuList.ViewModelTests.swift

    func testWhenFecthingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()
    {

    var receivedMenu: [MenuItem]?

    let expectedSections = [MenuSection.fixture()]

    let spyClosure: ([MenuItem]) -> [MenuSection] = { items in

    receivedMenu = items

    return expectedSections

    }

    let viewModel = MenuList.ViewModel(menuFetching: MenuFetchingPlaceholder(), menuGrouping:
    spyClosure)

    let expectation = XCTestExpectation(

    description: "Publishes sections built from received menu and given grouping closure"

    )

    viewModel

    .$sections

    .dropFirst()

    .sink { value in

    // Ensure the grouping closure is called with the

    // received menu

    XCTAssertEqual(receivedMenu, menu)

    // Ensure the published value is the result of the

    // grouping closure

    XCTAssertEqual(value, expectedSections)

    expectation.fulfill()

    }

    .store(in: &cancellables)

    wait(for: [expectation], timeout: 1)

    }

    ```


    The test uses the global `menu` constant to assert the ViewModel calls its grouping
    closure correctly. `menu` is a *Mystery Guest*: unless you recently looked at
    the `MenuFetchingPlaceholder` implementation, you won’t know that’s the value
    it returns.


    Tests that are hard to understand are a liability: when they fail, it will take
    longer to figure out why and, consequently, to fix them. A developer who’s in
    a rush or doesn’t appreciate the value of testing might end up commenting the
    test “to fix later,” but we all know later is never.


    How can we make the relationship between the indirect input and the resulting
    behavior clear? Is there a way to configure the indirect input in the Arrange
    phase in the same straightforward way we’ve done for the direct inputs of the
    tests we’ve seen so far? Yes, there is.


    Because `MenuList.ViewModel` depends on an abstraction instead of a concrete type,
    nothing stops us from building another `MenuFetching` implementation where we
    can configure the indirect input it delivers and use it in the tests.


    In *xUnit Test Patterns*, Gerard Meszaros calls this kind of “test-specific equivalent”
    of a dependency of the system under test a *Test Double*.


    There are different kinds of Test Doubles we can use depending on the role the
    dependency plays in the behavior being tested. The one we’re about to build is
    a *Stub*.


    A Stub is a Test Double that provides control over the indirect inputs of the
    system under test:


    ```

    // MenuFetchingStub.swift

    @testable import Albertos

    import Combine

    import Foundation

    class MenuFetchingStub: MenuFetching {

    let result: Result

    init(returning result: Result) {

    self.result = result

    }

    func fetchMenu() -> AnyPublisher {

    return result.publisher

    // Use a delay to simulate the real world async behavior

    .delay(for: 0.1, scheduler: RunLoop.main)

    .eraseToAnyPublisher()

    }

    }

    ```


    How a Stub works depends on the kind of dependency it replaces, but the guiding
    rule is to always provide a way to configure the desired input and use it in the
    Stub’s implementation.


    In this case, we initialize the Stub with a `Result` for the response and then
    convert it to an `AnyPublisher` to use as the return value of `fetchMenu()`.


    Also, notice the delay to simulate the asynchronous behavior. Sometimes, it’s
    useful to remove asynchronous behavior from the tests by providing them with Test
    Doubles that immediately return the desired value. In this case, however, the
    asynchronous behavior is precisely what we’re trying to implement. Removing the
    delay would separate the test from the real behavior and might result in a false
    positive.


    We can now expel the mysterious `menu` guest by replacing `MenuFetchingPlaceholder`
    with `MenuFetchingStub`:


    ```

    func testWhenFecthingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()
    {

    var receivedMenu: [MenuItem]?

    let expectedSections = [MenuSection.fixture()]

    let spyClosure: ([MenuItem]) -> [MenuSection] = { items in

    receivedMenu = items

    return expectedSections

    }

    let expectedMenu = [MenuItem.fixture()]

    let menuFetchingStub = MenuFetchingStub(returning: .success(expectedMenu))

    let viewModel = MenuList.ViewModel(menuFetching: menuFetchingStub, menuGrouping:
    spyClosure)

    let expectation = XCTestExpectation(

    description: "Publishes sections built from received menu and given grouping closure"

    )

    viewModel

    .$sections

    .dropFirst()

    .sink { value in

    // Ensure the grouping closure is called with the

    // received menu

    XCTAssertEqual(receivedMenu,  expectedMenu)

    // Ensure the published value is the result of the

    // grouping closure

    XCTAssertEqual(value, expectedSections)

    expectation.fulfill()

    }

    .store(in: &cancellables)

    wait(for: [expectation], timeout: 1)

    }

    ```


    The test still passes. As far as `MenuList.ViewModel` is concerned, nothing has
    changed. The ViewModel doesn’t know or care which concrete `MenuFetching` implementation
    we give to it, whether it’s a placeholder, a Test Double, or the real one.


    We now have a clear cause-effect relationship between the SUT indirect input and
    its output. Let’s move to the last but equally important test in our list: the
    one for error handling.'
  trans: "\n# 关键要点\n\n- SwiftUI 和 Combine 通过 `ObservableObject`、`@Published` 和 `@ObservedObject`，让视图在新数据出现时轻松更新。使用这些工具，框架会在每次发布新值时自动更新视图。\n\
    - 应用依赖倒置原则，通过抽象层将 ViewModel 与数据获取的实现细节解耦。你可以为 ViewModel 定义一个 `protocol` 来请求数据，而不是使用具体类型。\n\
    - 抽象层允许你为尚未准备好的组件提供占位实现。你可以专注于一次构建一个部分，而无需先绕道构建其依赖项。\n- 你可以使用 `sink` 和 `XCTestExpectation`\
    \ 测试 `@Published` 属性的异步更新。通过订阅与 `@Published` 属性关联的 `Publisher`，你可以测试其随时间的变化。\n\
    - 使用 `XCTSkipIf(_:, _:)` 代替注释那些你还没准备好删除的测试代码。此 API 会在测试报告中生成一条记录，从而更难忘记代码，并避免因过时注释污染代码库。\n\
    \n# 8. 测试基于间接输入的代码\n\n*如何隔离测试依赖于间接输入的行为？*\n\n*通过为依赖项构建一个测试专用的替代品，你可以用它来控制依赖项提供给被测系统的间接输入。*\n\
    \n我们正在构建从远程 API 获取新菜单功能的 UI 组件。我们从 UI 开始，以拥有动态更新的*最早可测试*版本，但这意味着我们还没有真实的网络组件。\n\
    \n在上一章中，我们应用了*依赖注入原则*，并为 ViewModel 所依赖的 `MenuFetching` 定义了一个抽象，这使我们能够使用网络对象的占位实现，并专注于当前任务。这让我们能够编写测试，驱动\
    \ `MenuList.ViewModel` 在收到菜单数据后更新视图，但这些测试并不完整：我们还没有测试错误处理，并且成功的获取测试中存在一个“神秘嘉宾”。\n\
    \n测试 `MenuList.ViewModel` 行为的挑战在于，它依赖于 `MenuFetching` 提供的间接输入。到目前为止，我们测试的组件都是通过方法接收输入并返回输出，但\
    \ `MenuList.ViewModel` 的输入来自于它在内部调用 `MenuFetching.fetchMenu()` 时获得的返回值。\n\n在本章中，我们将学习如何使用*桩测试替身*来解决这个限制，从而对\
    \ `MenuFetching` 发送给 `MenuList.ViewModel` 的间接输入进行细粒度控制。\n\n## 桩测试替身\n\n在上一章中，我们为成功的菜单获取场景编写了以下测试：\n\
    \n```\n// MenuList.ViewModelTests.swift\nfunc testWhenFecthingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()\
    \ {\n    var receivedMenu: [MenuItem]?\n    let expectedSections = [MenuSection.fixture()]\n\
    \    let spyClosure: ([MenuItem]) -> [MenuSection] = { items in\n        receivedMenu\
    \ = items\n        return expectedSections\n    }\n    let viewModel = MenuList.ViewModel(menuFetching:\
    \ MenuFetchingPlaceholder(), menuGrouping: spyClosure)\n    let expectation =\
    \ XCTestExpectation(\n        description: \"Publishes sections built from received\
    \ menu and given grouping closure\"\n    )\n    viewModel\n        .$sections\n\
    \        .dropFirst()\n        .sink { value in\n            // 确保分组闭包被调用时传入的是接收到的菜单\n\
    \            XCTAssertEqual(receivedMenu, menu)\n            // 确保发布的值是分组闭包的结果\n\
    \            XCTAssertEqual(value, expectedSections)\n            expectation.fulfill()\n\
    \        }\n        .store(in: &cancellables)\n    wait(for: [expectation], timeout:\
    \ 1)\n}\n```\n\n该测试使用全局的 `menu` 常量来断言 ViewModel 正确调用其分组闭包。`menu` 是一个*神秘嘉宾*：除非你最近看过\
    \ `MenuFetchingPlaceholder` 的实现，否则你不会知道这就是它返回的值。\n\n难以理解的测试是一种负担：当它们失败时，弄清楚原因以及修复它们会花费更长的时间。一个匆忙或不懂得测试价值的开发者可能会注释掉测试“稍后修复”，但我们都知道“稍后”永远不会到来。\n\
    \n我们如何让间接输入与结果行为之间的关系变得清晰？有没有一种方法可以在“安排”阶段，像我们之前处理直接输入一样，以同样直接的方式配置间接输入？是的，有办法。\n\
    \n因为 `MenuList.ViewModel` 依赖于抽象而非具体类型，我们可以构建另一个 `MenuFetching` 实现，在其中配置它提供的间接输入，并在测试中使用它，这毫无阻碍。\n\
    \n在 *xUnit 测试模式* 中，Gerard Meszaros 将被测系统依赖的这种“测试专用等价物”称为*测试替身*。\n\n根据依赖项在测试行为中所扮演的角色，我们可以使用不同类型的测试替身。我们即将构建的是*桩*。\n\
    \n桩是一种测试替身，它提供对被测系统间接输入的控制：\n\n```\n// MenuFetchingStub.swift\n@testable import\
    \ Albertos\nimport Combine\nimport Foundation\n\nclass MenuFetchingStub: MenuFetching\
    \ {\n    let result: Result<[MenuItem], Error>\n\n    init(returning result: Result<[MenuItem],\
    \ Error>) {\n        self.result = result\n    }\n\n    func fetchMenu() -> AnyPublisher<[MenuItem],\
    \ Error> {\n        return result.publisher\n            // 使用延迟来模拟现实世界的异步行为\n\
    \            .delay(for: 0.1, scheduler: RunLoop.main)\n            .eraseToAnyPublisher()\n\
    \    }\n}\n```\n\n桩的工作方式取决于它所替代的依赖项类型，但指导原则始终是提供一种配置所需输入的方法，并在桩的实现中使用它。\n\n在这个例子中，我们用响应的\
    \ `Result` 初始化桩，然后将其转换为 `AnyPublisher` 作为 `fetchMenu()` 的返回值。\n\n另外，注意用于模拟异步行为的延迟。有时，通过提供立即返回所需值的测试替身来从测试中移除异步行为是有用的。然而，在这个例子中，异步行为正是我们要实现的。移除延迟会使测试脱离真实行为，并可能导致误报。\n\
    \n现在，我们可以通过用 `MenuFetchingStub` 替换 `MenuFetchingPlaceholder` 来驱逐神秘的 `menu` 访客：\n\
    \n```\nfunc testWhenFecthingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()\
    \ {\n    var receivedMenu: [MenuItem]?\n    let expectedSections = [MenuSection.fixture()]\n\
    \    let spyClosure: ([MenuItem]) -> [MenuSection] = { items in\n        receivedMenu\
    \ = items\n        return expectedSections\n    }\n    let expectedMenu = [MenuItem.fixture()]\n\
    \    let menuFetchingStub = MenuFetchingStub(returning: .success(expectedMenu))\n\
    \    let viewModel = MenuList.ViewModel(menuFetching: menuFetchingStub, menuGrouping:\
    \ spyClosure)\n    let expectation = XCTestExpectation(\n        description:\
    \ \"Publishes sections built from received menu and given grouping closure\"\n\
    \    )\n    viewModel\n        .$sections\n        .dropFirst()\n        .sink\
    \ { value in\n            // 确保分组闭包被调用时传入的是接收到的菜单\n            XCTAssertEqual(receivedMenu,\
    \ expectedMenu)\n            // 确保发布的值是分组闭包的结果\n            XCTAssertEqual(value,\
    \ expectedSections)\n            expectation.fulfill()\n        }\n        .store(in:\
    \ &cancellables)\n    wait(for: [expectation], timeout: 1)\n}\n```\n\n测试仍然通过。对于\
    \ `MenuList.ViewModel` 来说，没有任何变化。ViewModel 不知道也不关心我们给它的是哪个具体的 `MenuFetching` 实现——无论是占位实现、测试替身还是真实的实现。\n\
    \n我们现在对被测系统的间接输入与其输出之间有了清晰的因果关系。接下来让我们转向列表中最后一个同样重要的测试：错误处理的测试。\n"
- fmt: '### Make Error Handling Explicit with `Result`


    Right now, the `sections` property type is `[MenuSection]`, but `MenuFetching`
    can also emit an error, and the view needs to be able to show it.


    To handle both scenarios, we can use the `Result` type. `Sections` can become
    a `Result<[MenuSection], Error>`, and we can update `MenuList` to render differently
    depending on whether it’s a `success` or `failure`.


    The beauty of using an `enum` like `Result` is that it makes the mutually exclusive
    relationship between the success and failure cases explicit at the type system
    level. The view can either be in the success or failure state, and the `Result`
    instance can either be a `.success` or `.failure` case.


    Let’s make this change using compiler errors as a fast-feedback mechanism:


    ```

    // MenuList.ViewModel.swift

    // ...

    class ViewModel: ObservedObject {

    @Published private var sections: Result = .success([])

    init(

    menuFetching: MenuFetching,

    menuGrouping: @escaping ([MenuItem]) -> [MenuSection] = groupMenuByCategory

    ) {

    menuFetching

    .fetchMenu()

    .sink(

    receiveCompletion: { _ in },

    receiveValue: { [weak self] value in

    self?.sections = .success(menuGrouping(value))

    }

    )

    .store(in: &cancellables)

    ```


    After we update `MenuList.ViewModel`, its view fails to build because of the type
    change:


    ```

    // MenuList.swift

    // ...

    var body: some View {

    List {

    ForEach(viewModel.sections) { section in

    // Compiler says: Cannot convert value of type

    // ''Result''

    // to expected argument type ''Range''

    //

    // Plus more errors in the following access to

    // sections...

    ```


    We need to update `MenuList` to handle both `success` and `failure` cases of the
    `Result` type:


    ```

    // MenuList.swift

    // ...

    var body: some View {

    switch viewModel.sections {

    case .success(let sections):

    List {

    ForEach(sections) { section in

    Section(header: Text(section.category)) {

    ForEach(section.items) { item in

    MenuRow(viewModel: .init(item: item))

    }

    }

    }

    }

    case .failure(let error):

    Text("An error occurred:")

    Text(error.localizedDescription).italic()

    }

    }

    ```


    With `MenuList` updated, the source code builds successfully, but the tests don’t.
    As we already discussed in the previous chapter, we see this failure only now
    because Xcode doesn’t build the test targets unless their production target builds
    first.


    The compiler highlights the code we need to update in the tests, with failures
    like:


    ```

    // MenuList.ViewModelTests.swift

    // ...

    XCTAssertTrue(viewModel.sections.isEmpty)

    // Compiler says: Cannot convert value of type

    // ''Result''

    // to expected argument type ''Range''

    ```


    Let’s update the test for the default value behavior first:


    ```

    // MenuList.ViewModelTests.swift

    // ...

    func testWhenFetchingStartsPublishesEmptyMenu() throws {

    let viewModel = MenuList.ViewModel(menuFetching: MenuFetchingStub(returning: .success([.fixture()])))

    let sections = try viewModel.sections.get()

    XCTAssertTrue(sections.isEmpty)

    }

    ```


    `.get()` is a handy `Result` method that will return the associated value of a
    successful instance and throw otherwise.


    Another option to ensure that our `Result` value is a `success` is to use a `guard
    case` statement. Here it is in action in the test for the successful scenario:


    ```

    // MenuList.ViewModelTests.swift

    // ...

    func testWhenFecthingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()
    {

    // ...

    viewModel

    .$sections

    .dropFirst()

    .sink { value in

    guard case .success(let sections) = value else {

    return XCTFail("Expected a successful Result, got: \(value)")

    }

    // Ensure the grouping closure is called with the

    // received menu

    XCTAssertEqual(receivedMenu, expectedMenu)

    // Ensure the published value is the result of the

    // grouping closure

    XCTAssertEqual(sections, expectedSections)

    expectation.fulfill()

    }

    .store(in: &cancellables)

    // ...

    }

    ```


    The code now compiles, and the tests are still green. We can proceed with the
    test for the failure behavior at last. We’ve done all of the learning on how to
    write tests for `@Published` values and `Result` type already; now it’s only a
    matter of using a different state setup and expectation.


    To provide our SUT with a failure from `MenuFetching`, we need to initialize `MenuFetchingStub`
    with a `failure` value. What should we use as the error?


    The `sections` type uses the generic `Error` in its definition, but we need a
    concrete one in the test. We can define a dedicated error type for the tests:


    ```

    // TestError.swift

    struct TestError: Equatable, Error {

    let id: Int

    }

    ```


    By conforming `TestError` to `Equatable`, we can use it with `XCTAssertEqual`
    and make testing straightforward.


    Let’s configure the Stub to return a known test error and ensure our code passes
    it through to `sections`:


    ```

    func testWhenFetchingFailsPublishesAnError() {

    let expectedError = TestError(id: 123)

    let menuFetchingStub = MenuFetchingStub(returning: .failure(expectedError))

    let viewModel = MenuList.ViewModel(menuFetching: menuFetchingStub, menuGrouping:
    { _ in [] })

    let expectation = XCTestExpectation(description: "Publishes an error")

    viewModel

    .$sections

    .dropFirst()

    .sink { value in

    guard case .failure(let error) = value else {

    return XCTFail("Expected a failing Result, got: \(value)")

    }

    XCTAssertEqual(error as? TestError, expectedError)

    expectation.fulfill()

    }

    .store(in: &cancellables)

    wait(for: [expectation], timeout: 1)

    }

    ```


    The test fails with a timeout. To make it pass, we need to handle the possible
    `.failure` published by `MenuFetching` in the ViewModel:


    ```

    // MenuList.ViewModel.swift

    // ...

    menuFetching

    .fetchMenu()

    .sink(

    receiveCompletion: { [weak self] completion in

    guard case .failure(let error) = completion else { return }

    self?.sections = .failure(error)

    },

    receiveValue: { [weak self] value in

    self?.sections = .success(menuGrouping(value))

    }

    )

    .store(in: &cancellables)

    ```


    Now that we are in the green state and the functionality is complete, it’s time
    to ask the question of whether we can improve the code we’ve written so far.


    A nice touch would be to extract the transformation from `[MenuItem]` to `[MenuSection]`
    into a dedicated step:


    ```

    menuFetching

    .fetchMenu()

    .map(menuGrouping)

    .sink(

    receiveCompletion: { [weak self] completion in

    guard case .failure(let error) = completion else { return }

    self?.sections = .failure(error)

    },

    receiveValue: { [weak self] value in

    self?.sections = .success(value)

    }

    )

    .store(in: &cancellables)

    ```


    This separation between input manipulation and value assignment to the `@Published`
    property makes the data flow clearer.


    The *Dependency Inversion Principle* states that higher-level components should
    not depend on lower-level ones but on abstractions. Between this and the previous
    chapter, we’ve seen the practical benefits of applying this principle.


    We’ve built a fully functioning dynamically updating UI to show the menu list
    fetched from a remote API even though we don’t have the networking component yet.
    We’re confident our implementation works now and will work when we plug the real
    API fetching into it because the tests that guided writing it used a *Stub* to
    simulate the possible inputs a `MenuFetching`-conforming type can produce.


    Now that the code closer to the view layer is in place, the next step is to move
    one layer beneath and translate JSON data into `MenuItem`s.


    ## Practice Time


    You decide to make the menu UX more resilient by adding a retry functionality.
    The failure view should have a button that makes the ViewModel start a new menu
    fetch.


    How can you test this new behavior?


    **Hint**


    A possible way to do it is to make the Stub publish different values, such as
    a failure first and then a success, and write a test that exercises the retry
    method and verifies the sequence of published values.'
