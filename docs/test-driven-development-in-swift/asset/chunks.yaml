- fmt: '# Unwrapping Optionals


    Swift has a type called `Optional` to wrap those values that may or may not be
    `nil`.


    Imagine you’re writing a test for the `getUserWithId(_:)` method of a `UserRepository`
    object, which returns the `User` instance matching the given id if found or `nil`
    otherwise. The method return type is therefore `Optional<User>`, or the equivalent
    condensed version `User?`:


    ```

    let user: User? = userRepository.getUserWithId(1)

    XCTAssertEqual(user?.firstName, "John")

    XCTAssertEqual(user?.lastName, "Appleseed")

    ```


    Because the `user` is `Optional`, the preceding code accesses its properties using
    `?`, the postfix optional chaining operator. If `userRepository` can’t find a
    user for the id `1`, the test will have two failures, one for each assertion.


    XCTest has a special API to attempt unwrapping optional values and fail if they
    are `nil`, which we can use to improve that test:


    ```

    let user: User = try XCTUnwrap(userRepository.getUserWithId(1))

    XCTAssertEqual(user.firstName, "John")

    XCTAssertEqual(user.lastName, "Appleseed")

    ```


    Using `XCTUnwrap`, if `getUserWithId` returns `nil`, the test will fail at that
    point. This makes it clearer what the issues were, and so does having one failure
    instead of two. As a bonus, the syntax is cleaner without the `?` postfix.


    `XCTUnwrap` is also better than force-unwrapping optional values with `!`. If
    a test runs into a force-unwrapped `Optional`, which is `nil`, it will crash.
    When a test in the suite crashes, the whole suite stops so you only get information
    about the tests that run up to that point. On top of that, the error message for
    a crashed test is not as clear as a failed one, specially when run outside of
    Xcode. Preventing your test suite from crashing due to `Optional` values unexpectedly
    found `nil` will make it easier to triage test failures.


    ## Expectations for Asynchronous Code


    Testing asynchronous logic requires a few extra steps. Consider a function summing
    two `Int`s asynchronously and the result through a callback: `asyncSum(_ a: Int,
    _ b: Int, @escaping (Int) -> Void)`. If we wrote a test for `asyncSum` the same
    way we’ve been writing tests so far, it would fail:


    ```

    var sum = 0

    asyncSum(1, 2) { result in

    sum = result

    }

    XCTAssertEqual(sum, 3)

    XCTAssertEqual failed: ("0") is not equal to ("3")

    ```


    The reason for the failure is that, `asyncSum` being asynchronous, the callback
    assigning the summation result to `sum` runs *after* the assertion.


    If you use a synchronous assertion to check the behavior of asynchronous code,
    the code might run before the assertion had a chance to execute, resulting, in
    the best case, in a false positive and, in the worst case, in a whole lot of time
    spent debugging tests with inconsistent behavior.


    This is how to test asynchronous code in XCTest:


    ```

    var sum = 0

    let expectation = XCTestExpectation(description: "Async sum completed.")

    asyncSum(1, 2) { result in

    sum = result

    expectation.fulfill()

    }

    // This code waits for the `expectation` to be fulfilled (i.e.

    // for its `fulfill()` method to have been called) for

    // `timeout` seconds.

    wait(for: [expectation], timeout: 0.2)

    XCTAssertEqual(sum, 3)

    ```


    Before running the asynchronous code, you instantiate an `XCTExpectation`, which
    will be fulfilled asynchronously. You can then tell your test to wait until the
    expectation has been fulfilled or a timeout has expired before continuing and
    only then run your assertions.


    An even better way to write the preceding test is to perform the assertion right
    in the callback. This saves us the trouble of defining a variable to hold the
    value outside of the callback, making the test tidier:


    ```

    let expectation = XCTestExpectation(description: "Async sum completed.")

    asyncSum(1, 2) { result in

    XCTAssertEqual(result, 3)

    expectation.fulfill()

    }

    wait(for: [expectation], timeout: 0.1)

    ```


    Because we have the `wait` in the test, we are guaranteed the assertion will run,
    or the test will time out and fail.


    A common case where you’ll need to test asynchronous code is when working with
    the network, which we’ll see in Chapter [10](#501287_1_En_10_Chapter.xhtml).


    At WWDC 2021, Apple introduced a new alternative way to write asynchronous code
    using the async/await pattern available in Swift 5.5 for applications targeting
    iOS 15 or macOS 12. At the time of this writing, the implementation is still in
    beta and there is only a limited subset of applications that can will be able
    to adopt it once released because of the OS version requirements. Because of that,
    this book doesn’t cover async/await.'
