    \ Swift 中编写测试的框架。\n*   `XCTest` 中的测试是通过 `XCTestCase` 的子类创建的，方法名以 \"test\" 开头。\n\
    *   `XCTest` 提供了多种用于测试代码的断言函数，例如 `XCTAssertEqual`、`XCTAssertTrue` 和 `XCTAssertFalse`。\n\
    *   使用 `XCTUnwrap` 来解包 `Optionals`；如果值为 `nil`，则测试将会失败。\n*   要测试异步代码，定义一个或多个 `XCTExpectation`，测试将等待它们，并在异步逻辑中调用它们的\
    \ `fulfill()` 方法。\n*   使用 `XCTAssertThrows` 测试会抛出错误的代码。\n*   使用 `setUpWithError`\
    \ 和 `tearDownWithError` 在每个测试之前或之后运行逻辑。请谨慎使用这些方法；尽量编写不需要额外设置或清理的测试。\n*   使用类方法\
    \ `setUp` 和 `tearDown` 在所有测试运行之前或之后运行逻辑。同样要谨慎使用这些方法。\n\n# 3. 测试驱动开发入门\n\n在前面的章节中，我们讨论了使用测试来驱动代码设计的优势，以及如何使用\
    \ Apple 的 `XCTest` 框架编写测试。现在是时候看看测试驱动开发的具体例子了。\n\n我们将学习如何通过编写测试然后使其通过的迭代过程来实现一段逻辑。我们将看到\
    \ TDD 如何让我们首先专注于让代码正确，然后再使其整洁。最后，我们将发现在 Swift 这样的语言中，编译器如何补充驱动软件实现的反馈循环，以及如何利用这一点。\n\
    \n测试驱动开发利用测试的反馈来指导生产代码的实现。\n\n如何开始这个过程？如何从测试开始，使用 `XCTest` 编写 Swift 代码？第一步是理解你需要实现的行为。\n\
    \n让我们来看看来自 [exercism.io](https://exercism.io/) 的这个问题，这是一个磨练你软件技能的好地方：\n\n*   编写一个函数，给定一个代表年份的整数，判断该年份是否为闰年。\n\
    *   在公历中，闰年发生在所有能被 4 整除的年份，除了所有能被 100 整除的年份，除非该年份同时也能被 400 整除。\n*   例如，2021 年不是闰年，但\
    \ 2020 年是。1900 年不是闰年，但 2000 年是。\n\n以下是该函数的一个虚拟版本，它可以编译但不包含任何必要的逻辑：\n\n```\nfunc\
    \ isLeap(_ year: Int) -> Bool {\n    return false\n}\n```\n\n我们可以编写什么样的测试来验证我们的代码实现了问题描述中的行为呢？\n\
    \n## 测试列表\n\n描述本身已经突出了行为细节，甚至提供了输入和输出的示例来验证：\n\n*   能被 4 整除的年份是闰年，例如 2020 年。\n\
    *   能被 100 整除的年份不是闰年，例如 2100 年。\n*   能被 400 整除的年份是闰年，例如 2000 年。\n*   任何其他年份都不是闰年，例如\
    \ 2021 年。\n\n我们可以为每一项编写一个测试：\n\n```\nimport XCTest\nclass LeapYearTests: XCTestCase\
    \ {\n    func testEvenlyDivisibleBy4IsLeap() {}\n    func testEvenlyDivisibleBy100IsNotLeap()\
    \ {}\n    func testEvenlyDivisibleBy400IsLeap() {}\n    func testNotEvenlyDivisibleBy4Or400IsNotLeap()\
    \ {}\n}\n```\n\n注意，我只写了测试函数的名字，内部没有代码。这就是一个*测试列表*。\n\n编写测试列表是开始理解你正在处理的代码需要完成哪些不同细节的一种方式。\n\
    \n定义测试列表后的下一步是编写一个（且仅一个）测试。在 TDD 中，我们采用小步、增量式的方式进行，一次解决一个问题。这也适用于选择编写哪些测试以及如何编写它们。你希望尽快获得反馈。编写一个测试比编写所有测试要快。\n"
- fmt: '## Fake It…Till You Make It


    Which test should you begin with? A test you think you can make pass easily is
    a good choice. Starting with the most straightforward test is yet another technique
    to make the time to feedback as short as possible.


    In this case, all the tests seem equally simple to me, so I’ll start from the
    top:


    ```

    func testEvenlyDivisibleBy4IsLeap() {

    XCTAssertTrue(isLeap(2020))

    }

    XCTAssertTrue failed

    ```


    What’s the easiest thing we can do to make this test pass? Just return the value
    that will make the test pass and work on the actual implementation later:


    ```

    func isLeap(_ year: Int) -> Bool {

    return true

    }

    ```


    This technique of returning a hardcoded value that will make the test pass is
    called “Fake It”. Fake It makes it easy to get started writing code when you are
    unsure about the implementation details. Use a fake implementation so you can
    get some tests running first and learn from them.


    For `leapYear`, where the implementation is straightforward, Fake It might be
    overkill. If an obvious implementation to make a test pass comes to mind, feel
    free to write it without faking it first. You’d be surprised, though, how many
    times Fake It can be just what you need to get unblocked and start solving the
    problem.


    Thanks to the fake implementation, our test is now green. What’s the next step?


    Now that we established a baseline with the green test, we could work on the actual
    implementation, confident that the code is correct if the test stays green. On
    the other hand, we still have more tests to write, so in this case, I’d move on
    to the next test instead.


    A good next test to write is the one for an input that is not divisible by 4,
    the opposite of the test we just wrote:


    ```

    func testNotEvenlyDivisibleBy4Or400IsNotLeap() {

    XCTAssertFalse(isLeap(2021))

    }

    XCTAssertFalse failed

    ```


    We’re already at the point where we can’t fake the implementation anymore. Using
    another hardcoded value wouldn’t make both tests pass:


    ```

    func isLeap(_ year: Int) -> Bool {

    return year % 4 == 0

    }

    ```


    Let’s move to the next test:


    ```

    func testEvenlyDivisibleBy100IsNotLeap() {

    XCTAssertFalse(isLeap(2100))

    }

    XCTAssertFalse failed

    ```


    The simplest thing I can think of to make it pass is to add a guard statement:


    ```

    func isLeap(_ year: Int) -> Bool {

    guard year % 100 != 0 else { return false }

    return year % 4 == 0

    }

    ```


    We only have one more test to write:


    ```

    func testEvenlyDivisibleBy400IsLeap() {

    XCTAssertTrue(isLeap(2000))

    }

    XCTAssertTrue failed

    ```


    Like in the preceding, the simplest thing I can think of is a guard:


    ```

    func isLeap(_ year: Int) -> Bool {

    guard year % 400 != 0 else { return true }

    guard year % 100 != 0 else { return false }

    return year % 4 == 0

    }

    ```


    All our tests are passing. We have a complete function to evaluate whether a given
    year is leap.


    We got here by writing one test, watching it fail, using the failure message to
    write just enough code to make the test pass, and then repeating the process for
    the next test. Red, green, red, green, red, green.


    We didn’t set ourselves the lofty goal of writing a working implementation in
    one go. Instead, we used the feedback from the tests to build it one little bit
    at a time, writing the simplest code we possibly could.


    Often, the simplest code you’ll write to make the tests pass is quite ugly. That’s
    okay. Remember: small incremental steps. First, make the code work, and then make
    it clean.


    Having the tests and knowing they cover code’s behavior because you’ve seen them
    all go from red to green gives you the confidence to refactor. To refactor means
    to change how the code looks without affecting its behavior. Refactoring is a
    core part of TDD.


    Before looking at how refactoring fits into the workflow, let me say a word on
    the test’s structure.


    ## Arrange, Act, Assert


    The tests we used to drive the leap year implementation were all one-liners. The
    subject under test, its input and output, and the assertion on the expected behavior
    all fit nicely in a single line:


    ```

    func testEvenlyDivisibleBy4IsLeap() {

    XCTAssertTrue(isLeap(2020))

    }

    ```


    When the behavior under test is not as trivial as a method taking one input and
    returning a `Bool`, it’s useful to structure the test by explicitly separating
    it into three stages:


    * **Arrange**: Prepare the inputs.

    * **Act**: Exercise the behavior under test.

    * **Assert**: Verify the output matches the expectation.


    Let’s rewrite the preceding test following “Arrange, Act, Assert”:


    ```

    func testEvenlyDivisibleBy4IsLeap() {

    let year = 2020         // Arrange

    let leap = isLeap(year) // Act

    XCTAssertTrue(leap)     // Assert

    }

    ```


    Organizing your tests clearly and consistently will help you navigate them because
    they will all present the same structure. Finding the inputs, the method under
    test, or the assertions will be easier because they’ll always be in the same location
    relative to the test. The proverb “a place for everything and everything in its
    place” applies to your codebase as well as your house.


    Another formulation of the three stages is “Given, When, Then.” Given a year evenly
    divisible by 4, when calling `isLeap(_:)`, then the result is `true`.


    “Given, When, Then” is more suited for higher-level tests, such as UI tests looking
    at full user journeys: given an authenticated user, when loading the setting screen,
    then the authentication prompt is presented. Because this book focuses on unit
    tests, we’ll use “Arrange, Act, Assert”.


    Now that we’ve learned how to structure our tests, let’s see how refactoring fits
    into the Test-Driven Development process.'
