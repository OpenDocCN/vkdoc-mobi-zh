  trans: '

    ### 使用 `Result` 显式处理错误


    目前，`sections` 属性的类型是 `[MenuSection]`，但 `MenuFetching` 也可能抛出错误，而视图需要能显示这个错误。


    为了处理这两种情况，我们可以使用 `Result` 类型。`Sections` 可以变成 `Result<[MenuSection], Error>`，我们可以更新
    `MenuList`，让它根据结果是 `success` 还是 `failure` 来渲染不同的内容。


    像 `Result` 这样的枚举的妙处在于，它能在类型系统层面明确地表达成功和失败情况之间的互斥关系。视图要么处于成功状态，要么处于失败状态，而 `Result`
    实例要么是 `.success` 情况，要么是 `.failure` 情况。


    让我们利用编译器错误作为快速反馈机制来进行这项修改：


    ```

    // MenuList.ViewModel.swift

    // ...

    class ViewModel: ObservableObject {

    @Published private var sections: Result = .success([])

    init(

    menuFetching: MenuFetching,

    menuGrouping: @escaping ([MenuItem]) -> [MenuSection] = groupMenuByCategory

    ) {

    menuFetching

    .fetchMenu()

    .sink(

    receiveCompletion: { _ in },

    receiveValue: { [weak self] value in

    self?.sections = .success(menuGrouping(value))

    }

    )

    .store(in: &cancellables)

    ```


    在我们更新 `MenuList.ViewModel` 后，由于类型变化，它的视图无法构建：


    ```

    // MenuList.swift

    // ...

    var body: some View {

    List {

    ForEach(viewModel.sections) { section in

    // 编译器提示：无法将类型 ''Result'' 的值

    // 转换为预期的参数类型 ''Range''

    //

    // 后续访问 sections 时还会出现更多错误...

    ```


    我们需要更新 `MenuList` 来处理 `Result` 类型的 `success` 和 `failure` 两种情况：


    ```

    // MenuList.swift

    // ...

    var body: some View {

    switch viewModel.sections {

    case .success(let sections):

    List {

    ForEach(sections) { section in

    Section(header: Text(section.category)) {

    ForEach(section.items) { item in

    MenuRow(viewModel: .init(item: item))

    }

    }

    }

    }

    case .failure(let error):

    Text("发生了一个错误：")

    Text(error.localizedDescription).italic()

    }

    }

    ```


    更新 `MenuList` 后，源代码构建成功，但测试无法通过。正如我们在前一章中讨论过的，我们现在才看到这个失败，是因为 Xcode 在构建生产目标之前不会构建测试目标。


    编译器高亮显示了测试中需要更新的代码，伴随的失败提示如下：


    ```

    // MenuList.ViewModelTests.swift

    // ...

    XCTAssertTrue(viewModel.sections.isEmpty)

    // 编译器提示：无法将类型 ''Result'' 的值

    // 转换为预期的参数类型 ''Range''

    ```


    我们先来更新默认值行为的测试：


    ```

    // MenuList.ViewModelTests.swift

    // ...

    func testWhenFetchingStartsPublishesEmptyMenu() throws {

    let viewModel = MenuList.ViewModel(menuFetching: MenuFetchingStub(returning: .success([.fixture()])))

    let sections = try viewModel.sections.get()

    XCTAssertTrue(sections.isEmpty)

    }

    ```


    `.get()` 是一个方便的 `Result` 方法，它会返回成功实例的关联值，否则会抛出异常。


    确保 `Result` 值为 `success` 的另一种方法是使用 `guard case` 语句。下面是在成功场景测试中的应用示例：


    ```

    // MenuList.ViewModelTests.swift

    // ...

    func testWhenFetchingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()
    {

    // ...

    viewModel

    .$sections

    .dropFirst()

    .sink { value in

    guard case .success(let sections) = value else {

    return XCTFail("期望一个成功的 Result，得到：\(value)")

    }

    // 确保分组闭包是用接收到的菜单调用的

    XCTAssertEqual(receivedMenu, expectedMenu)

    // 确保发布的值是分组闭包的结果

    XCTAssertEqual(sections, expectedSections)

    expectation.fulfill()

    }

    .store(in: &cancellables)

    // ...

    }

    ```


    现在代码可以编译，测试也仍然是绿色的。我们终于可以继续处理失败行为的测试了。我们已经学习了如何为 `@Published` 属性和 `Result` 类型编写测试；现在只需要使用不同的状态设置和预期即可。


    为了给我们的 SUT 提供来自 `MenuFetching` 的失败结果，我们需要用一个 `failure` 值来初始化 `MenuFetchingStub`。我们应该用什么作为错误呢？


    `sections` 类型在其定义中使用了泛型 `Error`，但测试中需要一个具体的错误类型。我们可以为测试定义一个专用的错误类型：


    ```

    // TestError.swift

    struct TestError: Equatable, Error {

    let id: Int

    }

    ```


    通过让 `TestError` 遵循 `Equatable` 协议，我们可以将其与 `XCTAssertEqual` 一起使用，使测试变得直接明了。


    让我们配置 Stub 让它返回一个已知的测试错误，并确保我们的代码将其传递到 `sections`：


    ```

    func testWhenFetchingFailsPublishesAnError() {

    let expectedError = TestError(id: 123)

    let menuFetchingStub = MenuFetchingStub(returning: .failure(expectedError))

    let viewModel = MenuList.ViewModel(menuFetching: menuFetchingStub, menuGrouping:
    { _ in [] })

    let expectation = XCTestExpectation(description: "发布一个错误")

    viewModel

    .$sections

    .dropFirst()

    .sink { value in

    guard case .failure(let error) = value else {

    return XCTFail("期望一个失败的 Result，得到：\(value)")

    }

    XCTAssertEqual(error as? TestError, expectedError)

    expectation.fulfill()

    }

    .store(in: &cancellables)

    wait(for: [expectation], timeout: 1)

    }

    ```


    测试因超时而失败。为了让它通过，我们需要在 ViewModel 中处理 `MenuFetching` 可能发布的 `.failure` 情况：


    ```

    // MenuList.ViewModel.swift

    // ...

    menuFetching

    .fetchMenu()

    .sink(

    receiveCompletion: { [weak self] completion in

    guard case .failure(let error) = completion else { return }

    self?.sections = .failure(error)

    },

    receiveValue: { [weak self] value in

    self?.sections = .success(menuGrouping(value))

    }

    )

    .store(in: &cancellables)

    ```


    现在我们已经处于绿态，功能也完成了，是时候问一下我们是否可以改进到目前为止编写的代码了。


    一个不错的改进是将从 `[MenuItem]` 到 `[MenuSection]` 的转换提取为一个专门的步骤：


    ```

    menuFetching

    .fetchMenu()

    .map(menuGrouping)

    .sink(

    receiveCompletion: { [weak self] completion in

    guard case .failure(let error) = completion else { return }

    self?.sections = .failure(error)

    },

    receiveValue: { [weak self] value in

    self?.sections = .success(value)

    }

    )

    .store(in: &cancellables)

    ```


    这种对输入的处理与对 `@Published` 属性的赋值之间的分离，使数据流更加清晰。


    *依赖倒置原则*指出，高层模块不应依赖低层模块，而应依赖抽象。结合本章和前一章，我们看到了应用这一原则所带来的实际好处。


    我们已经构建了一个功能完整的动态更新 UI，用于显示从远程 API 获取的菜单列表，尽管我们还没有网络组件。我们确信我们的实现现在可以正常工作，并且在接入真实
    API 获取时也能工作，因为指导编写它的测试使用了一个 *Stub* 来模拟 `MenuFetching` 遵循类型可能产生的各种输入。


    现在，靠近视图层的代码已经就位，下一步是向下移动一层，将 JSON 数据转换为 `MenuItem`。


    ## 练习时间


    你决定通过添加重试功能来增强菜单 UX 的弹性。失败视图应该有一个按钮，能让 ViewModel 重新开始获取菜单。


    你如何测试这个新行为？


    **提示**


    一种可行的方法就是让 Stub 发布不同的值，例如先发布一个错误，再发布一个成功，然后编写一个测试来执行重试方法并验证发布值的序列。

    '
- fmt: '## Key Takeaways


    *   **Applying the Dependency Inversion Principle allows you to write tests using
    Test Doubles**. Test Doubles are “test-specific equivalents” of the SUT’s dependency
    that you can use to keep tests isolated and simulate different behaviors.

    *   **Replace a dependency with a Stub to control the indirect inputs it provides
    to the SUT**. With a Stub, you can test many different indirect input scenarios,
    always making the causal relationship between input and output explicit.

    *   **Use** `enum` **s to describe the mutually exclusive states a SwiftUI view
    can be in**. For example, use `Result` to represent content generated by an operation
    that either succeeded or failed.


    # 9. Testing JSON Decoding


    *How do you use tests to drive writing logic to decode JSON data into a model
    object?*


    *By feeding the tests a predefined JSON input and verify the decoding produces
    a value matching it.*


    Swift’s `Decodable` protocol offers a type-safe way to describe how to transform
    `Data`, such as a JSON in the body of an HTTP response, into an object or value
    type. With `Decodable` doing most of the heavy lifting, is it worth using tests
    to drive the implementation of JSON decoding logic?


    When the JSON object has keys and values with names and types that map directly
    to Swift, there is no real logic you need to write to decode it. In such a case,
    you may feel comfortable writing the source code directly, without the help of
    a unit test. If the JSON object is elaborate or if you want to decode it into
    a Swift type with a different structure, then a test will help you along the way.


    Choosing whether to deploy TDD to implement JSON decoding logic is a matter of
    tradeoffs. Is the extra time you’re spending writing the test worth the feedback
    it gives you? Once the test is in place, will it guard against regression that
    may otherwise go unnoticed?


    To answer those questions, you first need to know how to write this kind of tests.
    In this chapter, we’ll explore two different techniques to write tests for JSON
    decoding and reflect further on the return on investment of applying TDD to this
    part of the app’s implementation.


    We’re moving along steadily in making our app fetch the menu from a remote API.
    In the previous chapters, we built the view part of this new functionality. It’s
    now time to take one step further down the stack, coding the conversion from the
    raw `Data` a network request would return into the `MenuItem` domain model.


    Swift provides a convenient way to decode `Data` into a different type via the
    `Decodable` protocol. Our job is to conform `MenuItem` to it and verify the decoding
    is successful.


    As part of your application development agreement with Alberto, you’re also building
    his backend service. You chose to use a REST API that returns a JSON menu in the
    following form:


    ```

    [

    {

    "name": "spaghetti carbonara",

    "category": "pasta",

    "spicy": false

    },

    {

    "name": "penne all''arrabbiata",

    "category": "pasta",

    "spicy": true

    }

    ]

    ```


    How do we go from that JSON to a `MenuItem` using TDD? As always, we start with
    a test. In this instance, we’ll write a test for the decoding behavior.


    The question to ask when writing a test is how to verify if the desired behavior
    occurred. Our desired behavior is a successful JSON decoding. To verify it, we
    need to devise a test asserting that, given a particular JSON input, the decoded
    Swift object has matching properties:


    ```

    // MenuItemTests.swift

    @testable import Albertos

    import XCTest

    class MenuItemTests: XCTestCase {

    func testWhenDecodedFromJSONDataHasAllTheInputProperties() {

    // arrange the JSON Data input

    // act by decoding a MenuItem instance from the Data

    // assert the MenuItem matches the input

    }

    }

    ```


    If the input is:


    ```

    {

    "name": "a name",

    "category": "a category",

    "spicy": true

    }

    ```


    then our expectations shall be:


    ```

    // MenuItemTests.swift

    // ...

    func testWhenDecodedFromJSONDataHasAllTheInputProperties() {

    // arrange the JSON Data input

    // act by decoding a MenuItem instance from the Data

    XCTAssertEqual(item.name, "a name")

    XCTAssertEqual(item.category, "a category")

    XCTAssertEqual(item.spicy, true)

    }

    ```


    Swift’s `JSONDecoder` is the type to use to get the `item` instance from the input
    JSON `Data`:


    ```

    // MenuItemTests.swift

    // ...

    func testWhenDecodedFromJSONDataHasAllTheInputProperties() throws {

    // arrange the JSON Data input

    let item = try JSONDecoder()    .decode(MenuItem.self, from: data)

    XCTAssertEqual(item.name, "a name")

    XCTAssertEqual(item.category, "a category")

    XCTAssertEqual(item.spicy, true)

    }

    ```


    How can we arrange the JSON input for the test? Let’s see two different approaches.


    ## Option 1: Inline Strings


    One option to generate the JSON input is to define it as a `String` inline in
    the test and then convert it into `Data`:


    ```

    // MenuItemTests.swift

    // ...

    func testWhenDecodedFromJSONDataHasAllTheInputProperties() throws {

    let json = #"{ "name": "a name", "category": "a category", "spicy": true }"#

    let data = try XCTUnwrap(json.data(using: .utf8))

    // Compiler says: Instance method ''decode(_:from:)''         // requires

    // that ''MenuItem'' conform to ''Decodable''

    let item = try JSONDecoder().decode(MenuItem.self, from: data)

    XCTAssertEqual(item.name, "a name")

    XCTAssertEqual(item.category, "a category")

    XCTAssertEqual(item.spicy, true)

    }

    ```


    The compiler points out that our `MenuItem` does not conform to `Decodable`. Let’s
    satisfy this condition:


    ```

    // MenuItem.swift

    struct MenuItem {

    // ...

    }

    // ...

    extension MenuItem: Decodable {}

    ```


    The test builds now. It also passes already because the names of the properties
    in `MenuItem` match the names of the keys in the JSON input, so the compiler takes
    care of all the decoding for us.


    The fact that the test passed when the only change we made was to conform to a
    `protocol` without any extra code raises a question: are we testing our code’s
    behavior or that of `Decodable`?


    As mentioned in this chapter’s introduction, there are instances in which using
    a test to drive the JSON decoding implementation may be an unnecessary overhead.
    We’re learning how to write this kind of tests to discern when they are useful
    and when they aren’t. Let’s look at another option for the Arrange phase and then
    discuss when using TDD for JSON decoding is appropriate.'
