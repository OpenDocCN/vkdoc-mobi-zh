    ## 如何将单元测试与网络解耦


    `MenuFetcher`依赖于`URLSession`来访问网络。正如我们在第 7 章中所见，高层组件不应依赖于低层组件；它们都应该依赖于抽象。这就是*依赖反转原则*。


    网络只是我们系统的另一个依赖。我们可以在`MenuFetcher`和`URLSession`之间放置一个抽象层，并构建一个*Stub 测试替身*来模拟网络提供给
    SUT 的间接输入。


    我们使用了`URLSession dataTaskPublisher(for:)`方法来执行网络请求，该方法返回一个`AnyPublisher<(Data,
    URLResponse), URLError>`。我们将要定义的抽象应该具有类似的签名，区别在于我们的业务逻辑不需要读取`URLResponse`：


    ```

    // NetworkFetching.swift

    import Combine

    import Foundation

    protocol NetworkFetching {

    func load(_ request: URLRequest) -> AnyPublisher

    }

    ```


    我们可以通过一个简洁的`extension`使`URLSession`符合`NetworkFetching`协议：


    ```

    // URLSession+NetworkFetching.swift

    import Combine

    import Foundation

    extension URLSession: NetworkFetching {

    func load(_ request: URLRequest) -> AnyPublisher {

    return dataTaskPublisher(for: request)

    .map { $0.data }

    .eraseToAnyPublisher()

    }

    }

    ```


    保持符合`protocol`的代码尽可能简单且不含自定义逻辑至关重要，因为我们不会对其进行测试。通过这样的实现，所有代码都不在我们的控制之下，因为它是 Apple
    的代码。测试`URLSession`不是我们的责任，我们可以相对确信它会始终按预期运行。¹


    让我们应用 DIP 并重构`MenuFetcher`，使其依赖于`NetworkFetching`而不是直接调用`URLSession`：


    ```

    // MenuFetcher.swift

    import Combine

    import Foundation

    class MenuFetcher: MenuFetching {

    let networkFetching: NetworkFetching

    init(networkFetching: NetworkFetching = URLSession.shared) {

    self.networkFetching = networkFetching

    }

    func fetchMenu() -> AnyPublisher {

    let url = URL(string:

    "https://raw.githubusercontent.com/mokagio/tddinswift_fake_api/trunk/menu_response.json")!

    networkFetching

    .load(URLRequest(url: url))

    .decode(type: [MenuItem].self, decoder: JSONDecoder())

    .eraseToAnyPublisher()

    }

    }

    ```


    测试仍然通过了，但存在前面讨论过的注意事项和局限性。现在是时候为`NetworkFetching`构建一个*Stub*，并用它来模拟我们希望测试的不同行为了。

    '
- fmt: '# Simulate Network Requests Using a Stub


    To write the tests, we need a way to provide them with a predefined input to check
    against: either `Data` to decode or a `URLError` value. We can build a Stub Test
    Double for this, using the same technique we learned in Chapter [8](#501287_1_En_8_Chapter.xhtml):


    ```

    // NetworkFetchingStub.swift

    @testable import Albertos

    import Combine

    import Foundation

    class NetworkFetchingStub: NetworkFetching {

    private let result: Result

    init(returning result: Result) {

    self.result = result

    }

    func load(_ request: URLRequest) -> AnyPublisher {

    return result.publisher

    // Use a delay to simulate the real world async             // behavior

    .delay(for: 0.01, scheduler: RunLoop.main)

    .eraseToAnyPublisher()

    }

    }

    ```


    We can use the Stub to decouple from the network’s non-deterministic nature and
    have better control over the test’s input:


    ```

    // MenuFetcherTests.swift

    // ...

    func testWhenRequestSucceedsPublishesDecodedMenuItems() throws {

    let json = """

    [

    { "name": "a name", "category": "a category", "spicy": true },

    { "name": "another name", "category": "a category", "spicy": true }

    ]

    """

    let data = try XCTUnwrap(json.data(using: .utf8))

    let menuFetcher = MenuFetcher(networkFetching: NetworkFetchingStub(returning:
    .success(data)))

    let expectation = XCTestExpectation(description: "Publishes decoded [MenuItem]")

    menuFetcher.fetchMenu()

    .sink(

    receiveCompletion: { _ in },

    receiveValue: { items in

    XCTAssertEqual(items.count, 2)

    XCTAssertEqual(items.first?.name, "a name")

    XCTAssertEqual(items.last?.name, "another name")

    expectation.fulfill()

    }

    )

    .store(in: &cancellables)

    wait(for: [expectation], timeout: 1)

    }

    ```


    Using the Stub removes the dependency on the network making them faster and more
    robust. If you try running the tests offline now, you’ll see they pass.


    A Stub in a networking test also helps to clarify where the values used in the
    assertions come from: their definition is now part of the test itself.


    Let’s move on to the test for failure management:


    ```

    // MenuFetcherTests.swift

    // ...

    func testWhenRequestFailsPublishesReceivedError() {

    let expectedError = URLError(.badServerResponse)

    let menuFetcher = MenuFetcher(networkFetching: NetworkFetchingStub(returning:
    .failure(expectedError)))

    let expectation = XCTestExpectation(description: "Publishes received URLError")

    menuFetcher.fetchMenu()

    .sink(

    receiveCompletion: { completion in

    guard case .failure(let error) = completion else { return }

    XCTAssertEqual(error as? URLError, expectedError)

    expectation.fulfill()

    },

    receiveValue: { items in

    XCTFail("Expected to fail, succeeded with \(items)")

    }

    )

    .store(in: &cancellables)

    wait(for: [expectation], timeout: 1)

    }

    ```


    This test passes already. The reason for it is that we’re testing the default
    behavior of what Combine’s extension of `URLSession` already gives us.


    Even though one could argue that this test is redundant, I’d encourage you to
    keep it. Ensuring that our code handles failures properly is key to building robust
    software with a great user experience. Having an explicit test for that signals
    that we take error handling seriously. The fact error handling is all done for
    us by Combine under the hood is an implementation detail, and it might change
    in the future. A dedicated test ensures that if error handling changes, you’ll
    know about it immediately.


    ### A Third-Party Alternative


    This book only treats vanilla `XCTest`, but there is a third-party library worth
    mentioning when it comes to testing networking code: [OHHTTPStubs](https://github.com/AliSoftware/OHHTTPStubs).
    This library allows you to stub network requests directly on top of `URLSession`
    without the need for a dedicated abstraction layer, making it an excellent choice
    to add tests to big legacy codebases that are hard to change before starting to
    refactor them.


    You can test networking logic by insulating from the network itself and focusing
    only on how your app makes requests and handles their result.


    By defining an abstraction to hide the inner workings of `URLSession`, you can
    simulate any response from the network and write comprehensive tests using a Stub
    Test Double while also removing the intrinsic non-deterministic effect making
    real HTTP requests introduces.


    Keep the code conforming to the abstraction layer to a minimum, ideally using
    only methods provided by Apple. You can be confident in its correct behavior,
    even though you didn’t write a test for it.


    ## Practice Time


    Imagine the API had another endpoint for the “dish of the day,” which returns
    a single item. How would you implement reading from that endpoint using Test-Driven
    Development? Would you add the functionality to `MenuFetching` or create a new
    dedicated abstraction? Would `NetworkFetchingStub` need changes, or would it be
    ready to support this test too?


    You can find the response for this endpoint at [`https://raw.githubusercontent.com/mokagio/tddinswift_fake_api/trunk/dish_of_the_day.json`](https://raw.githubusercontent.com/mokagio/tddinswift_fake_api/trunk/dish_of_the_day.json).


    Here’s another exercise for you. Currently, `MenuFetcher` uses a hardcoded value
    as the API endpoint. Hardcoded values are useful to get started quickly, but they’re
    not flexible. You cannot, for example, have one version of the app contacting
    the staging and one the production backend with a hardcoded URL.


    A better approach would be to initialize `MenuFetcher` with a base URL parameter
    to make it agnostic of where the API is deployed. Internally, `MenuFetcher` can
    construct the endpoint URL by appending the appropriate path to the base value.
    What tests can you write to implement this refinement?


    **Hint**


    Modify the Stub to expect a `URLRequest` and `Result` pair and only return the
    given `Result` when the `URLRequest` passed to `load(_:)` matches the given one.


    ## Key Takeaways


    - **Do not make network requests in your unit tests**. Hitting the network makes
    your tests non-deterministic and slower because of its real-world physical constraints.


    - **Define an abstraction layer to decouple your source and test code from the
    lower-level networking implementation**. By applying the Dependency Inversion
    Principle, you’ll shape a more modular software and be able to use Test Doubles.


    - **Use as thin a wrapper as possible around `URLSession`**. Because you cannot
    directly test that code, it should be as minimal and simple as possible.


    - **Use a Stub Test Double to simulate successful and failure responses coming
    from the network**. With a Stub, you can provide any kind of input to your networking
    component.


    ## Endnote


    1.  If you wanted to go the extra mile and have a security check on the `URLSession`
    behavior, you could write an integration test exercising the `NetworkFetching`
    method implementation on `URLSession`. As we’ve seen, interfacing with the real
    network makes the test non-deterministic and slower. This test should live in
    a dedicated target that doesn’t run together with the unit tests. You can use
    it whenever you upgrade to a new version of Xcode as a safety check.'
