  trans: '

    ## 关键要点


    *   **应用依赖倒置原则可以让你使用测试替身编写测试**。测试替身是受测系统依赖项的“测试专用等价物”，可用于保持测试隔离并模拟不同的行为。

    *   **用桩对象替换依赖项，以控制其向受测系统提供的间接输入**。使用桩对象，你可以测试许多不同的间接输入场景，始终让输入与输出之间的因果关系清晰明确。

    *   **使用** `enum` **来描述 SwiftUI 视图可能处于的互斥状态**。例如，使用 `Result` 来表示由成功或失败操作生成的内容。


    # 9. 测试 JSON 解码


    *如何通过测试来驱动编写将 JSON 数据解码为模型对象的逻辑？*


    *通过向测试提供预定义的 JSON 输入，并验证解码后产生的值与之匹配。*


    Swift 的 `Decodable` 协议提供了一种类型安全的方式来描述如何将 `Data`（例如 HTTP 响应正文中的 JSON）转换为对象或值类型。既然
    `Decodable` 承担了大部分繁重的工作，那么使用测试来驱动 JSON 解码逻辑的实现是否值得呢？


    当 JSON 对象的键和值的名称与类型直接映射到 Swift 时，实际上并不需要编写任何解码逻辑。在这种情况下，你可能会觉得无需单元测试的帮助，直接编写源代码即可。但如果
    JSON 对象结构复杂，或者你希望将其解码为具有不同结构的 Swift 类型，那么测试将助你一臂之力。


    是否采用 TDD 来实现 JSON 解码逻辑是一个权衡问题。你在编写测试上多花的时间，是否值得它所带来的反馈？一旦测试就位，它能否防止那些可能被忽略的回归问题？


    要回答这些问题，你首先需要知道如何编写这类测试。在本章中，我们将探索两种不同的技术来编写 JSON 解码测试，并进一步思考将 TDD 应用于应用程序这一部分实现的投资回报率。


    我们正在稳步推进，让我们的应用程序能够从远程 API 获取菜单。在前面的章节中，我们已经构建了这个新功能的视图部分。现在是时候向技术栈下方再迈进一步，编写代码将网络请求返回的原始
    `Data` 转换为 `MenuItem` 领域模型。


    Swift 提供了通过 `Decodable` 协议将 `Data` 解码为不同类型的一种便捷方式。我们的任务就是让 `MenuItem` 遵守该协议，并验证解码是否成功。


    作为你与 Alberto 应用程序开发协议的一部分，你也在构建他的后端服务。你选择使用一个 REST API，它会以以下形式返回 JSON 菜单：


    ```

    [

    {

    "name": "spaghetti carbonara",

    "category": "pasta",

    "spicy": false

    },

    {

    "name": "penne all''arrabbiata",

    "category": "pasta",

    "spicy": true

    }

    ]

    ```


    我们如何通过 TDD 从那个 JSON 得到 `MenuItem`？一如既往，我们从测试开始。在这个例子中，我们将为解码行为编写一个测试。


    编写测试时要问的问题是，如何验证期望的行为是否发生。我们期望的行为是成功的 JSON 解码。为了验证它，我们需要设计一个测试，断言在给定特定 JSON 输入的情况下，解码后的
    Swift 对象具有匹配的属性：


    ```

    // MenuItemTests.swift

    @testable import Albertos

    import XCTest

    class MenuItemTests: XCTestCase {

    func testWhenDecodedFromJSONDataHasAllTheInputProperties() {

    // 安排 JSON 数据输入

    // 执行：从 Data 解码一个 MenuItem 实例

    // 断言：MenuItem 与输入匹配

    }

    }

    ```


    如果输入是：


    ```

    {

    "name": "a name",

    "category": "a category",

    "spicy": true

    }

    ```


    那么我们的期望应当是：


    ```

    // MenuItemTests.swift

    // ...

    func testWhenDecodedFromJSONDataHasAllTheInputProperties() {

    // 安排 JSON 数据输入

    // 执行：从 Data 解码一个 MenuItem 实例

    XCTAssertEqual(item.name, "a name")

    XCTAssertEqual(item.category, "a category")

    XCTAssertEqual(item.spicy, true)

    }

    ```


    Swift 的 `JSONDecoder` 是用来从输入的 JSON `Data` 中获取 `item` 实例的类型：


    ```

    // MenuItemTests.swift

    // ...

    func testWhenDecodedFromJSONDataHasAllTheInputProperties() throws {

    // 安排 JSON 数据输入

    let item = try JSONDecoder()    .decode(MenuItem.self, from: data)

    XCTAssertEqual(item.name, "a name")

    XCTAssertEqual(item.category, "a category")

    XCTAssertEqual(item.spicy, true)

    }

    ```


    我们如何为测试安排 JSON 输入呢？让我们看看两种不同的方法。


    ## 选项 1：内联字符串


    生成 JSON 输入的一种方法是将其定义为测试中的内联 `String`，然后将其转换为 `Data`：


    ```

    // MenuItemTests.swift

    // ...

    func testWhenDecodedFromJSONDataHasAllTheInputProperties() throws {

    let json = #"{ "name": "a name", "category": "a category", "spicy": true }"#

    let data = try XCTUnwrap(json.data(using: .utf8))

    // 编译器说：实例方法 ''decode(_:from:)'' 要求

    // ''MenuItem'' 遵守 ''Decodable''

    let item = try JSONDecoder().decode(MenuItem.self, from: data)

    XCTAssertEqual(item.name, "a name")

    XCTAssertEqual(item.category, "a category")

    XCTAssertEqual(item.spicy, true)

    }

    ```


    编译器指出我们的 `MenuItem` 没有遵守 `Decodable`。让我们来满足这个条件：


    ```

    // MenuItem.swift

    struct MenuItem {

    // ...

    }

    // ...

    extension MenuItem: Decodable {}

    ```


    现在测试可以构建了。它也已经通过了，因为 `MenuItem` 中属性的名称与 JSON 输入中键的名称匹配，所以编译器为我们处理了所有解码工作。


    测试在我们仅添加了遵守某个 `protocol` 而没有编写任何额外代码的情况下就通过了，这引发了一个问题：我们是在测试我们自己代码的行为，还是在测试 `Decodable`
    的行为？


    正如本章引言中提到的，在某些情况下，使用测试来驱动 JSON 解码实现可能是不必要的开销。我们正在学习如何编写这类测试，以便判断它们何时有用、何时无用。让我们看看“安排”阶段的另一个选项，然后讨论何时适合将
    TDD 用于 JSON 解码。

    '
- fmt: "# Option 2: JSON Files\n\nAnother option to provide the input for our test\
    \ is to have JSON files holding the input values.\n\nTo add a JSON file to your\
    \ test target:\n\n1. Select the test target folder in the project navigator.\n\
    2. Right-click it and click “New File…” or press `Cmd N`.\n3. Select the Other\
    \ ➤ Empty file and then click “Next” or press `Enter`.\n\nFigure [9-1](#501287_1_En_9_Chapter.xhtml#Fig1)\
    \ shows the Empty file option from the Xcode “New File…” dialog.\n\n![../images/501287_1_En_9_Chapter/501287_1_En_9_Fig1_HTML.jpg](images/501287_1_En_9_Chapter/501287_1_En_9_Fig1_HTML.jpg)\n\
    \n**Figure 9-1** The Xcode New File… dialog, filtered to show only empty file\
    \ templates\n\n4. Add the `.json` extension to the file name and select “Create”\
    \ or press `Enter`.\n\nFigure [9-2](#501287_1_En_9_Chapter.xhtml#Fig2) shows the\
    \ final dialog in the “New File…” sequence, where you can choose the name, location,\
    \ and target for the file.\n\n![../images/501287_1_En_9_Chapter/501287_1_En_9_Fig2_HTML.jpg](images/501287_1_En_9_Chapter/501287_1_En_9_Fig2_HTML.jpg)\n\
    \n**Figure 9-2** The Xcode dialog to name and add a new file to the file system\
    \ and project targets\n\n5. Populate the file with the JSON for the menu item:\n\
    \n```\n// menu_item.json\n{\n\"name\": \"a name\",\n\"category\": \"a category\"\
    ,\n\"spicy\": true\n}\n```\n\nAlternatively, you can create the JSON file with\
    \ your favorite text editor and save it into the test target folder. From Xcode,\
    \ you can then right-click the test target folder and select “Add Files To ‘`<test\
    \ target name>`’…” or press `Cmd Alt A` to reveal a file navigator where to select\
    \ your JSON file.\n\nOnce the file is part of the project, you can load it in\
    \ the tests like this:\n\n```\n// MenuItemTests.swift\n// ...\nfunc testDecodesFromJSONData()\
    \ throws {\n    let url = try XCTUnwrap(\n        Bundle(for: type(of: self)).url(forResource:\
    \ \"menu_item\", withExtension: \"json\")\n    )\n    let data = try Data(contentsOf:\
    \ url)\n    let item = try JSONDecoder().decode(MenuItem.self, from: data)\n \
    \   XCTAssertEqual(item.name, \"a name\")\n    XCTAssertEqual(item.category, \"\
    a category\")\n    XCTAssertEqual(item.spicy, true)\n}\n```\n\nIf you haven’t\
    \ removed the source changes we wrote in the previous example, this test will\
    \ immediately pass.\n\nWe can make the test code tidier by extracting the file-reading\
    \ logic into a helper function. This is useful to do if you have more than a couple\
    \ of tests for model decoding:\n\n```\n// XCTestCase+JSON.swift\nimport XCTest\n\
    extension XCTestCase {\n    func dataFromJSONFileNamed(_ name: String) throws\
    \ -> Data {\n        let url = try XCTUnwrap(\n            Bundle(for: type(of:\
    \ self)).url(forResource: name, withExtension: \"json\")\n        )\n        return\
    \ try Data(contentsOf: url)\n    }\n}\n```\n\n```\n// MenuItemTests.swift\n//\
    \ ...\nfunc testDecodesFromJSONData() throws {\n    let data = try dataFromJSONFileNamed(\"\
    menu_item\")\n    let item = try JSONDecoder().decode(MenuItem.self, from: data)\n\
    \    XCTAssertEqual(item.name, \"a name\")\n    XCTAssertEqual(item.category,\
    \ \"a category\")\n    XCTAssertEqual(item.spicy, true)\n}\n```\n\n## Which Option\
    \ to Choose?\n\nThe advantage of using inline strings is that you can keep the\
    \ input values close to the expectation they support. With the JSON file option,\
    \ it’s unclear where “a name,” “a category,” and `true` come from, the only way\
    \ to be sure is to check the JSON file as well.\n\nOn the other hand, using JSON\
    \ files makes our tests tidier. As your input JSON grows in size, the inline string\
    \ approach will result in longer and longer test methods, whereas tests loading\
    \ the data from a file won’t need more input setup code.\n\nUsing JSON files is\
    \ also useful if you can automate generating them from your API, making sure the\
    \ decoding is up to date without putting in place a full end-to-end integration\
    \ test suite.\n\nIf you have input data that varies a lot, you’ll end up with\
    \ many JSON files, one for each variation. In this case, generating the input\
    \ via string interpolation might be easier to maintain:\n\n```\n// MenuItem+JSONFixture.swift\n\
    @testable import Albertos\nextension MenuItem {\n    static func jsonFixture(\n\
    \        name: String = \"a name\",\n        category: String = \"a category\"\
    ,\n        spicy: Bool = false\n    ) -> String {\n        return \"\"\"\n   \
    \     {\n        \"name\": \"\\(name)\",\n        \"category\": \"\\(category)\"\
    ,\n        \"spicy\": \\(spicy)\n        }\"\"\"\n    }\n}\n```\n\n```\n// MenuItemTests.swift\n\
    // ...\nfunc testWhenDecodedFromJSONDataHasAllTheInputProperties() throws {\n\
    \    let json = MenuItem.jsonFixture(name: \"a name\", category: \"a category\"\
    , spicy: false)\n    let data = try XCTUnwrap(json.data(using: .utf8))\n    let\
    \ item = try JSONDecoder().decode(MenuItem.self, from: data)\n    XCTAssertEqual(item.name,\
    \ \"a name\")\n    XCTAssertEqual(item.category, \"a category\")\n    XCTAssertEqual(item.spicy,\
    \ false)\n}\n```\n\nWhich option to choose depends on your domain model. If your\
    \ API has many entities, each rich with properties, then using files might make\
    \ it easier to navigate your test suite.\n\nUnless you are building an app against\
