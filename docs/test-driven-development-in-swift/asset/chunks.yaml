    ## Test List\n\nThe description itself already highlights the behavior details\
    \ and even provides examples of inputs and outputs to verify:\n\n* A year evenly\
    \ divisible by 4 is leap, for example, 2020.\n* A year evenly divisible by 100\
    \ is not leap, for example, 2100.\n* A year evenly divisible by 400 is leap, for\
    \ example, 2000.\n* Any other year is not leap, for example, 2021.\n\nWe can write\
    \ a test for each of those:\n\n```\nimport XCTest\nclass LeapYearTests: XCTestCase\
    \ {\n    func testEvenlyDivisibleBy4IsLeap() {}\n    func testEvenlyDivisibleBy100IsNotLeap()\
    \ {}\n    func testEvenlyDivisibleBy400IsLeap() {}\n    func testNotEvenlyDivisibleBy4Or400IsNotLeap()\
