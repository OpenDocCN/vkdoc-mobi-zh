  raw: '## Code That Checks Other Code


    Software developers write code to automate tasks that would otherwise be manual.
    Over the past decades, software has been “eating the world” as investor Marc Andreessen
    put it [in a 2011 essay](https://a16z.com/2011/08/20/why-software-is-eating-the-world/).


    People used to send signed documents with a fax machine, carry big map books in
    their car, and store their business contacts in a Rolodex. Today, we have email
    with digital signatures, navigation apps leveraging the GPS in our smartphones,
    and CRM web tools.


    Software can also automate other software, from identifying the best time for
    a meeting by reading the participants’ calendars and generating invitations with
    a link to start a video call to publishing prewritten content on a schedule.


    Verifying how software behaves is just another task ripe for automation. You can
    write code to check that the code you wrote behaves as expected.


    Code that checks other code – that’s what automated testing is.


    To understand what writing code that checks other code means, let’s turn to the
    programming interview all-time favorite: the “fizz-buzz” algorithm:


    *   Given an integer, print “fizz” if it’s divisible by three, “buzz” if it’s
    divisible by five, “fizz-buzz” if it’s divisible by three and five; otherwise,
    print the value itself.


    Here’s one possible implementation:


    ```

    func fizzBuzz(_ number: Int) -> String {

    let divisibleBy3 = number % 3 == 0

    let divisibleBy5 = number % 5 == 0

    switch (divisibleBy3, divisibleBy5) {

    case (false, false): return "\(number)"

    case (true, false): return "fizz"

    case (false, true): return "buzz"

    case (true, true): return "fizz-buzz"

    }

    }

    ```


    To test this code, we can use a script that calls `fizzBuzz(_:)` with different
    numbers and prints “PASSED” if the value is correct and “FAILED” if it isn’t:


    ```

    func testFizzBuzz() {

    if fizzBuzz(3) == "fizz" {

    print("PASSED")

    } else {

    print("FAILED")

    }

    if fizzBuzz(5) == "buzz" {

    print("PASSED")

    } else {

    print("FAILED")

    }

    // and so on

    }

    ```


    Repeating the `if/else` construct for each test would make the test long and boring
    to write. Let’s extract the logic to check a value against an expected one in
    a dedicated function:


    ```

    func test(value: String, matches expected: String) {

    if value == expected {

    print("PASSED")

    } else {

    print("FAILED")

    }

    }

    func testFizzBuzz() {

    test(value: fizzBuzz(1), matches: "1")

    test(value: fizzBuzz(3), matches: "fizz")

    test(value: fizzBuzz(5), matches: "buzz")

    test(value: fizzBuzz(15), matches: "fizz-buzz")

    }

    ```


    We now have an automated test script to verify our `fizzBuzz(_:)`. If the output
    is all “PASSED,” then the implementation is correct – or, to be more precise,
    matches the expectations we enumerated in the form of individual tests.


    Automated testing outsources the need to type inputs, read outputs, and verify
    they are correct to a computer. Computers can do that faster and more accurately
    than any of us could.


    Because of their speed, we can run automated tests more frequently, making it
    more likely to discover issues and catch regression early.


    We can also automate the automated tests to never forget running them. For example,
    if you use Git, you could set up a hook that runs them before every commit.


    Anyone can run all the tests because the script encodes them. Conversely, before
    someone can manually test a nontrivial product, they need training on it or won’t
    know what to expect. Any new hire can run the test script and immediately tell
    whether all checks pass.


    It might take longer to write an automated test for a behavior compared to manually
    testing it. Once you paid that one-time setup cost, though, you can run the test
    countless times in a fraction of what it would take to test manually.


    Automated tests are by far the best investment you can make to maintain your software’s
    quality as it evolves with new features and changes. They are a faster, cheaper,
    and scalable alternative to rote manual testing.


    Unit Tests, Integration Tests, UI Tests… Oh My!


    Reading material about software testing, you’ll come across a variety of names
    for automated tests. Unit testing, integration testing, UI testing, property-based
    testing, exploratory testing, characterization testing, … the list goes on. It’s
    overwhelming, to say the least, and to make matters worse, different people or
    resources have different interpretations of what certain names actually mean.


    Some scholars refer to any kind of automated test that doesn’t involve interfacing
    with the actual UI of the app as a unit test; others adopt a stricter definition
    and consider unit tests only those tests that exercise a component in isolation.


    In this book, we’ll follow Roy Osherove’s definition of unit tests from *The Art
    of Unit Testing*:


    *   A unit test is a piece of code that invokes a unit of work and checks one
    specific end result of that unit of work.


    where a unit of work is “the sum of actions that take place between the invocation
    of a public method in the system and a single noticeable end result by a test
    of that system.”


    Two other definitions worth giving are those of integration tests and UI tests.


    Unit tests are the best tests to write when practicing Test-Driven Development
    because their sharp focus allows the faster feedback cycle to be possible. For
    that reason, this book focuses only on unit tests.


    Every time we’ll talk about “tests” in this book, it we’ll be referring to unit
    tests, unless otherwise specified.'
  trans: "\n# 检验代码的代码\n\n软件开发者编写代码来自动完成原本需要手动执行的任务。正如投资人马克·安德森[在 2011 年的一篇文章](https://a16z.com/2011/08/20/why-software-is-eating-the-world/)中所言，过去几十年里，软件一直在“吞噬世界”。\n\
    \n过去人们用传真机发送签名文件，在车里放一本大地图册，用名片夹存储商业联系人。如今，我们使用带有数字签名的电子邮件、利用智能手机 GPS 的导航应用，以及\
    \ CRM 网络工具。\n\n软件也可以实现其他软件的自动化，从通过读取与会者的日历来确定最佳会议时间、生成带视频通话链接的邀请，到按计划发布预先撰写的内容。\n\
    \n验证软件的行为只是另一个适合自动化的任务。你可以编写代码来检查你写的代码是否按预期运行。\n\n检查其他代码的代码——这就是自动化测试的本质。\n\n\
    为了理解“编写检查其他代码的代码”的含义，让我们来看编程面试中经久不衰的经典——“fizz-buzz”算法：\n\n- 给定一个整数，如果它能被 3 整除，输出“fizz”；如果能被\
    \ 5 整除，输出“buzz”；如果能同时被 3 和 5 整除，输出“fizz-buzz”；否则，输出该数字本身。\n\n以下是一种可能的实现：\n\n```\n\
    func fizzBuzz(_ number: Int) -> String {\n    let divisibleBy3 = number % 3 ==\
    \ 0\n    let divisibleBy5 = number % 5 == 0\n    switch (divisibleBy3, divisibleBy5)\
    \ {\n    case (false, false): return \"\\(number)\"\n    case (true, false): return\
    \ \"fizz\"\n    case (false, true): return \"buzz\"\n    case (true, true): return\
    \ \"fizz-buzz\"\n    }\n}\n```\n\n为了测试这段代码，我们可以用一个脚本，用不同的数字调用`fizzBuzz(_:)`，如果返回值正确则打印“PASSED”，否则打印“FAILED”：\n\
    \n```\nfunc testFizzBuzz() {\n    if fizzBuzz(3) == \"fizz\" {\n        print(\"\
    PASSED\")\n    } else {\n        print(\"FAILED\")\n    }\n    if fizzBuzz(5)\
    \ == \"buzz\" {\n        print(\"PASSED\")\n    } else {\n        print(\"FAILED\"\
    )\n    }\n    // 以此类推\n}\n```\n\n为每个测试重复`if/else`结构会使测试变得冗长且乏味。让我们把检查值与预期值是否一致的逻辑提取到一个专门的函数中：\n\
    \n```\nfunc test(value: String, matches expected: String) {\n    if value == expected\
    \ {\n        print(\"PASSED\")\n    } else {\n        print(\"FAILED\")\n    }\n\
    }\n\nfunc testFizzBuzz() {\n    test(value: fizzBuzz(1), matches: \"1\")\n   \
    \ test(value: fizzBuzz(3), matches: \"fizz\")\n    test(value: fizzBuzz(5), matches:\
    \ \"buzz\")\n    test(value: fizzBuzz(15), matches: \"fizz-buzz\")\n}\n```\n\n\
    现在我们有了一个自动化测试脚本来验证我们的`fizzBuzz(_:)`函数。如果输出全部是“PASSED”，那么实现就是正确的——或者更准确地说，符合我们以单个测试形式列举的预期。\n\
    \n自动化测试将输入数据、读取输出并验证其正确性这些工作外包给了计算机。计算机执行这些任务的速度和准确性都远超我们人类。\n\n由于速度快，我们可以更频繁地运行自动化测试，从而更有可能及早发现问题和捕获回归。\n\
    \n我们还可以自动化运行这些自动化测试，确保永远不会忘记执行它们。例如，如果你使用 Git，可以设置一个钩子，在每次提交前运行这些测试。\n\n任何人都可以运行所有测试，因为脚本将这些测试编码化了。反之，在一个人能手动测试一个复杂产品之前，他需要接受相关培训，否则不知道预期结果是什么。而任何新员工都可以运行测试脚本，并立即判断所有检查是否通过。\n\
    \n为某个行为编写自动化测试可能比手动测试花费的时间更长。然而，一旦你支付了这笔一次性的设置成本，你就可以在手动测试所需时间的一小部分内，无数次地运行该测试。\n\
    \n自动化测试是你在软件随着新功能和变更而进化时，维护其质量所能做的最佳投资。相比机械的手动测试，它们是一种更快、更便宜且可扩展的替代方案。\n\n## 单元测试、集成测试、UI\
    \ 测试……天哪！\n\n阅读关于软件测试的资料时，你会接触到各种自动化测试的名称。单元测试、集成测试、UI 测试、基于属性的测试、探索性测试、特征化测试……清单还很长。至少可以说，这令人眼花缭乱，更糟的是，不同的人或资料对某些名称的实际含义有着不同的解释。\n\
    \n一些学者将任何不涉及与应用程序实际 UI 交互的自动化测试都称为单元测试；另一些人则采用更严格的定义，只将在隔离状态下测试某个组件的测试视为单元测试。\n\
    \n在本书中，我们将遵循罗伊·奥谢罗夫在《单元测试的艺术》中对单元测试的定义：\n\n- 单元测试是一段调用某个工作单元并检查该工作单元的一个特定最终结果的代码。\n\
    \n其中，工作单元是“从调用系统中的公共方法到系统测试能观察到的一个显著最终结果之间所发生的一系列动作的总和”。\n\n另外两个值得给出的定义是集成测试和\
    \ UI 测试。\n\n在进行测试驱动开发时，单元测试是最适合编写的测试，因为它们聚焦明确，能够实现更快的反馈循环。因此，本书只关注单元测试。\n\n在本书中，除非另有说明，每次提到“测试”时，指的都是单元测试。\n"
- fmt: '# From Writing Tests to Writing Tests First


    There is a problem with writing tests for code that already exists: you can’t
    truly trust a test you haven’t seen failing.


    The only way to make sure your tests are not giving you a false positive – that
    they pass even though the code is wrong – is to modify the code’s behavior to
    force a failure and see if they catch it.


    Forcing failures in production code to verify the tests’ correctness is not an
    efficient approach. It requires changing code you already wrote, only to undo
    the change right after, once you validated the test.


    How can we verify that our tests are correct without going through the trouble
    of creating ad hoc failures?


    The answer is by spinning the process around and writing the tests *first*.


    By writing a test for something you haven’t implemented yet, you can ensure the
    test will catch errors. That’s because if there is not code for the behavior yet,
    the test *must* fail; if it doesn’t, then it’s not written correctly.


    Let’s look at the fizz-buzz example again. This time, we’ll start with an empty
    implementation and then write one test for the expected behavior:


    ```

    func fizzBuzz(_ number: Int) -> String {

    return ""

    }

    func testFizzBuzz() {

    test(value: fizzBuzz(1), matches: "1")

    }

    ```


    Running `testFizzBuzz()` will print “FAILED.” To make the test pass, we need only
    to change the implementation to convert the input `Int` into a `String`:


    ```

    func fizzBuzz(_ number: Int) -> String {

    return "\(number)"

    }

    ```


    If you now call `testFizzBuzz()`, it will print “PASSED.”


    Let’s keep implementing `fizzBuzz(_:)` one test at a time and add a test to make
    sure an input divisible by three returns “fizz”:


    ```

    test(value: fizzBuzz(3), matches: "fizz")

    ```


    To make both tests pass, we can update the `fizzBuzz(_:)` implementation to


    ```

    guard number % 3 == 0 else { return "\(number)" }

    return "fizz"

    ```


    We can then continue with the next behavior facet – an input divisible by five
    should return “buzz”:


    ```

    test(value: fizzBuzz(5), matches: "buzz")

    ```


    To make this new test and the other two pass, we can update `fizzBuzz(_:)` to


    ```

    switch (number % 3 == 0, number % 5 == 0) {

    case (true, false): return "fizz"

    case (false, true): return "buzz"

    default: return "\(number)"

    }

    ```


    We only have one scenario left to cover – numbers divisible by fifteen should
    return “fizz-buzz”:


    ```

    test(value: fizzBuzz(15), matches: "fizz-buzz")

    ```


    Let’s update `fizzBuzz(_:)` to make this final test pass too:


    ```

    switch (number % 3 == 0, number % 5 == 0) {

    case (false, false): return "\(number)"

    case (true, false): return "fizz"

    case (false, true): return "buzz"

    case (true, true): return "fizz-buzz"

    }

    ```


    We got to a working “fizz-buzz” implementation by building it one step at a time,
    always starting from a failing test. Because each test represented a specific
    case of the overall “fizz-buzz” behavior, the code changed between iterations
    was always minimal. On each step, the test for the new behavior helped us verify
    if our new code worked without the need to call it manually multiple times, while
    the already existing tests ensured it didn’t break the rest of the logic.


    This test-first, step-by-step, fast-feedback way of writing code is incredibly
    effective. It’s a unique way of building software called Test-Driven Development,
    TDD for short.


    Test-Driven Development is the intentional and consistent use of the tests’ feedback
    to inform the software implementation. But practicing TDD is more than just writing
    tests before production code; its by-products are far more valuable than the mere
    knowledge that your software behaves as expected.


    ## From Writing Tests First to Test-Driven Development


    Writing tests first puts helpful pressure on your software design. Environmental
    constraints and natural selection resulted in the evolution of the beautiful and
    advanced species that make up our world’s flora and fauna. In the same way, forcing
    yourself to write tests first will push you and your codebase to a higher standard.


    When you write tests first, you immediately see if your design is simple to test.
    Straightforward and isolated behavior is simpler to test than complicated one.
    A big object with many dependencies is harder to put in a test harness than a
    smaller one with only a few `init` parameters.


    If code is straightforward to test, it will also be straightforward to work with
    it in production. That’s because tests are consumers of the code’s public API.
    Using code in the test is similar to using it in production.


    Because writing simple tests is easier than writing complicated ones, you’ll naturally
    gravitate toward code that is isolated and does only one thing. You’ll build software
    made up of highly cohesive and loosely coupled components.


    TDD also helps you have a better understanding of your products’ requirements.
    To test your code’s behavior, you need to know what it is first: you need to define
    inputs and their expected outputs concretely. To do so, you need to have appropriately
    assimilated the requirements for what the software should do. This upfront analysis
    makes implementing the code straightforward. Writing tests first removes the temptation
    to skip this critical step.


    TDD gives you a psychological advantage. Developing your software one test at
    a time sets a sustainable pace, and our brains achieve goals better when the end
    is in sight.


    Tackling the development of large complex applications one test at a time is the
    equivalent of how marathon runners approach their long races: putting one foot
    in front of the other.


    Test-Driven Development is the keystone habit of software quality. When applied
    day after day, it has huge ripple effects on developer productivity, happiness,
    and software design quality.


    As Kent Beck, the creator Test-Driven Development (or re-discoverer as he refers
    to himself[¹](#501287_1_En_1_Chapter.xhtml#Par1000)), puts it in *Test-Driven
    Development: By Example*:


    > “If you’re happy slamming some code together that more or less works and you’re
    happy never looking at the result again, TDD is not for you. TDD rests on a charmingly
    naïve geekoid assumption that if you write better code, you’ll be more successful.
    TDD helps you to pay attention to the right issues at the right time so you can
    make your designs cleaner, you can refine your designs as you learn.”


    In this book, you’ll learn how to use TDD to build Swift applications, how the
    language strong type system augments your ability to write tests, and how to do
    so effectively using the Xcode IDE and XCTest framework provided by Apple. You’ll
    see how this steady-paced, test-first approach can help you tackle problems of
    any size and complexity. You’ll develop a feedback-first mindset, both for software
    and product development, to help you ship faster and learn more about what is
    valuable for your business.


    ## Key Takeaways


    * **Automated testing is the use of code to test other code**; it is cheaper,
    more effective, and far less error-prone than manual testing.

    * **Writing tests first is better than doing so after the implementation is complete**;
    by seeing a test fail when there is no implementation for the behavior under test,
    you can trust it will catch future regressions.

    * **Test-Driven Development is the practice of consistently and intentionally
    writing software starting from its tests**; this practice results in better software
    made up of highly cohesive and loosely coupled components, each responsible for
    a small and well-defined behavior.'
