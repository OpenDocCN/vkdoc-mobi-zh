    \ timeoutForPredicateExpectations)\n    // 执行警报解除代码\n    viewModel.alertToShow?.buttonAction?()\n\
    \    // 验证订单已被重置\n    XCTAssertTrue(orderController.order.items.isEmpty)\n}\n\
    ```\n\n如果你使用聚焦测试的快捷键 `Ctrl Cmd U` 运行此测试，你会看到它失败。\n\n为了使测试通过并修复 bug，我们需要让 `OrderController`\
    \ 在警报解除动作中重置其 order 属性：\n\n```swift\n// OrderController.swift\n// ...\nfunc resetOrder()\
