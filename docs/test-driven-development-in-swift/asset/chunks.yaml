- fmt: "# Partition Problem and Solve Sequentially\n\nPracticing Test-Driven Development\
    \ is an exercise in decomposition and sequentiality. You take a requirement for\
    \ a method and partition it into a list of tests to work sequentially. For each\
    \ test, you split making the test pass from cleaning the implementation. You write\
    \ as little code as necessary to get to the green state first and then move on\
    \ refining the production code.\n\nI call this approach *Partition Problem and\
    \ Solve Sequentially*. This strategy is fractal; we can apply it again and again,\
    \ from the macro-level of the app architecture as a whole to the micro-level of\
    \ a single test. What is the list of design decisions in the previous section\
    \ if not a partitioned view of the higher-level task of building the app?\n\n\
    Let’s apply Partition Problem and Solve Sequentially to the starting point of\
    \ the app, displaying the menu. Let’s break it down into core questions to answer:\n\
    \n- How does the UI look like?\n- Where does the data come from?\n- How is the\
    \ data organized in the UI?\n\nWe don’t need to give these questions a final answer.\
    \ We are interested in building something as fast as possible to learn from the\
    \ process.\n\n*How does the UI look like?* Stock UI will do for now; we can work\
    \ on the look and feel once we laid out a solid functionality core.\n\n*Where\
    \ does the data come from?* A remote API, so it’s always up to date? A file bundled\
    \ in the app? We don’t need to decide where the data comes from to display it:\
    \ a hardcoded list will do for now.\n\n*How is the data organized?* Let’s start\
    \ by copying what the physical menu does. Items are grouped into categories: starters,\
    \ pastas, drinks, and desserts.\n\nBy sidestepping the UI and data source questions,\
    \ we can focus entirely on the core task of implementing the data organization\
    \ for the app.\n\nDon’t confuse the act of delaying giving a final answer to those\
    \ questions with laziness. By simplifying the problem, we set ourselves an achievable\
    \ goal on which we can make concrete progress. We’ll have something we can share\
    \ with our client as early as possible.\n\nHenrik Kniberg refers to this approach\
    \ as [Earliest Testable/Usable/Lovable](https://blog.crisp.se/2016/01/25/henrikkniberg/making-sense-of-mvp).\
    \ Suppose our task is to build an efficient means of transportation for our users.\
    \ We’re better off starting with a skateboard and iterating our way up to an electric\
    \ car, rather than building the wheels first, then the frame, and so on. We can\
    \ deliver a skateboard sooner than a car. People can move around using skateboards;\
    \ a car wheel by itself won’t get them anywhere.\n\nAlso, notice that these simplifications\
    \ don’t constrain the system; they make it more flexible. By waiting to decide\
    \ where the data comes from, we have kept the door open for any option.\n\nThrough\
    \ this decomposition process, we now have a spec for our Earliest Testable version:\
    \ an app that displays a hardcoded menu in a stock list view, grouped by category.\
    \ Let’s get coding.\n\n## Building the Menu\n\nLet’s say our menu data is a flat\
    \ array of dishes. To display it sorted by category, we need a function that,\
    \ given an array of dishes, returns an array of sections, where each section holds\
    \ all the items of a single category.\n\nAre there edge cases in the behavior?\n\
    \n- If all the dishes in the array are of the same category, we should have only\
    \ one section.\n- If the input array is empty, the output sections array should\
    \ be empty too.\n\nLet’s create a new file in the test target and translate these\
    \ requirements into a Test List:\n\n```swift\n// MenuGroupingTests.swift\n@testable\
    \ import Albertos\nimport XCTest\n\nclass MenuGroupingTests: XCTestCase {\n  \
    \  func testMenuWithManyCategoriesReturnsOneSectionPerCategory() {}\n    func\
    \ testMenuWithOneCategoryReturnsOneSection() {}\n    func testEmptyMenuReturnsEmptySections()\
    \ {}\n}\n```\n\nWhich test should we begin with? As we’ve seen in the previous\
    \ chapter, a test we are confident we can make pass is a good place to start.\
    \ The behavioral edges are usually simpler; the test for “empty input produces\
    \ empty output” should be straightforward.\n\nWorking from the edges inward will\
    \ also give us a chance to focus on building the function scaffold first and then\
    \ laying the individual bricks that make up the complete behavior on top of it\
    \ one at a time.\n\nWhere should we start writing the test? From the assertion\
    \ that will pass once the behavior is implemented. In this test, we want to assert\
    \ that the sections array is empty:\n\n```swift\nfunc testEmptyMenuReturnsEmptySections()\
    \ {\n    // Arrange the input: an empty menu\n    // Act on the SUT to get the\
    \ output: the sections array\n    XCTAssertTrue(sections.isEmpty)\n}\n```\n\n\
    Where does `sections` come from? It’s the return value of the function we are\
    \ trying to write:\n\n```swift\nfunc testEmptyMenuReturnsEmptySections() {\n \
    \   // Arrange the input: an empty menu\n    let sections = ???\n    XCTAssertTrue(sections.isEmpty)\n\
    }\n```\n\nHow does the function returning `sections` look like? It should be something\
    \ taking an empty array as input, and its role is to group a flat menu by category:\n\
    \n```swift\nfunc testEmptyMenuReturnsEmptySections() {\n    let menu = [MenuItem]()\n\
    \    let sections = groupMenuByCategory(menu)\n    XCTAssertTrue(sections.isEmpty)\n\
    }\n```\n\nAt this point our test is ready, but it doesn’t compile:\n\n```swift\n\
    let sections = groupMenuByCategory(menu) // Compiler says:\n// Cannot find `groupMenuByCategory`\
    \ in scope\n```\n\nThe compiler error gives us a hint on what to do next: we need\
    \ to define `groupMenuByCategory()`:\n\n```swift\nfunc groupMenuByCategory(_ menu:\
    \ [MenuItem]) -> [MenuSection] {\n    return []\n}\n```\n\nAs part of defining\
    \ the function, we also wrote names for the types it works with, but since we\
    \ haven’t defined them yet, the code still doesn’t compile.\n\nI’m using the *Wishful\
    \ Coding* technique introduced in Chapter [3](#501287_1_En_3_Chapter.xhtml) to\
    \ better show the full test-driven flow step-by-step.\n\nAs you become more confident\
    \ with TDD, you’ll be able to write empty function and type definitions before\
    \ the tests and leverage Xcode’s autocompletion for a slightly faster process.\n\
    \nThe compiler says:\n\n- Cannot find type `MenuItem` in scope\n- Cannot find\
    \ type `MenuSection` in scope\n\nLet’s define these types in dedicated files in\
    \ the application target:\n\n```swift\n// MenuItem.swift\nstruct MenuItem {}\n\
    \n// MenuSection.swift\nstruct MenuSection {}\n```\n\nThe code now compiles. If\
    \ you run the tests with the `Cmd U` keyboard shortcut, you’ll see they pass.\n\
    \nWhy didn’t we add any properties to `MenuItem` or `MenuSection`? We’ll need\
    \ properties in those types for them to be useful, of course, but we should wait\
    \ to add them till a test that shows we need them. TDD pushes you to move in small\
    \ steps, get feedback as fast as possible, and only write as little code as you\
    \ need.\n\nWriting just enough code is also an excellent guardrail against overengineering.\
    \ Because we write the tests before the production code and we only write tests\
    \ for the behavior we need in the app right now, the resulting production code\
    \ is precisely the one we need, nothing more, nothing less."
