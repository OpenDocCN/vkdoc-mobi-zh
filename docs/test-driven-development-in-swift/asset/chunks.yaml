    \ pass is introducing a nested private object to decode the category and forward\
    \ its name to the `category` property:\n\n```\n// MenuItem.swift\nstruct MenuItem\
    \ {\nlet name: String\nlet spicy: Bool\nprivate let categoryObject: Category\n\
    var category: String { categoryObject.name }\nenum CodingKeys: String, CodingKey\
    \ {\ncase name, spicy\ncase categoryObject = \"category\"\n}\nstruct Category:\
    \ Equatable, Decodable {\nlet name: String\n}\n}\n// ...\nextension MenuItem:\
    \ Decodable {}\n// This is required to make the existing code with the // hardcoded\
    \ menu compile.\nextension MenuItem {\ninit(category: String, name: String, spicy:\
    \ Bool) {\nself.categoryObject = Category(name: category)\nself.name = name\n\
    self.spicy = spicy\n}\n}\n```\n\nIn the case of a nontrivial JSON structure like\
    \ the one in this example, I feel a test is a useful feedback mechanism to guide\
    \ the decoding implementation.\n\nSomething else to keep in mind is that we always\
    \ call JSON decoding as part of a network request or some other kind of data transferring;\
    \ it’s not something we might call directly in a ViewModel. Because the return\
    \ type of the `fetchMenu` in `MenuFetching` is `AnyPublisher<[MenuItem], Error>`,\
    \ a component fetching the menu from the remote API will also have to decode the\
    \ received data into a `[MenuItem]`. As long as the decoding has no custom logic,\
    \ the tests for the networking component will fail if something goes wrong. That\
    \ is, testing the networking code implicitly exercises the JSON decoding logic.\n\
    \nIf your API is such that you can decode it with little to no custom code, you’re\
    \ better off jumping straight to implementing the networking code and saving yourself\
    \ the time to write tests for the decoding logic. That’s because the Swift standard\
    \ library takes care of the decoding; it’s not your responsibility to test that.\n\
    \nIf there is a certain amount of ad hoc decoding logic, though, like in the previous\
    \ example, then a set of focused tests will help you implement it and make sure\
    \ it doesn’t break.\n\nA TDD purist would be pulling their hair out and scream\
    \ at me in frustration right now. How dare I suggest that it’s okay not to write\
    \ tests in a book about Test-Driven Development?!\n\n**Test-Driven Development\
    \ is a practice, not a way of life. If the return on investment of writing some\
    \ code test-first is not worth it, both in the short and long term, then it**’**s\
    \ okay not to write a test for that code.**\n\nWe’ve wrestled with when deploying\
    \ TDD is appropriate for writing JSON decoding logic and seen a couple of options\
    \ on how to do so. It’s now time to put this logic in action by building the final\
    \ component in our feature: the one responsible for fetching the menu data from\
    \ the API.\n\n## Practice Time\n\nThe API responses we’ve seen in the chapter\
    \ have all been flat JSON arrays, meaning we can decode an array of `MenuItem`s\
    \ as long as `MenuItem` itself is `Decodable`. How would you decode `MenuItem`\
    \ if the response was an object? For example:\n\n```\n{\n\"items\": [\n{\n\"name\"\
    : \"spaghetti carbonara\",\n\"category\": \"pasta\",\n\"spicy\": false\n},\n{\n\
    \"name\": \"penne all'arrabbiata\",\n\"category\": \"pasta\",\n\"spicy\": true\n\
    }\n]\n}\n```\n\n## Key Takeaways\n\n*   **One approach to test JSON decoding logic\
    \ is to define an inline** **String, convert it to** **Data, and use it as the\
    \ input for** **JSONDecoder**. This approach is useful for input JSONs that have\
    \ few keys and to make the input value to model property relationship clear.\n\
    \n*   **Another option is to define the input in a dedicated JSON file and convert\
    \ that to Data in the test**. This approach is useful for input objects with many\
    \ keys but adds a layer of indirection between the input and the resulting SUT\
    \ properties.\n\n*   **Keep your tests tidy by extracting the logic to convert\
    \ from JSON to** **Data** **into helper functions**.\n\n*   **Testing JSON decoding\
    \ logic is valuable if there is custom logic required to conform to** **Decodable**.\
    \ If all the model properties match the input JSON’s keys, Swift takes care of\
    \ everything for us, and a test for it is redundant.\n\n## Endnote\n\n1.  There\
    \ are options other than REST for an API backend. Two that are gaining more and\
    \ more popularity are [GraphQL](https://graphql.org/) and [ProtoBufs](https://developers.google.com/protocol-buffers).\
    \ Both of them add a type-safety layer to the API, which you can – and should\
    \ – leverage to code-generate all the conversion logic between API responses and\
    \ application domain objects.\n\n    ProtoBufs serializes data in a custom format\
    \ that is more efficient than JSON. GraphQL responds with JSON objects, but stands\
    \ out for its `query language`. Rather than having different endpoints for different\
    \ resources, you ask a GraphQL backend for data by sending it a query that describes\
    \ the information you need.\n\n    In a small application like ours, the overhead\
    \ of adopting either of those solutions dwarfs the benefits we would get in terms\
    \ of maintainability and efficiency."
  trans: "\n# 测试 JSON 解码值得吗？\n\n视情况而定。与软件开发中的其他事项一样，这涉及权衡取舍。\n\n在我们之前编写的测试中，大部分测试内容都是\
    \ Swift 的 `JSONDecoder` 的行为。这段代码我们无法控制，而且由于它来自 Swift 标准库，我们可以安全地假设它能按预期工作。\n\n\
    如果你需要做的仅仅是将 `Decodable` 添加到某个类型遵循的协议列表中，以解码来自 API 的 JSON 数据，那么测试可能不值得。如果你仍想为代码变更提供一道安全防线，可以编写一个更简单的测试，只需确保解码过程不会抛出错误即可：\n\
    \n```\nfunc testWhenDecodingFromJSONDataDoesNotThrow() throws {\nlet json = #\"\
    { \"name\": \"a name\", \"category\": \"a category\", \"spicy\": true }\"#\nlet\
    \ data = try XCTUnwrap(json.data(using: .utf8))\nXCTAssertNoThrow(try JSONDecoder().decode(MenuItem.self,\
    \ from: data))\n}\n```\n\n如果你在解码过程中进行了某些非平凡的操作，那么编写一个测试来确保一切工作正常就很有价值了。\n\n例如，假设\
    \ JSON 中 `category` 字段对应的是一个对象，而不是一个普通字符串：\n\n```\n{\n\"name\": \"tortellini alla\
    \ panna\",\n\"category\": {\n\"name\": \"pasta\",\n\"id\": 123\n},\n\"spicy\"\
    : false\n}\n```\n\n要将这个 JSON 解码成我们的 `MenuItem` 对象，我们需要在编译器通过 `Decodable` 为我们合成的代码之外，添加一些额外的代码：\n\
    \n让我们用这个输入更新初始测试，看看会发生什么：\n\n```\n// MenuItemTests.swift\n// ...\nfunc testWhenDecodedFromJSONDataHasAllTheInputProperties()\
    \ throws {\nlet json = \"\"\"\n{\n\"name\": \"a name\",\n\"category\": {\n\"name\"\
    : \"a category\",\n\"id\": 123\n},\n\"spicy\": false\n}\n\"\"\"\nlet data = try\
    \ XCTUnwrap(json.data(using: .utf8))\nlet item = try JSONDecoder()    .decode(MenuItem.self,\
    \ from: data)\nXCTAssertEqual(item.name, \"a name\")\nXCTAssertEqual(item.category,\
    \ \"a category\")\nXCTAssertEqual(item.spicy, false)\n}\n```\n\n测试失败，错误信息如下：\n\
    \n```\ntypeMismatch(\nSwift.String,\nSwift.DecodingError.Context(\ncodingPath:\
    \ [\nCodingKeys(stringValue: \"category\", intValue: nil)\n],\ndebugDescription:\
    \ \"Expected to decode String but found a dictionary instead.\", underlyingError:\
    \ nil\n)\n)\n```\n\n错误信息很密集，但通过阅读，你可以理解解码过程正在为 \"category\" 键寻找一个 `String`，但实际却得到一个字典。这正是我们修改\
    \ JSON 输入后所预期的错误。\n\n一种能使该测试通过的实现方案是引入一个嵌套的私有对象来解码 category，并将其名称转发给 `category`\
    \ 属性：\n\n```\n// MenuItem.swift\nstruct MenuItem {\nlet name: String\nlet spicy:\
    \ Bool\nprivate let categoryObject: Category\nvar category: String { categoryObject.name\
    \ }\nenum CodingKeys: String, CodingKey {\ncase name, spicy\ncase categoryObject\
    \ = \"category\"\n}\nstruct Category: Equatable, Decodable {\nlet name: String\n\
    }\n}\n// ...\nextension MenuItem: Decodable {}\n// 这是为了让使用了 // 硬编码菜单的现有代码能够编译。\n\
    extension MenuItem {\ninit(category: String, name: String, spicy: Bool) {\nself.categoryObject\
    \ = Category(name: category)\nself.name = name\nself.spicy = spicy\n}\n}\n```\n\
    \n对于像本例中这样非平凡的 JSON 结构，我认为测试是一种有用的反馈机制，可以指导解码的实现。\n\n还需要记住的一点是，我们总是在网络请求或其他类型的数据传输过程中调用\
    \ JSON 解码；这不是我们可能在 ViewModel 中直接调用的东西。因为 `MenuFetching` 中 `fetchMenu` 的返回类型是 `AnyPublisher<[MenuItem],\
    \ Error>`，从远程 API 获取菜单的组件也必须将接收到的数据解码为 `[MenuItem]`。只要解码过程没有自定义逻辑，那么如果出现问题，网络组件的测试就会失败。也就是说，测试网络代码会间接地执行\
    \ JSON 解码逻辑。\n\n如果你的 API 可以通过很少甚至无需自定义代码就能解码，那么最好直接跳到实现网络代码，省下为解码逻辑编写测试的时间。这是因为\
    \ Swift 标准库负责处理解码；测试它不是你的责任。\n\n然而，如果存在一定量的特定解码逻辑，就像前面的例子那样，那么一组有针对性的测试将帮助你实现它，并确保它不会出错。\n\
    \n一个 TDD 纯粹主义者现在可能会抓狂并对我愤怒地尖叫。我怎敢在一本关于测试驱动开发的书中建议不写测试也是可以的？！\n\n**测试驱动开发是一种实践，而非一种生活方式。如果写某些代码的测试优先方法，无论短期还是长期回报都不值得，那么不为其编写测试也是可以的。**\n\
    \n我们已经探讨了何时适合应用 TDD 来编写 JSON 解码逻辑，并看到了几种实现方式。现在是时候通过构建我们功能中的最后一个组件——负责从 API 获取菜单数据的组件——来将这一逻辑付诸实践了。\n\
    \n## 实践时间\n\n我们在本章中看到的 API 响应都是扁平的 JSON 数组，这意味着只要 `MenuItem` 本身遵循了 `Decodable`，我们就可以解码\
    \ `MenuItem` 的数组。如果响应是一个对象，你将如何解码 `MenuItem`？例如：\n\n```\n{\n\"items\": [\n{\n\"\
    name\": \"spaghetti carbonara\",\n\"category\": \"pasta\",\n\"spicy\": false\n\
    },\n{\n\"name\": \"penne all'arrabbiata\",\n\"category\": \"pasta\",\n\"spicy\"\
    : true\n}\n]\n}\n```\n\n## 关键要点\n\n- **测试 JSON 解码逻辑的一种方法是定义一个内联的 `String`，将其转换为\
    \ `Data`，并将其作为 `JSONDecoder` 的输入。** 这种方法适用于键较少且需要明确输入值到模型属性关系的输入 JSON。\n\n- **另一种选择是在专门的\
    \ JSON 文件中定义输入，并在测试中将其转换为 `Data`。** 这种方法适用于具有许多键的输入对象，但会在输入和最终的 SUT 属性之间增加一层间接性。\n\
    \n- **通过将 JSON 转换为 `Data` 的逻辑提取到辅助函数中，保持测试的整洁性。**\n\n- **如果需要自定义逻辑来遵循 `Decodable`，那么测试\
    \ JSON 解码逻辑就是有价值的。** 如果所有模型属性都与输入 JSON 的键匹配，Swift 会为我们处理一切，那么为其编写测试就是多余的。\n\n\
    ## 尾注\n\n1. 除了 REST 之外，还有其他用于 API 后端的选项。其中越来越受欢迎的两种是 [GraphQL](https://graphql.org/)\
    \ 和 [ProtoBufs](https://developers.google.com/protocol-buffers)。两者都为 API 添加了一层类型安全层，你可以（并且应该）利用它来自动生成\
    \ API 响应与应用程序领域对象之间的所有转换逻辑。\n\n   ProtoBufs 以一种自定义的、比 JSON 更高效的格式序列化数据。GraphQL\
    \ 以 JSON 对象响应，但其查询语言脱颖而出。你无需为不同资源设置不同端点，而是通过向 GraphQL 后端发送一条描述所需信息的查询来请求数据。\n\n\
    \   在我们这样的小型应用程序中，采用这两种解决方案所带来的开销，远大于我们在可维护性和效率方面能获得的好处。\n"
- fmt: '# 10. Testing Network Code


    *How do you write tests for code interfacing with the network?*


    *By sidestepping it with a`Stub`, to simulate different behaviors and avoid flaky
    tests.*


    A common problem faced when trying to test networking code is that the network
    is unpredictable and slow, resulting in non-deterministic tests — they may pass
    one time and fail the next.


    In this chapter, we’ll see how to use the *Dependency Inversion Principle* and
    *Stub Test Double* techniques to decouple our code from the network’s real-world
    constraints.


    The remote menu loading feature is almost complete. We built a view capable of
    updating when data comes in from the remote API and made the domain model `Decodable`.
    It’s now time to implement the logic loading the data from the network. Let’s
    call the object responsible for this `MenuFetcher`.


    Apple provides an advanced and versatile system for making network calls via `URLSession`
    in the Foundation framework, and we shall use it for our networking implementation.
    We also know that `MenuFetcher` has to conform to `MenuFetching`, the abstraction
    we defined in Chapter [7](#501287_1_En_7_Chapter.xhtml). The `protocol` is the
    contract between ViewModel and lower-level components on how to fetch the menu
    from a remote resource.


    `MenuFetching` defines the behavior we need to implement. When the request succeeds,
    it should return the received `Data` converted into a `[MenuItem]`. When the request
    fails, it should send through the error it received. Let’s write the test list
    for `MenuFetcher` based on that spec:


    ```

    // MenuFetcherTests.swift

    @testable import Albertos

    import XCTest

    class MenuFetcherTests: XCTestCase {

    func testWhenRequestSucceedsPublishesDecodedMenuItems() {}

    func testWhenRequestFailsPublishesReceivedError() {}

    }

    ```


    A natural starting point here would be to hit the remote API using `URLSession`
    and assert the result matches our expectation.


    Directly hitting the network in the unit tests is undesirable. It results in slow
    and flaky tests and makes it hard to exercise all of the different scenarios.
    Let see why and what to do about it.


    ## Why You Shouldn’t Make Network Requests in Your Unit Tests


    To understand the limitations of testing direct networking, let’s write such a
    test ourselves.


    So far in the book, we’ve used Wishful Coding for most of our new code. Wishful
    Coding is useful to get started writing code when you’re not sure what shape it
    should take, but we’ve worked with enough Combine by now to have a clear idea
    of the structure we should use. Let’s begin with an incomplete implementation
    of `MenuFetcher` so that we can write a full test without compiler errors:


    ```

    // MenuFetcher.swift

    import Combine

    class MenuFetcher: MenuFetching {

    func fetchMenu() -> AnyPublisher {

    return Future { $0(.success([])) }.eraseToAnyPublisher()

    }

    }

    ```


    The fetching request returns an `AnyPublisher<[MenuItem], Error>`, which sends
    asynchronous updates. We already saw in Chapter [7](#501287_1_En_7_Chapter.xhtml)
    that we can test this kind of code by subscribing to it with `sink` and using
    an `XCTestExpectation` to wait for a new value:


    ```

    // MenuFetcherTests.swift

    // ...

    func testWhenRequestSucceedsPublishesDecodeMenuItems() {

    let menuFetcher = MenuFetcher()

    let expectation = XCTestExpectation(description: "Publishes decoded [MenuItem]")

    menuFetcher.fetchMenu()

    .sink(

    receiveCompletion: { _ in },

    receiveValue: { items in

    // How to test if the value of items is // correct?

    expectation.fulfill()

    }

    )

    .store(in: &cancellables)

    wait(for: [expectation], timeout: 1)

    }

    ```


    Writing this test brings up a question: how can we assert that `MenuFetcher` publishes
    the correct value?


    Because the data comes from the remote API, the only way to know what values to
    expect is to look there. Once we know what values the backend holds, we can use
    some broad-stroke assertions, for example, checking that the count is the same
    and that the first and last elements match.


    You can find a fake version of the API at [`https://github.com/mokagio/tddinswift_fake_api/`](https://github.com/mokagio/tddinswift_fake_api/).
    In theme with moving in small steps and only write as little code as necessary,
    this fake API is actually merely a container for JSON files. The endpoint for
    the menu list is nothing more than the URL of the fake response static JSON.


    Fetching static JSONs from a remote resource is an excellent way to simulate the
    real-world behavior of interfacing with a fully fledged API backend:


    ```

    // MenuFetcherTests.swift

    // ...

    menuFetcher.fetchMenu()

    .sink(

    receiveCompletion: { _ in },

    receiveValue: { items in

    XCTAssertEqual(items.count, 42)

    XCTAssertEqual(items.first?.name, "spaghetti carbonara")

    XCTAssertEqual(items.last?.name, "pasta all''arrabbiata")            expectation.fulfill()

    }

    )

    ```


    It’s okay to use a looser set of assertions in this instance because we already
    wrote a comprehensive test for the decoding in the previous chapter. If that wasn’t
    the case, and the JSON decoding logic was nontrivial, I’d encourage you to at
    least check that one element in the array has all the expected properties from
    its JSON counterpart.


    Running the tests with the `Cmd U` keyboard shortcut will show a failure. No surprise
    there: our initial implementation returns a hardcoded empty array.


    Let’s implement a real call to the network using `URLSession` and Combine:


    ```

    // MenuFetcher.swift

    import Combine

    import Foundation

    class MenuFetcher: MenuFetching {

    func fetchMenu() -> AnyPublisher {

    let url = URL(string:

    "https://raw.githubusercontent.com/mokagio/tddinswift_fake_api/trunk/menu_response.json")!

    URLSession.shared

    .dataTaskPublisher(for: URLRequest(url: url))

    .map { $0.data }

    .decode(type: [MenuItem].self, decoder: JSONDecoder())

    .eraseToAnyPublisher()

    }

    }

    ```


    The test should now pass. I say *should* because there are a few factors that
    might make it fail.


    First of all, if the menu in the backend changes, the test will fail. For example,
    if Alberto adds a new dish, the expectation on the count will fail.'
