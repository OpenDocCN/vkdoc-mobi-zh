    \ Itty Bitty Apps 团队的各位，感谢你们的对话、支持和陪伴，以及作为好朋友的陪伴。特别感谢亚当·约翰逊、查理·希尔、马丁·赫鲁和理查德·莫尔特对我早期草稿的反馈，以及萨缪埃莱·菲奥里尼最初的鼓励。我还要感谢克里斯·图米和斯蒂芬·维卡里，他们在《The\
    \ Bike Shed》播客上周复一周分享关于测试的想法，我也是在那里听到了美妙的“有益压力”类比，以及本·奥伦斯坦，我从他那里学到了“神秘嘉宾”模式。感谢所有理应在这里，但因我的疏忽而忘记提及的人。\n\
    \n借用琳恩·特鲁斯在《吃，射与叶子》中的话，我要感谢学识渊博的文字编辑和技术编辑，他们试图理清我的写作并使我免于尴尬。凡固执地保留不足之处，皆为我一人之过。感谢每一位曾访问我博客\
    \ [`mokacoding.com`](https://mokacoding.com) 的人。你们的反馈和支持不断为我的工作注入动力。\n\n最后，感谢您，亲爱的读者。感谢您决定拿起这本书，并分享您宝贵的时间与我相伴。\n\
    \n# 关于作者 / 关于技术审稿人\n\n# 1. 为什么选择测试驱动开发？\n\n## 什么是测试？\n\n《牛津英语词典》将名词 *test* 定义为：“*一种旨在确定某物的质量、性能或可靠性的程序，尤其是在其被广泛使用之前。*”在软件开发领域，我们可以将此定义调整为：“*一种旨在确定软件质量、性能或可靠性的程序，尤其是在其交付给用户之前。*”\n\
    \n测试我们的软件，本质上就是运行它并验证其行为是否符合预期。\n\n以这个“Hello, world!”脚本为例：\n\n```\n#!/usr/bin/env\
    \ xcrun swift\nfunc main() {\n    guard CommandLine.argc > 1 else {\n        print(\"\
    Hello, world!\")\n        return\n    }\n    print(\"Hello, \\(CommandLine.arguments[1])!\"\
    )\n}\nmain()\n```\n\n一个测试可以是：无输入运行它，即 `./hello_world.swift`，并检查它是否输出“Hello, world!”。然后，我们可以用特定输入运行它，并验证它是否在问候语中使用了该输入。例如，`./hello_world.swift\
    \ Ada` 应输出“Hello, Ada!”。\n\n同样，你可以启动 iOS 模拟器中的应用，点击其 UI 检查其行为是否按编程设定运行。或者，你可以在\
    \ Web 应用中通过表单提交数据，然后检查数据库是否包含该数据。\n\n以上所有例子都有一个共同特征：需要有人来运行软件并验证其行为。这些是*手动*测试。\n\
    \n要按计划持续交付高质量软件，仅靠手动测试是不够的。\n\n## 手动测试效率低下\n\n我们可以手动彻底测试像 `hello_world.swift`\
    \ 这样的小脚本，因为其功能集有限，但实际程序并非如此简单。即使是最小的应用，也存在许多可能的代码路径、代码接受的输入排列组合以及用户可在系统中采取的步骤。要手动测试所有这些，将花费*大量*时间。\n\
    \n手动测试既耗时又成本高昂。无论执行测试的是谁，无论是软件或质量保证工程师、产品负责人还是第三方公司，真人需要支付薪水。他们还需要休息时间、会生病、可能忘记事情，而且不可避免地会犯错。\n\
    \n然而，为了节省时间和金钱而跳过测试将是一个糟糕的举动。如果我们不在交付前测试产品，用户就会替我们测试。这远非理想。虽然我们可能会为发现一个 bug 而庆祝，但用户却会感到沮丧，并可能转而使用竞争对手的产品。\n\
    \n必须有一种方法，能够高度可信地测试我们的软件，速度快，且无需人类完成所有工作。\n"
- fmt: "# Code That Checks Other Code\n\nSoftware developers write code to automate\
    \ tasks that would otherwise be manual. Over the past decades, software has been\
    \ “eating the world” as investor Marc Andreessen put it [in a 2011 essay](https://a16z.com/2011/08/20/why-software-is-eating-the-world/).\n\
