  trans: '

    # 6. 测试静态 SwiftUI 视图


    *当没有直接的方法来测试 SwiftUI 视图时，你该如何在视图层运用测试驱动开发？*


    *通过将所有视图配置逻辑提取到一个专用对象中，并转而测试该对象。*


    Xcode 预览和手动测试并非确保视图行为正确的唯一途径。在本章中，我们将学习如何利用测试来指导我们实现视图行为。关键在于让视图变得*谦逊*，剥离所有逻辑，并让它向一个不绑定
    SwiftUI 的对象询问显示内容，这样我们就能轻松地以测试优先的方式实现它。我们将这个对象称为 *ViewModel*，并探讨如何为我们的两个视图构建它。


    ## 视图层呈现逻辑的问题


    在上一章中，我们为 `MenuItem` 添加了一个 `spicy` 属性，以开始实现 Alberto 提出的视觉提示需求，用以标识哪些菜品是辣的。该功能
    UI 的第一个迭代可以是一个简单的辣椒表情符号：![../images/501287_1_En_6_Chapter/501287_1_En_6_Figb_HTML.gif](img/501287_1_En_6_Figb_HTML.gif)。


    我们可能会忍不住在现有的 `MenuList` 代码中添加所需的呈现逻辑，从而将


    ```

    Text(item.name)

    ```


    改为


    ```

    Text(item.spicy ? "\(item.name) 🌶" : item.name)

    ```


    这种方法首先面临一个实际问题：将呈现逻辑嵌入视图层会迅速使其臃肿不堪，难以阅读。添加辣度指示符的代码虽然只有一行，但情况并非总是如此；有时可能需要处理一个枚举进行分支判断，或读取多个值。


    即使你不介意臃肿的视图文件，测试这些代码也是问题。截至目前，苹果并未提供直接对 SwiftUI 视图编写单元测试的方法，而是鼓励开发者使用 Xcode 预览进行迭代。


    预览虽然是了解布局效果的绝佳反馈机制，但无法像测试那样，以同等精细度告诉你逻辑是否正确。


    为 SwiftUI 视图编写测试并不方便，因为我们唯一能检查的出口是其*不透明*（[`opaque`](https://docs.swift.org/swift-book/LanguageGuide/OpaqueTypes.html)）的
    `body` 属性。我们可以这样定义一个视图：


    ```

    import SwiftUI

    struct ExampleView: View {

    var body: some View {

    VStack {

    Text("Title").bold()

    Text("Subtitle")

    }

    }

    }

    ```


    但在运行时访问 `body` 属性时，它实际上是一个非常复杂的对象：¹


    ```

    VStack>(_tree: SwiftUI._VariadicView.Tree<SwiftUI._VStackLayout, ...

    ```


    这看似是一种限制，但该框架的声明式哲学使得使用者无需担心 `body` 的内容。


    “视图是状态的函数，而非事件的序列，”苹果的 SwiftUI 工程师 Luca Bernardi 在 WWDC 2019 的演讲 [*SwiftUI 中的数据流*](https://developer.apple.com/videos/play/wwdc2019/226/%253Ftime%253D589)
    中解释道。SwiftUI 的单向数据流架构意味着，开发者影响视图的唯一旋钮就是作为输入提供状态。


    编写测试来检查视图本身价值不大，因为 body 的运行时值是 SwiftUI 工作方式的实现细节。只要我们遵循框架的规则，就可以相信，如果为视图提供正确的状态，它就会按预期渲染在屏幕上。


    **SwiftUI 并未限制可测试性，反而增强了它！** 它使应用 *划分问题并顺序解决* 变得既简单又安全。


    ## 从视图实现中解耦呈现逻辑


    在上述内联方法中，`MenuList` 负责两件事：定义菜单行的布局，以及决定是否为每个菜品添加辣度指示符。它承担了两项职责，也即在解决两个问题。


    布局定义是 SwiftUI 领域的问题；`MenuList` 是解决它的最佳位置。然而，评估是否添加 🌶 符号的呈现逻辑没有理由与 SwiftUI 框架绑定：我们可以独立构建它。


    让 `MenuList` 既负责定义布局又决定其内容，这会膨胀其“自我认知”。我们最好让它变得*谦逊*²，只处理它最擅长的事情：定义布局。


    为了限制 `MenuList` 的野心，我们可以将决定其显示内容所需的逻辑提取到一个专用对象中，并使用 TDD 构建该对象。完成后，我们将让 `MenuList`
    向这个新组建询问显示内容。


    ## 预备重构：缩小工作范围


    添加辣度提示是对单个菜单行级别的改动，但我们访问行的唯一途径是 `MenuList`。为了简化工作，让我们重构视图，隔离出需要处理的部分：


    ```

    // MenuList.swift

    import SwiftUI

    struct MenuList: View {

    let sections: [MenuSection]

    var body: some View {

    List {

    ForEach(sections) { section in

    Section(header: Text(section.category)) {

    ForEach(section.items) { item in

    MenuRow(item: item)

    }

    }

    }

    }

    }

    }

    // MenuRow.swift

    import SwiftUI

    struct MenuRow: View {

    let item: MenuItem

    var body: some View {

    Text(item.name)

    }

    }

    ```


    缩小代码作用范围使得推理和操作都更加容易。


    由于我们目前还没有视图的测试，确认这次重构是否成功的唯一方法就是查看 Xcode 预览或启动应用。

    '
- fmt: "# ViewModel\n\nThe next step is to write a test for the object in which we’ll\
    \ move the presentation logic for the `MenuRow`. How should we call this?\n\n\
    `ViewModel` is a popular name for this kind of object. The term comes from the\
    \ MVVM pattern for building UI applications [introduced by Microsoft in 2005](https://docs.microsoft.com/en-us/archive/blogs/johngossman/introduction-to-modelviewviewmodel-pattern-for-building-wpf-apps)\
    \ and represents the \"Model of a View, [...] a specialization of the Model that\
    \ the View can use for data-binding.\"\n\nAn alternative name could be Presentation\
    \ Model, as [defined by Martin Fowler](https://martinfowler.com/eaaDev/PresentationModel.html).\
    \ I tend to prefer `ViewModel`, especially because of the data-binding capabilities\
    \ that SwiftUI offers – more on those in the next chapter.\n\nAs usual, let’s\
    \ start with the test list:\n\n```\n// MenuRowViewModelTests.swift\n@testable\
    \ import Albertos\nimport XCTest\nclass MenuRowViewModelTests: XCTestCase {\n\
    func testWhenItemIsNotSpicyTextIsItemNameOnly() {}\nfunc testWhenItemIsSpicyTextIsItemNameWithChiliEmoji()\
    \ {}\n}\n```\n\nWhat’s the simplest scenario to tackle first? The one where we\
    \ don’t have to do any extra work:\n\n```\nfunc testWhenItemIsNotSpicyTextIsItemNameOnly()\
    \ {\nlet item = MenuItem.fixture(name: \"name\", spicy: false)\nlet viewModel\
    \ = MenuRow.ViewModel(item: item)\n// Compiler says:         // Type 'MenuRow'\
    \ has no member 'ViewModel'\nXCTAssertEqual(viewModel.text, \"name\")\n}\n```\n\
    \nThe compiler points out that there is no `ViewModel` type yet. Because a `ViewModel`\
    \ is tied to a single view, using a [nested type](https://docs.swift.org/swift-book/LanguageGuide/NestedTypes.html)\
    \ makes the one-to-one relationship clear. Of course, a standalone `MenuRowViewModel`\
    \ would do as well.\n\nWhen using the nested type approach, we should still place\
    \ the `ViewModel` in a dedicated file, to make it easier to find it when using\
    \ Xcode’s Open Quickly functionality:\n\n```\n// MenuRow.ViewModel.swift\nextension\
    \ MenuRow {\nstruct ViewModel {\nlet text: String\ninit(item: MenuItem) {\ntext\
    \ = \"\"\n}\n}\n}\n```\n\nThe first test now compiles but fails because of the\
    \ empty string we set as the `text` value.\n\nLet’s make the test pass by updating\
    \ the `MenuRow.ViewModel init` to\n\n```\ninit(item: MenuItem) {\ntext = item.name\n\
    }\n```\n\nNow, let’s write a test for the chili addition:\n\n```\nfunc testWhenItemIsSpicyTextIsItemNameWithChiliEmoji()\
    \ {\n    let item = MenuItem.fixture(name: \"name\", spicy: true)\n    let viewModel\
    \ = MenuRow.ViewModel(item: item)\n    XCTAssertEqual(viewModel.text, \"name \U0001F336\
    \")\n}\n```\n\nThe test fails. We can recycle the ternary operator from the start\
    \ of this chapter to make it pass and complete the implementation:\n\n```\ninit(item:\
    \ MenuItem) {\n    text = item.spicy ? \"\\(item.name) \U0001F336\" : item.name\n\
    }\n```\n\nWe’re in the green state. Is there any refactor we could apply to improve\
    \ the implementation? Nothing comes to mind, so let’s proceed to wire the `ViewModel`\
    \ to its view.\n\n## Using the ViewModel in the View\n\nIt’s time to update the\
    \ `body` result builder to read from the `ViewModel`. This will keep the view\
    \ humble, entrusting all the presentation logic to its `ViewModel` instance:\n\
    \n```\n// MenuRow.swift\nstruct MenuRow: View {\nlet viewModel: ViewModel\nvar\
    \ body: some View {\nText(viewModel.text)\n}\n}\n// MenuList.swift\nstruct MenuList:\
    \ View {\nlet sections: [MenuSection]\nvar body: some View {\nList {\nForEach(sections)\
    \ { section in\nSection(header: Text(section.category)) {\nForEach(section.items)\
    \ { item in\nMenuRow(viewModel: .init(item: item))\n}\n}\n}\n}\n}\n}\n```\n\n\
    Figure 6-1 shows the menu list with the spiciness indicator.\n\n![../images/501287_1_En_6_Chapter/501287_1_En_6_Fig1_HTML.png](images/501287_1_En_6_Chapter/501287_1_En_6_Fig1_HTML.png)\n\
    \n**Figure 6-1** The menu list rendered in the iPhone Simulator with the spiciness\
    \ indicator\n\n## Beyond Testability\n\nThanks to `MenuRow.ViewModel`, we implemented\
    \ the conditional logic to show the spiciness visual hint to the user in isolation\
