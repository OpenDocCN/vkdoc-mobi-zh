  raw: '## The Spy Test Double


    How can we verify that clicking the checkout button starts the payment’s flow
    in the `OrderDetail.ViewModelTests`?


    We don’t have access to `HippoPaymentsProcessor` to check its state or whether
    it sent a request to its backend. Besides, we already discussed the disadvantages
    of making real network requests in our tests in Chapter [10](#501287_1_En_10_Chapter.xhtml).
    We don’t have a way to check for changes in the application state either, since
    we are testing the ViewModel in isolation. What we *can* do is leverage the abstraction
    we put in place as a seam to insert something we can control in the tests.


    We can write a Test Double conforming to `PaymentProcessing` that registers calls
    to the method to start the flow that we can then inspect: a *Spy*. The name Spy
    refers to the double “spying” on how consumers call the dependency:


    ```

    // PaymentProcessingSpy.swift

    @testable import Albertos

    import Combine

    class PaymentProcessingSpy: PaymentProcessing {

    private(set) var receivedOrder: Order?

    func process(order: Order) -> AnyPublisher {

    receivedOrder = order

    return Result.success(()).publisher.eraseToAnyPublisher()

    }

    }

    ```


    We can write a test that uses the Spy to verify the desired behavior:


    ```

    // OrderDetail.ViewModelTests.swift

    func testWhenCheckoutButtonTappedStartsPaymentProcessingFlow() {

    // Create an OrderController and add some items to it

    let orderController = OrderController()

    orderController.addToOrder(item: .fixture(name: "name"))

    orderController.addToOrder(item: .fixture(name: "other name"))

    // Create the Spy

    let paymentProcessingSpy = PaymentProcessingSpy()

    let viewModel = OrderDetail.ViewModel(

    orderController: orderController,

    paymentProcessor: paymentProcessingSpy

    )

    viewModel.checkout()

    XCTAssertEqual(paymentProcessingSpy.receivedOrder, orderController.order)

    }

    ```


    To make the test pass, we only need to call the `process(order:)` method from
    the view model:


    ```

    // OrderDetail.ViewModel.swift

    func checkout() {

    paymentProcessor.process(order: orderController.order)

    }

    ```


    The test passes, but Xcode gives us a warning: “Result of call to ‘ `process(order:)`
    ’ is unused.” That’s a good reminder that even though we fired the call to process
    the order, we do not inform the user about its result. We’ll take care of that
    in the next chapter.


    Next, let’s update `OrderDetail` with a button using the new logic we wrote:


    ```

    // OrderDetail.swift

    // ...

    struct OrderDetail: View {

    // ...

    var body: some View {

    VStack(alignment: .center, spacing: 8) {

    // ...

    Button {

    viewModel.checkout()

    } label: {

    Text(viewModel.checkoutButtonText)

    .font(.callout)

    .bold()

    .padding(12)

    .foregroundColor(.white)

    .background(Color.crimson)

    .cornerRadius(10.0)

    }

    // ...

    ```


    ## The Downside of Using Spies


    Thanks to the Spy, we implemented and verified the order submission and payment
    initiation behavior.


    Spies are a useful tool to verify behavior that results in method calls or internal
    state changes in other objects. Using a Spy has a downside, though: it tightly
    couples the test with the code’s implementation details.


    A key rule for writing maintainable tests is that you should *test behavior, not
    implementation*. A test focused on behavior allows you to refactor the implementation
    many times, but one that depends too much on implementation details will break
    as soon as you start refactoring. To get the most value out of your test suite,
    keep it focused on asserting behavior.


    Spies go against the behavior-vs.-implementation guideline because they depend
    entirely on the interface of the type they duplicate.


    That’s why you should reach for a Spy, or any other Test Double for the matter,
    only when there is no other design option left available. In this chapter’s example,
    there was no way to implement our behavior via a method returning a value nor
    a way to ask `HippoPaymentsProcessor` whether the processing started, so using
    a Spy was the only option left.


    ## Practice Time


    Imagine you want to log events from the app to run analytics, such as tracking
    the ratio between the times patrons look at an item’s details and the times they
    order it. To do that, you decide to use Hippo Payments’ sister product, Hippo
    Analytics, which you’ll find in this chapter’s companion source code.


    How would you use TDD to integrate events and make sure they log the correct data?


    ## Key Takeaways


    *   **You can apply the Dependency Inversion Principle to third-party dependencies
    like you would for first-party ones**.


    *   **Abstracting third-party dependencies makes it easier to change vendors and
    allows you to use an API in line with the rest of your codebase**. When you make
    a third-party SDK conform to your abstraction, you can make it adopt your codebase’s
    coding style.


    *   **Use a Spy Test Double to ensure your components interact with the third-party
    as expected**. With a Spy, you can record method calls and state changes to verify
    they occur as desired.


    # 13. Testing a Conditional View Presentation


    *How do you test conditional logic to present a view when its code needs to live
    in the SwiftUI layer?*


    *By extracting * *as much of it as possible in the ViewModel layer and keep the
    SwiftUI implementation thin.*


    Sometimes, presenting a view is straightforward, such as loading the detail screen
    when selecting an item from a list. Other times, there is logic involved, like
    when the user should see a different alert based on an operation’s result.


    Whenever there’s logic involved in presenting a view, using tests to drive its
    implementation is the best way to make sure it’s correct, and far more efficient
    than keeping the logic in the UI and manually verifying it.


    In this chapter, we’ll learn how to use Test-Driven Development to present a different
    `Alert` depending on the payment processing result. To do so, we’ll move the core
    of the conditional logic at the ViewModel level and build on top of SwiftUI’s
    `Binding` mechanism to modify the view’s presentation state.'
  trans: '

    ## 间谍测试替身


    我们如何验证点击结账按钮会启动 `OrderDetail.ViewModelTests` 中的支付流程？


    我们无法访问 `HippoPaymentsProcessor` 来检查其状态或是否向其后端发送了请求。此外，我们在第 10 章已经讨论过在测试中发出真实网络请求的弊端。我们也没有办法检查应用程序状态的变化，因为我们是隔离测试
    `ViewModel` 的。我们*可以*做的是利用我们创建的抽象作为接缝（seam），从而在测试中插入我们可以控制的内容。


    我们可以编写一个符合 `PaymentProcessing` 协议的测试替身（Test Double），它能够记录对启动流程的方法的调用，以便我们后续进行检查：这就是*间谍（Spy）*。Spy
    这个名称指的是替身“暗中监视”消费者如何调用依赖项：


    ```

    // PaymentProcessingSpy.swift

    @testable import Albertos

    import Combine

    class PaymentProcessingSpy: PaymentProcessing {

    private(set) var receivedOrder: Order?

    func process(order: Order) -> AnyPublisher {

    receivedOrder = order

    return Result.success(()).publisher.eraseToAnyPublisher()

    }

    }

    ```


    我们可以编写一个使用该 Spy 来验证期望行为的测试：


    ```

    // OrderDetail.ViewModelTests.swift

    func testWhenCheckoutButtonTappedStartsPaymentProcessingFlow() {

    // 创建一个 OrderController 并向其中添加一些商品

    let orderController = OrderController()

    orderController.addToOrder(item: .fixture(name: "name"))

    orderController.addToOrder(item: .fixture(name: "other name"))

    // 创建 Spy

    let paymentProcessingSpy = PaymentProcessingSpy()

    let viewModel = OrderDetail.ViewModel(

    orderController: orderController,

    paymentProcessor: paymentProcessingSpy

    )

    viewModel.checkout()

    XCTAssertEqual(paymentProcessingSpy.receivedOrder, orderController.order)

    }

    ```


    为了让测试通过，我们只需要在视图模型中调用 `process(order:)` 方法：


    ```

    // OrderDetail.ViewModel.swift

    func checkout() {

    paymentProcessor.process(order: orderController.order)

    }

    ```


    测试通过了，但 Xcode 会给出一个警告：“Result of call to '' `process(order:)` '' is unused。” 这是一个很好的提醒：即使我们发起了处理订单的调用，我们并没有将结果告知用户。我们将在下一章处理这个问题。


    接下来，让我们使用刚刚编写的逻辑，为 `OrderDetail` 更新一个按钮：


    ```

    // OrderDetail.swift

    // ...

    struct OrderDetail: View {

    // ...

    var body: some View {

    VStack(alignment: .center, spacing: 8) {

    // ...

    Button {

    viewModel.checkout()

    } label: {

    Text(viewModel.checkoutButtonText)

    .font(.callout)

    .bold()

    .padding(12)

    .foregroundColor(.white)

    .background(Color.crimson)

    .cornerRadius(10.0)

    }

    // ...

    ```


    ## 使用 Spy 的缺点


    得益于 Spy，我们实现并验证了订单提交和支付启动的行为。


    Spy 是验证导致其他对象中方法调用或内部状态变化的行为的有用工具。然而，使用 Spy 有一个缺点：它将测试与代码的实现细节紧密耦合在一起。


    编写可维护测试的一个关键规则是：你应该*测试行为，而非实现*。专注于行为的测试允许你多次重构实现，但过度依赖实现细节的测试一旦开始重构就会出错。为了让你的测试套件发挥最大价值，请保持它专注于断言行为。


    Spy 违背了行为与实现的准则，因为它们完全依赖于其所模拟类型的接口。


    这就是为什么你应该只有在没有其他设计选项可用时，才考虑使用 Spy 或任何其他测试替身。在本章的示例中，无法通过返回一个值的方法来实现我们的行为，也无法询问
    `HippoPaymentsProcessor` 处理是否已启动，因此使用 Spy 是唯一的选择。


    ## 练习时间


    假设你想要从应用中记录事件以进行数据分析，例如追踪顾客查看商品详情与下单次数的比率。为此，你决定使用 Hippo Payments 的姊妹产品 Hippo
    Analytics，你可以在本章的配套源代码中找到它。


    你将如何使用 TDD 来集成事件并确保它们记录了正确的数据？


    ## 关键要点


    *   **你可以像对待第一方依赖一样，将依赖倒置原则应用于第三方依赖**。

    *   **抽象第三方依赖使得更换供应商更容易，并允许你使用与代码库其余部分一致的 API**。当你让第三方 SDK 符合你的抽象时，就可以使其采用你代码库的编码风格。

    *   **使用 Spy 测试替身来确保你的组件按预期与第三方交互**。借助 Spy，你可以记录方法调用和状态变化，以验证其按预期发生。


    # 13. 测试条件性视图展示


    *当展示视图的代码需要存在于 SwiftUI 层时，如何测试其条件逻辑？*


    *通过将尽可能多的逻辑提取到 ViewModel 层，并保持 SwiftUI 实现足够精简。*


    有时，展示视图是直接明了的，例如从列表中选择一个项目时加载详情页面。其他时候，则会涉及逻辑，比如用户应该根据操作结果看到不同的警告（Alert）。


    每当展示视图涉及逻辑时，使用测试来驱动其实现是确保其正确性的最佳方法，并且比将逻辑保留在 UI 中并手动验证要高效得多。


    在本章中，我们将学习如何使用测试驱动开发（TDD）来根据不同的支付处理结果展示不同的`Alert`。为此，我们将把条件逻辑的核心部分移到`ViewModel`层，并基于
    SwiftUI 的`Binding`机制来修改视图的展示状态。

