    \ `@Published` *属性中，并使用异步预期进行测试。*\n\n在前一章中，我们看到 SwiftUI 视图难以测试，而解决之道在于绕开它们，将所有展示逻辑迁移到专门的对象——ViewModel\
    \ 中。当所有展示逻辑都位于 ViewModel 时，你既能测试动态视图，也能测试静态视图。\n\nSwiftUI 和 Combine 能让你在数据可用时无缝更新视图。你可以让\
    \ ViewModel 使用 Combine *发布*属性，如果将视图订阅到这些属性，那么每当新值被发布时，SwiftUI 都会触发重新渲染。\n\n由于\
    \ SwiftUI 管理视图更新，你只需测试 ViewModel 是否发布了正确的值。\n\n在本章中，我们将探讨如何运用测试驱动开发（TDD）让 ViewModel\
    \ 通过 Combine 暴露数据，以及如何利用*依赖倒置原则（DIP）*将其与具体数据源解耦。\n\n我们将处理异步代码；如果你需要回顾这种执行模式与我们之前使用的同步逻辑有何不同，请前往第\
    \ 2 章的“异步代码的预期”部分。\n\nAlberto 喜欢根据当季食材和农产品市场能买到的便宜货频繁更换菜单。你决定从远程 API 读取菜单，这样无需发布新版本应用就能更新菜单。\n\
    \n从远程 API 加载菜单涉及以下步骤：\n\n*   通过 HTTP 从 API 获取数据\n*   将 API 响应中的数据转换为应用可理解的格式\n\
    *   在用户界面中展示获取到的数据\n\n让我们从 UI 工作开始。其余任务将在后续章节中处理。\n\n从面向用户的层开始，能让我们更快地获得功能的最早可测试版本，这与我们在第\
    \ 4 章的做法类似。我们可以与 Alberto 共享一个动态加载虚拟数据的应用版本，看看他的想法。如果我们先构建网络组件，就无法与他共享，因为它需要有 UI\
    \ 才能供用户操作。\n\n我们将编写的代码高度依赖 `SwiftUI` 和 `Combine`。在开始之前，先快速了解一下 `SwiftUI` 中的数据流。\n\
    \n## SwiftUI 与 Combine 如何实现无缝视图更新\n\n`SwiftUI` 与其前身 `UIKit` 和 `AppKit` 的一个主要区别在于，它的视图是不可变的。正如我们在前一章所见，视图是状态的函数，而非事件序列。状态是框架推导视图的唯一数据源。我们的代码无法直接改变视图；我们只能改变应用的状态。仅凭这一特性，SwiftUI\
    \ 就消除了由视图中状态不一致导致的整类错误。\n\n`SwiftUI` 的不可变性与 `Combine` 的流式处理能力相结合，提供了优雅的方式来保持视图与*流动*的数据同步。\n\
    \n异步操作的工具之一是 `Combine` 的 `Publisher`（发布者）类型，它可以随时间流式传输新值，并且对象可以订阅它。创建 `Publisher`\
    \ 的一种便捷方式是：获取一个对象，使其遵循 `ObservableObject` 协议，并在其一个或多个属性上使用 `@Published` 包装器。该包装器会生成一个\
    \ `Publisher`，每当属性发生变化时，它就会发送一个新值。\n\n而这两个框架之间的集成在此处真正大放异彩：`SwiftUI` 为遵循 `ObservableObject`\
    \ 的类型提供了一个 `@ObservedObject` 属性包装器。每当 `@ObservedObject` 的 `@Published` 属性发出新值时，`SwiftUI`\
    \ 就会自动触发视图的重新渲染。\n\n理论已经足够，让我们开始编码吧。\n"
- fmt: "# Make the ViewModel Stream Updates with `ObservableObject`\n\nFor SwiftUI\
    \ to do all the heavy lifting of keeping the view in sync with the data we load\
    \ from the API, we need to provide it an `ObservableObject` that exposes the data\
    \ through one or more `@Published` properties.\n\nIn Chapter [6](#501287_1_En_6_Chapter.xhtml),\
    \ we saw how to keep the view free of presentation logic using a ViewModel. The\
    \ ViewModel is the best candidate to become the view’s `@ObservedObject`. It’s\
    \ a natural extension of its duty: from the holder of static data for the view\
    \ to read to the holder of static and dynamic data for the view to read and sync\
    \ with.\n\nHow should `MenuList.ViewModel` behave when fetching the menu from\
    \ the remote API? Here’s an initial approach:\n\n- When the fetching starts, it\
    \ should publish an empty `[MenuSection]`.\n- If the fetching succeeds, it should\
    \ publish the received menu converted to `[MenuSection]` and appropriately grouped.\n\
    - If the fetching fails, it should publish an error.\n\nWe can translate these\
    \ requirements into a test list:\n\n```swift\n// MenuList.ViewModelTests.swift\n\
    // ...\nclass MenuList.ViewModelTests: XCTestCase {\n    // ...\n    func testWhenFetchingStartsPublishesEmptyMenu()\
    \ {}\n    func testWhenFecthingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()\
    \ {}\n    func testWhenFetchingFailsPublishesAnError() {}\n}\n```\n\nLet’s start\
    \ working on the simplest scenario to build up the implementation’s foundation:\n\
    \n```swift\nfunc testWhenFetchingStartsPublishesEmptyMenu() {\n    let viewModel\
    \ = MenuList.ViewModel(menu: [.fixture()])\n    XCTAssertTrue(viewModel.sections.isEmpty)\n\
    }\n```\n\nThis test fails, and if we look at the ViewModel’s current implementation,\
    \ it’s clear why: `MenuList.ViewModel` doesn’t fetch or publish data yet. The\
    \ `MenuList.ViewModel` version we wrote for the static screen uses its `init [MenuItem]`\
    \ parameter to generate the `sections`:\n\n```swift\n// MenuList.ViewModel.swift\n\
    extension MenuList {\n    struct ViewModel {\n        let sections: [MenuSection]\n\
    \        init(\n            menu: [MenuItem],\n            menuGrouping: @escaping\
    \ ([MenuItem]) -> [MenuSection] = groupMenuByCategory\n        ) {\n         \
    \   self.sections = menuGrouping(menu)\n        }\n    }\n}\n```\n\nThe simplest\
    \ thing we can do to make the test pass is to assign the result of calling `menuGrouping`\
    \ on an empty array to `sections`:\n\n```swift\n// MenuList.ViewModel.swift\n\
    extension MenuList {\n    struct ViewModel {\n        let sections: [MenuSection]\n\
    \        init(\n            menu: [MenuItem],\n            menuGrouping: @escaping\
    \ ([MenuItem]) -> [MenuSection] = groupMenuByCategory\n        ) {\n         \
    \   self.sections = menuGrouping([])\n        }\n    }\n}\n```\n\nThe change we\
    \ just made is the *simplest* thing to do, not the *best*. It’s a small change\
    \ that gets our new test to pass, establishing the green baseline against which\
    \ we can make the more substantial change of removing the `[MenuItem] init` parameter.\n\
    \nThe new test might be green, but the one for the original behavior now fails.\
    \ That’s okay: we intentionally changed the behavior that test asserted, making\
    \ it obsolete. When tests become obsolete, it’s appropriate to delete them. However,\
    \ rather than deleting it, let’s skip it for now as we might need some of that\
    \ code later when testing the success path:\n\n```swift\nfunc testCallsGivenGroupingFunction()\
    \ throws {\n    try XCTSkipIf(true, \"skipping this for now, keeping it to reuse\
    \ part of the code later on\")\n    // ...\n}\n```\n\nSkipping tests is better\
    \ than commenting them. For each skipped test, you’ll get an entry in the Xcode\
    \ Test navigator as well as an inline notice. A commented test goes under the\
    \ radar instead. Commented code tends to be forgotten and rot in the codebase;\
    \ a skipped test is harder to miss.\n\nFigures [7-1](#501287_1_En_7_Chapter.xhtml#Fig1)\
    \ and [7-2](#501287_1_En_7_Chapter.xhtml#Fig2) show how Xcode shows a skipped\
    \ test inline and in the Test navigator.\n\n![../images/501287_1_En_7_Chapter/501287_1_En_7_Fig2_HTML.jpg](images/501287_1_En_7_Chapter/501287_1_En_7_Fig2_HTML.jpg)\n\
    \nFigure 7-2: How Xcode reports skipped tests in the Test navigator\n\n![../images/501287_1_En_7_Chapter/501287_1_En_7_Fig1_HTML.png](images/501287_1_En_7_Chapter/501287_1_En_7_Fig1_HTML.png)\n\
    \nFigure 7-1: How Xcode reports skipped tests inline in the code editor\n\nOur\
    \ change to the ViewModel `init` made it ignore both `menu` and `menuGrouping`\
    \ parameters. Usually, I’d encourage you to remove unused code once you are in\
    \ the green state as part of the refactor step. In this case, we can expect to\
    \ use that code as we move forward in the implementation, so we’re better off\
    \ keeping them.\n\nWe can use the green test as a safety guard to refactor `MenuList.ViewModel`\
    \ to conform to `ObservableObject`. If during the refactor one of our changes\
    \ breaks the behavior, the test will tell us.\n\nLet’s make `MenuList.ViewModel`\
    \ conform to `ObservableObject` and wrap `sections` in `@Published`:\n\n```swift\n\
    // MenuList.ViewModel.swift\nimport Combine\nextension MenuList {\n    class ViewModel:\
    \ ObservableObject {\n        @Published private(set) var sections: [MenuSection]\n\
    \        init(\n            menu: [MenuItem],\n            menuGrouping: @escaping\
    \ ([MenuItem]) -> [MenuSection] = groupMenuByCategory\n        ) {\n         \
    \   self.sections = menuGrouping([])\n        }\n    }\n}\n```\n\nThere are a\
    \ few things to notice in this change. First of all, we had to `import Combine`\
    \ because it’s this framework that defines the `ObservableObject` protocol and\
    \ the `@Published` property wrapper.\n\n`MenuList.ViewModel` had to become a `class`\
    \ because `ObservableObject` requires the types conforming to it to be classes.\n\
    \nThe `sections` property had to change from `let` to `var`. That’s a requirement\
    \ for being wrapped with `@Published`. It makes sense: published values can change\
    \ over time.\n\nFinally, to make sure that only the code internal to `MenuList.ViewModel`\
    \ can change the `sections`, its access level is now `private(set)`: consumers\
    \ will be able to read it but not update it.\n\nAfter these changes, the tests\
    \ still pass. The refactor was successful.\n\nNow that we configured `MenuList.ViewModel`\
    \ to be an `ObservableObject` with a `@Published` property, it’s time to start\
    \ publishing values through it. For that, we have two tests left to write: one\
    \ for the happy path, when the request succeeds, and another for the failure path,\
    \ when the backend returns an error.\n\nI usually recommend tackling the failure\
    \ scenarios first to avoid neglecting error handling, because it’s tempting to\
    \ move to the next feature as soon as you finish implementing the happy path.\
    \ In this case, however, the happy path looks similar to the fetching start behavior,\
    \ which we already implemented: from an empty array to one with elements. Starting\
    \ from there has a lower entry threshold, it’s a smaller step forward to take:\n\
    \n```swift\n// MenuList.ViewModelTests.swift\n// ...\nfunc testWhenFecthingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()\
    \ {\n    // Arrange the ViewModel and its data source\n    // Act on the ViewModel\
    \ to trigger the update\n    // Assert the expected behavior\n}\n```\n\nWriting\
    \ this test’s structure brings up two questions:\n\n- How can we simulate a successful\
    \ fetching when we don’t have a real network component to use as the data source?\n\
    - The expected behavior is that the `@Published` sections update; how can we test\
    \ `@Published` values?\n\nLet’s focus on simulating receiving a value in the menu\
    \ fetching first."
  raw: '## Make the ViewModel Stream Updates with `ObservableObject`


    For SwiftUI to do all the heavy lifting of keeping the view in sync with the data
    we load from the API, we need to provide it an `ObservableObject` that exposes
    the data through one or more `@Published` properties.


    In Chapter [6](#501287_1_En_6_Chapter.xhtml), we saw how to keep the view free
    of presentation logic using a ViewModel. The ViewModel is the best candidate to
    become the view’s `@ObservedObject`. It’s a natural extension of its duty: from
    the holder of static data for the view to read to the holder of static and dynamic
    data for the view to read and sync with.


    How should `MenuList.ViewModel` behave when fetching the menu from the remote
    API? Here’s an initial approach:


    *   When the fetching starts, it should publish an empty `[MenuSection]`.


    *   If the fetching succeeds, it should publish the received menu converted to
    `[MenuSection]` and appropriately grouped.


    *   If the fetching fails, it should publish an error.


    We can translate these requirements into a test list:


    ```

    // MenuList.ViewModelTests.swift

    // ...

    class MenuList.ViewModelTests: XCTestCase {

    // ...

    func testWhenFetchingStartsPublishesEmptyMenu() {}

    func testWhenFecthingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()
    {}

    func testWhenFetchingFailsPublishesAnError() {}

    }

    ```


    Let’s start working on the simplest scenario to build up the implementation’s
    foundation:


    ```

    func testWhenFetchingStartsPublishesEmptyMenu() {

    let viewModel = MenuList.ViewModel(menu: [.fixture()])

    XCTAssertTrue(viewModel.sections.isEmpty)

    }

    ```


    This test fails, and if we look at the ViewModel’s current implementation, it’s
    clear why: `MenuList.ViewModel` doesn’t fetch or publish data yet. The `MenuList.ViewModel`
    version we wrote for the static screen uses its `init [MenuItem]` parameter to
    generate the `sections`:


    ```

    // MenuList.ViewModel.swift

    extension MenuList {

    struct ViewModel {

    let sections: [MenuSection]

    init(

    menu: [MenuItem],

    menuGrouping: @escaping ([MenuItem]) -> [MenuSection] = groupMenuByCategory

    ) {

    self.sections = menuGrouping(menu)

    }

    }

    }

    ```


    The simplest thing we can do to make the test pass is to assign the result of
    calling `menuGrouping` on an empty array to `sections`:


    ```

    // MenuList.ViewModel.swift

    extension MenuList {

    struct ViewModel {

    let sections: [MenuSection]

    init(

    menu: [MenuItem],

    menuGrouping: @escaping ([MenuItem]) -> [MenuSection] = groupMenuByCategory

    ) {

    self.sections = menuGrouping([])

    }

    }

    }

    ```


    The change we just made is the *simplest* thing to do, not the *best*. It’s a
    small change that gets our new test to pass, establishing the green baseline against
    which we can make the more substantial change of removing the `[MenuItem] init`
    parameter.


    The new test might be green, but the one for the original behavior now fails.
    That’s okay: we intentionally changed the behavior that test asserted, making
    it obsolete. When tests become obsolete, it’s appropriate to delete them. However,
    rather than deleting it, let’s skip it for now as we might need some of that code
    later when testing the success path:


    ```

    func testCallsGivenGroupingFunction() throws {

    try XCTSkipIf(true, "skipping this for now, keeping it to reuse part of the code
    later on")

    // ...

    }

    ```


    Skipping tests is better than commenting them. For each skipped test, you’ll get
    an entry in the Xcode Test navigator as well as an inline notice. A commented
    test goes under the radar instead. Commented code tends to be forgotten and rot
    in the codebase; a skipped test is harder to miss.


    Figures [7-1](#501287_1_En_7_Chapter.xhtml#Fig1) and [7-2](#501287_1_En_7_Chapter.xhtml#Fig2)
    show how Xcode shows a skipped test inline and in the Test navigator.


    ![../images/501287_1_En_7_Chapter/501287_1_En_7_Fig2_HTML.jpg](images/501287_1_En_7_Chapter/501287_1_En_7_Fig2_HTML.jpg)


    Figure 7-2


    How Xcode reports skipped tests in the Test navigator


    ![../images/501287_1_En_7_Chapter/501287_1_En_7_Fig1_HTML.png](images/501287_1_En_7_Chapter/501287_1_En_7_Fig1_HTML.png)


    Figure 7-1


    How Xcode reports skipped tests inline in the code editor


    Our change to the ViewModel `init` made it ignore both `menu` and `menuGrouping`
    parameters. Usually, I’d encourage you to remove unused code once you are in the
    green state as part of the refactor step. In this case, we can expect to use that
    code as we move forward in the implementation, so we’re better off keeping them.


    We can use the green test as a safety guard to refactor `MenuList.ViewModel` to
    conform to `ObservableObject`. If during the refactor one of our changes breaks
    the behavior, the test will tell us.


    Let’s make `MenuList.ViewModel` conform to `ObservableObject` and wrap `sections`
    in `@Published`:


    ```

    // MenuList.ViewModel.swift

    import Combine

    extension MenuList {

    class ViewModel: ObservableObject {

    @Published private(set) var sections: [MenuSection]

    init(

    menu: [MenuItem],

    menuGrouping: @escaping ([MenuItem]) -> [MenuSection] = groupMenuByCategory

    ) {

    self.sections = menuGrouping([])

    }

    }

    }

    ```


    There are a few things to notice in this change. First of all, we had to `import
    Combine` because it’s this framework that defines the `ObservableObject` protocol
    and the `@Published` property wrapper.


    `MenuList.ViewModel` had to become a `class` because `ObservableObject` requires
    the types conforming to it to be classes.


    The `sections` property had to change from `let` to `var`. That’s a requirement
    for being wrapped with `@Published`. It makes sense: published values can change
    over time.


    Finally, to make sure that only the code internal to `MenuList.ViewModel` can
    change the `sections`, its access level is now `private(set)`: consumers will
    be able to read it but not update it.


    After these changes, the tests still pass. The refactor was successful.


    Now that we configured `MenuList.ViewModel` to be an `ObservableObject` with a
    `@Published` property, it’s time to start publishing values through it. For that,
    we have two tests left to write: one for the happy path, when the request succeeds,
    and another for the failure path, when the backend returns an error.


    I usually recommend tackling the failure scenarios first to avoid neglecting error
    handling, because it’s tempting to move to the next feature as soon as you finish
    implementing the happy path. In this case, however, the happy path looks similar
    to the fetching start behavior, which we already implemented: from an empty array
    to one with elements. Starting from there has a lower entry threshold, it’s a
    smaller step forward to take:


    ```

    // MenuList.ViewModelTests.swift

    // ...

    func testWhenFecthingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()
    {

    // Arrange the ViewModel and its data source

    // Act on the ViewModel to trigger the update

    // Assert the expected behavior

    }

    ```


    Writing this test’s structure brings up two questions:


    *   How can we simulate a successful fetching when we don’t have a real network
    component to use as the data source?


    *   The expected behavior is that the `@Published` sections update; how can we
    test `@Published` values?


    Let’s focus on simulating receiving a value in the menu fetching first.'
  trans: "\n# 使用 `ObservableObject` 让 ViewModel 流式更新\n\n为了让 SwiftUI 能够承担繁重工作，使视图与我们从\
    \ API 加载的数据保持同步，我们需要为其提供一个 `ObservableObject`，该对象通过一个或多个 `@Published` 属性来公开数据。\n\
    \n在第 6 章中，我们了解了如何使用 ViewModel 让视图摆脱展示逻辑。ViewModel 是成为视图 `@ObservedObject` 的最佳候选者。这是其职责的自然延伸：从保存供视图读取的静态数据，扩展到保存供视图读取并同步的静态和动态数据。\n\
    \n当从远程 API 获取菜单时，`MenuList.ViewModel` 应该如何表现？以下是一个初步方案：\n\n-   获取开始时，应发布一个空的 `[MenuSection]`。\n\
    -   获取成功时，应发布接收到的菜单，并将其转换为 `[MenuSection]` 并进行适当分组。\n-   获取失败时，应发布一个错误。\n\n我们可以将这些需求转化为测试列表：\n\
    \n```swift\n// MenuList.ViewModelTests.swift\n// ...\nclass MenuList.ViewModelTests:\
    \ XCTestCase {\n    // ...\n    func testWhenFetchingStartsPublishesEmptyMenu()\
    \ {}\n    func testWhenFecthingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()\
    \ {}\n    func testWhenFetchingFailsPublishesAnError() {}\n}\n```\n\n让我们从最简单的场景开始，为构建实现打下基础：\n\
    \n```swift\nfunc testWhenFetchingStartsPublishesEmptyMenu() {\n    let viewModel\
    \ = MenuList.ViewModel(menu: [.fixture()])\n    XCTAssertTrue(viewModel.sections.isEmpty)\n\
    }\n```\n\n这个测试失败了，如果我们查看 ViewModel 的当前实现，原因显而易见：`MenuList.ViewModel` 尚未获取或发布数据。我们为静态屏幕编写的\
    \ `MenuList.ViewModel` 版本使用其 `init [MenuItem]` 参数来生成 `sections`：\n\n```swift\n\
    // MenuList.ViewModel.swift\nextension MenuList {\n    struct ViewModel {\n  \
    \      let sections: [MenuSection]\n        init(\n            menu: [MenuItem],\n\
    \            menuGrouping: @escaping ([MenuItem]) -> [MenuSection] = groupMenuByCategory\n\
    \        ) {\n            self.sections = menuGrouping(menu)\n        }\n    }\n\
    }\n```\n\n为了让测试通过，我们能做的最简单的事情就是将 `menuGrouping` 应用于空数组的结果赋值给 `sections`：\n\n```swift\n\
    // MenuList.ViewModel.swift\nextension MenuList {\n    struct ViewModel {\n  \
    \      let sections: [MenuSection]\n        init(\n            menu: [MenuItem],\n\
    \            menuGrouping: @escaping ([MenuItem]) -> [MenuSection] = groupMenuByCategory\n\
    \        ) {\n            self.sections = menuGrouping([])\n        }\n    }\n\
    }\n```\n\n我们刚刚所做的更改是*最简单*的做法，而非*最佳*做法。这是一个小的改动，使我们的新测试通过，建立了一个绿色基线，在此基础上我们可以进行更实质性的改动：移除\
    \ `[MenuItem] init` 参数。\n\n新测试可能通过了，但针对原始行为的测试现在失败了。这没关系：我们有意识地改变了该测试所断言的行为，使其过时。当测试过时时，删除它们是合适的。然而，与其删除它，不如暂时跳过它，因为我们稍后可能在测试成功路径时需要用到其中的一些代码：\n\
    \n```swift\nfunc testCallsGivenGroupingFunction() throws {\n    try XCTSkipIf(true,\
    \ \"暂时跳过此项，保留它以便稍后复用部分代码\")\n    // ...\n}\n```\n\n跳过测试比注释测试更好。对于每个跳过的测试，你会在 Xcode\
    \ 的测试导航器以及内联通知中看到一条记录。而被注释的测试则不易察觉。被注释的代码容易被遗忘并在代码库中腐化；而跳过的测试则更难被忽略。\n\n图 7-1\
    \ 和 7-2 展示了 Xcode 如何在代码编辑器中内联显示以及如何在测试导航器中显示跳过的测试。\n\n![../images/501287_1_En_7_Chapter/501287_1_En_7_Fig2_HTML.jpg](img/501287_1_En_7_Fig2_HTML.jpg)\n\
    \n图 7-2：Xcode 在测试导航器中报告跳过的测试\n\n![../images/501287_1_En_7_Chapter/501287_1_En_7_Fig1_HTML.png](img/501287_1_En_7_Fig1_HTML.png)\n\
    \n图 7-1：Xcode 在代码编辑器中内联报告跳过的测试\n\n我们对 ViewModel `init` 的修改使其忽略了 `menu` 和 `menuGrouping`\
    \ 这两个参数。通常，我会鼓励你在达到绿色状态后，在重构步骤中移除未使用的代码。在这种情况下，我们可以预期在后续实现中会用到这些代码，因此最好保留它们。\n\
    \n我们可以利用绿色测试作为安全防护，对 `MenuList.ViewModel` 进行重构，使其符合 `ObservableObject`。如果在重构过程中，我们的某个更改破坏了行为，测试会告诉我们。\n\
    \n让我们让 `MenuList.ViewModel` 遵循 `ObservableObject`，并将 `sections` 包装在 `@Published`\
    \ 中：\n\n```swift\n// MenuList.ViewModel.swift\nimport Combine\nextension MenuList\
    \ {\n    class ViewModel: ObservableObject {\n        @Published private(set)\
    \ var sections: [MenuSection]\n        init(\n            menu: [MenuItem],\n\
    \            menuGrouping: @escaping ([MenuItem]) -> [MenuSection] = groupMenuByCategory\n\
    \        ) {\n            self.sections = menuGrouping([])\n        }\n    }\n\
    }\n```\n\n这次更改中有几点需要注意。首先，我们必须 `import Combine`，因为正是这个框架定义了 `ObservableObject`\
    \ 协议和 `@Published` 属性包装器。\n\n`MenuList.ViewModel` 必须成为一个 `class`，因为 `ObservableObject`\
    \ 要求遵循它的类型必须是类。\n\n`sections` 属性必须从 `let` 改为 `var`。这是使用 `@Published` 包装的要求。这很合理：被发布的值会随时间变化。\n\
    \n最后，为了确保只有 `MenuList.ViewModel` 内部的代码才能修改 `sections`，其访问级别现在设为 `private(set)`：消费者可以读取它，但不能更新它。\n\
    \n完成这些更改后，测试仍然通过。重构成功了。\n\n现在我们已经将 `MenuList.ViewModel` 配置为一个带有 `@Published` 属性的\
    \ `ObservableObject`，是时候开始通过它发布值了。为此，我们还需要编写两个测试：一个用于请求成功的正向路径，另一个用于后端返回错误的失败路径。\n\
    \n我通常建议先处理失败场景，以避免忽视错误处理，因为一旦完成正向路径的实现，很容易就转向下一个功能。然而，在本例中，正向路径与我们已实现的获取开始行为类似：从一个空数组变为包含元素的数组。从这里入手门槛较低，是向前迈进的一小步：\n\
    \n```swift\n// MenuList.ViewModelTests.swift\n// ...\nfunc testWhenFecthingSucceedsPublishesSectionsBuiltFromReceivedMenuAndGivenGroupingClosure()\
    \ {\n    // 安排 ViewModel 及其数据源\n    // 对 ViewModel 执行操作以触发更新\n    // 断言预期行为\n\
    }\n```\n\n编写这个测试的结构引出了两个问题：\n\n-   当我们没有真实的网络组件作为数据源时，如何模拟成功的获取操作？\n-   预期行为是\
    \ `@Published` 的 sections 会更新；我们如何测试 `@Published` 的值？\n\n让我们先集中讨论如何在菜单获取中模拟接收一个值。\n"
- fmt: '## The Dependency Inversion Principle


    To simulate receiving a value or an error when fetching the menu, we need an object
    that fetches the menu in the first place. Eventually, that will be the networking
    component, but we haven''t built it yet. Because we''re working on the UI side
    of the fetching behavior, building the network component would be too big of a
    detour; it would slow down our feedback cycle. To solve this chicken-and-egg problem,
    we need to take a step back and look at our design.


    Instead of expecting a concrete type for the menu fetching in `MenuList.ViewModel`,
    we can define an abstraction and interact with it. The Swift way to do this is
    by using a `protocol`:


    ```

    // MenuFetching.swift

    import Combine

    protocol MenuFetching {

    func fetchMenu() -> AnyPublisher

    }

    ```


    The `fetchMenu` method returns an `AnyPublisher` with a `[MenuItem]` as its output.
    Combine defines `AnyPublisher` as a specialized `Publisher` meant only for consumption;
    you cannot `send` new values from it, only subscribe.


    In *Agile Software Development: Principles, Patterns, and Practices*, Robert C.
    Martin calls this technique of defining an abstraction between components **Dependency
    Inversion Principle**, DIP for short.


    DIP states that "High-level modules should not depend on low-level modules. Both
    should depend on abstractions." That is, `MenuList.ViewModel` should not depend
    on the object performing the network request but on an abstraction of the menu
    fetching operation. In our context, this means defining a `protocol` to represent
    the abstraction, `MenuFetching`, and have `MenuList.ViewModel` use it as the type
    it expects for its menu fetching component.


    The term "inversion" refers to the change from the dependency relationship used
    in the Object-Oriented Design methods at the time the principle was introduced,
    where high-level modules depended on low-level ones. In the traditional model,
    a change in a low-level module would require a change in the high-level module
    too, because of their direct dependency. "This predicament is absurd!" Martin
    exclaims. "It is the high-level, policy-setting modules that ought to be influencing
    the low-level, detailed modules. The modules that contain the high-level business
    rules should take precedence over, and be independent of, the modules that contain
    the implementation details."


    Applying Dependency Inversion has positive practical consequences in both the
    production and test code. In the production code, we can build a simple object
    conforming to `MenuFetching` for the ViewModel to use while we wait for the networking
    component to be ready. In the tests, we can create an object conforming to the
    protocol and simulate the fetch operation''s different results with it to verify
    how the ViewModel behaves. Objects created to simulate production ones during
    testing are called *Test Doubles*, and we''ll learn about them in the next chapter.


    ## Dependency Inversion vs. Dependency Injection


    Though they have similar names, it''s crucial not to confuse dependency *inversion*
    with *injection* *.*


    The Dependency Inversion Principle states you should define abstractions for the
    components to depend upon so that changes in a low-level component won''t affect
    the higher-level ones using it.


    Dependency Injection happens when you make your objects require instances of the
    other components in the system they need to interact with rather than creating
    them internally.


    Both DIP and DI make your software design more flexible but in subtly different
    ways: one refers to how objects should interact and the other to how objects should
    be built.


    ## Decouple the ViewModel from the Data Fetching with DIP


    We''ve seen that to decouple the ViewModel from the data fetching implementation
    details, we need to make it depend on the `MenuFetching` abstraction. Let''s implement
    this change starting from the production code.


    You might be asking: "Why aren''t we starting with a test?" When practicing TDD,
    you''re optimizing for fast feedback cycles. As we''ve seen in Chapter [3](#501287_1_En_3_Chapter.xhtml),
    the compiler is also part of the TDD workflow. In this instance, starting from
    a change in the production code rather than the tests gives us faster feedback
    because the compiler will point out all the code that needs to be updated:


    ```

    // MenuList.ViewModel.swift

    extension MenuList {

    class ViewModel: ObservableObject {

    @Published private(set) var sections: [MenuSection]

    init(

    menuFetching: MenuFetching,

    menuGrouping: @escaping ([MenuItem]) -> [MenuSection] = groupMenuByCategory

    ) {

    self.sections = menuGrouping([])

    }

    }

    }

    ```


    If you try to build the app and its test target with the `Shift Cmd U` keyboard
    shortcut, you''ll see one compiler error in `AlbertosApp.swift`:


    ```

    MenuList(viewModel: .init(menu: menu))

    // Compiler says:

    // - Extra argument ''menu'' in call

    // - Missing argument for parameter ''menuFetching'' in call

    ```


    The compiler tells us that `AlbertosApp` needs to provide an instance of a type
    conforming to `MenuFetching` to the `MenuList.ViewModel init`.


    That means that, for the app to compile, we need to update the ViewModel call
    site, giving it a `MenuFetching` instance. To do so, we need first to create an
    object conforming to `MenuFetching`.


    As we discussed, instead of providing a "real" implementation, we should quickly
    build a placeholder so we can stay focused on dynamically updating the UI. Because
    the final implementation will also conform to `MenuFetching`, we''ll be able to
    swap it in once ready, and `MenuList.ViewModel` will be none the wiser:


    ```

    // MenuFetchingPlaceholder.swift

    import Combine

    import Foundation

    class MenuFetchingPlaceholder: MenuFetching {

    func fetchMenu() -> AnyPublisher {

    return Future { $0(.success(menu)) }

    // Use a delay to simulate async fetch

    .delay(for: 0.5, scheduler: RunLoop.main)

    .eraseToAnyPublisher()

    }

    }

    ```


    [`Future`](https://developer.apple.com/documentation/combine/future) is a Combine
    convenience type to create "a publisher that eventually produces a single value
    and then finishes or fails." `Future { $0(.success(menu)) }` creates a `Publisher`
    that emits `menu` and then finishes. `menu` is the hardcoded global `MenuItem`
    array we defined in Chapter [4](#501287_1_En_4_Chapter.xhtml), as part of our
    first iteration on the app.


    We now have all we need to update the `MenuList.ViewModel` call site in the source
    code:


    ```

    // AlbertosApp.swift

    @main

    struct AlbertosApp: App {

    var body: some Scene {

    WindowGroup {

    NavigationView {

    MenuList(

    viewModel: .init(

    menuFetching: MenuFetchingPlaceholder()

    )

    )

    }

    }

    }

    }

    ```


    If you run `Shift Cmd U` again, you''ll see the build still fails, but this time
    in the test target. We didn''t see those errors before because Xcode only tries
    to build the test target if the production one builds first.


    These new compiler errors are also due to the `MenuList.ViewModel init` calls
    not using `MenuFetching`. We can fix them in the same manner as the production
    code: by using `MenuFetchingPlaceholder`.


    From this:


    ```

    let viewModel = MenuList.ViewModel(menu: [.fixture()])

    ```


    To this:


    ```

    let viewModel = MenuList.ViewModel(

    menuFetching: MenuFetchingPlaceholder()

    )

    ```


    The tests now build, and if you run them, you''ll see they pass too.


    We have the abstraction layer in place, and we''re back in the green state: let''s
    move forward and implement the test for how the ViewModel updates its sections
    when the menu fetch succeeds.'
