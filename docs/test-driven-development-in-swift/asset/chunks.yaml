    as a whole to the micro-level of a single test. What is the list of design decisions
    in the previous section if not a partitioned view of the higher-level task of
    building the app?


    Let’s apply Partition Problem and Solve Sequentially to the starting point of
    the app, displaying the menu. Let’s break it down into core questions to answer:


    *   How does the UI look like?


    *   Where does the data come from?


    *   How is the data organized in the UI?


    We don’t need to give these questions a final answer. We are interested in building
    something as fast as possible to learn from the process.


    *How does the UI look like?* Stock UI will do for now; we can work on the look
    and feel once we laid out a solid functionality core.


    *Where does the data come from?* A remote API, so it’s always up to date? A file
    bundled in the app? We don’t need to decide where the data comes from to display
    it: a hardcoded list will do for now.


    *How is the data organized?* Let’s start by copying what the physical menu does.
    Items are grouped into categories: starters, pastas, drinks, and desserts.


    By sidestepping the UI and data source questions, we can focus entirely on the
    core task of implementing the data organization for the app.


    Don’t confuse the act of delaying giving a final answer to those questions with
    laziness. By simplifying the problem, we set ourselves an achievable goal on which
    we can make concrete progress. We’ll have something we can share with our client
    as early as possible.


    Henrik Kniberg refers to this approach as [Earliest Testable/​Usable/​Lovable](https://blog.crisp.se/2016/01/25/henrikkniberg/making-sense-of-mvp).
    Suppose our task is to build an efficient means of transportation for our users.
    We’re better off starting with a skateboard and iterating our way up to an electric
    car, rather than building the wheels first, then the frame, and so on. We can
    deliver a skateboard sooner than a car. People can move around using skateboards;
    a car wheel by itself won’t get them anywhere.


    Also, notice that these simplifications don’t constrain the system; they make
    it more flexible. By waiting to decide where the data comes from, we have kept
    the door open for any option.


    Through this decomposition process, we now have a spec for our Earliest Testable
    version: an app that displays a hardcoded menu in a stock list view, grouped by
    category. Let’s get coding.


    ## Building the Menu


    Let’s say our menu data is a flat array of dishes. To display it sorted by category,
    we need a function that, given an array of dishes, returns an array of sections,
    where each section holds all the items of a single category.


    Are there edge cases in the behavior?


    *   If all the dishes in the array are of the same category, we should have only
    one section.


    *   If the input array is empty, the output sections array should be empty too.


    Let’s create a new file in the test target and translate these requirements into
    a Test List:


    ```

    // MenuGroupingTests.swift

    @testable import Albertos

    import XCTest

    class MenuGroupingTests: XCTestCase {

    func testMenuWithManyCategoriesReturnsOneSectionPerCategory() {}

    func testMenuWithOneCategoryReturnsOneSection() {}

    func testEmptyMenuReturnsEmptySections() {}

    }

    ```


    Which test should we begin with? As we’ve seen in the previous chapter, a test
    we are confident we can make pass is a good place to start. The behavioral edges
    are usually simpler; the test for “empty input produces empty output” should be
    straightforward.


    Working from the edges inward will also give us a chance to focus on building
    the function scaffold first and then laying the individual bricks that make up
    the complete behavior on top of it one at a time.


    Where should we start writing the test? From the assertion that will pass once
    the behavior is implemented. In this test, we want to assert that the sections
    array is empty:


    ```

    func testEmptyMenuReturnsEmptySections() {

    // Arrange the input: an empty menu

    // Act on the SUT to get the output: the sections array

    XCTAssertTrue(sections.isEmpty)

    }

    ```


    Where does `sections` come from? It’s the return value of the function we are
    trying to write:


    ```

    func testEmptyMenuReturnsEmptySections() {

    // Arrange the input: an empty menu

    let sections = ???

    XCTAssertTrue(sections.isEmpty)

    }

    ```


    How does the function returning `sections` look like? It should be something taking
    an empty array as input, and its role is to group a flat menu by category:


    ```

    func testEmptyMenuReturnsEmptySections() {

    let menu = [MenuItem]()

    let sections = groupMenuByCategory(menu)

    XCTAssertTrue(sections.isEmpty)

    }

    ```


    At this point our test is ready, but it doesn’t compile:


    ```

    let sections = groupMenuByCategory(menu) // Compiler says:

    // Cannot find `groupMenuByCategory` in scope

    ```


    The compiler error gives us a hint on what to do next: we need to define `groupMenuByCategory()`
    :


    ```

    func groupMenuByCategory(_ menu: [MenuItem]) -> [MenuSection] {

    return []

    }

    ```


    As part of defining the function, we also wrote names for the types it works with,
    but since we haven’t defined them yet, the code still doesn’t compile.


    I’m using the *Wishful Coding* technique introduced in Chapter [3](#501287_1_En_3_Chapter.xhtml)
    to better show the full test-driven flow step-by-step.


    As you become more confident with TDD, you’ll be able to write empty function
    and type definitions before the tests and leverage Xcode’s autocompletion for
    a slightly faster process.


    The compiler says:


    *   Cannot find type `MenuItem` in scope


    *   Cannot find type `MenuSection` in scope


    Let’s define these types in dedicated files in the application target:


    ```

    // MenuItem.swift

    struct MenuItem {}

    // MenuSection.swift

    struct MenuSection {}

    ```


    The code now compiles. If you run the tests with the `Cmd U` keyboard shortcut,
    you’ll see they pass.


    Why didn’t we add any properties to `MenuItem` or `MenuSection`? We’ll need properties
    in those types for them to be useful, of course, but we should wait to add them
    till a test that shows we need them. TDD pushes you to move in small steps, get
    feedback as fast as possible, and only write as little code as you need.


    Writing just enough code is also an excellent guardrail against overengineering.
    Because we write the tests before the production code and we only write tests
    for the behavior we need in the app right now, the resulting production code is
    precisely the one we need, nothing more, nothing less.'
  trans: "\n# 问题分解与顺序解决\n\n践行测试驱动开发本身就是一种**分解**与**顺序性**的练习。你需要将方法需求分解为一系列测试，并逐一顺序执行。针对每个测试，你都要将**让测试通过**和**清理实现代码**这两个步骤分开。首先编写刚好能让状态变为绿色的必要代码，然后继续优化生产代码。\n\
    \n我将这种方法称为*问题分解与顺序解决*。这个策略具有分形特性；我们可以反复应用它，从宏观的应用整体架构，到微观的单个测试。上一节的设计决策列表，难道不就是构建应用这一高层级任务的分解视图吗？\n\
    \n让我们将“问题分解与顺序解决”应用于应用的起点——显示菜单。将其拆解为需要回答的核心问题：\n\n- 用户界面长什么样？\n- 数据从哪里来？\n- 数据在\
    \ UI 中如何组织？\n\n我们不需要立刻给这些问题一个最终答案。我们关心的是尽快构建出可用的东西，以便从过程中学习。\n\n*用户界面长什么样？* 先用标准\
    \ UI 就好；等我们奠定了坚实的功能核心后，再来打磨外观和交互。\n\n*数据从哪里来？* 远程 API（这样数据总是最新）？还是应用内打包的文件？为了显示数据，我们无需现在就决定数据来源：先用一个硬编码的列表即可。\n\
    \n*数据如何组织？* 我们首先仿照实体菜单的做法。菜品按类别分组：开胃菜、意面、饮品和甜品。\n\n通过暂时搁置 UI 和数据源的问题，我们可以完全专注于实现应用内数据组织的核心任务。\n\
    \n不要把推迟给这些问题最终答案的行为与懒惰混为一谈。通过简化问题，我们为自己设定了一个可实现的目标，并能在其上取得具体进展。这样我们就能尽早拿出成果与客户分享。\n\
    \nHenrik Kniberg 将这种方法称为[最早可测试/可用/可爱版](https://blog.crisp.se/2016/01/25/henrikkniberg/making-sense-of-mvp)。假设我们的任务是为用户构建一种高效的交通工具。更好的做法是从一块滑板开始，逐步迭代升级到电动汽车，而不是先造轮子、再造车架……我们可以更快地交付滑板而非汽车。人们可以用滑板移动；而一个孤零零的汽车轮子哪儿也去不了。\n\
    \n另外请注意，这些简化并不会限制系统，反而使其更灵活。通过暂缓决定数据来源，我们为所有可能性都留出了空间。\n\n经过这样的分解过程，我们现在有了“最早可测试版本”的规格：一个用标准列表视图显示按类别分组的硬编码菜单的应用。开始编码吧。\n\
    \n## 构建菜单\n\n假设我们的菜单数据是一个扁平的菜品数组。要按类别排序显示，我们需要一个函数：它接收一个菜品数组，返回一个分区数组，每个分区包含某个单一类别的所有项目。\n\
    \n这个行为是否存在边界情况？\n\n- 如果数组中的所有菜品都属于同一类别，则应当只有一个分区。\n- 如果输入数组为空，输出的分区数组也应为空。\n\n\
    让我们在测试目标中创建一个新文件，并将这些需求转化为测试列表：\n\n```swift\n// MenuGroupingTests.swift\n@testable\
    \ import Albertos\nimport XCTest\n\nclass MenuGroupingTests: XCTestCase {\n  \
    \  func testMenuWithManyCategoriesReturnsOneSectionPerCategory() {}\n    func\
    \ testMenuWithOneCategoryReturnsOneSection() {}\n    func testEmptyMenuReturnsEmptySections()\
    \ {}\n}\n```\n\n我们应该从哪个测试开始？如前一章所述，一个有把握让它通过的测试是很好的起点。行为边界通常更简单；“空输入产生空输出”这个测试应该很直接。\n\
    \n从边界向内部推进，也让我们有机会先构建函数骨架，然后逐块铺设组成完整行为的砖块。\n\n我们应该从哪里开始编写测试呢？从行为实现后能通过的断言开始。在这个测试中，我们要断言分区数组为空：\n\
    \n```swift\nfunc testEmptyMenuReturnsEmptySections() {\n    // 准备输入：空菜单\n    //\
    \ 对被测系统执行操作，获取输出：分区数组\n    XCTAssertTrue(sections.isEmpty)\n}\n```\n\n`sections`\
    \ 从何而来？它是我们正在编写的函数的返回值：\n\n```swift\nfunc testEmptyMenuReturnsEmptySections()\
    \ {\n    // 准备输入：空菜单\n    let sections = ???\n    XCTAssertTrue(sections.isEmpty)\n\
    }\n```\n\n返回 `sections` 的函数长什么样？它应该接收一个空数组作为输入，其作用是将扁平菜单按类别分组：\n\n```swift\nfunc\
    \ testEmptyMenuReturnsEmptySections() {\n    let menu = [MenuItem]()\n    let\
    \ sections = groupMenuByCategory(menu)\n    XCTAssertTrue(sections.isEmpty)\n\
    }\n```\n\n此时测试已就绪，但无法编译：\n\n```swift\nlet sections = groupMenuByCategory(menu)\
    \ // 编译器报错：\n// 找不到作用域中的 'groupMenuByCategory'\n```\n\n编译器错误提示了我们下一步该做什么：需要定义\
    \ `groupMenuByCategory()`：\n\n```swift\nfunc groupMenuByCategory(_ menu: [MenuItem])\
    \ -> [MenuSection] {\n    return []\n}\n```\n\n在定义函数的同时，我们也写出了它涉及的类型名称，但由于尚未定义这些类型，代码仍然无法编译。\n\
    \n我使用了第 3 章介绍的*愿望驱动编程*技术，以便更清晰地展示完整的测试驱动流程。\n\n随着你对 TDD 越发熟练，你可以在测试之前就写出空的函数和类型定义，并利用\
    \ Xcode 的自动补全功能来略微提速。\n\n编译器报错：\n\n- 找不到作用域中的类型 `MenuItem`\n- 找不到作用域中的类型 `MenuSection`\n\
    \n让我们在应用目标中创建专用文件来定义这些类型：\n\n```swift\n// MenuItem.swift\nstruct MenuItem {}\n\
    \n// MenuSection.swift\nstruct MenuSection {}\n```\n\n现在代码可以编译了。使用 `Cmd U` 快捷键运行测试，你会看到它们通过了。\n\
    \n为什么我们没有给 `MenuItem` 或 `MenuSection` 添加任何属性？当然，这些类型需要属性才能有用，但我们应等到出现需要它们的测试时再添加。TDD\
    \ 推动你小步前进，尽快获得反馈，并且只写刚好够用的代码。\n\n写恰好足够的代码也是防止过度设计的绝佳护栏。因为我们在生产代码之前编写测试，并且只为当前应用所需的行为编写测试，最终的生产代码恰恰正是我们需要的，不多不少。\n"
- fmt: "# 单元测试的严格断言与清晰断言\n\n继续从边界情况向内推进，下一个要处理的测试是：输入项全部来自同一类别：\n\n```swift\nfunc\
    \ testMenuWithOneCategoryReturnsOneSection() {\n    let menu = [???]\n    let\
    \ sections = groupMenuByCategory(menu)\n    XCTAssertEqual(sections.count, 1)\n\
    }\n```\n\n如何构建一个所有菜单项都属于同一类别的输入数组？在测试中，我们可以这样写：\n\n```swift\nlet menu = [\n  \
    \  MenuItem(category: \"pastas\"),\n    MenuItem(category: \"pastas\")\n]\n```\n\
    \n但这段代码无法编译：\n\n```swift\nlet menu = [\n    MenuItem(category: \"pastas\"),  \
    \       // Compiler says: Argument passed to call\n    // that takes no arguments\n\
    \    MenuItem(category: \"pastas\")        // Compiler says: Argument passed to\
    \ call\n    // that takes no arguments\n]\n```\n\n因为我们的`MenuItem`没有属性，编译器生成的初始化器不接受参数。我们可以通过定义所需的属性来让代码通过编译：\n\
    \n```swift\nstruct MenuItem {\n    let category: String\n}\n```\n\n现在测试能够编译，但仍然是红色的。是时候第一次尝试返回`MenuSection`数组了。\n\
    \n这个测试的唯一要求是返回值包含一个元素。我们可以简单地使用所有输入的`MenuItem`来创建`MenuSection`数组，等到某个测试要求我们按类别分组时再考虑分组逻辑：\n\
    \n```swift\nfunc groupMenuByCategory(_ menu: [MenuItem]) -> [MenuSection] {\n\
    \    guard menu.isEmpty == false else { return [] }\n    return [MenuSection()]\n\
    }\n```\n\n现在两个测试都通过了，但你可能会注意到当前行为中有些奇怪的地方：给定一个所有`MenuItem`都属于同一类别的输入数组，我们得到了一个只包含单个`MenuSection`的数组，但这个分段没有任何信息，因为该类型没有属性。从返回值中，我们只能知道输入项数大于零。\n\
    \n我们的目标是在从一个测试推进到下一个测试的过程中，逐步实现*可工作的*实现。目前我们做得还不够。我之所以让大家走到这一步，是因为我使用了不够严格的断言。\n\
    \n## 尽可能使用最严格的断言\n\n在审查单元测试时，一个有用的思维实验是：思考你是否能编写出虽然错误但依然能让测试通过的代码。如果你能做到，那么测试网络中就有了漏洞。\n\
    \n这正是我们目前所处的状态：从测试的角度看代码是正确的，但它并没有实现预期的行为——无论现阶段这个行为多么不完整。\n\n我们如何让测试更严格？给定我们提供的`[MenuItem]`输入，正确的`[MenuSection]`输出应该具有哪些属性？\n\
    \n返回的`MenuSection`应该包含输入`[MenuItem]`中的所有元素。正如我们刚才看到的，仅仅计算数组中的元素个数是不够的；我们还需要一种方法来比较分段中的`MenuItem`，确保它们全部出现在输出中。\n\
    \n我们需要为`MenuSection`添加一个`items: [MenuItem]`属性，并为`MenuItem`添加一个`name: String`属性。我们从一开始就知道需要这些属性，但现在才添加，因为我们终于有了一个可以验证它们的测试。\n\
    \n像往常一样，第一步是在测试中编写我们希望存在的代码：\n\n```swift\nfunc testMenuWithOneCategoryReturnsOneSection\
    \ throws {\n    let menu = [\n        MenuItem(category: \"pastas\", name: \"\
    name\"),                  // Compiler says: Extra argument\n        // 'name'\
    \ in call\n        MenuItem(category: \"pastas\", name: \"other name\"),     \
    \             // Compiler says: Extra argument\n        // 'name' in call\n  \
    \  ]\n    let sections = groupMenuByCategory(menu)\n    XCTAssertEqual(sections.count,\
    \ 1)\n    let section = try XCTUnwrap(sections.first)\n    XCTAssertEqual(section.items.count,\
    \ 2)                               // Compiler says: Value of type 'MenuSection'\n\
    \    // has no member 'items'\n    XCTAssertEqual(section.items.first, \"name\"\
    )                        // Compiler says: Value of type 'MenuSection'\n    //\
    \ has no member 'items'\n    XCTAssertEqual(section.items.last, \"other name\"\
    )                   // Compiler says: Value of type 'MenuSection'\n    // has\
    \ no member 'items'\n}\n```\n\n在处理编译器错误之前，我们先来看看测试中的断言。\n\n在检查`sections`只包含一个元素之后，我们使用`XCTUnwrap`来获取一个非可选引用，从而避免使用`?`后缀可选链式操作符访问其元素。更多关于`XCTUnwrap`的信息请参见第[2](#501287_1_En_2_Chapter.xhtml)章。\n\
    \n接下来，我们检查`section.items`是否包含两个元素，也就是说分段包含了输入中的所有元素。\n\n我们本可以就此打住，但为了确保结果不仅包含该类别*所有*的`MenuItem`，而且*只包含*这些菜单项，我们还通过比较它们的名称来验证分段中的项是否与输入一致。\n\
    \n要实现严格的检查，我们需要这两个断言。检查名称可以确保分段包含所有输入的`MenuItem`；检查数量可以确保分段*只包含*给定类别的输入`MenuItem`。\n\
    \n编译器错误都是因为值类型的定义中还没有这些新属性：\n\n```swift\n// MenuItem.swift\nstruct MenuItem {\n\
    \    let category: String\n    let name: String\n}\n\n// MenuSection.swift\nstruct\
    \ MenuSection {\n    let items: [MenuItem]\n}\n```\n\n这个更改之后，我们又遇到了一个新的编译器错误：\n\
    \n```swift\nfunc groupMenuByCategory(_ menu: [MenuItem]) -> [MenuSection] {\n\
    \    guard menu.isEmpty == false else { return [] }\n    return [MenuSection()]\
    \     // Compiler says:     // Missing argument for parameter 'items' in call\n\
    }\n```\n\n因为我们更新了`MenuSection`的定义，编译器生成的初始化器也发生了变化。让测试通过编译的最简单方法是返回一个空数组：\n\n\
    ```swift\nreturn [MenuSection(items: [])]\n```\n\n现在我们的测试失败了，错误信息如下：\n\n```\n\
    XCTAssertEqual(section.items.count, 2)\n// XCTAssertEqual failed:     // (\"0\"\
    ) is not equal to (\"2\")\nXCTAssertEqual(section.items.first?.name, \"name\"\
    )\n// XCTAssertEqual failed:     // (\"nil\") is not equal to (\"Optional(\"name\"\
    )\")\nXCTAssertEqual(section.items.last?.name, \"other name\")\n// XCTAssertEqual\
    \ failed:     // (\"nil\") is not equal to (\"Optional(\"other name\")\")\n```\n\
    \n为了完成这部分行为，只需将输入菜单作为`items`的值即可：\n\n```swift\nreturn [MenuSection(items: menu)]\n\
    ```\n\n现在我们回到了绿色状态；行为尚不完整，但我们知道它是正确的。\n\n断言的严格程度会影响测试的准确性，因此请记住尽可能深入地进行检查。\n\n\
    ## 尽可能使用最清晰的断言\n\n在使用测试断言时，还要注意另一件事：使用哪种断言会影响测试失败信息的可理解性。\n\n考虑以下两个验证相同条件的断言：\n\
    \n```swift\nXCTAssertTrue(sections.count == 1)\nXCTAssertEqual(sections.count,\
    \ 1)\n```\n\n如果`sections`数组包含多个元素，第一个断言会失败并显示：\n\n```\nXCTAssertTrue failed\n\
    ```\n\n而第二个断言会失败并显示：\n\n```\nXCTAssertEqual failed: (\"1\") is not equal to (\"\
    2\")\n```\n\n你觉得哪一个更能体现出数组数量并非预期？\n\n测试失败的方式是修复失败问题的起点。让测试失败信息越清晰，就越容易找到失败的原因。"
  raw: 'Continuing to work from the edge cases inward, the next test to tackle is
    the one for an input with items all from the same category:


    ```

    func testMenuWithOneCategoryReturnsOneSection() {

    let menu = [???]

    let sections = groupMenuByCategory(menu)

    XCTAssertEqual(sections.count, 1)

    }

    ```


    How can we build an input array of menu items all of the same category? In the
    test, we can write


    ```

    let menu = [

    MenuItem(category: "pastas"),

    MenuItem(category: "pastas")

    ]

    ```


    This code doesn’t compile:


    ```

    let menu = [

    MenuItem(category: "pastas"),         // Compiler says: Argument passed to call

    // that takes no arguments

    MenuItem(category: "pastas")        // Compiler says: Argument passed to call

    // that takes no arguments

    ]

    ```


    Because our `MenuItem` has no properties, its compiler-generated initializer takes
    no arguments. We can make the code build by defining the property we need:


    ```

    struct MenuItem {

    let category: String

    }

    ```


    The test now compiles but is still red. It’s time to take our first stab at returning
    an array of `MenuSection`s.


    The only requirement of this test is that the return value has one element. We
    can simply create the array of `MenuSection`s using all of the input `MenuItem`s
    and think about the grouping by category when a test will require us to do so:


    ```

    func groupMenuByCategory(_ menu: [MenuItem]) -> [MenuSection] {

    guard menu.isEmpty == false else { return [] }

    return [MenuSection()]

    }

    ```


    Both our tests pass, but you might have noticed something odd in the current behavior:
    given an input array of `MenuItem`s, all from the same category, we are getting
    an array with a single `MenuSection`, but that section has no information because
    the type has no properties. The only thing we know from the return value is that
    the input had more than zero items.


    Our goal as we move from one test to the next is to progress through *working*
    implementations. Right now, we’re falling short. The reason I got us to this point
    is that I used an assertion that wasn’t thorough enough.


    ### Use the Strictest Assertions Possible


    A useful thought experiment to do when reviewing unit tests is to think whether
    you could write code that is wrong but still makes the test pass. If you can,
    then there is a hole in the test net.


    That’s precisely the state we are in right now: the code is correct from the test’s
    point of view but doesn’t implement the desired behavior – however incomplete
    that might be at this stage.


    How can we make our test more thorough? What properties should the correct `[MenuSection]`
    output have, given the `[MenuItem]` input we provided?


    The returned `MenuSection` should hold all the elements from the `[MenuItem]`
    input. As we’ve just seen, simply counting the elements in an array is not enough;
    we also need a way to compare the `MenuItem`s in the section to ensure they are
    all in the output.


    We need to add an `items: [MenuItem]` property to `MenuSection` and a `name: String`
    property to `MenuItem`. We knew we’d need these properties from the start, but
    we’re adding them only now because we finally have a test that can exercise them.


    As usual, the first step is to write the code we wish we had in the test:


    ```

    func testMenuWithOneCategoryReturnsOneSection throws {

    let menu = [

    MenuItem(category: "pastas", name: "name"),                  // Compiler says:
    Extra argument

    // ''name'' in call

    MenuItem(category: "pastas", name: "other name"),                  // Compiler
    says: Extra argument

    // ''name'' in call

    ]

    let sections = groupMenuByCategory(menu)

    XCTAssertEqual(sections.count, 1)

    let section = try XCTUnwrap(sections.first)

    XCTAssertEqual(section.items.count, 2)                               // Compiler
    says: Value of type ''MenuSection''

    // has no member ''items''

    XCTAssertEqual(section.items.first, "name")                        // Compiler
    says: Value of type ''MenuSection''

    // has no member ''items''

    XCTAssertEqual(section.items.last, "other name")                   // Compiler
    says: Value of type ''MenuSection''

    // has no member ''items''

    }

    ```


    Before tackling the compiler errors, let’s have a look at the assertions in the
    tests.


    After checking that `sections` contains only one element, we use `XCTUnwrap` to
    get a nonoptional reference to it and avoid having to access its elements with
    the `?` postfix optional chaining operator. See Chapter [2](#501287_1_En_2_Chapter.xhtml)
    for more information on `XCTUnwrap`.


    Next, we check that `section.items` has two elements, that is, the section has
    all the elements in the input.


    We could have stopped here, but to be sure that as well as having *all* the `MenuItems`
    for the category the result has *only* the menu items we also make, check that
    the items in the section are the same as the input by comparing their names.


    To have a tight check, we need both assertions. Checking the names makes sure
    the section contains all input `MenuItem`s; checking the count makes sure it contains
    *only* the input `MenuItem`s for the given category.


    The compiler errors are all because the value types don’t have those new properties
    in their definitions:


    ```

    // MenuItem.swift

    struct MenuItem {

    let category: String

    let name: String

    }

    // MenuSection.swift

    struct MenuSection {

    let items: [MenuItem]

    }

    ```


    After this change, we have a new compiler error:


    ```

    func groupMenuByCategory(_ menu: [MenuItem]) -> [MenuSection] {

    guard menu.isEmpty == false else { return [] }

    return [MenuSection()]     // Compiler says:     // Missing argument for parameter
    ''items'' in call

    }

    ```


    Because we updated the definition of `MenuSection`, the compiler-generated `init`
    changed too. The simplest thing to do to make the tests compile is to return an
    empty array:


    ```

    return [MenuSection(items: [])]

    ```


    Now our tests fail with


    ```

    XCTAssertEqual(section.items.count, 2)

    // XCTAssertEqual failed:     // ("0") is not equal to ("2")

    XCTAssertEqual(section.items.first?.name, "name")

    // XCTAssertEqual failed:     // ("nil") is not equal to ("Optional("name")")

    XCTAssertEqual(section.items.last?.name, "other name")

    // XCTAssertEqual failed:     // ("nil") is not equal to ("Optional("other name")")

    ```


    To complete this slice of behavior, simply use the input menu as the `items` value:


    ```

    return [MenuSection(items: menu)]

    ```


    Now we’re back in the green state; the behavior is incomplete, but we know it’s
    correct.


    The thoroughness of the assertions affects a test’s accuracy, so remember to dig
    as deep as possible with the checks you make.


    ### Use the Clearest Assertion Possible


    Another thing to notice when it comes to the assertions you use in your tests
    is that the kind of assertions you use makes a difference in how understandable
    the test failures will be.


    Consider these two assertions verifying the same condition:


    ```

    XCTAssertTrue(sections.count == 1)

    XCTAssertEqual(sections.count, 1)

    ```


    If the `sections` array has more than one element, the first will fail with


    ```

    XCTAssertTrue failed

    ```


    while the second will fail with


    ```

    XCTAssertEqual failed: ("1") is not equal to ("2")

    ```


    Which one do you think better represents that the array count was not the expected
    one?


    The way a test fails is the starting point to fix the issue that caused the failure.
    The clearer you can make the test failure, the easier it will be to find its cause.'
  trans: "\n# 单元测试的严格断言与清晰断言\n\n继续从边界情况向内推进，下一个要处理的测试是：输入项全部来自同一类别：\n\n```swift\n\
    func testMenuWithOneCategoryReturnsOneSection() {\n    let menu = [???]\n    let\
    \ sections = groupMenuByCategory(menu)\n    XCTAssertEqual(sections.count, 1)\n\
    }\n```\n\n如何构建一个所有菜单项都属于同一类别的输入数组？在测试中，我们可以这样写：\n\n```swift\nlet menu = [\n  \
    \  MenuItem(category: \"pastas\"),\n    MenuItem(category: \"pastas\")\n]\n```\n\
    \n但这段代码无法编译：\n\n```swift\nlet menu = [\n    MenuItem(category: \"pastas\"),  \
    \       // Compiler says: Argument passed to call\n    // that takes no arguments\n\
    \    MenuItem(category: \"pastas\")        // Compiler says: Argument passed to\
    \ call\n    // that takes no arguments\n]\n```\n\n因为我们的`MenuItem`没有属性，编译器生成的初始化器不接受参数。我们可以通过定义所需的属性来让代码通过编译：\n\
    \n```swift\nstruct MenuItem {\n    let category: String\n}\n```\n\n现在测试能够编译，但仍然是红色的。是时候第一次尝试返回`MenuSection`数组了。\n\
    \n这个测试的唯一要求是返回值包含一个元素。我们可以简单地使用所有输入的`MenuItem`来创建`MenuSection`数组，等到某个测试要求我们按类别分组时再考虑分组逻辑：\n\
    \n```swift\nfunc groupMenuByCategory(_ menu: [MenuItem]) -> [MenuSection] {\n\
    \    guard menu.isEmpty == false else { return [] }\n    return [MenuSection()]\n\
    }\n```\n\n现在两个测试都通过了，但你可能会注意到当前行为中有些奇怪的地方：给定一个所有`MenuItem`都属于同一类别的输入数组，我们得到了一个只包含单个`MenuSection`的数组，但这个分段没有任何信息，因为该类型没有属性。从返回值中，我们只能知道输入项数大于零。\n\
    \n我们的目标是在从一个测试推进到下一个测试的过程中，逐步实现*可工作的*实现。目前我们做得还不够。我之所以让大家走到这一步，是因为我使用了不够严格的断言。\n\
    \n## 尽可能使用最严格的断言\n\n在审查单元测试时，一个有用的思维实验是：思考你是否能编写出虽然错误但依然能让测试通过的代码。如果你能做到，那么测试网络中就有了漏洞。\n\
    \n这正是我们目前所处的状态：从测试的角度看代码是正确的，但它并没有实现预期的行为——无论现阶段这个行为多么不完整。\n\n我们如何让测试更严格？给定我们提供的`[MenuItem]`输入，正确的`[MenuSection]`输出应该具有哪些属性？\n\
    \n返回的`MenuSection`应该包含输入`[MenuItem]`中的所有元素。正如我们刚才看到的，仅仅计算数组中的元素个数是不够的；我们还需要一种方法来比较分段中的`MenuItem`，确保它们全部出现在输出中。\n\
    \n我们需要为`MenuSection`添加一个`items: [MenuItem]`属性，并为`MenuItem`添加一个`name: String`属性。我们从一开始就知道需要这些属性，但现在才添加，因为我们终于有了一个可以验证它们的测试。\n\
    \n像往常一样，第一步是在测试中编写我们希望存在的代码：\n\n```swift\nfunc testMenuWithOneCategoryReturnsOneSection\
    \ throws {\n    let menu = [\n        MenuItem(category: \"pastas\", name: \"\
    name\"),                  // Compiler says: Extra argument\n        // 'name'\
    \ in call\n        MenuItem(category: \"pastas\", name: \"other name\"),     \
    \             // Compiler says: Extra argument\n        // 'name' in call\n  \
    \  ]\n    let sections = groupMenuByCategory(menu)\n    XCTAssertEqual(sections.count,\
    \ 1)\n    let section = try XCTUnwrap(sections.first)\n    XCTAssertEqual(section.items.count,\
    \ 2)                               // Compiler says: Value of type 'MenuSection'\n\
    \    // has no member 'items'\n    XCTAssertEqual(section.items.first, \"name\"\
    )                        // Compiler says: Value of type 'MenuSection'\n    //\
    \ has no member 'items'\n    XCTAssertEqual(section.items.last, \"other name\"\
    )                   // Compiler says: Value of type 'MenuSection'\n    // has\
    \ no member 'items'\n}\n```\n\n在处理编译器错误之前，我们先来看看测试中的断言。\n\n在检查`sections`只包含一个元素之后，我们使用`XCTUnwrap`来获取一个非可选引用，从而避免使用`?`后缀可选链式操作符访问其元素。更多关于`XCTUnwrap`的信息请参见第\
    \ 2 章。\n\n接下来，我们检查`section.items`是否包含两个元素，也就是说分段包含了输入中的所有元素。\n\n我们本可以就此打住，但为了确保结果不仅包含该类别*所有*的`MenuItem`，而且*只包含*这些菜单项，我们还通过比较它们的名称来验证分段中的项是否与输入一致。\n\
    \n要实现严格的检查，我们需要这两个断言。检查名称可以确保分段包含所有输入的`MenuItem`；检查数量可以确保分段*只包含*给定类别的输入`MenuItem`。\n\
    \n编译器错误都是因为值类型的定义中还没有这些新属性：\n\n```swift\n// MenuItem.swift\nstruct MenuItem {\n\
    \    let category: String\n    let name: String\n}\n\n// MenuSection.swift\nstruct\
    \ MenuSection {\n    let items: [MenuItem]\n}\n```\n\n这个更改之后，我们又遇到了一个新的编译器错误：\n\
    \n```swift\nfunc groupMenuByCategory(_ menu: [MenuItem]) -> [MenuSection] {\n\
    \    guard menu.isEmpty == false else { return [] }\n    return [MenuSection()]\
    \     // Compiler says:     // Missing argument for parameter 'items' in call\n\
    }\n```\n\n因为我们更新了`MenuSection`的定义，编译器生成的初始化器也发生了变化。让测试通过编译的最简单方法是返回一个空数组：\n\n\
    ```swift\nreturn [MenuSection(items: [])]\n```\n\n现在我们的测试失败了，错误信息如下：\n\n```\n\
    XCTAssertEqual(section.items.count, 2)\n// XCTAssertEqual failed:     // (\"0\"\
    ) is not equal to (\"2\")\nXCTAssertEqual(section.items.first?.name, \"name\"\
    )\n// XCTAssertEqual failed:     // (\"nil\") is not equal to (\"Optional(\"name\"\
    )\")\nXCTAssertEqual(section.items.last?.name, \"other name\")\n// XCTAssertEqual\
    \ failed:     // (\"nil\") is not equal to (\"Optional(\"other name\")\")\n```\n\
    \n为了完成这部分行为，只需将输入菜单作为`items`的值即可：\n\n```swift\nreturn [MenuSection(items: menu)]\n\
    ```\n\n现在我们回到了绿色状态；行为尚不完整，但我们知道它是正确的。\n\n断言的严格程度会影响测试的准确性，因此请记住尽可能深入地进行检查。\n\n\
    ## 尽可能使用最清晰的断言\n\n在使用测试断言时，还要注意另一件事：使用哪种断言会影响测试失败信息的可理解性。\n\n考虑以下两个验证相同条件的断言：\n\
    \n```swift\nXCTAssertTrue(sections.count == 1)\nXCTAssertEqual(sections.count,\
    \ 1)\n```\n\n如果`sections`数组包含多个元素，第一个断言会失败并显示：\n\n```\nXCTAssertTrue failed\n\
    ```\n\n而第二个断言会失败并显示：\n\n```\nXCTAssertEqual failed: (\"1\") is not equal to (\"\
    2\")\n```\n\n你觉得哪一个更能体现出数组数量并非预期？\n\n测试失败的方式是修复失败问题的起点。让测试失败信息越清晰，就越容易找到失败的原因。\n"
- fmt: '### Don’t Let the Tests Crash


    We only have one test left to write: the one for the happy path behavior.


    The previous tests helped us define the scaffold for the final behavior – the
    types and method signature makeup. We can now focus on the core logic itself.


    The task is to verify that, given an array with items from different categories,
    the function returns one section per category. To do so, we can use the same approach
    as the previous tests:


    ```

    func testMenuWithManyCategoriesReturnsOneSectionPerCategory() {

    let menu = [

    MenuItem(category: "pastas", name: "a pasta"),

    MenuItem(category: "drinks", name: "a drink"),

    MenuItem(category: "pastas", name: "another pasta"),

    MenuItem(category: "desserts", name: "a dessert"),

    ]

    let sections = groupMenuByCategory(menu)

    XCTAssertEqual(sections.count, 3)

    // How can we verify that there is one section per category?

    }

    ```


    Similarly to the previous test, asserting that `sections.count` is equal to `3`
    is not enough to verify the complete behavior. How can we make sure that the three
    `MenuSection`s hold a different category each?


    How does a `MenuSection` differ from another? `MenuSection` will be used to render
    each category in the view. It should have a property holding the name of the category:


    ```

    XCTAssertEqual(sections[0].category, "pastas")                     // Compiler
    says: Value of type ''MenuSection''

    // has no member ''category''

    XCTAssertEqual(sections[1].category, "drinks")                     // Compiler
    says: Value of type ''MenuSection''

    // has no member ''category''

    XCTAssertEqual(sections[2].category, "desserts")                   // Compiler
    says: Value of type ''MenuSection''

    // has no member ''category''

    ```


    Should we also add assertions for the content of each of the sections? Doing so
    would make the test even more thorough, but it also feels like duplicated work
    considering we’re already testing that all the items of a given category are part
    of the section for that category in the previous test. If we’ll break that expectation
    while working on the final piece of the implementation, that test will tell us.


    The compiler is telling us we need to add `category` to `MenuSection`:


    ```

    struct MenuSection {

    let category: String

    let items: [MenuItem]

    }

    ```


    With this change, the compilation now fails in the `groupMenuByCategory` function:


    ```

    return [MenuSection(items: menu)]     // Compiler says:

    // Missing argument for parameter ''category'' in call

    ```


    The simplest thing we can do to make the compilation succeed is to put a hardcoded
    value:


    ```

    return [MenuSection(category: "", items: menu)]

    ```


    The code compiles, but the test crashes:


    ```

    XCTAssertEqual(sections.count, 3)

    XCTAssertEqual(sections[0].category, "pastas")

    XCTAssertEqual(sections[1].category, "drinks")    // Xcode says:

    // Thread 1: Fatal error: Index out of range

    XCTAssertEqual(sections[2].category, "desserts")

    ```


    When our tests crash, we lose valuable information. The code we have right now
    returns only one section, so when we try to access the object at index `1`, we
    crash, but Xcode doesn’t report a test failure on the assertion for `section.count`.
    While the crash itself could be seen as a test failure, the more information about
    a failure we have, the easier it becomes to address it.


    To avoid index out-of-range crashes in my tests, I like to add this extension
    for safe subscript access:


    ```

    // Collection+Safe.swift

    extension Collection {

    /// Returns the element at the given index if it is within     /// range, otherwise
    nil.

    subscript(safe index: Index) -> Element? {

    return indices.contains(index) ? self[index] : nil

    }

    }

    ```


    Using the safe subscript, if the index is out of range, we’ll get `nil`, which
    will make the test fail but not crash:


    ```

    XCTAssertEqual(sections.count, 3)

    // XCTAssertEqual failed:     // ("1") is not equal to ("3")

    XCTAssertEqual(sections[safe: 0]?.category, "pastas")

    // XCTAssertEqual failed:     // ("Optional("")") is not equal to ("Optional("pastas")")

    XCTAssertEqual(sections[safe: 1]?.category, "drinks")

    // XCTAssertEqual failed:     // ("nil") is not equal to ("Optional("drinks")")

    XCTAssertEqual(sections[safe: 2]?.category, "desserts")

    // XCTAssertEqual failed:     // ("nil") is not equal to ("Optional("desserts")")

    ```


    The test failures tell us that our code is returning only one `MenuSection` and
    with the wrong `category` value. To make the test pass, we need to write the production
    logic to group the items into sections by category.


    We can group elements of an `Array` using a given criterion by using this handy
    `Dictionary` initializer:


    ```

    Dictionary(grouping: menu, by: { $0.category })

    ```


    Once we have a dictionary grouping our `MenuItem`s by their `category`, we can
    transform each key-value pair into a `MenuSection`:


    ```

    MenuSection(category: key, items: value)

    ```


    `Dictionary` doesn’t guarantee the order of its keys, so we also need to enforce
    an order for our sections.


    Alberto’s menu categories are, conveniently, in reverse alphabetical order: starters,
    pastas, drinks, desserts. We can adopt that for now; we’ll add logic for a custom
    sorting strategy if the need for it emerges as we progress with the app development.


    Putting it all together


    ```

    func groupMenuByCategory(_ menu: [MenuItem]) -> [MenuSection] {

    guard menu.isEmpty == false else { return [] }

    return Dictionary(grouping: menu, by: { $0.category })

    .map { key, value in             MenuSection(category: key, items: value)         }

    .sorted { $0.category > $1.category }

    }

    ```'
