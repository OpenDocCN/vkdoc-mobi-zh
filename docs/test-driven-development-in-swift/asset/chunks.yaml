  trans: '

    # 解包可选值


    Swift 提供了一种名为 `Optional` 的类型，用于封装那些可能为 `nil` 的值。


    假设你正在为 `UserRepository` 对象的 `getUserWithId(_:)` 方法编写测试，该方法若找到匹配给定 ID 的 `User`
    实例则返回该实例，否则返回 `nil`。因此，该方法的返回类型是 `Optional<User>`，或者等效的简写形式 `User?`：


    ```

    let user: User? = userRepository.getUserWithId(1)

    XCTAssertEqual(user?.firstName, "John")

    XCTAssertEqual(user?.lastName, "Appleseed")

    ```


    由于 `user` 是`Optional`，上述代码使用后缀可选链操作符 `?` 来访问其属性。如果 `userRepository` 无法找到 ID 为
    `1` 的用户，测试将出现两次失败，每个断言各一次。


    XCTest 提供了一个特殊的 API，用于尝试解包可选值，并在值为 `nil` 时使测试失败，我们可以用它来改进上述测试：


    ```

    let user: User = try XCTUnwrap(userRepository.getUserWithId(1))

    XCTAssertEqual(user.firstName, "John")

    XCTAssertEqual(user.lastName, "Appleseed")

    ```


    使用 `XCTUnwrap` 后，如果 `getUserWithId` 返回 `nil`，测试将在此处立即失败。这不仅让问题原因更清晰，而且只出现一次失败而非两次。作为额外好处，省略
    `?` 后语法也更简洁。


    `XCTUnwrap` 也优于使用 `!` 强制解包可选值。如果测试遇到一个为 `nil` 的强制解包 `Optional`，会导致崩溃。当测试套件中的某个测试崩溃时，整个套件会停止运行，因此你只能获取到崩溃前已执行的测试信息。更重要的是，崩溃测试的错误信息不如失败测试清晰，尤其是在
    Xcode 之外运行时。防止你的测试套件因意外发现 `nil` 的 `Optional` 值而崩溃，将有助于更轻松地排查测试失败原因。


    ## 异步代码的期望


    测试异步逻辑需要额外几个步骤。考虑一个通过回调异步计算两个 `Int` 之和的函数：`asyncSum(_ a: Int, _ b: Int, @escaping
    (Int) -> Void)`。如果我们像之前编写测试那样为 `asyncSum` 编写测试，它会失败：


    ```

    var sum = 0

    asyncSum(1, 2) { result in

    sum = result

    }

    XCTAssertEqual(sum, 3)

    XCTAssertEqual failed: ("0") is not equal to ("3")

    ```


    失败的原因是：由于 `asyncSum` 是异步的，将求和结果赋值给 `sum` 的回调会在断言**之后**执行。


    如果使用同步断言来检查异步代码的行为，代码可能在断言执行之前就已运行，最佳情况下会导致误报，最坏情况下会让你花费大量时间调试行为不一致的测试。


    以下是在 XCTest 中测试异步代码的方法：


    ```

    var sum = 0

    let expectation = XCTestExpectation(description: "Async sum completed.")

    asyncSum(1, 2) { result in

    sum = result

    expectation.fulfill()

    }

    // 这段代码等待 `expectation` 被满足（即

    // 其 `fulfill()` 方法被调用），超时时间为

    // `timeout` 秒。

    wait(for: [expectation], timeout: 0.2)

    XCTAssertEqual(sum, 3)

    ```


    在运行异步代码之前，你需要实例化一个 `XCTExpectation`，它将异步地被满足。然后你可以指示测试在继续执行之前，等待期望被满足或超时时间到期，之后再运行你的断言。


    编写上述测试的更好方式是在回调中直接执行断言。这省去了在回调外部定义变量来保存值的麻烦，使测试更简洁：


    ```

    let expectation = XCTestExpectation(description: "Async sum completed.")

    asyncSum(1, 2) { result in

    XCTAssertEqual(result, 3)

    expectation.fulfill()

    }

    wait(for: [expectation], timeout: 0.1)

    ```


    由于我们在测试中包含了 `wait`，因此可以保证断言会执行，否则测试会因超时而失败。


    需要测试异步代码的常见场景包括网络操作，我们将在第 10 章中看到。


    在 WWDC 2021 上，Apple 引入了一种新的编写异步代码的替代方式，即使用 Swift 5.5 中提供的 async/await 模式，适用于目标系统为
    iOS 15 或 macOS 12 的应用程序。在撰写本书时，该实现仍处于测试阶段，并且由于操作系统版本要求，发布后只有有限的应用程序子集能够采用它。因此，本书不涵盖
    async/await。

    '
