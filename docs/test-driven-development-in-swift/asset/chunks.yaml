- fmt: '# Testing the Alert Dismiss Behavior


    Right now, when a user taps the alert “Ok” button, they’re left with the order
    screen. A better UX would be to dismiss the screen as well as the alert in one
    go.


    A pure SwiftUI way to do this would be to define a `@Binding` property on `OrderDetail`
    that would track the value of `OrderButton`’s `showDetail` and toggle it when
    it’s time to dismiss the screen:


    ```

    // OrderDetail.swift

    // ...

    struct OrderDetail: View {

    // ...

    @Binding private(set) var isPresented: Bool

    // ...

    }

    // OrderButton.swift

    // ...

    struct OrderButton: View {

    // ...

    @State private(set) var showingDetail: Bool = false

    var body: some View {

    // ...

    .sheet(isPresented: $showingDetail) {

    OrderDetail(

    viewModel: .init(orderController: orderController)),

    isPresented: $showingDetail

    )

    }

    }

    }

    ```


    As you’ll know by now, I wouldn’t recommend a pure SwiftUI solution because we
    can’t use tests to help us implement it. Adding a property to `OrderDetail` to
    let it know whether it’s presented would also make it less reusable: it implies
    it should always be presented in a sheet.


    There is a way to keep `OrderDetail` agnostic of its navigation and presentation
    hierarchy location and have part of the presentation unit testable: move as much
    of the logic as possible away from the pure SwiftUI components.


    First, let’s add a property to track the action closure to `Alert.ViewModel`:


    ```

    import SwiftUI

    extension Alert {

    struct ViewModel: Identifiable {

    // ...

    let buttonAction: (() -> Void)?

    // ...

    }

    }

    ```


    This change to the codebase is a refactor because we haven’t altered the actual
    behavior, just the implementation. The compiler will help us identify all the
    files that need updating, and the tests will let us know if anything broke.


    Second, let’s update `OrderDetail.ViewModel` to get a closure to run when the
    alert dismisses:


    ```

    // OrderDetail.ViewModel.swift

    // ...

    struct OrderDetail: View {

    class ViewModel: ObservableObject {

    // ...

    let onAlertDismiss: () -> Void

    // ...

    init(

    orderController: OrderController,

    onAlertDismiss: @escaping () -> Void,

    paymentProcessor: PaymentProcessing = HippoPaymentsProcessor.init(apiKey: "A1B2C3")

    ) {

    // ...

    ```


    We can set `{}` as its value when initializing `OrderDetail.ViewModel` for now,
    just to get the code to compile:


    ```

    // OrderButton.swift

    // ...

    struct OrderButton: View {

    // ...

    var body: some View {

    // ...

    .sheet(isPresented: $showingDetail) {

    OrderDetail(

    viewModel: .init(

    orderController: orderController,

    onAlertDismiss: {}

    )

    )

    }

    // ...

    ```


    The next step is to verify that the generated `Alert.ViewModel` runs the given
    closure as part of its `buttonAction`. We can use the same approach as before:
    pass a Stub to simulate the success or failure behavior, wait for the payment
    processing to complete with a predicate expectation, and then assert that the
    resulting ViewModel calls the given closure:


    ```

    // OrderDetail.ViewModelTests.swift

    // ...

    func testWhenPaymentSucceedsDismissingTheAlertRunsTheGivenClosure() {

    var called = false

    let viewModel = OrderDetail.ViewModel(

    orderController: OrderController(),

    onAlertDismiss: { called = true },

    paymentProcessor: PaymentProcessingStub(returning: .success(()))

    )

    let predicate = NSPredicate { _, _ in viewModel.alertToShow != nil }

    let expectation = XCTNSPredicateExpectation(predicate: predicate, object: .none)

    viewModel.checkout()

    wait(for: [expectation], timeout: timeoutForPredicateExpectations)

    viewModel.alertToShow?.buttonAction?()

    XCTAssertTrue(called)

    // Test fails with: XCTAssertTrue failed

    }

    ```


    As usual, we wrote a dedicated test for this new behavior. Because of the `XCTNSPredicateExpectation`
    slow polling, it would be better to batch this test with the one we already wrote
    for the `Alert.ViewModel` configuration to save time. We won’t do that here just
    to keep our examples easier to follow.


    To make the test green, we need to pass the `Alert.ViewModel` the callback to
    execute:


    ```

    // OrderDetail.ViewModel.swift

    // ...

    func checkout() {

    paymentProcessor.process(order: orderController.order)

    .sink(

    receiveCompletion: { [weak self] completion in

    guard case .failure = completion else { return }

    guard let self = self else { return }

    self.alertToShow = Alert.ViewModel(

    title: "",

    message: "There''s been an error with your order. Please contact a waiter.",

    buttonText: "Ok",

    buttonAction: self.onAlertDismiss

    )

    },

    receiveValue: { [weak self] _ in

    guard let self = self else { return }

    self.alertToShow = Alert.ViewModel(

    title: "",

    message: "The payment was successful. Your food will be with you shortly.",

    buttonText: "Ok",

    buttonAction: self.onAlertDismiss

    )

    }

    )

    .store(in: &cancellables)

    }

    ```


    Finally, we need to update the SwiftUI code to make use of the action in the ViewModel:


    ```

    // OrderDetail.swift

    // ...

    .alert(item: $viewModel.alertToShow) { alertViewModel in

    Alert(

    title: Text(alertViewModel.title),

    message: Text(alertViewModel.message),

    dismissButton: .default(

    Text(alertViewModel.buttonText),

    action: viewModel.buttonAction

    )

    )

    }

    ```


    I’ll leave writing the test for the failure scenario as an exercise for you.


    If you run the app and submit an order now, you’ll see that when you dismiss the
    confirmation alert, the order detail sheet dismisses as well. Figure [13-2](#501287_1_En_13_Chapter.xhtml#Fig2)
    shows this final flow.


    ![../images/501287_1_En_13_Chapter/501287_1_En_13_Fig2_HTML.png](images/501287_1_En_13_Chapter/501287_1_En_13_Fig2_HTML.png)


    Figure 13-2


    The payment flow with production screens


    Congratulations! You’ve now completed version 1.0.0-beta.1. Time to share it with
    Alberto and some of his most loyal customers for testing. I wouldn’t be surprised
    if they came up with some final touch to implement before rolling it out officially.


    SwiftUI is an excellent framework for building the view layer of our applications
    in a declarative way and with little effort to keep it in sync with the data it
    needs to display. Its immutable architecture, with views that are a function of
    state, not a sequence of events, helps us isolate all the presentation and behavior
    logic into dedicated objects that we can grow with TDD. In this chapter, we’ve
    seen such an example. We moved all the logic to generate the confirmation `Alert`
    and configure its callback into a dedicated ViewModel and then wrote a thin humble
    SwiftUI layer to consume it.


    ## Key Takeaways


    *   **Whenever you require conditional logic to present a view, extract it from
    the SwiftUI layer**. You’ll be able to use TDD to implement it, for faster feedback
    and better confidence.

    *   **You can decouple an alert configuration from SwiftUI by building a ViewModel
    for it**.

    *   **`XCTNSPredicateExpectation` is useful to test asynchronous code with no
    callbacks but has poor performance**. Consider batching multiple assertions in
    the same test using a predicate expectation, or adopt Nimble if you have more
    than a handful of those in your tests.


    # Fixing Bugs and Changing Existing Code with TDD


    *How do you apply Test-Driven Development to change the behavior of existing code
    or fix a bug?*


    *The same way as you do to write new code: by using the tests’ feedback to identify
    the changes to make.*


    When updating existing behavior, you can start by editing its tests. If you have
    a bug to fix instead, you first write a failing test that reproduces it and then
    make the test pass to fix it.'
