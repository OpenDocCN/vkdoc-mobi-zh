  trans: '

    ## 伪装……直到成功


    你该从哪个测试开始？选择一个你认为能轻松通过的测试是个好主意。从最简单的测试入手，是另一种让反馈时间尽可能短的方法。


    在本例中，所有测试在我看来难度相当，所以我会从第一个开始：


    ```

    func testEvenlyDivisibleBy4IsLeap() {

    XCTAssertTrue(isLeap(2020))

    }

    XCTAssertTrue failed

    ```


    我们能让这个测试通过的最简单方法是什么？只需返回一个能让测试通过的值，稍后再处理实际实现：


    ```

    func isLeap(_ year: Int) -> Bool {

    return true

    }

    ```


    这种返回硬编码值以使测试通过的技术被称为“伪装”。“伪装”让你在不确定实现细节时能轻松开始编写代码。先使用一个伪造的实现，这样你可以先运行一些测试，并从它们中学习。


    对于`leapYear`这样实现简单的场景，“伪装”可能有些大材小用。如果脑中已经浮现出一个能让测试通过的明显实现方案，尽管直接写，无需先伪装。不过你可能会惊讶，“伪装”在很多情况下正是你突破困局、开始解决问题的关键。


    借助这个伪造的实现，我们的测试现在变成了绿色。下一步是什么？


    既然我们已经通过绿色测试建立了基准，就可以着手实际实现了，只要保持测试通过，代码的正确性就有保障。另一方面，我们还有更多测试要写，所以在这种情况下，我会继续写下一个测试。


    下一个值得编写的测试是针对不能被 4 整除的输入，也就是刚才那个测试的反面：


    ```

    func testNotEvenlyDivisibleBy4Or400IsNotLeap() {

    XCTAssertFalse(isLeap(2021))

    }

    XCTAssertFalse failed

    ```


    我们现在已经到达无法再继续“伪装”实现的地步。再使用另一个硬编码值将无法同时通过两个测试：


    ```

    func isLeap(_ year: Int) -> Bool {

    return year % 4 == 0

    }

    ```


    让我们继续下一个测试：


    ```

    func testEvenlyDivisibleBy100IsNotLeap() {

    XCTAssertFalse(isLeap(2100))

    }

    XCTAssertFalse failed

    ```


    我能想到让这个测试通过的最简单方法是添加一个守卫语句：


    ```

    func isLeap(_ year: Int) -> Bool {

    guard year % 100 != 0 else { return false }

    return year % 4 == 0

    }

    ```


    我们只剩一个测试要写了：


    ```

    func testEvenlyDivisibleBy400IsLeap() {

    XCTAssertTrue(isLeap(2000))

    }

    XCTAssertTrue failed

    ```


    和前文一样，我能想到的最简单方法还是一个守卫：


    ```

    func isLeap(_ year: Int) -> Bool {

    guard year % 400 != 0 else { return true }

    guard year % 100 != 0 else { return false }

    return year % 4 == 0

    }

    ```


    我们所有的测试都通过了。现在有了一个完整的函数，用于判断给定年份是否为闰年。


    我们通过以下步骤达到了这个结果：编写一个测试，观察它失败，利用失败信息编写刚好能让测试通过的代码，然后对下一个测试重复这个过程。红色，绿色，红色，绿色，红色，绿色。


    我们并没有给自己设定一步到位写出可用实现的高远目标。相反，我们利用测试的反馈，几乎一点一点地构建它，每次都编写尽可能简单的代码。


    通常，为了让测试通过，你编写的代码会相当丑陋。这没关系。记住：小步增量。先让代码工作，再让它变得整洁。


    拥有测试，并且知道它们覆盖了代码的行为——因为你亲眼看到它们从红色变为绿色——能给你重构的自信。重构意味着在不影响行为的前提下改变代码的外观。重构是测试驱动开发（TDD）的核心部分。


    在探讨重构如何融入工作流程之前，我先就测试的结构说几句。


    ## 安排、执行、断言


    我们用于驱动闰年实现的测试都是一行代码。被测对象、其输入和输出，以及针对预期行为的断言，都整齐地放在一行中：


    ```

    func testEvenlyDivisibleBy4IsLeap() {

    XCTAssertTrue(isLeap(2020))

    }

    ```


    当被测行为不像一个接收一个输入并返回`Bool`的方法那么简单时，通过将测试显式分为三个阶段来组织测试会很有帮助：


    * **安排**：准备输入。

    * **执行**：执行被测行为。

    * **断言**：验证输出是否符合预期。


    让我们按照“安排、执行、断言”重写上面的测试：


    ```

    func testEvenlyDivisibleBy4IsLeap() {

    let year = 2020         // 安排

    let leap = isLeap(year) // 执行

    XCTAssertTrue(leap)     // 断言

    }

    ```


    清晰且一致地组织你的测试将有助于你浏览它们，因为所有测试都会呈现相同的结构。无论是寻找输入、被测试的方法，还是断言，都会更容易，因为它们总是位于测试中的相同位置。“万物各得其所”这句谚语不仅适用于你的家，也适用于你的代码库。


    这三个阶段的另一种表述是“给定、当、则”。给定一个能被 4 整除的年份，当调用`isLeap(_:)`时，则结果为`true`。


    “给定、当、则”更适合高层次测试，比如那些着眼于完整用户旅程的 UI 测试：给定一个已认证用户，当加载设置页面时，则显示认证提示。由于本书专注于单元测试，我们将使用“安排、执行、断言”。


    现在我们已经学会了如何组织测试，让我们看看重构在测试驱动开发流程中的位置。

    '
- fmt: '# First Make the Test Pass; then Make the Code Clean


    Test-Driven Development frees you from the mental burden of having to write code
    that is at the same time working and clean. First, the tests guide you in writing
    code that works. Then, they give you the confidence to focus on making it clean.


    Imagine you have a `Product` value type defined like this:


    ```

    struct Product {

    let category: String

    let price: Double

    }

    ```


    You need to write a function that, given an array of sold `Product`s and a category
    value, returns the total amount sold for that category:


    ```

    func sumOf(_ products: [Product], withCategory category: String) -> Double {

    return 0.0

    }

    ```


    Let’s start with the Test List:


    ```

    import XCTest

    class SumOfProductsTests: XCTestCase {

    func testSumOfEmptyArrayIsZero() {}

    func testSumOfOneItemIsItemPrice() {}

    func testSumIsSumOfItemsPricesForGivenCategory() {}

    }

    ```


    Let’s start with the first test: the product category sum of an empty array should
    be zero. Behavioral *edges* like this one are usually simpler to implement. In
    this case, because the input array is empty, we know the implementation will involve
    very little logic, which gives us a chance to lay the functional scaffold on which
    we’ll then build the complete behavior:


    ```

    func testSumOfEmptyArrayIsZero() {

    let category = "books"

    let products = [Product]()

    let sum = sumOf(products, withCategory: category)

    XCTAssertEqual(sum, 0 )

    }

    ```


    Because the dummy implementation of the function returns `0`, the test passes
    already. That’s okay with me. I know that as we’ll add more tests, they’ll require
    the implementation to be correct.


    Let’s keep building up to our complete implementation by tackling the other behavioral
    edge case:


    ```

    func testSumOfOneItemIsItemPrice {

    let category = "books"

    let products = [Product(category: category, price: 3)]

    let sum = sumOf(products, withCategory: category)

    XCTAssertEqual(sum, 3)

    }

    XCTAssertEqual failed: ("0.0") is not equal to ("3.0")

    ```


    Here’s the first implementation that I came up with:


    ```

    var sum = 0.0

    for product in products {

    sum += product.price

    }

    return sum

    ```


    The tests are now passing. It’s time to ask the question: is there a better way
    to write this code?


    I prefer collection manipulations over `for` loops. How does this look?


    ```

    return products.reduce(0.0) { $0 + $1.price }

    ```


    The tests still pass, and we got rid of the need to define a `var` to collect
    the sum as we iterate through the array.


    The tests helped us make sure that our change in the code’s implementation didn’t
    affect its behavior. That’s the definition of a refactor: a change in the way
    the code is written that doesn’t change its behavior.


    There’s only one test left to write, the one for the function’s main use case:


    ```

    func testSumIsSumOfItemsPricesForGivenCategory() {

    let category = "books"

    let products = [

    Product(category: category, price: 3),

    Product(category: "movies", price: 2),

    Product(category: category, price: 1)

    ]

    let sum = sumOf(products, withCategory: category)

    XCTAssertEqual(sum, 4)

    }

    XCTAssertEqual failed: ("6.0") is not equal to ("4.0")

    ```


    This test doesn’t pass because there is no logic to select only the `Product`s
    matching the given category:


    ```

    return products.reduce(0.0) {

    guard $1.category == category else { return $0 }

    return $0 + $1.price

    }

    ```


    With this updated implementation, the test passes; therefore, the implementation
    works. Again, let’s ask the question: can we improve it?


    I like how the code steps through the array only once, but I’d rather have the
    filtering operation separate from the summation:


    ```

    return products

    .filter { $0.category == category }

    .reduce(0.0) { $0 + $1.price }

    ```


    I think this reads better; it clearly says “given some products, take the ones
    matching a category and then sum their price.”


    Once again, we moved from the red state to the green one and then refactored the
    code.


    **Red, green, refactor. That’s the TDD mantra**.


    Forcing yourself to write code that works, is elegant, and has no duplication
    requires more energy than solving each of those problems in isolation. Test-Driven
    Development gives you the process to fully focus on one problem at a time.


    That’s not to say you should intentionally write dirty or suboptimal code just
    to make the tests pass if you already have a better solution in mind. Write the
    first implementation that comes to you, then, once you made the tests green, ask
    yourself whether you can improve the code. You’ll be surprised and delighted at
    how many times you’ll answer yes.


    We’ve seen how a failing test acts as a feedback mechanism on the code’s correctness
    and as a suggestion on what to implement next. In Swift, we can leverage another
    feedback mechanism as powerful as the failing tests: the compiler.


    ## The Compiler Is Part of the TDD Process


    The introduction of Swift in 2014 was a big revolution in the Apple development
    ecosystem. With its strong type system, it was a change of course from Objective-C’s
    dynamic nature.


    A strong type system removes a whole set of type mismatch runtime errors. If you
    modify a function to return `Array<String>` instead of `String`, all its callers
    will fail to compile with “Cannot convert value of type ‘`Array<String>`’ to specified
    type ‘`String`’.” In a dynamic language, the app would have still run, only to
    fail as soon as it tried to call a `String` method on the returned array value.


    Strong types also help you make inconsistent state *impossible to represent*.
    My favorite example is using an `enum` to represent the mutually exclusive states
    as opposed to a set of nullable properties for each possible value:


    ```

    let responseValue: Value?

    let responseError: Error?

    // vs

    let response: Result

    ```


    With the `responseValue` and `responseError` pair, you need to write a test to
    ensure that if one is `nil`, the other has a value and that they’re never `nil`
    at the same time. Using the `Result enum` shifts this test to the type system
    level. The compiler enforces the mutually exclusive relationship; you don’t need
    to write a test for it.


    When you look at the code through the lens of the tests, having a strong type
    system makes a whole set of tests unnecessary.


    In a strongly typed language, TDD is as much Test-Driven Development as it is
    *Type-Driven* Development. Compiler errors are like test failures: they give you
    feedback on your code’s correctness, and you can encode tests in your objects
    and functions type signatures.


    Let’s see how we can leverage the compiler to know what code to write next the
    same way we do when reading test failures.'
