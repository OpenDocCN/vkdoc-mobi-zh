- fmt: '## Informing the User of the Checkout Completion


    In the previous chapter, we wrote the code starting the order processing flow
    by making `OrderDetail.ViewModel`''s `checkout()` method call `PaymentProcessing`''s
    `process(order:)` with the `Order` stored in the `OrderController`.


    We need a way to notify the user of their order''s outcome: whether the payment
    was successful and the kitchen received it or there was an error in the flow.


    Test-Driven Development is all about small iterations. What''s an Earliest Testable
    version of this flow? We could start by simply showing an alert after the payment
    completes.


    SwiftUI has a dedicated type and APIs for showing alerts. The simplest way to
    present an alert is to have a `@State` wrapped property in the `View` representing
    whether it should be on-screen and then use the `View` method `alert(isPresented:,
    content:)` to define the `Alert` to present if the property is `true`:


    ```

    struct ExampleView: View {

    @State var showingAlert = false

    var body: some View {

    Button {

    self.showingAlert.toggle()

    } label: {

    Text("Show Alert")

    }

    .alert(isPresented: $showingAlert) {

    Alert(

    title: Text("Hello"),

    message: Text("Hi, I''m an alert"),

    dismissButton: .default(Text("Bye"))

    )

    }

    }

    }

    ```


    `alert(isPresented:, content:)` expects the value of `isPresented` to be a `Binding<Bool>`.
    [`Binding<Value>`](https://developer.apple.com/documentation/swiftui/binding)
    is a SwiftUI type and property wrapper that creates "a two-way connection between
    a property that stores data and a view that displays and changes the data."


    With `Binding`, the `Alert` can change the value of `showingAlert` once the user
    clicks the dismiss button.


    The option we just discussed is a good introduction to presenting alerts but has
    all of the intelligence in the view and doesn''t allow conditional logic. To present
    a different alert based on the result of the payment processing, we can use the
    more refined `alert(item:, content:)` API. `alert(item:, content:)` expects `item`
    to be a `Binding<Optional<Identifiable>>`. The `Binding` wrapper allows SwiftUI
    to update the wrapped value from the alert view once presented or dismissed. The
    `Optional` tells the framework that when the value changes from `none` to `some`,
    it should present the alert. The `content` parameter has to be a `(Identifiable)
    -> Alert` closure and SwiftUI will call it to get the `Alert` to show.


    Thanks to this API, we can extract all of the conditional logic involved in presenting
    the alert in types detached from SwiftUI, allowing us to use Test-Driven Development
    to build them.


    1.  Define a ViewModel for the alert.

    2.  Add a `@Published` property to `OrderDetail.ViewModel` with an `Optional`
    alert ViewModel.

    3.  Make `OrderDetail.ViewModel` update this property based on the result of the
    payment processing.

    4.  Make `OrderDetail` read the `Binding` value associated with the `@Published`
    property (using the `$` prefix).


    The ViewModel for the alert can be a plain `struct`:


    ```

    // Alert.ViewModel.swift

    import SwiftUI

    extension Alert {

    struct ViewModel: Identifiable {

    let title: String

    let message: String

    let buttonText: String

    var id: String { title + message + buttonText }

    }

    }

    ```


    The next step is to add an `Alert.ViewModel @Published` property to `OrderDetail.ViewModel`:


    ```

    // OrderDetail.ViewModel.swift

    // ...

    extension OrderDetail {

    class ViewModel: ObservableObject {

    // ...

    @Published private(set) var alertToShow: Alert.ViewModel?

    // ...

    }

    }

    ```


    If you build the code for testing after this change using the `Shift Cmd U` keyboard
    shortcut, you''ll see that it still compiles even though we didn''t update the
    `init` method of `OrderDetail.ViewModel`. The reason is that the Swift compiler
    can infer the default value of an `Optional` variable, like `var alertToShow:
    Alert.ViewModel?`, to be `none`. That''s precisely the value we want because we
    should show the alert only once the payment processing finishes.


    Let''s write the test list for this behavior:


    ```

    // OrderDetail.ViewModelTests.swift

    @testable import Albertos

    import XCTest

    class OrderDetailViewModelTests: XCTestCase {

    // ...

    func testWhenPaymentSucceedsUpdatesPropertyToShowConfirmationAlert() {}

    func testWhenPaymentFailsUpdatesPropertyToShowErrorAlert() {}

    }

    ```


    Let''s begin with the failure scenario to ensure we give error handling the care
    it deserves.


    To test that the payment processing fails, we need to simulate this scenario in
    the `PaymentProcessing` dependency. We can do that using a Stub Test Double, as
    we learned in Chapter [8](#501287_1_En_8_Chapter.xhtml):


    ```

    // PaymentProcessingStub.swift

    @testable import Albertos

    import Combine

    import Foundation

    class PaymentProcessingStub: PaymentProcessing {

    let result: Result

    init(returning result: Result) {

    self.result = result

    }

    func process(order: Order) -> AnyPublisher {

    return result.publisher

    // Use a delay to simulate the real world async

    // behavior

    .delay(for: 0.01, scheduler: RunLoop.main)

    .eraseToAnyPublisher()

    }

    }

    ```


    With the Stub, we can arrange the system under test''s inputs and act on it by
    calling the `checkout()` method:


    ```

    func testWhenPaymentFailsUpdatesPropertyToShowErrorAlert() {

    let viewModel = OrderDetail.ViewModel(

    orderController: OrderController(),

    paymentProcessor: PaymentProcessingStub(returning: .failure(TestError(id: 123)))

    )

    viewModel.checkout()

    // Assert the result: ???

    }

    ```


    How can we verify that the `@Published` property holding the ViewModel has changed
    to the value we expect when the payment processing fails?


    The code we are working with is asynchronous, but it doesn''t have a callback
    or a `Publisher` to which we can attach a handler to fulfill an `XCTestExpectation`
    like we did when testing the networking behavior in Chapter [10](#501287_1_En_10_Chapter.xhtml).


    One easy option would be removing the artificial delay from the Stub to make the
    test synchronous.


    I want to take this occasion, though, to show you another approach to testing
    asynchronous code.'
