  trans: '

    # 固定装置（Fixtures）


    为了降低更新 `MenuItem.init()` 的成本，我们可以让测试在一个集中的位置初始化它，这样每当它的结构发生变化时，我们只需更新一处代码。


    我们可以在测试目标中扩展 `MenuItem`，提供一个静态方法供测试使用，以获取该类型的一个实例。这种方法被称为固定装置（fixture），由于我们在扩展中定义固定装置，这种技术被称为
    *固定装置扩展（Fixture Extension）*：


    ```

    // MenuItem+Fixture.swift

    @testable import Albertos

    extension MenuItem {

    static func fixture(

    category: String = "category",

    name: String = "name"

    ) -> MenuItem {

    MenuItem(category: category, name: name)

    }

    }

    ```


    所有输入参数的默认值是降低测试套件维护成本的关键。


    当你添加一个新属性时，只需更新固定装置并提供一个默认值即可。你无需更新任何现有测试，并且在编写需要该属性的新测试时，你可以直接使用包含新属性的固定装置。当你删除一个属性时，唯一需要更新的测试是那些在调用固定装置时传入了该属性自定义值的测试。


    我们可以像下面这样更新测试以使用固定装置：


    ```

    // MenuGroupingTests.swift

    func testMenuWithOneCategoryReturnsOneSection() throws {

    let menu = [

    MenuItem.fixture(category: "pastas", name: "name"),

    MenuItem.fixture(category: "pastas", name: "other name"),

    ]

    let sections = groupMenuByCategories(menu)

    XCTAssertEqual(sections.count, 1)

    let section = try XCTUnwrap(sections.first)

    XCTAssertEqual(section.items.count, 2)

    XCTAssertEqual(section.items.first,  "name")

    XCTAssertEqual(section.items.last, "other name")

    }

    ```


    现在，要添加 `spicy` 属性，唯一需要修改的代码就在固定装置的定义中：


    ```

    // MenuItem.swift

    struct MenuItem {

    let name: String

    let category: String

    let spicy: Bool

    }

    // MenuItem+Fixture.swift

    extension MenuItem {

    static func fixture(

    category: String = "category",

    name: String = "name",

    spicy: Bool = false,

    ) -> MenuItem {

    MenuItem(

    category: category,

    name: name,

    spicy: spicy

    )

    }

    }

    ```


    ## 固定装置（Fixtures）与便利初始化器（Convenience Initializers）


    为什么要定义固定装置而不是带有默认值的便利初始化器？因为清晰性。


    当阅读 `let item = MenuItem.fixture(name: "a name")` 时，这个实例携带了专为测试目的选择的默认值，这比阅读 `let
    item = MenuItem(name: "a name")` 要清晰得多。调用 `MenuItem(...)` 看起来像生产代码；而 `MenuItem.fixture(...)`
    则是属于测试套件的内容。


    让你的代码清晰易读具有巨大的投资回报：你只编写一次代码，但你和你的队友会阅读它很多次。这对于测试代码和生产代码同样适用。


    ## 固定装置（Fixtures）使测试的行动者（Actors）更明确


    一旦你建立了固定装置，就可以通过只关注那些真正影响被测行为的输入元素来编写更清晰的测试。


    让我们看看上一章中这个没有使用固定装置的测试：


    ```

    func testMenuWithManyCategoriesReturnsOneSectionPerCategoryInReverseAlphabeticalOrder()
    {

    let menu = [

    MenuItem(            category: "pastas", name: "a pasta", spicy: false        ),

    MenuItem(            category: "drinks", name: "a drink", spicy: false        ),

    MenuItem(            category: "pastas", name: "another pasta", spicy: false        ),

    MenuItem(            category: "desserts", name: "a dessert", spicy: false        ),

    ]

    let sections = groupMenuByCategories(menu)

    XCTAssertEqual(sections.count, 3)

    XCTAssertEqual(sections[0].category,  "pastas")

    XCTAssertEqual(sections[1].category,  "drinks")

    XCTAssertEqual(sections[2].category, "desserts")

    }

    ```


    我们正在测试生成的分类（sections）是否与输入的类别（categories）匹配，并且是否按字母逆序排列。在输入的所有属性中，唯一影响输出的是 `category`。然而，我们准备输入代码时，却不得不为所有其他无关属性添加值。


    使用固定装置，我们可以去除这些噪声，使输入只关注真正重要的内容：


    ```

    let menu = [

    MenuItem.fixture(category: "pastas"),

    MenuItem.fixture(category: "drinks"),

    MenuItem.fixture(category: "pastas"),

    MenuItem.fixture(category: "dessert")

    ]

    ```


    **额外提示**


    你可以通过定义数组类型，然后在调用函数时省略 `MenuItem` 来使代码更紧凑；Swift 编译器会自行推断。


    ```

    let menu: [MenuItem] = [

    .fixture(category: "pastas"),

    .fixture(category: "drinks"),

    .fixture(category: "pastas"),

    .fixture(category: "dessert")

    ]

    ```


    除了使你的测试对读者更清晰，并消除修改源代码时的摩擦之外，固定装置还能在你编写测试本身时节省时间。你无需考虑与被测行为无关的属性的赋值，也无需输入它们。


    ## 固定装置（Fixtures）是可组合的


    你可以使用固定装置来定义新的固定装置。例如，下面展示了如何为 `MenuSection` 定义一个固定装置：


    ```

    // MenuSection+Fixture.swift

    @testable import Albertos

    extension MenuSection {

    static func fixture(

    category: String = "a category",

    items: [MenuItem] = [.fixture()]

    ) -> MenuSection {

    return MenuSection(category: category, items: items)

    }

    }

    ```


    ## 尽早引入固定装置（Fixtures）


    引入固定装置就像为退休储蓄；由于复利效应，你开始得越早，获得的价值就越大。


    为一个类型定义固定装置并将其应用于现有测试，短期内会拖慢你的速度，但当需要更改该类型的结构时，你很快就能弥补回来。


    *三次法则* 是决定何时引入固定装置的一个良好启发式方法。如果你已经在两个测试中调用了某个类型的 `init`，那么在调用第三个之前，就为它定义一个固定装置。


    ## 练习时间


    为了亲身体验固定装置的价值，请为 `MenuItem` 添加新的属性。例如，在后续开发中，我们可能需要一个表示菜肴价格的属性。尝试添加它，并看看你需要在生产和测试代码中修改哪些部分：


    ```

    // MenuItem.swift

    struct MenuItem {

    let name: String

    let category: String

    let spicy: Bool

    let price: Double

    }

    ```


    ## 要点总结


    *   **使用固定装置扩展（Fixture Extension）来消除更新生产代码类型结构时的摩擦**。通过在测试中创建值的方式与其 `init` 之间增加一层间接性，当你编辑、添加或删除类型的属性时，将无需更新每一个测试调用点。

    *   **固定装置帮助你将测试聚焦于关键的行动者（Actors）**。得益于其默认值，固定装置允许你省略那些不影响被测行为的 `init` 参数。

    *   **固定装置是可组合的**。你可以将一个固定装置用作另一个固定装置某个属性的默认值。

    *   **尽早引入固定装置**。固定装置节省时间的效果会随着时间的推移而累积；你可以采用“三次法则”这个启发式方法来决定何时添加它们。


    ## 尾注


    1.  有人可能会争辩说，在开发的这个阶段，为辛辣食物添加 UI 提示并非最高优先级，我们应该专注于构建应用核心功能的骨架，例如网络 API 和点单功能。绝对正确！然而，从学习如何通过测试驱动开发
    iOS 应用程序的角度来看，在继续探讨更高级的主题之前，学习为生成 UI 数据的逻辑编写单元测试是非常有用的。

    '
- fmt: '# 6. Testing Static SwiftUI Views


    *How do you use Test-Driven Development for the view layer when there is no straightforward
    way to test SwiftUI views?*


    *By extracting* *all the view configuration logic in a dedicated object and test
    that instead.*


    Xcode Previews and manual testing are not the only ways to make sure your views
    behave correctly. In this chapter, we’ll learn how to use tests to guide us in
    implementing the view behavior. The key is to make the view *humble* and free
    from any logic and have it ask what to show to an object that is not tied to SwiftUI,
    one we can easily implement test-first. We’ll call this object *ViewModel* and
    look at how to build it for two of our views.


    ## The Problem with Presentation Logic in the View


    In the previous chapter, we added a `spicy` property to `MenuItem` to start implementing
    Alberto’s request of having a visual hint to indicate which items are spicy. The
    first iteration of the UI for this feature can be a simple chili emoji: ![../images/501287_1_En_6_Chapter/501287_1_En_6_Figb_HTML.gif](images/501287_1_En_6_Chapter/501287_1_En_6_Figb_HTML.gif).


    It might be tempting to add the required presentation logic in the existing `MenuList`
    code, from this


    ```

    Text(item.name)

    ```


    to this


    ```

    Text(item.spicy ? "\(item.name) 🌶" : item.name)

    ```


    The first concern with this approach is a practical one: embedding presentation
    logic in the view layer can quickly bloat it, making it harder to read. The code
    to add a spiciness indicator is a one-liner, but that’s not always the case; there
    might be an enum to switch on or multiple values to read.


    Even if you weren’t bothered by bloated view files, there is the question of how
    to test this code. As of this writing, Apple does not provide a straightforward
    way of writing unit tests for SwiftUI views, encouraging developers to iterate
    on them using Xcode Previews instead.


    Previews are an excellent feedback mechanism for how the layout you’re writing
    looks like, but they cannot tell you if the logic is correct with the same level
    of detail as a test.


    Writing tests for SwiftUI views is inconvenient because the only outlet we have
    to inspect them is their [*opaque*](https://docs.swift.org/swift-book/LanguageGuide/OpaqueTypes.html)
    `body` property. We may define a view like this:


    ```

    import SwiftUI

    struct ExampleView: View {

    var body: some View {

    VStack {

    Text("Title").bold()

    Text("Subtitle")

    }

    }

    }

    ```


    But when we access the `body` property at runtime, it’s a much more complex object:[¹](#501287_1_En_6_Chapter.xhtml#Par1000)


    ```

    VStack>(_tree: SwiftUI._VariadicView.Tree<SwiftUI._VStackLayout, ...

    ```


    This might seem a limitation, but the framework’s declarative philosophy makes
    it unnecessary for a consumer to ever worry about the content of the `body`.


    “Views are a function of state, not a sequence of events,” explains Luca Bernardi,
    one of the SwiftUI engineers at Apple, in the [*Data Flow Through SwiftUI*](https://developer.apple.com/videos/play/wwdc2019/226/%253Ftime%253D589)
    WWDC 2019 session. SwiftUI unidirectional data flow architecture is such that
    the only knob developers can turn to affect the view is the state they feed it
    as input.


    There is little value in writing tests that inspect the view itself because the
    body’s runtime value is an implementation detail of how SwiftUI works. As long
    as we play by the rules of the framework, we can trust that if we supply a view
    with a correct state, it will render on screen as intended.


    **SwiftUI doesn’t limit testability. It enhances it!** It makes it simpler and
    secure to apply *Partition Problem and Solve Sequentially*.


    ## Decouple Presentation Logic from the View Implementation


    In the preceding inline approach, `MenuList` is in charge of two things: defining
    the menu row layout and deciding whether to add each item’s spiciness indicator.
    It has two responsibilities. It’s solving two problems.


    The layout definition is a problem that lives in the SwiftUI domain; `MenuList`
    is the best place to solve it. However, the presentation logic evaluating whether
    to add the 🌶 symbol has no reason to be tied to the SwiftUI framework: we can
    build it in isolation.


    Giving `MenuList` responsibility for both defining the layout and deciding its
    content blows up its self-esteem. We’d better make it humble[²](#501287_1_En_6_Chapter.xhtml#Par4560)
    and only take care of what it’s best suited for: defining the layout.


    To put `MenuList`’s ambition in check, we can extract the logic to decide what
    content it should display in a dedicated object that we can build using TDD. Once
    completed, we’ll make `MenuList` ask this new component what to show.


    ## Preparatory Refactor: Reduce the Working Surface Area


    Adding the spiciness hint is a change at the individual menu row level, but our
    only access to the rows is through `MenuList`. To make our job easier, let’s refactor
    the view to isolate the part we need to work on:


    ```

    // MenuList.swift

    import SwiftUI

    struct MenuList: View {

    let sections: [MenuSection]

    var body: some View {

    List {

    ForEach(sections) { section in

    Section(header: Text(section.category)) {

    ForEach(section.items) { item in

    MenuRow(item: item)

    }

    }

    }

    }

    }

    }

    // MenuRow.swift

    import SwiftUI

    struct MenuRow: View {

    let item: MenuItem

    var body: some View {

    Text(item.name)

    }

    }

    ```


    Reducing the code’s surface area makes it easier to reason about and manipulate.


    Since we don’t have any test for the view – yet – the only way we have to check
    that this refactor succeeded is to look at the Xcode Preview or launch the app.'
