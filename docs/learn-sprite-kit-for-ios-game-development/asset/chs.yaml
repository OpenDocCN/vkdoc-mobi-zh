  \ != 0) &&\n     ((secondBody.categoryBitMask & kRatzCategory) != 0))) {\n    SKBRatz\
  \ *theRatz = (SKBRatz *)secondBody.node;\n    if (theRatz.position.x < 100) {\n\
  \        [theRatz wrapRatz:CGPointMake(self.frame.size.width-11,\n             \
