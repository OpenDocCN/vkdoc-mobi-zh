  \n## 敌人“Ratz”类\n\n名为“ratz”的新敌人精灵拥有自己的一系列动画帧。你需要将这些帧添加到项目中，并移入`Sprites`文件夹。你可能还想在`Sprites`文件夹内专门为新角色创建一个新的组（文件夹）。从`Images`文件夹中添加所有以`Ratz_`为前缀的\
