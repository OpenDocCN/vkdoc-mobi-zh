  \n### 背景颜色\n\n在这里，你将把背景颜色设为纯黑色。`UIColor`提供了一些便捷方法，让你可以通过颜色名称快速创建常用颜色，而无需尝试确定 RGB\
  \ 值。为方便你参考，我将它们列出如下：\n\n```objc\nblackColor; // 0.0 white\ndarkGrayColor; // 0.333\
  \ white\nlightGrayColor; // 0.667 white\nwhiteColor; // 1.0 white\ngrayColor; //\
  \ 0.5 white\nredColor; // 1.0, 0.0, 0.0 RGB\ngreenColor; // 0.0, 1.0, 0.0 RGB\n\
  blueColor; // 0.0, 0.0, 1.0 RGB\ncyanColor; // 0.0, 1.0, 1.0 RGB\nyellowColor; //\
  \ 1.0, 1.0, 0.0 RGB\nmagentaColor; // 1.0, 0.0, 1.0 RGB\norangeColor; // 1.0, 0.5,\
  \ 0.0 RGB\npurpleColor; // 0.5, 0.0, 0.5 RGB\nbrownColor; // 0.6, 0.4, 0.2 RGB\n\
  clearColor; // 0.0 white, 0.0 alpha\n```\n\n让我们修改`initWithSize`方法，通过替换`SKBMyScene.m`文件中的原始代码为你自己的代码，使其匹配以下内容：\n\
  \n```objc\n-(id)initWithSize:(CGSize)size {\n    if (self = [super initWithSize:size])\
  \ {\n        /* Setup your scene here */\n        self.backgroundColor = [SKColor\
  \ blackColor];\n    }\n    return self;\n}\n```\n\n非常简单——你的`SKScene`现在将拥有一个纯黑色的背景。\n\
  \n### 启动画面\n\n\n"
- "# SKActions 与 SKTextures：你的第一个动画精灵\n\n你的项目中已经包含了用于启动画面的图像，现在需要将其添加到屏幕上。在刚刚添加的 `self.backgroundColor`\
  \ 代码行之后，立即添加以下代码：\n\n```objective-c\n/* 在此处设置你的场景 */\n\nself.backgroundColor = [SKColor\
  \ blackColor];\n```\n\n```objective-c\nNSString *fileName = @\"\";\nif (self.frame.size.width\
  \ == 480) {\n    fileName = @\"SewerSplash_480\";\n    // iPhone Retina (3.5 英寸)\n\
  } else {\n    fileName = @\"SewerSplash_568\";\n    // iPhone Retina (4 英寸)\n}\n\
  \nSKSpriteNode *splash = [SKSpriteNode spriteNodeWithImageNamed:fileName];\nsplash.name\
  \ = @\"splashNode\";\nsplash.position = CGPointMake(CGRectGetMidX(self.frame), CGRectGetMidY(self.frame));\n\
  [self addChild:splash];\n```\n\n首先创建了一个空的 `NSString` 用于保存文件名。然后判断用户使用的是 3.5 英寸屏幕还是\
  \ 4 英寸屏幕。这里检查的是视图的高度而非宽度，因为在应用程序的这个阶段，设备尚未完成旋转——几乎旋转了，但尚未完成。\n\n确定要使用的文件名后，通过便捷方法\
  \ `spriteNodeWithImageNamed` 创建了一个 `SKSpriteNode` 对象。\n\n接着，设置 `name` 属性为节点赋予一个字符串名称，以便后续在其他方法中按需引用该节点。\n\
  \n### 锚点\n\n默认情况下，精灵的帧以其位置为中心，且该位置就是图形/帧的中心点。通过修改精灵节点的 `anchorPoint` 属性，可以将其位置移动到帧上的其他点。图\
  \ 2-3 说明了这一点。\n\n**图 2-3.** 对比两种锚点设置\n\n在图 2-3 的示例中，可以看到当精灵旋转时，移动锚点会带来显著差异，因为它成为了旋转的中心点。然而，在处理碰撞和接触时，锚点同样会产生影响，这一点将在后续章节中看到。请注意，锚点使用的值是单位坐标系中的数值，因此无论精灵尺寸如何，左下角都是\
  \ `(0.0, 0.0)`，右上角都是 `(1.0, 1.0)`。\n\n### 回到启动画面\n\n在场景中设置新精灵的位置时，需要牢记精灵的锚点默认是 `(0.5,\
  \ 0.5)`，即图像的中心。因此，你也希望图像在场景中居中显示。`position` 属性需要 `CGPoint` 值，你可以使用两个便捷方法（`CGRectGetMidX`\
  \ 和 `CGRectGetMidY`）来确定 X 轴和 Y 轴的中心点。眼尖的读者可能已经注意到，你在 `CGPointMake` 方法中似乎颠倒了顺序。确实如此，这是因为设备尚未正式旋转为横屏模式，而你已经确定要实现横屏效果。因此，在这段代码中，你仍然需要检查\
  \ `SKView` 的高度，以确定屏幕尺寸和精灵的位置（而精灵是以横屏方向绘制的）。\n\n现在，精灵已经创建并配置完毕，是时候将其放入场景并进行绘制了——将它作为子节点添加到\
  \ `SKScene` 中（如前面代码所示）。\n\n如果你现在构建并运行程序，应该能看到漂亮的启动画面。\n\n### 场景切换\n\n接下来，你将实现这样一个功能：当用户触摸屏幕时，不会生成旋转的宇宙飞船，而是将他们带到主游戏画面（下一个场景）。\n\
