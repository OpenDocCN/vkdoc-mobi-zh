  \n## 轻微的视图控制器更改\n\n由于视图控制器视图默认以竖屏方式加载，因此当场景添加到视图时，大小值可能不符合预期。要解决此问题，可以在 `viewWillLayoutSubviews`\
  \ 方法中设置场景及其缩放属性，而不是在通常的 `viewDidLoad` 方法中，因为在视图加载完成后已经太迟了——必须在加载之前完成。\n\n在 `SKBViewController.m`\
  \ 文件中，将 `viewDidLoad` 方法替换为以下代码：\n\n```objc\n- (void)viewWillLayoutSubviews\n{\n\
  ```\n\n\n[toc]\n\n### `/GKState didEnterWithPreviousState` 方法\n\n```objc\n[super\
  \ viewWillLayoutSubviews];\n\n// Configure the view.\n\nSKView * skView = (SKView\
  \ *)self.view;\n\nif (!skView.scene) {\n\nskView.showsFPS = YES;\n\nskView.showsNodeCount\
  \ = YES;\n\n// Create and configure the scene.\n\nSKScene * scene = [SKScene sceneWithSize:skView.bounds.size];\n\
  \nscene.scaleMode = SKSceneScaleModeAspectFill;\n\n// Present the scene.\n\n[skView\
  \ presentScene:scene];\n\n}\n\n}\n```\n\n注意，你还需要添加一个`if()`语句来检查场景是否已经附加到视图上，如果场景已经存在，则忽略场景创建代码。这是因为这个方法可能被调用多次。\n\
  \n### 移除多余模板文本\n\n现在你将移除模板代码中的“Hello World”文本。在`SKBMyScene.m`文件中，查看第一个`initWithSize`方法内部的代码，并特别关注`if`语句中的以下代码：\n\
