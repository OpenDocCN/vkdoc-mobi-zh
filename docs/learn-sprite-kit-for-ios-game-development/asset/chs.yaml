  \ kPlayerLivesMax;\n_playerIsDeadFlag = NO;\n```\n\n然后，在`SKBGameScene.m`文件的`didBeginContact`方法中，在`Player\
  \ / Ratz if()`语句内部修改相应的变量：\n\n```\n} else if (theRatz.ratzStatus == SBRatzRunningLeft\
