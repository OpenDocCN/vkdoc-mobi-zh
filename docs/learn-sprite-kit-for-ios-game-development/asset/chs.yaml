  \n```objectivec\nNSArray *playerJumpTextures = nil;\nSBPlayerStatus nextPlayerStatus\
  \ = 0;\n```\n\n你创建了两个局部变量，用于存储动画纹理数组以及跳跃动画完成时将使用的状态。\n\n```objectivec\nif (self.playerStatus\
  \ == SBPlayerRunningLeft || self.playerStatus == SBPlayerSkiddingLeft) {\n    NSLog(@\"\
