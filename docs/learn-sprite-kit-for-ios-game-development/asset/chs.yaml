  \ **21**\n\n***图 2-4.** 重命名表单*\n\n接下来的选项由您决定。您将可以选择让 Xcode 在重构前自动拍摄快照。从某种意义上说，这可以让您通过恢复到之前的快照来撤销像这样的重大更改。通过单击`启用`或`禁用`按钮做出选择以继续。\n\
