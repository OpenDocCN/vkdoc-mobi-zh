  \ & kPipeCategory) != 0) && ((secondBody.categoryBitMask & kRatzCategory) != 0)))\
  \ {\n    SKBRatz *theRatz = (SKBRatz *)secondBody.node;\n    if (theRatz.position.x\
  \ < 100) {\n        [theRatz ratzHitLeftPipe:self];\n    } else {\n        [theRatz\
  \ ratzHitRightPipe:self];\n    }\n}\n```\n\n```objc\n// Ratz / Ratz\n```\n\n构建并运行程序。当金币到达下层任一侧管道时便会消失，而\
  \ Ratz 则隐入管道并从上方格栅中重新出现。\n\n## 偶尔卡住的敌人\n\n偶尔你会看到一些敌人卡在原地不动。在继续之前，我们先来解决这个问题。\n\n\
  `SKBGameScene.m` 文件中的 `update` 方法是检查每个敌人精灵是否卡住的最佳位置。你不需要每次 `update` 方法运行时都进行检查，但可以每隔大约\
  \ 20 帧检查一次。如果发现某个敌人精灵的位置与 20 帧前相同，就可以强制它立即转向并朝反向移动。\n\n要比较精灵的当前位置与之前的位置，需要为每个节点本地存储数据，因此让我们为这些敌人类和奖励类添加一些属性。\n\
  \n在 `SKBCoin.h` 文件中添加以下两个属性：\n\n```objc\n@property int coinStatus;\n@property int\
  \ lastKnownXposition, lastKnownYposition;\n@property (nonatomic, strong) SKBSpriteTextures\
  \ *spriteTextures;\n```\n\n在 `SKBRatz.h` 文件中执行相同操作：\n\n```objc\n@property int ratzStatus;\n\
  @property int lastKnownXposition, lastKnownYposition;\n@property (nonatomic, strong)\
  \ SKBSpriteTextures *spriteTextures;\n```\n\n为了每隔 20 帧（而非每帧）进行检查，你需要在 `SKBGameScene.h`\
  \ 文件中添加一个新的局部变量：\n\n```objc\n@property int frameCounter;\n@property int spawnedEnemyCount;\n\
  @property BOOL enemyIsSpawningFlag;\n```\n\n现在，在 `SKBGameScene.m` 文件的 `update` 方法中，插入处理\
  \ 20 帧计数器和触发逻辑的新代码：\n\n```objc\nSKBRatz *newEnemy = [SKBRatz initNewRatz:self\n\
  \                           startingPoint:CGPointMake(startX, startY)\n        \
  \                      ratzIndex:castIndex];\n[newEnemy spawnedInScene:self];\n\
  ```\n\n```objc\n// 每 20 帧检查一次卡住的敌人\n_frameCounter = _frameCounter + 1;\nif (_frameCounter\
  \ >=20) {\n    _frameCounter = 0;\n}\n```\n\n在这个 `if()` 语句内部，你可以插入检查卡住敌人的代码。首先检查场景中的所有金币。你可以使用\
  \ `enumerateChildNodesWithName` 方法按节点名称进行搜索——这些名称已被确保唯一且拥有共同前缀。将此枚举方法放在一个 `for()`\
  \ 循环中，该循环将遍历场景中的所有子节点。这里有一个新知识点：你将使用 `stop` 选项。如果将方法中的 `stop` 布尔变量设为 `YES`，它将搜索所有子节点并在第一个正向结果处停止；若设为\
  \ `NO`，则不会在第一个正向结果处停止，而是继续遍历所有子节点。由于你为每个敌人赋予了唯一名称，每个正向结果只会出现一次，因此将布尔值设为 `YES`：\n\
  \n```objc\nif (_frameCounter >=20) {\n    _frameCounter = 0;\n    for (int index=0;\
  \ index <= _spawnedEnemyCount; index++) {\n        // 金币\n        [self enumerateChildNodesWithName:[NSString\n\
  \            stringWithFormat:@\"coin%d\", index] usingBlock:^(SKNode\n        \
  \    *node, BOOL *stop) { *stop = YES; }];\n    }\n}\n```\n\n现在添加执行位置检查并处理卡住敌人的代码：\n\
  \n\n\n### 优化排版后的文本\n\n调用`[self enumerateChildNodesWithName:[NSString stringWithFormat:@\"\
  coin%d\", index] usingBlock:^(SKNode *node, BOOL *stop) { *stop = YES; SKBCoin *theCoin\
  \ = (SKBCoin *)node; int currentX = theCoin.position.x; int currentY = theCoin.position.y;\
  \ if (currentX == theCoin.lastKnownXposition && currentY == theCoin.lastKnownYposition)\
  \ { NSLog(@\"%@ appears to be stuck...\", theCoin.name); if (theCoin.coinStatus\
  \ == SBCoinRunningRight) { [theCoin removeAllActions]; [theCoin runLeft]; } else\
  \ if (theCoin.coinStatus == SBCoinRunningLeft) { [theCoin removeAllActions]; [theCoin\
  \ runRight]; } } theCoin.lastKnownXposition = currentX; theCoin.lastKnownYposition\
  \ = currentY;`。\n\n然后对`Ratz`类添加相同的代码。以下是`update`方法的完整更改，以便清晰起见：\n\n```\n// check\
  \ for stuck enemies every 20 frames\n_frameCounter = _frameCounter + 1;\nif (_frameCounter\
  \ >=20) {\n    _frameCounter = 0;\n    for (int index=0; index <= _spawnedEnemyCount;\
  \ index++) {\n        // Coins\n        [self enumerateChildNodesWithName:[NSString\
  \ stringWithFormat:@\"coin%d\", index] \n                               usingBlock:^(SKNode\
  \ *node, BOOL *stop) {\n            *stop = YES;\n            SKBCoin *theCoin =\
  \ (SKBCoin *)node;\n            int currentX = theCoin.position.x;\n           \
  \ int currentY = theCoin.position.y;\n            if (currentX == theCoin.lastKnownXposition\
  \ && currentY == theCoin.lastKnownYposition) {\n                NSLog(@\"%@ appears\
  \ to be stuck...\", theCoin.name);\n                if (theCoin.coinStatus == SBCoinRunningRight)\
  \ {\n                    [theCoin removeAllActions];\n                    [theCoin\
  \ runLeft];\n                } else if (theCoin.coinStatus == SBCoinRunningLeft)\
  \ {\n                    [theCoin removeAllActions];\n                    [theCoin\
  \ runRight];\n                }\n            }\n            theCoin.lastKnownXposition\
  \ = currentX;\n            theCoin.lastKnownYposition = currentY;\n        }];\n\
  \n        // Ratz\n        [self enumerateChildNodesWithName:[NSString stringWithFormat:@\"\
  ratz%d\", index] \n                               usingBlock:^(SKNode *node, BOOL\
  \ *stop) {\n            *stop = YES;\n            SKBRatz *theRatz = (SKBRatz *)node;\n\
  \            int currentX = theRatz.position.x;\n            int currentY = theRatz.position.y;\n\
  \            if (currentX == theRatz.lastKnownXposition && currentY == theRatz.lastKnownYposition)\
  \ {\n                NSLog(@\"%@ appears to be stuck...\", theRatz.name);\n    \
  \            if (theRatz.ratzStatus == SBRatzRunningRight) {\n                 \
  \   [theRatz turnLeft];\n                } else if (theRatz.ratzStatus == SBRatzRunningLeft)\
  \ {\n                    [theRatz turnRight];\n                }\n            }\n\
  \            theRatz.lastKnownXposition = currentX;\n            theRatz.lastKnownYposition\
  \ = currentY;\n        }];\n    }\n}\n```\n\n构建并运行程序，观察控制台，以便在检测到任何卡住的敌人时查看效果。\n\
  \n我还发现，有时需要在`SKBGameScene.m`文件的`didBeginContact`方法中调整与侧墙碰撞时的 X 轴位置，以防止敌人在墙边卡住：\n\
  \n```\n[theRatz wrapRatz:CGPointMake(self.frame.size.width-11, theRatz.position.y)];\n\
  } else {\n[theRatz wrapRatz:CGPointMake(11, theRatz.position.y)];\n```\n\n在这种情况下，硬编码的值`11`被改为`13`或其他值，直到它们不再沿边缘卡住。\n\
  \n### 设置玩家的起始位置\n\n到目前为止，玩家在用户点击屏幕之前都不会出现。这在最初开发游戏时没问题，但现在需要改变这一点。让玩家从屏幕左下角开始，面向右侧。\n\
  \n在`SKBGameScene.m`文件的`createSceneContents`方法末尾插入以下初始化代码：\n\n```\n// Scoring\nSKBScores\
  \ *sceneScores = [[SKBScores alloc] init];\n[sceneScores createScoreNode:self];\n\
  _scoreDisplay = sceneScores;\n_playerScore = 85942;\n[_scoreDisplay updateScore:self\
  \ newScore:_playerScore];\n\n// Player\n_playerSprite = [SKBPlayer initNewPlayer:self\
