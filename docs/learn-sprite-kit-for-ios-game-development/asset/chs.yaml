  \  \n\n![图片 73](img/index-241_1.jpg)  \n\n**关于作者**  \n\n**利兰·朗**的编程生涯始于一台 VIC-20\
  \ 电脑。随后他升级到 Apple IIe，接着又用上了 Mac 512，并开始使用 Lightspeed Pascal 编写更精致、更复杂的游戏。  \n\n\
  作为编程爱好者，利兰多年来用 BASIC 和 Pascal 写过程序，但他从未尝试学习更主流的语言（如 C）或面向对象概念。iPhone SDK 的发布改变了一切！以此为契机，利兰一头扎进所有能学到的\
  \ Objective-C 和 iOS 编程知识中。他目前是南卡罗来纳州一家地板安装公司的 IT 总监，与最小的女儿同住。他的大女儿和四个孙辈住得不远，让生活始终充满乐趣。\
  \  \n\n[www.it-ebooks.info](http://www.it-ebooks.info/)  \n\n![图片 74](img/index-242_1.jpg)\
  \  \n\n**关于技术审校**  \n\n**马修·诺特**从记事起就开始写代码——从惊叹于 BBC Micro 屏幕上移动的像素，到在过热的 ZX Spectrum\
  \ 48k 上为母亲编写糟糕的文字冒险游戏。马修过去 12 年一直从事专业软件开发，其中六年服务于教育领域，如今他进入了有时令人望而生畏的管理层（不过一旦大家看到他搞砸的预算，这个职位恐怕也干不长）。马修的工作和爱好基本是一回事，但闲暇时，他与妻子丽莎、两个孩子米奇和夏洛特一起，享受威尔士美丽地区的惬意生活。\
