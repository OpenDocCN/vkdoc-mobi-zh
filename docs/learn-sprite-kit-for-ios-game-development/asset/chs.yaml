  \ 节点。你无需太多操作就亲身体验了这两个元素的强大功能和多样性。你对这些对象的某些属性（包括密度、线性阻尼和弹性）进行了调整，然后观察了其效果。你开始探索如何设置和处理碰撞事件，以便实现屏幕环绕效果。随后，你向玩家精灵施加了一个脉冲力，使其按指令跳跃，并更新了动画以匹配其动作。最后，你通过制作一组砖块，并用关节将它们连接起来（当它们被添加到场景的物理引擎中时，这些关节像橡皮筋一样发挥作用），添加了一些可供奔跑的壁架。\n\
  \n因此，你取得了不少成果。你的精灵拥有一个广阔的世界以及多个障碍物，可以在其间奔跑并与之互动。但游戏有点孤单，还需要更多可做的事情。下一章将通过教你如何在游戏画面中添加更多精灵，很好地满足精灵的愿望！\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 章节：更多动画精灵：“敌人”与“奖励道具”\n\
