  ## 为纹理创建新类\n\n你已经对代码进行了大幅清理，但在添加纹理之前还有一项改动：创建一个新类来处理所有玩家的纹理。毕竟，在完成之前你还会添加更多纹理，因此这个类将提供一个集中管理所有细节的地方。\n\
  \n和之前创建玩家类一样，你需要为纹理新建一个文件和类。从 **File** 菜单中选择 **New File**。确保左侧选中了 **iOS** 和 **Cocoa\
  \ Touch**，然后从图标列表中选择 **Objective-C Class**，并点击 **Next** 按钮。点击 **Subclass of** 的下拉箭头，将其改为\
  \ **NSObject**，然后将新类命名为 `SKBSpriteTextures`。点击 **Next** 按钮，标准保存对话框会弹出。默认位置即可，只需确认\
  \ **Targets - Sewer Bros** 已勾选，然后点击 **Create** 按钮。两个新文件会被创建，并显示在左侧的 **Project Navigator**\
  \ 中。\n\n现在，将 `SKBSpriteTextures.h` 文件修改为如下内容：\n\n```objc\n#import <Foundation/Foundation.h>\n\
  #import <SpriteKit/SpriteKit.h>\n\n#define kPlayerRunRight1FileName @\"Player_Right1.png\"\
  \n#define kPlayerRunRight2FileName @\"Player_Right2.png\"\n#define kPlayerRunRight3FileName\
  \ @\"Player_Right3.png\"\n#define kPlayerRunRight4FileName @\"Player_Right4.png\"\
  \n\n@interface SKBSpriteTextures : NSObject\n\n@property (nonatomic, strong) NSArray\
  \ *playerRunRightTextures;\n\n- (void)createAnimationTextures;\n\n@end\n```\n\n\
  现在，将 `SKBSpriteTextures.m` 文件修改为如下内容：\n\n```objc\n@implementation SKBSpriteTextures\n\
  \n- (void)createAnimationTextures\n{\n    // 动画数组\n    // 向右奔跑\n    SKTexture *f1\
  \ = [SKTexture textureWithImageNamed:kPlayerRunRight1FileName];\n    SKTexture *f2\
  \ = [SKTexture textureWithImageNamed:kPlayerRunRight2FileName];\n    SKTexture *f3\
  \ = [SKTexture textureWithImageNamed:kPlayerRunRight3FileName];\n    SKTexture *f4\
  \ = [SKTexture textureWithImageNamed:kPlayerRunRight4FileName];\n    _playerRunRightTextures\
  \ = @[f1,f2,f3,f4];\n}\n\n@end\n```\n\n请注意，这里你将静态文件名替换为定义的变量，就像之前为玩家奔跑速度所做的那样。这样在后续修改图形时会更加方便，也有助于你保持代码的一致性与条理性。\n\
  \n现在修改 `SKBPlayer.h` 文件，添加一个实例变量，用于通过新的纹理类来持有纹理数组：\n\n```objc\n#import <SpriteKit/SpriteKit.h>\n\
  #import \"SKBSpriteTextures.h\"\n\n#define kPlayerRunningIncrement 100\n\n@interface\
  \ SKBPlayer : SKSpriteNode\n\n@property (nonatomic, strong) SKBSpriteTextures *spriteTextures;\n\
  \n+ (SKBPlayer *)initNewPlayer:(SKScene *)whichScene startingPoint:(CGPoint)location;\n\
  ```\n\n现在修改 `SKBPlayer.m` 文件，以使用新的纹理类：\n\n```objc\n+ (SKBPlayer *)initNewPlayer:(SKScene\
  \ *)whichScene startingPoint:(CGPoint)location;\n{\n    // 初始化并创建精灵纹理\n    SKBSpriteTextures\
  \ *playerTextures = [[SKBSpriteTextures alloc] init];\n    [playerTextures createAnimationTextures];\n\
  \n    // 初始帧\n    SKTexture *f1 = [SKTexture textureWithImageNamed:kPlayerRunRight1FileName];\n\
  \n    // 玩家角色精灵及场景中的起始位置\n    SKBPlayer *player = [SKBPlayer spriteNodeWithTexture:f1];\n\
  \    player.position = location;\n    player.spriteTextures = playerTextures;\n\n\
  \    // 将精灵添加到场景中\n    [whichScene addChild:player];\n\n    return player;\n}\n\
  ```\n\n```objc\n- (void)runRight\n{\n    NSLog(@\"向右奔跑\");\n}\n```\n\n\n```objc\n\
  SKAction *walkAnimation = [SKAction animateWithTextures:_spriteTextures.playerRunRightTextures\
  \ timePerFrame:0.05];\nSKAction *walkForever = [SKAction repeatActionForever:walkAnimation];\n\
  [self runAction:walkForever];\n\nSKAction *moveRight = [SKAction moveByX:kPlayerRunningIncrement\
  \ y:0 duration:1];\nSKAction *moveForever = [SKAction repeatActionForever:moveRight];\n\
  [self runAction:moveForever];\n}\n\n- (void)runLeft\n{\nNSLog(@\"run Left\");\n\n\
  SKAction *walkAnimation = [SKAction animateWithTextures:_spriteTextures.playerRunRightTextures\
  \ timePerFrame:0.05];\nSKAction *walkForever = [SKAction repeatActionForever:walkAnimation];\n\
  [self runAction:walkForever];\n\nSKAction *moveLeft = [SKAction moveByX:-kPlayerRunningIncrement\
  \ y:0 duration:1];\nSKAction *moveForever = [SKAction repeatActionForever:moveLeft];\n\
  [self runAction:moveForever];\n}\n```\n\n这些修改带来的一个小变化是：当精灵第一次出现在屏幕上时，它现在是静止不动的。一旦发生点击并开始移动，四个动画帧就会开始并无限循环播放。重构已经完成，现在你可以添加更多纹理，让精灵能够双向奔跑。\n\
