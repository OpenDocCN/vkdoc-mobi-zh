  \ 菜单中选择 `New ➤ Group`（见图 3-2）。这会在你的项目文件夹内创建一个新文件夹。它现在已准备好让你为其命名，因此将其命名为 `Sprites`。\n\
  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 27](img/index-36_1.jpg)\n\
  \n![Image 28](img/index-36_2.jpg)\n\n**32**\n\n**第 3 章：精灵移动：响应用户输入**\n\n***图 3-2.**\
  \ 选择新组*\n\n现在，将两个 `SewerSplash` 图像和四个 `Player_Right` 图像移动到这个新文件夹中。你可以通过单击一次 `Spaceship`\
