  );\n        self.playerStatus = SBPlayerJumpingRight;\n        playerJumpTextures\
  \ = _spriteTextures.playerJumpRightTextures;\n        nextPlayerStatus = SBPlayerRunningRight;\n\
  \    }\n}\n```\n\n\n\n```objectivec\n} else if (self.playerStatus == SBPlayerFacingLeft)\
