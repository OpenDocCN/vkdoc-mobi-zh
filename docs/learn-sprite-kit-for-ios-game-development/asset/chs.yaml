  \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**22**\n\n**第 2 章: SKActions\
  \ 和 SKTextures: 你的第一个动画精灵** 它相当简陋，不是吗？从`SplashScene`复制并粘贴一些代码，使其可以投入使用。您将把所有三个方法添加到`SKBGameScene.m`中，最终结果如下：\n\
  \n```\n#import \"SKBGameScene.h\"\n\n@implementation SKBGameScene\n\n-(id)initWithSize:(CGSize)size\
  \ {\n    if (self = [super initWithSize:size]) {\n        /* 在此处设置你的场景 */\n    \
  \    self.backgroundColor = [SKColor blackColor];\n    }\n    return self;\n}\n\n\
  -(void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event {\n    /* 当触摸开始时调用\
  \ */\n    for (UITouch *touch in touches) {\n    }\n}\n\n-(void)update:(CFTimeInterval)currentTime\
  \ {\n    /* 在每一帧渲染之前调用 */\n}\n\n@end\n```\n\n现在，您将看到如何在用户触摸屏幕时添加场景之间的精美过渡动画。您将使用`SKAction`和`SKTransition`类来创建一些动画效果。\n\
  \n### 使用 SKActions 进行动画过渡\n\n大多数情况下，您通过使用动作让精灵在场景中移动。Sprite Kit 中的大多数操作都是对节点进行更改，比如您之前创建的`SKSpriteNode`。让我们创建一个`SKAction`来描述您想要应用于该节点的更改，然后告诉节点运行该动作。当场景渲染时，动作将被执行，并且会随时间进行动画，直到动作完成。\n\
  \n在`SKBSplashScene.m`的第一个场景实现中，在编辑器顶部`#import`行的正下方添加一行代码，使其看起来像这样：\n\n```\n#import\
  \ \"SKBSplashScene.h\"\n#import \"SKBGameScene.h\"\n\n@implementation SKBSplashScene\n\
  ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 2 章: SKActions 和\
  \ SKTextures: 你的第一个动画精灵** **23**\n\n\n在`touchesBeganWithEvent`方法的`for`循环中添加以下代码，如下所示：\n\
  ```\nfor (UITouch *touch in touches) {\n    SKNode *splashNode = [self childNodeWithName:@\"\
  splashNode\"];\n    if (splashNode != nil) {\n        splashNode.name = nil;\n \
  \       SKAction *zoom = [SKAction scaleTo: 4.0 duration: 1];\n        [splashNode\
  \ runAction: zoom completion:^{\n            SKBGameScene *nextScene = [[SKBGameScene\
  \ alloc] initWithSize:self.size];\n            SKTransition *doors = [SKTransition\
  \ doorwayWithDuration:0.5];\n            [self.view presentScene:nextScene transition:doors];\n\
  \        }];\n    }\n}\n```\n\n让我们回顾一下这里发生了什么。你使用了`SKScene`对象的便捷方法（`childNodeWithName`）来创建一个名为`splashNode`的`SKNode`。现在你可以明白为什么在`initWithSize`方法中创建节点时要为它命名了；因为现在你可以创建一个指向它的引用对象。\n\
  \n你验证了假设存在的对象确实存在。如果不存在，它将是一个`nil`指针，你可以跳过触摸事件并继续执行。\n\n如果对象确实存在，你将`name`属性设置为`nil`，因为你不希望这个过渡发生超过一次——如果用户连续触摸屏幕多次，这种情况可能会发生。\n\
  \n然后你创建了一个`SKAction`对象，使用便捷方法创建了`SKAction`，并设置了两个参数：一个浮点值（你希望纹理（图像）放大到的比例）以及缩放动画的持续时间（以秒为单位）。换句话说，就是在一秒的时间范围内将纹理放大到\
  \ 400%。\n\n接着你告诉节点在其自身上运行动作。当希望节点执行动作时，你有三种方法可供选择：\n\n- `runAction`——仅执行动作。\n- `runAction:\
  \ completion`——执行动作并在完成时调用提供的代码块。\n- `runAction: withKey`——执行动作并传入一个字符串作为该动作的引用。稍后可用于检查某个引用的动作是否仍在运行。\n\
  \n在这个例子中，你将使用第二种选项`runAction: completion`，让动作执行并在完成后运行一段代码块。\n\n查看缩放动作完成时运行的代码块，你会发现你创建了一个自定义类`SKBGameScene`的对象。然后你创建了一个`SKTransition`，使用了多种可用过渡类型之一（完整列表请参阅`SKTransition`的\
  \ Xcode 文档），并将其持续时间设置为 0.5 秒。\n\n最后，你告诉当前场景使用刚刚创建的过渡来呈现刚刚创建的新场景。\n\n---\n\n现在构建并运行程序。你会看到一个启动画面，当点击屏幕时，会过渡到新场景（目前是纯黑色的）。不过你会注意到，先是播放缩放动画，然后才执行门框过渡。\n\
  \n### 组合多个动作\n\n完全可以将多个动作组合起来同时执行。让我们在现有的缩放动作中添加一个`fadeAway`动作，看看如何实现。\n\n在缩放动作创建代码下方，将代码修改为如下所示：\n\
  ```\nSKAction *zoom = [SKAction scaleTo: 4.0 duration: 1];\nSKAction *fadeAway =\
  \ [SKAction fadeOutWithDuration: 1];\nSKAction *grouped = [SKAction group:@[zoom,\
  \ fadeAway]];\n[splashNode runAction: grouped completion:^{\n```\n\n这里你创建了一个动作，该动作会使对应节点在一秒内淡出。然后你创建了一个动作，它仅仅是一个包含其他已创建动作的数组。接着你告诉节点运行这个组合动作，而不是缩放动作。\n\
  \n构建并运行程序来查看效果。你可能会注意到，由于第二个场景目前是纯黑色的，门框过渡变得不可见了。接下来看看一旦在游戏场景中添加更多精灵后，这种情况是否会改变。\n\
  \n### 使用`SKTexture`实现动画帧\n\n当你创建启动画面的`SKSpriteNode`对象时，你使用了便捷方法`spriteNodeWithImageNamed`来创建一个你不打算更改的静态精灵。这对于需要静态图像的情况来说没问题，但对于需要附带某种动画的精灵（例如一个包含多个图像帧的奔跑角色）来说就完全没用了。对于将使用多个帧（或图像）进行动画显示的精灵，你需要使用`SKTexture`对象来创建精灵。\n\
  \n主角英雄有四个帧，你将使用它们来动画化其奔跑行为。你需要为这四个图像分别创建单独的`SKTexture`，然后创建一个包含所有纹理的`NSArray`，最后创建一个`SKAction`，使用纹理数组来对精灵进行动画。\n\
  \n首先，将这四张图片添加到项目中。在 Xcode 中，从 File 菜单中选择 Add Files to “Sewer Bros”。导航到`Player_Right1.png`文件并单击选中。然后按住\
  \ Shift 键单击第三个文件`Player_Right4.png`，这样所有四个文件都被选中。确保勾选了“Destination: Copy Items Into\
  \ Destination’s Group Folder (if Needed)”和“Add to Targets: Sewer Bros”。点击 Add 按钮。\n\
  \n如果成功，你会在窗口左侧的项目导航器中看到添加的文件。如果需要，你可以依次单击它们查看外观。\n\n接下来，在`SKBGameScene.h`文件中，在`@interface`和`@end`之间为玩家的`SKSpriteNode`对象添加一个属性，如下所示：\n\
  ```\n@interface SKBGameScene : SKScene\n@property (strong, nonatomic) SKSpriteNode\
  \ *playerSprite;\n@end\n```\n\n现在，在`SKBGameScene.m`文件中，将以下代码添加到`touchesBeganWithEvent`方法的`for`循环中，如下所示：\n\
  ```\nfor (UITouch *touch in touches) {\n    CGPoint location = [touch locationInNode:self];\n\
  \    // 4 animation frames stored as textures\n    SKTexture *f1 = [SKTexture textureWithImageNamed:\
  \ @\"Player_Right1.png\"];\n    SKTexture *f2 = [SKTexture textureWithImageNamed:\
  \ @\"Player_Right2.png\"];\n    SKTexture *f3 = [SKTexture textureWithImageNamed:\
  \ @\"Player_Right3.png\"];\n    SKTexture *f4 = [SKTexture textureWithImageNamed:\
  \ @\"Player_Right4.png\"];\n    // an array of these textures\n    NSArray *textureArray\
  \ = @[f1,f2,f3,f4];\n    // our player character sprite & starting position in the\
  \ scene\n    _playerSprite = [SKSpriteNode spriteNodeWithTexture:f1];\n    _playerSprite.position\
  \ = location;\n    // an Action using our array of textures with each frame lasting\
  \ 0.1 seconds\n    SKAction *runRightAction = [SKAction animateWithTextures:textureArray\
  \ timePerFrame:0.1];\n    // don't run just once but loop indefinitely\n    SKAction\
  \ *runForever = [SKAction repeatActionForever:runRightAction];\n    // attach the\
  \ completed action to our sprite\n    [_playerSprite runAction:runForever];\n  \
  \  // add the sprite to the scene\n    [self addChild:_playerSprite];\n}\n```\n\n\
  现在构建并运行程序，点击一次以关闭启动画面，然后在黑色场景上点击以生成一个奔跑的角色（见图 2-5）。在此阶段多次点击会生成多个玩家角色，稍后你将学习如何修复此问题。\n\
  \n![Image 25](img/index-31_1.jpg)\n\n**图 2-5.** 一个已生成并正在动画的精灵\n\n现在让我们详细说明一下你所做的工作。\n\
  ```\nCGPoint location = [touch locationInNode:self];\n```\n这一行捕获了用户的触摸点，这样你稍后可以将其用作角色可能生成的位置。\n\
  \n\n`SKTexture *f1 = [SKTexture textureWithImageNamed: @\"Player_Right1.png\"];\
  \ SKTexture *f2 = [SKTexture textureWithImageNamed: @\"Player_Right2.png\"]; SKTexture\
  \ *f3 = [SKTexture textureWithImageNamed: @\"Player_Right3.png\"]; SKTexture *f4\
  \ = [SKTexture textureWithImageNamed: @\"Player_Right4.png\"];` 这段代码创建了四个 `SKTexture`\
  \ 对象，每个对应一帧动画。这些对象由项目内存储的图像创建，因此必须精确拼写以避免错误。\n\n`NSArray *textureArray = @[f1,f2,f3,f4];`\n\
  \n你创建了一个由这些纹理组成的 `NSArray` 数组。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n"
- '# 第 2 章：SKActions 和 SKTextures：你的第一个动画精灵


  **注意** 务必注意，数组内纹理对象的排列顺序决定了最终的帧序列。此外，你可以重复使用对象。例如，你可以这样写：


  `NSArray *textureArray = @[f2,f1,f2,f3,f1,f4];`


  这样一来，四个图像帧会按照该顺序显示，在动画的每次循环中，屏幕上将绘制总计六帧。


  `_playerSprite = [SKSpriteNode spriteNodeWithTexture:f1];`


  `_playerSprite.position = location;`


  接着你创建了 `SKSpriteNode`（使用你在接口文件中通过 `@property` 语句创建的实例变量），并只应用了其中一个纹理。具体使用哪一个并不重要，但使用第一个动画帧是合理的。


  `SKAction *runRightAction = [SKAction animateWithTextures:textureArray timePerFrame:0.1];
  SKAction *runForever = [SKAction repeatActionForever:runRightAction];` 这里你使用数组中的完整纹理集创建了一个
  `SKAction`，并将每一帧设置为每 0.1 秒绘制一次。接着你创建了另一个 `SKAction`，使其无限重复该单个动作。


  `[_playerSprite runAction:runForever];`


  `[self addChild:_playerSprite];`


  这部分代码将无限重复的动作添加到精灵上，最后将精灵添加到场景中。


  ## 总结


  本章旨在帮助你更深入地理解 `SKSpriteNodes`、`SKTextures` 和 `SKActions` 在游戏中创建视觉组件时所扮演的角色。如果没有任何可视且可交互的内容，那游戏也就谈不上是游戏，对吧？精灵及其相关动作是每款游戏的基础核心元素。在后续章节中，当你为游戏添加更多组件时，将继续使用这些对象。


  在本章中，你还添加了第二个 `SKScene`，并初步了解了 `SKTransitions`，它能在场景切换时添加一些不错的视觉特效。


  在下一章中，我将为奔跑动画添加精灵的移动。你不能让角色只在原地奔跑而不移动！你将实现用户触摸事件来判定角色的移动方向，并增加跳跃能力。在此过程中，我将向你介绍
  Sprite Kit 自带的物理引擎，它将为你的游戏设计增添强大的功能。物理引擎的额外好处是，你无需编写所有代码来处理游戏环境中的物理约束和反应。


  [www.it-ebooks.info](http://www.it-ebooks.info/)


  '
- "# 第 3 章：精灵移动：响应用户输入\n\n## 跑起来！\n\n到目前为止，游戏屏幕显示后（初始为纯黑色背景），用户点击屏幕时，一个动画精灵会出现在屏幕上。这还不错，但你才刚刚开始。现在，你要为其增加移动功能！\n\
  \n首先，你将学习如何添加代码来检测用户点击的位置，并将屏幕划分为两个兴趣区域：左侧区域和右侧区域。当用户点击左侧区域时，你让精灵向左移动，反之亦然。你将通过获取游戏屏幕区域并除以二的方式，在代码中确定左右区域。如果用户触摸位置小于该结果数值，则为左侧区域点击；若大于该数值，则为右侧区域点击。\n\
  \n在 `SKBGameScene.m` 文件中，修改 `touchesBeganWithEvent` 方法，在第一个 `SKTexture` 赋值之前添加一个\
  \ `if()` 语句，如下所示：\n\n```\nif (!_playerSprite) {\n// 4 个存储为纹理的动画帧\nSKTexture *f1\
  \ = [SKTexture textureWithImageNamed: @\"Player_Right1.png\"];\n```\n\n然后，将以下突出显示的代码添加到同一方法中现有代码的末尾：\n\
  \n```\n// 将精灵添加到场景中\n[self addChild:_playerSprite];\n} else if (location.x <= (\
  \ self.frame.size.width / 2 )) {\nNSLog(@\"左侧点击\");\n} else {\nNSLog(@\"右侧点击\");\n\
  }\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![图 26](img/index-34_1.jpg)\n\
  \n现在，如果你构建并运行程序，其行为将与之前相同——至少在你拥有一个动画精灵在屏幕上时是这样。此后，每次用户点击屏幕（或你在模拟器游戏屏幕上点击），你应该能在\
  \ Xcode 控制台中看到新的一行输出（参见图 3-1）。如果你没有看到控制台输出，请返回 Xcode 并选择 **View** ➤ **Debug Area**\
  \ ➤ **Activate Console**。调整你的窗口位置，以便能同时看到控制台和模拟器屏幕。\n\n**图 3-1.** 显示点击事件的控制台输出\n\
  \n那么这里发生了什么？\n\n首先，你确保只有在精灵尚未存在时，才将其添加到场景中。这样，屏幕上最终只有一个动画精灵，而不是每次点击都生成多个精灵。\n\n\
  接着，你检查了用户点击位置的 X 坐标，并将其与场景总宽度的一半进行比较。如果小于该数值，则表示用户点击了屏幕左侧；否则，视为右侧点击。\n\n这非常简单。现在，你要对这些点击做出响应。\n\
  \n修改 `touchesBeganWithEvent` 方法，在现有的 `if()` 和 `else` 语句中添加以下六行代码：\n\n```\n} else\
  \ if (location.x <= ( self.frame.size.width / 2 )) {\nNSLog(@\"左侧点击\");\nSKAction\
  \ *moveLeft = [SKAction moveByX:-100 y:0 duration:1];\nSKAction *moveForever = [SKAction\
  \ repeatActionForever:moveLeft];\n[self runAction:moveForever];\n} else {\nNSLog(@\"\
  右侧点击\");\nSKAction *moveRight = [SKAction moveByX:100 y:0 duration:1];\nSKAction\
  \ *moveForever = [SKAction repeatActionForever:moveRight];\n[self runAction:moveForever];\n\
  }\n```\n\n现在，如果你构建并运行，你会看到左侧和/或右侧的点击会使精灵沿水平（即 X 轴）方向在屏幕上移动。你也会很快发现，一旦精灵跑出屏幕边缘，它将永远消失，不会再出现。\n\
  \n这种行为是符合预期的，实际上它能帮助你清理或移除那些不再绘制在屏幕上的精灵。这些精灵会占用宝贵的内存空间，试想一下，如果屏幕上有十二个精灵，但已有数百个精灵离开了屏幕，那将造成多大的浪费！Sprite\
  \ Kit 为你完成了这项工作，它会清除不再绘制在屏幕上的精灵，从而保持你宝贵的内存整洁高效。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
  \n\n\n你可能会注意到，你的精灵在“月球漫步”方面很擅长；无论它是向左还是向右移动，它总是面朝右。要解决这个问题，你需要添加更多的纹理。不过，在此之前，你将了解如何重新组织代码，以避免它变得难以控制。\n\
  \n### 代码重组\n\n让我们通过将纹理图像移动到它们自己的文件夹中开始重组。这样做纯粹是为了组织上的目的。随着你向项目添加更多图像，如果你将它们添加到一个指定的文件夹中，使其与代码分离，会让你的工作更轻松。这有助于保持项目文件夹的整洁和精简。\n\
