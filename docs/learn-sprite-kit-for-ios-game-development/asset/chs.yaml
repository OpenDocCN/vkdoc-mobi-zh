  \ 方法。\n\n```\nself.backgroundColor = [SKColor colorWithRed:0.15 green:0.15 blue:0.3\
  \ alpha:1.0];\n```\n\n这里，你使用 RGB（颜色）和 alpha（透明度）值设置了背景色。\n\n```\nSKLabelNode *myLabel\
  \ = [SKLabelNode labelNodeWithFontNamed:@\"Chalkduster\"];\nmyLabel.text = @\"Hello,\
  \ World!\";\nmyLabel.fontSize = 30;\nmyLabel.position = CGPointMake(CGRectGetMidX(self.frame),\
  \ CGRectGetMidY(self.frame));\n```\n\n然后你创建了一个 `SKLabelNode` 对象，并设置了一些重要属性，比如字体、大小、位置以及文本内容。在计算位置时，你可能注意到使用了便捷方法（`CGPointMake`\
  \ 和 `GetMidX`），通过 `SKScene` 的 `frame` 属性来确定屏幕中心。\n\n```\n[self addChild:myLabel];\n\
  ```\n\n最后，你将创建的 `SKLabelNode` 作为子节点添加到 `SKScene` 中。这就是精灵或节点添加到屏幕上的方式：通过 `SKScene`\
  \ 对象的 `addChild` 方法。\n\n你可能已经注意到，所有这些操作都发生在场景初始化过程中。换句话说，在应用启动后立即发生，因为当故事板加载时，这个场景就会被实例化。因此，这个方法成为添加代码的最佳位置，用于处理用户启动游戏时你想要发生的任何事情。你可能想要显示某种启动画面，或者直接进入主题，向用户展示几个可选按钮：例如单人游戏或双人游戏。\n\
  \n最后，是 `touchesBeganWithEvent` 方法。正如其名，当用户将手指放在屏幕上时会调用此方法。而不是当手指离开屏幕时（那是 `touchesEndedWithEvent`\
  \ 方法），例如在使用按钮时常用的方法。这允许用户在按钮之间做出选择时改变主意。但那是另一本书要讨论的不同话题了。在这个游戏中，当用户触摸屏幕时，你不希望延迟即时操作，因此这是选择方法的更好选择。\n\
  \n`for` 循环用于识别并处理多个同时发生的触摸。这在模拟器上有点棘手。然而，在真实设备上，尝试同时按下两根手指，你会看到预期的效果：在你手指放置的位置出现两艘飞船。\n\
  \n```\nCGPoint location = [touch locationInNode:self];\n```\n\n对于每个触摸事件，你首先确定触摸的位置。\n\
  \n```\nSKSpriteNode *sprite = [SKSpriteNode spriteNodeWithImageNamed:@\"Spaceship\"\
  ];\n```\n\n然后，通过创建一个新的 `SKSpriteNode` 对象来创建一个新精灵。为此，你可以将已添加到项目中的图片文件名传递给 `SKSpriteNode`\
  \ 的便捷方法，瞧，你就得到了一个精灵。不过它现在还不会显示在屏幕上。那是后面的事。注意，项目导航器左侧已经有一个名为 `Spaceship.png` 的图片文件。点击它可以在\
  \ Xcode 中查看。\n\n```\nsprite.position = location;\n```\n\n你将精灵的位置设置为你从用户触摸点确定的位置。有趣的是，如果我们跳过或注释掉接下来的两行代码，飞船会出现在屏幕上，但不会旋转。\n\
  \n```\nSKAction *action = [SKAction rotateByAngle:M_PI duration:1];\n```\n\n这里你创建了一个名为\
  \ `SKAction` 的新对象。这种类型的对象将以多种不同的方式进行配置，你将在后续章节中了解其中一些。一旦创建并配置完成，它就会被关联或应用于一个精灵（`SKSpriteNode`），从而将该动作应用于该精灵。这是对一个相当直接过程的冗长描述。\n\
  \n在这个例子中，你创建了一个旋转动作。本质上，这些参数的意思是“在一秒内旋转 180 度”。`rotateByAngle` 参数要求以弧度而非度数提供角度，`M_PI`\
  \ 是 `math.h` 库中提供的一个 C 类型函数，返回 π 的值，弧度制下代表半圆。`duration` 参数期望传入的值以秒为单位。\n\n```\n\
  [sprite runAction:[SKAction repeatActionForever:action]];\n```\n\n现在你有了一个配置好的动作，这行代码将动作附加到精灵上。不仅如此，它还使其无限重复，而不是仅执行一次完整的半圆旋转（180\
  \ 度）。如果你只想让它旋转一次然后停止，可以改为：\n\n```\n[sprite runAction:action];\n```\n\n然后你将配置好的精灵添加到场景中，这实际上将其添加到屏幕上：\n\
  \n```\n[self addChild:sprite];\n```\n\n## 总结\n\n就是这样！哇！你看到完成所有这些操作并不需要太多代码吗？回顾几年以前，你意识到完成同样的事情需要多少代码吗？更不用说仅用那么大小的飞船，性能会有多差了？iPhone\
  \ 不仅在游戏处理能力上令人惊叹，而且随着 Sprite Kit 的发布，你创作下一款热门游戏的工作变得如此轻松！\n\n本章向你介绍了一些 Sprite Kit\
  \ 对象以及你可以用它们做的许多事情。动画从未如此简单！准备好迎接更多内容了吗？接下来的章节将继续添加更多激动人心的功能。让我们继续前进。\n\n## 第 2\
  \ 章 SKActions 和 SKTextures：你的第一个动画精灵\n\n“Hello World”应用程序是对一些 Sprite Kit 基础知识（如\
  \ `SKScene`、`SKLabelNode`、`SKSpriteNode` 和 `SKAction` 对象）的良好介绍，但它严重缺乏功能性（除非你认为一款伟大游戏就是比下一个开发者更快地生成\
  \ 100 艘旋转飞船）！\n\n在本章中，你将开始编写一款名为“下水道兄弟”的游戏。你将首先向用户呈现一个启动画面，当用户触摸屏幕开始游戏时，你将过渡到一个新屏幕并添加一个动画精灵。随后的每一章都会增加更多特性和功能，直到本书结尾，你将拥有一个功能完整的游戏。在此过程中，你将接触到许多\
  \ Sprite Kit 功能，最终，你应该拥有足够的知识和经验，使用 Sprite Kit 开始编写你自己的畅销 2D 游戏，并在 iOS App Store\
  \ 上销售。\n\n## 初露锋芒\n\n为了尽可能简化流程，你将像上一章一样从一个模板开始。\n\n\n\n这段代码为你提供了一个 `SKScene` 和初始代码，可作为构建游戏的基础骨架。\n\
