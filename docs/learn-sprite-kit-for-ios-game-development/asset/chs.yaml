  \n# 第 8 章：接触与碰撞\n\n## 本章小结\n\n你在本章中添加了大量代码，其中大部分用于处理此类游戏的所有逻辑。\n\n在本章开始时，你拥有了一个由用户控制的玩家精灵，它可以在岩架之间奔跑和跳跃，同时你还生成了多个敌方精灵和奖励物品，它们也在\"\
  下水道\"环境中游荡。本章处理了所有这些角色之间的交互。至此，你应该对接触和碰撞事件非常熟悉，并且能够理解两者之间的区别。\n\n你添加了许多音效，并在适当的时候触发它们播放。此外，你还创建了一些粒子特效。\n\
