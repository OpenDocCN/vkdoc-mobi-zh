  \ SKBPlayer\n\n#pragma mark 初始化\n\n+ (SKBPlayer *)initNewPlayer:(SKScene *)whichScene\
  \ startingPoint:(CGPoint)location;\n{\n    // 4 个动画帧存储为纹理\n    SKTexture *f1 = [SKTexture\
  \ textureWithImageNamed: @\"Player_Right1.png\"];\n    SKTexture *f2 = [SKTexture\
  \ textureWithImageNamed: @\"Player_Right2.png\"];\n    SKTexture *f3 = [SKTexture\
  \ textureWithImageNamed: @\"Player_Right3.png\"];\n    SKTexture *f4 = [SKTexture\
  \ textureWithImageNamed: @\"Player_Right4.png\"];\n\n    // 这些纹理的数组\n    NSArray\
  \ *textureArray = @[f1,f2,f3,f4];\n```\n\n\n\n```objectivec\n// 我们的玩家角色精灵及其在场景中的起始位置\n\
  `SKBPlayer *player = [SKBPlayer spriteNodeWithTexture:f1];`\n`player.position =\
  \ location;`\n\n// 一个使用纹理数组的动作，每帧持续 0.1 秒\n`SKAction *runRightAction = [SKAction\
  \ animateWithTextures:textureArray timePerFrame:0.1];`\n\n// 不要只运行一次，而是无限循环\n`SKAction\
  \ *runForever = [SKAction repeatActionForever:runRightAction];`\n\n// 将完成的动作附加到我们的精灵上\n\
  `[player runAction:runForever];`\n\n// 将精灵添加到场景中\n`[whichScene addChild:player];`\n\
