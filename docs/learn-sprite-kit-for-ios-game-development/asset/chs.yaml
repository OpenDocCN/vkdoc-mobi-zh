  \n# 第 8 章：接触与碰撞\n\n**159**\n\n***图 8-6.** 金币收集特效*\n\n## 壁架下方的金币接触\n\n你希望主角能够收集金币，不仅是通过碰到金币，还可以通过跳起并从金币下方撞击壁架来实现。这需要更复杂一些，因为你需要测试玩家与壁架砖块之间的接触，同时还要检查是否有金币与该特定壁架砖块接触。\n\
  \n要开始这一改动，你需要在 `SKBPlayer.m` 文件中，将 `kLedgeCategory` 添加到玩家的 `contactTestBitMask`\
  \ 属性中：\n\n```objc\nplayer.physicsBody.categoryBitMask = kPlayerCategory;\nplayer.physicsBody.contactTestBitMask\
