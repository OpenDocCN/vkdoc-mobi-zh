  \ green:0.15 blue:0.3 alpha:1.0];\nSKLabelNode *myLabel = [SKLabelNode labelNodeWithFontNamed:@\"\
  Chalkduster\"];\nmyLabel.text = @\"Hello, World!\";\nmyLabel.fontSize = 30;\nmyLabel.position\
  \ = CGPointMake(CGRectGetMidX(self.frame), CGRectGetMidY(self.frame));\n[self addChild:myLabel];\n\
  ```\n\n这就是背景颜色和文本块被创建、配置并添加到场景中的地方。你将用你自己的启动画面来替换它！\n\n### 可供下载的图像\n\n我已为读者提供了一套完整的图像和源代码，你可以从\
