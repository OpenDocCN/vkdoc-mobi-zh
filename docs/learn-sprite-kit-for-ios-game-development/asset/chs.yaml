  \ `File` 菜单中选择“新建项目”。\n\n在“新建项目模板”表单中（参见第 1 章的图 1-1），确保左侧列表选中“iOS - 应用程序”，然后点击 `SpriteKit\
  \ Game` 模板图标。最后，点击“下一步”按钮。\n\n使用以下数据填写该表单中的字段（请参考图 1-2 以回忆具体内容）：\n\n- **产品名称:**\
