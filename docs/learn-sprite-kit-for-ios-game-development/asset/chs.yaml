  \ = SBRatzRunningRight;\n    [self removeAllActions];\n    SKAction *moveRight =\
  \ [SKAction moveByX:5 y:0 duration:0.4];\n    [self runAction:moveRight completion:^{[self\
  \ runRight];}];\n}\n\n- (void)turnLeft\n{\n    self.ratzStatus = SBRatzRunningLeft;\n\
  \    [self removeAllActions];\n    SKAction *moveLeft = [SKAction moveByX:-5 y:0\
  \ duration:0.4];\n    [self runAction:moveLeft completion:^{[self runLeft];}];\n\
  }\n@end\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 5 章：更多动画精灵：“敌人”与“奖励”\n\
  \n然后，在 `SKBGameScene.m` 文件的 `didBeginContact` 方法中，在“Ratz/侧墙”的 `if()` 语句之后插入一个新的\
