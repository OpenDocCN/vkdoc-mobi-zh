  \ 8-2）。这将是下一步的内容。\n\n***图 8-2.** 管道已添加*\n\n现在，您需要修改敌人初始化方法，以通知物理世界您对这个新类别感兴趣。在 `SKBCoin.m`\
  \ 文件的 `initNewCoin` 方法中，向 `contactTestBitMask` 添加该类别：\n\n```\ncoin.physicsBody.categoryBitMask\
