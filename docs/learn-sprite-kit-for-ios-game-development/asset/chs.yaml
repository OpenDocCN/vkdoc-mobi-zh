  \ from '%@'\", kCastOfCharactersFileName);\n    }\n}\n```\n\n除了更改存储所有关卡数据的数组名称外，你还添加了一个`switch()`语句来处理\
  \ plist 文件中保存的所有关卡。这里需要注意的重点是`switch()`语句的默认值。你将此值改为 plist 文件中存储的最后一个关卡，这样无论玩家通关多少关卡，最后一个关卡都会无限重复。因此，如果你在\
  \ plist 文件中只保存了两个关卡的数据，玩家从第三关开始，就会反复看到第二关的敌人编队，第四关、第五关以此类推。这同时也确保了当传入的值大于 plist\
  \ 文件中实际存储的值时，此方法不会出错。\n\n至此，你可以修改`SKBGameScene.m`文件中的`levelCompleted`方法，以触发下一关的开始：\n\
