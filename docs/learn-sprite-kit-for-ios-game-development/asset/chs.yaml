  \ where;\n    self.physicsBody = storePB;\n}\n\n- (void)coinHitPipe\n{\n    [self\
  \ removeFromParent];\n}\n```\n\n正如你所见，当金币撞到管道时，它会消失。你通过将其从场景（其父级）中移除来创建这种效果。这将迫使英雄迅速收集金币，因为它们不会停留太久。\n\
