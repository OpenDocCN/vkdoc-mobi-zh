    \n现在，你将添加游戏中的其余突出部分——总共七个（见图[4-6](#index_split_001.html#p78)）。在这些代码下方插入：\n\n```\n\
    // ledge, middle left\nif (CGRectGetMaxX(self.frame) < 500)\n    howMany = 6;\n\
