    \ = [SKTransition doorwayWithDuration:0.5];\n        [self.view presentScene:nextScene\
    \ transition:doors];\n    }];\n} else {\n    // first tap - show instructions\n\
    \    SKSpriteNode *instruction = [SKSpriteNode spriteNodeWithImageNamed:@\"Instructions\"\
    ];\n    instruction.name = @\"instructionNode\";\n    instruction.position = CGPointMake(CGRectGetMidX(self.frame),\
    \ CGRectGetMidY(self.frame));\n    [self addChild:instruction];\n}\n```\n\nBuild\
    \ and run the program to see the instructions presented before the game begins\
    \ (see Figure 9-4).\n\n**Figure 9-4.** Instruction graphics\n\n## Summary\n\n\
    You added a lot of functionality in this chapter. Your hero has multiple lives\
    \ now, and players can see a meter showing the number of lives remaining in the\
    \ game. The game can now check for and handle the end of the game when players\
    \ have no lives remaining, and it takes the players back to the splash screen\
    \ where they can choose to play again. The player’s highest score is stored on\
    \ disk and read at the launch of each game. When the players successfully kick\
    \ all of the vermin off, the game determines that they have completed a level\
    \ and initiates a new one. These levels are endless, with the last defined level\
    \ repeating indefinitely.\n\nYou added a new enemy type and increased the difficulty\
    \ of kicking them into the water. Finally, you added an instruction graphic to\
    \ the beginning of the game to help new players understand the objective.\n\n\
    You now have a fully functioning game.\n\n# Chapter: Where to Go from Here\n\n\
    ## Going Forward with Sprite Kit\n\nYou made it to the end of the book, and you’ve\
    \ built an exciting game from scratch. Along the way, you gained an understanding\
    \ of the Sprite Kit API and you implemented many of its features.\n\nYou undoubtedly\
    \ know a lot more now than when you started.\n\nSince the Sprite Kit is still\
    \ a new set of APIs (at the time of this writing), we all hope to see various\
    \ additions and adjustments made to it in the future that will introduce capabilities\
    \ that we have not yet contemplated. With any luck, we will see a slew of new\
    \ games being made by professional and amateur developers alike in the next few\
    \ years—all made possible by the exciting and easy-to-use Sprite Kit APIs.\n\n\
    ## Making the Game Better\n\nIn its current state, this game is not quite ready\
    \ for prime time. However, if you put some more time and effort into it, you just\
    \ might turn your game into the next blockbuster.\n\nHere are some ideas to consider\
    \ for improving the game:\n\n- With only four levels, the game is a bit lacking.\
    \ It won’t take new players very long before they can complete all of your levels\
    \ without breaking a sweat. You certainly will want to add more levels to the\
    \ game to make it more exciting and challenging.\n- You will probably want to\
    \ introduce more types of bad guys. Ratz and Gatorz certainly can’t be the only\
    \ vermin that need to be removed from the sewer, so use your imagination to extend\
    \ the cast of characters.\n- Add a variety of bonuses so that your players can\
    \ have a broader mixture of sprites occupying their attention.\n- Use the Game\
    \ Kit APIs to add multiplayer functionality. Everyone enjoys playing games against\
    \ others, and it brings out the competitive spirit in your players."
