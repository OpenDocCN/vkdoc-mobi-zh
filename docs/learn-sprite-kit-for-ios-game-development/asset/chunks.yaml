    body ignores all of the forces and impulses applied to it.


    Build and run it. As before, have the sprite jump into or onto the ledge blocks.
    This time the end points are locked in place so that the ledge doesn’t move from
    its location, yet all of the blocks in between react to the physics forces as
    before. As a side effect of this change, the character can now run along the tops
    of the ledge blocks. But an obvious problem is that the player easily tips over,
    which tends to mess things up. You can fix this with one line of code.


    Add this line of code to the SKBPlayer.m method initNewPlayer:


    player.physicsBody.restitution = 0.2;


    **player.physicsBody.allowsRotation = NO;**


