- fmt: "```markdown\nWhen the nasty vermin (the enemies) have been knocked out from\
    \ below the ledges and are flipped over, your hero needs to be able to run along\
    \ the ledges and kick them off into the water below. Doing so successfully rids\
    \ the game level of that enemy and, of course, awards the player some points.\n\
    \nTo accomplish this task, you need to test if the player and enemy nodes intersect.\
    \ When the test returns a positive result, you’ll have two more possibilities\
    \ to process: a player running into a running enemy and a player running into\
    \ a knocked-out enemy. When a contact happens with a running enemy node, the hero\
    \ will “die,” causing it to resurrect in the starting location and various other\
    \ sundry details. (Later in this chapter, you will handle the running-enemy scenario,\
    \ but for now let’s focus solely on the knocked-out enemy scenario.)\n\nTo begin,\
    \ you need a new constant in the `SKBRatz.h` file that will determine the point\
    \ value for each collected vermin:\n\n```c\n#define kRatzRunningIncrement 40\n\
    #define kRatzPointValue 100\n\ntypedef enum : int {\n```\n\nAdd a new public method\
    \ declaration to the `SKBRatz.h` file:\n\n```objc\n- (void)ratzKnockedOut:(SKScene\
    \ *)whichScene;\n- (void)ratzCollected:(SKScene *)whichScene;\n- (void)runRight;\n\
    ```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## CHAPTER 8: Contacts\
    \ and Collisions\n\n### 168\n\nInsert the method implementation after the existing\
    \ `ratzKnockedOut` method in the `SKBRatz.m` file:\n\n```objc\n[self runRight];\n\
    }\n}];\n}\n\n- (void)ratzCollected:(SKScene *)whichScene\n{\n    NSLog(@\"%@ collected\"\
    , self.name);\n}\n\n#pragma mark Movement\n```\n\nAdd a new contact bitmask to\
    \ the `initNewPlayer` method of the `SKBPlayer.m` file:\n\n```objc\nplayer.physicsBody.categoryBitMask\
    \ = kPlayerCategory;\nplayer.physicsBody.contactTestBitMask = kWallCategory |\
    \ kLedgeCategory |\n                                        kCoinCategory | kRatzCategory;\n\
    player.physicsBody.collisionBitMask = kBaseCategory | kWallCategory |\n      \
    \                                kLedgeCategory ;\n```\n\nInsert the contact testing\
    \ `if()` statement after the existing Player / Coin testing section in the `didBeginContact`\
    \ method of the `SKBGameScene.m` file:\n\n```objc\n// Score some bonus points\n\
    _playerScore = _playerScore + kCoinPointValue;\n[_scoreDisplay updateScore:self\
    \ newScore:_playerScore];\n}\n\n// Player / Ratz\nif ((((firstBody.categoryBitMask\
    \ & kPlayerCategory) != 0) &&\n     ((secondBody.categoryBitMask & kRatzCategory)\
    \ != 0))) {\n    SKBRatz *theRatz = (SKBRatz *)secondBody.node;\n    if (theRatz.ratzStatus\
    \ == SBRatzKOfacingLeft || theRatz.ratzStatus ==\n        SBRatzKOfacingRight)\
    \ {\n        [theRatz ratzCollected:self];\n    }\n    // Score some points\n\
    \    _playerScore = _playerScore + kRatzPointValue;\n    [_scoreDisplay updateScore:self\
    \ newScore:_playerScore];\n}\n// Ratz / ledges\n```\n\nBuild and run the program\
    \ to verify that the test returns a positive result when the player runs over\
    \ a knocked-out enemy. Now you can “fancy up” what happens when the test is true.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## CHAPTER 8: Contacts and\
    \ Collisions\n\n### 169\n\n### Ratz Collection Sound Effect\n\nLet’s add a sound\
    \ effect for when the Ratz are collected, and go back and add one for when the\
    \ Ratz are hit from below, rendering them unconscious. Add the sound files named\
    \ `EnemyCollected.caf` and `EnemyKO.caf` to the project and move them into the\
    \ Sounds folder.\n\nAdd a couple of constants for the filenames in the `SKBRatz.h`\
    \ file:\n\n```c\n#define kRatzSpawnSoundFileName @\"SpawnEnemy.caf\"\n#define\
    \ kRatzKOSoundFileName @\"EnemyKO.caf\"\n#define kRatzCollectedSoundFileName @\"\
    EnemyCollected.caf\"\n#define kRatzRunningIncrement 40\n#define kRatzPointValue\
    \ 100\n```\n\nAdd a couple of local variables to hold the new sound in the `SKBRatz.h`\
    \ file:\n\n```objc\n@property (nonatomic, strong) SKBSpriteTextures *spriteTextures;\n\
    @property (nonatomic, strong) SKAction *spawnSound, *koSound, *collectedSound;\n\
    + (SKBRatz *)initNewRatz:(SKScene *)whichScene startingPoint:(CGPoint)location\
    \ ratzIndex:(int)index;\n```\n\nThen add the initialization code to the `spawnedInScene`\
    \ method in the `SKBRatz.m` file:\n\n```objc\n// Sound Effects\n_koSound = [SKAction\
    \ playSoundFileNamed:kRatzKOSoundFileName\n                      waitForCompletion:NO];\n\
    ```\n```"
