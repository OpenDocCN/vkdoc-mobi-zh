    \    where.x += kLedgeBrickSpacing;\n\n    // physicsBody\n    theNode.physicsBody\
    \ = [SKPhysicsBody bodyWithRectangleOfSize:theNode.size];\n    theNode.physicsBody.categoryBitMask\
    \ = kLedgeCategory;\n    theNode.physicsBody.affectedByGravity = NO;\n\n    [nodeArray\
    \ insertObject:theNode atIndex:index];\n    [whichScene addChild:theNode];\n}\n\
    ```\n\n`// joints between nodes`\n\n```\nfor (int index=0; index <= (blockCount-2);\
    \ index++) {\n    SKSpriteNode *nodeA = [nodeArray objectAtIndex:index];\n   \
    \ SKSpriteNode *nodeB = [nodeArray objectAtIndex:index+1];\n    SKPhysicsJointPin\
