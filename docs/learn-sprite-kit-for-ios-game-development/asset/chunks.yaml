    ## Summary


    This chapter is designed to help you to understand a little more about the role
    that `SKSpriteNodes`, `SKTextures`, and `SKActions` have in creating visual components
    in your game. It’s not much of a game if you don’t have something visual to look
    at and with which to interact, right? Sprites and their associated actions are
    major foundational elements to every game. You will continue to use these objects
    as you add more game components to the game in the following chapters.


    In this chapter, you also added a second `SKScene` and were introduced to `SKTransitions`,
    which can add some nice visual effects when switching between scenes.


    In the next chapter, I will add sprite movements to go along with the running
    animation. You can’t have your character just running in place and not going anywhere!
    You’ll implement user touch events to determine where your character will go and
    add the ability to jump as well. Along the way, I will introduce you to the physics
    engine included with Sprite Kit, which adds major functionality to your game design.
    The physics engine provides the added bonus of relieving you from having to write
    all of the code to handle physics-based constraints and reactions in your game
    environment.


