    \ foundation from which you can build the game.\n\nSo, just as before, you’ll\
    \ need to choose \"Create a new Xcode project\" from the Welcome to Xcode screen\
    \ (if you just launched Xcode). If you already have Xcode open so that the Welcome\
    \ screen is not visible, you can choose \"New Project\" from the `File` menu.\n\
    \nFrom the New Project Template sheet (see Figure 1-1 from Chapter 1), make sure\
    \ that \"iOS - Application\" is selected from the list on the left and click on\
    \ the `SpriteKit Game` template icon. Finally, click the \"Next\" button.\n\n\
    Fill in the fields on this sheet using the following data (see Figure 1-2 to refresh\
    \ your memory):  \n\n- **Product Name:** `Sewer Bros`  \n- **Organization Name:**\
    \ `Your name`  \n- **Company Identifier:** `com.yourname`  \n- **Class Prefix:**\
    \ `SKB`  \n- **Devices:** `iPhone`  \n\nThe next sheet is the standard Save sheet,\
    \ which allows you to choose where to store your new project. Make your choice\
    \ and click the \"Create\" button when you’re ready.\n\nFeel free to build and\
    \ run if you want to verify that everything is working as expected. It’s always\
    \ a good idea to do this often so that simple errors and problems can be addressed\
    \ as soon as possible. If you wait until a lot of code has changed before building\
    \ and running a program, it becomes very painful to find that elusive bug that\
    \ may have been generated much earlier.\n\n## Removing Unnecessary Tidbits\n\n\
    Let’s go back into the template-supplied code and remove some things that you\
    \ won’t need so that the finished product will be as slim as possible and easy\
    \ to read as a future point of reference.\n\nBegin in the `SKBAppDelegate.m` file.\
    \ Remove these five methods in the code (leaving just the single method called\
    \ `application:didFinishLaunchingWithOptions:`):\n\n```objc\n- (void)applicationWillResignActive:(UIApplication\
    \ *)application\n{\n    // ...\n}\n\n- (void)applicationDidEnterBackground:(UIApplication\
    \ *)application\n{\n    // ...\n}\n\n- (void)applicationWillEnterForeground:(UIApplication\
    \ *)application\n{\n    // ...\n}\n\n- (void)applicationDidBecomeActive:(UIApplication\
    \ *)application\n{\n    // ...\n}\n\n- (void)applicationWillTerminate:(UIApplication\
    \ *)application\n{\n    // ...\n}\n```\n\n## Device Orientation\n\nYou are going\
    \ to support only one device orientation for the game: Landscape. There are two\
    \ places where you can change this:\n\n1. In the `SKBViewController.m` file, modify\
    \ the `supportedInterfaceOrientations` method to match the following:\n\n```objc\n\
    - (NSUInteger)supportedInterfaceOrientations\n{\n    return UIInterfaceOrientationMaskLandscape;\n\
    }\n```\n\n2. Click once on the main \"Sewer Bros\" project file in the Project\
    \ Navigator window on the left. Make sure that the \"Sewer Bros\" target is selected,\
    \ not the project. Then select the \"General\" tab across the top so that you\
    \ can see and edit the \"Deployment Info\" (see Figure 2-1).\n\n**Figure 2-1.**\
    \ *The Sewer Bros Deployment Info editor*\n\nUncheck the \"Portrait\" checkbox\
    \ listed under \"Device Orientation\". Now if you build and run the program, you’ll\
    \ see that the simulator launches in landscape mode. When you try to turn the\
    \ device, it will only look and function correctly in landscape mode.\n\n## Slight\
    \ View Controller Changes\n\nBecause the View Controller views load in portrait\
    \ by default, the size values will not be what you’d expect when your scene is\
    \ added to the view. To fix this, you can set your scene along with its scaling\
    \ attribute in the `viewWillLayoutSubviews` method instead of in the usual `viewDidLoad`\
    \ method because by the time the view has loaded it is too late—it needs to be\
    \ done before loading.\n\nIn the `SKBViewController.m` file, replace the `viewDidLoad`\
    \ method with the following:\n\n```objc\n- (void)viewWillLayoutSubviews\n{\n```"
