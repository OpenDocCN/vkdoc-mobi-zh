  trans: "\n这段代码为你提供了一个 `SKScene` 和初始代码，可作为构建游戏的基础骨架。\n\n因此，与之前一样，你需要从“欢迎使用 Xcode”界面中选择“创建新\
    \ Xcode 项目”（如果你刚刚启动 Xcode）。如果 Xcode 已打开且未显示欢迎界面，则可以从 `File` 菜单中选择“新建项目”。\n\n在“新建项目模板”表单中（参见第\
    \ 1 章的图 1-1），确保左侧列表选中“iOS - 应用程序”，然后点击 `SpriteKit Game` 模板图标。最后，点击“下一步”按钮。\n\n\
    使用以下数据填写该表单中的字段（请参考图 1-2 以回忆具体内容）：\n\n- **产品名称:** `Sewer Bros`\n- **组织名称:** `你的名字`\n\
    - **公司标识符:** `com.yourname`\n- **类前缀:** `SKB`\n- **设备:** `iPhone`\n\n下一个表单是标准的“存储”表单，你可以在此选择新项目的存储位置。做出选择后，点击“创建”按钮即可。\n\
    \n如果你想要验证一切是否按预期工作，可以随时构建并运行。经常这样做总是一个好习惯，以便尽早解决简单的错误和问题。如果等到大量代码更改后再构建和运行程序，那么查找可能很早就产生的难以捉摸的\
    \ bug 会变得非常痛苦。\n\n## 移除不必要的琐碎内容\n\n让我们回到模板提供的代码中，删除一些不需要的内容，以便最终产品尽可能精简，并在未来作为参考时易于阅读。\n\
    \n首先在 `SKBAppDelegate.m` 文件中，删除代码中的这五个方法（只保留名为 `application:didFinishLaunchingWithOptions:`\
    \ 的方法）：\n\n```objc\n- (void)applicationWillResignActive:(UIApplication *)application\n\
    {\n    // ...\n}\n\n- (void)applicationDidEnterBackground:(UIApplication *)application\n\
    {\n    // ...\n}\n\n- (void)applicationWillEnterForeground:(UIApplication *)application\n\
    {\n    // ...\n}\n\n- (void)applicationDidBecomeActive:(UIApplication *)application\n\
    {\n    // ...\n}\n\n- (void)applicationWillTerminate:(UIApplication *)application\n\
    {\n    // ...\n}\n```\n\n## 设备方向\n\n游戏将只支持一种设备方向：横屏。你可以在两个地方进行修改：\n\n1. 在 `SKBViewController.m`\
    \ 文件中，将 `supportedInterfaceOrientations` 方法修改为如下代码：\n\n```objc\n- (NSUInteger)supportedInterfaceOrientations\n\
    {\n    return UIInterfaceOrientationMaskLandscape;\n}\n```\n\n2. 在左侧的“项目导航器”窗口中，单击主项目文件“Sewer\
    \ Bros”一次。确保选中了“Sewer Bros”目标，而不是项目本身。然后选择顶部的“通用”选项卡，以便查看和编辑“部署信息”（参见图 2-1）。\n\
    \n**图 2-1.** *Sewer Bros 部署信息编辑器*\n\n取消选中“设备方向”列表中的“竖屏”复选框。现在，如果你构建并运行程序，将会看到模拟器以横屏模式启动。当你尝试旋转设备时，它只会以横屏模式正确显示和运行。\n\
    \n## 轻微的视图控制器更改\n\n由于视图控制器视图默认以竖屏方式加载，因此当场景添加到视图时，大小值可能不符合预期。要解决此问题，可以在 `viewWillLayoutSubviews`\
    \ 方法中设置场景及其缩放属性，而不是在通常的 `viewDidLoad` 方法中，因为在视图加载完成后已经太迟了——必须在加载之前完成。\n\n在 `SKBViewController.m`\
    \ 文件中，将 `viewDidLoad` 方法替换为以下代码：\n\n```objc\n- (void)viewWillLayoutSubviews\n\
    {\n```\n"
- fmt: "[toc]\n\n### `/GKState didEnterWithPreviousState` 方法\n\n```objc\n[super viewWillLayoutSubviews];\n\
    \n// Configure the view.\n\nSKView * skView = (SKView *)self.view;\n\nif (!skView.scene)\
    \ {\n\nskView.showsFPS = YES;\n\nskView.showsNodeCount = YES;\n\n// Create and\
    \ configure the scene.\n\nSKScene * scene = [SKScene sceneWithSize:skView.bounds.size];\n\
    \nscene.scaleMode = SKSceneScaleModeAspectFill;\n\n// Present the scene.\n\n[skView\
    \ presentScene:scene];\n\n}\n\n}\n```\n\n注意，你还需要添加一个`if()`语句来检查场景是否已经附加到视图上，如果场景已经存在，则忽略场景创建代码。这是因为这个方法可能被调用多次。\n\
    \n### 移除多余模板文本\n\n现在你将移除模板代码中的“Hello World”文本。在`SKBMyScene.m`文件中，查看第一个`initWithSize`方法内部的代码，并特别关注`if`语句中的以下代码：\n\
    \n```objc\n/* Set up your scene here */\nself.backgroundColor = [SKColor colorWithRed:0.15\
    \ green:0.15 blue:0.3 alpha:1.0];\nSKLabelNode *myLabel = [SKLabelNode labelNodeWithFontNamed:@\"\
    Chalkduster\"];\nmyLabel.text = @\"Hello, World!\";\nmyLabel.fontSize = 30;\n\
    myLabel.position = CGPointMake(CGRectGetMidX(self.frame), CGRectGetMidY(self.frame));\n\
    [self addChild:myLabel];\n```\n\n这就是背景颜色和文本块被创建、配置并添加到场景中的地方。你将用你自己的启动画面来替换它！\n\
    \n### 可供下载的图像\n\n我已为读者提供了一套完整的图像和源代码，你可以从Apress网站下载。这是本书页面的链接：[http://www.apress.com/9781430264392](http://www.apress.com/9781430264392)。\n\
    \n在页面左侧的书目资源部分寻找“Source Code”链接。解压归档文件并将项目文件夹下载到方便的位置。在此文件夹内，你可以浏览到名为“Images”的文件夹，并查找以`SewerSplash`开头的图像文件。\n\
    \n这些是你将要添加到游戏项目中的文件。\n\n在Xcode中，从“File”菜单中选择“Add Files to 'Sewer Bros…'”。导航到`SewerSplash_480.png`文件并单击一次以选中它。然后按住Shift键单击第二个名为`SewerSplash_568.png`的文件，同时选中这两个文件。*确保“Destination:\
    \ Copy Items into Destination's Group Folder (if Needed)”被勾选*，然后确保“Add to Targets:\
    \ Sewer Bros”被勾选。单击“Add”按钮（见图 2-2）。\n\n**Figure 2-2.** 向项目添加文件\n\n如果成功，你将看到这些文件被添加到窗口左侧的项目导航器中。\n\
    \n如果你愿意，可以逐个点击它们来查看它们的外观。\n\n### 背景颜色\n\n在这里，你将把背景颜色设为纯黑色。`UIColor`提供了一些便捷方法，让你可以通过颜色名称快速创建常用颜色，而无需尝试确定RGB值。为方便你参考，我将它们列出如下：\n\
    \n```objc\nblackColor; // 0.0 white\ndarkGrayColor; // 0.333 white\nlightGrayColor;\
    \ // 0.667 white\nwhiteColor; // 1.0 white\ngrayColor; // 0.5 white\nredColor;\
    \ // 1.0, 0.0, 0.0 RGB\ngreenColor; // 0.0, 1.0, 0.0 RGB\nblueColor; // 0.0, 0.0,\
    \ 1.0 RGB\ncyanColor; // 0.0, 1.0, 1.0 RGB\nyellowColor; // 1.0, 1.0, 0.0 RGB\n\
    magentaColor; // 1.0, 0.0, 1.0 RGB\norangeColor; // 1.0, 0.5, 0.0 RGB\npurpleColor;\
