    {\n    // 初始化敌人与调度\n    _spawnedEnemyCount = 0;\n    _enemyIsSpawningFlag = NO;\n\
    \n    // 砖块基底\n    SKSpriteNode *brickBase = [SKSpriteNode spriteNodeWithImageNamed:@\"\
    Base_600\"];\n```\n\n然后，通过在提供的 `update:` 方法中添加生成代码，即可完成更改：\n\n```objectivec\n\
    -(void)update:(CFTimeInterval)currentTime {\n    /* 每帧渲染前调用 */\n    if (!_enemyIsSpawningFlag\
    \ && _spawnedEnemyCount < 5) {\n        _enemyIsSpawningFlag = YES;\n        int\
    \ castIndex = _spawnedEnemyCount;\n        int scheduledDelay = 5;\n        int\
    \ startX = 50;\n        int startY = 280;\n\n        // 开始延迟，完成后生成新敌人\n      \
    \  SKAction *spacing = [SKAction waitForDuration:scheduledDelay];\n        [self\
    \ runAction:spacing completion:^{\n            // 创建并生成新敌人\n            _enemyIsSpawningFlag\
    \ = NO;\n            _spawnedEnemyCount = _spawnedEnemyCount + 1;\n          \
    \  SKBRatz *newEnemy = [SKBRatz initNewRatz:self\n                           \
    \            startingPoint:CGPointMake(startX, startY)\n                     \
    \                     ratzIndex:castIndex];\n            [newEnemy spawnedInScene:self];\n\
    \        }];\n    }\n}\n```\n\n构建并运行程序，验证此时是否每五秒生成五个敌人，且不受触摸屏幕生成玩家的影响。那么这是如何实现的呢？\n\
    \n`_spawnedEnemyCount = 0;`\n`_enemyIsSpawningFlag = NO;`\n\n当场景首次创建时，这两个变量被设置。\n\
    \n`if (!_enemyIsSpawningFlag && _spawnedEnemyCount < 5) {`\n\n第一次调用 `update:`\
    \ 方法时，此 `if()` 表达式返回 true，因此会执行其中的代码。\n\n`_enemyIsSpawningFlag = YES;`\n`int castIndex\
    \ = _spawnedEnemyCount;`\n\n你立即将 `enemyIsSpawningFlag` 设置为 true，这样下一次调用 `update:`\
    \ 方法时就不会再触发 `if()` 语句。你将使用 `spawnedEnemyCount` 来跟踪已生成的敌人数量。\n\n`int scheduledDelay\
    \ = 5;`\n`int startX = 50;`\n`int startY = 280;`\n\n这些变量决定了生成敌人的间隔时间（以秒为单位），并设置了起始位置。\n\
    \n```objectivec\n// 开始延迟，完成后生成新敌人\nSKAction *spacing = [SKAction waitForDuration:scheduledDelay];\n\
    [self runAction:spacing completion:^{\n    // 创建并生成新敌人\n    _enemyIsSpawningFlag\
    \ = NO;\n    _spawnedEnemyCount = _spawnedEnemyCount + 1;\n    SKBRatz *newEnemy\
    \ = [SKBRatz initNewRatz:self startingPoint:CGPointMake(startX, startY) ratzIndex:castIndex];\n\
    \    [newEnemy spawnedInScene:self];\n}];\n```\n\n这与之前你在 `touchesBegan` 事件中使用的方法类似。你创建了一个\
    \ `SKAction`，在五秒延迟期间不执行任何操作，完成后触发敌人生成。在此过程中，你将 `enemyIsSpawningFlag` 重置为 false，以便下一次调用\
    \ `update:` 方法时开始下一次敌人生成。同时，你将敌人数加一。这一切都非常直接易懂。\n\n现在，你可以玩得更有趣一些！将 `scheduledDelay`\
    \ 改为 2，并将最大敌人限制改为 25：\n\n```objectivec\nif (!_enemyIsSpawningFlag && _spawnedEnemyCount\
    \ < 25) {\n    _enemyIsSpawningFlag = YES;\n    int castIndex = _spawnedEnemyCount;\n\
    \    int scheduledDelay = 2;\n    int startX = 50;\n```\n\n构建并运行程序。突然之间，你得到了类似旅鼠的效果。注意观察，随着时间的推移，它们会互相叠在一起，就像玩家和老鼠精灵（ratz\
    \ sprites）在 ledge 顶部奔跑时发生的情况一样（参见图 5-2）。\n\n![Image 39](img/index-92_1.jpg)\n\
    ```"
- fmt: "***Figure 5-2.** Walking all over each other*\n\n**Collisions**\n\nYou can\
    \ add one line of code to change the erratic walking. Insert this line into the\
    \ `SKBRatz.m` `initNewRatz` method:\n\n```\nratz.physicsBody.categoryBitMask =\
    \ kRatzCategory;\nratz.physicsBody.contactTestBitMask = kWallCategory | kBaseCategory\
    \ ;\nratz.physicsBody.collisionBitMask = kBaseCategory | kWallCategory | kLedgeCategory\
    \ ;\nratz.physicsBody.density = 1.0;\nratz.physicsBody.linearDamping = 0.1;\n\
    ```\n\nNow build and run your program. There is no more running on top of each\
    \ other. As a matter of fact, you can also see another result of this change—they\
    \ no longer collide against each other. They can pass right through each other.\n\
    \nYou specified the node types with which you were interested in colliding. Any\
    \ type not included suddenly has no effect on collisions of those types.\n\nAdd\
    \ this line to the `initNewPlayer` method in the `SKBPlayer.m` file:\n\n```\n\
    player.physicsBody.contactTestBitMask = kBaseCategory | kWallCategory;\nplayer.physicsBody.collisionBitMask\
    \ = kBaseCategory | kWallCategory | kLedgeCategory ;\nplayer.physicsBody.density\
    \ = 1.0;\n```\n\nBuild and run the program now, and try running the player through\
    \ the waves of enemies. No effect whatsoever.\n\nWhile on the topic of contacts\
    \ and collisions, you might as well get rid of the `kBaseCategory` contact bitmask\
    \ for both the player and enemy sprites because you do not need to handle contact\
    \ events for the `kBaseCategory` types of nodes. You need them for the `kWallCategory`\
    \ events only:\n\n```\nplayer.physicsBody.contactTestBitMask = kWallCategory;\n\
    ratz.physicsBody.contactTestBitMask = kWallCategory ;\n```\n\n> **Note** Notice\
    \ that keeping these bitmasks as clean as possible helped increase the frame rates\
    \ slightly.\n\nNow you’ll change things so that the enemies alternate sides when\
    \ spawning. First a couple of constants are needed in the `SKBGameScene.h` file:\n\
    \n```\n#import \"SKBRatz.h\"\n\n#define kEnemySpawnEdgeBufferX 60\n#define kEnemySpawnEdgeBufferY\
    \ 60\n\n@interface SKBGameScene : SKScene <SKPhysicsContactDelegate>\n```\n\n\
    Then you change the starting point in the `update` method of the `SKBGameScene.m`\
    \ file:\n\n```\nint scheduledDelay = 2;\nint leftSideX = CGRectGetMinX(self.frame)+kEnemySpawnEdgeBufferX;\n\
    int rightSideX = CGRectGetMaxX(self.frame)-kEnemySpawnEdgeBufferX;\nint topSideY\
    \ = CGRectGetMaxY(self.frame)-kEnemySpawnEdgeBufferY;\nint startX = 0;\n\n// alternate\
    \ sides for every other spawn\nif (castIndex % 2 == 0)\n    startX = leftSideX;\n\
    else\n    startX = rightSideX;\n\nint startY = topSideY;\n\n// begin delay & when\
    \ completed spawn new enemy\nSKAction *spacing = [SKAction waitForDuration:scheduledDelay];\n\
    ```\n\nBuild and run the program to see that you now alternate sides when spawning\
    \ enemy sprites. The direction with which they begin is already handled in the\
    \ `SpawnedInScene` method in the `SKBRatz` class:\n\n```\n// set initial direction\
    \ and start moving\nif (self.position.x < CGRectGetMidX(whichScene.frame))\n \
    \   [self runRight];\nelse\n    [self runLeft];\n```\n\nYou simply used a math\
    \ function (the modulo operator `%`) that causes the `if()` statement to be true\
    \ when the `castIndex` value is an even number. When it is true, the enemy sprite\
    \ spawns on the left side of the screen; when it’s not true, it spawns on the\
    \ right. Easy peasy.\n\nNow that you have enemies running in different directions,\
    \ you can deal with collisions. At this point, everyone can run through each other\
    \ as if they were all ghosts. However, you want them to change directions when\
    \ running into each other. How can you do this? Well, you will use the existing\
    \ `didBeginContact` method inside the `SKBGameScene.m` file to check for collisions\
    \ and handle them appropriately."
