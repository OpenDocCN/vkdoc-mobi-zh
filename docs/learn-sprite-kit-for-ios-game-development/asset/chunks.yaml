    with which your character can interact, like ledges to run along and boundaries
    so that you can handle screen wrapping.


    nnIn Chapter 5, you’ll add some bad guys and bonuses. We like bonuses!


    nnIn Chapter 6, we’ll present one way to create a sort of “cast of characters”
    that will handle the timing and spawning of bad guys and bonuses. You don’t want
    everyone showing up on stage all at once!


    nnIn Chapter 7, it’s all about points, as in a score! It’s all about the points,
    right?!


    nnIn Chapter 8, you’ll work with sprite interaction. You don’t want your character
    just running around the screen, “floating” right through the enemies and obstacles,
    now do you?


    nnIn Chapter 9, you’ll add more levels. You want the game to get progressively
    harder as time goes on in order to keep it challenging and interesting, after
    all.


    nnIn Chapter 10, we’ll wrap things up and point you where you can go from here
    to make your game even more interesting and complex.


    With all of these technical details out of the way, let’s get our hands dirty
    with some code! Turn the page already! :)


