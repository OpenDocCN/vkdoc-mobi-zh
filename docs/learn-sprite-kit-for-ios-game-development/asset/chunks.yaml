- fmt: "在`touchesBeganWithEvent`方法的`for`循环中添加以下代码，如下所示：\n```\nfor (UITouch *touch\
    \ in touches) {\n    SKNode *splashNode = [self childNodeWithName:@\"splashNode\"\
    ];\n    if (splashNode != nil) {\n        splashNode.name = nil;\n        SKAction\
    \ *zoom = [SKAction scaleTo: 4.0 duration: 1];\n        [splashNode runAction:\
    \ zoom completion:^{\n            SKBGameScene *nextScene = [[SKBGameScene alloc]\
    \ initWithSize:self.size];\n            SKTransition *doors = [SKTransition doorwayWithDuration:0.5];\n\
    \            [self.view presentScene:nextScene transition:doors];\n        }];\n\
    \    }\n}\n```\n\n让我们回顾一下这里发生了什么。你使用了`SKScene`对象的便捷方法（`childNodeWithName`）来创建一个名为`splashNode`的`SKNode`。现在你可以明白为什么在`initWithSize`方法中创建节点时要为它命名了；因为现在你可以创建一个指向它的引用对象。\n\
    \n你验证了假设存在的对象确实存在。如果不存在，它将是一个`nil`指针，你可以跳过触摸事件并继续执行。\n\n如果对象确实存在，你将`name`属性设置为`nil`，因为你不希望这个过渡发生超过一次——如果用户连续触摸屏幕多次，这种情况可能会发生。\n\
    \n然后你创建了一个`SKAction`对象，使用便捷方法创建了`SKAction`，并设置了两个参数：一个浮点值（你希望纹理（图像）放大到的比例）以及缩放动画的持续时间（以秒为单位）。换句话说，就是在一秒的时间范围内将纹理放大到\
    \ 400%。\n\n接着你告诉节点在其自身上运行动作。当希望节点执行动作时，你有三种方法可供选择：\n\n- `runAction`——仅执行动作。\n\
    - `runAction: completion`——执行动作并在完成时调用提供的代码块。\n- `runAction: withKey`——执行动作并传入一个字符串作为该动作的引用。稍后可用于检查某个引用的动作是否仍在运行。\n\
    \n在这个例子中，你将使用第二种选项`runAction: completion`，让动作执行并在完成后运行一段代码块。\n\n查看缩放动作完成时运行的代码块，你会发现你创建了一个自定义类`SKBGameScene`的对象。然后你创建了一个`SKTransition`，使用了多种可用过渡类型之一（完整列表请参阅`SKTransition`的\
    \ Xcode 文档），并将其持续时间设置为 0.5 秒。\n\n最后，你告诉当前场景使用刚刚创建的过渡来呈现刚刚创建的新场景。\n\n---\n\n现在构建并运行程序。你会看到一个启动画面，当点击屏幕时，会过渡到新场景（目前是纯黑色的）。不过你会注意到，先是播放缩放动画，然后才执行门框过渡。\n\
    \n## 组合多个动作\n\n完全可以将多个动作组合起来同时执行。让我们在现有的缩放动作中添加一个`fadeAway`动作，看看如何实现。\n\n在缩放动作创建代码下方，将代码修改为如下所示：\n\
    ```\nSKAction *zoom = [SKAction scaleTo: 4.0 duration: 1];\nSKAction *fadeAway\
    \ = [SKAction fadeOutWithDuration: 1];\nSKAction *grouped = [SKAction group:@[zoom,\
    \ fadeAway]];\n[splashNode runAction: grouped completion:^{\n```\n\n这里你创建了一个动作，该动作会使对应节点在一秒内淡出。然后你创建了一个动作，它仅仅是一个包含其他已创建动作的数组。接着你告诉节点运行这个组合动作，而不是缩放动作。\n\
    \n构建并运行程序来查看效果。你可能会注意到，由于第二个场景目前是纯黑色的，门框过渡变得不可见了。接下来看看一旦在游戏场景中添加更多精灵后，这种情况是否会改变。\n\
    \n## 使用`SKTexture`实现动画帧\n\n当你创建启动画面的`SKSpriteNode`对象时，你使用了便捷方法`spriteNodeWithImageNamed`来创建一个你不打算更改的静态精灵。这对于需要静态图像的情况来说没问题，但对于需要附带某种动画的精灵（例如一个包含多个图像帧的奔跑角色）来说就完全没用了。对于将使用多个帧（或图像）进行动画显示的精灵，你需要使用`SKTexture`对象来创建精灵。\n\
    \n主角英雄有四个帧，你将使用它们来动画化其奔跑行为。你需要为这四个图像分别创建单独的`SKTexture`，然后创建一个包含所有纹理的`NSArray`，最后创建一个`SKAction`，使用纹理数组来对精灵进行动画。\n\
    \n首先，将这四张图片添加到项目中。在 Xcode 中，从 File 菜单中选择 Add Files to “Sewer Bros”。导航到`Player_Right1.png`文件并单击选中。然后按住\
    \ Shift 键单击第三个文件`Player_Right4.png`，这样所有四个文件都被选中。确保勾选了“Destination: Copy Items\
    \ Into Destination’s Group Folder (if Needed)”和“Add to Targets: Sewer Bros”。点击\
    \ Add 按钮。\n\n如果成功，你会在窗口左侧的项目导航器中看到添加的文件。如果需要，你可以依次单击它们查看外观。\n\n接下来，在`SKBGameScene.h`文件中，在`@interface`和`@end`之间为玩家的`SKSpriteNode`对象添加一个属性，如下所示：\n\
    ```\n@interface SKBGameScene : SKScene\n@property (strong, nonatomic) SKSpriteNode\
    \ *playerSprite;\n@end\n```\n\n现在，在`SKBGameScene.m`文件中，将以下代码添加到`touchesBeganWithEvent`方法的`for`循环中，如下所示：\n\
    ```\nfor (UITouch *touch in touches) {\n    CGPoint location = [touch locationInNode:self];\n\
    \    // 4 animation frames stored as textures\n    SKTexture *f1 = [SKTexture\
    \ textureWithImageNamed: @\"Player_Right1.png\"];\n    SKTexture *f2 = [SKTexture\
    \ textureWithImageNamed: @\"Player_Right2.png\"];\n    SKTexture *f3 = [SKTexture\
    \ textureWithImageNamed: @\"Player_Right3.png\"];\n    SKTexture *f4 = [SKTexture\
    \ textureWithImageNamed: @\"Player_Right4.png\"];\n    // an array of these textures\n\
    \    NSArray *textureArray = @[f1,f2,f3,f4];\n    // our player character sprite\
    \ & starting position in the scene\n    _playerSprite = [SKSpriteNode spriteNodeWithTexture:f1];\n\
    \    _playerSprite.position = location;\n    // an Action using our array of textures\
    \ with each frame lasting 0.1 seconds\n    SKAction *runRightAction = [SKAction\
    \ animateWithTextures:textureArray timePerFrame:0.1];\n    // don't run just once\
    \ but loop indefinitely\n    SKAction *runForever = [SKAction repeatActionForever:runRightAction];\n\
    \    // attach the completed action to our sprite\n    [_playerSprite runAction:runForever];\n\
    \    // add the sprite to the scene\n    [self addChild:_playerSprite];\n}\n```\n\
    \n现在构建并运行程序，点击一次以关闭启动画面，然后在黑色场景上点击以生成一个奔跑的角色（见图 2-5）。在此阶段多次点击会生成多个玩家角色，稍后你将学习如何修复此问题。\n\
    \n![Image 25](index-31_1.jpg)\n\n**图 2-5.** 一个已生成并正在动画的精灵\n\n现在让我们详细说明一下你所做的工作。\n\
    ```\nCGPoint location = [touch locationInNode:self];\n```\n这一行捕获了用户的触摸点，这样你稍后可以将其用作角色可能生成的位置。"
  raw: 'Add the following lines of code inside the for loop of the touchesBeganWithEvent
    method like this: for (UITouch *touch in touches) {


    **SKNode *splashNode = [self childNodeWithName:@"splashNode"];** **if (splashNode
    != nil) {**


    **splashNode.name = nil;**


    **SKAction *zoom = [SKAction scaleTo: 4.0 duration: 1];**


    **[splashNode runAction: zoom completion:^{**


    **SKBGameScene *nextScene = [[SKBGameScene alloc] initWithSize:self.size];** **SKTransition
    *doors = [SKTransition doorwayWithDuration:0.5];**


    **[self.view presentScene:nextScene transition:doors];**


    **}];**


    **}**


    }


    Let’s go over what happened here. You used a convenience method (childNodeWithName)
    for the SKScene object to create an SKNode named splashNode. Now you can see why
    you named the node when you created it in the initWithSize method; now you can
    create a reference object to it.


    You verified that the object, which you assumed exists, in fact really does. If
    it doesn’t, it will be a nil pointer and you can skip the touch event and continue.


    If the object does exist, you set the name property to nil, because you don’t
    want this transition to occur more than once, which could happen if the user touched
    the screen several times in a row.


    Then you create an SKAction object, use a convenience method to create the SKAction,
    and set two parameters—a float value to which you want the texture (image) to
    be scaled up and the duration of the scaling animation in seconds. In other words,
    scale the texture up to 400% over a timeframe of one second.


    Next you tell the node to run the action on itself. You have three method calls
    from which you may choose when you want a node to run an action:


     runAction—Simply execute the action.


     runAction: completion—Execute the action and call a provided block when completed.


     runAction: withKey—Execute the action and pass in a string to use as a reference
    to the action. This could be used later to see if a referenced action is still
    running.


    In this case, you will use the second option, runAction: completion, and have
    the action execute and run a block of code when it has completed.


    Looking at the code block that runs when the zoom action is finished, you see
    that you create an object of your own custom class SKBGameScene. Then you create
    an SKTransition using one of many types of transitions available (see the Xcode
    documentation for SKTransition for a complete listing) and set its duration to
    0.5 seconds.


    Finally, you tell the current scene to present the new scene you just made, using
    the transition you just made.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **24**


    **CHAPTER 2: SKActions and SKTextures: Your First Animated Sprite** Now build
    and run the program. You have a splash screen, and when the screen is tapped,
    you have a transition to the new scene, which is solid black at this point. However,
    you’ll notice that the zoom animation came first and then the doorway transition.


    Grouping Multiple Actions


    It is completely possible to group several actions to be performed at the same
    time. Let’s add a fadeAway action to the existing zoom action to see how this
    is done.


