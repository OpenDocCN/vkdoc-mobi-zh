    ## CHAPTER 1: Hello World


    **5**


    What you see here is not just text on a screen. It’s not a standard `UIView` with
    a `UILabel` dropped onto it inside a storyboard, as you are probably used to already
    when developing iPhone apps.


    Instead, what we have here are four new objects that we will introduce to you.


    The first object is the backdrop. It is an instance of an `SKScene`. Content in
    your game is organized into scenes, which are represented by `SKScene` objects.
    The parent of this `SKScene` is an `SKView`, which has an `SKViewController` as
    its controller.


    The second object, `SKLabelNode`, has been dynamically created at runtime, not
    statically placed there using Interface Builder. A font is assigned, a size is
    determined, its position is declared, and the complete object is added as a child
    object into the scene.


    The third object is an `SKSpriteNode`, built using an image file that’s been added
    to the project. The point where the mouse or finger was pressed on the screen
    determines its position on the screen.


    The fourth object is an `SKAction`, in this case, a rotation. The sprite object
    is told to run this action on itself forever. The completed sprite object is then
    added to the scene as a child object.


    As you’ve probably already deduced by the naming convention, these four objects
    are all part of the Sprite Kit APIs. Needless to say, there are more than just
    these four objects to explore, but these make for a nice introduction, so let’s
    continue.


    You may be wondering about the extra information hanging out in the bottom right
    corner. These are there at our request, and they can be turned on and off whenever
    the mood strikes. They can be very useful as you begin to add more sprites to
    your scene, as they provide the details of the node count and the current frame
    rate (measured in fps, or frames per second). You can use these values to aid
    in determining the cause of possible sluggishness and game performance issues.


    But wait, there’s more!


    Click anywhere on the game screen. Well, that’s rather cool! A spinning spaceship
    should suddenly appear from out of nowhere (see Figure 1-5). Click again in a
    different location. Yup, another spaceship appears. If you’re insatiably curious,
    as most programmers are by nature, by now you are clicking away all over the screen
    and there are spaceships spinning like crazy. Are you watching the Nodes and FPS
    values as they change? How many nodes are visible before the frame rate drops
    down to ugliness? Well, don’t forget that the simulator running on your lightning-fast
    Mac desktop or laptop is a wee-bit faster than an actual iPhone, so don’t go assuming
    that you can have 3,000 sprites of gigantic proportions on the screen all at once
    and expect to have great frame rates when your top-selling game is playing on
    an actual device. We’re just sayin. . .


