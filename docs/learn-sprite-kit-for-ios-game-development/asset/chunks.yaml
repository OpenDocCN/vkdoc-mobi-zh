    # Chapter 3: Sprite Movement Responding to User Inputs


    ## Run Away!


    So far, once the game screen is presented (initially with a solid black background),
    an animated sprite appears on the screen when the user taps the screen. That’s
    all well and good, but you’ve only just begun. Now you’ll add some movement!


    First, you’ll see how to add code to detect where the user has tapped and split
    the screen into two zones of interest: a left zone and a right zone. When the
    user taps inside the left zone, you’ll make the sprite move to the left, and as
    you would expect. When the user taps inside the right zone, you’ll make the sprite
    move to the right. You’ll determine the left and right zones in the code by taking
    the game screen area and dividing it by two. If the user’s touch position is smaller
    than the resulting number, it will be a left-zone touch, and if it’s greater than
    this number, it will be a right-zone touch.


    In the `SKBGameScene.m` file, modify the method `touchesBeganWithEvent` by adding
    an `if()` statement right before the first `SKTexture` assignment, as shown here:


    ```

    if (!_playerSprite) {

    // 4 animation frames stored as textures

    SKTexture *f1 = [SKTexture textureWithImageNamed: @"Player_Right1.png"];

    ```


    Then add the following highlighted code to the end of the existing code in this
    same method:


    ```

    // add the sprite to the scene

    [self addChild:_playerSprite];

    } else if (location.x <= ( self.frame.size.width / 2 )) {

    NSLog(@"Left tap");

    } else {

    NSLog(@"Right tap");

    }

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 26](index-34_1.jpg)


    Now if you build and run the program, it will act as it did before, at least until
    you have one animated sprite on the screen. After that, each time the user taps
    the screen (or you click on the simulator game screen), you should be able to
    see a new line in the Xcode Console (see Figure 3-1). If you do not see the Console
    output, go back to Xcode and select View ➤ Debug Area ➤ Activate Console. Move
    your windows around so that you can see the Console and the Simulator screens
    at the same time.


    **Figure 3-1.** Console output showing taps


    So what happened here?


    First of all, you made sure that you add a sprite to the scene only if it does
    not already exist. This way, you end up with only one animated sprite on the screen
    instead of multiple sprites being spawned upon each tap.


    Next, you checked the X-position of the user’s tapped location and compared it
    to the scene’s total width, cut in half. If it was less than that number, it means
    the user tapped the left side of the screen. If not, you assume a right-side tap.


    That was fairly simple. Now you’ll do something with the taps.


    Modify the method `touchesBeganWithEvent` by adding the following six lines of
    code to your existing `if()` and `else` statements:


    ```

    } else if (location.x <= ( self.frame.size.width / 2 )) {

    NSLog(@"Left tap");

    SKAction *moveLeft = [SKAction moveByX:-100 y:0 duration:1];

    SKAction *moveForever = [SKAction repeatActionForever:moveLeft];

    [self runAction:moveForever];

    } else {

    NSLog(@"Right tap");

    SKAction *moveRight = [SKAction moveByX:100 y:0 duration:1];

    SKAction *moveForever = [SKAction repeatActionForever:moveRight];

    [self runAction:moveForever];

    }

    ```


    Now if you build and run it, you will see that the left and/or right taps cause
    the sprite to move across the screen on the horizontal or X-axis. You’ll also
    quickly discover that once the sprite runs off the edges of the screen, it is
    gone for good and it will not reappear.


    This behavior is expected and actually helps you by cleaning up, or getting rid
    of, sprites that are no longer being drawn on the screen. These sprites take up
    valuable space in memory, and just think of the waste if you had, say, twelve
    sprites on the screen, but hundreds that had left the screen! Sprite Kit does
    the work for you by purging sprites that are no longer being drawn on the screen,
    thereby keeping your precious memory cleaned up and efficient.


