  trans: "\n构建并运行，即可欣赏全新的屏幕包裹效果！\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![图 33](img/index-62_1.jpg)\n\n## 第 4 章：边缘、边界与平台\n\n### 跳跃\n\n你很快将添加一些平台，玩家角色可以跳上去并沿着它们奔跑。为此，精灵需要具备跳跃能力，所以先来实现这一点。\n\
    \n跳跃需要用户提供额外输入，但输入从何而来？你已经将屏幕分为左右两个输入区域，现在需要对此进行调整。你将把屏幕下半部分再分割为左右两个区域，从而形成三个输入区域（见图\
    \ 4-2）。\n\n***图 4-2.** 三个输入区域*\n\n你需要修改 `SKBGameScene.m` 文件中的 `touchesBegan:withEvent`\
    \ 方法，以处理这一变化：\n\n```\nif (!_playerSprite) {\n    _playerSprite = [SKBPlayer initNewPlayer:self\
    \ startingPoint:location];\n} else if (location.y >= (self.frame.size.height /\
    \ 2 )) {\n    // 用户触摸屏幕上半部分（底部为 0）\n    NSLog(@\"jump\");\n} else if (location.x\
    \ <= ( self.frame.size.width / 2 )) {\n```\n\n当用户在屏幕上任意位置触摸时，若 y 轴坐标大于屏幕高度的一半（即上半部分），控制台便会输出跳跃消息。\n\
    \n现在输入处理已符合预期，接下来可以让精灵从地面起跳了。\n\n为此，你将使用`SKPhysicsWorld`中的方法对物理体施加力或冲量。共有六种方法可选：`applyForce`、`applyTorque`、`applyForce:atPoint`、`applyImpulse`、`applyAngularImpulse`和`applyImpulse:atPoint`。冲量通常用于瞬间改变物体的速度，而力则用于持续作用效果。根据\
    \ Sprite Kit 文档，使用`applyImpulse`可以对物理体均匀施加冲量，而`applyForce:atPoint`则针对物理体上的特定点施加冲量。因此，实现跳跃能力的最佳选择是`applyImpulse`。\n\
    \n在`SKBPlayer.h`文件中添加一个静态值：\n\n```\n#define kPlayerSkiddingIncrement 20\n#define\
    \ kPlayerJumpingIncrement 10\n```\n\n同一文件中，你还需要对新跳跃方法进行公开声明：\n\n```\n- (void)skidRight;\n\
    - (void)skidLeft;\n- (void)jump;\n@end\n```\n\n然后，在`SKBPlayer.m`文件中，于现有的`skidLeft`方法之后插入新的跳跃方法：\n\
    \n```\n- (void)jump\n{\n    NSLog(@\"jump\");\n    [self.physicsBody applyImpulse:CGVectorMake(0,\
    \ kPlayerJumpingIncrement)];\n}\n```\n\n接着修改`SKBGameScene.m`文件中的`touchesBegan:withEvent`方法：\n\
    \n```\n} else if (location.y >= (self.frame.size.height / 2 )) {\n    // 用户触摸屏幕上半部分（底部为\
    \ 0）\n    [_playerSprite jump];\n} else if (location.x <= ( self.frame.size.width\
    \ / 2 )) {\n```\n\n构建并运行，测试新的跳跃能力。精灵的肌肉力量惊人，对吧？哇！\n\n经过多次跳跃测试，你会发现一些需要调整的小细节。首先，需要改变跳跃期间的动画，防止精灵在空中依然保持“奔跑”状态；其次，必须禁止精灵在完成前一次跳跃前再次触发强力跳跃。\n\
    \n你将使用单帧图像作为跳跃动画，因此先把`Player_LeftJump.png`和`Player_RightJump.png`图片添加到项目中，并移动至`Player`文件夹。\n\
    \n然后在`SKBSpriteTextures.h`文件中添加两个实例变量：\n\n```\n@property (nonatomic, strong) NSArray\
    \ *playerRunRightTextures, *playerJumpRightTextures;\n@property (nonatomic, strong)\
    \ NSArray *playerSkiddingRightTextures, *playerStillFacingRightTextures;\n@property\
    \ (nonatomic, strong) NSArray *playerRunLeftTextures, *playerJumpLeftTextures;\n\
    ```\n"
- fmt: "在`SKBSpriteTextures.h`文件中添加以下静态文件名：\n\n```objectivec\n#define kPlayerRunRight4FileName\
    \ @\"Player_Right4.png\"\n#define kPlayerJumpRightFileName @\"Player_RightJump.png\"\
    \n#define kPlayerSkidRightFileName @\"Player_RightSkid.png\"\n#define kPlayerRunLeft4FileName\
    \ @\"Player_Left4.png\"\n#define kPlayerJumpLeftFileName @\"Player_LeftJump.png\"\
