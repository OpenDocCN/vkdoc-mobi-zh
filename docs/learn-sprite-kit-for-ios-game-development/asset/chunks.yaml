    Chapter


    Creating a Cast of Characters


    Static vs. Dynamic Characters


    The solution to enemy spawning thus far has been to use the update method in the
    SKBGameScene class to create new sprites in a repeating loop until hitting a statically
    defined maximum. While this works fine for viewing immediate results when adding
    new enemy classes, it’s not an elegant or efficient solution in the long term.
    You need a way of introducing characters into play in such a way that you can
    easily change your mind without having to change the code, thereby forcing you
    to rebuild the project every time you add, remove, or modify your spawning ideas.
    In other words, you need a dynamic “cast of characters.”


    You do this by having the spawning data reside in a file that is not compiled
    during the build process.


    If this were a desktop game, you might think of this solution as a separate data
    file that could be loaded at runtime that contains the spawning data. This might
    also open up the possibility of allowing the end user to create and modify the
    data in a way similar to a level editor.


    You won’t do anything quite that complex at this time, but hopefully this gives
    you a clearer understanding of what you will learn to do in this chapter.


    File Format


    Since this is an iOS application, you will store this file in the local sandbox.
    This will allow you to know where the file is and what it’s called. The next thing
    is to determine the format of this external file. One of the easiest ways to save
    and retrieve data from a file is to use the property list (plist) format, which
    is just an XML file under the hood. When you use this format, you don’t need to
    write a lot of code to parse the data once you’ve read it from disk. You just
    treat it as a NSDictionary, which keeps things nice and simple.


