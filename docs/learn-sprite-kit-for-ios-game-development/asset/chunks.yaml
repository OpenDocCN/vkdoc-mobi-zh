    *f2 = [SKTexture textureWithImageNamed: @"Player_Right2.png"];** **SKTexture *f3
    = [SKTexture textureWithImageNamed: @"Player_Right3.png"];** **SKTexture *f4 =
    [SKTexture textureWithImageNamed: @"Player_Right4.png"];**


    **// an array of these textures**


    **NSArray *textureArray = @[f1,f2,f3,f4];**'
