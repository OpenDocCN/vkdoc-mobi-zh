    \                                                    bodyB:nodeB.physicsBody\n\
    \                                                            anchor:CGPointMake(nodeB.position.x,\
    \ nodeB.position.y)];\n    [whichScene.physicsWorld addJoint:theJoint];\n}\n```\n\
    \nYou add an array that holds onto all of the nodes as you create them, inserting\
    \ them during each run through the loop, so that you can use them later for joint\
    \ creation. Once the nodes are created and added to the scene, you can start to\
    \ create the joints. Start with the first joint between blocks 1 and 2. The first\
    \ node block becomes `nodeA` and the second node becomes `nodeB`. You create the\
    \ `SKPhysicsJointPin` object and add it to the scene.\n\nBuild and run it as before.\
    \ Have the player jump onto or into the ledge blocks to see the changes.\n\nNow\
    \ the ledge is treated as a set of blocks connected by rubber bands. This should\
    \ start to give you an idea of at least one of the many applications of joints.\n\
    \nAs cool as this behavior is, it is not quite what you want as the finished result.\
    \ You want the ledge to react to physics, yet pretty much stay in place and not\
    \ go floating around the screen. To fix this, you’ll need to lock the two end\
    \ pieces in place.\n\nModify the `createNewSetOfLedgeNodes` method to match this\
    \ code:\n\n```\ntheNode.physicsBody.categoryBitMask = kLedgeCategory;\ntheNode.physicsBody.affectedByGravity\
    \ = NO;\n\n// designate left & right edge pieces\nif (index == 0) {\n    // first\
    \ node stays solidly in place; anchor point\n    theNode.physicsBody.dynamic =\
    \ NO;\n} else if (index == (blockCount-1)) {\n    // last node stays solidly in\
    \ place; anchor point\n    theNode.physicsBody.dynamic = NO;\n} else {\n    //\
    \ all the other nodes inbetween the edge pieces\n    theNode.physicsBody.dynamic\
    \ = YES;\n}\n\n[nodeArray insertObject:theNode atIndex:index];\n[whichScene addChild:theNode];\n\
    ```\n\nBy setting the `physicsBody` property to NO (it is set to YES by default),\
    \ the physics body ignores all of the forces and impulses applied to it.\n\nBuild\
    \ and run it. As before, have the sprite jump into or onto the ledge blocks. This\
    \ time the end points are locked in place so that the ledge doesn’t move from\
    \ its location, yet all of the blocks in between react to the physics forces as\
    \ before. As a side effect of this change, the character can now run along the\
    \ tops of the ledge blocks. But an obvious problem is that the player easily tips\
    \ over, which tends to mess things up. You can fix this with one line of code.\n\
    \nAdd this line of code to the `SKBPlayer.m` method `initNewPlayer`:\n\n```\n\
    player.physicsBody.restitution = 0.2;\nplayer.physicsBody.allowsRotation = NO;\n\
    ```\n\n`// add the sprite to the scene`\n\n`[whichScene addChild:player];`\n\n\
    Build and run it. You’ll see that you are indeed making good progress."
