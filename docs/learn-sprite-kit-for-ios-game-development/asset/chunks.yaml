    NSLog(@"player contacted edge");


    }


    }


    When this method is called, it is passed an SKPhysicsContact object, which describes
    the particulars. There are four properties available for use: bodyA, bodyB, contactPoint,
    and collisionImpulse. For now, you are not much interested in the exact position
    (or point) of contact or how hard they struck each other, but you are interested
    in determining which two sprites were involved so that you can act accordingly.


