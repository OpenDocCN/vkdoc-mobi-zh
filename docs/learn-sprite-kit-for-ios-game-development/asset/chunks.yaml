    return self;


    Build and run to see this new game world.


    Contacts and Collisions


    One of the features you’ll add to this game is the ability to wrap around both
    the left and right sides of the screen. This gives it an old-style video game
    feel and makes the game world feel bigger than it really is. In other words, when
    the sprite runs to the left and eventually runs into the left-side wall, you’ll
    wrap it around immediately, so that it instantly reappears on the right side of
    the screen as if it were continuously running without restrictions.


