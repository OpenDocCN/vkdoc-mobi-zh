  trans: "\n```markdown\n当那些讨厌的害虫（敌人）从壁架下方被击倒并掀翻时，你的英雄需要能够沿着壁架奔跑并将它们踢入下方的水中。成功完成此操作即可消除关卡中的该敌人，当然，还会奖励玩家一些分数。\n\
    \n要完成此任务，你需要检测玩家节点与敌人节点是否相交。当检测返回肯定结果时，你将面临两种需要处理的可能性：玩家撞上一个奔跑中的敌人，以及玩家撞上一个已被击倒的敌人。当与奔跑中的敌人节点发生接触时，英雄将会“死亡”，这会导致其复生在起始位置并触发各种其他细节。（本章稍后会处理奔跑中的敌人场景，但目前我们先专注于已击倒敌人的场景。）\n\
    \n首先，你需要在 `SKBRatz.h` 文件中新建一个常量，用于确定每只收集到的害虫的分数值：\n\n```c\n#define kRatzRunningIncrement\
    \ 40\n#define kRatzPointValue 100\n\ntypedef enum : int {\n```\n\n向 `SKBRatz.h`\
    \ 文件中添加一个新的公开方法声明：\n\n```objc\n- (void)ratzKnockedOut:(SKScene *)whichScene;\n\
    - (void)ratzCollected:(SKScene *)whichScene;\n- (void)runRight;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## 第 8 章：接触与碰撞\n\n### 168\n\n在 `SKBRatz.m` 文件中现有的 `ratzKnockedOut` 方法之后插入该方法的实现：\n\
    \n```objc\n[self runRight];\n}\n}];\n}\n\n- (void)ratzCollected:(SKScene *)whichScene\n\
    {\n    NSLog(@\"%@ collected\", self.name);\n}\n\n#pragma mark 移动\n```\n\n在 `SKBPlayer.m`\
    \ 文件的 `initNewPlayer` 方法中添加一个新的接触位掩码：\n\n```objc\nplayer.physicsBody.categoryBitMask\
    \ = kPlayerCategory;\nplayer.physicsBody.contactTestBitMask = kWallCategory |\
    \ kLedgeCategory |\n                                        kCoinCategory | kRatzCategory;\n\
    player.physicsBody.collisionBitMask = kBaseCategory | kWallCategory |\n      \
    \                                kLedgeCategory ;\n```\n\n在 `SKBGameScene.m` 文件的\
    \ `didBeginContact` 方法中，于现有的玩家/金币检测部分之后插入接触检测的 `if()` 语句：\n\n```objc\n// 奖励一些分数\n\
    _playerScore = _playerScore + kCoinPointValue;\n[_scoreDisplay updateScore:self\
    \ newScore:_playerScore];\n}\n\n// 玩家 / 老鼠\nif ((((firstBody.categoryBitMask &\
    \ kPlayerCategory) != 0) &&\n     ((secondBody.categoryBitMask & kRatzCategory)\
    \ != 0))) {\n    SKBRatz *theRatz = (SKBRatz *)secondBody.node;\n    if (theRatz.ratzStatus\
    \ == SBRatzKOfacingLeft || theRatz.ratzStatus ==\n        SBRatzKOfacingRight)\
    \ {\n        [theRatz ratzCollected:self];\n    }\n    // 奖励一些分数\n    _playerScore\
    \ = _playerScore + kRatzPointValue;\n    [_scoreDisplay updateScore:self newScore:_playerScore];\n\
    }\n// 老鼠 / 壁架\n```\n\n构建并运行程序，验证当玩家跑过一个被击倒的敌人时，检测是否返回肯定结果。现在，你可以为检测为真的情况“增添花样”了。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 8 章：接触与碰撞\n\n### 169\n\
    \n### 老鼠收集音效\n\n让我们为收集老鼠时添加一个音效，并回头为老鼠从下方被击中导致昏迷时也添加一个音效。将名为 `EnemyCollected.caf`\
    \ 和 `EnemyKO.caf` 的音效文件添加到项目中，并将它们移动到 Sounds 文件夹中。\n\n在 `SKBRatz.h` 文件中为这些文件名添加几个常量：\n\
    \n```c\n#define kRatzSpawnSoundFileName @\"SpawnEnemy.caf\"\n#define kRatzKOSoundFileName\
    \ @\"EnemyKO.caf\"\n#define kRatzCollectedSoundFileName @\"EnemyCollected.caf\"\
    \n#define kRatzRunningIncrement 40\n#define kRatzPointValue 100\n```\n\n在 `SKBRatz.h`\
    \ 文件中添加几个局部变量来保存新的音效：\n\n```objc\n@property (nonatomic, strong) SKBSpriteTextures\
    \ *spriteTextures;\n@property (nonatomic, strong) SKAction *spawnSound, *koSound,\
    \ *collectedSound;\n+ (SKBRatz *)initNewRatz:(SKScene *)whichScene startingPoint:(CGPoint)location\
    \ ratzIndex:(int)index;\n```\n\n然后在 `SKBRatz.m` 文件的 `spawnedInScene` 方法中添加初始化代码：\n\
    \n```objc\n// 音效\n_koSound = [SKAction playSoundFileNamed:kRatzKOSoundFileName\n\
    \                      waitForCompletion:NO];\n```\n```\n"
