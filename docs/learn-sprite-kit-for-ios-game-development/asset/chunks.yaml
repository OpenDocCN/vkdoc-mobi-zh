- fmt: "```objectivec\n// user touched upper half of the screen (zero = bottom of\
    \ screen)\nif (status != SBPlayerJumpingLeft && status != SBPlayerJumpingRight\
    \ && status != SBPlayerJumpingUpFacingLeft && status != SBPlayerJumpingUpFacingRight)\
    \ {\n    [_playerSprite jump];\n}\n} else ...\n```\n\nAdd some variable initializers\
    \ at the top of the `createSceneContents` method:\n\n```objectivec\n- (void)createSceneContents\n\
    {\n    // Initialize Enemies & Schedule\n    _spawnedEnemyCount = 0;\n    _enemyIsSpawningFlag\
    \ = NO;\n\n    // brick base\n    SKSpriteNode *brickBase = [SKSpriteNode spriteNodeWithImageNamed:@\"\
    Base_600\"];\n```\n\nThen you can complete the change by adding spawning code\
    \ to the provided `update:` method:\n\n```objectivec\n-(void)update:(CFTimeInterval)currentTime\
    \ {\n    /* Called before each frame is rendered */\n    if (!_enemyIsSpawningFlag\
    \ && _spawnedEnemyCount < 5) {\n        _enemyIsSpawningFlag = YES;\n        int\
    \ castIndex = _spawnedEnemyCount;\n        int scheduledDelay = 5;\n        int\
    \ startX = 50;\n        int startY = 280;\n\n        // begin delay & when completed\
    \ spawn new enemy\n        SKAction *spacing = [SKAction waitForDuration:scheduledDelay];\n\
    \        [self runAction:spacing completion:^{\n            // Create & spawn\
    \ the new Enemy\n            _enemyIsSpawningFlag = NO;\n            _spawnedEnemyCount\
    \ = _spawnedEnemyCount + 1;\n            SKBRatz *newEnemy = [SKBRatz initNewRatz:self\n\
    \                                       startingPoint:CGPointMake(startX, startY)\n\
    \                                          ratzIndex:castIndex];\n           \
    \ [newEnemy spawnedInScene:self];\n        }];\n    }\n}\n```\n\nBuild and run\
    \ the program to verify that you now get a total of five enemies spawning every\
    \ five seconds, without regard to the player spawning when the screen is touched.\
    \ So how did you do that?\n\n`_spawnedEnemyCount = 0;`\n`_enemyIsSpawningFlag\
    \ = NO;`\n\nWhen the scene is first created, these two variables are set.\n\n\
    `if (!_enemyIsSpawningFlag && _spawnedEnemyCount < 5) {`\n\nThe first time the\
    \ `update:` method is called, this `if()` expression returns true so it runs.\n\
    \n`_enemyIsSpawningFlag = YES;`\n`int castIndex = _spawnedEnemyCount;`\n\nYou\
    \ immediately set the `enemyIsSpawningFlag` to true so that the next `update:`\
    \ method call won’t trigger the `if()` statement again. You will be using the\
    \ `spawnedEnemyCount` to keep track of how many enemies have already been spawned.\n\
    \n`int scheduledDelay = 5;`\n`int startX = 50;`\n`int startY = 280;`\n\nThese\
    \ determine the length of time (in seconds) between spawns and set the starting\
    \ positions.\n\n```objectivec\n// begin delay & when completed spawn new enemy\n\
    SKAction *spacing = [SKAction waitForDuration:scheduledDelay];\n[self runAction:spacing\
    \ completion:^{\n    // Create & spawn the new Enemy\n    _enemyIsSpawningFlag\
    \ = NO;\n    _spawnedEnemyCount = _spawnedEnemyCount + 1;\n    SKBRatz *newEnemy\
    \ = [SKBRatz initNewRatz:self startingPoint:CGPointMake(startX, startY) ratzIndex:castIndex];\n\
    \    [newEnemy spawnedInScene:self];\n}];\n```\n\nThis is similar to what you\
    \ used in the `touchesBegan` event before. You create an `SKAction` that does\
    \ nothing for the delay period of five seconds, and when completed it triggers\
    \ an enemy spawn. As this is taking place, you reset the `enemyIsSpawningFlag`\
    \ to false so that the next `update:` method call will start the next enemy spawn.\
    \ You also increment the enemy count by one. That’s all fairly straightforward.\n\
    \nNow you can have a little fun! Change the `scheduledDelay` to 2 and the max\
    \ enemy limiter to 25:\n\n```objectivec\nif (!_enemyIsSpawningFlag && _spawnedEnemyCount\
    \ < 25) {\n    _enemyIsSpawningFlag = YES;\n    int castIndex = _spawnedEnemyCount;\n\
    \    int scheduledDelay = 2;\n    int startX = 50;\n```\n\nBuild and run the program.\
    \ Suddenly you have a lemmings-like result. Notice over time that they run on\
    \ top of each other, in the same way that the player and ratz sprites all run\
    \ along the tops of the ledges (see Figure [5-2).](#index_split_001.html#p92)\n\
    \n![Image 39](index-92_1.jpg)"
