- fmt: "```objectivec\nhowMany = 28;\n\n[sceneLedge createNewSetOfLedgeNodes:self\
    \ startingPoint:CGPointMake(CGRectGetMinX(self.frame)+kLedgeSideBufferSpacing,\
    \ brickBase.position.y+224) withHowManyBlocks:howMany startingIndex:ledgeIndex];\n\
    ledgeIndex = ledgeIndex + howMany;\n\n// ledge, top right\nif (CGRectGetMaxX(self.frame)\
    \ < 500)\n    howMany = 23;\nelse\n    howMany = 28;\n\n[sceneLedge createNewSetOfLedgeNodes:self\
    \ startingPoint:CGPointMake(CGRectGetMaxX(self.frame)-kLedgeSideBufferSpacing-((howMany-1)*kLedgeBrickSpacing),\
    \ brickBase.position.y+224) withHowManyBlocks:howMany startingIndex:ledgeIndex];\n\
    ledgeIndex = ledgeIndex + howMany;\n```\n\nBuild and run it (see Figure [4-6).](#index_split_001.html#p78)\
    \ Very nice. Lots of space in which the game’s characters can run around. You\
    \ do have one little problem, and that is the top edge. Hitting it causes an unexpected\
    \ teleport to one side or the other.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 37](index-78_1.jpg)\n\n**CHAPTER 4: Edges, Boundaries, and Ledges**\n\
    \n***Figure 4-6.** Seven ledges*\n\nYou can make some minor tweaks to make things\
    \ a little bit more like the finished product and see if you can fix the top edge\
    \ issue as well.\n\nFirst off, change the sprite’s jumping height in the `SKBPlayer.h`\
    \ file:\n\n```objectivec\n#define kPlayerRunningIncrement 100\n#define kPlayerSkiddingIncrement\
    \ 20\n#define kPlayerJumpingIncrement 8\n```\n\nNext, make its time spent jumping\
    \ a bit shorter in the `jump` method inside the `SKBPlayer.m` file:\n\n```objectivec\n\
    / applicable animation\nSKAction *jumpAnimation = [SKAction animateWithTextures:playerJumpTextures\
    \ timePerFrame:0.2];\nSKAction *jumpAwhile = [SKAction repeatAction:jumpAnimation\
    \ count:4.0];\n```\n\nYou can tweak these two values until you end up as close\
    \ as possible to a finished result.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**CHAPTER 4: Edges, Boundaries, and Ledges**\n\nFinally, adjust the edge of\
    \ the scene that is created in the `initWithSize` of the `SKBGameScene.m` file:\n\
    \n```objectivec\nself.backgroundColor = [SKColor blackColor];\nCGRect edgeRect\
    \ = CGRectMake(0.0, 0.0, 568.0, 420.0);\nself.physicsBody = [SKPhysicsBody bodyWithEdgeLoopFromRect:edgeRect];\n\
    self.physicsBody.categoryBitMask = kWallCategory;\n```\n\nThis makes a rectangle\
    \ that is 100 points taller than the game screen and still has an origin at the\
    \ bottom-left of the screen. This in effect raises the ceiling by 100 points.\
    \ This will make it fairly impossible for the player to bang his head on this\
    \ raised ceiling.\n\n## Summary\nYou started this chapter with a quick dive right\
    \ into the `PhysicsWorld` scene and `PhysicsBody` node. You got to see the power\
    \ and versatility of these two elements first hand, without much work. You made\
    \ some adjustments to some of the properties of these objects, including density,\
    \ linear damping, and restitution, and then saw their effects. You began exploring\
    \ how to set up and handle contact events so that you could implement screen wrapping.\
    \ Then you triggered an impulse on the player’s sprite that caused it to jump\
    \ on command and updated its animations to match its actions. Finally, you added\
    \ some ledges to run along by making a set of brick blocks interconnected by joints\
    \ that acted like rubber bands when they were added to the Physics engine in the\
    \ scene.\n\nYou got a lot accomplished as a result. Your sprite has a large world\
    \ and several obstacles to run around and with which it can interact. But it is\
    \ a bit lonely and longs for more to do. The next chapter should fulfill the sprite’s\
    \ desires nicely by teaching you how to add more sprites to the game screen!\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## Chapter: More Animated\
    \ Sprites: “Enemies” and “Bonuses”\n\n### The Opposition\n\nSo far, this game\
    \ is a solo endeavor of running and jumping endlessly without any apparent objective.\
    \ In the words of my little cousin, “It’s lame!” That’s just a wee bit pessimistic,\
    \ but it is a fairly accurate assessment. Well, it’s time to change all that.\
    \ In this chapter, you’ll generate some bad guys to liven things up a bit."
