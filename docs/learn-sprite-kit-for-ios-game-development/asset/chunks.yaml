    \ `NSLog` 调用，因为它们可能会迅速产生过多需要关注的数据。\n\n这些调用仅用于帮助你理解添加的任何新代码片段，并用于调试目的。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n"
- fmt: "# CHAPTER 5: More Animated Sprites: “Enemies” and “Bonuses”\n\n## Bonus Coins\n\
    \nBesides being chased around the screen by enemies, our hero needs some goodies\
    \ to collect; that is, some bonus coins. Humans wandering around up on ground\
    \ level (above this sewer playing area) are always dropping loose change, and\
    \ when the money rolls down into the sewer, the player can try to collect it.\
    \ This will be similar to adding the enemy sprite, and these coins will have a\
    \ few animation frames. You’ll add those animation frames now to the project and\
    \ move them into the `Sprites` folder.\n\nYou also might want to add a new Group\
    \ (folder) inside the `Sprites` folder specifically for the new sprite. Add the\
    \ three images from the `Images` folder all prefixed with `Coin_`.\n\nNow you\
    \ can use them in the texture-generation method in the `SKBSpriteTexture` class.\
    \ First you need some header additions (`SKBSpriteTexures.h`):\n\n```\n#define\
    \ kRatzRunLeft4FileName @\"Ratz_Left4.png\"\n#define kRatzRunLeft5FileName @\"\
    Ratz_Left5.png\"\n#define kCoin1FileName @\"Coin1.png\"\n#define kCoin2FileName\
    \ @\"Coin2.png\"\n#define kCoin3FileName @\"Coin3.png\"\n\n@interface SKBSpriteTextures\
    \ : NSObject\n\n@property (nonatomic, strong) NSArray *playerRunRightTextures,\
    \ *playerJumpRightTextures;\n@property (nonatomic, strong) NSArray *playerSkiddingRightTextures,\
    \ *playerStillFacingRightTextures;\n@property (nonatomic, strong) NSArray *playerRunLeftTextures,\
    \ *playerJumpLeftTextures;\n@property (nonatomic, strong) NSArray *playerSkiddingLeftTextures,\
    \ *playerStillFacingLeftTextures;\n@property (nonatomic, strong) NSArray *ratzRunLeftTextures,\
    \ *ratzRunRightTextures;\n@property (nonatomic, strong) NSArray *coinTextures;\n\
    ```\n\nThen you add to the `createAnimationTextures` method to the `SKBSpriteTextures.m`\
    \ file:\n\n```\n_ratzRunLeftTextures = @[f1,f2,f3,f4,f5];\n\n// Coins\nf1 = [SKTexture\
    \ textureWithImageNamed:kCoin1FileName];\nf2 = [SKTexture textureWithImageNamed:kCoin2FileName];\n\
    f3 = [SKTexture textureWithImageNamed:kCoin3FileName];\n_coinTextures = @[f1,f2,f3,f2];\n\
    }\n\n@end\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## CHAPTER\
    \ 5: More Animated Sprites: “Enemies” and “Bonuses”\n\nWith the animation textures\
    \ completed, you can create a new custom subclass of `SKSpriteNode` for the bonus\
    \ coin type, just as you did for the main player and enemy sprites. Create a new\
    \ class named `SKBCoin` as a subclass of `SKSpriteNode`. Modify the `SKBCoin.h`\
    \ file to match the following:\n\n```\n#import <SpriteKit/SpriteKit.h>\n#import\
    \ \"SKBAppDelegate.h\"\n#import \"SKBSpriteTextures.h\"\n\n#define kCoinRunningIncrement\
    \ 40\n\ntypedef enum : int {\n    SBCoinRunningLeft = 0,\n    SBCoinRunningRight\n\
    } SBCoinStatus;\n\n@interface SKBCoin : SKSpriteNode\n\n@property int coinStatus;\n\
    @property (nonatomic, strong) SKBSpriteTextures *spriteTextures;\n+ (SKBCoin *)initNewCoin:(SKScene\
    \ *)whichScene startingPoint:(CGPoint)location coinIndex:(int)index;\n- (void)spawnedInScene:(SKScene\
    \ *)whichScene;\n- (void)wrapCoin:(CGPoint)where;\n- (void)runRight;\n- (void)runLeft;\n\
    - (void)turnRight;\n- (void)turnLeft;\n\n@end\n```\n\nYou also need another bitmask\
    \ category in the `SKBAppDelegate.h` file. You’ll notice that you inserted this\
    \ one between the ledge and ratz entries, but the order does *not* matter here\
    \ as long as they are unique values! (It’s just a personal preference, or in layman’s\
    \ terms, an “OCD” issue.)\n\n```\nstatic const uint32_t kLedgeCategory = 0x1 <<\
    \ 3;\nstatic const uint32_t kCoinCategory = 0x1 << 4;\nstatic const uint32_t kRatzCategory\
    \ = 0x1 << 5;\n```\n\nAs you did for the `Ratz` class, add the initial code for\
    \ the `Coin` sprite all at once, including methods for initializing, wrapping,\
    \ and running in both directions:\n\n```\n#import \"SKBCoin.h\"\n#import \"SKBGameScene.h\"\
    \n\n@implementation SKBCoin\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 5: More Animated Sprites: “Enemies” and “Bonuses”\n\n```\n#pragma\
    \ mark Initialization\n\n+ (SKBCoin *)initNewCoin:(SKScene *)whichScene startingPoint:(CGPoint)location\
    \ coinIndex:(int)index\n{\n```"
