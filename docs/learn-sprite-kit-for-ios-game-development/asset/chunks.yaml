    Summary


    You added a lot of functionality in this chapter. Your hero has multiple lives
    now, and players can see a meter showing the number of lives remaining in the
    game. The game can now check for and handle the end of the game when players have
    no lives remaining, and it takes the players back to the splash screen where they
