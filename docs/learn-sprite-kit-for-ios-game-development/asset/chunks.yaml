- fmt: "\nYou test the sprite’s position along the horizontal or X-axis (`position.x`)\
    \ to see if it is currently on the left or right side of the screen. This code\
    \ compared its x-position to a value of less than 100, but you could have used\
    \ 50, 200, or even 300\\. It won’t trigger an edge contact along the bottom of\
    \ the screen any more because it’s running along the brick base, keeping it from\
    \ touching the base. Thus you know by the fact that it contacted the edge that\
    \ its `position.x` value is going to be fairly large or fairly small.\n\nBuild\
    \ and run it to see the change. The console should accurately respond to the applicable\
    \ left- and right-edge contact.\n\n## Handling Sprite Wrapping\n\nNow you can\
    \ add the wrapping handlers so that your sprites can wrap from both edges of the\
    \ screen over to the other edge. To help now and in the future, you are going\
    \ to use the `name` property of an `SKNode` to hold a unique string that can be\
    \ used in identifying the affected nodes inside the various methods. So add one\
    \ to your `initNewPlayer` method in your `SKBPlayer.m` file:\n\n```\n// our player\
    \ character sprite & starting position in the scene\nSKBPlayer *player = [SKBPlayer\
    \ spriteNodeWithTexture:f1];\nplayer.name = @\"player1\";\nplayer.position = location;\n\
    player.spriteTextures = playerTextures;\n```\n\nNow you need to insert a new `wrapPlayer:where`\
    \ method between the `initNewPlayer` and `runRight` methods:\n\n```\n#pragma mark\
    \ Screen wrap\n- (void)wrapPlayer:(CGPoint)where\n{\n    SKPhysicsBody *storePB\
    \ = self.physicsBody;\n    self.physicsBody = nil;\n    self.position = where;\n\
    \    self.physicsBody = storePB;\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**CHAPTER 4: Edges, Boundaries, and Ledges** **57**\n\nI’ll stop here and explain\
    \ this interesting method. What I discovered as I developed this game is that\
    \ attempting to simply change a sprite’s position doesn’t work as expected. However,\
    \ I also discovered that a quick and easy way to get past this restriction is\
    \ to remove the physics body from the sprite (storing it in a temporary variable),\
    \ change the position, and then restore the physics body. Looking at the code\
    \ that you just added, you can see that this is what I have just done. Sneaky,\
    \ but it gets you what you need; that is, instant teleportation to another point\
