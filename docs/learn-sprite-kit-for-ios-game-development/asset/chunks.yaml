    This makes a rectangle that is 100 points taller than the game screen and still
    has an origin at the bottom-left of the screen. This in effect raises the ceiling
    by 100 points. This will make it fairly impossible for the player to bang his
    head on this raised ceiling.


    Summary


    You started this chapter with a quick dive right into the PhysicsWorld scene and
    PhysicsBody node.


    You got to see the power and versatility of these two elements first hand, without
    much work. You made some adjustments to some of the properties of these objects,
    including density, linear damping, and restitution, and then saw their effects.
    You began exploring how to set up and handle contact events so that you could
    implement screen wrapping. Then you triggered an impulse on the player’s sprite
    that caused it to jump on command and updated its animations to match its actions.
    Finally, you added some ledges to run along by making a set of brick blocks interconnected
    by joints that acted like rubber bands when they were added to the Physics engine
    in the scene.


    You got a lot accomplished as a result. Your sprite has a large world and several
    obstacles to run around and with which it can interact. But it is a bit lonely
    and longs for more to do. The next chapter should fulfill the sprite’s desires
    nicely by teaching you how to add more sprites to the game screen!


