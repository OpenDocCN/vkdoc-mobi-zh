    \ (40, 25)];\n[_playerSprite spawnedInScene:self];\n_playerLivesRemaining = kPlayerLivesMax;\n\
    _playerIsDeadFlag = NO;\n[self playerLivesDisplay];\n}\n```\n\nThen you add the\
    \ display method to the `Player / Ratz` if() statement in the `didBeginContact`\
    \ method of the `SKBGameScene.m` file:\n\n```\n} else if (theRatz.ratzStatus ==\
    \ SBRatzRunningLeft || theRatz.ratzStatus ==\nSBRatzRunningRight) {\n    // oops,\
