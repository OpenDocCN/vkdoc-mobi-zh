    \ ➤ Group`（见图 [3-2](#index_split_000.html#p36)）。这会在你的项目文件夹内创建一个新文件夹。它现在已准备好让你为其命名，因此将其命名为`Sprites`。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 27](index-36_1.jpg)\n\
    \n![Image 28](index-36_2.jpg)\n\n**32**\n\n**CHAPTER 3: Sprite Movement Responding\
