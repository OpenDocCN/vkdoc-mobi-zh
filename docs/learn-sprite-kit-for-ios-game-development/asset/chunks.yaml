    Chapter


    Where to Go from Here


    Going Forward with Sprite Kit


    You made it to the end of the book, and you’ve built an exciting game from scratch.
    Along the way, you gained an understanding of the Sprite Kit API and you implemented
    many of its features.


    You undoubtedly know a lot more now than when you started.


    Since the Sprite Kit is still a new set of APIs (at the time of this writing),
    we all hope to see various additions and adjustments made to it in the future
    that will introduce capabilities that we have not yet contemplated. With any luck,
    we will see a slew of new games being made by professional and amateur developers
    alike in the next few years—all made possible by the exciting and easy-to-use
    Sprite Kit APIs.


    Making the Game Better


    In its current state, this game is not quite ready for prime time. However, if
    you put some more time and effort into it, you just might turn your game into
    the next blockbuster.


    Here are some ideas to consider for improving the game:


     With only four levels, the game is a bit lacking. It won’t take new players
    very long before they can complete all of your levels without breaking a sweat.


    You certainly will want to add more levels to the game to make it more exciting
    and challenging.


     You will probably want to introduce more types of bad guys. Ratz and Gatorz
    certainly can’t be the only vermin that need to be removed from the sewer, so
    use your imagination to extend the cast of characters.


     Add a variety of bonuses so that your players can have a broader mixture of
    sprites occupying their attention.


     Use the Game Kit APIs to add multiplayer functionality. Everyone enjoys playing
    games against others, and it brings out the competitive spirit in your players.


