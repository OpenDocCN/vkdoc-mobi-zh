- fmt: '# There is a third value (property of `SKView`), which is not used here but
    that you can add anytime you feel the urge: `showsDrawCount`. This value can be
    useful when using an `SKEffectNode` object, which we’ll get a chance to use later
    in Chapter 9. Use this draw count as another piece of data when you profile your
    game’s performance.


    Other than these debugging options, you won’t need to add or alter any code here
    in this file.


    Select the `SKBMyScene.m` file next (see Figure 1-9).


    ***Figure 1-9.** The `SKBMyScene.m` file, open in the editor*


    Here is the bulk of the useful code. This is where everything that you saw happened
    when you ran the game. The “Hello, World!” label, the debugging information, where
    the spaceships were spawned from, and where the spinning actions were initiated—all
    of this happened when the user “touched” the iPhone screen, and you clicked in
    the Simulator screen. That’s a lot going on for two short methods, don’t you think?


    Let’s examine it in more detail. First, take a look at the `initWithSize` method.


    ```

    self.backgroundColor = [SKColor colorWithRed:0.15 green:0.15 blue:0.3 alpha:1.0];

    ```


    Here, you set a background color using RGB (color) and alpha (transparency) values.


    ```

    SKLabelNode *myLabel = [SKLabelNode labelNodeWithFontNamed:@"Chalkduster"];

    myLabel.text = @"Hello, World!";

    myLabel.fontSize = 30;

    myLabel.position = CGPointMake(CGRectGetMidX(self.frame), CGRectGetMidY(self.frame));

    ```


    Then you create an `SKLabelNode` object and set some important values such as
    its font, size, and position, as well as the text itself. For the position calculation,
    you might notice that some convenience methods (`CGPointMake` and `GetMidX`) are
    being used to determine the center of the screen using the `SKScene` frame property.


    ```

    [self addChild:myLabel];

    ```


    Finally, you add the `SKLabelNode` that you created as a child of the `SKScene`.
    This is how sprites or nodes are added to the screen: by using the `addChild`
    method of the `SKScene` object.


    You may have noticed that all of this happened inside the scene initialization.
    In other words, immediately after the app launch, since this scene will be instantiated
    when the storyboard is loaded. This method then becomes the best place to add
    code to take care of whatever you want to have happen when the user starts your
    game. You may want to go have some sort of splash screen, or you may just get
    right to the point by presenting the user with several buttons from which to select:
    a one- or two-player game perhaps.


    Finally, you have the `touchesBeganWithEvent` method. As you will infer from its
    name, this method will be called when the user places a finger on the screen.
    Not when they lift their finger off the screen (that would be the `touchesEndedWithEvent`
    method), as is the common method employed when using buttons, for instance. This
    allows the users to change their mind when making choices between buttons. But
    that’s a different topic for a different book. When a user touches the screen
    in this game, you don’t want to delay immediate action, so this is a better choice
    for method picking.


    The `for` loop is used so that multiple simultaneous touches can be recognized
    and handled accordingly. This is a bit tricky on the simulator. However, on an
    actual device, try pressing two fingers down at the same time, and you’ll see
    what you would expect: two spaceships appear where your fingers were placed.


    ```

    CGPoint location = [touch locationInNode:self];

    ```


    For each touch event, you first determine the position of the touch.


    ```

    SKSpriteNode *sprite = [SKSpriteNode spriteNodeWithImageNamed:@"Spaceship"];

    ```


    Then you create a new sprite by creating a new `SKSpriteNode` object. To do this,
    you can pass the filename of an image that you’ve added to the project to a convenience
    method of `SKSpriteNode` and, voila, you have a sprite. It does not appear on-screen
    yet, however. That comes later. Notice on the left in the Project Navigator that
    there is already an image file named `Spaceship.png`. Click on it to view it inside
    Xcode.


    ```

    sprite.position = location;

    ```


    You set the sprite’s position to the location that you determined from the user’s
    touch point. It is interesting to note that if we skipped or commented out the
    next two lines of code, we would have the spaceship appear on-screen and it would
    not be spinning.


    ```

    SKAction *action = [SKAction rotateByAngle:M_PI duration:1];

    ```


    Here you create a new object called `SKAction`. This type of object will be configured
    in a variety of different ways, some of which you’ll discover in subsequent chapters.
    Once it’s created and configured, it will be associated or applied to a sprite
    (`SKSpriteNode`), thereby applying that action to that sprite. That’s a pretty
    wordy way of describing a fairly straightforward process.


    In this case, you create a spinning, or rotation, action. In essence, what these
    parameters are saying is “rotate 180 degrees in one second.” The `rotateByAngle`
    parameter expects the angle to be provided in radians not degrees, and `M_PI`
    is a C-type function provided in the `math.h` library that returns the value of
    pi, which in radians is a half circle. The `duration` parameter expects the value
    passed to it to be in seconds.


    ```

    [sprite runAction:[SKAction repeatActionForever:action]];

    ```


    So now that you have a configured action, this line of code attaches the action
    to the sprite. Not only that, but it also makes it repeat indefinitely instead
    of just one complete half-circle rotation (180 degrees). You could change it to
    that instead if you wanted to have it just rotate once and stop:


    ```

    [sprite runAction:action];

    ```


    Then you would add the configured sprite to the scene, which actually adds it
    to the screen:


    ```

    [self addChild:sprite];

    ```


    ## Summary


    And that is that! Wow! Do you see that there really isn’t much code needed to
    do all of that? Looking back several years, do you realize how much more code
    would have been required to perform the same thing, let alone how badly it would
    perform with just one spaceship that size? Not only is the iPhone amazing as far
    what it’s capable of handling game-wise, but with the release of Sprite Kit, your
    job of creating the next best game becomes so much easier!


    This chapter introduced you to a few Sprite Kit objects and some of the many things
    that you can do with them. Animation has never been easier! Ready for more? The
    following chapters will continue to add more exciting features. Let’s get on with
    it.


    ## Chapter SKActions and SKTextures: Your First Animated Sprite


    The “Hello World” application was a good introduction to a few Sprite Kit fundamentals
    such as the `SKScene`, `SKLabelNode`, `SKSpriteNode`, and `SKAction` objects,
    but it was seriously lacking in functionality (unless your idea of a great game
    is to spawn 100 spinning spaceships faster than the next developer)!


    In this chapter, you’re going to begin writing a game, entitled “Sewer Bros.”
    You will start by having a splash screen presented to the user, and when the user
    touches the screen to start a game, you will transition to a new screen and add
    an animated sprite to it. Each subsequent chapter will add more features and functionality
    until, upon reaching the end of the book, you will have a fully functional game.
    You will be introduced to many Sprite Kit functions along the way and by the end,
    you should have enough knowledge and experience using Sprite Kit to begin writing
    your own best-selling 2D game to sell on the iOS App Store.


    ### Humble Beginnings


    To make things as easy as possible, you will begin with a template just as you
    did in the last chapter.'
