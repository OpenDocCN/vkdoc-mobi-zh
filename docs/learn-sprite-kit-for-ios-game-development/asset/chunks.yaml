    Along the way, you learned some methods for organizing your growing code base.
    You created some custom classes to hold important data, and you tried to eliminate
    hard-coded static values that you may elect to change later.


    The end result is that you had a game character appear on the screen and, when
    the user touches the screen, it reacts to the user’s control inputs and runs around
    the screen. Well, back and forth at least.


