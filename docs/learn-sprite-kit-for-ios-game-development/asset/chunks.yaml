    This bit of trickery adds a bunch of leading zeros to the current score, and then
    trims all but the last five digits. This forces the score to have enough leading
    zeros to total five digits.


    for (int index = 1; index <= 5; index++) {


    [whichScene enumerateChildNodesWithName:[NSString


    stringWithFormat:@"score_player_digit%d", index]


    usingBlock:^(SKNode *node, BOOL *stop) {


    You begin a for() loop that will loop thru the five digits and use an SKScene
    method that will be new to you. EnumerateChildNodesWithName does pretty much what
    it says: it runs through all of the child nodes that have been added to the scene,
    and it looks for any nodes whose name property matches the provided name. If any
    nodes are found, it runs the block of code you provide. Accordingly, this loop
    will successfully find a single child node each pass through the for() loop. Each
    node that is found will be a sprite, using one of our custom font textures to
    display a digit of the score on the screen.


    NSString *charAtIndex = [substring substringWithRange:NSMakeRange(index-1, 1)];
    int charIntValue = [charAtIndex intValue];


    SKTexture *digitTexture = [_arrayOfNumberTextures objectAtIndex:charIntValue];
    SKAction *newDigit = [SKAction animateWithTextures:@[digitTexture]


    timePerFrame:0.1];


    [node runAction:newDigit];


    This block code runs for each digit in turn, and it replaces the current texture
    with the new texture based on the current score. Since the array of textures holds
    the images for digits 0 thru 9, you can easily get the digit image you want by
    requesting the array object at the same index as the digit you want. For example,
    if you want the image for 5, it resides in the array at index 5\. Easy peasy.


    Status Bar = Off


    You might notice (even though it’s been this way since the start) that there are
    some traces inside the scene of the iPhone’s top status bar, which shows battery
    and signal levels. It was a minor bother earlier, but now it interferes with the
    score display. Let’s get rid of that.


    You may have noticed that when you first created this project, by default the
    Deployment Target option to hide the status bar during application launch (see
    Figure [7-2) does not seem to be working](#index_split_001.html#p131)


    the way that you would want.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 59](index-131_1.jpg)


    **CHAPTER 7: Points and Scoring**


    **129**


    ***Figure 7-2.** Deployment Target settings*


    You need to add an item to the project info.plist file.


    In the Project Navigator window on the left, you will find a folder labeled Supporting
    Files. Inside that folder is a file called Sewer Bros-Info.plist Click once on
    that file to see its contents in the editor window. (It’s a Property List file
    just like the one you made in the last chapter.) Right-click in the list of items
    on the left and select Add Row. Edit the default text “Application Category” and
    change it to “View Controller-Based Status Bar Appearance”. Change its Type to
    Boolean and its Value to NO (see Figure [7-3](#index_split_001.html#p132)).


    Build and run the program, and the status bar will go away as desired.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 60](index-132_1.jpg)


    **130**


    **CHAPTER 7: Points and Scoring**


    ***Figure 7-3.** The Modified Info.plist file*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **CHAPTER 7: Points and Scoring**


    **131**


    A Different Kind of Score


    Now that you have “scoring,” you need to add “scoring”—Say what?


    You have added the ability to display the player’s score in the game window, but
    now you need a musical score. Ah, a play on words. Indeed!.


    The game is in serious need of something that your ears can enjoy as the hero
    runs around pushing vermin into the river. Maybe not background theme music on
    an infinite loop, not this time anyhow, but perhaps a “little ditty” during the
    splashscreen and various sound effects as different actions are triggered in the
    game. That will work nicely.


    Playing Sound Files


    So how do you play sound files? Conveniently enough, you can do this in Sprite
    Kit. You’ll probably be as amazed at just how simple this is.'
  trans: "\n# 第 7 章：分数与计分\n\n## // 计分\n\n`SKBScores *sceneScores = [[SKBScores alloc]\
    \ init];`\n\n`[sceneScores createScoreNode:self];`\n\n`_scoreDisplay = sceneScores;`\n\
    \n`_playerScore = 85942;`\n\n`[_scoreDisplay updateScore:self newScore:_playerScore];`\n\
    \n构建并运行程序，即可看到新的计分显示正常工作（见图 7-1）。\n\n***图 7-1.** 计分显示*\n\n那么你在这里做了什么？\n\n你创建了自定义类的新实例，运行了名为`createScoreNode`的显示创建方法，并将其附加到本地存储的实例变量`scoreDisplay`上。\n\
    \n```\nif (!_arrayOfNumberTextures) {\n    [self createScoreNumberTextures];\n\
    }\n```\n\n`createScoreNode`方法会懒加载（仅在需要时加载）纹理——如果它们尚不存在的话。`createScoreNumberTextures`方法会创建纹理并存储到数组中，就像你对其他精灵所做的那样。\n\
    \n```\n// 标题\nSKSpriteNode *header = [SKSpriteNode spriteNodeWithTexture:headerTexture];\n\
    header.name = @\"score_player_header\";\nheader.position = startWhere;\nheader.xScale\
    \ = 2;\nheader.yScale = 2;\nheader.physicsBody.dynamic = NO;\n[whichScene addChild:header];\n\
    ```\n\n这里你创建了一个小型的 I- 图像并添加到场景中，作为玩家分数的标题。\n\n不需要`physicsBody`，因为这些计分数字不会在屏幕上浮动，不会受重力影响，也不会与其他精灵交互。不过你确实做了一些不同的事：将图像的缩放比例从默认值\
    \ 1 改为了 2。这会使所有像素加倍，让图像比原始尺寸大 100%。正如你看到的`xScale`和`yScale`这两个属性，你并不需要按比例缩放。当然这不是必需的，但你可以自行决定是否使用。在这个例子中，它给游戏增添了一点经典像素风格。\n\
    \n```\n// 分数，5 位数字\nSKTexture *textNumber0Texture = [SKTexture textureWithImageNamed:kTextNumber0FileName];\n\
    for (int index=1; index <= kScoreDigitCount; index++) {\n    SKSpriteNode *zero\
    \ = [SKSpriteNode spriteNodeWithTexture:textNumber0Texture];\n    zero.name =\
    \ [NSString stringWithFormat:@\"score_player_digit%d\", index];\n    zero.position\
    \ = CGPointMake(startWhere.x+20+(kScoreNumberSpacing*index), CGRectGetMaxY(whichScene.frame)-kScoreDistanceFromTop);\n\
    \    zero.xScale = 2;\n    zero.yScale = 2;\n    zero.physicsBody.dynamic = NO;\n\
    \    [whichScene addChild:zero];\n}\n```\n\n这里你创建了五张数字图像，使用`for()`循环按比例间隔放置。\n\
    \n常量`kScoreDigitCount`可以随意更改，将数字位数从 5 位改为任意所需数量。这段代码用了点巧妙的数学运算来动态确定每个数字的位置，将缩放比例改为\
    \ 2，并将它们添加到场景中。\n\n这相当直接，现在你应该已经非常熟悉了。在游戏过程中，分数会不断变化，`updateScore`方法将负责处理显示的更新。\n\
    \n```\nNSString *numberString = [NSString stringWithFormat:@\"00000%d\", theScore];\n\
    NSString *substring = [numberString substringFromIndex:[numberString length] -\
    \ 5];\n```\n\n这个巧妙的小技巧给当前分数前面加了一串前导零，然后只截取最后五位数字。这强制分数有足够的前导零，总共凑够五位数。\n\n```\n\
    for (int index = 1; index <= 5; index++) {\n    [whichScene enumerateChildNodesWithName:[NSString\
    \ stringWithFormat:@\"score_player_digit%d\", index]\n                       \
    \         usingBlock:^(SKNode *node, BOOL *stop) {\n```\n\n你开始了一个`for()`循环，遍历五个数字，并使用一个对你而言是全新的`SKScene`方法。`enumerateChildNodesWithName`顾名思义：它会遍历所有已添加到场景的子节点，寻找`name`属性与给定名称匹配的任何节点。如果找到任何节点，就会运行你提供的代码块。因此，这个循环在每次`for()`循环迭代中都会成功找到一个子节点。每个被找到的节点都是一个精灵，使用我们的自定义字体纹理之一在屏幕上显示一个分数数字。\n\
    \n```\nNSString *charAtIndex = [substring substringWithRange:NSMakeRange(index-1,\
    \ 1)];\nint charIntValue = [charAtIndex intValue];\nSKTexture *digitTexture =\
    \ [_arrayOfNumberTextures objectAtIndex:charIntValue];\nSKAction *newDigit = [SKAction\
    \ animateWithTextures:@[digitTexture] timePerFrame:0.1];\n[node runAction:newDigit];\n\
    ```\n\n这段代码块依次处理每个数字，并根据当前分数将当前纹理替换为新纹理。由于纹理数组保存着数字 0 到 9 的图像，你只需通过请求数组中与所需数字相同索引的对象，即可轻松获取想要的数字图像。例如，如果你想要数字\
    \ 5 的图像，它就位于数组的索引 5 处。简单得很。\n\n## 状态栏 = 关闭\n\n你可能已经注意到（尽管从项目开始就这样了），场景中残留着 iPhone\
    \ 顶部状态栏的痕迹，它显示着电量和信号水平。之前这算是个小麻烦，但现在它干扰了分数的显示。让我们把它去掉。\n\n你可能已经发现，在首次创建该项目时，默认的“部署目标”选项中“在应用启动时隐藏状态栏”（见图\
    \ 7-2）并没有按你期望的方式工作。\n\n![图片 59](img/index-131_1.jpg)\n\n***图 7-2.** 部署目标设置*\n\n\
    你需要在项目的`Info.plist`文件中添加一个条目。\n\n在左侧的项目导航窗口中，你会找到一个名为“Supporting Files”的文件夹。该文件夹内有一个名为`Sewer\
    \ Bros-Info.plist`的文件。单击该文件，即可在编辑窗口中查看其内容（这是一个属性列表文件，就像你在上一章中创建的那个）。在左侧项目列表中右键单击，然后选择“添加行”。将默认文本\"\
    Application Category\"修改为\"View Controller-Based Status Bar Appearance\"。将其类型更改为\"\
    Boolean\"，值更改为\"NO\"（见图 7-3）。\n\n构建并运行程序，状态栏就会像预期那样消失。\n\n![图片 60](img/index-132_1.jpg)\n\
    \n***图 7-3.** 修改后的 Info.plist 文件*\n\n## 另一种“分数”\n\n现在你有了“分数”，还需要添加“乐谱”——什么？\n\n\
    你已经具备了在游戏窗口中显示玩家分数的能力，但现在你需要一份乐谱。啊，一语双关。确实如此！\n\n当英雄跑来跑去把害虫推入河中时，游戏迫切需要一些能让耳朵享受的东西。或许不是无限循环的背景主题音乐，至少这次不是，但也许可以在启动画面中播放一段“小曲”，并在游戏中触发不同动作时播放各种音效。这样效果会很好。\n\
    \n## 播放声音文件\n\n那么如何播放声音文件呢？很方便的是，你可以在 Sprite Kit 中实现。你可能会惊讶于这竟然如此简单。\n"
- fmt: 'You might want to add a new group folder called `Sounds` inside the project,
    specifically to hold sounds. Add the first sound file `Theme.caf` to the project
    (in the same way that you added sprite images; be sure to include the Target box)
    and move it into the `Sounds` folder. Once the sound is added to the project,
    all you need to do is to add these two lines of code to the `initWithSize` method
    in the `SKBSplashScene.m` file:


    ```

    myText.position = CGPointMake(CGRectGetMidX(self.frame),

    CGRectGetMidY(self.frame)-100);

    ```


    ```

    SKAction *themeSong = [SKAction playSoundFileNamed:@"Theme.caf"

    waitForCompletion:NO];

    [self runAction:themeSong];

    [self addChild:myText];

    ```


    Build and run the program. Sweet-music-to-the-ears, you have a theme song! That
    was easy.


    Thus to play a small sound file, all you need to do is create an `SKAction` using
    the convenience method `playSoundFileNamed`, which picks the sound file to play
    and runs the action in the current scene. That’s amazingly short and sweet!


    ## CAF Audio Format


    At this point, I need to stop and explain a little bit about the audio format
    `.caf`. The acronym stands for "Core Audio Format," and Apple Inc. developed it
    with the goal of overcoming the limitations found in older digital audio formats.


    While creating these sound files for the purpose of this game, I found a free
    and easy way to create files in this `.caf` format. You simply convert them from
    the common `.aif` format using the Terminal.


    Most common audio-conversion tools can save files in `.aif` format. Once you have
    the sound file with the extension `.aif`, you can run the following command in
    the Terminal: `mbp:desktop admin$ afconvert -f caff -d ima4 Theme.aif Theme.caf`


    This creates a new file on the Desktop called `Theme.caf`, and this is the file
    you will use in your game project.


    **Note:** If you are familiar with using the Terminal, then you''ll notice that
    I did this from the context of the Desktop directory. When I first launched the
    Terminal, it was in the default User folder and the command I used to move (change
    directory) into the Desktop folder was:


    ```

    mbp:~ admin$ cd desktop

    mbp:desktop admin$

    ```


    ## Player Spawn Sound Effect


    Now you can add some more sound files and use them for sound effects tied to specific
    game actions.


    You''ll begin by adding several sound files all at once. Add these six sound files
    to the project: `Run.caf`, `Jump.caf`, `Skid.caf`, `SpawnPlayer.caf`, `SpawnEnemy.caf`,
    and `SpawnCoin.caf`. Move them into the `Sounds` folder.


    You need some new constants to use for the filenames, so add them to the `SKBPlayer.h`
    file:


    ```

    #import <SpriteKit/SpriteKit.h>

    #import "SKBAppDelegate.h"

    #import "SKBSpriteTextures.h"


    #define kPlayerSpawnSoundFileName @"SpawnPlayer.caf"

    #define kPlayerRunSoundFileName @"Run.caf"

    #define kPlayerSkidSoundFileName @"Skid.caf"

    #define kPlayerJumpSoundFileName @"Jump.caf"

    #define kPlayerRunningIncrement 100

    #define kPlayerSkiddingIncrement 20

    #define kPlayerJumpingIncrement 8

    ```


    To store sound files locally specific to the `SKBPlayer` class, add these properties
    to the `SKBPlayer.h` file:


    ```

    @property (nonatomic, strong) SKBSpriteTextures *spriteTextures;

    @property SBPlayerStatus playerStatus;

    @property (nonatomic, strong) SKAction *spawnSound;

    @property (nonatomic, strong) SKAction *runSound, *jumpSound, *skidSound;

    + (SKBPlayer *)initNewPlayer:(SKScene *)whichScene

    startingPoint:(CGPoint)location;

    - (void)spawnedInScene:(SKScene *)whichScene;

    ```


    Then you load and store them in the instance variables inside the `spawnedInScene`
    method in the `SKBPlayer.m` file:


    ```

    - (void)spawnedInScene:(SKScene *)whichScene

    {

    SKBGameScene *theScene = (SKBGameScene *)whichScene;

    _spriteTextures = theScene.spriteTextures;

    // Sounds

    _spawnSound = [SKAction playSoundFileNamed:kPlayerSpawnSoundFileName

    waitForCompletion:NO];

    ```'
