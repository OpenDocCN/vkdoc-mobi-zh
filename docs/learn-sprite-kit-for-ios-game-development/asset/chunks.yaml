    to SKBGameScene in the initWithSize method of the SKBGameScene.m file:


    self.backgroundColor = [SKColor blackColor];


    self.physicsBody = [SKPhysicsBody bodyWithEdgeLoopFromRect:self.frame]; **self.physicsBody.categoryBitMask
    = kWallCategory;**


    **self.physicsWorld.contactDelegate = self;**


    Then you can add the delegate method didBeginContact to handle the contacts and
    collisions (add it to the SKBGameScene.m file):


    - (void)didBeginContact:(SKPhysicsContact *)contact


    {


    SKPhysicsBody *firstBody, *secondBody;


    if (contact.bodyA.categoryBitMask < contact.bodyB.categoryBitMask)


    {


    firstBody = contact.bodyA;


    secondBody = contact.bodyB;


    }


    else {


    firstBody = contact.bodyB;


    secondBody = contact.bodyA;


    }


    // Player / sideWalls


    if ((((firstBody.categoryBitMask & kPlayerCategory) != 0) && ((secondBody.categoryBitMask
    & kWallCategory) != 0)))


