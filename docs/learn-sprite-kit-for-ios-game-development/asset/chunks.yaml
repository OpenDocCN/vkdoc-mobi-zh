    \n172\n\n## CHAPTER 8: Contacts and Collisions\n\n```\n// While kicked upward\
    \ and spinning, wait for a short spell before altering physicsBody\nSKAction *shortDelay\
    \ = [SKAction waitForDuration:0.5];\n[self runAction:shortDelay completion:^{\n\
    \    // Make a new physics body that is much, much smaller as to not affect ledges\
    \ as he falls...\n    self.physicsBody = [SKPhysicsBody bodyWithRectangleOfSize:CGSizeMake(1,\
    \ 1)];\n    self.physicsBody.categoryBitMask = kRatzCategory;\n    self.physicsBody.collisionBitMask\
    \ = kWallCategory;\n    self.physicsBody.contactTestBitMask = kWallCategory;\n\
    \    self.physicsBody.linearDamping = 1.0;\n    self.physicsBody.allowsRotation\
    \ = YES;\n}];\n```\n\nWhen this method is triggered, you apply an impulse, similar\
    \ to the player jumping, to the node and create a rotation `SKAction` that starts\
    \ the Ratz spinning and flying up into the air. Gravity takes over, and it then\
    \ begins to fall. You create a short delay so that all of this activity has the\
    \ time to be set into motion before you drastically modify the `physicsBody` properties.\
    \ You create a new `SKPhysicsBody` of a much smaller size in order to help it\
    \ avoid other screen objects like ledges.\n\nThe only collision and contact event\
    \ that you will care about during this process is contact with the surrounding\
    \ wall, so you need to set these values accordingly. You change the default value\
    \ (0.0) for `linearDamping`, which slows its movement. This `linearDamping` property\
    \ is used to simulate liquid or air friction forces on the node, so this change\
    \ slows its movement a little bit while falling to the bottom.\n\nNow you can\
    \ alter the `didBeginContact` method in the `SKBGameScene.m` file to handle the\
    \ falling enemy when it strikes the bottom of the screen:\n\n```\n// Ratz / sideWalls\n\
    if ((((firstBody.categoryBitMask & kWallCategory) != 0) && ((secondBody.categoryBitMask\
