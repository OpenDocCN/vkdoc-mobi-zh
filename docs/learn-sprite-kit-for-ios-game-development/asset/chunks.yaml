    Coin Contact from Below the Ledges


    You want your hero to be able to collect coins, not only by running into them,
    but also by jumping up and striking the ledges from beneath the coins. This requires
    a bit more complexity, since you will need to test the contact between the player
    and a ledge brick, and also check to see if a coin was in contact with that particular
    ledge brick at the same time.


    To begin this change, you need to add the kLedgeCategory to the player’s contactTestBitMask
    property in the SKBPlayer.m file:


    player.physicsBody.categoryBitMask = kPlayerCategory;


