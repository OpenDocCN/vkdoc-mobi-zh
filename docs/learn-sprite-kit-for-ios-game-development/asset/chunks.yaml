    Points and Scoring


    What’s the Point?


    A game needs a goal—something the player needs to obtain. In the case of this
    game, players play for points and the best score wins!


    The player has the job of clearing a room in a sewer from vermin. The player doesn’t
    have a laser gun or an AK-47\. The player must kick the rats into a river of water
    that flows below the brick base.


    The player earns points for each vermin evicted from the sewer area and can also
    collect bonus points by obtaining the occasional coin that falls down into the
    play area.


    Score Display


    You will show the player’s points at the top of the screen. But as I hinted at
    the end of the last chapter, you will be using a custom font that is not readily
    available in the iOS development environment. To do this, you will use custom
    texture images instead of basic text to display the individual characters that
    make up the player’s score.


