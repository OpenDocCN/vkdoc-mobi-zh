    ## CHAPTER 10: Where to Go from Here


    ### Resources


    As you continue adding these suggested features (as well as others), you will
    inevitably run into errors and problems that you just can’t seem to overcome.
    Step away from the computer for a bit, maybe even overnight, and the answer may
    come to you. It’s amazing how many times this tactic has worked for a variety
    of developers.


    But if that fails to produce the desired results, you may want to consult external
    sources. Also you may want to add sound effects to your project, and you’ll need
    some help in locating a wide selection that are free or at least low-cost. Here
    is a list of resources that can help you in these endeavors:


    - Xcode’s built-in help and documentation

    - Apple’s developer forums: http://devforums.apple.com

    - Official Sprite Kit documentation: https://developer.apple.com/library/IOs/documentation/GraphicsAnimation/Conceptual/SpriteKit_PG/Introduction/Introduction.html

    - Game ideas: http://gameideas.wikia.com/wiki/Game_Ideas_Wiki

    - Royalty-free music: http://www.playonloop.com/2012-music-loops/gunman/

    - Free sound effects: http://www.noiseforfun.com/browse-sound-effects/page/3/


    ### Farewell


    I am pleased that you chose to join me on this journey of enlightenment and game
    creation. I hope that you become the next prosperous iOS game developer extraordinaire!


