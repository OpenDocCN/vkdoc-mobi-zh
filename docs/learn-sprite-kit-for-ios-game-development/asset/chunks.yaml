    **brickBase.physicsBody.categoryBitMask = kBaseCategory;**


    **brickBase.physicsBody.dynamic = NO;**


    **[self addChild:brickBase];**


    }


    return self;


    You had to create this node as a volume-based node (bodyWithRectangleOfSize),
    not an edge-based node (bodyWithEdgeLoopFromRect), because edge nodes allow movement
    from inside their borders (like the wall you created in the last section), not
    outside. This volume-based node acts as a solid brick wall that has volume. You
