    Didn’t You Cover this Already?


    Yes, I did cover much of this already. Back in Chapter 5, you were introduced
    to contacts and collisions so that you could have your Ratz and coins bounce off
    of each other. But you’re not done yet. You need a way for your enemies to keep
    from wandering around the base level. You need your player to be able to collect
    coins and kick vermin off the ledges after knocking them unconscious.


    Also, to add some challenge, your hero will “die” if it runs into vermin that
    are not currently unconscious. All of these additions require careful handling
    of contacts and collisions.


    Contacts vs. Collisions


    So what is the difference between these two events, anyway? Think of it in this
    overly simplified way: *collisions* are handled in the physics world, whereas
    *contacts* are the triggers in the code for the logical routing of a collision
    event. In this game, you have no interest in a coin sprite coming into contact
    with the ledge bricks. You want the physics world to handle them for you, allowing
    a coin to roll along the tops of the ledges. You don’t need any game logic applied
    to the coin, or the applicable ledge, when they come into contact with each other.


