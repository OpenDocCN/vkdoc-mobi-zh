    `SKTexture *f1 = [SKTexture textureWithImageNamed: @"Player_Right1.png"]; SKTexture
    *f2 = [SKTexture textureWithImageNamed: @"Player_Right2.png"]; SKTexture *f3 =
    [SKTexture textureWithImageNamed: @"Player_Right3.png"]; SKTexture *f4 = [SKTexture
    textureWithImageNamed: @"Player_Right4.png"];` 这段代码创建了四个 `SKTexture` 对象，每个对应一帧动画。这些对象由项目内存储的图像创建，因此必须精确拼写以避免错误。


    `NSArray *textureArray = @[f1,f2,f3,f4];`


    你创建了一个由这些纹理组成的 `NSArray` 数组。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ## 第 2 章：SKActions 和 SKTextures：你的第一个动画精灵


    **注意** 务必注意，数组内纹理对象的排列顺序决定了最终的帧序列。此外，你可以重复使用对象。例如，你可以这样写：


    `NSArray *textureArray = @[f2,f1,f2,f3,f1,f4];`


    这样一来，四个图像帧会按照该顺序显示，在动画的每次循环中，屏幕上将绘制总计六帧。


    `_playerSprite = [SKSpriteNode spriteNodeWithTexture:f1];`


    `_playerSprite.position = location;`


    接着你创建了 `SKSpriteNode`（使用你在接口文件中通过 `@property` 语句创建的实例变量），并只应用了其中一个纹理。具体使用哪一个并不重要，但使用第一个动画帧是合理的。


    `SKAction *runRightAction = [SKAction animateWithTextures:textureArray timePerFrame:0.1];
    SKAction *runForever = [SKAction repeatActionForever:runRightAction];` 这里你使用数组中的完整纹理集创建了一个
    `SKAction`，并将每一帧设置为每 0.1 秒绘制一次。接着你创建了另一个 `SKAction`，使其无限重复该单个动作。


    `[_playerSprite runAction:runForever];`


    `[self addChild:_playerSprite];`


    这部分代码将无限重复的动作添加到精灵上，最后将精灵添加到场景中。


    ## 总结


    本章旨在帮助你更深入地理解 `SKSpriteNodes`、`SKTextures` 和 `SKActions` 在游戏中创建视觉组件时所扮演的角色。如果没有任何可视且可交互的内容，那游戏也就谈不上是游戏，对吧？精灵及其相关动作是每款游戏的基础核心元素。在后续章节中，当你为游戏添加更多组件时，将继续使用这些对象。


    在本章中，你还添加了第二个 `SKScene`，并初步了解了 `SKTransitions`，它能在场景切换时添加一些不错的视觉特效。


    在下一章中，我将为奔跑动画添加精灵的移动。你不能让角色只在原地奔跑而不移动！你将实现用户触摸事件来判定角色的移动方向，并增加跳跃能力。在此过程中，我将向你介绍
    Sprite Kit 自带的物理引擎，它将为你的游戏设计增添强大的功能。物理引擎的额外好处是，你无需编写所有代码来处理游戏环境中的物理约束和反应。


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # 第 3 章：精灵移动：响应用户输入


    ## 跑起来！


    到目前为止，游戏屏幕显示后（初始为纯黑色背景），用户点击屏幕时，一个动画精灵会出现在屏幕上。这还不错，但你才刚刚开始。现在，你要为其增加移动功能！


    首先，你将学习如何添加代码来检测用户点击的位置，并将屏幕划分为两个兴趣区域：左侧区域和右侧区域。当用户点击左侧区域时，你让精灵向左移动，反之亦然。你将通过获取游戏屏幕区域并除以二的方式，在代码中确定左右区域。如果用户触摸位置小于该结果数值，则为左侧区域点击；若大于该数值，则为右侧区域点击。


    在 `SKBGameScene.m` 文件中，修改 `touchesBeganWithEvent` 方法，在第一个 `SKTexture` 赋值之前添加一个
    `if()` 语句，如下所示：


    ```

    if (!_playerSprite) {

    // 4 个存储为纹理的动画帧

    SKTexture *f1 = [SKTexture textureWithImageNamed: @"Player_Right1.png"];

    ```


    然后，将以下突出显示的代码添加到同一方法中现有代码的末尾：


    ```

    // 将精灵添加到场景中

    [self addChild:_playerSprite];

    } else if (location.x <= ( self.frame.size.width / 2 )) {

    NSLog(@"左侧点击");

    } else {

    NSLog(@"右侧点击");

    }

    ```


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![图 26](img/index-34_1.jpg)


    现在，如果你构建并运行程序，其行为将与之前相同——至少在你拥有一个动画精灵在屏幕上时是这样。此后，每次用户点击屏幕（或你在模拟器游戏屏幕上点击），你应该能在
    Xcode 控制台中看到新的一行输出（参见图 3-1）。如果你没有看到控制台输出，请返回 Xcode 并选择 **View** ➤ **Debug Area**
    ➤ **Activate Console**。调整你的窗口位置，以便能同时看到控制台和模拟器屏幕。


    **图 3-1.** 显示点击事件的控制台输出


    那么这里发生了什么？


    首先，你确保只有在精灵尚未存在时，才将其添加到场景中。这样，屏幕上最终只有一个动画精灵，而不是每次点击都生成多个精灵。


    接着，你检查了用户点击位置的 X 坐标，并将其与场景总宽度的一半进行比较。如果小于该数值，则表示用户点击了屏幕左侧；否则，视为右侧点击。


    这非常简单。现在，你要对这些点击做出响应。


    修改 `touchesBeganWithEvent` 方法，在现有的 `if()` 和 `else` 语句中添加以下六行代码：


    ```

    } else if (location.x <= ( self.frame.size.width / 2 )) {

    NSLog(@"左侧点击");

    SKAction *moveLeft = [SKAction moveByX:-100 y:0 duration:1];

    SKAction *moveForever = [SKAction repeatActionForever:moveLeft];

    [self runAction:moveForever];

    } else {

    NSLog(@"右侧点击");

    SKAction *moveRight = [SKAction moveByX:100 y:0 duration:1];

    SKAction *moveForever = [SKAction repeatActionForever:moveRight];

    [self runAction:moveForever];

    }

    ```


    现在，如果你构建并运行，你会看到左侧和/或右侧的点击会使精灵沿水平（即 X 轴）方向在屏幕上移动。你也会很快发现，一旦精灵跑出屏幕边缘，它将永远消失，不会再出现。


    这种行为是符合预期的，实际上它能帮助你清理或移除那些不再绘制在屏幕上的精灵。这些精灵会占用宝贵的内存空间，试想一下，如果屏幕上有十二个精灵，但已有数百个精灵离开了屏幕，那将造成多大的浪费！Sprite
    Kit 为你完成了这项工作，它会清除不再绘制在屏幕上的精灵，从而保持你宝贵的内存整洁高效。


    [www.it-ebooks.info](http://www.it-ebooks.info/)

