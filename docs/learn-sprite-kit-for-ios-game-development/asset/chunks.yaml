    通过*学习 iOS 游戏开发的 Sprite Kit*，您将发现使用苹果的全新 Sprite Kit 框架创建 2D 游戏是多么简单。您会了解到创建场景、添加动画精灵、融入边缘、播放音效以及创建粒子特效是多么容易。您还将使用触摸事件来控制精灵，实现内置的物理引擎，处理精灵碰撞与接触，等等。


