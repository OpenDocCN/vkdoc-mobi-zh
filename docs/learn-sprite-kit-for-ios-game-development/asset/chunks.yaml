    Optimizing Texture Generation

    -----------------------------


    The sprite textures are currently being created when you spawn the player onto
    the scene. Move this into the scene’s `initWithSize` method and pass the textures
    onto sprites as they are spawned. As you begin to add more sprites and characters
    into the game, the sprite textures will contain those for all of these sprites,
    so you might as well initialize the sprite textures at launch in the game scene,
    instead of when the player sprite is spawned.


    Add an instance variable for the finished sprites in the `SKBGameScene.h` file:


    ```objc

    @interface SKBGameScene : SKScene <SKPhysicsContactDelegate>


    @property (strong, nonatomic) SKBPlayer *playerSprite;

    @property (strong, nonatomic) SKBSpriteTextures *spriteTextures;

    ```


    In the `SKBGameScene.m` file, modify `initWithSize` to include this change:


    ```objc

    self.physicsWorld.contactDelegate = self;


    // initialize and create our sprite textures

    _spriteTextures = [[SKBSpriteTextures alloc] init];

    [_spriteTextures createAnimationTextures];


    NSString *fileName = @"";

    ```


    Then remove that same block of code from the `initNewPlayer` method of the `SKBPlayer.m`
    file, along with the assignment into the local instance variable:


    ```objc

    // initialize and create our sprite textures

    SKBSpriteTextures *playerTextures = [[SKBSpriteTextures alloc] init];

    [playerTextures createAnimationTextures];


    // initial frame

    SKTexture *f1 = [SKTexture textureWithImageNamed: kPlayerStillRightFileName];


    // our player character sprite & starting position in the scene

    SKBPlayer *player = [SKBPlayer spriteNodeWithTexture:f1];

    player.name = @"player1";

    player.position = location;

    player.spriteTextures = playerTextures;

    player.playerStatus = SBPlayerFacingRight;

    ```


    Since you will soon need to reference the game scene in the Player class, you
    should add the necessary `#import` method to the `SKBPlayer.m` file:


    ```objc

    #import "SKBPlayer.h"

    #import "SKBGameScene.h"


    @implementation SKBPlayer

    ```

