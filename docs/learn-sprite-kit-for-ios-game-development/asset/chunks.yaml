  trans: "\n**第 8 章：接触与碰撞**\n\n在 Xcode 窗口左侧的项目导航器中，你会发现已为你生成的新文件：`Splashed`。将此新文件移动到\
    \ `Emitters` 组文件夹中。在中央编辑器面板中，你可以看到新的 `SKEmitterNode` 正在生成大量粒子。现在需要编辑参数值，以创建模拟水花飞溅的粒子流。请按以下数值更改设置：\n\
    \n| 属性 | 值 |\n| --- | --- |\n| 粒子，出生率 | 0 |\n| 粒子，最大数量 | 0 |\n| 生命周期，起始 | 0.378\
    \ |\n| 生命周期，范围 | 0.093 |\n| 位置范围，X | 38.768 |\n| 位置范围，Y | 0.008 |\n| 角度，起始 | 89.928\
    \ |\n| 角度，范围 | 1.77 |\n| 速度，起始 | 53.92 |\n| 速度，范围 | 0 |\n| 加速度，X | 0 |\n| 加速度，Y\
    \ | 0 |\n| 透明度，起始 | 1 |\n| 透明度，范围 | 0.2 |\n| 透明度，速度 | 0 |\n| 缩放，起始 | 0.1 |\n|\
    \ 缩放，范围 | 0.2 |\n| 缩放，速度 | 0.17 |\n| 旋转，起始 | 0 |\n| 旋转，范围 | 0 |\n| 旋转，速度 | 0 |\n\
    | 颜色混合，因子 | 1 |\n| 颜色混合，范围 | 0 |\n| 颜色混合，速度 | 0 |\n\n接着将颜色选择器中的默认橙色改为蓝色调，使其看起来更像水。\n\
    \n当然，你需要一个音效与视觉效果相配，因此将 `Splash.caf` 音效文件添加到项目中，并将其移动到 `Sounds` 组文件夹中。\n\n在 `SKBRatz.h`\
    \ 文件中为音效文件名添加一个新常量：\n\n```objc\n#define kRatzCollectedSoundFileName @\"EnemyCollected.caf\"\
    \n#define kRatzSplashedSoundFileName @\"Splash.caf\"\n#define kRatzRunningIncrement\
    \ 40\n```\n\n然后在 `SKBRatz.h` 文件中添加一个新的实例变量来存储音效：\n\n```objc\n@property (nonatomic,\
    \ strong) SKBSpriteTextures *spriteTextures;\n@property (nonatomic, strong) SKAction\
    \ *spawnSound, *koSound, *collectedSound, *splashSound;\n+ (SKBRatz *)initNewRatz:(SKScene\
    \ *)whichScene startingPoint:(CGPoint)location ratzIndex:(int)index;\n```\n\n\
    在 `SKBRatz.m` 文件的 `spawnedInScene` 方法中添加这个新变量的初始化代码：\n\n```objc\n// 音效\n_splashSound\
    \ = [SKAction playSoundFileNamed:kRatzSplashedSoundFileName waitForCompletion:NO];\n\
    _koSound = [SKAction playSoundFileNamed:kRatzKOSoundFileName waitForCompletion:NO];\n\
    ```\n\n然后在 `SKBRatz.m` 文件的 `ratzHitWater` 方法中添加将所有功能整合在一起的代码：\n\n```objc\n- (void)ratzHitWater:(SKScene\
    \ *)whichScene\n{\n    // 播放音效\n    [whichScene runAction:_splashSound];\n\n \
    \   // 水花特效\n    NSString *emitterPath = [[NSBundle mainBundle] pathForResource:@\"\
    Splashed\" ofType:@\"sks\"];\n    SKEmitterNode *splash = [NSKeyedUnarchiver unarchiveObjectWithFile:emitterPath];\n\
    \    splash.position = self.position;\n    NSLog(@\"水花位置 (%f,%f)\", splash.position.x,\
    \ splash.position.y);\n    splash.name = @\"ratzSplash\";\n    splash.targetNode\
    \ = whichScene.scene;\n    [whichScene addChild:splash];\n\n    [self removeFromParent];\n\
    }\n```\n\n构建并运行程序，看看当怪物被踢下平台掉入水中会发生什么。\n\n**敌人击杀玩家**\n\n现在该提高一下游戏难度了。主角目前一直过得太轻松——拥有至高权力且不死之身。是时候改变这一切了。\n\
    \n你已经在 `SKBGameScene.m` 文件的 `didBeginContact` 方法中编写了检测玩家与敌人接触的测试代码，因此只需稍作修改即可处理这个新事件：\n\
    \n```objc\n// 玩家 / 怪物\nif ((((firstBody.categoryBitMask & kPlayerCategory) !=\
    \ 0) && ((secondBody.categoryBitMask & kRatzCategory) != 0))) {\n    SKBRatz *theRatz\
    \ = (SKBRatz *)secondBody.node;\n    if (theRatz.ratzStatus == SBRatzKOfacingLeft\
    \ || theRatz.ratzStatus == SBRatzKOfacingRight) {\n        // 怪物昏迷，将其踢下平台\n  \
    \      [theRatz ratzCollected:self];\n        // 增加分数\n        _playerScore =\
