    \ 40\n#define kCoinPointValue 60\n```\n\n在 `SKBCoin.h` 文件中添加一个局部变量来保存新音效：\n\n\
    ```\n@property (nonatomic, strong) SKBSpriteTextures *spriteTextures;\n@property\
