  trans: "\n# `@interface SKBGameScene : SKScene <SKPhysicsContactDelegate>`\n\n构建并运行程序，即可看到新的格栅以及敌人以仿佛从这些格栅上掉落的方式生成（见图\
    \ 8-1）。\n\n***图 8-1.** 敌人从上方通过格栅落下*\n\n## 管道\n\n此时，当敌人精灵向砖砌底部游荡时，它们会卡在底层。您需要让它们离开这一层，并重新出现在顶部，以便再次开始游荡。为此，您将在底部添加一些管道，使它们消失在管道中，然后从上面的格栅重新出现。\n\
    \n首先，需要在 `SKBAppDelegate.h` 文件中添加一个新的位掩码值。然后，需要将 `SKBGameScene.h` 文件中决定敌人精灵生成位置的常量移动一下：\n\
    \n```\n// 全局项目常量\n\nstatic const uint32_t kPlayerCategory = 0x1 << 0;\nstatic\
    \ const uint32_t kBaseCategory = 0x1 << 1;\nstatic const uint32_t kWallCategory\
    \ = 0x1 << 2;\nstatic const uint32_t kPipeCategory = 0x1 << 3;\nstatic const uint32_t\
    \ kLedgeCategory = 0x1 << 4;\nstatic const uint32_t kCoinCategory = 0x1 << 5;\n\
    static const uint32_t kRatzCategory = 0x1 << 6;\n\n#define kEnemySpawnEdgeBufferX\
    \ 30\n#define kEnemySpawnEdgeBufferY 30\n\ntypedef enum : uint8_t {\n    SKBEnemyTypeCoin\
    \ = 0,\n    SKBEnemyTypeRatz\n} SKBEnemyTypes;\n```\n\n请务必删除或注释掉 `SKBGameScene.h`\
    \ 文件中的 `kEnemySpawnEdgeBufferX` 和 `kEnemySpawnEdgeBufferY` 常量。\n\n如前所述，位掩码值的具体顺序在此处并不重要，它们只需是唯一的值即可。顺序真正起作用的地方是在\
    \ `didBeginContact` 方法中，因为它决定了 `firstBody` 和 `secondBody` 节点的顺序。不过，我们有点操之过急了。\n\
    \n添加两个以 `PipeLwr` 为前缀的图片，并将它们移动到 `Sprites` 文件夹中。就像您刚才处理两个格栅那样，将它们添加到 `SKBGameScene.m`\
    \ 文件的 `createSceneContents` 方法中：\n\n```\ngrate.name = @\"grate2\";\ngrate.position\
    \ = CGPointMake(CGRectGetMaxX(self.frame)-30,\n                             CGRectGetMaxY(self.frame)-25);\n\
    [self addChild:grate];\n\n// 管道\nSKSpriteNode *pipe = [SKSpriteNode spriteNodeWithImageNamed:@\"\
    PipeLwrLeft.png\"];\npipe.name = @\"pipeLeft\";\npipe.position = CGPointMake(9,\
    \ 25);\npipe.physicsBody = [SKPhysicsBody bodyWithRectangleOfSize:pipe.size];\n\
    pipe.physicsBody.categoryBitMask = kPipeCategory;\npipe.physicsBody.dynamic =\
    \ NO;\n[self addChild:pipe];\n\npipe = [SKSpriteNode spriteNodeWithImageNamed:@\"\
    PipeLwrRight.png\"];\npipe.name = @\"pipeRight\";\npipe.position = CGPointMake(CGRectGetMaxX(self.frame)-9,\
    \ 25);\npipe.physicsBody = [SKPhysicsBody bodyWithRectangleOfSize:pipe.size];\n\
    pipe.physicsBody.categoryBitMask = kPipeCategory;\npipe.physicsBody.dynamic =\
    \ NO;\n[self addChild:pipe];\n\n// 计分\nSKBScores *sceneScores = [[SKBScores alloc]\
    \ init];\n[sceneScores createScoreNode:self];\n```\n\n如果现在构建并运行程序，您将看到两个额外的管道。目前还没有任何东西与它们交互（见图\
    \ 8-2）。这将是下一步的内容。\n\n***图 8-2.** 管道已添加*\n\n现在，您需要修改敌人初始化方法，以通知物理世界您对这个新类别感兴趣。在\
    \ `SKBCoin.m` 文件的 `initNewCoin` 方法中，向 `contactTestBitMask` 添加该类别：\n\n```\ncoin.physicsBody.categoryBitMask\
    \ = kCoinCategory;\ncoin.physicsBody.contactTestBitMask = kWallCategory | kPipeCategory\
    \ |\n                                      kCoinCategory | kRatzCategory;\ncoin.physicsBody.collisionBitMask\
    \ = kBaseCategory | kWallCategory |\n                                    kLedgeCategory\
    \ | kCoinCategory | kRatzCategory;\n```\n\n对 `SKBRatz.m` 文件中的 `initNewRatz` 方法执行相同操作：\n\
    \n```\nratz.physicsBody.categoryBitMask = kRatzCategory;\nratz.physicsBody.contactTestBitMask\
    \ = kWallCategory | kPipeCategory |\n                                      kCoinCategory\
    \ | kRatzCategory;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n"
- fmt: "`kRatzCategory | kCoinCategory` ;\n\n`ratz.physicsBody.collisionBitMask =\
    \ kBaseCategory | kWallCategory | kLedgeCategory | kRatzCategory | kCoinCategory`\
    \ ;\n\nNow the code will trigger a contact event when these enemy sprites come\
    \ into contact with either pipe node. Let’s add some methods in both classes that\
    \ will handle the interaction. For the `Coin` class, add a public method declaration\
    \ to the `SKBCoin.h` file:\n\n- (void)wrapCoin:(CGPoint)where;\n- (void)coinHitPipe;\n\
    - (void)runRight;\n\nThen insert the new method code immediately after the existing\
    \ `wrapCoin` method in the `SKBCoin.m` file:\n\n```\n- (void)wrapCoin:(CGPoint)where\n\
    {\n    SKPhysicsBody *storePB = self.physicsBody;\n    self.physicsBody = nil;\n\
    \    self.position = where;\n    self.physicsBody = storePB;\n}\n\n- (void)coinHitPipe\n\
    {\n    [self removeFromParent];\n}\n```\n\nAs you can see here, when a coin hits\
    \ the pipe, it will disappear. You create this effect by removing it from the\
    \ scene (its parent). This will force the hero to be hasty in collecting coins,\
    \ as they won’t hang around for long.\n\nFor the `Ratz` class, add two public\
    \ methods to the `SKBRatz.h` file:\n\n- (void)wrapRatz:(CGPoint)where;\n- (void)ratzHitLeftPipe:(SKScene\
    \ *)whichScene;\n- (void)ratzHitRightPipe:(SKScene *)whichScene;\n- (void)runRight;\n\
    \nThen insert the new method code immediately after the existing `wrapRatz` method\
    \ in the `SKBRatz.m` file:\n\n```\n- (void)wrapRatz:(CGPoint)where\n{\n    SKPhysicsBody\
    \ *storePB = self.physicsBody;\n    self.physicsBody = nil;\n    self.position\
    \ = where;\n    self.physicsBody = storePB;\n}\n\n- (void)ratzHitLeftPipe:(SKScene\
    \ *)whichScene\n{\n    int leftSideX = CGRectGetMinX(whichScene.frame)+kEnemySpawnEdgeBufferX;\n\
    \    int topSideY = CGRectGetMaxY(whichScene.frame)-kEnemySpawnEdgeBufferY;\n\
    \    SKPhysicsBody *storedPB = self.physicsBody;\n    self.physicsBody = nil;\n\
    \    self.position = CGPointMake(leftSideX, topSideY);\n    self.physicsBody =\
    \ storedPB;\n    [self removeAllActions];\n    [self runRight];\n    // Play spawning\
    \ sound\n    [self runAction:self.spawnSound];\n}\n\n- (void)ratzHitRightPipe:(SKScene\
    \ *)whichScene\n{\n    int rightSideX = CGRectGetMaxX(whichScene.frame)-kEnemySpawnEdgeBufferX;\n\
    \    int topSideY = CGRectGetMaxY(whichScene.frame)-kEnemySpawnEdgeBufferY;\n\
    \    SKPhysicsBody *storedPB = self.physicsBody;\n    self.physicsBody = nil;\n\
    \    self.position = CGPointMake(rightSideX, topSideY);\n    self.physicsBody\
    \ = storedPB;\n    [self removeAllActions];\n    [self runLeft];\n    // Play\
    \ spawning sound\n    [self runAction:self.spawnSound];\n}\n```\n\nGlancing at\
    \ the code you just added, you should see similarities to the wrapping code for\
    \ when the sprites hit the sidewalls. You temporarily disable and store the `physicsBody`\
    \ sprite so that you can transport it to a new location before restoring the `physicsBody`\
    \ back again. You then make sure that all animation and movement is reset to new\
    \ values and play the spawning sound.\n\nNow all you need to do is add the applicable\
    \ code to the `didBeginContact` method of the `SKBGameScene.m` file, first for\
    \ the `Coin` class and then for the `Ratz` class:\n\n```\n// Coin / sideWalls\n\
    if ((((firstBody.categoryBitMask & kWallCategory) != 0) && ((secondBody.categoryBitMask\
    \ & kCoinCategory) != 0))) {\n    SKBCoin *theCoin = (SKBCoin *)secondBody.node;\n\
    \    if (theCoin.position.x < 100) {\n        [theCoin wrapCoin:CGPointMake(self.frame.size.width-6,\
    \ theCoin.position.y)];\n    } else {\n        [theCoin wrapCoin:CGPointMake(6,\
    \ theCoin.position.y)];\n    }\n}\n\n// Coin / Pipes\nif ((((firstBody.categoryBitMask\
    \ & kPipeCategory) != 0) && ((secondBody.categoryBitMask & kCoinCategory) != 0)))\
    \ {\n    SKBCoin *theCoin = (SKBCoin *)secondBody.node;\n    [theCoin coinHitPipe];\n\
