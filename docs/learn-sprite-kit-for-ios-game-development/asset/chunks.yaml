- fmt: "# CHAPTER 7: Points and Scoring\n\n## // Scoring\n\n`SKBScores *sceneScores\
    \ = [[SKBScores alloc] init];`\n\n`[sceneScores createScoreNode:self];`\n\n`_scoreDisplay\
    \ = sceneScores;`\n\n`_playerScore = 85942;`\n\n`[_scoreDisplay updateScore:self\
    \ newScore:_playerScore];`\n\nBuild and run the program to see the new scoring\
    \ display in place and functioning as desired (see Figure [7-1](#index_split_001.html#p128)).\n\
    \n***Figure 7-1.** The scoring display*\n\nSo what did you do here?\n\nYou created\
    \ a new instance of the custom class, ran the display-creation method called `createScoreNode`,\
    \ and attached it to the locally stored instance variable, `scoreDisplay`.\n\n\
    ```\nif (!_arrayOfNumberTextures) {\n    [self createScoreNumberTextures];\n}\n\
    ```\n\nThe `createScoreNode` method lazily instantiates (load only as needed)\
    \ the textures if they do not already exist. The `createScoreNumberTextures` method\
    \ is creating and storing the textures into an array just as you did for the other\
    \ sprites.\n\n```\n// Header\nSKSpriteNode *header = [SKSpriteNode spriteNodeWithTexture:headerTexture];\n\
    header.name = @\"score_player_header\";\nheader.position = startWhere;\nheader.xScale\
    \ = 2;\nheader.yScale = 2;\nheader.physicsBody.dynamic = NO;\n[whichScene addChild:header];\n\
    ```\n\nHere you create and add to the scene the little I- image that acts as a\
    \ header for the player score.\n\nNo `physicsBody` is needed, as these scoring\
    \ digits are not going to float around the screen, be affected by gravity, or\
    \ interact with other sprites. You did do something a bit different here: you\
    \ changed the scaling of the image from its default value of 1 to 2. This doubles\
    \ all of the pixels and makes the image 100% larger than the original. As you\
    \ can see by the two properties `xScale` and `yScale`, you are not required to\
    \ scale things proportionately. This is not required of course but it is something\
    \ available to use at your own discretion. In this case, it gives the game a bit\
    \ of the classic pixilated look.\n\n```\n// Score, 5-digits\nSKTexture *textNumber0Texture\
    \ = [SKTexture textureWithImageNamed:kTextNumber0FileName];\nfor (int index=1;\
    \ index <= kScoreDigitCount; index++) {\n    SKSpriteNode *zero = [SKSpriteNode\
    \ spriteNodeWithTexture:textNumber0Texture];\n    zero.name = [NSString stringWithFormat:@\"\
    score_player_digit%d\", index];\n    zero.position = CGPointMake(startWhere.x+20+(kScoreNumberSpacing*index),\
    \ CGRectGetMaxY(whichScene.frame)-kScoreDistanceFromTop);\n    zero.xScale = 2;\n\
    \    zero.yScale = 2;\n    zero.physicsBody.dynamic = NO;\n    [whichScene addChild:zero];\n\
    }\n```\n\nHere you create the five digit images spaced proportionately using a\
    \ `for()` loop to set up each digit.\n\nThe `kScoreDigitCount` constant can be\
    \ changed at will to change the digit count from 5 to whatever desired. This code\
    \ uses a little bit of fancy math to determine dynamically the position of each\
    \ digit, change the scales to 2, and add them to the scene.\n\nThis is pretty\
    \ straightforward, and by now this should all look quite familiar. During game\
    \ play, the score will be changing and the `updateScore` method will handle the\
    \ display changes.\n\n```\nNSString *numberString = [NSString stringWithFormat:@\"\
    00000%d\", theScore];\nNSString *substring = [numberString substringFromIndex:[numberString\
    \ length] - 5];\n```\n\nThis bit of trickery adds a bunch of leading zeros to\
    \ the current score, and then trims all but the last five digits. This forces\
    \ the score to have enough leading zeros to total five digits.\n\n```\nfor (int\
    \ index = 1; index <= 5; index++) {\n    [whichScene enumerateChildNodesWithName:[NSString\
    \ stringWithFormat:@\"score_player_digit%d\", index]\n                       \
    \         usingBlock:^(SKNode *node, BOOL *stop) {\n```\n\nYou begin a `for()`\
    \ loop that will loop through the five digits and use an `SKScene` method that\
    \ will be new to you. `enumerateChildNodesWithName` does pretty much what it says:\
    \ it runs through all of the child nodes that have been added to the scene, and\
    \ it looks for any nodes whose `name` property matches the provided name. If any\
    \ nodes are found, it runs the block of code you provide. Accordingly, this loop\
    \ will successfully find a single child node each pass through the `for()` loop.\
    \ Each node that is found will be a sprite, using one of our custom font textures\
    \ to display a digit of the score on the screen.\n\n```\nNSString *charAtIndex\
    \ = [substring substringWithRange:NSMakeRange(index-1, 1)];\nint charIntValue\
    \ = [charAtIndex intValue];\nSKTexture *digitTexture = [_arrayOfNumberTextures\
    \ objectAtIndex:charIntValue];\nSKAction *newDigit = [SKAction animateWithTextures:@[digitTexture]\
    \ timePerFrame:0.1];\n[node runAction:newDigit];\n```\n\nThis block code runs\
    \ for each digit in turn, and it replaces the current texture with the new texture\
    \ based on the current score. Since the array of textures holds the images for\
    \ digits 0 through 9, you can easily get the digit image you want by requesting\
    \ the array object at the same index as the digit you want. For example, if you\
    \ want the image for 5, it resides in the array at index 5. Easy peasy.\n\n##\
    \ Status Bar = Off\n\nYou might notice (even though it’s been this way since the\
    \ start) that there are some traces inside the scene of the iPhone’s top status\
    \ bar, which shows battery and signal levels. It was a minor bother earlier, but\
    \ now it interferes with the score display. Let’s get rid of that.\n\nYou may\
    \ have noticed that when you first created this project, by default the Deployment\
    \ Target option to hide the status bar during application launch (see Figure [7-2](#index_split_001.html#p131))\
    \ does not seem to be working the way that you would want.\n\n![Image 59](index-131_1.jpg)\n\
    \n***Figure 7-2.** Deployment Target settings*\n\nYou need to add an item to the\
    \ project `Info.plist` file.\n\nIn the Project Navigator window on the left, you\
    \ will find a folder labeled Supporting Files. Inside that folder is a file called\
    \ `Sewer Bros-Info.plist`. Click once on that file to see its contents in the\
    \ editor window. (It’s a Property List file just like the one you made in the\
    \ last chapter.) Right-click in the list of items on the left and select Add Row.\
    \ Edit the default text “Application Category” and change it to “View Controller-Based\
    \ Status Bar Appearance”. Change its Type to Boolean and its Value to NO (see\
    \ Figure [7-3](#index_split_001.html#p132)).\n\nBuild and run the program, and\
    \ the status bar will go away as desired.\n\n![Image 60](index-132_1.jpg)\n\n\
    ***Figure 7-3.** The Modified Info.plist file*\n\n## A Different Kind of Score\n\
    \nNow that you have “scoring,” you need to add “scoring”—Say what?\n\nYou have\
    \ added the ability to display the player’s score in the game window, but now\
    \ you need a musical score. Ah, a play on words. Indeed!\n\nThe game is in serious\
    \ need of something that your ears can enjoy as the hero runs around pushing vermin\
    \ into the river. Maybe not background theme music on an infinite loop, not this\
    \ time anyhow, but perhaps a “little ditty” during the splash screen and various\
    \ sound effects as different actions are triggered in the game. That will work\
    \ nicely.\n\n## Playing Sound Files\n\nSo how do you play sound files? Conveniently\
    \ enough, you can do this in Sprite Kit. You’ll probably be as amazed at just\
    \ how simple this is."
