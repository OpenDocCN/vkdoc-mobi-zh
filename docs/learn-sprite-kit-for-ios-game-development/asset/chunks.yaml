  trans: "\n**[self runAction:rotateForever];**\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n172\n\n## 第 8 章：接触与碰撞\n\n```\n// 在被踢飞并旋转时，等待一小段时间再修改 physicsBody\nSKAction *shortDelay\
    \ = [SKAction waitForDuration:0.5];\n[self runAction:shortDelay completion:^{\n\
    \    // 创建一个新的、小得多的物理体，以免在下落时影响壁架等物体...\n    self.physicsBody = [SKPhysicsBody\
    \ bodyWithRectangleOfSize:CGSizeMake(1, 1)];\n    self.physicsBody.categoryBitMask\
    \ = kRatzCategory;\n    self.physicsBody.collisionBitMask = kWallCategory;\n \
    \   self.physicsBody.contactTestBitMask = kWallCategory;\n    self.physicsBody.linearDamping\
    \ = 1.0;\n    self.physicsBody.allowsRotation = YES;\n}];\n```\n\n当这个方法被触发时，你对节点施加一个冲量（类似于玩家跳跃），并创建一个旋转`SKAction`，让\
    \ Ratz 开始旋转并飞向空中。重力接管后，它便开始下落。你会设定一个短暂的延迟，以便在对`physicsBody`属性进行大幅修改之前，所有动作都有时间启动。你创建一个尺寸更小的新`SKPhysicsBody`，以帮助它避开其他屏幕对象，比如壁架。\n\
    \n在这个过程中，唯一需要关心的碰撞和接触事件是与周围墙壁的接触，因此你需要相应地设置这些值。你更改了`linearDamping`的默认值 (0.0)，这会减缓它的运动速度。这个`linearDamping`属性用于模拟节点上的液体或空气摩擦力，所以这项改动会使它在下落到底部时速度稍慢一些。\n\
    \n现在，你可以修改`SKBGameScene.m`文件中的`didBeginContact`方法，以处理敌人撞击屏幕底部时的下落情况：\n\n```\n\
    // Ratz / 侧壁\nif ((((firstBody.categoryBitMask & kWallCategory) != 0) && ((secondBody.categoryBitMask\
    \ & kRatzCategory) != 0))) {\n    SKBRatz *theRatz = (SKBRatz *)secondBody.node;\n\
    \    if (theRatz.ratzStatus != SBRatzKicked) {\n        if (theRatz.position.x\
    \ < 100) {\n            [theRatz wrapRatz:CGPointMake(self.frame.size.width-13,\
    \ theRatz.position.y)];\n        } else {\n            [theRatz wrapRatz:CGPointMake(13,\
    \ theRatz.position.y)];\n        }\n    } else {\n        // 接触到底部墙壁（已被踢飞并已落下）\n\
    \        NSLog(@\"%@ 撞到屏幕底部，正在被移除\", theRatz.name);\n        [theRatz removeFromParent];\n\
    \    }\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 第 8 章：接触与碰撞\n\
    \n173\n\n构建并运行程序，以查看当英雄踢飞一个昏迷敌人时触发的新动画序列。\n\n## 落水\n\n当害虫撞到屏幕底部时，你应该添加一个视觉效果，使其看起来像溅入水中。为此，你将创建另一个粒子效果。\n\
    \n让我们创建一个新的 Ratz 类方法，以处理害虫生命周期的最后这一幕。\n\n在`SKBRatz.h`文件中添加公开声明：\n\n```\n- (void)ratzCollected:(SKScene\
    \ *)whichScene;\n- (void)ratzHitWater:(SKScene *)whichScene;\n- (void)runRight;\n\
    ```\n\n然后在`SKBRatz.m`文件中现有的`ratzCollected`方法之后插入实现：\n\n```\nself.physicsBody.linearDamping\
    \ = 1.0;\nself.physicsBody.allowsRotation = YES;\n}];\n```\n\n```\n- (void)ratzHitWater:(SKScene\
    \ *)whichScene\n{\n    NSLog(@\"%@ 撞到屏幕底部，正在被移除\", self.name);\n    [self removeFromParent];\n\
    }\n```\n\n现在修改`SKBGameScene.m`文件的`didBeginContact`方法中的`Ratz / 侧壁` `if()` 语句：\n\
    \n```\n} else {\n    // 接触到底部墙壁，因此已被踢飞并落到屏幕底部\n    [theRatz ratzHitWater:self];\n\
    }\n```\n\n现在基础已经搭好，你可以创建新的粒子了。\n\n从**文件**菜单选择**新建文件**，确保左侧列表中选中了**iOS 资源**，选择**SpriteKit\
    \ 粒子文件**，然后点击**下一步**按钮。从**模板**下拉菜单中选择**火花**，然后点击**下一步**按钮。将其命名为`Splashed`，然后点击**创建**按钮。\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n174\n"
- fmt: "**CHAPTER 8: Contacts and Collisions**\n\nIn the Project Navigator on the\
    \ left side of the Xcode window, you will see the new file was generated for you:\
    \ `Splashed`. Move the new file into the `Emitters` group folder. In the center\
    \ editor pane, you can view the new `SKEmitterNode` generating lots of particles.\
    \ It’s time to edit the values in order to create a particle stream that mimics\
    \ a water splash. Change the settings to the following values:\n\n| Property |\
    \ Value |\n| --- | --- |\n| Particles, Birthrate | 0 |\n| Particles, Maximum |\
    \ 0 |\n| Lifetime, Start | 0.378 |\n| Lifetime, Range | 0.093 |\n| Position Range,\
    \ X | 38.768 |\n| Position Range, Y | 0.008 |\n| Angle, Start | 89.928 |\n| Angle,\
    \ Range | 1.77 |\n| Speed, Start | 53.92 |\n| Speed, Range | 0 |\n| Acceleration,\
    \ X | 0 |\n| Acceleration, Y | 0 |\n| Alpha, Start | 1 |\n| Alpha, Range | 0.2\
    \ |\n| Alpha, Speed | 0 |\n| Scale, Start | 0.1 |\n| Scale, Range | 0.2 |\n| Scale,\
    \ Speed | 0.17 |\n| Rotation, Start | 0 |\n| Rotation, Range | 0 |\n| Rotation,\
    \ Speed | 0 |\n| Color Blend, Factor | 1 |\n| Color Blend, Range | 0 |\n| Color\
    \ Blend, Speed | 0 |\n\nThen change the color (Color Ramp) from the default orange\
    \ to a shade of blue to make it look a bit more like water.\n\nOf course, you\
    \ need a sound effect to go along with the visual effect, so add the `Splash.caf`\
    \ sound file to the project and move it into the `Sounds` group folder.\n\nAdd\
    \ a new constant for the sound filename in the `SKBRatz.h` file:\n\n```objc\n\
    #define kRatzCollectedSoundFileName @\"EnemyCollected.caf\"\n#define kRatzSplashedSoundFileName\
    \ @\"Splash.caf\"\n#define kRatzRunningIncrement 40\n```\n\nThen add a new instance\
    \ variable to store the sound in the `SKBRatz.h` file:\n\n```objc\n@property (nonatomic,\
    \ strong) SKBSpriteTextures *spriteTextures;\n@property (nonatomic, strong) SKAction\
    \ *spawnSound, *koSound, *collectedSound, *splashSound;\n+ (SKBRatz *)initNewRatz:(SKScene\
    \ *)whichScene startingPoint:(CGPoint)location ratzIndex:(int)index;\n```\n\n\
    Add the initialization of this new variable to the `spawnedInScene` method in\
    \ the `SKBRatz.m` file:\n\n```objc\n// Sound Effects\n_splashSound = [SKAction\
    \ playSoundFileNamed:kRatzSplashedSoundFileName waitForCompletion:NO];\n_koSound\
    \ = [SKAction playSoundFileNamed:kRatzKOSoundFileName waitForCompletion:NO];\n\
    ```\n\nThen add the code to bring it all together in the `ratzHitWater` method\
    \ of the `SKBRatz.m` file:\n\n```objc\n- (void)ratzHitWater:(SKScene *)whichScene\n\
    {\n    // Play sound\n    [whichScene runAction:_splashSound];\n\n    // splash\
    \ eye candy\n    NSString *emitterPath = [[NSBundle mainBundle] pathForResource:@\"\
    Splashed\" ofType:@\"sks\"];\n    SKEmitterNode *splash = [NSKeyedUnarchiver unarchiveObjectWithFile:emitterPath];\n\
    \    splash.position = self.position;\n    NSLog(@\"splash (%f,%f)\", splash.position.x,\
    \ splash.position.y);\n    splash.name = @\"ratzSplash\";\n    splash.targetNode\
    \ = whichScene.scene;\n    [whichScene addChild:splash];\n\n    [self removeFromParent];\n\
    }\n```\n\nBuild and run the program to see what happens when the vermin is kicked\
    \ off the ledge and into the water.\n\n**Enemies Kill Player**\n\nNow it’s time\
    \ to crank up the difficulty level a bit. The hero has had it way too easy so\
    \ far—supreme power and immortality. Time to change all that.\n\nYou already have\
    \ a test that checks for contact between the player and the enemies in the `didBeginContact`\
    \ method of the `SKBGameScene.m` file, so you just need to modify it slightly\
    \ to handle this new event:\n\n```objc\n// Player / Ratz\nif ((((firstBody.categoryBitMask\
    \ & kPlayerCategory) != 0) && ((secondBody.categoryBitMask & kRatzCategory) !=\
    \ 0))) {\n    SKBRatz *theRatz = (SKBRatz *)secondBody.node;\n    if (theRatz.ratzStatus\
    \ == SBRatzKOfacingLeft || theRatz.ratzStatus == SBRatzKOfacingRight) {\n    \
    \    // ratz unconscious so kick 'em off the ledge\n        [theRatz ratzCollected:self];\n\
    \        // Score some points\n        _playerScore = _playerScore + kRatzPointValue;\n\
    \        [_scoreDisplay updateScore:self newScore:_playerScore];\n    } else if\
    \ (theRatz.ratzStatus == SBRatzRunningLeft || theRatz.ratzStatus == SBRatzRunningRight)\
    \ {\n        // oops, player dies\n        [_playerSprite playerKilled:self];\n\
    \    }\n}\n```"
