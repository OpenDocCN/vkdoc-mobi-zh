    \        labelNodeWithFontNamed:@\"Chalkduster\"];\n    pressAnywhereText.text\
    \ = @\"Press anywhere to continue\";\n    pressAnywhereText.fontSize = 12;\n \
    \   pressAnywhereText.position = CGPointMake(CGRectGetMidX(self.frame),\n    \
    \    CGRectGetMidY(self.frame)-100);\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**CHAPTER 9: Add More Scenes and Levels**\n\n**189**\n\n```\n    SKAction *zoom\
    \ = [SKAction scaleTo:1.0 duration:2];\n    SKAction *rotate = [SKAction rotateByAngle:M_PI\
