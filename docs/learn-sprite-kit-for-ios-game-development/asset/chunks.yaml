- fmt: "## What You Did Here\n\nWhat you did here is best described with an example.\
    \ Say that the sprite is running to the right and the user presses the left side\
    \ of the screen. The sprite's status will be `SBPlayerRunningRight`, so you change\
    \ its status to `SBPlayerFacingRight`. You use a `SpriteNode` method called `removeAllActions`\
    \ to remove all previous actions (the animation and the movement along the X-axis),\
    \ which makes the sprite come to a halt; that is, it freezes in place. Then you\
    \ create a new action using a single frame of animation and apply the action to\
    \ the sprite. You do this so that you can control which animation frame is used\
    \ when the sprite is standing still. If you just used the `removeAllActions` method\
    \ to cause the sprite to stop and stand still, it would be drawn in whatever was\
    \ the last frame when it was running. Instead, you'll force the frame you want\
    \ it to use for standing still.\n\nIf you build and run the program now, you'll\
    \ see that the running animation and direction changes look much better. There\
    \ is, however, another minor change that you should make. Touching the left side\
    \ of the screen while the sprite is already running to the left causes its speed\
    \ to double, and the same goes for the right side of the screen while running\
    \ right. You don't want the sprite to have super powers, so let's take that special\
    \ ability away from it.\n\nAdd two `if()` statements to final `else` clauses in\
    \ both the left- and right-screen touch sections, so that the complete `if()`\
    \ statement looks like this:\n\n```\nif (!_playerSprite) {\n    _playerSprite\
    \ = [SKBPlayer initNewPlayer:self startingPoint:location];\n} else if (location.x\
    \ <= ( self.frame.size.width / 2 )) {\n    // user touched left side of screen\n\
    \    if (_playerSprite.playerStatus == SBPlayerRunningRight) {\n        _playerSprite.playerStatus\
    \ = SBPlayerFacingRight;\n        // stop running by switching to a single frame\n\
    \        [_playerSprite removeAllActions];\n        SKAction *standingFrame =\
    \ [SKAction animateWithTextures:\n            _playerSprite.spriteTextures.playerStillFacingRightTextures\
    \ timePerFrame:0.05];\n        SKAction *standForever = [SKAction repeatActionForever:standingFrame];\n\
    \        [_playerSprite runAction:standForever];\n    } else if (_playerSprite.playerStatus\
    \ != SBPlayerRunningLeft) {\n        [_playerSprite runLeft];\n    }\n} else {\n\
    \    // user touched right side of screen\n    if (_playerSprite.playerStatus\
    \ == SBPlayerRunningLeft) {\n        _playerSprite.playerStatus = SBPlayerFacingLeft;\n\
    \        // stop running by switching to a single frame\n        [_playerSprite\
    \ removeAllActions];\n        SKAction *standingFrame = [SKAction animateWithTextures:\n\
    \            _playerSprite.spriteTextures.playerStillFacingLeftTextures timePerFrame:0.05];\n\
    \        SKAction *standForever = [SKAction repeatActionForever:standingFrame];\n\
    \        [_playerSprite runAction:standForever];\n    } else if (_playerSprite.playerStatus\
    \ != SBPlayerRunningRight) {\n        [_playerSprite runRight];\n    }\n}\n```\n\
    \nNow when the player is running right and the user presses right, nothing happens.\n\
    \n---\n\n## Skidding to a Stop\n\nInstead of stopping on a dime, you'll have the\
    \ player skid a short distance before coming to a complete rest. This will bring\
    \ about a little challenge when you introduce some bad guys to the game.\n\nYou\
    \ need to add two additional images and instance variables to the `Texture` class.\
    \ As you've done before, choose **Add Files to \"Sewer Bros\"** from the **File**\
    \ menu and select `Player_RightSkid.png`.\n\nDo the same thing for the second\
    \ image named `Player_LeftSkid.png`.\n\nAdd the highlighted code to the `SKBSpriteTextures.h`\
    \ file:\n\n```\n#define kPlayerRunRight4FileName @\"Player_Right4.png\"\n#define\
    \ kPlayerSkidRightFileName @\"Player_RightSkid.png\"\n#define kPlayerStillRightFileName\
    \ @\"Player_Right_Still.png\"\n.\n.\n.\n#define kPlayerRunLeft4FileName @\"Player_Left4.png\"\
    \n#define kPlayerSkidLeftFileName @\"Player_LeftSkid.png\"\n#define kPlayerStillLeftFileName\
    \ @\"Player_Left_Still.png\"\n.\n.\n.\n@property (nonatomic, strong) NSArray *playerRunRightTextures,\
    \ *playerSkiddingRightTextures,\n    *playerStillFacingRightTextures;\n@property\
    \ (nonatomic, strong) NSArray *playerRunLeftTextures, *playerSkiddingLeftTextures,\n\
    \    *playerStillFacingLeftTextures;\n```\n\nThen add the highlighted code to\
    \ the `SKBSpriteTextures.m` file:\n\n```\n_playerRunRightTextures = @[f1,f2,f3,f4];\n\
    // right, skidding\nf1 = [SKTexture textureWithImageNamed:kPlayerSkidRightFileName];\n\
    _playerSkiddingRightTextures = @[f1];\n// right, still\n.\n.\n.\n_playerRunLeftTextures\
    \ = @[f1,f2,f3,f4];\n// left, skidding\nf1 = [SKTexture textureWithImageNamed:kPlayerSkidLeftFileName];\n\
    _playerSkiddingLeftTextures = @[f1];\n// left, still\n```\n\nNext you will add\
    \ two more values for keeping track of the sprite's current status. In the `SKBPlayer.h`\
    \ file, modify the enum definition as follows:\n\n```\ntypedef enum : int {\n\
    \    SBPlayerFacingLeft = 0,\n    SBPlayerFacingRight,\n    SBPlayerRunningLeft,\n\
    \    SBPlayerRunningRight,\n    SBPlayerSkiddingLeft,\n    SBPlayerSkiddingRight\n\
    } SBPlayerStatus;\n```\n\nYou'll also add a static value to hold the distance\
    \ of each skid:\n\n```\n#define kPlayerRunningIncrement 100\n#define kPlayerSkiddingIncrement\
    \ 20\n```\n\nOne more change in this file involves adding two new public methods:\n\
    \n```\n- (void)runRight;\n- (void)runLeft;\n- (void)skidRight;\n- (void)skidLeft;\n\
    ```\n\nNow you move over to the `SKBPlayer.m` file to add the new method implementations.\
    \ Insert them after the existing `runLeft` method:\n\n```\n- (void)skidRight\n\
    {\n    NSLog(@\"skid Right\");\n    [self removeAllActions];\n    _playerStatus\
    \ = SBPlayerSkiddingRight;\n    NSArray *playerSkidTextures = _spriteTextures.playerSkiddingRightTextures;\n\
    \    NSArray *playerStillTextures = _spriteTextures.playerStillFacingRightTextures;\n\
    \    SKAction *skidAnimation = [SKAction animateWithTextures:playerSkidTextures\
    \ timePerFrame:1];\n    SKAction *skidAwhile = [SKAction repeatAction:skidAnimation\
    \ count:0.2];\n    SKAction *moveLeft = [SKAction moveByX:kPlayerSkiddingIncrement\
    \ y:0 duration:0.2];\n    SKAction *moveAwhile = [SKAction repeatAction:moveLeft\
    \ count:1];\n    SKAction *stillAnimation = [SKAction animateWithTextures:playerStillTextures\
    \ timePerFrame:1];\n    SKAction *stillAwhile = [SKAction repeatAction:stillAnimation\
    \ count:0.1];\n    SKAction *sequence = [SKAction sequence:@[skidAwhile, moveAwhile,\
    \ stillAwhile]];\n\n    [self runAction:sequence completion:^{\n        NSLog(@\"\
    skid ended, still facing right\");\n        _playerStatus = SBPlayerFacingRight;\n\
    \    }];\n}\n\n- (void)skidLeft\n{\n    NSLog(@\"skid Left\");\n    [self removeAllActions];\n\
    \    _playerStatus = SBPlayerSkiddingLeft;\n    NSArray *playerSkidTextures =\
    \ _spriteTextures.playerSkiddingLeftTextures;\n    NSArray *playerStillTextures\
    \ = _spriteTextures.playerStillFacingLeftTextures;\n    SKAction *skidAnimation\
    \ = [SKAction animateWithTextures:playerSkidTextures timePerFrame:1];\n    SKAction\
    \ *skidAwhile = [SKAction repeatAction:skidAnimation count:0.2];\n    SKAction\
    \ *moveLeft = [SKAction moveByX:-kPlayerSkiddingIncrement y:0 duration:0.2];\n\
    \    SKAction *moveAwhile = [SKAction repeatAction:moveLeft count:1];\n    SKAction\
    \ *stillAnimation = [SKAction animateWithTextures:playerStillTextures timePerFrame:1];\n\
    \    SKAction *stillAwhile = [SKAction repeatAction:stillAnimation count:0.1];\n\
    \    SKAction *sequence = [SKAction sequence:@[skidAwhile, moveAwhile, stillAwhile]];\n\
    \n    [self runAction:sequence completion:^{\n        NSLog(@\"skid ended, still\
    \ facing left\");\n        _playerStatus = SBPlayerFacingLeft;\n    }];\n}\n```\n\
    \nSo what did you do here?\n\n```\n[self removeAllActions];\n```\n\nFirst you\
    \ cleared out all currently running actions using the `removeAllActions` method."
