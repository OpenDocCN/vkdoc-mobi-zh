    \ < 500)\n    howMany = 18;\nelse\n    howMany = 23;\n[sceneLedge createNewSetOfLedgeNodes:self\
    \ startingPoint:CGPointMake(kLedgeSideBufferSpacing, brickBase.position.y+80)\
    \ withHowManyBlocks:howMany startingIndex:ledgeIndex];\nledgeIndex = ledgeIndex\
    \ + howMany;\n```\n\n你添加了一个整型变量`ledgeIndex`来跟踪随着更多突出块添加时的索引值。你添加了一个屏幕尺寸检查，以便在较小屏幕上压缩突出部分的尺寸。\n\
