- fmt: "# SKActions and SKTextures: Your First Animated Sprite\n\nYou have the images\
    \ inside your project that you’ll use for a splash screen already, so now you\
    \ add one onto the screen. You do this by adding the following code immediately\
    \ after the `self.backgroundColor` line you just added:\n\n```objective-c\n/*\
    \ Set up your scene here */\n\nself.backgroundColor = [SKColor blackColor];\n\
    ```\n\n```\nNSString *fileName = @\"\";\nif (self.frame.size.width == 480) {\n\
    \    fileName = @\"SewerSplash_480\";\n    // iPhone Retina (3.5-inch)\n} else\
    \ {\n    fileName = @\"SewerSplash_568\";\n    // iPhone Retina (4-inch)\n}\n\n\
    SKSpriteNode *splash = [SKSpriteNode spriteNodeWithImageNamed:fileName];\nsplash.name\
    \ = @\"splashNode\";\nsplash.position = CGPointMake(CGRectGetMidX(self.frame),\
    \ CGRectGetMidY(self.frame));\n[self addChild:splash];\n```\n\nYou first created\
    \ an empty `NSString` that will hold the filename. Then you determined if the\
    \ user has a 3.5-inch screen or 4-inch screen. You checked the height of the view\
    \ instead of the width because, at this point in the application, the device has\
    \ not yet been rotated—almost, but not yet.\n\nOnce you have determined which\
    \ filename to use, you create an `SKSpriteNode` object using the convenience method\
    \ `spriteNodeWithImageNamed`.\n\nYou then set the `name` property to give the\
    \ node a string name that you can use later to reference the node as needed in\
    \ other methods.\n\n## Anchor Points\n\nBy default, a sprite’s frame is centered\
    \ on its position and its position is the center of the graphic/frame. A sprite\
    \ node’s `anchorPoint` property can be modified to move its position to a different\
    \ point on the frame. Figure 2-3 illustrates this point.\n\n**Figure 2-3.** Compare\
    \ two anchor point settings\n\nIn the example shown in Figure 2-3, you can see\
    \ that moving the anchor point makes a big difference when the sprite is rotated,\
    \ as it becomes the point of rotation. However, it can also make a difference\
    \ when handling collisions and contacts, as you’ll see in a later chapter. Notice\
    \ that that the values used for the anchor point are in the unit coordinate system,\
    \ so the bottom-left corner is `(0.0, 0.0)` and the upper-right corner is `(1.0,\
    \ 1.0)`, no matter the size of the sprite.\n\n## Back to the Splash Screen\n\n\
    When you set the position of the new sprite in the scene, you need to keep in\
    \ mind that the anchor point of the sprite by default is `(0.5, 0.5)`, meaning\
    \ the center of the image. Therefore, you want the image to be centered in the\
    \ scene as well. The `position` property expects a `CGPoint`, and you can use\
    \ a couple of convenience methods (`CGRectGetMidX` and `CGRectGetMidY`) to determine\
    \ the center of the X- and Y-axes. For those with sharp eyes, you may have noticed\
    \ that you seem to have reversed the order inside the `CGPointMake` method. You\
    \ did indeed, and this is because the device has not officially rotated into landscape\
    \ mode yet, as you have already determined that you want to have happen. Thus\
    \ at this point in the code, you still need to check the height of the `SKView`\
    \ to determine both the screen size and the position of the sprite, which is drawn\
    \ in landscape orientation.\n\nNow that the sprite has been created and configured,\
    \ it’s time to get it into the scene and draw it, adding it as a child to the\
    \ `SKScene` (as you did in the previous code).\n\nNow if you build and run the\
    \ program, you should see your lovely splash screen.\n\n## Moving Between Scenes\n\
    \nNow you’ll make it so that when the users touch the screen, it doesn’t spawn\
    \ spinning spaceships, but instead takes them to the main game screen (the next\
    \ scene).\n\nLet’s start by removing the code that you won’t need anymore. Remove\
    \ everything inside the for loop of the `touchesBeganWithEvent` method in the\
    \ `SKBMyScene.m` file, so that it will now look like this:"
