    \n## CHAPTER 6: Creating a Cast of Characters\n\n**115**\n\nTo keep from having\
    \ static filenames in the bulk of your code, add a constant to your `SKBAppDelegate.h`\
    \ file:\n\n```objectivec\n#import <UIKit/UIKit.h>\n\n#define kCastOfCharactersFileName\
    \ @\"CastOfCharacters\"\n\n// Global project constants\nstatic const uint32_t\
    \ kPlayerCategory = 0x1 << 0;\n```\n\nOnce you load the data from the file, you\
    \ need to store the resulting data into some instance variables, so you need to\
    \ add some properties to your `SKBGameScene.h` file:\n\n```objectivec\n@property\
    \ (strong, nonatomic) SKBPlayer *playerSprite;\n@property (strong, nonatomic)\
    \ SKBSpriteTextures *spriteTextures;\n@property (strong, nonatomic) NSArray *cast_TypeArray,\
    \ *cast_DelayArray, *cast_StartXindexArray;\n@property int spawnedEnemyCount;\n\
    @property BOOL enemyIsSpawningFlag;\n```\n\nThen you can add the code to read\
    \ the data from disk in the new `loadCastOfCharacters` method in the `SKBGameScene.m`\
    \ file:\n\n```objectivec\n- (void)loadCastOfCharacters\n{\n    // load cast from\
    \ plist file\n    NSString *path = [[NSBundle mainBundle]\n                  \
    \    pathForResource:kCastOfCharactersFileName ofType:@\"plist\"];\n    NSDictionary\
    \ *plistDictionary = [NSDictionary\n                                     dictionaryWithContentsOfFile:path];\n\
    \    if (plistDictionary) {\n        NSLog(@\"Got our data from disk: %@\", plistDictionary);\n\
    \    } else {\n        NSLog(@\"No plist loaded from '%@'\", kCastOfCharactersFileName);\n\
    \    }\n}\n```\n\nBuild and run the program. If no errors occur, you will see\
    \ the console detailing the internal data extracted from the plist file (see Figure\
    \ 6-15). The plist data has no effect on the game thus far, but it is a good time\
    \ to determine if all of your changes and the plist data have been entered correctly\
    \ and are being read as desired. The `if()` statement verifies that the `NSDictionary`\
    \ was created as directed and, if successful, the data will be presented in the\
    \ console. If not, it will display an error message in the console.\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 56](index-118_1.png)\n\n**116** CHAPTER 6: Creating a Cast of Characters\n\
    \n***Figure 6-15.** Data extracted from the plist file into the local dictionary,\
    \ shown in the console*\n\n## Parsing the Data\n\nThe `NSDictionary` contains\
    \ the spawning data, and you will want to parse out the pieces that you need in\
    \ order to accomplish the actual spawning. Because you have several layers of\
    \ data inside this `NSDictionary`, you will do this in stages so that you can\
    \ more easily see and understand why you built the property list file the way\
    \ that you did and how to parse it out so that it becomes usable.\n\nThe root\
    \ dictionary was initially retrieved from the file. Inside this is a single `NSDictionary`\
    \ called `Level`, so let’s begin by parsing that out. Inside the existing `if()`\
