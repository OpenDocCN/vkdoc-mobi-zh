  raw: 'You probably noticed that your sprite is good at moon walking; no matter if
    it is moving left or right, it is always facing right. To rectify this issue,
    you need to add some more textures. However, before you do that, you’ll see how
    to reorganize the code to keep it from getting out of hand.


    Code Reorganization


    Let’s begin the reorganization by moving the texture images into their own folder.
    You will do this purely for organizational purposes. As you add more images to
    the project, it will make your life easier if you add them to a designated folder
    so that they are separated from the code. This keeps the project folder clean
    and streamlined.


    Click once on the Sewer Bros folder, the second item from the top of the Project
    Navigator pane.


    Right-click on the folder and choose New Group or select New ➤ Group from the
    File menu (see Figure [3-2](#index_split_000.html#p36)). This creates a new folder
    inside your project folder. It’s now ready for you to provide a name for it, so
    call it Sprites.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 27](index-36_1.jpg)


    ![Image 28](index-36_2.jpg)


    **32**


    **CHAPTER 3: Sprite Movement Responding to User Inputs**


    ***Figure 3-2.** Selecting a new group*


    Now move both SewerSplash images and the four Player_Right images into this new
    folder. You can delete the Spaceship image by clicking once on it and pressing
    the Delete key.


    If desired, you can move the Sprites folder down below the SKBObject files.


    Now add another folder inside the Sprites folder to hold just the player files.
    You do this by following the same steps when you created the Sprites folder. Use
    the folder name Player for this new folder (see Figure [3-3](#index_split_000.html#p36)).


    ***Figure 3-3.** New folder structure*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 29](index-37_1.jpg)


    **CHAPTER 3: Sprite Movement Responding to User Inputs**


    **33**


    New Class for the Player


    Next you’ll create a separate class for the player and the associated code. This
    will make things easier when you spawn new players after they are “killed.”


    Select New and then File from the File menu to create a new file. Make sure that
    iOS and Cocoa Touch are selected on the left side, select Objective-C class from
    the list of icons, and click the Next button. Click on the drop-down arrow of
    Subclass of and change it to SKSpriteNode. (Rather than scrolling through this
    long list of classes, you can type SK into this drop-down menu. It will then quickly
    jump to the grouping of Sprite Kit classes, and then either continue typing the
    sprite or selecting it from the drop-down list.) Then give the new class the name
    SKBPlayer (see Figure [3-4](#index_split_000.html#p37)).


