    splashNode\"];\nSKNode *startNode = [self childNodeWithName:@\"startNode\"];\n\
    if (splashNode != nil) {\n    splashNode.name = nil;\n    SKAction *zoom = [SKAction\
    \ scaleTo:4.0 duration:1];\n    SKAction *fadeAway = [SKAction fadeOutWithDuration:1];\n\
