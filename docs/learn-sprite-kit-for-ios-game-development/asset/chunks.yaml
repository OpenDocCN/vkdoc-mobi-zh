    \ 方法中，加载并将该属性存储到实例变量中：\n\n```objc\n- (void)spawnedInScene:(SKScene *)whichScene\n\
    {\n    SKBGameScene *theScene = (SKBGameScene *)whichScene;\n    _spriteTextures\
    \ = theScene.spriteTextures;\n    // 音效\n    _spawnSound = [SKAction playSoundFileNamed:kRatzSpawnSoundFileName\
    \ waitForCompletion:NO];\n    [self runAction:_spawnSound];\n    // 设置初始方向并开始移动\n\
    \    if (self.position.x < CGRectGetMidX(whichScene.frame))\n        [self runRight];\n\
    \    else\n        [self runLeft];\n}\n```\n\n构建并运行程序，在奖励金币进入场景时聆听新触发的音效。\n\n\
    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n## 总结\n\n现在你有了一个显示区域和自定义字体，用来展示玩家的得分。你还拥有了多种声音和音效，在游戏逐渐精彩的过程中播放。这款游戏已经摆脱了“平庸”的状态，开始绽放光彩。\n\
    \n然而，你还没有完成！在下一章中，你将开始处理玩家与周围出现的所有敌人和奖励之间的交互。你的玩家将不再能自由漫步而不被那些讨厌的 `Ratz` 骚扰。但另一方面，玩家最终也将能够收集那些金币。那么，让我们开始吧！\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n# 第 8 章：接触与碰撞\n\n## 这部分内容之前不是讲过了吗？\n\
    \n是的，我之前确实已经讲过不少相关内容了。早在第 5 章，我就介绍了接触与碰撞，这样你就可以让 `Ratz` 和金币相互弹开。但这还不够。你需要一种方法，让敌人无法在基础关卡上四处游荡。你需要玩家能够收集金币，并在击晕害虫后将它们踢下\
    \ ledge。\n\n此外，为了增加挑战性，如果英雄撞到当前未昏迷的害虫，就会“死亡”。所有这些新增内容都需要谨慎处理接触与碰撞。\n\n## 接触 vs.\
    \ 碰撞\n\n那么，这两个事件之间到底有什么区别呢？我们可以用一个极度简化的方式来理解：*碰撞* 是在物理世界中处理的，而 *接触* 则是代码中用于逻辑路由碰撞事件的触发器。在本游戏中，你对金币精灵接触到\
    \ ledge 砖块不感兴趣。你希望物理世界为你处理它们，允许金币沿着 ledge 顶部滚动。当金币与相应的 ledge 相互接触时，你不需要应用任何游戏逻辑。\n\
    \n## 格栅\n\n让我们继续，在游戏中为敌人的出现添加一个视觉位置，而不是凭空出现。你将在屏幕两侧、计分显示的正下方放置一些图片。\n\n这些图片代表游戏世界地表层的下水道格栅，这些小动物和金币正是从那里掉落的。\n\
    \n将名为 `Grate.png` 的图片添加到项目中，并将其移动到 `Sprites` 文件夹中。你不需要在头文件中添加任何内容，因为你不会在场景中存储这些图片的本地引用。就像你处理砖块底座一样，你只需创建几个\
    \ `SKSpriteNode` 并将它们作为子节点添加到场景中。这是在 `SKBGameScene.m` 文件的 `createSceneContents`\
    \ 方法中完成的：\n\n```objc\nhowMany = 28;\n[sceneLedge createNewSetOfLedgeNodes:self\n\
    \                      startingPoint:CGPointMake(CGRectGetMaxX(self.frame)-\n\
    \                                                kLedgeSideBufferSpacing-((howMany-1)*kLedgeBrickSpacing),\n\
    \                                                brickBase.position.y+224)\n \
    \                   withHowManyBlocks:howMany\n                       startingIndex:ledgeIndex];\n\
    ledgeIndex = ledgeIndex + howMany;\n\n// 格栅\nSKSpriteNode *grate = [SKSpriteNode\
    \ spriteNodeWithImageNamed:@\"Grate.png\"];\ngrate.name = @\"grate1\";\ngrate.position\
    \ = CGPointMake(30, CGRectGetMaxY(self.frame)-25);\n[self addChild:grate];\n\n\
    grate = [SKSpriteNode spriteNodeWithImageNamed:@\"Grate.png\"];\ngrate.name =\
    \ @\"grate2\";\ngrate.position = CGPointMake(CGRectGetMaxX(self.frame)-30,\n \
    \                            CGRectGetMaxY(self.frame)-25);\n[self addChild:grate];\n\
    \n// 计分\nSKBScores *sceneScores = [[SKBScores alloc] init];\n[sceneScores createScoreNode:self];\n\
    ```\n\n为了让敌人精灵看起来是从这些格栅中掉落的，你需要改变它们的生成位置。这些数据存储在 `SKBGameScene.h` 文件的两个常量中，因此将它们的值修改为以下内容：\n\
    \n```objc\n#import \"SKBRatz.h\"\n#define kEnemySpawnEdgeBufferX 30\n#define kEnemySpawnEdgeBufferY\
    \ 30\n```\n"
- fmt: "# `@interface SKBGameScene : SKScene <SKPhysicsContactDelegate>`\n\nBuild\
    \ and run the program to see the new grates and the enemies spawning in such a\
    \ way as to appear to fall from these grates (see Figure [8-1).](#index_split_002.html#p144)\n\
    \n***Figure 8-1.** Enemies fall from above through the grates*\n\n## Pipes\n\n\
    At this point, as the enemy sprites wander their way down to the brick base, they\
    \ become stuck at this lower level. You want them to leave this level and reappear\
    \ at the top to start their wandering all over again. To do this, you will add\
    \ some pipes at the bottom level so that they disappear into these pipes and reappear\
    \ from the grates above.\n\nFirst you need to add a new bitmask value to the `SKBAppDelegate.h`\
    \ file. Then you’ll move the constants that determine from where enemy sprites\
    \ spawn in the `SKBGameScene.h` file:\n\n```\n// Global project constants\n\n\
    static const uint32_t kPlayerCategory = 0x1 << 0;\nstatic const uint32_t kBaseCategory\
    \ = 0x1 << 1;\nstatic const uint32_t kWallCategory = 0x1 << 2;\nstatic const uint32_t\
    \ kPipeCategory = 0x1 << 3;\nstatic const uint32_t kLedgeCategory = 0x1 << 4;\n\
    static const uint32_t kCoinCategory = 0x1 << 5;\nstatic const uint32_t kRatzCategory\
    \ = 0x1 << 6;\n\n#define kEnemySpawnEdgeBufferX 30\n#define kEnemySpawnEdgeBufferY\
    \ 30\n\ntypedef enum : uint8_t {\n    SKBEnemyTypeCoin = 0,\n    SKBEnemyTypeRatz\n\
    } SKBEnemyTypes;\n```\n\nBe sure to remove or comment out the `kEnemySpawnEdgeBufferX`\
    \ and `kEnemySpawnEdgeBufferY` constants in the `SKBGameScene.h` file.\n\nAs mentioned,\
    \ the exact order of the bitmask values doesn’t matter here. They just have to\
    \ be unique values. Where the order does matter is in the `didBeginContact` method,\
    \ as this determines the order of the `firstBody` and `secondBody` nodes. But\
    \ alas, we’re getting a bit ahead of ourselves.\n\nAdd the two images prefixed\
    \ with `PipeLwr` and move them into the `Sprites` folder. As you just did with\
    \ the two grates, add them to the `createSceneContents` method of the `SKBGameScene.m`\
    \ file:\n\n```\ngrate.name = @\"grate2\";\ngrate.position = CGPointMake(CGRectGetMaxX(self.frame)-30,\n\
    \                             CGRectGetMaxY(self.frame)-25);\n[self addChild:grate];\n\
    \n// Pipes\nSKSpriteNode *pipe = [SKSpriteNode spriteNodeWithImageNamed:@\"PipeLwrLeft.png\"\
    ];\npipe.name = @\"pipeLeft\";\npipe.position = CGPointMake(9, 25);\npipe.physicsBody\
    \ = [SKPhysicsBody bodyWithRectangleOfSize:pipe.size];\npipe.physicsBody.categoryBitMask\
    \ = kPipeCategory;\npipe.physicsBody.dynamic = NO;\n[self addChild:pipe];\n\n\
    pipe = [SKSpriteNode spriteNodeWithImageNamed:@\"PipeLwrRight.png\"];\npipe.name\
    \ = @\"pipeRight\";\npipe.position = CGPointMake(CGRectGetMaxX(self.frame)-9,\
    \ 25);\npipe.physicsBody = [SKPhysicsBody bodyWithRectangleOfSize:pipe.size];\n\
    pipe.physicsBody.categoryBitMask = kPipeCategory;\npipe.physicsBody.dynamic =\
    \ NO;\n[self addChild:pipe];\n\n// Scoring\nSKBScores *sceneScores = [[SKBScores\
    \ alloc] init];\n[sceneScores createScoreNode:self];\n```\n\nIf you build and\
    \ run the program now, you will see the two additional pipes. Nothing interacts\
    \ with them yet (see Figure [8-2). That comes next.](#index_split_002.html#p146)\n\
    \n***Figure 8-2.** Pipes have been added*\n\nNow you need to change the enemy\
    \ initializer methods to let the physics world know that you have interest in\
    \ this new category. Add the category to the `contactTestBitMask` of the `SKBCoin.m`\
    \ file in the `initNewCoin` method:\n\n```\ncoin.physicsBody.categoryBitMask =\
    \ kCoinCategory;\ncoin.physicsBody.contactTestBitMask = kWallCategory | kPipeCategory\
    \ |\n                                      kCoinCategory | kRatzCategory;\ncoin.physicsBody.collisionBitMask\
    \ = kBaseCategory | kWallCategory |\n                                    kLedgeCategory\
    \ | kCoinCategory | kRatzCategory;\n```\n\nDo the same thing to the `initNewRatz`\
    \ method in the `SKBRatz.m` file:\n\n```\nratz.physicsBody.categoryBitMask = kRatzCategory;\n\
    ratz.physicsBody.contactTestBitMask = kWallCategory | kPipeCategory |\n      \
    \                                kCoinCategory | kRatzCategory;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)"
