    ## Setup


    By now, you should have launched Xcode and be wondering where we will ask you
    to start. If you haven’t yet launched Xcode, do so now.


    From the Welcome to Xcode screen, you’ll need to choose Create a New Xcode Project
    or, if you have already opened Xcode so that the Welcome screen is no longer visible,
    choose New Project from the File menu.'
