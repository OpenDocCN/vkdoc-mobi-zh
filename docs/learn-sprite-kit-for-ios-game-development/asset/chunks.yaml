    \n### 可供下载的图像\n\n我已为读者提供了一套完整的图像和源代码，你可以从 Apress 网站下载。这是本书页面的链接：[`www.apress.com/9781430264392`](http://www.apress.com/9781430264392)。\n\
    \n在页面左侧的书目资源部分寻找“Source Code”链接。解压归档文件并将项目文件夹下载到方便的位置。在此文件夹内，你可以浏览到名为“Images”的文件夹，并查找以`SewerSplash`开头的图像文件。\n\
    \n这些是你将要添加到游戏项目中的文件。\n\n在 Xcode 中，从“File”菜单中选择“Add Files to 'Sewer Bros…'”。导航到`SewerSplash_480.png`文件并单击一次以选中它。然后按住\
    \ Shift 键单击第二个名为`SewerSplash_568.png`的文件，同时选中这两个文件。*确保“Destination: Copy Items\
    \ into Destination's Group Folder (if Needed)”被勾选*，然后确保“Add to Targets: Sewer\
    \ Bros”被勾选。单击“Add”按钮（见图 2-2）。\n\n**Figure 2-2.** 向项目添加文件\n\n如果成功，你将看到这些文件被添加到窗口左侧的项目导航器中。\n\
    \n如果你愿意，可以逐个点击它们来查看它们的外观。\n\n### 背景颜色\n\n在这里，你将把背景颜色设为纯黑色。`UIColor`提供了一些便捷方法，让你可以通过颜色名称快速创建常用颜色，而无需尝试确定\
    \ RGB 值。为方便你参考，我将它们列出如下：\n\n```objc\nblackColor; // 0.0 white\ndarkGrayColor;\
    \ // 0.333 white\nlightGrayColor; // 0.667 white\nwhiteColor; // 1.0 white\ngrayColor;\
    \ // 0.5 white\nredColor; // 1.0, 0.0, 0.0 RGB\ngreenColor; // 0.0, 1.0, 0.0 RGB\n\
    blueColor; // 0.0, 0.0, 1.0 RGB\ncyanColor; // 0.0, 1.0, 1.0 RGB\nyellowColor;\
