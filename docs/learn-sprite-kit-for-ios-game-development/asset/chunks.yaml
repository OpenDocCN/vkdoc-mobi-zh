    edge and character SpriteNode, so that they will handle each other’s contact events.
    Using a bitmask, you can set every SpriteNode to allow or handle contacts and/or
    collisions with each other. You will want some sprites to “pass through” other
    sprites (no contact or collision) and some to collide with each other.


