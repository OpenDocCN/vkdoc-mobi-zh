    [self runAction:sequence completion:^{\n    NSLog(@\"滑行结束，仍然面向左侧\");\n    _playerStatus\
    \ = SBPlayerFacingLeft;\n}];\n```\n\n`runAction:completion:` 方法与 `runAction:`\
    \ 方法相同，区别在于动作完成后，你的回调代码块（block）会被调用。只有当动作顺利执行完毕时，这个回调才会被触发。如果动作在完成之前被移除，则完成处理程序永远不会被调用。因此，当序列按流程执行完毕且精灵静止时，回调代码块会向控制台发送一条消息，并相应更改状态。\n\
    \n你最后一步修改是在 `SKBGameScene.m` 文件中。（有几行代码已被删除，因此请修改 `touchesBeganWithEvent` 方法以匹配以下内容。）\n\
    \n```objc\nif (!_playerSprite) {\n    _playerSprite = [SKBPlayer initNewPlayer:self\
    \ startingPoint:location];\n} else if (location.x <= ( self.frame.size.width /\
    \ 2 )) {\n    // 用户触摸了屏幕左侧\n    if (_playerSprite.playerStatus == SBPlayerRunningRight)\
    \ {\n        [_playerSprite skidRight];\n    } else if (_playerSprite.playerStatus\
    \ != SBPlayerRunningLeft) {\n        [_playerSprite runLeft];\n    }\n} else {\n\
    \    // 用户触摸了屏幕右侧\n    if (_playerSprite.playerStatus == SBPlayerRunningLeft)\
    \ {\n        [_playerSprite skidLeft];\n    } else if (_playerSprite.playerStatus\
    \ != SBPlayerRunningRight) {\n        [_playerSprite runRight];\n    }\n}\n```\n\
    \n现在，当你编译并运行程序时，精灵将对用户的输入做出流畅的反应。\n\n在停止过程中，精灵会滑行一小段距离。一切正开始初具雏形。\n\n---\n\n##\
    \ 总结\n\n本章介绍了如何处理用户输入以产生期望反应的一些思路。用户需要能做些什么，而不仅仅是观看预设好的动画序列——毕竟这不是电影。在这个例子中，你让用户控制了一个奔跑角色（或精灵）的动作。\n\
    \n在此过程中，你学到了一些组织不断增长代码库的方法。你创建了一些自定义类来保存重要数据，并尝试消除那些你以后可能想要更改的硬编码静态值。\n\n最终的结果是，你有了一个出现在屏幕上的游戏角色，当用户触摸屏幕时，它会响应用户的控制输入并在屏幕上四处奔跑。嗯，至少是来回移动。\n\
    \n下一章，我将向你介绍 Sprite Kit 自带的强大物理引擎。你将学习这个引擎如何让你轻松地与其他对象交互，比如添加“地面”，让你的角色有坚实的平面来奔跑。你还会添加一些浮动的平台，并赋予精灵跳跃的能力，使其能够到达那些平台。开始吧！\n\
    \n---\n\n## 第四章：边缘、边界和平台\n\n### 物理效果\n\n你可以想象，为了添加能够相互交互以及与游戏世界交互的复杂精灵，需要编写大量代码。在这款游戏中，你会希望诸如重力之类的基本物理原理能够影响你添加到游戏中的每个角色。你还会希望你的精灵有墙壁或平台可以沿着奔跑。然而，处理所有这些基于物理的交互所需的编码是令人望而生畏的。幸运的是，Sprite\
    \ Kit 自带了一个内建的物理世界。\n\n让我们从你的精灵及其世界开始探索这个功能。\n\n在 `SKBPlayer.m` 文件的 `initNewPlayer`\
    \ 方法中添加一行代码：\n\n```objc\nplayer.position = location;\nplayer.spriteTextures =\
    \ playerTextures;\n\n// 物理效果\nplayer.physicsBody = [SKPhysicsBody bodyWithRectangleOfSize:player.size];\n\
    \n// 将精灵添加到场景中\n```\n\n编译并运行。当点击屏幕添加精灵时，你可能想选择一个靠近屏幕顶部的位置。然后退出并再次运行。它不会在屏幕上停留太久！\n\
    \n那么这里发生了什么？又是为什么？原因是你已将 Sprite Kit 物理引擎应用到了游戏中，而物理世界是存在重力的。因此，精灵“凭空出现”后便立即开始下落。正如你之前所学，当精灵跑动或掉落超出屏幕边界时，它就会消失，这可以从屏幕上显示的节点数看出来。\n\
    \n```objc\nplayer.physicsBody = [SKPhysicsBody bodyWithRectangleOfSize:player.size];\n\
    ```\n\n为像精灵这样的基于体积的节点创建 `SKPhysicsBody` 时，你有三个选项：`bodyWithRectangleOfSize`、`bodyWithCircleOfRadius`\
    \ 和 `bodyWithPolygonFromPath`。你需要选择与你精灵的基本大小和形状最匹配的选项。对于像这样较小的精灵，圆形或矩形选项会更容易使用。\n\
    \n现在创建另一个 `SKPhysicsBody` 并将其应用到你的场景中。像这样修改 `SKBGameScene.m` 文件中的 `initWithSize`\
    \ 方法：\n\n```objc\n-(id)initWithSize:(CGSize)size {\n    if (self = [super initWithSize:size])\
    \ {\n        /* 在此处设置你的场景 */\n        self.backgroundColor = [SKColor blackColor];\n\
    \        self.physicsBody = [SKPhysicsBody bodyWithEdgeLoopFromRect:self.frame];\n\
    \    }\n    return self;\n}\n```\n\n为像场景边界这样的基于边缘的节点创建 `SKPhysicsBody` 时，你有四个选项：`bodyWithEdgeLoopFromRect`、`bodyWithEdgeFromPoint:toPoint`、`bodyWithEdgeLoopFromPath`\
    \ 和 `bodyWithEdgeChainFromPath`。同样，本例使用了更简单的矩形变体，在游戏屏幕（即场景）的四周创建了一条边缘。\n\n编译并运行。这次，精灵无法跑出或掉落出边界了。仅用两行代码，你就极大地改变了游戏！\n\
    \n### 物理体的属性\n"
- fmt: "There are several properties you can mess around with for every `SKPhysicsBody`\
    \ that you have associated with your sprites or `SKNodes`. Real world attributes\
    \ like `mass`, `density`, `friction`, `linearDamping`, and others are included\
    \ and available to change however you see fit. You can, of course, explore the\
    \ Xcode documentation for full details, but let’s tweak a few to see how and what\
    \ happens.\n\nAdd these three lines to the `initNewPlayer` method inside of the\
    \ `SKBPlayer.m` file:\n\n```objc\n// physics\nplayer.physicsBody = [SKPhysicsBody\
    \ bodyWithRectangleOfSize:player.size];\nplayer.physicsBody.density = 0.1;\nplayer.physicsBody.linearDamping\
    \ = 1.0;\nplayer.physicsBody.restitution = 1.0;\n```\n\nBuild and run. Your little\
    \ sprite becomes light as a feather and as springy as a superball. Play with these\
    \ values; just keep in mind that these properties expect values between `0.0`\
    \ and `1.0`. When you’re finished, just change them back to defaults:\n\n```objc\n\
    // physics\nplayer.physicsBody = [SKPhysicsBody bodyWithRectangleOfSize:player.size];\n\
    player.physicsBody.density = 1.0;\nplayer.physicsBody.linearDamping = 0.1;\nplayer.physicsBody.restitution\
    \ = 0.2;\n```\n\n## Adding a Backdrop\n\nSince the sprite has started to run around\
    \ a much more realistic world than it experienced previously, you should probably\
    \ add some scenery to its environment. It’s not floating around in space shooting\
    \ down aliens or asteroids; instead it is running around underground in the sewers.\
    \ Let’s add a background image to reflect this.\n\nAs you’ve done many times before,\
    \ add the two images named `Backdrop_568.png` and `Backdrop_480.png` to your project\
    \ and move them into your `Sprites` folder.\n\nNow modify the `initWithSize` method\
    \ in the `SKBGameScene.m` file like this:\n\n```objc\nself.backgroundColor = [SKColor\
    \ blackColor];\nself.physicsBody = [SKPhysicsBody bodyWithEdgeLoopFromRect:self.frame];\n\
    NSString *fileName = @\"\";\nif (self.frame.size.width == 480) {\n    fileName\
    \ = @\"Backdrop_480\"; // iPhone Retina (3.5-inch)\n} else {\n    fileName = @\"\
    Backdrop_568\"; // iPhone Retina (4-inch)\n}\nSKSpriteNode *backdrop = [SKSpriteNode\
    \ spriteNodeWithImageNamed:fileName];\nbackdrop.name = @\"backdropNode\";\nbackdrop.position\
    \ = CGPointMake(CGRectGetMidX(self.frame), CGRectGetMidY(self.frame));\n[self\
    \ addChild:backdrop];\n```\n\nBuild and run to see this new game world.\n\n##\
    \ Contacts and Collisions\n\nOne of the features you’ll add to this game is the\
    \ ability to wrap around both the left and right sides of the screen. This gives\
    \ it an old-style video game feel and makes the game world feel bigger than it\
    \ really is. In other words, when the sprite runs to the left and eventually runs\
    \ into the left-side wall, you’ll wrap it around immediately, so that it instantly\
    \ reappears on the right side of the screen as if it were continuously running\
    \ without restrictions.\n\nIn order to do this, you need to set up the `physicsBody`\
    \ attributes of both the edge and character `SpriteNode`, so that they will handle\
    \ each other’s contact events. Using a bitmask, you can set every `SpriteNode`\
    \ to allow or handle contacts and/or collisions with each other. You will want\
    \ some sprites to “pass through” other sprites (no contact or collision) and some\
    \ to collide with each other.\n\nYou’ll begin by creating some constants for bitmasking.\
    \ Since they need to be available to several classes, you’ll add them to the `AppDelegate`.\
    \ Add these three lines to the `SKBAppDelegate.h` file:\n\n```objc\n#import <UIKit/UIKit.h>\n\
    \n// Global project constants\nstatic const uint32_t kPlayerCategory = 0x1 <<\
    \ 0;\nstatic const uint32_t kWallCategory = 0x1 << 1;\n\n@interface SKBAppDelegate\
    \ : UIResponder <UIApplicationDelegate>\n```\n\nTwo of the existing classes (`SKBGameScene`\
    \ and `SKBPlayer`) need access to these constants, so you need to be sure that\
    \ they have access to the `AppDelegate`. Therefore, add this line of code to the\
    \ `SKBGameScene.h` file:\n\n```objc\n#import <SpriteKit/SpriteKit.h>\n#import\
    \ \"SKBAppDelegate.h\"\n#import \"SKBPlayer.h\"\n```\n\nAnd add the same line\
    \ of code to the `SKBPlayer.h` file:\n\n```objc\n#import <SpriteKit/SpriteKit.h>\n\
    #import \"SKBAppDelegate.h\"\n#import \"SKBSpriteTextures.h\"\n```\n\nNow you\
    \ add contact attributes to your player in the `SKBPlayer.m` file:\n\n```objc\n\
    // physics\nplayer.physicsBody = [SKPhysicsBody bodyWithRectangleOfSize:player.size];\n\
    player.physicsBody.categoryBitMask = kPlayerCategory;\nplayer.physicsBody.contactTestBitMask\
    \ = kWallCategory;\nplayer.physicsBody.density = 1.0;\nplayer.physicsBody.linearDamping\
    \ = 0.1;\nplayer.physicsBody.restitution = 0.2;\n```\n\nThe `categoryBitMask`\
    \ tells the Physics engine that this node is of this type `kPlayerCategory`. The\
    \ `contactTestBitMask` tells the Physics engine that this node can make contact\
    \ with the provided types of nodes. Any node types not listed in the `contactTestBitMask`\
    \ will be ignored. Even though you have provided only one type of node here in\
    \ the `contactTestBitMask`, you can pass in any number of node types with which\
    \ you want the engine to be concerned (using the pipe `|` character as a delimiter).\
    \ You will add more later.\n\nIn order to process contacts and collisions, you\
    \ need a delegate to handle them. You’ll designate the `SKBGameScene` to have\
    \ the honors. Add the `SKPhysicsContactDelegate` protocol to the `SKBGameScene.h`\
    \ file:\n\n```objc\n@interface SKBGameScene : SKScene <SKPhysicsContactDelegate>\n\
    ```\n\nNow you add a `categoryBitMask` attribute to the edge and set the `contactDelegate`\
    \ to `SKBGameScene` in the `initWithSize` method of the `SKBGameScene.m` file:\n\
    \n```objc\nself.backgroundColor = [SKColor blackColor];\nself.physicsBody = [SKPhysicsBody\
    \ bodyWithEdgeLoopFromRect:self.frame];\nself.physicsBody.categoryBitMask = kWallCategory;\n\
    self.physicsWorld.contactDelegate = self;\n```\n\nThen you can add the delegate\
    \ method `didBeginContact` to handle the contacts and collisions (add it to the\
    \ `SKBGameScene.m` file):\n\n```objc\n- (void)didBeginContact:(SKPhysicsContact\
    \ *)contact\n{\n    SKPhysicsBody *firstBody, *secondBody;\n    if (contact.bodyA.categoryBitMask\
    \ < contact.bodyB.categoryBitMask)\n    {\n        firstBody = contact.bodyA;\n\
    \        secondBody = contact.bodyB;\n    }\n    else {\n        firstBody = contact.bodyB;\n\
    \        secondBody = contact.bodyA;\n    }\n\n    // Player / sideWalls\n   \
    \ if ((((firstBody.categoryBitMask & kPlayerCategory) != 0) && ((secondBody.categoryBitMask\
    \ & kWallCategory) != 0)))\n    {\n        NSLog(@\"player contacted edge\");\n\
    \    }\n}\n```\n\nWhen this method is called, it is passed an `SKPhysicsContact`\
    \ object, which describes the particulars. There are four properties available\
    \ for use: `bodyA`, `bodyB`, `contactPoint`, and `collisionImpulse`. For now,\
    \ you are not much interested in the exact position (or point) of contact or how\
    \ hard they struck each other, but you are interested in determining which two\
    \ sprites were involved so that you can act accordingly.\n\nThe first `if()` statement\
    \ used here makes the order that you used in your category constant declarations\
    \ (`kPlayerCategory` and `kWallCategory`) determine the order of the variables\
    \ `firstBody` and `secondBody`. In other words, if the player sprite contacts\
    \ a wall, the player sprite will always be set as `firstBody` and the wall will\
    \ always be set as `secondBody`. They will never be reversed. This makes it so\
    \ that you can use a lot fewer `if()` statements as you go along, checking on\
    \ which sprite contacted which other sprite.\n\nThe second `if()` statement checks\
    \ to see if `firstBody` is the player and `secondBody` is the wall. If so, you’ll\
    \ post a console message.\n\nBuild and run. Watch the console as you try various\
    \ inputs to see when this contact is triggered.\n\n## Adding a Brick Base"
