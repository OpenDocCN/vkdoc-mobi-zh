    You first created an empty NSString that will hold the filename. Then you determined
    if the user has a 3.5-inch screen or 4-inch screen. You checked the height of
    the view instead of the width because, at this point in the application, the device
    has not yet been rotated—almost, but not yet.


    Once you have determined which filename to use, you create an SKSpriteNode object
    using the convenience method spriteNodeWithImageNamed.


    You then set the name property to give the node a string name that you can use
    later to reference the node as needed in other methods.


    Anchor Points


    By default, a sprite’s frame is centered on its position and its position is the
    center of the graphic/frame. A sprite node’s anchorPoint property can be modified
    to move its position to a different point on the frame. Figure [2-3](#index_split_000.html#p24)
    illustrates this point.


    ***Figure 2-3.** Compare two anchor point settings*


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **20**


    **CHAPTER 2: SKActions and SKTextures: Your First Animated Sprite** In the example
    shown in Figure [2-3](#index_split_000.html#p24), you can see that moving the
    anchor point makes a big difference when the sprite is rotated, as it becomes
    the point of rotation. However, it can also make a difference when handling collisions
    and contacts, as you’ll see in a later chapter. Notice that that the values used
    for the anchor point are in the unit coordinate system, so the bottom-left corner
    is (0.0, 0.0) and the upper-right corner is (1.0, 1.0), no matter the size of
    the sprite.


    Back to the Splash Screen


    When you set the position of the new sprite in the scene, you need to keep in
    mind that the anchor point of the sprite by default is (0.5, 0.5), meaning the
    center of the image. Therefore, you want the image to be centered in the scene
    as well. The position property expects a CGPoint, and you can use a couple of
    convenience methods (CGRectGetMidX and CGRectGetMidY) to determine the center
    of the X- and Y-axes. For those with sharp eyes, you may have noticed that you
    seem to have reversed the order inside the CGPointMake method. You did indeed,
    and this is because the device has not officially rotated into landscape mode
    yet, as you have already determined that you want to have happen. Thus at this
    point in the code, you still need to check the height of the SKView to determine
    both the screen size and the position of the sprite, which is drawn in landscape
    orientation.


    Now that the sprite has been created and configured, it’s time to get it into
    the scene and draw it, adding it as a child to the SKScene (as you did in the
    previous code).


    Now if you build and run the program, you should see your lovely splash screen.


    Moving Between Scenes


    Now you’ll make it so that when the users touch the screen, it doesn’t spawn spinning
    spaceships, but instead takes them to the main game screen (the next scene).


    Let’s start by removing the code that you won’t need anymore. Remove everything
    inside the for loop of the touchesBeganWithEvent method in the SKBMyScene.m file,
    so that it will now look like this:'
  trans: "\n# SKActions 与 SKTextures：你的第一个动画精灵\n\n你的项目中已经包含了用于启动画面的图像，现在需要将其添加到屏幕上。在刚刚添加的\
    \ `self.backgroundColor` 代码行之后，立即添加以下代码：\n\n```objective-c\n/* 在此处设置你的场景 */\n\n\
    self.backgroundColor = [SKColor blackColor];\n```\n\n```objective-c\nNSString\
    \ *fileName = @\"\";\nif (self.frame.size.width == 480) {\n    fileName = @\"\
    SewerSplash_480\";\n    // iPhone Retina (3.5 英寸)\n} else {\n    fileName = @\"\
    SewerSplash_568\";\n    // iPhone Retina (4 英寸)\n}\n\nSKSpriteNode *splash = [SKSpriteNode\
    \ spriteNodeWithImageNamed:fileName];\nsplash.name = @\"splashNode\";\nsplash.position\
    \ = CGPointMake(CGRectGetMidX(self.frame), CGRectGetMidY(self.frame));\n[self\
    \ addChild:splash];\n```\n\n首先创建了一个空的 `NSString` 用于保存文件名。然后判断用户使用的是 3.5 英寸屏幕还是\
    \ 4 英寸屏幕。这里检查的是视图的高度而非宽度，因为在应用程序的这个阶段，设备尚未完成旋转——几乎旋转了，但尚未完成。\n\n确定要使用的文件名后，通过便捷方法\
    \ `spriteNodeWithImageNamed` 创建了一个 `SKSpriteNode` 对象。\n\n接着，设置 `name` 属性为节点赋予一个字符串名称，以便后续在其他方法中按需引用该节点。\n\
    \n## 锚点\n\n默认情况下，精灵的帧以其位置为中心，且该位置就是图形/帧的中心点。通过修改精灵节点的 `anchorPoint` 属性，可以将其位置移动到帧上的其他点。图\
    \ 2-3 说明了这一点。\n\n**图 2-3.** 对比两种锚点设置\n\n在图 2-3 的示例中，可以看到当精灵旋转时，移动锚点会带来显著差异，因为它成为了旋转的中心点。然而，在处理碰撞和接触时，锚点同样会产生影响，这一点将在后续章节中看到。请注意，锚点使用的值是单位坐标系中的数值，因此无论精灵尺寸如何，左下角都是\
    \ `(0.0, 0.0)`，右上角都是 `(1.0, 1.0)`。\n\n## 回到启动画面\n\n在场景中设置新精灵的位置时，需要牢记精灵的锚点默认是\
    \ `(0.5, 0.5)`，即图像的中心。因此，你也希望图像在场景中居中显示。`position` 属性需要 `CGPoint` 值，你可以使用两个便捷方法（`CGRectGetMidX`\
    \ 和 `CGRectGetMidY`）来确定 X 轴和 Y 轴的中心点。眼尖的读者可能已经注意到，你在 `CGPointMake` 方法中似乎颠倒了顺序。确实如此，这是因为设备尚未正式旋转为横屏模式，而你已经确定要实现横屏效果。因此，在这段代码中，你仍然需要检查\
    \ `SKView` 的高度，以确定屏幕尺寸和精灵的位置（而精灵是以横屏方向绘制的）。\n\n现在，精灵已经创建并配置完毕，是时候将其放入场景并进行绘制了——将它作为子节点添加到\
    \ `SKScene` 中（如前面代码所示）。\n\n如果你现在构建并运行程序，应该能看到漂亮的启动画面。\n\n## 场景切换\n\n接下来，你将实现这样一个功能：当用户触摸屏幕时，不会生成旋转的宇宙飞船，而是将他们带到主游戏画面（下一个场景）。\n\
    \n首先，删除不再需要的代码。删除 `SKBMyScene.m` 文件中 `touchesBeganWithEvent` 方法内 for 循环的所有内容，使其变成这样：\n"
- fmt: "# 文档排版\n\n`-(void)touchesBegan:(NSSet *)touches withEvent:(UIEvent *)event`\
    \ {\n\n`/* Called when a touch begins */`\n\n`for (UITouch *touch in touches)\
    \ {`\n\n`}`\n\n`}`\n\n重命名此`SKScene`对象，使其在项目中更具描述性。在`SKBMyScene.m`文件中，靠近顶部位置，双击`SKBMyScene`（位于`@implementation`之后）。然后右键单击它以打开子菜单，向下滚动到`Refactor`并选择`Rename`（或从`Edit`菜单中选择`Refactor`，然后选择`Rename`）。显示`Rename`表单后，您可以将名称更改为更具描述性的内容，例如`SKBSplashScene`（参见图[2-4](#index_split_000.html#p26)）。确保选中`Rename\
    \ Related Files`，然后单击`Preview`按钮。根据需要检查更改，然后单击`Save`按钮。\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 24](index-26_1.jpg)\n\n**CHAPTER 2: SKActions and SKTextures: Your First\
