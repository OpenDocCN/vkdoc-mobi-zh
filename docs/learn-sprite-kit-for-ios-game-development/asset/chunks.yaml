    and set it to NO. This is so that it will not be affected by gravity and will
    not budge when the character collides with it when falling; it becomes an immoveable
    object.


    Build and run it to see how this image becomes a solid surface for the player
    to run along (see Figure [4-1](#index_split_000.html#p59)).


