  trans: "\n`nextPlayerStatus = SBPlayerFacingRight;`\n\n这段代码处理从静止状态向右侧方向跳跃的情况，你刚才已为左侧方向完成了相同功能的实现。\n\
    \n```\nelse {\n  NSLog(@\"SKBPlayer::jump encountered invalid value...\");\n}\n\
    ```\n\n这一行并非绝对必要，但如果你遗漏了某些编程逻辑，它可以帮助你之后调试潜在问题。像这样添加额外的代码行，可以让你不必回头翻查代码来找出奇怪或意外结果的原因，从而节省时间。\n\
    \n```\n// 适用的动画\nSKAction *jumpAnimation = [SKAction animateWithTextures:playerJumpTextures\
    \ timePerFrame:1];\nSKAction *jumpAwhile = [SKAction repeatAction:jumpAnimation\
    \ count:1.0];\n```\n\n这段代码创建了精灵跳跃时使用的跳跃动画纹理。此动画帧会持续一整秒，然后才切换到其他动画。代码中没有回调来指示冲量已完成并且精灵已落回地面。因此，这种基于时间的动作允许你大致确定在运行另一组动作之前，为跳跃预留的固定时间量。\n\
    \n```\n// 运行跳跃动作，完成后处理下一阶段\n[self runAction:jumpAwhile completion:^{\n```\n\n\
    这段代码启动了动画并设置了一秒的跳跃动画等待期，尽管你尚未触发跳跃冲量，使精灵开始向屏幕顶部腾空而起。\n\n注意这里使用了 `SKAction runAction`\
    \ 方法的完成块选项，它可以让你在该动作完成时执行一些代码。\n\n```\nif (nextPlayerStatus == SBPlayerRunningLeft)\
    \ {\n  [self removeAllActions];\n  [self runLeft];\n} else if (nextPlayerStatus\
    \ == SBPlayerRunningRight) {\n  [self removeAllActions];\n  [self runRight];\n\
    ```\n\n这个 `if()` 块检查你设置的、在跳跃完成时应用的下一状态的值；这两个表达式分别测试向左或向右跑。如果精灵应该跑步，它会移除所有先前的动作，并将精灵设置为向相应方向跑动。（如果你没有调用\
    \ `removeAllActions` 方法，并且在调用另一个 `runLeft` 或 `runRight` 方法时精灵已经在跑步，其速度会加倍。）\n\n\
    [www.it-ebooks.info](http://www.it-ebooks.info/)\n\n**第 4 章：边缘、边界和岩架**\n\n**65**\n\
    \n```\nelse if (nextPlayerStatus == SBPlayerFacingLeft) {\n  NSArray *playerStillTextures\
    \ = _spriteTextures.playerStillFacingLeftTextures;\n  SKAction *stillAnimation\
    \ = [SKAction animateWithTextures:playerStillTextures timePerFrame:1];\n  SKAction\
    \ *stillAwhile = [SKAction repeatAction:stillAnimation count:0.1];\n  [self runAction:stillAwhile];\n\
    \  self.playerStatus = SBPlayerFacingLeft;\n} else if (nextPlayerStatus == SBPlayerFacingRight)\
    \ {\n  NSArray *playerStillTextures = _spriteTextures.playerStillFacingRightTextures;\n\
    \  SKAction *stillAnimation = [SKAction animateWithTextures:playerStillTextures\
    \ timePerFrame:1];\n  SKAction *stillAwhile = [SKAction repeatAction:stillAnimation\
    \ count:0.1];\n  [self runAction:stillAwhile];\n  self.playerStatus = SBPlayerFacingRight;\n\
    ```\n\n这两个表达式处理完成跑步后的静止状态。它们的工作方式类似，只是根据向左或向右的方向略有不同。它们创建静止纹理数组，将这些数组附加到一个 `SKAction`\
    \ 上以显示一段时间（在新动作被触发前保持静止），然后设置相应的玩家状态。\n\n```\nelse {\n  NSLog(@\"SKBPlayer::jump\
    \ completion block encountered invalid value...\");\n}\n```\n\n同样，这一行并非绝对必要，但如果你遗漏了某些编程逻辑，它可以帮助你之后调试潜在问题。\n\
    \n```\n// 应用跳跃冲量\n[self.physicsBody applyImpulse:CGVectorMake(0, kPlayerJumpingIncrement)];\n\
    ```\n\n最后，你执行冲量，让精灵腾空而起。\n\n编译并运行。你会看到精灵的跳跃能力已具备所需特性，并且你已修复了之前提到的那些小问题。虽然代码改动很多，但希望现在一切看起来都合情合理。\n\
    \n为了更规整，你将修复精灵的起始纹理和状态，使其在创建时面朝右侧并带有正确的属性。修改 `SKBPlayer.m` 文件中的 `initNewPlayer`\
    \ 方法：\n\n```\n// 初始帧\nSKTexture *f1 = [SKTexture textureWithImageNamed:kPlayerStillRightFileName];\n\
    \n// 我们的玩家角色精灵及在场景中的起始位置\nSKBPlayer *player = [SKBPlayer spriteNodeWithTexture:f1];\n\
    player.name = @\"player1\";\nplayer.position = location;\nplayer.spriteTextures\
    \ = playerTextures;\nplayer.playerStatus = SBPlayerFacingRight;\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 34](img/index-70_1.jpg)\n\n**66** **第 4 章：边缘、边界和岩架**\n\n## 岩架与连接\n\n\
    到目前为止，玩家可以沿着砖砌基座奔跑，到达边缘时绕到屏幕另一侧，还能以惊人的肌肉力量跳跃。为了更刺激，精灵还需要一些与场景互动的元素。为此，你将在精灵上方增加几层供其奔跑的平台。这也会为后续添加敌人时提供一个跑道。\n\
    \n你不会为地下污水管道环境创建实心岩架，而是创建一些由连接件组合起来的灵活方块，完工后它们将在数字世界中相当于绳索桥。这将帮助你很好地理解 Sprite\
    \ Kit 的 `SKPhysicsJoint` 功能，它允许你将不同的 `PhysicsBodies` 连接在一起，使它们在物理世界中共同模拟。\n\n\
    连接物体时，有五种关节类型可供使用：`SKPhysicsJointFixed`、`SKPhysicsJointSliding`、`SKPhysicsJointSpring`、`SKPhysicsJointLimit`\
    \ 和 `SKPhysicsJointPin`。你将使用 `SKPhysicsJointPin` 类型来创建岩架，这样它们可以在单个锚点处连接，就像被钉在一起一样（见图\
    \ 4-3）。\n\n***图 4-3.** 四个 **SKSpriteNode** 之间的三个 **SKPhysicsJointPin** 连接*\n\n\
    你将创建由许多单独方块组成的多个岩架，因此需要单独创建一个类来处理所有细节。\n\n和之前几次一样，继续创建一个名为 `SKBLedge` 的新类，作为 `NSObject`\
    \ 的子类。修改 `SKBLedge.h` 文件，使其内容如下：\n\n```\n#import <Foundation/Foundation.h>\n#import\
    \ <SpriteKit/SpriteKit.h>\n#import \"SKBAppDelegate.h\"\n\n#define kLedgeBrickFileName\
    \ @\"LedgeBrick.png\"\n#define kLedgeBrickSpacing 9\n#define kLedgeSideBufferSpacing\
    \ 4\n\n@interface SKBLedge : NSObject\n\n- (void)createNewSetOfLedgeNodes:(SKScene\
    \ *)whichScene startingPoint:(CGPoint)leftSide withHowManyBlocks:(int)blockCount\
    \ startingIndex:(int)indexStart;\n\n@end\n```\n\n将 `LedgeBrick.png` 添加到项目中，并将其移动到\
