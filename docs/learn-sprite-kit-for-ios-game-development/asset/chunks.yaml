  trans: "\n\n你沿水平轴或 X 轴（`position.x`）检测精灵的位置，以判断它当前位于屏幕的左侧还是右侧。这段代码将其 x 坐标与一个小于 100\
    \ 的值进行了比较，但你也可以使用 50、200 甚至 300。它不会再触发屏幕底部的边缘接触，因为精灵正沿着砖块底座运行，从而避免与底座接触。因此，通过它接触到边缘的事实，你可以推断出其`position.x`值将会相当大或相当小。\n\
    \n编译并运行以查看变化。控制台应能准确响应适用的左边缘和右边缘接触。\n\n## 处理精灵环绕\n\n现在你可以添加环绕处理程序，使你的精灵能够从屏幕的两侧边缘环绕到另一侧。为了当前及未来的便利，你将使用`SKNode`的`name`属性来保存一个唯一字符串，用于在各种方法中标识受影响的节点。因此，在你的`SKBPlayer.m`文件的`initNewPlayer`方法中添加以下代码：\n\
    \n```\n// 我们的玩家角色精灵及场景中的起始位置\nSKBPlayer *player = [SKBPlayer spriteNodeWithTexture:f1];\n\
    player.name = @\"player1\";\nplayer.position = location;\nplayer.spriteTextures\
    \ = playerTextures;\n```\n\n现在你需要在`initNewPlayer`和`runRight`方法之间插入一个新的`wrapPlayer:where`方法：\n\
    \n```\n#pragma mark 屏幕环绕\n- (void)wrapPlayer:(CGPoint)where\n{\n    SKPhysicsBody\
    \ *storePB = self.physicsBody;\n    self.physicsBody = nil;\n    self.position\
    \ = where;\n    self.physicsBody = storePB;\n}\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n**第 4 章：边缘、边界与壁架** **57**\n\n我先在此暂停，解释这个有趣的方法。在开发这个游戏时，我发现试图简单地改变精灵的位置并不会如预期般生效。不过，我也发现了一种绕过此限制的快速简便方法：从精灵身上移除物理体（将其存储在一个临时变量中），改变位置，然后恢复物理体。查看你刚刚添加的代码，你会发现这正是我所做的。有点狡猾，但它确实能满足需求：即瞬间传送到屏幕上的另一个点。在本节末尾运行游戏时，你将立即看到这一效果。不过，你还需要先做一些其他修改。\n\
    \n继续，你需要将此方法设为公开，以便能从`SKScene`类中调用它。为此，请在`SKBPlayer.h`文件中添加以下代码行：\n\n```\n+ (SKBPlayer\
    \ *)initNewPlayer:(SKScene *)whichScene startingPoint:(CGPoint)location;\n- (void)wrapPlayer:(CGPoint)where;\n\
    - (void)runRight;\n```\n\n现在，转到`SKBGameScene.m`文件中的`didBeginContact`方法，添加一个变量来保存`firstBody`的接触名称：\n\
    \n```\nelse {\n    firstBody = contact.bodyB;\n    secondBody = contact.bodyA;\n\
    }\n// 接触体名称\nNSString *firstBodyName = firstBody.node.name;\n// 玩家 / 底座\n```\n\
    \n然后你可以使用此名称来验证受影响的接触体是否是玩家的精灵，如果是，则调用`wrapPlayer:where`方法来处理实际的环绕：\n\n```\n//\
    \ 玩家 / 侧墙\nif ((((firstBody.categoryBitMask & kPlayerCategory) != 0) && ((secondBody.categoryBitMask\
    \ & kWallCategory) != 0))) {\n    if ([firstBodyName isEqualToString: @\"player1\"\
    ]) {\n        if (_playerSprite.position.x < 20) {\n            NSLog(@\"玩家接触到左边缘\"\
    );\n            [_playerSprite wrapPlayer:CGPointMake(self.frame.size.width-10,\
    \ _playerSprite.position.y)];\n        } else {\n            NSLog(@\"玩家接触到右边缘\"\
    );\n            [_playerSprite wrapPlayer:CGPointMake(10, _playerSprite.position.y)];\n\
    \        }\n    }\n}\n```\n\n你可能会注意到，在计算要传递给`wrapPlayer:where`方法的 x 轴坐标时，你对其进行了加或减\
    \ 10 点的处理。这大约是玩家精灵宽度的一半，这额外的缓冲有助于确保精灵在屏幕另一侧出现时不会触发另一个边缘接触事件。\n\n"
- fmt: "Build and run it to see the new screen wrapping in all its glory!\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 33](index-62_1.jpg)\n\n## CHAPTER 4: Edges, Boundaries, and Ledges\n\
    \n### Jumping\n\nYou will soon add some ledges that your player can jump up on\
    \ and run along. In order to do that, the sprite needs the ability to jump, so\
    \ let’s work on that.\n\nJumping requires an additional input from the user, but\
    \ from where? You already split the screen into two zones for left and right inputs,\
    \ and you need to change this somehow. You’ll split the screen into three areas\
    \ by splitting the bottom half split into left and right zones (see Figure 4-2).\n\
    \n***Figure 4-2.** Three input zones*\n\nYou need to modify the `touchesBegan:withEvent`\
    \ method in the `SKBGameScene.m` file to handle this change:\n\n```\nif (!_playerSprite)\
    \ {\n    _playerSprite = [SKBPlayer initNewPlayer:self startingPoint:location];\n\
    } else if (location.y >= (self.frame.size.height / 2 )) {\n    // user touched\
    \ upper half of the screen (zero = bottom of screen)\n    NSLog(@\"jump\");\n\
    } else if (location.x <= ( self.frame.size.width / 2 )) {\n```\n\nThis triggers\
    \ a jump message to the console when the user touches anywhere on the screen where\
    \ the y-axis position is greater than half the height of the screen (the upper\
    \ half).\n\nNow that the input is handled as desired, you can make the sprite\
    \ launch itself off of the ground.\n\nTo do this, you will use one of the `SKPhysicsWorld`\
    \ methods for applying forces or impulses to a physics body. You have six from\
    \ which to choose: `applyForce`, `applyTorque`, `applyForce:atPoint`, `applyImpulse`,\
    \ `applyAngularImpulse`, and `applyImpulse:atPoint`. Impulses are typically used\
    \ for immediate changes to a body’s velocity, while forces are used for continuous\
    \ effects. According to the Sprite Kit documentation, using `applyImpulse` applies\
    \ an impulse uniformly to a physics body, while using `applyForce:atPoint` applies\
    \ an impulse to a specific point of a physics body. Thus it seems that the best\
    \ choice for a jumping ability is `applyImpulse`.\n\nAdd a static value to the\
    \ `SKBPlayer.h` file:\n\n```\n#define kPlayerSkiddingIncrement 20\n#define kPlayerJumpingIncrement\
    \ 10\n```\n\nIn the same file, you also need a public declaration of the new jump\
    \ method:\n\n```\n- (void)skidRight;\n- (void)skidLeft;\n- (void)jump;\n@end\n\
    ```\n\nThen you can add the new jump method to the `SKBPlayer.m` file, inserting\
    \ it after the existing `skidLeft` method:\n\n```\n- (void)jump\n{\n    NSLog(@\"\
    jump\");\n    [self.physicsBody applyImpulse:CGVectorMake(0, kPlayerJumpingIncrement)];\n\
    }\n```\n\nThen you modify the `touchesBegan:withEvent` method in the `SKBGameScene.m`\
    \ file:\n\n```\n} else if (location.y >= (self.frame.size.height / 2 )) {\n  \
    \  // user touched upper half of the screen (zero = bottom of screen)\n    [_playerSprite\
    \ jump];\n} else if (location.x <= ( self.frame.size.width / 2 )) {\n```\n\nBuild\
    \ and run it to try out the new jumping ability. The sprite has amazing muscles,\
    \ eh? Wow!\n\nAfter playing around with this jumping ability, you will notice\
    \ some small details that need some tuning. You need to change the animation during\
    \ the jump so that the sprite doesn’t continue “running” while airborne, and you\
    \ need to remove its ability to initiate another powerful jump before completing\
    \ the prior one.\n\nYou’re going to use a single frame for the jumping animation,\
    \ so start by adding the `Player_LeftJump.png` and `Player_RightJump.png` images\
    \ to the project; move them into the `Player` folder.\n\nYou then add two instance\
    \ variables to the `SKBSpriteTextures.h` file:\n\n```\n@property (nonatomic, strong)\
    \ NSArray *playerRunRightTextures, *playerJumpRightTextures;\n@property (nonatomic,\
    \ strong) NSArray *playerSkiddingRightTextures, *playerStillFacingRightTextures;\n\
    @property (nonatomic, strong) NSArray *playerRunLeftTextures, *playerJumpLeftTextures;\n\
    ```"
