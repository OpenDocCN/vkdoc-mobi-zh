    You’ll begin by creating some constants for bitmasking. Since they need to be
    available to several classes, you’ll add them to the AppDelegate. Add these three
    lines to the SKBAppDelegate.h file:


    #import <UIKit/UIKit.h>


    **// Global project** constants


    **static const uint32_t kPlayerCategory = 0x1 << 0;** **static const uint32_t
    kWallCategory = 0x1 << 1;**


    @interface SKBAppDelegate : UIResponder <UIApplicationDelegate> Two of the existing
    classes (SKBGameScene and SKBPlayer) need access to these constants, so you need
    to be sure that they have access to the AppDelegate. Therefore, add this line
    of code to the SKBGameScene.h file:


    #import <SpriteKit/SpriteKit.h>


    **#import "SKBAppDelegate.h"**


    #import "SKBPlayer.h"


    And add the same line of code to the SKBPlayer.h file:


    #import <SpriteKit/SpriteKit.h>


    **#import "SKBAppDelegate.h"**


    #import "SKBSpriteTextures.h"


    Now you add contact attributes to your player in the SKBPlayer.m file:


    // physics


    player.physicsBody = [SKPhysicsBody bodyWithRectangleOfSize:player.size]; **player.physicsBody.categoryBitMask
    = kPlayerCategory;**


    **player.physicsBody.contactTestBitMask = kWallCategory;**


    player.physicsBody.density = 1.0;


    player.physicsBody.linearDamping = 0.1;


    player.physicsBody.restitution = 0.2;


    The categoryBitMask tells the Physics engine that this node is of this type kPlayerCategory.
    The contactTestBitMask tells the Physics engine that this node can make contact
    with the provided types of nodes. Any node types not listed in the contactTestBitMask
    will be ignored. Even though you have provided only one type of node here in the
    contactTestBitMask, you can pass in any number of node types with which you want
    the engine to be concerned (using the pipe | character as a delimiter). You will
    add more later.


    In order to process contacts and collisions, you need a delegate to handle them.
    You’ll designate the SKBGameScene to have the honors. Add the SKPhysicsContactDelegate
    protocol to the SKBGameScene.h file:


    @interface SKBGameScene : SKScene **<SKPhysicsContactDelegate>**


