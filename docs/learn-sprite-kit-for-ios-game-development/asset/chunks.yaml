    **引言**


    ## 本书内容


    本书旨在指导你制作自己的 iPhone 游戏。目标是帮助你利用苹果公司提供的新编程框架“Sprite Kit”，从零开始创建一个简单的 2D 游戏。使用 Sprite
    Kit 来创建游戏，你会发现许多通常需要自己编码实现的内容，框架已经为你处理好了。你会惊奇地发现，只需很少的代码就能创建出（精灵）动画角色，这些角色在屏幕上移动时还能相互交互。


    在阅读本书的过程中，你将创建一个相对简单（老式风格）的 iPhone 2D 游戏，允许用户通过手指在触摸屏上控制角色。我们会加入一些敌人，为角色提供特定的挑战，以及一些用户可收集以获取额外分数的奖励物品。为了保持简单，我们不会涉及屏幕滚动的复杂性，而是使用固定屏幕，并添加一些平台，让角色有更多空间跑来跑去，而不仅仅是沿着屏幕底部移动。


    每一章都旨在突出 Sprite Kit 的特定功能和基本的游戏开发概念，这将帮助你理解如何控制或与这些功能和概念进行交互。读完本书后，你将广泛了解 Sprite
    Kit 的全貌，并且在编码之余休息时，你将拥有一款很酷的游戏可以玩，而这款游戏或许就是你即将大卖的作品的前身。


    ## 为何购买本书


    为什么不直接研究苹果为 Sprite Kit 开发者提供的优秀示例游戏“Adventure”呢？因为对于初学者来说，要剖析和理解它可能过于复杂和困难。它更适合经验丰富的游戏开发者使用，以便他们能够利用现有知识，通过新的
    Sprite Kit API（应用程序编程接口）比以前更快、更容易地制作下一款游戏。我认为经验较少的开发者需要更直接的方式来入门 Sprite Kit。


    从简单的开始，一旦你理解了基础，再转向更大、更好的游戏开发。


