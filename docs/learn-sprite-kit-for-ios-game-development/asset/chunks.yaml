- fmt: "This method creates an `SKSpriteNode` using an existing image and calculates\
    \ a starting location using the score display as a point of reference. Then it\
    \ loops through all of the possible life icons that may already be on the screen\
    \ and removes them from the scene. Finally, it loops through the number of lives\
    \ currently remaining and creates an icon, gives it a dynamic name and position,\
    \ changes the scale to 50% of the original, and adds it to the scene. All of this\
    \ should make sense to you, since you’ve done similar things in prior chapters.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 68](index-189_1.jpg)\n\
