    TED TITLES


    With *Learn Sprite Kit for iOS Game Development*, you’ll discover how easy it
    is to create 2D games using the new Sprite Kit framework from Apple. You’ll find
    out how simple it is to create a scene, add animated sprites, incorporate edges,
    play sound effects, and create animated particles for special effects. You’ll
    also use touch events to control your sprites, implement the built-in physics
    engine, handle sprite collisions and contacts, and much more.


    To help you learn how to use all of these cool features of Sprite Kit, you’ll
    follow along as we build a complete 2D game for the iPhone. By the time you finish
    this book, you’ll have made your own 2D game and you’ll have learned all that
    you need to know to get started on your next masterpiece.


    **With *Learn Sprite Kit for iOS Game Development,* you’ll learn how to do the
    following:**


    - Add animated sprites to your game scene

    - Use TouchEvents to have your sprite react to touch input

    - Apply realistic physics to your game scene and characters

    - Handle sprite collisions and contacts with other game elements

    - Enhance game logic for sprite interaction, scoring, levels, and more


    This book is designed for beginning developers who have some understanding of
    object-oriented programming as well as intermediate iOS developers who want to
    get up to speed quickly with Sprite Kit.


