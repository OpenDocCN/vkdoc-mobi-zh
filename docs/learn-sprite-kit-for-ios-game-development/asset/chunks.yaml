    **Introduction**


    ## What This Book Is


    This book serves as a guide to help you make your own iPhone game. The goal is
    to help you create a simple 2D game from scratch using the new programming framework
    provided by Apple called “Sprite Kit.” By using Sprite Kit to create your game,
    you will find that a lot of things that you would normally have to code yourself
    handled for you. You’ll be amazed at how little code it takes to create animated
    characters (sprites) that can interact with each other as they move around the
    screen.


    As you work your way through this book, you will create a fairly simple (old-school
    style) 2D game for the iPhone that allows users to control a character using their
    fingers on the touch screen. We’ll add some bad guys to give the character certain
    challenges and some bonus items that users can collect for extra points. We won’t
    deal with the complexity of screen scrolling (in order to keep it simple) and
    instead will use a stationary screen, adding ledges so that the character can
    have some more space in which to run around, rather than moving only along the
    bottom of the screen.


    Each chapter is designed to highlight specific Sprite Kit features and basic game
    development concepts, which will help you understand how to control or interact
    with those features and concepts. When you’re finished with the book, you will
    have a broad understanding of what Sprite Kit is all about, and you will have
    a cool game to play when you take a break from coding your soon-to-be best-selling
    game.


    ## Why Buy This Book


    Why not just look through the awesome sample game called “Adventure” that Apple
    provides for Sprite Kit developers to explore and examine? Because it can be complex
    and difficult for beginners to dissect and understand. It is meant for more experienced
    game developers to use, so that they can take their existing knowledge and use
    the new Sprite Kit APIs (Application Programming Interface) to make their next
    game quicker and easier than ever before. I believe that less experienced developers
    need something more straightforward as their introduction to Sprite Kit.


    Start simple and move on to bigger and better game development once you understand
    the basics.


    **xix**


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **xx**


    **Introduction**


    ## What You Need to Know


    This book assumes that you have a basic understanding of how to create applications
    for the iPhone using Xcode. You wil not be spending any time learning programming
    styles or skil s. You wil be focusing solely on making a game using Xcode as the
    tool. We assume that you can download, install, and use the latest version of
    Xcode to create an application and run it on the iPhone Simulator.


    ## What You Need to Have


    In terms of hardware, you need an Intel-based Macintosh running Mountain Lion
    (OS X 10.8) or later.


    Regarding software, you need Xcode 5.0 or later, since that is the first version
    to include the Sprite Kit APIs. You can download Xcode from `http://developer.apple.com`.


    ## What’s in This Book


    Here is a brief overview of the chapters in this book:


    - **In Chapter 1**, you’ll start with a template that gives you an intro screen
    and a main game screen that will serve as the foundation for everything else that
    you do with Sprite Kit.


    - **In Chapter 2**, you’ll add some basic physics so that your character doesn’t
    just float around the screen. Then you’ll use some `SKTexture`s for handling the
    graphical side of the animation and some `SKAction`s for handling the timing and
    movement side of the animation.


    - **In Chapter 3**, you’ll work with user interaction to drive character movement.


    - **In Chapter 4**, we introduce some ideas about how you add environmental objects
    with which your character can interact, like ledges to run along and boundaries
    so that you can handle screen wrapping.


    - **In Chapter 5**, you’ll add some bad guys and bonuses. We like bonuses!


    - **In Chapter 6**, we’ll present one way to create a sort of “cast of characters”
    that will handle the timing and spawning of bad guys and bonuses. You don’t want
    everyone showing up on stage all at once!


    - **In Chapter 7**, it’s all about points, as in a score! It’s all about the points,
    right?!


    - **In Chapter 8**, you’ll work with sprite interaction. You don’t want your character
    just running around the screen, “floating” right through the enemies and obstacles,
    now do you?


    - **In Chapter 9**, you’ll add more levels. You want the game to get progressively
    harder as time goes on in order to keep it challenging and interesting, after
    all.


    - **In Chapter 10**, we’ll wrap things up and point you where you can go from
    here to make your game even more interesting and complex.


    With all of these technical details out of the way, let’s get our hands dirty
    with some code! Turn the page already! :)


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    # Chapter 1: Hello World


    ## We Love Games


    *“Waka waka waka!” (Pac-Man)*


    My teenage years were spent playing arcade games and watching other kids play
    video games.


    Drop a quarter into the slot, and you were transported to a place that was awesome,
    feeling the adrenaline rush as you dodged bad guys and avoided death, fingers
    flying all over the controls.


    The best place to go was the nickel arcade, where you could pay a nominal admission
    fee and then each game cost a single nickel! A ten-dollar bill could last you
    for hours!


    When the money ran out and we had to snap back into the real world, we made games.
    My computer had only 3KB of programmable memory, so they were very small games
    indeed.


    No wasting code-space with comments—oh no! Variable names were single letters
    (`$x` was the most common, of course). Ahhhh, those were the days!


    Fast-forward 30 years and things have changed a bit. Major companies are creating
    games that immerse you inside a 3D world complete with story lines that put novels
    to shame. Mobile devices and desktop computers have more memory and graphics power
    than you could ever imagine back in the day. However, even with all this power
    and complexity dominating the gaming world, you can still find and enjoy games
    that are simple, easy on the eyes, and yet appealing due to the challenges they
    present. We call them “old school games.” These games are not dead; they just
    reside in a different category than the newest mega-games.


    ## Tradition


    As you’re probably aware, it has become somewhat of a tradition to call the first
    project in any programming book “Hello World.” We wouldn’t want to break that
    tradition here, lest we offend your programming finesse!


    **1**


