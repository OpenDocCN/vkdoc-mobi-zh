    **About the Author**


    **Leland Long’s** programming career began on a VIC-20 computer. He moved up to
    the Apple IIe and then on to the Mac 512, where he began using Lightspeed Pascal
    to write fancier and more complex games.


    As a hobbyist, Leland has written a few programs over the years in BASIC and Pascal,
    but he never pursued learning the more common languages (like C) or learning object-oriented
    concepts. The release of the iPhone SDK changed that! Based on that event, Leland
    dove headfirst into learning all that he could about Objective-C and iOS programming.
    He is currently an IT Director for a flooring installation company in South Carolina,
    where he lives with his youngest daughter. His oldest daughter and four grandchildren
    live close enough to keep life entertaining.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    ![Image 74](index-242_1.jpg)


    **About the Technical Reviewer**


    **Matthew Knott** has been writing code for as long as he can remember—from marveling
    at moving pixels on a BBC Micro to writing ridiculous text adventures for his
    mother on an overheating ZX Spectrum 48k. Matthew has been a professional software
    developer for the past 12 years, six of which have been spent in the educational
    sector where he has now entered the sometimes-scary world of management (although
    when they see the mess he made of the budget, that won’t last long). Matthew’s
    work and hobbies are basically the same things, but when he’s not working, he
    loves life in a beautiful part of Wales with his wife, Lisa, and two kids, Mikey
    and Charlotte.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


    **Acknowledgments**


    This book could not have been written without the hard-working folks at Apress.
    Steve Anglin got the ball rolling and Michelle Lowman handled everything in the
    acceptance process. Louise Corrigan helped out when others were unavailable. Mark
    Powers kept the book on the right track, and Gary Schwartz helped with some terrific
    feedback along the way. To all of the fine employees at Apress: Thank you, thank
    you!


    A very special thanks goes out to Matthew Knott, the technical reviewer, who tested
    all of the code in the book and made sure that everything worked as described.


    [www.it-ebooks.info](http://www.it-ebooks.info/)


