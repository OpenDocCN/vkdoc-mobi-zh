  trans: "\n***图 5-2.** 相互踩踏*\n\n**碰撞**\n\n你只需添加一行代码就能改变这种混乱的行走方式。将以下代码插入到 `SKBRatz.m`\
    \ 的 `initNewRatz` 方法中：\n\n```\nratz.physicsBody.categoryBitMask = kRatzCategory;\n\
    ratz.physicsBody.contactTestBitMask = kWallCategory | kBaseCategory ;\nratz.physicsBody.collisionBitMask\
    \ = kBaseCategory | kWallCategory | kLedgeCategory ;\nratz.physicsBody.density\
    \ = 1.0;\nratz.physicsBody.linearDamping = 0.1;\n```\n\n现在构建并运行你的程序。不再出现互相踩踏的情况。事实上，你还能看到这一改变的另一个结果——它们之间不再发生碰撞。它们可以彼此穿越而过。\n\
    \n你指定了感兴趣与之碰撞的节点类型。任何未包含的类型将突然对这些类型的碰撞不再产生影响。\n\n在 `SKBPlayer.m` 文件的 `initNewPlayer`\
    \ 方法中添加以下代码：\n\n```\nplayer.physicsBody.contactTestBitMask = kBaseCategory | kWallCategory;\n\
    player.physicsBody.collisionBitMask = kBaseCategory | kWallCategory | kLedgeCategory\
    \ ;\nplayer.physicsBody.density = 1.0;\n```\n\n现在构建并运行程序，尝试让玩家角色穿过成群的敌人。你会发现没有任何效果。\n\
    \n既然谈到了接触和碰撞，你最好同时移除玩家和敌人精灵的 `kBaseCategory` 接触位掩码，因为你不需要处理 `kBaseCategory` 类型节点的接触事件。你只需要它们用于\
    \ `kWallCategory` 事件：\n\n```\nplayer.physicsBody.contactTestBitMask = kWallCategory;\n\
    ratz.physicsBody.contactTestBitMask = kWallCategory ;\n```\n\n> **注意** 请注意，尽量保持这些位掩码的简洁有助于略微提高帧率。\n\
    \n现在你将改变设置，使敌人在生成时交替出现在两侧。首先需要在 `SKBGameScene.h` 文件中定义几个常量：\n\n```\n#import \"\
    SKBRatz.h\"\n\n#define kEnemySpawnEdgeBufferX 60\n#define kEnemySpawnEdgeBufferY\
    \ 60\n\n@interface SKBGameScene : SKScene <SKPhysicsContactDelegate>\n```\n\n\
    然后修改 `SKBGameScene.m` 文件 `update` 方法中的起始点代码：\n\n```\nint scheduledDelay = 2;\n\
    int leftSideX = CGRectGetMinX(self.frame)+kEnemySpawnEdgeBufferX;\nint rightSideX\
    \ = CGRectGetMaxX(self.frame)-kEnemySpawnEdgeBufferX;\nint topSideY = CGRectGetMaxY(self.frame)-kEnemySpawnEdgeBufferY;\n\
    int startX = 0;\n\n// 交替切换两侧生成\nif (castIndex % 2 == 0)\n    startX = leftSideX;\n\
    else\n    startX = rightSideX;\n\nint startY = topSideY;\n\n// 开始延迟，延迟完成后生成新敌人\n\
    SKAction *spacing = [SKAction waitForDuration:scheduledDelay];\n```\n\n构建并运行程序，你会发现现在生成敌人精灵时会交替出现在两侧。它们的初始移动方向已在\
    \ `SKBRatz` 类的 `SpawnedInScene` 方法中处理：\n\n```\n// 设置初始方向并开始移动\nif (self.position.x\
    \ < CGRectGetMidX(whichScene.frame))\n    [self runRight];\nelse\n    [self runLeft];\n\
    ```\n\n你简单运用了一个数学函数（取模运算符 `%`），使得当 `castIndex` 值为偶数时 `if()` 语句条件成立。条件成立时，敌人精灵在屏幕左侧生成；不成立时则在右侧生成。就是这么简单。\n\
    \n现在敌人朝不同方向移动了，你可以着手处理碰撞。目前，所有角色都能互相穿行，仿佛都是幽灵。但你想让它们在相遇时改变方向。该怎么做呢？很好，你将使用 `SKBGameScene.m`\
    \ 文件中现有的 `didBeginContact` 方法来检测碰撞并进行适当处理。\n"
- fmt: "# 排版后的内容\n\nTo begin, you add the `kRatzCategory` to the `contactTestBitMask`\
    \ and `collisionBitMask` properties for the enemy sprites, inside the `initNewRatz`\
    \ method of the `SKBRatz.m` file:\n\n```\nratz.physicsBody.contactTestBitMask\
    \ = kWallCategory | kRatzCategory;\nratz.physicsBody.collisionBitMask = kBaseCategory\
    \ | kWallCategory |\nkLedgeCategory | kRatzCategory;\nratz.physicsBody.density\
    \ = 1.0;\n```\n\nYou want some specific code to run when a collision occurs, so\
    \ add two methods to your enemy class. You need public method declarations in\
    \ the `SKBRatz.h` file:\n\n```\n- (void)runRight;\n- (void)runLeft;\n- (void)turnRight;\n\
    - (void)turnLeft;\n@end\n```\n\nThen you add the methods to the `SKBRatz.m` file,\
    \ inserting them after the `runLeft` method:\n\n```\n[self runAction:moveForever];\n\
    }\n\n- (void)turnRight\n{\n    self.ratzStatus = SBRatzRunningRight;\n    [self\
    \ removeAllActions];\n    SKAction *moveRight = [SKAction moveByX:5 y:0 duration:0.4];\n\
    \    [self runAction:moveRight completion:^{[self runRight];}];\n}\n\n- (void)turnLeft\n\
    {\n    self.ratzStatus = SBRatzRunningLeft;\n    [self removeAllActions];\n  \
    \  SKAction *moveLeft = [SKAction moveByX:-5 y:0 duration:0.4];\n    [self runAction:moveLeft\
    \ completion:^{[self runLeft];}];\n}\n@end\n```\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n## CHAPTER 5: More Animated Sprites: “Enemies” and “Bonuses”\n\nThen you add\
    \ an `if()` statement to the `didBeginContact` method in the `SKBGameScene.m`\
    \ file, inserting it after the “Ratz/Sidewalls” `if()` statement:\n\n```\n// Ratz\
    \ / sideWalls\nif ((((firstBody.categoryBitMask & kWallCategory) != 0) &&\n  \
    \   ((secondBody.categoryBitMask & kRatzCategory) != 0))) {\n    SKBRatz *theRatz\
    \ = (SKBRatz *)secondBody.node;\n    if (theRatz.position.x < 100) {\n       \
    \ [theRatz wrapRatz:CGPointMake(self.frame.size.width-11,\n                  \
    \                     theRatz.position.y)];\n    } else {\n        [theRatz wrapRatz:CGPointMake(11,\
    \ theRatz.position.y)];\n    }\n}\n\n// Ratz / Ratz\nif ((((firstBody.categoryBitMask\
    \ & kRatzCategory) != 0) &&\n     ((secondBody.categoryBitMask & kRatzCategory)\
    \ != 0))) {\n    SKBRatz *theFirstRatz = (SKBRatz *)firstBody.node;\n    SKBRatz\
    \ *theSecondRatz = (SKBRatz *)secondBody.node;\n    NSLog(@\"%@ & %@ have collided...\"\
    , theFirstRatz.name, theSecondRatz.name);\n\n    // cause first Ratz to turn and\
    \ change directions\n    if (theFirstRatz.ratzStatus == SBRatzRunningLeft) {\n\
    \        [theFirstRatz turnRight];\n    } else if (theFirstRatz.ratzStatus ==\
    \ SBRatzRunningRight) {\n        [theFirstRatz turnLeft];\n    }\n\n    // cause\
    \ second Ratz to turn and change directions\n    if (theSecondRatz.ratzStatus\
    \ == SBRatzRunningLeft) {\n        [theSecondRatz turnRight];\n    } else if (theSecondRatz.ratzStatus\
    \ == SBRatzRunningRight) {\n        [theSecondRatz turnLeft];\n    }\n}\n```\n\
    \nBuild and run the program to see these changes in action. The enemy sprites\
    \ no longer pass through each other, and when they bump into each other, they\
    \ pause and turn around (see Figure 5-3).\n\n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\
    \n![Image 40](index-96_1.jpg)\n\n**CHAPTER 5: More Animated Sprites: “Enemies”\
    \ and “Bonuses”**\n\n**93**\n\n***Figure 5-3.** Alternating spawning points and\
    \ collision bouncing*\n\n```\n- (void)turnRight\n{\n    self.ratzStatus = SBRatzRunningRight;\n\
    \    [self removeAllActions];\n    SKAction *moveRight = [SKAction moveByX:5 y:0\
    \ duration:0.4];\n    [self runAction:moveRight completion:^{[self runRight];}];\n\
    }\n```\n\nIf you glance at the code of the `turnRight` and `turnLeft` methods,\
    \ you can see that you created an `SKAction` that moves them slightly apart from\
    \ each other. When completed, it triggers them to run in the opposite direction.\n\
    \n`NSLog(@\"%@ & %@ have collided...\", theFirstRatz.name, theSecondRatz.name);`\
    \ You added an `NSLog` method call when this is triggered inside the `didBeginContact`\
    \ method so that you can see which enemies were affected in the console. Feel\
    \ free to comment out any of these `NSLog`s at any time, as they can rapidly become\
    \ a bit too much data to which you must pay attention.\n\nThey are used only to\
    \ help you understand any new code snippets you add and for debugging purposes.\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)"
