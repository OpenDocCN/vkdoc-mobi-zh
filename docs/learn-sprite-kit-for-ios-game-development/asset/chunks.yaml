    \ 8: Contacts and Collisions\n\n173\n\nBuild and run the program to see the new\
    \ animation sequence that is triggered when the hero kicks off an unconscious\
    \ enemy.\n\n## Into the River\n\nWhen the vermin hits the bottom of the screen,\
    \ you should add a visual effect to make it look like it splashed into water.\
    \ To do this, you will create another particle effect.\n\nLet’s create a new Ratz\
    \ class method to handle this final scene in the vermin’s lifespan.\n\nAdd the\
    \ public declaration to the `SKBRatz.h` file:\n\n```\n- (void)ratzCollected:(SKScene\
    \ *)whichScene;\n- (void)ratzHitWater:(SKScene *)whichScene;\n- (void)runRight;\n\
    ```\n\nThen insert the implementation after the existing `ratzCollected` method\
    \ in the `SKBRatz.m` file:\n\n```\nself.physicsBody.linearDamping = 1.0;\nself.physicsBody.allowsRotation\
    \ = YES;\n}];\n```\n\n```\n- (void)ratzHitWater:(SKScene *)whichScene\n{\n   \
