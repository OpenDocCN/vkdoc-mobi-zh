    \    moneyText.fontColor = [SKColor whiteColor];\n    moneyText.position = CGPointMake(self.position.x-10,\
    \ self.position.y+28);\n    [whichScene addChild:moneyText];\n    SKAction *fadeAway\
    \ = [SKAction fadeOutWithDuration:1];\n    [moneyText runAction:fadeAway completion:^{\
    \ [moneyText removeFromParent]; }];\n}\n```\n\n编译并运行程序，查看您完成的效果。当您看到它时，希望您能大声说出“酷！”让周围的人都好奇您在兴奋什么。因为它确实很酷，不是吗？但稍等，还有一件事可以提升酷炫指数。\n\
    \n## 粒子效果\n\n现在是时候向您介绍 Sprite Kit 一个激动人心的功能：粒子生成。*粒子*由 `SKEmitterNode` 对象创建，用于生成雨、火、爆炸等视觉效果。Xcode\
    \ 内置了 `SKEmitterNode` 编辑器，允许您创建和调整构成粒子效果的各种设置。那么，让我们制作一个粒子效果，并将其用作金币收集的视觉特效。\n\
    \n从“文件”菜单中选择“新建文件”，确保左侧列表中选中了 iOS 资源，选择“SpriteKit Particle File”，然后点击“下一步”按钮。从“模板”下拉菜单中选择“Spark”，然后点击“下一步”按钮。将其命名为\
    \ `CoinCollected`，并点击“创建”按钮。\n\n在 Xcode 窗口左侧的项目导航器中，您会看到为您生成了两个新文件：`CoinCollected.sks`\
