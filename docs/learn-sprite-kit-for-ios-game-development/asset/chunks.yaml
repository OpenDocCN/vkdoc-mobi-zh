    \n如果需要，你可以将`Sprites`文件夹移动到`SKBObject`文件下方。\n\n现在，在`Sprites`文件夹内添加另一个文件夹，仅用于存放玩家文件。你可以按照创建`Sprites`文件夹时的相同步骤来操作。将这个新文件夹的名称设为`Player`（见图\
    \ [3-3](#index_split_000.html#p36)）。\n\n***Figure 3-3.** New folder structure*\n\
    \n[www.it-ebooks.info](http://www.it-ebooks.info/)\n\n![Image 29](index-37_1.jpg)\n\
    \n**CHAPTER 3: Sprite Movement Responding to User Inputs**\n\n**33**\n\n### 玩家新类\n\
