  \     break;\n        }\n\n        if(!ready)\n            return;\n\n        if(SensorManager.getRotationMatrix(\n\
  \                inR, inclineMatrix, accelValues, compassValues)) {\n          \
  \  // 获得了有效的旋转矩阵\n\n            SensorManager.getOrientation(inR, prefValues);\n\
  \n            mInclination = SensorManager.getInclination(inclineMatrix);\n\n  \
  \          // 每 10 次更新显示一次\n            if(counter++ % 10 == 0) {\n            \
  \    doUpdate(null);\n                counter = 1;\n            }\n        }\n \
  \   }\n\n    public void doUpdate(View view) {\n        if(!ready)\n           \
  \ return;\n\n        mAzimuth = (float) Math.toDegrees(prefValues[0]);\n       \
  \ if(mAzimuth < 0) {\n            mAzimuth += 360.0f;\n        }\n\n        String\
  \ msg = String.format(\n                \"首选方法：\\n 方位角（Z）：%7.3f \\n 俯仰角（X）：%7.3f\\\
  n 横滚角（Y）：%7.3f\",\n                mAzimuth, Math.toDegrees(prefValues[1]),\n  \
  \              Math.toDegrees(prefValues[2]));\n        preferred.setText(msg);\n\
  \n        msg = String.format(\n           \"方向传感器：\\n 方位角（Z）：%7.3f\\n 俯仰角（X）：%7.3f\\\
  n 横滚角（Y）：%7.3f\",\n           orientationValues[0],\n           orientationValues[1],\n\
  \           orientationValues[2]);\n        orientation.setText(msg);\n\n      \
  \  preferred.invalidate();\n        orientation.invalidate();\n    }\n\n    public\
  \ void doShow(View view) {\n        // google.streetview:cbll=30.32454,-81.6584&cbp=1,yaw,,pitch,1.0\n\
  \        // yaw = 从正北方向顺时针旋转的角度\n        // 此处 yaw 可使用 mAzimuth 或 orientationValues[0]\n\
  \        //\n        // pitch = 上下倾斜角度。-90 表示完全朝上，\n        // +90 表示完全朝下\n    \
  \    // 但 pitch 不能正常工作\n        Intent intent=new Intent(Intent.ACTION_VIEW, Uri.parse(\n\
  \            \"google.streetview:cbll=30.32454,-81.6584&cbp=1,\" +\n           \
  \ Math.round(orientationValues[0]) + \",,0,1.0\"\n            ));\n        startActivity(intent);\n\
  \        return;\n    }\n}\n```\n\n用户界面包含两个按钮和一组传感器数值显示区域，分别用于显示首选方法和方向传感器的输出。运行该程序时，您应该能看到类似图\
  \ 26–5 的效果。\n\n![images](img/2605.jpg)\n\n**图 26–5.** *两种方式呈现的方向信息*\n\n在查看结果之前，让我们先解释一下这个应用程序的功能。在`onCreate()`方法中，我们执行了和之前类似的操作：获取文本视图的引用、`SensorManager`以及我们要使用的三个传感器：加速度计、指南针和方向传感器。同时我们还定义了一个变量来保存旋转值。稍后我们会讨论这个变量。\n\
  \n在`onResume()`中激活传感器，在`onPause()`中停用它们。\n\n当收到传感器数值更新时，我们根据传感器类型进行分支处理，并将数值记录到局部变量中：`accelValues`、`compassValues`或`orientationValues`。注意，我们本可以克隆事件数组来保存数值的本地副本，但这意味着要不断实例化对象，这并不是我们期望的做法。创建新对象以及后续的垃圾回收成本可能会严重拖累性能，因此我们直接更新现有数组。\n\
  \n注意，在进入下一段代码之前，我们如何通过布尔值`ready`来确保`accelValues`和`compassValues`都有数据。接着我们看到`getRotationMatrix()`方法的调用，随后是`getOrientation()`方法调用。我们还调用了`getInclination()`方法。这里我们不会用到它，但需要知道它表示地磁波相对于地球表面的角度。越靠近地球两极，返回的角度值就越大。接下来，像之前一样，我们检查计数器，仅每第十次更新时刷新显示。这同样是为了避免过多的界面操作导致应用程序性能严重下降。\n\
  \n\n在我们的 `doUpdate()` 方法中（该方法也可通过 UI 中的按钮调用），我们进行了一些计算并显示结果。使用首选方法时，第一个值即方位角，其弧度值范围从负π到正π，对应\
  \ −180 度到 +180 度。方向传感器提供的值则从 0（北）到 360 度。为了使这些值可比较，我们从 `prefValues` 数组中取出第一个值，将其从弧度转换为度数，若结果为负则加上\
  \ 360。这样就能与方向传感器的值进行比较了。此方法的其余部分只是在 UI 中显示传感器数值。\n\n本示例应用中的最后一个方法是 `doShow()`。这是有趣的部分。在第\
  \ 25 章中，我们展示了如何使用 Intent 调用街景应用。那一章我们跳过了关于设置偏航值以指示显示图像时面向方向的部分。现在我们就可以展示如何传入偏航值和俯仰值了。\n\
  \n对于纬度和经度，我们预先选择了佛罗里达州杰克逊维尔的一个地点。当然，您可以自由替换为您自己的值。对于偏航值，我们需要传入相对于北方的角度数（0-360），因此我们使用\
  \ `mAzimuth` 或 `orientationValues[0]` 的值，并转换为整数。对于俯仰值，理论上我们可以使用任意一个数组中的第二个值，并将其加上\
  \ 90。然而，街景应用似乎不接受非 0 的俯仰值，至少在这个位置是这样。因此，我们目前选择将其设置为 0。如果您点击 `Show Me!` 按钮，将启动街景，显示的图像就像您正面向与当前相同的方向，但身处那个位置。如果您点击返回按钮，转动身体，再次点击\
  \ `Show Me!`，您将看到新视角下的图像。现在，让我们更仔细地看看传感器的实际数值。\n\n首选方法与方向传感器之间的数值看起来相同或非常接近。方向传感器的数值显得更稳定，而且似乎是整数值。看起来不错，对吧？但别急着下结论。当您开始移动设备时，您会发现，如果您倾斜设备使其向上看，数值就会变得大不相同。现在将设备旋转至横屏模式，您可能会看到类似图\
  \ 26–6 的效果。\n\n![images](img/2606.jpg)\n\n**图 26–6.** *横屏模式下两种方式的方向数据*\n\n发生了什么？我们的翻滚值在首选方法和方向传感器之间是相反的。究其原因，是两者的参考坐标系不同。\n\
  \n我们还没有讨论过如果设备不是竖屏模式而是横屏模式会怎样。当设备以横屏模式正对我们时，加速度计仍然固定在设备中，因此向上方向不再是 *y* 轴，实际上是 *x*\
  \ 轴。我们可以通过一些数学上的巧妙处理来让一切正常运作，但幸运的是，`SensorManager` 类提供了另一个方法来帮助我们。这次的方法叫做 `remapCoordinateSystem()`。它应在获取旋转矩阵之后、调用\
  \ `getOrientation()` 之前被调用。`remapCoordinateSystem()` 的基本功能是通过交换坐标轴来修改旋转矩阵。该方法的签名如下：\n\
  \n`public static boolean remapCoordinateSystem (float[] inR, int X, int Y, float[]\
  \ outR)`\n\n我们传入旋转矩阵，以及指示如何交换 *x* 和 *y* 轴的值，就能得到一个新的旋转矩阵（`outR`）以及一个布尔返回值，指示重映射是否成功。*x*\
  \ 和 *y* 的值是来自 `SensorManager` 的常量，例如 `AXIS_Z` 或 `AXIS_MINUS_Y`。\n\n我们已在网站提供的下载资源中包含了一个名为\
  \ `VirtualJaxWithRemap` 的新示例应用，您可以看到它的具体效果。\n\n### 磁偏角与地磁场\n\n关于方向与设备，我们还想讨论另一个主题。指南针传感器会告诉您磁北的方向，但不会告诉您真北（即地理北）的方向。想象一下，您站在磁北极与地理北极的中点。它们之间会相差\
  \ 180 度。离两个北极越远，这个角度差就越小。磁北与真北之间的角度差称为磁偏角。这个值只能相对于地球表面的某个点来计算。也就是说，您必须知道您所在的位置，才能知道相对于磁北，地理北在哪个方向。幸运的是，Android\
  \ 提供了一种方法帮助我们解决这个问题，即 `GeomagneticField` 类。\n\n要实例化 `GeomagneticField` 类的对象，您需要传入纬度和经度。因此，为了获得磁偏角，我们需要知道参考点在哪里。您还需要知道需要该值的时间点，因为磁北会随时间漂移。一旦实例化，您只需调用以下方法即可获得磁偏角（以度为单位）：\n\
  \n`float declinationAngle = geoMagField.getDeclination();`\n\n如果磁北位于地理北的东侧，则 `declinationAngle`\
  \ 的值为正。\n\n### 重力传感器\n\nAndroid 2.3 引入了重力传感器。这并非独立的硬件，而是基于加速度计的虚拟传感器。事实上，该传感器使用了与我们之前描述的加速度计类似的逻辑，以提取作用于设备上的力的重力分量。然而，我们无法访问其内部逻辑，因此必须接受重力传感器类中使用的任何因子和逻辑。不过，这个虚拟传感器可能会利用其他硬件（如陀螺仪）来更精确地计算重力。该传感器的值数组报告重力值的方式与加速度计报告其值的方式相同。\n\
  \n### 线性加速度传感器\n\n与重力传感器类似，线性加速度传感器是一个虚拟传感器，表示加速度计力减去重力后的值。同样，我们之前对加速度计传感器值进行了自己的计算，以剔除重力来获取这些线性加速度力值。该传感器为我们提供了更便捷的方式，并且它可能利用其他硬件（如陀螺仪）来更精确地计算线性加速度。其值数组报告线性加速度的方式与加速度计报告其值的方式相同。\n\
  \n### 旋转向量传感器\n\n旋转向量传感器类似于已弃用的方向传感器，它表示设备在空间中的方向，其角度相对于硬件加速度计的参考坐标系（参见图 26–2）。截至撰写本文时，关于此传感器的信息尚不充分。请查看我们的网站（[`www.androidbook.com`](http://www.androidbook.com)）以获取此特定传感器的最新信息。\n\
  \n\n### 近场通信传感器\n\n随着 Android 2.3 的推出，我们现在能够使用近场通信 (NFC) 与特殊标签进行交互。NFC 标签与射频识别 (RFID)\
  \ 标签类似，不同之处在于 NFC 的作用范围小于四英寸。这意味着 Android 设备中的传感器必须非常靠近标签才能进行扫描。NFC 标签可以通过编程来输出文本信息、URI\
  \ 和元数据，例如信息的语言。\n\n请注意，NFC 并非新技术，在世界其他地区已使用多年。事实上，在多个国家，能够读取 NFC 标签的销售点终端非常普遍。当这些终端检测到\
  \ NFC 标签时，购物者可以使用与其 NFC 标签 ID 关联的账户完成金融交易。互联网上有很多演示视频，展示用户如何将携带 NFC 标签的物体靠近这些终端之一，以启动支付流程。谷歌曾提出一个愿景，即有一天能够用手机代替钱包。这确实是一个前景广阔的概念。Android\
  \ 支持让设备扮演标签供其他读取器读取，也支持作为读取器来检测和扫描 NFC 标签。\n\n实际上，NFC 有三种操作模式。第一种模式是读写非接触式标签。第二种模式是卡模拟模式。这允许\
  \ Android 设备自身扮演标签。这样做的一个明显好处是，你的设备可以扮演一种标签，然后只需按一下按钮就能变成另一个不同的标签。这就是 Android 设备取代钱包的方式。无论你拥有什么信用卡、公交卡或门票，你的\
  \ Android 设备都可以（当然是安全地）模拟这些物品，因此交易另一端的读取器会认为它正在与你的信用卡交互，而实际上它是在与你的 Android 设备交互。NFC\
  \ 的第三种模式是点对点通信。在这种模式下，每一方都识别出自己在与另一台设备（而不仅仅是一个标签）进行通信。\n\n随着 Android 2.3.3 的发布，你可以使用\
  \ Android 设备读取标签（类似于上面例子中销售点终端的功能），并且还可以写入可写的 NFC 标签。如果用户的设备设置正确，它可以使用谷歌定义的点对点协议，通过\
  \ NFC 将数据传输到另一台 NFC 设备。截至撰写本文时，尚不可用的功能是模拟一张卡，或者更准确地说，模拟一个 NFC 标签。这实际上非常困难，部分原因是\
  \ NFC 在硬件层面的实现方式差异很大。目前没有公布 SDK 何时可能支持 NFC 卡模拟，但我们预计它终有一天会实现。与此同时，可以在驱动层使用 Android\
  \ 原生开发工具包 (NDK) 进行一定程度的卡模拟。但我们在此不会涉及这一部分。\n\n除了使用 NFC 进行金融交易，NFC 标签还可以应用于许多其他场景。例如，博物馆可以在其藏品旁放置一个\
  \ NFC 标签，让参观者将手机靠近标签，以访问一个可提供该藏品多媒体信息的网页。公交车站可以展示一个 NFC 标签，让人们了解下一班公交车何时到达以及开往哪里。商家可以展示一个\
  \ NFC 标签，当有人走进时，可以方便地签到使用基于位置的服务。也许当你可以用手机解锁配备 NFC 的门时，酒店房间钥匙将变得多余。甚至商店货架上的产品也可以附带\
  \ NFC 标签，让购物者获取关于该产品的更多信息，例如营养信息，或者技术规格和宣传视频。\n\n#### 启用 NFC 传感器\n\nAndroid 中对 NFC\
  \ 的支持与其他传感器类型不同。你不需要使用 `SensorManager`，而是使用 `NfcAdapter`。设备上通常只有一个适配器，它的工作是管理标签的读写，以及将标签分发给设备上的\
  \ Activity。适配器可以处于开启或关闭状态，设置中有启用或禁用 NFC 适配器的控件。NFC 适配器设置位于无线设置中。如果适配器处于开启状态，并且检测到\
  \ NFC 标签，则会执行一个较为复杂的流程，以确定哪个 Activity（如果有的话）应该接收一个意图，告知该 Activity 检测到的 NFC 标签。一切都取决于\
  \ NFC 标签中包含的数据类型，以及设备上已安装应用程序的意图过滤器。此外，还有一个需要考虑的信息点，即设备上当前位于前台的 Activity 是否已明确表示希望接收\
  \ NFC 标签。我们很快将对此进行更详细的探讨。\n\n要访问适配器，首先使用 `getSystemService()` 获取一个 `NfcManager`\
  \ 实例。然后在该实例上调用 `getDefaultAdapter()` 方法，如下所示：\n\n```java\nNfcManager manager = (NfcManager)\n\
  \    context.getSystemService(Context.NFC_SERVICE);\nNfcAdapter adapter = manager.getDefaultAdapter();\n\
  ```\n\n这会返回作为单例对象的 `NfcAdapter`。要确定 `NfcAdapter` 当前是否已启用，请使用 `isEnabled()` 方法，该方法返回一个布尔值，告知你\
  \ NFC 适配器在设置中是否已启用。目前没有文档介绍如何以编程方式打开（或关闭）NFC 适配器。如果 NFC 适配器处于关闭状态，而你希望将其打开，则需要通知用户，请他们在设置中启用\
  \ NFC 适配器。要从应用程序中为用户启动相应的设置屏幕，可以使用如下代码：\n\n```java\nstartActivityForResult(new Intent(\n\
  \    android.provider.Settings.ACTION_WIRELESS_SETTINGS), 0);\n```\n\n当此代码运行时，将显示相应的设置屏幕，用户可以选择启用或不启用\
  \ NFC。当用户完成无线设置屏幕的操作后，你的 Activity 的 `onActivityResult()` 回调将被调用。请记住，即使你要求用户启用 NFC，他们也可能会选择*不*启用。如果\
  \ NFC 适配器保持禁用状态，你的应用程序应采取适当的措施。\n\n\n\n#### 路由 NFC 标签\n\n现在似乎是讨论不同类型 NFC 标签和技术的好时机。NFC\
  \ 并非单一标准。实际上，用户可能会遇到几种不同类型的 NFC 标签。这些标签类型之间存在差异，这意味着 Android 必须使用与每种标签类型相关的不同类来支持它们。如果你查看\
  \ `android.nfc.tech` 包，你会发现几种不同的标签技术类，从 `MifareClassic` 到 `NfcV` 再到 `ISO-DEP`。每种标签类型的内部结构可能不同，并且访问和操作这些标签类型中的数据的方法也不同。幸运的是，Android\
  \ 提供了一个 `Tag` 类来帮助管理 NFC 通信，每种特定类型的标签都可以从 `Tag` 对象创建。一旦你有了特定 NFC 标签的实例，你就可以对它执行该标签类型特有的操作。这也意味着，要选择将标签发送到哪个\
  \ Activity，必须考虑几个因素。我们首先描述 NFC 标签 Intent 是如何创建的，然后你将理解如何创建合适的 Intent 过滤器。\n\n当发送带有标签数据的\
  \ Intent 时，`Tag` 对象总是以 `EXTRA_TAG` 为键被打包到 Intent 的 extras 包中。如果标签包含 NDEF 数据，则会以\
  \ `EXTRA_NDEF_MESSAGES` 为键设置另一个 extras 值。最后，Intent 可能包含一个以 `EXTRA_ID` 为键的标签 ID 的\
  \ extras 值。这最后两个 extras 值是可选的，取决于标签上是否存在该数据。所有 NFC Intent 都通过 `startActivity()`\
  \ 发送。请注意，你实际上不需要访问 NFC 适配器来接收 NFC 消息。只要它们与你的 Intent 过滤器匹配，Intent 消息就会像来自其他来源的 Intent\
  \ 一样进入你的应用程序。\n\n**注意：** 重要的是要明白，支持 NFC 的 Android 设备中存在一个 NFC 生态系统。创建这些 NFC Intent\
  \ 的逻辑使用了 Android SDK 中未公开的功能。这意味着你自己很难创建一个虚假的发送 Activity。我们将要解释的是 NFC 生态系统中发生的事情，这不是你可以自己编写代码来实现的。这也意味着，如果你真的想测试一个\
  \ NFC 应用程序，你将需要使用一台真实的设备和真实的 NFC 标签。除非 Google 某天在模拟器或 DDMS 中提供一些支持，或者两者都支持。\n\n\
  标签 Intent 的动作值取决于检测到的标签所发现的信息。Intent 有三个可能的动作值：\n\n1.  `ACTION_NDEF_DISCOVERED`\
  \ 是当标签中发现 NDEF 载荷时的动作。如果是这种情况，Android 会查找第一个 `NdefMessage` 中是否存在 `NdefRecord`。如果该\
  \ `NdefRecord` 是一个 URI 或 SmartPoster 记录，Intent 的数据字段将获得该 URI。如果找到 MIME 记录，Intent\
  \ 的 type 字段将被设置为标签的 MIME 类型。然后，Android 使用该 Intent 和 Intent 匹配算法寻找合适的 Activity 来启动。如果找不到任何\
  \ Activity，则放弃此 Intent，Android 尝试创建下一种类型的 NFC Intent。\n2.  `ACTION_TECH_DISCOVERED`\
  \ 是当未检测到 NDEF，或者找不到 NDEF Activity，但存在标签技术时的动作。在这种情况下，Android 向 Intent 添加元数据，指明检测到了哪些标签技术。一个\
  \ NFC 标签可以实现多种技术，尤其是因为 `Ndef` 更像是一种虚拟技术。Android 寻找一个能够匹配此 Intent 的 Activity，如果找到就发送给它。如果没有找到，Android\
  \ 就会丢弃此 Intent，并尝试第三种类型的 NFC Intent。\n3.  `ACTION_TAG_DISCOVERED` 是 NFC 标签的最终动作选择。这是当所有其他动作都无法匹配到\
  \ Activity 时的动作。这个 Intent 同样不携带数据或 MIME 类型。如果这个 Intent 与设备上的任何 Activity 都不匹配，那么\
  \ NFC 生态系统就会放弃，标签信息也会被丢弃。\n\n#### 接收 NFC 标签\n\n无论你决定在代码中还是在 `AndroidManifest.xml`\
  \ 文件中创建 Intent 过滤器，你都需要知道你在寻找什么，并仔细准备你的 Intent 过滤器。例如，如果你的过滤条件指定得过于严格，你将无法收到标签通知。如果指定得过于宽泛，你会被调用去处理那些你并不想处理的标签。如果你的应用程序收到了一个你不想处理的\
  \ NFC 标签，这意味着设备上可能存在另一个可以处理它的应用程序，却没有收到它。如果 Intent 匹配逻辑找到了多个应用程序并询问用户运行哪一个，而用户选择了你的应用，就可能发生这种情况。这是你在为\
  \ NFC 标签定义 Intent 过滤器时需要小心的另一个原因；如果提示用户选择运行哪个应用程序，他们很可能需要将设备从 NFC 标签移开才能做出选择，此时标签就不在范围内了。如果你能选择标签上将包含哪些数据，你可以使这些数据非常符合你的需求，例如使用自定义\
  \ URI 方案或自定义 MIME 类型。\n\n你选择哪种 Intent 过滤器取决于放置在 NFC 标签 Intent 中的动作（见上文）。列表 26-8\
  \ 展示了一个 NDEF 标签的 Intent 过滤器示例，该过滤器将放入你的 `AndroidManifest.xml` 文件中。\n\n**列表 26-8.**\
  \ 具有 MIME 类型的 NDEF 标签的 Intent 过滤器\n\n```\n<intent-filter>\n  <action android:name=\"\
  android.nfc.action.NDEF_DISCOVERED\"/>\n  <data android:mimeType=\"type/subtype\"\
  \ />\n</intent-filter>\n```\n\n当然，你需要将 \"type/subtype\" 替换为你正在寻找的特定 MIME 类型，或者如果你接受任何类型或子类型，则可以使用通配符。例如，你可以将\
  \ `mimeType` 设置为 \"text/*\" 来匹配所有文本类型。但是，对于 NDEF 标签，你不需要指定 MIME 类型。如果标签包含的是 URI\
  \ 而不是 MIME 类型，你将需要使用如 列表 26-9 所示的 Intent 过滤器。\n\n**列表 26-9.** 具有 URI 的 NDEF 标签的\
  \ Intent 过滤器\n\n```\n<intent-filter>\n  <action android:name=\"android.nfc.action.NDEF_DISCOVERED\"\
  />\n  <data android:scheme=\"geo\" />\n</intent-filter>\n```\n\n在这个例子中，我们使用了 `geo`\
  \ 方案，这样如果检测到带有 `geo:` URI 的标签，我们的 Activity 就会被启动。你可以使用 `<data>` 标签的任何其他属性来指定你的 Activity\
  \ 正在寻找的 NFC 数据。\n\n如果你的 Activity 正在寻找具有特定技术的 NFC 标签，你将使用如 列表 26-10 所示的 Intent 过滤器。也有可能检测到了一个带有\
  \ NDEF 的标签，但没有找到 Activity 来处理 `NDEF_DISCOVERED` Intent。只要它与你的 Intent 过滤器匹配，这也可能导致你的\
  \ Activity 接收到该 Intent。换句话说，如果一个 `NDEF_DISCOVERED` 标签 Intent 无法传递给正在寻找 NDEF 标签的\
  \ Activity，那么一个正在寻找特定技术的 Activity 最终可能会收到该标签的技术 Intent。\n\n**列表 26-10.** 具有技术的 NFC\
  \ 标签的 Intent 过滤器\n\n```\n<intent-filter>\n  <action android:name=\"android.nfc.action.TECH_DISCOVERED\"\
  />\n</intent-filter>\n<meta-data android:name=\"android.nfc.action.TECH_DISCOVERED\"\
  \n                android:resource=\"@xml/nfc_tech_filter\" />\n```\n\n请注意，我们现在有一个不同的动作来匹配技术，并且我们使用了\
  \ `<meta-data>` 标签而不是 `<data>` 标签，而且它位于 `<intent-filter>` 标签之外。`<meta-data>` 标签的属性也不同，它指向另一个我们必须在应用程序项目的\
  \ `/res/xml` 目录下创建的文件。列表 26-11 显示了一个示例 `nfc_tech_filter.xml` 文件。\n\n**列表 26-11.**\
  \ 示例 NFC 技术过滤器 XML 文件\n\n```\n<resources >\n    <tech-list>\n        <tech>android.nfc.tech.NfcA</tech>\n\
  \        <tech>android.nfc.tech.MifareUltralight</tech>\n    </tech-list>\n</resources>\n\
  ```\n\n\n```plaintext\n<resources >\n    <tech-list>\n        <tech>android.nfc.tech.NfcB</tech>\n\
  \        <tech>android.nfc.tech.Ndef</tech>\n    </tech-list>\n</resources>\n```\n\
  \n此过滤器文件指定了我们的活动希望看到的两种标签类型。`NFC` 标签通常会列出其支持的技术列表。如果列表 26–11 中的任何一个 `tech-list`\
  \ 是标签技术列表的子集，则匹配成功，我们的活动将收到该 `NFC` 标签意图。\n\n在列表 26–11 中，第一种标签包含 `NfcA` 和 `MifareUltralight`\
  \ 技术，第二种标签包含 `NfcB` 和 `Ndef` 技术。我们可以向该文件添加额外的 `<resources>`，以指定活动希望看到的其他标签。可放入该文件的技术列表是\
  \ `android.nfc.tech` 包中可用的标签类名称，但只应包含你希望活动接收的技术。`<tech-list>` 的子标签指定了标签为匹配意图必须报告的所有技术。特定\
  \ `tech-list` 中的所有技术必须存在于标签枚举的技术列表中。因此，意图过滤器中的 `tech-list` 可以比标签指定的技术少，但不能更多，否则无法匹配。对于上面列表\
  \ 26–11 中的示例，如果标签仅提供 `Ndef` 技术，则它不会匹配任何规范，你的活动也不会收到意图。因为意图过滤器中的 `tech-list` 都不是标签列表的子集。如果标签包含\
  \ `NfcA`、`NfcB` 和 `Ndef` 技术，它将匹配第二个规范，你的活动将收到意图。第二个 `tech-list` 是标签技术列表的子集。即使标签枚举的技术比意图过滤器\
  \ `tech-list` 中的多一个，我们也能匹配成功。\n\n你可能使用的最后一个意图过滤器如列表 26–12 所示，它代表全能捕获的意图过滤器。也就是说，如果收到了一个标签，但找不到处理该意图的\
  \ `NDEF` 或技术活动，或者该标签是未知类型，则会创建一个带有 `ACTION_TAG_DISCOVERED` 动作的意图。\n\n**列表 26–12.**\
  \ *用于未知或未处理 NFC 标签的意图过滤器*\n\n```plaintext\n<intent-filter>\n  <action android:name=\"\
  android.nfc.action.TAG_DISCOVERED\"/>\n</intent-filter>\n```\n\n请注意，此意图过滤器没有 `<data>`\
  \ 和 `<meta-data>` 标签，因为具有 `ACTION_TAG_DISCOVERED` 动作的意图中不会有任何数据。这通常意味着我们必须有一个 `<category>`\
  \ 标签。但 `NFC` 标签意图并非如此。`NFC` 标签意图是特殊的，因此 `NFC` 标签意图匹配的意图过滤器不需要 `<category>` 标签。回到标签匹配流程，当我们收到\
  \ `ACTION_TAG_DISCOVERED` 意图时，表明 `Android` 几乎已经放弃为检测到的 `NFC` 标签寻找活动。此时，任何将处理 `ACTION_TAG_DISCOVERED`\
  \ 动作的活动都会收到这些标签意图。在大多数正常操作中，你永远不会看到 `ACTION_TAG_DISCOVERED` 标签意图，因为你遇到的所有 `NFC`\
  \ 标签几乎都会匹配 `NDEF` 或 `TECH`。\n\n你的活动还可以通过另一种方式接收 `NFC` 标签意图，即使用前台调度系统。如果你的活动在前台（即\
  \ `onResume()` 正在触发或已触发，并且用户可以与你的活动交互），你可以创建一个待定意图、一个意图过滤器数组、一个技术列表数组，然后进行如下调用：\n\
  \n```java\nmAdapter.enableForegroundDispatch(this, pendingIntent,\n            \
  \          intentFiltersArray, techListsArray);\n```\n\n其中 `mAdapter` 是 `NFC` 适配器，`this`\
  \ 是对你的活动的引用。通过此调用，你可以有效将你的活动置于所有其他活动之前，如果该活动的任何意图过滤器匹配检测到的标签，你的活动将处理该标签。如果你的活动因与调用设置不匹配而未收到\
  \ `NFC` 标签意图，则系统将按前述逻辑尝试其他活动处理该意图。你必须在 `UI` 线程中调用此方法，最佳调用位置是活动的 `onResume()` 方法。你还需要从活动的\
  \ `onPause()` 回调中调用：\n\n```java\nmAdapter.disableForegroundDispatch(this);\n```\n\
  \n这样你的活动就不会收到无法处理的意图。当你的活动通过此方式收到意图时，将使用 `onNewIntent()` 回调将其接收。\n\n待定意图是标准意图。`intentFiltersArray`\
  \ 是你期望的 `IntentFilter` 对象集合，每个对象指定适当的动作以及所需的数据或 `MIME` 类型。例如，列表 26–13 展示了一段为 `Ndef`\
  \ 创建意图过滤器并将其添加到数组的代码。\n\n**列表 26–13.** *用于 Ndef 的意图过滤器代码*\n\n```java\nIntentFilter\
  \ ndef = new IntentFilter(NfcAdapter.ACTION_NDEF_DISCOVERED);\ntry {\n    ndef.addDataType(\"\
  text/*\");    \n}\ncatch (MalformedMimeTypeException e) {\n    throw new RuntimeException(\"\
  fail\", e);\n}\nintentFiltersArray = new IntentFilter[] {\n        ndef,\n};\n```\n\
  \n请记住，意图过滤器数组可以包含多个 `IntentFilter` 实例，每个实例可设置相同或不同的动作，并且可以包含或不包含数据和/或类型字段值。\n\n\
  `techListsArray` 是一个数组的数组，其中每个内部数组是标签可能枚举的类名称列表，你可以设置多个类名称列表用于匹配。列表 26–14 展示了一个示例，该示例等同于列表\
  \ 26–11 中显示的技术列表资源文件。\n\n**列表 26–14.** *技术列表数组的代码*\n\n```java\ntechListsArray =\
  \ new String[][] {\n    new String[] { NfcA.class.getName(),\n                 \
  \  MifareUltralight.class.getName() },\n    new String[] { NfcB.class.getName(),\n\
  \                   Ndef.class.getName() }\n    };\n```\n\n当所有设置完成后，如果此活动确实收到了 `NFC`\
  \ 标签意图，则 `onNewIntent()` 回调将被触发以接收它。从那里，你可以访问 `extras` 包来读取标签，我们将在接下来的内容中介绍。这是一个动态声明\
  \ `NFC` 标签意图的大量设置，但从另一方面看，如果你只希望此活动在用户已启动它的情况下接收标签，这是实现的方法。请注意，同时使用此方法并在清单中设置意图过滤器来接收\
  \ `NFC` 标签意图通常没有意义，但在技术上这是可行的。\n\n\n### 读取 NFC 标签\n\n如前所述，读取 NFC 标签有些复杂。或者更准确地说，标签数据被传递到应用程序的过程可能很复杂。在最基本的层面上，当检测到\
  \ NFC 标签时，系统会确定一个活动（Activity）来接收该标签，然后将其发送过去。与本章前面介绍的传感器不同，对 NFC 标签感兴趣的活动在标签被检测时可能并未运行，并且肯定不会通过传感器监听器接收标签信息。被通知的活动将收到一个意图（Intent），这可能意味着需要启动该活动来处理\
  \ NFC 标签的意图。\n\n在设计接收并处理 NFC 标签信息的应用程序时，您首先需要考虑的一点是：您正在通过硬件接口与设备环境中的物理标签打交道。NFC\
  \ API 包含阻塞调用，这意味着它们可能不会像您期望的那样快速返回，这也就意味着您需要在与主 UI 线程不同的单独线程上运行标签方法。\n\nNFC 标签数据将位于接收到的意图的\
  \ extras 包中。收到意图后，您可以使用类似以下的方式访问 NFC 数据：\n\n```java\nTag tag = intent.getParcelableExtra(NfcAdapter.EXTRA_TAG);\n\
  String[] techlists = tag.getTechLists();\n```\n\n如果您的意图过滤器非常精确，那么您已经知道标签的类型。但如果可能存在多种标签技术，您现在可以查询\
  \ `techlists` 以了解该标签包含了哪些技术。每个字符串都是检测到的标签所枚举的标签技术的类名。\n\n如果您发现此标签支持 `android.nfc.tech.Ndef`，您可以执行以下操作来更直接地获取\
  \ NDEF 数据：\n\n```java\nNdefMessage[] ndefMsgs = intent.getParcelableArrayExtra(NfcAdapter.EXTRA_NDEF_MESSAGES);\n\
  ```\n\n理论上，如果意图中没有 NDEF 消息，您可能会得到一个空值。否则，您现在应该能够解析发送给您的 NDEF 消息。您可以从意图中读取 `NdefMessages`，对其进行计数，并为每条消息检索其中包含的\
  \ `NdefRecords`。\n\n`NdefRecords` 正是事情变得有趣的地方。强烈建议您参考位于此处的 NFC 规范：`http://www.nfc-forum.org/specs/`。要访问这些规范，您需要接受\
  \ NFC 论坛的许可协议。该协议是免费的，但您需要提供您的姓名、地址、电话号码和电子邮件地址。另一种选择是查看 Google 提供的 `NfcDemo` 应用程序。该示例包含在\
  \ Android 2.3.3 SDK 包的 `samples` 文件夹下。您也可以在此处查看该应用的源代码：`http://developer.android.com/resources/samples/NFCDemo/index.html`。这个示例应用程序接收\
  \ NFC 意图，并在一个 `ListView` 中显示 `NdefRecords` 的内容。之所以变得复杂，是因为每条 `NdefMessage` 中可能接收多种类型的\
  \ `NdefRecords`。每种类型都有不同的用途。例如，Text 类型包含指定语言中的文本。Uri 类型包含一个 URI。在已知的 NDEF 记录类型中，`NfcDemo`\
  \ 示例应用程序只使用了三种，即刚才描述的两种以及 SmartPoster，我们稍后将对其进行描述。\n\n`NdefRecord` 的格式包括一个 3 位的类型名称格式（`TNF`）字段、一个可变长度的类型字段、一个可变长度的\
  \ ID 字段以及一个可变长度的负载字段。是的，有两个类型字段。`TNF` 字段是该记录的顶级类型，并告诉您该记录的其余部分是什么。例如，它可能是一个绝对 URI\
  \ 记录（`TNF_ABSOLUTE_URI`），或者一个官方的 RTD 记录（`TNF_WELL_KNOWN`）。下一个类型字段根据 `TNF` 的值，更具体地说明该记录是什么。如果\
  \ `TNF` 值是 `TNF_WELL_KNOWN`，那么下一个类型字段将是 `NdefRecord` 类的 `RTD_*` 常量之一，例如 `RTD_SMART_POSTER`。如果\
  \ `TNF` 值是 `TNF_ABSOLUTE_URI`，那么下一个类型字段将遵循 RFC 3986 定义的绝对 URI 的 BNF 结构。\n\n**注意：**\
  \ `TNF_UNCHANGED` 记录类型用于当消息负载因其大小而跨越多个 `NdefRecords` 时。Google 已经为您处理了分块的 `NdefRecords`，因此您永远不应该看到\
  \ `TNF_UNCHANGED` 的类型值。`android.nfc` 包会将负载的各个部分组合成一个大的、单一的 `NdefRecord`。\n\n`NdefRecord`\
  \ 中的下一个字段是该 `NdefRecord` 的标识符。您正在读取的 `NdefRecord` 可能有也可能没有标识符。\n\n最后是负载。这可能是一个相当大的字节数组，但其内部有一定的结构，您必须了解，这取决于它是哪种类型的\
  \ `NdefRecord`。对于 RTD URI 记录类型，负载字节数组的第一个字节代表 URI 的开始部分。例如，字节值 `1` 代表 `http://www.`，并且这将紧接着负载中剩余的\
  \ URI 部分。对于 Text 记录类型，负载字节数组的第一个字节代表“状态字节编码”值，该值标识文本编码值（UTF-8 或 UTF-16），以及紧接在该状态字段之后的语言字节数组的长度。语言字段之后是文本内容。对于\
  \ SmartPoster，情况变得更加复杂，`NdefRecord` 包含一个 `NdefMessage`，而 `NdefMessage` 又包含更多的 `NdefRecords`。底层的\
  \ `NdefRecords` 可以包括标题记录（就像 Text 记录）、URI 记录（和之前一样）、推荐操作记录、大小记录、图标记录和类型记录。推荐操作值指示您的应用程序可能想要对\
  \ SmartPoster 数据做什么。请注意，这些值并未作为 Android 的 `NdefRecord` 类文档的一部分提供。它们是：\n\n```\n    -1    未知\n\
      0    执行操作\n    1    保存供以后使用\n    2    打开进行编辑\n```\n\n如何处理它们取决于您，尽管显然您可能希望尝试执行针对正在读取的标签的推荐操作。例如，如果\
  \ `TNF` 是 `TNF_WELL_KNOWN`，类型是 `RTD_SMART_POSTER`，并且推荐操作是 `0`（`执行操作`）结合一个网页 URL，您可能希望用该\
  \ URL 启动浏览器。大小记录允许标签说明该 URL 另一端的内容有多大。如果标签指向一个可下载的可执行文件，大小记录可以说明下载文件的大小。图标记录包含一个图标图像，设备可以使用它来显示一个带有标题和\
  \ URI 的图像。\n\n类型记录是另一个类型值，不同于 `TNF` 和 `NdefRecord` 的类型。类型记录用于 SmartPoster 标签，在这种情况下，该类型表示\
  \ URI 另一端内容的 MIME 类型。设备可以决定它不支持该对象类型，从而一开始就避免下载它。\n\nSmartPoster 标签唯一强制性的子记录是 URI\
  \ 记录，并且每个 SmartPoster 只能有一个。可以有多个标题记录，只要每个记录对应不同的语言。也可以有多个图标记录，只要每个记录的格式具有不同的 MIME\
  \ 类型。\n\n\n\n对于所有类型的 NFC 标签，包括 NDEF 标签，你可以使用类似下面的代码来获取该特定标签类型的实例：\n\n```\nNfcA nfca\
  \ = NfcA.get(tag);\n```\n\n通过这个新对象，我们可以访问适用于该标签类型的特定方法。对于 `Ndef` 和 `NdefFormatable`\
  \ 标签，`NdefMessage` 和 `NdefRecord` 类在处理标签数据时非常有用。其他标签类也都有相应的方法来协助处理这些标签及其数据。有用于读取和写入标签数据的方法。请注意，写入标签与设备进行卡模拟是不同的。写入标签意味着设备距离某个其他标签足够近，以便能够向其写入数据（当然，需要具有适当的权限）。卡模拟则不同。\n\
  \n### NFC 卡模拟\n\n卡模拟是指设备在其他 NFC 读取器看来就像是一个 NFC 标签。这意味着我们的本地设备在硬件中有一个位置来存储一些数据，如果某个\
  \ NFC 读取器进入我们设备的范围并发起数据请求，我们的设备就会将该数据发送给读取器。在撰写本文时，此功能尚不可用，不过我们预计它最终会推出。如果你确实想进行卡模拟，请查看网络上描述如何在设备最低层级（即原生开发工具包，NDK\
  \ 层级）进行此操作的资源。\n\n### NFC 点对点 (P2P)\n\nAndroid SDK 对通过 NFC 在两个设备之间进行点对点 (P2P) 通信提供了一些有限支持。\n\
  \n此功能有一些注意事项，即 P2P 仅在你的应用程序运行并处于前台时才能工作，此外，你的应用程序必须使用 NDEF 格式。未来 P2P 可能会支持其他标签技术，但目前仅限于\
  \ NDEF。这也意味着，你的手机必须处于开机状态并运行你的应用程序，才能与其他设备进行 NFC 通信。\n\n要实现 P2P 功能，你将使用 `NfcAdapter`\
  \ 中名为 `enableForegroundNdefPush()` 的方法。此方法接受两个参数：活动（Activity）和当 NFC 设备请求我们的数据时要发送的\
  \ `NdefMessage`。与前面描述的前台调度系统类似，此方法应在 `onResume()` 中调用，并在 `onPause()` 中禁用。你的 `NdefMessage`\
  \ 可以是任何你希望的内容，但当读取器尝试获取我们的数据时，你的活动应处于前台。谷歌表示，为了让其他设备能够接收到我们的信息，它必须实现 `com.android.npp`\
  \ NDEF 推送协议，但在撰写本文时，还没有关于此协议的信息。请关注我们的网站以获取更新。\n\n前面我们介绍了 `uses-feature` 标签和传感器的使用，这样你可以确保设备拥有适当的传感器才能看到你的应用。NFC\
  \ 传感器也不例外。你应该在 `AndroidManifest.xml` 中使用以下内容，以确保你应用的设备具有必要的 NFC 硬件：\n\n```\n<uses-feature\
  \ android:name=\"android.hardware.nfc\" />\n```\n\n你还应确保 `AndroidManifest.xml` 文件包含适当的权限，以允许你的应用程序访问\
  \ NFC 硬件：\n\n```\n<uses-permission android:name=\"android.permission.NFC\" />\n\
  ```\n\n### 使用 NFCDemo 测试 NFC\n\n我们已经介绍了 Android 的大部分 NFC API，但现在的问题是，你如何测试你的应用程序？对于\
  \ NFC 标签，也许你可以找一些已经内置了 NFC 标签的物品。在那些已经使用 NFC 一段时间的国家，这可能并不太难。在美国，这可能会困难得多。你可以购买自己的\
  \ NFC 标签；全球有数家供应商销售标签以及开发者套件，这样你就可以将想要的内容写入标签。不幸的是，DDMS 目前还不支持向模拟器发送标签发现意图。Android\
  \ SDK 中提供的 `NfcDemo` 示例应用程序最初是在 Android 2.3 中发布的，当时意图只有 `ACTION_TAG_DISCOVERED`。Android\
  \ 在 2.3.3 版本中进步了很多，但遗憾的是 `NfcDemo` 未能跟上。其中包含一些关于 NFC 标签布局以及 NDEF 标签的字节含义的有用信息。希望它能尽快得到更新，并能与真实标签以及新的\
  \ NFC 生态系统配合使用。\n\n如果你决定加载 `NfcDemo` 示例应用程序，你将需要向项目添加一个外部库。该库的下载文件位于：[`http://code.google.com/p/guava-libraries/`](http://code.google.com/p/guava-libraries/)。打开\
  \ zip 文件后，你会找到 jar 文件。将 guava jar 文件（不含 gwt 的那个）保存到你的工作站。你需要通过右键单击项目，选择\"构建路径\"\
  ，然后选择\"配置构建路径\"和\"库\"选项卡，来从 Eclipse 项目中引用该 guava jar 文件。接下来，单击\"添加外部 JAR\"，导航到 guava\
  \ jar 文件，选择它并单击\"打开\"。现在，通过右键单击项目并选择\"构建项目\"来重新构建 `NfcDemo` 项目。\n\n### 总结\n\n在本章中，我们介绍了\
  \ Android 中主要的传感器框架以及近场通信功能。我们展示了你的应用程序如何读取传感器值并对其做出响应。这应该有助于你开发一些能够响应真实世界的非常酷的应用程序。\n\
  \n## 第 27 章：探索联系人 API\n\n在第 4 章（内容提供者）中，我们列举了通过内容提供者抽象公开数据的好处，并展示了这种抽象数据以一系列 URL\
  \ 的形式公开，这些 URL 可用于读取、查询、更新、插入和删除。这些 URL 及其对应的游标构成了该内容提供者的 API。\n\n联系人 API 就是这样一种用于处理联系人数据的内容提供者\
  \ API。Android 中的联系人维护在一个数据库中，并通过一个内容提供者公开，该内容提供者的权限根植于\n\n`content://com.android.contacts`\n\
  \nAndroid SDK 使用一组以 Java 包\n\n`android.provider.ContactsContract`\n\n为根目录的 Java\
  \ 接口和类，记录了该联系人内容提供者提供的各种契约。\n\n你会看到许多父上下文为 `ContactsContract` 的类，它们在从内容数据库中查询、读取、更新和插入联系人时非常有用。使用联系人\
  \ API 的主要文档可在 Android 网站上的以下位置找到：\n\n`http://developer.android.com/resources/articles/contacts.html`\n\
  \n主要的 API 入口点 `ContactsContract` 被恰当地命名，因为该类定义了联系人客户端与联系人数据库提供者和保护者之间的契约。\n\n本章将相当详细地探讨这个契约，但不会涵盖所有细微之处。联系人\
  \ API 很庞大，其触角延伸得很广。然而，当你接触联系人 API 时，可能需要几周的研究才能意识到其底层结构其实很简单。这正是我们最想贡献的，在阅读本章所需的时间内解释这些基础知识。\n\
  \n\n\n### 理解账户\n\nAndroid 中的所有联系人都在账户的上下文中工作。什么是账户？例如，如果你通过 Google 使用电子邮件，你就拥有了一个\
  \ Google 账户。如果你将自己设置为 Facebook 的用户，你就拥有了一个 Facebook 账户。\n\n即使你只使用 Google 的电子邮件服务，相同的登录名和密码也可用于访问其他\
  \ Google 服务，这意味着你在 Google 的电子邮件账户并不仅限于电子邮件。然而，有些账户仅限于单一类型的服务，例如 POP（邮局协议）电子邮件账户。在你的移动设备上，你可能能够注册各种基于账户的服务。\n\
  \n你将能够通过设备上的“账户与同步”设置选项来设置其中一些账户，例如 Google、Facebook 或企业 Microsoft Exchange 账户。请参阅\
  \ *Android 用户指南* 以获取有关账户的更多详细信息。我们在本章末尾的“参考资料”部分中包含了 *Android 用户指南* 的网址。\n\n####\
  \ 账户屏幕快速浏览\n\n为了巩固账户的性质，让我们向你展示模拟器中的几个与账户相关的屏幕。首先，图 27–1 显示了账户设置选项屏幕。\n\n![images](img/2701.jpg)\n\
  \n**图 27–1.** *调用“账户与同步”应用程序设置*\n\n当你选择“账户与同步”菜单项时，你将看到 图 27–2 中所示的“账户与同步设置”屏幕。此屏幕显示了一些基于账户的选项以及可用账户的列表。\n\
  \n![images](img/2702.jpg)\n\n**图 27–2.** *账户与同步设置*\n\n在 图 27–2 中，我们主要对可用账户列表感兴趣。为了练习添加新账户，请点击“添加账户”按钮，你将看到\
  \ 图 27–3 中的屏幕，其中列出了可以设置或添加的可能账户。\n\n![images](img/2703.jpg)\n\n**图 27–3.** *可以设置的账户列表*\n\
  \n此可添加的账户列表将根据设备类型和可用内容而变化。图 27–3 中的列表显示了当 Android 2.3 模拟器以 Google API 9 为目标进行设置时可用的内容。如果你只下载了核心\
  \ SDK，则在此模拟器中看不到选择 Google API 作为目标的选项，因此你在 图 27–3 中不会看到设置 Google 账户的选项。这也意味着，此可用账户的图片可能随每个\
  \ Android 版本、设备制造商以及运营商或服务提供商而改变。\n\n此外，每个账户需要设置的字段也因账户提供商而异。例如，如果你在我们的模拟器示例中点击添加\
  \ Google 账户，你将看到创建或登录 Google 账户的选项（参见 图 27–4）。\n\n![images](img/2704.jpg)\n\n**图\
  \ 27–4.** *添加 Google 账户*\n\n如果你点击“创建”按钮，将出现创建 Google 账户所需的字段，如 图 27–5 所示。\n\n![images](img/2705.jpg)\n\
