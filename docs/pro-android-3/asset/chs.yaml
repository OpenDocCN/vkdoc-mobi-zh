  \ 渲染正方形\n\n现在我们已经了解了基本构建块，让我们看看如何使用四边的 `RegularPolygon` 来绘制一个正方形。列表 20-27 展示了 `SquareRenderer`\
  \ 的代码。\n\n**列表 20-27.** *SquareRenderer*\n\n```\npublic class SquareRenderer extends\
  \ AbstractRenderer\n{\n    //一个用于保存点坐标的原始本地缓冲区\n    private FloatBuffer mFVertexBuffer;\n\
  \n    //一个用于保存索引的原始本地缓冲区\n    //允许复用顶点。\n    private ShortBuffer mIndexBuffer;\n\
  \n    private int numOfIndices = 0;\n\n    private int sides = 4;\n\n    public\
  \ SquareRenderer(Context context)\n    {\n        prepareBuffers(sides);\n    }\n\
  \n    private void prepareBuffers(int sides)\n    {\n        RegularPolygon t =\
  \ new RegularPolygon(0,0,0,0.5f,sides);\n        //RegularPolygon t = new RegularPolygon(1,1,0,1,sides);\n\
  \        this.mFVertexBuffer = t.getVertexBuffer();\n        this.mIndexBuffer =\
  \ t.getIndexBuffer();\n        this.numOfIndices = t.getNumberOfIndices();\n   \
  \     this.mFVertexBuffer.position(0);\n        this.mIndexBuffer.position(0);\n\
  \    }\n\n   //重写的方法\n    protected void draw(GL10 gl)\n    {\n        prepareBuffers(sides);\n\
  \       gl.glVertexPointer(3, GL10.GL_FLOAT, 0, mFVertexBuffer);\n       gl.glDrawElements(GL10.GL_TRIANGLES,\
  \ this.numOfIndices,\n                GL10.GL_UNSIGNED_SHORT, mIndexBuffer);\n \
  \   }\n}\n```\n\n这段代码应该相当清晰。我们继承自 `AbstractRenderer`（参见列表 20-9），重写了 `draw` 方法，并使用\
  \ `RegularPolygon` 绘制出了一个正方形。\n\n一旦这个正方形渲染器类就绪，我们可以将列表 20-28 中的条件判断代码添加到列表 20-12\
  \ 的 `MultiViewTestHarness` 中。\n\n**列表 20-28.** *使用 `SimpleRectangleRenderer`*\n\n\
  ```\nif (mid == R.id.mid_square_polygon)\n{\n     mTestHarness.setRenderer(new SquareRenderer(this));\n\
  \     mTestHarness.setRenderMode(GLSurfaceView.RENDERMODE_WHEN_DIRTY);\n     setContentView(mTestHarness);\n\
  \     return;\n}\n```\n\n添加这段代码后，我们可以再次运行程序，并选择“Square Polygon”菜单选项，即可在图 20-8 中看到这个正方形。\n\
  \n![images](img/2008.jpg)\n\n**图 20-8.** *一个绘制为正多边形的正方形*\n\n### 为 `RegularPolygon`\
  \ 添加动画\n\n现在我们已经探索了通过 `RegularPolygon` 通用绘制形状的基本概念，让我们更进一步。我们看看能否使用一个动画，从一个三角形开始，通过使用一个边数约每四秒增加一次的多边形，最终变成一个圆形。相关代码见列表\
  \ 20-29。\n\n**列表 20-29.** *`PolygonRenderer`*\n\n```\npublic class PolygonRenderer\
  \ extends AbstractRenderer\n{\n   //我们想要使用的点或顶点数量\n    private final static int\
  \ VERTS = 4;\n\n    //一个用于保存点坐标的原始本地缓冲区\n    private FloatBuffer mFVertexBuffer;\n\
  \n    //一个用于保存索引的原始本地缓冲区\n    //允许复用顶点。\n    private ShortBuffer mIndexBuffer;\n\
  \n    private int numOfIndices = 0;\n\n    private long prevtime = SystemClock.uptimeMillis();\n\
  \n    private int sides = 3;\n\n    public PolygonRenderer(Context context)\n  \
  \  {\nprepareBuffers(sides);\n    }\n\n    private void prepareBuffers(int sides)\n\
  \    {\n         RegularPolygon t = new RegularPolygon(0,0,0,1,sides);\nthis.mFVertexBuffer\
  \ = t.getVertexBuffer();\n        this.mIndexBuffer = t.getIndexBuffer();\n    \
  \    this.numOfIndices = t.getNumberOfIndices();\n        this.mFVertexBuffer.position(0);\n\
  \        this.mIndexBuffer.position(0);\n    }\n\n   //重写的方法\n    protected void\
  \ draw(GL10 gl)\n    {\n        long curtime = SystemClock.uptimeMillis();\n   \
  \     if ((curtime - prevtime) > 2000)\n        {\n           prevtime = curtime;\n\
  \           sides += 1;\n           if (sides > 20)\n           {\n            \
  \  sides = 3;\n           }\n            this.prepareBuffers(sides);\n        }\n\
  gl.glColor4f(1.0f, 0, 0, 0.5f);\n       gl.glVertexPointer(3, GL10.GL_FLOAT, 0,\
  \ mFVertexBuffer);\n       gl.glDrawElements(GL10.GL_TRIANGLES, this.numOfIndices,\n\
  \                GL10.GL_UNSIGNED_SHORT, mIndexBuffer);\n    }\n}\n```\n\n这段代码所做的就是每四秒改变一次\
  \ `sides` 变量。动画效果源于 `Renderer` 注册到 SurfaceView 的方式。\n\n一旦我们有了这个渲染器，就需要将列表 20-30\
  \ 中的代码添加到 `MultiviewTestHarness` 代码中。\n\n**列表 20-30.** *用于测试多边形的菜单项*\n\n```\nif\
  \ (mid == R.id.mid_polygon)\n{\n      mTestHarness.setRenderer(new PolygonRenderer(this));\n\
  \      setContentView(mTestHarness);\n      return;\n}\n```\n\n如果我们再次运行程序并选择“Polygon”菜单项，我们将看到一组不断变换的多边形，其边数持续增加。观察多边形随时间的变化过程很有启发意义。图\
  \ 20-9 显示了一个循环开始阶段的六边形。\n\n![images](img/2009.jpg)\n\n**图 20-9.** *多边形绘制循环开始时的六边形*\n\
  \n图 20-10 显示了循环结束阶段的情况。\n\n![images](img/2010.jpg)\n\n**图 20-10.** *一个绘制为正多边形的圆形*\n\
  \n你可以将这种抽象形状的概念扩展到更复杂的形状，甚至扩展到场景图，场景图由许多通过某种 XML 定义的其他对象组成，然后通过这些实例化对象在 OpenGL 中渲染它们。\n\
  \n现在，让我们继续讨论纹理，看看如何将粘贴壁纸的概念集成到我们迄今为止绘制的表面（例如正方形和多边形）上。\n\n## 纹理操作\n\n纹理是 OpenGL\
  \ 中的另一个核心主题。OpenGL 纹理有许多细微之处。本章仅介绍基础知识，以便你能够开始使用 OpenGL 纹理。请利用本章末尾提供的资源进一步深入研究纹理。\n\
  \n### 理解纹理\n\nOpenGL 纹理是一种贴附在 OpenGL 表面上的位图。（在本章中，我们只介绍表面。）例如，你可以拿一张邮票的图像，将其粘贴到一个正方形上，使该正方形看起来像一张邮票。或者，你可以拿一块砖的位图，将其粘贴到一个矩形上并重复砖块图像，使该矩形看起来像一堵砖墙。\n\
  \n将纹理位图附加到 OpenGL 表面的过程，类似于将一块壁纸（正方形形状）粘贴到规则或不规则形状物体侧面的过程。只要选择的壁纸足够大能够覆盖表面，表面的形状并不重要。\n\
  \n然而，为了对齐壁纸使图像正确排列，你必须获取形状的每个顶点，并在壁纸上精确标记该顶点，以便壁纸和物体形状完全同步。如果形状奇特且有多个顶点，每个顶点也需要在你的壁纸上标记。\n\
  \n另一种看待这个问题的方式是，想象你将物体面朝上放在地上，将壁纸放在它上面，然后旋转壁纸，直到图像对准正确的方向。现在在形状的每个顶点处刺穿壁纸。取下壁纸，查看孔洞的位置，并假设壁纸已校准，记下它们在壁纸上的坐标。这些坐标被称为*纹理坐标*。\n\
  \n\n\n### 标准化纹理坐标\n\n一个未解决或未提及的细节是物体和纸张的尺寸。OpenGL 采用标准化方法来解决这个问题。OpenGL 假设纸张始终是一个`1\
  \ × 1`的正方形，其原点位于`(0,0)`，右上角位于`(1,1)`。然后 OpenGL 要求你将物体表面缩小，使其适合这个`1 × 1`的边界。因此，程序员需要计算出物体表面在`1\
  \ × 1`正方形内的顶点坐标。\n\n在设计清单 20–26 中的`RegularPolygon`时，我们使用类似的方法绘制了一个多边形，假设它是一个半径为\
  \ 1 个单位的圆。然后我们计算出每个顶点的位置。如果我们假设这个圆位于一个`1 × 1`的正方形内，那么那个正方形就可以作为我们的纸。因此，计算纹理坐标与计算多边形顶点坐标非常相似。这就是为什么清单\
  \ 20–26 中包含了以下用于计算纹理坐标的函数：\n\n`calcTextureArray()`\n`getTextureBuffer()`\n\n如果你留意到，`calcTextureArrays`和`calcArrays`方法中的其他所有函数都是通用的。在学习\
  \ OpenGL 时，顶点坐标和纹理坐标之间的这种共通性值得注意。\n\n### 抽象通用纹理处理\n\n一旦你理解了纹理坐标与顶点坐标之间的映射关系，并能计算出纹理贴图的坐标，剩下的就很简单了（在\
  \ OpenGL 中，没有什么是可以大胆地说“非常简单”的！）。后续工作包括将纹理位图加载到内存中，并为其分配一个纹理 ID，以便以后可以重用该纹理。然后，为了允许同时加载多个纹理，我们需要一种通过指定\
  \ ID 来设置当前纹理的机制。在绘制管线中，你需要将纹理坐标与绘制坐标一起指定，然后进行绘制。\n\n由于加载纹理的过程相当通用，我们通过创建一个继承自`AbstractRenderer`的抽象类`SingleAbstractTextureRenderer`来抽象这个过程。\n\
  \n清单 20–31 显示了为单个纹理抽象所有设置代码的源代码。\n\n**清单 20–31.** *抽象化单纹理支持*\n\n```java\npublic\
  \ abstract class AbstractSingleTexturedRenderer\nextends AbstractRenderer\n{\n \
  \  int mTextureID;\n   int mImageResourceId;\n   Context mContext;\n   public AbstractSingleTexturedRenderer(Context\
  \ ctx,\n                                        int imageResourceId) {\n      mImageResourceId\
  \ = imageResourceId;\n      mContext = ctx;\n   }\n\n    public void onSurfaceCreated(GL10\
  \ gl, EGLConfig eglConfig) {\n        super.onSurfaceCreated(gl, eglConfig);\n \
  \       gl.glEnable(GL10.GL_TEXTURE_2D);\n        prepareTexture(gl);\n    }\n \
  \   private void prepareTexture(GL10 gl)\n    {\n        int[] textures = new int[1];\n\
  \        gl.glGenTextures(1, textures, 0);\n\n        mTextureID = textures[0];\n\
  \        gl.glBindTexture(GL10.GL_TEXTURE_2D, mTextureID);\n\n        gl.glTexParameterf(GL10.GL_TEXTURE_2D,\
  \ GL10.GL_TEXTURE_MIN_FILTER,\n                GL10.GL_NEAREST);\n        gl.glTexParameterf(GL10.GL_TEXTURE_2D,\n\
  \                GL10.GL_TEXTURE_MAG_FILTER,\n                GL10.GL_LINEAR);\n\
  \n        gl.glTexParameterf(GL10.GL_TEXTURE_2D, GL10.GL_TEXTURE_WRAP_S,\n     \
  \           GL10.GL_CLAMP_TO_EDGE);\n        gl.glTexParameterf(GL10.GL_TEXTURE_2D,\
  \ GL10.GL_TEXTURE_WRAP_T,\n                GL10.GL_CLAMP_TO_EDGE);\n\n        gl.glTexEnvf(GL10.GL_TEXTURE_ENV,\
  \ GL10.GL_TEXTURE_ENV_MODE,\n                GL10.GL_REPLACE);\n\n        InputStream\
  \ is = mContext.getResources()\n                .openRawResource(this.mImageResourceId);\n\
  \        Bitmap bitmap;\n        try {\n            bitmap = BitmapFactory.decodeStream(is);\n\
  \        } finally {\n            try {\n                is.close();\n         \
  \   } catch(IOException e) {\n                // 忽略。\n            }\n        }\n\
  \n        GLUtils.texImage2D(GL10.GL_TEXTURE_2D, 0, bitmap, 0);\n        bitmap.recycle();\n\
  \    }\n\n    public void onDrawFrame(GL10 gl)\n    {\n        gl.glDisable(GL10.GL_DITHER);\n\
  \        gl.glTexEnvx(GL10.GL_TEXTURE_ENV, GL10.GL_TEXTURE_ENV_MODE,\n         \
  \       GL10.GL_MODULATE);\n\n        gl.glClear(GL10.GL_COLOR_BUFFER_BIT | GL10.GL_DEPTH_BUFFER_BIT);\n\
  \        gl.glMatrixMode(GL10.GL_MODELVIEW);\n        gl.glLoadIdentity();\n   \
  \     GLU.gluLookAt(gl, 0, 0, -5, 0f, 0f, 0f, 0f, 1.0f, 0.0f);\n\n        gl.glEnableClientState(GL10.GL_VERTEX_ARRAY);\n\
  \n        gl.glEnableClientState(GL10.GL_TEXTURE_COORD_ARRAY);\n\n        gl.glActiveTexture(GL10.GL_TEXTURE0);\n\
  \        gl.glBindTexture(GL10.GL_TEXTURE_2D, mTextureID);\n        gl.glTexParameterx(GL10.GL_TEXTURE_2D,\
  \ GL10.GL_TEXTURE_WRAP_S,\n                GL10.GL_REPEAT);\n        gl.glTexParameterx(GL10.GL_TEXTURE_2D,\
  \ GL10.GL_TEXTURE_WRAP_T,\n                GL10.GL_REPEAT);\n\n        draw(gl);\n\
  \    }\n}\n```\n\n在这段代码中，单个纹理（位图）在`onSurfaceCreated`方法中被加载和准备。`onDrawFrame`中的代码，就像`AbstractRenderer`一样，设置了绘制空间的尺寸，以确保我们的坐标有意义。你可以根据自己的情况修改这段代码，以找出最优的观察体积。\n\
  \n请注意，构造函数接收一个纹理位图，并将其准备好以供后续使用。根据你拥有多少个纹理，你可以相应地设计你的抽象类。\n\n如清单 20–31 所示，需要以下与纹理相关的\
  \ API：\n\n> *`glGenTextures`*: 这个 OpenGL 方法负责为纹理生成唯一的 ID，以便以后可以引用这些纹理。一旦我们通过`GLUtils.texImage2D`加载了纹理位图，我们就会将该纹理绑定到一个特定的\
  \ ID。在纹理被绑定到由`glGenTextures`生成的 ID 之前，该 ID 仅仅是一个 ID。OpenGL 文献将这些整数 ID 称为*纹理名称*。\n\
  > \n> *`glBindTexture`*: 我们使用这个 OpenGL 方法将当前加载的纹理绑定到从`glGenTextures`获取的纹理 ID 上。\n\
  > \n> *`glTexParameter`*: 在应用纹理时，我们可以设置许多可选参数。这个 API 允许我们定义这些选项。一些示例包括`GL_REPEAT`、`GL_CLAMP`等。例如，`GL_REPEAT`允许我们在物体尺寸较大时多次重复该位图。这些参数的完整列表可以在[`www.khronos.org/opengles/documentation/opengles1_0/html/glTexParameter.html`](http://www.khronos.org/opengles/documentation/opengles1_0/html/glTexParameter.html)找到。\n\
  > \n> *`glTexEnv`*: 其他一些与纹理相关的选项通过`glTexEnv`方法指定。一些示例值包括`GL_DECAL`、`GL_MODULATE`、`GL_BLEND`、`GL_REPLACE`等。例如，在`GL_DECAL`的情况下，纹理覆盖底层对象。`GL_MODULATE`，顾名思义，调制而不是替换底层颜色。请参考以下\
  \ URL 获取此 API 选项的完整列表：[`www.khronos.org/opengles/documentation/opengles1_0/html/glTexEnv.html`](http://www.khronos.org/opengles/documentation/opengles1_0/html/glTexEnv.html)。\n\
  > \n> *`GLUtils.texImage2D`*: 这是一个 Android API，允许我们加载位图以用于纹理目的。在内部，此 API 会调用 OpenGL\
  \ 的`glTexImage2D`。\n> \n> *`glActiveTexture`*: 这将给定的纹理 ID 设置为活动结构。\n> \n> *`glTexCoordpointer`*:\
  \ 这个 OpenGL 方法用于指定纹理坐标。每个坐标必须与`glVertexPointer`中指定的坐标匹配。\n\n你可以从 OpenGL ES 参考文档中查阅大多数这些\
  \ API，该文档位于：\n\n`www.khronos.org/opengles/documentation/opengles1_0/html/index.html`\n\
  \n\n\n### 使用纹理进行绘制\n\n一旦位图被加载并设置为纹理，我们就应该能够利用 `RegularPolygon`，并使用纹理坐标和顶点坐标来绘制一个带纹理的正多边形。清单\
  \ 20–32 展示了实际的绘制类，用于绘制一个带纹理的正方形。\n\n**清单 20–32.** *TexturedSquareRenderer*\n\n```\n\
  public class TexturedSquareRenderer extends AbstractSingleTexturedRenderer\n{\n\
  \   //Number of points or vertices we want to use\n    private final static int\
  \ VERTS = 4;\n\n    //A raw native buffer to hold the point coordinates\n    private\
  \ FloatBuffer mFVertexBuffer;\n\n    //A raw native buffer to hold the point coordinates\n\
  \    private FloatBuffer mFTextureBuffer;\n\n    //A raw native buffer to hold indices\n\
  \    //allowing a reuse of points.\n    private ShortBuffer mIndexBuffer;\n\n  \
  \  private int numOfIndices = 0;\n\n    private int sides = 4;\n\n    public TexturedSquareRenderer(Context\
  \ context)\n    {\n       super(context,com.androidbook.OpenGL.R.drawable.robot);\n\
  \       prepareBuffers(sides);\n    }\n\n    private void prepareBuffers(int sides)\n\
  \    {\n       RegularPolygon t = new RegularPolygon(0,0,0,0.5f,sides);\n      \
  \ this.mFVertexBuffer = t.getVertexBuffer();\n       this.mFTextureBuffer = t.getTextureBuffer();\n\
  \       this.mIndexBuffer = t.getIndexBuffer();\n       this.numOfIndices = t.getNumberOfIndices();\n\
  \       this.mFVertexBuffer.position(0);\n       this.mIndexBuffer.position(0);\n\
  \       this.mFTextureBuffer.position(0);\n\n    }\n\n   //overriden method\n  \
  \  protected void draw(GL10 gl)\n    {\n        prepareBuffers(sides);\n       \
  \ gl.glEnable(GL10.GL_TEXTURE_2D);\n        gl.glVertexPointer(3, GL10.GL_FLOAT,\
  \ 0, mFVertexBuffer);\n        gl.glTexCoordPointer(2, GL10.GL_FLOAT, 0, mFTextureBuffer);\n\
  \        gl.glDrawElements(GL10.GL_TRIANGLES, this.numOfIndices,\n             \
  \   GL10.GL_UNSIGNED_SHORT, mIndexBuffer);\n    }\n}\n```\n\n如你所见，大部分繁重的工作都由抽象的纹理渲染器类和\
  \ `RegularPolygon` 完成，后者负责计算纹理映射顶点（参见清单 20–26）。\n\n一旦我们有了这个渲染器，就需要将清单 20–33 中的代码添加到清单\
  \ 20–12 的 `MultiviewTestHarness`中，以测试带纹理的正方形。\n\n**清单 20–33.** *响应带纹理正方形的菜单项*\n\n\
  ```\nif (mid == R.id.mid_textured_square)\n{\n      mTestHarness.setRenderer(new\
  \ TexturedSquareRenderer(this));\n      mTestHarness.setRenderMode(GLSurfaceView.RENDERMODE_WHEN_DIRTY);\n\
  \      setContentView(mTestHarness);\n      return;\n}\n```\n\n现在，如果我们再次运行程序并选择“带纹理的正方形”菜单项，将会看到绘制出的带纹理的正方形，如图\
  \ Figure 20–11 所示。\n\n![images](img/2011.jpg)\n\n**图 20–11.** *带纹理的正方形*\n\n## 绘制多个图形\n\
  \n到目前为止，本章中的每个示例都涉及按照标准模式绘制一个简单图形。该模式是：设置顶点、加载纹理、设置纹理坐标，然后绘制单个图形。如果我们想绘制两个图形，会发生什么？如果我们想使用传统的指定顶点的方法绘制一个三角形，然后使用诸如\
  \ `RegularPolygon` 等形状绘制一个多边形，该如何处理？我们如何指定组合顶点？我们是否需要为两个对象一次性指定顶点，然后调用绘制方法？\n\n\
  事实证明，在 Android OpenGL 渲染器接口的两次 `draw()` 调用之间，OpenGL 允许我们执行多次 `glDraw` 方法。在这多次 `glDraw`\
  \ 方法之间，我们可以设置新的顶点和纹理。一旦 `draw()` 方法完成，所有这些绘制方法便会显示到屏幕上。\n\n还有另一个技巧可用于使用 OpenGL 绘制多个图形。考虑我们迄今创建的多边形。这些多边形能够通过将原点作为输入，在任何原点处渲染自身。事实证明，OpenGL\
  \ 原生支持此功能，它允许我们始终在 `(0,0,0)` 处指定一个 `RegularPolygon`，然后通过 OpenGL 的“平移”机制将其从原点移动到所需位置。我们可以对另一个多边形重复相同的操作，并将其平移到不同位置，从而在屏幕上的两个不同位置绘制两个多边形。\n\
  \n清单 20–34 通过多次绘制带纹理的多边形来演示这些概念。\n\n**清单 20–34.** *带纹理的多边形渲染器*\n\n```\npublic class\
  \ TexturedPolygonRenderer extends AbstractSingleTexturedRenderer\n{\n   //Number\
  \ of points or vertices we want to use\n    private final static int VERTS = 4;\n\
  \n    //A raw native buffer to hold the point coordinates\n    private FloatBuffer\
  \ mFVertexBuffer;\n\n    //A raw native buffer to hold the point coordinates\n \
  \   private FloatBuffer mFTextureBuffer;\n\n    //A raw native buffer to hold indices\n\
  \    //allowing a reuse of points.\n    private ShortBuffer mIndexBuffer;\n\n  \
  \  private int numOfIndices = 0;\n\n    private long prevtime = SystemClock.uptimeMillis();\n\
  \   private int sides = 3;\n\n    public TexturedPolygonRenderer(Context context)\n\
  \    {\n       super(context,com.androidbook.OpenGL.R.drawable.robot);\nprepareBuffers(sides);\n\
  \    }\n\n    private void prepareBuffers(int sides)\n    {\n    RegularPolygon\
  \ t = new RegularPolygon(0,0,0,0.5f,sides);\nthis.mFVertexBuffer = t.getVertexBuffer();\n\
  \    this.mFTextureBuffer = t.getTextureBuffer();\n    this.mIndexBuffer = t.getIndexBuffer();\n\
  \    this.numOfIndices = t.getNumberOfIndices();\n    this.mFVertexBuffer.position(0);\n\
  \    this.mIndexBuffer.position(0);\n    this.mFTextureBuffer.position(0);\n   \
  \ }\n\n   //overriden method\n    protected void draw(GL10 gl)\n    {\n        long\
  \ curtime = SystemClock.uptimeMillis();\n        if ((curtime - prevtime) > 2000)\n\
  \        {\n           prevtime = curtime;\n           sides += 1;\n           if\
  \ (sides > 20)\n           {\n              sides = 3;\n           }\n         \
  \   this.prepareBuffers(sides);\n        }\n        gl.glEnable(GL10.GL_TEXTURE_2D);\n\
  \n        //Draw once to the left\n        gl.glVertexPointer(3, GL10.GL_FLOAT,\
  \ 0, mFVertexBuffer);\n        gl.glTexCoordPointer(2, GL10.GL_FLOAT, 0, mFTextureBuffer);\n\
  \n        gl.glPushMatrix();\n        gl.glScalef(0.5f, 0.5f, 1.0f);\n        gl.glTranslatef(0.5f,0,\
  \ 0);\n        gl.glDrawElements(GL10.GL_TRIANGLES, this.numOfIndices,\n       \
  \         GL10.GL_UNSIGNED_SHORT, mIndexBuffer);\n\n        //Draw again to the\
  \ right\n        gl.glPopMatrix();\n        gl.glPushMatrix();\n        gl.glScalef(0.5f,\
  \ 0.5f, 1.0f);\n        gl.glTranslatef(-0.5f,0, 0);\n        gl.glDrawElements(GL10.GL_TRIANGLES,\
  \ this.numOfIndices,\n                GL10.GL_UNSIGNED_SHORT, mIndexBuffer);\n \
  \       gl.glPopMatrix();\n    }\n}\n```\n\n\n\n本示例演示了以下概念：\n\n> 使用形状进行绘制。\n> \n\
  > 使用变换矩阵绘制多个形状。\n> \n> 提供纹理。\n> \n> 提供动画。\n\n清单 20–34 中负责多次绘制的核心代码位于 `draw()` 方法内。我们已在方法中高亮显示了相关行。请注意，在一次\
  \ `draw()` 调用中，我们调用了两次 `glDrawElements`。每次调用都独立于另一次设置绘制图元。\n\n另需说明一点，即变换矩阵的使用。每次调用\
  \ `glDrawElements()` 时，都会使用一个特定的变换矩阵。若想通过修改此矩阵来改变图形的位置（或图形的任何其他属性），则需要将其恢复为原始矩阵，以便下一次绘制能够正确进行。这一操作通过\
  \ OpenGL 矩阵提供的压栈和出栈函数实现。\n\n准备好此渲染器后，需要将清单 20–35 中的代码添加到清单 20–12 的 `MultiviewTestHarness`\
  \ 中，以测试多图形的绘制。\n\n**清单 20–35.** *响应“多图”菜单项*\n\n```\nif (mid == R.id.mid_multiple_figures)\n\
  {\n      mTestHarness.setRenderer(new TexturedPolygonRenderer(this));\n      mTestHarness.setRenderMode(GLSurfaceView.RENDERMODE_CONTINUOUSLY);\n\
  \      setContentView(mTestHarness);\n      return;\n}\n```\n\n若再次运行程序并选择“Multiple\
  \ Figures”菜单项，则会在动画开始时看到两组变化的多边形被绘制出来（如图 20–12 所示）。（请注意，我们将渲染模式设置为了持续模式。）\n\n![images](img/2012.jpg)\n\
  \n**图 20–12.** *一对带纹理的多边形*\n\n图 20–13 展示了动画进行到中间阶段时的相同效果。\n\n![images](img/2013.jpg)\n\
  \n**图 20–13.** *一对带纹理的圆形*\n\n这总结了 OpenGL 中另一个重要概念。本节展示了如何累积多个不同的图形或场景，并协同绘制它们，从而使最终结果构成一个相当复杂的\
  \ OpenGL 场景。\n\n接下来，我们将讨论 Android 对 OpenGL ES 2.0 的支持。\n\n### OpenGL ES 2.0\n\n\
  好消息是，Android 不仅支持 OpenGL ES 2.0，而且从 Android 2.2（或 API 级别 8）开始，还为此 API 提供了 Java 绑定。但是，请记住以下限制：\n\
  \n> OpenGL ES 2.0 在模拟器上尚不被支持。\n> \n> 对于初学者来说，OpenGL ES 2.0 差异巨大，而且大多数 OpenGL 书籍正在出版新版本来涵盖\
  \ OpenGL 的这一方面。OpenGL ES 2.0 对 GPU（图形处理单元）提出的可编程性要求给模拟器带来了很多复杂性。因此，甚至不清楚 Android\
  \ 何时才能在模拟器上支持 OpenGL ES 2.0。\n> \n> 在 Android SDK 上测试/学习 OpenGL ES 2.0 的唯一方法是使用真实设备。大多数设备正在升级到\
  \ Android 2.2 的过程中。但是，很可能存在一些设备不支持 OpenGL ES 2.0。\n\nOpenGL ES 2.0 与 OpenGL ES 1.x\
  \ 截然不同。它不向后兼容。对于初学者来说，最大的不同在于其初始化以及学习如何绘制最简单图形的方式。\n\n要深入讲解 OpenGL ES 2.0 需要很大篇幅。相反，我们将为您介绍开始使用\
  \ ES 2.0 所需的基本初始化步骤。一旦您具备了此基本框架，就可以参考本章末尾的参考资料，将 OpenGL ES 2.0 应用到该框架中。\n\nOpenGL\
  \ ES 2.0 的强大之处在于能够为 GPU 编写程序，这些程序在运行时编译并解释如何绘制顶点和片段。这些程序被称为着色器。不幸的是，即使是最简单的 OpenGL\
  \ ES 2.0 程序，也需要这些着色器。从这个意义上说，理解着色器是学习 OpenGL ES 2.0 的必要条件。\n\n学习 OpenGL 着色语言是学习\
  \ OpenGL ES 2.0 的必要条件。我们在本章末尾提供了一些参考资料来帮助您。\n\n#### OpenGL ES 2.0 的 Java 绑定\n\n\
  Android 上此 API 的 Java 绑定位于 `android.opengl.GLES20` 包中。该类的所有函数都是静态的，并且对应于 Khronos\
  \ 规范中各自的 C API（URL 可在参考资料部分找到）。本书中为 OpenGL ES 1.0 引入的 `GLSurfaceView` 和相应的 `Renderer`\
  \ 抽象也同样适用于 OpenGL ES 2.0。我们很快会介绍这一点。关于这方面的文档，请参见 `GLSurfaceView.setEGLContextClientVersion`\
  \ 函数的 API 文档。\n\n首先，让我们看看如何通过清单 20–36 中的代码来判断设备或模拟器是否支持 OpenGL ES 2.0 这一版本。\n\n\
  **清单 20–36.** *检测 OpenGL ES 2.0 可用性*\n\n```\nprivate boolean detectOpenGLES20()\
  \ {\n       ActivityManager am =\n           (ActivityManager) getSystemService(Context.ACTIVITY_SERVICE);\n\
  \       ConfigurationInfo info = am.getDeviceConfigurationInfo();\n       return\
  \ (info.reqGlEsVersion >= 0x20000);\n}\n```\n\n拥有此函数（`detectOpenGLES20`）后，就可以在 Activity\
  \ 中使用 `GLSurfaceView`，如清单 20–37 所示。\n\n**清单 20–37.** *为 OpenGL ES 2.0 使用 GLSurfaceView*\n\
  \n```\n        if (detectOpenGLES20())\n        {\n            GLSurfaceView glView\
  \ = new GLSurfaceView(this);\n            // glView.setEGLConfigChooser(false);\n\
  \            glView.setEGLContextClientVersion(2);\n\n            glView.setRenderer(new\
  \ YourGLES20Renderer(this));\n            glView.setRenderMode(GLSurfaceView.RENDERMODE_WHEN_DIRTY);\n\
  \            setContentView(glView);\n        }\n```\n\n请注意如何通过将客户端版本设置为“2”来配置 `GLSurfaceView`\
  \ 以使用 OpenGL ES 2.0。然后，类 `YourGLESRenderer` 将类似于本章介绍的 `Renderer` 类。但是，在渲染器类的内部，您将使用\
  \ `GLES20` API 而不是 `GL10` API。\n\n在我们即将开发的示例中，此渲染器类被称为 `ES20SimpleTriangleRenderer`。我们很快就会介绍此类。但首先，让我们看一下清单\
  \ 20–38 中的 Activity 类，它结合了清单 20–36 和清单 20–37 中的代码片段。\n\n**清单 20–38.** *OpenGL20MultiViewTestHarness\
  \ Activity*\n\n```\npublic class OpenGL20MultiViewTestHarnessActivity extends Activity\n\
  {\n   final String tag=\"es20\";\n   private GLSurfaceView mTestHarness;\n    @Override\n\
  \    protected void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \n        if (detectOpenGLES20())\n        {\n            mTestHarness = new GLSurfaceView(this);\n\
  \            //不要调用以下函数\n            //mTestHarness.setEGLConfigChooser(false);\n\
  \            mTestHarness.setEGLContextClientVersion(2);\n        }\n        else\n\
  \        {\n            throw new RuntimeException(\"20 not supported\");\n    \
  \    }\n```\n\n\n\n```java\nIntent intent = getIntent();\nint mid = intent.getIntExtra(\"\
  com.ai.menuid\", R.id.MenuId_OpenGL15_Current);\nif (mid == R.id.mid_es20_triangle)\n\
  {\n    mTestHarness.setRenderer(new ES20SimpleTriangleRenderer(this));\n    mTestHarness.setRenderMode(GLSurfaceView.RENDERMODE_WHEN_DIRTY);\n\
  \    setContentView(mTestHarness);\n    return;\n}\nreturn;\n}\nprivate boolean\
  \ detectOpenGLES20() {\n    ActivityManager am =\n        (ActivityManager) getSystemService(Context.ACTIVITY_SERVICE);\n\
  \    ConfigurationInfo info = am.getDeviceConfigurationInfo();\n    return (info.reqGlEsVersion\
  \ >= 0x20000);\n}\n@Override\nprotected void onResume()    {\n    super.onResume();\n\
  \    mTestHarness.onResume();\n}\n@Override\nprotected void onPause() {\n    super.onPause();\n\
  \    mTestHarness.onPause();\n}\n```\n\n清单 20-38 中的 ES 2.0 测试框架 Activity 与我们之前在清单\
  \ 20-12 中展示的 ES 1.x 测试框架非常相似。您可能会疑惑为何不直接复用同一个并创建不同的菜单选项。促使我们另辟蹊径的原因有两个。\n\n第一个原因是我们不确定是否能在\
  \ ES 1.x 和 ES 2.x 菜单调用之间复用`SurfaceView`。我们只是为了安全起见。\n\n第二个原因是初始化方式不同，我们不希望将两者合并在一个类中而导致代码混淆。例如，在\
  \ ES 2.0 初始化时，我们需要检查支持的 ES 版本等；这类代码会使得清单 20-12 中更简单的 ES 1.x 初始化变得混乱。\n\n除此之外，这个\
  \ ES 2.x 测试框架的设计初衷与 ES 1.x 测试框架完全相同。\n\n为了能够在 Activity（如清单 20-38 所示）中使用 OpenGL ES\
  \ 2.0 功能，我们需要在应用程序节点下添加以下`<uses-feature>`子元素（参见清单 20-39）。\n\n**清单 20-39.** *使用 OpenGL\
  \ ES 2.0 特性*\n\n```xml\n<application…>\n……其他节点\n<uses-feature android:glEsVersion=\"\
  0x00020000\" />\n</application>\n```\n\n由于我们只能在真机上测试 OpenGL ES 2.0 应用程序，因此需要通过应用程序节点的`debuggable`属性将应用指定为可调试状态，如清单\
  \ 20-40 所示。\n\n**清单 20-40.** *指定可调试的应用程序*\n\n```xml\n<application android:icon=\"\
  @drawable/icon\"\n              android:label=\"OpenGL Test Harness\"\n        \
  \      android:debuggable=\"true\">\n```\n\n为了能够调用 ES 2.0 测试框架 Activity，我们需要修改清单\
  \ 20-14 中的驱动 Activity，使其看起来像清单 20-41 中的代码。\n\n**清单 20-41.** *新的主驱动 Activity*\n\n\
  ```java\npublic class TestOpenGLMainDriverActivity extends Activity {\n    /** 当\
  \ Activity 首次创建时调用。 */\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
  \    }\n    @Override\n    public boolean onCreateOptionsMenu(Menu menu){\n    \
  \    super.onCreateOptionsMenu(menu);\n        MenuInflater inflater = getMenuInflater();\
  \ //来自 Activity\n        inflater.inflate(R.menu.main_menu, menu);\n        return\
  \ true;\n    }\n    @Override\n    public boolean onOptionsItemSelected(MenuItem\
  \ item)\n    {\n        if (item.getItemId() >= R.id.mid_es20_triangle)\n      \
  \  {\n            this.invoke20MultiView(item.getItemId());\n            return\
  \ true;\n        }\n        this.invokeMultiView(item.getItemId());\n        return\
  \ true;\n    }\n    private void invokeMultiView(int mid)\n    {\n        Intent\
  \ intent = new Intent(this,MultiViewTestHarnessActivity.class);\n        intent.putExtra(\"\
  com.ai.menuid\", mid);\n        startActivity(intent);\n    }\n    private void\
  \ invoke20MultiView(int mid)\n    {\n        Intent intent = new Intent(this,OpenGL20MultiViewTestHarnessActivity.class);\n\
  \        intent.putExtra(\"com.ai.menuid\", mid);\n        startActivity(intent);\n\
  \    }\n}\n```\n\n我们在清单 20-41 中添加了两处代码：一个额外的方法用于在菜单 ID 大于或等于`mid_es20_triangle`时调用`OpenGL20MultiViewTestHarnessActivity`。这样设计的思路是，该菜单项将启动\
  \ ES 2.0 的演示程序。不过，目前我们只有一个 ES 2.0 的演示。\n\n### 渲染步骤\n\n在 OpenGL ES 2.0 中渲染图形需要以下步骤：\n\
  \n1.  编写在 GPU 上运行的着色器程序，用于从客户端内存中提取绘图坐标、模型/视图/投影矩阵等数据并进行绘制。OpenGL ES 1.0 中没有对应部分。简单来说，这是在顶点绘制和表面渲染之前增加的一个间接层。\n\
  2.  在 GPU 上编译步骤 1 中着色器的源代码。\n3.  将步骤 2 中编译后的单元链接成一个可在绘制时使用的程序对象。\n4.  从步骤 3 的程序中检索地址句柄，以便将数据设置到这些指针中。\n\
  5.  定义顶点缓冲区。\n6.  定义模型视图矩阵（通过设置视锥体、相机位置等实现；这与 OpenGL ES 1.1 中的做法非常相似）。\n7.  将步骤\
  \ 5 和步骤 6 中的内容通过句柄传递给程序。\n8.  最后，进行绘制。\n\n我们将通过代码片段逐一审视每个步骤，然后展示一个可工作的渲染器，作为 OpenGL\
  \ ES 1.0 中`SimpleTriangleRenderer`的平行实现。让我们从 OpenGL ES 2.0 的关键区别——着色器开始。\n\n\n\n\
  ### 理解着色器\n\n即便是在 OpenGL ES 2.0 中绘制最简单的图形，也需要称为着色器的程序段。这些着色器构成了 OpenGL ES 2.0 的核心。我们将解释绘制简单三角形所需的最少知识；建议你阅读本章末尾参考部分列出的资料。\n\
  \n任何涉及顶点的绘制都由顶点着色器完成。任何涉及片段（即顶点之间的空间）的绘制都由片段着色器完成。因此，顶点着色器只关心顶点。而片段着色器则处理每一个像素。\n\
  \n代码清单 20-42 是一个顶点着色器程序段的示例。\n\n**代码清单 20-42.** *一个简单的顶点着色器*\n\n```\nuniform mat4\
  \ uMVPMatrix;\nattribute vec4 aPosition;\nvoid main() {\n  gl_Position = uMVPMatrix\
  \ * aPosition;\n}\n```\n\n该程序使用着色语言编写。第一行表明变量`uMVPMatrix`是程序的输入变量，其类型为`mat4`（一个\
  \ 4x4 矩阵）。它还被限定为`uniform`变量，因为这个矩阵变量适用于所有顶点，而不针对某个特定顶点。\n\n相比之下，变量`aPosition`是一个顶点属性，用于处理顶点的位置（坐标）。它被标识为顶点的`attribute`，并且是特定于某个顶点的。顶点的其他属性包括颜色、纹理等。`aPosition`变量也是一个\
  \ 4 分量向量。现在来看程序本身，代码清单 20-42 获取顶点的坐标位置，并使用模型视图投影矩阵（由调用程序设置）对其进行变换，然后与顶点的坐标位置相乘，最终得到由顶点着色器的保留变量`gl_Position`标识的最终位置。\n\
  \n这个顶点着色器程序负责绘制或定位顶点。例如，调用程序会为三角形的顶点设置缓冲区，如下面的代码清单 20-43 所示。\n\n**代码清单 20-43.**\
  \ *为顶点设置数据*\n\n```\nGLES20.glVertexAttribPointer(positionHandle, 3, GLES20.GL_FLOAT,\
  \ false,\n                TRIANGLE_VERTICES_DATA_STRIDE_BYTES, mFVertexBuffer);\n\
  ```\n\n顶点缓冲区是这个 GLES20 方法的最后一个参数。这看起来很像 OpenGL 1.0 中的`glVertexPointer`，除了第一个参数被标识为`positionHandle`。这个参数指向代码清单\
  \ 20-42 中顶点着色器程序的`aPostion`输入属性变量。你可以使用类似下面的代码来获取这个句柄：\n\n```\npositionHandle =\
  \ GLES20.glGetAttribLocation(shaderProgram, \"aPosition\");\n```\n\n本质上，你是让着色器程序提供一个指向输入变量的句柄，然后在此基础上继续操作。`shaderProgram`本身需要通过将着色器代码段传递给\
  \ GPU、编译并链接它们来构建。为了生成一个可以开始绘制的程序，你还需要一个片段着色器。代码清单 20-44 是一个片段着色器的示例。\n\n**代码清单 20-44.**\
  \ *片段着色器示例*\n\n```\nvoid main() {\n   gl_FragColor = vec4(1.0, 0.0, 0.0, 1.0);\n\
  }\n```\n\n同样，我们使用了保留变量`gl_FragColor`，并将其硬编码为红色。与其像代码清单 20-44 那样硬编码为红色，我们可以将这些颜色值从用户程序经由顶点着色器一直传递到片段着色器。这超出了本章的讨论范围，但在许多关于\
  \ OpenGL ES 2.0 的参考文献中都有明确演示。\n\n这些着色器程序是开始绘图的必要条件。\n\n### 将着色器编译成程序\n\n一旦我们有了如代码清单\
  \ 20-42 和 20-44 所示的着色器程序段，就可以使用代码清单 20-45 中的代码来编译并加载着色器程序。\n\n**代码清单 20-45.** *编译并加载着色器程序*\n\
  \n```\nprivate int loadShader(int shaderType, String source) {\n    int shader =\
  \ GLES20.glCreateShader(shaderType);\n    if (shader != 0) {\n        GLES20.glShaderSource(shader,\
  \ source);\n        GLES20.glCompileShader(shader);\n        int[] compiled = new\
  \ int[1];\n        GLES20.glGetShaderiv(shader, GLES20.GL_COMPILE_STATUS, compiled,\
  \ 0);\n        if (compiled[0] == 0) {\n            Log.e(TAG, \"无法编译着色器 \" + shaderType\
  \ + \":\");\n            Log.e(TAG, GLES20.glGetShaderInfoLog(shader));\n      \
  \      GLES20.glDeleteShader(shader);\n            shader = 0;\n        }\n    }\n\
  \    return shader;\n}\n```\n\n在这段代码中，`shaderType`是`GLES20.GL_VERTEX_SHADER`或`GLES20.GL_FRAGMENT_SHADER`之一。变量`source`需要指向一个包含着色器源代码的字符串，例如代码清单\
  \ 20-42 和 20-44 中所示的代码。\n\n代码清单 20-46 展示了在构建程序对象时如何使用（来自代码清单 20-45 的）函数`loadShader`。\n\
  \n**代码清单 20-46.** *创建程序并获取变量句柄*\n\n```\nprivate int createProgram(String vertexSource,\
  \ String fragmentSource) {\n    int vertexShader = loadShader(GLES20.GL_VERTEX_SHADER,\
  \ vertexSource);\n    if (vertexShader == 0) {\n        return 0;\n    }\n    Log.d(TAG,\"\
  顶点着色器已创建\");\n    int pixelShader = loadShader(GLES20.GL_FRAGMENT_SHADER, fragmentSource);\n\
  \    if (pixelShader == 0) {\n        return 0;\n    }\n    Log.d(TAG,\"片段着色器已创建\"\
  );\n    int program = GLES20.glCreateProgram();\n    if (program != 0) {\n     \
  \   Log.d(TAG,\"程序已创建\");\n        GLES20.glAttachShader(program, vertexShader);\n\
  \        checkGlError(\"glAttachShader\");\n        GLES20.glAttachShader(program,\
  \ pixelShader);\n        checkGlError(\"glAttachShader\");\n        GLES20.glLinkProgram(program);\n\
  \        int[] linkStatus = new int[1];\n        GLES20.glGetProgramiv(program,\
  \ GLES20.GL_LINK_STATUS, linkStatus, 0);\n        if (linkStatus[0] != GLES20.GL_TRUE)\
  \ {\n            Log.e(TAG, \"无法链接程序: \");\n            Log.e(TAG, GLES20.glGetProgramInfoLog(program));\n\
  \            GLES20.glDeleteProgram(program);\n            program = 0;\n      \
  \  }\n    }\n    return program;\n}\n```\n\n### 访问着色器程序变量\n\n设置好程序后，可以使用程序的句柄来获取着色器所需的输入变量的句柄。代码清单\
  \ 20-47 展示了如何操作。\n\n**代码清单 20-47.** *获取顶点和统一变量句柄*\n\n```\nint maPositionHandle =\n\
  \     GLES20.glGetAttribLocation(mProgram, \"aPosition\");\nint muMVPMatrixHandle\
  \ =\n    GLES20.glGetUniformLocation(mProgram, \"uMVPMatrix\");\n```\n\n\n\n####\
  \ 一个简单的 ES 2.0 三角形\n\n至此，我们已经涵盖了构建类似于 OpenGL 1.0 框架所需的所有基础知识。现在，我们将构建一个抽象渲染器，它负责封装所有初始化工作（例如创建着色器、程序等）。清单\
  \ 20–48 展示了相关代码。\n\n**清单 20–48.** *ES20AbstractRenderer*\n\n```\npublic abstract\
  \ class ES20AbstractRenderer\nimplements android.opengl.GLSurfaceView.Renderer\n\
  {\n   public static String TAG = \"ES20AbstractRenderer\";\n\n   private float[]\
  \ mMMatrix = new float[16];\n   private float[] mProjMatrix = new float[16];\n \
  \  private float[] mVMatrix = new float[16];\n   private float[] mMVPMatrix = new\
  \ float[16];\n\n   private int mProgram;\n   private int muMVPMatrixHandle;\n  \
  \ private int maPositionHandle;\n\n   public void onSurfaceCreated(GL10 gl, EGLConfig\
  \ eglConfig)\n   {\n          prepareSurface(gl,eglConfig);\n   }\n   public void\
  \ prepareSurface(GL10 gl, EGLConfig eglConfig)\n   {\n       Log.d(TAG,\"preparing\
  \ surface\");\n       mProgram = createProgram(mVertexShader, mFragmentShader);\n\
  \       if (mProgram == 0) {\n           return;\n       }\n       Log.d(TAG,\"\
  Getting position handle:aPosition\");\n       maPositionHandle = GLES20.glGetAttribLocation(mProgram,\
  \ \"aPosition\");\n       checkGlError(\"glGetAttribLocation aPosition\");\n   \
  \    if (maPositionHandle == -1) {\n           throw new RuntimeException(\"Could\
  \ not get attrib location for aPosition\");\n       }\n       Log.d(TAG,\"Getting\
  \ matrix handle:uMVPMatrix\");\n       muMVPMatrixHandle = GLES20.glGetUniformLocation(mProgram,\
  \ \"uMVPMatrix\");\n       checkGlError(\"glGetUniformLocation uMVPMatrix\");\n\
