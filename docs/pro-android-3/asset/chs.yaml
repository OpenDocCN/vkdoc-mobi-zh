  \ void testAlertDialog()\n    {\n        FragmentTransaction ft = getFragmentManager().beginTransaction();\n\
  \n        AlertDialogFragment adf =\n            AlertDialogFragment.newInstance(\"\
  Alert Message\");\n\n        adf.show(ft, ALERT_DIALOG_TAG);\n    }\n\n    private\
