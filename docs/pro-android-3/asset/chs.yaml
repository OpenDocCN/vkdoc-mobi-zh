  - **`getAngleArrays`**：此方法是一个关键方法，负责计算正多边形每条边的角度，前提是该多边形的一条边与 x 轴平行。\n- **`getXMultiplierArray`\
  \ 和 `getYMultiplierArray`**：这些方法从 `getAngleArrays` 获取角度，并将其投影到 x 轴和 y 轴上，以获得相应的坐标，假设边的长度为单位长度。\n\
  - **`calcArrays`**：此方法使用 `getXMultiplierArray` 和 `getYMultiplierArray` 获取每个顶点，并对其进行缩放，以匹配指定的半径和指定的原点。在此方法结束时，`RegularPolygon`\
  \ 将拥有正确的坐标，尽管是以 Java `float` 数组的形式存在。\n- **`getVertexBuffer`**：此方法随后获取 Java 浮点坐标数组，并填充基于\
