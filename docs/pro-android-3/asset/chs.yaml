  \n在本章中，你了解到对话框在 Android 中带来了特殊的挑战。我们向你展示了异步对话框的影响，并介绍了一种简化托管对话框的抽象方案。请参阅第 29 章 了解在\
  \ 3.0 中引入 Fragment 后对话框是如何工作的。由于 Fragment API 已向后兼容到 Android 的早期版本，你可能希望将 Fragment\
  \ 对话框作为首选的对话框实现方式。\n\n## 第 9 章\n\n\n\n### 理解 ListPreference\n\n显然，你需要为用户提供一个界面来查看排序选项列表。该列表会为每个选项提供单选按钮，并且会预先选中默认（或当前）选项。使用\
  \ Android 首选项框架来解决这个问题几乎不需要做多少工作。首先，你需要创建一个首选项 XML 文件来描述该首选项，然后使用一个预构建的 activity\
  \ 类，该类知道如何显示和持久化首选项。代码清单 9–1 显示了细节。\n\n**注意：** 我们会在本章末尾提供一个 URL，你可以使用它下载本章的项目文件。这将使你能够将这些项目直接导入到你的\
  \ Eclipse 中。\n\n**代码清单 9–1.** *航班选项首选项 XML 文件及关联的 Activity 类*\n\n```xml\n<?xml version=\"\
  1.0\" encoding=\"utf-8\"?>\n<!-- 该文件位于 /res/xml/flightoptions.xml -->\n<PreferenceScreen\n\
  \    android:key=\"flight_option_preference\"\n    android:title=\"@string/prefTitle\"\
  \n    android:summary=\"@string/prefSummary\">\n  <ListPreference\n    android:key=\"\
  @string/selected_flight_sort_option\"\n    android:title=\"@string/listTitle\"\n\
  \    android:summary=\"@string/listSummary\"\n    android:entries=\"@array/flight_sort_options\"\
  \n    android:entryValues=\"@array/flight_sort_options_values\"\n    android:dialogTitle=\"\
  @string/dialogTitle\"\n    android:defaultValue=\"@string/flight_sort_option_default_value\"\
  \ />\n</PreferenceScreen>\n```\n\n```java\npackage com.androidbook.preferences.sample;\n\
  \nimport android.os.Bundle;\nimport android.preference.PreferenceActivity;\n\npublic\
  \ class FlightPreferenceActivity extends PreferenceActivity\n{\n    @Override\n\
  \    protected void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        addPreferencesFromResource(R.xml.flightoptions);\n    }\n}\n```\n\n代码清单\
  \ 9–1 包含一个代表航班选项首选项设置的 XML 片段。该清单还包含一个加载该首选项 XML 文件的 activity 类。我们先从 XML 开始说起。\n\
  \nAndroid 提供了一个端到端的首选项框架。这意味着该框架允许你定义首选项，向用户显示设置项，并将用户的选择持久化到数据存储中。你在 `/res/xml/`\
  \ 下的 XML 文件中定义首选项。要向用户显示首选项，你需要编写一个继承自 Android 预定义类 `android.preference.PreferenceActivity`\
  \ 的 activity 类，并使用 `addPreferencesFromResource()` 方法将该资源添加到 activity 的资源集合中。框架会处理其余的事情（显示和持久化）。\n\
  \n在这个航班场景中，你在 `/res/xml/flightoptions.xml` 路径下创建一个名为 `flightoptions.xml` 的文件。然后创建一个名为\
  \ `FlightPreferenceActivity` 的 activity 类，该类继承自 `android.preference.PreferenceActivity`\
  \ 类。接着，你调用 `addPreferencesFromResource()` 方法，并传入 `R.xml.flightoptions`。请注意，首选项资源\
  \ XML 引用了几个字符串资源。为了确保编译通过，你需要向项目中添加几个字符串资源。我们稍后会展示如何操作。现在，先看看代码清单 9–1 生成的用户界面（参见图\
  \ 9–1）。\n\n![图片](img/0901.jpg)\n\n**图 9–1.** *航班选项首选项界面*\n\n图 9–1 包含两个视图。左侧的视图称为*首选项屏幕*，右侧的界面是*列表首选项*。当用户选择“航班选项”时，“选择航班选项”视图会作为一个模态对话框出现，每个选项都带有单选按钮。用户选择一个选项后，该选项会立即被保存，并且视图会关闭。当用户返回选项屏幕时，视图会反映出之前保存的选择。\n\
  \n代码清单 9–1 中的 XML 代码定义了 `PreferenceScreen`，然后创建了 `ListPreference` 作为其子项。对于 `PreferenceScreen`，你设置了三个属性：`key`、`title`\
  \ 和 `summary`。`key` 是一个字符串，你可以用它通过编程方式引用该项（类似于你使用 `android:id` 的方式）；`title` 是屏幕的标题（航班选项）；`summary`\
  \ 是对屏幕用途的描述，显示在标题下方，字体较小（在此例中为“设置搜索选项”）。对于列表首选项，你设置了 `key`、`title` 和 `summary`，以及\
  \ `entries`、`entryValues`、`dialogTitle` 和 `defaultValue` 这些属性。表 9–1 总结了这些属性。\n\n\
  **表 9–1.** *`android.preference.ListPreference` 的若干属性*\n\n| **属性** | **描述** |\n\
  | `android:key` | 选项的名称或键（例如 `selected_flight_sort_option`）。 |\n| `android:title`\
  \ | 选项的标题。 |\n| `android:summary` | 选项的简短摘要。 |\n| `android:entries` | 列表中选项可以设置为的项的文本内容。\
  \ |\n| `android:entryValues` | 定义每个项的键或值。请注意，每个项都有文本和值。文本由 `entries` 定义，值由 `entryValues`\
  \ 定义。 |\n| `android:dialogTitle` | 对话框的标题——如果视图显示为模态对话框时使用。 |\n| `android:defaultValue`\
  \ | 从项列表中选取的选项的默认值。 |\n\n为了使我们的示例完整运行，请按照代码清单 9–2 的指示添加或修改文件。\n\n**代码清单 9–2.** *为我们的示例设置项目的其余部分*\n\
  \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<!-- 该文件位于 /res/values/arrays.xml\
  \ -->\n<resources>\n<string-array name=\"flight_sort_options\">\n    <item>总费用</item>\n\
  \    <item>经停次数</item>\n    <item>航空公司</item>\n</string-array>\n<string-array name=\"\
  flight_sort_options_values\">\n    <item>0</item>\n    <item>1</item>\n    <item>2</item>\n\
  </string-array>\n</resources>\n```\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
  utf-8\"?>\n<!-- 该文件位于 /res/values/strings.xml -->\n<resources>\n    <string name=\"\
  app_name\">首选项演示</string>\n    <string name=\"prefTitle\">我的首选项</string>\n    <string\
  \ name=\"prefSummary\">设置航班选项首选项</string>\n    <string name=\"flight_sort_option_default_value\"\
  >1</string>\n    <string name=\"dialogTitle\">选择航班选项</string>\n    <string name=\"\
  listSummary\">设置搜索选项</string>\n    <string name=\"listTitle\">航班选项</string>\n  \
  \  <string name=\"selected_flight_sort_option\">\n        selected_flight_sort_option</string>\n\
  \    <string name=\"menu_prefs_title\">设置</string>\n</resources>\n```\n\n```xml\n\
  <?xml version=\"1.0\" encoding=\"utf-8\"?>\n<!-- 该文件位于 /res/menu/mainmenu.xml -->\n\
  <menu >\n    <item android:id=\"@+id/menu_prefs\"\n        android:title=\"@string/menu_prefs_title\"\
  \n    />\n</menu>\n```\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<!--\
  \ 该文件位于 /res/layout/main.xml -->\n<LinearLayout\n    android:orientation=\"vertical\"\
  \n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"fill_parent\"\
  \n    >\n<TextView android:text=\"\" android:id=\"@+id/text1\"\n    android:layout_width=\"\
  fill_parent\"\n    android:layout_height=\"wrap_content\"\n    />\n</LinearLayout>\n\
  ```\n\n```java\n// 该文件是 MainActivity.java\nimport android.app.Activity;\nimport\
  \ android.content.Intent;\nimport android.content.SharedPreferences;\nimport android.os.Bundle;\n\
  import android.view.Menu;\nimport android.view.MenuInflater;\nimport android.view.MenuItem;\n\
  import android.widget.TextView;\n\npublic class MainActivity extends Activity {\n\
  \    private TextView tv = null;\n    private Resources resources;\n\n    /** 当\
  \ activity 首次创建时调用。 */\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
  \    }\n```\n\n\n```java\nresources = this.getResources();\ntv = (TextView)findViewById(R.id.text1);\n\
  setOptionText();\n```\n\n```java\n@Override\npublic boolean onCreateOptionsMenu(Menu\
  \ menu)\n{\n    MenuInflater inflater = getMenuInflater();\n    inflater.inflate(R.menu.mainmenu,\
  \ menu);\n    return true;\n}\n```\n\n```java\n@Override\npublic boolean onOptionsItemSelected\
  \ (MenuItem item)\n{\n    if (item.getItemId() == R.id.menu_prefs)\n    {\n    \
  \    // 跳转到我们的偏好设置界面。\n        Intent intent = new Intent()\n                .setClass(this,\n\
  \           com.androidbook.preferences.sample.FlightPreferenceActivity.class);\n\
  \        this.startActivityForResult(intent, 0);\n    }\n    return true;\n}\n```\n\
  \n```java\n@Override\npublic void onActivityResult(int reqCode, int resCode, Intent\
  \ data)\n{\n    super.onActivityResult(reqCode, resCode, data);\n    setOptionText();\n\
  }\n```\n\n```java\nprivate void setOptionText()\n{\n    SharedPreferences prefs\
  \ =\n            PreferenceManager.getDefaultSharedPreferences(this);\n    // 这是获取共享偏好设置的另一种方式：\n\
  \    // SharedPreferences prefs = getSharedPreferences(\n    //         \"com.androidbook.preferences.sample_preferences\"\
  , 0);\n    String option = prefs.getString(\n            resources.getString(R.string.selected_flight_sort_option),\n\
  \            resources.getString(R.string.flight_sort_option_default_value));\n\
  \    String[] optionText = resources.getStringArray(R.array.flight_sort_options);\n\
  \n    tv.setText(\"选项值为 \" + option + \" (\" +\n            optionText[Integer.parseInt(option)]\
  \ + \")\");\n}\n```\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<!--\
  \ 此文件为 AndroidManifest.xml -->\n<manifest\n      package=\"com.androidbook.preferences.sample\"\
  \n      android:versionCode=\"1\"\n      android:versionName=\"1.0\">\n    <application\
  \ android:icon=\"@drawable/icon\"\n          android:label=\"@string/app_name\"\
  >\n        <activity android:name=\".MainActivity\"\n                  android:label=\"\
  @string/app_name\">\n            <intent-filter>\n              <action android:name=\"\
  android.intent.action.MAIN\" />\n              <category android:name=\"android.intent.category.LAUNCHER\"\
  />\n            </intent-filter>\n        </activity>\n\n        <activity android:name=\"\
  .FlightPreferenceActivity\"\n                  android:label=\"@string/prefTitle\"\
  >\n            <intent-filter>\n                <action android:name=\n \"com.androidbook.preferences.sample.intent.action.FlightPreferences\"\
  \ />\n                <category\n                    android:name=\"android.intent.category.PREFERENCE\"\
  \ />\n            </intent-filter>\n        </activity>\n\n    </application>\n\
  \    <uses-sdk android:minSdkVersion=\"4\" />\n</manifest>\n```\n\n完成这些修改并运行该应用后，你首先会看到一条简单的文本消息，显示“option\
  \ value is 1 (# of Stops)”。点击菜单按钮（Menu），然后选择“设置”即可进入`PreferenceActivity`。完成后点击返回箭头，你将立即看到选项文字的任何更改。\n\
  \n我们添加的第一个文件是 `/res/values/arrays.xml`。该文件包含实现选项选择所需的两个字符串数组。第一个数组保存要显示的文本，第二个数组保存方法调用返回的值，以及存储在偏好设置\
  \ XML 文件中的值。为了便于实现，我们选择使用数组索引值 0、1 和 2 作为`flight_sort_options_values`。我们也可以使用任何有助于运行应用的值。如果我们的选项本质上是数字（例如倒计时起始值），我们可以使用\
  \ 60、120、300 等值。这些值完全不必是数字，只要对开发者有意义即可；除非你选择向用户展示，否则用户不会看到这些值。用户只能看到第一个字符串数组`flight_sort_options`中的文本。\n\
  \n正如我们之前所说，Android 框架也会负责持久化偏好设置。例如，当用户选择一个排序选项时，Android 会将选择存储在应用`/data`目录下的一个\
  \ XML 文件中（参见 图 9-2）。\n\n![图片](img/0902.jpg)\n\n**图 9-2.** *应用已保存偏好设置的文件路径*\n\n实际文件路径为\
  \ `/data/data/`*`[包名]`*`/shared_prefs/`*`[包名]`*`_preferences.xml`。代码清单 9-3 显示了我们示例中的\
  \ `com.androidbook.preferences.sample_preferences.xml` 文件。\n\n**代码清单 9-3.** *示例应用的已保存偏好设置*\n\
  \n```xml\n<?xml version='1.0' encoding='utf-8' standalone='yes' ?>\n<map>\n    <string\
  \ name=\"selected_flight_sort_option\">1</string>\n</map>\n```\n\n你可以看到，对于列表偏好，偏好设置框架使用列表的`key`属性来持久化所选项的值。另外请注意，存储的是所选项的*值*，而不是文本。这里需要提醒一下：由于偏好设置\
  \ XML 文件只存储值而不存储文本，因此当你升级应用并更改选项文本或向字符串数组中添加项目时，偏好设置 XML 文件中存储的任何值在升级后仍应与相应的文本保持一致。偏好设置\
  \ XML 文件在应用升级期间会保留。如果偏好设置 XML 文件中包含“1”，并且在升级前它代表“# of Stops”，那么在升级后它仍应代表“# of Stops”。\n\
  \n我们接下来涉及到的文件是 `/res/values/strings.xml`。我们为标题、摘要和菜单项添加了几个字符串。有两个字符串需要特别注意。第一个是\
  \ `flight_sort_option_default_value`。在我们的示例中，我们将默认值设置为 `1`，代表“# of Stops”。通常为每个选项选择一个默认值是个好主意。如果你不选择默认值，并且尚未选择任何值，那么返回选项值的方法将返回\
  \ `null`。在这种情况下，你的代码必须处理空值。另一个有趣的字符串是 `selected_flight_sort_option`。严格来说，用户不会看到这个字符串，因此我们不需要将其放入\
  \ `strings.xml` 中来为其他语言提供替代文本。然而，由于这个字符串值是在方法调用中用于检索值的键，通过为它创建一个 ID，我们可以在编译时确保没有在键名上出现拼写错误。\n\
  \n我们添加的第三个文件是 `/res/menu/mainmenu.xml`。我们假设你希望通过菜单而非按钮来访问偏好设置视图。这个文件代表了我们的应用菜单。\n\
  \n  \n我们接触到的第四个文件是`/res/layout/main.xml`。这是该应用的主要用户界面。到目前为止，我们已经介绍了如何通过使用一个特殊的 activity\
  \ 类`PreferenceActivity`来维护偏好设置。但你希望在主 activity 中使用偏好设置，而不是在`PreferenceActivity`中。因此，我们需要一种方法从另一个\
  \ activity 访问这些偏好设置。在此示例中，布局是一个简单的`TextView`，用于显示我们航班偏好选项的当前值。  \n\n接下来是`MainActivity`的源代码。这是一个基础的\
  \ activity，它获取偏好设置的引用以及一个`TextView`的句柄，然后调用一个方法来读取我们选项的当前值，并将其设置到`TextView`中。我们设置了菜单和菜单回调。在菜单回调中，我们为`FlightPreferenceActivity`启动了一个`Intent`。启动一个用于偏好设置的`Intent`是进入偏好设置屏幕的最佳方式。你可以使用菜单或按钮来触发这个`Intent`。在后来的示例中，我们将不再重复这段代码，但你会在这些示例中做同样的事情，只不过需要使用适当的\
  \ activity 类名。当偏好设置的`Intent`返回给我们时，我们调用`setOptionText()`方法来更新我们的`TextView`。  \n\n\
  有两种方法可以获得偏好设置的句柄：  \n\n*   最简单的方法如示例所示，即调用`PreferenceManager.getDefaultSharedPreferences(this)`。这里的`this`参数是用于查找默认共享偏好设置的上下文，该方法将使用`this`的包名来确定偏好设置文件的名称和位置，该文件恰好是由我们的`PreferenceActivity`创建的，因为它们共享相同的包名。\
  \  \n*   获取偏好设置文件句柄的另一种方法是使用`getSharedPreferences()`方法调用，并传入一个文件名参数和一个模式参数。在清单 9–2\
  \ 中，我们展示了这种方法，但它已被注释掉了。注意，你只需指定文件名的基本部分，而不是路径和文件扩展名。模式参数控制对我们 XML 偏好设置文件的权限。在我们前面的示例中，模式参数不会产生任何影响，因为该文件仅在`PreferenceActivity`中创建，而该\
  \ Activity 设置了默认权限`MODE_PRIVATE`（即零）。我们将在后面关于保存状态的章节中讨论模式参数。  \n\n在`setOptionText()`内部，通过偏好设置的引用，你可以调用适当的方法来检索偏好值。在我们的示例中，我们调用了`getString()`，因为我们知道要从偏好设置中检索一个字符串值。第一个参数是选项键的字符串值。我们之前提到过，使用资源\
  \ ID 可以确保在构建应用程序时不会出现任何拼写错误。我们也可以简单地使用字符串`selected_flight_sort_option`作为第一个参数，这样做可能是为了保持应用程序尽可能小和快速。对于第二个参数，你需要指定一个默认值，以防在偏好设置\
  \ XML 文件中找不到该值。当你的应用程序首次运行时，并没有偏好设置 XML 文件，因此如果不为第二个参数指定值，你第一次总会得到`null`。即使你在`flightoptions.xml`的`ListPreference`规范中为该选项指定了默认值，情况也是如此。在我们的示例中，我们在\
  \ XML 中设置了一个默认值，并且使用了资源 ID 来完成，因此`setOptionText()`中的代码可以用来读取该默认值的资源 ID 的值。请注意，如果我们没有为默认值使用\
  \ ID，那么直接从`ListPreference`读取它将困难得多。通过在 XML 和我们的代码之间共享一个资源 ID，我们只有一个地方需要更改默认值（即`strings.xml`）。\
  \  \n\n除了显示偏好设置的值，我们还显示偏好设置的文本。在我们的示例中，我们采取了一个快捷方式，因为我们对`flight_sort_options_values`中的值使用了数组索引。通过简单地将值转换为`int`，我们就知道要从`flight_sort_options`中读取哪个字符串。如果我们为`flight_sort_options_values`使用了其他值集合，那么我们需要确定作为我们偏好的元素的索引，然后使用该索引从`flight_sort_options`中获取我们偏好的文本。\
  \  \n\n我们示例中最后要涉及的文件是`AndroidManifest.xml`。因为我们的应用程序现在有两个 activity，所以需要两个 activity\
  \ 标签。第一个是类别为`LAUNCHER`的标准 activity。第二个用于`PreferenceActivity`，因此我们按照 Intent 的惯例设置了动作名称，并将类别设置为`PREFERENCE`。我们可能不希望`PreferenceActivity`与其他所有应用程序一起出现在\
  \ Android 页面上，这就是我们选择不为它使用`LAUNCHER`的原因。如果你要添加其他偏好设置屏幕，你需要对`AndroidManifest.xml`进行类似的更改。\
  \  \n\n我们展示了一种在代码中读取偏好设置默认值的方法。Android 提供了另一种更优雅的方法。在`onCreate()`中，我们可以这样做：  \n\n\
  ```\nPreferenceManager.setDefaultValues(this, R.xml.flightoptions, false);\n```\n\
  \n然后在`setOptionText()`中，我们可以这样做来读取选项值：  \n\n```\nString option = prefs.getString(\n\
  \    resources.getString(R.string.selected_flight_sort_option), null);\n```\n\n\
  第一个调用将使用`flightoptions.xml`来查找默认值，并为我们生成包含默认值的偏好设置 XML 文件。如果内存中已经有一个`SharedPreferences`对象的实例，它也会更新该实例。然后第二个调用将能够找到`selected_flight_sort_option`的值，因为我们首先处理了加载默认值。\
  \  \n\n第一次运行此代码后，如果你查看`shared_prefs`文件夹，即使偏好设置屏幕尚未被调用，你也会看到偏好设置 XML 文件。你还会看到另一个名为`_has_set_default_values.xml`的文件。这告诉你的应用程序，偏好设置\
  \ XML 文件已经用默认值创建好了。`setDefaultValues()`的第三个参数，即`false`，表示你只希望在该操作之前未进行过的情况下，将默认值设置到偏好设置\
  \ XML 文件中。如果你选择`true`，则每次都会用默认值重置偏好设置 XML 文件。Android 通过这个新 XML 文件的存在来记住这些信息。如果用户选择了新的偏好值，并且你为第三个参数选择了`false`，那么下次运行此代码时，用户的偏好设置将不会被覆盖。请注意，现在我们不需要在`getString()`方法调用中提供默认值，因为我们始终应该从偏好设置\
  \ XML 文件中获取一个值。  \n\n如果你需要从继承了`PreferenceActivity`的 activity 内部获取偏好设置的引用，可以这样做：\
  \  \n\n```\nSharedPreferences prefs = getPreferenceManager().getDefaultSharedPreferences(this);\n\
  ```\n\n我们向你展示了如何使用`ListPreference`视图；现在，让我们检查 Android 偏好设置框架中的其他 UI 元素。具体来说，我们将讨论`CheckBoxPreference`视图、`EditTextPreference`视图和`RingtonePreference`视图。\
  \  \n\n\n\n### 了解 CheckBoxPreference\n\n正如你所见，`ListPreference` 偏好设置使用列表作为其 UI 元素。类似地，`CheckBoxPreference`\
  \ 偏好设置使用复选框控件作为其 UI 元素。\n\n为了扩展航班搜索示例应用，假设你想让用户设置结果集中要显示的列。此偏好设置显示可用的列，并允许用户通过勾选相应的复选框来选择所需的列。此示例的用户界面如图\
  \ 9–3 所示，偏好设置的 XML 文件如代码清单 9–4 所示。\n\n![images](img/0903.jpg)\n\n**图 9–3.** *复选框偏好设置的用户界面*\n\
  \n**代码清单 9–4.** *使用 CheckBoxPreference*\n\n```\n<?xml version=\"1.0\" encoding=\"\
  utf-8\"?>\n<!-- This file is /res/xml/chkbox.xml -->\n<PreferenceScreen\n    android:key=\"\
  flight_columns_pref\"\n    android:title=\"Flight Search Preferences\"\n    android:summary=\"\
  Set Columns for Search Results\">\n    <CheckBoxPreference\n        android:key=\"\
  show_airline_column_pref\"\n        android:title=\"Airline\"\n        android:summary=\"\
  Show Airline column\" />\n    <CheckBoxPreference\n        android:key=\"show_departure_column_pref\"\
  \n        android:title=\"Departure\"\n        android:summary=\"Show Departure\
  \ column\" />\n    <CheckBoxPreference\n        android:key=\"show_arrival_column_pref\"\
  \n        android:title=\"Arrival\"\n        android:summary=\"Show Arrival column\"\
  \ />\n    <CheckBoxPreference\n        android:key=\"show_total_travel_time_column_pref\"\
  \n        android:title=\"Total Travel Time\"\n        android:summary=\"Show Total\
  \ Travel Time column\" />\n    <CheckBoxPreference\n        android:key=\"show_price_column_pref\"\
  \n        android:title=\"Price\"\n        android:summary=\"Show Price column\"\
  \ />\n</PreferenceScreen>\n```\n\n```\n// CheckBoxPreferenceActivity.java\nimport\
  \ android.os.Bundle;\nimport android.preference.PreferenceActivity;\n\npublic class\
  \ CheckBoxPreferenceActivity extends PreferenceActivity\n{\n    @Override\n    protected\
  \ void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        addPreferencesFromResource(R.xml.chkbox);\n    }\n}\n```\n\n代码清单 9–4 展示了偏好设置\
  \ XML 文件 `chkbox.xml` 以及一个使用 `addPreferencesFromResource()` 加载该文件的简单活动类。如你所见，UI\
  \ 中有五个复选框，每个复选框在偏好设置 XML 文件中都由一个 `CheckBoxPreference` 节点表示。每个复选框还有一个 `key`，正如你所料，当需要保存所选偏好设置时，该键最终用于持久化\
  \ UI 元素的状态。使用 `CheckBoxPreference`，当用户设置状态时，偏好设置的状态即被保存。换句话说，当用户勾选或取消勾选偏好设置控件时，其状态会被保存。代码清单\
  \ 9–5 展示了此示例的偏好设置数据存储。\n\n**代码清单 9–5.** *复选框偏好设置的偏好设置数据存储*\n\n```\n<?xml version='1.0'\
  \ encoding='utf-8' standalone='yes' ?>\n<map>\n    <boolean name=\"show_total_travel_time_column_pref\"\
  \ value=\"false\" />\n    <boolean name=\"show_price_column_pref\" value=\"true\"\
  \ />\n    <boolean name=\"show_arrival_column_pref\" value=\"false\" />\n    <boolean\
  \ name=\"show_airline_column_pref\" value=\"true\" />\n    <boolean name=\"show_departure_column_pref\"\
  \ value=\"false\" />\n</map>\n```\n\n再次说明，你可以看到每个偏好设置都是通过其 `key` 属性保存的。`CheckBoxPreference`\
  \ 的数据类型是 `boolean`，其值为 `true` 或 `false`：`true` 表示偏好设置被选中，`false` 表示未选中。要读取某个复选框偏好设置的值，你可以获取共享偏好设置并调用\
  \ `getBoolean()` 方法，传入该偏好设置的 `key`：\n\n```\nboolean option = prefs.getBoolean(\"\
  show_price_column_pref\", false);\n```\n\n`CheckBoxPreference` 另一个有用的特性是，你可以根据复选框是否被勾选来设置不同的摘要文本。对应的\
  \ XML 属性是 `summaryOn` 和 `summaryOff`。现在，让我们看一下 `EditTextPreference`。\n\n### 了解 EditTextPreference\n\
  \n偏好设置框架还提供了一种名为 `EditTextPreference` 的自由文本偏好设置。此偏好设置允许你捕获原始文本，而不是让用户做出选择。为了演示这一点，假设你有一个为用户生成\
  \ Java 代码的应用程序。此应用程序的一个偏好设置可能是用于生成类的默认包名。在这里，你想要向用户显示一个文本字段，用于为生成的类设置包名。图 9–4 展示了\
  \ UI，代码清单 9–6 展示了 XML。\n\n![images](img/0904.jpg)\n\n**图 9–4.** *使用 EditTextPreference*\n\
  \n**代码清单 9–6.** *EditTextPreference 的示例*\n\n```\n<?xml version=\"1.0\" encoding=\"\
  utf-8\"?>\n<!-- This file is /res/xml/packagepref.xml -->\n<PreferenceScreen\n \
  \   android:key=\"package_name_screen\"\n    android:title=\"Package Name\"\n  \
  \  android:summary=\"Set package name\">\n    <EditTextPreference\n        android:key=\"\
  package_name_preference\"\n        android:title=\"Set Package Name\"\n        android:summary=\"\
  Set the package name for generated code\"\n        android:dialogTitle=\"Package\
  \ Name\" />\n</PreferenceScreen>\n```\n\n```\n// EditTextPreferenceActivity.java\n\
  import android.os.Bundle;\nimport android.preference.PreferenceActivity;\n\npublic\
  \ class EditTextPreferenceActivity extends PreferenceActivity\n{\n    @Override\n\
  \    protected void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        addPreferencesFromResource(R.xml.packagepref);\n    }\n}\n```\n\n你可以看到，代码清单\
  \ 9–6 定义了一个 `PreferenceScreen`，其子项是一个单独的 `EditTextPreference` 实例。该代码清单生成的 UI 左侧是\
  \ `PreferenceScreen`，右侧是 `EditTextPreference`（参见图 9–4）。当用户选择“设置包名”（Set Package Name）时，会弹出一个对话框让用户输入包名。当用户点击“确定”（OK）按钮时，该偏好设置会被保存到偏好设置存储中。\n\
  \n与其他偏好设置一样，你可以通过偏好设置的 `key` 从活动类中获取 `EditTextPreference`。获取 `EditTextPreference`\
  \ 后，你可以通过调用 `getEditText()` 来操作实际的 `EditText`——例如，如果你想对用户在文本字段中输入的值应用验证、预处理或后处理。要获取\
  \ `EditTextPreference` 的文本，只需使用 `getText()` 方法即可。\n\n现在，让我们看一下偏好设置框架中的 `RingtonePreference`。\n\
  \n\n\n### 理解 RingtonePreference\n\n`RingtonePreference` 专门用于处理铃声。你可以在应用中用它为用户提供一个选择铃声的偏好选项。图\
  \ 9-5 展示了 `RingtonePreference` 示例的用户界面，代码清单 9-7 则展示了其 XML 配置。\n\n![images](img/0905.jpg)\n\
  \n**图 9-5.** *RingtonePreference 示例界面*\n\n**代码清单 9-7.** *定义 RingtonePreference 偏好设置*\n\
  \n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<!-- This file is /res/xml/ringtone.xml\
  \ -->\n<PreferenceScreen\n                android:key=\"ringtone_option_preference\"\
  \n                android:title=\"My Preferences\"\n                android:summary=\"\
  Set Ring Tone Preferences\">\n    <RingtonePreference\n        android:key=\"ring_tone_pref\"\
  \n        android:title=\"Set Ringtone Preference\"\n        android:showSilent=\"\
  true\"\n        android:ringtoneType=\"alarm\"\n        android:summary=\"Set Ringtone\"\
  \ />\n</PreferenceScreen>\n```\n\n```\n// RingtonePreferenceActivity.java\n\nimport\
  \ android.os.Bundle;\nimport android.preference.PreferenceActivity;\n\npublic class\
  \ RingtonePreferenceActivity extends PreferenceActivity\n{\n    @Override\n    protected\
  \ void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        addPreferencesFromResource(R.xml.ringtone);\n    }\n}\n```\n\n当用户选择“设置铃声偏好”时，偏好设置框架会显示一个包含设备上所有铃声的\
  \ `ListPreference`（参见图 9-5）。用户可以选择一个铃声，然后点击“确定”或“取消”。如果点击“确定”，所选铃声将被持久化保存到偏好存储中。请注意，对于铃声而言，存储在偏好存储中的值是所选铃声的\
  \ URI——除非用户选择了“静音”，此时存储的值将是一个空字符串。URI 示例如下：\n\n```\n<string name=\"ring_tone_pref\"\
  >content://media/internal/audio/media/26</string>\n```\n\n**注意：** 如果模拟器中铃声不足，你可以自行添加一些。将音乐文件复制到你的\
  \ SD 卡。然后，打开 Android 音乐播放器应用，选择一个音乐文件。点击菜单按钮，然后点击“设为铃声”。我们将在第 19 章中教你如何将文件复制到 SD\
  \ 卡。\n\n最后，代码清单 9-7 中展示的 `RingtonePreference` 遵循了你之前定义的其他偏好设置相同的模式。区别在于这里设置了一些不同的属性，包括\
  \ `showSilent` 和 `ringtoneType`。你可以使用 `showSilent` 来在铃声列表中包含静音选项，使用 `ringtoneType`\
  \ 来限制铃声列表中显示的铃声类型。该属性的可选值包括 `ringtone`、`notification`、`alarm` 和 `all`。\n\n### 参考资料\n\
  \n这里提供了一份你可能希望进一步探索的主题的实用参考信息。\n\n-   [`http://www.androidbook.com/projects`](http://www.androidbook.com/projects)。请在此处查找与本书相关的可下载项目列表。对于本章，请查找名为\
  \ `ProAndroid3_Ch09_Preferences.zip` 的 ZIP 文件。该 ZIP 文件包含本章的所有项目，它们列于不同的根目录中。其中还有一个\
  \ `README.TXT` 文件，详细描述了如何将项目从这类 ZIP 文件导入 Eclipse。\n\n### 本章小结\n\n在本章中，我们讨论了如何在 Android\
  \ 中管理偏好设置。我们向你展示了如何使用 `ListPreference`、`CheckBoxPreference`、`EditTextPreference`\
  \ 和 `RingtonePreference`。我们还讨论了如何将偏好设置分组以及如何以编程方式操作偏好设置。最后，我们演示了如何使用偏好设置框架在 Activity\
  \ 的不同调用之间保存和恢复信息。\n\n"
- '# 第 10 章


  '
- "# 探索安全与权限\n\n在本章中，我们将讨论 Android 的应用程序安全模型，这是 Android 平台的基础部分。在 Android 中，安全性贯穿应用程序生命周期的所有阶段——从设计时的策略考量到运行时的边界检查。你将了解\
  \ Android 的安全架构并理解如何设计安全的应用程序。\n\n让我们从 Android 安全模型开始。\n\n### 理解 Android 安全模型\n\n\
  在第一部分中，我们将介绍应用程序在部署和执行阶段的安全性。在部署方面，Android 应用程序必须使用数字证书签名，才能安装到设备上。在执行方面，Android\
  \ 在独立的进程中运行每个应用程序，每个进程都有一个唯一的、永久的用户 ID（在安装时分配）。这为进程设置了边界，防止一个应用程序直接访问另一个应用程序的数据。此外，Android\
  \ 定义了一个声明式权限模型来保护敏感功能（例如联系人列表）。\n\n在接下来的几节中，我们将讨论这些主题。但在开始之前，我们先概述一些稍后会提到的安全概念。\n\
  \n#### 安全概念概述\n\nAndroid 要求应用程序使用数字证书签名。此要求的一个好处是，应用程序无法被非原始作者发布的版本更新。例如，如果我们发布了一个应用程序，那么你不能用你的版本更新我们的应用程序（当然，除非你以某种方式获取了我们的证书）。那么，应用程序签名意味着什么？签名应用程序的过程又是怎样的？\n\
  \n你使用数字证书为应用程序签名。*数字证书* 是一个包含你相关信息（如公司名称、地址等）的工件。数字证书的几个重要属性包括其签名和公钥/私钥。公钥/私钥也称为*密钥对*。请注意，虽然此处使用数字证书来签署\
  \ `.apk` 文件，但你也可以将它们用于其他目的（例如加密通信）。你可以从受信任的证书颁发机构 (CA) 获取数字证书，也可以使用诸如 `keytool`\
  \ 等工具自行生成，我们稍后会对此进行讨论。数字证书存储在密钥库中。*密钥库* 包含一个数字证书列表，每个证书都有一个别名，用于在密钥库中引用它。\n\n为 Android\
  \ 应用程序签名需要三样东西：一个数字证书、一个 `.apk` 文件，以及一个知道如何将数字签名应用到 `.apk` 文件上的工具。正如你将看到的，我们使用 Java\
  \ 开发工具包 (JDK) 发行版中包含的一个名为 `jarsigner` 的免费工具。该工具是一个命令行工具，知道如何使用数字证书对 `.jar` 文件进行签名。\n\
  \n现在，让我们继续讨论如何用数字证书签署 `.apk` 文件。\n\n#### 为部署签署应用程序\n\n要将 Android 应用程序安装到设备上，首先需要使用数字证书签署\
  \ Android 软件包（即 `.apk` 文件）。但是，证书可以是自签名的——你无需从 VeriSign 等证书颁发机构购买证书。\n\n为部署签署应用程序涉及三个步骤。第一步是使用\
  \ `keytool`（或类似工具）生成证书。第二步是使用 `jarsigner` 工具用生成的证书签署 `.apk` 文件。第三步是在内存边界上对齐应用程序的各个部分，以便在设备上运行时更高效地使用内存。请注意，在开发过程中，Eclipse\
  \ 的 ADT 插件会为你处理所有事情：在部署到模拟器或设备之前，签署你的 `.apk` 文件并进行内存对齐。\n\n\n\n#### 使用 `keytool`\
  \ 生成自签名证书\n\n`keytool` 工具用于管理私钥及其对应的 X.509 证书（一种数字证书标准）数据库。该工具随 JDK 一起提供，位于 JDK\
  \ 的 `bin` 目录下。如果你按照第 2 章中关于修改 `PATH` 的说明进行操作，那么 JDK 的 `bin` 目录应该已经在你的 `PATH` 中了。\n\
  \n在本节中，我们将演示如何生成一个包含单一条目的密钥库，随后你将使用该密钥库对 Android 的 `.apk` 文件进行签名。要生成一个密钥库条目，请执行以下步骤：\n\
  \n1.  创建一个用于存放密钥库的文件夹，例如 `c:\\android\\release\\`。\n2.  打开一个工具窗口，并使用代码清单 10-1 中所示的参数执行\
  \ `keytool` 工具（关于“工具窗口”的具体含义，详见第 2 章）。\n\n**代码清单 10-1.** *使用 `keytool` 工具生成密钥库条目*\n\
  \n```\nkeytool -genkey -v -keystore \"c:\\android\\release\\release.keystore\"\n\
  -alias androidbook -storepass paxxword -keypass paxxword -keyalg RSA\n-validity\
  \ 14000\n```\n\n传递给 `keytool` 的所有参数都汇总在表 10-1 中。\n\n**表 10-1.** *传递给 `keytool` 工具的参数*\n\
  \n| **参数** | **描述** |\n| --- | --- |\n| `genkey` | 指示 `keytool` 生成一对公钥/私钥。 |\n|\
  \ `v` | 指示 `keytool` 在密钥生成过程中输出详细信息。 |\n| `keystore` | 密钥库数据库的路径（本例中为一个文件）。如果该文件不存在，则会自动创建。\
  \ |\n| `alias` | 密钥库条目的唯一名称。稍后将使用此别名来引用该密钥库条目。 |\n| `storepass` | 密钥库的密码。 |\n| `keypass`\
  \ | 用于访问私钥的密码。 |\n| `keyalg` | 算法。 |\n| `validity` | 有效期。 |\n\n如果你未在命令行中提供表 10-1\
  \ 中列出的密码，`keytool` 会提示你输入。如果你的计算机并非只有你一人使用，为了安全起见，最好不要在命令行中指定 `–storepass` 和 `–keypass`，而是在\
  \ `keytool` 提示时再输入它们。代码清单 10-1 中的命令会在你的密钥库文件夹中生成一个密钥库数据库文件。该数据库文件名为 `release.keystore`。条目的\
  \ `validity`（有效期）为 14,000 天（约 38 年）——这是一个相当长的时间。你应该理解其中的原因。Android 文档建议你指定的有效期应长于应用程序的整个生命周期，这包括应用程序的多次更新。它建议有效期至少为\
  \ 25 年。此外，如果你计划在 Android Market（[`http://www.android.com/market/`](http://www.android.com/market/)）上发布应用程序，你的证书有效期至少需要到\
  \ 2033 年 10 月 22 日。Android Market 在上传每个应用程序时都会检查，以确保其证书在该日期之前有效。因为你的更新版本必须与最初使用的证书匹配，所以请务必保管好你的密钥库文件！如果你丢失了它且无法重新创建，你将无法更新你的应用程序，而只能发布一个全新的应用程序。\n\
  \n回到 `keytool`，参数 `alias` 是为密钥库数据库中的条目指定的唯一名称；稍后你将使用此名称来引用该条目。当你运行代码清单 10-1 中的 `keytool`\
  \ 命令时，`keytool` 会问你几个问题（见图 10-1），然后生成密钥库数据库和条目。\n\n![images](img/1001.jpg)\n\n**图\
  \ 10-1.** *`keytool` 询问的附加问题*\n\n一旦你拥有了用于发布版证书的密钥库文件，你可以重复使用此文件来添加更多证书。只需再次使用 `keytool`\
  \ 并指定你现有的密钥库文件即可。\n\n#### 调试密钥库与开发证书\n\n我们之前提到过，Eclipse 的 ADT 插件会为你自动设置一个开发密钥库。然而，开发期间用于签名的默认证书不能用于在真机上进行发布部署。部分原因是\
  \ ADT 生成的开发证书有效期仅为 365 天，这显然无法满足到 2033 年 10 月 22 日的要求。那么在开发进行到第三百六十六天时会发生什么？你会遇到构建错误。你现有的应用程序应该仍然可以运行，但要构建应用程序的新版本，你需要生成一个新证书。最简单的方法是删除现有的\
  \ `debug.keystore` 文件，一旦再次需要它时，ADT 会生成一个新的文件和证书，该证书又有效 365 天。\n\n要找到你的 `debug.keystore`\
  \ 文件，请打开 Eclipse 的“Preferences”（首选项）界面，然后进入 Android ![images](img/U001.jpg) Build。调试证书的位置将显示在“Default\
  \ debug keystore”（默认调试密钥库）字段中，如图 10-2 所示（如果在查找 Preferences 菜单时遇到困难，请参阅第 2 章）。\n\n\
  ![images](img/1002.jpg)\n\n**图 10-2.** *调试证书的位置*\n\n当然，既然你有了新的开发证书，你就无法使用新开发证书更新\
  \ AVD 或设备上的现有应用程序了。Eclipse 会在控制台中提供消息，告诉你需要先使用 `adb` 卸载现有应用程序，这当然可以做到。如果你的 AVD 上安装了许多应用程序，你可能会觉得直接重新创建一个\
  \ AVD 更简单，这样它不包含任何你的应用程序，你可以从头开始。为了避免一年后出现这个问题，你可以生成自己的 `debug.keystore` 文件，并设定任何你想要的**有效期**。显然，该文件需要具有与\
  \ ADT 会创建的文件相同的文件名，并位于相同的目录中。证书别名为 `androiddebugkey`，`storepass` 和 `keypass` 均为\
  \ `\"android\"`。ADT 将证书的名字和姓氏设置为 `\"Android Debug\"`，组织单位设置为 `\"Android\"`，两字母国家代码设置为\
  \ `\"US\"`。你可以将组织、城市和州的值保留为 `\"Unknown\"`。\n\n如果你之前使用旧的调试证书从 Google 获取了 `map-api`\
  \ 密钥，那么你将需要获取一个新的 `map-api` 密钥来匹配新的调试证书。我们将在第 17 章 中介绍 `map-api` 密钥。\n\n现在你拥有了可用于签署发布版\
  \ `.apk` 文件的数字证书，你需要使用 `jarsigner` 工具来完成签名。具体操作方法如下。\n\n\n\n#### 使用 Jarsigner 工具对\
  \ `.apk` 文件进行签名\n\n上一节所述的 `keytool` 工具创建了一个数字证书，这是 `jarsigner` 工具的参数之一。`jarsigner`\
  \ 的另一个参数是待签名的实际 Android 包。要生成 Android 包，你需要使用 Eclipse 的 ADT 插件中的“导出未签名应用包”工具。你可以在\
  \ Eclipse 中右键点击 Android 项目，选择“Android 工具”，然后选择“导出未签名应用包”来访问该工具。运行“导出未签名应用包”工具会生成一个不使用调试证书签名的\
  \ `.apk` 文件。为了演示其工作原理，请在你的某个 Android 项目上运行该工具，并将生成的 `.apk` 文件保存到某处。在本例中，我们将使用之前创建的密钥库文件夹，并生成一个名为\
  \ `c:\\android\\release\\myappraw.apk` 的 `.apk` 文件。\n\n有了 `.apk` 文件和密钥库条目后，运行 `jarsigner`\
  \ 工具对 `.apk` 文件进行签名（参见列表 10–2）。运行此命令时，请根据实际情况使用密钥库文件和 `.apk` 文件的完整路径名。\n\n**列表 10–2.**\
  \ *使用 `jarsigner` 对 `.apk` 文件进行签名*\n\n```\njarsigner -keystore \"你的 release.keystore\
  \ 文件的路径\" -storepass 密码\n-keypass 密码  \"你的原始 APK 文件的路径\" androidbook\n```\n\n要签署\
  \ `.apk` 文件，你需要提供密钥库的位置、密钥库密码、私钥密码、`.apk` 文件的路径以及密钥库条目的别名。之后，`jarsigner` 将使用密钥库条目中的数字证书对\
  \ `.apk` 文件进行签名。要运行 `jarsigner` 工具，你需要打开一个工具窗口（如第 2 章所述），或者打开命令提示符或终端窗口，然后导航到 JDK\
  \ 的 `bin` 目录，或者确保 JDK 的 `bin` 目录已添加到系统路径中。出于安全考虑，更安全的做法是省略命令中的密码参数，只需让 `jarsigner`\
  \ 在必要时提示你输入密码。图 10–3 展示了 `jarsigner` 工具的调用情况。\n\n正如我们之前指出的，Android 要求应用程序必须使用数字签名进行签署，以防止恶意程序员用自己的版本更新你的应用程序。为此，Android\
  \ 要求应用程序的更新必须使用与原始版本相同的签名。如果你使用不同的签名签署应用程序，Android 会将它们视为两个不同的应用程序。因此，我们再次提醒你，请妥善保管你的密钥库文件，以便将来需要为应用程序提供更新时能够使用。\n\
  \n![images](img/1003.jpg)\n\n**图 10–3.** *使用 `jarsigner`*\n\n#### 使用 `zipalign`\
  \ 对齐应用程序\n\n你希望应用程序在设备上运行时尽可能高效地使用内存。如果应用程序在运行时包含未压缩的数据（可能是某些图像类型或数据文件），Android\
  \ 可以使用 `mmap()` 调用将这些数据直接映射到内存中。不过，要实现这一点，数据必须在 4 字节内存边界上对齐。Android 设备中的 CPU 是 32\
  \ 位处理器，而 32 位等于 4 字节。`mmap()` 调用使 `.apk` 文件中的数据看起来像内存一样，但如果数据未在 4 字节边界上对齐，则无法做到这一点，并且运行时必须进行额外的数据复制。位于\
  \ Android SDK tools 目录中的 `zipalign` 工具会检查你的应用程序，并将任何未在 4 字节内存边界上对齐的未压缩数据稍微移动到 4\
  \ 字节内存边界上。你可能会发现应用程序的文件大小略有增加，但不会太明显。要对你的 `.apk` 文件执行对齐操作，请在工具窗口中使用以下命令（另请参见图 10–4）：\n\
  \n```\nzipalign –v 4 infile.apk outfile.apk\n```\n\n![images](img/1004.jpg)\n\n\
  **图 10–4.** *使用 `zipalign`*\n\n请注意，`zipalign` 不会修改输入文件，这就是为什么我们在从 Eclipse 导出时选择在文件名中使用“raw”（原始）的原因。现在，我们的输出文件有了适合部署的名称。如果你需要覆盖现有的\
  \ `outfile.apk` 文件，可以使用 `–f` 选项。另请注意，`zipalign` 在你创建对齐文件时会执行对齐验证。要验证现有文件是否正确对齐，请按以下方式使用\
  \ `zipalign`：\n\n```\nzipalign –c –v 4 filename.apk\n```\n\n非常重要的是，你必须在*签名之后*再对齐；否则，签名可能会导致内容重新不对齐。这并不意味着你的应用程序会崩溃，但可能会使用比所需更多的内存。\n\
  \n在 Eclipse 中，你可能已经注意到“Android 工具”下有一个名为“导出已签名应用包”的菜单选项。这将启动所谓的导出向导，它会为你完成上述所有步骤，仅提示你输入密钥库文件的路径、密钥别名、密码以及输出\
  \ `.apk` 文件的名称。如果你需要，它甚至还可以创建新的密钥库或新密钥。你可能会发现使用向导更容易，或者你更倾向于自己编写脚本对导出的未签名应用包进行操作。既然你已经了解了每种方法的工作原理，现在可以决定哪种更适合你。\n\
  \n一旦你签名并对齐了 `.apk` 文件，就可以使用 `adb` 工具手动将其安装到模拟器上。作为练习，请启动模拟器。我们尚未讨论的一种方法是：转到 Eclipse\
  \ 的“窗口”菜单，选择“Android SDK 和 AVD 管理器”。将显示一个窗口，列出你可用的 AVD。选择你想用于模拟器的 AVD，然后点击“启动”按钮。模拟器将启动，但不会从\
  \ Eclipse 复制任何你的开发项目。现在，打开一个工具窗口，并使用 `install` 命令运行 `adb` 工具：\n\n```\nadb install\
  \ \"APK 文件的路径\"\n```\n\n这可能会因为几个原因失败，但最可能的原因是：模拟器上已安装了该应用程序的调试版本，导致证书错误；或者模拟器上已安装了该应用程序的发布版本，导致“已存在”错误。对于第一种情况，你可以使用以下命令卸载调试应用程序：\n\
  \n```\nadb uninstall 包名\n```\n\n请注意，卸载命令的参数是应用程序的包名，而不是 `.apk` 文件名。包名在已安装应用程序的 `AndroidManifest.xml`\
  \ 文件中定义。\n\n对于第二种情况，你可以使用以下命令，其中 `–r` 表示重新安装应用程序，同时保留其在设备（或模拟器）上的数据：\n\n```\nadb\
  \ install –r \"APK 文件的路径\"\n```\n\n现在，让我们看看签名如何影响更新应用程序的过程。\n\n\n\n#### 安装应用更新与签名\n\
  \n此前，我们提到证书具有过期日期，并且谷歌建议将过期日期设置在遥远的未来，以应对大量应用更新的情况。那么，如果证书确实过期了会发生什么？Android 是否仍能运行该应用？幸运的是，答案是肯定的——Android\
  \ 仅在安装时检查证书的过期时间。一旦应用安装完成，即使证书过期，它也会继续运行。\n\n但更新呢？不幸的是，一旦证书过期，你将无法更新应用。换句话说，正如谷歌所建议的，你需要确保证书的有效期足够长，以支持应用的整个生命周期。如果证书过期，Android\
  \ 将不会安装应用的更新。你唯一的选择是创建一个新的应用——一个具有不同包名的应用——并使用新证书对其进行签名。因此，正如你所见，在生成证书时考虑其过期日期至关重要。\n\
  \n现在你已经了解了部署和安装方面的安全性，让我们继续探讨 Android 的运行时安全。\n\n#### 执行运行时安全检查\n\nAndroid 的运行时安全发生在进程和操作层面。在进程层面，Android\
  \ 阻止一个应用直接访问另一个应用的数据。它通过让每个应用在不同的进程中运行，并分配一个独特且永久的用户 ID 来实现这一点。在操作层面，Android 定义了一组受保护的功能和资源列表。为了让你的应用访问这些信息，你需要在`AndroidManifest.xml`文件中添加一个或多个权限请求。你还可以使用你的应用定义自定义权限。\n\
  \n在接下来的部分中，我们将讨论进程边界安全以及如何声明和使用预定义权限。我们还将讨论创建自定义权限并在你的应用中强制执行它们。让我们从剖析 Android 在进程边界的安全性开始。\n\
  \n##### 理解进程边界的安全性\n\n与桌面环境（大多数应用在同一个用户 ID 下运行）不同，每个 Android 应用通常在其唯一的 ID 下运行。通过让每个应用在不同\
  \ ID 下运行，Android 在每个进程周围创建了一个隔离边界。这防止了一个应用直接访问另一个应用的数据。\n\n尽管每个进程都有边界，但应用之间的数据共享显然是可能的，但必须是显式的。换句话说，要从另一个应用获取数据，你必须通过该应用的组件。例如，你可以查询另一个应用的内容提供者，可以调用另一个应用中的\
  \ Activity，或者——正如你将在第 11 章中看到的——你可以与另一个应用的服务通信。所有这些机制都提供了在应用之间共享信息的方法，但它们是以显式的方式进行的，因为你不能直接访问底层数据库、文件等。\n\
  \nAndroid 在进程边界的安全性清晰而简单。当我们开始讨论保护资源（如联系人数据）、功能（如设备摄像头）和我们自己的组件时，情况就变得有趣了。为了提供这种保护，Android\
  \ 定义了一个权限方案。现在我们来剖析它。\n\n##### 声明和使用权限\n\nAndroid 定义了一个旨在保护设备上资源和功能的权限方案。例如，默认情况下，应用不能访问联系人列表、拨打电话等。为了保护用户免受恶意应用的侵害，Android\
  \ 要求应用在需要使用受保护功能或资源时请求权限。正如你很快会看到的，权限请求放在清单文件中。在安装时，APK 安装程序会根据`.apk`文件的签名和/或用户的反馈来授予或拒绝请求的权限。如果权限未被授予，任何尝试执行或访问相关功能的行为都将导致权限失败。\n\
  \n表 10-2 展示了一些常用功能及其所需的权限。尽管你还未熟悉表中列出的所有功能，但你将在后续内容中了解到它们（无论是在本章还是后续章节中）。\n\n**表\
  \ 10-2.** *功能、资源及其所需的权限*\n\n| **功能/资源** | **所需权限** | **描述** |\n| --- | --- | ---\
  \ |\n| 摄像头 | `android.permission.CAMERA` | 允许你访问设备摄像头。 |\n| 互联网 | `android.permission.INTERNET`\
  \ | 允许你建立网络连接。 |\n| 用户的联系人数据 | `android.permission.READ_CONTACTS` `android.permission.WRITE_CONTACTS`\
  \ | 允许你读取或写入用户的联系人数据。 |\n| 用户的日历数据 | `android.permission.READ_CALENDAR` `android.permission.WRITE_CALENDAR`\
  \ | 允许你读取或写入用户的日历数据。 |\n| 录制音频 | `android.permission.RECORD_AUDIO` | 允许你录制音频。 |\n\
  | Wi-Fi 位置信息 | `android.permission.ACCESS_COARSE_LOCATION` | 允许你访问来自 Wi-Fi 和蜂窝基站的粗略位置信息。\
  \ |\n| GPS 位置信息 | `android.permission.ACCESS_FINE_LOCATION` | 允许你访问精确的位置信息。这包括 GPS\
  \ 位置信息。对于 Wi-Fi 和蜂窝基站定位也足够。 |\n| 电池信息 | `android.permission.BATTERY_STATS` | 允许你获取电池状态信息。\
  \ |\n| 蓝牙 | `android.permission.BLUETOOTH` | 允许你连接到已配对的蓝牙设备。 |\n\n有关权限的完整列表，请参阅以下网址：\n\
  \n`http://developer.android.com/reference/android/Manifest.permission.html`\n\n\
  应用开发者可以通过在 `AndroidManifest.xml` 文件中添加条目来请求权限。例如，清单 10-3 请求访问设备摄像头、读取联系人列表和读取日历。\n\
  \n**清单 10-3.** *AndroidManifest.xml 中的权限*\n\n```\n<manifest …>\n    <application>\n\
  \         …\n    </application>\n    <uses-permission android:name=\"android.permission.CAMERA\"\
  \ />\n    <uses-permission android:name=\"android.permission.READ_CONTACTS\"/>\n\
  \    <uses-permission android:name=\"android.permission.READ_CALENDAR\" />\n</manifest>\n\
  ```\n\n请注意，你可以直接在 `AndroidManifest.xml` 文件中硬编码权限，也可以使用清单编辑器。当你打开（双击）清单文件时，清单编辑器会自动启动。清单编辑器包含一个下拉列表，其中预加载了所有权限，以防止你出错。如图\
  \ 10-5 所示，你可以通过选择清单编辑器中的“Permissions”选项卡来访问权限列表。\n\n![images](img/1005.jpg)\n\n\
  **图 10-5.** *Eclipse 中的 Android 清单编辑器工具*\n\n现在你已经知道 Android 定义了一组权限来保护一组功能和资源。同样，你也可以使用你的应用定义并强制执行自定义权限。让我们看看这是如何实现的。\n\
  \n\n\n#### 理解并使用自定义权限\n\nAndroid 允许您为应用定义自定义权限。例如，如果您想阻止某些用户启动应用中的某个 Activity，可以通过定义自定义权限来实现。要使用自定义权限，首先需要在\
  \ `AndroidManifest.xml` 文件中声明它们。定义权限后，就可以在组件定义中引用它。下面我们将向您展示具体操作方法。\n\n让我们创建一个应用，其中包含一个并非所有人都能启动的\
  \ Activity。相反，要启动该 Activity，用户必须拥有特定权限。当您准备好包含特权 Activity 的应用后，就可以编写一个知道如何调用该 Activity\
  \ 的客户端。\n\n**注意：** 在本章末尾，我们会提供一个 URL，您可以使用它下载本章的项目文件。这样您就可以将这些项目直接导入到 Eclipse 中。\n\
  \n首先，创建包含自定义权限和 Activity 的项目。打开 Eclipse IDE，选择 New ![images](img/U001.jpg) New Project\
  \ ![images](img/U001.jpg) Android Project。这将打开 New Android Project 对话框。输入 **CustomPermission**\
  \ 作为项目名称，选中 \"Create new project in workspace\" 单选按钮，并勾选 \"Use default location\"\
  \ 复选框。输入 **Custom Permission** 作为应用名称，**com.cust.perm** 作为包名，**CustPermMainActivity**\
  \ 作为 Activity 名称，并选择一个构建目标。点击 Finish 按钮创建项目。生成的项目将包含您刚创建的 Activity，该 Activity 将作为默认（主）Activity。我们还要创建一个*特权\
  \ Activity*——一个需要特殊权限才能访问的 Activity。在 Eclipse IDE 中，进入 `com.cust.perm` 包，创建一个名为\
  \ **PrivActivity** 的类，其超类为 `android.app.Activity`，并复制代码清单 10–4 中所示的代码。\n\n**代码清单\
  \ 10–4.** *PrivActivity 类*\n\n```\npackage com.cust.perm;\n\nimport android.app.Activity;\n\
  import android.os.Bundle;\nimport android.view.ViewGroup.LayoutParams;\nimport android.widget.LinearLayout;\n\
  import android.widget.TextView;\n\npublic class PrivActivity extends Activity\n\
  {\n    @Override\n    public void onCreate(Bundle savedInstanceState) {\n      \
  \  super.onCreate(savedInstanceState);\n        LinearLayout view = new LinearLayout(this);\n\
  \n        view.setLayoutParams(new LayoutParams(\n                LayoutParams.FILL_PARENT,\
  \ LayoutParams.WRAP_CONTENT));\n        view.setOrientation(LinearLayout.HORIZONTAL);\n\
  \n        TextView nameLbl = new TextView(this);\n\n        nameLbl.setText(\"Hello\
  \ from PrivActivity\");\n        view.addView(nameLbl);\n\n        setContentView(view);\n\
  \    }\n}\n```\n\n如您所见，`PrivActivity` 并没有做什么神奇的事情。我们只是想向您展示如何使用权限保护此 Activity，然后从客户端调用它。如果客户端调用成功，您将在屏幕上看到文字\
  \ \"Hello from PrivActivity\"。现在，您已经拥有了一个想要保护的 Activity，接下来可以为它创建权限。\n\n要创建自定义权限，您必须在\
  \ `AndroidManifest.xml` 文件中对其进行定义。最简单的方法是使用清单编辑器。双击 `AndroidManifest.xml` 文件，然后选择\
  \ Permissions 标签页。在 Permissions 窗口中，点击 Add 按钮，选择 Permission，然后点击 OK 按钮。清单编辑器将为您创建一个新的空权限。按照图\
  \ 10–6 所示设置其属性来填充新的权限。填写右侧的字段，如果左侧的标签仍然只显示 \"Permission\"，请点击它，它应该会更新为右侧的名称。\n\n\
  ![images](img/1006.jpg)\n\n**图 10–6.** *使用清单编辑器声明自定义权限*\n\n如图 10–6 所示，每个权限都有一个名称、标签、图标、权限组、描述和保护级别。表\
  \ 10–3 定义了这些属性。\n\n现在，您有了一个自定义权限。接下来，您需要告诉系统，只有拥有 `syh.permission.STARTMYACTIVITY`\
  \ 权限的应用才能启动 `PrivActivity` Activity。您可以通过在 `AndroidManifest.xml` 文件的 Activity 定义中添加\
  \ `android:permission` 属性来设置 Activity 所需的权限。为了能够启动该 Activity，您还需要为它添加一个 `intent-filter`。使用代码清单\
  \ 10–5 中的内容更新您的 `AndroidManifest.xml` 文件。\n\n**表 10–3.** *权限的属性*\n\n| 属性 | 是否必需\
  \ | 描述 |\n| --- | --- | --- |\n| `android:name` | 是 | 权限的名称。通常应遵循 Android 命名方案 (`*.permission.*`)。\
  \ |\n| `android:protectionLevel` | 是 | 定义与该权限相关的潜在风险。必须是以下值之一：`normal`、`dangerous`、`signature`、`signatureOrSystem`。根据保护级别，系统在决定是否授予权限时可能会采取不同的操作。`normal`\
  \ 表示该权限风险较低，不会损害系统、用户或其他应用。`dangerous` 表示该权限风险较高，系统在授予此权限前可能需要用户输入。`signature` 告诉\
  \ Android，仅当应用与声明该权限的应用使用相同的数字签名进行签名时，才应授予该权限。`signatureOrSystem` 告诉 Android 将权限授予具有相同签名的应用或\
  \ Android 包类。此保护级别适用于涉及多个供应商需要通过系统映像共享功能的非常特殊的情况。 |\n| `android:permissionGroup`\
  \ | 否 | 您可以将权限分组，但对于自定义权限，应避免设置此属性。如果您确实想设置此属性，请使用：`android.permission-group.SYSTEM_TOOLS`。\
  \ |\n| `android:label` | 否 | 虽然不是必需的，但请使用此属性提供权限的简短描述。 |\n| `android:description`\
  \ | 否 | 虽然不是必需的，但您应使用此属性提供更有用的描述，说明权限的用途以及它保护的内容。 |\n| `android:icon` | 否 | 权限可以与您资源中的图标相关联（例如\
  \ `@drawable/myicon`）。 |\n\n**代码清单 10–5.** *自定义权限项目的 AndroidManifest.xml 文件*\n\n\
  ```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest\n      package=\"com.cust.perm\"\
  \n      android:versionCode=\"1\"\n      android:versionName=\"1.0.0\">\n    <application\
  \ android:icon=\"@drawable/icon\" android:label=\"@string/app_name\">\n        <activity\
  \ android:name=\".CustPermMainActivity\"\n                  android:label=\"@string/app_name\"\
  >\n            <intent-filter>\n                <action android:name=\"android.intent.action.MAIN\"\
  \ />\n                <category android:name=\"android.intent.category.LAUNCHER\"\
  \ />\n            </intent-filter>\n        </activity>\n    <activity android:name=\"\
  PrivActivity\"\n              android:permission=\"syh.permission.STARTMYACTIVITY\"\
  >\n        <intent-filter>\n            <action android:name=\"android.intent.action.MAIN\"\
  \ />\n        </intent-filter>\n    </activity>\n</application>\n\n<permission\n\
  \    android:protectionLevel=\"normal\"\n    android:label=\"Start My Activity\"\
  \n    android:description=\"@string/startMyActivityDesc\"\n    android:name=\"syh.permission.STARTMYACTIVITY\"\
  ></permission>\n\n    <uses-sdk android:minSdkVersion=\"4\" />\n</manifest>\n```\n\
  \n\n\n清单 10–5 要求在字符串资源中添加一个名为 `startMyActivityDesc` 的字符串常量。为确保清单 10–5 能够编译，需将以下字符串资源添加至\
  \ `res/values/strings.xml` 文件：\n\n`<string name=\"startMyActivityDesc\">允许启动我的 Activity</string>`\n\
  \n现在，在模拟器中运行该项目。虽然主 Activity 未执行任何操作，但在为特权 Activity 编写客户端之前，仍需将应用程序安装到模拟器上。\n\n\
  接下来，我们为特权 Activity 编写一个客户端。在 Eclipse IDE 中，依次点击新建 ![images](img/U001.jpg) 项目 ![images](img/U001.jpg)\
  \ Android 项目。输入 **ClientOfCustomPermission** 作为项目名称，选中“在工作区中创建新项目”单选按钮，并勾选“使用默认位置”复选框。将应用程序名称设置为\
  \ **Client Of Custom Permission**，包名设置为 `com.client.cust.perm`，Activity 名称设置为 `ClientCustPermMainActivity`，并选择一个构建目标。点击“完成”按钮创建项目。\n\
  \n然后，你需要编写一个 Activity，该 Activity 显示一个按钮，点击该按钮可以调用特权 Activity。将清单 10–6 所示的布局复制到你刚创建的项目中的\
  \ `main.xml` 文件里。\n\n**清单 10–6.** *客户端项目的 Main.xml 文件*\n\n```xml\n<?xml version=\"\
  1.0\" encoding=\"utf-8\"?>\n<LinearLayout\n    android:orientation=\"vertical\"\n\
  \    android:layout_width=\"fill_parent\"    android:layout_height=\"fill_parent\"\
  \  >\n\n    <Button android:id=\"@+id/btn\"    android:text=\"启动特权 Activity\"\n\
  \    android:layout_width=\"wrap_content\"    android:layout_height=\"wrap_content\"\
  \n    android:onClick=”doClick”  />\n</LinearLayout>\n```\n\n如你所见，此 XML 布局文件定义了一个文本为“启动特权\
  \ Activity”的按钮。现在，让我们编写一个 Activity，用于处理按钮点击事件并启动特权 Activity。将清单 10–7 中的代码复制到你的 `ClientCustPermMainActivity`\
  \ 类中。\n\n**清单 10–7.** *修改后的 ClientCustPermMainActivity*\n\n```java\npackage com.client.cust.perm;\n\
  // 此文件为 ClientCustPermMainActivity.java\n\nimport android.app.Activity;\nimport\
  \ android.content.Intent;\nimport android.os.Bundle;\nimport android.view.View;\n\
  \npublic class ClientCustPermMainActivity extends Activity {\n    @Override\n  \
  \  public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n    }\n\n    public void doClick(View view)\
  \ {\n                Intent intent = new Intent();\n                intent.setClassName(\"\
  com.cust.perm\",\"com.cust.perm.PrivActivity\");\n                startActivity(intent);\n\
  \    }\n}\n```\n\n如清单 10–7 所示，当按钮被调用时，你会创建一个新的 Intent，然后设置要启动的 Activity 的类名。在此例中，你要启动\
  \ `com.cust.perm` 包中的 `com.cust.perm.PrivActivity`。\n\n此时唯一缺少的是一个 `uses-permission`\
  \ 条目，你需要将其添加到清单文件中，以告知 Android 运行时你需要 `syh.permission.STARTMYACTIVITY` 权限才能运行。用清单\
  \ 10–8 中的内容替换掉客户端项目的清单文件。\n\n**清单 10–8.** *客户端清单文件*\n\n```xml\n<?xml version=\"\
  1.0\" encoding=\"utf-8\"?>\n<manifest\n      package=\"com.client.cust.perm\"\n\
  \      android:versionCode=\"1\"\n      android:versionName=\"1.0.0\">\n    <application\
  \ android:icon=\"@drawable/icon\"\n                 android:label=\"@string/app_name\"\
  >\n        <activity android:name=\".ClientCustPermMainActivity\"\n            \
  \      android:label=\"@string/app_name\">\n           <intent-filter>\n       \
  \      <action android:name=\"android.intent.action.MAIN\" />\n             <category\
  \ android:name=\"android.intent.category.LAUNCHER\" />\n           </intent-filter>\n\
  \        </activity>\n    </application>\n\n    <uses-permission android:name=\"\
  syh.permission.STARTMYACTIVITY\" />\n    <uses-sdk android:minSdkVersion=\"4\" />\n\
  </manifest>\n```\n\n如清单 10–8 所示，我们添加了一个 `uses-permission` 条目，以请求启动我们在自定义权限项目中实现的\
  \ `PrivActivity` 所需的自定义权限。\n\n至此，你应该能够将客户端项目部署到模拟器上，然后点击“启动特权 Activity”按钮。当按钮被调用时，你应该会看到“来自\
  \ PrivActivity 的问候”文本。\n\n成功调用特权 Activity 后，从客户端项目的清单文件中移除 `uses-permission` 条目，并重新将项目部署到模拟器。部署完成后，确认在点击按钮启动特权\
  \ Activity 时会报错。注意，LogCat 会显示权限拒绝异常。\n\n现在你已经了解了 Android 中自定义权限的工作原理。显然，自定义权限不仅限于\
  \ Activity。事实上，你可以将预定义权限和自定义权限应用于 Android 的其他类型组件。接下来我们将探讨一个重要的类型：URI 权限。\n\n###\
  \ 理解与使用 URI 权限\n\n内容提供者（已在第 3 章中讨论）通常需要在比“全有或全无”更细的粒度上控制访问权限。幸运的是，Android 为此提供了一种机制。以电子邮件附件为例，附件可能需要被另一个\
  \ Activity 读取才能显示。但该其他 Activity 不应获得对所有电子邮件数据的访问权限，甚至也不需要访问所有附件。这时就需要 URI 权限发挥作用了。\n\
  \n\n\n#### 在 Intent 中传递 URI 权限\n\n当调用另一个 Activity 并传递 URI 时，你的应用可以指定它正在授予对所传递 URI\
  \ 的权限。但在应用执行此操作之前，它自身需要拥有该 URI 的权限，并且 URI 内容提供者必须配合，允许向另一个 Activity 授予权限。使用权限授予方式调用\
  \ Activity 的代码如代码清单 10-9 所示，该代码实际上来自 Android 电子邮件程序，它在此处启动一个 Activity 来查看电子邮件附件。\n\
  \n**代码清单 10–9.** *启动带有权限授予的 Activity 的代码*\n\n```java\ntry {\n    Intent intent =\
  \ new Intent(Intent.ACTION_VIEW);\n    intent.setData(contentUri);\n    intent.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION);\n\
  \    startActivity(intent);\n} catch (ActivityNotFoundException e) {\n    mHandler.attachmentViewError();\n\
  \    // TODO: 在下一个版本中添加适当的警告消息（以及大量上游清理工作以防止其发生）。\n}\n```\n\n附件由 `contentUri` 指定。请注意，Intent\
  \ 是使用操作 `Intent.ACTION_VIEW` 创建的，并通过 `setData()` 设置数据。该标志被设置为向任何能匹配此 Intent 的 Activity\
  \ 授予对附件的读取权限。这就是内容提供者发挥作用的地方。仅仅因为一个 Activity 拥有对内容的读取权限，并不意味着它可以将该权限传递给它并不拥有此权限的其他\
  \ Activity。内容提供者也必须允许这样做。当 Android 在某个 Activity 上找到匹配的 Intent 过滤器时，它会咨询内容提供者以确保权限可以被授予。本质上，系统是在询问内容提供者是否允许这个新的\
  \ Activity 访问 URI 指定的内容。如果内容提供者拒绝，则会抛出 `SecurityException`，操作失败。在代码清单 10-9 中，这个特定的应用程序并未检查\
  \ `SecurityException`，因为开发者预期不会有任何授予权限的拒绝。那是因为附件内容提供者是电子邮件应用程序的一部分！不过，仍然有可能找不到任何\
  \ Activity 来处理此附件，因此这是唯一被监视的异常。在调用处理 URI 的 Activity 已经拥有访问该 URI 的权限的情况下，内容提供者无法拒绝访问。也就是说，调用\
  \ Activity 可以授予权限，如果接收 Intent 的 Activity 已经拥有访问 `contentURI` 的必要权限，那么被调用的 Activity\
  \ 将顺利执行，不会出现任何问题。\n\n除了 `Intent.FLAG_GRANT_READ_URI_PERMISSION`，还有一个用于写权限的标志：`Intent.FLAG_GRANT_WRITE_URI_PERMISSION`。可以在一个\
  \ `Intent` 中同时指定这两个标志。此外，这些标志也适用于 `Service` 和 `BroadcastReceiver` 以及 `Activity`，因为它们都可以接收\
  \ Intent。\n\n#### 在内容提供者中指定 URI 权限\n\n那么，内容提供者如何指定 URI 权限呢？它可以通过两种方式在 `AndroidManifest.xml`\
  \ 文件中进行指定。\n\n*   首先，在 `<provider>` 标签中，`android:grantUriPermissions` 属性可以设置为 `true`\
  \ 或 `false`。如果设置为 `true`，则此内容提供者中的任何内容都可以被授予权限。如果设置为 `false`，则可以使用第二种方式指定 URI 权限，或者内容提供者可以决定根本不允许任何其他人授予权限。\n\
  *   第二种允许授予权限的方式是通过 `<provider>` 的子标签进行指定。子标签是 `<grant-uri-permission>`，你可以在 `<provider>`\
  \ 内拥有多个此标签。`<grant-uri-permission>` 有三个可能的属性：\n    *   使用 `android:path` 属性，你可以指定一个完整的路径，该路径将具有可授予的权限。\n\
  \    *   类似地，`android:pathPrefix` 指定 URI 路径的开头部分。\n    *   `android:pathPattern`\
  \ 允许使用通配符（即星号 `*` 字符）来指定路径。\n\n正如我们之前所述，授予权限的实体本身必须对内容拥有适当的权限，然后才能被允许将这些权限授予其他实体。内容提供者还有其他控制对其内容访问的方式，包括通过\
  \ `<provider>` 标签的 `android:readPermission` 属性、`android:writePermission` 属性和 `android:permission`\
  \ 属性（这是一种使用单个权限 `String` 值同时指定读写权限的便捷方法）。这三个属性中任何一个的值都是一个 `String`，表示调用者为了读取或写入此内容提供者所需拥有的权限。在\
  \ Activity 可以将读取权限授予某个内容 URI 之前，该 Activity 必须首先拥有读取权限，通过 `android:readPermission`\
  \ 属性或 `android:permission` 属性来指定。希望获得这些权限的实体需要在它们的清单文件中使用 `<uses-permission>` 标签进行声明。\n\
  \n### 总结\n\n在本章中，你了解到 Android 要求所有应用程序都使用数字证书进行签名。我们讨论了使用模拟器和 Eclipse 确保构建时安全性，以及签署\
  \ Android 包以进行发布。我们还讨论了运行时安全性；你了解到 Android 安装程序会在安装时请求你的应用程序所需的权限。我们还向你展示了如何定义应用程序所需的权限，以及如何创建你自己的自定义权限。最后，我们介绍了内容提供者如何控制对其内容的访问，以及它们如何允许实体将权限授予可能被调用来对内容提供者中的内容执行操作的其他实体，而无需为该辅助实体提供访问内容提供者中*所有*内容的权限。\n\
  \n在下一章中，我们将讨论在 Android 中构建和使用服务。\n\n## 第 11 章\n\n## 构建和使用服务\n\nAndroid 平台提供了一个完整的软件栈。这意味着你拥有一个操作系统和中间件，以及可工作的应用程序（例如电话拨号器）。除了所有这些，你还有一个\
  \ SDK，可以用来为平台编写应用程序。到目前为止，我们已经看到可以构建通过用户界面直接与用户交互的应用程序。然而，我们尚未讨论后台服务或构建在后台运行的组件的可能性。\n\
  \n在本章中，我们将重点介绍如何在 Android 中构建和使用服务。首先，我们将讨论使用 HTTP 服务，然后介绍一种执行简单后台任务的好方法，最后讨论进程间通信——即同一设备上应用程序之间的通信。接着，我们将更进一步，构建一个与\
  \ Google 翻译 API 集成的可工作示例应用程序。\n\n\n\n### 消费 HTTP 服务\n\nAndroid 应用程序以及一般的移动应用，都是具备丰富功能的小型应用。这类应用在小型设备上提供如此丰富功能的方式之一，就是从各种来源获取信息。例如，大多数\
  \ Android 智能手机都预装了地图应用程序，它提供了复杂的地图功能。然而，我们知道，该应用程序是与 Google Maps API 以及其他服务集成在一起的，正是这些服务提供了大部分复杂功能。\n\
  \n也就是说，你编写的应用程序也可能会利用其他应用程序和 API 的信息。一种常见的集成策略是使用 HTTP。例如，你可能有一个部署在互联网上的 Java Servlet，它提供了你想从某个\
  \ Android 应用程序中利用的服务。那么在 Android 中该如何做到这一点呢？有趣的是，Android SDK 内置了一个 Apache 的 `HttpClient`\
  \ 变体（[`hc.apache.org/httpclient-3.x/`](http://hc.apache.org/httpclient-3.x/)），它在\
  \ J2EE 领域被广泛使用。Android 版本已经针对 Android 进行了修改，但其 API 与 J2EE 版本的 API 非常相似。\n\nApache\
  \ 的 `HttpClient` 是一个全面的 HTTP 客户端。虽然它完全支持 HTTP 协议，但你很可能只会用到 HTTP GET 和 POST。在本节中，我们将讨论如何使用\
  \ `HttpClient` 进行 HTTP GET 和 HTTP POST 调用。\n\n#### 使用 HttpClient 进行 HTTP GET 请求\n\
  \n以下是使用 `HttpClient` 的通用模式之一：\n\n1.  创建一个 `HttpClient`（或获取一个现有引用）。\n2.  实例化一个新的\
  \ HTTP 方法，例如 `PostMethod` 或 `GetMethod`。\n3.  设置 HTTP 参数名/值。\n4.  使用 `HttpClient`\
  \ 执行 HTTP 调用。\n5.  处理 HTTP 响应。\n\n代码清单 11–1 展示了如何使用 `HttpClient` 执行 HTTP GET。\n\n\
  **注意：** 我们在本章末尾提供了一个 URL，你可以使用它来下载本章的项目。这将允许你直接将这些项目导入 Eclipse。另外，由于代码会尝试使用互联网，在使用\
  \ `HttpClient` 进行 HTTP 调用时，你需要在清单文件中添加 `android.permission.INTERNET` 权限。\n\n**代码清单\
  \ 11–1.** *使用 HttpClient 和 HttpGet：HttpGetDemo.java*\n\n```\nimport java.io.BufferedReader;\n\
  import java.io.IOException;\nimport java.io.InputStreamReader;\nimport org.apache.http.HttpResponse;\n\
  import org.apache.http.client.HttpClient;\nimport org.apache.http.client.methods.HttpGet;\n\
  import org.apache.http.impl.client.DefaultHttpClient;\nimport android.app.Activity;\n\
  import android.os.Bundle;\n\npublic class HttpGetDemo extends Activity {\n    /**\
  \ 当 Activity 首次创建时调用。 */\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
  \n        BufferedReader in = null;\n        try {\n            HttpClient client\
  \ = new DefaultHttpClient();\n            HttpGet request = new HttpGet(\"http://code.google.com/android/\"\
  );\n            HttpResponse response = client.execute(request);\n\n           \
  \ in = new BufferedReader(\n                    new InputStreamReader(\n       \
  \                 response.getEntity().getContent()));\n\n            StringBuffer\
  \ sb = new StringBuffer(\"\");\n            String line = \"\";\n            String\
  \ NL = System.getProperty(\"line.separator\");\n            while ((line = in.readLine())\
  \ != null) {\n                sb.append(line + NL);\n            }\n           \
  \ in.close();\n\n            String page = sb.toString();\n            System.out.println(page);\n\
  \        } catch (Exception e) {\n            e.printStackTrace();\n        } finally\
  \ {\n            if (in != null) {\n                try {\n                    in.close();\n\
  \                } catch (IOException e) {\n                    e.printStackTrace();\n\
  \                }\n            }\n        }\n    }\n}\n```\n\n`HttpClient` 为各种\
  \ HTTP 请求类型提供了抽象，例如 `HttpGet`、`HttpPost` 等。代码清单 11–1 使用 `HttpClient` 获取 `http://code.google.com/android/`\
  \ URL 的内容。实际的 HTTP 请求是通过调用 `client.execute()` 执行的。执行请求后，代码将整个响应读取到一个字符串对象中。请注意，`BufferedReader`\
  \ 在 `finally` 块中被关闭，这也会关闭底层的 HTTP 连接。\n\n在我们的示例中，我们将 HTTP 逻辑嵌入在一个 Activity 内部，但我们并不需要在\
  \ Activity 的上下文中才能使用 `HttpClient`。你可以在任何 Android 组件的上下文中使用它，或者将其作为独立类的一部分使用。事实上，你真的不应该直接在\
  \ Activity 内部使用 `HttpClient`，因为一个网络调用可能需要一段时间才能完成，并可能导致 Activity 被强制关闭。我们将在本章后面讨论这个主题。现在，我们先稍微“作弊”一下，以便专注于如何执行\
  \ `HttpClient` 调用。\n\n代码清单 11–1 中的代码执行了一个 HTTP 请求，没有向服务器传递任何 HTTP 参数。你可以通过将名/值对附加到\
  \ URL 上，将它们作为请求的一部分进行传递，如代码清单 11–2 所示。\n\n**代码清单 11–2.** *向 HTTP GET 请求添加参数*\n\n\
  ```\nHttpGet request = new HttpGet(\"http://somehost/WS2/Upload.aspx?one=valueGoesHere\"\
  );\nclient.execute(request);\n```\n\n当你执行 HTTP GET 时，请求的参数（名称和值）作为 URL 的一部分进行传递。以这种方式传递参数有一些限制。也就是说，URL\
  \ 的长度应保持在 2048 个字符以下。如果你要提交的数据量超过这个长度，则应改用 HTTP POST。POST 方法更加灵活，并将参数作为请求体的一部分进行传递。\n\
  \n\n\n#### 使用 HttpClient 执行 HTTP POST 请求（多部分示例）\n\n执行 HTTP POST 调用与执行 HTTP GET 调用非常相似（参见代码清单\
  \ 11–3）。\n\n**代码清单 11–3.** *使用 HttpClient 发送 HTTP POST 请求*\n\n```\nHttpClient client\
  \ = new DefaultHttpClient();\nHttpPost request = new HttpPost(\n    \"http://192.165.13.37/services/doSomething.do\"\
  );\nList<NameValuePair> postParameters = new ArrayList<NameValuePair>();\npostParameters.add(new\
  \ BasicNameValuePair(\"first\",\n    \"param value one\"));\npostParameters.add(new\
  \ BasicNameValuePair(\"issuenum\", \"10317\"));\npostParameters.add(new BasicNameValuePair(\"\
  username\", \"dave\"));\nUrlEncodedFormEntity formEntity = new UrlEncodedFormEntity(\n\
  \    postParameters);\nrequest.setEntity(formEntity);\nHttpResponse response = client.execute(request);\n\
  ```\n\n代码清单 11–3 中的代码将替换代码清单 11–1 中使用 `HttpGet` 的三行代码。其他所有代码可以保持不变。要使用 `HttpClient`\
  \ 执行 HTTP POST 调用，您必须使用 `HttpPost` 实例调用 `HttpClient` 的 `execute()` 方法。在执行 HTTP POST\
  \ 调用时，通常会将 URL 编码的名称/值表单参数作为 HTTP 请求的一部分传递。要使用 `HttpClient` 实现这一点，您需要创建一个包含 `NameValuePair`\
  \ 对象实例的列表，然后将该列表包装在一个 `UrlEncodedFormEntity` 对象中。`NameValuePair` 封装了一个名称/值组合，而 `UrlEncodedFormEntity`\
  \ 类知道如何编码适用于 HTTP 调用（通常是 POST 调用）的 `NameValuePair` 对象列表。创建 `UrlEncodedFormEntity`\
  \ 后，您可以将 `HttpPost` 的实体类型设置为该 `UrlEncodedFormEntity`，然后执行请求。\n\n在代码清单 11–3 中，我们首先创建了一个\
  \ `HttpClient`，然后使用 HTTP 端点的 URL 实例化了 `HttpPost`。接下来，我们创建了一个 `NameValuePair` 对象列表，并使用几个名称/值参数填充了它。然后，我们创建了一个\
  \ `UrlEncodedFormEntity` 实例，将 `NameValuePair` 对象列表传递给其构造函数。最后，我们调用了 POST 请求的 `setEntity()`\
  \ 方法，然后使用 `HttpClient` 实例执行了该请求。\n\nHTTP POST 的功能实际上远不止于此。通过 HTTP POST，我们既可以传递简单的名称/值参数（如代码清单\
  \ 11–3 所示），也可以传递诸如文件之类的复杂参数。HTTP POST 支持另一种称为多部分 POST 的请求体格式。使用这种类型的 POST，您可以像以前一样发送名称/值参数，同时还可以发送任意文件。不幸的是，Android\
  \ 自带的 `HttpClient` 版本并不直接支持多部分 POST。要执行多部分 POST 调用，您需要获取三个额外的 Apache 开源项目：Apache\
  \ Commons IO、Mime4j 和 HttpMime。您可以从以下网站下载这些项目：\n\n- Commons IO：[`commons.apache.org/io/`](http://commons.apache.org/io/)\n\
  - Mime4j：[`james.apache.org/mime4j/`](http://james.apache.org/mime4j/)\n- HttpMime：[`hc.apache.org/downloads.cgi`](http://hc.apache.org/downloads.cgi)（位于\
  \ HttpClient 内部）\n\n或者，您可以访问此站点下载所有用于在 Android 上执行多部分 POST 所需的 .jar 文件：\n\n`http://www.apress.com/book/view/1430226595`\n\
  \n代码清单 11–4 演示了如何在 Android 上执行多部分 POST。\n\n**代码清单 11–4.** *执行多部分 POST 调用*\n\n```\n\
  import java.io.ByteArrayInputStream;\nimport java.io.InputStream;\nimport org.apache.commons.io.IOUtils;\n\
  import org.apache.http.HttpResponse;\nimport org.apache.http.client.HttpClient;\n\
  import org.apache.http.client.methods.HttpPost;\nimport org.apache.http.entity.mime.MultipartEntity;\n\
  import org.apache.http.entity.mime.content.InputStreamBody;\nimport org.apache.http.entity.mime.content.StringBody;\n\
  import org.apache.http.impl.client.DefaultHttpClient;\n\nimport android.app.Activity;\n\
  \npublic class TestMultipartPost extends Activity\n{\n    public void executeMultipartPost()\
  \ throws Exception\n    {\n        try {\n            InputStream is = this.getAssets().open(\"\
  data.xml\");\n            HttpClient httpClient = new DefaultHttpClient();\n   \
  \         HttpPost postRequest =\n              new HttpPost(\"http://mysomewebserver.com/services/doSomething.do\"\
  );\n\n            byte[] data = IOUtils.toByteArray(is);\n\n            InputStreamBody\
  \ isb = new InputStreamBody(new\n                    ByteArrayInputStream(data),\
  \ \"uploadedFile\");\n            StringBody sb1 = new StringBody(\"some text goes\
  \ here\");\n            StringBody sb2 = new StringBody(\"some text goes here too\"\
  );\n\n            MultipartEntity multipartContent = new MultipartEntity();\n  \
  \          multipartContent.addPart(\"uploadedFile\", isb);\n            multipartContent.addPart(\"\
  one\", sb1);\n            multipartContent.addPart(\"two\", sb2);\n\n          \
  \  postRequest.setEntity(multipartContent);\n            HttpResponse response =httpClient.execute(postRequest);\n\
  \            response.getEntity().getContent().close();\n        } catch (Throwable\
  \ e)\n        {\n            // handle exception here\n         }\n    }\n}\n```\n\
  \n**注意：** 多部分示例使用了几个不属于 Android 运行时一部分的 .jar 文件。为了确保这些 .jar 文件会作为您 .apk 文件的一部分被打包，您需要在\
  \ Eclipse 中将它们添加为外部 .jar 文件。为此，请在 Eclipse 中右键单击您的项目，选择属性，选择 Java Build Path，选择 Libraries\
  \ 选项卡，然后选择 Add External JARs。\n\n完成这些步骤将使这些 .jar 文件在编译时和运行时都可用。\n\n要执行多部分 POST，您需要创建一个\
  \ `HttpPost`，并使用 `MultipartEntity` 实例（而不是我们为名称/值参数表单 POST 创建的 `UrlEncodedFormEntity`）调用其\
  \ `setEntity()` 方法。`MultipartEntity` 代表多部分 POST 请求的体。如代码所示，您创建一个 `MultipartEntity`\
  \ 实例，然后使用每个部分调用 `addPart()` 方法。代码清单 11–4 向请求添加了三个部分：两个字符串部分和一个 XML 文件。\n\n最后，如果您正在构建一个需要向\
  \ Web 资源传递多部分 POST 的应用程序，您可能需要在本地工作站上使用服务的模拟实现来调试解决方案。当您在本地工作站上运行应用程序时，通常可以使用 `localhost`\
  \ 或 IP 地址 `127.0.0.1` 来访问本地机器。但是，对于 Android 应用程序，您将无法使用 `localhost`（或 `127.0.0.1`），因为模拟器本身就是一个\
  \ `localhost`。您不希望将此客户端指向 Android 设备上的服务，而是希望指向您的工作站。要从模拟器中运行的应用程序引用您的开发工作站，您必须使用您工作站的\
  \ IP 地址。（如果您需要帮助确定工作站的 IP 地址，请参考第 2 章。）您需要修改代码清单 11–4，将 IP 地址替换为您工作站的 IP 地址。\n\n\
  \n\n#### SOAP、JSON 和 XML 解析器\n\nSOAP 呢？互联网上有很多基于 SOAP 的 Web 服务，但迄今为止，Google 并未在\
  \ Android 中为调用 SOAP Web 服务提供直接支持。Google 更倾向于 REST 风格的 Web 服务，这似乎是为了减少客户端设备所需的计算量。然而，代价是开发者必须做更多工作来发送数据和解析返回的数据。理想情况下，你会有一些与\
  \ Web 服务交互的选项。一些开发者使用 `kSOAP2` 开发工具包为 Android 构建 SOAP 客户端。我们不会介绍这种方法，但如果你感兴趣，可以自行了解。\n\
  \n**注意：** 原始的 `kSOAP2` 源代码位于此处：[`http://ksoap2.sourceforge.net/`](http://ksoap2.sourceforge.net/)。开源社区（幸好！）贡献了一个适用于\
  \ Android 的 `kSOAP2` 版本，你可以在此处了解更多信息：[`http://code.google.com/p/ksoap2-android/`](http://code.google.com/p/ksoap2-android/)。\n\
  \n一种成功应用的方法是在互联网上实现你自己的服务，这些服务可以与目标服务进行 SOAP（或其他协议）通信。这样，你的 Android 应用程序只需要与你的服务通信，你就拥有了完全的控制权。如果目标服务发生变化，你可能无需更新和发布新版本的应用程序就能处理。你只需更新服务器上的服务即可。这种方法的一个附带好处是，你可以更轻松地为你的应用程序实现付费订阅模式。如果用户让订阅过期，你可以在服务器上关闭他们的访问权限。\n\
  \nAndroid **确实**支持 JavaScript 对象表示法（JSON）。这是在 Web 服务器和客户端之间打包数据的一种相当常见的方法。JSON 解析类使得从响应中解包数据变得非常容易，以便你的应用程序可以对其进行处理。在本章后面学习\
  \ Google 翻译 API 时，我们将向你展示一些 JSON 代码。\n\nAndroid 还有几个 XML 解析器，你可以用来解释来自 HTTP 调用的响应。主要的解析器（`XMLPullParser`）已在第\
  \ 3 章中介绍。\n\n#### 处理异常\n\n处理异常是任何程序的一部分，但使用外部服务（例如 HTTP 服务）的软件必须特别注意异常，因为出错的可能性被放大了。在使用\
  \ HTTP 服务时，你可以预料到几种类型的异常。这些异常包括传输异常、协议异常和超时。你应该了解这些异常何时可能发生。\n\n传输异常可能由多种原因引起，但在移动设备上，最可能的情况是网络连接不佳。协议异常是\
  \ HTTP 协议层的异常。这些包括身份验证错误、无效的 cookie 等。例如，如果你必须在 HTTP 请求中提供登录凭据但未能提供，则可能会遇到协议异常。与\
  \ HTTP 调用相关的超时有两种类型：连接超时和套接字超时。如果 `HttpClient` 无法连接到 HTTP 服务器（例如，服务器不可用），则可能发生连接超时。如果\
  \ `HttpClient` 在定义的时间段内未能收到响应，则可能发生套接字超时。换句话说，`HttpClient` 能够连接到服务器，但服务器未能在分配的时间限制内返回响应。\n\
  \n既然你了解了可能发生的异常类型，那么如何处理它们呢？幸运的是，`HttpClient` 是一个健壮的框架，它承担了大部分负担。事实上，你唯一需要担心的异常类型是那些你可以轻松管理的类型。`HttpClient`\
  \ 通过检测传输问题并重试请求（这种方法非常适合此类异常）来处理传输异常。协议异常通常可以在开发过程中被清除。超时是你最可能需要处理的异常。处理两种超时类型（连接超时和套接字超时）的一种简单有效的方法是将\
  \ HTTP 请求的 `execute()` 方法包装在 `try`/`catch` 中，然后在发生失败时重试。这在列表 11-5 中进行了演示。\n\n**列表\
  \ 11-5.** *实现简单的重试技术以处理超时*\n\n```java\nimport java.io.BufferedReader;\nimport java.io.IOException;\n\
  import java.io.InputStreamReader;\nimport java.net.URI;\n\nimport org.apache.http.HttpResponse;\n\
  import org.apache.http.client.HttpClient;\nimport org.apache.http.client.methods.HttpGet;\n\
  import org.apache.http.impl.client.DefaultHttpClient;\n\npublic class TestHttpGet\
  \ {\n\n    public String executeHttpGetWithRetry() throws Exception {\n        int\
  \ retry = 3;\n\n        int count = 0;\n        while (count < retry) {\n      \
  \      count += 1;\n            try {\n                String response = executeHttpGet();\n\
  \                /**\n                 * 如果执行到这里，意味着我们成功了，可以停止。\n              \
  \   */\n                return response;\n            } catch (Exception e) {\n\
  \                /**\n                 * 如果我们用尽了重试次数\n                 */\n    \
  \            if (count < retry) {\n                    /**\n                   \
  \  * 我们还有剩余重试次数，因此记录消息并再次尝试。\n                     */\n                    System.out.println(e.getMessage());\n\
  \                } else {\n                    System.out.println(\"所有重试均失败\");\n\
  \                    throw e;\n                }\n            }\n        }\n   \
  \     return null;\n    }\n\n    public String executeHttpGet() throws Exception\
  \ {\n        BufferedReader in = null;\n        try {\n            HttpClient client\
  \ = new DefaultHttpClient();\n            HttpGet request = new\n              \
  \      HttpGet(\"http://code.google.com/android/\");\n            HttpResponse response\
  \ = client.execute(request);\n            in = new BufferedReader(\n           \
  \             new InputStreamReader(\n                                response.getEntity().getContent()));\n\
  \n            StringBuffer sb = new StringBuffer(\"\");\n            String line\
  \ = \"\";\n            String NL = System.getProperty(\"line.separator\");\n   \
  \         while ((line = in.readLine()) != null) {\n                sb.append(line\
  \ + NL);\n            }\n            in.close();\n\n            String result =\
  \ sb.toString();\n            return result;\n        } finally {\n            if\
  \ (in != null) {\n                try {\n                    in.close();\n     \
  \           } catch (IOException e) {\n                    e.printStackTrace();\n\
  \                }\n            }\n        }\n    }\n}\n```\n\n列表 11-5 中的代码展示了如何在发出\
  \ HTTP 调用时实现简单的重试技术来从超时中恢复。该列表显示了两个方法：一个执行 HTTP GET 请求（`executeHttpGet()`），另一个用重试逻辑包装了此方法（`executeHttpGetWithRetry()`）。逻辑非常简单。我们将尝试的重试次数设置为\
  \ 3，然后进入一个 `while` 循环。在循环内部，我们执行请求。请注意，请求被包装在 `try`/`catch` 块中，在 `catch` 块中我们检查是否用尽了重试尝试次数。\n\
  \n在现实世界的应用程序中使用 `HttpClient` 时，你需要特别注意可能出现的多线程问题。我们现在就来深入探讨这些问题。\n\n\n\n#### 处理多线程问题\n\
  \n到目前为止，我们展示的示例中，每个请求都会创建一个新的 `HttpClient`。但在实际应用中，你应当为整个应用创建一个 `HttpClient`，并将其用于所有\
  \ HTTP 通信。当单个 `HttpClient` 服务于所有 HTTP 请求时，还需要注意多线程问题——如果通过同一个 `HttpClient` 同时发起多个请求，这些问题可能会显现。幸运的是，`HttpClient`\
  \ 提供了便捷的处理方式：你只需使用 `ThreadSafeClientConnManager` 创建 `DefaultHttpClient` 即可，如清单 11-6\
  \ 所示。\n\n**清单 11-6.** *创建用于多线程的 HttpClient：CustomHttpClient.java*\n\n```\nimport\
  \ org.apache.http.HttpVersion;\nimport org.apache.http.client.HttpClient;\nimport\
  \ org.apache.http.conn.ClientConnectionManager;\nimport org.apache.http.conn.params.ConnManagerParams;\n\
  import org.apache.http.conn.scheme.PlainSocketFactory;\nimport org.apache.http.conn.scheme.Scheme;\n\
  import org.apache.http.conn.scheme.SchemeRegistry;\nimport org.apache.http.conn.ssl.SSLSocketFactory;\n\
  import org.apache.http.impl.client.DefaultHttpClient;\nimport org.apache.http.impl.conn.tsccm.ThreadSafeClientConnManager;\n\
  import org.apache.http.params.BasicHttpParams;\nimport org.apache.http.params.HttpConnectionParams;\n\
  import org.apache.http.params.HttpParams;\nimport org.apache.http.params.HttpProtocolParams;\n\
  import org.apache.http.protocol.HTTP;\n\npublic class CustomHttpClient {\n    private\
  \ static HttpClient customHttpClient;\n\n    /** 私有构造函数防止实例化 */\n    private CustomHttpClient()\
  \ {\n    }\n\n    public static synchronized HttpClient getHttpClient() {\n    \
  \    if (customHttpClient == null) {\n            HttpParams params = new BasicHttpParams();\n\
  \            HttpProtocolParams.setVersion(params, HttpVersion.HTTP_1_1);\n    \
  \        HttpProtocolParams.setContentCharset(params,\n                    HTTP.DEFAULT_CONTENT_CHARSET);\n\
  \            HttpProtocolParams.setUseExpectContinue(params, true);\n          \
  \  HttpProtocolParams.setUserAgent(params,\n\"Mozilla/5.0 (Linux; U; Android 2.2.1;\
  \ en-us; Nexus One Build/FRG83) AppleWebKit/533.1\"\n(KHTML, like Gecko) Version/4.0\
  \ Mobile Safari/533.1\"\n            );\n\n            ConnManagerParams.setTimeout(params,\
  \ 1000);\n\n            HttpConnectionParams.setConnectionTimeout(params, 5000);\n\
  \            HttpConnectionParams.setSoTimeout(params, 10000);\n\n            SchemeRegistry\
  \ schReg = new SchemeRegistry();\n            schReg.register(new Scheme(\"http\"\
  ,\n                            PlainSocketFactory.getSocketFactory(), 80));\n  \
  \          schReg.register(new Scheme(\"https\",\n                            SSLSocketFactory.getSocketFactory(),\
  \ 443));\n            ClientConnectionManager conMgr = new\n                   \
  \         ThreadSafeClientConnManager(params,schReg);\n\n            customHttpClient\
  \ = new DefaultHttpClient(conMgr, params);\n        }\n        return customHttpClient;\n\
  \    }\n\n    public Object clone() throws CloneNotSupportedException {\n      \
  \  throw new CloneNotSupportedException();\n    }\n}\n```\n\n如果你的应用需要多次发起 HTTP 调用，就应该创建一个服务于所有\
  \ HTTP 请求的 `HttpClient`。最简单的方式是创建一个单例类，使其可以从应用的任何位置访问，正如我们在此展示的。这是一个相当标准的 Java 模式：我们同步访问一个\
  \ getter 方法，该方法返回该单例中唯一的 `HttpClient` 对象，并在首次调用时按需创建。\n\n现在，来看一下 `CustomHttpClient`\
  \ 的 `getHttpClient()` 方法。该方法负责创建我们的单例 `HttpClient`。我们设置了一些基本参数、超时值，以及 `HttpClient`\
  \ 将支持的协议方案（即 HTTP 和 HTTPS）。请注意，实例化 `DefaultHttpClient()` 时，我们传入了一个 `ClientConnectionManager`。`ClientConnectionManager`\
  \ 负责管理 `HttpClient` 的 HTTP 连接。由于我们希望为所有 HTTP 请求（如果使用线程，这些请求可能重叠）使用同一个 `HttpClient`，因此创建了\
  \ `ThreadSafeClientConnManager`。\n\n我们还向你展示了另一种更简单的收集 HTTP 响应的方法，即使用 `BasicResponseHandler`。使用\
  \ `CustomHttpClient` 的活动（Activity）代码如清单 11-7 所示。\n\n**清单 11-7.** *使用自定义 HttpClient：HttpActivity.java*\n\
  \n```\nimport java.io.IOException;\nimport org.apache.http.client.HttpClient;\n\
  import org.apache.http.client.methods.HttpGet;\nimport org.apache.http.impl.client.BasicResponseHandler;\n\
  import org.apache.http.params.HttpConnectionParams;\nimport org.apache.http.params.HttpParams;\n\
  import android.app.Activity;\nimport android.os.Bundle;\nimport android.util.Log;\n\
  \npublic class HttpActivity extends Activity\n{\n    private HttpClient httpClient;\n\
  \    @Override\n    public void onCreate(Bundle savedInstanceState)\n    {\n   \
  \     super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
  \n        httpClient = CustomHttpClient.getHttpClient();\n        getHttpContent();\n\
  \    }\n\n    public void getHttpContent()\n    {\n        try {\n            HttpGet\
  \ request = new HttpGet(\"http://www.google.com/\");\n            String page =\
  \ httpClient.execute(request,\n                    new BasicResponseHandler());\n\
  \            System.out.println(page);\n        } catch (IOException e) {\n    \
  \        // 涵盖以下异常：\n            //      ClientProtocolException\n            //\
  \      ConnectTimeoutException\n            //      ConnectionPoolTimeoutException\n\
  \            //      SocketTimeoutException\n            e.printStackTrace();\n\
  \        }\n    }\n}\n```\n\n对于这个示例应用，我们简单地通过 HTTP GET 请求获取 Google 主页。我们还使用了 `BasicResponseHandler`\
  \ 对象，将页面内容呈现为一个大字符串，然后将其输出到 `LogCat`。如你所见，在 `execute()` 方法中添加 `BasicResponseHandler`\
  \ 非常容易。\n\n你可能会想利用每个 Android 应用都关联一个 `Application` 对象这一特性。默认情况下，如果你没有定义自定义的应用对象，Android\
  \ 会使用 `android.app.Application`。关于应用对象，有一点很有意思：你的应用始终只有一个应用对象，并且所有组件都可以访问它（通过全局上下文对象）。你可以扩展\
  \ `Application` 类并添加功能，例如我们的 `CustomHttpClient`。然而，在我们的场景中，并没有理由在 `Application`\
  \ 类本身中实现这一功能；既然你可以简单地创建一个独立的单例类来处理这类需求，那么最好不要去动 `Application` 类，这样会更好。\n\n\n\n#####\
  \ 超时设置的乐趣\n\n为我们的应用程序设置单一的 `HttpClient` 还有其他显著优势。我们可以在一个地方修改其属性，所有代码都能受益。例如，如果我们想要为\
  \ HTTP 调用设置通用的超时值，可以在创建 `HttpClient` 时，通过对 `HttpParams` 对象调用相应的 setter 函数来实现。请参考清单\
  \ 11–6 和 `getHttpClient()` 方法。注意，这里有三个超时值可供我们操作。第一个是连接管理器的超时，它定义了我们应该等待多长时间，才能从连接管理器管理的连接池中获取一个连接。在我们的示例中，将其设置为\
  \ 1 秒。我们唯一可能需要等待的情况是，当连接池中的所有连接都正在使用时。第二个超时值定义了我们应该等待多长时间，才能通过网络与远端的服务器建立连接。在这里，我们使用了\
  \ 2 秒的值。最后，我们将套接字超时值设置为 4 秒，以定义我们应该等待多久才能收到请求返回的数据。\n\n对应于前面描述的三种超时，我们可能会遇到这三种异常：`ConnectionPoolTimeoutException`、`ConnectTimeoutException`\
  \ 或 `SocketTimeoutException`。这三个异常都是 `IOException` 的子类，我们在 `HttpActivity` 中使用 `IOException`\
  \ 而不是分别捕获每个子类异常。\n\n如果你仔细研究我们在 `getHttpClient()` 中使用的每个参数设置类，可能会发现更多对你有用的参数。\n\n\
  我们已经向你描述了如何设置一个通用的 HTTP 连接池以供整个应用程序使用。其含义是，每次你需要使用连接时，各种设置都会适用于你的特定需求。但是，如果你想为某个特定消息使用不同的设置呢？值得庆幸的是，也有一种简单的方法可以实现这一点。我们向你展示了如何使用\
  \ `HttpGet` 或 `HttpPost` 对象来描述要在网络上发送的请求。与我们之前在 `HttpClient` 上设置 `HttpParams` 的方式类似，你也可以在\
  \ `HttpGet` 和 `HttpPost` 对象上设置 `HttpParams`。在消息级别应用的设置将覆盖 `HttpClient` 级别的设置，而不会更改\
  \ `HttpClient` 本身的设置。清单 11–8 展示了如果我们希望某个特定请求的套接字超时是 1 分钟而不是 4 秒时，代码可能的样子。你可以用这些代码行替换清单\
  \ 11–7 中 `getHttpContent()` 的 try 块内的对应代码行。\n\n**清单 11–8.** *在请求级别覆盖套接字超时*\n\n```\n\
      HttpGet request = new HttpGet(\"http://www.google.com/\");\n    HttpParams params\
  \ = request.getParams();\n    HttpConnectionParams.setSoTimeout(params, 60000);  \
  \ // 1 分钟\n    request.setParams(params);\n    String page = httpClient.execute(request,\n\
                          new BasicResponseHandler());\n    System.out.println(page);\n\
  ```\n\n##### 使用 `HttpURLConnection`\n\nAndroid 提供了另一种处理 HTTP 服务的方法，那就是使用 `java.net.HttpURLConnection`\
  \ 类。这与我们刚刚介绍的 `HttpClient` 类并非完全不同，但 `HttpURLConnection` 往往需要更多语句才能完成任务。选择使用哪种方法取决于你更熟悉哪一种。\n\
  \n##### 使用 `AndroidHttpClient`\n\nAndroid 2.2 引入了一个新的 `HttpClient` 子类，名为 `AndroidHttpClient`。这个类背后的理念是通过为\
  \ Android 应用程序提供合适的默认值和逻辑，来简化 Android 应用开发者的工作。例如，连接和套接字（即操作）的超时值默认均为 20 秒。连接管理器默认为\
  \ `ThreadSafeClientConnManager`。在大多数情况下，它可以与我们前面示例中使用的 `HttpClient` 互换。不过，有几个差异你需要了解。\n\
  \n*   要创建一个 `AndroidHttpClient`，你需要调用 `AndroidHttpClient` 类的静态方法 `newInstance()`，如下所示：`AndroidHttpClient\
  \ httpClient = AndroidHttpClient.newInstance(\"my-http-agent-string\");`\n*   注意，`newInstance()`\
  \ 方法的参数是一个 HTTP 代理字符串。在 Android 的默认浏览器中，你可能会看到类似下面的字符串，但你可以使用任何你想要的字符串：`Mozilla/5.0\
  \ (Linux; U; Android 2.1; en-us; ADR6200 Build/ERD79) AppleWebKit/530.17 (KHTML,\
  \ like Gecko) Version/ 4.0 Mobile Safari/530.17`\n*   在此客户端上调用 `execute()` 时，你必须在一个与主\
  \ UI 线程分离的线程中。这意味着，如果你简单地尝试用 `AndroidHttpClient` 替换我们之前的 `HttpClient`，你将收到一个异常。从主\
  \ UI 线程进行 HTTP 调用是一种不好的实践，因此 `AndroidHttpClient` 不允许你这样操作。我们将在下一节讨论线程问题。\n*   当你使用完\
  \ `AndroidHttpClient` 实例后，必须调用其 `close()` 方法。这样才能正确地释放内存。\n*   有一些方便的静态方法用于处理来自服务器的压缩响应，包括：\n\
  \    *   `modifyRequestToAcceptGzipResponse(HttpRequest request)`\n    *   `getCompressedEntity(byte[]\
  \ data, ContentResolver resolver)`\n    *   `getUngzippedContent(HttpEntity entity)`\n\
  \n一旦你获取了 `AndroidHttpClient` 的实例，就无法再修改其中的任何参数设置，也不能向其添加任何参数设置（例如 HTTP 协议版本等）。你的选择要么像前面展示的那样在\
  \ `HttpGet` 对象中覆盖设置，要么就不使用 `AndroidHttpClient`。\n\n至此，我们关于使用 `HttpClient` 处理 HTTP\
  \ 服务的讨论就结束了。在接下来的章节中，我们将把焦点转向 Android 平台的另一个有趣部分：编写后台/长时间运行的服务。虽然这不是很明显，但发起 HTTP\
  \ 调用和编写 Android 服务这两个过程是相互关联的，因为你将在 Android 服务中进行大量的集成工作。以简单的邮件客户端应用为例。在 Android\
  \ 设备上，这类应用通常由两部分组成：一部分为用户提供 UI，另一部分用于轮询邮件。轮询操作很可能需要在后台服务中完成。轮询新消息的组件将是一个 Android\
  \ 服务，而该服务又会使用 `HttpClient` 来执行具体工作。\n\n**注意：** 想获取关于使用 `HttpClient` 和其他这些概念的优秀教程，请查阅\
  \ Apache 网站 [`hc.apache.org/httpcomponents-client-ga/tutorial/html/`](http://hc.apache.org/httpcomponents-client-ga/tutorial/html/)。\n\
  \n\n\n### 使用后台线程（AsyncTask）\n\n到目前为止，在我们的示例中，我们一直使用活动的主线程来执行 HTTP 调用。虽然我们可能幸运地每次都能快速获得响应，但我们的网络连接和互联网并不总是如此迅速。由于活动的主线程主要用于处理来自用户的事件（如按钮点击等）以及执行用户界面的更新，因此我们应该使用后台线程执行可能耗时的工作。Android\
  \ 强制我们采取这种方式，因为如果主线程未在 5 秒内处理某些操作，就会触发“应用无响应”（ANR）条件，这会导致显示一个令人生厌的对话框，要求用户确认是否应终止当前应用（也称为强制关闭），从而破坏用户体验。我们将在第\
  \ 13 章中详细讨论主线程和 5 秒限制，但目前只需知道我们不能长时间占用主线程。\n\n如果你只想进行一些计算，且无需更新用户界面，你可以使用一个简单的 `Thread`\
  \ 对象来将部分处理工作从主线程卸载出去。但是，如果你需要更新用户界面，这种技术就行不通了。这是因为 Android 用户界面工具包并非线程安全的，因此它只能始终从主线程进行更新。\n\
  \n如果你打算根据后台线程的执行结果以任何方式更新用户界面，那么你应该认真考虑使用 `AsyncTask`。`AsyncTask` 提供了一种便捷的方式，可将希望更新用户界面的某些处理放在后台执行。`AsyncTask`\
  \ 负责为我们创建一个后台线程来执行实际工作，并提供在主线程上运行的回调方法，以便轻松访问用户界面元素（即视图）。这些回调可以在后台线程运行之前、期间和之后触发。\n\
  \n例如，考虑从网络服务器获取图像并在应用中显示的问题。也许这个图像需要即时生成。我们无法保证图像返回到我们这里需要多长时间，因此我们确实需要使用后台线程来完成这项工作。\n\
  \n清单 11–9 展示了一个 `AsyncTask` 的简单实现，它将为我们完成这项工作。我们将讨论它，然后向你展示一个布局文件以及一个可调用此 `AsyncTask`\
  \ 的活动的 Java 代码。\n\n**清单 11–9.** *用于下载图像的 AsyncTask：`DownloadImageTask.java`*\n\n\
  ```java\nimport java.io.IOException;\nimport org.apache.http.HttpResponse;\nimport\
  \ org.apache.http.client.HttpClient;\nimport org.apache.http.client.methods.HttpGet;\n\
  import org.apache.http.params.BasicHttpParams;\nimport org.apache.http.params.HttpConnectionParams;\n\
  import org.apache.http.params.HttpParams;\nimport org.apache.http.util.EntityUtils;\n\
  import android.app.Activity;\nimport android.content.Context;\nimport android.graphics.Bitmap;\n\
  import android.graphics.BitmapFactory;\nimport android.os.AsyncTask;\nimport android.util.Log;\n\
  import android.widget.ImageView;\nimport android.widget.TextView;\n\npublic class\
  \ DownloadImageTask extends AsyncTask<String, Integer, Bitmap> {\n    private Context\
  \ mContext;\n\n    DownloadImageTask(Context context) {\n        mContext = context;\n\
  \    }\n\n    protected void onPreExecute() {\n        // 我们可以在 doInBackground()\
  \ 运行之前在这里做一些设置工作\n    }\n\n    protected Bitmap doInBackground(String... urls) {\n\
  \        Log.v(\"doInBackground\", \"正在下载图像\");\n        return downloadImage(urls);\n\
  \    }\n\n    protected void onProgressUpdate(Integer... progress) {\n        TextView\
  \ mText = (TextView)\n                ((Activity) mContext).findViewById(R.id.text);\n\
  \        mText.setText(\"当前进度：\" + progress[0]);\n    }\n\n    protected void onPostExecute(Bitmap\
  \ result) {\n        if(result != null) {\n            ImageView mImage = (ImageView)\n\
  \                ((Activity) mContext).findViewById(R.id.image);\n            mImage.setImageBitmap(result);\n\
  \        }\n        else {\n            TextView errorMsg = (TextView)\n       \
  \         ((Activity) mContext).findViewById(R.id.errorMsg);\n            errorMsg.setText(\"\
  下载图像时出现问题。请稍后重试。\");\n        }\n    }\n\n    private Bitmap downloadImage(String...\
  \ urls)\n    {\n      HttpClient httpClient = CustomHttpClient.getHttpClient();\n\
  \      try {\n        HttpGet request = new HttpGet(urls[0]);\n        HttpParams\
  \ params = new BasicHttpParams();\n        HttpConnectionParams.setSoTimeout(params,\
  \ 60000);   // 1 分钟\n        request.setParams(params);\n\n        publishProgress(25);\n\
  \n        HttpResponse response = httpClient.execute(request);\n\n        publishProgress(50);\n\
  \n        byte[] image = EntityUtils.toByteArray(response.getEntity());\n\n    \
  \    publishProgress(75);\n\n        Bitmap mBitmap = BitmapFactory.decodeByteArray(\n\
  \                            image, 0, image.length);\n\n        publishProgress(100);\n\
  \n        return mBitmap;\n      } catch (IOException e) {\n        // 涵盖：\n   \
  \     //      ClientProtocolException\n        //      ConnectTimeoutException\n\
  \        //      ConnectionPoolTimeoutException\n        //      SocketTimeoutException\n\
  \        e.printStackTrace();\n      }\n      return null;\n    }\n}\n```\n\n由于\
  \ `AsyncTask` 是抽象的，你需要通过扩展它来自定义，我们通过 `DownloadImageTask` 类来实现。我们将使用一个构造函数，该函数接受一个对调用上下文的引用，在我们的例子中，就是调用活动。我们将使用该上下文来获取活动的视图。我们还将重用之前的\
  \ `CustomHttpClient` 类。\n\n一个 `AsyncTask` 包含四个步骤：\n\n1.  在 `onPreExecute()` 方法中执行任何设置工作。此方法在主线程上执行。\n\
  2.  使用 `doInBackground()` 运行后台线程。线程的创建完全在后台为我们处理。此代码在单独的后台线程中运行。\n3.  使用 `publishProgress()`\
  \ 和 `onProgressUpdate()` 更新进度。`publishProgress()` 从 `doInBackground()` 的代码内部调用，而\
  \ `onProgressUpdate()` 则作为对 `publishProgress()` 调用的结果，在主线程中执行。通过这两个方法，后台线程能够在执行期间与主线程通信，因此在后台线程完成其工作之前，就可以在用户界面中进行状态更新。\n\
  4.  在 `onPostExecute()` 中使用结果更新用户界面。此方法在主线程中执行。\n\n\n步骤 1 和步骤 3 是可选的。在我们的示例中，我们没有选择在\
  \ `onPreExecute()` 中进行任何初始化，但确实利用了步骤 3 中的进度更新。后台线程的主要工作是在 `downloadImage()` 方法中完成的，该方法由\
  \ `doInBackground()` 调用。`downloadImage()` 方法接收一个 URL，并使用我们的 `HttpClient` 来执行 `HttpGet`\
  \ 请求并处理响应。请注意，我们现在能够设置 60 秒的超时，而无需担心出现任何 ANR（应用无响应）。你可以在代码中看到进度更新的过程，包括设置 `HttpClient`\
  \ 连接、执行 HTTP 请求、将图片响应转换为字节数组，以及从中构建 `Bitmap` 对象。当 `downloadImage()` 返回至 `doInBackground()`，并且\
  \ `doInBackground()` 返回时，Android 会负责获取我们的返回值并将其传递给 `onPostExecute()`。一旦 `Bitmap`\
  \ 被传递给 `onPostExecute()`，就可以安全地用其更新 `ImageView`，因为 `onPostExecute()` 是在我们 Activity\
  \ 的主线程上运行的。但是，如果在下载过程中遇到某种异常怎么办？如果我们没有从 HTTP 调用中获取图片，而是得到了异常，那么我们的 `Bitmap` 将是 `null`。我们可以在\
  \ `onPostExecute()` 中检测到这一情况，并显示一条错误消息，而不是尝试将 `ImageView` 设置为该 `Bitmap`。当然，如果我们知道下载失败，也可以采取其他操作。\n\
  \n请记住，唯一不运行在主线程上的代码是来自 `doInBackground()` 的代码。因此，请注意不要在 `doInBackground()` 方法中处理\
  \ UI，因为那是会让你陷入困境的地方。例如，不要从 `doInBackground()` 中调用那些会修改 UI 元素的方法。只在 `onPreExecute()`、`onProgressUpdate()`\
  \ 和 `onPostExecute()` 中操作 UI 元素。\n\n让我们用布局 XML 文件和 Activity 的 Java 代码来完善我们最新的示例，分别见列表\
  \ 11-10 和 11-11。\n\n**列表 11–10.** *调用 AsyncTask 的布局：/res/layout/main.xml*\n\n```\n\
  <?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout\n    android:layout_width=\"\
  fill_parent\"\n    android:layout_height=\"fill_parent\"\n    android:orientation=\"\
  vertical\"\n>\n<LinearLayout\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  wrap_content\"\n    android:orientation=\"horizontal\"\n>\n<Button android:id=\"\
  @+id/button\"  android:text=\"Get Image\"\n    android:layout_width=\"wrap_content\"\
  \n    android:layout_height=\"wrap_content\"\n    android:onClick=\"doClick\"\n\
  \    />\n<TextView android:id=\"@+id/text\"\n    android:layout_width=\"wrap_content\"\
  \n    android:layout_height=\"wrap_content\"\n    />\n</LinearLayout>\n<TextView\
  \ android:id=\"@+id/errorMsg\"  android:textColor=\"#ff0000\"\n    android:layout_width=\"\
  wrap_content\"\n    android:layout_height=\"wrap_content\"\n    />\n<ImageView \
  \ android:id=\"@+id/image\"\n    android:layout_width=\"fill_parent\"  android:layout_height=\"\
  0dip\"\n    android:layout_weight=\"1\" />\n</LinearLayout>\n```\n\n**列表 11–11.**\
  \ *调用 AsyncTask 的 Activity：HttpActivity.java*\n\n```\nimport android.app.Activity;\n\
  import android.os.AsyncTask;\nimport android.os.Bundle;\nimport android.util.Log;\n\
  import android.view.View;\n\npublic class HttpActivity extends Activity {\n    private\
  \ DownloadImageTask diTask;\n\n    @Override\n    public void onCreate(Bundle savedInstanceState)\n\
  \    {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
  \    }\n\n    public void doClick(View view) {\n        if(diTask != null) {\n \
  \           AsyncTask.Status diStatus = diTask.getStatus();\n            Log.v(\"\
  doClick\", \"diTask status is \" + diStatus);\n            if(diStatus != AsyncTask.Status.FINISHED)\
  \ {\n                Log.v(\"doClick\", \"... no need to start a new task\");\n\
  \                return;\n            }\n            // Since diStatus must be FINISHED,\
  \ we can try again.\n        }\n        diTask = new DownloadImageTask(this);\n\
  \           diTask.execute(\"http://chart.apis.google.com/chart?&cht=p&chs=460x250&chd=t:15.3,20.3,0.2,59.7,4.5&chl=Android%201.5%7CAndroid%201.6%7COther*%7CAndroid%202.1%7CAndroid%202.2&chco=c4df9b,6fad0c\"\
  );\n    }\n}\n```\n\n当你运行这个示例并点击按钮时，你应该会看到类似图 11-1 的显示效果。\n\n![images](img/1101.jpg)\n\
  \n**图 11–1.** *使用 AsyncTask 下载图片（截至 2010 年 8 月 2 日的 Android 设备图表）*\n\n布局非常简单。我们有一个按钮，旁边有一段文字消息。这段文字将是我们的进度消息。在其下方，我们为错误消息预留了空间，该消息的文本将被设置为红色。最后，我们还有一个放置图片的位置。\n\
  \n在我们的按钮回调方法 `doClick()` 中，我们需要实例化自定义 AsyncTask 类的一个新实例，并调用 `execute()` 方法。这也是你通常会使用的模式：实例化一个\
  \ AsyncTask 的扩展类，然后调用 `execute()` 方法。在我们的示例中，我们调用了一个 Google chart 服务，该服务接收数据值和标签名称，为我们创建一张图表图片，并将其作为\
  \ PNG 图片返回。但在启动任务之前，我们确实应该检查是否已有任务在运行。如果用户双击了按钮，我们可能会最终得到两个后台任务。幸运的是，`AsyncTask`\
  \ 类允许我们检查其状态。如果 `diTask` 不为 `null`，则可能当前有一个正在运行的任务。因此，我们检查 `AsyncTask` 的状态。如果状态不是\
  \ `FINISHED`，则该任务要么是 `RUNNING`，要么是 `PENDING` 且即将运行。因此，只有当存在一个任务且该任务已经是 `FINISHED`\
  \ 状态时，我们才希望继续执行并创建一个新的 `AsyncTask`。当然，如果之前的 `AsyncTask` 已经成功下载了图片，我们可能不想再次下载。但对于我们的示例，我们还是会继续重新获取它。\n\
  \n在我们的示例应用程序运行时，你应该会注意到在按下按钮后进度消息会更新，然后图片出现。在进度消息开始改变*之前*，按钮会从按下状态恢复到正常状态。这是一个重要的观察点，因为它意味着我们的主线程在下载进行期间已经返回来管理用户界面了。\n\
  \n为了测试，可以随意修改调用 Google chart 的 URL 字符串，使其造成一个错误情况。然后，再次运行应用程序。你应该会看到类似图 11-2 的结果。\n\
  \n![images](img/1102.jpg)\n\n**图 11–2.** *使用 AsyncTask 将异常传回用户界面*\n\n关于 `AsyncTask`，还有几点需要了解。一旦我们实例化了\
  \ `AsyncTask` 的扩展类并启动了 `execute()` 方法，我们的主线程就会继续执行。但我们仍然保留对任务的引用，并可以从主线程对其进行操作。例如，我们可以调用\
  \ `cancel()` 来终止它。我们可以调用 `isCancelled()` 来检查它是否已被取消。我们可能希望修改 `onPostExecute()` 中的逻辑来处理这些取消操作。并且\
  \ `AsyncTask` 有两种形式的 `get()` 方法，我们可以通过它们从 `doInBackground()` 获取结果，而无需让 `onPostExecute()`\
  \ 来完成我们的工作。`get()` 的一种形式会阻塞，另一种形式则使用超时值来防止调用线程等待过长时间。\n\n一个 `AsyncTask` 只能运行一次。因此，如果你保留了对\
  \ `AsyncTask` 的引用，请不要在它上面多次调用 `execute()`。如果你这样做，将会收到一个异常。你可以自由创建 `AsyncTask` 的新实例，但每个实例只能执行一次。这就是为什么我们每次需要时都创建一个新的\
  \ `DownloadImageTask`。\n\n\n\n#### 使用 AsyncTask 处理配置变更\n\n但关于 `AsyncTask`，还有一件重要的事情需要了解。在我们之前的示例中，如果启动\
  \ `AsyncTask` 的 Activity 被销毁并重新创建，我们的 `AsyncTask` 将无法正常工作。这是一个非常关键的问题。显然，如果我们的 `onPostExecute()`\
  \ 回调针对的是原有 Activity，但在应用中该 Activity 已被新 Activity 取代，那么我们的 `AsyncTask` 将会更新用户不可见的视图。Activity\
  \ 被销毁并重新创建的情况真的会发生吗？实际上，这种情况一直在发生。每当设备的配置发生变化时，例如当设备从纵向模式旋转为横向模式时，我们的 Activity 就会被销毁并重新创建。\n\
  \n请记住，当 Android 创建用户界面时，它会利用设备的配置来决定使用哪些布局和资源。这个过程相当复杂，因此 Android 最简单快捷的做法是销毁当前\
  \ Activity，然后用新配置重新创建它。幸运的是，一切并非无法挽回，尤其是我们的 `AsyncTask`。因为我们的 `AsyncTask` 运行在应用程序的独立线程中，所以当新\
  \ Activity 创建时，它仍然存在。我们需要做的是重新建立两者之间的联系，这样我们的 `AsyncTask` 就能在新 Activity 上找到相应的视图。Activity\
  \ 中有一个回调和一种方法可以帮助我们实现这一点，它们分别是 `onRetainNonConfigurationInstance()` 和 `getLastNonConfigurationInstance()`。基本上，这两个方法的作用是将一个对象从旧\
  \ Activity 传递给新 Activity。\n\n**列表 11–12.** *处理重建的新版 `HttpActivity.java`*\n\n```\n\
  import android.app.Activity;\nimport android.os.AsyncTask;\nimport android.os.Bundle;\n\
  import android.util.Log;\nimport android.view.View;\n\npublic class HttpActivity\
  \ extends Activity {\n    private DownloadImageTask diTask;\n\n    @Override\n \
  \   public void onCreate(Bundle savedInstanceState)\n    {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n\n        // 以下代码检查我们是否在重启一个后台运行的 AsyncTask。\n\
  \        // 如果是，则重新建立连接。\n        // 同时，由于图像未在销毁/创建周期中保存，\n        // 如果 AsyncTask\
  \ 已经完成，则从 AsyncTask 中重新获取已下载的图像。\n        if( (diTask =\n            (DownloadImageTask)getLastNonConfigurationInstance())\n\
  \              != null)\n        {\n            diTask.setContext(this);  // 将新的\
  \ Activity 引用\n                                      // 传递给 AsyncTask\n        \
  \    if(diTask.getStatus() == AsyncTask.Status.FINISHED)\n                diTask.setImageInView();\n\
  \        }\n    }\n\n    public void doClick(View view) {\n        if(diTask !=\
  \ null) {\n            AsyncTask.Status diStatus = diTask.getStatus();\n       \
  \     Log.v(\"doClick\", \"diTask status is \" + diStatus);\n            if(diStatus\
  \ != AsyncTask.Status.FINISHED) {\n                Log.v(\"doClick\", \"... no need\
  \ to start a new task\");\n                return;\n            }\n            //\
  \ 由于 diStatus 必须是 FINISHED，我们可以重试。\n        }\n          diTask = new DownloadImageTask(this);\n\
  \           diTask.execute(\"http://chart.apis.google.com/chart?&cht=p&chs=460x250&chd=t:15.3,20.3,0.2,59.7,4.5&chl=Android%201.5%7CAndroid%201.6%7COther*%7CAndroid%202.1%7CAndroid%202.2&chco=c4df9b,6fad0c\"\
  );\n    }\n\n    // 这个方法在 onDestroy() 之前被调用。我们希望将\n    // AsyncTask 的引用传递出去。\n \
  \   @Override\n    public Object onRetainNonConfigurationInstance() {\n        return\
  \ diTask;\n    }\n}\n```\n\n这段代码与列表 11–11 中的 `HttpActivity` 非常相似，不同之处在于，这次我们调用了\
  \ `getLastNonConfigurationInstance()` 来检查是否有一个来自 `HttpActivity` 旧实例的 `DownloadImageTask`\
  \ 对象在等待我们。如果找到了，我们需要给它一个新的 Activity 引用，以便它能找到新的视图。请参阅列表 11–13 了解新 `DownloadImageTask`\
  \ 的代码。一旦我们在 `DownloadImageTask` 中设置了新的上下文，我们会检查任务是否已完成，因为它可能在 `HttpActivity` 重建期间就已经完成了。如果已完成，我们会使用\
  \ `setImageInView()` 方法来更新我们的图像——稍后会详细介绍。\n\n你应该会注意到，我们的按钮处理器 `doClick()` 与之前完全相同。但现在，我们实现了\
  \ `onRetainNonConfigurationInstance()` 回调，它只需返回一个要传递出去的对象即可。在我们的例子中，我们只关心 `DownloadImageTask`，所以只需传递它即可。如果需要传递更多内容，我们需要构造一个对象来容纳所有这些内容，然后再传递出去。这些都是基本的\
  \ Java 对象，所以我们不必担心序列化或 Parcel 的问题（本章稍后会详细介绍 Parcel）。我们只是将 `AsyncTask` 传递到未来，以便稍后能重新与之建立连接。\n\
  \n**列表 11–13.** *处理重建的新版 `DownloadImageTask.java`*\n\n```\nimport java.io.IOException;\n\
  import org.apache.http.HttpResponse;\nimport org.apache.http.client.HttpClient;\n\
  import org.apache.http.client.methods.HttpGet;\nimport org.apache.http.params.BasicHttpParams;\n\
  import org.apache.http.params.HttpConnectionParams;\nimport org.apache.http.params.HttpParams;\n\
