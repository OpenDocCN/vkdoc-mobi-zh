  由于未为此 Activity 指定本地搜索，\n因此会调用全局搜索。使用菜单按钮\n查看“搜索”菜单。当您\n单击该搜索菜单时，您将看到\n全局搜索。\n</string>\n\
  <!--\n**************************************************\n* local_search_enabled_activity_prompt\n\
