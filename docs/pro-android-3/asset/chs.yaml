  \ android.os.AsyncTask;\nimport android.util.Log;\nimport android.widget.ImageView;\n\
  import android.widget.TextView;\n\npublic class DownloadImageTask extends AsyncTask<String,\
  \ Integer, Bitmap> {\n    private Context mContext;  // 调用方 Activity 的引用\n    int\
  \ progress = -1;\n    Bitmap downloadedImage = null;\n\n    DownloadImageTask(Context\
  \ context) {\n        mContext = context;\n    }\n\n    // 从主线程调用以重新建立连接\n    protected\
  \ void setContext(Context context) {\n        mContext = context;\n        if(progress\
  \ >= 0) {\n            publishProgress(this.progress);\n        }\n    }\n\n   \
  \ protected void onPreExecute() {\n        progress = 0;\n        // 在 doInBackground()\
  \ 运行之前，\n        // 我们可以在这里做一些其他的设置工作\n    }\n\n    protected Bitmap doInBackground(String...\
  \ urls)\n    {\n        Log.v(\"doInBackground\", \"doing download of image...\"\
  );\n        return downloadImage(urls);\n    }\n\n    protected void onProgressUpdate(Integer...\
  \ progress) {\n        TextView mText = (TextView)\n                ((Activity)\
  \ mContext).findViewById(R.id.text);\n        mText.setText(\"Progress so far: \"\
  \ + progress[0]);\n    }\n\n    protected void onPostExecute(Bitmap result) {\n\
  \        if(result != null) {\n            downloadedImage = result;\n         \
  \   setImageInView();\n        }\n        else {\n            TextView errorMsg\
  \ = (TextView)\n                ((Activity) mContext).findViewById(R.id.errorMsg);\n\
  \            errorMsg.setText(\"Problem downloading image. Please try later.\");\n\
  \        }\n    }\n\n    public Bitmap downloadImage(String... urls)\n    {\n  \
  \    HttpClient httpClient = CustomHttpClient.getHttpClient();\n      try {\n  \
  \      HttpGet request = new HttpGet(urls[0]);\n        HttpParams params = new\
  \ BasicHttpParams();\n        HttpConnectionParams.setSoTimeout(params, 60000);\
  \   // 1 分钟\n        request.setParams(params);\n\n        setProgress(25);\n\n\
  \        HttpResponse response = httpClient.execute(request);\n\n        setProgress(50);\n\
  ```\n\n\n\n`sleepFor(5000);    // 休眠五秒`\n\n`byte[] image = EntityUtils.toByteArray(response.getEntity());`\n\
  \n`setProgress(75);`\n\n`Bitmap mBitmap = BitmapFactory.decodeByteArray(image, 0,\n\
  \                             image.length);`\n\n`setProgress(100);`\n\n`return\
  \ mBitmap;`\n`      } catch (IOException e) {`\n`        // 涵盖以下异常：`\n`        //\
  \      ClientProtocolException`\n`        //      ConnectTimeoutException`\n`  \
  \      //      ConnectionPoolTimeoutException`\n`        //      SocketTimeoutException`\n\
  `        e.printStackTrace();`\n`      }`\n`      return null;`\n`    }`\n\n`  \
  \  private void setProgress(int progress) {`\n`        this.progress = progress;`\n\
  `        publishProgress(this.progress);`\n`    }`\n\n`    protected void setImageInView()\
  \ {`\n`        if(downloadedImage != null) {`\n`            ImageView mImage = (ImageView)\n\
  \                ((Activity) mContext).findViewById(R.id.image);`\n`           \
  \ mImage.setImageBitmap(downloadedImage);`\n`        }`\n`    }`\n\n`    private\
  \ void sleepFor(long msecs) {`\n`        try {`\n`            Thread.sleep(msecs);`\n\
  `        } catch (InterruptedException e) {`\n`            Log.v(\"sleep\", \"interrupted\"\
  );`\n`        }`\n`    }`\n`}`\n\n现在可以运行这个示例了。我们在`AsyncTask`中增加了一段 5 秒的延迟，目的是让你在后台任务运行时有机会旋转屏幕。要旋转模拟器，请按下键盘上的`Ctrl+F11`。你会看到界面旋转后自行修正。每次旋转时，图片会消失（如果之前可见），然后随着代码的运行重新出现。你可以在操作的不同时间点旋转屏幕，观察不同的效果。甚至可以回到之前的`AsyncTask`示例，添加延迟步骤，并尝试旋转，你会发现它*不会*像用户期望的那样工作。接下来，让我们深入分析新代码的工作原理。\n\
  \n这次的`AsyncTask`扩展类与之前有所不同。\n\n在配置变更中，有几件事需要我们处理。首先，你需要知道，我们的`AsyncTask`需要获得新的 Activity\
  \ 引用，这样它才能在`onProgressUpdate()`和`onPostExecute()`中更新相应的视图。当旧的 Activity 被销毁时，旧的引用也失效了。我们需要一个新的引用。如果我们之前在`onPreExecute()`中操作了用户界面，也需要在那里获取新\
  \ Activity 的引用。我们新增了一个名为`setContext()`的方法，允许 Activity 更新与我们之间的上下文，这样我们就能在需要时找到视图。\n\
  \n其次，我们处理进度更新的方式略有不同。我们保留了一个进度成员变量，在`setContext()`和`setProgress()`方法中都可以引用它。现在，我们在`downloadImage()`方法的适当位置调用`setProgress()`。当从新的\
  \ Activity 重新建立连接时，我们想立即显示当前进度，所以在`setContext()`中调用了`publishProgress()`。\n\n第三，图片不会在销毁/创建周期中保持不变。如果在`AsyncTask`完成之前\
  \ Activity 被重新创建，我们没问题，因为`onPostExecute()`会设置新的位图。但是，如果`AsyncTask`早已完成，然后我们旋转设备，Activity\
  \ 会被重新创建，但图片不会被设置。我们也可以重新从服务器下载图片，但在本例中，我们选择使用名为`downloadedImage`的新成员变量来保存位图，并提供了一个新的受保护方法`setImageInView()`来将位图重新附加到`ImageView`上。如前所述，你不希望在`AsyncTask`内部持有像`View`这样的用户界面元素。这就是为什么我们保存的是位图，而不是`ImageView`。我们不想通过持有旧\
  \ Activity 中视图的引用来导致内存泄漏。\n\n### 使用 DownloadManager 获取文件\n\n在某些情况下，你的应用可能需要下载一个大文件到设备上。由于这可能需要一段时间，并且过程可以标准化，Android\
  \ 2.3 引入了一个专门管理此类操作的类：`DownloadManager`。`DownloadManager`的目的是通过后台线程将大文件下载到设备本地位置，以满足`DownloadManager.Request`。你可以配置`DownloadManager`向用户提供下载通知。\n\
  \n在我们的下一个示例应用中，我们将使用`DownloadManager`下载其中一个 Android SDK ZIP 文件。这个示例项目将包含以下文件：\n\n\
  * `res/layout/main.xml`（列表 11–14）\n* `MainActivity.java`（列表 11–15）\n* `AndroidManifest.xml`（列表\
  \ 11–16）\n\n**列表 11–14.** *使用`DownloadManager`：`/res/layout/main.xml`*\n\n```xml\n\
  <?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout\n    android:orientation=\"\
  vertical\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  fill_parent\" >\n<Button android:onClick=\"doClick\" android:text=\"Start\"\n  \
  \  android:layout_width=\"wrap_content\"\n    android:layout_height=\"wrap_content\"\
  \ />\n<TextView  android:id=\"@+id/tv\"\n    android:layout_width=\"fill_parent\"\
  \n    android:layout_height=\"wrap_content\" />\n</LinearLayout>\n```\n\n我们的布局很简单，包含一个按钮和一个文本视图。按钮将启动下载，我们会在文本视图中显示一些消息，以指示下载的开始和结束。用户界面如图\
  \ 11–3 所示。\n\n![images](img/1103.jpg)\n\n**图 11–3.** *DownloadManagerDemo 示例应用的用户界面*\n\
  \n下一个列表展示了此应用的 Java 代码。\n\n**列表 11–15.** *使用`DownloadManager`：`MainActivity.java`*\n\
  \n```java\nimport android.app.Activity;\nimport android.app.DownloadManager;\nimport\
  \ android.content.BroadcastReceiver;\nimport android.content.Context;\nimport android.content.Intent;\n\
  import android.content.IntentFilter;\nimport android.net.Uri;\nimport android.os.Bundle;\n\
  import android.util.Log;\nimport android.view.View;\nimport android.widget.TextView;\n\
  \npublic class MainActivity extends Activity {\n    protected static final String\
  \ TAG = \"DownloadMgr\";\n    private DownloadManager dMgr;\n    private TextView\
  \ tv;\n    private long downloadId;\n\n    /** 当 Activity 首次创建时调用。 */\n    @Override\n\
  \    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n\n        tv = (TextView)findViewById(R.id.tv);\n\
  \    }\n\n    @Override\n    protected void onResume() {\n        super.onResume();\n\
  \        dMgr = (DownloadManager) getSystemService(DOWNLOAD_SERVICE);\n    }\n\n\
  \    public void doClick(View view) {\n        DownloadManager.Request dmReq = new\
  \ DownloadManager.Request(\n            Uri.parse(\n                \"http://dl-ssl.google.com/android/repository/\"\
  \ +\n                \"platform-tools_r01-linux.zip\"));\n        dmReq.setTitle(\"\
  平台工具\");\n        dmReq.setDescription(\"Linux 版本下载\");\n        dmReq.setAllowedNetworkTypes(DownloadManager.Request.NETWORK_MOBILE);\n\
  \n        IntentFilter filter = new IntentFilter(DownloadManager.ACTION_DOWNLOAD_COMPLETE);\n\
  \        registerReceiver(mReceiver, filter);\n\n        downloadId = dMgr.enqueue(dmReq);\n\
  \n        tv.setText(\"下载已开始... (\" + downloadId + \")\");\n    }\n```\n\n\n\n```java\n\
  public BroadcastReceiver mReceiver = new BroadcastReceiver() {\n    public void\
  \ onReceive(Context context, Intent intent) {\n        Bundle extras = intent.getExtras();\n\
  \        long doneDownloadId = extras.getLong(DownloadManager.EXTRA_DOWNLOAD_ID);\n\
  \        tv.setText(tv.getText() + \"\\nDownload finished (\" + doneDownloadId +\
  \ \")\");\n        if(downloadId == doneDownloadId)\n            Log.v(TAG, \"Our\
  \ download has completed.\");\n    }\n};\n\n@Override\nprotected void onPause()\
  \ {\n    super.onPause();\n    unregisterReceiver(mReceiver);\n    dMgr = null;\n\
  }\n```\n\n本应用的代码非常直观。首先，我们初始化主视图，然后获取文本视图的引用。在 `onResume()` 方法中，我们获取 `DOWNLOAD_SERVICE`\
  \ 服务的引用。请注意，我们在 `onPause()` 方法中取消了对该服务的引用。按钮点击方法 `doClick()` 使用我们要下载的 ZIP 文件的路径，创建了一个新的\
  \ `DownloadManager.Request` 对象。我们还设置了下载的标题、描述和允许的网络类型。还有更多选项可供选择；详情请参阅文档。\n\n仅仅为了演示目的，我们选择使用移动网络进行下载，但你也可以只选择\
  \ WiFi（使用 `NETWORK_WIFI` 代替 `NETWORK_MOBILE`），或者将两个值进行“或”运算，以允许两种网络。默认情况下，两种网络都允许下载，这意味着在我们的示例应用中，即使有\
  \ WiFi 可用，我们也只想使用移动网络进行下载。\n\n设置好请求对象后，我们为广播接收器创建一个过滤器并进行注册。我们稍后会介绍广播接收器的代码。通过注册接收器，任何下载完成时我们都会收到通知。这意味着我们需要跟踪请求的\
  \ ID，该 ID 在我们对 `DownloadManager` 调用 `enqueue()` 时返回。最后，我们更新 UI 中的状态消息，以表示下载已开始。\n\
  \n为使本应用能够运行，我们需要指定几个权限，如 清单 11–16 中的 `AndroidManifest.xml` 文件所示，以允许我们的应用访问互联网并将文件写入\
  \ SD 卡。Android 2.3 的一个奇怪之处是，如果你没有按照 清单 11–16 指定权限，你会收到一条错误消息，抱怨缺少 `ACCESS_ALL_DOWNLOADS`\
  \ 权限，而本示例中甚至不需要这个权限。\n\n**清单 11–16.** *使用 DownloadManager: AndroidManifest.xml*\n\
  \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest\n      package=\"\
  com.androidbook.services.download\"\n      android:versionCode=\"1\"\n      android:versionName=\"\
  1.0\">\n    <application android:icon=\"@drawable/icon\" android:label=\"@string/app_name\"\
  >\n        <activity android:name=\".MainActivity\"\n                  android:label=\"\
  @string/app_name\">\n            <intent-filter>\n                <action android:name=\"\
  android.intent.action.MAIN\" />\n                <category android:name=\"android.intent.category.LAUNCHER\"\
  \ />\n            </intent-filter>\n        </activity>\n    </application>\n  \
  \  <uses-sdk android:minSdkVersion=\"9\" />\n    <uses-permission android:name=\"\
  android.permission.INTERNET\" />\n    <uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\"\
  \ />\n</manifest>\n```\n\n运行此应用时，它应显示按钮。点击按钮将启动下载操作并显示消息，如 图 11–3 所示。请注意，屏幕左上角的通知栏中有一个下载图标。如果你向下拖动下载图标，将看到一个类似\
  \ 图 11–4 的通知窗口。\n\n![images](img/1104.jpg)\n\n**图 11–4** *. 通知列表中的下载项*\n\n该通知表示有下载在后台进行。下载完成后，此通知项将被清除，并且我们会在应用中看到一条额外的消息，如\
  \ 图 11–5 所示。\n\n![images](img/1105.jpg)\n\n**图 11–5.** *应用显示下载已完成*\n\n在我们的广播接收器中，我们查询\
  \ intent 以找出完成的下载是否是我们的。如果是，我们就在 UI 中更新状态消息，这就是我们所做的一切。请记住，我们不能在广播接收器中做太多处理，因为我们必须快速从\
  \ `onReceive()` 方法返回。例如，我们可以改为调用一个服务来处理已下载的文件。在该服务中，我们可以调用类似 清单 11–17 的代码来获取文件内容。\n\
  \n**清单 11–17.** *读取已下载的文件*\n\n```java\ntry {\n    ParcelFileDescriptor pfd = dMgr.openDownloadedFile(doneDownloadId);\n\
  \    // 现在我们有了一个对已下载文件的只读句柄\n    // 继续读取文件...\n} catch (FileNotFoundException e)\
  \ {\n    e.printStackTrace();\n}\n```\n\n定位已下载文件的一种方法是使用 `DownloadManager` 服务，我们需要指定下载\
  \ ID 来获取相应的文件。如 清单 11–17 所示。`DownloadManager` 类负责将下载 ID 解析为实际文件。虽然我们的示例将文件下载到 SD\
  \ 卡的公共区域，但实际上你可以使用 `DownloadManager.Request` 的某个 `setDestination*()` 方法，将文件下载到应用在\
  \ SD 卡上的私有数据区域。\n\n`DownloadManager` 有自己的应用程序，你也可以通过它来查看已下载的文件。在 Android 设备或模拟器的应用程序菜单中，查找如\
  \ 图 11–6 所示的图标。\n\n![images](img/1106.jpg)\n\n**图 11–6.** *Downloads 应用图标*\n\n你可以使用\
  \ Downloads 应用程序来获取已下载的文件。现在就去试试吧。当你启动 Downloads 应用程序时，你将看到一个类似 图 11–7 的界面。实际上，在你点击复选框选择特定下载项（就像我们截图前所做的那样）之前，屏幕底部是没有菜单的。\n\
  \n![images](img/1107.jpg)\n\n**图 11–7.** *Downloads 应用程序*\n\n`DownloadManager` 包含一个用于下载文件信息的内容提供者。Downloads\
  \ 应用程序只是访问这个内容提供者，向用户显示可用下载列表。这意味着你也可以在你的应用程序中查询这个内容提供者以获取下载信息。为此，你需要使用 `DownloadManager.Query`\
  \ 对象以及 `DownloadManager` 的 `query()` 方法。不过，搜索选项并不多。你可以按下载 ID（一个或多个）搜索，或者按下载状态搜索。`query()`\
  \ 方法返回的结果是一个 `Cursor` 对象，可用于查询 `DownloadManager` 内容提供者中的数据行。可用的列在 `DownloadManager`\
  \ 的文档中列出，包括已下载文件的本地 `Uri`、字节数、文件的媒体类型、下载状态等。当你以这种方式访问内容提供者时，需要将 `ACCESS_ALL_DOWNLOADS`\
  \ 权限添加到你的 `AndroidManifest.xml` 文件中。\n\n最后，你可以使用 `DownloadManager` 的 `remove()`\
  \ 方法来取消下载，但如果文件已下载完成，此方法不会删除该文件。\n\n\n\n我们已向您展示了如何操作基于 HTTP 的服务，并演示了如何使用名为 `AsyncTask`\
  \ 的特殊类来管理这些服务的接口。`AsyncTask` 的典型用例是执行一些会持续一段时间但不会太长的操作，并且该操作的结果应该以某种方式直接影响用户界面。但是，如果我们想运行一些持续时间较长的后台处理，或者想调用其他应用程序中存在的非\
  \ UI 功能，该怎么办？针对这些需求，Android 提供了服务。我们接下来将讨论它们。\n\n### 使用 Android 服务\n\nAndroid 支持服务的概念。服务是在后台运行、没有用户界面的组件。您可以将这些组件视为类似于\
  \ Windows 服务或 Unix 守护进程。与这些类型的服务类似，Android 服务可以始终可用，但不一定非要在积极执行某些操作。更重要的是，Android\
  \ 服务可以拥有与活动（Activity）分离的生命周期。当活动暂停、停止或被销毁时，您可能希望某些处理能够继续。服务也很适合这种情况。\n\nAndroid\
  \ 支持两种类型的服务：本地服务和远程服务。*本地服务*是只能被其宿主应用程序访问的服务，设备上运行的其他应用程序无法访问它。通常，这类服务仅支持其宿主应用程序。*远程服务*除了可以被其宿主应用程序访问外，也可以被设备上的其他应用程序访问。远程服务使用\
  \ Android 接口定义语言（AIDL）向客户端定义自身。我们将讨论这两种类型的服务，尽管在接下来的几章中，我们将深入探讨本地服务。因此，我们会在此处介绍它们，但不会花太多时间。我们将在本章中更详细地介绍远程服务。\n\
  \n#### 理解 Android 中的服务\n\nAndroid 的 `Service` 类本质上是一个包装器，用于封装具有服务行为的代码。与我们之前介绍的\
  \ `AsyncTask` 不同，`Service` 对象不会自动创建自己的线程。要让 `Service` 对象使用线程，开发者必须手动实现。这意味着，在不添加线程的情况下，服务的代码将在主线程上运行。如果我们的服务执行的操作能很快完成，那么这不会有问题。但如果我们的服务可能会运行一段时间，我们绝对需要引入线程。请记住，在服务内部使用\
  \ `AsyncTask` 来进行线程处理并没有任何不妥。\n\nAndroid 支持服务概念的原因有两个。\n\n*   首先，是为了让你能够轻松地实现后台任务。\n\
  *   其次，是为了让你能够在同一设备上运行的应用程序之间进行进程间通信。\n\n这两个原因对应了 Android 支持的两种服务类型：本地服务和远程服务。第一个原因的示例可能是作为电子邮件应用程序一部分实现的本地服务。该服务可以处理向电子邮件服务器发送新电子邮件，包括附件和重试机制。由于这可能需要一些时间才能完成，因此服务是封装该功能的一种好方法，这样主线程可以启动它并立即响应用户。此外，即使电子邮件活动（Activity）消失了，你仍然希望已发送的邮件能被成功送达。第二个原因的示例（我们稍后会看到）是一个语言翻译应用程序。假设你设备上运行着多个应用程序，并且需要一个服务来接收需要从一种语言翻译成另一种语言的文本。与其在每个应用程序中重复相同的逻辑，不如编写一个远程翻译服务，让这些应用程序与该服务通信。\n\
  \n本地服务和远程服务之间存在一些重要差异。具体来说，如果一个服务严格由同一进程内的组件使用，那么客户端必须通过调用 `Context.startService()`\
  \ 来启动该服务。这种类型的服务是本地服务，因为它的目的通常是为其宿主应用程序运行后台任务。如果服务支持 `onBind()` 方法，那么它是一个可以通过进程间通信（`Context.bindService()`）调用的远程服务。我们也称远程服务为\
  \ *AIDL 支持服务*，因为客户端使用 AIDL 与服务通信。\n\n尽管 `android.app.Service` 的接口同时支持本地服务和远程服务，但提供单一的服务实现来同时支持两种类型并不是一个好主意。原因在于，每种类型的服务都有预定义的生命周期；虽然允许将两者混合，但这可能会导致错误。\n\
  \n现在，我们可以开始详细研究这两种类型的服务了。我们将首先讨论本地服务，然后讨论远程服务（AIDL 支持服务）。如前所述，本地服务是仅由其宿主应用程序调用的服务。远程服务是支持远程过程调用（RPC）机制的服务。这些服务允许同一设备上的外部客户端连接到该服务并使用其功能。\n\
  \n**注意：** Android 中的第二种服务有多个名称：远程服务、AIDL 支持服务、AIDL 服务、外部服务和 RPC 服务。这些术语都指代同一类型的服务——一种旨在被设备上运行的其他应用程序远程访问的服务。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将遵循您提供的注意事项和示例，将以下英文文本翻译成中文。\n\n\n#### 理解本地服务\n\n本地服务是通过\
  \ `Context.startService()` 启动的服务。一旦启动，这类服务将持续运行，直到客户端调用 `Context.stopService()`\
  \ 或服务自身调用 `stopSelf()`。请注意，当调用 `Context.startService()` 且服务尚未创建时，系统会实例化该服务并调用其 `onStartCommand()`\
  \ 方法。请记住，在服务已启动（即已存在）后再次调用 `Context.startService()` 不会创建另一个服务实例，但会重新调用正在运行的服务的 `onStartCommand()`\
  \ 方法。以下是本地服务的几个示例：\n\n*   一个监控设备传感器数据并进行分析的服务，当满足特定条件时发出警报。此服务可能会持续运行。\n*   一个任务执行服务，允许您应用的\
  \ Activity 提交作业并将其排队等待处理。此服务可能仅在提交作业的操作期间运行。\n\n清单 11–18 通过实现一个执行后台任务的服务来演示本地服务。我们将需要创建四个工件来创建和使用该服务：`BackgroundService.java`（服务本身）、`main.xml`（Activity\
  \ 的布局文件）、`MainActivity.java`（用于调用该服务的 Activity 类）和 `AndroidManifest.xml`。清单 11–18\
  \ 仅包含 `BackgroundService.java`。我们将先剖析这段代码，然后再介绍其他三个。此实现需要 Android 2.0 或更高版本。\n\n\
  **清单 11–18.** *实现一个本地服务：BackgroundService.java*\n\n```\nimport android.app.Notification;\n\
  import android.app.NotificationManager;\nimport android.app.PendingIntent;\nimport\
  \ android.app.Service;\nimport android.content.Intent;\nimport android.os.IBinder;\n\
  import android.util.Log;\n\npublic class BackgroundService extends Service\n{\n\
  \    private static final String TAG = \"BackgroundService\";\n    private NotificationManager\
  \ notificationMgr;\n    private ThreadGroup myThreads = new ThreadGroup(\"ServiceWorker\"\
  );\n\n    @Override\n    public void onCreate() {\n        super.onCreate();\n\n\
  \        Log.v(TAG, \"in onCreate()\");\n        notificationMgr =(NotificationManager)getSystemService(\n\
  \               NOTIFICATION_SERVICE);\n        displayNotificationMessage(\"Background\
  \ Service is running\");\n    }\n\n    @Override\n    public int onStartCommand(Intent\
  \ intent, int flags, int startId) {\n        super.onStartCommand(intent, flags,\
  \ startId);\n\n        int counter = intent.getExtras().getInt(\"counter\");\n \
  \       Log.v(TAG, \"in onStartCommand(), counter = \" + counter +\n           \
  \     \", startId = \" + startId);\n\n        new Thread(myThreads, new ServiceWorker(counter),\n\
  \            \"BackgroundService\")\n                .start();\n\n        return\
  \ START_STICKY;\n    }\n\n    class ServiceWorker implements Runnable\n    {\n \
  \       private int counter = -1;\n        public ServiceWorker(int counter) {\n\
  \            this.counter = counter;\n        }\n\n        public void run() {\n\
  \            final String TAG2 = \"ServiceWorker:\" +\n                Thread.currentThread().getId();\n\
  \            // do background processing here... we'll just sleep...\n         \
  \   try {\n                Log.v(TAG2, \"sleeping for 10 seconds. counter = \" +\n\
  \                    counter);\n                Thread.sleep(10000);\n         \
  \       Log.v(TAG2, \"... waking up\");\n            } catch (InterruptedException\
  \ e) {\n                Log.v(TAG2, \"... sleep interrupted\");\n            }\n\
  \        }\n    }\n\n    @Override\n    public void onDestroy()\n    {\n       \
  \ Log.v(TAG, \"in onDestroy(). Interrupting threads and cancelling notifications\"\
  );\n        myThreads.interrupt();\n        notificationMgr.cancelAll();\n     \
  \   super.onDestroy();\n    }\n\n    @Override\n    public IBinder onBind(Intent\
  \ intent) {\n        Log.v(TAG, \"in onBind()\");\n        return null;\n    }\n\
  \n    private void displayNotificationMessage(String message)\n    {\n        Notification\
  \ notification =\n            new Notification(R.drawable.emo_im_winking,\n    \
  \            message, System.currentTimeMillis());\n\n        notification.flags\
  \ = Notification.FLAG_NO_CLEAR;\n\n        PendingIntent contentIntent =\n     \
  \       PendingIntent.getActivity(this, 0,\n                new Intent(this, MainActivity.class),\
  \ 0);\n\n        notification.setLatestEventInfo(this, TAG, message,\n         \
  \   contentIntent);\n\n        notificationMgr.notify(0, notification);\n    }\n\
  }\n```\n\n`Service` 对象的结构与 Activity 有些相似。它有一个 `onCreate()` 方法，您可以在其中进行初始化；还有一个 `onDestroy()`\
  \ 方法，用于进行清理。在 Android 2.0 之前，服务有一个 `onStart()` 方法，从 2.0 开始，它被称为 `onStartCommand()`。两者的区别在于后者增加了一个\
  \ `flags` 参数，用于向服务指明某个 Intent 正在被重新投递，或者服务应该重启。在我们的示例中，使用的是 `onStartCommand()` 版本。服务不像\
  \ Activity 那样有暂停或恢复的生命周期，所以不会看到 `onPause()` 或 `onResume()` 方法。由于这是一个本地服务，我们不会绑定到它，但\
  \ `Service` 要求实现 `onBind()` 方法，因此我们提供了一个仅返回 `null` 的实现。\n\n回到我们的 `onCreate()` 方法，除了通知用户此服务已创建之外，我们不需要做太多事情。我们使用\
  \ `NotificationManager` 来实现这一点。您可能已经注意到 Android 屏幕左上角的通知栏。通过下拉此栏，用户可以查看重要消息，点击通知即可对通知进行操作，这通常意味着返回到与通知相关的某个\
  \ Activity。对于服务，由于它们可能在后台运行（或至少存在）而没有可见的 Activity，因此必须有某种方式让用户能够重新与服务联系，例如关闭它。因此，我们创建一个\
  \ `Notification` 对象，为其填充一个 `PendingIntent`（这将使我们能够返回到控制 Activity），并将其发布出去。所有这些都在\
  \ `displayNotificationMessage()` 方法中完成。我们还需要做的一件事情是在 `Notification` 对象上设置一个标志，使用户无法从列表中清除它。只要我们的服务存在，我们就确实需要该\
  \ `Notification` 存在，因此我们设置 `Notification.FLAG_NO_CLEAR` 将其保留在通知列表中，直到我们自己在服务的 `onDestroy()`\
  \ 方法中清除它。我们在 `onDestroy()` 中用于清除通知的方法是 `NotificationManager` 上的 `cancelAll()`。\n\
  \n为了使此示例正常工作，您还需要做另一件事。您需要创建一个名为 `emo_im_winking` 的可绘制对象，并将其放置在项目的 `drawable` 文件夹中。出于演示目的，可绘制对象的一个好的来源是查看\
  \ Android 平台文件夹 `Android SDK/platforms/<version>/data/res/drawable`，其中 `<version>`\
  \ 是您感兴趣的版本。不幸的是，您无法像使用布局那样在代码中引用 Android 系统可绘制对象，因此您需要将所需的内容复制到项目的 drawables 文件夹中。如果您为示例选择了不同的可绘制对象文件，只需在\
  \ `Notification` 的构造函数中重命名资源 ID 即可。\n\n\n\n当使用 `startService()` 将意图发送到我们的服务时，必要时会调用\
  \ `onCreate()`，然后调用我们的 `onStartCommand()` 方法来接收调用者的意图。在我们的场景中，除了解包计数器并用它启动后台线程外，我们不会对它做任何特殊处理。在真实的服务中，我们期望任何数据都通过意图传递给我们，例如可能包含\
  \ URIs。注意在创建 `Thread` 时使用了 `ThreadGroup`。这将在我们后续想要销毁后台线程时证明非常有用。还要注意 `startId` 参数。这是\
  \ Android 为我们设置的，并且自该服务启动以来，它是服务调用的唯一标识符。\n\n我们的 `ServiceWorker` 类是一个典型的可运行对象，是服务执行实际任务的地方。在我们的特定案例中，我们只是记录一些消息并让线程休眠。我们还捕获任何中断并记录它们。我们没有做的一件事是操作用户界面。例如，我们没有更新任何视图。由于我们不再位于主线程，因此不能直接接触\
  \ UI。`ServiceWorker` 有办法影响用户界面的变化，我们将在接下来的几章中详细讨论这些内容。\n\n在 `BackgroundService`\
  \ 中最后需要注意的一项是 `onDestroy()` 方法。这是我们执行清理的地方。对于我们的示例，我们希望销毁之前创建的线程（如果它们仍然存在）。如果不这样做，它们可能会一直存在并占用内存。其次，我们希望移除通知消息。由于服务正在关闭，用户不再需要通过活动来消除通知。然而，在真实的应用中，我们可能希望保持工作线程继续工作。如果我们的服务正在发送电子邮件，我们当然不想简单地杀死线程。我们的示例过于简单，因为我们通过使用\
  \ `interrupt()` 方法暗示可以轻松杀死后台线程。但实际上，你最多只能中断线程。这并不一定会杀死线程。有一些已弃用的方法可以杀死线程，但你不应该使用它们。它们可能对你和你的用户造成内存和稳定性问题。中断在我们的示例中有效，因为我们执行的是可以被中断的休眠操作。\n\
  \n值得研究一下 `ThreadGroup` 类，因为它提供了获取线程的方法。我们在服务中创建了一个单一的 `ThreadGroup` 对象，然后在创建各个线程时使用了它。在服务的\
  \ `onDestroy()` 方法中，我们只需在 `ThreadGroup` 上调用 `interrupt()`，它就会向 `ThreadGroup` 中的每个线程发出中断信号。\n\
  \n这就构成了一个简单本地服务的雏形。在我们展示活动的代码之前，清单 11–19 展示了我们用户界面的 XML 布局文件。\n\n**清单 11–19.** *实现本地服务：main.xml*\n\
  \n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<!-- 此文件为 /res/layout/main.xml\
  \ -->\n<LinearLayout\n    android:orientation=\"vertical\"\n    android:layout_width=\"\
  fill_parent\"\n    android:layout_height=\"fill_parent\"\n    >\n<Button  android:id=\"\
  @+id/startBtn\"\n    android:layout_width=\"wrap_content\"\n    android:layout_height=\"\
  wrap_content\"\n    android:text=\"启动服务\"  android:onClick=\"doClick\" />\n<Button\
  \  android:id=\"@+id/stopBtn\"\n    android:layout_width=\"wrap_content\"\n    android:layout_height=\"\
  wrap_content\"\n    android:text=\"停止服务\"  android:onClick=\"doClick\" />\n\n</LinearLayout>\n\
  ```\n\n我们将在用户界面上显示两个按钮，一个用于执行 `startService()`，另一个用于执行 `stopService()`。我们本可以选择使用\
  \ ToggleButton，但那样就无法连续多次调用 `startService()` 了。这是一个重要的点。`startService()` 和 `stopService()`\
  \ 之间不是一一对应的关系。当 `stopService()` 被调用时，服务对象将被销毁，并且从所有 `startServices()` 中创建的所有线程也应该消失。对于我们的示例，由于我们使用的是较新的\
  \ `onStartCommand()` 而不是较旧的 `onStart()`，因此需要 `minSdkVersion` 为 5。因此，我们还可以利用布局 XML\
  \ 文件中 `Button` 标签的 `android:onClick` 属性。现在，让我们看看清单 11–20 中我们活动的代码。\n\n**清单 11–20.**\
  \ *实现本地服务：MainActivity.java*\n\n```\n// MainActivity.java\nimport android.app.Activity;\n\
  import android.content.Intent;\nimport android.os.Bundle;\nimport android.util.Log;\n\
  import android.view.View;\n\npublic class MainActivity extends Activity\n{\n   \
  \ private static final String TAG = \"MainActivity\";\n    private int counter =\
  \ 1;\n\n    @Override\n    public void onCreate(Bundle savedInstanceState)\n   \
  \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
  \    }\n\n    public void doClick(View view) {\n        switch(view.getId()) {\n\
  \        case R.id.startBtn:\n            Log.v(TAG, \"正在启动服务... 计数器 = \" + counter);\n\
  \            Intent intent = new Intent(MainActivity.this,\n                   \
  \ BackgroundService.class);\n            intent.putExtra(\"counter\", counter++);\n\
  \            startService(intent);\n            break;\n        case R.id.stopBtn:\n\
  \            stopService();\n        }\n    }\n\n    private void stopService()\
  \ {\n        Log.v(TAG, \"正在停止服务...\");\n        if(stopService(new Intent(MainActivity.this,\n\
  \                    BackgroundService.class)))\n            Log.v(TAG, \"stopService\
  \ 已成功\");\n        else\n            Log.v(TAG, \"stopService 未成功\");\n    }\n\n\
  \    @Override\n    public void onDestroy()\n    {\n        stopService();\n   \
  \     super.onDestroy();\n    }\n}\n```\n\n我们的 `MainActivity` 看起来很像你见过的其他活动。有一个简单的\
  \ `onCreate()` 用于从 `main.xml` 布局文件设置用户界面。有一个 `doClick()` 方法用于处理按钮回调。在我们的示例中，当按下“启动服务”按钮时调用\
  \ `startService()`，当按下“停止服务”按钮时调用 `stopService()`。当我们启动服务时，我们希望传入一些数据，我们通过意图来实现这一点。我们选择将数据放在\
  \ Extras bundle 中，但如果我们有 URI，也可以使用 `setData()` 来添加。当我们停止服务时，我们检查返回结果。通常应为 true，但如果服务没有运行，我们可能会得到\
  \ false 的返回值。最后，当我们的活动终止时，我们希望停止服务，因此我们也在 `onDestroy()` 方法中停止服务。还有一项需要讨论，那就是 `AndroidManifest.xml`\
  \ 文件，如清单 11–21 所示。\n\n**清单 11–21.** *实现本地服务：AndroidManifest.xml*\n\n\n\n```xml\n\
  <?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest\n      package=\"com.androidbook.services.simplelocal\"\
  \n      android:versionCode=\"1\"\n      android:versionName=\"1.0\">\n    <application\
  \ android:icon=\"@drawable/icon\"\n             android:label=\"@string/app_name\"\
  >\n        <activity android:name=\".MainActivity\"\n              android:label=\"\
  @string/app_name\"\n              android:launchMode=\"singleTop\" >\n         <intent-filter>\n\
  \           <action android:name=\"android.intent.action.MAIN\" />\n           <category\
  \ android:name=\"android.intent.category.LAUNCHER\" />\n         </intent-filter>\n\
  \      </activity>\n      <service android:name=\"BackgroundService\"/>\n  </application>\n\
  \  <uses-sdk android:minSdkVersion=\"5\" />\n</manifest>\n```\n\n在清单文件中，除了常规的 `<activity>`\
  \ 标签外，我们现在还添加了一个 `<service>` 标签。由于这是一个本地服务，我们通过类名显式调用它，因此 `<service>` 标签中无需添加过多内容，只需指定服务名称即可。但关于这个清单文件，还有一点需要指出：我们的服务会创建一条通知，以便在例如用户在\
  \ `MainActivity` 上按下 Home 键但未停止服务时，用户能通过该通知返回 `MainActivity`。\n\n`MainActivity`\
  \ 仍然存在，只是不可见。返回 `MainActivity` 的一种方法是点击我们服务创建的通知。我们不希望看到的现象是，在已有不可见的 `MainActivity`\
  \ 之外，再创建一个新的 `MainActivity`。为了防止这种情况发生，我们在清单文件中为 `MainActivity` 设置了一个名为 `android:launchMode`\
  \ 的属性，并将其值设为 `singleTop`。这将有助于确保现有不可见的 `MainActivity` 被带到前台并显示，而不是创建另一个 `MainActivity`。\n\
  \n当你运行此应用程序时，会看到两个按钮。点击“启动服务”按钮，即可实例化该服务并调用 `onStartCommand()`。我们的代码会向 LogCat 输出多条日志消息，方便你跟踪了解。请连续点击“启动服务”按钮数次，甚至快速点击。你会看到为处理每个请求而创建的线程。你还会注意到\
  \ counter 的值被传递给了每个 `ServiceWorker` 线程。当你按下“停止服务”按钮时，我们的服务将终止，你会看到来自 `MainActivity`\
  \ 的 `stopService()` 方法、来自 `BackgroundService` 的 `onDestroy()` 方法的日志消息，如果 `ServiceWorker`\
  \ 线程被中断，还可能看到来自它们的日志消息。\n\n你还应该注意到服务启动时的通知消息。在服务运行的情况下，从 `MainActivity` 按下返回键，你会看到通知消息消失。这意味着我们的服务也已终止。要重新启动\
  \ `MainActivity`，点击“启动服务”按钮再次启动服务。现在，按下 Home 键。我们的 `MainActivity` 从视图中消失，但通知仍然存在，这意味着我们的服务仍在运行。点击通知，你将再次看到我们的\
  \ `MainActivity`。\n\n请注意，我们的示例使用 Activity 与服务交互，但你应用程序中的任何组件都可以使用该服务。这包括其他服务、Activity、通用类等等。同时请注意，我们的服务不会自行停止，它依赖于\
  \ Activity 来代为执行。服务有一些方法可以使其自行停止，即 `stopSelf()` 和 `stopSelfResult()`。\n\n我们的 `BackgroundService`\
  \ 是一个典型示例，演示了由托管该服务的应用程序中的组件所使用的服务。换句话说，运行该服务的应用程序也是其唯一的消费者。由于该服务不支持其进程外部的客户端，因此它是一个本地服务。因为是本地服务（与远程服务相对），它在\
  \ `bind()` 方法中返回 `null`。因此，绑定到此服务的唯一方法是调用 `Context.startService()`。本地服务的关键方法包括 `onCreate()`、`onStartCommand()`、`stop*()`\
  \ 和 `onDestroy()`。\n\n本地服务还有另一种选择，适用于你只希望拥有一个后台线程的单个服务实例的情况。在这种情况下，在 `BackgroundService`\
  \ 的 `onCreate()` 方法中，我们可以创建一个执行繁重任务的线程。我们可以在 `onCreate()` 中创建并启动该线程，而不是在 `onStartCommand()`\
  \ 中。之所以可以这样做，是因为 `onCreate()` 只会被调用一次，并且我们希望线程在服务的生命周期内只被创建一次。不过，在 `onCreate()`\
  \ 中我们不会获得由 `startService()` 传递的 intent 内容。如果需要这些内容，我们还是使用前面描述的模式，并且只需知道 `onStartCommand()`\
  \ 应该只被调用一次即可。\n\n到此，我们完成了对本地服务的介绍。请记住，我们将在后续章节中更详细地介绍本地服务。接下来，让我们进入 AIDL 服务——这种更复杂的服务类型。\n\
  \n#### 理解 AIDL 服务\n\n在上一节中，我们向你展示了如何编写一个由托管它的应用程序消费的 Android 服务。现在，我们将向你展示如何构建一个可以被其他进程通过远程过程调用（RPC）消费的服务。与许多其他基于\
  \ RPC 的解决方案一样，在 Android 中，你需要一种接口定义语言（IDL）来定义将向客户端暴露的接口。在 Android 世界中，这种 IDL 被称为\
  \ Android 接口定义语言（AIDL）。要构建一个远程服务，你需要执行以下操作：\n\n1.  编写一个 AIDL 文件，定义你向客户端暴露的接口。AIDL\
  \ 文件使用 Java 语法，扩展名为 `.aidl`。在你的 AIDL 文件中使用与你的 Android 项目包名相同的包名。\n2.  将 AIDL 文件添加到\
  \ Eclipse 项目的 `src` 目录下。Android Eclipse 插件将调用 AIDL 编译器，根据 AIDL 文件生成一个 Java 接口（AIDL\
  \ 编译器作为构建过程的一部分被调用）。\n3.  实现一个服务，并从 `onBind()` 方法返回该接口。\n4.  将服务配置添加到你的 `AndroidManifest.xml`\
  \ 文件中。后续章节将演示如何执行每个步骤。\n\n#### 在 AIDL 中定义服务接口\n\n为了演示远程服务的示例，我们将编写一个股票报价服务。该服务将提供一个方法，该方法接收股票代码并返回股票价值。要在\
  \ Android 中编写远程服务，第一步是在 AIDL 文件中定义服务接口。清单 11–22 显示了 `IStockQuoteService` 的 AIDL\
  \ 定义。该文件放置的位置与你的 `StockQuoteService` 项目中常规 Java 文件的位置相同。\n\n**清单 11–22.** *股票报价服务的\
  \ AIDL 定义*\n\n```java\n// 此文件为 IStockQuoteService.aidl\npackage com.androidbook.services.stockquoteservice;\n\
  interface IStockQuoteService\n{\n        double getQuote(String ticker);\n}\n```\n\
  \n`IStockQuoteService` 接受股票代码作为字符串，并返回当前股票价值作为 double 类型。当你创建 AIDL 文件时，Android Eclipse\
  \ 插件会运行 AIDL 编译器来处理你的 AIDL 文件（作为构建过程的一部分）。如果你的 AIDL 文件编译成功，编译器会生成一个适用于 RPC 通信的 Java\
  \ 接口。请注意，生成的文件将位于你 AIDL 文件中命名的包内——本例中为 `com.androidbook.services.stockquoteservice`。\n\
  \n清单 11–23 显示了为我们的 `IStockQuoteService` 接口生成的 Java 文件。生成的文件将放入我们 Eclipse 项目的 gen\
  \ 文件夹中。\n\n**清单 11–23.** *编译器生成的 Java 文件*\n\n\n\n```aidl\n/*\n * 此文件为自动生成。请勿修改。\n\
  \ * 原始文件：C:\\android\\StockQuoteService\\src\\com\\androidbook\\\nservices\\stockquoteservice\\\
  IStockQuoteService.aidl\n */\npackage com.androidbook.services.stockquoteservice;\n\
  import java.lang.String;\nimport android.os.RemoteException;\nimport android.os.IBinder;\n\
  import android.os.IInterface;\nimport android.os.Binder;\nimport android.os.Parcel;\n\
  public interface IStockQuoteService extends android.os.IInterface\n{\n/** 本地端 IPC\
  \ 实现的桩类。 */\npublic static abstract class Stub extends android.os.Binder implements\n\
  com.androidbook.services.stockquoteservice.IStockQuoteService\n{\nprivate static\
  \ final java.lang.String DESCRIPTOR =\n\"com.androidbook.services.stockquoteservice.IStockQuoteService\"\
  ;\n/** 构造桩并将其附加到接口。 */\npublic Stub()\n{\nthis.attachInterface(this, DESCRIPTOR);\n\
  }\n/**\n * 将 IBinder 对象转换为 IStockQuoteService 接口，\n * 必要时生成代理。\n */\npublic static\
  \ com.androidbook.services.stockquoteservice.IStockQuoteService\nasInterface(android.os.IBinder\
  \ obj)\n{\nif ((obj==null)) {\nreturn null;\n}\nandroid.os.IInterface iin = (android.os.IInterface)obj.queryLocalInterface(DESCRIPTOR);\n\
  if (((iin!=null)&&(iin instanceof com.androidbook.services.stockquoteservice.IStockQuoteService)))\
  \ {\nreturn ((com.androidbook.services.stockquoteservice.IStockQuoteService)iin);\n\
  }\nreturn ((com.androidbook.services.stockquoteservice.IStockQuoteService)iin);\n\
  }\nreturn new com.androidbook.services.stockquoteservice.IStockQuoteService.Stub.Proxy(obj);\n\
  }\npublic android.os.IBinder asBinder()\n{\nreturn this;\n}\n@Override public boolean\
  \ onTransact(int code, android.os.Parcel data,\n     android.os.Parcel reply, int\
  \ flags) throws android.os.RemoteException\n{\nswitch (code)\n{\ncase INTERFACE_TRANSACTION:\n\
  {\nreply.writeString(DESCRIPTOR);\nreturn true;\n}\ncase TRANSACTION_getQuote:\n\
  {\ndata.enforceInterface(DESCRIPTOR);\njava.lang.String _arg0;\n_arg0 = data.readString();\n\
  double _result = this.getQuote(_arg0);\nreply.writeNoException();\nreply.writeDouble(_result);\n\
  return true;\n}\n}\nreturn super.onTransact(code, data, reply, flags);\n}\nprivate\
  \ static class Proxy implements\n        com.androidbook.services.stockquoteservice.IStockQuoteService\n\
  {\nprivate android.os.IBinder mRemote;\nProxy(android.os.IBinder remote)\n{\nmRemote\
  \ = remote;\n}\npublic android.os.IBinder asBinder()\n{\nreturn mRemote;\n}\npublic\
  \ java.lang.String getInterfaceDescriptor()\n{\nreturn DESCRIPTOR;\n}\npublic double\
  \ getQuote(java.lang.String ticker) throws android.os.RemoteException\n{\nandroid.os.Parcel\
  \ _data = android.os.Parcel.obtain();\nandroid.os.Parcel _reply = android.os.Parcel.obtain();\n\
  double _result;\ntry {\n_data.writeInterfaceToken(DESCRIPTOR);\n_data.writeString(ticker);\n\
  mRemote.transact(Stub.TRANSACTION_getQuote, _data, _reply, 0);\n_reply.readException();\n\
  _result = _reply.readDouble();\n}\nfinally {\n_reply.recycle();\n_data.recycle();\n\
  }\nreturn _result;\n}\n}\nstatic final int TRANSACTION_getQuote = (IBinder.FIRST_CALL_TRANSACTION\
  \ + 0);\n}\npublic double getQuote(java.lang.String ticker) throws android.os.RemoteException;\n\
  }\n```\n\n关于生成的类，需要注意以下几点重要事项：\n\n*   我们在 AIDL 文件中定义的接口在生成的代码中被实现为一个接口（即存在一个名为 `IStockQuoteService`\
  \ 的接口）。\n*   一个名为 `Stub` 的 `static final` 抽象类继承自 `android.os.Binder` 并实现了 `IStockQuoteService`。请注意，该类是一个抽象类。\n\
  *   一个名为 `Proxy` 的内部类实现了 `IStockQuoteService`，它是 `Stub` 类的代理。\n*   AIDL 文件必须位于预期生成文件的包中（如\
  \ AIDL 文件的包声明中所指定）。\n\n现在，让我们继续在服务类中实现 AIDL 接口。\n\n\n\n#### 实现 AIDL 接口\n\n在上一节中，我们为股票报价服务定义了一个\
  \ AIDL 文件并生成了绑定文件。现在，我们将为该服务提供具体的实现。为了实现服务的接口，我们需要编写一个继承自 `android.app.Service`\
  \ 并实现 `IStockQuoteService` 接口的类。我们将要编写的类称为 `StockQuoteService`。为了将服务暴露给客户端，`StockQuoteService`\
  \ 需要提供 `onBind()` 方法的实现，并且我们需要在 `AndroidManifest.xml` 文件中添加一些配置信息。清单 11–24 展示了 `IStockQuoteService`\
  \ 接口的实现。该文件同样放置于 `StockQuoteService` 项目的 `src` 文件夹中。\n\n**清单 11–24.** *`IStockQuoteService`\
  \ 服务的实现*\n\n```\n// StockQuoteService.java\nimport android.app.Service;\nimport\
  \ android.content.Intent;\nimport android.os.IBinder;\nimport android.os.RemoteException;\n\
  import android.util.Log;\n\npublic class StockQuoteService extends Service\n{\n\
  \    private static final String TAG = \"StockQuoteService\";\n    public class\
  \ StockQuoteServiceImpl extends IStockQuoteService.Stub\n    {\n        @Override\n\
  \        public double getQuote(String ticker) throws RemoteException\n        {\n\
  \            Log.v(TAG, \"getQuote() called for \" + ticker);\n            return\
  \ 20.0;\n        }\n    }\n\n    @Override\n    public void onCreate() {\n     \
  \   super.onCreate();\n        Log.v(TAG, \"onCreate() called\");\n    }\n\n   \
  \ @Override\n    public void onDestroy()\n    {\n        super.onDestroy();\n  \
  \      Log.v(TAG, \"onDestroy() called\");\n    }\n\n    @Override\n    public IBinder\
  \ onBind(Intent intent)\n    {\n        Log.v(TAG, \"onBind() called\");\n     \
  \   return new StockQuoteServiceImpl();\n    }\n}\n```\n\n清单 11–24 中的 `StockQuoteService.java`\
  \ 类与我们之前创建的本地 `BackgroundService` 类似，但去掉了 `NotificationManager`。重要的区别在于我们实现了 `onBind()`\
  \ 方法。回顾一下，从 AIDL 文件生成的 `Stub` 类是一个抽象类，并且实现了 `IStockQuoteService` 接口。在我们的服务实现中，有一个内部类\
  \ `StockQuoteServiceImpl` 继承自 `Stub` 类。此类充当远程服务的实现，并且 `onBind()` 方法会返回该类的实例。至此，我们拥有一个可运行的\
  \ AIDL 服务，但外部客户端尚无法连接到它。\n\n为了将服务暴露给客户端，我们需要在 `AndroidManifest.xml` 文件中添加服务声明，并且这次需要添加一个意图过滤器来暴露服务。清单\
  \ 11–25 展示了 `StockQuoteService` 的服务声明。`<service>` 标签是 `<application>` 标签的子元素。\n\n\
  **清单 11–25.** *`IStockQuoteService` 的清单声明*\n\n```\n<?xml version=\"1.0\" encoding=\"\
  utf-8\"?>\n<manifest\n      package=\"com.androidbook.services.stockquoteservice\"\
  \n      android:versionCode=\"1\"\n      android:versionName=\"1.0\">\n    <application\
  \ android:icon=\"@drawable/icon\"\n        android:label=\"@string/app_name\">\n\
  \      <service android:name=\"StockQuoteService\">\n        <intent-filter>\n \
  \               <action android:name=\"com.androidbook.services.stockquoteservice.IStockQuoteService\"\
  \ />\n        </intent-filter>\n      </service>\n    </application>\n    <uses-sdk\
  \ android:minSdkVersion=\"4\" />\n</manifest>\n```\n\n与所有服务一样，我们通过 `<service>` 标签定义要暴露的服务。对于\
  \ AIDL 服务，还需要添加一个包含 `<action>` 条目的 `<intent-filter>`，指向要暴露的服务接口。\n\n完成这些配置后，我们就拥有了部署服务所需的一切。当你准备从\
  \ Eclipse 部署此服务应用时，只需像运行其他任何应用一样选择“Run As”即可。Eclipse 会在控制台中评论该应用没有启动器，但它仍会部署应用，这正是我们期望的效果。现在，让我们看看如何从另一个应用程序（当然是在同一设备上）调用此服务。\n\
  \n\n\n##### 从客户端应用程序调用服务\n\n当客户端与服务通信时，双方必须存在协议或契约。在 Android 中，契约体现在我们的 AIDL 文件中。因此，使用服务的第一步是获取服务的\
  \ AIDL 文件并将其复制到客户端项目中。当你将 AIDL 文件复制到客户端项目时，AIDL 编译器会创建与实现服务时（在服务实现项目中）相同的接口定义文件。这会向客户端暴露服务中的所有方法、参数和返回类型。让我们创建一个新项目并复制\
  \ AIDL 文件。\n\n1.  创建一个名为 `StockQuoteClient` 的新 Android 项目。使用不同的包名，例如 `com.androidbook.stockquoteclient`。在“创建\
  \ Activity”字段中使用 `MainActivity`。\n2.  在此项目的 `src` 目录中创建一个名为 `com.androidbook.services.stockquoteservice`\
  \ 的新 Java 包。\n3.  将 `StockQuoteService` 项目中的 `IStockQuoteService.aidl` 文件复制到这个新包中。请注意，将文件复制到项目后，AIDL\
  \ 编译器将生成关联的 Java 文件。\n\n你重新生成的服务接口充当客户端和服务之间的契约。下一步是获取对服务的引用，以便我们可以调用 `getQuote()`\
  \ 方法。对于远程服务，我们必须调用 `bindService()` 方法，而不是 `startService()` 方法。清单 11–26 展示了一个充当 `IStockQuoteService`\
  \ 服务客户端的 Activity 类。清单 11–27 包含了该 Activity 的布局文件。\n\n清单 11–26 展示了我们的 `MainActivity.java`\
  \ 文件。请注意，客户端 Activity 的包名并不重要——你可以将 Activity 放在任何你想要的包中。但是，你创建的 AIDL 产物是与包相关的，因为\
  \ AIDL 编译器会根据 AIDL 文件的内容生成代码。\n\n**清单 11–26.** *IStockQuoteService 服务的客户端*\n\n```\n\
  // 此文件为 MainActivity.java\nimport com.androidbook.services.stockquoteservice.IStockQuoteService;\n\
  import android.app.Activity;\nimport android.content.ComponentName;\nimport android.content.Context;\n\
  import android.content.Intent;\nimport android.content.ServiceConnection;\nimport\
  \ android.os.Bundle;\nimport android.os.IBinder;\nimport android.os.RemoteException;\n\
  import android.util.Log;\nimport android.view.View;\nimport android.widget.Button;\n\
  import android.widget.Toast;\nimport android.widget.ToggleButton;\n\npublic class\
  \ MainActivity extends Activity {\n    private static final String TAG = \"StockQuoteClient\"\
  ;\n    private IStockQuoteService stockService = null;\n    private ToggleButton\
  \ bindBtn;\n    private Button callBtn;\n\n    /** 当 Activity 首次创建时调用。 */\n    @Override\n\
  \    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n\n        bindBtn = (ToggleButton)findViewById(R.id.bindBtn);\n\
  \        callBtn = (Button)findViewById(R.id.callBtn);\n    }\n\n    public void\
  \ doClick(View view) {\n        switch(view.getId()) {\n        case R.id.bindBtn:\n\
  \            if(((ToggleButton) view).isChecked()) {\n                bindService(new\
  \ Intent(\n                    IStockQuoteService.class.getName()),\n          \
  \          serConn, Context.BIND_AUTO_CREATE);\n            }\n            else\
  \ {\n                unbindService(serConn);\n                callBtn.setEnabled(false);\n\
  \            }\n            break;\n        case R.id.callBtn:\n            callService();\n\
  \            break;\n        }\n    }\n\n    private void callService() {\n    \
  \    try {\n            double val = stockService.getQuote(\"ANDROID\");\n     \
  \       Toast.makeText(MainActivity.this,\n                    \"来自服务的值为 \" + val,\n\
  \                    Toast.LENGTH_SHORT).show();\n        } catch (RemoteException\
  \ ee) {\n            Log.e(\"MainActivity\", ee.getMessage(), ee);\n        }\n\
  \    }\n\n    private ServiceConnection serConn = new ServiceConnection() {\n\n\
  \        @Override\n        public void onServiceConnected(ComponentName name,\n\
  \            IBinder service)\n        {\n            Log.v(TAG, \"调用了 onServiceConnected()\"\
  );\n            stockService = IStockQuoteService.Stub.asInterface(service);\n \
  \           bindBtn.setChecked(true);\n            callBtn.setEnabled(true);\n \
  \       }\n\n        @Override\n        public void onServiceDisconnected(ComponentName\
  \ name) {\n            Log.v(TAG, \"调用了 onServiceDisconnected()\");\n          \
  \  bindBtn.setChecked(false);\n            callBtn.setEnabled(false);\n        \
  \    stockService = null;\n        }\n    };\n\n    protected void onDestroy() {\n\
  \        Log.v(TAG, \"调用了 onDestroy()\");\n        if(callBtn.isEnabled())\n   \
  \         unbindService(serConn);\n        super.onDestroy();\n    }\n}\n```\n\n\
  该 Activity 显示我们的布局，并获取对“调用服务”按钮的引用，以便我们能够在服务运行时正确启用它，并在服务停止时禁用它。当用户点击“绑定”按钮时，Activity\
  \ 会调用 `bindService()` 方法。同样，当用户点击“取消绑定”时，Activity 会调用 `unbindService()` 方法。请注意，传递给\
  \ `bindService()` 方法的参数有三个：AIDL 服务的名称、一个 `ServiceConnection` 实例，以及一个自动创建服务的标志。\n\
  \n**清单 11–27.** *IStockQuoteService 服务客户端布局*\n\n```\n<?xml version=\"1.0\" encoding=\"\
  utf-8\"?>\n<!-- 此文件为 /res/layout/main.xml -->\n<LinearLayout\n    android:orientation=\"\
  vertical\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  fill_parent\" >\n\n<ToggleButton android:id=\"@+id/bindBtn\"\n    android:layout_width=\"\
  wrap_content\"\n    android:layout_height=\"wrap_content\"\n    android:textOff=\"\
  绑定\"  android:textOn=\"取消绑定\"\n    android:onClick=\"doClick\" />\n\n<Button android:id=\"\
  @+id/callBtn\"\n    android:layout_width=\"wrap_content\"\n    android:layout_height=\"\
  wrap_content\"\n    android:text=\"调用服务\"  android:enabled=\"false\"\n    android:onClick=\"\
  doClick\" />\n</LinearLayout>\n```\n\n对于 AIDL 服务，你需要提供 `ServiceConnection` 接口的实现。这个接口定义了两个方法：一个在系统建立与服务连接时调用，另一个在连接销毁时调用。在我们的\
  \ Activity 实现中，我们定义了一个私有的匿名成员，它实现了 `IStockQuoteService` 的 `ServiceConnection`。当我们调用\
  \ `bindService()` 方法时，我们传入对此成员的引用。当与服务建立连接时，会调用 `onServiceConnected()` 回调，然后我们使用\
  \ `Stub` 获取对 `IStockQuoteService` 的引用，并启用“调用服务”按钮。\n\n请注意，`bindService()` 调用是一个异步调用。之所以是异步的，是因为进程或服务可能尚未运行，因此可能需要创建或启动。并且我们不能在主线程上等待服务启动。由于\
  \ `bindService()` 是异步的，平台提供了 `ServiceConnection` 回调，以便我们知道服务何时启动，以及服务何时不可用。\n\n\n\
  \n请注意`onServiceDisconnected()`回调。当我们从服务解除绑定时，该回调并*不*会被调用。它仅在服务崩溃时被调用。如果发生这种情况，我们不应认为我们仍处于连接状态，并且可能需要重新调用`bindService()`调用。这就是为什么当此回调被调用时，我们会更改\
  \ UI 中按钮状态的原因。但请注意，我们说的是“我们可能需要重新调用`bindService()`调用”。Android 可能会为我们重新启动服务，并调用我们的`onServiceConnected()`回调。你可以通过运行客户端、绑定到服务，并使用\
  \ DDMS 对“Stock Quote Service”应用程序执行“Stop”操作来亲自尝试。\n\n运行此示例时，请观察 LogCat 中的日志消息，以了解幕后发生的情况。\n\
  \n现在你已经知道如何创建和使用 AIDL 接口了。在继续并使问题进一步复杂化之前，让我们回顾一下构建简单本地服务与 AIDL 服务所需的步骤。本地服务是一种不支持`onBind()`的服务——它从`onBind()`返回`null`。这种类型的服务仅对托管该服务的应用程序的组件可访问。你可以通过调用`startService()`来调用本地服务。\n\
  \n另一方面，AIDL 服务是一种可以被同一进程内的组件以及存在于其他应用程序中的组件使用的服务。这种类型的服务在 AIDL 文件中定义了自身与其客户端之间的契约。该服务实现\
  \ AIDL 契约，而客户端绑定到 AIDL 定义。服务通过从`onBind()`方法返回 AIDL 接口的实现来实现契约。客户端通过调用`bindService()`绑定到\
  \ AIDL 服务，并通过调用`unbindService()`断开与服务连接。\n\n到目前为止，在我们服务的示例中，我们严格处理了传递简单的 Java 原始类型。实际上，Android\
  \ 服务也支持传递复杂类型。这非常有用，特别是对于 AIDL 服务，因为你可能需要向服务传递数量不限的参数，而将它们全部作为简单原始类型传递是不合理的。将它们打包成复杂类型再传递给服务更合理。\n\
  \n让我们看看如何向服务传递复杂类型。\n\n##### 向服务传递复杂类型\n\n向服务传递复杂类型以及从服务接收复杂类型比传递 Java 原始类型需要更多工作。在开始这项工作之前，你应该了解\
  \ AIDL 对非原始类型的支持：\n\n*   AIDL 支持`String`和`CharSequence`。\n*   AIDL 允许你传递其他 AIDL\
  \ 接口，但你需要为你引用的每个 AIDL 接口添加`import`语句（即使引用的 AIDL 接口位于同一个包中）。\n*   AIDL 允许你传递实现了`android.os.Parcelable`接口的复杂类型。你需要在你的\
  \ AIDL 文件中为这些类型添加`import`语句。\n*   AIDL 支持`java.util.List`和`java.util.Map`，但有一些限制。集合中项目允许的数据类型包括\
  \ Java 原始类型、`String`、`CharSequence`或`android.os.Parcelable`。你不需要为`List`或`Map`添加`import`语句，但你需要为`Parcelable`添加它们。\n\
  *   除`String`之外的非原始类型需要一个方向指示器。方向指示器包括`in`、`out`和`inout`。`in`表示值由客户端设置；`out`表示值由服务设置；`inout`表示客户端和服务都设置值。\n\
  \n`Parcelable`接口告诉 Android 运行时在编组和解组过程中如何序列化和反序列化对象。清单 11–28 显示了一个实现`Parcelable`接口的`Person`类。\n\
  \n**清单 11–28.** *实现 Parcelable 接口*\n\n```\n// This file is Person.java\npackage\
  \ com.androidbook.services.stock2;\nimport android.os.Parcel;\nimport android.os.Parcelable;\n\
  \npublic class Person implements Parcelable {\n    private int age;\n    private\
  \ String name;\n    public static final Parcelable.Creator<Person> CREATOR =\n \
  \       new Parcelable.Creator<Person>()\n    {\n        public Person createFromParcel(Parcel\
  \ in) {\n            return new Person(in);\n        }\n\n        public Person[]\
  \ newArray(int size) {\n            return new Person[size];\n        }\n    };\n\
  \n    public Person() {\n    }\n\n    private Person(Parcel in) {\n        readFromParcel(in);\n\
  \    }\n\n    @Override\n    public int describeContents() {\n        return 0;\n\
  \    }\n\n    @Override\n    public void writeToParcel(Parcel out, int flags) {\n\
  \        out.writeInt(age);\n        out.writeString(name);\n    }\n\n    public\
  \ void readFromParcel(Parcel in) {\n        age = in.readInt();\n        name =\
  \ in.readString();\n    }\n\n    public int getAge() {\n        return age;\n  \
  \  }\n\n    public void setAge(int age) {\n        this.age = age;\n    }\n\n  \
  \  public String getName() {\n        return name;\n    }\n\n    public void setName(String\
  \ name) {\n        this.name = name;\n    }\n}\n```\n\n要开始实现此功能，请在 Eclipse 中创建一个名为`StockQuoteService2`的新\
  \ Android 项目。对于“Create Activity”，使用名称`MainActivity`，并使用包`com.androidbook.services.stock2`。然后将上面的`Person.java`文件添加到我们新项目的`com.androidbook.services.stock2`包中。\n\
  \n`Parcelable`接口定义了在编组/解组过程中对象水合与脱水的契约。`Parcelable`接口的底层是`Parcel`容器对象。`Parcel`类是一种专为\
  \ Android 内部进程间通信设计的快速序列化/反序列化机制。该类提供了多种方法，你可用它们将成员扁平化到容器中，以及将成员从容器中展开。为了正确实现一个用于进程间通信的对象，我们必须执行以下操作：\n\
  \n\n```markdown\n\n1.  实现`Parcelable`接口。这意味着你需要实现`writeToParcel()`和`readFromParcel()`方法。写入方法会将对象写入`Parcel`，读取方法则会从`Parcel`中读取对象。请注意，写入属性的顺序必须与读取它们的顺序一致。\n\
  2.  向类中添加一个名为`CREATOR`的`static final`属性。该属性需要实现`android.os.Parcelable.Creator<T>`接口。\n\
  3.  为`Parcelable`提供一个构造函数，该构造函数知道如何从`Parcel`创建对象。\n4.  在`.aidl`文件中定义一个与包含复杂类型的`.java`文件相匹配的`Parcelable`类。当编译你的\
  \ AIDL 文件时，AIDL 编译器会查找此文件。`Person.aidl`文件的示例如代码清单 11-29 所示。该文件应与`Person.java`放在同一位置。\n\
  \n**注意：** 看到`Parcelable`可能会引发一个疑问：为什么 Android 不使用内置的 Java 序列化机制？事实证明，Android 团队得出的结论是，Java\
  \ 中的序列化速度太慢，无法满足 Android 的进程间通信需求。因此，团队构建了`Parcelable`解决方案。`Parcelable`方法要求你显式序列化类的成员，但最终，你会获得更快的对象序列化速度。\n\
  \n同时请意识到，Android 提供了两种允许你将数据传递到另一个进程的机制。第一种是通过 Intent 将`Bundle`传递给 Activity，第二种是将`Parcelable`传递给\
  \ Service。这两种机制不可互换，也不应混淆。也就是说，`Parcelable`并非设计用于传递给 Activity。如果你想启动一个 Activity\
  \ 并向其传递一些数据，请使用`Bundle`。`Parcelable`仅用作 AIDL 定义的一部分。\n\n**代码清单 11-29.** *Person.aidl\
  \ 文件示例*\n\n```\n// This file is Person.aidl\npackage com.androidbook.services.stock2;\n\
  parcelable Person;\n```\n\n你需要为项目中的每个`Parcelable`准备一个`.aidl`文件。在这个例子中，我们只有一个`Parcelable`，即`Person`。你可能会注意到，`gen`文件夹中没有生成`Person.java`文件。这是意料之中的。我们在之前创建该文件时已经拥有了它。\n\
  \n现在，让我们在远程服务中使用`Person`类。为简单起见，我们将修改`IStockQuoteService`，使其接受一个`Person`类型的输入参数。其思路是，客户端将向服务传递一个`Person`对象，以告知服务谁是报价请求者。新的`IStockQuoteService.aidl`文件如代码清单\
  \ 11-30 所示。\n\n**代码清单 11-30.** *向 Service 传递 Parcelable 对象*\n\n```\n// This file\
  \ is IStockQuoteService.aidl\npackage com.androidbook.services.stock2;\nimport com.androidbook.services.stock2.Person;\n\
  \ninterface IStockQuoteService\n{\n    String getQuote(in String ticker,in Person\
  \ requester);\n}\n```\n\n`getQuote()`方法现在接受两个参数：股票代码和指定请求者的`Person`对象。请注意，参数上有方向指示符，因为参数包含了非原始类型，并且我们为`Person`类添加了一个`import`语句。`Person`类与\
  \ Service 定义位于同一个包中（`com.androidbook.services.stock2`）。\n\nService 的实现现在如代码清单 11-31\
  \ 所示，其布局如代码清单 11-32 所示。\n\n**代码清单 11-31.** *StockQuoteService2 实现*\n\n```\npackage\
  \ com.androidbook.services.stock2;\n// This file is StockQuoteService2.java\n\n\
  import android.app.Notification;\nimport android.app.NotificationManager;\nimport\
  \ android.app.PendingIntent;\nimport android.app.Service;\nimport android.content.Intent;\n\
  import android.os.IBinder;\nimport android.os.RemoteException;\n\npublic class StockQuoteService2\
  \ extends Service\n{\n    private NotificationManager notificationMgr;\n\n    public\
  \ class StockQuoteServiceImpl extends IStockQuoteService.Stub\n    {\n        public\
  \ String getQuote(String ticker, Person requester)\n                throws RemoteException\
  \ {\n            return \"Hello \" + requester.getName() +\n                \"!\
  \ Quote for \" + ticker + \" is 20.0\";\n        }\n    }\n\n    @Override\n   \
  \ public void onCreate() {\n        super.onCreate();\n\n        notificationMgr\
  \ =\n          (NotificationManager)getSystemService(NOTIFICATION_SERVICE);\n\n\
  \        displayNotificationMessage(\n              \"onCreate() called in StockQuoteService2\"\
  );\n    }\n\n    @Override\n    public void onDestroy()\n    {\n        displayNotificationMessage(\n\
  \              \"onDestroy() called in StockQuoteService2\");\n        // Clear\
  \ all notifications from this service\n        notificationMgr.cancelAll();\n  \
  \      super.onDestroy();\n    }\n\n    @Override\n    public IBinder onBind(Intent\
  \ intent)\n    {\n        displayNotificationMessage(\n              \"onBind()\
  \ called in StockQuoteService2\");\n        return new StockQuoteServiceImpl();\n\
  \    }\n\n    private void displayNotificationMessage(String message)\n    {\n \
  \       Notification notification =\n            new Notification(R.drawable.emo_im_happy,\n\
  \                message, System.currentTimeMillis());\n\n        PendingIntent\
  \ contentIntent =\n            PendingIntent.getActivity(this, 0,\n            \
  \    new Intent(this, MainActivity.class), 0);\n\n        notification.setLatestEventInfo(this,\n\
  \            \"StockQuoteService2\", message,\n            contentIntent);\n\n \
  \       notification.flags = Notification.FLAG_NO_CLEAR;\n\n        notificationMgr.notify(R.id.app_notification_id,\
  \ notification);\n    }\n}\n```\n\n**代码清单 11-32.** *StockQuoteService2 布局*\n\n```\n\
  <?xml version=\"1.0\" encoding=\"utf-8\"?>\n<!-- This file is /res/layout/main.xml\
  \ -->\n<LinearLayout\n    android:orientation=\"vertical\"\n    android:layout_width=\"\
  fill_parent\"\n    android:layout_height=\"fill_parent\" >\n<TextView  \n    android:layout_width=\"\
  fill_parent\"\n    android:layout_height=\"wrap_content\"\n    android:text=\"This\
  \ is where the service could ask for help.\" />\n</LinearLayout>\n```\n\n此实现与先前实现的不同之处在于，我们重新引入了通知，并且现在将股票价值作为字符串（而非`double`）返回。返回给用户的字符串包含了来自`Person`对象的请求者名称，这证明了我们读取了客户端发送的值，并且`Person`对象已正确传递给\
  \ Service。\n\n还有一些其他工作要做才能使其生效：\n\n1.  从 Android `SDK/platforms/android-2.1/data/res/drawable-mdpi`目录下找到`emo_im_happy.png`图片文件，并将其复制到我们项目的`/res/drawable`目录中。或者修改代码中的资源名称，并将你想要的任何图片放入`drawables`文件夹。\n\
  2.  在`/res/values/strings.xml`文件中添加一个新的`<item type=\"id\" name=\"app_notification_id\"\
  />`标签。\n3.  我们需要修改`AndroidManifest.xml`文件中的`<application>`，如代码清单 11-33 所示。\n\n**代码清单\
  \ 11-33.** *为 StockQuoteService2 修改 AndroidManifest.xml 文件中的`<application>`*\n\n\
  ```\n\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest\n      package=\"\
  com.androidbook.services.stock2\"\n      android:versionCode=\"1\"\n      android:versionName=\"\
  1.0\">\n    <application android:icon=\"@drawable/icon\"\n            android:label=\"\
  @string/app_name\">\n        <activity android:name=\".MainActivity\"\n        \
  \        android:label=\"@string/app_name\"\n                android:launchMode=\"\
  singleTop\" >\n            <intent-filter>\n                <action android:name=\"\
  android.intent.action.MAIN\" />\n            </intent-filter>\n        </activity>\n\
  \      <service android:name=\"StockQuoteService2\">\n        <intent-filter>\n\
  \            <action android:name=\"com.androidbook.services.stock2.IStockQuoteService\"\
  \ />\n        </intent-filter>\n      </service>\n    </application>\n    <uses-sdk\
  \ android:minSdkVersion=\"7\" />\n</manifest>\n```\n\n虽然针对 `android:name=\".MainActivity\"\
  ` 属性使用点号表示法是可行的，但在服务的 `<intent-filter>` 标签内部的 `<action>` 标签中使用点号表示法却不行。我们需要将其完整拼写出来；否则，客户端将无法找到服务的规格说明。\n\
  \n最后，我们将使用默认的 `MainActivity.java` 文件，该文件仅显示一个包含简单消息的基本布局。我们之前已经介绍过如何通过通知启动活动。在实际应用中，该活动也将实现此目的，但对于本示例，我们将保持这部分内容简洁。现在我们已经实现了服务，接下来创建一个名为\
  \ `StockQuoteClient2` 的新 Android 项目。使用 `com.dave` 作为包名，`MainActivity` 作为活动名称。为了实现一个能将\
  \ `Person` 对象传递给服务的客户端，我们需要将服务项目中客户端所需的所有内容复制到客户端项目中。在之前的示例中，我们只需要 `IStockQuoteService.aidl`\
  \ 文件。现在，我们还需要复制 `Person.java` 和 `Person.aidl` 文件，因为 `Person` 对象已成为接口的一部分。将这 3 个文件复制到客户端项目后，根据代码清单\
  \ 11-34 修改 `main.xml`，并根据代码清单 11-35 修改 `MainActivity.java`。或者直接从我们网站上的源代码导入此项目。\n\
  \n**代码清单 11–34.** *StockQuoteClient2 更新后的 main.xml*\n\n```xml\n<?xml version=\"\
  1.0\" encoding=\"utf-8\"?>\n<!-- This file is /res/layout/main.xml -->\n<LinearLayout\n\
  \    android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\n\
  \    android:layout_height=\"fill_parent\" >\n\n<ToggleButton android:id=\"@+id/bindBtn\"\
  \n    android:layout_width=\"wrap_content\"\n    android:layout_height=\"wrap_content\"\
  \n    android:textOff=\"绑定\"  android:textOn=\"解绑\"\n    android:onClick=\"doClick\"\
  \ />\n\n<Button android:id=\"@+id/callBtn\"\n    android:layout_width=\"wrap_content\"\
  \n    android:layout_height=\"wrap_content\"\n    android:text=\"调用服务\" android:enabled=\"\
  false\"\n    android:onClick=\"doClick\" />\n</LinearLayout>\n```\n\n**代码清单 11–35.**\
  \ *使用 Parcelable 调用服务*\n\n```java\npackage com.dave;\n// This file is MainActivity.java\n\
  import android.app.Activity;\nimport android.content.ComponentName;\nimport android.content.Context;\n\
  import android.content.Intent;\nimport android.content.ServiceConnection;\nimport\
  \ android.os.Bundle;\nimport android.os.IBinder;\nimport android.os.RemoteException;\n\
  import android.util.Log;\nimport android.view.View;\nimport android.widget.Button;\n\
  import android.widget.Toast;\nimport android.widget.ToggleButton;\n\nimport com.androidbook.services.stock2.IStockQuoteService;\n\
  import com.androidbook.services.stock2.Person;\n\npublic class MainActivity extends\
  \ Activity {\n\n    protected static final String TAG = \"StockQuoteClient2\";\n\
  \    private IStockQuoteService stockService = null;\n    private ToggleButton bindBtn;\n\
  \    private Button callBtn;\n\n    /** 当活动首次被创建时调用。 */\n    @Override\n    public\
  \ void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n\n        bindBtn = (ToggleButton)findViewById(R.id.bindBtn);\n\
  \        callBtn = (Button)findViewById(R.id.callBtn);\n    }\n\n    public void\
  \ doClick(View view) {\n        switch(view.getId()) {\n        case R.id.bindBtn:\n\
  \            if(((ToggleButton) view).isChecked()) {\n                bindService(new\
  \ Intent(\n                    IStockQuoteService.class.getName()),\n          \
  \          serConn, Context.BIND_AUTO_CREATE);\n            }\n            else\
  \ {\n                unbindService(serConn);\n                callBtn.setEnabled(false);\n\
  \            }\n            break;\n        case R.id.callBtn:\n            callService();\n\
  \            break;\n        }\n    }\n\n    private void callService() {\n    \
  \    try {\n            Person person = new Person();\n            person.setAge(47);\n\
  \            person.setName(\"Dave\");\n            String response = stockService.getQuote(\"\
  ANDROID\", person);\n            Toast.makeText(MainActivity.this,\n           \
  \             \"来自服务端的结果是：\"+response,\n                        Toast.LENGTH_SHORT).show();\n\
  \        } catch (RemoteException ee) {\n            Log.e(\"MainActivity\", ee.getMessage(),\
  \ ee);\n        }\n    }\n\n    private ServiceConnection serConn = new ServiceConnection()\
  \ {\n\n        @Override\n        public void onServiceConnected(ComponentName name,\n\
  \            IBinder service)\n        {\n            Log.v(TAG, \"onServiceConnected()\
  \ 被调用\");\n            stockService = IStockQuoteService.Stub.asInterface(service);\n\
  \            bindBtn.setChecked(true);\n            callBtn.setEnabled(true);\n\
  \        }\n\n        @Override\n        public void onServiceDisconnected(ComponentName\
  \ name) {\n            Log.v(TAG, \"onServiceDisconnected() 被调用\");\n          \
  \  bindBtn.setChecked(false);\n            callBtn.setEnabled(false);\n        \
  \    stockService = null;\n        }\n    };\n\n    protected void onDestroy() {\n\
  \        if(callBtn.isEnabled())\n            unbindService(serConn);\n        super.onDestroy();\n\
  \    }\n}\n```\n\n现在已经可以运行了。请记住，在将客户端发送到模拟器运行之前，需要先将服务发送到模拟器。用户界面应如图 11-8 所示。\n\n\
  ![images](img/1108.jpg)\n\n**图 11–8.** *StockQuoteClient2 的用户界面*\n\n让我们看看我们实现了什么。和之前一样，我们先绑定到服务，然后就可以调用服务方法。`onServiceConnected()`\
  \ 方法会通知我们服务正在运行，因此我们可以启用“调用服务”按钮，从而让该按钮能够调用 `callService()` 方法。如图所示，我们创建了一个新的 `Person`\
  \ 对象，并设置其 `Age` 和 `Name` 属性。接着执行服务调用并显示结果。结果如图 11-9 所示。\n\n![images](img/1109.jpg)\n\
  \n**图 11–9.** *使用 Parcelable 调用服务的结果*\n\n\n\n请注意，当服务被调用时，你会在状态栏中收到一条通知。这来自服务本身。我们之前简要提到过通知是服务与用户沟通的一种方式。通常情况下，服务在后台运行，不会显示任何用户界面。但如果服务需要与用户交互呢？虽然你可能很想让服务直接启动一个活动（Activity），但服务*绝不应*直接调用活动。服务应创建一条通知，而用户应通过这条通知进入所需的活动。这在上一节的练习中已有演示。我们为服务定义了一个简单的布局和活动实现。当我们在服务内部创建通知时，我们在通知中设置了该活动。用户点击通知后，便会跳转到属于该服务的活动，从而允许用户与服务进行交互。\n\
  \n通知会被保存下来，你可以通过下拉 Android 主屏幕上的菜单并点击“通知”来查看它们。用户也可以从状态栏的通知图标向下拖动来查看通知。请注意，我们使用了\
  \ `setLatestEventInfo()` 方法调用，并且每条消息都重复使用了相同的 ID。这种组合意味着我们每次都会更新同一个通知，而不是创建新的通知条目。因此，如果你在多次点击“绑定”、“再次调用”和“解除绑定”后进入\
  \ Android 的“通知”屏幕，你会发现通知中只显示一条消息，且是 `BackgroundService` 最后一次发送的那条。如果我们使用不同的 ID，就可以有多条通知消息，并可以分别更新每条通知。此外，通知还可以设置额外的用户“提示”，例如声音、灯光和/或振动。\n\
  \n了解服务项目及其调用客户端的产物也很有帮助（参见图 11-10）。\n\n![images](img/1110.jpg)\n\n**图 11-10.** *服务与客户端的产物*\n\
  \n图 11-10 展示了服务（左侧）和客户端（右侧）的 Eclipse 项目产物。请注意，客户端与服务之间的契约由 AIDL 产物以及双方之间交换的 `Parcelable`\
  \ 对象构成。这就是为什么我们在两边都看到了 `Person.java`、`IStockQuoteService.aidl` 和 `Person.aidl` 的原因。因为\
  \ AIDL 编译器会根据 AIDL 产物生成 Java 接口、桩（Stub）、代理（Proxy）等，所以当我们将契约产物复制到客户端项目时，构建过程会在客户端侧生成\
  \ `IStockQuoteService.java` 文件。\n\n现在，你已经了解了如何在服务与客户端之间交换复杂类型。让我们简要谈谈调用服务的另一个重要方面：同步服务调用与异步服务调用。\n\
  \n你对服务进行的所有调用都是同步的。这自然会引出一个问题：你是否需要在工作线程中实现所有的服务调用？不一定。在大多数其他平台上，客户端通常会将服务视为一个完全的黑盒，因此在调用服务时必须采取适当的预防措施。但在\
  \ Android 中，你很可能知道服务内部的内容（通常因为你亲自编写了该服务），因此你可以做出明智的决定。如果你知道正在调用的方法会执行大量繁重任务，则应考虑使用辅助线程来进行调用。如果你确定该方法没有任何瓶颈，则可以在\
  \ UI 线程上安全地调用它。如果你认为最好在工作线程中进行服务调用，可以先创建线程，再调用服务，然后将结果传递回 UI 线程。\n\n### 使用服务的实际案例\n\
  \n在本章中，我们展示了调用 HTTP 服务以及实现 Android 服务的多种方法。在本节中，我们将展示如何使用 Android 服务和 Google 翻译\
  \ API（一种基于 HTTP 的互联网服务）将文本从一种语言翻译成另一种语言——但首先，我们来了解一下 Google 翻译 API 的背景信息。\n\n\n\n\
  #### Google 翻译 API\n\n将一种语言翻译成另一种语言并非易事，尤其在移动设备上更是如此。仅英语单词的数量就有数十万，甚至可能超过百万（具体取决于如何定义“英语”）。将语言数据和规则加载到移动设备上，以实现任意语言对之间的翻译，目前还不可行。\n\
  \nGoogle 在互联网上提供了一个用于翻译的 API。它接收一个文本字符串和一对语言参数（分别指定源语言和目标语言），然后将文本从源语言转换为目标语言。但有一个限制：该服务的原始设计目的是供网站调用，而非移动设备。Google\
  \ AJAX 语言 API（其正式名称）的使用条款并未像 Google 地图 API 的使用条款那样，为 Android 设备提供单独的版本。要阅读 AJAX\
  \ 语言 API 的使用条款，请访问以下链接：\n\n`http://code.google.com/apis/ajaxlanguage/terms.html`\n\
  \n虽然 Google 是否明确希望 Android 开发者使用此 API 尚不完全清楚，但事实上，在 2009 年 5 月的 Google I/O 大会上，就已经有\
  \ Android 应用程序演示了该 API！或许当你读到本文时，Google 已经为 AJAX 语言 API 制定了适用于 Android 的单独使用条款，或者现有条款已经更新，以更明确地说明\
  \ Google 打算如何将其用于 Android。此外，Google Labs 中还有该翻译 API 的第 2 版本，请关注其进展。在此期间，你有几种选择：一是可以直接从你的\
  \ Android 应用程序中继续使用 AJAX 语言 API，我们接下来将向你展示如何操作；二是通过你自己控制的网络服务器（作为 AJAX 语言 API 的代理）来访问该\
  \ API。你的应用程序将与你的网络服务器交互，再由网络服务器向 AJAX 语言 API 发起调用。由于你的网络服务器位于中间层，你可以控制两者之间的关键节点，因此禁用应用程序对\
  \ AJAX 语言 API 的访问会变得容易得多。当然，如果你无法再使用 Google 的服务，你能做的也很有限，无法保证应用程序继续正常运行。至少，你可以在应用程序中内置某种响应机制，向用户提示\
  \ Google 服务已不可用，从而显示合适的消息。对于前一种情况，如果 Google 要求你停止使用 AJAX 语言 API，你基本上无能为力；你的应用程序已经分发到设备上，除非你已内置了禁用\
  \ API 的方法，否则这些设备将继续尝试使用该 API。\n\nGoogle 有权禁用你的访问，但这对其而言可能有些困难。Google 在使用条款中并未说明你需要使用\
  \ API 密钥才能调用 AJAX 语言 API，尽管开发者文档（[`http://code.google.com/apis/ajaxlanguage/documentation/`](http://code.google.com/apis/ajaxlanguage/documentation/)）指出你*必须*使用一个\
  \ `REFERER`（引用来源），并且*应该*使用一个 API 密钥。如果没有这些信息，你的请求将以匿名方式从用户设备发出，当你的 API 使用出现问题时，Google\
  \ 也无法联系到你。我们在示例中将 `REFERER` 标头设置为特定值（参见 `Translator.java` 代码），但跳过了 API 密钥部分。如果你想向\
  \ AJAX 语言 API 发送 API 密钥值，首先需要从 Google 获取一个密钥。请注意，你不应将地图 API 的密钥复用于 AJAX 语言 API。要注册\
  \ AJAX API 密钥，你只需提交你网站的 URL（与你在 `REFERER` 中使用的完全相同）并同意使用条款即可。拿到新的 API 密钥后，你可以通过以下代码片段将其添加到\
  \ AJAX API 的 URL 中：\n\n`&key=Your_API_key_goes_here_with_no_quotation_marks`\n\n\
  如果你决定向 AJAX API 传递 API 密钥，则 `REFERER` 必须设置为创建 API 密钥时所用的相同 URL，或者该 URL 下的某个子页面。否则，你将无法获取返回结果。\n\
  \n\n\n#### 使用 Google 翻译 API\n\n在本节的剩余部分，我们将帮助您构建一个直接调用 Google AJAX Language API\
  \ 的应用程序。在本书的前面部分，我们已经向您展示了将翻译功能集成到应用程序中所需的所有独立组件。现在，我们将把它们整合到一起。在这个示例中，我们将创建一个应用程序，它包含一个用于输入的\
  \ `EditText`，使用下拉列表（Spinner）选择翻译的源语言和目标语言，一个用于显示翻译结果的只读 `EditText`，通过互联网调用服务，并使用一个服务来将\
  \ UI 与可能耗时较长的业务逻辑隔离开。我们需要在这个应用程序中包含的一个额外组件是 Jakarta Commons Lang 项目，专门用于将 XML 实体编码转码为\
  \ Unicode 以便显示。我们将在代码清单之后介绍如何实现这一点。请参考图 11-11 查看其外观。\n\n![images](img/1111.jpg)\n\
