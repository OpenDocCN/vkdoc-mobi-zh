  \n### 组件与进程生命周期\n\n如果你仔细看过 `TestHandlersDriverActivity` 测试活动（参见清单 13–9），你会发现我们包含了活动生命周期方法。我们这样做是为了向你展示当活动被隐藏和显示时会发生什么。主队列中待处理的消息会发生什么？正在执行的工作线程又会怎样？\n\
  \n我们将通过考虑每个 Android 组件的生命周期来解释会发生什么。\n\n虽然我们在此讨论组件生命周期，但请注意这并非对这些生命周期的全面讨论。活动生命周期已在第\
  \ 2 章借助图表进行了描述。同样，服务生命周期在第 11 章中也有详细阐述。此处的讨论仅限于影响消息处理和工作线程的那些方面。\n\n#### 活动生命周期\n\
  \n我们将从 `Activity` 组件开始。图 13–3 展示了活动在其可见性和生命周期方面的状态（活动在其生命周期方法之间的状态转换在第 2 章中描述）。\n\
  \n![images](img/1303.jpg)\n\n**图 13–3.** *活动生命周期*\n\n一旦活动启动（由于被启动），它会处于完全可见、部分可见或完全隐藏的状态。你可以通过回调方法检测每个边界。\n\
  \n当活动进入部分可见状态时，它会调用 `onPause`。当它进入完全隐藏状态时，可能会调用 `onStop` 方法。最后，当进程被移除时，会调用其 `onDestroy`\
  \ 方法。当 `onDestroy` 方法被调用后，视图状态会立即被销毁。在此之前，视图状态仍然保持完整。\n\n当活动进入完全可见状态时，会调用 `onResume`。当它离开不可见状态时，首先调用\
  \ `onStart`，然后调用 `onResume`（如果活动再次被隐藏，也可能会调用 `onStop`）。在 `onResume` 和 `onPause`\
  \ 之间，活动处于完全可见状态。\n\n尽管应用可能部分或完全不可见，但消息队列仍将保持活动状态，工作线程也是如此。你可以通过监控清单 13–9 中显示的活动生命周期方法来观察这一点。你可以看到，当\
  \ `onPause` 和 `onStop` 被调用时，来自工作线程和处理器的消息仍然处于活动状态。\n\n你可以通过在此活动上点击主页按钮来测试这一假设。这样做会将此活动发送到后台，并调用\
  \ `onPause`、`onStop`，甚至可能调用 `onDestroy`。你会看到消息一直持续到 `onDestroy` 被调用（假设你发送了足够多的消息）。\n\
  \n如果请求某个活动时其进程未处于活动状态，则该进程将被启动并激活。在低内存条件下，或者当应用完全隐藏且该进程中没有其他活动时，Android 会移除该进程。\n\
  \n**注意：** 关键在于，如果一个活动因这些需求而停止，它不会自动恢复运行。用户必须通过点击该活动或其他间接方式（例如启动另一个会导致调用此活动的活动）来显式调用它。唯一自动停止并重新启动活动的情况是设备配置发生改变（例如从竖屏切换到横屏）。可想而知，当手机在竖直和水平方向之间移动时，这种情况可能会频繁发生。\n\
  \n\n\n\n#### 服务生命周期\n\n服务组件与活动组件在一个主要方面存在不同——服务组件从根本上讲是**粘性的**。Android 会尽一切努力保持服务运行。即使因内存原因回收了服务进程，若存在待处理消息，系统也会重新启动该服务。我们将在下一章讨论广播接收器和长时间运行服务时，深入探讨这种交互的更多细节。\n\
  \n然而，服务组件和活动组件的共通之处在于，它们都可能在内存不足的情况下被终止。Android 会尽力保持服务运行，但即便如此，也无法保证其一定能执行完毕。\n\
  \n**注意：** 服务和活动在编码时应确保：当有工作线程运行并为其执行任务时，它们能够通过 `onDestroy` 被优雅地停止。\n\n#### 接收器生命周期\n\
  \n广播接收器采用“即用即走”模式。承载广播接收器的进程仅在接收器生命周期内存在，不会持续更久。此外，广播接收器在主线程上运行，并且有严格的 10 秒时限来完成其工作。你需遵循相当迂回的协议，才能在广播接收器中完成更复杂和耗时的工作。这确实是下一章的主题。但简而言之，如果你有一个广播接收器需要超过\
  \ 10 秒才能完成工作，你需要遵循如下协议：\n\n1.  在接收器代码中获取一个唤醒锁（务必及时操作），以确保设备至少保持部分唤醒状态。\n2.  发起一个\
  \ `startService()` 调用，使进程被标记为粘性且可重启（如果需要），并保持存活。\n3.  请注意，你不能直接在服务中执行工作，因为这会超过 10\
  \ 秒并阻塞主线程。这是因为服务也在主线程上运行。\n4.  从服务中启动一个工作线程。\n5.  让工作线程通过处理器向服务发送消息，或在服务上发起 `stopService()`\
  \ 调用。\n\n正如承诺，我们将在下一章更详细地介绍这个协议。事实上，该解决方案很大程度上依赖于处理器。你还会看到大量示例代码，以便将这些概念具体化。\n\n\
  #### 提供器生命周期\n\n内容提供器则是另一回事。内部和外部客户端都与内容提供器进行同步交互。对于外部客户端，内容提供器使用线程池来满足这一要求。与广播接收器类似，内容提供器没有特定的生命周期。它们会在需要时启动，并随着进程的持续而存在。尽管对于外部客户端来说是同步的，但它们不会在主线程上运行，而是在其所在进程的线程池上运行，这类似于\
  \ Web 客户端和 Web 服务器。客户端线程将等待直到调用返回。当没有客户端存在时，进程会根据进程的回收规则被回收，具体取决于该进程中还定义了哪些其他组件以及这些组件是否处于活动状态。\n\
  \n### 编译代码的说明\n\n本章项目主要包含八个文件。我们强烈建议你使用“参考资料”部分提供的 URL 下载 ZIP 文件，不过你也可以使用本章的代码清单进行编译。\n\
