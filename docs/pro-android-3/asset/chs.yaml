  \ 文件，当您复制清单代码时，请先将包名放在文件顶部。然后使用 `Ctrl+Shift+O` 来填充导入语句。\n\n请注意，在此过程中，您可能需要调整代码以使其能够编译，并补齐任何缺失的部分。您可以参考\
  \ ZIP 文件来填补这些空白。\n\n### 本章小结\n\n本章涵盖了重要的内容：广播接收器、通知、唤醒锁和长时间运行的服务。本章还汇集了您在第 12 章和第\
  \ 13 章中学到的精髓。\n\n我们展示了广播接收器的基本用法和生命周期，以及它们如何在同一个进程内和外部工作。我们展示了如何利用服务来延长广播接收器的生命周期。最后，我们对\
