  \    2.  选择“select root directory”。\n    3.  选择“copy projects into work space”。\n\
  \    4.  项目就位后，您可能需要通过选择“project properties/android”并选择正确的构建目标来选择合适的 API 级别。\n\n\
  构建好项目后，将这两个项目都部署到模拟器中。独立项目是一个无界面项目，仅包含接收器和服务。TestBCR 项目有一个简单的 Activity，它会触发一个单一的广播\
  \ Intent，该 Intent 由 TestBCR 项目内部的接收器以及来自独立 BCR 项目的接收器响应。\n\n#### 从清单列表创建项目\n\n以下是每个项目所需的文件列表，以及如何从本章的清单列表创建这些项目。\n\
  \n##### TestBCR 项目文件\n\n以下是 TestBCR 项目应包含的文件：\n\n*   `TestBCRActivity.java` (清单\
  \ 14–5)\n*   `TestReceiver.java` (清单 14–2)\n*   `TestReceiver2.java` (清单 14–9)\n\
  *   `TestTimeDelayReceiver.java` (清单 14–11)\n*   `Utils.java` (清单 14–3)\n*   `/res/layout/main.xml`\
  \ (清单 14–6)\n*   `/res/menu/main_menu.xml` (清单 14–7)\n*   `manifest.xml` (清单 14–8)\n\
  \n如果您还需要其他文件，可能需要查看 ZIP 文件中的项目，或自行补充。这些通常是简单的文件，比如默认图标或字符串值。准备好接收器后，您还需要在清单 14–8\
  \ 所示的清单文件中注册它们。\n\n您可以通过以下方法，使用上述文件列表构建此项目：\n\n1.  通过选择 `File` ![images](img/U001.jpg)\
  \ `new project` ![images](img/U001.jpg) `Android` ![images](img/U001.jpg) `Android\
  \ Project` 来创建一个新项目。\n2.  选择一个名称，并选择“create new project in workspace”。\n3.  提供一个应用程序名称，例如\
  \ TestBCR。应用程序名称实际上并不重要，包名才是关键。\n4.  选择一个 API 级别。\n5.  使用包名 `com.androidbook.bcr.`。\n\
  6.  选择任意 minsdk 版本，例如 3。\n7.  将您的 Activity 选择为 `TestBCRActivity`，然后点击“完成”。\n8. \
  \ Android 将创建一些资源文件，并且可能（取决于您的版本）会创建一个源文件。\n9.  根据清单 14–2 到 14–11 创建、更新或删除这些文件。\n\
  10. 对于 Java 文件，当您从此处复制清单代码时，请先将包名放在文件顶部。然后使用 `Ctrl+Shift+O` 来填充导入语句。\n\n请注意，在此过程中，您可能需要调整代码以使其能够编译，并补齐任何缺失的部分。您可以参考\
  \ ZIP 文件来填补这些空白。\n\n##### 独立 BCR 项目文件\n\n以下是独立项目的文件：\n\n*   `ALongRunningNonStickyBroadcastService.java`\
  \ (清单 14–25)\n*   `ALongRunningReceiver.java` (清单 14–21)\n*   `LightedGreenRoom.java`\
  \ (清单 14–24)\n*   `NotificationReceiver.java` (清单 14–15)\n*   `StandaloneReceiver.java`\
  \ (清单 14–13)\n*   `Test60SecBCR.java` (清单 14–22)\n*   `Test60SecBCRService.java`\
