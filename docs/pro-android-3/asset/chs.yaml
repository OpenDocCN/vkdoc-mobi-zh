  \ Google 账户时的账户设置。在这种情况下，账户设置仅涉及登录账户，如 图 27–6 所示。\n\n![images](img/2706.jpg)\n\n\
  **图 27–6.** *登录现有的 Google 账户*\n\n现在我们已经演示了账户的基本概念以及它如何出现在设备上，下一节将介绍账户如何与联系人相关联。\n\
  \n#### 账户与联系人的关联\n\n你管理的联系人绑定到特定的账户。换句话说，你在设备上注册的每个账户都可以保存特定于该账户的若干联系人。一个账户拥有其自己的联系人集合——或者说，一个账户是联系人的父级。此外，一个账户可以有零个或多个联系人。\n\
  \n一个账户由两个字符串标识：账户名称和账户类型。对于 Google 来说，你的账户名称是你的 Gmail 电子邮件用户名，你的账户类型是 `com.google`。显然，账户类型在设备上必须是唯一的。你的账户名称在该账户类型内是唯一的。账户类型和账户名称共同构成一个账户，并且只有在账户形成后，才能使用它来插入联系人集合。\n\
  \n#### 枚举账户\n\n联系人 API 主要处理存在于各种账户中的联系人。创建账户的机制不在联系人 API 的范围内，因此解释如何编写自己的账户提供商以及如何同步这些账户中的联系人超出了本章的范围。对于本章来说，账户是如何设置的并不是很重要。然而，当你想要添加一个联系人或联系人列表时，你确实需要知道设备上存在哪些账户。你可以使用列表\
  \ 27–1 中的代码来枚举账户及其必要的属性（账户名称和类型）。列表 27–1 中的代码在给定上下文变量时列出了账户名称和类型。\n\n**列表 27–1.**\
  \ *显示账户列表的代码*\n\n```\npublic void listAccounts(Context ctx)\n{\n    AccountManager\
  \ am = AccountManager.get(ctx);\n    Account[] accounts = am.getAccounts();\n  \
  \  for(Account ac: accounts)\n    {\n        String acname=ac.name;\n        String\
  \ actype = ac.type;\n        Log.d(\"accountInfo\", acname + \":\" + actype);\n\
  \    }\n}\n```\n\n当然，要运行列表 27–1 中的代码，清单文件需要使用列表 27–2 中的行请求权限。\n\n**列表 27–2.** *读取账户的权限*\n\
  \n```\n<uses-permission android:name=\"android.permission.GET_ACCOUNTS\"/>\n```\n\
  \n来自列表 27–1 的代码将打印如下内容：\n\n* * *\n\n`Your-email-at-gmail:com.google`\n\n* * *\n\n\
  这假设你只配置了一个账户（Google）。如果你有多个账户，所有这些账户都将以类似的方式列出。\n\n在深入探讨联系人详细信息之前，让我们考虑一下最终用户如何使用\
  \ Android 平台自带的联系人应用程序来创建联系人。\n\n### 理解联系人应用程序\n\n如果你的设备制造商（如摩托罗拉）或运营商（如 Verizon）没有提供自己的联系人应用程序，Android\
  \ 平台自带一个默认的联系人应用程序。你可以轻松地在设备上的应用程序列表中找到此应用程序，并查看其在 *Android 用户指南* 中的文档。\n\n####\
  \ 显示联系人\n\n当你选择联系人应用程序时，看到的第一个屏幕是联系人列表（参见图 27–7）。一个联系人本质上是你认识的、存在于某个账户（如你的 Gmail\
  \ 账户）上下文中的一个人。如果你有多个账户，图 27–7 中的屏幕将列出所有账户中的所有联系人。通过查看此屏幕，你将不知道哪个联系人来自哪个账户。除非明确禁止，Android\
  \ 会尽量不重复两个不同账户之间看起来相似的联系人。我们将在下一主要部分介绍这种“看起来相似”的启发式方法。\n\n![images](img/2707.jpg)\n\
  \n**图 27–7.** *显示聚合的联系人*\n\n图 27–7 假设你有几个可用的联系人，并且列出的联系人按字母顺序分组。\n\n\n#### 显示联系人详情\n\
  \n如果您单击图 27–7 中的某个联系人，联系人应用将显示该联系人的详细信息，如图 27–8 所示。\n\n![images](img/2708.jpg)\n\
