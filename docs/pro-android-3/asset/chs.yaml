  ## 前言\n\n你是否曾梦想成为罗丹那样的雕塑家？手持凿子，将一块岩石雕琢成心中所想？然而，主流程序员们一直对功能受限的移动设备敬而远之，担心无法打磨出一款可用的应用程序。不过，那个时代已经过去了。\n\
  \n`Android` 操作系统将可编程设备的强大能力送到了你的家门口。在这本书中，我们想积极印证你的猜测：`Android` 是一款非常适合编程的操作系统。如果你是一名\
  \ Java 程序员，你将拥有绝佳的机会，从这个令人兴奋、功能强大的通用计算平台中获益。我们对 `Android` 充满热情，因为它是一个先进的平台，在框架设计中引入了许多新的范式（即便在移动平台的限制下也是如此）。\n\
  \n这是我们关于 `Android` 主题的第三版，也是目前最好的一版。*Pro Android 3* 是一本全面的编程指南。在这个版本中，我们在 *Pro Android\
  \ 2* 的基础上进行了优化、重写和增强，为初学者和专业人士创建了一本全面更新的指南——这是我们三年研究的成果。全书涵盖 31 章，涉及 100 多个主题。本版涵盖了\
  \ `Android` 的 2.3 和 3.0 版本，分别是针对手机和平板优化的 `Android` 版本。\n\n在本版中，我们通过深入讲解线程、进程、长时间运行的服务、广播接收器和闹钟管理器，增强了\
  \ `Android` 的内部机制。本版还介绍了更多 UI 控件。我们专门用了 150 多页的篇幅来讲解 3.0 的内容，涵盖了片段、片段对话框、`ActionBar`\
  \ 以及拖放功能。我们显著增强了服务和传感器章节的内容。`OpenGL` 部分也经过了修订，以包含 `OpenGL ES 2.0`。\n\n概念、代码和教程是本书的精髓。书中的每一章都体现了这一理念。每章中独立的教程都附有专家建议的注解。本书中的所有项目均可下载，以便轻松导入到\
  \ `Eclipse` 中。我们付出了很多努力，确保代码也能直接从书中编译。每个项目所包含的文件都已明确列出，并在每章中列出，方便查阅。\n\n本书涵盖的关键概念包括资源、意图、内容提供者、进程、线程、UI\
  \ 控件、广播接收器、服务以及长时间运行的服务。我们为 `OpenGL` 初学者提供了大量关于 `OpenGL ES 1.0` 和 `2.0` 的内容。我们还大量涉及了文本转语音、传感器和多点触控。同时，也融入了大量关于\
  \ 3.0 主题的内容，包括片段、片段对话框、`ActionBar` 和拖放功能。\n\n最后，在本书中，我们超越了基础知识，针对每个主题提出了难题，并记录了结果（有关本书内容的详细列表，请参见目录）。我们还在积极地更新补充网站（[www.androidbook.com](http://www.androidbook.com)），以提供关于\
  \ `Android SDK` 的当前和未来研究资料。在阅读本书的过程中，如果您有任何问题，只需发送邮件，我们便会快速回复。\n\n## 第 1 章\n\n##\
  \ Android 计算平台简介\n\n计算正变得越来越个性化和易获取。手持设备已基本转变为计算平台。手机不再仅仅用于通话——它们已具备传输数据和视频的能力已有相当一段时间。无论是手机还是平板，移动设备现在已具备如此强大的通用计算能力，以至于越来越像一台个人电脑。许多传统的\
  \ PC 制造商，如 `ASUS`、`HP` 和 `Dell`，都在生产基于 `Android` 操作系统的各种形态的设备。操作系统、计算平台、编程语言和开发框架之间的竞争正在向移动设备转移并重新上演。\n\
  \n随着越来越多的 IT 应用开始提供移动版本，我们也看到了移动编程的浪潮。在本书中，我们将向您展示如何利用您的 Java 技能，为运行在 Google 的 Android\
  \ 平台（[`http://developer.android.com/index.html`](http://developer.android.com/index.html)）上的设备编写程序。这是一个面向移动和平板开发的开源平台。\n\
  \n**注意：** 我们对 `Android` 充满热情，因为它是一个先进的平台，在框架设计中引入了许多新的范式（即便在移动平台的限制下也是如此）。\n\n在本章中，我们将概述\
  \ `Android` 及其 SDK，简要介绍关键包，简要说明每章将要涵盖的内容，向您展示如何利用 `Android` 源代码，并重点强调为 `Android`\
  \ 平台编程的好处。\n\n### 个人计算机的新平台\n\n像手机这样的专用设备如今能够跻身通用计算平台之列，这对程序员来说是个好消息（参见 图 1–1）。从\
  \ `Android 3.0` 开始，我们可以正式将平板电脑加入此列。这一趋势使得使用通用编程语言为移动设备编程成为可能，从而增加了移动应用程序的广度和市场份额。\n\
  \n![images](img/0101.jpg)\n\n**图 1–1.** *手持设备是新一代 PC。*\n\n`Android` 平台拥抱了这种手持设备通用计算的理念。它是一个全面的平台，拥有一个基于\
  \ Linux 的操作系统栈，用于管理设备、内存和进程。`Android` 的 Java 库涵盖了电话、视频、语音、图形、连接、UI 编程以及设备的许多其他方面。\n\
  \n**注意：** 尽管 `Android` 平台是为移动和平板设备构建的，但它展现了一个功能完备的桌面框架的特性。Google 通过一个称为 `Android\
  \ SDK` 的软件开发工具包 (SDK) 将其提供给 Java 程序员。当你使用 `Android SDK` 时，你几乎不会觉得是在为移动设备编写代码，因为你可以访问在桌面或服务器上使用的大部分类库——包括一个关系型数据库。\n\
  \n`Android SDK` 支持大部分 Java 标准版 (Java SE)，除了抽象窗口工具包 (AWT) 和 Swing。为了替代 AWT 和 Swing，`Android\
  \ SDK` 拥有自己*广泛的现代化 UI 框架*。由于你使用 Java 编写应用程序，可以预期你需要一个 Java 虚拟机 (JVM) 来负责解释运行时的 Java\
  \ 字节码。JVM 通常提供必要的优化，以帮助 Java 达到与 C 和 C++ 等编译语言相媲美的性能水平。Android 提供了其特有的优化 JVM 来运行编译后的\
  \ Java 类文件，以应对手持设备的限制，例如内存、处理器速度和功耗。这个虚拟机被称为 `Dalvik VM`，我们将在稍后的“深入探讨 Dalvik VM”一节中进行探究。\n\
  \n**注意：** Java 编程语言的熟悉性和简洁性，加上 `Android` 广泛的类库，使得 `Android` 成为一个极具吸引力的编程平台。\n\n\
  图 1–2 展示了 `Android` 软件栈的概览。（我们将在“理解 Android 软件栈”一节中提供更多细节。）\n\n![images](img/0102.jpg)\n\
  \n**图 1–2.** *Android 软件栈的高层视图*\n\n\n\n### Android 早期历史\n\n手机使用多种操作系统，例如 `Symbian\
  \ OS`、微软的 `Windows Mobile`、`Mobile Linux`、`iPhone OS`（基于 `Mac OS X`）、`Moblin`（来自英特尔）以及许多其他专有操作系统。到目前为止，还没有哪个操作系统成为事实上的标准。可用于开发移动应用的\
  \ API 和环境限制太多，与桌面框架相比似乎显得落后。相比之下，Android 平台承诺开放、实惠、开源，更重要的是，它提供了一个高端、一体化、一致的开发框架。\n\
  \n谷歌于 2005 年收购了初创公司 `Android Inc.`，开始开发 Android 平台（参见图 1–3）。`Android Inc.` 的关键人物包括安迪·鲁宾、里奇·迈纳、尼克·西尔斯和克里斯·怀特。\n\
  \n![images](img/0103.jpg)\n\n**图 1–3.** *Android 早期时间线*\n\n2007 年底，一群行业领导者围绕 Android\
  \ 平台联合成立了开放手机联盟（[`www.openhandsetalliance.com`](http://www.openhandsetalliance.com)）。截至\
  \ 2009 年，该联盟的一些著名成员如下：\n\n- Sprint Nextel\n- T-Mobile\n- 摩托罗拉\n- 三星\n- 索尼爱立信\n-\
  \ 东芝\n- 沃达丰\n- 谷歌\n- 英特尔\n- 德州仪器\n\n截至 2011 年，该列表已增长了数倍（数量超过 80），您可以在开放手机联盟网站上看到。\n\
  \n根据该网站的说法，联盟的部分目标是快速创新并更好地响应消费者在移动领域的需求，其首个关键成果就是 Android 平台。Android 旨在满足移动运营商、手机制造商和应用程序开发者的需求。成员们已承诺通过开源\
  \ Apache 许可证 2.0 版发布重要的知识产权。\n\nAndroid SDK 于 2007 年 11 月首次作为“早期预览”版本发布。2008 年 9\
  \ 月，T-Mobile 宣布推出 `T-Mobile G1`，这是第一款基于 Android 平台的智能手机。几天后，谷歌宣布推出 Android SDK Release\
  \ Candidate 1.0。2008 年 10 月，谷歌根据 Apache 的开源许可证发布了 Android 平台的源代码。2010 年底，谷歌为智能手机发布了代号为\
  \ `Gingerbread` 的 Android SDK 2.3，该版本于 2011 年 3 月升级至 2.3.3。2011 年初，发布了针对平板电脑优化的\
  \ Android 版本，即代号为 `Honeycomb` 的 Android 3.0。`Motorola XOOM` 是首批搭载此操作系统的平板电脑之一。\n\
  \nAndroid 发布时，其关键架构目标之一是允许应用程序相互交互并重用彼此的组件。这种重用不仅适用于服务，也适用于数据和用户界面。因此，Android 平台拥有许多架构特性来保证这种开放性得以实现。\n\
  \nAndroid 凭借其完备的开发特性，利用 Web 资源提供的云计算模型，并通过手机本地的数据存储来增强这种体验，从而吸引了早期的追随者并保持了开发者的热情。Android\
  \ 在手机上支持关系型数据库这一特性，也对其早期采用起到了作用。\n\n在 1.0 和 1.1 版本（2008 年）中，Android 不支持软键盘，要求设备配备物理按键。Android\
  \ 于 2009 年 4 月发布了 1.5 SDK 解决了这个问题，同时还带来了许多其他功能，例如高级媒体录制功能、小部件和实时文件夹。\n\n2009 年 9\
  \ 月，Android 操作系统发布了 1.6 版本，随后在一个月内推出了 Android 2.0，促使大量 Android 设备在 2009 年圣诞季涌现。该版本引入了高级搜索功能和文本转语音功能。\n\
  \n凭借对 HTML 5 的支持，Android 2.0 为使用 HTML 带来了有趣的可能性。联系人 API 得到了显著改进。增加了对 Flash 的支持。每天都有越来越多基于\
  \ Android 的应用程序以及新型的独立在线应用商店出现。备受期待的基于 Android 的平板电脑现在也可以购买了。\n\n在 Android 2.3 中，重要功能包括允许管理员远程擦除安全数据、在弱光条件下使用相机和视频、WiFi\
  \ 热点、显著的性能提升、改进的蓝牙功能、可选择将应用程序安装到 SD 卡、`OpenGL ES 2.0` 支持、备份改进、搜索可用性改进、支持信用卡处理的`近场通信`、大幅改进的运动和传感器支持（类似于\
  \ Wii）、视频聊天以及改进的 Market。\n\nAndroid 的最新版本 3.0 专注于基于平板电脑的设备以及更强大的双核处理器，例如 `Nvidia\
  \ Tegra2`。该版本的主要功能包括支持使用更大的屏幕。引入了一个名为 `Fragments` 的非常重要的新概念。这贯穿了 3.0 的整个体验。引入了更多类似桌面的功能，例如\
  \ `ActionBar` 和 `拖放`。主屏幕小部件得到了显著增强。现在可用的 UI 控件更多了。在 3D 领域，`OpenGL` 通过 `Renderscript`\
  \ 得到了增强，进一步补充了 `ES 2.0`。对于平板电脑来说，这是一个令人兴奋的引入。\n\n### 深入 Dalvik 虚拟机\n\n作为 Android\
  \ 的一部分，谷歌花费了大量时间思考如何为低功耗手持设备优化设计。手持设备在内存和速度方面落后其桌面同类产品八到十年。它们的计算能力也有限。因此，对手机的性能要求非常苛刻，这要求手机设计者优化一切。如果你查看\
  \ Android 中的软件包列表，会发现它们功能完备且内容广泛。\n\n这些问题促使谷歌在许多方面重新审视标准的 JVM 实现。谷歌实现此 JVM 的关键人物是丹·伯恩斯坦，他编写了\
  \ Dalvik 虚拟机——Dalvik 是冰岛的一个城镇名称。Dalvik 虚拟机获取生成的 Java 类文件，并将它们合并成一个或多个 Dalvik 可执行文件。它复用了来自多个类文件的重复信息，有效地将空间需求（未压缩）比传统的\
  \ `.jar` 文件减少了一半。\n\n谷歌还微调了 Dalvik 虚拟机中的垃圾回收功能，但在早期版本中选择省略了即时编译器。Android 2.3 增加了\
  \ JIT。有报告称，这可以在某些地方实现 2 到 5 倍的原始性能提升，对于通用应用程序则提升 10% 到 20%。\n\nDalvik 虚拟机使用一种不同的汇编代码生成方式，它使用寄存器作为数据存储的主要单元，而不是栈。谷歌希望这样可以减少\
  \ 30% 的指令。我们应该指出，由于 Dalvik 虚拟机，Android 中的最终可执行代码并非基于 Java 字节码，而是基于 `.dex` 文件。这意味着你无法直接执行\
  \ Java 字节码；你必须从 Java 类文件开始，然后将它们转换为可链接的 `.dex` 文件。\n\n这种对性能的极致追求也延伸到了 Android SDK\
  \ 的其他部分。例如，Android SDK 广泛使用 XML 来定义 UI 布局。然而，所有这些 XML 在设备上驻留之前都会被编译为二进制文件。Android\
  \ 提供了使用这些 XML 数据的特殊机制。\n\n\n\n### 理解 Android 软件栈\n\n到目前为止，我们已经介绍了 Android 的历史及其优化特性，包括\
  \ `Dalvik VM`，并隐晦地提及了可用的 Java 编程栈。在本节中，我们将介绍 Android 的开发方面。图 1-4 是开始讨论这个话题的好起点。\n\
  \n![images](img/0104.jpg)\n\n**图 1-4.** *详细的 Android SDK 软件栈*\n\nAndroid 平台的核心是一个负责设备驱动、资源访问、电源管理和其他操作系统职责的\
  \ Linux 内核。所提供的设备驱动包括：显示屏、摄像头、键盘、WiFi、闪存、音频和 IPC（进程间通信）。尽管核心是 Linux，但 Android 设备（例如摩托罗拉\
  \ Droid）上的大多数（如果不是全部）应用程序都是用 Java 开发的，并通过 `Dalvik VM` 运行。\n\n在内核之上，下一层是许多 C/C++\
  \ 库，例如 `OpenGL`、`WebKit`、`FreeType`、安全套接字层 (`SSL`)、C 运行时库 (`libc`)、`SQLite` 和媒体库。这个基于伯克利软件发行版\
  \ (`BSD`) 的系统 C 库已针对基于 Linux 的嵌入式设备进行了调优（大小约为其原始版本的一半）。媒体库基于 PacketVideo 的 [`OpenCORE`](http://www.packetvideo.com/)。这些库负责音频和视频格式的录制和播放。一个名为\
  \ `Surface Manager` 的库控制对显示系统的访问，并支持 2D 和 3D 图形。随着新版本的发布，很可能会添加更多此类原生库。\n\n`WebKit`\
  \ 库负责浏览器支持；它与支持 Google Chrome 和 Apple Safari 的是同一个库。`FreeType` 库负责字体支持。`SQLite`\
  \ ([`www.sqlite.org/`](http://www.sqlite.org/)) 是一个可在设备本身使用的关系数据库。`SQLite` 也是一个独立的关系数据库开源项目，与\
  \ Android 没有直接关系。您也可以获取并使用为 `SQLite` 设计的工具来处理 Android 数据库。\n\n大多数应用程序框架通过 `Dalvik\
  \ VM`（通往 Android 平台的门户）访问这些核心库。正如我们在前面几节中指出的，`Dalvik` 针对运行多个 VM 实例进行了优化。当 Java 应用程序访问这些核心库时，每个应用都会获得自己的\
  \ VM 实例。\n\nAndroid Java API 的主要库包括：电话、资源、位置、用户界面、内容提供者（数据）和包管理器（安装、安全等）。程序员在此 Java\
  \ API 之上开发最终用户应用程序。设备上最终用户应用程序的一些示例包括：主屏幕、联系人、电话、浏览器等。\n\nAndroid 还支持一个名为 `Skia`\
  \ 的自定义 Google 2D 图形库，它用 C 和 C++ 编写。`Skia` 也是 Google Chrome 浏览器的核心。然而，Android 中的\
  \ 3D API 基于 Khronos 集团 ([`www.khronos.org`](http://www.khronos.org)) 实现的 `OpenGL\
  \ ES`。`OpenGL ES` 包含针对嵌入式系统的 `OpenGL` 子集。\n\n从媒体角度来看，Android 平台支持最常见的音频、视频和图像格式。从无线角度来看，根据硬件的不同，Android\
  \ 拥有支持蓝牙、EDGE、3G、WiFi 和全球移动通信系统（GSM）电话的 API。\n\n### 使用 Android SDK 开发最终用户应用程序\n\n\
  在本节中，我们将向您介绍用于在 Android 上开发最终用户应用程序的高级 Android Java API。我们将简要讨论 Android 模拟器、Android\
  \ 基本组件、UI 编程、服务、多媒体、电话、动画和 `OpenGL`。\n\n#### Android 模拟器\n\nAndroid SDK 附带了一个名为\
  \ Android 开发工具 (`ADT`) 的 Eclipse 插件。您将使用这个集成开发环境 (`IDE`) 工具来开发、调试和测试您的 Java 应用程序。（我们将在第\
  \ 2 章中深入介绍 `ADT`）。您也可以在不使用 `ADT` 的情况下使用 Android SDK；此时您需要使用命令行工具。这两种方法都支持一个模拟器，可用于运行、调试和测试您的应用程序。对于\
  \ 90% 的应用程序开发工作，您甚至不需要真实的设备。功能完备的 Android 模拟器模仿了大多数设备功能。模拟器的局限性包括：USB 连接、摄像头和视频捕获、耳机、电池模拟、蓝牙、WiFi、NFC\
  \ 和 `OpenGL ES 2.0`。\n\nAndroid 模拟器通过一项名为 `QEMU` 的开源“处理器模拟器”技术来工作，该技术由 Fabrice Bellard\
  \ 开发 ([`http://bellard.org/qemu/`](http://bellard.org/qemu/))。这与允许在一台操作系统之上模拟另一个操作系统（无论处理器类型如何）的技术相同。`QEMU`\
  \ 允许在 CPU 级别进行模拟。\n\n对于 Android 模拟器，其处理器基于进阶精简指令集机器 (`ARM`)。`ARM` 是一种基于精简指令集计算机\
  \ (`RISC`) 的 32 位微处理器架构，通过减少指令集中的指令数量来实现设计的简洁性和高速性。模拟器在此模拟处理器上运行 Android 版本的 Linux。\n\
  \n`ARM` 广泛用于手持设备和其他对低功耗要求较高的嵌入式电子产品中。大部分移动市场都使用基于此架构的处理器。\n\n您可以在 Android SDK 文档中找到关于模拟器的更多详细信息，网址为\
  \ [`http://developer.android.com/guide/developing/tools/emulator.html`](http://developer.android.com/guide/developing/tools/emulator.html)。\n\
  \n#### Android UI\n\nAndroid 使用一个类似于其他基于桌面的、功能完备的 UI 框架。实际上，它在本质上更现代化，更具异步性。如果您将以\
  \ C 为基础的传统 Microsoft Windows API 视为第一代，将以 C++ 为基础的 MFC（微软基础类库）视为第二代，那么 Android UI\
  \ 本质上是一个第四代 UI 框架。基于 Java 的 Swing UI 框架将是第三代，它引入了远超 MFC 的设计灵活性。Android UI、JavaFX、Microsoft\
  \ Silverlight 和 Mozilla XML 用户界面语言 (`XUL`) 都属于这种新型的第四代 UI 框架，其 UI 是声明式的且具有独立的主题。\n\
  \n**注意：** 在 Android 中，即使您为其编程的恰好是手持设备，您也使用现代化的用户界面范式进行编程。\n\nAndroid UI 编程涉及在 XML\
  \ 文件中声明界面。然后，您将这些 XML 视图定义作为窗口加载到您的 UI 应用程序中。甚至应用程序中的菜单也是从 XML 文件加载的。Android 中的屏幕或窗口通常被称为\
  \ *活动（activities）*，它包含用户为完成一个逻辑操作单元所需的多个视图。*视图（Views）* 是 Android 的基本 UI 构建块，您可以进一步将它们组合成称为\
  \ *视图组（view groups）* 的复合视图。视图在内部使用画布、绘画和用户交互等熟悉的概念。托管这些包含视图和视图组的复合视图的活动，是 Android\
  \ 中可替换的逻辑 UI 组件。Android 3.0 引入了另一个 UI 概念 *片段（fragments）*，允许开发者将视图和功能分块以在平板电脑上显示。平板电脑提供了足够的屏幕空间来容纳多窗格的活动，而片段则为这些窗格提供了抽象机制。\n\
  \nAndroid 框架的关键概念之一是活动窗口的生命周期管理。Android 制定了相关协议，以便在用户隐藏、恢复、停止和关闭活动窗口时管理其状态。您将在第\
  \ 2 章中体会到这些基本概念，并同时学习如何搭建 Android 开发环境。\n\n\n\n### Android 基础组件\n\nAndroid UI 框架以及\
  \ Android 的其他部分，都依赖于一个名为 *intent* 的新概念。Intent 是窗口消息、动作、发布-订阅模型、进程间通信和应用程序注册表等概念的融合。以下是一个使用\
  \ `Intent` 类调用或启动网络浏览器的示例：\n\n```\npublic static void invokeWebBrowser(Activity\
  \ activity)\n{\n    Intent intent = new Intent(Intent.ACTION_VIEW);\n    intent.setData(Uri.parse(\"\
  http://www.google.com\"));\n    activity.startActivity(intent);\n}\n```\n\n在此示例中，我们通过一个\
  \ intent 请求 Android 启动一个合适的窗口来显示网站内容。根据设备上安装的浏览器列表，Android 将选择合适的浏览器来显示该网站。你将在第\
  \ 5 章中了解更多关于 intent 的内容。\n\nAndroid 对*资源*提供了广泛支持，其中包括字符串和位图等常见元素和文件，以及一些不常见的项目，例如基于\
  \ XML 的视图定义。该框架以一种新颖的方式使用资源，使其使用方便、直观且快捷。以下是一个示例，其中为 XML 文件中定义的资源自动生成了资源 ID：\n\n\
  ```\npublic final class R {\n    public static final class attr { }\n    public\
  \ static final class drawable {\n        public static final int myanimation=0x7f020001;\n\
          public static final int numbers19=0x7f02000e;\n    }\n    public static\
  \ final class id {\n        public static final int textViewId1=0x7f080003;\n    }\n\
      public static final class layout {\n        public static final int frame_animations_layout=0x7f030001;\n\
          public static final int main=0x7f030002;\n    }\n    public static final\
  \ class string {\n        public static final int hello=0x7f070000;\n    }\n}\n\
  ```\n\n此类中每个自动生成的 ID 都对应 XML 文件中的某个元素或整个文件本身。只要你想使用这些 XML 定义，就可以使用这些生成的 ID。这种间接方式在本地化时非常有帮助。（第\
  \ 3 章将更详细地介绍 `R.java` 文件和资源。）\n\nAndroid 中的另一个新概念是*内容提供器*。内容提供器是对数据源的抽象，使其看起来像 RESTful\
  \ 服务的发射器和消费端。底层的 SQLite 数据库使内容提供器的这一功能成为应用程序开发人员的强大工具。我们将在第 4 章中介绍内容提供器。在第 3 章、第\
  \ 4 章和第 5 章中，我们将讨论 intent、资源和内容提供器如何促进 Android 平台的开放性。\n\n### 高级 UI 概念\n\n我们已经指出，XML\
  \ 在描述 Android UI 方面扮演着关键角色。让我们看一个例子，了解 XML 如何为包含一个文本视图的简单布局实现这一点：\n\n```\n<?xml\
  \ version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout xmlns:android=http://schemas.android.com/apk/res/android>\n\
  <TextView android:id=\"@+id/textViewId\"\n    android:layout_width=\"fill_parent\"\
  \n    android:layout_height=\"wrap_content\"\n    android:text=\"@string/hello\"\
  \n    />\n</LinearLayout>\n```\n\n你将使用为此 XML 文件生成的 ID 将此布局加载到活动窗口中。（我们将在第 6 章中进一步介绍此过程。）Android\
  \ 还为菜单（标准菜单和上下文菜单）提供了广泛支持（更多内容见第 7 章）。你会发现 Android 中的菜单使用起来很方便，因为它们也是作为 XML 文件加载的，并且这些菜单的资源\
  \ ID 是自动生成的。以下是如何在 XML 文件中声明菜单的方法：\n\n```\n<menu >\n    <!-- 此组使用默认类别。 -->\n    <group\
  \ android:id=\"@+id/menuGroup_Main\">\n        <item android:id=\"@+id/menu_clear\"\
  \n            android:orderInCategory=\"10\"\n            android:title=\"clear\"\
  \ />\n        <item android:id=\"@+id/menu_show_browser\"\n            android:orderInCategory=\"\
  5\"\n            android:title=\"show browser\" />\n    </group>\n</menu>\n```\n\
  \nAndroid 支持对话框，并且 Android 中的所有对话框都是异步的。对于习惯于某些窗口框架中同步模态对话框的开发人员来说，这些异步对话框提出了一个特殊的挑战。我们将在第\
  \ 7 章中讨论菜单，并在第 8 章中讨论对话框，其中我们还将提供多种机制来处理异步对话框协议。\n\nAndroid 还提供对其基于视图和可绘制对象的 UI\
  \ 栈中的动画支持。Android 支持两种动画：*补间*动画和逐帧动画。“补间”是动画中的一个术语，指那些*介于*关键帧之间的绘图。通过计算机，你可以通过定期更改中间值并重绘表面来完成此操作。逐帧动画是指一系列帧以固定的时间间隔一张接一张地绘制。Android\
  \ 通过动画回调、插值器和变换矩阵实现了这两种动画方法。\n\n此外，Android 允许你以 XML 资源文件的形式定义这些动画。查看此示例，其中一系列编号图像以逐帧动画的方式播放：\n\
  \n```\n<animation-list\n        android:oneshot=\"false\">\n    <item android:drawable=\"\
  @drawable/numbers11\" android:duration=\"50\" />\n   ……\n    <item android:drawable=\"\
  @drawable/numbers19\" android:duration=\"50\" />\n</animation-list>\n```\n\n底层图形库支持标准的变换矩阵，允许缩放、移动和旋转。图形库中的\
  \ `Camera` 对象支持深度和投影，从而能够在 2D 表面上实现类似 3D 的模拟。（我们将在第 16 章中进一步探讨动画。）\n\nAndroid 还通过其\
  \ OpenGL ES 1.0 和 2.0 标准的实现来支持 3D 图形。OpenGL ES 与 OpenGL 一样，是一种基于 C 语言的扁平 API。由于\
  \ Android SDK 是基于 Java 的编程 API，因此需要使用 Java 绑定来访问 OpenGL ES。Java ME 已经通过 Java 规范请求（JSR）239\
  \ 为 OpenGL ES 定义了此绑定，Android 在其实现中使用了相同的 Java 绑定来访问 OpenGL ES。如果你不熟悉 OpenGL 编程，学习曲线会比较陡峭。但我们已经在这里回顾了基础知识，因此当你完成第\
  \ 20 章的学习时，就可以开始使用 Android 的 OpenGL 进行编程了。从 3.0 版本开始，Android 引入了一种基于脚本的 OpenGL 方法，以补充\
  \ ES 2.0 的功能。\n\n\n\n### Android 新概念\n\nAndroid 在首页上引入了一些围绕“信息触手可及”（*information\
  \ at your fingertips*）的新概念。第一个是**实时文件夹**（*live folders*）。通过使用实时文件夹，您可以将一组项目作为文件夹发布到首页上。该集合的内容会随着底层数据的变化而改变。这些变化的数据可以来自设备本身，也可以来自互联网。（我们将在第\
  \ 21 章中介绍实时文件夹。）\n\n第二个基于首页的概念是**主屏幕小部件**（*home screen widget*）。主屏幕小部件用于通过 UI 小部件在首页上绘制信息。这些信息可以按固定时间间隔更新。例如，您的电子邮件存储中的未读邮件数量。我们在第\
  \ 22 章中描述了主屏幕小部件。在 3.0 版本中，主屏幕小部件得到了增强，包含了列表视图，当底层数据发生变化时，这些视图可以更新。这些增强功能将在第 31\
  \ 章中介绍。\n\n**集成 Android 搜索**（*Integrated Android Search*）是第三个基于首页的概念。通过使用集成搜索，您可以在设备上以及跨互联网搜索内容。Android\
  \ 搜索超越了单纯的搜索功能，允许您通过搜索控件触发命令。我们在第 23 章中介绍了 Android 搜索。\n\nAndroid 还支持基于手指在设备上移动的触摸屏和手势操作。Android\
  \ 允许您将屏幕上的任意随机运动录制为命名手势。应用程序可以使用这个手势来指示特定的操作。我们将在第 25 章中介绍触摸屏和手势。\n\n传感器正逐渐成为移动体验的重要组成部分。我们在第\
  \ 26 章中介绍传感器。\n\n移动设备所需的另一项必要创新是其配置的动态性。例如，在竖屏和横屏模式之间切换手持设备的显示模式非常容易。或者，您可以将手持设备插入底座，使其变成一台笔记本电脑。Android\
  \ 3.0 引入了一个名为**片段**（*fragments*）的概念来有效处理这些变化。第 29 章专门介绍片段。\n\n我们还在第 30 章中介绍了 3.0\
  \ 的**操作栏**（*action bars*）特性。操作栏使 Android 能够与桌面菜单栏范式相媲美。我们在第 25 章（旧方式）以及第 31 章（Android\
  \ 3.0 方式）中介绍了拖放功能。\n\n在 Android SDK 之外，还有许多独立的创新正在发生，使得开发变得既令人兴奋又简单。例如，`XML/VM`、`PhoneGap`\
  \ 和 `Titanium`。`Titanium` 允许您使用 HTML 技术来为基于 WebKit 的 Android 浏览器编程。我们在本书的第二版中介绍了\
  \ `Titanium`。然而，由于时间和篇幅限制，本版将不再介绍 `Titanium`。\n\n#### Android 服务组件\n\n安全是 Android\
  \ 平台的一个基础部分。在 Android 中，安全贯穿于应用程序生命周期的所有阶段——从设计时的策略考虑，到运行时的边界检查。我们在第 10 章中介绍安全和权限。\n\
  \n在第 11 章中，我们将向您展示如何在 Android 中构建和使用服务，特别是 HTTP 服务。本章还将介绍进程间通信（同一设备上应用程序之间的通信）。\n\
  \n基于位置的服务是 Android SDK 中另一个更令人兴奋的组件。SDK 的这一部分为应用程序开发者提供了用于显示和操作地图以及获取实时设备位置信息的 API。我们将在第\
  \ 17 章中详细介绍这些概念。\n\n#### Android 媒体与电话组件\n\nAndroid 拥有涵盖音频、视频和电话组件的 API。第 18 章将介绍电话\
  \ API。我们将在第 19 章中详细介绍音频和视频 API。从 Android 2.0 开始，Android 包含了 Pico 文本转语音引擎（Pico Text\
  \ To Speech engine）。这在第 24 章中介绍。\n\n最后但同样重要的是，Android 通过创建一个单一的 XML 文件来定义应用程序包是什么，从而将所有概念整合到一个应用程序中。这个文件被称为应用程序的清单文件（`AndroidManifest.xml`）。以下是一个示例：\n\
  \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest\n      package=\"\
  com.ai.android.HelloWorld\"\n      android:versionCode=\"1\"\n      android:versionName=\"\
  1.0.0\">\n    <application android:icon=\"@drawable/icon\" android:label=\"@string/app_name\"\
  >\n        <activity android:name=\".HelloWorld\"\n                  android:label=\"\
  @string/app_name\">\n            <intent-filter>\n                <action android:name=\"\
  android.intent.action.MAIN\" />\n                <category android:name=\"android.intent.category.LAUNCHER\"\
  \ />\n            </intent-filter>\n        </activity>\n    </application>\n</manifest>\n\
  ```\n\nAndroid 清单文件是定义活动、注册服务和内容提供者以及声明权限的地方。随着我们逐步展开每个概念，本书将详细阐述清单文件的相关细节。\n\n\
  #### Android Java 包\n\n快速了解 Android 平台的一种方法是查看 Java 包的结构。由于 Android 偏离了标准的 JDK 发行版，了解哪些被支持、哪些不被支持非常重要。以下是\
  \ Android SDK 中包含的重要包的简要说明：\n\n\n\n> `android.app`：实现了 Android 的应用程序模型。主要类包括表示启动和停止语义的\
  \ `Application`，以及大量与活动相关的类、片段、控件、对话框、提示和通知。\n\n> `android.bluetooth`：提供了大量用于处理蓝牙功能的类。主要类包括\
  \ `BluetoothAdapter`、`BluetoothDevice`、`BluetoothSocket`、`BluetoothServerSocket`\
  \ 和 `BluetoothClass`。你可以使用 `BluetoothAdapter` 来控制本地安装的蓝牙适配器。例如，你可以启用它、禁用它以及启动发现过程。`BluetoothDevice`\
  \ 表示你正在连接的远程蓝牙设备。两个蓝牙套接字用于建立设备之间的通信。蓝牙类表示你正在连接的蓝牙设备类型。\n\n> `android.content`：实现了内容提供者的概念。内容提供者将数据访问从数据存储中抽象出来。该软件包还实现了关于\
  \ Intent 和 Android 统一资源标识符（URI）的核心思想。\n\n> `android.content.pm`：实现了包管理器相关的类。包管理器了解权限、已安装的包、已安装的提供者、已安装的服务、已安装的组件（如活动）以及已安装的应用程序。\n\
  \n> `android.content.res`：提供对资源文件的访问，包括结构化和非结构化资源。主要类是 `AssetManager`（用于非结构化资源）和\
  \ `Resources`。\n\n> `android.database`：实现了抽象数据库的概念。主要接口是 `Cursor` 接口。\n\n> `android.database.sqlite`：使用\
  \ SQLite 作为物理数据库，实现了 `android.database` 包中的概念。主要类是 `SQLiteCursor`、`SQLiteDatabase`、`SQLiteQuery`、`SQLiteQueryBuilder`\
  \ 和 `SQLiteStatement`。但是，你的大多数交互都将与抽象 `android.database` 包中的类进行。\n\n> `android.gesture`：此包包含了处理用户定义手势所需的所有类和接口。主要类是\
  \ `Gesture`、`GestureLibrary`、`GestureOverlayView`、`GestureStore`、`GestureStroke`、`GesturePoint`。一个\
  \ `Gesture` 是 `GestureStrokes` 和 `GesturePoints` 的集合。手势被收集在 `GestureLibrary` 中。手势库存储在\
  \ `GestureStore` 中。手势被命名以便能够被识别为动作。\n\n> `android.graphics`：包含类 `Bitmap`、`Canvas`、`Camera`、`Color`、`Matrix`、`Movie`、`Paint`、`Path`、`Rasterizer`、`Shader`、`SweepGradient`\
  \ 和 `TypeFace`。\n\n> `android.graphics.drawable`：实现了绘图协议和背景图像，并允许对可绘制对象进行动画处理。\n\
  \n> `android.graphics.drawable.shapes`：实现了包括 `ArcShape`、`OvalShape`、`PathShape`、`RectShape`\
  \ 和 `RoundRectShape` 在内的形状。\n\n> `android.hardware`：实现了物理相机相关的类。`Camera` 表示硬件相机，而\
  \ `android.graphics.Camera` 表示一个与物理相机无关的图形概念。\n\n> `android.location`：包含类 `Address`、`GeoCoder`、`Location`、`LocationManager`\
  \ 和 `LocationProvider`。`Address` 类表示简化的 XAL（可扩展地址语言）。`GeoCoder` 允许你根据地址获取纬度/经度坐标，反之亦然。`Location`\
  \ 表示纬度/经度。\n\n> `android.media`：包含类 `MediaPlayer`、`MediaRecorder`、`Ringtone`、`AudioManager`\
  \ 和 `FaceDetector`。支持流式传输的 `MediaPlayer` 用于播放音频和视频。`MediaRecorder` 用于录制音频和视频。`Ringtone`\
  \ 类用于播放可作为铃声和通知的简短声音片段。`AudioManager` 负责音量控制。你可以使用 `FaceDetector` 检测位图中的人脸。\n\n\
  > `android.net`：实现了基本的套接字级别网络 API。主要类包括 `Uri`、`ConnectivityManager`、`LocalSocket`\
  \ 和 `LocalServerSocket`。这里还值得注意的是，Android 在浏览器级别和网络级别都支持 HTTPS。Android 在其浏览器中也支持\
  \ JavaScript。\n\n> `android.net.wifi`：管理 WiFi 连接。主要类包括 `WifiManager` 和 `WifiConfiguration`。`WifiManager`\
  \ 负责列出已配置的网络和当前活动的 WiFi 网络。\n\n> `android.opengl`：包含围绕 OpenGL ES 1.0 和 2.0 操作的实用工具类。OpenGL\
  \ ES 的主要类在从 JSR 239 借用的另一组包中实现。这些包是 `javax.microedition.khronos.opengles`、`javax.microedition.khronos.egl`\
  \ 和 `javax.microedition.khronos.nio`。这些包是对 Khronos 用 C 和 C++ 实现的 OpenGL ES 的轻量封装。\n\
  \n> `android.os`：表示可通过 Java 编程语言访问的 OS 服务。一些重要的类包括 `BatteryManager`、`Binder`、`FileObserver`、`Handler`、`Looper`\
  \ 和 `PowerManager`。`Binder` 是一个允许进程间通信的类。`FileObserver` 监视文件的更改。你使用 `Handler` 类在消息线程上运行任务，使用\
  \ `Looper` 运行消息线程。\n\n> `android.preference`：允许应用程序以统一的方式让用户管理该应用程序的偏好设置。主要类是 `PreferenceActivity`、`PreferenceScreen`，以及各种派生自\
  \ `Preference` 的类，例如 `CheckBoxPreference` 和 `SharedPreferences`。\n\n> `android.provider`：包含一组遵循\
  \ `android.content.ContentProvider` 接口的预构建内容提供者。这些内容提供者包括 `Contacts`、`MediaStore`、`Browser`\
  \ 和 `Settings`。这组接口和类存储底层数据结构的元数据。\n\n> `android.sax`：包含一组高效的简单 API for XML（SAX）解析实用工具类。主要类包括\
  \ `Element`、`RootElement` 以及一些 `ElementListener` 接口。\n\n> `android.speech`：包含用于语音识别的常量。\n\
  \n> `android.speech.tts`：提供将文本转换为语音的支持。主要类是 `TextToSpeech`。你将能够获取文本，并要求此类的实例将要朗读的文本排入队列。例如，你可以访问许多回调来监视朗读何时完成。Android\
  \ 使用来自 SVOX 的 Pico TTS（文本转语音）引擎。\n\n> `android.telephony`：包含类 `CellLocation`、`PhoneNumberUtils`\
  \ 和 `TelephonyManager`。`TelephonyManager` 允许你确定蜂窝小区位置、电话号码、网络运营商名称、网络类型、电话类型和用户身份模块（SIM）序列号。\n\
  \n> `android.telephony.gsm`：允许你基于蜂窝基站收集小区位置，并包含负责短信消息的类。此包之所以称为 GSM，是因为全球移动通信系统是最初定义短信数据消息标准的技术。\n\
  \n> `android.telephony.cdma`：提供对 CDMA 电话的支持。\n\n> `android.text`：包含文本处理类。\n\n> `android.text.method`：为各种控件的文本输入提供类。\n\
  \n> `android.text.style`：为文本范围提供了许多样式机制。\n\n> `android.utils`：包含类 `Log`、`DebugUtils`、`TimeUtils`\
  \ 和 `Xml`。\n\n> `android.view`：包含类 `Menu`、`View`、`ViewGroup` 以及一系列监听器和回调。\n\n> `android.view.animation`：提供对补间动画的支持。主要类包括\
  \ `Animation`、一系列用于动画的插值器，以及一组特定的动画器类，包括 `AlphaAnimation`、`ScaleAnimation`、`TranslationAnimation`\
  \ 和 `RotationAnimation`。Android 3.0 引入了 `android.animation` 包，该包类似但范围更广，因为它可以对对象（而不仅仅是视图）进行操作。\n\
  \n> `android.view.inputmethod`：实现了输入法框架架构。\n\n> `android.webkit`：包含表示网页浏览器的类。主要类包括\
  \ `WebView`、`CacheManager` 和 `CookieManager`。\n\n> `android.widget`：包含所有通常派生自 `View`\
  \ 类的 UI 控件。主要的控件包括 `Button`、`Checkbox`、`Chronometer`、`AnalogClock`、`DatePicker`、`DigitalClock`、`EditText`、`ListView`、`FrameLayout`、`GridView`、`ImageButton`、`MediaController`、`ProgressBar`、`RadioButton`、`RadioGroup`、`RatingButton`、`Scroller`、`ScrollView`、`Spinner`、`TabWidget`、`TextView`、`TimePicker`、`VideoView`\
  \ 和 `ZoomButton`。\n\n> `com.google.android.maps`：包含类 `MapView`、`MapController` 和\
  \ `MapActivity`，基本上是使用 Google 地图所需的类。\n\n\n以下是针对您提供的英文文本的中文翻译，已严格遵循 Markdown 格式、保留所有符号、链接及代码块要求。\n\
  \n---\n\n\n以下是一些关键的 Android 专属包。从这个列表中，您可以窥见 Android 核心平台的深度。\n\n**注意：** 总体而言，Android\
  \ Java API 包含 40 多个包和 700 多个类，并且随着每个版本的发布而持续增长。\n\n此外，Android 在 `java.*` 命名空间中提供了许多包。其中包括\
  \ `awt.font`、`io`、`lang`、`lang.annotation`、`lang.ref`、`lang.reflect`、`math`、`net`、`nio`、`nio.channels`、`nio.channels.spi`、`nio.charset`、`security`、`security.acl`、`security.cert`、`security.interfaces`、`security.spec`、`sql`、`text`、`util`、`util.concurrent`、`util.concurrent.atomic`、`util.concurrent.locks`、`util.jar`、`util.logging`、`util.prefs`、`util.regex`\
  \ 和 `util.zip`。Android 还包含了来自 `javax` 命名空间的以下包：`crypto`、`crypto.spec`、`microedition.khronos.egl`、`microedition.khronos.opengles`、`net`、`net.ssl`、`security.auth`、`security.auth.callback`、`security.auth.login`、`security.auth.x500`、`security.cert`、`sql`、`xml`\
  \ 和 `xmlparsers`。除此之外，它还包含了来自 `org.apache.http.*` 以及 `org.json`、`org.w3c.dom`、`org.xml.sax`、`org.xml.sax.ext`、`org.xml.sax.helpers`、`org.xmlpull.v1`\
  \ 和 `org.xmlpull.v1.sax2` 的大量包。这些众多的包共同构成了一个丰富的计算平台，用于为手持设备编写应用程序。\n\n#### 善用 Android\
  \ 源代码\n\n在 Android 的早期版本中，文档在某些方面有所欠缺。Android 源代码可以用来填补这些空白。\n\nAndroid 源代码分发的详细信息发布在\
  \ [`http://source.android.com`](http://source.android.com) 上。该代码于 2008 年 10 月左右以开源形式提供。开放手机联盟的目标之一就是让\
  \ Android 成为一个免费且完全可定制的移动平台。\n\n如前所述，Android 是一个平台，而不仅仅是一个项目。您可以在 [`http://android.git.kernel.org/`](http://android.git.kernel.org/)\
  \ 上看到其范围及项目数量。\n\nAndroid 及其所有项目的源代码均由 Git 源代码控制系统管理。Git（[`http://git.or.cz/`](http://git.or.cz/)）是一个开源源代码控制系统，旨在快速便捷地处理大型和小型项目。Linux\
  \ 内核和 Ruby on Rails 项目也依赖 Git 进行版本控制。Git 仓库中 Android 项目的完整列表见 [`http://android.git.kernel.org/`](http://android.git.kernel.org/)。\n\
  \n您可以使用 Git 提供的工具（在产品网站上有所描述）下载这些项目中的任何一个。一些主要的项目包括 Dalvik、`frameworks/base`（即 `android.jar`\
  \ 文件）、Linux 内核以及许多外部库，例如 Apache HTTP 库（`apache-http`）。核心 Android 应用程序也托管于此。其中一些核心应用程序包括：AlarmClock、Browser、Calculator、Calendar、Camera、Contacts、Email、GoogleSearch、HTML\
  \ Viewer、IM、Launcher、Mms、Music、PackageInstaller、Phone、Settings、SoundRecorder、Stk、Sync、Updater\
  \ 和 VoiceDialer。\n\nAndroid 项目还包括 Provider 项目。*Provider 项目* 就像 Android 中的数据库，将数据封装成\
  \ RESTful 服务。这些项目包括 CalendarProvider、ContactsProvider、DownloadProvider、DrmProvider、GoogleContactsProvider、GoogleSubscribedFeedsProvider、ImProvider、MediaProvider、SettingsProvider、Subscribed\
  \ FeedsProvider 和 TelephonyProvider。\n\n作为一名程序员，您最感兴趣的将是构成 `android.jar` 文件的源代码。（如果您更倾向于下载整个平台并自行构建，请参阅\
  \ [`http://source.android.com/source/download.html`](http://source.android.com/source/download.html)\
  \ 上的文档。）您可以通过输入以下 URL 来下载这个 `.jar` 文件的源代码：[`http://git.source.android.com/?p=platform/frameworks/base.git;a=snapshot;h=HEAD;sf=tgz`](http://git.source.android.com/?p=platform/frameworks/base.git;a=snapshot;h=HEAD;sf=tgz)。\n\
  \n这是一个通用的 URL，可用于下载 Git 项目。在 Windows 上，您可以使用 `pkzip` 解压缩此文件。虽然您可以下载并解压缩源代码，但如果您不需要通过\
  \ IDE 调试源代码，直接在线查看这些文件可能更方便。Git 也允许您这样做。例如，您可以通过访问此 URL 来浏览 `android.jar` 的源文件：[`http://android.git.kernel.org/?p=platform/frameworks/base.git;a=summary`](http://android.git.kernel.org/?p=platform/frameworks/base.git;a=summary)。\n\
  \n但是，访问此页面后您需要进行一些操作。从下拉列表中选择 `grep`，并在搜索框中输入一些文本。点击结果中的某个文件名，即可在浏览器中打开该源文件。此功能便于快速查阅源代码。\n\
  \n有时，您要找的文件可能不在 `frameworks/base` 目录或项目中。在这种情况下，您需要找到项目列表并逐一搜索。此列表的 URL 为：[`http://android.git.kernel.org/`](http://android.git.kernel.org/)。\n\
  \n您无法跨所有项目执行 `grep` 操作，因此需要了解哪个项目对应 Android 中的哪个功能。例如，Skia 项目中的图形相关库可在此处找到：[`http://android.git.kernel.org/?p=platform/external/skia.git;a=summary`](http://android.git.kernel.org/?p=platform/external/skia.git;a=summary)。\n\
  \n`SkMatrix.cpp` 文件包含一个变换矩阵的源代码，这对于动画非常有用：[`http://android.git.kernel.org/?p=platform/external/skia.git;a=blob;f=src/core/SkMatrix.cpp`](http://android.git.kernel.org/?p=platform/external/skia.git;a=blob;f=src/core/SkMatrix.cpp)。\n\
  \n### 本书中的示例项目\n\n在本书中，您将找到大量可运行的示例项目。第 2 章 到 第 28 章 是针对智能手机编写的，因此这些章节中的所有项目都已在最高至\
  \ Android 2.3 的版本上测试过。毕竟，市面上的 Android 智能手机数量非常庞大。\n\n大多数（如果不是全部）示例项目无需更改即可在 Android\
  \ 3.0 平板电脑上运行，尽管它们的外观可能不完全符合您的期望。我们开发这些示例项目的主要目的是演示特定的概念和 Android 包，并且在某些情况下，展示某些功能在旧版\
  \ Android 中是如何工作的。\n\n这些概念可以轻松应用于 Android 3.0 平板电脑应用程序，并且在需要时，我们的示例应用程序也肯定能够与其他\
  \ Android 3.0 特定功能集成。但是，如果在所有示例项目中都加入这些额外功能，可能会分散我们对试图解释的核心概念的关注。\n\n第 29 章 到 第\
  \ 31 章 专门针对 Android 3.0，因此这些项目是为 Android 3.0 设计并测试的。如果您在使用任何示例项目时遇到问题，请查看我们的网站（[`www.androidbook.com`](http://www.androidbook.com)）以获取更新，如果仍未找到答案，请通过电子邮件与我们联系。\n\
  \n### 总结\n\n在本章中，我们希望激发您对 Android 的好奇心。如果您是一名 Java 程序员，您将拥有绝佳的机会，从这一令人兴奋且功能强大的通用计算平台中获益。我们欢迎您继续阅读本书的其余部分，以深入理解\
  \ Android SDK。\n\n## 第 2 章\n\n\n\n## 搭建开发环境\n\n上一章概述了 Android 的历史，并初步介绍了本书后续将涉及的概念。此刻，你可能已经迫不及待想动手写代码了。我们将首先介绍使用\
  \ Android 软件开发工具包（SDK）构建应用所需的一切，并帮助你搭建开发环境。接着，我们将引导你完成一个“Hello World！”应用，并剖析一个稍大一点的应用。然后，我们会解释\
  \ Android 应用的生命周期，最后讨论如何使用 Android 虚拟设备（AVD）调试你的应用。\n\n要构建 Android 应用，你需要 Java SE\
  \ 开发工具包（JDK）、Android SDK 以及一个开发环境。严格来说，你可以使用原始文本编辑器开发应用，但就本书而言，我们将使用通用的 Eclipse\
  \ IDE。Android SDK 需要 JDK 5 或更高版本（我们在示例中使用了 JDK 6）以及 Eclipse 3.4 或更高版本（我们使用了 Eclipse\
  \ 3.5，也称为 Galileo，以及 3.6，也称为 Helios）。\n\n为了方便起见，你最好使用 Android 开发工具（ADT）。ADT 是一个\
  \ Eclipse 插件，支持使用 Eclipse IDE 构建 Android 应用。事实上，本书中的所有示例都是使用集成了 ADT 工具的 Eclipse\
  \ IDE 构建的。\n\nAndroid SDK 主要由两部分组成：工具和包。初次安装 SDK 时，你只获得了基础工具。这些是用于帮助你开发应用的可执行文件和支持文件。包则是特定于某个\
  \ Android 版本（称为平台）或某个平台特定附加组件的文件。平台包括 Android 1.5 到 3.0。附加组件包括谷歌地图 API、市场许可证验证器，甚至还有供应商提供的，如三星的\
  \ Galaxy Tab 附加组件。安装 SDK 后，你需要使用其中一个工具来下载并设置平台和附加组件。让我们开始吧！\n\n### 搭建你的环境\n\n要构建\
  \ Android 应用，你需要建立一个开发环境。在本节中，我们将引导你下载 JDK 6、Eclipse IDE、Android SDK（工具和包）以及 Android\
  \ 开发工具（ADT）。我们还会帮助你配置 Eclipse 以便构建 Android 应用。\n\nAndroid SDK 兼容 Windows（Windows\
  \ XP、Windows Vista 和 Windows 7）、Mac OS X（仅限 Intel）和 Linux（仅限 Intel）。在本章中，我们将为你演示如何为所有这些平台搭建环境（对于\
  \ Linux，我们仅涵盖 Ubuntu 变体）。在其他章节中，我们将不再特别说明平台差异。\n\n#### 下载 JDK 6\n\n你首先需要的是 Java\
  \ SE 开发工具包。Android SDK 需要 JDK 5 或更高版本；我们使用 JDK 6 开发了示例。对于 Windows，请从 Oracle 网站（[`www.oracle.com/technetwork/java/javase/downloads/index.html`](http://www.oracle.com/technetwork/java/javase/downloads/index.html)）下载\
  \ JDK 6 并安装。你只需要 JDK，不需要捆绑包。对于 Mac OS X，请从 Apple 网站（[`http://developer.apple.com/java/download/`](http://developer.apple.com/java/download/)）下载\
  \ JDK，选择适合你特定 Mac OS 版本的文件并安装。你需要免费注册为 Apple 开发者才能获得 JDK，进入下载页面后，需要点击页面右侧的 Java\
  \ 链接。要在 Linux 上安装 JDK，请打开一个终端窗口并尝试以下命令：\n\n```\nsudo apt-get install sun-java6-jdk\n\
  ```\n\n这将安装 JDK 及其所有依赖项，例如 Java 运行时环境（JRE）。如果安装失败，可能意味着你需要添加一个新的软件源，然后再次尝试该命令。网页\
  \ `https://help.ubuntu.com/community/Repositories/Ubuntu` 解释了软件源以及如何添加第三方软件的连接。具体过程取决于你使用的\
  \ Linux 版本。完成此操作后，请重试该命令。\n\n随着 Ubuntu 10.04（Lucid Lynx）的推出，Ubuntu 建议使用 OpenJDK\
  \ 而不是 Oracle/Sun JDK。要安装 OpenJDK，请尝试以下命令：\n\n```\nsudo apt-get install openjdk-6-jdk\n\
  ```\n\n如果找不到该包，请按照前面所述设置第三方软件，然后再次运行该命令。JDK 所依赖的所有包都将自动为你添加。可以同时安装 OpenJDK 和 Oracle/Sun\
  \ JDK。要在 Ubuntu 上切换已安装的 Java 版本之间的活动 Java，请在 shell 提示符下运行以下命令：\n\n```\nsudo update-alternatives\
  \ --config java\n```\n\n然后选择你希望作为默认版本的 Java。\n\n现在你已经安装了 Java JDK，接下来需要设置 `JAVA_HOME`\
  \ 环境变量，使其指向 JDK 安装文件夹。在 Windows XP 机器上，可以通过依次点击“开始” ![image](img/U001.jpg) “我的电脑”，右键单击选择“属性”，选择“高级”选项卡，然后点击“环境变量”来完成此操作。点击“新建”添加变量，如果变量已存在则点击“编辑”修改。`JAVA_HOME`\
  \ 的值类似于 `C:\\Program Files\\Java\\jdk1.6.0_23`。对于 Windows Vista 和 Windows 7，进入“环境变量”屏幕的步骤略有不同。点击“开始”\
  \ ![image](img/U001.jpg) “计算机”，右键单击选择“属性”，点击“高级系统设置”链接，然后点击“环境变量”。之后，按照与 Windows\
  \ XP 相同的说明修改 `JAVA_HOME` 环境变量。对于 Mac OS X，你可以在主目录下的 `.profile` 文件中设置 `JAVA_HOME`。编辑或创建你的\
  \ `.profile` 文件，并添加如下所示的一行：\n\n```\nexport JAVA_HOME=path_to_JDK_directory\n```\n\
  \n其中 `path_to_JDK_directory` 可能是 `/Library/Java/Home`。对于 Linux，编辑你的 `.profile` 文件并添加类似\
  \ Mac OS X 的一行，只是你的 Java 路径可能类似于 `/usr/lib/jvm/java-6-sun` 或 `/usr/lib/jvm/java-6-openjdk`。有些人更喜欢使用\
  \ `.bashrc` 而不是 `.profile`；两者都可以。\n\n#### 下载 Eclipse 3.6\n\n安装好 JDK 后，你可以下载 Java\
  \ 开发者版的 Eclipse IDE。（你不需要 Java EE 版；它也能用，但体积大得多，包含本书用不到的内容。）本书中的示例使用的是 Eclipse 3.6（在\
  \ Windows 环境下）。你可以从 [`www.eclipse.org/downloads/`](http://www.eclipse.org/downloads/)\
  \ 下载所有 Eclipse 版本。Eclipse 发行版是一个 `.zip` 文件，可以解压到几乎任何位置。在 Windows 上，最简单的解压位置是 `C:\\\
  `，这会产生一个 `C:\\eclipse` 文件夹，你可以在其中找到 `eclipse.exe`。对于 Mac OS X，你可以解压到“应用程序”文件夹。对于\
  \ Linux，你可以解压到你的主目录，或者让管理员将 Eclipse 放到一个可以访问到的公共位置。对于所有平台，Eclipse 可执行文件都在 `eclipse`\
  \ 文件夹中。你也可以使用 Linux 的“软件中心”来查找和安装 Eclipse 以添加新应用程序，但这可能无法提供最新版本。\n\n首次启动 Eclipse\
  \ 时，它会要求你提供工作区的位置。为了方便，你可以选择一个简单的路径，例如 `C:\\android` 或主目录下的某个子目录。如果你与他人共用一台电脑，请将工作区文件夹放在主目录下的某个位置。\n\
  \n\n\n### 下载 Android SDK\n\n要构建 Android 应用程序，你需要 Android SDK。如前所述，SDK 附带基础工具部分，然后你可以下载所需或想要使用的软件包部分。SDK\
  \ 的工具部分包含一个模拟器，因此你无需拥有运行 Android 操作系统的移动设备即可开发 Android 应用程序。它还附带一个设置工具，允许你安装想要下载的软件包。\n\
  \n你可以从 [`http://developer.android.com/sdk`](http://developer.android.com/sdk) 下载\
  \ Android SDK。Android SDK 以 `.zip` 文件形式提供，这与 Eclipse 的分发方式类似，因此你需要将其解压缩到合适的位置。对于\
  \ Windows，将文件解压缩到方便的位置（我们使用了 `C:` 盘），之后你应该会得到一个名为 `C:\\android-sdk-windows` 的文件夹，其中包含如图\
  \ 2-1 所示的文件。对于 Mac OS X 和 Linux，你可以将文件解压缩到你的主目录。你会注意到 Mac OS X 和 Linux 没有 SDK 管理器可执行文件。在\
  \ Mac OS X 和 Linux 中，与 SDK 管理器等效的操作是运行 `tools/android` 程序。\n\n另一种方法（仅适用于 Windows）是下载安装程序\
  \ `EXE` 文件而不是 zip 文件，然后运行该安装程序可执行文件。此可执行文件将检查 Java JDK，为你解压嵌入的文件，并运行 `SDK 管理器` 程序来帮助你设置其余的下载内容。\n\
  \n![images](img/0201.jpg)\n\n**图 2-1.** *Android SDK 的基础内容*\n\n无论是使用 Windows 安装程序还是通过执行\
  \ `SDK 管理器`，你接下来都应该安装一些软件包。初次安装 Android SDK 时，它不附带任何平台版本（即 Android 版本）。安装平台非常简单。启动\
  \ `SDK 管理器`后，选择 `可用的软件包`，选择 `https://dl-ssl.google.com/android/repository/repository.xml`\
  \ 源，然后选择你想要的平台和附加组件，例如 Android 2.3（参见图 2-2）。你必须添加 Android SDK 平台工具，环境才能正常工作。因为我们很快就会用到它，请至少添加\
  \ Android 1.6 平台。\n\n![images](img/0202.jpg)\n\n**图 2-2.** *向 Android SDK 添加软件包*\n\
  \n点击 `安装所选`。你需要为安装的每个项目点击 `接受`，然后点击 `安装已接受项`。然后 Android 将下载你的软件包和平台，供你使用。Google\
  \ API 是用于使用 Google 地图开发应用程序的附加组件。你可以随时通过点击此窗口左侧的 `已安装的软件包` 来查看已安装的平台。你也可以稍后随时返回添加更多软件包。\n\
  \n### 更新 `PATH` 环境变量\n\nAndroid SDK 带有一个 `tools` 目录，你需要将其添加到 `PATH` 中。你还需要将刚刚安装的\
  \ `platform-tools` 目录添加到 `PATH` 中。让我们现在添加它们，或者如果你是升级，请确保它们正确无误。顺便也添加你的 JDK `bin`\
  \ 目录，这会让之后的工作更轻松。对于 Windows，返回 `环境变量` 窗口。编辑 `PATH` 变量，在末尾添加一个分号（`;`），然后依次添加 Android\
  \ SDK 工具文件夹的路径、另一个分号、Android SDK 平台工具文件夹的路径、另一个分号，最后添加 `%JAVA_HOME%\\bin`。完成后点击\
  \ `确定` 。对于 Mac OS X 和 Linux，编辑你的 `.profile` 文件，将 Android SDK 工具目录路径、Android SDK\
  \ 平台工具目录以及 `$JAVA_HOME/bin` 目录添加到你的 `PATH` 变量中。类似下面的内容适用于 Linux：\n\n```\nexport\
  \ PATH=$PATH:$HOME/android-sdk-linux_x86/tools:$HOME/android-sdk-linux_x86/platform-tools:$JAVA_HOME/bin\n\
  ```\n\n只需确保指向 Android SDK 工具目录的路径组件与你特定的设置匹配即可。\n\n### 工具窗口\n\n在本书后续章节中，有时你需要执行命令行实用程序。这些程序将是\
  \ JDK 或 Android SDK 的一部分。通过将这些目录添加到 `PATH` 中，你无需指定完整路径名即可执行它们，但你需要启动一个“工具窗口”来运行它们（我们将在后续章节中引用此工具窗口）。在\
  \ Windows 中创建工具窗口的最简单方法是点击开始 ![image](img/U001.jpg) 运行，输入 `cmd`，然后点击 `确定`。对于 Mac\
  \ OS X，从 Finder 中的“应用程序”文件夹或 Dock（如果存在）中选择`“终端”`。对于 Linux，从“应用程序”![image](img/U001.jpg)\
  \ “附件”菜单中选择`“终端”`。\n\n在谈论平台差异时，最后一件事：以后你可能需要知道工作站的 IP 地址。在 Windows 中，启动一个工具窗口并输入命令\
  \ `ipconfig`。结果将包含一个 IPv4（或类似名称）条目，其旁边列出了你的 IP 地址。IP 地址看起来像这样：192.168.1.25。对于 Mac\
  \ OS X 和 Linux，启动一个工具窗口并使用命令 `ifconfig`。你会在一个名为“inet addr”的标签旁边找到你的 IP 地址。你可能会看到一个名为“localhost”或“lo”的网络连接。此网络连接的\
  \ IP 地址是 127.0.0.1。这是操作系统使用的特殊网络连接，不同于你工作站的 IP 地址。请查找另一个不同的数字作为你工作站的 IP 地址。\n\n\n\
  \n### 安装 Android 开发工具 (ADT)\n\n现在您需要安装 `ADT`，这是一个 Eclipse 插件，用于帮助您构建 Android 应用程序。具体来说，`ADT`\
  \ 集成了 Eclipse 的功能，为您提供创建、测试和调试 Android 应用程序的环境。您需要使用 Eclipse 中的 `Install New Software`\
  \ 功能来完成安装。（有关升级 `ADT` 的说明将在本节后面出现。）首先，启动 Eclipse IDE，然后按照以下步骤操作：\n\n1.  选择 `Help`\
  \ 菜单项，然后选择 `Install New Software…` 选项。（在旧版本的 Eclipse 中，此项被称为 `Software Updates`。）\n\
  2.  选中 `Work with` 字段，输入\n    `https://dl-ssl.google.com/android/eclipse/`\n   \
  \ 并按下回车键。Eclipse 将联系该站点并填充列表，如 图 2–3 所示。\n3.  您应该会看到一个名为 `Developer Tools` 的条目，包含三个子节点：`Android\
  \ DDMS`、`Android Development Tools` 和 `Android Hierarchy Viewer`。选中父节点 `Developer\
  \ Tools`，确保子节点也被选中，然后点击 `Next` 按钮。您看到的版本可能比这些更新，这没关系。这里可能还有其他工具。\n4.  Eclipse 将要求您验证要安装的工具。再次点击\
  \ `Next`。这也适用于在 Android 3.0 中添加的 `Android Traceview`。\n5.  系统会要求您查看 `ADT` 以及安装 `ADT`\
  \ 所需工具的许可证。查看许可证，点击“我接受...”，然后点击 `Finish` 按钮。\n\n![images](img/0203.jpg)\n\n**图\
  \ 2–3.** *使用 Eclipse 中的 Install New Software 功能安装 ADT*\n\nEclipse 随后将下载 `Developer\
  \ Tools` 并进行安装。您需要重新启动 Eclipse，以便新插件在 IDE 中显示。\n\n如果您在 Eclipse 中已有旧版本的 `ADT`，请转到\
  \ Eclipse 的 `Help` 菜单并选择 `Check for Updates`。您应该会看到新版本的 `ADT`，并能按照安装说明，从第 3 步开始继续操作。\n\
  \n**注意** `Android Hierarchy Viewer` 是在 Android 2.3 中添加到 `Developer Tools` 的。因此，如果您是全新安装\
  \ `ADT`，将会包含它。但如果您是升级 `ADT`，则可能不会在待升级的工具列表中看到 `Hierarchy Viewer`。如果您没有看到它，请在升级完\
  \ `ADT` 的其余部分后，转到 `Install New Software...`，然后从 `Works With` 菜单中选择 `https://dl-ssl.google.com/android/eclipse/`。中间窗口应该会显示\
  \ `Android Hierarchy Viewer`，这样您就可以将其与 `ADT` 的其余部分分开安装。\n\n在 Eclipse 中使 `ADT` 正常工作的最后一步是将其指向\
  \ Android SDK。在 Eclipse 中，选择 `Window` 菜单并选择 `Preferences`。（在 Mac OS X 上，`Preferences`\
  \ 位于 `Eclipse` 菜单下。）在 `Preferences` 对话框中，选择 `Android` 节点，并将 `SDK Location` 字段设置为\
  \ Android SDK 的路径（参见 图 2–4），然后点击 `Apply` 按钮。请注意，您可能会看到一个对话框，询问您是否要向 Google 发送有关\
  \ Android SDK 的使用统计数据。这个决定由您自己做出。点击 `OK` 关闭 `Preferences` 窗口。\n\n![images](img/0204.jpg)\n\
  \n**图 2–4.** *将 ADT 指向 Android SDK*\n\n从 Eclipse 中，您可以启动 `SDK Manager`。在 Eclipse\
  \ 中，转到 `Window` ![image](img/U001.jpg) `Android SDK and AVD Manager`。您应该会看到与 图 2–2\
  \ 相同的窗口，但您可能看不到左侧像您自己启动 `SDK Manager` 时显示的所有选项。\n\n您已准备好创建第一个 Android 应用程序——但首先，我们必须简要讨论一下\
  \ Android 应用程序的基本概念。\n\n### 学习基本组件\n\n每个应用程序框架都有一些关键组件，开发人员需要先了解这些组件，才能开始基于该框架编写应用程序。例如，您需要了解\
  \ JavaServer Pages (JSP) 和 servlet 才能编写 Java 2 平台企业版 (J2EE) 应用程序。类似地，在为 Android\
  \ 构建应用程序时，您需要了解活动、视图、意图、内容提供者、服务和 `AndroidManifest.xml` 文件。我们在此简要介绍这些基本概念，并在全书中进行更详细的讨论。\n\
  \n#### 视图\n\n视图是构成用户界面的基本构建块的用户界面 (UI) 元素。一个视图可以是一个按钮、标签、文本字段或许多其他 UI 元素。如果您熟悉 J2EE\
  \ 和 Swing 中的视图，那么您也会理解 Android 中的视图。视图也用作其他视图的容器，这意味着 UI 中通常存在一个视图层次结构。归根结底，您看到的一切都是一个视图。\n\
  \n#### 活动\n\n活动是一个用户界面的概念。一个活动通常代表应用程序中的一个屏幕。它通常包含一个或多个视图，但并不强制要求必须如此。活动就像一个“活动”——帮助用户做一件事，这件事可以是查看数据、创建数据或编辑数据。大多数\
  \ Android 应用程序内部都包含多个活动。\n\n#### 意图\n\n意图泛泛地定义了一种执行某项工作的“意图”。意图封装了多个概念，因此理解它们的最佳方式是查看它们的使用示例。您可以使用意图来执行以下任务：\n\
  \n- 广播消息。\n- 启动服务。\n- 启动活动。\n- 显示网页或联系人列表。\n- 拨打电话号码或接听电话。\n\n意图并不总是由您的应用程序发起——系统也会使用它们来通知您的应用程序特定的事件（例如收到短信）。\n\
  \n意图可以是显式的或隐式的。如果您只是说想要显示一个 URL，系统会决定哪个组件来执行该意图。您也可以提供关于应该由谁来处理该意图的具体信息。意图松散了动作和动作处理程序之间的耦合。\n\
  \n#### 内容提供者\n\n设备上的移动应用程序之间的数据共享很常见。因此，Android 定义了一种标准机制，让应用程序可以共享数据（例如联系人列表），而无需暴露底层存储、结构和实现。通过内容提供者，您可以公开您的数据，并让您的应用程序使用来自其他应用程序的数据。\n\
  \n#### 服务\n\nAndroid 中的服务类似于您在 Windows 或其他平台中看到的服务——它们是可能在后台长时间运行的进程。Android 定义了两种类型的服务：本地服务和远程服务。本地服务是仅能被托管该服务的应用程序访问的组件。相反，远程服务是旨在供设备上运行的其他应用程序远程访问的服务。\n\
  \n服务的一个例子是电子邮件应用程序用于轮询新邮件的组件。如果该服务未被设备上运行的其他应用程序使用，它可能是一个本地服务。如果多个应用程序使用该服务，那么它将被实现为远程服务。正如您将在第\
  \ 11 章中看到的，区别在于 `startService()` 与 `bindService()`。\n\n您可以使用现有的服务，也可以通过扩展 `Service`\
  \ 类来编写自己的服务。\n\n##### AndroidManifest.xml\n\n`AndroidManifest.xml` 类似于 J2EE 世界中的\
  \ `web.xml` 文件，它定义了应用程序的内容和行为。例如，它列出了您的应用程序的活动和服务，以及应用程序运行所需的权限和功能。\n\n### Android\
  \ 虚拟设备\n\nAndroid 虚拟设备 (AVD) 允许开发人员在无需连接真实 Android 设备（通常是手机或平板电脑）的情况下测试他们的应用程序。可以创建各种配置的\
  \ AVD，以模拟不同类型的真实设备。\n\n\n\n### 你好，世界！\n\n现在你已经准备好构建第一个 Android 应用了。我们将从构建一个简单的“Hello\
  \ World！”程序开始。按照以下步骤创建应用的骨架：\n\n1. 启动 Eclipse，选择 File ![image](img/U001.jpg) New\
  \ ![image](img/U001.jpg) Project。在 New Project 对话框中，选择 Android，然后点击 Next。你将看到 New\
  \ Android Project 对话框，如 图 2-5 所示。（Eclipse 可能已将 Android Project 添加到 New 菜单中，如果有的话可以直接使用。）工具栏上也有一个\
  \ New Android Project 按钮。\n\n   ![images](img/0205.jpg)\n\n   **图 2-5.** *使用 New\
  \ Project 向导创建 Android 应用*\n\n2. 如 图 2-5 所示，输入 `HelloAndroid` 作为项目名称。你需要将此项目与在 Eclipse\
  \ 中创建的其他项目区分开来，因此请选择一个在查看 Eclipse 环境中所有项目时能让你一目了然的名称。另外请注意，项目的默认位置将继承自 Eclipse 工作空间的位置。New\
  \ Project 向导会将新应用的名称附加到工作空间位置之后。在此例中，如果你的 Eclipse 工作空间是 `c:\\android`，则新项目将位于 `c:\\\
  android\\HelloAndroid\\`。\n\n3. 暂时保留 Contents 部分不变，因为你希望在工作空间的默认位置创建一个新项目。\n\n4.\
  \ 对于 Build Target，勾选 Android 1.6，如 图 2-5 所示。这将作为你构建应用所基于的 Android 版本。你可以在更高版本的 Android（如\
  \ 2.1 和 2.3）上运行你的应用，但 Android 1.6 已包含所有所需功能，因此你选择它作为目标。通常，最好选择你能使用的最低版本号，因为这样可以最大化能够运行你应用的设备数量。\n\
  \n5. 输入 `Hello Android` 作为应用名称。此名称将出现在应用图标旁、应用标题栏以及应用列表中。它应具有描述性且不宜过长。\n\n6. 使用\
  \ `com.androidbook.hello` 作为包名。你的应用必须有一个基础包名，这就是它。这个包名将作为你应用的标识符，并且必须在所有应用中保持唯一。因此，最好以你拥有的域名开头来命名包名。如果你没有域名，只需发挥创意，确保你的包名不太可能被其他人使用。但是，不要使用以\
  \ `com.google`、`com.android`、`android` 或 `com.example` 开头的包名，因为这些名称受 Google 限制，你将无法将应用上传到\
  \ Android Market。\n\n7. 输入 `HelloActivity` 作为 Create Activity 名称。你这是在告诉 Android，当应用启动时应启动此\
  \ Activity。你的应用中可能还有其他 Activity，但这是用户启动应用时首先看到的 Activity。\n\n8. 最后，Min SDK Version\
  \ 值为 4，告诉 Android 你的应用需要 Android 1.6 或更高版本。从技术上讲，你可以指定一个小于 Build Target 值的 Min SDK\
  \ Version。如果你的应用调用了旧版 Android 中不存在的功能，你需要优雅地处理这种情况，但这是可以做到的。对于大多数应用，Min SDK Version\
  \ 数字将与 Build Target 数字一致。\n\n9. 点击 Finish 按钮，ADT 将为你生成项目骨架。现在，打开 `src` 文件夹下的 `HelloActivity.java`\
  \ 文件，并按如下方式修改 `onCreate()` 方法：\n\n    ```java\n    /** Called when the activity\
  \ is first created. */\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        /** create a TextView\
  \ and write Hello World! */\n        TextView tv = new TextView(this);\n       \
  \ tv.setText(\"Hello World!\");\n        /** set the content view to the TextView\
  \ */\n        setContentView(tv);\n    }\n    ```\n\n你可能需要向代码中添加一条 `import android.widget.TextView;`\
  \ 语句，以消除 Eclipse 报告的错误。保存 `HelloActivity.java` 文件。\n\n要运行应用，你需要创建一个 Eclipse 启动配置，并且需要一个虚拟设备来运行它。我们将快速引导你完成这些步骤，稍后再详细介绍\
  \ Android 虚拟设备（AVD）。按照以下步骤创建 Eclipse 启动配置：\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n1. 选择主菜单 `Run`，然后选择 `Run Configurations` 菜单项。\n2. 在 `Run Configurations` 对话框中，双击左侧窗格中的\
  \ `Android Application`。向导将插入一个名为 `New Configuration` 的新配置。\n3. 将配置重命名为 `RunHelloWorld`。\n\
  4. 点击 `Browse` 按钮，然后选择 `HelloAndroid` 项目。\n5. 在 `Launch Action` 下，选择 `Launch:`，然后从下拉列表中选择\
  \ `com.androidbook.hello.HelloActivity`。对话框应该如图 2-6 所示。\n\n![images](img/0206.jpg)\n\
  \n**图 2–6.** *配置 Eclipse 启动配置以运行 “Hello World!” 应用程序*\n\n6. 点击 `Apply`，然后点击 `Run`。\
  \ 你马上就要成功了！ Eclipse 已准备好运行你的应用程序，但它需要一个设备来运行它。 如图 2-7 所示，系统会警告你未找到兼容的目标，并询问你是否要创建一个。\
  \ 点击 `Yes`。\n\n![images](img/0207.jpg)\n\n**图 2–7.** *关于目标的错误提示，并要求创建一个新的 AVD*\n\
  \n7. 系统将显示一个包含现有 AVD 的窗口（参见图 2-8）。 请注意，这与你在图 2-2 中安装软件包时看到的窗口相同，但现在你查看的是虚拟设备。 你将需要为你的新应用程序添加一个合适的\
  \ AVD。 点击 `New` 按钮。\n\n![images](img/0208.jpg)\n\n**图 2–8.** *现有的 Android 虚拟设备*\n\
  \n8. 填写 `Create AVD` 表单，如图 2-9 所示。 将 `Name` 设置为 `Gingerbread`，为 `Target` 选择 `Android\
  \ 2.3 - API Level 9`（或其他版本），将 `SD Card Size` 设置为 `10`（表示 10MB），启用 `Snapshots`，并为\
  \ `Skin` 选择 `HVGA`。 点击 `Create AVD`。 管理器可能会确认你的 AVD 已成功创建。 点击右上角的 `X` 关闭 `Android\
  \ SDK and AVD Manager` 窗口。\n\n**注意：** 你为 Android 虚拟设备选择的是较新版本的 SDK，但你的应用程序也可以在旧版本上运行。\
  \ 这是可以的，因为具有较新 SDK 的 AVD 可以运行需要旧版 SDK 的应用程序。 反之则不成立：需要新版 SDK 特性的应用程序无法在具有旧版 SDK\
  \ 的 AVD 上运行。\n\n9. 最后，从底部列表中选择你的新 AVD。 请注意，你可能需要点击 `Refresh` 按钮，才能让新的 AVD 显示在列表中。\
  \ 点击 `OK` 按钮。\n10. Eclipse 现在将启动模拟器并运行你的第一个 Android 应用程序（参见图 2-10）！\n\n![images](img/0209.jpg)\n\
  \n**图 2–9.** *配置 Android 虚拟设备*\n\n**注意：** 模拟器可能需要一些时间来模拟设备启动过程。 启动过程完成后，你通常会看到一个锁屏界面。\
  \ 按下 `Menu` 按钮或拖动解锁图像来解锁 AVD。 解锁后，你应该会看到 `HelloAndroidApp` 在模拟器中运行，如图 2-10 所示。 请注意，模拟器在启动过程中会在后台启动其他应用程序，因此你可能会不时看到警告或错误消息。\
  \ 如果看到错误消息，通常可以将其关闭，让模拟器继续执行启动过程的下一步。 例如，如果你运行模拟器并看到类似 “应用程序 abc 无响应” 的消息，你可以等待应用程序启动，或者直接让模拟器强制关闭该应用程序。\
  \ 通常，你应该等待并让模拟器干净地启动。\n\n![images](img/0210.jpg)\n\n**图 2–10.** *HelloAndroidApp\
  \ 在模拟器中运行*\n\n现在你知道了如何创建新的 Android 应用程序并在模拟器中运行它。 接下来，我们将更详细地了解 Android 虚拟设备，然后更深入地研究\
  \ Android 应用程序的产物和结构。\n\n### Android 虚拟设备\n\nAVD 代表一种设备配置。 例如，你可以拥有一个 AVD，代表一台运行\
  \ SDK 1.5 版本并配备 32MB SD 卡的旧款 Android 设备。 其理念是，创建你要支持的 AVD，然后在开发和测试应用程序时，将模拟器指向其中一个\
  \ AVD。 指定（和更改）要使用的 AVD 非常容易，并且可以轻松地使用各种配置进行测试。 之前你已经了解了如何使用 Eclipse 创建 AVD。 你可以在\
  \ Eclipse 中通过进入 `Window` ![image](img/U001.jpg) `Android SDK and AVD Manager`，然后点击左侧的\
  \ `Virtual Devices` 来创建更多 AVD。 你也可以使用命令行创建 AVD。 方法如下。\n\n要创建一个 AVD，你将使用 `tools`\
  \ 目录（`c:\\android-sdk-windows\\tools\\`）下的一个批处理文件 `android`。 `android` 允许你创建新的 AVD\
  \ 和管理现有的 AVD。 例如，你可以查看现有的 AVD、移动 AVD 等。 你可以通过运行 `android –help` 查看使用 `android` 的可用选项。\
  \ 现在，让我们先创建一个 AVD。\n\n默认情况下，AVD 存储在你的主目录（所有平台）下一个名为 `.android\\AVD` 的文件夹中。 如果你为你刚刚创建的\
  \ “Hello World!” 应用程序创建了一个 AVD，那么你将在这里找到它。 如果你想在其他地方存储或操作 AVD，也是可以的。 对于此示例，让我们创建一个用于存储\
  \ AVD 镜像的文件夹，例如 `c:\\avd\\`。 下一步，在 tools 窗口中使用以下命令列出可用的 Android 目标：\n\n```\nandroid\
  \ list target\n```\n\n此命令的输出是一个所有已安装 Android 版本的列表，列表中的每一项都有一个 ID。 现在，运行 `android`\
  \ 文件来创建 AVD。 再次使用 tools 窗口，键入以下命令（根据你的工作站使用适当的路径来存储 AVD 文件，并根据你安装的 SDK 平台目标使用适当的值作为\
  \ `-t` ID 参数）：\n\n```\nandroid create avd -n CupcakeMaps -t 2 -c 16M -p c:\\avd\\\
  CupcakeMaps\\\n```\n\n传递给批处理文件的参数列于表 2-1 中。\n\n**表 2–1.** *传递给 `android.bat` 工具的参数*\n\
  \n| **参数/命令** | **描述** |\n| --- | --- |\n| `create avd` | 指示工具创建一个 AVD。 |\n| `n`\
  \ | AVD 的名称。 |\n| `t` | 目标运行时的 ID。 使用 `android list target` 命令获取每个已安装目标的 ID。 |\n\
  | `c` | SD 卡的大小（以字节为单位）。 使用 `K` 表示千字节，使用 `M` 表示兆字节。 |\n| `p` | 生成的 AVD 的路径。 这是可选的。\
  \ |\n| `A` | 启用快照。 这是可选的。 快照将在后面的 “启动模拟器” 部分中解释。 |\n\n执行上述命令将生成一个 AVD；你应该会看到类似于图\
  \ 2-11 所示的输出。 请注意，当你运行 `create avd` 命令时，系统会询问你是否要创建自定义硬件配置文件。 现在先回答否，但要知道，回答是会提示你为你的\
  \ AVD 配置许多选项，例如屏幕尺寸、相机是否存在等。\n\n![images](img/0211.jpg)\n\n**图 2–11.** *创建 AVD 会产生此\
  \ `android.bat` 输出*\n\n尽管你使用 `android.bat` 程序为 `CupcakeMaps` 指定了备用位置，但在你主目录的 `.android/AVD`\
  \ 文件夹下仍有一个 `CupcakeMaps.ini` 文件。 这是一件好事，因为如果你回到 Eclipse，选择 `Window` ![image](img/U001.jpg)\
  \ `Android SDK and AVD Manager`，你将看到所有的 AVD。 当你在 Eclipse 中运行 Android 应用程序时，你可以访问它们中的任何一个。\n\
  \n\n\n再看一下图 2–4。每个 Android 版本都有一个 API 级别。Android 1.6 的 API 级别为 4，Android 2.1 的 API\
  \ 级别为 7。这些 API 级别编号并不对应`android create avd`命令中`-t`参数所使用的目标 ID。你始终需要使用`android list\
  \ target`命令来获取`android create avd`命令所需的正确目标 ID 值。\n\n另外请注意，从 SDK 目标列表中选择一个 Google\
  \ API 将为你的 AVD 包含地图功能，而选择 Android 1.5 或更高版本则不会。关于地图的更多细节，我们将在第 17 章中详细讨论。\n\n###\
  \ 探索 Android 应用程序的结构\n\n尽管 Android 应用程序的规模和复杂性可能差异很大，但它们的结构是相似的。图 2–12 展示了你刚刚构建的“Hello\
  \ World！”应用程序的结构。\n\n![images](img/0212.jpg)\n\n**图 2–12.** *“Hello World！”应用程序的结构*\n\
  \nAndroid 应用程序有一些必需的和可选的构件。表 2–2 总结了 Android 应用程序的元素。\n\n**表 2–2.** *Android 应用程序的构件*\n\
  \n| **构件** | **描述** | **是否必需？** |\n| --- | --- | --- |\n| `AndroidManifest.xml`\
  \ | Android 应用程序描述文件。此文件定义了应用程序的活动、内容提供者、服务和意图接收器。你还可以使用此文件声明性地定义应用程序所需的权限，以及向使用该应用程序服务的其他应用程序授予特定权限。此外，该文件可以包含用于测试应用程序或其他应用程序的检测细节。\
  \ | 是 |\n| `src` | 包含应用程序所有源代码的文件夹。 | 是 |\n| `assets` | 任意文件夹和文件的集合。 | 否 |\n| `res`\
  \ | 包含应用程序资源的文件夹。这是`drawable`、`anim`、`layout`、`menu`、`values`、`xml`和`raw`的父文件夹。\
  \ | 是 |\n| `drawable` | 包含应用程序使用的图像或图像描述文件的文件夹。 | 否 |\n| `anim` | 包含描述应用程序所用动画的\
  \ XML 描述文件的文件夹。 | 否 |\n| `layout` | 包含应用程序视图的文件夹。你应该使用 XML 描述符而不是编写代码来创建应用程序的视图。\
  \ | 否 |\n| `menu` | 包含应用程序菜单的 XML 描述文件的文件夹。 | 否 |\n| `values` | 包含应用程序使用的其他资源的文件夹。此文件夹中的资源示例包括字符串、数组、样式和颜色。\
  \ | 否 |\n| `xml` | 包含应用程序使用的附加 XML 文件的文件夹。 | 否 |\n| `raw` | 包含应用程序所需附加数据（可能为非 XML\
  \ 数据）的文件夹。 | 否 |\n\n从表 2–2 可以看出，一个 Android 应用程序主要由三部分组成：应用程序描述文件、各种资源的集合以及应用程序的源代码。如果你暂时把`AndroidManifest.xml`文件放在一边，可以用一种简单的方式来审视\
  \ Android 应用：你有一部分用代码实现的业务逻辑，而其他的一切都是资源。这种基本结构类似于 J2EE 应用的基本结构，其中资源对应 JSP，业务逻辑对应\
  \ Servlet，而`AndroidManifest.xml`文件对应`web.xml`文件。\n\n你还可以将 J2EE 的开发模型与 Android 的开发模型进行比较。在\
  \ J2EE 中，构建视图的理念是使用标记语言来构建它们。Android 也采用了这种方法，尽管 Android 中的标记是 XML。你会从这种方法中受益，因为你不必硬编码应用程序的视图；你可以通过编辑标记来修改应用程序的外观和感觉。\n\
  \n另外值得注意的是一些关于资源的限制。首先，Android 只支持`res`下预定义文件夹内的线性文件列表。例如，它不支持`layout`文件夹（或`res`下的其他文件夹）内的嵌套文件夹。其次，`assets`文件夹和`res`下的`raw`文件夹有一些相似之处。两个文件夹都可以包含原始文件，但`raw`中的文件被视为资源，而`assets`中的文件则不是。因此，`raw`中的文件会被本地化，可以通过资源\
  \ ID 访问，等等。而`assets`文件夹的内容被视为通用内容，不受资源约束和资源支持的限制。请注意，由于`assets`文件夹的内容不被视为资源，你可以在其中放置任意层级的文件夹和文件。（我们将在第\
  \ 3 章中详细讨论资源。）\n\n**注意：** 你可能已经注意到 Android 中大量使用了 XML。我们都知道 XML 是一种臃肿的数据格式，因此这就引出了一个问题：当你已知目标设备是资源有限的设备时，依赖\
  \ XML 是否合理？事实证明，你在开发过程中创建的 XML 实际上是通过 Android 资源打包工具（AAPT）编译成二进制文件的。因此，当你的应用程序安装到设备上时，设备上的文件是以二进制格式存储的。当运行时需要该文件时，文件以其二进制形式被读取，而不会转换回\
  \ XML。这让你两全其美——你既能使用 XML 工作，又无需担心占用设备上的宝贵资源。\n\n### 分析便签应用程序\n\n你不仅学会了如何创建一个新的 Android\
  \ 应用程序并在模拟器中运行它，还应该对 Android 应用程序的构件有了一定的了解。接下来，我们将研究一下 Android SDK 自带的便签应用程序。便签的复杂性介于“Hello\
  \ World！”应用程序和完整的 Android 应用程序之间，因此分析其组件将使你对 Android 开发有一些实际的认识。这将是便签应用程序的快速浏览。你可能会觉得其中一些概念目前难以理解，但不用担心；本书将在后续章节中对所有这些概念进行更详细的讲解。\n\
  \n\n\n### 加载并运行记事本应用程序\n\n在本节中，我们将向您展示如何将记事本应用程序加载到 Eclipse IDE 中，并在模拟器中运行它。开始之前，您需要知道记事本应用程序实现了多个用例。例如，用户可以新建笔记、编辑已有笔记、删除笔记、查看已创建的笔记列表等。当用户启动应用程序时，尚未保存任何笔记，因此用户会看到一个空白的笔记列表。如果用户按下菜单键，应用程序会显示一个操作列表，其中包含允许用户添加新笔记的选项。添加笔记后，用户可以通过选择相应的菜单选项来编辑或删除该笔记。\n\
  \n请按照以下步骤将记事本示例加载到 Eclipse IDE 中：\n\n1. 启动 Eclipse。\n2. 转到 **文件** > **新建** > **项目**。\n\
  3. 在**新建项目**对话框中，选择 **Android** > **Android 项目**。\n4. 在**新建 Android 项目**对话框中，在**项目名称**中输入\
  \ `NotesList`，选择“从现有示例创建项目”，然后选择 **构建目标** 为 Android 1.6。在**示例**菜单中，向下滚动到 Notepad\
  \ 应用程序。请注意，Notepad 应用程序位于您之前下载的 Android SDK 的 `platforms\\android-1.6\\samples`\
  \ 文件夹中。选择 Notepad 后，对话框会读取 `AndroidManifest.xml` 文件，并自动填充**新建 Android 项目**对话框中的其余字段。（见图\
  \ 2-13。）\n5. 单击**完成**按钮。\n\n现在您应该在 Eclipse IDE 中看到 `NotesList` 应用程序。如果您在 Eclipse\
  \ 中看到针对此项目报告的任何问题，请尝试使用 Eclipse 的**项目**菜单中的**清理**选项来清除它们。要运行应用程序，您可以创建启动配置（就像您为“Hello\
  \ World!”应用程序所做的那样），或者直接右键单击项目，选择**运行为**，然后选择**Android 应用程序**。这将启动模拟器并将应用程序安装到其上。模拟器完成加载后，解锁模拟器屏幕，这样您就能看到新的\
  \ `NotesList` 应用程序。花几分钟时间熟悉一下这个应用程序。\n\n![image](img/0213.jpg)\n\n**图 2-13.** *创建记事本应用程序*\n\
  \n### 剖析应用程序\n\n现在让我们研究一下应用程序的内容（见图 2-14）。\n\n如您所见，该应用程序包含多个 `.java` 文件、几个 `.png`\
  \ 图片、三个视图（位于 `layout` 文件夹下）以及 `AndroidManifest.xml` 文件。如果这是一个命令行应用程序，您会从查找包含 `Main`\
  \ 方法的类开始。那么，Android 中 `Main` 方法的等效物是什么呢？\n\nAndroid 定义了一个入口 Activity，也称为顶级 Activity。如果您查看\
  \ `AndroidManifest.xml` 文件，会发现一个提供程序（provider）和三个 Activity。`NotesList` Activity\
  \ 为操作 `android.intent.action.MAIN` 和类别 `android.intent.category.LAUNCHER` 定义了一个意图过滤器（intent-filter）。当要求运行一个\
  \ Android 应用程序时，主机加载该应用程序并读取 `AndroidManifest.xml` 文件。然后，它会查找并启动一个或多个具有包含 `MAIN`\
  \ 操作且类别为 `LAUNCHER` 的意图过滤器的 Activity，如下所示：\n\n```\n<intent-filter>\n    <action\
  \ android:name=\"android.intent.action.MAIN\" />\n    <category android:name=\"\
  android.intent.category.LAUNCHER\" />\n</intent-filter>\n```\n\n![image](img/0214.jpg)\n\
  \n**图 2-14.** *记事本应用程序的内容*\n\n主机找到它想要运行的 Activity 后，必须将定义的 Activity 解析为实际的类。它通过组合根包名和\
  \ Activity 名称来实现这一点，在本例中成为 `com.example.android.notepad.NotesList`（见清单 2-1）。\n\n\
  **清单 2-1.** *AndroidManifest.xml 文件*\n\n```\n<manifest\n    package=\"com.example.android.notepad\"\
  \n>\n    <application android:icon=\"@drawable/app_notes\"\n        android:label=\"\
  @string/app_name\"\n    >\n        <provider android:name=\"NotePadProvider\"\n\
  \            android:authorities=\"com.google.provider.NotePad\"\n        />\n \
  \       <activity android:name=\"NotesList\" android:label=\"@string/title_notes_list\"\
  >\n            <intent-filter>\n                <action android:name=\"android.intent.action.MAIN\"\
  \ />\n                <category android:name=\"android.intent.category.LAUNCHER\"\
  \ />\n            </intent-filter>\n            <intent-filter>\n              \
  \  <action android:name=\"android.intent.action.VIEW\" />\n                <action\
  \ android:name=\"android.intent.action.EDIT\" />\n                <action android:name=\"\
  android.intent.action.PICK\" />\n                <category android:name=\"android.intent.category.DEFAULT\"\
  \ />\n                <data android:mimeType=\"vnd.android.cursor.dir/vnd.google.note\"\
  \ />\n            </intent-filter>\n            <intent-filter>\n              \
  \  <action android:name=\"android.intent.action.GET_CONTENT\" />\n             \
  \   <category android:name=\"android.intent.category.DEFAULT\" />\n            \
  \    <data android:mimeType=\"vnd.android.cursor.item/vnd.google.note\" />\n   \
  \         </intent-filter>\n        </activity>\n…\n</manifest>\n```\n\n应用程序的根包名定义为\
  \ `AndroidManifest.xml` 文件中 `<manifest>` 元素的一个属性，并且每个 Activity 都有一个名称属性。\n\n一旦确定了入口点\
  \ Activity，主机就会启动该 Activity，并调用 `onCreate()` 方法。让我们来看看清单 2-2 所示的 `NotesList.onCreate()`。\n\
  \n**清单 2-2.** *onCreate 方法*\n\n```\npublic class NotesList extends ListActivity\
  \ {\n  @Override\n  protected void onCreate(Bundle savedInstanceState) {\n     \
  \ super.onCreate(savedInstanceState);\n\n      setDefaultKeyMode(DEFAULT_KEYS_SHORTCUT);\n\
  \      Intent intent = getIntent();\n      if (intent.getData() == null) {\n   \
  \       intent.setData(Notes.CONTENT_URI);\n      }\n\n      getListView().setOnCreateContextMenuListener(this);\n\
  \n      Cursor cursor = managedQuery(getIntent().getData(), PROJECTION, null, null,\n\
  \              Notes.DEFAULT_SORT_ORDER);\n```\n\n\n\n### Android 活动与数据访问\n\n`SimpleCursorAdapter\
  \ adapter =`\n    `new SimpleCursorAdapter(this, R.layout.noteslist_item,`\n   \
  \      `cursor, new String[] { Notes.TITLE }, new int[] { android.R.id.text1 });`\n\
  `setListAdapter(adapter);`\n\nAndroid 中的活动通常通过 Intent 启动，一个活动可以启动另一个活动。`onCreate()`\
  \ 方法会检查当前活动的 Intent 是否包含数据（笔记）。如果没有，它会设置 URI 以从 Intent 中检索数据。在第 4 章中，我们将展示 Android\
  \ 如何通过操作 URI 的内容提供者来访问数据。在此例中，URI 提供了足够的信息来从数据库中检索数据。常量 `Notes.CONTENT_URI` 在 `Notepad.java`\
  \ 中被定义为 `static final`，具体如下：\n\n`public static final Uri CONTENT_URI =`\n    `Uri.parse(\"\
  content://\" + AUTHORITY + \"/notes\");`\n\n`Notes` 类是 `Notepad` 类的内部类。目前你只需知道，上述\
  \ URI 告知内容提供者获取所有笔记。如果 URI 类似于：\n\n`public static final Uri CONTENT_URI =`\n   \
  \ `Uri.parse(\"content://\" + AUTHORITY + \"/notes/11\");`\n\n那么接收请求的内容提供者将返回 ID\
  \ 为 11 的笔记。我们将在第 4 章深入讨论内容提供者和 URI。\n\n#### NotesList 类与 ListActivity\n\n`NotesList`\
  \ 类继承了 `ListActivity` 类，后者知道如何显示列表型数据。列表中的项由内部的 `ListView`（一个 UI 组件）管理，它负责显示笔记列表。在活动的\
  \ Intent 上设置 URI 后，活动会注册以构建笔记的上下文菜单。如果你试用过该应用，可能会注意到系统会根据你的选择显示上下文相关的菜单项。例如，如果你选择了一条已有笔记，应用会显示“编辑笔记”和“编辑标题”。类似地，如果你没有选择任何笔记，应用会显示“添加笔记”选项。\n\
  \n接下来，你会看到活动执行一个托管查询（managed query）并获取一个游标（cursor）来获取结果集。托管查询意味着 Android 将管理返回的游标。作为游标管理的一部分，如果应用需要被卸载或重新加载，应用或活动都无需担心游标的定位、加载或卸载问题。`managedQuery()`\
  \ 的参数如表 2-3 所示，这些参数相当有趣。\n\n**表 2-3.** `Activity.managedQuery` 的参数\n\n| 参数 | 数据类型\
  \ | 描述 |\n| --- | --- | --- |\n| `URI` | `Uri` | 内容提供者的 URI |\n| `projection` |\
  \ `String[]` | 要返回的列（列名） |\n| `selection` | `String` | 可选的 `where` 子句 |\n| `selectionArgs`\
  \ | `String[]` | 选择条件的参数（如果查询中包含 `?`） |\n| `sortOrder` | `String` | 用于结果集的排序顺序 |\n\
  \n我们将在本节后面以及第 4 章中讨论 `managedQuery()` 及其兄弟方法 `query()`。目前你只需了解，Android 中的查询返回的是表格型数据。`projection`\
  \ 参数允许你定义感兴趣的列。你还可以通过 SQL 的 `order by` 子句（例如 `asc` 或 `desc`）来缩小结果集的范围并对结果集进行排序。另外请注意，Android\
  \ 查询必须返回一个名为 `_ID` 的列，以支持检索单条记录。此外，你必须了解内容提供者返回的数据类型——例如列中包含的是 `string`、`int`、`binary`\
  \ 还是其他类型。\n\n查询执行后，返回的游标会被传递给 `SimpleCursorAdapter` 的构造函数，该适配器将数据集中的记录适配到用户界面（`ListView`）的项中。请仔细观察传递给\
  \ `SimpleCursorAdapter` 构造函数的参数：\n\n```\nSimpleCursorAdapter adapter =\n    new\
  \ SimpleCursorAdapter(this, R.layout.noteslist_item,\n        cursor, new String[]\
  \ { Notes.TITLE }, new int[] { android.R.id.text1 });\n```\n\n具体来说，注意第二个参数：一个代表\
  \ `ListView` 中项的视图的标识符。正如你将在第 3 章中看到的，Android 提供了一个自动生成的工具类，用于提供项目中资源的引用。这个工具类叫做\
  \ `R` 类（resource 的缩写）。它的文件名是 `R.java`，你可以在图 2-14 中看到它。当你编译项目时，AAPT（Android 资源打包工具）会根据你在\
  \ `res` 文件夹中定义的资源为你生成 `R` 类。例如，你可以将所有字符串资源放入 `values` 文件夹，AAPT 会为每个字符串生成一个 `public\
  \ static` 标识符。Android 对你所有的资源都支持这种通用机制。例如，在 `SimpleCursorAdapter` 的构造函数中，`NotesList`\
  \ 活动传入了显示笔记列表中某个项的视图的标识符。这个工具类的好处是，你无需硬编码资源，并且可以获得编译时的引用检查。换句话说，如果某个资源被删除了，`R` 类将失去该引用，任何引用该资源的代码都将无法编译。\n\
  \n#### onListItemClick() 方法\n\n让我们看看之前提到的 Android 中的另一个重要概念：`NotesList` 中的 `onListItemClick()`\
  \ 方法（参见代码清单 2-3）。\n\n**代码清单 2-3.** `onListItemClick` 方法\n\n```\n@Override\nprotected\
  \ void onListItemClick(ListView l, View v, int position, long id) {\n    Uri uri\
  \ = ContentUris.withAppendedId(getIntent().getData(), id);\n\n    String action\
  \ = getIntent().getAction();\n    if (Intent.ACTION_PICK.equals(action) ||\n   \
  \     Intent.ACTION_GET_CONTENT.equals(action)) {\n        setResult(RESULT_OK,\
  \ new Intent().setData(uri));\n    } else {\n        startActivity(new Intent(Intent.ACTION_EDIT,\
  \ uri));\n    }\n}\n```\n\n当用户在界面中选择一条笔记时，会调用 `onListItemClick()` 方法。该方法实现了两种用例。第一种情况，你的笔记列表活动可能通过\
  \ Intent 被调用，以便用户选择一条特定的笔记，并将其返回给调用活动。第二种情况，你可能只是在浏览笔记列表；选择一条笔记后，当前活动将针对所选笔记启动一个编辑活动。当选中一条笔记时，该方法通过获取基础\
  \ URI 并附加所选笔记的 ID 来创建一个 URI。如果你的活动是通过 Intent 被调用来选择笔记或获取笔记内容，你会调用 `setResult()`\
  \ 将所选笔记的 URI 返回给调用者。如果是第二种用例，则 URI 会连同一个新的 Intent 一起传递给 `startActivity()`。`startActivity()`\
  \ 是启动活动的一种方式：它启动一个活动，但不会报告活动完成后的结果。另一种启动活动的方式是使用 `startActivityForResult()`。通过这个方法，你可以启动另一个活动，并通过回调在活动完成时获得通知，从而获取结果。例如，调用\
  \ `NotesList` 来选择笔记的活动会使用 `startActivityForResult()`，这样当你的 `NotesList` 活动调用 `setResult()`\
  \ 后，它们就能收到通知并获得结果。\n\n\n\n关于用户与 Activity 的交互，您可能对此有所疑问。例如，如果正在运行的 Activity 启动了另一个\
  \ Activity，而该 Activity 又启动了另一个 Activity（依此类推），那么用户可以与哪个 Activity 进行交互？她可以同时操作所有\
  \ Activity，还是只能操作单个 Activity？实际上，Activity 具有已定义的生命周期。它们被维护在一个 Activity 栈中，正在运行的\
  \ Activity 位于栈顶。如果正在运行的 Activity 启动了另一个 Activity，则第一个正在运行的 Activity 会移入栈中，新 Activity\
  \ 置于栈顶。栈中位置较低的 Activity 可能处于暂停或停止状态。暂停的 Activity 对用户部分或完全可见；停止的 Activity 对用户不可见。如果系统认为其他地方需要资源，它可能会终止暂停或停止的\
  \ Activity。\n\n接下来，我们讨论数据持久化。用户创建的笔记会保存到设备上的实际数据库中。具体来说，`Notepad` 应用程序的后备存储是一个 SQLite\
  \ 数据库。前面讨论的 `managedQuery()` 方法最终会通过内容提供者解析为数据库中的数据。我们来研究一下传递给 `managedQuery()`\
  \ 的 URI 如何导致对 SQLite 数据库执行查询。回顾一下，传递给 `managedQuery()` 的 URI 如下所示：\n\n```\npublic\
  \ static final Uri CONTENT_URI =\n    Uri.parse(\"content://\" + AUTHORITY + \"\
  /notes\");\n```\n\n内容 URI 始终具有以下形式：`content://`，后跟授权机构（authority），再后跟一个通用段（上下文相关）。由于\
  \ URI 不包含实际数据，它需要以某种方式导致产生数据的代码被执行。这种连接是什么？URI 引用是如何解析为产生数据的代码的？URI 是 HTTP 服务还是\
  \ Web 服务？实际上，URI（或 URI 的授权机构部分）在 `AndroidManifest.xml` 文件中被配置为内容提供者，如下所示：\n\n```\n\
  <provider android:name=\"NotePadProvider\"\n     android:authorities=\"com.google.provider.NotePad\"\
  />\n```\n\n当 Android 看到一个需要解析的 URI 时，它会提取其中的授权机构部分，并查找为该授权机构配置的 `ContentProvider`\
  \ 类。在 `Notepad` 应用程序中，`AndroidManifest.xml` 文件包含一个名为 `NotePadProvider` 的类，该类为 `com.google.provider.NotePad`\
  \ 授权机构配置。清单 2–4 展示了该类的一小部分。\n\n**清单 2–4.** *NotePadProvider 类*\n\n```\npublic class\
  \ NotePadProvider extends ContentProvider\n{\n\n    @Override\n    public Cursor\
  \ query(Uri uri, String[] projection, String selection,\n         String[] selectionArgs,String\
  \ sortOrder) {}\n\n    @Override\n    public Uri insert(Uri uri, ContentValues initialValues)\
  \ {}\n\n    @Override\n    public int update(Uri uri, ContentValues values, String\
  \ where,\n        String[] whereArgs) {}\n\n    @Override\n    public int delete(Uri\
  \ uri, String where, String[] whereArgs) {}\n\n    @Override\n    public String\
  \ getType(Uri uri) {}\n\n    @Override\n    public boolean onCreate() {}\n\n   \
  \ private static class DatabaseHelper extends SQLiteOpenHelper {}\n\n    @Override\n\
  \        public void onCreate(SQLiteDatabase db) {}\n\n        @Override\n     \
  \   public void onUpgrade(SQLiteDatabase db,\n            int oldVersion, int newVersion)\
  \ {\n            //...\n        }\n    }\n}\n```\n\n`NotePadProvider` 类扩展了 `ContentProvider`\
  \ 类。`ContentProvider` 类定义了六个抽象方法，其中四个是 CRUD（创建、读取、更新、删除）操作。另外两个抽象方法是 `onCreate()`\
  \ 和 `getType()`。请注意，`onCreate()` 在内容提供者首次创建时被调用；`getType()` 为结果集提供 MIME 类型（您将在阅读第\
  \ 3 章时了解 MIME 类型的工作原理）。\n\n关于 `NotePadProvider` 类的另一个有趣之处是内部的 `DatabaseHelper` 类，它扩展了\
  \ `SQLiteOpenHelper` 类。这两个类一起负责初始化 `Notepad` 数据库、打开和关闭它，以及执行其他数据库任务。有趣的是，`DatabaseHelper`\
  \ 类只有几行自定义代码（见清单 2–5），而 Android 对 `SQLiteOpenHelper` 的实现完成了大部分繁重的工作。\n\n**清单 2–5.**\
  \ *DatabaseHelper 类*\n\n```\n private static class DatabaseHelper extends SQLiteOpenHelper\
  \ {\n\n        DatabaseHelper(Context context) {\n            super(context, DATABASE_NAME,\
  \ null, DATABASE_VERSION);\n        }\n\n        @Override\n        public void\
  \ onCreate(SQLiteDatabase db) {\n            db.execSQL(\"CREATE TABLE \" + NOTES_TABLE_NAME\
  \ + \" (\"\n                    + Notes._ID + \" INTEGER PRIMARY KEY,\"\n      \
  \              + Notes.TITLE + \" TEXT,\"\n                    + Notes.NOTE + \"\
  \ TEXT,\"\n                    + Notes.CREATED_DATE + \" INTEGER,\"\n          \
  \          + Notes.MODIFIED_DATE + \" INTEGER\"\n                    + \");\");\n\
  \        }\n\n        //…\n}\n```\n\n如清单 2–5 所示，`onCreate()` 方法创建了 Notepad 表。请注意，该类的构造函数使用表名调用了父类的构造函数。父类仅当该表在数据库中不存在时才会调用\
  \ `onCreate()` 方法。另外请注意，Notepad 表中的列之一是我们之前在“剖析应用程序”一节中讨论过的 `_ID` 列。\n\n现在，让我们看看其中一个\
  \ CRUD 操作：`insert()` 方法，如清单 2–6 所示。\n\n**清单 2–6.** *insert() 方法*\n\n```\n//…\nSQLiteDatabase\
  \ db = mOpenHelper.getWritableDatabase();\n        long rowId = db.insert(NOTES_TABLE_NAME,\
  \ Notes.NOTE, values);\n        if (rowId > 0) {\n            Uri noteUri = ContentUris.withAppendedId(\n\
  \                    NotePad.Notes.CONTENT_URI, rowId);\n            getContext().getContentResolver().notifyChange(noteUri,\
  \ null);\n            return noteUri;\n        }\n```\n\n`insert()` 方法使用其内部的 `DatabaseHelper`\
  \ 实例访问数据库，然后插入一条笔记记录。返回的行 ID 随后被追加到 URI，并将一个新的 URI 返回给调用者。\n\n至此，您应该已经熟悉了 Android\
  \ 应用程序的布局方式。您应该能够浏览 `Notepad` 以及 Android SDK 中的其他一些示例。您应该能够运行这些示例并与之交互。现在，让我们来看看\
  \ Android 应用程序的整体生命周期。\n\n\n\n### 审视应用生命周期\n\nAndroid 应用的生命周期由系统根据用户需求、可用资源等因素严格管理。例如，用户可能想要启动一个网页浏览器，但最终由系统决定是否启动该应用。尽管系统是最终管理者，但它会遵循一些明确且合乎逻辑的准则来判断是否加载、暂停或停止一个应用。如果用户当前正在操作某个活动，系统会给予该应用高优先级。反之，如果一个活动不可见，并且系统判定必须关闭某个应用以释放资源，那么它会关闭优先级较低的应用。\n\
  \n这与基于 Web 的 J2EE 应用的生命周期形成对比。J2EE 应用受其运行所在的容器松散管理。例如，J2EE 容器可以在某个应用空闲超过预定时间后将其从内存中移除。但容器通常不会根据负载和/或可用资源来将应用移入或移出内存。J2EE\
  \ 容器通常拥有足够的资源来同时运行大量应用。而在 Android 中，资源更为有限，因此 Android 必须对应用拥有更强的掌控力和权力。\n\n**注意：**\
  \ Android 在独立的进程中运行每个应用，每个进程都承载着自己的虚拟机。这提供了一个受保护的内存环境。通过将应用隔离到单个进程，系统可以控制哪个应用应获得更高优先级。例如，一个正在执行\
  \ CPU 密集型任务的后台进程不能阻止来电。\n\n应用生命周期的概念是合乎逻辑的，但 Android 应用的一个基本方面使问题复杂化了。具体来说，Android\
  \ 应用架构是以组件和集成为导向的。这带来了丰富的用户体验、无缝复用和便捷的应用集成，但也给应用生命周期管理器带来了复杂的任务。\n\n让我们考虑一个典型场景。一位用户正在与某人通电话，需要打开一封电子邮件来回答一个问题。她进入主屏幕，打开邮件应用，打开邮件，点击邮件中的一个链接，并通过阅读网页上的股票报价来回答朋友的问题。这个场景需要四个应用：主屏幕应用、通话应用、邮件应用和浏览器应用。当用户从一个应用导航到下一个应用时，她的体验是无缝的。然而在后台，系统正在保存和恢复应用状态。例如，当用户点击邮件中的链接时，系统会在启动浏览器应用活动以加载\
  \ URL 之前，保存当前正在运行的邮件活动的元数据。实际上，系统在启动另一个活动之前会保存任何活动的元数据，以便稍后能返回到该活动（例如，当用户回退时）。如果内存成为问题，系统将不得不关闭运行某个活动的进程，并在必要时恢复它。\n\
  \nAndroid 对应用及其组件的生命周期非常敏感。因此，你需要理解并处理生命周期事件，才能构建稳定的应用。运行你的 Android 应用及其组件的进程会经历各种生命周期事件，Android\
  \ 提供了你可以实现来回调以处理状态变化。对于初学者，你需要熟悉活动（activity）的各种生命周期回调（见代码清单 2–7）。\n\n**代码清单 2–7.**\
  \ *活动的生命周期方法*\n\n```\nprotected void onCreate(Bundle savedInstanceState);\nprotected\
  \ void onStart();\nprotected void onRestart();\nprotected void onResume();\nprotected\
  \ void onPause();\nprotected void onStop();\nprotected void onDestroy();\n```\n\n\
  代码清单 2–7 列出了 Android 在活动生命周期中调用的生命周期方法。理解系统在何时调用每个方法，对于确保你实现一个稳定的应用至关重要。请注意，你无需对所有方法都做出响应。但如果要响应，请确保也调用了父类的版本。图\
  \ 2–15 展示了状态之间的转换。\n\n![images](img/0215.jpg)\n\n**图 2–15.** *活动的状态转换*\n\n系统可以根据其他正在发生的事件来启动和停止你的活动。当活动被全新创建时，Android\
  \ 会调用 `onCreate()` 方法。`onCreate()` 之后总是紧接着调用 `onStart()`，但 `onStart()` 之前并不总是有 `onCreate()`\
  \ 调用，因为如果你的应用被停止过，`onStart()` 也可能被调用。当 `onStart()` 被调用时，你的活动对用户尚不可见，但即将可见。`onResume()`\
  \ 在 `onStart()` 之后被调用，此时活动刚刚进入前台并可供用户访问。此时，用户可以与你的活动进行交互。\n\n当用户决定切换到另一个活动时，系统会调用你活动的\
  \ `onPause()` 方法。在 `onPause()` 之后，你可能会遇到 `onResume()` 或 `onStop()` 被调用。例如，如果用户将你的活动带回前台，则会调用\
  \ `onResume()`。如果你的活动对用户变为不可见，则会调用 `onStop()`。如果在调用 `onStop()` 后你的活动被带回前台，则会调用 `onRestart()`。如果你的活动位于活动栈中但对用户不可见，并且系统决定销毁你的活动，则会调用\
  \ `onDestroy()`。\n\n上述针对活动的状态模型看起来很复杂，但你并不需要处理所有可能的情况。实际上，你最常处理的是 `onCreate()`、`onResume()`\
  \ 和 `onPause()`。你将使用 `onCreate()` 来为你的活动创建用户界面。在此方法中，你将数据绑定到控件，并为 UI 组件连接事件处理器。在\
  \ `onPause()` 中，你需要将关键数据持久化到应用的数据存储中。这是在系统终止你的应用之前最后一个安全的可调用方法。`onStop()` 和 `onDestroy()`\
  \ 并不保证会被调用，因此不要依赖这些方法来处理关键逻辑。\n\n从上述讨论中我们能得到什么启示？系统管理着你的应用，它可以随时启动、停止或恢复一个应用组件。尽管系统控制着你的组件，但它们并非完全孤立于应用运行。换句话说，如果系统在你的应用中启动了一个活动，你可以依赖该活动中存在一个应用上下文（application\
  \ context）。例如，可以在你的应用的多个活动之间共享全局变量。你可以通过编写 `android.app.Application` 类的扩展并在 `onCreate()`\
  \ 方法中初始化全局变量来实现共享（见代码清单 2–8）。之后，应用中的活动和其他组件在执行时就可以放心地访问这些引用。我们将在第 11 章中进一步讨论这个概念。\n\
  \n**代码清单 2–8.** *Application 类的扩展*\n\n```\npublic class MyApplication extends Application\n\
  {\n    // 全局变量\n    private static final String myGlobalVariable;\n\n    @Override\n\
  \    public void onCreate()\n    {\n        super.onCreate();\n        //... 在此处初始化全局变量\n\
  \        myGlobalVariable = loadCacheData();\n    }\n\n    public static String\
  \ getMyGlobalVariable() {\n        return myGlobalVariable;\n    }\n\n}\n```\n\n\
  \n到目前为止，我们已经介绍了创建新 Android 应用、在模拟器中运行 Android 应用、Android 应用的基本结构以及许多 Android 应用中常见的几个功能。但我们尚未展示如何解决\
  \ Android 应用中会出现的问题。在本章的最后一节，我们将讨论调试。\n\n### 调试你的应用\n\n在你为第一个应用编写了几行代码后，你就会开始思考是否可以在与应用交互的同时进行调试会话。答案是肯定的。Android\
  \ SDK 包含了许多可用于调试目的的工具。这些工具已集成到 Eclipse IDE 中（参见图 2-16 中的小示例）。\n\n![images](img/0216.jpg)\n\
  \n**图 2–16.** *构建 Android 应用时可使用的调试工具*\n\n你在整个 Android 开发过程中会经常使用的工具之一是 `LogCat`。该工具会显示你使用\
  \ `android.util.Log`、异常、`System.out.println` 等方法发出的日志消息。虽然 `System.out.println`\
  \ 也能工作且消息会显示在 `LogCat` 窗口中，但若想从你的应用中记录日志消息，你应使用 `android.util.Log` 类。该类定义了大家熟悉的\
  \ informational、warning 和 error 方法，你可以在 `LogCat` 窗口中对这些方法进行过滤，以便只看到你想看的内容。一个示例 `Log`\
  \ 命令是：\n\n```\nLog.v(\"string TAG\", \"This is my verbose message to write to the\
  \ log\");\n```\n\n`LogCat` 特别棒的一点是，你不仅可以在模拟器中运行应用时查看日志消息，还可以在将真实设备连接到工作站并处于调试模式时查看日志消息。事实上，日志消息会以存储方式保存，这样你甚至可以检索到在记录日志消息时已经断开连接的设备上的最新消息。当你将设备连接到工作站并打开\
  \ `LogCat` 视图时，你将看到最近几百条消息。\n\n关于在真实设备上调试应用，你需要了解两件事。第一，必须在 `AndroidManifest.xml`\
  \ 文件中将应用设置为可调试。这涉及到在 `<application>` 标签中添加 `android:debuggable=\"true\"`。幸运的是，ADT\
  \ 会自动为你正确设置此项。当你为模拟器创建调试构建或直接从 Eclipse 部署到设备时，ADT 会将该属性设置为 `true`。当你导出应用以创建生产版本时，ADT\
  \ 知道不将 debuggable 设置为 `true`。请注意，如果你自己在 `AndroidManifest.xml` 中设置了它，那么无论怎样它都将保持设置状态。第二件要知道的事是，设备必须置于\
  \ USB 调试模式。要找到此设置，请进入设备的“设置”屏幕，然后选择“应用程序”，再选择“开发”。确保勾选了“启用 USB 调试”。\n\n虽然 `LogCat`\
  \ 对于查看日志消息非常有用，但你肯定希望对其运行时的应用有更多的控制权和更详细的信息。你需要熟悉两个 Eclipse 透视图：DDMS 和 Debug。DDMS\
  \ 代表 Dalvik 调试监视器服务器 (Dalvik Debug Monitor Server)。该透视图能让你深入了解模拟器或设备上正在运行的应用、应用内的线程、应用内的堆（或内存），此外还有一个文件浏览器和一个模拟器控制器，以便你可以模拟\
  \ GPS 事件、来电或短信。文件浏览器允许你浏览设备上的文件系统，甚至可以在设备（或模拟器）和工作站之间推送或拉取文件。你还可以强制执行垃圾回收、终止应用以及截取屏幕截图。\n\
  \n在 DDMS 中，你可以选择正在运行的应用之一并连接到它进行调试。这将带你进入 Debug 透视图。你也可以从 Java 透视图开始调试应用，方法是右键单击它并选择“调试方式”![image](img/U001.jpg)\
  \ “Android 应用程序”；这同样会带你进入 Debug 透视图。无论哪种方式，Eclipse 都提供了跟踪线程、在代码中设置和清除断点、检查变量以及单步执行或跳入语句的功能。它是解决应用程序问题的强大工具。\n\
  \n你可以通过选择 Eclipse 中的 DDMS 或 Debug 透视图来查看这些工具。你也可以通过进入“窗口”![image](img/U001.jpg)\
  \ “显示视图”![image](img/U001.jpg) “其他”![image](img/U001.jpg) “Android” 来启动每个工具。例如，如果你想要在\
  \ Java 透视图中使用 `LogCat` 或文件浏览器，只需执行“窗口”![image](img/U001.jpg) “显示视图”即可添加它。\n\n你还可以通过使用\
  \ `android.os.Debug` 类来获取 Android 应用的详细跟踪信息，该类提供了一个开始跟踪方法（`Debug.startMethodTracing(\"\
  basename\")`）和一个停止跟踪方法（`Debug.stopMethodTracing()`）。Android 会在设备（或模拟器）的 SD 卡上创建一个跟踪文件，文件名为“basename.trace”。然后，你可以将跟踪文件复制到你的工作站，并使用\
  \ Android SDK tools 目录中包含的 `traceview` 工具查看跟踪器输出，该工具的唯一参数是跟踪文件名。第 19 章 详细介绍了 SD\
  \ 卡以及如何从中提取文件。\n\n你还可以使用命令行（或工具窗口）中的其他几个调试工具。Android 调试桥 (`adb`) 命令允许你安装、更新和删除应用。你可以在模拟器或设备上启动一个\
  \ shell，然后从中运行 Android 提供的 Linux 命令子集。例如，你可以浏览文件系统、列出进程、读取日志，甚至连接到 SQLite 数据库并执行\
  \ SQL 命令。\n\n另一种强大的技术是运行模拟器控制台，该控制台显然只适用于模拟器。要在模拟器启动并运行后开始使用，你可以在工具窗口中输入以下内容：\n\n\
  ```\ntelnet localhost port#\n```\n\n其中，`port#` 是模拟器正在监听的端口。`port#` 通常显示在模拟器窗口标题中，通常是像\
  \ 5554 这样的值。模拟器控制台启动后，你可以输入命令来模拟 GPS 事件、短信，甚至电池和网络状态的变化。\n\n\n#### 启动模拟器\n\n之前我们展示了如何在\
  \ Eclipse 中从项目启动模拟器。大多数情况下，你会希望先启动模拟器，然后在运行的模拟器中部署和测试应用。要随时启动模拟器，请先通过运行 Android\
  \ SDK 中`tools`目录下的`android`程序，或从 Eclipse 的`Window`菜单进入 Android SDK 和 AVD 管理器。进入管理器后，点击左侧的`Virtual\
  \ devices`，从右侧列表中选择所需的 AVD，然后点击`Start`。\n\n点击`Start`按钮后，会弹出启动选项对话框（见图 2–17）。你可以在此调整模拟器窗口的缩放比例，并修改启动和关闭选项。使用中小屏幕设备的\
  \ AVD 时，通常直接采用默认屏幕尺寸即可。但对于大屏及超大屏设备（如平板电脑），默认屏幕尺寸可能无法在工作站屏幕上完美显示。此时可勾选\"Scale display\
  \ to real size\"并输入数值。这个标签表述可能有些误导，因为平板电脑的屏幕密度可能与工作站不同，模拟器无法完美匹配实际物理尺寸。例如在我的工作站屏幕上模拟\
  \ 10 英寸 Honeycomb 平板时，\"实际尺寸\"10 英寸对应的缩放比例为 0.64，实际显示比 10 英寸略大。请根据你的屏幕尺寸和密度选择合适的数值。\n\
  \n![images](img/0217.jpg)\n\n**图 2–17.** *启动选项对话框*\n\n启动选项对话框也是管理快照的地方。启用保存快照功能后，退出模拟器时会增加等待时间。顾名思义，系统会将模拟器当前状态写入快照镜像文件，下次启动时可直接加载，无需经历完整的\
  \ Android 启动流程。存在快照时启动速度会显著提升，使得保存时的延迟完全值得——你基本上可以从上次中断的地方继续工作。若想完全重新开始，可选择`Wipe\
  \ user data`清除用户数据。你还可以取消勾选`Launch from snapshot`，保留用户数据并正常启动。或者创建理想快照后*仅*启用`Launch\
  \ from snapshot`选项；这样每次都会重复使用该快照，启动和关闭速度都很快，因为退出时不会创建新的快照镜像文件。快照镜像文件与其他 AVD 镜像文件存储在同一目录中。要使用\
  \ AVD 快照功能，必须在创建 AVD 时启用快照选项。\n\n#### StrictMode\n\nAndroid 2.3 引入了名为`StrictMode`的新调试功能，据\
  \ Google 称该功能已用于改善数百个 Android 版 Google 应用。它究竟做什么？它会报告线程策略和虚拟机策略的违规情况。检测到策略违规时，你会收到包含堆栈跟踪的警报，显示违规发生时应用的状态。你可以选择强制崩溃，或仅记录警报并让应用继续运行。策略细节可能较难确定，我们预计随着\
  \ Android 发展，Google 会不断添加新策略。\n\n`StrictMode`目前包含两种策略。第一种是线程策略，主要针对主线程（也称 UI 线程）。在主线程进行磁盘读写或网络访问均非良策。Google\
  \ 已在磁盘和网络代码中嵌入`StrictMode`钩子；如果你为某线程启用`StrictMode`且该线程执行了磁盘或网络操作，就会收到警报。你可以选择`ThreadPolicy`中需要监控的违规类型，并可自定义警报方式。可监控的违规包括自定义缓慢调用、磁盘读取、磁盘写入和网络访问。警报方式可选择写入\
  \ LogCat、显示对话框、闪烁屏幕、写入 DropBox 日志文件或使应用崩溃。最常用的选择是写入 LogCat 或使应用崩溃。清单 2–9 展示了设置线程策略`StrictMode`的示例。\n\
  \n**清单 2–9.** *设置 StrictMode 的线程策略*\n\n```\nStrictMode.setThreadPolicy(new StrictMode.ThreadPolicy.Builder()\n\
  \       .detectDiskReads()\n       .detectDiskWrites()\n       .detectNetwork()\n\
  \       .penaltyLog()\n       .build());\n```\n\n注意`Builder`类让`StrictMode`设置变得非常简单。`Builder`中定义策略的方法都会返回`Builder`对象引用，因此这些方法可以像清单\
  \ 2–9 那样链式调用。最后的`build()`方法返回`ThreadPolicy`对象，这正是`StrictMode`的`setThreadPolicy()`方法所需的参数。注意`setThreadPolicy()`是静态方法，因此无需实例化`StrictMode`对象。`setThreadPolicy()`内部会为当前线程应用策略，后续线程操作将根据`ThreadPolicy`进行评估并在必要时触发警报。此示例代码定义了检测磁盘读取、磁盘写入和网络访问的警报策略，并通过\
  \ LogCat 输出消息。你也可以用`detectAll()`方法替代具体检测方法。还可以使用不同或额外的惩罚方法，例如使用`penaltyDeath()`让应用在向\
  \ LogCat 写入`StrictMode`警报消息（由`penaltyLog()`方法调用触发）后崩溃。\n\n由于你是在线程上启用`StrictMode`，启用后无需重复操作。因此可以在主线程运行的主\
  \ Activity 的`onCreate()`方法开头启用`StrictMode`，此后主线程上的所有操作都会受监控。根据要检测的违规类型，首个 Activity\
  \ 可能就足以完成启用操作。你也可以通过继承`Application`类并在其`onCreate()`方法中添加`StrictMode`设置来启用。理论上任何线程运行处都能设置`StrictMode`，但完全无需处处调用设置代码——只需设置一次即可。\n\
  \n\n\n类似`ThreadPolicy`，`StrictMode`还有一个`VmPolicy`。`VmPolicy`可以检测内存泄漏，例如`SQLite`对象在关闭前被终结，或者任何`Closeable`对象在关闭前被终结。`VmPolicy`通过类似的`Builder`类创建，如清单\
  \ 2–10 所示。`VmPolicy`与`ThreadPolicy`的一个区别是，`VmPolicy`无法通过对话框发出警告。\n\n**清单 2–10.**\
  \ 设置`StrictMode`的`VmPolicy`\n\n```\nStrictMode.setVmPolicy(new StrictMode.VmPolicy.Builder()\n\
  \    .detectLeakedSqlLiteObjects()\n    .penaltyLog()\n    .penaltyDeath()\n   \
  \ .build());\n```\n\n由于设置发生在某个线程上，即使控制流从一个对象转移到另一个对象，`StrictMode`也能发现违规行为。当违规发生时，你可能会惊讶地发现代码运行在主线程上，但堆栈跟踪会帮助你追溯问题的根源。随后你可以采取措施解决该问题，将该代码移至其自己的后台线程，或者也可以决定维持现状。这完全取决于你。当然，你可能希望在应用程序上线时关闭`StrictMode`，因为你不想因为它发出警告而导致用户应用崩溃。\n\
  \n有几种方法可以在生产应用程序中关闭`StrictMode`。最直接的方法是移除相关调用，但这会使后续开发变得更加困难。你可以始终定义一个应用程序级别的布尔变量，并在调用`StrictMode`代码之前对其进行测试。在发布应用程序前将该布尔值设置为`false`，即可有效禁用`StrictMode`。一种更优雅的方法是利用应用程序的调试模式，该模式在`AndroidManifest.xml`中定义。该文件中`<application>`标签的一个属性是`android:debuggable`。当需要调试应用程序时，可以将该值设置为`true`，这会使`ApplicationInfo`对象获得一个标记，你可以在代码中读取该标记。清单\
  \ 2–11 展示了如何利用这一点，使应用程序在调试模式下激活`StrictMode`（而在非调试模式下，`StrictMode`不激活）。\n\n**清单 2–11.**\
  \ 仅针对调试模式设置`StrictMode`\n\n```\n// Return if this application is not in debug mode\n\
  ApplicationInfo appInfo = context.getApplicationInfo();\nint appFlags = appInfo.flags;\n\
  if ((appFlags & ApplicationInfo.FLAG_DEBUGGABLE) != 0) {\n    // Do StrictMode setup\
  \ here\n}\n```\n\n使用 Eclipse 进行开发时，ADT 会自动为你设置`debuggable`属性，这使得管理更加容易。当你从 Eclipse\
  \ 部署到模拟器或直接部署到设备时，Eclipse 会将该属性设置为`true`，从而在上述代码中启用`StrictMode`。当你导出应用程序以创建生产版本时，ADT\
  \ 会将其设置为`false`。请注意，如果你自己设置了该属性，ADT 将不会更改它。\n\n这些方法都很好，但它们不适用于 Android 2.3 之前的版本。要显式使用`StrictMode`，你必须部署到运行\
  \ Android 2.3 或更高版本的环境中。如果你部署到 2.3 之前的任何版本，将会出现验证错误，因为该版本中不存在`StrictMode`类。\n\n\
  为了在旧版 Android（即 2.3 之前）中使用`StrictMode`，你可以利用反射技术，以便在`StrictMode`方法可用时间接调用它们，并在不可用时优雅地失败。最简单的方法如清单\
  \ 2–12 所示：调用一个专门为处理旧版 Android 而创建的特殊方法。\n\n**清单 2–12.** 使用反射调用`StrictMode`\n\n```\n\
  try {\n   Class sMode = Class.forName(\"android.os.StrictMode\");\n   Method enableDefaults\
  \ = sMode.getMethod(\"enableDefaults\");\n   enableDefaults.invoke(null);\n}\ncatch(Exception\
  \ e) {\n    // StrictMode not supported on this device, punt\n    Log.v(\"StrictMode\"\
  , \"... not supported. Skipping...\");\n}\n```\n\n这段代码检查`StrictMode`类是否存在，如果存在，则调用其`enableDefaults()`方法。如果未找到`StrictMode`，你的`catch`块会捕获到`ClassNotFoundException`。如果`StrictMode`存在，你不应收到任何异常，因为`enableDefaults()`是它的方法之一。`enableDefaults()`方法会设置`StrictMode`，以检测所有违规行为并将任何违规记录到`LogCat`。由于你调用的这个`StrictMode`方法是静态方法，因此你在调用时指定`null`作为第一个参数。\n\
  \n有时你可能不希望报告所有违规行为。在主线程之外的线程上设置`StrictMode`是完全可行的，在这种情况下，你可以选择仅对部分违规行为发出警报。例如，你也许可以接受在你监控的线程上进行磁盘读取操作。如果是这种情况，你可以选择不在`Builder`上调用`detectDiskReads()`，或者调用`detectAll()`，然后在`Builder`上调用`permitDiskReads()`。其他策略选项也有类似的`permit`方法。但是，如果你想在\
  \ Android 2.3 之前的版本上做到这一点，有办法吗？当然有！\n\n如果`StrictMode`在你的应用程序中不可用，尝试访问它时会抛出`VerifyError`。如果你将`StrictMode`封装在一个类中，然后捕获该错误，就可以在`StrictMode`不可用时忽略它，在可用时正常使用。清单\
  \ 2–13 展示了一个你可以添加到应用程序中的`StrictModeWrapper`类示例，清单 2–14 展示了在你的应用程序中设置`StrictMode`的代码。\n\
  \n**清单 2–13.** 在 Android 2.3 之前版本中使用`StrictMode`\n\n```\nimport android.content.Context;\n\
  import android.content.pm.ApplicationInfo;\nimport android.os.StrictMode;\n\npublic\
  \ class StrictModeWrapper {\n    public static void init(Context context) {\n  \
  \      // check if android:debuggable is set to true\n        int appFlags = context.getApplicationInfo().flags;\n\
  \        if ((appFlags & ApplicationInfo.FLAG_DEBUGGABLE) != 0) {\n            StrictMode.setThreadPolicy(new\
  \ StrictMode.ThreadPolicy.Builder()\n                .detectDiskReads()\n      \
  \          .detectDiskWrites()\n                .detectNetwork()\n             \
  \   .penaltyLog()\n                .build());\n            StrictMode.setVmPolicy(new\
  \ StrictMode.VmPolicy.Builder()\n                .detectLeakedSqlLiteObjects()\n\
  \                .penaltyLog()\n                .penaltyDeath()\n              \
  \  .build());\n        }\n    }\n}\n```\n\n你可以看到，这与你之前的代码非常相似，只是将到目前为止学到的所有内容结合在了一起。最后，为了在你的应用程序中设置`StrictMode`，你只需要添加清单\
  \ 2–14 中所示的代码。\n\n**清单 2–14.** 在 Android 2.3 之前版本中调用`StrictMode`\n\n```\ntry {\n\
  \    StrictModeWrapper.init(this);\n}\ncatch(Throwable throwable) {\n    Log.v(\"\
  StrictMode\", \"... is not available. Punting...\");\n}\n```\n\n请注意，`this`是当前对象（例如主\
  \ Activity 的`onCreate()`方法中）的本地上下文。清单 2–14 中的代码适用于任何 Android 版本。\n\n\n\n作为读者练习，请进入\
  \ Eclipse 并复制本章前面部分的记事本示例。然后使用代码清单 2–13 中的代码，在 `src` 文件夹下添加一个新类。在 `NotesList.java`\
  \ 的 `onCreate()` 方法中，添加如代码清单 2–14 所示的代码，然后在模拟器中分别运行于 Android 2.3 之前版本和 Android 2.3\
  \ 及之后版本上。当 `StrictMode` 不可用时，你应在 LogCat 中看到提示 `StrictMode` 不存在的消息，但应用程序仍能正常运行。当\
  \ `StrictMode` 可用时，在使用记事本应用程序时，你应能在 LogCat 中偶尔看到违规消息。\n\n本章我们展示了如何搭建用于构建 Android\
  \ 应用的开发环境。我们讨论了 Android 应用程序接口的一些基本构建块，并介绍了视图、活动、意图、内容提供者及服务。随后，我们结合上述构建块与应用程序组件分析了记事本应用。接着，我们探讨了\
  \ Android 应用程序生命周期的重要性。最后，我们向您介绍了部分与 Eclipse IDE 集成的 Android SDK 调试工具。\n\n至此，您的\
  \ Android 开发基础已奠定。下一章将详细讨论资源。\n\n"
- '# 第 3 章


  '
- "# 理解 Android 资源\n\n在第 2 章中，我们概述了 Android 应用程序，并快速了解了其一些基本概念。您还学习了 Android SDK、Eclipse\
  \ Android 开发工具 (ADT)，以及如何通过 Android 虚拟设备 (AVD) 在模拟器上运行应用程序。\n\n在本章及接下来几章，我们将深入探讨\
  \ Android SDK 基础知识，涵盖资源、内容提供者和意图。这三个概念是理解 Android 编程的基础，为您学习后续章节内容打下坚实基础。\n\nAndroid\
  \ 依赖资源以声明方式定义用户界面组件。这种声明式方法与 HTML 使用声明式标签定义用户界面的方式并无本质区别。从这个意义上说，Android 在用户界面开发方法上颇具前瞻性。Android\
  \ 还允许对这些资源进行本地化。本章将介绍 Android 中可用的各类资源及其使用方法。\n\n### 理解资源\n\n资源在 Android 架构中扮演着关键角色。Android\
  \ 中的资源可以是文件（如音乐文件）或值（如对话框标题），这些文件或值绑定到可执行应用程序。它们以无需重新编译应用程序即可更改的方式绑定到可执行文件。\n\n\
  常见的资源示例包括字符串、颜色和位图。例如，与其在应用程序中硬编码字符串，不如使用它们的 ID。这种间接性允许您更改字符串资源的文本而无需修改源代码。\n\n\
  Android 中有许多资源类型。本章将介绍其中一部分。让我们从一种非常常见的资源——字符串开始讨论。\n\n#### 字符串资源\n\nAndroid 允许您在一个或多个\
  \ XML 资源文件中定义字符串。这些包含字符串资源定义的 XML 文件位于 `/res/values` 子目录下。XML 文件的名称是任意的，但通常你会看到文件名为\
  \ `strings.xml`。代码清单 3–1 展示了一个字符串资源文件的示例。\n\n**代码清单 3–1.** *示例 strings.xml 文件*\n\
  \n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<resources>\n    <string name=\"\
  hello\">hello</string>\n    <string name=\"app_name\">hello appname</string>\n</resources>\n\
  ```\n\n**注意：** 请注意，在某些 Eclipse 版本中，`<resources>` 节点需要使用 \"`xmlns`\" 规范进行限定。只要存在该规范，无论\
  \ `xmlns` 指向何处似乎都不影响。以下两种变体都有效：\n\n```\n<resources >\n```\n\n或者\n\n```\n<resources\
  \ >\n```\n\n当此文件被创建或更新时，Eclipse ADT 插件会在应用程序的根包中自动创建或更新一个名为 `R.java` 的 Java 类，并为指定的两个字符串资源分配唯一\
  \ ID。\n\n请注意以下示例中 `R.java` 文件的位置。我们给出了一个项目（例如 MyProject）的顶层目录结构。\n\n```\n\\MyProject\n\
  \   \\src\n         \\com\\mycompany\\android\\my-root-package\n         \\com\\\
  mycompany\\android\\my-root-package\\another-package\n   \\gen\n      \\com\\mycompany\\\
  android\\my-root-package\\R.java\n   \\assets\n   \\res\n   \\AndroidManifest.xml\n\
  .....等\n```\n\n**注意：** 无论资源文件数量有多少，只有一个 `R.java` 文件。\n\n对于代码清单 3–1 中的字符串资源文件，更新后的\
  \ `R.java` 文件将包含代码清单 3–2 中的条目。\n\n**代码清单 3–2.** *R.java 示例*\n\n```\npackage com.mycompany.android.my-root-package;\n\
  public final class R {\n   ...根据项目和应用程序的其他条目\n\n    public static final class string\n\
  \   {\n      ...根据项目和应用程序的其他条目\n\n      public static final int hello=0x7f040000;\n\
  \        public static final int app_name=0x7f040001;\n\n      ...根据项目和应用程序的其他条目\n\
  \    }\n   ...根据项目和应用程序的其他条目\n}\n```\n\n首先，请注意 `R.java` 如何在根包中定义了一个顶层类：`public static\
  \ final class R`。在 `R` 外部类内部，Android 定义了一个内部类，即 `static final class string`。`R.java`\
  \ 创建此内部静态类作为命名空间来保存字符串资源 ID。\n\n两个以变量名 `hello` 和 `app_name` 定义的 `static final int`\
  \ 是代表相应字符串资源的资源 ID。你可以通过以下代码结构在源代码中使用这些资源 ID：\n\n```\nR.string.hello\n```\n\n请注意，这些生成的\
  \ ID 指向 `int` 而非 `string`。大多数接受字符串的方法也会将这些资源标识符作为输入接受。Android 会在必要时将这些 `int` 解析为\
  \ `strings`。\n\n大多数示例应用将所有字符串定义在一个 `strings.xml` 文件中，这仅是一种约定。只要 XML 文件的结构与代码清单 3–1\
  \ 类似且文件位于 `/res/values` 子目录下，Android 可以接受任意数量的文件。\n\n该文件的结构易于理解。根节点为 `<resources>`，后跟一个或多个子元素\
  \ `<string>`。每个 `<string>` 元素或节点都有一个名为 `name` 的属性，该属性最终将作为 `id` 属性出现在 `R.java` 中。\n\
  \n为了验证该子目录下允许存在多个字符串资源文件，你可以在同一子目录中放置另一个内容如代码清单 3–3 所示的文件，并将其命名为 `strings1.xml`。\n\
  \n**代码清单 3–3.** *附加 strings.xml 文件示例*\n\n```\n<?xml version=\"1.0\" encoding=\"\
  utf-8\"?>\n<resources>\n    <string name=\"hello1\">hello 1</string>\n    <string\
  \ name=\"app_name1\">hello appname 1</string>\n</resources>\n```\n\nEclipse ADT\
  \ 插件将在编译时验证这些 ID 的唯一性，并将它们作为两个附加常量 `R.string.hello1` 和 `R.string.app_name1` 放入 `R.java`\
  \ 中。\n\n\n\n#### 布局资源\n\n在 Android 中，屏幕的视图通常从作为资源的 XML 文件中加载。这些 XML 文件被称为布局资源。*布局资源*是\
  \ Android UI 编程中使用的关键资源。请参考清单 3-4 中的代码片段，了解一个示例 Android Activity。\n\n**清单 3-4.**\
  \ *使用布局文件*\n\n```\npublic class HelloWorldActivity extends Activity\n{\n    @Override\n\
  \    public void onCreate(Bundle savedInstanceState)\n    {\n        super.onCreate(savedInstanceState);\n\
  setContentView(R.layout.main);\n        TextView tv = (TextView)this.findViewById(R.id.text1);\n\
  \        tv.setText(\"Try this text instead\");\n    }\n    ...\n}\n```\n\n代码行 `setContentView(R.layout.main)`\
  \ 表明存在一个名为 `R.layout` 的静态类，并且在该类中有一个名为 `main` 的常量（一个整数），指向一个由 XML 布局资源文件定义的 `View`。该\
  \ XML 文件的名称为 `main.xml`，需要放置在资源的 `layout` 子目录中。换句话说，这条语句要求程序员创建文件 `/res/layout/main.xml`，并在其中放置必要的布局定义。`main.xml`\
  \ 布局文件的内容可能如清单 3-5 所示。\n\n**清单 3-5.** *示例 `main.xml` 布局文件*\n\n```\n<?xml version=\"\
  1.0\" encoding=\"utf-8\"?>\n<LinearLayout\n    android:orientation=\"vertical\"\n\
  \    android:layout_width=\"fill_parent\"\n    android:layout_height=\"fill_parent\"\
  \n    >\n<TextView    android:id=\"@+id/text1\"\n    android:layout_width=\"fill_parent\"\
  \n    android:layout_height=\"wrap_content\"\n    android:text=\"@string/hello\"\
  \n    />\n <Button    android:id=\"@+id/b1\"\n    android:layout_width=\"fill_parent\"\
  \n    android:layout_height=\"wrap_content\"\n    android:text=\"@string/hello\"\
  \n   />\n</LinearLayout>\n```\n\n清单 3-5 中的布局文件定义了一个名为 `LinearLayout` 的根节点，其中包含一个\
  \ `TextView` 后跟一个 `Button`。`LinearLayout` 将其子元素垂直或水平排列——在此示例中为垂直排列。\n\n你需要为每个屏幕（或\
  \ Activity）定义一个单独的布局文件。更准确地说，每个布局都需要一个专属文件。如果你要绘制两个屏幕，则很可能需要两个布局文件，例如 `/res/layout/screen1_layout.xml`\
  \ 和 `/res/layout/screen2_layout.xml`。\n\n**注意：** `/res/layout/` 子目录中的每个文件都会根据文件名（不包括扩展名）生成一个唯一常量。对于布局，重要的是文件的数量；而对于字符串资源，重要的是文件*内部*各个字符串资源的数量。\n\
  \n例如，如果你在 `/res/layout/` 下有两个文件，分别名为 `file1.xml` 和 `file2.xml`，则在 `R.java` 中会有以下条目：\n\
  \n**清单 3-6.** *多个布局文件的多个常量*\n\n```\n    public static final class layout {\n   \
  \   .... 任何其他文件\n        public static final int file1=0x7f030000;\npublic static\
  \ final int file2=0x7f030001;\n    }\n```\n\n这些布局文件中定义的视图（例如 `TextView`，参见清单 3-5）可以通过\
  \ `R.java` 中生成的资源 ID 在 Java 代码中访问：\n\n```\nTextView tv = (TextView)this.findViewById(R.id.text1);\n\
  tv.setText(\"Try this text instead\");\n```\n\n在此示例中，你通过使用 `Activity` 类的 `findViewById`\
  \ 方法来定位 `TextView`。常量 `R.id.text1` 对应于为 `TextView` 定义的 ID。布局文件中 `TextView` 的 `id`\
  \ 如下所示：\n\n```\n<TextView android:id=\"@+id/text1\"\n..\n</TextView>\n```\n\n`id`\
  \ 属性的属性值表明，将使用一个名为 `text1` 的常量来在该 Activity 管理的所有视图中唯一标识此视图。`@+id/text1` 中的加号（`+`）意味着如果\
  \ ID `text1` 尚不存在，则将其创建出来。此资源 ID 语法还有更多内容。我们接下来将讨论。\n\n#### 资源引用语法\n\n无论资源类型如何（我们目前涵盖的两种是字符串和布局），所有\
  \ Android 资源在 Java 源代码中都是通过其 `id` 来标识（或引用）的。你在 XML 文件中为资源分配 `id` 所使用的语法被称为*资源引用语法*。上一示例中的\
  \ `id` 属性语法 `@+id/text1` 具有以下形式结构：\n\n```\n@[package:]type/name\n```\n\n`type` 对应于\
  \ `R.java` 中可用的资源类型命名空间之一，以下是一些示例：\n\n*   `R.drawable`\n*   `R.id`\n*   `R.layout`\n\
  *   `R.string`\n*   `R.attr`\n*   `R.plural`\n*   `R.array`\n\nXML 资源引用语法中对应的类型如下：\n\
  \n*   `drawable`\n*   `id`\n*   `layout`\n*   `string`\n*   `attr`\n*   `plurals`\n\
  *   `string-array`\n\n资源引用 `@[package:]type/name` 中的 `name` 部分是赋予资源的名称（例如，清单 3-5\
  \ 中的 `text1`）；它也会在 `R.java` 中表示为一个 `int` 常量。\n\n如果你在语法 `@[package:]type/name` 中未指定任何包，则\
  \ `type/name` 对将根据本地资源和应用程序的本地 `R.java` 包来解析。\n\n如果你指定了 `android:type/name`，则该引用\
  \ ID 将使用包 `android` 来解析，具体通过 `android.R.java` 文件。你可以使用任何 Java 包名替换 `package` 占位符，以定位正确的\
  \ `R.java` 文件来解析引用。基于此信息，让我们分析一些示例。当你阅读清单 3-7 时，请注意，ID `android:id` 的左侧部分不属于该语法。`\"\
  android:id\"` 只是你为 `TextView` 等控件分配 ID 的方式。\n\n**清单 3-7.** *探索资源引用语法*\n\n```\n<TextView\
  \  android:id=\"text\">\n// 编译错误，因为 id 不接受原始文本字符串\n\n<TextView  android:id=\"@text\"\
  >\n// 错误的语法。@text 缺少类型名称\n// 它应该是 @id/text 或 @+id/text 或 @string/string1\n// 你将收到错误：\"\
  No Resource type specified\"（未指定资源类型）\n\n<TextView  android:id=\"@id/text\">\n//错误：未找到与\
  \ id \"text\" 匹配的资源\n//除非你事先已定义 \"text\" 为一个 ID\n\n<TextView  android:id=\"@android:id/text\"\
  >\n// 错误：资源不是公共的\n// 表示 android.R.id 中不存在此类 id\n// 当然，如果 Android 的 R.java 定义了具有此名称的\
  \ id，这将是有效的\n\n<TextView  android:id=\"@+id/text\">\n//成功：在本地包的 R.java 中创建了一个名为\
  \ \"text\" 的 id\n```\n\n在语法 `\"@+id/text\"` 中，加号具有特殊含义。它告诉 Android，ID `text` 可能尚不存在，如果确实如此，则创建一个新的\
  \ ID 并将其命名为 `text`。\n\n\n\n##### 为后续使用定义自己的资源 ID\n\n分配 `id` 的一般模式是创建一个新 ID，或者使用\
  \ Android 包创建的 ID。不过也可以预先创建 `id`，并在你自己的包中后续使用。\n\n上一段代码中的 `<TextView  android:id=\"\
  @+id/text\">` 这一行表明，如果已存在名为 `text` 的 `id`，则直接使用它；如果该 `id` 不存在，则会创建一个新的。那么，什么时候像\
  \ `text` 这样的 `id` 会已经存在于 `R.java` 中并被复用呢？\n\n你可能倾向于在 `R.java` 中放入像 `R.id.text` 这样的常量，但\
  \ `R.java` 是不可编辑的。即使可编辑，每次 `/res/*` 子目录中的内容发生更改、添加或删除时，它都会被重新生成。\n\n解决方案是使用一个名为\
  \ `item` 的资源标签来定义一个不依附于任何特定资源的 `id`。代码清单 3–8 展示了一个示例。\n\n**代码清单 3–8.** *预定义 ID*\n\
  \n```xml\n<resources>\n<item type=\"id\" name=\"text\"/>\n</resources>\n```\n\n\
  `type` 指的是资源的类型——此处为 `id`。一旦这个 `id` 就位，代码清单 3–9 中的 `View` 定义就能生效。\n\n**代码清单 3–9.**\
  \ *复用预定义的 ID*\n\n```xml\n<TextView android:id=\"@id/text\">\n..\n</TextView>\n```\n\
  \n##### 已编译与未编译的 Android 资源\n\nAndroid 主要通过两种类型的文件来支持资源：XML 文件和原始文件（例如图片、音频和视频）。即使在\
  \ XML 文件中，你也已经看到，有些情况下资源被定义为 XML 文件内部的值（例如字符串），而另一些情况下，整个 XML 文件作为一个整体就是资源（比如布局资源文件）。\n\
  \n进一步区分 XML 文件集，你会发现两种类型：一种会被编译成二进制格式，另一种则会原样复制到设备上。到目前为止你看到的示例——字符串资源 XML 文件和布局资源\
  \ XML 文件——在成为可安装包的一部分之前，都会被编译成二进制格式。这些 XML 文件具有预定义的格式，其中 XML 节点会被转换为 ID。\n\n你也可以选择一些\
  \ XML 文件采用自己的自由格式结构；这些文件不会被解释，但会生成资源 ID。不过，你仍然希望它们被编译成二进制格式，并且也能享受本地化的便利。为此，你可以将这些\
  \ XML 文件放在 `/res/xml/` 子目录中，以便它们被编译成二进制格式。这种情况下，你需要使用 Android 提供的 XML 读取器来读取 XML\
  \ 节点。\n\n但是，如果你将文件（包括 XML 文件）放在 `/res/raw/` 目录中，它们则不会被编译成二进制格式。你必须使用显式的基于流的 API\
  \ 来读取这些文件。音频和视频文件就属于这一类。\n\n**注意：** 值得注意的是，由于 `raw` 目录是 `/res/*` 层级结构的一部分，即使是这些原始音频和视频文件，也能像其他所有资源一样利用本地化功能。\n\
  \n正如我们在上一章表 2-1 中提到的，资源文件根据其类型被存放在不同的子目录中。以下是 `/res` 文件夹中的一些重要子目录及其所承载的资源类型：\n\n\
  *   `anim`：已编译的动画文件\n*   `drawable`：位图\n*   `layout`：UI 和视图定义\n*   `values`：数组、颜色、尺寸、字符串和样式\n\
  *   `xml`：已编译的任意 XML 文件\n*   `raw`：未编译的原始文件\n\nAndroid 资产打包工具（AAPT）中的资源编译器会编译除 `raw`\
  \ 资源之外的所有资源，并将它们全部放入最终的 `.apk` 文件中。这个文件包含了 Android 应用程序的代码和资源，对应于 Java 的 `.jar`\
  \ 文件（“apk”代表“Android package”）。`.apk` 文件就是最终安装到设备上的文件。\n\n**注意：** 尽管 XML 资源解析器允许使用像\
  \ `hello-string` 这样的资源名称，但你会在 `R.java` 中看到编译时错误。你可以通过将资源重命名为 `hello_string`（将连字符替换为下划线）来解决此问题。\n\
  \n### 列举关键的 Android 资源\n\n在了解资源的基础知识之后，我们将列举 Android 支持的其他一些关键资源、它们的 XML 表示形式，以及在\
  \ Java 代码中的使用方式。（在为每种资源编写资源文件时，你可以将此部分作为快速参考。）首先，快速浏览一下资源类型及其用途（见表 3–1）。\n\n**表\
  \ 3–1.** *资源类型*\n\n\n\n| **资源类型** | **位置** | **描述** |\n| --- | --- | --- |\n| 颜色\
  \ | `/res/values/any-file` | 表示指向颜色代码的颜色标识符。这些资源 ID 在 `R.java` 中暴露为 `R.color.*`。文件中的\
  \ XML 节点为 `/resources/color`。 |\n| 字符串 | `/res/values/any-file` | 表示字符串资源。字符串资源除了支持简单字符串外，还支持\
  \ Java 格式字符串和原始 HTML。这些资源 ID 在 `R.java` 中暴露为 `R.string.*`。文件中的 XML 节点为 `/resources/string`。\
  \ |\n| 字符串数组 | `/res/values/any-file` | 表示一个字符串数组资源。这些资源 ID 在 `R.java` 中暴露为 `R.array.*`。文件中的\
  \ XML 节点为 `/resources/string-array`。 |\n| 复数资源 | `/res/values/any-file` | 表示基于数量值的一组合适的字符串集合。数量是一个数字。在不同语言中，句子的书写方式取决于是指代零个对象、一个对象、少量对象还是多个对象。资源\
  \ ID 在 `R.java` 中暴露为 `R.plural.*`。值文件中的 XML 节点为 `/resources/plurals`。 |\n| 尺寸 |\
  \ `/res/values/any-file` | 表示 Android 中各种元素或视图的尺寸或大小。支持像素、英寸、毫米、密度无关像素和比例无关像素。这些资源\
  \ ID 在 `R.java` 中暴露为 `R.dimen.*`。文件中的 XML 节点为 `/resources/dimen`。 |\n| 图像 | `/res/drawable/multiple-files`\
  \ | 表示图像资源。支持的图像包括 `.jpg`、`.gif`、`.png` 等。每个图像单独一个文件，并根据文件名获得自己的 ID。这些资源 ID 在 `R.java`\
  \ 中暴露为 `R.drawable.*`。图像支持还包括一种称为可拉伸图像的类型，它允许图像的一部分拉伸，而另一部分保持不变。可拉伸图像也称为 9-patch\
  \ 文件（`.9.png`）。 |\n| 颜色绘制对象 | `/res/values/any-file` 以及 `/res/drawable/multiple-files`\
  \ | 表示用作视图背景的彩色矩形或一般绘制对象（如位图）。这可用于替代将单色位图设置为背景。在 Java 中，这相当于创建一个彩色矩形并将其设置为视图背景。`values`\
  \ 子目录下的 `<drawable>` 值标签支持此功能。这些资源 ID 在 `R.java` 中暴露为 `R.drawable.*`。文件中的 XML 节点为\
  \ `/resources/drawable`。Android 还通过放置在 `/res/drawable` 中且根 XML 标签为 `<shape>` 的 XML\
  \ 文件支持圆角矩形和渐变矩形。这些资源 ID 也在 `R.java` 中暴露为 `R.drawable.*`。在这种情况下，每个文件名都对应一个唯一的绘制对象\
  \ ID。 |\n| 任意 XML 文件 | `/res/xml/*.xml` | Android 允许将任意 XML 文件作为资源。这些文件将由 AAPT 编译器编译。这些资源\
  \ ID 在 `R.java` 中暴露为 `R.xml.*`。 |\n| 任意原始资源 | `/res/raw/*.*` | Android 允许在此目录下存放任意*未编译*的二进制或文本文件。每个文件都会获得一个唯一的资源\
  \ ID。这些资源 ID 在 `R.java` 中暴露为 `R.raw.*`。 |\n| 任意原始资源（assets） | `/assets/*.*/*.*`\
  \ | Android 允许在从 `/assets` 子目录开始的任意子目录中存放任意文件。这些并不算是资源，只是原始文件。与 `/res` 资源子目录不同，此目录允许任意深度的子目录。这些文件不会生成任何资源\
  \ ID。您必须使用从 `/assets` 开始但不包括 `/assets` 的相对路径名。 |\n\n表中指定的每种资源将在以下各节中通过 XML 和 Java\
  \ 代码片段进一步详细说明。\n\n**注意：** 从 ID 生成的特性来看，似乎——尽管我们尚未在任何官方声明中看到——如果 XML 文件位于 `/res/values`\
  \ 子目录之外的其他任何位置，则会根据文件名生成 ID。如果 XML 文件位于 `values` 子目录中，则仅根据文件内容来生成 ID。\n\n#### 字符串数组\n\
  \n您可以在 `/res/values` 子目录下的任何文件中将字符串数组指定为资源。您将使用一个名为 `string-array` 的 XML 节点。该节点是\
  \ `resources` 的子节点，类似于 `string` 资源节点。代码清单 3–10 是在资源文件中指定数组的一个示例。\n\n**代码清单 3–10.**\
  \ *指定字符串数组*\n\n```xml\n<resources ....>\n......其他资源\n<string-array name=\"test_array\"\
  >\n    <item>一</item>\n    <item>二</item>\n    <item>三</item>\n</string-array>\n\
  ......其他资源\n</resources>\n```\n\n有了这个字符串数组资源定义后，您就可以在 Java 代码中检索该数组，如代码清单 3–11 所示。\n\
  \n**代码清单 3–11.** *指定字符串数组*\n\n```java\n//从 Activity 获取 Resources 对象\nResources res\
  \ = your-activity.getResources();\nString strings[] = res.getStringArray(R.array.test_array);\n\
  \n//打印字符串\nfor (String s: strings)\n{\n    Log.d(\"example\", s);\n}\n```\n\n####\
  \ 复数资源\n\n`plurals` 资源是一组字符串。这些字符串是以不同方式表达数值数量的说法，例如，巢中有多少枚蛋。考虑一个例子：\n\n```\n有 1\
  \ 枚蛋。\n有 2 枚蛋。\n有 0 枚蛋。\n有 100 枚蛋。\n```\n\n注意，对于数字 2、0 和 100，句子是相同的。然而，对于 1 枚蛋的句子则不同。Android\
  \ 允许您将此变化表示为 `plurals` 资源。代码清单 3–12 展示了如何在资源文件中根据数量来表示这两种变化。\n\n**代码清单 3–12.** *指定字符串数组*\n\
  \n```xml\n<resources...>\n<plurals name=\"eggs_in_a_nest_text\">\n    <item quantity=\"\
  one\">有 1 枚蛋</item>\n    <item quantity=\"other\">有 %d 枚蛋</item>\n</plurals>\n</resources>\n\
  ```\n\n注意这两种变化是如何在一个复数资源下表示为两个不同字符串的。现在，您可以使用 Java 代码（如代码清单 3–13 所示）来利用此复数资源，根据数量打印字符串。`getQuantityString()`\
  \ 方法的第一个参数是复数资源的 ID。第二个参数用于选择要使用的字符串。当数量值为 1 时，我们直接使用该字符串。当数量值不为 1 时，我们必须提供第三个参数，其值将被放入\
  \ `%d` 所在的位置。如果您在复数资源中使用了格式化字符串，则必须始终至少提供 3 个参数。\n\n**代码清单 3–13.** *指定字符串数组*\n\n\
  ```java\nResources res = your-activity.getResources();\nString s1 = res.getQuantityString(R.plurals.eggs_in_a_nest_text,\
  \ 0,0);\nString s2 = res.getQuantityString(R.plurals.eggs_in_a_nest_text, 1,1);\n\
  String s3 = res.getQuantityString(R.plurals.eggs_in_a_nest_text, 2,2);\nString s4\
  \ = res.getQuantityString(R.plurals.eggs_in_a_nest_text, 10,10);\n```\n\n根据此代码，每个数量都将得到一个适合其复数形式的对应字符串。\n\
  \n然而，上述 `<item>` 节点的 `quantity` 属性还有其他可能的取值吗？我们强烈建议您阅读 Android 源代码发行版中的 `Resources.java`\
  \ 和 `PluralRules.java` 源代码，以真正理解这一点。我们在本章末尾提供的关于资源的研究链接中包含了这些源文件的摘录。\n\n总而言之，对于\
  \ `en`（英语）语言区域，唯一可能的两个取值是 `\"one\"` 和 `\"other\"`。对于除 `cs`（捷克语）之外的所有其他语言也是如此，在捷克语中，取值为\
  \ `\"one\"`（用于 1）、`\"few\"`（用于 2 到 4），以及 `\"other\"`（用于其余情况）。\n\n\n\n### 关于字符串资源的更多细节\n\
  \n我们在前面的章节中简要介绍了字符串资源。现在重新审视它们，以提供额外的细节，包括 HTML 字符串以及如何在字符串资源中替换变量。\n\n**注意：** 大多数\
  \ UI 框架都允许使用字符串资源。然而，与其他 UI 框架不同，Android 能够通过`R.java`快速地将 ID 与字符串资源关联起来，因此在 Android\
  \ 中将字符串用作资源要容易得多。\n\n我们将首先展示如何在 XML 资源文件中定义普通字符串、带引号的字符串、HTML 字符串和可替换字符串（见清单 3–14）。\n\
  \n**清单 3–14.** *定义字符串资源的 XML 语法*\n\n```xml\n<resources>\n    <string name=\"simple_string\"\
  >简单字符串</string>\n    <string name=\"quoted_string\">\"被引用的'xyz'字符串\"</string>\n\
  \    <string name=\"double_quoted_string\">\\\"双引号\\\"</string>\n    <string name=\"\
  java_format_string\">\n           你好 %2$s Java 格式字符串。%1$s 再次\n     </string>\n \
  \    <string name=\"tagged_string\">\n         你好 <b><i>斜体 Android</i></b>，你是粗体。\n\
  \     </string>\n</resources>\n```\n\n这个 XML 字符串资源文件需要位于`/res/values`子目录中。文件名是任意的。\n\
  \n请注意，带引号的字符串需要进行转义，或者放在另一种引号中。字符串定义也允许标准的 Java 字符串格式化序列。\n\nAndroid 还允许在`<string>`节点内使用子\
  \ XML 元素，例如`<b>`、`<i>`和其他简单的文本格式化 HTML。你可以使用这种复合 HTML 字符串在将文本绘制到文本视图之前对其进行样式设置。\n\
  \n清单 3–15 中的 Java 示例说明了每种用法。\n\n**清单 3–15.** *在 Java 代码中使用字符串资源*\n\n```java\n//读取一个简单字符串并将其设置在文本视图中\n\
  String simpleString = activity.getString(R.string.simple_string);\ntextView.setText(simpleString);\n\
  \n//读取一个带引号的字符串并将其设置在文本视图中\nString quotedString = activity.getString(R.string.quoted_string);\n\
  textView.setText(quotedString);\n\n//读取一个双引号字符串并将其设置在文本视图中\nString doubleQuotedString\
  \ = activity.getString(R.string.double_quoted_string);\ntextView.setText(doubleQuotedString);\n\
  \n//读取一个 Java 格式字符串\nString javaFormatString = activity.getString(R.string.java_format_string);\n\
  //通过传入参数转换格式化字符串\nString substitutedString = String.format(javaFormatString, \"\
  你好\", \"Android\");\n//将输出设置在文本视图中\ntextView.setText(substitutedString);\n\n//从资源中读取一个\
  \ HTML 字符串并将其设置在文本视图中\nString htmlTaggedString = activity.getString(R.string.tagged_string);\n\
  //将其转换为文本跨度，以便可以设置在文本视图中\n//android.text.Html 类允许绘制 \"html\" 字符串\n//这严格来说是 Android\
  \ 类，不支持所有 HTML 标签\nSpanned textSpan = android.text.Html.fromHtml(htmlTaggedString);\n\
  //将其设置在文本视图中\ntextView.setText(textSpan);\n```\n\n一旦将字符串定义为资源，就可以在 XML 布局定义中直接将它们设置在`TextView`等视图上。清单\
  \ 3–16 展示了将 HTML 字符串设置为`TextView`文本内容的示例。\n\n**清单 3–16.** *在 XML 中使用字符串资源*\n\n```xml\n\
  <TextView android:layout_width=\"fill_parent\"\n          android:layout_height=\"\
  wrap_content\"\n          android:gravity=\"center_horizontal\"\n          android:text=\"\
  @string/tagged_string\"/>\n```\n\n`TextView`会自动识别出这是一个 HTML 字符串，并相应地处理其格式，这很不错，因为你可以在布局中快速为视图设置吸引人的文本。\n\
  \n### 颜色资源\n\n与字符串资源一样，你也可以使用引用标识符间接引用颜色。这样做使 Android 能够本地化颜色并应用主题。在资源文件中定义并标识颜色后，你可以通过其\
  \ ID 在 Java 代码中访问它们。字符串资源 ID 位于`<your-package>.R.string`命名空间下，而颜色 ID 位于`<your-package>.R.color`命名空间下。\n\
  \nAndroid 还在其自己的资源文件中定义了一组基础颜色。这些 ID 可以通过 Android 的`android.R.color`命名空间访问。查阅以下网址了解`android.R.color`命名空间中可用的颜色常量：\n\
  \n`http://code.google.com/android/reference/android/R.color.html`\n\n请参见清单 3–17\
  \ 了解在 XML 资源文件中指定颜色的一些示例。\n\n**清单 3–17.** *定义颜色资源的 XML 语法*\n\n```xml\n<resources>\n\
  \    <color name=\"red\">#f00</color>\n    <color name=\"blue\">#0000ff</color>\n\
  \    <color name=\"green\">#f0f0</color>\n    <color name=\"main_back_ground_color\"\
  >#ffffff00</color>\n</resources>\n```\n\n清单 3–17 中的条目需要位于`/res/values`子目录下的一个文件中。文件名是任意的，这意味着你可以选择任何文件名。Android\
  \ 会读取所有文件，然后处理它们，并查找诸如`resources`和`color`这样的独立节点来确定各个 ID。\n\n清单 3–18 展示了在 Java 代码中使用颜色资源的示例。\n\
  \n**清单 3–18.** *Java 代码中的颜色资源*\n\n```java\nint mainBackGroundColor\n     =  activity.getResources.getColor(R.color.main_back_ground_color);\n\
  ```\n\n清单 3–19 展示了如何在视图定义中使用颜色资源。\n\n**清单 3–19.** *在视图定义中使用颜色*\n\n```xml\n<TextView\
  \ android:layout_width=\"fill_parent\"\n          android:layout_height=\"wrap_content\"\
  \n          android:textColor=\"@color/red\"\n          android:text=\"用于显示红色文字的示例文本\"\
  />\n```\n\n### 尺寸资源\n\n像素、英寸和点都是尺寸的示例，它们可以在 XML 布局或 Java 代码中发挥作用。你可以使用这些尺寸资源来样式化和本地化\
  \ Android UI，而无需更改源代码。\n\n清单 3–20 展示了如何在 XML 中使用尺寸资源。\n\n**清单 3–20.** *定义尺寸资源的 XML\
  \ 语法*\n\n```xml\n<resources>\n    <dimen name=\"mysize_in_pixels\">1px</dimen>\n\
  \    <dimen name=\"mysize_in_dp\">5dp</dimen>\n    <dimen name=\"medium_size\">100sp</dimen>\n\
  </resources>\n```\n\n你可以使用以下任何单位来指定尺寸：\n\n*   `px`：像素\n*   `in`：英寸\n*   `mm`：毫米\n\
  *   `pt`：点\n*   `dp`：基于 160 dpi（每英寸像素密度）屏幕的密度无关像素（尺寸会根据屏幕密度进行调整）\n*   `sp`：比例无关像素（允许用户调整大小的尺寸；有助于字体使用）\n\
  \n在 Java 中，你需要访问`Resources`对象实例来获取尺寸。你可以通过调用`activity`对象上的`getResources`方法来实现这一点（见清单\
  \ 3–21）。一旦有了`Resources`对象，你就可以让它使用尺寸 ID 来定位该尺寸（同样，见清单 3–21）。\n\n**清单 3–21.** *在\
  \ Java 代码中使用尺寸资源*\n\n```java\nfloat dimen = activity.getResources().getDimension(R.dimen.mysize_in_pixels);\n\
  ```\n\n**注意：** Java 方法调用使用`Dimension`（完整单词），而`R.java`命名空间使用缩写版本`dimen`来表示“尺寸”。\n\
  \n与 Java 中一样，XML 中尺寸的资源引用使用`dimen`而非完整单词“dimension”（见清单 3–22）。\n\n**清单 3–22.** *在\
  \ XML 中使用尺寸资源*\n\n```xml\n<TextView android:layout_width=\"fill_parent\"\n     \
  \     android:layout_height=\"wrap_content\"\n          android:textSize=\"@dimen/medium_size\"\
  />\n```\n\n\n\n### 图片资源\n\nAndroid 会为放置在 `/res/drawable` 子目录下的图片文件生成资源 ID。支持的图片类型包括\
  \ `.gif`、`.jpg` 和 `.png`。此目录下的每个图片文件都会根据其基础文件名生成一个唯一的 ID。例如，如果图片文件名为 `sample_image.jpg`，则生成的资源\
  \ ID 为 `R.drawable.sample_image`。\n\n**警告：** 如果存在两个基础文件名相同的文件，将会出现错误。此外，`/res/drawable`\
  \ 下的子目录会被忽略。放置在这些子目录中的任何文件都不会被读取。\n\n你可以在其他 XML 布局定义中引用 `/res/drawable` 中的这些图片，如代码清单\
  \ 3-23 所示。\n\n**代码清单 3-23.** *在 XML 中使用图片资源*\n\n```\n<Button\n      android:id=\"\
  @+id/button1\"\n      android:layout_width=\"fill_parent\"\n      android:layout_height=\"\
  wrap_content\"\n      android:text=\"Dial\"\n      android:background=\"@drawable/sample_image\"\
  \n/>\n```\n\n你也可以使用 Java 以编程方式检索图片，并将其设置为按钮等 UI 对象的背景（参见代码清单 3-24）。\n\n**代码清单 3-24.**\
  \ *在 Java 中使用图片资源*\n\n```\n//调用 getDrawable 获取图片\nBitmapDrawable d = activity.getResources().getDrawable(R.drawable.sample_image);\n\
  \n//然后可以使用该 drawable 设置背景\nbutton.setBackgroundDrawable(d);\n\n//或者可以直接通过资源 ID 设置背景\n\
  button.setBackgroundResource(R.drawable.sample_image);\n```\n\n**注意：** 这些背景方法可以一直追溯到\
  \ `View` 类。因此，大多数 UI 控件都支持这种背景设置。\n\nAndroid 还支持一种特殊类型的图片，称为 *可拉伸* 图片。这是一种 `.png`\
  \ 格式的图片，其中可以指定部分区域为静态区域和可拉伸区域。Android 提供了一个名为 Draw 9-patch 的工具来指定这些区域（你可以在 [`http://developer.android.com/guide/developing/tools/draw9patch.html`](http://developer.android.com/guide/developing/tools/draw9patch.html)\
  \ 了解更多信息）。\n\n一旦准备好 `.png` 图片，你就可以像使用其他图片一样使用它。当用作按钮的背景时，该图片会非常有用，因为按钮需要拉伸自身以容纳文本。\n\
  \n### 颜色绘制资源\n\n在 Android 中，图片是 drawable 资源的一种。Android 还支持另一种名为颜色绘制资源的 drawable\
  \ 资源；它本质上是一个彩色矩形。\n\n**警告：** Android 文档似乎暗示可以实现圆角，但我们未能成功创建。我们提供了另一种实现方法。文档还暗示实例化的\
  \ Java 类是 `PaintDrawable`，但实际代码返回的是 `ColorDrawable`。\n\n要定义这些彩色矩形之一，你可以在 `/res/values`\
  \ 子目录下的任意 XML 文件中，通过节点名 `drawable` 定义一个 XML 元素。代码清单 3-25 展示了一些颜色绘制资源的示例。\n\n**代码清单\
  \ 3-25.** *定义颜色绘制资源的 XML 语法*\n\n```\n<resources>\n    <drawable name=\"red_rectangle\"\
  >#f00</drawable>\n    <drawable name=\"blue_rectangle\">#0000ff</drawable>\n   \
  \ <drawable name=\"green_rectangle\">#f0f0</drawable>\n</resources>\n```\n\n代码清单\
  \ 3-26 和 3-27 分别展示了如何在 Java 和 XML 中使用颜色绘制资源。\n\n**代码清单 3-26.** *在 Java 代码中使用颜色绘制资源*\n\
  \n```\n// 获取一个 drawable\nColorDrawable redDrawable = (ColorDrawable)\n     activity.getResources().getDrawable(R.drawable.red_rectangle);\n\
  \n//将其设置为文本视图的背景\ntextView.setBackgroundDrawable(redDrawable);\n```\n\n**代码清单 3-27.**\
  \ *在 XML 代码中使用颜色绘制资源*\n\n```\n<TextView android:layout_width=\"fill_parent\"\n \
  \         android:layout_height=\"wrap_content\"\n          android:textAlign=\"\
  center\"\n          android:background=\"@drawable/red_rectangle\"/>\n```\n\n为了在你的\
  \ `Drawable` 中实现圆角，你可以使用当前未归档的 `<shape>` 标签。但是，此标签需要单独放在 `/res/drawable` 目录下的一个文件中。代码清单\
  \ 3-28 展示了如何在一个名为 `/res/drawable/my_rounded_rectangle.xml` 的文件中使用 `<shape>` 标签定义一个圆角矩形。\n\
  \n**代码清单 3-28.** *定义一个圆角矩形*\n\n```\n<shape >\n    <solid android:color=\"#f0600000\"\
  />\n    <stroke android:width=\"3dp\" color=\"#ffff8080\"/>\n    <corners android:radius=\"\
  13dp\" />\n    <padding android:left=\"10dp\" android:top=\"10dp\"\n        android:right=\"\
  10dp\" android:bottom=\"10dp\" />\n</shape>\n```\n\n然后，你可以像代码清单 3-29 所示，将此 drawable\
  \ 资源用作之前文本视图示例的背景。\n\n**代码清单 3-29.** *在 Java 代码中使用 Drawable*\n\n```\n// 获取一个 drawable\n\
  GradientDrawable roundedRectangle =\n(GradientDrawable)\nactivity.getResources().getDrawable(R.drawable.my_rounded_rectangle);\n\
  \n//将其设置为文本视图的背景\ntextView.setBackgroundDrawable(roundedRectangle);\n```\n\n**注意：**\
  \ 没有必要将返回的基础 `Drawable` 强制转换为 `GradientDrawable`，但这样做是为了向你展示这个 `<shape>` 标签会变成一个\
  \ `GradientDrawable`。这一信息很重要，因为你可以查阅此类的 Java API 文档，以了解它所定义的 XML 标签。\n\n最终，`drawable`\
  \ 子目录中的位图图像将解析为 `BitmapDrawable` 类。一个“drawable”资源值，例如代码清单 3-29 中的矩形之一，会解析为 `ColorDrawable`。包含\
  \ shape 标签的 XML 文件会解析为 `GradientDrawable`。\n\n\n\n### 使用任意 XML 资源文件\n\n除了目前已介绍的结构化资源之外，Android\
  \ 还允许将任意的 XML 文件作为资源使用。这种做法将使用资源的优势扩展到了任意 XML 文件上。首先，它提供了一种快速的方法，可以根据生成的资源 ID 引用这些文件。其次，这种方法允许你对这些资源\
  \ XML 文件进行本地化。第三，你可以高效地编译这些 XML 文件并将其存储在设备上。\n\n需要以这种方式读取的 XML 文件存储在 `/res/xml`\
  \ 子目录下。清单 3–30 是一个名为 `/res/xml/test.xml` 的 XML 文件示例。\n\n**清单 3–30.** *XML 文件示例*\n\
  ```\n<rootelem1>\n   <subelem1>\n      来自 XML 子元素的 Hello World\n   </subelem1>\n\
  </rootelem1>\n```\n\n与其他 Android XML 资源文件一样，AAPT 会在将 XML 文件放入应用程序包之前对其进行编译。如果你需要解析这些文件，则必须使用\
  \ `XmlPullParser` 的实例。你可以从任何上下文（包括 `activity`）中使用以下代码获取 `XmlPullParser` 实现的实例：\n\
  \n**清单 3–31.** *读取 XML 文件*\n```\nResources res = activity.getResources();\nXmlResourceParser\
  \ xpp = res.getXml(R.xml.test);\n```\n\n返回的 `XmlResourceParser` 是一个 `XmlPullParser`\
  \ 实例，并且它也实现了 `java.util.AttributeSet`。清单 3–32 展示了一个读取 `test.xml` 文件的更完整的代码片段。\n\n\
  **清单 3–32.** *使用 `XmlPullParser`*\n```\nprivate String getEventsFromAnXMLFile(Activity\
  \ activity)\nthrows XmlPullParserException, IOException\n{\n   StringBuffer sb =\
  \ new StringBuffer();\n   Resources res = activity.getResources();\n   XmlResourceParser\
  \ xpp = res.getXml(R.xml.test);\n\n   xpp.next();\n   int eventType = xpp.getEventType();\n\
  \    while (eventType != XmlPullParser.END_DOCUMENT)\n    {\n        if(eventType\
  \ == XmlPullParser.START_DOCUMENT)\n        {\n           sb.append(\"******开始文档\"\
  );\n        }\n        else if(eventType == XmlPullParser.START_TAG)\n        {\n\
  \           sb.append(\"\\n 开始标签 \"+xpp.getName());\n        }\n        else if(eventType\
  \ == XmlPullParser.END_TAG)\n        {\n           sb.append(\"\\n 结束标签 \"+xpp.getName());\n\
  \        }\n        else if(eventType == XmlPullParser.TEXT)\n        {\n      \
  \     sb.append(\"\\n 文本 \"+xpp.getText());\n        }\n   eventType = xpp.next();\n\
  \    }//eof-while\n    sb.append(\"\\n******结束文档\");\n    return sb.toString();\n\
  }//eof-function\n```\n\n在清单 3–32 中，你可以看到如何获取 `XmlPullParser`，如何使用 `XmlPullParser`\
  \ 在 XML 文档中导航 XML 元素，以及如何使用 `XmlPullParser` 的其他方法来访问 XML 元素的详细信息。如果你想运行此代码，你必须如前所示创建一个\
  \ XML 文件，并从任何菜单项或按钮点击事件中调用 `getEventsFromAnXMLFile` 函数。该函数会返回一个字符串，你可以使用 `Log.d`\
  \ 调试方法将其打印到日志流中。\n\n### 使用原始资源\n\n除了任意 XML 文件之外，Android 还允许使用原始文件。这些原始资源放置在 `/res/raw`\
  \ 目录下，是需要本地化或通过资源 ID 引用的原始文件资源，例如音频、视频或文本文件。与放置在 `/res/xml` 目录下的 XML 文件不同，这些文件不会被编译，而是原样移动到应用程序包中。然而，每个文件都会在\
  \ `R.java` 中生成一个标识符。如果你将文本文件放置在 `/res/raw/test.txt`，你可以使用清单 3–33 中的代码读取该文件。\n\n\
  **清单 3–33.** *读取原始资源*\n```\nString getStringFromRawFile(Activity activity)\n   throws\
  \ IOException\n   {\n      Resources r = activity.getResources();\n      InputStream\
  \ is = r.openRawResource(R.raw.test);\n      String myText = convertStreamToString(is);\n\
  \      is.close();\n      return myText;\n   }\n\n   String convertStreamToString(InputStream\
  \ is)\n   throws IOException\n   {\n      ByteArrayOutputStream baos = new ByteArrayOutputStream();\n\
  \      int i = is.read();\n      while (i != -1)\n      {\n         baos.write(i);\n\
  \         i = is.read();\n      }\n      return baos.toString();\n   }\n```\n\n\
  **警告：** 基本名称重复的文件名会在 Eclipse ADT 插件中生成构建错误。对于所有基于文件生成的资源 ID，情况都是如此。\n\n### 使用 Assets\
  \ 资源\n\nAndroid 还提供了一个额外的目录，你可以在其中保存要包含在包中的文件：`/assets`。它与 `/res` 位于同一层级，这意味着它不属于\
  \ `/res` 的子目录。`/assets` 中的文件不会在 `R.java` 中生成 ID；你必须指定文件路径来读取它们。文件路径是相对于 `/assets`\
  \ 开始的路径。你将使用 `AssetManager` 类来访问这些文件，如清单 3–34 所示。\n\n**清单 3–34.** *读取 Asset 资源*\n\
  ```\n//注意：代码中未显示异常处理\nString getStringFromAssetFile(Activity activity)\n{\n    AssetManager\
  \ am = activity.getAssets();\n    InputStream is = am.open(\"test.txt\");\n    String\
  \ s = convertStreamToString(is);\n    is.close();\n    return s;\n}\n```\n\n###\
  \ 回顾资源目录结构\n\n总结一下，清单 3–35 展示了整体资源目录结构的快速概览。\n\n**清单 3–35.** *资源目录*\n```\n/res/values/strings.xml\n\
  \           /colors.xml\n           /dimens.xml\n           /attrs.xml\n       \
  \    /styles.xml\n    /drawable/*.png\n             /*.jpg\n             /*.gif\n\
  \             /*.9.png\n    /anim/*.xml\n    /layout/*.xml\n    /raw/*.*\n    /xml/*.xml\n\
  /assets/*.*/*.*\n```\n\n**注意：** 由于它不在 `/res` 目录下，只有 `/assets` 目录可以包含任意数量的子目录。其他所有目录只能在该目录层级放置文件，不能更深。这就是\
  \ `R.java` 为这些文件生成标识符的方式。\n\n\n\n### 资源与配置变更\n\n资源有助于实现本地化。例如，你可以让一个字符串值根据用户的语言区域而变化。安卓将这一概念推广至设备的任何配置，语言只是其中一种配置选项。配置变更的另一个例子是当设备从竖直方向旋转到水平方向时。竖直模式称为竖屏模式，水平模式称为横屏模式。\n\
  \n安卓允许你根据这种布局模式，为相同的资源 ID 选择不同的布局集。这是通过为每种配置使用不同的目录来实现的。示例如清单 3-36 所示。\n\n**清单 3-36.**\
  \ *备用资源目录*\n\n```\n\\res\\layout\\main_layout.xml\n\\res\\layout-port\\main_layout.xml\n\
  \\res\\layout-land\\main_layout.xml\n```\n\n尽管这里有三个独立的布局文件，但它们在 `R.java` 中只生成一个布局\
  \ ID。该 ID 如下所示：\n\n```\nR.layout.main_layout\n```\n\n然而，当你检索与此布局 ID 对应的布局时，你将获得适合该设备布局的适当布局。\n\
  \n在此示例中，目录扩展名 `-port` 和 `-land` 被称为 *配置限定符*。这些限定符是 *不区分大小写* 的，并且通过连字符 (`-`) 与资源目录名称分隔开来。你在这些配置限定符目录中指定的资源称为\
  \ *备用资源*。位于没有配置限定符的资源目录中的资源称为 *默认资源*。\n\n可用的配置限定符列于清单 3-37 中。\n\n**清单 3-37.** *额外的备用资源目录*\n\
  \n*   `mccAAA`：`AAA` 是移动国家代码\n*   `mncAAA`：`AAA` 是运营商/网络代码\n*   `en-rUS`：语言和区域\n\
  *   `small`、`normal`、`large`、`xlarge`：屏幕尺寸\n*   `long`、`notlong`：屏幕类型\n*   `port`、`land`：竖屏或横屏\n\
  *   `car`、`desk`：底座类型\n*   `night`、`notnight`：夜间或白天\n*   `ldpi`、`mdpi`、`hdpi`、`xhdpi`、`nodpi`：屏幕密度\n\
  *   `notouch`、`stylus`、`finger`：屏幕类型\n*   `keysexposed`、`keyssoft`、`keyshidden`：键盘类型\n\
  *   `nokeys`、`qwerty`、`12key`：按键数量\n*   `navexposed`、`navhidden`：导航键隐藏或显示\n*   `nonav`、`dpad`、`trackball`、`wheel`：导航设备类型\n\
  *   `v3`、`v4`、`v7`：API 级别\n\n借助这些限定符，你可以创建如清单 3-38 所示的资源目录。\n\n**清单 3-38.** *额外的备用资源目录*\n\
  \n```\n\\res\\layout-mcc312-mnc222-en-rUS\n\\res\\layout-ldpi\n\\res\\layout-hdpi\n\
  \\res\\layout-car\n```\n\n你可以通过导航到设备上的“自定义语言区域”应用程序来发现当前的语言区域。该应用程序的导航路径为：主屏幕 ![images](img/U001.jpg)\
  \ 应用程序列表 ![images](img/U001.jpg) 自定义语言区域。\n\n给定一个资源 ID，安卓会使用一种算法来选取正确的资源。你可以参考“参考\
  \ URL”部分中包含的 URL 来进一步了解这些规则，但我们会指出一些经验法则。\n\n首要规则是：清单 3-38 中列出的这些限定符是按优先级顺序排列的。考虑清单\
  \ 3-39 中的目录。\n\n**清单 3-39.** *布局文件变体*\n\n```\n\\res\\layout\\main_layout.xml\n\\\
  res\\layout-port\\main_layout.xml\n\\res\\layout-en\\main_layout.xml\n```\n\n在清单\
  \ 3-39 中，布局文件 `main_layout.xml` 有两种额外的变体。一种变体针对语言，另一种变体针对布局模式。现在，让我们检查一下，如果你处于竖屏模式查看设备，将会选取哪个布局文件。尽管你处于竖屏模式，安卓仍会从\
  \ `layout-en` 目录中选取布局，因为在配置限定符列表中，语言变体的优先级高于方向变体。本章“参考 URL”部分中提到的 SDK 链接，清晰地列出了所有配置限定符及其优先级顺序。\n\
  \n让我们通过尝试一些字符串资源来进一步了解优先级规则。请注意，字符串资源基于单个 `id`，而布局资源是基于文件的。为了测试字符串资源的配置限定符优先级，让我们设计五个可以参与以下变体的资源\
  \ ID：`default`、`en`、`en_us`、`port` 和 `en_port`。这五个资源 ID 如下：\n\n*   `teststring_all`：此\
  \ ID 将存在于 `values` 目录的所有变体中，包括默认目录。\n*   `testport_port`：此 ID 将存在于默认目录和仅 `-port`\
  \ 变体中。\n*   `t1_enport`：此 ID 将存在于默认目录以及 `-en` 和 `-port` 变体中。\n*   `t1_1_en_port`：此\
  \ ID 将存在于默认目录和仅 `-en-port` 变体中。\n*   `t2`：此 ID 将仅存在于默认目录中。\n\n清单 3-40 显示了 `values`\
  \ 目录的所有变体。\n\n**清单 3-40.** *基于配置的字符串变体*\n\n```\n// values/strings.xml\n<resources>\n\
  \  <string name=\"teststring_all\">teststring in root</string>\n  <string name=\"\
  testport_port\">testport-port</string>\n  <string name=\"t1_enport\">t1 in root</string>\n\
  \  <string name=\"t1_1_en_port\">t1_1 in root</string>\n  <string name=\"t2\">t2\
  \ in root</string>\n</resources>\n\n// values-en/strings_en.xml\n<resources>\n \
  \ <string name=\"teststring_all\">teststring-en</string>\n  <string name=\"t1_enport\"\
  >t1_en</string>\n  <string name=\"t1_1_en_port\">t1_1_en</string>\n</resources>\n\
  \n// values-en-rUS/strings_en_us.xml\n<resources>\n  <string name=\"teststring_all\"\
  >test-en-us</string>\n</resources>\n\n// values-port/strings_port.xml\n<resources>\n\
  \  <string name=\"teststring_all\">test-en-us-port</string>\n  <string name=\"testport_port\"\
  >testport-port</string>\n  <string name=\"t1_enport\">t1_port</string>\n  <string\
  \ name=\"t1_1_en_port\">t1_1_port</string>\n</resources>\n\n// values-en-port/strings_en_port.xml\n\
  <resources>\n  <string name=\"teststring_all\">test-en-port</string>\n  <string\
  \ name=\"t1_1_en_port\">t1_1_en_port</string>\n</resources>\n```\n\n清单 3-41 显示了这些字符串对应的\
  \ `R.java` 文件。\n\n**清单 3-41.** *支持字符串变体的 R.java*\n\n```\npublic static final class\
  \ string {\n    public static final int teststring_all=0x7f050000;\n    public static\
  \ final int testport_port=0x7f050004;\n    public static final int t1_enport=0x7f050001;\n\
  \    public static final int t1_1_en_port=0x7f050002;\n    public static final int\
  \ t2=0x7f050003;\n}\n```\n\n显而易见，即使我们定义了大量的字符串，也只生成了五个字符串资源 ID。现在，如果你检索这些字符串值，每个字符串检索的行为如下所述（我们测试的配置是\
  \ `en_US` 和竖屏模式）：\n\n\n\n-   `teststring_all`：此 ID 存在于`values`目录的所有五个变体中。由于它在所有变体中均存在，因此将选用`values-en-rUS`目录中的变体。根据优先级规则，特定语言优于默认语言、`en`、`port`和`en-port`变体。\n\
  -   `testport_port`：此 ID 存在于默认变体以及仅`-port`变体中。由于它不在任何以`-en`开头的值目录中，因此`-port`将优先于默认变体，并选用`-port`变体中的值。如果此\
  \ ID 存在于某个`-en`变体中，则会从那里选用该值。\n-   `t1_enport`：此 ID 存在于三个变体中：默认、`-en`和`-port`。由于它同时存在于`-en`和`-port`中，因此将选用`-en`变体中的值。\n\
  -   `t1_1_en_port`：此 ID 存在于四个变体中：默认、`-port`、`-en`和`-en-port`。由于它存在于`-en-port`中，因此将选用`-en-port`中的值，忽略默认、`-en`和`-port`变体。\n\
  -   `t2`：此 ID 仅存在于默认变体中，因此将选用默认变体中的值。\n\nAndroid SDK 有一个更详细的算法可供你阅读。但是，本节中的示例为你提供了其核心要旨。关键在于认识到一个变体相对于另一个变体的优先级。我们在参考部分为这个\
  \ SDK 链接提供了一个 URL。\n\n### 参考链接\n\n在学习 Android 资源时，你可能希望手边备有以下参考链接。我们列出了这些 URL，以及你将从中获得的收获。\n\
  \n-   [`http://developer.android.com/guide/topics/resources/index.html`](http://developer.android.com/guide/topics/resources/index.html)：此\
  \ URL 是资源文档的路线图。\n-   [`http://developer.android.com/guide/topics/resources/available-resources.html`](http://developer.android.com/guide/topics/resources/available-resources.html)：Android\
  \ 在此 URL 记录了各种类型的资源。\n-   [`http://developer.android.com/reference/android/content/res/Resources.html`](http://developer.android.com/reference/android/content/res/Resources.html)：你将在此处找到用于读取资源的各种方法。\n\
  -   [`http://developer.android.com/reference/android/R.html`](http://developer.android.com/reference/android/R.html)：你可以看到定义为核心\
  \ Android 平台的资源。\n-   [`http://www.androidbook.com/item/3542`](http://www.androidbook.com/item/3542)：你将找到我们关于复数、字符串数组和备用资源的研究，以及指向其他参考的链接。\n\
  -   [`http://www.androidbook.com/projects`](http://www.androidbook.com/projects)：你可以使用此\
  \ URL 下载演示本章许多概念的 Eclipse 项目。该文件名为`ProAndroid3_Ch03_TestResources.zip`。\n\n### 总结\n\
  \n让我们通过快速列举到目前为止你学到的关于资源的知识来总结本章。你了解了 Android 中支持的资源类型，以及如何在 XML 文件中创建这些资源。你了解了资源\
  \ ID 是如何生成的，以及如何在 Java 代码中使用它们。你还学习了资源 ID 生成是一种方便的方案，它简化了 Android 中的资源使用。最后，你学习了如何处理原始资源和资产。我们还简要介绍了备用资源、复数和字符串数组。\n\
  \n至此，我们将在下一章将注意力转向内容提供者。\n\n## 第四章\n\n## 理解内容提供者\n\nAndroid 使用一种称为 *内容提供者* 的概念，将数据抽象成服务。这种内容提供者的理念使数据源看起来像支持\
  \ REST 的数据提供者，例如网站。从这个意义上说，内容提供者是数据的封装器。Android 设备上的 SQLite 数据库就是可以封装到内容提供者中的数据源的一个例子。\n\
  \n**注意：** REST 代表 REpresentational State Transfer（表述性状态转移）。对于一个简单的概念来说，这是一个令人费解的名称，作为\
  \ Web 用户，每个人对此都非常熟悉。当你在 Web 浏览器中输入一个 URL，并且 Web 服务器响应 HTML 时，你基本上就对 Web 服务器执行了一次基于\
  \ REST 的“查询”操作。同样，当你使用 Web 表单更新一些内容时，你就对 Web 服务器（或站点）执行了一次基于 REST 的“更新”，并改变了 Web\
  \ 服务器的状态。REST 通常也与（SOAP——简单对象访问协议）Web 服务进行对比。你可以在以下维基百科条目中阅读更多关于 REST 的信息：[`http://en.wikipedia.org/wiki/Representational_State_Transfer`](http://en.wikipedia.org/wiki/Representational_State_Transfer)。\n\
  \n要从内容提供者检索数据或将数据保存到内容提供者，你需要使用一组类似 REST 的 URI。例如，如果你要从一个封装了图书数据库的内容提供者中检索一组图书，你需要使用如下\
  \ URI：\n\n`content://com.android.book.BookProvider/books`\n\n要从图书数据库中检索特定的一本图书（第\
  \ 23 本书），你需要使用如下 URI：\n\n`content://com.android.book.BookProvider/books/23`\n\n\
  你将在本章中看到这些 URI 如何转化为底层的数据库访问机制。设备上的任何应用程序都可以使用这些 URI 来访问和操作数据。因此，内容提供者在应用程序之间共享数据方面扮演着重要角色。\n\
  \n严格来说，内容提供者的职责更多是一种封装机制而非数据访问机制。你需要一个实际的数据访问机制，如 SQLite 或网络访问，来访问底层的数据源。因此，仅当你想要在外部或应用程序之间共享数据时，才需要内容提供者抽象。对于内部数据访问，应用程序可以使用它认为合适的任何数据存储/访问机制，例如：\n\
  \n-   *Preferences*：一组可以持久化以存储应用程序偏好的键/值对。\n-   *Files*：应用程序内部的文件，你可以将其存储在可移动存储介质上。\n\
  -   *SQLite*：SQLite 数据库，每个数据库对于创建该数据库的包是私有的。\n-   *Network*：一种允许你通过互联网从外部检索或存储数据的机制。\n\
  \n**注意：** 尽管 Android 中允许使用多种数据访问机制，但本章重点介绍 SQLite 和内容提供者抽象，因为内容提供者构成了数据共享的基础，这与其他\
  \ UI 框架相比，在 Android 框架中更为常见。我们将在第 11 章中介绍网络方法，并在第 9 章中介绍偏好设置机制。\n\n### 探索 Android\
  \ 内置的提供者\n\nAndroid 附带了许多内置的内容提供者，这些提供者记录在 SDK 的`android.provider` Java 包中。你可以在此处查看这些提供者的列表：\n\
  \n`http://developer.android.com/reference/android/provider/package-summary.html`\n\
  \n以下是该文档页面上列出的一些提供者：\n\n`Browser`\n`CallLog`\n`Contacts`\n`   People`\n`   Phones`\n\
  `   Photos`\n`   Groups`\n`MediaStore`\n`   Audio`\n`      Albums`\n`      Artists`\n\
  `      Genres`\n`      Playlists`\n`   Images`\n`      Thumbnails`\n`   Video`\n\
  `Settings`\n\n**注意：** 提供者列表可能会略有不同，具体取决于你使用的 Android 版本。此列表的目的是让你了解可用的内容，而不是作为权威参考。\n\
  \n顶层项目是数据库，底层项目是表。因此，`Browser`、`CallLog`、`Contacts`、`MediaStore`和`Settings`是作为提供者封装的独立\
  \ SQLite 数据库。这些 SQLite 数据库通常具有`.db`扩展名，并且只能从实现包中访问。来自该包外部的任何访问都必须通过内容提供者接口进行。\n\n\
  \n\n### 探索模拟器和可用设备上的数据库\n\n由于 Android 中的许多内容提供程序都使用 SQLite 数据库（[`http://www.sqlite.org/`](http://www.sqlite.org/)），因此你可以使用\
  \ Android 和 SQLite 提供的工具来检查这些数据库。其中许多工具位于 `\\android-sdk-install-directory\\tools`\
  \ 子目录中，其他工具则位于 `\\android-sdk-install-directory\\platform-tools` 中。\n\n**注意：** 有关定位\
  \ `tools` 目录以及在不同操作系统上调用命令窗口的信息，请参阅第 2 章。本章与其余大部分章节一样，主要在 Windows 平台上提供示例。在本节中，我们将使用多个命令行工具，您可以专注于可执行文件或批处理文件的名称，而不必过多关注工具所在的目录。我们在第\
  \ 2 章中介绍了如何在各种平台上设置工具目录的路径。\n\nAndroid 使用一个名为 Android 调试桥（`adb`）的命令行工具，它位于：\n\n\
  `platform-tools\\adb.exe`\n\n`adb` 是 Android 工具包中的一个特殊工具，大多数其他工具通过它来访问设备。但是，必须有一个正在运行的模拟器或已连接的\
  \ Android 设备，`adb` 才能工作。您可以通过在命令行中输入以下内容来查看是否有正在运行的设备或模拟器：\n\n`adb devices`\n\n\
  如果模拟器未运行，您可以通过在命令行中输入以下内容来启动模拟器：\n\n`emulator.exe @avdname`\n\n参数 `@avdname` 是 Android\
  \ 虚拟设备（AVD）的名称。（我们在第 2 章中介绍了 Android 虚拟设备的必要性以及如何创建它们。）要查看您已经有哪些虚拟设备，可以运行以下命令：\n\
  \n`android list avd`\n\n此命令将列出可用的 AVD。如果您已通过 Eclipse ADT 开发并运行过任何 Android 应用程序，那么您至少已经配置了一个虚拟设备。上述命令将至少列出该虚拟设备。\n\
  \n以下是该列表命令的一个示例输出。（根据您的工具目录位置和 Android 版本的不同，以下输出的路径或版本号（例如 `i:\\android`）可能会有所变化。）\n\
  \n```\nI:\\android\\tools>android list avd\nAvailable Android Virtual Devices:\n\
  \    Name: avd\n    Path: I:\\android\\tools\\..\\avds\\avd3\n  Target: Google APIs\
  \ (Google Inc.)\n          Based on Android 1.5 (API level 3)\n    Skin: HVGA\n\
  \  Sdcard: 32M\n---------\n    Name: titanium\n    Path: C:\\Documents and Settings\\\
  Satya\\.android\\avd\\titanium.avd\n  Target: Android 1.5 (API level 3)\n    Skin:\
  \ HVGA\n```\n\n如上所述，AVD 的详细信息在第 2 章中介绍。\n\n您也可以通过 Eclipse ADT 插件启动模拟器。当您选择在模拟器中运行或调试程序时，这将自动发生。一旦模拟器启动并运行，您可以再次输入以下内容测试正在运行的设备列表：\n\
  \n`adb devices`\n\n现在您应该会看到类似如下的输出：\n\n```\nList of devices attached\nemulator-5554\
  \ device\n```\n\n您可以通过在命令行中输入以下内容来查看可以使用 `adb` 运行的许多选项和命令：\n\n`adb help`\n\n您还可以访问以下\
  \ URL 以获取 `adb` 的许多运行时选项：[`http://developer.android.com/guide/developing/tools/adb.html`](http://developer.android.com/guide/developing/tools/adb.html)。\n\
  \n您可以使用 `adb` 在连接的设备上打开一个 shell，方法是输入：\n\n`adb shell`\n\n**注意：** 这个 shell 是一个 Unix\
  \ `ash`，尽管命令集有限。例如，您可以执行 `ls`，但 `find`、`grep` 和 `awk` 在该 shell 中不可用。\n\n您可以通过在 shell\
  \ 提示符下输入以下内容来查看 shell 中可用的命令集：\n\n`#ls /system/bin`\n\n`#` 符号是 shell 的提示符。为简洁起见，在以下示例中我们将省略此提示符。上一行将显示表\
  \ 4-1 中列出的命令。（请注意，我们展示这些命令仅用于演示，并非完整列表。此列表可能因您运行的 Android SDK 版本而略有不同。）\n\n**表 4-1**。*可用的\
  \ Shell 命令集*\n\n| dumpcrash am dumpstate input itr monkey pm svc ssltest debuggerd\
  \ dhcpcd hostapd_cli fillup linker logwrapper telnetd iftop mkdosfs mount mv notify\
  \ netstat printenv reboot ps renice rm rmdir rmmod sendevent schedtop ping | sh\
  \ hciattach sdptool logcat servicemanager dbus-daemon debug_tool flash_image installd\
  \ dvz hostapd htclogkernel mountd qemud radiooptions toolbox hcid route setprop\
  \ sleep setconsole smd stop top start umount vmstat wipe watchprops sync netcfg\
  \ chmod | date dd cmp cat dmesg df getevent getprop hd id ifconfig insmod ioctl\
  \ kill ln log lsmod ls mkdir dumpsys service playmp3 sdutil rild dalvikvm dexopt\
  \ surfaceflinger app_process mediaserver system_server |\n\n要查看根级别目录和文件的列表，您可以在\
  \ shell 中输入以下内容：\n\n`ls -l`\n\n您需要访问此目录才能查看数据库列表：\n\n`ls /data/data`\n\n此目录包含设备上已安装的包列表。让我们通过探索\
  \ `com.android.providers.contacts` 包来看一个例子：\n\n`ls /data/data/com.android.providers.contacts/databases`\n\
  \n这将列出一个名为 `contacts.db` 的数据库文件，它是一个 SQLite 数据库。（此文件和路径仍取决于设备和版本。）\n\n**注意：** 我们还应该告诉您，在\
  \ Android 中，数据库可能在首次访问时创建。这意味着如果您从未访问过 `contacts` 应用，则可能看不到此文件。\n\n如果包含的 `ash` 中有\
  \ `find` 命令，您可以查找所有 `*.db` 文件。但是仅用 `ls` 没有好方法做到这一点。最接近的方法是：\n\n`ls -R /data/data/*/databases`\n\
  \n使用此命令，您会注意到 Android 发行版具有以下数据库（再次提醒，请谨慎；根据您的版本，此列表可能会有所不同）：\n\n`alarms.db`\n`contacts.db`\n\
  `downloads.db`\n`internal.db`\n`settings.db`\n`mmssms.db`\n`telephony.db`\n\n您可以在\
  \ `adb` shell 内部对其中一个数据库调用 `sqlite3`，方法如下：\n\n`sqlite3 /data/data/com.android.providers.contacts/databases/contacts.db`\n\
  \n您可以通过输入以下内容退出 `sqlite3`：\n\n`sqlite>.exit`\n\n请注意，`adb` 的提示符是 `#`，而 `sqlite3`\
  \ 的提示符是 `sqlite>`。您可以通过访问 [`http://www.sqlite.org/sqlite.html`](http://www.sqlite.org/sqlite.html)\
  \ 来了解各种 `sqlite3` 命令。不过，我们将在此列出几个重要的命令，这样您就不必去网上查询了。您可以通过输入以下内容查看表列表：\n\n```\nsqlite>\
  \ .tables\n```\n\n此命令是以下内容的快捷方式：\n\n```\nSELECT name FROM sqlite_master\nWHERE type\
  \ IN ('table','view') AND name NOT LIKE 'sqlite_%'\nUNION ALL\nSELECT name FROM\
  \ sqlite_temp_master\nWHERE type IN ('table','view')\nORDER BY 1\n```\n\n正如您可能已经猜到的，`sqlite_master`\
  \ 表是一个主表，用于跟踪数据库中的表和视图。以下命令行会打印出 `contacts.db` 中名为 `people` 的表的 `create` 语句：\n\n\
  `.schema people`\n\n这是在 SQLite 中获取表列名的一种方法。它还会打印出列的数据类型。在使用内容提供程序时，您应该注意这些列类型，因为访问方法依赖于它们。\n\
  \n然而，仅仅为了了解列名及其类型而手动解析这个长长的 `create` 语句是非常繁琐的。有一种变通方法：您可以将 `contacts.db` 拉取到本地计算机上，然后使用任意数量的\
  \ SQLite 版本 3 GUI 工具来检查数据库。您可以从操作系统命令提示符发出以下命令来拉取 `contacts.db` 文件：\n\n\n\n`adb\
  \ pull /data/data/com.android.providers.contacts/databases/contacts.db` ![images](img/U002.jpg)\n\
  `c:/somelocaldir/contacts.db`\n\n我们使用了免费下载的 Sqliteman（[`http://sqliteman.com/`](http://sqliteman.com/)），这是一个用于\
  \ SQLite 数据库的 GUI 工具，它运行良好。虽然遇到了几次崩溃，但总体而言，该工具完全可用于探索 Android SQLite 数据库。\n\n###\
  \ 快速 SQLite 入门\n\n以下示例 SQL 语句可以帮助您快速浏览 SQLite 数据库：\n\n```\n//Set the column headers\
  \ to show in the tool\nsqlite>.headers on\n```\n\n```\n//select all rows from a\
  \ table\nselect * from table1;\n```\n\n```\n//count the number of rows in a table\n\
  select count(*) from table1;\n```\n\n```\n//select a specific set of columns\nselect\
  \ col1, col2 from table1;\n```\n\n```\n//Select distinct values in a column\nselect\
  \ distinct col1 from table1;\n```\n\n```\n//counting the distinct values\nselect\
  \ count(col1) from (select distinct col1 from table1);\n```\n\n```\n//group by\n\
  select count(*), col1 from table1 group by col1;\n```\n\n```\n//regular inner join\n\
  select * from table1 t1, table2 t2\nwhere t1.col1 = t2.col1;\n```\n\n```\n//left\
  \ outer join\n//Give me everything in t1 even though there are no rows in t2\nselect\
  \ * from table t1 left outer join table2 t2\non t1.col1 = t2.col1\nwhere ....\n\
  ```\n\n### 内容提供者的架构\n\n现在您已经知道如何通过 Android 和 SQLite 工具探索现有的内容提供者。接下来，我们将考察内容提供者的一些架构元素，以及这些内容提供者如何与行业中的其他数据访问抽象相关联。\n\
  \n总体而言，内容提供者的方法与以下行业抽象有相似之处：\n\n*   网站\n*   REST\n*   网络服务\n*   存储过程\n\n设备上的每个内容提供者都像网站一样，用一个字符串（类似于域名，但称为`authority`）注册自己。这个唯一可识别的字符串构成了该内容提供者可以提供的一组\
  \ URI 的基础。这类似于一个拥有域名的网站如何提供多个 URL 来公开其文档或内容。\n\n此权限注册发生在`AndroidManifest.xml`文件中。以下是您可以在`AndroidManifest.xml`中注册提供者的两个示例：\n\
  \n```\n<provider android:name=\"SomeProvider\"\n        android:authorities=\"com.your-company.SomeProvider\"\
  \ />\n```\n\n```\n<provider android:name=\"NotePadProvider\"\n   android:authorities=\"\
  com.google.provider.NotePad\"\n/>\n```\n\n一个`authority`对于该内容提供者来说就像一个域名。根据上述权限注册，这些提供者将接受以该权限前缀开头的\
  \ URL：\n\n```\ncontent://com.your-company.SomeProvider/\ncontent://com.google.provider.NotePad/\n\
  ```\n\n您可以看到，“内容提供者”就像网站一样，有一个作为起始 URL 的基础域名。\n\n**注意：** 必须指出，Android 提供的提供者可能没有完全限定的权限名称。目前仅建议第三方内容提供者使用完全限定名称。这就是为什么有时您会看到内容提供者使用简单的单词（例如“contacts”）而非“com.google.android.contacts”（对于第三方提供者而言）来引用。\n\
  \n内容提供者还提供类似 REST 的 URL 来检索或操作数据。对于上述注册，用于标识`NotePadProvider`数据库中笔记目录或集合的 URI 是：\n\
  \n```\ncontent://com.google.provider.NotePad/Notes\n```\n\n用于标识特定笔记的 URI 是：\n\n\
  ```\ncontent://com.google.provider.NotePad/Notes/#\n```\n\n其中`#`是特定笔记的`id`。以下是某些数据提供者接受的一些额外\
  \ URI 示例：\n\n```\ncontent://media/internal/images\ncontent://media/external/images\n\
  content://contacts/people/\ncontent://contacts/people/23\n```\n\n请注意，这里的提供者“media”（`content://media`）和“contacts”（`content://contacts`）没有完全限定的结构。这是因为它们不是第三方提供者，而是由\
  \ Android 控制的。\n\n内容提供者也表现出网络服务的特性。内容提供者通过其 URI 将内部数据作为服务公开。但是，从内容提供者 URL 返回的输出不是类型化数据，这与基于\
  \ SOAP 的网络服务调用不同。该输出更像是来自 JDBC 语句的结果集。即便如此，与 JDBC 的相似性也只是概念上的。我们不想给人留下这与 JDBC `ResultSet`\
  \ 相同的印象。\n\n调用者需要了解返回的行和列的结构。此外，正如您将在本章的“Android MIME 类型的结构”部分中看到的，内容提供者具有一个内置机制，允许您确定此\
  \ URI 所代表数据的多用途互联网邮件扩展（MIME）类型。\n\n除了类似于网站、REST 和网络服务之外，内容提供者的 URI 还类似于数据库中存储过程的名称。存储过程提供基于服务的对底层关系数据的访问。URI\
  \ 与存储过程类似，因为针对内容提供者的 URI 调用会返回一个游标。但是，内容提供者与存储过程的不同之处在于，内容提供者中对服务调用的输入通常嵌入在 URI\
  \ 本身中。\n\n我们提供这些比较是为了让您了解内容提供者的更广泛范围。\n\n### Android 内容 URI 的结构\n\n我们将内容提供者比作网站，因为它响应传入的\
  \ URI。因此，要从内容提供者检索数据，您只需调用一个 URI。然而，在内容提供者的情况下，检索到的数据是以一组行和列的形式呈现，由 Android 的`cursor`对象表示。在此背景下，我们将探讨可用于检索数据的\
  \ URI 的结构。\n\nAndroid 中的内容 URI 看起来类似于 HTTP URI，不同之处在于它们以`content`开头，并且具有以下通用形式：\n\
  \n```\ncontent://*/*/*\n```\n\n或\n\n```\ncontent://authority-name/path-segment1/path-segment2/etc…\n\
  ```\n\n以下是一个标识笔记数据库中编号为 23 的笔记的 URI 示例：\n\n```\ncontent://com.google.provider.NotePad/notes/23\n\
  ```\n\n在`content:`之后，URI 包含一个用于权限的唯一标识符，该标识符用于在提供者注册表中定位提供者。在前面的例子中，`com.google.provider.NotePad`是\
  \ URI 的权限部分。\n\n`/notes/23`是 URI 的路径部分，特定于每个提供者。路径部分的`notes`和`23`部分称为路径段。提供者有责任记录和解释\
  \ URI 的路径部分和路径段。\n\n内容提供者的开发人员通常通过在该提供者实现 Java 包的 Java 类或 Java 接口中声明常量来完成此操作。此外，路径的第一部分可能指向一个对象集合。例如，`/notes`表示笔记的集合或目录，而`/23`指向一个特定的笔记项。\n\
  \n给定此 URI，期望提供者检索该 URI 所标识的行。还期望提供者使用任何状态变更方法（`insert`、`update`或`delete`）来更改此 URI\
  \ 处的内容。\n\n\n\n### Android MIME 类型结构\n\n正如网站会为给定的 URL 返回一个 MIME 类型（这使得浏览器能够调用正确的程序来查看内容），内容提供者也有责任为给定的\
  \ URI 返回 MIME 类型。这为查看数据提供了灵活性。了解数据类型后，你可能会有多个程序知道如何处理该数据。例如，如果你的硬盘上有一个文本文件，有很多编辑器可以显示该文本文件。根据操作系统的不同，它甚至可能让你选择使用哪个编辑器。\n\
  \nMIME 类型在 Android 中的工作方式与在 HTTP 中类似。你向内容提供者询问其支持的给定 URI 的 MIME 类型，提供者会根据标准的 Web\
  \ MIME 约定返回一个两部分组成的字符串来标识其 MIME 类型。你可以在这里找到 MIME 类型标准：\n\n`http://tools.ietf.org/html/rfc2046`\n\
  \n根据 MIME 类型规范，一个 MIME 类型包含两部分：类型（type）和子类型（subtype）。以下是一些常见 MIME 类型对的示例：\n\n```\n\
  text/html\ntext/css\ntext/xml\ntext/vnd.curl\napplication/pdf\napplication/rtf\n\
  application/vnd.ms-excel\n```\n\n你可以在互联网号码分配机构（IANA）网站上找到已注册的类型和子类型的完整列表：\n\n`http://www.iana.org/assignments/media-types/`\n\
  \n主要注册的内容类型包括：\n\n```\napplication\naudio\nexample\nimage\nmessage\nmodel\nmultipart\n\
  text\nvideo\n```\n\n每个主类型都有子类型。但如果供应商拥有专有数据格式，子类型名称会以 `vnd` 开头。例如，Microsoft Excel\
  \ 电子表格由子类型 `vnd.ms-excel` 标识，而 `pdf` 被视为非供应商标准，因此表示时没有任何供应商特定的前缀。\n\n有些子类型以 `x-`\
  \ 开头；这些是非标准子类型，无需注册。它们被视为在两个协作代理之间双边定义的私有值。以下是一些示例：\n\n```\napplication/x-tar\n\
  audio/x-aiff\nvideo/x-msvideo\n```\n\nAndroid 遵循类似的约定来定义 MIME 类型。Android MIME 类型中的\
  \ `vnd` 表示这些类型和子类型是非标准的、供应商特定的形式。为了提供唯一性，Android 进一步使用类似于域规范的多个部分来划分类型和子类型。此外，每种内容类型的\
  \ Android MIME 类型都有两种形式：一种用于单条记录，另一种用于多条记录。\n\n对于单条记录，MIME 类型格式如下：\n\n`vnd.android.cursor.item/vnd.yourcompanyname.contenttype`\n\
  \n对于记录或行的集合，MIME 类型格式如下：\n\n`vnd.android.cursor.dir/vnd.yourcompanyname.contenttype`\n\
  \n以下是几个示例：\n\n```\n//一条单独的笔记\nvnd.android.cursor.item/vnd.google.note\n\n//笔记的集合或目录\n\
  vnd.android.cursor.dir/vnd.google.note\n```\n\n**注意：** 这意味着 Android 原生识别项目的“目录”和“单个”项目。作为程序员，你的灵活性仅限于子类型。例如，列表控件等元素依赖于从游标返回的内容作为这些\
  \ MIME “主”类型之一。\n\nMIME 类型在 Android 中被广泛使用，尤其是在 Intent 中，系统会根据数据的 MIME 类型来确定要调用哪个\
  \ Activity。MIME 类型总是通过内容提供者从其 URI 派生而来。在使用 MIME 类型时，你需要记住三点：\n\n*   类型和子类型需要对于它们所代表的内容是唯一的。正如指出的那样，类型很大程度上已经为你决定好了。它主要是项目的目录或单个项目。在\
  \ Android 的上下文中，这些可能并不像你想象的那么开放。\n*   如果类型和子类型不是标准的（在涉及特定记录时通常如此），则需要在它们前面加上 `vnd`。\n\
  *   它们通常根据你的特定需求进行命名空间化。\n\n重申这一点，通过 Android `cursor` 返回的项目集合的主 MIME 类型应始终为 `vnd.android.cursor.dir`，而通过\
  \ Android `cursor` 检索的单个项目的主 MIME 类型应始终为 `vnd.android.cursor.item`。在子类型方面，例如 `vnd.google.note`，你有更多的灵活空间；在\
  \ `vnd.` 部分之后，你可以自由地使用任何你想要的子类型。\n\n\n\n### 使用 URI 读取数据\n\n现在您已经知道，要从内容提供者检索数据，需要使用该内容提供者提供的\
  \ URI。由于内容提供者定义的 URI 对该提供者是唯一的，因此将这些 URI 记录文档并提供给程序员查看和调用非常重要。Android 自带的提供者通过定义代表这些\
  \ URI 字符串的常量来实现这一点。\n\n考虑 Android SDK 中辅助类定义的这三个 URI：\n\n`MediaStore.Images.Media.INTERNAL_CONTENT_URI`\n\
  `MediaStore.Images.Media.EXTERNAL_CONTENT_URI`\n`Contacts.People.CONTENT_URI`\n\n\
  等效的文本 URI 字符串如下所示：\n\n`content://media/internal/images`\n`content://media/external/images`\n\
  `content://contacts/people/`\n\n`MediaStore` 提供者定义了两个 URI，而 `Contacts` 提供者定义了一个\
  \ URI。如果您留意，会发现这些常量是使用层次结构方案定义的。例如，联系人的内容 URI 示例被指明为 `Contacts.People.CONTENT_URI`。这是因为联系人的数据库可能有许多表格来表示某个\
  \ `Contact` 的实体。`People` 是其中一个表格或集合。数据库的每个主要实体都可能拥有自己的内容 URI，但所有 URI 都根植于基本授权名称（例如联系人提供者情况下的\
  \ `contacts://contacts`）。\n\n**注意：** 在引用 `Contacts.People.CONTENT_URI` 中，`Contacts`\
  \ 是一个 Java 包，而 `People` 是该包中的一个类。另请注意，`Contacts` 和 `Contacts.People` 在 Android 2.0\
  \ 中已被弃用，新的等效 URI 将在第 27 章中讨论。但这些 URI 仍然有效，尤其适用于解释概念。\n\n给定这些 URI，从联系人提供者检索单行人员的代码如下所示：\n\
  \n```\nUri peopleBaseUri = Contacts.People.CONTENT_URI;\nUri myPersonUri = Uri.withAppendedPath(Contacts.People.CONTENT_URI,\
  \ \"23\");\n\n//查询此记录。\n//managedQuery 是 Activity 类的一个方法\nCursor cur = managedQuery(myPersonUri,\
  \ null, null, null);\n```\n\n请注意 `Contacts.People.CONTENT_URI` 是如何在 `People` 类中被预定义为常量的。在此示例中，代码获取根\
  \ URI，向其添加特定人员 ID，并调用 `managedQuery` 方法。\n\n作为针对此 URI 进行查询的一部分，可以指定排序顺序、要选择的列以及\
  \ `where` 子句。这些附加参数在此示例中设置为 `null`。\n\n**注意：** 内容提供者应通过实现一组接口或列常量名称来列出其支持的列。但是，定义列常量的类或接口还应通过列命名约定、注释或文档来明确列的类型，因为目前没有通过常量指示列类型的正式方式。\n\
  \n列表 4–1 展示了如何基于前面的示例，从 `contacts` 内容提供者的 `People` 表中检索包含特定列列表的游标。\n\n**列表 4–1.**\
  \ *从内容提供者检索游标*\n\n```\n// 一个指定要返回哪些列的数组。\nstring[] projection = new string[] {\n\
  \    People._ID,\n    People.NAME,\n    People.NUMBER,\n};\n\n// 获取联系人内容提供者中 People\
  \ 表的基础 URI。\n// 即 content://contacts/people/\nUri mContactsUri = Contacts.People.CONTENT_URI;\
  \  \n\n// 检索查询的最佳方式；返回一个托管查询。\nCursor managedCursor = managedQuery( mContactsUri,\n\
  \                        projection, // 要返回哪些列。\n                        null, \
  \      // WHERE 子句\n                        Contacts.People.NAME + \" ASC\"); //\
  \ 排序子句。\n```\n\n请注意，`projection` 仅仅是一个由列名字符串组成的数组。因此，除非您知道这些列是什么，否则您会发现很难创建 `projection`。您应该在提供\
  \ URI 的同一个类中查找这些列名，在本例中是 `People` 类。让我们看看此类中定义的其他列名：\n\n`CUSTOM_RINGTONE`\n`DISPLAY_NAME`\n\
  `LAST_TIME_CONTACTED`\n`NAME`\n`NOTES`\n`PHOTO_VERSION`\n`SEND_TO_VOICE_MAIL`\n\
  `STARRED`\n`TIMES_CONTACTED`\n\n您可以通过查看 `android.provider.Contacts.PeopleColumns`\
  \ 类的 SDK 文档来了解有关这些列的更多信息，该文档位于以下 URL：\n\n`http://developer.android.com/reference/android/provider/Contacts.PeopleColumns.html`\n\
  \n如前所述，像 `contacts` 这样的数据库包含多个表，每个表都由一个类或接口来表示，以描述其列及其类型。让我们看一下 `android.providers.Contacts`\
  \ 包，该包的文档位于以下 URL：\n\n`http://developer.android.com/reference/android/provider/Contacts.html`\n\
  \n您会看到这个包包含以下嵌套类或接口：\n\n`ContactMethods`\n`Extensions`\n`Groups`\n`Organizations`\n\
  `People`\n`Phones`\n`Photos`\n`Settings`\n\n这些类中的每一个都代表 `contacts.db` 数据库中的一个表名，每个表负责描述其自己的\
  \ URI 结构。此外，为每个类定义了相应的 `Columns` 接口来标识列名，例如 `PeopleColumns`。\n\n让我们重新审视返回的 `cursor`：它包含零条或多条记录。列名、顺序和类型是提供者特定的。但是，返回的每一行都有一个名为\
  \ `_id` 的默认列，代表该行的唯一 ID。\n\n\n好的，作为高级文档工程师和翻译员，我将严格遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\n\
  \n### 使用 Android Cursor\n\n以下是关于 Android Cursor 的几个事实：\n\n- Cursor 是行的集合。\n- 在读取任何数据之前，你需要使用\
  \ `moveToFirst()`，因为 Cursor 起始位置在第一行之前。\n- 你需要知道列名。\n- 你需要知道列的类型。\n- 所有字段访问方法都基于列号，因此你必须先将列名转换为列号。\n\
  - Cursor 是一种随机游标（你可以前后移动，也可以跳转）。\n- 因为 Cursor 是随机游标，所以你可以查询它的行数。\n\nAndroid Cursor\
  \ 有许多允许你导航的方法。清单 4-2 向你展示了如何检查 Cursor 是否为空，以及当它不为空时如何逐行遍历 Cursor。\n\n**清单 4-2.**\
  \ *使用 while 循环遍历 Cursor*\n\n```\nif (cur.moveToFirst() == false)\n{\n   //没有行，空\
  \ cursor\n   return;\n}\n\n//Cursor 已经指向第一行\n//让我们访问一些列\nint nameColumnIndex = cur.getColumnIndex(People.NAME);\n\
  String name = cur.getString(nameColumnIndex);\n\n//现在让我们看看如何循环遍历 cursor\n\nwhile(cur.moveToNext())\n\
  {\n   //cursor 移动成功\n   //访问字段\n}\n```\n\n在清单 4-2 的开头，假设 Cursor 已经被定位在第一行之前。要将 Cursor\
  \ 定位到第一行，我们在 cursor 对象上使用 `moveToFirst()` 方法。如果 Cursor 为空，此方法返回 `false`。然后我们重复使用\
  \ `moveToNext()` 方法来遍历 Cursor。\n\n为了帮助你了解 Cursor 的位置，Android 提供了以下方法：\n\n`isBeforeFirst()`\n\
  `isAfterLast()`\n`isClosed()`\n\n使用这些方法，你也可以像清单 4-3 那样使用 `for` 循环来遍历 Cursor，而不是清单\
  \ 4-2 中使用的 `while` 循环。\n\n**清单 4-3.** *使用 for 循环遍历 Cursor*\n\n```\n//在 for 循环外部先获取索引\n\
  int nameColumn = cur.getColumnIndex(People.NAME);\nint phoneColumn = cur.getColumnIndex(People.NUMBER);\n\
  \n//现在根据列索引遍历 cursor\nfor(cur.moveToFirst();!cur.isAfterLast();cur.moveToNext())\n\
  {\n   String name = cur.getString(nameColumn);\n   String phoneNumber = cur.getString(phoneColumn);\n\
  }\n```\n\n列的索引顺序似乎有点随意。因此，我们建议你先从 Cursor 中显式地获取索引，以避免意外。要查找 Cursor 中的行数，Android\
  \ 在 cursor 对象上提供了一个名为 `getCount()` 的方法。\n\n### 使用 where 子句\n\nContent Provider 提供两种传递\
  \ `where` 子句的方式：\n\n- 通过 URI\n- 通过一个 `string` 子句和一组可替换的字符串数组参数的组合\n\n我们将通过一些示例代码来介绍这两种方法。\n\
  \n#### 通过 URI 传递 where 子句\n\n假设你想从 Google notes 数据库中检索 ID 为 23 的笔记。你会使用清单 4-4 中的代码来获取一个\
  \ Cursor，该 Cursor 包含对应 notes 表中第 23 行的一行数据。\n\n**清单 4-4.** *通过 URI 传递 SQL where\
  \ 子句*\n\n```\nActivity someActivity;\n//..初始化 someActivity\nString noteUri = \"\
  content://com.google.provider.NotePad/notes/23\";\nCursor managedCursor = someActivity.managedQuery(\
  \ noteUri,\n                        projection, //要返回哪些列。\n                    \
  \    null,       // WHERE 子句\n                        null); // 排序子句。\n```\n\n我们将\
  \ `managedQuery` 方法的 `where` 子句参数留为 `null`，因为在这种情况下，我们假设 note provider 足够智能，能够找出我们想要的笔记的\
  \ `id`。这个 `id` 嵌入在 URI 本身中。我们使用 URI 作为传递 `where` 子句的载体。当你注意到 notes provider 如何实现相应的查询方法时，这一点就变得很明显了。以下是该查询方法的一段代码片段：\n\
  \n```\n//从如下格式的传入 uri 中检索笔记 id\n//content://.../notes/23\nint noteId = uri.getPathSegments().get(1);\n\
  \n//让查询构建器构建一个查询\n//指定表名\nqueryBuilder.setTables(NOTES_TABLE_NAME);\n\n//使用 noteid\
  \ 来添加一个 where 子句\nqueryBuilder.appendWhere(Notes._ID + \"=\" + noteId);\n```\n\n\
  注意笔记的 `id` 是如何从 URI 中提取出来的。表示传入参数 `uri` 的 `Uri` 类有一个方法，可以提取 URI 在根路径 `content://com.google.provider.NotePad`\
  \ 之后的部分。这些部分被称为*路径段*；它们是诸如 `/seg1/seg3/seg4/` 中 / 分隔符之间的字符串，并且通过它们的位置进行索引。对于这里的\
  \ URI，第一个路径段将是 23。然后我们使用这个 ID 23 来附加到指定给 `QueryBuilder` 类的 `where` 子句中。最终，等效的 select\
  \ 语句将是：\n\n```\nselect * from notes where _id = 23\n```\n\n**注意：** `Uri` 和 `UriMatcher`\
  \ 类用于识别 URI 并从中提取参数。（我们将在“使用 UriMatcher 识别 URI”一节中进一步介绍 `UriMatcher`。）`SQLiteQueryBuilder`\
  \ 是 `android.database.sqlite` 中的一个辅助类，它允许你构造 SQL 查询，供 `SQLiteDatabase` 在 SQLite\
  \ 数据库实例上执行。\n\n#### 使用显式的 where 子句\n\n现在你已经了解了如何使用 URI 发送 `where` 子句，接下来考虑另一种方法，Android\
  \ 通过这种方法允许我们发送一组显式的列及其对应的值作为 `where` 子句。为了探索这一点，让我们再看看我们在清单 4-4 中使用的 `Activity`\
  \ 类的 `managedQuery` 方法。这是它的签名：\n\n```\npublic final Cursor managedQuery(Uri uri,\n\
  \   String[] projection,\n   String selection,\n   String[] selectionArgs,\n   String\
  \ sortOrder)\n```\n\n注意名为 `selection` 的参数，它的类型是 `String`。这个 selection 字符串代表一个过滤器（本质上是一个\
  \ `where` 子句），声明要返回哪些行，其格式类似于 SQL `where` 子句（但不包含 `WHERE` 关键字本身）。传递 `null` 将返回给定\
  \ URI 的所有行。在 selection 字符串中，你可以包含 `?`，这些占位符将按它们在 selection 中出现的顺序被 `selectionArgs`\
  \ 中的值替换。这些值将作为`String`类型绑定。\n\n由于有两种指定 `where` 子句的方法，你可能会发现很难确定 provider 是如何使用这些\
  \ `where` 子句的，以及如果两个 `where` 子句都被使用，哪个 `where` 子句优先。\n\n例如，你可以使用以下两种方法中的任何一种来查询\
  \ ID 为 23 的笔记：\n\n```\n//URI 方法\nmanagedQuery(\"content://com.google.provider.NotePad/notes/23\"\
  \n,null\n,null\n,null\n,null);\n```\n\n或\n\n```\n//显式 where 子句\nmanagedQuery(\"\
  content://com.google.provider.NotePad/notes\"\n,null\n,\"_id=?\"\n,new String[]\
  \ {23}\n,null);\n```\n\n惯例是，在适用的情况下通过 URI 使用 `where` 子句，并将显式选项作为特例使用。\n\n\n\n###\
  \ 插入记录\n\n到目前为止，我们讨论了如何使用`URI`从内容提供者（content providers）中检索数据。现在，让我们将注意力转向插入、更新和删除操作。\n\
  \n> **注意：** 在解释内容提供者时，我们大量使用了谷歌在其教程中作为原型应用程序提供的`Notepad`（记事本）应用中的示例。不过，你无需完全熟悉该应用。即使你之前未接触过这个应用，也能跟上这些示例。此外，本章稍后会为你提供一个完整示例提供者的代码。\n\
  \nAndroid 使用一个名为`android.content.ContentValues`的类来保存待插入的单条记录的值。`ContentValues`是一个键值对字典，非常类似于列名及其对应的值。插入记录时，首先将一条记录的数据填充到`ContentValues`中，然后通过`android.content.ContentResolver`使用一个`URI`来插入该记录。\n\
  \n**注意：** 你需要找到`ContentResolver`，因为在此抽象层级上，你并非要求数据库插入记录，而是要求向某个由`URI`标识的提供者插入记录。`ContentResolver`负责将`URI`引用解析到正确的提供者，然后将`ContentValues`对象传递给该提供者。\n\
  \n以下是一个示例，展示了在`ContentValues`中填充单行笔记数据以准备插入的过程：\n\n```\nContentValues values = new\
  \ ContentValues();\nvalues.put(\"title\", \"新笔记\");\nvalues.put(\"note\", \"这是一条新笔记\"\
  );\n\n// values 对象现在已准备好进行插入\n```\n\n你可以通过`Activity`类获取`ContentResolver`的引用：\n\n\
  ```\nContentResolver contentResolver = activity.getContentResolver();\n```\n\n现在，你只需要一个`URI`来告诉`ContentResolver`插入该行。这些`URI`在对应`Notes`表的类中定义。在`Notepad`示例中，该`URI`为：\n\
  \n`Notepad.Notes.CONTENT_URI`\n\n我们可以使用这个`URI`和我们创建的`ContentValues`来调用插入行的方法：\n\n\
  ```\nUri uri = contentResolver.insert(Notepad.Notes.CONTENT_URI, values);\n```\n\
  \n该调用会返回一个指向新插入记录的`URI`。返回的`URI`将匹配以下结构：\n\n`Notepad.Notes.CONTENT_URI/new_id`\n\
  \n### 向内容提供者添加文件\n\n有时，你可能需要在数据库中存储文件。通常的做法是将文件保存到磁盘，然后更新数据库中指向相应文件名的记录。\n\nAndroid\
  \ 采用这一协议，并通过定义一个保存和检索这些文件的特定流程来使其自动化。Android 使用一种约定：将文件名的引用保存在一个具有保留列名`_data`的记录中。\n\
  \n当一条记录插入到该表时，Android 会向调用者返回`URI`。使用此机制保存记录后，你还需要继续将文件保存到该位置。为此，Android 允许`ContentResolver`获取数据库记录的`Uri`并返回一个可写的输出流。在幕后，Android\
  \ 会分配一个内部文件，并将对该文件名的引用存储在`_data`字段中。\n\n如果你要扩展`Notepad`示例，为给定笔记存储一张图片，可以创建一个名为`_data`的额外列，并首先执行插入操作以获取一个`URI`。以下代码演示了该协议的这一部分：\n\
  \n```\nContentValues values = new ContentValues();\nvalues.put(\"title\", \"新笔记\"\
  );\nvalues.put(\"note\", \"这是一条新笔记\");\n\n// 使用内容解析器插入记录\nContentResolver contentResolver\
  \ = activity.getContentResolver();\nUri newUri = contentResolver.insert(Notepad.Notes.CONTENT_URI,\
  \ values);\n```\n\n一旦你获得了记录的`URI`，以下代码请求`ContentResolver`获取文件输出流的引用：\n\n```\n....\n\
  // 使用内容解析器直接获取输出流\n// ContentResolver 隐藏了对 _data 字段的访问，\n// 该字段存储了实际文件的引用。\nOutputStream\
  \ outStream = activity.getContentResolver().openOutputStream(newUri);\nsomeSourceBitmap.compress(Bitmap.CompressFormat.JPEG,\
  \ 50, outStream);\noutStream.close();\n```\n\n然后，代码使用该输出流进行写入操作。\n\n### 更新和删除\n\n\
  到目前为止，我们已经讨论了查询和插入操作；更新和删除则相当直截了当。执行更新操作类似于执行插入操作，不同之处在于通过`ContentValues`对象传递更改后的列值。以下是`ContentResolver`对象上更新方法的签名：\n\
  \n```\nint numberOfRowsUpdated =\nactivity.getContentResolver().update(\n    Uri\
  \ uri,\n    ContentValues values,\n    String whereClause,\n    String[] selectionArgs\
  \ )\n```\n\n`whereClause`参数将更新操作限制到相关的行。类似地，删除方法的签名是：\n\n```\nint numberOfRowsDeleted\
  \ =\nactivity.getContentResolver().delete(\n    Uri uri,\n    String whereClause,\n\
      String[] selectionArgs )\n```\n\n显然，`delete`方法不需要`ContentValues`参数，因为删除记录时无需指定要修改的列。\n\
  \n几乎所有来自`managedQuery`和`ContentResolver`的调用最终都会指向`provider`类。了解提供者如何实现这些方法中的每一个，能为我们提供足够的线索，说明客户端是如何使用这些方法的。在下一节中，我们将从头开始实现一个名为`BookProvider`的示例内容提供者。\n\
  \n### 实现内容提供者\n\n我们已经讨论了如何与内容提供者交互以满足数据需求，但尚未讨论如何编写内容提供者。要编写一个内容提供者，你需要继承`android.content.ContentProvider`并实现以下关键方法：\n\
  \n- `query`\n- `insert`\n- `update`\n- `delete`\n- `getType`\n\n在实现这些方法之前，你还需要设置一些事情。我们将通过描述你需要采取的步骤，来详细说明内容提供者实现的所有细节：\n\
  \n1. 规划你的数据库、URI、列名等，并创建一个元数据类，为所有这些元数据元素定义常量。\n2. 继承抽象类`ContentProvider`。\n3. 实现以下方法：`query`、`insert`、`update`、`delete`\
  \ 和 `getType`。\n4. 在清单文件中注册该提供者。\n\n\n\n#### 规划数据库\n\n为了探讨这个主题，我们将创建一个包含书籍集合的数据库。该书籍数据库仅包含一个名为`books`的表，其列名为`name`、`isbn`和`author`。这些列名属于元数据范畴。你需要在\
  \ Java 类中定义这类相关的元数据。这个包含元数据的 Java 类 `BookProviderMetaData` 如代码清单 4-5 所示。该元数据类的一些关键元素已被突出显示。\n\
  \n**代码清单 4-5.** *为数据库定义元数据：BookProviderMetaData 类*\n\n```\npublic class BookProviderMetaData\n\
  {\n    public static final String AUTHORITY = \"com.androidbook.provider.BookProvider\"\
  ;\n\n    public static final String DATABASE_NAME = \"book.db\";\n    public static\
  \ final int DATABASE_VERSION = 1;\n    public static final String BOOKS_TABLE_NAME\
  \ = \"books\";\n\n    private BookProviderMetaData() {}\n\n    //描述 BookTable 的内部类\n\
  \    public static final class BookTableMetaData implements BaseColumns\n    {\n\
  \        private BookTableMetaData() {}\n        public static final String TABLE_NAME\
  \ = \"books\";\n\n        //URI 和 MIME 类型定义\n        public static final Uri CONTENT_URI\
  \ =\n                          Uri.parse(\"content://\" + AUTHORITY + \"/books\"\
  );\n\n        public static final String CONTENT_TYPE =\n                     \"\
  vnd.android.cursor.dir/vnd.androidbook.book\";\n\n        public static final String\
  \ CONTENT_ITEM_TYPE =\n                    \"vnd.android.cursor.item/vnd.androidbook.book\"\
  ;\n\n        public static final String DEFAULT_SORT_ORDER = \"modified DESC\";\n\
  \n        //从这里开始是额外的列\n        //字符串类型\n        public static final String BOOK_NAME\
  \ = \"name\";\n\n        //字符串类型\n        public static final String BOOK_ISBN =\
  \ \"isbn\";\n\n        //字符串类型\n        public static final String BOOK_AUTHOR =\
  \ \"author\";\n\n        //来自 System.currentTimeMillis() 的整数\n        public static\
  \ final String CREATED_DATE = \"created\";\n\n        //来自 System.currentTimeMillis()\
  \ 的整数\n        public static final String MODIFIED_DATE = \"modified\";\n    }\n\
  }\n```\n\n这个 `BookProviderMetaData` 类首先将其 authority 定义为 `com.androidbook.provider.BookProvider`。我们将使用这个字符串在\
  \ Android 清单文件中注册该 Provider。该字符串构成了此 Provider 的 URI 的前半部分。\n\n接着，该类将其唯一的一张表（`books`）定义为一个内部的\
  \ `BookTableMetaData` 类。`BookTableMetaData` 类随后定义了一个用于标识书籍集合的 URI。根据上一段的 authority，书籍集合的\
  \ URI 如下所示：\n\n`content://com.androidbook.provider.BookProvider/books`\n\n此 URI\
  \ 由常量 `BookProviderMetaData.BookTableMetaData.CONTENT_URI` 表示。\n\n`BookTableMetaData`\
  \ 类接着定义了针对书籍集合和单个书籍的 MIME 类型。Provider 的实现将使用这些常量来返回传入 URI 对应的 MIME 类型。\n\n然后，`BookTableMetaData`\
  \ 定义了列集合：`name`、`isbn`、`author`、`created`（创建日期）和 `modified`（最后更新日期）。\n\n**注意：**\
  \ 你应该通过代码中的注释来指明列的数据类型。\n\n元数据类 `BookTableMetaData` 还继承了 `BaseColumns` 类，该类提供了标准的\
  \ `_id` 字段，用于表示行 ID。有了这些元数据定义，我们就可以着手实现 Provider 了。\n\n#### 扩展 ContentProvider\n\
  \n要实现我们的 `BookProvider` 示例内容 Provider，需要继承 `ContentProvider` 类，并重写 `onCreate()`\
  \ 来创建数据库，然后实现 `query`、`insert`、`update`、`delete` 和 `getType` 方法。本节涵盖数据库的配置和创建，后续各节则分别处理各独立方法：`query`、`insert`、`update`、`delete`\
  \ 和 `getType`。代码清单 4-6 提供了该类的完整源代码。该类的重要子部分已被突出显示。\n\n查询方法需要指定它需要返回的列集合。这类似于一个 `select`\
  \ 子句，需要列名及其对应的 `as` 别名（有时称为*同义词*）。Android 使用一个称为 `projection` map 的 `map` 对象来表示这些列名及其同义词。我们需要设置这个\
  \ map，以便稍后在查询方法实现中使用。在 Provider 实现的代码中（参见代码清单 4-6），你将会看到这部分在 Projection map 设置的开头就已完成。\n\
  \n我们将要实现的大多数方法都接受一个 URI 作为输入。尽管此内容 Provider 能够响应的所有 URI 都以相同的模式开头，但 URI 的结尾部分会有所不同——就像网站一样。每个\
  \ URI，虽然开头相同，但为了标识不同的数据或文档，必须有所不同。让我们用一个例子来说明这一点：\n\n```\nUri1: content://com.androidbook.provider.BookProvider/books\n\
  Uri2: content://com.androidbook.provider.BookProvider/books/12\n```\n\n可以看到书籍 Provider\
  \ 如何区分这些 URI。这是一个简单的例子。如果我们的书籍 Provider 还容纳了更多对象而不仅仅是书籍，那么就会有更多 URI 来标识这些对象。\n\n\
  Provider 的实现需要一种机制来区分一个 URI 与另一个 URI；Android 为此使用了一个名为 `UriMatcher` 的类。因此我们需要用我们所有的\
  \ URI 变体来设置这个对象。你将在代码清单 4-6 中看到这段代码位于创建 Projection map 之后。我们将在“使用 UriMatcher 解析\
  \ URI”一节中进一步解释 `UriMatcher` 类。\n\n然后，代码清单 4-6 中的代码重写了 `onCreate()` 方法以方便数据库的创建。源代码接着实现了\
  \ `insert()`、`query()`、`update()`、`getType()` 和 `delete()` 方法。所有这些代码都呈现在一个清单中（代码清单\
  \ 4-6），但我们将在引用该清单的单独小节中解释每个方面。\n\n**代码清单 4-6.** *实现 BookProvider 内容 Provider*\n\n\
  ```\npublic class BookProvider extends ContentProvider\n{\n    //日志辅助标签。对 Provider\
  \ 无特殊意义。\n    private static final String TAG = \"BookProvider\";\n\n    //设置 Projection\
  \ Map\n    //Projection maps 类似于 SQL 语句中的 \"as\"（列别名）结构，\n    //通过它可以重命名列。\n   \
  \ private static HashMap<String, String> sBooksProjectionMap;\n    static\n    {\n\
  \        sBooksProjectionMap = new HashMap<String, String>();\n        sBooksProjectionMap.put(BookTableMetaData._ID,\n\
  \                                BookTableMetaData._ID);\n\n        //name, isbn,\
  \ author\n        sBooksProjectionMap.put(BookTableMetaData.BOOK_NAME,\n       \
  \                         BookTableMetaData.BOOK_NAME);\n        sBooksProjectionMap.put(BookTableMetaData.BOOK_ISBN,\n\
  \                                BookTableMetaData.BOOK_ISBN);\n        sBooksProjectionMap.put(BookTableMetaData.BOOK_AUTHOR,\n\
  \                                BookTableMetaData.BOOK_AUTHOR);\n```\n\n\n```java\n\
  //created date, modified date\nsBooksProjectionMap.put(BookTableMetaData.CREATED_DATE,\n\
  \                        BookTableMetaData.CREATED_DATE);\nsBooksProjectionMap.put(BookTableMetaData.MODIFIED_DATE,\n\
  \                        BookTableMetaData.MODIFIED_DATE);\n}\n```\n\n```java\n\
  //Setup URIs\n//Provide a mechanism to identify\n//all the incoming uri patterns.\n\
  private static final UriMatcher sUriMatcher;\nprivate static final int INCOMING_BOOK_COLLECTION_URI_INDICATOR\
  \ = 1;\nprivate static final int INCOMING_SINGLE_BOOK_URI_INDICATOR = 2;\nstatic\
  \ {\n    sUriMatcher = new UriMatcher(UriMatcher.NO_MATCH);\n    sUriMatcher.addURI(BookProviderMetaData.AUTHORITY,\
  \ \"books\",\n                      INCOMING_BOOK_COLLECTION_URI_INDICATOR);\n \
  \   sUriMatcher.addURI(BookProviderMetaData.AUTHORITY, \"books/#\",\n          \
  \            INCOMING_SINGLE_BOOK_URI_INDICATOR);\n}\n```\n\n```java\n/**\n * Setup/Create\
  \ Database\n * This class helps open, create, and upgrade the database file.\n */\n\
  private static class DatabaseHelper extends SQLiteOpenHelper {\n\n    DatabaseHelper(Context\
  \ context) {\n        super(context,\n            BookProviderMetaData.DATABASE_NAME,\n\
  \            null,\n            BookProviderMetaData.DATABASE_VERSION);\n    }\n\
  \n    @Override\n    public void onCreate(SQLiteDatabase db)\n    {\n        Log.d(TAG,\"\
  inner oncreate called\");\n        db.execSQL(\"CREATE TABLE \" + BookTableMetaData.TABLE_NAME\
  \ + \" (\"\n                + BookTableMetaData._ID + \" INTEGER PRIMARY KEY,\"\n\
  \                + BookTableMetaData.BOOK_NAME + \" TEXT,\"\n                + BookTableMetaData.BOOK_ISBN\
  \ + \" TEXT,\"\n                + BookTableMetaData.BOOK_AUTHOR + \" TEXT,\"\n \
  \               + BookTableMetaData.CREATED_DATE + \" INTEGER,\"\n             \
  \   + BookTableMetaData.MODIFIED_DATE + \" INTEGER\"\n                + \");\");\n\
  \    }\n\n    @Override\n    public void onUpgrade(SQLiteDatabase db, int oldVersion,\
  \ int newVersion)\n    {\n        Log.d(TAG,\"inner onupgrade called\");\n     \
  \   Log.w(TAG, \"Upgrading database from version \"\n                + oldVersion\
  \ + \" to \"\n                + newVersion + \", which will destroy all old data\"\
  );\n        db.execSQL(\"DROP TABLE IF EXISTS \" +\n                 BookTableMetaData.TABLE_NAME);\n\
  \        onCreate(db);\n    }\n}\n```\n\n```java\nprivate DatabaseHelper mOpenHelper;\n\
  ```\n\n```java\n//Component creation callback\n@Override\npublic boolean onCreate()\n\
  {\n    Log.d(TAG,\"main onCreate called\");\n    mOpenHelper = new DatabaseHelper(getContext());\n\
  \    return true;\n}\n```\n\n```java\n@Override\npublic Cursor query(Uri uri, String[]\
  \ projection, String selection,\n        String[] selectionArgs,  String sortOrder)\n\
  {\n    SQLiteQueryBuilder qb = new SQLiteQueryBuilder();\n\n    switch (sUriMatcher.match(uri))\
  \ {\n    case INCOMING_BOOK_COLLECTION_URI_INDICATOR:\n        qb.setTables(BookTableMetaData.TABLE_NAME);\n\
  \        qb.setProjectionMap(sBooksProjectionMap);\n        break;\n\n    case INCOMING_SINGLE_BOOK_URI_INDICATOR:\n\
  \        qb.setTables(BookTableMetaData.TABLE_NAME);\n        qb.setProjectionMap(sBooksProjectionMap);\n\
  \        qb.appendWhere(BookTableMetaData._ID + \"=\"\n                    + uri.getPathSegments().get(1));\n\
  \        break;\n\n    default:\n        throw new IllegalArgumentException(\"Unknown\
  \ URI \" + uri);\n    }\n\n    // If no sort order is specified use the default\n\
  \    String orderBy;\n    if (TextUtils.isEmpty(sortOrder)) {\n        orderBy =\
  \ BookTableMetaData.DEFAULT_SORT_ORDER;\n    } else {\n        orderBy = sortOrder;\n\
  \    }\n\n    // Get the database and run the query\n    SQLiteDatabase db = mOpenHelper.getReadableDatabase();\n\
  \    Cursor c = qb.query(db, projection, selection,\n               selectionArgs,\
  \ null, null, orderBy);\n\n    //example of getting a count\n    int i = c.getCount();\n\
  \n    // Tell the cursor what uri to watch,\n    // so it knows when its source\
  \ data changes\n    c.setNotificationUri(getContext().getContentResolver(), uri);\n\
  \    return c;\n}\n```\n\n```java\n@Override\npublic String getType(Uri uri)\n{\n\
  \    switch (sUriMatcher.match(uri)) {\n    case INCOMING_BOOK_COLLECTION_URI_INDICATOR:\n\
  \        return BookTableMetaData.CONTENT_TYPE;\n\n    case INCOMING_SINGLE_BOOK_URI_INDICATOR:\n\
  \        return BookTableMetaData.CONTENT_ITEM_TYPE;\n\n    default:\n        throw\
  \ new IllegalArgumentException(\"Unknown URI \" + uri);\n    }\n}\n```\n\n```java\n\
  @Override\npublic Uri insert(Uri uri, ContentValues initialValues)\n{\n    // Validate\
  \ the requested uri\n    if (sUriMatcher.match(uri)\n            != INCOMING_BOOK_COLLECTION_URI_INDICATOR)\n\
  \    {\n        throw new IllegalArgumentException(\"Unknown URI \" + uri);\n  \
  \  }\n\n    ContentValues values;\n    if (initialValues != null) {\n        values\
  \ = new ContentValues(initialValues);\n    } else {\n        values = new ContentValues();\n\
  \    }\n\n    Long now = Long.valueOf(System.currentTimeMillis());\n\n    // Make\
  \ sure that the fields are all set\n    if (values.containsKey(BookTableMetaData.CREATED_DATE)\
  \ == false)\n    {\n        values.put(BookTableMetaData.CREATED_DATE, now);\n \
  \   }\n\n    if (values.containsKey(BookTableMetaData.MODIFIED_DATE) == false)\n\
  \    {\n        values.put(BookTableMetaData.MODIFIED_DATE, now);\n    }\n\n   \
  \ if (values.containsKey(BookTableMetaData.BOOK_NAME) == false)\n    {\n       \
  \ throw new SQLException(\n           \"Failed to insert row because Book Name is\
  \ needed \" + uri);\n    }\n\n    if (values.containsKey(BookTableMetaData.BOOK_ISBN)\
  \ == false) {\n        values.put(BookTableMetaData.BOOK_ISBN, \"Unknown ISBN\"\
  );\n    }\n    if (values.containsKey(BookTableMetaData.BOOK_AUTHOR) == false) {\n\
  \        values.put(BookTableMetaData.BOOK_ISBN, \"Unknown Author\");\n    }\n\n\
  \    SQLiteDatabase db = mOpenHelper.getWritableDatabase();\n    long rowId = db.insert(BookTableMetaData.TABLE_NAME,\n\
  \            BookTableMetaData.BOOK_NAME, values);\n    if (rowId > 0) {\n     \
  \   Uri insertedBookUri =\n            ContentUris.withAppendedId(\n           \
  \         BookTableMetaData.CONTENT_URI, rowId);\n        getContext()\n       \
  \    .getContentResolver()\n                .notifyChange(insertedBookUri, null);\n\
  \n        return insertedBookUri;\n    }\n\n    throw new SQLException(\"Failed\
  \ to insert row into \" + uri);\n}\n```\n\n```java\n@Override\npublic int delete(Uri\
  \ uri, String where, String[] whereArgs)\n{\n    SQLiteDatabase db = mOpenHelper.getWritableDatabase();\n\
  \    int count;\n    switch (sUriMatcher.match(uri)) {\n    case INCOMING_BOOK_COLLECTION_URI_INDICATOR:\n\
  \        count = db.delete(BookTableMetaData.TABLE_NAME,\n                where,\
  \ whereArgs);\n        break;\n\n    case INCOMING_SINGLE_BOOK_URI_INDICATOR:\n\
  \        String rowId = uri.getPathSegments().get(1);\n        count = db.delete(BookTableMetaData.TABLE_NAME,\n\
  \                BookTableMetaData._ID + \"=\" + rowId\n                + (!TextUtils.isEmpty(where)\
  \ ? \" AND (\" + where + ')' : \"\"),\n                whereArgs);\n        break;\n\
  \n    default:\n        throw new IllegalArgumentException(\"Unknown URI \" + uri);\n\
  \    }\n\n    getContext().getContentResolver().notifyChange(uri, null);\n    return\
  \ count;\n}\n```\n\n```java\n@Override\npublic int update(Uri uri, ContentValues\
  \ values,\n        String where, String[] whereArgs)\n{\n    SQLiteDatabase db =\
  \ mOpenHelper.getWritableDatabase();\n    int count;\n    switch (sUriMatcher.match(uri))\
  \ {\n    case INCOMING_BOOK_COLLECTION_URI_INDICATOR:\n        count = db.update(BookTableMetaData.TABLE_NAME,\n\
  \                values, where, whereArgs);\n        break;\n\n    case INCOMING_SINGLE_BOOK_URI_INDICATOR:\n\
  \        String rowId = uri.getPathSegments().get(1);\n        count = db.update(BookTableMetaData.TABLE_NAME,\n\
  \                values, BookTableMetaData._ID + \"=\" + rowId\n               \
  \ + (!TextUtils.isEmpty(where) ? \" AND (\" + where + ')' : \"\"),\n           \
  \     whereArgs);\n        break;\n\n    default:\n        throw new IllegalArgumentException(\"\
  Unknown URI \" + uri);\n    }\n\n    getContext().getContentResolver().notifyChange(uri,\
  \ null);\n    return count;\n}\n```\n\n##### 履行 MIME 类型契约\n\n`BookProvider` 内容提供程序还必须实现\
  \ `getType()` 方法，以便为给定的 URI 返回 MIME 类型。与内容提供程序的许多其他方法一样，此方法会根据传入的 URI 进行重载。因此，`getType()`\
  \ 方法的首要职责是区分 URI 的类型：它代表的是书籍集合还是单本书籍？\n\n正如我们在上一节中指出的，我们将使用 `UriMatcher` 来解析此 URI\
  \ 类型。根据不同的 URI，`BookTableMetaData` 类定义了要为每个 URI 返回的 MIME 类型常量。你可以在清单 4–6 中看到此方法的实现。\n\
  \n##### 实现查询方法\n\n内容提供程序中的 `query` 方法负责根据传入的 URI 和 `where` 子句返回一个行集合。\n\n与其他方法类似，`query`\
  \ 方法使用 `UriMatcher` 来识别 URI 类型。如果 URI 类型是单一项类型，则该方法会像这样从传入 URI 中获取书籍 ID：\n\n1. \
  \ 使用 `getPathSegments()` 提取路径段。\n2.  对 URI 进行索引，以获取第一个路径段，该段恰好就是书籍 ID。\n\n然后，`query`\
  \ 方法使用我们在清单 4–6 中预先创建的 `projections`（投影）来标识返回列。最后，`query` 将游标返回给调用者。在整个过程中，`query`\
  \ 方法使用 `SQLiteQueryBuilder` 对象来制定和执行查询（参见清单 4–6）。\n\n##### 实现插入方法\n\n内容提供程序中的 `insert`\
  \ 方法负责将一条记录插入到底层数据库中，然后返回指向新创建记录的 URI。\n\n与其他方法类似，`insert` 方法使用 `UriMatcher` 来识别\
  \ URI 类型。代码首先检查 URI 是否指示了正确的集合类型 URI。如果不是，则代码会抛出异常（参见清单 4–6）。\n\n然后，代码验证可选的和必填的列参数。如果某些列缺失，代码可以为其替换默认值。\n\
  \n接下来，代码使用 `SQLiteDatabase` 对象插入新记录，并返回新插入的 ID。最后，代码使用从数据库返回的 ID 构建新的 URI。\n\n#####\
  \ 实现更新方法\n\n内容提供程序中的 `update` 方法负责根据传入的列值以及传入的 `where` 子句来更新一条或多条记录。然后，`update`\
  \ 方法返回在此过程中更新的行数。\n\n与其他方法类似，`update` 方法使用 `UriMatcher` 来识别 URI 类型。如果 URI 类型是集合类型，则\
  \ `where` 子句会被直接传递，以便尽可能多地影响记录。如果 URI 类型是单条记录类型，则会从 URI 中提取书籍 ID，并将其指定为附加的 `where`\
  \ 子句。最后，代码返回更新的记录数（参见清单 4–6）。第 21 章 将全面解释此 `notifyChange` 方法的含义。同时请注意，该 `notifyChange`\
  \ 方法如何使你能够向外界宣告该 URI 对应的数据已发生更改。理论上，你可以在 `insert` 方法中执行相同的操作，例如当插入一条记录时，声明“`…/books`”已发生更改。\n\
  \n##### 实现删除方法\n\n内容提供程序中的 `delete` 方法负责根据传入的 `where` 子句删除一条或多条记录。然后，`delete` 方法返回在此过程中删除的行数。\n\
  \n与其他方法类似，`delete` 方法使用 `UriMatcher` 来识别 URI 类型。如果 URI 类型是集合类型，则 `where` 子句会被直接传递，以便尽可能多地删除记录。如果\
  \ `where` 子句为 `null`，则将删除所有记录。如果 URI 类型是单条记录类型，则会从 URI 中提取书籍 ID，并将其指定为附加的 `where`\
  \ 子句。最后，代码返回删除的记录数（参见清单 4–6）。\n\n\n### 使用 UriMatcher 辨别 URI\n\n我们之前多次提到 `UriMatcher`\
  \ 类，现在来深入了解一下。内容提供程序中的几乎所有方法都针对 URI 进行了重载。例如，无论你是要检索单本书籍还是多本书籍列表，都会调用相同的 `query()`\
  \ 方法。具体由该方法来判断请求的是哪种类型的 URI。Android 的 `UriMatcher` 实用程序类可以帮助你识别 URI 类型。\n\n其工作原理如下：你告知\
  \ `UriMatcher` 的一个实例预期会接收到哪种 URI 模式。你还需要为每个模式关联一个唯一的数字。注册完这些模式后，你就可以询问 `UriMatcher`\
  \ 传入的 URI 是否与某个特定模式匹配。\n\n如前所述，我们的 `BookProvider` 内容提供程序有两种 URI 模式：一种针对书籍集合，另一种针对单本书籍。代码清单\
  \ 4–7 中的代码使用 `UriMatcher` 注册了这两种模式。它为书籍集合分配了数字 `1`，为单本书籍分配了数字 `2`（URI 模式本身在 `books`\
  \ 表的元数据中定义）。\n\n**代码清单 4–7.** *使用 UriMatcher 注册 URI 模式*\n\n```\nprivate static final\
  \ UriMatcher sUriMatcher;\n//为每种 URI 类型定义 ID\nprivate static final int INCOMING_BOOK_COLLECTION_URI_INDICATOR\
  \ = 1;\nprivate static final int INCOMING_SINGLE_BOOK_URI_INDICATOR = 2;\n\nstatic\
  \ {\n    sUriMatcher = new UriMatcher(UriMatcher.NO_MATCH);\n    //注册书籍的模式\n   \
  \ sUriMatcher.addURI(BookProviderMetaData.AUTHORITY\n                          \
  \   , \"books\"\n                             , INCOMING_BOOK_COLLECTION_URI_INDICATOR);\n\
  \    //注册单本书籍的模式\n    sUriMatcher.addURI(BookProviderMetaData.AUTHORITY\n      \
  \                      , \"books/#\",\n                            INCOMING_SINGLE_BOOK_URI_INDICATOR);\n\
  }\n```\n\n现在注册已完成，你可以看到 `UriMatcher` 如何在查询方法的实现中发挥作用：\n\n```\nswitch (sUriMatcher.match(uri))\
  \ {\n   case INCOMING_BOOK_COLLECTION_URI_INDICATOR:\n   ......\n   case INCOMING_SINGLE_BOOK_URI_INDICATOR:\n\
  \   ......\n   default:\n      throw new IllegalArgumentException(\"Unknown URI\
  \ \" + uri);\n}\n```\n\n请注意，`match` 方法返回的是之前注册时使用的相同数字。`UriMatcher` 的构造函数接收一个整数，用于根\
  \ URI。如果 URL 上没有路径段或权限，`UriMatcher` 会返回此数字。当模式不匹配时，`UriMatcher` 也会返回 `NO_MATCH`。你可以构建一个没有根匹配代码的\
  \ `UriMatcher`；在这种情况下，Android 会在内部将 `UriMatcher` 初始化为 `NO_MATCH`。因此，你也可以将代码清单 4–7\
  \ 中的代码写成如下形式：\n\n```\nstatic {\n    sUriMatcher = new UriMatcher();\n    sUriMatcher.addURI(BookProviderMetaData.AUTHORITY\n\
  \                             , \"books\"\n                             , INCOMING_BOOK_COLLECTION_URI_INDICATOR);\n\
  \    sUriMatcher.addURI(BookProviderMetaData.AUTHORITY\n                       \
  \     , \"books/#\",\n                            INCOMING_SINGLE_BOOK_URI_INDICATOR);\n\
  }\n```\n\n### 使用投影映射\n\n内容提供程序充当抽象列集与数据库中真实列集之间的中介，但这两个列集可能有所不同。在构建查询时，你必须在客户端指定的\
  \ `where` 子句列和实际的数据库列之间建立映射。你可以借助 `SQLiteQueryBuilder` 类来设置这个*投影映射*。\n\n以下是 Android\
  \ SDK 文档中关于 `SQLiteQueryBuilder` 类上可用的映射方法 `setProjectionMap(Map columnMap)` 的描述：\n\
  \n> 设置查询的投影映射。投影映射将调用者传递给查询的列名映射到数据库列名。这对于重命名列以及在执行连接操作时消除列名歧义非常有用。例如，你可以将 \"name\"\
  \ 映射到 \"people.name\"。如果设置了投影映射，则它必须包含用户可能请求的所有列名，即使键和值相同也是如此。\n\n以下是我们的 `BookProvider`\
  \ 内容提供程序设置投影映射的方式：\n\n```\nsBooksProjectionMap = new HashMap<String, String>();\n\
  sBooksProjectionMap.put(BookTableMetaData._ID, BookTableMetaData._ID);\n\n//name,\
  \ isbn, author\nsBooksProjectionMap.put(BookTableMetaData.BOOK_NAME\n          \
  \                                 , BookTableMetaData.BOOK_NAME);\nsBooksProjectionMap.put(BookTableMetaData.BOOK_ISBN\n\
  \                                          , BookTableMetaData.BOOK_ISBN);\nsBooksProjectionMap.put(BookTableMetaData.BOOK_AUTHOR\n\
  \                                          , BookTableMetaData.BOOK_AUTHOR);\n//created\
  \ date, modified date\nsBooksProjectionMap.put(BookTableMetaData.CREATED_DATE\n\
  \                                           , BookTableMetaData.CREATED_DATE);\n\
  sBooksProjectionMap.put(BookTableMetaData.MODIFIED_DATE\n                      \
  \                      , BookTableMetaData.MODIFIED_DATE);\n```\n\n然后，查询构建器像这样使用变量\
  \ `sBooksProjectionMap`：\n\n```\nqueryBuilder.setTables(BookTableMetaData.TABLE_NAME);\n\
  queryBuilder.setProjectionMap(sBooksProjectionMap);\n```\n\n### 注册提供程序\n\n最后，你必须使用代码清单\
  \ 4–8 中的标签结构，在 `AndroidManifest.xml` 文件中注册内容提供程序。\n\n**代码清单 4–8.** *注册提供程序*\n\n\
  ```\n<provider android:name=\".BookProvider\"\n   android:authorities=\"com.androidbook.provider.BookProvider\"\
  />\n```\n\n### 测试书籍提供程序\n\n现在我们有了一个书籍提供程序，我们将向你展示测试该提供程序的示例代码。示例代码包括添加书籍、删除书籍、获取书籍数量，以及最后显示所有书籍。\n\
  \n请注意，这些是示例项目中的代码片段，它们无法直接编译，因为需要额外的依赖文件。但我们认为，这些示例代码对于演示我们探讨过的概念很有价值。\n\n在本章末尾，我们提供了可下载示例项目的链接，你可以在\
  \ Eclipse 环境中使用它进行编译和测试。\n\n#### 添加书籍\n\n代码清单 4–9 中的代码向书籍数据库中插入一本新书。\n\n**代码清单 4–9.**\
  \ *测试提供程序的插入操作*\n\n```\npublic void addBook(Context context)\n{\n    String tag\
  \ = \"Exercise BookProvider\";\n    Log.d(tag,\"Adding a book\");\n    ContentValues\
  \ cv = new ContentValues();\n    cv.put(BookProviderMetaData.BookTableMetaData.BOOK_NAME,\
  \ \"book1\");\n    cv.put(BookProviderMetaData.BookTableMetaData.BOOK_ISBN, \"isbn-1\"\
  );\n    cv.put(BookProviderMetaData.BookTableMetaData.BOOK_AUTHOR, \"author-1\"\
  );\n\n    ContentResolver cr = context.getContentResolver();\n    Uri uri = BookProviderMetaData.BookTableMetaData.CONTENT_URI;\n\
  \    Log.d(tag,\"book insert uri:\" + uri);\n    Uri insertedUri = cr.insert(uri,\
  \ cv);\n    Log.d(tag,\"inserted uri:\" + insertedUri);\n}\n```\n\n\n\n#### 删除一本书\n\
  \n代码清单 4–10 中的代码用于从图书数据库中删除最后一条记录。请参考代码清单 4–11，其中展示了代码清单 4–10 中 `getCount()` 方法的工作原理。\n\
  \n**代码清单 4–10.** *执行 Provider 删除操作*\n\n```java\npublic void removeBook(Context context)\n\
  {\n    String tag = \"Exercise BookProvider\";\n    int i = getCount(context); //参见代码清单\
  \ 4–11 中的 getCount 函数\n    ContentResolver cr = context.getContentResolver();\n\
  \    Uri uri = BookProviderMetaData.BookTableMetaData.CONTENT_URI;\n    Uri delUri\
  \ = Uri.withAppendedPath(uri, Integer.toString(i));\n    Log.d(tag, \"Del Uri:\"\
  \ + delUri);\n    cr.delete(delUri, null, null);\n    Log.d(tag, \"Newcount:\" +\
  \ getCount(context));\n}\n```\n\n请注意，这只是一个快速示例，用于演示如何使用 URI 执行删除操作。获取最后一个 URI 的算法并非在所有情况下都有效。不过，如果你先添加\
  \ 5 条记录，然后从末尾逐一删除，它应该可以正常工作。在实际场景中，你可能需要将记录显示在列表中，并让用户选择要删除的记录，这样你就能知道记录的确切 URI。\n\
  \n#### 获取图书数量\n\n代码清单 4–11 中的代码用于获取数据库游标并统计游标中的记录数量。\n\n**代码清单 4–11.** *统计表中的记录数*\n\
  \n```java\nprivate int getCount(Context context)\n{\n    Uri uri = BookProviderMetaData.BookTableMetaData.CONTENT_URI;\n\
  \    Activity a = (Activity)context;\n    Cursor c = a.managedQuery(uri,\n     \
  \       null, //投影\n            null, //选择字符串\n            null, //选择参数（字符串数组）\n\
  \            null); //排序顺序\n    int numberOfRecords = c.getCount();\n    c.close();\n\
  \    return numberOfRecords;\n}\n```\n\n#### 显示图书列表\n\n代码清单 4–12 中的代码用于检索图书数据库中的所有记录。\n\
  \n**代码清单 4–12.** *显示图书列表*\n\n```java\npublic void showBooks(Context context)\n{\n\
  \    String tag = \"Exercise BookProvider\";\n    Uri uri = BookProviderMetaData.BookTableMetaData.CONTENT_URI;\n\
  \    Activity a = (Activity)context;\n    Cursor c = a.managedQuery(uri,\n     \
  \       null, //投影\n            null, //选择字符串\n            null, //选择参数（字符串数组）\n\
  \            null); //排序顺序\n\n    int iname = c.getColumnIndex(\n        BookProviderMetaData.BookTableMetaData.BOOK_NAME);\n\
  \n    int iisbn = c.getColumnIndex(\n        BookProviderMetaData.BookTableMetaData.BOOK_ISBN);\n\
  \    int iauthor = c.getColumnIndex(\n         BookProviderMetaData.BookTableMetaData.BOOK_AUTHOR);\n\
  \n    //报告索引\n    Log.d(tag,\"name,isbn,author:\" + iname + iisbn + iauthor);\n\n\
  \    //基于索引遍历行\n    for(c.moveToFirst();!c.isAfterLast();c.moveToNext())\n    {\n\
  \        //收集值\n        String id = c.getString(1);\n        String name = c.getString(iname);\n\
  \        String isbn = c.getString(iisbn);\n        String author = c.getString(iauthor);\n\
  \n        //报告或记录行\n        StringBuffer cbuf = new StringBuffer(id);\n        cbuf.append(\"\
  ,\").append(name);\n        cbuf.append(\",\").append(isbn);\n        cbuf.append(\"\
  ,\").append(author);\n        Log.d(tag, cbuf.toString());\n    }\n\n    //报告已读取的行数\n\
  \    int numberOfRecords = c.getCount();\n    Log.d(tag,\"Num of Records:\" + numberOfRecords);\n\
  \n    //关闭游标\n    //理想情况下，这应该放在\n    //finally 块中完成。\n    c.close();\n}\n```\n\n\
