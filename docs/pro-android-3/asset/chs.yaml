  \       return query.substring(0,dotIndex);\n    }\n}\n```\n### 理解建议提供程序的 URI\n\n\
  现在您已经看到了自定义建议提供程序的完整源代码，让我们看看这部分源代码如何满足 URI 的职责。\n\n首先，我们来看看 Android 调用建议提供程序时使用的\
  \ URI 格式。假设我们的建议提供程序的授权（authority）为：\n\n`com.androidbook.search.custom.suggesturlprovider`\n\
  \n那么 Android 将发送两种可能的 URI。第一种 URI 是搜索 URI，其格式如下之一：\n\n`content://com.androidbook.search.suggesturlprovider/search_suggest_query`\n\
  \n或\n\n`content://com.androidbook.search.suggesturlprovider/search_suggest_query/<您的查询>`\n\
  \n当用户在 QSB（快速搜索框）中开始输入文本时，系统会发出此 URI。在一种变体中，查询作为路径段（path segment）附加在 URI 末尾传递。是否将查询作为路径段传递，是在搜索元数据文件\
  \ `searchable.xml` 中指定的。我们将在更详细地介绍搜索元数据时讨论这一规范。\n\n针对建议提供程序的第二种 URI 类型与 Android\
  \ 搜索快捷方式（search shortcuts）相关。Android 搜索快捷方式是指 Android 决定缓存的一些建议（参见图 23–3），而不是调用建议提供程序获取最新内容。我们将在讨论建议列时进一步介绍\
  \ Android 搜索快捷方式。目前，第二种 URI 的格式如下：\n\n`content://com.androidbook.search.suggesturlprovider/search_suggest_shortcut`\n\
  \n或：\n\n`content://com.androidbook.search.suggesturlprovider/search_suggest_shortcut/<快捷方式\
  \ ID>`\n\n当 Android 尝试判断其缓存的快捷方式是否仍然有效时，会发出此 URI。这种 URI 称为快捷方式 URI。如果提供程序返回单行数据，它将用新的快捷方式替换当前快捷方式。如果提供程序返回\
  \ null，则 Android 认为该建议不再有效。\n\nAndroid 中的 `SearchManager` 类定义了两个常量来表示这些用于区分用途的 URI\
  \ 段（`search_suggest_search` 和 `search_suggest_shortcut`）。它们分别是：\n\n- `SearchManager.SUGGEST_URI_PATH_QUERY`\n\
  - `SearchManager.SUGGEST_URI_PATH_SHORTCUT`\n\n提供程序有责任在其 `query()` 方法中识别这些传入的 URI。请参见清单\
  \ 23–20，了解如何使用 `UriMatcher` 实现这一点。（您可以参考第 5 章详细了解如何使用 `UriMatcher`。）\n\n### 实现 `getType()`\
  \ 并指定 MIME 类型\n\n由于建议提供程序本质上是一个内容提供程序，它必须实现内容提供程序的契约，其中包括为 `getType()` 方法提供实现。\n\
  \n您可以再次查阅清单 23–20，了解在此案例中 `getType()` 是如何实现的。为方便回顾，此处复制了该代码。\n\n```\npublic String\
  \ getType(Uri uri) {\n        switch (sURIMatcher.match(uri)) {\n            case\
  \ SEARCH_SUGGEST:\n                return SearchManager.SUGGEST_MIME_TYPE;\n   \
  \         case SHORTCUT_REFRESH:\n                return SearchManager.SHORTCUT_MIME_TYPE;\n\
  \            default:\n             throw\n             new IllegalArgumentException(\"\
  未知 URL \" + uri);\n        }\n    }\n```\n\nAndroid 搜索框架通过其 `SearchManager` 类提供了几个常量来辅助处理这些\
  \ MIME 类型。这些 MIME 类型如下：\n\n- `SearchManager.SUGGEST_MIME_TYPE`\n- `SearchManager.SHORTCUT_MIME_TYPE`\n\
  \n它们分别对应以下实际值：\n- `vnd.android.cursor.dir/vnd.android.search.suggest`\n- `vnd.android.cursor.item/vnd.android.search.suggest`\n\
  \n\n#### 将查询传递给建议提供者：`Selection` 参数\n\n当 Android 使用某个 URI 调用提供者时，Android 最终会调用建议提供者的\
  \ `query()` 方法来获取建议游标。如果你在清单 23–20 中看到了 `query()` 方法的实现，会注意到我们正在使用 `selection` 参数和\
  \ `selectionArgs` 参数来制定并返回游标。以下是供快速回顾的代码副本：\n\n```\npublic Cursor query(Uri uri,\
  \ String[] projection,\n                    String selection,\n                \
  \    String[] selectionArgs, String sortOrder)\n{\n    Log.d(tag,\"query called\
  \ with uri:\" + uri);\n    Log.d(tag,\"selection:\" + selection);\n\n    String\
  \ query = selectionArgs[0];\n    Log.d(tag,\"query:\" + query);\n\n    switch (sURIMatcher.match(uri))\
  \ {\n        case SEARCH_SUGGEST:\n            Log.d(tag,\"search suggest called\"\
  );\n            return getSuggestions(query);\n        case SHORTCUT_REFRESH:\n\
  \            Log.d(tag,\"shortcut refresh called\");\n            return null;\n\
  \        default:\n            throw new IllegalArgumentException(\"Unknown URL\
  \ \" + uri);\n    }\n}\n```\n\n要理解通过 `selection` 和 `selectionArgs` 这两个参数传递了什么，你需要查看\
  \ `searchable.xml`，即搜索元数据文件。清单 23–21 展示了这个搜索元数据 XML 文件的代码。\n\n**清单 23–21.** *CustomSuggestionProvider\
  \ 搜索元数据*\n\n```\n//xml/searchable.xml\n<searchable\n    android:label=\"@string/search_label\"\
  \n    android:hint=\"@string/search_hint\"\n    android:searchMode=\"showSearchLabelAsBadge\"\
  \n    android:searchSettingsDescription=\"suggests urls\"\n    android:includeInGlobalSearch=\"\
  true\"\n    android:queryAfterZeroResults=\"true\"\n    android:searchSuggestAuthority=\n\
  \           \"com.androidbook.search.custom.suggesturlprovider\"\n    android:searchSuggestIntentAction=\n\
  \           \"android.intent.action.VIEW\"\n    android:searchSuggestSelection=\"\
  \ ? \"\n/>\n```\n\n**注意：** 请注意 `searchSuggestAuthority` 字符串值。它应与 Android 清单文件中相应的内容提供者\
  \ URI 定义匹配。\n\n注意前面搜索元数据定义文件清单中的 `searchSuggestSelection` 属性。它直接对应于内容提供者 `query()`\
  \ 方法的 `selection` 参数。如果你回顾第 4 章，就会知道此参数用于传递带有可替换 `?` 符号的 `where` 子句。\n\n可替换值的数组随后通过\
  \ `selectionArgs` 数组参数传递。这里确实如此。当你指定 `searchSuggestSelection` 时，Android 会假设你不希望通过\
  \ URI 接收搜索文本，而是通过 `query()` 方法的 `selection` 参数来接收。在这种情况下，Android 搜索会发送 `?`（注意 `?`\
  \ 前后的空格）作为 `selection` 参数的值，并将查询文本作为 `selectionArgs` 数组的第一个元素传递。\n\n如果你不指定 `searchSuggestSelection`，那么它会将搜索文本作为\
  \ URI 的最后一个路径段传递。你可以选择其中一种方式。在我们的示例中，我们选择了 `selection` 方法，而不是 URI 方法。\n\n#### 探索自定义建议提供者的搜索元数据\n\
  \n既然我们已经谈到了搜索元数据属性这个话题，让我们来探讨一下还有哪些其他属性可用。我们将涵盖那些经常使用或与建议提供者相关的属性。有关完整列表，你可以参考 `SearchManager`\
  \ API 文档：\n\n`http://developer.android.com/guide/topics/search/searchable-config.html`\n\
  \n`searchSuggestIntentAction` 属性（清单 23–21）用于在通过 Intent 调用 `SearchActivity` 时传递或指定\
  \ Intent 动作。这允许 `SearchActivity` 执行默认搜索之外的其他操作。以下是一个响应搜索活动的 `onCreate()` 方法中如何使用\
  \ Intent 动作的示例：\n\n```\n//Body of onCreate\n\n// get and process search query here\n\
  final Intent queryIntent = getIntent();\n//query action\nfinal String queryAction\
  \ = queryIntent.getAction();\nif (Intent.ACTION_SEARCH.equals(queryAction))\n{\n\
  \    this.doSearchQuery(queryIntent);\n}\nelse if (Intent.ACTION_VIEW.equals(queryAction))\n\
  {\n    this.doView(queryIntent);\n}\nelse {\n    Log.d(tag,\"Create intent NOT from\
  \ search\");\n}\n```\n\n你将在后续的清单 23–23 中看到此代码的上下文，其中 `SearchActivity` 通过检查 Intent\
  \ 的动作值来查找 VIEW 动作或 SEARCH 动作。\n\n另一个我们没有在此使用，但可供建议提供者使用的属性叫做 `searchSuggestPath`。如果指定了此字符串值，它会被追加到\
  \ URI（调用建议提供者的 URI）后面，位于 `SUGGEST_URI_PATH_QUERY` 之后。这允许单个自定义建议提供者响应两个不同的搜索活动。每个\
  \ `SearchActivity` 会使用不同的 URI 后缀。建议提供者可以利用此路径后缀，为目标搜索活动返回不同的结果集。\n\n与 Intent 动作类似，你也可以使用\
  \ `searchSuggestIntentData` 属性指定 Intent 数据。这是一个数据 URI，可以在被调用时与动作一起传递给搜索活动，作为 Intent\
  \ 的一部分。\n\n名为 `searchSuggestThreshold` 的属性表示在调用建议提供者之前，必须在 QSB 中输入的字符数。默认阈值是 0。\n\
  \n`queryAfterZeroResults` 属性（true 或 false）表示：如果当前字符集返回了零结果集，是否应联系提供者以获取下一组字符。在我们的\
  \ URI 建议提供者中，开启此标志非常重要，这样我们每次都能看到完整的查询文本。\n\n现在我们已经了解了 URI、`selection` 参数和搜索元数据，让我们接着探讨建议提供者最重要的方面：建议游标。\n\
  \n\n好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例格式，对给定的英文文本进行专业翻译。\n\n---\n\n\n### 建议光标列\n\
  \n建议光标，归根结底，也是一种光标。它与我们在第 4 章中详细讨论的数据库游标并无区别。建议光标充当了 Android 搜索设施和建议提供者之间的契约。这意味着光标返回的列的名称和类型是固定的，并且双方都已知晓。\n\
  \n为了给搜索提供灵活性，Android 搜索提供了大量的列，其中大部分是可选的。一个建议提供者不需要返回所有这些列；它可以忽略发送与自身不相关的列。在本节中，我们将介绍大部分列的含义和重要性（对于其余部分，您可以参考我们已多次提及的\
  \ `SearchManager` API 文档）。\n\n首先，我们将讨论建议提供者可以返回哪些列，每列的含义，以及它如何影响搜索。\n\n与所有光标一样，建议光标也必须有一个\
  \ `_id` 列。这是一个强制性的列。所有其他列都以 `SUGGEST_COLUMN_` 前缀开头。这些常量在 `SearchManager` API 参考文档中定义。我们将在下面讨论最常用的列。有关完整列表，请使用本章末尾指出的\
  \ API 参考文档。\n\n*   `text_1`：这是建议中的第一行文本（参见图 23-3）。\n*   `text_2`：这是建议中的第二行文本（参见图\
  \ 23-3）。\n*   `icon_1`：这是建议中左侧的图标，通常是一个资源 ID。\n*   `icon_2`：这是建议中右侧的图标，通常是一个资源 ID。\n\
  *   `intent_action`：当 `SearchActivity` 作为意图动作被调用时，会传递该值。如果搜索元数据中可用，它将覆盖相应的意图动作（参见清单\
  \ 23-21）。\n*   `intent_data`：当 `SearchActivity` 作为意图数据被调用时，会传递该值。如果搜索元数据中可用，它将覆盖相应的意图动作（参见清单\
  \ 23-21）。这是一个数据 URI。\n*   `intent_data_id`：这会被附加到数据 URI 之后。如果您想在元数据中一次性指定数据的根部分，然后为每个建议更改此\
  \ ID，这将特别有用。这种方法效率更高。\n*   `query`：要用于发送到搜索活动的查询字符串。\n*   `shortcut_id`：如前所述，Android\
  \ 搜索会缓存建议提供者提供的建议。这些被缓存的建议称为快捷方式。如果此列不存在，Android 将缓存该建议并且永远不会请求更新。如果该值等于 `SUGGEST_NEVER_MAKE_SHORTCUT`，则\
  \ Android 不会缓存此建议。如果它包含任何其他值，此 ID 将作为快捷方式 URI 的最后路径段传递。（请参阅“理解建议提供者 URI”一节。）\n*\
  \   `spinner_while_refreshing`：此布尔值将告诉 Android 在更新快捷方式的过程中是否应使用旋转进度条。\n\n还有一组可变的附加列用于响应操作键。我们稍后将在操作键部分介绍。现在，让我们看看我们的自定义建议提供者如何返回这些列。\n\
  \n### 填充和返回列列表\n\n不要求每个自定义建议提供者都返回所有这些列。对于我们的建议提供者，我们将根据“规划自定义建议提供者”部分指示的功能，仅返回列的子集。\n\
  \n查看清单 23-20，您可以看到我们的列列表如下所示（已在清单 23-22 中提取并重现）。\n\n**清单 23-22.** *定义建议光标列*\n\n\
  ```\n    private static final String[] COLUMNS = {\n            \"_id\",  // 必须包含此列\n\
              SearchManager.SUGGEST_COLUMN_TEXT_1,\n            SearchManager.SUGGEST_COLUMN_TEXT_2,\n\
              SearchManager.SUGGEST_COLUMN_INTENT_DATA,\n            SearchManager.SUGGEST_COLUMN_INTENT_ACTION,\n\
              SearchManager.SUGGEST_COLUMN_SHORTCUT_ID\n            };\n```\n\n选择这些列是为了满足以下功能：\n\
  \n用户在 QSB 中输入一个带有提示的词语，例如 “great.m”，我们的建议提供者在搜索文本中出现 “.” 之前不会响应。一旦识别到，建议提供者会从中提取该词语（本例中为\
  \ “great”），然后返回两条建议。\n\n第一条建议是使用该词语调用 `thefreewebdictionary.com`，第二条建议是使用 `define:great`\
  \ 模式在 Google 中搜索。\n\n为了实现这一点，提供者将 `intent_action` 列加载为 `intent.action.view`，并将包含完整\
  \ URI 的意图数据加载进去。希望是当 Android 看到以 `http://` 开头的数据 URI 时，它会启动浏览器。\n\n我们将 `text1` 列填充为\
  \ `search some-website with:`，将 `text2` 列填充为该词语本身（同样，本例中为 `great`）。我们还将快捷方式 ID 设置为\
  \ `SUGGEST_NEVER_MAKE_SHORTCUT` 以简化操作。此设置禁用了缓存，并防止触发建议快捷方式 URI。\n\n至此，我们完成了对自定义建议提供者类源代码的分析。我们学习了\
  \ URI、建议光标和特定于建议提供者的搜索元数据。我们还知道了如何填充建议列。\n\n现在，让我们研究如何为自定义建议提供者实现搜索活动。\n\n### 为自定义建议提供者实现搜索活动\n\
  \n在简单的建议提供者实现中，我们只涵盖了搜索活动的部分职责。现在让我们看看我们忽略的方面。\n\nAndroid 搜索会通过两种方式之一调用搜索活动来响应搜索操作。这可能在用户从\
  \ QSB 点击搜索图标时发生，也可能在用户直接点击建议时发生。\n\n当被调用时，搜索活动需要检查它被调用的原因。此信息可在意图动作中找到。搜索活动需要检查意图动作以执行正确的操作。在许多情况下，此动作是\
  \ `ACTION_SEARCH`。然而，建议提供者可以选择通过搜索元数据或建议光标列指定一个显式动作来覆盖它。这种类型的动作可以是任何东西。在我们的示例中，我们将使用一个\
  \ `VIEW` 动作。\n\n正如我们在讨论简单建议提供者时指出的，也可以将搜索活动的启动模式设置为 `singleTop`。在这种情况下，搜索活动除了 `onCreate()`\
  \ 之外，还负责响应 `onNewIntent()`。我们将讨论这两种情况，并展示它们有多相似。\n\n我们将同时使用 `onNewIntent()` 和 `onCreate()`\
  \ 来处理 `ACTION_SEARCH` 和 `ACTION_VIEW`。在搜索动作的情况下，我们只需将查询文本显示给用户。在视图动作的情况下，我们将控制权移交给浏览器并结束当前活动，以便给用户一种通过直接点击建议来调用浏览器的印象。\n\
  \n**注意：** 此 `SearchActivity` 不需要是 Android 主应用程序菜单中的可启动活动。确保您不要像其他需要从设备主应用程序屏幕调用的活动那样，无意中为此活动设置意图过滤器。\n\
  \n有了这些，让我们检查一下 `SearchActivity.java` 的源代码。\n\n\n\n#### 自定义建议提供程序的 `SearchActivity`\n\
  \n现在我们已经了解了搜索活动的职责，特别是哪些职责适用于我们的示例，我们可以展示此搜索活动的源代码（清单 23–23）。\n\n**清单 23–23.** `SearchActivity`\n\
  \n```java\n//file: SearchActivity.java\npublic class SearchActivity extends Activity\n\
  {\n    private final static String tag =\"SearchActivity\";\n    @Override\n   \
  \ protected void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \n        Log.d(tag,\"I am being created\");\n        setContentView(R.layout.layout_test_search_activity);\n\
  \n        // get and process search query here\n        final Intent queryIntent\
  \ = getIntent();\n\n        //query action\n        final String queryAction = queryIntent.getAction();\n\
  \        Log.d(tag,\"Create Intent action:\"+queryAction);\n\n        final String\
  \ queryString =\n           queryIntent.getStringExtra(SearchManager.QUERY);\n \
  \       Log.d(tag,\"Create Intent query:\"+queryString);\n\n        if (Intent.ACTION_SEARCH.equals(queryAction))\n\
  \        {\n           this.doSearchQuery(queryIntent);\n        }\n        else\
  \ if (Intent.ACTION_VIEW.equals(queryAction))\n        {\n           this.doView(queryIntent);\n\
  \        }\n        else {\n           Log.d(tag,\"Create intent NOT from search\"\
  );\n        }\n        return;\n    }\n\n    @Override\n    public void onNewIntent(final\
  \ Intent newIntent)\n    {\n        super.onNewIntent(newIntent);\n        Log.d(tag,\"\
  new intent calling me\");\n\n        // get and process search query here\n    \
  \    final Intent queryIntent = newIntent;\n\n        //query action\n        final\
  \ String queryAction = queryIntent.getAction();\n        Log.d(tag,\"New Intent\
  \ action:\"+queryAction);\n\n        final String queryString =\n           queryIntent.getStringExtra(SearchManager.QUERY);\n\
  \        Log.d(tag,\"New Intent query:\"+queryString);\n\n        if (Intent.ACTION_SEARCH.equals(queryAction))\n\
  \        {\n           this.doSearchQuery(queryIntent);\n        }\n        else\
  \ if (Intent.ACTION_VIEW.equals(queryAction))\n        {\n           this.doView(queryIntent);\n\
  \        }\n        else {\n           Log.d(tag,\"New intent NOT from search\"\
  );\n        }\n        return;\n    }\n    private void doSearchQuery(final Intent\
  \ queryIntent)\n    {\n        final String queryString =\n           queryIntent.getStringExtra(SearchManager.QUERY);\n\
  \        appendText(\"You are searching for:\" + queryString);\n    }\n    private\
  \ void appendText(String msg)\n    {\n        TextView tv = (TextView)this.findViewById(R.id.text1);\n\
  \        tv.setText(tv.getText() + \"\\n\" + msg);\n    }\n    private void doView(final\
  \ Intent queryIntent)\n    {\n        Uri uri = queryIntent.getData();\n       \
  \ String action = queryIntent.getAction();\n        Intent i = new Intent(action);\n\
  \        i.setData(uri);\n        startActivity(i);\n        this.finish();\n  \
  \  }\n}\n```\n\n我们将首先分析此搜索活动是如何被调用的，以此开始对源代码的分析。\n\n#### `SearchActivity` 调用详情\n\
  \n与所有 Activity 一样，我们知道搜索活动必须通过 Intent 来调用。然而，如果认为总是 Intent 的 `action` 负责此项工作，那就错了。事实证明，搜索活动是通过其组件名称规范显式调用的。\n\
  \n你可能会问这为什么重要。嗯，我们知道在建议提供程序中，我们会在建议行中显式指定一个 Intent `action`。如果此 Intent action 是\
  \ `VIEW`，并且 Intent 数据是 HTTP URL，那么不知情的程序员会认为浏览器将被启动以响应，而不是搜索活动。这当然是可取的。但是，由于最终的\
  \ Intent 除了 Intent action 和数据之外，还加载了搜索活动的组件名称，因此组件名称将优先。\n\n我们不确定为什么存在此限制，也不清楚如何克服它。但事实是，无论你的建议提供程序指定了什么\
  \ Intent action，被调用的都将是搜索活动。在我们的例子中，我们将简单地从搜索活动启动浏览器，然后关闭搜索活动。\n\n为了演示这一点，以下是当我们点击一条建议时，Android\
  \ 为调用我们的搜索活动而触发的 Intent：\n\n```\nlaunching Intent {\nact=android.intent.action.VIEW\n\
  dat=http://www.google.com\nflg=0x10000000\ncmp=com.androidbook.search.custom/.SearchActivity\
  \ (has extras)\n}\n```\n\n请注意 Intent 的组件规范。它直接指向搜索活动。因此，无论你指示什么 Intent action，Android\
  \ 都将始终调用搜索活动。结果，启动浏览器的责任就落在了搜索活动身上。\n\n现在让我们看看在搜索活动中我们是如何处理这些 Intent 的。\n\n####\
  \ 响应 `ACTION_SEARCH` 和 `ACTION_VIEW`\n\n我们知道 Android 搜索会通过名称显式调用搜索活动。然而，调用的 Intent\
  \ 也携带了指定的 action。当 QSB 通过搜索图标调用此活动时，此 action 是 `ACTION_SEARCH`。\n\n如果它是由搜索建议调用的，那么此\
  \ action 可能不同。这取决于建议提供程序如何设置建议。在我们的例子中，建议提供程序将其设置为 `ACTION_VIEW`。\n\n因此，搜索活动需要检查\
  \ action 的类型。以下是我们如何检查此代码以决定是调用搜索查询方法还是视图方法。（此代码段摘自 清单 23–23）：\n\n```java\n    \
  \   if (Intent.ACTION_SEARCH.equals(queryAction))\n        {\n           this.doSearchQuery(queryIntent);\n\
  \        }\n        else if (Intent.ACTION_VIEW.equals(queryAction))\n        {\n\
  \           this.doView(queryIntent);\n        }\n```\n\n从代码中可以看出，对于视图操作，我们调用 `doView()`；对于搜索操作，我们调用\
  \ `doSearchQuery()`。\n\n在 `doView()` 函数中，我们将检索 action 和数据 URI，用它们填充一个新的 Intent，然后调用该活动。这将启动浏览器。我们将结束该活动，以便返回按钮将你带回调用它的任何搜索界面。\n\
  \n在 `doSearchQuery()` 中，我们只是将搜索查询文本记录到视图中。让我们看一下用于支持 `doSearchQuery()` 的布局。\n\n\
  #### 搜索活动布局\n\n清单 23–24 是一个简单的布局，由搜索活动在 `doSearchQuery()` 情况下使用。唯一重要的元素以粗体突出显示。\n\
  \n**清单 23–24.** `SearchActivity` 布局 XML\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
  utf-8\"?>\n<!-- file: layout/layout_search_activity.xml -->\n<LinearLayout\n   \
  \ android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\n \
  \   android:layout_height=\"fill_parent\"\n    >\n<TextView\n    android:id=\"@+id/text1\"\
  \n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"wrap_content\"\
  \n    android:text=\"@string/search_activity_main_text\"\n    />\n</LinearLayout>\n\
  ```\n\n此时，展示负责此应用部分文本需求的 `strings.xml` 是合适的。\n\n\n\n##### 对应的 `strings.xml`\n\n\
  如清单 23–25 所示，此 `strings.xml` 文件为布局定义了文本字符串，同时也定义了应用程序名称、用于配置本地搜索的一些字符串等。\n\n**清单\
  \ 23–25.** *strings.xml*\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n\
  <!-- file: values/strings.xml -->\n<resources>\n<string name=\"search_activity_main_text\"\
  >\n    这是搜索活动。\n    \\n\\n\n    当使用 action_search 而非 action_view 时，将调用此活动。\n   \
  \ \\n\\n\n    如果按下搜索图标，则会触发 action_search。\n    \\n\\n\n    如果在建议上按下，则会触发 action_view。\n\
  \    </string>\n\n    <string name=\"app_name\">自定义建议应用\n    </string>\n\n<string\
  \ name=\"search_label\">自定义建议演示\n</string>\n\n    <string name=\"search_hint\">自定义建议演示提示\n\
  \    </string>\n</resources>\n```\n\n##### 响应 `onCreate()` 和 `onNewIntent()`\n\n\
  如果你查看清单 23–23，你会发现 `onCreate()` 和 `onNewIntent()` 中的代码几乎相同。这是一种常见的模式。\n\n当搜索活动被调用时，根据搜索活动的启动模式，会调用\
  \ `onCreate()` 或 `onNewIntent()`。\n\n**注意：** 有关启动模式和 `onNewIntent()` 的有用参考，请参见本章末尾的“参考资料”部分。\n\
  \n##### 关于结束搜索活动的说明\n\n在前面的讨论中，我们简要提到了如何响应 `doView()`。清单 23–26 是该函数的代码（摘自清单 23–26）。\n\
  \n**清单 23–26.** *结束搜索活动*\n\n```java\nprivate void doView(final Intent queryIntent)\n\
  \    {\n        Uri uri = queryIntent.getData();\n        String action = queryIntent.getAction();\n\
  \        Intent i = new Intent(action);\n        i.setData(uri);\n        startActivity(i);\n\
  \        this.finish();\n    }\n```\n\n此函数的目标是调用浏览器。如果我们不在末尾执行 `finish()`，用户点击返回按钮后，将会从浏览器返回到搜索活动，而不是像预期那样返回到他们原来的搜索界面。\n\
  \n理想情况下，为了提供最佳用户体验，控制权应永远不会经过搜索活动。结束此活动解决了这个问题。清单 23–26 也让我们有机会了解如何从原始 Intent（由建议提供程序设置）传输\
  \ Intent 操作和 Intent 数据，然后将它们传递给新的浏览器 Intent。\n\n我们刚刚涵盖了很多内容。我们向您展示了一个详细的建议提供程序实现和一个搜索活动实现。在此过程中，我们还向您展示了搜索元数据文件和\
  \ `strings.xml`。我们将通过查看应用程序级别的清单文件来结束对实现本章项目所需文件的检查。\n\n### 自定义建议提供程序清单文件\n\n清单文件是您将应用程序的许多组件整合在一起的地方。对于我们的自定义建议提供程序应用程序，与其他示例一样，您在此处声明其组件，例如搜索活动和建议提供程序。您还可以使用清单文件声明此应用程序已启用本地搜索，方法是将“搜索活动”声明为默认搜索。同时注意为搜索活动定义的\
  \ Intent 过滤器。\n\n这些细节在清单文件代码（清单 23–27）中以粗体突出显示。\n\n**清单 23–27.** *自定义建议提供程序清单文件*\n\
  \n```xml\n//file:AndroidManifest.xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n\
  <manifest\n      package=\"com.androidbook.search.custom\"\n      android:versionCode=\"\
  1\"\n      android:versionName=\"1.0.0\">\n<application android:icon=\"@drawable/icon\"\
  \n                     android:label=\"Custom Suggestions Provider\">\n<!--\n****************************************************************\n\
  * 搜索相关代码：搜索活动\n****************************************************************\n\
  \ -->\n<activity android:name=\".SearchActivity\"\n                  android:label=\"\
  搜索活动标签\"\n                  android:launchMode=\"singleTop\">\n     <intent-filter>\n\
  <action\nandroid:name=\"android.intent.action.SEARCH\" />\n<category\nandroid:name=\"\
  android.intent.category.DEFAULT\" />\n      </intent-filter>\n\n<meta-data android:name=\"\
  android.app.searchable\"\n        android:resource=\"@xml/searchable\" />\n   </activity>\n\
  \n<!-- 声明默认搜索 -->\n   <meta-data android:name=\"android.app.default_searchable\"\
  \n       android:value=\".SearchActivity\" />\n\n<!-- 声明建议提供程序 -->\n    <provider\
  \ android:name=\"SuggestUrlProvider\"\n        android:authorities=\n        \"\
  com.androidbook.search.custom.suggesturlprovider\" />\n</application>\n    <uses-sdk\
  \ android:minSdkVersion=\"4\" />\n</manifest>\n```\n\n如您所见，我们突出了三件事：\n\n*   定义搜索活动及其搜索元数据\
  \ XML 文件\n*   将搜索活动定义为应用程序的默认搜索\n*   定义建议提供程序及其权限\n\n所有源代码就位后，是时候浏览一下应用程序并看看它在模拟器中的表现了。\n\
  \n\n\n#### 自定义建议用户体验\n\n通过`ADT`构建并部署此应用后，您不会看到任何活动弹出窗口，因为没有需要启动的活动。相反，您会看到应用程序已成功安装在\
  \ Eclipse 控制台中。  \n这意味着建议提供者已准备好响应全局`QSB`。但在此之前，您需要启用此建议提供者参与全局搜索。\n\n在本章前面部分，我们向您展示了如何访问搜索设置应用。这里提供一个捷径，它使用的正是我们目前所学的搜索功能。\
  \  \n打开全局`QSB`，并在`QSB`中输入`sett`。这将调出设置应用，作为可被调用的建议之一。请参见图 23-26。\n\n![images](img/2326.jpg)\n\
  \n**图 23-26.** *通过搜索调用设置*\n\n请注意我们是如何利用所学的`QSB`知识来调用设置应用的。请按照本章开头指定的方法启用此应用的建议功能。完成后，在`QSB`中输入图\
  \ 23-27 所示的文本。\n\n![images](img/2327.jpg)\n\n**图 23-27.** *来自自定义建议提供者的更多结果*\n\n\
  请注意自定义建议提供者提供的搜索建议是如何呈现的。现在，如果您点击左上角的搜索图标，将搜索应用切换为“自定义建议提供者”应用，然后导航到我们自定义建议提供者提供的某个建议，并点击`QSB`搜索图标，Android\
  \ 将直接把您带到搜索活动，而无需调用任何浏览器，如图 23-28 所示。（这展示了我们讨论过的两种意图操作：搜索和查看。）\n\n![images](img/2328.jpg)\n\
  \n**图 23-28.** *查询搜索调用搜索结果*\n\n因此，这个示例展示了`ACTION_SEARCH`与`ACTION_VIEW`的区别。\n\n现在，如果您点击图\
  \ 23-27 中的免费词典建议，您将看到被调用的浏览器，如图 23-29 所示。\n\n![images](img/2329.jpg)\n\n**图 23-29.**\
  \ *免费词典*\n\n如果您点击图 23-27 中的 Google 建议项，您将看到如图 23-30 所示的浏览器。\n\n![images](img/2330.jpg)\n\
  \n**图 23-30.** *在 Google 中搜索定义*\n\n图 23-31 显示了如果您在全局搜索中不输入后缀`.m` 会发生什么。\n\n![images](img/2331.jpg)\n\
  \n**图 23-31.** *无提示的自定义提供者*\n\n请注意，建议提供者没有返回任何内容。\n\n至此，我们结束了从头构建一个功能完整的自定义建议提供者的讨论。虽然我们已经涉及了搜索的许多方面，但仍有一些主题尚未提及。这些主题是操作键和应用特定搜索数据。接下来我们将介绍这些内容。\n\
  \n### 使用操作键和应用特定搜索数据\n\n操作键和应用特定搜索数据进一步增加了 Android 搜索的灵活性。  \n操作键允许我们使用专门的设备键来实现与搜索相关的功能。应用特定搜索数据允许一个活动将附加数据传递给搜索活动。\n\
  \n**注意：** 请注意，本章剩余部分的代码清单并不构成一个可测试的项目。这些代码清单仅用于支持文本中提出的概念。\n\n我们从操作键开始讲起。\n\n####\
  \ 在 Android 搜索中使用操作键\n\n到目前为止，我们已经展示了多种调用搜索的方式：\n\n- `QSB` 中提供的搜索图标\n- 属于一组操作键的一部分的搜索键（如图\
  \ 23-1 右侧所示）\n- 由某个活动显示的显式图标或按钮\n- 基于输入即搜索声明的任何按键\n\n在本节中，我们将探讨通过操作键调用搜索。操作键是设备上可用的一组键，它们与特定操作相关联。这些操作键的一些示例如清单\
  \ 23-28 所示。\n\n**清单 23-28.** *操作键代码列表*\n\n```\nkeycode_dpad_up\nkeycode_dpad_down\n\
  keycode_dpad_left\nkeycode_dpad_right\nkeycode_dpad_center\nkeycode_back\nkeycode_call\n\
  keycode_camera\nkeycode_clear\nkecode_endcall\nkeycode_home\nkeycode_menu\nkeycode_mute\n\
  keycode_power\nkeycode_search\nkeycode_volume_up\nkeycode_volume_down\n```\n\n您可以在`KeyEvent`的\
  \ API 中看到这些操作键的定义，该 API 位于 [`developer.android.com/reference/android/view/KeyEvent.html`](http://developer.android.com/reference/android/view/KeyEvent.html)\n\
  \n**注意：** 并非所有这些操作键都可以用于搜索，但其中一些可以，例如`keycode_call`。您需要逐一尝试，看看哪个适合您的需求。\n\n一旦知道要使用哪个操作键，您就可以通过使用清单\
  \ 23-29 中的 XML 片段将其放入元数据中，来告知 Android 您对该键感兴趣。\n\n**清单 23-29.** *操作键定义示例*\n\n```xml\n\
  <searchable\n    android:label=\"@string/search_label\"\n    android:hint=\"@string/search_hint\"\
  \n    android:searchMode=\"showSearchLabelAsBadge\"\n\n    android:includeInGlobalSearch=\"\
  true\"\n    android:searchSuggestAuthority=\n       \"com.androidbook.search.simplesp.SimpleSuggestionProvider\"\
  \n    android:searchSuggestSelection=\" ? \"\n>\n   <actionkey\n       android:keycode=\"\
  KEYCODE_CALL\"\n       android:queryActionMsg=\"call\"\n       android:suggestActionMsg=\"\
  call\"\n       android:suggestActionMsgColumn=\"call_column\" />\n\n   <actionkey\n\
  \       android:keycode=\"KEYCODE_DPAD_CENTER\"\n       android:queryActionMsg=\"\
  doquery\"\n       android:suggestActionMsg=\"dosuggest\"\n       android:suggestActionMsgColumn=\"\
  my_column\" />\n   .....\n</searchable>\n```\n\n您还可以为同一个搜索上下文设置多个操作键。以下是`actionKey`元素每个属性的含义，以及如何使用它们来响应操作键按下事件。\n\
  \n\n\n*   `keycode`: 这是在 `KeyEvent` API 类中定义的键码，用于调用搜索 activity。由该键码标识的按键可在两种情况下被按下。第一种情况是用户在\
  \ QSB 中输入查询文本，但尚未导航到任何建议时。通常，在没有实现操作键的情况下，用户会按下 QSB 的搜索图标。如果在搜索的元数据中指定了一个操作键，Android\
  \ 允许用户点击该操作键，而不是 QSB 的搜索“前往”图标。第二种情况是用户导航到某个特定建议，然后点击操作键时。在这两种情况下，都会通过 `ACTION_SEARCH`\
  \ 这个 action 来调用搜索 activity。要知晓该 action 是通过操作键调用的，可以查找名为 `SearchManager.ACTION_KEY`\
  \ 的额外字符串。如果你在这里看到一个值，你就知道你的调用是由操作键按下触发的。\n*   `queryActionMsg`: 你在此元素中输入的任何文本，都会作为一个名为\
  \ `SearchManager.ACTION_MSG` 的额外字符串传递到调用搜索 activity 的 intent 中。如果你从该 intent 中检索到这个消息，并且它与你在元数据中指定的内容一致，那么你就知道你的调用是来自\
  \ QSB，并且是由于点击了操作键。如果没有这个测试，你将无法判断 `ACTION_SEARCH` 的调用是否由于直接在某个建议上点击了操作键。\n*   `suggestActionMsg`:\
  \ 你在此元素中输入的任何文本，都会作为一个名为 `SearchManager.ACTION_MSG` 的额外字符串传递到调用搜索 activity 的 intent\
  \ 中。这个额外键与 `queryActionMsg` 的额外键是相同的。如果你为这两个字段赋予了相同的值，例如 `call`，那么你将无法判断用户是以何种方式调用了操作键。在许多情况下，这无关紧要，因此你可以为两者设置相同的值。但如果你需要区分它们，就需要指定一个与\
  \ `queryActionMsg` 不同的值。\n*   `suggestActionMsgColumn`: `queryActionMsg` 和 `suggestActionMsg`\
  \ 的值全局适用于此搜索 activity 和 suggestion provider。没有办法根据具体的 suggestion 来改变 action 的含义。如果你想做到这一点，就需要告诉元数据，在\
  \ suggestion 游标（cursor）中有一个额外的列。这将允许 Android 从该额外列中获取文本，并将其作为调用 `ACTION_SEARCH`\
  \ intent 的一部分发送给 activity。有趣的是，这个额外列的值是通过 intent 中相同的额外键（即 `SearchManager.ACTION_MSG`）发送的。\n\
  \n在这些属性中，键码（`keycode`）是强制性的。此外，要使操作键生效，至少需要存在另外三个属性中的其中一个。\n\n如果你打算使用 `suggestActionMsgColumn`，你需要在\
  \ suggestion provider 类中填充这个列。在清单 23-29 中，如果你要同时使用这两个键，那么你需要在 suggestion 游标（cursor）中定义两个额外的字符串列（参见清单\
  \ 23-22），即 `call_column` 和 `my_column`。在这种情况下，你的游标列数组将如清单 23-30 所示。\n\n**清单 23-30.**\
  \ *suggestion 游标中操作键列的示例*\n\n```\n    private static final String[] COLUMNS = {\n\
  \            \"_id\",  // 必须包含此列\n            SearchManager.SUGGEST_COLUMN_TEXT_1,\n\
  \            SearchManager.SUGGEST_COLUMN_TEXT_2,\n            SearchManager.SUGGEST_COLUMN_INTENT_DATA,\n\
  \            SearchManager.SUGGEST_COLUMN_INTENT_ACTION,\n            SearchManager.SUGGEST_COLUMN_SHORTCUT_ID,\n\
  \            \"call_column\",\n            \"my_column\"\n            };\n```\n\n\
  ### 处理特定于应用的搜索上下文\n\nAndroid 搜索允许一个 activity 在调用搜索 activity 时向其传递额外的搜索数据。我们现在将详细介绍这一点。\n\
  \n正如我们所展示的，你应用中的 activity 可以重写 `onSearchRequested()` 方法，通过返回 `false` 来禁用搜索。有趣的是，同样的方法也可以用于向搜索\
  \ activity 传递额外的应用特定数据。清单 23-31 是一个示例。\n\n**清单 23-31.** *传递额外的上下文*\n\n```java\n\
  public boolean onSearchRequested()\n{\n   Bundle applicationData = new Bundle();\n\
  \   applicationData.putString(\"string_key\",\"some string value\");\n   applicationData.putLong(\"\
  long_key\",290904);\n   applicationData.putFloat(\"float_key\",2.0f);\n\n   startSearch(null,\
  \         // 初始搜索查询字符串\n      false,                 // 不要“选择初始查询”\n      applicationData,\
  \       // 额外数据\n      false                  // 不要强制进行全局搜索\n      );\n\n   return\
  \ true;\n}\n```\n\n**注意：** 你可以使用以下 Bundle API 参考文档来查看 bundle 对象上可用的各种函数：[`http://developer.android.com/reference/android/os/Bundle.html`](http://developer.android.com/reference/android/os/Bundle.html).\n\
  \n一旦搜索以这种方式启动，activity 就可以使用名为 `SearchManager.APP_DATA` 的额外字段来检索应用数据 bundle。清单 23-32\
  \ 展示了如何检索上述每个字段。\n\n**清单 23-32.** *检索额外的上下文*\n\n```java\n   Bundle applicationData\
  \ =\n      queryIntent.getBundleExtra(SearchManager.APP_DATA);\n   if (applicationData\
  \ != null)\n   {\n      String s = applicationData.getString(\"string_key\");\n\
  \      long   l = applicationData.getLong(\"long_key\");\n      float  f = applicationData.getFloat(\"\
  float_key\");\n   }\n```\n\n我们在本章前面简要介绍过 `startSearch()` 方法。你可以在以下 URL 的 Activity\
  \ API 中了解更多关于此方法的信息：\n\n`http://developer.android.com/reference/android/app/Activity.html`\n\
  \n提醒一下，此方法接受以下四个参数：\n\n*   `initialQuery` // 字符串参数\n*   `selectInitialQuery` //\
  \ 布尔值\n*   `applicationDataBundle` // Bundle\n*   `globalSearchOnly` // 布尔值\n\n\
  第一个参数（如果有）将用于填充 QSB 中的查询文本。\n\n第二个布尔参数，如果为 `true`，则会高亮显示文本。这样做使用户可以通过键盘输入来替换所有选中的查询文本。如果为\
  \ `false`，则光标将位于查询文本的末尾。\n\n第三个参数当然是我们正在准备的 bundle。\n\n第四个参数，如果为 `true`，则始终调用全局搜索。如果为\
  \ `false`，则优先调用本地搜索（如果可用）；否则，将使用全局搜索。\n\n\n\n### 资源\n\n在本章结束之际，我们想向您提供一份在编写过程中认为有价值的资源列表。\n\
