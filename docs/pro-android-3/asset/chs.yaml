  250dip\"  android:layout_height=\"200dip\" />\n  </LinearLayout>\n</LinearLayout>\n\
  ```\n\n此布局的结果将如图 19-6 所示。这张截图是在真实设备上录制视频时拍摄的，画面中显示的是工作站上的 Eclipse。\n\n![图片](img/1906.jpg)\n\
  \n**图 19-6.** *录制视频的用户界面*\n\n\n\n该布局由两个`LinearLayout`在父`LinearLayout`中并排组成。左侧有五个按钮，应用程序将随着演示的进行启用和禁用它们。右侧是主`VideoView`，其上方是\
  \ RECORDING 消息，当应用程序实际录制视频时会亮起。您可能已经猜到，我们通过在`AndroidManifest.xml`的`<activity>`标签中设置`android:screenOrientation=\"\
  landscape\"`属性，强制此应用程序使用横屏模式。让我们从`MainActivity`开始探索此应用程序，如清单 19-11 所示。\n\n**清单 19-11.**\
  \ *录制视频的 MainActivity*\n\n```\npublic class MainActivity extends Activity implements\n\
  \        SurfaceHolder.Callback, OnInfoListener, OnErrorListener {\n\n    private\
  \ static final String TAG = \"RecordVideo\";\n    private MediaRecorder mRecorder\
  \ = null;\n    private String mOutputFileName;\n    private VideoView mVideoView\
  \ = null;\n    private SurfaceHolder mHolder = null;\n    private Button mInitBtn\
  \ = null;\n    private Button mStartBtn = null;\n    private Button mStopBtn = null;\n\
  \    private Button mPlayBtn = null;\n    private Button mStopPlayBtn = null;\n\
  \    private Camera mCamera = null;\n    private TextView mRecordingMsg = null;\n\
  \n    /** Called when the activity is first created. */\n    @Override\n    public\
  \ void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        Log.v(TAG, \"in onCreate\");\n        setContentView(R.layout.main);\n\n\
  \        mInitBtn = (Button) findViewById(R.id.initBtn);\n        mStartBtn = (Button)\
  \ findViewById(R.id.beginBtn);\n        mStopBtn = (Button) findViewById(R.id.stopBtn);\n\
  \        mPlayBtn = (Button) findViewById(R.id.playRecordingBtn);\n        mStopPlayBtn\
  \ = (Button) findViewById(R.id.stopPlayingRecordingBtn);\n        mRecordingMsg\
  \ = (TextView) findViewById(R.id.recording);\n\n        mVideoView = (VideoView)this.findViewById(R.id.videoView);\n\
  \    }\n        // 本类的其余部分将在后续清单中展示。\n}\n```\n\n我们为此应用程序使用标准`Activity`，但也实现了三个接口。第一个接口`SurfaceHolder.Callback`用于接收`Surface`准备好显示视频图像的通知。在我们的例子中，`Surface`来自`VideoView`。我们还希望被告知是否有来自`MediaRecorder`的任何消息，这就是我们同时实现`OnInfoListener`和`OnErrorListener`的原因。这些接口的方法将在稍后出现。\n\
  \n我们的`Activity`有几个后续需要的成员字段，我们会在`onCreate()`方法中初始化其中的几个。现在我们只显示了`MainActivity`类其余部分的一条注释。这些类方法将在后续清单中介绍，从清单\
  \ 19-12 开始，其中展示了标准的`onResume()`和`onPause()`方法。\n\n**清单 19-12.** *录制视频的 Resume 和\
  \ Pause 代码*\n\n```\n    @Override\n    protected void onResume() {\n        Log.v(TAG,\
  \ \"in onResume\");\n        super.onResume();\n        mInitBtn.setEnabled(false);\n\
  \        mStartBtn.setEnabled(false);\n        mStopBtn.setEnabled(false);\n   \
  \     mPlayBtn.setEnabled(false);\n        mStopPlayBtn.setEnabled(false);\n   \
  \     if(!initCamera())\n            finish();\n    }\n\n    @Override\n    protected\
  \ void onPause() {\n        Log.v(TAG, \"in onPause\");\n        super.onPause();\n\
  \        releaseRecorder();\n        releaseCamera();\n    }\n```\n\n**注意：** 清单\
  \ 19-12 包含了 `MainActivity` 类的方法；我们只是为了方便讲解，将它们分开在不同的清单中。录制视频应用程序的其余清单也是如此。\n\n这些都是相当标准的方法。在`onResume()`中，我们简单地将按钮设置为初始化后的状态，然后初始化相机（该方法即将介绍）。在`onPause()`中，我们需要释放`MediaRecorder`和`Camera`。这样，每当应用退出视图时，录制将停止，相机被释放以供其他应用使用。如果用户返回我们的应用，一切将重新开始，用户将能够再次录制视频。接下来，在清单\
  \ 19-13 中是相机初始化代码、`Surface.Callback`回调，以及`Camera`和`MediaRecorder`的释放方法。\n\n**清单\
  \ 19-13.** *录制视频的 initCamera() 和 release 方法*\n\n```\n    private boolean initCamera()\
  \ {\n        try {\n            mCamera  = Camera.open();\n            Camera.Parameters\
  \ camParams = mCamera.getParameters();\n            mCamera.lock();\n          \
  \  //mCamera.setDisplayOrientation(90);\n            // 也可以在此处设置其他参数，并使用以下方式应用：\n\
  \            //mCamera.setParameters(camParams);\n\n            mHolder = mVideoView.getHolder();\n\
  \            mHolder.addCallback(this);\n            mHolder.setType(SurfaceHolder.SURFACE_TYPE_PUSH_BUFFERS);\n\
  \        }\n        catch(RuntimeException re) {\n            Log.v(TAG, \"Could\
  \ not initialize the Camera\");\n            re.printStackTrace();\n           \
  \ return false;\n        }\n        return true;\n    }\n\n    @Override\n    public\
  \ void surfaceCreated(SurfaceHolder holder) {\n        Log.v(TAG, \"in surfaceCreated\"\
  );\n\n        try {\n            mCamera.setPreviewDisplay(mHolder);\n         \
  \   mCamera.startPreview();\n        } catch (IOException e) {\n            Log.v(TAG,\
  \ \"Could not start the preview\");\n            e.printStackTrace();\n        }\n\
  \        mInitBtn.setEnabled(true);\n    }\n\n    @Override\n    public void surfaceDestroyed(SurfaceHolder\
  \ holder) {\n        Log.v(TAG, \"in surfaceDestroyed\");\n    }\n\n    @Override\n\
  \    public void surfaceChanged(SurfaceHolder holder, int format, int width,\n \
  \           int height) {\n        Log.v(TAG, \"surfaceChanged: Width x Height =\
  \ \" + width + \"x\" + height);\n    }\n\n    private void releaseRecorder() {\n\
  \        if(mRecorder != null) {\n            mRecorder.release();\n           \
  \ mRecorder = null;\n        }\n    }\n\n    private void releaseCamera() {\n  \
  \      if(mCamera != null) {\n            try {\n                mCamera.reconnect();\n\
  \            } catch (IOException e) {\n                e.printStackTrace();\n \
  \           }\n            mCamera.release();\n            mCamera = null;\n   \
  \     }\n    }\n```\n\n`initCamera()`方法被调用来设置我们对设备相机的访问。这是一切的开始。对于这个示例应用程序，我们使用`Camera`的默认参数，但我们可以轻松获取当前的参数值，更新它们，然后写回。注释掉的代码显示了您可以在哪里更改相机的行为和外观。设置好相机后，我们获取视频图像将要出现的`SurfaceHolder`。\n\
  \n`surfaceCreated()`回调是我们赋予相机对象一个位置来显示当前视图的地方，换句话说，就是相机预览。预览启动后，我们可以启用按钮来初始化`MediaRecorder`。相机预览是一个非常有用的功能，它允许用户在开始录制之前看到相机所看到的景象。无论您是在进行视频录制还是静态摄影，您很可能都会进行预览，并且在这两种情况下都可以通过这种方式完成。\n\
  \n为了完整性，我们展示了`releaseRecorder()`和`releaseCamera()`方法。它们会在`onPause()`中被调用，如清单 19-12\
  \ 所示。\n\n\n\n至此，在我们的应用程序中，我们已经设置好了相机，初始化了按钮，并显示了相机所见的预览画面。现在用户可以开始点击按钮，尽管在初始阶段唯一可用的按钮是“初始化录制器”按钮。当按下某个按钮时，将执行清单\
  \ 19–14 中的代码。该清单提供了对应每个按钮的五种操作。当每个操作执行时，按钮会相应地启用和禁用，以便进行下一步操作。例如，一旦录制器被初始化，“初始化录制器”按钮将被禁用，而“开始录制”按钮将被启用。\n\
  \n**清单 19–14.** *录制视频的按钮处理代码*\n\n```java\npublic void doClick(View view) {\n   \
  \ switch(view.getId()) {\n    case R.id.initBtn:\n        initRecorder();\n    \
  \    break;\n    case R.id.beginBtn:\n        beginRecording();\n        break;\n\
  \    case R.id.stopBtn:\n        stopRecording();\n        break;\n    case R.id.playRecordingBtn:\n\
  \        playRecording();\n        break;\n    case R.id.stopPlayingRecordingBtn:\n\
  \        stopPlayingRecording();\n        break;\n    }\n}\n\nprivate void initRecorder()\
  \ {\n    if(mRecorder != null) return;\n\n    mOutputFileName = Environment.getExternalStorageDirectory()\
  \ +\n                             \"/videooutput.mp4\";\n\n    File outFile = new\
  \ File(mOutputFileName);\n    if(outFile.exists()) {\n        outFile.delete();\n\
  \    }\n\n    try {\n        mCamera.stopPreview();\n        mCamera.unlock();\n\
  \        mRecorder = new MediaRecorder();\n        mRecorder.setCamera(mCamera);\n\
  \n        mRecorder.setAudioSource(MediaRecorder.AudioSource.CAMCORDER);\n     \
  \   mRecorder.setVideoSource(MediaRecorder.VideoSource.CAMERA);\n        mRecorder.setOutputFormat(MediaRecorder.OutputFormat.MPEG_4);\n\
  \        mRecorder.setVideoSize(176, 144);\n        mRecorder.setVideoFrameRate(15);\n\
  \        mRecorder.setVideoEncoder(MediaRecorder.VideoEncoder.MPEG_4_SP);\n    \
  \    mRecorder.setAudioEncoder(MediaRecorder.AudioEncoder.AMR_NB);\n        mRecorder.setMaxDuration(7000);\
  \ // limit to 7 seconds\n        mRecorder.setPreviewDisplay(mHolder.getSurface());\n\
  \        mRecorder.setOutputFile(mOutputFileName);\n\n        mRecorder.prepare();\n\
  \        Log.v(TAG, \"MediaRecorder initialized\");\n        mInitBtn.setEnabled(false);\n\
  \        mStartBtn.setEnabled(true);\n    }\n    catch(Exception e) {\n        Log.v(TAG,\
  \ \"MediaRecorder failed to initialize\");\n        e.printStackTrace();\n    }\n\
  }\n\nprivate void beginRecording() {\n    mRecorder.setOnInfoListener(this);\n \
  \   mRecorder.setOnErrorListener(this);\n    mRecorder.start();\n    mRecordingMsg.setText(\"\
  RECORDING\");\n    mStartBtn.setEnabled(false);\n    mStopBtn.setEnabled(true);\n\
  }\n\nprivate void stopRecording() {\n    if (mRecorder != null) {\n        mRecorder.setOnErrorListener(null);\n\
  \        mRecorder.setOnInfoListener(null);\n        try {\n            mRecorder.stop();\n\
  \        }\n        catch(IllegalStateException e) {\n            // 如果录制器已停止，可能会发生此情况。\n\
  \            Log.e(TAG, \"Got IllegalStateException in stopRecording\");\n     \
  \   }\n        releaseRecorder();\n        mRecordingMsg.setText(\"\");\n      \
  \  releaseCamera();\n        mStartBtn.setEnabled(false);\n        mStopBtn.setEnabled(false);\n\
  \        mPlayBtn.setEnabled(true);\n    }\n}\n\nprivate void playRecording() {\n\
  \    MediaController mc = new MediaController(this);\n    mVideoView.setMediaController(mc);\n\
  \    mVideoView.setVideoPath(mOutputFileName);\n    mVideoView.start();\n    mStopPlayBtn.setEnabled(true);\n\
  }\n\nprivate void stopPlayingRecording() {\n    mVideoView.stopPlayback();\n}\n\
  ```\n\n`initRecorder()`方法是我们进行大量设置的地方。录制器需要知道录制位置，因此我们提供了一个文件路径名。如果文件已存在，我们将其删除。请注意，我们随后会停止相机预览、解锁相机，然后将其连接到`MediaRecorder`。相机对锁定和解锁有些敏感，有时您需要锁定相机以防止其他人访问，而有时则需要解锁相机才能对其进行操作。现在正是需要解锁相机以将其连接到`MediaRecorder`的情况之一。一旦相机连接成功（这是我们首先做的），我们继续设置`MediaRecorder`的其他属性，包括音频源和视频源。但是等等，我们不是刚刚将相机连接到录制器了吗？是的，确实如此。但我们仍然需要显式设置视频源。通过在录制器中设置相机，我们避免了销毁`Camera`对象，然后让录制器对象重新构建一个新的对象。在调用`prepare()`方法之前，我们还设置了音频和视频编码器以及\
  \ SD 卡上输出文件的路径。`prepare()`方法在最后出现，让我们准备好实际录制内容。我们通过启用“开始录制”按钮来结束此方法。\n\n相比之下，`beginRecording()`方法相当直接。它添加监听器，调用`start()`，然后设置录制消息字符串并更改按钮。当此方法结束时，我们的应用程序应该正在录制视频，并且应该显示红色的“RECORDING”消息，如图\
  \ 19–6 所示。\n\n`stopRecording()`方法稍微复杂一些，部分原因是它可能从多个地方被调用。我们稍后会谈到第二个地方，但现在假设“停止录制”按钮触发了此方法。如果我们仍然有一个有效的录制器，我们会禁用回调，然后调用`stop()`。由于有可能`stop()`在一个已停止的录制器上被调用，我们处理了该异常，该异常表明我们试图停止一个已经停止的录制器。然后我们释放录制器和相机，并将“RECORDING”消息设置为空白。最后，按钮从录制模式切换到播放模式。\n\
  \n`playRecording()`方法也很直接。我们为`VideoView`获取一个`MediaController`，将其指向我们的新文件，然后调用`start()`。我们的`stopPlayingRecording()`方法甚至更简单；我们只需停止视频的播放。当我们在播放模式时，如果视频正在播放，点击“播放”按钮是无害的；同样，如果视频已停止，点击“停止”按钮也无害。\n\
  \n我们之前提到，录制操作可以从多个地方停止。录制器上的一个设置是最大时长为七秒。这意味着七秒后录制将停止，并且我们的信息回调将被调用。现在让我们在清单 19–15\
  \ 中查看这些内容。\n\n**清单 19–15.** *录制视频的信息回调*\n\n```java\n@Override\npublic void onInfo(MediaRecorder\
  \ mr, int what, int extra) {\n    Log.i(TAG, \"got a recording event\");\n    if(what\
  \ == MediaRecorder.MEDIA_RECORDER_INFO_MAX_DURATION_REACHED) {\n        Log.i(TAG,\
  \ \"...max duration reached\");\n        stopRecording();\n        Toast.makeText(this,\
  \ \"Recording limit has been reached. Stopping the recording\",\n              \
  \  Toast.LENGTH_SHORT).show();\n    }\n}\n```\n\n\n\n```java\n@Override\npublic\
  \ void onError(MediaRecorder mr, int what, int extra) {\n    Log.e(TAG, \"got a\
  \ recording error\");\n    stopRecording();\n    Toast.makeText(this, \"Recording\
  \ error has occurred. Stopping the recording\",\n            Toast.LENGTH_SHORT).show();\n\
  }\n```\n\n这两个回调非常相似。它们之间唯一的区别在于被调用的场景。在`onInfo()`方法中，消息不被视为错误。调用`onInfo()`可能是因为达到了最大录制时间，或者如果我们在录制器上设置了这些选项，也可能是因为达到了最大文件大小。而对于`onError()`，文档并未明确指出其被调用的具体原因，但可能是由于录制器写入视频文件的存储空间不足。如果因为达到时间限制而调用了`onInfo()`，或者出现了某种录制错误，我们将停止录制。\n\
  \n与之前录制音频时一样，我们需要设置音频权限（`android.permission.RECORD_AUDIO`）和 SD 卡权限（`android.permission.WRITE_EXTERNAL_STORAGE`），现在还需要添加访问摄像头的权限（`android.permission.CAMERA`）。为了完整性，`AndroidManifest.xml`文件如清单\
  \ 19–16 所示。您会注意到我们强制将应用程序的方向设置为横屏，这就是我们的布局文件位于`/res/layout-land/main.xml`的原因。\n\n\
  **清单 19–16.** 录制视频的 `AndroidManifest.xml` 文件\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
  utf-8\"?>\n<manifest\n      package=\"com.androidbook.record.video\"\n      android:versionCode=\"\
  1\"\n      android:versionName=\"1.0\">\n    <application android:icon=\"@drawable/icon\"\
  \ android:label=\"@string/app_name\">\n        <activity android:name=\".MainActivity\"\
  \n                  android:label=\"@string/app_name\"\n                  android:screenOrientation=\"\
  landscape\">\n            <intent-filter>\n                <action android:name=\"\
  android.intent.action.MAIN\" />\n                <category android:name=\"android.intent.category.LAUNCHER\"\
  \ />\n            </intent-filter>\n        </activity>\n    </application>\n  \
  \  <uses-sdk android:minSdkVersion=\"4\" />\n\n<uses-permission android:name=\"\
  android.permission.WRITE_EXTERNAL_STORAGE\"/>\n<uses-permission android:name=\"\
  android.permission.RECORD_AUDIO\"/>\n<uses-permission android:name=\"android.permission.CAMERA\"\
  />\n</manifest>\n```\n\n#### 摄像头与摄像机配置文件\n\n在清单 19–14 中，您看到`initRecorder()`方法中有一系列针对视频录制器的非常具体的设置。问题在于，您如何知道应用程序所运行设备的能力？在\
  \ Android 2.2 之前，这个问题并没有很好的答案。Android 自带的相机应用程序使用了一个未公开的`SystemProperties`类。因此，在\
  \ Android 2.2 之前，您必须选择能够在目标设备上正常工作的值。这并不令人满意，尤其是在新设备上配备了更好的摄像头之后。为了改善这种情况，Android\
  \ 2.2 引入了两个新类：`CameraProfile`和`CamcorderProfile`。这些类只是您关心的摄像头属性的容器。虽然`CameraProfile`只有一个值（JPEG\
  \ 编码质量参数），但`CamcorderProfile`会告诉您帧率、帧尺寸（高度和宽度）以及其他视频和音频参数。不仅如此，`MediaRecorder`类可以接受一个`CamcorderProfile`来设置该配置文件包含的各种视频录制值。您只需注意在设置视频和音频源之后、设置输出文件之前调用`setProfile()`方法即可。\n\
  \n随着 Android 2.3 的发布，处理摄像头的方法现在可能有一个接受摄像头标识符的替代方法。在 Android 2.3 之前，大多数设备只有一个摄像头，通常朝向设备背面。对于既有前置摄像头又有后置摄像头的新设备，代码需要一种方式来指定它要使用哪个摄像头。例如，在`Camera`类中，`open()`方法会返回一个面向后置摄像头的`Camera`对象（如果存在）。还有一个`open(int\
  \ cameraid)`方法可以返回特定的摄像头，允许您的应用程序使用前置摄像头（如果存在）。要确定有多少个摄像头可用以及哪个是哪个，可以使用`Camera.getNumberOfCameras()`方法获取摄像头数量，`Camera.getCameraInfo()`方法会返回关于特定摄像头的信息，包括其朝向。\n\
  \n#### 探索 MediaStore 类\n\n到目前为止，我们通过直接实例化类来处理媒体，以便在我们自己的应用程序中播放和录制媒体。Android 的一大优点是您可以访问其他应用程序来为您完成工作。`MediaStore`类提供了一种接口，用于访问设备内部和外部存储的媒体。\n\
  \n`MediaStore`还提供了供您对媒体进行操作的 API。这些 API 包括让您在设备上搜索特定类型媒体的机制、让您将音视频录制到存储库的 intent、以及创建播放列表等方式。请注意，这个类属于较旧的\
  \ SDK，但自 1.5 版本以来已得到大幅改进。\n\n由于`MediaStore`类支持通过 intent 录制音频和视频，而`MediaRecorder`类也处理录制，因此一个显而易见的问题是：什么时候使用`MediaStore`，什么时候使用`MediaRecorder`？正如您在前面视频捕获和音频录制示例中所看到的，`MediaRecorder`允许您设置录制源的多种选项。这些选项包括音视频输入源、视频帧率、视频帧尺寸、输出格式等。`MediaStore`不提供这种精细程度，但如果您不需要，您可能会发现通过`MediaStore`的\
  \ intent 操作更容易。更重要的是，使用`MediaRecorder`创建的内容不会自动被其他查看媒体库的应用程序访问。如果您使用`MediaRecorder`，您可能需要使用`MediaStore`的\
  \ API 将录制内容添加到媒体库中，因此或许一开始就使用`MediaStore`更简单。另一个显著区别是，通过 intent 调用`MediaStore`不需要您的应用程序请求录制音频、访问摄像头或写入\
  \ SD 卡的权限。您的应用程序正在调用一个独立的活动，而那个活动必须拥有录制音频、访问摄像头和写入 SD 卡的权限。`MediaStore`的活动已经拥有这些权限。因此，您的应用程序就不需要了。那么，让我们看看如何利用`MediaStore`的\
  \ API。\n\n\n\n### 使用 Intent 录制音频\n\n如我们所见，录制音频本身并不复杂，但若借助 `MediaStore` 的 Intent\
  \ 操作，则更为便捷。代码清单 19–17 演示了如何通过 Intent 录制音频。\n\n**代码清单 19–17.** *使用 Intent 录制音频*\n\
  \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<!-- 此文件位于 /res/layout/main.xml\
  \ -->\n<LinearLayout\n    android:orientation=\"vertical\"\n    android:layout_width=\"\
  fill_parent\"\n    android:layout_height=\"fill_parent\" >\n <Button android:id=\"\
  @+id/recordBtn\"\n    android:text=\"录制音频\"\n    android:layout_width=\"wrap_content\"\
  \n    android:layout_height=\"wrap_content\" />\n</LinearLayout>\n```\n\n```java\n\
  import android.app.Activity;\nimport android.content.Intent;\nimport android.net.Uri;\n\
  import android.os.Bundle;\nimport android.util.Log;\nimport android.view.View;\n\
  import android.view.View.OnClickListener;\nimport android.widget.Button;\n\npublic\
  \ class UsingMediaStoreActivity extends Activity {\n    @Override\n    protected\
  \ void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \n        setContentView(R.layout.main);\n\n        Button btn = (Button)findViewById(R.id.recordBtn);\n\
  \        btn.setOnClickListener(new OnClickListener(){\n\n            @Override\n\
  \            public void onClick(View view) {\n\n                startRecording();\n\
  \n            }});\n    }\n\npublic void startRecording() {\n        Intent intt\
  \ =\n            new Intent(\"android.provider.MediaStore.RECORD_SOUND\");\n   \
  \     startActivityForResult(intt, 0);\n    }\n\n    @Override\n    protected void\
  \ onActivityResult(int requestCode, int resultCode, Intent data) {\n\n        switch\
  \ (requestCode) {\n        case 0:\n            if (resultCode == RESULT_OK) {\n\
  \                Uri recordedAudioPath = data.getData();\n                Log.v(\"\
  Demo\", \"Uri 为 \" + recordedAudioPath.toString());\n            }\n        }\n\
  \    }\n}\n```\n\n代码清单 19–17 创建了一个 Intent，请求系统开始录制音频。代码通过调用 `startActivityForResult()`\
  \ 启动该 Intent 并传入 `requestCode`，从而将 Intent 交给某个 Activity 处理。当被请求的 Activity 完成后，系统会调用\
  \ `onActivityResult()` 并携带 `requestCode`。如 `onActivityResult()` 所示，我们查找与传递给 `startActivityForResult()`\
  \ 代码相匹配的 `requestCode`，然后通过调用 `data.getData()` 获取已保存媒体的 Uri。如果需要，你还可以将该 Uri 传递给另一个\
  \ Intent 来播放这段录音。代码清单 19–17 的界面如图 19–7 所示。\n\n![images](img/1907.jpg)\n\n**图 19–7.**\
  \ *内置音频录音机：录制前与录制后*\n\n图 19–7 展示了两张截图。左侧图像显示的是正在录制中的音频录音机，右侧图像显示的是录音停止后的 Activity\
  \ 界面。\n\n与提供音频录制 Intent 的方式类似，`MediaStore` 也提供了一个用于拍照的 Intent。代码清单 19–18 演示了这一点。\n\
  \n**代码清单 19–18.** *启动 Intent 拍照*\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"\
  ?>\n<!-- 此文件位于 /res/layout/main.xml -->\n<LinearLayout\n    android:orientation=\"\
  vertical\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  fill_parent\" >\n  <Button android:id=\"@+id/btn\"  android:text=\"拍照\"\n      android:layout_width=\"\
  wrap_content\"\n      android:layout_height=\"wrap_content\"\n      android:onClick=\"\
  captureImage\" />\n\n</LinearLayout>\n```\n\n```java\nimport android.app.Activity;\n\
  import android.content.ContentValues;\nimport android.content.Intent;\nimport android.net.Uri;\n\
  import android.os.Bundle;\nimport android.provider.MediaStore;\nimport android.provider.MediaStore.Images.Media;\n\
  import android.view.View;\nimport android.view.View.OnClickListener;\nimport android.widget.Button;\n\
  \npublic class MainActivity extends Activity {\n\n    Uri myPicture = null;\n\n\
  \    @Override\n    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n\n        setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_LANDSCAPE);\n\
  \    }\n\n    public void captureImage(View view)\n    {\n        ContentValues\
  \ values = new ContentValues();\n        values.put(Media.TITLE, \"我的演示图片\");\n\
  \        values.put(Media.DESCRIPTION, \"通过 Intent 由相机拍摄的图片\");\n\n        myPicture\
  \ = getContentResolver().insert(Media.EXTERNAL_CONTENT_URI, values);\n\n       \
  \ Intent i = new Intent(MediaStore.ACTION_IMAGE_CAPTURE);\n        i.putExtra(MediaStore.EXTRA_OUTPUT,\
  \ myPicture);\n\nstartActivityForResult(i, 0);\n    }\n\n    @Override\n    protected\
  \ void onActivityResult(int requestCode, int resultCode, Intent data) {\n      \
  \  if(requestCode==0 && resultCode==Activity.RESULT_OK)\n        {\n           \
  \ // 至此，我们可以确认 myPicture Uri\n            // 指向的是刚刚拍摄的图片\n        }\n    }\n}\n\
  ```\n\n代码清单 19–18 中所示的 Activity 类定义了 `captureImage()` 方法。在该方法中，创建了一个 Intent，其 Action\
  \ 名设置为 `MediaStore.ACTION_IMAGE_CAPTURE`。当此 Intent 被启动时，相机应用会切换到前台，用户即可拍照。由于我们预先创建了\
  \ Uri，因此可以在相机拍照前为图片添加额外的详细信息。这正是 `ContentValues` 类为我们实现的功能。除了 `TITLE` 和 `DESCRIPTION`\
  \ 之外，还可以向 `values` 中添加其他属性。有关完整列表，请查阅 Android 参考文档中的 `MediaStore.Images.ImageColumns`。拍照完成后，系统会调用我们的\
  \ `onActivityResult()` 回调。在本例中，我们使用媒体内容提供器创建了一个新文件。当然，我们也可以在 SD 卡上通过新文件创建 Uri，如下所示：\n\
  \n```java\nmyPicture = Uri.fromFile(new File(Environment.getExternalStoragePublicDirectory(DIRECTORY_DCIM)\
  \ +\n\"/100ANDRO/imageCaptureIntent.jpg\"));\n```\n\n然而，通过这种方式创建 Uri，并不能像之前那样方便地设置图片的属性，例如\
  \ `TITLE` 和 `DESCRIPTION`。调用相机 Intent 拍照还有另一种方法。如果我们不向 Intent 传递任何 Uri，那么我们在 `onActivityResult()`\
  \ 的 Intent 参数中会收到一个 bitmap 对象。这种方法的缺陷在于，默认情况下该 bitmap 会从原始大小缩放，显然是因为 Android 团队不希望你的\
  \ Activity 从相机 Activity 接收到大量数据。该 bitmap 的大小将为 50k。要在 `onActivityResult()` 中获取 Bitmap\
  \ 对象，你可以这样操作：\n\n```java\nBitmap myBitmap = (Bitmap) data.getExtras().get(\"data\"\
  );\n```\n\n`MediaStore` 还提供了一个用于视频录制的 Intent，其行为方式类似。你可以使用 `MediaStore.ACTION_VIDEO_CAPTURE`\
  \ 来录制视频。\n\n\n\n### 向媒体存储库添加媒体内容\n\nAndroid 媒体框架提供的另一项功能是，能够通过`MediaScannerConnection`类向媒体存储库添加内容信息。换句话说，如果媒体存储库不知道某些新内容，我们就使用`MediaScannerConnection`告知它。这样，这些内容就可以对外提供了。我们来看看具体如何实现（见清单\
  \ 19–19）。\n\n**清单 19–19.** *向 MediaStore 添加一个文件*\n\n```\n<?xml version=\"1.0\" encoding=\"\
  utf-8\"?>\n<!-- 此文件位于 /res/layout/main.xml -->\n<LinearLayout\n    android:orientation=\"\
  vertical\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  wrap_content\">\n\n    <EditText android:id=\"@+id/fileName\"  android:hint=\"输入新文件名\"\
  \n        android:layout_width=\"fill_parent\"\n        android:layout_height=\"\
  wrap_content\" />\n\n    <Button android:id=\"@+id/scanBtn\"  android:text=\"添加文件\"\
  \n        android:layout_width=\"wrap_content\"\n        android:layout_height=\"\
  wrap_content\"\n        android:onClick=\"startScan\" />\n\n</LinearLayout>\n```\n\
  \n```\nimport java.io.File;\nimport android.app.Activity;\nimport android.content.Intent;\n\
  import android.media.MediaScannerConnection;\nimport android.media.MediaScannerConnection.MediaScannerConnectionClient;\n\
  import android.net.Uri;\nimport android.os.Bundle;\nimport android.util.Log;\nimport\
  \ android.view.View;\nimport android.widget.EditText;\nimport android.widget.Toast;\n\
  \npublic class MediaScannerActivity extends Activity implements MediaScannerConnectionClient\n\
  {\n    private EditText editText = null;\n    private String filename = null;\n\
  \    private MediaScannerConnection conn;\n\n    @Override\n    protected void onCreate(Bundle\
  \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
  \n        editText = (EditText)findViewById(R.id.fileName);\n    }\n\n    public\
  \ void startScan(View view)\n    {\n        if(conn!=null) {\n            conn.disconnect();\n\
  \        }\n\n        filename = editText.getText().toString();\n\n        File\
  \ fileCheck = new File(filename);\n        if(fileCheck.isFile()) {\n          \
  \  conn = new MediaScannerConnection(this, this);\n            conn.connect();\n\
  \        }\n        else {\n            Toast.makeText(this,\n                \"\
  该文件不存在\",\n                Toast.LENGTH_SHORT).show();\n        }\n    }\n\n   \
  \ @Override\n    public void onMediaScannerConnected() {\n        conn.scanFile(filename,\
  \ null);\n    }\n\n    @Override\n    public void onScanCompleted(String path, Uri\
  \ uri) {\n        try {\n            if (uri != null) {\n                Intent\
  \ intent = new Intent(Intent.ACTION_VIEW);\n                intent.setData(uri);\n\
  \                startActivity(intent);\n            }\n            else {\n   \
  \             Log.e(\"MediaScannerDemo\", \"该文件无效\");\n            }\n        }\
  \ finally {\n            conn.disconnect();\n            conn = null;\n        }\n\
  \    }\n}\n```\n\n清单 19–19 展示了一个向`MediaStore`添加文件的活动类。如果添加成功，所添加的文件将通过一个 Intent\
  \ 显示给用户。在后台，`MediaScanner`会检查该文件以确定其文件类型及其他相关详细信息。我们本可以将文件的 MIME 类型作为`scanFile()`的第二个参数传递给`MediaScanner`。如果`MediaScanner`无法通过扩展名确定文件类型，该文件将不会被添加。如果该文件属于`MediaStore`，则会在媒体提供商的数据库中创建一条记录。文件本身并不会移动。但现在媒体提供商知道了这个文件。如果你添加了一个图片文件，现在可以打开图库应用看到它。如果你添加了一个音乐文件，它现在会出现在音乐应用中。\n\
  \n如果你想查看媒体提供商数据库的内部，可以打开一个工具窗口，启动`adb shell`，然后在设备上导航到`/data/data/com.android.providers.media/databases`。在那里你会找到数据库，其中一个是`internal.db`。那里也可能存在外部数据库文件，对应一个或多个\
  \ SD 卡。由于 Android 手机可以使用多个 SD 卡，因此也可能存在多个外部数据库文件。你可以使用`sqlite3`工具来检查这些数据库中的表。其中有音频、图片和视频的表。更多关于使用`sqlite3`的信息，请参见第\
  \ 4 章。\n\n### 触发整个 SD 卡的 MediaScanner 扫描\n\n在前面的例子中，我们使用`MediaScanner`来检查单个特定文件。如果你只想添加单个文件，这没问题。但是如果你想要重命名或删除一个文件，并且希望`MediaStore`得到更新，该怎么办呢？幸运的是，有一种非常简单的方法来触发这个操作。如果你在你的应用程序中执行以下代码，它会被`MediaScanner`捕获，从而重新扫描整个\
  \ SD 卡：\n\n```\nsendBroadcast(new Intent(Intent.ACTION_MEDIA_MOUNTED,\n    Uri.parse(\"\
  file://\" +\n    Environment.getExternalStorageDirectory())));\n```\n\n作为练习，你可以继续创建一个简单的应用程序，在`onCreate()`中仅执行此命令。\n\
  \n至此，我们对媒体 API 的讨论就结束了。我们希望你会同意，使用 Android 播放和录制媒体内容并不太难。\n\n### 总结\n\n在本章中，我们讨论了\
  \ Android 媒体框架。我们向你展示了如何播放音频和视频。我们还展示了如何直接或通过 Intent 录制音频和视频。\n\n在下一章中，我们将通过讨论如何在\
  \ Android 应用程序中使用 OpenGL，将注意力转向 3D 图形。\n\n## 第 20 章\n\n\n\n"
- "# 使用 OpenGL 进行 3D 图形编程\n\n在本章中，我们将详细讨论如何在 Android 平台上使用 OpenGL ES 图形 API。OpenGL\
  \ ES 是 OpenGL 的一个版本，专门针对嵌入式系统及其他低功耗设备（如手机）进行了优化。\n\nAndroid 平台支持 OpenGL ES 1.0 和\
  \ OpenGL ES 2.0。OpenGL ES 2.0 仅从对应 Android SDK 2.2 版本的 API 级别 8 开始提供。截至撰写本文时，使用\
  \ Java 绑定来调用 OpenGL ES 2.0 还存在一些问题。请参阅本章末尾关于 OpenGL ES 2.0 的单独小节中的说明和建议。主要问题在于模拟器不支持\
  \ OpenGL ES 2.0。Android 3.0 通过引入 Renderscript 增强了 OpenGL 的应用能力。Renderscript 旨在通过允许运行以类似“C”语言编写的原生代码来获得更好的性能。这段代码甚至可以在\
  \ GPU（图形处理单元）上执行。Renderscript 还被设计为支持跨平台兼容性。当性能不是关键问题时，仍建议程序员使用 Java 绑定来完成大部分 OpenGL\
  \ 工作。由于时间限制，我们在本书的这一版中没有涵盖 Renderscript。我们在本章末尾提供了一个指向 Renderscript（来自 Google）编程指南的参考\
  \ URL。\n\nAndroid SDK 发行版附带了许多 OpenGL ES 示例。然而，关于如何开始使用 OpenGL ES 的文档在 SDK 中要么很少，要么根本没有。其潜在的假设是\
  \ OpenGL ES 是一个开放标准，程序员可以在 Android 之外自行学习。因此，Android 在线 OpenGL 资源和 Android OpenGL\
  \ 代码示例都假定你已经熟悉 OpenGL。\n\n在本章中，我们将帮助你克服这些小障碍。只需具备很少的 OpenGL 基础知识，学完本章后，你就能轻松地进行\
  \ OpenGL 编程了。我们将通过几乎不涉及数学知识（这与许多 OpenGL 书籍不同）的方式来实现这一目标。\n\n在本章的第一部分，我们将概述 OpenGL、OpenGL\
  \ ES 以及一些竞争标准。\n\n在第二部分，我们将解释 OpenGL 背后的理论。如果你是 OpenGL 新手，这部分内容至关重要，必须阅读。在这一部分中，我们将介绍\
  \ OpenGL 坐标、其摄像机概念以及基本的 OpenGL ES 绘图 API。\n\n在第三部分，我们将解释如何在 Android 上与 OpenGL ES\
  \ API 进行交互。本节涵盖了 `GLSurfaceView` 和 `Renderer` 接口，以及它们如何协同工作以使用 OpenGL 进行绘图。在我们其中一个简单示例中，我们将绘制一个简单的三角形，以展示改变\
  \ OpenGL 场景设置 API 如何影响绘图过程。\n\n**注意：** OpenGL 的摄像机概念类似于但不同于你在第 6 章中学到的 Android 图形包中的\
  \ `Camera` 类。Android 图形包中的 `Camera` 对象通过投影在 3D 空间中移动的 2D 视图来模拟类似 3D 的观看能力，而 OpenGL\
  \ 的摄像机则是一个代表虚拟视点的范式。换句话说，它通过一个透过摄像机观察的观察者的视角来模拟现实世界场景。你将在“使用 OpenGL ES”下的“理解摄像机与坐标”小节中学到更多内容。这两种摄像机都与你用来拍照或录制视频的手持设备的物理摄像头是分开的。\n\
  \n在第四部分，我们将带你更深入地了解 OpenGL ES，并介绍形状的概念。我们还将介绍纹理，并向你展示如何在单个 `draw` 方法中绘制多个图形。然后，我们将通过简要介绍\
  \ OpenGL 着色器和一个快速示例来介绍对 OpenGL ES 2.0 的支持。请预先注意，OpenGL ES 2.0 只能在真实设备上进行测试。\n\n\
  我们将以我们在研究本章材料时发现的一系列资源来结束本章。\n\n那么，让我们来看看 OpenGL 的历史和背景吧！\n\n### 理解 OpenGL 的历史与背景\n\
  \nOpenGL（最初称为开放图形库）是一个 2D 和 3D 图形 API，由硅谷图形公司（SGI）为其 UNIX 工作站开发。尽管 SGI 版本的 OpenGL\
  \ 已经存在很长时间，但第一个标准化的 OpenGL 规范于 1992 年出现。如今，OpenGL 标准已被所有操作系统广泛采用，构成了许多游戏、计算机辅助设计（CAD）甚至虚拟现实（VR）行业的基础。\n\
  \nOpenGL 标准目前由一个名为 Khronos Group（`www.khronos.org`）的行业联盟管理，该联盟于 2000 年由 NVIDIA、Sun\
  \ Microsystems、ATI Technologies 和 SGI 等公司共同创立。你可以在该联盟的网站上了解更多关于 OpenGL 规范的信息，网址为：\n\
  \n`www.khronos.org/opengl/`\n\nOpenGL 的官方文档页面可在此处获取：\n\n`www.opengl.org/documentation/`\n\
  \n从这个文档页面可以看出，你可以访问到专门介绍 OpenGL 的书籍和在线资源。其中，黄金标准是 *OpenGL 编程指南：学习 OpenGL 的官方指南，1.1\
  \ 版*，也被称为 OpenGL 的“红宝书”。你可以在此处找到该书的在线版本：\n\n`www.glprogramming.com/red/`\n\n这本书非常出色且相当易读。然而，我们在理清用于绘图的\
  \ *单位* 和 *坐标* 的本质时遇到了一些困难。我们将尝试澄清这些关于你在 OpenGL 中绘制什么以及看到什么的重要概念。这些概念的核心在于设置 OpenGL\
  \ 的摄像机和 *观察框*，也称为 *观察体* 或 *视锥体*。\n\n#### OpenGL ES\n\nKhronos Group 还负责另外两个与 OpenGL\
  \ 相关的标准：OpenGL ES 和 EGL 原生平台图形接口（通常简称为 EGL）。正如我们提到的，OpenGL ES 是 OpenGL 的一个更小的版本，专为嵌入式系统设计。\n\
  \n**注意：** Java 社区进程也在为移动设备开发一个面向对象的 OpenGL 抽象层，称为移动 3D 图形 API（M3G）。我们将在“M3G：另一个\
  \ Java ME 3D 图形标准”小节中对该接口进行简要介绍。\n\nEGL 标准本质上是一个底层操作系统（OS）与 OpenGL ES 提供的渲染 API\
  \ 之间的使能接口。由于 OpenGL 和 OpenGL ES 是用于绘图的通用接口，每个操作系统都需要提供一个标准的宿主环境供 OpenGL 和 OpenGL\
  \ ES 进行交互。从 1.5 版本开始，Android SDK 很好地隐藏了这些平台特定的细节。你将在名为“将 OpenGL ES 与 Android 对接”的第二节中了解到这一点。\n\
  \nOpenGL ES 的目标设备包括手机、家电甚至车辆。由于 OpenGL ES 必须比 OpenGL 小得多，因此许多便捷的函数被移除了。例如，OpenGL\
  \ ES 不直接支持绘制矩形；你必须绘制两个三角形来组成一个矩形。\n\n当你开始探索 Android 对 OpenGL 的支持时，你将主要关注 OpenGL\
  \ ES 及其通过 Java 和 EGL 与 Android 操作系统的绑定。你可以在此处找到 OpenGL ES 的文档：\n\n`www.khronos.org/opengles/documentation/opengles1_0/html/index.html`\n\
  \n在撰写本章的过程中，我们多次参考了这份文档，因为它识别并解释了每个 OpenGL ES API，并描述了每个 API 的参数。你会发现这些 API 与 Java\
  \ API 类似，我们将在本章中向你介绍其中关键的几个。\n\n\n\n##### OpenGL ES 与 Java ME\n\n`OpenGL ES` 与 `OpenGL`\
  \ 一样，都是基于 C 语言的扁平化 API。由于 Android SDK 是基于 Java 的编程 API，因此需要为 `OpenGL ES` 提供一个 Java\
  \ 绑定。Java ME 已通过 `JSR 239` 定义了该绑定：即 `OpenGL ES` API 的 Java 绑定。`JSR 239` 本身基于 `JSR\
  \ 231`，后者是 `OpenGL 1.5` 的 Java 绑定。`JSR 239` 本应是 `JSR 231` 的一个严格子集，但实际情况并非如此，因为它需要兼容\
  \ `OpenGL 1.5` 所不具备的一些 `OpenGL ES` 扩展。\n\n你可以在以下位置找到 `JSR 239` 的文档：\n\n```\nhttp://java.sun.com/javame/reference/apis/jsr239/\n\
  ```\n\n这份参考资料将让你了解 `OpenGL ES` 中可用的 API。它还提供了关于以下包的重要信息：\n\n```\njavax.microedition.khronos.egl\n\
  javax.microedition.khronos.opengles\njava.nio\n```\n\n`nio` 包是必需的，因为 `OpenGL ES`\
  \ 实现出于效率考虑仅接受字节流作为输入。该 `nio` 包定义了多种实用工具，用于准备在 `OpenGL` 中使用的原生缓冲区。在“使用 `OpenGL ES`”小节下的“`glVertexPointer`\
  \ 与指定绘制顶点”部分中，你将看到其中一些 API 的实际应用。\n\n你可以在以下网址找到 Android SDK 对 `OpenGL` 支持的文档（尽管内容相当精简）：\n\
  \n```\nhttp://developer.android.com/guide/topics/graphics/opengl.html\n```\n\n在该页面上，文档指出\
  \ Android 实现与 `JSR 239` 基本一致，但也警告可能在少数地方存在差异。\n\n##### M3G：另一种 Java ME 3D 图形标准\n\
  \n`JSR 239` 仅仅是原生 `OpenGL ES` 标准的一个 Java 绑定。正如在“`OpenGL ES`”小节中简要提及的那样，Java 提供了另一种在移动设备上处理\
  \ 3D 图形的 API：`M3G`。这种面向对象的标准定义在 `JSR 184` 和 `JSR 297` 中，其中后者是较新的版本。根据 `JSR 184`，`M3G`\
  \ 是一种适用于移动设备的轻量级、面向对象的交互式 3D 图形 API。\n\n`M3G` 的面向对象特性使其与 `OpenGL ES` 有所区别。有关详细信息，请访问以下网址中\
  \ `JSR 184` 的主页：\n\n```\nwww.jcp.org/en/jsr/detail?id=184\n```\n\n`M3G` 的 API 位于名为\n\
  \n```\njavax.microedition.m3g.*;\n```\n\n的 Java 包中。\n\n与 `OpenGL ES` 相比，`M3G` 是一种更高级的\
  \ API，因此应该更容易学习。然而，它在手持设备上的实际性能表现尚无定论。截至目前，Android 并不支持 `M3G`。\n\n到目前为止，我们已经列出了手持设备在\
  \ `OpenGL` 领域可用的选项。我们讨论了 `OpenGL ES`，也简要提到了 `M3G` 标准。现在，我们将专注于理解 `OpenGL` 的基础知识。\n\
  \n### OpenGL 基础\n\n本节将帮助你理解 `OpenGL` 和 `OpenGL ES` API 背后的概念。我们将解释所有关键的 API。为了补充本章提供的信息，你可能需要参考本章末尾的“资源”部分。那里的资源包括红宝书、`JSR\
  \ 239` 文档以及 The Khronos Group 的 API 参考手册。\n\n**注意：**当你开始使用 `OpenGL` 资源时，你会注意到某些\
  \ API 在 `OpenGL ES` 中不可用。这时，The Khronos Group 的 *`OpenGL ES Reference Manual`*（OpenGL\
  \ ES 参考手册）就会派上用场。\n\n我们将相当详细地介绍以下 API，因为它们对于理解 `OpenGL` 和 `OpenGL ES` 至关重要：\n\n\
  ```\nglVertexPointer\nglDrawElements\nglColor\nglClear\ngluLookAt\nglFrustum\nglViewport\n\
  ```\n\n在介绍这些 API 的过程中，你将学习如何：\n\n> 使用基本的 `OpenGL ES` 绘图 API。\n> \n> 清除调色板。\n> \n\
  > 指定颜色。\n> \n> 理解 `OpenGL` 相机与坐标。\n\n#### 使用 OpenGL ES 进行基本绘图\n\n在 `OpenGL` 中，你是在三维空间中绘图。首先，你需要指定一系列点，也称为顶点。每个点具有三个值：一个用于\
  \ `x` 坐标，一个用于 `y` 坐标，一个用于 `z` 坐标。\n\n这些点随后被连接起来形成形状。你可以将这些点连接成多种形状，这些形状被称为*图元形状*，在\
  \ `OpenGL ES` 中包括点、线和三角形。请注意，在 `OpenGL` 中，图元形状还包括矩形和多边形。在使用 `OpenGL` 和 `OpenGL ES`\
  \ 的过程中，你会不断发现后者特性少于前者的差异。这里还有另一个例子：`OpenGL` 允许你单独指定每个点，而 `OpenGL ES` 只允许你一次性指定一系列点。不过，你通常可以通过其他更基本的特性来模拟\
  \ `OpenGL ES` 缺失的功能。例如，你可以通过组合两个三角形来绘制一个矩形。\n\n`OpenGL ES` 提供了两种主要方法来辅助绘图：\n\n```\n\
  glVertexPointer\nglDrawElements\n```\n\n**注意：** 在讨论 `OpenGL ES` API 时，我们将互换使用术语“API”和“方法”。\n\
  \n你使用 `glVertexPointer` 来指定一系列点或顶点，并使用 `glDrawElements` 通过前述的某种图元形状来绘制它们。我们将更详细地描述这些方法，但首先让我们了解一下\
  \ `OpenGL` API 名称的一些命名规则。\n\n`OpenGL` API 的名称都以 `gl` 开头。`gl` 之后是方法名称。方法名称后紧跟一个可选的数字，例如\
  \ `3`，它指向维度数量（例如 `(x,y,z)`）或参数数量。方法名称之后是一个数据类型，例如 `f` 表示浮点型（float）。（你可以参考任何 `OpenGL`\
  \ 在线资源来了解各种数据类型及其对应的字母。）\n\n还有一条约定。如果一个方法接受字节型（`b`）或浮点型（`f`）参数，那么该方法将有两个名称：一个以 `b`\
  \ 结尾，另一个以 `f` 结尾。\n\n现在，让我们逐一查看这两个与绘图相关的方法，从 `glVertexPointer` 开始。\n\n\n\n`glVertexPointer`与绘制顶点的指定\n\
  \n`glVertexPointer`方法负责指定要绘制的点数组。每个点都在三维空间中指定，因此每个点将有三个值：x、y 和 z。代码清单 20-1 展示了如何在一个数组中指定三个点。\n\
  \n**代码清单 20-1.** *OpenGL 三角形的顶点坐标示例*\n\n```\nfloat[] coords = {\n      -0.5f, -0.5f,\
  \ 0,   //p1: (x1,y1,z1)\n       0.5f, -0.5f, 0,    //p2: (x1,y1,z1)\n       0.0f,\
  \  0.5f, 0     //p3: (x1,y1,z1)\n};\n```\n\n代码清单 20-1 中的结构是一组连续的浮点数，保存在基于 Java 的浮点数组中。目前不用担心在任何地方键入或编译这段代码——我们此时的目标只是让您了解这些\
  \ OpenGL ES 方法的工作原理。我们将在稍后开发测试工具来绘制简单图形时，为您提供可运行的示例和代码。我们还在本章末尾的参考资料部分提供了可下载项目的链接。\n\
  \n在代码清单 20-1 中，您可能想知道点`p1`、`p2`和`p3`的坐标使用了什么单位。简而言之，当您建模 3D 空间时，这些坐标单位可以是您想要的任何值。但随后您需要指定一个称为*包围体*（或*包围盒*）的东西来量化这些坐标。\n\
  \n例如，您可以将包围盒指定为边长为 5 英寸的立方体，或边长为 2 英寸的立方体。这些坐标也称为*世界坐标*，因为您是在独立于物理设备限制的情况下概念化您的世界。我们将在“理解相机与坐标”小节中更详细地解释这些坐标。现在，假设您使用的是边长为\
  \ 2 个单位且中心位于 (x=0, y=0, z=0) 的立方体。换句话说，中心位于立方体的中心，立方体的各个面距离中心 1 个单位。\n\n**注意**：术语*包围体*、*包围盒*、*视景体*、*视景框*和*视锥体*都指向同一个概念：决定屏幕上可见内容的金字塔形\
  \ 3D 体积。您将在“理解相机与坐标”下的“`glFrustum`与视景体”小节中了解更多。\n\n您还可以假设原点位于视觉显示器的中心。z 轴进入显示器时为负（远离您），离开显示器时为正（朝向您）；向右移动时\
  \ x 为正，向左移动时 x 为负。然而，这些坐标也将取决于您观看场景的方向。\n\n要绘制代码清单 20-1 中的点，您需要通过`glVertexPointer`方法将它们传递给\
  \ OpenGL ES。然而，出于效率原因，`glVertexPointer`接收的是一个与语言无关的原生缓冲区，而不是 Java 浮点数组。为此，您需要将基于\
  \ Java 的浮点数组转换为可接受的类似 C 的原生缓冲区。您需要使用`java.nio`类将浮点数组转换为原生缓冲区。代码清单 20-2 展示了一个使用`nio`缓冲区的示例。\n\
  \n**代码清单 20-2.** *创建 NIO 浮点缓冲区*\n\n```\njava.nio.ByteBuffer vbb = java.nio.ByteBuffer.allocateDirect(3\
  \ * 3 * 4);\nvbb.order(ByteOrder.nativeOrder());\njava.nio.FloatBuffer mFVertexBuffer\
  \ = vbb.asFloatBuffer();\n```\n\n在代码清单 20-2 中，字节缓冲区是按字节排列的内存缓冲区。每个点有三个浮点数（因为有三个轴），每个浮点数是\
  \ 4 个字节。因此，每个点需要`3 * 4`个字节。此外，一个三角形有三个点。所以总共需要`3 * 3 * 4`个字节来保存一个三角形的所有三个浮点数据点。\n\
  \n一旦您将点收集到原生缓冲区中，就可以调用`glVertexPointer`，如代码清单 20-3 所示。\n\n**代码清单 20-3.** *`glVertexPointer`\
  \ API 定义*\n\n```\nglVertexPointer(\n       // 我们是在每个点中使用 (x,y) 还是 (x,y,z)\n    \
  \   3,\n       // 缓冲区中的每个值都是浮点类型\n       GL10.GL_FLOAT,\n       // 两点之间没有间隔\n  \
  \     0,\n       // 指向缓冲区起始位置的指针\n       mFVertexBuffer);\n```\n\n我们来谈谈`glVertexPointer`方法的参数。第一个参数告诉\
  \ OpenGL ES 一个点或顶点有多少个维度。在本例中，我们为 x、y 和 z 指定了`3`。您也可以只为 x 和 y 指定`2`。在这种情况下，z 将为零。请注意，第一个参数不是缓冲区中点的数量，而是使用的维度数量。因此，如果您传递\
  \ 20 个点来绘制多个三角形，您不会将`20`作为第一个参数传递；您会传递`2`或`3`，具体取决于使用的维度数量。\n\n第二个参数表示坐标需要被解释为浮点数。第三个参数称为`stride`（步幅），指向分隔每个点的字节数。在本例中，它为零，因为一个点紧跟着另一个点。有时，您可以在每个点之后将颜色属性作为缓冲区的一部分添加。如果您想这样做，您需要使用`stride`在顶点规范中跳过这些属性。最后一个参数是指向包含点的缓冲区的指针。\n\
  \n现在您已经知道如何设置要绘制的点数组，让我们看看如何使用`glDrawElements`方法绘制这个点数组。\n\n\n\n### `glDrawElements`\n\
  \n一旦通过`glVertexPointer`指定了顶点序列，就可以使用`glDrawElements`方法，利用 OpenGL ES 允许的图元类型之一来绘制这些顶点。请注意，OpenGL\
  \ 是一个状态机。它会以累积的方式记住上一个方法设置的值，并在调用下一个方法时使用这些值。因此，你无需显式地将`glVertexPointer`设置的顶点传递给`glDrawElements`。`glDrawElements`会隐式地使用这些顶点。代码清单\
  \ 20–4 展示了该方法及其可能参数的一个示例。\n\n**代码清单 20–4.** *`glDrawElements`示例*\n\n``` \nglDrawElements(\n\
  \       // 形状类型\n       GL10.GL_TRIANGLE_STRIP,\n       // 索引数量\n       3,\n   \
  \   // 每个索引的大小\n      GL10.GL_UNSIGNED_SHORT,\n      // 包含 3 个索引的缓冲区\n      mIndexBuffer);\n\
  ```\n\n第一个参数指示要绘制的几何形状类型：`GL_TRIANGLE_STRIP` 表示三角形带。该参数的其他可选值包括：仅点（`GL_POINTS`）、线段（`GL_LINE_STRIP`）、仅线（`GL_LINES`）、线条循环（`GL_LINE_LOOP`）、仅三角形（`GL_TRIANGLES`）和三角形扇（`GL_TRIANGLE_FAN`）。\n\
  \n在 `GL_LINE_STRIP` 和 `GL_TRIANGLE_STRIP` 中，`STRIP`（带）的概念是在利用旧点的同时添加新点。通过这种方式，你可以避免为每个新对象指定所有点。例如，如果你在数组中指定了四个点，你可以使用条带从前三个点\
  \ (1,2,3) 绘制第一个三角形，从 (2,3,4) 绘制第二个三角形。每个新点都会添加一个新的三角形。（更多细节请参考 OpenGL 红宝书。）你也可以改变这些参数，观察添加新点时三角形的绘制方式。\n\
  \n而 `GL_TRIANGLE_FAN` 中的 `FAN`（扇）概念适用于这样的三角形：第一个点被用作所有后续三角形的起始点。实际上，你是在创建一个类似扇子或圆形的物体，其第一个顶点位于中心。假设你的数组中有六个点：(1,2,3,4,5,6)。使用\
  \ `FAN`，将绘制出以下三角形：(1,2,3)、(1,3,4)、(1,4,5) 和 (1,5,6)。每个新点都会增加一个额外的三角形，类似于展开一把扇子或摊开一副扑克牌的过程。\n\
  \n`glDrawElements` 的其余参数涉及该方法允许你复用顶点规格的能力。例如，一个正方形包含四个点。每个正方形都可以绘制为两个三角形的组合。如果你想画两个三角形来组成这个正方形，你必须指定六个点吗？不。你可以只指定四个点，然后引用它们六次来绘制两个三角形。这个过程被称为*索引到顶点缓冲区*。\n\
  \n以下是一个示例：\n\n``` \n点： (p1, p2, p3, p4)\n绘制索引 (p1, p2, p3,    p2, p3, p4)\n```\n\
  \n注意第一个三角形由 `p1, p2, p3` 组成，第二个三角形由 `p2, p3, p4` 组成。了解了这一点，`glDrawElements` 的第二个参数就用于标识索引缓冲区中有多少个索引。\n\
  \n`glDrawElements` 的第三个参数（参见代码清单 20–4）指明了索引数组中值的类型，是无符号短整型（`GL_UNSIGNED_SHORT`）还是无符号字节型（`GL_UNSIGNED_BYTE`）。\n\
  \n`glDrawElements` 的最后一个参数指向索引缓冲区。要填充索引缓冲区，你需要执行类似于顶点缓冲区创建时所做的操作。从 Java 数组开始，使用\
  \ `java.nio` 包将该数组转换为本地缓冲区。\n\n代码清单 20–5 展示了一些示例代码，将一个包含 `{0,1,2}` 的短整型数组转换为适合传递给\
  \ `glDrawElements` 的本地缓冲区。\n\n**代码清单 20–5.** *将 Java 数组转换为 NIO 缓冲区*\n\n``` \n//确定如何排列你的顶点\n\
  short[] myIndecesArray = {0,1,2};\n\n//获取一个短整型缓冲区\njava.nio.ShortBuffer mIndexBuffer;\n\
  \n//为每个索引值分配 2 个字节\nByteBuffer ibb = ByteBuffer.allocateDirect(3 * 2);\nibb.order(ByteOrder.nativeOrder());\n\
  mIndexBuffer = ibb.asShortBuffer();\n\n//将数据存入缓冲区\nfor (int i=0;i<3;i++)\n{\n  \
  \ mIndexBuffer.put(myIndecesArray[i]);\n}\n```\n\n既然你已经了解了代码清单 20–5 中 `mIndexBuffer`\
  \ 的工作原理，你可以回头再看看代码清单 20–4，更好地理解索引缓冲区是如何创建和操作的。\n\n**注意**：索引缓冲区并非创建新顶点，而仅仅是对通过 `glVertexPointer`\
  \ 指定的顶点数组进行索引。之所以能做到这一点，是因为 OpenGL 会以状态化的方式记住先前调用所设置的资产。\n\n现在，我们将介绍两个常用的 OpenGL\
  \ ES 方法：`glClear` 和 `glColor`。\n\n### `glClear`\n\n你可以使用 `glClear` 方法来清除绘制表面。使用此方法，你可以重置颜色、深度以及所使用的模板类型。你通过传入的常量来指定要重置哪个元素：`GL_COLOR_BUFFER_BIT`、`GL_DEPTH_BUFFER_BIT`\
  \ 或 `GL_STENCIL_BUFFER_BIT`。\n\n颜色缓冲区负责可见像素，因此清除它相当于擦除表面上的所有颜色。深度缓冲区与 3D 场景中可见的像素相关，其中深度指的是物体的远近距离。\n\
  \n模板缓冲区在此处略显高级，暂不深入讨论，只说明一点：你可以用它基于某些动态标准创建视觉效果，并且使用 `glClear` 来擦除它。\n\n**注意**：模板是一种绘图模板，你可以用它多次复制图形。例如，如果你使用的是\
  \ Microsoft Office Visio，所有保存为 `*.vss` 文件的绘图模板都是模板。在非计算机绘图世界中，你可以通过在纸张或其他平面材料上剪出图案来创建模板。然后你可以在那张纸上涂色，再将其移除，从而创造出复制该图案的图形效果。你看到的内容取决于哪个或哪些模板处于活动状态。清除所有模板将使所有绘制的内容都可见。\n\
  \n为了实现你的目的，你可以使用以下代码清除颜色缓冲区：\n\n``` \n//清除表面上的所有颜色\ngl.glClear(gl.GL_COLOR_BUFFER_BIT);\n\
  ```\n\n现在，我们来讨论一下为要绘制的内容设置默认颜色。\n\n### `glColor`\n\n你可以使用 `glColor` 来设置后续绘图的默认颜色。在以下代码片段中，方法\
  \ `glColor4f` 将颜色设置为红色：\n\n``` \n//设置当前颜色\nglColor4f(1.0f, 0, 0, 0.5f);\n```\n\n\
  回顾一下关于方法命名规则的讨论：`4f` 指的是该方法接受四个参数，每个参数都是浮点数。这四个参数分别是红色、绿色、蓝色和 alpha（颜色渐变）分量。每个参数的起始值都是\
  \ (1,1,1,1)。在这个例子中，颜色被设置为红色，并带有半透明度（由最后一个 alpha 参数指定）。\n\n虽然我们已经介绍了基本的绘图 API，但仍需处理一些关于你在\
  \ 3D 空间中指定点的坐标问题。下一小节将解释 OpenGL 如何通过观察者透过相机观察的视角来建模真实世界场景。\n\n\n\n#### 理解 OpenGL\
  \ 相机与坐标\n\n当你在三维空间中进行绘制时，最终必须将三维视图投影到二维屏幕上——这非常类似于在现实世界中使用相机捕捉三维场景。这种象征意义在 OpenGL\
  \ 中被正式认可，因此 OpenGL 中的许多概念都用相机术语来解释。\n\n正如你将在本节中看到的，绘图中可见的部分取决于相机的位置、相机镜头的方向、相机的朝向（例如倒置或倾斜）、缩放级别以及捕捉“底片”的大小。\n\
  \n将三维图像投影到二维屏幕的这些方面，在 OpenGL 中由三种方法控制：\n\n> `gluLookAt` 控制相机的方向。\n> `glFrustum`\
  \ 控制可视体、缩放或你关心的（远近）距离。\n> `glViewport` 控制屏幕的大小或相机底片的大小。\n\n除非你理解这三个 API 的含义，否则你无法在\
  \ OpenGL 中进行任何编程。我们进一步详细阐述相机的象征意义，以解释这三个 API 如何影响你在 OpenGL 屏幕上看到的内容。我们将从 `gluLookAt`\
  \ 开始。\n\n##### `gluLookAt` 与相机象征\n\n想象你正在拍摄包含花朵、树木、溪流和山脉的风景照片。你到达一片草地；眼前的景象相当于你想要在\
  \ OpenGL 中绘制的场景。你可以将这些绘制得很大（比如山），也可以绘制得很小（比如花），只要它们彼此之间保持比例关系即可。正如我们之前所暗示的，你用于这些绘图的坐标被称为*世界坐标*。在这些坐标下，你可以通过设置点\
  \ `(0,0,0)` 到 `(4,0,0)` 来定义一条在 x 轴上长度为 4 个单位的线段。\n\n当你准备拍照时，你找到一个放置三脚架的位置。然后将相机安装到三脚架上。你的相机位置——不是三脚架，而是相机本身——成为相机在世界中的原点。因此，你需要拿一张纸记下这个位置，它被称为*视点*。\n\
  \n如果你未指定视点，相机将位于 `(0,0,0)`，即屏幕的正中心。通常，你需要离开原点，这样才能看到位于 `z = 0` 原点处的 `(x,y)` 平面。假设你将相机定位在\
  \ `(0,0,5)`。这会将相机沿远离屏幕的方向向您移动 5 个单位。\n\n您可以参考 图 20–1 来直观了解相机的放置方式。\n\n![images](img/2001.jpg)\n\
  \n**图 20–1.** *使用相机类比解释 OpenGL 观察概念*\n\n观察 图 20–1，你可能会想，为什么图中的轴是 y 轴和 z 轴，而不是 x\
  \ 轴和 y 轴。这是因为我们遵循一个惯例：如果你的标准场景平面是 xy 平面，那么 OpenGL 相机是沿着 z 轴向下观察的。这个惯例很合理，因为我们通常将\
  \ z 轴视为深度轴。\n\n一旦放置好相机，你便开始向前方或正前方观察，以确定要捕捉场景的哪个部分。你将相机对准你正在观察的方向。这个你正在观察的远点被称为*视点*或*注视点*。这个点的指定实际上是对方向的指定。假设相机位于\
  \ `(0,0,5)`，如果你将视点指定为 `(0,0,0)`，那么相机将从距离原点 5 个单位处，沿着 z 轴向原点方向观察。你可以在 图 20–1 中看到这一点，其中相机正沿着\
  \ z 轴向下观察。\n\n进一步设想，在原点处有一座矩形建筑。你不想以竖屏方式观察它，而是想以横屏方式观察。你需要做什么？显然，你可以将相机留在相同位置，并仍然指向原点，但现在你需要将相机旋转\
  \ 90 度（类似于歪头看侧面）。这就是相机的*朝向*，因为相机固定在一个给定的视点，并注视着一个特定的视点或方向。这个朝向被称为*向上向量*。\n\n向上向量只是标识相机的朝向（向上、向下、向左、向右或倾斜）。相机的这种朝向也是通过指定一个点来确定的。想象一条从原点——不是相机原点，而是世界坐标原点——到这个点的连线。这条线在三维空间中与原点形成的角度就是相机的朝向。\n\
  \n例如，相机的向上向量可能是 `(0,1,0)` 甚至是 `(0,15,0)`，两者效果相同。点 `(0,1,0)` 是沿 y 轴远离原点向上的点。这意味着你将相机竖直放置。如果你使用\
  \ `(0,-1,0)`，你就会将相机倒置。在这两种情况下，相机仍然在相同的点 `(0,0,5)`，并注视着相同的原点 `(0,0,0)`。你可以将这三个坐标总结如下：\n\
  \n> `(0,0,5)`：视点（相机的位置）\n> `(0,0,0)`：注视点（相机指向的方向）\n> `(0,1,0)`：向上向量（相机是正放、倒放还是倾斜）\n\
  \n你将使用 `gluLookAt` 方法来指定这三个点——视点、注视点和向上向量，如下所示：\n\n```\ngluLookAt(gl, 0,0,5,   \
  \ 0,0,0,   0,1,0);\n```\n\n各参数含义如下：第一组坐标属于视点，第二组坐标属于注视点，第三组坐标属于相对于原点的向上向量。\n\n现在，让我们来看一下可视体。\n\
  \n\n\n##### glFrustum 与视景体\n\n你可能已经注意到，使用 `gluLookAt` 描述相机位置时，没有任何参数涉及尺寸。它们仅处理位置、方向和朝向。那么，如何告诉相机焦点在哪里？你试图捕捉的物体离相机有多远？物体区域的宽度和高度是多少？你可以使用\
  \ OpenGL 方法 `glFrustum` 来指定你感兴趣的场景区域。\n\n想象你自己正坐在剧院里看戏，舞台就是你的视景体。你其实不需要知道舞台之外发生了什么。然而，你确实关心这个舞台的尺寸，因为你希望观察舞台之上或内部发生的一切。\n\
  \n将场景区域想象成一个由盒子界定的空间，也称为*视景体*或*视景体*（即图 20–1 中间由粗边框标出的区域）。盒子内部的任何物体都会被捕捉，而盒子外部的任何物体则会被裁剪并忽略。那么，如何指定这个视景盒子呢？首先，你需要确定*近点*，即相机与盒子前端之间的距离。然后，你可以选择一个*远点*，即相机与盒子后端之间的距离。近点与远点沿\
  \ z 轴的距离就是盒子的深度。如果你指定近点为 50，远点为 200，那么你将捕捉到这两点之间的所有物体，盒子的深度将是 150。此外，你还需要指定盒子的左、右、上、下边界，这些边界位于连接相机与观察点的虚拟*射线*上。\n\
  \n在 OpenGL 中，你可以通过两种方式来想象这个盒子。第一种称为*透视投影*，它涉及我们一直在讨论的视景体。这种视图模拟了类似自然相机的功能，采用金字塔结构，其中远平面作为底面，相机作为顶点。近平面截去金字塔的顶部，从而在近平面与远平面之间形成视景体。\n\
  \n另一种想象盒子的方式是将其视为一个立方体。这第二种方案称为*正交投影*，适用于需要保持尺寸不变（无论物体离相机远近）的几何绘图。\n\n代码清单 20–6\
  \ 展示了如何为我们的示例指定视景体。\n\n**代码清单 20–6.** *通过 `glFrustum` 指定视景体*\n\n```\n// 首先计算宽高比\n\
  float ratio = (float) w / h;\n\n// 指明我们需要透视投影\nglMatrixMode(GL10.GL_PROJECTION);\n\
  \n// 指定视景体：即视景体\ngl.glFrustumf(\n    -ratio,    // 视景盒子的左侧\n    ratio,     // 视景盒子的右侧\n\
  \    1,         // 视景盒子的顶部\n    -1,        // 视景盒子的底部\n    3,         // 盒子前端距相机的距离\n\
  \    7);        // 盒子后端距相机的距离\n```\n\n因为在上述代码（代码清单 20–6）中，我们将顶部设置为 `1`、底部设置为 `-1`，所以盒子前端的高度被设为\
  \ 2 个单位。通过使用比例数值并考虑窗口的宽高比，我们指定了视景体左侧和右侧的尺寸。这也是为什么代码中使用窗口高度和宽度来计算比例的原因。代码还假设动作区域位于\
  \ z 轴上的 `3` 到 `7` 个单位之间。任何在相机参考系中绘制在此坐标范围之外的物体将不可见。\n\n由于我们将相机设置在 (0,0,5) 并指向 (0,0,0)，因此从相机朝向原点方向\
  \ 3 个单位处是 (0,0,2)，7 个单位处是 (0,0,-2)。这使得原点平面恰好位于你的 3D 盒子中央。\n\n至此，我们已经确定了视景体的尺寸。还有另一个重要的\
  \ API，它将这些尺寸映射到屏幕上：`glViewport`。\n\n##### glViewport 与屏幕尺寸\n\n`glViewport` 负责指定屏幕上用于投射视景体的矩形区域。该方法接受四个参数来指定矩形框：左下角的\
  \ x 和 y 坐标，以及宽度和高度。代码清单 20–7 是一个指定视图作为投影目标的示例。\n\n**代码清单 20–7.** *通过 `glViewPort`\
  \ 定义视口*\n\n```\nglViewport(0,         // 屏幕上矩形的左下角 x 坐标\n         0,           //\
  \ 屏幕上矩形的左下角 y 坐标\n          width,      // 屏幕上矩形的宽度\n          height);    // 屏幕上矩形的高度\n\
  ```\n\n如果我们的窗口或视图高度为 100 像素，而视景体高度为 10 个单位，那么世界坐标中每 1 个逻辑单位就对应屏幕坐标中的 10 个像素。\n\n\
  到目前为止，我们已经介绍了 OpenGL 中一些重要的入门概念。理解这些 OpenGL 基础知识对于学习如何编写 Android OpenGL 代码非常有用。有了这些前置知识，接下来我们将讨论如何调用本节中已经学到的\
  \ OpenGL ES API。\n\n### 在 Android 中对接 OpenGL ES\n\n如前所述，OpenGL ES 是一个受多个平台支持的标准。其核心是一套类似\
  \ C 语言的 API，负责处理所有 OpenGL 绘图任务。然而，每个平台和操作系统在实现显示、屏幕缓冲区等方面都有所不同。这些特定于操作系统的细节留给每个操作系统自行解决并记录。Android\
  \ 也不例外。\n\n从 1.5 SDK 开始，Android 简化了开始使用 OpenGL 绘图所需的交互和初始化过程。这一支持由 `android.opengl`\
  \ 包提供。提供大部分此类功能的主要类是 `GLSurfaceView`，它包含一个名为 `GLSurfaceView.Renderer` 的内部接口。掌握这两个实体，足以让你在\
  \ Android 平台上深入使用 OpenGL。\n\n#### 使用 GLSurfaceView 及相关类\n\n从 SDK 1.5 开始，使用 OpenGL\
  \ 的常见模式已经变得相当简单。（请参考本书第一版以了解 Android 1.0 的方法。）以下是使用这些类进行绘图的典型步骤：\n\n1.  实现 `Renderer`\
  \ 接口。\n2.  在渲染器的实现中提供绘图所需的相机设置。\n3.  在实现的 `onDrawFrame` 方法中提供绘图代码。\n4.  构造一个 `GLSurfaceView`\
  \ 对象。\n5.  在 `GLSurfaceView` 中设置步骤 1 到 3 中实现的渲染器。\n6.  向 `GLSurfaceView` 指示是否需要动画。\n\
  7.  在 Activity 中将 `GLSurfaceView` 设置为内容视图。你也可以在任何可以使用常规视图的地方使用此视图。\n\n下面，我们从如何实现渲染器接口开始。\n\
  \n\n\n#### 实现渲染器\n\n`Renderer` 接口的签名如列表 20-8 所示。\n\n**列表 20-8.** *Renderer 接口*\n\
  \n```\npublic static interface GLSurfaceView.Renderer\n{\n   void onDrawFrame(GL10\
  \ gl);\n   void onSurfaceChanged(GL10 gl, int width, int height);\n   void onSurfaceCreated(GL10\
  \ gl, EGLConfig config);\n}\n```\n\n主要的绘制工作发生在 `onDrawFrame()` 方法中。每当为该视图创建新表面时，`onSurfaceCreated()`\
  \ 方法就会被调用。我们可以调用许多 OpenGL API，如抖动、深度控制或任何其他可以在 `onDrawFrame()` 方法之外立即调用的方法。\n\n\
  同样，当表面发生变化时（例如窗口的宽度和高度），`onSurfaceChanged()` 方法就会被调用。我们可以在这里设置相机和视景体。\n\n即使在 `onDrawFrame()`\
  \ 方法内部，对于特定的绘制上下文也可能有许多共通之处。我们可以利用这些共通性，将这些方法抽象到另一个抽象层，称为 `AbstractRenderer`，其中只有一个未实现的方法，名为\
  \ `draw()`。\n\n列表 20-9 展示了 `AbstractRenderer` 的代码。\n\n**列表 20-9.** *AbstractRenderer*\n\
  \n```\n//filename: AbstractRenderer.java\nimport android.opengl.*;\n//…使用 Eclipse\
  \ 解析其他导入\npublic abstract class AbstractRenderer\nimplements android.opengl.GLSurfaceView.Renderer\n\
  {\n    public void onSurfaceCreated(GL10 gl, EGLConfig eglConfig) {\n        gl.glDisable(GL10.GL_DITHER);\n\
          gl.glHint(GL10.GL_PERSPECTIVE_CORRECTION_HINT,\n                GL10.GL_FASTEST);\n\
          gl.glClearColor(.5f, .5f, .5f, 1);\n        gl.glShadeModel(GL10.GL_SMOOTH);\n\
          gl.glEnable(GL10.GL_DEPTH_TEST);\n    }\n\n    public void onSurfaceChanged(GL10\
  \ gl, int w, int h) {\n        gl.glViewport(0, 0, w, h);\n        float ratio =\
  \ (float) w / h;\n        gl.glMatrixMode(GL10.GL_PROJECTION);\n        gl.glLoadIdentity();\n\
          gl.glFrustumf(-ratio, ratio, -1, 1, 3, 7);\n    }\n\n    public void onDrawFrame(GL10\
  \ gl)\n    {\n        gl.glDisable(GL10.GL_DITHER);\n        gl.glClear(GL10.GL_COLOR_BUFFER_BIT\
  \ | GL10.GL_DEPTH_BUFFER_BIT);\n        gl.glMatrixMode(GL10.GL_MODELVIEW);\n        gl.glLoadIdentity();\n\
          GLU.gluLookAt(gl, 0, 0, -5, 0f, 0f, 0f, 0f, 1.0f, 0.0f);\n        gl.glEnableClientState(GL10.GL_VERTEX_ARRAY);\n\
          draw(gl);\n    }\n    protected abstract void draw(GL10 gl);\n}\n```\n\n\
  拥有这个抽象类非常有用，因为它允许我们只专注于绘制方法。我们将使用这个类来创建 `SimpleTriangleRenderer` 类；列表 20-10 展示了源代码。\n\
  \n**列表 20-10.** *SimpleTriangleRenderer*\n\n```\n//filename: SimpleTriangleRenderer.java\n\
  public class SimpleTriangleRenderer extends AbstractRenderer\n{\n   //我们要使用的点或顶点数量\n\
      private final static int VERTS = 3;\n\n    //用于存储点坐标的原始本地缓冲区\n    private FloatBuffer\
  \ mFVertexBuffer;\n\n    //用于存储索引的原始本地缓冲区\n    //允许重复使用点。\n    private ShortBuffer\
  \ mIndexBuffer;\n\n    public SimpleTriangleRenderer(Context context)\n    {\n        ByteBuffer\
  \ vbb = ByteBuffer.allocateDirect(VERTS * 3 * 4);\n        vbb.order(ByteOrder.nativeOrder());\n\
          mFVertexBuffer = vbb.asFloatBuffer();\n\n        ByteBuffer ibb = ByteBuffer.allocateDirect(VERTS\
  \ * 2);\n        ibb.order(ByteOrder.nativeOrder());\n        mIndexBuffer = ibb.asShortBuffer();\n\
  \n        float[] coords = {\n                -0.5f, -0.5f, 0, // (x1,y1,z1)\n                \
  \ 0.5f, -0.5f, 0,\n                 0.0f,  0.5f, 0\n        };\n        for (int\
  \ i = 0; i < VERTS; i++) {\n            for(int j = 0; j < 3; j++) {\n                mFVertexBuffer.put(coords[i*3+j]);\n\
              }\n        }\n        short[] myIndecesArray = {0,1,2};\n        for\
  \ (int i=0;i<3;i++)\n        {\n           mIndexBuffer.put(myIndecesArray[i]);\n\
          }\n        mFVertexBuffer.position(0);\n        mIndexBuffer.position(0);\n\
      }\n\n   //重写的方法\n    protected void draw(GL10 gl)\n    {\n       gl.glColor4f(1.0f,\
  \ 0, 0, 0.5f);\n       gl.glVertexPointer(3, GL10.GL_FLOAT, 0, mFVertexBuffer);\n\
          gl.glDrawElements(GL10.GL_TRIANGLES, VERTS,\n                GL10.GL_UNSIGNED_SHORT,\
  \ mIndexBuffer);\n    }\n}\n```\n\n虽然这里的代码看起来很多，但大部分是用来定义顶点，然后将它们从 Java 缓冲区转换为 NIO\
  \ 缓冲区。除此之外，`draw` 方法只有三行：设置颜色、设置顶点并绘制。\n\n**注意**：尽管我们为 NIO 缓冲区分配了内存，但从未在代码中释放它们。那么谁来释放这些缓冲区呢？这些内存如何影响\
  \ OpenGL？\n\n根据我们的研究，`java.nio` 包在 Java 堆之外分配内存空间，这些空间可以被 OpenGL、文件 I/O 等系统直接使用。`nio`\
  \ 缓冲区实际上是 Java 对象，它们最终指向本地缓冲区。这些 `nio` 对象会被垃圾回收。当它们被垃圾回收时，它们会继续删除本地内存。Java 程序无需做任何特殊操作来释放内存。\n\
  \n然而，除非 Java 堆需要内存，否则 `gc` 不会被触发。这意味着您可能会耗尽本地内存，而 `gc` 可能无法意识到这一点。互联网上有很多关于此主题的示例，其中内存不足异常会触发\
  \ `gc`，然后可以查询 `gc` 被调用后是否释放了可用内存。\n\n在通常情况下——这对 OpenGL 很重要——您可以分配本地缓冲区，而无需担心显式释放已分配的内存，因为这项工作由\
  \ `gc` 完成。\n\n现在我们有了一个示例渲染器，让我们看看如何将这个渲染器提供给 `GLSurfaceView`，并使其显示在 Activity 中。\n\
  \n\n\n### 在 Activity 中使用 GLSurfaceView\n\n清单 20–11 展示了一个典型的 Activity，它配合合适的渲染器使用了\
  \ `GLSurfaceView`。\n\n**清单 20–11.** *一个简单的 OpenGLTestHarness Activity*\n\n```java\n\
  public class OpenGLTestHarnessActivity extends Activity {\n    private GLSurfaceView\
  \ mTestHarness;\n    @Override\n    protected void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        mTestHarness = new GLSurfaceView(this);\n\
  \        mTestHarness.setEGLConfigChooser(false);\n        mTestHarness.setRenderer(new\
  \ SimpleTriangleRenderer(this));\n        mTestHarness.setRenderMode(GLSurfaceView.RENDERMODE_WHEN_DIRTY);\n\
  \        //mTestHarness.setRenderMode(GLSurfaceView.RENDERMODE_CONTINUOUSLY);\n\
  \        setContentView(mTestHarness);\n    }\n    @Override\n    protected void\
  \ onResume()    {\n        super.onResume();\n        mTestHarness.onResume();\n\
  \    }\n    @Override\n    protected void onPause() {\n        super.onPause();\n\
  \        mTestHarness.onPause();\n    }\n}\n```\n\n我们来解释一下这段源代码的关键要素。以下是实例化 `GLSurfaceView`\
  \ 的代码：\n\n`mTestHarness = new GLSurfaceView(this);`\n\n然后，我们告诉视图不需要特殊的 EGL 配置选择器，默认配置即可，操作如下：\n\
  \n`mTestHarness.setEGLConfigChooser(false);`\n\n接下来，我们按如下方式设置渲染器：\n\n`mTestHarness.setRenderer(new\
  \ SimpleTriangleRenderer(this));`\n\n随后，我们使用以下两种方法之一来决定是否启用动画：\n\n`mTestHarness.setRenderMode(GLSurfaceView.RENDERMODE_WHEN_DIRTY);`\n\
  `//mTestHarness.setRenderMode(GLSurfaceView.RENDERMODE_CONTINUOUSLY);`\n\n如果我们选择第一行，绘制将仅被调用一次，或者更准确地说，只在需要绘制的时候被调用。如果我们选择第二个选项，绘制代码将被重复调用，以便我们能够对绘制内容进行动画处理。\n\
  \n这就是在 Android 上使用 OpenGL 接口的全部要点。\n\n现在我们已经拥有了测试这个绘制所需的所有组件。我们拥有清单 20–11 中的 Activity，清单\
  \ 20–9 中的抽象渲染器，以及 `SimpleTriangleRenderer`（清单 20–10）本身。我们所要做的就是通过任意菜单项使用以下代码调用该\
  \ Activity 类：\n\n```java\nprivate void invokeSimpleTriangle()\n{\n      Intent intent\
  \ = new Intent(this,OpenGLTestHarnessActivity.class);\n      startActivity(intent);\n\
  }\n```\n\n当然，我们还需要在 Android 清单文件中注册该 Activity，如下所示：\n\n```xml\n  <activity android:name=\"\
  .OpenGLTestHarnessActivity\"\n                  android:label=\"OpenGL Test Harness\"\
  />\n```\n\n虽然设计一个独立的 Activity（如清单 20–11 中的 `OpenGLTestHarnessActivity`）完全合理，但我们想提出一个更适合本章的替代方案。\n\
  \n这种需求源于本章包含多个演示程序。如果为每个演示都设计一个单独的 Activity，最终将会产生大量与清单 20–11 非常相似且没有额外解释的代码。此外，每个\
  \ Activity 都需要在清单文件中注册。\n\n考虑到这一点，我们来创建一个统一的 Activity，用于测试所有 OpenGL ES 1.0 演示程序。代码见清单\
  \ 20–12。与清单 20–11 中的 Activity 相比，它可能看起来内容更多；但是，如果你看看 `R.id.mid_opengl_simpletriangle`\
  \ 对应的菜单响应代码，就会发现我们实际上在做同样的事情。随着更多菜单选项被实现，我们将会有更多的 `if` 语句，每种演示类型对应一个。\n\n其他菜单选项将在本章后续内容中逐步探讨。在清单\
  \ 20–12 之后，我们将展示菜单 `.xml` 文件，然后更详细地解释这个多功能 Activity。\n\n**清单 20–12.** *MultiViewTestHarness\
  \ Activity*\n\n```java\n//filename: MultiViewTestHarnessActivity.java\npublic class\
  \ MultiViewTestHarnessActivity extends Activity {\n    private GLSurfaceView mTestHarness;\n\
  \    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n     \
