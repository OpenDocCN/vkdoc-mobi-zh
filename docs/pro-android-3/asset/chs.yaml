  *   使用以下 Android 链接来设计美观的小部件布局：[`http://developer.android.com/guide/practices/ui_guidelines/widget_design.html`](http://developer.android.com/guide/practices/ui_guidelines/widget_design.html)。\n\
  *   你需要了解 `RemoteViews` API 来绘制和操作小部件视图。该 API 位于：[`http://developer.android.com/reference/android/widget/RemoteViews.html`](http://developer.android.com/reference/android/widget/RemoteViews.html)。\n\
