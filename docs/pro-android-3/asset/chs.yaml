  \ Activity 负责创建 Contacts LF 文件夹。目前，就用户体验而言，你可以点击 Contacts LF 图标，在 `ListView` 中查看显示的联系人列表（参见图\
  \ 21-5）。同样，根据 Android 的版本，此列表的呈现方式可能有所不同。\n\n![Image](img/2105.jpg)\n\n**图 21-5.**\
  \ *显示动态文件夹联系人*\n\n\n\n根据您的联系人数量的不同，此列表可能看起来不同。您可以单击其中一个联系人以显示其详细信息（参见 Figure 21–6）。请注意，由于此联系人的详细信息由联系人应用程序呈现，因此外观也取决于\
  \ Android 版本。\n\n![Image](img/2106.jpg)\n\n**Figure 21–6.** *打开实时文件夹联系人*\n\n您可以单击底部的“菜单”按钮，了解如何处理该单个联系人（参见\
  \ Figure 21–7）。此处可用的选项也由联系人应用程序提供。同样，外观取决于版本和设备。\n\n![Image](img/2107.jpg)\n\n**Figure\
  \ 21–7.** *单个联系人的菜单选项*\n\n如果您选择编辑联系人，您将看到（取决于版本的）屏幕，如 Figure 21–8 所示。\n\n![Image](img/2108.jpg)\n\
  \n**Figure 21–8.** *编辑联系人详情*\n\n要查看此实时文件夹的“实时”方面，您可以更新联系人的名字或姓氏。然后，当您返回到“联系人 LF”的实时文件夹视图时，您将看到这些更改已反映出来。您可以通过反复单击“返回”按钮，直到看到“联系人\
  \ LF”文件夹来实现此操作。\n\n#### 构建实时文件夹\n\n现在您已经了解了实时文件夹及其相关性，我们将向您展示如何构建一个。要构建实时文件夹，您需要两样东西：一个\
  \ Activity 和一个专用内容提供者。Android 使用此 Activity 的 *标签* 来填充可用实时文件夹的列表，如 Figure 21–3 所示。Android\
  \ 还会调用此 Activity 以获取一个 URI，该 URI 将被调用以获取要显示的行列表。\n\nActivity 提供的 URI 应指向负责返回行的专用内容提供者。内容提供者通过明确定义的光标返回这些行。我们称该光标为\
  \ *明确定义的*，因为该光标应具有一组已知的预定义列名。\n\n通常，您将这两个实体打包在一个应用程序中，然后将该应用程序部署到设备上。您还需要一些支持文件来使其正常工作。我们将使用一个示例来解释和演示这些概念，该示例包含以下文件：\n\
  \n> `AndroidManifest.xml`：此文件定义了需要调用哪个 Activity 来创建实时文件夹的定义。\n> \n> `AllContactsLiveFolderCreatorActivity.java`：此\
  \ Activity 负责提供实时文件夹的定义，该文件夹可以显示联系人数据库中的所有联系人。\n> \n> `MyContactsProvider.java`：此内容提供者将响应实时文件夹\
  \ URI，该 URI 将返回一个联系人光标。此提供者在内部使用 Android 附带的联系人内容提供者。\n> \n> `MyCursor.java`：这是一个专门的光标，知道如何在底层数据更改时执行`requery`。\n\
  > \n> `BetterCursorWrapper.java`：`MyCursor`需要此文件来协调`requery`。\n\n我们将描述每个文件，以便您详细了解实时文件夹的工作原理。\n\
  \n##### AndroidManifest.xml\n\n您已经熟悉`AndroidManifest.xml`；它是所有 Android 应用程序都需要的同一个文件。该文件的实时文件夹部分（用注释分隔）表明我们有一个名为`AllContactsLiveFolderCreatorActivity`的\
  \ Activity，负责创建实时文件夹（参见 Listing 21–1）。这一点通过声明一个 action 为`android.intent.action.CREATE_LIVE_FOLDER`的\
  \ Intent 来表达。\n\n此 Activity 的标签“新实时文件夹”将显示在主页的上下文菜单中（参见 Figure 21–3）。正如我们在“用户体验实时文件夹的方式”一节中所述，您可以通过长按主页来进入其上下文菜单。\n\
  \n**Listing 21–1.** *用于实时文件夹定义的 AndroidManifest.xml 文件*\n\n```xml\n<?xml version=\"\
  1.0\" encoding=\"utf-8\"?>\n<manifest\n      package=\"com.androidbook.livefolders\"\
  \n      android:versionCode=\"1\"\n      android:versionName=\"1.0\">\n    <application\
  \ android:icon=\"@drawable/icon\" android:label=\"@string/app_name\">\n\n<!-- LIVE\
  \ FOLDERS -->\n        <activity\n            android:name=\".AllContactsLiveFolderCreatorActivity\"\
  \n            android:label=\"New live folder\"\n            android:icon=\"@drawable/icon\"\
  >\n\n            <intent-filter>\n                <action android:name=\"android.intent.action.CREATE_LIVE_FOLDER\"\
  \ />\n                <category android:name=\"android.intent.category.DEFAULT\"\
  \ />\n            </intent-filter>\n        </activity>\n\n<provider android:authorities=\"\
  com.androidbook.livefolders.contacts\"\n      android:multiprocess=\"true\"\n  \
  \          android:name=\".MyContactsProvider\" />\n\n    </application>\n    <uses-sdk\
  \ android:minSdkVersion=\"3\" />\n<uses-permission android:name=\"android.permission.READ_CONTACTS\"\
  />\n</manifest>\n```\n\nListing 21–1 中代码的另一个值得注意的点是`provider`声明，它锚定在 URI `content://com.androidbook.livefolders.contacts`\
  \ 上，并由提供者类`MyContactsProvider`提供服务。此提供者负责提供一个光标，用于填充当单击相应的实时文件夹图标时打开的`ListView`（Figure\
  \ 21–5）。实时文件夹 Activity `AllContactsLiveFolderCreatorActivity`需要知道此 URI 是什么，并在被调用时将其返回给\
  \ Android。当选择实时文件夹名称以在主页上创建实时文件夹图标时，Android 会调用此 Activity。\n\n根据实时文件夹协议，`CREATE_LIVE_FOLDER`\
  \ Intent 将允许主页的上下文菜单将`AllContactsLiveFolderCreatorActivity`显示为一个标题为“新实时文件夹”的选项（参见\
  \ Figure 21–3）。单击此菜单选项将在主页上创建一个图标，如 Figure 21–4 所示。\n\n`AllContactsLiveFolderCreatorActivity`负责定义此图标，该图标将由一个图像和一个标签组成。在我们的例子中，`AllContactsLiveFolderCreatorActivity`中的代码将此标签指定为“联系人\
  \ LF”（参见 Listing 21–2）。那么，让我们来看看此实时文件夹创建器的源代码。\n\n\n\n##### `AllContactsLiveFolderCreatorActivity.java`\n\
  \n`AllContactsLiveFolderCreatorActivity`类只有一个职责：作为实时文件夹的生成器或创建者（参见清单 21-2）。可以将其视为实时文件夹的模板。每次通过主页上下文菜单中的`Folders`选项调用此活动时，它都会在主页上生成一个实时文件夹。\n\
  \n此活动通过向调用者（本例中为主页或实时文件夹框架）告知实时文件夹的名称、实时文件夹图标使用的图像、数据可用的 URI 以及显示模式（列表或网格）来完成其任务。框架则负责在主页上创建实时文件夹图标。\n\
  \n**注意：** 有关实时文件夹所需的所有契约，请参阅`android.provider.LiveFolders`类的 Android SDK 文档。\n\n\
  **清单 21-2.** *AllContactsLiveFolderCreatorActivity 源代码*\n\n```java\npublic class\
  \ AllContactsLiveFolderCreatorActivity extends Activity\n{\n    @Override\n    protected\
  \ void onCreate(Bundle savedInstanceState)\n    {\n        super.onCreate(savedInstanceState);\n\
  \n        final Intent intent = getIntent();\n        final String action = intent.getAction();\n\
  \n        if (LiveFolders.ACTION_CREATE_LIVE_FOLDER.equals(action))   {\n      \
  \       setResult(RESULT_OK,\n                  createLiveFolder(MyContactsProvider.CONTACTS_URI,\n\
  \                           \"Contacts LF\",\n                           R.drawable.icon)\n\
  \                  );\n        }\n        else   {\n            setResult(RESULT_CANCELED);\n\
  \        }\n        finish();\n    }\n\n    private Intent createLiveFolder(Uri\
  \ uri, String name, int icon)\n    {\n        final Intent intent = new Intent();\n\
  \        intent.setData(uri);\n        intent.putExtra(LiveFolders.EXTRA_LIVE_FOLDER_NAME,\
  \ name);\n        intent.putExtra(LiveFolders.EXTRA_LIVE_FOLDER_ICON,\n        \
  \        Intent.ShortcutIconResource.fromContext(this, icon));\n        intent.putExtra(LiveFolders.EXTRA_LIVE_FOLDER_DISPLAY_MODE,\n\
  \                LiveFolders.DISPLAY_MODE_LIST);\n        return intent;\n    }\n\
  }\n```\n\n`createLiveFolder`方法本质上在调用它的`Intent`上设置值。当此`Intent`返回给调用者时，调用者将知道以下内容：\n\
  \n- 实时文件夹名称\n- 实时文件夹图标使用的图像\n- 显示模式：列表或网格\n- 用于获取数据的数据或内容 URI\n\n这些信息足以创建图 21-4\
  \ 中显示的实时文件夹图标。当用户单击此图标时，系统将调用 URI 来检索数据。由该 URI 标识的内容提供者负责提供标准化的游标。下面我们将展示该内容提供者（`MyContactsProvider`类）的代码。\n\
  \n##### `MyContactsProvider.java`\n\n`MyContactsProvider`具有以下职责：\n\n1. 识别看起来像`content://com.androidbook.livefolders.contacts/contacts`的传入\
  \ URI。\n2. 对由`content://contacts/people/`标识的 Android 提供的联系人内容提供者进行内部调用。（注意 Android\
  \ SDK 附带的 Contacts 应用程序，并根据版本调整此 URL。）\n3. 读取游标中的每一行，并将其映射回具有实时文件夹框架所需列名的`MatrixCursor`之类的游标。\n\
  4. 将`MatrixCursor`包装在另一个游标中，以便在此包装游标上执行`requery`时，会在需要时调用联系人内容提供者。\n\n`MyContactsProvider`的代码如清单\
  \ 21-3 所示。根据上述职责标出了重要项。代码在清单后进行解释。\n\n**清单 21-3.** *MyContactsProvider 源代码*\n\n\
  ```java\npublic class MyContactsProvider extends ContentProvider\n{\n    public\
  \ static final String AUTHORITY =\n       \"com.androidbook.livefolders.contacts\"\
  ;\n\n    //Uri that goes as input to the livefolder creation\n    public static\
  \ final Uri CONTACTS_URI =\n       Uri.parse(\"content://\" + AUTHORITY + \"/contacts\"\
  );\n\n    //To distinguish this URI\n    private static final int TYPE_MY_URI =\
  \ 0;\n    private static final UriMatcher URI_MATCHER;\n    static{\n      URI_MATCHER\
  \ = new UriMatcher(UriMatcher.NO_MATCH);\n      URI_MATCHER.addURI(AUTHORITY, \"\
  contacts\", TYPE_MY_URI);\n    }\n    @Override\n    public boolean onCreate() {\n\
  \        return true;\n    }\n    @Override\n    public int bulkInsert(Uri arg0,\
  \ ContentValues[] values) {\n      return 0; //nothing to insert\n    }\n    //Set\
  \ of columns needed by a LiveFolder\n    //This is the live folder contract\n\n\
  \    private static final String[] CURSOR_COLUMNS = new String[]{\n      BaseColumns._ID,\n\
  \      LiveFolders.NAME,\n      LiveFolders.DESCRIPTION,\n      LiveFolders.INTENT,\n\
  \      LiveFolders.ICON_PACKAGE,\n      LiveFolders.ICON_RESOURCE\n    };\n\n  \
  \  //In case there are no rows\n    //use this stand in as an error message\n  \
  \  //Notice it has the same set of columns of a live folder\n    private static\
  \ final String[] CURSOR_ERROR_COLUMNS = new String[]{\n      BaseColumns._ID,\n\
  \      LiveFolders.NAME,\n      LiveFolders.DESCRIPTION\n    };\n    //The error\
  \ message row\n    private static final Object[] ERROR_MESSAGE_ROW =\n         new\
  \ Object[]\n         {\n          -1, //id\n          \"No contacts found\", //name\n\
  \          \"Check your contacts database\" //description\n         };\n\n    //The\
  \ error cursor to use\n    private static MatrixCursor sErrorCursor =\n        \
  \ new MatrixCursor(CURSOR_ERROR_COLUMNS);\n    static {\n      sErrorCursor.addRow(ERROR_MESSAGE_ROW);\n\
  \    }\n\n    //Columns to be retrieved from the contacts database\n\n    private\
  \ static final String[] CONTACTS_COLUMN_NAMES =\n    new String[]{\n\n      ContactsContract.Contacts._ID,\n\
  \      ContactsContract.Contacts.DISPLAY_NAME,\n      ContactsContract.Contacts.TIMES_CONTACTED,\n\
  \      ContactsContract.Contacts.STARRED\n    };\n\n    public Cursor query(Uri\
  \ uri, String[] projection, String selection,\n            String[] selectionArgs,\
  \ String sortOrder)\n    {\n       //Figure out the uri and return error if not\
  \ matching\n      int type = URI_MATCHER.match(uri);\n      if(type == UriMatcher.NO_MATCH){\n\
  \        return sErrorCursor;\n      }\n      Log.i(\"ss\", \"query called\");\n\
  \      try\n      {\n       MatrixCursor mc = loadNewData(this);\n        mc.setNotificationUri(getContext().getContentResolver(),\
  \ \n              Uri.parse(\"content://contacts/people/\"));\n        MyCursor\
  \ wmc = new MyCursor(mc,this);\n        return wmc;\n      }\n      catch (Throwable\
  \ e){\n        return sErrorCursor;\n      }\n    }\n```\n\n\n\n`public static MatrixCursor\
  \ loadNewData(ContentProvider cp)`\n```\n{\n    MatrixCursor mc = new MatrixCursor(CURSOR_COLUMNS);\n\
  \    Cursor allContacts = null;\n    try\n    {\n        allContacts = cp.getContext().getContentResolver().query(\n\
  \            ContactsContract.Contacts.CONTENT_URI,\n            CONTACTS_COLUMN_NAMES,\n\
  \            null, // 行过滤条件\n            null,\n            ContactsContract.Contacts.DISPLAY_NAME);\
  \ // 排序依据\n\n        while(allContacts.moveToNext())\n        {\n            String\
  \ timesContacted = \"联系次数: \"+allContacts.getInt(2);\n            Object[] rowObject\
  \ = new Object[]\n            {\n                allContacts.getLong(0),       \
  \        // id\n                allContacts.getString(1),             // 名称\n  \
  \              timesContacted,                       // 描述\n                Uri.parse(\"\
  content://contacts/people/\"\n                        +allContacts.getLong(0)),\
  \   // intent\n                cp.getContext().getPackageName(),     // 包名\n   \
  \             R.drawable.icon                       // 图标\n            };\n    \
  \        mc.addRow(rowObject);\n        }\n        return mc;\n    }\n    finally\
  \ {\n        allContacts.close();\n    }\n}\n@Override\npublic String getType(Uri\
  \ uri)\n{\n    // 指示给定 URI 的 MIME 类型\n    // 针对此包装器提供程序\n    // 通常看起来像这样\n    //\
  \ \"vnd.android.cursor.dir/vnd.google.note\"\n    return ContactsContract.Contacts.CONTENT_TYPE;\n\
  }\n\npublic Uri insert(Uri uri, ContentValues initialValues) {\n    throw new UnsupportedOperationException(\n\
  \        \"不支持插入操作，因为这只是个包装器\");\n}\n@Override\npublic int delete(Uri uri, String\
  \ selection, String[] selectionArgs) {\n    throw new UnsupportedOperationException(\n\
  \        \"不支持删除操作，因为这只是个包装器\");\n}\npublic int update(Uri uri, ContentValues values,\n\
  \        String selection, String[] selectionArgs)\n{\n    throw new UnsupportedOperationException(\n\
  \        \"不支持更新操作，因为这只是个包装器\");\n}\n```\n\n请注意，清单 21–3 中初始化了实时文件夹所需的列集合，并在清单 21–4\
  \ 中重复列出以便直接参考。\n\n**清单 21–4.** *满足实时文件夹契约所需的列*\n```\nprivate static final String[]\
  \ CURSOR_COLUMNS = new String[]\n{\n    BaseColumns._ID,\n    LiveFolders.NAME,\n\
  \    LiveFolders.DESCRIPTION,\n    LiveFolders.INTENT,\n    LiveFolders.ICON_PACKAGE,\n\
  \    LiveFolders.ICON_RESOURCE\n};\n```\n\n除 `INTENT` 项之外，这些大多数字段都无需解释。如果你查看 图 21–5，就会看到\
  \ `NAME` 对应列表中条目的标题。`DESCRIPTION` 会位于同一列表条目中的 `NAME` 下方。\n\n`INTENT` 字段实际上是一个指向内容提供程序中项目\
  \ URI 的字符串字段。当用户点击某个项目时，Android 会使用此 URI 执行 `VIEW` 操作。这就是为什么这个字符串字段被称为`INTENT` 字段，因为\
  \ Android 内部会从该字符串 URI 派生出 `INTENT`。\n\n最后两个字段与列表中显示的图标相关。同样，请参考 图 21–5 查看图标。研究\
  \ 清单 21–3 可以了解这些列是如何从联系人数据库获取值的。\n\n另外请注意，`MyContactsContentProvider`（包装器内容提供程序）执行\
  \ 清单 21–5 中的代码，以通知底层游标需要监视任何数据更改。\n\n**清单 21–5.** *使用游标注册 URI*\n```\nMatrixCursor\
  \ mc = loadNewData(this);\nmc.setNotificationUri(getContext().getContentResolver(),\n\
  \                   Uri.parse(\"content://contacts/people/\"));\n```\n\n函数 `loadNewData()`\
  \ 从联系人提供程序检索一组联系人并创建 `MatrixCursor`，该游标包含 清单 21–4 中所示的列。然后代码指示 `MatrixCursor` 向\
  \ `ContentResolver` 注册，这样当 URI (`content://contacts/people`) 指向的数据发生任何更改时，`ContentResolver`\
  \ 就能提醒该游标。\n\n你会觉得有趣的是，要监视的 URI 并非我们的 `MyContactsProvider` 内容提供程序的 URI，而是 Android\
  \ 提供的联系人内容提供程序的 URI。这是因为 `MyContactsProvider` 只是“真正”内容提供程序的包装器。因此这个游标需要监视底层的内容提供程序，而非包装器。\n\
  \n同样重要的一点是，我们需要将 `MatrixCursor` 包装在我们自己的游标中，如 清单 21–6 所示。\n\n**清单 21–6.** *包装游标*\n\
  ```\nMatrixCursor mc = loadNewData(this);\nmc.setNotificationUri(getContext().getContentResolver(),\n\
  \              Uri.parse(\"content://contacts/people/\"));\nMyCursor wmc = new MyCursor(mc,this);\n\
  ```\n\n要理解为什么需要包装游标，我们需先了解视图是如何更新已更改内容的。像联系人这样的内容提供程序通常会通过注册 URI 作为实现 `query` 方法的一部分，来告知游标需要监视更改。这是通过\
  \ `cursor.setNotificationUri` 完成的。然后游标会将该 URI 及其所有子 URI 注册到内容提供程序。当内容提供程序发生插入或删除操作时，插入和删除操作的代码需要引发一个事件，表明特定\
  \ URI 所标识行中的数据已发生更改。\n\n这将触发游标通过 `requery` 进行更新，视图也会相应更新。遗憾的是，`MatrixCursor` 并不适用于这种\
  \ `requery` 机制。`SQLiteCursor` 适用，但我们无法在此使用 `SQLiteCursor`，因为我们要将列映射到一组新的列。\n\n为了适应这一限制，我们将\
  \ `MatrixCursor` 包装在一个游标包装器中，并重写了 `requery` 方法，以丢弃内部的 `MatrixCursor` 并使用更新后的数据创建一个新的游标。进一步说明：每当数据更改时，我们都希望获取一个新的\
  \ `MatrixCursor`。然而，对于 Android 实时文件夹框架，我们只返回包装后的外部游标。这会告诉实时文件夹框架只有一个游标存在，但实际上随着数据变化，我们在底层会生成新的游标。\n\
  \n这一点将在以下两个类中说明。\n\n### MyCursor.java\n\n注意 `MyCursor` 在初始化时是如何接收一个 `MatrixCursor`\
  \ 的（见 清单 21–7）。在调用 `requery` 时，`MyCursor` 会回调提供程序以返回一个 `MatrixCursor`。然后新的 `MatrixCursor`\
  \ 会通过 `set` 方法替换旧的游标。\n\n**注意：** 我们本可以通过重写 `MatrixCursor` 的 `requery` 方法来实现这一点，但该类没有提供清除数据并重新开始的方法。因此这是一个合理的变通方案。（请注意，`MyCursor`\
  \ 继承自 `BetterCursorWrapper`，我们接下来会讨论这个类。）\n\n**清单 21–7.** *MyCursor 源代码*\n```\n\
  public class MyCursor extends BetterCursorWrapper\n{\n    private ContentProvider\
  \ mcp = null;\n\n    public MyCursor(MatrixCursor mc, ContentProvider inCp)\n  \
  \  {\n        super(mc);\n        mcp = inCp;\n    }\n    public boolean requery()\n\
  \    {\n        MatrixCursor mc = MyContactsProvider.loadNewData(mcp);\n       \
  \ this.setInternalCursor(mc);\n        return super.requery();\n    }\n}\n```\n\n\
  现在我们来看看 `BetterCursorWrapper` 类，以便了解如何包装一个游标。\n\n\n\n### BetterCursorWrapper.java\n\
  \n`BetterCursorWrapper`类（参见[列表 21–8]）与 Android 数据库框架中的`CursorWrapper`类非常相似。但我们需要`BetterCursorWrapper`包含`CursorWrapper`所缺少的两项功能。首先，`CursorWrapper`没有`set`方法来替换`requery`方法中的内部游标。其次，`CursorWrapper`不是`CrossProcessCursor`。实时文件夹需要`CrossProcessCursor`而不是普通游标，因为实时文件夹跨进程边界工作。\n\
  \n**列表 21–8.** *BetterCursorWrapper 源代码*\n\n```java\npublic class BetterCursorWrapper\
  \ implements CrossProcessCursor\n{\n   //Holds the internal cursor to delegate methods\
  \ to\n   protected CrossProcessCursor internalCursor;\n\n   //Constructor takes\
  \ a crossprocesscursor as an input\n   public BetterCursorWrapper(CrossProcessCursor\
  \ inCursor)\n   {\n      this.setInternalCursor(inCursor);\n   }\n   //You can reset\
  \ in one of the derived class's methods\n   public void setInternalCursor(CrossProcessCursor\
  \ inCursor)\n   {\n      internalCursor = inCursor;\n   }\n\n   //All delegated\
  \ methods follow\n   public void fillWindow(int arg0, CursorWindow arg1) {\n   \
  \   internalCursor.fillWindow(arg0, arg1);\n   }\n   // ..... other delegated methods\n\
  }\n```\n\n我们没有在[列表 21–8]中展示完整的`BetterCursorWrapper`类，但你可以轻松使用 Eclipse 生成其余部分。将这个部分类加载到\
  \ Eclipse 后，将光标放在名为`internalCursor`的变量上。右键单击并选择 Source ![Image](img/U001.jpg) Generate\
  \ Delegated Methods。Eclipse 将为你填充类的其余部分。一旦 Eclipse 生成了委托方法，你需要将所有方法委托给内部游标类，就像我们在[列表\
  \ 21–8]中对`fillWindow`方法所做的那样。（如果你不想经历这个过程，可以在本章的下载项目中查看此文件。）\n\n现在你已经拥有了通过 Eclipse\
  \ 构建、部署和运行示例实时文件夹项目所需的所有类。由于没有活动类注册为 MAIN 类别，当你部署此项目时，不会看到任何用户界面显示，但你会在 Eclipse\
  \ 控制台中看到项目已成功安装的消息。\n\n让我们通过展示访问实时文件夹时的效果来结束本节关于实时文件夹的讨论。\n\n### 使用实时文件夹\n\n准备好实时文件夹项目的所有文件后，你可以构建它们并将其部署到模拟器。现在你可以使用我们构建的实时文件夹了。\n\
  \n导航到设备的主页；它看起来应该像[图 21–1]中的屏幕。按照“用户如何体验实时文件夹”一节开头概述的步骤操作。具体来说，找到你创建的实时文件夹，并创建[图\
  \ 21–4]中所示的实时文件夹图标。点击 Contacts LF 实时文件夹图标，你将看到填充了联系人的联系人列表（[图 21–5]）。\n\n### 编译代码的说明\n\
  \n玩转本章列出的代码的最佳方式是下载本章专用的 ZIP 文件。该文件的 URL 列在“参考资料”部分。本章列出的每个类文件都在可下载的 ZIP 文件中。\n\n\
  与本书中的许多项目不同，此项目没有在模拟器中运行时启动的活动。但是，你可以在 Eclipse 控制台中看到包已成功安装。\n\n### 总结\n\n实时文件夹提供了一种创新的单击机制，用于在主屏幕上显示变化的数据。这些数据几乎可以是任何内容，只要它们可以以列表形式排列为行集合即可。所有数据都需要具有通过名称和描述来识别和描述自身的能力。几乎任何数据元素都满足此要求，因为大多数数据都可以通过某种方式命名和描述。此外，如果有一个活动能在点击实时文件夹后显示该数据的详细信息，也会有所帮助。这些数据可以是本地的，例如联系人，甚至可以基于互联网，例如博客摘要。\n\
  \n在本章中，我们解释了实时文件夹游标的细微差别，以及如果你希望将现有的内容提供者公开为实时文件夹的源时需要使用哪些机制。我们解释了游标包装器的必要性，并向你展示了如何通过`ContentResolver`注册以接收数据更新。\n\
  \n在下一章中，我们将向你介绍另一种主屏幕创新——主屏幕小部件。\n\n"
- '# 第 22 章


  '
- "# 主屏幕小部件\n\n在本章中，我们将详细介绍 Android 的主屏幕小部件。主屏幕小部件与实时文件夹（在第 21 章中介绍）类似，提供了另一种在 Android\
  \ 主屏幕上显示频繁变化信息的方式。从高层次来看，主屏幕小部件是显示在主屏幕上的断开连接的视图（尽管其中填充了数据）。这些视图的数据内容由后台进程定期更新。\n\
  \n例如，电子邮件主屏幕小部件可能会提醒你有多少封未读电子邮件。该小部件可能只显示电子邮件的数量，而不显示消息本身。点击电子邮件计数可能会带你进入显示实际电子邮件的活动。只要设备能够通过\
  \ HTTP 或其他连接机制访问邮件数量，这些甚至可以来自外部电子邮件源，如 Yahoo、Gmail 或 Hotmail。\n\n**注意：** Android\
  \ 3.0 增强了对主屏幕小部件的支持。这些增强功能在第 31 章中进行了介绍。\n\n我们将本章分为三个部分。在第一部分中，我们将介绍主屏幕小部件及其架构。我们将描述\
  \ Android 如何使用`RemoteViews`来显示小部件，以及如何利用广播接收器来更新这些`RemoteViews`。你将学习如何创建活动来配置主屏幕上的小部件，并发现服务与小部件之间的关系。在本部分结束时，你将清楚了解主屏幕小部件的架构和生命周期。\n\
  \n在第二部分中，我们将向你展示如何设计和开发一个主屏幕小部件，并对代码进行注释。你将学习如何向 Android 定义小部件，以及如何编写广播接收器来更新这些小部件。我们将向你展示如何通过\
  \ Shared Preferences 管理小部件状态，以及如何编写活动来配置小部件。\n\n在第三部分中，我们将讨论使用小部件的适用性、限制和更广泛的指南。此外，我们还将讨论小部件的范围和适用性。我们还将提供设计建议，以编写需要更频繁更新的小部件。\n\
  \n我们将以一个与小部件相关的编程资源集合来结束本章。\n\n### 主屏幕小部件的架构\n\n让我们从更详细地考虑什么是主屏幕小部件开始，来讨论主屏幕小部件的架构。\n\
  \n\n\n#### 什么是主屏幕小部件？\n\n主屏幕小部件是可在主屏幕上显示并频繁更新的视图。作为一种视图，小部件的外观和感觉通过布局 XML 文件来定义。对于小部件，除了视图的布局之外，还需要定义小部件视图在主屏幕上所需的空间大小。\n\
  \n小部件定义还包含几个负责初始化视图并频繁更新它的 Java 类。这些 Java 类负责管理小部件在主屏幕上的生命周期。当小部件被拖到主屏幕上，或者通过拖到垃圾箱来卸载时，这些类会做出响应。\n\
  \n**注意：** 视图和相应的 Java 类在架构上是相互分离的。例如，任何 Android 服务或活动都可以使用其布局 ID 获取视图，用数据填充该视图（就像填充模板一样），然后将其发送到主屏幕。一旦视图被发送到主屏幕，它就会与底层的\
  \ Java 代码脱离。\n\n一个小部件定义至少包含以下内容：\n\n-   一个要在主屏幕上显示的视图布局，以及它应占用的主页面空间大小。请记住，这仅仅是没有任何数据的视图。更新视图将是某个\
  \ Java 类的职责。\n-   一个指定更新频率的计时器。\n-   一个被称为*小部件提供者*的 Java 类，它可以响应计时器更新，以便通过填充数据以某种方式更改视图。\n\
  \n一旦定义了小部件并提供了 Java 类，该小部件便可使用了。我们将概述这样一个定义好的小部件在实际中是如何使用的。\n\n#### 主屏幕小部件的用户体验\n\
  \nAndroid 中的主屏幕小部件功能允许你选择一个预设的小部件放置在主屏幕上。放置后，如有必要，小部件将允许你通过一个活动（作为小部件包的一部分定义）来配置它。在深入了解小部件的编程细节之前，理解这种交互非常重要。\n\
  \n换句话说，我们希望你在编写小部件程序之前，先体验一下如何使用小部件。\n\n我们将引导你了解一个名为“生日小部件”的小部件，我们为本章节创建了它。我们将在本章后面提供其源代码。首先，我们将使用这个小部件作为我们演练的示例。由于源代码在后文提供，我们需要你耐心阅读并跟随图片指示，不要试图在你的屏幕上查找这个小部件。如果你按照提供的图表和解释操作，你就会了解生日小部件的性质和表现，这将在我们后续编写代码时让一切变得清晰。\n\
  \n让我们通过定位我们想要的小部件并在主屏幕上创建它的一个实例，来开始这段探索之旅。\n\n##### 在主屏幕上创建小部件实例\n\n要访问可用的小部件列表，你需要长按主页。这将调出主屏幕的上下文菜单，如图\
  \ 22-1 所示。\n\n![图片](img/2201.jpg)\n\n**图 22-1.** *主屏幕上下文菜单*\n\n如果你从此列表中选择“小部件”，将会显示另一个屏幕，这是一个可用小部件的选择列表，如图\
  \ 22-2 所示。\n\n![图片](img/2202.jpg)\n\n**图 22-2.** *主屏幕小部件选择列表*\n\n这些大部分小部件是 Android\
  \ 系统自带的。根据你所使用的 Android 版本，这些列表可能会有所不同。在这个列表中，名为“生日小部件”的小部件是我们为本次练习设计的。如果你选择该小部件，它将在主屏幕上创建一个相应的小部件实例，外观类似于图\
  \ 22-3 所示的生日小部件示例。\n\n![图片](img/2203.jpg)\n\n**图 22-3.** *一个示例生日小部件*\n\n这个生日小部件会在其标题上显示姓名、距离该人生日还有多少天、生日日期，以及一个购买礼物的链接。\n\
  \n你可能想知道姓名和生日日期是如何配置的。如果你想要这个小部件的两个实例，每个实例包含不同人的姓名和出生日期，该怎么办？这就是小部件配置器活动发挥作用的地方，也是我们接下来要讨论的主题。\n\
  \n**注意：** 在主页面上为此小部件定义创建的视图称为*小部件实例*。这意味着你可以创建此小部件定义的多个实例。\n\n##### 理解小部件配置器\n\n\
  小部件定义可选地包含一个称为小部件配置器活动的活动规范。当你从主页面小部件选择列表中选择一个小部件来创建小部件实例时，Android 会调用相应的小部件配置活动。这个活动是你需要编写的，它负责配置小部件实例。\n\
  \n对于我们的生日小部件，这个配置活动将提示你输入姓名和即将到来的生日日期，如图 22-4 所示。配置器的职责是将这些信息保存在持久化位置，以便当对小部件提供者调用更新时，小部件提供者能够找到这些信息，并使用配置器设置的正确值来更新视图。\n\
  \n![图片](img/2204.jpg)\n\n**图 22-4.** *生日小部件配置器活动*\n\n**注意：** 当用户选择在主屏幕上创建两个生日小部件实例时，配置器活动将被调用两次（每个小部件实例一次）。\n\
  \n在内部，Android 通过为小部件实例分配 ID 来跟踪它们。这个 ID 会传递给 Java 回调函数和配置器 Java 类，以便初始配置和更新能够定向到正确的实例。在图\
  \ 22-3 中，字符串 `satya:3` 的后半部分，`3` 就是小部件 ID——或者更准确地说，是小部件实例 ID。小部件本身由其 Java 组件名称（即类名和小部件类所在的包名）标识；在本章中，“小部件\
  \ ID”和“小部件实例 ID”可以互换使用，均指代小部件实例 ID。我们在图 22-3 中包含了小部件实例 ID 以便说明这一点。\n\n有了对小部件的概述，我们现在将更详细地研究小部件的生命周期。\n\
  \n### 小部件的生命周期\n\n到目前为止，我们已经多次提到小部件定义。我们也简要讨论过 Java 类的作用。在本节中，我们将更详细地阐述这两个概念，并探讨小部件的生命周期。\n\
  \n小部件的生命周期包含以下几个阶段：\n\n1.  小部件定义\n2.  小部件实例创建\n3.  `onUpdate()`（时间间隔到期时）\n4.  响应点击（在主屏幕的小部件视图上）\n\
  5.  删除小部件（从主屏幕上）\n6.  卸载\n\n我们现在将逐一详细介绍这些阶段。\n\n\n\n##### 控件定义阶段\n\n控件的生命周期始于其视图的定义。此定义告知\
  \ Android 在主屏幕调用的控件选择列表（图 22–2）中显示控件名称。完成此定义需要两个要素：一个实现 `AppWidgetProvider` 的 Java\
  \ 类，以及一个控件布局视图。\n\n首先，在 Android 清单文件中添加以下条目，以指定 `AppWidgetProvider`（清单 22–1）。\n\n\
  **清单 22–1.** *Android 清单文件中的控件定义*\n\n```\n<manifest..>\n<application>\n....\n<receiver\
  \ android:name=\".BDayWidgetProvider\">\n      <meta-data android:name=\"android.appwidget.provider\"\
  \nandroid:resource=\"@xml/bday_appwidget_provider\" />\n      <intent-filter>\n\
  \             <action android:name=\"android.appwidget.action.APPWIDGET_UPDATE\"\
  \ />\n      </intent-filter>\n</receiver>\n   ...\n   <activity>\n      .....\n\
  \   </activity>\n<application>\n</manifest>\n```\n\n此定义表明存在一个名为 `BDayWidgetProvider`\
  \ 的广播接收器 Java 类（如你即将看到的，它继承自控件包中的 Android 核心类 `AppWidgetProvider`），该类用于接收与应用控件更新相关的广播消息。\n\
  \n**注意：** Android 根据时间间隔的频率，以广播消息的形式发送更新消息。\n\n清单 22–1 中的控件定义还指向了 `/res/xml` 目录下的一个\
  \ XML 文件，该文件进一步指定了控件视图和更新频率，如清单 22–2 所示。\n\n**清单 22–2.** *控件提供方信息 XML 文件中的控件视图定义*\n\
  \n```\n<appwidget-provider\n    android:minWidth=\"150dp\"\n    android:minHeight=\"\
  120dp\"\n    android:updatePeriodMillis=\"43200000\"\n    android:initialLayout=\"\
  @layout/bday_widget\"\n    android:configure=\"com.ai.android.BDayWidget.ConfigureBDayWidgetActivity\"\
  \n    >\n</appwidget-provider>\n```\n\n这个 XML 文件被称为应用控件提供方信息文件。在内部，它会被转换为 `AppWidgetProviderInfo`\
  \ Java 类。该文件分别指定了布局的宽度和高度为 `150dp` 和 `120dp`。此定义文件还指明了更新频率为 12 小时（换算为毫秒）。定义文件同样指向一个布局文件（清单\
  \ 22–7），其中描述了控件视图的外观（见图 22–5）。\n\n然而，需要注意的是，这些控件视图的布局仅限于包含特定类型的视图元素。控件布局中所允许的视图属于名为\
  \ `RemoteViews` 的视图类，并且仅允许特定类型的子视图用于这些远程视图。所允许的子视图元素如清单 22–3 所示。\n\n**清单 22–3.**\
  \ *RemoteViews 中允许的视图控件*\n\n```\nFrameLayout\nLinearLayout\nRelativeLayout\n\nAnalogClock\n\
  Button\nChronometer\nImageButton\nImageView\nProgressBar\nTextView\n```\n\n此列表可能随每个版本而增加。限制远程视图中允许的内容的主要原因是，这些视图与实际上控制它们的进程是断开的。这些控件视图由像主屏幕这样的应用托管。这些视图的控制器是由定时器调用的后台进程。正因如此，这些视图被称为远程视图。有一个对应的\
  \ Java 类 `RemoteViews` 允许访问这些视图。换句话说，程序员无法直接访问这些视图并调用其方法。你只能通过 `RemoteViews`（类似于一个守门者）来访问这些视图。\n\
  \n在下一主要部分探讨示例时，我们将介绍 `RemoteViews` 类的相关方法。现在，只需记住控件布局文件中只允许使用有限数量的视图集（见清单 22–3）。\n\
  \n控件定义（清单 22–2）还包含一个配置活动的规范，该活动会在用户创建控件实例时被调用。清单 22–2 中的这个配置活动就是 `ConfigureBDayWidgetActivity`。此活动与任何其他包含多个表单字段的\
  \ Android 活动一样。这些表单字段用于收集控件实例所需的信息。\n\n\n\n##### Widget 实例创建阶段\n\n一旦 widget 定义所需的所有\
  \ XML 片段就绪，并且所有 widget Java 类都可用，我们来探讨当用户在 widget 选择列表（参见图 22-2）中选择 widget 名称以创建\
  \ widget 实例时会发生什么。Android 会调用配置器活动（参见图 22-3），并期望该配置器活动执行以下操作：\n\n1.  从启动配置器的调用意图中接收\
  \ widget 实例 ID。\n2.  通过一组表单字段提示用户，以收集特定于该 widget 实例的信息。\n3.  持久化存储 widget 实例信息，以便后续对\
  \ widget 的`update`调用能够访问这些信息。\n4.  通过检索 widget 视图布局并据此创建`RemoteViews`对象，为首次显示 widget\
  \ 视图做好准备。\n5.  调用`RemoteViews`对象上的方法，为各个视图对象（如文本和图像）设置值。\n6.  同样使用`RemoteViews`对象在\
  \ widget 的任意子视图上注册任何`onClick`事件。\n7.  告知`AppWidgetManager`使用该 widget 的实例 ID 在主页屏幕上绘制`RemoteViews`。\n\
  8.  返回 widget ID 并关闭。\n\n请注意，在此场景下，widget 的首次绘制由配置器完成，而非`AppWidgetProvider`的`onUpdate()`方法。\n\
  \n**注意：** 配置器活动是可选的。如果未指定配置器活动，调用将直接转到`AppWidgetProvider`的`onUpdate()`方法，由`onUpdate()`负责更新视图。\n\
  \n对于用户创建的每个 widget 实例，Android 都会重复此过程。另请注意，目前没有直接记录的文档支持限制用户只能拥有单个 widget 实例。\n\n\
  除了调用配置器活动，Android 还会调用`AppWidgetProvider`的`onEnabled`回调。让我们通过查看`BDayWidgetProvider`的框架（参见清单\
  \ 22-4）来简要了解`AppWidgetProvider`类上的回调。我们将在后面的清单 22-9 中检查此文件的完整代码。\n\n**清单 22-4.**\
  \ *一个 Widget Provider 框架*\n\n```java\npublic class BDayWidgetProvider extends AppWidgetProvider\n\
  {\n    public void onUpdate(Context context,\n                        AppWidgetManager\
  \ appWidgetManager,\n                        int[] appWidgetIds){}\n\n    public\
  \ void onDeleted(Context context, int[] appWidgetIds){}\n    public void onEnabled(Context\
  \ context){}\n    public void onDisabled(Context context) {}\n}\n```\n\n`onEnabled()`回调方法表明主屏幕上至少有一个\
  \ widget 实例正在运行。这意味着用户必须至少将 widget 放置到主页上一次。在此调用中，您需要启用接收此组件的消息（您将在清单 22-9 中看到这一点）。在\
  \ Android 中，类有时被称为组件，特别是当它们构成一个可重用的单元，例如活动、服务或广播接收器时。在这种情况下，基类`AppWidgetProvider`是一个广播接收器组件；我们可以启用或禁用它来接收广播消息。\n\
  \n当用户将 widget 实例视图拖到垃圾桶时，会调用`onDeleted()`回调方法。此时，您需要删除为该 widget 实例保存的任何持久化数据。\n\n\
  当最后一个 widget 实例从主屏幕移除后，会调用`onDisabled()`回调方法。这发生在用户将最后一个 widget 实例拖到垃圾桶时。您应该使用此方法来取消注册您对此组件接收任何广播消息的兴趣（您将在清单\
  \ 22-9 中看到这一点）。\n\n每次清单 22-2 中指定的定时器到期时，都会调用`onUpdate()`回调方法。如果不存在配置器活动，那么在 widget\
  \ 实例首次创建时也会调用此方法。如果存在配置器活动，则在创建 widget 实例时不会调用此方法。此后，当定时器以指定的频率到期时，将调用此方法。\n\n#####\
  \ onUpdate 阶段\n\n一旦 widget 实例出现在主屏幕上，下一个重要事件就是定时器到期。如前所述，Android 将调用`onUpdate()`来响应定时器。`onUpdate()`的调用是通过广播接收器完成的。这意味着定义`onUpdate()`的相应\
  \ Java 进程将被加载，并保持存活直到该调用结束。一旦调用返回，该进程将准备被终止。\n\n还建议您使用诸如长期运行的广播接收器之类的机制（如第 14 章所述），前提是您的工作响应时间将超过\
  \ 10 秒。如果不这样做，您将收到 ANR（Android 无响应）错误。\n\n无论哪种方式，一旦您在`onUpdate()`方法中拥有了更新 widget\
  \ 所需的必要数据，您就可以调用`AppWidgetManager`来绘制远程视图。如果您打算调用一个长期运行的服务来执行更新，则需要将 widget ID 作为额外数据传递给启动该服务的意图。\n\
  \n这表明`AppWidgetProvider`类是无状态的，甚至可能无法在两次调用之间维护静态变量。这是因为包含此广播接收器类的 Java 进程可能在两次调用之间被销毁并重建，从而导致静态变量重新初始化。\n\
  \n因此，如果需要，您需要设计一种方案来记住状态。当更新不是特别频繁时，例如每隔几秒一次，将 widget 实例的状态保存在持久化存储中（如文件、共享首选项或\
  \ SQLite 数据库）是非常合理的。在下一个示例中，我们将使用共享首选项作为持久化 API。\n\n**警告：** 为了节省电量，Google 强烈建议更新间隔时间应超过一小时，这样设备就不会过于频繁地唤醒。Google\
  \ 还警告说，在未来的版本中，可能会强制执行 30 分钟或更长的限制。\n\n对于更短的持续时间，例如仅几秒钟，您需要通过使用`AlarmManager`类中的工具自行调用`onUpdate()`方法。当您使用`AlarmManager`时，您也可以选择不调用`onUpdate()`，而是在闹钟回调中完成`onUpdate()`的工作。有关使用闹钟管理器的内容，请参考第\
  \ 15 章。\n\n以下是在`onUpdate()`方法中通常需要执行的操作：\n\n1.  确保配置器已完成其工作；否则，直接返回。在 2.0 及更高版本中，这应该不成问题，因为这些版本中更新间隔预计会更长。否则，`onUpdate()`有可能在用户在配置器中完成\
  \ widget 配置之前被调用。\n2.  检索该 widget 实例的持久化数据。\n3.  检索 widget 视图布局，并据此创建一个`RemoteViews`对象。\n\
  4.  调用`RemoteViews`对象上的方法，为各个视图对象（如文本和图像）设置值。\n5.  通过使用挂起意图，在任意视图上注册任何`onClick`事件。\n\
  6.  告知`AppWidgetManager`使用实例 ID 绘制`RemoteViews`。\n\n如您所见，配置器最初所做的事情与`onUpdate()`方法所做的事情之间存在大量重叠。您可能希望在这两个地方重用此功能。\n\
  \n\n\n### 微件视图鼠标点击事件回调\n\n如前所述，`onUpdate()` 方法负责保持微件视图的更新。微件视图及其中的子元素可以为鼠标点击事件注册回调。通常，`onUpdate()`\
  \ 方法会使用一个待定意图（pending intent）为鼠标点击等事件注册一个操作。该操作可以启动一个服务或一个活动，例如打开浏览器。\n\n如果需要，这个被调用的服务或活动可以通过微件实例\
  \ ID 和 `AppWidgetManager` 与视图进行通信。因此，待定意图携带微件实例 ID 这一点非常重要。\n\n### 删除微件实例\n\n微件实例可能发生的另一个不同事件是它被删除。要实现删除，用户需要点击主屏幕上的微件。这会使主屏幕底部显示出垃圾箱。然后，用户可以将微件实例拖到垃圾箱中，从而将其从屏幕中删除。\n\
  \n这样做会调用微件提供者的 `onDelete()` 方法。如果你为该微件实例保存了任何状态信息，你需要在此 `onDelete` 方法中删除这些数据。\n\n\
  如果刚被删除的微件实例是该类型的最后一个实例，Android 还会调用 `onDisable()`。你将使用这个回调来清理为所有微件实例存储的任何持久化属性，并取消注册从微件\
  \ `onUpdate()` 广播接收的回调（参阅清单 22–9）。\n\n### 卸载微件包\n\n这就是微件的完整生命周期。我们将简要提及如果你计划卸载并安装包含这些微件的新版本\
  \ `.apk` 文件时需要清理微件的必要性，然后进入下一节。\n\n建议你在尝试卸载包之前移除或删除所有微件实例。请按照“删除微件实例”一节中的说明逐一删除每个微件实例，直到没有剩余为止。\n\
  \n然后，你可以卸载并安装新版本。如果你使用 Eclipse ADT 开发微件，这一点尤其重要，因为在开发期间，ADT 每次运行应用时都会尝试执行此操作。因此，在每次运行之间，请确保你已移除微件实例。\n\
  \n## 一个示例微件应用\n\n到目前为止，我们已经介绍了微件背后的理论和方法。现在让我们利用这些知识来创建一个示例微件，其行为已被用作解释微件架构的示例。我们将开发、测试并部署这个现在我们已经熟悉的生日微件。\n\
  \n每个生日微件实例将显示一个名字、下一个生日的日期，以及从今天到生日的天数。它还会创建一个 `onClick` 区域，你可以点击该区域购买礼物。点击将打开一个浏览器，并带你访问\
  \ [`www.google.com`](http://www.google.com)。\n\n完成后的微件布局应如图 22–5 所示。\n\n![图片](img/2205.jpg)\n\
  \n**图 22–5.** *生日微件的外观与风格*\n\n此微件的实现包含以下与微件相关的文件。根据你想使用的源 Java 包，Java 文件将位于 `src`\
  \ 子目录下，后跟你为 Java 包使用的目录结构。为了简洁和节省篇幅，我们使用了省略号（... ）来表示这些子目录。\n\n*   `AndroidManifest.xml`\
  \ //：在此定义 `AppWidgetProvider`（参阅清单 22–5）\n*   `res/xml/bday_appwidget_provider.xml`\
  \ //：微件尺寸和布局（参阅清单 22–6）\n*   `res/layout/bday_widget.xml` //：微件布局（参阅清单 22–7）\n*\
  \   `res/drawable/box1.xml` //：为微件布局的各个部分提供方框（参阅清单 22–8）\n*   `src/.../BDayWidgetProvider`\
  \ //：`AppWidgetProvider` 类的实现（参阅清单 22–9）\n\n实现还包含以下用于管理微件状态的文件：\n\n*   `src/.../IWidgetModelSaveContract`\
  \ //：保存微件模型的契约（参阅清单 22–10）\n*   `src/.../APrefWidgetModel` //：基于首选项的抽象微件模型（参阅清单\
  \ 22–11）\n*   `src/.../BDayWidgetModel` //：保存微件视图数据的微件模型（参阅清单 22–12）\n*   `src/.../Utils.java`\
  \ //：一些工具类（参阅清单 22–13）\n\n此外，实现还包含以下用于微件配置活动的文件：\n\n*   `src/.../ConfigureBDayWidgetActivity.java`\
  \ //：配置活动（参阅清单 22–14）\n*   `layout/edit_bday_widget.xml` //：用于输入名字和生日的布局（参阅清单 22–15）\n\
  \n我们将逐一浏览每个文件，并解释任何需要进一步考虑的其他概念。在本节结束时，你也可以复制并粘贴这些文件，在你自己的环境中创建并测试生日微件。\n\n\n\n\
  ### 定义微件提供程序\n\n微件的定义始于 Android 应用程序清单文件。在此文件中，您需要指定微件提供程序、微件配置 Activity，以及指向另一个进一步定义微件布局的\
  \ XML 文件的指针。\n\n对于生日微件，您可以在以下 Android 清单文件中看到所有这些高亮显示的内容（请参阅清单 22–5）。请注意将 `BDayAppWidgetProvider`\
  \ 定义为广播接收器，以及将 `ConfigureBDayWidgetActivity` 定义为配置 Activity。\n\n**清单 22–5.** *BDayWidget\
  \ 示例应用的 Android 清单文件*\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest\n\
  \      package=\"com.ai.android.BDayWidget\"\n      android:versionCode=\"1\"\n\
  \      android:versionName=\"1.0.0\">\n    <application android:icon=\"@drawable/icon\"\
  \ android:label=\"Birthday Widget\">\n<!--\n**********************************************************************\n\
  *  生日微件提供程序接收器\n**********************************************************************\n\
  \ -->\n   <receiver android:name=\".BDayWidgetProvider\">\n      <meta-data android:name=\"\
  android.appwidget.provider\"\n             android:resource=\"@xml/bday_appwidget_provider\"\
  \ />\n      <intent-filter>\n           <action android:name=\"android.appwidget.action.APPWIDGET_UPDATE\"\
  \ />\n      </intent-filter>\n   </receiver>\n<!--\n**********************************************************************\n\
  *  生日提供程序配置器 Activity\n**********************************************************************\n\
  \ -->\n   <activity android:name=\".ConfigureBDayWidgetActivity\"\n            \
  \      android:label=\"Configure Birthday Widget\">\n      <intent-filter>\n   \
  \        <action android:name=\"android.appwidget.action.APPWIDGET_CONFIGURE\" />\n\
  \      </intent-filter>\n  </activity>\n\n   </application>\n    <uses-sdk android:minSdkVersion=\"\
  3\" />\n</manifest>\n```\n\n**注意：** 如果您熟悉清单文件，接收器节点与 Activity 节点是同级节点。同时，它也是应用节点的直接子节点。\n\
  \n以下行中 `\"Birthday Widget\"` 标识的应用标签：\n\n```xml\n  <application android:icon=\"\
  @drawable/icon\" android:label=\"Birthday Widget\">\n```\n\n会显示在主页的微件选择列表（参见图 22–2）中。如果您是首次创建微件定义，请确保完全复制以下行：\n\
  \n```xml\n  <meta-data android:name=\"android.appwidget.provider\"\n```\n\n规范 `\"\
  android.appwidget.provider\"` 是 Android 特有的，必须如此声明；以下几行也是如此：\n\n```xml\n  <intent-filter>\n\
  \       <action android:name=\"android.appwidget.action.APPWIDGET_UPDATE\" />\n\
  \  </intent-filter>\n```\n\n最后，配置 Activity 的定义与任何其他普通 Activity 类似，只是它需要声明自身能响应 `APPWIDGET_CONFIGURE`\
  \ 操作。\n\n### 定义微件尺寸\n\n虽然 Android 清单文件定义了微件提供程序，但微件的其他详细信息是在单独的 XML 文件中提供的。这些其他详细信息包括微件的尺寸、微件的布局文件名、更新周期以及配置\
  \ Activity 组件（或类）名称。\n\n此附加 XML 文件由前述微件提供程序定义中的 `android:resource` 节点指示（参见清单 22–5）。清单\
  \ 22–6 显示了该微件提供程序信息文件 (`/res/xml/bday_appwidget_provider.xml`)。\n\n**清单 22–6.**\
  \ *BDayWidget 的微件视图定义*\n\n```xml\n<!-- res/xml/bday_appwidget_provider.xml -->\n\
  <appwidget-provider\n    android:minWidth=\"150dp\"\n    android:minHeight=\"120dp\"\
  \n    android:updatePeriodMillis=\"4320000\"\n    android:initialLayout=\"@layout/bday_widget\"\
  \n    android:configure=\"com.ai.android.BDayWidget.ConfigureBDayWidgetActivity\"\
  \n    >\n</appwidget-provider>\n```\n\n此文件向 Android 指示您想要的像素宽度和高度。但是，Android 会将它们四舍五入到最近的单元格。Android\
  \ 将其主屏幕区域组织成一个单元格矩阵；每个单元格的宽度和高度为 74 个不依赖密度的像素 (dp)。Android 建议您以这些单元格的倍数减去 2 像素（以便为四舍五入等调整）来指定宽度和高度。\n\
  \n此文件还指示需要多久调用一次 `onUpdate()`。Android 强烈建议该值不要超过每天几次。您可以将其设置为 0，表示从不调用更新。当您希望通过\
  \ `Alarm Manager` 类控制自己的更新时，这非常有用。\n\n`initialLayout` 属性指向微件的实际布局（参见清单 22–7）。最后，`configure`\
  \ 属性指向配置 Activity 类。此类的定义需要使用完全限定名。\n\n现在，让我们检查微件的实际布局。\n\n### 微件布局相关文件\n\n从前一节和清单\
  \ 22–6 中可以看出，微件的布局是在布局文件中定义的。这个布局文件与 Android 中任何其他视图的布局文件完全相同。\n\n但是，为了指导微件的标准化，Android\
  \ 发布了一套微件设计指南。您可以通过以下链接访问这些指南：\n\n`http://developer.android.com/guide/practices/ui_guidelines/widget_design.html`\n\
  \n除了指南之外，此链接还提供了一组视图背景，您可以使用它们来改善微件的外观和感觉。在本示例中，我们采用了不同的方法，使用了带有背景形状的视图布局的传统方式。\n\
  \n#### 微件布局文件\n\n清单 22–7 显示了用于生成图 22–5 所示微件布局的布局文件。\n\n**清单 22–7.** *BDayWidget\
  \ 的微件视图布局定义*\n\n```xml\n<!-- res/layout/bday_widget.xml -->\n<?xml version=\"1.0\"\
  \ encoding=\"utf-8\"?>\n<LinearLayout\n    android:orientation=\"vertical\"\n  \
  \  android:layout_width=\"150dp\"\n    android:layout_height=\"120dp\"\nandroid:background=\"\
  @drawable/box1\"\n    >\n<TextView\n    android:id=\"@+id/bdw_w_name\"\n    android:layout_width=\"\
  fill_parent\"\n    android:layout_height=\"30dp\"\n    android:text=\"Anonymous\"\
  \nandroid:background=\"@drawable/box1\"\n    android:gravity=\"center\"\n    />\n\
  <LinearLayout\n    android:orientation=\"horizontal\"\n    android:layout_width=\"\
  fill_parent\"\n    android:layout_height=\"60dp\"\n    >\n   <TextView\n       android:id=\"\
  @+id/bdw_w_days\"\n       android:layout_width=\"wrap_content\"\n       android:layout_height=\"\
  fill_parent\"\n       android:text=\"0\"\n       android:gravity=\"center\"\n  \
  \     android:textSize=\"30sp\"\n       android:layout_weight=\"50\"\n       />\n\
  \   <TextView\n      android:id=\"@+id/bdw_w_button_buy\"\n       android:layout_width=\"\
  wrap_content\"\n       android:layout_height=\"fill_parent\"\n       android:textSize=\"\
  20sp\"\n       android:text=\"Buy\"\n       android:layout_weight=\"50\"\n     \
  \  android:background=\"#FF6633\"\n       android:gravity=\"center\"\n   />\n</LinearLayout>\n\
  <TextView\n    android:id=\"@+id/bdw_w_date\"\n    android:layout_width=\"fill_parent\"\
  \n    android:layout_height=\"30dp\"\n    android:text=\"1/1/2000\"\nandroid:background=\"\
  @drawable/box1\"\n    android:gravity=\"center\"\n    />\n</LinearLayout>\n```\n\
  \n此布局使用嵌套的 `LinearLayout` 节点来实现所需效果。一些控件还使用名为 `box1.xml` 的形状定义文件来定义边框。\n\n\n\n###\
  \ 小部件背景形状文件\n\n该形状定义的代码如清单 22–8 所示（该文件应位于 `/res/drawable` 子目录中）。\n\n**清单 22–8.**\
  \ *边界框形状定义*\n\n```\n<!-- res/drawable/box1.xml -->\n<shape >\n    <stroke android:width=\"\
  4dp\" android:color=\"#888888\" />\n    <padding android:left=\"2dp\" android:top=\"\
  2dp\"\n            android:right=\"2dp\" android:bottom=\"2dp\" />\n<corners android:radius=\"\
  4dp\" />\n</shape>\n```\n\n我们采用这种布局方式，是因为它不仅对小部件很方便，而且对你的其他布局也同样实用。\n\n你可能希望在真正使用小部件测试这些布局之前，先构建一个活动并分别进行测试（至少我们是这么做的）。我们经历了多次试验才获得正确的视觉效果和交互感受。直接在小部件上尝试可能会很繁琐：每次运行应用时，你都需要删除小部件、卸载、重新安装，然后再将它们拖回主屏幕。\n\
  \n到目前为止讨论的文件，完成了一个典型小部件所需的 XML 定义。现在让我们通过检查小部件提供者类，来看看我们将如何回应小部件的生命周期事件。\n\n###\
  \ 实现小部件提供者\n\n作为小部件架构的一部分，我们已经讨论了小部件提供者类的职责。一个小部件提供者需要实现以下广播接收器回调方法。\n\n- `onUpdate()`\n\
  - `onDelete()`\n- `onEnable()`\n- `onDisable()`\n\n清单 22–9 中的 Java 代码演示了这些方法中每一个的实现。\n\
  \n**清单 22–9.** *示例小部件提供者: BDayWidgetProvider*\n\n```\n///src/<your-package>/BDayWidgetProvider.java\n\
  public class BDayWidgetProvider extends AppWidgetProvider\n{\n    private static\
  \ final String tag = \"BDayWidgetProvider\";\npublic void onUpdate(Context context,\n\
  \                        AppWidgetManager appWidgetManager,\n                  \
  \      int[] appWidgetIds)  {\n        final int N = appWidgetIds.length;\n    \
  \    for (int i=0; i<N; i++)\n        {\n            int appWidgetId = appWidgetIds[i];\n\
  \            updateAppWidget(context, appWidgetManager, appWidgetId);\n        }\n\
  \    }\n\npublic void onDeleted(Context context, int[] appWidgetIds)\n{\n     final\
  \ int N = appWidgetIds.length;\n     for (int i=0; i<N; i++)\n     {\n        BDayWidgetModel\
  \ bwm =\nBDayWidgetModel.retrieveModel(context, appWidgetIds[i]);\n        bwm.removePrefs(context);\n\
  \     }\n}\n    @Override\npublic void onReceive(Context context, Intent intent)\
  \ {\n        final String action = intent.getAction();\n        if (AppWidgetManager.ACTION_APPWIDGET_DELETED.equals(action))\
  \ {\n            Bundle extras = intent.getExtras();\n            final int appWidgetId\
  \ = extras.getInt\n                              (AppWidgetManager.EXTRA_APPWIDGET_ID,\n\
  \                               AppWidgetManager.INVALID_APPWIDGET_ID);\n\n    \
  \        if (appWidgetId != AppWidgetManager.INVALID_APPWIDGET_ID) {\n         \
  \       this.onDeleted(context, new int[] { appWidgetId });\n            }\n   \
  \     }\n        else {\n            super.onReceive(context, intent);\n       \
  \ }\n    }\n\npublic void onEnabled(Context context) {\n        BDayWidgetModel.clearAllPreferences(context);\n\
  \        PackageManager pm = context.getPackageManager();\n        pm.setComponentEnabledSetting(\n\
  \                new ComponentName(\"com.ai.android.BDayWidget\",\n            \
  \           \".BDayWidgetProvider\"),\n                PackageManager.COMPONENT_ENABLED_STATE_ENABLED,\n\
  \                PackageManager.DONT_KILL_APP);\n    }\n\npublic void onDisabled(Context\
  \ context) {\n        BDayWidgetModel.clearAllPreferences(context);\n        PackageManager\
  \ pm = context.getPackageManager();\n        pm.setComponentEnabledSetting(\n  \
  \              new ComponentName(\"com.ai.android.BDayWidget\",\n              \
  \         \".BDayWidgetProvider\"),\n                PackageManager.COMPONENT_ENABLED_STATE_DISABLED,\n\
  \                PackageManager.DONT_KILL_APP);\n    }\n\nprivate void updateAppWidget(Context\
  \ context,\n                          AppWidgetManager appWidgetManager,\n     \
  \                      int appWidgetId) {\n       BDayWidgetModel bwm = BDayWidgetModel.retrieveModel(context,\
  \ appWidgetId);\n       if (bwm == null) {\n          return;\n       }\nConfigureBDayWidgetActivity\n\
  \                     .updateAppWidget(context, appWidgetManager, bwm);\n   }\n\
  }\n```\n\n请参考“主屏幕小部件架构”一节，了解每个这些方法中需要执行什么操作。对于生日小部件，所有这些方法会依次使用`BDayWidgetModel`类中的方法。其中一些方法是\
  \ `removePrefs()`、`retrievePrefs()` 和 `clearAllPreferences()`。\n\n`BDayWidgetModel`\
  \ 类用于封装我们生日小部件实例的状态（我们将在下一节介绍这个类）。要理解这个小部件提供者类，你只需要知道我们正在使用一个模型类来检索这个小部件实例所需的数据。这些数据保存在偏好设置中，这就是方法命名为\
  \ `removePrefs()`、`retrievePrefs()` 和 `clearAllPreferences()` 的原因。如果 Android 用 `Data`\
  \ 替换了 `Prefs`，变成 `removeData()`、`retrieveData()` 和 `clearAllData()`，这些名称可能会更有意义。不管怎样，这种转换只是为了说明问题，你找不到带有\
  \ `Data()` 后缀的方法。\n\n如前所述，`update()` 方法会被所有小部件实例调用。这个方法必须更新所有小部件实例。这些小部件实例以 ID 数组的形式传入。对于每个\
  \ `id`，`onUpdate()` 方法会找到对应的小部件实例模型，并调用配置活动所使用的同一个方法（见清单 22–14）来显示检索到的小部件模型。\n\n\
  在 `onDelete()` 方法中，我们实例化了一个 `BDayWidgetModel`，然后让它将自己从偏好设置持久化存储中移除。\n\n在 `onEnabled()`\
  \ 方法中，由于它只在第一个实例出现时被调用一次，我们清除了所有小部件模型的持久化数据，以便从干净的状态开始。我们在 `onDisabled()` 方法中也做了同样的操作，这样就不会留存任何小部件实例的记忆。\n\
  \n在 `onEnabled()` 方法中，我们启用了小部件提供者组件，以便它能接收广播消息。在 `onDisabled()` 方法中，我们禁用了该组件，这样它就不会寻找任何广播消息。\n\
  \n**注意：**`onReceive()` 方法是一个特例。在 1.6 版本发布之前，存在一个 `onDelete()` 未被调用的 bug。Google 通过显式提供一个\
  \ `onReceive()` 方法提供了解决方案。在 1.6 及更高版本中，你将不需要这个方法；基类中的同一个方法就足够了。\n\n通过运用小部件模型的概念，代码保持了整洁。接下来我们将探讨小部件模型及其实现。\n\
  \n\n\n### 实现微件模型\n\n什么是微件模型？微件模型并非 Android 的概念。如果你熟悉传统的 UI 编程，就会想起模型-视图-控制器（MVC）架构的概念：其中模型持有视图所需的数据，视图负责显示，而控制器负责协调视图与模型之间的交互。\n\
  \n尽管 Android SDK 并未强制要求采用特定的方法，但我们借助了 MVC 思想来简化微件编程。在这种方法中，对于每一个微件实例视图，都会有一个对应的\
  \ Java 类作为微件模型。该模型拥有所有能够为微件实例提供所需数据的方法。\n\n除了提供数据之外，我们还为这些模型创建了一些基类，使它们能够了解如何从持久化存储（例如共享首选项）中保存和检索自身数据。我们将介绍模型类的层次结构，并向你展示如何使用共享首选项来存储和检索数据。你可以参考第\
  \ 9 章了解更多关于首选项的内容。\n\n#### 微件模型接口\n\n我们将从一个接口开始讨论，该接口充当微件模型的契约，以便微件模型能够声明要保存到持久化数据库中的字段。该契约还定义了当从数据库中检索到某个字段时如何设置该字段。此外，该接口提供了一个\
  \ `init()` 回调方法，以便在模型从数据库中重新检索出来后、在传递给请求客户端之前调用它。\n\n清单 22–10 展示了微件契约接口的源代码。\n\n\
  **清单 22–10.** *保存微件状态：契约*\n\n```\n//文件名: src/…/IWidgetModelSaveContract.java\npublic\
  \ interface IWidgetModelSaveContract\n{\n    public String getPrefname();\n    public\
  \ void setValueForPref(String key, String value);\n\n    //返回要保存的键值对\n    public\
  \ Map<String,String> getPrefsToSave();\n\n    //在恢复后被调用\n    public void init();\n\
  }\n```\n\n这个接口的设计方式是，一个派生的抽象类将使用特定的持久化存储来提供实现。如前所述，我们将使用 Android 的共享首选项功能作为持久化存储。正如该接口的名称所示，它纯粹是一个保存契约。诸如\
  \ `BDayWidgetProvider` 之类的客户端仍将依赖于该接口最常用的派生类来获取特定的方法。\n\n该接口的实现者需要提供一个首选项文件的名称来响应\
  \ `getPrefname()` 方法。然后，此首选项文件用于保存从 `getPrefsToSave()` 获取的键值对。在逆向操作（`setValueForPref()`）中，派生类被要求根据从首选项存储中恢复的键和值来设置其内部值。\n\
  \n最后，在派生类上调用 `init()` 方法，以指示值已从持久化存储中恢复，或者可以执行任何其他初始化。\n\n**注意：** 请记住，在实际的应用中，你会以稍微不同的方式来构建这个继承层次；你可能会使用委托机制来实现复用，而不是继承。然而，这个继承层次结构对我们的测试用例来说效果很好，可以演示微件模型。\n\
  \n现在让我们考虑一下抽象实现，它将微件的数据字段存储为共享首选项。\n\n#### 微件模型的抽象实现\n\n所有负责与持久化存储交互的代码都在 `APrefWidgetModel`\
  \ 类中实现（参见清单 22–11）。该类中的 `Pref` 代表“首选项”，因为该类使用 Android 的 `SharedPreferences` 工具来存储微件模型数据。\n\
  \n此外，该类代表了一个基础微件的概念。字段 `id` 代表微件的实例 ID。该类始终需要一个以微件实例 ID 为参数的构造函数，以满足实例 ID 的需求。\n\
  \n让我们看看清单 22–11 中该类的源代码。该类的主要方法已高亮显示。\n\n**清单 22–11.** *通过共享首选项实现微件保存*\n\n```\n\
  //文件名: /src/…/APrefWidgetModel.java\npublic abstract class APrefWidgetModel\nimplements\
  \ IWidgetModelSaveContract\n{\n   private static String tag = \"AWidgetModel\";\n\
  \n   public int iid;\n   public APrefWidgetModel(int instanceId) {\n      iid =\
  \ instanceId;\n   }\n// 抽象方法\n   public abstract String getPrefname();\n   public\
  \ abstract void init();\n   public Map<String,String> getPrefsToSave(){   return\
  \ null;}\n\npublic void savePreferences(Context context){\n       Map<String,String>\
  \ keyValuePairs = getPrefsToSave();\n       if (keyValuePairs == null){\n      \
  \    return;\n       }\n       // 将要保存一些值\nSharedPreferences.Editor prefs =\n  \
  \        context.getSharedPreferences(getPrefname(), 0).edit();\n\n       for(String\
  \ key: keyValuePairs.keySet()){\n          String value = keyValuePairs.get(key);\n\
  \          savePref(prefs,key,value);\n       }\n       // 最后提交这些值\nprefs.commit();\n\
  \    }\n\nprivate void savePref(SharedPreferences.Editor prefs,\n              \
  \           String key, String value) {\n       String newkey = getStoredKeyForFieldName(key);\n\
  \       prefs.putString(newkey, value);\n    }\nprivate void removePref(SharedPreferences.Editor\
  \ prefs, String key) {\n       String newkey = getStoredKeyForFieldName(key);\n\
  \       prefs.remove(newkey);\n    }\nprotected String getStoredKeyForFieldName(String\
  \ fieldName){\n       return fieldName + \"_\" + iid;\n    }\npublic static void\
  \ clearAllPreferences(Context context, String prefname) {\n       SharedPreferences\
  \ prefs=context.getSharedPreferences(prefname, 0);\n       SharedPreferences.Editor\
  \ prefsEdit = prefs.edit();\n       prefsEdit.clear();\n       prefsEdit.commit();\n\
  \    }\n\npublic boolean retrievePrefs(Context ctx) {\n       SharedPreferences\
  \ prefs = ctx.getSharedPreferences(getPrefname(), 0);\n       Map<String,?> keyValuePairs\
  \ = prefs.getAll();\n       boolean prefFound = false;\n       for (String key:\
  \ keyValuePairs.keySet()){\n          if (isItMyPref(key) == true){\n          \
  \   String value = (String)keyValuePairs.get(key);\n             setValueForPref(key,value);\n\
  \             prefFound = true;\n          }\n       }\n       return prefFound;\n\
  \    }\npublic void removePrefs(Context context) {\n       Map<String,String> keyValuePairs\
  \ = getPrefsToSave();\n       if (keyValuePairs == null){\n          return;\n \
  \      }\n       // 将要保存一些值\n        SharedPreferences.Editor prefs =\n        \
  \   context.getSharedPreferences(getPrefname(), 0).edit();\n\n        for(String\
  \ key: keyValuePairs.keySet()){\n           removePref(prefs,key);\n        }\n\
  \        // 最后提交这些值\n        prefs.commit();\n    }\nprivate boolean isItMyPref(String\
  \ keyname) {\n       if (keyname.indexOf(\"_\" + iid) > 0){\n          return true;\n\
  \       }\n       return false;\n    }\npublic void setValueForPref(String key,\
  \ String value) {\n       return;\n    }\n}\n```\n\n\n让我们看看这个类的关键方法是如何实现的。首先，将 widget\
  \ 模型属性保存到共享偏好文件中：\n\n```java\npublic void savePreferences(Context context)\n{\n\
  \    Map<String,String> keyValuePairs = getPrefsToSave();\n    if (keyValuePairs\
  \ == null){ return; }\n\n    //going to save some values\n    SharedPreferences.Editor\
  \ prefs =\n    context.getSharedPreferences(getPrefname(), 0).edit();\n\n    for(String\
  \ key: keyValuePairs.keySet()){\n        String value = keyValuePairs.get(key);\n\
  \        savePref(prefs,key,value);\n    }\n    //finally commit the values\n  \
  \  prefs.commit();\n}\n```\n\n该方法首先要求派生类返回一个键值对映射，其中键是模型的属性，值是这些属性值的字符串表示形式。然后，它将要求\
  \ Android 的`context`通过`context.getSharedPreferences()`获取一个`SharedPreferences`文件。此\
  \ API 需要为该包提供一个唯一的名称，由派生模型负责提供。\n\n一旦获取到共享偏好，按照 Android 文档说明，我们请求获取一个可编辑版本的共享偏好。然后，逐个更新偏好。完成后，执行`commit()`方法，使偏好得以持久化。\n\
  \n阅读 API 参考文档和第 9 章，了解关于`SharedPreferences`和`SharedPreferences.Editor`类的更多信息；本章的“资源”部分提供了相关链接。值得注意的是，这些共享偏好文件是\
  \ XML 文件，可以在包的数据目录中找到。\n\n由于我们使用单个文件存储所有 widget 实例的数据，因此需要一种方法来区分多个 widget 实例之间的字段名。例如，如果有两个名为\
  \ 1 和 2 的 widget 实例，则需要两个键来存储`Name`属性，例如`name_1`和`name_2`。通过以下方法进行转换：\n\n```java\n\
  protected String getStoredKeyForFieldName(String fieldName) {\n    return fieldName\
  \ + \"_\" + iid;\n}\n```\n\n派生类也会使用此方法，在通过`setValue()`方法调用时，检查需要更新哪个字段。\n\n### Widget\
  \ 模型的 Birthday Widget 实现\n\n最终，在此 widget 模型层次结构中最常派生的类负责实际维护视图所需的所有字段。它依赖基类进行存储和检索。我们以这种方式设计了此最常派生的类，使得直接处理这些模型的客户端直接与该类交互，因为这是与其最相关的类。\n\
  \n例如，当配置器活动首次创建 widget 实例时，配置器活动实例化其中一个类，填充其值，并要求其保存自身。\n\n由于视图的需求，此类维护三个字段：\n\n\
