  \ `Contact_entities_view` 部分所述。访问此视图的 URI 在 Java 辅助类中定义。该 URI 常量的完整 Java 路径见清单 27–38。\n\
  \n**清单 27–38.** *原始实体内容 URI*\n\n```\nContactsContract.RawContactsEntity.CONTENT_URI\n\
  ```\n\n本示例使用此 URI 来了解返回的字段。你可以通过点击“contact entity cursor”来查看这些字段。清单 27–39 显示了此菜单项打印出的游标返回的列列表。\n\
  \n**清单 27–39.** *联系人实体游标列*\n\n```\ndata_version;\ncontact_id;\nversion;\ndata12;data11;data10;\n\
  mimetype;\nres_package;\n_id;\ndata15;data14;data13;\nname_verified;\nis_restricted;\n\
  is_super_primary;\ndata_sync1;dirty;data_sync3;data_sync2;\ndata_sync4;account_type;data1;sync4;sync3;\n\
  data4;sync2;data5;sync1;\ndata2;data3;data8;data9;\ndeleted;\ngroup_sourceid;\n\
  data6;data7;\naccount_name;\ndata_id;\nstarred;\nsourceid;\nis_primary;\n```\n\n\
  知道了这组列后，你可以通过制定合适的 where 子句来缩小此游标的结果集。例如，在本示例的下一个菜单项中，我们将检索与联系人 ID 3、4 和 5 相关的数据元素。为此，你只需在代码中添加一个\
  \ `WHERE` 子句，例如\n\n```\n\"contact_id in (3,4,5)\"\n```\n\n并将其与游标一起发送。这正是在“contact\
  \ data”菜单项中所做的。如果你点击此选项，将会打印出诸如姓名和电子邮件地址之类的内容（你可以通过查看 MIME 类型来识别数据元素）。\n\n\n\n###\
  \ 添加联系人及其详细信息\n\n到目前为止，我们只读取了联系人。让我们通过一个示例，看看添加具有姓名、电子邮件和电话号码的联系人需要做什么。\n\n要向联系人写入数据，你需要在清单文件中请求以下权限（见清单\
  \ 27-20）：\n\n`android.permission.WRITE_CONTACTS`\n\n测试此示例需要以下新文件：\n\n- `AddContactFunctionTester.java`\n\
  \n你还需要更新之前示例中的以下文件：\n\n- `main_menu.xml`\n- `TestContactsDriverActivity.java`\n\n\
  文件 `AddContactFunctionTester.java` 负责添加联系人及其详细信息。清单 27-40 展示了其源代码。\n\n**清单 27-40.**\
  \ *添加联系人及其详细信息*\n\n```\nimport android.provider.ContactsContract.Data;\n//..其他导入，你可以使用\
  \ Eclipse 来解决\n\npublic class AddContactFunctionTester extends ContactDataFunctionTester\n\
  {\n    public AddContactFunctionTester(Context ctx, IReportBack target)\n    {\n\
  \        super(ctx, target);\n    }\n    public void addContact()\n    {\n     \
  \   long rawContactId = insertRawContact();\n        this.mReportTo.reportBack(tag,\
  \ \"RawcontactId:\" + rawContactId);\n        insertName(rawContactId);\n      \
  \  insertPhoneNumber(rawContactId);\n        showRawContactsDataForRawContact(rawContactId);\n\
  \    }\n    private void insertName(long rawContactId)\n    {\n        ContentValues\
  \ cv = new ContentValues();\n        cv.put(Data.RAW_CONTACT_ID, rawContactId);\n\
  \        cv.put(Data.MIMETYPE, StructuredName.CONTENT_ITEM_TYPE);\n        cv.put(StructuredName.DISPLAY_NAME,\"\
  John Doe_\" + rawContactId);\n        this.mContext.getContentResolver().insert(Data.CONTENT_URI,\
  \ cv);\n    }\n    private void insertPhoneNumber(long rawContactId)\n    {\n  \
  \      ContentValues cv = new ContentValues();\n        cv.put(Data.RAW_CONTACT_ID,\
  \ rawContactId);\n        cv.put(Data.MIMETYPE, Phone.CONTENT_ITEM_TYPE);\n    \
  \    cv.put(Phone.NUMBER,\"123 123 \" + rawContactId);\n        cv.put(Phone.TYPE,Phone.TYPE_HOME);\n\
  \        this.mContext.getContentResolver().insert(Data.CONTENT_URI, cv);\n    }\n\
  \    private long insertRawContact()\n    {\n        ContentValues cv = new ContentValues();\n\
  \        cv.put(RawContacts.ACCOUNT_TYPE, \"com.google\");\n        cv.put(RawContacts.ACCOUNT_NAME,\
  \ \"satya.komatineni@gmail.com\");\n        Uri rawContactUri =\n            this.mContext.getContentResolver()\n\
  \                 .insert(RawContacts.CONTENT_URI, cv);\n        long rawContactId\
  \ = ContentUris.parseId(rawContactUri);\n        return rawContactId;\n    }\n \
  \   private void showRawContactsDataForRawContact(long rawContactId)\n    {\n  \
  \      Cursor c = null;\n        try\n        {\n            Uri uri = ContactsContract.RawContactsEntity.CONTENT_URI;\n\
  \            c = this.getACursor(uri,\"_id = \" + rawContactId);\n            this.printRawContactsData(c);\n\
  \        }\n        finally\n        {\n            if (c!=null) c.close();\n  \
  \      }\n    }\n}\n```\n\n唯一的公有函数是 `addContact()`。你需要添加清单 27-41 中指示的菜单来调用此函数。\n\
  \n**清单 27-41.** *用于添加联系人的菜单项*\n\n```\n<item android:id=\"@+id/menu_add_contact\"\
  \n    android:title=\"Add Contact\" />\n```\n\n你需要将这些代码行添加到 `main_menu.xml`。你还需要修改驱动\
  \ Activity，将此菜单项转换为对 `addContact()` 的方法调用。清单 27-42 展示了驱动 Activity 的源代码（注意，这不是新文件，而是对相应文件的更新）。\n\
  \n**清单 27-42.** *更新后的驱动 Activity，用于测试添加联系人*\n\n```\npublic class TestContactsDriverActivity\
  \ extends DebugActivity\nimplements IReportBack\n{\n    ...其他内容\n    AddContactFunctionTester\
  \ addContactFunctionTester = null;\n\n    public TestContactsDriverActivity()\n\
  \    {\n        ...其他内容\n        addContactFunctionTester = new AddContactFunctionTester(this,this);\n\
  \    }\n    protected boolean onMenuItemSelected(MenuItem item)\n    {\n       \
  \ .....其他内容\n        if (item.getItemId() == R.id.menu_add_contact)\n        {\n\
  \            addContactFunctionTester.addContact();\n            return true;\n\
  \        }\n        return true;\n    }\n}\n```\n\n现在，如果你点击“添加联系人”菜单项，清单 27-40 `addContactFunctionTester`\
  \ 中的代码将执行以下操作：\n\n1.  首先，使用预定义账户的名称和类型添加一个新的原始联系人，由 `insertRawContact()` 方法表示。\n\
  2.  获取原始联系人 ID，并在数据表中插入一条姓名记录——`insertName()` 方法。\n3.  获取原始联系人 ID，并在数据表中插入一条电话号码记录——`insertPhone()`\
  \ 方法。\n\n清单 27-40 展示了这些方法在插入记录时使用的列别名。这些列别名在清单 27-43 中再次列出，以便快速查阅。\n\n**清单 27-43.**\
  \ *为标准联系人数据结构使用列别名*\n\n```\ncv.put(Data.RAW_CONTACT_ID, rawContactId);\ncv.put(Data.MIMETYPE,\
  \ StructuredName.CONTENT_ITEM_TYPE);\ncv.put(StructuredName.DISPLAY_NAME,\"John\
  \ Doe_\" + rawContactId);\n\ncv.put(Data.RAW_CONTACT_ID, rawContactId);\ncv.put(Data.MIMETYPE,\
  \ Phone.CONTENT_ITEM_TYPE);\ncv.put(Phone.NUMBER,\"123 123 \" + rawContactId);\n\
  cv.put(Phone.TYPE,Phone.TYPE_HOME);\n\ncv.put(RawContacts.ACCOUNT_TYPE, \"com.google\"\
  );\ncv.put(RawContacts.ACCOUNT_NAME, \"satya.komatineni@gmail.com\");\n```\n\n特别重要的是要知道，像\
  \ `Phone.TYPE` 和 `Phone.NUMBER` 这样的常量实际上指向通用的数据表列名 `data1` 和 `data2`。\n\n最后，要查看添加的记录，请点击“添加联系人”菜单选项。这将添加记录，并通过\
  \ `showRawContactsDataForRawContact()` 函数读取回来，向你显示该记录的详细信息。你将看到通过 `ContactData`\
  \ 结构显示的每个数据字段。\n\n\n\n### 控制聚合\n\n现在应该已经清楚，更新或插入联系人的客户端不会直接修改 `contact` 表。`contact`\
  \ 表是由触发器更新的，这些触发器会检查原始联系人表和原始联系人数据表。\n\n新增或变更的原始联系人，反过来会影响联系人表中聚合后的联系人。但是，您可能不希望允许两个联系人被聚合。\n\
  \n您可以通过在创建联系人时设置聚合模式来控制原始联系人的聚合行为。正如您在清单 27–33 的原始联系人表列中所见，原始联系人表包含一个名为 `aggregation_mode`\
  \ 的字段。这些聚合模式的值在清单 27–2 中显示，并在“聚合联系人”一节中解释。\n\n您还可以通过向名为 `agg_exceptions` 的表中插入行来始终将两个联系人分开。插入此表所需的\
  \ URI 在 Java 类 `ContactsContract.AggregationExceptions` 中定义。`agg_exceptions` 的表结构如清单\
  \ 27–44 所示。\n\n**清单 27–44.** *聚合异常表定义*\n\n```\nCREATE TABLE agg_exceptions\n(_id\
  \ INTEGER PRIMARY KEY AUTOINCREMENT,\ntype INTEGER NOT NULL,\nraw_contact_id1 INTEGER\
  \ REFERENCES raw_contacts(_id),\nraw_contact_id2 INTEGER REFERENCES raw_contacts(_id))\n\
  ```\n\ntype 列可以存放清单 27–45 中的一个常量。\n\n**清单 27–45.** *聚合异常表中的聚合类型*\n\n```\nTYPE_KEEP_TOGETHER\n\
  TYPE_KEEP_SEPARATE\nTYPE_AUTOMATIC\n```\n\n类型定义及其含义相当清晰。`TYPE_KEEP_TOGETHER` 表示两个原始联系人永远不应被拆分。`TYPE_KEEP_SEPARATE`\
  \ 表示这些原始联系人永远不应被合并。`TYPE_AUTOMATIC` 表示使用默认算法聚合联系人。\n\n您将用于插入、读取和更新此表的 URI 定义为：\n\
  \n`ContactsContract.AggregationExceptions.CONTENT_URI`\n\n用于处理此表的字段定义的常量也可在 Java\
  \ 类 `ContactsContract.AggregationExceptions` 中找到。\n\n### 同步的影响\n\n到目前为止，我们主要讨论了操纵设备上的联系人。然而，账户及其联系人通常与同步紧密配合。例如，如果您在\
  \ Android 手机上创建了一个 Google 账户，该账户将拉取您所有的 Gmail 联系人，并使它们在设备上可用。\n\n每当您在设备或新的服务器账户上添加新联系人时，这些联系人都会被同步并反映在两个位置。\n\
  \n但是，我们在本书的这一版中尚未涵盖同步 API 及其工作原理。与联系人一样，这是一个庞大的主题。了解联系人的工作原理极大地有助于理解同步 API。请查看我们在\
  \ [`www.androidbook.com`](http://www.androidbook.com) 上的更新。\n\n同步的性质也会影响设备上联系人的删除。当您使用聚合联系人\
  \ URI 删除联系人时，它将删除其所有对应的原始联系人以及每个原始联系人的数据元素。但是，Android 只会将它们标记为在设备上已删除，并期望后台同步实际与服务器同步，然后从设备上永久删除这些联系人。这种级联删除也发生在原始联系人级别，即该原始联系人的相应数据元素会被删除。\n\
  \n### 总结\n\n在本章中，我们揭示了 Android 平台上联系人的结构。您可以使用这些信息通过公共联系人 API 读取或更新联系人。\n\n尽管我们在本章中广泛地介绍了联系人\
  \ API，但我们并未涵盖以批处理模式操作内容提供程序以批量添加或更新联系人的方式。Android SDK 使用一个名为 `ContentProviderOperation`\
  \ 的类来批量处理数据库插入、更新和删除，作为对单个更新的优化。\n\n对于同步提供程序而言，批处理模式更重要，因为会有大量联系人被添加和更新。对于查询和偶尔的更新，我们在本章中介绍的内容已经足够。但是，请务必查看\
  \ [`www.androidbook.com`](http://www.androidbook.com) 以了解此主题的更新。\n\n## 第 28 章\n\n\
  ## 部署您的应用程序：Android Market 及其他\n\n创建一个人们会喜欢的好应用是一回事，但您还需要一种让用户轻松找到并下载它的方式。Google\
  \ 为此创建了 Android Market。通过设备上的一个图标，用户可以直接点击进入 Market 浏览、搜索、评论和下载应用程序。用户也可以通过互联网访问\
  \ Android Market 来做同样的事情，尽管下载并非到计算机，而是发送到用户的设备。许多应用程序是免费的；对于付费应用，Market 提供了支付机制以便于购买。\n\
  \n甚至可以从应用程序内部的意图（Intent）访问 Market，这使得应用程序可以轻松地连接到 Market，引导用户获取使您的应用程序成功所需的内容。例如，当您的新版应用程序可用时，您可以方便地让用户直接转到该\
  \ Market 页面以获取或购买新版本。然而，Android Market 并不是将应用程序安装到设备的唯一途径；互联网上正在涌现其他渠道。\n\nAndroid\
  \ Market 应用程序在模拟器中不可用（尽管存在一些使其可用的黑客方法）。这对开发者来说有点困难。理想情况下，您会拥有一个自己的设备，可以与 Android\
  \ Market 一起使用。Android Market 在 Android 开发者手机上可用，但不会显示或下载任何付费应用。这是 Google 试图防止付费应用被盗版的方式之一。\n\
  \n在本章中，我们将探讨如何设置您的环境以将应用发布到 Market，如何为通过 Market 销售应用做准备，如何保护自己免受盗版侵害，用户将如何查找、下载和使用您的应用，最后，还将介绍让您的应用可用的其他方式。\n\
  \n\n\n### 成为发布者\n\n在向 Android 市场上传应用之前，你需要先成为发布者。为此，你必须创建一个开发者帐户。完成后，你就能将应用上传到市场，以便用户发现并下载。谷歌让获取开发者帐户的流程相对轻松，且价格合理。\n\
  \n要发布任何内容，你首先需要拥有一个谷歌账户——例如，一个 `gmail.com` 电子邮件账户。接着，你需要通过 Android 市场确立身份。具体做法是访问\
  \ [`http://market.android.com/publish/signup`](http://market.android.com/publish/signup)。你需要提供开发者名称、电子邮件地址、网站地址和联系电话。帐户设置完毕后，你之后可以修改这些信息。你还需要支付注册费，该费用通过\
  \ Google Checkout 支付。为了继续交易，你需要使用谷歌账户登录。\n\n支付过程中出现的选项之一是“对我的电子邮件地址保密”。这指的是你与谷歌\
  \ Android 市场之间“购买”发布者权限的当前交易。如果你选择“是”，你的电子邮件地址将对谷歌 Android 市场保密。这与对你的应用购买者保密电子邮件地址无关。购买者能否看到你的电子邮件地址与此选项无关。稍后会详细介绍。\n\
  \n接下来是 Android 市场开发者分发协议。这是谷歌与你之间的法律合同，详细规定了应用分发、收款、退款、反馈、评分、用户权利、开发者权利等规则。本章“遵守规则”部分将有更多相关说明。\n\
  \n接受协议后，你将跳转到一个通常称为开发者控制台的页面，网址为 [`http://market.android.com/publish/Home`](http://market.android.com/publish/Home)。\n\
  \n#### 遵守规则\n\nAndroid 市场开发者分发协议 (AMDDA) 规定了大量规则。根据你计划在 Android 市场中运营的认真程度，你可能希望在同意协议前寻求法律顾问的审查。本节描述了一些你可能感兴趣的要点。\n\
  \n\n\n-   您必须是信誉良好的开发者才能使用 Android Market。这意味着您需要按照所述流程完成注册、接受协议，并遵守协议中的规则。违反规则可能导致您的账户被禁用，产品从\
  \ Market 中移除。\n-   您可以免费或付费分发产品。无论采用哪种方式，协议均适用。如果销售产品，您必须使用支付处理器，如 Google Checkout。Android\
  \ 2.0 推出时，Google Checkout 是通过 Android Market 收款的唯一方式。T-Mobile 于 2009 年、AT&T 于 2010\
  \ 年宣布，用户可以直接将下载应用的费用计入手机账单。PayPal 于 2010 年 10 月宣布与 Android Market 集成，但五个月后仍未成为可选支付方式。不过，这一情况可能在未来的版本中发生变化。\n\
  -   付费应用将产生交易费，可能还有设备运营商费用，这些费用会从销售价格中扣除。截至 2011 年 1 月，交易费为 30%。因此，如果售价为 10 美元，Google\
  \ 收取 3 美元，您获得 7 美元（假设无运营商费用）。\n-   您有责任向税务机构缴纳相应的税款。设置商户账户时，您需指定适用于其他地区购买者的适当税率。Google\
  \ Checkout 会根据您设置的方式收取相应税款。这笔款项将提供给您，您必须按规定进行缴纳。有关美国销售税的更多信息，请访问 [`http://biztaxlaw.about.com/od/businesstaxes/f/onlinesalestax.htm`](http://biztaxlaw.about.com/od/businesstaxes/f/onlinesalestax.htm)\
  \ 和 [`www.thestc.com`](http://www.thestc.com)。\n-   您可以分发应用的免费演示版，并允许用户付费解锁全部功能；但您必须通过授权的\
  \ Android Market 支付处理器收款。您不得将免费应用的用户重定向到其他支付处理器来收取升级费用。您也不得对通过 Android Market 分发的应用收取订阅费。实际上，如果可能，收取服务费是一种很好的方式，因为它有助于防止应用被破解，并且可以改善您的整体现金流。然而，收取服务费意味着您不能在\
  \ Android Market 内部销售该版本的应用。此功能未来可能会在 Android Market 中提供。您可以这样理解：如果您通过 Android Market\
  \ 赚钱，Google 希望分得一杯羹。\n-   2011 年 2 月，Google 宣布了应用内购买功能。这是一个附加的 SDK，允许应用对应用中使用的数字商品或资产收费。数字资产可以是虚拟武器、游戏新关卡、音乐或图形文件等。结账流程与购买应用相同，这意味着用户可以通过手机账单支付这些数字资产。\n\
  -   如果您的应用要求用户在某个 Web 服务器上拥有登录账户，并且该 Web 服务器向用户收取订阅费，那么该 Web 服务器可以以任何方式收取订阅费。通过这种方式，您将订阅费与应用分离，Google\
  \ 允许该应用在 Android Market 中上架——只要您的免费应用不将用户引导至该网站。但话说回来，为什么不直接将您的免费 Android 应用与 Web\
  \ 服务器上的服务一起分发呢？\n-   您似乎可以使用替代支付处理器来接受免费应用用户的捐赠，但不能在应用内设置激励措施来鼓励这些捐赠。\n-   退款是 Android\
  \ Market 中一个棘手的问题。最初，用户有 24 小时申请退款。后来改为 48 小时。2010 年 12 月，退款窗口被改为 15 分钟！而且这是从购买完成时算起的\
  \ 15 分钟，而不是从下载成功完成时算起。曾有用户在应用下载尚未完成时，退款窗口就已过期。奇怪的是，2010 年 12 月的《Android Market 开发者分发协议》（AMDDA）并未更新为\
  \ 15 分钟，仍写着 48 小时。对于在下载前可以预览的产品（包括铃声和壁纸），不提供退款。不过，即使退款窗口已过，Google Checkout 也允许开发者手动发放退款，因此用户无论如何都有办法获得退款。但开发者并不希望手动处理退款事宜。\n\
  -   您需要为您的产品提供足够的支持。如果未能提供足够的支持，用户可以申请退款，相关费用将向您收取，其中可能包括手续费。\n-   用户可以从 Android\
  \ Market 无限次重新下载已购买的应用。如果用户对设备执行恢复出厂设置，此功能可让他们无需再次购买即可取回所有应用。\n-   开发者同意保护用户的隐私和合法权益。这包括保护（确保）在使用应用过程中可能收集的任何数据。您可以更改关于用户数据保护的规则，但前提是必须向用户展示并让其接受您与用户之间的独立协议。\n\
  -   您的应用不得与 Android Market 竞争。Google 不希望 Android Market 内的应用销售 Android Market 之外的\
  \ Android 产品，从而绕过其支付处理器。这并不意味着您不能通过其他渠道销售您的应用：但您在 Android Market 上的应用本身不能从事在 Android\
  \ Market 之外销售 Android 产品的活动。\n-   Google 会为您的产品分配产品评级。评级可能基于用户反馈、安装率、卸载率、退款率和/或开发者综合评分。开发者综合评分可能由\
  \ Google 根据各应用的历史记录计算，这可能会影响新应用的评级。因此，发布与您关联的高质量应用（即使是免费应用）非常重要。目前尚不清楚开发者综合评分是否真实存在，但如果存在，您也无法查看自己的评分。\n\
  -   通过 Android Market 销售您的应用，即表示您授予用户“非排他性、全球性、永久性的许可，以在设备上运行、展示和使用该产品。”不过，您可以编写独立的最终用户许可协议（EULA）来取代此声明。请将\
  \ EULA 发布在您的网站上，或提供其他方式供购物者和用户阅读。\n-   Google 要求您遵守 Android 的品牌规则。这些规则包括对“Android”一词的使用限制，以及对机器人图形、徽标和自定义字体的使用限制。更多详情，请访问\
  \ [`www.android.com/branding.html`](http://www.android.com/branding.html)。\n\n\n\
  \n#### 开发者控制台\n\n开发者控制台是您在 Android Market 中管理应用程序的登录页面。通过开发者控制台，您可以购买 Android 开发手机、在\
  \ Google Checkout 中设置商家账户（以便为应用程序收费）、上传应用程序，以及获取已上传应用程序的相关信息。您还可以编辑账户详情，包括开发者名称、电子邮件地址、网站地址和电话号码。图\
  \ 28–1 展示了开发者控制台。\n\n![images](img/2801.jpg)\n\n**图 28–1.** *Android Market 开发者控制台*\n\
  \n目前有三款 Android 开发手机：Android Developer Phone、Google Nexus One 和 Google Nexus S。Android\
  \ Developer Phone（ADP）是唯一一款最初的 Android 开发者专用手机。ADP 是为 Android 开发者专门打造的特殊设备。它是一款功能齐全、无锁且不绑定任何特定运营商的设备。它兼容所有\
  \ SIM 卡，并配有 1GB SD 卡、摄像头、滑盖键盘和 GPS。*无锁*意味着您可以对其进行几乎任何操作，包括加载固件和 Android 平台的新版本，而不仅仅是应用程序。虽然可以在\
  \ ADP 上加载新版本的固件，但出厂时预装的是 Android 1.6。\n\n您可能还记得 Google 推出其第一款手机时，名为 Nexus One。这款手机由\
  \ Google 与 HTC 合作打造，但由于销量不佳，Google 停产了 Nexus One，随后将其作为第二款开发者手机提供给开发者以清空库存。它变得非常受欢迎，因此\
  \ Google 又订购了更多。Nexus One 的规格非常出色。在传感器类别中，它配备了距离传感器、光线传感器、G 传感器（加速度计）和指南针。它能够轻松运行\
  \ Android 2.2，并且在未来一段时间内很可能支持最新版本的 Android。其规格页面可访问 [www.htc.com/www/product/nexusone/specification.html](http://www.htc.com/www/product/nexusone/specification.html)。缺点方面，Nexus\
  \ One 无法与所有运营商的 3G 信号兼容，因此它使用其他无线网络类型（如 AT&T 的 2G 或 EDGE）。\n\n2010 年 12 月，Google\
  \ 发布了 Nexus S，但这款手机无法通过开发者控制台购买。它最初在美国的百思买和英国的 Carphone Warehouse 发售，可以选择是否绑定运营商合约。Nexus\
  \ S 比 Nexus One 更先进、速度更快，增加了对陀螺仪传感器、近场通信（NFC）传感器以及前置摄像头的支持。它预装 Android 2.3（也称为 Gingerbread）。其规格详情以及相关视频可在\
  \ `www.google.com/nexus/#` 找到。\n\n如果您想测试 Android 固件的新版本或 Android 平台本身，那么您需要购买一款开发者手机。在这三款开发者手机中，Nexus\
  \ S 是最佳选择。Nexus 系列手机的一大优点在于，它们通常是首批获得 Android 系统更新的设备之一。这也是您可能选择 Nexus 而非绑定运营商的商用手机的另一个原因。如果您只想开发应用程序，而不想修改\
  \ Android 操作系统本身，那么商用手机也能胜任。任何 Android 设备都可以连接到您的工作站进行开发和测试工作。不过，您需要注意硬件规格。并非所有手机都能升级到最新版本的\
  \ Android，尤其是性能较弱的设备。\n\n如果您没有通过 Google Checkout 设置商家账户，您将无法在 Android Market 中为产品收费。设置商家账户并不困难。点击开发者控制台中的链接，填写申请表，同意服务条款，一切就绪。您需要提供美国联邦税号（EIN）、信用卡号加美国社会安全号码（SSN），或者仅提供信用卡号。税务信息用于验证您的信用状况，以确保及时存款。信用卡信息用于处理因买家争议而产生的退单，前提是您的\
  \ Google Checkout 账户余额不足。您还可以提供银行账户信息，以便通过销售收入进行电子转账。请注意，Google Checkout 是一项不仅限于\
  \ Android Market 的服务。因此，不要将其与非 Android Market 销售的 Google Checkout 交易费信息混淆。前面提到的\
  \ 30% 是 Android Market 的交易费率。此外，还有针对非 Android Market 销售的其他 Google Checkout 交易费信息，这些不适用于\
  \ Android Market。\n\n上传和监控您的应用程序很可能是您最常用的开发者控制台功能。我们将在本章后面讨论上传应用程序。在监控方面，Market\
  \ 提供了工具，让您了解应用程序的总下载量以及仍保留安装的用户数量。您可以看到应用程序的总体评分（0 到 5 星），以及提交评分的人数。开发者控制台允许您重新发布应用程序（例如用于升级），或取消发布应用程序。取消发布并不会从设备上移除该应用，甚至未必会将其从\
  \ Google 服务器上删除，尤其是付费应用。已付费购买您的应用并卸载（但未申请退款）的用户，即使您已将其取消发布，也允许稍后重新安装。该应用对用户真正不可用的唯一方式是，Google\
  \ 因其违反规则而将其下架。2011 年 3 月，Google 在开发者控制台中添加了图表和图形功能，以便您查看应用程序在不同 Android 版本、不同设备、不同国家和不同语言中的表现。\n\
  \n除了评分外，用户还可以提交评论。为了快速解决任何问题，阅读评论符合您的最佳利益。每条评论都包含用户对您应用的评分、用户自己填写的名称以及评论日期。遗憾的是，无法直接回复评论者，甚至无法对评论进行评论。在极端情况下，如果某条评论特别有害或不恰当，您可以通过以下链接联系\
  \ Google 支持：[`market.android.com/support/`](http://market.android.com/support/)\n\
  \n您还可以查看应用程序生成的错误，并查看应用无响应和崩溃情况。图 28–2 显示了应用程序错误报告屏幕。\n\n![images](img/2802.jpg)\n\
  \n**图 28–2.** *应用程序错误报告屏幕*\n\n深入查看崩溃报告的详细信息，您可以看到崩溃的堆栈跟踪、运行该应用的设备类型以及崩溃发生的时间。但与用户评论一样，您无法与遇到问题的用户进行沟通以获取更多细节，或帮助他们解决问题。您只能希望受影响的用户通过电子邮件或您的网站与您取得联系。否则，您只能根据崩溃报告弄清楚问题所在并尝试修复。\n\
  \n\n\n开发者控制台还有一个你可能需要用到的功能：网站的帮助部分。`帮助`按钮位于右上角。点击它将会带你进入一个帮助网站，该网站上有大量关于如何使用 Android\
  \ 市场的优秀文档，并且还有一个论坛，你可以在其中搜索问题和答案，并发布自己的问题。例如，论坛里可以了解到最新的退款政策、问题和投诉。如果论坛无法解决问题，还有一个`联系支持`链接，它会带你到一个页面，你可以专门向\
  \ Google 发送消息以寻求帮助。\n\n现在我们已经向你介绍了开发者控制台的一些便捷功能，但你或许更想了解其最实用的部分，也就是将你的应用程序上传到 Android\
  \ 市场，以便用户可以找到并下载它们。不过在此之前，我们先来了解一下如何准备上传和销售你的应用程序。\n\n### 准备销售你的应用程序\n\n要将一个应用程序从代码完成阶段带到\
  \ Android 市场，有很多事情需要考虑和执行。本节将帮助你完成这些事项。\n\n#### 针对不同设备进行测试\n\n随着越来越多的 Android 设备面世，且每台设备都可能拥有一些新的硬件配置，测试你希望支持的那些设备就显得至关重要。最理想的情况是能够拿到每种类型的一台设备来测试你的应用程序，但这成本太高。次优的选择是为每种类型的设备配置一个\
  \ Android 虚拟设备（AVD），指定相应的硬件配置，然后使用模拟器和每个 AVD 进行测试。一些设备制造商会提供针对其特定设备的 Android 软件包，请查看他们的网站以获取下载选项。Android\
  \ SDK 提供了 `Instrumentation` 类来辅助测试，以及 UI/应用程序锻炼器猴子工具。这些工具将帮助你进行自动化测试，这样你就不必花大量时间手动测试应用程序。在开始测试之前，你最好从代码和\
  \ `/res` 目录中移除不再需要的测试遗留内容。你需要让应用程序尽可能小，运行尽可能快，并占用最少的内存。\n\n#### 支持不同的屏幕尺寸\n\n当 Android\
  \ SDK 1.6 发布时，开发者不得不应对新的屏幕尺寸。为了能在新的较小屏幕上运行，你必须在 `AndroidManifest.xml` 文件中将一个特定的\
  \ `<supports-screens>` 元素作为 `<manifest>` 的子元素进行设置。如果没有这个新标签来指定你的应用程序支持小屏幕尺寸，那么你的应用程序将不会在市场中显示给小屏幕设备。当然，这意味着你的应用程序需要针对\
  \ Android SDK 1.6 或更高版本编译。如果你希望你的应用程序能在仍使用 Android SDK 1.5 的设备上运行，那么你需要确保不使用 Android\
  \ SDK 1.6 或更高版本中引入的任何新 API。然后，针对旧设备和新设备的 AVD 进行测试。为了支持不同的屏幕尺寸，你可能需要在 `/res` 目录下创建备选资源文件。例如，对于\
  \ `/res/layout` 中的文件，你可能需要在 `/res/layout-small` 中创建对应的文件以支持小屏幕。这并不意味着你也必须在 `/res/layout-large`\
  \ 和 `/res/layout-normal` 中创建对应的文件，因为如果 Android 在 `/res/layout-large` 这样更具体的资源目录中找不到所需内容，它会回退到\
  \ `/res/layout` 目录中查找。另外请记住，你可以为这些资源文件使用限定符的组合；例如，`/res/layout-small-land` 将包含小屏幕横向模式下的布局。我们在第\
  \ 6 章中讨论过这一点。支持小屏幕可能也意味着需要创建可绘制对象（如图标）的备选版本。对于可绘制对象，你可能需要创建备选资源目录，并考虑屏幕分辨率以及屏幕尺寸。\n\
  \n当然，平板电脑在屏幕尺寸上则相反，使用“xlarge”标签。与之前相同的 `<supports-screen>` 标签用于指定你的应用程序是否会在超大屏幕上运行，在该标签内使用的属性是\
  \ `android:xlargeScreens`。在某些情况下，你可能有一个仅适用于平板电脑的应用程序，在这种情况下，你需要明确指示对于其他尺寸，其属性值为“false”。\n\
  \n\n\n#### 准备用于上传的 AndroidManifest.xml 文件\n\n你的 `AndroidManifest.xml` 文件在上传到 Android\
  \ Market 之前可能需要进行一些微调。ADT 通常会将 `android:icon` 属性放在 `<application>` 标签内，而不是 `<activity>`\
  \ 标签中。如果你有多个可以启动的 Activity，你可能需要为每个 Activity 指定单独的图标，以便用户更容易区分它们。但你仍然需要在 `<application>`\
  \ 中指定一个图标，它也会作为那些没有指定自己图标的 Activity 的默认 Activity 图标。如果你的应用仅在 `<activity>` 标签中指定了\
  \ `android:icon`，它在设备和模拟器上可以正常运行，但当 Android Market 在上传时检查你的应用 `.apk` 文件时，它会在 `<application>`\
  \ 标签中查找图标信息。此外，如果你使用的包名以 `com.google`、`com.android`、`android` 或 `com.example` 开头，Android\
  \ Market 也会阻止上传你的应用，不过希望你在应用中未曾使用过这些名称。\n\n在你针对不同设备配置测试应用时，还有许多其他兼容性问题需要考虑。有些设备有摄像头，有些没有物理键盘，还有一些有轨迹球而没有方向键。根据需要，在你的\
  \ `AndroidManifest.xml` 文件中使用 `<uses-configuration>` 和 `<uses-feature>` 标签来定义你的应用在硬件/平台方面的需求。Android\
  \ Market 会强制执行这些规则，不会让你的应用显示给那些设备不支持你应用的用户。请注意，这些标签与 `AndroidManifest.xml` 文件中的\
  \ `<uses-permission>` 标签不同且相互独立。虽然用户的设备可能配备了摄像头，但这并不意味着用户愿意授予你的应用使用它的权限。同时，声明你的应用需要使用摄像头的权限，并不会告诉\
  \ Android Market 你的应用需要设备具备摄像头。在大多数情况下，你需要在 `AndroidManifest.xml` 文件中同时放置这两个标签，一个用于指定需要摄像头，另一个用于指定需要使用摄像头的权限。但并非所有功能都需要权限，因此，指定你所需的功能对你最有利。\n\
  \n`<uses-permissions>` 和 `<uses-feature>` 之间还有另一个重要区别：`<uses-feature>` 标签可以声明你的应用*必须*有该功能，或者你的应用在没有该功能的情况下也能正常运行。也就是说，有一个名为\
  \ `android:required` 的属性，可以设置为 `true` 或 `false`，默认值为 `true`。例如，你的应用可能会在有蓝牙时使用它，但没有蓝牙也能正常工作。因此，在清单文件中，你可以这样写：\n\
  \n`<uses-feature android:name=\"android.hardware.bluetooth\" android:required=\"\
  false\" />`\n\n在你的应用代码中，你应该调用 `PackageManager` 来检测蓝牙是否可用，你可以使用以下代码：\n\n```java\n\
  boolean hasBluetooth = getPackageManager().hasSystemFeature(\n                PackageManager.FEATURE_BLUETOOTH);\n\
  ```\n\n然后在你的应用中，如果蓝牙不可用，采取相应的处理措施。Android 文档在这方面可能会让人困惑。如果你查看 `<uses-feature>` 的开发者指南页面，你不会看到像\
  \ `PackageManager` 参考页面中描述的那样多的功能，而后者为每个可用功能定义了一个 `FEATURE_*` 常量。\n\n`<uses-configuration>`\
  \ 标签略有不同。它指定了设备必须具备的键盘、触摸屏和/或导航控制类型。但与 `<uses-feature>` 的独立选择不同，你需要将配置选项的组合放入你的应用所需的条件中。例如，如果你的应用需要五向导航控制（即\
  \ D-pad 或轨迹球）和触摸屏（使用触控笔或手指），你可以按如下方式指定两个标签：\n\n`<uses-configuration android:reqFiveWayNav=\"\
  true\" android:reqTouchScreen=\"stylus\" />`\n`<uses-configuration android:reqFiveWayNav=\"\
  true\" android:reqTouchScreen=\"finger\" />`\n\n#### 本地化你的应用\n\n如果你的应用将在其他国家/地区使用，你可能需要考虑对其进行本地化。从技术角度来看，这相对容易实现。找人来做本地化则是另一回事。从技术角度来说，你只需在\
  \ `/res` 下创建另一个文件夹——例如，`/res/values-fr` 用于存放法文版的 `strings.xml`。将你现有的 `strings.xml`\
  \ 文件中的字符串值翻译成新的语言，然后将翻译后的新文件以原文件名保存在新的资源文件夹下。同样的技术也适用于其他类型的资源文件——例如，可绘制对象和菜单。如果不同国家或文化的图片和颜色不同，可能对用户更有利。因此，建议不要在颜色资源名称中使用真实的颜色名称。在关于颜色的在线文档中，经常可以看到类似这样的内容：\n\
  \n`<color name=\"solid_red\">#f00</color>`\n\n这意味着在你的代码或其他资源文件中，你通过实际的颜色名称来引用该颜色，在本例中为\
  \ `solid_red`。为了将颜色本地化为更符合其他国家/文化习惯的颜色，最好使用诸如 `accent_color1` 或 `alert_color` 这样的颜色名称。在英语环境中，红色可能是合适的颜色值，而在西班牙语环境中，使用某种黄色调可能更好。因为像\
  \ `alert_color` 这样的颜色名称不会暴露你实际使用的颜色，所以当你想要将实际颜色值改为其他颜色时，它不太容易引起混淆。同时，你可以设计一套令人愉悦的配色方案，包括基础色和强调色，并且更有信心在正确的位置使用正确的颜色。\n\
  \n在不同国家/地区，菜单选项可能需要更改，使用更少或更多的菜单项，或者以不同的方式组织，具体取决于应用的使用地点。菜单通常存储在 `/res/menu` 下。如果你面临这种情况，最好将所有字符串文本放入\
  \ `strings.xml` 或其他位于 `/res/values` 目录下的文件中，并在其他地方的相关资源文件中使用字符串 ID。这样做可以大大降低你在某个晦涩的资源文件中遗漏翻译字符串值的可能性。这样你的语言翻译工作就仅限于\
  \ `/res/values` 下的文件。\n\n\n\n### 准备应用程序图标\n\n购物者和用户会在 Android Market 以及下载后的设备上显著看到你应用程序的图标和标签。请特别注意为你的应用及其活动创建精美的图标和恰当的标签。根据需要进行本地化，并牢记：针对不同屏幕尺寸，图标可能需要调整才能呈现良好效果。观察其他开发者如何设计图标，特别是那些与你应用同属一类的应用。你希望应用能引人注目，因此最好不要与其他应用雷同。同时，你也希望当图标和标签与众多其他应用图标并列时，能在设备上正常工作。你不想让用户对应用功能感到困惑，所以图标应能代表应用的核心功能。\n\
  \n为你的应用创建任何图像（尤其是图标）时，都必须考虑目标设备的屏幕密度。密度指每英寸的像素数。小屏幕通常密度较低，即单位距离内像素较少；而大屏幕往往密度较高。对于低密度屏幕，要使图标看起来大小合适，需用较少的像素（通常为\
  \ 36×36）来创建。对于高密度屏幕，你可能选择 72×72 像素的图标。中等密度图标通常为 48x48 像素，超高密度则为 96x96 像素。\n\n###\
  \ 从应用中赚钱的考量\n\n如果你计划收费出售应用，还需考虑其他问题：你是提供独立的免费和付费应用（需要构建和管理两个应用），还是保持单一代码库，并用某种技术判断该应用是否已付费？无论采用哪种方法，如何防止应用被复制并在其他设备上为他人安装？由于手机存在安全漏洞，且某些人能够访问设备内部，要实现对复制保护完全无懈可击极为困难。\n\
  \n维持单一代码库但支持免费和付费模式的一种技术是借助`PackageManager`：\n\n```\nthis.getPackageManager().checkSignatures(mainAppPkg,\
  \ keyPkg)\n```\n\n此方法比较两个指定包的签名，若两者同时存在且相同，则返回`PackageManager.SIGNATURE_MATCH`。每个应用在\
  \ Android Market 中共存时包名必须不同，但这没问题。在你的代码中，当需要决定是否允许某些功能时，可调用此方法提供主应用和解锁应用的包名。随后在\
  \ Android Market 中将解锁应用设为付费应用。如果用户购买并下载了该解锁应用，主应用将获得签名匹配，并解锁额外功能。另一种较不清晰的处理单一代码库的方法，是使用源码版本控制系统配置公共元素的共享，并通过构建脚本生成应用的免费和付费版本。\n\
  \n通过 Android 应用赚钱的另一种方式是应用内广告。嵌入广告的机会很多，常见的有 AdMob 和 AdSense。其过程基本是：将它们的 SDK 集成到你的应用中，规划广告在应用中的显示位置和时机，为应用添加`INTERNET`权限（以便广告\
  \ SDK 获取并显示广告），然后当用户点击广告时你就能获得收益。应用可以保持免费，这样更容易上架 Android Market，且无需过度担心盗版问题。许多开发者报告称通过广告获得了可观的收入。\n\
  \n2011 年 2 月引入的另一新功能是“买家货币”。在此之前，买家必须用卖家货币付款，这容易让难以换算的买家感到困惑，也意味着卖家全球只能采用单一价格。如今卖家可以针对不同国家设定价格，不仅售价可在各国灵活调整，买家体验也变得更加便捷友好。\n\
  \n### 引导用户返回 Market\n\nAndroid 引入了一种新的 URI 方案，以帮助在 Android Market 中查找应用：`market://`。例如，若你想引导用户前往\
  \ Market 寻找所需组件，或推广能解锁应用功能的附加应用，可执行如下操作（将`MY_PACKAGE_NAME`替换为真实包名）：\n\n```\nIntent\
  \ intent = new Intent(Intent.ACTION_VIEW,\n          Uri.parse(\"market://search?q=pname:MY_PACKAGE_NAME\"\
  ));\nstartActivity(intent);\n```\n\n这将在设备上启动 Market 应用，并将用户带到该包名对应的页面。用户随后可选择下载或购买该应用。注意，此方案在普通网页浏览器中无效。除了按包名（`pname`）搜索，你还可以通过开发者名称搜索（使用`market://search?q=pub:\\\
  \"Fname Lname\\\"`），或针对 Android Market 中的任何公开字段（应用标题、开发者名称、应用描述）搜索（使用`market://search?q=<查询字符串>`）。\n\
  \n如果将刚学到的知识与上一节的技术结合，我们的代码可以检测设备上是否存在解锁包。若未找到，可提示用户是否要获取解锁应用。如果用户响应“是”，则调用 Intent\
  \ 打开 Market 应用，直接将用户带至我们的解锁应用页面进行购买和下载。\n\n\n\n#### Android 许可服务\n\nAndroid 应用的构建方式不幸地使其成为盗版的目标。恶意用户可能复制\
  \ Android 应用并将其分发给其他设备。那么，你如何确保未购买应用的用户无法运行它呢？Android 团队创建了名为许可验证库（`LVL`）的工具来满足这一需求。其工作原理如下。\n\
  \n如果你的应用是通过 Android Market 下载的，那么设备上必定存在 Android Market 应用的副本。此外，Android Market\
  \ 应用拥有更高权限，能够读取设备的某些值，例如用户的 Google 账户名称、`IMSI` 以及其他信息。自 Android 1.5 版本起，Android\
  \ Market 应用经过修改，能够响应来自应用的许可验证请求。你的应用调用 `LVL`，`LVL` 与 Android Market 应用通信，Android\
  \ Market 应用再与 Google 服务器通信，最终你的应用会收到一个响应，表明该设备上的此用户是否获得使用你应用的许可。你可以根据自己的设置来决定在网络不可用时采取何种操作。关于实现\
  \ `LVL` 过程的完整描述，请参见 [`developer.android.com/guide/publishing/licensing.html`](http://developer.android.com/guide/publishing/licensing.html)。\n\
  \n不过需要注意的一点是，`LVL` 机制可能被破解。如果有人能够获取你应用的 `apk` 文件，他们可以反编译应用，并在知道从何处查找 `LVL` 调用的返回值后对其进行修补。如果你采用明显的模式，即在收到\
  \ `LVL` 响应后使用 `switch` 语句，根据返回码跳转到相应逻辑，那么黑客只需强制返回一个成功码，就能掌控你的应用。因此，Android 团队强烈建议你对应用进行混淆处理，以隐藏检查\
  \ `LVL` 返回码的那部分代码。正如你所想，这相当复杂。\n\n在 Android 2.3 中，Google 以 `ProGuard` 功能的形式提供了一些混淆支持。当你将应用的目标构建版本设置为\
  \ 2.3 或更高版本时，应用会自动获得一个 `proguard.cfg` 文件。通过使用此文件配置 `ProGuard`，你可以指示 `ADT` 在构建 `apk`\
  \ 文件的正式版本时混淆代码。如果你使用 `ant` 进行构建，也可以配置 `ant` 使用 `ProGuard` 进行混淆。要开启混淆，你需要在应用的 `default.properties`\
  \ 文件中将 `proguard.config` 属性设置为 `proguard.cfg` 文件的位置。当 `ProGuard` 执行其任务时，你会得到与 `apk`\
  \ 文件一同生成的 `mapping.txt` 文件。请保存好此文件，因为你将需要它来反混淆来自应用的堆栈跟踪。\n\n#### 准备上传你的 .apk 文件\n\
  \n要使测试完成的应用准备上传，即创建要上传的 `.apk` 文件，你需要执行以下步骤（所有这些步骤在第 10 章中均有介绍）：\n\n1.  创建（如果尚未创建）一个用于签署应用的正式版证书。\n\
  2.  如果你使用了地图，请在 `AndroidManifest.xml` 中将地图 API 密钥替换为你的正式版地图 API 密钥。如果忘记执行此操作，你的所有用户都将无法查看地图。\n\
  3.  在 Eclipse 中右键点击你的项目，选择 Android Tools → Export Unsigned Application Package，然后选择一个合适的文件名来导出应用。建议给这个文件起一个临时名称，因为在第\
  \ 5 步运行 `zipalign` 时，你需要提供一个输出文件名，那应该是你正式版 `.apk` 文件的名称。\n4.  在你的新 `.apk` 文件上运行\
  \ `jarsigner`，使用第 1 步中的正式版证书进行签名。\n5.  在你的新 `.apk` 文件上运行 `zipalign`，将任何未压缩的数据调整到合适的内存边界，以提升运行时的性能。这是你为应用\
  \ `.apk` 文件提供最终文件名的步骤。\n6.  Android 现在在 Eclipse 中提供了 Export Signed Application Package\
  \ 选项，它通过向导来执行步骤 3、4 和 5。\n\n\n\n### 上传你的应用\n\n上传操作本身很简单，但需要做一些准备工作。在开始上传之前，你需要准备好一些材料，并做出一些决定。本节将涵盖这些准备工作与决策。当你准备好一切后，请前往开发者控制台并选择“上传应用程序”。系统会提示你提供大量关于你的应用的信息，市场会对你的应用及这些信息进行一些处理，之后你的应用就可以发布到市场上了。\n\
  \n前一节介绍了如何准备用于上传的应用`.apk`文件。要让你的应用对买家有吸引力，你需要做一些营销工作。你需要提供优秀的功能描述，以及精美的图片，以便买家了解他们可能会下载什么。\n\
  \n上传应用时，首先被要求提供的内容之一就是截图。捕获应用截图最简单的方法是使用 DDMS。启动 Eclipse，在模拟器或真实设备上运行你的应用，然后将 Eclipse\
  \ 透视图切换到 DDMS 和设备视图。在设备视图中，选中运行你应用的设备，然后点击屏幕捕获按钮（它看起来像右上角的一幅小画），或从“视图”菜单中选择它。如果在保存时有选择，请选择\
  \ 24 位色。Android Market 会将你的截图转换为压缩的 JPEG；从 24 位色开始处理的效果会优于 8 位色。选择的截图应能让你的应用在同类中脱颖而出，同时也要能展示其重要功能。你必须提供至少两张截图，最多可提供八张。\n\
  \n接下来是高分辨率应用图标。它可以与你的应用图标设计完全相同，但 Android Market 要求是 512x512 像素的图标图片。这是必填项。\n\n\
  你也可以提供推广图片，但其尺寸比截图要小。尽管这张图片是可选的，但附加上它是个好主意。你永远不知道这张图片何时会被展示；如果没有，你也不知道那个位置会显示什么（如果有东西显示的话）。推广图片出现的一个地方，是在\
  \ Android Market 中你应用的“详情”页面顶部。\n\n功能图片是另一个可选字段，尺寸为 1024x500 像素。这张图片会用在 Android\
  \ Market 的“精选”区域，所以你应该让它看起来非常出色。\n\n最后一项与应用相关的图片是可选的视频，你可以将其放在 YouTube 上，并从你的 Android\
  \ Market 页面链接过去。\n\nAndroid Market 会要求提供关于你应用的文本信息以展示给买家，包括标题、描述性文本和推广文本。只有在你已经提供了推广图片的情况下，才能提供推广文本。文本可以多种语言提供，因为你可以选择将你的应用分发到全球各个国家。上面提到的图片只能向\
  \ Android Market 上传一次，所以如果你的截图在不同地区看起来不一样，你需要考虑其他方式（比如你自己的网站）让买家能够看到这些图片。这一点将来可能会改变。\n\
  \n如果你已经为用户编写了单独的用户许可协议（EULA），请在描述文本中提供一个链接，以便买家在下载你的应用前可以查看。考虑到买家很可能会使用搜索来查找应用，请务必在文本中包含恰当的词语，以最大化与应用功能相关的搜索命中率。最后，在文本中加入一句简短的提示，建议用户在遇到问题时给你发邮件，这是值得的。没有这个简单的提示，用户更倾向于留下负面评论，而与受影响的用户通过电子邮件沟通相比，负面评论会极大地限制你排查和解决问题的能力。\n\
  \n前面提到的用户评论机制的一个缺点是，它不区分你的应用版本。如果版本 1 收到了负面评论，而你发布了所有问题都已修复的版本 2，那么版本 1 的评论仍然存在，买家可能没有意识到这些评论不适用于新版本。在发布应用的新版本时，应用评分（星级）也不会重置。部分出于这个原因，谷歌开始提供一个“近期变更”文本字段，你可以在其中描述此版本的新内容。你可以在这里说明某个问题已被修复，或者介绍新功能是什么。\n\
  \n还有一个独立的“推广文本”字段，只有 80 个字符。当你的应用在 Android Market 的列表顶部展示时，显示的是推广图片和推广文本。提供这些内容绝对是个好主意。\n\
  \n在编写应用文本时，你的责任之一就是披露所需的权限。这些权限与你在应用`AndroidManifest.xml`文件中的`<uses-permission>`标签里设置的权限相同。当用户将你的应用下载到他们的设备上时，\
  \ Android 会检查`AndroidManifest.xml`文件，并在完成安装前向用户询问所有使用权限要求。所以你最好事先披露这些信息。否则，你可能会面临因用户发现某个应用要求他们不愿授予的权限而感到惊讶，从而给出负面评论的风险。更不用说退款了，这也会影响你的开发者综合评分。与权限类似，如果你的应用需要特定类型的屏幕、摄像头或其他设备功能，也应该在你的文本描述中予以披露。最佳实践是，你不仅要披露你的应用需要哪些权限和功能，还要说明你的应用将用它们来做什么。你应该预先回答用户的问题：为什么这个应用需要\
  \ X？\n\n上传应用时，你需要选择应用类型和类别。这些值会随时间变化，我们在此不一一列举，但你很容易通过“上传应用程序”界面看到它们。\n\n接下来，你需要为你的应用定价。默认价格为“免费”，如果你想为你的应用收费，则必须先在\
  \ Google Checkout 中设置一个商家账户。为应用设定合适的价格是件棘手的事情，除非你拥有一些复杂的市场调研能力，即使那样，也依然棘手。定价过高可能会让用户望而却步，并且你会面临因用户觉得价格不值而导致退款的风险。定价过低也可能让用户望而却步，因为他们可能认为这是一个廉价的应用。\n\
  \nAndroid Market 提供了一个在应用上传时设置复制保护的选项。市场会帮你应用这个复制保护，但请注意，复制保护会使你的应用占用更多设备内存。它也不是万无一失的，无法保证你的应用不会被从设备上复制出来。由于这种复制保护方法正在被弃用，你很可能需要考虑其他额外的或替代的方法来防止你的应用被盗版，例如前面提到的\
  \ Android 许可服务。\n\n\n\n2010 年底，谷歌推出了一项应用评级方案。这一方案旨在让消费者了解某款应用对特定年龄段的适宜性。遗憾的是，其中一半的年龄分级都带有“青少年”字样。评级分为：全年龄段、青少年前期、青少年和成熟级。选择正确的级别取决于你应用中的内容及其内容的数量。谷歌对位置感知以及发布或公开位置信息有相关规定。最好亲自阅读这里的规则：[www.google.com/support/androidmarket/bin/answer.py?hl=en&answer=188189](http://www.google.com/support/androidmarket/bin/answer.py?hl=en&answer=188189)。\n\
  \n在提交应用之前，最后要做的决定之一是选择你的应用对哪些地区和运营商可见。选择“全部”意味着你的应用在全球范围内均可使用。然而，你可能希望按地域或运营商来限制分发。根据你应用的功能，你可能需要按地区限制分发，以遵守美国出口法律。如果你的应用与某些运营商的设备或政策存在兼容性问题，你也可以选择按运营商进行限制。要查看运营商，请点击某个国家/地区的链接，该国家/地区支持的运营商列表就会显示出来，你可以从中选择你想要的。选择“全部”也意味着谷歌后续新增的任何地区或运营商，都会自动看到你的应用，无需你做任何额外操作。\n\
  \n尽管你的开发者资料中包含了联系信息，但在上传每个应用时，你仍可以设置不同的联系信息。市场要求提供与此应用相关的网站、电子邮件地址和电话号码作为联系方式。你至少需要提供其中一项，以便买家获得支持，但无需三项都提供。最好不要在这里使用你的个人电子邮件地址，就像你可能也不想公开个人电话号码一样。当你通过销售应用赚取数百万美元时，你会希望别人来接收和处理用户的邮件。提前设置一个应用支持类的电子邮件地址，可以轻松地将支持邮件与个人邮件区分开来。\n\
  \n做完所有这些决定后，你必须宣誓你的应用符合安卓内容指南（基本上就是不能有不良内容），并再次宣誓该软件可允许从美国出口。适用美国出口法律是因为谷歌的服务器位于美国境内，即使你身在美国境外，甚至你和你客户都在美国境外也是如此。请记住，你始终可以选择通过其他渠道分发你的应用。当所有信息都填写完毕，并且图形文件上传后，继续操作，点击“保存”按钮。这将为你的应用做好一切准备，使其能够“上线”。\n\
  \n然后，你可以通过点击“发布”按钮来发布你的应用。安卓市场会对你的应用进行一些检查，例如检查应用证书的到期日期。如果一切顺利，你的应用就可以下载了。恭喜！\n\
  \n## 安卓市场的用户体验\n\n安卓市场在设备上已经存在了一段时间，截至 2011 年 2 月，它已可以通过互联网访问。除了为应用在市场中提供优质的文本和图形描述外，开发者无法控制安卓市场的运作方式。因此，用户体验很大程度上取决于谷歌。在设备上，用户可以通过关键词搜索，查看热门下载应用（包括免费和付费）、精选应用、新应用，或按类别浏览。一旦找到他们想要的应用，只需选中它，就会弹出一个应用详情界面，允许他们安装或购买。如果选择购买，用户将跳转至谷歌结账处理交易的资金部分。下载完成后，新应用会出现在所有其他应用之中。\n\
  \n在安卓市场的网页端（[`market.android.com`](http://market.android.com)），用户界面看起来与设备端大致相同，只是比大多数设备屏幕大得多。一个不同之处在于，基于网页的安卓市场要求用户登录其谷歌账户才能使用。这允许谷歌将你在安卓市场网页端的体验与实际设备关联起来。这意味着两件事：使用网页端时，安卓市场能知道你的设备上已安装了哪些应用；当你在安卓市场网页端进行购买时，下载链接会被发送到你的设备，而不是你当前浏览网页所使用的电脑上。\n\
  \n安卓市场提供了一个查看已下载应用的“我的下载”选项。此区域包含所有已安装的应用，以及你购买过的任何应用，即使你已经删除了它们（也许你只是为了腾出空间安装其他应用而删除了它们）。这意味着你可以从手机上删除你付费购买的应用，稍后重新安装它，而无需再次购买。当然，如果你选择了退款，该应用将不会出现在“我的下载”中。此外，从设备上删除的免费应用也不会出现在“我的下载”中。“我的下载”中的应用列表与你用于该设备的谷歌账户绑定。这意味着你可以更换一台新设备，但仍然能够访问所有你已付费的应用。但请注意，由于你可能在谷歌拥有多个身份，你必须使用与之前完全相同的身份，才能在新设备上获取你的应用。当查看“我的下载”中的应用时，任何有可用升级的应用都会提示你，并允许你进行升级。\n\
  \n安卓市场会对用户可见的应用进行过滤。它通过多种方式来实现这一点。由于谷歌在某些国家涉及商业法律问题，这些国家的用户只能看到免费应用。谷歌正在努力克服商业障碍，以便所有付费应用都能在全球范围内可用。在那一天到来之前，某些国家的用户将无法访问付费应用。运行旧版本安卓系统的设备用户，将无法看到需要更新版本安卓\
  \ SDK 的应用。设备配置与应用要求（通过在`AndroidManifest.xml`文件中使用`<uses-feature>`标签声明）不兼容的用户，将无法看到这些应用。例如，不支持小屏幕的应用，使用小屏幕设备的用户在安卓市场中就看不到。这种过滤的主要目的是保护用户，避免他们下载那些无法在其设备上正常运行的应用。\n\
  \n\n\n如果你从其他国家在 Android Market 中购买应用，交易可能涉及货币兑换，并因此产生额外费用。除非卖家以你的本地货币标价，否则你实际上是通过\
  \ Google Checkout 在卖家所在国家进行购买。Android Market 会显示一个近似金额，但实际费用可能因交易时间和支付处理方的不同而有所变化。买家可能会发现账户中有一笔小额待处理交易（例如\
  \ 1 美元）。这是 Google 为确保提供的支付信息正确而进行的操作，这笔待处理费用实际上并不会扣除。\n\n有一些镜像 Android Market 的网站可供使用。购物者无需拥有设备，即可通过网络搜索、浏览分类并了解\
  \ Android Market 中的应用。这绕过了 Android Market 根据你的设备配置和位置进行的过滤。然而，这并不能将应用安装到你的设备上。此类镜像网站的示例包括\
  \ [`www.cyrket.com,www.androlib.com`](http://www.cyrket.com,www.androlib.com) 和\
  \ [`www.androidzoom.com`](http://www.androidzoom.com)。\n\n## 超越 Android Market\n\
  \nAndroid Market 并非唯一的选择。你完全不必被迫使用 Android Market。你应该考虑利用其他分发渠道，这不仅能让你的应用覆盖更多国家和用户，还能利用其他支付处理方式和盈利机会。\n\
  \n存在完全独立于 Android Market 的 Android 应用商店。例如 [`www.andappstore.com`](http://www.andappstore.com)、[`http://slideme.org`](http://slideme.org)、[`www.getjar.com`](http://www.getjar.com)\
  \ 和 [`www.androidgear.com`](http://www.androidgear.com)。亚马逊也正在推出一个 Android 应用商店。在这些网站上，你可以搜索、浏览、了解应用，并直接从设备或通过网页浏览器下载应用。这些网站不必遵守\
  \ Google 的规则，包括付费应用的交易费用和支付方式。在这些独立网站上，你可以使用 PayPal 和其他支付处理方购买应用。这些网站也不受地理位置或设备配置的限制。其中一些网站提供可安装的\
  \ Android 客户端，或在某些情况下，客户端可能已预装在设备上。用户只需在设备上启动浏览器，找到他们想通过网站下载的应用；当文件保存到设备时，Android\
  \ 会知道如何处理它。也就是说，下载的 `.apk` 文件会被视为 Android 应用程序。如果你在浏览器的下载历史记录中（注意，不要与之前提到的“我的下载”混淆）点击它，系统将提示你是否要安装它。这种自由意味着你可以建立自己向用户分发\
  \ Android 应用的方法，甚至可以通过自己的网站并使用自己的支付方式。不过，你仍然需要处理必要的销售税征收并向相应税务机关缴纳。\n\n虽然不受 Google\
  \ 规则限制，但这些替代的应用分发方式可能无法提供与 Android Market 相同的买家保护。可能会出现在替代市场上购买的应用无法在买家设备上运行的情况。如果应用从设备上丢失，或者用户更换新设备需要转移应用，买家可能还需要自行负责创建备份。\n\
  \n这些其他市场允许你通过每个应用的销售获利，这与你在 Android Market 的情况非常相似。在这些其他市场中，你还可以实现替代的支付机制。当然，你也可以像我们之前描述的那样植入广告并以此盈利。你还可以在应用内嵌入其他支付机制。例如，PayPal\
  \ 为 Android 应用推出了一个支付库（参见 [`www.x.com`](http://www.x.com)）。通过它，你可以让用户直接从你的应用内购买附加组件、内容或升级。他们也可以进行捐赠。你可以使用\
  \ PayPal 实现一个移动商店进行结账。\n\n请记住，Google 并不限制开发者同时在 Android Market 和其他多个市场销售他们的应用。因此，请考虑所有选项，以便你的努力获得最大回报。\n\
  \n### 总结\n\n现在，你已经准备好带着你的 Android 应用去征服世界了！我们向你展示了如何做好准备，如何准备好你的应用，如何发布，以及用户将如何找到、下载并使用你的应用。\n\
  \n"
