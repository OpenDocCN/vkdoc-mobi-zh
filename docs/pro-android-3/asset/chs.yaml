  \ 在`MotionEvent`对象中接收到`ACTION_DOWN`事件，并将其传递给`MainActivity`类中的`onTouch()`方法。我们的`onTouch()`方法将信息记录到\
  \ LogCat，并返回`false`。这告诉 Android 我们的`onTouch()`方法没有消费该事件，因此 Android 会寻找下一个要调用的方法，在本例中是我们`FalseButton`类中重写的`onTouchEvent()`方法。由于`FalseButton`是`BooleanButton`类的扩展，请查阅`BooleanButton.java`中的`onTouchEvent()`方法来查看代码。在`onTouchEvent()`方法中，我们再次将信息写入\
  \ LogCat，调用了父类的`onTouchEvent()`方法，然后也返回了`false`。请注意，LogCat 中的位置信息与之前完全相同。这是意料之中的，因为我们仍在同一个`View`对象，即`FalseButton`中。我们看到父类希望从`onTouchEvent()`返回`true`，并且我们能理解原因。如果你查看\
  \ UI 中的按钮，它应该与“返回 true”按钮颜色不同。我们的“返回 false”按钮现在看起来像是处于按下过程中的状态。也就是说，它看起来像一个已被按下但尚未释放的按钮。我们的自定义方法返回了`false`而不是`true`。因为我们再次通过返回`false`告诉\
  \ Android 我们没有消费此事件，所以 Android 从未将`ACTION_UP`事件发送到我们的按钮，因此我们的按钮不知道手指已从触摸屏上抬起。因此，我们的按钮仍处于按下状态。如果我们像父类希望的那样返回了`true`，我们最终会收到`ACTION_UP`事件，从而可以将颜色改回正常的按钮颜色。总结一下：每次我们从一个\
  \ UI 对象为接收到的`MotionEvent`对象返回`false`时，Android 就会停止向该 UI 对象发送`MotionEvent`对象，并继续寻找另一个\
  \ UI 对象来消费我们的`MotionEvent`对象。\n\n您可能已经意识到，当我们触摸“返回 true”按钮时，按钮的颜色并没有改变。这是为什么呢？嗯，我们的`onTouch()`方法在任何实际按钮方法被调用之前就被调用了，并且`onTouch()`返回了`true`，因此\
  \ Android 根本没有去调用“返回 true”按钮的`onTouchEvent()`方法。如果您在`onTouch()`方法中返回`true`之前添加一行`v.onTouchEvent(event);`，您将看到按钮颜色发生变化。您还会在\
  \ LogCat 中看到更多日志行，因为我们的`onTouchEvent()`方法也在向 LogCat 写入信息。\n\n让我们继续查看 LogCat 输出。现在，Android\
  \ 两次尝试为`ACTION_DOWN`事件寻找消费者都失败了，于是它进入应用程序中下一个可能接收事件的`View`，在本例中是按钮下方的布局。我们将顶层布局命名为`trueLayoutTop`，可以看到它接收到了`ACTION_DOWN`事件。\n\
  \n请注意，我们的`onTouch()`方法再次被调用，但现在传入的是布局视图而非按钮视图。传递给`trueLayoutTop`的`onTouch()`的`MotionEvent`对象，除位置的\
  \ Y 坐标外，其他所有内容（包括时间戳）都与之前相同。Y 坐标从按钮的 44.281494 变为了布局的 116.281494。这是合理的，因为按钮并不位于布局的左上角，它位于“返回\
  \ true”按钮的下方。因此，相对于布局的触摸点 Y 坐标，大于相对于同一按钮的触摸点 Y 坐标；该触摸点距离布局顶部边缘的距离，大于距离按钮顶部边缘的距离。由于`trueLayoutTop`的`onTouch()`返回了`true`，Android\
  \ 会将剩余的触摸事件发送给该布局，于是我们看到对应`ACTION_MOVE`和`ACTION_UP`事件的日志记录。请再次触摸顶部的“返回 false”按钮，并注意出现了相同的一组日志记录。也就是说，为`falseBtnTop`调用了`onTouch()`，为`falseBtnTop`调用了`onTouchEvent()`，然后剩余的触摸事件为`trueLayoutTop`调用了`onTouch()`。Android\
  \ 一次只会停止向某个按钮发送单个触摸序列的事件。对于一个新的触摸事件序列，Android 会再次向该按钮发送事件，除非被调用的方法再次返回`false`——在我们的示例应用程序中，它确实仍然会返回`false`。\n\
  \n现在，将您的手指触摸到顶部布局上，但不要触及任何一个按钮，然后在屏幕上稍微拖动手指，再抬起手指离开触摸屏（如果您使用的是模拟器，只需用鼠标执行类似操作即可）。请注意\
  \ LogCat 中会出现一连串日志消息，其中第一条记录的动作是`ACTION_DOWN`，然后是许多`ACTION_MOVE`事件，最后是一个`ACTION_UP`事件。\n\
  \n现在，触摸顶部的“返回 true”按钮，在手指未抬起之前，在屏幕上拖动手指，然后将其抬起。清单 25-7 显示了 LogCat 中的一些新信息。\n\n**清单\
