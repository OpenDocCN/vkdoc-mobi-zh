  \ 方法，但你也可以调用构造函数 `MediaPlayer(Context context, int resourceId)`。使用静态 `create()`\
  \ 方法是更优选的，因为它们隐藏了 `MediaPlayer` 的创建过程，这包括为你调用 `prepare()` 方法。然而，正如你很快就会看到的那样，有时你在两者之间别无选择——如果你的媒体内容无法通过资源\
  \ ID 或 URL 定位，你将不得不实例化默认构造函数。\n\n\n\n```markdown\n#### 理解 `setDataSource` 方法\n\n\
  在清单 19–2 中，我们调用了`create()`方法从原始资源加载音频文件。使用这种方法，你无需调用`setDataSource()`。或者，如果你使用默认构造函数自行实例化`MediaPlayer`，或者你的媒体内容无法通过资源\
  \ ID 或 URL 访问，则需要调用`setDataSource()`。\n\n`setDataSource()`方法有多个重载版本，可以针对特定需求自定义数据源。例如，清单\
  \ 19–3 展示了如何使用`FileDescriptor`从原始资源加载音频文件。\n\n**清单 19–3.** *使用 `FileDescriptor`\
  \ 设置 `MediaPlayer` 的数据源*\n\n```java\nprivate void playLocalAudio_UsingDescriptor()\
  \ throws Exception {\n    AssetFileDescriptor fileDesc = getResources().openRawResourceFd(\n\
  \            R.raw.music_file);\n    if (fileDesc != null) {\n        mediaPlayer\
  \ = new MediaPlayer();\n        mediaPlayer.setDataSource(fileDesc.getFileDescriptor(),\
  \ fileDesc\n                .getStartOffset(), fileDesc.getLength());\n        fileDesc.close();\n\
  \        mediaPlayer.prepare();\n        mediaPlayer.start();\n    }\n}\n```\n\n\
  清单 19–3 假设该代码在 Activity 的上下文中运行。如代码所示，你调用`getResources()`方法获取应用的资源，然后使用`openRawResourceFd()`方法获取`/res/raw`文件夹中音频文件的文件描述符。接着，使用`AssetFileDescriptor`、开始播放的起始位置和结束位置调用`setDataSource()`方法。如果你想播放音频文件的特定部分，也可以使用此版本的`setDataSource()`。如果你始终希望播放整个文件，可以调用更简单的版本`setDataSource(FileDescriptor\
  \ desc)`，该版本不需要初始偏移量和长度。\n\n如果你想要提供位于应用`/data`目录中的媒体文件，使用带有`FileDescriptor`的`setDataSource()`方法也会很方便。出于安全原因，媒体播放器无权访问应用的`/data`目录，但你的应用可以打开该文件，然后将（已打开的）`FileDescriptor`提供给`setDataSource()`。需要注意的是，应用的`/data`目录位于`/data/data/`*`APP_PACKAGE_NAME`*`/`下的文件和文件夹集合中。你可以通过调用`Context`类中的适当方法来访问此目录，而不是硬编码路径。例如，你可以在`Context`上调用`getFilesDir()`来获取当前应用的文件目录。目前，该路径看起来像这样：`/data/data/`*`APP_PACKAGE_NAME`*`/files`。类似地，你可以调用`getCacheDir()`来获取应用的缓存目录。你的应用对这些文件夹中的内容拥有读写权限，因此你可以动态创建文件并将其提供给播放器。最后，如果像清单\
  \ 19–3 那样使用`FileDescriptor`，请确保在调用`setDataSource()`后关闭句柄。\n\n请留意，应用的`/data`目录与其`/res/raw`文件夹有很大不同。`/res/raw`文件夹是`.apk`文件的物理组成部分，并且是静态的——也就是说，你无法动态修改`.apk`文件。相比之下，`/data`目录的内容是动态的。\n\
  \n还有一种音频内容来源需要讨论：SD 卡。之前我们展示了如何将内容放到 SD 卡上。与`MediaPlayer`一起使用它非常简单。在上面的示例中，我们通过传递\
  \ MP3 文件的 URL 来调用`setDataSource()`，以访问互联网上的内容。如果你的音频文件在 SD 卡上，你可以使用相同的`setDataSource()`方法，但将路径参数改为\
  \ SD 卡上音频文件的路径。例如，如果你将 MP3 文件放到标准 Music 目录中，并将其命名为`music_file.mp3`，你可以修改`AUDIO_PATH`变量，它就会播放，如下所示：\n\
  \n```java\nstatic final String AUDIO_PATH =\n    Environment.getExternalStoragePublicDirectory(\n\
  \        Environment.DIRECTORY_MUSIC) +\n        \"/music_file.mp3\";\n```\n```\n\
  \n\n\n#### 使用 SoundPool 实现多轨道同步播放\n\n`MediaPlayer` 是我们媒体工具箱中的核心工具，但它一次只能处理一个音频或视频文件。若想同时播放多个音频轨道该怎么办？一种方法是创建多个`MediaPlayer`实例并同步控制。如果只需播放少量音效且追求快速响应，Android\
  \ 提供了`SoundPool`类来帮助实现。在底层实现中，`SoundPool`虽然使用了`MediaPlayer`，但我们只能通过`SoundPool`的\
  \ API 进行操作，无法直接调用`MediaPlayer`的 API。\n\n`MediaPlayer`与`SoundPool`的另一区别在于：`SoundPool`仅支持本地媒体文件。也就是说，你可以从资源文件、通过文件描述符访问的文件或通过路径名访问的文件中加载音频。此外，`SoundPool`还提供多项便利功能，例如循环播放音频轨道、单独暂停/恢复某个音频轨道、或者统一暂停/恢复所有音频轨道。\n\
  \n不过`SoundPool`也存在局限性。它管理的所有轨道共享一个音频缓冲区，且该缓冲区容量不大——实际上只有 1MB。当你看到仅几 KB 大小的 mp3 文件时，这个容量似乎很大。但`SoundPool`会在内存中扩展音频数据以实现快速流畅的播放。音频文件在内存中的大小取决于比特率、声道数（立体声/单声道）、采样率和音频时长。如果加载音频时遇到问题，可以尝试调整源音频文件的这些参数来减小内存占用。\n\
  \n接下来我们将演示一个加载并播放动物叫声的示例应用。其中蟋蟀声作为背景音持续播放，其他声音则按不同时间间隔播放。有时只能听到蟋蟀声，有时则会同时听到多种动物的叫声。我们还在用户界面添加了暂停与恢复按钮。代码清单\
  \ 19-4 展示了布局 XML 文件和 Activity 的 Java 代码。建议从我们的网站下载完整代码和音效文件，本章末的\"参考资料\"部分提供了可下载源码的获取方式。\n\
  \n#### 代码清单 19-4：使用`SoundPool`播放音频\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
  utf-8\"?>\n<LinearLayout\n    android:orientation=\"vertical\"\n    android:layout_width=\"\
  fill_parent\"  android:layout_height=\"fill_parent\"\n    >\n<ToggleButton android:id=\"\
  @+id/button\"\n    android:textOn=\"暂停\"  android:textOff=\"继续\"\n    android:layout_width=\"\
  wrap_content\"  android:layout_height=\"wrap_content\"\n    android:onClick=\"doClick\"\
  \ android:checked=\"true\" />\n</LinearLayout>\n```\n\n```java\n// 本文件为 MainActivity.java\n\
  import java.io.IOException;\nimport android.app.Activity;\nimport android.content.Context;\n\
  import android.content.res.AssetFileDescriptor;\nimport android.media.AudioManager;\n\
  import android.media.SoundPool;\nimport android.os.Bundle;\nimport android.os.Handler;\n\
  import android.util.Log;\nimport android.view.View;\nimport android.widget.ToggleButton;\n\
  \npublic class MainActivity extends Activity implements SoundPool.OnLoadCompleteListener\
  \ {\n    private static final int SRC_QUALITY = 0;\n    private static final int\
  \ PRIORITY = 1;\n    private SoundPool soundPool = null;\n    private AudioManager\
  \ aMgr;\n\n    private int sid_background;\n    private int sid_roar;\n    private\
  \ int sid_bark;\n    private int sid_chimp;\n    private int sid_rooster;\n\n  \
  \  @Override\n    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n    }\n\n    @Override\n    protected void\
  \ onResume() {\n        soundPool = new SoundPool(5, AudioManager.STREAM_MUSIC,\n\
  \                SRC_QUALITY);\n        soundPool.setOnLoadCompleteListener(this);\n\
  \n        aMgr =\n            (AudioManager)this.getSystemService(Context.AUDIO_SERVICE);\n\
  \n    sid_background = soundPool.load(this, R.raw.crickets, PRIORITY);\n\n    sid_chimp\
  \ = soundPool.load(this, R.raw.chimp, PRIORITY);\n    sid_rooster = soundPool.load(this,\
  \ R.raw.rooster, PRIORITY);\n    sid_roar = soundPool.load(this, R.raw.roar, PRIORITY);\n\
  \n    try {\n        AssetFileDescriptor afd =\n                    this.getAssets().openFd(\"\
  dogbark.mp3\");\n        sid_bark = soundPool.load(afd.getFileDescriptor(),\n  \
  \                      0, afd.getLength(), PRIORITY);\n        afd.close();\n  \
  \      } catch (IOException e) {\n            e.printStackTrace();\n        }\n\
  \        //sid_bark = soundPool.load(\"/mnt/sdcard/dogbark.mp3\", PRIORITY);\n\n\
  \        super.onResume();\n    }\n\n    public void doClick(View view) {\n    \
  \    switch(view.getId()) {\n        case R.id.button:\n            if(((ToggleButton)view).isChecked())\
  \ {\nsoundPool.autoResume();\n            }\n            else {\n              \
  \  soundPool.autoPause();\n            }\n            break;\n        }\n    }\n\
  \n    @Override\n    protected void onPause() {\n        soundPool.release();\n\
  \        soundPool = null;\n        super.onPause();\n    }\n\n    @Override\n \
  \   public void onLoadComplete(SoundPool sPool, int sid, int status) {\n       \
  \ Log.v(\"soundPool\", \"sid \" + sid + \" loaded with status \" +\n           \
  \     status);\n\n        final float currentVolume =\n            ((float)aMgr.getStreamVolume(AudioManager.STREAM_MUSIC))\
  \ /\n            ((float)aMgr.getStreamMaxVolume(AudioManager.STREAM_MUSIC));\n\n\
  \        if(status != 0)\n            return;\n        if(sid == sid_background)\
  \ {\n            if(sPool.play(sid, currentVolume, currentVolume,\n            \
  \        PRIORITY, -1, 1.0f) == 0)\n                Log.v(\"soundPool\", \"Failed\
  \ to start sound\");\n        } else if(sid == sid_chimp) {\n            queueSound(sid,\
  \ 5000, currentVolume);\n        } else if(sid == sid_rooster) {\n            queueSound(sid,\
  \ 6000, currentVolume);\n        } else if(sid == sid_roar) {\n            queueSound(sid,\
  \ 12000, currentVolume);\n        } else if(sid == sid_bark) {\n            queueSound(sid,\
  \ 7000, currentVolume);\n        }\n    }\n\n    private void queueSound(final int\
  \ sid, final long delay,\n        final float volume)\n    {\n        new Handler().postDelayed(new\
  \ Runnable() {\n            @Override\n            public void run() {\n       \
  \         if(soundPool == null) return;\n                if(soundPool.play(sid,\
  \ volume, volume,\n                        PRIORITY, 0, 1.0f) == 0)\n          \
  \          Log.v(\"soundPool\", \"Failed to start sound (\" + sid +\n          \
  \                \")\");\n                queueSound(sid, delay, volume);\n    \
  \        }}, delay);\n    }\n}\n```\n\n本示例的结构相当清晰。用户界面包含一个`ToggleButton`，用于暂停和恢复活动的音频流。应用启动时，我们创建`SoundPool`并加载音频样本。样本加载完成后开始播放：蟋蟀声会无限循环，其他样本则在延迟后播放，并按照相同延迟循环播放。通过设置不同的延迟时间，我们得以营造出多层音效交织的随机感。\n\
  \n创建`SoundPool`需要三个参数。\n\n\n#### 使用 SoundPool 播放音频\n\n- 第一个参数是 `SoundPool` 同时播放的最大样本数。这不是\
  \ `SoundPool` 可以容纳的样本数量。\n- 第二个参数是样本将在哪个音频流上播放。典型值是 `AudioManager.STREAM_MUSIC`，但\
  \ `SoundPool` 也可用于闹钟或铃声。有关音频流的完整列表，请参见 `AudioManager` 参考页面。\n- 创建 `SoundPool` 时，`SRC_QUALITY`\
  \ 值应设置为 0。\n\n代码演示了 `SoundPool` 的几种不同的 `load()` 方法。最基本的方法是从 `/res/raw` 加载音频文件作为资源。我们对前四个音频文件使用此方法。然后，我们展示如何从应用程序的\
  \ `/assets` 目录加载音频文件。这个 `load()` 方法还接受指定要加载音频的偏移量和长度的参数。这允许我们使用一个包含多个音频样本的单个文件，只提取我们想要使用的部分。最后，我们在注释中展示了如何从\
  \ SD 卡访问音频文件。在 Android 3.0 之前，`PRIORITY` 参数应为 1。\n\n在我们的示例中，我们选择使用 Android 2.2 中引入的一些特性，特别是用于\
  \ Activity 的 `onLoadCompleteListener` 接口，以及按钮回调中的 `autoPause()` 和 `autoResume()`\
  \ 方法。\n\n将声音样本加载到 `SoundPool` 时，我们必须等到它们正确加载后才能开始播放。在我们的 `onLoadComplete()` 回调中，我们检查加载的状态，并根据是哪个声音，设置播放。如果声音是蟋蟀声，我们启用循环播放（第五个参数的值为\
  \ -1）。对于其他声音，我们将声音排队，在一小段时间后播放。时间值以毫秒为单位。请注意音量的设置。Android 提供了 `AudioManager` 来让我们知道当前的音量设置。我们还从\
  \ `AudioManager` 获取最大音量设置，以便计算一个介于 0 和 1（浮点数）之间的音量值，用于 `play()` 方法。`play()` 方法实际上为左右声道分别接受一个音量值，但我们只是将两者都设置为当前音量。再次强调，`PRIORITY`\
  \ 应设置为 1。`play()` 方法的最后一个参数用于设置播放速率。该值应在 0.5 到 2.0 之间，1.0 为正常速率。\n\n我们的 `queueSound()`\
  \ 方法使用 `Handler` 在将来设置一个事件。我们的 `Runnable` 将在延迟时间过后运行。我们检查确保仍然有一个 `SoundPool` 可以播放，然后播放一次声音，并安排在相同的间隔后再次播放相同的声音。因为我们使用不同的声音\
  \ ID 和不同的延迟调用 `queueSound()`，所以效果是动物声音的随机播放。\n\n当你运行此示例时，你会听到蟋蟀、黑猩猩、公鸡、狗和咆哮声（我们认为是一只熊）。蟋蟀持续鸣叫，而其他动物的声音则来去自如。`SoundPool`\
  \ 的一个好处是，它让我们可以同时播放多个声音，而无需我们做太多实际工作。此外，它对设备的压力也不大，因为声音在加载时已被解码，我们只需要将声音位元馈送到硬件即可。\n\
  \n如果你点击按钮，蟋蟀和当前正在播放的任何其他动物声音都将停止。但是，`autoPause()` 方法不会阻止新声音的播放。你会在几秒钟内再次听到动物声音（蟋蟀除外）。因为我们已经将声音排入未来的队列，所以我们仍然会听到这些声音。实际上，`SoundPool`\
  \ 没有办法立即并永久停止所有声音。你需要自行处理停止。只有当我们再次点击按钮恢复声音时，蟋蟀才会回来。但是，即使如此，我们可能已经失去了蟋蟀，因为如果同时播放的样本数量达到最大值，`SoundPool`\
  \ 会丢弃最旧的声音，为新声音腾出空间。\n\n#### 使用 JetPlayer 播放声音\n\n`SoundPool` 是一个不错的播放器，但内存限制可能使完成任务变得困难。当需要播放同步声音时，另一种选择是\
  \ `JetPlayer`。`JetPlayer` 专为游戏量身定制，是一个非常灵活的工具，可用于播放大量声音，并将这些声音与用户操作协调起来。这些声音是使用\
  \ MIDI（乐器数字接口缩写）定义的。\n\n`JetPlayer` 声音是使用特殊的 `JETCreator` 工具创建的。该工具位于 Android SDK\
  \ tools 目录下，但你还需要安装 Python 才能使用它。生成的 JET 文件可以读入你的应用程序，并设置声音进行播放。整个过程有些复杂，超出了本书的范围，因此我们将在本章末尾的“参考资料”部分为你提供更多信息。\n\
  \n#### 使用 AsyncPlayer 播放背景声音\n\n如果你只想播放一些音频，并且不想占用当前线程，那么 `AsyncPlayer` 可能正是你所需要的。音频源以\
  \ `Uri` 的形式传递给此类，因此音频文件可以是本地的，也可以是网络上的远程文件。此类会自动创建后台线程来处理获取音频和开始播放。因为它是异步的，所以你无法确切知道音频何时开始播放。你也不会知道它何时结束，甚至不知道它是否仍在播放。但是，你可以调用\
  \ `stop()` 来停止音频播放。如果在之前的音频播放完毕之前再次调用 `play()`，则之前的音频会立即停止，新的音频将在未来某个时间点，在所有设置和获取操作完成后开始播放。这是一个非常简单的类，它提供了一个自动的后台线程。列表\
  \ 19-5 展示了实现此功能的代码外观。\n\n**列表 19-5.** *使用 AsyncPlayer 播放音频*\n\n```\nprivate static\
  \ final String TAG = \"AsyncPlayerDemo\";\nprivate AsyncPlayer mAsync = null;\n\n\
  [ ... ]\n\nmAsync = new AsyncPlayer(TAG);\nmAsync.play(this, Uri.parse(\"file://\"\
  \ + \"/perry_ringtone.mp3\"),\n        false, AudioManager.STREAM_MUSIC);\n\n[ ...\
  \ ]\n\n@Override\nprotected void onPause() {\n    mAsync.stop();\n    super.onPause();\n\
  }\n```\n\n#### 使用 AudioTrack 进行低级音频播放\n\n到目前为止，我们一直在处理来自文件的音频，无论是本地文件还是远程文件。如果你想进入更低的级别，例如播放来自流的音频，你需要研究\
  \ `AudioTrack` 类。除了 `play()` 和 `pause()` 等常用方法外，`AudioTrack` 还提供了将字节写入音频硬件的方法。这个类为你提供了对音频播放的最大控制，但它比本章到目前为止讨论的音频类要复杂得多。我们将在本章稍后展示一个使用\
  \ `AudioRecord` 类的示例应用程序。`AudioRecord` 类与 `AudioTrack` 类非常相似，因此为了更好地理解 `AudioTrack`\
  \ 类，请参考稍后的 `AudioRecord` 示例。\n\n\n\n### 理解 `MediaPlayer` 的奇怪特性\n\n通常来说，`MediaPlayer`\
  \ 非常系统化，因此你需要按特定顺序调用操作才能正确初始化媒体播放器并为其播放做好准备。以下列表总结了使用媒体 API 的一些奇怪特性：\n\n- 一旦你设置了\
  \ `MediaPlayer` 的数据源，就无法轻易将其更改为另一个数据源——你必须创建一个新的 `MediaPlayer` 或调用 `reset()` 方法来重新初始化播放器的状态。\n\
  - 调用 `prepare()` 后，你可以调用 `getCurrentPosition()`、`getDuration()` 和 `isPlaying()`\
  \ 来获取播放器的当前状态。你还可以在调用 `prepare()` 之后调用 `setLooping()` 和 `setVolume()` 方法。\n- 调用\
  \ `start()` 后，你可以调用 `pause()`、`stop()` 和 `seekTo()`。\n- 每个 `MediaPlayer` 都会创建一个新线程，因此使用完媒体播放器后请务必调用\
  \ `release()` 方法。在视频播放时，`VideoView` 会自动处理这一点，但如果你决定使用 `MediaPlayer` 而不是 `VideoView`，则必须手动完成。\n\
  \n至此，我们关于播放音频内容的讨论就结束了。现在我们将注意力转向播放视频。正如你将看到的，引用视频内容与引用音频内容类似。\n\n### 播放视频内容\n\n\
  在本节中，我们将讨论如何使用 Android SDK 进行视频播放。具体来说，我们将讨论从网络服务器播放视频以及从 SD 卡播放视频。可以想象，视频播放比音频播放稍微复杂一些。幸运的是，Android\
  \ SDK 提供了一些额外的抽象，它们完成了大部分繁重的工作。\n\n**注意：** 在模拟器中播放视频并不可靠。如果能用，那就很好。但如果没有效果，请尝试在设备上运行。因为模拟器必须仅使用软件来运行视频，所以它很难跟上视频的节奏，并且你可能会得到意外的结果。\n\
  \n播放视频比播放音频需要更多努力，因为除了音频之外，还需要处理视觉组件。为了减轻一些痛苦，Android 提供了一个名为 `android.widget.VideoView`\
  \ 的专用视图控件，它封装了 `MediaPlayer` 的创建和初始化。要播放视频，你可以在用户界面中创建一个 `VideoView` 小部件。然后设置视频的路径或\
  \ Uri，并调用 `start()` 方法。清单 19–6 演示了 Android 中的视频播放。\n\n**清单 19–6.** *使用媒体 API 播放视频*\n\
  \n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<!-- 此文件为 /res/layout/main.xml\
  \ -->\n<LinearLayout\n android:layout_width=\"fill_parent\" android:layout_height=\"\
  fill_parent\"\n >\n\n    <VideoView  android:id=\"@+id/videoView\"\n        android:layout_width=\"\
  200px\"  android:layout_height=\"200px\" />\n\n</LinearLayout>\n```\n\n```\n// 此文件为\
  \ MainActivity.java\nimport android.app.Activity;\nimport android.net.Uri;\nimport\
  \ android.os.Bundle;\nimport android.widget.MediaController;\nimport android.widget.VideoView;\n\
  \npublic class MainActivity extends Activity {\n    /** 当 Activity 首次创建时调用。 */\n\
  \    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n     \
  \   super.onCreate(savedInstanceState);\n        this.setContentView(R.layout.main);\n\
  \n        VideoView videoView =\n                (VideoView)this.findViewById(R.id.videoView);\n\
  \        MediaController mc = new MediaController(this);\n        videoView.setMediaController(mc);\n\
  \        videoView.setVideoURI(Uri.parse(\n               \"http://www.androidbook.com/akc/filestorage/android/\"\
  \ +               \"documentfiles/3389/movie.mp4\"));\n /* videoView.setVideoPath(\n\
  \    Environment.getExternalStoragePublicDirectory(\n    Environment.DIRECTORY_MOVIES)\
  \ +\n    \"/movie.mp4\");\n */\n        videoView.requestFocus();\n        videoView.start();\n\
  \    }\n}\n```\n\n清单 19–6 演示了播放位于网络上 `www.androidbook.com/akc/filestorage/android/documentfiles/3389/movie.mp4`\
  \ 的文件，这意味着运行该代码的应用程序需要请求 `android.permission.INTERNET` 权限。所有播放功能都隐藏在 `VideoView`\
  \ 类之后。实际上，你只需将视频内容提供给视频播放器即可。应用程序的用户界面如图 19–4 所示。\n\n![images](img/1904.jpg)\n\n\
  **图 19–4.** *启用媒体控件的视频播放 UI*\n\n当此应用程序运行时，你会看到屏幕底部出现按钮控件大约三秒钟，然后它们会消失。你可以在视频框内的任意位置单击来重新显示它们。当我们播放音频内容时，我们只需要显示按钮控件来启动、暂停和重新启动音频。我们不需要为音频本身提供视图组件。当然，对于视频，我们既需要按钮控件，也需要可以用来观看视频的组件。在这个例子中，我们使用\
  \ `VideoView` 组件来显示视频内容。但是，我们没有创建自己的按钮控件（如果选择这样做，我们仍然可以创建），而是创建了一个为我们提供按钮的 `MediaController`。如图\
  \ 19–4 和清单 19–6 所示，你可以通过调用 `setMediaController()` 来设置 `VideoView` 的媒体控制器，从而启用播放、暂停和定位控制。如果你想使用自己的按钮以编程方式控制视频，可以调用\
  \ `start()`、`pause()`、`stopPlayback()` 和 `seekTo()` 方法。\n\n请记住，在此示例中我们仍然在使用 `MediaPlayer`——只是我们看不到它。实际上，你可以直接在\
  \ `MediaPlayer` 中“播放”视频。如果你回到清单 19–1 中的示例，将电影文件放到 SD 卡上，并将电影的文件路径填入 `AUDIO_PATH`，你会发现即使你无法看到视频，它也能很好地播放音频。\n\
  \n虽然 `MediaPlayer` 有一个 `setDataSource()` 方法，但 `VideoView` 没有。`VideoView` 取而代之的是使用\
  \ `setVideoPath()` 或 `setVideoURI()` 方法。假设你将电影文件放到 SD 卡上，你可以修改清单 19–6 中的代码，注释掉 `setVideoURI()`\
  \ 的调用，并取消注释 `setVideoPath()` 的调用，根据需要调整电影文件的路径。当你再次运行应用程序时，你将*听到并看到* `VideoView`\
  \ 中的视频。从技术上讲，我们本可以通过以下方式调用 `setVideoURI()` 来获得与 `setVideoPath()` 相同的效果：\n\n```\n\
  videoView.setVideoURI(Uri.parse(\"file://\" +\n    Environment.getExternalStoragePublicDirectory(\n\
  \    Environment.DIRECTORY_MOVIES) + \"/movie.mp4\"));\n```\n\n你可能已经注意到，`VideoView`\
  \ 没有像 `MediaPlayer` 那样从文件描述符读取数据的方法。你可能还注意到 `MediaPlayer` 有一些方法可以将 `SurfaceHolder`\
  \ 添加到 `MediaPlayer`（`SurfaceHolder` 类似于图像或视频的视口）。如果你需要从应用程序的私有数据文件夹（即 `/data/data/...`\
  \ 下）显示视频，你将需要使用 `MediaPlayer` 和 `SurfaceHolder`，而不是 `VideoView` 类。其中一种 `MediaPlayer`\
  \ 方法是 `create(Context context, Uri uri, SurfaceHolder holder)`，另一种是 `setDisplay(SurfaceHolder\
  \ holder)`。\n\n现在让我们来探索录制媒体。\n\n\n\n### 录制媒体\n\n正如我们所展示的，在 Android 中有多种播放媒体的方式。而在录制方面，选项则较少。录制的主要工具是\
  \ `MediaRecorder` 类，它同时用于音频和视频录制。在本节中，我们将向你展示如何针对这两种媒体类型使用 `MediaRecorder`。另一个用于录制音频的类是\
  \ `AudioRecord`，我们将通过另一个示例应用来演示它。有时候，当现有应用能帮你完成某项任务时，你并不想自己编写代码。因此，我们还将展示如何发起一个录制音频的\
  \ Intent，以及如何使用相机应用来拍摄静态图像。\n\n#### 探索使用 MediaRecorder 录制音频\n\nAndroid 媒体框架支持录制音频。一种录制音频的方式是通过\
  \ `android.media.MediaRecorder` 类。在本节中，我们将向你展示如何构建一个录制音频内容并回放该内容的应用程序。该应用程序的用户界面如\
  \ 图 19–5 所示。\n\n![images](img/1905.jpg)\n\n**图 19–5.** *音频录制示例的用户界面*\n\n如 图 19–5\
  \ 所示，应用程序包含四个按钮：两个用于控制录制，两个用于开始和停止回放录制的内容。清单 19–7 展示了该 UI 的布局文件和 Activity 类。\n\n\
  **清单 19–7.***Android 中的媒体录制与回放*\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"\
  ?>\n<!-- 本文件位于 /res/layout/record.xml -->\n<LinearLayout\n    android:orientation=\"\
  vertical\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  fill_parent\">\n\n  <Button android:id=\"@+id/beginBtn\"  android:text=\"开始录制\"\n\
  \    android:layout_width=\"fill_parent\"\n    android:layout_height=\"wrap_content\"\
  \n    android:onClick=\"doClick\" />\n\n  <Button android:id=\"@+id/stopBtn\"  android:text=\"\
  停止录制\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"wrap_content\"\
  \n    android:onClick=\"doClick\" />\n\n  <Button android:id=\"@+id/playRecordingBtn\"\
  \n    android:text=\"播放录制内容\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  wrap_content\"\n    android:onClick=\"doClick\" />\n\n  <Button android:id=\"@+id/stopPlayingRecordingBtn\"\
  \n    android:text=\"停止播放录制内容\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  wrap_content\"\n    android:onClick=\"doClick\" />\n\n</LinearLayout>\n```\n\n```\n\
  // RecorderActivity.java\nimport java.io.File;\nimport android.app.Activity;\nimport\
  \ android.media.MediaPlayer;\nimport android.media.MediaRecorder;\nimport android.os.Bundle;\n\
  import android.os.Environment;\nimport android.view.View;\n\npublic class RecorderActivity\
  \ extends Activity {\n    private MediaPlayer mediaPlayer;\n    private MediaRecorder\
  \ recorder;\n    private String OUTPUT_FILE;\n\n    @Override\n    protected void\
  \ onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.record);\n\n        OUTPUT_FILE = Environment.getExternalStorageDirectory()\
  \ +\n                        \"/recordaudio3.3gpp\";\n    }\n\n    public void doClick(View\
  \ view) {\n        switch(view.getId()) {\n        case R.id.beginBtn:\n       \
  \     try {\n                beginRecording();\n            } catch (Exception e)\
  \ {\n                e.printStackTrace();\n            }\n            break;\n \
  \       case R.id.stopBtn:\n            try {\n                stopRecording();\n\
  \            } catch (Exception e) {\n                e.printStackTrace();\n   \
  \         }\n            break;\n        case R.id.playRecordingBtn:\n         \
  \   try {\n                playRecording();\n            } catch (Exception e) {\n\
  \                e.printStackTrace();\n            }\n            break;\n     \
  \   case R.id.stopPlayingRecordingBtn:\n            try {\n                stopPlayingRecording();\n\
  \            } catch (Exception e) {\n                e.printStackTrace();\n   \
  \         }\n            break;\n        }\n    }\n\n    private void beginRecording()\
  \ throws Exception {\n        killMediaRecorder();\n\n        File outFile = new\
  \ File(OUTPUT_FILE);\n```\n\n\n```java\nif(outFile.exists()) {\n    outFile.delete();\n\
  }\nrecorder = new MediaRecorder();\nrecorder.setAudioSource(MediaRecorder.AudioSource.MIC);\n\
  recorder.setOutputFormat(MediaRecorder.OutputFormat.THREE_GPP);\nrecorder.setAudioEncoder(MediaRecorder.AudioEncoder.AMR_NB);\n\
  recorder.setOutputFile(OUTPUT_FILE);\nrecorder.prepare();\nrecorder.start();\n```\n\
  \n```java\nprivate void stopRecording() throws Exception {\n    if (recorder !=\
  \ null) {\n        recorder.stop();\n    }\n}\n```\n\n```java\nprivate void killMediaRecorder()\
  \ {\n    if (recorder != null) {\n        recorder.release();\n    }\n}\n```\n\n\
  ```java\nprivate void killMediaPlayer() {\n    if (mediaPlayer != null) {\n    \
  \    try {\n            mediaPlayer.release();\n        } catch (Exception e) {\n\
  \            e.printStackTrace();\n        }\n    }\n}\n```\n\n```java\nprivate\
  \ void playRecording() throws Exception {\n    killMediaPlayer();\n\n    mediaPlayer\
  \ = new MediaPlayer();\n    mediaPlayer.setDataSource(OUTPUT_FILE);\n\n    mediaPlayer.prepare();\n\
  \    mediaPlayer.start();\n}\n```\n\n```java\nprivate void stopPlayingRecording()\
  \ throws Exception {\n    if(mediaPlayer != null) {\n        mediaPlayer.stop();\n\
  \    }\n}\n```\n\n```java\n@Override\nprotected void onDestroy() {\n    super.onDestroy();\n\
  \n    killMediaRecorder();\n    killMediaPlayer();\n}\n```\n\n在进入代码清单 19–7 之前，你需要在清单文件中添加以下权限，以便录制音频：\n\
  \n```xml\n<uses-permission android:name=\"android.permission.RECORD_AUDIO\" />\n\
  ```\n\n正如前面关于 SD 卡的章节所讨论的，如果你的应用的 `minSdkVersion` 是 4 或更高，你还需要为 `\"android.permission.WRITE_EXTERNAL_STORAGE\"\
  ` 添加一个 `uses-permission` 标签。最后，如果你打算在模拟器上尝试这个功能，你需要为你的工作站提供麦克风输入。\n\n如果你查看代码清单 19–7\
  \ 中的 `onCreate()` 方法，你会发现我们唯一需要做的是为输出的音频文件创建文件路径名。我们的 `doClick()` 方法使用了标准的模式，根据按下的按钮进行分支切换，并调用相应的函数来执行所需的操作。`beginRecording()`\
  \ 方法负责处理录制。要录制音频，你必须创建一个 `MediaRecorder` 实例，并设置音频源、输出格式、音频编码器和输出文件。\n\n在 Android\
  \ SDK 1.6 之前，唯一支持的音频源是麦克风。Android SDK 1.6 新增了三个与通话相关的音频源。你可以录制整个通话（`MediaRecorder.AudioSource.VOICE_CALL`），仅上行链路（`MediaRecorder.AudioSource.VOICE_UPLINK`），或仅下行链路（`MediaRecorder.AudioSource.VOICE_DOWNLINK`）。通话的上行链路指的是手机用户的声音。通话的下行链路指的是来自通话另一端的声音。\n\
  \n在 Android SDK 2.1 中，又新增了两个音频源：`CAMCORDER` 和 `VOICE_RECOGNITION`。`CAMCORDER` 音频源是与摄像头相关的麦克风，否则此选项将使用设备的默认主麦克风。`VOICE_RECOGNITION`\
  \ 麦克风是专为语音识别调校过的，否则此选项也会使用设备的默认主麦克风。“专为语音识别调校”意味着音频流将尽可能原始，在麦克风与应用之间没有任何额外的音频修改。例如，一些\
  \ HTC 设备的麦克风带有自动增益控制（AGC），因此使用该音频源进行语音识别会产生问题。而 `VOICE_RECOGNITION` 音频源会绕过这种额外处理，以获得更好的语音识别效果。\n\
  \n最常见的音频输出格式是第三代合作伙伴计划（3GPP）。在 Android 2.3.3（Gingerbread）之前，你必须将编码器设置为 `AMR_NB`，这表示自适应多速率（AMR）窄带音频编解码器，因为这是当时唯一支持的音频编码器。从\
  \ Android 2.3.3 开始，你也可以使用 `AMR_WB`（宽带）和 `AAC`（高级音频编码）作为音频编码器。在我们的示例中，录制的音频以 `recordoutput.3gpp`\
  \ 为文件名写入 SD 卡。请注意，代码清单 19–7 假设你已经创建了一个 SD 卡镜像，并且已将模拟器指向该 SD 卡。如果你还没有这样做，请参考“使用 SD\
  \ 卡”章节了解具体设置方法。\n\n`MediaRecorder` 还有一些你可能觉得有用的其他方法。为了限制音频录制的时长和大小，可以使用 `setMaxDuration(int\
  \ length_in_ms)` 和 `setMaxFileSize(long length_in_bytes)` 方法。你可以设置录制的最大时长（以毫秒为单位），或录制文件的最大大小（以字节为单位），当达到这些限制时，录制将停止。这两个方法都是在\
  \ Android 1.5 中引入的，因此几乎任何可以录制音频的设备上都可以使用它们。\n\n\n#### 使用 `AudioRecord` 录制音频\n\n\
  到目前为止，你已经了解了如何将音频直接录制到文件中。但如果想在音频数据写入文件之前进行一些处理，又该如何？或者，你甚至根本不想将音频发送到文件呢？为此，Android\
  \ 提供了一个名为 `AudioRecord` 的类。当你设置好一个 `AudioRecord` 对象后，Android 会确保音频数据被写入该对象的内部缓冲区，然后你的应用程序就可以对这些音频数据进行任何处理。清单\
  \ 19-8 展示了一个使用 `AudioRecord` 读取和处理音频的 Activity。此 Activity 没有用户界面，因为我们只会将日志消息写入 `LogCat`。`AndroidManifest.xml`\
  \ 未在文中显示，但你需要添加 `android.permission.RECORD_AUDIO` 这个 Android 权限才能使其正常工作。\n\n**清单\
  \ 19-8.** 使用 `AudioRecord` 录制原始音频\n\n```\nimport android.app.Activity;\nimport android.media.AudioFormat;\n\
  import android.media.AudioRecord;\nimport android.media.MediaRecorder;\nimport android.os.Bundle;\n\
  import android.util.Log;\n\npublic class MainActivity extends Activity {\n    protected\
  \ static final String TAG = \"AudioRecord\";\n    private int mAudioBufferSize;\n\
  \    private int mAudioBufferSampleSize;\n    private AudioRecord mAudioRecord;\n\
  \    private boolean inRecordMode = false;\n\n    public void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        initAudioRecord();\n \
  \   }\n\n    @Override\n    public void onResume() {\n        super.onResume();\n\
  \        Log.v(TAG, \"Resuming...\");\n        inRecordMode = true;\n        Thread\
  \ t = new Thread(new Runnable() {\n            @Override\n            public void\
  \ run() {\n                getSamples();\n            }\n        });\n        t.start();\n\
  \    }\n\n    protected void onPause() {\n        Log.v(TAG, \"Pausing...\");\n\
  \        inRecordMode = false;\n        super.onPause();\n    }\n\n    @Override\n\
  \    protected void onDestroy() {\n        Log.v(TAG, \"Destroying...\");\n    \
  \    if(mAudioRecord != null) {\n            mAudioRecord.release();\n         \
  \   Log.v(TAG, \"Released AudioRecord\");            \n        }\n        super.onDestroy();\n\
  \    }\n\n    private void initAudioRecord() {\n        try {\n            int sampleRate\
  \ = 8000;\n            int channelConfig = AudioFormat.CHANNEL_IN_MONO;\n      \
  \      int audioFormat = AudioFormat.ENCODING_PCM_16BIT;\n            mAudioBufferSize\
  \ =\n                    2 * AudioRecord.getMinBufferSize(sampleRate,\n        \
  \            channelConfig, audioFormat);\n            mAudioBufferSampleSize =\
  \ mAudioBufferSize / 2;\n            mAudioRecord = new AudioRecord(\n         \
  \           MediaRecorder.AudioSource.MIC,\n                    sampleRate,\n  \
  \                  channelConfig,\n                    audioFormat,\n          \
  \          mAudioBufferSize);\n            Log.v(TAG, \"Setup of AudioRecord okay.\
  \ Buffer size = \" +\n                    mAudioBufferSize);\n            Log.v(TAG,\
  \ \"   Sample buffer size = \" +\n                    mAudioBufferSampleSize);\n\
  \        } catch (IllegalArgumentException e) {\n            e.printStackTrace();\n\
  \        }\n\n        int audioRecordState = mAudioRecord.getState();\n        if(audioRecordState\
  \ != AudioRecord.STATE_INITIALIZED) {\n            Log.e(TAG, \"AudioRecord is not\
  \ properly initialized\");\n            finish();\n        }\n        else {\n \
  \           Log.v(TAG, \"AudioRecord is initialized\");\n        }\n    }\n\n  \
  \  private void getSamples() {\n        if(mAudioRecord == null) return;\n\n   \
  \     short[] audioBuffer = new short[mAudioBufferSampleSize];\n\n        mAudioRecord.startRecording();\n\
  \n        int audioRecordingState = mAudioRecord.getRecordingState();\n        if(audioRecordingState\
  \ != AudioRecord.RECORDSTATE_RECORDING) {\n            Log.e(TAG, \"AudioRecord\
  \ is not recording\");\n            finish();\n        }\n        else {\n     \
  \       Log.v(TAG, \"AudioRecord has started recording...\");\n        }\n\n   \
  \     while(inRecordMode) {\n            int samplesRead = mAudioRecord.read(\n\
  \                            audioBuffer, 0, mAudioBufferSampleSize);\n        \
  \    Log.v(TAG, \"Got samples: \" + samplesRead);\n            Log.v(TAG, \"First\
  \ few sample values: \" +\n                    audioBuffer[0] + \", \" +\n     \
  \               audioBuffer[1] + \", \" +\n                    audioBuffer[2] +\
  \ \", \" +\n                    audioBuffer[3] + \", \" +\n                    audioBuffer[4]\
  \ + \", \" +\n                    audioBuffer[5] + \", \" +\n                  \
  \  audioBuffer[6] + \", \" +\n                    audioBuffer[7] + \", \" +\n  \
  \                  audioBuffer[8] + \", \" +\n                    audioBuffer[9]\
  \ + \", \"\n                    );\n        }\n\n        mAudioRecord.stop();\n\
  \        Log.v(TAG, \"AudioRecord has stopped recording\");\n    }\n}\n```\n\n我们的示例应用程序相当简单。首先，我们初始化\
  \ `AudioRecord`。这需要选择音频源、采样频率、声道配置（单声道、立体声、左声道、右声道等）、音频编码格式以及内部缓冲区大小。对于音频源，你可以从\
  \ `MediaRecorder.AudioSource` 中定义的一组选项中进行选择。这里有一个警告：并非所有设备都实现了 `VOICE_CALL`，因为它相当于两个输入而非一个输入。对于采样频率，你应该选择一个标准值，例如\
  \ 8000、16000、44100、22050 或 11025 Hz。声道配置应从 `AudioFormat` 中描述的 `CHANNEL_*` 值中选择。编码格式可以是\
  \ `ENCODING_PCM_8BIT` 或 `ENCODING_PCM_16BIT`。请注意，你的选择将影响你作为原始音频数据返回的值类型。如果你不需要 16\
  \ 位的精度，请使用 8 位——这样会占用更少内存，速度也更快。文档指出，只有 44100 的采样频率能保证在所有设备上工作，但具有讽刺意味的是，模拟器只支持\
  \ 8000 Hz、`CHANNEL_IN_MONO` 和 `ENCODING_PCM_8BIT`。\n\n`AudioRecord` 类有一个名为 `getMinBufferSize()`\
  \ 的静态辅助方法，它会根据你期望的参数设置，返回正确初始化 `AudioRecord` 所需的最小缓冲区大小。这个缓冲区你不能直接访问，但 `AudioRecord`\
  \ 内部需要有足够的空间来存储音频数据，以便你能处理之前检索到的音频数据。你当然可以使用最小尺寸，也可以稍微增大它。但绝对不应尝试设置小于此辅助方法推荐值的缓冲区大小。在我们的示例中，我们选择了最小缓冲区大小的两倍。如果你的参数不被\
  \ `AudioRecord` 接受，你会收到一个 `IllegalArgumentException`。例如，如果你尝试使用此硬件不支持的采样频率，就会收到此异常。不幸的是，没有便捷的方法来获取支持的采样频率列表，所以你唯一的办法就是尝试一个期望的采样频率，如果收到异常，则尝试另一个采样频率，直到找到一个能正常工作的。\n\
  \n作为初始化方法中的最后一项检查，我们确保 `AudioRecord` 已正确初始化。现在，我们已经准备好读取音频样本了。\n\n\n\n我们选择在 `Activity`\
  \ 的 `onResume()` 方法中开启采样，并在 `onPause()` 中关闭采样。我们不想让主 UI 线程被采样占用，因此创建了一个单独的线程来执行音频采样。同时设置一个布尔变量（`inRecordMode`），以便告知线程何时停止采样。\n\
  \n在 `getSamples()` 方法中，我们为音频数据创建了自己的缓冲区。如前所述，我们无法直接访问 `AudioRecord` 的内部音频数据缓冲区，因此会读取数据到我们的采样缓冲区中。请注意，缓冲区的大小是\
  \ `audioBufferSampleSize`，而非 `audioBufferSize`。我们只需读取采样数据的大小，缓冲区也只需容纳这些数据。我们通知 `AudioRecord`\
  \ 开始录音，检查状态是否已变为 `RECORDING`，然后开始循环读取。这些读取操作是阻塞式的，但由于我们在独立的线程中执行，因此没有问题。当 `AudioRecord`\
  \ 累积到我们设定的采样数据量时，读取操作会返回，以便我们处理该音频样本。\n\n与此同时，`AudioRecord` 会持续为我们收集额外的音频数据，供下一次调用\
  \ `read` 时使用。我们必须在 `AudioRecord` 内部缓冲区填满之前完成处理，因此务必注意不要处理过多数据。根据你对数据的处理需求，你可以简单地停止录音，之后再重新开始。在我们的示例中，我们仅在\
  \ `LogCat` 中报告已获取样本，并显示前 10 个值。运行此示例应用时，对着麦克风发出不同的声音，就可以在 `LogCat` 中看到数值的变化。\n\n\
  循环会持续进行，直到布尔变量 `inRecordMode` 变为 `false`，这通常发生在应用被隐藏或销毁时。\n\n在翻阅 `AudioRecord` 的文档时，你可能会注意到一些回调接口。它们允许你设置监听器，用于监听音频流到达标记位置，或定期触发周期性回调。我们在前述示例基础上，添加了清单\
  \ 19-9 中的语句。此项目的完整源代码，请参阅我们的网站。\n\n**清单 19-9.** *使用 `AudioRecord` 和回调录制原始音频*\n\n\
  ```\n    // 此代码位于我们的 Activity 类中\n    public OnRecordPositionUpdateListener mListener\
  \ = new OnRecordPositionUpdateListener() {\n\n        public void onPeriodicNotification(AudioRecord\
  \ recorder) {\n            Log.v(TAG, \"进入 onPeriodicNotification\");\n        }\n\
  \n        public void onMarkerReached(AudioRecord recorder) {\n            Log.v(TAG,\
  \ \"进入 onMarkerReached\");\n            inRecordMode = false;\n        }\n    };\n\
  \n    // 以下语句应放置在 initAudioRecord() 方法中，\n    // 在创建 mAudioRecord 之后、检查 mAudioRecord\
  \ 状态之前。\n        mAudioRecord.setNotificationMarkerPosition(10000);\n        mAudioRecord.setPositionNotificationPeriod(1000);\n\
  \        mAudioRecord.setRecordPositionUpdateListener(mListener);\n```\n\n请注意，监听器包含两个独立的回调方法。第一个回调在每次读取\
  \ 1000 帧音频时被调用，我们在初始化方法中进行了设置。这个帧计数与我们的采样缓冲区大小无关。虽然我们每次可能读取 1600 帧，但第一个回调每 1000\
  \ 帧就会触发一次。因此，在一次读取循环中，该回调可能会被调用两次。第二个回调在达到绝对帧计数时被调用。在我们的示例应用中，我们将其设置为 10000 帧，当达到该计数时，我们通过将布尔值设为\
  \ `false` 来关闭录音。如果我们仅记录一条消息而不关闭录音，那么无论后续读取多少帧，都不会再次看到此回调被调用。该标记位置是相对于在 `AudioRecord`\
  \ 上调用 `startRecording()` 的时刻而言的。\n\n#### 探索视频录制\n\n自 Android SDK 1.5 引入以来，你可以使用媒体框架捕获视频。其工作方式与音频录制类似，实际上录制的视频通常包含一条音轨。不过，视频录制有一个重大例外。从\
  \ Android SDK 1.6 开始，录制视频需要将相机图像预览到 `Surface` 对象上。在基础应用中，这通常不是大问题，因为用户可能希望实时查看相机拍摄的内容。但对于更复杂的应用来说，这可能是一个问题。如果你的应用不需要在录制时向用户显示视频画面，你仍然需要提供一个\
  \ `Surface` 对象，以便相机能够预览视频。我们预计这一要求在未来的 Android SDK 版本中会放宽，届时应用可以直接处理视频缓冲区，而无需同时复制到\
  \ UI 组件。不过目前，我们仍需使用 `Surface`，我们将向你展示如何实现。\n\n这个示例应用稍长，因此我们将其拆分成几个部分，以便在讲解过程中逐一说明各部分的功能。你很可能希望从我们的网站下载后，将这个项目导入\
  \ Eclipse。如何导入，请参见本章末尾的“参考资料”部分。我们从清单 19-10 中的应用布局开始。\n\n**清单 19-10.** *录制视频的 XML\
  \ 布局*\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<!-- 此文件路径为 /res/layout-land/main.xml\
  \ -->\n<LinearLayout\n    android:layout_width=\"fill_parent\"  android:layout_height=\"\
  fill_parent\"\n     android:orientation=\"horizontal\" >\n  <LinearLayout\n    android:orientation=\"\
  vertical\" android:layout_width=\"wrap_content\"\n    android:layout_height=\"wrap_content\"\
  >\n\n    <Button android:id=\"@+id/initBtn\"\n        android:layout_width=\"wrap_content\"\
  \  android:layout_height=\"wrap_content\"\n        android:text=\"初始化录制器\"  android:onClick=\"\
  doClick\"\n        android:enabled=\"false\" />\n\n    <Button android:id=\"@+id/beginBtn\"\
  \n        android:layout_width=\"wrap_content\"  android:layout_height=\"wrap_content\"\
  \n        android:text=\"开始录制\"  android:onClick=\"doClick\"\n        android:enabled=\"\
  false\" />\n\n    <Button android:id=\"@+id/stopBtn\"\n        android:layout_width=\"\
  wrap_content\"  android:layout_height=\"wrap_content\"\n        android:text=\"\
  停止录制\"  android:onClick=\"doClick\" />\n\n    <Button android:id=\"@+id/playRecordingBtn\"\
  \n        android:layout_width=\"wrap_content\"  android:layout_height=\"wrap_content\"\
  \n        android:text=\"播放录制内容\"  android:onClick=\"doClick\" />\n\n    <Button\
  \ android:id=\"@+id/stopPlayingRecordingBtn\"\n        android:layout_width=\"wrap_content\"\
  \ android:layout_height=\"wrap_content\"\n        android:text=\"停止播放\"  android:onClick=\"\
  doClick\" />\n  </LinearLayout>\n  <LinearLayout android:orientation=\"vertical\"\
  \n        android:layout_width=\"fill_parent\" android:layout_height=\"fill_parent\"\
  \ >\n<TextView android:id=\"@+id/recording\" android:text=\" \"\n        android:textColor=\"\
  #FF0000\"\n        android:layout_width=\"wrap_content\"\n        android:layout_height=\"\
