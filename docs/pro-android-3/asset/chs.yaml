  \n**图 12–5.** *声明库项目依赖关系*\n\n请注意对话框中的“添加”按钮。您可以使用它来添加图 12–5 中的库作为引用。无需再执行其他操作。\n\
  \n完成此步骤后，库项目通常会在主应用程序项目下显示为一个额外的节点（除了其本身作为一个库项目之外）。图 12–6 对此进行了说明。\n\n![images](img/1206.jpg)\n\
  \n**图 12–6.** *主项目视图中已合并的库项目*\n\n请注意显示为 `[Android Library]` 的节点以及复制/引用的 Java 源文件。注意此节点的结构。它的命名方式是拼接库项目名称、下划线和库项目下对应的源目录名称。这种方案允许库项目下存在任意数量的源目录。这是\
  \ ADT 0.9.8 与较新 ADT 版本之间的主要区别。\n\n如果您修改了应用程序项目下属于库项目的源文件，实际上您也同时在修改库项目中的这些文件。有时，您可能看不到这个子节点。在这种情况下，您可能需要重启\
  \ Eclipse。无论如何，如果一切正常，您应该会看到这个额外的节点。\n\nAndroid 对 `R.java` 文件做了另一件有趣的事情。请参阅图 12–7。\n\
  \n![images](img/1207.jpg)\n\n**图 12–7.** *R.java 中重复的资源*\n\n首先，Android 会在库项目中为属于库项目的资源生成一个\
  \ `R.java` 文件。Android 还会为主 Java 项目中的资源生成另一个 `R.java` 文件。这是意料之中的——两个项目，两个 `R.java`\
  \ 文件。\n\n然而，有趣的是，Android 也会在主应用程序的 `R.java` 文件中为库资源创建资源 ID。这意味着程序员可以对属于主应用程序的 `R.java`\
  \ 文件使用 `R.id.` 语法（请注意，`R.java` 是自动生成的，因此 代码清单 12–11 中的数字如 `0x7f02000` 在您的项目中可能不同）。\n\
  \n**代码清单 12–11.** *主项目 R.java 文件中重新定义的共享资源 ID*\n\n```\npublic final class R {\n\
  \    public static final class attr {\n    }\n    public static final class drawable\
  \ {\n        public static final int icon=0x7f020000;\n        public static final\
  \ int robot=0x7f020001;\n    }\n    public static final class id {\n        public\
  \ static final int menuGroup_Main=0x7f060001;\n        public static final int menu_clear=0x7f060002;\n\
  \        public static final int menu_library_activity=0x7f060005;\n        public\
  \ static final int menu_testlib_1=0x7f060003;\n        public static final int menu_testlib_2=0x7f060004;\n\
  \        public static final int text1=0x7f060000;\n    }\n    public static final\
  \ class layout {\npublic static final int lib_main=0x7f030000;\n        public static\
  \ final int main=0x7f030001;\n    }\n    public static final class menu {\npublic\
  \ static final int lib_main_menu=0x7f050000;\n        public static final int main_menu=0x7f050001;\n\
  \    }\n    public static final class string {\n        public static final int\
  \ app_name=0x7f040001;\n        public static final int hello=0x7f040000;\n    }\n\
  }\n```\n\n请注意，以 `lib_` 标识的资源现在也可在主应用程序的 `R.java` 中使用。这意味着库项目将为 `lib_` 资源提供一个资源常量，而主项目将为同一个\
  \ `lib_` 资源提供另一个资源常量。\n\n这两个项目都可以在其 Java 代码中通过使用 `R.some-id` 来引用此资源。常量的值可能相同，但您将可以在两个\
  \ Java 命名空间中使用该资源 ID：库包命名空间和主项目包命名空间。\n\n此外，请注意菜单名称：`lib_main_menu` 和 `main_menu`。如果我们为这两个菜单资源文件命名相同但内部包含不同的菜单项，那可真就麻烦了。最终结果是，资源被聚合在一起，并可以在主应用程序的一个地方使用。请特别注意文件级别的资源，例如菜单和布局，以及为这些资源文件内部项目生成的\
  \ ID。\n\n既然您已经了解了库项目，那么我们是更接近于回答之前考虑它们时提出的共享数据问题了吗？\n\n如您所见，库项目是编译时的构造。显然，任何属于库的资源都会被吸收并合并到主项目中。这里不存在运行时共享的问题，因为只有一个以主包名命名的包文件。一个常见的建议是，您可以通过让免费版和付费版应用都共享一个库，来开发应用的这两个版本。\n\
  \n### 小结\n\n在本章中，我们介绍了如何使用包和进程、在包之间共享代码和数据，以及创建 Android 库项目。您了解到签名在将所有权分配给包方面起着重要的安全作用。\n\
  \n本章为下一章奠定了基础，在下一章中，我们将讨论驻留在包进程中的组件，以及它们（主要）在主线程上运行。我们将讨论如何通过处理器和子线程来最优地利用主线程，以便\
  \ Android 应用程序能够流畅运行。\n\n## 第 xs13 章\n\n\n\n"
- "# 探索处理器（Handler）\n\n我们在第 12 章中展示了每个包都在自己的进程中运行。本章将解释该进程内的线程组织方式，由此引出我们需要处理器的原因。\n\
  \nAndroid 应用程序中的大部分代码都在组件（如`Activity`或`Service`）的上下文中运行。我们将展示这些应用组件如何与线程交互。大多数情况下，Android\
  \ 进程中只有一个称为**主线程**的线程在运行。我们将讨论各组件共享主线程的影响，这主要可能导致“应用无响应”（ANR）消息（其中的“A”代表“application”，而非“Annoying”）。我们将展示如何利用处理器（handler）、消息（message）和线程（thread），在需要长时间运行操作时打破对主线程的依赖。\n\
  \n本章首先探讨 Android 应用的组件及其运行的线程上下文。\n\n### Android 组件与线程\n\n通过此前许多章节的介绍，你应该已经了解到一个\
  \ Android 进程包含四个主要组件，分别是：\n\n*   `Activity`\n*   `Service`\n*   `ContentProvider`（常简称为\
  \ provider）\n*   `BroadcastReceiver`（常简称为 receiver）\n\n你在 Android 应用中编写的大部分代码，要么属于这些组件的一部分，要么由这些组件调用。每个组件在\
  \ Android 项目清单文件的`<application>`节点规范下都拥有独立的 XML 节点。回顾一下这些节点如下：\n\n```xml\n<application>\n\
  \     <activity/>\n     <service/>\n     <receiver/>\n     <provider/>\n</application>\n\
  ```\n\n除少数例外情况，Android 使用同一个线程来处理（或执行）这些组件中的代码。该线程被称为应用的主线程。当这些组件被调用时，调用可以是同步调用（例如调用内容提供者获取数据），也可以是通过消息队列的延迟调用（例如通过调用`startService`来调用功能）。\n\
  \n图 13–1 描述了线程与这四个组件之间的关系。该图表旨在展示线程如何贯穿 Android 框架及其组件。我们将在接下来的几个小节中探讨该图表的各个方面。\n\
  \n![images](img/1301.jpg)\n\n**图 13–1.** *Android 组件与线程框架*\n\n#### Activity 在主线程上运行\n\
  \n如图 13–1 所示，主线程承担了大部分工作，它贯穿所有组件，并通过消息队列来执行。例如，当你在设备屏幕上选择菜单或按钮时，设备会将这些操作转换为消息并放入当前焦点进程的主队列中。主线程在一个循环中运行，处理每一条消息。如果某条消息耗时超过\
  \ 5 秒左右，Android 就会抛出一个 ANR 消息。\n\n#### 广播接收器在主线程上运行\n\n类似地，如果你通过菜单项调用一条广播消息，Android\
  \ 同样会将一条消息放入目标包进程的主队列中（该包中注册了要调用的接收器）。主线程稍后会处理这条消息来调用接收器。广播接收器的工作也由主线程完成。如果主线程正在忙于响应菜单操作，广播接收器就必须等待主线程空闲下来。\n\
  \n#### 服务在主线程上运行\n\n服务也是如此。当你通过菜单项调用`startService`启动一个本地服务时，一条消息会被放入主队列，主线程稍后会通过服务代码对其进行处理。\n\
  \n#### 内容提供者在主线程上运行\n\n对本地内容提供者的调用略有不同。内容提供者仍然在主线程上运行，但调用是同步的，且不使用消息队列。\n\n####\
  \ 单一主线程的影响\n\n你可能会问：“Android 应用中的大部分代码在主线程上运行，这为什么重要？”因为主线程有责任及时返回其消息队列，以便响应 UI\
  \ 事件。因此，不应阻塞主线程。如果有任何操作耗时超过 5 秒，就应该在单独的线程中完成，或者通过请求主线程在其处理完其他事务空闲后再处理该操作来推迟执行。事实证明，在单独的线程中执行工作并不像最初看起来那么简单。我们将在本章后续部分及下一章中再次讨论这个问题，但先来谈谈图\
  \ 13–1 中标识的线程池。\n\n#### 线程池、内容提供者、外部服务组件\n\n当进程外部的客户端或组件调用内容提供者获取数据时，该调用会从线程池中分配一个线程。外部客户端连接到服务时也是如此。\n\
  \n#### 线程工具：发现你的线程\n\n在大量讨论了主线程和工作线程之后，使用代码清单 13–1 中的以下实用工具类来判断哪个线程正在运行你的代码部分，会很有启发性。然后你可以通过监控`logcat`并查看打印出的线程\
  \ ID 来验证我们到目前为止所介绍的内容。\n\n**代码清单 13–1.** *线程工具*\n\n```java\n//utils.java\npublic\
  \ class Utils\n{\n   public static long getThreadId() {\n      Thread t = Thread.currentThread();\n\
  \      return t.getId();\n   }\n\n   public static String getThreadSignature(){\n\
  \      Thread t = Thread.currentThread();\n      long l = t.getId();\n      String\
  \ name = t.getName();\n      long p = t.getPriority();\n      String gname = t.getThreadGroup().getName();\n\
  \      return (name\n            + \":(id)\" + l\n            + \":(priority)\"\
  \ + p\n            + \":(group)\" + gname);\n   }\n\n   public static void logThreadSignature(){\n\
  \      Log.d(\"ThreadUtils\", getThreadSignature());\n   }\n\n   public static void\
  \ sleepForInSecs(int secs){\n      try{\n         Thread.sleep(secs * 1000);\n \
  \     } catch(InterruptedException x){\n         throw new RuntimeException(\"interrupted\"\
  ,x);\n      }\n   }\n   //以下两个方法用于后续将介绍的工作线程\n   public static Bundle getStringAsABundle(String\
  \ message){\n       Bundle b = new Bundle();\n       b.putString(\"message\", message);\n\
  \       return b;\n    }\n    public static String getStringFromABundle(Bundle b){\n\
  \        return b.getString(\"message\");\n    }\n}\n```\n\n如果你使用`logThreadSignature()`，就可以看到哪个线程正在执行代码。你也可以使用`sleep()`方法，观察暂停主线程导致其无法处理消息队列时会发生什么。\n\
  \n我们之前简要提到了在必要时推迟主线程工作的想法。这可以通过处理器（handler）来实现。处理器在整个 Android 中被广泛使用，以避免主 UI 线程被阻塞。它们还在与其他创建的工作线程进行主线程通信时发挥作用。下一节我们将探讨什么是处理器以及它们如何工作。\n\
  \n\n\n### 处理器\n\n*处理器*是一种将消息投递到主队列（更准确地说，是投递到处理器实例化时所依附线程的队列）的机制，这样主线程就能在稍后的时间点处理该消息。被投递的消息持有一个内部引用，指向投递它的处理器。\n\
  \n当主线程开始处理该消息时，它会通过处理器对象上的一个回调方法来调用投递该消息的处理器。这个回调方法叫做`handleMessage`。图 13–2 展示了处理器、消息和主线程之间的这种关系。\n\
  \n![images](img/1302.jpg)\n\n**图 13–2.** *处理器、消息、消息队列关系*\n\n图 13–2 说明了我们在讨论处理器时协同工作的关键角色。这些关键角色包括：\n\
  \n- 主线程\n- 主线程队列\n- 处理器\n- 消息\n\n在这四个角色中，我们不会直接接触到主线程或队列。我们主要处理`Handler`对象和`Message`对象。即使在这两者之间，`Handler`对象也协调了大部分工作。\n\
  \n尽管`Handler`在这种交互中很重要，但你也应该注意，虽然处理器允许我们将消息投递到队列，但实际上是消息持有对处理器的反向引用。`Message`对象还持有一个数据结构，可以传递回处理器。在图\
  \ 13–2 中，`Message`对象通过显示对`Data`对象的引用来描述这种关系。\n\n由于处理器和消息之间这种看似颠倒的关系，以及主线程和其队列对程序员隐藏的事实，通过示例来理解处理器是最好的方式。\n\
  \n在示例中，我们将有一个调用函数的菜单项，而该函数又会以每秒一次的间隔执行五次操作，并在每次执行后向调用的活动报告。\n\n#### 占用主线程的影响\n\n\
  如果我们不介意占用主线程，我们可以像列表 13–2 中的伪代码那样编写上述场景。\n\n**列表 13–2.** *使用睡眠方法占用主线程*\n\n```\n\
  public class SomeActivity\n{\n    ....其他方法\n\n    void respondToMenuItem()\n   \
  \ {\n        //证明我们在主线程上\n        Utils.logThreadSignature();\n\n        for (int\
  \ i=0;i<5;i++)\n        {\n            sleepFor(1000);// 让主线程休眠 1 秒\n          \
  \  dosomething();\n            SomeTextView.setText(\"did something\");\n      \
  \   }\n   }\n}\n```\n\n这可以满足用例的需求。但是，如果我们这样做，我们*正在*占用主线程，并且几乎一定会导致应用无响应（ANR）。\n\n\
  #### 使用处理器在主线程上延迟执行工作\n\n我们可以使用处理器来避免前面例子中的 ANR。通过处理器实现此功能的伪代码将如列表 13–3 所示。\n\n\
  **列表 13–3.** *从主线程实例化处理器*\n\n```\nvoid respondToMenuItem()\n{\n    SomeHandlerDerivedFromHandler\
  \ myHandler =\n                 new SomeHandlerDerivedFromHandler();\n    myHandler.doDeferredWork();\
  \ //以 1 秒的间隔调用一个函数\n}\n```\n\n现在，`respondToMenuItem()`调用将会允许主线程返回到其循环。实例化的处理器知道它是在主线程上调用的，并会将自己挂接到队列上。`doDeferredWork()`方法将安排工作，以便主线程一旦空闲就可以回来处理这些工作。那么它是如何做到的呢？以下是实现此功能的步骤：\n\
  \n1.  构建一个消息对象，以便将其投递到队列中。\n2.  将消息对象发送到队列，使其能够在 1 秒后调用一个回调。\n3.  响应来自主线程的`handleMessage()`回调。\n\
  \n为了探究这个协议，让我们看看一个合适处理器的实际源代码。列表 13–4 中的代码演示了这个名为`DeferWorkHandler`的处理器。\n\n在列表\
  \ 13–3 的伪代码中，所指的处理器`SomeHandlerDerivedFromHandler`等同于`DeferWorkHandler`。同样，所指的方法`doDeferredWork()`是在列表\
  \ 13–4 的`DeferWorkHandler`上实现的。\n\n#### 一个延迟工作的处理器示例源代码\n\n在解释上一节中的每个步骤之前，列表 13–4\
  \ 给出了`DeferWorkHandler`的代码。请记住，调用此处理器的主驱动程序活动的源代码将在本章后面给出。\n\n这个父驱动程序活动在列表 13–4\
  \ 中被表示为变量`parentActivity`。这个变量对于理解这段代码并不关键，它主要用于报告处理器中发生的工作的状态。\n\n**列表 13–4.**\
  \ *DeferWorkHandler 源代码*\n\n```\npublic class DeferWorkHandler extends Handler\n\
  {\n    public static final String tag = \"DeferWorkHandler\";\n\n    //跟踪我们发送消息的次数\n\
  \    private int count = 0;\n    //我们可以用来通知状态的父驱动程序活动\n    private TestHandlersDriverActivity\
  \ parentActivity = null;\n\n    //在构造期间，我们接收父驱动程序活动\n    public DeferWorkHandler(TestHandlersDriverActivity\
  \ inParentActivity){\n        parentActivity = inParentActivity;\n    }\n    @Override\n\
  \    public void handleMessage(Message msg)\n    {\n        String pm = new String(\n\
  \                \"message called:\" + count + \":\" +\n                msg.getData().getString(\"\
  message\"));\n\n        Log.d(tag,pm);\n        this.printMessage(pm);\n\n     \
  \   if (count > 5)\n        {\n            return;\n        }\n        count++;\n\
  \        sendTestMessage(1);\n    }\n    public void sendTestMessage(long interval)\n\
  \    {\n        Message m = this.obtainMessage();\n        prepareMessage(m);\n\
  \        this.sendMessageDelayed(m, interval * 1000);\n    }\n    public void doDeferredWork()\n\
  \    {\n        count = 0;\n        sendTestMessage(1);\n    }\n    public void\
  \ prepareMessage(Message m)\n    {\n        Bundle b = new Bundle();\n        b.putString(\"\
  message\", \"Hello World\");\n        m.setData(b);\n        return ;\n    }\n \
  \   //此方法仅在父活动的文本框中打印消息\n    //你可以在列表 13–9 中看到此方法\n    private void printMessage(String\
  \ xyz)\n    {\n        parentActivity.appendText(xyz);\n    }\n}\n```\n\n让我们看看这段源代码的主要方面。\n\
  \n\n\n### 构建合适的消息对象\n\n如前所述，当 `DeferWorkHandler` 被构造时，它已经知道如何将自己挂载到主队列上，因为它从基础 `Handler`\
  \ 类继承了该属性。基础 Handler 提供了一系列方法，用于向队列发送消息以供后续响应。\n\n`sendMessage()` 和 `sendMessageDelayed()`\
  \ 是这些发送方法中的两个例子。我们在示例中使用的 `sendMessageDelayed()` 允许我们将一条消息放入主队列，并设定一定的延迟时间。\n\n\
  当你调用 `sendMessage()` 或 `sendMessageDelayed()` 时，你需要一个 `Message` 对象的实例。最好让 Handler\
  \ 提供给你，因为当 Handler 返回 `Message` 对象时，它会将自身隐藏在 `Message` 的内部。这样，当主线程处理时，它就能仅根据这条消息知道要调用哪个\
  \ Handler。\n\n在清单 13-4 中，消息是通过以下代码获取的：\n\n```java\nMessage m = this.obtainMessage();\n\
  ```\n\n变量 `this` 指的是 Handler 对象实例。顾名思义，该方法不会创建新消息，而是从全局消息池中获取一个。之后，一旦此消息被处理，它将被回收。`obtainMessage()`\
  \ 方法具有 清单 13-5 中列出的几种变体：\n\n**清单 13-5.** *通过 Handler 构建消息*\n\n```java\nobtainMessage();\n\
  obtainMessage(int what);\nobtainMessage(int what, Object object);\nobtainMessage(int\
  \ what, int arg1, int arg2);\nobtainMessage(int what, int arg1, int arg2, Object\
  \ obj);\n```\n\n每种方法变体都会设置消息对象上相应的字段。当消息跨越进程边界时，对 `Object object` 参数有一些限制。在这种情况下，它必须是\
  \ `Parcelable` 的。在这种情况下，更安全且兼容的做法是显式地在消息对象上使用 `setData()` 方法，该方法接受一个 `Bundle` 对象。在清单\
  \ 13-4 中，我们使用了 `setData()`。如果你只是想传递可以用整数值表示的简单指示器，建议改用 `arg1` 或 `arg2`。\n\n`what`\
  \ 参数允许你从队列中取出消息，或者查询队列中是否存在此类型的消息。有关更多详细信息，请参见 `Handler` 类的操作。本章的“参考资料”部分提供了 `Handler`\
  \ 类 API 文档的网址。\n\n### 向队列发送消息对象\n\n一旦我们从 Handler 获取到消息，我们可以选择性地修改该消息的数据内容。在我们的示例中，我们使用了\
  \ `setData()` 函数，并向其传递了一个 `Bundle` 对象。一旦我们对消息的数据进行了分类或标识，我们就可以通过 `sendMessage()`\
  \ 或 `sendMessageDelayed()` 将消息发送到队列。一旦调用了这些方法，主线程将返回去处理队列。\n\n### 响应 handleMessage\
  \ 回调\n\n`DeferWorkHandler` 类派生自 `Handler`。消息被传递到队列后，Handler 会（形象地说）坐等主线程检索这些消息并调用\
  \ Handler 的 `handleMessage()` 方法。\n\n如果你想更清楚地观察此 Handler 与主线程的交互，可以在发送消息时和 `handleMessage()`\
  \ 回调中分别写入一条 `logcat` 日志。你会发现时间戳存在差异，因为主线程需要额外几毫秒才能回到 `handleMessage()` 方法。\n\n这也是了解\
  \ `sendMessage()` 和 `handleMessage()` 都在主线程上运行的好方法。你可以使用 `Utils.logThreadSignature()`\
  \ 方法（参见清单 13-1）来演示这一点。\n\n在我们的示例中，每个 `handleMessage()` 在处理完一条消息后，会向队列发送另一条消息，以便它能够被再次调用。它会这样做五次，当计数器达到五次时，它会停止向队列发送消息。\n\
  \n在我们的 Handler 示例中，`DeferWorkHandler`（如前所述）还将父 Activity 作为输入，以便它能够使用该 Activity 提供的方法报告任何信息。\n\
  \n### 使用工作线程\n\n当我们使用像上一节那样的 Handler 时，代码仍然在主线程上执行。每次对 `handleMessage()` 的调用仍然应在主线程的时间规定内返回（换句话说，每次消息调用应在少于\
  \ 5 秒内完成，以避免 Android 无响应）。如果你的目标是进一步延长执行时间，你将需要启动一个单独的线程，让该线程持续运行直到完成工作，并允许该子线程向运行在主线程上的主\
  \ Activity 报告结果。这种类型的子线程通常被称为*工作线程*。\n\n在响应菜单项时启动一个单独的线程是很简单的。然而，巧妙的技巧是让工作线程能够向主线程的队列发送一条消息，告知有事情正在发生，并且主线程应在处理到该消息时查看它。\n\
  \n一个涉及工作线程的合理解决方案如下：\n\n1.  在响应菜单项时，在主线程中创建一个 Handler。将其存放在一旁。与上一节不同，我们不会使用这个 Handler\
  \ 来发送延迟执行的消息。\n2.  创建一个执行实际工作的单独线程（一个工作线程）。将步骤 1 中的 Handler 传递给该工作线程。\n3.  现在，工作线程代码可以执行超过\
  \ 5 秒的实际工作，并且在此过程中，它可以调用 Handler 发送状态消息以与主线程通信。\n4.  这些状态消息现在由主线程处理，因为该 Handler\
  \ 属于主线程。在工作线程执行其工作的同时，主线程可以处理这些消息。\n\n下面为您展示一个菜单项的示例代码，该菜单项启动了工作线程的流程。\n\n\n\n###\
  \ 从菜单调用工作线程\n\n清单 13–6 中的代码展示了一个名为 `testThread()` 的函数，该函数可在主线程中响应某个菜单项时被调用。\n\n\
  **清单 13–6.** *从主线程实例化一个子线程*\n\n```\n//保留几个局部变量\n//这样它们就不会在每次菜单点击时被重新创建\n\n//保存指向处理程序的指针\n\
  Handler statusBackHandler = null;\n\n//线程实例\nThread workerThread = null;\n\n//该方法将由一个菜单项调用\n\
  private void testThread()\n{\n    if (statusBackHandler == null)\n    {\n      \
  \  //菜单项从未被点击过\n        //此处引用的类将在本章后面列出\nstatusBackHandler = new ReportStatusHandler(this);\n\
  workerThread = new Thread(new WorkerThreadRunnable(statusBackHandler));\nworkerThread.start();\n\
  \        return;\n    }\n\n    //线程已存在\n    if (workerThread.getState() != Thread.State.TERMINATED)\n\
  \    {\n        Log.d(tag, \"线程是新的或处于活跃状态，但未终止\");\n    }\n    else\n    {\n   \
  \     Log.d(tag, \"线程可能已死亡。现在重启\");\n        //必须创建一个新线程。\n        //无法复活一个已死亡的线程。\n\
  \        workerThread = new Thread(new WorkerThreadRunnable(statusBackHandler));\n\
  \        workerThread.start();\n    }\n}\n```\n\n这段代码看起来有些迂回，但其核心在于：\n\n```\n  \
  \      statusBackHandler = new ReportStatusHandler(this);\n        workerThread\
  \ = new Thread(new WorkerThreadRunnable(statusBackHandler));\n        workerThread.start();\n\
  ```\n\n基本上，我们创建了一个处理程序（负责报告状态），将其传递给工作线程，然后启动了工作线程。清单 13–6 中的额外代码是为了确保：如果我们在线程正在工作且尚未终止时连续点击菜单项两到三次，就不会创建新的线程和处理程序。\n\
  \n### 工作线程与主线程之间的通信\n\n接下来，我们将介绍 `ReportStatusHandler` 和 `WorkerThreadRunnable`\
  \ 这两个类。我们之前没有展示它们，是因为我们希望采用自上而下的方式来讲解：先规划并说明高层需求，再深入探讨每个概念的具体实现细节。\n\n#### WorkerThreadRunnable\
  \ 的实现\n\n现在，我们通过 `WorkerThreadRunnable` 类来看看工作线程在做什么。`WorkerThreadRunnable` 类的源代码在清单\
  \ 13–7 中。快速浏览一下这个清单，特别是代码中的注释，以了解它可能的功能。清单之后，我们将解释关键概念。\n\n**清单 13–7.** *工作线程的实现*\n\
  \n```\n//主要职责\n//1. 执行工作\n//2. 通知父活动\npublic class WorkerThreadRunnable implements\
  \ Runnable\n{\n    //与主线程通信的处理程序\n    //在构造函数中设置\n    Handler statusBackMainThreadHandler\
  \ = null;\n\n    public WorkerThreadRunnable(Handler h)\n    {\n        statusBackMainThreadHandler\
  \ = h;\n    }\n\n    //通常的调试标签\n    public static String tag = \"WorkerThreadRunnable\"\
  ;\npublic void run()\n    {\n        Log.d(tag,\"开始执行\");\n        //查看是哪个线程在执行此代码\n\
  //下面的方法来自清单 13–1\n        //它会打印出线程 ID 和名称\n        Utils.logThreadSignature();\n\
  \n        //通知父活动，工作线程已\n        //开始工作\ninformStart();\n        for(int i=1;i <=\
  \ 5;i++)\n        {\n            //在实际应用中，睡眠位置\n            //将执行实际工作。\nUtils.sleepForInSecs(1);\n\
  \              //回传工作进度\ninformMiddle(i);\n        }\ninformFinish();\n    }\n\n\
  \    public void informMiddle(int count)\n    {\n        Message m = this.statusBackMainThreadHandler.obtainMessage();\n\
  \        m.setData(Utils.getStringAsABundle(\"已完成:\" + count));\n        this.statusBackMainThreadHandler.sendMessage(m);\n\
  \    }\n\n    public void informStart()\n    {\n        Message m = this.statusBackMainThreadHandler.obtainMessage();\n\
  \        m.setData(Utils.getStringAsABundle(\"开始运行\"));\n        this.mainThreadHandler.sendMessage(m);\n\
  \    }\n    public void informFinish()\n    {\n        Message m = this.statusBackMainThreadHandler.obtainMessage();\n\
  \        m.setData(Utils.getStringAsABundle(\"运行结束\"));\n        this.statusBackMainThreadHandler.sendMessage(m);\n\
  \    }\n}\n```\n\n清单 13–7 中有两件重要的事。在 `run()` 方法中，我们让线程休眠 1 秒钟，并调用 inform 方法来告知主线程工作线程正处于处理过程的开始、中间还是结束阶段。\n\
  \n我们还调用了 `Utils.logThreadSignature()` 来标识当前线程。\n\n然而，在实际应用中，这段代码将根据需要使用 `sleep()`\
  \ 方法以外的方式来调用一个有用的函数。你可以将 `sleep()` 视为模拟一个耗时若干秒的工作项。\n\n#### ReportStatusHandler\
  \ 的实现\n\n清单 13–7 中的所有 inform 方法都会创建一个合适的字符串消息，并通过 `ReportStatusHandler` 将其发送到主线程，该处理程序如清单\
  \ 13–8 所示。\n\n**清单 13–8.** *向主线程发送状态*\n\n```\npublic class ReportStatusHandler extends\
  \ Handler\n{\n    public static final String tag = \"ReportStatusHandler\";\n\n\
  \    //记住父活动，以便\n    //我们可以向其报告进度\n    private TestHandlersDriverActivity\n    \
  \             parentTestHandlersDriverActivity = null;\n\n    public ReportStatusHandler(\n\
  \                TestHandlersDriverActivity inParentActivity){\n        parentTestHandlersDriverActivity\
  \ = inParentActivity;\n    }\n\n    @Override\npublic void handleMessage(Message\
  \ msg)\n    {\n        //从消息中获取字符串数据\n        String pm = Utils.getStringFromABundle(msg.getData());\n\
  \        Log.d(tag,pm);\n        //通知父活动发生了某事\n        this.printMessage(pm);\n\
  \        //断言此代码运行在主线程上\n        Utils.logThreadSignature();\n    }\n\n    private\
  \ void printMessage(String xyz){\n        parentTestHandlersDriverActivity.appendText(xyz);\n\
  \    }\n}\n```\n\n这个类的代码很直接。当此处理程序接收到 `handleMessage()` 时，它会通过 `appendText()` 方法告知父驱动活动：工作线程已发送了一个状态字符串。父活动可以根据该消息执行任何必要的操作。在我们的案例中，我们只是将其记录到活动屏幕上。\n\
  \n到目前为止，我们通过处理程序示例演示了以下内容：\n\n通过 `DeferWorkHandler` 处理程序示例：\n\n*   通过 `DeferWorkHandler`，我们展示了主线程如何调度一个（或多个）消息在稍后的时间（延迟）处理。该技术也可用于在不使用定时器或闹钟管理器的情况下执行重复处理。\n\
  *   通过 `ReportStatusHandler` 和一个 `WorkerThread`，我们展示了如何启动一个独立的工作线程，并让该工作线程通过处理程序与主\
  \ UI 进行通信。\n\n\n\n#### 线程行为快速概览\n\n既然我们是为了响应菜单项而启动了一个线程，自然就会担心是否需要停止它。线程在完成 `run()`\
  \ 方法时自动停止。事实上，我们建议不要从外部停止一个正在运行的线程，因为这可能会在中途终止其工作。推荐的做法是设置一个标志，让线程识别该标志并优雅地退出 `run()`\
  \ 方法。\n\n了解线程的各种状态也很有价值。线程具有以下状态：\n\n*   ***新建**线程*：有人创建了它（`alive=false`）。\n*  \
  \ ***可运行**线程*：有人调用了它的 start 方法（`alive=true`）。\n*   ***不可运行**线程*：处于睡眠、挂起、等待、被调用或\
  \ I/O 阻塞状态（`alive=true`）。\n*   ***死亡**线程*：当调用了 `stop()` 或 `run()` 方法退出时（`alive=false`）。\n\
  \n线程的 `isAlive()` 方法告诉我们该线程已被启动但尚未停止。这意味着该线程处于 `可运行` 或 `不可运行` 状态。如果它返回 `false`，则该线程可能是一个新建线程或死亡线程。\n\
  \n在处理线程时，你可能需要注意线程的状态。\n\n### 处理程序示例驱动类\n\n到目前为止，我们已经展示了以下类的源代码：\n\n*   `DeferWorkHandler.java`：具有延迟功能的能力（参见清单\
  \ 13-4）。\n*   `ReportStatusHandler.java`：工作线程的通信载体（参见清单 13-8）。\n*   `WorkerThreadRunnable.java`：工作线程的实现（参见清单\
  \ 13-7）。\n*   `Utils.java`：包含一些线程工具（参见清单 13-1）。\n\n现在是时候向你展示完整的驱动活动类源代码了，该类响应菜单项并调用我们讨论过的功能。我们还将提供菜单资源和清单文件的源代码，以便你拥有创建项目并实践这些概念所需的所有类。\n\
  \n当你尝试编译这些文件时，请注意这些代码清单不包含包名或导入语句。使用 Eclipse 可以轻松地重新创建导入语句。在 Eclipse 中打开源文件时，按 `Ctrl+Shift+O`，Eclipse\
  \ 将自动填入必要的导入语句。\n\n至于包名，你可以查看清单文件来了解此应用程序使用的包名。你需要将该包名放在 Java 源文件的顶部。由于所有这些文件都设计在同一个包中，你甚至可以根据需要更改包名，并在后续的清单文件中使用该包名。\n\
  \n**注意：** 你也可以使用本章“参考资料”部分中的链接下载预构建的项目 ZIP 文件。该 ZIP 文件的名称为 `ProAndroid3_Ch13_TestHandlers.zip`。要创建项目，请解压缩此文件，然后将项目导入你的\
  \ Eclipse ADT 环境中。\n\n再次强调，你需要编译的其他文件列表如下：\n\n*   `TestHandlersDriverActivity.java`：主驱动活动（参见清单\
  \ 13-9）\n*   `layout/main.xml`：`TestHandlersDriverActivity` 的布局文件（参见清单 13-10）\n\
  *   `res/menu/main_menu.xml`：用于调用处理程序的菜单（参见清单 13-11）\n*   `AndroidManifest.xml`：常规清单文件（参见清单\
  \ 13-12）\n\n以下各节将逐一解释这些文件。\n\n#### 驱动活动文件\n\n以下是这些文件中的第一个，`TestHandlersDriverActivity.java`。这个类是一个简单的活动，其中包含一个文本视图。该文本视图将列出被点击的菜单项。有一个菜单项用于测试延迟处理程序，另一个菜单项用于测试工作线程。来自工作线程的消息也会记录到此文本视图中。\n\
  \n该类在末尾还包含一个活动生命周期方法列表。这是因为我们将检查主线程及其队列与活动生命周期相关的行为。代码在清单 13-9 中。\n\n**清单 13-9.**\
