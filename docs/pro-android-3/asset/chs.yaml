  \  super.onCreate(icicle);\n        this.setCancelable(true);\n        int style\
  \ = DialogFragment.STYLE_NORMAL, theme = 0;\n        setStyle(style,theme);\n  \
  \  }\n```\n\n\n\n```java\n// Java 代码部分无需翻译，直接保留\npublic View onCreateView(LayoutInflater\
  \ inflater,\n        ViewGroup container, Bundle icicle)\n{\n    // ... 代码保持不变 ...\n\
  }\n```\n\n您的提示对话框布局与之前见过的许多布局类似。其中包含一个用于显示提示的 `TextView`；一个用于接收用户输入的 `EditText`；以及三个按钮，分别用于保存输入、关闭（即取消）对话框片段，以及弹出帮助对话框。\n\
  \n您的 `PromptDialogFragment` Java 代码一开始看起来与之前的片段相同。您有一个 `newInstance()` 静态方法来创建新对象，在该方法中，您调用默认构造函数，构建参数包，并将其附加到新对象上。接下来，`onAttach()`\
  \ 回调中有一些新内容。您需要确保刚刚附加到的活动已实现了 `OnDialogDoneListener` 接口。为了验证这一点，您将传入的活动转换为 `OnDialogDoneListener`\
  \ 接口。如果活动未实现此接口，将会抛出 `ClassCastException`。您本可以处理此异常并以更优雅的方式应对，但为了保持代码尽可能简单，当前暂未处理。\n\
  \n接下来是 `onCreate()` 回调。与片段的常见做法相同，您不会在此处构建用户界面，但可以设置对话框样式。这是对话框片段独有的特性。您可以自行设置样式和主题，也可以仅设置样式并将主题值设为零(0)，让系统为您选择合适的主题。\n\
  \n在 `onCreateView()` 中，您为对话框片段创建视图层次结构。与其他片段一样，您不要将视图层次结构附加到传入的视图容器上（即，将 `attachToRoot`\
  \ 参数设为 `false`）。接着，您设置按钮回调，并将对话框提示文本设置为一开始传递给 `newInstance()` 的提示内容。最后，您检查是否有任何值通过\
  \ icicle 包传入。这表示您的片段正在被重新创建，很可能是因为配置变更，并且用户可能已经输入了一些文本。如果是这样，您需要用用户已输入的内容填充 `EditText`。请记住，由于配置已更改，内存中实际的视图对象与之前不同，因此您必须找到它并相应设置文本。接下来的回调是\
  \ `onSaveInstanceState()`，您在此处将用户当前输入的任何文本保存到 icicle 包中。\n\n`onCancel()` 和 `onDismiss()`\
  \ 回调仅出于日志记录目的而展示，这样您就能在片段生命周期中看到这些回调何时触发。\n\n提示对话框片段中的最后一个回调用于处理按钮。同样，您获取对包含该片段的活动的引用，并将其转换为期望活动已实现的接口。如果用户按下“保存”按钮，您获取输入的文本，并调用接口的回调\
  \ `onDialogDone()`。如前所示，此回调接收该片段的标签名、一个指示该对话框片段是否被取消的布尔值，以及一条消息（此处为用户输入的文本）。\n\n\
  然后，您调用 `dismiss()` 来移除对话框片段。请记住，`dismiss()` 不仅会让片段在视觉上消失，还会将片段从片段管理器中弹出，使其不再可用。如果按下的按钮是“关闭”，您再次调用接口回调，这次不传递消息，然后调用\
  \ `dismiss()`。最后，如果用户按下了“帮助”按钮，您实际上不想丢失提示对话框片段，因此您采取了略有不同的做法。我们之前描述过这一点。为了记住您的提示对话框片段，以便稍后能返回，您需要创建一个片段事务来移除提示对话框片段，并使用\
  \ `show()` 方法添加帮助对话框片段；这需要将其放入返回栈中。同时请注意，帮助对话框片段是如何通过资源 ID 引用创建的。这意味着您的帮助对话框片段可以与应用程序中提供的任何帮助文本一起使用。\n\
  \n\n\n##### 对话框示例：`HelpDialogFragment`\n\n我们将稍后展示帮助对话框片段的代码，但先描述其操作流程。你创建了一个片段事务，用于从提示对话框片段跳转到帮助对话框片段，并将该事务添加到返回栈中。这使得提示对话框片段从视图中消失，但仍可通过片段管理器和返回栈访问。新的帮助对话框片段取而代之，让用户阅读帮助文本。当用户关闭帮助对话框片段时，返回栈中的条目会被弹出，导致帮助对话框片段被移除（视觉上及片段管理器中均如此），而提示对话框片段恢复显示。这实际上是一种非常简单的实现方式。代码清单\
  \ 29–21 中的代码简洁却功能强大；即使在显示这些对话框时用户旋转设备，它也能正常工作。\n\n**代码清单 29–21.** *HelpDialogFragment\
  \ 布局与 Java 代码*\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<!-- 此文件位于 /res/layout/help_dialog.xml\
  \ -->\n<LinearLayout\n    android:orientation=\"vertical\" android:padding=\"4dip\"\
  \n    android:layout_width=\"match_parent\"\n    android:layout_height=\"match_parent\"\
  >\n\n    <TextView\n        android:id=\"@+id/helpmessage\"\n        android:layout_height=\"\
  wrap_content\"\n        android:layout_width=\"wrap_content\"\n        android:layout_marginLeft=\"\
  20dip\"\n        android:layout_marginRight=\"20dip\"\n        android:text=\"帮助文本\"\
  \n        android:layout_weight=\"1\"\n        android:layout_gravity=\"center_vertical|center_horizontal\"\
  \n        android:textAppearance=\"?android:attr/textAppearanceMedium\"\n      \
  \  android:gravity=\"top|center_horizontal\" />\n\n      <Button android:id=\"@+id/btn_close\"\
  \n        android:layout_width=\"wrap_content\"\n        android:layout_height=\"\
  wrap_content\"\n        android:layout_weight=\"0\"\n        android:text=\"关闭\"\
  >\n      </Button>\n\n</LinearLayout>\n\n// 此文件为 HelpDialogFragment.java\nimport\
  \ android.app.DialogFragment;\nimport android.os.Bundle;\nimport android.view.LayoutInflater;\n\
  import android.view.View;\nimport android.view.ViewGroup;\nimport android.widget.Button;\n\
  import android.widget.TextView;\n\npublic class HelpDialogFragment\nextends DialogFragment\n\
  implements View.OnClickListener\n{\n    public static HelpDialogFragment\n    newInstance(int\
  \ helpResId)\n    {\n        HelpDialogFragment hdf = new HelpDialogFragment();\n\
  \        Bundle bundle = new Bundle();\n        bundle.putInt(\"help_resource\"\
  , helpResId);\n        hdf.setArguments(bundle);\n\n        return hdf;\n    }\n\
  \n    @Override\n    public void onCreate(Bundle icicle)\n    {\n        super.onCreate(icicle);\n\
  \        this.setCancelable(true);\n        int style = DialogFragment.STYLE_NORMAL,\
  \ theme = 0;\n        setStyle(style,theme);\n    }\n\n    public View onCreateView(LayoutInflater\
  \ inflater,\n            ViewGroup container,\n            Bundle icicle)\n    {\n\
  \        View v = inflater.inflate(R.layout.help_dialog, container,\n          \
  \                        false);\n\n        TextView tv = (TextView)v.findViewById(R.id.helpmessage);\n\
  \        tv.setText(getActivity().getResources()\n                .getText(getArguments().getInt(\"\
  help_resource\")));\n\n        Button closeBtn = (Button)v.findViewById(R.id.btn_close);\n\
  \        closeBtn.setOnClickListener(this);\n        return v;\n    }\n\n    public\
  \ void onClick(View v)\n    {\n        dismiss();\n    }\n}\n```\n\n这里又有一个对话框片段，它甚至比上一个更简单。这个对话框片段的目的是显示一些帮助文本。布局包含一个\
  \ `TextView` 和一个关闭按钮。Java 代码现在对你来说应该已经熟悉了。有一个 `newInstance()` 方法用于创建新的帮助对话框片段，一个\
  \ `onCreate()` 方法用于设置样式和主题，以及一个 `onCreateView()` 方法用于构建视图层次结构。在这个特定场景中，你需要定位一个字符串资源来填充\
  \ `TextView`，因此通过 Activity 访问资源，并选择传入 `newInstance()` 的资源 ID。最后，`onCreateView()`\
  \ 设置了一个按钮点击处理器来捕获关闭按钮的点击事件。在这种情况下，你无需在关闭时执行任何特殊操作。\n\n这个片段有两种调用方式：从 Activity 调用和从提示对话框片段调用。当从主\
  \ Activity 显示这个帮助对话框片段时，关闭它会简单地将该片段从顶部弹出，并显露下方的 Activity。当从提示对话框片段显示这个帮助对话框片段时，由于该片段是返回栈上片段事务的一部分，关闭它将导致片段事务回滚，这会弹出帮助对话框片段，但会恢复提示对话框片段。用户将看到提示对话框片段重新出现。\n\
  \n\n\n##### 对话框示例：AlertDialogFragment\n\n在本示例应用中，我们最后要展示的对话片段是警告对话框片段。虽然你可以像创建帮助对话框片段那样创建警告对话框片段，但也可以使用在多个\
  \ Android 版本中都兼容的旧式 `AlertBuilder` 框架来创建。清单 29–22 展示了警告对话框片段的源代码。\n\n**清单 29–22.**\
  \ *AlertDialogFragment 的 Java 代码*\n\n```\nimport android.app.AlertDialog;\nimport\
  \ android.app.Dialog;\nimport android.app.DialogFragment;\nimport android.content.DialogInterface;\n\
  import android.os.Bundle;\n\npublic class AlertDialogFragment\nextends DialogFragment\n\
  implements DialogInterface.OnClickListener\n{\n    public static AlertDialogFragment\n\
  \    newInstance(String message)\n    {\n        AlertDialogFragment adf = new AlertDialogFragment();\n\
  \        Bundle bundle = new Bundle();\n        bundle.putString(\"alert-message\"\
  ,message);\n        adf.setArguments(bundle);\n\n        return adf;\n    }\n\n\
  \    @Override\n    public void onCreate(Bundle savedInstanceState)\n    {\n   \
  \     super.onCreate(savedInstanceState);\n        this.setCancelable(true);\n \
  \       int style = DialogFragment.STYLE_NORMAL, theme = 0;\n        setStyle(style,theme);\n\
  \    }\n\n    @Override\n    public Dialog onCreateDialog(Bundle savedInstanceState)\n\
  \    {\n        AlertDialog.Builder b =\n            new AlertDialog.Builder(getActivity());\n\
  \        b.setTitle(\"Alert!!\");\n        b.setPositiveButton(\"Ok\", this);\n\
  \        b.setNegativeButton(\"Cancel\", this);\n        b.setMessage(this.getArguments().getString(\"\
  alert-message\"));\n        return b.create();\n    }\n\n    public void onClick(DialogInterface\
  \ dialog, int which)\n    {\n        OnDialogDoneListener act = (OnDialogDoneListener)\
  \ getActivity();\n        boolean cancelled = false;\n        if (which == AlertDialog.BUTTON_NEGATIVE)\n\
  \        {\n            cancelled = true;\n        }\n        act.onDialogDone(getTag(),\
  \ cancelled, \"Alert dismissed\");\n    }\n}\n```\n\n这个对话框不需要布局文件，因为 `AlertBuilder`\
  \ 会为你处理。你会注意到，这个对话框片段的起始方式与其他片段类似，但不同的是，我们不再使用 `onCreateView()` 回调，而是改用 `onCreateDialog()`\
  \ 回调。你只能实现 `onCreateView()` 或 `onCreateDialog()` 其中之一，不能同时实现。`onCreateDialog()`\
  \ 的返回值不是视图，而是一个 `Dialog`。现在，你可以复用之前在第 8 章中学到的知识，以传统方式构建对话框。不同之处在于，为了获取对话框的参数，你需要访问参数\
  \ bundle。在这个示例应用中，我们只获取了警告消息，但也可以从 arguments bundle 中访问其他参数。\n\n另外请注意，对于这种类型的对话框片段，你的片段类需要实现\
  \ `DialogInterface.OnClickListener` 接口，这意味着对话框片段必须实现 `onClick()` 回调。当用户对嵌入的对话框进行操作时，就会触发此回调。同样，你会获得对触发该回调的对话框的引用，以及被按下的按钮指示。和之前一样，我们需要注意不要依赖\
  \ `onDismiss()` 方法，因为当设备配置发生变化时，此方法仍可能被触发。\n\n##### 对话框示例：主布局 main.xml\n\n为了完整性，清单\
  \ 29–23 显示了主 Activity 的布局。\n\n**清单 29–23.** *主布局*\n\n```\n<?xml version=\"1.0\"\
  \ encoding=\"utf-8\"?>\n<!-- /res/layout/main.xml -->\n<LinearLayout\n\n    android:orientation=\"\
  vertical\"\n    android:layout_width=\"match_parent\"\n    android:layout_height=\"\
  match_parent\"\n    android:gravity=\"fill\"\n>\n<TextView android:id=\"@+id/textViewId\"\
  \n    android:layout_width=\"match_parent\"\n    android:layout_height=\"match_parent\"\
  \n    android:background=\"@android:color/white\"\n    android:text=\"@string/help_text\"\
  \n    android:textColor=\"@android:color/black\"\n    android:textSize=\"25sp\"\n\
  \    android:scrollbars=\"vertical\"\n    android:scrollbarStyle=\"insideOverlay\"\
  \n    android:scrollbarSize=\"25dip\"\n    android:scrollbarFadeDuration=\"0\"\n\
  \    />\n</LinearLayout>\n```\n\n运行此示例应用时，请确保在不同设备方向上尝试所有菜单选项。尝试在对话框片段显示时旋转设备。你会惊喜地发现，对话框会随着旋转而适应，并且你无需编写大量代码来管理因配置变化导致的片段保存与恢复。\n\
  \n另外，我们希望你能够体会到片段与 Activity 之间通信的便捷性。当然，Activity 拥有或能够获取所有可用片段的引用，因此它可以访问片段自身暴露的方法。这并不是片段之间以及与\
  \ Activity 通信的唯一方式。你始终可以使用片段管理器上的 getter 方法来获取被管理片段的实例，然后适当地转换该引用，并直接调用该片段上的方法。你甚至可以在另一个片段内部执行此操作。通过接口和\
  \ Activity 将片段相互隔离的程度，或者通过片段间通信建立依赖关系的程度，取决于你的应用程序的复杂程度以及你想要实现的重用程度。\n\n### 与片段的更多通信方式\n\
  \n我们介绍了一种在片段之间进行通信的简洁方法，即定义并使用一个接口，实现从片段到调用 Activity 的回调。但这并非片段间通信的唯一方式。由于片段管理器知道当前\
  \ Activity 所关联的所有片段，因此 Activity 或该 Activity 中的任何片段都可以使用前面介绍的 getter 方法来请求任何其他片段。\n\
  \n一旦获取了片段引用，Activity 或片段就可以适当地转换该引用，然后直接在该 Activity 或片段上调用方法。这将导致你的片段对其他片段了解得比通常希望的更多，但不要忘记你是在移动设备上运行此应用程序，因此有时牺牲一些规范性也是合理的。清单\
  \ 29–24 中的代码片段展示了一个片段如何与另一个片段直接通信。\n\n**清单 29–24.** *直接的片段间通信*\n\n```\nFragmentOther\
  \ fragOther =\n        (FragmentOther)getFragmentManager().findFragmentByTag(\"\
  other\");\nfragOther.callCustomMethod( arg1, arg2 );\n```\n\n在清单 29–24 中，没有涉及接口。当前片段直接了解另一个片段的类以及该类中存在哪些方法。由于这些片段是同一个应用的一部分，简单地接受某些片段会了解其他片段这一事实，可能是可行的。\n\
  \n\n\n### 使用 `startActivity()` 和 `setTargetFragment()`\n\nFragment 有一个与 Activity\
  \ 非常相似的功能：Fragment 可以启动一个 Activity。Fragment 提供了 `startActivity()` 和 `startActivityForResult()`\
  \ 方法，它们的工作方式与 Activity 中的对应方法相同。当结果返回时，会触发启动该 Activity 的 Fragment 上的 `onActivityResult()`\
  \ 回调。\n\n还有另一种你应当了解的通信机制。当一个 Fragment 想要启动另一个 Fragment 时，可以利用一项功能，让调用方 Fragment\
  \ 向被调用方 Fragment 声明自己的身份。清单 29–25 展示了一个可能的示例。\n\n**清单 29–25.** *Fragment 到目标 Fragment\
  \ 的设置*\n\n```\nmCalledFragment = new CalledFragment();\nmCalledFragment.setTargetFragment(this,\
  \ 0);\nfm.beginTransaction().add(mCalledFragment, \"work\").commit();\n```\n\n通过这几行代码，你创建了一个新的\
  \ `CalledFragment` 对象，将被调用 Fragment 的目标 Fragment 设置为当前 Fragment，并使用 Fragment 事务将被调用\
  \ Fragment 添加到 Fragment 管理器及 Activity 中。当被调用的 Fragment 开始运行时，它能够调用 `getTargetFragment()`，该方法将返回一个对调用方\
  \ Fragment 的引用。利用这个引用，被调用的 Fragment 可以调用调用方 Fragment 的方法，甚至直接访问其视图组件。例如，在清单 29–26\
  \ 中，被调用的 Fragment 可以直接在调用方 Fragment 的 UI 中设置文本。\n\n**清单 29–26.** *目标 Fragment 与\
  \ Fragment 之间的通信*\n\n```\nTextView tv = (TextView)\n    getTargetFragment().getView().findViewById(R.id.text1);\n\
  tv.setText(\"Set from the called fragment\");\n```\n\n### 使用 `ObjectAnimator` 实现自定义动画\n\
  \n先前，我们介绍过 Fragment 上的一些自定义动画。你使用了自定义动画来淡出当前的详情 Fragment，同时淡入新的详情 Fragment。当时我们也提到，Android\
  \ SDK 内置的标准动画数量有限，且有些甚至无法正常工作。本节将帮助你理解如何创建自己的自定义动画，以便在旧 Fragment 与新 Fragment 之间实现有趣的过渡效果。\n\
  \n在 Fragment 上实现自定义动画的机制是 `ObjectAnimator` 类。这实际上是 Android 中的一个通用功能，可以应用于 View 对象，而不仅仅是\
  \ Fragment。本节我们只关注 Fragment，但其中的原理同样适用于其他对象。对象动画器是一种工具，它接收一个对象，并在一段时间内将其从“起始”状态动画过渡到“目标”状态。这段时间以毫秒为单位定义在动画器中。此外，还存在一个例程，用于定义动画在该时间段内的行为方式，这些例程被称为**插值器**。\n\
  \n如果你将从“起始”状态到“目标”状态的过渡想象成一条直线，那么插值器定义了在该时间段的任意时刻，过渡处于这条直线上的哪个位置。最简单的插值器之一是线性插值器：它将直线等分，并在整个时间段内均匀地逐步通过这些等分点。其效果是对象以恒定速度从“起始”移动到“目标”，开始时没有加速，结束时也没有减速。\n\
  \n默认的插值器是 `accelerate_decelerate`，它增加了平滑的加速开始和平滑的减速结束。真正有趣的是，插值器甚至可能越过直线上的“目标”点再折返回来——这就是超调插值器的行为。还有一种名为“弹跳”的插值器，它从“起始”移动到“目标”，但当它首次到达“目标”点时，会向“起始”方向弹回几次，最终稳定在“目标”点上。\n\
  \n插值器作用于对象的某个维度。对于之前用到的 `fade_in` 和 `fade_out` 动画器，其维度是 Fragment 的 alpha（即对象的透明度）。`fade_in`\
  \ 动画器将 alpha 维度从 0 过渡到 1。`fade_out` 动画器则将另一个 Fragment 的 alpha 维度从 1 过渡到 0。这样，一个\
  \ Fragment 从不可见变为完全可见，而另一个则从完全可见变为不可见。\n\n在幕后，对象动画器会找到 Fragment 的根视图，并反复调用 `setAlpha()`\
  \ 方法，每次调用时都在时间段内略微改变参数值。重复调用的频率取决于插值器。线性插值器会按固定的时间间隔规律地调用。而 `accelerate_decelerate`\
  \ 插值器则一开始在每个时间单位内设置的参数值较小，随后将参数值增大，从而产生加速的效果；然后在另一端进行相反操作，使对象看起来在其维度上减速。\n\n维度可以是\
  \ View 上许多可设置和可获取的值。实际上，对象动画器会利用反射来操作正在被处理的视图。如果你指定要对旋转进行动画，对象动画器会调用该对象（或对象的视图）的\
  \ `setRotation()` 方法。动画器接收“起始”值和“目标”值，并使用它们将对象从“起始”动画到“目标”。如果“起始”值未指定，则会确定一个 getter\
  \ 方法，并用它从对象获取当前值。现在，让我们看看这如何应用于你的 Fragment。\n\n\n\n`FragmentTransaction`类中唯一指定自定义动画的方法是`setCustomAnimations()`，它接受两个资源\
  \ ID 参数。\n\n- 第一个参数指定进入视图容器的片段所使用的动画资源。\n- 第二个参数指定退出视图容器的片段所使用的动画资源。\n\n这两个动画不一定需要有关联，但从视觉上看最好将它们配对使用。换句话说，如果你淡出一个片段，就应该淡入另一个片段。或者如果你将一个片段向右滑出，则从左侧滑入另一个片段。\n\
  \n动画资源可以在 Android SDK 文件夹中找到，位于相应平台下的`/data/res/animator`目录。你之前使用的`fade_in.xml`和`fade_out.xml`就在这个位置。你也可以创建自己的动画。如果你决定创建自己的动画，最好使用项目中的`/res/animator`目录，如有需要可手动创建。关于简单本地动画\
  \ XML 文件（`slide_in_left.xml`）的示例，请参考清单 29-27。\n\n**清单 29-27.** *从左侧滑入的自定义动画*\n\n\
  ```xml\n<?xml version=\"1.0\" encoding=\"utf-8\" ?>\n<objectAnimator\n    android:interpolator=\"\
  @android:interpolator/accelerate_decelerate\"\n    android:valueFrom=\"-1280\"\n\
  \    android:valueTo=\"0\"\n    android:valueType=\"floatType\"\n    android:propertyName=\"\
  x\"\n    android:duration=\"2000\" />\n```\n\n这个资源文件使用了（Android 3.0 中新增的）`objectAnimator`标签。该文件的基本结构你应该很熟悉。它通过一系列`android:`属性来指示你想要执行的操作。对于`objectAnimator`，你需要指定几个东西。第一个是插值器。可用的类型列在`android.R.interpolator`中。根据你对资源命名规则的了解，`interpolator`属性指向\
  \ Android SDK 中相应平台下`/data/res/interpolator`目录的一个文件，文件名为`accelerate_decelerate.xml`。\n\
  \n`android:propertyName`属性指定了你想要动画化的维度。在本例中，你希望对 X 维度进行动画化。如果你查看`View`上的`setX()`方法，会发现它接受一个`float`类型的参数，这就是为什么`android:valueType`属性设置为`floatType`。`android:duration`值设置为\
  \ 2000，即 2 秒。对于真正的生产应用来说这可能太慢了，但它有助于你观察动画的发生过程。最后，`android:valueFrom`和`android:valueTo`属性的值分别为-1280\
  \ 和 0。这样选择是因为你希望动画完成时片段位于 0 位置。也就是说，你希望动画停止时片段对用户可见，其左边缘与视图容器的左边缘对齐。由于你想要实现片段从左侧滑入的效果，它需要从左侧外部开始，而-1280\
  \ 看起来是一个足够大的数字来实现这一效果。正如你所料，向右滑出的动画资源文件与清单 29-27 非常相似，区别在于`valueFrom`为 0，而`valueTo`为某个大的正数，例如\
  \ 1280。\n\n大多数情况下，你会发现你想要动画化的维度是`floatType`，尽管有时你可能会选择`intType`。只需查看 setter 方法所需的参数类型即可。这正是`objectAnimator`的强大之处。实际上，它并不关心\
  \ setter 方法来自哪里。这意味着你可以向对象添加自己的维度，而`objectAnimator`可以为你将其动画化。你只需要提供 setter 方法，然后在资源文件中设置属性，剩下的工作由`objectAnimator`完成。这里有一个注意事项：如果你在\
  \ XML 中没有指定`valueFrom`属性，`objectAnimator`将使用 getter 方法来确定对象的起始值。getter 方法必须返回与维度相对应的适当类型。\n\
  \n你可能还希望对多个维度同时进行动画化。为此，你可以使用`<set>`标签来包含多个`<objectAnimator>`标签。清单 29-28 展示了一个同时沿\
  \ Y 轴动画化并改变透明度的动画资源文件（`slide_out_down.xml`）。\n\n**清单 29-28.** *沿 Y 轴和透明度动画化的自定义动画*\n\
  \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\" ?>\n<set >\n<objectAnimator\n\
  \    android:interpolator=\"@android:interpolator/accelerate_cubic\"\n    android:valueFrom=\"\
  0\"\n    android:valueTo=\"1280\"\n    android:valueType=\"floatType\"\n    android:propertyName=\"\
  y\"\n    android:duration=\"2000\" />\n<objectAnimator\n    android:interpolator=\"\
  @android:interpolator/accelerate_cubic\"\n    android:valueFrom=\"1\"\n    android:valueTo=\"\
  0\"\n    android:valueType=\"floatType\"\n    android:propertyName=\"alpha\"\n \
  \   android:duration=\"2000\" />\n</set>\n```\n\n`<set>`标签对应于 Android 中的`AnimatorSet`类；不过在\
  \ XML 中，`<set>`只有一个属性，即`android:ordering`。允许的属性值包括`together`（默认值），它使包含的`objectAnimator`并行运行，以及`sequential`，它使`objectAnimator`按照\
  \ XML 文件中声明的顺序依次运行。\n\n### 总结\n\n本章介绍了 Android 3.0 中的一个核心新类`Fragment`及其相关类，包括管理器、事务和子类。片段是一种组织功能及对应用户界面的强大新方式。虽然它们最初是为平板电脑屏幕开发的，但片段也将可用于小屏幕设备，帮助将行为封装成整洁、独立的部分，这些部分可以以你之前无法实现的方式进行重用、移动和管理。你了解了\
  \ Android 中一个很酷的新特性`objectAnimator`，它可以非常容易地使片段过渡变得非常有趣。\n\n下一章将介绍 Android 平板电脑应用的另一个重要新方面，即`ActionBar`。\n\
  \n## 第 30 章\n\n\n\n"
- "# 探索 ActionBar\n\n`ActionBar` 是 Android 3.0 SDK 中的一个新 API。它允许你自定义 Activity 的标题栏。在\
  \ 3.0 SDK 发布之前，Activity 的标题栏仅包含 Activity 的标题。\n\n随着 Android SDK 每个新版本的发布而日益成熟，它正在越来越多地采用桌面\
  \ UI 模式。在桌面应用程序中，你会看到一个菜单栏和许多操作图标。`ActionBar` 的实现正是模拟了这种桌面标题/菜单栏模式。\n\nAndroid 的\
  \ `ActionBar` 尤其模仿了 Web 浏览器的菜单/标题栏。`ActionBar` 的设计方式使得你可以将熟悉的类似浏览器的导航模式应用到你的应用程序中。\n\
  \n**注意：** 在本章中，我们同时指代 `ActionBar` 和“操作栏”。当我们说 `ActionBar` 时，指的是实际的类；当我们想讨论这个概念时，我们称之为“操作栏”。\n\
  \n操作栏设计的一个关键目标是让用户无需在选项菜单或上下文菜单中搜索，就能轻松访问常用操作。\n\n**注意：** 在当前的计算机技术文献中，便捷地访问操作被时髦地称为“直观示能”（Affordance），它指的是能够方便地发现/调用操作的能力。我们在本章末尾附上了一些关于直观示能的参考网址。\n\
  \n在本章中，我们将演示有关操作栏的以下内容：\n\n> - 操作栏属于某个 `Activity`，并遵循其生命周期。\n> - 操作栏可以采用三种形式之一：标签式操作栏、列表式操作栏和标准操作栏。我们将展示这些不同的操作栏在每种模式下的外观和行为。\n\
  > - 我们将讨论标签监听器如何让我们与标签式操作栏进行交互。\n> - 我们将讨论如何使用微调适配器和列表监听器与列表式操作栏进行交互。\n> - 我们将向你展示操作栏的主页图标如何与菜单基础设施进行交互。\n\
  > - 我们将向你展示图标菜单项如何在操作栏区域中显示并进行响应。\n\n我们将通过规划三个不同的 Activity 来演示这些概念。每个 Activity 将以不同的模式展示一个操作栏。这将让我们有机会检查操作栏在每种模式下的行为。但首先，让我们快速浏览一下操作栏的视觉方面。\n\
  \n### 操作栏的结构\n\n图 30-1 显示了一个典型的标签导航模式下的操作栏。\n\n![images](img/3001.jpg)\n\n**图 30-1.**\
  \ *一个带有标签式 ActionBar 的 Activity*\n\n此截图取自本章后面部分提供的实际工作示例。图 30-1 中的这个操作栏包含五个部分。这些部分（从左到右）包括：\n\
  \n> - **主页图标区域：** 操作栏左上角的图标有时称为“主页”图标。这类似于网站导航上下文，点击“主页”图标将带你回到起始点。稍后你将看到，点击此主页图标会向选项菜单回调发送一个菜单\
  \ ID 为 `android.R.id.home` 的回调。\n> - **标题区域：** 标题区域显示操作栏的标题。\n> - **标签区域：** 标签区域是操作栏绘制指定标签列表的地方。该区域的内容是可变的。如果操作栏导航模式是“标签”，则此处显示标签。如果模式是列表导航模式，则会显示一个可导航的下拉列表项。在标准模式下，此区域被忽略并留空。\n\
  > - **操作图标区域：** 在标签区域之后，操作图标区域会将某些选项菜单项显示为图标。稍后在我们的示例中，我们将向你展示如何选择哪些选项菜单显示为操作图标。\n\
  > - **菜单图标区域：** 最后一个区域是菜单区域。它是一个单一的标准菜单图标。当你点击此菜单图标时，将看到展开的菜单。根据 Android 设备的大小，此展开菜单的外观会有所不同，或显示在不同的位置。\n\
  \n除了操作栏之外，图 30-1 中的 Activity 还显示了一个调试文本视图，其中记录了许多操作。这些操作可能是点击标签、主页图标、操作菜单或实际选项菜单的结果。\n\
  \n让我们看看如何实现我们之前讨论过的三种类型的操作栏 Activity：标签式操作栏、列表式操作栏和标准操作栏。由于我们已经将标签式操作栏作为操作栏的视觉示例进行了介绍，因此我们将首先实现一个标签式操作栏。\n\
  \n\n\n#### 选项卡导航操作栏活动\n\n尽管我们计划了三种不同的活动，每种都有其自己的操作栏类型，但我们希望所有这些活动都具有许多共通的功能。\n\n\
  > 所有这些活动都拥有相同的调试文本视图，以便我们可以监控被调用的操作。\n> 所有这些活动都拥有相同的“主页”图标。\n> 所有这些活动都有一个标题。\n>\
  \ 所有这些活动都拥有相同的操作图标。\n> 所有这些活动都拥有相同的选项菜单。\n\n这些活动的主要区别在于，每个活动都不同地配置了操作栏。在我们的示例中，我们将把共通行为封装在一个基类中，并允许每个派生活动（包括此选项卡操作栏活动）来配置操作栏。\n\
  \n如果没有至少一个操作栏活动的上下文，很难解释这些通用文件。因此，我们将首先在一个章节中介绍这些通用文件，以及选项卡操作栏活动如何使用这些通用文件。然后，可以将其他两个状态栏活动添加到该项目中，需要的文件会更少。\n\
  \n以下是此选项卡操作栏练习所需的文件列表。这些文件既包括通用文件，也包括特定于选项卡操作栏的文件。列表看起来很多，是因为我们将共通行为封装到基类中。这将减少后续示例所需的文件数量。我们还标明了每个文件的列表编号。\n\
  \n> **DebugActivity.java**：基类活动，允许显示一个调试文本视图，如图 30-1 所示（列表 30-2）。\n>\n> **BaseActionBarActivity.java**：继承自\
  \ `DebugActivity`，并允许通用导航（例如，响应包括在三个活动之间切换在内的通用操作）（列表 30-3）。\n>\n> **IReportBack.java**：一个接口，作为调试活动与操作栏的各种监听器之间的通信工具（列表\
  \ 30-1）。\n>\n> **BaseListener.java**：基础监听器类，与 `DebugActivity` 以及从操作栏调用的各种操作协同工作。作为选项卡监听器和列表导航监听器的基类（列表\
  \ 30-4）。\n>\n> **TabNavigationActionBarActivity.java**：继承自 `BaseActionBarActivity.java`，并将操作栏配置为选项卡操作栏。与选项卡操作栏相关的大部分代码都在此类中（列表\
  \ 30-6）。\n>\n> **TabListener.java**：需要用于向选项卡操作栏添加选项卡。此处是你响应选项卡点击的地方。在我们的例子中，这只是通过\
  \ `BaseListener` 将一条消息记录到调试视图（列表 30-5）。\n>\n> **AndroidManifest.xml**：定义了要调用的活动（列表\
  \ 30-13）。\n>\n> **Layout/main.xml**：`DebugActivity` 的布局文件。由于所有三个状态栏活动都继承自此基类 `DebugActivity`，它们共享此布局文件（列表\
  \ 30-7）。\n>\n> **menu/menu.xml**：一组菜单项，用于测试菜单与操作栏的交互。此菜单文件也在所有派生的状态栏活动之间共享（列表 30-9）。\n\
  \n#### 实现基类活动\n\n许多基类都使用了 `IReportBack` 接口。该接口在前几章中已介绍过。此处它服务于相同的目的。它在列表 30-1 中重新引入，这样你就不必回看之前的章节。\n\
  \n**列表 30-1.** *IReportBack.java*\n\n```java\n//IReportBack.java\npackage com.androidbook.actionbar;\n\
  \npublic interface IReportBack\n{\n   public void reportBack(String tag, String\
  \ message);\n   public void reportTransient(String tag, String message);\n}\n```\n\
  \n实现此接口的类接收一条消息并在屏幕上报告，就像一条调试消息一样。这是通过 `reportBack()` 方法完成的。`reportTransient()`\
  \ 方法执行相同的操作，只是它使用一个 `Toast` 来向用户报告该消息。\n\n在我们的示例中，实现 `IReportBack` 的类是 `DebugActivity`。`DebugActivity`\
  \ 的源代码在列表 30-2 中给出。\n\n**列表 30-2.** *带有调试文本视图的 DebugActivity*\n\n```java\n//DebugActivity.java\n\
  package com.androidbook.actionbar;\n//\n//Use CTRL-SHIFT-0 to import dependencies\n\
  //\npublic abstract class DebugActivity\nextends Activity\nimplements IReportBack\n\
  {\n   //Derived classes needs first\n   protected abstract boolean\n   onMenuItemSelected(MenuItem\
  \ item);\n\n   //private variables set by constructor\n   private static String\
  \ tag=null;\n   private int menuId = 0;\n   private int layoutid = 0;\n   private\
  \ int debugTextViewId = 0;\n\n   public DebugActivity(int inMenuId,\n         int\
  \ inLayoutId,\n         int inDebugTextViewId,\n         String inTag)\n   {\n \
  \     tag = inTag;\n      menuId = inMenuId;\n      layoutid = inLayoutId;\n   \
  \   debugTextViewId = inDebugTextViewId;\n\n   }\n    @Override\n    protected void\
  \ onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(this.layoutid);\n\n        //You need the following to be\
  \ able to scroll\n        //the text view.\n        TextView tv = this.getTextView();\n\
  \        tv.setMovementMethod(\n          ScrollingMovementMethod.getInstance());\n\
  \    }\n    @Override\n    public boolean onCreateOptionsMenu(Menu menu){\n    \
  \   super.onCreateOptionsMenu(menu);\n          MenuInflater inflater = getMenuInflater();\n\
  \          inflater.inflate(menuId, menu);\n       return true;\n    }\n    @Override\n\
  \    public boolean onOptionsItemSelected(MenuItem item){\n       appendMenuItemText(item);\n\
  \       if (item.getItemId() == R.id.menu_da_clear){\n          this.emptyText();\n\
  \          return true;\n       }\n       boolean b = onMenuItemSelected(item);\n\
  \       if (b == true)\n       {\n          return true;\n       }\n       return\
  \ super.onOptionsItemSelected(item);\n    }\n    protected TextView getTextView(){\n\
  \        return\n        (TextView)this.findViewById(this.debugTextViewId);\n  \
  \  }\n    protected void appendMenuItemText(MenuItem menuItem){\n       String title\
  \ = menuItem.getTitle().toString();\n       appendText(\"MenuItem:\" + title);\n\
  \    }\n    protected void emptyText(){\n       TextView tv = getTextView();\n \
  \      tv.setText(\"\");\n    }\n    protected void appendText(String s){\n    \
  \   TextView tv = getTextView();\n       tv.setText(s + \"\\n\" + tv.getText());\n\
  \       Log.d(tag,s);\n    }\n   public void reportBack(String tag, String message)\n\
  \   {\n      this.appendText(tag + \":\" + message);\n      Log.d(tag,message);\n\
  \   }\n   public void reportTransient(String tag, String message)\n   {\n      String\
  \ s = tag + \":\" + message;\n      Toast mToast =\n        Toast.makeText(this,\
  \ s, Toast.LENGTH_SHORT);\n      mToast.show();\n      reportBack(tag,message);\n\
  \      Log.d(tag,message);\n   }\n}//eof-class\n```\n\n此基类活动的主要目标是提供一个带有调试文本视图的活动。此文本视图用于记录来自\
  \ `reportBack()` 方法的消息。我们将使用此活动作为操作栏活动的基类。\n\n\n\n#### 为 ActionBar 分配统一行为\n\n我们有机会进一步重构代码，将派生\
  \ Activity 中的代码提升至另一个名为 `BaseActionBarActivity` 的基类中。\n\n这个重构类的主要目标是提供一种通用行为，用于响应菜单项。这些菜单项用于在代表三种不同\
  \ ActionBar 模式的 Activity 之间切换。切换后，您就可以测试相应的 ActionBar Activity。\n\n该 Activity 在代码清单\
  \ 30-3 中呈现。\n\n**代码清单 30-3.** *启用 ActionBar 的 Activity 的通用基类*\n\n```\n//BaseActionBarActivity.java\n\
  package com.androidbook.actionbar;\n//\n//使用 CTRL-SHIFT-0 导入依赖项\n//\npublic abstract\
  \ class BaseActionBarActivity\nextends DebugActivity\n{\n    private String tag=null;\n\
  \    public BaseActionBarActivity(String inTag)\n    {\n        super(R.menu.menu,\n\
  \            R.layout.main,\n            R.id.textViewId,\n        inTag);\n   \
  \     tag = inTag;\n    }\n    @Override\n    public void onCreate(Bundle savedInstanceState)\n\
  \    {\n        super.onCreate(savedInstanceState);\n        TextView tv = this.getTextView();\n\
  \        tv.setText(tag);\n    }\n    protected boolean onMenuItemSelected(MenuItem\
  \ item)\n    {\n        //响应主页图标\n        if (item.getItemId() == android.R.id.home)\
  \ {\n            this.reportBack(tag,\"主页被按下\");\n            return true;\n   \
  \     }\n\n        //调用兄弟 Activity 的通用行为\n        if (item.getItemId() == R.id.menu_invoke_tabnav){\n\
  \            if (getNavMode() ==\n              ActionBar.NAVIGATION_MODE_TABS)\n\
  \            {\n                this.reportBack(tag,\n                  \"您已处于标签导航模式\"\
  );\n            }\n            else {\n                this.invokeTabNav();\n  \
  \          }\n            return true;\n        }\n        if (item.getItemId()\
  \ == R.id.menu_invoke_listnav){\n            if (getNavMode() ==\n            ActionBar.NAVIGATION_MODE_LIST)\n\
  \            {\n                this.reportBack(tag,\n                \"您已处于列表导航模式\"\
  );\n            }\n            else{\n                this.invokeListNav();\n  \
  \          }\n            return true;\n        }\n        if (item.getItemId()\
  \ == R.id.menu_invoke_standardnav){\n            if (getNavMode() ==\n         \
  \   ActionBar.NAVIGATION_MODE_STANDARD)\n            {\n                this.reportBack(tag,\n\
  \                \"您已处于标准导航模式\");\n            }\n            else{\n          \
  \      this.invokeStandardNav();\n            }\n            return true;\n    \
  \    }\n        return false;\n    }\n    private int getNavMode(){\n        ActionBar\
  \ bar = this.getActionBar();\n        return bar.getNavigationMode();\n    }\n \
  \   private void invokeTabNav(){\n        Intent i = new Intent(this,\n        \
  \  TabNavigationActionBarActivity.class);\n        startActivity(i);\n    }\n\n\
  \    //当您实现这些额外的 Activity 时，\n    //请取消下面方法体的注释\n\n    private void invokeListNav(){\n\
  \        //Intent i = new Intent(this,\n        //  ListNavigationActionBarActivity.class);\n\
  \        //startActivity(i);\n    }\n    private void invokeStandardNav(){\n   \
  \     //Intent i = new Intent(this,\n        //  StandardNavigationActionBarActivity.class);\n\
  \        //startActivity(i);\n    }\n}//eof-class\n```\n\n如果您注意到代码清单 30-3 中响应菜单项的代码，则会看到我们正在检查当前\
  \ Activity 是否正是请求切换到的那个 Activity。如果是，我们会记录一条消息，并且不切换当前 Activity。\n\n这个基类 ActionBar\
  \ Activity 也简化了派生出的 ActionBar 导航 Activity，包括标签式导航 ActionBar Activity。\n\n#### 实现标签监听器\n\
  \n在能够使用标签式 ActionBar 之前，我们需要一个标签监听器。标签监听器让我们能够响应标签上的点击事件。我们将从基类监听器派生出我们的标签监听器，该监听器允许我们记录标签操作。代码清单\
  \ 30-4 展示了使用 `IReportBack` 进行日志记录的基类监听器。\n\n**代码清单 30-4.** *启用 ActionBar 的 Activity\
  \ 的通用监听器*\n\n```\n//BaseListener.java\npackage com.androidbook.actionbar;\n//\n\
  //使用 CTRL-SHIFT-0 导入依赖项\n//\npublic class BaseListener\n{\n   protected IReportBack\
  \ mReportTo;\n   protected Context mContext;\n   public BaseListener(Context ctx,\
  \ IReportBack target)\n   {\n      mReportTo = target;\n      mContext = ctx;\n\
  \   }\n}\n```\n\n此基类持有对 `IReportBack` 实现的引用，以及可用作上下文的 Activity。在我们的例子中，代码清单 30-2\
  \ 中的 `DebugActivity` 既是 `IReportBack` 的实现者，也扮演上下文的角色。\n\n现在我们有了基类监听器，代码清单 30-5 展示了标签监听器。\n\
  \n**代码清单 30-5.** *用于响应标签操作的标签监听器*\n\n```\n//TabListener.java\npackage com.androidbook.actionbar;\n\
  //\n//使用 CTRL-SHIFT-0 导入依赖项\n//\npublic class TabListener extends BaseListener\n\
  implements ActionBar.TabListener\n{\n    private static String tag = \"tc>\";\n\
  \    public TabListener(Context ctx,\n                IReportBack target)\n    {\n\
  \        super(ctx, target);\n    }\n    public void onTabReselected(Tab tab,\n\
  \                  FragmentTransaction ft)\n    {\n        this.mReportTo.reportBack(tag,\n\
  \          \"标签重新选中:\" + tab.getText());\n    }\n    public void onTabSelected(Tab\
  \ tab,\n               FragmentTransaction ft)\n    {\n        this.mReportTo.reportBack(tag,\n\
  \          \"标签已选中:\" + tab.getText());\n    }\n    public void onTabUnselected(Tab\
  \ tab,\n                 FragmentTransaction ft)\n    {\n        this.mReportTo.reportBack(tag,\n\
  \          \"标签取消选中:\" + tab.getText());\n    }\n}\n```\n\n该标签监听器仅将来自 ActionBar\
  \ 标签的回调记录到图 30-1 的调试文本视图中。\n\n#### 实现标签式 ActionBar Activity\n\n有了标签监听器，我们终于可以构建标签式导航\
  \ Activity 了。这在代码清单 30-6 中呈现。\n\n**代码清单 30-6.** *启用标签导航的 ActionBar Activity*\n\n\
  ```\n//TabNavigationActionBarActivity.java\npackage com.androidbook.actionbar;\n\
  //\n//使用 CTRL-SHIFT-0 导入依赖项\n//\npublic class TabNavigationActionBarActivity\nextends\
  \ BaseActionBarActivity\n{\n    private static String tag =\n      \"Tab Navigation\
  \ ActionBarActivity\";\n    public TabNavigationActionBarActivity()\n    {\n   \
  \     super(tag);\n    }\n    @Override\n    public void onCreate(Bundle savedInstanceState)\n\
  \    {\n        super.onCreate(savedInstanceState);\n        workwithTabbedActionBar();\n\
  \    }\n\n    public void workwithTabbedActionBar()\n    {\n        ActionBar bar\
  \ = this.getActionBar();\n        bar.setTitle(tag);\n        bar.setNavigationMode(\n\
  \          ActionBar.NAVIGATION_MODE_TABS);\n\n        TabListener tl = new TabListener(this,this);\n\
  \n        Tab tab1 = bar.newTab();\n        tab1.setText(\"Tab1\");\n        tab1.setTabListener(tl);\n\
  \        bar.addTab(tab1);\n\n        Tab tab2 = bar.newTab();\n        tab2.setText(\"\
  Tab2\");\n        tab2.setTabListener(tl);\n        bar.addTab(tab2);\n    }\n}//eof-class\n\
  ```\n\n现在，我们将在多个小节中讨论这个标签式 ActionBar Activity 的代码（代码清单 30-6），以重点介绍使用标签式 ActionBar\
  \ 的各个方面。我们将从获取属于某个 Activity 的 ActionBar 开始。\n\n\n\n##### 获取操作栏实例\n\n在列表 30-6 中，注意控制操作栏的代码非常简单。通过在\
  \ `Activity` 上调用 `getActionBar()` 来获取活动操作栏的访问权限。以下是该行代码：\n\n```\nActionBar bar =\
  \ this.getActionBar();\n```\n\n如这段代码所示，操作栏是 `Activity` 的一个属性，并且不会跨越活动边界。换句话说，不能使用一个操作栏来控制或影响多个活动。\n\
  \n##### 操作栏导航模式\n\n在列表 30-6 中，一旦获取活动的操作栏，我们就将其导航模式设置为 `ActionBar.NAVIGATION_MODE_TABS`。以下是该行代码：\n\
  \n```\nbar.setNavigationMode(\n  ActionBar.NAVIGATION_MODE_TABS);\n```\n\n另外两种可能的操作栏导航模式是：\n\
  \n- `ActionBar.NAVIGATION_MODE_LIST`\n- `ActionBar.NAVIGATION_MODE_STANDARD`\n\n\
  设置选项卡导航模式后，在 `ActionBar` 类的 API 中有多个与选项卡相关的方法可供使用。在列表 30-6 中，我们使用这些选项卡相关 API 向操作栏添加了两个选项卡。我们还使用了列表\
  \ 30-5 中的选项卡监听器来初始化这些选项卡。\n\n以下是从列表 30-6 中摘录的一段快速代码片段，展示了如何向操作栏添加选项卡：\n\n```\nTab\
  \ tab1 = bar.newTab();\ntab1.setText(\"Tab1\");\ntab1.setTabListener(tl);\nbar.addTab(tab1);\n\
  ```\n\n如果忘记在添加到操作栏的选项卡上调用 `setTabListener()`，将会收到运行时错误，提示需要监听器。\n\n### 可滚动的调试文本视图布局\n\
  \n当点击操作栏的选项卡时，选项卡监听器被设置为将调试消息发送到调试文本视图。列表 30-7 展示了 `DebugActivity` 的布局文件，其中包含调试文本视图。\n\
  \n**列表 30-7.** *调试活动文本视图布局文件*\n\n\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"\
  ?>\n<!-- /res/layout/main.xml -->\n<LinearLayout\n    android:orientation=\"vertical\"\
  \n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"fill_parent\"\
  \n    android:gravity=\"fill\"\n    >\n<TextView android:id=\"@+id/textViewId\"\n\
  \    android:layout_width=\"fill_parent\"\n    android:layout_height=\"fill_parent\"\
  \n    android:background=\"@android:color/white\"\n    android:text=\"Initial Text\
  \ Message\"\n    android:textColor=\"@android:color/black\"\n    android:textSize=\"\
  25sp\"\n    android:scrollbars=\"vertical\"\n    android:scrollbarStyle=\"insideOverlay\"\
  \n    android:scrollbarSize=\"25dip\"\n    android:scrollbarFadeDuration=\"0\"\n\
  \    />\n</LinearLayout>\n\n关于此布局，有几点需要注意。我们将文本视图的背景颜色设置为白色，这使我们能够在更明亮的光线下捕捉屏幕。文本大小也被设置为大字体，以辅助屏幕截图。\n\
  \n我们还将文本视图设置为可滚动。虽然通常的布局使用 `ScrollView`，但文本视图本身已经支持滚动。除了在文本视图的 XML 文件中启用滚动属性外，还需要在文本视图上调用\
  \ `setMovementMethod()` 方法，如清单 30-8 所示。\n\n**清单 30-8.** *为滚动启用文本视图*\n\n```text\n\
  TextView tv = this.getTextView();\ntv.setMovementMethod(\n     ScrollingMovementMethod.getInstance());\n\
  ```\n\n这段代码摘自 `DebugActivity` (清单 30-2)。\n\n另外，当文本视图滚动时，你会注意到滚动条出现然后淡出。如果文本超出了可见范围，这并不是一个好的指示器。你可以通过将淡出持续时间设置为\
  \ 0 来让滚动条保持显示。请参见清单 30-7 了解如何设置此参数。\n\n### 操作栏和菜单交互\n\n在本示例中，我们还想演示菜单如何与操作栏交互。因此，我们需要设置一个菜单文件。此文件如清单\
  \ 30-9 所示。\n\n**清单 30-9.** *此项目的菜单 XML 文件*\n\n```xml\n<!-- /res/menu/menu.xml -->\n\
  <menu\n>\n    <!-- 此组使用默认类别。 -->\n    <group android:id=\"@+id/menuGroup_Main\"\
  >\n\n        <item android:id=\"@+id/menu_action_icon1\"\n            android:title=\"\
  动作图标 1\"\n            android:icon=\"@drawable/creep001\"\n            android:showAsAction=\"\
  ifRoom\"/>\n\n        <item android:id=\"@+id/menu_action_icon2\"\n            android:title=\"\
  动作图标 2\"\n            android:icon=\"@drawable/creep002\"\n            android:showAsAction=\"\
  ifRoom\"/>\n\n        <item android:id=\"@+id/menu_icon_test\"\n            android:title=\"\
  图标测试\"\n            android:icon=\"@drawable/creep003\"/>\n\n        <item android:id=\"\
  @+id/menu_invoke_listnav\"\n            android:title=\"调用列表导航\"\n            />\n\
  \        <item android:id=\"@+id/menu_invoke_standardnav\"\n            android:title=\"\
  调用标准导航\"\n            />\n        <item android:id=\"@+id/menu_invoke_tabnav\"\n\
  \            android:title=\"调用标签导航\"\n            />\n        <item android:id=\"\
  @+id/menu_da_clear\"\n            android:title=\"清除\" />\n    </group>\n</menu>\n\
  ```\n\n**注意：** 清单 30-9 中的这个菜单 XML 文件使用了来自 [www.androidicons.com](http://www.androidicons.com)\
  \ 的 3 个图标（creep001、002 和 003）。根据该网站，这些图标采用知识共享许可协议 3.0。\n\n以下部分将更详细地讨论此菜单。\n\n####\
  \ 显示菜单\n\n在 2.3 及更早版本中，设备通常有一个明确的菜单按钮。在 3.0 中，模拟器不显示物理的 Home、Back 或 Menu 按钮。这些按钮在某些设备上可能仍然可用。\n\
  \n如图 30-2 所示，返回和主页按钮现在是屏幕底部的软按钮。但是，菜单按钮是在应用程序的上下文中显示的，具体来说，是作为操作栏的一部分，位于右上角。\n\n\
  图 30-2 显示了菜单展开时的样子。![图片](img/3002.jpg)\n\n**图 30-2.** *一个带有标签式操作栏和展开菜单的活动*\n\n需要注意的一点是，菜单栏可能不会显示菜单项的图标。不应在所有情况下都依赖菜单项图标的显示。\n\
  \n#### 作为操作的菜单项\n\n如本章开头所述，你可以将某些菜单项指定为直接显示在操作栏上。这些菜单项使用 `showAsAction` 标签进行标记。你可以在菜单\
  \ XML 文件的清单 30-9 中看到这个标签。此标签行被提取并再次显示在清单 30-10 中。\n\n**清单 30-10.** *showAsAction\
  \ 的菜单项属性*\n\n```xml\nandroid:showAsAction=\"ifRoom\"\n```\n\n此 XML 标签的其他可能值是：\n\n\
  > `always`\n> `never`\n> `withText`\n\n你也可以使用 `MenuItem` 类上可用的 Java API 达到相同的效果。\n\
  \n```java\nmenuItem.setShowAsAction(int actionEnum)\n```\n\n`actionEnum` 的值为：\n\n\
  > `SHOW_AS_ACTION_ALWAYS`\n> `SHOW_AS_ACTION_IF_ROOM`\n> `SHOW_AS_ACTION_NEVER`\n\
  > `SHOW_AS_ACTION_WITH_TEXT`\n\n因为这些操作只是菜单项，所以它们的行为如此，并会调用活动类的 `onOptionsItemSelected()`\
  \ 回调方法。\n\n最后，示例使用了多个图标。你可以将这些图标替换为你自己的图标，或者使用本章末尾的 URL 下载本章的项目。\n\n### Android\
  \ 清单文件\n\n清单 30-11 显示到目前为止此项目的清单文件。\n\n**清单 30-11.** *AndroidManifest.xml*\n\n```xml\n\
  <?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest\npackage=\"com.androidbook.actionbar\"\
  \n      android:versionCode=\"1\"\n      android:versionName=\"1.0.0\">\n    <application\
  \ android:icon=\"@drawable/icon\"\n        android:label=\"操作栏演示应用\">\n<activity\
  \ android:name=\".TabNavigationActionBarActivity\"\n                  android:label=\"\
  操作栏演示：标签导航\">\n            <intent-filter>\n                <action android:name=\"\
  android.intent.action.MAIN\" />\n                <category android:name=\"android.intent.category.LAUNCHER\"\
  \ />\n            </intent-filter>\n        </activity>\n    </application>\n<uses-sdk\
  \ android:minSdkVersion=\"11\" />\n</manifest>\n```\n\n`minSDKVersion` 需要指向 11，即\
  \ 3.0 版本的 API 编号。\n\n### 检查标签式操作栏活动\n\n编译并运行这些文件后，你将看到标签式操作栏，如图 30-1 所示。然后，如果你点击右侧的菜单图标，你将看到应用程序的菜单，如图\
  \ 30-2 所示。\n\n该应用程序的设计方式是，操作栏上的任何操作都会被记录到调试文本视图中。在运行此应用程序时，你可以测试以下内容：\n\n> 如果你点击主页图标，你将看到一条消息记录到调试屏幕，表明主页按钮被按下。\n\
  > 如果你点击 tab1，你将看到一条消息，表明“tab1”被重新选中。\n> 如果你点击 tab2，你将看到两条消息。第一条表明 tab1 失去焦点，并且 tab2\
  \ 被点击。这些消息通过清单 30-5 中的标签监听器提供。\n> 如果你点击右侧的动作按钮，你将看到它们对应的菜单项被调用，并且调试消息被记录到调试视图中。\n\
  > 如果你展开菜单，你将看到有菜单项可以调用其他活动，这些活动将演示其余的操作栏模式。但是，你需要等到本章后面开发了其他活动。在此之前，你只会注意到那些项目被调用并且调试消息被记录下来。\n\
  \n至此，我们不仅实现了标签式操作栏活动，还设置了基础框架，使得编写其余两个活动变得更加简单。让我们继续介绍列表导航模式操作栏。\n\n### 列表导航操作栏活动\n\
  \n由于我们的基类承担了大部分工作，因此实现和测试列表操作栏导航活动相当容易。你需要以下额外的文件来实现此活动：\n\n> **SimpleSpinnerArrayAdapter.java**：此类与监听器一起用于设置列表导航栏。此类提供下拉导航列表所需的行（清单\
  \ 30-12）。\n> **ListListener.java**：此类充当列表导航活动的监听器。在将操作栏设置为列表操作栏时，需要将此类的实例传递给操作栏（清单\
  \ 30-13）。\n> **ListNavigationActionBarActivity.java**：这是我们实现列表导航操作栏活动的地方（清单 30-14）。\n\
  \n一旦你有了这三个新文件，你将需要更新以下两个文件：\n\n> **BaseActionBarActivity.java**：你需要取消注释对列表操作栏活动的调用（清单\
  \ 30-3）。\n> **AndroidManifest.xml**：你需要在清单文件中定义新的列表导航操作栏活动（清单 30-11）。\n\n#### 创建\
  \ SpinnerAdapter\n\n为了能够使用列表导航模式初始化操作栏，我们需要以下两件事：\n\n> 一个 spinner 适配器，它可以告诉列表导航导航文本的列表是什么。\n\
  > 提供一个列表导航监听器，以便当我们选取其中一个列表项时，我们可以得到一个回调。\n\n清单 30-12 展示了 `SimpleSpinnerArrayAdapter`，它实现了\
  \ `SpinnerAdapter` 接口。如前所述，此类的目的是提供一个要显示的项目列表。\n\n**清单 30-12.** *为列表导航创建 Spinner\
  \ 适配器*\n\n```java\n//SimpleSpinnerArrayAdapter.java\npackage com.androidbook.actionbar;\n\
  //\n//使用 CTRL-SHIFT-0 导入依赖项\n//\npublic class SimpleSpinnerArrayAdapter\nextends\
  \ ArrayAdapter<String>\nimplements SpinnerAdapter\n{\n    public SimpleSpinnerArrayAdapter(Context\
  \ ctx)\n    {\n        super(ctx,\n          android.R.layout.simple_spinner_item,\n\
  \          new String[]{\"一\",\"二\"});\n\n        this.setDropDownViewResource(\n\
  \          android.R.layout.simple_spinner_dropdown_item);\n    }\n    public View\
  \ getDropDownView(\n      int position, View convertView, ViewGroup parent)\n  \
  \  {\n        return super.getDropDownView(\n          position, convertView, parent);\n\
  \    }\n}\n```\n\n没有 SDK 类直接实现列表导航所需的 `SpinnerAdapter` 接口。因此，我们从一个 `ArrayAdapter`\
  \ 派生此类，并为 `SpinnerAdapter` 提供了一个简单的实现。我们还提供了一个关于 spinner 适配器的参考 URL，供进一步阅读。现在让我们继续介绍列表导航监听器。\n\
  \n#### 创建列表监听器\n\n这是一个实现 `ActionBar.OnNavigationListener` 的简单类。清单 30-13 显示了此类的代码。\n\
  \n**清单 30-13.** *为列表导航创建列表监听器*\n\n```java\n//ListListener.java\npackage com.androidbook.actionbar;\n\
  //\n//使用 CTRL-SHIFT-0 导入依赖项\n//\npublic class ListListener\nextends BaseListener\n\
  implements ActionBar.OnNavigationListener\n{\n    public ListListener(\n    Context\
  \ ctx, IReportBack target)\n    {\n        super(ctx, target);\n    }\n    public\
  \ boolean onNavigationItemSelected(\n    int itemPosition, long itemId)\n    {\n\
  \        this.mReportTo.reportBack(\n          \"列表监听器\",\"项目位置:\" + itemPosition);\n\
  \        return true;\n    }\n}\n```\n\n与清单 30-5 中的标签监听器类似，我们继承自 `BaseListener`，以便能够通过\
  \ `IReportBack` 接口将事件记录到调试文本视图。\n\n#### 设置列表操作栏\n\n我们现在已经具备了设置列表导航操作栏所需的条件。让我们在清单\
  \ 30-14 中展示列表导航操作栏活动的源代码。此类与我们之前编写的标签活动非常相似。\n\n**清单 30-14.** *列表导航操作栏活动*\n\n```java\n\
  //ListNavigationActionBarActivity.java\npackage com.androidbook.actionbar;\n//\n\
  //使用 CTRL-SHIFT-0 导入依赖项\n//\npublic class ListNavigationActionBarActivity\nextends\
  \ BaseActionBarActivity\n{\n    private static String tag=\n      \"列表导航 ActionBarActivity\"\
  ;\n\n    public ListNavigationActionBarActivity()\n    {\n        super(tag);\n\
  \    }\n    @Override\n    public void onCreate(Bundle savedInstanceState)\n   \
  \ {\n        super.onCreate(savedInstanceState);\n        workwithListActionBar();\n\
  \    }\n    public void workwithListActionBar()\n    {\n        ActionBar bar =\
  \ this.getActionBar();\n        bar.setTitle(tag);\n        bar.setNavigationMode(ActionBar.NAVIGATION_MODE_LIST);\n\
  \        bar.setListNavigationCallbacks(\n           new SimpleSpinnerArrayAdapter(this),\n\
  \           new ListListener(this,this));\n    }\n}//eof-class\n```\n\n重要的代码在清单\
  \ 30-14 中突出显示。代码非常简单。我们获取一个 spinner 适配器和一个列表监听器，并将它们设置为操作栏上的列表导航回调。\n\n#### 修改 BaseActionBarActivity\n\
  \n一旦此列表导航操作栏活动（清单 30-14）可用，我们可以返回并修改 `BaseActionBarActivity`，使得针对 `ListNavigationActionBarActivity`\
  \ 的菜单项能够调用此活动。取消注释后，清单 30-3 中相应的函数将类似于清单 30-15 中提取并取消注释的代码。\n\n**清单 30-15.** *为调用列表导航操作栏活动而取消注释的代码*\n\
  \n```java\nprivate void invokeListNav(){\n     Intent i = new Intent(this,\n   \
  \     ListNavigationActionBarActivity.class);\n     startActivity(i);\n}\n```\n\n\
  一旦你取消注释，菜单项和代码就已经连接好，可以调用此列表导航操作栏活动。\n\n#### 修改 AndroidManifest.xml\n\n在能够调用此活动之前，你需要在\
  \ Android 清单文件中注册此活动。你需要将清单 30-16 中的代码添加到清单 30-11 的 Android 清单文件中，以完成活动注册。\n\n**清单\
  \ 30-16.** *注册列表导航操作栏活动*\n\n```xml\n<activity android:name=\".ListNavigationActionBarActivity\"\
  \n        android:label=\"操作栏演示：列表导航\">\n</activity>\n```\n\n#### 检查列表操作栏活动\n\n\
  编译到目前为止涵盖的这些文件（以及本节关于列表导航操作栏开头提到的新文件和已更改的文件）并运行该应用程序后，你将看到列表操作栏，如图 30-3 所示。![图片](img/3003.jpg)\n\
  \n**图 30-3.** *一个带有列表导航操作栏的活动*\n\n在图 30-3 中，你可以看到未展开的列表紧挨着活动的标题。这与当操作栏模式为标签导航时 SDK\
  \ 放置标签的位置相同。现在，如果你点击显示“一”的项目，列表将展开，允许你进行选择。如图 30-4 所示。![图片](img/3004.jpg)\n\n**图\
  \ 30-4.** *一个带有打开导航列表的活动*\n\n当你将此活动与图 30-1 和 30-2 中的活动进行比较时，你会发现这些活动看起来非常相似，只是在一个案例中你有标签，而在另一个案例中你有一个列表用于导航。这两个活动的主题是说明一个重要的相似之处，即网页设计的方式。\n\
  \n在网站中，可能有多个网页，但每个页面都会通过母版页显示统一的外观和感觉。在我们的简单案例中，我们使用基类来实现这种效果。\n\n尽管我们使用了多个活动来展示操作栏，但\
  \ 3.0 中的操作栏似乎更适用于在单个活动上协调片段。但是，如果你需要处理多个活动，你可以使用这种基类模式来提供母版页设计模式。\n\n此列表导航活动的行为与上一节中的标签活动非常相似。这里的区别在于你点击列表项时会发生什么。每次你选择一个列表项，你都会看到对列表监听器的回调，并且列表监听器会向调试文本视图发送一条消息。\n\
  \n现在我们有了两个活动，菜单项将允许你在标签活动和列表活动之间切换。\n\n现在让我们继续介绍更简单的标准操作栏活动。\n\n### 标准导航操作栏活动\n\n\
  在本节中，我们将研究标准导航操作栏的性质。我们将设置一个活动，并将其操作栏导航模式设置为标准模式。然后，我们将查看标准导航的外观及其行为。\n\n与 `ListNavigationActionBarActivity`\
  \ 的情况一样，由于我们的基类承担了大部分工作，因此实现和测试标准操作栏导航活动很容易。你需要以下额外的文件来实现此活动：\n\n> **StandardNavigationActionBarActivity.java**：这是将操作栏配置为标准导航模式操作栏的实现文件（清单\
  \ 30-17）。\n\n一旦你有了这个新文件，你将需要更新以下两个文件：\n\n> **BaseActionBarActivity.java**：你需要取消注释响应菜单项而调用标准操作栏活动的代码（参见清单\
  \ 30-18 了解更改，以及清单 30-3 查看原始文件）。\n> **AndroidManifest.xml**：你需要在清单文件中定义此新活动（参见清单\
  \ 30-19 了解此活动的定义，以便你可以将其添加到主 AndroidManifest 文件清单 30-11 中）。\n\n我们现在将逐一探讨这些文件。\n\n\
  #### StandardNavigationActionBarActivity\n\n在设置标签式操作栏时，我们使用了标签监听器；在设置列表导航操作栏时，我们使用了列表监听器。对于标准操作栏，除了菜单回调之外，没有其他监听器。菜单回调不需要特别设置，因为它们已由\
  \ SDK 自动连接。因此，以标准导航模式设置操作栏非常容易。\n\n清单 30-17 展示了标准导航操作栏活动的源代码。\n\n**清单 30-17.** *标准导航操作栏活动*\n\
  \n```java\n//StandardNavigationActionBarActivity.java\npackage com.androidbook.actionbar;\n\
  //\n//使用 CTRL-SHIFT-0 导入依赖项\n//\npublic class StandardNavigationActionBarActivity\n\
  extends BaseActionBarActivity\n{\n    private static String tag=\n      \"标准导航 ActionBarActivity\"\
  ;\n    public StandardNavigationActionBarActivity()\n    {\n        super(tag);\n\
  \    }\n    @Override\n    public void onCreate(Bundle savedInstanceState)\n   \
  \ {\n        super.onCreate(savedInstanceState);\n        workwithStandardActionBar();\n\
  \    }\n\n    public void workwithStandardActionBar()\n    {\n        ActionBar\
  \ bar = this.getActionBar();\n        bar.setTitle(tag);\n        bar.setNavigationMode(ActionBar.NAVIGATION_MODE_STANDARD);\n\
  \        //测试如果在标准导航模式下附加标签会发生什么\n        attachTabs(bar);\n    }\n    public void\
  \ attachTabs(ActionBar bar)\n    {\n        TabListener tl = new TabListener(this,this);\n\
  \n        Tab tab1 = bar.newTab();\n        tab1.setText(\"标签 1\");\n        tab1.setTabListener(tl);\n\
  \        bar.addTab(tab1);\n\n        Tab tab2 = bar.newTab();\n        tab2.setText(\"\
  标签 2\");\n        tab2.setTabListener(tl);\n        bar.addTab(tab2);\n    }\n}//eof-class\n\
  ```\n\n将操作栏设置为标准导航操作栏唯一需要做的事情就是将其导航模式设置为该模式。在清单 30-17 中，我们这样做了，并突出显示了那部分代码。\n\n\
  **注意：** 在清单 30-17 中，我们还包含了一些代码，用于查看在标准导航模式下添加标签会发生什么。我们的测试表明，这些标签不会导致任何运行时错误，但会被框架忽略。\n\
  \n在查看标准操作栏的外观之前，你需要对现有文件进行一些更改。\n\n#### 修改 BaseActionBarActivity\n\n一旦标准导航操作栏活动（清单\
  \ 30-17）可用，我们可以返回并修改 `BaseActionBarActivity`（清单 30-3），使得针对 `StandardNavigationActionBarActivity`\
  \ 的菜单项能够调用此活动。取消注释后，清单 30-3 中相应的函数将类似于清单 30-18 中的代码。\n\n**清单 30-18.** *为调用标准导航操作栏活动而取消注释的部分*\n\
  \n```java\n    private void invokeStandardNav(){\n        Intent i = new Intent(this,\n\
  \          StandardNavigationActionBarActivity.class);\n        startActivity(i);\n\
  \    }\n```\n\n一旦你取消注释，菜单项和代码就已经连接好，可以调用 `StandardNavigationActionBarActivity`。\n\
  \n#### 修改 AndroidManifest.xml\n\n然而，在能够调用此活动之前，你需要在 android 清单文件中注册此活动。你需要将以下行添加到清单\
  \ 30-11 中的 Android 清单文件中，以完成活动注册。\n\n**清单 30-19.** *注册标准导航操作栏活动*\n\n```xml\n<activity\
  \ android:name=\".StandardNavigationActionBarActivity \"\n        android:label=\"\
  操作栏演示：标准导航\">\n</activity>\n```\n\n#### 检查标准操作栏活动\n\n编译到目前为止涵盖的这些文件（并在“标准导航操作栏活动”部分列出）并运行该应用程序后，你将看到应用程序以标签活动作为第一个活动打开（图\
  \ 30-1）。现在，如果你点击菜单项，你将看到图 30-2。在此菜单中，如果你选择菜单项“调用标准导航”，你将看到标准导航操作栏活动，如下面的图 30-5 所示。![图片](img/3005.jpg)\n\
  \n**图 30-5.** *一个带有标准导航操作栏的活动*\n\n在图 30-5 中，你首先注意到的是，此操作栏缺少了之前专门用于标签或列表导航的区域。现在，继续点击右侧的操作按钮，它们会将其调用写入调试文本视图。然后，继续点击主页按钮。这也会将其调用签名写入调试文本视图。在这三次点击结束时，调试文本视图看起来像图\
  \ 30-6。![图片](img/3006.jpg)\n\n**图 30-6.** *响应操作栏的事件*\n\n### 参考资料\n\n在我们研究本章材料时，以下\
  \ URL 对我们非常有帮助。这些 URL 还包含进一步的阅读材料。此外，最后的 URL 允许你下载本章项目的 zip 文件。\n\n> ***设计的日常***，唐纳德·A·诺曼。本书借鉴了先前在“视觉感知”中一个名为“Affordance”（示能性）的概念，用于人机交互。这个词在\
  \ Android UI 文献中被越来越多地使用。本章的操作栏被吹捧为关键的 UI 示能性之一。\n> [`en.wikipedia.org/wiki/Affordance`](http://en.wikipedia.org/wiki/Affordance)：用于理解\
  \ UI 示能性的维基百科参考。\n> [www.androidbook.com/item/3624](http://www.androidbook.com/item/3624)：指向我们对\
  \ Android 操作栏的研究。在这里你将看到进一步的参考资料、示例代码、示例链接以及代表各种操作栏模式的 UI 图列表。\n> [`developer.android.com/reference/android/app/ActionBar.html`](http://developer.android.com/reference/android/app/ActionBar.html)：这是\
  \ ActionBar 类的 API URL。\n> 使用 Spinner 适配器 ([www.androidbook.com/item/3627](http://www.androidbook.com/item/3627))：为了设置列表导航模式，你需要了解下拉列表和\
  \ spinners 是如何工作的。这篇简短的文章展示了一些关于如何在 Android 中使用 spinners 的示例和参考链接。\n> [`www.androidicons.com`](http://www.androidicons.com)：我们在本章中使用的一些图标来自这个网站。这些图标采用知识共享许可协议\
  \ 3.0。\n> 令人愉悦的 Android 布局 ([www.androidbook.com/item/3302](http://www.androidbook.com/item/3302))：在这个\
  \ URL，我们有一些关于简单布局的快速笔记和示例源代码。\n> [`developer.android.com/reference/android/view/MenuItem.html`](http://developer.android.com/reference/android/view/MenuItem.html)：此\
  \ URL 指向 `MenuItem` 类的 API。你将在这里找到关于将菜单项作为操作图标附加到操作栏的文档。\n> [`developer.android.com/guide/topics/resources/menu-resource.html`](http://developer.android.com/guide/topics/resources/menu-resource.html)：此\
  \ URL 记录了可用于将菜单项定义为操作栏图标的 XML 元素。\n> [www.androidbook.com/projects](http://www.androidbook.com/projects)：你可以使用此\
  \ URL 下载专门为本章准备的测试项目。zip 文件的名称为 ProAndroid3_ch30_TestActionbar.zip。\n\n### 总结\n\n\
  如你所见，操作栏并不神秘。它是一种在桌面编程中使用的已知范例。对初学者来说有点困难的是，同一个类基于一个模式位以三种不同的方式运行。人们总是想知道一组派生类是否能完成这个任务。但同样，模式之间的差异非常小，因此将其作为一个单一的类可能更好，就像现在这样。\n\
  \n操作栏设计的动机似乎倾向于基于浏览器的 Web 导航模型。\n\nAndroid 设计师似乎也建议将操作栏与片段结合使用，以获得所需的 UI 一致性。当你需要在活动之间切换时，设计师要求我们考虑是否可以通过片段而不是新的活动来完成同样的事情。片段带来了很多优势，特别是当设备翻转导致配置更改时，它们的状态管理。带有片段的活动在配置更改之间保持状态。片段在前面的第\
  \ 29 章中有更详细的介绍。\n\n本章还介绍了一种使用基础导航活动实现设计一致性的可能方法。这也可能通过委托而不是继承来实现。人们还可以借鉴用于在网站上创建母版页的著名模式，并看看如何最好地协调\
  \ Android SDK 类以达到这种效果。\n\n操作栏功能仅在 3.0 开始的 SDK 中可用。截至目前，没有迹象表明这些功能可作为旧版本的库使用。\n\n\
  文档和 Java API 之间也存在一些差异。文档指出只有三种操作栏模式。然而，Java API 中还有一种称为下拉导航模式的额外模式。当我们测试它时，它的行为就像列表导航模式，只是它去掉了标题。\n\
  \n此外，你可以通过显示标志来控制操作栏上显示的内容。请参考 API 文档，因为这相当直接。\n\n## 第 31 章\n\n## 3.0 中的其他主题\n\n\
  经过 30 章，在 Android 3.0 中仍有一些我们还没来得及涵盖的主题！在这最后一章中，我们将讨论主屏幕小部件的增强功能以及新的拖放 API。\n\n\
  3.0 中对小部件功能进行了显著的增强。通过这些增强，你现在可以将基于列表的小部件添加到主屏幕。拖放 API 在 3.0 中是全新的。借助拖放 API，你可以构建类似于桌面上非常常见的丰富用户界面。我们将非常详细地讨论这两个主题。\n\
  \n### 基于列表的主屏幕小部件\n\n在第 22 章中，我们介绍了小部件在 Android 2.3 及更早版本中的工作方式。在 Android 3.0 中，主屏幕小部件有了强大的增强；这些更改很可能会被纳入下一个针对手机优化的\
  \ Android 版本中。\n\n作为阅读此主题的先决条件，我们强烈建议你复习第 22 章，以更好地理解关于小部件的新内容。但是，即使你没有深入研究第 22\
  \ 章的细微差别，本章也将提供一个关于小部件的全面视图，供你参考。\n\n如你在第 22 章中所学，远程视图构成了主屏幕小部件的核心。主屏幕小部件本质上是一个绘制在主屏幕上的远程视图。远程视图是一个与底层数据完全断开的视图，就像网页与其服务器断开连接一样。\n\
  \n第 22 章列出了能够成为远程视图一部分的布局和小部件。诸如列表和网格之类的集合视图在 2.3 版本中不属于允许的小部件。在 3.0 版本中，它们是允许的，从而在主屏幕上提供了更丰富的体验。3.0\
  \ 版本还围绕这些基于集合的小部件提供了一个迷你框架，用于异步加载和呈现数据。3.0 中有新的类和方法来支持这些方面。\n\n我们将首先从概念上介绍这些增强功能，然后提供一个可工作的示例来巩固理解。让我们从\
  \ 3.0 中新的远程视图开始。\n\n#### 3.0 中的新远程视图\n\n在 Android 2.3 中，有 13 种可能的布局和 UI 小部件可以作为远程视图的一部分。\n\
  \n*   `AbsoluteLayout`\n*   `FrameLayout`\n*   `LinearLayout`\n*   `RelativeLayout`\n\
  *   `AnalogClock`\n*   `Button`\n*   `Chronometer`\n*   `ImageButton`\n*   `ProgressBar`\n\
  *   `ViewFlipper`\n*   `DateTimeView`\n*   `ImageView`\n*   `TextView`\n\n其中一些布局和视图可能已弃用，例如\
  \ `AbsoluteLayout`。在代码中使用它们之前，请务必检查这些类。你可能会问为什么这个远程视图列表很重要。你是否直接使用这些视图/布局类来构造你的远程视图？\n\
  \n事实证明，`RemoteViews` 类不能通过传递上述任何类型的显式对象来构造。这些类型的对象也不能直接添加到 `RemoteViews` 中。相反，`RemoteViews`\
  \ 对象是通过向其构造函数传递一个布局文件来构造的。此列表的重要性在于，你只能在布局文件中拥有这些 xml 节点，这些节点才能成为远程视图。\n\n以下是 Android\
  \ 3.0 中增强后的 16 种允许的布局、UI 小部件和视图列表：\n\n*   `FrameLayout`\n*   `LinearLayout`\n* \
  \  `RelativeLayout`\n*   `AnalogClock`\n*   `Button`\n*   `Chronometer`\n*   `ImageButton`\n\
  *   `ProgressBar`\n*   `ListView`\n*   `GridView`\n*   `StackView`\n*   `TextView`\n\
  *   `DateTimeView`\n*   `ImageView`\n*   `AdapterViewFlipper`\n*   `ViewFlipper`\n\
  \n在未来的版本中可能会添加更多的远程视图。找出当前哪些 UI 对象启用了 `RemoteViews` 的关键在于这些类是否用名为 `RemoteViews.RemoteView`\
  \ 的接口进行了注释。\n\n有了这些信息，你可以使用 Eclipse 找出项目中哪些类使用了这个注释。操作方法如下：\n\n1.  在你的源代码中，为 `RemoteView`\
  \ 接口添加一个 `import` 语句。\n2.  突出显示该接口名称。\n3.  右键单击并转到“引用”选项卡。\n4.  选择在此项目中查找此接口的引用。\n\
  \n这将列出所有用 `RemoteView` 接口注释的类。\n\n#### 在远程视图中使用列表\n\n在第 22 章中，我们介绍了 SDK 中支持主屏幕小部件的现有类集。主要的是\
  \ `AppWidgetProvider`、`AppWidgetManager`、`RemoteViews` 以及一个可用于通过初始化参数配置 `AppWidgetProvider`\
  \ 的活动。\n\n简要地说，这里是主屏幕小部件工作原理的核心思想（了解这一点应该能使本节的其余部分更容易理解）。`AppWidgetProvider` 是一个广播接收器，它根据你在配置文件中指定的时间间隔被定期调用。然后，这个\
  \ `AppWidgetProvider` 基于一个布局文件加载一个 `RemoteViews` 实例。然后，这个 `RemoteViews` 对象被传递给 `AppWidgetManager`\
  \ 以显示在主屏幕上。\n\n或者，你也可以告诉 Android 你有一个活动需要在首次将小部件放置在主屏幕上之前调用。这允许配置活动为小部件设置初始化参数。\n\
  \n你还可以在小部件的远程视图上设置点击事件，以便基于这些事件触发意图。然后，这些意图可以调用任何必要的组件，包括向 `AppWidgetProvider` 广播接收器发送消息。\n\
  \n在较高层次上，这就是主屏幕小部件的全部内容。其余的是这些基本思想的机制和变体。\n\n然而，Android 2.3 及更早版本不允许基于列表的远程视图，也没有提供一种机制来有效地填充基于列表的远程视图。为了支持基于列表的远程视图，Android\
  \ 3.0 添加了以下新类：\n\n*   `RemoteViewsFactory`：此类允许你填充列表远程视图，就像列表适配器填充常规列表视图一样。此类是列表视图适配器的轻量级包装器，以异步方式向列表远程视图提供单独的远程视图。\n\
  *   `RemoteViewsService`：此类是一个服务，负责向列表 `RemoteViews` 对象返回一个 `RemoteViewsFactory`。`AppWidgetProvider`\
  \ 负责将其中一个远程视图服务与列表远程视图绑定。这是通过将一个知道如何调用此服务的意图附加到列表远程视图来完成的。此服务允许你延长包含 `AppWidgetProvider`\
  \ 的进程的生命周期。否则，当广播接收器返回时，该进程可能被回收。第 14 章解释了广播接收器和长时间运行服务之间的共生关系。\n\n为了支持基于列表的远程视图，添加了以下新的\
  \ API 方法：\n\n*   `RemoteViews.setPendingIntentTemplate()`：此方法允许你在列表远程视图上设置一个待定意图模板，以响应列表项上的点击事件。我们将在后面介绍细节时讨论“模板”的概念。\n\
  *   `RemoteViews.setOnClickFillIntent()`：这是在列表远程视图的各个列表项上设置的，并与前一个方法紧密配合。\n\n这两个额外的方法一起使用，将让你能够响应基于列表的远程视图上的点击。这两\n"
