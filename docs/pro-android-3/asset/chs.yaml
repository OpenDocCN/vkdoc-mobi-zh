  \ 2，即 `ACTION_MOVE`。其他可能的动作值包括 3（`ACTION_CANCEL`）和 4（`ACTION_OUTSIDE`）。当你用真实手指在真实触摸屏上操作时，很难做到触屏和释放时完全没有微小的移动，因此出现一些\
  \ `ACTION_MOVE` 事件是意料之中的。\n\n模拟器和真实设备之间还存在一些其他差异。请注意，模拟器中位置坐标的精度是整数（52 × 20），而在真实设备上你会看到小数（42.8374\
  \ × 25.293747）。`MotionEvent` 的位置包含 X 和 Y 两个分量，其中 X 表示从 `View` 对象左侧边缘到触摸点的距离，Y 表示从\
  \ `View` 对象顶部边缘到触摸点的距离。\n\n\n#### 触摸事件处理\n\n你还应该注意到，模拟器中的压力值和尺寸值均为 0。在真实设备上，压力值代表手指按下的力度，尺寸值则代表触摸面积大小。如果你用小指尖轻轻触碰，压力和尺寸的值会很小；如果用拇指用力按压，这两个值都会变大。文档说明`pressure`和`size`的取值在\
  \ 0 到 1 之间。但由于硬件差异，在应用程序中很难利用绝对数值来判断压力和尺寸。比较应用中连续出现的`MotionEvent`对象的`pressure`和`size`值是可以的，但如果你设定压力值必须超过\
  \ 0.8 才能算作用力按压，可能会遇到问题。在某些特定设备上，你可能永远无法获得超过 0.8 的值，甚至可能连超过 0.2 的值都得不到。\n\n按下时间和事件时间这两个值在模拟器和真实设备上的运作方式相同，唯一的区别是真实设备上的数值要大得多。经过时间的计算方法也是一样的。\n\
  \n边缘标志用于检测触摸是否触及物理屏幕的边缘。Android SDK 文档说明，这些标志被设置为指示触摸是否与显示屏的边缘（顶部、底部、左侧或右侧）相交。然而，`getEdgeFlags()`方法可能始终返回零，这取决于所使用的设备或模拟器。在某些硬件上，实际检测屏幕边缘的触摸非常困难，因此\
  \ Android 本应将触摸位置锁定到边缘，并为你设置相应的边缘标志。但这并非总是发生，所以你不应依赖边缘标志被正确设置。`MotionEvent`类提供了一个`setEdgeFlags()`方法，如果你愿意，可以自己设置这些标志。\n\
  \n最后需要注意的一点是，我们的`onTouch()`方法返回`true`，这是因为`TrueButton`的编码使其返回`true`。返回`true`告诉 Android，`MotionEvent`对象已被消费，无需再传递给其他对象。同时，它也告诉\
  \ Android 继续将来自此触摸序列的触摸事件发送到该方法。这就是为什么我们能够接收到`ACTION_UP`事件，以及在真实设备情况下能够接收到`ACTION_MOVE`事件的原因。\n\
  \n现在触摸屏幕顶部附近的“returns false”按钮。在本节的剩余部分，我们将仅展示来自真实设备的示例 LogCat 输出。差异已经解释过，因此如果你在使用模拟器，应当能理解你所看到现象的原因。列表\
  \ 25–6 展示了你触摸“returns false”按钮时的示例 LogCat 输出。\n\n##### 列表 25–6. 触摸顶部“returns false”按钮的示例\
