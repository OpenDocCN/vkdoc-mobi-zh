  \ 的定义（列表 23–16），您会注意到它没有明确说明使用 `SearchActivity` 作为其默认本地搜索。这是因为我们在应用程序级别（而非 Activity\
  \ 级别）使用了该规范，方法是在 manifest 文件中引入了以下行：\n\n```\n   <meta-data android:name=\"android.app.default_searchable\"\
  \n          android:value=\".SearchActivity\" />\n```\n\n请注意这些行如何位于 manifest 文件（列表\
