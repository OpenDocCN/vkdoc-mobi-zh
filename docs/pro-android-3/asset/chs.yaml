  \        lv.setChoiceMode(ListView.CHOICE_MODE_SINGLE);\n        lv.setSelection(mCurCheckPosition);\n\
  \n        // Activity 已创建，Fragment 已就绪\n        // 继续操作，填充详情 Fragment\n        myActivity.showDetails(mCurCheckPosition);\n\
