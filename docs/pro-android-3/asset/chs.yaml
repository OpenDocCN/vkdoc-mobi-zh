  lookup;\ncontact_status_icon;\nlast_time_contacted;\ndisplay_name;\nsort_key_alt;\n\
  in_visible_group;\n_id;\nstarred;\nsort_key;\ndisplay_name_alt;\ncontact_presence;\n\
  display_name_source;\ncontact_status_res_package;\ncontact_status_ts;\nphoto_id;\n\
  send_to_voicemail;\n```\n\n示例程序会将这些列同时输出到屏幕和 LogCat 中。我们从 LogCat 中复制了这些字段，并按照清单\
  \ 27–28 所示进行了格式化。\n\n**注意：** 在使用内容提供器时，通过 URI 来获取并打印其返回的列，这一技术非常有用。\n\n既然我们已经探索了联系人内容\
  \ URI 可用的列，接下来我们选取几个列，看看有哪些联系人行可用。为此，请点击菜单项“contacts”。这将调用函数 `listContacts()`。`listContacts()`\
  \ 方法使用相同的联系人内容 URI，但现在为每个联系人打印以下列：\n\n* `display name`\n* `lookup key`\n* `lookup\
  \ uri`\n\n我们考虑这些字段，是因为我们希望根据本章理论部分所讲的内容，查看查找键和查找键 URI 的具体形式。具体来说，我们感兴趣的是触发查找 URI，并观察它会返回什么类型的游标。要查看这一点，请点击菜单项“Single\
  \ Contact Cursor”。这将调用函数 `listLookupUriColumns()`。该函数会从所有联系人列表中取出第一个联系人，然后为该联系人构建一个查找\
  \ URI，并触发该 URI 以查看其返回结果。\n\n结果发现，它返回的游标与清单 27–28 中的列完全相同，只是只有一行数据，指向此查找键对应的联系人。同时请注意，我们使用了以下查找\
  \ URI 定义：\n\n`ContactsContract.Contacts.CONTENT_LOOKUP_URI`\n\n从对联系人查找 URI 的讨论中可知，每个查找\
  \ URI 代表一组已拼接的原始联系人标识。既然如此，你可能预期查找 URI 会返回一系列匹配的原始联系人。然而，上述测试（清单 27–28）显示，它返回的并不是原始联系人的游标，而是联系人的游标。\n\
  \n**注意：** 基于联系人查找 Uri 的查找返回的是聚合联系人，而非原始联系人。\n\n另一个重要的细节是，基于查找 URI 的聚合联系人查找过程并非线性或精确匹配。也就是说，Android\
  \ 不会精确匹配查找键。相反，Android 会将查找键解析为其组成的原始联系人，然后找到与大多数原始联系人记录匹配的聚合联系人 ID，并返回该聚合联系人记录。\n\
  \n由此产生的一个后果是，没有公开的机制可以从查找键获取其组成的原始联系人。相反，你必须先找到该查找键对应的联系人 ID，然后针对该联系人 ID 触发一个原始联系人\
  \ URI，以检索相应的原始联系人。\n\n\n\n### 探索原始联系人\n\n在下一个示例中，我们将探讨如何探索原始联系人。在本练习中，我们将尝试围绕原始联系人完成三件事：\n\
  \n- 通过触发能够读取原始联系人的 URI，发现其返回的所有字段。\n- 显示所有原始联系人。\n- 列出一组聚合联系人对应的所有原始联系人。\n\n你需要以下新文件来测试此示例：\n\
