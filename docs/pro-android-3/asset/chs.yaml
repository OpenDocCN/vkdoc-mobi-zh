  ```\n\n与之前类似，大多数代码并非必需，只是为了让你能够看到事件触发时机而添加了日志记录语句。与 `DetailsFragment` 不同，对于此 Fragment，你没有在\
  \ `onCreateView()` 回调中执行任何操作。这是因为你扩展了 `ListFragment` 类，而该类已经包含了一个 `ListView`。`ListFragment`\
  \ 默认的 `onCreateView()` 会为你创建这个 `ListView` 并返回它。直到 `onActivityCreated()` 方法被调用时，你才开始执行真正的应用逻辑。此时，可以确保\
  \ Activity 的视图层级结构以及此 Fragment 的视图层级结构都已经创建完成。那个 `ListView` 的资源 ID 是 `android.R.id.list1`，但如果你需要获取它的引用，可以随时调用\
  \ `getListView()` 方法，而这正是你在 `onActivityCreated()` 中所做的。然而，由于 `ListFragment` 并不等同于\
  \ `ListView`，请不要将适配器直接附加到 `ListView`。你必须使用 `ListFragment` 的 `setListAdapter()` 方法。因为\
  \ Activity 的视图层级结构已经建立，所以此时调用 Activity 的 `showDetails()` 方法是安全的。\n\n在你的示例 Activity\
  \ 生命周期的这个节点，你已经为列表视图添加了一个列表适配器，恢复了当前选中位置（如果是从恢复状态返回，例如因配置更改导致），并且已经请求 Activity（在\
  \ `showDetails()` 中）将文本设置为与所选莎士比亚标题相对应的内容。\n\n你的 `TitlesFragment` 类还在列表上设置了一个监听器，因此当用户点击另一个标题时，会调用\
  \ `onListItemClick()` 回调，而你则再次使用 `showDetails()` 方法将文本切换为对应此标题的内容。\n\n此 Fragment\
  \ 与之前的详情 Fragment 的另一个区别在于，当此 Fragment 被销毁并重建时，你会在 Bundle 中保存状态（列表中当前选中位置的值），并在\
  \ `onCreate()` 中将其读回。与那些在 Activity 布局的 `FrameLayout` 中被来回切换的详情 Fragment 不同，这里只需要考虑一个标题\
  \ Fragment。因此，当发生配置更改并且你的标题 Fragment 正在经历保存和恢复操作时，你希望记住当前的位置。而对于详情 Fragment，你可以在不记住先前状态的情况下重新创建它们。\n\
  \n\n\n### 在需要时调用独立 Activity\n\n有一段代码我还没提到，它位于 `showDetails()` 方法中：当您处于竖屏模式，且详情片段无法与标题片段在同一页面正常适配时。尽管在平板屏幕上的实际情况并非如此，但我们将假装这是真的。随着片段（Fragment）被支持到更早的\
  \ Android 版本，您将能在手机和平板上同时使用片段，这意味着本节描述的场景会相当常见。如果屏幕空间不足以让某个片段（原本应与其它片段并列显示）获得合适的浏览体验，您需要启动一个独立的\
  \ Activity 来显示该片段的用户界面。在您的示例应用中，您选择实现了一个详情 Activity；其代码见清单 29–10。\n\n**清单 29–10.**\
  \ *片段无法适配时显示新的 Activity*\n\n```java\n// 此文件为 DetailsActivity.java\nimport android.app.Activity;\n\
  import android.content.res.Configuration;\nimport android.os.Bundle;\nimport android.util.Log;\n\
  \npublic class DetailsActivity extends Activity {\n\n    @Override\n    public void\
  \ onCreate(Bundle savedInstanceState) {\n        Log.v(MainActivity.TAG, \"in DetailsActivity\
  \ onCreate\");\n        super.onCreate(savedInstanceState);\n\n        if (getResources().getConfiguration().orientation\n\
  \                == Configuration.ORIENTATION_LANDSCAPE) {\n            // 如果屏幕现在是横屏模式，意味着\n\
  \            // MainActivity 同时显示了标题和文本，\n            // 因此不再需要此 Activity。\n   \
  \         // 结束当前 Activity，让 MainActivity 完成所有工作。\n            finish();\n     \
  \       return;\n        }\n\n        if(getIntent() != null) {\n            //\
  \ 这是实例化详情片段的另一种方式。\n            DetailsFragment details =\n                DetailsFragment.newInstance(getIntent().getExtras());\n\
  \n            getFragmentManager().beginTransaction()\n                .add(android.R.id.content,\
  \ details)\n                .commit();\n        }\n    }\n}\n```\n\n这段代码有几个值得关注的地方。首先，实现起来非常简单。您只需简单判断设备的朝向，只要处于竖屏模式，就在这个详情\
  \ Activity 中设置一个新的详情片段。如果处于横屏模式，您的 `MainActivity` 能够同时显示标题片段和详情片段，因此完全没有理由再显示这个\
  \ Activity。您可能会问，既然处于横屏模式，为何还要启动这个 Activity？答案是，您不会这么做。然而，一旦这个 Activity 在竖屏模式下启动，如果用户将设备旋转至横屏模式，由于配置变化，这个详情\
  \ Activity 会被重新创建。所以现在 Activity 启动时处于横屏模式。此时，合理的做法就是结束这个 Activity，让 `MainActivity`\
  \ 接管并完成所有工作。\n\n这个详情 Activity 的另一个有趣之处在于，您从未使用 `setContentView()` 设置根内容视图。那么用户界面是如何创建的呢？仔细查看片段事务中的\
  \ `add()` 方法调用，您会发现您将片段添加到的视图容器被指定为资源 `android.R.id.content`。这是 Activity 的顶级视图容器，因此当您将片段的视图层级附加到该容器时，意味着您的片段视图层级将成为该\
  \ Activity 唯一的视图层级。您使用了之前相同的 `DetailsFragment` 类，并调用了另一个 `newInstance()` 方法（即接受\
  \ Bundle 作为参数的那个）来创建片段，然后简单地将其附加到 Activity 视图层级的顶部。这使得该片段在这个新的 Activity 中显示。\n\n\
  从用户的角度看，他们现在只看到详情片段的视图，也就是莎士比亚戏剧的文本。如果用户想选择其他标题，他们可以按下返回键，这将退出当前 Activity，露出底下的主\
  \ Activity（仅显示标题片段）。用户的另一个选择是旋转设备回到横屏模式。此时您的详情 Activity 会调用 `finish()` 并消失，露出同样旋转后的主\
  \ Activity。\n\n当设备处于竖屏模式时，如果不在主 Activity 中显示详情片段，您应该为竖屏模式准备一个独立的 `main.xml` 布局文件，如清单\
  \ 29–11 所示。\n\n**清单 29–11.** *竖屏主 Activity 的布局*\n\n```xml\n<?xml version=\"1.0\"\
  \ encoding=\"utf-8\"?>\n<!-- 此文件为 res/layout/main.xml -->\n<LinearLayout\n     \
  \   android:orientation=\"vertical\"\n        android:layout_width=\"match_parent\"\
  \n        android:layout_height=\"match_parent\">\n\n    <fragment class=\"com.androidbook.fragments.bard.TitlesFragment\"\
  \n            android:id=\"@+id/titles\"\n            android:layout_width=\"match_parent\"\
  \n            android:layout_height=\"match_parent\" />\n\n</LinearLayout>\n```\n\
  \n当然，您可以根据需要设计这个布局。在这里，我们只是简单地让它单独显示标题片段。非常棒的是，您的标题片段类无需包含过多代码来处理设备重配置。\n\n本节最后要包含的部分是\
  \ `AndroidManifest.xml` 文件，如清单 29–12 所示。\n\n**清单 29–12.** *AndroidManifest.xml 文件*\n\
  \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest\n      android:versionCode=\"\
  1\"\n      android:versionName=\"1.0\" package=\"com.androidbook.fragments.bard\"\
  >\n    <uses-sdk android:minSdkVersion=\"11\" />\n\n    <application android:icon=\"\
  @drawable/icon\"\n                 android:label=\"Shakespeare\">\n\n        <activity\n\
  \               android:name=\"com.androidbook.fragments.bard.MainActivity\"\n \
  \              android:label=\"Shakespeare\">\n          <intent-filter>\n     \
  \        <action android:name=\"android.intent.action.MAIN\" />\n             <category\
  \ android:name=\"android.intent.category.LAUNCHER\" />\n          </intent-filter>\n\
  \        </activity>\n\n        <activity\n           android:name=\"com.androidbook.fragments.bard.DetailsActivity\"\
  \n           android:label=\"ShakespeareD\">\n\n            <intent-filter>\n  \
  \            <action android:name=\"android.intent.action.VIEW\" />\n          \
  \    <category android:name=\"android.intent.category.DEFAULT\" />\n           \
  \ </intent-filter>\n        </activity>\n\n    </application>\n</manifest>\n```\n\
  \n这是一个非常标准的清单文件。您有一个主 Activity，其类别为 `LAUNCHER`，因此它会出现在设备的应用列表中。然后您有一个独立的 `DetailsActivity`，其类别为\
  \ `DEFAULT`。这使得您可以从代码中启动详情 Activity，但该详情 Activity 不会作为应用显示在应用列表中。\n\n\n\n### 片段的持久化\n\
  \n当你使用这个示例应用时，请务必旋转设备（按下 `Ctrl-F11` 键可在模拟器中旋转设备）。你会看到设备旋转，而片段也随之旋转。如果观察 LogCat 消息，你会看到该应用生成了大量日志。尤其是在设备旋转期间，请仔细留意关于片段的那些消息：不仅\
  \ Activity 会被销毁并重建，片段也是如此。\n\n到目前为止，你只针对标题片段编写了一小段代码，用于在重启后记住标题列表中的当前位置。你并没有在处理细节片段代码时执行任何配置变更处理，因为那时还不需要。Android\
  \ 会负责保留片段管理器中的片段，将它们保存起来，然后在 Activity 重建时恢复它们。你应该意识到，配置变更完成后你所得到的片段，很可能与之前内存中的片段不是同一个对象。这些片段是为你重建的。Android\
  \ 保存了参数 Bundle 以及片段所属类型的信息，同时还为每个片段保存了包含已保存状态信息的冷冻 Bundle，用于在另一端恢复片段。\n\nLogCat\
  \ 消息会显示片段与 Activity 同步经历其生命周期的过程。你会看到细节片段被重建，但你的 `newInstance()` 方法并没有被再次调用。相反，Android\
  \ 只是使用默认构造函数，然后将参数 Bundle 附加到其上，接着开始调用片段上的回调方法。这就是为什么在 `newInstance()` 方法中不要做任何花哨操作是如此重要——因为当片段被重建时，它并不会通过\
  \ `newInstance()` 来完成。\n\n到目前为止，你也应该注意到，你已经在几个不同的地方复用了你的片段。标题片段在两种不同的布局中都被使用过，但如果你查看标题片段的代码，它并没有关心每种布局的属性。你可以让这两种布局彼此差异巨大，但标题片段的代码看起来却是一样的。细节片段也是如此。它被用在了主横屏布局中，并且也单独出现在细节\
  \ Activity 里。同样，细节片段在这两种场景下的布局可以非常不同，但其代码却可以保持一致。细节 Activity 的代码也相当简单。\n\n至此，你已经探索了两种片段类型：基础的\
  \ `Fragment` 类以及 `ListFragment` 子类。接下来，你将学习 `Fragment` 的另一个子类，即 `DialogFragment`。\n\
  \n### 理解对话框片段\n\n在第 8 章中，你学习了如何在 Android 3.0 之前的 SDK 中处理 Android 对话框。Android SDK\
  \ 3.0 提供了另一种基于片段的对话框处理机制。基于片段的对话框方法预计将取代第 8 章中介绍的 Android 托管对话框协议。\n\n在本节中，你将学习如何使用对话框片段来显示一个简单的警告对话框，以及一个用于收集输入文本的自定义对话框。\n\
  \n#### DialogFragment 基础\n\n在展示提示对话框和警告对话框的工作示例之前，我们先介绍对话框片段的核心概念。3.0 版本中与对话框相关的功能都集中在一个名为\
  \ `DialogFragment` 的类中。`DialogFragment` 派生自 `Fragment` 类，其行为与片段非常相似。然后，你将使用 `DialogFragment`\
  \ 作为对话框的基类。一旦你从这个类派生出一个对话框，例如：\n\n`public class MyDialogFragment extends DialogFragment\
  \ { ... }`\n\n你就可以使用片段事务将这个对话框片段 `MyDialogFragment` 作为对话框显示出来。列表 29–13 展示了实现这一操作的伪代码。\n\
  \n**列表 29–13.** *显示一个对话框片段*\n\n```\nSomeActivity\n{\n    //....其他 Activity 函数\n\
  \    public void showDialog()\n    {\n        //构造 MyDialogFragment\n        MyDialogFragment\
  \ mdf = MyDialogFragment.newInstance(arg1,arg2);\n        FragmentManager fm = getFragmentManager();\n\
  \        FragmentTransaction ft = fm.beginTransaction();\n        mdf.show(ft,\"\
  my-dialog-tag\");\n    }\n    //....其他 Activity 函数\n}\n```\n\n从列表 29–13 中可以看出，显示对话框片段的步骤是：\n\
  \n1.  创建一个对话框片段。\n2.  获取一个片段事务。\n3.  使用步骤 2 中的片段事务显示对话框。\n\n我们来逐一介绍这些步骤。\n\n#####\
  \ 构造对话框片段\n\n对话框片段作为一种片段，在构造时也适用同样的规则与约定。推荐的方式是使用像 `newInstance()` 这样的工厂方法，就像你之前做的那样。在该\
  \ `newInstance()` 方法内部，你会使用对话框片段的默认构造函数，然后添加一个包含传入参数的参数 Bundle。你不应该在这个方法中执行其他工作，因为必须确保你所做的操作与\
  \ Android 从保存状态恢复对话框片段时的行为保持一致。而 Android 所做的仅仅是调用默认构造函数并重新创建其参数 Bundle。\n\n######\
  \ 重写 onCreateView\n\n当你从对话框片段继承时，需要重写两个方法之一来为对话框提供视图层次结构。第一种选择是重写 `onCreateView()`\
  \ 并返回一个视图。第二种选择是重写 `onCreateDialog()` 并返回一个 Dialog（例如通过 `AlertDialog.Builder` 构造的\
  \ Dialog）。\n\n列表 29–14 展示了一个重写 `onCreateView()` 的示例。\n\n**列表 29–14.** *重写 `DialogFragment`\
  \ 的 `onCreateView()`*\n\n```\nMyDialogFragment\n{\n    .....其他函数\n    public View\
  \ onCreateView(LayoutInflater inflater,\n            ViewGroup container, Bundle\
  \ savedInstanceState)\n    {\n        //通过填充期望的布局来创建视图\n        View v =\n     \
  \       inflater.inflate(R.layout.prompt_dialog,container,false);\n\n        //你可以定位视图并设置值\n\
  \        TextView tv = (TextView)v.findViewById(R.id.promptmessage);\n        tv.setText(this.getPrompt());\n\
  \n        //你可以在按钮上设置回调\n        Button dismissBtn = (Button)v.findViewById(R.id.btn_dismiss);\n\
  \        dismissBtn.setOnClickListener(this);\n\n        Button saveBtn = (Button)v.findViewById(\n\
  \                                    R.id.btn_save);\n        saveBtn.setOnClickListener(this);\n\
  \        return v;\n    }\n    .....其他函数\n}\n```\n\n在列表 29–14 中，你加载了一个由布局标识的视图。然后你找到了两个按钮并为其设置了回调。这与之前创建细节片段的方式非常相似。但与之前的片段不同，对话框片段还有另一种创建视图层次结构的方法。\n\
  \n\n\n###### 重写 `onCreateDialog()`\n\n作为在 `onCreateView()` 中提供视图的替代方案，你可以重写 `onCreateDialog()`\
  \ 并提供一个对话框实例。清单 29-15 为此方法提供了示例代码。\n\n**清单 29-15.** *重写 `DialogFragment` 的 `onCreateDialog()`\
  \ 方法*\n\n```\nMyDialogFragment\n{\n    .....其他函数\n    @Override\n    public Dialog\
  \ onCreateDialog(Bundle icicle)\n    {\n        AlertDialog.Builder b = new AlertDialog.Builder(getActivity());\n\
  \        b.setTitle(\"我的对话框标题\");\n        b.setPositiveButton(\"确定\", this);\n\
  \        b.setNegativeButton(\"取消\", this);\n        b.setMessage(this.getMessage());\n\
  \        return b.create();\n    }\n    .....其他函数\n}\n```\n\n在此示例中，你使用 AlertDialog\
  \ 构建器来创建要返回的对话框对象。这对于简单的对话框十分有效。第一种重写 `onCreateView()` 的方法同样简单，并且提供了更多的灵活性。\n\n\
  ### 显示 `DialogFragment`\n\n构建好对话框片段后，你需要一个片段事务来显示它。与所有其他片段一样，对对话框片段的操作是通过片段事务进行的。\n\
  \n对话框片段上的 `show()` 方法将一个片段事务作为输入。你可以在清单 29-13 中看到这一点。`show()` 方法使用该片段事务将此对话框添加到\
  \ Activity 中，然后提交该片段事务。然而，`show()` 方法不会将此事务添加到返回栈中。如果你希望这样做，则需要先将此事务添加到返回栈，然后再将其传递给\
  \ `show()` 方法。对话框片段的 `show()` 方法具有以下签名：\n\n```\npublic int show(FragmentTransaction\
  \ transaction, String tag)\npublic int show(FragmentManager manager, String tag)\n\
  ```\n\n第一个 `show()` 方法通过使用指定的标签将此片段添加到传入的事务中来显示对话框。然后，此方法返回已提交事务的标识符。\n\n第二个 `show()`\
  \ 方法自动从事务管理器获取一个事务。这是一个快捷方法。然而，当你使用这第二种方法时，你无法选择将事务添加到返回栈中。如果你需要那种控制，则必须使用第一种方法。如果你只想简单地显示对话框，并且当时没有其他理由要处理片段事务，则可以使用第二种方法。\n\
  \n对话框作为片段的一个好处是，底层的片段管理器会进行基本的状态管理。例如，即使显示对话框时设备发生旋转，对话框也会被重新创建，而你无需执行任何状态管理。\n\n\
  对话框片段还提供了控制对话框视图显示框架的方法，例如标题和框架的外观。请参阅 `DialogFragment` 类文档以查看更多此类选项；本章末尾提供了该 URL。\n\
  \n### 关闭 `DialogFragment`\n\n有两种方法可以关闭对话框片段。第一种是响应按钮或对话框视图上的某些操作，显式调用对话框片段上的 `dismiss()`\
  \ 方法，如清单 29-16 所示。\n\n**清单 29-16.** *调用 `dismiss()`*\n\n```\nif (someview.getId()\
  \ == R.id.btn_dismiss)\n{\n    //使用一些回调来通知此对话框的客户端\n    //它正在被关闭\n    //然后调用 dismiss()\n\
  \    dismiss();\n    return;\n}\n```\n\n对话框片段的 `dismiss()` 方法将从片段管理器中移除该片段，然后提交该事务。如果此对话框片段有一个返回栈，那么\
  \ `dismiss()` 将仅把当前对话框弹出事务栈，并呈现上一个片段事务状态。无论是否有返回栈，调用 `dismiss()` 都会导致调用标准的对话框片段销毁回调，包括\
  \ `onDismiss()`。\n\n需要注意的一点是，你不能依赖 `onDismiss()` 来确定 `dismiss()` 已由你的代码调用。这是因为当设备配置更改时，`onDismiss()`\
  \ 也会被调用，因此它并不能很好地指示用户对对话框本身做了什么。如果用户在旋转设备时对话框正在显示，那么即使没有按下对话框内的按钮，对话框片段也会看到 `onDismiss()`\
  \ 被调用。相反，你应该始终依赖于对话框视图上的显式按钮点击。\n\n如果在对话框片段显示时用户按下了返回键，这将触发对话框片段上的 `onCancel()`\
  \ 回调。默认情况下，Android 会使对话框片段消失，因此你无需自己在片段上调用 `dismiss()`。但是，如果你希望调用方 Activity 收到对话框已被取消的通知，则需要在\
  \ `onCancel()` 内调用逻辑来实现这一点。这是对话框片段中 `onCancel()` 和 `onDismiss()` 之间的区别。对于 `onDismiss()`，你仍然无法确切知道是什么原因导致了\
  \ `onDismiss()` 回调被触发。你可能还注意到对话框片段没有 `cancel()` 方法，只有 `dismiss()`，但正如我们所说，当对话框片段因按下返回键而被取消时，Android\
  \ 会为你处理取消/关闭操作。\n\n关闭对话框片段的另一种方法是呈现另一个对话框片段。关闭当前对话框并呈现新对话框的方式与仅关闭当前对话框略有不同。清单 29-17\
  \ 显示了一个示例。\n\n**清单 29-17.** *为返回栈设置对话框*\n\n```\nif (someview.getId() == R.id.btn_invoke_another_dialog)\n\
  {\n    Activity act = getActivity();\n    FragmentManager fm = act.getFragmentManager();\n\
  \    FragmentTransaction ft = fm.beginTransaction();\n    ft.remove(this);\n\n \
  \   ft.addToBackStack(null);\n    // null 表示返回栈事务没有名称\n\n    HelpDialogFragment\
  \ hdf =\n        HelpDialogFragment.newInstance(R.string.helptext);\n    hdf.show(ft,\
  \ \"HELP\");\n    return;\n}\n```\n\n在单个事务中，你正在移除当前对话框片段并添加新的对话框片段。这会产生使当前对话框在视觉上消失并使新对话框出现的效果。如果用户按下返回键，由于你已将此事保存在返回栈上，新对话框将被关闭，而先前的对话框将重新显示。例如，这是一种显示帮助对话框的便捷方式。\n\
  \n\n\n#### 对话框关闭的影响\n\n当你向 Fragment 管理器添加任何片段时，Fragment 管理器会负责该片段的状态管理。这意味着当设备配置发生变化时（例如设备旋转），Activity\
  \ 会重新启动，其中的片段也会随之重新启动。你在运行莎士比亚示例应用时旋转设备，应该已经看到了这一点。\n\n设备配置变化不会影响对话框，因为它们同样由 Fragment\
  \ 管理器管理。但 `show()` 和 `dismiss()` 方法的隐式行为意味着，如果不小心，你可能很容易就失去对话框片段的踪迹。`show()` 方法会自动将片段添加到\
  \ Fragment 管理器；而 `dismiss()` 方法则自动从 Fragment 管理器中移除该片段。在开始显示片段之前，你可能持有一个指向该对话框片段的直接指针。但你无法先将此片段添加到\
  \ Fragment 管理器，之后再调用 `show()`，因为一个片段只能被添加到 Fragment 管理器一次。你可能计划通过 Activity 的恢复机制来重新获取这个指针。然而，如果你显示并关闭了这个对话框，该片段会隐式地从\
  \ Fragment 管理器中移除，从而使得该片段无法被恢复和重新指向（因为 Fragment 管理器在片段被移除后就不再知道它的存在了）。\n\n如果你希望在对话框关闭后仍保留其状态，就需要在对话框之外维护该状态，要么在父\
  \ Activity 中，要么在一个会存续更长时间的非对话框片段中。\n\n### DialogFragment 示例应用\n\n接下来，你将创建一个示例应用来演示对话框片段的这些概念。同时，你还将介绍片段与其宿主\
  \ Activity 之间的通信概念。要实现这一切，你需要五个 Java 文件。\n\n- `MainActivity.java` 是你的应用的主 Activity。它将显示一个包含帮助文本的简单视图以及一个可以启动对话框的菜单。\n\
  - `PromptDialogFragment.java` 是一个对话框片段示例，它使用 XML 定义自己的布局，并允许用户输入。对话框上有三个按钮：Save（保存）、Dismiss（即取消）和\
  \ Help（帮助）。\n- `AlertDialogFragment.java` 是一个对话框片段示例，它使用 `AlertBuilder` 类在该片段内创建一个对话框。这是创建对话框的老式方法；它允许你复用已有的对话框知识来创建片段内的对话框。\n\
  - `HelpDialogFragment.java` 是一个非常简单的片段，用于显示来自应用资源的帮助消息。创建帮助对话框对象时，会指定具体的帮助消息。此帮助片段既可以从主\
  \ Activity 显示，也可以从 Prompt 对话框片段显示。\n- `OnDialogDoneListener.java` 是一个接口，你需要让 Activity\
  \ 实现它，以便从片段接收消息。使用接口意味着你的片段无需过多了解调用它的 Activity，只需知道它必须实现此接口即可。这有助于将功能封装到其所属的位置。从\
  \ Activity 的角度来看，它拥有一种通用的方式从片段接收信息，而无需了解片段太多细节。\n\n此应用有三个布局文件：分别用于主 Activity、Prompt\
  \ 对话框片段和帮助对话框片段。请注意，你不需要为 Alert 对话框片段提供布局，因为 `AlertBuilder` 会在内部为你处理布局。完成后，你的应用将如图\
  \ 29-3 所示。\n\n![image](img/2903.jpg)\n\n**图 29-3.** *对话框片段示例应用的用户界面*\n\n#### 对话框示例：MainActivity\n\
  \n现在来看源代码。清单 29-18 展示了你的主 Activity。\n\n**清单 29-18.** *对话框片段的主 Activity*\n\n```java\n\
