  \n        for(Sensor sensor : sensors) {\n            message.append(sensor.getName()\
  \ + \"\\n\");\n            message.append(\"  类型: \" +\n                    sensorTypes.get(sensor.getType())\
  \ + \"\\n\");\n            message.append(\"  厂商: \" +\n                    sensor.getVendor()\
  \ + \"\\n\");\n            message.append(\"  版本: \" +\n                    sensor.getVersion()\
  \ + \"\\n\");\n            message.append(\"  分辨率: \" +\n                    sensor.getResolution()\
  \ + \"\\n\");\n            message.append(\"  最大范围: \" +\n                    sensor.getMaximumRange()\
  \ + \"\\n\");\n            message.append(\"  功耗: \" +\n                    sensor.getPower()\
  \ + \" mA\\n\");\n        }\n        text.setText(message);\n    }\n\n    private\
  \ HashMap<Integer, String> sensorTypes =\n                      new HashMap<Integer,\
  \ String>();\n\n    {\n      sensorTypes.put(Sensor.TYPE_ACCELEROMETER, \"TYPE_ACCELEROMETER\"\
  );\n      sensorTypes.put(Sensor.TYPE_GYROSCOPE, \"TYPE_GYROSCOPE\");\n      sensorTypes.put(Sensor.TYPE_LIGHT,\
  \ \"TYPE_LIGHT\");\n      sensorTypes.put(Sensor.TYPE_MAGNETIC_FIELD, \"TYPE_MAGNETIC_FIELD\"\
  );\n      sensorTypes.put(Sensor.TYPE_ORIENTATION, \"TYPE_ORIENTATION\");\n    \
  \  sensorTypes.put(Sensor.TYPE_PRESSURE, \"TYPE_PRESSURE\");\n      sensorTypes.put(Sensor.TYPE_PROXIMITY,\
  \ \"TYPE_PROXIMITY\");\n      sensorTypes.put(Sensor.TYPE_TEMPERATURE, \"TYPE_TEMPERATURE\"\
  );\n      sensorTypes.put(Sensor.TYPE_GRAVITY, \"TYPE_GRAVITY\");\n      sensorTypes.put(Sensor.TYPE_LINEAR_ACCELERATION,\n\
  \                            \"TYPE_LINEAR_ACCELERATION\");\n      sensorTypes.put(Sensor.TYPE_ROTATION_VECTOR,\n\
  \                            \"TYPE_ROTATION_VECTOR\");\n    }\n}\n```\n\n\n\n###\
  \ 排版后的文本\n\n请注意，在这个示例中我们使用了 `ScrollView`，因为很容易出现屏幕一屏无法显示所有行的情况。在 `onCreate()` 方法中，我们首先获取对\
  \ `SensorManager` 的引用。系统中只能有一个这样的管理器，所以我们通过系统服务来获取它。接着，我们调用它的 `getSensorList()`\
  \ 方法获取传感器列表。对于每个传感器，我们输出其相关信息。输出结果类似于图 26–1 所示。\n\n![images](img/2601.jpg)\n\n**图\
  \ 26–1.** *传感器列表应用的输出结果*\n\n关于这些传感器信息，有几点需要了解。类型值（type）用于表示传感器的基本类型，但不会具体到某个型号。光线传感器就是光线传感器，但不同设备上的光线传感器可能存在差异。例如，一台设备上光线传感器的分辨率可能与另一台设备不同。当您在\
  \ `<uses-feature>` 标签中指定应用需要光线传感器时，您无法预先知道会获得哪种具体类型的光线传感器。因此，您需要查询设备来了解情况，并相应地调整代码。\n\
  \n您获得的 resolution（分辨率）和 maximum range（最大量程）值将以该传感器对应的单位呈现。power（功耗）测量值以毫安（mA）为单位，表示传感器从设备电池中消耗的电流；数值越小越好。\n\
  \n现在我们已经知道了设备上可用的传感器，那么如何从它们那里获取数据呢？正如之前解释的，我们需要设置一个监听器来接收传感器发送给我们的数据。接下来我们就来探讨这一点。\n\
  \n### 获取传感器事件\n\n一旦我们注册了监听器来接收数据，传感器就会向我们的应用提供数据。当监听器未处于监听状态时，传感器可以关闭以节省电池电量，因此请确保只在确实需要时才进行监听。设置传感器监听器非常简单。假设我们要测量光线传感器的光照强度。代码清单\
  \ 26–2 展示了一个实现此功能的示例应用的 Java 代码。本示例将使用与代码清单 26–1 相同的 XML 布局。\n\n**代码清单 26–2.** *光线传感器监控应用的\
  \ Java 代码*\n\n```\n// This file is MainActivity.java\nimport android.app.Activity;\n\
  import android.hardware.Sensor;\nimport android.hardware.SensorEvent;\nimport android.hardware.SensorEventListener;\n\
  import android.hardware.SensorManager;\nimport android.os.Bundle;\nimport android.widget.TextView;\n\
  \npublic class MainActivity extends Activity implements SensorEventListener {\n\
  \    private SensorManager mgr;\n    private Sensor light;\n    private TextView\
  \ text;\n    private StringBuilder msg = new StringBuilder(2048);\n\n    @Override\n\
  \    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n\n        mgr = (SensorManager) this.getSystemService(SENSOR_SERVICE);\n\
  \n        light = mgr.getDefaultSensor(Sensor.TYPE_LIGHT);\n\n        text = (TextView)\
  \ findViewById(R.id.text);\n    }\n\n    @Override\n    protected void onResume()\
  \ {\n        mgr.registerListener(this, light,\n                SensorManager.SENSOR_DELAY_NORMAL);\n\
  \        super.onResume();\n    }\n\n    @Override\n    protected void onPause()\
  \ {\n        mgr.unregisterListener(this, light);\n        super.onPause();\n  \
  \  }\n\n    public void onAccuracyChanged(Sensor sensor, int accuracy) {\n     \
  \   msg.insert(0, sensor.getName() + \" accuracy changed: \" +\n            accuracy\
  \ + (accuracy==1?\" (LOW)\":(accuracy==2?\" (MED)\":\n            \" (HIGH)\"))\
  \ + \"\\n\");\n        text.setText(msg);\n        text.invalidate();\n    }\n\n\
  \    public void onSensorChanged(SensorEvent event) {\n        msg.insert(0, \"\
  Got a sensor event: \" + event.values[0] +\n            \" SI lux units\\n\");\n\
  \        text.setText(msg);\n        text.invalidate();\n    }\n}\n```\n\n在这个示例应用中，我们再次获取了\
  \ `SensorManager` 的引用，但这次不是获取传感器列表，而是专门查询光线传感器。接着，我们在 Activity 的 `onResume()` 方法中设置了一个监听器，并在\
  \ `onPause()` 方法中注销该监听器。我们不希望在应用不在前台运行时还去操心光照强度。\n\n对于 `registerListener()` 方法，我们传入一个值，表示希望以多高的频率获知传感器数值变化。该参数可以是：\n\
  \n*   `SENSOR_DELAY_NORMAL`\n*   `SENSOR_DELAY_UI`\n*   `SENSOR_DELAY_GAME`\n* \
  \  `SENSOR_DELAY_FASTEST`\n\n为该参数选择合适的值非常重要。有些传感器非常灵敏，会在短时间内产生大量事件。如果您选择 `SENSOR_DELAY_FASTEST`，甚至可能超出应用的处理能力。根据应用对每个传感器事件的处理方式，您可能会在内存中创建和销毁大量对象，导致垃圾回收造成设备明显的卡顿和延迟。另一方面，某些传感器（尤其是旋转矢量传感器）则要求尽可能频繁地读取数据。\n\
  \n由于我们的 Activity 实现了 `SensorEventListener` 接口，我们拥有两个用于处理传感器事件的回调方法：`onAccuracyChanged()`\
  \ 和 `onSensorChanged()`。第一个方法会通知我们传感器（或多个传感器，因为它可能被多个传感器触发）的精度是否发生变化。精度参数（accuracy）的值为\
  \ 0、1、2 或 3，分别对应不可靠、低精度、中等精度和高精度。不可靠的精度并不意味着设备损坏；它通常意味着传感器需要校准。第二个回调方法会在光照强度发生变化时通知我们，同时我们会收到一个传感器事件对象，其中包含来自传感器的一个或多个新值的详细信息。\n\
  \n`SensorEvent` 对象有多个成员，其中之一是一个浮点数值数组。对于光线传感器事件，只有第一个浮点数值有意义，它是传感器检测到的光照的 SI 勒克斯值。在我们的示例应用中，我们通过将新消息插入到旧消息之前来构建消息字符串，然后将消息批处理显示在\
  \ `TextView` 中。最新的传感器值将始终显示在屏幕顶部。\n\n当您运行此应用时（当然是在真实设备上，因为模拟器没有光线传感器），您可能会注意到一开始没有任何显示。只需改变照射在设备左上角的光线即可。这很可能是您设备光线传感器的位置。如果您非常仔细地观察，可能会在屏幕后面看到一个点，那就是光线传感器。如果您用手指挡住这个点，光照强度很可能会变为一个非常小的值（尽管可能不会降到零）。屏幕上应该会显示消息，告知您光照强度的变化。\n\
  \n**注意：** 您可能还会注意到，挡住光线传感器后，您的按钮会亮起（如果您的设备带有发光按钮）。这是因为 Android 检测到环境变暗，从而点亮按钮以便于操作设备。\n\
  \n#### 获取传感器数据时的问题\n\nAndroid 传感器框架存在一些您需要了解的问题。这部分内容可不太有趣。在某些情况下，我们有办法绕过问题，而在其他情况下则没有办法，或者处理起来非常困难。\n\
  \n##### onAccuracyChanged() 永远返回相同值\n\n在 Android 2.2 之前，每次有新的传感器读数时，都会调用 `onAccuracyChanged()`\
  \ 回调，并且精度参数始终为 3（表示高精度）。适应传感器数据精度变化是一个好习惯，但如果发现即使精度没有变化，该方法也一直被调用，请不要感到惊讶。\n\n\n\
  ##### 无法直接访问传感器数值\n\n你可能已经注意到，并没有直接查询传感器当前数值的方法。从传感器获取数据的唯一途径是通过监听器。这意味着，即便我们已经设置好了监听器，也无法保证能在设定时间内获得新数据。至少回调是异步的，这样我们就不会为了等待传感器数据而阻塞\
  \ UI 线程。但你的应用程序必须适应：传感器数据可能无法在你需要的精确时刻获取。\n\n通过使用原生代码和 Android 的 JNI 功能，确实可以直接访问传感器。你需要了解所关心的传感器驱动底层原生\
  \ API 调用，并能够设置回 Android 的接口。所以这是可行的，但并不容易。\n\n##### 传感器数值发送速度不够快\n\n即便是采用`SENSOR_DELAY_FASTEST`速率，我们可能也只能每\
  \ 20 毫秒获取一次新数据（这取决于设备）。如果你需要比`SENSOR_DELAY_FASTEST`速率设置更快的传感器数据，可以使用原生代码和 JNI 来更快获取传感器数据，但和前面提到的情况类似，这并不容易。\n\
  \n##### Android 2.1 中屏幕关闭时会关闭传感器\n\n在 Android 2.1 中存在一个问题：当屏幕关闭时，传感器更新会被关闭。显然有人认为即使你的应用程序（很可能使用了服务）持有唤醒锁，在屏幕关闭时不发送传感器更新是个好主意。基本上，当屏幕关闭时，你的监听器会被注销。针对这个问题有几种解决方法。第一种是设置屏幕超时时间，使其在你希望持续接收传感器更新期间不会关闭。但这样做的主要缺点是会消耗电池电量。要更改屏幕关闭超时时间，需要执行类似以下操作，其中`myDelay`是以毫秒为单位的时间段：\n\
  \n```\nSettings.System.putInt(getContentResolver(),\n                     Settings.System.SCREEN_OFF_TIMEOUT,\
  \ myDelay);\n```\n\n你可以使用值-1，这样屏幕永远不会关闭。你的应用程序还需要在`AndroidManifest.xml`文件中拥有适当的权限（`android.permission.WRITE_SETTINGS`）才能执行此操作。这种方法的另一个缺点是屏幕关闭超时是一个全局值。当你的应用程序更改它时，所有应用都会受影响。你的应用程序应该记住之前的设置，并在应用程序结束时恢复它。即便如此也可能存在问题，因为理论上用户可能启动你的应用程序，发现屏幕不再关闭，进入“设置”将其完全改为其他值，然后返回你的应用程序并结束它。更不用说如果用户在应用程序启动后更改了设置，屏幕可能会关闭，你的应用程序将停止接收传感器更新。\n\
  \n### 用于持续传感器更新的注销/注册技术\n\n保持传感器更新持续的一种方法是在屏幕关闭时注册以接收广播通知，然后注销传感器事件监听器，并在`BroadcastReceiver`的`onReceive()`方法中重新注册传感器事件监听器。这在某些\
  \ 2.1 手机上有效，但并非所有手机都有效。\n\n由于当屏幕变暗时你的应用程序通常会暂停，首先你需要获取部分唤醒锁，以便即使屏幕关闭时也能保持应用程序运行。我们的示例使用\
  \ Activity，但在实际应用程序中，你很可能将传感器监听代码放在服务中。清单 26-3 展示了作为 Activity 可能的样子。\n\n**清单 26-3.**\
  \ *解决 SensorListeners 关闭问题*\n\n```\npackage com.androidbook.sensor.accel;\n\n//\
  \ 此文件为 MainActivity.java\nimport java.io.BufferedWriter;\nimport java.io.FileWriter;\n\
  import java.io.IOException;\nimport java.text.SimpleDateFormat;\nimport java.util.Date;\n\
  import android.app.Activity;\nimport android.content.BroadcastReceiver;\nimport\
  \ android.content.Context;\nimport android.content.Intent;\nimport android.content.IntentFilter;\n\
  import android.hardware.Sensor;\nimport android.hardware.SensorEvent;\nimport android.hardware.SensorEventListener;\n\
  import android.hardware.SensorManager;\nimport android.os.Bundle;\nimport android.os.Environment;\n\
  import android.os.PowerManager;\nimport android.os.PowerManager.WakeLock;\nimport\
  \ android.provider.Settings;\nimport android.util.Log;\n\npublic class MainActivity\
  \ extends Activity implements SensorEventListener {\n    private static final String\
  \ TAG = \"AccelerometerRecordToFile\";\n    private WakeLock mWakelock = null;\n\
  \    private SensorManager mMgr;\n    private Sensor mAccel;\n    private BufferedWriter\
  \ mLog;\n    final private SimpleDateFormat mTimeFormat =\n                new SimpleDateFormat(\"\
  HH:mm:ss - \");\n    private int mSavedTimeout;\n\n    @Override\n    public void\
  \ onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n\n        mMgr = (SensorManager) this.getSystemService(SENSOR_SERVICE);\n\
  \n        mAccel = mMgr.getDefaultSensor(Sensor.TYPE_ACCELEROMETER);\n\n       \
  \ // 设置要写入的日志文件。为了防止在实验过程中此 Activity 重新启动，我们将采用追加写入模式。\n        try {\n        \
  \    String filename =\n    Environment.getExternalStorageDirectory().getAbsolutePath()\
  \ +\n                \"/accel.log\";\n            mLog = new BufferedWriter(new\
