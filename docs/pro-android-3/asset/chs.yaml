  \      Log.e(TAG, \"无法初始化日志文件\");\n            e.printStackTrace();\n          \
  \  finish();\n        }\n\n        PowerManager pwrMgr =\n                   (PowerManager)\
  \ this.getSystemService(POWER_SERVICE);\n        mWakelock = pwrMgr.newWakeLock(PowerManager.PARTIAL_WAKE_LOCK,\n\
  \                                  \"Accel\");\n        mWakelock.acquire();\n\n\
  \        // 保存屏幕超时的当前值，然后将其设置为一个较小的值\n        try {\n            mSavedTimeout =\
  \ Settings.System.getInt(getContentResolver(),\n                Settings.System.SCREEN_OFF_TIMEOUT);\n\
  \        }\n        catch(Exception e) {\n            mSavedTimeout = 120000;  //\
  \ 如果无法读取当前值，\n                                     // 则默认设为 2 分钟\n        }\n  \
  \      Settings.System.putInt(getContentResolver(),\n            Settings.System.SCREEN_OFF_TIMEOUT,\
  \ 5000);  // 5 秒\n    }\n```\n\n\n```java\npublic BroadcastReceiver mReceiver =\
  \ new BroadcastReceiver() {\n    public void onReceive(Context context, Intent intent)\
  \ {\n        if (Intent.ACTION_SCREEN_OFF.equals(intent.getAction())) {\n      \
  \      writeLog(\"屏幕已关闭\");\n            // 注销监听器并重新注册。\n            // 仅在 Android\
  \ 2.1 中需要执行此操作，但\n            // 在任何版本中执行此操作也无妨。\n\n            mMgr.unregisterListener(MainActivity.this);\n\
  \            mMgr.registerListener(MainActivity.this, mAccel,\n                SensorManager.SENSOR_DELAY_NORMAL);\n\
  \n        }\n    }\n};\n\n@Override\nprotected void onStart() {\n    writeLog(\"\
  启动中...\");\n    mMgr.registerListener(this, mAccel,\n                    SensorManager.SENSOR_DELAY_NORMAL);\n\
  \n    IntentFilter filter = new IntentFilter(Intent.ACTION_SCREEN_OFF);\n    registerReceiver(mReceiver,\
  \ filter);\n\n    super.onStart();\n}\n\n@Override\nprotected void onStop() {\n\
  \    writeLog(\"停止中...\");\n    mMgr.unregisterListener(this, mAccel);\n    unregisterReceiver(mReceiver);\n\
  \    try {\n        mLog.flush();\n    } catch (IOException e) {\n        // 忽略日志文件中的任何错误\n\
  \    }\n    super.onStop();\n}\n\n@Override\nprotected void onDestroy() {\n    writeLog(\"\
  关闭中...\");\n    try {\n        mLog.flush();\n        mLog.close();\n    }\n   \
  \ catch(Exception e) {\n        // 忽略日志文件中的任何错误\n    }\n\n    // 将屏幕关闭超时恢复为之前的值\n\
  \    Settings.System.putInt(getContentResolver(),\n            Settings.System.SCREEN_OFF_TIMEOUT,\
  \ mSavedTimeout);\n\n    mWakelock.release();\n\n    super.onDestroy();\n}\n\npublic\
  \ void onAccuracyChanged(Sensor sensor, int accuracy) {\n    // 忽略\n}\n\npublic\
  \ void onSensorChanged(SensorEvent event) {\n    writeLog(\"收到传感器事件: \" + event.values[0]\
  \ + \", \" +\n            event.values[1] + \", \" + event.values[2]);\n}\n\nprivate\
  \ void writeLog(String str) {\n    try {\n        Date now = new Date();\n     \
  \   mLog.write(mTimeFormat.format(now));\n        mLog.write(str);\n        mLog.write(\"\
  \\n\");\n    }\n    catch(IOException ioe) {\n        ioe.printStackTrace();\n \
  \   }\n}\n```\n\n在这个示例中我们不需要担心 XML 布局，因为我们除了应用程序标题之外不会显示任何其他内容。不过，我们确实需要考虑权限问题，因此清单\
  \ 26-4 展示了我们的加速度计监控应用的`AndroidManifest.xml`文件。\n\n**清单 26-4.** *加速度计监控应用的 AndroidManifest.xml*\n\
  \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest\n      android:versionCode=\"\
  1\"\n      android:versionName=\"1.0\" package=\"com.androidbook.sensor.accel\"\
  >\n    <application android:icon=\"@drawable/icon\"\n           android:label=\"\
  @string/app_name\">\n        <activity android:name=\".MainActivity\"\n        \
  \          android:label=\"@string/app_name\">\n          <intent-filter>\n    \
  \        <action android:name=\"android.intent.action.MAIN\" />\n            <category\
  \ android:name=\"android.intent.category.LAUNCHER\" />\n          </intent-filter>\n\
  \        </activity>\n\n    </application>\n    <uses-sdk android:minSdkVersion=\"\
  3\" />\n\n<uses-permission android:name=\"android.permission.WRITE_EXTERNAL_STORAGE\"\
  \ />\n<uses-permission android:name=\"android.permission.WRITE_SETTINGS\" />\n<uses-permission\
  \ android:name=\"android.permission.WAKE_LOCK\" />\n</manifest>\n```\n\n在此示例中，主要目标是将加速度计事件写入日志文件。在`onCreate()`方法中，我们需要获取部分唤醒锁，以便在屏幕关闭时应用程序不会被休眠（我们在第\
  \ 14 章中介绍了唤醒锁）。我们还将屏幕关闭超时设置为五秒，使其能较快关闭，但会保存之前的超时值，以便稍后在`onDestroy()`方法中恢复。\n\n**注意：**\
  \ 我们正在修改屏幕关闭超时，以便您可以观察屏幕关闭时传感器事件监听器的行为。在实际应用中我们不会这样做。\n\n我们还设置了一个`BroadcastReceiver`，当屏幕关闭时会收到通知。我们在`onReceive()`中记录这一事件，然后执行\
  \ Android 2.1 的变通方法以继续接收传感器事件。`onStart()`方法用于注册传感器事件监听器，同时也注册`BroadcastReceiver`。这两个监听器都在`onStop()`中取消注册。我们使用`onStart()`和`onStop()`而不是`onResume()`和`onPause()`，因为即使应用运行时用户切换到其他\
  \ Activity，我们也希望继续监听传感器。\n\n`onDestroy()`方法负责清理工作，包括刷新并关闭日志文件、恢复屏幕关闭超时以及释放唤醒锁。与之前的示例不同，`onAccuracyChanged()`回调不执行任何操作。`onSensorChanged()`方法负责将事件数据写入日志文件。\n\
  \n这种传感器事件监听器的处理模式也是您在实际应用中会采用的方法。与我们之前不关心设备休眠的示例不同，您很可能需要获取唤醒锁，以确保应用程序即使屏幕变暗也能捕获事件。请注意，如果您的目标平台是\
  \ Android 2.2 及更高版本，则无需担心在`BroadcastReceiver`中取消注册和重新注册传感器事件监听器。对于 Android 2.0 之前的版本，同样不需要担心。\n\
  \n这是一个有趣的应用程序，您可以尝试运行。您可能想做的一件事是：\n\n1.  安装应用，然后断开设备与工作站的连接，使其不再通过 USB 数据线连接（这有时会导致屏幕无论显示设置如何都保持常亮）。\n\
  \n应用启动后，您可以移动设备，大约五秒后屏幕会变暗。\n\n2.  继续移动设备以触发加速度计事件，几秒钟后，解锁设备，然后按返回键结束应用。\n\n您会在设备\
  \ SD 卡的主目录中找到名为`access.log`的日志文件。\n\n3.  将设备重新连接到工作站的 USB 数据线，然后将`access.log`文件复制到工作站上查看。\n\
  \n您会看到一条启动消息、多条事件消息，然后是一条“屏幕已关闭”的消息。根据您的设备和运行的 Android 版本，您可能会看到此消息之后立即发生额外的事件，或者您会看到事件出现一段时间空白，直到您解锁设备并结束应用。\n\
  \n\n#### 保持屏幕常亮以实现传感器持续更新\n\n针对 Android 2.1 还有另一种可行的解决方案。其基本症状是：某些 Android 2.1 设备上的传感器在屏幕关闭时会完全停止工作。因此，解决方案就是确保屏幕保持开启状态。代码清单\
  \ 26–5 展示了上一示例应用中 `BroadcastReceiver` 的另一个版本，只不过这次我们在屏幕熄灭后立即将其重新点亮（尽管处于变暗模式），同时对其他部分的代码进行了一些小修改。由于从技术上讲，即使屏幕变暗也算开启，传感器数据便能持续流向我们的\
  \ Android 2.1 应用。如果你从我们的网站导入项目，这个项目名为 `AccelerometerRecordToFileAlwaysOn`。\n\n**代码清单\
  \ 26–5.** *即使用户关闭屏幕也保持其开启*\n\n```\n// 将这些对象添加到我们的 Activity 中\n    private PowerManager\
  \ mPwrMgr;\n    private WakeLock mTurnBackOn = null;\n    private Handler handler\
  \ = new Handler();\n\n// 将以下 3 行代码添加到我们的 onCreate() 方法中\n        mPwrMgr = (PowerManager)\
  \ this.getSystemService(POWER_SERVICE);\n        mWakelock = mPwrMgr.newWakeLock(PowerManager.PARTIAL_WAKE_LOCK,\
  \ \"Accel\");\n        mWakelock.acquire();\n\n// 此代码替换了 MainActivity.java 中的 BroadcastReceiver\n\
  \    public BroadcastReceiver mReceiver = new BroadcastReceiver() {\n        public\
  \ void onReceive(Context context, Intent intent) {\n            if (Intent.ACTION_SCREEN_OFF.equals(intent.getAction()))\
  \ {\n                writeLog(\"屏幕已关闭\");\n                // 从主线程重新点亮屏幕\n     \
  \           handler.post(new Runnable() {\n                    public void run()\
  \ {\n                        if(mTurnBackOn != null)\n                         \
  \   mTurnBackOn.release();\n\n                        mTurnBackOn = mPwrMgr.newWakeLock(\n\
  \                                PowerManager.SCREEN_DIM_WAKE_LOCK |\n         \
  \                           PowerManager.ACQUIRE_CAUSES_WAKEUP,\n              \
  \                  \"AccelOn\");\n                        mTurnBackOn.acquire();\n\
  \                    }});\n            }\n        }\n    };\n\n// 不要忘记将其添加到 onDestroy()\
  \ 中\n    if(mTurnBackOn != null)\n        mTurnBackOn.release();\n```\n\n现在，当你运行此应用时，即使用户按下电源键关闭屏幕，该应用也会捕获此事件，并通过唤醒锁以变暗模式重新点亮屏幕。在此过程中，传感器事件可能会出现一个非常短暂的间隔，但这比屏幕关闭时出现较长间隔要好得多。注意我们如何使用一个\
  \ `Handler` 从 `BroadcastReceiver` 中发送一个 `Runnable`。这确保我们的代码在主线程上运行，这对于我们想要在 `onDestroy()`\
  \ 中释放唤醒锁非常重要。获取和释放必须在同一个线程中进行。\n\n另请注意，我们在 `BroadcastReceiver` 的 `onReceive()` 方法中获取新唤醒锁之前释放了之前的唤醒锁。这样做是为了防止用户在记录传感器事件时多次按下电源键。我们需要保持唤醒锁的释放与获取成对出现，因此，如果有一个传入的唤醒锁，我们在获取新锁之前先释放它。\n\
  \n既然你已经知道如何从传感器获取数据，那么你能用这些数据做些什么呢？正如我们之前所说，根据你从哪个传感器获取数据，values 数组中返回的值含义也不同。下一节将探讨每种传感器类型及其数值含义。\n\
  \n### 解读传感器数据\n\n现在我们已经了解了如何从传感器获取数据，我们必须用这些数据来做些有意义的事情。然而，我们获得的数据取决于我们从哪个传感器获取数据。有些传感器比其他传感器更简单。在接下来的章节中，我们将描述你将从目前已知的传感器中获得的数据。随着新设备的出现，无疑也会引入新的传感器。传感器框架很可能保持不变，因此我们在此展示的技术应该同样适用于新传感器。\n\
  \n#### 光线传感器\n\n光线传感器是设备上最简单的传感器之一，也是我们在本章第一个示例应用中使用过的传感器。该传感器会读取设备光线传感器检测到的光线水平读数。随着光线水平的变化，传感器读数也会改变。数据单位是国际单位制勒克斯。要了解更多相关信息，请参阅本章末尾的参考资料部分，那里有更多信息的链接。\n\
  \n对于 `SensorEvent` 对象中的 `values` 数组，光线传感器只使用第一个元素 `values[0]`。这个值是一个浮点数，从技术上讲，范围从零到特定传感器的最大值。我们之所以说“从技术上讲”，是因为传感器在无光时可能只发送非常小的值，而实际上永远不会发送值为\
  \ 0 的数据。\n\n还要记住，传感器可以告诉我们它能够返回的最大值，并且不同的传感器可能具有不同的最大值。因此，考虑 `SensorManager` 类中的光线相关常量可能没有用处。例如，`SensorManager`\
  \ 有一个名为 `LIGHT_SUNLIGHT_MAX` 的常量，其浮点值为 120,000；然而，我们之前查询设备时，返回的最大值是 10,240，显然远小于这个常量值。还有一个名为\
  \ `LIGHT_SHADE` 的常量，值为 20,000，也高于我们测试设备的最大值。因此，在编写使用光线传感器数据的代码时，请牢记这一点。\n\n####\
  \ 接近传感器\n\n接近传感器要么测量某个物体距离设备的距离（以厘米为单位），要么表示一个标志，指示物体是靠近还是远离。一些接近传感器会给出从 0.0 到最大值的增量值，而另一些则只返回\
  \ 0.0 或最大值。如果接近传感器的最大范围等于其分辨率，那么你就知道它是那种只返回 0.0 或最大值的类型。有些设备的最大值是 1.0，其他设备则是 6.0。不幸的是，在应用安装并运行之前，无法判断你将获得哪种接近传感器。即使你在\
  \ `AndroidManifest.xml` 文件中为接近传感器添加了 `<uses-feature>` 标签，你也可能遇到任何一种类型。除非你绝对需要更精细的接近传感器，否则你的应用应该优雅地兼容这两种类型。\n\
  \n关于接近传感器有一个有趣的事实：接近传感器有时与光线传感器是同一硬件。不过，Android 仍然在逻辑上将它们视为独立的传感器，因此如果你需要来自两者的数据，则需要为每个传感器设置一个监听器。另一个有趣的事实是：接近传感器通常用于手机应用程序中，以检测人的头部是否靠近设备。如果头部非常靠近触摸屏，触摸屏将被禁用，这样人们在通话时就不会因耳朵或脸颊而意外按下按键。\n\
  \n本章的源代码项目包含一个简单的接近传感器监控应用，它基本上是将光线传感器监控应用修改为使用接近传感器而非光线传感器。我们不会在本章中列出代码文本，但你可以随意在自己的设备上进行实验。\n\
  \n\n\n#### 温度传感器\n\n温度传感器能提供温度读数，并在`values[0]`中仅返回一个值。该值代表以摄氏度为单位的温度。要将摄氏度转换为华氏度，可乘以\
  \ 9/5 再加 32。例如，0 摄氏度等于 32 华氏度（水结冰的温度），而 100 摄氏度等于 212 华氏度（水沸腾的温度）。\n\n温度传感器的放置位置取决于设备本身，温度读数有可能受到设备自身产生的热量影响。例如，在某些设备上，温度传感器读取的是设备电池的温度。在编写使用温度传感器的应用程序时请牢记这一点，并且不要期望温度传感器的读数就是设备周围的空气温度。\n\
  \n本章包含一个名为`TemperatureSensor`的温度传感器相关项目。\n\n#### 压力传感器\n\n有趣的是，截至撰写本文时，尚未在任何设备中看到过这些传感器。其设想是未来的设备可以配备气压传感器，例如用于检测海拔高度。此传感器不应与触摸屏生成带有压力值（触摸的压力）的`MotionEvent`的能力相混淆。我们在第\
  \ 25 章中介绍过这种触摸类型的压力感应。触摸屏压力感应并不使用 Android 传感器框架。\n\n虽然复制并修改目前用于适配压力传感器的传感器监控应用程序很容易，但我们目前还无法得知其测量单位将是什么，因此这对我们来说意义不大。显然，谷歌的开发者们正在考虑未来的发展。\n\
  \n#### 陀螺仪传感器\n\n陀螺仪是非常酷的组件，它可以测量设备围绕参考系的扭转。换句话说，陀螺仪测量的是绕某个轴的旋转速率。当设备不旋转时，传感器值将为零。当设备向任何方向旋转时，你会从陀螺仪获得非零值。仅靠陀螺仪本身，它无法告诉你所需的一切信息。而且不幸的是，随着时间推移，陀螺仪会逐渐产生误差。但与加速度计配合使用时，你可以确定设备的运动路径。可以使用卡尔曼滤波器将来自这两个传感器的数据关联起来。加速度计在短期内的精度并不理想，而陀螺仪在长期内的精度也不高，因此两者结合后可以在所有时间内达到相当不错的精度。虽然卡尔曼滤波器非常复杂，但还有一种称为互补滤波器的替代方案，它在代码中更容易实现，并且能产生相当不错的结果。这些概念超出了本书的范围。\n\
  \n陀螺仪传感器在值数组中返回三个值，分别对应*x*、*y*和*z*轴。单位是弧度每秒，表示围绕每个轴的旋转速率。处理这些值的一种方法是对它们进行时间积分以计算角度变化。这类似于对线速度进行时间积分以计算距离的计算方法。\n\
  \n#### 加速度计\n\n加速度计可能是设备上最有趣的传感器之一。利用这些传感器，我们的应用程序可以确定设备在空间中相对于重力竖直向下拉力的物理方向，同时还能感知作用在设备上的力。提供这些信息可以让应用程序实现各种有趣的功能，从游戏玩法到增强现实。当然，加速度计还会告诉\
  \ Android 何时将用户界面的方向从竖屏切换到横屏，或反之。\n\n加速度计的坐标系工作原理如下：加速度计的*x*轴始于设备的左下角，并沿底部向右延伸。*y*轴也始于左下角，沿显示屏左侧向上延伸。*z*轴始于左下角，并朝远离设备的方向向上延伸。图\
  \ 26-2 展示了其含义。\n\n![图片](img/2602.jpg)\n\n**图 26-2.** *加速度计坐标系*\n\n这个坐标系与布局和 2D 图形中使用的坐标系不同。在那个坐标系中，原点(0,\
  \ 0)位于左上角，Y 轴正方向是沿屏幕向下。在处理不同参考系中的坐标系时很容易混淆，所以要小心。\n\n我们还没有说明加速度计的值代表什么，那么它们到底代表什么呢？加速度以米每二次方秒（m/s²）来衡量。地球正常重力为\
  \ 9.81 m/s²，向下拉向地心。从加速度计的角度来看，重力的测量值为-9.81。如果你的设备完全静止（不移动），并且放在一个完全平坦的表面上，那么*x*和*y*的读数将为\
  \ 0，而*z*的读数将为+9.81。实际上，由于加速度计的灵敏度和精度，这些值不会完全精确，但会非常接近。当设备静止时，重力是唯一作用在设备上的力，并且因为重力是竖直向下拉的，如果我们的设备完全平坦，重力对*x*和*y*轴的影响为零。在*z*轴上，加速度计测量的是设备所受的力减去重力。因此，0\
  \ 减去-9.81 等于+9.81，这就是*z*轴的值（也就是`SensorEvent`对象中的`values[2]`）。\n\n加速度计发送给应用程序的值始终代表设备所受合力减去重力。如果我们拿起完全平坦的设备并竖直向上举，*z*值最初会增加，因为我们增加了向上（*z*方向）的力。一旦我们的举力停止，合力将再次只剩下重力。如果设备被抛落（假设如此——请勿尝试），它会向地面加速，这将抵消重力，因此加速度计会读出\
  \ 0 力。\n\n我们将图 26-2 中的设备向上旋转，使其处于竖屏且垂直的状态。*x*轴不变，从左指向右。*y*轴现在竖直向上，*z*轴垂直屏幕指向我们。*y*值将为+9.81，而*x*和*z*均为零。\n\
  \n当我们将设备旋转到横屏模式并继续垂直握住它，也就是让屏幕正对着我们面前时，会发生什么？如果你猜*y*和*z*现在为零，而*x*为+9.81，那就猜对了。图\
  \ 26-3 展示了可能的样子。\n\n![图片](img/2603.jpg)\n\n**图 26-3.** *竖屏横握时的加速度计值*\n\n当设备不移动或以恒定速度移动时，加速度计仅测量重力。在每个轴上，加速度计的值就是重力在该轴上的分量。因此，利用一些三角函数知识，你可以计算出角度，从而了解设备相对于重力拉力的方向。也就是说，你可以判断设备是处于竖屏模式、横屏模式还是某种倾斜模式。事实上，这正是\
  \ Android 用来判断使用哪种显示模式（竖屏或横屏）的方法。但请注意，加速度计并不能说明设备相对于地磁北极的方向。这就需要磁场传感器来发挥作用了，我们将在下一节中介绍。\n\
  \n\n##### 加速度计与屏幕方向\n\n设备中的加速度计属于硬件组件，并牢固固定在设备内部，因此它们相对于设备具有固定的方向，不会因设备旋转而改变。当设备移动时，加速度计发送给\
  \ Android 的值当然会发生变化，但加速度计的坐标系统相对于物理设备保持不变。然而，当用户从竖屏切换到横屏再切换回来时，屏幕的坐标系统会随之改变。事实上，根据屏幕旋转的方向，竖屏模式可能是正向竖直，也可能是旋转\
  \ 180 度后的倒置。同样地，横屏模式也存在两种相隔 180 度的不同旋转状态。\n\n当我们的应用需要读取加速度计数据并正确影响用户界面时，必须知道屏幕发生了多少旋转才能进行适当补偿。当屏幕从竖屏重新定向为横屏时，屏幕的坐标系统相对于加速度计的坐标系统发生了旋转。要处理这种情况，我们的应用必须使用\
  \ Android 2.2 引入的 `Display.getRotation()` 方法。该方法的返回值是一个简单的整数，但并非实际的旋转角度值。返回值将是 `Surface.ROTATION_0`、`Surface.ROTATION_90`、`Surface.ROTATION_180`\
  \ 或 `Surface.ROTATION_270` 之一，这些常量的值分别为 0、1、2、3。这个返回值告诉我们屏幕相对于设备的\"正常\"方向旋转了多少。由于并非所有\
  \ Android 设备的默认状态都是竖屏模式，我们不能假设竖屏模式对应 `ROTATION_0`。\n\n并非所有设备都会返回全部四种值。在运行 Android\
  \ 2.1 的 HTC Droid Eris 上，`Display.getOrientation()`（该方法为 `Display.getRotation()`\
  \ 的前身，现已弃用）只会返回 0 或 1。在正常的竖屏模式下，返回值为 0。如果将设备逆时针旋转 90 度，屏幕会旋转，此时 `Display.getOrientation()`\
  \ 返回 1。如果从竖屏模式顺时针旋转 90 度，屏幕仍保持竖屏模式，`Display.getOrientation()` 仍返回 0。\n\n在运行 Android\
  \ 2.2 的 Motorola Droid 上，`Display.getRotation()` 返回 0、1 或 3，不返回 2，也不会显示竖屏倒置模式。不过这里有一个令人失望的结果：如果从正向竖屏位置向逆时针方向旋转\
  \ 270 度，`Display.getRotation()` 在旋转 90 度时返回 1，屏幕切换至横屏模式；旋转 180 度时仍返回 1，屏幕不变；旋转 270\
  \ 度时屏幕翻转至另一个横屏模式，但 `Display.getRotation()` 仍然返回 1。如果从正常竖屏模式顺时针旋转 90 度，`Display.getRotation()`\
  \ 返回 3。最后这个位置看起来与逆时针旋转 270 度完全相同，但根据旋转路径的不同，`Display.getRotation()` 会返回不同的值。\n\n\
  ##### 加速度计与重力\n\n到目前为止，我们仅简要介绍了设备移动时加速度计值的变化情况。现在让我们进一步探讨。所有作用于设备的力都会被加速度计检测到。如果我们提起设备，初始的提升力在*z*轴方向为正，我们会得到大于+9.81\
  \ 的*z*值。如果我们从左侧推动设备，*x*轴方向将出现初始负读数。\n\n我们希望能将重力与其他作用于设备的力分离开。有一种相当简单的方法可以实现，称为低通滤波器。除重力之外的其他作用力通常不会以渐进方式作用于设备。换句话说，如果用户摇晃设备，摇晃力会迅速反映在加速度计值中。低通滤波器实际上能滤除摇晃力，只留下稳定的力（对我们而言就是重力）。让我们通过一个示例应用来演示这一概念，该应用名为\
  \ `GravityDemo`。清单 26-6 显示了布局 XML 和 Java 代码。\n\n**清单 26-6.** *从加速度计测量重力*\n\n```\n\
  <?xml version=\"1.0\" encoding=\"utf-8\"?>\n<!-- This file is /res/layout/main.xml\
  \ -->\n<LinearLayout\n    android:orientation=\"vertical\"\n    android:layout_width=\"\
  fill_parent\"\n    android:layout_height=\"fill_parent\" >\n  <TextView  android:id=\"\
  @+id/text\"  android:textSize=\"20sp\"\n      android:layout_width=\"fill_parent\"\
  \n      android:layout_height=\"wrap_content\" />\n</LinearLayout>\n```\n\n```\n\
  // This file is MainActivity.java\nimport android.app.Activity;\nimport android.hardware.Sensor;\n\
  import android.hardware.SensorEvent;\nimport android.hardware.SensorEventListener;\n\
  import android.hardware.SensorManager;\nimport android.os.Bundle;\nimport android.widget.TextView;\n\
  \npublic class MainActivity extends Activity implements SensorEventListener {\n\
  \    private SensorManager mgr;\n    private Sensor accelerometer;\n    private\
  \ TextView text;\n    private float[] gravity = new float[3];\n    private float[]\
  \ motion = new float[3];\n    private double ratio;\n    private double mAngle;\n\
  \    private int counter = 0;\n\n    @Override\n    public void onCreate(Bundle\
  \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
  \n        mgr = (SensorManager) this.getSystemService(SENSOR_SERVICE);\n\n     \
  \   accelerometer = mgr.getDefaultSensor(Sensor.TYPE_ACCELEROMETER);\n\n       \
  \ text = (TextView) findViewById(R.id.text);\n    }\n\n    @Override\n    protected\
  \ void onResume() {\n        mgr.registerListener(this, accelerometer,\n       \
  \            SensorManager.SENSOR_DELAY_UI);\n        super.onResume();\n    }\n\
  \n    @Override\n    protected void onPause() {\n        mgr.unregisterListener(this,\
  \ accelerometer);\n        super.onPause();\n    }\n\n    public void onAccuracyChanged(Sensor\
  \ sensor, int accuracy) {\n        // ignore\n    }\n\n    public void onSensorChanged(SensorEvent\
  \ event) {\n        // Use a low-pass filter to get gravity.\n        // Motion\
  \ is what's left over\n        for(int i=0; i<3; i++) {\n            gravity [i]\
  \ = (float) (0.1 * event.values[i] +\n                                   0.9 * gravity[i]);\n\
  \            motion[i] = event.values[i] - gravity[i];\n        }\n\n        //\
  \ ratio is gravity on the Y axis compared to full gravity\n        // should be\
  \ no more than 1, no less than -1\n        ratio = gravity[1]/SensorManager.GRAVITY_EARTH;\n\
  \        if(ratio > 1.0) ratio = 1.0;\n        if(ratio < -1.0) ratio = -1.0;\n\n\
  \        // convert radians to degrees, make negative if facing up\n        mAngle\
  \ = Math.toDegrees(Math.acos(ratio));\n        if(gravity[2] < 0) {\n          \
  \  mAngle = -mAngle;\n        }\n```\n\n\n\n```java\n// 每第 10 个值显示一次\nif(counter++\
  \ % 10 == 0) {\n    String msg = String.format(\n        \"原始值\\nX: %8.4f\\nY: %8.4f\\\
  nZ: %8.4f\\n\" +\n        \"重力\\nX: %8.4f\\nY: %8.4f\\nZ: %8.4f\\n\" +\n       \
  \ \"运动\\nX: %8.4f\\nY: %8.4f\\nZ: %8.4f\\n 角度: %8.1f\",\n        event.values[0],\
  \ event.values[1], event.values[2],\n        gravity[0], gravity[1], gravity[2],\n\
  \        motion[0], motion[1], motion[2],\n        mAngle);\n    text.setText(msg);\n\
  \    text.invalidate();\n    counter=1;\n    }\n}\n```\n\n运行该应用程序的结果是一个如图 26-4 所示的显示界面。此截图是在设备平放在桌面上时拍摄的。\n\
  \n![images](img/2604.jpg)\n\n**图 26-4.** *重力、运动与角度值*\n\n该示例应用程序的大部分内容与我们之前的`Accel\
  \ Sensor`应用程序相同。区别在于`onSensorChanged()`方法。我们不再简单地显示事件数组中的数值，而是尝试跟踪重力和运动。我们只使用事件数组中很小一部分的新值来获取重力，并且使用很大一部分的重力数组旧值。所使用的这两部分之和必须等于\
  \ 1.0。我们使用了 0.9 和 0.1。你也可以尝试其他数值，例如 0.8 和 0.2。我们的重力数组不可能像实际传感器数值变化得那么快。但这更接近真实情况。而这正是低通滤波器的作用。只有当外力导致设备移动时，事件数组中的数值才会发生变化，而我们不希望将这些外力测量为重力的一部分。我们只想将重力本身记录到重力数组中。这里的数学计算并不意味着我们神奇地只记录重力，但我们计算得出的数值将比事件数组中的原始数值精确得多。\n\
  \n另外，请注意代码中的运动数组。通过追踪原始事件数组值与计算出的重力值之间的差异，我们实际上是在测量作用于设备上的、非重力的主动力，并将其记录在运动数组中。如果运动数组中的数值为零或非常接近零，则意味着设备很可能没有移动。这是一个有用的信息。从技术上讲，以恒定速度移动的设备，其运动数组中的数值也会接近零，但实际上，如果用户正在移动设备，运动值会略大于零。\n\
  \n##### 使用加速度计测量设备角度\n\n在继续之前，我们想再向您介绍一些关于加速度计的知识。回想一下我们的三角学课程，一个角的余弦等于邻边与斜边的比值。如果我们考虑\
  \ Y 轴与重力本身之间的角度，我们可以测量 Y 轴上的重力，然后取反余弦来确定角度。我们也在代码中实现了这一点。不过，在这里，我们不得不再次面对 Android\
  \ 传感器的一些复杂问题。`SensorManager`中为不同的重力常量定义了常量，包括地球重力常量。但我们实际测量到的数值可能超出这些定义常量。接下来我们将解释这一点。\n\
  \n理论上，静止的设备测量到的重力值应等于常量值，但实际情况很少如此。静止时，加速度计传感器给我们的重力值很可能大于或小于该常量。因此，我们的比值最终可能大于\
  \ 1 或小于 -1。这会导致`acos()`方法报错，因此我们将比值限制在 -1 到 1 之间。对应的角度（以度为单位）范围为 0 到 180。这没问题，只是我们无法通过这种方式得到从\
  \ 0 到 -180 的负角度。为了获得负角度，我们使用重力数组中的另一个值，即 *z* 值。如果重力的 *Z* 值为负，则意味着设备屏幕朝下。对于所有屏幕朝下的情况，我们也使角度为负，这样我们的角度范围就是从\
  \ -180 到 +180，正如我们所期望的那样。\n\n请继续用这个示例应用程序进行实验。注意，当设备平放时，角度值为 90；当设备在我们面前垂直上下放置时，角度值为零（或接近零）。如果我们继续向下旋转超过水平位置，角度值会超过\
  \ 90。如果我们从零位置向上倾斜设备更多，角度值会变为负数，直到我们将设备举过头顶，角度值为 -90。最后，你可能注意到了我们用来控制显示更新频率的计数器。由于传感器事件可能非常频繁，我们决定每收到第十个值才显示一次。\n\
  \n### 磁场传感器\n\n磁场传感器测量 *x*、*y* 和 *z* 轴上的环境磁场。这个坐标系与加速度计一致，因此 *x*、*y* 和 *z* 的方向如图\
  \ 26-2 所示。磁场传感器的单位是微特斯拉 (uT)。该传感器可以检测地球磁场，从而告诉我们北在哪里。该传感器也被称为指南针，事实上，`<uses-feature>`\
  \ 标签中使用 `android.hardware.sensor.compass` 作为此传感器的名称。由于该传感器非常微小且灵敏，它可能会受到设备附近物体产生的磁场的影响，甚至在某种程度上会受到设备内部组件的影响。因此，磁场传感器的精度有时可能值得怀疑。\n\
  \n我们在网站下载部分包含了一个简单的 `CompassSensor` 应用程序，欢迎导入并试用。如果在运行此应用程序时，将金属物体靠近设备，你可能会注意到数值随之变化。当然，如果你将磁铁靠近设备，你会看到数值发生变化，但我们不推荐将\
  \ Android 设备与磁铁混用。\n\n你可能会问：我能使用指南针传感器作为罗盘来检测北方在哪里吗？答案是：单靠它自己不行。虽然指南针传感器可以检测设备周围的磁场，但如果设备没有相对于地表完全水平放置，你就无法正确解读指南针传感器的数值。但是，我们有加速度计，它可以告诉我们设备相对于地表的朝向！因此，我们可以利用指南针传感器来创建罗盘，但同时也需要加速度计的帮助。那么，让我们来看看如何实现。\n\
  \n\n#### 结合使用加速度计和磁场传感器\n\n`SensorManager` 提供了一些方法，允许我们将指南针传感器和加速度计结合起来以确定设备方向。正如我们刚才讨论的，仅靠指南针传感器无法完成这项工作。因此，`SensorManager`\
  \ 提供了一个名为 `getRotationMatrix()` 的方法，它接收来自加速度计和指南针的值，并返回一个可用于确定方向的矩阵。\n\n另一个 `SensorManager`\
  \ 的方法 `getOrientation()` 则接收上一步得到的旋转矩阵，并给出一个方向矩阵。方向矩阵中的值告诉我们设备相对于地磁北极的旋转角度，以及设备相对于地面的俯仰角和横滚角。如果它能直接替我们完成工作，那就太棒了。不幸的是，至少在\
  \ Android 2.2 之前，使用这种机制存在一些重大挑战，其中最大的问题之一是当设备在我们面前，从正对我们变为微微向上倾斜（就像我们在看屏幕时）时，会出现不连续性。这种不连续性基本上意味着，一旦我们向上倾斜超过\
  \ 0 度标记（此时看起来似乎仍面向前方），我们的方向实际上就指向了背后。这完全不符合直觉。幸运的是，Android 2.3 的出现为我们提供了额外的方法来解决这个问题（参见旋转矢量传感器）。但在此期间，只要你的应用部署在\
  \ Android 2.3 之前的设备上，就需要担心传感器应该使用哪些值。\n\n#### 方向传感器\n\n到目前为止，我们一直避开方向传感器不谈，但现在是时候介绍它们了。我们刚刚解释了如何将磁场传感器和加速度计结合起来，协同工作以产生方向值，从而告诉你手机朝向哪个方向。还有另一种传感器也能实现同样的功能：方向传感器。方向传感器实际上是\
  \ Android 驱动层中磁场传感器和加速度计的组合。换句话说，方向传感器并没有额外的硬件支持，而是在 Android 操作系统内部，有一段代码将这两种传感器模拟成另一个用于确定方向的传感器。\n\
  \n**注意：** 我们直到现在才谈论方向传感器，是因为它们从 Android 2.2 开始已被弃用，你不应再使用它们。然而，这个传感器非常有用，并且比推荐的用法更容易，你很快就会看到这一点。\n\
  \n我们刚刚讨论了使用推荐方法计算方向所面临的挑战。在下一个示例应用中，我们将同时展示来自推荐方法和方向传感器的方向值，以便你自己观察它们之间的差异。\n\n\
  我们将在这个应用中加入一些趣味性。虽然我们可以轻松显示传感器返回的值，但我们还会用这些值做一些有趣的事情。想象一下，你正站在佛罗里达州杰克逊维尔的一条街道上。我们的应用将向你展示街景图片，如同你身临其境，并根据你手机的朝向选择你面对的方向。当你改变手机的朝向时，街景视图也会相应改变。清单\
  \ 26–7 显示了我们命名为 VirtualJax 的示例应用的 XML 布局和 Java 代码。\n\n**清单 26–7.** *从传感器获取方向*\n\n\
