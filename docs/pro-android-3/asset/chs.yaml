  \ trueBtnTop in onTouch\ntrueBtnTop        Action: 1\ntrueBtnTop        Location:\
  \ 291.5864 x 223.43854\ntrueBtnTop        >>> Touch has left the view <<<\ntrueBtnTop\
  \        Edge flags: 0\ntrueBtnTop        Pressure: 0.047058824   Size: 0.13333334\n\
  trueBtnTop        Downtime: 31690859ms\ntrueBtnTop        Event time: 31692493ms\
