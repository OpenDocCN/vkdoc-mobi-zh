  \ 25–7 中的第一条记录显示了一个事件记录，此时手指已不在按钮上。在这种情况下，触摸事件的 X 坐标位于按钮对象右侧边缘之外。但是，我们仍会不断收到`MotionEvent`对象，直到收到`ACTION_UP`事件，这是因为我们一直从`onTouch()`方法返回`true`。即使您最终从触摸屏上抬起手指，并且手指不在按钮上，我们的`onTouch()`方法仍会被调用以传递`ACTION_UP`事件，因为我们持续返回`true`。在处理`MotionEvent`时需要注意这一点。当手指移出视图时，我们可以决定取消可能正在执行的任何操作，并从`onTouch()`方法返回`false`，从而不再接收后续事件的回调。或者，我们也可以选择继续接收事件（通过从`onTouch()`方法返回`true`），并且仅在手指在抬起前回到视图时才执行逻辑。\n\
  \n当我们从`onTouch()`返回`true`时，触摸事件序列就与我们顶部那个“返回 true”的按钮关联起来。这告诉 Android，它可以停止寻找其他对象来接收`MotionEvent`对象，并将此触摸序列所有后续的`MotionEvent`对象都发送给我们。即使我们在拖拽手指时遇到了另一个视图，我们仍然与此触摸序列的原始视图绑定。\n\
  \n让我们看看应用程序下半部分会发生什么。请触摸下半部分的“返回 true”按钮。我们看到的情况与顶部“返回 true”按钮的情形相同。因为`onTouch()`返回`true`，Android\
  \ 会向我们发送触摸序列中剩余的其余事件，直到手指从触摸屏上抬起。现在，触摸底部“返回 false”按钮。同样，`onTouch()`方法和`onTouchEvent()`方法都返回`false`（两者都与`falseBtnBottom`视图对象关联）。但这一次，下一个接收`MotionEvent`对象的视图是`falseLayoutBottom`对象，并且它也返回`false`。至此，事件处理结束。\n\
  \n由于`onTouchEvent()`方法调用了父类的`onTouchEvent()`方法，按钮已经改变了颜色，表示它正处于被按下的中间状态。同样，按钮将保持这种状态，因为我们从未在此触摸序列中收到`ACTION_UP`事件，因为我们的方法始终返回`false`。与之前不同，这次即使布局本身对此事件也不感兴趣。如果您触摸底部的“返回\
  \ false”按钮并按住，然后在显示屏上拖动手指，您将不会在 LogCat 中看到任何额外的记录，因为没有更多的`MotionEvent`对象被发送给我们。我们始终返回`false`，因此\
  \ Android 不会通过更多此触摸序列的事件来打扰我们。同样，如果我们开始一个新的触摸序列，可以看到新的 LogCat 记录出现。如果您在底部布局（而不是在按钮上）发起一个触摸序列，您将在\
  \ LogCat 中看到`falseLayoutBottom`返回`false`的单个事件，之后便没有后续事件（直到您开始一个新的触摸序列）。\n\n到目前为止，我们已经使用按钮向您展示了触摸屏上`MotionEvent`事件的效果。需要指出的是，通常您会使用`onClick()`方法在按钮上实现逻辑。我们在这个示例应用程序中使用按钮，是因为它们易于创建，并且它们是`View`的子类，因此可以像任何其他视图一样接收触摸事件。请记住，这些技术适用于应用程序中的任何`View`对象，无论是标准视图类还是自定义视图类。\n\
  \n### 回收 MotionEvent\n\n您可能已经在 Android 参考文档中注意到了`MotionEvent`类的`recycle()`方法。人们很容易想要回收在`onTouch()`或`onTouchEvent()`中接收到的`MotionEvent`，但请不要这样做。如果您的回调方法没有消费`MotionEvent`对象并且返回了`false`，那么该`MotionEvent`对象很可能会被传递给其他某个方法、视图或\
  \ Activity，因此您不希望 Android 过早地回收它。即使您消费了该事件并返回了`true`，该事件对象也不属于您，所以您也不应该回收它。\n\n\
  如果您查看`MotionEvent`，您会发现一个名为`obtain()`的方法的几种变体。该方法要么创建一个`MotionEvent`的副本，要么创建一个全新的`MotionEvent`。您创建的副本或全新的事件对象，才是您在完成使用后应回收的事件对象。例如，如果您想保留通过回调传递给您的事件对象，您应该使用`obtain()`制作一个副本，因为一旦您从回调返回，该事件对象就会被\
  \ Android 回收，如果您继续使用它，可能会得到奇怪的结果。当您用完*您自己的副本*后，对其调用`recycle()`。\n\n\n\n### 使用 VelocityTracker\n\
  \nAndroid 提供了一个用于协助处理触摸屏序列的类，名为 `VelocityTracker`。当手指在触摸屏上移动时，了解它在屏幕表面上的移动速度可能会很有用。例如，如果用户快速拖拽手指划过屏幕，这可能表示一个甩动动作，你的应用程序可能希望对此执行甩动逻辑。Android\
  \ 提供了 `VelocityTracker` 来帮助处理涉及的计算。\n\n要使用 `VelocityTracker`，首先通过调用静态方法 `VelocityTracker.obtain()`\
  \ 来获取一个 `VelocityTracker` 实例。然后，你可以使用 `addMovement(MotionEvent ev)` 方法将 `MotionEvent`\
  \ 对象添加进去。你应该在接收 `MotionEvent` 对象的处理程序中（例如来自 `onTouch()` 这样的处理程序方法，或视图的 `onTouchEvent()`）调用此方法。`VelocityTracker`\
  \ 利用这些 `MotionEvent` 对象来弄清楚用户触摸序列的当前状况。一旦 `VelocityTracker` 中至少包含两个 `MotionEvent`\
  \ 对象，我们就可以使用其他方法来了解情况。\n\n这两个 `VelocityTracker` 方法——`getXVelocity()` 和 `getYVelocity()`——分别返回手指在\
  \ X 方向和 Y 方向上的相应速度。这两个方法返回的值表示**每时间段像素数**。这可以是每毫秒像素数、每秒钟像素数，或者实际上是任何你想要的时间单位。为了告诉\
  \ `VelocityTracker` 要使用的时间段，并且在调用这两个 getter 方法之前，你需要调用 `VelocityTracker` 的 `computeCurrentVelocity(int\
  \ units)` 方法。`units` 的值表示测量速度的时间段包含多少毫秒。如果你想要每毫秒像素数，使用 `units` 值 1；如果你想要每秒像素数，使用\
  \ `units` 值 1000。如果速度方向是向右（X 方向）或向下（Y 方向），则 `getXVelocity()` 和 `getYVelocity()`\
  \ 方法返回的值为正；如果速度方向是向左（X 方向）或向上（Y 方向），则返回的值为负。\n\n当你用完通过 `obtain()` 方法获取的 `VelocityTracker`\
  \ 对象后，请调用该对象的 `recycle()` 方法。清单 25–8 展示了一个 Activity 的 `onTouchEvent()` 处理程序示例。事实证明，Activity\
  \ 有一个 `onTouchEvent()` 回调方法，当没有任何视图处理触摸事件时，该方法会被调用。由于我们使用的是标准的空布局，因此没有视图会消耗我们的触摸事件。\n\
  \n**清单 25–8.** 使用 VelocityTracker 的 Activity 示例\n\n```\nimport android.app.Activity;\n\
  import android.os.Bundle;\nimport android.util.Log;\nimport android.view.MotionEvent;\n\
  import android.view.VelocityTracker;\n\npublic class MainActivity extends Activity\
  \ {\n    private static final String TAG = \"VelocityTracker\";\n\n    /** 当 Activity\
  \ 首次创建时调用。 */\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
      }\n\n    private VelocityTracker vTracker = null;\n\n    public boolean onTouchEvent(MotionEvent\
  \ event) {\n        int action = event.getAction();\n        switch(action) {\n\
              case MotionEvent.ACTION_DOWN:\n                if(vTracker == null)\
  \ {\n                    vTracker = VelocityTracker.obtain();\n                }\n\
                  else {\n                    vTracker.clear();\n                }\n\
                  vTracker.addMovement(event);\n\n                break;\n            case\
  \ MotionEvent.ACTION_MOVE:\n                vTracker.addMovement(event);\n                vTracker.computeCurrentVelocity(1000);\n\
                  Log.v(TAG, \"X velocity is \" + vTracker.getXVelocity() +\n                      \
  \ \" pixels per second\");\n                Log.v(TAG, \"Y velocity is \" + vTracker.getYVelocity()\
  \ +\n                       \" pixels per second\");\n                break;\n            case\
  \ MotionEvent.ACTION_UP:\n            case MotionEvent.ACTION_CANCEL:\n                vTracker.recycle();\n\
                  break;\n        }\n        return true;\n    }\n}\n```\n\n关于 `VelocityTracker`\
  \ 有几点关键事项需要注意。显然，当你只向 `VelocityTracker` 添加了一个 `MotionEvent` 事件（即 `ACTION_DOWN` 事件）时，计算出的速度除了零之外不可能有其他值。但我们需要添加起始点，以便后续的\
  \ `ACTION_MOVE` 事件能够计算速度。事实证明，在 `ACTION_UP` 事件被添加到我们的 `VelocityTracker` 后，报告的速度也是零。因此，不要在添加\
  \ `ACTION_UP` 事件后读取 X 和 Y 速度，期望获得运动数据。例如，如果你正在编写一个游戏应用程序，用户在屏幕上投掷一个物体，请使用添加最后一个\
  \ `ACTION_MOVE` 事件后的速度来计算该物体在游戏视图中的运动轨迹。\n\n`VelocityTracker` 在性能方面有些代价高昂，因此请谨慎使用。此外，确保一旦用完就立即回收它，以防其他组件需要使用。Android\
  \ 系统中可以同时存在多个 `VelocityTracker` 实例，但它们会占用大量内存，因此如果你不打算继续使用，请将其归还。在清单 25–8 中，如果我们要开始一个新的触摸序列（例如，当我们收到\
  \ `ACTION_DOWN` 事件并且 `VelocityTracker` 对象已存在时），我们也会使用 `clear()` 方法，而不是回收当前对象并获取一个新的。\n\
  \n\n\n#### 探索拖放操作\n\n既然你已经了解了如何在代码中接收 `MotionEvent` 对象，接下来我们来做一些有趣的事情。我们将讲解如何实现拖放功能。首先，让我们先尝试一下拖拽操作。在下一个示例应用中，我们将把一个白色圆点拖拽到布局中的新位置。请根据清单\
  \ 25-9 创建一个新的 Android 项目，按指示设置布局 XML 文件，并使用 Java 代码添加一个名为 `Dot` 的新类。请注意，布局 XML 中\
  \ `Dot` 元素的包名必须与你应用所使用的包名一致。同时注意，我们可以保留主 `Activity` 类不变，因为它本身没有问题。该应用的界面如图 25-2\
  \ 所示。\n\n**清单 25–9.** *拖拽示例的布局 XML 及 Java 代码*\n\n```\n<?xml version=\"1.0\" encoding=\"\
  utf-8\"?>\n<!-- 此文件为 res/layout/main.xml -->\n<LinearLayout\n    android:orientation=\"\
  vertical\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  fill_parent\" >\n\n  <com.androidbook.touch.dragdemo1.Dot\n    android:id=\"@+id/dot\"\
  \  android:tag=\"trueDot\"\n    android:layout_width=\"wrap_content\"\n    android:layout_height=\"\
  wrap_content\" />\n\n</LinearLayout>\n```\n\n```\nimport android.content.Context;\n\
  import android.graphics.Canvas;\nimport android.graphics.Color;\nimport android.graphics.Paint;\n\
  import android.util.AttributeSet;\nimport android.view.MotionEvent;\nimport android.view.View;\n\
  \npublic class Dot extends View {\n    private static final float RADIUS = 20;\n\
  \    private float x = 30;\n    private float y = 30;\n    private float initialX;\n\
  \    private float initialY;\n    private float offsetX;\n    private float offsetY;\n\
  \    private Paint backgroundPaint;\n    private Paint myPaint;\n\n    public Dot(Context\
  \ context, AttributeSet attrs) {\n        super(context, attrs);\n\n        backgroundPaint\
  \ = new Paint();\n        backgroundPaint.setColor(Color.BLUE);\n\n        myPaint\
  \ = new Paint();\n        myPaint.setColor(Color.WHITE);\n        myPaint.setAntiAlias(true);\n\
  \    }\n\n    @Override\n    public boolean onTouchEvent(MotionEvent event) {\n\
  \        int action = event.getAction();\n        switch(action) {\n        case\
  \ MotionEvent.ACTION_DOWN:\n            // 需要记住 Dot 中心点的初始位置以及触摸起始点\n          \
  \  initialX = x;\n            initialY = y;\n            offsetX = event.getX();\n\
  \            offsetY = event.getY();\n            break;\n        case MotionEvent.ACTION_MOVE:\n\
  \        case MotionEvent.ACTION_UP:\n        case MotionEvent.ACTION_CANCEL:\n\
  \            x = initialX + event.getX() - offsetX;\n            y = initialY +\
  \ event.getY() - offsetY;\n            break;\n        }\n        return(true);\n\
  \    }\n\n    @Override\n    public void draw(Canvas canvas) {\n        int width\
  \ = canvas.getWidth();\n        int height = canvas.getHeight();\n        canvas.drawRect(0,\
  \ 0, width, height, backgroundPaint);\n\n        canvas.drawCircle(x, y, RADIUS,\
  \ myPaint);\n        invalidate();\n    }\n}\n```\n\n![images](img/2502.jpg)\n\n\
  **图 25–2.** *拖拽演示应用的界面*\n\n运行此应用时，你会在蓝色背景上看到一个白色圆点。你可以触摸圆点并在屏幕上拖拽它。当你抬起手指时，圆点会停留在当前位置，直到你再次触摸并拖拽到其他位置。我们已大幅简化此过程，只为向你展示如何在屏幕上移动一个对象的基本原理。`draw()`\
  \ 方法将圆点绘制在其当前的 X 和 Y 坐标位置。通过在 `onTouchEvent()` 方法中接收 `MotionEvent` 对象，我们可以根据触摸的移动来修改\
  \ X 和 Y 的值。当收到 `ACTION_DOWN` 动作时，我们会记录圆点的起始位置以及触摸起始点。由于用户并非总能点击对象的正中心，触摸坐标与对象的位置坐标可能不同。此外，如果对象的参考点不是中心而是左上角，我们也必须确保考虑到这一点。\n\
  \n当你的手指开始在屏幕上移动时，我们会根据接收到的 `MotionEvent` 事件，通过 X 和 Y 的增量来调整对象的位置。当你停止移动（即 `ACTION_UP`\
  \ 事件）时，我们会使用最后的触摸坐标来确定对象的最终位置。在这里我们稍微取巧，因为 `Dot` 视图在屏幕上的位置是相对于 (0,0) 坐标的。这意味着我们可以直接相对于\
  \ (0,0) 坐标绘制圆，而非其他参考点。如果对象不是相对于 (0,0) 定位，我们可能需要提供额外的偏移量。本示例中我们也不需要担心滚动条的问题，否则会使得屏幕上对象位置的计算变得更复杂。但基本原理是相同的。通过知道要移动对象的起始位置，并跟踪从\
  \ `ACTION_DOWN` 到 `ACTION_UP` 触摸事件的增量值，我们就可以调整对象在屏幕上的位置。\n\n将一个对象放置到屏幕上的另一个对象上，与其说与触摸有关，不如说与了解各对象在屏幕上的位置有关。我们不在此处提供放置的示例，但会解释其原理。正如你之前所见，当我们在屏幕上拖拽一个对象时，我们了解它相对于一个或多个参考点的位置。我们也可以查询屏幕上其他对象的位置和大小。然后我们可以判断被拖拽的对象是否“覆盖”在另一个对象之上。确定被拖拽对象的放置目标的典型流程是：遍历所有可被放置的对象，判断当前拖拽位置是否与该对象重叠。每个对象的大小、位置（有时还有形状）都可用于此判断。如果我们收到\
  \ `ACTION_UP` 事件（意味着用户释放了拖拽对象），并且该对象位于某个可放置的目标之上，我们就可以触发处理放置动作的逻辑。例如，将某物拖到垃圾桶的动作，其中被拖拽的对象应被删除；或者将文件拖到文件夹以便移动或复制。\n\
  \n**注意：** 从 Honeycomb（即 Android 3.0）开始，Android 提供了对拖放操作的原生支持。我们将在第 31 章中重新讨论拖放功能。\n\
  \n\n\n### 多点触控\n\n你已经见识了单点触控的实际应用，现在我们来看看多点触控。自 2006 年 TED 大会上杰夫·韩演示了用于计算机用户界面的多点触控表面以来，这项技术便引起了广泛关注。在屏幕上使用多根手指为操作屏幕内容开辟了诸多可能性。例如，将两根手指放在图片上并向外分开即可放大图片；将多根手指放在图片上顺时针转动，则可以旋转屏幕上的图片。Android\
  \ 从 SDK 2.0 版本开始支持多点触控。在该版本中，（理论上）你可以在屏幕上同时使用最多三根手指执行缩放、旋转或任何你能想到的多点触控操作（我们之所以说“理论上”，是因为首批支持多点触控的\
  \ Android*设备*仅支持两根手指）。不过仔细想想，这并非魔法。如果屏幕硬件能够检测到屏幕上发起的多次触摸，在手指沿屏幕表面移动时通知应用程序，并在手指离开屏幕时发出通知，那么应用程序就能判断用户试图通过这些触摸执行什么操作。虽然这不是魔法，但也绝非易事。在本节中，我们将帮助你理解多点触控。\n\
  \n**注意：** 从 Android 2.2 开始，`MotionEvent`类发生了一些变化，这使得多点触控的处理更加复杂，其中包括弃用了我们接下来要讨论的几个常量（`ACTION_POINTER_ID_MASK`和`ACTION_POINTER_ID_SHIFT`）。这意味着对于旧设备，你可以使用我们接下来介绍的方法；对于搭载\
  \ 2.2 或更高版本的设备，则可以做一些修改，我们将在本节之后进行说明。\n\n#### Android 2.2 之前的多点触控\n\n多点触控的基本原理与单点触控完全相同。触摸操作会产生`MotionEvent`对象，这些对象会像之前一样传递给你的方法。你的代码可以读取触摸数据并决定如何处理。在基本层面上，`MotionEvent`的方法也是相同的；也就是说，我们调用`getAction()`、`getDownTime()`、`getX()`等方法。但是，当有多根手指触摸屏幕时，`MotionEvent`对象必须包含所有手指的信息，但也有一些例外情况。`getAction()`返回的动作值仅针对一根手指，而非全部。按下时间值仅针对最先按下那根手指，并且只要至少有一根手指保持按下状态，该时间就会持续累加。位置值`getX()`和`getY()`以及`getPressure()`和`getSize()`可以接受手指参数；因此，你需要使用指针索引值来获取指定手指的信息。我们之前使用的一些方法调用（例如`getX()`、`getY()`）没有指定手指的参数，那么如果使用这些方法，返回值对应的是哪根手指呢？你可以搞清楚，但这需要一些功夫。因此，如果你始终没有考虑多根手指的情况，最终可能会得到一些奇怪的结果。让我们深入探究一下该如何处理。\n\
  \n关于多点触控，你需要了解的`MotionEvent`的第一个方法是`getPointerCount()`。这个方法会告诉你`MotionEvent`对象中代表了多少根手指，但不一定代表实际触摸屏幕的手指数量；这取决于硬件以及该硬件上\
  \ Android 系统的实现。你可能会发现，在某些设备上，`getPointerCount()`并不能报告所有正在触摸的手指，而只能报告一部分。不过，我们继续往下看。一旦`MotionEvent`对象中报告了超过一根手指，你就需要开始处理指针索引和指针\
  \ ID 了。\n\n`MotionEvent`对象包含从索引 0 开始、直到该对象报告的手指数量范围内的指针信息。指针索引始终从 0 开始；如果报告了三根手指，指针索引就是\
  \ 0、1 和 2。调用`getX()`等方法时必须传入你想要获取信息的那根手指的指针索引。指针 ID 是代表正在追踪的哪根手指的整数值。指针 ID 从 0 开始分配给第一根按下的手指，但当手指在屏幕上起落时，指针\
  \ ID 并不总是从 0 开始。你可以将指针 ID 视为 Android 追踪该手指期间为其分配的“名称”。例如，想象一对两根手指的触摸序列：先按下手指 1，然后手指\
  \ 2 按下，接着手指 1 抬起，最后手指 2 抬起。第一根按下的手指将获得指针 ID 0。第二根按下的手指将获得指针 ID 1。一旦第一根手指抬起，第二根手指仍然与指针\
  \ ID 1 关联。此时，第二根手指的指针索引变为 0，因为指针索引始终从 0 开始。在这个例子中，第二根手指（指针 ID 1）在最初按下时是指针索引 1，一旦第一根手指离开屏幕，它就变为指针索引\
  \ 0。但即使第二根手指成为屏幕上唯一的手指，它仍然保持指针 ID 1。你的应用程序将使用指针 ID 来关联特定手指对应的事件，即使有其他手指参与其中。让我们来看一个示例。\n\
  \n清单 25–10 展示了我们用于多点触控应用程序的新 XML 布局和 Java 代码。使用清单 25–10 创建一个新应用程序并运行它。图 25–3 展示了它应有的效果。\n\
  \n**清单 25–10.** *多点触控演示的 XML 布局和 Java 代码*\n\n\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
  utf-8\"?>\n<!-- 此文件为 /res/layout/main.xml -->\n<RelativeLayout  \n    android:id=\"\
