  \ `newInstance()` 方法、`getShownIndex()`、`onCreate()` 和 `onCreateView()`。现在你已经了解了如何实例化这个片段。需要指出的是，你是在代码中实例化此片段，这一点很重要，因为你的布局定义了详情片段要放置的\
  \ `ViewGroup` 容器（一个 `FrameLayout`）。由于该片段不像你的标题片段那样在 Activity 的布局 XML 中定义，因此你需要在代码中实例化你的详情片段。\n\
  \n要创建一个新的详情片段，你可以使用 `newInstance()` 方法。如前所述，这个工厂方法会调用默认构造函数，然后使用 index 的值设置参数包。一旦\
  \ `newInstance()` 运行完毕，你的详情片段就可以通过 `getArguments()` 引用参数包，在其任何回调中检索 index 的值。为了方便起见，你可以在\
  \ `onCreate()` 中，将参数包中的 index 值保存到 `DetailsFragment` 类的一个成员字段中。\n\n你可能会疑惑，为什么不在\
  \ `newInstance()` 中直接设置 `mIndex` 的值。原因在于，Android 会在后台使用默认构造函数重新创建你的片段。然后它会将参数包设置成之前的值。Android\
  \ 不会使用你的 `newInstance()` 方法，因此确保 `mIndex` 被设置的唯一可靠方法，就是从参数包中读取该值，并在 `onCreate()`\
  \ 中进行设置。便捷方法 `getShownIndex()` 用于检索该索引的值。现在，详情片段中唯一需要描述的方法就是 `onCreateView()` 了。而这一点也非常简单。\n\
  \n`onCreateView()` 的目的是返回片段的视图层级结构。请记住，根据你的配置，你可能希望为此片段使用各种不同的布局。因此，最常见的做法是为你的片段使用一个布局\
  \ XML 文件。在你的示例应用中，你使用资源 `R.layout.details` 将片段的布局指定为 `details.xml`。`details.xml`\
  \ 的 XML 内容见列表 29–6。\n\n**列表 29–6.** *详情片段的 details.xml 布局文件*\n\n```xml\n<?xml version=\"\
  1.0\" encoding=\"utf-8\"?>\n<!-- 此文件为 res/layout/details.xml -->\n<LinearLayout\n\
  \n  android:layout_width=\"match_parent\"\n  android:layout_height=\"match_parent\"\
  >\n  <ScrollView android:id=\"@+id/scroller\"\n      android:layout_width=\"match_parent\"\
