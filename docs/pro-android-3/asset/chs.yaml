  \ Content Provider 的 Android 文档。\n*   [`developer.android.com/reference/android/content/ContentProvider.html`](http://developer.android.com/reference/android/content/ContentProvider.html)：这是\
  \ `ContentProvider` 的 API 描述，你可以在此了解 `ContentProvider` 的约定。\n*   [`developer.android.com/reference/android/content/UriMatcher.html`](http://developer.android.com/reference/android/content/UriMatcher.html)：此\
  \ URL 指向的信息有助于理解 `UriMatcher`。\n*   [`developer.android.com/reference/android/database/Cursor.html`](http://developer.android.com/reference/android/database/Cursor.html)：此\
  \ URL 将帮助你直接从内容提供者或数据库读取数据。\n*   [`www.sqlite.org/sqlite.html`](http://www.sqlite.org/sqlite.html)：这是\
  \ SQLite 的主页，你可以在此了解更多关于 SQLite 的信息，并下载可用于处理 SQLite 数据库的工具。\n*   [`www.androidbook.com/projects`](http://www.androidbook.com/projects)：你可以使用此\
  \ URL 下载本章专用的测试项目。该 zip 文件的名称为 `ProAndroid3_ch04_TestProviders.zip`。\n\n### 本章小结\n\
  \n在本章中，你学习了内容 URI、MIME 类型以及内容提供者的本质。你学会了如何使用 SQLite 构建响应 URI 的提供者。一旦底层数据以这种方式暴露出来，Android\
  \ 平台上的任何应用程序都可以利用它。\n\n这种通过 URI 访问和更新数据的能力，不受进程边界的限制，完全符合我们在第 1 章中描述的服务导向型云计算格局。\n\
  \n在下一章中，我们将介绍 Intent，它通过数据 URI 和 URI MIME 类型与内容提供者（以及其他 Android 组件）相关联。本章所学的内容将有助于你理解\
  \ Intent，而数据 URI 在其中发挥着关键作用。\n\n## 第 5 章\n\n## 理解 Intent\n\nAndroid 引入了一个名为 *Intent*\
  \ 的概念来调用组件。Android 中的组件列表包括 Activity（UI 组件）、Service（后台代码）、Broadcast Receiver（响应广播消息的代码）和\
  \ Content Provider（抽象数据的代码）。\n\n\n  \n### Android Intent 基础  \n\n虽然 Intent 很容易被理解为一种调用组件的机制，但\
  \ Android 在 *intent* 的概念中融入了多种想法。你可以使用 Intent 从自己的应用调用外部应用；也可以使用 Intent 调用应用内部或外部的组件；还能用\
  \ Intent 触发事件，让其他人像发布-订阅模型那样响应；甚至可以借助 Intent 设置闹钟。  \n\n**注意：** 什么是 Intent？简单的回答可能是：Intent\
  \ 是一个动作及其关联的数据负载。  \n\n在最简单的层面上，Intent 是你告诉 Android 要执行的一个动作（或 *调用*）。Android 调用的具体操作取决于为该动作注册了什么。假设你编写了以下\
  \ Activity：  \n\n```\npublic class BasicViewActivity extends Activity\n{\n    @Override\n\
  \    public void onCreate(Bundle savedInstanceState)\n    {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.some_view);\n    }\n}//eof-class\n```\n\n布局文件 `some_view`\
  \ 需要指向 `/res/layout` 目录下的一个有效布局文件。然后，Android 允许你在清单文件中注册这个 Activity，使其可供其他应用调用。注册代码看起来像这样：\
  \  \n\n```\n     <activity android:name=\".BasicViewActivity\"\n               android:label=\"\
  Basic View Tests\">\n      <intent-filter>\n        <action android:name=\"com.androidbook.intent.action.ShowBasicView\"\
  />\n        <category android:name=\"android.intent.category.DEFAULT\" />\n    \
  \  </intent-filter>\n     </activity>\n```\n\n这里的注册不仅涉及 Activity，还涉及一个可用于调用该 Activity\
  \ 的动作。Activity 的设计者通常会为动作选择一个名称，并将其作为该 Activity 的 Intent 过滤器的一部分指定。随着本章的深入，你将有机会更多地了解这些\
  \ Intent 过滤器。  \n\n既然你已经指定了 Activity 并为其注册了动作，就可以使用 Intent 调用这个 `BasicViewActivity`：\
  \  \n\n```\npublic static void invokeMyApplication(Activity parentActivity)\n{\n\
  \   String actionName= \"com.androidbook.intent.action.ShowBasicView\";\n   Intent\
  \ intent = new Intent(actionName);\n   parentActivity.startActivity(intent);\n}\n\
  ```\n\n**注意：** 动作名称的一般约定是 `<你的包名>.intent.action.你的动作名称`。  \n\n一旦 `BasicViewActivity`\
  \ 被调用，它就能发现是哪个 Intent 调用了它。以下是重写后的 `BasicViewActivity` 代码，用于获取调用它的 Intent：  \n\n\
  ```\npublic class BasicViewActivity extends Activity\n{\n    @Override\n    public\
  \ void onCreate(Bundle savedInstanceState)\n    {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.some_view);\n        Intent intent = this.getIntent();\n\
  \        if (intent == null)\n        {\n            Log.d(\"test tag\", \"This\
  \ activity is invoked without an intent\");\n        }\n    }\n}//eof-class\n```\n\
  \n### Android 中的可用 Intent  \n\n你可以通过调用 Android 自带的一些应用来测试 Intent。页面 [`developer.android.com/guide/appendix/g-app-intents.html`](http://developer.android.com/guide/appendix/g-app-intents.html)\
  \ 记录了一些可用的 Google 应用以及调用它们的 Intent。  \n\n**注意：** 但是请注意，这个列表可能因 Android 版本而异。  \n\
  \n可用的应用集可能包括以下内容：  \n\n*   用于打开浏览器窗口的浏览器应用  \n*   用于拨打电话号码的应用  \n*   用于显示电话拨号器、让用户通过界面输入号码并拨打电话的应用\
  \  \n*   用于显示地图、展示给定经纬度坐标下世界地图的应用  \n*   可以显示 Google 街景的详细地图应用  \n\n代码清单 5–1 包含了通过已发布的\
  \ Intent 调用这些应用的代码。  \n\n**代码清单 5–1.** *使用 Android 预置应用*  \n\n```\npublic class\
  \ IntentsUtils\n{\n    public static void invokeWebBrowser(Activity activity)\n\
  \    {\n        Intent intent = new Intent(Intent.ACTION_VIEW);\n        intent.setData(Uri.parse(\"\
  http://www.google.com\"));\n        activity.startActivity(intent);\n    }\n   \
  \ public static void invokeWebSearch(Activity activity)\n    {\n        Intent intent\
  \ = new Intent(Intent.ACTION_WEB_SEARCH);\n        intent.setData(Uri.parse(\"http://www.google.com\"\
  ));\n        activity.startActivity(intent);\n    }\n    public static void dial(Activity\
  \ activity)\n    {\n        Intent intent = new Intent(Intent.ACTION_DIAL);\n  \
  \      activity.startActivity(intent);\n    }\n\n    public static void call(Activity\
  \ activity)\n    {\n        Intent intent = new Intent(Intent.ACTION_CALL);\n  \
  \      intent.setData(Uri.parse(\"tel:555-555-5555\"));\n        activity.startActivity(intent);\n\
  \    }\n    public static void showMapAtLatLong(Activity activity)\n    {\n    \
  \    Intent intent = new Intent(Intent.ACTION_VIEW);\n        //geo:lat,long?z=zoomlevel&q=question-string\n\
  \        intent.setData(Uri.parse(\"geo:0,0?z=4&q=business+near+city\"));\n    \
  \    activity.startActivity(intent);\n    }\n\n    public static void tryOneOfThese(Activity\
  \ activity)\n    {\n        IntentsUtils.invokeWebBrowser(activity);\n    }\n}\n\
  ```\n\n只要你有一个简单的 Activity，并带有一个菜单项来调用 `tryOneOfThese(activity)`，就可以运行这段代码。创建简单菜单很容易（见代码清单\
  \ 5–2）。  \n\n**代码清单 5–2.** *创建简单菜单的测试工具*  \n\n```\npublic class MainActivity extends\
  \ Activity\n{\n   public void onCreate(Bundle savedInstanceState)   {\n      super.onCreate(savedInstanceState);\n\
  \n      TextView tv = new TextView(this);\n      tv.setText(\"Hello, Android. Say\
  \ hello\");\n      setContentView(tv);\n   }\n   @Override\n   public boolean onCreateOptionsMenu(Menu\
  \ menu)    {\n      super.onCreateOptionsMenu(menu);\n      int base=Menu.FIRST;\
  \ // value is 1\n      MenuItem item1 = menu.add(base,base,base,\"Test\");\n   \
  \   return true;\n   }\n\n   @Override\n   public boolean onOptionsItemSelected(MenuItem\
  \ item)   {\n      if (item.getItemId() == 1)       {\n         IntentsUtils.tryOneOfThese(this);\n\
  \      }\n      else {\n        return super.onOptionsItemSelected(item);\n    \
  \  }\n      return true;\n   }\n}\n```\n\n**注意：** 有关如何基于这些文件创建 Android 项目，以及如何编译和运行它，请参见第\
  \ 2 章。你也可以阅读第 7 章（“菜单”）的早期部分，查看更多与菜单相关的示例代码。或者，你可以使用本章末尾提供的 URL 下载专用于本章的示例 Eclipse\
  \ 项目。不过，当你下载示例代码时，这个基础 Activity 可能略有不同，但概念是相同的。在下载的示例中，我们还从 XML 文件中加载了菜单。  \n\n\
  ### 探索 Intent 的组成  \n\n另一种确定 Intent 本质的方法是查看 Intent 对象包含的内容。一个 Intent 包含动作、数据（由数据\
  \ URI 表示）、额外数据元素的键/值映射以及一个显式的类名（称为*组件名称*）。我们将逐一探讨这些部分。  \n\n**注意：** 当 Intent 携带组件名称时，称为*显式*\
  \ Intent。当 Intent 不携带组件名称，而是依赖动作和数据等其他部分时，称为*隐式* Intent。随着本章的深入，你会发现两者之间存在细微差别。\
  \  \n\n\n\n### 意图与数据 URI\n\n到目前为止，我们已经介绍了最简单的意图，只需提供动作名称即可。清单 5-1 中的`ACTION_DIAL`活动就是其中之一；要调用拨号器，我们在该清单中只需要拨号器的动作，不需要其他任何东西：\n\
  \n```\n    public static void dial(Activity activity)\n    {\n       Intent intent\
  \ = new Intent(Intent.ACTION_DIAL);\n       activity.startActivity(intent);\n  \
  \  }\n```\n\n与`ACTION_DIAL`不同，用于向指定电话号码拨打电话的`ACTION_CALL`意图（再次参考清单 5-1）需要额外的一个参数，称为`Data`。该参数指向一个\
  \ URI，而 URI 则指向电话号码：\n\n```\n    public static void call(Activity activity)\n  \
  \  {\n       Intent intent = new Intent(Intent.ACTION_CALL);\n       intent.setData(Uri.parse(\"\
  tel:555-555-5555\"));\n       activity.startActivity(intent);\n    }\n```\n\n意图的动作部分是一个字符串或字符串常量，通常以\
  \ Java 包名作为前缀。\n\n意图的“数据”部分并非实际数据，而是指向数据的指针。这个数据部分是一个表示 URI 的字符串。意图的 URI 可以包含可被推断为数据的参数，就像网站的\
  \ URL 一样。\n\n该 URI 的格式可能特定于被该动作调用的每个活动。在这种情况下，`CALL`动作决定了它期望的数据 URI 类型，并从中提取电话号码。\n\
  \n**注意：** 被调用的活动也可以将 URI 用作指向数据源的指针，从中提取数据并使用这些数据。对于音频、视频和图像等媒体资源，这种情况很常见。\n\n###\
  \ 通用动作\n\n`Intent.ACTION_CALL`和`Intent.ACTION_DIAL`这些动作很容易让我们错误地认为动作与其所调用的内容之间存在一一对应的关系。为了反驳这一点，让我们考虑清单\
  \ 5-1 中`IntentUtils`代码的一个反例：\n\n```\n    public static void invokeWebBrowser(Activity\
  \ activity)\n    {\n       Intent intent = new Intent(Intent.ACTION_VIEW);\n   \
  \    intent.setData(Uri.parse(\"http://www.google.com\"));\n       activity.startActivity(intent);\n\
  \    }\n```\n\n注意，动作仅仅被声明为`ACTION_VIEW`。Android 是如何知道要调用哪个活动来响应这样一个通用动作名称的呢？在这些情况下，Android\
  \ 不仅依赖通用动作名称，还依赖 URI 的本质。Android 会查看 URI 的方案（这里是`http`），并向所有已注册的活动询问它们是否能理解该方案。然后，它会进一步询问哪些活动可以处理`VIEW`动作，并最终调用该活动。为了实现这一点，浏览器活动应该针对`http`数据方案注册一个`VIEW`意图。该意图声明在清单文件中可能如下所示：\n\
  \n```\n<activity…...>\n<intent-filter>\n          <action android:name=\"android.intent.action.VIEW\"\
  \ />\n         <data android:scheme=\"http\"/>\n         <data android:scheme=\"\
  https\"/>\n</intent-filter>\n</activity>\n```\n\n您可以通过查看`http://developer.android.com/guide/topics/manifest/data-element.html`上关于意图过滤器`data`元素的\
  \ XML 定义，了解更多关于数据选项的信息。意图过滤器节点下`data` XML 子节点的子元素或属性包括：\n\n```\nhost\nmimeType\n\
  path\npathPattern\npathPrefix\nport\nscheme\n```\n\n`mimeType`是一个您会经常看到的属性。例如，以下用于显示笔记列表的活动的意图过滤器，将\
  \ MIME 类型指示为笔记目录：\n\n```\n<intent-filter>\n   <action android:name=\"android.intent.action.VIEW\"\
  \ />\n   <data android:mimeType=\"vnd.android.cursor.dir/vnd.google.note\" />\n\
  </intent-filter>\n```\n\n这个意图过滤器声明可以理解为：“调用此活动来查看笔记集合。”\n\n另一方面，显示单条笔记的屏幕，其意图过滤器声明使用指示单条笔记项的\
  \ MIME 类型：\n\n```\n<intent-filter>\n   <action android:name=\"android.intent.action.VIEW\"\
  \ />\n   <data android:mimeType=\"vnd.android.cursor.item/vnd.google.note\" />\n\
  </intent-filter>\n```\n\n这个意图过滤器声明可以理解为：“调用此活动来查看单条笔记。”\n\n### 使用附加信息\n\n除了主要的动作和数据属性之外，意图还可以包含一个称为*附加信息（extras）*\
  \ 的额外属性。附加信息可以向接收意图的组件提供更多信息。这些附加数据以键/值对的形式存在：键名通常以包名开头，值可以是任何基本数据类型或任意对象，只要它实现了`android.os.Parcelable`接口。这些附加信息由\
  \ Android 类`android.os.Bundle`表示。\n\n`Intent`类上的以下两个方法提供了对附加`Bundle`的访问：\n\n```\n\
  \   // 从 Intent 中获取 Bundle\n   Bundle extraBundle = intent.getExtras();\n\n   //\
  \ 将 Bundle 放入 Intent\n   Bundle anotherBundle = new Bundle();\n\n   // 用键/值对填充 bundle\n\
  \   ...\n   // 将 bundle 设置到 Intent 上\n   intent.putExtras(anotherBundle);\n```\n\
  \n`getExtras` 很直接：它返回意图所拥有的`Bundle`。`putExtras` 会检查意图当前是否已有一个 Bundle。如果意图已有 Bundle，`putExtras`\
  \ 会将新 Bundle 中的附加键和值转移到现有的 Bundle 中。如果 Bundle 不存在，`putExtras` 会创建一个，并将新 Bundle 中的键/值对复制到所创建的\
  \ Bundle 中。\n\n**注意：** `putExtras` 会复制传入的 Bundle，而不是引用它。因此，如果你稍后更改了传入的 Bundle，并不会更改意图内部的\
  \ Bundle。\n\n您可以使用多种方法向 Bundle 添加基本类型。以下是一些将简单数据类型添加到附加数据的方法：\n\n```\nputExtra(String\
  \ name, boolean value);\nputExtra(String name, int value);\nputExtra(String name,\
  \ double value);\nputExtra(String name, String value);\n```\n\n以下是一些不那么简单的附加信息：\n\
  \n```\n// 简单数组支持\nputExtra(String name, int[] values);\nputExtra(String name, float[]\
  \ values);\n\n// 可序列化对象\nputExtra(String name, Serializable value);\n\n// Parcelable\
  \ 支持\nputExtra(String name, Parcelable value);\n\n// 在给定键下添加另一个 Bundle\n// Bundle\
  \ 中的 Bundle\nputExtra(String name, Bundle value);\n\n// 从另一个 Intent 添加 Bundle\n\
  // Bundle 的副本\nputExtra(String name, Intent anotherIntent);\n\n// 显式 ArrayList 支持\n\
  putIntegerArrayListExtra(String name, ArrayList arrayList);\nputParcelableArrayListExtra(String\
  \ name, ArrayList arrayList);\nputStringArrayListExtra(String name, ArrayList arrayList);\n\
  ```\n\n在接收方，有以`get`开头的方法，通过键名从附加 Bundle 中检索信息。\n\n`Intent`类定义了与某些动作配套使用的附加键字符串。您可以在`http://developer.android.com/reference/android/content/Intent.html#EXTRA_ALARM_COUNT`找到许多这些附加信息键常量。\n\
  \n让我们考虑此 URL 中列出的几个涉及发送电子邮件的附加信息示例：\n\n*   `EXTRA_EMAIL`：您将使用此字符串键来保存一组电子邮件地址。该键的值为`android.intent.extra.EMAIL`。它应指向一个包含文本格式电子邮件地址的字符串数组。\n\
  *   `EXTRA_SUBJECT`：您将使用此键来保存电子邮件消息的主题。该键的值为`android.intent.extra.SUBJECT`。该键应指向一个包含主题的字符串。\n\
  \n\n\n#### 使用组件直接调用活动\n\n你已经了解了几种使用 Intent 启动活动的方法。你看到了显式操作启动活动，也看到了使用数据 URI 的通用操作启动活动。Android\
  \ 还提供了一种更直接的方式来启动活动：你可以指定活动的 `ComponentName`，它是对象包名和类名的抽象。`Intent` 类提供了多种方法来指定组件：\n\
  \n`setComponent(ComponentName name);`\n`setClassName(String packageName, String\
  \ classNameInThatPackage);`\n`setClassName(Context context, String classNameInThatContext);`\n\
  `setClass(Context context, Class classObjectInThatContext);`\n\n最终，它们都是调用同一个方法的快捷方式：\n\
  \n`setComponent(ComponentName name);`\n\n`ComponentName` 将包名和类名封装在一起。例如，以下代码调用了模拟器自带的\
  \ `contacts` 活动：\n\n```\nIntent intent = new Intent();\nintent.setComponent(new\
  \ ComponentName(\n     \"com.android.contacts\"\n    ,\"com.android.contacts.DialContactsEntryActivity\"\
  );\nstartActivity(intent);\n```\n\n请注意，包名和类名都是完全限定名，并在传递给 `Intent` 类之前依次用于构造 `ComponentName`。\n\
  \n你也可以直接使用类名，而无需构造 `ComponentName`。再次查看 `BasicViewActivity` 代码片段：\n\n```\npublic\
  \ class BasicViewActivity extends Activity\n{\n    @Override\n    public void onCreate(Bundle\
  \ savedInstanceState)\n    {\n        super.onCreate(savedInstanceState);\n    \
  \    setContentView(R.layout.some_view);\n    }\n}//eof-class\n```\n\n鉴于此，你可以使用以下代码来启动此活动：\n\
  \n```\nIntent directIntent = new Intent(activity, BasicViewActivity.class);\nactivity.start(directIntent);\n\
  ```\n\n然而，如果你希望任何类型的 Intent 都能启动某个活动，你应该像这样在 `Android.Manifest.xml` 文件中注册该活动：\n\n\
  ```\n     <activity android:name=\".BasicViewActivity\"\n                android:label=\"\
  Test Activity\">\n```\n\n直接通过类名或名称调用活动时，无需设置 Intent 过滤器。如前所述，这种类型的 Intent 被称为显式\
  \ Intent。由于显式 Intent 指定了要调用的完全限定 Android 组件，因此在调用该组件时，该 Intent 的其他部分将被忽略。\n\n####\
  \ 理解 Intent 类别\n\n你可以将活动分类到不同的类别中，以便根据类别名称进行搜索。例如，在启动时，Android 会查找类别标记为 `CATEGORY_LAUNCHER`\
  \ 的活动。然后，它会获取这些活动的名称和图标，并将它们放在主屏幕上以供启动。\n\n另一个例子：Android 会查找标记为 `CATEGORY_HOME`\
  \ 的活动，以便在启动时显示主屏幕。类似地，`CATEGORY_GADGET` 将活动标记为适合嵌入或复用到其他活动中。\n\n像 `CATEGORY_LAUNCHER`\
  \ 这样的类别字符串格式遵循 `category` 定义约定：\n\n`android.intent.category.LAUNCHER`\n\n你需要知道这些\
  \ `category` 定义的文本字符串，因为活动会在 `AndroidManifest.xml` 文件中将其类别注册为活动过滤器定义的一部分。以下是一个示例：\n\
  \n```\n     <activity android:name=\".HelloWorldActivity\"\n               android:label=\"\
  @string/app_name\">\n         <intent-filter>\n             <action android:name=\"\
  android.intent.action.MAIN\" />\n             <category android:name=\"android.intent.category.LAUNCHER\"\
  \ />\n         </intent-filter>\n     </activity>\n```\n\n**注意：** 活动可能具有某些限制或启用它们的功能，例如是否可以将它们嵌入到父活动中。这些类型的活动特性通过类别来声明。\n\
  \n让我们快速浏览一些预定义的 Android 类别以及如何使用它们（参见表 5-1）。\n\n**表 5-1.** *活动类别及其描述*\n\n| **类别名称**\
  \ | **描述** |\n| --- | --- |\n| `CATEGORY_DEFAULT` | 如果活动希望被隐式 Intent 调用，可以将其声明为\
  \ `DEFAULT` 活动。如果你没有为活动定义此类别，则该活动每次都需要通过其类名显式调用。这就是为什么你会看到通过通用操作或其他操作名称调用的活动使用默认类别规范的原因。\
  \ |\n| `CATEGORY_BROWSABLE` | 活动可以通过向浏览器承诺启动时不会违反浏览器安全考虑，从而将其声明为 `BROWSABLE` 活动。\
  \ |\n| `CATEGORY_TAB` | 此类型的活动可嵌入到标签式父活动中。 |\n| `CATEGORY_ALTERNATIVE` | 活动可以声明自己为正在查看的某种类型数据的\
  \ `ALTERNATIVE` 活动。当您查看该文档时，这些项目通常会作为选项菜单的一部分出现。例如，打印视图被认为是普通视图的替代方案。 |\n| `CATEGORY_SELECTED_ALTERNATIVE`\
  \ | 活动可以声明自己为某种类型数据的 `ALTERNATIVE` 活动。这类似于列出文本文档或 HTML 文档的一系列可能编辑器。 |\n| `CATEGORY_LAUNCHER`\
  \ | 为活动分配此类别将允许其出现在启动器屏幕上。 |\n| `CATEGORY_HOME` | 此类型的活动将作为主屏幕。通常，此类型应只有一个活动。如果有多个，系统将提示您选择一个。\
  \ |\n| `CATEGORY_PREFERENCE` | 此活动将自身标识为首选项活动，因此它将作为首选项屏幕的一部分显示。 |\n| `CATEGORY_GADGET`\
  \ | 此类型的活动可嵌入到父活动中。 |\n| `CATEGORY_TEST` | 这是一个测试活动。 |\n| `CATEGORY_EMBED` | 此类别已被\
  \ `GADGET` 类别取代，但为了向后兼容而保留。 |\n\n你可以通过以下 Android SDK 中 `Intent` 类的网址阅读这些活动类别的详细信息：\n\
  [`http://developer.android.com/android/reference/android/content/Intent.html#CATEGORY_ALTERNATIVE`](http://developer.android.com/android/reference/android/content/Intent.html#CATEGORY_ALTERNATIVE).\n\
  \n\n\n当你使用 `Intent` 启动一个 `Activity` 时，可以通过指定类别来限定需要启动的 `Activity` 类型，也可以搜索匹配特定类别的\
  \ `Activity`。以下示例展示了如何检索匹配 `CATEGORY_LAUNCHER` 类别的主 `Activity` 集合：\n\n```java\n\
  Intent mainIntent = new Intent(Intent.ACTION_MAIN, null);\nmainIntent.addCategory(Intent.CATEGORY_LAUNCHER);\n\
  PackageManager pm = getPackageManager();\nList<ResolveInfo> list = pm.queryIntentActivities(mainIntent,\
  \ 0);\n```\n\n`PackageManager` 是一个关键类，它允许你发现匹配特定 `Intent` 的 `Activity` 而无需实际调用它们。你可以遍历接收到的\
  \ `Activity`，并根据 `ResolveInfo` API 按需调用它们。以下是对上述代码的扩展，它遍历 `Activity` 列表，并调用名称匹配的\
  \ `Activity`。在代码中，我们使用了一个任意的名称进行测试。\n\n```java\nfor(ResolveInfo ri: list)\n{\n \
  \   //ri.activityInfo.\n    Log.d(\"test\",ri.toString());\n    String packagename\
  \ = ri.activityInfo.packageName;\n    String classname = ri.activityInfo.name;\n\
  \    Log.d(\"test\", packagename + \":\" + classname);\n    if (classname.equals(\"\
  com.ai.androidbook.resources.TestActivity\"))\n    {\n        Intent ni = new Intent();\n\
  \        ni.setClassName(packagename,classname);\n        activity.startActivity(ni);\n\
  \    }\n}\n```\n\n你也可以纯粹基于一个 `Intent` 类别来启动 `Activity`，例如 `CATEGORY_LAUNCHER`：\n\
  \n```java\npublic static void invokeAMainApp(Activity activity)\n{\n    Intent mainIntent\
  \ = new Intent(Intent.ACTION_MAIN, null);\n    mainIntent.addCategory(Intent.CATEGORY_LAUNCHER);\n\
  \    activity.startActivity(mainIntent);\n}\n```\n\n多个 `Activity` 可能会匹配该 `Intent`，那么\
  \ Android 会启动哪一个呢？为了解决这个问题，Android 会弹出一个“完成操作方式”的对话框，列出所有可能的 `Activity`，供你选择运行。\n\
  \n以下是另一个使用 `Intent` 跳转到主页面的示例：\n\n```java\n//Go to home screen\nIntent mainIntent\
  \ = new Intent(Intent.ACTION_MAIN, null);\nmainIntent.addCategory(Intent.CATEGORY_HOME);\n\
  startActivity(mainIntent);\n```\n\n如果你不想使用 Android 的默认主页面，可以编写自己的主页面，并声明其类别为 `HOME`。在这种情况下，由于现已注册了多个主页面\
  \ `Activity`，上述代码会提供一个选项让你打开自己编写的那个：\n\n```xml\n//Replace the home screen with yours\n\
  <intent-filter>\n   <action android:value=\"android.intent.action.MAIN\" />\n  \
  \ <category android:value=\"android.intent.category.HOME\"/>\n   <category android:value=\"\
  android.intent.category.DEFAULT\" />\n</intent-filter>\n```\n\n### 将 Intent 解析为其组件的规则\n\
  \n到目前为止，我们已经讨论了关于 `Intent` 的多个方面：操作、数据 URI、附加数据以及类别。基于这些方面，Android 会使用多种策略，根据 `intent-filter`\
  \ 将 `Intent` 匹配到其目标 `Activity`。\n\n处于匹配层级最顶端的是附加到 `Intent` 上的组件名称。如果设置了组件名称，则该 `Intent`\
  \ 被称为显式 `Intent`。对于显式 `Intent`，只有组件名称是重要的；`Intent` 的其他所有方面或属性都会被忽略。当 `Intent` 上没有指定组件名称时，该\
  \ `Intent` 被称为隐式 `Intent`。针对隐式 `Intent` 的目标解析规则有很多。\n\n基本规则是：传入的 `Intent` 的操作、类别和数据特性*必须*匹配（或在其中）在\
  \ `intent-filter` 中指定的内容。与 `Intent` 不同，一个 `intent-filter` 可以指定多个操作、类别和数据属性。这意味着同一个\
  \ `intent-filter` 可以满足多个 `Intent`，也就是说，一个 `Activity` 可以响应多个 `Intent`。然而，“匹配”的含义在操作、数据属性和类别之间有所不同。让我们来看看隐式\
  \ `Intent` 各部分各自的匹配标准。\n\n#### 操作（Action）\n\n如果 `Intent` 包含一个操作，那么 `intent-filter`\
  \ 要么必须将该操作作为其操作列表的一部分，要么根本不定义任何操作。因此，如果 `intent-filter` **没有定义操作**，那么它**匹配**任何传入的\
  \ `Intent` 操作。\n\n如果 `intent-filter` 中指定了一个或多个操作，那么这些操作中至少有一个必须与传入的 `Intent` 操作相匹配。\n\
  \n#### 数据（Data）\n\n如果 `intent-filter` 中没有指定任何数据特性，那么它不会匹配任何携带了数据或数据属性的传入 `Intent`。这意味着它只会查找那些完全没有指定数据的\
  \ `Intent`。\n\n数据缺失和操作缺失（在过滤器中）的效果是相反的。如果过滤器中没有任何操作，则一切皆匹配。如果过滤器中没有任何数据，则 `Intent`\
  \ 中的任何数据都不匹配。\n\n#### 数据类型（Data Type）\n\n要使数据类型匹配，传入 `Intent` 的数据类型必须是 `intent-filter`\
  \ 中指定的数据类型之一。即，`Intent` 中的数据类型必须出现在 `intent-filter` 中。\n\n传入 `Intent` 的数据类型通过两种方式之一来确定。第一种，如果数据\
  \ URI 是 `content:` 或 `file:` URI，则内容提供者或 Android 会推断出其类型。第二种方式是查看 `Intent` 的显式数据类型。要使这种方式生效，传入的\
  \ `Intent` 不应设置数据 URI，因为当调用 `intent.setType()` 时，系统会自动处理数据 URI。\n\nAndroid 还允许在其\
  \ MIME 类型规范中使用星号（`*`）作为子类型，以涵盖所有可能的子类型。\n\n另外，数据类型是区分大小写的。\n\n#### 数据协议（Data Scheme）\n\
  \n要使数据协议匹配，传入 `Intent` 的数据协议必须是 `intent-filter` 中指定的协议之一。换句话说，传入的数据协议必须存在于 `intent-filter`\
  \ 中。\n\n传入 `Intent` 的协议是数据 URI 的第一部分。在 `Intent` 上，没有设置协议的方法。它完全是从类似于 `http://www.somesite.com/somepath`\
  \ 的 `Intent` 数据 URI 中派生出来的。\n\n如果传入 `Intent` URI 的数据协议是 `content:` 或 `file:`，则无论\
  \ `intent-filter` 中指定的协议、域名和路径是什么，都视为匹配。根据 SDK 文档，这是因为每个组件都应知道如何从本质上属于本地的 `content:`\
  \ 或 `file:` URL 读取数据。换句话说，所有组件都应支持这两种类型的 URL。\n\n协议也是区分大小写的。\n\n#### 数据授权（Data Authority）\n\
  \n如果过滤器中没有任何授权信息，则匹配任何传入数据 URI 的授权（或域名）。如果过滤器中指定了一个授权，例如 `www.somesite.com`，那么必须有一个协议和一个授权与传入\
  \ `Intent` 的数据 URI 相匹配。\n\n例如，如果我们在 `intent-filter` 中将 `www.somesite.com` 指定为授权，并将协议指定为\
  \ `https`，那么该 `Intent` 将无法匹配 `http://www.somesite.com/somepath`，因为 `http` 未被列为支持的协议。\n\
  \n授权也是区分大小写的。\n\n#### 数据路径（Data Path）\n\n`intent-filter` 中没有指定数据路径意味着匹配任何传入数据 URI\
  \ 的路径。如果过滤器中指定了一个路径，例如 `somepath`，那么必须有一个协议、一个授权和一个数据路径与传入 `Intent` 的数据 URI 相匹配。\n\
  \n换句话说，协议、授权和路径共同协作来验证一个传入 `Intent` 的 URI，例如 `http://www.somesite.com/somepath`。因此，`path`、`authority`\
  \ 和 `scheme` 不是独立工作的，而是共同发挥作用。\n\n路径同样也是区分大小写的。\n\n\n\n#### 意图类别\n\n传入意图中的每一个类别都必须存在于过滤器类别列表中。过滤器中包含更多类别是可以的。如果一个过滤器*没有任何类别*，它将仅匹配*同样未提及任何类别*的意图。\n\
  \n不过有一个注意事项。Android 会将所有传递给 `startActivity()` 的*隐式*意图视为至少包含一个类别：`android.intent.category.DEFAULT`。如果传入的意图是隐式意图，`startActivity()`\
  \ 中的代码将只搜索那些定义了 `DEFAULT` 类别的 Activity。因此，每个希望通过隐式意图被调用的 Activity 都必须在其过滤器中包含默认类别。\n\
  \n即使某个 Activity 的意图过滤器中未包含默认类别，如果你知道其显式组件名称，你仍然可以像启动器那样启动它。如果在自己搜索匹配的意图时没有将默认类别作为搜索条件，你也可以通过这种方式启动那些\
  \ Activity。\n\n从这个意义上说，这个 `DEFAULT` 类别是 `startActivity` 实现的一个产物，而非过滤器固有的行为。\n\n\
  还有一个额外的复杂情况：Android 指出，如果 Activity 仅打算从启动器屏幕调用，则不需要默认类别。因此，这些 Activity 的过滤器中通常只包含\
  \ `MAIN` 和 `LAUNCHER` 类别。不过，对于这些 Activity，也可以选择性地指定 `DEFAULT` 类别。\n\n### 执行 ACTION_PICK\n\
  \n到目前为止，我们执行的主要是调用另一个 Activity 但不需要返回结果的意图或动作。让我们来看一个稍微复杂一些的动作：它在被调用后会返回一个值。`ACTION_PICK`\
  \ 就是这样一个通用动作。\n\n`ACTION_PICK` 的思想是启动一个显示项目列表的 Activity。然后该 Activity 应允许用户从列表中选择一个项目。一旦用户选定了项目，Activity\
  \ 应将所选项目的 URI 返回给调用者。这使得选择特定类型项目的 UI 功能可以被重用。\n\n你需要使用指向 Android 内容游标的 MIME 类型来指示可供选择的项目集合。该\
  \ URI 的 MIME 类型应类似于以下内容：\n\n`vnd.android.cursor.dir/vnd.google.note`\n\nActivity\
  \ 有责任根据 URI 从内容提供者中检索数据。这也是为什么在可能的情况下应将数据封装到内容提供者中的原因。\n\n对于这种返回数据的动作，我们不能使用 `startActivity()`，因为\
  \ `startActivity()` 不会返回结果。`startActivity()` 无法返回结果，是因为它会在一个单独的线程中像模态对话框一样打开新 Activity，而主线程则用于处理事件。换句话说，`startActivity()`\
  \ 是一个异步调用，没有回调来指示被调用 Activity 内发生了什么。如果你想要返回数据，可以使用 `startActivity()` 的一个变体——`startActivityForResult()`，它带有一个回调。\n\
  \n让我们看看 `Activity` 类中 `startActivityForResult()` 方法的签名：\n\n`public void startActivityForResult(Intent\
  \ intent, int requestCode)`\n\n此方法会启动一个你期望从其获得结果的 Activity。当该 Activity 退出时，源 Activity\
  \ 的 `onActivityResult()` 方法将会被调用，并传入给定的 `requestCode`。这个回调方法的签名是：\n\n`protected\
  \ void onActivityResult(int requestCode, int resultCode, Intent data)`\n\n`requestCode`\
  \ 是你传递给 `startActivityForResult()` 方法的值。`resultCode` 可以是 `RESULT_OK`、`RESULT_CANCELED`\
  \ 或自定义代码。自定义代码应从 `RESULT_FIRST_USER` 开始。`Intent` 参数包含被调用 Activity 希望返回的任何附加数据。对于\
  \ `ACTION_PICK` 的情况，意图中返回的数据指向单个项目的数据 URI。\n\n代码清单 5–3 演示了如何调用一个会返回结果的 Activity。\n\
  \n**注意：** 代码清单 5–3 中的代码假设你已经从 Android SDK 发行版中安装了 NotePad 示例项目。如果你尚未在 SDK 中安装该示例，我们在本章末尾提供了一个链接，指导你如何下载\
  \ NotePad 示例。\n\n**代码清单 5–3.** *调用动作后返回数据*\n\n```\npublic class SomeActivity extends\
  \ Activity\n{\n.....\n.....\npublic static void invokePick(Activity activity)\n\
  {\n  Intent pickIntent = new Intent(Intent.ACTION_PICK);\n  int requestCode = 1;\n\
  \  pickIntent.setData(Uri.parse(\n     \"content://com.google.provider.NotePad/notes\"\
  ));\n  activity.startActivityForResult(pickIntent, requestCode);\n}\n\nprotected\
  \ void onActivityResult(int requestCode\n    ,int resultCode\n    ,Intent outputIntent)\n\
  {\n  // 这是为了通知父类 (Activity)\n  // 被调用的 Activity 已完成，基类可以进行必要的清理工作\n  super.onActivityResult(requestCode,\
  \ resultCode, outputIntent);\n  parseResult(this, requestCode, resultCode, outputIntent);\n\
  }\npublic static void parseResult(Activity activity\n    , int requestCode\n   \
  \ , int resultCode\n    , Intent outputIntent)\n{\n    if (requestCode != 1)\n \
  \   {\n     Log.d(\"Test\", \"是其他对象调用了此方法，不是我们\");\n             return;\n    }\n\
  \    if (resultCode != Activity.RESULT_OK)\n    {\n      Log.d(Test, \"结果码不正确:\"\
  \ + resultCode);\n               return;\n    }\n    Log.d(\"Test\", \"结果码正确:\"\
  \ + resultCode);\n    Uri selectedUri = outputIntent.getData();\n    Log.d(\"Test\"\
  , \"输出 URI:\" + selectedUri.toString());\n\n    // 继续显示笔记\n    outputIntent.setAction(Intent.ACTION_VIEW);\n\
  \    startActivity(outputIntent);\n}\n```\n\n常量 `RESULT_OK`、`RESULT_CANCELED` 和\
  \ `RESULT_FIRST_USER` 都定义在 `Activity` 类中。这些常量的数值为：\n\n```\nRESULT_OK = -1;\nRESULT_CANCELED\
  \ = 0;\nRESULT_FIRST_USER = 1;\n```\n\n为了使 `PICK` 功能正常工作，响应的实现者应具有明确处理 `PICK` 需求的代码。让我们看看这在\
  \ Google 示例 NotePad 应用程序中是如何实现的。当在项目列表中选择一个项目时，会检查调用该 Activity 的意图是否为 `PICK` 意图。如果是，则将数据\
  \ URI 设置到新的意图中，并通过 `setResult()` 返回：\n\n```\n@Override\nprotected void onListItemClick(ListView\
  \ l, View v, int position, long id) {\n    Uri uri = ContentUris.withAppendedId(getIntent().getData(),\
  \ id);\n\n    String action = getIntent().getAction();\n    if (Intent.ACTION_PICK.equals(action)\
  \ ||\n              Intent.ACTION_GET_CONTENT.equals(action))\n   {\n        //\
  \ 调用者正在等待我们返回用户选择的笔记。\n        // 用户已点击了一个笔记，现在返回它。\n        setResult(RESULT_OK,\
  \ new Intent().setData(uri));\n    } else {\n        // 启动 Activity 以查看/编辑当前选中的项目\n\
  \        startActivity(new Intent(Intent.ACTION_EDIT, uri));\n    }\n}\n```\n\n\n\
  \n### 执行 GET_CONTENT 操作\n\n`ACTION_GET_CONTENT` 与 `ACTION_PICK` 类似。在使用 `ACTION_PICK`\
  \ 时，您需要指定一个指向项目集合（如笔记集合）的 URI。您期望该操作从中选取一条笔记并将其返回给调用方。而在使用 `ACTION_GET_CONTENT`\
  \ 时，您是向 Android 表明您需要一个特定 MIME 类型的项目。Android 会搜索能够创建这类项目的活动，或者能够从满足该 MIME 类型的现有项目集合中进行选择的活动。\n\
  \n使用 `ACTION_GET_CONTENT`，您可以通过以下代码从 NotePad 应用支持的笔记集合中选取一条笔记：\n\n```java\npublic\
  \ static void invokeGetContent(Activity activity)\n{\n      Intent pickIntent =\
  \ new Intent(Intent.ACTION_GET_CONTENT);\n      int requestCode = 2;\n      pickIntent.setType(\"\
  vnd.android.cursor.item/vnd.google.note\");\n      activity.startActivityForResult(pickIntent,\
  \ requestCode);\n}\n```\n\n请注意，意图类型被设置为单条笔记的 MIME 类型。将此与以下代码片段中的 `ACTION_PICK` 代码进行对比，后者输入的是一个数据\
  \ URI：\n\n```java\npublic static void invokePick(Activity activity)\n{\n  Intent\
  \ pickIntent = new Intent(Intent.ACTION_PICK);\n  int requestCode = 1;\n  pickIntent.setData(Uri.parse(\n\
  \     \"content://com.google.provider.NotePad/notes\"));\n  activity.startActivityForResult(pickIntent,\
  \ requestCode);\n}\n```\n\n要使一个活动能够响应 `ACTION_GET_CONTENT`，该活动必须注册一个意图过滤器，表明它可以提供该\
  \ MIME 类型的项目。以下是 SDK 的 NotePad 应用如何实现这一点：\n\n```xml\n<activity android:name=\"NotesList\"\
  \ android:label=\"@string/title_notes_list\">\n……\n<intent-filter>\n    <action\
  \ android:name=\"android.intent.action.GET_CONTENT\" />\n    <category android:name=\"\
  android.intent.category.DEFAULT\" />\n    <data android:mimeType=\"vnd.android.cursor.item/vnd.google.note\"\
  \ />\n      </intent-filter>\n…..\n</activity>\n```\n\n响应 `onActivityResult()` 的其余代码与之前的\
  \ `ACTION_PICK` 示例完全相同。如果有多个活动可以返回相同的 MIME 类型，Android 会显示选择器对话框，让您从中选择一个活动。\n\n\
  ### 介绍待定意图（Pending Intents）\n\nAndroid 有一种意图的变体，称为待定意图。在这种变体中，Android 允许一个组件将意图存储在一个位置以供将来使用，并且该意图可以在之后被再次调用。例如，在闹钟管理器中，您希望在闹钟响起时启动一个服务。Android\
  \ 通过创建一个包装了意图的待定意图并将其存储起来来实现这一点，这样即使调用进程终止，该意图也能被发送到目标。在创建待定意图时，Android 会存储关于发起进程的足够信息，以便在发送或调用时可以检查安全凭据。\n\
  \n让我们看看如何创建一个待定意图。\n\n```java\nIntent regularIntent;\nPendingIntent pi = PendingIntent.getActivity(context,\
  \ 0, regularIntent,...);\n```\n\n**注意：** `PendingIntent.getActivity()` 方法的第二个参数称为\
  \ `requestCode`，在此示例中我们将其设置为零。此参数用于在底层意图相同时区分两个待定意图。这一点在第 15 章中会有更详细的讨论，我们将在闹钟管理器的上下文中探讨待定意图。\n\
  \n这里关于方法命名 `PendingActivity.getActivity()` 有几个特别之处。活动在此处扮演什么角色？其次，为什么我们不调用 `create`\
  \ 来创建待定意图，而是使用 `get`？\n\n要理解第一点，我们需要深入探讨常规意图的用法。常规意图可用于启动一个活动、一个服务或调用一个广播接收器（您将在本书后面了解服务和广播接收器）。使用意图调用这些不同类型组件的性质是不同的。为了适应这一点，Android\
  \ 上下文（`Activity` 的父类）提供了三种不同的方法，分别是：\n\n* `startActivty(intent)`\n* `startService(intent)`\n\
  * `sendBroadcast(intent)`\n\n鉴于这些变体，如果我们存储一个意图供以后重用，Android 如何知道是要启动一个活动、启动一个服务，还是通过广播启动一个广播接收器呢？这就是为什么在创建待定意图时，我们必须明确指定创建其的目的，这也解释了以下三种独立的方法：\n\
  \n* `PendingIntent.getActivity(context, 0, intent, ...)`\n* `PendingIntent.getService(context,\
  \ 0, intent, ...)`\n* `PendingIntent.getBroadcast(context, 0, intent, ...)`\n\n\
  现在来解释“get”的部分。Android 会存储意图并重用它们。如果您两次使用相同的意图对象请求一个待定意图，您将得到相同的待定意图。如果您查看 `PendingIntent.getActivity()`\
  \ 方法的完整签名，这一点就会变得清晰一些。其签名如下：\n\n```java\nPendingIntent.getActivity(Context context,\
  \ //发起上下文\n     int requestCode, //1,2, 3 等\n     Intent intent, //原始意图\n     int\
  \ flags ) //标志\n```\n\n如果您的目标是获得一个不同的待定意图副本，则必须提供不同的 `requestCode`。当我们在第 15 章中介绍闹钟管理器时，会对此需求进行更详细的解释。如果两个“意图”的内部部分（除了\
  \ extras 包之外）匹配，则认为它们是相同的。\n\n标志指示如果已存在一个待定意图该怎么做——是返回 null、覆盖 extras 等等。有关可能标志的更多详细信息，请参阅以下网址：\n\
  \n`http://developer.android.com/reference/android/app/PendingIntent.html`\n\n通常，您可以将\
  \ `requestCode` 和标志都传递为零，以获得默认行为。\n\n### 参考资料\n\n以下是一些有用的链接，可帮助您进一步加深对本章的理解：\n\n\
  *   [`http://developer.android.com/reference/android/content/Intent.html`](http://developer.android.com/reference/android/content/Intent.html)：在此网址，您将找到意图的概述。您将在此处了解常用的操作、extras\
  \ 等。\n*   [`http://developer.android.com/guide/appendix/g-app-intents.html`](http://developer.android.com/guide/appendix/g-app-intents.html)：此网址列出了一组\
  \ Google 应用的意图。在这里，您将看到如何调用浏览器、地图、拨号器以及谷歌街景。\n*   [`http://developer.android.com/reference/android/content/IntentFilter.html`](http://developer.android.com/reference/android/content/IntentFilter.html)：此网址介绍了意图过滤器，在您注册意图过滤器时非常有用。\n\
  *   [`http://developer.android.com/guide/topics/intents/intents-filters.html`](http://developer.android.com/guide/topics/intents/intents-filters.html)：此网址深入介绍了意图过滤器的解析规则。\n\
  *   [`http://developer.android.com/resources/samples/get.html`](http://developer.android.com/resources/samples/get.html)：您可以使用此网址下载\
  \ NotePad 应用的示例代码。您需要加载此示例项目以测试一些意图。\n*   [`http://developer.android.com/resources/samples/NotePad/index.html`](http://developer.android.com/resources/samples/NotePad/index.html)：您可以使用此网址在线浏览\
  \ NotePad 应用的源代码。\n*   [`http://www.openintents.org/`](http://www.openintents.org/)：此网址指向一个收集来自各供应商的开放意图的网页项目。\n\
  *   [`http://www.androidbook.com/projects`](http://www.androidbook.com/projects)：您可以使用此网址下载本章专用的测试项目。ZIP\
  \ 文件的名称为 `ProAndroid3_ch05_TestIntents.zip`。\n\n\n\n### 小结\n\n在本章中，我们明确了关于 Android\
  \ Intent 的几个重要元素。我们探讨了 Intent 可以使用的各种场景，并向你展示了 Intent 与内容 URI 之间的关系。我们还解释了如何使用 Intent\
  \ 来调用能返回结果的 Activity。此外，我们也介绍了挂起 Intent，在第 15 章和第 22 章中使用它们时，我们将进一步探讨。\n\n## 第 6\
  \ 章：构建用户界面与使用控件\n\n到目前为止，我们已经涵盖了 Android 的基础知识，但尚未涉及用户界面 (UI)。在本章中，我们将讨论用户界面和控件。首先，我们会探讨\
  \ Android UI 开发的通用理念，然后介绍 Android SDK 中自带的常用 UI 控件。我们还将讨论布局管理器和视图适配器。最后，我们将介绍层次查看器工具——一个用于调试和优化\
  \ Android UI 的工具。\n\n### Android 中的 UI 开发\n\nAndroid 中的 UI 开发很有趣。它很有趣，是因为它相对简单。通过\
  \ Android，我们拥有一个易于理解的框架，并带有一套有限的现成控件。可用的屏幕区域通常是有限的。Android 还处理了大量通常与设计和构建优质 UI 相关的繁重工作。这一点，加上用户通常只想执行一个特定操作的事实，使得我们能够轻松构建良好的用户界面，以提供良好的用户体验。\n\
  \nAndroid SDK 附带了许多控件，你可以使用它们为你的应用程序构建用户界面。与其他 SDK 类似，Android SDK 提供了文本字段、按钮、列表、网格等。此外，Android\
  \ 还提供了一系列适合移动设备的控件。\n\n这些常用控件的核心是两个类：`android.view.View` 和 `android.view.ViewGroup`。正如第一个类的名称所示，`View`\
  \ 类代表一个通用的 `View` 对象。Android 中的常用控件最终都继承自 `View` 类。`ViewGroup` 本身也是一个视图，但它还能包含其他视图。`ViewGroup`\
  \ 是布局类列表的基类。与 Swing 类似，Android 使用布局的概念来管理控件在容器视图内的排列方式。正如我们将看到的，使用布局使我们能够轻松控制用户界面中控件的位置和方向。\n\
  \n在 Android 中构建用户界面，你可以从几种方法中进行选择。你可以完全在代码中构建用户界面。你也可以在 XML 中定义用户界面。你甚至可以结合这两种方法——在\
  \ XML 中定义用户界面，然后在代码中引用并修改它。为了演示这一点，我们将使用这三种方法分别构建一个简单的用户界面。\n\n在开始之前，让我们定义一些术语。在本书以及其他\
  \ Android 文献中，关于 UI 开发的讨论中你会遇到 *视图*、*控件*、*微件*、*容器* 和 *布局* 这些术语。如果你刚接触 Android 编程或一般的\
  \ UI 开发，你可能对这些术语不熟悉。在开始之前，我们将简要介绍它们（参见表 6-1）。\n\n**表 6-1.** UI 术语表\n\n| **术语** |\
  \ **描述** |\n| --- | --- |\n| 视图，微件，控件 | 它们各自代表一个用户界面元素。例如按钮、网格、列表、窗口、对话框等。在本章中，“视图”、“微件”和“控件”这些术语可以互换使用。\
  \ |\n| 容器 | 这是一个用于包含其他视图的视图。例如，一个网格可以被视为一个容器，因为它包含单元格，而每个单元格都是一个视图。 |\n| 布局 | 这是容器和视图的一种视觉排列方式，并且可以包含其他布局。\
  \ |\n\n图 6-1 显示了我们即将构建的应用程序的截图。截图旁边是应用程序中控件和容器的布局层次结构。\n\n![images](img/0601.jpg)\n\
  \n**图 6-1.** *一个 Activity 的用户界面和布局*\n\n在讨论示例程序时，我们将引用这个布局层次结构。目前，你只需要知道该应用程序有一个\
  \ Activity。该 Activity 的用户界面由三个容器组成：一个包含人名信息的容器、一个包含地址信息的容器，以及一个作为子容器的外部父容器。\n\n\
  #### 完全通过代码构建 UI\n\n第一个示例，代码清单 6-1，演示了如何完全在代码中构建用户界面。要尝试这个示例，请创建一个名为 `MainActivity`\
  \ 的 Activity 的新 Android 项目，然后将代码清单 6-1 中的代码复制到你的 `MainActivity` 类中。\n\n**注意：** 我们会在本章末尾提供一个\
  \ URL，你可以使用它下载本章中涉及的示例项目。这样你可以直接将项目导入到你的 Eclipse 中，而无需复制粘贴代码。\n\n**代码清单 6-1.** *完全通过代码创建一个简单的用户界面*\n\
  \n```\npackage com.androidbook.controls;\nimport android.app.Activity;\nimport android.os.Bundle;\n\
  import android.view.ViewGroup.LayoutParams;\nimport android.widget.LinearLayout;\n\
  import android.widget.TextView;\npublic class MainActivity extends Activity\n{\n\
      private LinearLayout nameContainer;\n\n    private LinearLayout addressContainer;\n\
  \n    private LinearLayout parentContainer;\n\n    /** Called when the activity\
  \ is first created. */\n    @Override\n    public void onCreate(Bundle savedInstanceState)\n\
      {\n        super.onCreate(savedInstanceState);\n\n        createNameContainer();\n\
  \n        createAddressContainer();\n\n        createParentContainer();\n\n        setContentView(parentContainer);\n\
      }\n\n    private void createNameContainer()\n    {\n        nameContainer =\
  \ new LinearLayout(this);\n\n        nameContainer.setLayoutParams(new LayoutParams(LayoutParams.FILL_PARENT,\n\
                  LayoutParams.WRAP_CONTENT));\n        nameContainer.setOrientation(LinearLayout.HORIZONTAL);\n\
  \n        TextView nameLbl = new TextView(this);\n        nameLbl.setText(\"Name:\
  \ \");\n\n        TextView nameValue = new TextView(this);\n        nameValue.setText(\"\
  John Doe\");\n\n        nameContainer.addView(nameLbl);\n        nameContainer.addView(nameValue);\n\
      }\n\n    private void createAddressContainer()\n    {\n        addressContainer\
  \ = new LinearLayout(this);\n\n        addressContainer.setLayoutParams(new LayoutParams(LayoutParams.FILL_PARENT,\n\
                  LayoutParams.WRAP_CONTENT));\n        addressContainer.setOrientation(LinearLayout.VERTICAL);\n\
  \n        TextView addrLbl = new TextView(this);\n        addrLbl.setText(\"Address:\"\
  );\n\n        TextView addrValue = new TextView(this);\n        addrValue.setText(\"\
  911 Hollywood Blvd\");\n\n        addressContainer.addView(addrLbl);\n        addressContainer.addView(addrValue);\n\
      }\n\n    private void createParentContainer()\n    {\n        parentContainer\
  \ = new LinearLayout(this);\n\n        parentContainer.setLayoutParams(new LayoutParams(LayoutParams.FILL_PARENT,\n\
                  LayoutParams.FILL_PARENT));\n        parentContainer.setOrientation(LinearLayout.VERTICAL);\n\
  \n        parentContainer.addView(nameContainer);\n        parentContainer.addView(addressContainer);\n\
      }\n}\n```\n\n如代码清单 6-1 所示，这个 Activity 包含了三个 `LinearLayout` 对象。正如我们之前提到的，布局对象包含在屏幕某部分内定位对象的逻辑。例如，`LinearLayout`\
  \ 知道如何垂直或水平地排列控件。布局对象可以包含任何类型的视图——甚至可以是其他布局。\n\n\n\n`nameContainer`对象包含两个`TextView`控件：一个用于标签“Name:”，另一个用于保存实际名称（例如\
  \ John Doe）。`addressContainer`也包含两个`TextView`控件。这两个容器的区别在于`nameContainer`是水平布局，而`addressContainer`是垂直布局。这两个容器都位于`parentContainer`内，它是活动的根视图。容器构建完成后，活动通过调用`setContentView(parentContainer)`将视图内容设置为根视图。当渲染活动用户界面时，会调用根视图进行渲染，根视图再调用其子视图，子视图再调用它们的子视图，以此类推，直到整个用户界面渲染完成。\n\
  \n如清单 6-1 所示，我们有多个`LinearLayout`控件。其中两个是垂直布局，一个是水平布局。`nameContainer`是水平布局，这意味着两个`TextView`控件在水平方向并排显示。`addressContainer`是垂直布局，这意味着两个`TextView`控件一个叠在另一个之上。`parentContainer`也是垂直布局，因此`nameContainer`显示在`addressContainer`上方。请注意两个垂直布局容器`addressContainer`和`parentContainer`之间的细微差别：`parentContainer`被设置为占据屏幕的整个宽度和高度。\n\
  \n```\nparentContainer.setLayoutParams(new LayoutParams(LayoutParams.FILL_PARENT,\n\
  \                LayoutParams.FILL_PARENT));\n```\n\n而`addressContainer`在垂直方向上包裹其内容：\n\
  \n```\naddressContainer.setLayoutParams(new LayoutParams(LayoutParams.FILL_PARENT,\n\
  \                LayoutParams.WRAP_CONTENT));\n```\n\n换句话说，`WRAP_CONTENT`意味着视图在某个维度上只占用所需的空间，不再额外占用，但不超过父视图允许的范围。对于`addressContainer`，这意味着容器在垂直方向上会占用两行空间，因为它只需要这么多。\n\
  \n#### 完全在 XML 中构建 UI\n\n现在让我们在 XML 中构建相同的用户界面（参见清单 6-2）。回顾第 3 章的内容，XML 布局文件存储在资源目录（`/res/`）下的`layout`文件夹中。要尝试此示例，请在\
  \ Eclipse 中创建一个新的 Android 项目。默认情况下，你将获得一个名为`main.xml`的 XML 布局文件，位于`res/layout`文件夹下。双击`main.xml`查看其内容，Eclipse\
  \ 将显示布局文件的视觉编辑器。你可能在视图顶部看到类似“Hello World, MainActivity!”的字符串。点击视图底部的`main.xml`选项卡，查看`main.xml`文件的\
  \ XML 内容。这会显示一个`LinearLayout`和一个`TextView`控件。使用“Layout”选项卡或`main.xml`选项卡（或两者结合），在`main.xml`文件中重新创建清单\
  \ 6-2 的内容，然后保存。\n\n**清单 6-2. 完全在 XML 中创建用户界面**\n\n```xml\n<?xml version=\"1.0\"\
  \ encoding=\"utf-8\"?>\n<LinearLayout\n    android:orientation=\"vertical\" android:layout_width=\"\
  fill_parent\"\n    android:layout_height=\"fill_parent\">\n    <!-- NAME CONTAINER\
  \ -->\n    <LinearLayout\n        android:orientation=\"horizontal\" android:layout_width=\"\
  fill_parent\"\n        android:layout_height=\"wrap_content\">\n\n            <TextView\
  \  android:layout_width=\"wrap_content\"\n        android:layout_height=\"wrap_content\"\
  \ android:text=\"Name:\" />\n\n            <TextView android:layout_width=\"wrap_content\"\
  \n        android:layout_height=\"wrap_content\" android:text=\"John Doe\" />\n\n\
  \    </LinearLayout>\n\n    <!-- ADDRESS CONTAINER -->\n    <LinearLayout\n    \
  \    android:orientation=\"vertical\" android:layout_width=\"fill_parent\"\n   \
  \     android:layout_height=\"wrap_content\">\n\n            <TextView android:layout_width=\"\
  fill_parent\"\n        android:layout_height=\"wrap_content\" android:text=\"Address:\"\
  \ />\n\n            <TextView android:layout_width=\"fill_parent\"\n        android:layout_height=\"\
  wrap_content\" android:text=\"911 Hollywood Blvd.\" />\n    </LinearLayout>\n\n\
  </LinearLayout>\n```\n\n在你新项目的`src`目录下，有一个默认的`.java`文件，其中包含一个`Activity`类定义。双击该文件查看其内容，注意`setContentView(R.layout.main)`语句。清单\
  \ 6-2 中显示的 XML 代码片段，配合`setContentView(R.layout.main)`的调用，将渲染出与之前完全通过代码生成时相同的用户界面。XML\
  \ 文件本身很直观，但请注意我们定义了三个容器视图。第一个`LinearLayout`相当于我们的父容器。该容器通过设置相应的属性`android:orientation=\"\
  vertical\"`将其方向设置为垂直。父容器包含两个`LinearLayout`容器，分别代表`nameContainer`和`addressContainer`。\n\
  \n运行此应用程序将产生与之前示例应用程序相同的用户界面。标签和值将如图 6-1 所示显示。\n\n\n\n##### 使用代码在 XML 中构建 UI\n\n\
  列表 6-2 是一个刻意为之的示例。在 XML 布局中硬编码 `TextView` 控件的值毫无意义。理想情况下，我们应在 XML 中设计用户界面，然后通过代码引用这些控件。这种做法使我们能够将动态数据绑定到设计时定义的控件上。事实上，这正是推荐的做法。在\
  \ XML 中构建布局，再使用代码填充动态数据，是相当容易的。\n\n列表 6-3 展示了略微不同的 XML 实现的相同用户界面。这段 XML 为 `TextView`\
  \ 控件分配了 ID，以便我们可以在代码中引用它们。\n\n**列表 6-3.** *在 XML 中使用 ID 创建用户界面*\n\n```\n<?xml version=\"\
  1.0\" encoding=\"utf-8\"?>\n<LinearLayout\n    android:orientation=\"vertical\"\
  \ android:layout_width=\"fill_parent\"\n    android:layout_height=\"fill_parent\"\
  >\n    <!-- 姓名容器 -->\n    <LinearLayout\n        android:orientation=\"horizontal\"\
  \ android:layout_width=\"fill_parent\"\n        android:layout_height=\"wrap_content\"\
  >\n\n            <TextView android:layout_width=\"wrap_content\"\n        android:layout_height=\"\
  wrap_content\" android:text=\"@string/name_text\" />\n\n            <TextView android:id=\"\
  @+id/nameValue\"\n        android:layout_width=\"wrap_content\" android:layout_height=\"\
  wrap_content\" />\n\n    </LinearLayout>\n\n    <!-- 地址容器 -->\n    <LinearLayout\n\
  \        android:orientation=\"vertical\" android:layout_width=\"fill_parent\"\n\
  \        android:layout_height=\"wrap_content\">\n\n            <TextView android:layout_width=\"\
  fill_parent\"\n        android:layout_height=\"wrap_content\" android:text=\"@string/addr_text\"\
  \ />\n\n            <TextView android:id=\"@+id/addrValue\"\n        android:layout_width=\"\
  fill_parent\" android:layout_height=\"wrap_content\" />\n    </LinearLayout>\n\n\
  </LinearLayout>\n```\n\n除了为那些要由代码填充数据的 `TextView` 控件添加 ID 之外，我们还引入了一些标签 `TextView`\
  \ 控件，它们的内容来自字符串资源文件。这些是没有 ID 但带有 `android:text` 属性的 `TextView`。你可能还记得第 3 章中的内容，这些\
  \ `TextView` 的实际字符串会来自 `/res/values` 文件夹下的 `strings.xml` 文件。列表 6-4 展示了我们的 `strings.xml`\
  \ 文件可能的样子。\n\n**列表 6-4.** *用于列表 6-3 的 strings.xml 文件*\n\n```\n<?xml version=\"1.0\"\
  \ encoding=\"utf-8\"?>\n<resources>\n    <string name=\"app_name\">通用控件</string>\n\
  \    <string name=\"name_text\">姓名：</string>\n    <string name=\"addr_text\">地址：</string>\n\
  </resources>\n```\n\n列表 6-5 中的代码演示了如何获取对 XML 中定义的控件的引用，进而设置其属性。你可以将此代码放入 Activity\
  \ 的 `onCreate()` 方法中。\n\n**列表 6-5.** *在运行时引用资源中的控件*\n\n```\nsetContentView(R.layout.main);\n\
  \nTextView nameValue = (TextView)findViewById(R.id.nameValue);\nnameValue.setText(\"\
  张三\");\nTextView addrValue = (TextView)findViewById(R.id.addrValue);\naddrValue.setText(\"\
  好莱坞大道 911 号\");\n```\n\n列表 6-5 中的代码很直白，但请注意，我们在调用 `findViewById()` 之前，必须先通过调用 `setContentView(R.layout.main)`\
  \ 来加载资源——如果视图尚未加载，我们是无法获得对它们的引用的。\n\nAndroid 的开发者做得非常出色，几乎控件的每个方面都可以通过 XML 或代码进行设置。通常，将控件的属性设置在\
  \ XML 布局文件中是一个好主意，而不是使用代码。不过，在很多情况下你仍然需要使用代码，例如设置要显示给用户的值。\n\n##### FILL_PARENT\
  \ 与 MATCH_PARENT\n\n常量 `FILL_PARENT` 在 Android 2.2 中已被弃用，取而代之的是 `MATCH_PARENT`。但这仅仅是名称上的更改。该常量的值仍然是\
  \ -1。同样，对于 XML 布局，`\"fill_parent\"` 已被替换为 `\"match_parent\"`。那么你应该使用哪个值呢？你完全可以直接使用值\
  \ -1，这样也能正常工作。然而，这不太易读，而且对于 XML 布局，你也没有与之等效的未命名值可用。有一种更好的方法。\n\n根据你的应用程序需要使用的 Android\
  \ API，你可以选择针对 2.2 之前的 Android 版本构建应用，以依赖向前兼容性；或者针对 Android 2.2 或更高版本构建应用，并将 `minSdkVersion`\
  \ 设置为你的应用将运行的最低 Android 版本。例如，如果你只需要 Android 1.6 中存在的 API，就针对 Android 1.6 构建，并使用\
  \ `FILL_PARENT` 和 `\"fill_parent\"`。你的应用应该能在包括 2.2 及更高版本在内的所有后续 Android 版本中正常运行。如果你需要\
  \ Android 2.2 或更高版本的 API，那么就针对该 Android 版本构建应用，使用 `MATCH_PARENT` 和 `\"match_parent\"\
  `，并将 `minSdkVersion` 设置为一个更早的版本，例如 `\"4\"`（对应 Android 1.6）。你仍然可以将基于 Android 2.2\
  \ 构建的 Android 应用部署到更早的 Android 版本上，但需要处理好那些在早期 Android SDK 版本中不存在的类和/或方法。有一些应对方法，比如使用反射或创建包装类来处理\
  \ Android 版本间的差异。不过我们这里不讨论这些。\n\n### 理解 Android 的通用控件\n\n我们现在开始讨论 Android SDK 中的通用控件。我们将从文本控件开始，然后讨论按钮、复选框、单选按钮、列表、网格、日期和时间控件以及地图视图控件。我们还会讨论布局控件。\n\
  \n#### 文本控件\n\n文本控件很可能是你在 Android 中最先接触到的控件类型。Android 拥有一套完整但不过于复杂的文本控件。在本节中，我们将讨论\
  \ `TextView`、`EditText`、`AutoCompleteTextView` 和 `MultiCompleteTextView` 控件。图 6-2\
  \ 展示了这些控件的实际效果。\n\n![images](img/0602.jpg)\n\n**图 6-2.** *Android 中的文本控件*\n\n\n\n\
  ##### TextView\n\n在代码清单 6–3 中，你已经看到了一个简单的`TextView`控件 XML 规范，以及在代码清单 6–4 中如何在代码中处理`TextView`。请注意我们是如何在\
  \ XML 中指定文本的 ID、宽度、高度和值的，以及我们是如何使用`setText()`方法设置值的。`TextView`控件知道如何显示文本，但不允许编辑。这可能会让你认为该控件本质上是一个虚拟标签。事实并非如此。`TextView`控件有几个有趣的属性，使其非常方便。例如，如果你知道`TextView`的内容将包含一个网页\
  \ URL 或电子邮件地址，你可以将`autoLink`属性设置为`\"email|web\"`，控件就会查找并高亮显示所有电子邮件地址和 URL。此外，当用户点击这些高亮项之一时，系统将负责启动带有该电子邮件地址的电子邮件应用程序，或带有该\
  \ URL 的浏览器。在 XML 中，此属性将位于`TextView`标签内，看起来像这样：\n\n`<TextView   ...     android:autoLink=\"\
  email|web\"    ...    />`\n\n其中，你指定一个以竖线分隔的值集合，包括`\"web\"`、`\"email\"`、`\"phone\"\
  `或`\"map\"`，或使用`\"none\"`（默认值）或`\"all\"`。如果你想在代码中设置`autoLink`行为而不是使用 XML，对应的方法是`setAutoLinkMask()`。你需要向其传递一个表示值组合的`int`，类似于前面，例如`Linkify.EMAIL_ADDRESSES|Linkify.WEB_ADDRESSES`。为了实现此功能，`TextView`使用了`android.text.util.Linkify`类。代码清单\
  \ 6–6 展示了一个使用代码实现自动链接的示例。\n\n**代码清单 6–6.** *在 TextView 的文本上使用 Linkify*\n\n```\n\
  TextView tv =(TextView)this.findViewById(R.id.tv);\ntv.setAutoLinkMask(Linkify.ALL);\n\
  tv.setText(\"请访问我的网站，http://www.androidbook.com\n或给我发邮件到 davemac327@gmail.com。\"\
  );\n```\n\n请注意，我们在设置文本之前设置了`TextView`的自动链接选项。这一点很重要，因为在设置文本之后设置自动链接选项不会影响现有文本。由于我们使用代码为文本添加超链接，因此在代码清单\
  \ 6–6 中，我们的`TextView`的 XML 不需要任何特殊属性，可以像这样简单：\n\n```\n<TextView android:id=\"@+id/tv\"\
  \ android:layout_width=\"wrap_content\"\n  android:layout_height=\"wrap_content\"\
  />\n```\n\n如果你愿意，可以调用`Linkify`类的静态`addLinks()`方法，按需查找并向任何`TextView`或任何`Spannable`的内容添加链接。除了使用`setAutoLinkMask()`，我们也可以在设置文本*之后*执行以下操作：\n\
  \n```\nLinkify.addLinks(tv, Linkify.ALL);\n```\n\n点击链接将导致为该操作调用默认意图。例如，点击网页 URL\
  \ 将启动带有该 URL 的浏览器。点击电话号码将启动电话拨号器，依此类推。`Linkify`类可以开箱即用地执行此工作。\n\n`Linkify`还可以检测你想要查找的自定义模式，判断它们是否匹配你认为需要可点击的内容，并设置如何触发意图以使点击转变为某种操作。我们在此不深入讨论这些细节，但要知道这些事情是可以做到的。\n\
  \n`TextView`还有许多需要探索的功能，从字体属性到`minLines`和`maxLines`等等。这些功能都相当不言自明，鼓励你进行实验，看看如何能够使用它们。尽管你应该记住，`TextView`类中的某些功能不适用于只读字段，但这些功能是为`TextView`的子类准备的，我们接下来将介绍其中一个子类。\n\
  \n##### EditText\n\n`EditText`控件是`TextView`的子类。顾名思义，`EditText`控件允许文本编辑。`EditText`不如你在互联网上找到的文本编辑控件那么强大，但\
  \ Android 设备的用户可能不会输入文档——他们最多输入几个段落。因此，该类的功能有限但适当，甚至可能会让你感到惊讶。例如，`EditText`最重要的属性之一是`inputType`。你可以将`inputType`属性设置为`textAutoCorrect`，让控件纠正常见的拼写错误。你可以将其设置为`textCapWords`，让控件将单词首字母大写。还有其他选项，例如仅期望电话号码或密码。\n\
  \n有一些较旧、现已废弃的指定首字母大写、多行文本和其他功能的方法。如果这些方法在没有`inputType`属性的情况下指定，它们可以被读取，但如果指定了`inputType`，则会忽略这些较旧的属性。\n\
  \n`EditText`控件旧的默认行为是在一行上显示文本，并根据需要扩展。换句话说，如果用户输入超过第一行，就会显示另一行，依此类推。但是，你可以通过将`singleLine`属性设置为`true`来强制用户使用单行。在这种情况下，用户将不得不在同一行上继续输入。使用`inputType`时，如果你不指定`textMultiLine`，`EditText`将默认只使用单行。因此，如果你想要旧的多行输入默认行为，你需要指定`inputType`为`textMultiLine`。\n\
  \n`EditText`的一个很好的特性是你可以指定提示文本。此文本会以略微褪色的方式显示，并且一旦用户开始输入文本就会消失。提示的目的是让用户知道该字段期望输入什么内容，而无需用户选择并擦除默认文本。在\
  \ XML 中，此属性是`android:hint=\"在此输入你的提示文本\"`或`android:hint=\"@string/your_hint_name\"\
  `，其中`your_hint_name`是在`/res/values/strings.xml`中找到的字符串资源名称。在代码中，你会调用`setHint()`方法，并传递一个`CharSequence`或资源\
  \ ID。\n\n\n\n### 排版后内容\n\n`AutoCompleteTextView`\n\n`AutoCompleteTextView`控件是一个具有自动完成功能的`TextView`。换句话说，当用户在`TextView`中输入时，该控件可以显示供选择的建议。清单\
  \ 6–7 演示了`AutoCompleteTextView`控件的 XML 布局和相应代码。\n\n**清单 6–7.** *使用`AutoCompleteTextView`控件*\n\
  \n```\n<AutoCompleteTextView android:id=\"@+id/actv\"\n    android:layout_width=\"\
  fill_parent\"  android:layout_height=\"wrap_content\" />\n```\n\n```\nAutoCompleteTextView\
  \ actv = (AutoCompleteTextView) this.findViewById(R.id.actv);\n```\n\n```\nArrayAdapter<String>\
  \ aa = new ArrayAdapter<String>(this,\n                android.R.layout.simple_dropdown_item_1line,\n\
                  new String[] {\"English\", \"Hebrew\", \"Hindi\", \"Spanish\", \"\
  German\", \"Greek\" });\n```\n\n```\nactv.setAdapter(aa);\n```\n\n清单 6–7 中所示的`AutoCompleteTextView`控件会向用户建议一种语言。例如，如果用户输入`en`，控件会建议`English`。如果用户输入`gr`，控件会推荐`Greek`，以此类推。\n\
  \n如果你使用过建议控件或类似的自动完成控件，就会知道这类控件由两部分组成：一个文本视图控件和一个显示建议的控件。这是基本概念。要使用这类控件，你需要创建控件、创建建议列表、告诉控件建议列表是什么，并且可能还要告诉控件如何显示这些建议。或者，你也可以为建议创建一个独立的控件，然后将这两个控件关联起来。\n\
  \n如清单 6–7 所示，Android 简化了这一过程。要使用`AutoCompleteTextView`，你可以在布局文件中定义该控件，并在 Activity\
  \ 中引用它。然后，你创建一个持有建议的适配器类，并定义将显示建议的控件 ID（在本例中是一个简单的列表项）。在清单 6–7 中，`ArrayAdapter`的第二个参数告诉适配器使用一个简单的列表项来显示建议。最后一步是使用`setAdapter()`方法将适配器与`AutoCompleteTextView`关联起来。暂时不用担心适配器的问题；本章稍后会介绍它们。\n\
  \n`MultiAutoCompleteTextView`\n\n如果你曾使用过`AutoCompleteTextView`控件，就会知道该控件只能为文本视图中的*整个*文本提供建议。换句话说，如果你输入一个句子，你不会得到每个单词的建议。这正是`MultiAutoCompleteTextView`的用武之地。你可以使用`MultiAutoCompleteTextView`在用户输入时提供建议。例如，图\
  \ 6–2 显示用户输入了单词`English`，后跟一个逗号，然后输入`Ge`，此时控件建议了`German`。如果用户继续输入，控件会提供更多建议。\n\n\
  使用`MultiAutoCompleteTextView`类似于使用`AutoCompleteTextView`。区别在于，你必须告诉控件从哪里开始重新建议。例如，在图\
  \ 6–2 中，你可以看到控件可以在句首和遇到逗号后提供建议。`MultiAutoCompleteTextView`控件要求你提供一个分词器（tokenizer），它可以解析句子并告诉控件是否应该重新开始建议。清单\
  \ 6–8 演示了如何在 XML 中以及使用 Java 代码使用`MultiAutoCompleteTextView`控件。\n\n**清单 6–8.** *使用`MultiAutoCompleteTextView`控件*\n\
  \n```\n<MultiAutoCompleteTextView android:id=\"@+id/mactv\"\n    android:layout_width=\"\
  fill_parent\"  android:layout_height=\"wrap_content\" />\n```\n\n```\nMultiAutoCompleteTextView\
  \ mactv = (MultiAutoCompleteTextView) this\n                .findViewById(R.id.mactv);\n\
  ArrayAdapter<String> aa2 = new ArrayAdapter<String>(this,\n                android.R.layout.simple_dropdown_item_1line,\n\
  new String[] {\"English\", \"Hebrew\", \"Hindi\", \"Spanish\", \"German\", \"Greek\"\
  \ });\n```\n\n```\nmactv.setAdapter(aa2);\n```\n\n```\nmactv.setTokenizer(new MultiAutoCompleteTextView.CommaTokenizer());\n\
  ```\n\n清单 6–7 和 6–8 之间唯一显著的区别在于使用了`MultiAutoCompleteTextView`以及调用了`setTokenizer()`方法。由于本例中使用了`CommaTokenizer`，当在`EditText`字段中输入逗号后，该字段将再次使用字符串数组提供建议。输入任何其他字符都不会触发该字段提供建议。因此，即使你输入`French\
  \ Spani`，部分单词`Spani`也不会触发建议，因为它没有跟在逗号后面。Android 还提供了另一个用于电子邮件地址的分词器，名为`Rfc822Tokenizer`。如果你愿意，也可以创建自己的分词器。\n\
  \n#### `Button`控件\n\n按钮在任何小部件工具集中都很常见，Android 也不例外。Android 提供了一组典型的按钮以及一些额外的按钮。在本节中，我们将讨论三种类型的按钮控件：基本按钮、图像按钮和开关按钮。图\
  \ 6–3 显示了一个包含这些控件的用户界面。顶部的按钮是基本按钮，中间的按钮是图像按钮，最后一个按钮是开关按钮。\n\n![images](img/0603.jpg)\n\
  \n**图 6–3.** *Android 按钮控件*\n\n让我们从基本按钮开始。\n\n\n\n##### 按钮控件\n\nAndroid 中最基本的按钮类是\
  \ `android.widget.Button`。这种按钮主要涉及如何处理点击事件，除此之外并没有太多复杂之处。代码清单 6-9 展示了一个 `Button`\
  \ 控件的 XML 布局片段，以及我们可能会在 Activity 的 `onCreate()` 方法中设置的一些 Java 代码。我们的基础按钮外观类似于图 6-3\
  \ 中的顶部按钮。\n\n**代码清单 6-9.** *处理按钮上的点击事件*\n\n```\n<Button android:id=\"@+id/ccbtn1\"\
  \n    android:text=\"@string/basicBtnLabel\"\n    android:layout_width=\"fill_parent\"\
  \n    android:layout_height=\"wrap_content\" />\n```\n\n```\nButton btn = (Button)this.findViewById(R.id.ccbtn1);\n\
  btn.setOnClickListener(new OnClickListener()\n{\n     public void onClick(View v)\n\
  \     {\n        Intent intent = new Intent(Intent.ACTION_VIEW,\n              \
  \                  Uri.parse(\"http://www.androidbook.com\"));\n        startActivity(intent);\n\
  \     }\n});\n```\n\n代码清单 6-9 展示了如何注册按钮点击事件。通过调用带有 `OnClickListener` 参数的 `setOnClickListener()`\
  \ 方法来注册点击事件。在代码清单 6-9 中，我们即时创建了一个匿名监听器来处理 `btn` 的点击事件。当按钮被点击时，监听器的 `onClick()` 方法会被调用，在此例中，该方法会启动浏览器访问我们的网站。\n\
  \n自 Android SDK 1.6 起，有一种更简单的方法来为一个或多个按钮设置点击处理器。代码清单 6-10 展示了 `Button` 的 XML 定义，其中为处理器指定了一个属性，以及作为点击处理器的\
  \ Java 代码。\n\n**代码清单 6-10.** *为按钮设置点击处理器*\n\n```\n<Button   ...    android:onClick=\"\
  myClickHandler\"    ...  />\n```\n\n```\n    public void myClickHandler(View target)\
  \ {\n        switch(target.getId()) {\n        case R.id.ccbtn1:\n        …\n```\n\
  \n处理器方法被调用时，`target` 参数会被设置为表示所按下按钮的 `View` 对象。请注意，点击处理器方法中的 switch 语句是如何使用按钮的资源\
  \ ID 来选择要执行的逻辑的。使用这种方法意味着你无需在代码中显式创建每个 `Button` 对象，并且可以在多个按钮之间复用同一个方法。这使得代码更易于理解和维护。这种方法也适用于其他按钮类型。但它不适用于\
  \ Android 1.5 或更低版本。你不会收到错误消息，只是点击按钮不会有任何反应。\n\n##### 图像按钮控件\n\nAndroid 通过 `android.widget.ImageButton`\
  \ 提供了图像按钮。使用图像按钮与使用基础按钮类似（参见代码清单 6-11）。我们的图像按钮看起来像图 6-3 中的中间按钮。\n\n**代码清单 6-11.**\
  \ *使用 ImageButton*\n\n```\n<ImageButton android:id=\"@+id/imageBtn\"\n    android:layout_width=\"\
  wrap_content\" android:layout_height=\"wrap_content\"\n    android:onClick=\"myClickHandler\"\
  \n    android:src=\"@drawable/icon\"  />\n```\n\n```\nImageButton btn = (ImageButton)this.findViewById(R.id.imageBtn);\n\
  btn.setImageResource(R.drawable.icon);\n```\n\n这里，我们通过 XML 创建了图像按钮，并从 drawable 资源中设置了按钮的图像。按钮的图像文件必须存在于\
  \ `/res/drawable` 目录下。在此例中，我们只是复用了 Android 图标作为按钮图像。我们还在代码清单 6-11 中展示了如何通过调用按钮的\
  \ `setImageResource()` 方法并传入资源 ID 来动态设置按钮图像。请注意，你只需要执行其中一种操作，无需同时在 XML 文件和代码中指定按钮图像。\n\
  \n图像按钮的一个优点是可以为按钮指定透明背景。结果就是得到一个可点击的图像，它像按钮一样工作，但外观可以随心所欲。\n\n由于你的图像可能与标准按钮截然不同，你可以自定义按钮在用户界面中可能处于的另外两种状态下的外观。除了正常状态，按钮还可以获得焦点和处于按下状态。*获得焦点*\
  \ 仅意味着按钮当前是事件的目标。例如，你可以使用键盘或方向键上的箭头键将焦点导向某个按钮。*按下* 则意味着按钮在被按下后、用户松开前，其外观会发生变化。为了告诉\
  \ Android 我们按钮的三个图像分别是什么，以及哪个对应哪种状态，我们需要设置一个选择器。这是一个简单的 XML 文件，位于项目的 `/res/drawable`\
  \ 文件夹中。这多少有些违反直觉，因为这是一个 XML 文件而不是图像文件，但选择器文件就必须放在那里。选择器文件的内容如代码清单 6-12 所示。\n\n**代码清单\
  \ 6-12.** *将选择器与 ImageButton 一起使用*\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"\
  ?>\n    <selector >\n     <item android:state_pressed=\"true\"\n           android:drawable=\"\
  @drawable/button_pressed\" /> <!-- 按下 -->\n     <item android:state_focused=\"true\"\
  \n           android:drawable=\"@drawable/button_focused\" /> <!-- 聚焦 -->\n    \
  \ <item android:drawable=\"@drawable/icon\" /> <!-- 默认 -->\n    </selector>\n```\n\
  \n关于选择器文件，有几点需要注意。首先，不需要像 values XML 文件那样指定 `<resources>` 标签。其次，按钮图像的顺序很重要。Android\
  \ 会依次测试选择器中的每个项，看是否匹配，我们希望只有在按钮既未被按下也未获得焦点时才使用默认图像。如果默认图像被列在第一位，它总会匹配并被选中，即使按钮处于按下或聚焦状态。当然，你引用的\
  \ drawable 资源必须存在于 `/res/drawables` 文件夹中。最后，在布局 XML 文件中对按钮的定义中，你需要将 `android:src`\
  \ 属性指向选择器 XML 文件，就像它是一个普通的 drawable 一样，例如：\n\n```\n<Button   ...    android:src=\"\
  @drawable/imagebuttonselector\"    ...   />\n```\n\n##### 开关按钮控件\n\n`ToggleButton`\
  \ 控件，如同复选框或单选按钮，是一个双状态按钮。该按钮可以处于开或关状态。如图 6-3 所示，`ToggleButton` 的默认行为是：在开状态时显示绿色条，在关状态时显示灰色条。此外，默认行为还会将按钮的文本分别设置为“On”（开）和“Off”（关）。如果\
  \ On/Off 不适用于你的应用程序，你可以修改 `ToggleButton` 的文本。例如，如果你有一个希望通过 `ToggleButton` 启动和停止的后台进程，你可以使用\
  \ `android:textOn` 和 `android:textOff` 属性将按钮的文本设置为“停止”和“运行”。\n\n代码清单 6-13 展示了一个示例。我们的开关按钮是图\
  \ 6-3 中的底部按钮，它处于开状态，因此按钮上的标签显示“停止”。\n\n**代码清单 6-13.** *Android ToggleButton*\n\n\
  ```\n<ToggleButton android:id=\"@+id/cctglBtn\"\n        android:layout_width=\"\
  wrap_content\"\n        android:layout_height=\"wrap_content\"  \n        android:text=\"\
  Toggle Button\"\n        android:textOn=\"Stop\"  \n        android:textOff=\"Run\"\
  />\n```\n\n由于 `ToggleButton` 将开和关的文本作为单独属性，`ToggleButton` 的 `android:text` 属性实际上并未被使用。它之所以可用，是因为它是继承而来的（实际上继承自\
  \ `TextView`），但在这种情况下，你不需要使用它。\n\n\n\n#### `CheckBox` 控件\n\n`CheckBox` 控件是另一种双状态按钮，允许用户切换其状态。不同之处在于，在许多情况下，用户并不将其视为能触发即时操作的按钮。然而，从\
  \ Android 的角度来看，它是一个按钮，你可以对复选框执行任何能对按钮执行的操作。\n\n在 Android 中，你可以通过创建 `android.widget.CheckBox`\
  \ 的实例来创建一个复选框。请参见**清单 6-14** 和 **图 6-4**。\n\n**清单 6-14.** *创建复选框*\n\n```\n<LinearLayout\n\
  \        android:orientation=\"vertical\" android:layout_width=\"fill_parent\"\n\
  \        android:layout_height=\"fill_parent\">\n\n<CheckBox android:id=\"@+id/chickenCB\"\
  \  android:text=\"Chicken\" android:checked=\"true\"\n    android:layout_width=\"\
  wrap_content\" android:layout_height=\"wrap_content\" />\n\n<CheckBox android:id=\"\
  @+id/fishCB\"  android:text=\"Fish\"\n    android:layout_width=\"wrap_content\"\
  \ android:layout_height=\"wrap_content\" />\n\n<CheckBox android:id=\"@+id/steakCB\"\
  \  android:text=\"Steak\" android:checked=\"true\"\n    android:layout_width=\"\
  wrap_content\" android:layout_height=\"wrap_content\" />\n\n</LinearLayout>\n```\n\
  \n![images](img/0604.jpg)\n\n**图 6-4.** *使用 CheckBox 控件*\n\n您可以通过调用 `setChecked()`\
  \ 或 `toggle()` 来管理复选框的状态。您可以通过调用 `isChecked()` 来获取状态。\n\n如果您需要在复选框被选中或取消选中时实现特定逻辑，您可以通过调用\
  \ `setOnCheckedChangeListener()` 并实现 `OnCheckedChangeListener` 接口来注册 `on-checked`\
  \ 事件。然后，您需要实现 `onCheckedChanged()` 方法，该方法将在复选框被选中或取消选中时被调用。**清单 6-15** 展示了处理 `CheckBox`\
  \ 的一些代码。\n\n**清单 6-15.** *在代码中使用 CheckBox*\n\n```\npublic class CheckBoxActivity\
  \ extends Activity {\n        /** Called when the activity is first created. */\n\
  \        @Override\n        public void onCreate(Bundle savedInstanceState) {\n\
  \            super.onCreate(savedInstanceState);\n            setContentView(R.layout.checkbox);\n\
  \n            CheckBox fishCB = (CheckBox)findViewById(R.id.fishCB);\n\n       \
  \     if(fishCB.isChecked())\n                fishCB.toggle();     // flips the\
  \ checkbox to unchecked if it was checked\n\n            fishCB.setOnCheckedChangeListener(\n\
  \                        new CompoundButton.OnCheckedChangeListener() {\n\n    \
  \            @Override\n                public void onCheckedChanged(CompoundButton\
  \ arg0, boolean isChecked) {\n                    Log.v(\"CheckBoxActivity\", \"\
  The fish checkbox is now \"\n                            + (isChecked?\"checked\"\
  :\"not checked\"));\n                }});\n        }\n}\n```\n\n设置 `OnCheckedChangeListener`\
  \ 的好处在于，你会被传递 `CheckBox` 按钮的新状态。你也可以像我们使用基本按钮那样，使用 `OnClickListener` 技术。当调用 `onClick()`\
  \ 方法时，你需要通过适当地进行类型转换并调用其 `isChecked()` 方法来自行确定按钮的新状态。类似地，**清单 6-16** 展示了如果我们在 CheckBox\
  \ 按钮的 XML 定义中添加 `android:onClick=\"myClickHandler\"` （请记住，此特性仅在 Android 1.6 及更高版本中支持），那么代码可能看起来像这样。\n\
  \n**清单 6-16.** *在代码中使用带有 `android:onClick` 的 CheckBox*\n\n```\n    public void myClickHandler(View\
  \ view) {\n        switch(view.getId()) {\n        case R.id.steakCB:\n        \
  \    Log.v(\"CheckBoxActivity\", \"The steak checkbox is now \" +\n            \
  \        (((CheckBox)view).isChecked()?\"checked\":\"not checked\"));\n        }\n\
  \    }\n```\n\n#### `RadioButton` 控件\n\n`RadioButton` 控件是任何 UI 工具包中不可或缺的一部分。单选按钮为用户提供多个选择，并强制他们选择单个项目。为了强制执行这种单选模式，单选按钮通常属于一个组，并且每个组在任何时候都强制只能选中一个项目。\n\
  \n要在 Android 中创建一组单选按钮，首先创建一个 `RadioGroup`，然后用单选按钮填充该组。**清单 6-17** 和 **图 6-5** 展示了一个示例。\n\
  \n**清单 6-17.** *使用 Android RadioButton 组件*\n\n```\n<LinearLayout\n        android:orientation=\"\
  vertical\" android:layout_width=\"fill_parent\"\n        android:layout_height=\"\
  fill_parent\">\n\n<RadioGroup     android:id=\"@+id/rBtnGrp\" android:layout_width=\"\
  wrap_content\"\n            android:layout_height=\"wrap_content\"  android:orientation=\"\
  vertical\" >\n\n    <RadioButton     android:id=\"@+id/chRBtn\" android:text=\"\
  Chicken\"\n            android:layout_width=\"wrap_content\"  android:layout_height=\"\
  wrap_content\"/>\n\n    <RadioButton  android:id=\"@+id/fishRBtn\" android:text=\"\
  Fish\" android:checked=\"true\"\n            android:layout_width=\"wrap_content\"\
  \  android:layout_height=\"wrap_content\"/>\n\n    <RadioButton android:id=\"@+id/stkRBtn\"\
  \ android:text=\"Steak\"\n            android:layout_width=\"wrap_content\"  android:layout_height=\"\
  wrap_content\"/>\n\n</RadioGroup>\n\n</LinearLayout>\n```\n\n在 Android 中，你可以使用 `android.widget.RadioGroup`\
  \ 来实现单选按钮组，并使用 `android.widget.RadioButton` 来实现单选按钮。\n\n![images](img/0605.jpg)\n\
  \n**图 6-5.** *使用单选按钮*\n\n请注意，在单选按钮组内的单选按钮默认情况下初始是未选中的，尽管你可以在 XML 定义中将一个设置为选中，就像我们上面为“Fish”所做的那样。要以编程方式将某个单选按钮设置为选中状态，你可以获取该单选按钮的引用并调用\
  \ `setChecked()`：\n\n```\nRadioButton rbtn = (RadioButton)this.findViewById(R.id.stkRBtn);\n\
  rbtn.setChecked(true);\n```\n\n你还可以使用 `toggle()` 方法来切换单选按钮的状态。与 `CheckBox` 控件一样，如果你通过实现\
  \ `OnCheckedChangeListener` 接口来调用 `setOnCheckedChangeListener()`，你会收到 `on-checked`\
  \ 或 `on-unchecked` 事件的通知。不过，这里有一个细微的区别。实际上，这次的类不同于之前。这次从技术上讲是 `RadioGroup.OnCheckedChangeListener`\
  \ 类，而之前是 `CompoundButton.OnCheckedChangeListener` 类。\n\n`RadioGroup` 也可以包含除单选按钮之外的其他视图。例如，**清单\
  \ 6-18** 在最后一个单选按钮之后添加了一个 `TextView`。另请注意，有一个单选按钮位于该单选按钮组之外。\n\n**清单 6-18.** *包含不止\
  \ `RadioButton` 的 `RadioGroup`*\n\n```\n<LinearLayout\n        android:orientation=\"\
  vertical\"  android:layout_width=\"fill_parent\"\n        android:layout_height=\"\
  fill_parent\">\n\n<RadioButton android:id=\"@+id/anotherRadBtn\"  android:text=\"\
  Outside\"\n            android:layout_width=\"wrap_content\"  android:layout_height=\"\
  wrap_content\"/>\n\n<RadioGroup android:id=\"@+id/radGrp\"\n            android:layout_width=\"\
  wrap_content\"  android:layout_height=\"wrap_content\">\n\n      <RadioButton android:id=\"\
  @+id/chRBtn\"  android:text=\"Chicken\"\n            android:layout_width=\"wrap_content\"\
  \  android:layout_height=\"wrap_content\"/>\n\n      <RadioButton android:id=\"\
  @+id/fishRBtn\"  android:text=\"Fish\"    \n            android:layout_width=\"\
  wrap_content\"  android:layout_height=\"wrap_content\"/>\n\n      <RadioButton android:id=\"\
  @+id/stkRBtn\"  android:text=\"Steak\"\n            android:layout_width=\"wrap_content\"\
  \  android:layout_height=\"wrap_content\"/>\n\n      <TextView android:text=\"My\
  \ Favorite\"\n            android:layout_width=\"wrap_content\"  android:layout_height=\"\
  wrap_content\"/>\n\n</RadioGroup>\n</LinearLayout>\n```\n\n\n\n清单 6‑18 展示了在单选组内可以放置非`RadioButton`控件。你还应该了解，单选组只能对其自身容器内的单选按钮强制实现单选功能。也就是说，ID\
  \ 为 `anotherRadBtn` 的单选按钮不会受到清单 6‑18 中所示的单选组影响，因为它不属于该单选组的子控件。\n\n你可以通过编程方式操作 `RadioGroup`。例如，可以获取单选组的引用，然后添加一个单选按钮（或其他类型的控件）。清单\
  \ 16‑19 演示了这一概念。\n\n**清单 6‑19.** *在代码中向 RadioGroup 添加 RadioButton*\n\n```java\n\
  RadioGroup radGrp = (RadioGroup)findViewById(R.id.radGrp);\nRadioButton newRadioBtn\
  \ = new RadioButton(this);\nnewRadioBtn.setText(\"猪肉\");\nradGrp.addView(newRadioBtn);\n\
  ```\n\n一旦用户在单选组内选中了一个单选按钮，就无法通过再次点击来取消选中。清除单选组内所有单选按钮的唯一方法，是通过编程方式调用 `RadioGroup`\
  \ 的 `clearCheck()` 方法。\n\n当然，你会希望利用 `RadioGroup` 实现一些有趣的功能。你大概不想逐个轮询每个 `RadioButton`\
  \ 来判断它是否被选中。幸运的是，`RadioGroup` 提供了几个方法来帮助你解决这个问题。我们通过清单 16‑20 来演示这些方法。该代码对应的 XML\
  \ 文件见清单 6‑18。\n\n**清单 6‑20.** *以编程方式使用 RadioGroup*\n\n```java\npublic class RadioGroupActivity\
  \ extends Activity {\n        protected static final String TAG = \"RadioGroupActivity\"\
  ;\n\n        /** 当 Activity 首次创建时调用。 */\n        @Override\n        public void\
  \ onCreate(Bundle savedInstanceState) {\n            super.onCreate(savedInstanceState);\n\
  \            setContentView(R.layout.radiogroup);\n\n            RadioGroup radGrp\
  \ = (RadioGroup)findViewById(R.id.radGrp);\n\n            int checkedRadioButtonId\
  \ = radGrp.getCheckedRadioButtonId();\n\n            radGrp.setOnCheckedChangeListener(new\
  \ RadioGroup.OnCheckedChangeListener() {\n                @Override\n          \
  \      public void onCheckedChanged(RadioGroup arg0, int id) {\n               \
  \     switch(id) {\n                    case -1:\n                        Log.v(TAG,\
  \ \"选择已清除！\");\n                        break;\n                    case R.id.chRBtn:\n\
  \                        Log.v(TAG, \"选择了鸡肉\");\n                        break;\n\
  \                    case R.id.fishRBtn:\n                        Log.v(TAG, \"\
  选择了鱼肉\");\n                        break;\n                    case R.id.stkRBtn:\n\
  \                        Log.v(TAG, \"选择了牛排\");\n                        break;\n\
  \                    default:\n                        Log.v(TAG, \"嗯？\");\n   \
  \                     break;\n                    }\n                }});\n    \
  \    }\n}\n```\n\n我们总能通过 `getCheckedRadioButtonId()` 获取当前选中的 `RadioButton`，该方法会返回选中项的资源\
  \ ID，如果没有任何项被选中（可能因为没有默认选项且用户尚未选择），则返回 –1。我们在之前的 `onCreate()` 方法中演示了这一用法，但在实际开发中，你需要在合适的时机用它来读取用户的当前选择。我们还可以设置一个监听器，以便在用户选中某个\
  \ `RadioButton` 时立即收到通知。请注意，`onCheckedChanged()` 方法接收一个 `RadioGroup` 参数，这允许你为多个\
  \ `RadioGroup` 使用同一个 `OnCheckedChangeListener`。你可能已经注意到了 switch 分支中的 –1 选项。当通过代码清除了\
  \ `RadioGroup` 的所有选择时，就会触发此情况。\n\n#### ImageView 控件\n\n我们尚未介绍的基本控件之一是 `ImageView`\
  \ 控件。它用于显示图像，图像可以来自文件、内容提供者或资源（如 drawable）。你甚至可以只指定一种颜色，`ImageView` 就会显示该颜色。清单 6‑21\
  \ 展示了一些 `ImageView` 的 XML 示例，以及如何通过代码创建 `ImageView`。\n\n**清单 6‑21.** *XML 和代码中的\
  \ ImageView*\n\n```xml\n  <ImageView android:id=\"@+id/image1\"\n    android:layout_width=\"\
  wrap_content\"  android:layout_height=\"wrap_content\"\n    android:src=\"@drawable/icon\"\
  \ />\n\n  <ImageView android:id=\"@+id/image2\"\n    android:layout_width=\"125dip\"\
  \  android:layout_height=\"25dip\"\n    android:src=\"#555555\" />\n\n  <ImageView\
  \ android:id=\"@+id/image3\"\n    android:layout_width=\"wrap_content\"  android:layout_height=\"\
  wrap_content\" />\n\n  <ImageView android:id=\"@+id/image4\"\n    android:layout_width=\"\
  wrap_content\"  android:layout_height=\"wrap_content\"\n    android:src=\"@drawable/manatee02\"\
  \n    android:scaleType=\"centerInside\"\n    android:maxWidth=\"35dip\"  android:maxHeight=\"\
  50dip\"\n    />\n```\n\n```java\n    ImageView imgView = (ImageView)findViewById(R.id.image3);\n\
  \n    imgView.setImageResource( R.drawable.icon );\n\n    imgView.setImageBitmap(BitmapFactory.decodeResource(\n\
  \                this.getResources(), R.drawable.manatee14) );\n\n    imgView.setImageDrawable(\n\
  \                Drawable.createFromPath(\"/mnt/sdcard/dave2.jpg\") );\n\n    imgView.setImageURI(Uri.parse(\"\
  file://mnt/sdcard/dave2.jpg\"));\n```\n\n在此示例中，我们在 XML 中定义了四个图像。第一个只是我们应用的图标。第二个是一个比高度宽的灰色条。第三个定义在\
  \ XML 中没有指定图像源，但我们有一个与之关联的 ID (`image3`)，可以在代码中使用该 ID 来设置图像。第四个图像是我们另一个 drawable\
  \ 图像文件，我们不仅指定了图像文件的来源，还设置了图像在屏幕上的最大尺寸，并定义了当图像超过最大尺寸时该如何处理。在这里，我们指示 `ImageView` 将图像居中并缩放，以使其适合我们指定的大小。\n\
  \n在清单 6‑21 的 Java 代码中，我们展示了设置 `image3` 图像的几种方法。首先，我们当然需要通过资源 ID 找到该 `ImageView`\
  \ 来获取其引用。第一个设置方法 `setImageResource()` 直接使用图像的资源 ID 来定位图像文件，为我们的 `ImageView` 提供图像。第二个设置方法使用\
  \ `BitmapFactory` 将图像资源读取到 `Bitmap` 对象中，然后将 `ImageView` 设置为该 `Bitmap`。请注意，在将 `Bitmap`\
  \ 应用于 `ImageView` 之前，我们本可以对其进行一些修改，但在这个例子中，我们直接使用了原始图像。此外，`BitmapFactory` 有多种创建\
  \ `Bitmap` 的方法，包括从字节数组和 `InputStream` 创建。你可以使用 `InputStream` 方法从网络服务器读取图像，创建 `Bitmap`\
  \ 图像，然后据此设置 `ImageView`。\n\n第三种设置方法使用 `Drawable` 作为图像源。在这里，我们展示了图像源来自 SD 卡。你需要将某种图像文件以正确的名称放置到\
  \ SD 卡上，才能使这个示例正常工作。与 `BitmapFactory` 类似，`Drawable` 类也有几种不同的方式来构造 `Drawable`，包括从\
  \ XML 流构造。\n\n最后一个设置方法接受图像文件的 URI，并将其用作图像源。对于这最后一种调用方式，请务必不要认为你可以使用任何图像 URI 作为源。此方法实际上仅适用于设备上的本地图像，不适用于你可能通过\
  \ HTTP 找到的图像。要将基于互联网的图像用作 `ImageView` 的源，你很可能会使用 `BitmapFactory` 和 `InputStream`。\n\
  \n\n\n#### 日期与时间控件\n\n日期和时间控件在许多工具包中都很常见。Android 提供了多种基于日期和时间的控件，本节将讨论其中几种，具体包括\
  \ `DatePicker`（日期选择器）、`TimePicker`（时间选择器）、`DigitalClock`（数字时钟）和 `AnalogClock`（模拟时钟）控件。\n\
  \n##### DatePicker 和 TimePicker 控件\n\n顾名思义，您可使用 `DatePicker` 控件选择日期，使用 `TimePicker`\
  \ 控件选择时间。代码清单 6–22 和 图 6–6 展示了这些控件的示例。\n\n**代码清单 6–22.** *XML 中的 DatePicker 和 TimePicker\
  \ 控件*\n\n```\n<LinearLayout\n        android:orientation=\"vertical\"\n        android:layout_width=\"\
  fill_parent\"\n        android:layout_height=\"fill_parent\">\n\n  <TextView android:id=\"\
  @+id/dateDefault\"\n    android:layout_width=\"fill_parent\" android:layout_height=\"\
  wrap_content\" />\n\n  <DatePicker android:id=\"@+id/datePicker\"\n    android:layout_width=\"\
  wrap_content\" android:layout_height=\"wrap_content\" />\n\n  <TextView android:id=\"\
  @+id/timeDefault\"\n    android:layout_width=\"fill_parent\" android:layout_height=\"\
  wrap_content\" />\n\n  <TimePicker android:id=\"@+id/timePicker\"\n    android:layout_width=\"\
  wrap_content\" android:layout_height=\"wrap_content\" />\n\n</LinearLayout>\n```\n\
  \n![images](img/0606.jpg)\n\n**图 6–6.** *DatePicker 与 TimePicker 的用户界面*\n\n查看 XML\
  \ 布局可知，定义这些控件非常简便。与 Android 工具包中的其他控件一样，您可以通过编程方式访问这些控件，以进行初始化或从中检索数据。例如，您可以像 代码清单\
  \ 6–23 所示那样初始化这些控件。\n\n**代码清单 6–23.** *分别用日期和时间初始化 DatePicker 和 TimePicker*\n\n\
  ```\n    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.datetimepicker);\n\n        TextView dateDefault\
  \ = (TextView)findViewById(R.id.dateDefault);\n        TextView timeDefault = (TextView)findViewById(R.id.timeDefault);\n\
  \n        DatePicker dp = (DatePicker)this.findViewById(R.id.datePicker);\n    \
  \    // 月份（仅月份）从零开始计数。显示时需要加 1。\n        dateDefault.setText(\"Date defaulted to\
  \ \" + (dp.getMonth() + 1) + \"/\" +\n                dp.getDayOfMonth() + \"/\"\
  \ + dp.getYear());\n        // 这里，从十二月（12）减去 1 以设置为十二月\n        dp.init(2008, 11,\
  \ 10, null);\n\n        TimePicker tp = (TimePicker)this.findViewById(R.id.timePicker);\n\
  \n        java.util.Formatter timeF = new java.util.Formatter();\n        timeF.format(\"\
  Time defaulted to %d:%02d\", tp.getCurrentHour(),\n                        tp.getCurrentMinute());\n\
  \        timeDefault.setText(timeF.toString());\n\n        tp.setIs24HourView(true);\n\
  \        tp.setCurrentHour(new Integer(10));\n        tp.setCurrentMinute(new Integer(10));\n\
  \    }\n}\n```\n\n代码清单 6–23 将 `DatePicker` 的日期设置为 2008 年 12 月 10 日。请注意，月份的内部值从零开始，即一月为\
  \ 0，十二月为 11。对于 `TimePicker`，小时和分钟数被设置为 10。另请注意，此控件支持 24 小时制显示。如果您不为这些控件设置值，则默认值将为设备的当前日期和时间。\n\
  \n最后，请注意，Android 还提供这些控件的模态窗口版本，例如 `DatePickerDialog` 和 `TimePickerDialog`。如果您想向用户显示控件并强制用户做出选择，这些控件非常有用。我们将在第\
  \ 8 章中更详细地介绍对话框。\n\n##### DigitalClock 和 AnalogClock 控件\n\nAndroid 还提供 `DigitalClock`\
  \ 和 `AnalogClock` 控件（参见图 6–7）。\n\n![images](img/0607.jpg)\n\n**图 6–7.** *使用 AnalogClock\
  \ 和 DigitalClock*\n\n如图所示，数字时钟除了显示小时和分钟外，还支持显示秒。Android 中的模拟时钟是一个双指针时钟，一个指针指示小时，另一个指针指示分钟。要将它们添加到布局中，请使用\
  \ 代码清单 6–24 所示的 XML。\n\n**代码清单 6–24.** *在 XML 中添加 DigitalClock 或 AnalogClock*\n\n\
  ```\n  <DigitalClock\n    android:layout_width=\"wrap_content\" android:layout_height=\"\
  wrap_content\" />\n\n  <AnalogClock\n    android:layout_width=\"wrap_content\" android:layout_height=\"\
  wrap_content\" />\n```\n\n这两个控件实际上仅用于显示当前时间，因为它们不允许您修改日期或时间。换句话说，它们的功能仅限于显示当前时间。因此，如果您想更改日期或时间，则需要使用\
  \ `DatePicker` / `TimePicker` 或 `DatePickerDialog` / `TimePickerDialog`。不过，这两个时钟的优点是，它们会自动更新，无需您做任何操作。也就是说，`DigitalClock`\
  \ 中的秒数会自动跳动，`AnalogClock` 中的指针会自动转动，无需我们额外干预。\n\n#### MapView 控件\n\n`com.google.android.maps.MapView`\
  \ 控件可以显示地图。您可以通过 XML 布局或代码来实例化此控件，但使用它的 Activity 必须继承 `MapActivity`。`MapActivity`\
  \ 负责处理加载地图、执行缓存等多线程请求。\n\n代码清单 6–25 展示了 `MapView` 的实例化示例。\n\n**代码清单 6–25.** *通过\
  \ XML 布局创建 MapView 控件*\n\n```\n<LinearLayout\n        android:orientation=\"vertical\"\
  \ android:layout_width=\"fill_parent\"\n        android:layout_height=\"fill_parent\"\
  >\n\n    <com.google.android.maps.MapView\n        android:layout_width=\"fill_parent\"\
  \n        android:layout_height=\"fill_parent\"\n        android:enabled=\"true\"\
  \n        android:clickable=\"true\"\n        android:apiKey=\"myAPIKey\"\n    \
  \    />\n\n</LinearLayout>\n```\n\n我们将在第 17 章讨论基于位置的服务时，详细讨论 `MapView` 控件。届时您还将学习如何获取自己的地图\
  \ API 密钥。\n\n### 理解适配器\n\n在深入探讨 Android 列表控件的细节之前，我们需要先谈谈适配器。列表控件用于显示数据集合。但 Android\
  \ 并没有使用单一类型的控件来同时管理显示和数据，而是将这两项职责分离到列表控件和适配器中。列表控件是继承自 `android.widget.AdapterView`\
  \ 的类，包括 `ListView`、`GridView`、`Spinner` 和 `Gallery`（参见图 6–8）。\n\n![images](img/0608.jpg)\n\
  \n**图 6–8.** *AdapterView 类层次结构*\n\n`AdapterView` 本身实际上继承自 `android.widget.ViewGroup`，这意味着\
  \ `ListView`、`GridView` 等是容器控件。换句话说，列表控件包含子视图的集合。适配器的目的是为 `AdapterView` 管理数据，并为其提供子视图。让我们通过研究\
  \ `SimpleCursorAdapter` 来看看这是如何工作的。\n\n\n\n#### 认识 `SimpleCursorAdapter`\n\n`SimpleCursorAdapter`\
  \ 如图 6-9 所示。\n\n![images](img/0609.jpg)\n\n**图 6-9.** *SimpleCursorAdapter*\n\n\
  这是一张非常重要、需要理解透彻的示意图。左侧是 `AdapterView`；在此示例中，它是一个由多个 `TextView` 子视图组成的 `ListView`。右侧是数据；在此示例中，它表示为从内容提供程序查询得到的数据行结果集。\n\
  \n为了将数据行映射到 `ListView`，`SimpleCursorAdapter` 需要一个子布局资源 ID。该子布局必须描述右侧那些应显示在左侧的每个数据元素的布局。这里的布局与我们为\
  \ Activity 编写的布局类似，但它只需指定 `ListView` 中单行的布局。例如，如果你从联系人内容提供程序获得了一个信息结果集，并且只想在 `ListView`\
  \ 中显示每个联系人姓名，你就需要提供一个布局来描述姓名字段的显示样式。如果你想在 `ListView` 的每一行中显示结果集中的姓名和一张图片，那么你的布局必须规定如何显示姓名和图片。\n\
  \n这并不意味着你必须为结果集中的每一个字段提供布局规范，也不意味着你必须为希望包含在 `ListView` 每一行中的每一项都在结果集中准备一个数据元素。例如，稍后我们将展示如何让\
  \ `ListView` 中包含用于选择行的复选框，而这些复选框并不需要由结果集中的数据来设置。我们还将展示如何访问结果集中不属于 `ListView` 的数据。尽管我们刚才一直在讨论\
  \ `ListView`、`TextView`、游标和结果集，但请记住，适配器的概念比这更为通用。左侧可以是图库（Gallery），右侧可以是一个简单的图片数组。不过，我们还是先保持相对简单，更详细地研究一下\
  \ `SimpleCursorAdapter`。\n\n`SimpleCursorAdapter` 的构造方法如下所示：\n\n`SimpleCursorAdapter(Context\
  \ context, int childLayout, Cursor c, String[] from, int[] to)`\n\n这个适配器将游标的一行转换为容器控件的子视图。子视图的定义在\
  \ XML 资源（`childLayout` 参数）中指定。请注意，由于游标中的一行可能包含许多列，你需要通过指定一个列名数组（使用 `from` 参数）来告知\
  \ `SimpleCursorAdapter` 你要从该行中选择哪些列。\n\n同样，由于你选择的每一列都必须映射到布局中的一个 `View`，因此你必须在 `to`\
  \ 参数中指定这些视图的 ID。你所选择的列与显示该列数据的 `View` 之间是一一对应的关系，因此 `from` 和 `to` 参数数组的元素数量必须相同。正如我们之前提到的，子视图可以包含其他类型的视图；它们不一定是\
  \ `TextView`。例如，你可以使用 `ImageView`。\n\n`ListView` 与我们的适配器之间有着精密的协作。当 `ListView` 想要显示一行数据时，它会调用适配器的\
  \ `getView()` 方法，并传入位置参数来指定要显示的数据行。适配器通过使用其构造方法中设置的布局构建相应的子视图，并从结果集中获取相应记录的数据来做出响应。因此，`ListView`\
  \ 无需处理数据在适配器端如何存在；它只需要根据需要调用子视图即可。这是一个关键点，这意味着我们的 `ListView` 不一定需要为每一行数据都创建子视图。它实际上只需要拥有与显示窗口中可见部分数量相当的子视图即可。如果只显示十行，那么技术上\
  \ `ListView` 只需要实例化十个子布局，即使我们的结果集中有数百条记录也是如此。实际上，实例化的子布局可能会超过十个，因为 Android 通常会准备一些额外的布局，以便更快地将新行显示出来。你应该得出的结论是：由\
  \ `ListView` 管理的子视图是可以被回收利用的。稍后我们会对此进行更多讨论。\n\n图 6-9 揭示了使用适配器的一些灵活性。由于列表控件使用了适配器，你可以根据数据和子视图替换各种类型的适配器。例如，如果你不打算通过内容提供程序或数据库来填充\
  \ `AdapterView`，你就不必使用 `SimpleCursorAdapter`。你可以选择一种更“简单”的适配器——`ArrayAdapter`。\n\
  \n\n\n#### 初识 `ArrayAdapter`\n\n`ArrayAdapter` 是 Android 中最简单的适配器。它专门针对列表控件设计，并假定列表项（即子视图）由\
  \ `TextView` 控件呈现。创建一个新的 `ArrayAdapter` 可以像下面这样简单：\n\n```\nArrayAdapter<String>\
  \ adapter = new ArrayAdapter<String>(this,\n                android.R.layout.simple_list_item_1,\n\
  \                new string[]{\"Dave\",\"Satya\",\"Dylan\"});\n```\n\n我们仍然需要传入上下文（即\
  \ `this`）以及一个 `childLayout` 资源 ID。不过，这次传入的不是数据字段规格组成的 `from` 数组，而是一个字符串数组作为实际数据。我们不需要传入游标或\
  \ `View` 资源 ID 组成的 `to` 数组。这里的前提是，子布局仅包含一个 `TextView`，而 `ArrayAdapter` 会将其作为数据数组中字符串的目标控件。\n\
  \n现在，我们来介绍一个用于 `childLayout` 资源 ID 的便捷技巧。我们可以利用 Android 中预定义的布局，而无需为列表项创建自己的布局文件。请注意，子布局资源\
  \ ID 的资源前缀是 `android.`。Android 会在自己的目录中查找，而不是在我们的本地 `/res` 目录中查找。你可以通过导航到 Android\
  \ SDK 文件夹，查看 `platforms/<android-version>/data/res/layout` 目录来浏览此文件夹。在那里你会找到 `simple_list_item_1.xml`，可以看到它内部定义了一个简单的\
  \ `TextView`。这个 `TextView` 就是我们的 `ArrayAdapter` 用来创建视图（在其 `getView()` 方法中），并交给 `ListView`\
  \ 使用的控件。你可以随意浏览这些文件夹，查找各种用途的预定义布局。我们稍后会用到更多这样的布局。\n\n`ArrayAdapter` 还有其他构造函数。如果\
  \ `childLayout` 不仅仅是一个简单的 `TextView`，你可以传入行布局资源 ID，以及用于接收数据的 `TextView` 的资源 ID。当你没有现成的字符串数组可传入时，可以使用\
  \ `createFromResource()` 方法。清单 6-26 展示了我们为 Spinner 创建 `ArrayAdapter` 的示例。\n\n**清单\
  \ 6-26.** 从字符串资源文件创建 `ArrayAdapter`\n\n```\n<Spinner android:id=\"@+id/spinner\"\
  \n    android:layout_width=\"wrap_content\"  android:layout_height=\"wrap_content\"\
  \ />\n\nSpinner spinner = (Spinner) findViewById(R.id.spinner);\n\nArrayAdapter<CharSequence>\
  \ adapter = ArrayAdapter.createFromResource(this,\n        R.array.planets, android.R.layout.simple_spinner_item);\n\
  \nadapter.setDropDownViewResource(android.R.layout.simple_spinner_dropdown_item);\n\
  \nspinner.setAdapter(adapter);\n\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<!--\
  \ This file is /res/values/planets.xml -->\n<resources>\n  <string-array name=\"\
  planets\">\n    <item>Mercury</item>\n    <item>Venus</item>\n    <item>Earth</item>\n\
  \    <item>Mars</item>\n    <item>Jupiter</item>\n    <item>Saturn</item>\n    <item>Uranus</item>\n\
  \    <item>Neptune</item>\n  </string-array>\n</resources>\n```\n\n清单 6-26 包含三部分内容。第一部分是\
  \ Spinner 的 XML 布局。第二部分是 Java 代码，展示了如何创建一个数据源定义于字符串资源文件中的 `ArrayAdapter`。使用这种方法不仅可以让你将列表内容外部化到\
  \ XML 文件中，还可以使用本地化版本。我们稍后会详细讨论 Spinner，目前只需知道 Spinner 有一个用于显示当前选中值的视图，以及一个用于显示可选项的列表视图。它本质上是一个下拉菜单。清单\
  \ 6-26 的第三部分是名为 `/res/values/planets.xml` 的 XML 资源文件，该文件被读取以初始化 `ArrayAdapter`。\n\
  \n值得提及的是，`ArrayAdapter` 允许对底层数据进行动态修改。例如，`add()` 方法会在数组末尾追加一个新值；`insert()` 方法会在数组中的指定位置添加一个新值；而\
  \ `remove()` 则从数组中移除一个对象。你还可以调用 `sort()` 对数组进行重新排序。当然，完成这些操作后，数据数组与 `ListView` 会不同步，因此你需要调用适配器的\
  \ `notifyDataSetChanged()` 方法。此方法会让 `ListView` 与适配器重新同步。\n\n以下列表总结了 Android 提供的适配器：\n\
  \n- `ArrayAdapter<T>`：这是一个在任意对象的泛型数组之上的适配器。旨在与 `ListView` 一起使用。\n- `CursorAdapter`：此适配器也旨在用于\
  \ `ListView`，通过游标为列表提供数据。\n- `SimpleAdapter`：顾名思义，这是一个简单的适配器。通常用于使用静态数据（可能来自资源）填充列表。\n\
  - `ResourceCursorAdapter`：此适配器扩展了 `CursorAdapter`，并且知道如何从资源创建视图。\n- `SimpleCursorAdapter`：此适配器扩展了\
  \ `ResourceCursorAdapter`，并根据游标中的列创建 `TextView`/`ImageView` 视图。这些视图在资源中定义。\n\n我们已经介绍了足够多的适配器知识，接下来可以向你展示一些使用适配器和列表控件（也称为\
  \ `AdapterView`）的实际示例了。让我们开始吧。\n\n### 将适配器与 `AdapterView` 结合使用\n\n现在你已经了解了适配器，是时候让它们为我们工作了——为列表控件提供数据。在本节中，我们将首先介绍基本的列表控件\
  \ `ListView`。然后，我们将描述如何创建你自己的自定义适配器，最后会介绍其他类型的列表控件：`GridView`、Spinner 和画廊。\n\n####\
  \ 基本列表控件：`ListView`\n\n`ListView` 控件以垂直方式显示列表项。也就是说，如果我们有多个列表项需要查看，且项目数量超出了屏幕当前可显示的范围，我们可以通过滚动来查看其余部分。使用\
  \ `ListView` 的一般方法是通过编写一个新的 Activity 来扩展 `android.app.ListActivity`。`ListActivity`\
  \ 包含一个 `ListView`，你可以通过调用 `setListAdapter()` 方法来为 `ListView` 设置数据。正如我们之前所描述的，适配器将列表控件与数据连接起来，并帮助为列表控件准备子视图。`ListView`\
  \ 中的项目可以被点击以立即执行操作，或者被选中以便后续对选中的项目集进行操作。我们将从一个非常简单的示例开始，然后逐步添加功能。\n\n\n\n#### 在\
  \ `ListView` 中显示值\n\n图 6-10 展示了最简形式的 `ListView` 控件。\n\n![images](img/0610.jpg)\n\
  \n**图 6-10.** *使用 `ListView` 控件*\n\n在本练习中，我们将用 `ListView` 填满整个屏幕，因此甚至无需在主布局 XML\
  \ 文件中指定 `ListView`。代码清单 6-27 展示了 `ListActivity` 的 Java 代码。\n\n**代码清单 6-27.** *向\
  \ `ListView` 添加条目*\n\n```\npublic class ListViewActivity extends ListActivity\n\
  {\n    @Override\n    protected void onCreate(Bundle savedInstanceState)\n    {\n\
  \        super.onCreate(savedInstanceState);\n\n        Cursor c = managedQuery(People.CONTENT_URI,\n\
  \                        null, null, null, People.NAME);\n\n        String[] cols\
  \ = new String[] {People.NAME};\n        int[]    views = new int[]   {android.R.id.text1};\n\
  \n        SimpleCursorAdapter adapter = new SimpleCursorAdapter(this,\n        \
  \                android.R.layout.simple_list_item_1,\n                        c,\
  \ cols, views);\n        this.setListAdapter(adapter);\n    }\n}\n```\n\n代码清单 6-27\
  \ 创建了一个 `ListView` 控件，并用设备上的联系人列表填充它。在我们的示例中，我们查询设备以获取联系人列表。为了演示，我们从 Contacts 中选择所有字段（即使用\
  \ `managedQuery()` 方法中的第一个 `null` 参数），并按 `People.NAME` 字段排序（使用 `managedQuery()`\
  \ 方法中的最后一个参数）。然后，我们创建一个投影（`cols`），仅选择联系人的姓名用于 `ListView`——投影定义了我们需要关注的列。接下来，我们提供对应的资源\
  \ ID 数组（`views`），将姓名列（`People.NAME`）映射到 `TextView` 控件（`android.R.id.text1`）。之后，我们创建游标适配器并设置列表的适配器。适配器类能够智能地读取数据源中的行，并提取每个联系人的姓名来填充用户界面。\n\
  \n要使其正常工作，还有一件事需要做。由于此演示访问的是手机的联系人数据库，我们需要请求权限。关于此安全主题将在第 10 章中详细讨论，现在，我们只是引导你让\
  \ `ListView` 显示出来。双击此项目的 `AndroidManifest.xml` 文件，然后点击权限标签。点击添加按钮，选择“使用权限”，然后点击确定。滚动名称列表，直到找到\
  \ `android.permission.READ_CONTACTS`。你的 Eclipse 窗口应该像图 6-11 所示。然后保存 `AndroidManifest.xml`\
  \ 文件。现在，你可以在模拟器中运行此应用。你可能需要先使用联系人应用添加一些联系人，此示例应用中才会显示姓名。\n\n你会注意到，`onCreate()` 方法没有设置\
  \ Activity 的内容视图。相反，由于基类 `ListActivity` 已经包含了一个 `ListView`，它只需要为 `ListView` 提供数据。在此示例中，我们使用了一些快捷方式，首先是我们利用了\
  \ `ListActivity` 提供主布局的特性。我们还使用了 Android 提供的布局作为子视图（资源 ID `android.R.layout.simple_list_item_1`），该布局包含一个\
  \ Android 提供的 `TextView`（资源 ID `android.R.id.text1`）。总之，设置起来相当简单。\n\n![images](img/0611.jpg)\n\
  \n**图 6-11.** *修改 `AndroidManifest.xml` 以使我们的应用正常运行*\n\n#### `ListView` 中的可点击条目\n\
  \n当然，运行此示例后，你会发现可以上下滚动列表查看所有联系人姓名，但仅此而已。如果我们想在这个示例中做一些更有趣的事情，比如当用户点击 `ListView`\
  \ 中的某个条目时启动联系人应用，该怎么办？代码清单 6-28 展示了如何修改示例以接受用户输入。\n\n**代码清单 6-28.** *在 `ListView`\
  \ 上接受用户输入*\n\n```\npublic class ListViewActivity2 extends ListActivity implements\
  \ OnItemClickListener\n{\n    @Override\n    protected void onCreate(Bundle savedInstanceState)\n\
  \    {\n        super.onCreate(savedInstanceState);\n\n        ListView lv = getListView();\n\
  \n        Cursor c = managedQuery(People.CONTENT_URI,\n                        null,\
  \ null, null, People.NAME);\n\n        String[] cols = new String[]{People.NAME};\n\
  \        int[]   views = new int[]   {android.R.id.text1};\n\n        SimpleCursorAdapter\
  \ adapter = new SimpleCursorAdapter(this,\n                android.R.layout.simple_list_item_1,\n\
  \                c, cols, views);\n        this.setListAdapter(adapter);\n     \
  \   lv.setOnItemClickListener(this);\n    }\n\n    @Override\n    public void onItemClick(AdapterView<?>\
  \ adView, View target, int position, long id) {\n        Log.v(\"ListViewActivity\"\
  , \"in onItemClick with \" + ((TextView) target).getText() +\n                \"\
  . Position = \" + position + \". Id = \" + id);\n        Uri selectedPerson = ContentUris.withAppendedId(\n\
  \                People.CONTENT_URI, id);\n        Intent intent = new Intent(Intent.ACTION_VIEW,\
  \ selectedPerson);\n        startActivity(intent);\n    }\n}\n```\n\n我们的 Activity\
  \ 现在实现了 `OnItemClickListener` 接口，这意味着当用户点击 `ListView` 中的某个内容时，我们会收到回调。正如你在 `onItemClick()`\
  \ 方法中看到的，我们会获得关于被点击项的许多信息，包括接收点击的视图、被点击项在 `ListView` 中的位置，以及根据适配器确定的项目 ID。由于我们知道\
  \ `ListView` 由 `TextView` 组成，因此在调用 `getText()` 方法获取联系人姓名之前，我们假设接收到的是 `TextView`\
  \ 并进行相应转换。位置值表示此项目相对于 `ListView` 中所有项目列表的位置，且从 0 开始。因此，列表中的第一个项目位于位置 0。\n\nID 值完全取决于适配器和数据源。在我们的示例中，我们恰好查询的是\
  \ Contacts 内容提供者，因此根据此适配器，ID 是内容提供者中记录的 `_ID`。但在其他情况下，你的数据源可能并非来自内容提供者，所以你不应认为总能像本例那样创建\
  \ URI。如果我们使用从资源 XML 文件读取值的 `ArrayAdapter`，提供给我们的 ID 很可能是数据数组中值的位置，实际上可能与位置值完全相同。\n\
  \n之前讨论 `ArrayAdapter` 时，我们提到过 `notifyDataSetChanged()` 方法，让适配器在数据发生变化时更新 `ListView`。现在用当前示例做个小实验。点击其中一个联系人，这应该会启动联系人应用。然后，编辑联系人，更改其姓名；点击完成，再点击返回按钮回到示例应用。你应该会看到\
  \ `ListView` 中该联系人的姓名已自动更新。是不是很酷？通过 `SimpleCursorAdapter` 和 Contacts 内容提供者，我们的 `ListView`\
  \ 已被自动更新。然而，使用 `ArrayAdapter` 时，你需要自己调用 `notifyDataSetChanged()` 方法。\n\n\n\n这其实相当容易实现。我们生成自己的联系人姓名`ListView`，点击姓名即可为选中人员启动联系人（Contacts）应用。但如果想先选中一组姓名，然后对该子集执行操作呢？在下一个示例应用中，我们将修改列表项的布局以包含复选框，并在用户界面中添加一个按钮，用于对选中的子集执行操作。\n\
  \n### 为`ListView`添加其他控件\n\n如果要在主布局中添加其他控件，可以提供自己的布局 XML 文件，放入一个`ListView`，并添加其他所需控件。例如，你可以在`ListView`下方添加一个按钮，用于提交对选中项目的操作，如图\
  \ 6-12 所示。\n\n![images](img/0612.jpg)\n\n**图 6-12.** *一个附加按钮，允许用户提交选中的项目*\n\n此示例的主布局在代码清单\
  \ 6-29 中，它包含了活动的用户界面定义——`ListView`和`Button`。\n\n**代码清单 6-29.** *覆盖`ListActivity`引用的`ListView`*\n\
  \n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<!-- This file is at /res/layout/list.xml\
  \ -->\n<LinearLayout\n    android:orientation=\"vertical\"\n    android:layout_width=\"\
  fill_parent\"  android:layout_height=\"fill_parent\">\n\n    <ListView android:id=\"\
  @android:id/list\"\n            android:layout_width=\"fill_parent\"  android:layout_height=\"\
  0dip\"\n            android:layout_weight=\"1\" />\n\n    <Button android:id=\"\
  @+id/btn\" android:onClick=\"doClick\"\n           android:layout_width=\"wrap_content\"\
  \  android:layout_height=\"wrap_content\"\n           android:text=\"Submit Selection\"\
  \ />\n\n</LinearLayout>\n```\n\n请注意`ListView`的 ID 指定方式。我们必须使用`\"@android:id/list\"\
  `，因为`ListActivity`期望在布局中找到具有该名称的`ListView`。如果我们依赖`ListActivity`默认创建的`ListView`，它也会具有这个\
  \ ID。\n\n另一件需要注意的事情是，我们在`LinearLayout`中指定`ListView`高度的方式。我们希望无论`ListView`中有多少项目，按钮始终显示在屏幕上，并且不希望为了找到按钮而一直滚动到页面底部。为此，我们将`layout_height`设为\
  \ 0，然后使用`layout_weight`来表明该控件应占据父容器所有可用空间。这个技巧为按钮留出了空间，同时保留了`ListView`的滚动能力。我们将在本章后面详细讨论布局和权重。\n\
  \n活动的实现如下所示，如代码清单 6-30 所示。\n\n**代码清单 6-30.** *从`ListActivity`读取用户输入*\n\n```\npublic\
  \ class ListViewActivity3 extends ListActivity\n{\n    private static final String\
  \ TAG = \"ListViewActivity3\";\n    private ListView lv = null;\n    private Cursor\
  \ cursor = null;\n    private int idCol = -1;\n    private int nameCol = -1;\n \
  \   private int notesCol = -1;\n\n    @Override\n    protected void onCreate(Bundle\
  \ savedInstanceState)\n    {\n        super.onCreate(savedInstanceState);\n    \
  \    setContentView(R.layout.list);\n\n        lv = getListView();\n\n        cursor\
  \ = managedQuery(People.CONTENT_URI,\n                        null, null, null,\
  \ People.NAME);\n\n        String[] cols = new String[]{People.NAME};\n        idCol\
  \ = cursor.getColumnIndex(People._ID);\n        nameCol = cursor.getColumnIndex(People.NAME);\n\
  \        notesCol = cursor.getColumnIndex(People.NOTES);\n\n        int[] views\
  \ = new int[]{android.R.id.text1};\n\n        SimpleCursorAdapter adapter = new\
  \ SimpleCursorAdapter(this,\n                android.R.layout.simple_list_item_multiple_choice,\n\
  \                cursor, cols, views);\n\n        this.setListAdapter(adapter);\n\
  \n        lv.setChoiceMode(ListView.CHOICE_MODE_MULTIPLE);\n    }\n```\n\n\n```java\n\
  public void doClick(View view) {\n    int count = lv.getCount();\n    SparseBooleanArray\
  \ viewItems = lv.getCheckedItemPositions();\n    for(int i = 0; i < count; i++)\
  \ {\n        if(viewItems.get(i)) {\n            cursor.moveToPosition(i);\n   \
  \         long id = cursor.getLong(idCol);\n            String name = cursor.getString(nameCol);\n\
  \            String notes = cursor.getString(notesCol);\n            Log.v(TAG,\
  \ name + \" is checked. Notes: \" + notes +\n                    \". Position =\
  \ \" + i + \". Id = \" + id);\n        }\n    }\n}\n```\n\nNow, we call `setContentView()`\
  \ again to set the UI for the activity. In setting up the adapter, we pass in another\
  \ view provided by Android for a `ListView` row (`android.R.layout.simple_list_item_multiple_choice`),\
  \ which results in each row containing a `TextView` and a `CheckBox`. If you look\
  \ inside that layout file, you will find another subclass of `TextView` called `CheckedTextView`.\
  \ This special type of `TextView` is specifically designed for `ListView`. See,\
  \ we told you there is some interesting stuff in the Android layout folder! You\
  \ will see that the `CheckedTextView` has an ID of `text1`, which is what we need\
  \ to pass in the view array to the `SimpleCursorAdapter` constructor.\n\n现在，我们再次调用`setContentView()`来设置活动的用户界面。在适配器的设置中，我们传递了另一个\
  \ Android 提供的用于`ListView`行项的视图（`android.R.layout.simple_list_item_multiple_choice`），这会使每一行包含一个`TextView`和一个`CheckBox`。如果你查看这个布局文件内部，会发现另一个`TextView`的子类，叫做`CheckedTextView`。这种特殊类型的`TextView`专门设计用于`ListView`。看吧，我们说过\
  \ Android 布局文件夹里有一些有趣的东西！你会看到`CheckedTextView`的 ID 是`text1`，这正是我们需要在视图数组中传递给`SimpleCursorAdapter`构造函数的参数。\n\
  \nBecause we want the user to be able to select rows, we set the choice mode to\
  \ `CHOICE_MODE_MULTIPLE`. By default, the choice mode is `CHOICE_MODE_NONE`. The\
  \ other alternative is `CHOICE_MODE_SINGLE`. If you want to use that choice mode\
  \ for this example, you would need to use a different layout, most likely `android.R.layout.simple_list_item_single_choice`.\n\
  \n因为我们希望用户能够选择行，所以我们将选择模式设置为`CHOICE_MODE_MULTIPLE`。默认情况下，选择模式是`CHOICE_MODE_NONE`。另一个可选值是`CHOICE_MODE_SINGLE`。如果你希望在这个示例中使用那种选择模式，则需要使用不同的布局，最可能是`android.R.layout.simple_list_item_single_choice`。\n\
  \nIn this example, we implement a basic button that calls the activity's `doClick()`\
  \ method. To keep things simple, we only want to output the names of the items that\
  \ the user selected to LogCat. The good news is that there is a very simple solution;\
  \ the bad news is that Android has evolved and the best solution depends on which\
  \ version of Android you are targeting. The `ListView` solution shown here works\
  \ from Android 1 onward (although we are using the Android 1.6 shortcut for the\
  \ button callback). As stated, the `getCheckedItemPositions()` method, while old,\
  \ still works. The returned array tells you whether an item is selected or not.\
  \ So we iterate through the array. If the corresponding row in the `ListView` is\
  \ selected, `viewItems.get(i)` returns true. Our data is accessed via a cursor.\
  \ So we don't look up data in the `ListView`; we look it up in the cursor. The `ListView`\
  \ tells us which position in the adapter to look at.\n\n在这个示例中，我们实现了一个基本按钮，它会调用活动的`doClick()`方法。为了保持简洁，我们只想将被用户选中的项的名称输出到\
  \ LogCat。好消息是解决方案非常简单；坏消息是 Android 已经进化，最佳解决方案取决于你针对的是哪个 Android 版本。这里展示的`ListView`解决方案自\
  \ Android 1 起就有效（尽管我们在按钮回调中使用了 Android 1.6 的快捷方式）。也就是说，`getCheckedItemPositions()`方法虽然古老，但仍然有效。返回值是一个数组，可以告诉你某个项是否被选中。因此我们遍历这个数组。如果`ListView`中对应的行被选中，`viewItems.get(i)`将返回`true`。我们的数据可以通过游标访问。所以我们不在`ListView`中查找数据，而是在游标中查找数据。`ListView`会告诉我们应该在适配器中的哪个位置查找。\n\
  \nWhen we get a selected position number from the `ListView`, we can use the cursor's\
  \ `moveToPosition()` method to get ready to read data. There is also a nearly identical\
  \ method, that is the `ListView`'s `getItemAtPosition()` method. In our case, the\
  \ object returned from `getItemAtPosition()` will be a `CursorWrapper` object. As\
  \ we said before, in other situations we may get other types of objects. The reason\
  \ we get a `CursorWrapper` here is because we are using a content provider. You\
  \ must know your data source and adapter to know what to expect.\n\n当我们从`ListView`获得一个已被选中的位置编号时，可以使用游标的`moveToPosition()`方法来准备读取数据。还有一个几乎相同的方法，即`ListView`的`getItemAtPosition()`方法。在我们的例子中，从`getItemAtPosition()`返回的对象将是一个`CursorWrapper`对象。正如我们之前所说，在其他情况下，可能会得到其他类型的对象。正因为我们使用的是内容提供者，所以这里才会得到`CursorWrapper`。你必须了解自己的数据源和适配器，才能知道应该期望什么。\n\
  \nThen, we can use the `Cursor` (or `CursorWrapper` if you use it) to retrieve the\
  \ data associated with the `ListView` row. Note that in our example we can retrieve\
  \ not only the contact name but also the notes, even though we never mapped notes\
  \ to the `ListView`. When we set the cursor for the adapter, we selected all available\
  \ fields. In practice, you won't need all fields, so you should limit your query\
  \ to only the fields you need. But in this example, we queried for more fields than\
  \ we needed to display in the `ListView`, so that we could easily access other fields\
  \ within the button callback.\n\n然后，我们可以使用`Cursor`（或者如果使用`CursorWrapper`的话，就用它）来检索与`ListView`行相关联的数据。注意，在我们的示例中，我们不仅可以检索联系人的姓名，还可以检索备注，即使我们从未将备注映射到`ListView`。当我们为适配器设置游标时，选择了所有可用的字段。在实践中，你不需要所有字段，因此应该将查询限制为仅使用你需要的字段。但在这个例子中，我们查询的字段多于在`ListView`中显示所需的字段，这样我们就可以在按钮回调中轻松访问其他字段。\n\
  \n##### Another Way to Read Selected Items from a ListView\n\n#### 从 ListView 读取选中项的另一种方法\n\
  \nAndroid 1.6 introduced another way to retrieve a list of selected rows from a\
  \ `ListView`: `getCheckItemIds()`. This was deprecated in Android 2.2 and replaced\
  \ with `getCheckedItemIds()`. It's a small name change, but the method works essentially\
  \ the same. Also, in Android 2.2, the way contacts are handled changed. For our\
  \ next example, we will show what this example could look like using the Android\
  \ 2.2 features. Listing 6-31 shows the Java code. For the XML layout for `list.xml`,\
  \ we can reuse the same file from Listing 6-29.\n\nAndroid 1.6 引入了另一种从`ListView`检索选中行列表的方法：`getCheckItemIds()`。随后在\
  \ Android 2.2 中，该方法被弃用，并替换为`getCheckedItemIds()`。这是一个细微的名称变化，但方法的使用方式基本相同。另外，在 Android\
  \ 2.2 中，处理联系人的方式也发生了变化。在我们的下一个示例中，我们将使用 Android 2.2 的特性来展示这个示例可能的样子。清单 6-31 显示了\
  \ Java 代码。对于`list.xml`的 XML 布局，我们可以继续使用清单 6-29 中的同一个文件。\n\n**Listing 6-31.** *Another\
  \ Way to Read User Input from a ListActivity*\n\n**清单 6-31.** *从 ListActivity 读取用户输入的另一种方法*\n\
  \n```java\npublic class ListViewActivity4 extends ListActivity\n{\n    private static\
  \ final String TAG = \"ListViewActivity4\";\n    private static final Uri CONTACTS_URI\
  \ = ContactsContract.Contacts.CONTENT_URI;\n    private SimpleCursorAdapter adapter\
  \ = null;\n    private ListView lv = null;\n\n    @Override\n    protected void\
  \ onCreate(Bundle savedInstanceState)\n    {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.list);\n\n        lv = getListView();\n\n     \
  \   String[] projection = new String[] {ContactsContract.Contacts._ID,\n       \
  \         ContactsContract.Contacts.DISPLAY_NAME};\n        Cursor c = managedQuery(CONTACTS_URI,\n\
  \                        projection, null, null, ContactsContract.Contacts.DISPLAY_NAME);\n\
  \n        String[] cols = new String[] {ContactsContract.Contacts.DISPLAY_NAME};\n\
  \        int[]    views = new int[]       {android.R.id.text1};\n\n        adapter\
  \ = new SimpleCursorAdapter(this,\n                android.R.layout.simple_list_item_multiple_choice,\n\
  \                c, cols, views);\n\n        this.setListAdapter(adapter);\n\n \
  \       lv.setChoiceMode(ListView.CHOICE_MODE_MULTIPLE);\n    }\n\n    public void\
  \ doClick(View view) {\n        if(!adapter.hasStableIds()) {\n            Log.v(TAG,\
  \ \"Data is not stable\");\n            return;\n        }\n        long[] viewItems\
  \ = lv.getCheckedItemIds();\n        for(int i=0; i<viewItems.length; i++) {\n \
  \           Uri selectedPerson = ContentUris.withAppendedId(\n                 \
  \   CONTACTS_URI, viewItems[i]);\n\n            Log.v(TAG, selectedPerson.toString()\
  \ + \" is checked.\");\n        }\n    }\n}\n```\n\nIn this sample application,\
  \ when we click the button, the callback calls the `getCheckedItemIds()` method.\
  \ Whereas in the previous example we got an array of positions of the items selected\
  \ in the `ListView`, this time we get an array of IDs of records from the adapter\
  \ that are selected in the `ListView`. We can now bypass the `ListView` and cursor,\
  \ because the IDs can be used with the content provider to do whatever we want.\
  \ In our case, we simply build a URI that represents a specific record from the\
  \ contacts content provider and write that URI to LogCat. We could also operate\
  \ on the data directly with the content provider. This technique works equally as\
  \ well with the old contacts content provider and Android 1.6's `getCheckItemIds()`\
  \ method.\n\n在这个示例应用中，当我们点击按钮时，回调会调用`getCheckedItemIds()`方法。而在上一个示例中，我们得到一个在`ListView`中被选中项的位置数组，这次我们得到一个从适配器中已在`ListView`中被选中的记录的\
  \ ID 数组。现在我们可以绕过`ListView`和游标，因为这些 ID 可以与内容提供者一起使用，来执行我们想要的任何操作。在我们的示例中，我们简单地构建了一个代表来自联系人内容提供者的特定记录的\
  \ URI，并将该 URI 写入 LogCat。我们也可以直接使用内容提供者对数据进行操作。这种技术与旧的联系人内容提供者和 Android 1.6 的`getCheckItemIds()`方法配合使用同样有效。\n\
  \nWe also did something a bit different in this example: we selected only a couple\
  \ of columns when creating the cursor. This is common practice, as you don't want\
  \ to read more data than you need. One last note: the `getCheckedItemIds()` requires\
  \ that the underlying data in the adapter be stable. For this reason, it is highly\
  \ advised that you call `hasStableIds()` on the adapter before calling `getCheckedItemIds()`\
  \ on the `ListView`. In our example, we take a shortcut and just log the fact and\
  \ return. In practice, you will want to do something smarter, such as starting a\
  \ background thread to retry and popping up a dialog indicating processing.\n\n\
  在这个示例中，我们还做了一些不同的事情：在创建游标时，只选择了几列。这是常规做法，因为你不想读取超出必要的数据。最后要指出的是，`getCheckedItemIds()`方法要求适配器中的底层数据是稳定的。因此，强烈建议在`ListView`上调用`getCheckedItemIds()`之前，先在适配器上调用`hasStableIds()`。在我们的示例中，我们采取了一个快捷方式，只是记录了这个事实并返回。实际上，你会希望做一些更智能的事情，比如启动一个后台线程进行重试，并弹出一个对话框指示正在处理中。\n\
  \n\n### 处理列表控件\n\n我们已向你展示了如何在不同场景下使用`ListView`。我们也展示了适配器为支持`ListView`所承担的大量工作。接下来，我们将介绍其他类型的列表控件，首先从`GridView`开始。\n\
  \n### GridView 控件\n\n大多数控件工具箱都会提供一个或多个基于网格的控件。Android 提供了`GridView`控件，它可以以网格形式显示数据。请注意，虽然这里我们使用了\"\
  数据\"一词，但网格的内容可以是文本、图像等。\n\n`GridView`控件以网格形式显示信息。使用`GridView`的模式是：在 XML 布局中定义网格（参见**清单\
  \ 6-32**），然后使用`android.widget.ListAdapter`将数据绑定到网格。别忘了在`AndroidManifest.xml`文件中添加`uses-permission`标签，以使此示例能够运行。\n\
  \n**清单 6-32.** *XML 布局中 GridView 的定义及关联的 Java 代码*\n\n```\n<?xml version=\"1.0\"\
  \ encoding=\"utf-8\"?>\n<!-- 此文件位于 /res/layout/gridview.xml -->\n<GridView\n   \
  \ android:id=\"@+id/dataGrid\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  fill_parent\"\n    android:padding=\"10px\"\n    android:verticalSpacing=\"10px\"\
  \n    android:horizontalSpacing=\"10px\"\n    android:numColumns=\"auto_fit\"\n\
  \    android:columnWidth=\"100px\"\n    android:stretchMode=\"columnWidth\"\n  \
  \  android:gravity=\"center\"\n    />\n\npublic class GridViewActivity extends Activity\n\
  {\n    @Override\n    protected void onCreate(Bundle savedInstanceState)\n    {\n\
  \        super.onCreate(savedInstanceState);\n        setContentView(R.layout.gridview);\n\
  \n        GridView gv = (GridView)findViewById(R.id.gridview);\n\n        Cursor\
  \ c = managedQuery(People.CONTENT_URI,\n                        null, null, null,\
  \ People.NAME);\n\n        String[] cols = new String[] {People.NAME};\n       \
  \ int[]    views = new int[]      {android.R.id.text1};\n\n        SimpleCursorAdapter\
  \ adapter = new SimpleCursorAdapter(this,\n                android.R.layout.simple_list_item_1,\n\
  \                c, cols, views);\n\n        gv.setAdapter(adapter);\n    }\n}\n\
  ```\n\n**清单 6-32** 在 XML 布局中定义了一个简单的`GridView`。然后将该网格加载到活动的内容视图中。生成的用户界面如**图 6-13**\
  \ 所示。\n\n![images](img/0613.jpg)\n\n**图 6-13.** *填充了联系人信息的 GridView*\n\n**图 6-13**\
  \ 中显示的网格展示了设备上联系人的姓名。我们选择显示一个包含联系人姓名的`TextView`，但你也可以轻松生成一个填充了图像或其他控件的网格。我们再次利用了\
  \ Android 中预定义的布局。事实上，这个示例看起来与**清单 6-27** 非常相似，但有几个重要的区别。首先，我们的`GridViewActivity`继承自`Activity`，而不是`ListActivity`。其次，我们必须调用`setContentView()`来为我们的`GridView`设置布局；没有默认视图可以回退。最后，要设置适配器，我们在`GridView`对象上调用`setAdapter()`，而不是在`Activity`上调用`setListAdapter()`。\n\
  \n你可能已经注意到，网格使用的适配器是一个`ListAdapter`。列表通常是一维的，而网格是二维的。因此我们可以得出结论：网格实际上显示的是面向列表的数据。并且事实证明，列表是按行显示的。也就是说，列表内容先排满第一行，然后排第二行，以此类推。\n\
  \n与之前一样，我们有一个列表控件与适配器协同工作，以处理数据管理和子视图的生成。我们之前使用的相同技术应该也适用于`GridView`。但有一个例外，即选择功能。在`GridView`中无法像我们在**清单\
  \ 6-30** 中那样指定多项选择。\n\n### Spinner 控件\n\n`Spinner`控件类似于下拉菜单。它通常用于从相对较短的选择列表中进行选择。如果选择列表太长而无法完全显示，系统会自动为你添加滚动条。你可以通过\
  \ XML 布局像这样简单地实例化一个`Spinner`：\n\n```\n<Spinner\n    android:id=\"@+id/spinner\"\
  \  android:prompt=\"@string/spinnerprompt\"\n    android:layout_width=\"wrap_content\"\
  \  android:layout_height=\"wrap_content\" />\n```\n\n虽然从技术上讲，spinner 是一种列表控件，但它看起来更像是一个简单的`TextView`控件。换句话说，当\
  \ spinner 处于静止状态时，只会显示一个值。Spinner 的目的是允许用户从一组预定义值中进行选择：当用户点击小箭头时，会显示一个列表，用户可以选择一个新值。填充这个列表的方式与其他列表控件相同，即通过适配器。由于\
  \ spinner 经常像下拉菜单一样使用，因此常见做法是让适配器从资源文件中获取列表选项。一个使用资源文件设置 spinner 的示例如**清单 6-33**\
  \ 所示。请注意名为`android:prompt`的新属性，用于在列表顶部设置提示文本供选择。我们 spinner 提示的实际文本位于`/res/values/strings.xml`文件中。你应该可以预料到，`Spinner`类也提供了通过代码设置提示的方法。\n\
  \n**清单 6-33.** *从资源文件创建 Spinner 的代码*\n\n```\npublic class SpinnerActivity extends\
  \ Activity {\n    /** 当活动首次创建时调用。 */\n    @Override\n    public void onCreate(Bundle\
  \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.spinner);\n\
  \n        Spinner spinner = (Spinner)findViewById(R.id.spinner);\n\n        ArrayAdapter<CharSequence>\
  \ adapter = ArrayAdapter.createFromResource(this,\n                R.array.planets,\
  \ android.R.layout.simple_spinner_item);\n\n        adapter.setDropDownViewResource(android.R.layout.simple_spinner_dropdown_item);\n\
  \n        spinner.setAdapter(adapter);\n    }\n}\n```\n\n你可能还记得在**清单 6-26** 中看到过`planets.xml`文件。我们在此示例中展示了如何创建`Spinner`控件；设置好适配器，然后将其与\
  \ spinner 关联起来。请参见**图 6-14** 了解实际效果。\n\n![images](img/0614.jpg)\n\n**图 6-14.** *用于选择行星的\
  \ Spinner*\n\n与我们之前的列表控件相比，一个区别在于处理 spinner 时，我们需要处理一个额外的布局。**图 6-14** 的左侧显示了 spinner\
  \ 的正常模式，其中显示了当前选中的项。在此例中，当前选中的是土星。在该词旁边有一个向下箭头，表示此控件是一个 spinner，可以弹出一个列表来选择不同的值。第一个布局作为参数传递给`ArrayAdapter.createFromResource()`方法，定义了\
  \ spinner 在正常模式下的外观。在**图 6-14** 的右侧，我们展示了 spinner 处于弹出列表模式时的状态，等待用户选择新值。此列表的布局通过`setDropDownViewResource()`方法设置。同样在此示例中，我们使用了\
  \ Android 提供的布局来满足这两种需求，因此如果你想查看这两个布局的定义，可以访问 Android 的`res/layout`文件夹。当然，你也可以为这两者指定自己的布局定义，以获得你想要的效果。\n\
  \n\n\n### Gallery 控件\n\n`Gallery`控件是一个水平滚动的列表控件，其焦点始终位于列表中央。该控件在触摸模式下通常用作照片画廊。您可以通过\
  \ XML 布局或代码来实例化`Gallery`：\n\n```\n<Gallery\n    android:id=\"@+id/gallery\"\n    android:layout_width=\"\
  fill_parent\"\n    android:layout_height=\"wrap_content\"\n/>\n```\n\n`Gallery`控件通常用于显示图片，因此您的适配器很可能专门用于图像处理。我们将在下一节关于自定义适配器的内容中介绍一个自定义图像适配器。从视觉上看，`Gallery`的外观如图\
  \ 6–15 所示。\n\n![images](img/0615.jpg)\n\n**图 6–15.** *一个包含海牛图片的画廊*\n\n### 创建自定义适配器\n\
  \nAndroid 中的标准适配器易于使用，但它们存在一些局限性。为了解决这个问题，Android 提供了一个名为`BaseAdapter`的抽象类，如果您需要自定义适配器，可以扩展此类。当您有特殊的数据管理需求，或者希望对子视图的显示方式有更多控制权时，可以使用自定义适配器。您也可以通过使用缓存技术来优化性能，从而使用自定义适配器。接下来我们将向您展示如何构建一个自定义适配器。\n\
  \n清单 6–34 展示了一个自定义适配器可能对应的 XML 布局和 Java 代码。在接下来的示例中，我们的适配器将处理海牛图片，因此我们将其命名为`ManateeAdapter`。我们还会在\
  \ Activity 内部创建它。\n\n**清单 6–34.** *我们的自定义适配器：ManateeAdapter*\n\n```\n<?xml version=\"\
  1.0\" encoding=\"utf-8\"?>\n<!-- 此文件位于 /res/layout/gridviewcustom.xml -->\n<GridView\n\
      android:id=\"@+id/gridview\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  fill_parent\"\n    android:padding=\"10dip\"\n    android:verticalSpacing=\"10dip\"\
  \n    android:horizontalSpacing=\"10dip\"\n    android:numColumns=\"auto_fit\"\n\
      android:gravity=\"center\"\n    />\n```\n\n```\npublic class GridViewCustomAdapter\
  \ extends Activity\n{\n    @Override\n    protected void onCreate(Bundle savedInstanceState)\n\
      {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.gridviewcustom);\n\
  \n        GridView gv = (GridView)findViewById(R.id.gridview);\n\n        ManateeAdapter\
  \ adapter = new ManateeAdapter(this);\n\n        gv.setAdapter(adapter);\n    }\n\
  \n    public static class ManateeAdapter extends BaseAdapter {\n        private\
  \ static final String TAG = \"ManateeAdapter\";\n        private static int convertViewCounter\
  \ = 0;\n        private Context mContext;\n        private LayoutInflater mInflater;\n\
  \n        static class ViewHolder {\n            ImageView image;\n        }\n\n\
          private int[] manatees = {\n                R.drawable.manatee00, R.drawable.manatee01,\
  \ R.drawable.manatee02,\n                R.drawable.manatee03, R.drawable.manatee04,\
  \ R.drawable.manatee05,\n                R.drawable.manatee06, R.drawable.manatee07,\
  \ R.drawable.manatee08,\n                R.drawable.manatee09, R.drawable.manatee10,\
  \ R.drawable.manatee11,\n                R.drawable.manatee12, R.drawable.manatee13,\
  \ R.drawable.manatee14,\n                R.drawable.manatee15, R.drawable.manatee16,\
  \ R.drawable.manatee17,\n                R.drawable.manatee18, R.drawable.manatee19,\
  \ R.drawable.manatee20,\n                R.drawable.manatee21, R.drawable.manatee22,\
  \ R.drawable.manatee23,\n                R.drawable.manatee24, R.drawable.manatee25,\
  \ R.drawable.manatee26,\n                R.drawable.manatee27, R.drawable.manatee28,\
  \ R.drawable.manatee29,\n                R.drawable.manatee30, R.drawable.manatee31,\
  \ R.drawable.manatee32,\n                R.drawable.manatee33 };\n\n        private\
  \ Bitmap[] manateeImages = new Bitmap[manatees.length];\n        private Bitmap[]\
  \ manateeThumbs = new Bitmap[manatees.length];\n\n        public ManateeAdapter(Context\
  \ context) {\n            Log.v(TAG, \"正在构造 ManateeAdapter\");\n            this.mContext\
  \ = context;\n            mInflater = LayoutInflater.from(context);\n\n            for(int\
  \ i=0; i<manatees.length; i++) {\n                manateeImages[i] = BitmapFactory.decodeResource(\n\
                          context.getResources(), manatees[i]);\n                manateeThumbs[i]\
  \ = Bitmap.createScaledBitmap(manateeImages[i],\n                        100, 100,\
  \ false);\n            }\n        }\n\n        @Override\n        public int getCount()\
  \ {\n            Log.v(TAG, \"进入 getCount()\");\n            return manatees.length;\n\
          }\n\n        public int getViewTypeCount() {\n            Log.v(TAG, \"\
  进入 getViewTypeCount()\");\n            return 1;\n        }\n```\n\n\n```java\n\
  public int getItemViewType(int position) {\n    Log.v(TAG, \"in getItemViewType()\
  \ for position \" + position);\n    return 0;\n}\n\n@Override\npublic View getView(int\
  \ position, View convertView, ViewGroup parent) {\n    ViewHolder holder;\n\n  \
  \  Log.v(TAG, \"in getView for position \" + position +\n            \", convertView\
  \ is \" +\n            ((convertView == null)?\"null\":\"being recycled\"));\n\n\
  \    if (convertView == null) {\n        convertView = mInflater.inflate(R.layout.gridimage,\
  \ null);\n        convertViewCounter++;\n        Log.v(TAG, convertViewCounter +\
  \ \" convertViews have been created\");\n\n        holder = new ViewHolder();\n\
  \        holder.image = (ImageView) convertView.findViewById(R.id.gridImageView);\n\
  \n        convertView.setTag(holder);\n    } else {\n        holder = (ViewHolder)\
  \ convertView.getTag();\n    }\n\n    holder.image.setImageBitmap( manateeThumbs[position]\
  \ );\n\n    return convertView;\n}\n\n@Override\npublic Object getItem(int position)\
  \ {\n    Log.v(TAG, \"in getItem() for position \" + position);\n    return manateeImages[position];\n\
  }\n\n@Override\npublic long getItemId(int position) {\n    Log.v(TAG, \"in getItemId()\
  \ for position \" + position);\n    return position;\n}\n```\n\n当你运行这个应用时，应该会看到类似图\
  \ 6–16 的显示效果。\n\n![images](img/0616.jpg)\n\n**图 6–16.** *展示海牛图像的网格视图*\n\n这个示例虽然看起来相对简单，但有很多需要解释的地方。我们将从`Activity`类开始，它和我们在本章这一部分一直在使用的类非常相似。`gridviewcustom.xml`中有一个主布局，仅包含一个`GridView`定义。我们需要从布局内部获取对`GridView`的引用，因此我们定义并设置了`gv`。我们实例化`ManateeAdapter`，将上下文传递给它，并在`GridView`上设置适配器。到目前为止，这些都是相当标准的操作，尽管你肯定已经注意到，我们的自定义适配器在创建时使用的参数远少于预定义适配器。这主要是因为我们对这个特定的适配器拥有完全的控制权，并且它仅用于这个应用。如果我们希望让这个适配器更通用，我们很可能会设置更多参数。但让我们继续往下看。\n\
  \n在适配器内部，我们的工作是管理将数据传递到 Android 的`View`对象中。这些`View`对象将被列表控件（此处为`GridView`）使用。数据来自某个数据源。在之前的示例中，数据是通过传递给适配器的游标对象传入的。而在我们的自定义案例中，适配器完全了解数据及其来源。列表控件会向适配器请求信息，以便知道如何构建用户界面。同时，当适配器持有不再需要的视图时，列表控件也会足够友好地将这些视图传入以供回收。想到适配器必须知道如何构建视图，可能有点奇怪，但最终这一切都是合理的。\n\
  \n当我们实例化自定义适配器`ManateeAdapter`时，习惯做法是传入上下文，并让适配器持有它。在需要时能够访问上下文通常非常有用。我们要在适配器中做的第二件事是获取并持有`inflater`。这有助于在需要创建新视图以返回给列表控件时提升性能。适配器中第三件典型的事情是创建一个`ViewHolder`对象，用于容纳我们管理的数据所对应的`View`对象。在这个示例中，我们只简单地存储了一个`ImageView`，但如果我们需要处理其他字段，我们会将它们添加到`ViewHolder`的定义中。例如，如果有一个`ListView`，每一行包含一个`ImageView`和两个`TextView`，那么我们的`ViewHolder`就会包含一个`ImageView`和两个`TextView`。\n\
  \n由于在这个适配器中我们处理的是海牛的图像，我们在构造过程中设置了一个图像资源 ID 数组，用于创建位图。我们还定义了一个位图数组，作为我们的数据列表。\n\n\
  从`ManateeAdapter`的构造函数可以看出，我们保存了上下文，创建并持有了`inflater`，然后遍历图像资源 ID，构建了一个位图数组。这个位图数组将作为我们的数据。\n\
  \n正如你之前所学到的，设置适配器会导致我们的`GridView`调用适配器上的方法，以便用要显示的数据进行自我配置。例如，`gv`会调用适配器的`getCount()`方法来确定有多少个对象需要显示。它还会调用`getViewTypeCount()`方法来确定`GridView`中可以显示多少种不同类型的视图。在本示例中，我们将此值设为\
  \ 1。然而，如果我们有一个`ListView`并且希望在常规数据行之间插入分隔线，那么我们会有两种类型的视图，并且需要从`getViewTypeCount()`返回\
  \ 2。你可以根据需要设置任意数量的不同视图类型，只要从这个方法返回正确的计数即可。与这个方法相关的是`getItemViewType()`。我们刚刚提到，适配器可以返回多种类型的视图。但为了简单起见，`getItemViewType()`只需返回一个整数值，以指示在数据的特定位置上属于哪种视图类型。因此，如果我们有两种类型的视图需要返回，`getItemViewType()`需要返回\
  \ 0 或 1 来指示类型。如果有三种类型，则该方法需要返回 0、1 或 2。\n\n如果我们的适配器在`ListView`中处理分隔线，那么它必须将分隔线视为数据。这意味着数据中的某个位置被分隔线占据。当列表控件调用`getView()`来获取该位置对应的视图时，`getView()`需要返回一个分隔线视图而不是常规数据视图。而当在`getItemViewType()`中被问及该位置的视图类型时，我们需要返回我们已确定的与该视图类型匹配的整数值。如果使用分隔线，你应该做的另一件事是实现`isEnabled()`方法。对于列表项，该方法应返回`true`；对于分隔线，应返回`false`，因为分隔线不应被选中或点击。\n\
  \n`ManateeAdapter`中最重要的方法是`getView()`方法调用。一旦`gv`确定了可用的项目数量，它就开始请求数据。现在，我们可以讨论视图回收了。列表控件只能在显示屏上显示与屏幕空间相匹配的子视图数量。这意味着没有必要为适配器中的每条数据都调用`getView()`；只有在需要显示多少个项目时才调用`getView()`才是有意义的。随着`gv`从适配器获取子视图，它正在确定屏幕上能容纳多少个视图。一旦显示屏被子视图填满，`gv`就可以停止调用`getView()`。\n\
  \n\n在启动此示例应用后查看 `LogCat`，你会看到各种调用，但也会发现 `getView()` 在请求完所有图片之前就停止了调用。如果你开始在 `GridView`\
  \ 中上下滚动，就会在 `LogCat` 中看到更多对 `getView()` 的调用，并且会注意到：一旦创建了特定数量的子视图，`getView()` 被调用时\
  \ `convertView` 就会设置为某个非空值。这意味着我们正在回收子视图——这对性能非常有利。\n\n如果在 `getView()` 中从 `gv` 获取到非空的\
  \ `convertView` 值，说明 `gv` 正在回收该视图。通过复用传入的视图，我们避免了重新解析 XML 布局，也无需重新查找 `ImageView`。通过将\
  \ `ViewHolder` 对象与我们返回的 `View` 关联起来，下次视图回收时我们可以更快地完成复用操作。在 `getView()` 中，我们只需要重新获取\
  \ `ViewHolder` 并将正确的数据分配到视图中即可。\n\n在这个示例中，我们想展示视图中的数据不一定与原始数据完全一致。`createScaledBitmap()`\
  \ 方法是为显示目的创建数据缩略版本。关键在于我们的列表控件不会调用 `getItem()` 方法。当用户对列表控件操作时，其他需要处理数据的代码才会调用此方法。再次强调，对于任何适配器，理解其工作原理至关重要。你不应盲目依赖适配器\
  \ `getView()` 创建的列表控件视图数据。有时需要调用适配器的 `getItem()` 方法来获取实际待操作的数据；有时（如之前的 `ListView`\
  \ 示例）则需要通过游标获取数据。这完全取决于适配器的类型以及数据的最终来源。虽然我们在示例中使用了 `createScaledBitmap()` 方法，但 Android\
  \ 2.2 引入了另一个可能更适用的类：`ThumbnailUtils`。该类包含一些从位图和视频生成缩略图的静态方法。\n\n本示例最后需要指出的是 `getItemId()`\
  \ 方法的调用。在之前结合 `ListView` 和联系人的示例中，项目 ID 来自内容提供器的 `_ID` 值。而在此示例中，我们只需使用位置作为项目 ID\
  \ 即可。项目 ID 的核心意义在于提供一种独立于位置引用数据的机制——当数据在适配器之外（如联系人数据）具有独立生命周期时尤其重要。当我们能像管理海牛图片这样直接控制数据，并且知道如何在应用中获取实际数据时，通常会将位置直接用作项目\
  \ ID。鉴于我们甚至不允许添加或删除数据，这种快捷方式在本例中尤为合适。\n\n### Android 中的其他控件\n\nAndroid 提供了大量可供使用的控件。我们已经介绍了不少控件，后续章节还将介绍更多（例如第\
  \ 17 章的 `MapView`、第 19 章的 `VideoView` 和 `MediaController`，以及第 20 章的 `GLSurfaceView`）。你会发现其他控件由于都继承自\
  \ `View`，与我们已介绍的控件有许多共通之处。这里仅简要提及几个值得自行探索的控件。\n\n`ScrollView` 是一个用于设置带垂直滚动条视图容器的控件。当内容过多无法单屏显示时会非常实用。请参阅本章“参考资料”部分中\
  \ Romain Guy 关于该控件用法的博客链接。\n\n`ProgressBar` 和 `RatingBar` 控件类似于滑块：前者用于直观显示操作进度（如文件下载或音乐播放），后者则显示星级评分。\n\
  \n`Chronometer` 控件是一个正向计时的计时器。如果你需要显示倒计时，可以使用 `CountDownTimer` 类，但它并非 `View` 类。\n\
  \n`WebView` 是一个用于显示 HTML 的特殊视图。其功能远不止于此，还包括处理 Cookie、JavaScript 以及链接应用程序中的 Java\
  \ 代码。但在应用内实现网页浏览器之前，建议优先考虑直接调用设备自带的浏览器来完成繁重任务。\n\n本章的控件介绍到此结束。接下来我们将讨论用于修改控件外观和感觉的样式与主题，然后介绍用于在屏幕上排列控件的布局。\n\
  \n### 样式与主题\n\nAndroid 提供了多种修改应用中视图样式的方法。首先介绍在字符串中使用标记标签，然后介绍如何使用可扩展文本（Spannable）改变文本的具体视觉属性。但如果你想通过多个视图或整个\
  \ Activity/应用的共同规范来控制外观呢？我们将讨论 Android 的样式和主题来向你展示具体方法。\n\n\n\n#### 使用样式\n\n有时，您希望高亮或设置`View`内容某部分的样式。这可以通过静态或动态方式实现。静态方式下，您可以直接对字符串资源中的文本应用标记，例如：\n\
  \n`<string name=\"styledText\"><i>静态</i>样式在<b>TextView</b>中。</string>`\n\n然后，您可以在\
  \ XML 或代码中引用它。请注意，在字符串资源中可以使用以下 HTML 标签：`<i>`（斜体）、`<b>`（粗体）和`<u>`（下划线），以及`<sup>`（上标）、`<sub>`（下标）、`<strike>`（删除线）、`<big>`（大号）、`<small>`（小号）和`<monospace>`（等宽字体）。您甚至可以嵌套这些标签，例如，实现小号上标的效果。这不仅在`TextView`中有效，在其他视图（如按钮）中同样适用。图\
  \ 6–17 展示了使用本节中的多个示例后，样式化和主题化文本的效果。\n\n![images](img/0617.jpg)\n\n**图 6–17.** *样式和主题示例*\n\
  \n以编程方式设置`TextView`控件内容的样式需要额外的工作，但提供了更大的灵活性（参见代码清单 6–35），因为它可以在运行时进行样式设置。不过，这种灵活性只能应用于\
  \ `Spannable` 对象，`EditText` 通常使用它来管理内部文本，而 `TextView` 通常不使用 `Spannable`。`Spannable`\
  \ 本质上是一个可以应用样式的 `String`。要让 `TextView` 将文本存储为 `Spannable`，可以这样调用 `setText()`：\n\n\
  `tv.setText(\"这段文本存储在 Spannable 中\", TextView.BufferType.SPANNABLE);`\n\n然后，当您调用\
  \ `tv.getText()` 时，将获得一个 `Spannable` 对象。\n\n如代码清单 6–35 所示，您可以获取 `EditText` 的内容（作为\
  \ `Spannable` 对象），然后为文本的部分内容设置样式。该清单中的代码将文本样式设置为粗体和斜体，并将背景设置为红色。您可以使用所有与之前描述的 HTML\
  \ 标签对应的样式选项，甚至更多。\n\n**代码清单 6–35.** *动态地为 EditText 的内容应用样式*\n\n```\nEditText et\
  \ =(EditText)this.findViewById(R.id.et);\net.setText(\"动态设置 EditText 内容的样式\");\n\
  Spannable spn = (Spannable) et.getText();\nspn.setSpan(new BackgroundColorSpan(Color.RED),\
  \ 0, 7,\n             Spannable.SPAN_EXCLUSIVE_EXCLUSIVE);\nspn.setSpan(new StyleSpan(android.graphics.Typeface.BOLD_ITALIC),\n\
               0, 7, Spannable.SPAN_EXCLUSIVE_EXCLUSIVE);\n```\n\n这两种样式设置技术仅适用于它们被应用到的单个视图。Android\
  \ 提供了一种样式机制来定义可在多个视图之间复用的通用样式，以及一种主题机制，该机制通常将样式应用于整个 Activity 或整个应用程序。首先，我们需要讨论样式。\n\
  \n*样式（style）* 是一组具有名称的 `View` 属性的集合，因此您可以通过名称引用该集合，并将该样式按名称分配给视图。例如，代码清单 6–36 显示了一个保存在\
  \ `/res/values` 目录下的资源 XML 文件，我们可以用它来处理所有错误消息。\n\n**代码清单 6–36.** *定义可跨多个视图使用的样式*\n\
  \n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<resources>\n    <style name=\"\
  ErrorText\">\n        <item name=\"android:layout_width\">fill_parent</item>\n        <item\
  \ name=\"android:layout_height\">wrap_content</item>\n        <item name=\"android:textColor\"\
  >#FF0000</item>\n        <item name=\"android:typeface\">monospace</item>\n    </style>\n\
  </resources>\n```\n\n这里定义了视图的大小以及字体颜色（红色）和字体。请注意，`item` 标签的 `name` 属性正是我们在布局 XML\
  \ 文件中使用的 XML 属性名，而 `item` 标签的值不再需要双引号。现在，我们可以将此样式用于错误显示的 `TextView`，如代码清单 6–37 所示。\n\
  \n**代码清单 6–37.** *在视图中使用样式*\n\n```\n<TextView  android:id=\"@+id/errorText\n    style=\"\
  @style/ErrorText\"\n    android:text=\"No errors at this time\"\n    />\n```\n\n\
  需要特别注意的是，此 `View` 定义中 `style` 属性的名称并不以 `android:` 开头。请注意这一点，因为除 `style` 之外，其他所有属性似乎都使用了\
  \ `android:` 前缀。当您的应用程序中有许多视图共享一个样式时，在一个地方更改该样式会简单得多；您只需修改该资源文件中的样式属性即可。当然，您可以为各种控件创建许多不同的样式。例如，按钮可以共享一个通用样式，该样式与菜单文本的通用样式不同。\n\
  \n样式的一个非常棒的特性是，您可以为其建立层次结构。我们可以基于 `ErrorText` 样式定义一个新的样式，用于非常严重的错误消息。代码清单 6–38 展示了可能的效果。\n\
  \n**代码清单 6–38.** *从父样式定义样式*\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n\
  <resources>\n    <style name=\"ErrorText.Danger\" >\n        <item name=\"android:textStyle\"\
  >bold</item>\n    </style>\n</resources>\n```\n\n这个例子表明，我们可以简单地使用父样式名称作为新样式名称的前缀来命名子样式。因此，`ErrorText.Danger`\
  \ 是 `ErrorText` 的子样式，并继承了父样式的所有样式属性。然后，它添加了一个新的 `textStyle` 属性。这个过程可以不断重复，以创建一整套样式树。\n\
  \n与适配器布局的情况一样，Android 也提供了大量可供我们使用的样式。要指定一个 Android 提供的样式，请使用如下语法：\n\n`style=\"\
  @android:style/TextAppearance\"`\n\n此样式设置了 Android 中文本的默认样式。要找到主 Android 的 `styles.xml`\
  \ 文件，请访问 `Android SDK/platforms/<android-version>/data/res/values/` 文件夹。在此文件中，您会发现很多现成的样式供您使用或扩展。关于扩展\
  \ Android 提供的样式，有一条提示：之前使用前缀的方法不适用于 Android 提供的样式。相反，您必须使用 style 标签的 `parent` 属性，如下所示：\n\
  \n`<style name=\"CustomTextAppearance\" parent=\"@android:style/TextAppearance\"\
  >`\n`    <item  ... 此处放置您的扩展项 ...    />`\n`</style>`\n\n您不必总是在视图中引入整个样式。您也可以选择只借用样式的一部分。例如，如果您想将\
  \ `TextView` 中文本的颜色设置为系统样式颜色，可以这样做：\n\n```\n<EditText id=\"@+id/et2\"\n    android:layout_width=\"\
  fill_parent\"  android:layout_height=\"wrap_content\"\n    android:textColor=\"\
  ?android:textColorSecondary\"\n    android:text=\"@string/hello_world\" />\n```\n\
  \n请注意，在此示例中，`textColor` 属性值的开头是 `?` 字符，而不是 `@` 字符。使用 `?` 字符是为了让 Android 知道要在当前主题中查找样式值。因为我们看到了\
  \ `?android`，所以 Android 会在系统主题中查找此样式值。\n\n\n\n#### 使用主题\n\n样式存在一个问题：你需要为每个希望应用样式的视图定义添加\
  \ `style=\"@style/...\"` 属性规范。如果你希望某些样式元素应用于整个 Activity 或整个应用程序，则应改用主题。*主题*实际上是广泛应用的样式，但就定义主题而言，它与样式完全相同。事实上，主题和样式在很大程度上可以互换，因为你可以将主题扩展为样式，或将样式作为主题引用。通常，只有名称会提示某个样式是打算作为样式还是主题使用。\n\
  \n要为 Activity 或应用程序指定主题，你需要为项目中的 `AndroidManifest.xml` 文件中的 `<activity>` 或 `<application>`\
  \ 标签添加一个属性。代码可能如下所示：\n\n```\n<activity android:theme=\"@style/MyActivityTheme\"\
  >\n```\n\n```\n<application android:theme=\"@style/MyApplicationTheme\">\n```\n\n\
  ```\n<application android:theme=\"@android:style/Theme.NoTitleBar\">\n```\n\n你可以在与\
  \ Android 提供的样式相同的文件夹中找到 Android 提供的主题，这些主题位于名为 `themes.xml` 的文件中。查看主题文件时，你会看到定义了大量样式，其名称以\
  \ `\"Theme\"` 开头。你还会注意到，在 Android 提供的主题和样式中，存在大量的扩展关系，这就是为什么你会看到诸如 `\"Theme.Dialog.AppError\"\
  ` 这样的样式名称。\n\n至此，我们对 Android 控件集的讨论就结束了。正如我们在本章开头提到的，在 Android 中构建用户界面需要掌握两件事：控件集和布局管理器。在下一节中，我们将讨论\
  \ Android 布局管理器。\n\n### 理解布局管理器\n\nAndroid 提供了一系列充当视图容器的视图类。这些容器类被称为*布局*（或*布局管理器*），每个类都实现了一种特定的策略来管理其子视图的大小和位置。例如，`LinearLayout`\
  \ 类将其子视图水平或垂直地依次排列。所有布局管理器都派生自 `View` 类，因此你可以将一个布局管理器嵌套在另一个布局管理器中。\n\nAndroid SDK\
  \ 附带的布局管理器在表 6-2 中定义。\n\n**表 6-2.** *Android 布局管理器*\n\n| **布局管理器** | **描述** |\n\
  | --- | --- |\n| `LinearLayout` | 将其子视图水平或垂直排列 |\n| `TableLayout` | 将其子视图以表格形式排列\
  \ |\n| `RelativeLayout` | 将其子视图相对于彼此或相对于父容器排列 |\n| `FrameLayout` | 允许你动态更改布局中的控件\
  \ |\n\n我们将在后续章节中讨论这些布局管理器。名为 `AbsoluteLayout` 的布局管理器已被弃用，本书将不再介绍。\n\n#### LinearLayout\
  \ 布局管理器\n\n`LinearLayout` 布局管理器是最基础的。此布局管理器根据 `orientation` 属性的值将其子视图水平或垂直排列。到目前为止，我们已经在几个示例中使用了\
  \ `LinearLayout`。代码清单 6-39 展示了一个水平配置的 `LinearLayout`。\n\n**代码清单 6-39.** *水平配置的 LinearLayout*\n\
  \n```\n<LinearLayout\n    android:orientation=\"horizontal\"\n    android:layout_width=\"\
  fill_parent\"  android:layout_height=\"wrap_content\">\n\n    <!-- 在此处添加子视图 -->\n\
  \n</LinearLayout>\n```\n\n你可以通过将 `orientation` 的值设置为 `vertical` 来创建垂直方向的 `LinearLayout`。由于布局管理器可以嵌套，例如，你可以构建一个垂直布局管理器，其中包含水平布局管理器，以创建一个填写表单，其中每一行都有一个标签和一个\
  \ `EditText` 控件。每一行都是自己的水平布局，但所有行作为一个集合则按垂直方向排列。\n\n\n\n##### 理解权重与重力\n\n`orientation`\
  \ 属性是 `LinearLayout` 布局管理器识别的第一个重要属性。其他能影响子控件大小和位置的重要属性包括权重和重力。你可以使用*权重*为一个控件分配相对于容器中其他控件的重要性。假设一个容器有三个控件：一个的权重为\
  \ 1，其他两个的权重为 0。在这种情况下，权重等于 1 的控件将占据容器中的空白空间。*重力*本质上是对齐方式。例如，如果你想将标签的文本右对齐，可以将其重力设置为\
  \ `right`。`gravity` 属性有多个可能的值，包括 `left`、`center`、`right`、`top`、`bottom`、`center_vertical`、`clip_horizontal`\
  \ 等。有关这些值以及其他重力值的详细信息，请参阅“参考资料”部分中的网页。\n\n**注意：** 布局管理器继承自 `android.widget.ViewGroup`，许多基于控件的容器类（如\
  \ `ListView`）也是如此。尽管布局管理器和基于控件的容器继承自同一个类，但布局管理器类严格处理控件的大小和位置，而不涉及用户与子控件的交互。例如，比较\
  \ `LinearLayout` 和 `ListView` 控件。在屏幕上，它们看起来相似，因为两者都可以垂直排列子元素。但是 `ListView` 控件提供了供用户进行选择的\
  \ API，而 `LinearLayout` 则没有。换句话说，基于控件的容器（`ListView`）支持用户与容器中的项目进行交互，而布局管理器（`LinearLayout`）只负责大小和定位。\n\
  \n现在让我们看一个涉及权重和重力属性的示例（见图 6–18）。\n\n![images](img/0618.jpg)\n\n**图 6–18.** *使用 LinearLayout\
  \ 布局管理器*\n\n图 6–18 展示了三种利用 `LinearLayout` 的用户界面，它们使用了不同的权重和重力设置。左侧的 UI 使用了权重和重力的默认设置。第一个用户界面的\
  \ XML 布局如代码清单 6–40 所示。\n\n**代码清单 6–40.** *在 LinearLayout 中垂直排列的三个文本字段，使用权重和重力的默认值*\n\
  \n```\n<LinearLayout\n    android:orientation=\"vertical\" android:layout_width=\"\
  fill_parent\"\n    android:layout_height=\"fill_parent\">\n\n    <EditText android:layout_width=\"\
  fill_parent\"\n        android:layout_height=\"wrap_content\"\n        android:text=\"\
  one\"/>\n    <EditText android:layout_width=\"fill_parent\"\n        android:layout_height=\"\
  wrap_content\"\n        android:text=\"two\"/>\n    <EditText android:layout_width=\"\
  fill_parent\"\n        android:layout_height=\"wrap_content\"\n        android:text=\"\
  three\"/>\n</LinearLayout>\n```\n\n图 6–18 中间的 UI 使用了权重的默认值，但将容器中控件的 `android:gravity`\
  \ 分别设置为 `left`、`center` 和 `right`。最后一个示例将中间组件的 `android:layout_weight` 属性设置为 1.0，并将其他组件的权重保持为默认值\
  \ 0.0（见代码清单 6–41）。通过将中间组件的权重属性设置为 1.0，并将其他两个组件的权重属性保留为 0.0，我们指定了中间组件应占据容器中所有剩余的空白空间，而其他两个组件应保持其理想大小。\n\
  \n类似地，如果你希望容器中的三个控件中有两个共享剩余的空白空间，可以将这两个控件的权重设置为 1.0，并将第三个控件保留为 0.0。最后，如果你希望三个组件均分空间，可以将它们的所有权重值都设置为\
  \ 1.0。这样做会使每个文本字段均匀扩展。\n\n**代码清单 6–41.** *带权重配置的 LinearLayout*\n\n```\n<LinearLayout\n\
  \    android:orientation=\"vertical\" android:layout_width=\"fill_parent\"\n   \
  \ android:layout_height=\"fill_parent\">\n\n    <EditText android:layout_width=\"\
  fill_parent\" android:layout_weight=\"0.0\"\n    android:layout_height=\"wrap_content\"\
  \ android:text=\"one\"\n    android:gravity=\"left\"/>\n\n    <EditText android:layout_width=\"\
  fill_parent\" android:layout_weight=\"1.0\"\n    android:layout_height=\"wrap_content\"\
  \ android:text=\"two\"\n    android:gravity=\"center\"/>\n\n    <EditText android:layout_width=\"\
  fill_parent\" android:layout_weight=\"0.0\"\n    android:layout_height=\"wrap_content\"\
  \ android:text=\"three\"\n    android:gravity=\"right\"\n    />\n</LinearLayout>\n\
  ```\n\n##### `android:gravity` 与 `android:layout_gravity` 的区别\n\n请注意，Android 定义了两个相似的重力属性：`android:gravity`\
  \ 和 `android:layout_gravity`。区别如下：`android:gravity` 是视图使用的设置，而 `android:layout_gravity`\
  \ 是容器（`android.view.ViewGroup`）使用的设置。例如，你可以将 `android:gravity` 设置为 `center`，以使 `EditText`\
  \ 中的文本在控件内居中。类似地，你可以通过设置 `android:layout_gravity=\"right\"` 将 `EditText` 对齐到 `LinearLayout`（容器）的最右侧。请参见图\
  \ 6–19 和代码清单 6–42。\n\n![images](img/0619.jpg)\n\n**图 6–19.** *应用重力设置*\n\n**代码清单\
  \ 6–42.** *理解 `android:gravity` 和 `android:layout_gravity` 的区别*\n\n```\n<LinearLayout\n\
  \    android:orientation=\"vertical\" android:layout_width=\"fill_parent\"\n   \
  \ android:layout_height=\"fill_parent\">\n\n    <EditText android:layout_width=\"\
  wrap_content\" android:gravity=\"center\"\n    android:layout_height=\"wrap_content\"\
  \ android:text=\"one\"\n android:layout_gravity=\"right\"/>\n</LinearLayout>\n```\n\
  \n如图 6–19 所示，文本在 `EditText` 中居中，而该 `EditText` 则对齐到 `LinearLayout` 的右侧。\n\n\n\n####\
  \ TableLayout 布局管理器\n\n`TableLayout` 布局管理器是 `LinearLayout` 的扩展。此布局管理器将其子控件组织成行和列。代码清单\
  \ 6-43 显示了一个示例。\n\n**代码清单 6-43.** *一个简单的 TableLayout*\n\n```\n<?xml version=\"1.0\"\
  \ encoding=\"utf-8\"?>\n<TableLayout\n    android:layout_width=\"fill_parent\" \
  \ android:layout_height=\"fill_parent\">\n\n  <TableRow>\n    <TextView android:text=\"\
  名字:\"\n        android:layout_width=\"wrap_content\"  android:layout_height=\"wrap_content\"\
  \ />\n\n    <EditText android:text=\"爱伦\"\n        android:layout_width=\"wrap_content\"\
  \  android:layout_height=\"wrap_content\" />\n  </TableRow>\n\n  <TableRow>\n  \
  \  <TextView android:text=\"姓氏:\"\n        android:layout_width=\"wrap_content\"\
  \  android:layout_height=\"wrap_content\" />\n\n    <EditText android:text=\"坡\"\
  \n        android:layout_width=\"wrap_content\"  android:layout_height=\"wrap_content\"\
  \ />\n  </TableRow>\n\n</TableLayout>\n```\n\n要使用此布局管理器，你需要创建一个 `TableLayout` 实例，并在其中放置\
  \ `TableRow` 元素。这些 `TableRow` 元素包含表格的控件。代码清单 6-43 的用户界面如图 6-20 所示。\n\n![images](img/0620.jpg)\n\
  \n**图 6-20.** *TableLayout 布局管理器*\n\n由于 `TableLayout` 的内容是按行而不是按列定义的，Android 通过查找拥有最多单元格的行来确定表格的列数。例如，代码清单\
  \ 6-44 创建了一个具有两行的表格，其中一行有两个单元格，另一行有三个单元格（参见图 6-21）。在这种情况下，Android 会创建一个两行三列的表格，第一行的最后一列是一个空单元格。\n\
  \n**代码清单 6-44.** *一个不规则的表格定义*\n\n```\n<TableLayout\n    android:layout_width=\"\
  fill_parent\"  android:layout_height=\"fill_parent\">\n\n  <TableRow>\n    <TextView\
  \ android:text=\"名字:\"\n        android:layout_width=\"wrap_content\"  android:layout_height=\"\
  wrap_content\" />\n\n    <EditText android:text=\"爱伦\"\n        android:layout_width=\"\
  wrap_content\"  android:layout_height=\"wrap_content\" />\n  </TableRow>\n\n  <TableRow>\n\
  \    <TextView android:text=\"姓氏:\"\n        android:layout_width=\"wrap_content\"\
  \  android:layout_height=\"wrap_content\" />\n\n    <EditText android:text=\"爱伦\"\
  \n        android:layout_width=\"wrap_content\"  android:layout_height=\"wrap_content\"\
  \ />\n\n    <EditText android:text=\"坡\"\n        android:layout_width=\"wrap_content\"\
  \  android:layout_height=\"wrap_content\" />\n  </TableRow>\n\n</TableLayout>\n\
  ```\n\n![images](img/0621.jpg)\n\n**图 6-21.** *一个不规则的 TableLayout*\n\n在代码清单 6-43\
  \ 和 6-44 中，我们使用 `TableRow` 元素填充了 `TableLayout`。虽然这是常用模式，但你可以将任何 `android.widget.View`\
  \ 作为表格的子控件放置。例如，代码清单 6-45 创建了一个表格，其第一行是一个 `EditText`（参见图 6-22）。\n\n**代码清单 6-45.**\
  \ *使用 EditText 替代 TableRow*\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n\
  <TableLayout\n    android:layout_width=\"fill_parent\"  android:layout_height=\"\
  fill_parent\"\n    android:stretchColumns=\"0,1,2\" >\n\n  <EditText android:text=\"\
  全名:\"\n        android:layout_width=\"wrap_content\"  android:layout_height=\"wrap_content\"\
  \ />\n\n  <TableRow>\n    <TextView android:text=\"爱伦\"\n        android:layout_width=\"\
  wrap_content\"  android:layout_height=\"wrap_content\" />\n\n    <TextView android:text=\"\
  爱伦\"\n        android:layout_width=\"wrap_content\"  android:layout_height=\"wrap_content\"\
  \ />\n\n    <TextView android:text=\"坡\"\n        android:layout_width=\"wrap_content\"\
  \  android:layout_height=\"wrap_content\" />\n  </TableRow>\n\n</TableLayout>\n\
  ```\n\n![images](img/0622.jpg)\n\n**图 6-22.** *EditText 作为 TableLayout 的子控件*\n\n\
  代码清单 6-45 的用户界面如图 6-22 所示。请注意，`EditText` 占据了屏幕的整个宽度，尽管我们没有在 XML 布局中指定这一点。这是因为 `TableLayout`\
  \ 的子控件总是跨越整行。换句话说，`TableLayout` 的子控件可以指定 `android:layout_width=\"wrap_content\"\
  `（就像我们对 `EditText` 所做的那样），但这不会影响实际布局——它们被迫接受 `fill_parent`。不过，它们可以设置 `android:layout_height`。\n\
  \n由于表格的内容在设计时并不总是已知，因此 `TableLayout` 提供了几个属性来帮助你控制表格的布局。例如，代码清单 6-45 将 `TableLayout`\
  \ 的 `android:stretchColumns` 属性设置为 `\"0,1,2\"`。这向 `TableLayout` 暗示，如果需要，可以根据表格内容拉伸第\
  \ `0`、`1` 和 `2` 列。如果在代码清单 6-45 中没有使用 `stretchColumns`，我们会看到 `\"埃德加爱伦坡\"` 挤在一起。严格来说，第二行占据了整个宽度，但三个\
  \ `TextView` 并未分散开。\n\n类似地，你可以设置 `android:shrinkColumns`，以便在其他列需要更多空间时，包裹单列或多列的内容。你也可以设置\
  \ `android:collapseColumns` 使列不可见。请注意，列是使用从零开始的索引方案来标识的。\n\n`TableLayout` 还提供了 `android:layout_span`。你可以使用此属性让一个单元格跨越多个列。该字段类似于\
  \ HTML 中的 `colspan` 属性。\n\n有时，你可能还需要在单元格或控件的内容内提供间距。Android SDK 通过 `android:padding`\
  \ 及其同类属性支持此功能。`android:padding` 允许你控制视图外部边界与其内容之间的空间（参见代码清单 6-46）。\n\n**代码清单 6-46.**\
  \ *使用 android:padding*\n\n```\n<LinearLayout\n    android:orientation=\"vertical\"\
  \ android:layout_width=\"fill_parent\"\n    android:layout_height=\"fill_parent\"\
  >\n\n    <EditText android:text=\"一\"\n    android:layout_width=\"wrap_content\"\
  \  android:layout_height=\"wrap_content\"\n    android:padding=\"40px\" />\n</LinearLayout>\n\
  ```\n\n代码清单 6-46 将内边距设置为 `40px`。这会在 `EditText` 控件的外部边界与其内部显示的文本之间创建 40 像素的空白区域。图\
  \ 6-23 展示了同一个 `EditText` 使用两个不同内边距值的情况。左侧的界面没有设置任何内边距，而右侧的界面设置了 `android:padding=\"\
  40px\"`。\n\n![images](img/0623.jpg)\n\n**图 6-23.** *利用内边距*\n\n`android:padding`\
  \ 设置所有边（左、右、上、下）的内边距。你可以通过使用 `android:leftPadding`、`android:rightPadding`、`android:topPadding`\
  \ 和 `android:bottomPadding` 来控制每一边的内边距。\n\nAndroid 还定义了 `android:layout_margin`，它与\
  \ `android:padding` 类似。实际上，`android:padding`/`android:layout_margin` 类似于 `android:gravity`/`android:layout_gravity`，但一个是针对视图的，另一个是针对容器的。\n\
  \n最后，内边距值始终设置为尺寸类型。Android 支持以下尺寸类型：\n\n\n\n*   `Pixels`：缩写为`px`。此尺寸表示屏幕上的物理像素。\n\
  *   `Inches`：缩写为`in`。此尺寸表示屏幕上的实际英寸。\n*   `Millimeters`：缩写为`mm`。此尺寸表示屏幕上的实际毫米。\n\
  *   `Points`：缩写为`pt`。1 点等于 1/72 英寸。\n*   `Density-independent pixels`：缩写为`dip`或`dp`，此尺寸类型以\
  \ 160-dp 屏幕为参考框架，然后将其映射到实际屏幕。例如，一个宽度为 160 像素的屏幕会将 1`dip`映射为 1 像素。\n*   `Scale-independent\
  \ pixels`：缩写为`sp`，此尺寸类型通常用于字体类型。它会考虑用户的偏好和字体大小来确定实际尺寸。\n\n请注意，上述尺寸类型并非特定于内边距——任何接受尺寸值的\
  \ Android 字段（例如`android:layout_width`或`android:layout_height`）都可以接受这些类型。\n\n####\
  \ `RelativeLayout`布局管理器\n\n另一个有趣的布局管理器是`RelativeLayout`。顾名思义，此布局管理器实现了一种策略，其中容器中的控件相对于容器本身或容器中的另一个控件进行布局。清单\
  \ 6–47 和 图 6–24 展示了一个示例。\n\n**清单 6–47.** *使用`RelativeLayout`布局管理器*\n\n```\n<RelativeLayout\n\
  \        android:layout_width=\"fill_parent\"\n        android:layout_height=\"\
  wrap_content\">\n\n<TextView android:id=\"@+id/userNameLbl\"\n        android:layout_width=\"\
  fill_parent\"  android:layout_height=\"wrap_content\"\n        android:text=\"Username:\
  \ \"\n        android:layout_alignParentTop=\"true\" />\n\n<EditText android:id=\"\
  @+id/userNameText\"\n        android:layout_width=\"fill_parent\"  android:layout_height=\"\
  wrap_content\"\n        android:layout_below=\"@id/userNameLbl\" />\n\n<TextView\
  \ android:id=\"@+id/pwdLbl\"\n        android:layout_width=\"fill_parent\"  android:layout_height=\"\
  wrap_content\"\n        android:layout_below=\"@id/userNameText\"\n        android:text=\"\
  Password: \" />\n\n<EditText android:id=\"@+id/pwdText\"\n        android:layout_width=\"\
  fill_parent\"  android:layout_height=\"wrap_content\"\n        android:layout_below=\"\
  @id/pwdLbl\" />\n\n<TextView android:id=\"@+id/pwdCriteria\"\n        android:layout_width=\"\
  fill_parent\"  android:layout_height=\"wrap_content\"\n        android:layout_below=\"\
  @id/pwdText\"\n        android:text=\"Password Criteria... \" />\n\n<TextView android:id=\"\
  @+id/disclaimerLbl\"\n        android:layout_width=\"fill_parent\"  android:layout_height=\"\
  wrap_content\"\n        android:layout_alignParentBottom=\"true\"\n        android:text=\"\
  Use at your own risk... \" />\n\n</RelativeLayout>\n```\n\n![images](img/0624.jpg)\n\
  \n**图 6–24.** *使用`RelativeLayout`布局管理器布局的用户界面*\n\n如图所示，用户界面看起来像一个简单的登录表单。用户名标签被固定到容器的顶部，因为我们设置了`android:layout_alignParentTop`为`true`。类似地，用户名输入字段位于用户名标签下方，因为我们设置了`android:layout_below`。密码标签出现在用户名标签下方，密码输入字段出现在密码标签下方。免责声明标签被固定到容器的底部，因为我们设置了`android:layout_alignParentBottom`为`true`。\n\
  \n除了这三个布局属性，您还可以指定`layout_above`、`layout_toRightOf`、`layout_toLeftOf`、`layout_centerInParent`等等。使用`RelativeLayout`很有趣，因为它很简单。事实上，一旦您开始使用它，它就会成为您最喜欢的布局管理器——您会发现自己一次又一次地使用它。\n\
  \n#### `FrameLayout`布局管理器\n\n我们到目前为止讨论的布局管理器实现了各种布局策略。换句话说，每一种都有其特定的方式来在屏幕上定位和排列其子元素。使用这些布局管理器，您可以在屏幕上同时拥有多个控件，每个控件占据屏幕的一部分。Android\
  \ 还提供了一种主要用于显示单个项目的布局管理器——`FrameLayout`布局管理器。您主要使用这个工具类布局来动态显示单个视图，但您也可以用多个项目填充它，设置其中一个可见而其他不可见。清单\
  \ 6–48 演示了如何使用`FrameLayout`。\n\n**清单 6–48.** *填充`FrameLayout`*\n\n```\n<?xml version=\"\
  1.0\" encoding=\"utf-8\"?>\n<FrameLayout\n    android:id=\"@+id/frmLayout\"\n  \
  \  android:layout_width=\"fill_parent\"  android:layout_height=\"fill_parent\">\n\
  \n     <ImageView\n        android:id=\"@+id/oneImgView\" android:src=\"@drawable/one\"\
  \n        android:scaleType=\"fitCenter\"\n        android:layout_width=\"fill_parent\"\
  \  android:layout_height=\"fill_parent\"/>\n    <ImageView\n        android:id=\"\
  @+id/twoImgView\" android:src=\"@drawable/two\"\n        android:scaleType=\"fitCenter\"\
  \n        android:layout_width=\"fill_parent\"  android:layout_height=\"fill_parent\"\
  \n        android:visibility=\"gone\" />\n\n</FrameLayout>\n\npublic class FrameLayoutActivity\
  \ extends Activity{\n    private ImageView one = null;\n    private ImageView two\
  \ = null;\n    @Override\n    protected void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.listing6_48);\n\
  \n        one = (ImageView)findViewById(R.id.oneImgView);\n        two = (ImageView)findViewById(R.id.twoImgView);\n\
  \n        one.setOnClickListener(new OnClickListener(){\n\n            public void\
  \ onClick(View view) {\n                two.setVisibility(View.VISIBLE);\n\n   \
  \             view.setVisibility(View.GONE);\n            }});\n\n        two.setOnClickListener(new\
  \ OnClickListener(){\n\n            public void onClick(View view) {\n         \
  \       one.setVisibility(View.VISIBLE);\n\n                view.setVisibility(View.GONE);\n\
  \            }});\n    }\n}\n```\n\n清单 6–48 展示了布局文件以及活动的`onCreate()`方法。该演示的思路是在`FrameLayout`中加载两个`ImageView`对象，但一次只让其中一个`ImageView`对象可见。在用户界面中，当用户点击可见的图像时，我们隐藏一个图像并显示另一个。\n\
  \n现在更仔细地查看清单 6–48，从布局开始。您可以看到我们定义了一个带有两个`ImageView`对象的`FrameLayout`（`ImageView`是一个知道如何显示图像的控件）。请注意，第二个`ImageView`的可见性被设置为`gone`，从而使该控件不可见。现在，看看`onCreate()`方法。在`onCreate()`方法中，我们为`ImageView`对象上的点击事件注册了监听器。在点击处理器中，我们隐藏一个`ImageView`并显示另一个。\n\
  \n正如我们之前所说，当您需要动态地将视图的内容设置为单个控件时，通常使用`FrameLayout`。尽管这是普遍做法，但该控件可以接受多个子元素，正如我们所演示的那样。清单\
  \ 6–48 向布局中添加了两个控件，但一次只让其中一个控件可见。然而，`FrameLayout`并不会强制您一次只能有一个控件可见。如果您向布局中添加多个控件，`FrameLayout`会简单地将这些控件堆叠起来，一个叠在另一个之上，最后一个在最上面。这可以创建出有趣的用户界面。例如，图\
  \ 6–25 显示了一个包含两个可见的`ImageView`对象的`FrameLayout`控件。您可以看到控件是堆叠的，顶部的控件部分地遮挡了它后面的图像。\n\
  \n\n\n`FrameLayout`的另一个有趣特性是，如果向布局中添加多个控件，布局的大小将根据容器中最大的项来计算。在图 6-25 中，顶部的图像实际上比其后面的图像小得多，但由于布局的大小是基于最大的控件计算的，因此顶部图像会被拉伸。\n\
  \n另请注意，如果你将多个控件放入一个`FrameLayout`中，且其中有一个或多个控件初始状态为不可见，则应考虑对`FrameLayout`调用`setMeasureAllChildren(true)`。由于最大子项决定了布局大小，如果最大的子项一开始就是不可见的，就会遇到问题。也就是说，当它变为可见时，将只会部分可见。为确保所有项都能正确渲染，请调用`setMeasureAllChildren()`并传入`true`。`FrameLayout`对应的\
  \ XML 属性是`android:measureAllChildren=\"true\"`。\n\n![images](img/0625.jpg)\n\n**图\
  \ 6-25.** *包含两个`ImageView`对象的`FrameLayout`*\n\n#### 针对不同设备配置自定义布局\n\n到目前为止，你已经非常清楚\
  \ Android 提供了众多布局管理器来帮助构建用户界面。如果你尝试过我们讨论过的布局管理器，你就会知道可以通过各种方式组合这些布局管理器，以获得想要的界面外观。即使有了所有这些布局管理器，构建\
  \ UI 并使其正确运行仍可能是一个挑战。这对于移动设备尤其如此。移动设备的用户和制造商正变得越来越复杂，这使得开发者的工作更具挑战性。\n\n其中一个挑战是为应用程序构建能够在不同屏幕配置下显示的\
  \ UI。例如，如果你的应用程序分别在竖屏和横屏模式下显示，UI 会是什么样子？如果你还没有遇到过这种情况，你现在可能正绞尽脑汁，思考如何处理这个常见场景。有趣且值得庆幸的是，Android\
  \ 为这种用例提供了一些支持。\n\n其工作原理如下：构建布局时，Android 会根据设备的配置，从特定文件夹中查找并加载布局。设备可以处于三种配置之一：竖屏（portrait）、横屏（landscape）或方形（square，方形很少见）。为了为不同配置提供不同的布局，你需要为每种配置创建特定的文件夹，Android\
  \ 将从这些文件夹中加载相应的布局。如你所知，默认的布局文件夹位于`res/layout`。要支持竖屏显示，请创建一个名为`res/layout-port`的文件夹。对于横屏，创建名为`res/layout-land`的文件夹。对于方形，则创建名为`res/layout-square`的文件夹。\n\
  \n此时的一个好问题是：“有了这三个文件夹，我还需要默认的布局文件夹（`res/layout`）吗？”通常，答案是肯定的。要知道，Android 的资源解析逻辑会首先查找配置特定的目录。如果\
  \ Android 在那里找不到资源，它会转到默认的布局目录。因此，你应该将默认的布局定义放在`res/layout`中，并将自定义版本放在配置特定的文件夹中。\n\
  \n请注意，Android SDK 不提供任何 API 让你以编程方式指定要加载哪个配置——系统会根据设备配置自动选择文件夹。不过，你可以在代码中设置设备的方向，例如使用以下代码：\n\
  \n```\nimport android.content.pm.ActivityInfo;\n…\nsetRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_LANDSCAPE);\n\
  ```\n\n这会强制你的应用程序在设备上以横屏模式显示。继续尝试，在你之前的某个项目中使用它。将代码添加到 Activity 的`onCreate()`方法中，在模拟器中运行，然后查看你的应用程序侧向显示。\n\
  \n布局并不是唯一由配置驱动的资源，在查找要使用的资源时，还会考虑设备配置的其他限定符。`res`文件夹的全部内容都可以针对每种配置有不同的变体。例如，要为每种配置加载不同的可绘制对象，请创建`drawable-port`、`drawable-land`和`drawable-square`文件夹。但\
  \ Android 的功能远不止于此。在查找资源时可以使用的完整限定符列表如表 6-3 所示。\n\n**表 6-3.** *资源限定符*\n\n| **限定符**\
  \ | **描述** |\n| --- | --- |\n| MCC 和 MNC | 移动国家代码和移动网络代码 |\n| 语言和区域 | 小写的两位字母语言代码；也可以加上`-r`和大写的两位字母区域代码\
  \ |\n| 屏幕尺寸 | 提供屏幕尺寸的大致概念；值：`small`、`normal`、`large`和`xlarge` |\n| 宽/高屏幕 | 与屏幕宽高比相关；值：`long`和`notlong`\
  \ |\n| 屏幕方向 | 值：`land`、`port`和`square` |\n| 屏幕像素密度 | 近似密度；值：`ldpi`（约 120）、`mdpi`（约\
  \ 160）、`hdpi`（约 240）和`xhdpi`（约 320）。除非资源位于`nodpi`下，否则 Android 可能会缩放以适应在这些目录中找到的资源。\
  \ |\n| 触摸屏类型 | 值：`finger`、`notouch`和`stylus` |\n| 键盘 | 键盘状态；值：`keysexposed`、`keyshidden`和`keyssoft`\
  \ |\n| 文本输入 | 值：`nokeys`、`qwerty`和`12key`（数字） |\n| 非触摸屏导航 | 值：`dpad`、`nonav`、`trackball`和`wheel`\
  \ |\n| SDK 版本 | 值：`v4`（SDK 1.6）、`v7`（SDK 2.1）等。 |\n\n有关这些限定符的更多详细信息，请参阅以下 Android\
  \ 网页：\n\n```\nhttp://developer.android.com/guide/topics/resources/providing-resources.html#table2\n\
  ```\n\n这些限定符可以组合使用，以实现你想要的任何行为。资源目录名称将按顺序使用每个限定符值的零个或一个，并用破折号分隔。例如，以下是一个技术上有效的 drawable\
  \ 资源目录名称（尽管不推荐）：\n\n```\ndrawable-mcc310-en-rUS-large-long-port-mdpi-stylus-keyssoft-qwerty-dpad-v3\n\
  ```\n\n但以下这些也是有效的：\n\n```\ndrawable-en-rUS-land (用于美国英语横屏模式的图像)\nvalues-fr (法文字符串)\n\
  ```\n\n无论你在应用程序中为资源使用了多少个限定符，请记住，在代码中，你仍然仅以`R.resource_type.name`的形式引用资源，不带任何限定符。例如，如果你在多个不同的限定资源目录中为布局文件`main.xml`提供了许多不同的变体，你的代码仍将引用`R.layout.main`。Android\
  \ 会负责为你找到合适的`main.xml`。\n\n至此，我们关于构建 UI 的讨论就结束了。在下一节中，我们将向您介绍层次结构查看器工具。该工具将帮助您调试和优化用户界面。\n\
  \n\n\n### 使用层级查看器调试和优化布局\n\nAndroid SDK 附带了许多工具，可以大大简化你的开发工作。由于我们正在讨论用户界面开发，因此有必要介绍一下`Hierarchy\
  \ Viewer`（层级查看器）工具。该工具（如图 6-26 所示）允许你从布局角度调试用户界面。\n\n![images](img/0626.jpg)\n\n\
  **图 6-26.** *层级查看器工具的布局视图*\n\n如图 6-26 所示，`Hierarchy Viewer`以树状形式展示视图的层级结构。其原理是：你将布局加载到工具中，然后检查布局以确定可能的布局问题，并/或尝试优化布局，从而最大限度地减少视图数量（出于性能考虑）。\n\
  \n要调试你的 UI，请在模拟器中运行你的应用，并浏览到你要调试的 UI。然后，进入 Android SDK 的 `/tools` 目录，启动`Hierarchy\
  \ Viewer`工具。在 Windows 安装中，你会在 `/tools` 目录下看到一个名为 `hierarchyviewer.bat` 的批处理文件。运行该批处理文件后，你将看到`Hierarchy\
  \ Viewer`的设备屏幕（见图 6-27）。\n\n![images](img/0627.jpg)\n\n**图 6-27.** *层级查看器的设备屏幕*\n\
  \n设备屏幕会显示机器上正在运行的一组设备（此处为模拟器）。展开设备时，所选设备中的窗口列表会显示在下方。要查看特定窗口的视图层级，请选择该窗口（通常是你的 Activity\
  \ 的完全限定名，并以应用的包名作为前缀），然后点击`Load View Hierarchy`（加载视图层级）按钮。\n\n在视图层级屏幕中，你会在左侧窗格中看到该窗口的视图层级结构（见图\
  \ 6-26）。在左侧窗格中选择一个视图元素时，你可以在右侧的属性视图中查看该元素的属性，并且可以在右侧的线框窗格中看到该视图相对于其他视图的位置。被选中的视图会以红色边框高亮显示。通过查看所有正在使用的视图，你有可能找到减少视图数量的方法，从而使应用运行得更快。\n\
  \n图 6-27 显示了`Hierarchy Viewer`工具左下角的三个按钮。左侧按钮显示我们之前解释过的树形视图。中间的按钮是视图层级屏幕。右侧按钮以像素完美视图显示当前布局，但前提是你已使用此工具顶部的`Inspect\
  \ Screenshot`（检查截图）按钮初始化了像素完美视图。这种视图的趣味之处在于，你可以逐像素查看你的布局（见图 6-28）。此屏幕上有几个值得关注的项目。左侧是一个所有窗口组件的导航器视图。如果你点击某个组件，它会在中间视图中以红色边框高亮显示。右侧视图中的十字准线允许你指定放大镜（*loupe*，一种珠宝商和钟表匠使用的小型放大镜）中间视图中显示的内容。缩放控制允许你在放大镜中进一步放大。放大镜还会显示所选像素的确切位置（以`(x,\
  \ y)`坐标表示）以及该像素的颜色值。\n\n![images](img/0628.jpg)\n\n**图 6-28.** *层级查看器的像素完美模式*\n\n\
  此屏幕最后几个非常有用的功能是`Load Overlay`（加载叠加层）按钮和叠加层滑块。你可以在显示的屏幕后面加载一个图像文件（可能是你正在开发的屏幕的新原型图），以便将该图像文件与当前屏幕进行比较，并使用叠加层滑块使其更清晰或更模糊。加载的图像会锚定在左下角。默认情况下，该图像不会显示在放大镜中，但选中复选框后，它就会显示出来。\n\
  \n当 Android 2.3 发布时，`Hierarchy Viewer` 也可以在 Eclipse 中使用。新增了被称为 `Hierarchy View`（层级视图）和\
  \ `Pixel Perfect`（像素完美）的透视图，每个透视图都包含一组用于其各项功能的视图。它们的功能与前面介绍的可执行文件基本相同。如果你需要帮助找到它，第\
  \ 2 章介绍了如何在 Eclipse 中安装`Hierarchy Viewer`。\n\n有了像这样的工具，你就可以对应用的外观和感觉进行大量的控制。\n\n\
  ### 本章小结\n\n至此，你应该对 Android SDK 中可用的控件有了一个很好的概览。你也应该熟悉 Android 的适配器及其布局管理器。面对一个潜在的屏幕需求，你应该能够快速识别出你将用于构建该屏幕的控件和布局管理器。\n\
  \n在下一章中，我们将进一步探讨用户界面开发——我们将讨论菜单。\n\n## 第 7 章\n\n## 使用菜单\n\nAndroid SDK 为菜单提供了广泛的支持。在本章中，你将学习使用\
  \ Android 支持的几种菜单类型：常规菜单、子菜单、上下文菜单、图标菜单、次级菜单和替代菜单。Android 3.0 引入了一种称为操作栏（Action\
  \ Bar）的功能，它与菜单项很好地集成在一起。关于操作栏和菜单的交互，将在第 30 章中介绍。\n\n在 Android 中，菜单除了是 Java 对象外，也被表示为资源。由于它们是资源，Android\
  \ SDK 允许你像加载其他资源一样，从 XML 文件中加载菜单。Android 会为每个加载的菜单项生成资源 ID。我们将在本章中详细介绍这些 XML 菜单资源。我们还将向你展示如何利用自动生成的资源\
  \ ID 来处理所有类型的菜单项。\n\n\n\n### 理解 Android 菜单\n\n无论你是使用过 Java 中的 Swing、Windows 中的 Windows\
  \ Presentation Foundation (WPF)，还是其他任何 UI 框架，你都肯定与菜单打过交道。\n\nAndroid 菜单支持的关键类是 `android.view.Menu`。Android\
  \ 中的每个 Activity 都关联一个该类型的菜单对象，它可以包含多个菜单项和子菜单。\n\n菜单项由 `android.view.MenuItem` 表示，子菜单由\
  \ `android.view.SubMenu` 表示。这些关系如图 图 7-1 所示。严格来说，这不是一个类图，而是一个结构图，旨在帮助你可视化各种菜单相关类与函数之间的关系。\n\
  \n![images](img/0701.jpg)\n\n**图 7-1.** *Android 菜单相关类的结构*\n\n图 7-1 展示了一个 `Menu`\
  \ 对象包含一组菜单项。\n\n一个菜单项具有名称（标题）、菜单项 ID、排序顺序（在 SDK 中简称为“顺序”）以及一个 ID（或数字）。你可以使用这些顺序\
  \ ID 来指定菜单项在菜单中的显示顺序。例如，如果一个菜单项的顺序号为 4，另一个菜单项的顺序号为 6，那么第一个菜单项将显示在第二个菜单项上方。\n\n部分菜单顺序号范围是为特定类型的菜单保留的。次要菜单项（被认为不如其他菜单项重要）从\
  \ `0x30000` 开始，由常量 `Menu.CATEGORY_SECONDARY` 定义。其他类型的菜单类别——例如系统菜单、替代菜单和容器菜单——具有不同的顺序号范围。\n\
  \n系统菜单项从 `0x20000` 开始，由常量 `Menu.CATEGORY_SYSTEM` 定义。替代菜单项从 `0x40000` 开始，由常量 `Menu.CATEGORY_ALTERNATIVE`\
  \ 定义。容器菜单项从 `0x10000` 开始，由常量 `Menu.CATEGORY_CONTAINER` 定义。通过查看这些常量的值，你可以了解它们在菜单中出现的顺序。（我们将在“使用其他菜单类型”一节中讨论这些不同类型的菜单项。）\n\
  \n你可以通过为每个菜单项分配一个组 ID（即菜单项对象的一个属性）来将菜单项分组。具有相同组 ID 的多个菜单项被视为同一组的一部分。\n\n图 7-1 还展示了两个回调方法，你可以使用它们来创建和响应菜单项：`onCreateOptionsMenu`\
  \ 和 `onOptionsItemSelected`。我们接下来将介绍它们。\n\n#### 创建菜单\n\n在 Android SDK 中，你无需从头开始创建菜单对象。由于一个\
  \ Activity 关联一个菜单，Android 会为该 Activity 创建这个唯一的菜单，并将其传递给 Activity 类的 `onCreateOptionsMenu`\
  \ 回调方法。（正如该方法名称所示，Android 中的菜单也被称为*选项菜单*。）此方法允许你使用一组菜单项填充传入的唯一菜单（请参见清单 7-1）。\n\n\
  **清单 7-1.** *`onCreateOptionsMenu` 方法的签名*\n\n```\n@Override\npublic boolean onCreateOptionsMenu(Menu\
  \ menu)\n{\n    // 填充菜单项\n    …..\n   ...return true;   \n}\n```\n\n填充菜单项后，代码应返回\
  \ `true` 以使菜单可见。如果此方法返回 `false`，则菜单不可见。清单 7-2 中的代码演示了如何使用单个组 ID 以及递增的菜单项 ID 和顺序\
  \ ID 来添加三个菜单项。\n\n**清单 7-2.** *添加菜单项*\n\n```\n@Override\npublic boolean onCreateOptionsMenu(Menu\
  \ menu)\n{\n   //调用基类以包含系统菜单\n   super.onCreateOptionsMenu(menu);\n\n   menu.add(0\
  \           // 组\n         ,1             // 菜单项 ID\n         ,0             //\
  \ 顺序\n         ,\"追加\");       // 标题\n\n   menu.add(0,2,1,\"菜单项 2\");\n   menu.add(0,3,2,\"\
  清除\");\n\n   //返回 true 以使菜单可见非常重要\n   return true;   \n}\n```\n\n你还应该调用此方法的基类实现，以便系统有机会用系统菜单项填充菜单。为了将这些系统菜单项与其他类型的菜单项分开，Android\
  \ 从 `0x20000` 开始添加系统菜单项。（正如我们之前提到的，常量 `Menu.CATEGORY_SYSTEM` 定义了这些系统菜单项的起始 ID。在目前的所有版本中，Android\
  \ 尚未添加任何系统菜单。）\n\n添加菜单项所需的第一个参数是组 ID（整数）。第二个参数是菜单项 ID，当该菜单项被选中时，该 ID 会发送回回调函数。第三个参数表示顺序\
  \ ID。\n\n最后一个参数是菜单项的名称或标题。除了自由文本，你还可以通过 `R.java` 常量文件使用字符串资源。组、菜单项和顺序 ID 都是可选的；如果你不想指定其中任何一个，可以使用\
  \ `Menu.NONE`。\n\n#### 使用菜单组\n\n现在，我们来展示如何使用菜单组。清单 7-3 演示了如何添加两个菜单组：组 1 和组 2。\n\n\
  **清单 7-3.** *使用组 ID 创建菜单组*\n\n```\n@Override\npublic boolean onCreateOptionsMenu(Menu\
  \ menu)\n{\n   //组 1\n   int group1 = 1;\n   menu.add(group1,1,1,\"g1.菜单项 1\");\n\
  \   menu.add(group1,2,2,\"g1.菜单项 2\");\n\n   //组 2   \n   int group2 = 2;\n   menu.add(group2,3,3,\"\
  g2.菜单项 1\");\n   menu.add(group2,4,4,\"g2.菜单项 2\");\n\n   return true; // 返回 true\
  \ 非常重要\n}\n```\n\n请注意菜单项 ID 和顺序 ID 是如何独立于组的。那么，组有什么用处呢？实际上，`android.view.Menu` 类提供了一组基于组\
  \ ID 的方法。你可以使用这些方法来操作组内的菜单项：\n\n- `removeGroup(id)`\n- `setGroupCheckable(id, checkable,\
  \ exclusive)`\n- `setGroupEnabled(id,boolean enabled)`\n- `setGroupVisible(id,visible)`\n\
  \n`removeGroup` 根据给定的组 ID 移除该组中的所有菜单项。你可以使用 `setGroupEnabled` 方法启用或禁用给定组中的菜单项。类似地，你可以使用\
  \ `setGroupVisible` 控制一组菜单项的可见性。\n\n`setGroupCheckable` 有点意思。你可以使用此方法在选中某个菜单项时显示一个复选标记。当应用于一个组时，它将对组内的所有菜单项启用此功能。如果此方法的\
  \ `exclusive` 标志被设置，则只允许该组内一个菜单项进入选中状态，其他菜单项将保持未选中状态。\n\n现在，你已了解如何使用一组菜单项填充 Activity\
  \ 的主菜单，并根据其性质进行分组。接下来，我们将展示如何响应这些菜单项。\n\n### 响应菜单项\n\n在 Android 中，有多种响应菜单项点击的方式。你可以使用\
  \ Activity 类的 `onOptionsItemSelected` 方法；可以使用独立的监听器；或者可以使用 Intent。我们将在本节中介绍每种技术。\n\
  \n\n\n#### 通过 `onOptionsItemSelected` 响应菜单项\n\n当菜单项被点击时，Android 会在 `Activity` 类上调用\
  \ `onOptionsItemSelected` 回调方法（参见清单 7–4）。\n\n**清单 7–4.** *`onOptionsItemSelected`\
  \ 方法的签名与主体*\n\n```java\n@Override\npublic boolean onOptionsItemSelected(MenuItem\
  \ item)\n{\n   switch(item.getItemId()) {\n      .....\n   }\n   //for items handled\n\
  \   return true;\n\n   //for the rest\n   ...return super.onOptionsItemSelected(item);\n\
  }\n```\n\n此处的关键模式是通过 `MenuItem` 类的 `getItemId()` 方法检查菜单项 ID，并执行相应操作。如果 `onOptionsItemSelected()`\
  \ 处理了某个菜单项，它会返回 `true`。菜单事件将不再进一步传播。对于 `onOptionsItemSelected()` 未处理的菜单项回调，`onOptionsItemSelected()`\
  \ 应通过 `super.onOptionsItemSelected` 调用父类方法。`onOptionsItemSelected()` 方法的默认实现返回 `false`，以便执行正常处理流程。正常处理流程包括通过其他方式为菜单点击调用响应。\n\
  \n#### 通过监听器响应菜单项\n\n通常，你通过重写 `onOptionsItemSelected` 来响应菜单；这是推荐的做法，可以获得更好的性能。然而，菜单项允许你注册一个监听器，将其用作回调。\n\
  \n这种方法分为两步。第一步，实现 `OnMenuClickListener` 接口。然后，创建该实现的一个实例，并将其传递给菜单项。当菜单项被点击时，菜单项将调用\
  \ `OnMenuClickListener` 接口的 `onMenuItemClick()` 方法（参见清单 7–5）。\n\n**清单 7–5.** *使用监听器作为菜单项点击的回调*\n\
  \n```java\n//步骤 1\npublic class MyResponse implements OnMenuClickListener\n{\n \
  \  //一些用于操作的局部变量\n   //...\n   //一些构造函数\n   @override\n   boolean onMenuItemClick(MenuItem\
  \ item)\n   {\n      //执行你的操作\n      return true;\n   }\n}\n\n//步骤 2\nMyResponse\
  \ myResponse = new MyResponse(...);\nmenuItem.setOnMenuItemClickListener(myResponse);\n\
  ...\n```\n\n当菜单项被调用时，会调用 `onMenuItemClick` 方法。这段代码在菜单项被点击时立即执行，甚至早于 `onOptionsItemSelected`\
  \ 方法的调用。如果 `onMenuItemClick` 返回 `true`，则不会执行其他回调——包括 `onOptionsItemSelected` 回调方法。这意味着监听器代码优先于\
  \ `onOptionsItemSelected` 方法。\n\n#### 使用 Intent 响应菜单项\n\n你也可以通过使用 `MenuItem` 的 `setIntent(intent)`\
  \ 方法将菜单项与意图关联起来。默认情况下，菜单项没有关联的意图。但是，当菜单项关联了一个意图，并且没有其他处理程序处理该菜单项时，默认行为是使用 `startActivity(intent)`\
  \ 来调用该意图。要使此机制生效，所有处理程序——尤其是 `onOptionsItemSelected` 方法——应针对那些未处理的菜单项调用父类的 `onOptionsItemSelected()`\
  \ 方法。或者你可以这样理解：系统会首先给 `onOptionsItemSelected` 一个处理菜单项的机会（当然，监听器紧随其后）。这是假设该菜单项没有直接关联的监听器，如果有，则监听器会覆盖其余处理。\n\
  \n如果你不重写 `onOptionsItemSelected` 方法，Android 框架中的基类会执行必要操作，以在菜单项上调用意图。但如果你确实重写了此方法，并且对该菜单项不感兴趣，则必须调用父类方法，而父类方法会进一步促成意图的调用。所以关键在于：要么不重写\
  \ `onOptionsItemSelected` 方法，要么重写它，并针对你不处理的菜单项调用父类方法。\n\n### 创建用于测试菜单的测试工具\n\n到目前为止，内容相当直观。你已经学习了如何创建菜单以及如何通过各种回调来响应它们。现在，我们将向你展示一个示例活动，用于实践你已经学到的这些菜单\
  \ API。\n\n**注意：** 我们在本章末尾提供了一个 URL，用于下载该项目，以便你可以在 Eclipse 开发环境中设置它。\n\n本练习的目标是创建一个包含文本视图的简单活动。该文本视图将充当调试器。当我们调用菜单时，我们将被调用的菜单项名称和\
  \ ID 输出到此文本视图中。完成的 `Menus` 应用程序将类似图 5–2 所示。\n\n![images](img/0702.jpg)\n\n**图 7–2.**\
  \ *示例 `Menus` 应用程序*\n\n图 7–2 展示了两个感兴趣的内容：菜单和文本视图。菜单显示在底部。不过，当你启动应用程序时，你不会看到它；你必须点击模拟器或设备上的“菜单”按钮才能看到菜单。第二个感兴趣的内容是屏幕顶部附近的文本视图，它列出了调试消息。当你点击可用的菜单项时，测试工具会将菜单项名称记录到文本视图中。如果你点击“清空”菜单项，程序会清空文本视图。\n\
  \n**注意：** 图 7–2 不一定代表示例应用程序的初始状态。我们在此展示它，是为了说明本章将涉及的菜单类型。\n\n按照以下步骤实现测试工具：\n\n1.\
  \  创建一个包含文本视图的 XML 布局文件。\n2.  创建一个托管步骤 1 中定义的布局的 `Activity` 类。\n3.  设置菜单。\n4.  向菜单添加一些常规菜单项。\n\
  5.  向菜单添加一些次级菜单项。\n6.  响应菜单项。\n7.  修改 `AndroidManifest.xml` 文件以显示应用程序的合适标题。\n\n\
  我们将在以下各节中介绍每个步骤，并提供必要的源代码来组装测试工具。\n\n#### 创建 XML 布局\n\n步骤 1 涉及创建一个简单的 XML 布局文件，其中包含一个文本视图（参见清单\
  \ 7–6）。你可以在活动启动期间将该文件加载到活动中。\n\n**清单 7–6.** *测试工具的 XML 布局文件*\n\n```xml\n<?xml version=\"\
  1.0\" encoding=\"utf-8\"?>\n<LinearLayout\n    android:orientation=\"vertical\"\n\
  \    android:layout_width=\"fill_parent\"\n    android:layout_height=\"fill_parent\"\
  \n    >\n<TextView android:id=\"@+id/textViewId\"  \n    android:layout_width=\"\
  fill_parent\"\n    android:layout_height=\"wrap_content\"\n    android:text=\"调试便签\"\
  \n    />\n</LinearLayout>\n```\n\n#### 创建活动\n\n步骤 2 要求你创建一个活动，这也相当简单。假设步骤 1 中的布局文件位于\
  \ `\\res\\layout\\main.xml`，你可以通过其资源 ID 使用该文件来填充活动的视图（参见清单 7–7）。\n\n**清单 7–7.**\
  \ *菜单测试工具活动类*\n\n```java\npublic class SampleMenusActivity extends Activity {\n\n\
  \   //在 onCreateOptions 中初始化此变量\n   Menu myMenu = null;\n\n    @Override\n    public\
  \ void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \n        setContentView(R.layout.main);\n    }\n```\n\n为简洁起见，我们没有包含 import 语句。在\
  \ Eclipse 中，你可以在编辑器中调出上下文菜单并选择“源”→“组织导入”来自动填充 import 语句。你也可以使用快捷键 `Ctrl + Shift\
  \ + O`。\n\n\n\n#### 设置菜单\n\n现在你已经有了一个视图和一个活动，可以进入第三步：重写 `onCreateOptionsMenu` 并以编程方式设置菜单（参见**清单\
  \ 7-8**）。\n\n**清单 7-8.** *以编程方式设置菜单*\n\n```java\n    @Override\n    public boolean\
  \ onCreateOptionsMenu(Menu menu)\n    {\n       //调用父类方法以附加任何系统级别的菜单\n       super.onCreateOptionsMenu(menu);\n\
  \n       this.myMenu = menu;\n\n       //添加几个常规菜单项\n       addRegularMenuItems(menu);\n\
  \n       //添加几个次要菜单项\n       add5SecondaryMenuItems(menu);\n\n       //必须返回 true\
  \ 才能显示菜单\n       //如果返回 false，菜单将不会显示\n       return true;\n    }\n```\n\n**清单 7-8**\
  \ 中的代码首先调用父类的 `onCreateOptionsMenu`，以给父类添加系统级别菜单的机会。\n\n**注意：** 在迄今为止的所有 Android\
  \ SDK 版本中，`onCreateOptionsMenu` 方法都不会添加新的菜单项。但是，未来的版本可能会添加，因此调用父类方法是一个好习惯。\n\n然后，代码保留了\
  \ `Menu` 对象的引用，以便稍后为了演示目的而操作它。之后，代码继续添加几个常规菜单项和几个次要菜单项。\n\n#### 添加常规菜单项\n\n现在进入第四步，向菜单中添加几个常规菜单项。`addRegularMenuItems`\
  \ 的代码如**清单 7-9** 所示。\n\n**清单 7-9.** *addRegularMenuItems 函数*\n\n```java\nprivate\
  \ void addRegularMenuItems(Menu menu)\n    {\n       int base=Menu.FIRST; // 值为\
  \ 1\n\n       menu.add(base,base,base,\"追加\");\n       menu.add(base,base+1,base+1,\"\
  项目 2\");\n       menu.add(base,base+2,base+2,\"清除\");\n\n       menu.add(base,base+3,base+3,\"\
  隐藏次要\");\n       menu.add(base,base+4,base+4,\"显示次要\");\n\n       menu.add(base,base+5,base+5,\"\
  启用次要\");\n       menu.add(base,base+6,base+6,\"禁用次要\");\n\n       menu.add(base,base+7,base+7,\"\
  选中次要\");\n       menu.add(base,base+8,base+8,\"取消选中次要\");\n    }\n```\n\n`Menu`\
  \ 类定义了一些便利常量，其中一个是 `Menu.FIRST`。你可以将其作为菜单 ID 和其他菜单相关序列号的基准数字。请注意，你可以将组 ID 固定为 `base`，仅递增排序顺序和菜单项\
  \ ID。此外，代码添加了一些特定的菜单项，例如“隐藏次要”和“启用次要”，以演示一些菜单概念。\n\n#### 添加次要菜单项\n\n现在让我们添加一些次要菜单项以执行第五步（参见**清单\
  \ 7-10**）。如前所述，次要菜单项从 0x30000 开始，并由常量 `Menu.CATEGORY_SECONDARY` 定义。它们的排序顺序 ID 高于常规菜单项，因此在菜单中显示在常规菜单项之后。请注意，排序顺序是区分次要菜单项与常规菜单项的唯一因素。在其他所有方面，次要菜单项的工作和行为与其他任何菜单项相同。\n\
  \n**清单 7-10.** *添加次要菜单项*\n\n```java\nprivate void add5SecondaryMenuItems(Menu menu)\n\
      {\n       //次要项目与其他项目一样显示\n       int base=Menu.CATEGORY_SECONDARY;\n\n       menu.add(base,base+1,base+1,\"\
  次要项目 1\");\n       menu.add(base,base+2,base+2,\"次要项目 2\");\n       menu.add(base,base+3,base+3,\"\
  次要项目 3\");\n       menu.add(base,base+3,base+3,\"次要项目 4\");\n       menu.add(base,base+4,base+4,\"\
  次要项目 5\");\n    }\n```\n\n#### 响应用户点击菜单项\n\n现在菜单已经设置好，我们进入第六步，响应菜单点击。当菜单项被点击时，Android\
  \ 会通过传递被点击菜单项的引用来调用 `Activity` 类的 `onOptionsItemSelected` 回调方法。然后你可以在 `MenuItem`\
  \ 上使用 `getItemId()` 方法来确定是哪个项目。\n\n通常，我们会看到使用 `switch` 语句或一系列 `if` 和 `else` 语句来调用各种函数以响应菜单项。**清单\
  \ 7-11** 展示了在 `onOptionsItemSelected` 回调方法中响应菜单项的标准模式。（你将在“通过 XML 文件加载菜单”部分中学习一种稍好的方式，在那里你将拥有这些菜单项\
  \ ID 的符号名称。）\n\n**清单 7-11.** *响应用户点击菜单项*\n\n```java\n    @Override\n    public boolean\
  \ onOptionsItemSelected(MenuItem item)     {\n       if (item.getItemId() == 1)       {\n\
             appendText(\"\\nhello\");\n       }\n       else if (item.getItemId()\
  \ == 2)       {\n          appendText(\"\\nitem2\");\n       }\n       else if (item.getItemId()\
  \ == 3)       {\n          emptyText();\n       }\n       else if (item.getItemId()\
  \ == 4)       {\n          //隐藏次要\n          this.appendMenuItemText(item);\n          this.myMenu.setGroupVisible(Menu.CATEGORY_SECONDARY,false);\n\
         }\n       else if (item.getItemId() == 5)       {\n          //显示次要\n          this.appendMenuItemText(item);\n\
            this.myMenu.setGroupVisible(Menu.CATEGORY_SECONDARY,true);\n       }\n\
         else if (item.getItemId() == 6)       {\n          //启用次要\n          this.appendMenuItemText(item);\n\
            this.myMenu.setGroupEnabled(Menu.CATEGORY_SECONDARY,true);\n       }\n\
         else if (item.getItemId() == 7)       {\n          //禁用次要\n          this.appendMenuItemText(item);\n\
            this.myMenu.setGroupEnabled(Menu.CATEGORY_SECONDARY,false);\n       }\n\
         else if (item.getItemId() == 8)       {\n          //选中次要\n          this.appendMenuItemText(item);\n\
            myMenu.setGroupCheckable(Menu.CATEGORY_SECONDARY,true,false);\n       }\n\
         else if (item.getItemId() == 9)       {\n          //取消选中次要\n          this.appendMenuItemText(item);\n\
            myMenu.setGroupCheckable(Menu.CATEGORY_SECONDARY,false,false);\n       }\n\
         else       {\n          this.appendMenuItemText(item);\n       }\n       //如果菜单项已被处理，应返回\
  \ true\n       return true;\n    }\n```\n\n**清单 7-11** 还演示了在组级别对菜单进行的操作；对这些方法的调用已用粗体标出。代码还将有关点击菜单项的详细信息记录到\
  \ `TextView` 中。**清单 7-12** 显示了一些用于写入 `TextView` 的实用函数。请注意 `MenuItem` 上还有一个用于获取其标题的方法。\n\
  \n**清单 7-12.** *用于写入调试 TextView 的实用函数*\n\n```java\n//给定一个字符串文本，将其追加到 TextView\n\
      private void appendText(String text)    {\n          TextView tv = (TextView)this.findViewById(R.id.textViewId);\n\
            tv.setText(tv.getText() + text);\n    }\n\n//给定一个菜单项，将其标题追加到 TextView\n\
      private void appendMenuItemText(MenuItem menuItem)    {\n       String title\
  \ = menuItem.getTitle().toString();\n       TextView tv = (TextView)this.findViewById(R.id.textViewId);\n\
            tv.setText(tv.getText() + \"\\n\" + title);\n    }\n//清空 TextView 的内容\n\
      private void emptyText()    {\n          TextView tv = (TextView)this.findViewById(R.id.textViewId);\n\
            tv.setText(\"\");\n    }\n```\n\n\n\n#### 调整 AndroidManifest.xml 文件\n\n\
  创建测试工具的最后一步是更新应用程序的 `AndroidManifest.xml` 文件。此文件在你创建新项目时会自动生成，位于项目的根目录中。\n\n在此文件中，你需要注册\
  \ `Activity` 类（例如 `SampleMenusActivity`），并为该 Activity 指定标题。我们将此 Activity 命名为“Sample\
  \ Menus Application”，如图 7–2 所示。请参见列表 7–13 中突出显示的这一条目。\n\n**列表 7–13.** *测试工具的 AndroidManifest.xml\
  \ 文件*\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest\n      package=\"\
  your-package-name-goes-here \"\n      android:versionCode=\"1\"\n      android:versionName=\"\
  1.0.0\">\n    <application android:icon=\"@drawable/icon\" android:label=\"Sample\
  \ Menus\">\n        <activity android:name=\".SampleMenusActivity\"\nandroid:label=\"\
  Sample Menus Application\">\n            <intent-filter>\n                <action\
  \ android:name=\"android.intent.action.MAIN\" />\n                <category android:name=\"\
  android.intent.category.LAUNCHER\" />\n            </intent-filter>\n        </activity>\n\
  \    </application>\n</manifest>\n```\n\n使用我们提供的代码，你应该能够快速构建这个用于菜单实验的测试工具。我们展示了如何创建包含一个文本视图的简单\
  \ Activity，以及如何填充和响应菜单。大多数菜单都遵循这种基础且实用的模式。完成练习后，你可以参考图 7–2 来了解预期的用户界面类型。但正如我们所指出的，你看到的可能与图示不完全一致（不过大体相同），因为我们尚未展示如何添加图标菜单。即使添加了图标菜单，你的用户界面也可能略有不同，因为你使用的图像可能与我们的不同。\n\
  \n### 处理其他菜单类型\n\n到目前为止，我们已经介绍了一些比较简单但功能齐全的菜单类型。当你深入了解 SDK 时，你会发现 Android 还支持图标菜单、子菜单、上下文菜单和备用菜单。其中，备用菜单是\
  \ Android 独有的。我们将在本节中介绍所有这些菜单类型。\n\n#### 展开菜单\n\n回想一下图 7–2，示例应用程序在菜单的右下角显示了一个名为“更多”的菜单项。我们在任何示例代码中都没有展示如何添加此菜单项，那么它是从何而来的呢？\n\
  \n如果应用程序的菜单项数量超过了主屏幕的显示能力，Android 会显示“更多”菜单项，让用户查看其余菜单项。这种菜单称为*展开菜单*，当菜单项过多而无法在有限空间内显示时，它会自动出现。但展开菜单有一个限制：它不能容纳图标。用户点击“更多”后，将看到一个不显示图标的菜单。\n\
  \n#### 处理图标菜单\n\n既然我们已经提到了图标菜单，那就来更详细地讨论一下吧。Android 的菜单不仅支持文本，还支持图像或图标。你可以使用图标来代表菜单项，可以代替文本，也可以作为文本的补充。但使用图标菜单时需要注意一些限制。首先，正如你上段所看到的，你无法在展开菜单中使用图标菜单。其次，图标菜单项不支持菜单项复选框标记。第三，如果图标菜单项中的文本过长，根据屏幕尺寸的不同，文本会在一定数量的字符后被截断。（最后这个限制也适用于纯文本菜单项。）\n\
  \n创建图标菜单项很简单。像以前一样创建一个常规的文本菜单项，然后使用 `MenuItem` 类的 `setIcon` 方法来设置图像。你需要使用图像的资源 ID，因此必须先将图像或图标放置在\
  \ `/res/drawable` 目录中来生成资源 ID。例如，如果图标文件名为 `balloons`，那么资源 ID 将是 `R.drawable.balloons`。\n\
  \n以下是一些演示此过程的示例代码：\n\n```\n// 添加一个菜单项并记住它，以便稍后为其设置图标。\nMenuItem item8 = menu.add(base,base+8,base+8,\"\
  uncheck secondary\");\nitem8.setIcon(R.drawable.balloons);\n```\n\n在向菜单添加菜单项时，你通常不需要保留\
  \ `menu.add` 方法返回的局部变量。但在这种情况下，你需要记住返回的对象，以便为菜单项添加图标。此示例中的代码还展示了 `menu.add` 方法返回的类型是\
  \ `MenuItem`。\n\n只要菜单项显示在主应用程序屏幕上，图标就会显示。如果它作为展开菜单的一部分显示，则不会显示图标，只会显示文本。图 7–2 中显示气球图像的菜单项就是图标菜单项的一个例子。\n\
  \n#### 处理子菜单\n\n现在让我们来看看 Android 的子菜单。图 7–1 指出了 `SubMenu` 与 `Menu` 和 `MenuItem`\
  \ 之间的结构关系。一个 `Menu` 对象可以包含多个 `SubMenu` 对象。每个 `SubMenu` 对象通过调用 `Menu.addSubMenu`\
  \ 方法添加到 `Menu` 对象中（参见列表 7–14）。向子菜单添加菜单项的方式与向菜单添加菜单项相同。这是因为 `SubMenu` 也是从 `Menu`\
  \ 对象派生的。但是，你不能向子菜单中添加更多子菜单。\n\n**列表 7–14.** *添加子菜单*\n\n```\nprivate void addSubMenu(Menu\
  \ menu)\n{\n   //次要项目与其他项目一样显示\n   int base=Menu.FIRST + 100;\n   SubMenu sm = menu.addSubMenu(base,base+1,Menu.NONE,\"\
  submenu\");\n   sm.add(base,base+2,base+2,\"sub item1\");\n   sm.add(base,base+3,base+3,\
  \ \"sub item2\");\n   sm.add(base,base+4,base+4, \"sub item3\");\n\n    //子菜单项不支持图标\n\
  \   item1.setIcon(R.drawable.icon48x48_2);\n\n   //以下方式则是可以的\n   sm.setIcon(R.drawable.icon48x48_1);\n\
  \n   //这将导致运行时异常\n    //sm.addSubMenu(\"try this\");\n}\n```\n\n**注意：** `SubMenu`\
  \ 作为 `Menu` 对象的子类，仍然继承了 `addSubMenu` 方法。如果你尝试将一个子菜单添加到另一个子菜单中，编译器不会报错，但运行时会出现异常。\n\
  \nAndroid SDK 文档还指出子菜单不支持图标菜单项。当你为菜单项添加图标，然后将该菜单项添加到子菜单时，菜单项会忽略该图标，即使你不会看到编译时或运行时错误。但是，子菜单本身可以有图标。\n\
  \n#### 预留系统菜单\n\n大多数 Windows 应用程序都包含诸如“文件”、“编辑”、“视图”、“打开”、“关闭”和“退出”等菜单。这些菜单被称为系统菜单。Android\
  \ SDK 指出，在创建选项菜单时，系统可能会插入一组类似的菜单。然而，当前版本的 Android SDK 在菜单创建过程中不会自动填充这些菜单。可以预见，这些系统菜单可能会在后续版本中实现。文档建议程序员在代码中做好准备，以便在这些系统菜单可用时能够容纳它们。这是通过调用父类的\
  \ `onCreateOptionsMenu` 方法来实现的，该方法允许系统将系统菜单添加到由常量 `CATEGORY_SYSTEM` 标识的组中。\n\n\n\
  \n### 使用上下文菜单\n\n桌面程序的用户对上下文菜单一定不陌生。例如，在 Windows 应用程序中，你可以通过右键单击某个 UI 元素来访问上下文菜单。Android\
  \ 通过一种称为*长按*的操作来支持类似的上下文菜单概念。长按是指在任意 Android 视图上按住鼠标点击比平时稍长一点的时间。\n\n在手机等手持设备上，鼠标点击的实现方式有多种，具体取决于导航机制。如果你的手机有用于移动光标的滚轮，按下滚轮就相当于鼠标点击。如果设备有触摸板，轻点或按压就等同于鼠标点击。或者你可能有一组方向键用于移动，中间有一个选择键；按下该键就相当于点击鼠标。无论鼠标点击在你的设备上如何实现，只要你按住鼠标点击的时间稍长一些，就能触发长按。\n\
  \n上下文菜单在结构上与我们一直在讨论的标准选项菜单不同（参见图 7-3）。上下文菜单有一些选项菜单所没有的细微特点。\n\n图 7-3 显示，在 Android\
  \ 菜单架构中，上下文菜单被表示为一个 `ContextMenu` 类。就像 `Menu` 一样，`ContextMenu` 可以包含多个菜单项。你将使用同一组\
  \ `Menu` 方法来向上下文菜单添加菜单项。`Menu` 和 `ContextMenu` 最大的区别归结于菜单的所有权。一个 Activity 拥有一个常规的选项菜单，而一个视图拥有一个上下文菜单。这是符合预期的，因为激活上下文菜单的长按操作作用于被点击的*视图*。因此，一个\
  \ Activity 只能有一个选项菜单，但可以有多个上下文菜单。由于一个 Activity 可以包含多个视图，并且每个视图都可以有自己的上下文菜单，所以一个\
  \ Activity 拥有的上下文菜单数量可以与视图数量一样多。\n\n![images](img/0703.jpg)\n\n**图 7-3.** *Activity、视图和上下文菜单*\n\
  \n虽然上下文菜单归视图所有，但填充上下文菜单的方法位于 `Activity` 类中。这个方法名为 `activity.onCreateContextMenu()`，其作用类似于\
  \ `activity.onCreateOptionsMenu()` 方法。这个回调方法还携带了将要为其填充上下文菜单项的视图。\n\n上下文菜单还有一个值得注意的细节。虽然\
  \ `onCreateOptionsMenu()` 方法对每个 Activity 都会自动调用，但 `onCreateContextMenu()` 并非如此。Activity\
  \ 中的视图并*非必须*拥有一个上下文菜单。例如，你的 Activity 中可能有三个视图，但你只想为其中一个视图启用上下文菜单，而其他视图不启用。如果你希望某个特定视图拥有一个上下文菜单，你必须专门为此目的在该\
  \ Activity 中注册该视图。这是通过 `activity.registerForContextMenu(view)` 方法实现的，我们将在“为上下文菜单注册视图”一节中讨论此方法。\n\
  \n现在请注意图 7-3 中显示的 `ContextMenuInfo` 类。此类型的对象会被传递给 `onCreateContextMenu` 方法。这是视图将附加信息传递给此方法的一种方式。为了实现这一点，视图需要重写\
  \ `getContextViewInfo()` 方法，并返回一个派生自 `ContextMenuInfo` 的类，该类包含用于表示附加信息的额外方法。你可能需要查看\
  \ `android.view.View` 的源代码才能完全理解这种交互。\n\n**注意：** 根据 Android SDK 文档，上下文菜单不支持快捷键、图标或子菜单。\n\
  \n现在你已经了解了上下文菜单的通用结构，让我们看一些示例代码，它们演示了实现上下文菜单的每个步骤：\n\n1.  在 Activity 的 `onCreate()`\
  \ 方法中为上下文菜单注册一个视图。\n2.  使用 `onCreateContextMenu()` 填充上下文菜单。你必须在 Android 调用此回调方法之前完成步骤\
  \ 1。\n3.  响应上下文菜单的点击。\n\n#### 为上下文菜单注册视图\n\n实现上下文菜单的第一步是在 Activity 的 `onCreate()`\
  \ 方法中为上下文菜单注册一个视图。如果你要使用本章介绍的菜单测试工具，你可以使用代码清单 7-15 中的代码在该测试工具中为 `TextView` 注册一个上下文菜单。你首先要找到这个\
  \ `TextView`，然后在 Activity 上以该 `TextView` 为参数调用 `registerForContextMenu`。这将为该 `TextView`\
  \ 设置好上下文菜单。\n\n**代码清单 7-15.** *为上下文菜单注册一个 `TextView`*\n\n```java\n@Override\npublic\
  \ void onCreate(Bundle savedInstanceState) {\n    super.onCreate(savedInstanceState);\n\
  \    setContentView(R.layout.main);\n\n    TextView tv = (TextView)this.findViewById(R.id.textViewId);\n\
  \    registerForContextMenu(tv);\n}\n```\n\n#### 填充上下文菜单\n\n一旦像本例中的 `TextView` 这样的视图被注册了上下文菜单，Android\
  \ 就会以该视图为参数调用 `onCreateContextMenu()` 方法。这就是你可以为该上下文菜单填充菜单项的地方。`onCreateContextMenu()`\
  \ 回调方法提供了三个参数供使用。\n\n第一个参数是预先构建好的 `ContextMenu` 对象，第二个参数是触发回调的视图（例如 `TextView`），第三个参数是我们在讨论图\
  \ 7-3 时简要介绍过的 `ContextMenuInfo` 类。对于许多简单的情况，你可以直接忽略 `ContextMenuInfo` 对象。但是，某些视图可能会通过此对象传递额外信息。在这些情况下，你需要将\
  \ `ContextMenuInfo` 类转换为子类，然后使用其额外的方法来获取附加信息。\n\n一些派生自 `ContextMenuInfo` 的类包括 `AdapterContextMenuInfo`\
  \ 和 `ExpandableContextMenuInfo`。在 Android 中与数据库游标绑定的视图使用 `AdapterContextMenuInfo`\
  \ 类来传递该视图中正在显示上下文菜单的行的 ID。从某种意义上说，你可以使用这个类来进一步明确鼠标点击之下的对象，哪怕是在同一个视图中。\n\n代码清单 7-16\
  \ 演示了 `onCreateContextMenu()` 方法。\n\n**代码清单 7-16.** *`onCreateContextMenu()` 方法*\n\
  \n```java\n@Override\npublic void onCreateContextMenu(ContextMenu menu, View v,\
  \ ContextMenuInfo menuInfo)\n{\n    menu.setHeaderTitle(\"示例上下文菜单\");\n    menu.add(200,\
  \ 200, 200, \"item1\");\n}\n```\n\n#### 响应上下文菜单项\n\n实现上下文菜单的第三步是响应上下文菜单的点击。响应上下文菜单的机制与响应选项菜单的机制类似。Android\
  \ 提供了一个类似于 `onOptionsItemSelected()` 的回调方法，名为 `onContextItemSelected()`。与它的对应方法一样，此方法也可以在\
  \ `Activity` 类中使用。代码清单 7-17 演示了 `onContextItemSelected()`。\n\n**代码清单 7-17.** *响应上下文菜单*\n\
  \n```java\n@Override\npublic boolean onContextItemSelected(MenuItem item)\n{\n \
  \   if (item.getItemId() == some-menu-item-id)\n    {\n        //处理此菜单项\n      \
  \  return true;\n    }\n    // ... 其他异常处理\n}\n```\n\n\n\n### 使用 Alternative 菜单\n\
  \n到目前为止，您已经学会了如何创建和使用菜单、子菜单以及上下文菜单。Android 引入了一种名为 *Alternative 菜单* 的新概念，它允许将备选菜单项作为菜单、子菜单和上下文菜单的一部分。Alternative\
  \ 菜单使得 Android 上的多个应用程序能够互相调用。这些 Alternative 菜单是 Android 应用间通信或使用框架的一部分。\n\n具体来说，Alternative\
  \ 菜单允许一个应用包含来自其他应用的菜单。当选择了 Alternative 菜单项时，目标应用或 Activity 将被启动，并携带一个指向该 Activity\
  \ 所需数据的 URL。被调用的 Activity 随后会使用从传递的 Intent 中获取的数据 URL。要深入理解 Alternative 菜单，您首先需要了解内容提供器、内容\
  \ URI、内容 MIME 类型以及 Intent（参见第 4 章和第 5 章）。\n\n总体的思路是这样的：想象一下，您正在编写一个用于显示某些数据的屏幕。这个屏幕很可能就是一个\
  \ Activity。在这个 Activity 上，您会有一个选项菜单，允许您以多种方式操作或处理这些数据。同时假设您正在处理一个通过 URI 和相应 MIME\
  \ 类型标识的文档或笔记。作为一名程序员，您要做的是预见到设备最终会包含更多知道如何处理或显示这些数据的程序。您希望给这些新程序一个机会，将它们自己的菜单项作为您为此\
  \ Activity 构建的菜单的一部分展示出来。\n\n要将 Alternative 菜单项附加到菜单，请在 `onCreateOptionsMenu` 方法中设置菜单时遵循以下步骤：\n\
  \n1.  创建一个 Intent，将其数据 URI 设置为您当前正在显示的数据 URI。\n2.  将 Intent 的类别设置为 `CATEGORY_ALTERNATIVE`。\n\
  3.  搜索能够处理此 URI 类型所支持数据的 Activity。\n4.  将能够调用这些 Activity 的 Intent 作为菜单项添加到菜单中。\n\
  \n这些步骤向我们揭示了 Android 应用的许多本质，因此我们将逐一分析它们。正如我们现在所了解的，将 Alternative 菜单项附加到菜单发生在 `onCreateOptionsMenu`\
  \ 方法中：\n\n```java\n@Override\npublic boolean onCreateOptionsMenu(Menu menu)\n{\n\
  }\n```\n\n现在让我们弄清楚组成这个函数的代码是什么。首先，我们需要知道在此 Activity 中可能处理的数据的 URI。您可以像这样获取 URI：\n\
  \n```java\nthis.getIntent().getData()\n```\n\n这样是可行的，因为 `Activity` 类有一个名为 `getIntent()`\
  \ 的方法，它返回调用此 Activity 的数据 URI。这个被调用的 Activity 可能是由主菜单调用的主 Activity；在这种情况下，它可能没有\
  \ Intent，并且 `getIntent()` 方法将返回 `null`。在您的代码中，您必须防范这种情况。\n\n我们的目标现在是找出其他知道如何处理此类数据的程序。我们使用一个\
  \ Intent 作为参数来进行此搜索。以下是构建该 Intent 的代码：\n\n```java\nIntent criteriaIntent = new Intent(null,\
  \ getIntent().getData());\nintent.addCategory(Intent.CATEGORY_ALTERNATIVE);\n```\n\
  \n一旦构建好 Intent，我们还会添加一个我们感兴趣的 action 类别。具体来说，我们只对那些可以作为 Alternative 菜单的一部分被调用的 Activity\
  \ 感兴趣。现在，我们已经准备好告诉 `Menu` 对象搜索匹配的 Activity，并将它们添加为菜单选项（参见列表 7–18）。\n\n**列表 7–18.**\
  \ *用 Alternative 菜单项填充菜单*\n\n```java\n// 搜索匹配的 Activity，并用它们填充菜单。\nmenu.addIntentOptions(\n\
  \     Menu.CATEGORY_ALTERNATIVE,   // 组\n     Menu.CATEGORY_ALTERNATIVE,   // 任何我们可能关心的唯一\
  \ ID。\n     Menu.CATEGORY_ALTERNATIVE,   // 排序\n     this.getComponentName(),  \
  \   // 显示菜单的 Activity 类的名称\n                                  // ——在这里，就是这个类。\n\
  \                                  // 变量 \"this\" 指向该 Activity\n     null,     \
  \                     // 无特定要求。\n     criteriaIntent,                // 之前创建的、描述我们需求的\
  \ Intent。\n     0,                             // 无标志。\n     null);            \
  \             // 返回的菜单项\n```\n\n在逐行解释这段代码之前，我们先解释一下“匹配 Activity”这个术语的含义。*匹配 Activity*\
  \ 是指能够处理给定 URI 的 Activity。Activity 通常使用 URI、action 和类别在其清单文件中注册这些信息。Android 提供了一种机制，使您可以使用\
  \ `Intent` 对象根据这些属性来查找匹配的 Activity。\n\n现在，让我们仔细看看列表 7–18。`Menu` 类上的 `addIntentOptions`\
  \ 方法负责查找与某个 Intent 的 URI 和类别属性相匹配的 Activity。然后，该方法将这些 Activity 添加到正确的组下，并赋予合适的菜单项和排序\
  \ ID。前三个参数涉及此方法的这一职责。在列表 7–18 中，我们从 `Menu.CATEGORY_ALTERNATIVE` 作为新菜单项将添加到的组开始。我们还使用这个相同的常量作为菜单项和排序\
  \ ID 的起点。\n\n下一个参数指向此菜单所属 Activity 的完全限定组件名称。代码使用了 `Activity` 类中的一个名为 `getComponentName()`\
  \ 的方法。*组件名称* 简单来说就是包名和类名。需要这个组件名称是因为，当添加一个新的菜单项时，该菜单项需要调用目标 Activity。为此，系统需要知道是哪个源\
  \ Activity 启动了目标 Activity。下一个参数是一个意图数组，您应该将其用作返回意图的过滤器。在示例中我们使用了 `\"null\"`。\n\n\
  下一个参数指向我们刚刚构建的 `criteriaIntent`。这就是我们要使用的搜索条件。之后的参数是一个标志，例如 `Menu.FLAG_APPEND_TO_GROUP`，用于指示是追加到该组现有的菜单项集合中，还是替换它们。默认值为\
  \ `0`，表示菜单组中的菜单项应当被替换。\n\n列表 7–18 中的最后一个参数是添加的菜单项数组。如果您希望在添加菜单项后以某种方式操作它们，可以使用这些已添加菜单项的引用。\n\
  \n以上这些都很好。但仍有几个问题尚未解答。例如，添加的菜单项的名称会是什么？Android 文档对此保持沉默，因此我们查看了源代码，以了解这个函数在幕后实际做了些什么（请参考第\
  \ 1 章了解如何获取 Android 源代码）。\n\n事实证明，`Menu` 类只是一个接口，因此我们无法看到它的任何实现源代码。实现 `Menu` 接口的类叫做\
  \ `MenuBuilder`。列表 7–19 展示了来自 `MenuBuilder` 类的相关方法 `addIntentOptions` 的源代码（提供此代码供您参考；我们不会逐行解释）。\n\
  \n**列表 7–19.** *MenuBuilder.addIntentOptions 方法*\n\n\n\n`public int addIntentOptions(int\
  \ group, int id, int categoryOrder,`\n`                               ComponentName\
  \ caller,`\n`                               Intent[] specifics,`\n`            \
  \                   Intent intent, int flags,`\n`                              \
  \ MenuItem[] outSpecificItems)`\n`{`\n`    PackageManager pm = mContext.getPackageManager();`\n\
  `    final List<ResolveInfo> lri =`\n`            pm.queryIntentActivityOptions(caller,\
  \ specifics, intent, 0);`\n`    final int N = lri != null ? lri.size() : 0;`\n\n\
  `    if ((flags & FLAG_APPEND_TO_GROUP) == 0) {`\n`        removeGroup(group);`\n\
  `    }`\n\n`    for (int i=0; i<N; i++) {`\n`        final ResolveInfo ri = lri.get(i);`\n\
  `        Intent rintent = new Intent(`\n`            ri.specificIndex < 0 ? intent\
  \ : specifics[ri.specificIndex]);`\n`        rintent.setComponent(new ComponentName(`\n\
  `                ri.activityInfo.applicationInfo.packageName,`\n`              \
  \  ri.activityInfo.name));`\n`        final MenuItem item = add(group, id, categoryOrder,`\n\
  `        ri.loadLabel(pm));`\n`        item.setIntent(rintent);`\n`        if (outSpecificItems\
  \ != null && ri.specificIndex >= 0) {`\n`            outSpecificItems[ri.specificIndex]\
  \ = item;`\n`        }`\n`    }`\n`    return N;`\n`}`\n\n请观察代码清单 7–19 中加粗部分的行；这段代码构建了一个菜单项。代码将确定菜单标题的工作委托给了`ResolveInfo`类。`ResolveInfo`类的源码告诉我们，声明该\
  \ Intent 的 Intent 过滤器应有一个与之关联的标题。下面是一个示例：\n\n```\n<intent-filter android:label=\"\
  Menu Title \">\n    …….\n    <category android:name=\"android.intent.category.ALTERNATE\"\
  \ />\n    <data android:mimeType=\"some type data\" />\n</intent-filter>\n```\n\n\
  Intent 过滤器的`label`值最终会作为菜单名称。你可以查看 Android NotePad 示例来了解此行为。\n\n### 处理响应数据变化的菜单\n\
  \n到目前为止，我们讨论的都是静态菜单——你只需一次性设置它们，它们不会根据屏幕内容动态变化。如果你想要创建动态菜单，请使用 Android 提供的`onPrepareOptionsMenu`方法。此方法与`onCreateOptionsMenu`类似，区别在于每次调用菜单时它都会被调用。例如，如果你想根据正在显示的数据禁用某些菜单或菜单组，就应该使用`onPrepareOptionsMenu`。在设计菜单功能时，你可能需要牢记这一点。\n\
  \n在进入对话框部分之前，我们还需要介绍菜单的另一个重要方面。Android 支持使用 XML 文件创建菜单。下一个高级主题将专门探讨 Android 中的 XML\
  \ 菜单支持。\n\n### 通过 XML 文件加载菜单\n\n到目前为止，我们一直以编程方式创建所有菜单。这并不是创建菜单最便捷的方式，因为对于每个菜单，你都必须提供多个\
  \ ID，并为每个 ID 定义常量。你无疑会发现这很繁琐。\n\n相反，你可以通过 XML 文件定义菜单，这在 Android 中是可行的，因为菜单也是一种资源。使用\
  \ XML 方法创建菜单有若干优势，例如能够为菜单命名、自动排序以及分配 ID。你还可以利用菜单文本的本地化支持。\n\n请按照以下步骤使用基于 XML 的菜单：\n\
  \n1. 定义包含菜单标签的 XML 文件。\n2. 将该文件放置在`/res/menu`子目录中。文件名可以任意设定，并且你可以根据需要放置任意数量的文件。Android\
  \ 会自动为此菜单文件生成一个资源 ID。\n3. 使用该菜单文件的资源 ID 将 XML 文件加载到菜单中。\n4. 使用为每个菜单项生成的资源 ID 来响应菜单项。\n\
  \n我们将在以下各节中逐一介绍这些步骤，并提供相应的代码片段。\n\n#### XML 菜单资源文件的结构\n\n首先，我们来看一个包含菜单定义的 XML 文件（见代码清单\
  \ 7–20）。所有菜单文件都以相同的高级`menu`标签开头，后跟一系列`group`标签。每个`group`标签对应本章开头讨论过的菜单项组。你可以使用`@+id`方法为组指定\
  \ ID。每个菜单组将包含一系列菜单项，这些菜单项的 ID 与符号名称相关联。你可以参考 Android SDK 文档，了解这些 XML 标签所有可能的参数。\n\
  \n**代码清单 7–20.** *包含菜单定义的 XML 文件*\n\n```\n<menu >\n    <!-- 该组使用默认类别。 -->\n    <group\
  \ android:id=\"@+id/menuGroup_Main\">\n\n        <item android:id=\"@+id/menu_testPick\"\
  \n            android:orderInCategory=\"5\"\n            android:title=\"测试选取\"\
  \ />\n        <item android:id=\"@+id/menu_testGetContent\"\n            android:orderInCategory=\"\
  5\"\n            android:title=\"测试获取内容\" />\n        <item android:id=\"@+id/menu_clear\"\
  \n            android:orderInCategory=\"10\"\n            android:title=\"清除\" />\n\
  \        <item android:id=\"@+id/menu_dial\"\n            android:orderInCategory=\"\
  7\"\n            android:title=\"拨号\" />\n        <item android:id=\"@+id/menu_test\"\
  \n            android:orderInCategory=\"4\"\n            android:title=\"@+string/test\"\
  \ />\n        <item android:id=\"@+id/menu_show_browser\"\n            android:orderInCategory=\"\
  5\"\n            android:title=\"显示浏览器\" />\n    </group>\n</menu>\n```\n\n代码清单\
  \ 7–20 中的菜单 XML 文件包含一个组。基于资源 ID 定义`@+id/menuGroup_main`，该组将在`R.java`资源 ID 文件中被自动分配一个名为`menuGroup_main`的资源\
  \ ID。类似地，所有子菜单项都会根据此 XML 文件中的符号资源 ID 定义被分配菜单项 ID。\n\n#### 填充 XML 菜单资源文件\n\n假设这个\
  \ XML 文件名为`my_menu.xml`。你需要将此文件放在`/res/menu`子目录中。将文件放在`/res/menu`目录下会自动生成一个名为`R.menu.my_menu`的资源\
  \ ID。\n\n现在，让我们来看看如何使用这个菜单资源 ID 来填充选项菜单。Android 提供了一个名为`android.view.MenuInflater`的类，用于从\
  \ XML 文件填充`Menu`对象。我们将使用此`MenuInflater`的一个实例，利用`R.menu.my_menu`资源 ID 来填充菜单对象：\n\n\
  ```\n@Override\npublic boolean onCreateOptionsMenu(Menu menu)\n{\n   MenuInflater\
  \ inflater = getMenuInflater(); // 来自 activity\n   inflater.inflate(R.menu.my_menu,\
  \ menu);\n\n   // 必须返回 true 才能看到菜单\n   return true;   \n\n}\n```\n\n在这段代码中，我们首先从`Activity`类获取`MenuInflater`，然后告诉它直接将菜单\
  \ XML 文件填充到菜单中。\n\n\n\n##### 响应基于 XML 的菜单项\n\n你尚未看到这种方法的具体优势——当你开始响应菜单项时，优势便会显现出来。响应\
  \ XML 菜单项的方式与响应以编程方式创建的菜单类似，但略有不同。和之前一样，你需要在 `onOptionsItemSelected` 回调方法中处理菜单项。这次，你将得到\
  \ Android 资源系统的帮助（关于资源的详细信息，请参见第 3 章）。正如我们在“XML 菜单资源文件的结构”一节中提到的，Android 不仅会为 XML\
  \ 文件生成资源 ID，还会生成必要的菜单项 ID，以帮助你区分不同的菜单项。这在响应菜单项时是一个优势，因为你无需显式创建和管理菜单项 ID。\n\n为了进一步说明这一点，在使用\
  \ XML 菜单时，你无需为这些 ID 定义常量，也无需担心它们的唯一性，因为资源 ID 的生成机制已经处理了这些问题。以下代码展示了这一点：\n\n```\n\
  private void onOptionsItemSelected (MenuItem item)\n{\n   this.appendMenuItemText(item);\n\
  \   if (item.getItemId() == R.id.menu_clear)\n   {\n       this.emptyText();\n \
  \   }\n   else if (item.getItemId() == R.id.menu_dial)\n   {\n        //执行某些操作\n\
  \   }\n   else if (item.getItemId() == R.id.menu_testPick)\n   {\n        //执行某些操作\n\
  \   }\n  else if (item.getItemId() == R.id.menu_testGetContent)\n   {\n        //执行某些操作\n\
  \   }\n   else if (item.getItemId() == R.id.menu_show_browser)\n   {\n        //执行某些操作\n\
  \    }\n    ……等等\n}\n```\n\n请注意，来自 XML 菜单资源文件的菜单项名称，其对应的菜单项 ID 会自动生成在 `R.id` 命名空间中。\n\
  \n##### 其他 XML 菜单标签简介\n\n在构建 XML 文件时，你需要了解可能用到的各种 XML 标签。你可以通过查看 Android SDK 附带的\
  \ API 演示来快速获取这些信息。这些 Android API 演示包含一系列菜单，可帮助你探索 Android 编程的各个方面。如果你查看 `/res/menu`\
  \ 子目录，会发现许多 XML 菜单的示例。这里我们将简要介绍一些关键标签。\n\n###### 分组类别标签\n\n在 XML 文件中，你可以使用 `menuCategory`\
  \ 标签来指定分组的类别：\n\n```\n<group android:id=\"@+id/some_group_id \"\n        android:menuCategory=\"\
  secondary\">\n```\n\n###### 可勾选行为标签\n\n你可以使用 `checkableBehavior` 标签来控制分组级别的可勾选行为：\n\
  \n```\n<group android:id=\"@+id/noncheckable_group\"\n       android:checkableBehavior=\"\
  none\">\n```\n\n你可以使用 `checked` 标签来控制项目级别的可勾选行为：\n\n```\n<item android:id=\"..\"\
  \n      android:title=\"…\"\n      android:checked=\"true\" />\n```\n\n###### 模拟子菜单的标签\n\
  \n子菜单在菜单项下以 `menu` 元素的形式表示：\n\n```\n <item android:title=\"所有不含分组的项\">\n       \
  \ <menu>\n                   <item…>\n        </menu>\n </item>\n```\n\n###### 菜单图标标签\n\
  \n你可以使用 `icon` 标签为菜单项关联一张图片：\n\n```\n <item android:id=\".. \"\n        android:icon=\"\
  @drawable/some-file\" />\n```\n\n###### 菜单启用/禁用标签\n\n你可以使用 `enabled` 标签来启用或禁用菜单项：\n\
  \n```\n<item android:id=\".. \"\n         android:enabled=\"true\"\n        android:icon=\"\
  @drawable/some-file\" />\n```\n\n###### 菜单项快捷键\n\n你可以使用 `alphabeticShortcut` 标签为菜单项设置快捷键：\n\
  \n```\n <item android:id=\"… \"\n        android:alphabeticShortcut=\"a\"\n    \
  \   …>\n   </item>\n```\n\n###### 菜单可见性\n\n你可以使用 `visible` 标志来控制菜单项的可见性：\n\n```\n\
  <item android:id=\"… \"\n        android:visible=\"true\"\n       …>\n</item>\n\
  ```\n\n### 资源\n\n在学习和使用 Android 菜单时，你可能希望随时参考以下 URL。该 URL 指向本章的可下载项目。\n\n*   [`http://www.androidbook.com/projects`](http://www.androidbook.com/projects)：你可以使用此\
  \ URL 下载本章的专用测试项目。ZIP 文件的名称为 `ProAndroid3_ch07_TestMenus.zip`。\n\n### 总结\n\n本章解释了如何处理各种类型的\
  \ Android 菜单：常规菜单、上下文菜单、替代菜单以及基于 XML 的菜单。后续的多章内容，例如第 8 章（对话框）、第 16 章（2D 动画）和第 20\
  \ 章（OpenGL），都会使用 XML 菜单来测试相应章节介绍的功能。最后，特定于 3.0 版本的操作栏和菜单交互将在第 30 章中介绍。\n\n## 第 8\
  \ 章\n\n## 使用对话框\n\nAndroid SDK 提供了对对话框的广泛支持。Android 明确支持的对话框包括：警告、选择列表、单选、多选、进度、时间选择器和日期选择器对话框（此列表可能因\
  \ Android 版本而异）。Android 还支持用于其他需求的自定义对话框。本章的主要重点并非逐一介绍这些对话框，而是介绍 Android 对话框的底层架构。Android\
  \ 3.0 新增了基于 Fragment 的对话框。对话框的这一方面将在第 29 章（Fragment）中介绍。基于 Fragment 的对话框预计将逐步取代本章介绍的的传统对话框。不过，这些传统对话框目前尚未被弃用，并且仍然是手机上的标准做法。\n\
  \nAndroid 中的对话框是异步的，这提供了灵活性。但是，如果你习惯于对话框主要是同步的编程框架（例如 Microsoft Windows 或网页中的 JavaScript\
  \ 对话框），你可能会觉得异步对话框不太直观。\n\n在向您介绍了创建和使用 Android 对话框的基础知识之后，我们将提供一个直观的抽象，使异步对话框的使用变得更加容易。然后，我们将使用这个抽象来实现几个示例对话框。我们还在本章末尾的“参考资料”部分提供了一个可下载项目的链接。您可以使用此下载来试验本章介绍的代码和概念。\n\
  \n### 在 Android 中使用对话框\n\n如果你来自一个对话框是同步（特别是模态对话框）的环境，那么你需要以不同的方式思考 Android 对话框。Android\
  \ 中的对话框是异步的。不仅如此，它们还是*被管理的*；也就是说，它们在多次调用之间会被重用，这可能是为了帮助提高性能。\n\n\n\n#### 设计一个警告对话框\n\
  \n我们从警告对话框开始讨论。警告对话框通常包含有关表单验证的简单消息，有时（无论对错）也用于调试。请考虑以下你常在 HTML 页面中见到的调试示例：\n\n\
  ```\nif (validate(field1) == false)\n{\n   // 通过警告对话框指示格式无效\n   showAlert(\"你在 field1\
  \ 中输入的内容不符合要求的格式\");\n   // 将焦点设置到该字段\n   // ... 然后继续\n}\n```\n\n你可能会通过 JavaScript\
  \ 的 `alert` 函数来编写这个对话框，它会显示一个包含消息和“确定”按钮的同步对话框。用户点击“确定”按钮后，程序流程继续。这个对话框被认为是模态且同步的，因为在\
  \ `alert` 函数返回之前，下一行代码不会执行。\n\n这种类型的警告对话框对于调试很有用。但 Android 并没有提供如此直接的函数或对话框。相反，它支持一个*警告对话框构建器（alert-dialog\
  \ builder）*，这是一种用于构建和处理警告对话框的通用工具。因此，你可以使用 `android.app.AlertDialog.Builder` 类自行构建一个警告对话框。你可以使用这个构建器类来构造允许用户执行以下任务的对话框：\n\
  \n- 阅读消息并回答“是”或“否”。\n- 从列表中选择一个项目。\n- 从列表中选择多个项目。\n- 查看应用程序的进度。\n- 从一组选项中选择一个选项。\n\
  - 在继续程序之前响应一个提示。\n\n我们将向你展示如何构建其中一个对话框，并从一个菜单项中调用它。这种方法适用于任何此类对话框，包括以下步骤：\n\n1.\
  \ 构建一个 `Builder` 对象。\n2. 设置显示参数，例如按钮数量、项目列表等。\n3. 设置按钮的回调方法。\n4. 告诉 `Builder` 构建对话框。构建出的对话框类型取决于你在\
  \ `Builder` 对象上设置的内容。\n5. 使用 `dialog.show()` 显示对话框。\n\n代码清单 8–1 展示了实现这些步骤的代码。\n\n\
  **代码清单 8–1.** *构建并显示一个警告对话框*\n\n```\npublic class Alerts\n{\n   public static void\
  \ showAlert(String message, Context ctx)   \n   {\n// 创建一个构建器\n      AlertDialog.Builder\
  \ builder = new AlertDialog.Builder(ctx);\n      builder.setTitle(\"警告窗口\");\n\n\
  // 添加按钮和监听器\n      EmptyOnClickListener el = new EmptyOnClickListener();\n     \
  \ builder.setPositiveButton(\"确定\", el);\n\n// 创建对话框\n      AlertDialog ad = builder.create();\n\
  \n// 显示\n      ad.show();\n   }\n}\n\npublic class EmptyOnClickListener\nimplements\
  \ android.content.DialogInterface.OnClickListener {\n   public void onClick(DialogInterface\
  \ v, int buttonId)\n   {\n   }\n}\n```\n\n你可以通过在一个合适的测试 Activity（例如可下载的示例项目）中创建一个菜单项，并使用以下代码响应它来调用代码清单\
  \ 8–1 中的代码：\n\n```\nif (item.getItemId() == R.id.menu_simple_alert)\n{\n    Alerts.showAlert(\"\
  简单示例警告\", this);\n}\n```\n\n其结果（取决于你的测试 Activity）可能类似于图 8–1 中所示的屏幕。\n\n![images](img/0801.jpg)\n\
  \n**图 8–1.** *一个简单的警告对话框*\n\n这个简单警告对话框的代码很直接（如代码清单 8–1 及其后的代码片段所示）。即使是监听器部分也很容易理解。本质上，当按钮被点击时，我们什么也不做。\n\
  \n然而，值得注意的是，监听器接收到了一个指向 `DialogInterface` 的引用。这个引用指向了调用此回调的实际对话框。该接口支持许多被对话框类使用的常量、许多回调接口以及两个关键方法。这些方法是：\n\
  \n```\ncancel()\ndismiss()\n```\n\n通常，你不需要调用这些方法，因为按钮点击会根据需要自动调用它们。如果你想对这些方法调用做出响应，可以注册它们对应的回调。关于可用回调方法的完整列表，请参阅\
  \ `DialogInterface` 的 SDK 文档。\n\n在代码清单 8–1 中，我们只是创建了一个空的监听器并将其注册到“确定”按钮上。唯一奇怪的部分是你没有使用\
  \ `new` 来创建对话框；相反，你设置参数并让警告对话框构建器来创建它。\n\n#### 设计一个提示对话框\n\n既然你已经成功创建了一个简单的警告对话框，那么让我们来应对一个更高级的警告对话框：提示对话框。作为\
  \ JavaScript 的另一个标配，提示对话框向用户显示一个提示或问题，并通过编辑框请求输入。提示对话框将该字符串返回给程序，以便程序继续执行。这将是一个很好的学习示例，因为它展示了\
  \ `Builder` 类提供的许多功能，并使我们能够研究 Android 对话框的同步、异步、模态和非模态特性。\n\n以下是创建提示对话框所需的步骤：\n\n\
  1. 为你的提示对话框设计一个布局视图。\n2. 将布局加载到 `View` 类中。\n3. 构建一个 `Builder` 对象。\n4. 在 `Builder`\
  \ 对象中设置视图。\n5. 设置按钮及其回调以捕获输入的文本。\n6. 使用警告对话框构建器创建对话框。\n7. 显示对话框。\n\n现在，我们将展示每个步骤的代码。\n\
  \n##### 提示对话框的 XML 布局文件\n\n当我们显示提示对话框时，我们需要显示一个提示 `TextView`，后跟一个用户可用于输入回复的编辑框。代码清单\
  \ 8–2 包含了提示对话框的 XML 布局文件。如果你将此文件命名为 `prompt_layout.xml`，则需要将其放置在 `/res/layout` 子目录中，以生成一个名为\
  \ `R.layout.prompt_layout` 的资源 ID。\n\n**代码清单 8–2.** *prompt_layout.xml 文件*\n\n```\n\
  <LinearLayout\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  wrap_content\"\n    android:orientation=\"vertical\">\n\n    <TextView\n       \
  \ android:id=\"@+id/promptmessage\"\n        android:layout_height=\"wrap_content\"\
  \n        android:layout_width=\"wrap_content\"\n        android:layout_marginLeft=\"\
  20dip\"\n        android:layout_marginRight=\"20dip\"\n        android:text=\"在此处输入你的文本\"\
  \n        android:gravity=\"left\"\n        android:textAppearance=\"?android:attr/textAppearanceMedium\"\
  \ />\n\n    <EditText\n        android:id=\"@+id/editText_prompt\"\n        android:layout_height=\"\
  wrap_content\"\n        android:layout_width=\"fill_parent\"\n        android:layout_marginLeft=\"\
  20dip\"\n        android:layout_marginRight=\"20dip\"\n        android:scrollHorizontally=\"\
  true\"\n        android:autoText=\"false\"\n        android:capitalize=\"none\"\n\
  \        android:gravity=\"fill_horizontal\"\n        android:textAppearance=\"\
  ?android:attr/textAppearanceMedium\" />\n\n</LinearLayout>\n```\n\n\n\n### 使用用户视图设置提示对话框构建器\n\
  \n现在，我们将结合说明中的步骤 2 到 4 来创建一个提示对话框：加载 XML 视图并将其设置到提示对话框构建器中。Android 提供了一个名为 `android.view.LayoutInflater`\
  \ 的类，用于根据 XML 布局定义文件创建 `View` 对象。我们将使用 `LayoutInflater` 的实例，根据 XML 布局文件填充对话框的视图（参见代码清单\
  \ 8-3）。\n\n**代码清单 8-3.** *将布局填充到对话框中*\n\n```\nLayoutInflater li = LayoutInflater.from(activity);\n\
  //这里的‘activity’变量是您的 Activity 或 Context 的引用\nView view = li.inflate(R.layout.prompt_layout,\
  \ null);\n\n//获取一个构建器并设置视图\nAlertDialog.Builder builder = new AlertDialog.Builder(ctx);\n\
  builder.setTitle(\"Prompt\");\nbuilder.setView(view);\n```\n\n在代码清单 8-3 中，我们使用静态方法\
  \ `LayoutInflater.from(ctx)` 获取 `LayoutInflater`，然后使用 `LayoutInflater` 对象来填充 XML\
  \ 以创建 `View` 对象。接着，我们配置一个提示对话框构建器，为其设置标题和我们刚刚创建的视图。\n\n### 设置按钮和监听器\n\n现在我们进行到步骤\
  \ 5，设置按钮。您需要提供“确定”和“取消”按钮，以便用户能够响应提示。如果用户点击“取消”，程序无需读取提示的任何文本。如果用户点击“确定”，程序会从文本框中获取值并将其传回给\
  \ Activity。\n\n要设置这些按钮，您需要一个监听器来响应这些回调。我们将在“提示对话框监听器”部分提供监听器的代码，但首先请查看代码清单 8-4 中的按钮设置，这是代码清单\
  \ 8-3 的后续。\n\n**代码清单 8-4.** *设置“确定”和“取消”按钮*\n\n```\n      //添加按钮和监听器\n      PromptListener\
  \ pl = new PromptListener(view);\n      builder.setPositiveButton(\"OK\", pl);\n\
  \      builder.setNegativeButton(\"Cancel\", pl);\n```\n\n代码清单 8-4 中的代码假定监听器类的名称为\
  \ `PromptListener`。我们已经为每个按钮注册了这个监听器。`PromptListener` 类接收我们在代码清单 8-3 中构建的布局视图。稍后查看该类时，您会注意到\
  \ `view` 变量被用来标识文本控件并检索用户输入的内容。\n\n### 创建并显示提示对话框\n\n最后，我们完成步骤 6 和 7，即创建并显示提示对话框。一旦您有了提示对话框构建器，这很容易做到（参见代码清单\
  \ 8-5）。\n\n**代码清单 8-5.** *指示提示对话框构建器创建对话框*\n\n```\n      //获取对话框\n      AlertDialog\
  \ ad = builder.create();\n      ad.show();\n\n      //返回提示回复\n      return pl.getPromptReply();\n\
  ```\n\n最后一行使用监听器返回提示的回复。现在，我们将按承诺展示 `PromptListener` 类的代码。\n\n### 提示对话框监听器\n\n提示对话框通过一个名为\
  \ `PromptListener` 的监听器回调类与 Activity 交互。该类有一个名为 `onClick` 的回调方法，传递给 `onClick` 的按钮\
  \ ID 标识了点击的是哪种类型的按钮。其余代码很容易理解（参见代码清单 8-6）。当用户输入文本并点击“确定”按钮时，文本的值会被传递到 `promptReply`\
  \ 字段。否则，该值保持为 `null`。请注意我们是如何使用代码清单 8-2 中标识的提示对话框布局中的编辑文本控件 ID（`editText_prompt`）的。\n\
  \n**代码清单 8-6.** *PromptListener，监听器回调类*\n\n```\npublic class PromptListener\nimplements\
  \ android.content.DialogInterface.OnClickListener\n{\n   // 用于返回提示回复值的局部变量\n   private\
  \ String promptReply = null;\n\n   // 保留一个用于检索提示值的视图变量\n   View promptDialogView\
  \ = null;\n\n   // 在构造函数中接收视图\n   public PromptListener(View inDialogView)   {\n\
  \         promptDialogView = inDialogView;\n   }\n\n   // 来自对话框的回调方法\npublic void\
  \ onClick(DialogInterface v, int buttonId)   {\n         if (buttonId == DialogInterface.BUTTON_POSITIVE)\
  \      {\n              // 确定按钮\n              promptReply = getPromptText();\n\
  \      }\n      else      {\n         // 取消按钮\n         promptReply = null;\n  \
  \    }\n   }\n\n   // 只是编辑框内容的访问方法\n   private String getPromptText()   {\n    \
  \  EditText et =  (EditText)\n      promptDialogView.findViewById(R.id.editText_prompt);\n\
  \      return et.getText().toString();\n   }\n   public String getPromptReply()\
  \ { return promptReply; }\n}\n```\n\n### 整合所有代码\n\n现在我们已经解释了构成提示对话框的每一段代码，我们将把代码集中放在一处，以便您用来测试对话框（参见代码清单\
  \ 8-7）。我们排除了 `PromptListener` 类，因为它已单独出现在代码清单 8-6 中。\n\n**代码清单 8-7.** *用于测试提示对话框的代码*\n\
  \n```\npublic class Alerts\n{\n   public static String prompt(String message, Context\
  \ ctx)\n   {\n      // 加载某种视图\n      LayoutInflater li = LayoutInflater.from(ctx);\n\
  \      View view = li.inflate(R.layout.prompt_layout, null);\n\n      // 获取一个构建器并设置视图\n\
  \      AlertDialog.Builder builder = new AlertDialog.Builder(ctx);\n      builder.setTitle(\"\
  Prompt\");\n      builder.setView(view);\n\n      // 添加按钮和监听器\n      PromptListener\
  \ pl = new PromptListener(view);\n      builder.setPositiveButton(\"OK\", pl);\n\
  \      builder.setNegativeButton(\"Cancel\", pl);\n\n      // 获取对话框\n      AlertDialog\
  \ ad = builder.create();\n\n      // 显示\n      ad.show();\n\n      return pl.getPromptReply();\n\
  \   }\n}\n```\n\n您可以通过在合适的测试工具中创建一个菜单项，并使用以下代码响应该菜单项来调用代码清单 8-7 中的代码：\n\n```\nif\
  \ (item.getItemId() == R.id.your_menu_item_id)\n{\n    String  reply = Alerts.showPrompt(\"\
  Your text goes here\", this);\n}\n```\n\n结果将类似于图 8-2 所示的屏幕。\n\n![images](img/0802.jpg)\n\
  \n**图 8-2.** *一个简单的提示对话框*\n\n然而，在编写完所有这些代码后，您会注意到提示对话框总是返回 `null`，即使用户在其中输入了文本。事实证明，在以下代码中，`show()`\
  \ 方法会异步调用对话框：\n\n```\nad.show() //dialog.show\nreturn pl.getPromptReply(); // listener.getpromptReply()\n\
  ```\n\n这意味着 `getPromptReply()` 方法（参见代码清单 8-6）会在用户有时间输入文本并点击“确定”按钮之前就被调用来获取提示值。我们代码中的这个错误揭示了\
  \ Android 对话框的本质核心。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\
  ---\n\n\n### Android 中对话框的本质\n\n正如我们之前提到的，在 Android 中显示对话框是一个异步过程。一旦对话框显示出来，调用该对话框的主线程就会返回并继续处理后续代码。但这并不意味着对话框不是模态的。对话框仍然是模态的。鼠标点击仅作用于对话框，而父\
  \ Activity 则会回到它的消息循环中。\n\n在某些窗口系统中，模态对话框的行为略有不同。调用方会被阻塞，直到用户通过对话框提供响应。（这种阻塞可以是虚拟阻塞而非真实阻塞）。在\
  \ Windows 操作系统上，消息分发线程开始将消息分发给对话框，并暂停向父窗口分发消息。当对话框关闭时，线程会返回到父窗口。这使得调用变成了同步的。\n\n\
  这种方法可能不适用于手持设备，因为设备上意外事件更频繁，主线程需要响应这些事件。为了实现这种响应级别，Android 会立即将主线程返回到它的消息循环中。\n\n\
  这种模型带来的影响是，你不能简单地创建一个对话框来请求响应，并在继续执行之前等待它。实际上，你的对话框编程模型必须有所不同，并且需要包含回调。\n\n### 重新架构提示对话框\n\
  \n让我们重新审视之前提示对话框实现中有问题的代码：\n\n```\nif (item.getItemId() == R.id.your_menu_id)\n\
  {\n    String  reply = Alerts.showPrompt(\"Your text goes here\", this);\n}\n```\n\
  \n正如我们已验证的，字符串变量 `reply` 的值将是 `null`，因为由 `Alerts.showPrompt()` 启动的提示对话框无法在同一线程上返回值。实现这一点的唯一方法是让\
  \ Activity 直接实现回调方法，而不依赖于 `PromptListener` 类。你可以在 `Activity` 类中通过实现 `OnClickListener`\
  \ 来实现这一点：\n\n```\npublic class SampleActivity extends Activity\nimplements android.content.DialogInterface.OnClickListener\n\
  {\n…… other code\n\nif (item.getItemId() == R.id.your_menu_id)\n{\n    Alerts.showPrompt(\"\
  Your text goes here\", this);\n}\n…..\npublic void onClick(DialogInterface v, int\
  \ buttonId)\n{\n       //想办法从这里读取对话框中的回复字符串\n}\n```\n\n正如你从这个 `onClick` 回调方法中看到的，你可以正确地读取实例化对话框中的变量，因为当这个方法被调用时，用户已经关闭了对话框。\n\
  \n以这种方式使用对话框是完全合理的。但是，Android 提供了一种补充机制，通过引入*托管式对话框* —— 即在多次调用之间可复用的对话框 —— 来优化性能。不过，在使用托管式对话框时，你仍然需要使用回调。实际上，你在实现提示对话框时所学的所有内容都将帮助你使用托管式对话框并理解其背后的动机。只要\
  \ Activity 的视图状态保持不变，这些托管式对话框还允许 Android 管理对话框在多次调用之间的状态。\n\n### 使用托管式对话框\n\nAndroid\
  \ 遵循托管式对话框协议，以促进复用先前创建的对话框实例，而不是根据操作创建新的对话框。在本节中，我们将讨论托管式对话框协议的细节，并向你展示如何将提醒对话框实现为托管式对话框。然而，在我们看来，托管式对话框协议使得使用对话框变得繁琐。随后，我们将开发一个小型框架来抽象掉该协议的大部分内容，以便更轻松地使用托管式对话框。\n\
  \n#### 理解托管式对话框协议\n\n托管式对话框协议的主要目标是，如果一个对话框被第二次或随后再次调用，则将其复用。这类似于在 Java 中使用对象池。托管式对话框协议包含以下步骤：\n\
  \n1.  为你想要创建和使用的每个对话框分配一个唯一的 ID。假设其中一个对话框被标记为 1。\n2.  告诉 Android 显示一个名为 1 的对话框。\n\
  3.  Android 检查当前 Activity 是否已有一个标记为 1 的对话框。如果该对话框存在，Android 会显示它，而不会重新创建它。在显示对话框之前，Android\
  \ 会调用 `onPrepareDialog()` 函数以进行清理。\n4.  如果对话框不存在，Android 会通过传递对话框 ID（此处为 1）来调用 `onCreateDialog()`\
  \ 方法。\n5.  作为程序员，你需要重写 `onCreateDialog()` 方法。你必须使用提醒对话框构建器（alert-dialog builder）创建对话框并返回它。但在创建对话框之前，你的代码需要确定需要创建哪个对话框\
  \ ID。你需要一个 switch 语句来解决这个问题。\n6.  Android 显示对话框。\n7.  对话框在按钮被点击时调用回调。\n\n让我们使用此协议，将我们的非托管式提醒对话框重新实现为托管式提醒对话框。\n\
  \n\n\n#### 将非托管对话框重构为托管对话框\n\n我们将按照重构警告对话框的每个步骤进行操作。首先，在特定活动的上下文中为此对话框定义一个唯一 ID：\n\
  \n```\n// 唯一的对话框 ID\nprivate static final int DIALOG_ALERT_ID = 1;\n```\n\n这非常简单。我们刚刚创建了一个\
  \ ID 来表示对话框，以协调回调函数。这个 ID 将允许我们响应菜单项时执行以下操作：\n\n```\n      someactivity.showDialog(this.DIALOG_ALERT_ID);\n\
  ```\n\nAndroid SDK 方法 `showDialog()` 会触发对活动类的 `onCreateDialog()` 方法的调用。Android 足够智能，不会重复调用\
  \ `onCreateDialog()`。当此方法被调用时，我们需要创建对话框并将其返回给 Android。然后 Android 会在内部保留已创建的对话框以供重用。以下是基于唯一\
  \ ID 创建对话框的示例代码：\n\n```\npublic class SomeActivity extends Activity {\n...\n   \
  \ @Override\n    protected Dialog onCreateDialog(int id) {\n        switch (id)\
  \ {\n            case DIALOG_ALERT_ID:\n               return createAlertDialog();\n\
  \        }\n        return null;\n    }\n\n    private Dialog createAlertDialog()\n\
  \    {\n       AlertDialog.Builder builder = new AlertDialog.Builder(this);\n  \
  \     builder.setTitle(\"Alert\");\n       builder.setMessage(\"some message\");\n\
  \       EmptyOnClickListener emptyListener = new EmptyOnClickListener();\n     \
  \  builder.setPositiveButton(\"Ok\", emptyListener );\n       AlertDialog ad = builder.create();\n\
  \       return ad;\n    }\n```\n\n请注意 `onCreateDialog()` 如何通过识别传入的 ID 来匹配对应的对话框。`createAlertDialog()`\
  \ 本身被放在一个单独的函数中，与前面章节描述的警告对话框创建流程类似。这段代码同样使用了我们处理警告对话框时用到的 `EmptyOnClickListener`。\n\
  \n由于对话框只会创建一次，如果你希望在每次显示对话框时更改其中的某些内容，就需要一种机制。你可以通过 `onPrepareDialog()` 回调方法来实现：\n\
  \n```\n    @Override\n    protected void onPrepareDialog(int id, Dialog dialog)\
  \ {\n        switch (id) {\n        case DIALOG_ALERT_ID:\n           prepareAlertDialog(dialog);\n\
  \        }\n    }\n\n    private void prepareAlertDialog(Dialog d)    {\n      \
  \ AlertDialog ad = (AlertDialog)d;\n       //更改此对话框的某些内容\n    }\n```\n\n有了这段代码，`showDialog(1)`\
  \ 就能正常工作。即使你多次调用此方法，`onCreateMethod()` 也只会被调用一次。你可以遵循相同的协议来重新实现提示对话框。\n\n响应对话框回调已经需要一定工作量，而托管对话框协议则增加了更多工作。在研究了托管对话框协议之后，我们想到了将其抽象化并重新组织，以实现两个目标：\n\
  \n- 将对话框的标识和创建从活动类中移出\n- 将对话框的创建和响应集中在一个专门的对话框类中\n\n在下一小节中，我们将介绍此框架的设计，然后使用它重新创建警告对话框和提示对话框。\n\
  \n#### 简化托管对话框协议\n\n你可能已经注意到，使用托管警告对话框可能会变得混乱，并污染主代码。如果我们把这个协议抽象成一个更简单的协议，新协议可能如下所示：\n\
  \n1.  使用 `new` 创建所需对话框的实例，并将其保留为局部变量。称之为 `dialog1`。\n2.  使用 `dialog1.show()` 显示对话框。\n\
  3.  在活动中实现一个名为 `dialogFinished()` 的方法。\n4.  在 `dialogFinished()` 方法中，从 `dialog1`\
  \ 读取属性，例如 `dialog1.getValue1()`。\n\n在此方案下，显示托管警告对话框将如下所示：\n\n```\n….class MyActivity\
  \ ….\n{\n   //新建对话框\n   ManagedAlertDialog  mad = new ManagedAlertDialog(\"message\"\
  , …, .. );\n\n  ….某个菜单方法\n  if (item.getItemId() == R.id.your_menu_id)\n  {\n  \
  \   //显示对话框\n    mad.show();\n  }\n  …..\n  //如果需要，访问 mad 对话框的内部状态\n  dialogFinsihed()\n\
  \  {\n    ….\n    //使用对话框中的值\n     mad.getA();\n     mad.getB();\n  }\n}\n```\n\n\
  我们认为这是一个更简单的对话框处理模型。此方法的明显优势如下：\n\n- 无需分配或记忆任意的对话框 ID。\n- 无需用对话框创建代码污染活动主代码。\n-\
  \ 可以直接使用派生的对话框对象来访问值。\n\n这种抽象的原理是如何工作的？第一步，我们将对话框的创建和准备抽象到一个标识基础对话框的类中。我们称这个接口为\
  \ `IDialogProtocol`。这个对话框接口也直接包含一个 `show()` 方法。这些对话框被收集并保存在活动基类的注册表中，并使用它们的 ID 作为键。基活动会根据\
  \ ID 对 `onCreate`、`onPrepare` 和 `onClick` 调用进行解复用，并将它们路由到对话框类。此架构如图 8-3 所示。\n\n\
  ![图片](img/0803.jpg)\n\n**图 8-3.** *一个简单的托管对话框框架*\n\n清单 8-8 说明了此框架的实用性。关键类（包括 `GenericPromptDialog`\
  \ 和 `GenericManagedAlertDialog`）的源代码将在本章后续部分提供。不过，我们没有包含完整的驱动类，仅展示了清单 8-8 中的要点。你可以使用本章“参考资料”部分中的下载链接，查看驱动本章所述各种对话框的驱动类。\n\
  \n**清单 8-8.** *托管对话框协议的抽象*\n\n```\npublic class MainActivity extends ManagedDialogsActivity\n\
  {\n   //对话框 1\n   private GenericManagedAlertDialog gmad =\n      new GenericManagedAlertDialog(this,1,\"\
  InitialValue\");\n\n   //对话框 2\n   private GenericPromptDialog gmpd =\n      new\
  \ GenericPromptDialog(this,2,\"InitialValue\");\n\n   //启动对话框的菜单项   \n   if (item.getItemId()\
  \ == R.id.your_menu_id1)\n   {\n      gmad.show();\n   }\n   else if (item.getItemId()\
  \ == R.id.your_menu_id2)\n   {\n       gmpd.show();\n   }\n\n   //处理回调   \n   public\
  \ void dialogFinished(ManagedActivityDialog dialog, int buttonId)\n   {\n      if\
  \ (dialog.getDialogId() == gmpd.getDialogId())\n      {\n         //假设“gmpd”有一个获取回复字符串的访问方法\n\
  \         String replyString = gmpd.getReplyString();\n      }\n   }\n}\n```\n\n\
  要使用此框架，你首先需要扩展 `ManagedDialogsActivity`。然后，实例化你需要的对话框，每个对话框都派生自 `ManagedActivityDialog`。在菜单项响应中，你可以直接在这些对话框上调用\
  \ `show()` 方法。对话框本身会预先获取必要的参数以便创建和显示。尽管我们传递了一个对话框 ID，但不再需要记忆这些 ID。如果你愿意，甚至可以将这些\
  \ ID 完全抽象掉。\n\n现在，我们将逐一探讨图 8-3 中展示的每个类。你也可以在本章的下载文件中看到这些清单。如果你打算编译这些代码，我们强烈建议你下载该项目。如果你选择不下载，重构项目的大部分代码已在此处提供；你可能需要自行补充缺失的部分。\n\
  \n\n\n### IDialogProtocol\n\n`IDialogProtocol`接口定义了托管对话框的规范。托管对话框的职责包括创建对话框并在每次显示时准备它。同时，将`show`功能委托给对话框本身也是合理的。对话框还必须识别按钮点击，并调用相应的父级来关闭对话框。以下接口代码将这些概念表示为一组函数：\n\
  \n```\npublic interface IDialogProtocol\n{\n    public Dialog create();\n    public\
  \ void prepare(Dialog dialog);\n    public int getDialogId();\n    public void show();\n\
  \    public void onClickHook(int buttonId);\n}\n```\n\n### ManagedActivityDialog\n\
  \n抽象类`ManagedActivityDialog`为所有想要实现`IDialogProtocol`接口的对话框类提供了通用实现。它将`create`和`prepare`函数留给基类重写，但为其余`IDialogProtocol`方法提供了实现。`ManagedActivityDialog`还会在响应按钮点击事件后通知父\
  \ Activity 对话框已完成。它使用模板钩子模式，允许派生类特化`onClickHook`方法。该类还负责将`show()`方法重定向到父 Activity，从而为`show()`提供更自然的实现。您可以将`ManagedActivityDialog`类用作所有新对话框的基类（参见清单\
  \ 8-9）。\n\n**清单 8-9. ManagedActivityDialog 类**\n\n```\npublic abstract class ManagedActivityDialog\
  \ implements IDialogProtocol\n    ,android.content.DialogInterface.OnClickListener\n\
  \n{\n    private ManagedDialogsActivity mActivity;\n    private int mDialogId;\n\
  \    public ManagedActivityDialog(ManagedDialogsActivity a, int dialogId)\n    {\n\
  \        mActivity = a;\n        mDialogId = dialogId;\n    }\n    public int getDialogId()\n\
  \    {\n        return mDialogId;\n    }\n    public void show()\n    {\n      \
  \  mActivity.showDialog(mDialogId);\n    }\n    public void onClick(DialogInterface\
  \ v, int buttonId)\n    {\n        onClickHook(buttonId);\n        this.mActivity.dialogFinished(this,\
  \ buttonId);\n    }\n}\n```\n\n### DialogRegistry\n\n`DialogRegistry`类负责两件事。它维护对话框\
  \ ID 与实际对话框（工厂）实例之间的映射。它还使用 ID 到对象的映射，将通用的`onCreate`和`onPrepare`调用转换为特定对话框。`ManagedDialogsActivity`使用`DialogRegistry`类作为仓库来注册新对话框（参见清单\
  \ 8-10）。\n\n**清单 8-10. DialogRegistry 类**\n\n```\npublic class DialogRegistry\n\
  {\n   SparseArray<IDialogProtocol> idsToDialogs\n                              =\
  \ new SparseArray();\n\n   public void registerDialog(IDialogProtocol dialog)\n\
  \   {\n      idsToDialogs.put(dialog.getDialogId(),dialog);\n   }\n\n   public Dialog\
  \ create(int id)\n   {\n      IDialogProtocol dp = idsToDialogs.get(id);\n     \
  \ if (dp == null) return null;\n\n      return dp.create();\n   }\n   public void\
  \ prepare(Dialog dialog, int id)\n   {\n      IDialogProtocol dp = idsToDialogs.get(id);\n\
  \      if (dp == null)\n      {\n         throw new RuntimeException(\"Dialog id\
  \ is not registered:\" + id);\n      }\n      dp.prepare(dialog);\n   }\n}\n```\n\
  \n### ManagedDialogsActivity\n\n`ManagedDialogsActivity`类作为支持托管对话框的 Activity 的基类。它维护一个`DialogRegistry`实例来跟踪由`IDialogProtocol`接口标识的托管对话框。它允许派生\
  \ Activity 通过`registerDialogs()`函数注册其对话框。如图 8-3 所示，它还负责通过定位对话框注册表中的对话框实例，将`create`和`prepare`语义传递给相应的对话框实例。最后，它为对话框注册表中的每个对话框提供回调方法`dialogFinished`（参见清单\
  \ 8-11）。\n\n**清单 8-11. ManagedDialogsActivity 类**\n\n```\npublic class ManagedDialogsActivity\
  \ extends Activity\n             implements IDialogFinishedCallBack\n{\n   //A registry\
  \ for managed dialogs\n    private DialogRegistry dr = new DialogRegistry();\n\n\
  \    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        this.registerDialogs();\n    }\n\n    protected void registerDialogs()\n\
  \    {\n       // does nothing\n       // have the derived classes override this\
  \ method\n       // to register their dialogs\n       // example:\n       // registerDialog(this.DIALOG_ALERT_ID_3,\
  \ gmad);\n\n    }\n    public void registerDialog(IDialogProtocol dialog)\n    {\n\
  \       this.dr.registerDialog(dialog);\n    }\n\n    @Override\n    protected Dialog\
  \ onCreateDialog(int id) {\n               return this.dr.create(id);\n    }\n \
  \   @Override\n    protected void onPrepareDialog(int id, Dialog dialog) {\n   \
  \           this.dr.prepare(dialog, id);\n    }\n\n   public void dialogFinished(ManagedActivityDialog\
  \ dialog, int buttonId)\n   {\n      //nothing to do\n      //have derived classes\
  \ override this\n   }\n}\n```\n\n### IDialogFinishedCallBack\n\n`IDialogFinishedCallBack`接口允许`ManagedActivityDialog`类通知父\
  \ Activity 对话框已完成，并且父 Activity 可以调用对话框上的方法来检索参数。通常，`ManagedDialogsActivity`实现此接口并作为`ManagedActivityDialog`的父\
  \ Activity（参见清单 8-12）。\n\n**清单 8-12. IDialogFinishedCallBack 接口**\n\n```\npublic\
  \ interface IDialogFinishedCallBack\n{\n      public static int OK_BUTTON = -1;\n\
  \      public static int CANCEL_BUTTON = -2;\n      public void dialogFinished(ManagedActivityDialog\
  \ dialog, int buttonId);\n}\n```\n\n### GenericManagedAlertDialog\n\n`GenericManagedAlertDialog`是警告对话框的实现；它扩展了`ManagedActivityDialog`。该类负责使用警告对话框构建器创建实际的警告对话框。它还携带所需的所有信息作为局部变量。由于`GenericManagedAlertDialog`实现了一个简单的警告对话框，它在`onClickHook`方法中不执行任何操作。需要注意的是，当您使用这种方法时，`GenericManagedAlertDialog`将所有相关信息封装在一个地方（参见清单\
  \ 8-13）。这使得 Activity 中的主线代码保持简洁。\n\n**清单 8-13. GenericManagedAlertDialog 类**\n\n\
  ```\npublic class GenericManagedAlertDialog extends ManagedActivityDialog\n{\n \
  \  private String alertMessage = null;\n   private Context ctx = null;\n   public\
  \ GenericManagedAlertDialog(ManagedDialogsActivity inActivity,\n               \
  \              int dialogId,\n                             String initialMessage)\n\
  \   {\n      super(inActivity,dialogId);\n      alertMessage = initialMessage;\n\
  \      ctx = inActivity;\n   }\n   public Dialog create()\n   {\n       AlertDialog.Builder\
  \ builder = new AlertDialog.Builder(ctx);\n       builder.setTitle(\"Alert\");\n\
  \       builder.setMessage(alertMessage);\n       builder.setPositiveButton(\"Ok\"\
  , this );\n       AlertDialog ad = builder.create();\n       return ad;\n   }\n\n\
  \   public void prepare(Dialog dialog)\n   {\n       AlertDialog ad = (AlertDialog)dialog;\n\
  \       ad.setMessage(alertMessage);\n   }\n   public void setAlertMessage(String\
  \ inAlertMessage)\n   {\n      alertMessage = inAlertMessage;\n   }\n   public void\
  \ onClickHook(int buttonId)\n   {\n      //nothing to do\n      //no local variables\
  \ to set\n   }\n}\n```\n\n\n\n### GenericPromptDialog（通用提示对话框）\n\n`GenericPromptDialog`\
  \ 类通过扩展 `ManagedActivityDialog` 类，并提供必要的 `create` 和 `prepare` 方法（参见清单 8–14），封装了提示对话框的所有需求。你还可以看到，它将回复文本保存在一个局部变量中，以便父\
  \ Activity 可以在 `dialogFinished` 回调方法中获取该文本。\n\n**清单 8–14.** *GenericPromptDialog\
  \ 类*\n\n```\npublic class GenericPromptDialog extends ManagedActivityDialog\n{\n\
  \   private String mPromptMessage = null;\n   private View promptView = null;\n\
  \   String promptValue = null;\n\n   private Context ctx = null;\n   public GenericPromptDialog(ManagedDialogsActivity\
  \ inActivity,\n         int dialogId,\n         String promptMessage)\n   {\n  \
  \    super(inActivity,dialogId);\n      mPromptMessage = promptMessage;\n      ctx\
  \ = inActivity;\n   }\n   public Dialog create()\n   {\n       LayoutInflater li\
  \ = LayoutInflater.from(ctx);\n       promptView = li.inflate(R.layout.promptdialog,\
  \ null);\n       AlertDialog.Builder builder = new AlertDialog.Builder(ctx);\n \
  \      builder.setTitle(\"prompt\");\n       builder.setView(promptView);\n    \
  \   builder.setPositiveButton(\"OK\", this);\n       builder.setNegativeButton(\"\
  Cancel\", this);\n       AlertDialog ad = builder.create();\n       return ad;\n\
  \   }\n\n   public void prepare(Dialog dialog)\n   {\n      //暂时不做任何操作\n   }\n \
  \  public void onClickHook(int buttonId)\n   {\n      if (buttonId == DialogInterface.BUTTON1)\n\
  \      {\n         //确定按钮\n         String promptValue = getEnteredText();\n   \
  \   }\n   }\n   private String getEnteredText()   \n   {\n      EditText et =\n\
  \         (EditText)\n         promptView.findViewById(R.id.editText_prompt);\n\
  \      String enteredText = et.getText().toString();\n      Log.d(\"xx\",enteredText);\n\
  \      return enteredText;\n   }\n}\n```\n\n这里介绍的框架需要在设备配置更改导致 Activity 重建时进行一些调整。主要的更改涉及使用保存实例和恢复实例的方法来重新创建对话框对象。由于这些对话框将被基于\
  \ Fragment 的对话框（详见第 29 章）所取代，我们并未提供必要的更改来使这些对话框在设备配置更改时保持持久化。\n\n### 使用 Toast\n\n\
  我们在本章开头介绍了“提示”消息如何常用于调试错误页面上的 JavaScript。如果你被迫使用类似的方法来处理不频繁的调试消息，可以在 Android 中使用\
  \ `Toast` 对象。\n\n`Toast` 就像一个提示对话框，它会显示一条消息，持续一定时间后自动消失。因此可以说它是一种瞬态提示消息。\n\n清单 8–15\
  \ 展示了如何使用 `Toast` 显示消息的示例。\n\n**清单 8–15.** *使用 Toast 进行调试*\n\n```\n//创建一个函数，将消息封装为\
  \ toast\n//显示 toast\npublic void reportToast(String message)\n{\n    String s =\
  \ tag + \":\" + message;\n    Toast mToast = Toast.makeText(activity, s, Toast.LENGTH_SHORT);\n\
  \    mToast.show();\n    Log.d(tag,message);\n}\n\n//你可以根据需要多次调用上述函数\n//如下所示\nprivate\
  \ void testToast()\n{\n    reportToast(\"Message1\");\n    reportToast(\"Message2\"\
  );\n    reportToast(\"Message3\");\n}\n```\n\n清单 8–14 中的 `makeText()` 方法不仅可以接收 Activity，还可以接收任何上下文对象，例如传递给广播接收器或服务的上下文。这扩展了\
  \ `Toast` 在 Activity 之外的使用范围。\n\n### 资源参考\n\n*   [`http://developer.android.com/guide/topics/ui/dialogs.html`](http://developer.android.com/guide/topics/ui/dialogs.html)：这份\
