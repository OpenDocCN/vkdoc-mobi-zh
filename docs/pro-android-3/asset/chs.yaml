  \ OpenGL ES 20 三角形的所有示例代码包含在可下载的项目中。该三角形包含了 OpenGL ES 2.0 所需的所有步骤。\n\n### 编译代码的说明\n\
  \n尝试本章列出的代码的最佳方式是下载专门为本章准备的 ZIP 文件。该文件的 URL 列在“参考文献”部分。这里列出的每个类文件都在 ZIP 文件中。如果你想直接根据清单编写程序，我们已将所有文件包含在此。可能缺少一些资源，例如起始图标等。如果你不确定如何连接这些资源，请下载\
  \ ZIP 文件。\n\n### 总结\n\n我们在 OpenGL 中涵盖了大量的内容——特别是如果你是 OpenGL 编程的新手。我们愿意认为这是一篇很好的\
  \ OpenGL 入门章节，不仅适用于 Android，也适用于任何其他 OpenGL 系统。\n\n在本章中，你学习了 OpenGL 的基础知识。你学习了 Android\
  \ 特有的 API，这些 API 允许你使用 OpenGL 标准 API。你处理了形状和纹理，并学习了如何使用绘制管线绘制多个图形。你接触了 OpenGL ES\
  \ 2.0、其着色语言、与 OpenGL 1.0 的基本区别，以及一组进一步探索 OpenGL ES 2.0 的参考资料。\n\n## 第 21 章\n\n##\
  \ 探索动态文件夹\n\n动态文件夹（Live folders）在 SDK 1.5 中引入，允许开发者在设备的默认主屏幕（我们将其称为设备的*主页面*）上公开内容提供者，例如联系人、笔记和媒体。当像\
  \ Android 联系人内容提供者这样的内容提供者作为动态文件夹公开在主屏幕上时，该动态文件夹将能够在联系人数据库中添加、删除或修改联系人时刷新自身。我们将解释什么是动态文件夹，如何实现它们，以及如何使它们“动态化”。\n\
  \n\n\n### 探寻动态文件夹\n\nAndroid 中的动态文件夹之于内容提供者，就如同 RSS 阅读器之于发布信息的网站。我们在第 4 章中提到，内容提供者类似于根据\
  \ URI 提供信息的网站。随着网站大量涌现，每个网站都以独特的方式发布信息，因此需要聚合来自多个网站的信息，以便用户能通过一个统一的阅读器来追踪动态。RSS\
  \ 在不同信息集合中发现了共同的模式。只要内容具有统一的结构，这种共同模式就允许我们设计一个能读取任何内容的阅读器。\n\n动态文件夹在概念上并无太大差异。就像\
  \ RSS 阅读器为网站发布的内容提供统一接口一样，动态文件夹为 Android 中的内容提供者定义了一个统一接口。只要内容提供者或其封装器能够满足此协议，Android\
  \ 就可以在设备主屏幕上创建一个代表该内容提供者的动态文件夹图标。当用户点击此动态文件夹图标时，系统会联系内容提供者。随后，内容提供者需要返回一个游标。根据动态文件夹的约定，此游标必须包含一组预定义的列。然后，这个游标会通过一个\
  \ `ListView` 或 `GridView` 进行可视化呈现。\n\n基于这种通用格式的理念，动态文件夹的工作方式如下：\n\n1.  首先，你在主屏幕上创建一个图标，代表来自某个内容提供者的一组数据行。通过指定一个\
  \ URI 和图标来建立此关联。\n2.  当用户点击该图标时，系统会获取这个 URI 并调用相应的内容提供者。内容提供者通过一个游标返回一组数据行。\n3.\
  \  只要这个游标包含动态文件夹所期望的列（例如，名称、描述以及点击该行时要调用的程序），系统就会将这些行呈现为 `ListView` 或 `GridView`。\n\
  4.  由于 `ListView` 和 `GridView` 能在底层数据存储发生变化时更新其数据，因此这些视图被称为*动态的*——由此得名*动态文件夹*。\n\
  \n动态文件夹遵循两个关键原则。第一个原则是游标间的列名是通用的。这个原则使得 Android 能够以统一的方式处理所有面向动态文件夹的游标。第二个原则是 Android\
  \ 视图知道如何查找底层游标数据的任何更新，并相应地调整自身。第二个原则并非动态文件夹所独有；事实上，这对于 Android 用户界面中的所有视图而言都是自然属性，尤其是那些依赖游标的视图。\n\
  \n现在我们已经介绍了动态文件夹的概念，接下来将系统地探讨动态文件夹框架。我们将分为两个主要部分来展开。在第一部分中，我们将审视动态文件夹的整体最终用户体验。这将进一步阐明动态文件夹的运作方式。\n\
  \n在第二部分中，我们将演示如何正确构建一个真正动态的文件夹。要使一个动态文件夹“动态”起来确实需要一些额外的工作，因此我们将探讨动态文件夹这个不那么显而易见的方面。\n\
  \n### 用户如何体验动态文件夹\n\n动态文件夹通过设备的主屏幕呈现给最终用户。用户通过执行类似于以下的步骤来使用动态文件夹：\n\n1.  访问设备的主屏幕。\n\
  2.  进入主屏幕的上下文菜单。你可以通过长按主屏幕上的空白区域来调出上下文菜单。\n3.  找到名为“文件夹”的上下文菜单选项，点击它以查看可用的动态文件夹。\n\
  4.  从列表中选择并点击你想要在主屏幕上显示的动态文件夹名称。这将在主屏幕上创建一个代表所选动态文件夹的图标。\n5.  点击步骤 4 中创建的动态文件夹图标，以在\
  \ `ListView` 或 `GridView` 中显示信息行（由该动态文件夹代表的数据）。\n6.  点击其中一行以调用能够显示该行数据的应用程序。\n7.\
  \  使用该应用程序显示的进一步菜单选项来查看或操作所需的项目。你也可以使用该应用程序的菜单选项来创建该应用程序允许的任何新项目。\n8.  请注意，动态文件夹的显示会自动反映对项目或项目集所做的任何更改。\n\
  \n我们将通过截图来引导你完成这些步骤。我们从步骤 1 开始：一个典型的 Android 主屏幕（参见图 21-1）。请注意，根据 Android 版本和你使用的设备，此主屏幕的外观可能略有不同。\n\
