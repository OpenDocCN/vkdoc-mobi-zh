  *   如果你急于借用一些代码来开始小部件开发，可以使用以下网址，其中收集了本书一位合著者整理的实用代码片段：[`http://www.androidbook.com/item/3300`](http://www.androidbook.com/item/3300)。\n\
  *   你还可以在以下链接找到编写本章时使用的研究笔记：[`www.androidbook.com/item/3299`](http://www.androidbook.com/item/3299)。\n\
  *   在 [`http://www.androidbook.com/projects`](http://www.androidbook.com/projects)\
  \ 处，你可以下载本章专用的测试项目。该 ZIP 文件的名称为 `ProAndroid3_ch22_TestWidgets.zip`。\n\n### 小结\n\n\
  在本章中，我们饶有兴致地探讨了 Android 主屏幕小部件所提供的各种可能性。这些简单的创意能够显著提升用户体验。\n\n我们介绍了小部件背后的理论，并给出了一个可运行的示例来说明其中的细微差别。我们详细阐述了小部件模型和状态管理的必要性，并希望我们提供的状态管理代码能用于你自己的小部件。最后，我们简要讨论了小部件的设计问题和局限性。关于\
  \ Android 3.0 中小部件的更多内容，请参阅第 31 章。\n\n## 第 23 章\n\n## Android 搜索\n\n在之前的第 21 章和第\
  \ 22 章中，我们介绍了两项基于主屏幕的 Android 创新功能。在第 21 章中，我们解释了动态文件夹如何驻留在主页面上，并提供对内容提供者中动态数据的快速访问。在第\
  \ 22 章中，我们探讨了主屏幕小部件，它们能够在主屏幕上展示信息的快照。\n\n延续*信息触手可及*这一主题，现在我们将介绍 Android 搜索框架。Android\
  \ 搜索框架功能强大。尽管 Android 搜索似乎仅在设备主屏幕上可用，但其影响力可以扩展到你应用程序中的 Activity。\n\n我们将从概述 Android\
  \ 搜索功能开始本章。我们将演示全局搜索、搜索建议、建议重写以及网络搜索。我们将展示如何在全局搜索中包含或排除本地应用程序。\n\n在概述其可用性之后，我们将探讨你应用程序中的\
  \ Activity 如何与搜索键集成。我们将处理那些未显式编程支持搜索的 Activity，并研究一个禁用搜索的 Activity。我们还将探讨一个名为“即输即搜”的主题，应用程序中的\
  \ Activity 可以使用它来调用搜索。我们同样会展示一个通过菜单项显式调用搜索的 Activity。\n\nAndroid 搜索可扩展性的关键在于一个名为*建议提供者*的概念。我们将探讨这一概念，并通过继承\
  \ Android 提供的一个基础建议提供者来编写一个简单的建议提供者。\n\n然而，你经常需要从头编写一个自定义的建议提供者。我们将讨论这一点，这会将我们带入\
  \ Android 搜索架构的核心。\n\n最后，我们将涵盖两个高级主题，并展示如何使用设备上的操作键，通过搜索建议来调用自定义操作。我们还将描述如何在调用搜索时向搜索传递特定于应用程序的数据。本章将以一系列参考资料作为结尾。\n\
  \n### Android 搜索体验\n\nAndroid 的搜索功能扩展了常见的基于网络的 Google 搜索栏，使其能够同时搜索设备本地的内容和基于互联网的外部内容。你还可以使用此搜索机制，从主页面的搜索栏直接启动应用程序。Android\
  \ 通过提供一个允许本地应用程序参与的搜索框架，使这些功能成为可能。\n\nAndroid 搜索协议很简单。它只涉及一个单一的搜索框，让用户输入搜索数据。无论你是在使用主页面的全局搜索框，还是通过自己的应用程序进行搜索，使用的都是同一个搜索框。\n\
  \n当用户输入文本时，Android 会获取该文本并将其传递给已注册响应搜索的各种应用程序。应用程序通过返回一组响应来进行回应。Android 会汇总来自多个应用程序的这些响应，并将其呈现为一个可能的*建议*列表。\n\
  \n当用户点击其中一个响应时，Android 会启动提供该建议的应用程序。从这个意义上说，Android 搜索是参与应用程序之间的一种联合搜索。\n\n尽管整体思路很简单，但搜索协议的细节却非常丰富。我们将在本章后面通过可运行的示例来详细介绍这些细节。在第一部分中，我们将从用户的角度来探索搜索。\n\
  \n\n\n### 探索 Android 全局搜索\n\n在探索 Android 搜索时，虽然这不是必要条件，但我们建议您也阅读 Android 用户指南中的“搜索”章节。我们在参考资料部分提供了最新在线\
  \ Android 用户指南的链接。\n\n**注意：** 在撰写本书期间，Android 版本从 2.0 更新至 2.2，再到 2.3 和 3.0。在每次更新中，尽管底层\
  \ API 没有改变，但用户界面体验略有变化。本章中的截图来自 2.2 模拟器。虽然我们已在 2.3 和 3.0 上测试过代码，但并未复制这些版本的截图。在适用的情况下，我们已用文字标明了差异。根据您所使用的\
  \ Android 版本，应该不难找出对应的界面功能。以搜索设置为例，每个版本中调用搜索设置屏幕的位置都有所不同，但搜索设置屏幕本身看起来是一样的。因此，我们恳请你在阅读本章时牢记这一差异。\n\
  \n在 Android 设备上你不可能错过搜索功能；它通常显示在主屏幕上，如图 23-1 所示。这个搜索框也被称为快速搜索框（QSB）。在某些 Android\
  \ 版本中，或者根据设备制造商/运营商的不同，主屏幕默认可能不会显示此搜索框。然而，如果你点击设备上的搜索按钮，则一定会看到 QSB。或者在那些没有物理按键的设备（例如平板电脑）上，你可能会看到另一种明显的调用\
  \ QSB 的机制。请务必查阅该 Android 版本对应的用户指南或手册。\n\n![images](img/2301.jpg)\n\n**图 23-1.**\
  \ *带有 QSB 组件和按键的 Android 主屏幕*\n\n由于 QSB 是作为小部件实现的（关于小部件的更多信息，请参见第 22 章），如果它不在主屏幕上，你可以将其拖放到主屏幕上。你也可以将\
  \ QSB 从主屏幕拖到垃圾桶来移除它。当然，你也可以再次从小部件屏幕将其拖回。\n\n你可以直接在 QSB 中输入内容来开始搜索。QSB 作为小部件的一个有趣副作用是，将焦点移至主屏幕上的\
  \ QSB 基本上会启动全局搜索活动（见图 23-2），从而离开主屏幕上下文。图 23-2 是在 Android 2.2 版本中截取的，在 Android 2.3\
  \ 版本中看起来完全相同。\n\n![images](img/2302.jpg)\n\n**图 23-2.** *从主屏幕搜索小部件启动的全局搜索活动*\n\n\
  如前所述，你也可以通过点击搜索操作键来调用搜索。操作键是图 23-1 右侧显示的一组按键。该组中的搜索键由放大镜图标表示。\n\n与 HOME 键非常相似，你可以随时点击搜索键，无论当前显示的是哪个应用程序。然而，当一个应用程序获得焦点时，该应用程序有机会对搜索进行专门化处理，我们稍后会对此进行讨论。这种定制的搜索称为*本地搜索*。而更通用、更常见、非定制的搜索则称为*全局搜索*。\n\
  \n**注意：** 当应用程序获得焦点时按下搜索键，是否允许进行本地和全局搜索完全由该应用程序决定。在 2.0 之前的版本中，默认操作是允许全局搜索。在 2.2\
  \ 和 2.3 版本中，默认行为是禁用全局搜索。这意味着当某个活动获得焦点时，用户必须先点击 HOME 键，然后再点击搜索键。\n\n在 2.2 版本之前，Android\
  \ 全局搜索框不区分各个搜索建议提供程序（或搜索应用程序）。从 2.2 版本开始，Android 搜索允许您选择一个特定的搜索上下文（与建议提供程序同义）。您可以通过点击\
  \ QSB 左侧的图标来实现这一点。这将打开一个提供搜索功能的各个搜索应用程序的选择菜单。这在 Android 2.2 版本中如图 23-3 所示。对于 Android\
  \ 2.3 版本，此视图略有不同——在展开的搜索类别部分的右上方引入了一个小的搜索设置图标。\n\n![images](img/2303.jpg)\n\n**图\
  \ 23-3.** *包含各种应用程序搜索上下文的全局 QSB*\n\n这是 2.2 和 2.3 版本模拟器自带的默认搜索应用程序（或上下文、搜索类型、建议提供程序）集合。这个列表可能在后续版本中有所不同。`All`\
  \ 这个搜索上下文的行为与之前版本的全局搜索非常相似。\n\n你也可以通过编写搜索建议提供程序和本地搜索活动来创建自己的搜索上下文。我们将在本章的示例中逐步介绍这一点。\n\
  \n让我们专注于由 `all` 指示的搜索上下文（由放大镜图标表示）。你将焦点移到 QSB（图 23-1），要么直接点击 QSB，要么点击搜索键。暂时不要在 QSB\
  \ 中输入任何内容。此时，Android 将显示一个类似图 23-2 的屏幕。\n\n根据你过去对设备的使用情况，图 23-2 中显示的图像可能会有所不同，因为\
  \ Android 会根据过去的操作猜测你在搜索什么。这种在 QSB 中未输入文本时的搜索模式称为*零建议模式*。\n\n根据输入的搜索文本，Android 会向用户提供大量建议。这些建议会以列表形式显示在\
  \ QSB 下方。这些通常被称为*搜索建议*。当你输入每个字母时，Android 会动态地替换搜索建议。当没有搜索文本时，Android 会显示所谓的*零建议*。在图\
  \ 23-2 中，Android 判断出“设置”是用户以前使用过的应用程序，并且即使没有输入搜索文本，它也是一个适合呈现的建议。尽管我们在 QSB 中什么也没有输入，Android\
  \ 还是会显示“软键盘”以准备输入。这个软键盘也显示在图 23-2 中。\n\n当我们在 QSB 中输入 `a` 时，Android 会查找以 “a” 开头或与\
  \ “a” 相关的建议。你会看到 Android 已经搜索了以 “a” 开头的本地已安装应用程序以及其他一些搜索建议。\n\n现在，我们将使用向下箭头按钮来高亮第一个建议。图\
  \ 23-4 展示了这个视图。\n\n![images](img/2304.jpg)\n\n**图 23-4.** *搜索建议*\n\n请注意，第一个建议已被高亮，焦点已从\
  \ QSB 移至第一个高亮的建议。点击 QSB 右侧的箭头继续搜索。Android 还会通过移除软键盘将屏幕扩展为全屏，因为你在导航时不需要输入。扩展后的屏幕会向你展示更多的建议。\n\
  \n\n\n让我们再次审视建议。Android 获取已输入的搜索文本，并查找所谓的*建议提供者*。Android 异步调用每个建议提供者，以获取一组匹配的建议作为一组行。Android\
  \ 期望这些行（称为*搜索建议*）符合一组预定义的列（*建议列*）。通过探索这些已知的列，Android 会绘制建议列表。当搜索文本发生变化时，Android\
  \ 会重复此过程。这种为获取搜索建议而调用所有建议提供者的交互，在“全搜索”上下文中是成立的。然而，如果你从图 23-3 中选择了一个特定的搜索应用上下文，则只会调用为该应用定义的*建议提供者*来检索搜索建议。\n\
  \n**注意：** 这组搜索建议也称为*建议游标*。这是因为代表建议提供者的内容提供者会返回一个`cursor`对象。\n\n此时，如果你导航回 QSB，Android\
  \ 会重新调出软键盘。在图 23-4 中另一件需要注意的事情是高亮建议与 QSB 中搜索文本之间的关系。搜索文本保持为“a”，尽管高亮建议指向特定的项目，如闹钟应用程序。然而，情况并非总是如此，正如你在图\
  \ 23-5 中所见，我们已导航到一个指向亚马逊的建议条目。\n\n![images](img/2305.jpg)\n\n**图 23-5.** *建议重写*\n\
  \n注意搜索文本“a”如何被表示亚马逊的整个 URL 替换。现在你可以点击箭头（我们称之为“执行箭头”）前往亚马逊，或者简单地点击高亮建议。两者结果相同。\n\n\
  **注意：** 这种基于高亮建议修改搜索文本的过程称为*建议重写*。\n\n稍后我们将更详细地讨论建议重写，但简而言之，Android 使用建议游标中的一列来查找此文本。如果该列存在，它将重写搜索文本；否则，它保留输入的搜索文本不变。\n\
  \n当建议未被重写时，有两种可能。如果你点击 QSB 中的执行箭头图标，无论高亮显示的是什么，它都会在 Google 上搜索该文本。如果你直接点击建议项，它将触发一个称为*搜索活动*的活动，该活动属于最初提供建议的应用。然后，此搜索活动负责显示搜索结果。\n\
  \n图 23-6 是直接调用一个建议的例子。在此示例中，建议是一个名为`Alarm Clock`的应用程序。当你点击它时，Android 将直接调用该应用。这实际上如何发生有点复杂，我们将在本章后面介绍（参见“实现自定义建议提供者”一节）。\n\
  \n![images](img/2306.jpg)\n\n**图 23-6.** *通过搜索调用应用程序*\n\n图 23-7 展示了当你的搜索文本为“a”时，点击执行箭头会发生什么。\n\
  \n![images](img/2307.jpg)\n\n**图 23-7.** *搜索网页*\n\n既然你已经熟悉了如何使用 QSB 进行搜索，那么在下一部分的介绍中，我们将解释如何在全局搜索中启用或禁用特定应用。\n\
  \n#### 为全局搜索启用建议提供者\n\n正如我们已经指出的，应用使用建议提供者来响应搜索。仅仅因为你的应用拥有响应搜索所需的基础设施，并不意味着你的建议会自动显示在\
  \ QSB 中。用户需要明确允许你的建议提供者参与。我们现在将带你了解启用或禁用可用建议提供者的过程。在 Android 2.2 和 2.3 版本中，进入以下设置的方式略有不同。我们将首先介绍\
  \ 2.2 版本。\n\n##### 在 Android 2.2 版本中使用搜索设置\n\n让我们从能带我们进入 Android 设置界面的屏幕开始（图 23-8）。\n\
  \n![images](img/2308.jpg)\n\n**图 23-8.** *定位设置应用*\n\n你可以通过点击设备屏幕底部的应用列表图标（参见图 23-1\
  \ 的主屏幕）来访问此视图。使用向下方向键导航到名为`Settings`的应用，如图 23-8 所示。这将带你进入 Android 设置页面，该页面看起来如图\
  \ 23-9 所示。\n\n![images](img/2309.jpg)\n\n**图 23-9.** *进入“搜索”应用的设置*\n\n在众多 Android\
  \ 设置中，选择“搜索（管理搜索设置和历史记录）”选项。这将使你进入如图 23-10 所示的搜索设置应用。\n\n![images](img/2310.jpg)\n\
  \n**图 23-10.** *搜索设置应用*\n\n在此活动中，查找名为“快速搜索框”的标签页，并选择“可搜索项（选择手机上要搜索的内容）”。这将显示一个可用建议提供者（有时也称为搜索应用）的列表，如图\
  \ 23-11 所示。再次说明，此列表可能因版本而异。\n\n![images](img/2311.jpg)\n\n**图 23-11.** *已启用/禁用的搜索应用*\n\
  \n在图 23-11 中，已勾选的为包含在全局搜索中的建议提供者（或其所属的应用）。默认情况下，新的建议提供者或搜索应用是*未勾选*的。你可以点击一个建议提供者以启用其参与全局搜索。当启用后，该建议提供者将向全局搜索提供建议。已启用的建议提供者也会出现在图\
  \ 23-3 的可搜索应用列表中。\n\n##### 在 Android 2.3 版本中使用搜索设置\n\n当你想探索建议提供者设置时，Android 2.2\
  \ 和 2.3 版本（以及希望是未来的手机 SDK 版本）之间的区别在于，如何进入图 23-10 或图 23-11 的搜索设置界面。\n\n在 Android\
  \ 2.3 版本中，你可以直接从图 23-2 的展开搜索类别界面访问图 23-11。在 Android 2.3 版本中，图 23-2 上有一个小设置图标。如果你点击此图标，将直接跳转到图\
  \ 23-11，在那里你会看到你的自定义搜索活动。\n\n要进入图 23-10 的通用搜索设置界面，你需要返回图 23-2、图 23-3 或图 23-4 的界面。通常情况下，你点击了\
  \ QSB。当焦点在 QSB 上时，如果点击菜单按钮，你会看到一个名为“搜索设置”的菜单项。点击此菜单项，你将进入图 23-10 的通用搜索设置界面。一旦你进入此界面，操作设置的说明与\
  \ Android 2.2 版本相同。\n\n到目前为止，我们已经向你介绍了 Android 中搜索如何工作的高级视图。接下来，我们将进一步探讨这些概念，并通过示例向你展示这一切是如何工作的。我们将从探索简单活动如何与搜索交互开始。\n\
  \n\n\n### 活动与搜索键的交互\n\n当某个活动处于焦点状态时，用户点击搜索键会发生什么？答案取决于当前处于焦点的活动类型。我们将针对以下活动类型来探究其行为：\n\
  \n- 对搜索无感知的常规活动\n- 明确禁用搜索的活动\n- 显式调用全局搜索的活动\n- 指定本地搜索的活动\n\n我们将通过一个包含以下文件的工作示例来探究这些选项（在逐一讲解每个文件后，我们会展示该应用的截图来演示相关概念）。\n\
  \n主要的 Java 文件包括：\n\n- `RegularActivity.java`（清单 23–1）\n- `NoSearchActivity.java`（清单\
  \ 23–6）\n- `SearchInvokerActivity.java`（清单 23–8）\n- `LocalSearchEnabledActivity.java`（清单\
  \ 23–13）\n- `SearchActivity.java`（清单 23–11）\n\n除最后一个文件（`SearchActivity.java`）外，其余每个文件分别对应我们上述要考察的每一种活动类型。最后一个文件\
  \ `SearchActivity.java` 是 `LocalSearchEnabledActivity` 所需的。这些活动（包括 `SearchActivity`）都有一个包含文本视图的简单布局。每个活动由以下布局文件支持：\n\
  \n- `res/layout/main.xml`（用于 `RegularActivity`）（清单 23–3）\n- `res/layout/no_search_activity.xml`（清单\
  \ 23–7）\n- `res/layout/search_invoker_activity.xml`（清单 23–9）\n- `res/layout/local_search_enabled_activity.xml`（清单\
  \ 23–14）\n- `res/layout/search_activity.xml`（清单 23–11 的一部分）\n\n以下两个文件向 Android 系统定义这些活动，并为一个本地搜索活动定义搜索元数据：\n\
  \n- `AndroidManifest.xml`（清单 23–2）\n- `xml/searchable.xml`（清单 23–12）\n\n以下文件包含每个布局的文本注释：\n\
  \n- `res/values/strings.xml`（清单 23–4）\n\n以下两个菜单文件提供了调用这些活动以及必要时调用全局搜索所需的菜单：\n\n\
  - `res/menu/main_menu.xml`（清单 23–5）\n- `res/menu/search_invoker_menu.xml`（清单 23–10）\n\
  \n现在，我们将按活动类型逐一查看这些文件的源代码，系统地探究活动与搜索键之间的交互。\n\n**注意：** 如果你希望编译并测试这些文件，我们建议你从本章末尾提供的\
  \ URL 下载本章的可导入 Eclipse 项目。\n\n让我们开始探究在常规 Android 活动存在时，搜索键的行为。\n\n#### 搜索键在常规活动上的行为\n\
  \n为了测试一个对搜索无感知的活动处于焦点时会发生什么，我们将展示一个常规活动的示例。清单 23–1 展示了表示这个 `RegularActivity` 的 Java\
  \ 源代码。\n\n**清单 23–1.** *常规活动源代码*\n\n```java\n//文件名: RegularActivity.java\npublic\
  \ class RegularActivity extends Activity\n{\n    private final String tag = \"RegularActivity\"\
  ;\n\n    @Override\n    public void onCreate(Bundle savedInstanceState) {\n    \
  \   super.onCreate(savedInstanceState);\n       setContentView(R.layout.main);\n\
  \    }\n\n    @Override\n    public boolean onCreateOptionsMenu(Menu menu)\n   \
  \ {\n       //调用父类以附加任何系统级菜单\n       super.onCreateOptionsMenu(menu);\n       MenuInflater\
  \ inflater = getMenuInflater();\n       //getMenuInflater() 来自于基类 activity\n\n \
  \      inflater.inflate(R.menu.main_menu, menu);\n       return true;\n    }\n\n\
  \    @Override\n    public boolean onOptionsItemSelected(MenuItem item)\n    {\n\
  \       appendMenuItemText(item);\n       if (item.getItemId() == R.id.menu_clear)\
  \ {\n          this.emptyText();\n          return true;\n       }\n\n       if\
  \ (item.getItemId() == R.id.mid_no_search) {\n          this.invokeNoSearchActivity();\n\
  \          return true;\n       }\n       if (item.getItemId() == R.id.mid_local_search)\
  \ {\n          this.invokeLocalSearchActivity();\n          return true;\n     \
  \  }\n       if (item.getItemId() == R.id.mid_invoke_search) {\n          this.invokeSearchInvokerActivity();\n\
  \             return true;\n       }\n       return true;\n    }\n\n    private\
  \ TextView getTextView()\n    {\n       return (TextView)this.findViewById(R.id.text1);\n\
  \    }\n\n    private void appendMenuItemText(MenuItem menuItem)\n    {\n      \
  \ String title = menuItem.getTitle().toString();\n       TextView tv = getTextView();\n\
  \       tv.setText(tv.getText() + \"\\n\" + title);\n    }\n    private void emptyText()\n\
  \    {\n       TextView tv = getTextView();\n       tv.setText(\"\");\n    }\n \
  \   private void invokeNoSearchActivity()\n    {\n       //当你将这个活动添加到你的项目时，\n  \
  \     //取消下面两行的注释\n\n       //Intent intent =\n       //   new Intent(this,NoSearchActivity.class);\n\
  \       //startActivity(intent);\n    }\n    private void invokeSearchInvokerActivity()\n\
  \    {\n       //当你将这个活动添加到你的项目时，\n       //取消下面两行的注释\n\n       //Intent intent\
  \ =\n       //   new Intent(this,SearchInvokerActivity.class);\n       //startActivity(intent);\n\
  \    }\n    private void invokeLocalSearchActivity()\n    {\n       //当你将这个活动添加到你的项目时，\n\
  \       //取消下面两行的注释\n\n       //Intent intent =\n       //  new Intent(this,LocalSearchEnabledActivity.class);\n\
  \       //startActivity(intent);\n    }\n}\n```\n\n这个活动的目的是充当一个对搜索无感知的简单活动。不过，在本示例中，这个活动还充当了调用我们想要测试的其他活动类型的驱动程序。这就是为什么你会看到引入了一些菜单项来表示这些额外的活动。每个以\
  \ `invoke...` 开头的函数都包含了启动其他待测试活动类型的代码。\n\n我们将快速呈现编译此代码所需的必要文件。不过，你可能希望在此处注释掉 `invoke…`\
  \ 函数，或者也包含这些类的清单。为了方便你，我们已经将这些行注释掉了。\n\n现在让我们看一下清单文件，了解这个活动是如何定义的（参见清单 23–2）。你也可以在这里看到其他活动的定义，尽管它们将在稍后才会被解释。同样，我们将那些额外的活动注释掉了，直到后续需要时再启用。\n\
  \n\n\n##### **清单 23–2.** *Activity/搜索键交互：清单文件*\n\n`//文件名：AndroidManifest.xml`\n\
  ```\n<manifest\n    package=\"com.androidbook.search.nosearch\">\n    <application\
  \ android:icon=\"@drawable/icon\"\n        android:label=\"测试 Activity QSB 交互\"\
  >\n        <activity android:name=\".RegularActivity\"\n            android:label=\"\
  Activity/QSB 交互：常规 Activity\">\n            <intent-filter>\n                <action\
  \ android:name=\"android.intent.action.MAIN\" />\n                <category android:name=\"\
  android.intent.category.LAUNCHER\" />\n            </intent-filter>\n        </activity>\n\
  \n        <!-- 在创建下列 Activity 时取消注释。\n            我们会在需要取消注释时进行说明 -->\n\n      \
  \  <activity android:name=\".NoSearchActivity\"\n            android:label=\"Activity/QSB\
  \ 交互：禁用搜索\">\n        </activity>\n\n        <activity android:name=\".SearchInvokerActivity\"\
  \n            android:label=\"Activity/QSB 交互：搜索调用器\">\n        </activity>\n\n\
  \        <activity android:name=\".LocalSearchEnabledActivity\"\n            android:label=\"\
  Activity/QSB 交互：本地搜索\">\n            <meta-data android:name=\"android.app.default_searchable\"\
  \n                android:value=\".SearchActivity\" />\n        </activity>\n\n\
  \        <activity android:name=\".SearchActivity\"\n            android:label=\"\
  Activity/QSB 交互：搜索结果\">\n            <intent-filter>\n                <action android:name=\"\
  android.intent.action.SEARCH\"/>\n                <category android:name=\"android.intent.category.DEFAULT\"\
  />\n            </intent-filter>\n            <meta-data android:name=\"android.app.searchable\"\
  \n                android:resource=\"@xml/searchable\" />\n        </activity>\n\
  \        -->\n    </application>\n    <uses-sdk android:minSdkVersion=\"4\" />\n\
  </manifest>\n```\n\n注意，`RegularActivity` 被定义为此项目的主 Activity，并且没有其他与搜索相关的特性。\n\n\
  此 Activity 的布局文件如清单 23–3 所示。\n\n##### **清单 23–3.** *常规 Activity 布局文件*\n\n`//文件名：layout/main.xml`\n\
  ```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout\n    android:orientation=\"\
