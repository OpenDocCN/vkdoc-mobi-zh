  \    选择其他 Activity。\n    </string>\n<!--\n**************************************************\n\
  * search_activity_prompt\n**************************************************\n-->\n\
  <string name=\"search_activity_prompt\">\n这被称为搜索 Activity 或搜索结果 Activity。\n当其他 Activity\
  \ 将此 Activity 用作其\n搜索结果 Activity 时，通过单击搜索键来调用此 Activity。\n\n通常，您可以从 intent 中检索查询字符串\n\
  以查看查询内容。\n</string>\n<!--\n**************************************************\n\
