  \n#### 菜单文件\n\n辅助菜单文件 `menu/main_menu.xml` 如清单 13–11 所示。该菜单文件用于支持清单 13–9 中的活动。如该活动中所述，此菜单文件声明了三个菜单项。一个用于在处理菜单项时清除文本视图。另外两个主要菜单项：`menu_test_defered_handler`\
