  \ `start()` 而无需准备播放器。另外，使用完媒体播放器后，请务必调用 `release()` 方法。在此示例中，你在 `killMediaPlayer()`\
  \ 方法中执行了此操作。\n\n清单 19-1 展示了如何播放位于网络上的音频文件。`MediaPlayer` 类也支持播放位于你的 `.apk` 文件中的本地媒体。清单\
  \ 19-2 展示了如何引用和播放来自 `.apk` 文件中 `/res/raw` 文件夹的文件。如果 Eclipse 项目中 `/res` 下还没有 `raw`\
  \ 文件夹，请自行添加。然后将你选择的 mp3 文件复制到 `/res/raw` 中，文件名为 `music_file.mp3`。\n\n**清单 19-2.**\
