  \ java.io.BufferedReader;\nimport java.io.InputStream;\nimport java.io.InputStreamReader;\n\
  import java.net.HttpURLConnection;\nimport java.net.URL;\nimport java.net.URLEncoder;\n\
  \nimport org.apache.commons.lang.StringEscapeUtils;\nimport org.json.JSONObject;\n\
  import android.util.Log;\n\npublic class Translator {\n    private static final\
  \ String ENCODING = \"UTF-8\";\n    private static final String URL_BASE = \"http://ajax.googleapis.com/ajax/services/language/translate?v=1.0&langpair=\"\
  ;\n    private static final String INPUT_TEXT = \"&q=\";\n    private static final\
  \ String MY_SITE = \"http://my.website.com\";\n    private static final String TAG\
  \ = \"Translator\";\n\n    public static String translate(String text, String from,\
  \ String to) throws Exception\n{\n        try {\n            StringBuilder url =\
  \ new StringBuilder();\n            url.append(URL_BASE).append(from).append(\"\
  %7C\").append(to);\n            url.append(INPUT_TEXT).append(\n               \
  \ URLEncoder.encode(text, ENCODING));\n\n            HttpURLConnection conn = (HttpURLConnection)\n\
  \                new URL(url.toString()).openConnection();\n            conn.setRequestProperty(\"\
  REFERER\", MY_SITE);\n            conn.setDoInput(true);\n            conn.setDoOutput(true);\n\
  \            try {\n                InputStream is= conn.getInputStream();\n   \
  \             String rawResult = makeResult(is);\n\n                JSONObject json\
  \ = new JSONObject(rawResult);\n                String result =\n              \
  \      ((JSONObject)json.get(\"responseData\"))\n                    .getString(\"\
  translatedText\");\n                return (StringEscapeUtils.unescapeXml(result));\n\
  \            } finally {\n                conn.getInputStream().close();\n     \
  \           if(conn.getErrorStream() != null)\n                    conn.getErrorStream().close();\n\
  \            }\n        } catch (Exception ex) {\n            throw ex;\n      \
  \  }\n    }\n\n    private static String makeResult(InputStream inputStream) throws\
  \ Exception {\n        StringBuilder outputString = new StringBuilder();\n     \
  \   try {\n            String string;\n            if (inputStream != null) {\n\
  \                BufferedReader reader =\n                    new BufferedReader(\n\
  \                        new InputStreamReader(inputStream, ENCODING));\n      \
  \          while (null != (string = reader.readLine())) {\n                    outputString.append(string).append('\\\
  n');\n                }\n            }\n        } catch (Exception ex) {\n     \
  \       Log.e(TAG, \"读取翻译流时出错。\", ex);\n        }\n        return outputString.toString();\n\
  \    }\n}\n```\n\n**列表 11–43.** *翻译应用 AndroidManifest.xml*\n\n```xml\n<?xml version=\"\
  1.0\" encoding=\"utf-8\"?>\n<!-- 该文件为 AndroidManifest.xml -->\n<manifest\n     \
  \ package=\"com.androidbook.translation\"\n      android:versionName=\"1.0\"\n \
