  ms\\n\");\n    result.append(\"Event time: \").append(event.getEventTime());\n \
  \   result.append(\"ms\").append(\"  Elapsed: \");\n    result.append(event.getEventTime()-event.getDownTime());\n\
  \    result.append(\" ms\\n\");\n    return result.toString();\n}\n```\n\n我们的主活动代码在按钮和布局上设置了回调，以便处理\
  \ UI 中所有元素的触摸事件（即 `MotionEvent` 对象）。我们添加了大量的日志记录，以便你能准确了解触摸事件发生时的情况。编译并运行这个应用程序后，你应该会看到一个类似图\
  \ 25-1 的屏幕。\n\n为了充分利用这个应用程序，你需要在 Eclipse 中打开 LogCat，以便在触摸屏幕时观察消息的快速输出。这同样适用于模拟器和真实设备。我们还建议你最大化\
  \ LogCat 窗口，以便更轻松地上下滚动查看该应用生成的所有事件。要最大化窗口，只需双击 LogCat 标签页。现在，进入应用程序 UI，触摸并释放最上方标记为“returns\
  \ true”的按钮（如果使用模拟器，用鼠标点击并释放该按钮）。你应该会在 LogCat 中看到至少两个事件被记录。这些消息的标签来自 `trueBtnTop`，并且是从\
  \ `MainActivity` 的 `onTouch()` 方法中记录的。请参阅 `MainActivity.java` 了解 `onTouch()` 方法的代码。在查看\
  \ LogCat 输出时，请注意观察哪些方法调用产生了这些值。例如，Action 之后显示的值来自 `getAction()` 方法。清单 25-4 展示了在模拟器中你可能看到的\
