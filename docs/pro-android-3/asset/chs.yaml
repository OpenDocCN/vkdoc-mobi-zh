  android.intent.action.MAIN\" />\n            <category android:name=\"android.intent.category.DEFAULT\"\
  \ />\n            <category android:name=\"android.intent.category.LAUNCHER\" />\n\
  \         </intent-filter>\n      </activity>\n\n      <service android:name=\"\
  TranslateService\" android:label=\"翻译\">\n         <intent-filter>\n           \
  \ <action android:name=\"android.intent.action.VIEW\" />\n            <category\
  \ android:name=\"android.intent.category.DEFAULT\" />\n         </intent-filter>\n\
  \      </service>\n  </application>\n  <uses-permission android:name=\"android.permission.INTERNET\"\
  \ />\n</manifest>\n```\n\n在示例能够正确构建之前，我们需要提供一个辅助类。Jakarta Commons Lang 项目中有一个名为\
  \ `StringEscapeUtils` 的类，我们希望通过它来将 AJAX 语言 API 返回的结果字符串转换为人类可读的形式。AJAX 语言 API 可能会返回代表某些特殊字符的\
  \ XML 实体。例如，撇号会以 `&#39;` 的形式返回。我们希望将这些特殊字符正确显示给用户，这正是 Commons Lang 项目的用途所在。Jakarta\
  \ Commons Lang 的地址为：\n\n`http://commons.apache.org/lang/`\n\n\n请访问 Jakarta Commons\
  \ Lang 网站，找到并下载包含 JAR 文件的 `commons-lang` ZIP（或 TAR）压缩包。解压后获取 JAR 文件以供下一步使用。在 Eclipse\
  \ 中，选中项目并右键单击，选择 Build Path > Configure Build Path。点击 Libraries 选项卡，然后点击 Add External\
  \ JARs。导航到 `commons-lang` JAR 文件并添加它。现在，点击 OK 完成将 JAR 文件添加到项目。你的应用程序应该能够构建成功。请尝试运行它。如果应用程序在竖屏模式下显示不佳，请尝试使用\
  \ `Ctrl+F11` 快捷键将模拟器切换到横屏模式。如果你对返回的结果有任何疑问，请访问此网站将你的结果与谷歌的结果进行对比：\n\n`http://www.google.com/uds/samples/language/translate.html`\n\
  \n有几点我们希望引起你的注意。根据使用条款，此示例在用户界面上包含“powered by Google”字样。同样根据使用条款，你传递的字符串不得超过 5,000\
  \ 个字符，因此如果超过此限制我们会将其截断。你可能需要采取不同的处理方式，例如将文本分成可管理大小的块传递给 API，以免丢失任何内容。我们有意将语言列表保持简短，以使此应用程序易于管理，但你也可以随意向字符串数组中添加更多语言以进行更多翻译。不过请注意，Droid\
  \ 字体可能无法包含翻译器可以翻译的每种语言的所有字符。如果在结果中看到异常，你可能怀疑是字体问题。可以通过获取额外的字体来解决此问题，但我们不会在本章中介绍字体。API\
  \ 的响应使用 JSON 结构。因此，我们使用 JSON 将响应解析为结果字符串。请注意，JSON 是 Android 的一部分，因此我们不需要从互联网上抓取它并将其作为外部\
  \ jar 文件包含进来。\n\nAJAX 语言 API 的一个特性是，你不必告诉它输入语言是什么。API 会尝试猜测输入语言。如果你想采用这种方法，可以选择在传递的\
  \ URL 中省略输入语言，而是在 `langpair=` 之后直接紧跟 `%7C`。当你不确定将要提供何种语言时，这会非常方便，但是，如果没有传递足够的文本，API\
  \ 可能无法正确猜测。\n\n### 总结\n\n本章全部是关于服务的。我们讨论了使用 Apache `HttpClient` 消费外部 HTTP 服务以及编写后台服务。关于使用\
  \ `HttpClient`，我们展示了如何执行 HTTP `GET` 调用和 HTTP `POST` 调用。我们还展示了如何进行多部分 `POST`。\n\n\
  本章的第二部分讨论了在 Android 中编写服务。具体来说，我们讨论了编写本地服务和远程服务。我们指出，本地服务是那些被与服务同一进程中的组件（如活动）消费的服务。远程服务的客户端则位于托管服务的进程之外。\n\
  \n"
- "# 第 12 章\n\n## 探索包\n\n在第 1 章到第 11 章中，我们涵盖了 Android 平台的基础知识。然而，这些章节详细描述了 Android\
  \ 的“快乐路径”。在接下来的几章中（从本章开始，包括第 12、13、14 和 15 章），我们将围绕 Android 核心，介绍更细粒度的细节。\n\n我们将从深入探讨\
  \ Android 包的底层机制、Android 包签名过程、包间的数据共享以及 Android 库项目来开始此次探索。你将了解一个 `.apk` 文件运行所依赖的\
  \ Linux 进程上下文。你将看到在这种上下文中，多个 `.apk` 文件如何共享数据和资源。\n\n虽然你在第 10 章中已经初步了解了签名 Android\
  \ 包文件，但在本章中，你将学习签名 JAR 文件的含义、影响和用法。在数据共享的背景下，我们还将研究 Android 库项目，了解它们如何工作以及是否可用于资源和代码共享。\n\
  \n让我们从 `.apk` 文件的基础知识开始讨论，因为它构成了 Android 进程的基础。\n\n### 包与进程\n\n如你在前几章中所见，当你在 Android\
  \ 中开发应用程序时，最终会得到一个 `.apk` 文件。然后你对这个 `.apk` 文件进行签名，并将其部署到设备上。让我们多了解一些关于 Android 包的知识。\n\
  \n#### 包规范的细节\n\n每个 `.apk` 文件都通过其清单文件中指定的根包名称来唯一标识。以下是本章将使用的包定义示例（包名称已高亮显示）：\n\n\
  ```\n<manifest\npackage=\"com.androidbook.library.testlibraryapp\"\n      ...>\n\
  \      ...此处为其余 xml 节点\n</manifest>\n```\n\n如果你是这个包的开发者，对其进行了签名并安装在设备上，那么除了你之外，其他任何人都不能更新这个包。包名称与其签名时所使用的签名绑定。因此，具有不同签名的开发者无法对具有相同完全限定\
  \ Java 包名称的包进行签名和安装。\n\n##### 将包名称转换为进程名称\n\nAndroid 使用包名称作为运行此包组件的进程名称。Android\
  \ 还会为此包进程分配一个唯一的用户 ID 以供其运行。该分配的用户 ID 本质上是底层 Linux 操作系统的一个 ID。你可以通过查看已安装包的详细信息来发现此信息。\n\
  \n##### 列出已安装的包\n\n在模拟器中，你可以通过导航路径 Home `![images](img/U001.jpg)` Dev Tools `![images](img/U001.jpg)`\
  \ Package Browser（包浏览器）来查看已安装包的列表。（请注意，在真实设备上你可能找不到类似的包浏览器。这也可能因 Android 版本而异。）\n\
  \n一旦看到包列表，你可以高亮显示某个应用程序（例如浏览器）的包，然后点击它。这将弹出一个如图 12-1 所示的包详细信息屏幕。\n\n`![images](img/1201.jpg)`\n\
  \n**图 12-1.** *Android 包详细信息*\n\n图 12-1 显示了由清单文件中的 Java 包名称指示的进程名称以及分配给此包的唯一用户 ID。以浏览器为例，其清单文件应指示包名称为\
  \ `com.android.browser`（由图 12-1 中的属性 process 反映）。\n\n从此进程或包创建的任何资源都将在此 Linux 用户\
  \ ID 下受到保护。此屏幕还列出了此包内的组件。组件的示例包括活动、服务和广播接收器。\n\n##### 通过包浏览器删除包\n\n既然我们谈到了包浏览器，我们想指出的是，你也可以使用上一节提到的包浏览器中的以下步骤从模拟器中删除包：\n\
  \n1.  高亮显示包。\n2.  点击菜单。\n3.  点击“删除包”来删除包。\n\n因为一个进程与一个包名称绑定，而一个包名称又与它的签名绑定，所以签名在保护属于某个包的数据方面扮演着重要角色。为了充分理解其含义，让我们来研究一下包签名过程的本质。\n\
  \n\n\n### 重新审视包签名过程\n\n在第 10 章中，我们介绍了在设备上安装应用之前对应用进行签名的机制。然而，我们尚未探讨包签名过程的必要性和影响。\n\
  \n例如，当我们在 Windows 或其他操作系统上下载并安装一个应用时，我们不需要对其进行签名。为什么在 Android 设备上签名却是强制性的？签名过程到底意味着什么？它保证了什么？是否有现实世界中类似的签名过程能让我们快速理解？我们将在本节中探讨这些问题。\n\
  \n当包被安装到设备上时，每个已安装的包必须拥有一个唯一或不同的 Java 包名。如果你尝试安装一个名称已存在的新包，设备将拒绝安装，直到之前的包被移除。为了允许这种类型的包升级，你必须确保同一个应用发布者与该包关联。这是通过数字签名来实现的。在阅读完本章的后续小节后，你将会看到，签名过程确保作为开发者的你，通过你的数字签名保留了那个包名。\n\
  \n让我们通过几个场景来帮助您充分理解和内化数字签名。\n\n#### 理解数字签名：场景一\n\n想象你是一个葡萄酒收藏家，身处一个非常不适合产酒的地方，比如撒哈拉沙漠。此外，假设世界各地的酿酒商都在给你寄送酒桶以供储存或售卖。\n\
  \n作为葡萄酒收藏家，你注意到每个酒桶及其内部的葡萄酒都有一种区别于其他的特定色泽和颜色。进一步调查后，你发现如果两个酒桶或其中的葡萄酒具有相同的色泽，那么它们*总是*来自同一个酿酒商。深入挖掘后，你发现每个酿酒商都有一个秘密的色泽配方，被锁在地窖中，从不透露。这解释了为什么每种葡萄酒都不同，以及为什么具有相同色泽的两种葡萄酒*必须*来自同一个酿酒商。当然，这种识别方式绝不揭示酿酒商的身份——仅仅表明酿酒商是独特且唯一的。\n\
  \n这个色泽就成了酿酒商的签名，就像一个家族印记，而酿酒商将这个签名对其他人保密。\n\n这个例子中的一个重要区别是，作为收藏家，你无法知道*哪个*酿酒商发送了某一批特定的葡萄酒——该签名没有关联任何名称或地址。即使有，也很可能某个酿酒商会发送似乎来自另一个地址的葡萄酒。在这种情况下，你可以认为两个地址相同但色泽不同的酒桶，来自居住在同一个地址的两个不同酿酒商。\n\
  \n#### 理解数字签名：场景二\n\n让我们考虑另一个关于自然存在签名的场景。当你去异国他乡时，打开收音机，会听到许多歌曲。你能分辨出不同的歌手，并能单独识别每一个，但不知道他们是谁，也不知道他们的名字。这就是自签名（在本例中是用他们的声带）。当你的一个朋友告诉你一个歌手，并将该歌手与你曾听过的某个声音联系起来时，这类似于第三方签名。\n\
  \n一个歌手可以模仿另一个人的声音来迷惑或欺骗听众。然而，由于用于编码签名的数学算法，模仿数字签名要困难得多，非常困难。\n\n#### 理解数字签名的模式\n\
  \n当我们谈论有人签署一个`JAR`文件时，这个`JAR`文件就被赋予了独特的“颜色”，并可以与其他`JAR`文件区分开来。但是，无法通过这种方式识别来源开发者或公司。这样的`JAR`文件被称为自签名`JAR`文件。\n\
  \n要知道*来源*，你需要一个葡萄酒收藏家信任的第三方公司告诉我们，红色来自公司 1。现在，每当我们看到“红色”，我们就知道这种葡萄酒来自公司 1。这些被称为第三方签名的`JAR`文件。这些在浏览器中很有用，可以告诉你，你正在从公司\
  \ 1 下载文件，或者安装由公司 1（权威地）生产的应用程序。\n\n#### 那么如何数字签名呢？\n\n数字签名遵循上述场景中解释的类似语义，技术上是通过所谓的公钥/私钥加密来实现的。可以运用数学方法生成两个数字，使得如果用第一个数字（私钥）进行编码，则只有第二个数字（公钥）能够解密。这些密钥是非对称的。即使每个人都知道公钥，他们也无法加密出公钥能解密的消息。只有其匹配的私钥才能做到。\n\
  \n让我们在葡萄酒例子的背景下考虑公钥和私钥的概念。\n\n一个想要通过数字签名（而非色泽）来区分葡萄酒的酿酒商会使用私钥为她的酒桶创建一个代码（色泽）。因为私钥用于生成`代码（色泽）`，所以只有对应的公钥才能解密该代码。\n\
  \n然后，酿酒商大胆地将公钥名称和加密后的代码写在酒桶上，或者通过信使一次性传递公钥。\n\n当你，作为葡萄酒收藏家，拿着那个公钥并成功解密了加密的代码后，你就知道公钥是正确的，并且该消息只能由写下该公钥的酿酒商加密。在这个场景中，即使有其他冒牌酿酒商复制了真正酿酒商的公钥并将其写在一个酒桶上，这个冒牌者也无法写出一个能被该公钥解密的消息。\n\
  \n本质上，公钥就成了酿酒商的签名。即使其他人声称拥有该公钥，那个人也无法生成一个能用该公钥解密的消息。\n\n通过这种将数字签名与现实签名的比较，我们建立了一个类比，帮助你掌握和内化数字签名。我们已经在第\
  \ 10 章中介绍了使用基于`JDK`的`keytool`和`jarsigner`命令来完成签名过程的机制。\n\n#### 签名过程的影响\n\n我们现在可以看到，对于同一个包名，我们不能有两个不同的签名。签名有时被称为公钥基础设施（PKI）证书。更准确地说，你会使用一个\
  \ PKI 证书来签署一个包、一个`JAR`文件，或一个`DLL`或一个应用程序。\n\n`PKI`证书与包名绑定，以确保两个开发者不能安装一个具有相同包名的包。然而，同一个证书可以用来签署任意数量的包。换句话说，*一个*\
  \ `PKI`证书支持*许多*包。这种关系是一对多的。但*一个*包有一个，*且仅有一个*，通过其`PKI`证书的签名。然后，开发者使用密码保护证书的私钥。\n\n\
  这些事实不仅对于同一包的新版本发布很重要，对于在具有相同签名的包之间共享数据也很重要。\n\n\n\n### 在包之间共享数据\n\n在前几章中，我们明确每个包都在自己的进程中运行。所有通过此包安装或创建的资产都属于分配给该包的用户\
  \ ID。你也知道 Android 会分配一个唯一的基于 Linux 的用户 ID 来运行该包。在 图 12-1 中，你可以看到这个用户 ID 的样子。根据 Android\
  \ SDK 文档：\n\n> *“当应用在设备上安装时，此用户 ID 被分配，并在该设备上的整个生命周期内保持不变。应用存储的所有数据都会被分配该应用的用户 ID，并且通常其他包无法访问。当你使用\
  \ `getSharedPreferences(String, int)`、`openFileOutput(String, int)` 或 `openOrCreateDatabase(String,\
  \ int, SQLiteDatabase.CursorFactory)` 创建新文件时，可以使用 `MODE_WORLD_READABLE` 和/或 `MODE_WORLD_WRITEABLE`\
  \ 标志，以允许任何其他包读取/写入该文件。设置这些标志后，文件仍归你的应用所有，但其全局读取和/或写入权限已得到适当设置，因此任何其他应用都可以看到它。”*\n\
  \n如果你的意图是允许一组相互协作的、依赖于通用数据集合的应用进行操作，你可以选择显式指定一个对你唯一且符合你需求的通用用户 ID。这个共享用户 ID 也定义在清单文件中，类似于包名的定义。代码清单\
  \ 12-1 展示了一个示例。\n\n**代码清单 12-1.** *共享用户 ID 声明*\n\n```\n<manifest\n      package=\"\
  com.androidbook.somepackage\"\n      sharedUserId=\"com.androidbook.mysharedusrid\"\
  \n      ...>\n...其他 xml 节点\n</manifest>\n```\n\n#### 共享用户 ID 的性质\n\n如果多个应用共享相同的签名（使用相同的\
  \ PKI 证书签名），它们可以指定相同的共享用户 ID。拥有共享用户 ID 允许这些应用共享数据，甚至在同一进程中运行。为了避免共享用户 ID 重复，建议采用类似于\
  \ Java 类命名的约定。以下是 Android 系统中找到的一些共享用户 ID 示例：\n\n```\n\"android.uid.system\"\n\"\
  android.uid.phone\"\n```\n\n**注意：** 在 Android 相关新闻组中有报告指出，共享 ID 必须指定为原始字符串，而不能是字符串资源。\n\
  \n作为提醒，如果你计划使用共享用户 ID，建议从一开始就使用它们。否则，当你的应用从非共享用户 ID 升级到带有共享 ID 的应用时，可能无法正常工作。一个被引用的原因是，Android\
  \ 不会因为用户 ID 的更改而对旧资源执行 `chown` 操作。因此，我们强烈建议你：\n\n- 如果需要，请从一开始就使用共享用户 ID。\n- 一旦使用了某个用户\
  \ ID，请勿更改。\n\n#### 共享数据的代码模式\n\n本节探讨当两个应用想要共享资源和数据时我们可以采用的方式。如你所知，在运行时，每个包的资源和数据都由该包的上下文所拥有并受其保护。因此，你需要能够访问你想要共享资源或数据的目标包的上下文，这并不令人意外。\n\
  \nAndroid 提供了一个名为 `createPackageContext()` 的 API 来帮助实现这一点。你可以在任何现有的上下文对象（如你的 activity）上使用\
  \ `createPackageContext()` API 来获取你想要交互的目标上下文的引用。代码清单 12-1 提供了一个示例（这只是一个演示用法的示例，并非设计用于编译）。\n\
  \n**代码清单 12-2.** *使用 `createPackageContext()` API*\n\n```\n// 标识你要使用的包\nString targetPackageName=\"\
  com.androidbook.samplepackage1\";\n\n// 选择适当的上下文标志\nint flag=Context.CONTEXT_RESTRICTED;\n\
  \n// 通过你的一个 activity 获取目标上下文\nActivity myContext = ……;\nContext targetContext =\n\
  \         myContext.createPackageContext(targetPackageName, flag);\n\n// 使用上下文来解析文件路径\n\
  Resources res = targetContext.getResources();\nFile path = targetContext.getFilesDir();\n\
  ```\n\n请注意我们是如何获取到给定包名（例如 `com.androidbook.samplepackage1`）的上下文的引用的。代码清单 12-2 中的\
  \ `targetContext` 与目标应用启动时传递给该应用的上下文是相同的。正如方法名称（通过其“create”前缀）所示，每次调用都会返回一个新的上下文对象。然而，文档向我们保证，这个返回的上下文对象被设计为轻量级的。\n\
  \n无论你是否拥有共享用户 ID，此 API 都适用。如果共享用户 ID，那自然很好。如果不共享用户 ID，则目标应用需要将其资源声明为对外部用户可访问。\n\n\
  `createPackageContext()` 使用以下三个标志之一：\n\n- 如果标志为 `CONTEXT_INCLUDE_CODE`，Android 允许你将目标应用的代码加载到当前进程中。该代码随后将像你的代码一样运行。只有当两个包具有相同的签名和共享用户\
  \ ID 时，此操作才会成功。如果共享用户 ID 不匹配，使用此标志将导致安全异常。\n- 如果标志为 `CONTEXT_RESTRICTED`，我们仍然应该能够访问资源路径，而无需走到请求代码加载这种极端情况。\n\
  - 如果标志为 `CONTEXT_IGNORE_SECURITY`，则证书被忽略，代码被加载，但将在你的用户 ID 下运行。因此，文档建议，如果你要使用此标志，必须极其谨慎。\n\
  \n现在，我们了解了如何将包、签名和共享用户 ID 协同使用，以控制对应用所拥有和创建内容的访问。\n\n### 库项目\n\n在我们讨论共享代码和资源时，一个值得思考的问题是：“库”项目的想法是否有帮助？为了探究这一点，我们首先需要理解什么是库项目、如何创建它们以及如何使用这些项目。\n\
  \n#### 什么是库项目？\n\n从 ADT 0.9.7 Eclipse 插件开始，Android 支持库项目的概念。库项目是 Java 代码和资源的集合，看起来像一个常规项目，但它本身永远不会生成\
  \ `.apk` 文件。相反，库项目的代码和资源会成为另一个项目的一部分，并编译到该主项目的 `.apk` 文件中。\n\n\n好的，作为高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例格式，为您翻译以下文本。\n\
  \n\n#### 库项目谓词\n\n以下是关于这些库项目的一些事实：\n\n- 一个库项目可以拥有自己的包名。\n- 库项目不会被编译成自己的`.apk`文件，而是被合并到将其作为依赖项使用的项目的`.apk`文件中。\n\
  - 库项目可以使用其他 JAR 文件。\n- 库项目本身不能被制作成 JAR 文件。\n- Eclipse ADT 会将库项目合并到主引用项目中，并将它们作为主项目编译的一部分一起编译。\n\
  - 库项目和主项目都可以通过各自的`R.java`文件访问库项目中的资源。\n- 主项目和库项目之间可以有重复的资源 ID。主项目的资源 ID 优先于库项目中的资源\
  \ ID。\n- 如果您想区分两个项目之间的资源 ID，可以使用不同的资源前缀，例如为库项目资源使用`lib_`。\n- 一个主项目可以引用任意数量的库项目。\n\
  - 您可以为库项目设置优先级，以确定哪些资源更重要。\n- 库中的组件（例如 Activity）需要在目标主项目的清单文件中定义。定义时，库包中的组件名称必须使用库包名完全限定。\n\
  - 虽然将组件定义在库项目的清单文件中可以作为快速了解其支持哪些组件的好习惯，但并非必要。\n- 创建库项目的第一步是创建一个常规的 Android 项目，然后在其属性窗口中选择`Is\
  \ Library`标志。\n- 您也可以通过项目属性屏幕为主项目设置依赖的库项目。\n- 很明显，作为一个库项目，许多主项目都可以包含该库项目。\n- 库功能在\
  \ ADT 0.9.7、SDK 工具版本 r6 或更高版本以及 Android 2.1 或更高版本中可用。\n- 在此版本中，一个库项目不能引用另一个库项目，尽管在未来的版本中似乎有这样做的需求。\n\
  - 库项目不支持 AIDL 文件。\n- 库项目不支持可共享的 assets 目录。\n\n让我们通过创建一个库项目和一个主项目来探索库项目。这个示例项目的目标如下：\n\
  \n1.  在库项目中创建一个简单的 Activity。\n2.  通过定义一些菜单资源，为步骤 1 中的 Activity 创建一个菜单。\n3.  创建一个主项目\
  \ Activity，将库项目作为依赖项使用。\n4.  在步骤 3 的主项目中创建一个 Activity。\n5.  为步骤 4 中的主 Activity 创建一个菜单。\n\
  6.  设置一个菜单项，从主 Activity 调用库项目中的 Activity。\n\n一旦创建了这些项目，接下来是来自主项目的 Activity（来自步骤\
  \ 4 的 Activity，图 12–2）。\n\n![images](img/1202.jpg)\n\n**图 12–2.** *主项目中带有菜单的示例 Activity*\n\
