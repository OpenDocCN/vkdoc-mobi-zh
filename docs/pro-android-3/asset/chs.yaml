  \ Log.v(MainActivity.TAG,\n            \"in TitlesFragment onCreateView. container\
  \ is \"\n            + container);\n        return super.onCreateView(myInflater,\
  \ container, myBundle);\n    }\n\n    @Override\n    public void onActivityCreated(Bundle\
