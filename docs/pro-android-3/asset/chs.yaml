  \n        android:layout_width=\"match_parent\"\n        android:layout_height=\"\
  match_parent\" />\n  </ScrollView>\n</LinearLayout>\n```\n\n对于你的示例应用，无论是在横屏模式还是竖屏模式下，你都可以为详情使用完全相同的布局文件。这个布局不是为\
  \ Activity 准备的，它只是为了让你的片段显示文本。由于它可以被视为默认布局，你可以将其存储在 `/res/layout` 目录中，即使你在横屏模式下，它也会被找到并使用。当\
  \ Android 查找详情 XML 文件时，它会尝试与设备配置紧密匹配的特定目录，但如果它在其他任何地方都找不到 `details.xml` 文件，最终会回到\
  \ `/res/layout` 目录中查找。当然，如果你想在横屏模式下为你的片段使用不同的布局，你可以定义一个单独的 `details.xml` 布局文件，并将其存储在\
  \ `/res/layout-land` 目录下。请随意使用不同的 `details.xml` 文件进行尝试。\n\n当你的详情片段的 `onCreateView()`\
  \ 被调用时，你只需获取适当的 `details.xml` 布局文件，对其进行填充，并将文本设置为 `Shakespeare` 类中的文本。我不会在这里包含 `Shakespeare`\
  \ 的完整 Java 代码，但列表 29–7 中提供了部分代码，以便你了解它是如何实现的。要获取完整源码，请访问项目下载文件，具体方式参见本章末尾的参考部分。\n\
  \n**列表 29–7.** *Shakespeare 的源代码*\n\n```java\npublic class Shakespeare {\n    public\
  \ static String TITLES[] = {\n            \"亨利四世 (第一部)\",\n            \"亨利五世\"\
  ,\n            \"亨利八世\",\n            \"罗密欧与朱丽叶\",\n            \"哈姆雷特\",\n    \
  \        \"威尼斯商人\",\n            \"奥赛罗\"\n    };\n    public static String DIALOGUE[]\
  \ = {\n        \"我们这样摇摇欲坠，如此苍白忧虑，\\n...\n*... 以此类推 ...*\n```\n\n现在，你的详情片段视图层级结构包含了所选标题对应的文本。你的详情片段已经准备就绪。现在你可以回到\
  \ `showDetails()` 方法来讨论 `FragmentTransactions` 了。\n\n\n\n### Fragment 事务与 Fragment\
  \ 回退栈\n\n`showDetails()` 方法中用来拉取新详情 fragment 的代码（如**代码清单 29-8** 所示）看起来相当简单，但其中涉及许多内容。值得花些时间来解释正在发生的事情及其原因。如果你的\
  \ activity 处于多面板模式，你希望在一个紧邻标题列表的 fragment 中显示详情。你可能已经在显示详情了，这意味着用户可能已经看到了一个详情 fragment。无论哪种情况，资源\
  \ ID `R.id.details` 都对应你 activity 中的 `FrameLayout`，如**代码清单 29-3** 所示。如果布局中已经存在一个详情\
  \ fragment（因为你没有为其分配其他 ID），它就会拥有这个 ID。因此，要判断布局中是否存在详情 fragment，你可以通过 `findFragmentById()`\
  \ 向 fragment 管理器查询。如果框架布局为空，该方法将返回 `null`，否则会返回当前的详情 fragment。然后，你便可以决定是否需要放置一个新的详情\
  \ fragment 到布局中——无论是布局为空，还是已存在一个对应其他标题的详情 fragment。一旦你决定创建并使用一个新的详情 fragment，就调用工厂方法来生成一个新实例。现在，你可以将这个新\
  \ fragment 放置到位，供用户查看。\n\n**代码清单 29-8.** *Fragment 事务示例*\n\n```\n    public void\
  \ showDetails(int index) {\n        Log.v(TAG, \"in MainActivity showDetails(\"\
  \ + index + \")\");\n\n        if (isMultiPane()) {\n            // 检查当前显示的是哪个 fragment，如需要则进行替换。\n\
              DetailsFragment details = (DetailsFragment)\n                    getFragmentManager().findFragmentById(R.id.details);\n\
              if (details == null || details.getShownIndex() != index) {\n                //\
  \ 创建新的 fragment 来展示当前选项。\n                details = DetailsFragment.newInstance(index);\n\
  \n                // 执行事务，将框架内的任何现有 fragment 替换为此 fragment。\n                Log.v(TAG,\
  \ \"about to run FragmentTransaction...\");\n                FragmentTransaction\
  \ ft\n                        = getFragmentManager().beginTransaction();\n                ft.setTransition(\n\
                          FragmentTransaction.TRANSIT_FRAGMENT_FADE);\n                //ft.addToBackStack(\"\
  details\");\n                ft.replace(R.id.details, details);\n                ft.commit();\n\
              }\n                // 其余部分出于篇幅考虑已省略。\n    }\n```\n\n需要理解的一个关键概念是：fragment\
  \ 必须存在于一个视图容器（也称为视图组）内。这在一定程度上是因为 fragment 本身并非视图。`ViewGroup` 类包括布局及其派生类。这就是为什么你在\
  \ activity 的 `main.xml` 布局文件中选择了 `FrameLayout`。`FrameLayout` 是你的详情 fragment 将要放置的地方。如果你在\
  \ activity 的布局文件中指定了另一个 `<fragment>` 标签，那么你就无法进行所需的动态替换。`FragmentTransaction` 正是你用来执行替换操作的工具。你告诉\
  \ fragment 事务，你希望用新的详情 fragment 替换框架布局中的任何现有内容。你本可以通过定位详情 `TextView` 的资源 ID，并直接将其文本设置为新莎士比亚标题的文本，来避免这一切。但这涉及\
  \ fragment 的另一面，也解释了为何要使用 `FragmentTransaction`。\n\n如你所知，activity 是按栈结构排列的。随着你在应用中不断深入，往往会出现多个\
  \ activity 同时存在于栈中的情况。当按下返回键时，最上层的 activity 会消失，你将被返回到下面的 activity，该 activity 会恢复运行。这个过程可以一直持续，直到你回到主屏幕。\n\
  \n当 activity 只具有单一用途时，这没有问题。但现在一个 activity 可以同时运行多个 fragment，而且你可以在不离开最顶层 activity\
  \ 的情况下深入应用内部，因此 Android 确实需要将返回键的栈概念扩展，以包含 fragment。事实上，fragment 对此要求更甚。当一个 activity\
  \ 中有多个 fragment 同时交互，并且需要一次性在多个 fragment 之间切换到新内容时，按下返回键应该让所有 fragment *一起*回退一步。为了确保每个\
  \ fragment 都能正确地参与回退，需要创建并管理一个 `FragmentTransaction` 来执行这种协调。\n\n请注意，activity 内部并不强制要求为\
  \ fragment 设置回退栈。你可以将应用编码为让返回键只在 activity 层面工作，而完全不涉及 fragment 层面。如果 fragment 没有回退栈，按下返回键会将当前\
  \ activity 弹出栈，并将用户返回到其下方的内容。如果你选择利用 fragment 的回退栈，则需要取消**代码清单 29-8** 中 `ft.addToBackStack(\"\
  details\")` 一行的注释。在这个特定例子中，你将标签参数硬编码为字符串 `\"details\"`。这个标签应该是一个合适的字符串名称，用于表示事务发生时\
  \ fragment 的状态。你可以在代码中通过标签值来查询回退栈，以删除条目或弹出条目。为了让日后能够找到合适的事务，你应该为这些事务设置有意义的标签。\n\n\
  \n\n#### 片段事务转换与动画\n\n片段事务的一大优势在于，你可以通过过渡效果和动画，在旧片段与新片段之间执行切换。这与第 16 章和第 20 章中介绍的动画不同。这些过渡方式更为简单，无需深入的图形学知识。接下来，我们使用片段事务过渡，在将旧详情片段替换为新详情片段时添加特效。这能为你的应用增添精致感，使新旧片段的切换看起来流畅自然。实现这一目的的方法之一是使用`setTransition()`，如代码清单\
  \ 29-8 所示。不过，可供使用的过渡类型有好几种。你在示例中使用了淡入效果，但也可以使用`setCustomAnimations()`方法来描述其他特效，例如让一个片段向右滑出的同时，另一个片段从左侧滑入。自定义动画使用的是新的对象动画定义，而非旧的。旧的动画\
  \ XML 文件使用`<translate>`等标签，而新的 XML 文件则使用`<objectAnimator>`。旧的 XML 标准文件位于对应 Android\
  \ SDK 平台目录下的`/data/res/anim`文件夹中（例如 Honeycomb 的`platforms/android-11`）。该目录下的`/data/res/animator`文件夹中也存放了一些新的\
  \ XML 文件。你的代码可以像这样编写：\n\n```\nft.setCustomAnimations(android.R.animator.fade_in,\
  \ android.R.animator.fade_out);\n```\n\n这将使新片段淡入，同时旧片段淡出。第一个参数应用于进入的片段，第二个参数应用于退出的片段。你可以自由浏览\
  \ Android 动画器目录，以查找更多内置动画。如果你想创建自己的动画，本章稍后会有关于对象动画器的章节提供帮助。另一个你需要了解的重要知识点是：过渡调用必须在`replace()`调用之前进行，否则它们将不会产生任何效果。\n\
  \n使用对象动画器为片段添加特效，是一种有趣的过渡方式。你还应该了解`FragmentTransaction`上的另外两个方法：`hide()`和`show()`。这两个方法都将一个片段作为参数，并且它们的作用正如你所料。对于片段管理器（Fragment\
  \ Manager）中与某个视图容器相关联的片段，这些方法会简单地在用户界面中隐藏或显示该片段。在此过程中，该片段并不会从片段管理器中移除，但它必须与视图容器绑定，才能影响其可见性。如果片段没有视图层级，或者其视图层级未与显示的视图层级绑定，那么这些方法将不会起任何作用。\n\
  \n一旦为片段事务指定了特效，你就需要告诉它你想要完成的主要工作。在你的例子中，你要将帧布局中的现有内容替换为新的详情片段。这时就要用到`replace()`方法。这等同于先为帧布局中已有的所有片段调用`remove()`，然后再为新的详情片段调用`add()`，这意味着你也可以根据需要直接调用`remove()`或`add()`。\n\
  \n处理片段事务时必须执行的最后一步是提交它。`commit()`方法不会立即执行操作，而是将任务安排到 UI 线程准备好时再进行。\n\n现在你应该明白，为什么仅仅更改一个简单片段中的内容就需要如此繁琐的操作了。这不只是因为你想改变文本；你可能希望在过渡期间实现特殊的图形效果。你可能还想将过渡细节保存在片段事务中，以便日后可以撤销。最后这一点可能有些令人困惑，下面我们来进行说明。\n\
  \n这并非真正意义上的事务。当你从回退栈中弹出片段事务时，你并没有撤销可能已经发生的数据更改。例如，如果你在片段事务被添加到回退栈的过程中，改变了 Activity\
  \ 中的数据，那么按下返回键并不会使 Activity 数据变化恢复到之前的状态。你只是在用户界面视图上按照进入时的路径逐步回退，就像处理 Activity 时一样，但在这里是针对片段的。由于片段的保存和恢复方式，从已保存状态恢复的片段的内部状态将取决于你随片段保存了哪些值以及你如何恢复它们。因此，你的片段可能会看起来和之前一样，但你的\
  \ Activity 却不会——除非你在恢复片段时采取措施来恢复 Activity 的状态。\n\n在你的示例中，你只处理一个视图容器，并引入了一个详情片段。如果你的用户界面更复杂，你可以在片段事务中操作其他片段。实际上，你正在做的是：开始事务，将详情帧布局中的任何现有片段替换为新的详情片段，指定淡入动画，然后提交事务。你已经将添加该事务到回退栈的部分注释掉了，但当然可以取消注释，以参与回退栈的操作。\n\
  \n\n\n### FragmentManager\n\n`FragmentManager` 是一个负责管理隶属于某个 Activity 的 Fragment\
  \ 的组件。这包括返回栈中的 Fragment 以及可能处于游离状态的 Fragment。我们来解释一下。Fragment 只能在 Activity 的上下文中创建。这可以通过加载\
  \ Activity 的布局 XML 文件，或者通过类似代码清单 29-1 所示的代码直接实例化来实现。当通过代码实例化时，Fragment 通常会通过 Fragment\
  \ 事务附加到 Activity 上。无论哪种情况，都使用 `FragmentManager` 类来访问和管理 Activity 的这些 Fragment。\n\
  \n你可以在 Activity 或已附加的 Fragment 上调用 `getFragmentManager()` 方法来获取 Fragment 管理器。你曾在代码清单\
  \ 29-8 中看到，Fragment 管理器是你获取 Fragment 事务的地方。除了获取 Fragment 事务，你还可以通过 Fragment 的 ID、标签，或\
  \ Bundle 和键的组合来获取一个 Fragment。\n\n为此，相关的 getter 方法包括 `findFragmentById()`、`findFragmentByTag()`\
  \ 和 `getFragment()`。最后一个方法会与 `putFragment()` 配合使用，后者也接受一个 Bundle、一个键以及要放入的 Fragment。这个\
  \ Bundle 很可能是 `savedState` Bundle，而 `putFragment()` 将在 `onSaveInstanceState()` 回调中使用，以保存当前\
  \ Activity（或另一个 Fragment）的状态。`getFragment()` 方法可能会在 `onCreate()` 中被调用以对应 `putFragment()`，不过对于\
  \ Fragment 来说，如前所述，该 Bundle 也可用于其他回调方法。\n\n显然，你不能在一个尚未附加到 Activity 的 Fragment 上使用\
  \ `getFragmentManager()` 方法。但同样，你也可以将一个 Fragment 附加到 Activity 上，同时暂时不让用户看到它。如果你这样做，确实应该为该\
  \ Fragment 关联一个 `String` 标签，以便将来能够访问它。你很可能会使用 `FragmentTransaction` 的以下方法来实现：\n\n\
  `public FragmentTransaction add (Fragment fragment, String tag)`\n\n实际上，你可以拥有一个不展示视图层次结构的\
  \ Fragment。这样做可能是为了将某些逻辑封装在一起，使其可以附加到 Activity 上，同时仍能从 Activity 的生命周期和其他 Fragment\
  \ 中保持一定的自主性。当 Activity 由于设备配置变更而经历重建周期时，这个非 UI Fragment 可以在 Activity 消失并重新出现的过程中基本保持不变。这对于\
  \ `setRetainInstance()` 选项来说是一个很好的应用场景。\n\nFragment 返回栈也是 Fragment 管理器的管辖领域。虽然 Fragment\
  \ 事务用于将 Fragment 放入返回栈，但 Fragment 管理器可以将 Fragment 从返回栈中移除。这通常是通过 Fragment 的 ID 或标签来完成的，但也可以基于返回栈中的位置来操作，或者仅仅弹出最顶层的\
  \ Fragment。\n\n最后，Fragment 管理器还提供了一些用于调试功能的方法，例如通过 `enableDebugLogging()` 向 `LogCat`\
  \ 输出调试消息，或通过 `dump()` 将 Fragment 管理器的当前状态转储到流中。请注意，你在代码清单 29-4 的 Activity 的 `onCreate()`\
  \ 方法中开启了 Fragment 管理器的调试功能。\n\n#### 引用 Fragment 时的注意事项\n\n现在该重新审视之前关于 Fragment 生命周期、参数和已保存状态\
  \ Bundle 的讨论了。Android 可能会在多个不同的时间点保存你的某个 Fragment。这意味着当你的应用想要检索该 Fragment 时，它有可能已不在内存中。因此，我提醒你*不要*认为对\
  \ Fragment 的变量引用会长期有效。如果使用 Fragment 事务在容器视图中替换 Fragment，那么对旧 Fragment 的任何引用现在都指向一个可能位于返回栈中的\
  \ Fragment。或者在应用配置发生变化（例如屏幕旋转）时，Fragment 可能会从 Activity 的视图层次结构中分离。请务必小心。\n\n如果你要持有一个\
  \ Fragment 的引用，请留意它可能何时被保存；当你需要再次找到它时，应使用 Fragment 管理器的某个 getter 方法。如果你想保留一个 Fragment\
  \ 引用，例如当 Activity 经历配置变更时，你可以使用 `putFragment()` 方法配合适当的 Bundle。对于 Activity 和 Fragment\
  \ 来说，适当的 Bundle 都是在 `onSaveInstanceState()` 中使用并在 `onCreate()`（对于 Fragment 而言，则是\
  \ Fragment 生命周期的其他早期回调）中再次出现的 `savedState` Bundle。你很可能永远不需要将直接的 Fragment 引用存储到 Fragment\
  \ 的参数 Bundle 中；如果你有此想法，请先非常仔细地考虑清楚。\n\n获取特定 Fragment 的另一种方法是使用已知的标签或已知的 ID 进行查询。之前描述的\
  \ getter 方法允许通过这种方式从 Fragment 管理器中检索 Fragment，这意味着你可以选择只记住 Fragment 的标签或 ID，以便使用这些值之一从\
  \ Fragment 管理器中检索它，而不是使用 `putFragment()` 和 `getFragment()`。\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您的格式和内容要求，将以下英文文本翻译为中文。\n\
  \n\n#### ListFragments 与 `<fragment>`\n\n要使你的示例应用完整，还需要介绍一些内容。首先是 `TitlesFragment`\
  \ 类。这个类是通过主 Activity 的 `layout.xml` 文件创建的。`<fragment>` 标签作为该 Fragment 将放置位置的占位符，但它并不定义此\
  \ Fragment 的视图层级结构。`TitlesFragment` 的代码见代码清单 29–9。`TitlesFragment` 用于显示应用的标题列表。\n\
  \n**代码清单 29–9.** *TitlesFragment Java 代码*\n\n```java\nimport android.app.Activity;\n\
  import android.app.ListFragment;\nimport android.os.Bundle;\nimport android.util.AttributeSet;\n\
  import android.util.Log;\nimport android.view.LayoutInflater;\nimport android.view.View;\n\
