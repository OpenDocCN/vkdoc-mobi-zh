  \ `onNewIntent()`。如果您仅为搜索调用者 Activity 定义默认搜索（而不是整个应用程序），则情况并非如此。\n\n\n\n#### 简易建议提供程序用户体验\n\
  \n在您准备运行此程序时，请确保您的建议提供程序权限在以下三个字段中保持一致：\n\n- `AndroidManifest.xml`\n- `searchable.xml`\n\
  - `SimpleSuggestionProvider.java`\n\n运行此应用后，您将看到一个如图 23-20 所示的主屏幕（这是我们的主搜索调用 Activity）。\n\
  \n![images](img/2320.jpg)\n\n**图 23–20.** *简易建议提供程序：主 Activity（已启用本地搜索）*\n\n当此 Activity\
  \ 处于焦点状态时，如果点击搜索键，您将看到本地搜索被调用，如图 23-21 所示。\n\n![images](img/2321.jpg)\n\n**图 23–21.**\
  \ *简易建议提供程序：本地搜索 QSB*\n\n如您所见，图 23-21 中没有显示任何建议，因为到目前为止我们还没有执行搜索。您还可以看到这是一个本地搜索；搜索的标签和提示与我们在搜索元数据\
  \ XML 文件中指定的内容一致。\n\n现在我们来搜索字符串 `test1`。这将带您进入搜索 Activity 屏幕，如图 23-22 所示。\n\n![images](img/2322.jpg)\n\
  \n**图 23–22.** *简易建议提供程序：本地搜索结果 Activity*\n\n从清单 23-17 中 `SearchActivity` 的源码可以看出，`SearchActivity`\
  \ 在屏幕上并没有做任何特殊操作，但在后台，它正在将查询字符串保存到数据库中。现在，如果您导航回主屏幕（通过按返回键）并再次调用搜索，您将看到以下屏幕（如图 23-23\
  \ 所示），其中搜索建议已填充了之前的查询文本。在图 23-23 中，您还可以看到建议底部的“SSSP”字样。在此处，由于这是本地搜索，它清楚地表明建议来自我们的应用，因此“SSSP”可能显得多余。然而，当\
  \ `test1` 搜索字符串作为全局搜索建议的一部分显示时，这个“SSSP”字符串将起到区分作用。\n\n![images](img/2323.jpg)\n\n\
  **图 23–23.** *简易建议提供程序：检索到的本地建议*\n\n现在是了解如何调用 `onNewIntent()` 的好时机。当您在搜索 Activity（图\
  \ 23-22）上时，您可以输入一个像 `t` 这样的字母，它将使用“边输入边搜索”功能再次调用搜索，您将在调试日志中看到 `onNewIntent()` 被调用。\n\
  \n接下来，我们看看需要做些什么才能让这些建议显示在全局 QSB 中。由于我们在 `searchable.xml` 中启用了 `includeInGlobalSearch`，您也应该能够在全局\
  \ QSB 中看到这些建议。但是，在此之前，您需要按照图 23-24 所示，为全局 QSB 建议启用此应用。\n\n![images](img/2324.jpg)\n\
  \n**图 23–24.** *启用简易建议提供程序*\n\n我们在本章开头已经向您展示了如何进入此屏幕。我们编写的简易自定义建议提供程序现在已作为“SSSP:Search\
  \ Activity”出现在可搜索应用列表中。此文本字符串来自 `SearchActivity` 的 Activity 名称（参见清单 23-16）。\n\n\
  完成此选择后，您将看到全局搜索（如图 23-25 所示）与我们的建议提供程序协同工作。\n\n![images](img/2325.jpg)\n\n**图 23–25.**\
  \ *来自简易建议提供程序的全局建议*\n\n在全局搜索中，如果您输入像 `t` 这样的文本，它将调出本节中我们建议提供程序的建议。当您通过全局搜索导航到特定项时，您将看到如图\
  \ 23-22 所示的本地搜索 Activity。\n\n至此，我们对简易建议提供程序的讨论就结束了。您已经学习了如何使用内置的 `RecentSearchSuggestionProvider`\
  \ 来记住特定于您应用的搜索。使用这种方法，只需最少的代码，您就应该能够处理本地搜索，并使它们即使在全局上下文中也能作为建议使用。\n\n然而，这个简单的练习并没有向您展示如何从头开始编写建议提供程序。更重要的是，我们完全没有提及建议提供程序如何返回一组建议以及该建议集中有哪些可用的列。为了理解这一点以及更多内容，我们需要从头实现一个自定义建议提供程序。\n\
  \n### 实现自定义建议提供程序\n\nAndroid 搜索非常灵活，以至于不进行自定义都是一种浪费。由于我们在上一节中使用了预构建的建议提供程序，因此建议提供程序的许多特性都隐藏在了\
  \ `SearchRecentSuggestionsProvider` 中而未加讨论。接下来，我们将通过实现一个名为 `SuggestUrlProvider`\
  \ 的自定义建议提供程序来探索这些细节。\n\n我们将首先解释这个 `SuggestUrlProvider` 预期如何工作。然后，我们会给出实现中的文件列表。这些文件将让您对如何构建自定义建议提供程序有一个总体概念。\n\
  \n最后，我们将向您展示完成后的应用如何使用。让我们开始吧。\n\n#### 规划自定义建议提供程序\n\n我们将我们的自定义建议提供程序命名为 `SuggestURLProvider`。此提供程序的目标是监控\
  \ QSB 中正在输入的内容。如果搜索查询中包含类似 `“great.m”` 的文本（后缀 `.m` 用于表示“含义”），提供程序会将查询的第一部分解释为一个单词，并建议一个基于互联网的\
  \ URL，该 URL 可被调用以查找该单词的含义。\n\n对于每个单词，此提供程序建议两个 URL。第一个 URL 允许用户使用 [`http://www.thefreedictionary.com`](http://www.thefreedictionary.com)\
  \ 搜索该单词，第二个 URL 则使用 [`http://www.google.com`](http://www.google.com)。选择其中一个建议将直接跳转到这些网站之一。如果用户点击\
  \ QSB 的搜索图标，则搜索 Activity 将仅在该 Activity 的简单布局中记录查询文本。当我们向您展示此交互的屏幕截图时，您将更清楚地看到这一点。\n\
  \n让我们来看看构成此项目的文件列表。您也可以通过本章末尾的 URL 下载此项目的压缩文件。\n\n\n\n#### SuggestUrlProvider 项目实现文件\n\
  \n两个主要文件是 `SearchActivity.java` 和 `SuggestUrlProvider.java`。 然而，你需要一些辅助文件来完成此项目。以下是这些文件的列表及其功能的简要说明。我们在解决方案中包含了所有文件的源代码。\n\
  \n*   `SuggestUrlProvider.java`：此文件实现了自定义建议提供程序的协议。在这种情况下，自定义建议提供程序将查询字符串解释为单词，并使用建议游标返回若干条建议。（清单\
  \ 23–20）\n*   `SearchActivity.java`：此 Activity 负责接收由建议提供程序提供的查询或建议。`SearchActivity`\
  \ 的定义也负责将建议提供程序与此 Activity 关联起来。（清单 23–23）\n*   `layout/layout_search_activity.xml`：此布局文件由\
  \ `SearchActivity` 可选使用。在我们的示例中，我们使用此布局来记录传入的查询。（清单 23–24）\n*   `values/strings.xml`：包含布局、本地搜索标题、本地搜索提示等的字符串定义。（清单\
  \ 23–25）\n*   `xml/searchable.xml`：搜索元数据 XML 文件，用于将 `SearchActivity`、建议提供程序和 QSB\
  \ 关联起来。（清单 23–21）\n*   `AndroidManifest.xml`：定义搜索 Activity 和建议提供程序时的应用程序清单文件。在此处，你还声明\
  \ `SearchActivity` 将作为此应用程序的本地搜索被调用。（清单 23–27）\n\n我们将从探索 `SuggestUrlProvider` 开始。\n\
  \n#### 实现 `SuggestUrlProvider` 类\n\n在我们的自定义建议提供程序项目中，`SuggestUrlProvider` 类是实现建议提供程序协议的类。我们将从它的职责开始，探索\
  \ `SuggestUrlProvider` 的实现。\n\n##### 建议提供程序的职责\n\n核心上，建议提供程序是一个内容提供程序。与内容提供程序非常相似，建议提供程序由\
  \ Android 搜索通过标识提供程序的 URI 和表示查询的附加参数来调用。\n\nAndroid 搜索使用两种类型的 URI 来调用提供程序。第一种称为\
  \ *搜索 URI*。此 URI 用于收集建议集。响应需要是一行或多行，每行包含一组已知的列。\n\n第二种 URI 称为 *建议 URI*。此 URI 用于更新先前缓存的建议。响应需要是包含一组已知列的单行。\n\
  \n建议提供程序还需要在搜索元数据 XML 文件 (`searchable.xml`) 中指定它希望如何接收搜索查询，包括当查询被逐字键入时的情况。这可以通过提供程序的\
  \ `query` 方法的 `select` 参数或 URI 本身的最后一个路径段（该段也作为参数之一传递给提供程序的 `query` 方法）来完成。\n\n\
  对于建议提供程序，有许多可用的列，每列都启用某种搜索行为。提供程序首先需要决定它想要返回的这一组控制列。其中一些控制列包括：\n\n*   用于启用/禁用对返回给\
  \ Android 搜索的建议进行缓存的列。\n*   用于控制是否希望建议重写查询框中的文本的列。\n*   用于在用户点击建议时直接调用操作而不是显示一组搜索结果的列。\n\
  \n##### `SuggestUrlProvider` 的总体源代码\n\n清单 23–20 是 `SuggestUrlProvider` 类的源代码。本章后面我们将在更详细地解释每个列出的职责时，更详细地研究此代码的各部分。\n\
