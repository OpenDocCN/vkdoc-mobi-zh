  \n- 定义 widget\n- 响应 widget 回调\n- 为 widget 提供配置 Activity\n- 展示 `RemoteViews` 的使用\n\
  - 提供状态管理框架\n- 为 widget 设计美观的布局\n\n接下来，我们将提供一些关于 widget 的指南。\n\n### Widget 的限制与扩展\n\
  \nAndroid 主屏幕 widget 乍看之下很简单。然而，当你开始编写一些非典型 widget 时，会发现它们有许多细微之处需要注意。\n\n如果你的 widget\
  \ 不需要任何状态管理，并且每天被调用的次数不超过几次，那么编写这个 widget 会非常简单。\n\n下一级 widget 是需要管理状态但调用不频繁的 widget，就像我们这里展示的那样。这类\
  \ widget 可以从状态管理框架中受益。我们在本章中展示了一个极简状态管理框架。我们假设将来会有更复杂的框架可用，或者你可以编写一个更健壮、更灵活的框架。\n\
  \n再下一级的 widget 必须以秒级甚至毫秒级的频率被调用。对于这些 widget，你需要使用 `Alarm Manager` 自行构建更新调用。你可能还需要一个服务来频繁管理状态，而不是依赖持久化框架。例如，如果你要编写一个\
  \ `秒表` widget，就需要一个至少每秒计数的定时器，并且还需要跟踪计数器，这自然就涉及状态管理。\n\n另一个需要考虑的因素是，widget 视图框架所依赖的\
  \ `RemoteViews` 没有提供直接在 widget 上进行编辑的机制（至少没有相关的文档记录）。`RemoteViews` 还对可使用的视图和布局类型设置了限制。你无法直接控制这些视图，只能通过\
  \ `RemoteViews` 类提供的方法进行控制。\n\n基于当前 widget 的设计和意图，Google 似乎期望 widget 主要属于类别 1 或类别\
  \ 2。未来版本的 widget 框架还有很大的扩展空间。\n\n```\n\n\n### 资源\n\n在准备本章材料时，我们发现以下资源非常有用，现按其有用程度排序如下：\n\
