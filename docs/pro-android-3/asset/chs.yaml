  \n有了这些新活动及其布局，您可以通过点击主 `RegularActivity` 中的“本地搜索活动”菜单项来调用此 `LocalSearchEnabledActivity`（参见图\
  \ 23–13 查找菜单）。调用后，该活动的外观如图 23–17 所示。\n\n![图片](img/2317.jpg)\n\n**图 23–17.** *启用本地搜索的活动*\n\
  \n当此活动获得焦点时，如果您点击设备搜索键，它将调用一个本地搜索框（本地 QSB），如图 23–18 所示。\n\n![图片](img/2318.jpg)\n\
  \n**图 23–18.** *本地搜索 QSB*\n\n请注意此搜索框的标签和提示文字。观察它们与全局搜索的区别（参见图 23–2）。这些标签和提示来自于为\
  \ `SearchActivity` 指定的搜索元数据（`searchable.xml` 清单 23–12）。现在，如果您在 QSB 中输入文本并点击搜索图标，最终将调用\
  \ `SearchActivity`（参见清单 23–11）。以下是这个 `SearchActivity` 的外观（图 23–19）。\n\n![图片](img/2319.jpg)\n\
  \n**图 23–19.** *响应本地搜索 QSB 的搜索结果*\n\n尽管此活动并未使用任何查询搜索文本来提取结果，但它演示了如何定义和调用搜索活动。本章稍后将展示这个\
  \ `SearchActivity` 如何使用搜索查询以及它需要响应的各种搜索相关操作。\n\n### 启用按键即搜\n\n到目前为止，我们探讨了几种调用搜索的方式，包括本地搜索和全局搜索。我们展示了如何在设备主页面上使用\
  \ QSB 进行搜索。我们讲述了只要活动未阻止全局搜索，如何从任何活动中调用它。我们还展示了活动如何指定本地搜索。我们将通过介绍另一种称为*按键即搜*的搜索调用方式来结束本主题。\n\
  \n当您查看诸如图 23–12 中所示的 `RegularActivity` 等活动时，有一种方法可以通过键入任意字母（例如“t”）来调用搜索。这种模式称为*按键即搜*，因为您键入的任何未被活动处理的按键都将触发搜索。\n\
  \n按键即搜的意图是这样的：在任何 Android 活动上，您可以告诉 Android，除了活动明确处理的按键之外，任何按键按下都可以调用搜索。例如，如果一个活动处理了“x”和“y”按键，但不在意其他按键，则该活动可以选择为“z”或“a”等其他按键调用搜索。这种模式对于已经显示搜索结果的活动非常有用。此类活动可以将按键按下解释为重新开始搜索的信号。\n\
  \n以下是在活动的 `onCreate()` 方法中启用此行为的两行代码（第一行用于调用全局搜索，第二行用于调用本地搜索）：\n\n`this.setDefaultKeyMode(Activity.DEFAULT_KEYS_SEARCH_GLOBAL);`\n\
  \n或\n\n`this.setDefaultKeyMode(Activity.DEFAULT_KEYS_SEARCH_LOCAL);`\n\n通过这种“按键即搜”机制调用全局搜索似乎不经过\
  \ `onSearchRequested()` 路由。这些按键直接调用全局搜索。因此，如果我们启用按键即搜，本示例中的 `RegularActivity` 似乎会调用全局搜索。（如果您还记得，在我们的测试中，当按下搜索键时，没有明确启用或禁用搜索的常规活动未能调用全局搜索）。您可以通过将以下行放置在\
  \ `RegularActivity` 类（清单 23–1）的 `onCreate()` 方法末尾来测试这种按键即搜行为：\n\n`this.setDefaultKeyMode(Activity.DEFAULT_KEYS_SEARCH_GLOBAL);`\n\
  \n然后在图 23–12 中按下“t”等字母，将会调用全局搜索。\n\n至此，我们关于 Android 搜索与活动交互的各种方式以及如何使用搜索的讨论就结束了。现在我们将了解如何参与搜索，而不仅仅是使用它。我们将实现一个简单的建议提供者应用程序，它可以为本地和全局\
  \ QSB 提供搜索建议。\n\n\n### 实现一个简单的建议提供程序\n\n本章内容较多，如果你一直在连续阅读，不妨先休息一下——因为我们即将开始另一大段文字，需要你全神贯注。\n\
  \n我们之前已经说明，建议提供程序如何让应用程序参与全局搜索。现在，我们将设计并编写一个简单的建议提供程序。你可以通过继承 Android SDK 中名为 `SearchRecentSuggestionsProvider`\
  \ 的预制提供程序，仅用几行代码就能创建一个简单的建议提供程序。\n\n首先，我们将解释一个简单的建议提供程序应用应如何工作。我们会列出实现中所用的文件清单。这些文件能让你对应用及其实现涉及的内容有一个总体概念。\n\
  \n编写建议提供程序时，有三个主要组件。第一个是建议提供程序，负责向 Android 搜索返回建议。第二个是搜索活动，负责接收查询或建议，并将其转化为搜索结果。第三个是一个名为搜索元数据的\
  \ XML 文件，它在搜索活动的上下文中定义。我们将描述每个组件的职责，并通过源代码展示其实现方式。\n\n但首先，让我们规划一下这个简单的建议提供程序应用。\n\
  \n#### 规划简单建议提供程序\n\n由于我们计划继承 `SearchRecentSuggestionsProvider`，最终得到的建议提供程序的功能基本是固定的。\n\
  \n`SearchRecentSuggestionsProvider` 允许你将从 QSB 提交给搜索活动的查询重新播放。一旦这些查询被搜索活动保存，当用户在\
  \ QSB 中输入搜索字母或文本时，它们就会通过建议提供程序重新提示给 QSB。\n\n在派生的建议提供程序中，我们通过指定需要重新播放的搜索文本部分来初始化基类提供程序。除此之外，我们几乎不需再做其他事情。我们还会使用一个最小化的搜索活动（仅包含一个文本视图），以显示搜索活动已被调用。在搜索活动内部，我们将展示用于检索和保存查询的方法，以便搜索提供程序能够使用这些查询。\n\
  \n应用完成后，我们的目标是看到之前的查询作为建议出现在本地和全局 QSB 中。\n\n接下来，我们将展示本项目实现中所用的文件清单。你也可以使用本章末尾的下载链接，下载本章的可导入项目。\n\
  \n#### 简单建议提供程序实现文件\n\n参与建议提供程序应用实现的主要文件有 `SearchActivity.java`、`SimpleSuggestionProvider.java`\
  \ 和 `searchable.xml`（搜索元数据）。然而，要完成整个项目，你还需要一些支持文件。我们将首先列出所有这些文件，并简要说明每个文件的作用。在解释解决方案时，我们会包含所有文件的源代码。\n\
  \n我们先从 Java 文件开始：\n\n*   `SimpleSuggestionProvider.java`：通过继承 SDK 提供的一个基类建议提供程序，实现我们讨论的建议提供程序。（清单\
  \ 23-15）\n*   `SearchActivity.java`：一个与建议提供程序配合使用的必需文件，它接收搜索文本进行搜索并显示搜索结果。它还负责保存供建议提供程序使用的查询。（清单\
  \ 23-17）\n*   `SimpleMainActivity.java`：一个用于调用本地搜索并演示本地建议的活动。（清单 23-19）\n\n以下是相应的布局文件：\n\
  \n*   `main.xml`：`SimpleMainActivity` 的布局文件（属于清单 23-19 的一部分）\n*   `/res/layout/layout_search_activity.xml`：`SearchActivity`\
  \ 的布局文件（属于清单 23-17 的一部分）\n*   `/res/values/strings.xml`：布局文件从这里使用公共字符串定义（属于清单 23-19\
  \ 的一部分）\n\n以下是搜索元数据文件：\n\n*   `/xml/searchable.xml`：此文件将搜索活动与建议提供程序连接起来。（清单 23-18）\n\
  \n当然，我们还需要清单文件：\n\n*   `AndroidManifest.xml`：在此文件中，所有应用组件都被定义给 Android。（清单 23-16）\n\
  \n如果你打算通过复制/粘贴直接编译本书源代码中的项目，我们建议你现在就根据上述文件，前往对应的清单编号进行操作。另一种方法是使用本章末尾参考资料中提供的链接下载本章的项目。\n\
  \n让我们从 `SimpleSuggestionProvider` 类的实现开始探索这些文件。\n\n#### 实现 `SimpleSuggestionProvider`\
  \ 类\n\n在这个简单的建议提供程序项目中，`SimpleSuggestionProvider` 类通过继承 `SearchRecentSuggestionsProvider`\
  \ 来充当建议提供程序。首先，我们来看看这个简单建议提供程序的职责。\n\n##### 简单建议提供程序的职责\n\n由于简单建议提供程序派生自 `SearchRecentSuggestionsProvider`，因此大部分职责由基类处理。为了向基类提供程序提供提示，派生建议提供程序需要使用一个唯一的授权字符串（authority）来初始化基类。这是因为\
  \ Android 搜索会根据一个唯一的内容提供程序 URI 来调用建议提供程序。而 Android 中的内容提供程序是通过其类似域名的字符串（称为授权字符串，authority）来调用的（关于内容提供程序授权字符串的完整理解，请参考第\
  \ 4 章关于内容提供程序的内容）。\n\n一旦通过简单调用基类实现了建议提供程序，就需要在清单文件中将其配置为具有授权字符串的常规内容提供程序。然后，需要将其（通过可搜索元数据\
  \ xml 文件间接地）与一个搜索活动绑定。搜索活动的定义指向 `searchable.xml` 文件，而该文件又指向建议提供程序。\n\n让我们检查一下这个提供程序的源代码，看看其中一些职责是如何实现的。\n\
  \n##### `SimpleSuggestionProvider` 的完整源代码\n\n由于我们继承自 `SearchRecentSuggestionsProvider`，简单建议提供程序的源代码将非常简单，如清单\
  \ 23-15 所示。\n\n**清单 23-15.** *SimpleSuggestionProvider.java*\n\n```\n//SimpleSuggestionProvider.java\n\
  public class SimpleSuggestionProvider\nextends SearchRecentSuggestionsProvider {\n\
  \n    final static String AUTHORITY =\n          \"com.androidbook.search.simplesp.SimpleSuggestionProvider\"\
  ;\n\n    final static int MODE =\n             DATABASE_MODE_QUERIES | DATABASE_MODE_2LINES;\n\
  \n    public SimpleSuggestionProvider() {\n        super();\n        setupSuggestions(AUTHORITY,\
  \ MODE);\n    }\n}\n```\n\n清单 23-15 中有几点值得注意：\n\n1.  初始化父类。\n2.  使用授权字符串和模式设置基类提供程序（指示需要记住搜索文本的哪些部分）。\n\
  \n授权字符串需要是唯一的。授权字符串必须与其在清单文件中的内容提供程序定义相匹配。（请参阅本项目后续的 Android 清单文件清单 23-16。）\n\n\
  我们来讨论一下 `setupSuggestions()` 方法的第二个参数：数据库模式。\n\n\n\n### 理解 `SearchRecentSuggestionsProvider`\
  \ 数据库模式\n\nAndroid 提供的 `SearchRecentSuggestionsProvider` 工具的核心功能是存储/回放数据库中的查询，以便它们可以作为未来的搜索建议。一条建议包含两个文本字符串（参见\
  \ 图 23–2）。只有第一个字符串是必需的。当你使用 `SearchRecentSuggestionsProvider` 回放这些字符串时，你需要告知它你想使用一个还是两个字符串。\n\
  \n为满足此需求，基础建议提供者支持两种模式（模式位）。两种模式均使用以下前缀：\n\n`DATABASE_MODE_...`\n\n具体两种模式如下：\n\n\
  - `DATABASE_MODE_QUERIES`（二进制值为 1）\n- `DATABASE_MODE_2LINES`（二进制值为 2）\n\n第一种模式表示只需存储并回放单条查询字符串。第二种模式表示建议提供者可以回放两个字符串。一个字符串是查询本身，另一个是显示在建议项中的描述行。\n\
  \n`SearchActivity` 负责在收到查询响应请求时保存这些字符串。`SearchActivity` 会调用以下方法来存储这些项（在讨论搜索活动时，我们会更详细地介绍）：\n\
  \n```\npublic class SearchRecentSuggestions\n{\n   ...\n   public void saveRecentQuery\
  \ (String queryString, String line2);\n   ...\n}\n```\n\n**注意：** `SearchRecentSuggestions`\
  \ 类是一个 SDK 类，当我们在 清单 23–17 中讨论搜索活动代码时，会对此进行更详细的介绍。\n\n`queryString` 是用户输入的字符串。该字符串将作为建议显示，如果用户点击该建议，此字符串将被发送到你的可搜索活动（作为新的搜索查询）。\n\
  \n以下是 Android 文档关于 `line2` 参数的说明：\n\n> 如果你使用 `DATABASE_MODE_2LINES` 配置了最近建议提供者，可以在此处传入第二行文本。它将以较小的字体显示在主建议下方。输入时，两行文本中的匹配项都会显示在列表中。如果你没有配置双行模式，或者某条建议没有要显示的额外文本，可以在此处传入\
  \ null。\n\n在我们的示例中，我们希望同时保存查询及其在建议中显示的辅助文本。或者至少，我们希望显示诸如 SSSP（简单搜索建议提供者）之类的辅助文本在建议底部，这样当来自此提供者的建议在全局搜索中显示时，我们可以看出哪个应用程序负责搜索建议中的文本。\n\
  \n指定此模式以便保存建议和辅助文本的方法是，按照 清单 23–15 所示设置两个模式位。如果你仅将模式位设置为保存两行，将会得到一个无效参数异常。模式位必须至少包含\
  \ `DATABASE_MODE_QUERIES` 位。本质上，你需要执行按位或操作。因此，这些模式本质上是互补的，而非互斥的。\n\n**提示：** 你可以通过\
  \ [`developer.android.com/reference/android/provider/SearchRecentSuggestions.html`](http://developer.android.com/reference/android/provider/SearchRecentSuggestions.html)\
  \ 了解更多关于此预制建议提供者的信息。\n\n现在我们已经有了简单建议提供者的源代码，让我们看看如何在清单文件中注册此提供者。\n\n### 在清单文件中声明建议提供者\n\
  \n由于我们的 `SimpleSuggestionProvider` 本质上是一个内容提供者，因此它与任何其他内容提供者一样，在清单文件中进行注册。清单 23–16\
  \ 显示了此项目的清单文件。请注意，此清单文件的关键部分已被突出显示。\n\n**清单 23–16.** *SimpleSuggestionProvider 清单文件*\n\
  \n```\n//文件名: AndroidManifest.xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n\
  <manifest\n      package=\"com.androidbook.search.simplesp\"\n      android:versionCode=\"\
  1\"\n      android:versionName=\"1.0.0\">\n    <application android:icon=\"@drawable/icon\"\
  \n       android:label=\"Simple Search Suggestion Provider:SSSP\">\n        <activity\
  \ android:name=\".SimpleMainActivity\"\n           android:label=\"SSSP:Simple Main\
  \ Activity\">\n            <intent-filter>\n               <action\n           \
  \     android:name=\"android.intent.action.MAIN\" />\n               <category\n\
  \                android:name=\"android.intent.category.LAUNCHER\" />\n        \
  \    </intent-filter>\n        </activity>\n\n<!--\n****************************************************************\n\
  * 搜索相关代码：搜索活动\n****************************************************************\n\
  \ -->\n<activity android:name=\".SearchActivity\"\n      android:label=\"SSSP: Search\
  \ Activity\"\n      android:launchMode=\"singleTop\">\n     <intent-filter>\n  \
  \       <action android:name=\"android.intent.action.SEARCH\" />\n         <category\
  \ android:name=\"android.intent.category.DEFAULT\" />\n      </intent-filter>\n\
  <meta-data android:name=\"android.app.searchable\"\n                   android:resource=\"\
  @xml/searchable\" />\n   </activity>\n\n   <meta-data android:name=\"android.app.default_searchable\"\
  \n                    android:value=\".SearchActivity\" />\n\n<provider android:name=\"\
  .SimpleSuggestionProvider\"\n         android:authorities\n=\"com.androidbook.search.simplesp.SimpleSuggestionProvider\"\
  \ />\n</application>\n    <uses-sdk android:minSdkVersion=\"4\" />\n</manifest>\n\
  ```\n\n请注意，简单建议提供者的授权（authority）在源代码（清单 23–15）和清单文件（清单 23–16）中是如何匹配的。在这两种情况下，此授权的值都是\n\
  \n`com.androidbook.search.simplesp.SimpleSuggestionProvider`\n\n当我们介绍此简单建议提供者的其他方面时，我们将讨论此清单文件的其他部分。从该清单文件中可以看出，搜索活动扮演着关键角色。因此，我们现在来讨论一下这个搜索活动。我们将在此部分末尾讨论清单文件中的另一个活动\
  \ `SimpleMainActivity`，因为它只是一个启动一切的驱动活动。\n\n### 理解简单建议提供者搜索活动\n\n搜索活动由 Android 搜索（QSB）使用查询字符串调用。搜索活动反过来需要从\
  \ Intent 中读取此查询字符串，执行必要的操作，并可能显示结果。\n\n由于搜索活动是一个活动，它可能被其他 Intent 或其他动作调用。因此，一个良好的实践是检查调用它的\
  \ Intent 动作。在我们的例子中，当 Android 搜索调用此活动时，该动作是 `ACTION_SEARCH`。\n\n在某些情况下，搜索活动可能调用自身。当这种情况可能发生时，你应该将搜索活动的启动模式定义为\
  \ `singleTop`。该活动还需要处理 `onNewIntent()` 的触发。我们将在“理解 `onCreate` 和 `onNewIntent`”部分介绍这一点。\n\
  \n关于如何处理查询字符串，我们只需将其记录下来。一旦记录了查询，我们需要将其保存在 `SearchRecentSuggestionsProvider` 中，以便它作为未来搜索的建议可用。\n\
  \n现在让我们来看看搜索活动类的源代码。\n\n\n\n#### 搜索活动的完整源代码\n\n代码清单 23-17 展示了 `SearchActivity` 类的完整源代码。\n\
  \n**代码清单 23-17.** *SimpleSuggestionProvider 搜索活动*\n\n```\n//文件名: SearchActivity.java\n\
  public class SearchActivity extends Activity\n{\n    private final static String\
  \ tag =\"SearchActivity\";\n    @Override\n    protected void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        Log.d(tag,\"I am being\
  \ created\");\n        //否则执行此处代码\n        setContentView(R.layout.layout_search_activity);\n\
  \       //this.setDefaultKeyMode(Activity.DEFAULT_KEYS_SEARCH_GLOBAL);\n       \
  \ this.setDefaultKeyMode(Activity.DEFAULT_KEYS_SEARCH_LOCAL);\n\n        // 在此处获取并处理搜索查询\n\
  \        final Intent queryIntent = getIntent();\n        final String queryAction\
  \ = queryIntent.getAction();\n        if (Intent.ACTION_SEARCH.equals(queryAction))\n\
  \        {\n           Log.d(tag,\"new intent for search\");\n           this.doSearchQuery(queryIntent);\n\
  \        }\n        else {\n           Log.d(tag,\"new intent NOT for search\");\n\
  \        }\n        return;\n    }\n\n    @Override\n    public void onNewIntent(final\
  \ Intent newIntent)\n    {\n        super.onNewIntent(newIntent);\n        Log.d(tag,\"\
  new intent calling me\");\n\n        // 在此处获取并处理搜索查询\n        final Intent queryIntent\
  \ = getIntent();\n        final String queryAction = queryIntent.getAction();\n\
  \        if (Intent.ACTION_SEARCH.equals(queryAction))\n        {\n           this.doSearchQuery(queryIntent);\n\
  \           Log.d(tag,\"new intent for search\");\n        }\n        else {\n \
  \          Log.d(tag,\"new intent NOT for search\");\n        }\n    }\n    private\
  \ void doSearchQuery(final Intent queryIntent)\n    {\n        final String queryString\
  \ =\n        queryIntent.getStringExtra(SearchManager.QUERY);\n\n        // 在最近查询建议提供器中记录查询字符串。\n\
  \        SearchRecentSuggestions suggestions =\n        new SearchRecentSuggestions(this,\n\
  \              SimpleSuggestionProvider.AUTHORITY,\n              SimpleSuggestionProvider.MODE);\n\
  \        suggestions.saveRecentQuery(queryString, \"SSSP\");\n    }\n}\n\n//以下是同一代码清单中展示的对应布局文件。\n\
  //请剪切以下代码并创建一个单独的布局文件。请参考嵌入式文件位置\n\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n\
  <!-- /res/layout/layout_search_activity.xml -->\n<LinearLayout\n\n    android:orientation=\"\
  vertical\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  fill_parent\"\n    >\n<TextView\n    android:id=\"@+id/text1\"\n    android:layout_width=\"\
  fill_parent\"\n    android:layout_height=\"wrap_content\"\n    android:text=\"Test\
  \ Search Activity view\"\n    />\n</LinearLayout>\n```\n\n根据代码清单 23-17 中的代码，我们来了解搜索活动如何检查操作并检索查询字符串。\n\
  \n#### 检查操作并检索查询\n\n搜索活动的代码通过检查启动意图并将其与常量 `Intent.ACTION_SEARCH` 进行比较，从而判断启动操作。如果操作匹配，则调用\
  \ `doSearchQuery()` 函数。\n\n在 `doSearchQuery()` 函数中，搜索活动通过一个意图附加信息来检索查询字符串。代码如下：\n\
  \n```\n        final String queryString =\n           queryIntent.getStringExtra(SearchManager.QUERY);\n\
  ```\n\n请注意，这个意图附加信息被定义为 `SearchManager.QUERY`。在阅读本章的过程中，您将在 `SearchManager` API\
  \ 参考文档中看到许多此类附加信息。（其 URL 包含在本章末尾的“参考资料”部分。）\n\n#### 理解 `onCreate()` 和 `onNewIntent()`\n\
  \n当用户在搜索框中输入文本并点击某个建议或“前往”箭头时，Android 会启动一个搜索活动。这会导致创建搜索活动并调用其 `onCreate()` 方法。传递给此\
  \ `onCreate()` 方法的意图会将操作设置为 `ACTION_SEARCH`。\n\n有时活动不会被创建，而是通过 `onNewIntent()` 方法将新的搜索条件传递给它。这是如何发生的？回调方法\
  \ `onNewIntent()` 与活动的启动模式密切相关。如果您查看代码清单 23-16，会注意到搜索活动在清单文件中被设置为 `singleTop` 模式。\n\
  \n当活动被设置为 `singleTop` 模式时，它指示 Android：如果该活动已位于堆栈顶部，则不要创建新的活动实例。在这种情况下，Android 会调用\
  \ `onNewIntent()` 而不是 `onCreate()`。这就是为什么在代码清单 23-17 的活动源代码中，我们有两个位置来检查意图。\n\n####\
  \ 测试 `onNewIntent()`\n\n一旦您实现了 `onNewIntent()`，您会注意到在正常的流程中它并不会被调用。这就引出了一个问题：搜索活动何时会位于堆栈顶部？通常情况下这并不会发生。\n\
  \n原因如下：假设一个搜索调用者 Activity A 调用搜索，这导致搜索 Activity B 启动。Activity B 显示结果后，用户使用返回按钮返回，此时我们的搜索\
  \ Activity B 不再位于堆栈顶部，而是 Activity A 位于顶部。或者用户可能点击主页键并使用主屏幕上的全局搜索，在这种情况下，主屏幕活动位于顶部。\n\
  \n搜索活动位于顶部的一种情况是：假设 Activity A 由于搜索导致 Activity B 启动。如果 Activity B 定义了“输入即搜索”功能，那么当您聚焦于\
  \ Activity B 时，一次新的搜索会再次使用新条件调用 Activity B。代码清单 23-17 展示了我们如何设置“输入即搜索”功能来进行演示。代码如下：\n\
  \n```\nthis.setDefaultKeyMode(Activity.DEFAULT_KEYS_SEARCH_LOCAL);\n```\n\n####\
  \ 使用 `SearchRecentSuggestionsProvider` 保存查询\n\n我们已经讨论过搜索活动如何需要保存它遇到过的查询，以便通过建议提供器将它们作为建议回放。以下是保存这些查询的代码段：\n\
  \n```\nfinal String queryString =\n    queryIntent.getStringExtra(SearchManager.QUERY);\n\
  \n// 在最近查询建议提供器中记录查询字符串。\nSearchRecentSuggestions suggestions =\n     new SearchRecentSuggestions(this,\n\
  \          SimpleSuggestionProvider.AUTHORITY,\n          SimpleSuggestionProvider.MODE);\n\
  suggestions.saveRecentQuery(queryString, \"SSSP\");\n```\n\n从这段代码中您可以看到，Android\
  \ 通过意图将查询信息作为附加信息（`SearchManager.QUERY`）传递。\n\n一旦您获得了查询，就可以利用 SDK 中的实用工具类 `SearchRecentSuggestions`，通过实例化一个新的建议对象并要求其保存，来保存该查询和一个提示（\"\
  SSSP\"）。因为我们选择了使用双行模式和查询模式，所以 `saveRecentQuery` 的第二个参数是 SSSP（再次说明，这代表 Simple Search\
  \ Suggestions Provider）。您会看到这段文本出现在该提供器建议的底部。\n\n现在，我们将查看搜索元数据定义，在这里我们将搜索活动与搜索建议提供器关联起来。\n\
  \n\n好的，作为高级文档工程师和翻译员，我将按照您提供的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n#### 搜索元数据\n\nAndroid 中搜索的定义始于一个搜索\
  \ Activity。您首先需要在 manifest 文件中定义一个搜索 Activity。作为定义的一部分，您需要告知 Android 去哪里寻找搜索元数据\
  \ XML 文件。请参阅列表 23–16，其中定义了我们搜索 Activity 以及搜索元数据 xml 文件（`searchable.xml`）的路径。\n\n\
  列表 23–18 展示了相应的搜索元数据 xml 文件。\n\n**列表 23–18.** *SimpleSuggestionProvider 搜索元数据*\n\
  \n```\n<!-- filename: /res/xml/searchable.xml -->\n<searchable\n    android:label=\"\
  @string/search_label\"\n    android:hint=\"@string/search_hint\"\n    android:searchMode=\"\
  showSearchLabelAsBadge\"\n    android:queryAfterZeroResults=\"true\"\n    android:includeInGlobalSearch=\"\
  true\"\n    android:searchSuggestAuthority=\n           \"com.androidbook.search.simplesp.SimpleSuggestionProvider\"\
  \n    android:searchSuggestSelection=\" ? \"\n/>\n```\n\n让我们逐一分析列表 23–18 中的一些关键属性。\n\
  \n属性 `includeInGlobalSearch` 告知 Android 将此建议提供程序用作全局 QSB 的其中一个数据源。\n\n属性 `searchSuggestAuthority`\
  \ 指向建议提供程序的权限，该权限在该建议提供程序的 manifest 文件中定义（参见列表 23–16）。\n\n属性 `queryAfterZeroResults`\
  \ 指示如果当前输入的一组字母没有返回任何结果，QSB 是否应向建议提供程序发送更多字母。由于我们在测试，我们希望不遗漏任何可能性，因此将此属性设置为 true，以便给提供程序尽可能多的响应机会。\n\
  \n当您派生自“最近搜索建议”提供程序时，属性 `searchSuggestSelection` 始终是由“`?`”表示的字符串。此字符串作为 `selection`\
  \ 字符串（where 子句）传递给内容提供程序 `query` 方法的建议提供程序。通常，这表示进入任何内容提供程序的 select 语句的 where 子句。\n\
  \n针对建议提供程序，当为 `searchSuggestSelection` 指定了值时，（作为一种协议）Android 会将搜索查询字符串（在 QSB 中输入）作为\
  \ select 参数数组的第一个条目传递给内容提供程序的 `query` 方法。\n\n响应这些细节（提供程序内部如何使用这些字符串）的代码隐藏在“最近搜索建议”提供程序中，我们无法向您展示这些参数在内容提供程序的\
  \ `query` 方法中是如何使用的。\n\n我们将在下一节中更详细地讨论这一点，届时您将看到字符串“`?`”的全貌。事实上，这个字符串很可能根本不会用于缩小结果范围，因为它没有指定任何要查询的字段，例如“`someid\
  \ == ?`”。很可能它的存在本身就提示 Android 将 QSB 字符串作为第一个参数传递给提供程序。而 SDK 搜索建议提供程序仅仅依赖此协议，通过内容提供程序\
  \ `query()` 方法的 select 参数列表提供的便捷数组来接收 QSB 字符串。\n\n现在，让我们讨论一个搜索调用者 Activity，它将用作此应用程序的主入口点。这个主\
  \ Activity 允许我们测试本地搜索。\n\n#### 搜索调用者 Activity\n\n这个主 Activity 将在其获得焦点时允许我们调用本地搜索。列表\
  \ 23–19 展示了此搜索调用者 Activity 的源代码、其布局文件以及属于此项目的 `strings.xml`。\n\n**列表 23–19.** *SimpleSuggestionProvider：主\
