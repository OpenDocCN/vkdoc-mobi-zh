- "# 探索地图和基于位置的服务\n\n在本章中，我们将讨论地图和基于位置的服务。基于位置的服务是 Android SDK 中最令人兴奋的部分之一。SDK 的这一部分提供了\
  \ API，让应用开发者能够显示和操作地图、获取设备实时位置信息，并利用其他激动人心的功能。\n\nAndroid 中的基于位置的服务设施建立在两大支柱上：地图\
  \ API 和基于位置的 API。每个 API 都在其各自的包中独立存在。例如，地图包是 `com.google.android.maps`，位置包是 `android.location`。Android\
  \ 中的地图 API 为你提供了显示和操作地图的功能。例如，你可以缩放和平移；你可以更改地图模式（例如，从卫星视图切换到街景视图）；你可以向地图添加自定义数据，等等。另一方面，全球定位系统（GPS）数据和实时位置数据则由位置包处理。\n\
  \n这些 API 通常需要通过互联网调用 Google 服务器的服务。因此，你通常需要互联网连接才能使它们正常工作。此外，在使用这些 Android Maps\
  \ API 服务开发应用程序之前，你必须同意 Google 的服务条款。请仔细阅读这些条款；Google 对服务数据的使用设置了一些限制。例如，你可以将位置信息用于用户的个人用途，但某些商业用途以及涉及车辆自动控制的应用会受到限制。当你注册地图\
  \ API 密钥时，系统会向你展示这些条款。\n\n在本章中，我们将逐一介绍这些包。我们将从地图 API 开始，向你展示如何在应用程序中使用地图。如你将所见，Android\
  \ 中的地图归结为使用 `MapView` UI 控件和 `MapActivity` 类，以及集成 Google Maps 的地图 API。我们还将向你展示如何将自定义数据放置到显示的地图上，以及如何在设备上显示当前位置。讨论完地图后，我们将深入探讨基于位置的服务，这些服务扩展了地图的概念。我们将向你展示如何使用\
  \ Android `Geocoder` 类和 `LocationManager` 服务。我们还将涉及使用这些 API 时出现的线程问题。\n\n\n\n###\
  \ 了解映射包\n\n如前所述，映射 API 是 Android 基于位置服务的一个组成部分。映射包包含了在屏幕上显示地图、处理用户与地图的交互（如缩放）、在地图上显示自定义数据等所需的全部功能。使用该包的第一步是显示地图。为此，你需要使用\
  \ `MapView` 视图类。不过，使用这个类需要做一些准备工作。具体来说，在使用 `MapView` 之前，你需要从 Google 获取一个地图 API 密钥。该地图\
  \ API 密钥使 Android 能够与 Google 地图服务进行交互，从而获取地图数据。下一节将说明如何获取地图 API 密钥。\n\n#### 从 Google\
  \ 获取地图 API 密钥\n\n关于地图 API 密钥，首先需要了解的是，你实际上需要两个密钥：一个用于在模拟器上进行开发，另一个用于生产环境（在设备上）。这是因为开发和生产环境中用于获取地图\
  \ API 密钥的证书会有所不同（正如我们在第 10 章中讨论的那样）。\n\n例如，在开发过程中，ADT 插件会生成 `.apk` 文件并将其部署到模拟器上。由于\
  \ `.apk` 文件必须使用证书签名，因此 ADT 插件在开发过程中会使用调试证书。对于生产部署，你可能会使用自签名证书来签署你的 `.apk` 文件。好消息是，你可以获取一个用于开发的密钥和另一个用于生产的密钥，然后在导出生产版本之前轻松地切换密钥。\n\
  \n要获取地图 API 密钥，你需要用于签署应用程序的证书（在模拟器的情况下，是调试证书）。你需要获取证书的 MD5 指纹，然后在 Google 网站上输入该指纹，以生成关联的地图\
  \ API 密钥。\n\n首先，你必须找到你的调试证书，该证书由 Eclipse 生成并维护。你可以使用 Eclipse IDE 找到它的确切位置。在 Eclipse\
  \ 的“Preferences”菜单中，进入 Android ![images](img/U001.jpg) Build。调试证书的位置将显示在“Default\
  \ debug keystore”字段中，如图 17–1 所示。（如果在查找“Preferences”菜单时遇到困难，请参阅第 2 章。）\n\n![images](img/1701.jpg)\n\
  \n**图 17–1.** *调试证书的位置*\n\n要提取 MD5 指纹，你可以运行带有 `–list` 选项的 `keytool`，如下所示：\n\n```\n\
  keytool -list -alias androiddebugkey -keystore\n\"debug.keystore 文件的完整路径\" -storepass\
  \ android -keypass android\n```\n\n请注意，调试存储区的 `alias` 是 `androiddebugkey`。同样，密钥库密码是\
  \ `android`，私钥密码也是 `android`。运行此命令时，`keytool` 会提供指纹（参见图 17–2）。\n\n![images](img/1702.jpg)\n\
  \n**图 17–2.** *keytool 为 list 选项输出的结果（实际指纹已做模糊处理）*\n\n现在，将你的证书 MD5 指纹粘贴到 Google\
  \ 网站上的相应字段中：\n\n```\nhttp://code.google.com/android/maps-api-signup.html\n```\n\n\
  仔细阅读服务条款。如果你同意这些条款，请单击“Generate API Key”按钮，以从 Google 地图服务获取相应的地图 API 密钥。该地图 API\
  \ 密钥会立即生效，因此你可以开始使用它从 Google 获取地图数据。请注意，你需要一个 Google 帐户才能获取地图 API 密钥；当你尝试生成地图 API\
  \ 密钥时，系统会提示你登录你的 Google 帐户。\n\n从第 10 章中记得，当你的调试证书过期时，你的开发地图 API 密钥也会随之过期。如果你更改了调试证书，则需要使用新的调试证书重复这些步骤，以获取新的开发地图\
  \ API 密钥。这很好地激励我们创建一个有效期超过默认一年的调试证书。有关创建长期有效调试证书的更多详细信息，请参阅第 10 章。\n\n现在，让我们开始使用地图。\n\
  \n\n\n#### 理解 `MapView` 和 `MapActivity`\n\nAndroid 中的许多地图技术依赖于 `MapView` UI 控件以及\
  \ `android.app.Activity` 的扩展类 `MapActivity`。`MapView` 和 `MapActivity` 类负责处理在 Android\
  \ 中显示和操作地图时的繁重工作。关于这两个类，你需要记住的一点是它们必须协同工作。具体来说，要使用 `MapView`，你需要在 `MapActivity`\
  \ 中实例化它。此外，在实例化 `MapView` 时，你需要提供地图 API 密钥。\n\n如果使用 XML 布局实例化 `MapView`，你需要设置 `android:apiKey`\
  \ 属性。如果以编程方式创建 `MapView`，则必须将地图 API 密钥传递给 `MapView` 构造函数。最后，由于地图的底层数据来自 Google 地图，你的应用程序需要获得访问互联网的权限。这意味着你至少需要在\
  \ `AndroidManifest.xml` 文件中包含以下权限请求：\n\n```\n<uses-permission android:name=\"android.permission.INTERNET\"\
  \ />\n```\n\n清单 17–1 以粗体显示了使地图应用正常运行所需的 `AndroidManifest.xml` 条目。\n\n**清单 17–1.**\
  \ *地图应用所需的 `AndroidManifest.xml` 标签*\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"\
  ?>\n<manifest\n      package=\"com.androidbook\"\n      android:versionCode=\"1\"\
  \n      android:versionName=\"1.0\">\n    <application android:icon=\"@drawable/icon\"\
  \n                 android:label=\"@string/app_name\">\n        <uses-library android:name=\"\
  com.google.android.maps\" />\n        <activity android:name=\".MapViewDemoActivity\"\
  \n                  android:label=\"@string/app_name\">\n          <intent-filter>\n\
  \            <action android:name=\"android.intent.action.MAIN\" />\n          \
  \  <category android:name=\"android.intent.category.LAUNCHER\" />\n          </intent-filter>\n\
  \        </activity>\n    </application>\n<uses-permission android:name=\"android.permission.INTERNET\"\
  />\n    <uses-sdk android:minSdkVersion=\"4\" />\n</manifest>\n```\n\n你还需要对 `AndroidManifest.xml`\
  \ 文件进行另一处修改。地图应用的定义需要引用一个地图库（这一行也包含在清单 17–1 中）。前提条件解决后，请查看图 17–3。\n\n![图片](img/1703.jpg)\n\
  \n**图 17–3.** *处于街道视图模式下的 `MapView` 控件*\n\n图 17–3 展示了一个以街道视图模式显示地图的应用。该应用还演示了如何放大、缩小以及更改地图的视图模式。XML\
  \ 布局如清单 17–2 所示。\n\n**注意：** 我们会在本章末尾提供一个 URL，你可以使用它下载本章的项目。这将使你能够直接将这些项目导入你的 Eclipse。\n\
  \n**清单 17–2.** *`MapView` 演示的 XML 布局*\n\n```\n<?xml version=\"1.0\" encoding=\"\
  utf-8\"?>\n<!-- 此文件位于 /res/layout/mapview.xml -->\n<LinearLayout\n    android:orientation=\"\
  vertical\" android:layout_width=\"fill_parent\"\n    android:layout_height=\"fill_parent\"\
  >\n\n    <LinearLayout\n        android:orientation=\"horizontal\"\n        android:layout_width=\"\
  fill_parent\"\n        android:layout_height=\"wrap_content\">\n\n        <Button\
  \ android:id=\"@+id/zoomin\"\n            android:layout_width=\"wrap_content\"\n\
  \            android:layout_height=\"wrap_content\" android:text=\"+\"\n       \
  \     android:onClick=\"myClickHandler\" android:padding=\"12px\" />\n\n       \
  \ <Button android:id=\"@+id/zoomout\"\n            android:layout_width=\"wrap_content\"\
  \n            android:layout_height=\"wrap_content\" android:text=\"-\"\n      \
  \      android:onClick=\"myClickHandler\" android:padding=\"12px\" />\n\n      \
  \  <Button android:id=\"@+id/sat\"\n            android:layout_width=\"wrap_content\"\
  \n            android:layout_height=\"wrap_content\" android:text=\"卫星\"\n     \
  \       android:onClick=\"myClickHandler\" android:padding=\"8px\" />\n\n      \
  \  <Button android:id=\"@+id/street\"\n            android:layout_width=\"wrap_content\"\
  \n            android:layout_height=\"wrap_content\" android:text=\"街道\"\n     \
  \       android:onClick=\"myClickHandler\" android:padding=\"8px\" />\n\n      \
  \  <Button android:id=\"@+id/traffic\"\n            android:layout_width=\"wrap_content\"\
  \n            android:layout_height=\"wrap_content\" android:text=\"交通\"\n     \
  \       android:onClick=\"myClickHandler\" android:padding=\"8px\" />\n\n      \
  \  <Button android:id=\"@+id/normal\"\n            android:layout_width=\"wrap_content\"\
  \n            android:layout_height=\"wrap_content\" android:text=\"标准\"\n     \
  \       android:onClick=\"myClickHandler\" android:padding=\"8px\" />\n\n    </LinearLayout>\n\
  \n    <com.google.android.maps.MapView\n        android:id=\"@+id/mapview\" android:layout_width=\"\
  fill_parent\"\n        android:layout_height=\"wrap_content\" android:clickable=\"\
  true\"\n        android:apiKey=\"在此处填写你的地图 API 密钥\" />\n\n</LinearLayout>\n```\n\
  \n如清单 17–2 所示，一个父级 `LinearLayout` 包含一个子级 `LinearLayout` 和一个 `MapView`。子级 `LinearLayout`\
  \ 包含了图 17–3 顶部显示的按钮。另请注意，你需要将 `MapView` 控件的 `android:apiKey` 值更新为你自己的地图 API 密钥值。\n\
  \n我们示例地图应用的代码如清单 17–3 所示。\n\n**清单 17–3.** *加载 XML 布局的 `MapActivity` 扩展类*\n\n```\n\
  // 此文件为 MapViewDemoActivity.java\nimport android.os.Bundle;\nimport android.view.View;\n\
  \nimport com.google.android.maps.MapActivity;\nimport com.google.android.maps.MapView;\n\
  \npublic class MapViewDemoActivity extends MapActivity\n{\n    private MapView mapView;\n\
  \n    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n    \
  \    super.onCreate(savedInstanceState);\n        setContentView(R.layout.mapview);\n\
  \n        mapView = (MapView)findViewById(R.id.mapview);\n    }\n\n    public void\
  \ myClickHandler(View target) {\n        switch(target.getId()) {\n        case\
  \ R.id.zoomin:\n            mapView.getController().zoomIn();\n            break;\n\
  \        case R.id.zoomout:\n            mapView.getController().zoomOut();\n  \
  \          break;\n        case R.id.sat:\n            mapView.setSatellite(true);\n\
  \            break;\n        case R.id.street:\n            mapView.setStreetView(true);\n\
  \            break;\n        case R.id.traffic:\n            mapView.setTraffic(true);\n\
  \            break;\n        case R.id.normal:\n            mapView.setSatellite(false);\n\
  \            mapView.setStreetView(false);\n            mapView.setTraffic(false);\n\
  \            break;\n        }\n        // 以下代码行按理说不是必需的，但实际却是必需的，\n        // 至少在\
  \ Froyo（Android 2.2）之前是这样\n        mapView.postInvalidateDelayed(2000);\n    }\n\
  \n    @Override\n    protected boolean isLocationDisplayed() {\n        return false;\n\
  \    }\n\n    @Override\n    protected boolean isRouteDisplayed() {\n        return\
  \ false;\n    }\n}\n```\n\n如清单 17–3 所示，使用 `onCreate()` 显示 `MapView` 与显示任何其他控件并无区别。也就是说，你将\
  \ UI 的内容视图设置为包含 `MapView` 的布局文件，这样就完成了。令人惊讶的是，支持缩放功能也相当简单。要放大或缩小，你可以使用 `MapView`\
  \ 的 `MapController` 类。通过调用 `mapView.getController()`，然后调用相应的 `zoomIn()` 或 `zoomOut()`\
  \ 方法来实现。这种缩放方式每次只产生一级缩放；用户需要重复操作来增加放大或缩小的程度。\n\n\n\n您会发现，提供更改视图模式的功能非常简单。`MapView`支持以下几种模式：\n\
  \n- **地图**是默认模式。\n- **街景模式**在地图上叠加一个图层，为有街景图像可查看的道路绘制蓝色轮廓。这些图像由安装在车辆上的摄像头在街道上行驶时拍摄。但请注意，`MapView`控件不显示街景图像。要查看这些街景图像，您需要一个单独的视图控件。这将在第\
  \ 25 章中更详细地介绍。\n- **卫星模式**显示地图的航拍照片，因此您可以看到建筑物、树木、道路等的实际顶部。\n- **交通模式**在地图上显示交通信息，用彩色线条表示畅通的交通，而非拥堵的交通。请注意，交通模式仅在有限数量的主要高速公路和道路上受支持。\n\
  \n要更改模式，您必须使用`true`调用相应的`setter`方法。在某些情况下，设置一种模式会关闭另一种模式。例如，您不能同时开启街景模式和交通模式，因此开启交通模式会自动关闭街景模式。要关闭某个模式，请将该模式设置为`false`。我们稍后会讨论`Overlay`，但在此需要知道，交通模式和街景模式*不*使用`Overlay`。\n\
  \n**注意：** 语句`mapView.postInvalidateDelayed(2000)`用于解决地图的街景和交通模式中的一个问题。该问题与内部用于获取显示街景蓝色轮廓线和交通线数据的线程方式有关。更多信息请参阅\
  \ Android Issue 10317，地址为 [`code.google.com/p/android/issues/detail?id=10317`](http://code.google.com/p/android/issues/detail?id=10317)。\n\
  \n要使地图能够横向移动，请在 XML 中为 `MapView` 设置属性 `android:clickable=\"true\"`；否则，用户只能放大和缩小，而不能横向移动。您也可以在代码中使用\
  \ `setClickable(true)` 方法来设置该属性。\n\n这个例子中最后要提到的是两个方法 `isLocationDisplayed()` 和 `isRouteDisplayed()`。这些方法的文档说明，它们的使用是\
  \ Google 服务条款所要求的，尽管在请求 Maps API 密钥时，这些条款并未提及这些方法。我不是律师，但我建议实现这些方法。您的应用程序有义务用 `true`\
  \ 或 `false` 来响应，以向地图服务器指示当前设备位置是否正在显示，或者是否有任何路线信息正在显示（例如驾驶路线）。\n\n您可能会同意，在 Android\
  \ 中显示地图以及实现缩放和模式切换所需的代码量是最小的（参见清单 17-3）。然而，还有一种更简单的方法来实现缩放控件。请看 清单 17-4 中显示的 XML\
  \ 布局和代码。\n\n**清单 17-4.** *更简便的缩放*\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"\
  ?>\n<!-- This file is /res/layout/mapview.xml -->\n<RelativeLayout\n        android:orientation=\"\
  vertical\" android:layout_width=\"fill_parent\"\n        android:layout_height=\"\
  fill_parent\">\n\n    <com.google.android.maps.MapView android:id=\"@+id/mapview\"\
  \n             android:layout_width=\"fill_parent\"\n             android:layout_height=\"\
  wrap_content\"\n             android:clickable=\"true\"\n             android:apiKey=\"\
  YOUR MAP API KEY GOES HERE\"\n             />\n</RelativeLayout>\n```\n\n```\npublic\
  \ class MapViewDemoActivity extends MapActivity\n{\n    private MapView mapView;\n\
  \    @Override\n    protected void onCreate(Bundle savedInstanceState) {\n     \
  \   super.onCreate(savedInstanceState);\n\n        setContentView(R.layout.mapview);\n\
  \        mapView = (MapView)findViewById(R.id.mapview);\n\n        mapView.setBuiltInZoomControls(true);\n\
  \    }\n\n    @Override\n    protected boolean isLocationDisplayed() {\n       \
  \ return false;\n    }\n\n    @Override\n    protected boolean isRouteDisplayed()\
  \ {\n        return false;\n    }\n}\n```\n\n清单 17-4 与清单 17-3 的区别在于，我们将视图的 XML 布局改为了使用\
  \ `RelativeLayout`。我们移除了所有缩放控件和视图模式控件。这个例子的关键在于代码，而非布局。`MapView` 已经提供了允许您放大和缩小的控件。您只需使用\
  \ `setBuiltInZoomControls()` 方法将其开启即可。图 17-4 显示了 `MapView` 的默认缩放控件。\n\n![images](img/1704.jpg)\n\
  \n**图 17-4.** *MapView 的内置缩放控件*\n\n现在，让我们讨论如何向地图添加自定义数据。\n\n\n\n### 使用叠加层添加标记\n\n\
  谷歌地图提供了一项功能，允许你将自定义数据放置在地图之上。如果你搜索所在区域的披萨餐厅，就能看到这样的例子：谷歌地图会放置图钉或气球标记来指示每个地点。谷歌地图通过允许你在地图上添加一个图层来提供此功能。Android\
  \ 提供了几个类来帮助你向地图添加图层。实现此类功能的关键类是 `Overlay`，但你可以使用它的一个扩展类 `ItemizedOverlay`。清单 17–5\
  \ 展示了一个 Java 代码示例。来自清单 17–4 的布局 XML 文件同样可用于此项目。\n\n**清单 17–5.** *使用 ItemizedOverlay\
  \ 标记地图*\n\n```\nimport java.util.ArrayList;\nimport java.util.List;\n\nimport android.graphics.Canvas;\n\
  import android.graphics.drawable.Drawable;\nimport android.os.Bundle;\nimport android.widget.LinearLayout;\n\
  \nimport com.google.android.maps.GeoPoint;\nimport com.google.android.maps.ItemizedOverlay;\n\
  import com.google.android.maps.MapActivity;\nimport com.google.android.maps.MapView;\n\
  import com.google.android.maps.OverlayItem;\n\npublic class MappingOverlayActivity\
  \ extends MapActivity {\n    private MapView mapView;\n\n    @Override\n    protected\
  \ void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \n        setContentView(R.layout.mapview);\n\n        mapView = (MapView) findViewById(R.id.mapview);\n\
  \        mapView.setBuiltInZoomControls(true);\n\n        Drawable marker=getResources().getDrawable(R.drawable.mapmarker);\n\
  \        marker.setBounds( (int) (-marker.getIntrinsicWidth()/2),\n            \
  \                    -marker.getIntrinsicHeight(),\n                           \
  \     (int) (marker.getIntrinsicWidth()/2),\n                                0);\n\
  \n        InterestingLocations funPlaces =\n                      new InterestingLocations(marker);\n\
  \        mapView.getOverlays().add(funPlaces);\n\n        GeoPoint pt = funPlaces.getCenterPt();\n\
  \        int latSpan = funPlaces.getLatSpanE6();\n        int lonSpan = funPlaces.getLonSpanE6();\n\
  \        Log.v(\"Overlays\", \"Lat span is \" + latSpan);\n        Log.v(\"Overlays\"\
  , \"Lon span is \" + lonSpan);\n\n        MapController mc = mapView.getController();\n\
  \        mc.setCenter(pt);\n        mc.zoomToSpan((int)(latSpan*1.5), (int)(lonSpan*1.5));\n\
  \    }\n\n    @Override\n    protected boolean isLocationDisplayed() {\n       \
  \ return false;\n    }\n\n    @Override\n    protected boolean isRouteDisplayed()\
  \ {\n        return false;\n    }\n\n    class InterestingLocations extends ItemizedOverlay\
  \ {\n        private ArrayList<OverlayItem> locations =\n                new ArrayList<OverlayItem>();\n\
  \        private GeoPoint center = null;\n\n        public InterestingLocations(Drawable\
  \ marker)\n        {\n            super(marker);\n\n            // create locations\
  \ of interest\n            GeoPoint disneyMagicKingdom =\n                new GeoPoint((int)(28.418971*1000000),\n\
  \                             (int)(-81.581436*1000000));\n            GeoPoint\
  \ disneySevenLagoon =\n                new GeoPoint((int)(28.410067*1000000),\n\
  \                             (int)(-81.583699*1000000));\n\n            locations.add(new\
  \ OverlayItem(disneyMagicKingdom,\n                              \"Magic Kingdom\"\
  , \"Magic Kingdom\"));\n            locations.add(new OverlayItem(disneySevenLagoon,\n\
  \                              \"Seven Seas Lagoon\", \"Seven Seas Lagoon\"));\n\
  \n            populate();\n        }\n\n        //  We added this method to find\
  \ the middle point of the cluster\n        //  Start each edge on its opposite side\
  \ and move across with\n        //  each point. The top of the world is +90, the\
  \ bottom -90,\n        //  the west edge is -180, the east +180\n        public\
  \ GeoPoint getCenterPt() {\n            if(center == null) {\n                int\
  \ northEdge = -90000000;   // i.e., -90E6 microdegrees\n                int southEdge\
  \ = 90000000;\n                int eastEdge = -180000000;\n                int westEdge\
  \ = 180000000;\n                Iterator<OverlayItem> iter = locations.iterator();\n\
  \                while(iter.hasNext()) {\n                    GeoPoint pt = iter.next().getPoint();\n\
  \                    if(pt.getLatitudeE6() > northEdge)\n                      \
  \  northEdge = pt.getLatitudeE6();\n                    if(pt.getLatitudeE6() <\
  \ southEdge)\n                        southEdge = pt.getLatitudeE6();\n        \
  \            if(pt.getLongitudeE6() > eastEdge)\n                        eastEdge\
  \ = pt.getLongitudeE6();\n                    if(pt.getLongitudeE6() < westEdge)\n\
  \                        westEdge = pt.getLongitudeE6();\n                }\n  \
  \              center = new GeoPoint((int)((northEdge +southEdge)/2),\n        \
  \                (int)((westEdge + eastEdge)/2));\n            }\n            return\
  \ center;\n        }\n\n        @Override\n        public void draw(Canvas canvas,\
  \ MapView mapView, boolean shadow)\n        {\n            // Hide the shadow by\
  \ setting shadow to false\n            super.draw(canvas, mapView, shadow);\n  \
  \      }\n\n        @Override\n        protected OverlayItem createItem(int i) {\n\
  \            return locations.get(i);\n        }\n\n        @Override\n        public\
  \ int size() {\n            return locations.size();\n        }\n\n    }\n}\n```\n\
  \n清单 17–5 演示了如何在地图上叠加标记。该示例放置了两个标记：一个位于迪士尼魔法王国，另一个位于迪士尼七海潟湖，两者都靠近佛罗里达州的奥兰多（参见图 17–5）。\n\
  \n**注意：** 要运行此演示，你需要获取一个可绘制对象作为地图标记。此图像文件必须保存到你的 `/res/drawable` 文件夹中，以便 `getDrawable()`\
  \ 调用中的资源 ID 引用与你为图像文件选择的文件名相匹配。如果可能，请使标记周围的区域透明。本章的源代码中提供了一些示例标记。\n\n为了能够向地图添加标记，你必须创建并添加一个\
  \ `com.google.android.maps.Overlay` 的扩展类到地图中。`Overlay` 类本身无法实例化，因此你必须扩展它或使用其某个扩展类。在我们的示例中，我们实现了\
  \ `InterestingLocations`，它扩展了 `ItemizedOverlay`，而 `ItemizedOverlay` 又扩展了 `Overlay`。`Overlay`\
  \ 类定义了叠加层的契约，而 `ItemizedOverlay` 是一个便捷的实现，可以让你轻松创建一组可在地图上标记的位置。\n\n一般的使用模式是扩展 `ItemizedOverlay`\
  \ 类，并在构造函数中添加你的项目（即感兴趣的地点）。实例化你的兴趣点后，你需要调用 `ItemizedOverlay` 的 `populate()` 方法。`populate()`\
  \ 方法是一个实用工具，用于缓存所有 `OverlayItem`。在内部，该类会调用 `size()` 方法来确定叠加项的数量，然后进入一个循环，为每个项目调用\
  \ `createItem(i)`。在 `createItem` 方法中，你根据数组中的索引返回已创建的项目。\n\n![images](img/1705.jpg)\n\
  \n**图 17–5.** *带有标记的 MapView*\n\n\n\n### 排版后内容\n\n如清单 17-5 所示，你只需创建点并调用`populate()`即可在地图上显示标记。`Overlay`契约负责管理其余部分。为了实现这一切，activity\
  \ 的`onCreate()`方法创建了`InterestingLocations`实例，并传入用作标记默认图像的`Drawable`。然后，`onCreate()`将`InterestingLocations`实例添加到叠加层集合中（`mapView.getOverlays().add()`）。\n\
  \n选择的`Drawable`需要准备好以供`ItemizedOverlay`使用。Maps API 需要知道`Drawable`上的(0, 0)点在哪里。该点将用于标记地图上标记应表示的确切位置。你可以像我们的示例中那样，使用`Drawable`类的`setBounds()`方法自行完成此操作。参数代表左、上、右、下坐标，我们可以使用`getIntrinsicHeight()`和`getIntrinsicWidth()`方法来确定`Drawable`的高度和宽度。\n\
  \n在我们的示例中，(0, 0)坐标将位于底部边缘的中间位置。请记住，坐标系统从左侧开始，向右递增，并从顶部开始，向下递增。因此，我们的顶部坐标必须小于底部的\
  \ 0，所以是负数。\n\nAndroid 在`ItemizedOverlay`类中提供了几个便捷方法来设置`Drawable`的边界。它们是`boundCenterBottom()`和`boundCenter()`。第一个方法对`Drawable`的处理方式与我们完全相同，结果是(0,\
  \ 0)位于`Drawable`底部边缘的中间。第二个方法会将(0, 0)放在`Drawable`的正中心。常见的做法是在构造函数中首先调用这些方法之一。我们本可以像下面这样做，而不是在之前使用`setBounds()`：\n\
  \n```\npublic InterestingLocations(Drawable marker)\n{\n    super(boundCenterBottom(marker));\n\
  \    [ … ]\n```\n\n你还会注意到，我们可以使用任何大小或形状的`Drawable`。让我们的标记看起来不错的一点是，在我们想要的形状周围使用透明颜色。你在\
  \ Google 地图上常见的气泡不是方形的，并且由于它们周围使用了透明颜色，你可以看到没有标记的地图。这样做也很好，因为 Maps API 会在地图上绘制标记的阴影，而你希望阴影是你的形状而不是矩形（好吧，实际上是平行四边形）。\n\
  \n但如果你不想要阴影怎么办？没问题。只需重写`ItemizedOverlay`扩展类的`draw()`方法，并在调用父类的`draw()`方法时将`shadow`设置为`false`。请查看我们示例中的`draw()`方法。我们提到过，用于创建`ItemizedOverlay`的`Drawable`是默认标记。每个`OverlayItem`可以通过使用其`setMarker()`方法并传入另一个`Drawable`来拥有独特的标记。你可以在实例化`OverlayItem`时设置独特的标记，也可以稍后设置。我们将在第\
  \ 25 章讨论触摸屏时重新审视标记，并向你展示如何让标记变得更有趣。\n\n现在，叠加层已关联到我们的地图，我们仍然需要移动到正确的位置，以便实际在显示屏中看到标记。为此，我们需要将显示地图的中心设置到一个点。`ItemizedOverlay`类的`getCenter()`方法返回排名第一的点，而不是你可能期望的中心点。`ItemizedOverlay`会对其包含的点进行排序，并选择其中一个作为第一个。因此，为了找到这些点的中心，我们实现了自己的`getCenterPt()`方法来遍历这些点并找到中心点。mapview\
  \ 控制器的`setCenter()`方法设置显示内容的中心，我们将计算出的中心点传递给它。\n\n`MapController`的`setZoom()`方法设置我们距离地图的高度。它接受一个从\
  \ 1 到 21 的值，其中 21 是放大到最近距离，1 是最远距离。但由于我们不确定使用哪个值才能同时看到所有点，我们使用了`MapController`的`zoomToSpan()`方法。我们需要传入包含所有点的矩形的高度和宽度。幸运的是，`ItemizedOverlay`有两个方法可以告诉我们该矩形的高度和宽度，分别给出我们的纬度跨度`getLatSpanE6()`和经度跨度`getLonSpanE6()`；然后我们可以将这些值与`zoomToSpan()`一起使用。请注意，我们选择将矩形扩大\
  \ 1.5 倍，这样我们的点在显示时就不会紧贴地图边缘。\n\n清单 17-5 的另一个有趣之处是`OverlayItem`的创建。要创建一个`OverlayItem`，你需要一个类型为`GeoPoint`的对象。`GeoPoint`类通过纬度和经度（以微度为单位）表示位置。在我们的示例中，我们使用网络上的地理编码网站获取了魔法王国和七海潟湖的纬度和经度。（正如你很快会看到的，你可以使用地理编码将地址转换为纬度和经度对，例如。）然后，我们将纬度和经度转换为微度——因为\
  \ API 以微度为单位操作——乘以 1,000,000 并强制转换为整数。\n\n到目前为止，我们已经向你展示了如何在地图上放置标记。但叠加层不仅限于显示图钉或气泡。它们还可以用于其他事情。例如，我们可以展示产品在地图上移动的动画，或者展示诸如冷锋或雷暴等符号。\n\
  \n总而言之，你会同意在地图上放置标记再简单不过了。或者真的如此？我们没有纬度和经度对的数据库，但我们猜测我们需要以某种方式使用真实地址创建一个或多个`GeoPoint`。这时你可以使用`Geocoder`类，它是我们接下来要讨论的位置包的一部分。\n\
  \n### 了解位置包\n\n`android.location`包为基于位置的服务提供了设施。在本节中，我们将讨论该包的两个重要部分：`Geocoder`类和`LocationManager`服务。我们从`Geocoder`开始。\n\
  \n\n\n#### Android 平台的地理编码\n\n如果你打算在地图上做任何实用操作，很可能需要将地址（或位置）转换为经纬度坐标。这一概念称为*地理编码*，而\
  \ `android.location.Geocoder` 类提供了相应功能。实际上，`Geocoder` 类同时支持正向和反向转换——它既可以将地址转换为经纬度坐标，也可以将经纬度坐标转换为地址列表。该类提供以下方法：\n\
  \n- `List<Address>   getFromLocation(double latitude, double longitude, int maxResults)`\n\
  - `List<Address>   getFromLocationName(String locationName, int maxResults, double\
  \ lowerLeftLatitude, double lowerLeftLongitude, double upperRightLatitude, double\
  \ upperRightLongitude)`\n- `List<Address>   getFromLocationName(String locationName,\
  \ int maxResults)`\n\n由于位置的描述方式多种多样，计算地址并非一门精确科学。例如，`getFromLocationName()` 方法可以接受地点名称、物理地址、机场代码，甚至该位置的知名名称。因此，这些方法返回的是一个地址列表，而非单个地址。因为方法返回列表，建议通过为\
  \ `maxResults` 提供介于 `1` 到 `5` 之间的值来限制结果集。现在，让我们看一个示例。\n\n列表 17–6 显示了 图 17–6 所示用户界面的\
  \ XML 布局和对应代码。要运行该示例，你需要使用自己的地图 API 密钥更新列表中的内容。\n\n**列表 17–6.** *使用 Android Geocoder\
  \ 类*\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<!-- 该文件为 /res/layout/geocode.xml\
  \ -->\n<RelativeLayout\n        android:layout_width=\"fill_parent\"\n        android:layout_height=\"\
  fill_parent\">\n\n        <LinearLayout android:layout_width=\"fill_parent\"\n \
  \           android:layout_alignParentBottom=\"true\"\n            android:layout_height=\"\
  wrap_content\"\n            android:orientation=\"vertical\" >\n\n            <EditText\
  \ android:layout_width=\"fill_parent\"\n                android:id=\"@+id/location\"\
  \n                android:layout_height=\"wrap_content\"\n                android:text=\"\
  White House\"/>\n\n            <Button android:id=\"@+id/geocodeBtn\"\n        \
  \        android:layout_width=\"wrap_content\"\n                android:layout_height=\"\
  wrap_content\"\n                android:onClick=\"doClick\" android:text=\"查找位置\"\
  />\n        </LinearLayout>\n\n<com.google.android.maps.MapView\n              \
  \   android:id=\"@+id/geoMap\" android:clickable=\"true\"\n                 android:layout_width=\"\
  fill_parent\"\n                 android:layout_height=\"320px\"\n              \
  \   android:apiKey=\"在此输入你的地图 API 密钥\"\n                 />\n\n</RelativeLayout>\n\
  ```\n\n```java\npackage com.androidbook.maps.geocoding;\n\nimport java.io.IOException;\n\
  import java.util.List;\n\nimport android.location.Address;\nimport android.location.Geocoder;\n\
  import android.os.Bundle;\nimport android.view.View;\nimport android.widget.Button;\n\
  import android.widget.EditText;\n\nimport com.google.android.maps.GeoPoint;\nimport\
  \ com.google.android.maps.MapActivity;\nimport com.google.android.maps.MapView;\n\
  \npublic class GeocodingDemoActivity extends MapActivity\n{\n    Geocoder geocoder\
  \ = null;\n    MapView mapView = null;\n\n    @Override\n    protected boolean isLocationDisplayed()\
  \ {\n        return false;\n    }\n\n    @Override\n    protected boolean isRouteDisplayed()\
  \ {\n        return false;\n    }\n\n    @Override\n    protected void onCreate(Bundle\
  \ savedInstanceState)\n    {\n        super.onCreate(savedInstanceState);\n\n  \
  \      setContentView(R.layout.geocode);\n        mapView = (MapView)findViewById(R.id.geoMap);\n\
  \        mapView.setBuiltInZoomControls(true);\n\n        // 佛罗里达州杰克逊维尔的经纬度\n  \
  \      int lat = (int)(30.334954*1000000);\n        int lng = (int)(-81.5625*1000000);\n\
  \        GeoPoint pt = new GeoPoint(lat,lng);\n        mapView.getController().setZoom(10);\n\
  \        mapView.getController().setCenter(pt);\n\ngeocoder = new Geocoder(this);\n\
  \    }\n\n    public void doClick(View arg0) {\n        try {\n            EditText\
  \ loc = (EditText)findViewById(R.id.location);\n            String locationName\
  \ = loc.getText().toString();\n\n            List<Address> addressList =\n     \
  \                 geocoder.getFromLocationName(locationName, 5);\n            if(addressList!=null\
  \ && addressList.size()>0)\n            {\n                int lat =\n         \
  \           (int)(addressList.get(0).getLatitude()*1000000);\n                int\
  \ lng =\n                    (int)(addressList.get(0).getLongitude()*1000000);\n\
  \n                GeoPoint pt = new GeoPoint(lat,lng);\n                mapView.getController().setZoom(15);\n\
  \                mapView.getController().setCenter(pt);\n            }\n       \
  \ } catch (IOException e) {\n            e.printStackTrace();\n        }\n    }\n\
  }\n```\n\n![images](img/1706.jpg)\n\n**图 17–6.** *根据位置名称将地理编码转换为点坐标*\n\n为了演示 Android\
  \ 中地理编码的用法，请在 `EditText` 字段中输入位置的名称或地址，然后点击“查找位置”按钮。要查找某个位置的地址，我们调用 `Geocoder` 的\
  \ `getFromLocationName()` 方法。该位置可以是地址，也可以是诸如“白宫”之类的知名名称。地理编码可能是耗时操作，因此建议将结果限制为五个，正如\
  \ Android 文档所建议的那样。\n\n调用 `getFromLocationName()` 会返回一个地址列表。示例应用程序获取该地址列表，如果找到任何地址，则处理第一个。每个地址都有纬度和经度，你可以使用它们创建\
  \ `GeoPoint`。然后获取地图控制器并导航到该点。缩放级别可以设置为 1 到 21（含）之间的整数。当你从 1 向 21 移动时，缩放级别以 2 的倍数增加。如果需要，我们本可以显示一个对话框来展示多个找到的位置，但这里我们只显示返回的第一个位置。\n\
  \n在我们的示例应用程序中，我们只读取返回的 `Address` 的纬度和经度。实际上，返回给我们的 `Address` 可能包含大量数据，包括位置的通用名称、街道、城市、州、邮政编码、国家，甚至电话号码和网站\
  \ URL。\n\n**注意：** 基于位置的服务与 Maps API 不同，不使用微度单位。忘记在两者之间进行转换是常见的错误原因。要将 `Location`\
  \ 的纬度和经度传递给 Maps API 方法，必须首先将其乘以 1,000,000。\n\n关于地理编码，你需要了解以下几点：\n\n- 首先，返回的地址并不总是精确地址。显然，由于返回的地址列表取决于输入的准确性，你需要尽最大努力向\
  \ `Geocoder` 提供准确的位置名称。\n- 其次，只要可能，请将 `maxResults` 参数设置为介于 `1` 和 `5` 之间的值。\n- 最后，你应该认真考虑在与\
  \ UI 线程不同的线程中执行地理编码操作。这有两个原因。第一个显而易见：此操作耗时，你不希望在执行地理编码时 UI 挂起，导致 Android 终止你的活动。第二个原因是，在移动设备上，你始终需要假设网络连接可能丢失且连接较弱。因此，你需要适当处理输入/输出（I/O）异常和超时。一旦计算出地址，你可以将结果发布到\
  \ UI 线程。让我们进一步探讨这一点。\n\n\n\n#### 使用后台线程进行地理编码\n\n使用后台线程处理耗时操作非常常见。通常的模式是处理一个 UI\
  \ 事件（例如按钮点击）来启动一个耗时操作。在事件处理器中，创建一个新线程来执行任务，然后启动该新线程。UI 线程返回用户界面处理与用户的交互，而后台线程则在后台工作。后台线程完成后，可能需要更新部分\
  \ UI，或者需要通知用户。后台线程不会直接更新 UI；而是通知 UI 线程自行更新。代码清单 17–7 通过地理编码展示了这一思路。我们将使用与之前相同的 `geocode.xml`\
  \ 文件。也可以使用与之前相同的 `AndroidManifest.xml` 文件。\n\n**代码清单 17–7.** *在独立线程中进行地理编码*\n\n\
  ```\npackage com.androidbook.maps.geocodingthreads;\n\nimport java.io.IOException;\n\
  import java.util.List;\n\nimport android.app.AlertDialog;\nimport android.app.Dialog;\n\
  import android.app.ProgressDialog;\nimport android.location.Address;\nimport android.location.Geocoder;\n\
  import android.os.Bundle;\nimport android.os.Handler;\nimport android.os.Message;\n\
  import android.view.View;\nimport android.widget.EditText;\n\nimport com.google.android.maps.GeoPoint;\n\
  import com.google.android.maps.MapActivity;\nimport com.google.android.maps.MapView;\n\
  \npublic class GeocodingDemoActivity extends MapActivity\n{\n    Geocoder geocoder\
  \ = null;\n    MapView mapView = null;\n    ProgressDialog progDialog=null;\n  \
  \  List<Address> addressList=null;\n    @Override\n    protected boolean isRouteDisplayed()\
  \ {\n        return false;\n    }\n\n    @Override\n    protected void onCreate(Bundle\
  \ icicle) {\n        super.onCreate(icicle);\n\n        setContentView(R.layout.geocode);\n\
  \        mapView = (MapView)findViewById(R.id.geoMap);\n        mapView.setBuiltInZoomControls(true);\n\
  \n        // 佛罗里达州杰克逊维尔的经纬度\n        int lat = (int)(30.334954*1000000);\n     \
  \   int lng = (int)(-81.5625*1000000);\n        GeoPoint pt = new GeoPoint(lat,lng);\n\
  \        mapView.getController().setZoom(10);\n        mapView.getController().animateTo(pt);\n\
  \n        geocoder = new Geocoder(this);\n    }\n\n    public void doClick(View\
  \ view) {\n        EditText loc = (EditText)findViewById(R.id.location);\n     \
  \   String locationName = loc.getText().toString();\n\n        progDialog = ProgressDialog.show(GeocodingDemoActivity.this,\n\
  \                   \"处理中...\", \"正在查找位置...\", true, false);\n\n        findLocation(locationName);\n\
  \    }\n\n    private void findLocation(final String locationName)\n    {\n    \
  \    Thread thrd = new Thread()\n        {\n            public void run()\n    \
  \        {\n                try {\n                    // 执行后台工作\n             \
  \       addressList =\n                        geocoder.getFromLocationName(locationName,\
  \ 5);\n                    // 向处理器发送消息以处理结果\n                    uiCallback.sendEmptyMessage(0);\n\
  \n                } catch (IOException e) {\n                    e.printStackTrace();\n\
  \                }\n            }\n        };\n        thrd.start();\n    }\n\n\
  \    // UI 线程回调处理器\n    private Handler uiCallback = new Handler()\n    {\n    \
  \    @Override\n        public void handleMessage(Message msg)\n        {\n    \
  \        // 关闭对话框\n            progDialog.dismiss();\n\n            if(addressList!=null\
  \ && addressList.size()>0)\n            {\n                int lat =\n         \
  \          (int)(addressList.get(0).getLatitude()*1000000);\n                int\
  \ lng =\n                   (int)(addressList.get(0).getLongitude()*1000000);\n\
  \                GeoPoint pt = new GeoPoint(lat,lng);\n                mapView.getController().setZoom(15);\n\
  \                mapView.getController().animateTo(pt);\n\n            }\n     \
  \       else\n            {\n                Dialog foundNothingDlg = new\n    \
  \                AlertDialog.Builder(GeocodingDemoActivity.this)\n             \
  \             .setIcon(0)\n                          .setTitle(\"未能找到位置\")\n   \
  \                       .setPositiveButton(\"确定\", null)\n                     \
  \     .setMessage(\"未找到位置...\")\n                          .create();\n        \
  \        foundNothingDlg.show();\n            }\n        }\n    };\n}\n```\n\n代码清单\
  \ 17–7 是代码清单 17–6 中示例的修改版本。区别在于，现在在 `doClick()` 方法中，你会显示一个进度对话框并调用 `findLocation()`（参见图\
  \ 17–7）。`findLocation()` 随后创建一个新线程并调用 `start()` 方法，最终会调用线程的 `run()` 方法。在 `run()`\
  \ 方法中，使用 `Geocoder` 类来搜索位置。搜索完成后，必须将消息发送给知道如何与 UI 线程交互的对象，因为你需要更新地图。Android 为此提供了\
  \ `android.os.Handler` 类。从后台线程调用 `uiCallback.sendEmptyMessage(0)` 让 UI 线程处理搜索结果。在我们的例子中，实际上不需要在消息中发送任何内容，因为数据是通过\
  \ `addressList` 共享的。代码会调用处理器的回调，该回调会关闭对话框，然后查看 `Geocoder` 返回的 `addressList`。之后，回调会用结果更新地图，或者显示一个提示对话框，表示搜索没有返回任何结果。此示例的\
  \ UI 如图 图 17–7 所示。\n\n![images](img/1707.jpg)\n\n**图 17–7.** *在长时间操作期间显示进度窗口*\n\n\
  \n\n### 理解 `LocationManager` 服务\n\n`LocationManager` 服务是 `android.location` 包提供的核心服务之一。该服务提供两种功能：获取设备地理位置的机制，以及当设备进入指定地理位置时通过\
  \ Intent 通知你的功能。\n\n在本节中，你将学习 `LocationManager` 服务的工作原理。要使用该服务，首先必须获取它的引用。代码清单 17-8\
  \ 展示了 `LocationManager` 服务的一个简单用法。\n\n**代码清单 17-8.** *使用 `LocationManager` 服务*\n\
  \n```\npackage com.androidbook.maps.locationmanager;\n\nimport java.util.List;\n\
  \nimport android.app.Activity;\nimport android.content.Context;\nimport android.location.Location;\n\
  import android.location.LocationManager;\nimport android.os.Bundle;\n\npublic class\
  \ LocationManagerDemoActivity extends Activity\n{\n\n    @Override\n    protected\
  \ void onCreate(Bundle savedInstanceState)\n    {\n        super.onCreate(savedInstanceState);\n\
  \n        LocationManager locMgr = (LocationManager)\n            this.getSystemService(Context.LOCATION_SERVICE);\n\
  \n        Location loc =\n            locMgr.getLastKnownLocation(LocationManager.GPS_PROVIDER);\n\
  \n        List<String> providerList = locMgr.getAllProviders();\n    }\n}\n```\n\
  \n`LocationManager` 服务是系统级服务。系统级服务是通过使用服务名称从上下文（Context）中获取的服务；你不能直接实例化它们。`android.app.Activity`\
  \ 类提供了一个名为 `getSystemService()` 的实用方法，可用于获取系统级服务。如代码清单 17-8 所示，你调用 `getSystemService()`\
  \ 并传入所需服务的名称，此处为 `Context.LOCATION_SERVICE`。\n\n`LocationManager` 服务通过定位提供程序提供地理位置详情。目前有三种类型的定位提供程序：\n\
  \n- **GPS** 提供程序使用全球定位系统获取位置信息。\n- **网络** 提供程序使用手机基站或 Wi-Fi 网络获取位置信息。\n- **被动**\
  \ 提供程序类似于位置更新嗅探器，它会将由其他应用请求的位置更新传递给您的应用，而无需您的应用专门请求任何位置更新。当然，如果没有其他应用请求位置更新，您也不会收到任何更新。\n\
  \n`LocationManager` 类可以通过 `getLastKnownLocation()` 方法提供设备的最后已知位置。位置信息从提供程序获取，因此该方法将您想使用的提供程序名称作为参数。提供程序名称的有效值为\
  \ `LocationManager.GPS_PROVIDER`、`LocationManager.NETWORK_PROVIDER` 和 `LocationManager.PASSIVE_PROVIDER`。为了使您的应用成功获取位置信息，它必须在\
  \ `AndroidManifest.xml` 文件中拥有相应的权限。GPS 和被动提供程序需要 `android.permission.ACCESS_FINE_LOCATION`，而网络提供程序可以使用\
  \ `android.permission.ACCESS_COARSE_LOCATION` 或 `android.permission.ACCESS_FINE_LOCATION`，具体取决于您的需求。例如，假设您的应用将使用\
  \ GPS 或网络数据进行位置更新。由于您需要 GPS 的 `ACCESS_FINE_LOCATION`，您也已经满足了网络访问的权限，因此无需再指定 `ACCESS_COARSE_LOCATION`。如果您只打算使用网络提供程序，那么在清单文件中只需\
  \ `ACCESS_COARSE_LOCATION` 即可。\n\n调用 `getLastKnownLocation()` 会返回一个 `android.location.Location`\
  \ 实例，如果没有可用位置则返回 `null`。`Location` 类提供位置的纬度和经度、位置的计算时间，还可能提供设备的海拔、速度和方向信息。`Location`\
  \ 对象还可以通过 `getProvider()` 告诉您它来自哪个提供程序，结果将是 `GPS_PROVIDER` 或 `NETWORK_PROVIDER`。如果您通过\
  \ `PASSIVE_PROVIDER` 获取位置更新，请记住您实际上只是在嗅探位置更新，因此所有更新最终都来自 GPS 或网络。\n\n由于 `LocationManager`\
  \ 对提供程序进行操作，该类提供了获取提供程序的 API。例如，您可以通过调用 `getAllProviders()` 获取所有已知的提供程序。您可以通过调用\
  \ `getProvider()` 并传入提供程序名称作为参数（例如 `LocationManager.GPS_PROVIDER`）来获取特定提供程序。需要注意的一点是，`getAllProviders()`\
  \ 会返回您可能无权访问或当前已禁用的提供程序。幸运的是，您可以使用其他方法来确定提供程序的状态，例如 `isProviderEnabled(String providerName)`\
  \ 或 `getProviders(boolean enabledOnly)`，您可以传入 `true` 作为参数以仅获取立即可用的提供程序。\n\n还有另一种获取合适提供程序的方法，即使用\
  \ `LocationManager` 的 `getProviders(Criteria criteria, boolean enabledOnly)` 方法。通过指定位置更新的标准，并将\
  \ `enabledOnly` 设置为 `true` 以获取已启用并准备就绪的提供程序，您可以获得返回的提供程序名称列表，而无需了解具体是哪个提供程序。这可能更具可移植性，因为设备可能具有满足您需求的自定义\
  \ `LocationProvider`，而您无需事先了解它。`Criteria` 对象可以设置参数，包括精度级别以及对速度、方向、海拔、成本和功耗信息的需求。如果没有提供程序满足您的标准，将返回一个空列表，允许您要么放弃，要么放宽标准再试一次。\n\
  \n### 如何启用定位提供程序\n\n您可能会认为有一个简单的 API 可以在您的应用运行时启用定位提供程序（例如 GPS），如果它尚未开启的话。遗憾的是，情况并非如此。要启用定位服务，用户必须在其设备的“设置”屏幕中进行操作。您的应用可以通过启动该特定的“设置”屏幕，为用户简化此过程。位置设置源屏幕实际上只是一个\
  \ Activity，并且该 Activity 被设置为响应 Intent。因此，您的应用只需使用正确的 Intent 请求一个 Activity 即可。您可能使用的代码如下所示：\n\
  \n```\nstartActivityForResult(new Intent(\n    android.provider.Settings.ACTION_LOCATION_SOURCE_SETTINGS),\
  \ 0);\n```\n\n请记住，要处理响应，您必须在 Activity 中实现 `onActivityResult()` 回调（在第 5 章中已介绍）。并且还要记住，虽然您希望用户开启诸如\
  \ GPS 之类的定位提供程序，但用户可能不会这样做。您需要再次检查用户是否已启用定位提供程序，并根据结果采取相应的操作。\n\n\n\n#### 你能用位置信息做什么？\n\
  \n如前所述，`Location`对象可以告诉你纬度和经度、`Location`的计算时间、提供该`Location`的提供者，以及可选的**海拔**、**速度**、**方位**和**精度等级**。根据`Location`来源的提供者不同，还可能包含额外信息。例如，如果`Location`来自\
  \ GPS 提供者，会有一个额外的`Bundle`告诉你计算该`Location`时使用了多少颗卫星。可选值可能存在也可能不存在，这取决于提供者。要判断`Location`是否包含某个值，`Location`类提供了一系列`has...()`方法，这些方法返回`boolean`值，例如`hasAccuracy()`。在依赖`getAccuracy()`的返回值之前，明智的做法是先调用`hasAccuracy()`。\n\
  \n`Location`类还有其他一些有用的方法，包括一个静态方法`distanceBetween()`，它会返回两个`Location`之间的最短距离。另一个与距离相关的方法是`distanceTo()`，它会返回当前`Location`对象与传递给该方法的`Location`对象之间的最短距离。请注意，距离的单位是米，并且距离计算考虑了地球的曲率。但也要注意，这些距离并不是以你开车需要行驶的距离来提供的，例如。\n\
  \n如果你想获取行车路线或行车距离，你需要有起点和终点的`Location`，但进行计算时，你可能需要使用 Google Maps JavaScript API\
  \ 服务。例如，有一个 Google Directions API，类似于第 11 章中介绍的 Google Translate API。Directions\
  \ API 可以让你的应用程序显示如何从起点到达终点。\n\n#### 在开发期间向应用程序发送位置更新\n\n在进行开发测试时，`LocationManager`需要位置信息，而模拟器没有\
  \ GPS 或蜂窝基站。为了让你在模拟器中测试`LocationManager`服务应用程序，你需要从 Eclipse 手动发送位置更新。清单 17-9 展示了一个简单的示例来说明如何做到这一点。\n\
  \n**清单 17–9.** *注册位置更新*\n\n```java\npackage com.androidbook.location.update;\n\n\
  import android.app.Activity;\nimport android.content.Context;\nimport android.location.Location;\n\
  import android.location.LocationListener;\nimport android.location.LocationManager;\n\
  import android.os.Bundle;\nimport android.widget.Toast;\n\npublic class LocationUpdateDemoActivity\
  \ extends Activity\n{\n    LocationManager locMgr = null;\n    LocationListener\
  \ locListener = null;\n\n    @Override\n    public void onCreate(Bundle savedInstanceState)\n\
  \    {\n        super.onCreate(savedInstanceState);\n\n        locMgr = (LocationManager)\n\
  \            getSystemService(Context.LOCATION_SERVICE);\n\n        locListener\
  \ = new LocationListener()\n        {\n            public void  onLocationChanged(Location\
  \ location)\n            {\n                if (location != null)\n            \
  \    {\n                    Toast.makeText(getBaseContext(),\n                 \
  \       \"新位置纬度 [\" +\n                        location.getLatitude() +\n      \
  \                  \"] 经度 [\" +\n                        location.getLongitude()+\"\
  ]\",\n                        Toast.LENGTH_SHORT).show();\n                }\n \
  \           }\n\n            public void  onProviderDisabled(String provider)\n\
  \            {\n            }\n\n            public void  onProviderEnabled(String\
  \ provider)\n            {\n            }\n\n            public void  onStatusChanged(String\
  \ provider,\n                            int status, Bundle extras)\n          \
  \  {\n            }\n        };\n    }\n\n    @Override\n    public void onResume()\
  \ {\n        super.onResume();\n\n        locMgr.requestLocationUpdates(\n     \
  \       LocationManager.GPS_PROVIDER,\n            0,                // 最小时间间隔（毫秒）\n\
  \            0,                // 最小距离间隔（米）\n            locListener);\n    }\n\n\
  \    @Override\n    public void onPause() {\n        super.onPause();\n        locMgr.removeUpdates(locListener);\n\
  \    }\n}\n```\n\n这个例子中我们没有显示用户界面，所以标准的初始布局 XML 文件就可以了。这也是为什么我们不需要为此应用程序继承`MapActivity`，因为我们没有显示任何地图。\n\
  \n`LocationManager`服务的主要用途之一是接收设备位置的通知。清单 17-9 演示了如何注册一个监听器来接收位置更新事件。要注册监听器，你需要调用`requestLocationUpdates()`方法，并将提供者类型作为参数传入。当位置发生变化时，`LocationManager`会调用监听器的`onLocationChanged()`方法，并传入新的`Location`。在适当的时候移除任何位置更新的注册非常重要。在我们的示例中，我们在`onResume()`中注册，在`onPause()`中移除注册。如果我们不打算处理位置更新，就应该告诉提供者不要发送它们。还有可能我们的活动会被销毁（例如，如果用户旋转设备导致活动重启），在这种情况下，旧的活动可能仍然存在，仍在接收更新，用\
  \ Toast 显示它们，并占用内存。\n\n\n\n在我们的示例中，我们将`minTime`和`minDistance`设置为零。这告诉`LocationManager`尽可能频繁地向我们发送更新。这些设置在实际使用中并不理想，但我们在此使用它们是为了让演示运行得更好。（在实际应用中，你不会希望硬件如此频繁地尝试确定当前位置，因为这会耗尽电池电量。）请根据实际情况适当设置这些值，尽量降低真正需要获取位置变化通知的频率。\n\
  \n在代码清单 17–9 中，向你介绍了一个新工具：`Toast`小部件。这是一个方便的工具，允许你向用户短暂显示一个小型弹出视图。它看起来像是悬浮在现有视图之上，然后会自动消失。你可以通过使用`LENGTH_LONG`代替`LENGTH_SHORT`来延长它的悬浮时间。\n\
  \n要在模拟器中测试此功能，你可以使用 Eclipse 的 ADT 插件附带的 Dalvik 调试监控服务（DDMS）透视图。DDMS 界面提供一个屏幕，让你可以向模拟器发送新的位置（参见图\
  \ 17–8）。\n\n![图片](img/1708.jpg)\n\n**图 17–8.** *在 Eclipse 中使用 DDMS 界面将位置数据发送到模拟器*\n\
  \n要在 Eclipse 中进入 DDMS，请使用“窗口” ![图片](img/U001.jpg) “打开透视图” ![图片](img/U001.jpg) “DDMS”。“模拟器控制”视图应该已经存在，但如果没有，请使用“窗口”\
  \ ![图片](img/U001.jpg) “显示视图” ![图片](img/U001.jpg) “其他” ![图片](img/U001.jpg) “Android”\
  \ ![图片](img/U001.jpg) “模拟器控制”使其在此透视图下可见。你可能需要在模拟器控制中向下滚动才能找到位置控制。如图 17–8 所示，DDMS\
  \ 用户界面中的“手动”选项卡允许你向模拟器发送新的 GPS 位置（纬度/经度对）。发送一个新位置将触发监听器上的`onLocationChanged()`方法，这将导致向用户发送一条包含新位置的消息。\n\
  \n你可以使用其他几种技术向模拟器发送位置数据，如 DDMS 用户界面所示（参见图 17–8）。例如，DDMS 界面允许你提交 GPS 交换格式（GPX）文件或\
  \ Keyhole 标记语言（KML）文件。你可以从以下网站获取 GPX 示例文件：\n\n*   [`http://www.topografix.com/gpx_resources.asp`](http://www.topografix.com/gpx_resources.asp)\n\
  *   [`http://tramper.co.nz/?view=gpxFiles`](http://tramper.co.nz/?view=gpxFiles)\n\
  *   [`http://www.gpxchange.com/`](http://www.gpxchange.com/)\n\n类似地，你可以使用以下 KML\
  \ 资源来获取或创建 KML 文件：\n\n*   [`http://bbs.keyhole.com/`](http://bbs.keyhole.com/)\n\
  *   [`http://code.google.com/apis/kml/documentation/kml_tut.html`](http://code.google.com/apis/kml/documentation/kml_tut.html)\n\
  \n**注意：** 有些网站提供 KMZ 文件。这些是压缩后的 KML 文件，只需解压缩即可获得 KML 文件。某些 KML 文件需要修改其 XML 命名空间值才能在\
  \ DDMS 中正常播放。如果你在某个特定的 KML 文件上遇到问题，请确保它包含以下内容：\n\n```\n<kml >\n```\n\n你可以将 GPX 或\
  \ KML 文件上传到模拟器，并设置模拟器播放文件的速度（参见图 17–9）。然后，模拟器将根据配置的速度向你的应用程序发送位置更新。如图 17–9 所示，GPX\
  \ 文件包含点（显示在上半部分）和路径（显示在下半部分）。你不能播放一个点，但单击一个点时，它会被发送到模拟器。你单击一条路径，然后“播放”按钮将被启用，这样你就可以播放这些点了。\n\
  \n**注意：** 有报告称，并非所有 GPX 文件都能被模拟器控制识别。如果你尝试加载一个 GPX 文件但没有任何反应，请尝试从其他来源获取不同的文件。\n\n\
  ![图片](img/1709.jpg)\n\n**图 17–9.** *将 GPX 和 KML 文件上传到模拟器进行播放*\n\n代码清单 17–9 中包含了`LocationListener`的另外一些我们尚未提及的方法。它们是回调方法`onProviderDisabled()`、`onProviderEnabled()`和`onStatusChanged()`。在我们的示例中，我们没有对这些方法执行任何操作，但在你的应用程序中，你可以收到通知，例如当位置提供者（如`gps`）被用户禁用或启用时，或者当某个位置提供者的状态发生变化时。状态包括`OUT_OF_SERVICE`（服务不可用）、`TEMPORARILY_UNAVAILABLE`（暂时不可用）和`AVAILABLE`（可用）。即使某个提供者已启用，也并不意味着它会发送任何位置更新，你可以通过状态来了解这一点。注意，如果针对一个已禁用的提供者调用了`requestLocationUpdates()`，`onProviderDisabled()`会立即被调用。\n\
  \n### 从模拟器控制台发送位置更新\n\nEclipse 提供了一些易于使用的工具来向你的应用程序发送位置更新，但还有另一种方法。回顾第 2 章，要从工具窗口启动模拟器控制台，请使用以下命令：\n\
  \n```\ntelnet localhost 模拟器端口号\n```\n\n其中`模拟器端口号`是与正在运行的 AVD 实例相关联的编号，显示在模拟器窗口的标题栏中。连接成功后，你可以使用`geo\
  \ fix`命令发送位置更新。要发送包含海拔高度的纬度/经度坐标（海拔高度为可选参数），请使用该命令的以下形式：\n\n```\ngeo fix 经度 纬度 [\
  \ 海拔高度 ]\n```\n\n例如，以下命令将向你的应用程序发送美国佛罗里达州杰克逊维尔的位置，海拔高度为 120 米。\n\n```\ngeo fix -81.5625\
  \ 30.334954 120\n```\n\n请特别注意`geo fix`命令参数的顺序。经度是*第一个*参数，纬度是第二个。\n\n### 获取位置更新的其他方法\n\
  \n之前我们向你展示了如何使用`LocationManager`的`requestLocationUpdates()`方法将位置更新发送到你的 Activity。实际上，该方法有几种不同的签名，包括使用`PendingIntent`的签名。这使你能够将位置更新定向到服务或广播接收器。你还可以将位置更新定向到其他`Looper`线程而不是主线程，这为你的应用程序提供了很大的灵活性，尽管其中一些方法仅适用于\
  \ Android 2.3 及以上版本。\n\n\n\n### 使用 `MyLocationOverlay` 显示位置\n\nGPS 和地图的一个常见用途是向用户显示他们当前所在的位置。幸运的是，Android\
  \ 通过提供一个名为 `MyLocationOverlay` 的特殊覆盖图，让这一功能变得非常容易实现。只需将此覆盖图添加到你的 `MapView` 中，就可以轻松地在你的地图上添加一个闪烁的蓝点，显示\
  \ `LocationManager` 服务所报告的设备位置。\n\n在本示例中，我们将把多个概念整合到一个应用程序中。参考**清单 17–10**，我们可以通过更新\
  \ `main.xml` 和 `MyLocationDemoActivity.java` 文件来修改之前的示例。或者直接从 第 17 章 的现有源代码中创建一个新项目。别忘了在清单文件中放入你的地图\
  \ API 密钥。\n\n**清单 17–10.** *使用 `MyLocationOverlay`*\n\n```\n<?xml version=\"1.0\"\
  \ encoding=\"utf-8\"?>\n<!-- 此文件位于 /res/layout/main.xml -->\n<RelativeLayout\n\n\
  \        android:layout_width=\"fill_parent\"\n        android:layout_height=\"\
  fill_parent\">\n\n    <com.google.android.maps.MapView\n        android:id=\"@+id/geoMap\"\
  \ android:clickable=\"true\"\n        android:layout_width=\"fill_parent\"\n   \
  \     android:layout_height=\"fill_parent\"\nandroid:apiKey=\"在此处输入你的地图 API 密钥\"\
  \n        />\n\n</RelativeLayout>\n```\n\n```\npackage com.androidbook.location.myoverlay;\n\
  \nimport android.os.Bundle;\nimport com.google.android.maps.MapActivity;\nimport\
  \ com.google.android.maps.MapController;\nimport com.google.android.maps.MapView;\n\
  import com.google.android.maps.MyLocationOverlay;\n\npublic class MyLocationDemoActivity\
  \ extends MapActivity {\n\n    MapView mapView = null;\n    MapController mapController\
  \ = null;\n    MyLocationOverlay whereAmI = null;\n\n    @Override\n    protected\
  \ boolean isLocationDisplayed() {\n        return whereAmI.isMyLocationEnabled();\n\
  \    }\n\n    @Override\n    protected boolean isRouteDisplayed() {\n        return\
  \ false;\n    }\n\n    /** 当 Activity 首次创建时调用。 */\n    @Override\n    public void\
  \ onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n\n        mapView = (MapView)findViewById(R.id.geoMap);\n\
  \        mapView.setBuiltInZoomControls(true);\n\n        mapController = mapView.getController();\n\
  \        mapController.setZoom(15);\n\n        whereAmI = new MyLocationOverlay(this,\
  \ mapView);\n        mapView.getOverlays().add(whereAmI);\n        mapView.postInvalidate();\n\
  \    }\n\n    @Override\n    public void onResume()\n    {\n        super.onResume();\n\
  \        whereAmI.enableMyLocation();\n        whereAmI.runOnFirstFix(new Runnable()\
  \ {\n            public void run() {\n                mapController.setCenter(whereAmI.getMyLocation());\n\
  \            }\n        });\n}\n\n    @Override\n    public void onPause()\n   \
  \ {\n        super.onPause();\n        whereAmI.disableMyLocation();\n    }\n}\n\
  ```\n\n请注意，在此示例中，如果我们现在正在地图上显示设备的当前位置，则 `isLocationDisplayed()` 会返回 `true`。\n\n\
  一旦在模拟器中启动此应用程序，你需要先向它发送位置更新，它才会变得有趣起来。为此，请按照本节前面所述，在 Eclipse 中转到 DDMS 模拟器控制视图：\n\
  \n1.  你需要从互联网上的某个地方找到一个示例 GPX 文件。前面列出的用于 GPX 文件的站点上有很多这样的文件。随便选一个，然后下载到你的工作站。\n\
  2.  使用“位置控制”下“GPX”选项卡中的“加载 GPX”按钮，将此文件加载到模拟器控制中。\n3.  从底部的列表中选择一条路径，然后点击播放按钮（绿色箭头）。同样注意到“速度”按钮。这应该会开始向模拟器发送一串位置更新，这些更新将被你的应用程序接收。\n\
  4.  点击“速度”按钮，使更新更加频繁。\n\n**图 17–10** 显示了你的屏幕可能的样子。\n\n![图片](img/1710.jpg)\n\n**图\
  \ 17–10.** *使用 `MyLocationOverlay` 显示我们的当前位置*\n\n上述代码非常直观。在设置了 `MapView` 的基础功能、开启缩放控件并放大到适当比例之后，我们创建了\
  \ `MyLocationOverlay` 覆盖图。我们将这个新的覆盖图添加到 `MapView` 中，并在 `MapView` 上调用 `postInvalidate()`，这样新的覆盖图就会出现在屏幕上。如果没有这最后一步调用，覆盖图会被创建，但不会显示出来。\n\
  \n请记住，我们的应用程序不仅在启动时会调用 `onResume()`，在唤醒后也会调用。因此，我们希望在 `onResume()` 中启用位置跟踪，并在 `onPause()`\
  \ 中禁用它。如果我们不打算消费位置请求，那么让它们消耗电池电量是没有意义的。除了在 `onResume()` 中启用位置请求外，我们还希望直接跳转到我们当前所在的位置。`MyLocationOverlay`\
  \ 类为此提供了一个有用的方法：`runOnFirstFix()`。这个方法允许我们设置一段代码，该代码会在我们一获得位置信息时立即执行。这可能立即发生，因为我们有最后已知的位置，也可能稍后才发生，当我们从\
  \ `GPS_PROVIDER`、`NETWORK_PROVIDER` 或 `PASSIVE_PROVIDER` 获取到信息时。当我们获得定位后，就以此为中心。此后，我们不需要再做任何事情，因为\
  \ `MyLocationOverlay` 正在获取位置更新，并将闪烁的蓝点放置在该位置。如果蓝点靠近地图边缘，地图会自动重新居中，使蓝点回到屏幕中央。\n\n\
  \n\n### Customizing `MyLocationOverlay`\n\n你可能已经注意到，在位置更新过程中，你可以放大和缩小，甚至可以平移离开当前位置。根据你的视角，这可能是好事也可能是坏事。如果你平移视图后不记得自己在哪里，除非你缩小到很远并寻找蓝点，否则很难重新定位自己。重新居中的技巧只有在蓝点自行逐渐靠近地图边缘时才有效。一旦你平移视图导致蓝点不可见，它不会自动回到视野中。如果蓝点在没有先接近边缘的情况下跳出地图，也可能出现这种情况。\n\
  \n如果你希望当前位置始终显示在屏幕中心附近，我们需要确保持续动画移动到当前位置，这可以相对容易地实现。在下一个版本中，我们将重用 `MyLocationDemo`\
  \ 项目中的所有内容，只需对 `Activity` 进行一处微小修改，并添加一个新类作为 `MyLocationOverlay` 的扩展，以便稍微调整其行为。新的\
  \ `MyLocationOverlay` 扩展类如 清单 17-11 所示。\n\n**清单 17-11.** *扩展 `MyLocationOverlay`\
  \ 并保持位置在视野中*\n\n```java\npackage com.androidbook.location.myoverlay;\n\nimport android.content.Context;\n\
  import android.location.Location;\n\nimport com.google.android.maps.GeoPoint;\n\
  import com.google.android.maps.MapView;\nimport com.google.android.maps.MyLocationOverlay;\n\
  \npublic class MyCustomLocationOverlay extends MyLocationOverlay {\n    MapView\
  \ mMapView = null;\n\n    public MyCustomLocationOverlay(Context ctx, MapView mapView)\
  \ {\n        super(ctx, mapView);\n        mMapView = mapView;\n    }\n\n    public\
  \ void onLocationChanged(Location loc) {\n        super.onLocationChanged(loc);\n\
  \        GeoPoint newPt = new GeoPoint((int) (loc.getLatitude()*1E6),\n        \
  \        (int) (loc.getLongitude()*1E6));\n        mMapView.getController().animateTo(newPt);\n\
  \    }\n}\n```\n\n我们需要对 清单 17-10 做的唯一修改是在 Activity 的 `onCreate()` 方法中使用 `MyCustomLocationOverlay`\
  \ 替代 `MyLocationOverlay`，如下所示：\n\n```java\nwhereAmI = new MyCustomLocationOverlay(this,\
  \ mapView);\n```\n\n在模拟器中运行它，然后通过模拟器控件发送新的位置。如果你使用 GPX 文件发送一系列位置更新，你会注意到蓝点始终被移动到地图中心。即使你完全平移到远离蓝点的位置，地图也会返回并显示它位于中心。\n\
  \n### 使用邻近警报\n\n我们之前提到过，`LocationManager` 可以在设备进入指定地理位置时通知你。设置此功能的方法是 `LocationManager`\
  \ 类中的 `addProximityAlert()`。基本上，你告诉 `LocationManager`：当设备的位置进入或离开一个以某经纬度位置为中心、指定半径的圆形区域时，你希望触发一个\
  \ `Intent`。该 `Intent` 可以触发 `BroadcastReceiver`、`Service` 的调用，或启动一个 `Activity`。还可以为警报设置可选的时间限制，因此它可能在\
  \ `Intent` 触发之前超时。\n\n在内部，此方法的代码会同时为 GPS 和网络提供商注册监听器，并设置每秒一次的位置更新，`minDistance`\
  \ 为 1 米。你无法覆盖此行为或设置参数。因此，如果长时间运行此功能，你可能会很快耗尽电池。如果屏幕进入休眠状态，邻近警报将每 4 分钟检查一次，但是，你同样无法控制此时间间隔。\n\
  \n使用本章中介绍的技术，自己决定设备是否在距经纬度位置一定距离内，可能会好得多。例如，如果你维护一个要检查的位置列表，可以测量当前位置到列表中每个位置的距离。根据距离的远近，你可以决定在再次检查当前位置之前等待一段时间。例如，如果最近的位置在\
  \ 100 英里外，而你想知道何时进入 300 米范围内，显然不需要在 1 秒后检查。\n\n如果你仍希望使用此方法，我们将展示如何操作。清单 17-12 展示了主\
  \ `Activity` 的 Java 代码，以及将接收广播的 `BroadcastReceiver`。\n\n**清单 17-12.** *使用 `BroadcastReceiver`\
  \ 设置邻近警报*\n\n```java\n// This file is ProximityActivity.java\npackage com.androidbook.location.proximity;\n\
  \nimport android.app.Activity;\nimport android.app.PendingIntent;\nimport android.content.Intent;\n\
  import android.content.IntentFilter;\nimport android.location.LocationManager;\n\
  import android.net.Uri;\nimport android.os.Bundle;\n\npublic class ProximityActivity\
  \ extends Activity {\n    private final String PROX_ALERT =\n        \"com.androidbook.intent.action.PROXIMITY_ALERT\"\
  ;\n    private ProximityReceiver proxReceiver = null;\n    private LocationManager\
  \ locMgr = null;\n    PendingIntent pIntent1 = null;\n    PendingIntent pIntent2\
  \ = null;\n\n    /** Called when the activity is first created. */\n    @Override\n\
  \    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \n        locMgr = (LocationManager)\n                  this.getSystemService(LOCATION_SERVICE);\n\
  \n        double lat = 30.334954;      // Coordinates for Jacksonville, FL\n   \
  \     double lon = -81.5625;\n        float radius = 5.0f * 1609.0f; // 5 miles\
  \ x 1609 meters per mile\n\n        String geo = \"geo:\"+lat+\",\"+lon;\n\n   \
  \     Intent intent = new Intent(PROX_ALERT, Uri.parse(geo));\n        intent.putExtra(\"\
  message\", \"Jacksonville, FL\");\n\n        pIntent1 = PendingIntent.getBroadcast(getApplicationContext(),\
  \ 0,\n                intent, PendingIntent.FLAG_CANCEL_CURRENT);\n\n        locMgr.addProximityAlert(lat,\
  \ lon, radius, -1L, pIntent1);\n\n        lat = 28.54;        // Coordinates for\
  \ Orlando, FL\n        lon = -81.38;\n        geo = \"geo:\"+lat+\",\"+lon;\n\n\
  \        intent = new Intent(PROX_ALERT, Uri.parse(geo));\n        intent.putExtra(\"\
  message\", \"Orlando, FL\");\n\n        pIntent2 = PendingIntent.getBroadcast(getApplicationContext(),\
  \ 0,\n                intent, PendingIntent.FLAG_CANCEL_CURRENT);\n\n        locMgr.addProximityAlert(lat,\
  \ lon, radius, -1L, pIntent2);\n```\n\n\n\n`proxReceiver = new ProximityReceiver();`\n\
  \n`IntentFilter iFilter = new IntentFilter(PROX_ALERT);`\n`iFilter.addDataScheme(\"\
  geo\");`\n\n`registerReceiver(proxReceiver, iFilter);`\n\n`protected void onDestroy()\
  \ {`\n`    super.onDestroy();`\n`    unregisterReceiver(proxReceiver);`\n`    locMgr.removeProximityAlert(pIntent1);`\n\
  `    locMgr.removeProximityAlert(pIntent2);`\n`}`\n\n`// 此文件为 ProximityReceiver.java`\n\
  `package com.androidbook.location.proximity;`\n\n`import android.content.BroadcastReceiver;`\n\
  `import android.content.Context;`\n`import android.content.Intent;`\n`import android.location.LocationManager;`\n\
  `import android.os.Bundle;`\n`import android.util.Log;`\n\n`public class ProximityReceiver\
  \ extends BroadcastReceiver {`\n\n`    private static final String TAG = \"ProximityReceiver\"\
  ;`\n\n`    @Override`\n`    public void onReceive(Context arg0, Intent intent) {`\n\
  `        Log.v(TAG, \"收到 Intent\");`\n`        if(intent.getData() != null)`\n`\
  \            Log.v(TAG, intent.getData().toString());`\n`        Bundle extras =\
  \ intent.getExtras();`\n`        if(extras != null) {`\n`            Log.v(TAG,\
  \ \"消息: \" + extras.getString(\"message\"));`\n`            Log.v(TAG, \"是否进入? \"\
  \ +`\n`              extras.getBoolean(LocationManager.KEY_PROXIMITY_ENTERING));`\n\
  `        }`\n`    }`\n`}`\n\n由于我们实际上并未在地图上显示任何位置，因此无需使用 `MapActivity`、Google 地图\
  \ API 库或目标对象。但是，我们确实需要在清单文件中为 `android.permission.ACCESS_FINE_LOCATION` 添加权限，因为\
  \ `LocationManager` 将尝试使用 GPS 提供商。它还会尝试使用网络提供商，但由于我们已经要求了 `ACCESS_FINE_LOCATION`\
  \ 权限，因此在权限方面已无后顾之忧。我们在代码的 `onCreate()` 方法中注册了 `BroadcastReceiver`，因此无需在清单文件中设置接收器。如果你将接收器放入一个独立的应用程序，那么*就*需要在该独立应用程序的清单文件中为该接收器添加一个条目。对于清单\
  \ 17–12 中的示例，它可能看起来像清单 17–13 中的清单片段。\n\n**清单 17–13.** *用于邻近警报 BroadcastReceiver\
  \ 的 AndroidManifest.xml 片段*\n\n`<application … >`\n\n`    <receiver android:name=\"\
  .ProximityReceiver\">`\n`        <intent-filter>`\n`            <action android:name=\"\
  com.androidbook.android.intent.PROXIMITY_ALERT\" />`\n`            <data android:scheme=”geo”\
  \ />`\n`        </intent-filter>`\n`    </receiver>`\n`</application>`\n\nAndroid\
  \ 中的邻近警报功能通过接收一个 `PendingIntent` 对象、我们所关注经纬度点的坐标、该点周围我们想要检测的半径（以米为单位）以及检测的持续时间来工作。这些参数都通过\
  \ `LocationManager` 的 `addProximityAlert()` 方法传递进来。`PendingIntent` 包含一个 `Intent`，当设备进入或离开我们所定义的圆形区域时，这个\
  \ `Intent` 就会被触发。在我们的示例中，我们选择了使用广播 Intent，因此调用了 `PendingIntent` 类的 `getBroadcast()`\
  \ 方法，并将我们应用程序的上下文以及包含警报动作和 `Location` 点的 `Uri` 的 `Intent` 传递给它。如果设备进入或离开我们关注的圆形区域，我们的\
  \ `Intent` 将广播给所有注册接收它的接收器。\n\n我们选择不为警报设置超时，将持续时间设置为 `-1L`。如果你想设置超时，这个值将是 `LocationManager`\
  \ 在放弃并删除你的 `PendingIntent` 之前等待的毫秒数。如果 `LocationManager` 在触发之前就删除了它，你不会收到通知。\n\n\
  在我们的示例中，我们获取了对 `LocationManager` 的引用，创建了第一个 `Intent` 和 `PendingIntent`，然后调用 `addProximityAlert()`\
  \ 来设置第一个警报。稍后，当我们的 `Intent` 被触发时，`LocationManager` 添加到其中的唯一内容（在 `extras` 中）是一个 `boolean`\
  \ 值，表明我们是进入还是离开该圆形区域。它不会添加设备当前的纬度/经度位置，也不会添加我们在调用 `addProximityAlert()` 时使用的纬度/经度。因此，为了让我们在\
  \ `BroadcastReceiver` 中知道我们靠近哪个 `Location`，我们向 `Intent` 添加了一些数据，即我们关注的 `Location`\
  \ 的纬度/经度。为了增加趣味性，我们还在 `extras` 中添加了一条消息，描述了这个 `Location`。如果有助于接收端处理，我们也可以添加 `double`\
  \ 类型的纬度和经度。\n\n添加完第一个警报后，我们以同样的方式设置了第二个警报。最后，我们注册一个 `BroadcastReceiver`，以便在 `LocationManager`\
  \ 广播我们的 `Intent` 时接收它们。我们使用了一个 `IntentFilter`，其中同时包含作为动作的警报和作为方案的 `geo`。我们需要这两个条件才能捕获广播，因为这些广播包含数据；如果广播不包含任何数据，我们也可以在未指定方案的情况下捕获广播。最后需要做的是，确保在\
  \ `onDestroy()` 方法中进行清理，即取消注册我们的接收器，并使用我们保存的 `PendingIntent` 从 `LocationManager`\
  \ 中移除邻近警报。这就是我们保留对 `PendingIntent` 引用的原因，以便稍后可以移除警报。\n\n我们的 `ProximityReceiver`\
  \ 类非常简单。收到广播消息后，它会查找信息并在 `LogCat` 中打印输出。在这里，你可以看到 `LocationManager` 为我们插入的额外数据，它告诉我们是在进入还是离开圆形区域。\n\
  \n当你在模拟器中启动此示例应用程序时，会看到一个空白屏幕，顶部有我们的应用程序标题。现在，你可以使用 DDMS 模拟器控制屏幕或带有 `geo fix` 命令的模拟器控制台来发送位置更新。当你发送的位置跨越了我们某个圆形区域的边缘（即杰克逊维尔周围五英里范围或奥兰多周围五英里范围）时，你应该会在\
  \ LogCat 中看到来自我们的 `BroadcastReceiver` 的消息。图 17–11 展示了当你发送一些触发广播的位置更新后，你的 LogCat\
  \ 窗口可能的样子。\n\n![images](img/1711.jpg)\n\n**图 17–11.** *显示来自我们的 BroadcastReceiver\
  \ 的消息的 LogCat 窗口*\n\n由于这些是广播，我们不能依赖它们的接收顺序。例如，如果我们在奥兰多圆形区域内部，然后跳转到杰克逊维尔圆形区域内部，我们可能会在收到离开奥兰多圆形区域的广播*之前*就收到进入杰克逊维尔圆形区域的广播。\n\
  \n由于我们处理的是 `Location`，因此我们为 URI 使用了 `geo` 方案，这是一个已知的方案，非常适合传递纬度和经度信息。你应该注意，`geo`\
  \ URI 的结构是纬度在前、经度在后，但当我们在模拟器控制台中使用 `geo fix` 命令时，我们是经度在前、纬度在后。如果你不注意，这可能会让你搞混，并且当问题仅仅是发送位置更新的顺序时，你可能会花费大量时间尝试调试应用程序。你始终可以使用\
  \ GPX 或 KML 文件来发送位置，并预先选择用于测试的位置，让你的圆形区域与该文件路径重叠。\n\n我们的示例应用程序非常简单。在实际的应用程序中，`BroadcastReceiver`\
  \ 可以执行通知或启动服务。除了广播之外，`PendingIntent` 也可以用于 Activity 或服务，甚至在其他应用程序中。我们的应用程序也可以是一个如前所述的服务。\n\
  \n\n\n### 本章小结\n\n本章我们探讨了地图与基于位置的服务，详细讨论了如何使用`MapView`控件和`MapActivity`类。我们从地图的基础知识入手，接着介绍了如何利用叠加层在地图上放置标记，并演示了如何通过后台线程进行地理编码与反向地理编码处理。我们概述了`LocationManager`类，该类通过服务提供者获取详细的位置信息，并允许我们在地图上显示设备的当前位置。最后，我们还介绍了如何使用临近警报。\n\
  \n下一章，我们将讨论 Android 的电话服务。\n\n## 第 18 章\n\n## 使用电话 API\n\n许多 Android 设备都是智能手机，但到目前为止，我们尚未讨论如何编写使用电话功能的应用程序。在本章中，我们将向你展示如何发送和接收短消息服务（SMS）消息。我们还将涉及\
  \ Android 电话 API 中其他几个有趣的方面，包括会话发起协议（SIP）功能。SIP 是 IETF 制定的用于实现互联网语音传输协议（VoIP）的标准，用户可以通过互联网进行类似电话的呼叫，SIP\
  \ 还可以处理视频通话。\n\n### 使用短信功能\n\nSMS 代表短消息服务，通常被称为*短信*。Android SDK 支持发送和接收短信。我们将从讨论使用\
  \ SDK 发送短信的各种方法开始。\n\n#### 发送短信\n\n要从你的应用程序发送短信，需要在清单文件中添加`android.permission.SEND_SMS`权限，然后使用`android.telephony.SmsManager`类。本示例的布局\
  \ XML 文件和 Java 代码请参见【列表 18-1】。如果需要查看权限在清单 XML 文件中的存放位置，可以提前查看【列表 18-2】。\n\n**注意：**\
  \ 我们将在本章末尾提供一个网址，你可以使用该网址下载本章的项目文件，从而直接将项目导入 Eclipse。\n\n**列表 18-1.** *发送短信消息*\n\
  \n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<!-- 此文件为 /res/layout/main.xml\
  \ -->\n<LinearLayout\n    android:orientation=\"vertical\"\n    android:layout_width=\"\
  fill_parent\"\n    android:layout_height=\"fill_parent\">\n\n    <LinearLayout\n\
  \        android:orientation=\"horizontal\"\n        android:layout_width=\"fill_parent\"\
  \n        android:layout_height=\"wrap_content\">\n\n        <TextView android:layout_width=\"\
  wrap_content\"\n            android:layout_height=\"wrap_content\"\n           \
  \ android:text=\"目标地址：\" />\n\n        <EditText android:id=\"@+id/addrEditText\"\
  \n            android:layout_width=\"fill_parent\"\n            android:layout_height=\"\
  wrap_content\"\n            android:phoneNumber=\"true\"\n            android:text=\"\
  9045551212\" />\n\n    </LinearLayout>\n\n    <LinearLayout\n        android:orientation=\"\
  vertical\"\n        android:layout_width=\"fill_parent\"\n        android:layout_height=\"\
  wrap_content\">\n\n        <TextView android:layout_width=\"wrap_content\"\n   \
  \         android:layout_height=\"wrap_content\"\n            android:text=\"短信内容：\"\
  \ />\n\n        <EditText android:id=\"@+id/msgEditText\"\n            android:layout_width=\"\
  fill_parent\"\n            android:layout_height=\"wrap_content\"\n            android:text=\"\
  hello sms\" />\n\n    </LinearLayout>\n\n    <Button android:id=\"@+id/sendSmsBtn\"\
  \n        android:layout_width=\"wrap_content\"\n        android:layout_height=\"\
  wrap_content\"\n        android:text=\"发送短信\"\n        android:onClick=\"doSend\"\
  \ />\n\n</LinearLayout>\n```\n\n```java\n// 此文件为 TelephonyDemo.java\nimport android.app.Activity;\n\
  import android.os.Bundle;\nimport android.telephony.SmsManager;\nimport android.view.View;\n\
  import android.widget.EditText;\nimport android.widget.Toast;\n\npublic class TelephonyDemo\
  \ extends Activity\n{\n    @Override\n    protected void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
  \    }\n\n    public void doSend(View view) {\n        EditText addrTxt =\n    \
  \          (EditText) findViewById(R.id.addrEditText);\n\n        EditText msgTxt\
  \ =\n              (EditText) findViewById(R.id.msgEditText);\n\n        try {\n\
  \            sendSmsMessage(\n                addrTxt.getText().toString(),\n  \
  \              msgTxt.getText().toString());\n            Toast.makeText(this, \"\
  已发送短信\",\n                    Toast.LENGTH_LONG).show();\n        } catch (Exception\
  \ e) {\n            Toast.makeText(this, \"发送短信失败\",\n                    Toast.LENGTH_LONG).show();\n\
  \            e.printStackTrace();\n        }\n    }\n\n    @Override\n    protected\
  \ void onDestroy() {\n        super.onDestroy();\n    }\n\n    private void sendSmsMessage(String\
  \ address,String message)throws Exception\n    {\n        SmsManager smsMgr = SmsManager.getDefault();\n\
  \        smsMgr.sendTextMessage(address, null, message, null, null);\n    }\n}\n\
  ```\n\n\n好的，作为一名高级文档工程师和翻译员，我将遵循您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\n\n\nListing 18–1\
  \ 中的示例演示了如何使用 Android SDK 发送短信。首先查看布局代码片段，可以看到用户界面有两个`EditText`字段：一个用于输入短信接收者的目标地址（电话号码），另一个用于输入文本消息。用户界面还有一个发送短信的按钮，如图\
  \ Figure 18–1 所示。\n\n![images](img/1801.jpg)\n\n**Figure 18–1.** *短信示例的用户界面*\n\n\
  示例的核心部分是`sendSmsMessage()`方法。该方法使用`SmsManager`类的`sendTextMessage()`方法来发送短信。以下是`SmsManager.sendTextMessage()`的签名：\n\
  \n`sendTextMessage(String destinationAddress, String smscAddress,`\n`    String\
  \ textMsg, PendingIntent sentIntent,`\n`    PendingIntent deliveryIntent);`\n\n\
  在此示例中，你只填充了目标地址和文本消息参数。不过，你可以自定义该方法，使其不使用默认的短信中心（蜂窝网络中负责发送短信的服务器地址）。你还可以实现一个自定义功能，当消息已发送（或发送失败）以及收到投递通知时，广播待定意图（`PendingIntent`）。\n\
  \n发送短信主要分为两个步骤：发送和投递。每完成一个步骤，如果你的应用提供了待定意图，就会广播一个待定意图。你可以将任何内容放入待定意图中，例如操作（`action`），但传递给`BroadcastReceiver`的结果码（`result\
  \ code`）将是特定于短信发送或投递的。此外，根据短信系统的实现，你可能还会获得与无线电错误或状态报告相关的额外数据。\n\n如果没有待定意图，你的代码无法判断文本消息是否发送成功。但在测试时，你可以做到这一点。如果你在模拟器中启动此示例应用，并启动另一台模拟器（通过命令行或\
  \ Eclipse Window ![images](img/U001.jpg) Android SDK and AVD Manager 界面），你可以将另一台模拟器的端口号作为目标地址。端口号显示在模拟器窗口的标题栏中，通常类似于`5554`。点击“发送文本消息”按钮后，你应该会看到另一台模拟器中出现一条通知，表明你的文本消息已被对方接收。\n\
  \n`SMSManager`类还提供了另外两种发送短信的方法：\n\n- `sendDataMessage()`：额外接收一个端口号参数，并且消息内容不是`String`类型，而是字节数组。\n\
  - `sendMultipartTextMessage()`：允许在整条消息超出短信规范允许长度时发送文本消息。`sendMultipartTextMessage()`方法接收一个`String`数组作为参数，但请注意，它同时也会接收一个可选的待定意图数组，用于处理发送和投递。`SMSManager`类提供了`divideMessage()`方法来帮助将大消息拆分成多个部分。\n\
  \n总而言之，在 Android 中发送短信非常简单。请注意，在模拟器中，你的短信实际上并不会发送到目标地址。但是，如果`sendTextMessage()`方法正常返回且没有抛出异常，则可以认为发送成功。如\
  \ Listing 18–1 所示，你可以使用`Toast`类在用户界面中显示一条消息，以指示短信是否发送成功。\n\n发送短信只是故事的一半。接下来，我们将展示如何监控收到的短信。\n\
  \n### 监控收到的短信\n\n我们将使用你刚刚创建的同一个应用来发送短信，并添加一个`BroadcastReceiver`来监听`android.provider.Telephony.SMS_RECEIVED`这个操作（`action`）。当设备收到短信时，Android\
  \ 会广播此操作。当我们注册接收器后，每当收到短信时，我们的应用都会收到通知。监控收到的短信的第一步是请求接收短信的权限。为此，我们需要在清单文件（manifest\
  \ file）中添加`android.permission.RECEIVE_SMS`权限。要实现接收器，我们必须编写一个继承自`android.content.BroadcastReceiver`的类，然后在清单文件中注册该接收器。Listing\
  \ 18–2 包含了`AndroidManifest.xml`文件和我们的接收器类。请注意，清单文件中包含了两个权限，因为我们仍然需要为我们上面创建的 Activity\
  \ 保留发送权限。\n\n**Listing 18–2.** *监控短信*\n\n`<?xml version=\"1.0\" encoding=\"utf-8\"\
  ?>`\n`<!-- This file is AndroidManifest.xml -->`\n`<manifest`\n`    package=\"com.androidbook.telephony\"\
  \ android:versionCode=\"1\"`\n`    android:versionName=\"1.0\">`\n`    <application\
  \ android:icon=\"@drawable/icon\"`\n`            android:label=\"@string/app_name\"\
  >`\n`        <activity android:name=\".TelephonyDemo\"`\n`                android:label=\"\
  @string/app_name\">`\n`          <intent-filter>`\n`            <action android:name=\"\
  android.intent.action.MAIN\" />`\n`            <category android:name=\"android.intent.category.LAUNCHER\"\
  \ />`\n`          </intent-filter>`\n`        </activity>`\n`        <receiver android:name=\"\
  MySMSMonitor\">`\n`          <intent-filter>`\n`            <action`\n`android:name=\"\
  android.provider.Telephony.SMS_RECEIVED\"/>`\n`          </intent-filter>`\n`        </receiver>`\n\
  \n`    </application>`\n`    <uses-sdk android:minSdkVersion=\"4\" />`\n\n`    <uses-permission\
  \ android:name=\"android.permission.SEND_SMS\"/>`\n`    <uses-permission android:name=\"\
  android.permission.RECEIVE_SMS\"/>`\n\n`</manifest>`\n\n`// This file is MySMSMonitor.java`\n\
  `import android.content.BroadcastReceiver;`\n`import android.content.Context;`\n\
  `import android.content.Intent;`\n`import android.telephony.SmsMessage;`\n`import\
  \ android.util.Log;`\n\n`public class MySMSMonitor extends BroadcastReceiver`\n\
  `{`\n`    private static final String ACTION =`\n`                \"android.provider.Telephony.SMS_RECEIVED\"\
  ;`\n`    @Override`\n`    public void onReceive(Context context, Intent intent)`\n\
  `    {`\n`        if(intent!=null && intent.getAction()!=null &&`\n`ACTION.compareToIgnoreCase(intent.getAction())==0)`\n\
  `        {`\n`            Object[]pduArray= (Object[]) intent.getExtras().get(\"\
  pdus\");`\n`            SmsMessage[] messages = new SmsMessage[pduArray.length];`\n\
  `            for (int i = 0; i<pduArray.length; i++) {`\n`                messages[i]\
  \ = SmsMessage.createFromPdu(`\n`(byte[])pduArray [i]);`\n`                Log.d(\"\
  MySMSMonitor\", \"From: \" +`\n`                        messages[i].getOriginatingAddress());`\n\
  `                Log.d(\"MySMSMonitor\", \"Msg: \" +`\n`                        messages[i].getMessageBody());`\n\
  `            }`\n`            Log.d(\"MySMSMonitor\",\"SMS Message Received.\");`\n\
  `        }`\n`    }`\n`}`\n\n\n\n\n\n清单 18-2 顶部是用于拦截短信的 `BroadcastReceiver` 的清单定义。短信监控类为\
  \ `MySMSMonitor`。该类实现了抽象的 `onReceive()` 方法，当短信到达时系统会调用此方法。测试该应用程序的一种方式是使用 Eclipse\
  \ 中的 “Emulator Control” 视图。在模拟器中运行该应用程序，然后依次进入 Window ![images](img/U001.jpg) Show\
  \ View ![images](img/U001.jpg) Other ![images](img/U001.jpg) Android ![images](img/U001.jpg)\
  \ Emulator Control。该用户界面允许你向模拟器发送数据，以模拟接收短信或电话。如图 18-2 所示，你可以通过填写 “Incoming number”\
  \ 字段并选择 SMS 单选按钮，向模拟器发送一条短信。接着，在 Message 字段中输入一些文本，然后点击 Send 按钮。这将向模拟器发送一条短信，并调用你的\
  \ `BroadcastReceiver` 的 `onReceive()` 方法。\n\n![images](img/1802.jpg)\n\n**图 18-2.**\
  \ *使用 Emulator Control UI 向模拟器发送短信*\n\n`onReceive()` 方法将拥有广播意图，该意图会在 `bundle` 属性中包含\
  \ `SmsMessage`。你可以通过调用 `intent.getExtras().get(\"pdus\")` 来提取 `SmsMessage`。此调用返回一个在协议描述单元（PDU）模式下定义的对象数组——这是一种表示短信的行业标准方式。然后你可以将这些\
  \ PDU 转换为 Android 的 `SmsMessage` 对象，如清单 18-2 所示。如你所见，你从意图中获取 PDU 作为一个对象数组。然后你构建一个大小与\
  \ PDU 数组相等的 `SmsMessage` 对象数组。最后，你遍历 PDU 数组，并通过调用 `SmsMessage.createFromPdu()` 从\
  \ PDU 创建 `SmsMessage` 对象。读取传入消息后的操作必须迅速。广播接收器在系统中具有高优先级，但其任务必须快速完成，并且它不会被放到前台供用户查看。因此，你的选择是有限的。你不应执行任何直接的\
  \ UI 工作。发布通知是可以的，就像启动 Service 以在此继续工作一样。一旦 `onReceive()` 方法完成，托管 `onReceive()` 方法的进程可能随时被杀死。启动\
  \ Service 是可以的，但绑定到 Service 则不行，因为那需要你的进程存在一段时间，而这可能不会发生。关于 `BroadcastReceiver`\
  \ 的更多信息，请参见第 14 章。\n\n现在，让我们继续讨论 SMS，看看如何处理各种 SMS 文件夹。\n\n### 使用 SMS 文件夹\n\n访问短信收件箱是另一个常见需求。要开始，你需要在清单文件中添加读取短信权限（`android.permission.READ_SMS`）。添加此权限使你能够从短信收件箱读取内容。\n\
  \n要读取短信，你需要在短信收件箱上执行查询，如清单 18-3 所示。\n\n**清单 18-3.** *显示来自短信收件箱的消息*\n\n```\n<?xml\
  \ version=\"1.0\" encoding=\"utf-8\"?>\n<!-- This file is /res/layout/sms_inbox.xml\
  \ -->\n<LinearLayout\n    android:orientation=\"vertical\"\n    android:layout_width=\"\
  fill_parent\"\n    android:layout_height=\"fill_parent\" >\n\n<TextView android:id=\"\
  @+id/row\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  fill_parent\"/>\n\n</LinearLayout>\n```\n\n```\n// This file is SMSInboxDemo.java\n\
  import android.app.ListActivity;\nimport android.database.Cursor;\nimport android.net.Uri;\n\
  import android.os.Bundle;\nimport android.widget.ListAdapter;\nimport android.widget.SimpleCursorAdapter;\n\
  \npublic class SMSInboxDemo extends ListActivity {\n\n    private ListAdapter adapter;\n\
  \    private static final Uri SMS_INBOX =\n            Uri.parse(\"content://sms/inbox\"\
  );\n\n    @Override\n    public void onCreate(Bundle bundle) {\n        super.onCreate(bundle);\n\
  \        Cursor c = getContentResolver()\n                .query(SMS_INBOX, null,\
  \ null, null, null);\n        startManagingCursor(c);\n        String[] columns\
  \ = new String[] { \"body\" };\n        int[] names = new int[] { R.id.row };\n\
  \        adapter = new SimpleCursorAdapter(this, R.layout.sms_inbox,\n         \
  \       c, columns, names);\n\n        setListAdapter(adapter);\n    }\n}\n```\n\
  \n清单 18-3 打开短信收件箱，并创建一个列表，其中每个列表项包含一条短信的正文部分。清单 18-3 的布局部分包含一个简单的 `TextView`，它将保存每个列表项中消息的正文。要获取短信列表，你创建一个指向短信收件箱的\
  \ URI（`content://sms/inbox`），然后执行一个简单查询。接着，你过滤短信的正文，并设置 `ListActivity` 的列表适配器。执行清单\
  \ 18-3 中的代码后，你将看到收件箱中的短信列表。在模拟器上运行代码之前，确保你使用 Emulator Control 生成了一些短信。\n\n由于你可以访问短信收件箱，想必你也可以访问其他与短信相关的文件夹，例如已发送或草稿文件夹。访问收件箱与其他文件夹的唯一区别在于你指定的\
  \ URI。例如，你可以通过对 `content://sms/sent` 执行查询来访问已发送文件夹。以下是短信文件夹的完整列表及其对应的 URI：\n\n*\
  \   *全部*: `content://sms/all`\n*   *收件箱*: `content://sms/inbox`\n*   *已发送*: `content://sms/sent`\n\
  *   *草稿*: `content://sms/draft`\n*   *发件箱*: `content://sms/outbox`\n*   *发送失败*:\
  \ `content://sms/failed`\n*   *已排队*: `content://sms/queued`\n*   *未送达*: `content://sms/undelivered`\n\
  *   *会话*: `content://sms/conversations`\n\nAndroid 将 MMS 和 SMS 结合起来，并允许你使用 `mms-sms`\
  \ 这个 AUTHORITY 同时访问两者的内容提供者。因此，你可以访问如下所示的 URI：\n\n```\ncontent://mms-sms/conversations\n\
  ```\n\n### 发送电子邮件\n\n现在你已经了解了如何在 Android 中发送短信，你可能会认为可以使用类似的 API 来发送电子邮件。不幸的是，Android\
  \ 没有提供用于发送电子邮件的 API。普遍的共识是，用户不希望应用程序在他们不知情的情况下代表他们开始发送电子邮件。相反，要发送电子邮件，你必须通过一个已注册的电子邮件应用程序。例如，你可以使用\
  \ `ACTION_SEND` 来启动电子邮件应用程序，如清单 18-4 所示。\n\n**清单 18-4.** *通过 Intent 启动电子邮件应用程序*\n\
  \n```\nIntent emailIntent=new Intent(Intent.ACTION_SEND);\n\nString subject = \"\
  Hi!\";\nString body = \"hello from android....\";\n\nString[] recipients = new String[]{\"\
  aaa@bbb.com\"};\nemailIntent.putExtra(Intent.EXTRA_EMAIL, recipients);\n\nemailIntent.putExtra(Intent.EXTRA_SUBJECT,\
  \ subject);\nemailIntent.putExtra(Intent.EXTRA_TEXT, body);\nemailIntent.setType(\"\
  message/rfc822\");\n\nstartActivity(emailIntent);\n```\n\n这段代码会启动默认的电子邮件应用程序，并让用户决定是否发送该邮件。可以添加到电子邮件意图中的其他\
  \ “extra” 包括 `EXTRA_CC` 和 `EXTRA_BCC`。\n\n假设你想在你的消息中发送一个电子邮件附件。为此，你需要使用类似下面的代码，其中\
  \ `Uri` 是对你想要作为附件的文件的引用：\n\n```\nemailIntent.putExtra(Intent.EXTRA_STREAM,\n   \
  \ Uri.fromFile(new File(myFileName)));\n```\n\n接下来，我们将讨论电话管理器。\n\n\n\n\n### 使用电话管理器\n\
  \n电话 API 还包含电话管理器（`android.telephony.TelephonyManager`），你可以用它获取设备上的电话服务信息、获取用户信息以及注册电话状态变化监听。一个常见的电话使用场景要求应用程序在来电时执行业务逻辑。例如，音乐播放器可能会在来电时暂停播放，并在通话结束后恢复播放。监听电话状态变化最简单的方法是，在`\"\
  android.intent.action.PHONE_STATE\"`上实现一个广播接收器。你可以采用与之前监听短信接收相同的方式来实现。另一种方法是使用`TelephonyManager`。在本节中，我们将向你展示如何注册电话状态变化监听以及如何检测来电。清单\
  \ 18–4 显示了具体细节。\n\n**清单 18–5.** *使用电话管理器*\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
  utf-8\"?>\n<!-- This file is res/layout/main.xml -->\n<LinearLayout\n    android:orientation=\"\
  vertical\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  fill_parent\"\n    >\n<Button\n    android:id=\"@+id/callBtn\"\n    android:layout_width=\"\
  wrap_content\"\n    android:layout_height=\"wrap_content\"\n    android:text=\"\
  Place Call\"\n    android:onClick=\"doClick\"\n    />\n<TextView\n    android:id=\"\
  @+id/textView\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  fill_parent\"\n    />\n</LinearLayout>\n```\n\n```java\n// This file is PhoneCallActivity.java\n\
  package com.androidbook.phonecall.demo;\n\nimport android.app.Activity;\nimport\
  \ android.content.Context;\nimport android.content.Intent;\nimport android.net.Uri;\n\
  import android.os.Bundle;\nimport android.telephony.PhoneStateListener;\nimport\
  \ android.telephony.TelephonyManager;\nimport android.view.View;\nimport android.widget.TextView;\n\
  \npublic class PhoneCallActivity extends Activity {\n    private TelephonyManager\
  \ teleMgr = null;\n    private MyPhoneStateListener myListener = null;\n    private\
  \ String logText = \"\";\n    private TextView tv;\n\n    @Override\n    protected\
  \ void onCreate(Bundle savedInstanceState)\n    {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n\n        tv = (TextView)findViewById(R.id.textView);\n\
  \n        teleMgr =\n                (TelephonyManager)getSystemService(Context.TELEPHONY_SERVICE);\n\
  \        myListener = new MyPhoneStateListener();\n    }\n\n    protected void onResume()\
  \ {\n        super.onResume();\n        teleMgr.listen(myListener, PhoneStateListener.LISTEN_CALL_STATE);\n\
  \    }\n\n    protected void onPause() {\n        super.onPause();\n        teleMgr.listen(myListener,\
  \ PhoneStateListener.LISTEN_NONE);\n    }\n\n    public void doClick(View target)\
  \ {\n        Intent intent = new Intent(Intent.ACTION_VIEW,\n                Uri.parse(\"\
  tel:5551212\"));\n        startActivity(intent);\n    }\n\n    class MyPhoneStateListener\
  \ extends PhoneStateListener\n    {\n        @Override\n        public void onCallStateChanged(int\
  \ state, String incomingNumber)\n        {\n            super.onCallStateChanged(state,\
  \ incomingNumber);\n\n            switch(state)\n            {\n               \
  \ case TelephonyManager.CALL_STATE_IDLE:\n                    logText = \"call state\
  \ idle...incoming number is[\"+\n                                incomingNumber+\"\
  ]\\n\" + logText;\n                    break;\n                case TelephonyManager.CALL_STATE_RINGING:\n\
  \                    logText = \"call state ringing...incoming number is[\"+\n \
  \                               incomingNumber+\"]\\n\" + logText;\n           \
  \         break;\n                case TelephonyManager.CALL_STATE_OFFHOOK:\n  \
  \                  logText = \"call state Offhook...incoming number is[\"+\n   \
  \                             incomingNumber+\"]\\n\" + logText;\n             \
  \       break;\n                default:\n                    logText = \"call state\
  \ [\"+state+\n                                \"]incoming number is[\"+\n      \
  \                          incomingNumber+\"]\\n\" + logText;\n                \
  \    break;\n            }\n            tv.setText(logText);\n        }\n    }\n\
  }\n```\n\n当使用电话管理器时，请务必在清单文件中添加 `android.permission.READ_PHONE_STATE` 权限，这样你才能访问电话状态信息。如清单\
  \ 18–5 所示，你通过实现 `PhoneStateListener` 并调用 `TelephonyManager` 的 `listen()` 方法来接收电话状态变化的通知。当有电话呼入或电话状态发生变化时，系统会调用你的\
  \ `PhoneStateListener` 的 `onCallStateChanged()` 方法，并传入新的状态。当你尝试运行此示例时，会发现来电号码仅在状态为\
  \ `CALL_STATE_RINGING` 时可用。在此示例中，我们将消息写入屏幕，但你的应用程序可以在该位置实现自定义的业务逻辑，例如暂停音频或视频的回放。要模拟来电，你可以使用\
  \ Eclipse 的模拟器控制界面，也就是你之前用来发送短信的那个界面（参见图 18–2），但需要选择“Voice”而不是“SMS”。\n\n请注意，我们在\
  \ `onPause()` 中告诉 `TelephonyManager` 停止向我们发送更新。当我们的活动被暂停时，关闭消息通知总是很重要的。否则，`TelephonyManager`\
  \ 可能会持有我们对象的引用，从而阻止其在后续被清理。\n\n此示例仅处理了可供监听的一种电话状态。请查看关于 `PhoneStateListener` 的文档以了解其他状态，例如\
  \ `LISTEN_MESSAGE_WAITING_INDICATOR`。在处理电话状态变化时，你可能还需要获取订阅者（用户）的电话号码。`TelephonyManager.getLine1Number()`\
  \ 将为你返回该信息。\n\n你可能想知道是否可以通过代码接听电话。遗憾的是，目前 Android SDK 并未提供实现此功能的方法，尽管文档暗示你可以通过 `ACTION_ANSWER`\
  \ 动作启动一个 Intent。在实践中，这种方法目前还不起作用，不过你可以查看自本文撰写以来此问题是否已得到修复。\n\n类似地，你可能希望通过代码拨出电话。在这方面，你会发现事情要简单得多。拨出电话最简单的方法是，通过如下代码使用\
  \ Intent 启动拨号应用：\n\n```java\nIntent intent = new Intent(Intent.ACTION_CALL, Uri.parse(\"\
  tel:5551212\"));\nstartActivity(intent);\n```\n\n请注意，要让这真正拨出电话，你的应用程序需要 `android.permission.CALL_PHONE`\
  \ 权限。否则，当你的应用程序尝试调用拨号应用时，会收到一个 `SecurityException`。要在没有此权限的情况下进行拨号，请将 Intent 的动作改为\
  \ `Intent.ACTION_VIEW`，这会导致拨号应用显示为你想要的电话号码，但用户需要按下“发送”按钮才能发起呼叫。\n\n在你的应用中处理电话功能时，需要牢记的另一件事是，其他应用程序很可能会响应来电并使你的活动暂停。在这种情况下，你将停止接收通知，不过当你的\
  \ `onResume()` 方法再次被调用并且你重新向 `TelephonyManager` 注册时，你会立即收到通知。在决定电话状态通知处理程序要执行的操作时，请为此做好准备。\n\
  \n\n\n### 会话发起协议 (SIP)\n\nAndroid 2.3（Gingerbread）在 `android.net.sip` 包中引入了新功能以支持\
  \ SIP。SIP 是互联网工程任务组（IETF）制定的标准，用于协调通过网络连接发送语音和视频，从而将人们连接在通话中。这项技术有时被称为网络电话（VoIP），但请注意，实现\
  \ VoIP 的方式不止一种。例如，Skype 使用专有协议实现其 VoIP，并且与 SIP 不兼容。SIP 也与 Google Voice 不同。截至撰写本文时，Google\
  \ Voice 并不直接支持 SIP，尽管有些方法可以将 Google Voice 与 SIP 提供商集成在一起。Google Voice 会为您设置一个新的电话号码，然后您可以将该号码与您家中的电话、工作电话或手机等其他电话关联。一些\
  \ SIP 提供商可以生成一个可用于 Google Voice 的电话号码，但在这种情况下，Google Voice 实际上并不知道该号码对应的是 SIP 账户。在互联网上搜索，您会发现相当多的\
  \ SIP 提供商，许多提供合理的通话费率，还有一些是免费的。\n\n需要注意的是，SIP 标准并不涉及通过网络传输音频和视频数据。SIP 仅负责建立和拆除设备之间的直接连接，以允许音频和视频数据流通。客户端计算机程序使用\
  \ SIP，以及音频和视频编解码器和其他库，来建立用户之间的通话。常与 SIP 通话有关的其他标准包括实时传输协议（RTP）、实时流协议（RTSP）和会话描述协议（SDP）。\n\
  \n用户可以通过台式计算机拨打 SIP 电话，而无需支付长途费用。该计算机程序同样可以轻松地在移动设备上运行，例如 Android 智能手机或平板电脑。SIP\
  \ 计算机程序通常被称为“软电话”。移动设备上的软电话的真正优势在于，当设备通过 Wi-Fi 连接到互联网时，用户无需消耗任何无线通话分钟数，但仍然能够拨打电话或接听来电。在接收端，软电话必须向\
  \ SIP 提供商注册其位置和功能，以便提供商的 SIP 服务器能够响应邀请请求，建立直接连接。如果接收方的软电话不可用，SIP 服务器可以将入站请求转接到语音邮箱等。\n\
  \nGoogle 提供了一个 SIP 演示应用程序，名为 `SipDemo`。现在，我们想与您一起探索这个应用程序，并帮助您理解其工作原理。如果您是 SIP 新手，某些方面可能不太明显。如果您想尝试使用\
  \ `SipDemo`，您可能需要一个支持 SIP 的实体 Android 设备。这是因为，截至撰写本文时，Android 模拟器不支持 SIP（就此而言，也不支持\
  \ Wi-Fi）。互联网上有些尝试让 SIP 在模拟器中工作，当您阅读本文时，其中一些方法可能已经易于实现且足够稳定。要使用 `SipDemo`，您还需要从 SIP\
  \ 提供商处获取一个 SIP 账户。您需要准备好您的 SIP ID、SIP 域名（或代理）以及您的 SIP 密码。这些信息将被填入 `SipDemo` 应用程序的偏好设置屏幕中，以供应用程序使用。最后，您的设备需要通过\
  \ Wi-Fi 连接到互联网。如果您不想在设备上实际尝试 `SipDemo`，您仍然应该能够理解本节的其余内容。`SipDemo` 的外观如图 18-3 所示。\n\
  \n![images](img/1803.jpg)\n\n**图 18-3.** *显示菜单的 SipDemo 应用程序*\n\n要将 `SipDemo` 作为新项目加载到\
  \ Eclipse 中，请使用“新建 Android 项目”向导，但点击“从现有示例创建项目”选项，在“构建目标”部分选择 Android 2.3 或更高版本，然后使用下拉菜单“示例”选择\
  \ `SipDemo`。点击“完成”，Eclipse 将为您创建新项目。您可以不对该项目做任何更改直接运行它，但如前所述，除非设备支持 SIP、启用了 Wi-Fi、您在某处拥有\
  \ SIP 账户、使用菜单按钮编辑了您的 SIP 信息，并使用菜单按钮发起通话，否则它不会做任何事情。您还需要另一个 SIP 账户来呼叫，以测试应用程序。按下屏幕上的大麦克风图标，您可以与对方通话。此演示应用程序也可以接听来电。现在，让我们来讨论\
  \ `android.net.sip` 包的内部工作原理。\n\n`android.net.sip` 包包含四个基本类：`SipManager`、`SipProfile`、`SipSession`\
  \ 和 `SipAudioCall`。`SipManager` 是这个包的核心，提供对其他 SIP 功能的访问。您调用 `SipManager` 的静态 `newInstance()`\
  \ 方法来获取一个 `SipManager` 对象。有了 `SipManager` 对象，您可以为大多数 SIP 活动获取 `SipSession`，或者为纯音频通话获取\
  \ `SipAudioCall`。这意味着 Google 在 `android.net.sip` 包中提供了超出标准 SIP 的功能，即建立音频通话的能力。\n\
  \n`SipProfile` 用于定义将相互通信的 SIP 账户。这并不直接指向最终用户的设备，而是指向 SIP 提供商处的 SIP 账户。服务器将协助处理建立实际连接所需的其余细节。\n\
  \n`SipSession` 是神奇发生的地方。设置会话包括您的 `SipProfile`，以便您的应用程序可以向您的 SIP 提供商服务器表明身份。您还需要传递一个\
  \ `SipSession.Listener` 实例，该实例将在事件发生时收到通知。一旦您设置了 `SipSession` 对象，您的应用程序就可以准备向另一个\
  \ `SipProfile` 发起呼叫，或接听来电。监听器有一系列回调函数，因此您的应用程序可以妥善处理会话状态的变化。\n\n自 Honeycomb 版本开始，最简单的方法是使用\
  \ `SipAudioCall`。所有的逻辑都已内置，用于将麦克风和扬声器连接到数据流，以便您可以与对方进行对话。`SipAudioCall` 提供了许多方法来管理静音、保持等。所有音频部分都已为您处理。除此之外，您还需要做更多工作。`SipSession`\
  \ 类具有 `makeCall()` 方法，用于发起出站呼叫。主要参数是会话描述（作为 `String`）。这正是需要更多工作的地方。构建会话描述需要根据前面提到的会话描述协议（SDP）进行格式化。理解收到的会话描述意味着根据\
  \ SDP 对其进行解析。SDP 的标准文档在此：`http://tools.ietf.org/html/rfc4566`，不幸的是，Android SDK 不提供任何对\
  \ SDP 的支持。感谢一些非常友好的人士，有几个免费的 Android SIP 应用程序已经构建了此功能。它们是 sipdroid (`http://code.google.com/p/sipdroid/`)\
  \ 和 csipsimple (`http://code.google.com/p/csipsimple/`)。\n\n我们甚至还没有开始讨论用于管理 SIP\
  \ 客户端之间视频流的编解码器，不过 sipdroid 具备此能力。SIP 的其他非常吸引人的方面包括建立两人以上电话会议的能力。这些主题超出了本书的范围，但我们希望您能理解\
  \ SIP 能为您做什么。\n\n请注意，SIP 应用程序至少需要 `android.permission.USE_SIP` 和 `android.permission.INTERNET`\
  \ 权限才能正常运行。如果您使用 `SipAudioCall`，还需要额外的权限。同时，建议您在 `AndroidManifest.xml` 文件中添加以下标签，作为\
  \ `<manifest>` 的子元素，这样您的应用程序将只能安装在具有 SIP 硬件支持的设备上：\n\n```\n<uses-feature android:name=\"\
  android.hardware.sip.voip\" />\n```\n\n\n\n### 总结\n\n在本章中，我们讨论了 Android 电话 API。具体来说，我们展示了如何发送短信、如何监控收到的短信，以及如何访问设备上的各种短信文件夹。我们介绍了`TelephonyManager`类。最后，我们概述了\
  \ Android 2.3 引入的会话发起协议（SIP）功能集。\n\n## 第 19 章：理解媒体框架\n\n现在，我们将探索 Android SDK 中一个非常有趣的部分：媒体框架。我们将向您展示如何从多种来源播放和录制音频及视频。我们还将介绍如何使用相机拍照。任何关于媒体的讨论，如果不解释安全数字（SD）卡以及如何操作它们，都将是不完整的，因为您通常需要频繁使用\
  \ SD 卡来读写媒体文件。\n\n### 使用媒体 API\n\nAndroid 支持在`android.media`包下播放音频和视频内容。在本章中，我们将探索这个包中的媒体\
  \ API。\n\n`android.media`包的核心是`android.media.MediaPlayer`类。`MediaPlayer`类负责播放音频和视频内容。此类的内容可以来自以下来源：\n\
  \n- **网络**：您可以通过 URL 播放网络上的内容。\n- **.apk 文件**：您可以播放作为`.apk`文件一部分打包的内容。您可以将媒体内容打包为资源或资产（位于`assets`文件夹内）。\n\
  - **SD 卡**：您可以播放存储在设备 SD 卡上的内容。\n\n`MediaPlayer`能够解码多种不同的内容格式，包括 3GPP（`.3gp`）、MP3（`.mp3`）、MIDI（`.mid`\
  \ 及其他）、OggVorbis（`.ogg`）、PCM/WAVE（`.wav`）和 MPEG-4（`.mp4`）。自 Android 3.0 起，还支持 HTTP\
  \ 实时流媒体和 M3U 播放列表。关于支持的媒体格式的完整列表，请访问 `http://developer.android.com/guide/appendix/media-formats.html`。\n\
  \n#### 使用 SD 卡\n\n在我们开始创建和使用不同类型的媒体之前，让我们看看如何操作 SD 卡。SD 卡用于 Android 手机存储大量用户数据，通常是图片、音频和视频等媒体内容。它们本质上是可插拔的内存芯片，即使在断电时也能保留数据。在真实手机上，SD\
  \ 卡插入内存插槽，设备可对其进行访问。许多设备只有一个插槽，并且通常不期望您更换 SD 卡。在某些设备上，您可以使用多张卡，在设备上切换使用，甚至可以在不同设备之间使用它们。幸运的是，Android\
  \ 模拟器可以使用您工作站硬盘上的空间来模拟 SD 卡，就像它是一个插入的 SD 卡一样。\n\n当您在第二章创建第一个 Android 虚拟设备（AVD）时，您指定了\
  \ SD 卡的大小，这使得应用程序在模拟器中运行时可以访问它。如果您查看创建的 AVD 目录，您会看到一个名为`sdcard.img`的文件，其文件大小与您指定的一致。我们当时并未使用\
  \ SD 卡，但本章将会用到。\n\n作为开发者，一旦您拥有了 SD 卡，就可以使用 Eclipse 中的 Android 工具将媒体文件（或任何其他文件）推送到\
  \ SD 卡。您也可以使用 Android 调试桥（`adb`）实用程序向 SD 卡推送或从中拉取文件。`adb`实用程序位于 Android SDK 的 `tools`\
  \ 子目录中；正如第二章所述，从工具窗口很容易访问它。\n\n您已经知道如何通过创建 AVD 来获取 SD 卡。当然，您可以创建多个 AVD，它们除了 SD 卡大小不同外，其他都一样。另一种方法是：Android\
  \ SDK 工具包包含一个名为 `mksdcard` 的实用程序，可以创建 SD 卡镜像。实际上，该实用程序会创建一个格式化文件用作 SD 卡。要使用此实用程序，首先找到或创建一个存放镜像文件的文件夹，例如\
  \ `c:\\Android\\sdcard\\`。然后打开一个工具窗口，并使用适当的 SD 卡镜像文件路径运行类似以下的命令：\n\n`mksdcard 256M\
  \ c:\\Android\\sdcard\\sdcard.img`\n\n此示例命令在 `c:\\Android\\sdcard\\` 创建一个名为 `sdcard.img`\
  \ 的 SD 卡镜像。SD 卡的大小为 256MB。要指定其他大小，可以使用 `K` 表示千字节，但 `G` 还不能用于表示吉字节，因此您需要指定 `1024M`\
  \ 的倍数来获得吉字节大小。您也可以直接指定一个代表总字节数的整数值。此外请注意，Android 模拟器无法使用低于 8MB 的 SD 卡大小。\n\nEclipse\
  \ 中的 Android 开发工具（ADT）提供了一种在启动模拟器时指定额外命令行参数的方法。要找到模拟器选项的字段，请转到 Eclipse 的“首选项”窗口，然后选择\
  \ Android → 启动。理论上，您可以在此处添加 `-sdcard \"您 SD 卡镜像文件的路径\"`，它将覆盖您 AVD 的 SD 卡文件路径。但自几个\
  \ Android 版本以来，这一直无效，您始终会使用与 AVD 一起创建的 SD 卡镜像文件。将单独的 SD 卡与您的 AVD 一同使用的最可靠方法是从命令行启动模拟器，并在那里指定要使用的\
  \ SD 卡镜像。在工具窗口内（关于如何打开工具窗口，请参阅第二章），以下命令会启动一个命名的 AVD，但使用指定的 SD 卡镜像文件，而不是随 AVD 创建的\
  \ SD 卡镜像文件：\n\n`emulator -avd AVDName -sdcard \"您 SD 卡镜像文件的路径\"`\n\n\n\n#### SD\
  \ 卡文件管理\n\n当您首次创建 SD 卡时，其上没有任何文件。您可以使用 Eclipse 中的 `File Explorer`（文件资源管理器）工具来添加文件。启动模拟器，等待其初始化完成。然后，在\
  \ Eclipse 中切换到 Java、调试或 DDMS 透视图，查找 `File Explorer`（文件资源管理器）选项卡，如图 19–1 所示。\n\n\
  ![images](img/1901.jpg)\n\n**图 19–1.** *文件资源管理器视图*\n\n如果未显示 `File Explorer`（文件资源管理器），您可以通过依次选择“窗口”![images](img/U001.jpg)“显示视图”![images](img/U001.jpg)“其他”![images](img/U001.jpg)“Android”，然后选择\
  \ `File Explorer`（文件资源管理器）来打开它。或者，您可以通过依次选择“窗口”![images](img/U001.jpg)“打开透视图”![images](img/U001.jpg)“其他”![images](img/U001.jpg)“DDMS”来显示\
  \ Dalvik 调试监视器服务 (DDMS) 透视图。默认情况下，`File Explorer`（文件资源管理器）视图位于 DDMS 透视图中。Eclipse\
  \ for Android 中可用视图的列表如图 19–2 所示。\n\n要将文件推送到 SD 卡，请在 `File Explorer`（文件资源管理器）中选择\
  \ `sdcard` 文件夹，然后选择指向手机样式的向右箭头按钮（位于右上角）。这将启动一个对话框，让您选择文件。选择您想要上传到 SD 卡的文件。附近的按钮看起来像一个指向软盘的向左箭头。在\
  \ `File Explorer`（文件资源管理器）中选择要拉取的文件后，选择此按钮即可将文件从设备复制到您的工作站。\n\n如果 `File Explorer`（文件资源管理器）显示空视图，可能是由于以下原因：模拟器未运行、Eclipse\
  \ 已与模拟器断开连接，或者您在模拟器中运行的 AVD 未在“设备”选项卡下选中。要打开“设备”选项卡，请按照与上述 `File Explorer`（文件资源管理器）相同的步骤操作。默认情况下，`Devices`（设备）选项卡也应在\
  \ DDMS 透视图中可用。\n\n![images](img/1902.jpg)\n\n**图 19–2.** *启用 Android 视图*\n\n####\
  \ 使用 `adb` 工具\n\n在 SD 卡之间移动文件的另一种方法是使用 `adb` 工具。要尝试此操作，请打开一个工具窗口，然后输入如下命令：\n\n```\n\
  adb push c:\\path_to_my_file\\filename /mnt/sdcard/newfile\n```\n\n这会将文件从您的工作站推送到\
  \ SD 卡。请注意，设备始终使用正斜杠来分隔目录。对于要推送的文件，请使用适合您工作站的目录分隔符，并为工作站上的文件使用适当的路径。相反，以下命令会将文件从\
  \ SD 卡拉取到您的工作站：\n\n```\nadb pull /mnt/sdcard/devicefile c:\\path_to_where_its_going\\\
  filename\n```\n\n此命令的一个优点在于，它会根据需要（无论是推送还是拉取）在任一方向上创建目录，以将文件传送到所需的目标位置。遗憾的是，您无法使用\
  \ `adb` 同时复制多个文件。您必须逐个处理每个文件。\n\n**注意：** 在 Android 2.2 之前，SD 卡通常位于 `/sdcard`。自 Android\
  \ 2.2 起，SD 卡通常位于 `/mnt/sdcard`，但为了向后兼容，存在一个名为 `/sdcard` 的符号链接指向 `/mnt/sdcard`。\n\
  \n#### `DCIM` 目录\n\n您可能已经注意到 SD 卡上有一个名为 `DCIM` 的目录。这是“数码相机图像”目录。将 `DCIM` 目录放置在用于存储数码图像的\
  \ SD 卡根目录下是一项行业标准。在 `DCIM` 目录下创建一个代表相机的目录（格式为 `123ABCDE`——三位数字后跟五位字母）也是一项行业标准。模拟器会在\
  \ `DCIM` 下创建一个名为 `100ANDRO` 的目录，但数码相机制造商和 Android 手机制造商可以随意命名此目录。模拟器（以及某些 Android\
  \ 手机）在 `DCIM` 目录下有一个名为 `Camera` 的目录，但这不符合标准。尽管如此，您可能会在 `Camera` 目录下找到图像文件，或在 `100ANDRO`\
  \ 目录下找到它们，或者可能在 `DCIM` 目录下找到其他存储图像文件的目录。\n\n遗憾的是，没有一种方法调用可以告知您 `DCIM` 目录下哪个子目录可能用于相机照片。不过，有几种方法可以告知您\
  \ SD 卡的顶层目录位置。第一种方法是`Environment.getExternalStorageDirectory()`，它返回一个代表 SD 卡顶级目录的\
  \ `File` 对象。在 Android 2.2 之前的设备上，这通常是 `/sdcard`，但并非所有设备都如此。对于 Android 2.2，大多数设备将具有\
  \ `/mnt/sdcard`。使用这种 `Environment` 方法比假设您知道 SD 卡根目录的名称要好得多。另一种方法我们将在下文描述。\n\n####\
  \ 自 Android 2.2（Froyo）起标准化的目录\n\n自 Android 2.2（又名 Froyo）起，`Environment` 类中提供了一些用于定位目录的新常量，并且该类中还新增了一个用于定位目录的方法。以前，SD\
  \ 卡有点混乱，除了 `DCIM` 之外没有标准化的目录名称。从 Froyo 开始，有了几个标准化的目录名称，如表 19-1 所述。第三列是模拟器中使用的目录名称，其中\
  \ SD 卡的顶层目录很可能是 `/mnt/sdcard`（可能因设备而异）。目录的差异性正是您应始终使用 `Environment` 方法来查找 SD 卡上所需目录的原因。\n\
  \n**表 19-1.** SD 卡的标准目录\n\n| **目录常量** | **描述** | **模拟器中相对于 SD 卡顶层的目录** |\n| ---\
  \ | --- | --- |\n| `DIRECTORY_ALARMS` | 当 Android 寻找用于闹钟的音频文件时，会在此标准目录中查找。 | `Alarms`\
  \ |\n| `DIRECTORY_DCIM` | 行业标准目录，用于查找使用相机拍摄的照片和视频。 | `DCIM` |\n| `DIRECTORY_DOWNLOADS`\
  \ | 用于存放用户已下载文件的标准目录。 | `Download`（注意：不是复数形式） |\n| `DIRECTORY_MOVIES` | 当 Android\
  \ 为用户寻找视频文件时，会在此标准目录中查找。 | `Movies` |\n| `DIRECTORY_MUSIC` | 当 Android 寻找供用户收听的常规音乐音频文件时，会在此标准目录中查找。\
  \ | `Music` |\n| `DIRECTORY_NOTIFICATIONS` | 当 Android 寻找用于通知的音频文件时，会在此标准目录中查找。\
  \ | `Notifications` |\n| `DIRECTORY_PICTURES` | 当 Android 寻找非相机拍摄的图像文件时，会在此标准目录中查找。\
  \ | `Pictures` |\n| `DIRECTORY_PODCASTS` | 当 Android 寻找用作播客的音频文件时，会在此标准目录中查找。 |\
  \ `Podcasts` |\n| `DIRECTORY_RINGTONES` | 当 Android 寻找用作铃声的音频文件时，会在此标准目录中查找。 | `Ringtones`\
  \ |\n\n\n\n#### 定位目录的新方法\n\n`Environment.getExternalStoragePublicDirectory(String\
  \ type)`是定位目录的新方法，其中`type`参数是表 19-1 中的常量之一。该方法返回一个`File`对象，代表所请求的目录。此方法在较旧的设备（早于\
  \ Froyo）上不存在，即使在新设备上，您也可能需要适应差异。例如，三星设备有两个 SD 卡，因此这些方法不足以确定这些设备上的所有外部存储。\n\n最后，关于安全性的一点说明。随着\
  \ Android SDK 1.6 的引入，您需要在清单文件中添加此权限，以便您的应用程序能够写入 SD 卡：\n\n`<uses-permission android:name=\"\
  android.permission.WRITE_EXTERNAL_STORAGE\" />`\n\n然而，为较旧 Android SDK 编写的应用程序无需请求此权限。这意味着，如果您的应用程序的`minSdkVersion`小于\
  \ 4（对应 Android SDK 1.6），则无需在`AndroidManifest.xml`文件中添加此标签，即使您在支持较新 Android SDK 的设备上运行也是如此。因此，在创建应用程序时，如果您选择\
  \ Android 1.6 或更高版本的构建目标（`minSdkVersion`为 4 或更高），并且希望能够写入 SD 卡，请确保将上述标签添加到清单文件中。如果您的构建目标是\
  \ Android 1.5，则不需要此标签。现在您已经了解了 SD 卡的基础知识，接下来让我们进入音频部分。\n\n### 播放媒体\n\n首先，我们将向您展示如何构建一个简单的应用程序，用于播放位于\
  \ Web 上的 MP3 文件（参见图 19-3）。之后，我们将讨论使用`MediaPlayer`类的`setDataSource()`方法从`.apk`文件或\
  \ SD 卡播放内容。`MediaPlayer`并不是播放音频的唯一方式，因此我们还将介绍`SoundPool`类，以及`JetPlayer`、`AsyncPlayer`，并在处理音频的最低层次上介绍`AudioTrack`类。接下来，我们将讨论`MediaPlayer`类的一些缺陷。最后，我们将介绍如何播放视频内容。\n\
  \n#### 播放音频内容\n\n图 19-3 展示了我们第一个示例的用户界面。此应用程序将演示`MediaPlayer`类的一些基本用法，例如启动、暂停、重新启动和停止媒体文件。查看应用程序用户界面的布局。\n\
