- "# 用于平板电脑及更多设备的 Fragment\n\n在本书这一章之前，我们涵盖了所有 Android 版本共有的主题。Android 从出现在商业设备上到\
  \ Android 平板电脑新时代的曙光，仅仅过了大约两年时间，这真是令人惊叹。Android 3.0 的 UI 被描述为从头为平板电脑设计。值得庆幸的是，这并不意味着你必须抛弃之前学到的所有知识并重新开始。事实上，你学到的*所有*知识都将帮助你为平板电脑编写\
  \ Android 应用程序。Android 3.0 带来了一套新的概念和特性，你必须掌握它们才能编写出充分利用 Android 平板电脑超大（xlarge）屏幕尺寸的应用。虽然在\
  \ Android 3.0 之前编写的大多数应用都能够在 Android 3.0 平板电脑上运行，但它们并未针对平板电脑进行优化。本章将开始介绍这些新概念和特性。\n\
  \nAndroid 3.0 中新增的核心类之一是 `Fragment` 类，它有许多衍生类。本章将向你介绍 fragment，它是什么，如何融入应用程序的体系结构，以及如何使用它。Fragment\
  \ 使得许多以前困难的有趣事情成为可能。同样有趣的是，你可以在旧版本的 Android 上使用 fragment，因为 Google 发布了一个适用于旧版 Android\
  \ 的 fragment SDK。因此，即使你对为平板电脑编写应用不感兴趣，你可能会发现 fragment 也能在非平板电脑设备上让你的工作更轻松。\n\n让我们开始学习\
  \ Android fragment 吧。\n\n\n\n### 什么是碎片？\n\n本节将首先解释什么是碎片及其作用。不过，我们得先铺陈一下背景，看看我们到底为什么需要碎片。正如你之前所学，在屏幕较小的设备上，Android\
  \ 应用使用活动（Activity）来向用户展示数据和功能，每个活动都有一个相当简单且明确的目的。例如，一个活动可能向用户展示其通讯录中的联系人列表。另一个活动可能允许用户撰写电子邮件。Android\
  \ 应用就是一系列这样的活动组合在一起，以实现更大的目标，比如通过阅读和发送消息来管理电子邮件账户。对于小屏幕设备来说，这没问题。但当用户的屏幕非常大（10 英寸或更大）时，屏幕上就有空间可以做更多事情，而不仅仅是单一功能。一个应用可能希望让用户既能查看收件箱中的邮件列表，同时又在另一个窗口中显示当前选中的邮件内容。或者，一个应用可能希望同时显示联系人列表和当前选中联系人的详细信息视图。\n\
  \n作为一名 Android 开发者，你知道可以通过为超大屏幕再定义一套包含 `ListView`、布局和其他各种视图的布局来实现此功能。而所谓“再定义一套布局”，是指在你可能已经为较小屏幕定义的布局之外，再额外增加布局。当然，你可能还想为竖屏和横屏分别设置不同的布局。并且，考虑到超大屏幕的尺寸，这意味着一大堆用于标签、字段、图片等的视图，你需要对它们进行布局并编写代码。如果能有一种方法将这些视图对象分组，并将它们的逻辑整合在一起，从而使应用的各个模块能在不同屏幕尺寸和设备间复用，最大限度地减少开发者维护应用所需的工作量，那该多好。这，就是我们拥有碎片的原因。\n\
  \n可以将碎片理解为一种子活动。事实上，碎片的语义与活动非常相似。碎片可以拥有与之关联的视图层次结构，并且它的生命周期与活动的生命周期非常相似。碎片甚至能像活动一样响应返回键。如果你曾想过，“要是能在平板的屏幕上同时放置多个活动就好了”，那么你的思路是对的。但因为在平板屏幕上同时激活应用的多个活动会过于混乱，所以碎片机制就是为了实现这一构想而创建的。这意味着碎片是被包含在活动之中的。碎片只能存在于活动的上下文中；没有活动，你就无法使用碎片。碎片可以与活动中的其他元素共存，这意味着你*不必*将活动的整个用户界面都转换为使用碎片。你可以像以前一样创建活动的布局，而只对用户界面的某个部分使用碎片。\n\
  \n然而，在保存状态和后续恢复状态方面，碎片与活动不同。碎片框架提供了若干特性，使得保存和恢复碎片比在活动上执行相同操作要简单得多。\n\n如何决定何时使用碎片取决于几个方面的考量，接下来会对此进行讨论。\n\
  \n### 何时使用碎片\n\n使用碎片的主要原因之一，就是能够在不同设备和屏幕尺寸间复用用户界面和功能模块。这在平板上尤其如此。想想看，当屏幕像平板那么大时，能发生多少事情？它更像是台式机而非手机，而你的许多桌面应用都有多窗格的用户界面。如前所述，你可以同时在屏幕上显示列表和选中项目的详情视图。在横屏模式下，列表在左、详情在右，这很容易想象。但如果用户将设备旋转到竖屏模式，屏幕就变得更高而不是更宽了呢？也许你会希望列表位于屏幕的上半部分，而详情位于下半部分。可如果这个应用运行在小屏幕上，根本没有空间同时显示这两部分呢？难道你不希望分别用于列表和详情的活动能够共享你为这些大屏幕模块构建的逻辑吗？我们希望你的回答是肯定的。碎片可以帮助实现这一点。\n\
  \n让我们回到旋转屏幕方向的例子。如果你曾不得不为活动的方向变化编写代码，你就会知道保存活动的当前状态并在活动重建后恢复状态是多么痛苦的一件事。如果你的活动中有一些模块能够在方向变化时轻松保留下来，从而避免每次方向变化时都进行全部销毁和重建，那该有多好？当然会很棒。碎片可以帮助实现这一点。\n\
  \n现在设想一下，用户正在你的活动中进行一些操作。假设用户界面在同一活动中发生了变化，而用户现在想后退一步、两步或三步。在旧式的活动中，按下返回键会使用户完全退出当前活动。而有了碎片，返回键可以在停留在当前活动的情况下，在碎片栈中逐步回退。\n\
  \n接下来，考虑一下活动的用户界面中某块主要内容发生改变的情况；你希望过渡看起来平滑流畅，就像一个精良的应用。碎片也能做到这一点。\n\n现在，你对碎片是什么以及为什么使用它有了基本概念，接下来让我们更深入地研究一下碎片的结构。\n\
  \n\n\n### 片段的结构\n\n如前所述，片段类似于子活动：它有相当明确的目的，并且几乎总是显示用户界面。但与活动继承自 `Context` 不同，片段继承自\
  \ `android.app` 包中的 `Object`。片段*并非*活动的扩展。不过，与活动类似，你总是需要继承 `Fragment`（或其子类），以便重写其行为。\n\
  \n片段可以拥有与用户交互的视图层次结构。这个视图层次结构与其他任何视图层次结构一样，可以通过 XML 布局文件创建（填充），也可以在代码中创建。若要用户可见，此视图层次结构需要附加到宿主活动的视图层次结构中，这一点稍后会讲到。构成片段视图层次结构的视图对象，与\
  \ Android 其他部分使用的视图类型相同。因此，你对视图的所有了解同样适用于片段。\n\n除了视图层次结构，片段还拥有一个用作其初始化参数的包。与活动类似，片段可以被系统保存，并在稍后自动恢复。当系统恢复片段时，它会调用默认构造函数（即无参数构造函数），然后将此参数包恢复到新创建的片段中。后续对片段的回调可以访问这些参数，并利用它们将片段恢复到之前的状态。因此，你务必做到以下几点：\n\
  \n-   确保你的片段类有一个默认构造函数。\n-   在创建新片段时立即添加参数包，以便后续方法能够正确设置片段，同时让系统在必要时能够正确恢复片段。\n\n\
  一个活动可以同时有多个片段在运行，如果一个片段被另一个片段替换，该片段切换事务可以被保存在返回栈中。返回栈由与活动关联的片段管理器管理。返回栈决定了返回按钮的行为。片段管理器将在本章后续部分讨论。这里你需要了解的是，片段知道它关联的是哪个活动，并可以通过该活动访问其片段管理器。片段还可以通过其活动访问活动的资源。\n\
  \n由于片段可以被管理，它拥有一些自身的标识信息，包括标签和 ID。这些标识符可用于稍后查找该片段，这有助于实现复用。\n\n与活动类似，当片段被重建时，片段可以将状态保存到包对象中，而此包对象会被传递回片段的\
  \ `onCreate()` 回调。这个保存的包也会传递给 `onInflate()`、`createView()` 和 `onActivityCreated()`。请注意，这个包与作为初始化参数附加的包不是同一个。此包通常用于存储片段的当前状态，而非用于初始化片段的值。\n\
  \n### 片段的生命周期\n\n在开始在示例应用中使用片段之前，你真的需要了解片段的生命周期。为什么？因为片段的生命周期比活动的生命周期更复杂，了解*何时*可以对片段进行操作非常重要。图\
  \ 29-1 展示了片段的生命周期。\n\n![images](img/2901.jpg)\n\n**图 29-1.** *片段的生命周期*\n\n如果将此图与图\
  \ 2-15（活动的生命周期）进行比较，你会注意到一些差异，这主要是由于活动与片段之间需要交互。片段高度依赖于其所在的宿主活动，并且可能在宿主活动经历一个步骤时，经历多个子步骤。\n\
  \n一开始，片段被实例化。此时它作为内存中的一个对象存在。接下来很可能发生的是，初始化参数被添加到你的片段对象中。当系统从保存状态重建片段时，情况尤其如此。当系统从保存状态恢复片段时，会调用默认构造函数，然后附加初始化参数包。如果你是手动创建片段，一个良好的模式是使用清单\
  \ 29-1 所示的方法，该方法在 `MyFragment` 类定义中展示了一种工厂类型的实例化器。\n\n**清单 29-1.** *使用静态工厂方法实例化片段*\n\
  \n```\npublic static MyFragment newInstance(int index) {\n    MyFragment f = new\
  \ MyFragment();\n    Bundle args = new Bundle();\n    args.putInt(\"index\", index);\n\
  \    f.setArguments(args);\n    return f;\n}\n```\n\n从客户端的角度来看，他们通过调用带有一个参数的静态 `newInstance()`\
  \ 方法来获取新实例。他们获得实例化后的对象，并且初始化参数已通过参数包设置到该片段上。如果此片段稍后被保存并重建，系统将经历一个非常相似的过程：调用默认构造函数，然后重新附加初始化参数。针对你的特定情况，你应该定义你的\
  \ `newInstance()` 方法（或多种方法）的签名，以接受适当数量和类型的参数，然后相应地构建参数包。这就是你的 `newInstance()` 方法需要做的全部工作。后续的回调会负责完成片段的其余设置。\n\
  \n#### `onInflate()` 回调\n\n下一个*可能*发生的事件是布局视图的填充。如果你的片段是由正在填充的布局中的 `<fragment>` 标签定义的（通常当活动为其主布局调用\
  \ `setContentView()` 时），那么你的片段会调用其 `onInflate()` 回调。该回调会传入一个包含 `<fragment>` 标签属性的\
  \ `AttributeSet`，以及一个保存的包。如果片段正在被重建，并且之前的状态保存在 `onSaveInstanceState()` 中，那么这个包就包含了已保存的状态值。`onInflate()`\
  \ 的预期用途是读取属性值并保存以供日后使用。在片段的这个阶段，实际操作用户界面还为时过早。片段甚至尚未与其活动关联。但这正是片段接下来将要发生的事件。\n\n\
  **注意：** 已提交缺陷 #14796，原因是关于 `onInflate()` 的文档与 Honeycomb 版本中的实际情况存在差异。文档说 `onInflate()`\
  \ 总是在 `onAttach()` 之前被调用。但实际上，在活动重启后，`onInflate()` 可能在 `onCreateView()` 之后才被调用。这对于将值设置到包中并调用\
  \ `setArguments()` 来说为时已晚。参见 [`http://code.google.com/p/android/issues/detail?id=14796`](http://code.google.com/p/android/issues/detail?id=14796)。这也是为什么\
  \ 图 29-1 的状态图中没有显示 `onInflate()` 的原因——很难预测此回调何时会被调用。\n\n\n\n#### 片段生命周期回调\n\n####\
  \ `onAttach()` 回调\n\n`onAttach()` 回调在片段与其 Activity 关联后被调用。如果您需要使用 Activity 引用，它会传递给您。您至少可以利用该\
  \ Activity 来查询有关其所属 Activity 的信息。您还可以将该 Activity 作为上下文来执行其他操作。需要注意的是，`Fragment`\
  \ 类有一个 `getActivity()` 方法，该方法会始终返回片段所附加到的 Activity（如果您需要的话）。请记住，在整个生命周期中，您都可以通过片段的\
  \ `getArguments()` 方法获取初始化参数包。但是，一旦片段附加到其 Activity 上，就不能再次调用 `setArguments()`。因此，除了在最开始时，您无法向初始化参数中添加内容。\n\
  \n#### `onCreate()` 回调\n\n接下来是 `onCreate()` 回调。虽然这与 Activity 的 `onCreate()` 类似，但区别在于，您不应在此处放置依赖于\
  \ Activity 视图层次结构存在的代码。虽然您的片段此时可能已与其 Activity 关联，但您尚未收到 Activity 的 `onCreate()`\
  \ 已完成的通知。这将在后续发生。如果有已保存的状态包，此回调会将其传递进来。此回调是创建后台线程以获取该片段所需数据的最早时机。您的片段代码运行在 UI 线程上，您不希望在该线程上执行磁盘\
  \ I/O 或网络访问。事实上，启动一个后台线程来准备数据是非常合理的。您的后台线程应该执行阻塞调用。您稍后需要与数据建立连接，但有多种方法可以实现。\n\n\
  **注意：** 在后台线程中加载数据的方法之一是使用 `Loader` 类。本书篇幅有限未能涵盖此内容，请查阅我们的网站以获取更多信息。\n\n#### `onCreateView()`\
  \ 回调\n\n下一个回调是 `onCreateView()`。这里期望您返回该片段的视图层次结构。传递给此回调的参数包括一个 `LayoutInflater`（您可以用它来为片段填充布局）、一个\
  \ `ViewGroup` 父容器（在清单 29–2 中称为 *container*），以及已保存的包（如果存在）。这里非常重要的一点是，您不应将视图层次结构附加到传入的\
  \ `ViewGroup` 父容器上。该关联将在稍后自动发生。提供父容器是为了让您可以将其与 `LayoutInflater` 的 `inflate()` 方法一起使用，尽管您也可以在必要时自行查询父容器。但如果您在此回调中将片段的视图层次结构附加到父容器上，很可能会遇到异常。清单\
  \ 29–2 展示了在此方法中您可能想要执行的操作示例。\n\n**清单 29–2.** *在 onCreateView() 中创建片段视图层次结构*\n\n\
  ```\n@Override\npublic View onCreateView(LayoutInflater inflater,\n            \
  \                   ViewGroup container, Bundle savedInstanceState) {\n        View\
  \ v = inflater.inflate(R.layout.details, container, false);\n        TextView text1\
  \ = (TextView) v.findViewById(R.id.text1);\n        text1.setText(myDataSet[ getPosition()\
  \ ] );\n        return v;\n}\n```\n\n在这里，您可以看到如何访问仅用于此片段的布局 XML 文件，并将其填充为一个视图，然后返回给调用方。这种方法有几个优点。您始终可以在代码中构建视图层次结构，但通过填充布局\
  \ XML 文件，您可以利用系统的资源查找逻辑。根据设备所处的配置或设备本身，系统会选择适当的布局 XML 文件。然后，您可以访问布局中的特定视图；在本例中，就是\
  \ `text1` `TextView` 字段，来对其进行所需操作。重复一个非常重要的要点：不要在此回调中将片段的视图附加到容器父对象上。您可以在清单 29–2\
  \ 中看到，您在调用 `inflate()` 时使用了容器，但同时也为 `attachToRoot` 参数传递了 `false`。\n\n#### `onActivityCreated()`\
  \ 回调\n\n您现在已接近用户可以与片段交互的阶段。下一个回调是 `onActivityCreated()`。这是在 Activity 完成其 `onCreate()`\
  \ 回调后调用的。现在您可以相信，Activity 的视图层次结构（包括您之前返回的片段视图层次结构）已经就绪并可用。这是您可以在用户看到用户界面之前对其进行最终调整的地方。如果此\
  \ Activity 及其片段是从已保存状态重新创建的，这一点尤其重要。此外，在此回调中，您可以确保此 Activity 的任何其他片段都已附加到您的 Activity\
  \ 上。\n\n#### `onStart()` 回调\n\n片段生命周期中的下一个回调是 `onStart()`。现在您的片段对用户可见。但您尚未开始与用户交互。此回调与\
  \ Activity 的 `onStart()` 相关联。因此，之前您可能将逻辑放在 Activity 的 `onStart()` 中，而现在更倾向于将逻辑放在片段的\
  \ `onStart()` 中，因为这也是用户界面组件所在的位置。\n\n#### `onResume()` 回调\n\n在用户可以与您的片段交互之前的最后一个回调是\
  \ `onResume()`。此回调与 Activity 的 `onResume()` 相关联。当此回调返回时，用户可以自由地与片段交互。例如，如果您的片段中有一个相机预览，您可能需要在片段的\
  \ `onResume()` 中启用它。\n\n至此，应用已进入让用户愉悦的状态。然后用户决定退出您的应用，无论是通过返回键、按下主页键，还是启动其他应用。下一个序列与\
  \ Activity 的情况类似，方向与设置片段以供交互相反。\n\n#### `onPause()` 回调\n\n片段上的第一个撤销回调是 `onPause()`。此回调与\
  \ Activity 的 `onPause()` 相关联；就像 Activity 一样，如果您的片段中有媒体播放器或其他共享对象，您可以通过 `onPause()`\
  \ 方法暂停、停止或释放它。同样适用“良好公民”规则：当用户正在接听电话时，您不希望播放音频。片段有可能从 `onPause()` 回到 `onResume()`。\n\
  \n#### `onStop()` 回调\n\n下一个撤销回调是 `onStop()`。此回调与 Activity 的 `onStop()` 相关联，并服务于与\
  \ Activity 的 `onStop()` 类似的目的。已停止的片段可以直接回到 `onStart()` 回调，然后进入 `onResume()`。\n\n\
  #### `onDestroyView()` 回调\n\n如果您的片段即将被销毁或保存，下一个撤销方向的回调是 `onDestroyView()`。这会在您之前在\
  \ `onCreateView()` 回调中创建的视图层次结构从片段中分离后被调用。\n\n#### `onDestroy()` 回调\n\n接下来是 `onDestroy()`。当片段不再被使用时调用此方法。请注意，它仍然附加到\
  \ Activity 并且仍然是“可查找的”，但做不了太多事情。\n\n#### `onDetach()` 回调\n\n片段生命周期中的最后一个回调是 `onDetach()`。一旦被调用，片段就不再与它的\
  \ Activity 绑定，不再拥有视图层次结构，并且其所有资源都应已被释放。\n\n\n\n### 使用 `setRetainInstance()`\n\n\
  你可能已经注意到 图 29–1 中的虚线。Fragment 的一个炫酷特性在于，你可以指定当 Activity 被重建时，不希望 Fragment 被完全销毁，因此你的\
  \ Fragment 也会随之恢复。为此，Fragment 提供了一个名为 `setRetainInstance()` 的方法，它接受一个布尔参数来告知系统：“是的，我希望我的\
  \ Activity 重启时你保留我的实例”或“不，请销毁它，我会从头创建一个新的 Fragment。”调用 `setRetainInstance()` 的最佳位置是在\
  \ Fragment 的 `onCreate()` 回调中。\n\n如果参数为 `true`，这意味着你希望将 Fragment 对象保留在内存中，而不是完全从头开始重建。然而，如果你的\
  \ Activity 即将销毁并重建，你仍需将 Fragment 从当前 Activity 分离，并重新附加到新的 Activity 上。关键在于，如果保留实例值为\
  \ `true`，你实际上不会销毁 Fragment 实例，因此也无需在另一端创建新的实例。不过，所有其他回调仍会被调用。图中的虚线表示，在销毁流程中你会跳过\
  \ `onDestroy()` 回调，而在 Fragment 重新附加到新 Activity 时，你会跳过 `onCreate()` 回调。由于 Activity\
  \ 很可能因配置变更而重建，你的 Fragment 回调应假定配置已发生变化，并据此采取适当措施。例如，这包括在 `onCreateView()` 中填充布局以创建新的视图层次结构。代码清单\
  \ 29–2 中提供的代码即可按此逻辑处理。如果你选择使用保留实例特性，你可能决定不在 `onCreate()` 中放置部分初始化逻辑，因为该回调并不像其他回调那样总会被调用。\n\
  \n### 展示生命周期的 Fragment 示例应用\n\n没有什么比看到真实示例更能理解一个概念了。你将创建一个经过插桩的示例应用，以便观察所有这些回调的实际运行。你将使用一个示例应用，其中一个\
  \ Fragment 显示莎士比亚剧作列表；当用户点击某个剧名时，该剧的部分文本会出现在另一个 Fragment 中。该示例应用可在平板电脑的横屏和竖屏模式下运行。然后，你将配置它以模拟小屏幕环境，从而学习如何将文本\
  \ Fragment 分离到单独的 Activity 中。你将先从横屏模式下的 Activity XML 布局开始，如 代码清单 29–3 所示，运行时界面将呈现为\
  \ 图 29–2。\n\n**注意：** 本章末尾提供了可用于下载本章项目的 URL，你可以在 Eclipse 中直接导入这些项目。\n\n**代码清单 29–3.**\
  \ *横屏模式下 Activity 的布局 XML*\n\n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n\
  <!-- 此文件为 res/layout-land/main.xml -->\n<LinearLayout\n        android:orientation=\"\
  horizontal\"\n        android:layout_width=\"match_parent\"\n        android:layout_height=\"\
  match_parent\">\n\n    <fragment class=\"com.androidbook.fragments.bard.TitlesFragment\"\
  \n            android:id=\"@+id/titles\" android:layout_weight=\"1\"\n         \
  \   android:layout_width=\"0px\"\n            android:layout_height=\"match_parent\"\
  \ />\n\n    <FrameLayout\n            android:id=\"@+id/details\" android:layout_weight=\"\
  2\"\n            android:layout_width=\"0px\"\n            android:layout_height=\"\
  match_parent\" />\n\n</LinearLayout>\n```\n\n![images](img/2902.jpg)\n\n**图 29–2.**\
  \ *示例 Fragment 应用的用户界面*\n\n这个布局与你在本书中见到的许多其他布局类似，水平从左到右排列两个主要对象。不过，这里有一个特殊的新标签 `<fragment>`，它有一个新属性\
  \ `class`。请记住，Fragment 并非视图，因此其布局 XML 与其他元素略有不同。另需注意，`<fragment>` 标签在此布局中仅充当占位符。你不应在布局\
  \ XML 文件中的 `<fragment>` 标签下放置子标签。\n\nFragment 的其他属性看起来类似，其用途也与视图中的属性相同。`<fragment>`\
  \ 标签的 `class` 属性指定了你的应用标题列表所对应的扩展类。即，你必须继承 Android 的某个 `Fragment` 类来实现你的逻辑，并且 `<fragment>`\
  \ 标签必须知道你的扩展类名称。Fragment 拥有自己的视图层次结构，该结构将在稍后由 Fragment 自身创建。接下来的标签是一个 `FrameLayout`，而不是另一个\
  \ `<fragment>` 标签。这是为什么？稍后我们会详细解释，但眼下你应该了解，你将对文本区域进行一些过渡操作，即用一个 Fragment 替换另一个。你使用\
  \ `FrameLayout` 作为视图容器来容纳当前的文本 Fragment。对于标题 Fragment，你只需关注一个（且仅一个）Fragment，无需替换或过渡。而对于显示莎士比亚文本的区域，你将拥有多个\
  \ Fragment。\n\n你的 `MainActivity` Java 代码如 代码清单 29–4 所示。\n\n**代码清单 29–4.** *MainActivity\
  \ 源代码*\n\n```\n// 此文件为 MainActivity.java\nimport android.app.Activity;\nimport android.app.Fragment;\n\
  import android.app.FragmentManager;\nimport android.app.FragmentTransaction;\nimport\
  \ android.content.Intent;\nimport android.content.res.Configuration;\nimport android.os.Bundle;\n\
  import android.os.Environment;\nimport android.util.Log;\n\npublic class MainActivity\
  \ extends Activity {\n    public static final String TAG = \"Shakespeare\";\n```\n\
  \n\n\n```\n@Override\npublic void onCreate(Bundle savedInstanceState) {\n    Log.v(TAG,\
  \ \"in MainActivity onCreate\");\n    super.onCreate(savedInstanceState);\n    FragmentManager.enableDebugLogging(true);\n\
  \    setContentView(R.layout.main);\n}\n\n@Override\npublic void onAttachFragment(Fragment\
  \ fragment) {\n    Log.v(TAG, \"in MainActivity onAttachFragment. fragment id =\
  \ \"\n            + fragment.getId());\n    super.onAttachFragment(fragment);\n\
  }\n\n@Override\npublic void onStart() {\n    Log.v(TAG, \"in MainActivity onStart\"\
  );\n    super.onStart();\n}\n\n@Override\npublic void onResume() {\n    Log.v(TAG,\
  \ \"in MainActivity onResume\");\n    super.onResume();\n}\n\n@Override\npublic\
  \ void onPause() {\n    Log.v(TAG, \"in MainActivity onPause\");\n    super.onPause();\n\
  }\n\n@Override\npublic void onStop() {\n    Log.v(TAG, \"in MainActivity onStop\"\
  );\n    super.onStop();\n}\n\n@Override\npublic void onSaveInstanceState(Bundle\
  \ outState) {\n    Log.v(MainActivity.TAG, \"in MainActivity onSaveInstanceState\"\
  );\n    super.onSaveInstanceState(outState);\n}\n\n@Override\npublic void onDestroy()\
  \ {\n    Log.v(TAG, \"in MainActivity onDestroy\");\n    super.onDestroy();\n}\n\
  \npublic boolean isMultiPane() {\n    return getResources().getConfiguration().orientation\n\
  \            == Configuration.ORIENTATION_LANDSCAPE;\n}\n\n/**\n * Helper function\
  \ to show the details of a selected item, either by\n * displaying a fragment in-place\
  \ in the current UI, or starting a\n * whole new activity in which it is displayed.\n\
  \ */\npublic void showDetails(int index) {\n    Log.v(TAG, \"in MainActivity showDetails(\"\
  \ + index + \")\");\n\n    if (isMultiPane()) {\n        // Check what fragment\
  \ is shown, replace if needed.\n        DetailsFragment details = (DetailsFragment)\n\
  \                getFragmentManager().findFragmentById(R.id.details);\n        if\
  \ (details == null || details.getShownIndex() != index) {\n            // Make new\
  \ fragment to show this selection.\n            details = DetailsFragment.newInstance(index);\n\
  \n            // Execute a transaction, replacing any existing\n            // fragment\
  \ with this one inside the frame.\n            Log.v(TAG, \"about to run FragmentTransaction...\"\
  );\n            FragmentTransaction ft\n                    = getFragmentManager().beginTransaction();\n\
  \            ft.setTransition(\n                    FragmentTransaction.TRANSIT_FRAGMENT_FADE);\n\
  \            //ft.addToBackStack(\"details\");\n            ft.replace(R.id.details,\
  \ details);\n            ft.commit();\n        }\n\n    } else {\n        // Otherwise\
  \ you need to launch a new activity to display\n        // the dialog fragment with\
  \ selected text.\n        Intent intent = new Intent();\n        intent.setClass(this,\
  \ DetailsActivity.class);\n        intent.putExtra(\"index\", index);\n        startActivity(intent);\n\
  \    }\n}\n```\n\n这是一个非常简单的 activity 写法。源代码中包含大多数回调的唯一原因是为了加入日志消息。否则，你只需要 `onCreate()`\
  \ 以及辅助方法 `isMultiPane()` 和 `showDetails()`。而且你的 `onCreate()` 已经不能再简单了。它所做的就是启用片段管理器调试，并将内容视图设置为清单\
  \ 29–3 中的布局。要确定多窗格模式（即，是否需要并排使用片段），只需使用设备的朝向即可。如果是横屏模式，则是多窗格；如果是竖屏模式，则不是。最后，辅助方法\
  \ `showDetails()` 用于确定在选中标题时如何显示文本。索引就是该标题在标题列表中的位置。如果处于多窗格模式，你将使用一个片段来显示文本。你把这个片段称为\
  \ `DetailsFragment`，并使用一个工厂类型的方法创建一个带有该索引的实例。`DetailsFragment` 类的代码显示在清单 29–5 中。稍后你会回到你的\
  \ `showDetails()` 方法。\n\n**清单 29–5.** *DetailsFragment 的源代码*\n\n```\nimport android.app.Activity;\n\
  import android.app.Fragment;\nimport android.os.Bundle;\nimport android.util.AttributeSet;\n\
  import android.util.Log;\nimport android.view.LayoutInflater;\nimport android.view.View;\n\
  import android.view.ViewGroup;\nimport android.widget.TextView;\n\npublic class\
  \ DetailsFragment extends Fragment {\n\n    private int mIndex = 0;\n\n    public\
  \ static DetailsFragment newInstance(int index) {\n        Log.v(MainActivity.TAG,\
  \ \"in DetailsFragment newInstance(\" +\n                                 index\
  \ + \")\");\n\n        DetailsFragment df = new DetailsFragment();\n\n        //\
  \ Supply index input as an argument.\n        Bundle args = new Bundle();\n    \
  \    args.putInt(\"index\", index);\n        df.setArguments(args);\n        return\
  \ df;\n    }\n\n    public static DetailsFragment newInstance(Bundle bundle) {\n\
  \        int index = bundle.getInt(\"index\", 0);\n        return newInstance(index);\n\
  \    }\n\n    @Override\n    public void onInflate(AttributeSet attrs, Bundle savedInstanceState)\n\
  \    {\n        Log.v(MainActivity.TAG,\n                \"in DetailsFragment onInflate.\
  \ AttributeSet contains:\");\n        for(int i=0; i<attrs.getAttributeCount();\
  \ i++)\n            Log.v(MainActivity.TAG, \"    \" + attrs.getAttributeName(i)\
  \ +\n                    \" = \" + attrs.getAttributeValue(i));\n        super.onInflate(attrs,\
  \ savedInstanceState);\n    }\n\n    @Override\n    public void onAttach(Activity\
  \ myActivity) {\n        Log.v(MainActivity.TAG,\n                \"in DetailsFragment\
  \ onAttach; activity is: \" +\n                myActivity);\n        super.onAttach(myActivity);\n\
  \    }\n\n    @Override\n    public void onCreate(Bundle myBundle) {\n        Log.v(MainActivity.TAG,\n\
  \                \"in DetailsFragment onCreate. Bundle contains:\");\n        if(myBundle\
  \ != null) {\n            for(String key : myBundle.keySet()) {\n              \
  \  Log.v(MainActivity.TAG, \"    \" + key);\n            }\n        }\n        else\
  \ {\n            Log.v(MainActivity.TAG, \"    myBundle is null\");\n        }\n\
  \        super.onCreate(myBundle);\n\n        mIndex = getArguments().getInt(\"\
  index\", 0);\n    }\n\n    public int getShownIndex() {\n        return mIndex;\n\
  \    }\n\n    @Override\n    public View onCreateView(LayoutInflater inflater,\n\
  \            ViewGroup container, Bundle savedInstanceState) {\n        Log.v(MainActivity.TAG,\n\
  \                \"in DetailsFragment onCreateView. container = \" +\n         \
  \       container);\n```\n\n\n\n```java\n        // 不要通过 inflater 将此片段绑定到任何内容。\n\
