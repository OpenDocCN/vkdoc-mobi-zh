  \        mFTextureBuffer.put(0.5f); //x 或 s\n        mFTextureBuffer.put(0.5f);\
  \ //y 或 t\n```\n\n\n\n```java\nint totalPuts = 2;\nfor (int i = 0; i < sides; i++)\
