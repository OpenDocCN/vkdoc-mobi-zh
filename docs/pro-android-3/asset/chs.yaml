  \n您可以通过查看 QSB 的标签\n以及 QSB 中的提示来了解其本地性质。两者\n都来自搜索元数据。\n\n一旦您单击查询图标，它将把您\n带到本地搜索 Activity。\n\
  </string>\n<!--\n**************************************************\n* 其他值\n**************************************************\n\
