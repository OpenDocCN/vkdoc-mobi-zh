  >本地搜索演示提示</string>\n</resources>\n```\n\n与 Android 清单文件一样，这个单一的 `strings.xml` 服务于本项目中的所有\
  \ Activity。您可以看到，`strings.xml` 中名为 `regular_activity` 的字符串常量指向您将在常规 Activity 上看到的文本。\n\
  \n\n\n为了辅助常规活动的编译，现在介绍清单 23–5 中的菜单资源文件。尽管该菜单文件包含其他尚未引入的活动的菜单项，但这不会影响编译，并有助于编译清单\
  \ 23–1 中的常规活动。\n\n**清单 23–5.** *常规活动菜单文件*\n\n```xml\n<!-- filename: /res/menu/main_menu.xml\
  \ -->\n<!-- This group uses the default category. -->\n<menu>\n    <group android:id=\"\
  @+id/menuGroup_Main\">\n        <item android:id=\"@+id/mid_no_search\"\n      \
  \      android:title=\"No Search Activity\" />\n        <item android:id=\"@+id/mid_local_search\"\
