  \ C2-Last\nEND:VCARD\n```\n\n#### 各种联系人数据类型\n\n到目前为止的图中，您已经了解了如何为联系人添加不同的信息集。代码清单\
  \ 27–4 显示了 API 中定义的这些数据类型列表（此列表可能会随着新版本的增长而增加，当前版本为 2.3）。\n\n**代码清单 27–4.** *标准联系人数据类型*\n\
  \n```\nemail\nevent\ngroupmemebership\nim\nnickname\nnote\norganization\nphone\n\
  photo\nrelation\nSipAddress\nstructuredname\nstructuredpostal\nwebsite\n```\n\n\
  每种数据类型，例如 `email` 或 `structuredpostal`（表示邮寄地址），都有自己的一组字段。那么，如何知道这些字段是什么？它们定义在 `android.provider.ContactsContract.CommonDataKinds`\
  \ 中提供的辅助类中。\n\n此类的 URL 是\n[`http://developer.android.com/reference/android/provider/ContactsContract.CommonDataKinds.html`](http://developer.android.com/reference/android/provider/ContactsContract.CommonDataKinds.html)。\n\
  \n例如，类 `CommonDataKinds.Email` 定义了代码清单 27–5 中所示的字段。\n\n**代码清单 27–5.** *电子邮件联系人的特定字段*\n\
  \n```\n电子邮件地址\n电子邮件类型：type_home、type_work、type_other、type_mobile\n标签：用于支持 type_other\n\
  ```\n\n现在您已经掌握了处理账户和联系人所需的背景知识和工具，让我们深入了解联系人 API 的真正细节。\n\n### 理解联系人\n\n正如我们所说，联系人归账户所有。每个账户都有自己的一组联系人。然后，每个联系人都有自己的一组数据元素（例如，电子邮件地址、电话号码、姓名和邮寄地址）。此外，Android\
  \ 通过只列出一次看似匹配的联系人，来呈现原始联系人的聚合视图。这些聚合的联系人构成了您打开联系人应用时看到的联系人集合（请参阅图 27–8）。\n\n现在我们将研究联系人相关数据如何存储在各个表中。理解这些联系人表及其关联的视图是理解联系人\
  \ API 的关键。\n\n\n#### 检查 SQLite 数据库内容\n\n要理解并检查内容数据库表，一种方法是从设备或模拟器下载内容数据库，然后使用 SQLite\
  \ 探查工具打开它。\n\n若要下载联系人数据库，请使用 图 27-14 所示的文件浏览器，导航至模拟器上的以下目录：\n\n`/data/data/com.android.providers.contacts/databases`\n\
  \n根据版本不同，数据库文件名可能略有差异，但其名称应为 `contacts.db` 或 `contacts2.db` 之类的命名。\n\n理论上，你只需用 SQLite\
  \ 工具打开即可。然而，我们在打开此数据库时遇到了一个问题。我们尝试过的大多数工具都“报错”了（形象地说）。问题在于 Android 为诸如比较电话号码等功能所定义的**自定义排序序列**。\n\
  \n显然，对于 SQLite 而言，自定义排序序列是作为 SQLite 发行版的一部分编译的。如果你没有随 Android 发行版编译的 DLL 文件，通用探查工具将无法准确读取该数据库。因为这些工具使用的是\
  \ Windows 版的 SQLite DLL 文件来打开由 Android 的 Linux 发行版创建的数据库，所以它们无法成功运行。而且，Windows 版的\
  \ SQLite 发行版并不包含联系人数据库所要求的那些排序序列。\n\n不过，我们比较幸运，一个名为 SQLite Explorer 的程序存在一个小“缺陷”，使得我们即使无法获取该数据库的模式定义，也能浏览其表结构。你或许可以借助其他更昂贵的工具获得更好的效果。如果你想探索更多选项，这里有一个链接，可以查看\
  \ SQLite 的可用工具列表：\n\n`http://www.sqlite.org/cvstrac/wiki?p=ManagementTools`\n\n\
  如果你真的很好奇，可以阅读我们研究文章《探索联系人数据库》中关于排序序列的更多内容，该文章位于 [`http://www.androidbook.com/item/3582`](http://www.androidbook.com/item/3582)。\n\
  \n如果在探索数据库时遇到困难，也不必灰心，因为我们在本章中列出了所有重要的表。接下来，我们将首先开始探索所谓的原始联系人。\n\n#### 原始联系人\n\n\
  再次说明，我们在打开联系人应用时看到的联系人被称为聚合联系人。每个聚合联系人之下都隐藏着一组称为原始联系人的联系人。聚合联系人仅仅是对一组相似原始联系人的一种视图。要理解聚合联系人，必须先了解原始联系人和属于原始联系人的数据。因此，我们将首先讨论原始联系人。\n\
  \n属于某个账户的联系人集合实际上被称为原始联系人。每个原始联系人指向你在此账户上下文中认识的某个人的详细信息。这与聚合联系人形成对比，后者跨越了账户边界，最终归属于整个设备。\n\
  \n账户与其原始联系人集合之间的关系维护在原始联系人表中。列表 27-6 展示了联系人数据库中原始联系人表的结构。\n\n**列表 27-6.** *原始联系人表定义*\n\
  \n```\nCREATE TABLE raw_contacts\n(_id INTEGER PRIMARY KEY AUTOINCREMENT,\nis_restricted\
  \ INTEGER DEFAULT 0,\naccount_name STRING DEFAULT NULL,\naccount_type STRING DEFAULT\
  \ NULL,\nsourceid TEXT,\nversion INTEGER NOT NULL DEFAULT 1,\ndirty INTEGER NOT\
  \ NULL DEFAULT 0,\ndeleted INTEGER NOT NULL DEFAULT 0,\ncontact_id INTEGER REFERENCES\
  \ contacts(_id),\naggregation_mode INTEGER NOT NULL DEFAULT 0,\naggregation_needed\
  \ INTEGER NOT NULL DEFAULT 1,\ncustom_ringtone TEXT,\nsend_to_voicemail INTEGER\
  \ NOT NULL DEFAULT 0,\ntimes_contacted INTEGER NOT NULL DEFAULT 0,\nlast_time_contacted\
  \ INTEGER,\nstarred INTEGER NOT NULL DEFAULT 0,\ndisplay_name TEXT,\ndisplay_name_alt\
  \ TEXT,\ndisplay_name_source INTEGER NOT NULL DEFAULT 0,\nphonetic_name TEXT,\n\
  phonetic_name_style TEXT,\nsort_key TEXT COLLATE PHONEBOOK,\nsort_key_alt TEXT COLLATE\
  \ PHONEBOOK,\nname_verified INTEGER NOT NULL DEFAULT 0,\ncontact_in_visible_group\
  \ INTEGER NOT NULL DEFAULT 0,\nsync1 TEXT, sync2 TEXT, sync3 TEXT, sync4 TEXT)\n\
  ```\n\n重要的字段已高亮显示。与每个其他 Android 表一样，原始联系人表具有 `_ID` 列，用于唯一标识一个原始联系人。`account_name`\
  \ 和 `account_type` 字段共同标识该联系人（具体来说是原始联系人）所属的账户。`sourceid` 字段表示此原始联系人如何被 account_name\
  \ 和 account_type 字段所标识的账户唯一识别。例如，假设你需要知道一个原始联系人 ID 在 Google 电子邮件账户中是如何被识别的。通常，在这种情况下，该字段会包含用户的电子邮件\
  \ ID。\n\n`contact_id` 字段指向此原始联系人从属于的聚合联系人。一个聚合联系人指向一个或多个相似的联系人，这些联系人本质上是同一个人，但设置在多个账户中。\n\
  \n`display_name` 字段指向联系人的显示名称。这主要是一个只读字段。它由触发器根据为此原始联系人添加的数据表中的数据行来设置（数据表将在下一小节中介绍）。\n\
  \n`sync` 字段供账户用于在设备与服务器端账户（如 Gmail）之间同步联系人。\n\n虽然我们使用 SQLite 工具来探索这些字段，但发现这些字段的方法不止一种。推荐的方法是遵循\
  \ `ContactsContract` API 中声明的类定义。要探索属于原始联系人的列，你可以查看 `ContactsContract.RawContact`\
  \ 的类文档。\n\n这种方法有利有弊。一个显著的优点是，你可以了解 Android SDK 已发布并承认的字段。数据库列可能会在不改变公共接口的情况下被添加或删除。因此，如果你直接使用数据库列，它们可能存在也可能不存在。相反，如果你使用这些列的公共定义，那么在不同版本之间你都是安全的。\n\
  \n然而，一个缺点是，类文档中夹杂了许多其他常量和列名，以至于我们都有点搞不清哪个是哪个了。这些众多的类定义给人的印象是该 API 非常复杂，但实际上，联系人\
  \ API 的类文档中 80% 的内容都是为了定义这些列的常量以及访问这些行的 URI。\n\n在后面的章节中，当我们实际使用联系人 API 时，我们将使用基于类文档的常量，而不是直接的列名。不过，我们认为直接探索表结构是最快帮助你理解联系人\
  \ API 的方法。\n\n接下来，我们讨论如何存储与联系人相关的数据，例如电子邮件和电话号码。\n\n\n\n### 数据表\n\n从原始联系人表的定义可以看出，原始联系人（从反高潮的意义上讲）只是一个指示其所属账户的\
  \ ID。与联系人相关的大部分数据并不保存在原始联系人表中，而是保存在数据表中。每个数据元素（例如电子邮件和电话号码）都作为单独的行存储在数据表中。所有这些相关的数据行都通过原始联系人\
  \ ID 与原始联系人关联，该 ID 既是数据表的列之一，也是原始联系人表的主 ID。\n\n此数据表包含 16 个通用列，可以存储任何给定数据元素（如电子邮件）的任意\
  \ 16 个不同数据点。清单 27–7 描述了数据表的组织方式。\n\n**清单 27–7.** *联系人数据表定义*\n\n```\nCREATE TABLE\
  \ data\n(_id INTEGER PRIMARY KEY AUTOINCREMENT,\npackage_id INTEGER REFERENCES package(_id),\n\
  mimetype_id INTEGER REFERENCES mimetype(_id) NOT NULL,\nraw_contact_id INTEGER REFERENCES\
  \ raw_contacts(_id) NOT NULL,\nis_primary INTEGER NOT NULL DEFAULT 0,\nis_super_primary\
  \ INTEGER NOT NULL DEFAULT 0,\ndata_version INTEGER NOT NULL DEFAULT 0,\ndata1 TEXT,data2\
  \ TEXT,data3 TEXT,data4 TEXT,data5 TEXT,\ndata6 TEXT,data7 TEXT,data8 TEXT,data9\
  \ TEXT,data10 TEXT,\ndata11 TEXT,data12 TEXT,data13 TEXT,data14 TEXT,data15 TEXT,\n\
  data_sync1 TEXT, data_sync2 TEXT, data_sync3 TEXT, data_sync4 TEXT )\n```\n\n清单\
  \ 27–7 中数据表的关键列已加粗。正如您可能预料到的，`raw_contact_id` 指向该数据行所属的原始联系人。\n\n`mimetype_id` 指向\
  \ MIME 类型条目，该条目指示清单 27–4 中确定的联系人数据类型之一。列 `data1` 到 `data15` 是通用的基于字符串的表，可以存储基于 MIME\
  \ 类型所需的任何内容。同样，同步字段用于支持联系人同步。解析 MIME 类型 ID 的表在清单 27–8 中。\n\n**清单 27–8.** *MIME 类型查找表定义*\n\
  \n```\nCREATE TABLE mimetypes\n(_id INTEGER PRIMARY KEY AUTOINCREMENT,\nmimetype\
  \ TEXT NOT NULL)\n```\n\n与原始联系人表一样，您可以通过 `ContactsContract.Data` 的辅助类文档来了解数据表的列。\n\
  \n尽管您可以从这个类定义中找出列，但您不会知道通用列 `data1` 到 `data15` 中每个列存储的内容。要了解这一点，您需要查看 `ContactsContract.CommonDataKinds`\
  \ 命名空间下多个类的定义。\n\n以下是这些类的一些示例：\n\n- `ContactsContract.CommonDataKinds.Email`\n-\
  \ `ContactsContract.CommonDataKinds.Phone`\n\n实际上，对于清单 27–4 中列出的每个常见数据类型，您都会看到一个对应的类。最终，所有\
  \ `CommonDataKinds` 类所做的就是指明哪些通用数据字段（`data1` 到 `data15`）正在被使用以及它们的用途。\n\n### 聚合联系人\n\
  \n最终，联系人及其相关数据被明确地存储在原始联系人表和数据表中。另一方面，聚合联系人本质上更具启发式特征，可能有些模棱两可。\n\n当多个账户之间存在相同的联系人时，您可能希望看到一个名称，而不是每个账户重复显示相同或相似的名称。Android\
  \ 通过将联系人聚合到一个只读视图中来解决这个问题。Android 将这些聚合后的联系人存储在一个名为 contacts 的表中。Android 使用原始联系人表和数据表上的多个触发器来填充或更改这个聚合联系人表。\n\
  \n在解释聚合逻辑之前，我们先展示联系人表的定义（参见清单 27–9）。\n\n**清单 27–9.** *聚合联系人表定义*\n\n```\nCREATE TABLE\
  \ contacts\n(_ id INTEGER PRIMARY KEY AUTOINCREMENT,\nname_raw_contact_id INTEGER\
  \ REFERENCES raw_contacts(_id),\nphoto_id INTEGER REFERENCES data(_id),\ncustom_ringtone\
  \ TEXT,\nsend_to_voicemail INTEGER NOT NULL DEFAULT 0,\ntimes_contacted INTEGER\
  \ NOT NULL DEFAULT 0,\nlast_time_contacted INTEGER,\nstarred INTEGER NOT NULL DEFAULT\
  \ 0,\nin_visible_group INTEGER NOT NULL DEFAULT 1,\nhas_phone_number INTEGER NOT\
  \ NULL DEFAULT 0,\nlookup TEXT,\nstatus_update_id INTEGER REFERENCES data(_id),\n\
  single_is_restricted INTEGER NOT NULL DEFAULT 0)\n```\n\n重要的列已突出显示。没有客户端直接更新此表。当添加一个原始联系人及其附带详细信息时，Android\
  \ 会搜索其他原始联系人，看是否存在类似的原始联系人。如果存在，它就会将该原始联系人的聚合联系人 ID 也用作新原始联系人的聚合联系人 ID。不会向聚合联系人表中插入条目。如果未找到，它将创建一个聚合联系人，并将该聚合联系人\
  \ ID 用作该原始联系人的联系人 ID。\n\nAndroid 使用以下算法来确定哪些原始联系人是相似的：\n\n1.  两个原始联系人具有匹配的名称。\n\
  2.  名称中的单词相同但顺序不同：“名 姓”或“名，姓”或“姓，名”。\n3.  名称的较短版本匹配，例如“Bob”对应“Robert”。\n4.  如果某个原始联系人只有名或姓，则会触发对其他属性（如电话号码或电子邮件）的搜索，如果其他属性匹配，则这些联系人将被聚合。\n\
  5.  如果某个原始联系人完全没有名称，也会触发对步骤 4 中所述其他属性的搜索。\n\n由于这些规则是启发式的，某些联系人可能会被意外聚合。在这种情况下，客户端应用程序需要提供一种机制来分离联系人。如果您参考《*Android\
  \ 用户指南*》，您将看到默认的联系人应用程序允许您分离被意外合并的联系人。\n\n您也可以在插入原始联系人时设置聚合模式来阻止聚合。清单 27–10 显示了可用的聚合模式。\n\
  \n**清单 27–10.** *聚合模式常量*\n\n```\nAGGREGATION_MODE_DEFAULT\nAGGREGATION_MODE_DISABLED\n\
  AGGREGATION_MODE_SUSPENDED\n```\n\n第一个选项显而易见，它描述了聚合的工作方式。\n\n第二个选项（`disabled`）表示禁止此原始联系人参与聚合。即使它已经被聚合，Android\
  \ 也会将其从聚合中分离出来，并为此原始联系人分配一个新的专用聚合联系人 ID。\n\n第三个选项 `suspended` 表示，即使联系人的属性可能会发生变化，从而导致其不再满足与该聚合批次中的联系人聚合的条件，也仍然保持它与该聚合联系人的关联。\n\
  \n\n\n最后一点引出了聚合联系人的易变性。假设你有一条唯一的原始联系人，包含名字和姓氏。目前，它不匹配任何其他原始联系人，因此这条唯一的原始联系人会获得自己的聚合联系人分配。聚合联系人\
  \ ID 将存储在原始联系人表中，与该原始联系人行对应。\n\n然而，如果你更改了此原始联系人的姓氏，使其与另一组已聚合的联系人匹配。在这种情况下，它会将此原始联系人从当前聚合联系人中移除，并移动到另一个聚合联系人中，从而废弃这单个聚合联系人。此时，聚合联系人的\
  \ ID 被完全废弃，因为未来它不会匹配任何内容，它只是一个没有底层原始联系人的 ID。\n\n因此，聚合联系人是易变的。长期持有此聚合联系人 ID 并没有什么重要价值。\n\
  \nAndroid 通过提供一个名为`lookup`的字段来缓解这一困境，该字段位于聚合联系人表中。\n\n此`lookup`字段是每个原始联系人对应的账户与该联系人在该账户中的唯一\
  \ ID 的聚合（拼接）。这些信息经过进一步编码，以便可以作为 URL 参数传递，从而检索最新的聚合联系人 ID。Android 会查看`lookup`键，并找出该`lookup`键下有哪些底层原始联系人\
  \ ID。然后使用最佳匹配算法返回一个合适的（或可能是新的）聚合联系人 ID。\n\n在我们深入研究联系人数据库时，让我们考虑几个有用的联系人相关数据库视图。\n\
  \n### `view_contacts`\n\n这些视图中的第一个是`view_contacts`。尽管存在一个保存聚合联系人的表（`contacts`表），但\
  \ API 并不直接暴露`contacts`表。相反，它使用`view_contacts`作为读取聚合联系人的目标。当你基于 URI `ContactsContract.Contacts.CONTENT_URI`进行查询时，返回的列就是基于此视图`view_contacts`的。此视图的定义如清单\
  \ 27-11 所示。\n\n**清单 27-11.** *用于读取聚合联系人的视图*\n\n```\nCREATE VIEW view_contacts AS\n\
  \nSELECT contacts._id AS _id,\ncontacts.custom_ringtone AS custom_ringtone,\nname_raw_contact.display_name_source\
  \ AS display_name_source,\nname_raw_contact.display_name AS display_name,\nname_raw_contact.display_name_alt\
  \ AS display_name_alt,\nname_raw_contact.phonetic_name AS phonetic_name,\nname_raw_contact.phonetic_name_style\
  \ AS phonetic_name_style,\nname_raw_contact.sort_key AS sort_key,\nname_raw_contact.sort_key_alt\
  \ AS sort_key_alt,\nname_raw_contact.contact_in_visible_group AS in_visible_group,\n\
  has_phone_number,\nlookup,\nphoto_id,\ncontacts.last_time_contacted AS last_time_contacted,\n\
  contacts.send_to_voicemail AS send_to_voicemail,\ncontacts.starred AS starred,\n\
  contacts.times_contacted AS times_contacted, status_update_id\n\nFROM contacts JOIN\
  \ raw_contacts AS name_raw_contact\nON(name_raw_contact_id=name_raw_contact._id)\n\
  ```\n\n请注意，此视图根据聚合联系人 ID 将`contacts`表与`raw_contacts`表结合了起来。\n\n### `contact_entities_view`\n\
  \n另一个有用的视图是结合了原始联系人表与数据表的视图。此视图允许一次性检索给定原始联系人的所有数据元素，甚至还可以检索属于同一聚合联系人的多个原始联系人的数据元素。清单\
  \ 27-12 展示了实体视图的定义。\n\n**清单 27-12.** *联系人实体视图*\n\n```\nCREATE VIEW contact_entities_view\
  \ AS\n\nSELECT raw_contacts.account_name AS account_name,\nraw_contacts.account_type\
  \ AS account_type,\nraw_contacts.sourceid AS sourceid,\nraw_contacts.version AS\
  \ version,\nraw_contacts.dirty AS dirty,\nraw_contacts.deleted AS deleted,\nraw_contacts.name_verified\
  \ AS name_verified,\npackage AS res_package,\ncontact_id,\nraw_contacts.sync1 AS\
  \ sync1,\nraw_contacts.sync2 AS sync2,\nraw_contacts.sync3 AS sync3,\nraw_contacts.sync4\
  \ AS sync4,\nmimetype, data1, data2, data3, data4, data5, data6, data7, data8,\n\
  data9, data10, data11, data12, data13, data14, data15,\ndata_sync1, data_sync2,\
  \ data_sync3, data_sync4,\n\nraw_contacts._id AS _id,\n\nis_primary, is_super_primary,\n\
  data_version,\ndata._id AS data_id,\nraw_contacts.starred AS starred,\nraw_contacts.is_restricted\
  \ AS is_restricted,\ngroups.sourceid AS group_sourceid\n\nFROM raw_contacts LEFT\
  \ OUTER JOIN data\n   ON (data.raw_contact_id=raw_contacts._id)\nLEFT OUTER JOIN\
  \ packages\n  ON (data.package_id=packages._id)\nLEFT OUTER JOIN mimetypes\n  ON\
  \ (data.mimetype_id=mimetypes._id)\nLEFT OUTER JOIN groups\n  ON (mimetypes.mimetype='vnd.android.cursor.item/group_membership'\n\
  \    AND groups._id=data.data1)\n```\n\n访问此视图所需的 URI 可在`ContactsContract.RawContacts.RawContactsEntity`类中找到。\n\
  \n## 使用联系人 API\n\n到目前为止，我们已经通过探索其表格和视图，了解了联系人 API 背后的基本概念。现在我们将通过编写几个示例程序来实践我们所学的知识。虽然你可以使用本章中的清单来创建你的\
  \ Eclipse 项目，但我们在本章末尾也提供了可下载项目文件的 URL。\n\n### 探索账户\n\n我们将通过编写一个可以打印出账户列表的程序来开始我们的练习。\n\
  \n为此，我们准备了以下文件：\n\n*   `TestContactsDriverActivity.java`：本章的主驱动 Activity，包含一组菜单项来调用各种示例。\n\
  *   `DebugActivity.java`：驱动 Activity 的基类，用于隐藏一些对理解联系人 API 没有直接贡献的实现细节。\n*   `debug_activity_layout.xml`：调试\
  \ Activity 所需的布局文件，位于`/res/layout`文件子目录下。\n*   `AccountFunctionTester.java`：Java\
  \ 类，将通过驱动 Activity 响应菜单项以打印模拟器或设备上的可用账户。\n*   `BaseTester.java`：`AccountFunctionTester`的基类，隐藏了主驱动\
  \ Activity 与每个独立功能测试器之间的协调细节（我们演示的每个练习都作为这些功能测试器之一实现，以便每个概念都可以呈现在一个对该功能有意义的文件中）。\n\
  *   `IReportBack.java`：由`DebugActivity`实现并传递给`BaseTester`的接口，允许继承的功能测试器报告要显示的文本或调试消息，并使用`DebugActivity`记录并打印到屏幕上。\n\
  *   `main_menu.xml`：菜单文件，支持我们将要演示的每个功能。\n*   `AndroidManifest.xml`：必需的清单文件。\n\n\
  现在我们逐一介绍这些文件。我们将从菜单文件开始。\n\n#### 菜单文件\n\n清单 27-13 中的菜单文件需要命名为`main_menu.xml`，并放在你项目的`/res/menu`子目录中。\n\
  \n**清单 27-13.** *项目的主菜单文件*\n\n```\n<menu >\n    <!-- This group uses the default\
  \ category. -->\n    <group android:id=\"@+id/menuGroup_Main\">\n        <item android:id=\"\
  @+id/menu_show_accounts\"\n            android:title=\"Accounts\" />\n\n       \
  \ <item android:id=\"@+id/menu_da_clear\"\n         android:title=\"clear\" />\n\
  \    </group>\n</menu>\n```\n\n在本练习的这个阶段，我们只列出了两个菜单项。在继续本章后面的其他练习时，您将不断向这些菜单项中添加内容。第一个菜单项用于列出可用账户，第二个是一个通用的辅助菜单项，用于清除测试驱动\
  \ Activity 中的调试/信息消息。\n\n\n\n### 账户功能测试器相关文件\n\n菜单文件就绪后，我们来看看与实现代码相关的文件，这些代码将响应清单\
  \ 27-13 中的 `Accounts` 菜单项被调用。\n\n#### IReportBack.java\n\n第一个文件是 `IReportBack.java`，如清单\
  \ 27-14 所示。\n\n**清单 27-14.** *IReportBack.java*\n\n```\n//IReportBack.java\npublic\
  \ interface IReportBack\n{\n    public void reportBack(String tag, String message);\n\
  \    public void reportTransient(String tag, String message);\n}\n```\n\n此接口是对其继承客户端的契约，确保它们能够发送信息和调试消息，而无需关心这些消息将在何处以及如何显示。\n\
  \n#### BaseTester.java\n\n所有功能测试器都将访问 `IReportBack` 接口，以便在它们执行菜单项功能时报告消息。这是通过所有功能测试器的基类\
  \ `BaseTester` 实现的。`BaseTester` 类的源代码在清单 27-15 中给出。\n\n**清单 27-15.** *BaseTester\
  \ 源代码*\n\n```\npublic class BaseTester\n{\n    protected IReportBack mReportTo;\n\
  \    protected Context mContext;\n    public BaseTester(Context ctx, IReportBack\
  \ target)\n    {\n        mReportTo = target;\n        mContext = ctx;\n    }\n\
  }\n```\n\n`BaseTester` 类保存了一个 `IReportBack` 接口和一个对 `Context`（通常是父驱动 Activity）的引用。这些变量由派生功能测试器使用。\n\
  \n#### AccountsFunctionTester.java\n\n现在，我们将在清单 27-16 中展示第一个功能测试器 `AccountFunctionTester`。\n\
  \n**清单 27-16.** *AccountsFunctionTester*\n\n```\npublic class AccountsFunctionTester\
  \ extends BaseTester\n{\n    private static String tag = \"tc>\";\n    public AccountsFunctionTester(Context\
  \ ctx, IReportBack target)\n    {\n        super(ctx, target);\n    }\n    public\
  \ void testAccounts()\n    {\n        AccountManager am = AccountManager.get(this.mContext);\n\
  \        Account[] accounts = am.getAccounts();\n        for(Account ac: accounts)\n\
  \        {\n            String acname=ac.name;\n            String actype = ac.type;\n\
  \            this.mReportTo.reportBack(tag,acname + \":\" + actype);\n        }\n\
  \    }\n}\n```\n\n清单 27-16 中的代码非常简单。我们已经在章节开头介绍了账户以及如何获取账户列表的主题。清单 27-16 中的代码只是获取每个账户的名称和类型，然后调用报告回传接口进行记录。只要存在一个可以调用\
  \ `testAccounts()` 方法的驱动 Activity，这段代码就能回传账户名称和类型。现在，让我们来研究与驱动 Activity 相关的类。\n\n\
  ### 驱动 Activity 类\n\n我们将从驱动 Activity 类的基类开始。这个基类 Activity 具有以下职责：\n\n*   提供一个文本视图来报告消息。它使用一个名为\
  \ `debug_activity_layout` 的布局资源。\n*   提供一个菜单，以便可以调用各个功能测试器。它通过构造函数从派生类中获取菜单资源 ID。然后它假定存在一个预定义的菜单项\
  \ `menu_da_clear`，用于清除调试布局中定义的文本视图。这个基类还会将选中的菜单项写入调试布局中的调试文本视图。\n\n基于此，下面是清单 27-17\
  \ 中 `DebugActvity.java` 的源代码。\n\n#### DebugActivity.java\n\n**清单 27-17.** *DebugActivity\
  \ 类定义*\n\n```\npublic abstract class DebugActivity extends Activity\nimplements\
  \ IReportBack\n{\n    //派生类需要首先实现\n    protected abstract boolean onMenuItemSelected(MenuItem\
  \ item);\n\n    //由构造函数设置的私有变量\n    private static String tag=null;\n    private\
  \ int menuId = 0;\n\n    public DebugActivity(int inMenuId, String inTag)\n    {\n\
  \        tag = inTag;\n        menuId = inMenuId;\n\n    }\n\n    @Override\n  \
  \  public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.debug_activity_layout);\n    }\n    @Override\n\
  \    public boolean onCreateOptionsMenu(Menu menu){\n        super.onCreateOptionsMenu(menu);\n\
  \            MenuInflater inflater = getMenuInflater();\n            inflater.inflate(menuId,\
  \ menu);\n        return true;\n    }\n    @Override\n    public boolean onOptionsItemSelected(MenuItem\
  \ item){\n        appendMenuItemText(item);\n        if (item.getItemId() == R.id.menu_da_clear){\n\
  \            this.emptyText();\n            return true;\n        }\n        return\
  \ onMenuItemSelected(item);\n    }\n    private TextView getTextView(){\n      \
  \  return (TextView)this.findViewById(R.id.text1);\n    }\n    protected void appendMenuItemText(MenuItem\
  \ menuItem){\n       String title = menuItem.getTitle().toString();\n       TextView\
  \ tv = getTextView();\n       tv.setText(tv.getText() + \"\\n\" + title);\n    }\n\
  \    protected void emptyText(){\n       TextView tv = getTextView();\n       tv.setText(\"\
  \");\n    }\n    private void appendText(String s){\n       TextView tv = getTextView();\n\
  \       tv.setText(tv.getText() + \"\\n\" + s);\n       Log.d(tag,s);\n    }\n \
  \   public void reportBack(String tag, String message)\n    {\n        this.appendText(tag\
  \ + \":\" + message);\n        Log.d(tag,message);\n    }\n    public void reportTransient(String\
  \ tag, String message)\n    {\n        String s = tag + \":\" + message;\n     \
  \   Toast mToast = Toast.makeText(this, s, Toast.LENGTH_SHORT);\n        mToast.show();\n\
  \        reportBack(tag,message);\n        Log.d(tag,message);\n    }\n}\n```\n\n\
  除了可在调试文本视图上回传调试和信息消息的方法之外，`IReportBack` 中的 `reportTransient()` 方法还可用于通过 Android\
  \ 的 `Toast` 接口显示文本。\n\n#### debug_layout_activity.java\n\n这个文件 `debug_layout_activity.xml`\
  \ 如清单 27-18 所示，需要放在 `/res/layout` 子目录下。\n\n**清单 27-18.** *调试布局文件: debug_activity_layout.xml*\n\
  \n```\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout\n    android:orientation=\"\
  vertical\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  fill_parent\"\n    >\n<TextView\n    android:id=\"@+id/text1\"\n    android:layout_width=\"\
  fill_parent\"\n    android:layout_height=\"wrap_content\"\n    android:text=\"Debut\
  \ Text Appears here\"\n    />\n</LinearLayout>\n```\n\n\n\n##### `TestContactsDriverActivity.java`\n\
  \n清单 27–19 是主驱动程序活动，它负责协调菜单项，并从对应的函数测试器中调用相应的方法。\n\n**清单 27–19.** *主驱动程序活动*\n\n\
  ```\npublic class TestContactsDriverActivity\nextends DebugActivity\nimplements\
  \ IReportBack\n{\n    public static final String tag=\"Test Contacts\";\n    AccountsFunctionTester\
  \ accountsFunctionTester = null;\n\n    public TestContactsDriverActivity()\n  \
  \  {\n        super(R.menu.main_menu,tag);\n        accountsFunctionTester = new\
  \ AccountsFunctionTester(this,this);\n    }\n    protected boolean onMenuItemSelected(MenuItem\
  \ item)\n    {\n        Log.d(tag,item.getTitle().toString());\n        if (item.getItemId()\
  \ == R.id.menu_show_accounts)\n        {\n            accountsFunctionTester.testAccounts();\n\
  \            return true;\n        }\n        return true;\n    }\n}\n```\n\n由于我们将驱动程序的大部分功能都推送到了基类中，因此驱动程序活动简洁明了。\n\
  \n首先，在清单 27–19 中要注意的是，驱动程序活动如何将清单 27–13（`main_menu.xml`）中定义的菜单资源传递给基础调试活动。然后，调试活动会附加此菜单。\n\
  \n其次要注意的是，此驱动程序活动如何使用函数测试器。在清单 27–19 的代码中，我们只展示了账户函数测试器。随着学习的深入，我们会逐步添加更多函数测试器。使用这些额外函数测试器的模式是相同的。\n\
  \n##### 清单文件\n\n清单 27–20 展示了清单文件，以完善所有必需的文件。\n\n**清单 27–20.** *程序的清单文件*\n\n```\n\
  <?xml version=\"1.0\" encoding=\"utf-8\"?>\n<manifest\n      package=\"com.androidbook.contacts\"\
  \n      android:versionCode=\"1\"\n      android:versionName=\"1.0.0\">\n    <application\
  \ android:icon=\"@drawable/icon\"\n        android:label=\"Test Contacts\">\n  \
  \      <activity android:name=\".TestContactsDriverActivity\"\n                \
  \  android:label=\"Test Contacts\">\n            <intent-filter>\n             \
  \   <action android:name=\"android.intent.action.MAIN\" />\n                <category\
  \ android:name=\"android.intent.category.LAUNCHER\" />\n            </intent-filter>\n\
  \         </activity>\n</application>\n    <uses-sdk android:minSdkVersion=\"5\"\
  \ />\n    <uses-permission android:name=\"android.permission.GET_ACCOUNTS\"/>\n\
  </manifest>\n```\n\n### 运行程序\n\n清单 27–21 包含了编译并运行这个简单测试所需的文件。\n\n**清单 27–21.** *第一个示例的完整文件列表*\n\
  \n```\nIReportBack.java\nBaseTester.java\nAccountsFunctionTester.java\nDebugActivity.java\n\
  TestContactsDriverActivity.java\n/res/menu/main_menu.xml\n/res/layout/debug_layout_activity.xml\n\
  Manifest.xml\n```\n\n当你编译并运行此文件，并在查看主驱动程序活动时点击菜单项，你将看到图 27–15 所示的屏幕。\n\n![images](img/2715.jpg)\n\
  \n**图 27–15.** *带有菜单的主驱动程序活动*\n\n图 27–15 有两个菜单选项。“清除”选项是基类调试活动提供的通用菜单，用于清除调试文本视图中的所有文本。“账户”选项将列出可用的账户集。如果你正在实际操作，请继续点击该菜单项。这将弹出图\
  \ 27–16 所示的屏幕。\n\n![images](img/2716.jpg)\n\n**图 27–16.** *显示账户列表的主驱动程序活动*\n\n我们测试使用的模拟器只设置了一个账户，即\
  \ Google 账户。因此，我们的示例只显示了这一个账户。\n\n### 探索聚合联系人\n\n在下一个示例中，让我们看看如何探索聚合联系人。我们将在这个关于聚合联系人的练习中演示三件事：\n\
  \n*   发现通过触发一个知道如何读取聚合联系人的 URI 所返回的所有字段。\n*   列出所有聚合联系人。\n*   发现基于查找 URI 的光标所返回的所有字段。\n\
  \n要读取联系人，你需要在清单文件（清单 27–20）中请求以下权限：\n\n`android.permission.READ_CONTACTS`\n\n你还需要以下新文件（除了上一个示例中的文件之外）来测试此示例：\n\
  \n*   `Utils.java`\n*   `URIFunctionTester.java`\n*   `AggregatedContactFunctionTester.java`\n\
  *   `AggregatedContact.java`\n\n这些文件将在本节介绍此示例的详细信息时提供。\n\n你还需要更新上一个示例中的以下文件：\n\n\
  *   `main_menu.xml`\n*   `TestContactsDriverActivity.java`\n\n你对这些文件需要做的更改也将在本节中介绍。\n\
  \n由于我们测试的功能涉及内容提供者、URI 和光标，我们在文件 `Utils.java` 中编写了几个工具函数，如清单 27–22 所示。\n\n**清单 27–22.**\
  \ *用于处理光标的工具函数*\n\n```\npublic class Utils\n{\n    public static String getColumnValue(Cursor\
  \ cc, String cname)\n    {\n        int i = cc.getColumnIndex(cname);\n        return\
  \ cc.getString(i);\n    }\n\n    protected static String getCursorColumnNames(Cursor\
  \ c)\n    {\n        int count = c.getColumnCount();\n        StringBuffer cnamesBuffer\
  \ = new StringBuffer();\n        for (int i=0;i<count;i++)\n        {\n        \
  \    String cname = c.getColumnName(i);\n            cnamesBuffer.append(cname).append(';');\n\
  \        }\n        return cnamesBuffer.toString();\n    }\n}\n```\n\n第一个函数 `getColumnValue()`\
  \ 根据列名从光标的当前行返回该列的值。无论其基本类型如何，它都将列的值作为字符串返回。\n\n第二个函数非常有用。它接收任何光标，并返回其所有可用列的分隔列表。当我们探索新的\
  \ URI 以发现这些 URI 返回的字段类型时，这个函数非常方便。尽管通常应该在 Java 代码中记录这些列，但这种在运行时发现它们的方法可能会派上用场。\n\
  \n由于此示例以及本章后续示例都使用了提交 URI 并通过活动获取回光标的概念，我们将这些工具函数抽象到一个名为 `URIFunctionTester` 的基类中。清单\
  \ 27–23 显示了源代码，随后对该基类的每个方法进行了解释。\n\n**清单 27–23.** *用于探索 URI 相关功能的基类*\n\n```\npublic\
  \ class URIFunctionTester extends BaseTester\n{\n    protected static String tag\
  \ = \"tc>\";\n    public URIFunctionTester(Context ctx, IReportBack target)\n  \
  \  {\n        super(ctx, target);\n    }\n    protected Cursor getACursor(String\
  \ uri,String clause)\n    {\n        // 执行查询\n        Activity a = (Activity)this.mContext;\n\
  \        return a.managedQuery(Uri.parse(uri), null, clause, null, null);\n    }\n\
  \n    protected Cursor getACursor(Uri uri,String clause)\n    {\n        // 执行查询\n\
  \        Activity a = (Activity)this.mContext;\n        return a.managedQuery(uri,\
  \ null, clause, null, null);\n    }\n    protected void printCursorColumnNames(Cursor\
  \ c)\n    {\n        this.mReportTo.reportBack(tag,Utils.getCursorColumnNames(c));\n\
  \    }\n}\n```\n\n\n```markdown\n函数`getACursor()`接受一个 URI（可以是字符串或`URI`对象）和一个基于字符串的`where`子句，并返回一个游标。在所有示例中，由于我们经常打印返回游标的列名，因此创建了一个名为`printCursorColumnNames()`的方法，该方法内部使用`Utils`类来探查游标并获取列名。\n\
  \n联系人游标返回的每一行都有许多字段。在本文示例中，我们并非对所有字段都感兴趣，只关注其中几个。我们将这些字段抽象到另一个名为`AggregatedContact`的类中。清单\
  \ 27–24 定义了该类。\n\n**清单 27–24. 聚合联系人中的若干字段**\n\n```\npublic class AggregatedContact\n\
  {\n    public String id;\n    public String lookupUri;\n    public String lookupKey;\n\
  \    public String displayName;\n\n    public void fillinFrom(Cursor c)\n    {\n\
  \        id = Utils.getColumnValue(c,\"_ID\");\n        lookupKey = Utils.getColumnValue(c,ContactsContract.Contacts.LOOKUP_KEY);\n\
  \        lookupUri = ContactsContract.Contacts.CONTENT_LOOKUP_URI + \"/\" + lookupKey;\n\
  \        displayName = Utils.getColumnValue(c,ContactsContract.Contacts.DISPLAY_NAME);\n\
  \    }\n}\n```\n\n清单 27–24 并不复杂。在这段代码中，我们使用游标加载了我们感兴趣的字段。接下来，我们将向您介绍`AggregatedFunctionTester`，它将帮助我们实现本例开始时设定的目标。\n\
  \n**清单 27–25. 测试聚合联系人的代码**\n\n```\npublic class AggregatedContactFunctionTester\
  \ extends URIFunctionTester\n{\n    public AggregatedContactFunctionTester(Context\
  \ ctx, IReportBack target)\n    {\n        super(ctx, target);\n    }\n    /*\n\
  \     * Get a cursor of all contacts\n     * No where clause\n     * Don't use it\
  \ on a large set\n     */\n    private Cursor getContacts()\n    {\n        // Run\
  \ query\n        Uri uri = ContactsContract.Contacts.CONTENT_URI;\n        String\
  \ sortOrder = ContactsContract.Contacts.DISPLAY_NAME\n                         \
  \    + \" COLLATE LOCALIZED ASC\";\n        Activity a = (Activity)this.mContext;\n\
  \        return a.managedQuery(uri, null, null, null, sortOrder);\n    }\n\n   \
  \ /*\n     * Use the getContacts above\n     * to list the set of columns in the\
  \ cursor\n     */\n    public void listContactCursorFields()\n    {\n        Cursor\
  \ c = null;\n        try\n        {\n            c = getContacts();\n          \
  \  int i = c.getColumnCount();\n            this.mReportTo.reportBack(tag, \"Number\
  \ of columns:\" + i);\n            this.printCursorColumnNames(c);\n        }\n\
  \        finally\n        {\n            if (c!= null) c.close();\n        }\n \
  \   }\n\n    /*\n     * Given a cursor worth of contacts\n     * Print the contact\
  \ names followed by\n     * their look up keys\n     */\n    private void printLookupKeys(Cursor\
  \ c)\n    {\n        for(c.moveToFirst();!c.isAfterLast();c.moveToNext())\n    \
  \    {\n            String name=this.getContactName(c);\n            String lookupKey\
  \ = this.getLookupKey(c);\n            String luri = this.getLookupUri(lookupKey);\n\
  \            this.mReportTo.reportBack(tag, name + \":\" + lookupKey);\n       \
  \     this.mReportTo.reportBack(tag, name + \":\" + luri);\n        }\n    }\n\n\
  \    /*\n     * Use the getContacts() function\n     * to get a cursor and print\
  \ all\n     * the contact names followed by look up keys\n     * uses the printLookyupKeus()\
  \ function\n     */\n    public void listContacts()\n    {\n        Cursor c = null;\n\
  \        try\n        {\n            c = getContacts();\n            int i = c.getColumnCount();\n\
  \            this.mReportTo.reportBack(tag, \"Number of columns:\" + i);\n     \
  \       this.printLookupKeys(c);\n        }\n        finally\n        {\n      \
  \      if (c!= null) c.close();\n        }\n    }\n\n    /*\n     * A utility function\
  \ to retrieve the\n     * look up key from a contact cursor\n     */\n    private\
  \ String getLookupKey(Cursor cc)\n    {\n        int lookupkeyIndex = cc.getColumnIndex(ContactsContract.Contacts.LOOKUP_KEY);\n\
  \        return cc.getString(lookupkeyIndex);\n    }\n\n    /*\n     * A utility\
  \ function to retrieve the\n     * display name from a contact cursor\n     */\n\
  \    private String getContactName(Cursor cc)\n    {\n        return Utils.getColumnValue(cc,ContactsContract.Contacts.DISPLAY_NAME);\n\
  \    }\n\n    /**\n     * Construct a look up URI based on the\n     * Contacts\
  \ URI and a lookup key\n     */\n    private String getLookupUri(String lookupkey)\n\
  \    {\n        String luri = ContactsContract.Contacts.CONTENT_LOOKUP_URI + \"\
  /\" + lookupkey;\n        return luri;\n    }\n\n    /**\n     * Use the lookup\
  \ uri\n     * to retrieve a single aggregated contact\n     */\n    private Cursor\
  \ getASingleContact(String lookupUri)\n    {\n        // Run query\n        Activity\
  \ a = (Activity)this.mContext;\n        return a.managedQuery(Uri.parse(lookupUri),\
  \ null, null, null, null);\n    }\n\n    /*\n     * A function to see if the URI\
  \ constructed by the lookup\n     * uri returns a cursor that has a different set\
  \ of columns.\n     * It returns a similar cursor with similar columns\n     * as\
  \ one would expect.\n     */\n    public void listLookupUriColumns()\n    {\n  \
  \      Cursor c = null;\n        try\n        {\n            c = getContacts();\n\
  \            String firstContactLookupUri = getFirstLookupUri(c);\n            printLookupUriColumns(firstContactLookupUri);\n\
  \        }\n        finally\n        {\n            if (c!= null) c.close();\n \
  \       }\n    }\n\n    public void printLookupUriColumns(String lookupuri)\n  \
  \  {\n        Cursor c = null;\n        try\n        {\n            c = getASingleContact(lookupuri);\n\
  \            int i = c.getColumnCount();\n            this.mReportTo.reportBack(tag,\
  \ \"Number of columns:\" + i);\n            int j = c.getCount();\n            this.mReportTo.reportBack(tag,\
  \ \"Number of rows:\" + j);\n            this.printCursorColumnNames(c);\n     \
  \   }\n        finally\n        {\n            if (c!=null)c.close();\n        }\n\
  \    }\n\n    /*\n     * Take a list of contacts\n     * look up the first contact\n\
  \     * return null if there are no contacts\n     */\n    private String getFirstLookupUri(Cursor\
  \ c)\n    {\n        c.moveToFirst();\n        if (c.isAfterLast())\n        {\n\
  \            Log.d(tag,\"No rows to get the first contact\");\n            return\
  \ null;\n        }\n        //There is a row\n        String lookupKey = this.getLookupKey(c);\n\
  \        String luri = this.getLookupUri(lookupKey);\n        return luri;\n   \
  \ }\n\n    /*\n     * Take a list of contacts\n     * look up the first contact\
  \ and return it\n     * as an object AggregatedContact.\n     */\n    protected\
  \ AggregatedContact getFirstContact()\n    {\n        Cursor c=null;\n        try\n\
  \        {\n            c = getContacts();\n            c.moveToFirst();\n     \
  \       if (c.isAfterLast())\n            {\n                Log.d(tag,\"No contacts\"\
  );\n                return null;\n            }\n            //contact is there\n\
  \            AggregatedContact firstcontact = new AggregatedContact();\n       \
  \     firstcontact.fillinFrom(c);\n            return firstcontact;\n        }\n\
  \        finally\n        {\n            if (c!=null) c.close();\n        }\n  \
  \  }\n}\n```\n\n关键公共函数已突出显示。每个函数对应的注释部分解释了其功能。拥有此函数测试器后，请将清单 27–26 中的菜单项添加到菜单 XML（`/res/menu/main_menu.xml`）中。\n\
