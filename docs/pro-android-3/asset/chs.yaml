  6.  项目就位后，你可能需要选择“项目属性”![images](img/U001.jpg)“Android”并选择正确的构建目标，以设置正确的 API 级别。\n\
  \n#### 从代码清单创建项目\n\n如果你想根据本章的代码清单构建项目，步骤如下；相关文件列在本章的“处理器示例驱动类”部分：\n\n1.  通过选择“文件”![images](img/U001.jpg)“新建项目”![images](img/U001.jpg)“Android”![images](img/U001.jpg)“Android\
  \ 项目”来创建一个新项目。\n2.  选择一个名称，并选择“在工作空间中创建新项目”。\n3.  将应用程序命名为“Test Handlers”。\n4. \
  \ 选择一个 API 级别。\n5.  使用类似于 `com.androidbook.handlers` 的包名。\n6.  选择 `minsdk version\
  \ : 3`。\n7.  选择 `TestHandlersDriverActivity` 作为你的活动，然后点击“完成”。\n8.  Android 将创建一些资源文件，并且（取决于你的版本）可能会创建一个源文件。\n\
  9.  根据本章的代码清单创建或更新这些文件。\n10. 对于 Java 文件，复制代码清单时，请先将包名放在每个文件顶部再进行复制。然后，按 `Ctrl+Shift+O`\
  \ 填充导入内容。\n\n请注意，在此过程中，你可能需要调整代码以使其编译通过，并补全任何缺失的部分。你可以参考 ZIP 文件来填补这些空白。\n\n### 本章小结\n\
  \n在本章中，我们探讨了 Android 进程的各种组件以及主线程如何协调它们。我们展示了如何使用处理器和线程来扩展主线程的能力范围，以及主线程必须在 5 秒内返回以避免\
  \ ANR 消息。此规则同样适用于广播接收器，不过广播接收器的时限为 10 秒。\n\n我们讨论了组件的生命周期以及它们如何影响主线程和子线程。这些知识对于理解这些组件的复杂性以及执行长时间运行操作所需采取的措施至关重要。\n\
  \n下一章将专门讨论如何使用广播接收器和执行长时间运行操作。本章所涵盖的内容将帮助你理解下一章。\n\n## 第 14 章\n\n## 广播接收器与长时间运行服务\n\
  \n通过前面的章节，你已经了解了活动、内容提供器和服务。我们还没有过多讨论广播接收器，因此本章将就此展开。\n\n我们将首先展示如何调用一个简单的广播接收器，然后将这一概念扩展到调用多个广播接收器。我们还将探讨广播接收器如何驻留在客户端进程之外的进程中。我们将演示广播接收器如何通过通知管理器发送通知消息。\n\
  \n我们将讨论广播接收器在系统抛出“应用程序无响应”(ANR)消息之前有 10 秒的响应时限，并建议已知的解决机制。我们将开发一个框架，你可以开始将长时间运行的服务视为广播意图的一种特殊抽象。最后，我们将在长时间运行服务的上下文中讨论唤醒锁。\n\
  \n让我们从编写一个简单的广播接收器开始，从而开启对广播接收器的全面覆盖。\n\n\n\n### 广播接收器\n\n在第 13 章中，我们谈到广播接收器是 Android\
  \ 进程的另一个组件，与活动、内容提供者和服务并列。顾名思义，广播接收器是一种能够响应客户端发送的广播消息的组件。消息本身是一个 Android 广播 Intent，一条广播消息可以被多个接收器接收。\n\
  \n像活动或服务这样的组件（或者说任何最终实现了`Context`类的组件）想要广播事件（Intent），可以使用`Context`类提供的`sendBroadCast()`方法。该方法的参数是一个\
  \ Intent。\n\n广播 Intent 的接收组件需要继承自 Android SDK 中的`Receiver`类。然后，这些接收组件（广播接收器）需要在清单文件中注册为对该广播\
  \ Intent 感兴趣的`receiver`。\n\n**注意：** 你也可以在运行时注册接收器，而无需在清单文件中声明。请注意，本章不涉及这方面的内容，建议你查看本章“参考资料”部分中提供的\
  \ API 文档网址以获取更多信息。\n\n### 发送广播\n\n代码清单 14-1 展示了一段来自活动类的示例代码，用于发送广播。这段代码创建了一个具有唯一特定\
  \ Action 的 Intent，向其添加一个附加消息，然后调用`sendBroadcast()`方法。向 Intent 添加附加消息是可选的；很多时候，接收器收到\
  \ Intent 就足够了，不需要附加消息。\n\n**代码清单 14-1.** *广播 Intent*\n\n```\nprivate void testSendBroadcast(Activity\
  \ activty)\n{\n    //创建一个带有 Action 的 Intent\n    String uniqueActionString = \"\
  com.androidbook.intents.testbc\";\n    Intent broadcastIntent = new Intent(uniqueActionString);\n\
  \    broadcastIntent.putExtra(\"message\", \"Hello world\");\n    activity.sendBroadcast(broadcastIntent);\n\
  }\n```\n\n在代码清单 14-1 的代码中，Action 是一个适合你需求的任意标识符。为使此动作字符串唯一，你可能希望使用类似 Java 类的命名空间。现在，让我们看看如何响应这个广播\
  \ Intent。\n\n### 编写一个简单的接收器：示例代码\n\n代码清单 14-2 展示了如何编写一个接收器来响应代码清单 14-1 中广播的 Intent。\n\
  \n**代码清单 14-2.** *示例接收器代码*\n\n```\npublic class TestReceiver extends BroadcastReceiver\n\
  {\n    private static final String tag = \"TestReceiver\";\n    @Override\n    public\
  \ void onReceive(Context context, Intent intent)\n    {\n        Utils.logThreadSignature(tag);\n\
  \        Log.d(\"TestReceiver\", \"intent=\" + intent);\n        String message\
  \ = intent.getStringExtra(\"message\");\n        Log.d(tag, message);\n    }\n}\n\
  ```\n\n创建一个广播接收器非常简单。只需继承`BroadcastReceiver`类并重写`onReceive()`方法即可。我们能够在接收器中看到 Intent\
  \ 并从中提取消息。如果广播 Intent 没有叫做“message”的附加消息，它将返回 null。在我们的示例中，因为我们知道设置了该附加消息，所以没有检查\
  \ null 值。一旦我们检索到附加消息，我们就记录下检索到的消息。\n\n我们在测试接收器中包含了一个实用方法，可以记录运行接收器代码的线程签名。由于本章中经常使用`Utils`类，我们在代码清单\
  \ 14-3 中介绍了`Utils.java`的源代码。\n\n**代码清单 14-3.** *Utils 类定义*\n\n```\npublic class\
  \ Utils\n{\n    public static long getThreadId()\n    {\n        Thread t = Thread.currentThread();\n\
  \        return t.getId();\n    }\n    public static String getThreadSignature()\n\
  \    {\n        Thread t = Thread.currentThread();\n        long l = t.getId();\n\
  \        String name = t.getName();\n        long p = t.getPriority();\n       \
  \ String gname = t.getThreadGroup().getName();\n        return (name + \":(id)\"\
  \ + l + \":(priority)\" + p\n                + \":(group)\" + gname);\n    }\n \
  \   public static void logThreadSignature(String tag)\n    {\n        Log.d(tag,\
  \ getThreadSignature());\n    }\n    public static void sleepForInSecs(int secs)\n\
  \    {\n        try\n        {\n            Thread.sleep(secs * 1000);\n       \
  \ }\n        catch(InterruptedException x)\n        {\n            throw new RuntimeException(\"\
  interrupted\",x);\n        }\n    }\n}\n```\n\n有了代码清单 14-2 中的接收器代码后，我们需要在清单文件中将其注册为接收器。\n\
  \n### 在清单文件中注册接收器\n\n代码清单 14-4 展示了如何将接收器声明为 Action 为`com.androidbook.intents.testbc`的\
  \ Intent 的接收者。\n\n**代码清单 14-4.** *清单文件中的接收器定义*\n\n```\n<manifest>\n<application>\n\
  ...\n<activity .....>\n...\n<receiver android:name=\".TestReceiver\">\n    <intent-filter>\n\
  \        <action android:name=\"com.androidbook.intents.testbc\"/>\n    </intent-filter>\n\
  </receiver>\n...\n</application>\n</manifest>\n```\n\n`receiver`元素是`application`元素的子节点，如同其他组件节点一样。这就是测试接收器所需的全部内容。我们现在将列出可用于创建项目进行测试的文件列表。\n\
  \n在你急于复制粘贴（或者更糟，手动输入）这些源文件之前，请注意我们在本章末尾的“参考资料”部分提供了一个网址，你可以从中下载本章的可导入项目。\n\n\n\n\
  #### 发送测试广播\n\n所需的文件及其对应列表如下：\n\n- `TestBCRActivity.java`：一个用于启动广播接收器（BCR）的示例活动（参见代码清单\
  \ 14-5）\n- `layout/main.xml`：一个用于调试信息的简单文本布局，用作`TestBCRActivity`的布局（参见代码清单 14-6）\n\
  - `menu/main_menu.xml`：供`TestBCRActivity`使用的菜单，用于重新启动广播（参见代码清单 14-7）\n- `TestReceicer.java`：一个示例接收器（已在代码清单\
  \ 14-2 中给出）\n- `Utils.java`：一些线程工具（已在代码清单 14-3 中给出）\n- `AndriudManifest.xml`：包含项目信息的清单文件，以及在其中定义了接收器和活动的文件（参见代码清单\
  \ 14-8）\n\n我们已经给出了该项目使用的一些文件，现在将展示其余的文件。代码清单 14-5 包含了活动文件`TestBCRActivity`，它调用了发送广播的菜单项。菜单调用部分已被高亮显示。\n\
  \n**代码清单 14-5.** *广播活动客户端*\n\n```java\npublic class TestBCRActivity extends Activity\n\
  {\n    public static final String tag=\"TestBCRActivity\";\n    @Override\n    public\
  \ void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n    }\n    @Override\n    public boolean\
  \ onCreateOptionsMenu(Menu menu){\n        super.onCreateOptionsMenu(menu);\n  \
  \      MenuInflater inflater = getMenuInflater(); //from activity\n        inflater.inflate(R.menu.main_menu,\
  \ menu);\n        return true;\n    }\n    @Override\n    public boolean onOptionsItemSelected(MenuItem\
  \ item){\n        appendMenuItemText(item);\n        if (item.getItemId() == R.id.menu_clear){\n\
  \            this.emptyText();\n            return true;\n        }\n        if\
  \ (item.getItemId() == R.id.menu_send_broadcast){\n            this.testSendBroadcast();\n\
  \            return true;\n        }\n        return true;\n    }\n    private TextView\
  \ getTextView(){\n        return (TextView)this.findViewById(R.id.text1);\n    }\n\
  \    private void appendMenuItemText(MenuItem menuItem){\n       String title =\
  \ menuItem.getTitle().toString();\n       TextView tv = getTextView();\n       tv.setText(tv.getText()\
  \ + \"\\n\" + title);\n    }\n    private void emptyText(){\n          TextView\
  \ tv = getTextView();\n          tv.setText(\"\");\n    }\n    private void testSendBroadcast()\n\
  \    {\n        //打印当前运行线程的 ID\n        Utils.logThreadSignature(tag);\n\n     \
  \   //创建一个带有动作的 Intent\n        Intent broadcastIntent = new Intent(\"com.androidbook.intents.testbc\"\
  );\n        //向 Intent 中加载一条你想要广播的消息\n        broadcastIntent.putExtra(\"message\"\
  , \"Hello world\");\n\n        //发送广播\n        //可能有多个接收器接收它\n        this.sendBroadcast(broadcastIntent);\n\
  \n        //发送广播后记录一条消息\n        //这条消息应该首先出现在日志文件中\n        //然后才是广播的日志消息\n   \
  \     //因为它们都在同一个线程上运行\n        Log.d(tag,\"after send broadcast from main menu\"\
  );\n    }\n}\n```\n\n支持`TestBCRActivity`的布局文件如代码清单 14-6 所示，其对应的视图如图 14-1 所示。\n\n\
  **代码清单 14-6.** *布局文件*\n\n```xml\n<!-- layout/main.xml -->\n<LinearLayout\n    android:orientation=\"\
  vertical\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  fill_parent\"\n    >\n<TextView  \n    android:id=\"@+id/text1\"\n    android:layout_width=\"\
  fill_parent\"\n    android:layout_height=\"wrap_content\"\n    android:text=\"Your\
  \ debug will appear here\"\n    />\n</LinearLayout>\n```\n\n这是菜单文件。\n\n**代码清单 14-7.**\
  \ *菜单资源文件*\n\n```xml\n<!-- menu/main_menu.xml -->\n<menu >\n    <group android:id=\"\
  @+id/menuGroup_Main\">\n        <item android:id=\"@+id/menu_clear\"\n        android:title=\"\
  clear\" />\n        <item android:id=\"@+id/menu_send_broadcast\"\n            android:title=\"\
  broadcast\" />\n    </group>\n</menu>\n```\n\n**注意：** 你可以在代码清单 14-2 中找到`TestReceiver.java`的完整源代码，在代码清单\
  \ 14-3 中找到`Utils.java`的完整源代码。\n\n代码清单 14-8 包含了清单文件的源代码。\n\n**代码清单 14-8.** *AndroidManifest\
  \ 文件*\n\n```xml\n<manifest\n      package=\"com.androidbook.bcr\"\n      android:versionCode=\"\
  1\"\n      android:versionName=\"1.0.0\">\n    <application android:icon=\"@drawable/icon\"\
  \ android:label=\"Test Broadcast Receiver\">\n        <activity android:name=\"\
  .TestBCRActivity\"\n                  android:label=\"Test Broadcast Receiver\"\
  >\n            <intent-filter>\n                <action android:name=\"android.intent.action.MAIN\"\
  \ />\n                <category android:name=\"android.intent.category.LAUNCHER\"\
  \ />\n            </intent-filter>\n        </activity>\n        <receiver android:name=\"\
  .TestReceiver\">\n            <intent-filter>\n             <action android:name=\"\
  com.androidbook.intents.testbc\"/>\n            </intent-filter>\n        </receiver>\n\
  \    </application>\n    <uses-sdk android:minSdkVersion=\"3\" />\n</manifest>\n\
  ```\n\n编译并运行此项目后，你将看到一个活动及其菜单，效果如下所示：\n\n![images](img/1401.jpg)\n\n**图 14-1.**\
  \ *用于测试广播的示例活动及其菜单*\n\n一旦你单击`broadcast`菜单项，你将看到代码清单 14-2 中的`TestReceiver`被调用，并且`logcat`将显示活动加载到广播\
  \ Intent 中的`helloworld`消息。\n\n\n\n#### 容纳多个接收器\n\n广播的核心理念是允许多个接收器存在。因此，让我们复制 `TestReceiver`（见列表\
  \ 14-2）为 `TestReceiver2`，并观察两者是否均被调用。`TestReceiver2` 的代码如列表 14-9 所示。\n\n**列表 14-9.**\
  \ *测试接收器 2*\n\n```java\npublic class TestReceiver2 extends BroadcastReceiver\n{\n\
  \    private static final String tag = \"TestReceiver2\";\n    @Override\n    public\
  \ void onReceive(Context context, Intent intent)\n    {\n        Utils.logThreadSignature(tag);\n\
  \        Log.d(tag, \"intent=\" + intent);\n        String message = intent.getStringExtra(\"\
  message\");\n        Log.d(tag, message);\n    }\n}\n```\n\n获得此代码后，你可以使用以下定义将此接收器添加到列表\
  \ 14-8 的清单文件中：\n\n**列表 14-10.** *清单文件中的 TestReceiver2 定义*\n\n```xml\n<receiver android:name=\"\
  .TestReceiver2\">\n    <intent-filter>\n        <action android:name=\"com.androidbook.intents.testbc\"\
  />\n    </intent-filter>\n</receiver>\n```\n\n现在，如果你再次从图 14-1 调用广播菜单项，你将看到两个接收器都在\
  \ `logcat` 中输出了 `helloworld` 消息。\n\n你还会发现这些接收器是按照清单中定义的顺序被调用的。另一个可以测试的点是查看这些广播接收器在哪个线程下运行。方法调用\
  \ `Utils.logThreadSignature(tag)` 将会打印出运行线程的签名。你会意识到这确实是主线程。\n\n此外，你还会看到 `testSendBroadcast()`\
  \ 中 `sendBroadcast()` 前后放置的日志消息（见列表 14-5）都会在接收器消息之前打印出来，并且具有相同的线程签名。\n\n这证明了主线程会在稍后从消息队列中调度广播接收器。因此，`sendBroadcast()`\
  \ 显然是一种异步消息，它让主线程能够返回其队列。\n\n为了进一步验证，你可以让主线程暂停稍长时间，以便时间戳能清晰区分。让我们编写另一个接收器，通过短暂休眠来延迟主线程。此类延时接收器的源代码如列表\
  \ 14-11 所示。\n\n**列表 14-11.** *带延迟的接收器*\n\n```java\n/*\n * 引入此接收器是为了观察\n * 主线程如何调度广播接收器\n\
  \ *\n * 它有助于回答如下问题：\n * 1. 它们是否按照指定的顺序被调用？\n * 2. 它们是逐个被调用还是并行被调用？\n *\n * 此处的延迟显示主线程\n\
  \ * 会被暂停相应秒数。你可以在\n * Log.d 输出中看到这一点。\n */\npublic class TestTimeDelayReceiver extends\
  \ BroadcastReceiver\n{\n    private static final String tag = \"TestTimeDelayReceiver\"\
  ;\n    @Override\n    public void onReceive(Context context, Intent intent)\n  \
  \  {\n        Utils.logThreadSignature(tag);\n        Log.d(tag, \"intent=\" + intent);\n\
  \        Log.d(tag, \"going to sleep for 2 secs\");\n        Utils.sleepForInSecs(2);\n\
  \        Log.d(tag, \"wake up\");\n        String message = intent.getStringExtra(\"\
  message\");\n        Log.d(tag, message);\n    }\n}\n```\n\n现在，如果你将此接收器作为清单文件中的第二个接收器插入，你就可以看到主线程在主逻辑和广播接收器逻辑之间的遍历过程。在\
  \ `logcat` 中，你会看到第一个接收器先执行，然后第二个接收器被调用，主线程在那里等待 2 秒后再继续处理第三个接收器。此外，你会发现所有接收器都是在\
  \ `sendBroadcast()` 调用返回之后才被调用的。\n\n你可以将列表 14-12 中的接收器定义文件添加到列表 14-8 的清单文件中，以测试延时接收器。\n\
  \n**列表 14-12.** *清单文件中的延时接收器定义*\n\n```xml\n<receiver android:name=\".TestTimeDelayReceiver\"\
  >\n    <intent-filter>\n        <action android:name=\"com.androidbook.intents.testbc\"\
  />\n    </intent-filter>\n</receiver>\n```\n\n#### 一个用于跨进程接收器的项目\n\n广播的意图更可能在于，响应广播的进程是一个未知进程，并且与客户端进程相独立。让我们主动创建另一个\
  \ `.apk` 文件，并在该包中注册一个接收器，针对图 14-1 中相同的事件广播进行响应。\n\n以下是创建这个独立项目所需的文件；同样，你可以使用本章末尾提供的项目下载链接来获取可导入的项目：\n\
  \n*   `StandaloneReceiver.java`：一个简单的接收器（列表 14-11）\n*   `AndroidManifest.xml`：一个清单文件（列表\
  \ 14-12）\n*   `Utils.java`：与前一项目相同的文件（列表 14-4）\n\n这是一个没有 Activity 的无头项目，因此非常简洁，不需要任何\
  \ Activity 或布局文件。属于这个独立进程的示例接收器如列表 14-13 所示。我们将它恰当地命名为 `StandaloneReceiver`。\n\n\
  **列表 14-13.** *自身进程中的接收器示例*\n\n```java\npublic class StandaloneReceiver extends\
  \ BroadcastReceiver\n{\n    private static final String tag = \"Standalone Receiver\"\
  ;\n    @Override\n    public void onReceive(Context context, Intent intent)\n  \
  \  {\n        Utils.logThreadSignature(tag);\n        Log.d(tag, \"intent=\" + intent);\n\
  \        String message = intent.getStringExtra(\"message\");\n        Log.d(tag,\
  \ message);\n    }\n}\n```\n\n同样，这里没有什么特别的——只是一个普通的接收器。注册此接收器的清单文件在列表 14-14 中。\n\
  \n**列表 14-14.** *仅包含接收器的 AndroidManifest 文件*\n\n```xml\n<manifest\n      package=\"\
  com.androidbook.salbcr\"\n      android:versionCode=\"1\"\n      android:versionName=\"\
  1.0.0\">\n\n<application android:icon=\"@drawable/icon\"\n               android:label=\"\
  Standalone Broadcast Receiver\">\n\n    <receiver android:name=\".StandaloneReceiver\"\
  >\n       <intent-filter>\n          <action android:name=\"com.androidbook.intents.testbc\"\
  />\n       </intent-filter>\n    </receiver>\n</application>\n<uses-sdk android:minSdkVersion=\"\
  3\" />\n</manifest>\n```\n\n只需使用这两个文件以及从前一项目中借用的 `Utils.java` 文件，你就可以创建这个独立项目并进行部署。现在，如果你进入项目\
  \ 1 中图 14-1 所示的屏幕并调用 `broadcast` 菜单项，你将看到这个独立接收器会像项目 1 中的其他接收器一样向 `logcat` 输出内容。\n\
  \n### 在接收器中使用通知\n\n广播接收器通常需要向用户通知已发生的事情或某个状态，这通过系统通知栏中的通知图标来提醒用户实现。在本节中，我们将演示如何从广播接收器创建通知、发送通知以及通过通知管理器查看通知。\n\
  \n\n\n#### 通过通知管理器监控通知\n\nAndroid 会在通知区域以图标形式显示通知提醒。通知区域位于设备顶部的一条状态栏中，如图 图 14–2\
  \ 所示。通知区域的外观和位置可能因设备是平板还是手机而有所不同，有时也会因 Android 版本而异。\n\n![images](img/1402.jpg)\n\
  \n**图 14–2.** *Android 通知图标状态栏*\n\n当我们发送一条通知时，该通知会以图标形式出现在 图 14–2 所示的区域中。通知图标如 图\
  \ 14–3 所示。\n\n![images](img/1403.jpg)\n\n**图 14–3.** *显示通知图标的状态栏*\n\n图 14–3 除了展示通知图标外，还同时展示了通知区域和一个\
  \ Activity。对于 Activity 来说，我们只是恰好处于一个正在发送广播的应用程序中。它可以是任何 Activity，甚至是主屏幕。\n\n通知图标是向用户发出的一个信号，表示有事情需要关注。要查看完整的通知，你需要按住图标，然后将\
  \ 图 14–2 中所示的标题栏像窗帘一样向下拖动。这将展开通知区域，如 图 14–4 所示。\n\n![images](img/1404.jpg)\n\n**图\
  \ 14–4.** *展开后的通知视图*\n\n在 图 14–4 的通知展开视图中，你可以看到提供给通知的详细信息。你也可以点击某个通知详情，触发 Intent，从而启动该通知可能所属的完整应用程序。在我们接下来的示例中，我们使用了一个\
  \ Intent 来启动浏览器。\n\n正如你从 图 14–4 中看到的，你也可以使用此视图来清除通知。\n\n你还可以通过主页菜单访问 图 14–4 中显示的通知详情视图。图\
  \ 14–5 显示了模拟器主屏幕上可用的菜单。根据设备和 Android 版本的不同，这个主屏幕菜单可能有所差异。\n\n![images](img/1405.jpg)\n\
  \n**图 14–5.** *主屏幕菜单中的“通知”菜单项*\n\n点击 图 14–5 中的通知图标，将调出 图 14–4 中的通知屏幕。\n\n现在，让我们看看如何生成一个像\
  \ 图 14–3 和 图 14–4 中所示的通知图标。\n\n#### 发送通知\n\n我们开始吧。发送通知的过程包含以下三个步骤：\n\n1.  创建一条合适的通知。\n\
  2.  获取通知管理器的访问权限。\n3.  将通知发送给通知管理器。\n\n创建通知时，你需要确保它具有以下基本部分：\n\n*   一个要显示的图标\n*\
  \   一段滚动文本，例如 `\"hello world\"`\n*   通知发送的时间\n\n当你用这些详细信息构建好一个通知对象后，通过请求 Context\
  \ 提供名为 `Context.NOTIFICATION_SERVICE` 的系统服务来获取通知管理器。获取到通知管理器后，调用该对象的 `notify()`\
  \ 方法来发送通知。\n\n代码清单 14–15 展示了一个广播接收器的源代码，该接收器用于发送 图 14–3 和 图 14–4 中显示的通知。\n\n**代码清单\
  \ 14–15.** *一个发送通知的接收器*\n\n```\npublic class NotificationReceiver extends BroadcastReceiver\n\
  {\n    private static final String tag = \"Notification Receiver\";\n    @Override\n\
  \    public void onReceive(Context context, Intent intent)\n    {\n        Utils.logThreadSignature(tag);\n\
  \        Log.d(tag, \"intent=\" + intent);\n        String message = intent.getStringExtra(\"\
  message\");\n        Log.d(tag, message);\n        this.sendNotification(context,\
  \ message);\n    }\n    private void sendNotification(Context ctx, String message)\n\
  \    {\n        //获取通知管理器\n        String ns = Context.NOTIFICATION_SERVICE;\n \
  \       NotificationManager nm =\n            (NotificationManager)ctx.getSystemService(ns);\n\
  \n        //创建通知对象\n        int icon = R.drawable.robot;\n        CharSequence tickerText\
  \ = \"Hello\";\n        long when = System.currentTimeMillis();\n\n        Notification\
  \ notification =\n            new Notification(icon, tickerText, when);\n\n    \
  \    //使用 setLatestEventInfo 设置内容视图\n        Intent intent = new Intent(Intent.ACTION_VIEW);\n\
  \        intent.setData(Uri.parse(\"http://www.google.com\"));\n        PendingIntent\
  \ pi = PendingIntent.getActivity(ctx, 0, intent, 0);\n        notification.setLatestEventInfo(ctx,\
  \ \"title\", \"text\", pi);\n\n        //发送通知\n        //第一个参数是此通知的唯一标识。\n     \
  \   //此 ID 允许你稍后取消该通知\n        nm.notify(1, notification);\n    }\n}\n```\n\n在 代码清单\
  \ 14–13 的源代码中，我们引用了一个名为 `R.drawable.robot` 的提醒图标。你可以创建自己的提醒图标，将其放入 `res/drawable`\
  \ 子目录，并使用适当的图像扩展名将其命名为 `robot`。或者，你也可以参考此项目的可下载 ZIP 文件（“参考资料”部分包含一个 URL）。\n\n当你使用基本参数（图标、文本、时间）创建通知并将其发送给通知管理器时，（即\
  \ 代码清单 14–13 中创建通知的第一部分）这看起来还不够。你还需要使用以下方法为该通知设置一个所谓的内容视图：\n\n`setLatestEventInfo(...)`\n\
  \n通知的内容视图在通知展开时显示。这就是你在 图 14–4 中看到的内容。通常，内容视图需要是一个 `RemoteViews` 对象。然而，我们并不是直接将内容视图传递给\
  \ `setLatestEventInfo()` 方法。`setLatestEventInfo()` 方法是一种快捷方式，用于通过标题和要显示的文本来设置标准的预定义内容视图。\n\
  \n此方法 `setLatestEventInfo()` 还接受一个待定意图（称为内容意图），当点击此展开视图时，该意图会被触发。请回顾 代码清单 14–15\
  \ 以查看我们向此方法传递了哪些参数。\n\n你也可以选择自己创建一个远程视图，并将其设置为内容视图，而不使用 `setLatestEventInfo()`。\n\
  \n为通知的内容视图使用远程视图的步骤如下：\n\n1.  创建一个布局文件。\n2.  使用包名和布局文件 ID 创建一个 `RemoteViews` 对象。\n\
  3.  调用 `RemoteViews` 上的 set 方法来设置文本、图标等。\n4.  在将通知对象发送给通知管理器之前，调用该对象的 `setContentView()`\
  \ 方法。\n\n请记住，在 Android 2.2 版本中，只有以下有限的一组控件可以参与远程视图：\n\n*   `FrameLayout`\n*   `LinearLayout`\n\
  *   `RelativeLayout`\n*   `AnalogClock`\n*   `Button`\n*   `Chronometer`\n*   `ImageButton`\n\
  *   `ImageView`\n*   `ProgressBar`\n*   `TextView`\n\n请参阅 第 22 章 了解更多关于构建这些远程视图的信息，因为主页上的小组件本质上就是远程视图。请参阅\
  \ 第 31 章 查看 2.3 和 3.0 版本中可能的 `RemoteViews` 的更新列表。\n\n代码清单 14–15 中的代码创建了一条通知，并使用\
  \ `setLatestEventInfo()` 设置了隐式内容视图（通过标题和文本）以及要触发的 Intent（在本例中，该 Intent 是浏览器 Intent）。\n\
  \n\n\n### 长时间运行的接收器与服务\n\n到目前为止，我们讨论的都是广播接收器的理想情况，即其执行时间不太可能超过 10 秒。事实证明，如果我们要执行耗时超过\
  \ 10 秒的任务，问题就会变得有些复杂。\n\n要理解其原因，让我们快速回顾一下关于广播接收器的一些事实：\n\n- 广播接收器与 Android 进程的其他组件一样，运行在主线程上。\n\
  - 在广播接收器中阻塞代码会阻塞主线程，并导致 ANR。\n- 广播接收器的时间限制是 10 秒，而 Activity 是 5 秒。这稍微宽松一些，算是网开一面，但限制依然存在。\n\
  - 承载广播接收器的进程会随着广播接收器的执行而启动和终止。换句话说，当广播接收器的 `onReceive()` 方法返回后，该进程不会继续存在。当然，这是假设该进程只包含广播接收器。如果进程包含其他已在运行的组件（如\
  \ Activity 或服务），那么进程的生命周期也会考虑这些组件的生命周期。\n- 与服务进程不同，广播接收器进程不会被重启。\n- 如果广播接收器启动了一个独立的线程然后返回主线程，Android\
  \ 会认为工作已完成，并会关闭进程，即使有线程正在运行，这些线程也会被强行终止。\n- Android 在调用广播服务时会获取一个部分唤醒锁，并在从主线程的服务返回时释放它。唤醒锁是一种机制和\
  \ SDK 中可用的 API 类，用于防止设备进入休眠状态，或者在设备已休眠时将其唤醒。\n\n基于这些前提条件，我们如何才能在响应广播事件时执行长时间运行的代码呢？\n\
  \n#### 长时间运行广播接收器协议\n\n答案在于解决以下问题：\n\n- 我们显然需要一个独立的线程，以便主线程能够返回并避免 ANR 消息。\n- 为了阻止\
  \ Android 杀死进程（进而杀死工作线程），我们需要告诉 Android 这个进程包含一个具有生命周期的组件，例如一个服务。因此，我们需要创建或启动那个服务。服务本身不能直接执行超过\
  \ 5 秒的工作，因为这发生在主线程上，所以服务需要启动一个工作线程并释放主线程。\n- 在工作线程执行期间，我们需要持有部分唤醒锁，以防止设备进入休眠状态。部分唤醒锁允许设备在不打开屏幕等情况下运行代码，从而延长电池续航时间。\n\
  - 部分唤醒锁必须在接收器的主线代码中获取；否则就太晚了。例如，你不能在服务中执行此操作，因为从广播接收器发出 `startService()` 到服务的 `onStartCommand()`\
  \ 开始执行之间可能时间太长。\n- 由于我们创建了服务，服务本身可能会因为内存不足而被终止和重新启动。如果发生这种情况，我们需要重新获取唤醒锁。\n- 当由\
  \ `onStartCommand()` 启动的工作线程完成其工作时，它需要通知服务停止，以便服务可以结束运行，并且不会被 Android 重新唤醒。\n- 也有可能发生多个广播事件。鉴于此，我们需要谨慎考虑需要生成多少个工作线程。\n\
  \n鉴于这些事实，延长广播接收器生命周期的推荐协议如下：\n\n1.  在广播接收器的 `onReceive()` 方法中获取一个（静态的）部分唤醒锁。部分唤醒锁需要是静态的，以允许广播接收器和服务之间进行通信。没有其他方法可以将唤醒锁的引用传递给服务，因为服务是通过一个不接受参数的默认构造函数调用的。\n\
  2.  启动一个本地服务，这样进程就不会被杀死。\n3.  在服务中，启动一个工作线程来执行工作。不要在服务的 `onStart()` 方法中执行工作。如果这样做，基本上又会阻塞主线程。\n\
  4.  当工作线程完成时，直接或通过处理器告知服务自行停止。\n5.  让服务关闭静态唤醒锁。再次强调，静态唤醒锁是服务与其调用者（此处为广播服务）之间通信的唯一方式，因为无法将唤醒锁引用传递给服务。\n\
  \n#### IntentService\n\nAndroid 认识到服务不应阻塞主线程的需求，因此提供了一个名为 `IntentService` 的实用本地服务实现，用于将工作卸载到工作线程，以便在将工作调度到子线程后释放主线程。在这种方案下，当你对\
  \ `IntentService` 执行 `startService()` 时，`IntentService` 会使用一个循环器和处理器将该请求排队到子线程，以便调用\
  \ `IntentService` 的派生方法来执行实际工作。\n\n以下是 `IntentService` 的 API 文档说明：\n\n> `IntentService`\
  \ 是一个基类，用于按需处理异步请求（表示为 `Intent`）的服务。客户端通过 `startService(Intent)` 调用发送请求；该服务会按需启动，依次使用工作线程处理每个\
  \ `Intent`，并在没有工作时自行停止。这种“工作队列处理器”模式通常用于将任务从应用程序的主线程中卸载。`IntentService` 类的存在就是为了简化这种模式并处理其中的机制。要使用它，请扩展\
  \ `IntentService` 并实现 `onHandleIntent(Intent)`。`IntentService` 将接收 `Intent`，启动一个工作线程，并在适当的时候停止服务。所有请求都在单个工作线程上处理——它们可能需要任意长的时间（并且不会阻塞应用程序的主循环），但一次只会处理一个请求。\n\
  \n`IntentService` 的这个概念可以通过一个简单的示例清晰地展示，如代码清单 14-16 所示。你扩展 `IntentService` 并在 `onHandleIntent()`\
  \ 方法中提供你想要执行的操作。\n\n**代码清单 14-16.** *使用 IntentService*\n\n```\npublic class MyService\
  \ extends IntentService\n{\n    protected abstract void onHandleIntent(Intent intent)\n\
  \    {\n        Utils.logThreadSignature(\"MyService\");\n        //在此子线程中执行工作\n\
  \        //然后返回\n    }\n}\n```\n\n一旦你有了这样的服务，你可以在清单文件中注册此服务，并使用客户端代码调用此服务，如 `context.startService(new\
  \ Intent(MyService.class))`。此调用将导致调用代码清单 14-16 中的 `onHandleIntent()` 方法。\n\n你会注意到\
  \ `logThreadSignature()` 方法将打印工作线程的 ID，而不是主线程的（请记住这只是伪代码；我们稍后会提供真实代码）。\n\n\n\n####\
  \ IntentService 源码解析\n\n在第 13 章中，我们介绍了主线程以及处理程序的作用。在此背景下，研究 `IntentService` 的源码非常有启发性，因为它展示了如何使用处理程序和主线程来配合一个利用工作线程的长时间运行的服务。现在，让我们来审视清单\
  \ 14–17 中 `IntentService` 的源码（取自 Android 源码发行版）。\n\n**清单 14–17.** *IntentService\
  \ 源码*\n\n```\npublic abstract class IntentService extends Service {\n    private\
  \ volatile Looper mServiceLooper;\n    private volatile ServiceHandler mServiceHandler;\n\
  \    private String mName;\n\n    private final class ServiceHandler extends Handler\
  \ {\n        public ServiceHandler(Looper looper) {\n            super(looper);\n\
  \        }\n        @Override\n        public void handleMessage(Message msg) {\n\
  \            onHandleIntent((Intent)msg.obj);\n            stopSelf(msg.arg1);\n\
  \        }\n    }\n\n    public IntentService(String name) {\n        super();\n\
  \        mName = name;\n    }\n    @Override\n    public void onCreate() {\n   \
  \     super.onCreate();\n        HandlerThread thread =\n          new HandlerThread(\"\
  IntentService[\" + mName + \"]\");\n        thread.start();\n\n        mServiceLooper\
  \ = thread.getLooper();\n        mServiceHandler = new ServiceHandler(mServiceLooper);\n\
  \    }\n\n    @Override\n    public void onStart(Intent intent, int startId) {\n\
  \        super.onStart(intent, startId);\n        Message msg = mServiceHandler.obtainMessage();\n\
  \        msg.arg1 = startId;\n        msg.obj = intent;\n        mServiceHandler.sendMessage(msg);\n\
  \    }\n    @Override\n    public void onDestroy() {\n        mServiceLooper.quit();\n\
  \    }\n    @Override\n    public IBinder onBind(Intent intent) {\n        return\
  \ null;\n    }\n    protected abstract void onHandleIntent(Intent intent);\n}\n\
  ```\n\n让我们逐步解释这段代码：\n\n1.  在服务的 `onCreate()` 方法中创建一个独立的工作线程。通常，你可能会在服务的 `onStartCommand`\
  \ 方法中启动工作线程。然而，那样会导致创建多个工作线程，每次调用 `startService` 都会产生一个。`IntentService` 希望通过一个单独的工作线程来处理所有\
  \ `startService` 的调用，因此我们在 `onCreate` 方法中设置工作线程，该方法只会被调用一次。\n2.  在该工作线程上设置一个 looper（并由此建立一个用于接收和分发消息的队列）。这使得同一个工作线程可以逐一响应多条消息，而不是为每个请求都创建一个新的工作线程。\n\
  3.  建立一个指向工作线程的句柄，以便服务的主线程可以通过该处理程序投递消息。我们需要这个工作线程，因为每次客户端调用 `startService()` 时，该调用都会到达\
  \ `IntentService` 的主线程，而我们不希望阻塞 `IntentService` 的主线程。我们需要一种机制来将这个请求排队，以便工作线程在空闲时处理它。通过让主线程持有工作线程的处理程序可以实现这一点。注意运行在主线程上的\
  \ `onStart()` 方法。如果你想验证这一点，可以重写此方法并在日志中记录线程特征的同时调用其父方法。你会看到 `onStart()` 运行在主线程上，而\
  \ `onHandleMessage()` 运行在辅助工作线程上。\n4.  最后，当 `onHandleIntent()` 返回时，处理程序将调用服务的 `stopSelf()`。如果没有待处理的消息，这个\
  \ `stopSelf()` 会成功停止服务。`stopSelf()` 方法使用引用计数。这意味着即使多次调用它，也必须存在相同数量的 `startService`\
  \ 调用。这就是为什么我们能够在处理每次 `startService` 调用后调用 `stopSelf()`。\n\n### 为广播接收器扩展 IntentService\n\
  \n从广播接收器的角度来看，`IntentService` 是一个很棒的东西。它允许我们执行长时间运行的代码，而不会阻塞主线程。那么，我们可以使用 `IntentService`\
  \ 来满足长时间运行操作的需求吗？答案是：既是也不是。\n\n说是，是因为 `IntentService` 做了两件事：首先，它保持进程运行，因为它是一个服务。其次，它释放主线程并避免相关的\
  \ ANR（无响应）消息。\n\n要理解“不是”这个答案，你需要更深入地理解唤醒锁。当广播接收器被调用时，尤其是通过闹钟管理器调用时，设备可能没有开启。因此闹钟管理器通过调用电源管理器并请求一个唤醒锁来部分开启设备（足以运行代码而无需任何用户界面）。一旦广播接收器返回，这个唤醒锁就会被释放。\n\
  \n这使得 `IntentService` 的调用失去了唤醒锁，因此在实际代码运行之前，设备可能会进入休眠状态。然而，`IntentService` 作为服务的一个通用扩展，并不会主动获取唤醒锁。\n\
  \n因此，我们需要在 `IntentService` 之上进一步支持。我们需要一个抽象层。\n\nMark Murphy 创建了一个 `IntentService`\
  \ 的变体，名为 `WakefulIntentService`，它保留了使用 `IntentService` 的语义，同时还获取唤醒锁，并在各种条件下正确地释放它。你可以在\
  \ `http://github.com/commonsguy/cwac-wakeful` 查看其实现。\n\n\n\n#### 长时间运行的广播服务抽象\n\n\
  `WakefulIntentService` 是一个不错的抽象。然而，我们希望更进一步，使我们的抽象能够像 清单 14–14 中扩展 `IntentService`\
  \ 的方法那样，完成 `IntentService` 所能做的一切，并额外提供以下优势：\n\n1.  获取和释放唤醒锁（类似于 `WakefulIntentService`）。\n\
  2.  将传递给广播接收器的原始 Intent 传递给重写的方法 `onHandleIntent`。这让我们在很大程度上隐藏了广播接收器。\n3.  处理服务被重启的情况。\n\
  4.  提供一种统一的方式来处理同一进程中多个接收器和多个服务的唤醒锁。\n\n我们将这个抽象类命名为 `ALongRunningNonStickyBroadcastService`。顾名思义，我们希望此服务能够执行长时间运行的工作。它还将专门为广播接收器构建。此服务也将是非粘性的（我们将在本章后面解释这个概念，但简而言之，这意味着如果队列中没有消息，Android\
  \ 将不会启动该服务）。为了体现 `IntentService` 的行为，它将扩展 `IntentService` 并重写 `onHandleIntent` 方法。\n\
  \n综合这些想法，抽象的 `ALongRunningNonStickyBroadcastService` 服务的签名将如 清单 14–18 所示。\n\n**清单\
  \ 14–18.** *长时间运行服务抽象概念*\n\n```\npublic abstract class ALongRunningNonStickyBroadcastService\n\
  extends IntentService\n{\n...其他实现细节\nprotected abstract void\nhandleBroadcastIntent(Intent\
  \ broadcastIntent);\n...其他实现细节\n\n}\n```\n\n`ALongRunningNonStickyBroadcastService`\
  \ 的实现细节相当复杂，我们将在解释为何要追求此类服务后，稍后介绍。我们想先展示拥有它的实用性和简单性。\n\n一旦我们有了这个抽象类，清单 14–16 中的\
  \ `MyService` 示例就可以重写为 清单 14–19 中的形式。\n\n**清单 14–19.** *长时间运行服务使用示例*\n\n```\npublic\
  \ class MyService extends ALongRunningNonStickyBroadcastService\n{\n    protected\
  \ abstract void handleBroadcastIntent(Intent broadcastIntent)\n    {\n        Utils.logThreadSignature(\"\
  MyService\");\n        //在此处执行工作\n        //然后返回\n    }\n}\n```\n\n如您所见，您可以扩展这个新的长时间运行服务类（就像\
  \ `IntentService` 和 `WakefulIntentService` 一样），重写一个方法，并且在广播接收器中几乎不需要做任何事。您的工作将在工作线程中完成（得益于\
  \ `IntentService`），而不会阻塞主线程。\n\n清单 14–19 是一个演示概念简单示例。现在让我们转向一个更完整的实现，它实现了一个可以响应广播事件运行\
  \ 60 秒的长时间运行服务（证明我们可以运行超过 10 秒而避免 ANR 消息）。我们将这个服务适当地命名为 `Test60SecBCRService`（“BCR”代表广播接收器），其实现如\
  \ 清单 14–20 所示。\n\n**清单 14–20.** *Test60SecBCRService*\n\n```\npublic class Test60SecBCRService\n\
  extends ALongRunningNonStickyBroadcastService\n{\n   public static String tag =\
  \ \"Test60SecBCRService\";\n   //IntentService 要求传入类名\n   public Test60SecBCRService(){\n\
  \      super(\"com.androidbook.service.Test60SecBCRService\");\n   }\n\n   /*\n\
  \    * 在此方法中执行长时间运行的操作。\n    * 此方法在单独的线程中执行。\n    */\n   @Override\nprotected void\
  \ handleBroadcastIntent(Intent broadcastIntent)\n   {\n      Utils.logThreadSignature(tag);\n\
  \      Log.d(tag,\"休眠 60 秒\");\nUtils.sleepForInSecs(60);\n      String message\
  \ =\n         broadcastIntent.getStringExtra(\"message\");\n      Log.d(tag,\"作业完成\"\
  );\n      Log.d(tag,message);\n   }\n}\n```\n\n如您所见，此代码成功模拟了工作 60 秒并仍然避免了 ANR 消息。您可能此刻会想，为什么无法编译这个类，因为我们没有给出抽象长时间运行服务类的实现。确实如此。请稍等，直到您完全理解此示例的所有部分，在解释过程中，您将看到所有类的实现代码。除了为您提供可在“参考资料”部分下载项目的\
  \ URL 之外，我们还会在后面给出编译此示例的具体说明。\n\n\n\n#### 长时间运行的接收器\n\n一旦我们有了清单 14–20 中的长时间运行服务，就需要能够从广播接收器中调用该服务。\n\
  \n长时间运行广播接收器的第一个目标是将工作委托给一个长时间运行的服务。为此，该接收器需要知道要调用的长时间运行服务的类名。\n\n第二个目标是在我们希望确保代码在接收器返回后能继续运行时，获取一个唤醒锁。\n\
  \n第三个目标是将触发广播接收器的原始 Intent 传递给服务。我们将通过把原始 Intent 作为可打包对象放入 Intent 的附加信息中来实现这一点，并使用`original_intent`作为这个附加信息的名称。然后，长时间运行服务会提取出`original_intent`，并将其传递给该服务中重写的方法（稍后你会在长时间运行服务的实现中看到这一点）。因此，这种机制给人的印象是，长时间运行服务实际上就是广播接收器的扩展。\n\
  \n虽然我们可以指示每个长时间运行的接收器每次都执行这两项操作，但更好的做法是将这些操作抽象出来，并提供一个基类。然后，这个长时间运行接收器的抽象类将通过一个名为`getLRSClass()`的抽象方法，让派生类提供长时间运行服务（LRS）的类名。\n\
  \n在我们让你继续了解这个抽象类的实现之前，必须先谈谈我们在唤醒锁方面采取的方向。唤醒锁需要在广播接收器及其调用的相应服务之间进行协调。虽然想法很简单，但在实现中，我们需要考虑许多需要执行此操作的位置和条件。因此，我们在概念上使用了一个名为`LightedGreenRoom`的概念来抽象唤醒锁。我们稍后会介绍这个类，但目前，只需将其视为一个你可以开启和关闭的唤醒锁。\n\
  \n综合这些需求，抽象类`ALongRunningReceiver`的实现的源代码如清单 14–21 所示。\n\n**清单 14–21.** *`ALongRunningReceiver`*\n\
  \n```\npublic abstract class  ALongRunningReceiver\nextends BroadcastReceiver\n\
  {\n    private static final String tag = \"ALongRunningReceiver\";\n    @Override\n\
  \    public void onReceive(Context context, Intent intent)\n    {\n       Log.d(tag,\"\
  Receiver started\");\n       //LightedGreenRoom 抽象了 Android 的唤醒锁，\n       //以保持设备部分开启。\n\
  \       //简而言之，这等同于开启或获取唤醒锁。\n       LightedGreenRoom.setup(context);\n       startService(context,intent);\n\
  \       Log.d(tag,\"Receiver finished\");\n    }\n    private void startService(Context\
  \ context, Intent intent)\n    {\n       Intent serviceIntent = new Intent(context,getLRSClass());\n\
  \       serviceIntent.putExtra(\"original_intent\", intent);\n       context.startService(serviceIntent);\n\
  \    }\n    /*\n     * 重写此方法以返回\n     * 非粘性服务类所属的\n     * \"class\" 对象。\n     */\n\
  \    public abstract Class getLRSClass();\n}\n```\n\n一旦有了这个抽象类，你就需要一个能与清单 14–16\
  \ 中的 60 秒长时间运行服务协同工作的接收器。清单 14–22 中提供了这样一个接收器。\n\n**清单 14–22.** *一个示例长时间运行广播接收器，`Test60SecBCR`*\n\
  \n```\npublic class Test60SecBCR\nextends ALongRunningReceiver\n{\n   @Override\n\
  \   public Class getLRSClass()\n   {\n      Utils.logThreadSignature(\"Test60SecBCR\"\
  );\n      return Test60SecBCRService.class;\n   }\n}\n```\n\n就像清单 14–19 和 14–20\
  \ 中的服务抽象一样，清单 14–22 中的代码为广播接收器使用了抽象。该接收器抽象会启动由`getLRSClass()`方法返回的服务类所指示的服务。\n\n\
  到目前为止，我们已经阐述了为什么需要这两个重要的抽象来实现由广播接收器调用的长时间运行服务，即：\n\n*   `ALongRunningNonStickyBroadcastService`\n\
  *   `ALongRunningReceiver`\n\n然而，由于涉及细节较多，我们推迟了其中一个类的实现展示。我们也没有介绍这两个抽象都使用的公共类`LightedGreenRoom`的实现。现在，我们已经到了可以解释并呈现这两个剩余类的代码的时候了。我们将从公共类`LightedGreenRoom`开始。\n\
  \n#### 使用 `LightedGreenRoom` 抽象唤醒锁\n\n如前所述，`LightedGreenRoom`抽象的主要目的是简化与唤醒锁的交互，而唤醒锁用于防止设备关机。清单\
  \ 14–23 展示了 SDK 中典型的唤醒锁使用方式。\n\n**清单 14–23.** *唤醒锁 API*\n\n```\n//获取电源管理服务的访问权限\n\
  PowerManager pm =\n   (PowerManager)inCtx.getSystemService(Context.POWER_SERVICE);\n\
  \n//获取一个唤醒锁\nPowerManager.WakeLock wl =\n   pm.newWakeLock(PowerManager.PARTIAL_WAKE_LOCK,\
  \ tag);\n\n//获取唤醒锁\nwl.acquire();\n\n//执行一些工作\n//在执行这些工作时，设备将保持部分开启状态\n\n//释放唤醒锁\n\
  wl.release();\n```\n\n基于这种交互，广播接收器应当获取锁，而当长时间运行服务完成时，它需要释放锁。然而，并没有很好的方法将唤醒锁变量从广播接收器传递给服务。服务唯一能知道这个唤醒锁的方式就是使用静态变量或应用级别的变量。\n\
  \n获取和释放唤醒锁的另一个难点在于引用计数。因此，当一个广播接收器被多次调用时，如果这些调用有重叠，就会多次调用获取唤醒锁的方法。同样，也会有多次调用释放方法。如果获取和释放调用的次数不匹配，最坏的情况是，唤醒锁会让设备保持开启的时间远超所需。此外，当服务不再需要、垃圾回收运行时，如果唤醒锁计数不匹配，LogCat\
  \ 中将会出现运行时异常。\n\n这些问题促使我们尽力对唤醒锁进行抽象，以确保正确使用。\n\n**注意：** 既然你已经了解了这些问题和唤醒锁的必要性，我们鼓励你研究一下`LightedGreenRoom`，如果发现更简单的方法，可以用其他类替换它。这个免责声明是为了向你保证`LightedGreenRoom`并没有什么神奇之处，其核心非常简单。\n\
  \n现在，我们将解释将唤醒锁视为`LightedGreenRoom`的概念思路。\n\n\n\n### 亮灯候演室\n\n我们先从一间“候演室”说起，这是一间允许访客进入的房间。房间初始时是黑暗的，第一位进入的人会打开灯。如果灯已经亮了，后续访客则不产生影响。最后离开的访客会关掉灯。它被称为“候演室”（green\
  \ room），是因为它高效利用能源。`enter` 和 `leave` 方法需要被同步以保持其状态，因为它们可能发生在多个线程之间。\n\n那么，什么是“亮灯候演室”呢？不同于灯灭状态下开始的候演室，亮灯候演室在第一位访客到达之前，甚至就已经亮着灯。我们可以假设，如果灯是灭的，访客就找不到进入候演室的路了。这对应于这样一个事实：如果一个设备处于关闭状态，即使有服务也无法运行。尽管如此，最后离开的人仍会关灯。这对于广播接收器来说非常有用，因为它需要先打开灯，然后转移到服务。\n\
  \n启动一个服务被视为相当于一位访客进来。停止一个服务则等同于一位访客离开房间。请注意，你需要区分服务的*创建*和*启动*。每个服务只会发生一次创建和销毁，而启动和停止可以发生多次。\n\
  \n在接收器中设置唤醒锁（即亮灯候演室）和启动服务（实质上是调用 `onStartCommand`，让第一位访客进入房间）之间，可能存在（而且通常存在）一个时间延迟。\n\
  \n因为 `wakelock` 是引用计数的，如果一个服务因内存不足而要被关闭，我们希望显式地释放锁。如果你使用同一个亮灯候演室来服务多个服务，你可能希望跟踪最后一个被销毁的服务，并且仅当该服务结束后才释放锁。\n\
  \n为了支持这种模式，我们将创建一个客户端。每个服务都将作为客户端注册到亮灯候演室，这样它的销毁方法就能正常工作。\n\n在此基础上，我们需要跟踪每个 `startService`\
  \ 的 `enter` 和 `leave`。\n\n### 亮灯候演室实现\n\n结合上一节的所有概念，亮灯候演室的实现如清单 14–24 所示。请注意，根据我们有限的测试，这似乎工作良好。请根据您的需求自行调试和调整，因为我们很难考虑到您开发环境中可能存在的每一种可能性。（换句话说，请将这个示例视为实验性的。）\n\
  \n**清单 14–24.** *亮灯候演室实现*\n\n```\npublic class LightedGreenRoom\n{\n   //调试标签\n\
  \   private static String tag=\"LightedGreenRoom\";\n\n   //记录访客数量以识别最后一位访客。\n \
  \  //销毁时，将计数归零以清空房间。\n   private int count;\n\n   //创建唤醒锁所需\n   private Context\
  \ ctx = null;\n\n   //我们的开关\n   PowerManager.WakeLock wl = null;\n\n   //多客户端支持\n\
  \   private int clientCount = 0;\n\n   /*\n    * 这预期是一个单例。\n    * 可以将构造函数设为私有。\n\
  \    */\n   public LightedGreenRoom(Context inCtx)\n   {\n      ctx = inCtx;\n \
  \     wl = this.createWakeLock(inCtx);\n   }\n\n   /*\n    * 使用静态方法设置候演室。\n    *\
  \ 这必须在调用任何其他方法之前调用。\n    * 它的作用是：\n    *       1. 实例化对象\n    *       2. 获取锁以打开灯\n\
  \    * 假设：\n    *       不需要同步，\n    *       因为它会从主线程调用。\n    *       （可能不正确。需要验证！！）\n\
  \    */\n   private static LightedGreenRoom s_self = null;\n\n   public static void\
  \ setup(Context inCtx)\n   {\n      if (s_self == null)\n      {\n         Log.d(LightedGreenRoom.tag,\"\
  创建候演室并开灯\");\n         s_self = new LightedGreenRoom(inCtx);\n         s_self.turnOnLights();\n\
  \      }\n        }\n        public static boolean isSetup()\n   {\n      return\
  \ (s_self != null) ? true: false;\n   }\n\n   /*\n    * \"enter\" 和 \"leave\" 方法\n\
  \    * 应成对调用。\n    *\n    * \"enter\" 时递增计数。\n    *\n    * 不开关灯，\n    * 因为灯已经亮了。\n\
  \    *\n    * 仅递增计数以知晓\n    * 最后一位访客何时离开。\n    *\n    * 这是一个同步方法，因为\n    * 多个线程将进行进入和离开操作。\n\
  \    *\n    */\n   synchronized public int enter()\n   {\n      count++;\n     \
  \ Log.d(tag,\"一位新访客: 计数:\" + count);\n      return count;\n   }\n   /*\n    * \"\
  enter\" 和 \"leave\" 方法\n    * 应成对调用。\n    *\n    * \"leave\" 时递减计数。\n    *\n   \
  \ * 如果计数归零，则关灯。\n    *\n    * 这是一个同步方法，因为\n    * 多个线程将进行进入和离开操作。\n    *\n    */\n\
  \   synchronized public int leave()\n   {\n      Log.d(tag,\"离开房间: 调用时计数:\" + count);\n\
  \      //如果计数已经为零\n      //直接离开。\n      if (count == 0)\n      {\n         Log.w(tag,\"\
  计数为零。\");\n         return count;\n      }\n      count--;\n      if (count == 0)\n\
  \      {\n         //最后一位访客\n         //关灯\n         turnOffLights();\n      }\n\
  \      return count;\n   }\nsynchronized public int getCount()\n   {\n      return\
  \ count;\n   }\n\n   /*\n    * 获取唤醒锁以打开灯\n    * 由其他同步方法在适当时间调用\n    */\n   private\
  \ void turnOnLights()\n   {\n      Log.d(tag, \"开灯。计数:\" + count);\n      this.wl.acquire();\n\
  \   }\n```\n\n\n\n```java\n/*\n * 释放唤醒锁以关闭灯光。\n * 由其他同步方法在适当时机调用此方法。\n */\nprivate\
  \ void turnOffLights()\n{\n    if (this.wl.isHeld())\n    {\n        Log.d(tag,\"\
  释放唤醒锁。没有更多访问者了\");\n        this.wl.release();\n    }\n}\n/*\n * 创建部分唤醒锁的标准代码\n\
  \ */\nprivate PowerManager.WakeLock createWakeLock(Context inCtx)\n{\n    PowerManager\
  \ pm =\n        (PowerManager)inCtx.getSystemService(Context.POWER_SERVICE);\n\n\
  \    PowerManager.WakeLock wl = pm.newWakeLock\n         (PowerManager.PARTIAL_WAKE_LOCK,\
  \ tag);\n    return wl;\n}\n\nprivate int registerClient()\n{\n    Utils.logThreadSignature(tag);\n\
  \    this.clientCount++;\n    Log.d(tag,\"注册新客户端:计数:\" + clientCount);\n    return\
  \ clientCount;\n}\n\nprivate int unRegisterClient()\n{\n    Utils.logThreadSignature(tag);\n\
  \    Log.d(tag,\"注销客户端:计数:\" + clientCount);\n    if (clientCount == 0)\n    {\n\
  \        Log.w(tag,\"没有客户端需要注销。\");\n        return 0;\n    }\n    //clientCount\
  \ 不为零\n    clientCount--;\n    if (clientCount == 0)\n    {\n        emptyTheRoom();\n\
  \    }\n    return clientCount;\n}\nsynchronized public void emptyTheRoom()\n{\n\
  \    Log.d(tag, \"调用清空房间\");\n    count = 0;\n    this.turnOffLights();\n}\n//*************************************************\n\
  //*  静态成员：纯辅助方法\n//*  委托给底层单例对象\n//*************************************************\n\
  public static int s_enter()\n{\n    assertSetup();\n    return s_self.enter();\n\
  }\npublic static int s_leave()\n{\n    assertSetup();\n    return s_self.leave();\n\
  }\n//不要直接调用此方法\n//可能会被弃用。\n//请改用 register 和 unregister client 方法\npublic static\
  \ void ds_emptyTheRoom()\n{\n    assertSetup();\n    s_self.emptyTheRoom();\n  \
  \  return;\n}\npublic static void s_registerClient()\n{\n    assertSetup();\n  \
  \  s_self.registerClient();\n    return;\n}\npublic static void s_unRegisterClient()\n\
  {\n    assertSetup();\n    s_self.unRegisterClient();\n    return;\n}\nprivate static\
  \ void assertSetup()\n{\n    if (LightedGreenRoom.s_self == null)\n    {\n     \
  \   Log.w(LightedGreenRoom.tag,\"你需要先调用 setup\");\n        throw new RuntimeException(\"\
  你需要先设置 GreenRoom\");\n    }\n}\n```\n\n广播接收器和服务之间通信的一个合理方式是通过静态变量。我们没有将`wakelock`设为静态，而是将整个`LightedGreenRoom`设为一个静态实例。不过，`LightedGreenRoom`内部的其他所有变量都保持局部且非静态。\n\
  \n为了方便起见，`LightedGreenRoom`的每个公有方法也都以静态方法的形式暴露出来。你也可以选择去掉这些静态方法，直接调用`LightedGreenRoom`的单一对象实例。\n\
  \n### 长期运行服务的实现\n\n现在`LightedGreenRoom`的实现已经完成，我们几乎准备好要介绍长期运行服务的抽象了。不过，我们还需要绕一点路，来解释一下服务的生命周期，以及它如何与`onStartCommand`的实现相关联。这个方法最终负责启动工作线程，并决定了服务的语义。\n\
  \n你知道广播接收器通过调用`startService`来启动服务，而这个调用会导致调用服务的`onStartCommand`方法。服务的生命周期由此方法的返回值来控制。\n\
  \n要理解此方法中发生了什么，你需要详细了解本地服务的本质。我们在第 11 章中已经介绍了本地服务的基础知识，现在需要更深入地探讨一下。\n\n当一个服务启动时，它首先会被创建，然后调用其`onStartCommand`方法。Android\
  \ 有充分的机制来确保此进程保留在内存中，以便服务可以服务传入的客户端请求。\n\n服务进程保留在内存中和正在运行是有区别的。服务只有在响应`startService`（这会调用其`onStartCommand`方法）时才会运行。仅仅因为此方法没有执行，并不意味着服务进程不在内存中。有时，人们将此称为服务正在运行，即使它只是待在那里占用一些资源，但实际上并没有执行任何操作。这通常就是\
  \ Android 声称它让服务保持运行时所指的意思。\n\n实际上，如果一次`startService`调用（导致`onStartCommand`被执行）花费超过\
  \ 5 到 10 秒，这将导致 ANR 消息，并可能终止托管服务的进程。如果没有工作线程，服务无法运行超过 10 秒。所以你应该区分“可用的服务”和“正在运行的服务”。\n\
  \nAndroid 会尽力让服务在内存中保持可用。然而，在内存紧张的情况下，Android 可能会选择回收该进程，并调用服务的`onDestory()`方法。Android\
  \ 会尽量在服务未执行其`onCreate()`、`onStart()`或`onDestroy()`方法时进行此操作。\n\n但是，与一个被关闭的 Activity\
  \ 不同，如果队列中还有待处理的`startService`意图，那么当资源可用时，服务会被安排重新启动。服务会被唤醒，并通过`onStartCommand()`接收下一个意图。当然，当服务被恢复时，`onCreate()`会被调用。因为服务会不断被重启，所以有理由认为，与\
  \ Activity 和其他组件不同，*服务组件本质上是一个粘性组件*。\n\n#### 非粘性服务的细节\n\n那么什么才是非粘性服务呢？\n\n我们来讨论一种服务不会自动重启的情况。客户端调用`startservice`后，服务被创建并调用`OnStartCommand`来执行其工作。如果客户端显式调用`stopservice`，此服务将不会自动重启。\n\
  \n这个`stopservice`，取决于还有多少客户端连接着，可以将服务置于停止状态，此时服务的`onDestroy`方法会被调用，服务的生命周期就结束了。一旦服务被其最后一个客户端如此停止，它就不会再被恢复。\n\
  \n当一切都按设计发生时，这个协议运行得很好，即 start 和 stop 方法被依次调用且无遗漏地执行。\n\n在 Android 2.0 之前，设备上有很多服务即使没有工作要做也徘徊在内存中并占用资源，这意味着\
  \ Android 将服务恢复到了内存中，即使队列中没有消息。这种情况发生在`stopService`没有被调用时，可能是因为异常，也可能是因为进程在`onStartCommand`和`stopService`之间被移除了。\n\
  \nAndroid 2.0 引入了一个解决方案，使得我们可以指示：如果没有待处理的意图，就不必费心重启服务。这没问题，因为任何启动服务来做工作的组件（比如闹钟管理器）都会再次调用它。这是通过从`onStartCommand`返回非粘性标志（`Service.START_NOT_STICKY`）来实现的。\n\
  \n然而，非粘性其实并不那么非粘性。记住，即使我们将服务标记为非粘性，如果有待处理的意图，Android 仍然会让服务复活。此设置仅在没有待处理意图时适用。\n\
  \n\n好的，作为一名高级文档工程师和翻译员，我将严格按照您的要求，将给定的英文文本翻译成中文。\n\n\n#### 粘性服务的细节\n\n那么，一个服务真正做到“粘性”意味着什么？\n\
  \n粘性标志（`Service.START_STICKY`）意味着即使没有待处理的 Intent，Android 也应重启该服务。当服务重启时，会使用一个空的\
  \ intent 调用 `onCreate` 和 `onStartCommand`。这将给服务一个机会，在必要时，如果合适的话，可以调用 `stopSelf`。这意味着，一个粘性服务需要在重启时处理空的\
  \ intent。\n\n#### 非粘性的一种变体：重新发送 Intent\n\n本地服务尤其遵循一种模式，即 `onStart` 和 `stopSelf`\
  \ 成对调用。客户端调用 `onStart`。当服务完成该工作时，调用 `stopSelf`。在 清单 14–15 中 `IntentService` 实用工具类的实现中，你可以清楚地看到这一点。\n\
  \n如果一个服务需要，比如说，30 分钟来完成一项任务，那么它在这 30 分钟内不会调用 `stopSelf`。与此同时，服务可能被系统回收。如果我们使用非粘性标志，服务将不会被唤醒，并且我们永远无法调用\
  \ `stopSelf`。\n\n很多时候，这是可以接受的。但是，如果你想确保这两个调用一定会发生，你可以告诉 Android 在调用 `stopSelf` 之前，不要将\
  \ `start` 事件出队。这确保了当服务被回收时，除非调用了 `stopSelf`，否则总会有一个待处理的事件。这被称为 `redeliver` 模式，可以通过在\
  \ `onStartCommand` 方法中返回 `Service.START_REDELIVER_INTENT` 标志来指示。\n\n#### 在 OnStartCommand\
  \ 中指定服务标志\n\n有趣的是，粘性是与 `onStartCommand` 关联的，而不是与 `onCreate` 关联的。这有点奇怪，因为到目前为止，我们一直在讨论服务处于\
  \ `sticky`、`nonsticky` 或 `redeliver` 模式，就好像这些是服务级别的属性一样。然而，对服务性质的这种判定是基于 `onStartCommand`\
  \ 的返回值做出的。想知道这其中的目的是什么吗？我们也是。因为，对于同一个服务实例，`onStartCommand` 会被调用多次，每次调用 `startService`\
  \ 都会调用一次。如果该方法返回不同的标志来表示不同的服务行为会怎样？也许最好的猜测是，由最后一次返回的值来决定。\n\n#### 选择合适的粘性\n\n考虑到服务可能的行为组合，哪种类型的服务适合长时间运行的广播接收器？我们认为，一个简单的、非粘性的服务就足够了，它假定如果没有待处理的消息在队列中，服务就会停止。我们很难想到粘性长时间运行的广播接收器有什么用例，特别是如果我们想使用\
  \ `IntentService`，它期望在没有待处理的 Intent 时服务停止。\n\n你将在即将到来的 清单 14–19 中看到我们长时间运行服务抽象的实现中得出的这个结论，我们在其中返回了非粘性标志。\n\
  \n#### 从两个地方控制唤醒锁\n\n在展示长时间运行服务的源代码之前，让我们先谈谈服务在保持设备唤醒方面的职责。\n\n当服务代码在运行时，我们应该让部分唤醒锁生效。为此，当服务被创建时，我们需要通过创建“点亮的绿灯房间”来打开唤醒锁。你可能会说，这是由广播接收器完成的，没错。然而，服务可能会被自己唤醒，在这种情况下，我们就会错过设置“点亮的房间”。所以我们需要从两个地方来控制唤醒锁。\n\
  \n清单 14–18 中的长时间运行广播接收器代码使用 `LightedGreenRoom.setup()` 初始化唤醒锁。我们将在服务创建回调中做同样的事情。\n\
  \n除了设置点亮的绿灯房间，我们的服务还需要将自己注册为该房间的客户端。这允许在服务组件通过 `onDestroy()` 被销毁时进行清理。\n\n#### 长时间运行服务的实现\n\
  \n现在你已经了解了 `IntentService`、服务启动标志和点亮的绿灯房间的背景知识，我们准备在 清单 14–25 中查看长时间运行的服务。\n\n**清单\
  \ 14–25.** *一个长时间运行的服务*\n\n```\npublic abstract class ALongRunningNonStickyBroadcastService\n\
  extends IntentService\n{\n    public static String tag = \"ALongRunningBroadcastService\"\
  ;\n    protected abstract void\n    handleBroadcastIntent(Intent broadcastIntent);\n\
  \n    public ALongRunningNonStickyBroadcastService(String name){\n        super(name);\
  \    \n    }    \n    /*\n     * 此方法可以在两种情况下被调用\n     * 1. 当广播接收器发出 \"startService\"\
  \ 时\n     * 2. 当 Android 由于待处理的 \"startService\" intent 而重启它时。\n     *\n     * 在情况\
  \ 1 中，广播接收器已经\n     * 设置好了 \"lightedgreenroom\"。\n     *\n     * 在情况 2 中，我们需要做同样的事情。\n\
  \     */\n    @Override\n    public void onCreate()\n    {\n        super.onCreate();\n\
  \n        //设置绿灯房间\n        //此 setup 方法可以多次调用。\n        LightedGreenRoom.setup(this.getApplicationContext());\n\
  \n        //可能存在多个此类型的服务在运行。\n        //了解数量将允许我们在 onDestroy 中\n        //清理锁。\n\
  \        LightedGreenRoom.s_registerClient();\n    }\n    @Override\n    public\
  \ int onStartCommand(Intent intent, int flag, int startId)\n    {\n        //调用\
  \ IntentService 的 \"onStart\"\n        super.onStart(intent, startId);\n\n     \
  \   //告诉绿灯房间有访客来了\n        LightedGreenRoom.s_enter();\n\n        //标记此服务为非粘性\n\
  \        //意味着：如果没有待处理的 intent，不要重启服务。\n        return Service.START_NOT_STICKY;\n\
  \    }\n    /*\n     * 注意，此方法调用\n     * 在 IntentService 设置的二级线程中运行。\n     *\n  \
  \   * 从 IntentService 重写此方法。\n     * 检索原始的广播 Intent。\n     * 调用派生类来处理广播 Intent。\n\
  \     * 最后告诉点亮的房间你要离开了。\n     * 如果这是最后一个访客，那么锁\n     * 将被释放。\n     */\n    @Override\
  \    \n    final protected void onHandleIntent(Intent intent)\n    {        \n \
  \       try\n        {            \n            Intent broadcastIntent\n       \
  \     = intent.getParcelableExtra(\"original_intent\");\n            handleBroadcastIntent(broadcastIntent);\n\
  \        }        \n        finally\n        {\n            LightedGreenRoom.s_leave();\n\
  \        }    \n    }\n    /*\n     * 如果 Android 回收此进程，\n     * 此方法将释放锁，\n     *\
  \ 无论有多少访客。\n     */\n    @Override\n    public void onDestroy() {\n        super.onDestroy();\n\
  \        LightedGreenRoom.s_unRegisterClient();\n    }\n}\n```\n\n显然，这个类继承自 `IntentService`，并获得了由\
  \ `IntentService` 设置的工作线程的所有好处。此外，它进一步特化了 `IntentService`，使其被设置为一个非粘性服务。从开发者的角度来看，需要关注的主要方法是抽象的\
  \ `handleBroadcastIntent()` 方法。\n\n\n\n#### 测试长时间运行的服务\n\n要测试此代码，您需要将以下额外文件添加到项目中：\n\
  \n*   `LightedGreenRoom.java` (清单 14–24)\n*   `ALongRunningNonStickyBroadcastService`\
  \ (清单 14–25)\n*   `ALongRunningReceiver.java` (清单 14–21)\n*   `Test60SecBCR.java`\
  \ (清单 14–22)\n*   `Test60SecBCRService.java` (清单 14–20)\n*   包含 60 秒接收器和服务器的更新清单文件\
  \ (清单 14–14)\n\nJava 源代码文件可在本章前面找到，现在我们来看一下清单文件中需要添加的额外条目，如清单 14–26 所示。\n\n**清单\
  \ 14–26.** *长时间运行的接收器和服务定义*\n\n```\n<manifest...>\n......\n<application....>\n<receiver\
  \ android:name=\".Test60SecBCR\">\n    <intent-filter>\n       <action android:name=\"\
  com.androidbook.intents.testbc\"/>\n    </intent-filter>\n</receiver>\n<service\
  \ android:name=\".Test60SecBCRService\"/>\n</application>\n.....\n<uses-permission\
  \ android:name=\"android.permission.WAKE_LOCK\"/>\n</manifest>\n```\n\n另请注意，您需要唤醒锁权限才能运行此长时间运行的接收器抽象。\n\
  \n### 编译代码的说明\n\n本章包含两个项目。一个用于测试广播接收器（我们称之为 TestBCR），另一个用于测试独立接收器，包括长时间运行的接收器和服务（我们称之为\
  \ StandaloneBCR）。这两个项目都已打包成 ZIP 文件并提供下载；其 URL 在“参考资料”部分列出。我们强烈建议您下载该 ZIP 文件并解压，以分别查看这些项目。\n\
  \n#### 从 ZIP 文件创建项目\n\n从 ZIP 文件创建项目的步骤如下：\n\n1.  下载 ZIP 文件。\n2.  解压文件，您将看到两个根目录，每个项目一个。对于每个项目，请执行以下操作：\n\
