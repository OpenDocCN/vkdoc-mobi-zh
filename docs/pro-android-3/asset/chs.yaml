  \ 19-1 所示。在本示例中，我们假设您使用的是 Android 2.2 或更高版本进行构建，因为我们使用了`Environment`的`getExternalStoragePublicDirectory()`方法。如果您要针对较旧版本的\
  \ Android 进行构建，只需改用`getExternalStorageDirectory()`，并调整媒体文件的存放位置，以便您的应用程序能够找到它们。\n\
