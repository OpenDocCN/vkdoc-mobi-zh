  \ 23–15.** *搜索调用 Activity*\n\n在此 Activity 中，如果你点击搜索菜单选项，它将调用熟悉的全局搜索 QSB，如图 23–2\
  \ 所示。由于我们还重写了基础 Activity 的 `onSearchRequested()`，设备搜索键也将调出全局 QSB。\n\n\n\n### 理解本地搜索及其相关活动\n\
  \n现在，我们来探讨一下在哪些情况下，搜索键会*不*触发全局搜索，而是调用本地搜索。但首先，我们需要进一步解释一下本地搜索。\n\n本地搜索包含三个组成部分。第一部分是一个搜索框，它与全局搜索框`QSB`非常相似（即便不完全相同）。无论是本地还是全局的`QSB`，都提供了用于输入文本的文本框和用于点击的搜索图标。当一个活动在其清单文件中声明它需要使用本地搜索时，通常会调用本地`QSB`而非全局`QSB`。你可以通过查看`QSB`的标题（参见后续图\
  \ 23-18 的标题）和`QSB`中的提示文本（搜索框内部的文字）来区分被调用的本地`QSB`和全局`QSB`。如你所见，这两个值来源于一个搜索元数据 XML\
  \ 文件。\n\n本地搜索的第二部分是一个活动，它能够从本地`QSB`接收搜索字符串，并显示一组与搜索文本相关的结果或任何输出。这个活动通常被称为搜索活动或搜索结果活动。\n\
  \n本地搜索可选的第三部分是一个允许调用刚才描述的搜索结果活动（即第二部分）的活动。这个调用活动通常称为搜索调用器或搜索调用活动。这个搜索调用器是可选的，因为全局搜索有可能通过建议直接调用本地搜索活动（即第二部分）。\n\
  \n你可以在图 23-16 中看到这三个组成部分以及它们之间是如何交互的。\n\n![images](img/2316.jpg)\n\n**图 23-16.**\
  \ *本地搜索活动交互*\n\n在图 23-16 中，重要的交互被标注为带注释的（圆圈数字）箭头。以下是更详细的解释：\n\n*   需要在清单文件中将`SearchActivity`定义为一个能够接收搜索请求的活动。`SearchActivity`还使用一个强制性的\
  \ XML 文件来声明本地`QSB`应该如何呈现（例如，带有标题、提示等），以及是否有关联的建议提供者。（参见清单 23-12）。在图 23-16 中，你可以看到这表现为`SearchActivity`与两个\
  \ XML 文件（清单文件和搜索元数据文件）之间的几条“定义”线。\n*   一旦`SearchActivity`在清单文件中被定义（参见清单 23-2），`SearchInvokingActivity`就会在清单文件中通过元数据定义`android.app.default_searchable`表明它与`SearchActivity`关联。\n\
  *   当两个活动的定义就位后，当`SearchInvokingActivity`获得焦点时，按下搜索键将调用本地`QSB`。你可以在图 23-16 中看到这一点——标为\
  \ 1 和 2 的圆圈。通过查看`QSB`的标题和提示，你可以判断被调用的`QSB`是本地`QSB`。这两个值是在强制性的搜索元数据 XML 定义中设置的。一旦通过搜索键调用了`QSB`，你就可以在`QSB`中输入查询文本。这个本地`QSB`与全局`QSB`类似，也具备提供建议的能力。你可以在图\
  \ 23-16 中看到这一点（圆圈 3）。\n*   一旦输入查询文本并点击搜索图标，本地`QSB`会将搜索请求传递给`SearchActivity`，由后者负责处理，例如显示一组结果。如图\
  \ 23-16（圆圈 4）所示。\n\n我们将通过查看源代码来检查这些交互。我们从清单 23-11 开始，即`SearchActivity`的源代码（再次提醒，它负责接收查询并显示搜索结果）。\n\
  \n**清单 23-11.** *SearchActivity 及其布局文件*\n\n```\n//文件名: SearchActivity.java\npublic\
  \ class SearchActivity extends Activity\n{\n    @Override\n    protected void onCreate(Bundle\
  \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.search_activity);\n\
  \        return;\n    }\n}\n```\n\n```\n//相应的 res/layout/search_activity.xml\n\n\
