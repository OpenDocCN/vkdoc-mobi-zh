  \n下面我们根据清单 27–26 中的代码来介绍每个函数的功能。`listContactCursorFields` 函数会读取整个联系人列表，并打印出游标中的列名。用于读取所有联系人的\
  \ URI 是 `ContactsContract.Contacts.CONTENT_URI`。\n\n你可以将此 URI 传递给 `managedQuery()`\
  \ 函数以获取游标。你可以将列投影设为 `null` 来接收所有列。虽然在实际中不推荐这样做，但在我们的场景下是合理的，因为我们希望了解它返回的所有列。清单 27–28\
  \ 包含了此 URI 返回的列列表。\n\n**清单 27–28.** *联系人内容 URI 游标列*\n\n```\ntimes_contacted;\ncontact_status;\n\
