  \ 23–1 和清单 23–2 中其余的活动注释掉。或者，你可以使用本示例开头列出的清单先编译整个应用程序，然后再继续。\n\n编译完应用程序并运行我们介绍的常规活动后，布局应如图\
  \ 23–12 所示。\n\n![images](img/2312.jpg)\n**图 23–12.** *常规活动/搜索交互*\n\n清单 23–5 展示了用于常规活动的菜单\
  \ XML 文件。你可以在图 23–13 中看到该菜单的实际效果。\n\n![images](img/2313.jpg)\n**图 23–13.** *访问其他测试活动*\n\
  \n现在，当此活动正在运行时（如图 23–12 所示），点击搜索键（请参阅图 23–1 以定位搜索键）。文档指出，这应该会调用全局搜索对话框。\n\n在 2.0\
  \ 之前的版本中，搜索键会触发全局搜索。在 2.2 和 2.3 版本中，按下搜索键不会调出全局搜索。\n\n如果你想强制此常规活动支持全局搜索，则需要重写 `onSearchRequested()`\
  \ 并执行以下操作：\n\n```java\n@Override\npublic boolean onSearchRequested()\n{\n    Log.d(tag,\"\
  onsearch request called\");\n    this.startSearch(\"test\",true,null,true);\n  \
  \  return true;\n}\n```\n\n将这段代码放入 `RegularActivity.java` 后，你可以按下搜索键，它将调用全局搜索。`startSearch()`\
  \ 方法及其参数将在本章后续部分介绍。此全局搜索的外观将与图 23–2 中的全局搜索完全相同。\n\n#### 禁用搜索的活动行为\n\n活动可以通过在其 `onSearchRequested()`\
  \ 回调方法中返回 `false` 来完全禁用搜索（包括全局搜索和本地搜索）。清单 23–6 展示了此类活动（我们将其命名为 `NoSearchActivity`）的源代码。\n\
  \n**清单 23–6.** *禁用搜索的活动*\n\n```java\n//filename: NoSearchActivity.java\npublic class\
  \ NoSearchActivity extends Activity\n{\n    @Override\n    protected void onCreate(Bundle\
  \ savedInstanceState) {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.no_search_activity);\n\
  \        return;\n    }\n    @Override\n    public boolean onSearchRequested()\n\
  \    {\n        return false;\n    }\n}\n```\n\n清单 23–7 展示了该活动对应的布局文件。\n\n**清单 23–7.**\
  \ *NoSearchActivity XML 文件*\n\n```xml\n//filename: layout/no_search_activity.xml\n\
  <?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout\n    android:orientation=\"\
  vertical\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  fill_parent\">\n    <TextView\n        android:id=\"@+id/text1\"\n        android:layout_width=\"\
  fill_parent\"\n        android:layout_height=\"wrap_content\"\n        android:text=\"\
  @string/no_search_activity_prompt\" />\n</LinearLayout>\n```\n\n准备好这两个文件（清单 23–6\
  \ 和 23–7）后，你需要在以下两个文件中取消注释一些部分：\n\n- `RegularActivity.java`（清单 23–1）\n- `AndroidManifest.xml`（清单\
  \ 23–2）\n\n在 `RegularActivity.java` 文件（清单 23–1）中，取消 `invokeNoSearchActivity()` 方法体内的\
  \ Java 代码注释。\n\n在 `AndroidManifest.xml`（清单 23–2）中，取消 `NoSearchActivity` 的活动定义注释。请注意，这是一个\
  \ XML 文件。注释和取消注释 XML 文件的方式与 Java 代码不同。\n\n完成这两项取消注释任务后，你将能够重新编译项目。现在，你可以通过点击图 23–13\
  \ 中的“No Search Activity”菜单项来调用这个 `NoSearchActivity`。\n\n显示时，该活动将如图图 23–14 所示。此时，按下搜索键将没有任何效果；你什么也不会看到。\n\
  \n![images](img/2314.jpg)\n**图 23–14.** *禁用搜索的活动*\n\n**提示：** 当有活动禁用了搜索时，点击搜索键不会调用本地或全局搜索。\n\
  \n\n\n#### 通过菜单显式调用搜索\n\n除了能够响应搜索键之外，Activity 还可以选择通过搜索菜单项显式调用搜索。代码清单 23–8 展示了实现此功能的示例\
  \ Activity（`SearchInvokerActivity`）的源代码。\n\n**代码清单 23–8.** *SearchInvokerActivity*\n\
  \n```java\n//filename: SearchInvokerActivity.java\npublic class SearchInvokerActivity\
  \ extends Activity\n{\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.search_invoker_activity);\n\
  \    }\n\n    @Override\n    public boolean onCreateOptionsMenu(Menu menu)\n   \
  \ {\n       super.onCreateOptionsMenu(menu);\n       MenuInflater inflater = getMenuInflater();\n\
  \       inflater.inflate(R.menu.search_invoker_menu, menu);\n       return true;\n\
  \    }\n\n    @Override\n    public boolean onOptionsItemSelected(MenuItem item)\n\
  \    {\n       appendMenuItemText(item);\n       if (item.getItemId() == R.id.mid_si_clear)\n\
  \       {\n          this.emptyText();\n          return true;\n       }\n     \
  \  if (item.getItemId() == R.id.mid_si_search)\n       {\n          this.invokeSearch();\n\
  \          return true;\n       }\n       return true;\n    }\n\n    private TextView\
  \ getTextView()\n    {\n        return (TextView)this.findViewById(R.id.text1);\n\
  \    }\n\n    private void appendMenuItemText(MenuItem menuItem)\n    {\n      \
  \ String title = menuItem.getTitle().toString();\n       TextView tv = getTextView();\n\
  \       tv.setText(tv.getText() + \"\\n\" + title);\n    }\n    private void emptyText()\n\
  \    {\n          TextView tv = getTextView();\n          tv.setText(\"\");\n  \
  \  }\n    private void invokeSearch()\n    {\n          this.onSearchRequested();\n\
  \    }\n    @Override\n    public boolean onSearchRequested()\n    {\n        this.startSearch(\"\
  test\",true,null,true);\n        return true;\n    }\n}\n```\n\n源代码的关键部分已加粗显示。请注意菜单\
  \ ID（`R.id.mid_si_search`）如何调用函数 `invokeSearch`，该函数将依次调用 `onSearchRequested()`。此方法\
  \ `onSearchRequested()` 会发起搜索。\n\n基础方法 `startSearch` 具有以下参数：\n\n- **initialQuery**：要搜索的文本。\n\
  - **selectInitialQuery**：一个布尔值，指示是否高亮显示搜索文本。本例中我们使用了 `true` 来高亮文本，以便在需要时可以删除并输入新文本。\n\
  - **appSearchData**：一个 Bundle 对象，用于传递给搜索 Activity。在我们的例子中，我们没有针对任何特定的搜索 Activity，因此传递了\
  \ `null`。\n- **globalSearch**：如果为 `true`，则调用全局搜索。如果为 `false`，则调用本地搜索（如果可用），否则调用全局搜索。\n\
  \nSDK 文档建议调用基础的 `onSearchRequested()`，这与我们在代码清单 23–8 中展示的不同。然而，默认的 `onSearchRequested()`\
  \ 对 `startSearch()` 的最后一个参数使用的是 `false`。根据文档，如果没有可用的本地搜索，这应该会调用全局搜索。但是，在本版本中（2.2\
  \ 和 2.3 版本），全局搜索并未被调用。这可能是一个 Bug，或者是有意为之，需要更新文档。\n\n在本示例中，我们通过向 `startSearch()`\
  \ 的最后一个参数传递 `true` 来强制进行全局搜索。\n\n代码清单 23–9 展示了此 Activity 的布局。\n\n**代码清单 23–9.**\
