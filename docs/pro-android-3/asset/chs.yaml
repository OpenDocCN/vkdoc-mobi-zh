  \ *OpenGL 测试工具驱动程序*\n\n现在，如果你点击“简单三角形”菜单项，你将看到如图 20–3 所示的三角形。\n\n![images](img/2003.jpg)\n\
  \n**图 20–3.** *一个简单的 OpenGL 三角形*\n\n### 更改摄像机设置\n\n为了更好地理解 OpenGL 坐标，让我们试验一下与摄像机相关的方法，看看它们如何影响我们在图\
  \ 20–3 中绘制的三角形。请记住，我们的三角形的顶点坐标为：`(-0.5,-0.5,0  0.5,-0.5,0    0,0.5,0)`。使用这些顶点，结合\
  \ `AbstractRenderer`（代码清单 20–9）中使用的以下三个摄像机相关方法，得到了图 20–3 中显示的三角形：\n\n```\n//从屏幕前方\
  \ 5 个单位处看向屏幕（原点）  \nGLU.gluLookAt(gl, 0,0,5,    0,0,0,   0,1,0);\n\n//设置高度为 2 个单位，深度为\
  \ 4 个单位\ngl.glFrustumf(-ratio, ratio, -1, 1, 3, 7);\n\n//常规窗口设置\ngl.glViewport(0,\
  \ 0, w, h);\n```\n\n现在，假设你将摄像机的朝向向量改为指向负 y 方向，如下所示：\n\n```\nGLU.gluLookAt(gl, 0,0,5,\
  \    0,0,0,   0,-1,0);\n```\n\n如果你这样做，你会看到一个倒置的三角形（图 20–4）。如果你想进行此更改，可以在 `AbstractRenderer.java`\
  \ 文件（代码清单 20–9）中找到要修改的方法。\n\n![images](img/2004.jpg)\n\n**图 20–4.** *摄像机倒置时的三角形*\n\
  \n现在让我们看看改变视景体（也称为视具体或视见箱）会发生什么。以下代码将视见箱的高度和宽度放大了 4 倍（参见图 20–1 以理解这些维度）。如果你还记得，`glFrustum`\
  \ 的前四个参数指向视见箱的前端矩形。通过将每个值乘以 4，我们将视见箱放大了四倍，如下所示：\n\n```\ngl.glFrustumf(-ratio * 4,\
  \ ratio * 4, -1 * 4, 1 *4, 3, 7);\n```\n\n使用这段代码，我们看到的三角形变缩小了，因为三角形保持相同的单位大小，而我们的视见箱变大了（图\
  \ 20–5）。此方法调用出现在 `AbstractRenderer.java` 类中（参见代码清单 20–9）。\n\n![images](img/2005.jpg)\n\
  \n**图 20–5.** *视见箱放大四倍后的三角形*\n\n\n\n### 使用索引添加另一个三角形\n\n我们将通过继承`AbstractRenderer`类，并简单地添加一个额外的点并使用索引来创建另一个三角形，以此结束这些简单的三角形示例。从概念上讲，我们将定义四个点为`(-1,-1,\
  \ 1,-1, 0,1, 1,1)`。然后，我们将要求 OpenGL 将这些点绘制为`(0,1,2 0,2,3)`。代码清单 20–17 展示了执行此操作的代码（请注意，我们更改了三角形的维度）。\n\
  \n**代码清单 20–17.** *SimpleTriangleRenderer2 类*\n\n```java\n//filename: SimpleTriangleRenderer2.java\n\
  public class SimpleTriangleRenderer2 extends AbstractRenderer\n{\n    private final\
  \ static int VERTS = 4;\n    private FloatBuffer mFVertexBuffer;\n    private ShortBuffer\
  \ mIndexBuffer;\n\n    public SimpleTriangleRenderer2(Context context)\n    {\n\
  \        ByteBuffer vbb = ByteBuffer.allocateDirect(VERTS * 3 * 4);\n        vbb.order(ByteOrder.nativeOrder());\n\
  \        mFVertexBuffer = vbb.asFloatBuffer();\n\n        ByteBuffer ibb = ByteBuffer.allocateDirect(6\
  \ * 2);\n        ibb.order(ByteOrder.nativeOrder());\n        mIndexBuffer = ibb.asShortBuffer();\n\
  \n        float[] coords = {\n                -1.0f, -1.0f, 0, // (x1,y1,z1)\n \
  \                1.0f, -1.0f, 0,\n                 0.0f,  1.0f, 0,\n           \
  \      1.0f,  1.0f, 0\n        };\n        for (int i = 0; i < VERTS; i++) {\n \
  \           for(int j = 0; j < 3; j++) {\n                mFVertexBuffer.put(coords[i*3+j]);\n\
  \            }\n        }\n        short[] myIndecesArray = {0,1,2,    0,2,3};\n\
  \        for (int i=0;i<6;i++)\n        {\n           mIndexBuffer.put(myIndecesArray[i]);\n\
  \        }\n        mFVertexBuffer.position(0);\n        mIndexBuffer.position(0);\n\
  \    }\n\n    protected void draw(GL10 gl)\n    {\n       gl.glColor4f(1.0f, 0,\
  \ 0, 0.5f);\n       gl.glVertexPointer(3, GL10.GL_FLOAT, 0, mFVertexBuffer);\n \
  \      gl.glDrawElements(GL10.GL_TRIANGLES, 6, GL10.GL_UNSIGNED_SHORT,\n       \
  \                                                       mIndexBuffer);\n    }\n\
  }\n```\n\n一旦这个 `SimpleTriangleRenderer2` 类就绪，我们就可以将代码清单 20–18 中的 if 条件代码添加到代码清单\
  \ 20–12 的 `MultiViewTestHarness` 中。\n\n**代码清单 20–18.** *使用 SimpleTriangleRenderer2*\n\
  \n```java\n     if (mid == R.id.mid_OpenGL_SimpleTriangle2)\n     {\n         mTestHarness.setRenderer(new\
  \ SimpleTriangleRenderer2(this));\n         mTestHarness.setRenderMode(GLSurfaceView.RENDERMODE_WHEN_DIRTY);\n\
  \         setContentView(mTestHarness);\n         return;\n     }\n```\n\n添加此代码后，我们可以再次运行程序，并选择菜单选项“Two\
  \ Triangles”来查看绘制出的两个三角形（请参见图 20–6）。请注意，`MultiViewTestHarness` 的设计如何帮助我们免去了创建新 Activity\
  \ 以及在清单文件中注册该 Activity 的步骤。对于后续的渲染器，我们将继续沿用这种添加额外 if 子句的模式。\n\n![images](img/2006.jpg)\n\
  \n**图 20–6.** *使用四个点绘制两个三角形*\n\n### 为简单 OpenGL 三角形添加动画\n\n我们可以通过更改 `GLSurfaceView`\
  \ 对象上的渲染模式来轻松实现 OpenGL 动画。代码清单 20–19 展示了示例代码。\n\n**代码清单 20–19.** *指定连续渲染模式*\n\n\
  ```java\n//get a GLSurfaceView\nGLSurfaceView openGLView;\n\n//Set the mode to continuous\
  \ draw mode\nopenGLView.setRenderingMode(GLSurfaceView.RENDERMODE_CONTINUOUSLY);\n\
  ```\n\n请注意，我们在此处展示如何更改渲染模式，因为在上一节中我们指定了 `RENDERMODE_WHEN_DIRTY`（请参见代码清单 20–18）。如前所述，`RENDERMODE_CONTINUOUSLY`\
  \ 是默认设置，因此默认情况下动画是启用的。\n\n一旦渲染模式为连续模式，就由渲染器的 `onDraw` 方法负责执行影响动画所需的操作。为了演示这一点，我们使用之前示例中绘制的三角形（请参见代码清单\
  \ 20–10 和图 20–3），并使其沿圆形路径旋转。\n\n#### AnimatedSimpleTriangleRenderer\n\n`AnimatedSimpleTriangleRenderer`\
  \ 类与 `SimpleTriangleRenderer` 非常相似（请参见代码清单 20–10），区别在于 `onDraw` 方法中的操作。在此方法中，我们每四秒设置一个新的旋转角度。随着图像被重复绘制，我们将看到三角形缓慢旋转。代码清单\
  \ 20–20 包含了 `AnimatedSimpleTriangleRenderer` 类的完整实现。\n\n**代码清单 20–20.** *AnimatedSimpleTriangleRenderer\
  \ 源代码*\n\n```java\n//filename: AnimatedSimpleTriangleRenderer.java\npublic class\
  \ AnimatedSimpleTriangleRenderer extends AbstractRenderer\n{\n   private int scale\
  \ = 1;\n   //Number of points or vertices we want to use\n    private final static\
  \ int VERTS = 3;\n\n    //A raw native buffer to hold the point coordinates\n  \
  \  private FloatBuffer mFVertexBuffer;\n\n    //A raw native buffer to hold indices\n\
  \    //allowing a reuse of points.\n    private ShortBuffer mIndexBuffer;\n\n  \
  \  public AnimatedSimpleTriangleRenderer(Context context)\n    {\n        ByteBuffer\
  \ vbb = ByteBuffer.allocateDirect(VERTS * 3 * 4);\n        vbb.order(ByteOrder.nativeOrder());\n\
  \        mFVertexBuffer = vbb.asFloatBuffer();\n\n        ByteBuffer ibb = ByteBuffer.allocateDirect(VERTS\
  \ * 2);\n        ibb.order(ByteOrder.nativeOrder());\n        mIndexBuffer = ibb.asShortBuffer();\n\
  \n        float[] coords = {\n                -0.5f, -0.5f, 0, // (x1,y1,z1)\n \
  \                0.5f, -0.5f, 0,\n                 0.0f,  0.5f, 0\n        };\n\
  \        for (int i = 0; i < VERTS; i++) {\n            for(int j = 0; j < 3; j++)\
  \ {\n                mFVertexBuffer.put(coords[i*3+j]);\n            }\n       \
  \ }\n        short[] myIndecesArray = {0,1,2};\n        for (int i=0;i<3;i++)\n\
  \        {\n           mIndexBuffer.put(myIndecesArray[i]);\n        }\n       \
  \ mFVertexBuffer.position(0);\n        mIndexBuffer.position(0);\n    }\n\n   //overridden\
  \ method\n    protected void draw(GL10 gl)\n    {\n       long time = SystemClock.uptimeMillis()\
  \ % 4000L;\n       float angle = 0.090f * ((int) time);\n\n       gl.glRotatef(angle,\
  \ 0, 0, 1.0f);\n\n       gl.glColor4f(1.0f, 0, 0, 0.5f);\n       gl.glVertexPointer(3,\
  \ GL10.GL_FLOAT, 0, mFVertexBuffer);\n       gl.glDrawElements(GL10.GL_TRIANGLES,\
  \ VERTS,\n                GL10.GL_UNSIGNED_SHORT, mIndexBuffer);\n    }\n}\n```\n\
  \n一旦这个 `AnimatedSimpleTriangleRenderer` 类就绪，我们就可以将代码清单 20–21 中的 if 条件代码添加到代码清单 20–12\
  \ 的 `MultiViewTestHarness` 中。\n\n**代码清单 20–21.** *使用 AnimatedSimpleTriangleRenderer*\n\
  \n```java\nif (mid == R.id.mid_OpenGL_AnimatedTriangle)\n{\n       mTestHarness.setRenderer(new\
  \ AnimatedSimpleTriangleRenderer(this));\n       setContentView(mTestHarness);\n\
  \       return;\n}\n```\n\n添加此代码后，我们可以再次运行程序，并选择菜单选项“Animated Triangle”来查看图 20–3\
  \ 中的三角形旋转。\n\n\n\n### 勇闯 OpenGL：图形与纹理\n\n在至今展示的示例中，我们都是显式指定三角形的顶点。一旦开始绘制正方形、五边形、六边形等图形，这种方法就会变得很不方便。对于这些图形，我们需要更高级别的对象抽象，例如图形甚至场景图，由图形来决定其坐标。使用这种方法，我们将展示如何在几何空间中的任意位置绘制任意边数的多边形。\n\
  \n在本节中，我们还将介绍 OpenGL 纹理。纹理允许你将位图和其他图片附着到绘图中的表面上。我们将拿已知如何绘制的多边形，并为其贴上一些图片。接着，我们将讨论\
  \ OpenGL 中的另一个关键需求：使用 OpenGL 绘制管线绘制多个图形或形状。\n\n这些基础知识应该能让你更进一步，开始创建可用的 3D 图形和场景。\n\
  \n#### 绘制一个矩形\n\n在进入图形的概念之前，我们先通过使用两个三角形绘制一个矩形，来巩固对显式顶点绘制的理解。这也将为将三角形扩展到任意多边形奠定基础。\n\
  \n我们已经具备了理解基本三角形的足够背景知识，以下是绘制矩形的代码（清单 20–22），之后是简要的注释。\n\n**清单 20–22.** *简单矩形渲染器*\n\
  \n```\npublic class SimpleRectangleRenderer extends AbstractRenderer\n{\n   //Number\
  \ of points or vertices we want to use\n    private final static int VERTS = 4;\n\
  \n    //A raw native buffer to hold the point coordinates\n    private FloatBuffer\
  \ mFVertexBuffer;\n\n    //A raw native buffer to hold indices\n    //allowing a\
  \ reuse of points.\n    private ShortBuffer mIndexBuffer;\n\n    public SimpleRectangleRenderer(Context\
  \ context)\n    {\n        ByteBuffer vbb = ByteBuffer.allocateDirect(VERTS * 3\
  \ * 4);\n        vbb.order(ByteOrder.nativeOrder());\n        mFVertexBuffer = vbb.asFloatBuffer();\n\
  \n        ByteBuffer ibb = ByteBuffer.allocateDirect(6 * 2);\n        ibb.order(ByteOrder.nativeOrder());\n\
  \        mIndexBuffer = ibb.asShortBuffer();\n\n        float[] coords = {\n   \
  \             -0.5f, -0.5f, 0, // (x1,y1,z1)\n                 0.5f, -0.5f, 0,\n\
  \                 0.5f,  0.5f, 0,\n                -0.5f,  0.5f, 0,\n        };\n\
  \n        for (int i = 0; i < VERTS; i++) {\n            for(int j = 0; j < 3; j++)\
  \ {\n                mFVertexBuffer.put(coords[i*3+j]);\n            }\n       \
  \ }\n        short[] myIndecesArray = {0,1,2,0,2,3};\n        for (int i=0;i<6;i++)\n\
  \        {\n           mIndexBuffer.put(myIndecesArray[i]);\n        }\n       \
  \ mFVertexBuffer.position(0);\n        mIndexBuffer.position(0);\n    }\n\n   //overriden\
  \ method\n    protected void draw(GL10 gl)\n    {\n       gl.glColor4f(1.0f, 0,\
  \ 0, 0.5f);\n       gl.glVertexPointer(3, GL10.GL_FLOAT, 0, mFVertexBuffer);\n \
  \      gl.glDrawElements(GL10.GL_TRIANGLES, 6,\n                GL10.GL_UNSIGNED_SHORT,\
  \ mIndexBuffer);\n    }\n}\n```\n\n请注意，绘制矩形的方法与绘制三角形非常相似。我们指定了四个顶点而不是三个。然后我们使用了如下索引：\n\
  \n```\n     short[] myIndecesArray = {0,1,2,0,2,3};\n```\n\n我们将编号的顶点（0 到 3）重复使用了两次，这样每三个顶点构成一个三角形。因此\
  \ (0,1,2) 构成第一个三角形，(0,2,3) 构成第二个三角形。使用 `GL_TRIANGLES` 图元绘制这两个三角形，就能绘制出所需的矩形。\n\n\
  一旦这个矩形渲染器类就位，我们就可以将 清单 20–23 中的 if 条件代码添加到 清单 20–12 的 `MultiViewTestHarness` 中。\n\
