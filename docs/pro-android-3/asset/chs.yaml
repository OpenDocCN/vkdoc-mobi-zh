  \ 0）。我们通过 `getAction()` 方法来了解这一点。请参考 `MainActivity.java` 中的 `describeEvent()` 方法，以了解哪些方法产生了哪些输出。我们得到一个指针，其索引为\
  \ 0，指针 ID 为 0。之后，你可能会看到第一个手指的多个`ACTION_MOVE`事件（动作值 2），尽管我们在清单 25-11 中只显示了一个。此时仍然只有一个指针，索引和\
  \ ID 也仍然是 0。\n\n片刻之后，第二根手指触摸屏幕。此时动作的十进制值为 261。这代表什么意思？动作值实际上由两部分组成：一个指示该动作针对哪个指针的指示符，以及该指针正在执行什么动作。将十进制\
  \ 261 转换为十六进制，我们得到 `0x00000105`。动作是最后一个字节（此处为 5），指针索引是倒数第二个字节（此处为 1）。请注意，这只告诉我们指针索引，而不是指针\
  \ ID。如果你按下第三根手指，动作值将是 `0x00000205`（或十进制 517）。第四根手指将是 `0x00000305`（或十进制 773），以此类推。你之前没见过动作值\
  \ 5，它被称为 `ACTION_POINTER_DOWN`。它类似于 `ACTION_DOWN`，只是用于多点触控场景。\n\n现在，看一下清单 25-11\
  \ 中来自 LogCat 的下一对记录。第一条记录是 `ACTION_MOVE` 事件（动作值 2）。请记住，在真实的屏幕上，手指很难保持不动。我们只显示了一个\
  \ `ACTION_MOVE` 事件，但你可能会看到多个。当第一根手指从屏幕上抬起时，我们得到一个动作值 `0x00000006`（或十进制 6）。和之前一样，指针索引为\
  \ 0，动作值为 `ACTION_POINTER_UP`（类似于 `ACTION_UP`，但用于多点触控场景）。如果在多点触控场景中第二根手指抬起，我们会得到动作值\
  \ `0x00000106`（或十进制 262）。请注意，当其中一根手指发生 `ACTION_UP` 事件时，我们仍然有两根手指的信息。\n\n清单 25-11\
  \ 中的最后一对记录显示第二根手指的又一个 `ACTION_MOVE` 事件，随后是第二根手指的 `ACTION_UP`。这次我们看到动作值为 1（`ACTION_UP`）。我们没有得到动作值\
  \ 262，但接下来会解释原因。另外请注意，一旦第一根手指离开屏幕，第二根手指的指针索引就从 1 变成了 0，但指针 ID 仍然保持为 1。\n\n`ACTION_MOVE`\
  \ 事件不会告知你是哪根手指在移动。无论有多少根手指按下或哪根手指在移动，移动事件的动作值始终为 2。所有按下的手指的位置都包含在 `MotionEvent`\
  \ 对象中，因此你需要读取位置并自行判断。如果屏幕上只剩一根手指，指针 ID 会告诉你它是哪根手指，因为它是唯一剩下的那根。在清单 25-11 中，当屏幕上只剩第二根手指时，`ACTION_MOVE`\
  \ 事件的指针索引为 0，指针 ID 为 1，因此我们知道是第二根手指在移动。\n\n\n回到清单 25–11 的开头，第一个按下的手指对应的指针索引为 0，指针\
  \ ID 也为 0。那么，当第一个手指在没有任何其他手指之前按下屏幕时，为什么动作值不是`0x00000005`（即十进制 5）？遗憾的是，这个问题并没有一个令人满意的答案。在以下场景中我们可以得到动作值\
  \ 5：先按下第一个手指，再按下第二个手指，此时会得到动作值 0 和 261（暂时忽略`ACTION_MOVE`事件）。接着，抬起第一个手指（动作值为 6），再将其重新按下屏幕。此时第二个手指的指针\
  \ ID 仍为 1。当第一个手指离开屏幕时，应用程序只知道指针 ID 1。一旦第一个手指再次触摸屏幕，Android 会将指针 ID 0 重新分配给第一个手指。由于现在我们知道涉及多个手指，因此会得到动作值\
  \ 5（指针索引为 0，动作值为 5）。因此，这个问题的答案是向后兼容性，但这并非一个令人满意的答案。动作值 0 和 1 是多点触控之前的产物，只要只使用一根手指，在多点触控出现之前编写的应用程序仍然可以正常工作。在两根手指的场景中，如果第一根手指在一个位置触摸屏幕，紧接着第二根手指在屏幕的另一个位置触摸，那么第一根手指的抬起动作将不会被那些不期望多点触控事件的应用程序所识别。这是因为第一根手指先抬起会给出动作值\
  \ 6，而不是 1。只有当第二根手指抬起时，应用程序才会收到动作值 1。该应用程序会认为第一根手指神奇地穿越屏幕移动到了第二根手指所在的位置。\n\n当屏幕上只剩下一根手指时，Android\
  \ 会将其视为单点触控的情况。因此，我们得到旧的`ACTION_UP`值 1，而不是多点触控的`ACTION_UP`值 6。我们的代码需要仔细考虑这些情况。指针索引为\
  \ 0 可能产生`ACTION_DOWN`值 0 或 5，具体取决于当前哪些指针处于活动状态。最后一根手指抬起时，无论其指针 ID 是什么，都会得到`ACTION_UP`值\
  \ 1。\n\n`MotionEvent`类曾附带一些辅助常量来帮助理解当前事件，例如`MotionEvent.ACTION_POINTER_3_DOWN`的值为`0x00000205`（即十进制\
  \ 517），我们之前将其描述为第三根手指按下。然而，这些值并不是很有用，因为更好的做法是查看第二个字节中的指针索引和第一个字节中的动作。事实上，更好的方式是使用`MotionEvent`类中的其他常量来读取`getAction()`返回的值。这些常量是`MotionEvent.ACTION_POINTER_ID_MASK`、`MotionEvent.ACTION_MASK`和`MotionEvent.ACTION_POINTER_ID_SHIFT`。通过将动作值与这些掩码进行“与”运算，并针对指针索引对结果进行移位，你就能可靠地理解当前发生了什么，无论设备支持多少根手指。Android\
  \ 团队想必也意识到了这一点，因为像`ACTION_POINTER_3_DOWN`这样的常量已经被弃用。\n\n但请注意；这些索引常量的名称中使用了`ID`而非`INDEX`，而我们之前告诉你第二个字节是指针索引。遗憾的是，在\
  \ 2.2 版本之前，Android 对于该字节中的内容存在混淆。从 Android 2.2 开始，这些常量被重命名为`ACTION_POINTER_INDEX_MASK`和`ACTION_POINTER_INDEX_SHIFT`，同时保持了与之前相同的值。第二个字节始终是指针索引，但在\
  \ Android 2.2 之前，常量的名称完全是错误的。自 Android 2.2 起，这些常量的名称已被替换，包含`ID`的常量名称已被弃用。你可以随意创建自己的常量，以便在所有\
  \ Android 版本中使用。\n\n在前面的例子中，我们使用了一个`logAction()`方法，它利用这些常量来解码我们的动作值。我们再次在清单 25–12\
  \ 中提供相关代码。\n\n**清单 25–12.** *用于解析`MotionEvent.getAction()`结果的示例代码*\n\n```\n    int\
  \ action = event.getAction();\n    int ptrIndex = (action & MotionEvent.ACTION_POINTER_ID_MASK)\
  \ >>>\n                                 MotionEvent.ACTION_POINTER_ID_SHIFT;\n \
  \   action = action & MotionEvent.ACTION_MASK;\n    if(action == 5 || action ==\
  \ 6)\n        action = action - 5;\n    int ptrId = event.getPointerId(ptrIndex);\n\
  ```\n\n在清单 25–12 中的这些语句执行完毕后，`ptrId`将包含与该动作关联的指针 ID；`action`的值将在 0 到 4 之间；`ptrIndex`将包含指针索引值，用于`getX()`和`MotionEvent`的类似方法。理解`getAction()`返回值的一种方式是认识到，任何大于\
  \ 4 的值都代表与指针 ID 相关的值。任何小于或等于 4 的值则代表与我们所知的唯一手指相关的值，无论其指针 ID 是什么。在某些情况下，你可能希望从动作值中减去\
  \ 5，以便在多点触控情况下也能得到`ACTION_DOWN`和`ACTION_UP`。在其他情况下，不这样做可能更合适。选择权在你手中。\n\n#### 自\
  \ Android 2.2 起的多点触控支持\n\nAndroid 2.2 对多点触控的工作方式引入了一些变化。我们在上一节中提到了部分常量被弃用以及新常量的添加。从\
  \ 2.2 版本开始，我们还获得了几个新方法——`getActionMasked()`和`getActionIndex()`——使得更容易确定动作涉及哪个指针和哪个索引。利用这些新方法，我们可以将清单\
  \ 25–12 中的代码替换为清单 25–13 中的代码。\n\n**清单 25–13.** *用于解析动作的示例代码*\n\n```\n    int action\
  \ = event.getActionMasked();\n    int ptrIndex = event.getActionIndex();\n    int\
  \ ptrId = event.getPointerId(ptrIndex);\n```\n\n这比清单 25–12 中的代码要简单得多。然而请注意，我们的`action`变量将会是`ACTION_DOWN`、`ACTION_UP`、`ACTION_MOVE`、`ACTION_CANCEL`、`ACTION_OUTSIDE`、`ACTION_POINTER_DOWN`或`ACTION_POINTER_UP`（分别对应值\
  \ 0 到 6）。如果你想让它和之前一样，可以在`getActionMasked()`返回大于 4 的值时减去 5。或者你也可以直接处理这两个额外的值。\n\n\
  如前所述，如果你选择在 Android 2.2 或更高版本中像清单 25–12 那样自行进行掩码处理，那么常量`ACTION_POINTER_ID_MASK`和`ACTION_POINTER_ID_SHIFT`已被弃用，并创建了名称分别为`ACTION_POINTER_INDEX_MASK`和`ACTION_POINTER_INDEX_SHIFT`的新常量来表示完全相同的值。由于新常量在早期版本的\
  \ Android 中不可识别，你最好创建自己的常量，分别使用值`0x0000ff00`和`0x00000008`，因为这些常量在任何版本的 Android 中都是有效的。\n\
  \n\n\n### 地图与触控\n\n地图同样能够接收触摸事件。你已经看到，触摸地图可以调出缩放控件或让我们平移地图。这些都是地图的内置功能。但如果我们想做些不同的事情呢？我们将向你展示如何利用地图实现一些有趣的功能，包括点击某个位置并获取其经纬度。由此，我们可以做很多非常有用的事情。\n\
  \n地图的主要类之一是 `MapView`。这个类有一个 `onTouchEvent()` 方法，就像我们之前介绍的 `View` 一样，它只接受一个 `MotionEvent`\
  \ 对象作为参数。我们也可以使用 `setOnTouchListener()` 方法为 `MapView` 上的触摸事件设置一个回调处理程序。地图的其他主要对象类型是一组\
  \ `Overlay`（覆盖物），包括 `ItemizedOverlay` 和 `MyLocationOverlay`。这些都在第 17 章中介绍过。这些 `Overlay`\
  \ 类也有 `onTouchEvent()` 方法，不过其签名与常规 `View` 的 `onTouchEvent()` 方法略有不同。对于 `Overlay`，方法签名是\n\
  \n`onTouchEvent(android.view.MotionEvent e, MapView mapView)`\n\n如果我们想对地图执行不同的操作，可以重写这个\
  \ `onTouchEvent()` 方法。更常见的做法是在 `Overlay` 类中重写方法，而不是在 `MapView` 中，因此本节我们将重点讨论这一点。与之前一样，`Overlay`\
  \ 的 `onTouchEvent()` 方法处理 `MotionEvent` 对象。即使是在地图应用中，`MotionEvent` 对象也会提供用户触摸屏幕的\
  \ X 和 Y 坐标。但在处理地图时，这只有有限的价值，因为我们通常想知道用户触摸的实际地图位置。幸运的是，有办法可以解决这个问题。\n\n`MapView`\
  \ 提供了一个名为 `Projection` 的接口，`Projection` 具有将像素转换为 `GeoPoint` 或将 `GeoPoint` 转换为像素的方法。要获取\
  \ `Projection`，请调用 `MapView.getProjection()` 方法。获得 `Projection` 后，可以使用 `fromPixels()`\
  \ 和 `toPixels()` 方法进行转换。请记住，`Projection` 仅在视图中的地图不变时有效。在 `onTouchEvent()` 方法中，你可以使用\
  \ `fromPixels()` 将 X 和 Y 位置值转换为 `GeoPoint`。\n\n`Overlay` 中一个有趣且非常有用的方法是 `onTap()`\
  \ 方法，它与你本章前面看到的 `onTouch()` 方法类似，但有一个关键区别。地图 `Overlay` 没有 `onTouch()` 方法。`onTap()`\
  \ 方法的签名是\n\n`public boolean onTap(GeoPoint p, MapView mapView)`\n\n这意味着当用户触摸我们的\
  \ `Overlay` 时，我们的 `onTap()` 方法会被调用，并传入用户触摸位置的 `GeoPoint`。这将为我们节省大量尝试确定用户在地图上触摸位置的时间。我们不再需要担心将\
  \ X 和 Y 坐标位置转换为经纬度坐标；Android 会为我们处理这些。\n\n现在，我们将重新审视第 17 章中的示例，其中我们显示了一个带有不同模式（卫星、街道、交通和普通）按钮的地图。我们将添加从地图上某个位置启动\
  \ `StreetView` 的功能。为此，我们需要向 `MapView` 添加一个 `Overlay` 对象，当该 `Overlay` 对象接收到触摸事件时，我们将该触摸事件转换为地图上的一个位置。利用转换后的位置，我们将启动一个意图来在该位置调用\
  \ `StreetView`。我们首先在 Eclipse 中复制第 17 章的 `MapViewDemo`（参见代码清单 17–2 和代码清单 17–3）。然后，我们将使用代码清单\
  \ 25–14 修改主 `Activity` 的 `onCreate()` 方法，并添加一个包含文件 `ClickReceiver.java` 的新类，该类也在此清单中提供。对\
  \ `onCreate()` 方法的修改以粗体显示。用户界面看起来仍然与图 17–3 中一样。\n\n**代码清单 25–14.** *为地图演示添加触摸功能*\n\
  \n```java\n    @Override\n    protected void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.mapview);\n\
  \n        mapView = (MapView)findViewById(R.id.mapview);\n\n        ClickReceiver\
  \ clickRecvr = new ClickReceiver(this);\n        mapView.getOverlays().add(clickRecvr);\n\
  \        mapView.invalidate();\n    }\n```\n\n```java\n// 文件 ClickReceiver.java\n\
  import android.content.Context;\nimport android.content.Intent;\nimport android.net.Uri;\n\
  import android.util.Log;\nimport com.google.android.maps.GeoPoint;\nimport com.google.android.maps.MapView;\n\
  import com.google.android.maps.Overlay;\n\npublic class ClickReceiver extends Overlay{\n\
  \    private static final String TAG = \"ClickReceiver\";\n    private Context mContext;\n\
  \n    public ClickReceiver(Context context) {\n        mContext = context;\n   \
  \ }\n\n    @Override\n    public boolean onTap(GeoPoint p, MapView mapView) {\n\
  \        Log.v(TAG, \"在此点收到点击：\" + p);\n\n        if(mapView.isStreetView()) {\n\
  \            Intent myIntent = new Intent(Intent.ACTION_VIEW, Uri.parse\n      \
  \          (\"google.streetview:cbll=\" +\n                (float)p.getLatitudeE6()\
  \ / 1000000f +\n                \",\" + (float)p.getLongitudeE6() / 1000000f\n \
  \               +\"&cbp=1,180,,0,1.0\"\n                ));\n            mContext.startActivity(myIntent);\n\
  \             return true;\n        }\n        return false;\n    }\n}\n```\n\n\
  这就是让这个新示例工作所需做的一切——当然，除非你的模拟器或设备上没有可用的 `StreetView`。`StreetView` 包含在 CupCake (1.5)\
  \ 和 Donut (1.6) 的模拟器中，但未包含在 Éclair (2.0) 模拟器中。如果你的模拟器缺少 `StreetView`，一种解决方法是使用一台真实设备（应该已安装该应用）进行测试。如果你只有模拟器，可以尝试以下简单的步骤：\n\
  \n1.  创建一个基于 Google APIs 1.6 或 1.5 版本的 AVD。\n2.  使用步骤 1 中的 AVD 启动模拟器。\n3.  使用 `adb\
  \ pull /system/app/StreetView.apk StreetView.apk` 将此应用从模拟器复制到你的工作站硬盘。\n4.  创建一个基于你想要运行的版本所对应的\
  \ Google APIs 的 AVD。\n5.  停止步骤 2 中的模拟器，并启动步骤 4 中的模拟器。\n6.  对你步骤 3 中复制的 `.apk` 文件使用\
  \ `adb install StreetView.apk`。\n\n这应该会将 `StreetView` 应用安装到你的模拟器中，并使我们上面的示例能够工作。在更高版本的\
  \ Android 中，`.apk` 文件被命名为 `Street.apk`，因此你也许能找到比 1.6 更新的版本并使用它。\n\n\n\n当你运行新修改的\
  \ Maps 演示应用时，放大到一个城市以便能看到街道。点击“街道”按钮，即可在支持 `StreetView` 的街道上看到蓝色轮廓线（即：这些街道在谷歌数据库中存有图片）。现在，你触摸一条街道，我们的\
  \ `ClickReceiver` 的 `onTap()` 方法就会被调用，该方法会通过 Intent 将触摸事件的位置发送给 `StreetView` 活动。如果你触摸地图上\
  \ `StreetView` 没有图片的区域，你会看到一个空的 `StreetView` 屏幕，并显示类似“无效全景”的提示。这意味着谷歌在该位置附近找不到任何图像。点击返回按钮回到我们的\
  \ Maps 应用，并尝试其他位置。如果你查看 `LogCat`，会看到我们记录了触摸的地图位置的经纬度。注意，`GeoPoint` 对象使用 `int` 类型表示经纬度，而\
  \ `StreetView Uri` 需要 `float` 类型。\n\n对于这个示例应用，我们选择将触摸位置的经纬度通过 Intent 发送给 `StreetView`\
  \ 活动。但你可以想象其他可行的可能性。有了位置的经纬度，我们可以使用 `Geocoder` 来查找该位置周围有什么。我们可以用该位置进行逐向导航。我们可以测量该位置与我们当前位置之间的距离。甚至可以将该位置存储起来供以后使用。\n\
  \n### 手势\n\n手势是一种特殊的触摸屏事件。“手势”一词在 Android 中用于指代多种操作，从简单的触摸序列（如挥手或捏合）到我们将在本节稍后讨论的正式的\
  \ `Gesture` 类。挥手、捏合、长按和滚动都有预期的行为和触发条件。也就是说，大多数人都很清楚，挥手是一种手指触摸屏幕、朝单个方向快速拖动然后抬起的手势。例如，当用户在“图库”应用（以从左到右的顺序显示图像的应用）中使用挥手手势时，图像会横向移动以向用户显示新图像。\n\
  \n在本节中，我们将利用你已学到的关于 `MotionEvent` 的知识，并以此为基础来展示如何使用捏合手势。这并不像你想象的那么难。在 Android 2.2\
  \ 版本之前，捏合手势并未得到显式支持，因此要在早期版本中实现捏合手势，你必须自己编写代码来读取事件对象并采取相应操作，这正是我们接下来要做的。从 2.2 版本开始，我们拥有了一些有用的新特性来处理捏合等手势；你将在本节稍后看到这些内容。\n\
  \n接下来，我们将介绍一些用于其他手势（如挥手和长按）的实用类。然后，我们会介绍自定义手势，即你可以预先录制的手势，允许用户通过以自定义模式拖动手指来在你的应用中触发操作。但首先，让我们开始学习捏合！\n\
  \n#### 捏合手势\n\n多点触控的一个酷炫应用是捏合手势，它用于缩放。其思路是，如果你将两根手指放在屏幕上并分开，应用应通过放大的方式响应。如果手指合拢，应用则应缩小。应用通常显示的是图像，也可能是地图。\n\
  \n为了演示一种实现捏合手势的方法，我们将修改之前的应用，为其添加缩放捏合功能。清单 25–15 显示了该示例中 `ClickReceiver` 类的替换版本；其他所有内容保持不变。请注意，此示例在运行\
  \ Android 2.2 或更高版本的设备上运行良好，我们将在代码清单后解释原因。\n\n**清单 25–15.** *捏合手势的 Java 代码*\n\n\
  ```\n// 文件名为 ClickReceiver.java\nimport android.content.Context;\nimport android.content.Intent;\n\
  import android.net.Uri;\nimport android.util.FloatMath;\nimport android.util.Log;\n\
  import android.view.MotionEvent;\nimport com.google.android.maps.GeoPoint;\nimport\
  \ com.google.android.maps.MapView;\nimport com.google.android.maps.Overlay;\n\n\
  public class ClickReceiver extends Overlay {\n    private static final String TAG\
  \ = \"ClickReceiver\";\n    private static final float ZOOMJUMP = 75f;\n    private\
  \ Context mContext;\n    private boolean inZoomMode = false;\n    private boolean\
  \ ignoreLastFinger = false;\n    private float mOrigSeparation;\n\n    public ClickReceiver(Context\
  \ context) {\n        mContext = context;\n    }\n\n    @Override\n    public boolean\
  \ onTap(GeoPoint p, MapView mapView) {\n        Log.v(TAG, \"Received a click at\
  \ this point: \" + p);\n\n        if(mapView.isStreetView()) {\n            Intent\
  \ myIntent = new Intent(Intent.ACTION_VIEW, Uri.parse\n                (\"google.streetview:cbll=\"\
  \ +\n                (float)p.getLatitudeE6() / 1000000f +\n                \",\"\
  \ + (float)p.getLongitudeE6() / 1000000f\n                +\"&cbp=1,180,,0,1.0\"\
  \n                ));\n            mContext.startActivity(myIntent);\n         \
  \   return true;\n        }\n        return false;\n    }\n\n    public boolean\
  \ onTouchEvent(MotionEvent e, MapView mapView) {\n        Log.v(TAG, \"in onTouchEvent,\
  \ action is \" + e.getAction());\n        int action = e.getAction() & MotionEvent.ACTION_MASK;\n\
  \n        if(e.getPointerCount() == 2) {\n            inZoomMode = true;\n     \
  \   }\n        else {\n            inZoomMode = false;\n        }\n```\n\n\n\n`if(inZoomMode)\
  \ {`\n    `switch(action) {`\n    `case MotionEvent.ACTION_POINTER_DOWN:`\n    \
  \    // 我们可能正在开始一个新的捏合操作，因此做好准备\n        `mOrigSeparation = calculateSeparation(e);`\n\
  \        break;\n    `case MotionEvent.ACTION_POINTER_UP:`\n        // 捏合操作即将结束，因此准备在最后一根手指仍单独按下时忽略它\n\
  \        `ignoreLastFinger  = true;`\n        break;\n    `case MotionEvent.ACTION_MOVE:`\n\
  \        // 正在进行捏合，因此判断是否需要改变缩放级别\n        `float newSeparation = calculateSeparation(e);`\n\
  \        `if(newSeparation - mOrigSeparation > ZOOMJUMP) {`\n            // 手指间距变大，放大\n\
  \            `mapView.getController().zoomIn();`\n            `mOrigSeparation =\
  \ newSeparation;`\n        `}`\n        `else if (mOrigSeparation - newSeparation\
  \ > ZOOMJUMP) {`\n            // 手指间距变小，缩小\n            `mapView.getController().zoomOut();`\n\
  \            `mOrigSeparation = newSeparation;`\n        `}`\n        break;\n \
  \   `}`\n    // 不要将这些事件传递给 Android，因为我们已经处理了它们\n    `return true;`\n`}`\n`else {`\n\
  \    // 如有必要，从缩放逻辑中进行清理\n`}`\n\n// 如果当前只剩下最后一根手指，则丢弃事件，直到这根手指抬起\n`if(ignoreLastFinger)\
  \ {`\n    `if(action == MotionEvent.ACTION_UP)`\n        `ignoreLastFinger = false;`\n\
  \    `return true;`\n`}`\n\n`return super.onTouchEvent(e, mapView);`\n`}`\n\n`private\
  \ float calculateSeparation(MotionEvent e) {`\n    `float x = e.getX(0) - e.getX(1);`\n\
  \    `float y = e.getY(0) - e.getY(1);`\n    `return FloatMath.sqrt(x * x + y *\
  \ y);`\n`}`\n`}`\n\n我们已向 `ClickReceiver` 叠加层添加了一个 `onTouchEvent()` 回调。在这个回调中，我们会从触摸屏获取所有发送给\
  \ `MapView` 的 `MotionEvent` 对象。对于大多数事件，我们只需将其传递给父类。这能让拖拽功能继续正常运行，同时也能在 `StreetView`（街景）模式下通过点击启动街景视图。当触摸屏上有两根手指按下时，我们可能会感应到捏合操作，因此将缩放模式设为\
  \ true。如果我们获取到两根手指的信息，就需要判断具体发生了什么，这正是事件动作上的 `switch` 语句的作用。\n\n如果我们刚收到 `ACTION_POINTER_DOWN`\
  \ 动作（请记住，我们只会在多点触控场景下收到此事件，而这里有两根手指在报告，因此必定处于多点触控状态），这意味着我们从一根手指变为了两根手指。在此事件之后，我们可能会看到用户的捏合操作。为了判断手指是相互靠近还是远离，我们必须记住手势开始时手指的间距。间距的计算方法是两根手指坐标差平方和的平方根——换句话说，我们使用勾股定理。我们确信，在有两根手指按下时，事件对象会在索引\
  \ 0 和 1 处提供坐标，而且哪根手指对应哪个索引其实并不重要。\n\n如果我们刚收到 `ACTION_POINTER_UP` 动作，在此之前，`MotionEvent`\
  \ 对象会报告两根手指的信息，而在此之后，将只报告一根手指的信息，因此这是我们看到的最后一个包含两根手指信息的事件。我们知道捏合操作已经结束。如果仅仅开始让 Android\
  \ 看到触摸屏上只有一个手指的事件对象，我们可能会遇到一些奇怪的行为。例如，如果 Android 收到最后一根手指的 `ACTION_UP` 事件，它可能会认为在某个位置发生了点击，并启动\
  \ `StreetView` 应用，这并非我们所愿。我们预计用户会抬起屏幕上的最后一根手指来结束捏合手势，因此我们决定丢弃在此之前的所有事件。我们通过将 `ignoreLastFinger`\
  \ 变量设为 `true` 来实现这一点，稍后我们会在决定如何处理事件时检查这个变量。\n\n如果我们刚收到 `ACTION_MOVE` 动作，我们的手指可能已经相互移动靠近或远离。通过计算两根手指之间的新间距，并将其与旧间距进行比较，我们可以决定是放大、缩小，还是完全不进行缩放。如果我们进行了一些缩放，则需要为下一次操作重置旧间距。用户可能会让手指停留在屏幕上，然后分开或并拢，我们的应用程序应该对这些手势做出正确的响应。如果我们没有检测到间距发生显著变化，我们将继续接收事件，直到我们获得足够的间距变化，或者用户结束捏合手势。\n\
  \n无论接收到什么动作，只要处于缩放模式，我们就会从 `onTouchEvent()` 返回 `true`。这会告诉 Android 我们已经处理了该事件，并让其继续向我们发送新的事件。在\
  \ `onTouchEvent()` 方法的末尾，我们需要判断是否将事件传递给 Android。利用 `ignoreLastFinger` 变量，我们决定在捏合手势之后且最后一根手指仍按下时，不将事件传递给\
  \ Android。一旦最后一根手指抬起（我们通过 `ACTION_UP` 事件动作获知这一点），我们就可以恢复将事件传递给 Android。通过这种方式，我们让\
  \ Android 处理点击和拖拽操作，而我们自己处理捏合操作。当然，如果你愿意，你也可以在这个回调中自己处理点击和拖拽功能。\n\n当你尝试这个应用时，你会发现自己仍然可以横向拖拽地图，并且在街景模式下，你可以点击某个位置来启动\
  \ `StreetView` 活动。但现在，你还可以通过捏合来放大和缩小地图。\n\n我们暂时忽略了用户可能从三根手指抬起一根变为两根手指的情况。许多设备只支持识别两根手指，但你应该预料到，某些设备最终可能会支持多于两根手指。如果你想在地图以外的组件上使用捏合手势，你需要弄清楚如何为这些组件实现缩放。例如，如果你在屏幕上有一张图片，想通过捏合来放大或缩小，你需要像我们这里所做的那样，通过\
  \ `ACTION_MOVE` 事件来触发对图片的放大或缩小操作。本章稍后将会给出类似的示例。\n\n如前所述，捏合手势直到 Android 2.2 才得到显式支持。虽然上述代码在\
  \ Android 2.2 上也能运行，但你可能希望利用更新的特性来为你的应用实现捏合手势。值得一提的是，在 Android 2.2 及更高版本中，`MapView`\
  \ 类原生支持捏合缩放，开发者完全不需要做任何额外工作即可使用；它开箱即用，因此我们无需为更新版本 Android 中的地图处理捏合手势。在介绍捏合手势的原生支持之前，我们首先需要介绍一个从一开始就存在的类——`GestureDetector`。\n\
  \n\n\n#### GestureDetector 与 OnGestureListeners\n\n我们刚才实现捏合手势的操作虽然不算太复杂，但如果 Android\
  \ 能提供一些帮助，自动识别常见手势就更好了。这样，我们只需要在手势发生时执行相应的应用逻辑即可。幸运的是，Android 确实提供了这样的功能——虽然直到 Android\
  \ 2.2 才推出了专门处理捏合手势的类。\n\n第一个类是 `GestureDetector`，它从 Android 诞生之初就已存在，其使命是接收 `MotionEvent`\
  \ 对象，并在事件序列呈现出常见手势特征时通知我们。我们将在回调中把所有事件对象传递给 `GestureDetector`，而它会在识别出诸如快速滑动或长按等手势时调用其他回调。我们需要为\
  \ `GestureDetector` 的回调注册一个监听器，并在此处编写逻辑，以指定当用户执行这些常见手势时应执行的操作。遗憾的是，这个类并不能告知我们是否发生了捏合手势；为此我们需要使用另一个新类，稍后将进行介绍。\n\
  \n构建监听器端有几种方法。第一种选择是编写一个新类，实现相应的手势监听器接口，例如 `GestureDetector.OnGestureListener` 接口。对于每个可能的回调，都需要实现多个抽象方法。\n\
  \n第二种选择是从监听器的简单实现中选取一个，并覆盖你关心的相应回调方法。例如，`GestureDetector.SimpleOnGestureListener`\
  \ 类已将所有抽象方法实现为空操作并返回 `false`。你只需扩展该类，并覆盖你需要响应的少数手势对应的几个方法即可。其余方法则保留其默认实现。即使你决定覆盖所有回调方法，选择第二种方式也更具前瞻性——因为如果未来版本的\
  \ Android 在接口中新增了另一个抽象回调方法，这个简单实现会提供默认回调方法，从而确保你的代码不受影响。\n\nAndroid 2.2 引入了 `ScaleGestureDetector`\
  \ 类，正是这个类能为我们识别捏合手势。我们将深入探讨该类及其对应的监听器类，了解如何利用捏合手势调整图像大小。在本例中，我们扩展了简单实现（`ScaleGestureDetector.SimpleOnScaleGestureListener`）作为监听器。清单\
  \ 25–16 展示了我们的 `MainActivity` 的 XML 布局和 Java 代码。\n\n##### 清单 25–16. 使用 ScaleGestureDetector\
  \ 处理捏合手势的布局和 Java 代码\n\n```xml\n<?xml version=\"1.0\" encoding=\"utf-8\"?>\n<LinearLayout\n\
  \    android:id=\"@+id/layout\"  android:orientation=\"vertical\"\n    android:layout_width=\"\
  fill_parent\"  android:layout_height=\"fill_parent\" >\n\n  <TextView  android:text=\"\
  使用捏合手势改变图像大小\"\n    android:layout_width=\"fill_parent\"  android:layout_height=\"\
  wrap_content\" />\n\n  <ImageView android:id=\"@+id/image\"  android:src=\"@drawable/icon\"\
  \n    android:layout_width=\"match_parent\"  android:layout_height=\"match_parent\"\
  \n    android:scaleType=\"matrix\" />\n\n</LinearLayout>\n```\n\n```java\n// 此文件为\
  \ MainActivity.java\nimport android.app.Activity;\nimport android.graphics.Matrix;\n\
  import android.os.Bundle;\nimport android.util.Log;\nimport android.view.MotionEvent;\n\
  import android.view.ScaleGestureDetector;\nimport android.widget.ImageView;\n\n\
  public class MainActivity extends Activity {\n    private static final String TAG\
  \ = \"ScaleDetector\";\n    private ImageView image;\n    private ScaleGestureDetector\
  \ mScaleDetector;\n    private float mScaleFactor = 1f;\n    private Matrix mMatrix\
  \ = new Matrix();\n\n    @Override\n    public void onCreate(Bundle savedInstanceState)\
  \ {\n        super.onCreate(savedInstanceState);\n        setContentView(R.layout.main);\n\
  \n        image = (ImageView)findViewById(R.id.image);\n        mScaleDetector =\
  \ new ScaleGestureDetector(this,\n                new ScaleListener());\n    }\n\
  \n    @Override\n    public boolean onTouchEvent(MotionEvent ev) {\n        Log.v(TAG,\
  \ \"在 onTouchEvent 中\");\n        // 将所有事件传递给 ScaleGestureDetector\n        mScaleDetector.onTouchEvent(ev);\n\
  \n        return true;\n    }\n\n    private class ScaleListener extends ScaleGestureDetector.SimpleOnScaleGestureListener\
  \ {\n        @Override\n        public boolean onScale(ScaleGestureDetector detector)\
  \ {\n            mScaleFactor *= detector.getScaleFactor();\n\n            // 确保缩放不会过小或过大\n\
  \            mScaleFactor = Math.max(0.1f, Math.min(mScaleFactor, 5.0f));\n\n  \
  \          Log.v(TAG, \"在 onScale 中，缩放因子 = \" + mScaleFactor);\n            mMatrix.setScale(mScaleFactor,\
  \ mScaleFactor);\n\n            image.setImageMatrix(mMatrix);\n            image.invalidate();\n\
  \            return true;\n        }\n    }\n}\n```\n\n我们的布局十分简洁。其中包含一个简单的 `TextView`，用于显示使用捏合手势的提示信息；此外还有一个显示\
  \ Android 标准图标的 `ImageView`。我们将通过捏合手势来缩放这个图标图像。当然，你也可以随意替换成自己的图像文件来代替该图标。只需将你的图像文件复制到\
  \ drawable 文件夹，并确保修改布局文件中的 `android:src` 属性即可。请注意 XML 布局中我们图像元素的 `android:scaleType`\
  \ 属性。该属性告诉 Android 我们将使用图形矩阵对图像进行缩放操作。虽然图形矩阵也能在布局内移动图像，但这里我们仅关注缩放功能。还要注意我们将 `ImageView`\
  \ 的大小设置为尽可能大，这样在缩放图像时，它就不会被 `ImageView` 的边界所裁剪。\n\n代码同样简单明了。在 `onCreate()` 中，我们获取了图像的引用并创建了\
  \ `ScaleGestureDetector`。在 `onTouchEvent()` 回调中，我们只需将接收到的每个事件对象传递给 `ScaleGestureDetector`\
  \ 的 `onTouchEvent()` 方法，并返回 `true` 以持续接收新事件。这使得 `ScaleGestureDetector` 能够查看所有事件，并决定何时通知我们发生了手势。\n\
  \n缩放的实际操作发生在 `ScaleListener` 中。监听器类实际上包含三个回调：`onScaleBegin()`、`onScale()` 和 `onScaleEnd()`。我们不需要对开始和结束方法进行特殊处理，因此这里没有实现它们。\n\
  \n\n\n### 优化排版后的文本\n\n在`onScale()`中，传入的`detector`可用于获取关于缩放操作的许多信息。缩放因子是一个徘徊在 1 附近的值。也就是说，当手指捏合靠近时，该值略低于\
  \ 1；当手指分开时，该值略大于 1。我们的`mScaleFactor`成员变量从 1 开始，因此当手指靠近或分开时，它会逐渐小于或大于 1。如果`mScaleFactor`等于\
  \ 1，则图像将保持正常大小。否则，随着`mScaleFactor`低于或高于 1，图像将比正常尺寸更小或更大。我们使用简洁的`min/max`函数组合为`mScaleFactor`设置了一些边界。这可以防止图像变得过小或过大。然后，我们使用`mScaleFactor`缩放图形矩阵，并将新缩放的矩阵应用于图像。`invalidate()`调用会强制在屏幕上重新绘制图像。\n\
  \n如您所见，这比上一个需要我们自己处理事件对象的示例要省力得多。当执行常见手势时，我们可以专注于执行适当的应用程序逻辑。要使用`OnGestureListener`接口，您需要执行与我们在此为`ScaleListener`所做的非常相似的操作，只是回调将针对不同的常见手势。\n\
  \n常见手势是一回事，但如果您想为应用程序使用自定义手势呢？例如，如果您希望用户能够在屏幕上绘制一个复选标记，并让您的应用程序执行某些功能，该怎么办？为此，我们需要自定义手势，这就是我们接下来要讨论的内容。\n\
  \n### 自定义手势\n\n在本章的最后一节中，我们将介绍 Android 正式的`Gesture`类。正式来说，手势是应用程序可以期望用户执行的预先录制的触摸屏动作。如果用户在使用应用程序时执行了与预先录制的手势相同的手势，则应用程序可以根据该手势对应用程序的意义调用特定的逻辑。手势需要一个覆盖层，该覆盖层可以检测用户的手势并将其传递给底层活动。使用手势可以简化用户界面，通过手指滑动或绘制动作来消除按钮或其他控件。它们还可以创建有趣的游戏界面。在本节中，我们将探讨如何录制自定义手势以及如何在应用程序中使用它们。请注意，我们之前使用的手势相关类在本示例中完全不使用；本节将探讨一组不同的手势类。\n\
  \n### 手势构建器应用程序\n\n在深入手势代码之前，让我们先试用一下 Android SDK 附带的“手势构建器”应用程序，它将帮助您理解什么是手势。“手势构建器”创建并管理一个包含手势库的手势文件。从\
  \ Eclipse 启动模拟器；解锁模拟器设备；转到您的应用程序，然后选择“手势构建器”。图 25-4 显示了应用程序图标。\n\n![images](img/2504.jpg)\n\
  **图 25-4.** *手势构建器图标*\n\n如果您在模拟器中看不到“手势构建器”，则必须在 Eclipse 中创建一个新项目。“手势构建器”作为示例应用程序提供，位于\
  \ Android SDK 目录下的`platforms/<version>/samples/GestureBuilder`或`samples`目录中。您可以使用“从现有示例创建项目”选项在\
  \ Eclipse 中创建一个新的 Android 项目。选择所需的 Android 版本作为构建目标，以启用“从现有示例创建项目”下拉菜单，然后从下拉菜单中选择`GestureBuilder`。然后，您可以将此应用程序部署到模拟器。\n\
  \n“手势构建器”应用程序将打开一个几乎空白的屏幕。点击“添加手势”按钮。系统将提示您输入一个名称；您给出的名称将与您即将录制的手势关联。此名称将用于在代码中引用该手势，并充当一种命令名称。当用户在您的应用程序中执行该手势时，该名称将被传递给您的方法，以便您的应用程序可以执行用户期望的操作。您给出的名称可以像“spiral”或“checkmark”这样的名词，也可以像“fetch”或“stop”这样的命令。现在，让我们将第一个手势命名为“checkmark”，因此在“名称”字段中输入`checkmark`。然后，在下方的大空白区域中绘制一个复选标记，如果使用模拟器则用鼠标绘制，如果使用设备则用手指绘制。如果您不喜欢第一次的尝试，只需重新绘制一个新的复选标记；一旦您开始绘制新的，旧的将被擦除。当您对复选标记满意时，点击“完成”。您应该会看到如图图\
  \ 25-5 所示的屏幕。\n\n![images](img/2505.jpg)\n**图 25-5.** *保存到`/sdcard`的复选标记手势*\n\n\
  请注意，您可以录制不同类型的复选标记，并给它们都命名为“checkmark”。至少再录制一个类似复选标记的手势，并将其命名为`checkmark`；它可能比您的第一个复选标记更小、更大或以某种方式不同，同时仍然保留相同的基本形状。使用“添加手势”按钮添加一些不同名称的不同手势。每次点击“完成”，您都会向手势库中添加另一个手势。您可以尝试使用多点触摸手势，例如，同时用两根手指划过屏幕以创建一个等号。但这不起作用，您只能得到一条线。也许将来会支持多点触摸手势——即两根或更多手指同时触摸屏幕的手势。\n\
  \n每个手势都有一个名称，并由若干笔画组成。*手势笔画*是一个触摸序列，从手指触摸屏幕开始，到手指离开屏幕结束。正如您之前所学，触摸序列由`MotionEvent`对象组成。类似地，手势笔画由手势点组成。手势被收集到*手势存储*中。一个*手势库*包含一个手势存储。在\
  \ Android 中，这些都是您可以在代码中使用的类。请参见图 25-6 了解显示类之间关系的图表。\n\n![images](img/2506.jpg)\n\
  **图 25-6.** *手势类的结构*\n\n\n\n虽然我们无法使用多点触控来创建自定义手势，但可以在单个手势中包含多个笔画。例如，要创建字母“E”的手势，至少需要两个笔画：一个笔画可以描摹“E”的顶部、背面和底部，第二个笔画用来画出中间的横线。你也可以用垂直笔画画出“E”的背面，再用三个独立的水平笔画完成字母。画“E”还有其他方式，幸运的是，手势库允许你在录制不同手势时给它们都命名为“E”。请尝试用几种不同方式录制“E”，因为用户可能会以任何一种方式绘制该字母，而你需要应用能够识别用户决定的任何画法。图\
  \ 25–7 展示了录制“E”的不同方法。\n\n![images](img/2507.jpg)\n\n**图 25–7.** *录制“E”手势的不同方法*\n\
  \n你可能会发现在模拟器的`Gestures Builder`中创建多笔画手势具有挑战性。正如我们之前提到的，你可以简单地在最后一个手势上重绘，而前一个手势会被擦除。那么\
  \ Android 如何知道你是在重新开始，还是在为当前手势添加另一个笔画呢？Android 使用一个名为`FadeOffset`的值，这是一个以毫秒为单位的时间值。如果你等待超过这个时间才开始下一个笔画，Android\
  \ 就会认为你正在重新开始或开始一个新手势。默认情况下，时间值为 `420` 毫秒。这意味着，如果你在屏幕上绘制手势，在绘制下一个手势笔画前抬起手指的时间超过\
  \ `420` 毫秒，Android 会认为你已经完成，并将你刚刚绘制的内容视为整个手势。在真实设备上，默认值可能足以开始手势的下一个笔画。但在模拟器上则可能不够，这取决于你的工作站速度。\n\
  \n如果你在模拟器上无法让`Gestures Builder`接受多笔画手势，可以创建自己的`Gestures Builder`版本并修改`FadeOffset`的默认值。我们之前描述了如何在\
  \ Eclipse 中创建`Gestures Builder`项目。按照这些说明操作，然后进入项目的`/res/layout/create_gesture.xml`文件，在`GestureOverlayView`元素中添加属性`android:fadeOffset=\"\
  1000\"`。这会将`FadeOffset`延长到 `1` 秒（`1000` 毫秒）。你也可以根据需要选择其他值。\n\n我们来调查一下这些手势存储在哪里。`Gestures\
  \ Builder`中的 Toast 消息告诉我们手势被保存到`/sdcard/gestures`（在 Android 2.2 及更高版本中为`/mnt/sdcard/gestures`）。使用\
  \ Eclipse 中的 File Explorer 或`adb`，导航到模拟器的`/sdcard`文件夹。在那里，你会看到一个名为`gestures`的文件。注意这个文件并不大。`gestures`文件是一个二进制文件，因此你无法手动编辑它。要修改内容，你需要使用`Gestures\
  \ Builder`应用程序。在构建支持手势的应用时，你需要将`gestures`文件复制到应用的`/res/raw`目录。为此，你需要使用 File Explorer\
  \ 的文件复制功能，或使用`adb pull`将`gestures`文件获取到工作站，以便将其复制到你的项目中。\n\n除了在`Gestures Builder`中添加新手势，你还可以长按一个已有手势来调出菜单。从菜单中，你可以更改手势的名称或删除它。你无法重新录制手势，因此如果你不喜欢手势本身，你需要删除它并重新添加。如前所述，你可能希望录制手势的变体并为它们赋予相同名称，以考虑用户在输入手势时的差异。手势名称不必唯一，但同名的手势应该相似。\n\
  \n现在，我们将创建一个示例应用来使用我们新的`gestures`文件。使用 Eclipse，创建一个新的 Android 项目。布局文件的 XML 和`Activity`类的代码见代码清单\
  \ 25–17。\n\n**代码清单 25–17.** *手势展示应用的 Java 代码*\n\n```xml\n<?xml version=\"1.0\" encoding=\"\
  utf-8\"?>\n<!-- This file is /res/layout/main.xml -->\n<LinearLayout\n    android:orientation=\"\
  vertical\"\n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  fill_parent\" >\n  <TextView  \n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"\
  wrap_content\"\n    android:text=\"Draw gestures and I'll guess what they are\"\
  \ />\n\n  <android.gesture.GestureOverlayView  android:id=\"@+id/gestureOverlay\"\
  \n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"fill_parent\"\
  \n    android:gestureStrokeType=\"multiple\"  android:fadeOffset=\"1000\" />\n\n\
  </LinearLayout>\n\nimport java.util.ArrayList;\nimport android.app.Activity;\nimport\
  \ android.gesture.Gesture;\nimport android.gesture.GestureLibraries;\nimport android.gesture.GestureLibrary;\n\
  import android.gesture.GestureOverlayView;\nimport android.gesture.Prediction;\n\
  import android.gesture.GestureOverlayView.OnGesturePerformedListener;\nimport android.os.Bundle;\n\
  import android.util.Log;\nimport android.widget.Toast;\n\npublic class MainActivity\
  \ extends Activity implements OnGesturePerformedListener {\n    private static final\
  \ String TAG = \"Gesture Revealer\";\n    GestureLibrary gestureLib = null;\n\n\
  \    @Override\n    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n//        gestureLib = GestureLibraries.fromRawResource(this,\n\
  //                          R.raw.gestures);\n        gestureLib = GestureLibraries.fromFile(\"\
  /sdcard/gestures\");\n        if (!gestureLib.load()) {\n            Toast.makeText(this,\
  \ \"Could not load /sdcard/gestures\", \n                Toast.LENGTH_SHORT).show();\n\
  \            finish();\n        }\n\n        // Let's take a look at the gesture\
  \ library we have work with\n        Log.v(TAG, \"Library features:\");\n      \
  \  Log.v(TAG, \"  Orientation style: \" +\n                gestureLib.getOrientationStyle());\n\
  \        Log.v(TAG, \"  Sequence type: \" + gestureLib.getSequenceType());\n   \
  \     for( String gestureName : gestureLib.getGestureEntries() ) {\n           \
  \ Log.v(TAG, \"For gesture \" + gestureName);\n            int i = 1;\n        \
  \    for( Gesture gesture : gestureLib.getGestures(gestureName) )\n            {\n\
  \                Log.v(TAG, \"    \" + i + \": ID: \" + gesture.getID());\n    \
  \            Log.v(TAG, \"    \" + i + \": Strokes count: \" +\n               \
  \         gesture.getStrokesCount());\n                Log.v(TAG, \"    \" + i +\
  \ \": Stroke length: \" +\n                        gesture.getLength());\n     \
  \           i++;\n            }\n        }\n\n        GestureOverlayView gestureView\
  \ =\n            (GestureOverlayView) findViewById(R.id.gestureOverlay);\n     \
  \   gestureView.addOnGesturePerformedListener(this);\n    }\n\n    @Override\n \
  \   public void onGesturePerformed(GestureOverlayView view,\n                Gesture\
  \ gesture)\n    {\n        ArrayList<Prediction> predictions =\n               \
  \ gestureLib.recognize(gesture);\n```\n\n\n\n```java\nif (predictions.size() > 0)\
  \ {\n    Prediction prediction = (Prediction) predictions.get(0);\n    if (prediction.score\
  \ > 1.0) {\n        Toast.makeText(this, prediction.name,\n                Toast.LENGTH_SHORT).show();\n\
  \        for(int i=0;i<predictions.size();i++)\n            Log.v(TAG, \"prediction\
  \ \" + predictions.get(i).name +\n                    \" - score = \" + predictions.get(i).score);\n\
  \        }\n    }\n}\n```\n\n在这个示例中，我们将直接访问手势构建器（Gestures Builder）应用写入的同一文件。在我们的\
  \ `onCreate()` 方法中，我们使用 `GestureLibraries.fromFile()` 方法来实现这一点。但我们也通过注释展示了如何访问应用中包含的手势文件。如果你要使用\
  \ `fromRawResource()` 方法，你需要使用像常规资源 ID 一样的参数，并将手势文件放入 `/res/raw` 目录。\n\n我们的应用虽然功能不多，但运行它会让你更好地理解\
  \ Android 在处理手势时内部发生了什么。在启动时，我们的应用加载手势文件并记录找到的内容。它还会记录尝试匹配绘制到应用输入屏幕中的示例手势的结果。现在就去运行\
  \ Gesture Revealer 应用吧，当然，前提是你已经运行了 Gestures Builder 并在 `/sdcard/gestures` 文件中保存了一些手势。观察每个手势是如何通过\
  \ ID、笔画数和长度被记录下来的。\n\n在屏幕上使用一些你知道存在于手势库中的手势。然后使用一些你确定不存在的手势。观察 LogCat 记录来了解发生了什么。你可能会注意到，有时你认为应该被识别的内容却没有被识别，或者\
  \ Android 识别出的内容并非你所想，但大多数时候它都能正确识别你绘制的内容。你可能也注意到了，当 Android 识别到你的输入手势时，你会从预测结果中获得库中所有手势的评分；但当\
  \ Android 无法识别你的输入手势时，你则什么也得不到。\n\n另外，请注意当你使用多笔手势（例如字母 E）时，如果笔画之间的间隔时间过长会发生什么。应用会拿你到目前为止绘制的内容去与手势库进行比较，这很可能导致匹配错误或完全无法匹配。这个时间延迟由\
  \ `FadeOffset` 控制。这里就变得棘手了。我们希望 Android 在我们完成手势后立即开始匹配，但我们无法知道用户是否已完成，除非我们等待一段时间，确认没有新的手势笔画开始。因此，`FadeOffset`\
  \ 有两个作用：一是控制作为当前手势一部分的新笔画需要等待多长时间，二是控制开始将当前手势与手势库中的已知手势进行匹配需要等待多长时间。将 `FadeOffset`\
  \ 设置得过大意味着匹配过程开始前需要等待很长时间。将 `FadeOffset` 设置得过小则意味着无法使用多笔手势，因为 Android 会认为用户还未进入下一个手势笔画时手势就已经结束了。420\
  \ 毫秒是否合适取决于你的需求。你可能想使用一个“偏好设置”值，以便用户自行调整。\n\n说到多笔手势，请注意 `GestureOverlayView` 有一个设置用于控制是否接受多笔手势。在\
  \ XML 中对应的属性是 `android:gestureStrokeType`，其值可以是 `single`（默认值）或 `multiple`。如果你想能够绘制多笔手势，则必须设置此属性。你也可以通过编程方式使用\
  \ `setGestureStrokeType(int type)` 进行设置，参数可以是 `GestureOverlayView.GESTURE_STROKE_TYPE_SINGLE`\
  \ 或 `GestureOverlayView.GESTURE_STROKE_TYPE_MULTIPLE`。`GestureOverlayView` 也提供了用于设置颜色和线条粗细的\
  \ XML 属性和方法。\n\n要创建你自己的手势感知应用，你需要决定你的应用将对哪些手势做出响应，创建一个包含这些手势的库，并在你的 `Activity` 中实现\
  \ `onGesturePerformedListener` 接口，以便识别手势并采取相应的操作。\n\n如果你希望用户能够录制自己的手势呢？例如，用不同于你提供的手势来执行应用中的某个动作？这是可行的，但这意味着你需要一个可写入的手势库文件，而逻辑上最合适的位置是\
  \ SD 卡。创建一个新的手势库文件、从应用自带的手势库文件中读取默认手势、然后覆盖用户想要替换的手势，这些操作都相当简单。你可以参考之前提到的 Gestures\
  \ Builder 应用的实现来了解如何创建手势记录器。或者，也许有人会编写一个响应 intent 的 Gestures Builder 应用，这样你就可以简单地调用该\
  \ Activity 来添加新手势。另一种方法是，你可以将用户的手势记录到一个新的可写手势库文件中，然后将两个手势库都加载到你的应用中——一个是用户的，一个是你自己的。在\
  \ `onGesturePerformed()` 方法中，你可以先尝试在用户的手势库上调用 `recognize()`，然后再在自己的手势库上调用。你可以比较每个库返回的预测中最高的得分，以决定执行哪个操作。\n\
  \n### 小结\n\n在本章中，我们向你展示了如何处理触摸屏，从单点触摸应用开始，然后介绍了多点触摸。我们解释了触摸如何与地图配合工作，以及 Android\
  \ 为处理触摸和地图提供的有用类和方法。最后，我们探讨了 Android 中的手势机制，这些机制允许你的应用以一种全新的、或许比使用键盘或其他 UI 控件更简单的方式接收用户输入。\n\
  \n## 第 26 章\n\n## 使用传感器\n\nAndroid 设备通常内置了硬件传感器，而 Android 提供了一个用于处理这些传感器的框架。使用传感器可以很有趣。测量外部世界并在设备的软件中使用这些数据非常酷。这是你在普通台式机或服务器机房中无法获得的编程体验。使用传感器的全新应用的可能性是巨大的，我们希望你能受到启发去实现它们。\n\
  \n在本章中，我们将探索 Android 传感器框架。我们将解释什么是传感器、如何获取传感器数据，然后讨论我们可以从传感器获取的数据类型的一些细节以及我们可以用它们做什么。虽然\
  \ Android 已经定义了几种传感器类型，但毫无疑问未来 Android 会有更多传感器，我们期望未来的传感器会被集成到这个传感器框架中。\n\n\n\n\
  ### 什么是传感器？\n\n在 Android 中，传感器是一种内置于设备中的硬件，用于将物理世界的数据传输到应用程序。应用程序则利用传感器数据告知用户物理世界的状况、控制游戏操作、实现增强现实，或提供在现实世界中工作的实用工具。传感器仅单向运行；它们是只读的（有一个例外，即我们稍后会介绍的\
  \ NFC 传感器）。这使得使用它们相当简单。你设置一个监听器来接收传感器数据，然后随着数据的输入进行处理。GPS 硬件类似于我们在本章介绍的传感器。在第 17\
  \ 章中，我们设置了用于接收 GPS 位置更新的监听器，并且随着位置更新的到来，我们也处理了这些数据。但尽管 GPS 与传感器类似，它并不属于 Android\
  \ 提供的传感器框架的一部分。\n\nAndroid 设备中可能出现的部分传感器类型包括：\n\n- 光线传感器\n- 接近传感器\n- 温度传感器\n- 压力传感器\n\
  - 陀螺仪传感器\n- 加速度计\n- 磁场传感器\n- 方向传感器\n- 重力传感器（自 Android 2.3 起）\n- 线性加速度传感器（自 Android\
  \ 2.3 起）\n- 旋转矢量传感器（自 Android 2.3 起）\n- 近场通信 (NFC) 传感器（自 Android 2.3 起）\n\nNFC 传感器与本列表中的其他传感器不同。我们将在本章后面介绍\
  \ NFC 传感器，因为它的访问方式与其余传感器完全不同。\n\n#### 检测传感器\n\n不过，请注意不要假定所有 Android 设备都拥有所有这些传感器。事实上，许多设备仅拥有其中一部分传感器。例如，Android\
  \ 模拟器只有一个加速度计。那么，你如何知道设备上有哪些传感器可用？有两种方法：一种直接，一种间接。\n\n第一种方法是向 `SensorManager` 请求可用传感器的列表。它会响应一个传感器对象列表，然后你可以为这些对象设置监听器并从中获取数据。我们将在本章稍后部分向你展示如何操作。此方法假设用户已将你的应用程序安装到设备上，但如果设备没有你的应用程序所需的传感器怎么办？\n\
  \n这就是第二种方法的用途。在 `AndroidManifest.xml` 文件中，你可以指定设备必须具有哪些功能才能正确支持你的应用程序。如果你的应用程序需要接近传感器，你可以在清单文件中添加如下一行来指定：\n\
  \n`<uses-feature android:name=”android.hardware.sensor.proximity” />`\n\n现在，你的应用程序将只安装在具有接近传感器的设备上，因此当你的应用程序运行时，你就知道该传感器存在。\n\
  \n#### 关于传感器我们能知道什么？\n\n虽然在清单文件中使用 `uses-feature` 标签可以让你知道设备上存在应用程序所需的传感器，但它并不能告诉你关于实际传感器你可能想知道的一切。让我们构建一个简单的应用程序，用于向设备查询传感器信息。清单\
  \ 26–1 展示了我们布局的 XML 以及 `MainActivity` 的 Java 代码。\n\n**注意：** 你可以下载本章的项目。我们将在本章末尾提供\
  \ URL。这将允许你直接将项目导入到你的 Eclipse 中。\n\n**清单 26–1.** *传感器列表应用的 XML 和 Java 代码*\n\n```\n\
  <?xml version=\"1.0\" encoding=\"utf-8\"?>\n<!-- 此文件为 /res/layout/main.xml -->\n\
  <LinearLayout\n    android:orientation=\"vertical\"\n    android:layout_width=\"\
  fill_parent\"\n    android:layout_height=\"fill_parent\" >\n  <ScrollView android:layout_width=\"\
  fill_parent\"\n    android:layout_height=\"0dip\"\n    android:layout_weight=\"\
  1\" >\n    <TextView  android:id=\"@+id/text\"\n      android:layout_width=\"fill_parent\"\
  \n      android:layout_height=\"wrap_content\" />\n  </ScrollView>\n</LinearLayout>\n\
  ```\n\n```\n// 此文件为 MainActivity.java\nimport java.util.HashMap;\nimport java.util.List;\n\
  import android.app.Activity;\nimport android.hardware.Sensor;\nimport android.hardware.SensorManager;\n\
  import android.os.Bundle;\nimport android.widget.TextView;\n\npublic class MainActivity\
