  \n### 平板电脑的影响\n\n底层的搜索 API 在 3.0 中保持不变。然而，快速搜索框和搜索设置（本质上是用户体验）略有改动，以便更好地利用屏幕空间。除此之外，本章介绍的理念同样适用于平板电脑。\n\
  \n### 总结\n\n在本章中，我们相当详细地介绍了 Android 搜索的内部工作原理。您已经了解了活动和建议提供程序是如何与 Android 搜索交互的。我们向您展示了如何使用`SearchRecentSuggestionsProvider`。\n\
  \n我们从零开始编写了一个自定义建议提供程序，并在此过程中详细演示了建议光标及其列。我们探讨了负责从建议提供程序获取数据的 URI。我们提供了大量示例代码，这些代码应该能让您轻松设计和实现创造性的搜索策略。\n\
  \n仅基于建议光标的灵活性，Android 搜索就已超越简单的搜索，成为触手可及的信息通道。\n\n## 第 24 章\n\n## 探索文字转语音\n\nAndroid\
  \ 1.6 及更高版本具备一项名为 Pico 的多语言语音合成引擎特性。它允许任何 Android 应用程序以匹配该语言的口音朗读一段文本字符串。文字转语音软件使用户无需查看屏幕即可与应用程序互动。这对于移动平台来说极其重要。有多少人在阅读短信时不小心走进了车流？如果您可以简单地收听短信而不是阅读呢？如果您可以在步行时收听导览而不是边走边读呢？有无数应用场景中，加入语音功能可以提升应用的实用性。在本章中，我们将探索\
  \ Android 的`TextToSpeech`类，并了解如何让系统为我们朗读文本。我们还将学习如何管理区域设置、语言和可用语音。\n\n\n\n### Android\
  \ 文字转语音功能基础\n\n在开始将文字转语音（TTS）集成到应用之前，你应该先听听它的实际效果。在模拟器或设备（Android SDK 1.6 或更高版本）上，进入主“设置”屏幕，选择“语音输入与输出”，然后选择“文字转语音设置”（或者根据你运行的\
  \ Android 版本，从设置中选择“文字转语音”或“语音合成”）。点击“聆听示例”选项，你应该会听到用 Pico 引擎朗读的英文示例：“This is an\
  \ example of speech synthesis in English with Pico。”请注意列表中的其他选项（参见 图 24–1）。\n\n\
  ![images](img/2401.jpg)\n\n**图 24–1.** *文字转语音的设置界面*\n\n你可以更改语音的语言和语速。语言选项不仅可以翻译朗读的示例文字，还能改变朗读者的口音，不过示例文字本身仍然是“This\
  \ is an example of speech synthesis”，只是语言设置选项已改为你选择的语言。请注意，文字转语音功能实际上只负责语音部分。将文本从一种语言翻译到另一种语言是通过单独的组件完成的，例如我们曾在\
  \ 第 11 章 中介绍过的谷歌翻译。稍后，当我们在应用中实际实现 TTS 时，我们需要让语音与语言匹配，例如用法语语音朗读法语文本。语速值范围从“非常慢”到“非常快”。\n\
  \n请特别注意“始终使用我的设置”选项。如果这个选项是由你或用户在系统设置中开启的，你的应用可能不会按预期运行，因为这里的设置可能会覆盖你想在应用中实现的功能。\n\
  \n从 Android 2.2 开始，我们能够使用除 Pico 之外的 TTS 引擎（因此，在 Android 2.2 之前，你不会在这个设置页面中看到“默认引擎”选项）。这种选择提供了灵活性，因为\
  \ Pico 并非在所有情况下都能良好运行。即使有多个 TTS 引擎，设备上也只有一个 TTS 服务。这个 TTS 服务由设备上的所有活动共享，因此我们必须意识到，我们可能不是唯一使用\
  \ TTS 的人。此外，我们无法确定文本何时会被朗读，甚至根本无法确定它是否会被朗读。不过，TTS 服务接口为我们提供了回调，因此我们能够大致了解发送给朗读的文本处理情况。TTS\
  \ 服务会记录我们想要使用的 TTS 引擎，并在为我们执行操作时使用我们指定的 TTS 引擎。该服务会使用每个调用活动所需的任何 TTS 引擎，因此其他应用可以使用与我们应用不同的\
  \ TTS 引擎，我们无需为此担心。\n\n让我们探索一下操作这些 TTS 设置时实际发生了什么。在幕后，Android 启动了一个文字转语音服务以及 Pico（一个多语言语音合成引擎）。我们当前所在的偏好设置活动已经为当前语言和语速初始化了引擎。当我们点击“聆听示例”时，偏好设置活动将文本发送给服务，然后引擎通过音频输出朗读出来。Pico\
  \ 将文本分解成它知道如何发音的片段，并以听起来相当自然的方式将这些音频片段拼接起来。引擎内部的逻辑实际上比这要复杂得多，但就我们的目的而言，我们可以把它当作一个魔法。幸运的是，对我们来说，这个魔法在磁盘空间和内存占用方面都非常小，因此\
  \ Pico 是手机的理想补充。\n\n在这个例子中，我们将创建一个能够朗读出我们输入文本的应用。这个应用相当简单，但它的目的是向你展示设置文字转语音是多么容易。首先，使用\
  \ 代码清单 24–1 中的资源创建一个新的 Android 项目。\n\n**注意：** 我们将在本章末尾提供一个网址，你可以通过它下载本章的项目文件。这样你就可以直接将这些项目导入到你的\
  \ Eclipse 中。\n\n**代码清单 24–1.** *简单 TTS 演示的 XML 和 Java 代码*\n\n```\n<?xml version=\"\
  1.0\" encoding=\"utf-8\"?>\n<!-- 此文件为 /res/layout/main.xml -->\n<LinearLayout\n\
  \    android:orientation=\"vertical\"\n    android:layout_width=\"fill_parent\"\n\
  \    android:layout_height=\"fill_parent\">\n\n  <EditText android:id=\"@+id/wordsToSpeak\"\
  \n    android:hint=\"在此输入要朗读的文字\"\n    android:layout_width=\"fill_parent\"\n  \
  \  android:layout_height=\"wrap_content\"/>\n\n  <Button android:id=\"@+id/speak\"\
  \n    android:text=\"朗读\"\n    android:layout_width=\"wrap_content\"\n    android:layout_height=\"\
  wrap_content\"\n    android:onClick=\"doSpeak\"\n    android:enabled=\"false\" />\n\
  \n</LinearLayout>\n\n// 此文件为 MainActivity.java\nimport android.app.Activity;\nimport\
  \ android.content.Intent;\nimport android.os.Bundle;\nimport android.speech.tts.TextToSpeech;\n\
  import android.speech.tts.TextToSpeech.OnInitListener;\nimport android.util.Log;\n\
  import android.view.View;\nimport android.widget.Button;\nimport android.widget.EditText;\n\
  \npublic class MainActivity extends Activity implements OnInitListener {\n    private\
  \ EditText words = null;\n    private Button speakBtn = null;\n    private static\
  \ final int REQ_TTS_STATUS_CHECK = 0;\n    private static final String TAG = \"\
  TTS Demo\";\n    private TextToSpeech mTts;\n\n    /** 当活动首次创建时被调用。 */\n    @Override\n\
  \    public void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n\n        words = (EditText)findViewById(R.id.wordsToSpeak);\n\
  \        speakBtn = (Button)findViewById(R.id.speak);\n\n        // 检查确保 TTS 存在且可用\n\
  \        Intent checkIntent = new Intent();\n        checkIntent.setAction(TextToSpeech.Engine.ACTION_CHECK_TTS_DATA);\n\
  \        startActivityForResult(checkIntent, REQ_TTS_STATUS_CHECK);\n    }\n\n \
  \   public void doSpeak(View view) {\n        mTts.speak(words.getText().toString(),\n\
  \            TextToSpeech.QUEUE_ADD, null);\n    }\n\n    protected void onActivityResult(int\
  \ requestCode, int resultCode,\n            Intent data) {\n        if (requestCode\
  \ == REQ_TTS_STATUS_CHECK) {\n            switch (resultCode) {\n            case\
  \ TextToSpeech.Engine.CHECK_VOICE_DATA_PASS:\n                // TTS 正在运行\n    \
  \            mTts = new TextToSpeech(this, this);\n                Log.v(TAG, \"\
  Pico 安装正常\");\n                break;\n            case TextToSpeech.Engine.CHECK_VOICE_DATA_BAD_DATA:\n\
  \            case TextToSpeech.Engine.CHECK_VOICE_DATA_MISSING_DATA:\n         \
  \   case TextToSpeech.Engine.CHECK_VOICE_DATA_MISSING_VOLUME:\n                //\
  \ 缺少数据，进行安装\n                Log.v(TAG, \"需要语言资源：\" + resultCode);\n           \
  \     Intent installIntent = new Intent();\n                installIntent.setAction(\n\
  \                    TextToSpeech.Engine.ACTION_INSTALL_TTS_DATA);\n           \
  \     startActivity(installIntent);\n                break;\n            case TextToSpeech.Engine.CHECK_VOICE_DATA_FAIL:\n\
  \            default:\n                Log.e(TAG, \"遇到错误。TTS 不可用\");\n         \
  \   }\n        }\n        else {\n            // 收到其他结果\n        }\n    }\n\n  \
  \  public void onInit(int status) {\n        // 现在 TTS 引擎已准备就绪，我们启用按钮\n        if(\
  \ status == TextToSpeech.SUCCESS) {\n            speakBtn.setEnabled(true);\n  \
  \      }\n    }\n\n    @Override\n    public void onPause()\n    {\n        super.onPause();\n\
  \        // 如果失去焦点，停止朗读\n        if( mTts != null)\n            mTts.stop();\n \
  \   }\n```\n\n\n`@Override`\n`public void onDestroy()`\n`{\n    super.onDestroy();\n\
  \    mTts.shutdown();\n}`\n\n我们这个示例的用户界面由一个简单的 `EditText` 视图（用于输入要朗读的文字）和一个按钮（用于触发朗读）组成（参见\
  \ 图 24–2）。按钮包含一个 `doSpeak()` 方法，它从 `EditText` 视图中获取文本字符串，并使用 `speak()` 方法配合 `QUEUE_ADD`\
  \ 参数将其加入 TTS 服务的队列。请记住，TTS 服务是共享的，因此在这种情况下，我们会将文本排在可能存在的其他朗读任务之后（极大概率是没有任何任务的）。除了\
  \ `QUEUE_ADD` 之外，另一个选项是 `QUEUE_FLUSH`，它会丢弃队列中的所有其他文本，并立即播放我们的文本。在 `onCreate()` 方法的末尾，我们启动了一个\
  \ `Intent`，请求 TTS 引擎告知文本是否已准备好朗读。由于我们需要得到回复，因此我们使用 `startActivityForResult()` 并传递一个请求码。我们在\
  \ `onActivityResult()` 中获取响应，并在其中检查 `CHECK_VOICE_DATA_PASS`。由于 TTS 服务可能返回多种表示“成功”的\
  \ `resultCode` 类型，我们不能简单地检查 `RESULT_OK`。请通过查看 `switch` 语句来了解我们可以获取的其他值。\n\n![images](img/2402.jpg)\n\
  \n**图 24–2.** *TTS 演示的用户界面*\n\n如果收到 `CHECK_VOICE_DATA_PASS` 返回结果，我们实例化一个 `TextToSpeech`\
  \ 对象。请注意，我们的 `MainActivity` 实现了 `OnInitListener` 接口。这使我们能够在 TTS 服务接口已创建并可用时收到一个回调，我们通过\
  \ `onInit()` 方法接收该回调。如果在 `onInit()` 方法内部收到 `SUCCESS`，我们就知道可以朗读文本了，并在用户界面中启用我们的按钮。还有两件事需要注意：在\
  \ `onPause()` 中调用 `stop()` 方法，以及在 `onDestroy()` 中调用 `shutdown()` 方法。我们调用 `stop()`\
  \ 是因为如果有其他内容出现在我们的应用前面，应用就会失去焦点，应该停止朗读。我们不想打断另一个已跳到前面的活动中的音频内容。我们调用 `shutdown()`\
  \ 是为了通知 Android，我们已经用完了 TTS 引擎，并且其资源（如果其他应用不需要）可以被释放。\n\n请继续尝试这个示例。试试不同的句子或短语。然后，给它一大段文本，这样你就能听到连续的语音朗读。考虑一下，如果在朗读大段文本时我们的应用被中断（例如，其他应用使用\
  \ `QUEUE_FLUSH` 调用了 TTS 服务，或者应用只是失去了焦点），会发生什么。为了测试这个想法，当一大段文本正在朗读时，按下 Home 键。由于我们在\
  \ `onPause()` 中调用了 `stop()`，朗读会停止，即使我们的应用仍在后台运行。如果我们的应用重新获得焦点，我们如何知道朗读到了哪里？如果我们有办法知道上次中断的位置，以便能够重新开始朗读（至少接近上次中断的位置），那将会很方便。确实有办法，但这需要一些额外的工作。\n\
  \n### 使用语音片段跟踪朗读进度\n\nTTS 引擎可以在完成一段文本（在 TTS 领域称为*语音片段*）的朗读时，在你的应用中调用一个回调。我们在 TTS\
  \ 实例上使用 `setOnUtteranceCompletedListener()` 方法来设置回调，在示例中即为 `mTts`。当调用 `speak()`\
  \ 方法时，我们可以添加一个键值对，告诉 TTS 引擎在该语音片段播放完毕后通知我们。通过向 TTS 引擎发送唯一的语音片段 ID，我们可以跟踪哪些语音片段已经朗读过，哪些还没有。如果应用在中断后重新获得焦点，我们可以从上一次完成的语音片段之后的下一个语音片段开始继续朗读。基于之前的示例，按照清单\
  \ 24–2 所示修改代码，或者查看本书网站源代码中的 `TTSDemo2` 项目。\n\n**清单 24–2.** *对 `MainActivity` 的修改以展示语音片段跟踪*\n\
  \n`// 添加这些导入`\n`import java.util.HashMap;`\n`import java.util.StringTokenizer;`\n\
  `import android.speech.tts.TextToSpeech.OnUtteranceCompletedListener;`\n\n```\n\
  // 修改 MainActivity\npublic class MainActivity extends Activity implements OnInitListener,\n\
  OnUtteranceCompletedListener {\n\n// 添加这些私有字段\nprivate int uttCount = 0;\n    private\
  \ int lastUtterance = -1;\n    private HashMap<String, String> params = new HashMap<String,\
  \ String>();\n\n    // 修改 onInit\n    public void onInit(int status) {\n       \
  \ // 现在 TTS 引擎已就绪，我们可以启用按钮了\n        if( status == TextToSpeech.SUCCESS) {\n   \
  \         speakBtn.setEnabled(true);\n            mTts.setOnUtteranceCompletedListener(this);\n\
  \        }\n    }\n\n// 添加新方法 onUtteranceCompleted\n    public void onUtteranceCompleted(String\
  \ uttId) {\n        Log.v(TAG, \"收到语音片段 ID 为 \" + uttId + \" 的完成消息\");\n       \
  \ lastUtterance = Integer.parseInt(uttId);\n    }\n\n    // 修改 doSpeak\n    public\
  \ void doSpeak(View view) {\n        StringTokenizer st = new StringTokenizer(words.getText().toString(),\"\
  ,.\");\n        while (st.hasMoreTokens()) {\n            params.put(TextToSpeech.Engine.KEY_PARAM_UTTERANCE_ID,\n\
  \                        String.valueOf(uttCount++));\n            mTts.speak(st.nextToken(),\
  \ TextToSpeech.QUEUE_ADD, params);\n        }\n    }\n}\n```\n\n我们首先需要确保 `MainActivity`\
  \ 也实现了 `OnUtteranceCompletedListener` 接口。这将使我们能够在语音片段朗读完成时收到 TTS 引擎的回调。我们还需要修改按钮的\
  \ `doSpeak()` 方法，以便为发送的每段文本传递额外的信息，从而关联一个语音片段 ID。在这个新版本的示例中，我们将使用逗号和句点作为分隔符，把文本拆分成多个语音片段。然后，我们遍历这些语音片段，使用\
  \ `QUEUE_ADD`（而不是 `QUEUE_FLUSH`，因为我们不想中断自己！）传递每个片段，并附上一个唯一的语音片段 ID（一个简单的递增计数器，当然要转换为\
  \ `String`）。我们可以使用任何唯一的文本来作为语音片段 ID；既然它是 `String` 类型，我们就不局限于数字。实际上，我们可以直接用文本本身作为语音片段\
  \ ID，不过如果文本非常长，出于性能考虑，我们可能不想这样做。我们需要修改 `onInit()` 方法以注册自己来接收语音片段完成时的回调，最后，我们需要提供回调方法\
  \ `onUtteranceCompleted()`，以便 TTS 服务在语音片段完成时调用。在这个示例中，我们只是简单地为每个完成的语音片段记录一条消息到 `LogCat`。\n\
  \n当你运行这个新示例时，输入一些包含逗号和句点的文本，然后点击“Speak”按钮。在听语音朗读文本的同时，观察 `LogCat` 窗口。你会注意到文本被立即加入队列，并且每当一个语音片段完成时，我们的回调就会被调用，并在\
  \ `LogCat` 中为每个片段记录一条消息。如果你中断了这个示例（例如，在朗读文本时点击 Home 键），你会看到语音和回调都停止了。我们现在知道了最后一个语音片段是什么，并且可以在以后重新获得控制权时，从中断的地方继续朗读。\n\
  \n\n\n### 使用音频文件定制语音\n\nTTS 引擎提供了一种方法，可以正确发音那些默认情况下读错的单词或语句。例如，如果你输入\"Don Quixote\"\
  作为要朗读的文本，你会听到一个不正确的发音。公平地说，TTS 引擎能够对单词的发音做出合理猜测，但不能指望它了解所有规则中的每一个例外情况。那么如何解决这个问题呢？一种方法是录制一段音频片段，用其替代默认音频进行播放。为了保持语音一致性，我们希望使用\
  \ TTS 引擎生成声音并录制结果，然后告诉 TTS 引擎用我们录制的声音替换其默认发音。关键在于提供听起来符合我们预期的文本。让我们开始吧。\n\n在 Eclipse\
  \ 中创建一个新的 Android 项目。使用代码清单 24–3 中的 XML 创建主布局。为了简化操作，我们将文本直接放入布局文件中，而不使用字符串引用。通常，你应该在布局文件中使用字符串资源\
  \ ID。布局效果如图 24–3 所示。\n\n**代码清单 24–3.** *演示文本保存音频的布局 XML 文件*\n\n```xml\n<?xml version=\"\
  1.0\" encoding=\"utf-8\"?>\n<!-- 此文件位于 /res/layout/main.xml -->\n<LinearLayout\n\
  \    android:orientation=\"vertical\" android:layout_width=\"fill_parent\"\n   \
  \ android:layout_height=\"fill_parent\">\n\n  <EditText android:id=\"@+id/wordsToSpeak\"\
  \n    android:text=\"Dohn Keyhotay\"\n    android:layout_width=\"fill_parent\"\n\
  \    android:layout_height=\"wrap_content\"/>\n\n  <Button android:id=\"@+id/speakBtn\"\
  \n    android:text=\"朗读\"\n    android:layout_width=\"wrap_content\"\n    android:layout_height=\"\
  wrap_content\"\n    android:onClick=\"doButton\"\n    android:enabled=\"false\"\
  \ />\n\n  <TextView android:id=\"@+id/filenameLabel\"\n    android:text=\"文件名：\"\
  \n    android:layout_width=\"wrap_content\"\n    android:layout_height=\"wrap_content\"\
  />\n\n  <EditText android:id=\"@+id/filename\"\n    android:text=\"/sdcard/donquixote.wav\"\
  \n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"wrap_content\"\
  />\n\n  <Button android:id=\"@+id/recordBtn\"\n    android:text=\"录制\"\n    android:layout_width=\"\
  wrap_content\"\n    android:layout_height=\"wrap_content\"\n    android:enabled=\"\
  false\"\n    android:onClick=\"doButton\"/>\n\n  <Button android:id=\"@+id/playBtn\"\
  \n    android:text=\"播放\"\n    android:layout_width=\"wrap_content\"\n    android:layout_height=\"\
  wrap_content\"\n    android:onClick=\"doButton\"\n    android:enabled=\"false\"\
  \ />\n\n  <TextView android:id=\"@+id/useWithLabel\"\n    android:text=\"关联文本：\"\
  \n    android:layout_width=\"wrap_content\"\n    android:layout_height=\"wrap_content\"\
  />\n\n  <EditText android:id=\"@+id/realText\"\n    android:text=\"Don Quixote\"\
  \n    android:layout_width=\"fill_parent\"\n    android:layout_height=\"wrap_content\"\
  />\n\n  <Button android:id=\"@+id/assocBtn\"\n    android:text=\"关联\"\n    android:layout_width=\"\
  wrap_content\"\n    android:layout_height=\"wrap_content\"\n    android:onClick=\"\
  doButton\"\n    android:enabled=\"false\" />\n\n</LinearLayout>\n```\n\n![images](img/2403.jpg)\n\
  \n**图 24–3.** *将声音文件与文本关联的 TTS 演示用户界面*\n\n我们需要一个字段来保存特殊文本，该文本将用于通过 TTS 引擎录制到声音文件中。我们还在布局中提供了文件名。最后，我们需要将声音文件与我们要播放声音的实际字符串关联起来。\n\
  \n现在，让我们看一下`MainActivity`的 Java 代码（参见代码清单 24–4）。在`onCreate()`方法中，我们为朗读、播放、录制和关联按钮设置了点击处理程序，然后通过\
  \ intent 启动 TTS 引擎。其余代码包括用于处理 intent 结果（检查 TTS 引擎是否正确设置）的回调、处理 TTS 引擎初始化结果的回调，以及处理活动暂停和关闭的常规回调。\n\
  \n**代码清单 24–4.** *演示文本保存音频的 Java 代码*\n\n```java\nimport java.io.File;\nimport java.util.ArrayList;\n\
  \nimport android.app.Activity;\nimport android.content.Intent;\nimport android.media.MediaPlayer;\n\
  import android.os.Bundle;\nimport android.speech.tts.TextToSpeech;\nimport android.speech.tts.TextToSpeech.OnInitListener;\n\
  import android.util.Log;\nimport android.view.View;\nimport android.view.View.OnClickListener;\n\
  import android.widget.Button;\nimport android.widget.EditText;\nimport android.widget.Toast;\n\
  \npublic class MainActivity extends Activity implements OnInitListener {\n    private\
  \ EditText words = null;\n    private Button speakBtn = null;\n    private EditText\
  \ filename = null;\n    private Button recordBtn = null;\n    private Button playBtn\
  \ = null;\n    private EditText useWith = null;\n    private Button assocBtn = null;\n\
  \    private String soundFilename = null;\n    private File soundFile = null;\n\
  \    private static final int REQ_TTS_STATUS_CHECK = 0;\n    private static final\
  \ String TAG = \"TTS Demo\";\n    private TextToSpeech mTts = null;\n    private\
  \ MediaPlayer player = null;\n\n    /** 活动首次创建时调用 */\n    @Override\n    public\
  \ void onCreate(Bundle savedInstanceState) {\n        super.onCreate(savedInstanceState);\n\
  \        setContentView(R.layout.main);\n\n        words = (EditText)findViewById(R.id.wordsToSpeak);\n\
  \        filename = (EditText)findViewById(R.id.filename);\n        useWith = (EditText)findViewById(R.id.realText);\n\
  \n        speakBtn = (Button)findViewById(R.id.speakBtn);\n        recordBtn = (Button)findViewById(R.id.recordBtn);\n\
  \        playBtn = (Button)findViewById(R.id.playBtn);\n        assocBtn = (Button)findViewById(R.id.assocBtn);\n\
  \n        // 检查确保 TTS 存在且可用\n        Intent checkIntent = new Intent();\n      \
  \  checkIntent.setAction(TextToSpeech.Engine.ACTION_CHECK_TTS_DATA);\n        startActivityForResult(checkIntent,\
  \ REQ_TTS_STATUS_CHECK);\n    }\n\n    public void doButton(View view) {\n     \
  \   switch(view.getId()) {\n        case R.id.speakBtn:\n            mTts.speak(words.getText().toString(),\n\
  \                TextToSpeech.QUEUE_ADD, null);\n            break;\n        case\
  \ R.id.recordBtn:\n            soundFilename = filename.getText().toString();\n\
  \            soundFile = new File(soundFilename);\n            if (soundFile.exists())\n\
  \                soundFile.delete();\n```\n\n\n```java\nif(mTts.synthesizeToFile(words.getText().toString(),\n\
  \        null, soundFilename) == TextToSpeech.SUCCESS) {\n    Toast.makeText(getBaseContext(),\n\
  \            \"语音文件已创建\",\n            Toast.LENGTH_SHORT).show();\n    playBtn.setEnabled(true);\n\
  \    assocBtn.setEnabled(true);\n}\nelse {\n    Toast.makeText(getBaseContext(),\n\
  \            \"哎呀！语音文件未创建\",\n            Toast.LENGTH_SHORT).show();\n}\nbreak;\n\
  case R.id.playBtn:\n    try {\n        player = new MediaPlayer();\n        player.setDataSource(soundFilename);\n\
  \        player.prepare();\n        player.start();\n    }\n    catch(Exception\
  \ e) {\n        Toast.makeText(getBaseContext(),\n                \"嗯……无法播放文件\"\
  ,\n                Toast.LENGTH_SHORT).show();\n        e.printStackTrace();\n \
  \   }\n    break;\ncase R.id.assocBtn:\n    mTts.addSpeech(useWith.getText().toString(),\
  \ soundFilename);\n    Toast.makeText(getBaseContext(),\n         \"已关联！\",\n  \
  \       Toast.LENGTH_SHORT).show();\n    break;\n    }\n}\n\nprotected void onActivityResult(int\
  \ requestCode, int resultCode,\n        Intent data) {\n    if (requestCode == REQ_TTS_STATUS_CHECK)\
  \ {\n        switch (resultCode) {\n        case TextToSpeech.Engine.CHECK_VOICE_DATA_PASS:\n\
  \            // TTS 引擎已就绪\n            mTts = new TextToSpeech(this, this);\n  \
  \          Log.v(TAG, \"Pico 已正确安装\");\n            ArrayList<String> available\
  \ =\n                    data.getStringArrayListExtra(\"availableVoices\");\n  \
  \          break;\n        case TextToSpeech.Engine.CHECK_VOICE_DATA_BAD_DATA:\n\
  \        case TextToSpeech.Engine.CHECK_VOICE_DATA_MISSING_DATA:\n        case TextToSpeech.Engine.CHECK_VOICE_DATA_MISSING_VOLUME:\n\
  \            // 缺少数据，需要安装\n            Log.v(TAG, \"需要语言包：\" + resultCode);\n  \
  \          Intent installIntent = new Intent();\n            installIntent.setAction(\n\
  \                TextToSpeech.Engine.ACTION_INSTALL_TTS_DATA);\n            startActivity(installIntent);\n\
  \            break;\n        case TextToSpeech.Engine.CHECK_VOICE_DATA_FAIL:\n \
  \       default:\n            Log.e(TAG, \"操作失败，TTS 不可用\");\n        }\n    }\n\
  \    else {\n        // 接收到其他结果\n    }\n}\n\npublic void onInit(int status) {\n\
  \    // TTS 引擎就绪后，启用按钮\n    if( status == TextToSpeech.SUCCESS) {\n        speakBtn.setEnabled(true);\n\
  \        recordBtn.setEnabled(true);\n    }\n}\n\n@Override\npublic void onPause()\n\
  {\n    super.onPause();\n    // 若失去焦点，停止播放\n    if(player != null) {\n        player.stop();\n\
  \    }\n    // 若失去焦点，停止朗读\n    if( mTts != null)\n        mTts.stop();\n}\n\n@Override\n\
  public void onDestroy()\n{\n    super.onDestroy();\n    if(player != null) {\n \
  \       player.release();\n    }\n    if( mTts != null) {\n        mTts.shutdown();\n\
  \    }\n}\n```\n\n为了让这个示例能够运行，我们需要在 `AndroidManifest.xml` 文件中添加 `android.permission.WRITE_EXTERNAL_STORAGE`\
  \ 权限。当你运行这个示例时，应该会看到如图 24-3 所示的界面。\n\n我们将要录制一些听起来像“堂吉诃德”发音的文本，因此不能使用真实的词语。我们需要编造一些文本来获得想要的声音。点击“Speak”按钮，听听这些假词听起来如何。效果还不错！接下来，点击“Record”将音频写入一个\
  \ WAV 文件。当录制成功时，“Play”和“Associate”按钮会被启用。点击“Play”按钮，直接通过媒体播放器播放 WAV 文件。如果你喜欢这个声音，点击“Associate”按钮。这会调用\
  \ TTS 引擎的 `addSpeech()` 方法，将我们的新音频文件与“Use with”字段中的字符串关联起来。如果关联成功，返回顶部的 `EditText`\
  \ 视图；输入 **Don Quixote**，然后点击“Speak”。现在它的发音就正常了。\n\n请注意，`synthesizeToFile()` 方法只能保存为\
  \ WAV 文件格式，无论文件扩展名是什么，但你也可以使用 `addSpeech()` 关联其他格式的音频文件——例如 MP3 文件。MP3 文件需要通过除 TTS\
  \ 引擎的 `synthesizeToFile()` 方法之外的其他方式创建。\n\n这种方法在语音方面的用途非常有限。在一个词汇量无限的场景中——也就是说，当你无法预知哪些单词会被朗读时——你不可能事先准备好所有所需的音频文件，来纠正\
  \ Pico 发音不准确的单词。但在词汇量有限的场景中（例如朗读天气预报），你可以逐个测试应用程序中的所有单词，找出那些发音不合适的并加以修正。即使在词汇量无限的场景中，你也可以预先准备一些单词的发音，以确保关键单词的发音正确。例如，你可能希望为你的公司名或你自己的名字准备好音频文件！\n\
  \n然而，这种方法也有一个弊端：你传递给 `speak()` 的文本必须与你调用 `addSpeech()` 时使用的文本完全一致。不幸的是，你不能只为单个单词提供音频文件，然后期望在将该单词作为句子的一部分传递给\
  \ `speak()` 时，TTS 引擎会自动使用该音频文件。要听到你的音频文件，你必须提供与该音频文件完全相同的文本。任何多余或缺少的内容都会导致 Pico\
  \ 介入并尽力发音。\n\n解决这个问题的一种方法是将文本拆分成单词，并将每个单词单独传递给 TTS 引擎。虽然这可能会播放我们的音频文件（当然，我们需要将“Quixote”和“Don”分开录制），但整体效果将像断断续续的语音，仿佛每个单词都是一个独立的句子。在某些应用程序中，这或许是可以接受的。使用音频文件的理想场景是，当我们需要朗读预先确定的固定词语或短语时，我们提前确切知道需要朗读的文本。\n\
  \n那么，当我们知道句子中的某些单词 Pico 无法正确发音时，该怎么办？一种方法可能是扫描文本，找出已知的“问题”单词，然后用 Pico 能够正确发音的“假”单词替换这些单词。我们无需向用户展示我们传递给\
  \ `speak()` 方法的文本。因此，我们或许可以在调用 `speak()` 之前，将文本中的“Quixote”替换为“Keyhotay”。这样做的结果是，发音正确，而用户毫不知情。在资源使用方面，存储假字符串比存储音频文件高效得多，即使我们仍然调用了\
  \ Pico。我们本来就需要为文本的其余部分调用 Pico，所以这几乎不算损失。然而，我们不应该过多地自作聪明地替 Pico 做决定。也就是说，Pico 在发音方面具有很高的智能，如果我们试图替\
  \ Pico 完成它的工作，很快就会遇到麻烦。\n\n\n### 文本转语音高级功能\n\n在上一个示例中，我们为一段文本录制了声音文件，这样当 TTS 引擎稍后回读时，会访问该声音文件，而不是使用\
  \ Pico 生成语音。如您所料，播放一个小型声音文件比运行 TTS 引擎并与之交互消耗的设备资源更少。因此，如果您需要为有限的单词或短语提供声音，即使 Pico\
  \ 引擎的发音正确，您也可能希望提前创建声音文件。这有助于您的应用运行得更快。如果您的声音文件数量较少，总体内存占用也可能更少。如果采用这种方法，您将需要使用以下方法调用：\n\
  \n`TextToSpeech.addSpeech(String text, String packagename, int soundFileResourceId)`\n\
  \n这是一种向 TTS 引擎添加声音文件的非常简便的方法。`text` 参数是要为其播放声音文件的字符串；`packagename` 是存储资源文件的应用包名；`soundFileResourceId`\
  \ 是声音文件的资源 ID。将您的声音文件存储在应用的 `/res/raw` 目录下。当应用启动时，通过引用声音文件的资源 ID（例如 `R.raw.quixote`）将预录的声音文件添加到\
  \ TTS 引擎。当然，您需要某种数据库或预定义列表来了解每个声音文件对应哪段文本。如果您正在对应用进行国际化处理，可以将不同语言的声音文件存储在相应的 `/res/raw`\
  \ 目录下；例如，法语声音文件存放在 `/res/raw-fr` 中。\n\n#### TTS 引擎的高级功能\n\n现在您已经学习了 TTS 的基础知识，让我们探索一下\
  \ Pico 引擎的一些高级功能。我们将从设置音频流开始，它可以帮助您将语音引导到正确的音频输出通道。接下来，我们将介绍如何播放耳标（可听图标）和静音。然后，我们将介绍如何设置语言选项，最后会提到一些其他方法调用。\n\
  \n##### 设置音频流\n\n之前，我们使用了 `params HashMap` 向 TTS 引擎传递额外参数。我们可以传递的一个参数（`KEY_PARAM_STREAM`）告诉\
  \ TTS 引擎为想要朗读的文本使用哪个音频流。可用的音频流列表参见表 24-1。\n\n**表 24-1.** 可用的音频流\n\n| **音频流** | **描述**\
  \ |\n| --- | --- |\n| `STREAM_ALARM` | 用于闹钟的音频流 |\n| `STREAM_DTMF` | 用于 DTMF 音（即电话按键音）的音频流\
  \ |\n| `STREAM_MUSIC` | 用于音乐播放的音频流 |\n| `STREAM_NOTIFICATION` | 用于通知的音频流 |\n| `STREAM_RING`\
  \ | 用于电话铃声的音频流 |\n| `STREAM_SYSTEM` | 用于系统声音的音频流 |\n| `STREAM_VOICE_CALL` | 用于电话通话的音频流\
  \ |\n\n如果我们要朗读的文本与闹钟相关，我们希望告诉 TTS 引擎通过闹钟的音频流播放声音。因此，在调用 `speak()` 方法之前，我们需要进行如下调用：\n\
  \n```\nparams.put(TextToSpeech.Engine.KEY_PARAM_STREAM,\n                      String.valueOf(AudioManager.STREAM_ALARM));\n\
  ```\n\n回顾清单 24-2 以回忆我们如何设置并将 `params HashMap` 传递给 `speak()` 方法调用。您可以将话语 ID 放入同一个\
  \ `params HashMap` 中，就像您用来指定音频流的那样。\n\n##### 使用耳标\n\nTTS 引擎可以为我们播放另一种类型的声音，称为耳标。耳标就像是一种可听的图标。它不用于表示文本，而是为某种事件或文本中非文字内容的存在提供听觉提示。耳标可以是一种声音，用来指示我们正在阅读演示文稿中的项目符号，或者我们刚刚翻到下一页。也许您的应用是用于步行导览，耳标可以告诉听众前往行程中的下一个地点。\n\
  \n要设置用于播放的耳标，您需要调用 `addEarcon()` 方法，该方法接受两个或三个参数，类似于 `addSpeech()`。第一个参数是耳标的名称，类似于\
  \ `addSpeech()` 的文本字段。按照惯例，您应该将耳标名称括在方括号中（例如，“`[boing]`”）。在有两个参数的情况下，第二个参数是文件名字符串。在有三个参数的情况下，第二个参数是包名，第三个参数是资源\
  \ ID，指向一个很可能存储在 `/res/raw` 下的音频文件。要播放耳标，请使用 `playEarcon()` 方法，该方法与具有三个参数的 `speak()`\
  \ 方法类似。使用耳标的示例如清单 24-5 所示。\n\n**清单 24-5:** *使用耳标的示例代码*\n\n```\nString turnPageEarcon\
  \ = \"[turnPage]\";\nmTts.addEarcon(turnPageEarcon, \"com.androidbook.tts.demo\"\
  ,\n    R.raw.turnpage);\nmTts.playEarcon(turnPageEarcon, TextToSpeech.QUEUE_ADD,\
  \ params);\n```\n\n我们使用耳标而不是简单地使用媒体播放器播放音频文件，是因为 TTS 引擎具有排队机制。我们无需确定播放听觉提示的最佳时机并依赖回调来确保正确的时序，而是可以将耳标与我们发送给\
  \ TTS 引擎的文本一起排队。这样我们就知道耳标会在适当的时间播放，并且可以使用相同的路径将声音传递给用户，包括使用 `onUtteranceCompleted()`\
  \ 回调来让我们了解当前进度。\n\n##### 播放静音\n\nTTS 引擎还有一种我们可以使用的播放方法：`playSilence()`。该方法也像 `speak()`\
  \ 和 `playEarcon()` 一样有三个参数，其中第二个参数是队列模式，第三个是可选的 `params HashMap`。`playSilence()`\
  \ 的第一个参数是一个 `long` 值，表示播放静音的毫秒数。您最有可能将此方法与 `QUEUE_ADD` 模式一起使用，以在时间上分隔两个不同的文本字符串。也就是说，您可以在两个文本字符串之间插入一段静音，而无需在应用中管理等待时间。您只需依次调用\
  \ `speak()`、`playSilence()` 和 `speak()` 即可获得所需效果。以下是一个使用 `playSilence()` 实现两秒延迟的示例：\n\
  \n```\nmTts.playSilence(2000, TextToSpeech.QUEUE_ADD, params);\n```\n\n##### 选择不同的文本转语音引擎\n\
  \n要指定特定的 TTS 引擎，可以使用 `setEngineByPackageName()` 方法，并将相应的引擎包名作为参数传入。对于 Pico，包名为 `com.svox.pico`。要获取用户的默认\
  \ TTS 引擎包名，请使用 `getDefaultEngine()` 方法。在到达 `onInit()` 方法之前，不得调用这两个方法，否则它们将无法正常工作。此外，这两个方法在\
  \ Android 2.2 之前的版本中不可用。\n\n\n\n###### 使用语言方法\n\n我们尚未讨论语言问题，现在就来探讨。TTS 功能使用与所创建语音对应的语言来朗读文本，例如，意大利语语音期望读取的是意大利语文本。语音会识别文本的特征以正确发音。因此，为\
  \ TTS 引擎提供不匹配的语言语音是没有意义的。用意大利语语音朗读法语文本很可能会引发问题；最好将文本的区域设置与语音的区域设置匹配起来。\n\nTTS 引擎提供了一些语言相关的方法，既可用于查找可用的语言，也可用于设置朗读语言。TTS\
  \ 引擎只安装了特定数量的语言包，不过如果有其他可用语言包，它能从 Android 市场获取。你在 清单 24–1 的 `onActivityResult()`\
  \ 回调中看到过相关代码，其中创建了一个 Intent 来获取缺失的语言。当然，所需的语言包可能尚不可用，但随着时间的推移，会有越来越多的语言包可用。\n\n\
  用于检查语言的 `TextToSpeech` 方法是 `isLanguageAvailable(Locale locale)`。由于区域设置可能代表国家和语言，有时还包含变体，因此返回结果并非简单的“是”或“否”。可能的返回值如下：`TextToSpeech.LANG_COUNTRY_AVAILABLE`，表示同时支持国家和语言；`TextToSpeech.LANG_AVAILABLE`，表示支持该语言但不支持该国家；`TextToSpeech.LANG_NOT_SUPPORTED`，表示完全不支持。如果你收到\
  \ `TextToSpeech.LANG_MISSING_DATA`，说明语言受支持，但 TTS 引擎未找到数据文件。你的应用应引导用户前往 Android 市场或其他合适的来源，以获取缺失的数据文件。例如，法语可能受支持，但加拿大法语不受支持。如果出现这种情况，并且\
  \ `Locale.CANADA_FRENCH` 被传递给 TTS 引擎，则响应会是 `TextToSpeech.LANG_AVAILABLE`，而不是 `TextToSpeech.LANG_COUNTRY_AVAILABLE`。另一种可能的返回值是特殊情况，即区域设置可能包含变体，此时响应可能是\
  \ `TextToSpeech.LANG_COUNTRY_VAR_AVAILABLE`，表示所有内容都受支持。\n\n使用 `isLanguageAvailable()`\
  \ 来确定 TTS 引擎支持的所有语言是一种繁琐的方法。幸运的是，我们可以让 TTS 引擎告诉我们哪些语言已经可用。仔细查看 清单 24–4，在用于接收来自 Intent\
  \ 的响应的 `onActivityResult()` 回调部分，你会看到数据对象包含一个 TTS 引擎支持的语言列表。在 `CHECK_VOICE_DATA_PASS`\
  \ 分支下查找名为 `available` 的 `ArrayList` 变量。它被设置为一个语音字符串数组。这些值看起来类似于 `eng-USA` 或 `fra-FRA`。虽然区域设置字符串通常采用\
  \ `ll_cc` 形式（其中 `ll` 是语言的两位字符表示，`cc` 是国家的两位字符表示），但来自 TTS 引擎的这些 `lll-ccc` 字符串也可用于构造一个供\
  \ TTS 引擎使用的区域设置对象。不幸的是，我们收到的是字符串数组而非区域设置对象，因此我们必须进行一些解析或映射，以确定目标 TTS 引擎真正可用的语音。\n\
  \n设置语言的方法是 `setLanguage(Locale locale)`。它返回与 `isLanguageAvailable()` 相同的状态码。如果你想使用此方法，请在\
  \ TTS 引擎初始化后（即在 `onInit()` 方法或之后）调用它。否则，你的语言选择可能不会生效。要获取设备的当前默认区域设置，请使用 `Locale.getDefault()`\
  \ 方法，该方法将返回一个区域设置值，例如 `en_US` 或与你所在地对应的值。使用 `TextToSpeech` 类的 `getLanguage()` 方法可以查明\
  \ TTS 引擎的当前区域设置。与使用 `setLanguage()` 时一样，不要在 `onInit()` 之前调用 `getLanguage()`。`getLanguage()`\
  \ 返回的值看起来像是 `eng_USA`。注意，现在语言和国家之间用的是下划线而不是连字符。虽然 Android 在区域设置字符串方面似乎比较宽容，但 API\
  \ 若能变得更加一致就好了。在示例中，我们本可以使用如下代码为 TTS 引擎设置语言，也是完全可以接受的：\n\n```\nswitch(mTts.setLanguage(Locale.getDefault()))\
  \ {\ncase TextToSpeech.LANG_COUNTRY_AVAILABLE: …\n```\n\n在本章开头，我们指出了主要的文本转语音设置项“始终使用我的设置”，它会覆盖应用的语音语言设置。在\
  \ Android 2.2 中，`TextToSpeech` 类的 `areDefaultsEnforced()` 方法会通过返回 `true` 或 `false`\
  \ 来告知用户是否选择了此选项。在你的应用中，你可以判断你的语言选择是否会被覆盖，并据此采取适当的措施。\n\n最后，为了结束关于 TTS 的讨论，我们将介绍一些其他可用的方法。`setPitch(float\
  \ pitch)` 方法会在不改变语速的情况下，将语音的音调调高或调低。音调的默认值是 1.0。有意义的范围最低似乎是 0.5，最高是 2.0；你可以设置低于或高于此范围的值，但超过这些阈值后，音调似乎不再发生变化。`setSpeechRate(float\
  \ rate)` 方法似乎也遵循相同的阈值。也就是说，你向该方法传递一个 0.5 到 2.0 之间的浮点数参数，其中 1.0 代表正常语速。高于 1.0 的值表示语速更快，低于\
  \ 1.0 的值表示语速更慢。你可能想用的另一个方法是 `isSpeaking()`，它返回 `true` 或 `false`，用于指示 TTS 引擎当前是否正在朗读内容（包括\
  \ `playSilence()` 产生的静音）。如果你需要在 TTS 引擎完成队列中所有内容的朗读时收到通知，你可以为 `ACTION_TTS_QUEUE_PROCESSING_COMPLETED`\
  \ 广播实现一个 `BroadcastReceiver`。\n\n### 本章小结\n\n在本章中，我们向你展示了如何让你的 Android 应用与用户对话。Android\
  \ 集成了一个非常出色的 TTS 引擎来实现此功能。对于开发者来说，需要处理的事情并不多。Pico 引擎处理了大部分工作。正如我们所展示的，当 Pico 引擎遇到问题时，也有办法达到预期效果。高级功能也使得开发变得非常轻松。使用文本转语音引擎时需要记住的是，你必须是移动设备上的“好公民”：节约资源、负责任地共享\
  \ TTS 引擎，并恰当地使用语音功能。\n\n## 第 25 章\n\n\n\n"
- "# 触摸屏\n\n许多安卓设备都配备了触摸屏。当设备没有物理键盘时，大部分用户输入*必须*通过触摸屏来完成。因此，你的应用程序通常需要能够处理来自用户的触摸输入。你可能已经见过当需要用户输入文本时，屏幕上会显示虚拟键盘。在第\
  \ 17 章中，我们使用触摸操作与地图应用程序交互，来实现地图的侧向平移。到目前为止，触摸屏接口的实现细节对你来说还是隐藏的，但现在我们将展示如何利用触摸屏。\n\
  \n本章由四个主要部分组成。第一部分将介绍`MotionEvent`对象，这是安卓系统告知应用程序用户正在触摸触摸屏的方式。我们还会涵盖`VelocityTracker`以及拖放操作。第二部分将介绍多点触控，即用户一次可以用多根手指触摸触摸屏。第三部分介绍与地图相关的触摸操作，因为有一些特殊的类和方法可以帮助我们处理地图和触摸屏。最后，我们将包含一个关于手势的章节，这是一种特殊的功能类型，可以将触摸序列解释为命令。\n\
  \n### 理解 MotionEvent\n\n在本节中，我们将介绍安卓系统如何将用户的触摸事件告知应用程序。目前，我们只关注一次一根手指触摸屏幕的情况（多点触控将在后续章节中介绍）。\n\
  \n在硬件层面，触摸屏由特殊材料制成，能够感应压力并将其转换为屏幕坐标。关于触摸的信息会被转换成数据，然后这些数据被传递给软件进行处理。\n\n#### MotionEvent\
  \ 对象\n\n当用户触摸安卓设备的触摸屏时，会创建一个`MotionEvent`对象。`MotionEvent`包含关于触摸发生的位置和时间，以及触摸事件的其他详细信息。这个`MotionEvent`对象会被传递给应用程序中的适当方法。这可能是`View`对象的`onTouchEvent()`方法。请记住，`View`类是安卓中许多类的父类，包括`布局`、`按钮`、`列表`、`Surface`、`时钟`等等。这意味着我们可以通过触摸事件与所有这些不同类型的`View`对象进行交互。当方法被调用时，它可以检查`MotionEvent`对象来决定要做什么。例如，`MapView`可以使用触摸事件来横向移动地图，以便用户平移地图到其他感兴趣的点。或者，虚拟键盘对象可以接收触摸事件来激活虚拟按键，从而为用户界面的其他部分提供文本输入。\n\
  \n一个`MotionEvent`对象是与用户触摸相关的一系列事件之一。这个序列从用户首次触摸触摸屏开始，经过手指在触摸屏表面上的任何移动，到手指离开触摸屏时结束。手指的初始触摸（`ACTION_DOWN`动作）、横向移动（`ACTION_MOVE`动作）以及抬起事件（`ACTION_UP`动作）都会创建`MotionEvent`对象。在接收到最终的`ACTION_UP`事件之前，你可能会接收到相当多的`ACTION_MOVE`事件。每个`MotionEvent`对象都包含关于正在执行什么动作、触摸发生在哪里、施加了多大压力、触摸面积有多大、动作何时发生、以及初始`ACTION_DOWN`何时发生的信息。还有第四种可能的动作，即`ACTION_CANCEL`。这个动作用于指示触摸序列在没有实际执行任何操作的情况下结束。最后，还有`ACTION_OUTSIDE`，它会在一种特殊情况下被设置，即触摸发生在我们窗口之外，但我们仍然能得知这一情况。\n\
  \n还有另一种接收触摸事件的方式，那就是在`View`对象上注册一个触摸事件的回调处理程序。接收事件的类必须实现`View.OnTouchListener`接口，并且必须调用`View`对象的`setOnTouchListener()`方法来为该`View`设置处理程序。实现`View.OnTouchListener`的类必须实现`onTouch()`方法。`onTouchEvent()`方法仅接收一个`MotionEvent`对象作为参数，而`onTouch()`则同时接收`View`和`MotionEvent`对象作为参数。这是因为`OnTouchListener`可能会接收多个视图的`MotionEvent`对象。这一点在下一个示例应用程序中将会变得更加清晰。\n\
  \n\n\n如果`MotionEvent`处理器（通过`onTouchEvent()`或`onTouch()`方法）消耗了事件且不需要其他对象知晓，则方法应返回`true`。这会告知\
  \ Android 该事件无需传递给其他视图。如果`View`对象对此事件或与此触摸序列相关的任何未来事件不感兴趣，则返回`false`。基类`View`的`onTouchEvent()`方法不执行任何操作并返回`false`。`View`的子类可能相同也可能不同。例如，`Button`对象会消耗触摸事件，因为触摸等同于点击，因此其`onTouchEvent()`方法返回`true`。收到`ACTION_DOWN`事件时，`Button`会改变颜色以表示正在被点击。`Button`还需要接收`ACTION_UP`事件以了解用户何时松开，从而启动按钮点击逻辑。如果`Button`对象从`onTouchEvent()`返回`false`，则将无法再收到任何`MotionEvent`对象来告知用户何时从触摸屏上抬起手指。\n\
  \n当我们希望触摸事件对特定`View`对象执行新操作时，可以扩展该类，重写`onTouchEvent()`方法并在此添加逻辑。我们也可以实现`View.OnTouchListener`接口，并在`View`对象上设置回调处理器。通过使用`onTouch()`设置回调处理器，`MotionEvent`会先传递到此处，然后才到达`View`的`onTouchEvent()`方法。只有当`onTouch()`方法返回`false`时，我们的`View`的`onTouchEvent()`方法才会被调用。让我们进入示例应用程序，以便更直观地理解。\n\
  \n**注意：** 我们将在本章末尾提供一个 URL，您可以用来下载本章的项目。这将允许您直接将项目导入 Eclipse。\n\n清单 25–1 展示了一个布局文件的\
  \ XML。从该布局开始，在 Eclipse 中创建一个新的 Android 项目。\n\n**清单 25–1.** *TouchDemo1 的 XML 布局文件*\n\
