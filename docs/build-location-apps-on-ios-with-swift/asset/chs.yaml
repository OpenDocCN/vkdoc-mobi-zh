- "# 1. 创建你的第一个 MapKit 应用\n\n本书将以项目为基础——从简单开始，然后逐渐复杂。基于此，我们的第一个 iOS 应用将只有一个显示地图的屏幕。该地图上会有一个图钉，标记着我的城市——德克萨斯州的奥斯汀。当然，你也可以随意使用你自己的城镇作为示例！\n\
  \n## 开始\n\n第一步是确保你的 Mac 上安装了最新版本的 Xcode（编写本书时是 Xcode 11）。如果你使用的是较早版本的 Xcode，这些代码可能无法编译，你也可能无法按照说明操作。Xcode\
  \ 是免费的，可以从 Mac App Store 或 Apple 的开发者门户网站下载。\n\n我们还将使用 Swift 编程语言，而不是 Apple 用于 iOS\
  \ 的较旧编程语言 Objective-C。本书中的绝大部分内容可以直接应用于 Objective-C 应用程序。iOS 中使用的基础应用程序编程接口 (API)\
  \ 通常是相同的。\n\nSwift 语言自首次发布以来一直在演进。本书使用 Swift 5，该版本受 Xcode 10 及更高版本支持。\n\n打开 Xcode，然后创建一个新应用程序。我们将创建一个新的单视图应用程序（图\
  \ 1-1）。\n\n![../images/485790_1_En_1_Chapter/485790_1_En_1_Fig1_HTML.jpg](img/485790_1_En_1_Fig1_HTML.jpg)\n\
  \n图 1-1\n\nXcode 中的新建项目窗口\n\n点击“Next”按钮，然后在选项对话框中为你新项目命名，如图 1-2 所示。我将把这个新应用命名为 `FirstMapsApp`，并将其组织标识符设为\
  \ `com.buildingmobileapps.maps`，组织名称填写我的名字。\n\n![../images/485790_1_En_1_Chapter/485790_1_En_1_Fig2_HTML.jpg](img/485790_1_En_1_Fig2_HTML.jpg)\n\
  \n图 1-2\n\niOS 应用的新建项目选项\n\n务必选择 Swift 作为语言。\n\n对于这个项目，我们不会使用 SwiftUI——我们将使用 UIKit\
  \ 作为应用程序框架。请勿勾选 SwiftUI 复选框。\n\n我们不需要在项目中包含 Core Data——Core Data 是 Apple 用于在 iOS\
  \ 上本地存储数据的技术，这个示例中我们不需要它。本书也不会使用 Core Data。\n\n你还可以取消勾选“Include Unit Tests”和“Include\
  \ UI Tests”，因为我们不会为这个项目设置任何测试。\n\n点击“Next”，将项目保存到一个方便的位置。如果需要，你可以为代码创建 Git 仓库，但本书不会直接涉及源代码控制。随着项目进行，经常进行\
  \ Git 提交是一个好习惯，这样你可以轻松回滚到一个可用的版本。\n\n保存项目后，Xcode 将打开你的项目并呈现应用的概览（图 1-3）。\n\n![../images/485790_1_En_1_Chapter/485790_1_En_1_Fig3_HTML.jpg](img/485790_1_En_1_Fig3_HTML.jpg)\n\
  \n图 1-3\n\n项目概览\n\n你现在应该有了一个可用的 Xcode 项目——现在就在其中一个 iOS 模拟器中运行它，例如 iPhone XR（图 1-4）。\n\
  \n![../images/485790_1_En_1_Chapter/485790_1_En_1_Fig4_HTML.jpg](img/485790_1_En_1_Fig4_HTML.jpg)\n\
  \n图 1-4\n\n在模拟器中运行的新 iOS 应用\n\n你应该会看到一个空白屏幕，因为我们还没有为应用编写任何代码。如果确实如此，那么你的开发环境已经设置好，可以继续本章剩余部分的内容了。\n\
  \n\n\n## 添加地图\n\n现在，让我们在视图控制器中添加一个地图。在左侧选择故事板文件，即名为 `Main.storyboard` 的文件。故事板打开后，选择“视图控制器场景”。\n\
  \n在 Xcode 窗口的右上角，选择最左侧的“对象库”按钮（即上图中带有加号的按钮），如图 1-5 所示。\n\n![../images/485790_1_En_1_Chapter/485790_1_En_1_Fig5_HTML.jpg](img/485790_1_En_1_Fig5_HTML.jpg)\n\
  \n**图 1-5**  \n从 Xcode 的对象库中选择 `MKMapView` 地图\n\n你可以在列表下方的搜索框中输入“Map”，或者向下滚动直到找到“Map\
  \ Kit View”。找到“Map Kit View”后，将其拖拽到你的视图控制器上（图 1-6）。\n\n![../images/485790_1_En_1_Chapter/485790_1_En_1_Fig6_HTML.jpg](img/485790_1_En_1_Fig6_HTML.jpg)\n\
  \n**图 1-6**  \n故事板上的地图视图\n\n地图视图不会自动扩展以填满整个屏幕，因此你需要手动拖拽地图视图的边缘，使其填满整个视图。在图 1-7 中，你可以看到地图视图如何填满顶部带有刘海屏的\
  \ iPhone XR 设备上的整个视图控制器。\n\n![../images/485790_1_En_1_Chapter/485790_1_En_1_Fig7_HTML.jpg](img/485790_1_En_1_Fig7_HTML.jpg)\n\
  \n**图 1-7**  \n地图视图填满视图\n\n尽管我们将地图视图的边缘拖到了视图控制器视图的边缘，但这并不意味着地图视图会在所有尺寸的 iPhone 和\
  \ iPad 上使用整个屏幕。为了让地图视图填满视图控制器的视图（也称为其父视图），我们需要为地图视图添加约束。\n\n在视图控制器下方的工具栏右侧，你会看到五个图标——第一个图标通常是灰色的。第三个图标（“添加新约束”）会打开“添加新约束”对话框，我们可以用它来进行布局。\n\
  \n取消勾选“约束到边距”复选框，因为我们打算用地图填满整个视图，不留任何边距。继续选择所有四个约束（顶部、底部、左侧和右侧）的淡红色虚线。选择后，确保所有值都为\
  \ 0，然后点击“添加 4 个约束”按钮（图 1-8）。\n\n![../images/485790_1_En_1_Chapter/485790_1_En_1_Fig8_HTML.jpg](img/485790_1_En_1_Fig8_HTML.jpg)\n\
  \n**图 1-8**  \n为地图视图添加约束\n\n现在，你的地图视图将正确填满 iPhone 或 iPad 的整个屏幕。如果你想要双重确认，可以在故事板上选择地图视图。接着，选择右侧的第五个图标“尺寸检查器”，你会看到地图视图的四个边都有约束。\n\
  \n现在尝试运行你的 iOS 应用，你会看到应用中有一张漂亮的大地图——如图 1-9 所示。\n\n![../images/485790_1_En_1_Chapter/485790_1_En_1_Fig9_HTML.jpg](img/485790_1_En_1_Fig9_HTML.jpg)\n\
  \n**图 1-9**  \n一个带有全屏地图视图的 iOS 应用\n\n让地图运行起来的过程相当直接，甚至无需编写任何 Swift 代码。\n\n### 在地图上添加大头针\n\
  \n现在我们有了地图，是时候添加一个大头针来显示我们的家乡城市了！\n\n在向地图添加大头针之前，我们需要使用 Xcode 的助理编辑器创建一个名为 `mapView`\
  \ 的地图输出口。在 `Main.storyboard` 编辑器中打开时，从“编辑器”菜单中选择“助理”视图。你会看到 `ViewController` 类在故事板中打开，并显示在视图控制器旁边（图\
  \ 1-10）。\n\n![../images/485790_1_En_1_Chapter/485790_1_En_1_Fig10_HTML.jpg](img/485790_1_En_1_Fig10_HTML.jpg)\n\
  \n**图 1-10**  \nXcode 编辑器和助理视图\n\n在故事板或大纲视图中选择地图视图，按住 Control 键，然后将一个输出口拖拽到 `ViewController`\
  \ 类中，如图 1-11 所示。\n\n![../images/485790_1_En_1_Chapter/485790_1_En_1_Fig11_HTML.jpg](img/485790_1_En_1_Fig11_HTML.jpg)\n\
  \n**图 1-11**  \n创建输出口\n\n创建输出口后，在出现的对话框中将其命名为 `mapView`（图 1-12）。\n\n![../images/485790_1_En_1_Chapter/485790_1_En_1_Fig12_HTML.jpg](img/485790_1_En_1_Fig12_HTML.jpg)\n\
  \n**图 1-12**  \n命名输出口\n\n你会注意到 `ViewController` 类将无法编译——这是因为我们的地图是一个 `MKMapView`，属于\
  \ `MapKit` 框架的一部分。我们需要将这个框架导入到我们的 `ViewController` 类中，以便使用 `MapKit` 框架中的类。否则，当我们尝试构建项目时，Xcode\
  \ 会显示错误。\n\n在 `import UIKit` 语句下方添加以下代码行，以导入 `MapKit` 框架。\n\n```\nimport MapKit\n\
  ```\n\n除了地图本身，`MapKit` 框架还具有广泛的功能。使用 `MapKit`，我们将地图上的位置表示为标注。标注实现了 `MKAnnotation`\
  \ 协议，该协议由一个纬度和经度坐标对以及可选的标题和副标题组成。`MapKit` 框架自带一个 `MKAnnotation` 的基本实现——`MKPointAnnotation`\
  \ 类，但对于大多数应用，你可能会希望创建自己的 `MKAnnotation` 实现。在本章中，我们将使用 `MKPointAnnotation`，但本书后面的章节将使用我们自己的实现，以便你能看到两种方式的运作。\n\
  \n一旦你有了一个或多个标注，就可以使用 `MKMapView` 类上的 `addAnnotation()` 或 `addAnnotations()` 方法将其添加到地图上。\n\
  \n标注并不是地图显示的实际大头针——那些是标注视图，它们是 `MKAnnotationView` 类的子类。默认情况下，你会得到一个 `MKPinAnnotationView`，即你在许多地图应用中看到的红色大头针。你可以稍微自定义大头针的颜色，但对于大多数应用，你可能会想放入自己的自定义图像。我们将在本书接下来的章节中使用自己的自定义图像。\n\
  \n要创建一个 `MKPointAnnotation` 类型的标注，我们需要能够创建一个坐标，这可以通过 `CLLocationCoordinate2DMake()`\
  \ 实现。在本章中，我们将把所有的代码添加到 `ViewController` 类的 `viewDidLoad()` 方法中。Xcode 在你创建新项目时已经为你生成了这个方法。\n\
  \n这个方法目前除了调用 `super.viewDidLoad()` 之外是空的。请保留这行代码在 `viewDidLoad()` 方法中，然后将以下代码放在它的下面。\n\
  \n传入纬度和经度（作为双精度值）来创建坐标。`MKPointAnnotation` 需要设置这个坐标，如下面的代码所示：\n\n```\nlet austin\
  \ = MKPointAnnotation()\naustin.coordinate = CLLocationCoordinate2DMake(30.25, -97.75)\n\
  ```\n\n奥斯汀的经度将是负数，因为德克萨斯州的奥斯汀位于西半球。纬度是正数，因为该城市位于北半球。\n\n要给标注添加标题，我们可以直接设置 `title`\
  \ 属性。\n\n\n\n```swift\naustin.title = \"Austin\"\n```\n\n在设置`title`和坐标属性之后，我们可以调用地图视图上的一个方法来添加标注：\n\
  \n```swift\nmapView.addAnnotation(austin)\n```\n\n运行这个类（如清单 1-1 所示），当你滚动地图到模拟器中的德克萨斯州时，你会看到\
  \ iPhone 应用显示奥斯丁的图钉。你可以继续将图钉改为你的城市或任何其他你想要的位置，也可以为不同地点添加更多图钉！\n\n```swift\nimport\
  \ UIKit\nimport MapKit\nclass ViewController: UIViewController {\n    @IBOutlet\
  \ weak var mapView: MKMapView!\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
  \        // Do any additional setup after loading the view.\n        let austin\
  \ = MKPointAnnotation()\n        austin.coordinate = CLLocationCoordinate2DMake(30.25,\
  \ -97.75)\n        austin.title = \"Austin\"\n        mapView.addAnnotation(austin)\n\
  \    }\n}\n```\n**清单 1-1** 在地图视图上显示图钉的`ViewController`类\n\n图 1-13 展示了带有奥斯丁图钉的 iPhone\
  \ 应用。\n\n![../images/485790_1_En_1_Chapter/485790_1_En_1_Fig13_HTML.jpg](img/485790_1_En_1_Fig13_HTML.jpg)\n\
  \n**图 1-13** 在地图上显示奥斯丁图钉的完整 iOS 应用\n\n## 总结\n\n我们现在创建了一个在 iOS 应用的地图上显示图钉的程序。在此过程中，我们介绍了`MapKit`框架、地图视图和标注。\n\
  \n在下一章中，我们将基于此处构建的基础地图应用进行扩展，在地图上显示用户的位置。如果你想尝试类似的项目，使用 Google Maps for iOS SDK\
  \ 或 Mapbox SDK，请分别参阅第 7 章和第 11 章。\n\n"
- "# 2. 获取用户位置\n\n让我们进一步扩展应用，在地图上显示用户的位置。iOS 中的定位功能非常强大——你可以获取用户的当前位置，也可以随时间追踪用户位置的变化，在地图上显示其路径。为此，我们将使用`CoreLocation`框架以及之前讨论过的`MapKit`框架。\n\
  \n我们将为第 1 章的项目添加额外功能。该项目中`FirstMapsApp`已经包含了用于显示用户位置的地图视图。\n\n## 隐私与位置权限\n\n由于应用可以对用户的位置做很多处理，Apple\
  \ 增加了对用户隐私的保护，作为应用开发者你需要了解这些保护措施。\n\niOS 应用可以请求权限，以在应用使用期间或后台使用用户的位置。当你在 iPhone\
  \ 或 iPad 上使用基于位置的应用时，可能已经看到过这些弹出提示。如果你的应用没有令人信服的理由获取用户位置，用户很可能会拒绝授权。\n\n如果你的应用需要在后台使用用户位置，iOS\
  \ 会弹出确认提示，告知用户你的应用正在后台持续使用其位置，并询问是否继续提供位置信息。此时许多用户会关闭位置共享。\n\n### Info.plist 中的位置权限设置\n\
  \n你的 iOS 应用需要在两个地方进行修改才能访问用户位置：`Info.plist`应用配置文件以及你的应用委托或视图控制器。根据应用需要的定位模式（使用期间或始终），`Info.plist`需要为一个或两个键设置值：\n\
  \n*   `NSLocationWhenInUseUsageDescription`\n*   `NSLocationAlwaysAndWhenInUseUsageDescription`\n\
  \n这些设置可以通过 Xcode 的属性列表编辑器进行配置，因此你不需要直接以 XML 格式编辑`plist`文件。你也不需要记住这些确切的键定义——在属性列表编辑器中，相关描述列为`Privacy\
  \ - Location When In Use Usage Description`和`Privacy - Location Always and When\
  \ In Use Usage Description`。\n\n在 Xcode 中选择`Info.plist`文件。属性列表编辑器将显示，如图 2-1 所示。\n\
  \n![../images/485790_1_En_2_Chapter/485790_1_En_2_Fig1_HTML.jpg](img/485790_1_En_2_Fig1_HTML.jpg)\n\
  \n**图 2-1** `Info.plist` 中的位置隐私设置\n\n任何文本都可以作为这些键的值——当应用向用户请求位置权限后，这些文本将显示给用户。继续在`Info.plist`中添加一行，将键设置为`Privacy\
  \ – Location When In Use Description`，值设为“此应用希望使用您的位置”。这将引导我们进入本章的下一步——向用户请求权限。\n\
  \n## 向最终用户请求位置权限\n\n既然你已经决定是在应用使用期间还是始终请求跟踪用户位置的权限，并在`Info.plist`中进行了相应配置，下一步就是通过编程方式向用户请求权限。这需要创建一个`CLLocationManager`对象，然后向用户请求相应的权限。\n\
  \n首先，你需要在视图控制器的顶部导入`CoreLocation`框架。接下来，我们将初始化一个位置管理器作为视图控制器的属性，以便在代码的其他方法中引用它。\n\
  \n```swift\nimport CoreLocation\n```\n\n在视图控制器的`viewDidLoad()`方法中，我们将在`CLLocationManager`对象上调用异步方法——`requestWhenInUseAuthorization()`或`requestAlwaysAuthorization()`，如清单\
  \ 2-1 所示。在本例中，我们将请求“使用期间”授权，因为我们不会在后台使用用户的位置。\n\n```swift\nimport UIKit\nimport\
  \ MapKit\nimport CoreLocation\nclass ViewController: UIViewController {\n    @IBOutlet\
  \ weak var mapView: MKMapView!\n    var locationManager: CLLocationManager!\n  \
  \  override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do any\
  \ additional setup after loading the view.\n        let austin = MKPointAnnotation()\n\
  \        austin.coordinate = CLLocationCoordinate2DMake(30.25, -97.75)\n       \
  \ austin.title = \"Austin\"\n        mapView.addAnnotation(austin)\n        locationManager\
  \ = CLLocationManager.init()\n        locationManager.requestWhenInUseAuthorization()\n\
  \    }\n}\n```\n**清单 2-1** 使用`CoreLocation`请求位置授权\n\n将这些行添加到视图控制器后，运行应用时，你应该会看到类似图\
  \ 2-2 所示的对话框出现。\n\n![../images/485790_1_En_2_Chapter/485790_1_En_2_Fig2_HTML.jpg](img/485790_1_En_2_Fig2_HTML.jpg)\n\
  \n**图 2-2** iOS 中的位置权限对话框\n\n在允许或拒绝授权后，如果需要再次看到此对话框，你需要从手机或 iOS 模拟器中删除已编译的应用。\n\n\
  \n\n### 请求位置更新\n\n如果用户已授权，下一步你的应用应该开始获取位置更新。为此，你需要实现 `CLLocationManagerDelegate`\
  \ 协议中的一个方法——`locationManager(_:didChangeAuthorization:)`，我们将在扩展中完成。\n\n扩展是一种围绕需要实现的协议来组织类中方法的方式。这有助于避免将所有屏幕代码放入视图控制器类所带来的代码组织结构问题。在此特定案例中，我们可以为\
  \ `CLLocationManagerDelegate` 协议创建一个扩展，并实现 `locationManager(_:didChangeAuthorization:)`\
  \ 方法：\n\n``` \nextension ViewController: CLLocationManagerDelegate {\nfunc locationManager(_\n\
  manager: CLLocationManager,\ndidChangeAuthorization status: CLAuthorizationStatus)\
  \ {\n}\n}\n```\n\n仅仅实现这个方法不会执行任何操作——你需要在调用 `viewDidLoad()` 方法请求授权之前，告诉你的位置管理器它有一个委托：\n\
  \n``` \nlocationManager = CLLocationManager.init()\nlocationManager.delegate = self\n\
  locationManager.requestWhenInUseAuthorization()\n```\n\n最后，能够查看用户的状态会很不错——因此，我们为每种不同的位置授权状态实现一个\
  \ switch 方法。`ViewController` 类的代码在清单 2-2 中。\n\n``` \nimport UIKit\nimport MapKit\n\
  import CoreLocation\nclass ViewController: UIViewController {\n@IBOutlet weak var\
  \ mapView: MKMapView!\nvar locationManager:CLLocationManager!\noverride func viewDidLoad()\
  \ {\nsuper.viewDidLoad()\n// 加载视图后进行任何其他设置。\nlet austin = MKPointAnnotation()\n\
  austin.coordinate = CLLocationCoordinate2DMake(30.25, -97.75)\naustin.title = \"\
  Austin\"\nmapView.addAnnotation(austin)\nlocationManager = CLLocationManager.init()\n\
  locationManager.delegate = self\nlocationManager.requestWhenInUseAuthorization()\n\
  }\n}\nextension ViewController: CLLocationManagerDelegate {\nfunc locationManager(_\n\
  manager: CLLocationManager,\ndidChangeAuthorization status: CLAuthorizationStatus)\
  \ {\nswitch status {\ncase .authorizedWhenInUse:\nprint(\"已授权在使用时使用\")\ncase .authorizedAlways:\n\
  print(\"已授权始终使用\")\ncase .denied:\nprint(\"已拒绝\")\ncase .notDetermined:\nprint(\"\
  未确定\")\ncase .restricted:\nprint(\"受限制\")\n@unknown default:\nprint(\"未知状态\")\n\
  }\n}\n}\n清单 2-2\n从应用内显示位置授权状态\n```\n\n编译并运行此类后，你应该会看到来自位置授权状态的调试输出。它最初将显示 `Not Determined`，然后在选择允许或拒绝获取你的位置后，你将看到相应的状态。\n\
  \n所有这些都是使用用户位置的基本样板代码。让我们通过在**地图上显示用户的位置**来使其更真实一些！\n\n### 在地图上显示用户的位置\n\n打开 `Main.storyboard`，如果尚未选择，请在概览视图中选择地图。我们将需要通过\
  \ Xcode 在地图视图上设置一个属性。\n\n选择第五个选项卡（属性检查器），如图 2-3 所示。在顶部，其中一个复选框将是“用户位置”——勾选该框。\n\n\
  ![../images/485790_1_En_2_Chapter/485790_1_En_2_Fig3_HTML.jpg](img/485790_1_En_2_Fig3_HTML.jpg)\n\
  \n图 2-3\n\n地图视图上的“用户位置”复选框\n\n就是这样！如果你在模拟器上运行，请确保向应用发送一个位置——该设置位于模拟器菜单的“功能”下，然后是“位置”。如果你想采用简单设置，请选择“Apple”，或者手动设置坐标。\n\
  \n继续运行应用程序——它应该看起来类似于图 2-4，并且蓝点会带有动画效果。\n\n![../images/485790_1_En_2_Chapter/485790_1_En_2_Fig4_HTML.jpg](img/485790_1_En_2_Fig4_HTML.jpg)\n\
  \n图 2-4\n\n地图上的用户位置\n\n要在地图上获得一个漂亮的动画用户位置，你真正需要做的就是这些。尽管它只是地图视图上的一个复选框，但你仍然需要在视图控制器中实现所有的\
  \ `CoreLocation` 框架隐私和权限代码。\n\n## 小结\n\n我们已经讨论了用户的位置隐私，以及如何使用 `CoreLocation` 框架向应用程序的最终用户请求授权。你还了解了在\
  \ iOS 的 `MapKit` 地图上显示用户位置是多么容易。\n\n在下一章中，我们将在 `MapKit` 应用程序上显示兴趣点，并使用标注自定义每个点的显示。\n\
  \n"
- "# 3. 在 MapKit 地图上显示标注\n\n在第 1 章中，你的第一个 iOS 地图应用程序在地图上显示了一个点，并在其位置使用了默认的红色图钉。`MapKit`\
  \ 框架在显示标注方面的能力远不止于此。我们可以自定义标注的图像以及用户点击标注时看到的弹出视图。\n\n让我们继续基于第 1 章中创建的 `FirstMapsApp`\
  \ 项目进行构建，然后在第 2 章中添加了用户位置。\n\n## 理解 MapKit 和标注\n\n`MapKit` 框架区分了标注（地图上显示的数据）和标注视图（在地图上给定坐标处为标注显示的用户界面元素）。虽然\
  \ `MapKit` 提供了 `MKPointAnnotation` 类用于基本点显示，但大多数地图应用程序会使用 `MKAnnotation` 协议的自定义实现。\n\
  \n类似地，`MapKit` 也包含了 `MKPinAnnotationView` 和 `MKMarkerAnnotationView` 类，用于在应用程序上显示图钉或标记。`MKAnnotationView`\
  \ 类用于显示你自己的自定义图像。你可以继承 `MKAnnotationView` 类或直接使用它。\n\n`MKMapViewDelegate` 协议上的 `mapView(_:viewFor:)`\
  \ 函数允许你的应用程序将 `MKAnnotationView` 对象映射到 `MKAnnotation` 对象。由于 `MKPointAnnotation`\
  \ 类的数据字段有限，使用你自己的 `MKAnnotation` 实现能提供最大的灵活性。\n\n## 使用自定义标注类\n\n实现你自己的标注类很简单——你需要继承\
  \ `NSObject` 类，然后实现 `MKAnnotation` 协议。\n\n`MKAnnotation` 协议的 `title` 和 `subtitle`\
  \ 属性是 `String` 可选类型。`coordinate` 属性稍微复杂一些，因为 `MapKit` 要求它支持键值观察（KVO）。实际上，这意味着它不是一个简单的\
  \ `var` 声明，而是你还需要声明它使用与 Objective-C 运行时的动态调度。你的代码声明如下所示：\n\n``` \n@objc dynamic\
  \ var coordinate: CLLocationCoordinate2D\n```\n\n一个包含 `init` 方法的基本自定义标注类，看起来像清单\
  \ 3-1。\n\n``` \nimport UIKit\nimport MapKit\nclass MapPoint: NSObject, MKAnnotation\
  \ {\n@objc dynamic var coordinate: CLLocationCoordinate2D\nvar title:String?\nvar\
  \ subtitle: String?\ninit(coordinate:CLLocationCoordinate2D,\ntitle:String?, subtitle:String?)\
  \ {\nself.coordinate = coordinate\nself.title = title\nself.subtitle = subtitle\n\
  }\n}\n清单 3-1\n在 Swift 中的标注类的实现\n```\n\n我们将在本章过程中使用这个 `MapPoint` 类，然后再对其进行扩展。对于你的特定应用程序，你可能会为此标注类添加额外的字段。继续在\
  \ Xcode 项目中创建一个名为 `MapPoint.swift` 的新文件，并添加清单 3-1 中的代码。\n\n\n\n## 显示自定义标注\n\n由于\
  \ `MapPoint` 类实现了 `MKAnnotation` 协议，你的代码只需构建新的 `MapPoint` 对象，然后将它们作为标注添加到地图视图上。\n\
  \n我们将在地图上创建两个点，并设置通用的标题和副标题。将清单 3-2 中的代码添加到 `ViewController` 类的 `viewDidLoad()`\
  \ 方法末尾。\n\n```\nlet point1 = MapPoint(\ncoordinate: CLLocationCoordinate2D(latitude:\
  \ 33.0,\nlongitude: -97.0),\ntitle: \"Point 1\",\nsubtitle: \"Description 1\"\n\
  )\nmapView.addAnnotation(point1)\nlet point2 = MapPoint(\ncoordinate: CLLocationCoordinate2D(latitude:\
  \ 32.0,\nlongitude: -98.0),\ntitle: \"Point 2\",\nsubtitle: \"Description 2\"\n\
  )\nmapView.addAnnotation(point2)\n清单 3-2\n在地图视图上显示自定义标注\n```\n\n添加这段代码并运行项目后，你不会看到与之前章节有太大区别。我们还没有自定义标注的视图。\n\
  \n## 自定义标注的图钉\n\n更改每个标注显示视图的最简单方法是使用 `MKPinAnnotationView` 类。你的代码可以在 `mapView(_:viewFor:)`\
  \ 函数中设置图钉颜色。此函数来自 `MKMapViewDelegate`，因此你需要将地图视图的委托设置为自定义类或当前视图控制器。为方便本章讲解，我们将为视图控制器类创建一个实现\
  \ `MKMapViewDelegate` 协议的扩展，然后在 `viewDidLoad()` 方法中通过代码设置地图视图的委托。\n\n将以下代码行添加到 `viewDidLoad()`\
  \ 方法中，用于设置地图视图委托（如果你愿意，也可以在故事板中进行设置）：\n\n```\nmapView.delegate = self\n```\n\n接下来，在视图控制器类的底部添加一个实现地图视图委托的扩展。我们将在此扩展中添加\
  \ `mapView(_:viewFor:)` 函数：\n\n```\nextension ViewController:MKMapViewDelegate {\n\
  }\n```\n\n`mapView(_:viewFor:)` 函数为给定的 `MKAnnotation` 实例返回一个 `MKAnnotationView`。我们将创建一个图钉标注视图，然后通过将图钉颜色设置为蓝色来进行一些自定义，如清单\
  \ 3-3 所示。\n\n```\nextension ViewController:MKMapViewDelegate {\nfunc mapView(_ mapView:\
  \ MKMapView,\nviewFor annotation: MKAnnotation) ->\nMKAnnotationView? {\nlet pin\
  \ = MKPinAnnotationView(\nannotation: annotation,\nreuseIdentifier: \"Pin\")\npin.pinTintColor\
  \ = UIColor.blue\nreturn pin\n}\n}\n清单 3-3\n使用图钉标注视图\n```\n\n添加此代码后，你应该会看到蓝色图钉出现在美国德克萨斯州的地图上，如图\
  \ 3-1 所示。如果你完成了第 2 章并以该章为基础，那么你的用户位置上方也会出现一个蓝色图钉。当然，你也可以自由调整添加到自己所在位置的地图点！\n\n![../images/485790_1_En_3_Chapter/485790_1_En_3_Fig1_HTML.jpg](img/485790_1_En_3_Fig1_HTML.jpg)\n\
  \n图 3-1\n\n将标注更改为显示为蓝色图钉\n\n既然我们已经演示了基本的视图标注功能，接下来让我们继续学习一些更高级的功能。首先要改变的是用户位置现在显示为一个图钉。\n\
  \n## 处理用户位置\n\n我们通常希望保持用户位置显示为默认的脉动蓝点。在代码中，我们可以检查我们提供视图的标注是否是 `MKUserLocation` 标注（即用户的当前位置）：\n\
  \n```\nif annotation is MKUserLocation {\nreturn nil\n}\n```\n\n此检查通常会在 `mapView(_:viewFor:)`\
  \ 函数的开头进行。当你返回 `nil` 时，地图会显示默认的标注视图。\n\n将 `MKUserLocation` 检查添加到 `mapView(_:viewFor:)`\
  \ 方法的开头，然后再次运行项目——用户位置（如果你启用了定位服务）将显示为发光的蓝点，而不是一个图钉。\n\n## 复用标注视图\n\n虽然这段代码可以工作，但它仍有改进空间。类似于表视图和可复用的表视图单元格，地图视图也支持可复用的标注。\n\
  \n在处理标注视图时，使用复用标识符非常重要。这允许地图视图在用户滚动地图时回收视图对象。一些标注将移出地图的可见矩形区域，而这些视图可以被回收，用于现在可见的标注。复用这些标注视图可以实现平滑滚动，尤其是在处理大量标注时。\n\
  \n`MKMapView` 类有一个 `dequeueReusableAnnotationView()` 函数，它接受一个复用标识符作为参数。如果复用队列中有一个标注视图在等待，你将获得那个实例。你需要对该标注视图进行的任何自定义（例如，将标注设置为当前标注）都应在检查实例是否可用的\
  \ `if let` 块内完成。\n\n如果复用队列中没有可用的实例，你将需要创建一个标注视图并正确配置它。\n\n我们可以通过在有可用视图时进行复用来改进清单\
  \ 3-3 中的标注视图代码。用清单 3-4 中的代码替换你在地图视图委托扩展中创建的方法。我们还添加了对 `MKUserLocation` 标注的检查。\n\n\
  ```\nfunc mapView(_ mapView: MKMapView, viewFor annotation: MKAnnotation)\n-> MKAnnotationView?\
  \ {\nif annotation is MKUserLocation {\nreturn nil\n}\nlet reuseId = \"Pin\"\nvar\
  \ pin: MKPinAnnotationView\nif let reusedPin =\nmapView.dequeueReusableAnnotationView(\n\
  withIdentifier: reuseId)\nas? MKPinAnnotationView {\npin = reusedPin\npin.annotation\
  \ = annotation\n} else {\npin = MKPinAnnotationView(annotation: annotation,\nreuseIdentifier:\
  \ reuseId)\npin.pinTintColor = UIColor.blue\n}\nreturn pin\n}\n清单 3-4\n复用标注视图\n\
  ```\n\n虽然这段代码比之前的代码清单更复杂，但如果你在地图上显示了许多标注，滚动地图将会流畅得多。\n\n## 出队和创建标注视图\n\n我们可以通过让地图视图自动为我们出队一个可复用的标注视图或创建一个新的标注视图，来简化清单\
  \ 3-4 中的代码。你的代码需要使用 `MKMapView` 类的 `registerClass:forAnnotationViewWithReuseIdentifier:`\
  \ 函数，将标注视图类与地图视图的复用标识符进行注册。我们的代码将在 `viewDidLoad()` 方法中使用以下代码行：\n\n```\nmapView.register(MKPinAnnotationView.self,\
  \ forAnnotationViewWithReuseIdentifier: \"Pin\")\n```\n\n将图钉标注视图类注册到地图视图后，我们可以从在\
  \ `MKMapViewDelegate` 扩展中实现的 `viewFor()` 方法中移除图钉标注视图的创建代码。这将得到清单 3-5 中更简单的实现。\n\n\
  ```\noverride func viewDidLoad() {\n...\nmapView.register(MKPinAnnotationView.self,\n\
  forAnnotationViewWithReuseIdentifier: \"Pin\")\n}\nfunc mapView(_ mapView: MKMapView,\n\
  viewFor annotation: MKAnnotation) -> MKAnnotationView? {\nif annotation is MKUserLocation\
  \ {\nreturn nil\n}\nlet reuseId = \"Pin\"\nif let pin = mapView.dequeueReusableAnnotationView(\n\
  withIdentifier: reuseId)\nas? MKPinAnnotationView {\npin.annotation = annotation\n\
  pin.pinTintColor = UIColor.blue\nreturn pin\n} else {\nreturn nil\n}\n}\n清单 3-5\n\
  将标注视图类注册到地图视图后，简化的标注复用与创建\n```\n\n这极大地清理了我们的代码，并且如果我们的地图上有多种类型的标记，也将使我们能够轻松地添加额外的标注视图类型。\n\
  \n\n好的，作为高级文档工程师和翻译员，我将严格遵守您的要求，对给定文本进行翻译。\n\n\n## 在标注视图上设置图像\n\n你的一些地图应用想法使用内置的大头针或标记标注视图类可能就足够了。然而，你很可能需要使用\
  \ `MKAnnotationView` 类，以便设置你自己的图像。\n\n我们将略微修改代码，为狗狗公园创建标注视图。复用标识符将是 `“DogPark”`，并且在我们的\
  \ iOS 应用资源中，还会有一张狗狗在公园里的图像。这张图像也将被命名为 `“DogPark”`。你需要下载自己的图像并将其放入 Xcode 项目的资源中，这样你才有内容可以显示。\n\
  \n在 `viewDidLoad()` 函数中，添加以下代码：\n\n```\nmapView.register(MKAnnotationView.self,\
  \ forAnnotationViewWithReuseIdentifier: \"DogPark\")\n```\n\n接下来，修改 `viewFor()`\
  \ 函数的内容。这段代码已被简化，因为我们不再需要向下转换出队的标注视图。我们也可以简单地从这个函数返回可选值。我们做的唯一其他修改是在标注视图上设置 `UIImage`，而不是更改大头针的色调颜色。完整的更改如代码清单\
  \ 3-6 所示。\n\n```\nfunc mapView(_ mapView: MKMapView,\nviewFor annotation: MKAnnotation)\n\
  -> MKAnnotationView? {\nif annotation is MKUserLocation {\nreturn nil\n}\nlet reuseId\
  \ = \"DogPark\"\nlet view = mapView.dequeueReusableAnnotationView(\nwithIdentifier:\
  \ reuseId)\nview?.annotation = annotation\nview?.image = UIImage(named:\"DogPark\"\
  )\nreturn view\n}\n代码清单 3-6 在标注视图上使用图像\n```\n\n在你用代码清单 3-6 替换掉将可复用大头针标注视图出队的代码后，运行项目。你将看到狗狗公园的图像代替了你的大头针。\n\
  \n## 为标注使用标注弹窗\n\n为你的标注使用了自定义图像后，很可能当用户点击你的标注时，你希望显示一个标注弹窗。`MKAnnotationView` 的\
  \ `canShowCallout` 属性控制是否显示该弹窗。在为标注创建视图时，添加以下一行代码：\n\n```\nview?.canShowCallout\
  \ = true\n```\n\n然后运行你的应用程序。点击一个标注后，你将看到一个弹出窗口，其中显示你设置的标题和副标题，如图 3-2 所示。\n\n![../images/485790_1_En_3_Chapter/485790_1_En_3_Fig2_HTML.jpg](img/485790_1_En_3_Fig2_HTML.jpg)\n\
  \n图 3-2 为标注使用图像和标注弹窗\n\n如你所见，在地图上显示标注的方式是极其可定制的。尝试根据某个数据点为每个标注更换不同的图像，或者尝试将其中一些显示为图像，另一些显示为大头针。\n\
  \n## 总结\n\n在本章中，我们以第 1 章的地图基础知识为基础，定制了地图上显示的标记。我们了解了如何使用可复用的标注视图来提高包含大量标记的地图的性能。\n\
  \n在下一章中，我们将讨论如何使用 Apple 的本地搜索功能，从其数据库中为你的地图提供兴趣点。\n\n"
- "# 搜索兴趣点\n\nApple 拥有自己的地点和地址数据库，你可以将其用于你的 iOS 应用程序。你的代码可以调用 `MKLocalSearch` 类的实例来获取兴趣点，然后你可以将它们显示在地图视图上。这使得根据地图当前显示的地理区域实现搜索功能变得很容易。\n\
  \n在 Xcode 中使用“单视图应用程序”模板创建一个新的 Swift iOS 项目。将你的应用程序命名为 `SearchingForPointsOfInterest`。继续在故事板中为唯一的屏幕添加一个地图视图，并将其连接到\
  \ `ViewController` 类上一个名为 `mapView` 的插座。如果尚未导入，请同样导入 `MapKit` 框架。这些是我们在前几章中遵循的步骤，因此应该相当简单。\n\
  \n## 本地搜索入门\n\n苹果为 MapKit 提供的本地搜索功能并非一个可以通过 HTTP 请求调用的 Web API，这与你在应用程序中可能使用的其他集成不同。苹果提供了两个辅助类——`MKLocalSearch`\
  \ 和 `MKLocalSearch.Request`——来处理本地搜索。使用 `MKLocalSearch.Request` 实例来定义搜索内容，然后使用 `MKLocalSearch`\
  \ 来执行请求并返回结果。\n\n第一步是构建搜索请求：\n\n```\nlet searchRequest = MKLocalSearch.Request()\n\
  ```\n\n搜索请求对象有四个不同的属性，你可以用它们来过滤结果：\n\n- `naturalLanguageQuery` – 这是服务将用来查找结果的一个词或短语，例如\
  \ `“公园”` 或 `“艺术博物馆”`。\n- `region` – 这是一个地图区域，通常是当前屏幕上的地图区域——可用于将搜索结果限制在一个地理位置内。\n\
  - `pointOfInterestFilter` – 仅显示与 `MKPointOfInterestCategory` 结构体中一个或多个不同类别匹配的兴趣点。例如，海滩、餐馆和商店都是不同的类别。\n\
  - `resultTypes` – 本地搜索可以返回地址、兴趣点，或者两者都返回。\n\n并非所有这些属性都需要设置才能使用本地搜索——通常你的地图应用会使用\
  \ `naturalLanguageQuery` 和 `region`。如果你没有设置区域，本地搜索将使用设备的位置进行搜索。你不需要请求位置权限就能使用本地搜索。\n\
  \n如果我们在搜索请求上设置了自然语言查询，代码将如下所示：\n\n```\nsearchRequest.naturalLanguageQuery = \"coffee\"\
  \n```\n\n搜索请求对象描述了我们想要进行的搜索——`MKLocalSearch` 对象将执行搜索。运行搜索有两个步骤——使用搜索请求对象创建 `MKLocalSearch`\
  \ 实例，然后在本地搜索上调用 `start` 方法。代码清单 4-1 包含了这些步骤的示例。\n\n使用我们之前创建的 `MKLocalSearch.Request`\
  \ 对象，初始化一个 `MKLocalSearch` 实例看起来像这样：\n\n```\nlet search = MKLocalSearch(request:\
  \ searchRequest)\n```\n\n`start` 方法接受一个完成处理程序作为其唯一参数。该完成处理程序将在你的 iOS 应用程序的主线程上运行，并带有两个可选参数——一个\
  \ `MKLocalSearch.Response` 类型的响应和一个 `Error` 类型的错误。\n\n响应将包含一个 `MKMapItem` 地图项数组，其中包含搜索结果，以及一个包含所有结果的地图区域。如果你想显示所有结果，你可以将屏幕上的地图视图设置为新的区域；或者，如果你有另一种搜索结果展示方式（例如列表），你可以让用户自己滚动查找结果。\n\
  \n```\nlet searchRequest = MKLocalSearch.Request()\nsearchRequest.naturalLanguageQuery\
  \ = \"coffee\"\nlet search = MKLocalSearch(request: searchRequest)\nsearch.start\
  \ { (response, error) in\nguard let response = response else {\nprint(\"搜索时出错 -\
  \ 无响应\")\nif let error = error {\nprint(\"错误: \\(error.localizedDescription)\")\n\
  } else {\nprint(\"未指定错误\")\n}\nreturn\n}\nfor mapItem in response.mapItems {\nprint(mapItem.name\
  \ ?? \"未指定名称\")\n}\n}\n代码清单 4-1 使用 MKLocalSearch 搜索兴趣点\n```\n\n使用 `guard let` 检查回调中是否提供了响应，这允许你向用户显示错误信息。对于此代码，结果将在调试控制台中看到，但你也可以向用户显示一条警告消息。\n\
  \n\n\n## 探索响应中的地图项\n\n本地搜索结果将由 `MKMapItem` 对象组成。结果中的每个地图项都是一个兴趣点，并在地标对象中包含位置和地址信息、兴趣点类别，以及（如果可用）地图项的名称、电话号码、URL\
  \ 和时区。这些 `MKMapItem` 对象也用于导航和路线规划，正如我们将在第 5 章中看到的那样。\n\n地标对象来自 `MKPlacemark` 类，包含纬度、经度和街道地址信息。这些地标实现了第\
  \ 3 章中讨论的 `MKAnnotation` 协议。这意味着你可以直接将地标添加到地图视图以显示结果。\n\n## 在地图上显示搜索结果\n\n现在你已经了解了地图项和标注之间的关系，就很容易理解如何将这些搜索结果显示在地图视图上。在尝试此代码之前，请确保你的故事板（storyboard）上有一个地图视图，并且\
  \ `ViewController` 类中有一个名为 `mapView` 的插座（outlet）变量。\n\n之前的代码列表已增强以与地图视图配合使用——更改部分在以下代码列表中已加粗显示。\n\
  \n```\nlet searchRequest = MKLocalSearch.Request()\nsearchRequest.naturalLanguageQuery\
  \ = \"coffee\"\nsearchRequest.region = mapView.region\nlet search = MKLocalSearch(request:\
  \ searchRequest)\nsearch.start { (response, error) in\n    guard let response =\
  \ response else {\n        print(\"Error searching - no response\")\n        if\
  \ let error = error {\n            print(\"Error: \\(error.localizedDescription)\"\
  )\n        } else {\n            print(\"No error specified\")\n        }\n    \
  \    return\n    }\n    for mapItem in response.mapItems {\n        self.mapView.addAnnotation(mapItem.placemark)\n\
  \    }\n    self.mapView.setRegion(response.boundingRegion, animated: true)\n}\n\
  ```\n\n**代码清单 4-2** 在地图上显示搜索结果\n\n上述代码列表中的更改实现了几个功能。第一个更改是将搜索请求中使用的区域设置为当前地图视图中显示的区域。第二个更改是将地图项的地标添加为标注，而不是将名称打印到调试控制台。最后一个更改是将地图视图上可见区域的边界设置为包含所有搜索结果的区域。\n\
  \n创建一个名为 `showCoffeeOnMap()` 的新函数，并将代码清单 4-2 中的代码放入此函数中。然后，在你的 `ViewController`\
  \ 类的 `viewDidLoad()` 函数中调用这个新函数。继续在模拟器或你的设备上运行此应用程序。根据你所在地区售卖的咖啡数量，你应该会看到类似以下截图的搜索结果。\n\
  \n![../images/485790_1_En_4_Chapter/485790_1_En_4_Fig1_HTML.jpg](img/485790_1_En_4_Fig1_HTML.jpg)\n\
  \n**图 4-1** 在地图视图上显示搜索结果\n\n## 为结果创建标注\n\n直接将地标添加为标注的一个缺点是，Apple 会使用地标的街道地址作为标注的标题，而不是使用地图项中的名称。这不是最佳的用户体验，因此让我们稍微修改一下代码，为每个地图项创建一个新的标注，如代码清单\
  \ 4-3 所示。\n\n```\nfor mapItem in response.mapItems {\n    let annotation = MKPointAnnotation()\n\
  \    annotation.coordinate = mapItem.placemark.coordinate\n    annotation.title\
  \ = mapItem.name\n    annotation.subtitle = mapItem.phoneNumber\n    self.mapView.addAnnotation(annotation)\n\
  }\n```\n\n**代码清单 4-3** 为每个搜索结果创建一个标注\n\n将现有的 `for` 循环替换为上面的代码块，你将看到咖啡店的名称，而不仅仅是街道地址。\n\
  \n## 使用兴趣点类别进行过滤\n\nApple 的搜索能够很好地处理自然语言查询，无论你搜索的是通用内容还是更具体的内容。但是，如果你的应用会在 Apple\
  \ 已定义的类别中查找兴趣点，那么使用兴趣点过滤器将改善用户体验。\n\n使用 `MKPointOfInterestFilter` 类的实例在搜索请求上设置兴趣点过滤器。此过滤器是\
  \ iOS 13 中的新功能，在早期版本的 iOS 中不可用。创建兴趣点过滤器时，你有两种选择——你可以创建一个仅包含一个或多个类别的过滤器，或者创建一个排除一个或多个类别的过滤器。通常，你可能会使用包含过滤器，但如果你的搜索结果被来自不适合你应用的类别的无关结果填充，那么排除类别当然也很容易。\n\
  \n`MKPointOfInterestCategory` 结构体定义了你可以使用的所有不同类别。部分列表如下：\n\n- 机场\n- 游乐园\n- 水族馆\n\
  - ATM 机\n- 面包房\n- 银行\n- 海滩\n- 啤酒厂\n\n以此类推，直至动物园类别。如你所见，如果你正在构建一个依赖本地搜索的应用，这些过滤器可能非常有用。\n\
  \n要将 `MKPointOfInterestFilter` 类与 `MKLocalSearch.Request` 搜索请求一起使用，你只需设置 `pointOfInterestFilter`\
  \ 属性。例如，要搜索本地面包房，请使用以下代码：\n\n```\nsearchRequest.pointOfInterestFilter = MKPointOfInterestFilter(including:\
  \ [.bakery])\n```\n\n如果我们将此兴趣点过滤器与前面的代码列表（该代码从本地搜索地图项结果创建标注）结合，然后移除自然语言查询字符串，我们将得到一个看起来像代码清单\
  \ 4-4 的函数。\n\n```\nlet searchRequest = MKLocalSearch.Request()\nsearchRequest.pointOfInterestFilter\
  \ = MKPointOfInterestFilter(including: [.bakery])\nsearchRequest.region = mapView.region\n\
  let search = MKLocalSearch(request: searchRequest)\nsearch.start { (response, error)\
  \ in\n    guard let response = response else {\n        print(\"Error searching\
  \ - no response\")\n        if let error = error {\n            print(\"Error: \\\
  (error.localizedDescription)\")\n        } else {\n            print(\"No error\
  \ specified\")\n        }\n        return\n    }\n    for mapItem in response.mapItems\
  \ {\n        let annotation = MKPointAnnotation()\n        annotation.coordinate\
  \ = mapItem.placemark.coordinate\n        annotation.title = mapItem.name\n    \
  \    annotation.subtitle = mapItem.phoneNumber\n        self.mapView.addAnnotation(annotation)\n\
  \    }\n    self.mapView.setRegion(response.boundingRegion, animated: true)\n}\n\
  ```\n\n**代码清单 4-4** 使用地图标注的类别过滤器\n\n在你的 iOS 应用上运行此代码将产生与此截图类似的结果，具体取决于你所在区域的面包房数量。\n\
  \n![../images/485790_1_En_4_Chapter/485790_1_En_4_Fig2_HTML.jpg](img/485790_1_En_4_Fig2_HTML.jpg)\n\
  \n**图 4-2** 来自带有标注的类别过滤器的兴趣点\n\n处理本地搜索相当直接，因为 Apple 提供的 `MKLocalSearch` 类没有分页搜索结果等高级功能。从搜索结果中的地图项创建自己的标注通常是最合理的做法。利用第\
  \ 3 章中的技术，你可以创建自定义标注视图，例如，以匹配兴趣点的类别。\n\n在下一章中，我们将使用 Apple 的导航 API 来创建驾车或步行路线。导航\
  \ API 也使用 `MKMapItem` 类，我们将探讨本章未涉及的地图项的其他功能，例如用户位置以及在 Apple 地图应用中打开地图项。\n\n\n\n"
- "# 5. 使用 MapKit 获取路线指引\n\n借助 MapKit，在应用程序内提供一个地点到另一个地点的步行或驾车路线指引变得非常简单。你也可以指示 Apple\
  \ 地图应用打开并为用户规划路线——如果你认为用户可能更倾向于使用专用应用，这将非常有用。\n\n在 Xcode 中使用“单视图应用程序”模板创建另一个 Swift\
  \ iOS 项目。将你的应用命名为 `DirectionsMapKitApp`。继续操作，在故事板的唯一屏幕中添加一个地图视图，并将其连接到 `ViewController`\
  \ 类上一个名为 `mapView` 的出口。在视图控制器中，除了 `UIKit`，还要导入 `MapKit` 框架。\n\n如果你愿意，也可以复用前面章节中的某个项目，因为这些项目已经配置好了地图视图。\n\
  \n## 理解 Directions API\n\n与本地搜索类似，Directions API 并不是一个公开可用的 REST API。相反，Apple 的路线功能是通过\
  \ `MapKit` 类来访问的。如果你的应用有网页版，Apple 也通过适用于 JavaScript 的 `MapKit` 提供了路线功能，但该产品超出了本书的讨论范围。\n\
  \n要使用 Directions API，你需要使用 `MKDirections` 类的一个实例。用一个 `MKDirections.Request` 对象初始化该实例，该对象指定了你想要请求的路线，然后通过\
  \ `calculate()` 或 `calculateETA()` 方法向 Apple 服务器发起异步调用。`calculate()` 方法接受一个完成处理程序作为回调，该回调接收\
  \ `MKDirections.Response` 对象或 `Error` 对象。\n\n响应中将包含一个或多个要遵循的路线。通常，你可能只想请求一条路线，但你可以在路线请求中请求备选路线——这样做的话，如果有任何备选路线，你将获得多条路线。\n\
  \n这些路线是 `MKRoute` 对象，它们包含一些对向用户显示路线有用的信息——路线几何形状（可以作为叠加层添加到地图视图）、一个路线步骤列表（作为 `MKRouteStep`\
  \ 对象）、总距离以及预计行程时间。\n\n让我们通过一个简单的驾车路线示例来说明这些类是如何协同工作的。\n\n## 开始使用路线功能\n\n我们首先需要创建一个路线请求对象。在你的视图控制器类中创建一个名为\
  \ `getDirections()` 的新方法，然后在你的 `viewDidLoad()` 方法中调用该方法。在 `getDirections()` 方法中添加以下代码行来创建一个路线请求对象：\n\
  \n```\nlet request = MKDirections.Request()\n```\n\n本章本节的所有代码都完整地列在代码清单 5-1 中。\n\
  \n`MKDirections.Request` 可以接受一个起点和一个终点——两者都需要是 `MKMapItem` 对象。我们在第 4 章中讨论过 `MKMapItem`\
  \ 类。你当然可以使用来自本地搜索的 `MKMapItem` 实例，也可以从 `MKPlacemark` 实例创建你自己的 `MKMapItem` 对象。地标可以通过\
  \ Core Location 坐标创建。\n\n我们需要为起点和终点都执行此操作。由于存在一些可重复的代码，我们可以将其抽象为一个辅助函数：\n\n```\n\
  func createMapItem(latitude:Double,\nlongitude:Double) -> MKMapItem {\nlet coord\
  \ = CLLocationCoordinate2D(\nlatitude: latitude,\nlongitude: longitude)\nlet placemark\
  \ = MKPlacemark(coordinate: coord)\nreturn MKMapItem(placemark: placemark)\n}\n\
  ```\n\n有了这个辅助函数后，为起点和终点属性创建地图项的代码如下所示，你可以将其添加到 `getDirections()` 方法中：\n\n```\nrequest.source\
  \ = createMapItem(latitude: 40.7128, longitude: -74)\nrequest.destination = createMapItem(latitude:\
  \ 38.91, longitude: -77.037)\n```\n\n这些坐标恰好是纽约市（作为起点）和华盛顿特区（作为终点）。你可以随意用自己的起点和终点替换这些坐标，只要它们之间可以驾车通行即可。\n\
  \n路线请求需要一个交通类型。这些交通类型在 `MKDirectionsTransportType` 结构体中枚举，包括：\n\n- `MKDirectionsTransportType.automobile`\n\
  - `MKDirectionsTransportType.walking`\n- `MKDirectionsTransportType.transit`\n-\
  \ `MKDirectionsTransportType.any`\n\n通常，你会指定 automobile、walking 或 transit 其中之一，类似于\
  \ Apple 地图 iOS 应用。在你的 `getDirections()` 函数中，添加以下代码行：\n\n```\nrequest.transportType\
  \ = .automobile\n```\n\n在用起点、终点和交通类型设置好路线请求后，你可以从此路线请求创建一个 `MKDirections` 对象：\n\n\
  ```\nlet directions = MKDirections(request: request)\n```\n\n接下来，你可以在 `MKDirections`\
  \ 对象上调用 `calculate()` 或 `calculateETA()` 方法。两者都是异步的，并且只接受一个完成处理程序作为参数。在我们的例子中，我们想要获得完整的结果，包括步骤、路线图形以及时间和距离，因此我们将使用\
  \ `calculate()` 方法。以下代码通过解包响应来设置：\n\n```\ndirections.calculate { (response, error)\
  \ in\nguard let response = response else {\nprint(error ?? \"No error found\")\n\
  return\n}\n}\n```\n\n我们将一个闭包传递给 `calculate()` 方法。该闭包有两个参数——一个可选的 `MKDirections.Response`\
  \ 和一个可选的 `Error`。我们将使用 `guard let` 语句检查响应是否存在，然后处理错误。这段代码只是打印出错误信息，但你可以在警告视图中将其呈现给用户。\n\
  \n如果我们确实得到了一个有效的响应，一个简单的处理方式是在地图视图上显示路线。路线是一个 `MKPolyline`，可以作为叠加层添加到地图视图。你还需要为叠加层添加一个渲染器——这会将折线转换为图形。让我们从将路线添加到地图开始：\n\
  \n```\nlet route = response.routes[0]\nself.mapView.addOverlay(route.polyline)\n\
  ```\n\n\n\n下一步是确保地图在其窗口中显示路线。我们还将添加一些内边距，这样路线的起点和终点就不会紧贴屏幕边缘。折线有一个边界地图矩形属性，你可以用它来设置可见的地图矩形及边缘内边距。\n\
  \n```\nlet padding = UIEdgeInsets(\ntop: 40, left: 40, bottom: 40, right: 40)\n\
  self.mapView.setVisibleMapRect(\nroute.polyline.boundingMapRect,\nedgePadding: padding,\n\
  animated: true)\n```\n\n地图视图叠加层的渲染器是最后一块拼图。你需要在`ViewController`类中实现`MKMapViewDelegate`协议，并将地图视图的委托设置为视图控制器，如下所示：\n\
  \n```\nclass ViewController: UIViewController, MKMapViewDelegate {\n@IBOutlet weak\
  \ var mapView: MKMapView!\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n\
  // Do any additional setup after loading the view.\nmapView.delegate = self\n}\n\
  }\n```\n\n要让叠加层显示出来，需要使用`MKMapViewDelegate`协议中的`mapView(_ mapView:, rendererFor\
  \ overlay:)`方法。该方法返回一个`MKOverlayRenderer`或其子类（如`MKPolylineRenderer`）的实例：\n\n```\n\
  func mapView(_ mapView: MKMapView, rendererFor overlay: MKOverlay) -> MKOverlayRenderer\
  \ {\nlet renderer = MKPolylineRenderer(overlay: overlay)\nrenderer.strokeColor =\
  \ .red\nreturn renderer\n}\n```\n\n在这里，我们简单地为叠加层创建了一个`MKPolylineRenderer`，然后将其线条的描边颜色设置为红色。折线渲染器没有填充颜色，只有描边。\n\
  \n如果我们把创建方向请求的代码放入一个名为`getDirections()`的函数中，然后在`viewDidLoad()`中调用该方法，最终得到的类将如代码清单\
  \ 5-1 所示。\n\n```\nimport UIKit\nimport MapKit\nclass ViewController: UIViewController,\
  \ MKMapViewDelegate {\n@IBOutlet weak var mapView: MKMapView!\noverride func viewDidLoad()\
  \ {\nsuper.viewDidLoad()\nmapView.delegate = self\ngetDirections()\n}\nfunc getDirections()\
  \ {\nlet request = MKDirections.Request()\nrequest.source = createMapItem(\nlatitude:\
  \ 40.7128, longitude: -74)\nrequest.destination = createMapItem(\nlatitude: 38.91,\
  \ longitude: -77.037)\nrequest.transportType = .automobile\nlet directions = MKDirections(request:\
  \ request)\ndirections.calculate { (response, error) in\nguard let response = response\
  \ else {\nprint(error ?? \"No error found\")\nreturn\n}\nlet route = response.routes[0]\n\
  let padding = UIEdgeInsets(\ntop: 40, left: 40, bottom: 40, right: 40)\nself.mapView.addOverlay(route.polyline)\n\
  self.mapView.setVisibleMapRect(\nroute.polyline.boundingMapRect,\nedgePadding: padding,\n\
  animated: true)\n}\n}\nfunc createMapItem(latitude:Double, longitude:Double) ->\
  \ MKMapItem {\nlet coord = CLLocationCoordinate2D(\nlatitude: latitude,\nlongitude:\
  \ longitude)\nlet placemark = MKPlacemark(coordinate: coord)\nreturn MKMapItem(placemark:\
  \ placemark)\n}\nfunc mapView(_ mapView: MKMapView,\nrendererFor overlay: MKOverlay)\
  \ ->\nMKOverlayRenderer {\nlet renderer = MKPolylineRenderer(\noverlay: overlay)\n\
  renderer.strokeColor = .red\nreturn renderer\n}\n}\n代码清单 5-1\n用于显示路线的完整视图控制器类\n\
  ```\n\n在模拟器中运行此应用程序后，你应该会看到一个类似于图 5-1 的屏幕。\n\n![../images/485790_1_En_5_Chapter/485790_1_En_5_Fig1_HTML.jpg](img/485790_1_En_5_Fig1_HTML.jpg)\n\
  \n图 5-1\n在*地图视图*上以叠加层形式显示驾驶方向\n\n## 理解路线步骤\n\n除了可用作地图视图叠加层的路线图形外，方向 API 还会在响应中返回每条路线的一组步骤。这些步骤是`MKRoute.Step`对象。每个路线步骤都是一个独立的、具体的操作，用户需要执行该操作来遵循方向，例如沿着一条街走\
  \ 400 米，或者沿着一条路行驶 30 公里。所有距离都以米为单位，因此对于较长的距离，你可能希望转换为公里；对于美国，则转换为英尺和英里。每个步骤还包括与该步骤关联的几何图形，这样你就可以将其叠加到地图视图上。`MKRoute.Step`类的属性包括：\n\
  \n*   `polyline` – 该路线步骤的几何图形\n*   `instructions` – 要遵循的语音指示\n*   `notice` – 与该步骤关联的可选*法律信息*或*警告*\n\
  *   `distance` – 距离，以米为单位\n*   `transportType` – `MKDirectionsTransportType`（汽车、公交、步行）中的一个值\n\
  \n如果你只想简单地遍历路线中的每个步骤并打印到控制台，可以使用类似如下的函数：\n\n```\nfunc printRouteSteps(_ route:MKRoute)\
  \ {\nfor step in route.steps {\nprint(\"Go \\(step.distance) meters\")\nprint(step.instructions)\n\
  }\n}\n```\n\n让我们再进一步，在我们的应用程序中构建逐步方向指示。\n\n## 构建逐步方向指示\n\n我们将修改已经构建好的视图控制器，但你当然也可以将逐步方向指示放在单独的屏幕上。我们要做的第一步是为逐步方向指示创建用户界面元素：\n\
  \n*   **上一步和下一步按钮**，用于在步骤之间切换 – 这些按钮具有黑色背景，正常状态下为白色文本，禁用状态下为浅灰色文本。两者最初都应处于禁用状态。\n\
  *   **说明标签** – 这是多行标签，以适应较长的指示。它具有深灰色背景和白色文本。\n*   **通知标签** – 此标签具有红色背景和白色文本，以与说明标签区分开。\n\
  *   **距离标签** – 此标签的 alpha 分量为 0.8，以在视觉上与相邻按钮稍作区分。\n\n继续将这些用户界面元素添加到故事板中。你可以按任意方式排列它们。你还可以使用\
  \ Auto Layout 确保这些元素在所有设备上都能正确缩放。本书的示例项目将用户界面元素放在故事板底部，按钮与距离标签处于同一行，说明标签和通知标签位于其下方。\n\
  \n你应该得到类似于图 5-2 的结果。\n\n![../images/485790_1_En_5_Chapter/485790_1_En_5_Fig2_HTML.jpg](img/485790_1_En_5_Fig2_HTML.jpg)\n\
  \n图 5-2\n逐步方向指示的用户界面元素\n\n为每个用户界面元素创建插座，并使用以下名称：\n\n*   `previousButton`\n*   `nextButton`\n\
  *   `instructionsLabel`\n*   `noticeLabel`\n*   `distanceLabel`\n\n同时为两个按钮创建操作，分别命名为`previous`和`next`。我们将在这些方法中加入代码来更改显示的步骤。\n\
  \n最后，向视图控制器添加实例变量以跟踪当前状态。我们需要存储当前路线和当前步骤索引。我们将当前路线存储为可选类型，并将当前步骤索引初始化为零：\n\n```\n\
  var currentRoute:MKRoute?\nvar currentStepIndex = 0\n```\n\n\n\n### 显示当前步骤\n\n组织分步导航代码的一种方式是创建一个专门用于显示当前步骤的函数。此函数需要设置每个标签的内容，根据索引禁用或启用“上一步”和“下一步”按钮，并更新地图以显示当前路线段。\n\
  \n创建一个名为 `displayCurrentStep()` 的方法。在此函数内部，我们将进行一些基本的检查，以确保存在路线，并且当前步骤索引在路线步骤数组的有效范围内。`displayCurrentStep()`\
  \ 方法的完整版本见代码清单 5-2：\n\n```\nfunc displayCurrentStep() {\n    guard let currentRoute\
  \ = currentRoute else {\n        return\n    }\n    if (currentStepIndex >= currentRoute.steps.count)\
  \ {\n        return\n    }\n}\n```\n\n让我们为此方法添加更多功能。在检查之后，继续向 `displayCurrentStep()`\
  \ 添加以下语句。我们将跟踪当前步骤，然后使用它来设置每个标签的属性：\n\n```\nlet step = currentRoute.steps[currentStepIndex]\n\
  instructionsLabel.text = step.instructions\ndistanceLabel.text = \"\\(step.distance)\
  \ meters\"\n```\n\n如果需要，我们可以在此处为距离标签添加单位转换功能。请注意，并非每个路线步骤都有通知（通知是可选类型），所以如果没有通知，请隐藏通知标签。相反，如果有通知，请确保显示它：\n\
  \n```\nif step.notice != nil {\n    noticeLabel.isHidden = false\n    noticeLabel.text\
  \ = step.notice\n} else {\n    noticeLabel.isHidden = true\n}\n```\n\n下一步是管理按钮的状态。如果当前步骤索引为零或更小，则应禁用“上一步”按钮。如果当前步骤索引是步骤总数减一或更大，则应禁用“下一步”按钮：\n\
  \n```\npreviousButton.isEnabled = currentStepIndex > 0\nnextButton.isEnabled = currentStepIndex\
  \ < (currentRoute.steps.count - 1)\n```\n\n我们仍然需要为这些按钮添加操作，但让我们先完成步骤显示的最后部分：在地图视图上显示路线步骤的多段线。与我们之前为整条路线所做的类似，我们将根据多段线的边界地图矩形来设置可见的地图矩形。我们还将使用相同的边缘边距来保持片段可见。将以下代码添加到\
  \ `displayCurrentStep()` 方法的末尾：\n\n```\nlet padding = UIEdgeInsets(\n    top: 40,\
  \ left: 40, bottom: 40, right: 40)\nmapView.setVisibleMapRect(\n    step.polyline.boundingMapRect,\n\
  \    edgePadding: padding,\n    animated: true)\n```\n\n现在我们有了所有的显示代码，还需要两个部分——在路线请求\
  \ API 的完成处理器中保存路线，以及“上一步”和“下一步”按钮的操作。\n\n### 在实例变量中保存路线\n\n当我们在 `getDirections()`\
  \ 方法中从 API 获取方向响应时，我们需要将路线存储为一个实例变量。在完成处理器内部，将路线保存到 `currentRoute` 实例变量：\n\n```\n\
  directions.calculate { (response, error) in\n    guard let response = response else\
  \ {\n        print(error ?? \"No error found\")\n        return\n    }\n    let\
  \ route = response.routes[0]\n    self.currentRoute = route\n    self.displayCurrentStep()\n\
  \    // Additional code follows\n}\n```\n\n保存路线后，调用我们在上一节中创建的 `displayCurrentStep()`\
  \ 方法，将使用当前步骤初始化分步导航用户界面。\n\n现在，我们需要为“上一步”和“下一步”按钮添加操作功能。\n\n### “上一步”和“下一步”按钮的操作\n\
  \n“上一步”和“下一步”按钮的操作将更新当前步骤索引。我们需要先检查当前路线是否已设置。然后，我们还要确保更改步骤索引时保持在步骤数组的范围内。\n\n对于\
  \ `previous()` 操作，如果当前步骤索引为零或更小，该方法将直接返回：\n\n```\n@IBAction func previous(_ sender:\
  \ Any) {\n    if currentRoute == nil {\n        return\n    }\n    if (currentStepIndex\
  \ <= 0) {\n        return\n    }\n    currentStepIndex -= 1\n    displayCurrentStep()\n\
  }\n```\n\n`next()` 操作类似，区别在于它检查当前步骤索引是否小于步骤总数减一：\n\n```\n@IBAction func next(_ sender:\
  \ Any) {\n    guard let currentRoute = currentRoute else {\n        return\n   \
  \ }\n    if (currentStepIndex >=\n        (currentRoute.steps.count - 1)) {\n  \
  \      return\n    }\n    currentStepIndex += 1\n    displayCurrentStep()\n}\n```\n\
  \n填写完每个操作的主体后，您的应用程序应该能够获取分步导航指令。运行应用程序并单击“下一步”按钮后，您应该会看到如图 5-3 所示的屏幕。\n\n![../images/485790_1_En_5_Chapter/485790_1_En_5_Fig3_HTML.jpg](img/485790_1_En_5_Fig3_HTML.jpg)\n\
  \n**图 5-3** 分步导航中的一个步骤\n\n视图控制器的完整代码见代码清单 5-2，包含所有方法和实例变量。\n\n```\nimport UIKit\n\
  import MapKit\n\nclass ViewController: UIViewController, MKMapViewDelegate {\n\n\
  \    @IBOutlet weak var mapView: MKMapView!\n    @IBOutlet weak var previousButton:\
  \ UIButton!\n    @IBOutlet weak var nextButton: UIButton!\n    @IBOutlet weak var\
  \ distanceLabel: UILabel!\n    @IBOutlet weak var instructionsLabel: UILabel!\n\
  \    @IBOutlet weak var noticeLabel: UILabel!\n\n    var currentRoute: MKRoute?\n\
  \    var currentStepIndex = 0\n\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
  \        // 视图加载后的其他设置\n        mapView.delegate = self\n        getDirections()\n\
  \    }\n\n    func getDirections() {\n        let request = MKDirections.Request()\n\
  \        // 纽约市\n        request.source = createMapItem(latitude: 40.7128, longitude:\
  \ -74)\n        // 华盛顿特区\n        request.destination = createMapItem(latitude:\
  \ 38.91, longitude: -77.037)\n        request.transportType = .automobile\n\n  \
  \      let directions = MKDirections(request: request)\n\n        directions.calculate\
  \ { (response, error) in\n            guard let response = response else {\n   \
  \             print(error ?? \"未发现错误\")\n                return\n            }\n\
  \            let route = response.routes[0]\n            self.currentRoute = route\n\
  \            self.displayCurrentStep()\n\n            let padding = UIEdgeInsets(top:\
  \ 40, left: 40, bottom: 40, right: 40)\n            self.mapView.addOverlay(route.polyline)\n\
  \            self.mapView.setVisibleMapRect(\n                route.polyline.boundingMapRect,\n\
  \                edgePadding: padding,\n                animated: true)\n      \
  \  }\n    }\n\n    func displayRouteSteps(_ route: MKRoute) {\n        for step\
  \ in route.steps {\n            print(\"前行 \\(step.distance) 米\")\n            print(step.instructions)\n\
  \        }\n    }\n\n    func createMapItem(latitude: Double, longitude: Double)\
  \ -> MKMapItem {\n        let coord = CLLocationCoordinate2D(latitude: latitude,\n\
  \                                           longitude: longitude)\n        let placemark\
  \ = MKPlacemark(coordinate: coord)\n        return MKMapItem(placemark: placemark)\n\
  \    }\n\n    func mapView(_ mapView: MKMapView, rendererFor overlay: MKOverlay)\
  \ -> MKOverlayRenderer {\n        let renderer = MKPolylineRenderer(overlay: overlay)\n\
  \        renderer.strokeColor = .red\n        return renderer\n    }\n\n    @IBAction\
  \ func previous(_ sender: Any) {\n        if currentRoute == nil {\n           \
  \ return\n        }\n        if (currentStepIndex <= 0) {\n            return\n\
  \        }\n        currentStepIndex -= 1\n        displayCurrentStep()\n    }\n\
  \n    @IBAction func next(_ sender: Any) {\n        guard let currentRoute = currentRoute\
  \ else {\n            return\n        }\n        if (currentStepIndex >= (currentRoute.steps.count\
  \ - 1)) {\n            return\n        }\n        currentStepIndex += 1\n      \
  \  displayCurrentStep()\n    }\n\n    func displayCurrentStep() {\n        guard\
  \ let currentRoute = currentRoute else {\n            return\n        }\n      \
  \  if (currentStepIndex >= currentRoute.steps.count) {\n            return\n   \
  \     }\n\n        let step = currentRoute.steps[currentStepIndex]\n        instructionsLabel.text\
  \ = step.instructions\n        distanceLabel.text = \"\\(step.distance) meters\"\
  \n\n        if step.notice != nil {\n            noticeLabel.isHidden = false\n\
  \            noticeLabel.text = step.notice\n        } else {\n            noticeLabel.isHidden\
  \ = true\n        }\n\n        previousButton.isEnabled = currentStepIndex > 0\n\
  \        nextButton.isEnabled = currentStepIndex < (currentRoute.steps.count - 1)\n\
  \n        let padding = UIEdgeInsets(top: 40, left: 40, bottom: 40, right: 40)\n\
  \        mapView.setVisibleMapRect(step.polyline.boundingMapRect,\n            \
  \                      edgePadding: padding,\n                                 \
  \ animated: true)\n    }\n}\n```\n\n**代码清单 5-2** 具有分步导航功能的 `ViewController` 类\n\n\
  \n\n## 后续步骤\n\n本段代码仍有改进空间——您可以添加一个将距离转换为正确单位的函数，或者允许用户在不同交通方式（汽车、公交或步行）之间切换。\n\n\
  您还可以将这段行车路线代码与上一章的本地搜索功能结合，让用户自行选择导航目的地。\n\n## 本章小结\n\n现在您已经对苹果地图导航有了一定了解，可以思考如何将其集成到自己的应用中，而不是将用户跳转到苹果地图或谷歌地图等其他应用程序。\n\
  \n第六章 6 将把关注点从地图、兴趣点和路线转向地理围栏。我们将使用 `CoreLocation` 框架中的区域监控 API 来检测用户进入或离开指定区域的时间，从而在应用内执行相应操作。\n\
  \n"
- "# 6. 在 CoreLocation 中使用地理围栏\n\n您可以通过 `CoreLocation` 在 iOS 应用中支持地理围栏区域监控。iOS 内置的区域监控功能意味着您的应用无需保持前台运行，也无需持续检查用户位置而过度消耗电量。\n\
  \n## 区域监控概念\n\n从概念上讲，区域监控非常简单。您的应用最多可以指定 20 个地理围栏（在 `CoreLocation` 中称为区域）。每个区域都有唯一标识符，您可以指定当用户进入或离开每个区域时是否通知应用。我们在第二章\
  \ 2 中使用过的 `CoreLocation` 管理器（`CLLocationManager`）可以开始和停止监控单个区域。您还可以获取当前监控区域的列表。进入或离开区域的事件会传递给位置管理器委托，通常是一个视图控制器或应用委托类。\n\
  \n区域监控的难点在于其细节处理。例如，区域监控需要\"始终允许\"位置权限，但应用首次请求时仅会提示用户允许\"使用期间\"位置权限。当应用在后台运行时，若某个地理围栏触发进入或离开事件，系统才会向用户发起单独的\"\
  始终允许\"权限请求。\n\n终端用户无需为应用监控区域而接受\"始终允许\"位置权限，但相关触发事件仅在用户授予权限后才会生效。这就需要您向用户说明为何需要授予\"\
  始终允许\"位置权限。\n\n除了权限问题，用户进入或离开地理围栏时应用不会立即收到通知。根据苹果公司的说明，为避免向应用发送过多通知，iOS 要求至少在区域边界被跨越\
  \ 20 秒后，且应用与边界保持最小距离时，才会发送通知。如果您的区域范围较小，而用户正在驾车、骑行或快速步行，他们可能在收到警报时已经越过了该区域。\n\n\
  ## 设置基于位置的应用\n\n本章将在第二章 2 对 `CoreLocation` 管理器的讨论基础上进行扩展。我们需要初始化位置管理器、设置委托，并请求获取用户位置的始终权限。\n\
  \n我们还需要在 `Info.plist` 文件中为两种权限设置提示信息：\n\n- `隐私 - 使用期间位置使用说明`（`NSLocationWhenInUseUsageDescription`）\n\
  - `隐私 - 始终和使用期间位置使用说明`（`NSLocationAlwaysAndWhenInUseUsageDescription`）\n\n如果您想了解更多关于位置管理器、委托和权限的信息，请参阅第二章\
  \ 2。\n\n在 Xcode 中使用单视图应用模板创建另一个 Swift iOS 项目。将您的应用命名为 `GeofencesApp`。接下来，将您的 `ViewController`\
  \ 类修改为与列表 6-1 一致。\n\n```\nimport UIKit\nimport CoreLocation\nclass ViewController:\
  \ UIViewController {\n    var locationManager: CLLocationManager!\n    override\
  \ func viewDidLoad() {\n        super.viewDidLoad()\n        locationManager = CLLocationManager.init()\n\
  \        locationManager.requestAlwaysAuthorization()\n    }\n}\n```\n\n**列表 6-1**\
  \  \n使用 `CoreLocation` 请求始终允许位置授权\n\n我们还需要在 `Info.plist` 文件中设置权限提示文本——告诉用户我们将要监控地理围栏。\n\
  \n在 Xcode 中打开 `Info.plist` 文件，您会看到属性列表。添加两个位置隐私说明条目（`NSLocationWhenInUseUsageDescription`\
  \ 和 `NSLocationAlwaysAndWhenInUseUsageDescription`），如图 6-1 所示。\n\n![../images/485790_1_En_6_Chapter/485790_1_En_6_Fig1_HTML.jpg](img/485790_1_En_6_Fig1_HTML.jpg)\n\
  \n**图 6-1**  \n`Info.plist` 文件中始终和使用期间位置使用的权限描述\n\n到目前为止，这些都是任何使用用户位置的 iOS 应用所需的步骤。接下来我们开始创建地理围栏。\n\
  \n## 区域监控入门\n\n`CoreLocation` 位置管理器负责监控地理围栏，而您的应用负责告知管理器要监控哪些地理围栏。您可以在应用中通过编程方式设置地理围栏，以便从服务器获取它们，或让用户创建自己的地理围栏（例如，针对他们的家、学校和工作地点）。\n\
  \n第一步是确保区域监控对您所使用的区域类可用。理论上，任何继承自 `CLRegion` 的类都可以使用，但在实践中，iOS 13 中唯一继承自 `CLRegion`\
  \ 的类是 `CLCircularRegion`，它在坐标周围绘制一个半径范围。`CLLocationManager` 上的静态方法 `isMonitoringAvailable(for:)`\
  \ 接受一个类作为参数，因此您通常会传入 `CLCircularRegion.self`。如果监控可用，您可以创建区域并开始监控。\n\n要创建圆形区域，您需要一个包含经纬度的\
  \ `CLLocationCoordinate2D` 中心坐标、一个半径（以米为单位）和一个唯一的字符串标识符。使用这些参数构造 `CLCircularRegion`\
  \ 的代码类似如下：\n\n```\nlet region = CLCircularRegion(center: coord, radius: 100, identifier:\
  \ \"Geofence1\")\n```\n\n每个区域有两个用于触发器的布尔属性——`notifyOnEntry` 和 `notifyOnExit`。如果两者都设置为\
  \ false，地理围栏将不会执行任何操作。两者可以都设置为 true，也可以只设置其中一个。\n\n实例化并配置区域后，使用 `startMonitoring(for:)`\
  \ 方法将区域传递给位置管理器的实例。\n\n一个完整的地理围栏监控 Swift 函数如列表 6-2 所示——请将其添加到您的 `ViewController`\
  \ 类中。您可能需要将地理围栏中的纬度和经度修改为您的位置。\n\n```\nfunc monitorGeofences() {\n    if CLLocationManager.isMonitoringAvailable(for:\
  \ CLCircularRegion.self) {\n        let coord = CLLocationCoordinate2D(latitude:\
  \ 37.5, longitude: -110.2)\n        let region = CLCircularRegion(center: coord,\
  \ radius: 100, identifier: \"Geofence1\")\n        region.notifyOnEntry = true\n\
  \        region.notifyOnExit = true\n        locationManager.startMonitoring(for:\
  \ region)\n    }\n}\n```\n\n**列表 6-2**  \n创建待监控的地理围栏\n\n如上述方法所示，为地理围栏创建区域并告知 iOS\
  \ 监控其进入和离开事件非常直接。该应用的下一部分将是监听用户位置的变化，这些变化将使监控进入或离开地理围栏。\n\n\n\n## 监听地理围栏触发事件\n\n\
  向位置管理器注册地理围栏后，任何与该地理围栏相关的进入或离开事件都将发送至位置管理器的委托对象。\n\n首先，在 `ViewController` 类中修改 `viewDidLoad()`\
  \ 方法，将视图控制器设置为位置管理器的委托：\n\n```\nlocationManager.delegate = self\n```\n\n下一步是在 `ViewController.swift`\
  \ 源代码文件末尾为 `CLLocationManagerDelegate` 协议创建扩展。在此扩展中，我们将实现 `locationManager(_ manager:\
  \ didEnterRegion region:)` 和 `locationManager(_ manager: didExitRegion region:)`\
  \ 方法。\n\n该扩展的基本实现如代码清单 6-3 所示。\n\n```\nextension ViewController : CLLocationManagerDelegate\
  \ {\n    func locationManager(_ manager: CLLocationManager,\n                  \
  \       didEnterRegion region: CLRegion) {\n        print(\"已进入 \\(region.identifier)\"\
  )\n    }\n    func locationManager(_ manager: CLLocationManager,\n             \
  \            didExitRegion region: CLRegion) {\n        print(\"已离开 \\(region.identifier)\"\
  )\n    }\n}\n代码清单 6-3\n监听地理围栏的进入和离开触发事件\n```\n\n区域监控更高级的用法可触发应用程序内的业务逻辑，例如：提供折扣、弹出待办事项提醒或提示您签到常去地点。这些操作均应基于区域的标识符（该标识符应为唯一字符串）来实现。举例来说，您可能希望使用数据库中的主键或从服务器\
  \ RESTful 资源获取的对象 ID 作为标识符。\n\n如果您开始监控一个与现有区域具有相同标识符的新区域，则现有区域将被替换。此外，您一次最多可监控 20\
  \ 个区域，因此在设计整体系统时需考虑此限制——iOS 环境下无法监控超过此数量的区域。\n\n您可以在模拟器中通过修改模拟 iPhone 的经纬度以匹配地理围栏来测试上述代码。在\
  \ iOS 模拟器的 **Features** 菜单下，选择 **Location** 子菜单，然后选择 **Custom Location…** 菜单项。此时将出现如图\
  \ 6-2 所示的对话框。\n\n![../images/485790_1_En_6_Chapter/485790_1_En_6_Fig2_HTML.jpg](img/485790_1_En_6_Fig2_HTML.jpg)\n\
  \n图 6-2 iOS 模拟器中的自定义位置对话框\n\n您应在 Xcode 的输出窗口中看到一条信息，显示“已进入 Geofence1”。将模拟器的位置更改为“City\
  \ Run”或其他内置位置，您将看到一条离开地理围栏的调试信息。\n\n## 在应用内部显示本地通知\n\n地理围栏一个非常常见的用例是显示本地通知，即使应用处于非活跃状态也能生效。为此，您通常需要在\
  \ `AppDelegate` 类中添加功能，当然，您也可以将大部分功能封装到其自身的类中，然后让应用委托调用该类来执行功能。\n\n使用本地通知时，您需要请求用户授权以显示通知（类似于位置权限申请）。\n\
  \n### 设置通知中心\n\n首先，在 `AppDelegate` 类中添加所需的导入语句：\n\n```\nimport CoreLocation\nimport\
  \ UserNotifications\n```\n\n完成导入后，我们可以在应用委托的 `application(_ application: didFinishLaunchingWithOptions)`\
  \ 方法中通过以下代码设置用户通知中心：\n\n```\nUNUserNotificationCenter.current()\n    .requestAuthorization(\n\
  \        options: [.alert],\n        completionHandler: {allowed, error in })\n\
  UNUserNotificationCenter.current().delegate = self\n```\n\n此处，我们仅请求用户授权以显示通知提醒。如果需要，我们还可以通过将\
  \ `.sound` 和 `.badge` 添加到选项数组中来请求声音和角标权限。虽然必须指定一个完成处理程序，但保持其为空也是可以的。\n\n下一行设置了用户通知中心的委托。这对于应用在前台运行时用户进入或离开地理围栏的情况至关重要。我们需要实现\
  \ `UNUserNotificationCenterDelegate` 委托中的 `userNotificationCenter(_ center: willPresent\
  \ notification: completionHandler)` 方法。在该方法内部，我们只需添加一行代码，通过显示通知提醒来处理前台通知，其处理方式与应用在后台运行时相同。如果您愿意，也可以在此处显示一个警告视图。\n\
  \n要实现此通知中心委托，请为 `AppDelegate` 类添加一个扩展，如代码清单 6-4 所示。\n\n```\nextension AppDelegate:\
  \ UNUserNotificationCenterDelegate {\n    func userNotificationCenter(_\n      \
  \                          center: UNUserNotificationCenter,\n                 \
  \               willPresent notification: UNNotification,\n                    \
  \            withCompletionHandler completionHandler:\n                        \
  \        @escaping (UNNotificationPresentationOptions) -> Void) {\n        completionHandler(.alert)\n\
  \    }\n}\n代码清单 6-4\n用于处理前台通知的用户通知中心委托扩展\n```\n\n对于一个简单的功能而言，这涉及了大量的样板代码，但如果您希望应用在前台时本地通知能正常工作，这一步骤是必不可少的。\n\
  \n### 为特定区域显示本地通知\n\n下一步，我们将编写一个函数，用于根据被监控的区域创建本地通知。该函数接受两个参数——一个区域和一个布尔值，用于指示这是进入还是离开通知。\n\
  \n在该函数内部，我们将创建一个可变的通知内容对象，并设置其标题和正文。我们还将创建一个触发器，使通知在请求后一秒立即显示，以及一个将传递给用户通知中心的通知请求。\n\
  \n以下代码清单 6-5 中的 `displayNotification()` 函数应添加到 `AppDelegate` 类中。\n\n```\nfunc displayNotification(_\
  \ region:CLRegion, isEnter:Bool) {\n    let content = UNMutableNotificationContent()\n\
  \    content.title = \"\\(region.identifier) 状态更新\"\n    content.body = isEnter\
  \ ? \"已进入\" : \"已离开\"\n    let trigger = UNTimeIntervalNotificationTrigger(\n  \
  \      timeInterval: 1,\n        repeats: false)\n    let request = UNNotificationRequest(\n\
  \        identifier: region.identifier,\n        content: content,\n        trigger:\
  \ trigger)\n    UNUserNotificationCenter.current().add(request,\n              \
  \                             withCompletionHandler: nil)\n}\n代码清单 6-5\n为给定的被监控区域显示本地通知的函数\n\
  ```\n\n现在我们已经有了根据区域创建通知的方法，接下来只需在应用委托中监听区域变化，然后调用此函数即可。\n\n\n好的，作为高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例格式，将给定的英文文本翻译成中文。\n\
  \n\n## 在应用程序委托中监控区域变化\n\n在应用程序委托内部，我们需要创建另一个`CoreLocation`定位管理器的实例。即使该区域是在`ViewController`类中添加到此定位管理器的，这些定位管理器也都共享同一组区域。将定位管理器作为常量属性添加到`AppDelegate`类中：\n\
  \n```\nlet locationManager = CLLocationManager()\n```\n\n在`application(_ application:\
  \ didFinishLaunchingWithOptions)`方法中，将定位管理器的委托设置为 self：\n\n```\nlocationManager.delegate\
  \ = self\n```\n\n现在，我们只需要在 `AppDelegate.swift` 源代码文件中，以扩展的形式实现 `CLLocationManagerDelegate`\
  \ 委托，如代码清单 6-6 所示。这两个方法与我们在前面的基本区域监控示例中使用的方法完全相同。区别在于，该扩展不会打印语句，而是会调用我们在上一节中编写的`displayNotification(_\
  \ region: didEnter:)`方法。\n\n```\nextension AppDelegate : CLLocationManagerDelegate\
  \ {\nfunc locationManager(_ manager: CLLocationManager,\ndidEnterRegion region:\
  \ CLRegion) {\nself.displayNotification(region, isEnter: true)\n}\nfunc locationManager(_\
  \ manager: CLLocationManager,\ndidExitRegion region: CLRegion) {\nself.displayNotification(region,\
  \ isEnter: false)\n}\n}\n代码清单 6-6\n处理显示通知的 CoreLocation 定位管理器委托\n\n```\n\n现在，在模拟器中运行你的应用程序，并使用模拟器“功能”菜单和“位置”子菜单下的“自定义位置”工具，尝试进入和退出地理围栏区域。你应该会看到类似于图\
  \ 6-3 的内容。\n\n![../images/485790_1_En_6_Chapter/485790_1_En_6_Fig3_HTML.jpg](img/485790_1_En_6_Fig3_HTML.jpg)\n\
  \n图 6-3\n\niPhone 模拟器显示来自地理围栏的本地通知\n\n你可以继续在此示例的基础上进行构建，实现处理用户选择通知的功能，无论是在应用程序运行时还是在应用程序终止后。这些内容超出了本书的范围，本书主要关注地图和定位。\n\
  \n## 从应用程序中移除地理围栏\n\n定位管理器包含一组当前正在被应用程序监控的地理围栏。这些区域在每次应用程序加载时都会重新创建，并且应该使用唯一标识符进行比较，而不是进行对象比较，因为从开始监控区域到从定位管理器检索区域集合，其实例可能会发生变化。定位管理器的该属性名称为`monitoredRegions`，它由一组`CLRegion`对象组成。\n\
  \n如果你想停止监控所有地理围栏，只需遍历区域集合，然后在定位管理器上调用`stopMonitoring(for:)`方法即可：\n\n```\nfor region\
  \ in locationManager.monitoredRegions {\nlocationManager.stopMonitoring(for: region)\n\
  }\n```\n\n如果你愿意，你可以将区域的标识符与一组已知的标识符进行比较，这些标识符是你希望继续监控的，或者是希望停止监控并随即移除的地理围栏。\n\n\
  至此，我们关于 iOS 区域监控和地理围栏的讨论就结束了。此功能独立于所使用的任何地图技术，并且可以在 iOS 应用程序的前台和后台使用。下一章将向你展示如何使用适用于\
  \ iOS 的 Google 地图，这是一种类似于 Apple `MapKit` 框架的技术。当然，你可以在使用 Google 地图的应用程序中使用这些地理围栏。\n\
  \n"
- "# 7. 使用 Google Maps SDK 显示地图\n\nApple 的 `MapKit` 框架并不是 iOS 上地图应用的唯一解决方案。其他提供商也提供地图和导航技术，包括\
  \ Google、Mapbox、微软的必应地图以及 ESRI 的 ArcGIS。在本章及后续章节中，我们将使用适用于 iOS 的 Google Maps SDK。对于多平台应用，你可以在\
  \ Web、Android 和 iOS 上使用 Google 地图。这可以为你的应用程序提供一致性。你可能还想在地图中使用 Google 的图像，或者使用 Google\
  \ 的驾车路线或地点信息。\n\n本章包含了在 iOS 应用中使用 Google 地图所需的所有步骤。接下来的章节将基于我们在本章创建的项目进行构建。\n\n\
  ### 使用 Google 地图平台\n\n使用 Google Maps SDK 与使用 Apple 的 `MapKit` 框架类似，但也有一些不同之处。第一个区别是你需要注册\
  \ Google 地图平台。第二个区别是你需要下载 Google 地图库并将其集成到你的 Xcode 项目中。\n\n在 [`https://cloud.google.com/maps-platform/`](https://cloud.google.com/maps-platform/)\
  \ 上查找有关 Google 地图平台的更多信息。\n\n与 Apple 地图不同，Google 地图对其功能有相关的定价和计费。在撰写本文时（2020 年初），Google\
  \ 为每位用户在地图、路线和地点方面提供每月 200 美元（USD）的免费额度。此外，在撰写本文时，在移动应用程序中显示地图是免费的。这些定价优惠可能随时更改，或者在美国境外有所不同，因此在注册此服务之前请查看定价信息。\n\
  \n\n\n## 安装 iOS 版 Google Maps SDK 库\n\n在 Xcode 中新建一个名为 `GoogleMapsApp` 的 iOS 项目，类型选择带\
  \ storyboard 和 Swift 的单视图应用程序——与我们目前的其他项目类似。\n\niOS 版 Google Maps 有两种安装方式。一种是按照\
  \ Google Maps 安装页面（`https://developers.google.com/maps/documentation/ios-sdk/start#step_2_install_the_sdk`）上的分步指南进行手动安装。这种方式相当繁琐，通常仅在您无法使用第二种方式（即使用\
  \ CocoaPods 依赖管理器）时才值得尝试。\n\nCocoaPods 是 iOS 应用程序的依赖管理器，类似于 Mac 上的 Homebrew 或 JavaScript\
  \ 的 Node Package Manager（NPM）。CocoaPods 允许您声明应用程序使用的库及其版本，然后自动下载并安装这些库，无需手动将库下载到\
  \ Xcode 项目并进行添加。这使得框架升级更加容易，并有助于避免某些库之间不兼容的问题。\n\n如果您的系统尚未安装 CocoaPods，它以 Ruby gem\
  \ 的形式分发。您需要使用以下命令在 Mac 上安装 CocoaPods：\n\n```\nsudo gem install cocoapods\n```\n\n\
  接下来，使用命令行导航到包含新 Xcode 项目的目录。\n\n在该目录中，键入以下命令以创建 CocoaPods `Podfile`。Podfile 包含项目的依赖项：\n\
  \n```\npod init\n```\n\n现在查看该目录，并打开 `pod init` 刚刚创建的 `Podfile`。其内容应类似于清单 7-1。\n\n\
  ```\n# 取消注释下一行以定义项目的全局平台\n# platform :ios, '9.0'\ntarget 'GoogleMapsApp' do\n# 如果不想使用动态框架，请注释下一行\n\
  use_frameworks!\n# GoogleMapsApp 的 Pods\nend\n```\n\n清单 7-1\nGoogle Maps 应用程序的新\
  \ CocoaPods Podfile\n\n到目前为止，这些内容与 Google Maps 毫无关系。我们将把 `GoogleMaps` 库作为依赖项添加到\
  \ `Podfile` 中。在 `# GoogleMapsApp 的 Pods` 行下方，添加 `GoogleMaps` pod。添加后，您的 `Podfile`\
  \ 文件应类似于清单 7-2。\n\n```\ntarget 'GoogleMapsApp' do\n# 如果不想使用动态框架，请注释下一行\nuse_frameworks!\n\
  # GoogleMapsApp 的 Pods\npod 'GoogleMaps'\nend\n```\n\n清单 7-2\n包含 GoogleMaps 依赖项的\
  \ CocoaPods Podfile\n\n现在依赖项已就位，CocoaPods 可以为我们下载最新版本的 Google Maps SDK，并将其配置到我们的\
  \ iOS 应用程序中。\n\n在您运行 `pod init` 的同一目录中，从命令行运行以下命令：\n\n```\npod install\n```\n\n\
  CocoaPods 将安装 GoogleMaps 依赖项，同时还会为您的应用程序创建一个 Xcode workspace。这个 workspace 将包含两个\
  \ target——一个用于您的应用程序，另一个用于下载的依赖项（称为 pods）。现在您需要打开 `GoogleMapsApp.xcworkspace`，而不是\
  \ `GoogleMapsApp.xcodeproj`，来构建您的应用程序。\n\n使用 CocoaPods，您可以通过语义化版本控制将 Google Maps\
  \ 的版本固定到特定版本（在撰写本文时为 3.7.0）。有关如何使用 CocoaPods 和 Podfile 的更多信息，请参阅 `https://cocoapods.org/`\
  \ 上的 CocoaPods 文档。\n\n继续在 Xcode 中打开该 workspace。尝试在模拟器或您的设备上运行 iOS 应用程序（`GoogleMapsApp`）。您将只会看到一个空白的白色屏幕，但如果存在任何编译错误或其他问题，现在是调试它们的好时机。下一步，我们将设置\
  \ Google Maps API 密钥，以便开始使用 Google 的地图、路线和地点服务。\n\n## 设置 Google Maps API 密钥\n\n\
  在进一步操作之前，您需要一个 Google Maps API 密钥。请访问 `https://cloud.google.com/maps-platform` 注册。\n\
  \n当您启用 Google Maps Platform 时，请勾选 Maps 的复选框，如图 7-1 所示。\n\n![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig1_HTML.jpg](img/485790_1_En_7_Fig1_HTML.jpg)\n\
  \n图 7-1\n启用 Google Maps Platform 并选择产品\n\n点击“继续”。在下一个屏幕（图 7-2）中，创建一个名为“First Maps\
  \ Project”的新项目。\n\n![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig2_HTML.jpg](img/485790_1_En_7_Fig2_HTML.jpg)\n\
  \n图 7-2\n为 Google Cloud 创建新项目\n\n您还需要为 Google Maps 设置一个结算账户，并关联一张信用卡，以便 Google 对超出免费配额的用量进行收费。\n\
  \n完成此过程后，Google 将询问您是否要为您的项目启用 Google Maps Platform，如图 7-3 所示。请继续点击“下一步”。\n\n![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig3_HTML.jpg](img/485790_1_En_7_Fig3_HTML.jpg)\n\
  \n图 7-3\n启用 Google Maps Platform API\n\n您需要启用 iOS 版 Maps SDK——通过同一界面还可使用其他平台和服务。\n\
  \n如果在获取 Maps SDK 的 API 密钥时遇到问题，Google 网站上有其他指导说明：`https://developers.google.com/maps/documentation/ios-sdk/get-api-key`。\n\
  \n最后，您需要创建一个 API 密钥。在 Web 界面的“API”部分下，找到“iOS 版 Maps SDK”。选择“凭据”选项卡，然后点击“API 和服务”中的“凭据”链接。在该屏幕上，选择“创建凭据”按钮，如图\
  \ 7-4 所示，然后从出现的下拉菜单中选择“API 密钥”。\n\n![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig4_HTML.jpg](img/485790_1_En_7_Fig4_HTML.jpg)\n\
  \n图 7-4\n为 Google Maps 项目创建凭据\n\n门户网站将为您创建一个新的 API 密钥，如图 7-5 所示。将来您仍可访问此密钥，因此无需立即保存。您需要做的是限制此密钥仅用于您的应用程序。这可以防止他人在其项目中使用您的\
  \ API 密钥，从而影响您的结算。\n\n![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig5_HTML.jpg](img/485790_1_En_7_Fig5_HTML.jpg)\n\
  \n图 7-5\nGoogle Maps API 密钥创建对话框\n\n点击图 7-5 对话框中的“限制密钥”按钮。将出现“限制”页面（图 7-6），其中有多种选择可供挑选。将此密钥限制为仅用于\
  \ iOS 应用。为您的应用程序添加一个 iOS 包标识符。对于此项目，包标识符应为 `com.buildingmobileapps.GoogleMapsApp`。根据您的组织，您的包标识符可能不同。\n\
  \n![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig6_HTML.jpg](img/485790_1_En_7_Fig6_HTML.jpg)\n\
  \n图 7-6\n限制 Google Maps API 密钥的使用\n\n添加完包标识符后，务必按下“完成”按钮，然后点击“保存”按钮以持久保存更改。保存后，您应该会看到该限制显示在您的\
  \ iOS 密钥旁边，如图 7-7 所示。\n\n![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig7_HTML.jpg](img/485790_1_En_7_Fig7_HTML.jpg)\n\
  \n图 7-7\n受限制的 iOS 地图密钥\n\n\n\n## 在应用程序中集成 API 密钥\n\n现在您已创建 API 密钥，并将其使用范围限制在您的 iOS\
  \ 应用中，同时已将 Google Maps 库集成到项目中，下一步是在您的 iOS 应用内提供该 API 密钥。\n\n在使用任何 Google Maps 服务（如地图、路线或地点）之前，您需要在\
  \ Google Maps SDK 中注册您的 API 密钥。如果未执行此操作，您的应用程序将会收到来自 SDK 的运行时错误。\n\n确保 Google Maps\
  \ 在使用任何服务前始终持有 API 密钥的最简单方法，是在`AppDelegate.swift`文件的`application(_:didFinishLaunchingWithOptions:)`方法中提供该\
  \ API 密钥，如代码清单 7-3 所示。您需要导入`GoogleMaps`框架，并调用`GMSServices.provideAPIKey()`。以下是经过必要修改的`AppDelegate.swift`代码清单。请将`API-KEY`替换为您在\
  \ Google Cloud Console 中创建的 API 密钥。\n\n```\nimport UIKit\nimport GoogleMaps\n@UIApplicationMain\n\
  class AppDelegate: UIResponder, UIApplicationDelegate {\n    func application(_\
  \ application: UIApplication, didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey:\
  \ Any]?) -> Bool {\n        // 应用启动后的自定义覆盖点\n        GMSServices.provideAPIKey(\"\
  API-KEY\")\n        return true\n    }\n}\n```\n\n现在您已配置好 API 密钥，接下来可以进入最有趣的部分——在您的应用内显示\
  \ Google 地图！\n\n## 使用地图视图显示 Google 地图\n\n我们可以通过几种不同的方式将地图视图（`GMSMapView`）添加到 iOS\
  \ 应用程序中。我们可以以编程方式将其添加为子视图，也可以将其作为`UIView`添加到故事板中，然后更改其自定义类，或者将视图控制器的视图替换为地图。\n\n\
  在故事板上显示地图视图是最简单的方法。只需将一个`UIView`拖到故事板上，然后将自定义类更改为`GMSMapView`，如图 7-8 所示。\n\n![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig8_HTML.jpg](img/485790_1_En_7_Fig8_HTML.jpg)\n\
  \n为地图视图添加约束，使其从边缘拉伸到边缘（除非您需要，否则不必担心安全区域）。现在在模拟器中运行应用程序——您应该会在应用中看到如图 7-9 所示的地图！\n\
  \n![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig9_HTML.jpg](img/485790_1_En_7_Fig9_HTML.jpg)\n\
  \n现在，为了使这个地图应用功能完整，还有最后一步。点击或轻触地图左下角的 Google 徽标，需要在已安装相应应用的情况下，打开 Google Maps iOS\
  \ 应用或 iOS 版 Google Chrome 浏览器。如果最终用户没有这些应用，则会通过 Safari 打开。我们需要允许我们的应用查询正确的 URL 方案。\n\
  \n## 允许 Google Maps 和 Chrome 的 URL 方案\n\n当用户点击地图左下角的 Google 徽标后，适用于 iOS 的 Google\
  \ Maps SDK 将尝试打开 Google Maps 应用或 Google Chrome 应用。SDK 会在打开这些应用之前检查它们是否已安装在用户的手机上。最终的备选方案是通过\
  \ Safari 打开 URL。\n\n早期版本的 iOS 允许任何应用检查手机上是否安装了其他应用。不幸的是，该功能被滥用，因此 Apple 限制了对该权限的使用。任何您希望检查的应用包标识符都需要在`Info.plist`文件中明确声明。\n\
  \n在`Info.plist`中添加一行。键名应为`LSApplicationQueriesSchemes`。出现的下拉菜单中没有对应的条目，因此您需要准确输入该名称。将类型从\
  \ String 更改为 Array。现在，您可以将应用要查询的任何 URL 方案添加到该数组中。以下是 Google Maps 和 Google Chrome\
  \ 的两个方案：\n\n*   `comgooglemaps`\n*   `googlechromes`\n\n您完成后的`Info.plist`文件应类似于图\
  \ 7-10。\n\n![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig10_HTML.jpg](img/485790_1_En_7_Fig10_HTML.jpg)\n\
  \n现在所有必需的信息都已设置完毕，我们可以继续更改地图视图显示信息的方式了。\n\n## 更改地图视图的显示选项\n\n如果我们想更改地图视图的显示选项，则需要通过代码来实现。使用\
  \ Xcode 的 Assistant 视图，为 Google 地图视图在您的`ViewController`类上创建一个输出口，并将其命名为`mapView`，如图\
  \ 7-11 所示。\n\n![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig11_HTML.jpg](img/485790_1_En_7_Fig11_HTML.jpg)\n\
  \n该输出口属性应如下所示：\n\n```\n@IBOutlet weak var mapView: GMSMapView!\n```\n\n您还需要在`ViewController`类的顶部添加导入`GoogleMaps`框架的语句：\n\
  \n```\nimport GoogleMaps\n```\n\n现在运行您的 iOS 应用程序，以确保一切正常。此时您应该还看不到任何变化。让我们继续更改地图的位置。使用\
  \ Google Maps 时，我们会创建一个相机位置，然后将地图视图动画移动到新位置。将以下行添加到您的`viewDidLoad()`方法中：\n\n```\n\
  let camera = GMSCameraPosition.camera(\n    withLatitude: 30.25,\n    longitude:\
  \ -97.7,\n    zoom: 7)\nmapView.animate(to: camera)\n```\n\n如果您想查看德克萨斯州奥斯汀以外的地点，请将纬度和经度替换为您选择的坐标！您最终的`ViewController`类应类似于代码清单\
  \ 7-4。\n\n```\nimport UIKit\nimport GoogleMaps\nclass ViewController: UIViewController\
  \ {\n    @IBOutlet weak var mapView: GMSMapView!\n    override func viewDidLoad()\
  \ {\n        super.viewDidLoad()\n        // 加载视图后的其他设置\n        let camera = GMSCameraPosition.camera(\n\
  \            withLatitude: 30.25,\n            longitude: -97.7,\n            zoom:\
  \ 7)\n        mapView.animate(to: camera)\n    }\n}\n```\n\n现在我们掌握了在 iOS 上使用 Google\
  \ Maps SDK 的基础知识，接下来可以继续探讨更高级的主题，例如将地图类型更改为卫星、地形或混合模式，添加地图标记，或提供驾驶路线。我们将重用本章中构建的\
  \ Xcode 项目，以避免重复所有设置和安装说明。\n\n## 探索 Google 地图视图\n\n在上一章中，我们完成了使用适用于 iOS 的 Google\
  \ Maps SDK 所需的全部设置。如果您尚未学习第 7 章，请从那里开始，因为本章将在此基础上继续讲解。\n\n在本章中，我们将探索 Google 地图视图的功能。具体来说，我们将学习地图类型、地图标记和形状的使用。\n\
  \n\n\n## 更改地图瓦片类型\n\n首先打开你在第 7 章中构建的应用程序。我们将扩展该项目，因此无需重复配置谷歌地图。\n\n谷歌地图提供了五种不同的地图类型，这些类型在\
  \ `GMSMapViewType` 枚举中定义：\n\n*   `hybrid` – 带标签的卫星瓦片\n*   `none` – 无瓦片，无标签\n*  \
  \ `normal` – 默认选项，带标签的街道地图\n*   `satellite` – 卫星瓦片，但无标签\n*   `terrain` – 适用于户外应用程序，带标签\n\
  \n设置地图类型很简单——在第 7 章`ViewController`类的`viewDidLoad()`方法底部添加一行代码，如代码清单 8-1 所示。\n\n\
  ```\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n...\nmapView.mapType =\
  \ .terrain\n}\n```\n\n如果你希望让用户能够在卫星、地形和街道地图选项之间切换，可以始终允许用户自行设置地图类型。地图类型可以在运行时无障碍地更改。\n\
  \n## 显示地图标记\n\n在谷歌地图上显示地图标记很简单——只需创建一个`GMSMarker`对象作为地图标记，指定位置和标题，然后告诉该标记它属于哪个地图。\n\
  \n这与`MapKit`略有不同，在`MapKit`中，你直接将标记添加到地图上。在`ViewController`类中创建一个名为`addMarker()`的新函数，代码如代码清单\
  \ 8-2 所示。\n\n```\nfunc addMarker() {\nlet marker = GMSMarker()\nmarker.title = \"\
  奥斯汀\"\nmarker.snippet = \"德克萨斯州\"\nmarker.position = CLLocationCoordinate2D(\nlatitude:\
  \ 30.25, longitude: -97.75)\nmarker.map = mapView\n}\n```\n\n在`viewDidLoad()`方法中添加对`addMarker()`的调用，然后运行应用程序。点击地图标记以显示信息窗口后，你应该会看到类似的效果。图\
  \ 8-1 中的信息窗口将显示`title`和`snippet`属性（如果存在的话）。\n\n![../images/485790_1_En_8_Chapter/485790_1_En_8_Fig1_HTML.jpg](img/485790_1_En_8_Fig1_HTML.jpg)\n\
  \n### 更改标记图标\n\n默认情况下，标记会显示为红色大头针。标记的`icon`和`iconView`属性控制着标记的显示方式。`icon`属性接受一个`UIImage`对象。`iconView`属性接受一个`UIView`对象。`iconView`属性优先于`icon`属性——如果你设置了`iconView`，`icon`属性将被忽略。\n\
  \n`GMSMarker`类提供了一个辅助函数，可以用你指定的颜色（作为`UIColor`）创建标记图标的`UIImage`。如果你想在地图上显示不同颜色的标记，这会很有帮助。要将标记图标更改为蓝色，你可以这样操作：\n\
  \n```\nmarker.icon = GMSMarker.markerImage(with: .blue)\n```\n\n你可以将任何颜色作为参数传递给`markerImage()`方法。\n\
  \n### 响应标记事件\n\n`GMSMapViewDelegate`协议包含许多你可能在地图应用程序中使用的不同回调方法。\n\n对于标记而言，你最常实现的功能可能是在用户点击标记或信息窗口时执行某些操作。通常，如果标记有信息窗口，你只会在用户点击信息窗口时执行操作，但也可以监听标记的点击事件，执行一些操作，同时仍然显示信息窗口。\n\
  \n第一步是将`mapView`的`delegate`属性设置为视图控制器：\n\n```\nmapView.delegate = self\n```\n\n\
  接下来，创建一个`ViewController`类的扩展，实现`GMSMapViewDelegate`协议：\n\n```\nextension ViewController:\
  \ GMSMapViewDelegate {\n}\n```\n\n要在用户点击信息窗口时执行操作，请实现协议中的`mapView(_ didTapInfoWindowOf\
  \ marker:)`方法：\n\n```\nfunc mapView(_ mapView: GMSMapView,\ndidTapInfoWindowOf marker:\
  \ GMSMarker) {\nprint(\"信息：\\(marker.title ?? \"无标题\")\")\n}\n```\n\n你可以访问地图视图以及与该信息窗口关联的标记。如果你需要在用户点击标记时执行操作，请实现`mapView(_didTap\
  \ marker:)`方法。如果地图视图不需要处理点击的默认行为（显示信息窗口），则返回`true`；如果地图视图应继续执行默认行为，则返回`false`。以下代码片段返回`false`，因此地图视图将运行此代码，然后显示信息窗口：\n\
  \n```\nfunc mapView(_ mapView: GMSMapView,\ndidTap marker: GMSMarker) -> Bool {\n\
  print(\"标记：\\(marker.title ?? \"无标题\")\")\nreturn false\n}\n```\n\n### 用户数据和标记\n\
  \n前面的示例只是打印出标记的标题（如果有）。通常，你会希望呈现一个新的视图控制器，其中包含所选标记所代表地点的详细信息。这需要某种方式将选中的标记对象与标识符或数据对象关联起来。`GMSMarker`类有一个可选的`userData`属性，可用于存储任何内容——字符串、数字，或者你自己的对象。iOS\
  \ 版谷歌地图 SDK 会直接忽略它——你的代码负责对它进行处理。这使得传入自定义数据变得非常容易——例如，如果你的地图标记显示`City`对象，只需将用户数据属性设置为`City`类的对应实例即可。你也可以传入一个标识符，比如整数或\
  \ UUID，然后让详情视图控制器从数据存储中进行查找。\n\n我们可以通过在`addMarker()`方法中为标记添加用户数据来尝试这一点：\n\n```\n\
  marker.userData = 1234\n```\n\n然后，如果我们修改扩展中的`mapView(_didTap marker:)`方法，就可以看到打印出的用户数据：\n\
  \n```\nfunc mapView(_ mapView: GMSMapView,\ndidTap marker: GMSMarker) -> Bool {\n\
  print(\"标记：\\(marker.title ?? \"无标题\")\")\nprint(marker.userData ?? \"无用户数据\")\n\
  return false\n}\n```\n\n同样，你可能会用它来呈现一个新的视图控制器，以显示关于该标记的更多详细信息，但这说明了如何从标记中检索这些用户数据。\n\
  \n## 在地图上添加形状\n\n你可能想要在地图上添加线条、多边形或圆形。例如，如果你有从一个地方到另一个地方的驾驶路线，你可能希望在地图上显示整个路径。你可能还想使用地图上的圆形进行数据可视化，例如，说明地震震级的强度或城镇中居住的人口数量。\n\
  \n\n\n### 圆形\n\n一般来说，所有这些覆盖物的工作原理都类似，所以让我们从最简单的例子——圆形开始。`GMSCircle` 类与 `GMSMarker`\
  \ 类相似，你需要用纬度和经度设置其位置，然后将一个地图作为属性赋值给它。它与标记的不同之处在于，你必须设置圆形在地图上覆盖的半径。此半径以米为单位，并对应实际地理位置。标记通常以相同的固定尺寸显示，无论你在地图上的缩放级别如何。除了设置半径，你还可以设置圆形的内部填充颜色、描边轮廓的颜色以及轮廓的宽度。\n\
  \n以下代码在德克萨斯州的奥斯汀市上空创建了一个浅灰色、半透明的圆形，半径为 20 公里，并带有深灰色轮廓：\n\n```\nfunc addCircle()\
  \ {\n    let circle = GMSCircle()\n    circle.fillColor = UIColor(white: 0.6, alpha:\
  \ 0.7)\n    circle.strokeColor = .darkGray\n    circle.radius = 20 * 1000\n    circle.position\
  \ = CLLocationCoordinate2D(\n        latitude: 30.25, longitude: -97.75)\n    circle.map\
  \ = mapView\n}\n```\n\n从 `viewDidLoad()` 方法中调用 `addCircle()`，运行你的应用，你会在 Xcode 模拟器中看到与图\
  \ 8-2 类似的内容。\n\n![../images/485790_1_En_8_Chapter/485790_1_En_8_Fig2_HTML.jpg](img/485790_1_En_8_Fig2_HTML.jpg)\n\
  \n图 8-2\n\n在地图上显示圆形\n\n现在我们显示了圆形，接下来继续介绍下一种覆盖物：折线。\n\n### 折线与路径\n\n如果你要在应用中显示一条路线或路径，可以使用折线来显示由一条或多条不同线段组成的线条。在\
  \ iOS 版 Google Maps SDK 中，其工作原理是：你将路径构建为一个 `GMSMutablePath` 对象，其中包含两个或更多的位置坐标，按它们将被连接起来的顺序排列。然后你使用该路径构建一个\
  \ `GMSPolyline` 对象。路径代表数据（经纬度以及顺序），而折线则为地图提供渲染选项——线条颜色和宽度。Google 地图的折线没有填充颜色，只有描边颜色和描边宽度。\n\
  \n首先，创建一个路径：\n\n```\nlet path = GMSMutablePath()\n```\n\n你可以向路径中添加 `CoreLocation`\
  \ 坐标或经纬度对。在本例中，我们使用经纬度对向路径中添加德克萨斯州的几个城市。此路径将有两个线段：\n\n```\npath.addLatitude(30.25,\
  \ longitude: -97.75)\npath.addLatitude(29.4, longitude: -98.5)\npath.addLatitude(29.76,\
  \ longitude: -95.37)\n```\n\n现在我们有了一个包含两个或更多坐标的路径，我们可以用它来构建一条折线：\n\n```\nlet polyline\
  \ = GMSPolyline(path: path)\n```\n\n你可以通过定义新的描边颜色和描边宽度来设置折线的显示选项：\n\n```\npolyline.strokeColor\
  \ = .red\npolyline.strokeWidth = 3\n```\n\n最后，你需要记得告知折线要在哪个地图上显示：\n\n```\npolyline.map\
  \ = mapView\n```\n\n以下是所有这些语句组合成一个函数的形式：\n\n```\nfunc addPolyline() {\n    let path\
  \ = GMSMutablePath()\n    path.addLatitude(30.25, longitude: -97.75)\n    path.addLatitude(29.4,\
  \ longitude: -98.5)\n    path.addLatitude(29.76, longitude: -95.37)\n    let polyline\
  \ = GMSPolyline(path: path)\n    polyline.strokeColor = .red\n    polyline.strokeWidth\
  \ = 3\n    polyline.map = mapView\n}\n```\n\n如果你从应用中调用该函数，它看起来会类似于图 8-3。\n\n![../images/485790_1_En_8_Chapter/485790_1_En_8_Fig3_HTML.jpg](img/485790_1_En_8_Fig3_HTML.jpg)\n\
  \n图 8-3\n\n根据经纬度对路径显示折线\n\n通常，你可能会在循环中构建路径，从数据库、API 调用的 JSON 响应或其他某种数据结构中读取数据。如果你在使用\
  \ Google Directions API，你可以从有效路线返回的编码路径中创建路径。我们将在下一章中构建一个使用 Google Directions API\
  \ 和 Google 地图的驾车导航应用。\n\n### 多边形\n\n多边形与折线类似，都是用坐标路径构建的。不同之处在于，多边形会在最后一个坐标和第一个坐标之间绘制额外的线条，从而完成形状的轮廓。此外，与圆形类似，你可以在多边形上设置填充颜色。以下是一个使用与之前折线相同坐标绘制的多边形示例：\n\
  \n```\nfunc addPolygon() {\n    let path = GMSMutablePath()\n    path.addLatitude(30.25,\
  \ longitude: -97.75)\n    path.addLatitude(29.4, longitude: -98.5)\n    path.addLatitude(29.76,\
  \ longitude: -95.37)\n    let polygon = GMSPolygon(path: path)\n    polygon.strokeColor\
  \ = .black\n    polygon.strokeWidth = 2\n    polygon.fillColor = UIColor(\n    \
  \    red: 1, green: 0, blue: 0, alpha: 0.3)\n    polygon.map = mapView\n}\n```\n\
  \n上述代码与折线代码的唯一区别在于使用了 `GMSPolygon` 类而不是 `GMSPolyline` 类，并且能够指定填充颜色。\n\n在 `viewDidLoad()`\
  \ 方法的末尾调用 `addPolygon()` 方法，你应该会看到一个三角形出现，就像图 8-4 中所示的那样。\n\n![../images/485790_1_En_8_Chapter/485790_1_En_8_Fig4_HTML.jpg](img/485790_1_En_8_Fig4_HTML.jpg)\n\
  \n图 8-4\n\n在地图上显示多边形\n\n现在你已经了解了如何在地图上绘制形状，是时候讨论如何在不再需要它们时将其移除。\n\n### 移除标记和形状\n\
  \n每个标记或形状都有一个 `map` 属性，指向它们所显示的地图视图。如果你想从地图上清除一个标记或形状，只需将 `map` 属性设置为 `nil`：\n\n\
  ```\nmapMarker.map = nil\n```\n\n这对于移除单个标记或形状，或不同组别的标记或形状非常有用。如果你正在处理搜索结果并将其显示在地图上，你可能希望在显示新结果之前清除地图上所有之前的结果。要清除地图上所有的标记和形状，只显示地图瓦片，请在地图视图上使用\
  \ `clear()` 方法：\n\n```\nmapView.clear()\n```\n\n然后你就可以创建任何你需要的新标记或形状了。\n\n## 总结\n\
  \n在本章中，我们讨论了如何使用地图视图的 `mapType` 属性来更改地图视图中使用的地图瓦片。我们还向地图添加了标记，并学习了如何更改标记图标。我们还学习了如何处理用户轻点标记或信息窗口时的事件，以及如何在我们可以使用的标记上传递自定义数据。最后，我们研究了如何添加圆形、折线和多边形，以及如何移除标记和形状。\n\
  \n在下一章中，我们将基于对折线和路径的讨论，在地图视图上使用 Google Directions API 提供驾车导航指引。\n\n\n好的，作为一名高级文档工程师和翻译员，我已仔细阅读了注意事项和示例。这是遵循您指定格式的英文文本的中文翻译：\n\
  \n\n"
- "# 9. 将 Google Directions API 与导航功能结合使用\n\nGoogle Directions API 是一个简单的 HTTPS API，可用于获取前往目的地的驾驶路线。Google\
  \ Directions API 本身并未提供原生的 Swift 实现方式，您需要向 Google 发起 HTTPS API 调用，并解析响应中的 JSON 结果。成功响应的一部分是一条路径，该路径可以转换为折线并显示在地图上。\n\
  \n本章将基于第 7 章和第 8 章已完成的工作展开。在第 7 章中，我们使用 CocoaPods 和 Google Maps API 搭建了一个基础的 iOS\
  \ 应用程序项目。在第 8 章中，我们讨论了如何在地图上显示形状和标记。本章我们将复用第 7 章和第 8 章中的同一个项目，或者你也可以创建一个新项目，该项目需要使用\
  \ Google Maps iOS SDK，并在故事板上有一个地图视图。\n\n为了启用 Google Directions API 并创建一个新的 API 密钥以用于\
  \ HTTP API，我们需要做一些额外的工作。\n\n## 设置 Google Directions API\n\n在第 7 章中，我们创建了一个 API 密钥并启用了\
  \ Google Maps API。由于我们当时只选择启用了地图，因此需要将 Google Directions API 添加到我们的 Google Cloud\
  \ 项目中。登录您的账户，地址为 [`https://cloud.google.com/maps-platform`](https://cloud.google.com/maps-platform)。\n\
  \n从侧边栏的菜单中选择“API”（图 9-1）。\n\n![../images/485790_1_En_9_Chapter/485790_1_En_9_Fig1_HTML.jpg](img/485790_1_En_9_Fig1_HTML.jpg)\n\
  \n图 9-1\n\n已启用的 API 以及 Google 地图的附加 API\n\n您会在这里看到您为 Google 地图添加的 API，以及一个可以在项目中使用的附加\
  \ API 列表。在“附加 API”下，您会找到 Google Directions API（图 9-2）。\n\n![../images/485790_1_En_9_Chapter/485790_1_En_9_Fig2_HTML.jpg](img/485790_1_En_9_Fig2_HTML.jpg)\n\
  \n图 9-2\n\n启用 Google Directions API\n\n在此处启用 Directions API。\n\n**注意**\n如果您忘记启用\
  \ Google Directions API，当您发出 HTTP 请求时，将会收到类似以下的错误消息：“此 API 项目未获授权使用此 API。”\n\n启用\
  \ Directions API 后，您需要创建一个新的 API 密钥。访问 Google Cloud Platform 的 API 和服务凭据页面，地址为 [`https://console.cloud.google.com/apis/credentials`](https://console.cloud.google.com/apis/credentials)。您应该会看到您的\
  \ iOS 地图密钥，如图 9-3 所示。\n\n![../images/485790_1_En_9_Chapter/485790_1_En_9_Fig3_HTML.jpg](img/485790_1_En_9_Fig3_HTML.jpg)\n\
  \n图 9-3\n\n用于创建 API 密钥的凭据页面\n\n创建一个新的凭据，当下拉菜单出现时，选择“API 密钥”。系统会生成一个新的 API 密钥，但它将是未加限制的——下一步是限制此\
  \ API 密钥。\n\n## 限制 API 密钥\n\n在出现的对话框中选择“限制密钥”按钮（图 9-4）。\n\n![../images/485790_1_En_9_Chapter/485790_1_En_9_Fig4_HTML.jpg](img/485790_1_En_9_Fig4_HTML.jpg)\n\
  \n图 9-4\n\nAPI 密钥创建对话框，显示“限制密钥”按钮\n\n尽管您可能想要将 Google Directions API 密钥限制为仅限 iOS\
  \ 应用使用，但这对于向 Google Directions API 发起 HTTPS 调用是无效的。如果您打算将 API 密钥直接嵌入到 iOS 应用中，则需要在应用限制中选择“无”。\n\
  \n最佳实践是像我们在示例项目中所做的那样，**不**将 API 密钥嵌入到应用中——这种方法适用于原型设计和开发，但这意味着如果有人能搜索您应用中的静态字符串，他们就有可能提取出该字符串。\n\
  \n如果您将此项目作为开源项目上传到公共 Git 仓库，也需要格外小心。一旦 API 密钥被发布，即使您之后又提交了一个将其移除的 commit，也很容易被人获取到。\n\
  \n另一种方法是，构建一个 Web 服务来代理您的应用向 Google 发出的请求。您的 Web 服务可以是唯一知晓您 API 密钥的代码，它可以部署在应用服务器上，或者以函数的形式部署在无服务器云环境中。将\
  \ API 密钥放入环境变量或上下文变量中，而不是直接嵌入到代码或配置文件中。\n\n如果您的应用有标准的用户注册和身份验证功能，您可以通过要求提供有效的用户凭据来控制对此\
  \ Web 服务或函数的访问。\n\n这样做还有一个好处：当您需要轮换 Google API 密钥时，不会破坏现有移动应用——您只需为 Web 服务或云函数设置一个新的环境变量，然后重启该服务或函数即可。\n\
  \n对于本项目，我们可以暂时将这些担忧放在一边，以便尝试使用 Google Directions API。只是**不要**将此源代码上传到您的公共 Git 仓库，如果不小心上传了，请从\
  \ Google Cloud Platform 中删除该 API 密钥。\n\n在 API 限制下，将此密钥限制为仅用于 Google Directions API，然后保存更改，如图\
  \ 9-5 所示。\n\n![../images/485790_1_En_9_Chapter/485790_1_En_9_Fig5_HTML.jpg](img/485790_1_En_9_Fig5_HTML.jpg)\n\
  \n图 9-5\n\n限制 API 密钥页面\n\n保存 Google Directions API 密钥后，请记下它。\n\n## 使用 Google Directions\
  \ API\n\n遗憾的是，Google 并没有为 Google Directions API 提供一个用于 iOS 或 Swift 的官方辅助库。我们可以改用标准的\
  \ iOS 网络库来发起 API 调用。Google Directions API 由一个 HTTPS 端点组成，它接收请求参数并返回 JSON 响应（同时也有一个\
  \ XML 端点）。\n\n要在 Swift 中实现此 API，我们可以使用 `URLSession` 类（及其相关类）来发起 HTTPS 调用。我们可以使用\
  \ `JSONSerialization` 类将 JSON 解析为字典和数组，或者为 JSON 响应定义一个实现 `Codable` 协议的数据结构，并使用 `JSONDecoder`\
  \ 类。第二种方法要清晰得多，因为第一种方法需要在 Google Directions API 响应的嵌套结构中大量使用 `if let` 和 `guard let`\
  \ 语句。在本章中，我们将创建一组基础的 Swift 结构来保存 Directions API 的响应。\n\n\n\n### 创建 URL\n\nGoogle\
  \ Directions API 是基于 HTTPS 的 API，你可以轻松地在网页浏览器中测试请求。你需要声明一个常量来保存支持 Google Directions\
  \ API 的 API 密钥。我们在本章的第一部分已经设置了该 API。以下值是一个示例 API 密钥；请用你自己的密钥替换：\n\n```\nlet apiKey\
  \ = \"AIzaZZZZZZZZZZZZZZZZZ\"\n```\n\n你还需要构建 API 调用的 URL。你可以向 Google Directions\
  \ API 发送许多不同的参数。以下三个参数是必需的：\n\n`origin` – 街道地址、坐标集或 Google 地点 ID\n\n`destination`\
  \ – 与 `origin` 相同\n\n`key` – 有效的 API 密钥\n\n你可能包含的其他参数有：\n\n`mode` – 驾车（默认）、步行、骑自行车、公共交通\n\
  \n`waypoints` – 路线的中间目的地（公共交通除外）\n\n`alternatives` – true/false；如果存在多条路线且未指定中间途经点，将返回多条路线\n\
  \n`avoid` – 收费站、高速公路、渡轮、室内；在计算路线时要避开的交通方式\n\n除上述参数外，你还可以考虑 `transit_routing_preference`、`language`、`arrival_time`、`departure_time`、`region`、`units`\
  \ 和 `traffic_model`。请参阅 Google Directions API 文档页面（`https://developers.google.com/maps/documentation/directions/intro`）中每个参数的详细说明。\n\
  \n一个 Google Maps Directions URL 的示例如下所示，其中 API 密钥会被插入到字符串中：\n\n```\nlet directionsUri\
  \ = \"https://maps.googleapis.com/maps/api/directions/json?origin=Austin,TX&destination=Houston,TX&key=\\\
  (apiKey)\"\n```\n\n你当然可以使用自己的位置或有趣的地点作为起点或终点。\n\n### 使用 URLSession 调用 Directions\
  \ API\n\n我们需要自己调用 Google Directions API。使用标准的 `URLSession` 及其相关类，我们将创建一个数据任务，然后调用另一个方法将响应处理为\
  \ `Data` 对象。\n\n以下 `retrieveDirections()` 方法仅处理网络方面，不处理数据处理。将清单 9-1 中的方法添加到你的 `ViewController`\
  \ 类中。如果你想通过文本字段向用户询问起点和终点，或者可能使用用户的当前位置作为纬度/经度对，你也可以扩展此方法以接受起点和终点的参数。\n\n```\nfunc\
  \ retrieveDirections() {\n    let directionsUri = \"https://maps.googleapis.com/maps/api/directions/json?origin=Austin,TX&destination=Houston,TX&key=\\\
  (apiKey)\"\n    let session = URLSession(configuration: .default)\n    guard let\
  \ url = URL(string: directionsUri) else {\n        print(\"Could not parse directions\
  \ URI into URL\")\n        return\n    }\n    let task = session.dataTask(with:\
  \ url) { (data, response, error) in\n        guard let data = data else {\n    \
  \        print(\"Error returning data from url\")\n            print(error?.localizedDescription\
  \ ?? \"No error defined\")\n            return\n        }\n        self.processDirections(data)\n\
  \    }\n    task.resume()\n}\n```\n\n**清单 9-1** 向 Google Directions API 发起 HTTPS\
  \ 调用\n\n下一步是处理我们从 HTTPS 调用中获得的 `Data` 对象，并将其转换为可用的数据结构。\n\n### 处理导航响应\n\n我们向 Google\
  \ Directions API 发出的请求要求返回 JSON 响应。我们也可以请求 XML，但 XML 更难解析。对于 JSON，我们需要使用 `JSONDecoder`\
  \ 来解码 `Data` 对象。我们将基于 Google Directions API 的 JSON 响应定义一组数据结构。\n\nGoogle Directions\
  \ API 的完整 JSON 响应太长，无法在本书中列出，但你可以在网页浏览器中发起 HTTPS 请求来查看完整响应。清单 9-2 中给出了 JSON 响应的编辑版本，用\
  \ `...` 标记了删除的部分。最值得注意的是，地理编码的途径点已被修剪，折线的编码路径已被修剪，路线中的步骤数已缩减为一个。\n\n```\n{\n   \
  \ \"geocoded_waypoints\": [\n        ...\n    ],\n    \"routes\": [\n        {\n\
  \            \"bounds\": {\n                \"northeast\": {\n                 \
  \   \"lat\": 30.2671031,\n                    \"lng\": -95.3657891\n           \
  \     },\n                \"southwest\": {\n                    \"lat\": 29.69176959999999,\n\
  \                    \"lng\": -97.7506595\n                }\n            },\n \
  \           \"copyrights\": \"Map data ©2020 Google, INEGI\",\n            \"legs\"\
  : [\n                {\n                    \"distance\": {\n                  \
  \      \"text\": \"165 mi\",\n                        \"value\": 265936\n      \
  \              },\n                    \"duration\": {\n                       \
  \ \"text\": \"2 hours 33 mins\",\n                        \"value\": 9172\n    \
  \                },\n                    \"end_address\": \"Houston, TX, USA\",\n\
  \                    \"end_location\": {\n                        \"lat\": 29.76043,\n\
  \                        \"lng\": -95.3698084\n                    },\n        \
  \            \"start_address\": \"Austin, TX, USA\",\n                    \"start_location\"\
  : {\n                        \"lat\": 30.2671031,\n                        \"lng\"\
  : -97.74307949999999\n                    },\n                    \"steps\": [\n\
  \                        {\n                            \"distance\": {\n      \
  \                          \"text\": \"0.5 mi\",\n                             \
  \   \"value\": 776\n                            },\n                           \
  \ \"duration\": {\n                                \"text\": \"3 mins\",\n     \
  \                           \"value\": 167\n                            },\n   \
  \                         \"end_location\": {\n                                \"\
  lat\": 30.2649534,\n                                \"lng\": -97.73539049999999\n\
  \                            },\n                            \"html_instructions\"\
  : \"向东行驶...\",\n                            \"polyline\": {\n                  \
  \              \"points\": ...\n                            },\n               \
  \             \"start_location\": {\n                                \"lat\": 30.2671031,\n\
  \                                \"lng\": -97.74307949999999\n                 \
  \           },\n                            \"travel_mode\": \"DRIVING\"\n     \
  \                   },\n                        ...\n                    ],\n  \
  \                  \"traffic_speed_entry\": [ ],\n                    \"via_waypoint\"\
  : [ ]\n                }\n            ],\n            \"overview_polyline\": {\n\
  \                \"points\": ...\n            },\n            \"summary\": \"TX-71\
  \ E and I-10 E\",\n            \"warnings\": [ ],\n            \"waypoint_order\"\
  : [ ]\n        }\n    ],\n    \"status\": \"OK\"\n}\n```\n\n**清单 9-2** 来自 Google\
  \ Directions API 的修剪后的 JSON 响应\n\n检查此 JSON 响应，我们可以确定哪些字段对我们的应用程序有用，哪些可以忽略。例如，我们可能正在构建一个徒步应用程序，因此可以忽略交通字段。我们还将从折线路径创建边界框，因此不需要单独解析它。\n\
  \n让我们从响应的一些基本数据结构开始，如清单 9-3 所示，以便我们可以在地图上显示路线的概览。我们只获取路线和概览折线中的点。在 `ViewController.swift`\
  \ 文件中定义这些结构，以便于引用。\n\n我们在这里使用 `Codable` 以便于在 JSON 和数据结构之间进行序列化。否则，我们必须将嵌套的响应解析为一系列字典和数组，这样生成的\
  \ Swift 代码将不太容易维护。\n\n```\nstruct GoogleDirectionsResponse: Codable {\n    var routes:\
  \ [Route]?\n}\n\nstruct Route: Codable {\n    var overview_polyline: OverviewPolyline?\n\
  }\n\nstruct OverviewPolyline: Codable {\n    var points: String?\n}\n```\n\n**清单\
  \ 9-3** Google Directions API 响应的数据结构\n\n定义好数据结构后，我们可以解码来自 HTTPS 响应的 `Data` 对象（清单\
  \ 9-4）。在此过程中，我们确实需要使用 `do-try-catch` 语句，以便处理任何 JSON 解码错误或我们定义的数据结构与响应之间的不匹配（例如缺少必需的属性）。\n\
  \n最后，解析出响应后，我们检查响应中是否有任何概要点，如果有，则将其传递给另一个方法进行显示。该方法将在主线程上执行，因为它会更改用户界面。\n\n```\n\
  func processDirections(_ data: Data) {\n    let decoder = JSONDecoder()\n    do\
  \ {\n        let response = try decoder.decode(GoogleDirectionsResponse.self, from:\
  \ data)\n        print(response)\n        guard let points = response.routes?.first?.overview_polyline?.points\
  \ else {\n            return\n        }\n        // 在地图上显示折线必须在主线程上进行\n        DispatchQueue.main.async\
  \ {\n            self.displayOverviewPolyline(points)\n        }\n    } catch let\
  \ error as NSError {\n        print(\"JSON Error: \\(error)\")\n    }\n}\n```\n\n\
  **清单 9-4** 将 JSON 响应解码为数据结构\n\n将清单 9-4 中的方法添加到你的 `ViewController` 类中。我们仍然需要编写 `displayOverviewPolyline()`\
  \ 方法来向用户显示路线的走向。\n\n\n\n### 将路线显示为折线\n\nGoogle Directions API 的响应中包含路线上的点，这些点以编码字符串形式提供，可转换为`GMSPath`对象。此路径对象代表路线上的所有点，包括所有路段的起点和终点。你可以使用路径创建折线，然后为该折线配置合适的描边颜色和宽度。\n\
  \n你还需要将折线的`map`属性设置为谷歌地图视图。我们还在函数末尾将折线作为视图控制器的成员变量进行存储（见代码清单 9-5）。\n\n将折线添加为`ViewController`类的成员变量：\n\
  \n```\nvar routePolyline: GMSPolyline?\n```\n\n有关折线和路径的更多信息，请参见第 8 章。\n\n```\nfunc\
  \ displayOverviewPolyline(_ points:String) {\nguard let routePath = GMSPath(\nfromEncodedPath:\
  \ points) else {\nreturn\n}\nlet polyline = GMSPolyline(path: routePath)\npolyline.strokeColor\
  \ = .red\npolyline.strokeWidth = 3\npolyline.map = mapView\nself.routePolyline =\
  \ polyline\nupdateMapBounds(routePath)\n}\n代码清单 9-5\n在谷歌地图上将 Google Directions API\
  \ 响应显示为折线\n```\n\n需要提醒的是，与任何其他用户界面修改一样，此方法必须在主线程上调用。\n\n在该方法末尾，我们调用了一个方法，该方法根据路线经过的路径更新地图的边界框。\n\
  \n### 更新地图边界框\n\n`GMSCoordinateBounds`类用于创建边界框，然后你可以将其与相机更新配合使用，在地图视图中显示世界的矩形区域。你可以使用`GMSPath`对象（例如路线概览中使用的点列表）来创建这样的边界。该边界不会有额外的内边距，但相机更新允许你以`UIEdgeInsets`结构的形式指定内边距。\n\
  \n将其与地图视图上的`moveCamera()`方法调用相结合，我们得到以下函数（代码清单 9-6），你可以将其添加到`ViewController`类中。\n\
  \n```\nfunc updateMapBounds(_ routePath: GMSPath) {\nlet bounds = GMSCoordinateBounds(path:\
  \ routePath)\nlet insets = UIEdgeInsets(top: 100, left: 100, bottom: 100, right:\
  \ 100)\nlet cameraUpdate = GMSCameraUpdate.fit(bounds, with: insets)\nmapView.moveCamera(cameraUpdate)\n\
  }\n代码清单 9-6\n在地图视图中显示完整路线\n```\n\n你可以根据需要调整这些边缘内边距，为路线留出足够的填充空间。让路线拉伸到整个屏幕可能会显得很奇怪。\n\
  \n现在所有函数都已就绪，尝试在模拟器中运行你的应用。你应该会看到谷歌地图上为你的路线显示一条红线，如下图所示。如果遇到问题，请仔细检查驾驶路线的 API 密钥（你可以随时在网页浏览器中测试该\
  \ URL）。\n\n![../images/485790_1_En_9_Chapter/485790_1_En_9_Fig6_HTML.jpg](img/485790_1_En_9_Fig6_HTML.jpg)\n\
  \n**图 9-6** — 在谷歌地图上显示谷歌方向\n\n至此，我们完成了本项目中对 Google Directions API 的使用。构建应用的下一步可能是添加逐向导航，将路线分解为不同的路段和步骤。\n\
  \n### 后续步骤：显示每个路段和每个步骤\n\n为了扩展此项目，我们需要在项目中添加额外的数据结构来解码路线的每个路段，以及每个路段的每个步骤。你还可以添加上一步和下一步按钮，用于在步骤列表中上下移动，显示\
  \ HTML 指令并在地图上展示步骤折线。\n\n最后，完成本项目后，请返回 Google Cloud Platform 控制台（[`https://console.cloud.google.com/`](https://console.cloud.google.com/)）并删除你的\
  \ Google Directions API 密钥。清理项目凭据总是一个好习惯！\n\n在第 10 章中，我们将使用 Google Places SDK for\
  \ iOS 搜索兴趣点并将其显示在谷歌地图上。你可以将本章的工作与第 10 章的搜索功能结合起来，自行构建一些有趣的应用！\n\n"
- "# 10. 在 iOS 应用中使用 Google Places\n\nGoogle Places 通过 Google Places SDK 为 iOS 应用提供了丰富的位置和照片数据库。借助该\
  \ SDK，你的移动应用可以增强其定位能力，提供更多细节和照片，甚至提供带有自动补全功能的地点搜索。\n\n我们将基于第 7 章关于 CocoaPods 和在移动应用中使用\
  \ Google API 的讨论进行扩展。特别是，获取 Google Places API 密钥与获取 Google Directions API 或 Google\
  \ Maps API 的密钥类似。\n\nGoogle Places 采用按使用量付费的计费模式，并配有计费额度，应能覆盖开发和测试中的使用量。请查阅 Google\
  \ Maps Platform 计费网站（[`https://developers.google.com/maps/billing/gmp-billing`](https://developers.google.com/maps/billing/gmp-billing)）获取最新信息。此外，你还可以在那里找到关于使用成本以及更改地点请求中的字段如何影响定价的更多详细信息。\n\
  \n## 构建带地图的地点查找器\n\n本章的项目将基于谷歌地图视图中当前可见的区域，为 Google Places 数据库中的商家创建一个搜索界面。我们首先介绍\
  \ Google Places 自动补全视图控制器，然后在章末添加谷歌地图标记。\n\n本项目演示了如何在 Google Places 中通过名称（使用自动补全功能）搜索地点，以及如何将\
  \ Google Places SDK for iOS 集成到你的项目中。我们将使用 Google Places 的全屏自动补全搜索视图控制器，这使得添加此功能变得相当简单。\n\
  \n## 创建项目\n\n在 Xcode 中创建一个新的单视图应用（Single View Application），使用 Swift 语言。选择故事板作为用户界面框架。将应用命名为`PlacesApp`。本章的示例项目使用`com.buildingmobileapps`作为组织标识符，使应用的包标识符为`com.buildingmobileapps.PlacesApp`。在本章下一节创建\
  \ API 密钥并限制其使用时，我们将使用此包标识符。\n\n\n\n### 获取 Google Places API 密钥\n\n与前几章中获取 Google\
  \ Directions API 密钥（或第 7 章中获取 Google Maps API 密钥）类似，你需要获取一个 Google Places API 密钥。你需要访问\
  \ [Google Cloud Console](https://console.cloud.google.com)，该控制台位于此 URL：[`https://console.cloud.google.com`](https://console.cloud.google.com)，然后在你的项目中启用\
  \ Google Places API。\n\n你还需要创建一个新的 API 密钥。首先，进入“凭据”界面，该界面位于 Google Cloud Platform\
  \ 菜单的 “API 和服务” 部分下（图 10-1）。\n\n![../images/485790_1_En_10_Chapter/485790_1_En_10_Fig1_HTML.jpg](img/485790_1_En_10_Fig1_HTML.jpg)\n\
  \n图 10-1：API 和服务菜单中的凭据位置\n\n点击 **创建凭据** 按钮，然后选择 **API 密钥**（图 10-2）。\n\n![../images/485790_1_En_10_Chapter/485790_1_En_10_Fig2_HTML.jpg](img/485790_1_En_10_Fig2_HTML.jpg)\n\
  \n图 10-2：创建 API 密钥\n\n当显示包含你的 API 密钥的对话框时，请将密钥复制到剪贴板，或者稍后从控制台中获取。点击对话框上的 **限制密钥**\
  \ 按钮，这将打开一个页面，允许你设置此 API 密钥适用于哪些 API 和应用程序。\n\n第一步是给你的 API 密钥起一个容易记住的名称，例如 `Places\
  \ App Key`，如图 10-3 所示。接下来，将此密钥的使用限制为 iOS 应用。\n\n![../images/485790_1_En_10_Chapter/485790_1_En_10_Fig3_HTML.jpg](img/485790_1_En_10_Fig3_HTML.jpg)\n\
  \n图 10-3：命名 API 密钥并将其限制为 iOS 应用\n\n选择 iOS 应用后，你将看到一个用于输入应用包标识符的输入框。输入你应用的包标识符，然后点击文本框下方的\
  \ **完成** 按钮（图 10-4）。\n\n![../images/485790_1_En_10_Chapter/485790_1_En_10_Fig4_HTML.jpg](img/485790_1_En_10_Fig4_HTML.jpg)\n\
  \n图 10-4：将 API 密钥使用限制为单个包标识符\n\n最后，你需要限制该密钥可用于哪些 API。对于本章的项目，我们将使用 Places API 和\
  \ iOS 版 Maps SDK。选择 **限制密钥**，然后从下拉菜单中选择这两个 API。如果你未看到这些 API，则需要在主仪表盘屏幕上为你的项目启用它们（图\
  \ 10-5）。\n\n![../images/485790_1_En_10_Chapter/485790_1_En_10_Fig5_HTML.jpg](img/485790_1_En_10_Fig5_HTML.jpg)\n\
  \n图 10-5：将 API 密钥使用限制为两个 API\n\n保存这些更改，控制台将返回“API 密钥”界面。我们稍后将在应用中使用此 API 密钥，因此请保持页面打开。不过，与某些仅一次性提供密钥的供应商不同，你随时可以返回控制台检索你的\
  \ API 密钥。\n\n我们的下一步是使用 CocoaPods 在应用项目中包含 Google Places SDK 和 Google Maps SDK。\n\
  \n### 设置 CocoaPods\n\n如果你是 CocoaPods 新手，请参阅第 7 章中关于如何在 Mac 上安装它的讨论。我们将按照类似的过程来设置我们的应用项目。第一步是打开\
  \ Mac 上的“终端”应用程序，并将目录更改为包含我们项目的目录。然后，使用以下命令为你的项目创建一个 `Podfile`：\n\n```\npod init\n\
  ```\n\n该命令会创建一个 `Podfile` 文件。我们将添加两个依赖项，一个用于 iOS 版 Google Places SDK，另一个用于 iOS 版\
  \ Google Maps SDK。在编辑器中打开 `Podfile`，并添加这些依赖项，使其类似于代码清单 10-1。\n\n```\ntarget 'PlacesApp'\
  \ do\n# 如果您不想使用动态框架，请注释下一行\nuse_frameworks!\n# PlacesApp 的 Pod\npod 'GooglePlaces',\
  \ '3.8.0'\npod 'GoogleMaps', '3.8.0'\nend\n```\n\n代码清单 10-1：Google Places 和 Google\
  \ Maps SDK 的 Podfile\n\n编辑完 `Podfile` 后，运行以下命令来安装依赖项，然后创建一个 Xcode 工作区：\n\n```\n\
  pod install\n```\n\n现在，只能使用 `PlacesApp.xcworkspace` 文件在 Xcode 中打开项目，而不是使用 `PlacesApp.xcodeproj`\
  \ 文件，否则 CocoaPods 依赖项将不会包含在构建中。\n\n在 Xcode 中打开 `PlacesApp.xcworkspace` 文件，然后我们就可以开始构建应用了！\n\
  \n### 为 Google Places 和 Google Maps 提供 API 密钥\n\n构建项目的下一步是为 iOS 版 Google Places\
  \ SDK 以及 iOS 版 Google Maps SDK 指定 API 密钥。我们可以对两者使用相同的 API 密钥，因为我们在本章第一部分已为这两个 API\
  \ 启用了支持。对于 Google Places，`GMSPlacesClient` 类有一个名为 `provideAPIKey()` 的静态方法，你需要在调用\
  \ Google Places SDK 中的任何其他内容之前使用它。类似地，对于 Google Maps，我们将调用 `GMSServices` 类的 `provideAPIKey()`\
  \ 方法。在 `AppDelegate` 类中添加 `GooglePlaces` 和 `GoogleMaps` 框架的导入语句。我们将在应用委托的 `application(_:didFinishLaunchingWithOptions:)`\
  \ 方法中为这两个 Google SDK 提供 API 密钥。\n\n代码清单 10-2 是 `AppDelegate` 类的节选，省略了一些我们未修改的样板方法。将\
  \ `apiKey` 常量的值替换为你本章前面创建的 API 密钥。\n\n```\nimport UIKit\nimport GooglePlaces\nimport\
  \ GoogleMaps\n@UIApplicationMain\nclass AppDelegate: UIResponder, UIApplicationDelegate\
  \ {\nfunc application(_ application: UIApplication, didFinishLaunchingWithOptions\
  \ launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {\nlet apiKey =\
  \ \"AIza...\"\nGMSPlacesClient.provideAPIKey(apiKey)\nGMSServices.provideAPIKey(apiKey)\n\
  return true\n}\n}\n```\n\n代码清单 10-2：`AppDelegate` 类节选\n\n现在你已经设置好了 Google Places\
  \ 和 Maps SDK，让我们使用它们为项目添加一些功能吧！\n\n\n\n### 创建用户界面\n\n你的视图控制器需要两个用户界面元素——一个 Google\
  \ 地图视图和一个用于在地图区域内查找商家的按钮。使用故事板（图 10-6），你可以将 `UIView` 和 `UIButton` 拖拽到 `ViewController`\
  \ 类的主视图上。将 `UIView` 的类标识改为 `GMSMapView`，使其成为 Google 地图视图。为地图视图添加约束，使其填满视图中的所有可用空间，然后为按钮添加约束，将其固定在屏幕底部。将按钮文字改为“查找商家”，并选择你喜欢的任何颜色或字体，使其在地图上突出显示。\n\
  \n![../images/485790_1_En_10_Chapter/485790_1_En_10_Fig6_HTML.jpg](img/485790_1_En_10_Fig6_HTML.jpg)\n\
  \n**图 10-6**\n\n展示地图视图和按钮的故事板\n\n需要注意一点：按钮不能是地图视图的子视图；它必须是 `ViewController` 屏幕主\
  \ `UIView` 的子视图。\n\n运行项目后，如果一切设置正确，你的项目将类似于图 10-7。\n\n![../images/485790_1_En_10_Chapter/485790_1_En_10_Fig7_HTML.jpg](img/485790_1_En_10_Fig7_HTML.jpg)\n\
  \n**图 10-7**\n\n应用程序的用户界面\n\n你也可以通过编程方式创建地图视图和按钮。\n\n使用 Xcode 的助手视图，为 Google 地图视图创建一个名为\
  \ `mapView` 的 outlet：\n\n```\n@IBOutlet weak var mapView: GMSMapView!\n```\n\n接下来，为按钮创建一个名为\
  \ `findBusinesses` 的操作。你的 `ViewController` 类中应该有类似这样的操作：\n\n```\n@IBAction func\
  \ findBusinesses(_ sender: Any) {\n}\n```\n\n至此，我们对故事板的操作就结束了。项目的下一步是当用户点击按钮时，显示\
  \ Google Places 自动完成视图控制器。\n\n## 了解自动完成搜索\n\n当你向项目中添加某种地点搜索功能时，你会希望包含自动完成功能——强制用户输入与数据库中完全相同的名称很难成功。适用于\
  \ iOS 的 Places SDK 包含了自动完成的用户界面元素，以及通过编程方式进行自动完成查询的方法，这样你就可以实现自己的用户界面。\n\nPlaces\
  \ SDK 包含两个现代用户界面元素。第一个是独立的全屏视图控制器，负责处理文本搜索和显示结果。另一个用户界面元素是与你实现的搜索栏配合使用的搜索结果视图控制器。在本章中，我们将使用独立的视图控制器，但两种不同用户界面的搜索概念是相似的。\n\
  \n配置和显示自动完成全屏视图控制器的基本步骤如下：\n\n-   创建 `GMSAutocompleteViewController` 类的实例。\n-  \
  \ 为地点搜索设置地理边界。\n-   确定你需要从查询中获取哪些数据字段。\n-   按地点类型（城市、街道地址、场所）筛选结果。\n-   显示视图控制器。\n\
  -   实现委托，用于处理搜索完成或用户取消时的回调。\n\n当我们逐步构建项目中的地点搜索功能时，让我们更详细地了解每一步。\n\n### 创建自动完成视图控制器\n\
  \n为了启动我们的地点搜索项目，我们需要创建 `GMSAutocompleteViewController` 类的实例。我们还需要为自动完成视图控制器设置一个委托，并且将在本章后面创建一个扩展来处理这些委托方法。现在，直接将自动完成视图控制器的委托设置为\
  \ `self`：\n\n```\nlet vc = GMSAutocompleteViewController()\nvc.delegate = self\n\
  ```\n\n本节及后续章节中的所有代码片段都将放入我们之前创建的 `findBusinesses()` 操作中。该函数的完整版本可在清单 10-3 中找到，该清单位于各个步骤的讨论之后。\n\
  \n### 为搜索设置地理边界\n\n我们可以使用自动完成搜索，告诉 Google Places 要搜索哪个地理区域的地点。你可以将此区域用作偏好设置，这样该地理空间内的结果会在列表顶部得到提升；或者作为限制条件，该地理区域之外的地点（即使很近）也完全不会显示。\n\
  \n在我们的项目中，我们将使用 Google 地图视图中的可见区域作为边界。该区域需要转换为 `GMSCoordinateBounds` 对象，你可以使用 `GMSCoordinateBounds`\
  \ 构造函数来完成：\n\n```\nlet region = mapView.projection.visibleRegion()\nlet bounds =\
  \ GMSCoordinateBounds.init(region: region)\nvc.autocompleteBounds = bounds\n```\n\
  \n我们还将限制结果，只显示在地理边界内找到的地点：\n\n```\nvc.autocompleteBoundsMode = .restrict\n```\n\n\
  你不必如此严格——你可以将结果偏向于地图中找到的地点，但如果用户正在寻找某个特定地点，并且该地点恰好靠近地图但不在其中，它仍然会作为结果显示。这是自动完成搜索的默认行为。如果你想使用此行为，请不要设置\
  \ `autocompleteBoundsMode` 参数，或者将其设置为 `.bias` 值。\n\n你也不必使用任何地理边界，在这种情况下，只需省略设置 `autocompleteBounds`\
  \ 属性即可。你也可以自己构建地理边界，例如，如果你正在为某个特定区域或城市构建地点搜索。\n\n下一步是确定你的视图控制器需要从 Google Places\
  \ API 获取哪些数据字段。\n\n### 请求数据字段子集\n\n默认情况下，Google Places API 会为自动完成返回所有数据字段，包括需要额外付费的高级字段（如评论）。由于你可能不需要所有字段，你可以设置结果中确实需要的特定字段集。\n\
  \n要构建字段列表，你需要使用 OR（`|`）运算符组合一组 `GMSPlaceField` 枚举值。以下是你可以用于应用程序的其中几个字段列表：\n\n- \
  \  `coordinate`\n-   `formattedAddress`\n-   `name`\n-   `openingHours`\n-   `phoneNumber`\n\
  -   `photos`\n-   `placeID`\n-   `rating`\n-   `website`\n\n就我们而言，我们将坚持使用基本的地点详细信息，只请求名称、地点\
  \ ID 和坐标。稍后我们将使用这些信息在地图上创建标记。\n\n我们的代码将枚举值中的原始值组合为无符号整数，然后从中构造一个 `GMSPlaceField`\
  \ 值。如果 `GMSPlaceField` 构造函数未能创建对象，我们也从函数中返回。这个特定的 API 本可以设计得更容易使用一些，例如，接受一组值。我们还需要设置自动完成视图控制器的\
  \ `placeFields` 属性：\n\n```\n// 地图标记所需\nlet fields = UInt(GMSPlaceField.name.rawValue)\
  \ |\nUInt(GMSPlaceField.placeID.rawValue) |\nUInt(GMSPlaceField.coordinate.rawValue)\n\
  guard let placeFields = GMSPlaceField(rawValue: fields) else {\nreturn\n}\nvc.placeFields\
  \ = placeFields\n```\n\n不要与字段混淆，我们现在需要告诉 Google Places 我们想要哪种类型的搜索结果。\n\n\n\n###\
  \ 按类型筛选结果\n\n自动完成视图控制器支持不同类型的地点搜索结果。支持的类型以及\"无筛选\"选项，均可在 `GMSPlacesAutocompleteTypeFilter`\
  \ 枚举中找到。这些选项包括：\n\n- `noFilter`\n- `address`\n- `city`\n- `establishment`\n- `geocode`\n\
  - `region`\n- `city`\n\n若要在自动完成视图控制器中使用这些选项之一，您需要创建一个 `GMSAutocompleteFilter` 实例，然后设置该筛选器的\
  \ `type` 属性。在自动完成视图控制器上，您需要通过筛选器对象设置 `autocompleteFilter` 属性：\n\n```\nlet filter\
  \ = GMSAutocompleteFilter()\nfilter.type = .establishment\nvc.autocompleteFilter\
  \ = filter\n```\n\n我们使用了 `establishment` 类型，但您当然也可以使用其他筛选器。不妨尝试一下，看看在您所在区域它们返回何种类型的结果。\n\
  \n### 显示视图控制器\n\n自动完成视图控制器需全屏显示，因此您可以像图 10-8 所示那样，以模态形式从您的视图控制器中呈现它：\n\n![../images/485790_1_En_10_Chapter/485790_1_En_10_Fig8_HTML.jpg](img/485790_1_En_10_Fig8_HTML.jpg)\n\
  \n*图 10-8：显示 Google 地点的自动完成视图控制器*\n\n```\npresent(vc, animated: true, completion:\
  \ nil)\n```\n\n如果您愿意，可以在一个方法中创建自动完成视图控制器，然后在另一个方法中显示它。在本项目中，为简单起见，我们将这两个步骤合并到了一个方法中。\n\
  \n完整的 `findBusinesses()` 方法，包含上述所有步骤，如代码清单 10-3 所示。\n\n```\n@IBAction func findBusinesses(_\
  \ sender: Any) {\n    let vc = GMSAutocompleteViewController()\n    vc.delegate\
  \ = self\n    // 在此区域搜索地点\n    let region = mapView.projection.visibleRegion()\n\
  \    let bounds = GMSCoordinateBounds.init(region: region)\n    vc.autocompleteBounds\
  \ = bounds\n    // 仅返回地图上可见的结果\n    vc.autocompleteBoundsMode = .restrict\n    //\
  \ 地图标记所需\n    let fields = UInt(GMSPlaceField.name.rawValue) |\n               \
  \  UInt(GMSPlaceField.placeID.rawValue) |\n                 UInt(GMSPlaceField.coordinate.rawValue)\n\
  \    guard let placeFields = GMSPlaceField(rawValue: fields) else {\n        return\n\
  \    }\n    // 仅返回所需的字段\n    vc.placeFields = placeFields\n    // 我们正在查找商家/兴趣点\n\
  \    let filter = GMSAutocompleteFilter()\n    filter.type = .establishment\n  \
  \  vc.autocompleteFilter = filter\n    // 以模态形式显示\n    present(vc, animated: true,\
  \ completion: nil)\n}\n```\n\n*代码清单 10-3：显示用于 Google 地点搜索的自动完成视图控制器*\n\n当用户从列表中选择一个地点或决定取消时，您的视图控制器需要关闭自动完成视图控制器。我们将在下一节关于实现自动完成搜索的委托方法中讨论这一点。\n\
  \n### 为自动完成实现委托\n\n通过 `GMSAutocompleteResultsViewControllerDelegate` 协议，当自动完成视图控制器发生某些事件时，您的应用程序会收到通知。我们将以\
  \ `ViewController` 类的扩展形式，实现该委托中的几个方法。\n\n具体来说，用户选择地点、用户取消搜索请求或发生不可恢复错误时调用的函数是必需的。可选方法则用于通知委托：自动完成请求已发出、自动完成请求已更新、以及用户已从列表中选择了一个值（但尚未调用\
  \ API 获取地点详细信息）。\n\n为您的 `ViewController` 类添加一个遵循 `GMSAutocompleteResultsViewControllerDelegate`\
  \ 协议的扩展：\n\n```\nextension ViewController: GMSAutocompleteViewControllerDelegate\
  \ {\n}\n```\n\n如果您此时尝试编译项目，Xcode 会提示该协议有必需的方法，并会为您创建这三个必需方法的存根。您可以让 Xcode 自动完成，或者从代码清单\
  \ 10-4 中复制定义。\n\n如代码清单 10-4 所示，我们先在所有三个方法中关闭自动完成视图控制器。将这些函数添加到您的扩展中。\n\n```\nfunc\
  \ viewController(_ viewController: GMSAutocompleteViewController,\n            \
  \        didAutocompleteWith place: GMSPlace) {\n    viewController.dismiss(animated:\
  \ true, completion: nil)\n}\n\nfunc viewController(_ viewController: GMSAutocompleteViewController,\n\
  \                    didFailAutocompleteWithError error: Error) {\n    viewController.dismiss(animated:\
  \ true, completion: nil)\n}\n\nfunc wasCancelled(_ viewController: GMSAutocompleteViewController)\
  \ {\n    viewController.dismiss(animated: true, completion: nil)\n}\n```\n\n*代码清单\
  \ 10-4：在自动完成视图控制器委托中实现方法*\n\n接下来，让我们为第一个方法（当用户选择一个地点时）添加一些功能。我们将打印出地点详情，以及我们从 Google\
  \ Places API 请求的字段。如果存在任何必需的第三方属性，我们也会将其打印出来。\n\n当您处理从 Google Places API 返回的地点时，其中一些地点可能包含您必须显示的属性信息。这些属性会以\
  \ `attributions` 属性的形式出现在 `GMSPlace` 对象上。有关 Google 当前属性政策的更多信息，请参阅此网页：[`https://developers.google.com/places/ios-sdk/attributions`](https://developers.google.com/places/ios-sdk/attributions)。\n\
  \n我们更新后的方法将类似于这样：\n\n```\nfunc viewController(_ viewController: GMSAutocompleteViewController,\n\
  \                    didAutocompleteWith place: GMSPlace) {\n    viewController.dismiss(animated:\
  \ true, completion: nil)\n    print(place)\n    print(place.attributions ?? \"No\
  \ attributions\")\n}\n```\n\n\n\n## 在地图上显示地点\n\n如果打算在地图上显示 Google 地点数据，则必须使用 Google\
  \ 地图，而非 iOS 的 `MapKit` 地图或其他提供商的地图。你可以在地图之外显示地点数据，但需要显示归因网页上提供的“Powered by Google”图像：[`https://developers.google.com/places/ios-sdk/attributions`](https://developers.google.com/places/ios-sdk/attributions)。\n\
  \n我们将以地图标记的形式，在地图上显示所选地点。首先，在你的 `ViewController` 类中添加一个名为 `addMarker` 的新函数。该函数将接受一个\
  \ `GMSPlace` 对象作为参数，参数名为 `place`：\n\n```\nfunc addMarker(_ place:GMSPlace) {\n}\n\
  ```\n\n现在，在自动完成视图控制器委托扩展的第一个方法的末尾（即在打印地点详情之后）调用该 `addMarker` 方法：\n\n```\nprint(place)\n\
  print(place.attributions ?? \"No attributions\")\naddMarker(place)\n```\n\n我们在第\
  \ 8 章中讨论了如何向 Google 地图添加地图标记。我们将使用从 Google Places API 请求的地点字段来填充标记，然后将其显示在地图上，如清单\
  \ 10-5 中的代码所示。\n\n```\nfunc addMarker(_ place:GMSPlace) {\nlet marker = GMSMarker()\n\
  marker.position = place.coordinate\nmarker.title = place.name\nmarker.icon = GMSMarker.markerImage(with:\
  \ .blue)\nmarker.userData = place\nmarker.map = mapView\n}\n清单 10-5\n在 Google 地图上显示来自\
  \ Google Places SDK 的地点\n```\n\n当你运行项目时，应该会看到一张 Google 地图出现。在地图上缩放或滚动以找到你想要搜索地点的位置，然后点击“查找商家”按钮。你将看到自动完成视图控制器出现。当你选择其中一个地点时，会看到一个蓝色标记出现在地图上。点击该标记会显示来自\
  \ Google Places API 的名称，如图 10-9 所示。\n\n![../images/485790_1_En_10_Chapter/485790_1_En_10_Fig9_HTML.jpg](img/485790_1_En_10_Fig9_HTML.jpg)\n\
  \n图 10-9\n在 Google 地图中展示 Google Places 地点的地图标记\n\n我们将 `GMSPlace` 对象放入地图标记的 `userData`\
  \ 属性中，以便以后能够访问该地点的数据。例如，你可以扩展此应用程序，以便在用户点击标记时检索该地点的照片。\n\n## Places SDK 中的其他功能\n\
  \nGoogle Places SDK for iOS 中还有许多我们在本章未涉及的其他功能。我们只讨论了用于自动完成搜索的全屏视图控制器，并未涉及如何实现自定义搜索用户界面。我们也没有讨论如何根据给定的\
  \ place ID 请求地点详情，而我们可以利用这一点从 API 获取更多数据字段。\n\n此外，你还可以将用户的当前位置转换为一个地点，从而告知用户他们所在的位置。利用地点照片数据字段中的信息，如果\
  \ Google Places 中存有照片，你可以检索这些照片。\n\n本章结束我们对 Google 地图平台及其 iOS 组件的讨论。在下一章中，我们将学习如何开始使用另一个地图提供商\
  \ Mapbox。\n\n"
- "# 11. 开始使用 Mapbox SDK\n\n在本章中，我们将在 iOS 应用中设置并使用 Mapbox 地图。Mapbox 是一个独立的地图数据提供商，为\
  \ iOS、Android 和 Web 发布软件开发工具包。Mapbox 允许你轻松地为地图设置样式，从而为你的应用程序赋予自定义的外观和感觉。我们将在下一章中处理地图样式。\n\
  \n我们在本章构建的示例应用程序，与我们使用 Apple 的 `MapKit` 和 Google 地图构建的入门应用程序类似。\n\n## 获取 Mapbox\
  \ 访问令牌\n\n你需要一个访问令牌才能使用 Mapbox 服务，因此你需要在 [`www.mapbox.com`](http://www.mapbox.com)\
  \ 创建一个账户。在创建账户的同时，也花点时间了解 Mapbox 的定价和免费层限制。在撰写本文时，你可以在免费级别下使用 Mapbox，最多支持 25,000\
  \ 名月度活跃移动设备用户，超出该数量的用户则需要付费。这种情况肯定会发生变化，因此在将其集成到你的应用程序之前，请确保 Mapbox 符合你的需求和预算。\n\
  \n创建好 Mapbox 账户并查看定价后，你需要创建一个访问令牌以在 Mapbox 应用程序中使用。虽然你可以使用默认的访问令牌，但最好为你的每个 Mapbox\
  \ 项目创建独立的访问令牌，以防你需要撤销某个令牌或限制其功能。在你的 Mapbox 账户页面上找到“创建令牌”按钮（图 11-1）。\n\n![../images/485790_1_En_11_Chapter/485790_1_En_11_Fig1_HTML.jpg](img/485790_1_En_11_Fig1_HTML.jpg)\n\
  \n图 11-1\n“创建令牌”按钮\n\n点击“创建令牌”按钮，并在下一个屏幕（图 11-2）上将你的访问令牌命名为 `FirstMapboxApp`（或你选择的任何其他名称）。令牌作用域的默认设置即可。\n\
  \n![../images/485790_1_En_11_Chapter/485790_1_En_11_Fig2_HTML.jpg](img/485790_1_En_11_Fig2_HTML.jpg)\n\
  \n图 11-2\n创建访问令牌\n\n创建你的令牌（位于“创建访问令牌”屏幕底部），然后如果 Web 应用程序提示，请确认你的密码。你将进入访问令牌列表页面。请对你的访问令牌保密，不要公开分享，例如不要将其放在源代码仓库中。在我们设置好\
  \ Xcode 项目后，我们会将此访问令牌添加到应用程序的 `Info.plist` 文件中。\n\n现在我们已经拥有了访问令牌，让我们创建一个 Xcode 项目并添加\
  \ Mapbox SDK for iOS。\n\n\n\n## 使用 Mapbox SDK 启动新项目\n\n我们将构建一个新的 iOS 应用程序来演示 Mapbox\
  \ 的功能。在 Xcode 中创建一个名为 `FirstMapboxApp` 的新项目。该项目应为单视图应用程序，使用 Swift 作为编程语言，并使用 storyboard/UIKit\
  \ 作为用户界面，如图 11-3 所示。\n\n![../images/485790_1_En_11_Chapter/485790_1_En_11_Fig3_HTML.jpg](img/485790_1_En_11_Fig3_HTML.jpg)\n\
  \n图 11-3\n\n在 Xcode 中创建 FirstMapboxApp 项目\n\n创建此 Xcode 项目后，我们需要安装 Mapbox SDK。与 Google\
  \ Maps 或 MapKit 不同，Mapbox SDK 是开源的。在应用程序中包含该 SDK 的最简单方法是使用 CocoaPods，这与我们安装 Google\
  \ Maps for iOS SDK 的方式类似。如果你尚未在 Mac 上安装 CocoaPods，请访问 [`cocoapods.org/`](https://cocoapods.org/)\
  \ 获取安装说明。\n\n设置好 CocoaPods 后，进入命令行，并将目录切换到刚创建的项目文件夹 (`FirstMapBoxApp`)。\n\n在该目录中，使用以下命令为你的项目创建一个\
  \ CocoaPods `Podfile`：\n\n```\npod init\n```\n\n你创建的 `Podfile` 将如清单 11-1 所示。\n\n\
  ```\ntarget 'FirstMapboxApp' do\n# 如果不想使用动态框架，请注释下一行\nuse_frameworks!\n# FirstMapboxApp\
  \ 的 Pods\nend\n清单 11-1\n为项目生成的 Podfile\n```\n\n在此文件中，我们有一个指向 Xcode 项目的 target，以及一个用于列出项目所依赖库（在\
  \ CocoaPods 中称为 pods）的位置。我们只需要为 Mapbox 添加一个 pod，然后声明要使用的版本，如清单 11-2 所示。在撰写本文时，该版本为\
  \ 5.8。\n\n```\ntarget 'FirstMapboxApp' do\n# 如果不想使用动态框架，请注释下一行\nuse_frameworks!\n\
  # FirstMapboxApp 的 Pods\npod 'Mapbox-iOS-SDK', '~> 5.8'\nend\n清单 11-2\n将 Mapbox\
  \ CocoaPods 库添加到项目\n\n```\n\n编辑并保存 `Podfile` 文件后，在命令行中运行以下命令：\n\n```\npod install\n\
  ```\n\nCocoaPods 将下载 Mapbox 库并将其安装到 Pods 文件夹中。你还会看到一个新的 `FirstMapboxApp.xcworkspace`\
  \ 文件，你将在 Xcode 中打开它。此工作区将包含你的项目以及 CocoaPods 中的所有依赖项。\n\n现在，打开该工作区。在你项目的 `Info.plist`\
  \ 文件（图 11-4）中，为 `MGLMapboxAccessToken` 添加一个条目，并将其字符串值设置为你的访问令牌。\n\n![../images/485790_1_En_11_Chapter/485790_1_En_11_Fig4_HTML.jpg](img/485790_1_En_11_Fig4_HTML.jpg)\n\
  \n图 11-4\n\n带有 Mapbox 访问令牌设置的项目 Info.plist 文件\n\n添加访问令牌后，我们就拥有了使用 Mapbox 所需的一切。让我们开始将地图添加到默认视图控制器中。\n\
  \n## 显示地图视图\n\nMapbox 提供了一个名为 `MGLMapView` 的地图视图类（MGL 是 Mapbox GL 的缩写）。要在 storyboard\
  \ 中使用该地图视图类，请将一个 `UIView` 拖到你的视图控制器上，然后在身份检查器中将自定义类更改为 `MGLMapView`，如图 11-5 所示。\n\
  \n![../images/485790_1_En_11_Chapter/485790_1_En_11_Fig5_HTML.jpg](img/485790_1_En_11_Fig5_HTML.jpg)\n\
  \n图 11-5\n\n设置 MGLMapView 自定义类\n\n让我们确保一切就绪。继续运行该应用程序。你应该会在 iOS 模拟器中看到一张基本的世界地图，类似于图\
  \ 11-6。\n\n![../images/485790_1_En_11_Chapter/485790_1_En_11_Fig6_HTML.jpg](img/485790_1_En_11_Fig6_HTML.jpg)\n\
  \n图 11-6\n\n在地图视图中显示基本世界地图\n\n提示\n\n如果你看到一张带有信息按钮的空白地图，可能需要再次检查 Info.plist 文件中的\
  \ Mapbox 访问令牌。\n\n现在我们有了地图视图，让我们通过将地图居中于新位置并选择不同的地图样式来改变地图的显示方式。\n\n## 自定义地图视图的外观\n\
  \n我们的第一个任务是为地图视图创建一个 outlet，以便我们可以通过编程方式更改其属性。使用 Xcode 助理将一个 outlet 拖入 `ViewController`\
  \ 类。将该 outlet 命名为 `mapView`。声明将如下所示：\n\n```\n@IBOutlet weak var mapView: MGLMapView!\n\
  ```\n\n你还需要在类顶部添加一条 import 语句：\n\n```\nimport Mapbox\n```\n\n现在已将地图视图声明为变量，你可以轻松地将地图居中于新位置。在你的\
  \ `viewDidLoad()` 方法中，添加以下两行。请随意调整纬度和经度以匹配你的位置——我选取的位置是德克萨斯州奥斯汀的中心：\n\n```\nmapView.centerCoordinate\
  \ = CLLocationCoordinate2D(\nlatitude: 30.2,\nlongitude: -97.75)\nmapView.zoomLevel\
  \ = 10\n```\n\n运行应用程序后，你会看到地图现在显示更多细节。通过编程方式调整缩放级别也很容易，缩放级别为 10 足以显示奥斯汀市中心。\n\n\
  Mapbox 的最佳特性之一是更改地图渲染方式的便捷性。你可以创建自己的地图样式，然后使用样式 URL 引用它们。或者你也可以使用一些内置的 Mapbox 样式——这些样式可通过\
  \ `MGLStyle` 类获得。尝试将地图视图的样式 URL 更改为户外样式：\n\n```\nmapView.styleURL = MGLStyle.outdoorsStyleURL\n\
  ```\n\n`MGLStyle` 类上可用的其他地图样式包括：\n\n* `darkStyleURL`\n* `lightStyleURL`\n* `streetsStyleURL`\n\
  * `satelliteStyleURL`\n* `satelliteStreetsStyleURL`\n\n在第 12 章中，我们将使用相同的 `styleURL`\
  \ 属性更详细地研究地图样式。接下来，我们继续在地图上显示一个基本标记。\n\n\n\n## 在地图上显示点标注\n\nMapbox SDK 支持在地图上显示标记、叠加层和线条作为标注，类似于\
  \ iOS 的 `MapKit` 或 Google Maps。让我们从一个基础示例开始，展示一个简单的地图标记及其关联的标注弹窗。我们需要实现两个不同的步骤。第一步是创建标注并显示它。第二步是采用\
  \ `MGLMapViewDelegate` 协议，然后实现 `mapView:annotationCanShowCallout` 函数。让我们从显示标注开始。\n\
  \n当我们在特定的经纬度处理标注时，可以使用 `MGLPointAnnotation` 类。该类的实例具有 `coordinate`、`title` 和 `subtitle`\
  \ 属性，类似于苹果 MapKit 框架中的 `MKPointAnnotation` 类。请继续创建一个名为 `displayAnnotation` 的函数，如代码清单\
  \ 11-3 所示。你需要在 `viewDidLoad()` 方法的末尾调用 `displayAnnotation()`。\n\n```\nfunc displayAnnotation()\
  \ {\n    let annotation = MGLPointAnnotation()\n    annotation.coordinate = CLLocationCoordinate2D(\n\
  \        latitude: 30.25,\n        longitude: -97.75)\n    annotation.title = \"\
  Austin\"\n    annotation.subtitle = \"Texas\"\n    mapView.addAnnotation(annotation)\n\
  }\n```\n\n代码清单 11-3：在地图视图上显示标注\n\n我们还需要采用 `MGLMapViewDelegate` 协议。可以通过扩展 `ViewController`\
  \ 类来实现。将代码清单 11-4 中的扩展添加到 `ViewController.swift` 文件的底部。\n\n```\nextension ViewController:\
  \ MGLMapViewDelegate {\n    func mapView(_ mapView: MGLMapView,\n              \
  \   annotationCanShowCallout annotation: MGLAnnotation) -> Bool {\n        return\
  \ true\n    }\n}\n```\n\n代码清单 11-4：地图视图委托的扩展\n\n委托中实现的唯一方法控制当用户选择某个标注时是否显示弹窗。如果我们有一些不显示信息的标注，这里可以有更复杂的逻辑，但我们可以直接返回\
  \ `true`。Mapbox 的默认行为是在一个简单的弹窗中显示标注的 `title` 和 `subtitle` 属性。\n\n最后，我们需要告诉地图视图它有一个委托。在\
  \ `viewDidLoad()` 方法内部，添加这一行代码：\n\n```\nmapView.delegate = self\n```\n\n未来我们始终可以实现委托协议中的更多方法。现在继续运行项目，以便你能看到这个基础示例是如何工作的。你的代码应该类似于代码清单\
  \ 11-5。\n\n```\nimport UIKit\nimport Mapbox\n\nclass ViewController: UIViewController\
  \ {\n    @IBOutlet weak var mapView: MGLMapView!\n\n    override func viewDidLoad()\
  \ {\n        super.viewDidLoad()\n        // Do any additional setup after loading\
  \ the view.\n        mapView.centerCoordinate = CLLocationCoordinate2D(\n      \
  \      latitude: 30.2,\n            longitude: -97.75)\n        mapView.zoomLevel\
  \ = 10\n        mapView.styleURL = MGLStyle.outdoorsStyleURL\n        mapView.delegate\
  \ = self\n        displayAnnotation()\n    }\n\n    func displayAnnotation() {\n\
  \        let annotation = MGLPointAnnotation()\n        annotation.coordinate =\
  \ CLLocationCoordinate2D(\n            latitude: 30.25,\n            longitude:\
  \ -97.75)\n        annotation.title = \"Austin\"\n        annotation.subtitle =\
  \ \"Texas\"\n        mapView.addAnnotation(annotation)\n    }\n}\n\nextension ViewController:\
  \ MGLMapViewDelegate {\n    func mapView(_ mapView: MGLMapView,\n              \
  \   annotationCanShowCallout annotation: MGLAnnotation) -> Bool {\n        return\
  \ true\n    }\n}\n```\n\n代码清单 11-5：Mapbox 的完整视图控制器类\n\n在 iOS 模拟器中运行项目，然后点击标记后，你应该会看到类似图\
  \ 11-7 的内容。\n\n![../images/485790_1_En_11_Chapter/485790_1_En_11_Fig7_HTML.jpg](img/485790_1_En_11_Fig7_HTML.jpg)\n\
  \n图 11-7：在地图视图上显示带有弹窗的标记\n\n这是一个关于如何开始使用 Mapbox 的简单示例，但我们还没有真正涵盖任何使 Mapbox 与其他地图提供商不同的功能。在下一章中，我们将深入探讨如何使用\
  \ Mapbox 自定义地图的外观和感觉。这将为你的移动应用程序赋予独特的个性，而且操作起来非常简单。\n\n## 使用 Mapbox 自定义地图样式\n\n\
  现在你已经了解了 Mapbox SDK 的基础使用方法，是时候深入研究 Mapbox 的一些独特之处了。使用 Mapbox，你几乎可以完全控制地图中显示的样式和功能。\n\
  \n在本章中，我们将在 Mapbox Studio 中创建一个自定义地图样式。然后我们将在 iOS 应用中使用该样式。\n\n本章大部分内容将侧重于使用 Mapbox\
  \ Studio，这是一个基于 Web 的工具，允许你自定义地图样式。本章的 iOS 部分非常简单，因为 Mapbox SDK 易于使用。我们在前一章已经了解了如何更改地图样式，这已经是我们需要做的全部了。\n\
  \n### 准备地图样式\n\n对于这个项目，我们需要一个包含 Mapbox SDK 的 iOS 应用程序、一个正确配置的访问令牌，以及在视图控制器上有一个地图视图。你可以重复使用第\
  \ 11 章的项目，也可以创建一个新的应用程序。你的视图控制器类应该有一个指向 Storyboard 中名为 `mapView` 的地图视图的出口。\n\n###\
  \ 更改地图视图上的默认样式\n\n正如我们在前一章讨论的，地图视图使用样式 URL 来决定从服务器加载哪些瓦片。我们讨论了可以从 `MGLStyle` 类获取的内置样式\
  \ URL – 深色、浅色、户外、街道、卫星和卫星街道。要设置这些样式 URL，你的代码会是这样的：\n\n```\nmapView.styleURL = MGLStyle.outdoorsStyleURL\n\
  ```\n\n不过，Mapbox 并不仅仅局限于这些内置样式。你可以创建自己的 Mapbox 样式，这些样式会有一个类似于以下的统一资源标识符（URI）：\n\n\
  ```\nmapbox://styles/jefflinwood/aabb773344\n```\n\n地图视图对象的 `styleURL` 属性接受 `URL`\
  \ 对象，你可以通过调用 `URL(string:)` 构造函数自行构造这些对象。在地图视图上设置样式 URL 会是这样：\n\n```\nmapView.styleURL\
  \ = URL(string: mapStyleURI)\n```\n\n这就是你设置 iOS 应用以使用你创建的自定义样式所需做的全部工作。在本章的其余部分，我们将使用基于\
  \ Web 的 Mapbox Studio 应用程序来创建自定义样式。在你保存并发布该样式后，它将拥有自己的 `mapbox://` URI，你可以将其用于你的应用。\n\
  \n\n\n### 使用 Mapbox Studio 创建地图样式\n\nMapbox 提供了一个基于网页的应用程序 `Mapbox Studio`，你可以用它来自定义应用程序的地图样式。这些地图可用于你的\
  \ iOS 应用，同时也能在 Web 和 Android 应用中使用。所有样式的设计工作都在一个地方完成，从而让你的应用用户在不同平台上获得一致的体验。让我们首先打开地址为\
  \ [`https://studio.mapbox.com/`](https://studio.mapbox.com/) 的 `Mapbox Studio`（图\
  \ 12-1）。\n\n![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig1_HTML.jpg](img/485790_1_En_12_Fig1_HTML.jpg)\n\
  \n图 12-1\n\n`Mapbox Studio`\n\n浏览 `Mapbox Studio`，你会发现示例样式、文档和有用的视频。不妨看看一些工具和资源，了解该应用的新功能——在撰写本文时，`Mapbox\
  \ Studio` 仍处于测试版发布阶段。\n\n接下来，我们创建一个新样式。点击 Studio 主页上那个大大的蓝色按钮 `New Style`（新建样式）。你会看到一个巨大的模板选择界面。花些时间浏览一下所有不同的模板及其变体（图\
  \ 12-2）——你可能会找到一个非常适合你应用的样式。\n\n![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig2_HTML.jpg](img/485790_1_En_12_Fig2_HTML.jpg)\n\
  \n图 12-2\n\n`Mapbox Studio` 样式模板\n\n对于本项目，我们将使用 `Basic`（基础）模板的 `Galaxy`（星系）变体（图\
  \ 12-3）——但你完全可以根据自己的选择，使用任何变体来创建项目。\n\n![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig3_HTML.jpg](img/485790_1_En_12_Fig3_HTML.jpg)\n\
  \n图 12-3\n\n使用 `Galaxy` 变体的 `Basic` 模板\n\n选择 `Galaxy`（或其他变体），然后点击 `Customize Basic`（自定义基础）按钮，进入详细的样式编辑器，如图\
  \ 12-3 所示。\n\n样式编辑器（图 12-4）拥有几个不同的功能，但如果您想要自定义地图的显示效果，其中一种方法是调整地图上各个图层的显示。左侧边栏中的\
  \ `Components`（组件）视图是执行此操作的最简单方式。例如，你可以选择 `Road network`（道路网络），选取 `Galaxy` 变体中使用的一种颜色，然后从颜色选择器中挑选一种新颜色。类似地，你还可以更新水体、地名标签或地图中任何其他元素使用的颜色。\n\
  \n![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig4_HTML.jpg](img/485790_1_En_12_Fig4_HTML.jpg)\n\
  \n图 12-4\n\n样式编辑器，左侧边栏显示组件\n\n你可以完全控制哪些要素显示在地图上，也可以将它们禁用。例如，如果你不需要在地图上显示分区名称，可以通过在\
  \ `Components`（组件）侧边栏中选择 `Place labels`（地名标签）组件，向下滚动到 `Settlement subdivisions`（聚落分区），然后关闭开关来轻松禁用它，如图\
  \ 12-5 所示。\n\n![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig5_HTML.jpg](img/485790_1_En_12_Fig5_HTML.jpg)\n\
  \n图 12-5\n\n在 `Mapbox Studio` 中更改分区地名的显示\n\n如果你需要更精细的控制，侧边栏中的 `Layers`（图层）视图下可以查看所有图层，并且每个图层都有一个详细的样式编辑器，为你提供非常大的控制权。\n\
  \n从侧边栏中选择 `Layers`（图层），选取 `state-label`（州标签）图层，然后查看不同的选项。你可以在此处选择不同的字体、更改其大小以及调整文本设置（图\
  \ 12-6）。\n\n![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig6_HTML.jpg](img/485790_1_En_12_Fig6_HTML.jpg)\n\
  \n图 12-6\n\n地名标签的文本样式\n\n在这个项目中，我们不打算在这个层级更改任何内容，但拥有这样的选项是非常强大的。关闭可能遮挡示例地图视图的任何已打开的样式编辑器，然后使用窗口右侧带有放大镜图标的搜索栏，将地图的中心视点更改为你的位置（图\
  \ 12-7）。\n\n![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig7_HTML.jpg](img/485790_1_En_12_Fig7_HTML.jpg)\n\
  \n图 12-7\n\n`Mapbox Studio` 的位置选择器\n\n选择你的位置，然后放大或缩小，直到得到你希望看到的地图视图（图 12-8）。\n\n\
  ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig8_HTML.jpg](img/485790_1_En_12_Fig8_HTML.jpg)\n\
  \n图 12-8\n\n`Mapbox Studio` 显示德克萨斯州奥斯汀，而非默认位置\n\n探索你的区域，如果地图样式不完全符合你的要求，不妨花些时间用编辑器来修改它！\n\
  \n如果你对地图样式感到满意，或者只是想在你的 iOS 应用中查看这张地图，请点击编辑器右上角的 `Publish`（发布）按钮。将会弹出一个对话框（图 12-9），左侧显示你已发布的地图样式，右侧显示你正在编辑的草稿版本。这让你可以轻松对比和对照你的编辑内容。如果一切看起来不错，并且你想替换现有样式，请继续点击\
  \ `Publish`（发布）。如果你想从现有样式派生出一个新样式，请点击 `Publish as new`（发布为新样式）。如果你选择 `Publish as\
  \ new`，`Mapbox` 会将你的更改保存为一个副本，名称类似 `Basic-copy`。\n\n![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig9_HTML.jpg](img/485790_1_En_12_Fig9_HTML.jpg)\n\
  \n图 12-9\n\n发布地图样式对话框\n\n无论是发布了新地图样式还是创建了新地图样式后，请点击左上角的 `Styles`（样式）按钮，返回 `Mapbox\
  \ Studio` 主屏幕。你会在主屏幕上看到列出的样式，如图 12-10 所示。\n\n![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig10_HTML.jpg](img/485790_1_En_12_Fig10_HTML.jpg)\n\
  \n图 12-10\n\n显示新样式的 `Mapbox Studio` 主屏幕\n\n现在，让我们在 iOS 应用中尝试使用我们的新地图样式！在地图样式的右侧，你会看到一个三点按钮，点击它会打开一个弹出菜单（图\
  \ 12-11）。点击该按钮，然后点击出现的剪贴板图标，复制你地图样式的 `Mapbox` 样式 URL。\n\n![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig11_HTML.jpg](img/485790_1_En_12_Fig11_HTML.jpg)\n\
  \n图 12-11\n\n地图样式的弹出菜单，包含样式 URL 和复制按钮\n\n保存好样式 URL，然后返回 `Xcode`。我们将告诉地图视图使用该样式，然后运行我们的\
  \ iOS 应用，以查看新的地图样式。\n\n\n\n### 在应用中显示新地图样式\n\n将该样式 URL 复制到你的 iOS 应用中，并在 `ViewController`\
  \ 类中将其存储在一个名为 `mapStyleURI` 的常量中。你的 URL 将因你的账户和样式而异：\n\n```\nlet mapStyleURI = \"\
  mapbox://styles/jefflinwood/zfgwe\"\n```\n\n现在，按照本章前面讨论的方法，设置地图样式 URL：\n\n```\n\
  mapView.styleURL = URL(string:mapStyleURI)\n```\n\n你还可以将地图的起始位置设置为你熟悉的区域。一个完整的 `viewDidLoad()`\
  \ 方法如代码清单 12-1 所示。\n\n```\noverride func viewDidLoad() {\nsuper.viewDidLoad()\n\
  // 加载视图后的其他设置\nmapView.centerCoordinate = CLLocationCoordinate2D(\nlatitude: 30.2,\n\
  longitude: -97.75)\nmapView.zoomLevel = 10\nmapView.styleURL = URL(string: mapStyleURI)\n\
  }\n代码清单 12-1\nviewDidLoad 方法，展示新的样式 URL\n```\n\n请务必在你的类中设置 `mapStyleURI` 常量。现在运行应用，你将在\
  \ iOS 应用中看到新的地图样式，类似于图 12-12。\n\n![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig12_HTML.jpg](img/485790_1_En_12_Fig12_HTML.jpg)\n\
  \n图 12-12\n\n在 iOS 应用中显示新的地图样式\n\n使用 Mapbox Studio，你可以在 Web 上根据需要随时更新样式，只要将更改发布到现有样式，你的\
  \ iOS 应用将在下次加载地图时自动应用这些更改。\n\n在下一章中，我们将把一个数据集上传到 Mapbox Studio，然后在 iOS 应用中展示。你可以将此技术用于需要在\
  \ Mapbox Studio 中自定义样式的要素，或者当数据量过大，无法在地图上以标记注释形式合理处理（考虑到性能）时使用。\n\n### 在 Mapbox\
  \ Studio 中使用数据集\n\n使用 Mapbox Studio，我们可以将大型数据集作为新图层添加到地图中。在本章中，我们将在第 12 章创建的自定义地图样式基础上继续构建。加载数据集后，我们无需任何更改即可在地图视图中查看它。我们还将了解当用户与地图交互时，如何检索底层数据要素。\n\
  \n本章使用我们在第 12 章中使用 Mapbox Studio 创建的项目作为基础。如果你尚未创建自定义地图样式并在地图视图中显示，请先按照说明进行操作。\n\
  \n### 地震地图\n\n该项目涉及收集关于地震的 GeoJSON 数据，将该数据作为数据集上传到 Mapbox Studio，然后根据数据创建瓦片集。拥有瓦片集后，我们可以在\
  \ Mapbox Studio 中自定义数据的显示外观，包括增加地图上数据点的大小以匹配地震的震级。然后，我们可以在应用中显示数据，并检测用户何时点击了其中一个地震点。完成该项目后，我们将得到一个如图\
  \ 13-1 所示的应用。\n\n![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig1_HTML.jpg](img/485790_1_En_13_Fig1_HTML.jpg)\n\
  \n图 13-1\n\n应用中的地震数据点\n\n让我们从第一步开始，收集我们需要在地图上显示的数据。\n\n### 下载地震数据\n\n我们用于可视化的地震数据集来自美国地质调查局（USGS）。如果你对此感兴趣，并想了解更多关于地震监测和研究的信息，请访问他们的网站\
  \ [`www.usgs.gov/natural-hazards/earthquake-hazards`](https://www.usgs.gov/natural-hazards/earthquake-hazards)。\n\
  \n你还可以访问 [`https://earthquake.usgs.gov/earthquakes/map/`](https://earthquake.usgs.gov/earthquakes/map/)\
  \ 查看地震地图，该地图会从服务器频繁刷新。我们将制作类似的内容，但使用历史地震数据。\n\n地震目录（可通过 [`https://earthquake.usgs.gov/fdsnws/event/1/`](https://earthquake.usgs.gov/fdsnws/event/1/)\
  \ 访问）列出了地震危害计划支持的所有不同 API。我们的目的是查询历史地震信息，然后将结果作为 GeoJSON 返回。GeoJSON 是一种用于地理要素（包括点、线和多边形及其相关属性）的数据编码格式。\n\
  \n我们将用于下载数据的 URL 是：\n\n```\nhttps://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&starttime=2020-01-01&endtime=2020-01-02\n\
  ```\n\n我们将开始时间指定为 2020 年 1 月 1 日，结束时间指定为 2020 年 1 月 2 日。我们还要求服务器返回 GeoJSON 格式，而不是\
  \ XML、CSV 或其他格式。你将看到一个包含 610 个不同要素的大型 GeoJSON 文件。代码清单 13-1 包含该 JSON 文件的编辑示例，只包含一个要素及其两个属性。\n\
  \n```\n{\n\"type\": \"FeatureCollection\",\n\"metadata\": {\n\"generated\": 1587256320000,\n\
  \"url\": \"https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&starttime=2020-01-01&endtime=2020-01-02\"\
  ,\n\"title\": \"USGS Earthquakes\",\n\"status\": 200,\n\"api\": \"1.8.1\",\n\"count\"\
  : 610\n},\n\"features\": [\n{\n\"type\": \"Feature\",\n\"properties\": {\n\"mag\"\
  : 1.3,\n\"title\": \"M 1.3 - 38km SE of Tanana, Alaska\"\n},\n\"geometry\": {\n\"\
  type\": \"Point\",\n\"coordinates\": [\n-151.59520000000001,\n64.892200000000003,\n\
  2.5\n]\n},\n\"id\": \"ak02021ksej\"\n}\n],\n\"bbox\": [\n-179.2752,\n-53.0907,\n\
  -1.75,\n175.8577,\n69.6006,\n392.48\n]\n}\n代码清单 13-1\n地震 API 查询的 GeoJSON 响应示例\n\
  ```\n\n发起 API 调用，然后将结果下载到 GeoJSON 文件中——尝试使用 Web 浏览器或 `curl` 命令。本书的可下载源代码中，在第 13\
  \ 章文件夹中也包含了该 GeoJSON 文件。如果你愿意，可以尝试使用 API 查询其他日期范围。对于这个特定项目，我们将使用 `mag` 属性（地震震级），因此其他\
  \ GeoJSON 源可能与此过程不完全匹配。然而，这里使用的概念可以很好地迁移到其他项目。\n\n接下来，我们将获取刚刚下载的地震列表，并将它们上传到 Mapbox\
  \ Studio。\n\n\n\n### 在 Mapbox Studio 中创建数据集\n\n`Mapbox Studio` 允许您在云端保存和编辑 `GeoJSON`\
  \ 要素的集合，例如我们刚刚下载的地震数据。这些数据集可以转换为瓦片集，然后便可在我们在第 12 章中使用的 `Mapbox Studio` 样式编辑器中进行编辑。我们将完成从上传数据集到在编辑器中设置要素样式的整个过程。\n\
  \n首先，我们在 `Mapbox Studio` 上创建一个数据集。访问 `Mapbox Studio` 的数据集页面 (图 13-2) ([`https://studio.mapbox.com/datasets/`](https://studio.mapbox.com/datasets/))，或点击右上角的“数据集”链接。您将看到您已创建的所有数据集，或上传新数据集的选项。\n\
  \n![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig2_HTML.jpg](img/485790_1_En_13_Fig2_HTML.jpg)\n\
  \n图 13-2\n`Mapbox Studio` 数据集网页\n\n点击蓝色的 `新建数据集` 按钮，会弹出一个对话框，提供创建空白数据集或上传 `GeoJSON`\
  \ 文件的选项。在对话框的标签栏中选择 `上传` (图 13-3)。\n\n![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig3_HTML.jpg](img/485790_1_En_13_Fig3_HTML.jpg)\n\
  \n图 13-3\n向 `Mapbox Studio` 上传新数据集\n\n选择您在本章上一部分下载的 `GeoJSON` 文件，然后上传。`Mapbox Studio`\
  \ 将处理该文件并找到所有 `GeoJSON` 要素 (图 13-4)。\n\n![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig4_HTML.jpg](img/485790_1_En_13_Fig4_HTML.jpg)\n\
  \n图 13-4\n确认数据集上传到 `Mapbox Studio`\n\n如果 `Mapbox` 找到的要素数量与您期望在 `GeoJSON` 文件中看到的数量一致，请点击\
  \ `确认` 按钮。您可以随意命名您的数据集，但默认名称将是您上传文件的名称。在我们的例子中，默认名称是 `Earthquake2020-01-01`。如果这个名称可以接受，请点击\
  \ `创建` 按钮。\n\n`Mapbox Studio` 将导入这些要素，您会看到一条确认消息，类似于图 13-5 中的对话框。\n\n![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig5_HTML.jpg](img/485790_1_En_13_Fig5_HTML.jpg)\n\
  \n图 13-5\n数据集上传确认对话框\n\n如果您开始编辑数据集，您将看到数据集在简单的地图背景上绘制出来 (图 13-6)。您可以选择数据集中的任何点，并检查或修改数据。\n\
  \n![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig6_HTML.jpg](img/485790_1_En_13_Fig6_HTML.jpg)\n\
  \n图 13-6\n显示一个地震点的数据集编辑器\n\n在我们的案例中，我们使用的是来自 API 的干净数据，因此无需检查数据是否存在异常或清理缺失值。我们也可以快速浏览一下数据，看看刚才导入的数据集是否合理，以及是否与我们预期数据点出现的位置相匹配。\n\
  \n此数据集已正确导入，我们可以根据此数据集创建一个瓦片集。数据集和瓦片集之间的区别在于，我们可以在瓦片集中修改数据在地图上的呈现方式，而不是编辑数据集中的数据值。\n\
  \n点击左上角的蓝色 `Mapbox` 图标返回数据集屏幕 (图 13-7)，或在网页浏览器中导航到 [`https://studio.mapbox.com/datasets/`](https://studio.mapbox.com/datasets/)。选择您刚刚上传的地震数据集旁边的三点弹出菜单，然后从弹出菜单中选择\
  \ `查看详情`。\n\n![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig7_HTML.jpg](img/485790_1_En_13_Fig7_HTML.jpg)\n\
  \n图 13-7\n用于查看数据集详情的弹出菜单\n\n图 13-8 中显示的数据集详情屏幕允许您将此数据集导出为瓦片集。\n\n![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig8_HTML.jpg](img/485790_1_En_13_Fig8_HTML.jpg)\n\
  \n图 13-8\n数据集详情屏幕\n\n在下一节中，我们将创建一个瓦片集。这个瓦片集将用于 `Mapbox Studio` 样式编辑器中，以更改数据在地图上的外观。\n\
  \n### 创建瓦片集\n\n在数据集的详情屏幕上，`Mapbox Studio` 提供了一种创建瓦片集的简单方法。点击右侧栏中的 `导出为瓦片集` 链接。将出现一个对话框\
  \ (图 13-9)，询问您是希望导出到新瓦片集还是更新连接的瓦片集。\n\n![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig9_HTML.jpg](img/485790_1_En_13_Fig9_HTML.jpg)\n\
  \n图 13-9\n导出为瓦片集对话框\n\n我们将导出到新瓦片集，因此点击该链接。会出现一个文本框，其中包含一个建议的瓦片集名称（与数据集同名）。如果没问题，点击\
  \ `导出`，然后 `Mapbox` 会将数据集处理成瓦片集。此转换完成后，您会看到数据集详情屏幕上出现一个已连接的瓦片集 (图 13-10)。\n\n![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig10_HTML.jpg](img/485790_1_En_13_Fig10_HTML.jpg)\n\
  \n图 13-10\n数据集详情屏幕上的已连接瓦片集及处理通知\n\n如果您点击该瓦片集，您将看到瓦片集内数据的预览，就像它在地图上布局的样子。这有助于确认数据集导出处理正确。\n\
  \n我们的下一步是将这个瓦片集添加到我们在第 12 章创建的地图样式中。如果您尚未创建地图样式，请按照第 12 章的说明进行操作。\n\n### 将瓦片集添加到样式\n\
  \n现在我们需要打开我们的地图样式，将瓦片集作为一个图层添加。点击网页右上角的 `样式` 选项卡，或导航到 [`https://studio.mapbox.com/`](https://studio.mapbox.com/)\
  \ 查看您的样式列表。选择您在上一章创建的地图样式，然后点击进入样式编辑器。\n\n在样式编辑器中，选择左侧边栏中的 `图层` 选项卡。我们需要添加一个新图层，因此点击\
  \ `图层` 选项卡右上角的加号按钮。当 `新图层` 窗口出现时，将显示一个数据源列表，其中包括历史选举结果。\n\n在筛选框中输入 `earthquake`，您将看到您的瓦片集出现\
  \ (图 13-11)。\n\n![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig11_HTML.jpg](img/485790_1_En_13_Fig11_HTML.jpg)\n\
  \n图 13-11\n将瓦片集添加到地图样式\n\n在搜索结果窗口中选择该瓦片集，然后缩放到世界上另一个构造活跃且有地震的地区，比如阿拉斯加。您将看到我们上传的\
  \ `GeoJSON` 中的要素显示在地图上，如图 13-12 所示。绿色圆点仅用于参考，并非瓦片集的初始显示方式。它们表明您的所有数据都将显示在地图上——您可以应用一个过滤器，根据条件不显示某些数据。如果某个数据点被过滤掉，该数据将会以红点的形式显示在此处。\n\
  \n![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig12_HTML.jpg](img/485790_1_En_13_Fig12_HTML.jpg)\n\
  \n图 13-12\n将瓦片集添加到地图工作室，要素显示为绿色圆点\n\n现在我们已经添加了瓦片集，我们可以更改其在任何使用此样式的地图中的显示方式。\n\n\n\
  \n### 使用 Mapbox Studio 为要素设置样式\n\n在图层侧边栏中，找到你刚刚添加的地震图块集。点击它，你会看到一个图层样式编辑面板以窗口形式弹出（图\
  \ 13-13）。\n\n![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig13_HTML.jpg](img/485790_1_En_13_Fig13_HTML.jpg)\n\
  \n图 13-13 地震图层的默认图块\n\n这也许很难看清，但地图上的每个数据点都以 5 像素的圆形显示，填充为黑色，没有轮廓。这在深色地图上无法提供很好的对比度，所以让我们更改填充颜色（标记为\
  \ `color` 的属性）。选择该颜色属性，会弹出一个颜色选择器。选择一个更亮的颜色，例如红色。如果你正在查看有过地震的区域，你将立即看到地图上的数据点改变了颜色，如图\
  \ 13-14 所示。\n\n![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig14_HTML.jpg](img/485790_1_En_13_Fig14_HTML.jpg)\n\
  \n图 13-14 数据点填充为红色\n\n你还可以更改描边颜色和描边轮廓，以使数据点的对比度更高。尝试将描边颜色设置为十六进制颜色值 `ece9e9`，并将描边宽度调整为\
  \ 1 像素。如果你愿意，也可以在这里选择自己的颜色；这不会影响项目。\n\n接下来，让我们尝试通过用于显示点的圆半径来传递一些关于地震震级的信息。Mapbox\
  \ Studio 允许你利用地图中每个要素的属性来更改地图样式的属性。选择半径，然后选择“按数据范围设置样式”的链接。你会看到一个数据字段选择器弹出，让你可以找到一个数值型数据字段。查找\
  \ `mag` 数据字段，它是震级（magnitude）的缩写（图 13-15）。\n\n![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig15_HTML.jpg](img/485790_1_En_13_Fig15_HTML.jpg)\n\
  \n图 13-15 选择震级数据字段来改变半径字段\n\n选择了震级字段后，会出现几个选项用于改变半径。我们将采用简单的线性插值，最小震级对应 5 像素，最大震级对应\
  \ 15 像素。\n\n图 13-16 展示了选择按数据范围设置样式并使用震级字段后，圆形的半径设置。\n\n![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig16_HTML.jpg](img/485790_1_En_13_Fig16_HTML.jpg)\n\
  \n图 13-16 编辑地震数据的半径数据设置\n\n这个设置视图可能有点令人困惑。震级数据点的线性插值有两个断点——最低值 `–0.5`，和最高值 `5.4`。两者的圆半径都是\
  \ 5 像素，所以没有变化。\n\n我们要做的是保留最低设置不变，然后更改最高值。点击底部的值 `5.4`，然后将圆半径改为 `15 px`，如图 13-17\
  \ 所示。你将看到折线图立即开始显示半径值从左到右上升。除非你想更改某个断点的值，否则不要修改你看到的滑块上的数值。\n\n![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig17_HTML.jpg](img/485790_1_En_13_Fig17_HTML.jpg)\n\
  \n图 13-17 调整半径随震级线性变化\n\n务必点击“完成”以保存对半径的更改。你可以在此处添加更多断点，以便为中间值设置半径。\n\n你也可以更改其他值，例如颜色或描边大小，使其随震级变化，或随数据集中其他属性变化。请随意进行实验。\n\
  \n现在，让我们发布地图样式的更改。点击屏幕右上角蓝色的“发布”按钮，如图 13-17 所示。点击发布后，会弹出一个对话框，通过直观地显示差异来让你确认更改（图\
  \ 13-18）。\n\n![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig18_HTML.jpg](img/485790_1_En_13_Fig18_HTML.jpg)\n\
  \n图 13-18 发布对地图样式的更改\n\n你可以在该对话框中看到你添加的数据，以及应用的新地图样式。如果一切看起来没问题，点击“发布”，你的更改将对使用此地图样式的任何网站或移动应用生效。如果你想发布此地图样式的新版本，例如，为了避免改变现有用户的视觉和体验，你也可以通过此对话框进行操作。\n\
  \n你会收到一条漂亮的确认消息，提示样式已成功发布（图 13-19）。\n\n![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig19_HTML.jpg](img/485790_1_En_13_Fig19_HTML.jpg)\n\
  \n图 13-19 地图样式的发布确认消息\n\n现在我们可以离开 Mapbox Studio，打开 Xcode 来查看应用中的更改。\n\n### 在应用中显示数据集\n\
  \n运行第 12 章的应用，应该能显示你刚刚编辑的地图样式，并带有地震数据点。无需更改代码。如果没有看到地震数据，请确保你在 Mapbox Studio 中发布了地图样式，并且你正在查看世界上发生过地震的区域。\n\
  \n以下代码片段将在你的地图中显示阿拉斯加州的大部分区域：\n\n```\nmapView.centerCoordinate = CLLocationCoordinate2D(\n\
  latitude: 61.2,\nlongitude: -149.9)\nmapView.zoomLevel = 3\n```\n\n你可能还想再次确认你的应用程序是否使用\
  \ `styleURL` 属性正确设置了地图样式。你可以在 Mapbox Studio 的主屏幕上，通过点击样式旁边的弹出菜单并复制其中的样式 URL 来找到地图样式：\n\
  \n```\nmapView.styleURL = URL(string: mapStyleURI)\n```\n\n在模拟器中运行你的应用后，你应该会看到类似图\
  \ 13-20 的内容。\n\n![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig20_HTML.jpg](img/485790_1_En_13_Fig20_HTML.jpg)\n\
  \n图 13-20 应用中的地震数据点\n\n虽然这些数据点不像我们在第 11 章中使用的地图标记，但它们是用户点击地图时我们可以检测到的要素。在本项目的最后一部分，让我们在用户点击某个数据点时，在控制台上打印一些信息。\n\
  \n\n\n### 检测对要素的轻点\n\n当用户轻点地图时执行某些操作，我们需要向地图视图添加一个标准的 `UIKit` 轻点手势识别器。`MGLMapView`\
  \ 类已内置多个轻点识别器，用于检测滚动、缩放等地图操作的用户输入。我们需要添加一个轻点手势识别器，并仅当内置轻点手势识别器未处理该轻点时，才触发其操作。这是\
  \ Mapbox 地图视图的常见模式，并非局限于检测数据要素的轻点用例。\n\n在您的 `ViewController` 类中添加清单 13-2 中的方法，然后在视图控制器的\
  \ `viewDidLoad()` 方法中调用 `addGestureRecognizer()` 函数。\n\n```\nfunc addGestureRecognizer()\
  \ {\nlet tapGR = UITapGestureRecognizer(target: self,\naction: #selector(mapTapped(sender:)))\n\
  for recognizer in mapView.gestureRecognizers!\nwhere recognizer is UITapGestureRecognizer\
  \ {\ntapGR.require(toFail: recognizer)\n}\nmapView.addGestureRecognizer(tapGR)\n\
  }\n清单 13-2\n向地图视图添加轻点手势识别器\n```\n\n轻点手势识别器将调用名为 `mapTapped(sender:)` 的方法，我们也需要实现该方法。当地图被轻点时，我们将要求地图视图识别该点上的任何要素，然后将这些要素列出到控制台。如果需要，您也可以指示地图视图仅显示特定图层中的要素。\n\
  \n`mapTapped(sender:)` 方法需要添加 `@objc` 注解才能使选择器正常工作。该方法的实现如清单 13-3 所示。\n\n```\n@objc\
  \ func mapTapped(sender: UITapGestureRecognizer) {\nlet mapPoint = sender.location(in:\
  \ mapView)\nlet features = mapView.visibleFeatures(at: mapPoint)\nprint(features)\n\
  }\n清单 13-3\n当用户轻点应用时查找可见的地图要素\n```\n\n将上述方法添加到应用中，然后运行应用。请确保同时在 `viewDidLoad()`\
  \ 方法中添加对 `addGestureRecognizer()` 的调用。当您轻点某个地震圆圈时，将在 Xcode 的控制台中看到该要素的属性输出。\n\n\
  ### 结论\n\n这是此处最简单的实现方案——例如，我们可以轻松扩展此方案，以更新应用内界面（如底部工具栏）中的标签，显示数据点的相关信息。地图返回的地震数据要素将是\
  \ `MGLPointFeature` 对象。如果我们上传了包含折线或多边形的 GeoJSON 数据，它们将是实现 `MGLFeature` 协议的其他类，例如\
  \ `MGLPolylineFeature` 或 `MGLPolygonFeature`。\n\n这是一个相当复杂的项目，但我希望您喜欢处理真实数据并使用 Mapbox\
  \ Studio 构建可视化效果。\n\n在下一章中，我们将离开 Mapbox Studio，将注意力转向使用 Mapbox 提供驾驶导航。我们将创建一个应用，使用\
  \ Mapbox Navigation 框架提供逐向导航的用户体验。\n\n"
- "# 使用 Mapbox 的逐向导航\n\n除了适用于 iOS 的 Mapbox 地图 SDK 之外，Mapbox 还提供了适用于 iOS 的逐向导航用户界面\
  \ SDK。通常，这种导航风格适用于提供内置驾驶导航的应用，例如拼车服务或包裹递送服务。\n\n在本章中，我们将构建一个简单的导航应用，该应用将从用户的当前位置导航到目的地。我们将使用\
  \ Mapbox 提供的标准逐向导航用户界面，即 Mapbox Navigation 框架。如果您希望构建自己的用户界面，可以使用 Mapbox Core Navigation\
  \ 框架为该用户界面提供路线更新支持。Mapbox Navigation 框架构建在 Mapbox Core Navigation 框架之上。\n\n无论哪种情况，您的应用都使用\
  \ Mapbox Directions API 来创建起点和目的地之间的路线。与其他 Mapbox API 一样，在将其集成到您的应用之前，请检查 Directions\
  \ API 的定价，以确保您了解免费层和分层定价的运作方式。\n\n## 设置您的应用项目\n\n在深入探讨 Mapbox Navigation 框架之前，我们需要创建一个新的\
  \ iOS 应用项目，使用 CocoaPods 对其进行设置，然后添加一些功能和 `Info.plist` 条目。\n\n首先，在 Xcode 中创建一个新的\
  \ iOS 单视图应用。将应用命名为 `MapboxNavigationApp`。选择与之前项目相同的默认设置，即使用 storyboard/UIKit 和 Swift。\n\
  \n### 设置 CocoaPods\n\n生成 iOS 应用后，关闭 Xcode 中的项目，并在与项目相同的目录中打开命令行。我们将为此项目初始化 CocoaPods，然后编辑\
  \ `Podfile` 以包含 Mapbox Navigation 框架。使用以下命令生成 `Podfile`：\n\n```\npod init\n```\n\
  \n创建 `Podfile` 后，在文本编辑器中打开它，并将 Mapbox Navigation 框架作为依赖项包含在内。您的完整 `Podfile` 应如清单\
  \ 14-1 所示。\n\n```\ntarget 'MapboxNavigationApp' do\n# 如果不希望使用动态框架，请注释下一行\nuse_frameworks!\n\
  # MapboxNavigationApp 的 Pods\npod 'MapboxNavigation', '~> 0.39.0'\nend\n清单 14-1\n\
  使用 Mapbox Navigation 框架的应用的 Podfile\n```\n\n关闭文本编辑器并保存 `Podfile`。然后从命令行使用以下命令安装依赖项：\n\
  \n```\npod install\n```\n\n安装 CocoaPods 后，您需要在 Xcode 中打开 `MapboxNavigationApp.xcworkspace`\
  \ 工作区，而不是 Xcode 项目。\n\n### 向 Info.plist 添加条目\n\n为了使用 Mapbox SDK，我们下一步需要做的是向 Xcode\
  \ 工作区中的 `Info.plist` 文件添加两个条目。打开该文件，并添加以下两个属性：\n\n- `MGLMapboxAccessToken`\n- `Privacy`\
  \ - Location When In Use Usage Description\n\n访问令牌条目可以是您在前面的 Mapbox 章节（参见第 11 章说明）中已经使用过的同一个访问令牌。位置使用说明将在应用首次访问用户位置时显示给用户。示例说明可以是“此应用将使用您的位置以提供应用内导航并改进地图”。\n\
  \n这样就处理好了 `Info.plist` 文件的设置。我们还需要为应用添加功能，以便应用在后台模式下运行。\n\n### 添加必需的功能\n\nMapbox\
  \ Navigation 框架需要两种不同的后台模式功能。如果您不设置后台音频模式，应用将立即崩溃并提示您添加该模式。虽然您可以通过 `Info.plist`\
  \ 文件添加这些后台模式，但也可以通过 Xcode 项目将其作为功能添加。\n\n在 Xcode 中选择 `MapboxNavigationApp` 目标，然后选择\
  \ **Signing & Capabilities** 选项卡。点击 **+ Capability** 按钮以添加一项功能。从功能列表中选择 **Background\
  \ Modes**，如图 14-1 所示。\n\n![../images/485790_1_En_14_Chapter/485790_1_En_14_Fig1_HTML.jpg](img/485790_1_En_14_Fig1_HTML.jpg)\n\
  \n图 14-1\n\n向应用目标添加后台模式功能\n\n选择 **Audio, Airplay, and Picture in Picture** 以及 **Location\
  \ updates**（图 14-2）。\n\n![../images/485790_1_En_14_Chapter/485790_1_En_14_Fig2_HTML.jpg](img/485790_1_En_14_Fig2_HTML.jpg)\n\
  \n图 14-2\n\n为导航选择后台模式\n\n现在，我们已经完成了使用 Mapbox Navigation 框架的所有设置。让我们继续了解 Mapbox Directions\
  \ API。\n\n\n\n## 使用 Mapbox Directions API\n\n你的应用需要利用 Mapbox Directions API 计算两个或多个不同途经点之间的路线。虽然你可以直接向\
  \ Directions API 发起 HTTPS 调用，但使用 `MapboxDirections` 框架中的辅助类要简单得多。\n\n开始使用 Mapbox\
  \ Directions API 所需的关键类包括 `Waypoint`、`RouteOptions`、`Directions` 和 `Route`。\n\n\
  `Waypoint` 是路线上的地点。当骑行或步行时，你最多可以设置 25 个途经点来规划方向。如果你正在驾驶，但不需要路线考虑交通状况，同样最多可以使用 25\
  \ 个途经点。如果你确实希望考虑交通状况，则只能使用两到三个途经点。\n\n`RouteOptions` 包含途经点以及所使用的交通方式——步行、骑行、驾驶或考虑交通状况的驾驶。这还包括规划路线时需要考虑的任何设置，例如避开收费站、渡轮或避免掉头。你也可以请求获取路线中每一程的单独步骤。\n\
  \n当我们在 `MapboxNavigation` 框架中使用逐向导航用户界面时，我们将使用 `RouteOptions` 的一个子类，名为 `NavigationRouteOptions`。\n\
  \n`Directions` 类代表 Directions API。通过使用该类的共享单例实例，你可以使用 `calculate(_:completionHandler:)`\
  \ 方法异步调用 API。将路线选项作为第一个参数传入，并将一个闭包作为第二个参数传入。\n\n最后，一次成功的路线查询调用会至少将一个路线作为参数传递给完成处理程序。如果路线有两个途经点，那么它会包含一程（一个\
  \ `RouteLeg` 对象），并且每增加一个途经点就会多出一程。\n\n综合以上所有内容，我们可以编写两个简单的方法来为我们的路线请求创建途经点，然后调用\
  \ directions API。\n\n第一个方法（清单 14-2）创建了途经点，本例中是从德克萨斯州奥斯汀到德克萨斯州圣安东尼奥的阿拉莫之旅。如果你愿意，也可以将用户的当前位置作为第一个途经点。\n\
  \n```\nfunc createWaypoints() -> [Waypoint] {\n    let austinCoordinate = CLLocationCoordinate2D(\n\
  \        latitude: 30.27, longitude: -97.74)\n    let alamoCoordinate = CLLocationCoordinate2D(\n\
  \        latitude: 29.426, longitude: -98.486)\n    let austin = Waypoint(coordinate:\
  \ austinCoordinate,\n                          name: \"Austin\")\n    let alamo\
  \ = Waypoint(coordinate: alamoCoordinate,\n                         name: \"The\
  \ Alamo\")\n    return [austin, alamo]\n}\n```\n\n将 `createWaypoints()` 方法添加到你的\
  \ `ViewController` 类中。你还可以看到构造一个途经点相当简单直接。\n\n清单 14-3 中的 `getDirections()` 方法将这些途经点传入一个新的\
  \ `RouteOptions` 实例，然后调用 Mapbox Directions API。如果你的项目中未正确设置 Mapbox 访问令牌，此操作将失败。然后我们遍历路线中唯\
  \ 一一程的每个步骤。如果我们有超过两个途经点，就会有额外的程。路线、程和步骤对象上有许多不同的属性，例如预估时间、以米为单位的距离以及方向（针对步骤），你可以自行查看——其中一些可能对自定义用户界面有用，而另一些可能不必要。\n\
  \n```\nfunc getDirections() {\n    let waypoints = createWaypoints()\n    let options\
  \ = RouteOptions(waypoints: waypoints,\n                               profileIdentifier:\
  \ .automobile)\n    options.includesSteps = true\n    Directions.shared.calculate(options)\
  \ {\n        (waypoints, routes, error) in\n        guard let route = routes?.first\
  \ else {\n            print(error ?? \"No Error\")\n            return\n       \
  \ }\n        guard let firstLeg = route.legs.first else {\n            return\n\
  \        }\n        print(firstLeg.name)\n        for step in firstLeg.steps {\n\
  \            print(step.instructions)\n        }\n    }\n}\n```\n\n尝试通过从你的 `viewDidLoad()`\
  \ 方法中调用 `getDirections()` 来使用此函数，然后在控制台中查看输出。\n\n你可以自行在以上函数的基础上进行构建，将路线中的坐标作为折线添加到你的\
  \ Mapbox 地图上。相反，我们将使用更简单的方法，即使用 `MapboxNavigation` 框架中预构建的逐向导航用户界面。\n\n### 显示导航用户界面\n\
  \n要显示默认的导航用户界面，我们需要创建一个 `NavigationViewController`，然后从我们的 `ViewController` 类中以模态方式呈现它。我们可以完全通过编程方式实现，也可以为导航视图控制器添加一个\
  \ storyboard 引用，然后在我们的视图控制器的 `prepareForSegue` 方法中进行配置。在此项目中，我们不会使用 storyboard。另外，为了清晰起见，这是一个与\
  \ Apple 的 `UIKit` 框架中的 `UINavigationController` 类不同且用途不同的类。\n\n我们将基于前面讨论的代码进行构建，但会做一些更改。例如，我们可以保留创建途经点的方式，但我们将使用\
  \ `NavigationRouteOptions` 类而不是 `RouteOptions`——导航路线选项带有针对逐向导航优化的配置。我们不会打印出某些路线属性，而是创建一个\
  \ `NavigationViewController` 类的实例，并将路线作为参数传入。创建该实例后，我们将其作为全屏视图控制器以模态方式呈现。在导航视图控制器底部有一个内置的关闭按钮，可以将用户返回到我们的原始视图控制器。\n\
  \n我们还借此机会为我们的路线请求添加一个功能，即避开收费站。你也可以选择避开渡轮、高速公路、限制通行的道路或隧道。所有这些都是通过 `MBRoadClasses`\
  \ 类枚举的。只能选择避开其中一项，不能组合，尽管 API 允许使用道路类的数组。\n\n清单 14-4 是我们的 `startNavigation()` 方法。你可以看到它在闭包中与现有的\
  \ `getDirections()` 方法的主要不同之处。\n\n```\nfunc startNavigation() {\n    let waypoints\
  \ = createWaypoints()\n    let options = NavigationRouteOptions(\n        waypoints:\
  \ waypoints)\n    options.roadClassesToAvoid = [.toll]\n    Directions.shared.calculate(options)\
  \ {\n        (waypoints, routes, error) in\n        guard let route = routes?.first\
  \ else {\n            print(error ?? \"No error\")\n            return\n       \
  \ }\n        let navVC = NavigationViewController(for: route)\n        navVC.modalPresentationStyle\
  \ = .fullScreen\n        self.present(navVC,\n                     animated: true,\n\
  \                     completion: nil)\n    }\n}\n```\n\n从你的 `viewDidLoad()` 方法中调用\
  \ `startNavigation()` 方法。你可以替换我们在第 13 章中创建的 `getDirections()` 方法。你将看到一个带有指令、预估到达时间和剩余距离的地图视图，类似于图\
  \ 14-3。\n\n![../images/485790_1_En_14_Chapter/485790_1_En_14_Fig3_HTML.jpg](img/485790_1_En_14_Fig3_HTML.jpg)\n\
  \n现在，用户界面已经启动并运行，探索一下它的工作原理——你可以在顶部向左或向右滑动，在路线的不同步骤之间切换。完成后，按下右下角的 x 按钮关闭导航视图控制器。\n\
  \n\n\n### 使用 Mapbox 模拟导航\n\n虽然你确实可以使用 GPX 文件在 iOS 模拟器上模拟导航，但你可能需要使用 Mapbox 为路线提供的模拟功能。这对于测试非常有用，因为它能严格遵循你指定的路线，并且允许你调整速度，如图\
  \ 14-4 所示。\n\n![../images/485790_1_En_14_Chapter/485790_1_En_14_Fig4_HTML.jpg](img/485790_1_En_14_Fig4_HTML.jpg)\n\
  \n*图 14-4 — 模拟导航，速度提升至正常速度的九倍*\n\n要使用 Mapbox 的模拟功能，你需要修改 `startNavigation()` 方法。你需要创建一个导航服务（`NavigationService`），用它来填充导航选项（`NavigationOptions`），然后将这些选项传递给\
  \ `NavigationViewController`，而不是仅仅将路线传给 `NavigationViewController`。\n\n导航服务（`MapboxNavigationService`）通过传入路线和\
  \ `simulating` 参数的 `.always` 枚举值进行实例化：\n\n```swift\nlet navService = MapboxNavigationService(\n\
  route: route, simulating: .always)\n```\n\n使用该导航服务创建 `NavigationOptions` 的实例：\n\n\
  ```swift\nlet navOptions = NavigationOptions(\nnavigationService: navService)\n\
  ```\n\n我们将把这些选项连同路线一起传递给导航视图控制器。使用导航模拟时，路线本身不会改变：\n\n```swift\nlet navVC = NavigationViewController(for:\
  \ route,\noptions: navOptions)\n```\n\n将上述代码行放入我们的 `startNavigation()` 方法中，并替换创建\
  \ Mapbox 导航视图控制器的调用，最终的方法如代码清单 14-5 所示。\n\n```swift\nfunc startNavigation() {\n\
  \    let waypoints = createWaypoints()\n    let options = NavigationRouteOptions(\n\
  \        waypoints:waypoints)\n    options.roadClassesToAvoid = [.toll]\n    Directions.shared.calculate(options)\
  \ {\n        (waypoints, routes, error) in\n        guard let route = routes?.first\
  \ else {\n            print(error ?? \"No error\")\n            return\n       \
  \ }\n        let navService = MapboxNavigationService(\n            route: route,\
  \ simulating: .always)\n        let navOptions = NavigationOptions(\n          \
  \  navigationService: navService)\n        let navVC = NavigationViewController(for:\
  \ route,\n                                             options: navOptions)\n  \
  \      navVC.modalPresentationStyle = .fullScreen\n        self.present(navVC,\n\
  \                     animated: true,\n                     completion: nil)\n \
  \   }\n}\n```\n\n*代码清单 14-5 — 使用模拟驾驶启动导航*\n\n将你的 `startNavigation()` 方法替换为代码清单 14-5\
  \ 中的 Swift 代码后，运行你的项目。你应该会看到从起点到终点之间的一段加速行驶的路线。\n\n### 自定义导航体验\n\n如果你不喜欢应用的显示效果，可以为用户界面创建自定义样式，包括日间和夜间模式。这些样式可以为地图图块使用你的\
  \ Mapbox 地图样式，也可以使用 `UIAppearance` 协议来设置单个用户界面元素的样式。例如，你可以使用此功能来匹配你品牌的颜色，使导航看起来与你的应用融为一体。\n\
  \n导航 SDK 还内置了许多其他功能，例如支持 CarPlay、语音选项以及确定途经点应使用的道路侧（对拼车或配送应用非常有用）。\n\n如果你愿意，可以使用\
  \ `MapboxCoreNavigation` 框架创建自己的导航用户界面。你需要监听 `routeControllerProgressDidChange`\
  \ 通知。这些通知包含 `RouteProgress` 类形式的更新位置信息，你可以用它来更新用户界面。你可以获取关于已行驶距离、剩余距离、剩余路段和步骤以及其他信息。你还可以获取关于当前路段和当前步骤进度的更细粒度信息。当前步骤的进度提供了关于下一个路口、到下一个路口的距离、用户到下一个操作的距离等信息，以及其他可用于构建用户界面的信息。\n\
  \n### 结论\n\n如果逐向导航用户体验对你的应用有所帮助，那么使用 Mapbox 预构建的组件可以非常轻松地实现。与在其他方向 API 之上构建你自己的解决方案相比，你可以为用户提供更简单的体验，并且在你的应用中维护更少的代码。\n\
  \n在第 15 章中，我们将探讨 Mapbox 的离线地图功能——这是 Mapbox 提供而其他地图 SDK 无法复制的技术解决方案之一。\n\n"
- "# 15. 使用 Mapbox 离线地图\n\n许多移动应用程序需要在蜂窝网络覆盖不佳或没有覆盖的区域工作。作为一名开发者，如果你想提供地图功能，有几种方法可以实现，但最好的方法是使用一个既支持在线也支持离线使用的地图框架。适用于\
  \ iOS 的 Mapbox SDK 提供了下载离线地图图块并将其存储在用户手机上以供日后在地图视图中使用的功能。我曾使用此离线功能为新疆西哥山脉创建了一款徒步应用，并为在公路旅行中使用\
  \ iPad 的儿童提供地图。\n\n在本章中，我们将使用 Mapbox 地图的离线包技术下载地图的一个区域以供离线使用。然后，你可以尝试将手机设置为飞行模式，以查看应用如何处理离线图块。\n\
  \n与其他地图 API 一样，请查看离线地图图块的价格，并确保它符合你的使用场景。\n\n## 设置你的应用程序项目\n\n本项目基于第 11 章中 Mapbox\
  \ 的基础知识，包括设置项目和获取访问令牌。在 Xcode 中创建一个新项目，命名为 `OfflineMapsApp`。如果你愿意，也可以重用第 11 章中的\
  \ `FirstMapboxApp` 项目。\n\n该项目将是一个使用 Swift 和故事板的单视图应用程序（Single View Application），与我们之前的所有项目类似。\n\
  \n在你的项目目录中运行 `pod init` 以生成 `Podfile`。将 Mapbox SDK 添加到你的 CocoaPods 文件中，如代码清单 15-1\
  \ 所示。\n\n```ruby\ntarget 'OfflineMapsApp' do\n  use_frameworks!\n  # Pods for OfflineMapsApp\n\
  \  pod 'Mapbox-iOS-SDK', '~> 5.8'\nend\n```\n\n*代码清单 15-1 — 离线地图应用的 Podfile*\n\n\
  现在运行 `pod install` 来为你的项目设置 Mapbox SDK。从现在开始，请使用 Xcode 打开工作区文件，而不是项目文件。\n\n将你的 Mapbox\
  \ 访问令牌作为 `MGLMapboxAccessToken` 条目添加到 `Info.plist` 文件中。同时，向视图控制器添加一个 Mapbox 地图视图。在视图控制器中创建一个名为\
  \ `mapView` 的插座变量。你还应该在视图控制器类的顶部导入 `Mapbox` 框架。\n\n所有这些在第 11 章中都有更详细的介绍，因此如果你想查看这些步骤的更具体说明，请先按照那一章进行操作。\n\
  \n\n\n## 了解离线地图下载\n\n大多数地图引擎，无论是在 Web 端还是移动端，都会缓存已下载的地图瓦片，以提供更好的性能或降低带宽成本。例如，在适用于\
  \ iOS 的 Mapbox SDK 中，该缓存将包含最多 50 MB 的瓦片或样式信息。Mapbox 更进一步，允许作为开发者的你创建一个由 `MGLOfflinePack`\
  \ 类表示的离线地图瓦片包。你的应用会根据你选择的地理坐标和缩放级别从 Mapbox 下载地图瓦片。这种组合被称为区域（region），并且可以与 `MGLOfflineRegion`\
  \ 协议一起使用。该协议的唯一实现位于 `MGLTilePyramidOfflineRegion` 类中。\n\n在地图瓦片下载过程中，你的应用可以处理状态更新，这样你就能了解下载的进度以及何时完成。Mapbox\
  \ 会触发多个可供观察的通知。离线包就是通知中的 `userInfo` 变量。每个离线包都有一个关联的 `progress` 变量，其中包含 `MGLOfflinePackProgress`\
  \ 结构体。通过此结构体，你可以获取已下载的资源数量、已下载的字节数、已下载的瓦片数量，以及待下载资源的最小和最大数量。这样，你就可以为用户提供一个进度条、一个带有进度消息的旋转指示器，或其他任何方式，来告知他们下载进度。\n\
  \n### 估算使用的瓦片数量\n\n在创建应用时，请务必注意你将允许用户下载的最大瓦片数量，尤其当你开发面向大众市场的应用并且免费提供时。默认情况下，Mapbox\
  \ 允许每个用户下载最多 6000 个地图瓦片，但你可以覆盖此设置并下载更多。\n\n如果你对为用户提供多少瓦片没有很好的概念，可以尝试使用 Mapbox 的离线瓦片数量估算工具（图\
  \ 15-1），访问地址为 [`https://docs.mapbox.com/playground/offline-estimator/`](https://docs.mapbox.com/playground/offline-estimator/)。\n\
  \n![../images/485790_1_En_15_Chapter/485790_1_En_15_Fig1_HTML.jpg](img/485790_1_En_15_Fig1_HTML.jpg)\n\
  \n图 15-1\n\nMapbox 离线瓦片数量估算器\n\n由于 Mapbox 使用矢量瓦片，你可以让应用缩放到低于你下载的最大缩放设置的级别。例如，你可以为德克萨斯州中部这个区域下载离线地图瓦片，从最小缩放级别\
  \ 5 到最大缩放级别 12。\n\n你的地图仍然可以进一步缩放到 13 或 14 级；只是会缺少这些级别的任何额外细节。Mapbox 矢量瓦片的最大缩放级别是\
  \ 16，因此你不能请求超过该级别的瓦片。\n\n## 下载离线地图包\n\n下载离线地图包的第一步是定义该区域的地理边界。这可以是一个已定义的区域，带有东北角和西南角，或者你也可以直接使用地图视图中当前显示的地图的边界。\n\
  \n要创建你自己的边界，请根据代码清单 15-2 中的代码，在你的 `ViewController` 类中创建一个函数。这些坐标定义了德克萨斯州中部的一个区域，与我们用于离线地图瓦片估算器的坐标相同。\n\
  \n```\nfunc createOfflineRegionBounds() -> MGLCoordinateBounds {\n    let southwest\
  \ = CLLocationCoordinate2D(\n        latitude: 28.822,\n        longitude: -99.5934)\n\
  \    let northeast = CLLocationCoordinate2D(\n        latitude: 30.8611,\n     \
  \   longitude: -96.6051)\n    return MGLCoordinateBounds(sw: southwest,\n      \
  \                         ne: northeast)\n}\n```\n\n代码清单 15-2  \n创建离线区域边界\n\n上述方法返回一个\
  \ `MGLCoordinateBounds` 结构体。你也可以调用 `mapView.visibleCoordinateBounds` 来获取地图视图中显示的地图的边界。你可能知道你的应用服务于特定地理区域，在这种情况下，你可能希望定义固定坐标。或者，你可以让用户自行在地图上选择一个区域，然后点击下载按钮，来决定下载哪些瓦片。\n\
  \n一旦你有了边界集，就可以创建一个 `MGLTilePyramidOfflineRegion` 区域。这是你可以创建的唯一种类的离线区域。它需要边界、最小地图缩放级别、最大地图缩放级别以及要使用的地图样式。通常，你会使用与地图视图相同的地图样式，但如果你愿意，也可以指定另一个样式\
  \ URL。\n\n创建区域的一个示例如下：\n\n```\nlet region = MGLTilePyramidOfflineRegion(\n    styleURL:\
  \ mapView.styleURL,\n    bounds: bounds,\n    fromZoomLevel: 5,\n    toZoomLevel:\
  \ 8)\n```\n\n我们将在下载离线地图包的方法中使用此代码片段，所以暂时不要将其放入你的类中。\n\n下一步是添加一个离线地图包。`MGLOfflineStorage`\
  \ 类是一个单例（通过 `MGLOfflineStorage.shared` 访问），你可以调用其上的 `addPack` 方法。该方法接受区域、上下文（context）和一个完成处理程序。`context`\
  \ 参数是一个通用存储变量，接受一个 `Data` 实例。你可以将任何你喜欢的内容放入上下文中。我们将采用简单的方法，将一个字符串作为上下文存储，并使用 UTF-8\
  \ 编码。完成处理程序将离线包和一个错误作为可选参数。一旦你获取到离线包，就在该包上调用 `resume()` 方法来启动下载过程。\n\n下载离线地图包的完整方法如代码清单\
  \ 15-3 所示。将 `downloadOfflineMapPack()` 方法添加到你的 `ViewController` 类中。要测试你的代码，请在 `viewDidLoad()`\
  \ 方法的末尾调用此方法。\n\n```\nfunc downloadOfflineMapPack() {\n    let bounds = createOfflineRegionBounds()\n\
  \    let region = MGLTilePyramidOfflineRegion(\n        styleURL: mapView.styleURL,\n\
  \        bounds: bounds,\n        fromZoomLevel: 5,\n        toZoomLevel: 8)\n \
  \   let packName = \"Central Texas\"\n    guard let nameData = packName.data(using:\
  \ .utf8) else {\n        return\n    }\n    MGLOfflineStorage.shared.addPack(\n\
  \        for: region,\n        withContext: nameData) { (pack, error) in\n     \
  \       guard let pack = pack else {\n                print(\"Unable to create pack\"\
  )\n                print(error?.localizedDescription ??\n                    \"\
  No error given\")\n                return\n            }\n            pack.resume()\n\
  \    }\n}\n```\n\n代码清单 15-3  \n下载离线地图包\n\n你可以指定自己的离线地图包名称；它仅用于你项目的引用。你可以在此存储一个 GUID\
  \ 或一个名称/值属性的字典。\n\n通常，你会希望了解下载过程何时完成，或者你可能想向用户显示进度。让我们来看看当 Mapbox SDK 下载离线地图包时发送的通知。\n\
  \n如果你想了解各个部分是如何组合在一起的，视图控制器的完整代码见代码清单 15-4。\n\n\n\n### 监控离线地图包下载\n\n离线地图下载器会发送三种不同的通知。这些是标准的\
  \ iOS 通知，通过 `NotificationCenter` 进行监控，请勿与推送通知混淆：\n\n-   `MGLOfflinePackProgressChanged`\n\
  -   `MGLOfflinePackError`\n-   `MGLOfflinePackMaximumMapboxTilesReached`\n\n让我们重点关注进度变更通知。我们需要在\
  \ `viewDidLoad()` 方法中订阅这些进度变更通知。将以下代码片段中的代码添加到您的 `viewDidLoad()` 方法中：\n\n```\nNotificationCenter.default.addObserver(\n\
  self,\nselector: #selector(offlinePackProgressChanged),\nname: NSNotification.Name.MGLOfflinePackProgressChanged,\n\
  object: nil)\n```\n\n我们还需要定义 `offlinePackProgressChanged` 方法，并确保它具有 `@objc` 注解。将以下函数定义添加到您的类中：\n\
  \n```\n@objc func offlinePackProgressChanged(\nnotification: NSNotification) {\n\
  print(\"Offline pack progress changed\")\n}\n```\n\n如果您继续在 `viewDidLoad()` 方法中添加通知观察者，然后添加\
  \ `offlinePackProgressChanged()` 方法，并在模拟器中运行应用程序，您将看到大量打印语句，表明某些事情正在发生！\n\n如果我们想获取更多详细信息，可以从通知中获取。通知的可选\
  \ `object` 属性就是离线包。离线包有一个名为 `progress` 的属性，它是一个 `MGLOfflinePackProgress` 结构体。让我们将已完成的字节数打印到控制台：\n\
  \n```\n@objc func offlinePackProgressChanged(\nnotification: NSNotification) {\n\
  guard let pack = notification.object\nas? MGLOfflinePack else {\nreturn\n}\nprint(\"\
  Offline pack progress changed\")\nprint(pack.progress.countOfBytesCompleted)\n}\n\
  ```\n\n修改函数以显示这些信息，将使我们能更多地了解应用程序的进度，但当然还不能直接呈现给最终用户。他们可能更希望看到某种百分比，以便知道距离完成还有多远。您可以通过进度视图来实现这一点，但现在我们只是简单地将百分比打印到控制台。将以下代码添加到\
  \ `offlinePackProgressChanged` 方法的末尾：\n\n```\nlet percentageResources = Int(round(100\
  \ *\nFloat(progress.countOfResourcesCompleted) /\nFloat(progress.countOfResourcesExpected)))\n\
  print(\"Resources: \\(percentageResources)%\")\n```\n\n要将其与进度视图一起使用，您可以简单地将进度视图的进度值设置为已完成的资源数量除以期望的资源数量：\n\
  \n```\nprogressView.progress = Float(progress.countOfResourcesCompleted) /\nFloat(progress.countOfResourcesExpected)))\n\
  ```\n\n一旦完成的资源数量等于期望的数量，您可以使用计时器取消进度条，并可选地弹出一个警告视图。\n\n当我们组合所有代码后，最终会得到一个视图控制器类，该类将显示一个\
  \ Mapbox 地图，但所有下载进度都将显示在控制台上以进行调试。`ViewController` 类的完整代码清单如代码清单 15-4 所示。\n\n```\n\
  import UIKit\nimport Mapbox\nclass ViewController: UIViewController {\n@IBOutlet\
  \ weak var mapView: MGLMapView!\nvar progressView: UIProgressView!\noverride func\
  \ viewDidLoad() {\nsuper.viewDidLoad()\n// 加载视图后进行任何其他设置\nmapView.centerCoordinate\
  \ = CLLocationCoordinate2D(\nlatitude: 30.2,\nlongitude: -97.75)\nmapView.zoomLevel\
  \ = 10\nmapView.styleURL = MGLStyle.outdoorsStyleURL\nNotificationCenter.default.addObserver(\n\
  self,\nselector: #selector(offlinePackProgressChanged),\nname: NSNotification.Name.MGLOfflinePackProgressChanged,\n\
  object: nil)\ndownloadOfflineMapPack()\n}\n@objc func offlinePackProgressChanged(\n\
  notification: NSNotification) {\nguard let pack = notification.object\nas? MGLOfflinePack\
  \ else {\nreturn\n}\nlet progress = pack.progress\nprint(\"Offline pack progress\
  \ changed\")\nprint(progress.countOfBytesCompleted)\nlet percentageResources = Int(round(100\
  \ *\nFloat(progress.countOfResourcesCompleted) /\nFloat(progress.countOfResourcesExpected)))\n\
  print(\"Resources: \\(percentageResources)%\")\n}\nfunc createOfflineRegionBounds()\
  \ -> MGLCoordinateBounds {\nlet southwest = CLLocationCoordinate2D(\nlatitude: 28.822,\n\
  longitude: -99.5934)\nlet northeast = CLLocationCoordinate2D(\nlatitude: 30.8611,\n\
  longitude: -96.6051)\nreturn MGLCoordinateBounds(sw: southwest,\nne: northeast)\n\
  }\nfunc downloadOfflineMapPack() {\nlet bounds = createOfflineRegionBounds()\nlet\
  \ region = MGLTilePyramidOfflineRegion(\nstyleURL: mapView.styleURL,\nbounds: bounds,\n\
  fromZoomLevel: 5,\ntoZoomLevel: 8)\nlet packName = \"Central Texas\"\nguard let\
  \ nameData = packName.data(using: .utf8) else {\nreturn\n}\nMGLOfflineStorage.shared.addPack(\n\
  for: region,\nwithContext: nameData) { (pack, error) in\nguard let pack = pack else\
  \ {\nprint(\"Unable to create pack\")\nprint(error?.localizedDescription ??\n\"\
  No error given\")\nreturn\n}\npack.resume()\n}\n}\n}\n代码清单 15-4\n完整的 ViewController\
  \ 类\n```\n\n### 使用离线地图磁贴的注意事项\n\n当您设置应用程序使用离线地图磁贴时，需要考虑几个限制。首先是定价。确保您了解每个用户将下载多少磁贴，以及这如何符合您的预算。使用这个数字来驱动最大缩放级别或地图区域的最大尺寸。同时还要考虑用户执行下载需要多长时间。如果在下载地图磁贴时阻止用户继续使用应用程序，请提供进度条或其他用户界面。如果地图磁贴数量很大，请告知用户他们应该在可以访问无线以太网时自行启动此过程，除非他们愿意承担运营商的高额带宽费用。\n\
  \nMapbox 对用户可以下载的地图磁贴数量提供了一些软限制。目前，所有下载区域的地图磁贴总数限制为 6000 个，但您可以通过调用 `MGLOfflineStorage`\
  \ 类上的 `setMaximumAllowedMapboxTiles` 方法来自行提高此限制。一旦您触及内置限制或您自己设置的限制，Mapbox SDK 将发布\
  \ `MGLOfflinePackMaximumMapboxTilesReached` 通知。您可以像监听离线地图磁贴下载进度一样来监听此通知。如果达到限制，您的应用程序将需要删除现有的离线地图包，才能继续将地图磁贴下载到新包中。\n\
  \n最后，Mapbox 不允许从应用程序重新分发离线地图磁贴（例如，分发到其他用户手机上的另一个应用程序副本），因此请阅读服务条款，以确保您的应用程序整体设计能与\
  \ Mapbox 的解决方案兼容。\n\n\n\n"
