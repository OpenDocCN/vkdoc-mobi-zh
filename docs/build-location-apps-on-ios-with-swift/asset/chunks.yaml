    \n**图 1-13** 在地图上显示奥斯丁图钉的完整 iOS 应用\n\n## 总结\n\n我们现在创建了一个在 iOS 应用的地图上显示图钉的程序。在此过程中，我们介绍了`MapKit`框架、地图视图和标注。\n\
