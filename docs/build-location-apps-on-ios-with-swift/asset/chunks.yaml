    the map will be much smoother if you have many annotations displayed on the map.


    ## Dequeuing and creating annotation views


    We can simplify the code in Listing [3-4](#485790_1_En_3_Chapter.xhtml#PC8) by
    letting the map view either dequeue a reusable annotation view or create a new
    annotation view for us automatically. Your code will need to register the annotation
    view class with the map view for the reuse identifier, using the `registerClass:forAnnotationViewWithReuseIdentifier:`
    function on the `MKMapView` class. Our code would use the following line of code
    in the `viewDidLoad()` method:


    ```

    mapView.register(MKPinAnnotationView.self, forAnnotationViewWithReuseIdentifier:
    "Pin")

    ```


    After registering the pin annotation view class with the map view, we can remove
    the pin annotation view creation code from the `viewFor()` method that we implemented
    in the `MKMapViewDelegate` extension . This leads to the simpler implementation
    shown in Listing [3-5](#485790_1_En_3_Chapter.xhtml#PC10).


    ```

    override func viewDidLoad() {

    ...

    mapView.register(MKPinAnnotationView.self,

    forAnnotationViewWithReuseIdentifier: "Pin")

    }

    func mapView(_ mapView: MKMapView,

    viewFor annotation: MKAnnotation) -> MKAnnotationView? {

    if annotation is MKUserLocation {

    return nil

    }

    let reuseId = "Pin"

    if let pin = mapView.dequeueReusableAnnotationView(

    withIdentifier: reuseId)

    as? MKPinAnnotationView {

    pin.annotation = annotation

    pin.pinTintColor = UIColor.blue

    return pin

    } else {

    return nil

    }

    }

    Listing 3-5

    Simplified annotation reuse and creation after registering annotation view with
    map view

    ```


    This has cleaned up our code considerably and would allow us to easily add additional
    annotation view types if we had multiple types of markers on our map.'
