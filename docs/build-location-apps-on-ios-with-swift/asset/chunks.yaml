- fmt: '# Installing the Google Maps SDK for iOS library


    Create a new iOS project in Xcode, named `GoogleMapsApp`, as a Single View Application
    with storyboards and Swift – similar to our other projects so far.


    Google Maps for iOS has two different paths for installation. One way is to do
    a manual installation, following the step-by-step directions on the Google Maps
    installation page (`https://developers.google.com/maps/documentation/ios-sdk/start#step_2_install_the_sdk`).
    This is fairly involved and probably only worthwhile if you cannot use the second
    path, which uses the CocoaPods dependency manager.


    CocoaPods is a dependency manager for iOS applications, similar to Homebrew for
    the Mac or Node Package Manager (NPM) for JavaScript. Instead of downloading libraries
    into your Xcode project and adding them manually, CocoaPods lets you declare which
    libraries your application uses, along with the versions, and then downloads and
    installs those libraries for you. This makes it much easier to upgrade frameworks
    and will help avoid issues where some libraries are incompatible with each other.


    If you don’t have CocoaPods installed on your system, it is distributed as a Ruby
    gem. You will need to install CocoaPods onto your Mac with this command:


    ```

    sudo gem install cocoapods

    ```


    Next, use the command line to navigate to the directory that contains your new
    Xcode project.


    In that directory, type the following command to create a CocoaPods `Podfile`.
    Podfiles contain the dependencies for your project:


    ```

    pod init

    ```


    Now look in that directory, and view the `Podfile` that `pod init` just created.
    It should look something similar to Listing [7-1](#485790_1_En_7_Chapter.xhtml#PC3).


    ```

    # Uncomment the next line to define a global platform for your project

    # platform :ios, ''9.0''

    target ''GoogleMapsApp'' do

    # Comment the next line if you don''t want to use dynamic frameworks

    use_frameworks!

    # Pods for GoogleMapsApp

    end

    ```


    Listing 7-1

    New CocoaPods Podfile for the Google Maps App


    So far, none of this has anything to do with Google Maps yet. We are going to
    add the `GoogleMaps` library as a dependency to our `Podfile`. Underneath the
    `# Pods for GoogleMapsApp` line, add the `GoogleMaps` pod. With the addition,
    your `Podfile` file should look like Listing [7-2](#485790_1_En_7_Chapter.xhtml#PC4).


    ```

    target ''GoogleMapsApp'' do

    # Comment the next line if you don''t want to use dynamic frameworks

    use_frameworks!

    # Pods for GoogleMapsApp

    pod ''GoogleMaps''

    end

    ```


    Listing 7-2

    CocoaPods Podfile with the GoogleMaps dependency


    Now that the dependency is in place, CocoaPods can download the latest version
    of the Google Maps SDK for us and set it up in our iOS application.


    Run the following command from the command line in the same directory that you
    ran `pod init`:


    ```

    pod install

    ```


    CocoaPods will install the GoogleMaps dependency, and it will also create an Xcode
    workspace for your application. This workspace will contain two targets – one
    for your application and one for the downloaded dependencies (called pods). You
    will need to open `GoogleMapsApp.xcworkspace` now, not `GoogleMapsApp.xcodeproj`,
    to build your application.


    With CocoaPods you can pin the version of Google Maps to a specific version (at
    the time of writing, 3.7.0), using semantic versioning. See the CocoaPods documentation
    at `https://cocoapods.org/` for more on how to use CocoaPods and Podfiles.


    Go ahead and open the workspace in Xcode. Try running the iOS application (`GoogleMapsApp`)
    on the Simulator or on your device. You will not see anything but a blank white
    screen, but if there are any compilation errors or other issues, this is a good
    time to debug them. For the next step, we will set up the Google Maps API Key,
    so that we can start to use Google’s Maps, Routing, and Places services.


    # Setting up a Google Maps API Key


    Before we go any further, you will need a Google Maps API Key. Sign up at `https://cloud.google.com/maps-platform`.


    When you enable the Google Maps Platform, check off the box for Maps, as shown
    in Figure [7-1](#485790_1_En_7_Chapter.xhtml#Fig1).


    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig1_HTML.jpg](images/485790_1_En_7_Chapter/485790_1_En_7_Fig1_HTML.jpg)


    Figure 7-1

    Enable the Google Maps Platform and select a product


    Click CONTINUE. On the next screen (Figure [7-2](#485790_1_En_7_Chapter.xhtml#Fig2)),
    create a new project named First Maps Project.


    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig2_HTML.jpg](images/485790_1_En_7_Chapter/485790_1_En_7_Fig2_HTML.jpg)


    Figure 7-2

    Create a new project for Google Cloud


    You will also need to set up a billing account for Google Maps, along with a credit
    card that Google can charge for usage over the free quota.


    After that process, Google will ask if you want to enable the Google Maps Platform
    for your new project, as shown in Figure [7-3](#485790_1_En_7_Chapter.xhtml#Fig3).
    Go ahead and click NEXT.


    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig3_HTML.jpg](images/485790_1_En_7_Chapter/485790_1_En_7_Fig3_HTML.jpg)


    Figure 7-3

    Enable Google Maps Platform APIs


    You will want to enable the Maps SDK for iOS – other platforms and services are
    available through the same interface.


    If you are having trouble getting an API Key for the Maps SDK, there are alternative
    directions on Google’s website: `https://developers.google.com/maps/documentation/ios-sdk/get-api-key`.


    Last, you will want to create an API key. Under the APIs section of the web interface,
    find Maps SDK for iOS. Select the Credentials tab, and then click the link for
    Credentials in APIs & Services. On that screen, select the CREATE CREDENTIALS
    button, as shown in Figure [7-4](#485790_1_En_7_Chapter.xhtml#Fig4), and then
    choose API key from the drop-down menu that appears.


    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig4_HTML.jpg](images/485790_1_En_7_Chapter/485790_1_En_7_Fig4_HTML.jpg)


    Figure 7-4

    Create Credentials for Google Maps Project


    The portal will create a new API Key for you, as seen in Figure [7-5](#485790_1_En_7_Chapter.xhtml#Fig5).
    You will have access to this key in the future, so you do not need to save it
    right away. What you do need to do is to restrict usage of this key to just your
    application. This will keep others from using your API key in their projects,
    which would affect your billing.


    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig5_HTML.jpg](images/485790_1_En_7_Chapter/485790_1_En_7_Fig5_HTML.jpg)


    Figure 7-5

    The Google Maps API Key creation dialog box


    Choose the RESTRICT KEY button on the dialog box in Figure [7-5](#485790_1_En_7_Chapter.xhtml#Fig5).
    The Restrictions page appears (Figure [7-6](#485790_1_En_7_Chapter.xhtml#Fig6)),
    with several selections to choose from. Restrict this key to iOS apps. Add an
    iOS bundle identifier for your application. For this project, the bundle identifier
    would be `com.buildingmobileapps.GoogleMapsApp`. Your bundle identifier may be
    different based on your organization.


    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig6_HTML.jpg](images/485790_1_En_7_Chapter/485790_1_En_7_Fig6_HTML.jpg)


    Figure 7-6

    Restrict the use of a Google Maps API Key


    Be sure to press the DONE button after adding your bundle identifier and then
    the Save button to persist your changes. After saving, you should see that restriction
    appear next to your iOS key, as in Figure [7-7](#485790_1_En_7_Chapter.xhtml#Fig7).


    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig7_HTML.jpg](images/485790_1_En_7_Chapter/485790_1_En_7_Fig7_HTML.jpg)


    Figure 7-7

    Restricted iOS Maps Key'
