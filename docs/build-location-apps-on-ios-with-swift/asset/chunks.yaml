    \  print(step.instructions)\n        }\n    }\n\n    func createMapItem(latitude:\
    \ Double, longitude: Double) -> MKMapItem {\n        let coord = CLLocationCoordinate2D(latitude:\
    \ latitude,\n                                           longitude: longitude)\n\
    \        let placemark = MKPlacemark(coordinate: coord)\n        return MKMapItem(placemark:\
    \ placemark)\n    }\n\n    func mapView(_ mapView: MKMapView, rendererFor overlay:\
    \ MKOverlay) -> MKOverlayRenderer {\n        let renderer = MKPolylineRenderer(overlay:\
    \ overlay)\n        renderer.strokeColor = .red\n        return renderer\n   \
    \ }\n\n    @IBAction func previous(_ sender: Any) {\n        if currentRoute ==\
    \ nil {\n            return\n        }\n        if (currentStepIndex <= 0) {\n\
    \            return\n        }\n        currentStepIndex -= 1\n        displayCurrentStep()\n\
    \    }\n\n    @IBAction func next(_ sender: Any) {\n        guard let currentRoute\
    \ = currentRoute else {\n            return\n        }\n        if (currentStepIndex\
    \ >= (currentRoute.steps.count - 1)) {\n            return\n        }\n      \
    \  currentStepIndex += 1\n        displayCurrentStep()\n    }\n\n    func displayCurrentStep()\
    \ {\n        guard let currentRoute = currentRoute else {\n            return\n\
    \        }\n        if (currentStepIndex >= currentRoute.steps.count) {\n    \
    \        return\n        }\n\n        let step = currentRoute.steps[currentStepIndex]\n\
    \        instructionsLabel.text = step.instructions\n        distanceLabel.text\
    \ = \"\\(step.distance) meters\"\n\n        if step.notice != nil {\n        \
    \    noticeLabel.isHidden = false\n            noticeLabel.text = step.notice\n\
    \        } else {\n            noticeLabel.isHidden = true\n        }\n\n    \
    \    previousButton.isEnabled = currentStepIndex > 0\n        nextButton.isEnabled\
    \ = currentStepIndex < (currentRoute.steps.count - 1)\n\n        let padding =\
    \ UIEdgeInsets(top: 40, left: 40, bottom: 40, right: 40)\n        mapView.setVisibleMapRect(step.polyline.boundingMapRect,\n\
    \                                  edgePadding: padding,\n                   \
    \               animated: true)\n    }\n}\n```\n\n**代码清单 5-2** 具有分步导航功能的 `ViewController`\
    \ 类\n"
- fmt: "# Next Steps\n\nThere are some improvements to be made to this code – you\
    \ could add a function that converts the distance to the correct units, or you\
    \ could allow the user to switch between different transportation types (automobile,\
    \ transit, or walking).\n\nYou could also combine this driving directions code\
    \ with the local search from the previous chapter to allow users to choose where\
    \ they want to go for directions.\n\n# Summary\n\nNow that you have some experience\
    \ with Apple’s map directions, you can see how you might use this inside your\
    \ own app, instead of sending the user to another application such as Apple Maps\
    \ or Google Maps.\n\nChapter [6](#485790_1_En_6_Chapter.xhtml) switches focus\
    \ away from maps, points of interest, and directions to geofencing. We will work\
    \ with the region monitoring APIs in the `CoreLocation` framework to detect when\
    \ a user enters or exits a given area, so that we can do something inside the\
    \ app.\n\n# 6. Working with Geofences in CoreLocation\n\nYou can support region\
    \ monitoring with geofences inside your iOS application with `CoreLocation`. iOS\
    \ has built-in region monitoring, meaning that your application does not have\
    \ to be in the foreground and also does not have to use excessive energy by continually\
    \ checking the user’s location.\n\n## Concepts for Region Monitoring\n\nConceptually\
    \ speaking, region monitoring is simple. Your application can specify up to 20\
    \ geofences (called regions in `CoreLocation`). Each region gets a unique identifier,\
    \ and you can specify whether or not the application is notified when the user\
    \ enters or exits each region. The `CoreLocation` Manager (`CLLocationManager`)\
    \ that we worked with in Chapter [2](#485790_1_En_2_Chapter.xhtml) can start and\
    \ stop monitoring individual regions. You can also get a list of the currently\
    \ monitored regions. Events for entering or exiting regions are delivered to the\
    \ location manager delegate, which is typically a view controller or the app delegate\
    \ class.\n\nThe difficulties of region monitoring lie in the nuances for monitoring\
    \ regions. For instance, region monitoring requires the always allow location\
    \ permission, but the user will only be prompted to allow the when in use location\
    \ permission the first time the application requests it. The always allow permission\
    \ will occur in a separate request for the user when one of the geofences sends\
    \ an enter or exit event to the application while it is running in the background.\n\
    \nThe end user does not need to accept the always allow location permission for\
    \ your application to monitor regions, but the triggers will only occur after\
    \ the end user allows permission. This will require you to educate the user as\
    \ to why they need to allow the application to have the always allow location\
    \ permission.\n\nIn addition to permissions, your application will not be instantly\
    \ notified when a user enters or exits a geofence. According to Apple, to avoid\
    \ sending too many notifications to your application, iOS will require a 20-second\
    \ wait and a minimum distance between when the region boundary was crossed and\
    \ when your application will receive a notification. If your regions are small\
    \ and the user is in a car, riding a bike, or even walking at a fast pace, they\
    \ could be past the region by the time they get the alert.\n\n## Setting Up Your\
    \ Location-Based Application\n\nThis chapter will build on the discussion of the\
    \ `CoreLocation` Manager from Chapter [2](#485790_1_En_2_Chapter.xhtml). We will\
    \ need to initialize a location manager, set the delegate, and request permission\
    \ to always get the user’s location.\n\nWe will also need to set a message in\
    \ the `Info.plist` file for each of two permissions:\n\n- `Privacy - Location\
    \ When In Use Usage Description` (`NSLocationWhenInUseUsageDescription`)\n- `Privacy\
    \ - Location Always and When In Use Usage Description` (`NSLocationAlwaysAndWhenInUseUsageDescription`)\n\
    \nIf you would like to know more about the location manager, delegate, and permissions,\
    \ please see Chapter [2](#485790_1_En_2_Chapter.xhtml).\n\nCreate another Swift\
    \ iOS project in Xcode with the Single View Application template. Name your application\
    \ `GeofencesApp`. Next, change your `ViewController` class to match Listing [6-1](#485790_1_En_6_Chapter.xhtml#PC1).\n\
    \n```\nimport UIKit\nimport CoreLocation\nclass ViewController: UIViewController\
    \ {\n    var locationManager: CLLocationManager!\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        locationManager = CLLocationManager.init()\n\
    \        locationManager.requestAlwaysAuthorization()\n    }\n}\n```\n\n**Listing\
    \ 6-1**  \nRequesting always allow location authorization with `CoreLocation`\n\
    \nWe will also need to set the text for the permissions in the `Info.plist` file\
    \ – we’ll tell the user we are going to be monitoring geofences.\n\nOpen the `Info.plist`\
    \ file in Xcode, and you will see the list of properties appear. Add entries for\
    \ the two location privacy explanations (`NSLocationWhenInUseUsageDescription`\
    \ and `NSLocationAlwaysAndWhenInUseUsageDescription`) as in Figure [6-1](#485790_1_En_6_Chapter.xhtml#Fig1).\n\
    \n![../images/485790_1_En_6_Chapter/485790_1_En_6_Fig1_HTML.jpg](images/485790_1_En_6_Chapter/485790_1_En_6_Fig1_HTML.jpg)\n\
    \n**Figure 6-1**  \nPermission description for Always and When in Use Location\
    \ Usage in the `Info.plist` file\n\nSo far, these are all steps you would need\
    \ to do for any iOS application that uses the user’s location. Let’s move on to\
    \ creating geofences.\n\n## Getting Started with Region Monitoring\n\nThe `CoreLocation`\
    \ location manager is responsible for monitoring geofences, and your application\
    \ is responsible for telling the manager which geofences to monitor. You can set\
    \ geofences programmatically in your application, in case you need to retrieve\
    \ them from a server, or let a user create their own geofences (for instance,\
    \ for their home, school, and work locations).\n\nThe first step is to ensure\
    \ that region monitoring is available for the region class you are using. In theory,\
    \ any class that subclasses `CLRegion` could be used, but in practice, the only\
    \ class that subclasses `CLRegion` in iOS 13 is `CLCircularRegion`, which draws\
    \ a radius around a coordinate. The `isMonitoringAvailable(for:)` static method\
    \ on the `CLLocationManager` takes a class as an argument, so you would typically\
    \ pass in `CLCircularRegion.self`. If monitoring is available, you can create\
    \ a region and then start monitoring it.\n\nTo create a circular region, you will\
    \ need a `CLLocationCoordinate2D` center coordinate with a latitude and a longitude,\
    \ a radius (in meters), and a unique string identifier. Using all of those to\
    \ construct a `CLCircularRegion` will be similar to this:\n\n```\nlet region =\
    \ CLCircularRegion(center: coord, radius: 100, identifier: \"Geofence1\")\n```\n\
    \nEach region has two Boolean properties for triggers – `notifyOnEntry` and `notifyOnExit`.\
    \ If both are set to false, the geofence won’t do anything. Both may be set to\
    \ true, or only one may be.\n\nAfter instantiating and configuring the region,\
    \ pass the region to an instance of the location manager with the `startMonitoring(for:)`\
    \ method.\n\nA complete Swift function that starts monitoring one geofence is\
    \ in Listing [6-2](#485790_1_En_6_Chapter.xhtml#PC3) – add this to your `ViewController`\
    \ class. You will want to modify the latitude and longitude in the geofence to\
    \ your location.\n\n```\nfunc monitorGeofences() {\n    if CLLocationManager.isMonitoringAvailable(for:\
    \ CLCircularRegion.self) {\n        let coord = CLLocationCoordinate2D(latitude:\
    \ 37.5, longitude: -110.2)\n        let region = CLCircularRegion(center: coord,\
    \ radius: 100, identifier: \"Geofence1\")\n        region.notifyOnEntry = true\n\
    \        region.notifyOnExit = true\n        locationManager.startMonitoring(for:\
    \ region)\n    }\n}\n```\n\n**Listing 6-2**  \nCreating a geofence to monitor\n\
    \nAs you can see in the preceding method, creating a region for a geofence and\
    \ telling iOS to monitor it for entries and exits is pretty straightforward. The\
    \ next part of this application will listen for changes in the user’s location\
    \ that will either take them into or out of the geofence."
  raw: '## Next steps


    There are some improvements to be made to this code – you could add a function
    that converts the distance to the correct units, or you could allow the user to
    switch between different transportation types (automobile, transit, or walking).


    You could also combine this driving directions code with the local search from
    the previous chapter to allow users to choose where they want to go for directions.


    ## Summary


    Now that you have some experience with Apple’s map directions, you can see how
    you might use this inside your own app, instead of sending the user to another
    application such as Apple Maps or Google Maps.


    Chapter [6](#485790_1_En_6_Chapter.xhtml) switches focus away from maps, points
    of interest, and directions to geofencing. We will work with the region monitoring
    APIs in the `CoreLocation` framework to detect when a user enters or exits a given
    area, so that we can do something inside the app.


    # 6. Working with Geofences in CoreLocation


    You can support region monitoring with geofences inside your iOS application with
    `CoreLocation`. iOS has built-in region monitoring, meaning that your application
    does not have to be in the foreground and also does not have to use excessive
    energy by continually checking the user’s location.


    ## Concepts for region monitoring


    Conceptually speaking, region monitoring is simple. Your application can specify
    up to 20 geofences (called regions in `CoreLocation`). Each region gets a unique
    identifier, and you can specify whether or not the application is notified when
    the user enters or exits each region. The `CoreLocation` Manager (`CLLocationManager`)
    that we worked with in Chapter [2](#485790_1_En_2_Chapter.xhtml) can start and
    stop monitoring individual regions. You can also get a list of the currently monitored
    regions. Events for entering or exiting regions are delivered to the location
    manager delegate, which is typically a view controller or the app delegate class.


    The difficulties of region monitoring lie in the nuances for monitoring regions.
    For instance, region monitoring requires the always allow location permission,
    but the user will only be prompted to allow the when in use location permission
    the first time the application requests it. The always allow permission will occur
    in a separate request for the user when one of the geofences sends an enter or
    exit event to the application while it is running in the background.


    The end user does not need to accept the always allow location permission for
    your application to monitor regions, but the triggers will only occur after the
    end user allows permission. This will require you to educate the user as to why
    they need to allow the application to have the always allow location permission.


    In addition to permissions, your application will not be instantly notified when
    a user enters or exits a geofence. According to Apple, to avoid sending too many
    notifications to your application, iOS will require a 20-second wait and a minimum
    distance between when the region boundary was crossed and when your application
    will receive a notification. If your regions are small and the user is in a car,
    riding a bike, or even walking at a fast pace, they could be past the region by
    the time they get the alert.


    ## Setting up your location-based application


    This chapter will build on the discussion of the `CoreLocation` Manager from Chapter
    [2](#485790_1_En_2_Chapter.xhtml). We will need to initialize a location manager,
    set the delegate, and request permission to always get the user’s location.


    We will also need to set a message in the `Info.plist` file for each of two permissions:


    *   Privacy - Location When In Use Usage Description (`NSLocationWhenInUseUsageDescription)`


    *   Privacy - Location Always and When In Use Usage Description (`NSLocationAlwaysAndWhenInUseUsageDescription)`


    If you would like to know more about the location manager, delegate, and permissions,
    please see Chapter [2](#485790_1_En_2_Chapter.xhtml).


    Create another Swift iOS project in Xcode with the Single View Application template.
    Name your application `GeofencesApp`. Next, change your `ViewController` class
    to match Listing [6-1](#485790_1_En_6_Chapter.xhtml#PC1).


    ```

    import UIKit

    import CoreLocation

    class ViewController: UIViewController {

    var locationManager:CLLocationManager!

    override func viewDidLoad() {

    super.viewDidLoad()

    locationManager = CLLocationManager.init()

    locationManager

    .requestAlwaysAuthorization ()

    }

    }

    Listing 6-1

    Requesting always allow location authorization with CoreLocation

    ```


    We will also need to set the text for the permissions in the `Info.plist` file –
    we’ll tell the user we are going to be monitoring geofences.


    Open the Info.plist file in Xcode, and you will see the list of properties appear.
    Add entries for the two location privacy explanations (`NSLocationWhenInUseUsageDescription`
    and `NSLocationAlwaysAndWhenInUseUsageDescription`) as in Figure [6-1](#485790_1_En_6_Chapter.xhtml#Fig1).


    ![../images/485790_1_En_6_Chapter/485790_1_En_6_Fig1_HTML.jpg](images/485790_1_En_6_Chapter/485790_1_En_6_Fig1_HTML.jpg)


    Figure 6-1


    Permission description for Always and When in Use Location Usage in the Info.plist
    file


    So far, these are all steps you would need to do for any iOS application that
    uses the user’s location. Let’s move on to creating geofences.


    ## Getting started with region monitoring


    The `CoreLocation` location manager is responsible for monitoring geofences, and
    your application is responsible for telling the manager which geofences to monitor.
    You can set geofences programmatically in your application, in case you need to
    retrieve them from a server, or let a user create their own geofences (for instance,
    for their home, school, and work locations).


    The first step is to ensure that region monitoring is available for the region
    class you are using. In theory, any class that subclasses `CLRegion` could be
    used, but in practice, the only class that subclasses `CLRegion` in iOS 13 is
    `CLCircularRegion`, which draws a radius around a coordinate. The `isMonitoringAvailable(for:)`
    static method on the `CLLocationManager` takes a class as an argument, so you
    would typically pass in `CLCircularRegion.self` . If monitoring is available,
    you can create a region and then start monitoring it.


    To create a circular region, you will need a `CLLocationCoordinate2D` center coordinate
    with a latitude and a longitude, a radius (in meters), and a unique string identifier.
    Using all of those to construct a `CLCircularRegion` will be similar to this:


    ```

    let region = CLCircularRegion(center: coord, radius: 100, identifier: "Geofence1")

    ```


    Each region has two Boolean properties for triggers – `notifyOnEntry` and `notifyOnExit`.
    If both are set to false, the geofence won’t do anything. Both may be set to true,
    or only one may be.


    After instantiating and configuring the region, pass the region to an instance
    of the location manager with the `startMonitoring(for:)` method.


    A complete Swift function that starts monitoring one geofence is in Listing [6-2](#485790_1_En_6_Chapter.xhtml#PC3) –
    add this to your `ViewController` class. You will want to modify the latitude
    and longitude in the geofence to your location.


    ```

    func monitorGeofences() {

    if CLLocationManager.isMonitoringAvailable(for: CLCircularRegion.self) {

    let coord = CLLocationCoordinate2D(latitude: 37.5, longitude: -110.2)

    let region = CLCircularRegion(center: coord, radius: 100, identifier: "Geofence1")

    region.notifyOnEntry = true

    region.notifyOnExit = true

    locationManager.startMonitoring(for: region)

    }

    }

    Listing 6-2

    Creating a geofence to monitor

    ```


    As you can see in the preceding method, creating a region for a geofence and telling
    iOS to monitor it for entries and exits is pretty straightforward. The next part
    of this application will listen for changes in the user’s location that will either
    take them into or out of the geofence.'
  trans: "\n# 后续步骤\n\n本段代码仍有改进空间——您可以添加一个将距离转换为正确单位的函数，或者允许用户在不同交通方式（汽车、公交或步行）之间切换。\n\
    \n您还可以将这段行车路线代码与上一章的本地搜索功能结合，让用户自行选择导航目的地。\n\n# 本章小结\n\n现在您已经对苹果地图导航有了一定了解，可以思考如何将其集成到自己的应用中，而不是将用户跳转到苹果地图或谷歌地图等其他应用程序。\n\
    \n第六章 6 将把关注点从地图、兴趣点和路线转向地理围栏。我们将使用 `CoreLocation` 框架中的区域监控 API 来检测用户进入或离开指定区域的时间，从而在应用内执行相应操作。\n\
    \n# 6. 在 CoreLocation 中使用地理围栏\n\n您可以通过 `CoreLocation` 在 iOS 应用中支持地理围栏区域监控。iOS\
    \ 内置的区域监控功能意味着您的应用无需保持前台运行，也无需持续检查用户位置而过度消耗电量。\n\n## 区域监控概念\n\n从概念上讲，区域监控非常简单。您的应用最多可以指定\
    \ 20 个地理围栏（在 `CoreLocation` 中称为区域）。每个区域都有唯一标识符，您可以指定当用户进入或离开每个区域时是否通知应用。我们在第二章\
    \ 2 中使用过的 `CoreLocation` 管理器（`CLLocationManager`）可以开始和停止监控单个区域。您还可以获取当前监控区域的列表。进入或离开区域的事件会传递给位置管理器委托，通常是一个视图控制器或应用委托类。\n\
    \n区域监控的难点在于其细节处理。例如，区域监控需要\"始终允许\"位置权限，但应用首次请求时仅会提示用户允许\"使用期间\"位置权限。当应用在后台运行时，若某个地理围栏触发进入或离开事件，系统才会向用户发起单独的\"\
    始终允许\"权限请求。\n\n终端用户无需为应用监控区域而接受\"始终允许\"位置权限，但相关触发事件仅在用户授予权限后才会生效。这就需要您向用户说明为何需要授予\"\
    始终允许\"位置权限。\n\n除了权限问题，用户进入或离开地理围栏时应用不会立即收到通知。根据苹果公司的说明，为避免向应用发送过多通知，iOS 要求至少在区域边界被跨越\
    \ 20 秒后，且应用与边界保持最小距离时，才会发送通知。如果您的区域范围较小，而用户正在驾车、骑行或快速步行，他们可能在收到警报时已经越过了该区域。\n\n\
    ## 设置基于位置的应用\n\n本章将在第二章 2 对 `CoreLocation` 管理器的讨论基础上进行扩展。我们需要初始化位置管理器、设置委托，并请求获取用户位置的始终权限。\n\
    \n我们还需要在 `Info.plist` 文件中为两种权限设置提示信息：\n\n- `隐私 - 使用期间位置使用说明`（`NSLocationWhenInUseUsageDescription`）\n\
    - `隐私 - 始终和使用期间位置使用说明`（`NSLocationAlwaysAndWhenInUseUsageDescription`）\n\n如果您想了解更多关于位置管理器、委托和权限的信息，请参阅第二章\
    \ 2。\n\n在 Xcode 中使用单视图应用模板创建另一个 Swift iOS 项目。将您的应用命名为 `GeofencesApp`。接下来，将您的 `ViewController`\
    \ 类修改为与列表 6-1 一致。\n\n```\nimport UIKit\nimport CoreLocation\nclass ViewController:\
    \ UIViewController {\n    var locationManager: CLLocationManager!\n    override\
    \ func viewDidLoad() {\n        super.viewDidLoad()\n        locationManager =\
    \ CLLocationManager.init()\n        locationManager.requestAlwaysAuthorization()\n\
    \    }\n}\n```\n\n**列表 6-1**  \n使用 `CoreLocation` 请求始终允许位置授权\n\n我们还需要在 `Info.plist`\
    \ 文件中设置权限提示文本——告诉用户我们将要监控地理围栏。\n\n在 Xcode 中打开 `Info.plist` 文件，您会看到属性列表。添加两个位置隐私说明条目（`NSLocationWhenInUseUsageDescription`\
    \ 和 `NSLocationAlwaysAndWhenInUseUsageDescription`），如图 6-1 所示。\n\n![../images/485790_1_En_6_Chapter/485790_1_En_6_Fig1_HTML.jpg](img/485790_1_En_6_Fig1_HTML.jpg)\n\
    \n**图 6-1**  \n`Info.plist` 文件中始终和使用期间位置使用的权限描述\n\n到目前为止，这些都是任何使用用户位置的 iOS 应用所需的步骤。接下来我们开始创建地理围栏。\n\
    \n## 区域监控入门\n\n`CoreLocation` 位置管理器负责监控地理围栏，而您的应用负责告知管理器要监控哪些地理围栏。您可以在应用中通过编程方式设置地理围栏，以便从服务器获取它们，或让用户创建自己的地理围栏（例如，针对他们的家、学校和工作地点）。\n\
    \n第一步是确保区域监控对您所使用的区域类可用。理论上，任何继承自 `CLRegion` 的类都可以使用，但在实践中，iOS 13 中唯一继承自 `CLRegion`\
    \ 的类是 `CLCircularRegion`，它在坐标周围绘制一个半径范围。`CLLocationManager` 上的静态方法 `isMonitoringAvailable(for:)`\
    \ 接受一个类作为参数，因此您通常会传入 `CLCircularRegion.self`。如果监控可用，您可以创建区域并开始监控。\n\n要创建圆形区域，您需要一个包含经纬度的\
    \ `CLLocationCoordinate2D` 中心坐标、一个半径（以米为单位）和一个唯一的字符串标识符。使用这些参数构造 `CLCircularRegion`\
    \ 的代码类似如下：\n\n```\nlet region = CLCircularRegion(center: coord, radius: 100, identifier:\
    \ \"Geofence1\")\n```\n\n每个区域有两个用于触发器的布尔属性——`notifyOnEntry` 和 `notifyOnExit`。如果两者都设置为\
    \ false，地理围栏将不会执行任何操作。两者可以都设置为 true，也可以只设置其中一个。\n\n实例化并配置区域后，使用 `startMonitoring(for:)`\
    \ 方法将区域传递给位置管理器的实例。\n\n一个完整的地理围栏监控 Swift 函数如列表 6-2 所示——请将其添加到您的 `ViewController`\
    \ 类中。您可能需要将地理围栏中的纬度和经度修改为您的位置。\n\n```\nfunc monitorGeofences() {\n    if CLLocationManager.isMonitoringAvailable(for:\
    \ CLCircularRegion.self) {\n        let coord = CLLocationCoordinate2D(latitude:\
    \ 37.5, longitude: -110.2)\n        let region = CLCircularRegion(center: coord,\
    \ radius: 100, identifier: \"Geofence1\")\n        region.notifyOnEntry = true\n\
    \        region.notifyOnExit = true\n        locationManager.startMonitoring(for:\
    \ region)\n    }\n}\n```\n\n**列表 6-2**  \n创建待监控的地理围栏\n\n如上述方法所示，为地理围栏创建区域并告知 iOS\
    \ 监控其进入和离开事件非常直接。该应用的下一部分将是监听用户位置的变化，这些变化将使监控进入或离开地理围栏。\n"
- fmt: "# Listening for Geofence Triggers\n\nAfter registering geofences with the\
    \ location manager, any entries or exits associated with that geofence will be\
    \ sent to the location manager’s delegate.\n\nStart by modifying the `viewDidLoad()`\
    \ method in the `ViewController` class to set the view controller as the location\
    \ manager’s delegate:\n\n```\nlocationManager.delegate = self\n```\n\nThe next\
    \ step is to create an extension for the `CLLocationManagerDelegate` protocol\
    \ at the end of the `ViewController.swift` source code file. Inside this extension,\
    \ we are going to implement the `locationManager(_ manager: didEnterRegion region:)`\
    \ and `locationManager(_ manager: didExitRegion region:)` methods.\n\nA basic\
    \ implementation of this extension is provided in Listing [6-3](#485790_1_En_6_Chapter.xhtml#PC5).\n\
    \n```\nextension ViewController : CLLocationManagerDelegate {\n    func locationManager(_\
    \ manager: CLLocationManager,\n                         didEnterRegion region:\
    \ CLRegion) {\n        print(\"Did enter \\(region.identifier)\")\n    }\n   \
    \ func locationManager(_ manager: CLLocationManager,\n                       \
    \  didExitRegion region: CLRegion) {\n        print(\"Did exit \\(region.identifier)\"\
    )\n    }\n}\nListing 6-3\nListening to geofence triggers for entering and exiting\
    \ regions\n```\n\nA more advanced usage of region monitoring might trigger business\
    \ logic within the application, for instance, offering a discount, popping up\
    \ a reminder from a to-do list, or offering to check you into a favored location.\
    \ These would all be based on the region’s identifier, which should be a unique\
    \ string. For instance, you may want to use a primary id from a database or the\
    \ id of an object retrieved from a RESTful resource on a server.\n\nIf you are\
    \ starting monitoring a region that has the same identifier as another region,\
    \ the existing region will be replaced. You can also monitor up to 20 regions\
    \ at a time, so take that into account when considering your overall system design\
    \ – you can’t monitor any more than that with iOS.\n\nYou can test this code in\
    \ the Simulator by changing the latitude and longitude of the simulated iPhone\
    \ to match the geofence. Under the **Features** menu of the iOS Simulator, choose\
    \ the **Location** submenu and then the **Custom Location…** menu item. The dialog\
    \ box in Figure [6-2](#485790_1_En_6_Chapter.xhtml#Fig2) will appear.\n\n![../images/485790_1_En_6_Chapter/485790_1_En_6_Fig2_HTML.jpg](images/485790_1_En_6_Chapter/485790_1_En_6_Fig2_HTML.jpg)\n\
    \nFigure 6-2 Custom Location dialog box in the iOS Simulator\n\nYou should see\
    \ a message in the output window of Xcode that says “Did enter Geofence1”. Change\
    \ the Location of the simulator to “City Run” or another built-in location, and\
    \ you will see a debug statement for leaving the geofence.\n\n# Displaying a Local\
    \ Notification Inside the App\n\nOne very common use case for geofences is to\
    \ display a local notification, even when the application is not active. To do\
    \ this, you will typically add functionality to the `AppDelegate` class, although\
    \ you can certainly encapsulate most of this into its own class, and then let\
    \ the app delegate call into that class to perform the functionality.\n\nWhen\
    \ working with local notifications, you will need to ask the user for permission\
    \ to display notifications (similar to the location permissions).\n\n## Setting\
    \ Up the Notification Center\n\nLet’s start by adding the imports we need to the\
    \ `AppDelegate` class:\n\n```\nimport CoreLocation\nimport UserNotifications\n\
    ```\n\nOnce we have those, we can set up our user notification center in the `application(_\
    \ application: didFinishLaunchingWithOptions)` method of the app delegate with\
    \ the following code:\n\n```\nUNUserNotificationCenter.current()\n    .requestAuthorization(\n\
    \        options: [.alert],\n        completionHandler: {allowed, error in })\n\
    UNUserNotificationCenter.current().delegate = self\n```\n\nHere, all we are doing\
    \ is requesting authorization from the user to display alerts for notifications.\
    \ We could also request sound and badge access if we needed it by adding those\
    \ to the options array. We do need to specify a completion handler, but it is\
    \ OK if it is empty.\n\nThe next line sets the delegate for the user notification\
    \ center. This is important for cases where the user enters or exits a geofence\
    \ while the application is in the foreground. We will need to implement the `userNotificationCenter(_\
    \ center: willPresent notification: completionHandler)` method of the `UNUserNotificationCenterDelegate`\
    \ delegate. Inside that method, we will only add one line, to handle the foreground\
    \ notifications the same way we would as if the app were running in the background\
    \ by displaying a notification alert. You could display an alert view here if\
    \ you wanted.\n\nTo implement this notification center delegate, add an extension\
    \ to the `AppDelegate` class, as shown in Listing [6-4](#485790_1_En_6_Chapter.xhtml#PC8).\n\
    \n```\nextension AppDelegate: UNUserNotificationCenterDelegate {\n    func userNotificationCenter(_\n\
    \                                center: UNUserNotificationCenter,\n         \
    \                       willPresent notification: UNNotification,\n          \
    \                      withCompletionHandler completionHandler:\n            \
    \                    @escaping (UNNotificationPresentationOptions) -> Void) {\n\
    \        completionHandler(.alert)\n    }\n}\nListing 6-4\nThe user notification\
    \ center delegate extension for handling foreground notifications\n```\n\nThis\
    \ was a lot of boilerplate for a simple function, but it’s essential if you want\
    \ your local notifications to work properly when the app is in the foreground.\n\
    \n## Displaying a Local Notification for a Region\n\nOur next step will be to\
    \ write a function that creates a local notification from a monitored region.\
    \ This function will take two arguments – a region and a Boolean for whether this\
    \ is an enter or exit notification.\n\nInside this function, we will create a\
    \ mutable notification content and set its title and body. We will also create\
    \ a trigger that will display the notification a second after it is requested\
    \ and a notification request that we will pass to the user notification center.\n\
    \nThe following `displayNotification()` function in Listing [6-5](#485790_1_En_6_Chapter.xhtml#PC9)\
    \ should be added to the `AppDelegate` class.\n\n```\nfunc displayNotification(_\
    \ region:CLRegion, isEnter:Bool) {\n    let content = UNMutableNotificationContent()\n\
    \    content.title = \"Update for \\(region.identifier)\"\n    content.body =\
    \ isEnter ? \"Did enter\" : \"Did exit\"\n    let trigger = UNTimeIntervalNotificationTrigger(\n\
    \        timeInterval: 1,\n        repeats: false)\n    let request = UNNotificationRequest(\n\
    \        identifier: region.identifier,\n        content: content,\n        trigger:\
    \ trigger)\n    UNUserNotificationCenter.current().add(request,\n            \
    \                               withCompletionHandler: nil)\n}\nListing 6-5\n\
    A function to display local notifications for a given monitored region\n```\n\n\
    Now that we have a way to create notifications from regions, we just need to listen\
    \ to region changes in the app delegate and then call this function."
  raw: '## Listening for geofence triggers


    After registering geofences with the location manager, any entries or exits associated
    with that geofence will be sent to the location manager’s delegate.


    Start by modifying the `viewDidLoad()` method in the `ViewController` class to
    set the view controller as the location manager’s delegate:


    ```

    locationManager.delegate = self

    ```


    The next step is to create an extension for the `CLLocationManagerDelegate` protocol
    at the end of the `ViewController.swift` source code file. Inside this extension,
    we are going to implement the `locationManager(_ manager: didEnterRegion region:)`
    and `locationManager(_ manager: didExitRegion region:)` methods.


    A basic implementation of this extension is provided in Listing [6-3](#485790_1_En_6_Chapter.xhtml#PC5).


    ```

    extension ViewController : CLLocationManagerDelegate {

    func locationManager(_ manager: CLLocationManager,

    didEnterRegion region: CLRegion) {

    print("Did enter \(region.identifier)")

    }

    func locationManager(_ manager: CLLocationManager,

    didExitRegion region: CLRegion) {

    print("Did exit \(region.identifier)")

    }

    }

    Listing 6-3

    Listening to geofence triggers for entering and exiting regions

    ```


    A more advanced usage of region monitoring might trigger business logic within
    the application, for instance, offering a discount, popping up a reminder from
    a to-do list, or offering to check you into a favored location. These would all
    be based on the region’s identifier, which should be a unique string. For instance,
    you may want to use a primary id from a database or the id of an object retrieved
    from a RESTful resource on a server.


    If you are starting monitoring a region that has the same identifier as another
    region, the existing region will be replaced. You can also monitor up to 20 regions
    at a time, so take that into account when considering your overall system design –
    you can’t monitor any more than that with iOS.


    You can test this code in the Simulator by changing the latitude and longitude
    of the simulated iPhone to match the geofence. Under the Features menu of the
    iOS Simulator, choose the Location submenu and then the Custom Location… menu
    item. The dialog box in Figure [6-2](#485790_1_En_6_Chapter.xhtml#Fig2) will appear.


    ![../images/485790_1_En_6_Chapter/485790_1_En_6_Fig2_HTML.jpg](images/485790_1_En_6_Chapter/485790_1_En_6_Fig2_HTML.jpg)


    Figure 6-2


    Custom Location dialog box in the iOS Simulator


    You should see a message in the output window of Xcode that says “Did enter Geofence1”.
    Change the Location of the simulator to “City Run” or another built-in location,
    and you will see a debug statement for leaving the Geofence.


    ## Displaying a local notification inside the app


    One very common use case for geofences is to display a local notification, even
    when the application is not active. To do this, you will typically add functionality
    to the `AppDelegate` class , although you can certainly encapsulate most of this
    into its own class, and then let the app delegate call into that class to perform
    the functionality.


    When working with local notifications, you will need to ask the user for permission
    to display notifications (similar to the location permissions).


    ### Setting up the notification center


    Let’s start by adding the imports we need to the `AppDelegate` class:


    ```

    import CoreLocation

    import UserNotifications

    ```


    Once we have those, we can set up our user notification center in the `application(_
    application: didFinishLaunchingWithOptions)` method of the app delegate with the
    following code:


    ```

    UNUserNotificationCenter.current()

    .requestAuthorization(

    options: [.alert],

    completionHandler: {allowed, error in })

    UNUserNotificationCenter.current().delegate = self

    ```


    Here, all we are doing is requesting authorization from the user to display alerts
    for notifications. We could also request sound and badge access if we needed it
    by adding those to the options array. We do need to specify a completion handler,
    but it is OK if it is empty.


    The next line sets the delegate for the user notification center. This is important
    for cases where the user enters or exits a geofence while the application is in
    the foreground. We will need to implement the `userNotificationCenter(_ center:
    willPresent notification: completionHandler)` method of the `UNUserNotificationCenterDelegate`
    delegate. Inside that method, we will only add one line, to handle the foreground
    notifications the same way we would as if the app were running in the background
    by displaying a notification alert. You could display an alert view here if you
    wanted.


    To implement this notification center delegate, add an extension to the `AppDelegate`
    class, as shown in Listing [6-4](#485790_1_En_6_Chapter.xhtml#PC8).


    ```

    extension AppDelegate: UNUserNotificationCenterDelegate {

    func userNotificationCenter(_

    center: UNUserNotificationCenter,

    willPresent notification: UNNotification,

    withCompletionHandler completionHandler:

    @escaping (UNNotificationPresentationOptions) -> Void) {

    completionHandler(.alert)

    }

    }

    Listing 6-4

    The user notification center delegate extension for handling foreground notifications

    ```


    This was a lot of boilerplate for a simple function, but it’s essential if you
    want your local notifications to work properly when the app is in the foreground.


    ### Displaying a local notification for a region


    Our next step will be to write a function that creates a local notification from
    a monitored region. This function will take two arguments – a region and a Boolean
    for whether this is an enter or exit notification.


    Inside this function, we will create a mutable notification content and set its
    title and body. We will also create a trigger that will display the notification
    a second after it is requested and a notification request that we will pass to
    the user notification center.


    The following `displayNotification()` function in Listing [6-5](#485790_1_En_6_Chapter.xhtml#PC9)
    should be added to the `AppDelegate` class.


    ```

    func displayNotification(_ region:CLRegion, isEnter:Bool) {

    let content = UNMutableNotificationContent()

    content.title = "Update for \(region.identifier)"

    content.body = isEnter ? "Did enter" : "Did exit"

    let trigger = UNTimeIntervalNotificationTrigger(

    timeInterval: 1,

    repeats: false)

    let request = UNNotificationRequest(

    identifier: region.identifier,

    content: content,

    trigger: trigger)

    UNUserNotificationCenter.current().add(request,

    withCompletionHandler: nil)

    }

    Listing 6-5

    A function to display local notifications for a given monitored region

    ```


    Now that we have a way to create notifications from regions, we just need to listen
    to region changes in the app delegate and then call this function.'
  trans: "\n# 监听地理围栏触发事件\n\n向位置管理器注册地理围栏后，任何与该地理围栏相关的进入或离开事件都将发送至位置管理器的委托对象。\n\n首先，在\
    \ `ViewController` 类中修改 `viewDidLoad()` 方法，将视图控制器设置为位置管理器的委托：\n\n```\nlocationManager.delegate\
    \ = self\n```\n\n下一步是在 `ViewController.swift` 源代码文件末尾为 `CLLocationManagerDelegate`\
    \ 协议创建扩展。在此扩展中，我们将实现 `locationManager(_ manager: didEnterRegion region:)` 和 `locationManager(_\
    \ manager: didExitRegion region:)` 方法。\n\n该扩展的基本实现如代码清单 6-3 所示。\n\n```\nextension\
    \ ViewController : CLLocationManagerDelegate {\n    func locationManager(_ manager:\
    \ CLLocationManager,\n                         didEnterRegion region: CLRegion)\
    \ {\n        print(\"已进入 \\(region.identifier)\")\n    }\n    func locationManager(_\
    \ manager: CLLocationManager,\n                         didExitRegion region:\
    \ CLRegion) {\n        print(\"已离开 \\(region.identifier)\")\n    }\n}\n代码清单 6-3\n\
    监听地理围栏的进入和离开触发事件\n```\n\n区域监控更高级的用法可触发应用程序内的业务逻辑，例如：提供折扣、弹出待办事项提醒或提示您签到常去地点。这些操作均应基于区域的标识符（该标识符应为唯一字符串）来实现。举例来说，您可能希望使用数据库中的主键或从服务器\
    \ RESTful 资源获取的对象 ID 作为标识符。\n\n如果您开始监控一个与现有区域具有相同标识符的新区域，则现有区域将被替换。此外，您一次最多可监控\
    \ 20 个区域，因此在设计整体系统时需考虑此限制——iOS 环境下无法监控超过此数量的区域。\n\n您可以在模拟器中通过修改模拟 iPhone 的经纬度以匹配地理围栏来测试上述代码。在\
    \ iOS 模拟器的 **Features** 菜单下，选择 **Location** 子菜单，然后选择 **Custom Location…** 菜单项。此时将出现如图\
    \ 6-2 所示的对话框。\n\n![../images/485790_1_En_6_Chapter/485790_1_En_6_Fig2_HTML.jpg](img/485790_1_En_6_Fig2_HTML.jpg)\n\
    \n图 6-2 iOS 模拟器中的自定义位置对话框\n\n您应在 Xcode 的输出窗口中看到一条信息，显示“已进入 Geofence1”。将模拟器的位置更改为“City\
    \ Run”或其他内置位置，您将看到一条离开地理围栏的调试信息。\n\n# 在应用内部显示本地通知\n\n地理围栏一个非常常见的用例是显示本地通知，即使应用处于非活跃状态也能生效。为此，您通常需要在\
    \ `AppDelegate` 类中添加功能，当然，您也可以将大部分功能封装到其自身的类中，然后让应用委托调用该类来执行功能。\n\n使用本地通知时，您需要请求用户授权以显示通知（类似于位置权限申请）。\n\
    \n## 设置通知中心\n\n首先，在 `AppDelegate` 类中添加所需的导入语句：\n\n```\nimport CoreLocation\nimport\
    \ UserNotifications\n```\n\n完成导入后，我们可以在应用委托的 `application(_ application: didFinishLaunchingWithOptions)`\
    \ 方法中通过以下代码设置用户通知中心：\n\n```\nUNUserNotificationCenter.current()\n    .requestAuthorization(\n\
    \        options: [.alert],\n        completionHandler: {allowed, error in })\n\
    UNUserNotificationCenter.current().delegate = self\n```\n\n此处，我们仅请求用户授权以显示通知提醒。如果需要，我们还可以通过将\
    \ `.sound` 和 `.badge` 添加到选项数组中来请求声音和角标权限。虽然必须指定一个完成处理程序，但保持其为空也是可以的。\n\n下一行设置了用户通知中心的委托。这对于应用在前台运行时用户进入或离开地理围栏的情况至关重要。我们需要实现\
    \ `UNUserNotificationCenterDelegate` 委托中的 `userNotificationCenter(_ center: willPresent\
    \ notification: completionHandler)` 方法。在该方法内部，我们只需添加一行代码，通过显示通知提醒来处理前台通知，其处理方式与应用在后台运行时相同。如果您愿意，也可以在此处显示一个警告视图。\n\
    \n要实现此通知中心委托，请为 `AppDelegate` 类添加一个扩展，如代码清单 6-4 所示。\n\n```\nextension AppDelegate:\
    \ UNUserNotificationCenterDelegate {\n    func userNotificationCenter(_\n    \
    \                            center: UNUserNotificationCenter,\n             \
    \                   willPresent notification: UNNotification,\n              \
    \                  withCompletionHandler completionHandler:\n                \
    \                @escaping (UNNotificationPresentationOptions) -> Void) {\n  \
    \      completionHandler(.alert)\n    }\n}\n代码清单 6-4\n用于处理前台通知的用户通知中心委托扩展\n```\n\
    \n对于一个简单的功能而言，这涉及了大量的样板代码，但如果您希望应用在前台时本地通知能正常工作，这一步骤是必不可少的。\n\n## 为特定区域显示本地通知\n\
    \n下一步，我们将编写一个函数，用于根据被监控的区域创建本地通知。该函数接受两个参数——一个区域和一个布尔值，用于指示这是进入还是离开通知。\n\n在该函数内部，我们将创建一个可变的通知内容对象，并设置其标题和正文。我们还将创建一个触发器，使通知在请求后一秒立即显示，以及一个将传递给用户通知中心的通知请求。\n\
    \n以下代码清单 6-5 中的 `displayNotification()` 函数应添加到 `AppDelegate` 类中。\n\n```\nfunc\
    \ displayNotification(_ region:CLRegion, isEnter:Bool) {\n    let content = UNMutableNotificationContent()\n\
    \    content.title = \"\\(region.identifier) 状态更新\"\n    content.body = isEnter\
    \ ? \"已进入\" : \"已离开\"\n    let trigger = UNTimeIntervalNotificationTrigger(\n\
    \        timeInterval: 1,\n        repeats: false)\n    let request = UNNotificationRequest(\n\
    \        identifier: region.identifier,\n        content: content,\n        trigger:\
    \ trigger)\n    UNUserNotificationCenter.current().add(request,\n            \
    \                               withCompletionHandler: nil)\n}\n代码清单 6-5\n为给定的被监控区域显示本地通知的函数\n\
    ```\n\n现在我们已经有了根据区域创建通知的方法，接下来只需在应用委托中监听区域变化，然后调用此函数即可。\n"
- fmt: '### Monitoring region changes in the app delegate


    Inside the app delegate, we will need to create another instance of a `CoreLocation`
    location manager. These location managers all share the same set of regions, even
    if the region was added to the location manager in the `ViewController` class.
    Add the location manager as a constant property on the `AppDelegate` class:


    ```

    let locationManager = CLLocationManager()

    ```


    Inside the `application(_ application: didFinishLaunchingWithOptions)` method,
    set the delegate of the location manager to self:


    ```

    locationManager.delegate = self

    ```


    Now we just need to implement the `CLLocationManagerDelegate` delegate as an extension
    in the `AppDelegate.swift` source code file, as shown in Listing [6-6](#485790_1_En_6_Chapter.xhtml#PC12).
    These two methods are identical to the ones we used earlier, in the basic region
    monitoring example. The difference is that instead of printing out a statement,
    the extension will call the `displayNotification(_ region: didEnter:)` method
    we wrote in the previous section.


    ```

    extension AppDelegate : CLLocationManagerDelegate {

    func locationManager(_ manager: CLLocationManager,

    didEnterRegion region: CLRegion) {

    self.displayNotification(region, isEnter: true)

    }

    func locationManager(_ manager: CLLocationManager,

    didExitRegion region: CLRegion) {

    self.displayNotification(region, isEnter: false)

    }

    }

    Listing 6-6

    CoreLocation location manager delegate that handles displaying notifications

    ```


    Now run your application from the Simulator, and try entering and exiting the
    geofenced area with the Custom Location tools under the Features menu and Location
    submenu of the Simulator. You should see something similar to Figure [6-3](#485790_1_En_6_Chapter.xhtml#Fig3).


    ![../images/485790_1_En_6_Chapter/485790_1_En_6_Fig3_HTML.jpg](images/485790_1_En_6_Chapter/485790_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    The iPhone Simulator displaying a local notification from a geofence


    You can continue to build on this example by implementing features to handle a
    user selecting a notification, either while the application is running or after
    the application has been terminated. Those are outside the scope of this book,
    with its focus on mapping and locations.


    ### Removing geofences from the app


    The location manager contains a set of geofences that are currently being monitored
    by the application. These regions are recreated every time the application loads
    and should be compared using the unique identifier, not an object comparison,
    as the instance may change between starting to monitor a region and retrieving
    a set of regions from the location manager. The name of the property of the location
    manager is `monitoredRegions`, and it consists of a set of `CLRegion` objects.


    If you would like to stop monitoring all geofences, you can simply iterate through
    the set of regions and then call the `stopMonitoring(for:)` method on the location
    manager:


    ```

    for region in locationManager.monitoredRegions {

    locationManager.stopMonitoring(for: region)

    }

    ```


    If you would like, you could compare the region’s identifier to a known set of
    identifiers you would either like to keep monitoring or you would like to stop
    monitoring and remove the geofences then.


    This wraps up our discussion of iOS region monitoring and geofences. This functionality
    is independent of any mapping technology used and can be used in both the foreground
    and background for iOS apps. The next chapter will show you how to use Google
    Maps for iOS, which is a similar technology to Apple’s `MapKit` framework. You
    can certainly use these geofences in an application that uses Google Maps.


    # 7. Displaying a Map with the Google Maps SDK


    Apple’s `MapKit` framework isn’t the only solution for mapping applications on
    iOS. Other providers offer mapping and routing technologies, including Google,
    Mapbox, Bing Maps by Microsoft, and ESRI’s ArcGIS. In this chapter, as well as
    the following chapters, we are going to work with the Google Maps SDK for iOS.
    For applications on multiple platforms, you can use Google Maps on the Web, Android,
    and iOS. This can provide consistency across your application. You may also want
    to use imagery from Google in your map or use Google’s driving directions or place
    information.


    This chapter contains all of the steps needed to work with Google Maps in an iOS
    app. The following chapters will build on the project we create in this chapter.


    ### Using the Google Maps Platform


    Working with the Google Maps SDK is similar to working with Apple’s `MapKit` framework,
    but there are a few differences. The first difference is that you will need to
    sign up with the Google Maps Platform. The second is that you will need to download
    the Google Maps library and integrate it into your Xcode project.


    Find out more about the Google Maps Platform at [`https://cloud.google.com/maps-platform/`](https://cloud.google.com/maps-platform/).


    Google Maps has pricing and billing associated with its features, unlike Apple’s
    Maps. At the time of writing (early 2020), Google offers $200/month (USD) of free
    credits for each user across Maps, Routes, and Places. In addition, at the time
    of writing, displaying maps inside a mobile application is free. These pricing
    offers could change at any time or be different outside the United States, so
    please check the pricing before signing up for the service.'
  raw: '### Monitoring region changes in the app delegate


    Inside the app delegate, we will need to create another instance of a `CoreLocation`
    location manager. These location managers all share the same set of regions, even
    if the region was added to the location manager in the `ViewController` class.
    Add the location manager as a constant property on the `AppDelegate` class:


    ```

    let locationManager = CLLocationManager()

    ```


    Inside the `application(_ application: didFinishLaunchingWithOptions)` method,
    set the delegate of the location manager to self:


    ```

    locationManager.delegate = self

    ```


    Now we just need to implement the `CLLocationManagerDelegate` delegate as an extension
    in the `AppDelegate.swift` source code file, as shown in Listing [6-6](#485790_1_En_6_Chapter.xhtml#PC12).
    These two methods are identical to the ones we used earlier, in the basic region
    monitoring example. The difference is that instead of printing out a statement,
    the extension will call the `displayNotification(_ region: didEnter:)` method
    we wrote in the previous section.


    ```

    extension AppDelegate : CLLocationManagerDelegate {

    func locationManager(_ manager: CLLocationManager,

    didEnterRegion region: CLRegion) {

    self.displayNotification(region, isEnter: true)

    }

    func locationManager(_ manager: CLLocationManager,

    didExitRegion region: CLRegion) {

    self.displayNotification(region, isEnter: false)

    }

    }

    Listing 6-6

    CoreLocation location manager delegate that handles displaying notifications

    ```


    Now run your application from the Simulator, and try entering and exiting the
    geofenced area with the Custom Location tools under the Features menu and Location
    submenu of the Simulator. You should see something similar to Figure [6-3](#485790_1_En_6_Chapter.xhtml#Fig3).


    ![../images/485790_1_En_6_Chapter/485790_1_En_6_Fig3_HTML.jpg](images/485790_1_En_6_Chapter/485790_1_En_6_Fig3_HTML.jpg)


    Figure 6-3


    The iPhone Simulator displaying a local notification from a geofence


    You can continue to build on this example by implementing features to handle a
    user selecting a notification, either while the application is running or after
    the application has been terminated. Those are outside the scope of this book,
    with its focus on mapping and locations.


    ## Removing geofences from the app


    The location manager contains a set of geofences that are currently being monitored
    by the application. These regions are recreated every time the application loads
    and should be compared using the unique identifier, not an object comparison,
    as the instance may change between starting to monitor a region and retrieving
    a set of regions from the location manager. The name of the property of the location
    manager is `monitoredRegions`, and it consists of a set of `CLRegion` objects.


    If you would like to stop monitoring all geofences, you can simply iterate through
    the set of regions and then call the `stopMonitoring(for:)` method on the location
    manager:


    ```

    for region in locationManager.monitoredRegions {

    locationManager.stopMonitoring(for: region)

    }

    ```


    If you would like, you could compare the region’s identifier to a known set of
    identifiers you would either like to keep monitoring or you would like to stop
    monitoring and remove the geofences then.


    This wraps up our discussion of iOS region monitoring and geofences. This functionality
    is independent of any mapping technology used and can be used in both the foreground
    and background for iOS apps. The next chapter will show you how to use Google
    Maps for iOS, which is a similar technology to Apple’s `MapKit` framework. You
    can certainly use these geofences in an application that uses Google Maps.


    # 7. Displaying a Map with the Google Maps SDK


    Apple’s `MapKit` framework isn’t the only solution for mapping applications on
    iOS. Other providers offer mapping and routing technologies, including Google,
    Mapbox, Bing Maps by Microsoft, and ESRI’s ArcGIS. In this chapter, as well as
    the following chapters, we are going to work with the Google Maps SDK for iOS.
    For applications on multiple platforms, you can use Google Maps on the Web, Android,
    and iOS. This can provide consistency across your application. You may also want
    to use imagery from Google in your map or use Google’s driving directions or place
    information.


    This chapter contains all of the steps needed to work with Google Maps in an iOS
    app. The following chapters will build on the project we create in this chapter.


    ## Using the Google Maps Platform


    Working with the Google Maps SDK is similar to working with Apple’s `MapKit` framework,
    but there are a few differences. The first difference is that you will need to
    sign up with the Google Maps Platform. The second is that you will need to download
    the Google Maps library and integrate it into your Xcode project.


    Find out more about the Google Maps Platform at [`https://cloud.google.com/maps-platform/`](https://cloud.google.com/maps-platform/).


    Google Maps has pricing and billing associated with its features, unlike Apple’s
    Maps. At the time of writing (early 2020), Google offers $200/month (USD) of free
    credits for each user across Maps, Routes, and Places. In addition, at the time
    of writing, displaying maps inside a mobile application is free. These pricing
    offers could change at any time or be different outside the United States, so
    please check the pricing before signing up for the service.'
  trans: '好的，作为高级文档工程师和翻译员，我将严格按照您提供的注意事项和示例格式，将给定的英文文本翻译成中文。



    ### 在应用程序委托中监控区域变化


    在应用程序委托内部，我们需要创建另一个`CoreLocation`定位管理器的实例。即使该区域是在`ViewController`类中添加到此定位管理器的，这些定位管理器也都共享同一组区域。将定位管理器作为常量属性添加到`AppDelegate`类中：


    ```

    let locationManager = CLLocationManager()

    ```


    在`application(_ application: didFinishLaunchingWithOptions)`方法中，将定位管理器的委托设置为 self：


    ```

    locationManager.delegate = self

    ```


    现在，我们只需要在 `AppDelegate.swift` 源代码文件中，以扩展的形式实现 `CLLocationManagerDelegate` 委托，如代码清单
    6-6 所示。这两个方法与我们在前面的基本区域监控示例中使用的方法完全相同。区别在于，该扩展不会打印语句，而是会调用我们在上一节中编写的`displayNotification(_
    region: didEnter:)`方法。


    ```

    extension AppDelegate : CLLocationManagerDelegate {

    func locationManager(_ manager: CLLocationManager,

    didEnterRegion region: CLRegion) {

    self.displayNotification(region, isEnter: true)

    }

    func locationManager(_ manager: CLLocationManager,

    didExitRegion region: CLRegion) {

    self.displayNotification(region, isEnter: false)

    }

    }

    代码清单 6-6

    处理显示通知的 CoreLocation 定位管理器委托


    ```


    现在，在模拟器中运行你的应用程序，并使用模拟器“功能”菜单和“位置”子菜单下的“自定义位置”工具，尝试进入和退出地理围栏区域。你应该会看到类似于图 6-3
    的内容。


    ![../images/485790_1_En_6_Chapter/485790_1_En_6_Fig3_HTML.jpg](img/485790_1_En_6_Fig3_HTML.jpg)


    图 6-3


    iPhone 模拟器显示来自地理围栏的本地通知


    你可以继续在此示例的基础上进行构建，实现处理用户选择通知的功能，无论是在应用程序运行时还是在应用程序终止后。这些内容超出了本书的范围，本书主要关注地图和定位。


    ### 从应用程序中移除地理围栏


    定位管理器包含一组当前正在被应用程序监控的地理围栏。这些区域在每次应用程序加载时都会重新创建，并且应该使用唯一标识符进行比较，而不是进行对象比较，因为从开始监控区域到从定位管理器检索区域集合，其实例可能会发生变化。定位管理器的该属性名称为`monitoredRegions`，它由一组`CLRegion`对象组成。


    如果你想停止监控所有地理围栏，只需遍历区域集合，然后在定位管理器上调用`stopMonitoring(for:)`方法即可：


    ```

    for region in locationManager.monitoredRegions {

    locationManager.stopMonitoring(for: region)

    }

    ```


    如果你愿意，你可以将区域的标识符与一组已知的标识符进行比较，这些标识符是你希望继续监控的，或者是希望停止监控并随即移除的地理围栏。


    至此，我们关于 iOS 区域监控和地理围栏的讨论就结束了。此功能独立于所使用的任何地图技术，并且可以在 iOS 应用程序的前台和后台使用。下一章将向你展示如何使用适用于
    iOS 的 Google 地图，这是一种类似于 Apple `MapKit` 框架的技术。当然，你可以在使用 Google 地图的应用程序中使用这些地理围栏。


    # 7. 使用 Google Maps SDK 显示地图


    Apple 的 `MapKit` 框架并不是 iOS 上地图应用的唯一解决方案。其他提供商也提供地图和导航技术，包括 Google、Mapbox、微软的必应地图以及
    ESRI 的 ArcGIS。在本章及后续章节中，我们将使用适用于 iOS 的 Google Maps SDK。对于多平台应用，你可以在 Web、Android
    和 iOS 上使用 Google 地图。这可以为你的应用程序提供一致性。你可能还想在地图中使用 Google 的图像，或者使用 Google 的驾车路线或地点信息。


    本章包含了在 iOS 应用中使用 Google 地图所需的所有步骤。接下来的章节将基于我们在本章创建的项目进行构建。


    ### 使用 Google 地图平台


    使用 Google Maps SDK 与使用 Apple 的 `MapKit` 框架类似，但也有一些不同之处。第一个区别是你需要注册 Google 地图平台。第二个区别是你需要下载
    Google 地图库并将其集成到你的 Xcode 项目中。


    在 [`https://cloud.google.com/maps-platform/`](https://cloud.google.com/maps-platform/)
    上查找有关 Google 地图平台的更多信息。


    与 Apple 地图不同，Google 地图对其功能有相关的定价和计费。在撰写本文时（2020 年初），Google 为每位用户在地图、路线和地点方面提供每月
    200 美元（USD）的免费额度。此外，在撰写本文时，在移动应用程序中显示地图是免费的。这些定价优惠可能随时更改，或者在美国境外有所不同，因此在注册此服务之前请查看定价信息。

