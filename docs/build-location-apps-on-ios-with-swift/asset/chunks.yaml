- fmt: '# Display custom annotations


    As the `MapPoint` class implements the `MKAnnotation` protocol, your code simply
    needs to construct new `MapPoint` objects and then add them to the map view as
    annotations.


    We will create two points on the map, with generic titles and subtitles. Add the
    code in Listing [3-2](#485790_1_En_3_Chapter.xhtml#PC3) to the end of your `viewDidLoad()`
    method in the `ViewController` class.


    ```

    let point1 = MapPoint(

    coordinate: CLLocationCoordinate2D(latitude: 33.0,

    longitude: -97.0),

    title: "Point 1",

    subtitle: "Description 1"

    )

    mapView.addAnnotation(point1)

    let point2 = MapPoint(

    coordinate: CLLocationCoordinate2D(latitude: 32.0,

    longitude: -98.0),

    title: "Point 2",

    subtitle: "Description 2"

    )

    mapView.addAnnotation(point2)

    Listing 3-2

    Displaying custom annotations on a map view

    ```


    After adding this code and running your project, you will not see anything too
    different from our earlier chapters. We have not customized the view for the annotations
    yet.


    # Customizing pins for annotations


    The easiest way to change the view displayed for each annotation is to use the
    `MKPinAnnotationView` class. Your code can set the pin color in the `mapView(_:viewFor:)`
    function. This function comes from the `MKMapViewDelegate`, so you will need to
    set the delegate on the map view to either a custom class or to the current view
    controller. For the purposes of this chapter, we will create an extension to our
    view controller class that implements the `MKMapViewDelegate` protocol and then
    set the delegate on the map view in code, in the `viewDidLoad()` method.


    Add the following line of code to your `viewDidLoad()` method for the map view
    delegate (you can also set it in the storyboard, if you want):


    ```

    mapView.delegate = self

    ```


    Next, add an extension that implements the map view delegate to the bottom of
    your view controller class. We will add the `mapView(_:viewFor:)` function to
    this extension:


    ```

    extension ViewController:MKMapViewDelegate {

    }

    ```


    The `mapView(_:viewFor:)` function returns an `MKAnnotationView` for a given `MKAnnotation`
    instance. We will create a pin annotation view and then do a little customization
    by setting the pin color to blue, as shown in Listing [3-3](#485790_1_En_3_Chapter.xhtml#PC6).


    ```

    extension ViewController:MKMapViewDelegate {

    func mapView(_ mapView: MKMapView,

    viewFor annotation: MKAnnotation) ->

    MKAnnotationView? {

    let pin = MKPinAnnotationView(

    annotation: annotation,

    reuseIdentifier: "Pin")

    pin.pinTintColor = UIColor.blue

    return pin

    }

    }

    Listing 3-3

    Using a pin annotation view

    ```


    After including this code, you should see blue pins appear on the map in the state
    of Texas in the United States, as in Figure [3-1](#485790_1_En_3_Chapter.xhtml#Fig1).
    If you worked through Chapter [2](#485790_1_En_2_Chapter.xhtml) and used that
    as a base, you will also see a blue pin over your user location. Feel free to
    adjust the points added to the map for your own location, of course!


    ![../images/485790_1_En_3_Chapter/485790_1_En_3_Fig1_HTML.jpg](images/485790_1_En_3_Chapter/485790_1_En_3_Fig1_HTML.jpg)


    Figure 3-1


    Changing the annotations to display as blue pins


    Now that we’ve demonstrated basic view annotation features, let’s move on to some
    more advanced functionality. The first thing to change will be that the user’s
    location is now showing up as a pin.


    # Handling the user location


    We generally want to keep the user location displaying as a pulsating blue dot,
    as appears by default. In our code, we can check to see if the annotation we provide
    a view for is an `MKUserLocation` annotation – the current location of the user:


    ```

    if annotation is MKUserLocation {

    return nil

    }

    ```


    This check would typically be done at the beginning of the `mapView(_:viewFor:)`
    function. When you return `nil`, the map will display the default annotation view.


    Add the `MKUserLocation` check to the beginning of the `mapView(_:viewFor:)` method
    and then run the project again – the user location (if you have location enabled)
    will be the glowing blue dot, not a pin.


    # Reusing annotation views


    While this code works, it could be improved. Similar to table views and reusable
    table view cells, map views support reusable annotations.


    When working with annotation views, it’s important to use a reuse identifier.
    This allows the map view to recycle view objects as the user scrolls through the
    map. Some annotations will fall out of the visible rectangle of the map, and those
    views can be recycled for annotations that are now visible. Reusing these annotation
    views will allow for smooth scrolling, especially with large sets of annotations.


    The `MKMapView` class has a `dequeueReusableAnnotationView()` function that takes
    a reuse identifier as an argument. If an annotation view is waiting in the reuse
    queue, you will get that instance. Any customizations you need to make to that
    annotation view (for instance, setting the annotation to the current annotation)
    should be done inside an if let block that checks if an instance was available.


    If an instance wasn’t available in the reuse queue, you will need to create an
    annotation view and then properly configure it.


    We can improve our annotation view code from Listing [3-3](#485790_1_En_3_Chapter.xhtml#PC6)
    by reusing views if they are available. Replace the method you already created
    in the map view delegate extension with the code in Listing [3-4](#485790_1_En_3_Chapter.xhtml#PC8).
    We also include the check for the `MKUserLocation` annotation.


    ```

    func mapView(_ mapView: MKMapView, viewFor annotation: MKAnnotation)

    -> MKAnnotationView? {

    if annotation is MKUserLocation {

    return nil

    }

    let reuseId = "Pin"

    var pin: MKPinAnnotationView

    if let reusedPin =

    mapView.dequeueReusableAnnotationView(

    withIdentifier: reuseId)

    as? MKPinAnnotationView {

    pin = reusedPin

    pin.annotation = annotation

    } else {

    pin = MKPinAnnotationView(annotation: annotation,

    reuseIdentifier: reuseId)

    pin.pinTintColor = UIColor.blue

    }

    return pin

    }

    Listing 3-4

    Reusing annotation views

    ```


    While this code is more complicated than the previous code listing, scrolling
    the map will be much smoother if you have many annotations displayed on the map.


    # Dequeuing and creating annotation views


    We can simplify the code in Listing [3-4](#485790_1_En_3_Chapter.xhtml#PC8) by
    letting the map view either dequeue a reusable annotation view or create a new
    annotation view for us automatically. Your code will need to register the annotation
    view class with the map view for the reuse identifier, using the `registerClass:forAnnotationViewWithReuseIdentifier:`
    function on the `MKMapView` class. Our code would use the following line of code
    in the `viewDidLoad()` method:


    ```

    mapView.register(MKPinAnnotationView.self, forAnnotationViewWithReuseIdentifier:
    "Pin")

    ```


    After registering the pin annotation view class with the map view, we can remove
    the pin annotation view creation code from the `viewFor()` method that we implemented
    in the `MKMapViewDelegate` extension. This leads to the simpler implementation
    shown in Listing [3-5](#485790_1_En_3_Chapter.xhtml#PC10).


    ```

    override func viewDidLoad() {

    ...

    mapView.register(MKPinAnnotationView.self,

    forAnnotationViewWithReuseIdentifier: "Pin")

    }

    func mapView(_ mapView: MKMapView,

    viewFor annotation: MKAnnotation) -> MKAnnotationView? {

    if annotation is MKUserLocation {

    return nil

    }

    let reuseId = "Pin"

    if let pin = mapView.dequeueReusableAnnotationView(

    withIdentifier: reuseId)

    as? MKPinAnnotationView {

    pin.annotation = annotation

    pin.pinTintColor = UIColor.blue

    return pin

    } else {

    return nil

    }

    }

    Listing 3-5

    Simplified annotation reuse and creation after registering annotation view with
    map view

    ```


    This has cleaned up our code considerably and would allow us to easily add additional
    annotation view types if we had multiple types of markers on our map.'
