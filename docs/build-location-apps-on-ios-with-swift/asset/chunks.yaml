    # 1. Creating Your First MapKit App


    This book will be project based – starting out simple and then getting more complicated.
    With that in mind, our first iOS app will only be one screen that displays a map.
    That map will have one pin on it, with the location of my city, Austin, Texas.
    Feel free to use your own town for this example, of course!


    ## Getting started


    The first step is to make sure that you have a recent version of Xcode (at the
    time of writing, Xcode 11) installed on your Mac. If you’re using earlier versions
    of Xcode, this code may not compile, and you may not be able to follow directions.
    Xcode is free and may be downloaded from the Mac App Store or from Apple’s developer
    portal.


    We’ll also be using the Swift programming language, instead of Apple’s older programming
    language for iOS, Objective-C. Almost all of this book would be directly applicable
    to an Objective-C application. The underlying application programming interfaces
    (APIs) used in iOS are generally the same.


    The Swift language has been evolving since its first release. This book uses Swift
    5, which is supported in Xcode 10 and above.


    Go ahead and open up Xcode, and create a new application. We’ll be creating a
    new Single View Application (Figure [1-1](#485790_1_En_1_Chapter.xhtml#Fig1)).


    ![../images/485790_1_En_1_Chapter/485790_1_En_1_Fig1_HTML.jpg](images/485790_1_En_1_Chapter/485790_1_En_1_Fig1_HTML.jpg)


    Figure 1-1


    New project window in Xcode


    Click the Next button, and then name your new project on the options dialog, as
    seen in Figure [1-2](#485790_1_En_1_Chapter.xhtml#Fig2). I’m going to call the
    new application `FirstMapsApp` and give it an organization identifier of `com.buildingmobileapps.maps`
    and use my name for the Organization Name.


    ![../images/485790_1_En_1_Chapter/485790_1_En_1_Fig2_HTML.jpg](images/485790_1_En_1_Chapter/485790_1_En_1_Fig2_HTML.jpg)


    Figure 1-2


    New project options for an iOS app


    Be sure to choose Swift as the Language.


    For this project, we will not be using SwiftUI – we will be using UIKit as the
    application framework. Leave the SwiftUI check box unchecked.


    We do not need to include Core Data in our project – Core Data is an Apple technology
    used for storing data locally on iOS, and we won’t need it for this example. We
    won’t be using Core Data in this book.


    You can also uncheck Include Unit Tests and Include UI Tests, as we won’t be setting
    up any tests for this project.


    Click Next, and save the project in a convenient location. You can create a Git
    repository for your code if you want, but we won’t be directly addressing source
    control in this book. It’s always a good idea to keep up with Git commits as your
    project goes along, so that you can easily roll back to a working copy.


    After saving your project, Xcode will open your project and present an overview
    of your application (Figure [1-3](#485790_1_En_1_Chapter.xhtml#Fig3)).


    ![../images/485790_1_En_1_Chapter/485790_1_En_1_Fig3_HTML.jpg](images/485790_1_En_1_Chapter/485790_1_En_1_Fig3_HTML.jpg)


    Figure 1-3


    Project overview


    You should now have a working Xcode project – go ahead and run it in one of the
    iOS Simulators, for instance, the iPhone XR (Figure [1-4](#485790_1_En_1_Chapter.xhtml#Fig4)).


    ![../images/485790_1_En_1_Chapter/485790_1_En_1_Fig4_HTML.jpg](images/485790_1_En_1_Chapter/485790_1_En_1_Fig4_HTML.jpg)


    Figure 1-4


    New iOS application running in a simulator


    You should expect to see a blank screen, as we have not written any code for our
    application yet. If you do, your development environment is set up and ready to
    go for the rest of this chapter.'
