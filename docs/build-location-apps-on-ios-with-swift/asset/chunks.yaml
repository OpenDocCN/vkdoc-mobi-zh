    \ 9-3** Google Directions API 响应的数据结构\n\n定义好数据结构后，我们可以解码来自 HTTPS 响应的 `Data` 对象（清单\
    \ 9-4）。在此过程中，我们确实需要使用 `do-try-catch` 语句，以便处理任何 JSON 解码错误或我们定义的数据结构与响应之间的不匹配（例如缺少必需的属性）。\n\
    \n最后，解析出响应后，我们检查响应中是否有任何概要点，如果有，则将其传递给另一个方法进行显示。该方法将在主线程上执行，因为它会更改用户界面。\n\n```\n\
    func processDirections(_ data: Data) {\n    let decoder = JSONDecoder()\n    do\
    \ {\n        let response = try decoder.decode(GoogleDirectionsResponse.self,\
    \ from: data)\n        print(response)\n        guard let points = response.routes?.first?.overview_polyline?.points\
    \ else {\n            return\n        }\n        // 在地图上显示折线必须在主线程上进行\n      \
    \  DispatchQueue.main.async {\n            self.displayOverviewPolyline(points)\n\
    \        }\n    } catch let error as NSError {\n        print(\"JSON Error: \\\
    (error)\")\n    }\n}\n```\n\n**清单 9-4** 将 JSON 响应解码为数据结构\n\n将清单 9-4 中的方法添加到你的\
    \ `ViewController` 类中。我们仍然需要编写 `displayOverviewPolyline()` 方法来向用户显示路线的走向。\n"
- fmt: '# Displaying the route as a polyline


    The response from the Google Directions API includes the points in the route as
    an encoded string that can be turned into a `GMSPath` object. This path object
    represents all of the points on the route, which includes the beginning and ends
    of all of the segments. You can use a path to create a polyline and then configure
    that polyline with the appropriate stroke color and width.


    You also need to set the `map` property on the polyline to the Google map view.
    We also store the polyline as a member variable on the view controller at the
    end of the function (Listing [9-5](#485790_1_En_9_Chapter.xhtml#PC8)).


    Add the polyline as a member variable on the `ViewController` class:


    ```

    var routePolyline: GMSPolyline?

    ```


    For more about polylines and paths, see Chapter [8](#485790_1_En_8_Chapter.xhtml).


    ```

    func displayOverviewPolyline(_ points:String) {

    guard let routePath = GMSPath(

    fromEncodedPath: points) else {

    return

    }

    let polyline = GMSPolyline(path: routePath)

    polyline.strokeColor = .red

    polyline.strokeWidth = 3

    polyline.map = mapView

    self.routePolyline = polyline

    updateMapBounds(routePath)

    }

    Listing 9-5

    Displaying the Google Directions API response as a polyline on Google Maps

    ```


    As a quick reminder, this method needs to be called on the main thread, just like
    any other user interface modification.


    At the end of the method, we included a call to a method that updates the map
    bounding box, based on the path the route takes.


    ## Updating the map bounding box


    The `GMSCoordinateBounds` class is used to create a bounding box that you can
    then use with a camera update to display a rectangular segment of the world in
    the map view. You can create one of these bounds with a `GMSPath` object, like
    the list of points used in the route overview. That bounds will have no additional
    padding, but the camera update allows you to specify padding as a `UIEdgeInsets`
    structure.


    Putting this together with a call to the `moveCamera()` method on the map view,
    we get the following function (Listing [9-6](#485790_1_En_9_Chapter.xhtml#PC9)),
    which you can add to your `ViewController` class.


    ```

    func updateMapBounds(_ routePath: GMSPath) {

    let bounds = GMSCoordinateBounds(path: routePath)

    let insets = UIEdgeInsets(top: 100, left: 100, bottom: 100, right: 100)

    let cameraUpdate = GMSCameraUpdate.fit(bounds, with: insets)

    mapView.moveCamera(cameraUpdate)

    }

    Listing 9-6

    Displaying the entire route in the map view

    ```


    You could adjust those edge insets as you like, to give the route enough padding.
    Having it stretch across the whole screen can look strange.


    Now that all of the functions are complete, try running your application in the
    Simulator. You should see a red line appear on the Google Map for your route,
    like the following figure. Double-check the API key for your driving directions
    if you have problems (you can always test the URL in a web browser).


    ![../images/485790_1_En_9_Chapter/485790_1_En_9_Fig6_HTML.jpg](images/485790_1_En_9_Chapter/485790_1_En_9_Fig6_HTML.jpg)


    **Figure 9-6** — Displaying Google directions on a Google Map


    This completes our use of the Google Directions API for this project. The next
    step to building out your application would probably be to add turn-by-turn directions,
    by breaking the route down into its different legs and steps.


    ## Next steps: Displaying each leg and step


    To extend this project out, we would need to add additional data structures to
    our project to decode each leg of the route, as well as each step of each leg.
    You could also add previous and next buttons that would walk up and down the list
    of steps, showing the HTML instructions and displaying the step polyline on the
    map.


    Last, when you are done with this project, go back into the Google Cloud Platform
    console at [`https://console.cloud.google.com/`](https://console.cloud.google.com/)
    and delete your Google Directions API key. It’s always a good idea to clean up
    your project credentials!


    In Chapter [10](#485790_1_En_10_Chapter.xhtml), we will use the Google Places
    SDK for iOS to search for points of interest and display them on a Google map.
    You could combine the work we did in this chapter with the search functionality
    in Chapter [10](#485790_1_En_10_Chapter.xhtml) to build some interesting applications
    on your own!


    # 10. Using Google Places in Your iOS App


    Google Places provides a rich database of locations and photos to iOS apps through
    the Google Places SDK. With the SDK, your mobile app can augment its location
    abilities with additional details and photos or even provide a places search with
    autocomplete.


    We are going to build on the discussion in Chapter [7](#485790_1_En_7_Chapter.xhtml)
    about CocoaPods and using Google APIs in your mobile app. In particular, getting
    a Google Places API key is similar to getting an API key for the Google Directions
    API or the Google Maps API.


    Google Places is on a pay-per-use billing model, with billing credits that should
    cover usage in development and testing. Please check the Google Maps Platform
    billing website ([`https://developers.google.com/maps/billing/gmp-billing`](https://developers.google.com/maps/billing/gmp-billing))
    for the latest information. Also, you will find more details there about what
    usage costs and how changing the fields in a place request affects pricing.


    ## Building a places finder with a map


    Our project in this chapter will be to create a search interface for businesses
    in the Google Places database, based on the currently visible region in a Google
    Maps map view. We are going to start with the Google Places autocomplete view
    controller first and then add the Google Maps marker at the end of the chapter.


    This project demonstrates how to search for places by name in Google Places with
    autocomplete, as well as how to integrate the Google Places SDK for iOS into your
    project. We will use the full-screen autocomplete search view controller for Google
    Places, which makes adding this functionality pretty simple.


    ## Creating the project


    Create a new Single View Application in Xcode, using Swift. Choose storyboard
    as the user interface framework. Name the app `PlacesApp`. The example project
    for this chapter uses `com.buildingmobileapps` as the organization identifier,
    making the app''s bundle identifier `com.buildingmobileapps.PlacesApp`. We''ll
    use this bundle identifier in the next section of this chapter, when we create
    an API key and restrict it for use.'
