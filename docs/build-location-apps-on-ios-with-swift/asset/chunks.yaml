    Choose Layers from the sidebar, pick the state-label layer, and then take a look
    at the different options. You can choose a different font here, change its size,
    and adjust text settings (Figure [12-6](#485790_1_En_12_Chapter.xhtml#Fig6)).


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig6_HTML.jpg](images/485790_1_En_12_Chapter/485790_1_En_12_Fig6_HTML.jpg)


    Figure 12-6


    Text styles for place name labels


    We aren’t going to change anything at this level for this project, but the option
    to do it is powerful. Dismiss any open style editors that may be blocking your
    view of the example map, and then change the viewpoint centered in the map to
    your location using the search bar with the magnifying glass on the right-hand
    side of the window (Figure [12-7](#485790_1_En_12_Chapter.xhtml#Fig7)).


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig7_HTML.jpg](images/485790_1_En_12_Chapter/485790_1_En_12_Fig7_HTML.jpg)


    Figure 12-7


    Location picker for Mapbox Studio


    Choose your location, and then zoom in or out until you get the view of the map
    you would like to see (Figure [12-8](#485790_1_En_12_Chapter.xhtml#Fig8)).


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig8_HTML.jpg](images/485790_1_En_12_Chapter/485790_1_En_12_Fig8_HTML.jpg)


    Figure 12-8


    Mapbox Studio showing Austin, Texas, instead of default location


    Explore your area, and if the map style isn’t quite what you would like, take
    some time with the editor to change it!


    If you are happy with the map styles or you just want to see this map in your
    iOS application, click the Publish button at the top right of the editor. A dialog
    box (Figure [12-9](#485790_1_En_12_Chapter.xhtml#Fig9)) will appear with your
    published map style on the left-hand side and the draft version you were editing
    on the right. This makes it easy to compare and contrast your edits. If everything
    looks good and you want to replace the existing style, go ahead and click Publish.
    If you would like to fork your existing style, click Publish as new. If you Publish
    as new, Mapbox will save your changes as a duplicate, with a name like Basic-copy.


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig9_HTML.jpg](images/485790_1_En_12_Chapter/485790_1_En_12_Fig9_HTML.jpg)


    Figure 12-9


    Publish map style dialog box


    After either publishing a new map style or creating a new map style, go back to
    the Mapbox Studio home screen by clicking the Styles button in the upper left-hand
    corner. You will see your style listed on the home screen, as in Figure [12-10](#485790_1_En_12_Chapter.xhtml#Fig10).


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig10_HTML.jpg](images/485790_1_En_12_Chapter/485790_1_En_12_Fig10_HTML.jpg)


    Figure 12-10


    Mapbox Studio home screen with new styles


    Now, let’s try our new map style in our iOS app! To the right of your map style,
    you will see a three-dot button that will open a pop-up menu (Figure [12-11](#485790_1_En_12_Chapter.xhtml#Fig11)).
    Click that button, and then click the clipboard icon that appears to copy the
    Mapbox style URL for your map style.


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig11_HTML.jpg](images/485790_1_En_12_Chapter/485790_1_En_12_Fig11_HTML.jpg)


    Figure 12-11


    Pop-up menu for a map style, with Style URL and copy button


    Save the style URL, and go back to Xcode. We’ll tell the map view to use the style
    and then run the iOS app with our new map styles.'
  trans: '

    # 使用 Mapbox Studio 创建地图样式


    Mapbox 提供了一个基于网页的应用程序 `Mapbox Studio`，你可以用它来自定义应用程序的地图样式。这些地图可用于你的 iOS 应用，同时也能在
    Web 和 Android 应用中使用。所有样式的设计工作都在一个地方完成，从而让你的应用用户在不同平台上获得一致的体验。让我们首先打开地址为 [`https://studio.mapbox.com/`](https://studio.mapbox.com/)
    的 `Mapbox Studio`（图 12-1）。


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig1_HTML.jpg](img/485790_1_En_12_Fig1_HTML.jpg)


    图 12-1


    `Mapbox Studio`


    浏览 `Mapbox Studio`，你会发现示例样式、文档和有用的视频。不妨看看一些工具和资源，了解该应用的新功能——在撰写本文时，`Mapbox Studio`
    仍处于测试版发布阶段。


    接下来，我们创建一个新样式。点击 Studio 主页上那个大大的蓝色按钮 `New Style`（新建样式）。你会看到一个巨大的模板选择界面。花些时间浏览一下所有不同的模板及其变体（图
    12-2）——你可能会找到一个非常适合你应用的样式。


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig2_HTML.jpg](img/485790_1_En_12_Fig2_HTML.jpg)


    图 12-2


    `Mapbox Studio` 样式模板


    对于本项目，我们将使用 `Basic`（基础）模板的 `Galaxy`（星系）变体（图 12-3）——但你完全可以根据自己的选择，使用任何变体来创建项目。


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig3_HTML.jpg](img/485790_1_En_12_Fig3_HTML.jpg)


    图 12-3


    使用 `Galaxy` 变体的 `Basic` 模板


    选择 `Galaxy`（或其他变体），然后点击 `Customize Basic`（自定义基础）按钮，进入详细的样式编辑器，如图 12-3 所示。


    样式编辑器（图 12-4）拥有几个不同的功能，但如果您想要自定义地图的显示效果，其中一种方法是调整地图上各个图层的显示。左侧边栏中的 `Components`（组件）视图是执行此操作的最简单方式。例如，你可以选择
    `Road network`（道路网络），选取 `Galaxy` 变体中使用的一种颜色，然后从颜色选择器中挑选一种新颜色。类似地，你还可以更新水体、地名标签或地图中任何其他元素使用的颜色。


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig4_HTML.jpg](img/485790_1_En_12_Fig4_HTML.jpg)


    图 12-4


    样式编辑器，左侧边栏显示组件


    你可以完全控制哪些要素显示在地图上，也可以将它们禁用。例如，如果你不需要在地图上显示分区名称，可以通过在 `Components`（组件）侧边栏中选择 `Place
    labels`（地名标签）组件，向下滚动到 `Settlement subdivisions`（聚落分区），然后关闭开关来轻松禁用它，如图 12-5 所示。


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig5_HTML.jpg](img/485790_1_En_12_Fig5_HTML.jpg)


    图 12-5


    在 `Mapbox Studio` 中更改分区地名的显示


    如果你需要更精细的控制，侧边栏中的 `Layers`（图层）视图下可以查看所有图层，并且每个图层都有一个详细的样式编辑器，为你提供非常大的控制权。


    从侧边栏中选择 `Layers`（图层），选取 `state-label`（州标签）图层，然后查看不同的选项。你可以在此处选择不同的字体、更改其大小以及调整文本设置（图
    12-6）。


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig6_HTML.jpg](img/485790_1_En_12_Fig6_HTML.jpg)


    图 12-6


    地名标签的文本样式


    在这个项目中，我们不打算在这个层级更改任何内容，但拥有这样的选项是非常强大的。关闭可能遮挡示例地图视图的任何已打开的样式编辑器，然后使用窗口右侧带有放大镜图标的搜索栏，将地图的中心视点更改为你的位置（图
    12-7）。


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig7_HTML.jpg](img/485790_1_En_12_Fig7_HTML.jpg)


    图 12-7


    `Mapbox Studio` 的位置选择器


    选择你的位置，然后放大或缩小，直到得到你希望看到的地图视图（图 12-8）。


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig8_HTML.jpg](img/485790_1_En_12_Fig8_HTML.jpg)


    图 12-8


    `Mapbox Studio` 显示德克萨斯州奥斯汀，而非默认位置


    探索你的区域，如果地图样式不完全符合你的要求，不妨花些时间用编辑器来修改它！


    如果你对地图样式感到满意，或者只是想在你的 iOS 应用中查看这张地图，请点击编辑器右上角的 `Publish`（发布）按钮。将会弹出一个对话框（图 12-9），左侧显示你已发布的地图样式，右侧显示你正在编辑的草稿版本。这让你可以轻松对比和对照你的编辑内容。如果一切看起来不错，并且你想替换现有样式，请继续点击
    `Publish`（发布）。如果你想从现有样式派生出一个新样式，请点击 `Publish as new`（发布为新样式）。如果你选择 `Publish as
    new`，`Mapbox` 会将你的更改保存为一个副本，名称类似 `Basic-copy`。


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig9_HTML.jpg](img/485790_1_En_12_Fig9_HTML.jpg)


    图 12-9


    发布地图样式对话框


    无论是发布了新地图样式还是创建了新地图样式后，请点击左上角的 `Styles`（样式）按钮，返回 `Mapbox Studio` 主屏幕。你会在主屏幕上看到列出的样式，如图
    12-10 所示。


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig10_HTML.jpg](img/485790_1_En_12_Fig10_HTML.jpg)


    图 12-10


    显示新样式的 `Mapbox Studio` 主屏幕


    现在，让我们在 iOS 应用中尝试使用我们的新地图样式！在地图样式的右侧，你会看到一个三点按钮，点击它会打开一个弹出菜单（图 12-11）。点击该按钮，然后点击出现的剪贴板图标，复制你地图样式的
    `Mapbox` 样式 URL。


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig11_HTML.jpg](img/485790_1_En_12_Fig11_HTML.jpg)


    图 12-11


    地图样式的弹出菜单，包含样式 URL 和复制按钮


    保存好样式 URL，然后返回 `Xcode`。我们将告诉地图视图使用该样式，然后运行我们的 iOS 应用，以查看新的地图样式。

    '
- fmt: '# Displaying the New Map Style in the App


    Copy that style URL into your iOS app, and store it in a constant named `mapStyleURI`
    on your `ViewController` class. Your URL will be unique to your account and style:


    ```

    let mapStyleURI = "mapbox://styles/jefflinwood/zfgwe"

    ```


    Now let’s set the map style URL, as we discussed earlier in the chapter:


    ```

    mapView.styleURL = URL(string:mapStyleURI)

    ```


    You can also set the starting location of your map to point to an area you are
    familiar with. A complete `viewDidLoad()` method would look like Listing [12-1](#485790_1_En_12_Chapter.xhtml#PC6).


    ```

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view.

    mapView.centerCoordinate = CLLocationCoordinate2D(

    latitude: 30.2,

    longitude: -97.75)

    mapView.zoomLevel = 10

    mapView.styleURL = URL(string: mapStyleURI)

    }

    Listing 12-1

    The viewDidLoad method, showing the new style URL

    ```


    Be sure to set the `mapStyleURI` constant in your class. Now run the application,
    and you will see your new map style, in your iOS application, similar to Figure
    [12-12](#485790_1_En_12_Chapter.xhtml#Fig12).


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig12_HTML.jpg](images/485790_1_En_12_Chapter/485790_1_En_12_Fig12_HTML.jpg)


    Figure 12-12


    Displaying the new map style in the iOS app


    Using Mapbox Studio, you can update the style as you like on the Web, and as long
    as you publish the changes to the existing style, your iOS app will pick up the
    changes when it next loads the map.


    In the next chapter, we will upload a dataset to Mapbox Studio and then display
    it in the iOS app. You can use this technique for features you would like to style
    in Mapbox Studio or if you have too much data to reasonably process as marker
    annotations on the map because of performance.


    # Working with Datasets in Mapbox Studio


    Using Mapbox Studio, we can add large datasets to our maps as new layers. In this
    chapter, we will build on top of the custom map style we created in Chapter [12](#485790_1_En_12_Chapter.xhtml).
    Once we load in the dataset, we can view it in the map view without changing anything.
    We’ll also see how to retrieve the underlying data features when a user interacts
    with the map.


    This chapter uses the project we created in Chapter [12](#485790_1_En_12_Chapter.xhtml)
    with Mapbox Studio as a base. If you have not created the custom map style, and
    displayed in the map view, go ahead and follow those directions.


    ## Earthquake Map


    This project involves collecting GeoJSON data about earthquakes, uploading that
    data as a dataset into Mapbox Studio, and then creating a tileset from the data.
    When we have a tileset, we can style the appearance of the data in Mapbox Studio,
    including increasing the size of the data point on the map to match the magnitude
    of the quake. Then we can display the data in our app and detect when a user taps
    on one of the earthquakes. When we are done with the project, we should have an
    app that looks like Figure [13-1](#485790_1_En_13_Chapter.xhtml#Fig1).


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig1_HTML.jpg](images/485790_1_En_13_Chapter/485790_1_En_13_Fig1_HTML.jpg)


    Figure 13-1


    Earthquake data points in the app


    Let’s get started with the first step and collect the data we need to show on
    our map.


    ## Downloading the Earthquake Data


    The earthquakes’ dataset we are using for visualization comes from the United
    States Geological Survey (USGS). If you are curious and want to learn more about
    earthquake monitoring and research, visit their website at [`www.usgs.gov/natural-hazards/earthquake-hazards`](https://www.usgs.gov/natural-hazards/earthquake-hazards).


    You can also visit [`https://earthquake.usgs.gov/earthquakes/map/`](https://earthquake.usgs.gov/earthquakes/map/)
    to find a map of earthquakes, refreshed frequently from the server. We will be
    creating something similar, but with historical earthquake data.


    The Earthquake Catalog, which can be accessed at [`https://earthquake.usgs.gov/fdsnws/event/1/`](https://earthquake.usgs.gov/fdsnws/event/1/),
    lists all of the different APIs supported by the Earthquake Hazards Program. For
    our purposes, we are interested in querying historic earthquake information and
    then returning the results as GeoJSON. GeoJSON is a data encoding format for geographic
    features, including points, lines, and polygons, along with any associated properties.


    The URL we will use to download the data is:


    ```

    https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&starttime=2020-01-01&endtime=2020-01-02

    ```


    We specify the start time as January 1, 2020, and the end time as January 2, 2020.
    We also request GeoJSON back from the server, instead of XML, CSV, or another
    format. You will see a large GeoJSON file, with 610 different features. Listing
    [13-1](#485790_1_En_13_Chapter.xhtml#PC2) contains an edited sample of the JSON
    file, with only one feature and only two of its properties.


    ```

    {

    "type": "FeatureCollection",

    "metadata": {

    "generated": 1587256320000,

    "url": "https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&starttime=2020-01-01&endtime=2020-01-02",

    "title": "USGS Earthquakes",

    "status": 200,

    "api": "1.8.1",

    "count": 610

    },

    "features": [

    {

    "type": "Feature",

    "properties": {

    "mag": 1.3,

    "title": "M 1.3 - 38km SE of Tanana, Alaska"

    },

    "geometry": {

    "type": "Point",

    "coordinates": [

    -151.59520000000001,

    64.892200000000003,

    2.5

    ]

    },

    "id": "ak02021ksej"

    }

    ],

    "bbox": [

    -179.2752,

    -53.0907,

    -1.75,

    175.8577,

    69.6006,

    392.48

    ]

    }

    Listing 13-1

    Sample of GeoJSON response for earthquake API query

    ```


    Make the API call, and then download the results to a GeoJSON file – try using
    a web browser or the `curl` command. The GeoJSON file is also included in the
    downloadable source code for the book, in Chapter [13](#485790_1_En_13_Chapter.xhtml)
    folder. Feel free to try other date ranges with the API, if you like. For this
    particular project, we will be using the `mag` property (the magnitude of the
    earthquake), so other GeoJSON sources may not be an exact match for the process.
    The concepts used here would translate well to other projects, however.


    We will take the list of earthquakes that we just downloaded and then upload them
    to Mapbox Studio next.'
