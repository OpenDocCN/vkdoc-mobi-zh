    \n```\nfunc retrieveDirections() {\n    let directionsUri = \"https://maps.googleapis.com/maps/api/directions/json?origin=Austin,TX&destination=Houston,TX&key=\\\
    (apiKey)\"\n    let session = URLSession(configuration: .default)\n    guard let\
