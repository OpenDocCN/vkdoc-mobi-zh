    }

    ```


    修改函数以显示这些信息，将使我们能更多地了解应用程序的进度，但当然还不能直接呈现给最终用户。他们可能更希望看到某种百分比，以便知道距离完成还有多远。您可以通过进度视图来实现这一点，但现在我们只是简单地将百分比打印到控制台。将以下代码添加到
    `offlinePackProgressChanged` 方法的末尾：


    ```

