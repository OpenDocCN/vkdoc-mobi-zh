    annotations, similar to `MapKit` or Google Maps for iOS. Let’s try a basic example
    and display a simple map marker, with an associated callout. There are two different
    steps we need to implement. The first is to create an annotation and display it.
    The second is to adopt the `MGLMapViewDelegate` protocol and then implement the
    `mapView: annotationCanShowCallout` function . Let’s get started by displaying
    an annotation.


    When we work with annotations at a given latitude and longitude, we can use the
    `MGLPointAnnotation` class. Instances of this class have properties for their
    `coordinate`, `title`, and `subtitle`, similar to the `MKPointAnnotation` class
    in Apple’s MapKit framework. Go ahead and create a function named `displayAnnotation`,
    as shown in Listing [11-3](#485790_1_En_11_Chapter.xhtml#PC9). You need to call
    `displayAnnotation()` at the end of the `viewDidLoad()` method .


    ```

    func displayAnnotation() {

    let annotation = MGLPointAnnotation()

    annotation.coordinate = CLLocationCoordinate2D(

    latitude: 30.25,

    longitude: -97.75)

    annotation.title = "Austin"

    annotation.subtitle = "Texas"

    mapView.addAnnotation(annotation)

    }

    Listing 11-3

    Display an annotation on the map view

    ```


    We’ll also need to adopt the `MGLMapViewDelegate` protocol . We can do that with
    an extension of the `ViewController` class. Add the extension in Listing [11-4](#485790_1_En_11_Chapter.xhtml#PC10)
    to the bottom of the `ViewController.swift` file.


    ```

    extension ViewController: MGLMapViewDelegate {

    func mapView(_ mapView: MGLMapView,

    annotationCanShowCallout annotation: MGLAnnotation) -> Bool {

    return true

    }

    }

    Listing 11-4

    Extension for the map view delegate

    ```


    The only method implemented in the delegate controls whether or not a given annotation
    will show a callout when the user selects it. If we had some annotations that
    didn’t show information, we could have more complicated logic here, but we can
    just return true. The default behavior for Mapbox will be to show the title and
    subtitle properties of the annotation in a simple callout.


    Last, we need to tell the map view that it has a delegate. Inside the `viewDidLoad()`
    method , add this line:


    ```

    mapView.delegate = self

    ```


    We can always implement more methods from the delegate protocol in the future.
    Go ahead and run the project now, so that you can see how this basic example works.
    Your code should look similar to Listing [11-5](#485790_1_En_11_Chapter.xhtml#PC12).


    ```

    import UIKit

    import Mapbox

    class ViewController: UIViewController {

    @IBOutlet weak var mapView: MGLMapView!

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view.

    mapView.centerCoordinate =   CLLocationCoordinate2D(

    latitude: 30.2,

    longitude: -97.75)

    mapView.zoomLevel = 10

    mapView.styleURL = MGLStyle.outdoorsStyleURL

    mapView.delegate = self

    displayAnnotation()

    }

    func displayAnnotation() {

    let annotation = MGLPointAnnotation()

    annotation.coordinate = CLLocationCoordinate2D(

    latitude: 30.25,

    longitude: -97.75)

    annotation.title = "Austin"

    annotation.subtitle = "Texas"

    mapView.addAnnotation(annotation)

    }

    }

    extension ViewController: MGLMapViewDelegate {

    func mapView(_ mapView: MGLMapView,

    annotationCanShowCallout annotation: MGLAnnotation) -> Bool {

    return true

    }

    }

    Listing 11-5

    Complete view controller class for Mapbox

    ```


    After running the project in the iOS Simulator and then clicking the marker, you
    should see something similar to Figure [11-7](#485790_1_En_11_Chapter.xhtml#Fig7).


    ![../images/485790_1_En_11_Chapter/485790_1_En_11_Fig7_HTML.jpg](images/485790_1_En_11_Chapter/485790_1_En_11_Fig7_HTML.jpg)


    Figure 11-7


    Displaying a marker with a callout on a map view


    This is a straightforward example of how to get started with Mapbox, but we haven’t
    really covered anything that makes Mapbox different from other mapping providers.
    In the next chapter, we will go in depth on customizing the look and feel of your
    map with Mapbox. This will give your mobile application a unique personality,
    and it’s pretty easy to do.


    # 12. Customizing Map Styles with Mapbox


    Now that you have seen how to work with the basics of the Mapbox SDK, it’s time
    to look into some of the unique aspects of Mapbox. With Mapbox, you can have almost
    complete control over the styling and features displayed in your map.


    In this chapter, we are going to create a custom map style in Mapbox Studio. We
    will then use that style with a map in our iOS app.


    Most of this chapter will focus on using Mapbox Studio, a web-based tool that
    lets you customize map styles. The iOS part of this chapter is extremely straightforward,
    as the Mapbox SDK is easy to work with. We’ve already seen how to change map styles
    in the previous chapter, and that is all we will need to do.


    ## Getting ready for map styles


    For this project, we will need an iOS application with the Mapbox SDK, a properly
    configured access token, and a map view on the view controller. You can reuse
    the project from Chapter [11](#485790_1_En_11_Chapter.xhtml), or you can create
    a new application. Your view controller class should have an outlet pointing to
    the map view on the storyboard named `mapView`.


    ## Changing the default style on the map view


    As we discussed in the previous chapter, the map view uses a style URL to determine
    which tiles to load from the server. We discussed the built-in style URLs you
    can retrieve from the `MGLStyle` class – dark, light, outdoors, streets, satellite,
    and satellite with streets. To set these style URLs, you would have code that
    looked like this:


    ```

    mapView.styleURL = MGLStyle.outdoorsStyleURL

    ```


    Mapbox doesn’t limit you to just these built-in styles, however. You can create
    your own Mapbox styles, which would have a Uniform Resource Indicator (URI) similar
    to


    ```

    mapbox://styles/jefflinwood/aabb773344

    ```


    The map view object’s `styleURL` property takes `URL` objects that you can construct
    yourself with calls to the `URL(string:)` constructor. Setting the style URL on
    the map view would look like this:


    ```

    mapView.styleURL = URL(string:mapStyleURI)

    ```


    That is all you need to set up your iOS app to use a custom style that you create.
    Throughout the remainder of this chapter, we will be working with the web-based
    Mapbox Studio application to create a custom style. After you save and publish
    that style, it will have its own `mapbox://` URI that you can use with your app.'
