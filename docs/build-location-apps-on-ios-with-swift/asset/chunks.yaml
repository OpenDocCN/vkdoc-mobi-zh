  trans: '

    # 在应用中显示新地图样式


    将该样式 URL 复制到你的 iOS 应用中，并在 `ViewController` 类中将其存储在一个名为 `mapStyleURI` 的常量中。你的 URL
    将因你的账户和样式而异：


    ```

    let mapStyleURI = "mapbox://styles/jefflinwood/zfgwe"

    ```


    现在，按照本章前面讨论的方法，设置地图样式 URL：


    ```

    mapView.styleURL = URL(string:mapStyleURI)

    ```


    你还可以将地图的起始位置设置为你熟悉的区域。一个完整的 `viewDidLoad()` 方法如代码清单 12-1 所示。


    ```

    override func viewDidLoad() {

    super.viewDidLoad()

    // 加载视图后的其他设置

    mapView.centerCoordinate = CLLocationCoordinate2D(

    latitude: 30.2,

    longitude: -97.75)

    mapView.zoomLevel = 10

    mapView.styleURL = URL(string: mapStyleURI)

    }

    代码清单 12-1

    viewDidLoad 方法，展示新的样式 URL

    ```


    请务必在你的类中设置 `mapStyleURI` 常量。现在运行应用，你将在 iOS 应用中看到新的地图样式，类似于图 12-12。


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig12_HTML.jpg](img/485790_1_En_12_Fig12_HTML.jpg)


    图 12-12


    在 iOS 应用中显示新的地图样式


    使用 Mapbox Studio，你可以在 Web 上根据需要随时更新样式，只要将更改发布到现有样式，你的 iOS 应用将在下次加载地图时自动应用这些更改。


    在下一章中，我们将把一个数据集上传到 Mapbox Studio，然后在 iOS 应用中展示。你可以将此技术用于需要在 Mapbox Studio 中自定义样式的要素，或者当数据量过大，无法在地图上以标记注释形式合理处理（考虑到性能）时使用。


    # 在 Mapbox Studio 中使用数据集


    使用 Mapbox Studio，我们可以将大型数据集作为新图层添加到地图中。在本章中，我们将在第 12 章创建的自定义地图样式基础上继续构建。加载数据集后，我们无需任何更改即可在地图视图中查看它。我们还将了解当用户与地图交互时，如何检索底层数据要素。


    本章使用我们在第 12 章中使用 Mapbox Studio 创建的项目作为基础。如果你尚未创建自定义地图样式并在地图视图中显示，请先按照说明进行操作。


    ## 地震地图


    该项目涉及收集关于地震的 GeoJSON 数据，将该数据作为数据集上传到 Mapbox Studio，然后根据数据创建瓦片集。拥有瓦片集后，我们可以在 Mapbox
    Studio 中自定义数据的显示外观，包括增加地图上数据点的大小以匹配地震的震级。然后，我们可以在应用中显示数据，并检测用户何时点击了其中一个地震点。完成该项目后，我们将得到一个如图
    13-1 所示的应用。


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig1_HTML.jpg](img/485790_1_En_13_Fig1_HTML.jpg)


    图 13-1


    应用中的地震数据点


    让我们从第一步开始，收集我们需要在地图上显示的数据。


    ## 下载地震数据


    我们用于可视化的地震数据集来自美国地质调查局（USGS）。如果你对此感兴趣，并想了解更多关于地震监测和研究的信息，请访问他们的网站 [`www.usgs.gov/natural-hazards/earthquake-hazards`](https://www.usgs.gov/natural-hazards/earthquake-hazards)。


    你还可以访问 [`https://earthquake.usgs.gov/earthquakes/map/`](https://earthquake.usgs.gov/earthquakes/map/)
    查看地震地图，该地图会从服务器频繁刷新。我们将制作类似的内容，但使用历史地震数据。


    地震目录（可通过 [`https://earthquake.usgs.gov/fdsnws/event/1/`](https://earthquake.usgs.gov/fdsnws/event/1/)
    访问）列出了地震危害计划支持的所有不同 API。我们的目的是查询历史地震信息，然后将结果作为 GeoJSON 返回。GeoJSON 是一种用于地理要素（包括点、线和多边形及其相关属性）的数据编码格式。


    我们将用于下载数据的 URL 是：


    ```

    https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&starttime=2020-01-01&endtime=2020-01-02

    ```


    我们将开始时间指定为 2020 年 1 月 1 日，结束时间指定为 2020 年 1 月 2 日。我们还要求服务器返回 GeoJSON 格式，而不是 XML、CSV
    或其他格式。你将看到一个包含 610 个不同要素的大型 GeoJSON 文件。代码清单 13-1 包含该 JSON 文件的编辑示例，只包含一个要素及其两个属性。


    ```

    {

    "type": "FeatureCollection",

    "metadata": {

    "generated": 1587256320000,

    "url": "https://earthquake.usgs.gov/fdsnws/event/1/query?format=geojson&starttime=2020-01-01&endtime=2020-01-02",

    "title": "USGS Earthquakes",

    "status": 200,

    "api": "1.8.1",

    "count": 610

    },

    "features": [

    {

    "type": "Feature",

    "properties": {

    "mag": 1.3,

    "title": "M 1.3 - 38km SE of Tanana, Alaska"

    },

    "geometry": {

    "type": "Point",

    "coordinates": [

    -151.59520000000001,

    64.892200000000003,

    2.5

    ]

    },

    "id": "ak02021ksej"

    }

    ],

    "bbox": [

    -179.2752,

    -53.0907,

    -1.75,

    175.8577,

    69.6006,

    392.48

    ]

    }

    代码清单 13-1

    地震 API 查询的 GeoJSON 响应示例

    ```


    发起 API 调用，然后将结果下载到 GeoJSON 文件中——尝试使用 Web 浏览器或 `curl` 命令。本书的可下载源代码中，在第 13 章文件夹中也包含了该
    GeoJSON 文件。如果你愿意，可以尝试使用 API 查询其他日期范围。对于这个特定项目，我们将使用 `mag` 属性（地震震级），因此其他 GeoJSON
    源可能与此过程不完全匹配。然而，这里使用的概念可以很好地迁移到其他项目。


    接下来，我们将获取刚刚下载的地震列表，并将它们上传到 Mapbox Studio。

    '
- fmt: '# Creating a dataset on Mapbox Studio


    `Mapbox Studio` lets you save and edit collections of `GeoJSON` features in the
    cloud, such as the earthquake data we just downloaded. These datasets can be turned
    into tilesets, which then may be edited in the `Mapbox Studio` style editor we
    used in Chapter [12](#485790_1_En_12_Chapter.xhtml). We will go through this entire
    process, from uploading a dataset to styling the features in the editor.


    Let’s start by creating a dataset on `Mapbox Studio`. Visit the Datasets page
    (Figure [13-2](#485790_1_En_13_Chapter.xhtml#Fig2)) on `Mapbox Studio` ([`https://studio.mapbox.com/datasets/`](https://studio.mapbox.com/datasets/)),
    or click the Dataset link in the upper right-hand corner. You will see any datasets
    you have already created or the option to upload a new dataset.


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig2_HTML.jpg](images/485790_1_En_13_Chapter/485790_1_En_13_Fig2_HTML.jpg)


    Figure 13-2

    `Mapbox Studio` Datasets web page


    Clicking the large blue `New dataset` button will pop up a dialog box offering
    the option of either creating a blank dataset or uploading a `GeoJSON` file. Choose
    `Upload` in the tab bar of the dialog box (Figure [13-3](#485790_1_En_13_Chapter.xhtml#Fig3)).


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig3_HTML.jpg](images/485790_1_En_13_Chapter/485790_1_En_13_Fig3_HTML.jpg)


    Figure 13-3

    Upload a new dataset to `Mapbox Studio`


    Select the `GeoJSON` file you downloaded in the previous section of this chapter,
    and then upload it. `Mapbox Studio` will process the file and find all of the
    `GeoJSON` features (Figure [13-4](#485790_1_En_13_Chapter.xhtml#Fig4)).


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig4_HTML.jpg](images/485790_1_En_13_Chapter/485790_1_En_13_Fig4_HTML.jpg)


    Figure 13-4

    Confirm dataset upload to `Mapbox Studio`


    If the number of features `Mapbox` found matches the number of features you would
    expect to see in your `GeoJSON` file, click the `Confirm` button. You may name
    your dataset to be whatever you like, but the default will be the name of the
    file you uploaded. In our case, that would be `Earthquake2020-01-01`. If that
    name works, click the `Create` button.


    `Mapbox Studio` will import the features, and you will see a confirmation message,
    similar to the following dialog box in Figure [13-5](#485790_1_En_13_Chapter.xhtml#Fig5).


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig5_HTML.jpg](images/485790_1_En_13_Chapter/485790_1_En_13_Fig5_HTML.jpg)


    Figure 13-5

    Dataset upload confirmation dialog box


    If you start editing the dataset, you will see the dataset plotted against a simple
    map background (Figure [13-6](#485790_1_En_13_Chapter.xhtml#Fig6)). You can select
    any of the points in the dataset and either inspect or modify the data.


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig6_HTML.jpg](images/485790_1_En_13_Chapter/485790_1_En_13_Fig6_HTML.jpg)


    Figure 13-6

    Dataset editor showing an earthquake point


    In our case, we are using clean data from the API, so we do not need to inspect
    the data for anomalies or to clear up missing values. We can also take a quick
    glance at the data and see if the dataset we just imported makes sense and matches
    where we would expect to see data points.


    This dataset imported correctly, and we can create a tileset from this dataset.
    The difference between a dataset and a tileset is that we will be able to modify
    how the data appears in the map in a tileset, instead of editing the data values
    in the dataset.


    Click the blue `Mapbox` icon in the upper left-hand corner to go back to the Datasets
    screen (Figure [13-7](#485790_1_En_13_Chapter.xhtml#Fig7)) or navigate to [`https://studio.mapbox.com/datasets/`](https://studio.mapbox.com/datasets/)
    in your web browser. Select the three-dot pop-up menu next to the earthquake dataset
    you just uploaded, and then choose `View details` from the pop-up menu.


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig7_HTML.jpg](images/485790_1_En_13_Chapter/485790_1_En_13_Fig7_HTML.jpg)


    Figure 13-7

    Pop-up menu to view details for a dataset


    The dataset details screen that appears in Figure [13-8](#485790_1_En_13_Chapter.xhtml#Fig8)
    allows you to export this dataset to a tileset.


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig8_HTML.jpg](images/485790_1_En_13_Chapter/485790_1_En_13_Fig8_HTML.jpg)


    Figure 13-8

    Dataset details screen


    In the next section, we will create a tileset. This tileset is what we use in
    the `Mapbox Studio` style editor to change the appearance of the data in the map.


    # Creating a tileset


    From the details screen of a dataset, `Mapbox Studio` provides an easy way to
    create a tileset. Click the `Export to tileset` link in the right-hand column.
    A dialog box (Figure [13-9](#485790_1_En_13_Chapter.xhtml#Fig9)) appears asking
    if you want to export to a new tileset or to update a connected tileset.


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig9_HTML.jpg](images/485790_1_En_13_Chapter/485790_1_En_13_Fig9_HTML.jpg)


    Figure 13-9

    Export to tileset dialog box


    We will export to a new tileset, so click that link. A text box will appear with
    a suggested name for the tileset (the same as the dataset). If that works, click
    `Export`, and then `Mapbox` will process the dataset into a tileset. After this
    conversion is complete, you will see that a connected tileset appears on the dataset
    details screen (Figure [13-10](#485790_1_En_13_Chapter.xhtml#Fig10)).


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig10_HTML.jpg](images/485790_1_En_13_Chapter/485790_1_En_13_Fig10_HTML.jpg)


    Figure 13-10

    Connected tileset along with processing notification on dataset details screen


    If you click the tileset, you will get a preview of the data in the tileset, as
    it would be laid out on a map. This can be useful to make sure the dataset export
    processed correctly.


    Our next step will be to add this tileset to the map style we created in Chapter
    [12](#485790_1_En_12_Chapter.xhtml). If you have not created a map style yet,
    go ahead and follow the directions in Chapter [12](#485790_1_En_12_Chapter.xhtml).


    # Adding the tileset to a style


    We now need to open up our map style to add the tileset as a layer. Click the
    `Styles` tab in the upper right-hand corner of the web page or navigate to [`https://studio.mapbox.com/`](https://studio.mapbox.com/)
    to see the list of your styles. Choose the map style you created in the last chapter,
    and click it to enter the style editor.


    In the style editor, choose the `Layers` tab in the left-hand sidebar. We need
    to add a new layer, so click the plus button in the upper right-hand side of the
    `Layers` tab. When the `New layer` window appears, a list of data sources will
    appear, including historical election results.


    Type `earthquake` into the filter box, and you will see your tileset appear (Figure
    [13-11](#485790_1_En_13_Chapter.xhtml#Fig11)).


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig11_HTML.jpg](images/485790_1_En_13_Chapter/485790_1_En_13_Fig11_HTML.jpg)


    Figure 13-11

    Adding a tileset to the map style


    Select the tileset in the search results window, and then zoom to a different
    part of the world that is tectonically active and has earthquakes, like Alaska.
    You will see the features from the `GeoJSON` we uploaded on your map, as in Figure
    [13-12](#485790_1_En_13_Chapter.xhtml#Fig12). The green dots are for reference
    and are not how the tileset will initially display. They show that all of your
    data is going to display in the map – you can apply a filter that will not show
    certain data based on conditions. If a data point is filtered out, that data will
    appear as a red dot here.


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig12_HTML.jpg](images/485790_1_En_13_Chapter/485790_1_En_13_Fig12_HTML.jpg)


    Figure 13-12

    Added a tileset to the map studio, showing features as green dots


    Now that we have added the tileset, we can change the way it displays in any map
    that uses this style.'
