  trans: '

    # 使用 Mapbox SDK 启动新项目


    我们将构建一个新的 iOS 应用程序来演示 Mapbox 的功能。在 Xcode 中创建一个名为 `FirstMapboxApp` 的新项目。该项目应为单视图应用程序，使用
    Swift 作为编程语言，并使用 storyboard/UIKit 作为用户界面，如图 11-3 所示。


    ![../images/485790_1_En_11_Chapter/485790_1_En_11_Fig3_HTML.jpg](img/485790_1_En_11_Fig3_HTML.jpg)


    图 11-3


    在 Xcode 中创建 FirstMapboxApp 项目


    创建此 Xcode 项目后，我们需要安装 Mapbox SDK。与 Google Maps 或 MapKit 不同，Mapbox SDK 是开源的。在应用程序中包含该
    SDK 的最简单方法是使用 CocoaPods，这与我们安装 Google Maps for iOS SDK 的方式类似。如果你尚未在 Mac 上安装 CocoaPods，请访问
    [`cocoapods.org/`](https://cocoapods.org/) 获取安装说明。


    设置好 CocoaPods 后，进入命令行，并将目录切换到刚创建的项目文件夹 (`FirstMapBoxApp`)。


    在该目录中，使用以下命令为你的项目创建一个 CocoaPods `Podfile`：


    ```

    pod init

    ```


    你创建的 `Podfile` 将如清单 11-1 所示。


    ```

    target ''FirstMapboxApp'' do

    # 如果不想使用动态框架，请注释下一行

    use_frameworks!

    # FirstMapboxApp 的 Pods

    end

    清单 11-1

    为项目生成的 Podfile

    ```


    在此文件中，我们有一个指向 Xcode 项目的 target，以及一个用于列出项目所依赖库（在 CocoaPods 中称为 pods）的位置。我们只需要为
    Mapbox 添加一个 pod，然后声明要使用的版本，如清单 11-2 所示。在撰写本文时，该版本为 5.8。


    ```

    target ''FirstMapboxApp'' do

    # 如果不想使用动态框架，请注释下一行

    use_frameworks!

    # FirstMapboxApp 的 Pods

    pod ''Mapbox-iOS-SDK'', ''~> 5.8''

    end

    清单 11-2

    将 Mapbox CocoaPods 库添加到项目


    ```


    编辑并保存 `Podfile` 文件后，在命令行中运行以下命令：


    ```

    pod install

    ```


    CocoaPods 将下载 Mapbox 库并将其安装到 Pods 文件夹中。你还会看到一个新的 `FirstMapboxApp.xcworkspace`
    文件，你将在 Xcode 中打开它。此工作区将包含你的项目以及 CocoaPods 中的所有依赖项。


    现在，打开该工作区。在你项目的 `Info.plist` 文件（图 11-4）中，为 `MGLMapboxAccessToken` 添加一个条目，并将其字符串值设置为你的访问令牌。


    ![../images/485790_1_En_11_Chapter/485790_1_En_11_Fig4_HTML.jpg](img/485790_1_En_11_Fig4_HTML.jpg)


    图 11-4


    带有 Mapbox 访问令牌设置的项目 Info.plist 文件


    添加访问令牌后，我们就拥有了使用 Mapbox 所需的一切。让我们开始将地图添加到默认视图控制器中。


    ## 显示地图视图


    Mapbox 提供了一个名为 `MGLMapView` 的地图视图类（MGL 是 Mapbox GL 的缩写）。要在 storyboard 中使用该地图视图类，请将一个
    `UIView` 拖到你的视图控制器上，然后在身份检查器中将自定义类更改为 `MGLMapView`，如图 11-5 所示。


    ![../images/485790_1_En_11_Chapter/485790_1_En_11_Fig5_HTML.jpg](img/485790_1_En_11_Fig5_HTML.jpg)


    图 11-5


    设置 MGLMapView 自定义类


    让我们确保一切就绪。继续运行该应用程序。你应该会在 iOS 模拟器中看到一张基本的世界地图，类似于图 11-6。


    ![../images/485790_1_En_11_Chapter/485790_1_En_11_Fig6_HTML.jpg](img/485790_1_En_11_Fig6_HTML.jpg)


    图 11-6


    在地图视图中显示基本世界地图


    提示


    如果你看到一张带有信息按钮的空白地图，可能需要再次检查 Info.plist 文件中的 Mapbox 访问令牌。


    现在我们有了地图视图，让我们通过将地图居中于新位置并选择不同的地图样式来改变地图的显示方式。


    ## 自定义地图视图的外观


    我们的第一个任务是为地图视图创建一个 outlet，以便我们可以通过编程方式更改其属性。使用 Xcode 助理将一个 outlet 拖入 `ViewController`
    类。将该 outlet 命名为 `mapView`。声明将如下所示：


    ```

    @IBOutlet weak var mapView: MGLMapView!

    ```


    你还需要在类顶部添加一条 import 语句：


    ```

    import Mapbox

    ```


    现在已将地图视图声明为变量，你可以轻松地将地图居中于新位置。在你的 `viewDidLoad()` 方法中，添加以下两行。请随意调整纬度和经度以匹配你的位置——我选取的位置是德克萨斯州奥斯汀的中心：


    ```

    mapView.centerCoordinate = CLLocationCoordinate2D(

    latitude: 30.2,

    longitude: -97.75)

    mapView.zoomLevel = 10

    ```


    运行应用程序后，你会看到地图现在显示更多细节。通过编程方式调整缩放级别也很容易，缩放级别为 10 足以显示奥斯汀市中心。


    Mapbox 的最佳特性之一是更改地图渲染方式的便捷性。你可以创建自己的地图样式，然后使用样式 URL 引用它们。或者你也可以使用一些内置的 Mapbox
    样式——这些样式可通过 `MGLStyle` 类获得。尝试将地图视图的样式 URL 更改为户外样式：


    ```

    mapView.styleURL = MGLStyle.outdoorsStyleURL

    ```


    `MGLStyle` 类上可用的其他地图样式包括：


    * `darkStyleURL`

    * `lightStyleURL`

    * `streetsStyleURL`

    * `satelliteStyleURL`

    * `satelliteStreetsStyleURL`


    在第 12 章中，我们将使用相同的 `styleURL` 属性更详细地研究地图样式。接下来，我们继续在地图上显示一个基本标记。

