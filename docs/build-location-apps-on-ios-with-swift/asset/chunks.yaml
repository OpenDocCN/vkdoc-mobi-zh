    ## 理解路线步骤


    除了可用作地图视图叠加层的路线图形外，方向API还会在响应中返回每条路线的一组步骤。这些步骤是`MKRoute.Step`对象。每个路线步骤都是一个独立的、具体的操作，用户需要执行该操作来遵循方向，例如沿着一条街走400米，或者沿着一条路行驶30公里。所有距离都以米为单位，因此对于较长的距离，你可能希望转换为公里；对于美国，则转换为英尺和英里。每个步骤还包括与该步骤关联的几何图形，这样你就可以将其叠加到地图视图上。`MKRoute.Step`类的属性包括：


    *   `polyline` – 该路线步骤的几何图形

    *   `instructions` – 要遵循的语音指示

    *   `notice` – 与该步骤关联的可选法律信息或警告

    *   `distance` – 距离，以米为单位

    *   `transportType` – `MKDirectionsTransportType`（汽车、公交、步行）中的一个值


    如果你只想简单地遍历路线中的每个步骤并打印到控制台，可以使用类似如下的函数：


    ```

    func printRouteSteps(_ route:MKRoute) {

    for step in route.steps {

    print("Go \(step.distance) meters")

    print(step.instructions)

    }

    }

    ```


    让我们再进一步，在我们的应用程序中构建逐步方向指示。


    ## 构建逐步方向指示


    我们将修改已经构建好的视图控制器，但你当然也可以将逐步方向指示放在单独的屏幕上。我们要做的第一步是为逐步方向指示创建用户界面元素：


    *   **上一步和下一步按钮**，用于在步骤之间切换 – 这些按钮具有黑色背景，正常状态下为白色文本，禁用状态下为浅灰色文本。两者最初都应处于禁用状态。

    *   **说明标签** – 这是多行标签，以适应较长的指示。它具有深灰色背景和白色文本。

    *   **通知标签** – 此标签具有红色背景和白色文本，以与说明标签区分开。

    *   **距离标签** – 此标签的alpha分量为0.8，以在视觉上与相邻按钮稍作区分。


    继续将这些用户界面元素添加到故事板中。你可以按任意方式排列它们。你还可以使用Auto Layout确保这些元素在所有设备上都能正确缩放。本书的示例项目将用户界面元素放在故事板底部，按钮与距离标签处于同一行，说明标签和通知标签位于其下方。


    你应该得到类似于图 [5-2](#485790_1_En_5_Chapter.xhtml#Fig2) 的结果。


    ![../images/485790_1_En_5_Chapter/485790_1_En_5_Fig2_HTML.jpg](images/485790_1_En_5_Chapter/485790_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    The user interface elements for the step-by-step directions


