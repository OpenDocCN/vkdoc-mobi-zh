- fmt: "# Including the API Key in your application\n\nNow that you have created an\
    \ API key, you have restricted its use to your iOS app, and you have the Google\
    \ Maps library integrated with your project, the next step is to provide the API\
    \ key inside your iOS application.\n\nBefore you use any Google Maps services\
    \ (such as Maps, Routing, or Places), you need to register your API Key with the\
    \ Google Maps SDK. If you do not do this, your application will receive a runtime\
    \ error from the SDK.\n\nThe easiest way to make sure that Google Maps always\
    \ has the API key before using any services is to provide the API Key in the `application(_:didFinishLaunchingWithOptions:)`\
    \ method in `AppDelegate.swift`, as shown in Listing 7-3. You will need to import\
    \ the `GoogleMaps` framework and make a call to `GMSServices.provideAPIKey()`.\
    \ What follows is a code listing for `AppDelegate.swift` with the required changes.\
    \ Replace `API-KEY` with the API Key you created in the Google Cloud Console.\n\
    \n```\nimport UIKit\nimport GoogleMaps\n@UIApplicationMain\nclass AppDelegate:\
    \ UIResponder, UIApplicationDelegate {\n    func application(_ application: UIApplication,\
    \ didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey:\
    \ Any]?) -> Bool {\n        // Override point for customization after application\
    \ launch.\n        GMSServices.provideAPIKey(\"API-KEY\")\n        return true\n\
    \    }\n}\n```\n\nNow that you have an API key in place, it's time to move on\
    \ to the fun part – displaying Google Maps within your app!\n\n## Displaying Google\
    \ Maps with a map view\n\nThere are a couple of different ways we can add a map\
    \ view (`GMSMapView`) to our iOS application. We can add it as a subview programmatically,\
    \ we can add it to the storyboard as a `UIView`, and then change the custom class,\
    \ or we can replace the view of the view controller with a map.\n\nDisplaying\
    \ the map view on the storyboard is the easiest way. Simply drag a `UIView` onto\
    \ the storyboard, and then change the custom class to be `GMSMapView`, as shown\
    \ in Figure 7-8.\n\n![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig8_HTML.jpg](images/485790_1_En_7_Chapter/485790_1_En_7_Fig8_HTML.jpg)\n\
    \nAdd constraints to the map view that it stretches from edge to edge (don't worry\
    \ about the safe areas unless you want to). Now run the application in the Simulator\
    \ – you should see a map like Figure 7-9 show up in your app!\n\n![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig9_HTML.jpg](images/485790_1_En_7_Chapter/485790_1_En_7_Fig9_HTML.jpg)\n\
    \nNow, there is one final step for you to make this mapping application complete.\
    \ Clicking or tapping the Google logo in the bottom left corner of the map needs\
    \ to open up the Google Maps iOS app or the Google Chrome browser for iOS, if\
    \ they are loaded onto the phone. If the end user doesn't have them, it will open\
    \ up in Safari. We will need to allow our app to query for the proper URL schemes.\n\
    \n## Allowing the Google Maps and Chrome URL schemes\n\nThe Google Maps SDK for\
    \ iOS will attempt to open up either the Google Maps app or the Google Chrome\
    \ app after someone taps on the Google logo in the lower left-hand corner of the\
    \ map. The SDK will check to see if those apps are installed on the user's phone\
    \ before opening them. The fallback is to open up the URL in Safari.\n\nThe first\
    \ versions of iOS let any application check to see if any other application was\
    \ installed on the phone. Unfortunately, this capability was abused, so Apple\
    \ restricted the use of this permission. Any application bundle identifiers that\
    \ you would like to check need to be specifically declared in the `Info.plist`\
    \ file.\n\nAdd a row to the `Info.plist`. The key will be `LSApplicationQueriesSchemes`.\
    \ There is not a corresponding entry in the drop-down that appears, so you will\
    \ need to type the name in exactly. Change the type from String to Array. Now\
    \ you can add any URL schemes that the app is going to query to the array. Here\
    \ are the two for Google Maps and Google Chrome:\n\n*   `comgooglemaps`\n*   `googlechromes`\n\
    \nYour completed `Info.plist` file should look something similar to Figure 7-10.\n\
    \n![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig10_HTML.jpg](images/485790_1_En_7_Chapter/485790_1_En_7_Fig10_HTML.jpg)\n\
    \nNow that all of the required information is set up, we can move on to changing\
    \ the way the map view displays information.\n\n## Changing display options on\
    \ the map view\n\nIf we want to change display options on the map view, we will\
    \ need to do so from code. Using the Assistant view in Xcode, create an outlet\
    \ on your `ViewController` class for the Google map view, and name it `mapView`,\
    \ as seen in Figure 7-11.\n\n![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig11_HTML.jpg](images/485790_1_En_7_Chapter/485790_1_En_7_Fig11_HTML.jpg)\n\
    \nThe outlet property should look like this:\n\n```\n@IBOutlet weak var mapView:\
    \ GMSMapView!\n```\n\nYou will also need to add the import statement for the `GoogleMaps`\
    \ framework to the top of the `ViewController` class:\n\n```\nimport GoogleMaps\n\
    ```\n\nNow run your iOS application, just to make sure that nothing is broken.\
    \ You should not see any changes yet. Let's go ahead and change the location of\
    \ the map. Using Google Maps, we would create a camera position and then animate\
    \ the map view to the new position. Add the following lines to your `viewDidLoad()`\
    \ method:\n\n```\nlet camera = GMSCameraPosition.camera(\n    withLatitude: 30.25,\n\
    \    longitude: -97.7,\n    zoom: 7)\nmapView.animate(to: camera)\n```\n\nReplace\
    \ the latitude and longitude with a coordinate of your choosing if you would like\
    \ to view something other than Austin, Texas! Your final `ViewController` class\
    \ should look something like Listing 7-4.\n\n```\nimport UIKit\nimport GoogleMaps\n\
    class ViewController: UIViewController {\n    @IBOutlet weak var mapView: GMSMapView!\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do\
    \ any additional setup after loading the view.\n        let camera = GMSCameraPosition.camera(\n\
    \            withLatitude: 30.25,\n            longitude: -97.7,\n           \
    \ zoom: 7)\n        mapView.animate(to: camera)\n    }\n}\n```\n\nNow that we\
    \ have the basics for working with the Google Maps SDK on iOS, we can move on\
    \ to more advanced topics, such as changing the type of map to satellite, terrain,\
    \ or hybrid, adding map markers, or giving driving directions. We will reuse the\
    \ Xcode project we built in this chapter to avoid having to repeat all of the\
    \ setup and installation instructions.\n\n# Exploring Google Map Views\n\nIn the\
    \ previous chapter, we did all of the setup necessary to work with the Google\
    \ Maps SDK for iOS. If you have not worked through Chapter 7, start there, as\
    \ this chapter will pick up where that one left off.\n\nIn this chapter, we will\
    \ explore the capabilities of the Google Maps map view. In particular, we will\
    \ work with map types, map markers, and shapes."
  raw: 'Now that you have created an API key, you have restricted its use to your
    iOS app, and you have the Google Maps library integrated with your project, the
    next step is to provide the API key inside your iOS application.


    ## Including the API Key in your application


    Before you use any Google Maps services (such as Maps, Routing, or Places), you
    need to register your API Key with the Google Maps SDK. If you do not do this,
    your application will receive a runtime error from the SDK.


    The easiest way to make sure that Google Maps always has the API key before using
    any services is to provide the API Key in the `application(_ didFinishLaunchingWithOptions:)`
    method in `AppDelegate.swift`, as shown in Listing [7-3](#485790_1_En_7_Chapter.xhtml#PC6).
    You will need to import the `GoogleMaps` framework and make a call to `GMSServices.provideAPIKey()`.
    What follows is a code listing for `AppDelegate.swift` with the required changes.
    Replace `API-KEY` with the API Key you created in the Google Cloud Console.


    ```

    import UIKit

    import GoogleMaps

    @UIApplicationMain

    class AppDelegate: UIResponder, UIApplicationDelegate {

    func application(_ application: UIApplication, didFinishLaunchingWithOptions launchOptions:
    [UIApplication.LaunchOptionsKey: Any]?) -> Bool {

    // Override point for customization after application launch.

    GMSServices.provideAPIKey("API-KEY")

    return true

    }

    }

    Listing 7-3

    Partial version of AppDelegate.swift with Maps API Key

    ```


    Now that you have an API key in place, it’s time to move on to the fun part –
    displaying Google Maps within your app!


    ## Displaying Google Maps with a map view


    There are a couple of different ways we can add a map view (`GMSMapView)` to our
    iOS application. We can add it as a subview programmatically, we can add it to
    the storyboard as a `UIView`, and then change the custom class, or we can replace
    the view of the view controller with a map.


    Displaying the map view on the storyboard is the easiest way. Simply drag a `UIView`
    onto the storyboard, and then change the custom class to be `GMSMapView`, as shown
    in Figure [7-8](#485790_1_En_7_Chapter.xhtml#Fig8).


    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig8_HTML.jpg](images/485790_1_En_7_Chapter/485790_1_En_7_Fig8_HTML.jpg)


    Figure 7-8


    Adding the Google map view to a storyboard


    Add constraints to the map view that it stretches from edge to edge (don’t worry
    about the safe areas unless you want to). Now run the application in the Simulator –
    you should see a map like Figure [7-9](#485790_1_En_7_Chapter.xhtml#Fig9) show
    up in your app!


    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig9_HTML.jpg](images/485790_1_En_7_Chapter/485790_1_En_7_Fig9_HTML.jpg)


    Figure 7-9


    Basic Google Maps running in the Simulator


    Now, there is one final step for you to make this mapping application complete.
    Clicking or tapping the Google logo in the bottom left corner of the map needs
    to open up the Google Maps iOS app or the Google Chrome browser for iOS, if they
    are loaded onto the phone. If the end user doesn’t have them, it will open up
    in Safari. We will need to allow our app to query for the proper URL schemes.


    ## Allowing the Google Maps and Chrome URL schemes


    The Google Maps SDK for iOS will attempt to open up either the Google Maps app
    or the Google Chrome app after someone taps on the Google logo in the lower left-hand
    corner of the map. The SDK will check to see if those apps are installed on the
    user’s phone before opening them. The fallback is to open up the URL in Safari.


    The first versions of iOS let any application check to see if any other application
    was installed on the phone. Unfortunately, this capability was abused, so Apple
    restricted the use of this permission. Any application bundle identifiers that
    you would like to check need to be specifically declared in the `Info.plist` file.


    Add a row to the `Info.plist`. The key will be `LSApplicationQueriesSchemes`.
    There is not a corresponding entry in the drop-down that appears, so you will
    need to type the name in exactly. Change the type from String to Array. Now you
    can add any URL schemes that the app is going to query to the array. Here are
    the two for Google Maps and Google Chrome:


    *   `comgooglemaps`


    *   `googlechromes`


    Your completed `Info.plist` file should look something similar to Figure [7-10](#485790_1_En_7_Chapter.xhtml#Fig10).


    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig10_HTML.jpg](images/485790_1_En_7_Chapter/485790_1_En_7_Fig10_HTML.jpg)


    Figure 7-10


    The Info.plist file with the required URL query schemes


    Now that all of the required information is set up, we can move on to changing
    the way the map view displays information.


    ## Changing display options on the map view


    If we want to change display options on the map view, we will need to do so from
    code. Using the Assistant view in Xcode, create an outlet on your `ViewController`
    class for the Google map view, and name it `mapView`, as seen in Figure [7-11](#485790_1_En_7_Chapter.xhtml#Fig11).


    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig11_HTML.jpg](images/485790_1_En_7_Chapter/485790_1_En_7_Fig11_HTML.jpg)


    Figure 7-11


    Creating an outlet for the Google Maps map view


    The outlet property should look like this:


    ```

    @IBOutlet weak var mapView: GMSMapView!

    ```


    You will also need to add the import statement for the `GoogleMaps` framework
    to the top of the `ViewController` class:


    ```

    import GoogleMaps

    ```


    Now run your iOS application, just to make sure that nothing is broken. You should
    not see any changes yet. Let’s go ahead and change the location of the map. Using
    Google Maps, we would create a camera position and then animate the map view to
    the new position. Add the following lines to your `viewDidLoad()` method:


    ```

    let camera = GMSCameraPosition.camera(

    withLatitude: 30.25,

    longitude: -97.7,

    zoom: 7)

    mapView.animate(to: camera)

    ```


    Replace the latitude and longitude with a coordinate of your choosing if you would
    like to view something other than Austin, Texas! Your final `ViewController` class
    should look something like Listing [7-4](#485790_1_En_7_Chapter.xhtml#PC10).


    ```

    import UIKit

    import GoogleMaps

    class ViewController: UIViewController {

    @IBOutlet weak var mapView: GMSMapView!

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view.

    let camera = GMSCameraPosition.camera(

    withLatitude: 30.25,

    longitude: -97.7,

    zoom: 7)

    mapView.animate(to: camera)

    }

    }

    Listing 7-4

    Complete ViewController class for Google Maps

    ```


    Now that we have the basics for working with the Google Maps SDK on iOS, we can
    move on to more advanced topics, such as changing the type of map to satellite,
    terrain, or hybrid, adding map markers, or giving driving directions. We will
    reuse the Xcode project we built in this chapter to avoid having to repeat all
    of the setup and installation instructions.


    # 8. Exploring Google Map Views


    In the previous chapter, we did all of the setup necessary to work with the Google
    Maps SDK for iOS. If you have not worked through Chapter [7](#485790_1_En_7_Chapter.xhtml),
    start there, as this chapter will pick up where that one left off.


    In this chapter, we will explore the capabilities of the Google Maps map view.
    In particular, we will work with map types, map markers, and shapes.'
  trans: "\n# 在应用程序中集成 API 密钥\n\n现在您已创建 API 密钥，并将其使用范围限制在您的 iOS 应用中，同时已将 Google Maps\
    \ 库集成到项目中，下一步是在您的 iOS 应用内提供该 API 密钥。\n\n在使用任何 Google Maps 服务（如地图、路线或地点）之前，您需要在\
    \ Google Maps SDK 中注册您的 API 密钥。如果未执行此操作，您的应用程序将会收到来自 SDK 的运行时错误。\n\n确保 Google\
    \ Maps 在使用任何服务前始终持有 API 密钥的最简单方法，是在`AppDelegate.swift`文件的`application(_:didFinishLaunchingWithOptions:)`方法中提供该\
    \ API 密钥，如代码清单 7-3 所示。您需要导入`GoogleMaps`框架，并调用`GMSServices.provideAPIKey()`。以下是经过必要修改的`AppDelegate.swift`代码清单。请将`API-KEY`替换为您在\
    \ Google Cloud Console 中创建的 API 密钥。\n\n```\nimport UIKit\nimport GoogleMaps\n\
    @UIApplicationMain\nclass AppDelegate: UIResponder, UIApplicationDelegate {\n\
    \    func application(_ application: UIApplication, didFinishLaunchingWithOptions\
    \ launchOptions: [UIApplication.LaunchOptionsKey: Any]?) -> Bool {\n        //\
    \ 应用启动后的自定义覆盖点\n        GMSServices.provideAPIKey(\"API-KEY\")\n        return\
    \ true\n    }\n}\n```\n\n现在您已配置好 API 密钥，接下来可以进入最有趣的部分——在您的应用内显示 Google 地图！\n\n\
    ## 使用地图视图显示 Google 地图\n\n我们可以通过几种不同的方式将地图视图（`GMSMapView`）添加到 iOS 应用程序中。我们可以以编程方式将其添加为子视图，也可以将其作为`UIView`添加到故事板中，然后更改其自定义类，或者将视图控制器的视图替换为地图。\n\
    \n在故事板上显示地图视图是最简单的方法。只需将一个`UIView`拖到故事板上，然后将自定义类更改为`GMSMapView`，如图 7-8 所示。\n\n\
    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig8_HTML.jpg](img/485790_1_En_7_Fig8_HTML.jpg)\n\
    \n为地图视图添加约束，使其从边缘拉伸到边缘（除非您需要，否则不必担心安全区域）。现在在模拟器中运行应用程序——您应该会在应用中看到如图 7-9 所示的地图！\n\
    \n![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig9_HTML.jpg](img/485790_1_En_7_Fig9_HTML.jpg)\n\
    \n现在，为了使这个地图应用功能完整，还有最后一步。点击或轻触地图左下角的 Google 徽标，需要在已安装相应应用的情况下，打开 Google Maps\
    \ iOS 应用或 iOS 版 Google Chrome 浏览器。如果最终用户没有这些应用，则会通过 Safari 打开。我们需要允许我们的应用查询正确的\
    \ URL 方案。\n\n## 允许 Google Maps 和 Chrome 的 URL 方案\n\n当用户点击地图左下角的 Google 徽标后，适用于\
    \ iOS 的 Google Maps SDK 将尝试打开 Google Maps 应用或 Google Chrome 应用。SDK 会在打开这些应用之前检查它们是否已安装在用户的手机上。最终的备选方案是通过\
    \ Safari 打开 URL。\n\n早期版本的 iOS 允许任何应用检查手机上是否安装了其他应用。不幸的是，该功能被滥用，因此 Apple 限制了对该权限的使用。任何您希望检查的应用包标识符都需要在`Info.plist`文件中明确声明。\n\
    \n在`Info.plist`中添加一行。键名应为`LSApplicationQueriesSchemes`。出现的下拉菜单中没有对应的条目，因此您需要准确输入该名称。将类型从\
    \ String 更改为 Array。现在，您可以将应用要查询的任何 URL 方案添加到该数组中。以下是 Google Maps 和 Google Chrome\
    \ 的两个方案：\n\n*   `comgooglemaps`\n*   `googlechromes`\n\n您完成后的`Info.plist`文件应类似于图\
    \ 7-10。\n\n![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig10_HTML.jpg](img/485790_1_En_7_Fig10_HTML.jpg)\n\
    \n现在所有必需的信息都已设置完毕，我们可以继续更改地图视图显示信息的方式了。\n\n## 更改地图视图的显示选项\n\n如果我们想更改地图视图的显示选项，则需要通过代码来实现。使用\
    \ Xcode 的 Assistant 视图，为 Google 地图视图在您的`ViewController`类上创建一个输出口，并将其命名为`mapView`，如图\
    \ 7-11 所示。\n\n![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig11_HTML.jpg](img/485790_1_En_7_Fig11_HTML.jpg)\n\
    \n该输出口属性应如下所示：\n\n```\n@IBOutlet weak var mapView: GMSMapView!\n```\n\n您还需要在`ViewController`类的顶部添加导入`GoogleMaps`框架的语句：\n\
    \n```\nimport GoogleMaps\n```\n\n现在运行您的 iOS 应用程序，以确保一切正常。此时您应该还看不到任何变化。让我们继续更改地图的位置。使用\
    \ Google Maps 时，我们会创建一个相机位置，然后将地图视图动画移动到新位置。将以下行添加到您的`viewDidLoad()`方法中：\n\n```\n\
    let camera = GMSCameraPosition.camera(\n    withLatitude: 30.25,\n    longitude:\
    \ -97.7,\n    zoom: 7)\nmapView.animate(to: camera)\n```\n\n如果您想查看德克萨斯州奥斯汀以外的地点，请将纬度和经度替换为您选择的坐标！您最终的`ViewController`类应类似于代码清单\
    \ 7-4。\n\n```\nimport UIKit\nimport GoogleMaps\nclass ViewController: UIViewController\
    \ {\n    @IBOutlet weak var mapView: GMSMapView!\n    override func viewDidLoad()\
    \ {\n        super.viewDidLoad()\n        // 加载视图后的其他设置\n        let camera =\
    \ GMSCameraPosition.camera(\n            withLatitude: 30.25,\n            longitude:\
    \ -97.7,\n            zoom: 7)\n        mapView.animate(to: camera)\n    }\n}\n\
    ```\n\n现在我们掌握了在 iOS 上使用 Google Maps SDK 的基础知识，接下来可以继续探讨更高级的主题，例如将地图类型更改为卫星、地形或混合模式，添加地图标记，或提供驾驶路线。我们将重用本章中构建的\
    \ Xcode 项目，以避免重复所有设置和安装说明。\n\n# 探索 Google 地图视图\n\n在上一章中，我们完成了使用适用于 iOS 的 Google\
    \ Maps SDK 所需的全部设置。如果您尚未学习第 7 章，请从那里开始，因为本章将在此基础上继续讲解。\n\n在本章中，我们将探索 Google 地图视图的功能。具体来说，我们将学习地图类型、地图标记和形状的使用。\n"
- fmt: '# Changing the type of map tiles


    Get started by opening the application you built in Chapter 7. We are going to
    extend that project, so we do not have to repeat the setup process for Google
    Maps.


    Google Maps comes with five different map types, which are specified in the `GMSMapViewType`
    enum:


    *   `hybrid` – Satellite tiles with labels

    *   `none` – No tiles, no labels

    *   `normal` – Default option, street map with labels

    *   `satellite` – The satellite tiles, but with no labels

    *   `terrain` – Useful for outdoor apps, has labels


    Setting the map type is straightforward – in the `viewDidLoad()` method of the
    `ViewController` class from Chapter 7, add one line at the bottom, as shown in
    Listing 8-1.


    ```

    override func viewDidLoad() {

    super.viewDidLoad()

    ...

    mapView.mapType = .terrain

    }

    ```


    You can always allow your users to set the map type themselves if you want to
    let them switch between satellite, terrain, and street map options. The map type
    can be changed at runtime without a problem.


    # Displaying map markers


    Displaying a map marker on Google Maps is straightforward – simply create a map
    marker as a `GMSMarker` object, specify the position and title, and then tell
    the marker which map it belongs to.


    This is a little different than `MapKit`, where you add a marker to a map directly.
    Create a new function in your `ViewController` class named `addMarker()`, with
    the code in Listing 8-2.


    ```

    func addMarker() {

    let marker = GMSMarker()

    marker.title = "Austin"

    marker.snippet = "Texas"

    marker.position = CLLocationCoordinate2D(

    latitude: 30.25, longitude: -97.75)

    marker.map = mapView

    }

    ```


    Add a call to `addMarker()` in your `viewDidLoad()` method, and run the application.
    You should see something similar to this after clicking the map marker to display
    the info window. The info window in Figure 8-1 will show the `title` and `snippet`
    properties, if they exist.


    ![../images/485790_1_En_8_Chapter/485790_1_En_8_Fig1_HTML.jpg](images/485790_1_En_8_Chapter/485790_1_En_8_Fig1_HTML.jpg)


    ## Changing the marker icon


    By default, markers will show up as a red pin. The marker’s `icon` and `iconView`
    properties control how the marker displays. The `icon` property takes a `UIImage`
    object. The `iconView` property takes a `UIView` object. The `iconView` property
    takes precedence over the `icon` property – if you set an `iconView`, the `icon`
    property will be ignored.


    The `GMSMarker` class provides a helper function that creates a `UIImage` of the
    marker icon with the color that you specify (as a `UIColor`). This is helpful
    if you want to show markers with different colors on your map. To change the marker
    icon to blue, you would see something like this:


    ```

    marker.icon = GMSMarker.markerImage(with: .blue)

    ```


    You can pass any color in as an argument to the `markerImage()` method.


    ## Responding to marker events


    The `GMSMapViewDelegate` protocol contains many different callback methods you
    may end up using with your map application.


    With respect to markers, the most common functionality you would implement would
    probably be to do something when a user taps on a marker or on an info window.
    Typically, if the marker has an info window, you would only do something if the
    user taps the info window, but it is possible to listen for taps on the marker,
    do something, and also still display the info window.


    The first step would be to set the `delegate` property of the `mapView` to the
    view controller:


    ```

    mapView.delegate = self

    ```


    Next, create an extension of your `ViewController` class that implements the `GMSMapViewDelegate`
    protocol:


    ```

    extension ViewController: GMSMapViewDelegate {

    }

    ```


    To do something when a user taps on an info window, implement the `mapView(_ didTapInfoWindowOf
    marker:)` method of the protocol:


    ```

    func mapView(_ mapView: GMSMapView,

    didTapInfoWindowOf marker: GMSMarker) {

    print("Info: \(marker.title ?? "No Title")")

    }

    ```


    You have access to the map view, as well as the marker associated with that info
    window. If you need to do something when the user taps on an info window, implement
    the `mapView(_didTap marker:)` method. Return `true` if the map view does not
    need to process the default behavior for the tap (showing an info window) or `false`
    if the map view should proceed with the default behavior. The following code snippet
    returns false, so the map view will run this code and then display the info window:


    ```

    func mapView(_ mapView: GMSMapView,

    didTap marker: GMSMarker) -> Bool {

    print("Marker: \(marker.title ?? "No Title")")

    return false

    }

    ```


    ## User data and markers


    The preceding examples simply print out the marker’s title, if there is one. Typically,
    you’d want to present a new view controller with details about the place represented
    by the selected marker. That requires some kind of way to link the selected marker
    object with an identifier or a data object. The `GMSMarker` class has an optional
    `userData` property that can be used to store anything – strings, numbers, or
    your own objects. The Google Maps for iOS SDK will simply ignore it – your code
    is responsible for doing something with it. This makes passing in custom data
    very easy – if your map markers are showing `City` objects, for instance, simply
    set the user data property to the corresponding instance of the `City` class.
    You can also pass in an identifier, like an integer or a UUID, and then let your
    details view controller do the lookup from a data store.


    We can try this out by adding user data to our marker in the `addMarker()` method:


    ```

    marker.userData = 1234

    ```


    If we then modify the `mapView(_didTap marker:)` method in our extension, we can
    see the user data printed out:


    ```

    func mapView(_ mapView: GMSMapView,

    didTap marker: GMSMarker) -> Bool {

    print("Marker: \(marker.title ?? "No Title")")

    print(marker.userData ?? "No user data")

    return false

    }

    ```


    Again, you would probably use this to present a new view controller with more
    details about the marker, but this illustrates how you might retrieve this user
    data from the marker.


    # Adding shapes to the map


    You may want to add lines, polygons, or circles to your map. For instance, if
    you had driving directions from one place to another, you might want to show the
    entire path on the map. You might also want to do a data visualization using circles
    on the map, for instance, to illustrate magnitude of earthquake shocks or the
    number of people living in a city or town.'
