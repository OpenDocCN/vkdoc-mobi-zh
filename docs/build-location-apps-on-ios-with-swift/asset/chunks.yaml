    \    }\n    task.resume()\n}\n```\n\n**清单 9-1** 向 Google Directions API 发起 HTTPS\
    \ 调用\n\n下一步是处理我们从 HTTPS 调用中获得的 `Data` 对象，并将其转换为可用的数据结构。\n\n# 处理导航响应\n\n我们向 Google\
