  raw: '## Creating the URL


    The Google Directions API is an HTTPS-based API, and you can easily test your
    requests out in a web browser. You will need to declare a constant to hold an
    API Key that supports the Google Directions API. We set this API up in the first
    part of this chapter. The following value is an example API key; substitute yours
    in its place:


    ```

    let apiKey = "AIzaZZZZZZZZZZZZZZZZZ"

    ```


    You will also need to build up the URL for the API call. There are many different
    parameters you can send to the Google Directions API. The following three parameters
    are required:


    *   `origin` – A street address, set of coordinates, or a Google Places ID


    *   `destination` – Same as origin


    *   `key` – A valid API Key


    Other parameters you may include are


    *   `mode` – Driving (default), walking, bicycling, transit


    *   `waypoints` – Intermediate destinations for the route, except for transit


    *   `alternatives` – True/false; will return multiple routes if they are available,
    and no intermediate waypoints are specified


    *   `avoid` – Tolls, highways, ferries, indoor; which methods of transportation
    to avoid in the calculated routes


    In addition to the preceding parameters, others you may want to consider are `transit_routing_preference`,
    `language`, `arrival_time`, `departure_time`, `region`, `units`, and `traffic_model`.
    See the detailed explanations of each of these parameters at the Google Directions
    API documentation page ([`https://developers.google.com/maps/documentation/directions/intro`](https://developers.google.com/maps/documentation/directions/intro)).


    An example Google Maps Directions URL might look like the following, with the
    API key being interpolated into the string:


    ```

    let directionsUri = "https://maps.googleapis.com/maps/api/directions/json?origin=Austin,TX&destination=Houston,TX&key=\(apiKey)"

    ```


    You can certainly use your own location or an interesting place as either the
    origin or destination.


    ## Calling the Directions API with URLSession


    We need to make the call to the Google directions API ourselves. Using the standard
    `URLSession` and its related classes, we will create a data task and then call
    another method to process the response as a `Data` object.


    The following `retrieveDirections()` method only handles the networking aspect,
    not the data processing. Add the method in Listing [9-1](#485790_1_En_9_Chapter.xhtml#PC3)
    to your `ViewController` class. You could also extend this method to take arguments
    for the origin and destination, if you wanted to ask the user for those through
    a text field, or perhaps use the user’s current location as a latitude/longitude
    pair.


    ```

    func retrieveDirections() {

    let directionsUri = "https://maps.googleapis.com/maps/api/directions/json?origin=Austin,TX&destination=Houston,TX&key=\(apiKey)"

    let session = URLSession(configuration: .default)

    guard let url = URL(string: directionsUri) else {

    print("Could not parse directions URI into URL")

    return

    }

    let task = session.dataTask(with: url) { (data, response, error) in

    guard let data = data else {

    print("Error returning data from url")

    print(error?.localizedDescription ?? "No error defined")

    return

    }

    self.processDirections(data)

    }

    task.resume()

    }

    Listing 9-1

    Making an HTTPS call to the Google Directions API

    ```


    The next step is to process the `Data` object that we get from the HTTPS call
    and turn it into usable data structures.


    ## Processing the directions response


    Our request to the Google Directions API asks for a JSON response. We could also
    ask for XML, but that is harder to parse. With JSON, we need to decode the `Data`
    object using the `JSONDecoder` . We will define a set of data structures based
    on the JSON response from the Google Directions API.


    An entire JSON response from the Google Directions API is too long to include
    in this chapter, but you can make an HTTPS request in your web browser to inspect
    the complete response. An edited version of the JSON response follows in Listing
    [9-2](#485790_1_En_9_Chapter.xhtml#PC4), with `…` marking the removed parts. Most
    notably, the geocoded waypoints have been trimmed, the encoded paths for the polylines
    have been trimmed, and the number of steps in the route has been reduced to one.


    ```

    {

    "geocoded_waypoints": [

    ...

    ],

    "routes": [

    {

    "bounds": {

    "northeast": {

    "lat": 30.2671031,

    "lng": -95.3657891

    },

    "southwest": {

    "lat": 29.69176959999999,

    "lng": -97.7506595

    }

    },

    "copyrights": "Map data ©2020 Google, INEGI",

    "legs": [

    {

    "distance": {

    "text": "165 mi",

    "value": 265936

    },

    "duration": {

    "text": "2 hours 33 mins",

    "value": 9172

    },

    "end_address": "Houston, TX, USA",

    "end_location": {

    "lat": 29.76043,

    "lng": -95.3698084

    },

    "start_address": "Austin, TX, USA",

    "start_location": {

    "lat": 30.2671031,

    "lng": -97.74307949999999

    },

    "steps": [

    {

    "distance": {

    "text": "0.5 mi",

    "value": 776

    },

    "duration": {

    "text": "3 mins",

    "value": 167

    },

    "end_location": {

    "lat": 30.2649534,

    "lng": -97.73539049999999

    },

    "html_instructions": "Head east...",

    "polyline": {

    "points": ...

    },

    "start_location": {

    "lat": 30.2671031,

    "lng": -97.74307949999999

    },

    "travel_mode": "DRIVING"

    },

    ...

    ],

    "traffic_speed_entry": [ ],

    "via_waypoint": [ ]

    }

    ],

    "overview_polyline": {

    "points": ...

    },

    "summary": "TX-71 E and I-10 E",

    "warnings": [ ],

    "waypoint_order": [ ]

    }

    ],

    "status": "OK"

    }

    Listing 9-2

    Trimmed JSON response from Google Directions API

    ```


    Inspecting this JSON response, we can determine which fields are useful for our
    application and which can be ignored. For instance, we may be building a hiking
    application, so we could ignore the traffic field. We will also create the bounding
    box from the polyline path, so we don’t need to parse it out separately.


    Let’s start with a few basic data structures for the response, as seen in Listing
    [9-3](#485790_1_En_9_Chapter.xhtml#PC5), so that we can display the overview of
    the route on the map. We are only going to get the route and the points in the
    overview polyline. Define these structures in your `ViewController.swift` file
    for easy reference.


    We are using `Codable` here for easy serialization between JSON and data structures.
    Otherwise, we would have to parse the nested response as a series of dictionaries
    and arrays, and the resulting Swift code would not be very maintainable.


    ```

    struct GoogleDirectionsResponse:Codable {

    var routes:[Route]?

    }

    struct Route:Codable {

    var overview_polyline:OverviewPolyline?

    }

    struct OverviewPolyline:Codable {

    var points:String?

    }

    Listing 9-3

    Data structures for the Google Directions API response

    ```


    Once we have the data structures defined, we can decode the `Data` object from
    the HTTPS response (Listing [9-4](#485790_1_En_9_Chapter.xhtml#PC6)). We do need
    to use a `do-try-catch` statement for this process, so that we can handle any
    JSON decoding errors or mismatches between our defined data structures and the
    response (such as a missing required property).


    Last, once we have the response parsed out, we check to see if there are any points
    in the response for the overview, and if so, pass them to a separate method to
    display them. That method will execute on the main thread, as it changes the user
    interface.


    ```

    func processDirections(_ data:Data) {

    let decoder = JSONDecoder()

    do {

    let response = try decoder.decode(GoogleDirectionsResponse.self, from: data)

    print(response)

    guard let points = response.routes?.first?.overview_polyline?.points else {

    return

    }

    // displaying the polyline on the map has to be on the main thread

    DispatchQueue.main.async {

    self.displayOverviewPolyline(points)

    }

    }

    catch let error as NSError {

    print("JSON Error: \(error)")

    }

    }

    Listing 9-4

    Decoding the JSON response into a data structure

    ```


    Add the method in Listing [9-4](#485790_1_En_9_Chapter.xhtml#PC6) to your `ViewController`
    class . We still need to write the `displayOverviewPolyline()` method to show
    the user which way the route goes.'
