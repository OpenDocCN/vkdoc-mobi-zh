- fmt: '# Setting images on annotation views


    Some of your map application ideas may work fine with the built-in pin or marker
    annotation view classes. However, it’s likely that you will need to use the `MKAnnotationView`
    class so that you can set your own images.


    We will change our code slightly to create annotation views for a dog park. The
    reuse identifier will be `“DogPark”`, and we will also have an image of a dog
    in a park, stored in our iOS app’s assets. This image will also be named `“DogPark”`.
    You will need to download your own image and place it into your Xcode project’s
    assets, so that you have something to display.


    In the `viewDidLoad()` function, add this code:


    ```

    mapView.register(MKAnnotationView.self, forAnnotationViewWithReuseIdentifier:
    "DogPark")

    ```


    Next, change the contents of the `viewFor()` function. This code is simplified,
    as we don’t need to downcast the dequeued annotation view any more. We can also
    simply return the optional value from this function. The only other change we
    make is to set the `UIImage` on the annotation view, instead of changing the pin
    tint color. The complete changes are shown in Listing 3-6.


    ```

    func mapView(_ mapView: MKMapView,

    viewFor annotation: MKAnnotation)

    -> MKAnnotationView? {

    if annotation is MKUserLocation {

    return nil

    }

    let reuseId = "DogPark"

    let view = mapView.dequeueReusableAnnotationView(

    withIdentifier: reuseId)

    view?.annotation = annotation

    view?.image = UIImage(named:"DogPark")

    return view

    }

    Listing 3-6 Use an image on the annotation view

    ```


    After you replace the code that dequeued the reusable pin annotation views with
    Listing 3-6, run the project. You will see the dog park image appear in place
    of your pins.


    # Using callouts with annotations


    After using a custom image for your annotation, it’s likely that you will want
    to display a callout when a user taps on your annotation. The `canShowCallout`
    property of the `MKAnnotationView` controls whether or not this is shown. When
    creating the view for the annotation, add the following line of code:


    ```

    view?.canShowCallout = true

    ```


    And then run your application. After tapping on an annotation, you will see a
    pop-up with the title and subtitle that you set, as shown in Figure 3-2.


    ![../images/485790_1_En_3_Chapter/485790_1_En_3_Fig2_HTML.jpg](images/485790_1_En_3_Chapter/485790_1_En_3_Fig2_HTML.jpg)


    Figure 3-2 Using images and callouts for the annotations


    As you can see, the way you display annotations on your map is extremely customizable.
    Try changing up the images for each annotation based on a data point, or try displaying
    some as images and some as pins.


    # Summary


    In this chapter, we’ve built on the mapping fundamentals from Chapter 1 to customize
    the markers we display on the map. We’ve seen how to use reusable annotation views
    to improve performance for maps with many markers.


    In the next chapter, we will discuss how to use Apple’s local search functionality
    to provide points of interest from their database for your map.


    # Searching for Points of Interest


    Apple has its own database of places and addresses that you can use with your
    iOS application. Your code can call an instance of the `MKLocalSearch` class to
    get points of interest that you can then display on a map view. This makes it
    easy to implement search functionality based on what geographic region is currently
    displaying in the map.


    Create a new Swift iOS project in Xcode with the Single View Application template.
    Name your application `SearchingForPointsOfInterest`. Go ahead and add a map view
    to the only screen in the storyboard, and connect it to an outlet called `mapView`
    on the `ViewController` class. Also import the `MapKit` framework, if you haven’t
    done so. These are the steps we’ve followed in the previous chapters, so they
    should be pretty straightforward.


    ## Getting started with local search


    Apple’s local search functionality for MapKit isn’t a web-accessible API that
    you can call with an HTTP request, unlike other integrations you may be using
    in your application. Apple provides two helper classes – `MKLocalSearch` and `MKLocalSearch.Request`
    – for working with local search. Use an `MKLocalSearch.Request` instance to define
    what to search for, and then use `MKLocalSearch` to execute the request and return
    the results.


    The first step is to construct the search request:


    ```

    let searchRequest = MKLocalSearch.Request()

    ```


    The search request object has four different properties you may use to filter
    down the results:


    - `naturalLanguageQuery` – This is a word or phrase that the service will use
    to find results, such as `“park”` or `“art museum”`.

    - `region` – This is a map region, typically the region of a map on the current
    screen – useful for limiting search results to a geographic location.

    - `pointOfInterestFilter` – Only display points of interest that match one or
    more of the different types in the `MKPointOfInterestCategory` struct. For instance,
    beaches, restaurants, and stores are all different categories.

    - `resultTypes` – Local search can return addresses, points of interest, or both.


    Not all of these need to be set to use local search – typically your map application
    would use `naturalLanguageQuery` and `region`. If you do not set the region, the
    local search will use the device’s location for the search. You do not need to
    ask for location permissions to use local search.


    If we set the natural language query on the search request, the code will look
    like this:


    ```

    searchRequest.naturalLanguageQuery = "coffee"

    ```


    The search request object describes the search we want to do – the `MKLocalSearch`
    object will run the search. There are two steps to running a search – creating
    the `MKLocalSearch` instance with a search request object and then calling the
    `start` method on the local search. Listing 4-1 contains an example of each of
    these steps.


    With the `MKLocalSearch.Request` object we created earlier, the initialization
    of an `MKLocalSearch` instance looks like this:


    ```

    let search = MKLocalSearch(request: searchRequest)

    ```


    The `start` method takes a completion handler as the only argument. The completion
    handler will run on the main thread in your iOS app and has two optional arguments
    – a response of type `MKLocalSearch.Response` and an error of type `Error`.


    The response will consist of an array of `MKMapItem` map items with the results
    of the search and a map region that includes all of the results. You could set
    the map view on the screen to the new region if you wanted to display all results,
    or you could let the user scroll themselves to find results if you had an alternative
    search results display (such as a list).


    ```

    let searchRequest = MKLocalSearch.Request()

    searchRequest.naturalLanguageQuery = "coffee"

    let search = MKLocalSearch(request: searchRequest)

    search.start { (response, error) in

    guard let response = response else {

    print("Error searching - no response")

    if let error = error {

    print("Error: \(error.localizedDescription)")

    } else {

    print("No error specified")

    }

    return

    }

    for mapItem in response.mapItems {

    print(mapItem.name ?? "No name specified")

    }

    }

    Listing 4-1 Searching for points of interest with MKLocalSearch

    ```


    Checking that the response is provided in the callback using `guard let` allows
    you to display an error to the user. For this code, the results will be found
    in the debug console, but you could display an alert message to the user.'
