    *   `previousButton`


    *   `nextButton`


    *   `instructionsLabel`


    *   `noticeLabel`


    *   `distanceLabel`


    Also create actions for both of the buttons, named `previous` and `next`. We will
    incorporate code into each of these methods to change the displayed step.


