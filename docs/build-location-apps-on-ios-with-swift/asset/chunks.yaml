  trans: '

    # 将路线显示为折线


    Google Directions API 的响应中包含路线上的点，这些点以编码字符串形式提供，可转换为`GMSPath`对象。此路径对象代表路线上的所有点，包括所有路段的起点和终点。你可以使用路径创建折线，然后为该折线配置合适的描边颜色和宽度。


    你还需要将折线的`map`属性设置为谷歌地图视图。我们还在函数末尾将折线作为视图控制器的成员变量进行存储（见代码清单 9-5）。


    将折线添加为`ViewController`类的成员变量：


    ```

    var routePolyline: GMSPolyline?

    ```


    有关折线和路径的更多信息，请参见第 8 章。


    ```

    func displayOverviewPolyline(_ points:String) {

    guard let routePath = GMSPath(

    fromEncodedPath: points) else {

    return

    }

    let polyline = GMSPolyline(path: routePath)

    polyline.strokeColor = .red

    polyline.strokeWidth = 3

    polyline.map = mapView

    self.routePolyline = polyline

    updateMapBounds(routePath)

    }

    代码清单 9-5

    在谷歌地图上将 Google Directions API 响应显示为折线

    ```


    需要提醒的是，与任何其他用户界面修改一样，此方法必须在主线程上调用。


    在该方法末尾，我们调用了一个方法，该方法根据路线经过的路径更新地图的边界框。


    ## 更新地图边界框


    `GMSCoordinateBounds`类用于创建边界框，然后你可以将其与相机更新配合使用，在地图视图中显示世界的矩形区域。你可以使用`GMSPath`对象（例如路线概览中使用的点列表）来创建这样的边界。该边界不会有额外的内边距，但相机更新允许你以`UIEdgeInsets`结构的形式指定内边距。


    将其与地图视图上的`moveCamera()`方法调用相结合，我们得到以下函数（代码清单 9-6），你可以将其添加到`ViewController`类中。


    ```

    func updateMapBounds(_ routePath: GMSPath) {

    let bounds = GMSCoordinateBounds(path: routePath)

    let insets = UIEdgeInsets(top: 100, left: 100, bottom: 100, right: 100)

    let cameraUpdate = GMSCameraUpdate.fit(bounds, with: insets)

    mapView.moveCamera(cameraUpdate)

    }

    代码清单 9-6

    在地图视图中显示完整路线

    ```


    你可以根据需要调整这些边缘内边距，为路线留出足够的填充空间。让路线拉伸到整个屏幕可能会显得很奇怪。


    现在所有函数都已就绪，尝试在模拟器中运行你的应用。你应该会看到谷歌地图上为你的路线显示一条红线，如下图所示。如果遇到问题，请仔细检查驾驶路线的 API 密钥（你可以随时在网页浏览器中测试该
    URL）。


    ![../images/485790_1_En_9_Chapter/485790_1_En_9_Fig6_HTML.jpg](img/485790_1_En_9_Fig6_HTML.jpg)


    **图 9-6** — 在谷歌地图上显示谷歌方向


    至此，我们完成了本项目中对 Google Directions API 的使用。构建应用的下一步可能是添加逐向导航，将路线分解为不同的路段和步骤。


    ## 后续步骤：显示每个路段和每个步骤


    为了扩展此项目，我们需要在项目中添加额外的数据结构来解码路线的每个路段，以及每个路段的每个步骤。你还可以添加上一步和下一步按钮，用于在步骤列表中上下移动，显示
    HTML 指令并在地图上展示步骤折线。


    最后，完成本项目后，请返回 Google Cloud Platform 控制台（[`https://console.cloud.google.com/`](https://console.cloud.google.com/)）并删除你的
    Google Directions API 密钥。清理项目凭据总是一个好习惯！


    在第 10 章中，我们将使用 Google Places SDK for iOS 搜索兴趣点并将其显示在谷歌地图上。你可以将本章的工作与第 10 章的搜索功能结合起来，自行构建一些有趣的应用！


    # 10. 在 iOS 应用中使用 Google Places


    Google Places 通过 Google Places SDK 为 iOS 应用提供了丰富的位置和照片数据库。借助该 SDK，你的移动应用可以增强其定位能力，提供更多细节和照片，甚至提供带有自动补全功能的地点搜索。


    我们将基于第 7 章关于 CocoaPods 和在移动应用中使用 Google API 的讨论进行扩展。特别是，获取 Google Places API 密钥与获取
    Google Directions API 或 Google Maps API 的密钥类似。


    Google Places 采用按使用量付费的计费模式，并配有计费额度，应能覆盖开发和测试中的使用量。请查阅 Google Maps Platform 计费网站（[`https://developers.google.com/maps/billing/gmp-billing`](https://developers.google.com/maps/billing/gmp-billing)）获取最新信息。此外，你还可以在那里找到关于使用成本以及更改地点请求中的字段如何影响定价的更多详细信息。


    ## 构建带地图的地点查找器


    本章的项目将基于谷歌地图视图中当前可见的区域，为 Google Places 数据库中的商家创建一个搜索界面。我们首先介绍 Google Places 自动补全视图控制器，然后在章末添加谷歌地图标记。


    本项目演示了如何在 Google Places 中通过名称（使用自动补全功能）搜索地点，以及如何将 Google Places SDK for iOS 集成到你的项目中。我们将使用
    Google Places 的全屏自动补全搜索视图控制器，这使得添加此功能变得相当简单。


    ## 创建项目


    在 Xcode 中创建一个新的单视图应用（Single View Application），使用 Swift 语言。选择故事板作为用户界面框架。将应用命名为`PlacesApp`。本章的示例项目使用`com.buildingmobileapps`作为组织标识符，使应用的包标识符为`com.buildingmobileapps.PlacesApp`。在本章下一节创建
    API 密钥并限制其使用时，我们将使用此包标识符。

    '
- fmt: '# Getting a Google Places API key


    Similar to the previous chapter with the Google Directions API, or Chapter 7 with
    the Google Maps API, you will need to get a Google Places API key. You need to
    go to the Google Cloud Console, which can be found at this URL, [`https://console.cloud.google.com`](https://console.cloud.google.com),
    and then enable the Google Places API for your project.


    You will also need to create a new API key. Start by going to the Credentials
    screen, which is in found in the Google Cloud Platform menu under the APIs & Services
    section (Figure 10-1).


    ![../images/485790_1_En_10_Chapter/485790_1_En_10_Fig1_HTML.jpg](images/485790_1_En_10_Chapter/485790_1_En_10_Fig1_HTML.jpg)


    Figure 10-1: Credentials location in APIs & Services menu


    Click the CREATE CREDENTIALS button, and choose API key (Figure 10-2).


    ![../images/485790_1_En_10_Chapter/485790_1_En_10_Fig2_HTML.jpg](images/485790_1_En_10_Chapter/485790_1_En_10_Fig2_HTML.jpg)


    Figure 10-2: Create an API key


    When the dialog box appears with your API key, copy the API key to your clipboard,
    or retrieve it later from the console. Click the Restrict button on the dialog
    box, which will open up a page that lets you set which APIs and applications this
    API key works with.


    The first step is to name your API key something memorable, for instance, Places
    App Key, as shown in Figure 10-3. The next is to restrict the use of this key
    to iOS apps.


    ![../images/485790_1_En_10_Chapter/485790_1_En_10_Fig3_HTML.jpg](images/485790_1_En_10_Chapter/485790_1_En_10_Fig3_HTML.jpg)


    Figure 10-3: Naming the API key and restricting to iOS apps


    After choosing iOS apps, you will see a place to enter in your app''s bundle identifier.
    Go ahead and put in your app''s bundle identifier, and then click the DONE button
    underneath the text field (Figure 10-4).


    ![../images/485790_1_En_10_Chapter/485790_1_En_10_Fig4_HTML.jpg](images/485790_1_En_10_Chapter/485790_1_En_10_Fig4_HTML.jpg)


    Figure 10-4: Restricting API key use to a single bundle identifier


    Last, you need to restrict which APIs the key can be used for. For the project
    in this chapter, we are using the Places API and the Maps SDK for iOS. Choose
    to restrict the key, and then choose those two APIs from the drop-down. If you
    do not see those APIs, you need to enable them for your project on the main dashboard
    screen (Figure 10-5).


    ![../images/485790_1_En_10_Chapter/485790_1_En_10_Fig5_HTML.jpg](images/485790_1_En_10_Chapter/485790_1_En_10_Fig5_HTML.jpg)


    Figure 10-5: Restricting API key use to two APIs


    Save those changes, and then the console will return to the API keys screen. We
    will use the API key in the app shortly, so leave the page open. You can always
    go back into the console and retrieve your API keys, however, unlike some vendors
    that only provide a secret authorization token once.


    Our next step is to include the Google Places SDK and the Google Maps SDK in our
    app project with CocoaPods.


    # Setting up CocoaPods


    If you are new to CocoaPods, see the discussion in Chapter 7 on how to install
    it on your Mac. We are going to follow a similar process to get our app project
    set up. The first step is to open up the Terminal app on your Mac and change directories
    to the directory that has our project. Then, create a `Podfile` for your project
    with this command:


    ```

    pod init

    ```


    That command creates a `Podfile` file. We are going to add two dependencies, one
    for the Google Places SDK for iOS and one for the Google Maps SDK for iOS. Go
    ahead and open the `Podfile` in an editor, and add these dependencies, so it looks
    similar to Listing 10-1.


    ```

    target ''PlacesApp'' do

    # Comment the next line if you don''t want to use dynamic frameworks

    use_frameworks!

    # Pods for PlacesApp

    pod ''GooglePlaces'', ''3.8.0''

    pod ''GoogleMaps'', ''3.8.0''

    end

    ```


    Listing 10-1: Podfile for Google Places and Google Maps SDKs


    After editing your `Podfile`, run the following command to install your dependencies,
    and then create an Xcode workspace:


    ```

    pod install

    ```


    Now, only use the `PlacesApp.xcworkspace` file with Xcode, not the `PlacesApp.xcodeproj`
    file, or the CocoaPods dependencies won''t be included in the build.


    Open the `PlacesApp.xcworkspace` file in Xcode, and we can get started building
    the app!


    # Providing an API key for Google Places and Google Maps


    The next step to building our project is to specify API keys for the Google Places
    SDK for iOS, as well as the Google Maps SDK for iOS. We can use the same API key
    for each, as we enabled support for both APIs in the first part of this chapter.
    For Google Places, the `GMSPlacesClient` class has a static method named `provideAPIKey()`
    that you use before calling anything else in the Google Places SDK. Similarly,
