    ## Understanding route steps


    In addition to the route graphic that you can use as an overlay on the map view,
    the directions API will also return a set of steps for each route on the response.
    These steps are `MKRoute.Step` objects. Each route step is a single, discrete
    action that the user would take to follow the directions, such as walking down
    a street for 400 meters or driving down a road for 30 kilometers. All distances
    are given in meters, so you will probably want to convert to kilometers for longer
    distances or feet and miles for the United States. Each step also includes the
    geometry associated with that step, so that you could overlay it on a map view.
    The properties on the `MKRoute.Step` class are


    *   `polyline` – The geometry for this route step


    *   `instructions` – The verbal directions to follow


    *   `notice` – Optional legal information or warnings associated with this step


    *   `distance` – The distance in meters


    *   `transportType` – One of the values from `MKDirectionsTransportType` (automobile,
    transit, walking)


    If you wanted to simply iterate through each step in the route and print to console,
    you could use a function similar to this:


    ```

    func printRouteSteps(_ route:MKRoute) {

    for step in route.steps {

    print("Go \(step.distance) meters")

    print(step.instructions)

    }

    }

    ```


    Let’s take this a few steps further and build step-by-step directions into our
    application.


    ## Building step-by-step directions


    We’ll modify the view controller we’ve already built, but you could certainly
    put step-by-step directions on its own screen. The first step we’ll take will
    be to create the user interface elements for step-by-step directions:


    *   Previous and Next Step buttons to move between steps – These have black backgrounds,
    with white text for the normal state and light gray for the disabled state. Both
    should initially be disabled.


    *   An instructions label – This is multiple lines, to accommodate longer directions.
    It has a dark gray background with white text.


    *   A notice label – This label has a red background with white text, to separate
    it from the instructions label.


    *   A distance label – This label has a 0.8 alpha component, to give a little
    visual separation from the adjacent buttons.


    Go ahead and add these user interface elements to the storyboard. You can arrange
    them however you like. You can also use Auto Layout to make sure the elements
    properly scale across all devices. The sample project for the book has the user
    interface elements at the bottom of the storyboard, with the buttons in line with
    the distance label, and the instructions label and notice label underneath that.


    You should have something similar to Figure [5-2](#485790_1_En_5_Chapter.xhtml#Fig2).


    ![../images/485790_1_En_5_Chapter/485790_1_En_5_Fig2_HTML.jpg](images/485790_1_En_5_Chapter/485790_1_En_5_Fig2_HTML.jpg)


    Figure 5-2


    The user interface elements for the step-by-step directions


