- fmt: "# Circles\n\nGenerally speaking, all of these work similarly, so let’s start\
    \ with the least complicated example – a circle. The `GMSCircle` class is like\
    \ the `GMSMarker` class, in that you set its position with a latitude and longitude\
    \ and then assign a map as a property. It differs from a marker because you have\
    \ to set a radius that the circle covers on the map. This radius is in meters\
    \ and corresponds to an actual geographic location. A marker would generally display\
    \ at the same fixed size, no matter what zoom level you are at in the map. In\
    \ addition to setting a radius, you also may set the fill color for the inside\
    \ of the circle, the color used on the stroke outline of the circle, and the width\
    \ of that outline.\n\nThe following code creates a light gray, semi-transparent\
    \ circle over Austin, Texas, with a 20-kilometer radius and a dark gray outline:\n\
    \n```\nfunc addCircle() {\n    let circle = GMSCircle()\n    circle.fillColor\
    \ = UIColor(white: 0.6, alpha: 0.7)\n    circle.strokeColor = .darkGray\n    circle.radius\
    \ = 20 * 1000\n    circle.position = CLLocationCoordinate2D(\n        latitude:\
    \ 30.25, longitude: -97.75)\n    circle.map = mapView\n}\n```\n\nMake a call to\
    \ `addCircle()` from your `viewDidLoad()` method, run your app, and you will see\
    \ something similar to Figure [8-2](#485790_1_En_8_Chapter.xhtml#Fig2) appear\
    \ in the Xcode simulator.\n\n![../images/485790_1_En_8_Chapter/485790_1_En_8_Fig2_HTML.jpg](images/485790_1_En_8_Chapter/485790_1_En_8_Fig2_HTML.jpg)\n\
    \nFigure 8-2\n\nDisplaying a circle on the map\n\nNow that we’ve displayed a circle,\
    \ let’s move on to the next type of overlay, a polyline.\n\n## Polylines and paths\n\
    \nIf you are showing a route or a path in your application, you can use polylines\
    \ to display one line that consists of one or more different segments. With the\
    \ Google Maps SDK for iOS, the way this works is that you construct a path as\
    \ a `GMSMutablePath` object with two or more location coordinates, in the order\
    \ that they will be connected. You then construct a `GMSPolyline` object with\
    \ that path. The path represents the data (latitudes and longitudes, as well as\
    \ the order), and the polyline provides the rendering options for the map – line\
    \ color and width. There is no fill color for the polyline with Google Maps –\
    \ only a stroke color and a stroke width.\n\nStart by creating a path:\n\n```\n\
    let path = GMSMutablePath()\n```\n\nYou can add `CoreLocation` coordinates or\
    \ latitude and longitude pairs to the path. For this example, let’s use latitude\
    \ and longitude pairs to add several cities in Texas to the path. This path will\
    \ have two segments:\n\n```\npath.addLatitude(30.25, longitude: -97.75)\npath.addLatitude(29.4,\
    \ longitude: -98.5)\npath.addLatitude(29.76, longitude: -95.37)\n```\n\nNow that\
    \ we have a path with two or more coordinates, we can construct a polyline with\
    \ the path:\n\n```\nlet polyline = GMSPolyline(path: path)\n```\n\nYou can set\
    \ the display options for the polyline by defining a new stroke color and stroke\
    \ width:\n\n```\npolyline.strokeColor = .red\npolyline.strokeWidth = 3\n```\n\n\
    Last, you do need to remember to tell the polyline which map to display on:\n\n\
    ```\npolyline.map = mapView\n```\n\nHere are all of these statements combined\
    \ into one function:\n\n```\nfunc addPolyline() {\n    let path = GMSMutablePath()\n\
    \    path.addLatitude(30.25, longitude: -97.75)\n    path.addLatitude(29.4, longitude:\
    \ -98.5)\n    path.addLatitude(29.76, longitude: -95.37)\n    let polyline = GMSPolyline(path:\
    \ path)\n    polyline.strokeColor = .red\n    polyline.strokeWidth = 3\n    polyline.map\
    \ = mapView\n}\n```\n\nIf you were to call that function from your app, it would\
    \ look similar to Figure [8-3](#485790_1_En_8_Chapter.xhtml#Fig3).\n\n![../images/485790_1_En_8_Chapter/485790_1_En_8_Fig3_HTML.jpg](images/485790_1_En_8_Chapter/485790_1_En_8_Fig3_HTML.jpg)\n\
    \nFigure 8-3\n\nDisplaying a polyline from a path of latitude and longitude pairs\n\
    \nTypically, you would probably construct the path in a loop, reading from a database,\
    \ the JSON response of an API call, or some other data structure. If you are working\
    \ with the Google Directions API, you can create the path from the encoded path\
    \ that a valid route returns. We’ll build a driving directions application that\
    \ uses the Google Directions API and Google Maps in the next chapter.\n\n## Polygons\n\
    \nPolygons are similar to polylines, in that you construct them with a path of\
    \ coordinates. The difference is that polygons will draw an additional line between\
    \ the last coordinate and the first coordinate, completing the outline of the\
    \ shape. In addition, similar to circles, you can set a fill color on a polygon.\
    \ Here is an example of a polygon drawn using the same coordinates as the polyline\
    \ earlier:\n\n```\nfunc addPolygon() {\n    let path = GMSMutablePath()\n    path.addLatitude(30.25,\
    \ longitude: -97.75)\n    path.addLatitude(29.4, longitude: -98.5)\n    path.addLatitude(29.76,\
    \ longitude: -95.37)\n    let polygon = GMSPolygon(path: path)\n    polygon.strokeColor\
    \ = .black\n    polygon.strokeWidth = 2\n    polygon.fillColor = UIColor(\n  \
    \      red: 1, green: 0, blue: 0, alpha: 0.3)\n    polygon.map = mapView\n}\n\
    ```\n\nThe only differences between the preceding code and the polyline code are\
    \ using the `GMSPolygon` class instead of `GMSPolyline` and being able to specify\
    \ a fill color.\n\nCall `the addPolygon()` method at the end of your `viewDidLoad()`\
    \ method, and you should see a triangle appear, like the one in Figure [8-4](#485790_1_En_8_Chapter.xhtml#Fig4).\n\
    \n![../images/485790_1_En_8_Chapter/485790_1_En_8_Fig4_HTML.jpg](images/485790_1_En_8_Chapter/485790_1_En_8_Fig4_HTML.jpg)\n\
    \nFigure 8-4\n\nDisplaying a polygon on the map\n\nNow that you’ve seen how to\
    \ draw shapes on the map, it’s time to discuss how to remove shapes after they\
    \ are no longer needed.\n\n## Removing markers and shapes\n\nEach marker or shape\
    \ has a `map` property that points to the map view they display on. If you would\
    \ like to clear a marker or shape from the map, simply set the `map` property\
    \ to `nil`:\n\n```\nmapMarker.map = nil\n```\n\nThis is useful for removing individual\
    \ markers or shapes or different groups of markers or shapes. If you’re processing\
    \ search results and then displaying them on the map, you may want to clear all\
    \ previous results off of the map before displaying the new results. To clear\
    \ all markers and shapes off of the map and only display the map tiles, use the\
    \ `clear()` method on the map view:\n\n```\nmapView.clear()\n```\n\nYou can now\
    \ create any new markers or shapes that you need.\n\n## Conclusion\n\nIn this\
    \ chapter, we discussed how to change the map tiles used in your map view, using\
    \ the `mapType` property of the map view. We also added markers to our map and\
    \ learned how to change the marker icon. When a user taps on a marker or info\
    \ window, we also learned how to handle those events and how to pass custom data\
    \ on a marker that we could use. Last, we looked at adding circles, polylines,\
    \ and polygons and then how to remove markers and shapes.\n\nIn the next chapter,\
    \ we build on our discussion of polylines and paths to provide driving directions\
    \ from Google Directions API on a map view."
  raw: '### Circles


    Generally speaking, all of these work similarly, so let’s start with the least
    complicated example – a circle. The `GMSCircle` class is like the `GMSMarker`
    class, in that you set its position with a latitude and longitude and then assign
    a map as a property. It differs from a marker because you have to set a radius
    that the circle covers on the map. This radius is in meters and corresponds to
    an actual geographic location. A marker would generally display at the same fixed
    size, no matter what zoom level you are at in the map. In addition to setting
    a radius, you also may set the fill color for the inside of the circle, the color
    used on the stroke outline of the circle, and the width of that outline.


    The following code creates a light gray, semi-transparent circle over Austin,
    Texas, with a 20-kilometer radius and a dark gray outline:


    ```

    func addCircle() {

    let circle = GMSCircle()

    circle.fillColor = UIColor(white: 0.6, alpha: 0.7)

    circle.strokeColor = .darkGray

    circle.radius = 20 * 1000

    circle.position = CLLocationCoordinate2D(

    latitude: 30.25, longitude: -97.75)

    circle.map = mapView

    }

    ```


    Make a call to `addCircle()` from your `viewDidLoad()` method , run your app,
    and you will see something similar to Figure [8-2](#485790_1_En_8_Chapter.xhtml#Fig2)
    appear in the Xcode simulator.


    ![../images/485790_1_En_8_Chapter/485790_1_En_8_Fig2_HTML.jpg](images/485790_1_En_8_Chapter/485790_1_En_8_Fig2_HTML.jpg)


    Figure 8-2


    Displaying a circle on the map


    Now that we’ve displayed a circle, let’s move on to the next type of overlay,
    a polyline.


    ### Polylines and paths


    If you are showing a route or a path in your application, you can use polylines
    to display one line that consists of one or more different segments. With the
    Google Maps SDK for iOS, the way this works is that you construct a path as a
    `GMSMutablePath` object with two or more location coordinates, in the order that
    they will be connected. You then construct a `GMSPolyline` object with that path.
    The path represents the data (latitudes and longitudes, as well as the order),
    and the polyline provides the rendering options for the map – line color and width.
    There is no fill color for the polyline with Google Maps – only a stroke color
    and a stroke width.


    Start by creating a path:


    ```

    let path = GMSMutablePath()

    ```


    You can add `CoreLocation` coordinates or latitude and longitude pairs to the
    path. For this example, let’s use latitude and longitude pairs to add several
    cities in Texas to the path. This path will have two segments:


    ```

    path.addLatitude(30.25, longitude: -97.75)

    path.addLatitude(29.4, longitude: -98.5)

    path.addLatitude(29.76, longitude: -95.37)

    ```


    Now that we have a path with two or more coordinates, we can construct a polyline
    with the path:


    ```

    let polyline = GMSPolyline(path: path)

    ```


    You can set the display options for the polyline by defining a new stroke color
    and stroke width:


    ```

    polyline.strokeColor = .red

    polyline.strokeWidth = 3

    ```


    Last, you do need to remember to tell the polyline which map to display on:


    ```

    polyline.map = mapView

    ```


    Here are all of these statements combined into one function:


    ```

    func addPolyline() {

    let path = GMSMutablePath()

    path.addLatitude(30.25, longitude: -97.75)

    path.addLatitude(29.4, longitude: -98.5)

    path.addLatitude(29.76, longitude: -95.37)

    let polyline = GMSPolyline(path: path)

    polyline.strokeColor = .red

    polyline.strokeWidth = 3

    polyline.map = mapView

    }

    ```


    If you were to call that function from your app, it would look similar to Figure
    [8-3](#485790_1_En_8_Chapter.xhtml#Fig3).


    ![../images/485790_1_En_8_Chapter/485790_1_En_8_Fig3_HTML.jpg](images/485790_1_En_8_Chapter/485790_1_En_8_Fig3_HTML.jpg)


    Figure 8-3


    Displaying a polyline from a path of latitude and longitude pairs


    Typically, you would probably construct the path in a loop, reading from a database,
    the JSON response of an API call, or some other data structure. If you are working
    with the Google Directions API, you can create the path from the encoded path
    that a valid route returns. We’ll build a driving directions application that
    uses the Google Directions API and Google Maps in the next chapter.


    ### Polygons


    Polygons are similar to polylines, in that you construct them with a path of coordinates.
    The difference is that polygons will draw an additional line between the last
    coordinate and the first coordinate, completing the outline of the shape. In addition,
    similar to circles, you can set a fill color on a polygon. Here is an example
    of a polygon drawn using the same coordinates as the polyline earlier:


    ```

    func addPolygon() {

    let path = GMSMutablePath()

    path.addLatitude(30.25, longitude: -97.75)

    path.addLatitude(29.4, longitude: -98.5)

    path.addLatitude(29.76, longitude: -95.37)

    let polygon = GMSPolygon(path: path)

    polygon.strokeColor = .black

    polygon.strokeWidth = 2

    polygon.fillColor = UIColor(

    red: 1, green: 0, blue: 0, alpha: 0.3)

    polygon.map = mapView

    }

    ```


    The only differences between the preceding code and the polyline code are using
    the `GMSPolygon` class instead of `GMSPolyline` and being able to specify a fill
    color.


    Call `the addPolygon()` method at the end of your `viewDidLoad()` method , and
    you should see a triangle appear, like the one in Figure [8-4](#485790_1_En_8_Chapter.xhtml#Fig4).


    ![../images/485790_1_En_8_Chapter/485790_1_En_8_Fig4_HTML.jpg](images/485790_1_En_8_Chapter/485790_1_En_8_Fig4_HTML.jpg)


    Figure 8-4


    Displaying a polygon on the map


    Now that you’ve seen how to draw shapes on the map, it’s time to discuss how to
    remove shapes after they are no longer needed.


    ## Removing markers and shapes


    Each marker or shape has a `map` property that points to the map view they display
    on. If you would like to clear a marker or shape from the map, simply set the
    `map` property to `nil`:


    ```

    mapMarker.map = nil

    ```


    This is useful for removing individual markers or shapes or different groups of
    markers or shapes. If you’re processing search results and then displaying them
    on the map, you may want to clear all previous results off of the map before displaying
    the new results. To clear all markers and shapes off of the map and only display
    the map tiles, use the `clear()` method on the map view:


    ```

    mapView.clear()

    ```


    You can now create any new markers or shapes that you need.


    ## Conclusion


    In this chapter, we discussed how to change the map tiles used in your map view,
    using the `mapType` property of the map view. We also added markers to our map
    and learned how to change the marker icon. When a user taps on a marker or info
    window, we also learned how to handle those events and how to pass custom data
    on a marker that we could use. Last, we looked at adding circles, polylines, and
    polygons and then how to remove markers and shapes.


    In the next chapter, we build on our discussion of polylines and paths to provide
    driving directions from Google Directions API on a map view.'
  trans: "\n# 圆形\n\n一般来说，所有这些覆盖物的工作原理都类似，所以让我们从最简单的例子——圆形开始。`GMSCircle` 类与 `GMSMarker`\
    \ 类相似，你需要用纬度和经度设置其位置，然后将一个地图作为属性赋值给它。它与标记的不同之处在于，你必须设置圆形在地图上覆盖的半径。此半径以米为单位，并对应实际地理位置。标记通常以相同的固定尺寸显示，无论你在地图上的缩放级别如何。除了设置半径，你还可以设置圆形的内部填充颜色、描边轮廓的颜色以及轮廓的宽度。\n\
    \n以下代码在德克萨斯州的奥斯汀市上空创建了一个浅灰色、半透明的圆形，半径为 20 公里，并带有深灰色轮廓：\n\n```\nfunc addCircle()\
    \ {\n    let circle = GMSCircle()\n    circle.fillColor = UIColor(white: 0.6,\
    \ alpha: 0.7)\n    circle.strokeColor = .darkGray\n    circle.radius = 20 * 1000\n\
    \    circle.position = CLLocationCoordinate2D(\n        latitude: 30.25, longitude:\
    \ -97.75)\n    circle.map = mapView\n}\n```\n\n从 `viewDidLoad()` 方法中调用 `addCircle()`，运行你的应用，你会在\
    \ Xcode 模拟器中看到与图 8-2 类似的内容。\n\n![../images/485790_1_En_8_Chapter/485790_1_En_8_Fig2_HTML.jpg](img/485790_1_En_8_Fig2_HTML.jpg)\n\
    \n图 8-2\n\n在地图上显示圆形\n\n现在我们显示了圆形，接下来继续介绍下一种覆盖物：折线。\n\n## 折线与路径\n\n如果你要在应用中显示一条路线或路径，可以使用折线来显示由一条或多条不同线段组成的线条。在\
    \ iOS 版 Google Maps SDK 中，其工作原理是：你将路径构建为一个 `GMSMutablePath` 对象，其中包含两个或更多的位置坐标，按它们将被连接起来的顺序排列。然后你使用该路径构建一个\
    \ `GMSPolyline` 对象。路径代表数据（经纬度以及顺序），而折线则为地图提供渲染选项——线条颜色和宽度。Google 地图的折线没有填充颜色，只有描边颜色和描边宽度。\n\
    \n首先，创建一个路径：\n\n```\nlet path = GMSMutablePath()\n```\n\n你可以向路径中添加 `CoreLocation`\
    \ 坐标或经纬度对。在本例中，我们使用经纬度对向路径中添加德克萨斯州的几个城市。此路径将有两个线段：\n\n```\npath.addLatitude(30.25,\
    \ longitude: -97.75)\npath.addLatitude(29.4, longitude: -98.5)\npath.addLatitude(29.76,\
    \ longitude: -95.37)\n```\n\n现在我们有了一个包含两个或更多坐标的路径，我们可以用它来构建一条折线：\n\n```\nlet polyline\
    \ = GMSPolyline(path: path)\n```\n\n你可以通过定义新的描边颜色和描边宽度来设置折线的显示选项：\n\n```\npolyline.strokeColor\
    \ = .red\npolyline.strokeWidth = 3\n```\n\n最后，你需要记得告知折线要在哪个地图上显示：\n\n```\npolyline.map\
    \ = mapView\n```\n\n以下是所有这些语句组合成一个函数的形式：\n\n```\nfunc addPolyline() {\n    let\
    \ path = GMSMutablePath()\n    path.addLatitude(30.25, longitude: -97.75)\n  \
    \  path.addLatitude(29.4, longitude: -98.5)\n    path.addLatitude(29.76, longitude:\
    \ -95.37)\n    let polyline = GMSPolyline(path: path)\n    polyline.strokeColor\
    \ = .red\n    polyline.strokeWidth = 3\n    polyline.map = mapView\n}\n```\n\n\
    如果你从应用中调用该函数，它看起来会类似于图 8-3。\n\n![../images/485790_1_En_8_Chapter/485790_1_En_8_Fig3_HTML.jpg](img/485790_1_En_8_Fig3_HTML.jpg)\n\
    \n图 8-3\n\n根据经纬度对路径显示折线\n\n通常，你可能会在循环中构建路径，从数据库、API 调用的 JSON 响应或其他某种数据结构中读取数据。如果你在使用\
    \ Google Directions API，你可以从有效路线返回的编码路径中创建路径。我们将在下一章中构建一个使用 Google Directions\
    \ API 和 Google 地图的驾车导航应用。\n\n## 多边形\n\n多边形与折线类似，都是用坐标路径构建的。不同之处在于，多边形会在最后一个坐标和第一个坐标之间绘制额外的线条，从而完成形状的轮廓。此外，与圆形类似，你可以在多边形上设置填充颜色。以下是一个使用与之前折线相同坐标绘制的多边形示例：\n\
    \n```\nfunc addPolygon() {\n    let path = GMSMutablePath()\n    path.addLatitude(30.25,\
    \ longitude: -97.75)\n    path.addLatitude(29.4, longitude: -98.5)\n    path.addLatitude(29.76,\
    \ longitude: -95.37)\n    let polygon = GMSPolygon(path: path)\n    polygon.strokeColor\
    \ = .black\n    polygon.strokeWidth = 2\n    polygon.fillColor = UIColor(\n  \
    \      red: 1, green: 0, blue: 0, alpha: 0.3)\n    polygon.map = mapView\n}\n\
    ```\n\n上述代码与折线代码的唯一区别在于使用了 `GMSPolygon` 类而不是 `GMSPolyline` 类，并且能够指定填充颜色。\n\n在\
    \ `viewDidLoad()` 方法的末尾调用 `addPolygon()` 方法，你应该会看到一个三角形出现，就像图 8-4 中所示的那样。\n\n\
    ![../images/485790_1_En_8_Chapter/485790_1_En_8_Fig4_HTML.jpg](img/485790_1_En_8_Fig4_HTML.jpg)\n\
    \n图 8-4\n\n在地图上显示多边形\n\n现在你已经了解了如何在地图上绘制形状，是时候讨论如何在不再需要它们时将其移除。\n\n## 移除标记和形状\n\
    \n每个标记或形状都有一个 `map` 属性，指向它们所显示的地图视图。如果你想从地图上清除一个标记或形状，只需将 `map` 属性设置为 `nil`：\n\
    \n```\nmapMarker.map = nil\n```\n\n这对于移除单个标记或形状，或不同组别的标记或形状非常有用。如果你正在处理搜索结果并将其显示在地图上，你可能希望在显示新结果之前清除地图上所有之前的结果。要清除地图上所有的标记和形状，只显示地图瓦片，请在地图视图上使用\
    \ `clear()` 方法：\n\n```\nmapView.clear()\n```\n\n然后你就可以创建任何你需要的新标记或形状了。\n\n## 总结\n\
    \n在本章中，我们讨论了如何使用地图视图的 `mapType` 属性来更改地图视图中使用的地图瓦片。我们还向地图添加了标记，并学习了如何更改标记图标。我们还学习了如何处理用户轻点标记或信息窗口时的事件，以及如何在我们可以使用的标记上传递自定义数据。最后，我们研究了如何添加圆形、折线和多边形，以及如何移除标记和形状。\n\
    \n在下一章中，我们将基于对折线和路径的讨论，在地图视图上使用 Google Directions API 提供驾车导航指引。\n"
- fmt: '# 9. Using Directions with the Google Directions API


    The Google Directions API is a simple HTTPS API that lets you get driving directions
    to a destination. The Google Directions API does not have a native Swift implementation
    from Google – instead, you make an HTTPS API call to Google and parse the JSON
    results in the response. Part of a successful response is a path that can be turned
    into a polyline and displayed on the map.


    This chapter builds on the work done in Chapters [7](#485790_1_En_7_Chapter.xhtml)
    and [8](#485790_1_En_8_Chapter.xhtml). In Chapter [7](#485790_1_En_7_Chapter.xhtml),
    we set up a basic iOS application project using CocoaPods with the Google Maps
    API. In Chapter [8](#485790_1_En_8_Chapter.xhtml), we discussed how to display
    shapes and markers on the map. For this chapter, we are going to reuse the same
    project as Chapters [7](#485790_1_En_7_Chapter.xhtml) and [8](#485790_1_En_8_Chapter.xhtml)
    – or you can create a new project that uses the Google Maps iOS SDK and has a
    map view on the storyboard.


    We will need to do a little more work to enable the Google Directions API and
    create a new API key to use with the HTTP API.


    ## Setting up the Google Directions API


    In Chapter [7](#485790_1_En_7_Chapter.xhtml), we created an API Key and enabled
    the Google Maps APIs. Because we only chose to enable maps, we need to add the
    Google Directions API to our Google Cloud Project. Log in to your account at [`https://cloud.google.com/maps-platform`](https://cloud.google.com/maps-platform).


    Select APIs from the menu in the sidebar (Figure [9-1](#485790_1_En_9_Chapter.xhtml#Fig1)).


    ![../images/485790_1_En_9_Chapter/485790_1_En_9_Fig1_HTML.jpg](images/485790_1_En_9_Chapter/485790_1_En_9_Fig1_HTML.jpg)


    Figure 9-1


    Enabled APIs and Additional APIs for Google Maps


    You will see the APIs you added for Google Maps here, along with a list of additional
    APIs you could use in your project. Under Additional APIs, you will find the Google
    Directions API (Figure [9-2](#485790_1_En_9_Chapter.xhtml#Fig2)).


    ![../images/485790_1_En_9_Chapter/485790_1_En_9_Fig2_HTML.jpg](images/485790_1_En_9_Chapter/485790_1_En_9_Fig2_HTML.jpg)


    Figure 9-2


    Enabling the Google Directions API


    Enable the Directions API here.


    **Caution**

    If you forget to enable the Google Directions API, when you make an HTTP request,
    you will get an error message similar to this: “This API project is not authorized
    to use this API.”


    After enabling the Directions API, you will need to create a new API key. Visit
    the Credentials screen for Google Cloud Platform’s APIs and Services at [`https://console.cloud.google.com/apis/credentials`](https://console.cloud.google.com/apis/credentials).
    You should see your iOS Maps Key, as in Figure [9-3](#485790_1_En_9_Chapter.xhtml#Fig3).


    ![../images/485790_1_En_9_Chapter/485790_1_En_9_Fig3_HTML.jpg](images/485790_1_En_9_Chapter/485790_1_En_9_Fig3_HTML.jpg)


    Figure 9-3


    Credentials screen for creating API keys


    Create a new credential, and when the drop-down menu appears, choose API Key.
    A new API key will be generated, but it will be unrestricted – the next step is
    to restrict the API key.


    ## Restricting the API Key


    Choose the RESTRICT KEY button on the dialog box that appears (Figure [9-4](#485790_1_En_9_Chapter.xhtml#Fig4)).


    ![../images/485790_1_En_9_Chapter/485790_1_En_9_Fig4_HTML.jpg](images/485790_1_En_9_Chapter/485790_1_En_9_Fig4_HTML.jpg)


    Figure 9-4


    API key created dialog box, with RESTRICT KEY button


    Although it may seem like you want to restrict the Google Directions API Key to
    an iOS app, that doesn’t work with making an HTTPS call to the Google Directions
    API. If you are going to directly embed the API Key into an iOS app, you need
    to choose None for application restrictions.


    The best practice for this is not to embed the API Key into the app, like we do
    with the sample project – this works for prototyping and development, but means
    that if someone can look for static strings in your app, they could extract the
    string.


    You also want to be careful if you upload this project into a public Git repository
    as open source. It’s very easy to get an API key if it’s published, even if you
    go back later and make a commit that takes it out.


    Instead, what you can do is make a web service that proxies the request from your
    application to Google. Your web service can be the only code that knows about
    your API key, and it can live on an application server or in a serverless cloud
    environment as a function. Put the API Key into an environment or context variable,
    rather than directly embedding it in the code, or in a configuration file.


    You can control access to this web service or function by requiring a valid user
    credential, if your app has typical user signup and authentication.


    This also has the advantage of not breaking existing mobile applications if you
    need to rotate your Google API keys – you can simply set a new environment variable
    for your web service or cloud function and then restart your service or function.


    For this project, we can put those concerns aside, so that we can try out the
    Google Directions API. Just don’t upload this source code to your public Git repository,
    or if you do by accident, delete the API Key from Google Cloud Platform.


    Under API restrictions, restrict this key to the Google Directions API, and then
    save the changes, as shown in Figure [9-5](#485790_1_En_9_Chapter.xhtml#Fig5).


    ![../images/485790_1_En_9_Chapter/485790_1_En_9_Fig5_HTML.jpg](images/485790_1_En_9_Chapter/485790_1_En_9_Fig5_HTML.jpg)


    Figure 9-5


    Restrict API key screen


    Once you have saved the Google Directions API key, make note of it.


    ## Using the Google Directions API


    Unfortunately, there is not an official helper library for iOS or Swift from Google
    for the Google Directions API. Instead, we can use the standard iOS networking
    library to make the API calls. The Google Directions API consists of an HTTPS
    endpoint that takes request parameters and returns a JSON response (there is also
    an XML endpoint).


    To implement this API in Swift, we can use the `URLSession` class (and its related
    classes) to make the HTTPS call. We can either parse the JSON into dictionaries
    and arrays using the `JSONSerialization` class or define a data structure that
    implements the `Codable` protocol for the JSON response and use the `JSONDecoder`
    class. The second approach is much cleaner, as the first approach requires copious
    uses of `if let` and `guard let` statements with the nested structure of the Google
    Directions API response. We create a basic set of Swift structures to hold the
    Directions API response in this chapter.'
