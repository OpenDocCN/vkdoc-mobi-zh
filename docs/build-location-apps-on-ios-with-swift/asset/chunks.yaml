    ## Summary


    We have now created an iOS application that shows a pin on a map. Along the way,
    we have covered the `MapKit` framework, map views, and annotations.


    In the next chapter, we will build on the basic map application we built here
    and display the user’s location on the map. If you would like to try a similar
    project to this example out with the Google Maps for iOS SDK or the Mapbox SDK,
    please see Chapters [7](#485790_1_En_7_Chapter.xhtml) and [11](#485790_1_En_11_Chapter.xhtml),
    respectively.


    # 2. Getting the User’s Location


    Let’s take our app one step further and show the user’s location on the map. The
    location functionality in iOS is extremely powerful – you can get the user’s current
    location, or you can track the user’s location as it changes over time to show
    their path on a map. We will use the `CoreLocation` framework for this, as well
    as the `MapKit` framework we discussed earlier.


    We will add additional functionality to the project from Chapter [1](#485790_1_En_1_Chapter.xhtml).
    That FirstMapsApp project already has the map view in place that we will use to
    show the user’s location.


    ## Privacy and location permissions


    Because an app can do so much with the user’s location, Apple has added protections
    for the user’s privacy that you as an application developer need to understand.


    An iOS app can request permission to use the user’s location while the application
    is in use or while the application is in the background. You may have seen these
    alerts pop up when you use location-based apps on an iPhone or iPad yourself.
    If your app doesn’t have a compelling reason to get the user’s location, the user
    is very likely to not allow the app access.


    If your app relies on using the user’s location in the background, iOS will pop
    up a confirmation alert to the user that says your app is continuing to use their
    location in the background, and would they like to continue providing their location?
    Many users will turn off location sharing at that point.


    ### Location permissions in the Info.plist file


    Your iOS app will require modifications in two places to access the user’s location –
    the `Info.plist` application configuration file and your app delegate or a view
    controller. The `Info.plist` will need to have values for one or both of two keys,
    depending on which location access your app needs – when in use or always:


    *   `NSLocationWhenInUseUsageDescription`


    *   `NSLocationAlwaysAndWhenInUseUsageDescription`


    These settings are configurable through the Xcode Property List Editor, so you
    do not have to edit the plist directly in XML. You also don’t need to know these
    exact key definitions – in the Property List Editor, the descriptions are listed
    as `Privacy - Location When In Use Usage Description` and `Privacy - Location
    Always and When In Use Usage Description`.


    Select the `Info.plist` file in Xcode. The Property List Editor appears, as in
    Figure [2-1](#485790_1_En_2_Chapter.xhtml#Fig1).


    ![../images/485790_1_En_2_Chapter/485790_1_En_2_Fig1_HTML.jpg](images/485790_1_En_2_Chapter/485790_1_En_2_Fig1_HTML.jpg)


    Figure 2-1


    Location privacy in Info.plist


    Any text can be used as the value of these keys – it will be displayed to the
    user after your app asks for location permission from the user. Go ahead and add
    a row to the Info.plist file and then set the key to be `Privacy – Location When
    In Use Description` and the value to “This app would like to use your location”.
    That leads us to the next step in this chapter – requesting permission from the
    user.


    ## Requesting location permissions from the end user


    Now that you have decided whether to ask for permission to track the user’s location
    when the application is in use, or at all times, and you have configured the `Info.plist`
    file with your corresponding definition, the next step is to ask the user for
    permission programmatically. This requires creating a `CLLocationManager` object
    and then requesting the appropriate permission from the user.


    You’ll need to start by importing the `CoreLocation` framework at the top of your
    view controller. Next, we’ll initialize that location manager as a property on
    our view controller, so that we can reference it from within other methods in
    our code.


    ```

    import CoreLocation

    ```


    Inside the view controller’s `viewDidLoad()` method , we will call an asynchronous
    method on our `CLLocationManager` object – either `requestWhenInUseAuthorization()`
    or `requestAlwaysAuthorization()`, as seen in Listing [2-1](#485790_1_En_2_Chapter.xhtml#PC2).
    In our case, we will request the When In Use Authorization, as we are not going
    to use the user’s location in the background.


    ```

    import UIKit

    import MapKit

    import CoreLocation

    class ViewController: UIViewController {

    @IBOutlet weak var mapView: MKMapView!

    var locationManager:CLLocationManager!

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view.

    let austin = MKPointAnnotation()

    austin.coordinate = CLLocationCoordinate2DMake(30.25, -97.75)

    austin.title = "Austin"

    mapView.addAnnotation(austin)

    locationManager = CLLocationManager.init()

    locationManager.requestWhenInUseAuthorization()

    }

    }

    Listing 2-1

    Requesting location authorization with CoreLocation

    ```


    After adding these lines to the view controller, when you run the application,
    you should see something similar to the dialog in Figure [2-2](#485790_1_En_2_Chapter.xhtml#Fig2)
    appear.


    ![../images/485790_1_En_2_Chapter/485790_1_En_2_Fig2_HTML.jpg](images/485790_1_En_2_Chapter/485790_1_En_2_Fig2_HTML.jpg)


    Figure 2-2


    Location permission dialog in iOS


    To see this dialog again after choosing to allow or deny permission, you will
    need to delete the compiled app from your phone or iOS Simulator.'
