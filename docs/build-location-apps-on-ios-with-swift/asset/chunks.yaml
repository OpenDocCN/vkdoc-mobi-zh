- fmt: '# Creating map styles with Mapbox Studio


    Mapbox provides a web-based application, `Mapbox Studio`, that you can use to
    customize the maps for your application. These maps can be used in your iOS application,
    but you can also use them on the Web and in Android applications. All of the styling
    is done in one place, so that users of your applications have a consistent experience
    across platforms. Let’s start by opening up `Mapbox Studio` (Figure [12-1](#485790_1_En_12_Chapter.xhtml#Fig1))
    at [`https://studio.mapbox.com/`](https://studio.mapbox.com/).


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig1_HTML.jpg](images/485790_1_En_12_Chapter/485790_1_En_12_Fig1_HTML.jpg)


    Figure 12-1


    `Mapbox Studio`


    Browsing through `Mapbox Studio`, you will find example styles, documentation,
    and helpful videos. Take a look at some of the tools and resources to see what
    is new with the application – at the time of writing, `Mapbox Studio` is in beta
    release.


    Let’s go ahead and create a new style. Click the large blue, `New Style` button
    on the Studio home screen. You will see a large template selection screen. Take
    the time to look through all of the different templates and variations (Figure
    [12-2](#485790_1_En_12_Chapter.xhtml#Fig2)) – you might find one that really fits
    your application.


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig2_HTML.jpg](images/485790_1_En_12_Chapter/485790_1_En_12_Fig2_HTML.jpg)


    Figure 12-2


    `Mapbox Studio` style templates


    For this project, we will be using the `Basic` template, with the `Galaxy` variation
    (Figure [12-3](#485790_1_En_12_Chapter.xhtml#Fig3)) – but you are welcome to create
    your project with whatever variation you choose.


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig3_HTML.jpg](images/485790_1_En_12_Chapter/485790_1_En_12_Fig3_HTML.jpg)


    Figure 12-3


    `Basic` template with the `Galaxy` variation


    Select `Galaxy` (or another variation) and then click the `Customize Basic` button
    to continue into the detailed style editor, as shown in Figure [12-3](#485790_1_En_12_Chapter.xhtml#Fig3).


    The style editor (Figure [12-4](#485790_1_En_12_Chapter.xhtml#Fig4)) has two several
    different features, but if you would like to customize the display of the map,
    one of the ways to do this is to adjust the display of the individual layers on
    the map. The `Components` view in the left sidebar is the easiest way to do this.
    For instance, you can select the `Road network`, choose one of the colors used
    in the `Galaxy` variation, and then pick a new color from the color picker. You
    could similarly update the colors used for water, place labels, or anything else
    in the map.


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig4_HTML.jpg](images/485790_1_En_12_Chapter/485790_1_En_12_Fig4_HTML.jpg)


    Figure 12-4


    Style editor, showing components in left sidebar


    You have full control over which features get displayed on the map, and you can
    disable them. For instance, if you don’t need to show subdivision names on the
    map, you can easily disable them by selecting the `Place labels` component in
    the `Components` side bar, scrolling down to `Settlement subdivisions`, and flipping
    the switch to off, as shown in Figure [12-5](#485790_1_En_12_Chapter.xhtml#Fig5).


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig5_HTML.jpg](images/485790_1_En_12_Chapter/485790_1_En_12_Fig5_HTML.jpg)


    Figure 12-5


    Changing subdivision place name display in `Mapbox Studio`


    If you are looking for even more fine-grained control, all of the layers are visible
    under the `Layers` view in the sidebar, and each layer has a detailed style editor
    that gives you a very large amount of control.


    Choose `Layers` from the sidebar, pick the `state-label` layer, and then take
    a look at the different options. You can choose a different font here, change
    its size, and adjust text settings (Figure [12-6](#485790_1_En_12_Chapter.xhtml#Fig6)).


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig6_HTML.jpg](images/485790_1_En_12_Chapter/485790_1_En_12_Fig6_HTML.jpg)


    Figure 12-6


    Text styles for place name labels


    We aren’t going to change anything at this level for this project, but the option
    to do it is powerful. Dismiss any open style editors that may be blocking your
    view of the example map, and then change the viewpoint centered in the map to
    your location using the search bar with the magnifying glass on the right-hand
    side of the window (Figure [12-7](#485790_1_En_12_Chapter.xhtml#Fig7)).


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig7_HTML.jpg](images/485790_1_En_12_Chapter/485790_1_En_12_Fig7_HTML.jpg)


    Figure 12-7


    Location picker for `Mapbox Studio`


    Choose your location, and then zoom in or out until you get the view of the map
    you would like to see (Figure [12-8](#485790_1_En_12_Chapter.xhtml#Fig8)).


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig8_HTML.jpg](images/485790_1_En_12_Chapter/485790_1_En_12_Fig8_HTML.jpg)


    Figure 12-8


    `Mapbox Studio` showing Austin, Texas, instead of default location


    Explore your area, and if the map style isn’t quite what you would like, take
    some time with the editor to change it!


    If you are happy with the map styles or you just want to see this map in your
    iOS application, click the `Publish` button at the top right of the editor. A
    dialog box (Figure [12-9](#485790_1_En_12_Chapter.xhtml#Fig9)) will appear with
    your published map style on the left-hand side and the draft version you were
    editing on the right. This makes it easy to compare and contrast your edits. If
    everything looks good and you want to replace the existing style, go ahead and
    click `Publish`. If you would like to fork your existing style, click `Publish
    as new`. If you `Publish as new`, `Mapbox` will save your changes as a duplicate,
    with a name like `Basic-copy`.


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig9_HTML.jpg](images/485790_1_En_12_Chapter/485790_1_En_12_Fig9_HTML.jpg)


    Figure 12-9


    Publish map style dialog box


    After either publishing a new map style or creating a new map style, go back to
    the `Mapbox Studio` home screen by clicking the `Styles` button in the upper left-hand
    corner. You will see your style listed on the home screen, as in Figure [12-10](#485790_1_En_12_Chapter.xhtml#Fig10).


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig10_HTML.jpg](images/485790_1_En_12_Chapter/485790_1_En_12_Fig10_HTML.jpg)


    Figure 12-10


    `Mapbox Studio` home screen with new styles


    Now, let’s try our new map style in our iOS app! To the right of your map style,
    you will see a three-dot button that will open a pop-up menu (Figure [12-11](#485790_1_En_12_Chapter.xhtml#Fig11)).
    Click that button, and then click the clipboard icon that appears to copy the
    `Mapbox` style URL for your map style.


    ![../images/485790_1_En_12_Chapter/485790_1_En_12_Fig11_HTML.jpg](images/485790_1_En_12_Chapter/485790_1_En_12_Fig11_HTML.jpg)


    Figure 12-11


    Pop-up menu for a map style, with Style URL and copy button


    Save the style URL, and go back to `Xcode`. We’ll tell the map view to use the
    style and then run the iOS app with our new map styles.'
