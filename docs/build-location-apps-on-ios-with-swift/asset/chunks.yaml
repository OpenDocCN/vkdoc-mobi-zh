  raw: '### Displaying the current step


    One way to organize your step-by-step directions code is to create a function
    that is responsible for displaying the current step. This function will need to
    set the content of each label, disable or enable the previous and next buttons
    based on index, and update the map to display the current route segment.


    Create a method named `displayCurrentStep()`. Inside this function, we are going
    to do some basic checking to make sure that we have a route, and the current step
    index is within the bounds of the route’s steps array. The complete version of
    the `displayCurrentStep()` method is in Listing [5-2](#485790_1_En_5_Chapter.xhtml#PC22):


    ```

    func displayCurrentStep() {

    guard let currentRoute = currentRoute else {

    return

    }

    if (currentStepIndex >= currentRoute.steps.count) {

    return

    }

    }

    ```


    Let’s add some more functionality to this method. Continue to add these statements
    to `displayCurrentStep()`, after the checks. We’ll keep track of the current step
    and then use that to set the properties of each of the labels:


    ```

    let step = currentRoute.steps[currentStepIndex]

    instructionsLabel.text = step.instructions

    distanceLabel.text = "\(step.distance) meters"

    ```


    We could add some functionality here for the distance label to change units if
    we wanted to. For the notice, not every route step will have a notice, so if there
    is not a notice (it is an optional), hide the notice label. Conversely, be sure
    to show the notice label if it is there:


    ```

    if step.notice != nil {

    noticeLabel.isHidden = false

    noticeLabel.text = step.notice

    } else {

    noticeLabel.isHidden = true

    }

    ```


    The next step is to manage the state of the buttons. The previous button should
    be disabled if the current step index is zero or less. The next button should
    be disabled if the current step index is the number of steps – 1 or more:


    ```

    previousButton.isEnabled = currentStepIndex > 0

    nextButton.isEnabled = currentStepIndex < (currentRoute.steps.count - 1)

    ```


    We still need to add the actions for each of these buttons, but let’s finish out
    the step display by showing the polyline for the route step in the map view. Similar
    to what we did for the entire route, we are going to set the visible map rectangle
    based on the bounding map rectangle of the polyline. We’ll also use the same padding
    on the edges to keep the segments visible. Add the following code to the end of
    your `displayCurrentStep()` method :


    ```

    let padding = UIEdgeInsets(

    top: 40, left: 40, bottom: 40, right: 40)

    mapView.setVisibleMapRect(

    step.polyline.boundingMapRect,

    edgePadding: padding,

    animated: true)

    ```


    Now that we have all of the display code, we need two more pieces – saving the
    route in the completion handler for the directions API and the actions for the
    previous and next actions.


    ### Saving the route in an instance variable


    When we get the directions response from the API in the `getDirections()` method,
    we will need to store the route as an instance variable. Inside the completion
    handler, save the route to the `currentRoute` instance variable:


    ```

    directions.calculate { (response, error) in

    guard let response = response else {

    print(error ?? "No error found")

    return

    }

    let route = response.routes[0]

    self.currentRoute = route

    self.displayCurrentStep()

    // Additional code follows

    }

    ```


    After the route has been saved, calling the `displayCurrentStep()` method we created
    in the previous section will initialize the step-by-step directions user interface
    with the current step.


    Now, we need to add functionality to the actions for the previous and next buttons.


    ### Actions for the previous and next buttons


    The actions for the previous and next buttons will update the current step index.
    We will need to check that the current route is set first. We also then make sure
    that changing the step index stays within the bounds of the steps array.


    For the `previous()` action, if the current step index is zero or less, the method
    will simply return:


    ```

    @IBAction func previous(_ sender: Any) {

    if currentRoute == nil {

    return

    }

    if (currentStepIndex <= 0) {

    return

    }

    currentStepIndex -= 1

    displayCurrentStep()

    }

    ```


    The `next()` action is similar, except that the check is for whether the current
    step index is less than the number of steps – 1:


    ```

    @IBAction func next(_ sender: Any) {

    guard let currentRoute = currentRoute else {

    return

    }

    if (currentStepIndex >=

    (currentRoute.steps.count - 1)) {

    return

    }

    currentStepIndex += 1

    displayCurrentStep()

    }

    ```


    After filling in the bodies for each of these actions, your application should
    be able to retrieve step-by-step directions. After running the application and
    clicking the Next button, you should see a screen like Figure [5-3](#485790_1_En_5_Chapter.xhtml#Fig3).


    ![../images/485790_1_En_5_Chapter/485790_1_En_5_Fig3_HTML.jpg](images/485790_1_En_5_Chapter/485790_1_En_5_Fig3_HTML.jpg)


    Figure 5-3


    One step in the step-by-step directions


    The complete code for the view controller is in Listing [5-2](#485790_1_En_5_Chapter.xhtml#PC22),
    with all of the methods and instance variables.


    ```

    import UIKit

    import MapKit

    class ViewController: UIViewController, MKMapViewDelegate {

    @IBOutlet weak var mapView: MKMapView!

    @IBOutlet weak var previousButton: UIButton!

    @IBOutlet weak var nextButton: UIButton!

    @IBOutlet weak var distanceLabel: UILabel!

    @IBOutlet weak var instructionsLabel: UILabel!

    @IBOutlet weak var noticeLabel: UILabel!

    var currentRoute:MKRoute?

    var currentStepIndex = 0

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view.

    mapView.delegate = self

    getDirections()

    }

    func getDirections() {

    let request = MKDirections.Request()

    // New York City

    request.source = createMapItem(latitude: 40.7128, longitude: -74)

    // Washington, DC

    request.destination = createMapItem(latitude: 38.91, longitude: -77.037)

    request.transportType = .automobile

    let directions = MKDirections(request: request)

    directions.calculate { (response, error) in

    guard let response = response else {

    print(error ?? "No error found")

    return

    }

    let route = response.routes[0]

    self.currentRoute = route

    self.displayCurrentStep()

    let padding = UIEdgeInsets(top: 40, left: 40, bottom: 40, right: 40)

    self.mapView.addOverlay(route.polyline)

    self.mapView.setVisibleMapRect(

    route.polyline.boundingMapRect,

    edgePadding: padding,

    animated: true)

    }

    }

    func displayRouteSteps(_ route:MKRoute) {

    for step in route.steps {

    print("Go \(step.distance) meters")

    print(step.instructions)

    }

    }

    func createMapItem(latitude:Double, longitude:Double) -> MKMapItem {

    let coord = CLLocationCoordinate2D(latitude: latitude,

    longitude: longitude)

    let placemark = MKPlacemark(coordinate: coord)

    return MKMapItem(placemark: placemark)

    }

    func mapView(_ mapView: MKMapView, rendererFor overlay: MKOverlay) -> MKOverlayRenderer
    {

    let renderer = MKPolylineRenderer(overlay: overlay)

    renderer.strokeColor = .red

    return renderer

    }

    @IBAction func previous(_ sender: Any) {

    if currentRoute == nil {

    return

    }

    if (currentStepIndex = (currentRoute.steps.count - 1)) {

    return

    }

    currentStepIndex += 1

    displayCurrentStep()

    }

    func displayCurrentStep() {

    guard let currentRoute = currentRoute else {

    return

    }

    if (currentStepIndex >= currentRoute.steps.count) {

    return

    }

    let step = currentRoute.steps[currentStepIndex]

    instructionsLabel.text = step.instructions

    distanceLabel.text = "\(step.distance) meters"

    if step.notice != nil {

    noticeLabel.isHidden = false

    noticeLabel.text = step.notice

    } else {

    noticeLabel.isHidden = true

    }

    previousButton.isEnabled = currentStepIndex > 0

    nextButton.isEnabled = currentStepIndex < (currentRoute.steps.count - 1)

    let padding = UIEdgeInsets(top: 40, left: 40, bottom: 40, right: 40)

    mapView.setVisibleMapRect(step.polyline.boundingMapRect,

    edgePadding: padding,

    animated: true)

    }

    }

    Listing 5-2

    ViewController class with step-by-step directions functionality

