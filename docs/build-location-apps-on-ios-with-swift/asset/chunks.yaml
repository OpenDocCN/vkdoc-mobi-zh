    的静态方法，你需要在调用 Google Places SDK 中的任何其他内容之前使用它。类似地，对于 Google Maps，我们将调用 `GMSServices`
    类的 `provideAPIKey()` 方法。在 `AppDelegate` 类中添加 `GooglePlaces` 和 `GoogleMaps` 框架的导入语句。我们将在应用委托的
    `application(_:didFinishLaunchingWithOptions:)` 方法中为这两个 Google SDK 提供 API 密钥。


    代码清单 10-2 是 `AppDelegate` 类的节选，省略了一些我们未修改的样板方法。将 `apiKey` 常量的值替换为你本章前面创建的 API
    密钥。


