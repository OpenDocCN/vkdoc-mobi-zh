    # 检测对要素的轻点


    当用户轻点地图时执行某些操作，我们需要向地图视图添加一个标准的 `UIKit` 轻点手势识别器。`MGLMapView` 类已内置多个轻点识别器，用于检测滚动、缩放等地图操作的用户输入。我们需要添加一个轻点手势识别器，并仅当内置轻点手势识别器未处理该轻点时，才触发其操作。这是
    Mapbox 地图视图的常见模式，并非局限于检测数据要素的轻点用例。


    在您的 `ViewController` 类中添加清单 13-2 中的方法，然后在视图控制器的 `viewDidLoad()` 方法中调用 `addGestureRecognizer()`
    函数。


    ```

    func addGestureRecognizer() {

    let tapGR = UITapGestureRecognizer(target: self,

    action: #selector(mapTapped(sender:)))

    for recognizer in mapView.gestureRecognizers!

    where recognizer is UITapGestureRecognizer {

    tapGR.require(toFail: recognizer)

    }

    mapView.addGestureRecognizer(tapGR)

    }

    清单 13-2

    向地图视图添加轻点手势识别器

    ```


    轻点手势识别器将调用名为 `mapTapped(sender:)` 的方法，我们也需要实现该方法。当地图被轻点时，我们将要求地图视图识别该点上的任何要素，然后将这些要素列出到控制台。如果需要，您也可以指示地图视图仅显示特定图层中的要素。


    `mapTapped(sender:)` 方法需要添加 `@objc` 注解才能使选择器正常工作。该方法的实现如清单 13-3 所示。


    ```

    @objc func mapTapped(sender: UITapGestureRecognizer) {

    let mapPoint = sender.location(in: mapView)

    let features = mapView.visibleFeatures(at: mapPoint)

    print(features)

    }

    清单 13-3

    当用户轻点应用时查找可见的地图要素

    ```


    将上述方法添加到应用中，然后运行应用。请确保同时在 `viewDidLoad()` 方法中添加对 `addGestureRecognizer()` 的调用。当您轻点某个地震圆圈时，将在
    Xcode 的控制台中看到该要素的属性输出。


    # 结论


    这是此处最简单的实现方案——例如，我们可以轻松扩展此方案，以更新应用内界面（如底部工具栏）中的标签，显示数据点的相关信息。地图返回的地震数据要素将是 `MGLPointFeature`
    对象。如果我们上传了包含折线或多边形的 GeoJSON 数据，它们将是实现 `MGLFeature` 协议的其他类，例如 `MGLPolylineFeature`
    或 `MGLPolygonFeature`。


    这是一个相当复杂的项目，但我希望您喜欢处理真实数据并使用 Mapbox Studio 构建可视化效果。


    在下一章中，我们将离开 Mapbox Studio，将注意力转向使用 Mapbox 提供驾驶导航。我们将创建一个应用，使用 Mapbox Navigation
    框架提供逐向导航的用户体验。


    # 使用 Mapbox 的逐向导航


    除了适用于 iOS 的 Mapbox 地图 SDK 之外，Mapbox 还提供了适用于 iOS 的逐向导航用户界面 SDK。通常，这种导航风格适用于提供内置驾驶导航的应用，例如拼车服务或包裹递送服务。


    在本章中，我们将构建一个简单的导航应用，该应用将从用户的当前位置导航到目的地。我们将使用 Mapbox 提供的标准逐向导航用户界面，即 Mapbox Navigation
    框架。如果您希望构建自己的用户界面，可以使用 Mapbox Core Navigation 框架为该用户界面提供路线更新支持。Mapbox Navigation
    框架构建在 Mapbox Core Navigation 框架之上。


    无论哪种情况，您的应用都使用 Mapbox Directions API 来创建起点和目的地之间的路线。与其他 Mapbox API 一样，在将其集成到您的应用之前，请检查
    Directions API 的定价，以确保您了解免费层和分层定价的运作方式。


    ## 设置您的应用项目


    在深入探讨 Mapbox Navigation 框架之前，我们需要创建一个新的 iOS 应用项目，使用 CocoaPods 对其进行设置，然后添加一些功能和
    `Info.plist` 条目。


    首先，在 Xcode 中创建一个新的 iOS 单视图应用。将应用命名为 `MapboxNavigationApp`。选择与之前项目相同的默认设置，即使用 storyboard/UIKit
    和 Swift。


    ### 设置 CocoaPods


    生成 iOS 应用后，关闭 Xcode 中的项目，并在与项目相同的目录中打开命令行。我们将为此项目初始化 CocoaPods，然后编辑 `Podfile`
    以包含 Mapbox Navigation 框架。使用以下命令生成 `Podfile`：


    ```

    pod init

    ```


    创建 `Podfile` 后，在文本编辑器中打开它，并将 Mapbox Navigation 框架作为依赖项包含在内。您的完整 `Podfile` 应如清单
    14-1 所示。


    ```

    target ''MapboxNavigationApp'' do

    # 如果不希望使用动态框架，请注释下一行

    use_frameworks!

    # MapboxNavigationApp 的 Pods

    pod ''MapboxNavigation'', ''~> 0.39.0''

    end

    清单 14-1

    使用 Mapbox Navigation 框架的应用的 Podfile

    ```


    关闭文本编辑器并保存 `Podfile`。然后从命令行使用以下命令安装依赖项：


    ```

    pod install

    ```


    安装 CocoaPods 后，您需要在 Xcode 中打开 `MapboxNavigationApp.xcworkspace` 工作区，而不是 Xcode
    项目。


    ### 向 Info.plist 添加条目


    为了使用 Mapbox SDK，我们下一步需要做的是向 Xcode 工作区中的 `Info.plist` 文件添加两个条目。打开该文件，并添加以下两个属性：


    - `MGLMapboxAccessToken`

    - `Privacy` - Location When In Use Usage Description


    访问令牌条目可以是您在前面的 Mapbox 章节（参见第 11 章说明）中已经使用过的同一个访问令牌。位置使用说明将在应用首次访问用户位置时显示给用户。示例说明可以是“此应用将使用您的位置以提供应用内导航并改进地图”。


    这样就处理好了 `Info.plist` 文件的设置。我们还需要为应用添加功能，以便应用在后台模式下运行。


    ### 添加必需的功能


    Mapbox Navigation 框架需要两种不同的后台模式功能。如果您不设置后台音频模式，应用将立即崩溃并提示您添加该模式。虽然您可以通过 `Info.plist`
    文件添加这些后台模式，但也可以通过 Xcode 项目将其作为功能添加。


    在 Xcode 中选择 `MapboxNavigationApp` 目标，然后选择 **Signing & Capabilities** 选项卡。点击 **+
    Capability** 按钮以添加一项功能。从功能列表中选择 **Background Modes**，如图 14-1 所示。


    ![../images/485790_1_En_14_Chapter/485790_1_En_14_Fig1_HTML.jpg](img/485790_1_En_14_Fig1_HTML.jpg)


    图 14-1


    向应用目标添加后台模式功能


    选择 **Audio, Airplay, and Picture in Picture** 以及 **Location updates**（图 14-2）。


    ![../images/485790_1_En_14_Chapter/485790_1_En_14_Fig2_HTML.jpg](img/485790_1_En_14_Fig2_HTML.jpg)


    图 14-2


    为导航选择后台模式


    现在，我们已经完成了使用 Mapbox Navigation 框架的所有设置。让我们继续了解 Mapbox Directions API。

