- fmt: '# Starting a new project with the Mapbox SDK


    We are going to build a new iOS application to demonstrate Mapbox functionality.
    Create a new project in Xcode, named `FirstMapboxApp`. This project should be
    a Single View Application, use Swift as the programming language, and use storyboard/UIKit
    for the user interface, as seen in Figure [11-3](#485790_1_En_11_Chapter.xhtml#Fig3).


    ![../images/485790_1_En_11_Chapter/485790_1_En_11_Fig3_HTML.jpg](images/485790_1_En_11_Chapter/485790_1_En_11_Fig3_HTML.jpg)


    Figure 11-3


    Creating the FirstMapboxApp project in Xcode


    After creating this Xcode project, we need to install the Mapbox SDK. Unlike Google
    Maps or MapKit, the Mapbox SDK is open source. The easiest way to include the
    SDK in your application is to use CocoaPods, similar to how we installed the Google
    Maps for iOS SDK. If you have not installed CocoaPods on your Mac, please visit
    [https://cocoapods.org/](https://cocoapods.org/) for installation instructions.


    Once you have CocoaPods set up, go to the command line, and change directories
    into the folder for the project you just created (`FirstMapBoxApp`).


    In that directory, create a CocoaPods `Podfile` for your project with this command:


    ```

    pod init

    ```


    The `Podfile` you create will look like Listing [11-1](#485790_1_En_11_Chapter.xhtml#PC2).


    ```

    target ''FirstMapboxApp'' do

    # Comment the next line if you don''t want to use dynamic frameworks

    use_frameworks!

    # Pods for FirstMapboxApp

    end

    Listing 11-1

    Generated Podfile for the project

    ```


    Within this file, we have a target that points to your Xcode project and a place
    to list libraries (known as pods in CocoaPods) that your project depends on. We
    only need to add one pod for Mapbox and then declare a version to use, as shown
    in Listing [11-2](#485790_1_En_11_Chapter.xhtml#PC3). At the time of this writing,
    that version is 5.8.


    ```

    target ''FirstMapboxApp'' do

    # Comment the next line if you don''t want to use dynamic frameworks

    use_frameworks!

    # Pods for FirstMapboxApp

    pod ''Mapbox-iOS-SDK'', ''~> 5.8''

    end

    Listing 11-2

    Added Mapbox CocoaPods library to project

    ```


    After editing and saving the `Podfile` file, run the following command on the
    command line:


    ```

    pod install

    ```


    CocoaPods will download the Mapbox library and install it into a Pods folder.
    You will also see a new `FirstMapboxApp.xcworkspace` file that you will open in
    Xcode. In this workspace will be your project, plus any dependencies from CocoaPods.


    Go ahead and open up the workspace. In your project’s `Info.plist` file (Figure
    [11-4](#485790_1_En_11_Chapter.xhtml#Fig4)), add an entry for `MGLMapboxAccessToken`,
    and set its string value to be your access token.


    ![../images/485790_1_En_11_Chapter/485790_1_En_11_Fig4_HTML.jpg](images/485790_1_En_11_Chapter/485790_1_En_11_Fig4_HTML.jpg)


    Figure 11-4


    Project Info.plist file with Mapbox access token setting


    Once you have added the access token, we have everything we need to use Mapbox.
    Let’s get started by adding a map to our default view controller.


    ## Displaying a map view


    Mapbox provides a map view class named `MGLMapView` (MGL is short for Mapbox GL).
    To use that map view class in a storyboard, drag a `UIView` onto your view controller,
    and then change the custom class in the identity inspector to `MGLMapView`, as
    shown in Figure [11-5](#485790_1_En_11_Chapter.xhtml#Fig5).


    ![../images/485790_1_En_11_Chapter/485790_1_En_11_Fig5_HTML.jpg](images/485790_1_En_11_Chapter/485790_1_En_11_Fig5_HTML.jpg)


    Figure 11-5


    Setting the MGLMapView custom class


    Let’s make sure everything is set up. Go ahead and run the application. You should
    see a basic world map appear in the iOS Simulator, similar to Figure [11-6](#485790_1_En_11_Chapter.xhtml#Fig6).


    ![../images/485790_1_En_11_Chapter/485790_1_En_11_Fig6_HTML.jpg](images/485790_1_En_11_Chapter/485790_1_En_11_Fig6_HTML.jpg)


    Figure 11-6


    Displaying a basic world map in the map view


    Tip


    If you see a blank map with an info button, you may need to double-check your
    Mapbox access token in the Info.plist file.


    Now that we have the map view, let’s change the way the map appears by centering
    it on a new location and choosing a different map style.


    ## Customizing the map view’s appearance


    Our first task is to create an outlet for our map view, so that we can change
    its properties programmatically. Use the Xcode Assistant to drag an outlet into
    the `ViewController` class. Name the outlet `mapView`. The declaration will look
    like this:


    ```

    @IBOutlet weak var mapView: MGLMapView!

    ```


    You will also need to add an import statement at the top of the class:


    ```

    import Mapbox

    ```


    Now that you have the map view declared as a variable, you can easily center the
    map over a new location. Inside your `viewDidLoad()` method, add these two lines.
    Feel free to adjust the latitude and longitude to match your location – the position
    I picked out is centered over Austin, Texas:


    ```

    mapView.centerCoordinate = CLLocationCoordinate2D(

    latitude: 30.2,

    longitude: -97.75)

    mapView.zoomLevel = 10

    ```


    After running the application, you’ll see that the map is now showing a lot more
    detail. Adjusting the zoom level programmatically is easy as well, with a zoom
    level of 10 being sufficient for central Austin.


    One of the best features of Mapbox is the ease of changing how the map renders.
    You can create your own map styles and then refer to them with a style URL. Or
    you can use some of the built-in Mapbox styles – these are available through the
    `MGLStyle` class. Try changing the style URL of your map view to an outdoors style:


    ```

    mapView.styleURL = MGLStyle.outdoorsStyleURL

    ```


    Other map styles available on the `MGLStyle` class are


    * `darkStyleURL`

    * `lightStyleURL`

    * `streetsStyleURL`

    * `satelliteStyleURL`

    * `satelliteStreetsStyleURL`


    In Chapter [12](#485790_1_En_12_Chapter.xhtml), we will examine map styles in
    much more detail, using the same `styleURL` property. Let’s move on to display
    a basic marker on the map.'
