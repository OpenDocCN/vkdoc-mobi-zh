    \ 或 Mapbox SDK，请分别参阅第 [7](#485790_1_En_7_Chapter.xhtml) 章和第 [11](#485790_1_En_11_Chapter.xhtml)\
    \ 章。\n\n# 2. 获取用户位置\n\n让我们进一步扩展应用，在地图上显示用户的位置。iOS 中的定位功能非常强大——你可以获取用户的当前位置，也可以随时间追踪用户位置的变化，在地图上显示其路径。为此，我们将使用`CoreLocation`框架以及之前讨论过的`MapKit`框架。\n\
    \n我们将为第 [1](#485790_1_En_1_Chapter.xhtml) 章的项目添加额外功能。该项目中`FirstMapsApp`已经包含了用于显示用户位置的地图视图。\n\
    \n## 隐私与位置权限\n\n由于应用可以对用户的位置做很多处理，Apple 增加了对用户隐私的保护，作为应用开发者你需要了解这些保护措施。\n\niOS\
    \ 应用可以请求权限，以在应用使用期间或后台使用用户的位置。当你在 iPhone 或 iPad 上使用基于位置的应用时，可能已经看到过这些弹出提示。如果你的应用没有令人信服的理由获取用户位置，用户很可能会拒绝授权。\n\
    \n如果你的应用需要在后台使用用户位置，iOS 会弹出确认提示，告知用户你的应用正在后台持续使用其位置，并询问是否继续提供位置信息。此时许多用户会关闭位置共享。\n\
    \n### Info.plist 中的位置权限设置\n\n你的 iOS 应用需要在两个地方进行修改才能访问用户位置：`Info.plist`应用配置文件以及你的应用委托或视图控制器。根据应用需要的定位模式（使用期间或始终），`Info.plist`需要为一个或两个键设置值：\n\
    \n*   `NSLocationWhenInUseUsageDescription`\n*   `NSLocationAlwaysAndWhenInUseUsageDescription`\n\
    \n这些设置可以通过 Xcode 的属性列表编辑器进行配置，因此你不需要直接以 XML 格式编辑`plist`文件。你也不需要记住这些确切的键定义——在属性列表编辑器中，相关描述列为`Privacy\
    \ - Location When In Use Usage Description`和`Privacy - Location Always and When\
    \ In Use Usage Description`。\n\n在 Xcode 中选择`Info.plist`文件。属性列表编辑器将显示，如图 [2-1](#485790_1_En_2_Chapter.xhtml#Fig1)\
    \ 所示。\n\n![../images/485790_1_En_2_Chapter/485790_1_En_2_Fig1_HTML.jpg](images/485790_1_En_2_Chapter/485790_1_En_2_Fig1_HTML.jpg)\n\
    \n**图 2-1** `Info.plist` 中的位置隐私设置\n\n任何文本都可以作为这些键的值——当应用向用户请求位置权限后，这些文本将显示给用户。继续在`Info.plist`中添加一行，将键设置为`Privacy\
    \ – Location When In Use Description`，值设为“此应用希望使用您的位置”。这将引导我们进入本章的下一步——向用户请求权限。\n\
    \n## 向最终用户请求位置权限\n\n既然你已经决定是在应用使用期间还是始终请求跟踪用户位置的权限，并在`Info.plist`中进行了相应配置，下一步就是通过编程方式向用户请求权限。这需要创建一个`CLLocationManager`对象，然后向用户请求相应的权限。\n\
    \n首先，你需要在视图控制器的顶部导入`CoreLocation`框架。接下来，我们将初始化一个位置管理器作为视图控制器的属性，以便在代码的其他方法中引用它。\n\
    \n```swift\nimport CoreLocation\n```\n\n在视图控制器的`viewDidLoad()`方法中，我们将在`CLLocationManager`对象上调用异步方法——`requestWhenInUseAuthorization()`或`requestAlwaysAuthorization()`，如[清单\
    \ 2-1](#485790_1_En_2_Chapter.xhtml#PC2)所示。在本例中，我们将请求“使用期间”授权，因为我们不会在后台使用用户的位置。\n\
    \n```swift\nimport UIKit\nimport MapKit\nimport CoreLocation\nclass ViewController:\
    \ UIViewController {\n    @IBOutlet weak var mapView: MKMapView!\n    var locationManager:\
    \ CLLocationManager!\n    override func viewDidLoad() {\n        super.viewDidLoad()\n\
    \        // Do any additional setup after loading the view.\n        let austin\
    \ = MKPointAnnotation()\n        austin.coordinate = CLLocationCoordinate2DMake(30.25,\
    \ -97.75)\n        austin.title = \"Austin\"\n        mapView.addAnnotation(austin)\n\
    \        locationManager = CLLocationManager.init()\n        locationManager.requestWhenInUseAuthorization()\n\
    \    }\n}\n```\n**清单 2-1** 使用`CoreLocation`请求位置授权\n\n将这些行添加到视图控制器后，运行应用时，你应该会看到类似图\
    \ [2-2](#485790_1_En_2_Chapter.xhtml#Fig2) 所示的对话框出现。\n\n![../images/485790_1_En_2_Chapter/485790_1_En_2_Fig2_HTML.jpg](images/485790_1_En_2_Chapter/485790_1_En_2_Fig2_HTML.jpg)\n\
