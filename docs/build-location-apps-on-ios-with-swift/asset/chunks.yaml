    \n**图 1-13** 在地图上显示奥斯丁图钉的完整 iOS 应用\n\n## 总结\n\n我们现在创建了一个在 iOS 应用的地图上显示图钉的程序。在此过程中，我们介绍了`MapKit`框架、地图视图和标注。\n\
    \n在下一章中，我们将基于此处构建的基础地图应用进行扩展，在地图上显示用户的位置。如果你想尝试类似的项目，使用 Google Maps for iOS SDK\
    \ 或 Mapbox SDK，请分别参阅第 7 章和第 11 章。\n\n# 2. 获取用户位置\n\n让我们进一步扩展应用，在地图上显示用户的位置。iOS\
    \ 中的定位功能非常强大——你可以获取用户的当前位置，也可以随时间追踪用户位置的变化，在地图上显示其路径。为此，我们将使用`CoreLocation`框架以及之前讨论过的`MapKit`框架。\n\
    \n我们将为第 1 章的项目添加额外功能。该项目中`FirstMapsApp`已经包含了用于显示用户位置的地图视图。\n\n## 隐私与位置权限\n\n由于应用可以对用户的位置做很多处理，Apple\
    \ 增加了对用户隐私的保护，作为应用开发者你需要了解这些保护措施。\n\niOS 应用可以请求权限，以在应用使用期间或后台使用用户的位置。当你在 iPhone\
    \ 或 iPad 上使用基于位置的应用时，可能已经看到过这些弹出提示。如果你的应用没有令人信服的理由获取用户位置，用户很可能会拒绝授权。\n\n如果你的应用需要在后台使用用户位置，iOS\
    \ 会弹出确认提示，告知用户你的应用正在后台持续使用其位置，并询问是否继续提供位置信息。此时许多用户会关闭位置共享。\n\n### Info.plist 中的位置权限设置\n\
    \n你的 iOS 应用需要在两个地方进行修改才能访问用户位置：`Info.plist`应用配置文件以及你的应用委托或视图控制器。根据应用需要的定位模式（使用期间或始终），`Info.plist`需要为一个或两个键设置值：\n\
    \n*   `NSLocationWhenInUseUsageDescription`\n*   `NSLocationAlwaysAndWhenInUseUsageDescription`\n\
    \n这些设置可以通过 Xcode 的属性列表编辑器进行配置，因此你不需要直接以 XML 格式编辑`plist`文件。你也不需要记住这些确切的键定义——在属性列表编辑器中，相关描述列为`Privacy\
    \ - Location When In Use Usage Description`和`Privacy - Location Always and When\
    \ In Use Usage Description`。\n\n在 Xcode 中选择`Info.plist`文件。属性列表编辑器将显示，如图 2-1 所示。\n\
    \n![../images/485790_1_En_2_Chapter/485790_1_En_2_Fig1_HTML.jpg](img/485790_1_En_2_Fig1_HTML.jpg)\n\
    \n**图 2-1** `Info.plist` 中的位置隐私设置\n\n任何文本都可以作为这些键的值——当应用向用户请求位置权限后，这些文本将显示给用户。继续在`Info.plist`中添加一行，将键设置为`Privacy\
    \ – Location When In Use Description`，值设为“此应用希望使用您的位置”。这将引导我们进入本章的下一步——向用户请求权限。\n\
    \n## 向最终用户请求位置权限\n\n既然你已经决定是在应用使用期间还是始终请求跟踪用户位置的权限，并在`Info.plist`中进行了相应配置，下一步就是通过编程方式向用户请求权限。这需要创建一个`CLLocationManager`对象，然后向用户请求相应的权限。\n\
    \n首先，你需要在视图控制器的顶部导入`CoreLocation`框架。接下来，我们将初始化一个位置管理器作为视图控制器的属性，以便在代码的其他方法中引用它。\n\
    \n```swift\nimport CoreLocation\n```\n\n在视图控制器的`viewDidLoad()`方法中，我们将在`CLLocationManager`对象上调用异步方法——`requestWhenInUseAuthorization()`或`requestAlwaysAuthorization()`，如清单\
    \ 2-1 所示。在本例中，我们将请求“使用期间”授权，因为我们不会在后台使用用户的位置。\n\n```swift\nimport UIKit\nimport\
    \ MapKit\nimport CoreLocation\nclass ViewController: UIViewController {\n    @IBOutlet\
    \ weak var mapView: MKMapView!\n    var locationManager: CLLocationManager!\n\
    \    override func viewDidLoad() {\n        super.viewDidLoad()\n        // Do\
    \ any additional setup after loading the view.\n        let austin = MKPointAnnotation()\n\
    \        austin.coordinate = CLLocationCoordinate2DMake(30.25, -97.75)\n     \
    \   austin.title = \"Austin\"\n        mapView.addAnnotation(austin)\n       \
    \ locationManager = CLLocationManager.init()\n        locationManager.requestWhenInUseAuthorization()\n\
    \    }\n}\n```\n**清单 2-1** 使用`CoreLocation`请求位置授权\n\n将这些行添加到视图控制器后，运行应用时，你应该会看到类似图\
    \ 2-2 所示的对话框出现。\n\n![../images/485790_1_En_2_Chapter/485790_1_En_2_Fig2_HTML.jpg](img/485790_1_En_2_Fig2_HTML.jpg)\n\
    \n**图 2-2** iOS 中的位置权限对话框\n\n在允许或拒绝授权后，如果需要再次看到此对话框，你需要从手机或 iOS 模拟器中删除已编译的应用。\n"
- fmt: "### Requesting location updates\n\nThe next step for your application should\
    \ be to begin getting location updates if the user has authorized you to do so.\
    \ To do that, you will need to implement a method from the `CLLocationManagerDelegate`\
    \ protocol – `locationManager(_:didChangeAuthorization:)` – which we will do in\
    \ an extension.\n\nExtensions are a way of organizing the methods in our class\
    \ around the protocols that we need to implement. This helps avoid some of the\
    \ code organization problems that come with putting all of your code for a screen\
    \ into a view controller class. In this particular case, we can make an extension\
    \ for the `CLLocationManagerDelegate` protocol and implement the `locationManager(_:didChangeAuthorization:)`\
    \ method:\n\n``` \nextension ViewController: CLLocationManagerDelegate {\nfunc\
    \ locationManager(_\nmanager: CLLocationManager,\ndidChangeAuthorization status:\
    \ CLAuthorizationStatus) {\n}\n}\n```\n\nJust implementing this method won’t do\
    \ anything – you will need to tell your location manager that it has a delegate\
    \ as well, before requesting authorization in the `viewDidLoad()` method:\n\n\
    ``` \nlocationManager = CLLocationManager.init()\nlocationManager.delegate = self\n\
    locationManager.requestWhenInUseAuthorization()\n```\n\nLast, it would be nice\
    \ to see what the user’s status is – so we will implement a switch method for\
    \ each of the different location authorization statuses. The code for the `ViewController`\
    \ class is in Listing [2-2](#485790_1_En_2_Chapter.xhtml#PC5).\n\n``` \nimport\
    \ UIKit\nimport MapKit\nimport CoreLocation\nclass ViewController: UIViewController\
    \ {\n@IBOutlet weak var mapView: MKMapView!\nvar locationManager:CLLocationManager!\n\
    override func viewDidLoad() {\nsuper.viewDidLoad()\n// Do any additional setup\
    \ after loading the view.\nlet austin = MKPointAnnotation()\naustin.coordinate\
    \ = CLLocationCoordinate2DMake(30.25, -97.75)\naustin.title = \"Austin\"\nmapView.addAnnotation(austin)\n\
    locationManager = CLLocationManager.init()\nlocationManager.delegate = self\n\
    locationManager.requestWhenInUseAuthorization()\n}\n}\nextension ViewController:\
    \ CLLocationManagerDelegate {\nfunc locationManager(_\nmanager: CLLocationManager,\n\
    didChangeAuthorization status: CLAuthorizationStatus) {\nswitch status {\ncase\
    \ .authorizedWhenInUse:\nprint(\"Authorized When in Use\")\ncase .authorizedAlways:\n\
    print(\"Authorized Always\")\ncase .denied:\nprint(\"Denied\")\ncase .notDetermined:\n\
    print(\"Not determined\")\ncase .restricted:\nprint(\"Restricted\")\n@unknown\
    \ default:\nprint(\"Unknown status\")\n}\n}\n}\nListing 2-2\nDisplaying the location\
    \ authorization status from within the app\n```\n\nAfter compiling and running\
    \ this class, you should see debug output from the location authorization status.\
    \ It will say `Not Determined` at first, and then after choosing to allow or deny\
    \ permission to get your location, you will see the corresponding status.\n\n\
    All of that is basic boilerplate code for using the user's location. Let's make\
    \ it a little more real by showing the user's location on the map!\n\n### Displaying\
    \ the user's location on the map\n\nOpen up `Main.storyboard`, and select the\
    \ map in the outline view if it is not already selected. We will need to set one\
    \ property on the map view through Xcode.\n\nChoose the fifth tab (the Attribute\
    \ Inspector), as seen in Figure [2-3](#485790_1_En_2_Chapter.xhtml#Fig3). At the\
    \ top, one of the check boxes will be for User Location – check that box.\n\n\
    ![../images/485790_1_En_2_Chapter/485790_1_En_2_Fig3_HTML.jpg](images/485790_1_En_2_Chapter/485790_1_En_2_Fig3_HTML.jpg)\n\
    \nFigure 2-3\n\nUser Location check box on Map View\n\nThat's it! If you are running\
    \ this on your Simulator, make sure you are sending a location to the app – that\
    \ setting is on the Simulator's menu, under Features, and then Location. Choose\
    \ Apple if you want to have an easy setting, or set the coordinates manually.\n\
    \nGo ahead and run the application – it should look similar to Figure [2-4](#485790_1_En_2_Chapter.xhtml#Fig4),\
    \ and the blue dot will be animating.\n\n![../images/485790_1_En_2_Chapter/485790_1_En_2_Fig4_HTML.jpg](images/485790_1_En_2_Chapter/485790_1_En_2_Fig4_HTML.jpg)\n\
    \nFigure 2-4\n\nUser Location on map\n\nThat's really all you have to do to get\
    \ a nice animated user location on to your map. Even though it is only one check\
    \ box on the map view, you still need to implement all of the `CoreLocation` framework\
    \ privacy and permissions code in your view controller.\n\n## Summary\n\nWe've\
    \ discussed user privacy for locations and how to use the `CoreLocation` framework\
    \ to request authorization from the app's end user. You've also seen how easy\
    \ it is to show user locations on `MapKit` maps in iOS.\n\nIn our next chapter,\
    \ we are going to display points of interest on a `MapKit` app and customize the\
    \ display for each of those using annotations.\n\n# 3. Displaying Annotations\
    \ on a MapKit Map\n\nIn Chapter [1](#485790_1_En_1_Chapter.xhtml), your first\
    \ iOS map application displayed one point on the map, with the default red pin\
    \ at its location. The `MapKit` framework is capable of much more when it comes\
    \ to displaying annotations. We can customize the images for the annotations and\
    \ the callouts seen when a user taps on an annotation.\n\nLet's continue building\
    \ on top of the `FirstMapsApp` project that we created in Chapter [1](#485790_1_En_1_Chapter.xhtml)\
    \ and then added user locations in Chapter [2](#485790_1_En_2_Chapter.xhtml).\n\
    \n## Understanding MapKit and annotations\n\nThe `MapKit` framework maintains\
    \ a distinction between annotations – the data displayed on the map – and annotation\
    \ views, the user interface elements that appear on top of the map at a given\
    \ coordinate for an annotation. While `MapKit` provides the `MKPointAnnotation`\
    \ class for basic point display, most map applications will use a custom implementation\
    \ of the `MKAnnotation` protocol.\n\nSimilarly, `MapKit` also includes the `MKPinAnnotationView`\
    \ and `MKMarkerAnnotationView` classes for displaying pins or markers on the app.\
    \ The `MKAnnotationView` class is useful for displaying your own custom images.\
    \ You can subclass the `MKAnnotationView` class or use it directly.\n\nThe `mapView(_:viewFor:)`\
    \ function on the `MKMapViewDelegate` protocol allows your application to map\
    \ `MKAnnotationView` objects to `MKAnnotation` objects. Because the `MKPointAnnotation`\
    \ class has a limited number of data fields, using your own implementation of\
    \ `MKAnnotation` gives you the most flexibility.\n\n## Using a custom annotation\
    \ class\n\nImplementing your own annotation class is straightforward – you will\
    \ need to extend the `NSObject` class and then implement the `MKAnnotation` protocol.\n\
    \nThe `title` and `subtitle` properties of the `MKAnnotation` protocol are `String`\
    \ optionals. The `coordinate` property is a little more complicated, as `MapKit`\
    \ requires that it supports key-value observing (KVO). In practice, this means\
    \ that it is not a simple declaration with a `var` keyword, but instead you would\
    \ also have to state that it uses dynamic dispatch with the Objective-C runtime.\
    \ Your declaration in code would look like this:\n\n``` \n@objc dynamic var coordinate:\
    \ CLLocationCoordinate2D\n```\n\nA basic custom annotation class, with an `init`\
    \ method, would look like Listing [3-1](#485790_1_En_3_Chapter.xhtml#PC2).\n\n\
    ``` \nimport UIKit\nimport MapKit\nclass MapPoint: NSObject, MKAnnotation {\n\
    @objc dynamic var coordinate: CLLocationCoordinate2D\nvar title:String?\nvar subtitle:\
    \ String?\ninit(coordinate:CLLocationCoordinate2D,\ntitle:String?, subtitle:String?)\
    \ {\nself.coordinate = coordinate\nself.title = title\nself.subtitle = subtitle\n\
    }\n}\nListing 3-1\nAn implementation of an annotation class in Swift\n```\n\n\
    We will be using this `MapPoint` class and then later extending it through the\
    \ course of this chapter. It's likely that you would add additional fields to\
    \ this annotation class for your specific application. Go ahead and create a new\
    \ file in your Xcode project named `MapPoint.swift`, and add the code in Listing\
    \ [3-1](#485790_1_En_3_Chapter.xhtml#PC2)."
  raw: '### Requesting location updates


    The next step for your application should be to begin getting location updates
    if the user has authorized you to do so. To do that, you will need to implement
    a method from the `CLLocationManagerDelegate` protocol – `locationManager(_:didChangeAuthorization:)` –
    which we will do in an extension.


    Extensions are a way of organizing the methods in our class around the protocols
    that we need to implement. This helps avoid some of the code organization problems
    that come with putting all of your code for a screen into a view controller class.
    In this particular case, we can make an extension for the `CLLocationManagerDelegate`
    protocol and implement the `locationManager(_:didChangeAuthorization:)` method:


    ```

    extension ViewController: CLLocationManagerDelegate {

    func locationManager(_

    manager: CLLocationManager,

    didChangeAuthorization status: CLAuthorizationStatus) {

    }

    }

    ```


    Just implementing this method won’t do anything – you will need to tell your location
    manager that it has a delegate as well, before requesting authorization in the
    `viewDidLoad()` method:


    ```

    locationManager = CLLocationManager.init()

    locationManager.delegate = self

    locationManager.requestWhenInUseAuthorization()

    ```


    Last, it would be nice to see what the user’s status is – so we will implement
    a switch method for each of the different location authorization statuses. The
    code for the `ViewController` class is in Listing [2-2](#485790_1_En_2_Chapter.xhtml#PC5).


    ```

    import UIKit

    import MapKit

    import CoreLocation

    class ViewController: UIViewController {

    @IBOutlet weak var mapView: MKMapView!

    var locationManager:CLLocationManager!

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view.

    let austin = MKPointAnnotation()

    austin.coordinate = CLLocationCoordinate2DMake(30.25, -97.75)

    austin.title = "Austin"

    mapView.addAnnotation(austin)

    locationManager = CLLocationManager.init()

    locationManager.delegate = self

    locationManager.requestWhenInUseAuthorization()

    }

    }

    extension ViewController: CLLocationManagerDelegate {

    func locationManager(_

    manager: CLLocationManager,

    didChangeAuthorization status: CLAuthorizationStatus) {

    switch status {

    case .authorizedWhenInUse:

    print("Authorized When in Use")

    case .authorizedAlways:

    print("Authorized Always")

    case .denied:

    print("Denied")

    case .notDetermined:

    print("Not determined")

    case .restricted:

    print("Restricted")

    @unknown default:

    print("Unknown status")

    }

    }

    }

    Listing 2-2

    Displaying the location authorization status from within the app

    ```


    After compiling and running this class, you should see debug output from the location
    authorization status. It will say “Not Determined” at first, and then after choosing
    to allow or deny permission to get your location, you will see the corresponding
    status.


    All of that is basic boilerplate code for using the user’s location. Let’s make
    it a little more real by showing the user’s location on the map!


    ### Displaying the user’s location on the map


    Open up `Main.storyboard`, and select the map in the outline view if it is not
    already selected. We will need to set one property on the map view through Xcode.


    Choose the fifth tab (the Attribute Inspector), as seen in Figure [2-3](#485790_1_En_2_Chapter.xhtml#Fig3).
    At the top, one of the check boxes will be for User Location – check that box.


    ![../images/485790_1_En_2_Chapter/485790_1_En_2_Fig3_HTML.jpg](images/485790_1_En_2_Chapter/485790_1_En_2_Fig3_HTML.jpg)


    Figure 2-3


    User Location check box on Map View


    That’s it! If you are running this on your Simulator, make sure you are sending
    a location to the app – that setting is on the Simulator’s menu, under Features,
    and then Location. Choose Apple if you want to have an easy setting, or set the
    coordinates manually.


    Go ahead and run the application – it should look similar to Figure [2-4](#485790_1_En_2_Chapter.xhtml#Fig4),
    and the blue dot will be animating.


    ![../images/485790_1_En_2_Chapter/485790_1_En_2_Fig4_HTML.jpg](images/485790_1_En_2_Chapter/485790_1_En_2_Fig4_HTML.jpg)


    Figure 2-4


    User Location on map


    That’s really all you have to do to get a nice animated user location on to your
    map. Even though it is only one check box on the map view, you still need to implement
    all of the `CoreLocation` framework privacy and permissions code in your view
    controller.


    ## Summary


    We’ve discussed user privacy for locations and how to use the `CoreLocation` framework
    to request authorization from the app’s end user. You’ve also seen how easy it
    is to show user locations on `MapKit` maps in iOS.


    In our next chapter, we are going to display points of interest on a `MapKit`
    app and customize the display for each of those using annotations.


    # 3. Displaying Annotations on a MapKit Map


    In Chapter [1](#485790_1_En_1_Chapter.xhtml), your first iOS map application displayed
    one point on the map, with the default red pin at its location. The `MapKit` framework
    is capable of much more when it comes to displaying annotations. We can customize
    the images for the annotations and the callouts seen when a user taps on an annotation.


    Let’s continue building on top of the FirstMapsApp project that we created in
    Chapter [1](#485790_1_En_1_Chapter.xhtml) and then added user locations in Chapter
    [2](#485790_1_En_2_Chapter.xhtml).


    ## Understanding MapKit and annotations


    The `MapKit` framework maintains a distinction between annotations – the data
    displayed on the map – and annotation views, the user interface elements that
    appear on top of the map at a given coordinate for an annotation. While `MapKit`
    provides the `MKPointAnnotation` class for basic point display, most map applications
    will use a custom implementation of the `MKAnnotation` protocol .


    Similarly, `MapKit` also includes the `MKPinAnnotationView` and `MKMarkerAnnotationView`
    classes for displaying pins or markers on the app. The `MKAnnotationView` class
    is useful for displaying your own custom images. You can subclass the `MKAnnotationView`
    class or use it directly.


    The `mapView(_:viewFor:)` function on the `MKMapViewDelegate` protocol allows
    your application to map `MKAnnotationView` objects to `MKAnnotation` objects.
    Because the `MKPointAnnotation` class has a limited number of data fields, using
    your own implementation of `MKAnnotation` gives you the most flexibility.


    ## Using a custom annotation class


    Implementing your own annotation class is straightforward – you will need to extend
    the `NSObject` class and then implement the `MKAnnotation` protocol .


    The `title` and `subtitle` properties of the `MKAnnotation` protocol are `String`
    optionals . The `coordinate` property is a little more complicated, as `MapKit`
    requires that it supports key-value observing (KVO). In practice, this means that
    it is not a simple declaration with a `var` keyword, but instead you would also
    have to state that it uses dynamic dispatch with the Objective-C runtime. Your
    declaration in code would look like this:


    ```

    @objc dynamic var coordinate: CLLocationCoordinate2D

    ```


    A basic custom annotation class, with an `init` method , would look like Listing
    [3-1](#485790_1_En_3_Chapter.xhtml#PC2).


    ```

    import UIKit

    import MapKit

    class MapPoint: NSObject, MKAnnotation {

    @objc dynamic var coordinate: CLLocationCoordinate2D

    var title:String?

    var subtitle: String?

    init(coordinate:CLLocationCoordinate2D,

    title:String?, subtitle:String?) {

    self.coordinate = coordinate

    self.title = title

    self.subtitle = subtitle

    }

    }

    Listing 3-1

    An implementation of an annotation class in Swift

    ```


    We will be using this `MapPoint` class and then later extending it through the
    course of this chapter. It’s likely that you would add additional fields to this
    annotation class for your specific application. Go ahead and create a new file
    in your Xcode project named `MapPoint.swift`, and add the code in Listing [3-1](#485790_1_En_3_Chapter.xhtml#PC2).'
