  trans: '

    # 5. 使用 MapKit 获取路线指引


    借助 MapKit，在应用程序内提供一个地点到另一个地点的步行或驾车路线指引变得非常简单。你也可以指示 Apple 地图应用打开并为用户规划路线——如果你认为用户可能更倾向于使用专用应用，这将非常有用。


    在 Xcode 中使用“单视图应用程序”模板创建另一个 Swift iOS 项目。将你的应用命名为 `DirectionsMapKitApp`。继续操作，在故事板的唯一屏幕中添加一个地图视图，并将其连接到
    `ViewController` 类上一个名为 `mapView` 的出口。在视图控制器中，除了 `UIKit`，还要导入 `MapKit` 框架。


    如果你愿意，也可以复用前面章节中的某个项目，因为这些项目已经配置好了地图视图。


    ## 理解 Directions API


    与本地搜索类似，Directions API 并不是一个公开可用的 REST API。相反，Apple 的路线功能是通过 `MapKit` 类来访问的。如果你的应用有网页版，Apple
    也通过适用于 JavaScript 的 `MapKit` 提供了路线功能，但该产品超出了本书的讨论范围。


    要使用 Directions API，你需要使用 `MKDirections` 类的一个实例。用一个 `MKDirections.Request` 对象初始化该实例，该对象指定了你想要请求的路线，然后通过
    `calculate()` 或 `calculateETA()` 方法向 Apple 服务器发起异步调用。`calculate()` 方法接受一个完成处理程序作为回调，该回调接收
    `MKDirections.Response` 对象或 `Error` 对象。


    响应中将包含一个或多个要遵循的路线。通常，你可能只想请求一条路线，但你可以在路线请求中请求备选路线——这样做的话，如果有任何备选路线，你将获得多条路线。


    这些路线是 `MKRoute` 对象，它们包含一些对向用户显示路线有用的信息——路线几何形状（可以作为叠加层添加到地图视图）、一个路线步骤列表（作为 `MKRouteStep`
    对象）、总距离以及预计行程时间。


    让我们通过一个简单的驾车路线示例来说明这些类是如何协同工作的。


    ## 开始使用路线功能


    我们首先需要创建一个路线请求对象。在你的视图控制器类中创建一个名为 `getDirections()` 的新方法，然后在你的 `viewDidLoad()`
    方法中调用该方法。在 `getDirections()` 方法中添加以下代码行来创建一个路线请求对象：


    ```

    let request = MKDirections.Request()

    ```


    本章本节的所有代码都完整地列在代码清单 5-1 中。


    `MKDirections.Request` 可以接受一个起点和一个终点——两者都需要是 `MKMapItem` 对象。我们在第 4 章中讨论过 `MKMapItem`
    类。你当然可以使用来自本地搜索的 `MKMapItem` 实例，也可以从 `MKPlacemark` 实例创建你自己的 `MKMapItem` 对象。地标可以通过
    Core Location 坐标创建。


    我们需要为起点和终点都执行此操作。由于存在一些可重复的代码，我们可以将其抽象为一个辅助函数：


    ```

    func createMapItem(latitude:Double,

    longitude:Double) -> MKMapItem {

    let coord = CLLocationCoordinate2D(

    latitude: latitude,

    longitude: longitude)

    let placemark = MKPlacemark(coordinate: coord)

    return MKMapItem(placemark: placemark)

    }

    ```


    有了这个辅助函数后，为起点和终点属性创建地图项的代码如下所示，你可以将其添加到 `getDirections()` 方法中：


    ```

    request.source = createMapItem(latitude: 40.7128, longitude: -74)

    request.destination = createMapItem(latitude: 38.91, longitude: -77.037)

    ```


    这些坐标恰好是纽约市（作为起点）和华盛顿特区（作为终点）。你可以随意用自己的起点和终点替换这些坐标，只要它们之间可以驾车通行即可。


    路线请求需要一个交通类型。这些交通类型在 `MKDirectionsTransportType` 结构体中枚举，包括：


    - `MKDirectionsTransportType.automobile`

    - `MKDirectionsTransportType.walking`

    - `MKDirectionsTransportType.transit`

    - `MKDirectionsTransportType.any`


    通常，你会指定 automobile、walking 或 transit 其中之一，类似于 Apple 地图 iOS 应用。在你的 `getDirections()`
    函数中，添加以下代码行：


    ```

    request.transportType = .automobile

    ```


    在用起点、终点和交通类型设置好路线请求后，你可以从此路线请求创建一个 `MKDirections` 对象：


    ```

    let directions = MKDirections(request: request)

    ```


    接下来，你可以在 `MKDirections` 对象上调用 `calculate()` 或 `calculateETA()` 方法。两者都是异步的，并且只接受一个完成处理程序作为参数。在我们的例子中，我们想要获得完整的结果，包括步骤、路线图形以及时间和距离，因此我们将使用
    `calculate()` 方法。以下代码通过解包响应来设置：


    ```

    directions.calculate { (response, error) in

    guard let response = response else {

    print(error ?? "No error found")

    return

    }

    }

    ```


    我们将一个闭包传递给 `calculate()` 方法。该闭包有两个参数——一个可选的 `MKDirections.Response` 和一个可选的 `Error`。我们将使用
    `guard let` 语句检查响应是否存在，然后处理错误。这段代码只是打印出错误信息，但你可以在警告视图中将其呈现给用户。


    如果我们确实得到了一个有效的响应，一个简单的处理方式是在地图视图上显示路线。路线是一个 `MKPolyline`，可以作为叠加层添加到地图视图。你还需要为叠加层添加一个渲染器——这会将折线转换为图形。让我们从将路线添加到地图开始：


    ```

    let route = response.routes[0]

    self.mapView.addOverlay(route.polyline)

    ```

