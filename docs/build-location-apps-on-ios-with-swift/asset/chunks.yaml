- fmt: '# Creating the user interface


    Your view controller needs two user interface elements – a Google Maps map view
    and a button to Find Businesses in the map area. Using the storyboard (Figure
    [10-6](#485790_1_En_10_Chapter.xhtml#Fig6)), you can drag a `UIView` and a `UIButton`
    onto the main view for your `ViewController` class. Change the identity of the
    `UIView` class to `GMSMapView`, to make it a Google Maps map view. Add constraints
    to the map view to have it fill all available space in the view, and then add
    constraints to the button to anchor it to the bottom of the screen. Change the
    button’s text to say Find Businesses, and choose any colors or fonts that you
    like to make it stand out against the map.


    ![../images/485790_1_En_10_Chapter/485790_1_En_10_Fig6_HTML.jpg](images/485790_1_En_10_Chapter/485790_1_En_10_Fig6_HTML.jpg)


    Figure 10-6


    Storyboard showing map view and button


    One thing to note: the button can’t be a child view of the map view; it has to
    be a child view of the main `UIView` for the `ViewController` screen .


    After running your project, if everything is set up correctly, your project will
    look similar to Figure [10-7](#485790_1_En_10_Chapter.xhtml#Fig7).


    ![../images/485790_1_En_10_Chapter/485790_1_En_10_Fig7_HTML.jpg](images/485790_1_En_10_Chapter/485790_1_En_10_Fig7_HTML.jpg)


    Figure 10-7


    User interface for the application


    You could also create the map view and the button programmatically, if you wish.


    Create an outlet named `mapView` for the Google Maps map view, using the Assistant
    view in Xcode:


    ```

    @IBOutlet weak var mapView: GMSMapView!

    ```


    Next, create an action named `findBusinesses` for the button. You should have
    something similar to this action in your `ViewController` class:


    ```

    @IBAction func findBusinesses(_ sender: Any) {

    }

    ```


    That concludes our work with the storyboard. The next part of the project will
    be to display the Google Places autocomplete view controller when a user taps
    on the button.


    ## Understanding the autocomplete search


    When you add some kind of places search to your project, you will want to include
    autocomplete – forcing users to type in the exact name as specified in the database
    won’t be successful. The Places SDK for iOS includes user interface elements for
    autocomplete, as well as a way to make autocomplete queries programmatically,
    so that you can implement your own user interface.


    Two modern user interface elements are included in the Places SDK. The first is
    a stand-alone full-screen view controller that handles text search as well as
    displaying results. The other user interface element is a search results view
    controller that works with a search bar that you implement. For this chapter,
    we will work with the stand-alone view controller, but the concepts for the search
    are similar between the two different user interfaces.


    The basic steps for configuring and displaying an autocomplete full-screen view
    controller are:


    - Create an instance of the `GMSAutocompleteViewController` class.

    - Give geographic boundaries for the place search.

    - Decide which data fields you need back from the query.

    - Filter the results by type of place (city, street address, establishment).

    - Display the view controller.

    - Implement the delegate for callbacks when search is completed or canceled by
    user.


    Let’s go through each of these steps in more detail, as we build out the places
    search functionality in our project.


    ### Creating the autocomplete view controller


    To start out our places search project, we will need to create an instance of
    the `GMSAutocompleteViewController` class. We’ll also need to set a delegate for
    the autocomplete view controller, and we will create an extension later in this
    chapter to handle these delegate methods. Go ahead and assign the autocomplete
    view controller’s delegate to `self` for now:


    ```

    let vc = GMSAutocompleteViewController()

    vc.delegate = self

    ```


    All of the code snippets in this and the following sections will go into the action
    named `findBusinesses()` we created earlier. This function can be found printed
    out in full in Listing [10-3](#485790_1_En_10_Chapter.xhtml#PC13), which is after
    the discussion of each individual step.


    ### Setting geographic boundaries for the search


    We can tell Google Places what geographic area to search for places using the
    autocomplete search. You can either use this area as a preference, so that results
    within this geographic space get boosted up toward the top of the list, or as
    a restriction, where places outside of this geographic area won’t be shown at
    all, even if they are nearby.


    With our project, we are going to use the visible region from the Google map view
    as our boundary. That region needs to be transformed into a `GMSCoordinateBounds`
    object, which you can do with the `GMSCoordinateBounds` constructor:


    ```

    let region = mapView.projection.visibleRegion()

    let bounds = GMSCoordinateBounds.init(region: region)

    vc.autocompleteBounds = bounds

    ```


    We will also restrict our results to only those found within the geographic bounds:


    ```

    vc.autocompleteBoundsMode = .restrict

    ```


    You do not have to be this restrictive – instead you can bias results toward those
    found in the map, but if a user is looking for something specific, and it happens
    to be close to the map but not in it, it will still return as a result. This is
    the default behavior for the autocomplete search. If you would like to use it,
    do not set the `autocompleteBoundsMode` parameter, or set it to the `.bias` value.


    You also do not have to use any geographic bounds, in which case you would simply
    omit setting the `autocompleteBounds` property . You could also construct the
    geographic bounds yourself, for instance, if you were building a place search
    for a given region or city.


    The next step is to determine which data fields your view controller needs to
    fetch from the Google Places API.


    ### Requesting a subset of data fields


    The Google Places API will return all data fields by default for autocomplete,
    including premium ones such as reviews that cost extra. As you probably do not
    need all fields, you can set a specific set of fields that you do need in your
    result.


    To construct the list of fields, you will need to combine a set of `GMSPlaceField`
    enum values together with an OR (`|`) operator. The following is a list of several
    of these fields that you could use for your application:


    - `coordinate`

    - `formattedAddress`

    - `name`

    - `openingHours`

    - `phoneNumber`

    - `photos`

    - `placeID`

    - `rating`

    - `website`


    For our purposes, we are going to stick to the basic place details and simply
    request the name, place ID, and coordinate. We will use these later to create
    a marker on the map.


    Our code will combine the raw values from the enum values as unsigned integers
    and then construct a `GMSPlaceField` value from that. We also return from the
    function if the `GMSPlaceField` constructor fails to create an object. This particular
    API could have been made a little easier to use, for instance, by taking a set
    of values instead. We also need to set the `placeFields` property of the autocomplete
    view controller:


    ```

    // needed for the map marker

    let fields = UInt(GMSPlaceField.name.rawValue) |

    UInt(GMSPlaceField.placeID.rawValue) |

    UInt(GMSPlaceField.coordinate.rawValue)

    guard let placeFields = GMSPlaceField(rawValue: fields) else {

    return

    }

    vc.placeFields = placeFields

    ```


    Not to be confused with the fields, we now need to tell Google Places what type
    of search results we want.'
