    )\n        } else {\n            print(\"No error specified\")\n        }\n  \
    \      return\n    }\n    for mapItem in response.mapItems {\n        self.mapView.addAnnotation(mapItem.placemark)\n\
    \    }\n    self.mapView.setRegion(response.boundingRegion, animated: true)\n\
    }\n```\n\n**代码清单 4-2** 在地图上显示搜索结果\n\n上述代码列表中的更改实现了几个功能。第一个更改是将搜索请求中使用的区域设置为当前地图视图中显示的区域。第二个更改是将地图项的地标添加为标注，而不是将名称打印到调试控制台。最后一个更改是将地图视图上可见区域的边界设置为包含所有搜索结果的区域。\n\
    \n创建一个名为 `showCoffeeOnMap()` 的新函数，并将代码清单 4-2 中的代码放入此函数中。然后，在你的 `ViewController`\
    \ 类的 `viewDidLoad()` 函数中调用这个新函数。继续在模拟器或你的设备上运行此应用程序。根据你所在地区售卖的咖啡数量，你应该会看到类似以下截图的搜索结果。\n\
    \n![../images/485790_1_En_4_Chapter/485790_1_En_4_Fig1_HTML.jpg](img/485790_1_En_4_Fig1_HTML.jpg)\n\
    \n**图 4-1** 在地图视图上显示搜索结果\n\n# 为结果创建标注\n\n直接将地标添加为标注的一个缺点是，Apple 会使用地标的街道地址作为标注的标题，而不是使用地图项中的名称。这不是最佳的用户体验，因此让我们稍微修改一下代码，为每个地图项创建一个新的标注，如代码清单\
    \ 4-3 所示。\n\n```\nfor mapItem in response.mapItems {\n    let annotation = MKPointAnnotation()\n\
    \    annotation.coordinate = mapItem.placemark.coordinate\n    annotation.title\
    \ = mapItem.name\n    annotation.subtitle = mapItem.phoneNumber\n    self.mapView.addAnnotation(annotation)\n\
    }\n```\n\n**代码清单 4-3** 为每个搜索结果创建一个标注\n\n将现有的 `for` 循环替换为上面的代码块，你将看到咖啡店的名称，而不仅仅是街道地址。\n\
    \n# 使用兴趣点类别进行过滤\n\nApple 的搜索能够很好地处理自然语言查询，无论你搜索的是通用内容还是更具体的内容。但是，如果你的应用会在 Apple\
    \ 已定义的类别中查找兴趣点，那么使用兴趣点过滤器将改善用户体验。\n\n使用 `MKPointOfInterestFilter` 类的实例在搜索请求上设置兴趣点过滤器。此过滤器是\
    \ iOS 13 中的新功能，在早期版本的 iOS 中不可用。创建兴趣点过滤器时，你有两种选择——你可以创建一个仅包含一个或多个类别的过滤器，或者创建一个排除一个或多个类别的过滤器。通常，你可能会使用包含过滤器，但如果你的搜索结果被来自不适合你应用的类别的无关结果填充，那么排除类别当然也很容易。\n\
    \n`MKPointOfInterestCategory` 结构体定义了你可以使用的所有不同类别。部分列表如下：\n\n- 机场\n- 游乐园\n- 水族馆\n\
    - ATM 机\n- 面包房\n- 银行\n- 海滩\n- 啤酒厂\n\n以此类推，直至动物园类别。如你所见，如果你正在构建一个依赖本地搜索的应用，这些过滤器可能非常有用。\n\
    \n要将 `MKPointOfInterestFilter` 类与 `MKLocalSearch.Request` 搜索请求一起使用，你只需设置 `pointOfInterestFilter`\
    \ 属性。例如，要搜索本地面包房，请使用以下代码：\n\n```\nsearchRequest.pointOfInterestFilter = MKPointOfInterestFilter(including:\
    \ [.bakery])\n```\n\n如果我们将此兴趣点过滤器与前面的代码列表（该代码从本地搜索地图项结果创建标注）结合，然后移除自然语言查询字符串，我们将得到一个看起来像代码清单\
    \ 4-4 的函数。\n\n```\nlet searchRequest = MKLocalSearch.Request()\nsearchRequest.pointOfInterestFilter\
    \ = MKPointOfInterestFilter(including: [.bakery])\nsearchRequest.region = mapView.region\n\
    let search = MKLocalSearch(request: searchRequest)\nsearch.start { (response,\
    \ error) in\n    guard let response = response else {\n        print(\"Error searching\
    \ - no response\")\n        if let error = error {\n            print(\"Error:\
    \ \\(error.localizedDescription)\")\n        } else {\n            print(\"No\
    \ error specified\")\n        }\n        return\n    }\n    for mapItem in response.mapItems\
    \ {\n        let annotation = MKPointAnnotation()\n        annotation.coordinate\
    \ = mapItem.placemark.coordinate\n        annotation.title = mapItem.name\n  \
    \      annotation.subtitle = mapItem.phoneNumber\n        self.mapView.addAnnotation(annotation)\n\
    \    }\n    self.mapView.setRegion(response.boundingRegion, animated: true)\n\
    }\n```\n\n**代码清单 4-4** 使用地图标注的类别过滤器\n\n在你的 iOS 应用上运行此代码将产生与此截图类似的结果，具体取决于你所在区域的面包房数量。\n\
    \n![../images/485790_1_En_4_Chapter/485790_1_En_4_Fig2_HTML.jpg](img/485790_1_En_4_Fig2_HTML.jpg)\n\
    \n**图 4-2** 来自带有标注的类别过滤器的兴趣点\n\n处理本地搜索相当直接，因为 Apple 提供的 `MKLocalSearch` 类没有分页搜索结果等高级功能。从搜索结果中的地图项创建自己的标注通常是最合理的做法。利用第\
    \ 3 章中的技术，你可以创建自定义标注视图，例如，以匹配兴趣点的类别。\n\n在下一章中，我们将使用 Apple 的导航 API 来创建驾车或步行路线。导航\
    \ API 也使用 `MKMapItem` 类，我们将探讨本章未涉及的地图项的其他功能，例如用户位置以及在 Apple 地图应用中打开地图项。\n"
- fmt: '# 5. Getting Directions with MapKit


    Providing walking or driving directions from one place to another inside your
    application is easy with MapKit. You can also instruct the Apple Maps app to open
    up and route the user to a location – this could be useful if you think the user
    might just prefer to use a dedicated app.


    Create another Swift iOS project in Xcode with the Single View Application template.
    Name your application `DirectionsMapKitApp`. Go ahead and add a map view to the
    only screen in the storyboard, and connect it to an outlet called `mapView` on
    the `ViewController` class. In the view controller, import the `MapKit` framework,
    along with `UIKit`.


    You can also reuse one of the projects from an earlier chapter if you like, as
    those will be set up with the map view.


    ## Understanding the Directions API


    Similar to local search, the directions API isn’t a publicly available REST API.
    Instead, the Apple directions functionality is accessed through `MapKit` classes.
    If you happen to have a web version of your application, Apple also provides directions
    through `MapKit` for JavaScript, but that product is outside the scope of this
    book.


    To use the directions API, you will use an instance of the `MKDirections` class.
    Initialize that instance with an `MKDirections.Request` object that specifies
    which directions you want to request, and then make an asynchronous call to the
    Apple servers with either the `calculate()` or `calculateETA()` method. The `calculate()`
    method takes a completion handler to use as a callback with either an `MKDirections.Response`
    object or an `Error` object.


    The response will contain one or more routes to follow. Typically, you might just
    want to request one route, but you can request alternate routes in your directions
    request – doing this will give you multiple routes if there are any.


    These routes are `MKRoute` objects, and they contain several things that would
    be useful for displaying routes to a user – the route geometry, which can be added
    to the map view as an overlay, a list of route steps (as `MKRouteStep` objects),
    the total distance, and the expected travel time.


    Let’s illustrate how these classes work together with a simple example for driving
    directions.


    ## Getting started with directions


    We’ll need to start by creating a directions request object. Create a new method
    named `getDirections()` in your view controller class, and then place a call to
    that method in your `viewDidLoad()` method. Add the following line of code to
    the `getDirections()` method to create a directions request object:


    ```

    let request = MKDirections.Request()

    ```


    All of the code from this section of the chapter is listed out in full in Listing
    [5-1](#485790_1_En_5_Chapter.xhtml#PC11).


    `MKDirections.Request` can take a source and a destination – both of which need
    to be `MKMapItem` objects. We discussed the `MKMapItem` class in Chapter [4](#485790_1_En_4_Chapter.xhtml).
    You can certainly use an `MKMapItem` instance that comes from a local search,
    or you can create your own `MKMapItem` objects from an `MKPlacemark` instance.
    Placemarks can be created from Core Location coordinates.


    We’ll need to do this for both the source and the destination. Because there is
    some repeatable code, we can abstract this out to a helper function:


    ```

    func createMapItem(latitude:Double,

    longitude:Double) -> MKMapItem {

    let coord = CLLocationCoordinate2D(

    latitude: latitude,

    longitude: longitude)

    let placemark = MKPlacemark(coordinate: coord)

    return MKMapItem(placemark: placemark)

    }

    ```


    Once we have this helper function, creating map items for the source and destination
    properties looks like the following code, which you can add to the `getDirections()`
    method:


    ```

    request.source = createMapItem(latitude: 40.7128, longitude: -74)

    request.destination = createMapItem(latitude: 38.91, longitude: -77.037)

    ```


    These coordinates happen to be for New York City (as the source) and Washington,
    DC (as the destination). Feel free to replace these with your own start and end
    points, as long as it’s feasible to drive between them.


    The directions request takes a transportation type for the request. These direction
    types are enumerated in the `MKDirectionsTransportType` struct and include:


    - `MKDirectionsTransportType.automobile`

    - `MKDirectionsTransportType.walking`

    - `MKDirectionsTransportType.transit`

    - `MKDirectionsTransportType.any`


    Typically, you would specify one of automobile, walking, or transit, similar to
    the Apple Maps iOS app. In your `getDirections()` function, add the following
    line of code:


    ```

    request.transportType = .automobile

    ```


    After setting up the directions request with a source, direction, and transport
    type, you can create an `MKDirections` object from the directions request:


    ```

    let directions = MKDirections(request: request)

    ```


    Next, you can call the `calculate()` or the `calculateETA()` method on the `MKDirections`
    object. Both are asynchronous and take a completion handler as the only argument.
    In our case, we are interested in getting the complete results, including steps,
    a graphic for the route, and the time and distance, so we will use the `calculate()`
    method. The following code sets us up by unwrapping the response:


    ```

    directions.calculate { (response, error) in

    guard let response = response else {

    print(error ?? "No error found")

    return

    }

    }

    ```


    We’ll pass a closure to the `calculate()` method. The closure takes two arguments
    – an optional `MKDirections.Response` and an optional `Error`. We’ll check to
    make sure that the response exists with a `guard let` statement and then handle
    the error. This code simply prints out the error, but you could present it to
    the user in an alert view.


    If we do have a valid response, one easy thing to do with the response is to display
    the route on the map view. The route is an `MKPolyline`, which can be added to
    the map view as an overlay. You will also need to add a renderer for the overlay
    – this will turn the polyline into a graphic. Let’s start by adding the route
    to the map:


    ```

    let route = response.routes[0]

    self.mapView.addOverlay(route.polyline)

    ```'
