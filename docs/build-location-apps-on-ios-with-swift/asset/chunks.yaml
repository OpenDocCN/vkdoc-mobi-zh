  trans: '好的，作为一名高级文档工程师和翻译员，我已仔细阅读了注意事项和示例。这是遵循您指定格式的英文文本的中文翻译：



    # 9. 将 Google Directions API 与导航功能结合使用


    Google Directions API 是一个简单的 HTTPS API，可用于获取前往目的地的驾驶路线。Google Directions API 本身并未提供原生的
    Swift 实现方式，您需要向 Google 发起 HTTPS API 调用，并解析响应中的 JSON 结果。成功响应的一部分是一条路径，该路径可以转换为折线并显示在地图上。


    本章将基于第 7 章和第 8 章已完成的工作展开。在第 7 章中，我们使用 CocoaPods 和 Google Maps API 搭建了一个基础的 iOS
    应用程序项目。在第 8 章中，我们讨论了如何在地图上显示形状和标记。本章我们将复用第 7 章和第 8 章中的同一个项目，或者你也可以创建一个新项目，该项目需要使用
    Google Maps iOS SDK，并在故事板上有一个地图视图。


    为了启用 Google Directions API 并创建一个新的 API 密钥以用于 HTTP API，我们需要做一些额外的工作。


    ## 设置 Google Directions API


    在第 7 章中，我们创建了一个 API 密钥并启用了 Google Maps API。由于我们当时只选择启用了地图，因此需要将 Google Directions
    API 添加到我们的 Google Cloud 项目中。登录您的账户，地址为 [`https://cloud.google.com/maps-platform`](https://cloud.google.com/maps-platform)。


    从侧边栏的菜单中选择“API”（图 9-1）。


    ![../images/485790_1_En_9_Chapter/485790_1_En_9_Fig1_HTML.jpg](img/485790_1_En_9_Fig1_HTML.jpg)


    图 9-1


    已启用的 API 以及 Google 地图的附加 API


    您会在这里看到您为 Google 地图添加的 API，以及一个可以在项目中使用的附加 API 列表。在“附加 API”下，您会找到 Google Directions
    API（图 9-2）。


    ![../images/485790_1_En_9_Chapter/485790_1_En_9_Fig2_HTML.jpg](img/485790_1_En_9_Fig2_HTML.jpg)


    图 9-2


    启用 Google Directions API


    在此处启用 Directions API。


    **注意**

    如果您忘记启用 Google Directions API，当您发出 HTTP 请求时，将会收到类似以下的错误消息：“此 API 项目未获授权使用此 API。”


    启用 Directions API 后，您需要创建一个新的 API 密钥。访问 Google Cloud Platform 的 API 和服务凭据页面，地址为
    [`https://console.cloud.google.com/apis/credentials`](https://console.cloud.google.com/apis/credentials)。您应该会看到您的
    iOS 地图密钥，如图 9-3 所示。


    ![../images/485790_1_En_9_Chapter/485790_1_En_9_Fig3_HTML.jpg](img/485790_1_En_9_Fig3_HTML.jpg)


    图 9-3


    用于创建 API 密钥的凭据页面


    创建一个新的凭据，当下拉菜单出现时，选择“API 密钥”。系统会生成一个新的 API 密钥，但它将是未加限制的——下一步是限制此 API 密钥。


    ## 限制 API 密钥


    在出现的对话框中选择“限制密钥”按钮（图 9-4）。


    ![../images/485790_1_En_9_Chapter/485790_1_En_9_Fig4_HTML.jpg](img/485790_1_En_9_Fig4_HTML.jpg)


    图 9-4


    API 密钥创建对话框，显示“限制密钥”按钮


    尽管您可能想要将 Google Directions API 密钥限制为仅限 iOS 应用使用，但这对于向 Google Directions API 发起
    HTTPS 调用是无效的。如果您打算将 API 密钥直接嵌入到 iOS 应用中，则需要在应用限制中选择“无”。


    最佳实践是像我们在示例项目中所做的那样，**不**将 API 密钥嵌入到应用中——这种方法适用于原型设计和开发，但这意味着如果有人能搜索您应用中的静态字符串，他们就有可能提取出该字符串。


    如果您将此项目作为开源项目上传到公共 Git 仓库，也需要格外小心。一旦 API 密钥被发布，即使您之后又提交了一个将其移除的 commit，也很容易被人获取到。


    另一种方法是，构建一个 Web 服务来代理您的应用向 Google 发出的请求。您的 Web 服务可以是唯一知晓您 API 密钥的代码，它可以部署在应用服务器上，或者以函数的形式部署在无服务器云环境中。将
    API 密钥放入环境变量或上下文变量中，而不是直接嵌入到代码或配置文件中。


    如果您的应用有标准的用户注册和身份验证功能，您可以通过要求提供有效的用户凭据来控制对此 Web 服务或函数的访问。


    这样做还有一个好处：当您需要轮换 Google API 密钥时，不会破坏现有移动应用——您只需为 Web 服务或云函数设置一个新的环境变量，然后重启该服务或函数即可。


    对于本项目，我们可以暂时将这些担忧放在一边，以便尝试使用 Google Directions API。只是**不要**将此源代码上传到您的公共 Git 仓库，如果不小心上传了，请从
    Google Cloud Platform 中删除该 API 密钥。


    在 API 限制下，将此密钥限制为仅用于 Google Directions API，然后保存更改，如图 9-5 所示。


    ![../images/485790_1_En_9_Chapter/485790_1_En_9_Fig5_HTML.jpg](img/485790_1_En_9_Fig5_HTML.jpg)


    图 9-5


    限制 API 密钥页面


    保存 Google Directions API 密钥后，请记下它。


    ## 使用 Google Directions API


    遗憾的是，Google 并没有为 Google Directions API 提供一个用于 iOS 或 Swift 的官方辅助库。我们可以改用标准的 iOS
    网络库来发起 API 调用。Google Directions API 由一个 HTTPS 端点组成，它接收请求参数并返回 JSON 响应（同时也有一个 XML
    端点）。


    要在 Swift 中实现此 API，我们可以使用 `URLSession` 类（及其相关类）来发起 HTTPS 调用。我们可以使用 `JSONSerialization`
    类将 JSON 解析为字典和数组，或者为 JSON 响应定义一个实现 `Codable` 协议的数据结构，并使用 `JSONDecoder` 类。第二种方法要清晰得多，因为第一种方法需要在
    Google Directions API 响应的嵌套结构中大量使用 `if let` 和 `guard let` 语句。在本章中，我们将创建一组基础的 Swift
    结构来保存 Directions API 的响应。

    '
- fmt: "# Creating the URL\n\nThe Google Directions API is an HTTPS-based API, and\
    \ you can easily test your requests out in a web browser. You will need to declare\
    \ a constant to hold an API Key that supports the Google Directions API. We set\
    \ this API up in the first part of this chapter. The following value is an example\
    \ API key; substitute yours in its place:\n\n```\nlet apiKey = \"AIzaZZZZZZZZZZZZZZZZZ\"\
    \n```\n\nYou will also need to build up the URL for the API call. There are many\
    \ different parameters you can send to the Google Directions API. The following\
    \ three parameters are required:\n\n`origin` – A street address, set of coordinates,\
    \ or a Google Places ID\n\n`destination` – Same as `origin`\n\n`key` – A valid\
    \ API Key\n\nOther parameters you may include are:\n\n`mode` – Driving (default),\
    \ walking, bicycling, transit\n\n`waypoints` – Intermediate destinations for the\
    \ route, except for transit\n\n`alternatives` – True/false; will return multiple\
    \ routes if they are available, and no intermediate waypoints are specified\n\n\
    `avoid` – Tolls, highways, ferries, indoor; which methods of transportation to\
    \ avoid in the calculated routes\n\nIn addition to the preceding parameters, others\
    \ you may want to consider are `transit_routing_preference`, `language`, `arrival_time`,\
    \ `departure_time`, `region`, `units`, and `traffic_model`. See the detailed explanations\
    \ of each of these parameters at the Google Directions API documentation page\
    \ (`https://developers.google.com/maps/documentation/directions/intro`).\n\nAn\
    \ example Google Maps Directions URL might look like the following, with the API\
    \ key being interpolated into the string:\n\n```\nlet directionsUri = \"https://maps.googleapis.com/maps/api/directions/json?origin=Austin,TX&destination=Houston,TX&key=\\\
