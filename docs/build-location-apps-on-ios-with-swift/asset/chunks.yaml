    \n除上述参数外，你还可以考虑 `transit_routing_preference`、`language`、`arrival_time`、`departure_time`、`region`、`units`\
    \ 和 `traffic_model`。请参阅 Google Directions API 文档页面（`https://developers.google.com/maps/documentation/directions/intro`）中每个参数的详细说明。\n\
    \n一个 Google Maps Directions URL 的示例如下所示，其中 API 密钥会被插入到字符串中：\n\n```\nlet directionsUri\
