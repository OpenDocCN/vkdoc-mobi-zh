    # 在 Mapbox Studio 中创建数据集


    `Mapbox Studio` 允许您在云端保存和编辑 `GeoJSON` 要素的集合，例如我们刚刚下载的地震数据。这些数据集可以转换为瓦片集，然后便可在我们在第
    12 章中使用的 `Mapbox Studio` 样式编辑器中进行编辑。我们将完成从上传数据集到在编辑器中设置要素样式的整个过程。


    首先，我们在 `Mapbox Studio` 上创建一个数据集。访问 `Mapbox Studio` 的数据集页面 (图 13-2) ([`https://studio.mapbox.com/datasets/`](https://studio.mapbox.com/datasets/))，或点击右上角的“数据集”链接。您将看到您已创建的所有数据集，或上传新数据集的选项。


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig2_HTML.jpg](img/485790_1_En_13_Fig2_HTML.jpg)


    图 13-2

    `Mapbox Studio` 数据集网页


    点击蓝色的 `新建数据集` 按钮，会弹出一个对话框，提供创建空白数据集或上传 `GeoJSON` 文件的选项。在对话框的标签栏中选择 `上传` (图 13-3)。


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig3_HTML.jpg](img/485790_1_En_13_Fig3_HTML.jpg)


    图 13-3

    向 `Mapbox Studio` 上传新数据集


    选择您在本章上一部分下载的 `GeoJSON` 文件，然后上传。`Mapbox Studio` 将处理该文件并找到所有 `GeoJSON` 要素 (图 13-4)。


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig4_HTML.jpg](img/485790_1_En_13_Fig4_HTML.jpg)


    图 13-4

    确认数据集上传到 `Mapbox Studio`


    如果 `Mapbox` 找到的要素数量与您期望在 `GeoJSON` 文件中看到的数量一致，请点击 `确认` 按钮。您可以随意命名您的数据集，但默认名称将是您上传文件的名称。在我们的例子中，默认名称是
    `Earthquake2020-01-01`。如果这个名称可以接受，请点击 `创建` 按钮。


    `Mapbox Studio` 将导入这些要素，您会看到一条确认消息，类似于图 13-5 中的对话框。


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig5_HTML.jpg](img/485790_1_En_13_Fig5_HTML.jpg)


    图 13-5

    数据集上传确认对话框


    如果您开始编辑数据集，您将看到数据集在简单的地图背景上绘制出来 (图 13-6)。您可以选择数据集中的任何点，并检查或修改数据。


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig6_HTML.jpg](img/485790_1_En_13_Fig6_HTML.jpg)


    图 13-6

    显示一个地震点的数据集编辑器


    在我们的案例中，我们使用的是来自 API 的干净数据，因此无需检查数据是否存在异常或清理缺失值。我们也可以快速浏览一下数据，看看刚才导入的数据集是否合理，以及是否与我们预期数据点出现的位置相匹配。


    此数据集已正确导入，我们可以根据此数据集创建一个瓦片集。数据集和瓦片集之间的区别在于，我们可以在瓦片集中修改数据在地图上的呈现方式，而不是编辑数据集中的数据值。


    点击左上角的蓝色 `Mapbox` 图标返回数据集屏幕 (图 13-7)，或在网页浏览器中导航到 [`https://studio.mapbox.com/datasets/`](https://studio.mapbox.com/datasets/)。选择您刚刚上传的地震数据集旁边的三点弹出菜单，然后从弹出菜单中选择
    `查看详情`。


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig7_HTML.jpg](img/485790_1_En_13_Fig7_HTML.jpg)


    图 13-7

    用于查看数据集详情的弹出菜单


    图 13-8 中显示的数据集详情屏幕允许您将此数据集导出为瓦片集。


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig8_HTML.jpg](img/485790_1_En_13_Fig8_HTML.jpg)


    图 13-8

    数据集详情屏幕


    在下一节中，我们将创建一个瓦片集。这个瓦片集将用于 `Mapbox Studio` 样式编辑器中，以更改数据在地图上的外观。


    # 创建瓦片集


    在数据集的详情屏幕上，`Mapbox Studio` 提供了一种创建瓦片集的简单方法。点击右侧栏中的 `导出为瓦片集` 链接。将出现一个对话框 (图 13-9)，询问您是希望导出到新瓦片集还是更新连接的瓦片集。


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig9_HTML.jpg](img/485790_1_En_13_Fig9_HTML.jpg)


    图 13-9

    导出为瓦片集对话框


    我们将导出到新瓦片集，因此点击该链接。会出现一个文本框，其中包含一个建议的瓦片集名称（与数据集同名）。如果没问题，点击 `导出`，然后 `Mapbox` 会将数据集处理成瓦片集。此转换完成后，您会看到数据集详情屏幕上出现一个已连接的瓦片集
    (图 13-10)。


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig10_HTML.jpg](img/485790_1_En_13_Fig10_HTML.jpg)


    图 13-10

    数据集详情屏幕上的已连接瓦片集及处理通知


    如果您点击该瓦片集，您将看到瓦片集内数据的预览，就像它在地图上布局的样子。这有助于确认数据集导出处理正确。


    我们的下一步是将这个瓦片集添加到我们在第 12 章创建的地图样式中。如果您尚未创建地图样式，请按照第 12 章的说明进行操作。


    # 将瓦片集添加到样式


    现在我们需要打开我们的地图样式，将瓦片集作为一个图层添加。点击网页右上角的 `样式` 选项卡，或导航到 [`https://studio.mapbox.com/`](https://studio.mapbox.com/)
    查看您的样式列表。选择您在上一章创建的地图样式，然后点击进入样式编辑器。


    在样式编辑器中，选择左侧边栏中的 `图层` 选项卡。我们需要添加一个新图层，因此点击 `图层` 选项卡右上角的加号按钮。当 `新图层` 窗口出现时，将显示一个数据源列表，其中包括历史选举结果。


    在筛选框中输入 `earthquake`，您将看到您的瓦片集出现 (图 13-11)。


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig11_HTML.jpg](img/485790_1_En_13_Fig11_HTML.jpg)


    图 13-11

    将瓦片集添加到地图样式


    在搜索结果窗口中选择该瓦片集，然后缩放到世界上另一个构造活跃且有地震的地区，比如阿拉斯加。您将看到我们上传的 `GeoJSON` 中的要素显示在地图上，如图
    13-12 所示。绿色圆点仅用于参考，并非瓦片集的初始显示方式。它们表明您的所有数据都将显示在地图上——您可以应用一个过滤器，根据条件不显示某些数据。如果某个数据点被过滤掉，该数据将会以红点的形式显示在此处。


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig12_HTML.jpg](img/485790_1_En_13_Fig12_HTML.jpg)


    图 13-12

    将瓦片集添加到地图工作室，要素显示为绿色圆点


    现在我们已经添加了瓦片集，我们可以更改其在任何使用此样式的地图中的显示方式。

    '
- fmt: '# Styling the Features with Mapbox Studio


    On the layers sidebar, find the earthquake tileset you just added. Click it, and
    you will see a layer style editing palette appear as a window (Figure [13-13](#485790_1_En_13_Chapter.xhtml#Fig13)).


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig13_HTML.jpg](images/485790_1_En_13_Chapter/485790_1_En_13_Fig13_HTML.jpg)


    Figure 13-13 Default tiles for the earthquake layer


    It may be hard to see, but each data point on the map is being shown as a 5 pixel
    circle, with a black fill, and no outline. This doesn’t provide very good contrast
    on a dark map, so let’s change the fill color (the property marked color). Select
    that color property, and a color picker appears. Choose a brighter color, such
    as red. You will immediately see your data points change color on the map, as
    in Figure [13-14](#485790_1_En_13_Chapter.xhtml#Fig14), if you are looking at
    an area that had earthquakes.


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig14_HTML.jpg](images/485790_1_En_13_Chapter/485790_1_En_13_Fig14_HTML.jpg)


    Figure 13-14 Data points with a red fill color


    You can also change the stroke color and the stroke outline to give the data points
    even more contrast. Try setting the stroke color to the hexadecimal color value
    `ece9e9` and adjusting the stroke width to 1 pixel. You can also choose your own
    colors here too, if you like; it won’t affect the project.


    Next, let’s try and convey some information about the magnitude of the earthquake
    with the radius of the circle we use to display the point. Mapbox Studio lets
    you vary properties of the map style with the properties for each feature of the
    map. Select the radius, and then select the link that says Style across data range.
    You will see a data field chooser pop up that lets you find a numeric data field.
    Look for the `mag` data field, which is short for magnitude (Figure [13-15](#485790_1_En_13_Chapter.xhtml#Fig15)).


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig15_HTML.jpg](images/485790_1_En_13_Chapter/485790_1_En_13_Fig15_HTML.jpg)


    Figure 13-15 Choosing the magnitude data field to vary the radius field


    After choosing the magnitude field, you will have several options appear to vary
    the radius. We are going to do a simple linear interpolation between the lowest
    magnitude, with 5 pixels, and the largest magnitude with 15 pixels.


    Figure [13-16](#485790_1_En_13_Chapter.xhtml#Fig16) shows the radius setting for
    the circle, after choosing to style across the data range with the magnitude field.


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig16_HTML.jpg](images/485790_1_En_13_Chapter/485790_1_En_13_Fig16_HTML.jpg)


    Figure 13-16 Editing the radius data settings for the earthquake data


    This settings view can be somewhat confusing. There are two stops for a linear
    interpolation of the magnitude data point – the lowest value, at –0.5, and the
    highest value, at 5.4. Both have a circle radius of 5 pixels, so there is no variation.


    What we want to do is to leave the lowest setting alone and change the highest
    value. Click the bottom value, 5.4, and then change the circle radius to 15 px,
    as in Figure [13-17](#485790_1_En_13_Chapter.xhtml#Fig17). You will see the line
    chart immediately start to show the radius value rising from left to right. Do
    not modify the value with the slider that you see – unless you want to change
    one of the stop values.


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig17_HTML.jpg](images/485790_1_En_13_Chapter/485790_1_En_13_Fig17_HTML.jpg)


    Figure 13-17 Adjusting the radius to vary with the magnitude linearly


    Be sure to click Done to save the changes to the radius. You could add more stops
    here, in case you want to set the radius for an intermediate value.


    You could also change the other values, such as color or stroke size to vary with
    magnitude, or one of the other properties in your dataset. Feel free to experiment
    with this.


    Now, let’s publish our map style changes. Click the large blue Publish button
    in the upper right-hand side of the screen, as shown in Figure [13-17](#485790_1_En_13_Chapter.xhtml#Fig17).
    After clicking Publish, a dialog box will appear to let you confirm your changes
    with a visual display of the differences (Figure [13-18](#485790_1_En_13_Chapter.xhtml#Fig18)).


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig18_HTML.jpg](images/485790_1_En_13_Chapter/485790_1_En_13_Fig18_HTML.jpg)


    Figure 13-18 Publishing changes to the map style


    You can see your data additions in this dialog box, with the new map styles you
    applied. If everything looks good, click Publish, and your changes will be live
    for any websites or mobile apps that use this map style. If you would like to
    publish a new version of this map style, for instance, to avoid changing the look
    and feel for existing users, you can do that as well through this dialog box.


    You will get a nice confirmation message about your style being successfully published
    (Figure [13-19](#485790_1_En_13_Chapter.xhtml#Fig19)).


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig19_HTML.jpg](images/485790_1_En_13_Chapter/485790_1_En_13_Fig19_HTML.jpg)


    Figure 13-19 Publish confirmation message for map styles


    We can now leave Mapbox Studio and open up Xcode to see our changes in the app.


    # Displaying the Dataset in the App


    Running the app from Chapter [12](#485790_1_En_12_Chapter.xhtml) should display
    the map style you just edited, with the earthquake data points. No code changes
    should be needed. If you do not see the earthquake data, make sure you published
    the map styles in Mapbox Studio, and you are viewing a part of the world that
    has earthquakes.


    The following code snippet will show much of the state of Alaska in your map:


    ```

    mapView.centerCoordinate = CLLocationCoordinate2D(

    latitude: 61.2,

    longitude: -149.9)

    mapView.zoomLevel = 3

    ```


    You may also want to double-check that your application is setting the map style
    correctly with the `styleURL` property. Your map’s style can be found from the
    Mapbox Studio home screen by clicking the pop-up menu next to the style and copying
    the style URL found there:


    ```

    mapView.styleURL = URL(string: mapStyleURI)

    ```


    After running your app in the Simulator, you should see something similar to Figure
    [13-20](#485790_1_En_13_Chapter.xhtml#Fig20).


    ![../images/485790_1_En_13_Chapter/485790_1_En_13_Fig20_HTML.jpg](images/485790_1_En_13_Chapter/485790_1_En_13_Fig20_HTML.jpg)


    Figure 13-20 Earthquake data points in the app


    While these data points are not map markers like we used in Chapter [11](#485790_1_En_11_Chapter.xhtml),
    they are features we can detect when a user taps on the map. For the final part
    of this project, let’s print some information on the console when a user taps
    on a data point.'
