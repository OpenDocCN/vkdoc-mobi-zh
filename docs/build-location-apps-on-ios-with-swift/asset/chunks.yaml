    All of the code snippets in this and the following sections will go into the action
    named `findBusinesses()` we created earlier. This function can be found printed
    out in full in Listing [10-3](#485790_1_En_10_Chapter.xhtml#PC13), which is after
    the discussion of each individual step.


    ### Setting geographic boundaries for the search


    We can tell Google Places what geographic area to search for places using the
    autocomplete search. You can either use this area as a preference, so that results
    within this geographic space get boosted up toward the top of the list, or as
    a restriction, where places outside of this geographic area won’t be shown at
    all, even if they are nearby.


    With our project, we are going to use the visible region from the Google map view
    as our boundary. That region needs to be transformed into a `GMSCoordinateBounds`
    object, which you can do with the `GMSCoordinateBounds` constructor:


    ```

    let region = mapView.projection.visibleRegion()

    let bounds = GMSCoordinateBounds.init(region: region)

    vc.autocompleteBounds = bounds

    ```


    We will also restrict our results to only those found within the geographic bounds:


    ```

    vc.autocompleteBoundsMode = .restrict

    ```


    You do not have to be this restrictive – instead you can bias results toward those
    found in the map, but if a user is looking for something specific, and it happens
    to be close to the map but not in it, it will still return as a result. This is
    the default behavior for the autocomplete search. If you would like to use it,
    do not set the `autocompleteBoundsMode` parameter, or set it to the `.bias` value.


    You also do not have to use any geographic bounds, in which case you would simply
    omit setting the `autocompleteBounds` property . You could also construct the
    geographic bounds yourself, for instance, if you were building a place search
    for a given region or city.


    The next step is to determine which data fields your view controller needs to
    fetch from the Google Places API.


    ### Requesting a subset of data fields


    The Google Places API will return all data fields by default for autocomplete,
    including premium ones such as reviews that cost extra. As you probably do not
    need all fields, you can set a specific set of fields that you do need in your
    result.


    To construct the list of fields, you will need to combine a set of `GMSPlaceField`
    enum values together with an OR (|) operator. The following is a list of several
    of these fields that you could use for your application:


    *   `coordinate`


    *   `formattedAddress`


    *   `name`


    *   `openingHours`


    *   `phoneNumber`


    *   `photos`


    *   `placeID`


    *   `rating`


    *   `website`


    For our purposes, we are going to stick to the basic place details and simply
    request the name, place ID, and coordinate. We will use these later to create
    a marker on the map.


    Our code will combine the raw values from the enum values as unsigned integers
    and then construct a `GMSPlaceField` value from that. We also return from the
    function if the `GMSPlaceField` constructor fails to create an object. This particular
    API could have been made a little easier to use, for instance, by taking a set
    of values instead. We also need to set the `placeFields` property of the autocomplete
    view controller:


    ```

    // needed for the map marker

    let fields = UInt(GMSPlaceField.name.rawValue) |

    UInt(GMSPlaceField.placeID.rawValue) |

    UInt(GMSPlaceField.coordinate.rawValue)

    guard let placeFields = GMSPlaceField(rawValue: fields) else {

    return

    }

    vc.placeFields = placeFields

    ```


    Not to be confused with the fields, we now need to tell Google Places what type
    of search results we want.'
