  raw: '## Understanding offline map downloading


    Most map engines, whether on Web or mobile, will cache downloaded map tiles to
    provide better performance or to reduce bandwidth costs. For instance, with the
    Mapbox SDK for iOS, that cache will contain up to 50 megabytes of tiles or style
    information. Mapbox goes one step beyond this and lets you as a developer create
    an offline pack of map tiles, represented by the `MGLOfflinePack` class. Your
    app downloads map tiles from Mapbox based on the geographic coordinates and zoom
    level you choose. This combination is known as the region and can be used with
    the protocol `MGLOfflineRegion`. The only implementation of this protocol is in
    the `MGLTilePyramidOfflineRegion` class.


    While the map tiles download, your app can process status updates, so you know
    what the progress of the download is and when it is complete. Mapbox will fire
    off several notifications to observe. The offline pack is the `userInfo` variable
    on the notification. Each offline pack has an associated `progress` variable,
    which contains an `MGLOfflinePackProgress` structure. On this structure, you can
    get the number of resources downloaded, bytes downloaded, tiles downloaded, and
    a minimum and maximum number of resources left to download. This way, you can
    provide the user with a progress bar, a spinner with a progress message, or something
    else to inform them of the download.


    ## Estimating the number of tiles used


    When creating your application , be very mindful of the maximum number of tiles
    you will let a user download, especially if you create a mass-market application
    and provide the application for free. Mapbox will allow you to download up to
    6000 map tiles per user as its default, but you can override that setting and
    download more.


    If you don’t have a good idea about how many tiles to provide for your users,
    try the Mapbox offline tile count estimator tool (Figure [15-1](#485790_1_En_15_Chapter.xhtml#Fig1))
    at [`https://docs.mapbox.com/playground/offline-estimator/`](https://docs.mapbox.com/playground/offline-estimator/).


    ![../images/485790_1_En_15_Chapter/485790_1_En_15_Fig1_HTML.jpg](images/485790_1_En_15_Chapter/485790_1_En_15_Fig1_HTML.jpg)


    Figure 15-1


    Mapbox offline tile count estimator


    Because Mapbox uses vector tiles, you can have your apps zoom to levels below
    the max zoom setting that you download, for instance, you could download offline
    map tiles for this region of Central Texas, from a minimum zoom of 5 to a maximum
    zoom of 12.


    Your map could still zoom in further to zoom level 13 or 14; it would just be
    missing any additional details at those levels. The maximum zoom level for Mapbox
    vector tiles is 16, so you can’t request tiles beyond that level.


    ## Downloading an offline map pack


    The first step to download an offline map pack is to define the geographic bounds
    for the area. This could be a defined area, with northeast and southwest corners,
    or you could just use the bounds of the map currently displayed in the map view.


    To create your own bounds, create a function in your `ViewController` class from
    the code in Listing [15-2](#485790_1_En_15_Chapter.xhtml#PC2) – these coordinates
    define an area in Central Texas, the same ones we used for the offline map tile
    estimator.


    ```

    func createOfflineRegionBounds() -> MGLCoordinateBounds {

    let southwest = CLLocationCoordinate2D(

    latitude: 28.822,

    longitude: -99.5934)

    let northeast = CLLocationCoordinate2D(

    latitude: 30.8611,

    longitude: -96.6051)

    return MGLCoordinateBounds(sw: southwest,

    ne: northeast)

    }

    Listing 15-2

    Creating offline region bounds

    ```


    The preceding method returns an `MGLCoordinateBounds` structure. You can also
    call `mapView.visibleCoordinateBounds` to get the bounds for the map displaying
    in the map view. You might know that your application serves a certain geographic
    area, in which case you might want to define fixed coordinates. Or you may let
    the user decide which tiles to download by picking an area out on the map themselves
    and then tapping a download button.


    Once you have a set of bounds, you can create an `MGLTilePyramidOfflineRegion`
    region. These are the only types of offline regions you can create. They take
    the bounds, the minimum map zoom level, and the maximum map zoom level, as well
    as the map style to use. Typically, you would use the same map style as the map
    view, but you could specify another style URL if you like.


    An example of creating a region looks like this:


    ```

    let region = MGLTilePyramidOfflineRegion(

    styleURL: mapView.styleURL,

    bounds: bounds,

    fromZoomLevel: 5,

    toZoomLevel: 8)

    ```


    We will use this code snippet in a method that downloads an offline map pack,
    so don’t put it into your class yet.


    The next step is to add an offline map pack. The `MGLOfflineStorage` class is
    a singleton (accessed with `MGLOfflineStorage.shared`) that you can call the `addPack`
    method on. This method takes the region, a context, and a completion handler.
    The `context` argument is a general-purpose storage variable that takes a `Data`
    instance. You can put anything you like into the context. We’re going to take
    the simple approach and store a string as the context with UTF-8 encoding. The
    completion handler takes the offline pack and an error as optional arguments.
    Once you get the offline pack, call the `resume()` method on the pack to start
    the download process.


    The complete method to download an offline map pack is in Listing [15-3](#485790_1_En_15_Chapter.xhtml#PC4).
    Add the `downloadOfflineMapPack()` method to your `ViewController` class. To test
    your code, call this method at the end of your `viewDidLoad()` method .


    ```

    func downloadOfflineMapPack() {

    let bounds = createOfflineRegionBounds()

    let region = MGLTilePyramidOfflineRegion(

    styleURL: mapView.styleURL,

    bounds: bounds,

    fromZoomLevel: 5,

    toZoomLevel: 8)

    let packName = "Central Texas"

    guard let nameData = packName.data(using: .utf8) else {

    return

    }

    MGLOfflineStorage.shared.addPack(

    for: region,

    withContext: nameData) { (pack, error) in

    guard let pack = pack else {

    print("Unable to create pack")

    print(error?.localizedDescription ??

    "No error given")

    return

    }

    pack.resume()

    }

    }

    Listing 15-3

    Download an offline map pack

    ```


    You can specify your own offline map pack name; it is only used for reference
    by your own project. You could store a GUID there or a dictionary of name/value
    attributes.


    Typically, you will want to know when the download process is finished, or you
    may want to display progress to the user. Let’s take a look at the notifications
    that get sent when the Mapbox SDK downloads an offline map pack.


    The complete code for the view controller is in Listing [15-4](#485790_1_En_15_Chapter.xhtml#PC10),
    if you want to see how each of the pieces fits together.'
  trans: "\n# 了解离线地图下载\n\n大多数地图引擎，无论是在 Web 端还是移动端，都会缓存已下载的地图瓦片，以提供更好的性能或降低带宽成本。例如，在适用于\
    \ iOS 的 Mapbox SDK 中，该缓存将包含最多 50 MB 的瓦片或样式信息。Mapbox 更进一步，允许作为开发者的你创建一个由 `MGLOfflinePack`\
    \ 类表示的离线地图瓦片包。你的应用会根据你选择的地理坐标和缩放级别从 Mapbox 下载地图瓦片。这种组合被称为区域（region），并且可以与 `MGLOfflineRegion`\
    \ 协议一起使用。该协议的唯一实现位于 `MGLTilePyramidOfflineRegion` 类中。\n\n在地图瓦片下载过程中，你的应用可以处理状态更新，这样你就能了解下载的进度以及何时完成。Mapbox\
    \ 会触发多个可供观察的通知。离线包就是通知中的 `userInfo` 变量。每个离线包都有一个关联的 `progress` 变量，其中包含 `MGLOfflinePackProgress`\
    \ 结构体。通过此结构体，你可以获取已下载的资源数量、已下载的字节数、已下载的瓦片数量，以及待下载资源的最小和最大数量。这样，你就可以为用户提供一个进度条、一个带有进度消息的旋转指示器，或其他任何方式，来告知他们下载进度。\n\
    \n## 估算使用的瓦片数量\n\n在创建应用时，请务必注意你将允许用户下载的最大瓦片数量，尤其当你开发面向大众市场的应用并且免费提供时。默认情况下，Mapbox\
    \ 允许每个用户下载最多 6000 个地图瓦片，但你可以覆盖此设置并下载更多。\n\n如果你对为用户提供多少瓦片没有很好的概念，可以尝试使用 Mapbox\
    \ 的离线瓦片数量估算工具（图 15-1），访问地址为 [`https://docs.mapbox.com/playground/offline-estimator/`](https://docs.mapbox.com/playground/offline-estimator/)。\n\
    \n![../images/485790_1_En_15_Chapter/485790_1_En_15_Fig1_HTML.jpg](img/485790_1_En_15_Fig1_HTML.jpg)\n\
    \n图 15-1\n\nMapbox 离线瓦片数量估算器\n\n由于 Mapbox 使用矢量瓦片，你可以让应用缩放到低于你下载的最大缩放设置的级别。例如，你可以为德克萨斯州中部这个区域下载离线地图瓦片，从最小缩放级别\
    \ 5 到最大缩放级别 12。\n\n你的地图仍然可以进一步缩放到 13 或 14 级；只是会缺少这些级别的任何额外细节。Mapbox 矢量瓦片的最大缩放级别是\
    \ 16，因此你不能请求超过该级别的瓦片。\n\n## 下载离线地图包\n\n下载离线地图包的第一步是定义该区域的地理边界。这可以是一个已定义的区域，带有东北角和西南角，或者你也可以直接使用地图视图中当前显示的地图的边界。\n\
    \n要创建你自己的边界，请根据代码清单 15-2 中的代码，在你的 `ViewController` 类中创建一个函数。这些坐标定义了德克萨斯州中部的一个区域，与我们用于离线地图瓦片估算器的坐标相同。\n\
    \n```\nfunc createOfflineRegionBounds() -> MGLCoordinateBounds {\n    let southwest\
    \ = CLLocationCoordinate2D(\n        latitude: 28.822,\n        longitude: -99.5934)\n\
    \    let northeast = CLLocationCoordinate2D(\n        latitude: 30.8611,\n   \
    \     longitude: -96.6051)\n    return MGLCoordinateBounds(sw: southwest,\n  \
    \                             ne: northeast)\n}\n```\n\n代码清单 15-2  \n创建离线区域边界\n\
    \n上述方法返回一个 `MGLCoordinateBounds` 结构体。你也可以调用 `mapView.visibleCoordinateBounds`\
    \ 来获取地图视图中显示的地图的边界。你可能知道你的应用服务于特定地理区域，在这种情况下，你可能希望定义固定坐标。或者，你可以让用户自行在地图上选择一个区域，然后点击下载按钮，来决定下载哪些瓦片。\n\
    \n一旦你有了边界集，就可以创建一个 `MGLTilePyramidOfflineRegion` 区域。这是你可以创建的唯一种类的离线区域。它需要边界、最小地图缩放级别、最大地图缩放级别以及要使用的地图样式。通常，你会使用与地图视图相同的地图样式，但如果你愿意，也可以指定另一个样式\
    \ URL。\n\n创建区域的一个示例如下：\n\n```\nlet region = MGLTilePyramidOfflineRegion(\n   \
    \ styleURL: mapView.styleURL,\n    bounds: bounds,\n    fromZoomLevel: 5,\n  \
    \  toZoomLevel: 8)\n```\n\n我们将在下载离线地图包的方法中使用此代码片段，所以暂时不要将其放入你的类中。\n\n下一步是添加一个离线地图包。`MGLOfflineStorage`\
    \ 类是一个单例（通过 `MGLOfflineStorage.shared` 访问），你可以调用其上的 `addPack` 方法。该方法接受区域、上下文（context）和一个完成处理程序。`context`\
    \ 参数是一个通用存储变量，接受一个 `Data` 实例。你可以将任何你喜欢的内容放入上下文中。我们将采用简单的方法，将一个字符串作为上下文存储，并使用 UTF-8\
    \ 编码。完成处理程序将离线包和一个错误作为可选参数。一旦你获取到离线包，就在该包上调用 `resume()` 方法来启动下载过程。\n\n下载离线地图包的完整方法如代码清单\
    \ 15-3 所示。将 `downloadOfflineMapPack()` 方法添加到你的 `ViewController` 类中。要测试你的代码，请在\
    \ `viewDidLoad()` 方法的末尾调用此方法。\n\n```\nfunc downloadOfflineMapPack() {\n    let\
    \ bounds = createOfflineRegionBounds()\n    let region = MGLTilePyramidOfflineRegion(\n\
    \        styleURL: mapView.styleURL,\n        bounds: bounds,\n        fromZoomLevel:\
    \ 5,\n        toZoomLevel: 8)\n    let packName = \"Central Texas\"\n    guard\
    \ let nameData = packName.data(using: .utf8) else {\n        return\n    }\n \
    \   MGLOfflineStorage.shared.addPack(\n        for: region,\n        withContext:\
    \ nameData) { (pack, error) in\n            guard let pack = pack else {\n   \
    \             print(\"Unable to create pack\")\n                print(error?.localizedDescription\
    \ ??\n                    \"No error given\")\n                return\n      \
    \      }\n            pack.resume()\n    }\n}\n```\n\n代码清单 15-3  \n下载离线地图包\n\n\
    你可以指定自己的离线地图包名称；它仅用于你项目的引用。你可以在此存储一个 GUID 或一个名称/值属性的字典。\n\n通常，你会希望了解下载过程何时完成，或者你可能想向用户显示进度。让我们来看看当\
    \ Mapbox SDK 下载离线地图包时发送的通知。\n\n如果你想了解各个部分是如何组合在一起的，视图控制器的完整代码见代码清单 15-4。\n"
- fmt: '# Monitoring offline map pack downloads


    There are three different notifications that the offline map downloader will send
    out. These are standard iOS notifications, monitored with the `NotificationCenter`,
    not to be confused with push notifications:


    - `MGLOfflinePackProgressChanged`

    - `MGLOfflinePackError`

    - `MGLOfflinePackMaximumMapboxTilesReached`


    Let''s focus on the progress changed notification. We need to subscribe to these
    progress changed notifications in our `viewDidLoad()` method. Add the code in
    the following snippet to your `viewDidLoad()` method:


    ```

    NotificationCenter.default.addObserver(

    self,

    selector: #selector(offlinePackProgressChanged),

    name: NSNotification.Name.MGLOfflinePackProgressChanged,

    object: nil)

    ```


    We also need to define that `offlinePackProgressChanged` method and make sure
    it has an `@objc` annotation. Add the following function definition to your class:


    ```

    @objc func offlinePackProgressChanged(

    notification: NSNotification) {

    print("Offline pack progress changed")

    }

    ```


    If you go ahead and add the notification, observer in the `viewDidLoad()` method,
    and then add the `offlinePackProgressChanged()` method, run the app in the Simulator.
    You will see many print statements showing that something is happening!


    If we want to get more details, we can get those from the notification. The optional
    `object` property of the notification is the offline pack. The offline pack has
    a property named `progress` that is an `MGLOfflinePackProgress` structure. Let''s
    print out those completed bytes to the console:


    ```

    @objc func offlinePackProgressChanged(

    notification: NSNotification) {

    guard let pack = notification.object

    as? MGLOfflinePack else {

    return

    }

    print("Offline pack progress changed")

    print(pack.progress.countOfBytesCompleted)

    }

    ```


    Modifying the function to show this will give us more information about the progress
    of the application, but of course isn''t quite ready for the end users yet. They
    would probably like to see some kind of percentage, letting them know that they
    are close to the finish. You can set this up with a progress view, but for now
    we will simply print the percentages out, to the console. Add the following to
    the end of the `offlinePackProgressChanged` method:


    ```

    let percentageResources = Int(round(100 *

    Float(progress.countOfResourcesCompleted) /

    Float(progress.countOfResourcesExpected)))

    print("Resources: \(percentageResources)%")

    ```


    To use this with a progress view, you could simply set the progress value of the
    progress view to be the number of resources completed divided by the number of
    resources expected:


    ```

    progressView.progress = Float(progress.countOfResourcesCompleted) /

    Float(progress.countOfResourcesExpected)))

    ```


    Once the count of resources completed equals the number of count expected, you
    could dismiss the progress bar with a timer and optionally pop up an alert view.


    Once we combine all of our code together, we end up with a view controller class,
    that will display a Mapbox map, but all of the download progress will be displayed
    on the console for debugging. The complete code listing for the `ViewController`
    class is in Listing [15-4](#485790_1_En_15_Chapter.xhtml#PC10).


    ```

    import UIKit

    import Mapbox

    class ViewController: UIViewController {

    @IBOutlet weak var mapView: MGLMapView!

    var progressView: UIProgressView!

    override func viewDidLoad() {

    super.viewDidLoad()

    // Do any additional setup after loading the view.

    mapView.centerCoordinate = CLLocationCoordinate2D(

    latitude: 30.2,

    longitude: -97.75)

    mapView.zoomLevel = 10

    mapView.styleURL = MGLStyle.outdoorsStyleURL

    NotificationCenter.default.addObserver(

    self,

    selector: #selector(offlinePackProgressChanged),

    name: NSNotification.Name.MGLOfflinePackProgressChanged,

    object: nil)

    downloadOfflineMapPack()

    }

    @objc func offlinePackProgressChanged(

    notification: NSNotification) {

    guard let pack = notification.object

    as? MGLOfflinePack else {

    return

    }

    let progress = pack.progress

    print("Offline pack progress changed")

    print(progress.countOfBytesCompleted)

    let percentageResources = Int(round(100 *

    Float(progress.countOfResourcesCompleted) /

    Float(progress.countOfResourcesExpected)))

    print("Resources: \(percentageResources)%")

    }

    func createOfflineRegionBounds() -> MGLCoordinateBounds {

    let southwest = CLLocationCoordinate2D(

    latitude: 28.822,

    longitude: -99.5934)

    let northeast = CLLocationCoordinate2D(

    latitude: 30.8611,

    longitude: -96.6051)

    return MGLCoordinateBounds(sw: southwest,

    ne: northeast)

    }

    func downloadOfflineMapPack() {

    let bounds = createOfflineRegionBounds()

    let region = MGLTilePyramidOfflineRegion(

    styleURL: mapView.styleURL,

    bounds: bounds,

    fromZoomLevel: 5,

    toZoomLevel: 8)

    let packName = "Central Texas"

    guard let nameData = packName.data(using: .utf8) else {

    return

    }

    MGLOfflineStorage.shared.addPack(

    for: region,

    withContext: nameData) { (pack, error) in

    guard let pack = pack else {

    print("Unable to create pack")

    print(error?.localizedDescription ??

    "No error given")

    return

    }

    pack.resume()

    }

    }

    }

    Listing 15-4

    Complete ViewController class

    ```


    # Considerations for using offline map tiles


    When you set up an application to use offline map tiles, there are several constraints
    to consider. The first is pricing. Make sure that you have an idea of how many
    tiles each user will download and how that fits into your budget. Use this number
    to drive the maximum zoom level or the maximum size of the map region. Also consider
    how long it will take for the user to perform the download. If you block the user
    from continuing into the application while the map tiles download, provide a progress
    bar or some other user interface. If the number of map tiles is large, let the
    user know that they should initiate the process themselves when they have access
    to a wireless Ethernet network, unless they want to incur large bandwidth charges
    from their carrier.


    Mapbox does provide some soft limits to how many map tiles a user can download.
    That number is currently 6000 map tiles across all downloaded regions, but you
    can raise it yourself by calling the `setMaximumAllowedMapboxTiles` method on
    the `MGLOfflineStorage` class. Once you bump up against the built-in limit or
    the limit that you set, the Mapbox SDK will post the `MGLOfflinePackMaximumMapboxTilesReached`
    notification. You can listen for that notification similarly to how we listened
    for offline map tile download progress. Your app will have to remove existing
    offline map packs to continue downloading map tiles into a new pack if the limit
    is reached.


    Last, Mapbox does not allow offline map tiles to be redistributed from the app
    (for instance, to another copy of the app on another user''s phone), so read the
    terms of service to make sure that your app''s overall design works with Mapbox''s
    solution.'
