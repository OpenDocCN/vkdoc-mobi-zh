- fmt: "# Exploring the Map Items in the Response\n\nThe local search results will\
    \ consist of `MKMapItem` objects. Each of these map items in the result is a point\
    \ of interest and contains location and address information in a placemark object,\
    \ a point of interest category, and if available, the name, phone number, URL,\
    \ and time zone for the map item. These `MKMapItem` objects are also used for\
    \ directions and routing, as we will see in Chapter [5](#485790_1_En_5_Chapter.xhtml).\n\
    \nThe placemark objects are from the `MKPlacemark` class and contain latitude,\
    \ longitude, and street address information. These placemarks implement the `MKAnnotation`\
    \ protocol discussed in Chapter [3](#485790_1_En_3_Chapter.xhtml). This means\
    \ that you can add placemarks directly to a map view to display results.\n\n#\
    \ Displaying the Search Results on a Map\n\nNow that you have learned the relationship\
    \ between map items and annotations, it’s easy to see how these search results\
    \ can be displayed on the map view. Be sure you have a map view on your storyboard\
    \ and an outlet variable named `mapView` on your `ViewController` class before\
    \ trying this code.\n\nThe previous code listing has been enhanced to work with\
    \ the map view – the changes are in bold in the following code listing.\n\n```\n\
    let searchRequest = MKLocalSearch.Request()\nsearchRequest.naturalLanguageQuery\
    \ = \"coffee\"\nsearchRequest.region = mapView.region\nlet search = MKLocalSearch(request:\
    \ searchRequest)\nsearch.start { (response, error) in\n    guard let response\
    \ = response else {\n        print(\"Error searching - no response\")\n      \
    \  if let error = error {\n            print(\"Error: \\(error.localizedDescription)\"\
    )\n        } else {\n            print(\"No error specified\")\n        }\n  \
    \      return\n    }\n    for mapItem in response.mapItems {\n        self.mapView.addAnnotation(mapItem.placemark)\n\
    \    }\n    self.mapView.setRegion(response.boundingRegion, animated: true)\n\
    }\n```\n\n**Listing 4-2** Displaying search results on the map\n\nThe changes\
    \ in the preceding code listing accomplish a few things. The first change sets\
    \ the region used in the search request to be the current region displaying in\
    \ the map view. The second change adds the map item’s placemark as an annotation,\
    \ instead of printing the name to the debug console. The last change sets the\
    \ boundaries of the visible region on the map view to the region that contains\
    \ all search results.\n\nCreate a new function named `showCoffeeOnMap()` and put\
    \ the code in Listing [4-2](#485790_1_En_4_Chapter.xhtml#PC5) into this function.\
    \ Then call your new function from the `viewDidLoad()` function in your `ViewController`\
    \ class. Go ahead and run this application in the Simulator or on your device.\
    \ You should see results similar to the following screenshot, depending on how\
    \ much coffee is for sale in your area.\n\n![../images/485790_1_En_4_Chapter/485790_1_En_4_Fig1_HTML.jpg](images/485790_1_En_4_Chapter/485790_1_En_4_Fig1_HTML.jpg)\n\
    \n**Figure 4-1** Displaying search results on a map view\n\n# Creating Annotations\
    \ for Results\n\nOne downside of adding the placemark directly as an annotation\
    \ is that Apple uses the street address of the placemark as the title for the\
    \ annotation, instead of using the name from the map item. This is not the best\
    \ user experience, so let’s modify our code a little bit to create a new annotation\
    \ from each map item, as seen in Listing [4-3](#485790_1_En_4_Chapter.xhtml#PC6).\n\
    \n```\nfor mapItem in response.mapItems {\n    let annotation = MKPointAnnotation()\n\
    \    annotation.coordinate = mapItem.placemark.coordinate\n    annotation.title\
    \ = mapItem.name\n    annotation.subtitle = mapItem.phoneNumber\n    self.mapView.addAnnotation(annotation)\n\
    }\n```\n\n**Listing 4-3** Create an annotation for each search result\n\nReplace\
    \ the existing `for` loop with the preceding code block, and you will see the\
    \ names of the coffee shops, rather than just the street addresses.\n\n# Filtering\
    \ with Points of Interest Categories\n\nApple’s search works well with the natural\
    \ language query, whether you look for something generic or something more specific.\
    \ However, if your application will be looking for points of interest in categories\
    \ that Apple has defined, then using the point of interest filter will improve\
    \ your user’s experience.\n\nSet the point of interest filter on the search request\
    \ with an instance of the `MKPointOfInterestFilter` class. This filter is new\
    \ to iOS 13 and isn’t available in previous versions of iOS. When you create a\
    \ point of interest filter, you have two choices – you can create a filter that\
    \ includes only one or more categories, or you can create a filter that excludes\
    \ one or more categories. Typically, you would probably be using the inclusion\
    \ filter, but if your search results are being populated with irrelevant results\
    \ from categories that don’t fit your app, it’s certainly easy to exclude categories.\n\
    \nThe `MKPointOfInterestCategory` struct defines all of the different categories\
    \ you can use. A partial list follows:\n\n- Airport\n- Amusement Park\n- Aquarium\n\
    - ATM\n- Bakery\n- Bank\n- Beach\n- Brewery\n\nAnd so forth, down to the zoo category.\
    \ As you can see, if you are building an application that relies on local search,\
    \ these filters could be quite useful.\n\nTo use an `MKPointOfInterestFilter`\
    \ class with the `MKLocalSearch.Request` search request, you just need to set\
    \ the `pointOfInterestFilter` property. For instance, to perform a search for\
    \ local bakeries, use the following code:\n\n```\nsearchRequest.pointOfInterestFilter\
    \ = MKPointOfInterestFilter(including: [.bakery])\n```\n\nIf we were to combine\
    \ this point of interest filter with the preceding code listing that creates annotations\
    \ from the local search map item results and then remove the natural language\
    \ query string, we would have a function that looks like Listing [4-4](#485790_1_En_4_Chapter.xhtml#PC8).\n\
    \n```\nlet searchRequest = MKLocalSearch.Request()\nsearchRequest.pointOfInterestFilter\
    \ = MKPointOfInterestFilter(including: [.bakery])\nsearchRequest.region = mapView.region\n\
    let search = MKLocalSearch(request: searchRequest)\nsearch.start { (response,\
    \ error) in\n    guard let response = response else {\n        print(\"Error searching\
    \ - no response\")\n        if let error = error {\n            print(\"Error:\
    \ \\(error.localizedDescription)\")\n        } else {\n            print(\"No\
    \ error specified\")\n        }\n        return\n    }\n    for mapItem in response.mapItems\
    \ {\n        let annotation = MKPointAnnotation()\n        annotation.coordinate\
    \ = mapItem.placemark.coordinate\n        annotation.title = mapItem.name\n  \
    \      annotation.subtitle = mapItem.phoneNumber\n        self.mapView.addAnnotation(annotation)\n\
    \    }\n    self.mapView.setRegion(response.boundingRegion, animated: true)\n\
    }\n```\n\n**Listing 4-4** Category filter with map annotations\n\nRunning this\
    \ code on your iOS app will yield similar results to this screenshot, depending\
    \ on how many bakeries are in your area.\n\n![../images/485790_1_En_4_Chapter/485790_1_En_4_Fig2_HTML.jpg](images/485790_1_En_4_Chapter/485790_1_En_4_Fig2_HTML.jpg)\n\
    \n**Figure 4-2** Points of interest from a category filter with annotations\n\n\
    Working with local search is fairly straightforward, as the `MKLocalSearch` class\
    \ that Apple provides does not have any advanced functionality, such as pagination\
    \ of search results. Creating your own annotations from map items in the search\
    \ results generally makes the most sense. Using the techniques in Chapter [3](#485790_1_En_3_Chapter.xhtml),\
    \ you can create custom annotation views, for instance, to match the categories\
    \ for the points of interest.\n\nIn the next chapter, we will use Apple’s directions\
    \ API to create routes for driving or walking. The directions API also uses the\
    \ `MKMapItem` class, and we will explore other functionality for map items that\
    \ wasn’t covered in this chapter, such as user location and opening map items\
    \ in the Apple Maps app."
  raw: '## Exploring the map items in the response


    The local search results will consist of `MKMapItem` objects . Each of these map
    items in the result is a point of interest and contains location and address information
    in a placemark object, a point of interest category, and if available, the name,
    phone number, URL, and time zone for the map item. These `MKMapItem` objects are
    also used for directions and routing, as we will see in Chapter [5](#485790_1_En_5_Chapter.xhtml).


    The placemark objects are from the `MKPlacemark` class and contain latitude, longitude,
    and street address information. These placemarks implement the `MKAnnotation`
    protocol discussed in Chapter [3](#485790_1_En_3_Chapter.xhtml). This means that
    you can add placemarks directly to a map view to display results.


    ## Displaying the search results on a map


    Now that you have learned the relationship between map items and annotations,
    it’s easy to see how these search results can be displayed on the map view. Be
    sure you have a map view on your storyboard and an outlet variable named `mapView`
    on your `ViewController` class before trying this code.


    The previous code listing has been enhanced to work with the map view – the changes
    are in bold in the following code listing.


    ```

    let searchRequest = MKLocalSearch.Request()

    searchRequest.naturalLanguageQuery = "coffee"

    searchRequest.region = mapView.region

    let search = MKLocalSearch(request: searchRequest)

    search.start { (response, error) in

    guard let response = response else {

    print("Error searching - no response")

    if let error = error {

    print("Error: \(error.localizedDescription)")

    } else {

    print("No error specified")

    }

    return

    }

    for mapItem in response.mapItems {

    self.mapView.addAnnotation(mapItem.placemark)

    }

    self.mapView.setRegion(response.boundingRegion, animated: true)

    }

    Listing 4-2

    Displaying search results on the map

    ```


    The changes in the preceding code listing accomplish a few things. The first change
    sets the region used in the search request to be the current region displaying
    in the map view. The second change adds the map item’s placemark as an annotation,
    instead of printing the name to the debug console. The last change sets the boundaries
    of the visible region on the map view to the region that contains all search results.


    Create a new function named `showCoffeeOnMap()` and put the code in Listing [4-2](#485790_1_En_4_Chapter.xhtml#PC5)
    into this function. Then call your new function from the `viewDidLoad()` function
    in your `ViewController` class . Go ahead and run this application in the Simulator
    or on your device. You should see results similar to the following screenshot,
    depending on how much coffee is for sale in your area.


    ![../images/485790_1_En_4_Chapter/485790_1_En_4_Fig1_HTML.jpg](images/485790_1_En_4_Chapter/485790_1_En_4_Fig1_HTML.jpg)


    Figure 4-1


    Displaying search results on a map view


    ## Creating annotations for results


    One downside of adding the placemark directly as an annotation is that Apple uses
    the street address of the placemark as the title for the annotation, instead of
    using the name from the map item. This is not the best user experience, so let’s
    modify our code a little bit to create a new annotation from each map item, as
    seen in Listing [4-3](#485790_1_En_4_Chapter.xhtml#PC6).


    ```

    for mapItem in response.mapItems {

    let annotation = MKPointAnnotation()

    annotation.coordinate =

    mapItem.placemark.coordinate

    annotation.title = mapItem.name

    annotation.subtitle = mapItem.phoneNumber

    self.mapView.addAnnotation(annotation)

    }

    Listing 4-3

    Create an annotation for each search result

    ```


    Replace the existing for loop with the preceding code block, and you will see
    the names of the coffee shops, rather than just the street addresses.


    ## Filtering with points of interest categories


    Apple’s search works well with the natural language query, whether you look for
    something generic or something more specific. However, if your application will
    be looking for points of interest in categories that Apple has defined, then using
    the point of interest filter will improve your user’s experience.


    Set the point of interest filter on the search request with an instance of the
    `MKPointOfInterestFilter` class . This filter is new to iOS 13 and isn’t available
    in previous versions of iOS. When you create a point of interest filter, you have
    two choices – you can create a filter that includes only one or more categories,
    or you can create a filter that excludes one or more categories. Typically, you
    would probably be using the inclusion filter, but if your search results are being
    populated with irrelevant results from categories that don’t fit your app, it’s
    certainly easy to exclude categories.


    The `MKPointOfInterestCategory` struct defines all of the different categories
    you can use. A partial list follows:


    *   Airport


    *   Amusement Park


    *   Aquarium


    *   ATM


    *   Bakery


    *   Bank


    *   Beach


    *   Brewery


    And so forth, down to the zoo category. As you can see, if you are building an
    application that relies on local search, these filters could be quite useful.


    To use an `MKPointOfInterestFilter` class with the `MKLocalSearch.Request` search
    request, you just need to set the `pointOfInterestFilter` property. For instance,
    to perform a search for local bakeries, use the following code:


    ```

    searchRequest.pointOfInterestFilter =

    MKPointOfInterestFilter(including: [.bakery])

    ```


    If we were to combine this point of interest filter with the preceding code listing
    that creates annotations from the local search map item results and then remove
    the natural language query string, we would have a function that looks like Listing
    [4-4](#485790_1_En_4_Chapter.xhtml#PC8).


    ```

    let searchRequest = MKLocalSearch.Request()

    searchRequest.pointOfInterestFilter =

    MKPointOfInterestFilter(including: [.bakery])

    searchRequest.region = mapView.region

    let search = MKLocalSearch(request: searchRequest)

    search.start { (response, error) in

    guard let response = response else {

    print("Error searching - no response")

    if let error = error {

    print("Error: \(error.localizedDescription)")

    } else {

    print("No error specified")

    }

    return

    }

    for mapItem in response.mapItems {

    let annotation = MKPointAnnotation()

    annotation.coordinate =

    mapItem.placemark.coordinate

    annotation.title = mapItem.name

    annotation.subtitle = mapItem.phoneNumber

    self.mapView.addAnnotation(annotation)

    }

    self.mapView.setRegion(response.boundingRegion, animated: true)

    }

    Listing 4-4

    Category filter with map annotations

    ```


    Running this code on your iOS app will yield similar results to this screenshot,
    depending on how many bakeries are in your area.


    ![../images/485790_1_En_4_Chapter/485790_1_En_4_Fig2_HTML.jpg](images/485790_1_En_4_Chapter/485790_1_En_4_Fig2_HTML.jpg)


    Figure 4-2


    Points of interest from a category filter with annotations


    Working with local search is fairly straightforward, as the `MKLocalSearch` class
    that Apple provides does not have any advanced functionality, such as pagination
    of search results. Creating your own annotations from map items in the search
    results generally makes the most sense. Using the techniques in Chapter [3](#485790_1_En_3_Chapter.xhtml),
    you can create custom annotation views, for instance, to match the categories
    for the points of interest.


    In the next chapter, we will use Apple’s directions API to create routes for driving
    or walking. The directions API also uses the `MKMapItem` class , and we will explore
    other functionality for map items that wasn’t covered in this chapter, such as
    user location and opening map items in the Apple Maps app.'
  trans: "\n# 探索响应中的地图项\n\n本地搜索结果将由 `MKMapItem` 对象组成。结果中的每个地图项都是一个兴趣点，并在地标对象中包含位置和地址信息、兴趣点类别，以及（如果可用）地图项的名称、电话号码、URL\
