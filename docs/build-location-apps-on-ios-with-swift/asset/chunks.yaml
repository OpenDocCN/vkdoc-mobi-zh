    red line for all four constraints (top, bottom, left, and right). After selecting
    them, make sure that all of the values are 0, and press the “Add 4 Constraints”
    button (Figure [1-8](#485790_1_En_1_Chapter.xhtml#Fig8)).


    ![../images/485790_1_En_1_Chapter/485790_1_En_1_Fig8_HTML.jpg](images/485790_1_En_1_Chapter/485790_1_En_1_Fig8_HTML.jpg)


    Figure 1-8


    Adding constraints to a Map View


    Your map view will now properly fill up the entire screen on an iPhone or iPad.
    If you would like to double-check this, select the Map View on the storyboard.
    Next, choose the fifth icon on the right-hand side, the Size Inspector, and you
    will see that you have constraints for all four sides of your Map View.


    Now try running your iOS app, and you will see that you have a nice, large map
    on your app – as seen in Figure [1-9](#485790_1_En_1_Chapter.xhtml#Fig9).


    ![../images/485790_1_En_1_Chapter/485790_1_En_1_Fig9_HTML.jpg](images/485790_1_En_1_Chapter/485790_1_En_1_Fig9_HTML.jpg)


    Figure 1-9


    An iOS app with a full-screen map view


    This was a pretty straightforward process to get the map up and running and didn’t
    even involve writing any code in Swift.


    ### Adding a pin to your map


    Now that we have our map, it’s time to add a pin that shows our home city!


    Before we add the pin to the map, we will need to create an outlet for the map,
    named `mapView`, using Xcode’s Assistant. While you have the `Main.storyboard`
    editor open, choose the **Assistant** view from the **Editor** menu. You’ll see
    the `ViewController` class open up next to your view controller in the storyboard
    (Figure [1-10](#485790_1_En_1_Chapter.xhtml#Fig10)).


    ![../images/485790_1_En_1_Chapter/485790_1_En_1_Fig10_HTML.jpg](images/485790_1_En_1_Chapter/485790_1_En_1_Fig10_HTML.jpg)


    Figure 1-10


    Xcode Editor and Assistant view


    Select the map view on the storyboard or on the outline view, hold down the Control
    key, and then drag an outlet into the `ViewController` class, as shown in Figure
    [1-11](#485790_1_En_1_Chapter.xhtml#Fig11).


    ![../images/485790_1_En_1_Chapter/485790_1_En_1_Fig11_HTML.jpg](images/485790_1_En_1_Chapter/485790_1_En_1_Fig11_HTML.jpg)


    Figure 1-11


    Creating an outlet


    After creating the outlet, name the outlet `mapView` in the dialog box that appears
    (Figure [1-12](#485790_1_En_1_Chapter.xhtml#Fig12)).


    ![../images/485790_1_En_1_Chapter/485790_1_En_1_Fig12_HTML.jpg](images/485790_1_En_1_Chapter/485790_1_En_1_Fig12_HTML.jpg)


    Figure 1-12


    Naming the outlet


    You’ll notice that the `ViewController` class will no longer compile – that is
    because our map is an `MKMapView`, part of the `MapKit` framework. We need to
    import this framework into our `ViewController` class so that we can use classes
    from the `MapKit` framework. Otherwise, Xcode will show errors when we try and
    build our project.


    Add the following line right below the `import UIKit` statement to import the
    `MapKit` framework.


    ```

    import MapKit

    ```


    Beyond maps themselves, the `MapKit` framework has a wide range of functionality.
    With `MapKit`, we represent locations on the map as annotations. Annotations implement
    the `MKAnnotation` protocol, which consists of a latitude and longitude coordinate
    pair and an optional title and subtitle. The `MapKit` framework comes with a basic
    implementation of `MKAnnotation`, the `MKPointAnnotation` class, but for most
    apps, you will want to create your own implementation of `MKAnnotation`. In this
    chapter, we will use `MKPointAnnotation`, but the later chapters of this book
    will use our own implementation, so you can see how it works both ways.


    Once you have an annotation (or many annotations), you can just add it to the
    map using the `addAnnotation()` or `addAnnotations()` method on the `MKMapView`
    class.


    Annotations are not the actual pin that the map displays – those are annotation
    views, which are subclasses of the `MKAnnotationView` class . By default, you
    will get an `MKPinAnnotationView`, which is the standard red pin that you see
    in many mapping apps. You can customize the pin color a little, but for most apps,
    you will want to put in your custom images. We’ll use our own custom images in
    the next chapters of this book.


    To create an annotation as an `MKPointAnnotation`, we do need to be able to create
    a coordinate, which we can do with `CLLocationCoordinate2DMake()`. For our purposes
    in this chapter, we are going to add all of the code to the `viewDidLoad()` method
    in the `ViewController` class. Xcode created this method for you when you generated
    a new project.


    This method is currently empty except for a call to `super.viewDidLoad()`. Leave
    that line of code in the `viewDidLoad()` method, and place this code beneath that.


    Pass in the latitude and the longitude (as double values) to create the coordinate.
    The `MKPointAnnotation` will need this coordinate set, such as in the following
    code:


    ```

    let austin = MKPointAnnotation()

    austin.coordinate = CLLocationCoordinate2DMake(30.25, -97.75)

    ```


    The longitude for Austin is going to be negative, because Austin, Texas, is in
    the Western Hemisphere. The latitude is positive because the city is in the Northern
    Hemisphere.


    To give the annotation a title, we can simply set the title property'
