- fmt: "# Using the Mapbox Directions API\n\nYour app needs to calculate a route between\
    \ two or more different waypoints, using the Mapbox Directions API. While you\
    \ can make HTTPS calls to the Directions API directly, it’s much easier to use\
    \ the helper classes in the `MapboxDirections` framework.\n\nThe key classes that\
    \ you need to get started with the Mapbox Directions API are `Waypoint`, `RouteOptions`,\
    \ `Directions`, and `Route`.\n\n`Waypoint`s are the places on the route. You can\
    \ have up to 25 waypoints for directions when cycling or walking. You may also\
    \ have up to 25 waypoints if you are driving, but don’t want the route to consider\
    \ traffic. If you do want to consider traffic conditions, you can only have two\
    \ or three waypoints.\n\n`RouteOptions` consist of the waypoints along with the\
    \ type of transportation used – walking, cycling, driving, or driving considering\
    \ traffic. This also includes any settings to consider when planning the route,\
    \ such as avoiding toll roads or ferries or avoiding U-turns. You can also ask\
    \ for the individual steps within each leg of the route.\n\nWhen we use the turn-by-turn\
    \ navigation user interface in the `MapboxNavigation` framework, we will use a\
    \ subclass of `RouteOptions` named `NavigationRouteOptions`.\n\nThe `Directions`\
    \ class represents the Directions API. Using a shared single instance of the class,\
    \ you can call the API asynchronously using the `calculate(_:completionHandler:)`\
    \ method. Pass the route options as the first argument and a closure as the second\
    \ argument.\n\nLast, a successful directions call will pass at least one route\
    \ as argument to the completion handler. A route will have one leg (a `RouteLeg`\
    \ object) if it has two waypoints and one leg for every additional waypoint.\n\
    \nPutting all of this together, we can write two simple methods that will create\
    \ the waypoints for our directions request and then make the call to the directions\
    \ API.\n\nThe first method (Listing 14-2) creates the waypoints, in this case\
    \ a trip between Austin, Texas, and the Alamo in San Antonio, Texas. You could\
    \ use the user’s current location as the first waypoint if you wanted.\n\n```\n\
    func createWaypoints() -> [Waypoint] {\n    let austinCoordinate = CLLocationCoordinate2D(\n\
    \        latitude: 30.27, longitude: -97.74)\n    let alamoCoordinate = CLLocationCoordinate2D(\n\
    \        latitude: 29.426, longitude: -98.486)\n    let austin = Waypoint(coordinate:\
    \ austinCoordinate,\n                          name: \"Austin\")\n    let alamo\
    \ = Waypoint(coordinate: alamoCoordinate,\n                         name: \"The\
    \ Alamo\")\n    return [austin, alamo]\n}\n```\n\nAdd that `createWaypoints()`\
    \ method to your `ViewController` class. You can also see that constructing a\
    \ waypoint is fairly straightforward.\n\nThe `getDirections()` method in Listing\
    \ 14-3 passes those waypoints into a new `RouteOptions` instance and then calls\
    \ the Mapbox Directions API. This will fail if you have not set the Mapbox access\
    \ token properly in your project. We then iterate through each step in the only\
    \ leg of the route. If we had more than two waypoints, we would have additional\
    \ legs. There are many different properties on the route, leg, and step objects\
    \ such as estimated time, distance in meters, and headings (for steps) that you\
    \ can inspect on your own – some may be useful for a custom user interface, and\
    \ others may be unnecessary.\n\n```\nfunc getDirections() {\n    let waypoints\
    \ = createWaypoints()\n    let options = RouteOptions(waypoints: waypoints,\n\
    \                               profileIdentifier: .automobile)\n    options.includesSteps\
    \ = true\n    Directions.shared.calculate(options) {\n        (waypoints, routes,\
    \ error) in\n        guard let route = routes?.first else {\n            print(error\
    \ ?? \"No Error\")\n            return\n        }\n        guard let firstLeg\
    \ = route.legs.first else {\n            return\n        }\n        print(firstLeg.name)\n\
    \        for step in firstLeg.steps {\n            print(step.instructions)\n\
    \        }\n    }\n}\n```\n\nTry this function out by calling `getDirections()`\
    \ from your `viewDidLoad()` method and then looking for output in the console.\n\
    \nYou could build on top of the preceding function yourself to add the coordinates\
    \ from the route onto your Mapbox map as a polyline. Instead, we are going to\
    \ use the much simpler approach of using the prebuilt turn-by-turn navigation\
    \ user interface in the `MapboxNavigation` framework.\n\n## Displaying the Navigation\
    \ User Interface\n\nTo display the default navigation user interface, we need\
    \ to create a `NavigationViewController` and then present it modally from our\
    \ `ViewController` class. We can either do this completely programmatically or\
    \ add a storyboard reference for the navigation view controller and then configure\
    \ it in the `prepareForSegue` method of our view controller. We won’t use the\
    \ storyboard on this project. Also, just for clarity, this is a different class\
    \ and serves a different purpose than the `UINavigationController` class from\
    \ Apple’s `UIKit` framework.\n\nWe are going to build on the code we discussed\
    \ earlier, but make a few changes. For instance, we can keep the way that we create\
    \ waypoints, but we are going to use the `NavigationRouteOptions` class instead\
    \ of `RouteOptions` – the navigation route options comes with configuration optimized\
    \ for turn-by-turn navigation. Instead of printing out some of the route properties,\
    \ we are going to create an instance of the `NavigationViewController` class with\
    \ the route as an argument. After we create that instance, we present it modally\
    \ as a full-screen view controller. There is a built-in dismiss button at the\
    \ bottom of the navigation view controller that would return the user to our original\
    \ view controller.\n\nWe also take the opportunity to add a feature to our route\
    \ request, which is to avoid toll roads. You can also choose to avoid ferries,\
    \ motorways, restricted roads, or tunnels. All of these are enumerated on the\
    \ `MBRoadClasses` class. Only one of these may be avoided, not a combination,\
    \ even though the API allows for an array of road classes.\n\nListing 14-4 is\
    \ our `startNavigation()` method. You can see how it mostly differs from the existing\
    \ `getDirections()` method in the closure.\n\n```\nfunc startNavigation() {\n\
    \    let waypoints = createWaypoints()\n    let options = NavigationRouteOptions(\n\
    \        waypoints: waypoints)\n    options.roadClassesToAvoid = [.toll]\n   \
    \ Directions.shared.calculate(options) {\n        (waypoints, routes, error) in\n\
    \        guard let route = routes?.first else {\n            print(error ?? \"\
    No error\")\n            return\n        }\n        let navVC = NavigationViewController(for:\
    \ route)\n        navVC.modalPresentationStyle = .fullScreen\n        self.present(navVC,\n\
    \                     animated: true,\n                     completion: nil)\n\
    \    }\n}\n```\n\nCall the `startNavigation()` method from your `viewDidLoad()`\
    \ method. You can replace the `getDirections()` method we created in Chapter 13.\
    \ You will see a map view with instructions, an estimated time of arrival, and\
    \ the remaining distance, similar to Figure 14-3.\n\n![../images/485790_1_En_14_Chapter/485790_1_En_14_Fig3_HTML.jpg](images/485790_1_En_14_Chapter/485790_1_En_14_Fig3_HTML.jpg)\n\
    \nNow that you have the user interface up and running, explore how it works –\
    \ you can swipe left and right at the top to navigate between different steps\
    \ in the route. Press the x button in the lower right to dismiss the navigation\
    \ view controller when you are finished."
  raw: '## Using the Mapbox Directions API


    Your app needs to calculate a route between two or more different waypoints, using
    the Mapbox Directions API. While you can make HTTPS calls to the Directions API
    directly, it’s much easier to use the helper classes in the `MapboxDirections`
    framework.


    The key classes that you need to get started with the Mapbox Directions API are
    `Waypoint`, `RouteOptions`, `Directions`, and `Route`.


    Waypoints are the places on the route. You can have up to 25 waypoints for directions
    when cycling or walking. You may also have up to 25 waypoints if you are driving,
    but don’t want the route to consider traffic. If you do want to consider traffic
    conditions, you can only have two or three waypoints.


    Route options consist of the waypoints along with the type of transportation used –
    walking, cycling, driving, or driving considering traffic. This also includes
    any settings to consider when planning the route, such as avoiding toll roads
    or ferries or avoiding U-turns. You can also ask for the individual steps within
    each leg of the route.


    When we use the turn-by-turn navigation user interface in the `MapboxNavigation`
    framework, we will use a subclass of `RouteOptions` named `NavigationRouteOptions`.


    The `Directions` class represents the Directions API. Using a shared single instance
    of the class, you can call the API asynchronously using the `calculate(_:completionHandler:)`
    method. Pass the route options as the first argument and a closure as the second
    argument.


    Last, a successful directions call will pass at least one route as argument to
    the completion handler. A route will have one leg (a `RouteLeg` object) if it
    has two waypoints and one leg for every additional waypoint.


    Putting all of this together, we can write two simple methods that will create
    the waypoints for our directions request and then make the call to the directions
    API.


    The first method (Listing [14-2](#485790_1_En_14_Chapter.xhtml#PC4)) creates the
    waypoints, in this case a trip between Austin, Texas, and the Alamo in San Antonio,
    Texas. You could use the user’s current location as the first waypoint if you
    wanted.


    ```

    func createWaypoints() -> [Waypoint] {

    let austinCoordinate = CLLocationCoordinate2D(

    latitude: 30.27, longitude: -97.74)

    let alamoCoordinate = CLLocationCoordinate2D(

    latitude: 29.426, longitude: -98.486)

    let austin = Waypoint(coordinate: austinCoordinate,

    name: "Austin")

    let alamo = Waypoint(coordinate: alamoCoordinate,

    name: "The Alamo")

    return [austin, alamo]

    }

    Listing 14-2

    Create waypoints for Mapbox directions

    ```


    Add that `createWaypoints()` method to your `ViewController` class. You can also
    see that constructing a waypoint is fairly straightforward.


    The `getDirections()` method in Listing [14-3](#485790_1_En_14_Chapter.xhtml#PC5)
    passes those waypoints into a new `RouteOptions` instance and then calls the Mapbox
    Directions API. This will fail if you have not set the Mapbox access token properly
    in your project. We then iterate through each step in the only leg of the route.
    If we had more than two waypoints, we would have additional legs. There are many
    different properties on the route, leg, and step objects such as estimated time,
    distance in meters, and headings (for steps) that you can inspect on your own –
    some may be useful for a custom user interface, and others may be unnecessary.


    ```

    func getDirections() {

    let waypoints = createWaypoints()

    let options = RouteOptions(waypoints: waypoints,

    profileIdentifier: .automobile)

    options.includesSteps = true

    Directions.shared.calculate(options) {

    (waypoints, routes, error) in

    guard let route = routes?.first else {

    print(error ?? "No Error")

    return

    }

    guard let firstLeg = route.legs.first else {

    return

    }

    print(firstLeg.name)

    for step in firstLeg.steps {

    print(step.instructions)

    }

    }

    }

    Listing 14-3

    Getting directions from the Mapbox Directions API

    ```


    Try this function out by calling `getDirections()` from your `viewDidLoad()` method
    and then looking for output in the console.


    You could build on top of the preceding function yourself to add the coordinates
    from the route onto your Mapbox map as a polyline. Instead, we are going to use
    the much simpler approach of using the prebuilt turn-by-turn navigation user interface
    in the `MapboxNavigation` framework.


    ## Displaying the navigation user interface


    To display the default navigation user interface, we need to create a `NavigationViewController`
    and then present it modally from our `ViewController` class. We can either do
    this completely programmatically or add a storyboard reference for the navigation
    view controller and then configure it in the `prepareForSegue` method of our view
    controller. We won’t use the storyboard on this project. Also, just for clarity,
    this is a different class and serves a different purpose than the `UINavigationController`
    class from Apple’s `UIKit` framework.


    We are going to build on the code we discussed earlier, but make a few changes.
    For instance, we can keep the way that we create waypoints, but we are going to
    use the `NavigationRouteOptions` class instead of `RouteOptions` – the navigation
    route options comes with configuration optimized for turn-by-turn navigation.
    Instead of printing out some of the route properties, we are going to create an
    instance of the `NavigationViewController` class with the route as an argument.
    After we create that instance, we present it modally as a full-screen view controller.
    There is a built-in dismiss button at the bottom of the navigation view controller
    that would return the user to our original view controller.


    We also take the opportunity to add a feature to our route request, which is to
    avoid toll roads. You can also choose to avoid ferries, motorways, restricted
    roads, or tunnels. All of these are enumerated on the `MBRoadClasses` class. Only
    one of these may be avoided, not a combination, even though the API allows for
    an array of road classes.


    Listing [14-4](#485790_1_En_14_Chapter.xhtml#PC6) is our `startNavigation()` method
    . You can see how it mostly differs from the existing `getDirections()` method
    in the closure.


    ```

    func startNavigation() {

    let waypoints = createWaypoints()

    let options = NavigationRouteOptions(

    waypoints:waypoints)

    options.roadClassesToAvoid = [.toll]

    Directions.shared.calculate(options) {

    (waypoints, routes, error) in

    guard let route = routes?.first else {

    print(error ?? "No error")

    return

    }

    let navVC = NavigationViewController(for: route)

    navVC.modalPresentationStyle = .fullScreen

    self.present(navVC,

    animated: true,

    completion: nil)

    }

    }

    Listing 14-4

    Start navigation with turn-by-turn directions in a user interface

    ```


    Call the `startNavigation()` method from your `viewDidLoad()` method. You can
    replace the `getDirections()` method we created in Chapter [13](#485790_1_En_13_Chapter.xhtml).
    You will see a map view with instructions, an estimated time of arrival, and the
    remaining distance, similar to Figure [14-3](#485790_1_En_14_Chapter.xhtml#Fig3).


    ![../images/485790_1_En_14_Chapter/485790_1_En_14_Fig3_HTML.jpg](images/485790_1_En_14_Chapter/485790_1_En_14_Fig3_HTML.jpg)


    Figure 14-3


    Turn-by-turn navigation in the app


    Now that you have the user interface up and running, explore how it works – you
    can swipe left and right at the top to navigate between different steps in the
    route. Press the x button in the lower right to dismiss the navigation view controller
    when you are finished.'
  trans: "\n# 使用 Mapbox Directions API\n\n你的应用需要利用 Mapbox Directions API 计算两个或多个不同途经点之间的路线。虽然你可以直接向\
    \ Directions API 发起 HTTPS 调用，但使用 `MapboxDirections` 框架中的辅助类要简单得多。\n\n开始使用 Mapbox\
    \ Directions API 所需的关键类包括 `Waypoint`、`RouteOptions`、`Directions` 和 `Route`。\n\n\
    `Waypoint` 是路线上的地点。当骑行或步行时，你最多可以设置 25 个途经点来规划方向。如果你正在驾驶，但不需要路线考虑交通状况，同样最多可以使用\
    \ 25 个途经点。如果你确实希望考虑交通状况，则只能使用两到三个途经点。\n\n`RouteOptions` 包含途经点以及所使用的交通方式——步行、骑行、驾驶或考虑交通状况的驾驶。这还包括规划路线时需要考虑的任何设置，例如避开收费站、渡轮或避免掉头。你也可以请求获取路线中每一程的单独步骤。\n\
    \n当我们在 `MapboxNavigation` 框架中使用逐向导航用户界面时，我们将使用 `RouteOptions` 的一个子类，名为 `NavigationRouteOptions`。\n\
    \n`Directions` 类代表 Directions API。通过使用该类的共享单例实例，你可以使用 `calculate(_:completionHandler:)`\
    \ 方法异步调用 API。将路线选项作为第一个参数传入，并将一个闭包作为第二个参数传入。\n\n最后，一次成功的路线查询调用会至少将一个路线作为参数传递给完成处理程序。如果路线有两个途经点，那么它会包含一程（一个\
    \ `RouteLeg` 对象），并且每增加一个途经点就会多出一程。\n\n综合以上所有内容，我们可以编写两个简单的方法来为我们的路线请求创建途经点，然后调用\
    \ directions API。\n\n第一个方法（清单 14-2）创建了途经点，本例中是从德克萨斯州奥斯汀到德克萨斯州圣安东尼奥的阿拉莫之旅。如果你愿意，也可以将用户的当前位置作为第一个途经点。\n\
    \n```\nfunc createWaypoints() -> [Waypoint] {\n    let austinCoordinate = CLLocationCoordinate2D(\n\
    \        latitude: 30.27, longitude: -97.74)\n    let alamoCoordinate = CLLocationCoordinate2D(\n\
    \        latitude: 29.426, longitude: -98.486)\n    let austin = Waypoint(coordinate:\
    \ austinCoordinate,\n                          name: \"Austin\")\n    let alamo\
    \ = Waypoint(coordinate: alamoCoordinate,\n                         name: \"The\
    \ Alamo\")\n    return [austin, alamo]\n}\n```\n\n将 `createWaypoints()` 方法添加到你的\
    \ `ViewController` 类中。你还可以看到构造一个途经点相当简单直接。\n\n清单 14-3 中的 `getDirections()` 方法将这些途经点传入一个新的\
    \ `RouteOptions` 实例，然后调用 Mapbox Directions API。如果你的项目中未正确设置 Mapbox 访问令牌，此操作将失败。然后我们遍历路线中唯\
    \ 一一程的每个步骤。如果我们有超过两个途经点，就会有额外的程。路线、程和步骤对象上有许多不同的属性，例如预估时间、以米为单位的距离以及方向（针对步骤），你可以自行查看——其中一些可能对自定义用户界面有用，而另一些可能不必要。\n\
    \n```\nfunc getDirections() {\n    let waypoints = createWaypoints()\n    let\
    \ options = RouteOptions(waypoints: waypoints,\n                             \
    \  profileIdentifier: .automobile)\n    options.includesSteps = true\n    Directions.shared.calculate(options)\
    \ {\n        (waypoints, routes, error) in\n        guard let route = routes?.first\
    \ else {\n            print(error ?? \"No Error\")\n            return\n     \
    \   }\n        guard let firstLeg = route.legs.first else {\n            return\n\
    \        }\n        print(firstLeg.name)\n        for step in firstLeg.steps {\n\
    \            print(step.instructions)\n        }\n    }\n}\n```\n\n尝试通过从你的 `viewDidLoad()`\
    \ 方法中调用 `getDirections()` 来使用此函数，然后在控制台中查看输出。\n\n你可以自行在以上函数的基础上进行构建，将路线中的坐标作为折线添加到你的\
    \ Mapbox 地图上。相反，我们将使用更简单的方法，即使用 `MapboxNavigation` 框架中预构建的逐向导航用户界面。\n\n## 显示导航用户界面\n\
    \n要显示默认的导航用户界面，我们需要创建一个 `NavigationViewController`，然后从我们的 `ViewController` 类中以模态方式呈现它。我们可以完全通过编程方式实现，也可以为导航视图控制器添加一个\
    \ storyboard 引用，然后在我们的视图控制器的 `prepareForSegue` 方法中进行配置。在此项目中，我们不会使用 storyboard。另外，为了清晰起见，这是一个与\
    \ Apple 的 `UIKit` 框架中的 `UINavigationController` 类不同且用途不同的类。\n\n我们将基于前面讨论的代码进行构建，但会做一些更改。例如，我们可以保留创建途经点的方式，但我们将使用\
    \ `NavigationRouteOptions` 类而不是 `RouteOptions`——导航路线选项带有针对逐向导航优化的配置。我们不会打印出某些路线属性，而是创建一个\
    \ `NavigationViewController` 类的实例，并将路线作为参数传入。创建该实例后，我们将其作为全屏视图控制器以模态方式呈现。在导航视图控制器底部有一个内置的关闭按钮，可以将用户返回到我们的原始视图控制器。\n\
    \n我们还借此机会为我们的路线请求添加一个功能，即避开收费站。你也可以选择避开渡轮、高速公路、限制通行的道路或隧道。所有这些都是通过 `MBRoadClasses`\
    \ 类枚举的。只能选择避开其中一项，不能组合，尽管 API 允许使用道路类的数组。\n\n清单 14-4 是我们的 `startNavigation()`\
    \ 方法。你可以看到它在闭包中与现有的 `getDirections()` 方法的主要不同之处。\n\n```\nfunc startNavigation()\
    \ {\n    let waypoints = createWaypoints()\n    let options = NavigationRouteOptions(\n\
    \        waypoints: waypoints)\n    options.roadClassesToAvoid = [.toll]\n   \
    \ Directions.shared.calculate(options) {\n        (waypoints, routes, error) in\n\
    \        guard let route = routes?.first else {\n            print(error ?? \"\
    No error\")\n            return\n        }\n        let navVC = NavigationViewController(for:\
    \ route)\n        navVC.modalPresentationStyle = .fullScreen\n        self.present(navVC,\n\
    \                     animated: true,\n                     completion: nil)\n\
    \    }\n}\n```\n\n从你的 `viewDidLoad()` 方法中调用 `startNavigation()` 方法。你可以替换我们在第 13\
    \ 章中创建的 `getDirections()` 方法。你将看到一个带有指令、预估到达时间和剩余距离的地图视图，类似于图 14-3。\n\n![../images/485790_1_En_14_Chapter/485790_1_En_14_Fig3_HTML.jpg](img/485790_1_En_14_Fig3_HTML.jpg)\n\
    \n现在，用户界面已经启动并运行，探索一下它的工作原理——你可以在顶部向左或向右滑动，在路线的不同步骤之间切换。完成后，按下右下角的 x 按钮关闭导航视图控制器。\n"
- fmt: "### Using the Mapbox simulated navigation\n\nWhile you can certainly use a\
    \ GPX file to simulate navigation with the iOS Simulator, you may want to use\
    \ the simulation that Mapbox provides for a route. This is useful for testing,\
    \ as it sticks to the route you asked for, and lets you change the speed, as you\
    \ can see in Figure [14-4](#485790_1_En_14_Chapter.xhtml#Fig4).\n\n![../images/485790_1_En_14_Chapter/485790_1_En_14_Fig4_HTML.jpg](images/485790_1_En_14_Chapter/485790_1_En_14_Fig4_HTML.jpg)\n\
    \n*Figure 14-4 — Simulating navigation, sped up to nine times normal speed*\n\n\
    To use simulation with Mapbox, you will need to modify the `startNavigation()`\
    \ method. Rather than creating the `NavigationViewController` with just the route,\
    \ you will need to create a navigation service, use that to populate navigation\
    \ options, and then pass that to the `NavigationViewController`.\n\nThe navigation\
    \ service (`MapboxNavigationService`) gets instantiated with the route and the\
    \ `.always` enum for the `simulating` argument:\n\n```swift\nlet navService =\
    \ MapboxNavigationService(\nroute: route, simulating: .always)\n```\n\nUse that\
    \ navigation service to create an instance of `NavigationOptions`:\n\n```swift\n\
    let navOptions = NavigationOptions(\nnavigationService: navService)\n```\n\nWe\
    \ will pass those options to the navigation view controller, along with the route.\
    \ The route itself does not change when you use navigation simulation:\n\n```swift\n\
    let navVC = NavigationViewController(for: route,\noptions: navOptions)\n```\n\n\
    Putting the preceding lines of code into our `startNavigation()` method and replacing\
    \ the call to create the Mapbox navigation view controller, our final method looks\
    \ like Listing [14-5](#485790_1_En_14_Chapter.xhtml#PC10).\n\n```swift\nfunc startNavigation()\
    \ {\n    let waypoints = createWaypoints()\n    let options = NavigationRouteOptions(\n\
    \        waypoints:waypoints)\n    options.roadClassesToAvoid = [.toll]\n    Directions.shared.calculate(options)\
    \ {\n        (waypoints, routes, error) in\n        guard let route = routes?.first\
    \ else {\n            print(error ?? \"No error\")\n            return\n     \
    \   }\n        let navService = MapboxNavigationService(\n            route: route,\
    \ simulating: .always)\n        let navOptions = NavigationOptions(\n        \
    \    navigationService: navService)\n        let navVC = NavigationViewController(for:\
    \ route,\n                                             options: navOptions)\n\
    \        navVC.modalPresentationStyle = .fullScreen\n        self.present(navVC,\n\
    \                     animated: true,\n                     completion: nil)\n\
    \    }\n}\n```\n\n*Listing 14-5 — Starting navigation with a simulated drive*\n\
    \nAfter you replace your `startNavigation()` method with the Swift code in Listing\
    \ [14-5](#485790_1_En_14_Chapter.xhtml#PC10), run your project. You should expect\
    \ to see a sped-up drive through the route between your start and finish.\n\n\
    ### Customizing the navigation experience\n\nIf you don’t like the display of\
    \ the app, you can create custom styles for the user interface, including day\
    \ and night variants. These styles can use your Mapbox map styles for tiles, and\
    \ they can also use the `UIAppearance` protocol to style individual user interface\
    \ elements. For instance, you could use this to match the colors you use for your\
    \ brand, so the navigation looks like it belongs with the app.\n\nThere are many\
    \ other features built into the Navigation SDK as well, such as CarPlay support,\
    \ spoken voice options, and determining which side of the road to use for a waypoint\
    \ (useful for rideshare or delivery apps).\n\nIf you like, you can create your\
    \ own navigation user interface using the `MapboxCoreNavigation` framework. You\
    \ would need to listen for `routeControllerProgressDidChange` notifications. These\
    \ notifications contain location updates in the form of a `RouteProgress` class\
    \ that you would use to update your user interface. You can get information about\
    \ the distance traveled, distance remaining, remaining legs and steps, and other\
    \ information. You can also get more granular information about progress in the\
    \ current leg and the current step. The current step progress provides information\
    \ about the next intersection, the distance to the next intersection, the distance\
    \ until the next maneuver a user makes, and other information you could use for\
    \ a user interface.\n\n### Conclusion\n\nIf the turn-by-turn navigation user experience\
    \ helps your application, using Mapbox’s prebuilt components makes this very easy.\
    \ Compared to building your own solution on top of another directions API, you\
    \ can have a simpler experience for the user and less code to maintain within\
    \ your application.\n\nIn Chapter [15](#485790_1_En_15_Chapter.xhtml), we look\
    \ at Mapbox’s offline map capabilities – this is one of the areas where Mapbox\
    \ provides a technology solution that other mapping SDKs don’t replicate.\n\n\
    # 15. Using Offline Maps with Mapbox\n\nMany mobile applications need to work\
    \ in areas with no or limited cellular coverage. If you as a developer want to\
    \ provide mapping functionality, there are a few ways to do this, but the best\
    \ way would be to use a map framework that you can use either online or offline.\
    \ The Mapbox SDK for iOS provides the capability to download offline map tiles\
    \ and then store them on the user’s phone for use in a map view later. I’ve used\
    \ this offline functionality to create a hiking app for the New Mexico mountains\
    \ and to provide maps for kids with iPads on road trips.\n\nWe will use the offline\
    \ pack technology with Mapbox maps to download a region of the map for offline\
    \ use in this chapter. Then you can try setting your phone to airplane mode to\
    \ see how the app works with the offline tiles.\n\nAs with other mapping APIs,\
    \ check the pricing for offline map tiles, and make sure that it matches your\
    \ use case.\n\n## Setting up your app project\n\nThis project builds on the basics\
    \ of Mapbox in Chapter [11](#485790_1_En_11_Chapter.xhtml), including setting\
    \ up a project and obtaining an access token. Create a new project in Xcode, named\
    \ `OfflineMapsApp`. You can also reuse the `FirstMapboxApp` project from Chapter\
    \ [11](#485790_1_En_11_Chapter.xhtml), if you like.\n\nThe project will be a Single\
    \ View Application with Swift and storyboard, similar to all of our previous projects.\n\
    \nRun `pod init` in your project’s directory to generate the `Podfile`. Add the\
    \ Mapbox SDK to your CocoaPods file, as seen in Listing [15-1](#485790_1_En_15_Chapter.xhtml#PC1).\n\
    \n```ruby\ntarget 'OfflineMapsApp' do\n  use_frameworks!\n  # Pods for OfflineMapsApp\n\
    \  pod 'Mapbox-iOS-SDK', '~> 5.8'\nend\n```\n\n*Listing 15-1 — Podfile for the\
    \ offline maps app*\n\nNow run `pod install` to set up the Mapbox SDK with your\
    \ project. Open the workspace file with Xcode from now on, instead of the project\
    \ file.\n\nAdd your Mapbox access token to the `Info.plist` file as the `MGLMapboxAccessToken`\
    \ entry. Also add a Mapbox map view to the view controller. Create an outlet variable\
    \ in the view controller, named `mapView`. You should also import the `Mapbox`\
    \ framework at the top of the view controller class.\n\nAll of this is covered\
    \ in more detail in Chapter [11](#485790_1_En_11_Chapter.xhtml), so if you want\
    \ to see more specific instructions for any of these steps, follow that chapter\
    \ first."
  raw: '## Using the Mapbox simulated navigation


    While you can certainly use a GPX file to simulate navigation with the iOS Simulator,
    you may want to use the simulation that Mapbox provides for a route. This is useful
    for testing, as it sticks to the route you asked for, and lets you change the
    speed, as you can see in Figure [14-4](#485790_1_En_14_Chapter.xhtml#Fig4).


    ![../images/485790_1_En_14_Chapter/485790_1_En_14_Fig4_HTML.jpg](images/485790_1_En_14_Chapter/485790_1_En_14_Fig4_HTML.jpg)


    Figure 14-4


    Simulating navigation, sped up to nine times normal speed


    To use simulation with Mapbox, you will need to modify the `startNavigation()`
    method. Rather than creating the `NavigationViewController` with just the route,
    you will need to create a navigation service, use that to populate navigation
    options, and then pass that to the `NavigationViewController`.


    The navigation service (`MapboxNavigationService`) gets instantiated with the
    route and the `.always` enum for the `simulating` argument:


    ```

    let navService = MapboxNavigationService(

    route: route, simulating: .always)

    ```


    Use that navigation service to create an instance of `NavigationOptions`:


    ```

    let navOptions = NavigationOptions(

    navigationService: navService)

    ```


    We will pass those options to the navigation view controller, along with the route.
    The route itself does not change when you use navigation simulation:


    ```

    let navVC = NavigationViewController(for: route,

    options: navOptions)

    ```


    Putting the preceding lines of code into our `startNavigation()` method and replacing
    the call to create the Mapbox navigation view controller, our final method looks
    like Listing [14-5](#485790_1_En_14_Chapter.xhtml#PC10).


    ```

    func startNavigation() {

    let waypoints = createWaypoints()

    let options = NavigationRouteOptions(

    waypoints:waypoints)

    options.roadClassesToAvoid = [.toll]

    Directions.shared.calculate(options) {

    (waypoints, routes, error) in

    guard let route = routes?.first else {

    print(error ?? "No error")

    return

    }

    let navService = MapboxNavigationService(

    route: route, simulating: .always)

    let navOptions = NavigationOptions(

    navigationService: navService)

    let navVC = NavigationViewController(for: route,

    options: navOptions)

    navVC.modalPresentationStyle = .fullScreen

    self.present(navVC,

    animated: true,

    completion: nil)

    }

    }

    Listing 14-5

    Starting navigation with a simulated drive

    ```


    After you replace your startNavigation() method with the Swift code in Listing
    [14-5](#485790_1_En_14_Chapter.xhtml#PC10), run your project. You should expect
    to see a sped-up drive through the route between your start and finish.


    ## Customizing the navigation experience


    If you don’t like the display of the app, you can create custom styles for the
    user interface, including day and night variants. These styles can use your Mapbox
    map styles for tiles, and they can also use the `UIAppearance` protocol to style
    individual user interface elements. For instance, you could use this to match
    the colors you use for your brand, so the navigation looks like it belongs with
    the app.


    There are many other features built into the Navigation SDK as well, such as CarPlay
    support, spoken voice options, and determining which side of the road to use for
    a waypoint (useful for rideshare or delivery apps).


    If you like, you can create your own navigation user interface using the `MapboxCoreNavigation`
    framework. You would need to listen for `routeControllerProgressDidChange` notifications.
    These notifications contain location updates in the form of a `RouteProgress`
    class that you would use to update your user interface. You can get information
    about the distance traveled, distance remaining, remaining legs and steps, and
    other information. You can also get more granular information about progress in
    the current leg and the current step. The current step progress provides information
    about the next intersection, the distance to the next intersection, the distance
    until the next maneuver a user makes, and other information you could use for
    a user interface.


    ## Conclusion


    If the turn-by-turn navigation user experience helps your application, using Mapbox’s
    prebuilt components makes this very easy. Compared to building your own solution
    on top of another directions API, you can have a simpler experience for the user
    and less code to maintain within your application.


    In Chapter [15](#485790_1_En_15_Chapter.xhtml), we look at Mapbox’s offline map
    capabilities – this is one of the areas where Mapbox provides a technology solution
    that other mapping SDKs don’t replicate.


    # 15. Using Offline Maps with Mapbox


    Many mobile applications need to work in areas with no or limited cellular coverage.
    If you as a developer want to provide mapping functionality, there are a few ways
    to do this, but the best way would be to use a map framework that you can use
    either online or offline. The Mapbox SDK for iOS provides the capability to download
    offline map tiles and then store them on the user’s phone for use in a map view
    later. I’ve used this offline functionality to create a hiking app for the New
    Mexico mountains and to provide maps for kids with iPads on road trips.


    We will use the offline pack technology with Mapbox maps to download a region
    of the map for offline use in this chapter. Then you can try setting your phone
    to airplane mode to see how the app works with the offline tiles.


    As with other mapping APIs, check the pricing for offline map tiles, and make
    sure that it matches your use case.


    ## Setting up your app project


    This project builds on the basics of Mapbox in Chapter [11](#485790_1_En_11_Chapter.xhtml),
    including setting up a project and obtaining an access token. Create a new project
    in Xcode, named `OfflineMapsApp`. You can also reuse the `FirstMapboxApp` project
    from Chapter [11](#485790_1_En_11_Chapter.xhtml), if you like.


    The project will be a Single View Application with Swift and storyboard, similar
    to all of our previous projects.


    Run `pod init` in your project’s directory to generate the `Podfile`. Add the
    Mapbox SDK to your CocoaPods file, as seen in Listing [15-1](#485790_1_En_15_Chapter.xhtml#PC1).


    ```

    target ''OfflineMapsApp'' do

    use_frameworks!

    # Pods for OfflineMapsApp

    pod ''Mapbox-iOS-SDK'', ''~> 5.8''

    end

    Listing 15-1

    Podfile for the offline maps app

    ```


    Now run `pod install` to set up the Mapbox SDK with your project. Open the workspace
    file with Xcode from now on, instead of the project file.


    Add your Mapbox access token to the `Info.plist` file as the `MGLMapboxAccessToken`
    entry. Also add a Mapbox map view to the view controller. Create an outlet variable
    in the view controller, named `mapView`. You should also import the `Mapbox` framework
    at the top of the view controller class.


    All of this is covered in more detail in Chapter [11](#485790_1_En_11_Chapter.xhtml),
    so if you want to see more specific instructions for any of these steps, follow
    that chapter first.'
  trans: "\n### 使用 Mapbox 模拟导航\n\n虽然你确实可以使用 GPX 文件在 iOS 模拟器上模拟导航，但你可能需要使用 Mapbox 为路线提供的模拟功能。这对于测试非常有用，因为它能严格遵循你指定的路线，并且允许你调整速度，如图\
    \ 14-4 所示。\n\n![../images/485790_1_En_14_Chapter/485790_1_En_14_Fig4_HTML.jpg](img/485790_1_En_14_Fig4_HTML.jpg)\n\
    \n*图 14-4 — 模拟导航，速度提升至正常速度的九倍*\n\n要使用 Mapbox 的模拟功能，你需要修改 `startNavigation()` 方法。你需要创建一个导航服务（`NavigationService`），用它来填充导航选项（`NavigationOptions`），然后将这些选项传递给\
    \ `NavigationViewController`，而不是仅仅将路线传给 `NavigationViewController`。\n\n导航服务（`MapboxNavigationService`）通过传入路线和\
    \ `simulating` 参数的 `.always` 枚举值进行实例化：\n\n```swift\nlet navService = MapboxNavigationService(\n\
    route: route, simulating: .always)\n```\n\n使用该导航服务创建 `NavigationOptions` 的实例：\n\
    \n```swift\nlet navOptions = NavigationOptions(\nnavigationService: navService)\n\
    ```\n\n我们将把这些选项连同路线一起传递给导航视图控制器。使用导航模拟时，路线本身不会改变：\n\n```swift\nlet navVC = NavigationViewController(for:\
    \ route,\noptions: navOptions)\n```\n\n将上述代码行放入我们的 `startNavigation()` 方法中，并替换创建\
    \ Mapbox 导航视图控制器的调用，最终的方法如代码清单 14-5 所示。\n\n```swift\nfunc startNavigation() {\n\
    \    let waypoints = createWaypoints()\n    let options = NavigationRouteOptions(\n\
    \        waypoints:waypoints)\n    options.roadClassesToAvoid = [.toll]\n    Directions.shared.calculate(options)\
    \ {\n        (waypoints, routes, error) in\n        guard let route = routes?.first\
    \ else {\n            print(error ?? \"No error\")\n            return\n     \
    \   }\n        let navService = MapboxNavigationService(\n            route: route,\
    \ simulating: .always)\n        let navOptions = NavigationOptions(\n        \
    \    navigationService: navService)\n        let navVC = NavigationViewController(for:\
    \ route,\n                                             options: navOptions)\n\
    \        navVC.modalPresentationStyle = .fullScreen\n        self.present(navVC,\n\
    \                     animated: true,\n                     completion: nil)\n\
    \    }\n}\n```\n\n*代码清单 14-5 — 使用模拟驾驶启动导航*\n\n将你的 `startNavigation()` 方法替换为代码清单\
    \ 14-5 中的 Swift 代码后，运行你的项目。你应该会看到从起点到终点之间的一段加速行驶的路线。\n\n### 自定义导航体验\n\n如果你不喜欢应用的显示效果，可以为用户界面创建自定义样式，包括日间和夜间模式。这些样式可以为地图图块使用你的\
    \ Mapbox 地图样式，也可以使用 `UIAppearance` 协议来设置单个用户界面元素的样式。例如，你可以使用此功能来匹配你品牌的颜色，使导航看起来与你的应用融为一体。\n\
    \n导航 SDK 还内置了许多其他功能，例如支持 CarPlay、语音选项以及确定途经点应使用的道路侧（对拼车或配送应用非常有用）。\n\n如果你愿意，可以使用\
    \ `MapboxCoreNavigation` 框架创建自己的导航用户界面。你需要监听 `routeControllerProgressDidChange`\
    \ 通知。这些通知包含 `RouteProgress` 类形式的更新位置信息，你可以用它来更新用户界面。你可以获取关于已行驶距离、剩余距离、剩余路段和步骤以及其他信息。你还可以获取关于当前路段和当前步骤进度的更细粒度信息。当前步骤的进度提供了关于下一个路口、到下一个路口的距离、用户到下一个操作的距离等信息，以及其他可用于构建用户界面的信息。\n\
    \n### 结论\n\n如果逐向导航用户体验对你的应用有所帮助，那么使用 Mapbox 预构建的组件可以非常轻松地实现。与在其他方向 API 之上构建你自己的解决方案相比，你可以为用户提供更简单的体验，并且在你的应用中维护更少的代码。\n\
    \n在第 15 章中，我们将探讨 Mapbox 的离线地图功能——这是 Mapbox 提供而其他地图 SDK 无法复制的技术解决方案之一。\n\n# 15.\
    \ 使用 Mapbox 离线地图\n\n许多移动应用程序需要在蜂窝网络覆盖不佳或没有覆盖的区域工作。作为一名开发者，如果你想提供地图功能，有几种方法可以实现，但最好的方法是使用一个既支持在线也支持离线使用的地图框架。适用于\
    \ iOS 的 Mapbox SDK 提供了下载离线地图图块并将其存储在用户手机上以供日后在地图视图中使用的功能。我曾使用此离线功能为新疆西哥山脉创建了一款徒步应用，并为在公路旅行中使用\
    \ iPad 的儿童提供地图。\n\n在本章中，我们将使用 Mapbox 地图的离线包技术下载地图的一个区域以供离线使用。然后，你可以尝试将手机设置为飞行模式，以查看应用如何处理离线图块。\n\
    \n与其他地图 API 一样，请查看离线地图图块的价格，并确保它符合你的使用场景。\n\n## 设置你的应用程序项目\n\n本项目基于第 11 章中 Mapbox\
    \ 的基础知识，包括设置项目和获取访问令牌。在 Xcode 中创建一个新项目，命名为 `OfflineMapsApp`。如果你愿意，也可以重用第 11 章中的\
    \ `FirstMapboxApp` 项目。\n\n该项目将是一个使用 Swift 和故事板的单视图应用程序（Single View Application），与我们之前的所有项目类似。\n\
    \n在你的项目目录中运行 `pod init` 以生成 `Podfile`。将 Mapbox SDK 添加到你的 CocoaPods 文件中，如代码清单 15-1\
    \ 所示。\n\n```ruby\ntarget 'OfflineMapsApp' do\n  use_frameworks!\n  # Pods for\
    \ OfflineMapsApp\n  pod 'Mapbox-iOS-SDK', '~> 5.8'\nend\n```\n\n*代码清单 15-1 — 离线地图应用的\
    \ Podfile*\n\n现在运行 `pod install` 来为你的项目设置 Mapbox SDK。从现在开始，请使用 Xcode 打开工作区文件，而不是项目文件。\n\
    \n将你的 Mapbox 访问令牌作为 `MGLMapboxAccessToken` 条目添加到 `Info.plist` 文件中。同时，向视图控制器添加一个\
    \ Mapbox 地图视图。在视图控制器中创建一个名为 `mapView` 的插座变量。你还应该在视图控制器类的顶部导入 `Mapbox` 框架。\n\n\
    所有这些在第 11 章中都有更详细的介绍，因此如果你想查看这些步骤的更具体说明，请先按照那一章进行操作。\n"
- fmt: "# Understanding offline map downloading\n\nMost map engines, whether on Web\
    \ or mobile, will cache downloaded map tiles to provide better performance or\
    \ to reduce bandwidth costs. For instance, with the Mapbox SDK for iOS, that cache\
    \ will contain up to 50 megabytes of tiles or style information. Mapbox goes one\
    \ step beyond this and lets you as a developer create an offline pack of map tiles,\
    \ represented by the `MGLOfflinePack` class. Your app downloads map tiles from\
    \ Mapbox based on the geographic coordinates and zoom level you choose. This combination\
    \ is known as the region and can be used with the protocol `MGLOfflineRegion`.\
    \ The only implementation of this protocol is in the `MGLTilePyramidOfflineRegion`\
    \ class.\n\nWhile the map tiles download, your app can process status updates,\
    \ so you know what the progress of the download is and when it is complete. Mapbox\
    \ will fire off several notifications to observe. The offline pack is the `userInfo`\
    \ variable on the notification. Each offline pack has an associated `progress`\
    \ variable, which contains an `MGLOfflinePackProgress` structure. On this structure,\
    \ you can get the number of resources downloaded, bytes downloaded, tiles downloaded,\
    \ and a minimum and maximum number of resources left to download. This way, you\
    \ can provide the user with a progress bar, a spinner with a progress message,\
    \ or something else to inform them of the download.\n\n## Estimating the number\
    \ of tiles used\n\nWhen creating your application, be very mindful of the maximum\
    \ number of tiles you will let a user download, especially if you create a mass-market\
    \ application and provide the application for free. Mapbox will allow you to download\
    \ up to 6000 map tiles per user as its default, but you can override that setting\
    \ and download more.\n\nIf you don’t have a good idea about how many tiles to\
    \ provide for your users, try the Mapbox offline tile count estimator tool (Figure\
    \ [15-1](#485790_1_En_15_Chapter.xhtml#Fig1)) at [`https://docs.mapbox.com/playground/offline-estimator/`](https://docs.mapbox.com/playground/offline-estimator/).\n\
    \n![../images/485790_1_En_15_Chapter/485790_1_En_15_Fig1_HTML.jpg](images/485790_1_En_15_Chapter/485790_1_En_15_Fig1_HTML.jpg)\n\
    \nFigure 15-1\n\nMapbox offline tile count estimator\n\nBecause Mapbox uses vector\
    \ tiles, you can have your apps zoom to levels below the max zoom setting that\
    \ you download, for instance, you could download offline map tiles for this region\
    \ of Central Texas, from a minimum zoom of 5 to a maximum zoom of 12.\n\nYour\
    \ map could still zoom in further to zoom level 13 or 14; it would just be missing\
    \ any additional details at those levels. The maximum zoom level for Mapbox vector\
    \ tiles is 16, so you can’t request tiles beyond that level.\n\n## Downloading\
    \ an offline map pack\n\nThe first step to download an offline map pack is to\
    \ define the geographic bounds for the area. This could be a defined area, with\
    \ northeast and southwest corners, or you could just use the bounds of the map\
    \ currently displayed in the map view.\n\nTo create your own bounds, create a\
    \ function in your `ViewController` class from the code in Listing [15-2](#485790_1_En_15_Chapter.xhtml#PC2)\
    \ – these coordinates define an area in Central Texas, the same ones we used for\
    \ the offline map tile estimator.\n\n```\nfunc createOfflineRegionBounds() ->\
    \ MGLCoordinateBounds {\n    let southwest = CLLocationCoordinate2D(\n       \
    \ latitude: 28.822,\n        longitude: -99.5934)\n    let northeast = CLLocationCoordinate2D(\n\
    \        latitude: 30.8611,\n        longitude: -96.6051)\n    return MGLCoordinateBounds(sw:\
    \ southwest,\n                               ne: northeast)\n}\n```\n\nListing\
    \ 15-2  \nCreating offline region bounds\n\nThe preceding method returns an `MGLCoordinateBounds`\
    \ structure. You can also call `mapView.visibleCoordinateBounds` to get the bounds\
    \ for the map displaying in the map view. You might know that your application\
