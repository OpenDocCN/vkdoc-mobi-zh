    # 在标注视图上设置图像


    你的一些地图应用想法使用内置的大头针或标记标注视图类可能就足够了。然而，你很可能需要使用 `MKAnnotationView` 类，以便设置你自己的图像。


    我们将略微修改代码，为狗狗公园创建标注视图。复用标识符将是 `“DogPark”`，并且在我们的 iOS 应用资源中，还会有一张狗狗在公园里的图像。这张图像也将被命名为
    `“DogPark”`。你需要下载自己的图像并将其放入 Xcode 项目的资源中，这样你才有内容可以显示。


    在 `viewDidLoad()` 函数中，添加以下代码：


    ```

    mapView.register(MKAnnotationView.self, forAnnotationViewWithReuseIdentifier:
    "DogPark")

    ```


    接下来，修改 `viewFor()` 函数的内容。这段代码已被简化，因为我们不再需要向下转换出队的标注视图。我们也可以简单地从这个函数返回可选值。我们做的唯一其他修改是在标注视图上设置
    `UIImage`，而不是更改大头针的色调颜色。完整的更改如代码清单 3-6 所示。


    ```

    func mapView(_ mapView: MKMapView,

    viewFor annotation: MKAnnotation)

    -> MKAnnotationView? {

    if annotation is MKUserLocation {

    return nil

    }

    let reuseId = "DogPark"

    let view = mapView.dequeueReusableAnnotationView(

    withIdentifier: reuseId)

    view?.annotation = annotation

    view?.image = UIImage(named:"DogPark")

    return view

    }

    代码清单 3-6 在标注视图上使用图像

    ```


    在你用代码清单 3-6 替换掉将可复用大头针标注视图出队的代码后，运行项目。你将看到狗狗公园的图像代替了你的大头针。


    # 为标注使用标注弹窗


    为你的标注使用了自定义图像后，很可能当用户点击你的标注时，你希望显示一个标注弹窗。`MKAnnotationView` 的 `canShowCallout`
    属性控制是否显示该弹窗。在为标注创建视图时，添加以下一行代码：


    ```

    view?.canShowCallout = true

    ```


    然后运行你的应用程序。点击一个标注后，你将看到一个弹出窗口，其中显示你设置的标题和副标题，如图 3-2 所示。


    ![../images/485790_1_En_3_Chapter/485790_1_En_3_Fig2_HTML.jpg](img/485790_1_En_3_Fig2_HTML.jpg)


    图 3-2 为标注使用图像和标注弹窗


    如你所见，在地图上显示标注的方式是极其可定制的。尝试根据某个数据点为每个标注更换不同的图像，或者尝试将其中一些显示为图像，另一些显示为大头针。


    # 总结


    在本章中，我们以第 1 章的地图基础知识为基础，定制了地图上显示的标记。我们了解了如何使用可复用的标注视图来提高包含大量标记的地图的性能。


    在下一章中，我们将讨论如何使用 Apple 的本地搜索功能，从其数据库中为你的地图提供兴趣点。


    # 搜索兴趣点


    Apple 拥有自己的地点和地址数据库，你可以将其用于你的 iOS 应用程序。你的代码可以调用 `MKLocalSearch` 类的实例来获取兴趣点，然后你可以将它们显示在地图视图上。这使得根据地图当前显示的地理区域实现搜索功能变得很容易。


    在 Xcode 中使用“单视图应用程序”模板创建一个新的 Swift iOS 项目。将你的应用程序命名为 `SearchingForPointsOfInterest`。继续在故事板中为唯一的屏幕添加一个地图视图，并将其连接到
    `ViewController` 类上一个名为 `mapView` 的插座。如果尚未导入，请同样导入 `MapKit` 框架。这些是我们在前几章中遵循的步骤，因此应该相当简单。


    ## 本地搜索入门


    苹果为 MapKit 提供的本地搜索功能并非一个可以通过 HTTP 请求调用的 Web API，这与你在应用程序中可能使用的其他集成不同。苹果提供了两个辅助类——`MKLocalSearch`
    和 `MKLocalSearch.Request`——来处理本地搜索。使用 `MKLocalSearch.Request` 实例来定义搜索内容，然后使用 `MKLocalSearch`
    来执行请求并返回结果。


    第一步是构建搜索请求：


    ```

    let searchRequest = MKLocalSearch.Request()

    ```


    搜索请求对象有四个不同的属性，你可以用它们来过滤结果：


    - `naturalLanguageQuery` – 这是服务将用来查找结果的一个词或短语，例如 `“公园”` 或 `“艺术博物馆”`。

    - `region` – 这是一个地图区域，通常是当前屏幕上的地图区域——可用于将搜索结果限制在一个地理位置内。

    - `pointOfInterestFilter` – 仅显示与 `MKPointOfInterestCategory` 结构体中一个或多个不同类别匹配的兴趣点。例如，海滩、餐馆和商店都是不同的类别。

    - `resultTypes` – 本地搜索可以返回地址、兴趣点，或者两者都返回。


    并非所有这些属性都需要设置才能使用本地搜索——通常你的地图应用会使用 `naturalLanguageQuery` 和 `region`。如果你没有设置区域，本地搜索将使用设备的位置进行搜索。你不需要请求位置权限就能使用本地搜索。


    如果我们在搜索请求上设置了自然语言查询，代码将如下所示：


    ```

    searchRequest.naturalLanguageQuery = "coffee"

    ```


    搜索请求对象描述了我们想要进行的搜索——`MKLocalSearch` 对象将执行搜索。运行搜索有两个步骤——使用搜索请求对象创建 `MKLocalSearch`
    实例，然后在本地搜索上调用 `start` 方法。代码清单 4-1 包含了这些步骤的示例。


    使用我们之前创建的 `MKLocalSearch.Request` 对象，初始化一个 `MKLocalSearch` 实例看起来像这样：


    ```

    let search = MKLocalSearch(request: searchRequest)

    ```


    `start` 方法接受一个完成处理程序作为其唯一参数。该完成处理程序将在你的 iOS 应用程序的主线程上运行，并带有两个可选参数——一个 `MKLocalSearch.Response`
    类型的响应和一个 `Error` 类型的错误。


    响应将包含一个 `MKMapItem` 地图项数组，其中包含搜索结果，以及一个包含所有结果的地图区域。如果你想显示所有结果，你可以将屏幕上的地图视图设置为新的区域；或者，如果你有另一种搜索结果展示方式（例如列表），你可以让用户自己滚动查找结果。


    ```

    let searchRequest = MKLocalSearch.Request()

    searchRequest.naturalLanguageQuery = "coffee"

    let search = MKLocalSearch(request: searchRequest)

    search.start { (response, error) in

    guard let response = response else {

    print("搜索时出错 - 无响应")

    if let error = error {

    print("错误: \(error.localizedDescription)")

    } else {

    print("未指定错误")

    }

    return

    }

    for mapItem in response.mapItems {

    print(mapItem.name ?? "未指定名称")

    }

    }

    代码清单 4-1 使用 MKLocalSearch 搜索兴趣点

    ```


    使用 `guard let` 检查回调中是否提供了响应，这允许你向用户显示错误信息。对于此代码，结果将在调试控制台中看到，但你也可以向用户显示一条警告消息。

