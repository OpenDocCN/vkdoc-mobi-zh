    button, as shown in Figure [7-4](#485790_1_En_7_Chapter.xhtml#Fig4), and then
    choose API key from the drop-down menu that appears.


    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig4_HTML.jpg](images/485790_1_En_7_Chapter/485790_1_En_7_Fig4_HTML.jpg)


    Figure 7-4


    Create Credentials for Google Maps Project


    The portal will create a new API Key for you, as seen in Figure [7-5](#485790_1_En_7_Chapter.xhtml#Fig5).
    You will have access to this key in the future, so you do not need to save it
    right away. What you do need to do is to restrict usage of this key to just your
    application. This will keep others from using your API key in their projects,
    which would affect your billing.


    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig5_HTML.jpg](images/485790_1_En_7_Chapter/485790_1_En_7_Fig5_HTML.jpg)


    Figure 7-5


    The Google Maps API Key creation dialog box


    Choose the RESTRICT KEY button on the dialog box in Figure [7-5](#485790_1_En_7_Chapter.xhtml#Fig5).
    The Restrictions page appears (Figure [7-6](#485790_1_En_7_Chapter.xhtml#Fig6)),
    with several selections to choose from. Restrict this key to iOS apps. Add an
    iOS bundle identifier for your application. For this project, the bundle identifier
    would be `com.buildingmobileapps.GoogleMapsApp`. Your bundle identifier may be
    different based on your organization.


    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig6_HTML.jpg](images/485790_1_En_7_Chapter/485790_1_En_7_Fig6_HTML.jpg)


    Figure 7-6


    Restrict the use of a Google Maps API Key


    Be sure to press the DONE button after adding your bundle identifier and then
    the Save button to persist your changes. After saving, you should see that restriction
    appear next to your iOS key, as in Figure [7-7](#485790_1_En_7_Chapter.xhtml#Fig7).


    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig7_HTML.jpg](images/485790_1_En_7_Chapter/485790_1_En_7_Fig7_HTML.jpg)


    Figure 7-7


    Restricted iOS Maps Key'
  trans: '

    # 安装 iOS 版 Google Maps SDK 库


    在 Xcode 中新建一个名为 `GoogleMapsApp` 的 iOS 项目，类型选择带 storyboard 和 Swift 的单视图应用程序——与我们目前的其他项目类似。


    iOS 版 Google Maps 有两种安装方式。一种是按照 Google Maps 安装页面（`https://developers.google.com/maps/documentation/ios-sdk/start#step_2_install_the_sdk`）上的分步指南进行手动安装。这种方式相当繁琐，通常仅在您无法使用第二种方式（即使用
    CocoaPods 依赖管理器）时才值得尝试。


    CocoaPods 是 iOS 应用程序的依赖管理器，类似于 Mac 上的 Homebrew 或 JavaScript 的 Node Package Manager（NPM）。CocoaPods
    允许您声明应用程序使用的库及其版本，然后自动下载并安装这些库，无需手动将库下载到 Xcode 项目并进行添加。这使得框架升级更加容易，并有助于避免某些库之间不兼容的问题。


    如果您的系统尚未安装 CocoaPods，它以 Ruby gem 的形式分发。您需要使用以下命令在 Mac 上安装 CocoaPods：


    ```

    sudo gem install cocoapods

    ```


    接下来，使用命令行导航到包含新 Xcode 项目的目录。


    在该目录中，键入以下命令以创建 CocoaPods `Podfile`。Podfile 包含项目的依赖项：


    ```

    pod init

    ```


    现在查看该目录，并打开 `pod init` 刚刚创建的 `Podfile`。其内容应类似于清单 7-1。


    ```

    # 取消注释下一行以定义项目的全局平台

    # platform :ios, ''9.0''

    target ''GoogleMapsApp'' do

    # 如果不想使用动态框架，请注释下一行

    use_frameworks!

    # GoogleMapsApp 的 Pods

    end

    ```


    清单 7-1

    Google Maps 应用程序的新 CocoaPods Podfile


    到目前为止，这些内容与 Google Maps 毫无关系。我们将把 `GoogleMaps` 库作为依赖项添加到 `Podfile` 中。在 `# GoogleMapsApp
    的 Pods` 行下方，添加 `GoogleMaps` pod。添加后，您的 `Podfile` 文件应类似于清单 7-2。


    ```

    target ''GoogleMapsApp'' do

    # 如果不想使用动态框架，请注释下一行

    use_frameworks!

    # GoogleMapsApp 的 Pods

    pod ''GoogleMaps''

    end

    ```


    清单 7-2

    包含 GoogleMaps 依赖项的 CocoaPods Podfile


    现在依赖项已就位，CocoaPods 可以为我们下载最新版本的 Google Maps SDK，并将其配置到我们的 iOS 应用程序中。


    在您运行 `pod init` 的同一目录中，从命令行运行以下命令：


    ```

    pod install

    ```


    CocoaPods 将安装 GoogleMaps 依赖项，同时还会为您的应用程序创建一个 Xcode workspace。这个 workspace 将包含两个
    target——一个用于您的应用程序，另一个用于下载的依赖项（称为 pods）。现在您需要打开 `GoogleMapsApp.xcworkspace`，而不是
    `GoogleMapsApp.xcodeproj`，来构建您的应用程序。


    使用 CocoaPods，您可以通过语义化版本控制将 Google Maps 的版本固定到特定版本（在撰写本文时为 3.7.0）。有关如何使用 CocoaPods
    和 Podfile 的更多信息，请参阅 `https://cocoapods.org/` 上的 CocoaPods 文档。


    继续在 Xcode 中打开该 workspace。尝试在模拟器或您的设备上运行 iOS 应用程序（`GoogleMapsApp`）。您将只会看到一个空白的白色屏幕，但如果存在任何编译错误或其他问题，现在是调试它们的好时机。下一步，我们将设置
    Google Maps API 密钥，以便开始使用 Google 的地图、路线和地点服务。


    # 设置 Google Maps API 密钥


    在进一步操作之前，您需要一个 Google Maps API 密钥。请访问 `https://cloud.google.com/maps-platform`
    注册。


    当您启用 Google Maps Platform 时，请勾选 Maps 的复选框，如图 7-1 所示。


    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig1_HTML.jpg](img/485790_1_En_7_Fig1_HTML.jpg)


    图 7-1

    启用 Google Maps Platform 并选择产品


    点击“继续”。在下一个屏幕（图 7-2）中，创建一个名为“First Maps Project”的新项目。


    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig2_HTML.jpg](img/485790_1_En_7_Fig2_HTML.jpg)


    图 7-2

    为 Google Cloud 创建新项目


    您还需要为 Google Maps 设置一个结算账户，并关联一张信用卡，以便 Google 对超出免费配额的用量进行收费。


    完成此过程后，Google 将询问您是否要为您的项目启用 Google Maps Platform，如图 7-3 所示。请继续点击“下一步”。


    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig3_HTML.jpg](img/485790_1_En_7_Fig3_HTML.jpg)


    图 7-3

    启用 Google Maps Platform API


    您需要启用 iOS 版 Maps SDK——通过同一界面还可使用其他平台和服务。


    如果在获取 Maps SDK 的 API 密钥时遇到问题，Google 网站上有其他指导说明：`https://developers.google.com/maps/documentation/ios-sdk/get-api-key`。


    最后，您需要创建一个 API 密钥。在 Web 界面的“API”部分下，找到“iOS 版 Maps SDK”。选择“凭据”选项卡，然后点击“API 和服务”中的“凭据”链接。在该屏幕上，选择“创建凭据”按钮，如图
    7-4 所示，然后从出现的下拉菜单中选择“API 密钥”。


    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig4_HTML.jpg](img/485790_1_En_7_Fig4_HTML.jpg)


    图 7-4

    为 Google Maps 项目创建凭据


    门户网站将为您创建一个新的 API 密钥，如图 7-5 所示。将来您仍可访问此密钥，因此无需立即保存。您需要做的是限制此密钥仅用于您的应用程序。这可以防止他人在其项目中使用您的
    API 密钥，从而影响您的结算。


    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig5_HTML.jpg](img/485790_1_En_7_Fig5_HTML.jpg)


    图 7-5

    Google Maps API 密钥创建对话框


    点击图 7-5 对话框中的“限制密钥”按钮。将出现“限制”页面（图 7-6），其中有多种选择可供挑选。将此密钥限制为仅用于 iOS 应用。为您的应用程序添加一个
    iOS 包标识符。对于此项目，包标识符应为 `com.buildingmobileapps.GoogleMapsApp`。根据您的组织，您的包标识符可能不同。


    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig6_HTML.jpg](img/485790_1_En_7_Fig6_HTML.jpg)


    图 7-6

    限制 Google Maps API 密钥的使用


    添加完包标识符后，务必按下“完成”按钮，然后点击“保存”按钮以持久保存更改。保存后，您应该会看到该限制显示在您的 iOS 密钥旁边，如图 7-7 所示。


    ![../images/485790_1_En_7_Chapter/485790_1_En_7_Fig7_HTML.jpg](img/485790_1_En_7_Fig7_HTML.jpg)


    图 7-7

    受限制的 iOS 地图密钥

