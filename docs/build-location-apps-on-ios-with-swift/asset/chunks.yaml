    # 使用离线地图磁贴的注意事项


    当您设置应用程序使用离线地图磁贴时，需要考虑几个限制。首先是定价。确保您了解每个用户将下载多少磁贴，以及这如何符合您的预算。使用这个数字来驱动最大缩放级别或地图区域的最大尺寸。同时还要考虑用户执行下载需要多长时间。如果在下载地图磁贴时阻止用户继续使用应用程序，请提供进度条或其他用户界面。如果地图磁贴数量很大，请告知用户他们应该在可以访问无线以太网时自行启动此过程，除非他们愿意承担运营商的高额带宽费用。


    Mapbox 对用户可以下载的地图磁贴数量提供了一些软限制。目前，所有下载区域的地图磁贴总数限制为 6000 个，但您可以通过调用 `MGLOfflineStorage`
    类上的 `setMaximumAllowedMapboxTiles` 方法来自行提高此限制。一旦您触及内置限制或您自己设置的限制，Mapbox SDK 将发布
    `MGLOfflinePackMaximumMapboxTilesReached` 通知。您可以像监听离线地图磁贴下载进度一样来监听此通知。如果达到限制，您的应用程序将需要删除现有的离线地图包，才能继续将地图磁贴下载到新包中。


    最后，Mapbox 不允许从应用程序重新分发离线地图磁贴（例如，分发到其他用户手机上的另一个应用程序副本），因此请阅读服务条款，以确保您的应用程序整体设计能与
    Mapbox 的解决方案兼容。

