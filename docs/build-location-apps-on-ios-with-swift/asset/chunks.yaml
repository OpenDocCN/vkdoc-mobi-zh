- fmt: '# Detecting a Tap on the Features


    To do something when a user taps on the map, we need to add a standard `UIKit`
    tap gesture recognizer to the map view. The `MGLMapView` class already has several
    tap recognizers that it uses to detect user input for map operations like scrolling
    and zooming. We need to add a tap gesture recognizer, and only have it do something
    if the built-in tap gesture recognizers do not handle the tap. This is a common
    pattern for Mapbox map views and not limited to the use case of detecting taps
    for data features.


    Add the method in Listing [13-2](#485790_1_En_13_Chapter.xhtml#PC5) to your `ViewController`
    class, and then call the `addGestureRecognizer()` function from the view controller’s
    `viewDidLoad()` method.


    ```

    func addGestureRecognizer() {

    let tapGR = UITapGestureRecognizer(target: self,

    action: #selector(mapTapped(sender:)))

    for recognizer in mapView.gestureRecognizers!

    where recognizer is UITapGestureRecognizer {

    tapGR.require(toFail: recognizer)

    }

    mapView.addGestureRecognizer(tapGR)

    }

    Listing 13-2

    Adding a tap gesture recognizer to the map view

    ```


    The tap gesture recognizer will call a method named `mapTapped(sender:)` that
    we also need to implement. When the map is tapped, we will ask the map view to
    identify any features at that point, and then we will list them to the console.
    You can also ask the map view to only show you features in a certain layer or
    layers, if you want.


    The `mapTapped(sender:)` method will need an `@objc` annotation for the selector
    to work. The implementation of this method will look like Listing [13-3](#485790_1_En_13_Chapter.xhtml#PC6).


    ```

    @objc func mapTapped(sender: UITapGestureRecognizer) {

    let mapPoint = sender.location(in: mapView)

    let features = mapView.visibleFeatures(at: mapPoint)

    print(features)

    }

    Listing 13-3

    Looking up visible map features when a user taps the app

    ```


    Add the preceding method to the app, and then run the app. Be sure to add a call
    to `addGestureRecognizer()` in your `viewDidLoad()` method as well. When you tap
    on one of the earthquake circles, you will see the properties of the feature output
    on the console in Xcode.


    # Conclusion


    This is the simplest possible implementation here – we could easily extend this
    out to update labels in an in-app UI (such as a bottom toolbar) with information
    about the data point, for instance. The earthquake data features returned by the
    map would be `MGLPointFeature` objects. If we had uploaded GeoJSON data with polylines
    or polygons, those would have been other classes that implement the `MGLFeature`
    protocol, such as `MGLPolylineFeature` or `MGLPolygonFeature`.


    This was a fairly involved project, but I hope you enjoyed working with some real
    data and building out a visualization using the Mapbox Studio.


    In our next chapter, we step away from Mapbox Studio and turn our attention to
    providing driving directions with Mapbox. We will create an app that provides
    a turn-by-turn directions user experience with the Mapbox Navigation framework.


    # Turn-by-Turn Navigation with Mapbox


    In addition to the Mapbox mapping SDK for iOS, Mapbox offers a turn-by-turn navigation
    user interface SDK for iOS as well. Typically, this style of navigation would
    be used for an app that provides built-in driving directions, such as a rideshare
    service or a package delivery service.


    We will build a simple navigation app in this chapter that routes from the user’s
    current location to a destination. We will use the standard turn-by-turn user
    interface that Mapbox provides, known as the Mapbox Navigation framework. If you
    would like to build your own user interface, you can use the Mapbox Core Navigation
    framework to power that user interface with route updates. The Mapbox Navigation
    framework is built on top of the Mapbox Core Navigation framework.


    In either case, your application uses the Mapbox Directions API to create routes
    between origins and destinations. As with other Mapbox APIs, check the pricing
    for the Directions API before building it into your application, to make sure
    that you understand how the free tier and tiered pricing works.


    ## Setting Up Your App Project


    Before we can dive into the Mapbox Navigation framework, we will need to create
    a new iOS application project, set it up with CocoaPods, and then add some capabilities
    and `Info.plist` entries.


    Start by creating a new iOS Single View Application in Xcode. Name the app `MapboxNavigationApp`.
    Choose the same defaults as we have used in previous projects, to use storyboard/UIKit
    and Swift.


    ### Setting Up CocoaPods


    Once you generate the iOS application, close the project in Xcode, and open the
    command line in the same directory as the project. We will initialize CocoaPods
    for this project and then edit the `Podfile` to include the Mapbox Navigation
    framework. Generate a `Podfile` with the following command:


    ```

    pod init

    ```


    Once you create a `Podfile`, open it up in a text editor, and include the Mapbox
    Navigation framework as a dependency. Your complete `Podfile` should look like
    Listing [14-1](#485790_1_En_14_Chapter.xhtml#PC2).


    ```

    target ''MapboxNavigationApp'' do

    # Comment the next line if you don''t want to use dynamic frameworks

    use_frameworks!

    # Pods for MapboxNavigationApp

    pod ''MapboxNavigation'', ''~> 0.39.0''

    end

    Listing 14-1

    Podfile for app that uses the Mapbox Navigation framework

    ```


    Close the text editor and save the `Podfile`. Then from the command line, install
    the dependencies with the following command:


    ```

    pod install

    ```


    After you install the CocoaPods, you need to open the `MapboxNavigationApp.xcworkspace`
    workspace in Xcode, not the Xcode project.


    ### Adding Entries to Info.plist


    The next step that we need to do to use the Mapbox SDK is to add two entries to
    the `Info.plist` file in your Xcode workspace. Open up that file, and add these
    two properties:


    - `MGLMapboxAccessToken`

    - `Privacy` - Location When In Use Usage Description


    The access token entry can be the same access token you have already used in previous
    Mapbox chapters (see Chapter [11](#485790_1_En_11_Chapter.xhtml) for instructions).
    The location usage description will appear to the user the first time the app
    accesses their location. A sample description might be “This app will use your
    location to provide in-app navigation and to improve the map”.


    This takes care of the `Info.plist` file settings. We also need to add capabilities
    to the application so that the app works in background mode.


    ### Adding Required Capabilities


    The Mapbox Navigation framework requires two different background mode capabilities.
    If you don’t set the background audio mode, the app will crash immediately and
    tell you to add it. While you can add these background modes through the `Info.plist`
    file, you can also add them as capabilities through the Xcode project.


    Select the `MapboxNavigationApp` target in Xcode, and then select the **Signing
    & Capabilities** tab. Click the **+ Capability** button to add a capability. Choose
    **Background Modes** from the list of capabilities, as shown in Figure [14-1](#485790_1_En_14_Chapter.xhtml#Fig1).


    ![../images/485790_1_En_14_Chapter/485790_1_En_14_Fig1_HTML.jpg](images/485790_1_En_14_Chapter/485790_1_En_14_Fig1_HTML.jpg)


    Figure 14-1


    Adding background mode capability to app target


    Select **Audio, Airplay, and Picture in Picture**, as well as **Location updates**
    (Figure [14-2](#485790_1_En_14_Chapter.xhtml#Fig2)).


    ![../images/485790_1_En_14_Chapter/485790_1_En_14_Fig2_HTML.jpg](images/485790_1_En_14_Chapter/485790_1_En_14_Fig2_HTML.jpg)


    Figure 14-2


    Selecting background modes for navigation


    Now we have everything set up to use the Mapbox Navigation framework. Let’s move
    on to the Mapbox Directions API.'
