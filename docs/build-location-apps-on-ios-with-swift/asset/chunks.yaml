    \ 项目进行构建，然后在第 2 章中添加了用户位置。\n\n## 理解 MapKit 和标注\n\n`MapKit` 框架区分了标注（地图上显示的数据）和标注视图（在地图上给定坐标处为标注显示的用户界面元素）。虽然\
    \ `MapKit` 提供了 `MKPointAnnotation` 类用于基本点显示，但大多数地图应用程序会使用 `MKAnnotation` 协议的自定义实现。\n\
    \n类似地，`MapKit` 也包含了 `MKPinAnnotationView` 和 `MKMarkerAnnotationView` 类，用于在应用程序上显示图钉或标记。`MKAnnotationView`\
