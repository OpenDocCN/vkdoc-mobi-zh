  trans: '

    ## 在地图上显示地点


    如果打算在地图上显示 Google 地点数据，则必须使用 Google 地图，而非 iOS 的 `MapKit` 地图或其他提供商的地图。你可以在地图之外显示地点数据，但需要显示归因网页上提供的“Powered
    by Google”图像：[`https://developers.google.com/places/ios-sdk/attributions`](https://developers.google.com/places/ios-sdk/attributions)。


    我们将以地图标记的形式，在地图上显示所选地点。首先，在你的 `ViewController` 类中添加一个名为 `addMarker` 的新函数。该函数将接受一个
    `GMSPlace` 对象作为参数，参数名为 `place`：


    ```

    func addMarker(_ place:GMSPlace) {

    }

    ```


    现在，在自动完成视图控制器委托扩展的第一个方法的末尾（即在打印地点详情之后）调用该 `addMarker` 方法：


    ```

    print(place)

    print(place.attributions ?? "No attributions")

    addMarker(place)

    ```


    我们在第 8 章中讨论了如何向 Google 地图添加地图标记。我们将使用从 Google Places API 请求的地点字段来填充标记，然后将其显示在地图上，如清单
    10-5 中的代码所示。


    ```

    func addMarker(_ place:GMSPlace) {

    let marker = GMSMarker()

    marker.position = place.coordinate

    marker.title = place.name

    marker.icon = GMSMarker.markerImage(with: .blue)

    marker.userData = place

    marker.map = mapView

    }

    清单 10-5

    在 Google 地图上显示来自 Google Places SDK 的地点

    ```


    当你运行项目时，应该会看到一张 Google 地图出现。在地图上缩放或滚动以找到你想要搜索地点的位置，然后点击“查找商家”按钮。你将看到自动完成视图控制器出现。当你选择其中一个地点时，会看到一个蓝色标记出现在地图上。点击该标记会显示来自
    Google Places API 的名称，如图 10-9 所示。


    ![../images/485790_1_En_10_Chapter/485790_1_En_10_Fig9_HTML.jpg](img/485790_1_En_10_Fig9_HTML.jpg)


    图 10-9

    在 Google 地图中展示 Google Places 地点的地图标记


    我们将 `GMSPlace` 对象放入地图标记的 `userData` 属性中，以便以后能够访问该地点的数据。例如，你可以扩展此应用程序，以便在用户点击标记时检索该地点的照片。


    ## Places SDK 中的其他功能


    Google Places SDK for iOS 中还有许多我们在本章未涉及的其他功能。我们只讨论了用于自动完成搜索的全屏视图控制器，并未涉及如何实现自定义搜索用户界面。我们也没有讨论如何根据给定的
    place ID 请求地点详情，而我们可以利用这一点从 API 获取更多数据字段。


    此外，你还可以将用户的当前位置转换为一个地点，从而告知用户他们所在的位置。利用地点照片数据字段中的信息，如果 Google Places 中存有照片，你可以检索这些照片。


    本章结束我们对 Google 地图平台及其 iOS 组件的讨论。在下一章中，我们将学习如何开始使用另一个地图提供商 Mapbox。


    # 11. 开始使用 Mapbox SDK


    在本章中，我们将在 iOS 应用中设置并使用 Mapbox 地图。Mapbox 是一个独立的地图数据提供商，为 iOS、Android 和 Web 发布软件开发工具包。Mapbox
    允许你轻松地为地图设置样式，从而为你的应用程序赋予自定义的外观和感觉。我们将在下一章中处理地图样式。


    我们在本章构建的示例应用程序，与我们使用 Apple 的 `MapKit` 和 Google 地图构建的入门应用程序类似。


    ## 获取 Mapbox 访问令牌


    你需要一个访问令牌才能使用 Mapbox 服务，因此你需要在 [`www.mapbox.com`](http://www.mapbox.com) 创建一个账户。在创建账户的同时，也花点时间了解
    Mapbox 的定价和免费层限制。在撰写本文时，你可以在免费级别下使用 Mapbox，最多支持 25,000 名月度活跃移动设备用户，超出该数量的用户则需要付费。这种情况肯定会发生变化，因此在将其集成到你的应用程序之前，请确保
    Mapbox 符合你的需求和预算。


    创建好 Mapbox 账户并查看定价后，你需要创建一个访问令牌以在 Mapbox 应用程序中使用。虽然你可以使用默认的访问令牌，但最好为你的每个 Mapbox
    项目创建独立的访问令牌，以防你需要撤销某个令牌或限制其功能。在你的 Mapbox 账户页面上找到“创建令牌”按钮（图 11-1）。


    ![../images/485790_1_En_11_Chapter/485790_1_En_11_Fig1_HTML.jpg](img/485790_1_En_11_Fig1_HTML.jpg)


    图 11-1

    “创建令牌”按钮


    点击“创建令牌”按钮，并在下一个屏幕（图 11-2）上将你的访问令牌命名为 `FirstMapboxApp`（或你选择的任何其他名称）。令牌作用域的默认设置即可。


    ![../images/485790_1_En_11_Chapter/485790_1_En_11_Fig2_HTML.jpg](img/485790_1_En_11_Fig2_HTML.jpg)


    图 11-2

    创建访问令牌


    创建你的令牌（位于“创建访问令牌”屏幕底部），然后如果 Web 应用程序提示，请确认你的密码。你将进入访问令牌列表页面。请对你的访问令牌保密，不要公开分享，例如不要将其放在源代码仓库中。在我们设置好
    Xcode 项目后，我们会将此访问令牌添加到应用程序的 `Info.plist` 文件中。


    现在我们已经拥有了访问令牌，让我们创建一个 Xcode 项目并添加 Mapbox SDK for iOS。

