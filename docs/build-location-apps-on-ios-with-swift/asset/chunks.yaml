  raw: '### Filtering results by type


    The autocomplete view controller supports different types of places for search
    results. The supported types, as well as a no filter option, are all available
    on the `GMSPlacesAutocompleteTypeFilter` enum. The options are


    *   `noFilter`


    *   `address`


    *   `city`


    *   `establishment`


    *   `geocode`


    *   `region`


    *   `city`


    To use one of these options with the autocomplete view controller, you need to
    create a `GMSAutocompleteFilter` instance and then set the filter’s `type` property.
    On the autocomplete view controller, you will need to set the `autocompleteFilter`
    property with your filter object:


    ```

    let filter = GMSAutocompleteFilter()

    filter.type = .establishment

    vc.autocompleteFilter = filter

    ```


    We used the establishment type, but you could certainly use one of the other filters.
    Try them out to see what type of results they give back in your area.


    ### Displaying the view controller


    The autocomplete view controller expects to be full screen, so you can present
    it as a modal from your view controller, as seen in Figure [10-8](#485790_1_En_10_Chapter.xhtml#Fig8):


    ![../images/485790_1_En_10_Chapter/485790_1_En_10_Fig8_HTML.jpg](images/485790_1_En_10_Chapter/485790_1_En_10_Fig8_HTML.jpg)


    Figure 10-8


    Displaying the autocomplete view controller for Google Places


    ```

    present(vc, animated: true, completion: nil)

    ```


    If you like, you could create the autocomplete view controller in one method and
    then display it from another method. For this project, we combined these two into
    one method for simplicity.


    The complete `findBusinesses()` method , with all of the preceding steps, is listed
    in Listing [10-3](#485790_1_En_10_Chapter.xhtml#PC13).


    ```

    @IBAction func findBusinesses(_ sender: Any) {

    let vc = GMSAutocompleteViewController()

    vc.delegate = self

    // search for places in this area

    let region = mapView.projection.visibleRegion()

    let bounds = GMSCoordinateBounds.init(region: region)

    vc.autocompleteBounds = bounds

    // only return results visible on the map

    vc.autocompleteBoundsMode = .restrict

    // needed for the map marker

    let fields = UInt(GMSPlaceField.name.rawValue) |

    UInt(GMSPlaceField.placeID.rawValue) |

    UInt(GMSPlaceField.coordinate.rawValue)

    guard let placeFields = GMSPlaceField(rawValue: fields) else {

    return

    }

    // only return asked for fields

    vc.placeFields = placeFields

    // we are looking for businesses/points of interest

    let filter = GMSAutocompleteFilter()

    filter.type = .establishment

    vc.autocompleteFilter = filter

    // display as modal

    present(vc, animated: true, completion: nil)

    }

    Listing 10-3

    Displaying autocomplete view controller for Google Places search

    ```


    When the user chooses a place from the list or they decide to cancel, your view
    controller will need to dismiss the autocomplete view controller. We will discuss
    that in the next section about implementing the delegate methods for the autocomplete
    search.


    ### Implementing the delegate for autocomplete


    With the `GMSAutocompleteResultsViewControllerDelegate` protocol , your application
    will get notified when certain events happen with the autocomplete view controller.
    We are going to implement several methods from this delegate as an extension to
    our `ViewController` class.


    In particular, the functions called when a user selects a place, when a user cancels
    the search request, or when an unrecoverable error occurs are required. The optional
    methods inform the delegate that an autocomplete request has been made, an autocomplete
    request has been updated, and a user has chosen a value from the list (but the
    API has not been called to get the place details yet).


    Add an extension to your `ViewController` class for the `GMSAutocompleteResultsViewControllerDelegate`
    protocol:


    ```

    extension ViewController: GMSAutocompleteViewControllerDelegate {

    }

    ```


    If you try to compile your project at this point, Xcode will inform you that the
    protocol has required methods and will offer to create stubs for the three required
    methods. You can let Xcode do that or copy the definitions from Listing [10-4](#485790_1_En_10_Chapter.xhtml#PC15).


    Let’s start by dismissing the autocomplete view controller in all three methods,
    as we see in Listing [10-4](#485790_1_En_10_Chapter.xhtml#PC15). Add these functions
    to your extension.


    ```

    func viewController(_ viewController:

    GMSAutocompleteViewController,

    didAutocompleteWith place: GMSPlace) {

    viewController.dismiss(animated: true,

    completion: nil)

    }

    func viewController(_ viewController:

    GMSAutocompleteViewController,

    didFailAutocompleteWithError error: Error) {

    viewController.dismiss(animated: true,

    completion: nil)

    }

    func wasCancelled(_ viewController:

    GMSAutocompleteViewController) {

    viewController.dismiss(animated: true,

    completion: nil)

    }

    Listing 10-4

    Implementing methods in the autocomplete view controller delegate

    ```


    Next, let’s add some functionality to the first method, when a user selects a
    place. We will print out the place details, with the fields we requested from
    the Google Places API. If there are any required third-party attributions, we
    will also print those.


    When you work with places returned from the Google Places API, some of those places
    may have attributions that you are required to display. Those come back on the
    `GMSPlace` object as the `attributions` property. For more on Google’s current
    policy for attributions, see this web page: [`https://developers.google.com/places/ios-sdk/attributions`](https://developers.google.com/places/ios-sdk/attributions).


    Our updated method will look similar to this:


    ```

    func viewController(_ viewController:

    GMSAutocompleteViewController,

    didAutocompleteWith place: GMSPlace) {

    viewController.dismiss(animated: true,

    completion: nil)

    print(place)

    print(place.attributions ?? "No attributions")

    }

    ```'
  trans: "\n### 按类型筛选结果\n\n自动完成视图控制器支持不同类型的地点搜索结果。支持的类型以及\"无筛选\"选项，均可在 `GMSPlacesAutocompleteTypeFilter`\
    \ 枚举中找到。这些选项包括：\n\n- `noFilter`\n- `address`\n- `city`\n- `establishment`\n- `geocode`\n\
    - `region`\n- `city`\n\n若要在自动完成视图控制器中使用这些选项之一，您需要创建一个 `GMSAutocompleteFilter`\
    \ 实例，然后设置该筛选器的 `type` 属性。在自动完成视图控制器上，您需要通过筛选器对象设置 `autocompleteFilter` 属性：\n\n\
    ```\nlet filter = GMSAutocompleteFilter()\nfilter.type = .establishment\nvc.autocompleteFilter\
    \ = filter\n```\n\n我们使用了 `establishment` 类型，但您当然也可以使用其他筛选器。不妨尝试一下，看看在您所在区域它们返回何种类型的结果。\n\
    \n### 显示视图控制器\n\n自动完成视图控制器需全屏显示，因此您可以像图 10-8 所示那样，以模态形式从您的视图控制器中呈现它：\n\n![../images/485790_1_En_10_Chapter/485790_1_En_10_Fig8_HTML.jpg](img/485790_1_En_10_Fig8_HTML.jpg)\n\
    \n*图 10-8：显示 Google 地点的自动完成视图控制器*\n\n```\npresent(vc, animated: true, completion:\
    \ nil)\n```\n\n如果您愿意，可以在一个方法中创建自动完成视图控制器，然后在另一个方法中显示它。在本项目中，为简单起见，我们将这两个步骤合并到了一个方法中。\n\
    \n完整的 `findBusinesses()` 方法，包含上述所有步骤，如代码清单 10-3 所示。\n\n```\n@IBAction func findBusinesses(_\
    \ sender: Any) {\n    let vc = GMSAutocompleteViewController()\n    vc.delegate\
    \ = self\n    // 在此区域搜索地点\n    let region = mapView.projection.visibleRegion()\n\
    \    let bounds = GMSCoordinateBounds.init(region: region)\n    vc.autocompleteBounds\
    \ = bounds\n    // 仅返回地图上可见的结果\n    vc.autocompleteBoundsMode = .restrict\n  \
    \  // 地图标记所需\n    let fields = UInt(GMSPlaceField.name.rawValue) |\n         \
    \        UInt(GMSPlaceField.placeID.rawValue) |\n                 UInt(GMSPlaceField.coordinate.rawValue)\n\
    \    guard let placeFields = GMSPlaceField(rawValue: fields) else {\n        return\n\
    \    }\n    // 仅返回所需的字段\n    vc.placeFields = placeFields\n    // 我们正在查找商家/兴趣点\n\
    \    let filter = GMSAutocompleteFilter()\n    filter.type = .establishment\n\
    \    vc.autocompleteFilter = filter\n    // 以模态形式显示\n    present(vc, animated:\
    \ true, completion: nil)\n}\n```\n\n*代码清单 10-3：显示用于 Google 地点搜索的自动完成视图控制器*\n\n\
    当用户从列表中选择一个地点或决定取消时，您的视图控制器需要关闭自动完成视图控制器。我们将在下一节关于实现自动完成搜索的委托方法中讨论这一点。\n\n###\
    \ 为自动完成实现委托\n\n通过 `GMSAutocompleteResultsViewControllerDelegate` 协议，当自动完成视图控制器发生某些事件时，您的应用程序会收到通知。我们将以\
    \ `ViewController` 类的扩展形式，实现该委托中的几个方法。\n\n具体来说，用户选择地点、用户取消搜索请求或发生不可恢复错误时调用的函数是必需的。可选方法则用于通知委托：自动完成请求已发出、自动完成请求已更新、以及用户已从列表中选择了一个值（但尚未调用\
    \ API 获取地点详细信息）。\n\n为您的 `ViewController` 类添加一个遵循 `GMSAutocompleteResultsViewControllerDelegate`\
    \ 协议的扩展：\n\n```\nextension ViewController: GMSAutocompleteViewControllerDelegate\
    \ {\n}\n```\n\n如果您此时尝试编译项目，Xcode 会提示该协议有必需的方法，并会为您创建这三个必需方法的存根。您可以让 Xcode 自动完成，或者从代码清单\
    \ 10-4 中复制定义。\n\n如代码清单 10-4 所示，我们先在所有三个方法中关闭自动完成视图控制器。将这些函数添加到您的扩展中。\n\n```\n\
    func viewController(_ viewController: GMSAutocompleteViewController,\n       \
    \             didAutocompleteWith place: GMSPlace) {\n    viewController.dismiss(animated:\
    \ true, completion: nil)\n}\n\nfunc viewController(_ viewController: GMSAutocompleteViewController,\n\
    \                    didFailAutocompleteWithError error: Error) {\n    viewController.dismiss(animated:\
    \ true, completion: nil)\n}\n\nfunc wasCancelled(_ viewController: GMSAutocompleteViewController)\
    \ {\n    viewController.dismiss(animated: true, completion: nil)\n}\n```\n\n*代码清单\
    \ 10-4：在自动完成视图控制器委托中实现方法*\n\n接下来，让我们为第一个方法（当用户选择一个地点时）添加一些功能。我们将打印出地点详情，以及我们从\
    \ Google Places API 请求的字段。如果存在任何必需的第三方属性，我们也会将其打印出来。\n\n当您处理从 Google Places API\
    \ 返回的地点时，其中一些地点可能包含您必须显示的属性信息。这些属性会以 `attributions` 属性的形式出现在 `GMSPlace` 对象上。有关\
    \ Google 当前属性政策的更多信息，请参阅此网页：[`https://developers.google.com/places/ios-sdk/attributions`](https://developers.google.com/places/ios-sdk/attributions)。\n\
    \n我们更新后的方法将类似于这样：\n\n```\nfunc viewController(_ viewController: GMSAutocompleteViewController,\n\
    \                    didAutocompleteWith place: GMSPlace) {\n    viewController.dismiss(animated:\
    \ true, completion: nil)\n    print(place)\n    print(place.attributions ?? \"\
    No attributions\")\n}\n```\n"
- fmt: '## Displaying the place on the map


    If you are going to display Google Places data on a map, it must be a Google map,
    not an iOS `MapKit` map or a map from another provider. You can display places
    data outside of a map, but you need to display the Powered by Google image found
    at the attributions web page: [`https://developers.google.com/places/ios-sdk/attributions`](https://developers.google.com/places/ios-sdk/attributions).


    We are going to display the selected place on the map as a map marker. Start by
    adding a new function to your `ViewController` class named `addMarker`. This function
    will take a `GMSPlace` object as an argument named `place`:


    ```

    func addMarker(_ place:GMSPlace) {

    }

    ```


    Now call that `addMarker` method at the end of the first method in the autocomplete
    view controller delegate extension, after printing out the place details:


    ```

    print(place)

    print(place.attributions ?? "No attributions")

    addMarker(place)

    ```


    We discussed how to add map markers to Google Maps in Chapter [8](#485790_1_En_8_Chapter.xhtml).
    We’ll use the place fields we requested from the Google Places API to populate
    the marker and then display it on the map, as you can see with the code in Listing
    [10-5](#485790_1_En_10_Chapter.xhtml#PC19).


    ```

    func addMarker(_ place:GMSPlace) {

    let marker = GMSMarker()

    marker.position = place.coordinate

    marker.title = place.name

    marker.icon = GMSMarker.markerImage(with: .blue)

    marker.userData = place

    marker.map = mapView

    }

    Listing 10-5

    Displaying a place from the Google Places SDK on a Google map

    ```


    When you run the project, you should see a Google map appear. Zoom or scroll on
    the map to find the location you want to search for places, and then tap the Find
    Businesses button. You will see the autocomplete view controller appear. When
    you select one of those places, you will see a blue marker appear on the map.
    Tapping the marker makes the name from the Google Places API appear, as you can
    see in Figure [10-9](#485790_1_En_10_Chapter.xhtml#Fig9).


    ![../images/485790_1_En_10_Chapter/485790_1_En_10_Fig9_HTML.jpg](images/485790_1_En_10_Chapter/485790_1_En_10_Fig9_HTML.jpg)


    Figure 10-9


    Showing a map marker in Google maps for a Google Places place


    We put the `GMSPlace` object into the `userData` property on the map marker so
    that we could have access to the data in the place later. For instance, you could
    extend this application to retrieve photos for the place when a user taps on the
    marker.


    ## Additional functionality in Places SDK


    There is a lot of additional functionality in the Google Places SDK for iOS that
    we did not cover in this chapter. We only discussed the full-screen view controller
    for autocomplete search and not how to implement a custom user interface for search.
    We also did not cover how to request place details for a given place id, which
    we could use to get more data fields from the API.


    In addition, you can also translate the user’s current location into a place,
    letting you tell the user where they are. With the information in the photos data
    field for a place, you can retrieve photos, if there are any in Google Places.


    This chapter concludes our discussion of Google’s Map Platform and its components
    for iOS. In the next chapter, we will learn how to get started with Mapbox, another
    mapping provider.


    # 11. Getting Started with the Mapbox SDK


    In this chapter, we will set up and use Mapbox maps in an iOS app. Mapbox is an
    independent mapping data provider that publishes software development kits for
    iOS, Android, and the Web. Mapbox allows you to easily style your maps, so that
    you can give your application a custom look and feel. We will work with map styles
    in the next chapter.


    The example application we build in this chapter is similar to the introductory
    applications we built with Apple’s `MapKit` and Google Maps.


    ## Getting a Mapbox access token


    You will need an access token to use Mapbox services, so you will need to create
    an account at [`www.mapbox.com`](http://www.mapbox.com). While you are creating
    an account, also take some time to understand Mapbox’s pricing and free tier limits.
    At the time of writing, you can utilize Mapbox at the free level for up to 25,000
    monthly active users on mobile devices, with payment being required for numbers
    of users above that amount. This could certainly change, so make sure that Mapbox
    fits the needs you have and your budget before building it into your application.


    Once you create a Mapbox account and review the pricing, you will need to create
    an access token to use in your Mapbox application. Although you could use a default
    access token, it’s better to create an access token for each of your Mapbox projects,
    in case you need to revoke a token or limit its capabilities. Find the Create
    a token button (Figure [11-1](#485790_1_En_11_Chapter.xhtml#Fig1)) on your Mapbox
    account page.


    ![../images/485790_1_En_11_Chapter/485790_1_En_11_Fig1_HTML.jpg](images/485790_1_En_11_Chapter/485790_1_En_11_Fig1_HTML.jpg)


    Figure 11-1


    The Create a token button


    Click the Create a token button, and name your access token `FirstMapboxApp` (or
    anything else you choose) on the next screen (Figure [11-2](#485790_1_En_11_Chapter.xhtml#Fig2)).
    The defaults are fine for the token scopes.


    ![../images/485790_1_En_11_Chapter/485790_1_En_11_Fig2_HTML.jpg](images/485790_1_En_11_Chapter/485790_1_En_11_Fig2_HTML.jpg)


    Figure 11-2


    Creating an access token


    Create your token (at the bottom of the Create an access token screen), and then
    confirm your password if the web application prompts you. You will be taken to
    a list of your access tokens. Keep your access token confidential, and don’t share
    it publicly, such as in a source code repository. We will add this access token
    to our application’s `Info.plist` file after we set up our Xcode project.


    Now that we have our access token, let’s create an Xcode project and add the Mapbox
    SDK for iOS.'
