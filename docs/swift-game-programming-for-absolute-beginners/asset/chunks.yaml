    `return CGFloat(arc4random()) / CGFloat(UInt32.max)`


    `}`


    Humans aren’t really any better than computers at understanding “true” randomness.
    This is why your MP3 player in shuffle mode sometimes seems to keep playing the
    same songs over and over. You perceive naturally occurring streaks to be non-random
    when in fact they are random. This means programmers sometimes have to create
    a function that appears random to humans—even though it’s not truly random.


    In games, you have to deal very carefully with randomness. A wrongly designed
    mechanism to spawn random units may spawn units of a certain type more often for
    certain players, giving them an unfair (dis)advantage. Furthermore, when you design
    your games, make sure random events don’t have too much influence over the outcome.
    For example, don’t have the player roll a die after completing 80 levels of your
    highly challenging platform game and let the outcome of the roll determine whether
    the player dies.


    ## Calculating a Random Velocity and Color


    Each time a can falls, you want to create a random velocity and color for it.
    You can use the `arc4random` and the user-defined `randomCGFloat` functions to
    help you do this. Let’s first look at creating a random velocity. In order to
    set a velocity for the can, you want to take into account a minimal velocity such
    that the can doesn’t fall down too slowly. For that, you use the `minVelocity`
    property. This property is given an initial value when a `PaintCan` instance is
    created:


    `var minVelocity = CGFloat(40)`


    You use this minimum velocity value when you calculate a random velocity, as follows:


    `velocity = CGPoint(x: 0.0, y: randomCGFloat() * -40 - minVelocity)`


    The velocity in the x direction is zero because cans aren’t moving horizontally—they
    only fall down. The y velocity is calculated using the random number generator.
    You multiply this random value by -40 and subtract the value stored in the property
    `minVelocity` in order to get a negative y velocity between -`minVelocity` and
    -`minVelocity-40`. If `minVelocity` equals 40, this results in a y velocity between
    -40 and -80.


    To calculate a random color, you also use the random number generator, but you
    want to choose among a few discrete options (red, green, or blue). This is where
    the original `arc4random_uniform` function is useful. The function allows for
    an optional parameter to indicate the range: `arc4random_uniform(x)` returns a
    number between 0 and `x-1`. For example, look at this instruction:


    `let randomval = arc4random_uniform(3)`


    The variable `randomval` will now contain either 0, 1, or 2\. Using some Boolean
    logic, it is now rather straightforward to set the color of the paint can:


    `red.hidden = randomval != 0`


    `green.hidden = randomval != 1`


    `blue.hidden = randomval != 2`


    Now that you are able to generate random colors and velocities, it’s time to define
    the final behavior of the paint can.


    ## Updating the Paint Can


    The `updateDelta` method in the `PaintCan` class should do at least the following
    things:


    *   Set a randomly created velocity and color if the can currently is not yet
    falling

    *   Update the can position by adding the velocity to it

    *   Check whether the can has fallen completely, and reset it in that case


    For the first task, you can use an `if` instruction to check whether the can currently
    is hidden. Furthermore, you want to introduce a bit of unpredictability for when
    the can appears. In order to achieve that effect, you assign a random velocity
    and color only if some random number generated by the `randomCGFloat` function
    is smaller than a threshold of 0.01\. Because of the uniform distribution, only
    in approximately 1 out of 100 random numbers will the number be smaller than 0.01\.
    Here is the `if` instruction that achieves this:


    `if node.hidden {`


        `if randomCGFloat() > 0.01 {`


            `return`


        `}`


        `// the code that comes here will be executed only once in a while`


    `}`


    Next to this can initialization step, you also need to update the can position
    by adding the current velocity to it, taking into account the elapsed game time,
    just as you did with the ball:


    `node.position.x += velocity.x * CGFloat(delta)`


    `node.position.y += velocity.y * CGFloat(delta)`


    Now that you’ve initialized the can and updated its position, you need to handle
    the special cases. For the paint can, you have to check whether it has fallen
    outside the game world. If so, you need to reset it. The nice thing is that you
    already wrote a method to check whether a certain position is outside the game
    world: the `isOutsideWorld` method in the `GameWorld` class. You can now use that
    method again to check whether the position of the can is outside the game world.
    If this is the case, you need to reset the can so it’s placed at the top, outside
    the screen again. In order to make sure that the paint can is completely out of
    the screen before you reset it, you first need to calculate the top of the can:


    `let top = CGPoint(x: node.position.x, y: node.position.y + red.size.height/2)`


    Then, you use an `if` instruction to check if the can has fallen out of the screen.
    If that is the case, you hide the can:


    `if GameScene.world.isOutsideWorld(top) {`


        `node.hidden = true`


    `}`


    Finally, in order to make the game a bit more challenging, you slightly increase
    the minimum velocity of the can each time you go through the `updateDelta` method:


    `minVelocity += 0.02`


    Because the minimum velocity slowly increases, the game becomes more difficult
    as time progresses.


    All the code for the Painter5 example is available in the example folder belonging
    to this chapter. Figure [7-2](#A978-1-4842-0650-8_7_Chapter.html#Fig2) shows a
    screenshot of the Painter5 example, which now has three falling paint cans.


    ![A978-1-4842-0650-8_7_Fig2_HTML.jpg](A978-1-4842-0650-8_7_Fig2_HTML.jpg)


    Figure 7-2.


    The Painter5 example with a cannon, a ball, and three falling paint cans


