    # 11. Finishing the Painter Game


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​11](http://dx.doi.org/10.1007/978-1-4842-0650-8_11))
    contains supplementary material, which is available to authorized users.


    In this chapter, you will finish the Painter game by adding a few extra features
    such as motion effects, sounds, and music, and maintaining and displaying a score.
    Finally, you will learn about characters and strings in a bit more detail.


    ## Adding Motion Effects


    In order to make the game more visually appealing, you can make the paint cans
    swing back and forth slightly to simulate the effect of wind and friction on the
    falling motion. The PainterFinal program that belongs to this chapter is the final
    version of the game with this motion effect added to the cans. Adding such an
    effect isn’t complicated. Thanks to the work you did in the previous chapter,
    only a single line needs to be added to the `updateDelta` method of the `PaintCan`
    class. Because `PaintCan` is a subclass of `ThreeColorGameObject`, which in turn
    is a subclass of `SKNode`, it has a `zRotation` property that you can use to rotate
    the paint can.


    In order to achieve the motion effect, you use the `sin` function. By letting
    the value depend on the current position of the can, you get different values
    depending on that position. You then use this value to apply a rotation on the
    sprite. This is the line of code you add to the `updateDelta` method in the `PaintCan`
    class:


    `self.zRotation = sin(position.y / 50) * 0.04`


    This instruction uses the y-coordinate of the paint can position to get different
    rotation values. Furthermore, you divide it by 50 to get a nice slow movement,
    and you multiply the outcome by 0.04 to reduce the amplitude of the sine so the
    rotation looks more or less realistic. If you like, you can try out different
    values and see how they affect the behavior of the paint cans.


    Creating Sprites


    Even if you’re not an artist, it helps to be able to make simple sprites yourself.
    It enables you to quickly make a prototype of the game—and maybe also find out
    there is an artist inside you. To create sprites, you first need good tools. Most
    artists use a painting program like Adobe Photoshop or a vector drawing program
    like Adobe Illustrator, but others work with such simple tools as Paintbrush or
    the more extensive and free GIMP. Every tool requires practice. Work your way
    through some tutorials, and make sure you get some insight into the many different
    features. Often, the things you want can be achieved in an easy way.


    Preferably, create very large images of your game objects and then scale them
    down to the required size. The advantages are that you can change the required
    size in your game later and that you get rid of aliasing effects due to images
    being represented by pixels. When scaling images, anti-aliasing techniques blend
    the colors so the image remains smooth. If you keep the outside of the game object
    in the image transparent, then, when you scale, the border pixels will automatically
    become partially transparent. Only if you want to create the classic pixel style
    should you create the sprites in the actual size required.


    Finally, look around on the Web. There are lots of sprites that you can use for
    free. Make sure to check the license terms so the pack of sprites you’re using
    are legal for what you’re building. You can then use them as a basis for your
    own sprites. But in the end, realize that the quality of your game increases significantly
    when you work with an experienced artist.'
