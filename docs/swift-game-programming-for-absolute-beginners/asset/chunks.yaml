    \ = Float(musicSlider.value)`\n\n至此，`PenguinPairs2` 示例就完成了。图 17-4 展示了它的效果。\n\n\
    ![A978-1-4842-0650-8_17_Fig4_HTML.jpg](img/A978-1-4842-0650-8_17_Fig4_HTML.jpg)\n\
    \n图 17-4.\n\n`PenguinPairs2` 示例\n\n大多数游戏都包含一些菜单界面。通过这些界面，玩家可以设置选项、选择关卡、查看成就以及暂停游戏。创建所有这些额外的界面可能会花费大量精力，而这些努力并不会对实际游戏玩法产生贡献，因此开发者往往不太重视它们。但这是一个非常错误的决定。\n\
    \n一位艺术家曾说过：“你的游戏好不好，取决于它最差的界面。”如果某个菜单界面质量低劣，玩家会感觉游戏尚未完成，并且开发者没有投入足够的精力。所以，要确保你所有的菜单界面都外观漂亮，并且易于使用和导航。\n\
    \n仔细考虑在这些界面中放置什么内容。你可能会想为所有内容都创建选项：游戏难度、播放的音乐、背景颜色等等。但请记住，你才是应该创建游戏的人，而不是玩家。应该由你或你的艺术家来决定什么能带来最有趣的玩法和最引人注目的视觉风格，而不是用户。\n\
    \n尽可能避免使用选项。例如，玩家真的需要设置难度吗？你不能通过监控玩家的进度来自动调整难度吗？你真的需要一个关卡选择界面吗？不能简单地记住玩家上次的位置，并立即在那里继续吗？尽量让你的界面保持简洁！\n\
    \n## 本章所学内容\n\n在本章中，你学到了以下内容：\n\n-   如何创建包含各种按钮和滑块的菜单\n-   如何获取按钮和滑块的值，并将这些信息转换为更改游戏设置（例如背景音乐音量）\n\
    -   如何使用类扩展为现有的第三方类添加功能\n\n# 18. 游戏状态管理\n\n电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-0650-8_18](http://dx.doi.org/10.1007/978-1-4842-0650-8_18))\
    \ 包含补充材料，可供授权用户使用。\n\n通常，游戏应用启动时你不会立即开始玩。例如，在《图坦之墓》游戏中，你在开始游戏之前会看到一个标题界面。更复杂的游戏可能包含标题界面、选项菜单、选择不同关卡的菜单、完成关卡后显示高分的界面、选择不同角色和属性的菜单等等。在《图坦之墓》中，添加标题界面并不那么困难，因为标题界面本身的交互性非常少。然而，当你查看上一章的示例时，你会发现构建一个包含几个选项和控件的界面可能会产生相当多的代码。你可以想象，当你向游戏添加更多菜单和界面时，管理哪些对象属于哪个界面以及它们何时应该被绘制或更新将会变得非常麻烦。\n\
    \n通常，这些不同的菜单和界面被称为游戏状态。在某些程序中，它们被称为场景，而负责管理场景的对象是导演。有时会区分游戏模式和游戏状态。在这种情况下，菜单、主游戏画面等属于游戏模式，而“关卡完成”和“游戏结束”则是游戏状态。\n\
    \n本书遵循一种简化的范式，将所有内容统称为游戏状态。为了处理这些不同的游戏状态，你需要一个管理器。在本章中，你将开发此类结构所需的主要类，并学习如何使用它来显示不同的菜单并在它们之间切换，同时保持代码的清晰分离。\n"
- fmt: "# Basics of Managing Game States\n\nWhen you want to deal properly with game\
    \ states, you need to make sure of the following:\n\n- Game states should be run\
    \ completely independently. In other words, you don’t want to have to deal with\
    \ the options menu screen or the Game Over screen while you’re in the game-playing\
    \ state.\n- There should be an easy way to define game states, find game states,\
    \ and switch between them. That way, when the player presses the Options button\
    \ in the title screen, you can easily switch to the options menu state.\n\nIn\
    \ the examples you’ve seen until now, there was always some kind of game world\
    \ class. Looking at it from the view of game states, each of these worlds represents\
    \ a single (playing) game state. You need to define such a class for each different\
    \ state. The nice thing is that you already have a lot of code in place that helps\
    \ you do this. The `SKNode` class is particularly useful because it represents\
    \ a node possibly containing a whole subtree of game objects, which is a sufficient\
    \ basis for representing a game state. In the previous games, the classes that\
    \ represented the game world inherited from the `SKNode` class. In the remaining\
    \ examples in this book, the classes that represent a game state will also inherit\
    \ from `SKNode`. So, if you have an options menu, a title screen, a level-selection\
    \ screen, and a help menu, you make a separate class for each of these game states.\
    \ The only thing you still need to provide is a way to manage the various game\
    \ states in the game. You do this by creating a game state manager.\n\n## The\
    \ Game State Manager\n\nIn this section, you create a class called `GameStateManager`,\
    \ which you will use to manage the various game states in the Penguin Pairs game.\
    \ An important design criterion for the game state manager is that it should be\
    \ easily accessible. Also, there should be only a single game state manager instance\
    \ that is accessible everywhere. In the Painter and Tut’s Tomb game, the game\
    \ world was easily accessible because it was a class property of the `GameScene`\
    \ class. For the game state manager, I’ll do something slightly different.\n\n\
    As you gain more experience in writing software, you’ll notice that you tend to\
    \ use similar design solutions for problems. In software engineering, these similar\
    \ solutions are called design patterns. Some of those design patterns are quite\
    \ well-known and are commonly used in a lot of applications, including games.\
    \ In this case, the “problem” that you want to solve is that you want a class\
    \ to have a single instance, which is accessible everywhere. The design pattern\
    \ that solves this is called the singleton. Here is a very simple example of a\
    \ class using a singleton design pattern:\n\n```\nclass MyClass {\n    static\
    \ let instance = MyClass()\n    var aProperty = 12\n}\n```\n\nAs you can see,\
    \ the class `MyClass` contains a class property called `instance`, which itself\
    \ is an instance of `MyClass`. Accessing this single instance is easy, and you\
    \ use that instance to access the `aProperty` property:\n\n```\nprint(MyClass.instance.aProperty)\
    \ // prints '12' to the console\n```\n\nThe nice thing about this approach is\
    \ that it avoids global variables, and the class design itself indicates that\
    \ there should only ever be a single instance of the class. Let’s follow this\
    \ exact same procedure for the game state manager and define a singleton class\
    \ called `GameStateManager`. In the `PenguinPairs3` example belonging to this\
    \ chapter, you can find an implementation of the game state manager as a singleton.\n\
    \nThis class is set up in such a way that it allows you to store different game\
    \ states (that is, different `SKNode` instances), so you can select what the current\
    \ game state is, and the manager then adds that node to itself as a child so that\
    \ the selected node becomes active and visible.\n\nThe various game states are\
    \ stored as nodes in an array, which is a property of the `GameStateManager` class:\n\
    \n```\nvar states : [SKNode] = []\n```\n\nYou also define an additional property\
    \ to keep track of the currently active game state (which is an instance of `SKNode`):\n\
    \n```\nvar currentGameState: SKNode? = nil\n```\n\nWhen the `GameStateManager`\
    \ instance is created, there are no game states yet, so there is no currently\
    \ active game state either. As a result, the `currentGameState` property is an\
    \ optional value."
  raw: '## Basics of Managing Game States


    When you want to deal properly with game states, you need to make sure of the
    following:


    *   Game states should be run completely independently. In other words, you don’t
    want to have to deal with the options menu screen or the Game Over screen while
    you’re in the game-playing state.

    *   There should be an easy way to define game states, find game states, and switch
    between them. That way, when the player presses the Options button in the title
    screen, you can easily switch to the options menu state.


    In the examples you’ve seen until now, there was always some kind of game world
    class. Looking at it from the view of game states, each of these worlds represents
    a single (playing) game state. You need to define such a class for each different
    state. The nice thing is that you already have a lot of code in place that helps
    you do this. The `SKNode` class is particularly useful because it represents a
    node possibly containing a whole subtree of game objects, which is a sufficient
    basis for representing a game state. In the previous games, the classes that represented
    the game world inherited from the `SKNode` class. In the remaining examples in
    this book, the classes that represent a game state will also inherit from `SKNode`.
    So, if you have an options menu, a title screen, a level-selection screen, and
    a help menu, you make a separate class for each of these game states. The only
    thing you still need to provide is a way to manage the various game states in
    the game. You do this by creating a game state manager.


    ## The Game State Manager


    In this section, you create a class called `GameStateManager`, which you will
    use to manage the various game states in the Penguin Pairs game. An important
    design criterion for the game state manager is that it should be easily accessible.
    Also, there should be only a single game state manager instance that is accessible
    everywhere. In the Painter and Tut’s Tomb game, the game world was easily accessible
    because it was a class property of the `GameScene` class. For the game state manager,
    I’ll do something slightly different.


    As you gain more experience in writing software, you’ll notice that you tend to
    use similar design solutions for problems. In software engineering, these similar
    solutions are called design patterns. Some of those design patterns are quite
    well-known and are commonly used in a lot of applications, including games. In
    this case, the “problem” that you want to solve is that you want a class to have
    a single instance, which is accessible everywhere. The design pattern that solves
    this is called the singleton. Here is a very simple example of a class using a
    singleton design pattern:


    `class MyClass {`


        `static let instance = MyClass()`


        `var aProperty = 12`


    `}`


    As you can see, the class `MyClass` contains a class property called `instance`,
    which itself is an instance of `MyClass`. Accessing this single instance is easy,
    and you use that instance to access the `aProperty` property:


    `print(MyClass.instance.aProperty) // prints ''12'' to the console`


    The nice thing about this approach is that it avoids global variables, and the
    class design itself indicates that there should only ever be a single instance
    of the class. Let’s follow this exact same procedure for the game state manager
    and define a singleton class called `GameStateManager`. In the PenguinPairs3 example
    belonging to this chapter, you can find an implementation of the game state manager
    as a singleton.


    This class is set up in such a way that it allows you to store different game
    states (that is, different `SKNode` instances), so you can select what the current
    game state is, and the manager then adds that node to itself as a child so that
    the selected node becomes active and visible.


    The various game states are stored as nodes in an array, which is a property of
    the `GameStateManager` class:


    `var states : [SKNode] = []`


    You also define an additional property to keep track of the currently active game
    state (which is an instance of `SKNode`):


    `var currentGameState: SKNode? = nil`


    When the `GameStateManager` instance is created, there are no game states yet,
    so there is no currently active game state either. As a result, the `currentGameState`
    property is an optional value.'
  trans: "\n# 游戏状态管理基础\n\n要妥善处理游戏状态，你需要确保以下几点：\n\n- 游戏状态应完全独立运行。换言之，你不希望在游戏进行中处理选项菜单界面或游戏结束界面。\n\
    - 应提供简便的方法来定义、查找和切换游戏状态。这样一来，当玩家在标题画面按下“选项”按钮时，你就能轻松切换到选项菜单状态。\n\n在之前的示例代码中，总存在某个游戏世界类。从游戏状态的角度看，每个这类世界对象都代表一个独立的（进行中）游戏状态。你需要为每个不同状态定义这样的类。好在你已拥有大量现成代码可供使用。其中，`SKNode`\
    \ 类尤其有用，因为它能表示一个可能包含整个游戏对象子树的节点，这足以作为表示游戏状态的基础。在之前的游戏中，代表游戏世界的类都继承自 `SKNode` 类。在本书后续示例中，代表游戏状态的类同样将继承自\
    \ `SKNode`。因此，若拥有选项菜单、标题画面、关卡选择画面和帮助菜单，你只需为每个游戏状态分别创建独立类。唯一需要补充的是管理游戏中各游戏状态的方法，这可以通过创建游戏状态管理器来实现。\n\
    \n## 游戏状态管理器\n\n本节将创建一个名为 `GameStateManager` 的类，用于管理《企鹅配对》游戏中的各种游戏状态。该游戏状态管理器的重要设计准则是：必须易于访问，且全游戏仅存在一个可随处访问的实例。在《画家》和《图特之墓》游戏中，游戏世界作为\
    \ `GameScene` 类的类属性实现了便捷访问。对于游戏状态管理器，我将采取略有不同的做法。\n\n随着软件开发经验的积累，你会发现面对问题时常会采用相似的设计方案。在软件工程中，这些通用解决方案被称为设计模式。其中一些设计模式广为人知，在包括游戏在内的众多应用中普遍使用。针对“需要类具有唯一且可全局访问实例”这一需求，对应的设计模式称为单例模式。以下是一个采用单例设计模式的简单类示例：\n\
    \n```\nclass MyClass {\n    static let instance = MyClass()\n    var aProperty\
    \ = 12\n}\n```\n\n如您所见，`MyClass` 类包含一个名为 `instance` 的类属性，它自身就是 `MyClass` 的实例。访问该唯一实例非常简单，并通过该实例访问\
    \ `aProperty` 属性：\n\n```\nprint(MyClass.instance.aProperty) // 控制台输出 '12'\n```\n\
    \n这种做法的优势在于避免了全局变量，且类设计本身就表明该类应仅有唯一实例。接下来，我们将以完全相同的方式定义游戏状态管理器，创建名为 `GameStateManager`\
    \ 的单例类。在本章对应的 `PenguinPairs3` 示例中，你可以找到作为单例实现的游戏状态管理器。\n\n该类的设计支持存储不同的游戏状态（即不同的\
    \ `SKNode` 实例），以便你选择当前游戏状态，随后管理器会将该节点添加为自身子节点，使所选节点变为活动可见状态。\n\n各游戏状态以节点形式存储在数组中，该数组是\
    \ `GameStateManager` 类的属性：\n\n```\nvar states : [SKNode] = []\n```\n\n你还需要定义另一个属性来追踪当前活动的游戏状态（即\
    \ `SKNode` 实例）：\n\n```\nvar currentGameState: SKNode? = nil\n```\n\n当 `GameStateManager`\
    \ 实例被创建时，尚不存在任何游戏状态，因此也没有当前活动状态。因此，`currentGameState` 属性为可选值。\n"
- fmt: "# Assigning Names to Nodes\n\nWhen you’re dealing with different game states\
    \ and game objects, it is useful if there is some way to identify these states/objects.\
    \ In the SpriteKit framework, it’s possible to assign a name to a node. You can\
    \ use that name later to look up the node in the scene. For example, this is how\
    \ you define a node with a name:\n\n```\nvar someNode = SKNode()\nsomeNode.name\
    \ = \"playingField\"\n```\n\nThe `SKNode` class has a method called `childNodeWithName`,\
    \ which you can use to search for nodes. By default, this method searches the\
    \ children of the node it is called on until it finds a matching child. It will\
    \ then stop and return this node. When searching through the nodes, you can use\
    \ regular expression syntax. Here are a few examples of searches:\n\n```\nvar\
    \ node = self.childNodeWithName(\"playingField\") /* searches the children of\n\
    \    this node for the first node called \"playingField\" */\nnode = self.childNodeWithName(\"\
    playing*\") /* searches the children of this node\n    for the first node that\
    \ has a name starting with \"playing\" */\nnode = self.childNodeWithName(\"/playingField\"\
    ) /* searches the children of the\n    root node for the first node called \"\
    playingField\" */\nnode = self.childNodeWithName(\"//playingField\") /* searches\
    \ through the entire\n    node tree and returns the first node it finds called\
    \ \"playingField\" */\n```\n\nUsing the naming scheme of nodes, you can write\
    \ a simple `get` method as a part of the `GameStateManager` class that retrieves\
    \ a game state (`SKNode` instance), given a name:\n\n```\nfunc get(name: String)\
    \ -> SKNode? {\n    for state in states {\n        if state.name == name {\n \
    \           return state\n        }\n    }\n    return nil\n}\n```\n\nSelecting\
    \ the currently active game state is done by calling a method called `switchTo`.\
    \ You have to be careful when switching game states. Once you switch to another\
    \ game state, any objects in the current game state can no longer be found (since\
    \ that game state is no longer active). Because of this, it is safer to only switch\
    \ to another game state at the end of each update cycle. In order to achieve this,\
    \ the `GameStateManager` class has a property called `plannedSwitch` that optionally\
    \ contains a game state title that should be switched to. In the `switchTo` method,\
    \ this property is assigned the title passed as a parameter:\n\n```\nfunc switchTo(name:\
    \ String) {\n    plannedSwitch = name\n}\n```\n\nNow you need to override the\
    \ `updateDelta` method in the `GameStateManager` class to actually make the switch.\
    \ The first step in this method is simply calling the `updateDelta` method of\
    \ the superclass to ensure all game objects are properly updated:\n\n```\nsuper.updateDelta(delta)\n\
    ```\n\nThen, you check whether a switch to another game state is needed. This\
    \ is the case if the `plannedSwitch` property contains a value, and if this value\
    \ is a valid game state title. If either of these conditions aren’t true, you\
    \ return from the method:\n\n```\nif plannedSwitch == nil || !has(plannedSwitch!)\
    \ {\n    return\n}\n```\n\nSwitching to another game state is then rather straightforward.\
    \ First, you remove any children (states) currently active:\n\n```\nself.removeAllChildren()\n\
    ```\n\nThen, you locate the new game state, and add it as a child to the node\
    \ that the game state manager represents:\n\n```\ncurrentGameState = get(plannedSwitch!)\n\
    self.addChild(currentGameState!)\n```\n\nAs a last instruction in the `updateDelta`\
    \ method, you set the value of the `plannedSwitch` property to `nil` again, since\
    \ the game state switch has been made.\n\nThe only thing left to do is to make\
    \ the game state manager an integral part of the game, so you call its game-loop\
    \ methods in the `update` method of the `GameScene` class:\n\n```\noverride func\
    \ update(currentTime: NSTimeInterval) {\n    GameStateManager.instance.handleInput(inputHelper)\n\
    \    GameStateManager.instance.updateDelta(delta)\n    inputHelper.reset()\n}\n\
    ```\n\n# Adding States and Switching Between Them\n\nNow that you have your game\
    \ state manager, you can start adding different states to it. A very basic game\
    \ state is the title menu state. In the `PenguinPairs3` example, you add a class\
    \ called `TitleMenuState` to the application that represents this state. The title\
    \ menu state consists of four game objects: a background and three buttons. You\
    \ can reuse the `Button` class that you developed earlier for the Tut’s Tomb game.\
    \ Here is the initializer of the `TitleMenuState` class:\n\n```\noverride init()\
    \ {\n    super.init()\n    self.name = \"title\"\n    let layout = GridLayout(rows:\
    \ 3, columns: 1, cellWidth: Int(playButton.size.width),\n        cellHeight: Int(playButton.size.height))\n\
    \    layout.yPadding = 5\n    let buttons = SKNode()\n    buttons.position.y =\
    \ -200\n    self.addChild(buttons)\n    layout.target = buttons\n    playButton.zPosition\
    \ = Layer.Scene\n    optionsButton.zPosition = Layer.Scene\n    helpButton.zPosition\
    \ = Layer.Scene\n    layout.add(helpButton)\n    layout.add(optionsButton)\n \
    \   layout.add(playButton)\n    let background = SKSpriteNode(imageNamed: \"spr_background_title\"\
    )\n    background.zPosition = Layer.Background\n    self.addChild(background)\n\
    }\n```\n\nAs you can see, the `GridLayout` class is used here to very easily position\
    \ the buttons. Because you need to do something when a button is pressed, you\
    \ have to override the `handleInput` method. In that method, you check whether\
    \ each of the buttons is pressed, and if so, you switch to another state. For\
    \ instance, if the player taps the Play Game button, you need to switch to the\
    \ level menu:\n\n```\nif playButton.tapped {\n    GameStateManager.instance.switchTo(\"\
    level\")\n}\n```\n\nYou add similar alternatives for the other two buttons. Now\
    \ the title menu state is basically done. In the `GameScene` class, the only thing\
    \ you need to do is make an instance of `TitleMenuState` and add it to the game\
    \ state manager. You do the same thing for all the other states in the game. After\
    \ that you set the currently active state to be the title menu, so the player\
    \ sees the title menu when the game starts:\n\n```\nGameStateManager.instance.addChild(TitleMenuState())\n\
    GameStateManager.instance.addChild(HelpState())\nGameStateManager.instance.addChild(OptionsMenuState())\n\
    GameStateManager.instance.addChild(LevelMenuState(nrLevels: 12))\n// the current\
    \ game state is the title screen\nGameStateManager.instance.switchTo(\"title\"\
    )\n```\n\nThe help and option menu states are set up in a fashion similar to `TitleMenuState`.\
    \ In the class initializer, you add your game objects to the game world, and you\
    \ override the `handleInput` method to switch between states. For example, both\
    \ the help and option menu states contain a Back button that returns you to the\
    \ title screen:\n\n```\nif backButton.tapped {\n    GameStateManager.instance.switchTo(\"\
    title\")\n}\n```\n\nHave a look at the `HelpState` and `OptionsMenuState` classes\
    \ in the `PenguinPairs3` example to get an idea of how the different states are\
    \ set up and how you switch between states."
  raw: '## Assigning Names to Nodes


    When you’re dealing with different game states and game objects, it is useful
    if there is some way to identify these states/objects. In the SpriteKit framework,
    it’s possible to assign a name to a node. You can use that name later to look
    up the node in the scene. For example, this is how you define a node with a name:


    `var someNode = SKNode()`


    `someNode.name = "playingField"`


    The `SKNode` class has a method called `childNodeWithName`, which you can use
    to search for nodes. By default, this method searches the children of the node
    it is called on until it finds a matching child. It will then stop and return
    this node. When searching through the nodes, you can use regular expression syntax.
    Here are a few examples of searches:


    `var node = self.childNodeWithName("playingField") /* searches the children of`


        `this node for the first node called "playingField" */`


    `node = self.childNodeWithName("playing*") /* searches the children of this node`


        `for the first node that has a name starting with "playing" */`


    `node = self.childNodeWithName("/playingField") /* searches the children of the`


        `root node for the first node called "playingField" */`


    `node = self.childNodeWithName("//playingField") /* searches through the entire`


        `node tree and returns the first node it finds called "playingField" */`


    Using the naming scheme of nodes, you can write a simple `get` method as a part
    of the `GameStateManager` class that retrieves a game state (`SKNode` instance),
    given a name:


    `func get(name: String) -> SKNode? {`


        `for state in states {`


            `if state.name == name {`


                `return state`


            `}`


        `}`


        `return nil`


    `}`


    Selecting the currently active game state is done by calling a method called `switchTo`.
    You have to be careful when switching game states. Once you switch to another
    game state, any objects in the current game state can no longer be found (since
    that game state is no longer active) Because of this, it is safer to only switch
    to another game state at the end of each update cycle. In order to achieve this,
    the `GameStateManager` class has a property called `plannedSwitch` that optionally
    contains a game state title that should be switched to. In the `switchTo` method,
    this property is assigned the title passed as a parameter:


    `func switchTo(name: String) {`


        `plannedSwitch = name`


    `}`


    Now you need to override the `updateDelta` method in the `GameStateManager` class
    to actually make the switch. The first step in this method is simply calling the
    `updateDelta` method of the superclass to ensure all game objects are properly
    updated:


    `super.updateDelta(delta)`


    Then, you check whether a switch to another game state is needed. This is the
    case if the `plannedSwitch` property contains a value, and if this value is a
    valid game state title. If either of these conditions aren’t true, you return
    from the method:


    `if plannedSwitch == nil || !has(plannedSwitch!) {`


        `return`


    `}`


    Switching to another game state is then rather straightforward. First, you remove
    any children (states) currently active:


    `self.removeAllChildren()`


    Then, you locate the new game state, and add it as a child to the node that the
    game state manager represents:


    `currentGameState = get(plannedSwitch!)`


    `self.addChild(currentGameState!)`


    As a last instruction in the `updateDelta` method, you set the value of the `plannedSwitch`
    property to `nil` again, since the game state switch has been made.


    The only thing left to do is to make the game state manager an integral part of
    the game, so you call its game-loop methods in the `update` method of the `GameScene`
    class:


    `override func update(currentTime: NSTimeInterval) {`


        `GameStateManager.instance.handleInput(inputHelper)`


        `GameStateManager.instance.updateDelta(delta)`


        `inputHelper.reset()`


    `}`


    ## Adding States and Switching Between Them


    Now that you have your game state manager, you can start adding different states
    to it. A very basic game state is the title menu state. In the `PenguinPairs3`
    example, you add a class called `TitleMenuState` to the application that represents
    this state. The title menu state consists of four game objects: a background and
    three buttons. You can reuse the `Button` class that you developed earlier for
    the Tut’s Tomb game. Here is the initializer of the `TitleMenuState` class:


    `override init() {`


        `super.init()`


        `self.name = "title"`


        `let layout = GridLayout(rows: 3, columns: 1, cellWidth: Int(playButton.size.width),`


            `cellHeight: Int(playButton.size.height))`


        `layout.yPadding = 5`


        `let buttons = SKNode()`


        `buttons.position.y = -200`


        `self.addChild(buttons)`


        `layout.target = buttons`


        `playButton.zPosition = Layer.Scene`


        `optionsButton.zPosition = Layer.Scene`


        `helpButton.zPosition = Layer.Scene`


        `layout.add(helpButton)`


        `layout.add(optionsButton)`


        `layout.add(playButton)`


        `let background = SKSpriteNode(imageNamed: "spr_background_title")`


        `background.zPosition = Layer.Background`


        `self.addChild(background)`


    `}`


    As you can see, the `GridLayout` class is used here to very easily position the
    buttons. Because you need to do something when a button is pressed, you have to
    override the `handleInput` method. In that method, you check whether each of the
    buttons is pressed, and if so, you switch to another state. For instance, if the
    player taps the Play Game button, you need to switch to the level menu:


    `if playButton.tapped {`


        `GameStateManager.instance.switchTo("level")`


    `}`


    You add similar alternatives for the other two buttons. Now the title menu state
    is basically done. In the `GameScene` class, the only thing you need to do is
    make an instance of `TitleMenuState` and add it to the game state manager. You
    do the same thing for all the other states in the game. After that you set the
    currently active state to be the title menu, so the player sees the title menu
    when the game starts:


    `GameStateManager.instance.addChild(TitleMenuState())`


    `GameStateManager.instance.addChild(HelpState())`


    `GameStateManager.instance.addChild(OptionsMenuState())`


    `GameStateManager.instance.addChild(LevelMenuState(nrLevels: 12))`


    `// the current game state is the title screen`


    `GameStateManager.instance.switchTo("title")`


    The help and option menu states are set up in a fashion similar to `TitleMenuState`.
    In the class initializer, you add your game objects to the game world, and you
    override the `handleInput` method to switch between states. For example, both
    the help and option menu states contain a Back button that returns you to the
    title screen:


    `if backButton.tapped {`


        `GameStateManager.instance.switchTo("title")`


    `}`


    Have a look at the `HelpState` and `OptionsMenuState` classes in the `PenguinPairs3`
    example to get an idea of how the different states are set up and how you switch
    between states.'
  trans: "\n# 为节点分配名称\n\n当处理不同的游戏状态和游戏对象时，如果能通过某种方式识别这些状态/对象会非常有用。在 SpriteKit 框架中，可以为节点分配一个名称。稍后你可以使用这个名称在场景中查找该节点。例如，以下是如何定义一个带有名称的节点：\n\
    \n```\nvar someNode = SKNode()\nsomeNode.name = \"playingField\"\n```\n\n`SKNode`\
    \ 类有一个名为 `childNodeWithName` 的方法，可用于搜索节点。默认情况下，此方法会搜索调用它的节点的子节点，直到找到匹配的子节点，然后停止并返回该节点。在搜索节点时，你可以使用正则表达式语法。以下是几个搜索示例：\n\
    \n```\nvar node = self.childNodeWithName(\"playingField\") /* 搜索该节点的子节点，\n   \
    \ 查找第一个名为\"playingField\"的节点 */\nnode = self.childNodeWithName(\"playing*\") /*\
    \ 搜索该节点的子节点，\n    查找第一个名称以\"playing\"开头的节点 */\nnode = self.childNodeWithName(\"\
    /playingField\") /* 搜索根节点的子节点，\n    查找第一个名为\"playingField\"的节点 */\nnode = self.childNodeWithName(\"\
    //playingField\") /* 搜索整个节点树，\n    并返回找到的第一个名为\"playingField\"的节点 */\n```\n\n\
    利用节点命名方案，你可以编写一个简单的 `get` 方法，作为 `GameStateManager` 类的一部分，根据给定的名称检索游戏状态（`SKNode`\
    \ 实例）：\n\n```\nfunc get(name: String) -> SKNode? {\n    for state in states {\n\
    \        if state.name == name {\n            return state\n        }\n    }\n\
    \    return nil\n}\n```\n\n选择当前活动的游戏状态是通过调用名为 `switchTo` 的方法完成的。在切换游戏状态时需要格外小心。一旦切换到另一个游戏状态，当前游戏状态中的任何对象都将无法再找到（因为该游戏状态不再活动）。因此，仅在每个更新周期结束时切换到另一个游戏状态会更安全。为了实现这一点，`GameStateManager`\
    \ 类有一个名为 `plannedSwitch` 的属性，它可选地包含一个应切换到的游戏状态标题。在 `switchTo` 方法中，该属性被赋值为作为参数传递的标题：\n\
    \n```\nfunc switchTo(name: String) {\n    plannedSwitch = name\n}\n```\n\n现在，你需要重写\
    \ `GameStateManager` 类中的 `updateDelta` 方法来实际执行切换。此方法的第一步是简单地调用父类的 `updateDelta`\
    \ 方法，以确保所有游戏对象都得到正确更新：\n\n```\nsuper.updateDelta(delta)\n```\n\n然后，你检查是否需要切换到另一个游戏状态。当\
    \ `plannedSwitch` 属性包含值，并且该值是一个有效的游戏状态标题时，才需要进行切换。如果这两个条件中的任何一个不成立，你就从该方法返回：\n\
    \n```\nif plannedSwitch == nil || !has(plannedSwitch!) {\n    return\n}\n```\n\
    \n切换到另一个游戏状态相当直接。首先，移除当前活动的所有子节点（状态）：\n\n```\nself.removeAllChildren()\n```\n\n\
    然后，定位新的游戏状态，并将其添加为游戏状态管理器所代表的节点的子节点：\n\n```\ncurrentGameState = get(plannedSwitch!)\n\
    self.addChild(currentGameState!)\n```\n\n作为 `updateDelta` 方法中的最后一条指令，你将 `plannedSwitch`\
    \ 属性的值再次设置为 `nil`，因为游戏状态切换已经完成。\n\n剩下的唯一一件事就是将游戏状态管理器整合到游戏的核心部分中，因此在 `GameScene`\
    \ 类的 `update` 方法中调用其游戏循环方法：\n\n```\noverride func update(currentTime: NSTimeInterval)\
    \ {\n    GameStateManager.instance.handleInput(inputHelper)\n    GameStateManager.instance.updateDelta(delta)\n\
    \    inputHelper.reset()\n}\n```\n\n# 添加状态并在状态间切换\n\n现在你已经有了游戏状态管理器，可以开始向其中添加不同的状态了。一个非常基本的游戏状态是标题菜单状态。在\
    \ `PenguinPairs3` 示例中，你添加了一个名为 `TitleMenuState` 的类来表示此状态。标题菜单状态由四个游戏对象组成：一个背景和三个按钮。你可以重用之前在\
    \ Tut's Tomb 游戏中开发的 `Button` 类。以下是 `TitleMenuState` 类的初始化器：\n\n```\noverride init()\
    \ {\n    super.init()\n    self.name = \"title\"\n    let layout = GridLayout(rows:\
    \ 3, columns: 1, cellWidth: Int(playButton.size.width),\n        cellHeight: Int(playButton.size.height))\n\
    \    layout.yPadding = 5\n    let buttons = SKNode()\n    buttons.position.y =\
    \ -200\n    self.addChild(buttons)\n    layout.target = buttons\n    playButton.zPosition\
    \ = Layer.Scene\n    optionsButton.zPosition = Layer.Scene\n    helpButton.zPosition\
    \ = Layer.Scene\n    layout.add(helpButton)\n    layout.add(optionsButton)\n \
    \   layout.add(playButton)\n    let background = SKSpriteNode(imageNamed: \"spr_background_title\"\
    )\n    background.zPosition = Layer.Background\n    self.addChild(background)\n\
    }\n```\n\n如你所见，这里使用了 `GridLayout` 类来非常方便地定位按钮。因为需要在按下按钮时执行某些操作，所以你必须重写 `handleInput`\
    \ 方法。在该方法中，你检查每个按钮是否被按下，如果是，则切换到另一个状态。例如，如果玩家点击了“玩游戏”按钮，你需要切换到关卡菜单：\n\n```\nif\
    \ playButton.tapped {\n    GameStateManager.instance.switchTo(\"level\")\n}\n\
    ```\n\n你为其他两个按钮添加类似的替代方案。现在标题菜单状态基本完成了。在 `GameScene` 类中，唯一需要做的就是创建一个 `TitleMenuState`\
    \ 的实例并将其添加到游戏状态管理器中。对于游戏中所有其他状态，你也执行同样的操作。之后，你将当前活动状态设置为标题菜单，这样玩家在游戏启动时就会看到标题菜单：\n\
    \n```\nGameStateManager.instance.addChild(TitleMenuState())\nGameStateManager.instance.addChild(HelpState())\n\
    GameStateManager.instance.addChild(OptionsMenuState())\nGameStateManager.instance.addChild(LevelMenuState(nrLevels:\
    \ 12))\n// 当前游戏状态是标题画面\nGameStateManager.instance.switchTo(\"title\")\n```\n\n\
    帮助和选项菜单状态以类似于 `TitleMenuState` 的方式设置。在类的初始化器中，你将游戏对象添加到游戏世界，并重写 `handleInput`\
    \ 方法以在状态间切换。例如，帮助和选项菜单状态都包含一个返回标题画面的“返回”按钮：\n\n```\nif backButton.tapped {\n \
    \   GameStateManager.instance.switchTo(\"title\")\n}\n```\n\n请查看 `PenguinPairs3`\
    \ 示例中的 `HelpState` 和 `OptionsMenuState` 类，了解不同状态是如何设置的以及如何在状态间切换。\n"
- fmt: "# The Level Menu State\n\nA slightly more complicated game state is the level\
    \ menu. You want the player to be able to select a level from a grid of level\
    \ buttons. You want to be able to display three different states with these level\
    \ buttons because a level can be locked, unlocked but not yet solved by the player,\
    \ or solved. In order for this to work, you require some sort of persistent storage\
    \ across game plays, which will be discussed in the next chapter.\n\nBefore you\
    \ can create the `LevelMenuState` class, you add a class called `LevelButton`\
    \ that inherits from `Button`. In the `LevelButton` class, you keep track of the\
    \ level index that the button refers to and whether the level is solved, unsolved,\
    \ or locked to the player. Depending on the level status, the button should have\
    \ a different appearance. Because the button has three different states, you load\
    \ three textures, one for each state. In summary, here are the stored properties\
    \ defined in `LevelButton`:\n\n```\nvar levelIndex = 0\nvar locked = SKTexture(imageNamed:\
    \ \"spr_level_locked\")\nvar unsolved = SKTexture(imageNamed: \"spr_level_unsolved\"\
    )\nvar solved = SKTexture(imageNamed: \"spr_level_solved\")\n```\n\nLater on,\
    \ you will adapt the `LevelButton` class to display one of these textures depending\
    \ on the status of the level. For now, you simply display the unsolved texture\
    \ when the button is created. Also, you add a text label in the initializer, which\
    \ is drawn on the belly of the penguin, so the player can see which level each\
    \ button refers to, like so:\n\n```\nlet textLabel = SKLabelNode(fontNamed: \"\
    Helvetica\")\ntextLabel.position = CGPoint(x: 0, y: -25)\ntextLabel.fontColor\
    \ = UIColor(red: 0, green: 0, blue: 0.4, alpha: 1)\ntextLabel.fontSize = 24\n\
    textLabel.text = String(levelIndex)\ntextLabel.horizontalAlignmentMode = .Center\n\
    textLabel.zPosition = Layer.Overlay\nself.addChild(textLabel)\n```\n\nFinally,\
    \ in the `handleInput` method, you check whether the button has been tapped. If\
    \ the player has tapped the level button, and the level is not locked, the game\
    \ should switch to the respective level. Let’s assume that a level with index\
    \ x has the name `\"levelx\"`. Also, when the player switches to a level, you\
    \ may want to reset that level so that the player can start immediately from the\
    \ beginning. In summary, here is the complete `handleInput` method:\n\n```\noverride\
    \ func handleInput(inputHelper: InputHelper) {\n    super.handleInput(inputHelper)\n\
    \    if self.texture == locked {\n        return\n    }\n    if tapped {\n   \
    \     GameStateManager.instance.switchTo(\"level\\(levelIndex)\")\n        GameStateManager.instance.reset()\n\
    \    }\n}\n```\n\nNote that in the PenguinPairs3 example, this method is actually\
    \ commented out, since there are no level states yet.\n\nAs you can see, adding\
    \ different states to a game and switching between them isn’t very hard, as long\
    \ as you think about the design of the software beforehand. By thinking in advance\
    \ about which classes are needed and how the functionality of your game should\
    \ be split up between them, you can save yourself a lot of time later. In the\
    \ next chapter, you further extend this example by creating the actual levels.\
    \ Figure [18-1](#A978-1-4842-0650-8_18_Chapter.html#Fig1) shows a screenshot of\
    \ the level menu state.\n\n![A978-1-4842-0650-8_18_Fig1_HTML.jpg](A978-1-4842-0650-8_18_Fig1_HTML.jpg)\n\
    \n**Figure 18-1.** The level menu screen in Penguin Pairs\n\n## What You Have\
    \ Learned\n\nIn this chapter, you have learned the following:\n\n- What design\
    \ patterns are and what the singleton pattern offers\n- How to define different\
    \ game states using a game state manager\n- How to switch between game states\
    \ depending on the player’s actions\n\n# 19. Storing and Recalling Game Data\n\
    \nElectronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​19](http://dx.doi.org/10.1007/978-1-4842-0650-8_19))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    Many games consist of different levels. Casual games such as puzzles and maze\
    \ games may have several hundreds of levels. Until now, your games have relied\
    \ on randomness to keep the gameplay interesting. Although randomness is a powerful\
    \ tool to achieve replayability, in a lot of cases game designers want more control\
    \ over how a game progresses. This control is generally achieved by designing\
    \ levels. Each level is its own game world in which the player has to achieve\
    \ some sort of objective.\n\nWith the tools you’ve used until now, for each level\
    \ in a game you write a specific class in which you fill that specific level with\
    \ game objects and add the behavior you want. This approach has a few disadvantages.\
    \ The most important disadvantage is that you’re mixing the game logic (gameplay,\
    \ win condition, and so on) with the game content. This means every time you want\
    \ to add another level to the game, you have to write a new class, which leads\
    \ to a lot of extra time spent on development. Furthermore, if a game designer\
    \ wants to add a level to a game that you built, the designer needs in-depth knowledge\
    \ of how your code works. And any mistake the designer makes in writing the code\
    \ will result in bugs or crashes in your game.\n\nA much better approach is to\
    \ store level information separately from the actual game code. While the game\
    \ is loading, this level information is retrieved. Ideally, the information needs\
    \ to be stored in a simple format that non-programmers can understand and work\
    \ with. That way, levels can be designed by someone without that person having\
    \ to know how the game converts the data into playable game levels. The most convenient\
    \ way to store the level information is in a text format. You can use text very\
    \ easily to describe a level. Have a look at the following example:\n\n```\nRHBQKBHR\n\
    PPPPPPPP\n........\n........\n........\n........\npppppppp\nrhbqkbhr\n```\n\n\
    This text data describes the starting position in the Chess game, where each character\
    \ represents a chess piece (lowercase for white pieces and uppercase for black\
    \ pieces). If you create a chess game that reads such a description from a file,\
    \ you can very easily modify the file to allow for different starting points.\
    \ For example, you could let a designer create a number of different classic chess\
    \ situations taken from actual games between chess masters. You wouldn’t have\
    \ to make any changes to your game code. You could even decide to create a superchess\
    \ game and make the board bigger, by adding columns and rows (assuming that the\
    \ code loading the game data supports this). All this can be done without knowing\
    \ how the Chess game actually works. Because it is simple text, the format is\
    \ relatively easy to understand, even for someone with little or no programming\
    \ experience. You can adopt this technique to create various levels for your game\
    \ without any code modification. This is especially useful for bigger games, which\
    \ generally will also have a bigger team of people involved. By separating out\
    \ level design from code writing, you allow non-programmers who excel at tasks\
    \ such as game design and graphics design to help you more effectively create\
    \ awesome games.\n\nYou will deal with the different levels in Penguin Pairs in\
    \ a similar fashion. In this chapter, you will see how to build such a level-loading\
    \ scheme into your games. Another thing you will look at is storing and recalling\
    \ the state of the different game over sessions. Games such as Painter and Tut’s\
    \ Tomb don’t retain any information from previous times when the player played\
    \ the game, which in those games doesn’t really matter. In the case of Penguin\
    \ Pairs, it does matter because you don’t want the player to have to start all\
    \ over every time the game is launched. If the player finishes a level, the app\
    \ should remember it the next time the player launches the game, so the player\
    \ can continue where they left off."
  raw: '## The Level Menu State


    A slightly more complicated game state is the level menu. You want the player
    to be able to select a level from a grid of level buttons. You want to be able
    to display three different states with these level buttons because a level can
    be locked, unlocked but not yet solved by the player, or solved. In order for
    this to work, you require some sort of persistent storage across game plays, which
    will be discussed in the next chapter.


    Before you can create the `LevelMenuState` class, you add a class called `LevelButton`
    that inherits from `Button`. In the `LevelButton` class, you keep track of the
    level index that the button refers to and whether the level is solved, unsolved,
    or locked to the player. Depending on the level status, the button should have
    a different appearance. Because the button has three different states, you load
    three textures, one for each state. In summary, here are the stored properties
    defined in `LevelButton`:


    `var levelIndex = 0`


    `var locked = SKTexture(imageNamed: "spr_level_locked")`


    `var unsolved = SKTexture(imageNamed: "spr_level_unsolved")`


    `var solved = SKTexture(imageNamed: "spr_level_solved")`


    Later on, you will adapt the `LevelButton` class to display one of these textures
    depending on the status of the level. For now, you simply display the unsolved
    texture when the button is created. Also, you add a text label in the initializer,
    which is drawn on the belly of the penguin, so the player can see which level
    each button refers to, like so:


    `let textLabel = SKLabelNode(fontNamed: "Helvetica")`


    `textLabel.position = CGPoint(x: 0, y: -25)`


    `textLabel.fontColor = UIColor(red: 0, green: 0, blue: 0.4, alpha: 1)`


    `textLabel.fontSize = 24`


    `textLabel.text = String(levelIndex)`


    `textLabel.horizontalAlignmentMode = .Center`


    `textLabel.zPosition = Layer.Overlay`


    `self.addChild(textLabel)`


    Finally, in the `handleInput` method, you check whether the button has been tapped.
    If the player has tapped the level button, and the level is not locked, the game
    should switch to the respective level. Let’s assume that a level with index x
    has the name “levelx”. Also, when the player switches to a level, you may want
    to reset that level so that the player can start immediately from the beginning.
    In summary, here is the complete `handleInput` method:


    `override func handleInput(inputHelper: InputHelper) {`


        `super.handleInput(inputHelper)`


        `if self.texture == locked {`


            `return`


        `}`


        `if tapped {`


            `GameStateManager.instance.switchTo("level\(levelIndex)")`


            `GameStateManager.instance.reset()`


        `}`


    `}`


    Note that in the PenguinPairs3 example, this method is actually commented out,
    since there are no level states yet.


    As you can see, adding different states to a game and switching between them isn’t
    very hard, as long as you think about the design of the software beforehand. By
    thinking in advance about which classes are needed and how the functionality of
    your game should be split up between them, you can save yourself a lot of time
    later. In the next chapter, you further extend this example by creating the actual
    levels. Figure [18-1](#A978-1-4842-0650-8_18_Chapter.html#Fig1) shows a screenshot
    of the level menu state.


    ![A978-1-4842-0650-8_18_Fig1_HTML.jpg](A978-1-4842-0650-8_18_Fig1_HTML.jpg)


    Figure 18-1.


    The level menu screen in Penguin Pairs


    ## What You Have Learned


    In this chapter, you have learned the following:


    *   What design patterns are and what the singleton pattern offers

    *   How to define different game states using a game state manager

    *   How to switch between game states depending on the player’s actions


    # 19. Storing and Recalling Game Data


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​19](http://dx.doi.org/10.1007/978-1-4842-0650-8_19))
    contains supplementary material, which is available to authorized users.


    Many games consist of different levels. Casual games such as puzzles and maze
    games may have several hundreds of levels. Until now, your games have relied on
    randomness to keep the gameplay interesting. Although randomness is a powerful
    tool to achieve replayability, in a lot of cases game designers want more control
    over how a game progresses. This control is generally achieved by designing levels.
    Each level is its own game world in which the player has to achieve some sort
    of objective.


    With the tools you’ve used until now, for each level in a game you write a specific
    class in which you fill that specific level with game objects and add the behavior
    you want. This approach has a few disadvantages. The most important disadvantage
    is that you’re mixing the game logic (gameplay, win condition, and so on) with
    the game content. This means every time you want to add another level to the game,
    you have to write a new class, which leads to a lot of extra time spent on development.
    Furthermore, if a game designer wants to add a level to a game that you built,
    the designer needs in-depth knowledge of how your code works. And any mistake
    the designer makes in writing the code will result in bugs or crashes in your
    game.


    A much better approach is to store level information separately from the actual
    game code. While the game is loading, this level information is retrieved. Ideally,
    the information needs to be stored in a simple format that non-programmers can
    understand and work with. That way, levels can be designed by someone without
    that person having to know how the game converts the data into playable game levels.
    The most convenient way to store the level information is in a text format. You
    can use text very easily to describe a level. Have a look at the following example:


    `RHBQKBHR`


    `PPPPPPPP`


    `........`


    `........`


    `........`


    `........`


    `pppppppp`


    `rhbqkbhr`


    This text data describes the starting position in the Chess game, where each character
    represents a chess piece (lowercase for white pieces and uppercase for black pieces).
    If you create a chess game that reads such a description from a file, you can
    very easily modify the file to allow for different starting points. For example,
    you could let a designer create a number of different classic chess situations
    taken from actual games between chess masters. You wouldn’t have to make any changes
    to your game code. You could even decide to create a superchess game and make
    the board bigger, by adding columns and rows (assuming that the code loading the
    game data supports this). All this can be done without knowing how the Chess game
    actually works. Because it is simple text, the format is relatively easy to understand,
    even for someone with little or no programming experience. You can adopt this
    technique to create various levels for your game without any code modification.
    This is especially useful for bigger games, which generally will also have a bigger
    team of people involved. By separating out level design from code writing, you
    allow non-programmers who excel at tasks such as game design and graphics design
    to help you more effectively create awesome games.


    You will deal with the different levels in Penguin Pairs in a similar fashion.
    In this chapter, you will see how to build such a level-loading scheme into your
    games. Another thing you will look at is storing and recalling the state of the
    different game over sessions. Games such as Painter and Tut’s Tomb don’t retain
    any information from previous times when the player played the game, which in
    those games doesn’t really matter. In the case of Penguin Pairs, it does matter
    because you don’t want the player to have to start all over every time the game
    is launched. If the player finishes a level, the app should remember it the next
    time the player launches the game, so the player can continue where they left
    off.'
  trans: "\n# 关卡菜单状态\n\n一个稍微复杂一点的游戏状态是关卡菜单。你希望玩家能够从一组关卡按钮中选择一个关卡。这些关卡按钮需要显示三种不同的状态，因为一个关卡可能处于锁定、解锁但尚未通关、或已通关这三种状态。为了实现这一点，你需要某种在游戏运行之间持久存储的机制，这将在下一章讨论。\n\
    \n在你创建 `LevelMenuState` 类之前，你需要添加一个名为 `LevelButton` 的类，它继承自 `Button`。在 `LevelButton`\
    \ 类中，你需要追踪该按钮对应的关卡索引，以及该关卡是已通关、未通关还是对玩家锁定。根据关卡状态，按钮应具有不同的外观。因为按钮有三种不同的状态，你需要加载三种纹理，每种状态对应一种纹理。简而言之，以下是\
    \ `LevelButton` 中定义的存储属性：\n\n```\nvar levelIndex = 0\nvar locked = SKTexture(imageNamed:\
    \ \"spr_level_locked\")\nvar unsolved = SKTexture(imageNamed: \"spr_level_unsolved\"\
    )\nvar solved = SKTexture(imageNamed: \"spr_level_solved\")\n```\n\n稍后，你将修改 `LevelButton`\
    \ 类，使其根据关卡状态显示其中一种纹理。目前，你只需在按钮创建时显示未通关纹理。此外，在初始化器中添加一个文本标签，绘制在企鹅的肚子上，这样玩家就能看到每个按钮对应的关卡，如下所示：\n\
    \n```\nlet textLabel = SKLabelNode(fontNamed: \"Helvetica\")\ntextLabel.position\
    \ = CGPoint(x: 0, y: -25)\ntextLabel.fontColor = UIColor(red: 0, green: 0, blue:\
    \ 0.4, alpha: 1)\ntextLabel.fontSize = 24\ntextLabel.text = String(levelIndex)\n\
    textLabel.horizontalAlignmentMode = .Center\ntextLabel.zPosition = Layer.Overlay\n\
    self.addChild(textLabel)\n```\n\n最后，在 `handleInput` 方法中，你检查按钮是否被点击。如果玩家点击了关卡按钮，且该关卡未被锁定，游戏应切换到对应的关卡。假设索引为\
    \ x 的关卡名称为 `\"levelx\"`。同时，当玩家切换到某个关卡时，你可能需要重置该关卡，以便玩家能够立即从头开始游戏。简而言之，以下是完整的 `handleInput`\
    \ 方法：\n\n```\noverride func handleInput(inputHelper: InputHelper) {\n    super.handleInput(inputHelper)\n\
    \    if self.texture == locked {\n        return\n    }\n    if tapped {\n   \
    \     GameStateManager.instance.switchTo(\"level\\(levelIndex)\")\n        GameStateManager.instance.reset()\n\
    \    }\n}\n```\n\n请注意，在 PenguinPairs3 示例中，这个方法实际上被注释掉了，因为还没有关卡状态。\n\n正如你所见，只要事先考虑好软件的设计，为游戏添加不同的状态并在它们之间切换并不困难。通过提前思考需要哪些类以及游戏功能如何在它们之间分配，你可以在之后节省大量时间。在下一章中，你将通过创建实际的关卡来进一步扩展这个示例。图\
    \ 18-1 展示了关卡菜单状态的截图。\n\n![A978-1-4842-0650-8_18_Fig1_HTML.jpg](img/A978-1-4842-0650-8_18_Fig1_HTML.jpg)\n\
    \n**图 18-1.** 企鹅配对游戏中的关卡菜单界面\n\n## 本章所学内容\n\n在本章中，你学习了以下内容：\n\n- 什么是设计模式以及单例模式提供了什么\n\
    - 如何使用游戏状态管理器定义不同的游戏状态\n- 如何根据玩家的操作在游戏状态之间切换\n\n# 19. 存储和读取游戏数据\n\n电子补充材料 本章在线版本\
    \ (doi:[10.​1007/​978-1-4842-0650-8_​19](http://dx.doi.org/10.1007/978-1-4842-0650-8_19))\
    \ 包含补充材料，仅供授权用户使用。\n\n许多游戏由不同的关卡组成。像解谜游戏和迷宫游戏这样的休闲游戏可能有数百个关卡。到目前为止，你的游戏都依赖随机性来保持游戏的可玩性。虽然随机性是实现可重复游玩的强大工具，但在许多情况下，游戏设计师希望更精确地控制游戏进程。这种控制通常通过设计关卡来实现。每个关卡都是一个独立的游戏世界，玩家需要在其中达成某种目标。\n\
    \n使用你目前掌握的工具，你需要为游戏中的每个关卡编写一个特定的类，在其中填充该关卡的游戏对象，并添加所需的行为。这种方法有几个缺点。最重要的缺点是，你将游戏逻辑（玩法、胜利条件等）与游戏内容混合在一起。这意味着每次你想为游戏增加一个关卡时，都必须编写一个新的类，这会大大增加开发时间。此外，如果一位游戏设计师想要在你构建的游戏中添加一个关卡，设计师需要深入了解你的代码是如何工作的。而设计师在编写代码时犯的任何错误都会导致游戏出现错误或崩溃。\n\
    \n一个更好的方法是将关卡信息与实际游戏代码分开存储。在游戏加载时，再获取这些关卡信息。理想情况下，这些信息需要以非程序员也能理解和处理的简单格式存储。这样，关卡就可以由非开发人员来设计，而无需知道游戏如何将这些数据转换为可玩的游戏关卡。存储关卡信息最便捷的方式是使用文本格式。你可以非常轻松地使用文本来描述一个关卡。请看以下示例：\n\
    \n```\nRHBQKBHR\nPPPPPPPP\n........\n........\n........\n........\npppppppp\n\
    rhbqkbhr\n```\n\n这段文本数据描述了国际象棋游戏的起始局面，其中每个字符代表一个棋子（小写字母代表白棋，大写字母代表黑棋）。如果你创建了一个能够从文件中读取此类描述的国际象棋游戏，你就可以非常轻松地修改文件，以允许不同的起始局面。例如，你可以让设计师创建一系列取自国际象棋大师实际对局的经典棋局。你无需对游戏代码做任何修改。你甚至可以决定创建一个超级国际象棋游戏，通过增加列和行来扩大棋盘（前提是加载游戏数据的代码支持这一点）。所有这些都可以在不了解国际象棋游戏实际工作原理的情况下完成。因为是简单的文本，这种格式相对容易理解，即使是对编程经验很少或没有经验的人也是如此。你可以采用这种技术为游戏创建各种关卡，而无需修改任何代码。这对于大型游戏尤其有用，因为这类游戏通常涉及更大的团队。通过将关卡设计与代码编写分离，你就能让那些擅长游戏设计和图形设计等任务的非程序员更高效地帮助你创建出色的游戏。\n\
    \n你将类似地处理企鹅配对游戏中的不同关卡。在本章中，你将看到如何将这样的关卡加载方案构建到你的游戏中。你还需要考虑的另一件事是跨游戏会话存储和读取不同游戏的状态。像《画图》和《图坦之墓》这样的游戏不会保留玩家之前游玩时的任何信息，这对于那些游戏来说无关紧要。但对于企鹅配对游戏来说，这很重要，因为你不想让玩家每次启动游戏时都要从头开始。如果玩家完成了一个关卡，应用程序应该在下次启动时记住这一点，这样玩家就可以从上次中断的地方继续游戏。\n"
- fmt: "# Structure of a Level\n\nLet’s first look at what kind of things can be in\
    \ a level in the Penguin Pairs game. First, there is some kind of background image.\
    \ Let’s assume that this background is fixed when you load the level, so there\
    \ is no need to store any information about it in the text file.\n\nIn the level\
    \ are a number of different animals, such as penguins, seals, and sharks. There\
    \ are also icebergs, background blocks that penguins can move on, and a few more\
    \ things. You want to store all this information in the level file. One possibility\
    \ is to store every object’s position and type, but that would make the variable\
    \ complicated. Another possibility is to divide the level into small blocks, also\
    \ called tiles. Every block has a certain type (this could be a penguin, a playing\
    \ field tile, a transparent tile, a seal, and so on). A tile can be represented\
    \ by a single character, and you can store the structure of the level in a text\
    \ file just like in the Chess example:\n\n```\n#.......#\n#...r...#\n#.......#\n\
    #.     .#\n#.     .#\n#.     .#\n#.......#\n#...r...#\n#.......#\n```\n\nIn this\
    \ level definition, a number of different blocks are defined. An iceberg (wall)\
    \ tile is defined by the `#` sign, a penguin by an `r` character, a background\
    \ tile by a `.` character, and an empty tile by a space character. Later on in\
    \ this chapter, you will write a method that uses this information to create the\
    \ various tiles and store them somewhere (probably in an `SKNode` instance).\n\
    \nIn addition to the tiles, you need to store a few other things for each level:\n\
    \n* A level title\n* A hint for the level\n* The number of pairs to be made\n\
    * The width and height of the level (needed for file reading purposes)\n* The\
    \ location and direction of the hint arrow\n\nSo, you can define a complete level\
    \ in a text file as follows:\n\n```\nSplash!\nDon’t let the penguins fall in the\
    \ water!\n1\n9 9\n3 7 l\n#.......#\n#...r...#\n#.......#\n#.     .#\n#.     .#\n\
    #.     .#\n#.......#\n#...r...#\n#.......#\n```\n\nFor every level, you add similar\
    \ lines of text to the text file. If you open the file `levels.txt` part of the\
    \ PenguinPairs4 example, you’ll see that it contains a number of different levels.\
    \ The very first line in the text file indicates how many levels are defined in\
    \ the text file (in the case of Penguin Pairs: 12).\n\n# Reading Data From Files\n\
    \nNow that the Penguin Pairs levels have been defined in a text file, you need\
    \ to write the code that actually reads this text file. Reading a text file in\
    \ Swift is rather straightforward. It basically consists of two steps: first you\
    \ need to define which file needs to be read, and then you can use the `String`\
    \ type, which has an initializer that reads the contents of a file. For example,\
    \ the following two lines read the `levels.txt` file:\n\n```\nlet filePath = NSBundle.mainBundle().pathForResource(\"\
    levels\", ofType:\"txt\")\nlet data = try! String(contentsOfFile: filePath!, encoding:\
    \ NSUTF8StringEncoding)\n```\n\nAfter reading the file in this way, you end up\
    \ with a string containing the entire text file. It’s useful to split this string\
    \ into multiple strings, where each string is a single line in the text file.\
    \ You can use the method `componentsSeparatedByString` for that, which divides\
    \ a string into multiple substrings stored in an array (note the use of the newline\
    \ character as a separator):\n\n```\nlet multipleStrings = data.componentsSeparatedByString(\"\
    \\n\")\n```\n\nBefore continuing to use the file data to read in the Penguin Pairs\
    \ levels, let’s design a simple class to make file reading even easier. In the\
    \ PenguinPairs4 example, you’ll find the `FileReader` class, which reads a file\
    \ and provides a means of simple access. In the initializer, a file passed as\
    \ a parameter is read, and its data is stored in an array of strings. So now you\
    \ can read a file simply by creating a `FileReader` instance. For example, in\
    \ the `GameScene` class, this is how you read the level data:\n\n```\nlet levels\
    \ = FileReader(filename: \"levels\")\n```\n\nThe next step is accessing the file\
    \ data. You can do that directly by accessing the array of strings part of the\
    \ `FileReader` instance. Another way to do this is by using an iterator design.\
    \ Basically, this means that the `FileReader` instance keeps track of which part\
    \ of the data you retrieved while it iterates through the file data. Note the\
    \ addition of the property named `it` to the `FileReader` class to keep track\
    \ of where in the string array you are reading:\n\n```\nvar it = -1\n```\n\nNext,\
    \ define a method called `nextLine`, which increments the `it` property and returns\
    \ the next line. Here is the complete method:\n\n```\nfunc nextLine() -> String\
    \ {\n    if (it >= fileData.count - 1) {\n        return \"\"\n    } else {\n\
    \        it++\n        return fileData[it]\n    }\n}\n```\n\nSo, every time you\
    \ want to read the next line in the file, you simply call the `nextLine` method\
    \ to retrieve it. Note that the interesting bit in the method is happening in\
    \ these two lines:\n\n```\nit++\nreturn fileData[it]\n```\n\nFirst, you increment\
    \ the iterator, and then you return the element in the array that the iterator\
    \ corresponds to. There is a neat trick you can apply to condense these two lines\
    \ of code into a single one. It hinges on the fact that the `++` postfix operator\
    \ returns a result. In other words, you could do something like this:\n\n```\n\
    var result = it++\n```\n\nThe `result` variable will now contain the old value\
    \ of `it`. In other words, if `it` had the value 3, then after this instruction,\
    \ `result` would contain the value 3 (`it`’s old value) and `it` would contain\
    \ the value 4. You can also do this:\n\n```\nvar anotherResult = ++it\n```\n\n\
    In this case, `anotherResult` will contain the new value of `it` (after it has\
    \ been incremented) since you used the prefix `++` operator. So if `it` was 3,\
    \ after this instruction both `it` and `anotherResult` will contain the value\
    \ 4. To go back to the file reading example, this means that you can replace the\
    \ two lines in the `nextLine` method with the following single line:\n\n```\n\
    return fileData[++it]\n```\n\nEvery time you need to read a line from the file,\
    \ you can use the `nextLine` method. For example, right after loading the file\
    \ in the `GameScene` class, you retrieve the first line of the file in order to\
    \ obtain the number of levels:\n\n```\nlet nrLevels = levels.nextLine().toInt()!\n\
    ```\n\nYou then use a `for` loop to create a state for each level:\n\n```\nfor\
    \ i in 1...nrLevels {\n    GameStateManager.instance.addChild(LevelState(fileReader:\
    \ levels, levelNr: i))\n}\n```\n\nAs you can see, you pass along the `FileReader`\
    \ instance to the `LevelState` initializer, so that each level state can retrieve\
    \ its own level data (more about that later).\n\n# The Tile Class\n\nBefore looking\
    \ into creating the actual levels, let’s first do a bit of preparation and write\
    \ a basic `Tile` class. This class is a subclass of the `SKSpriteNode` class.\
    \ For now, you don’t consider more complicated items in the level such as penguins,\
    \ seals, and sharks. You only look at background (transparent) tiles, normal tiles,\
    \ and wall (iceberg) tiles. Let’s introduce an enumerated type to represent these\
    \ different varieties of tiles:\n\n```swift\nenum TileType {\n    case Wall\n\
    \    case Background\n    case Normal\n}\n```\n\nThe `Tile` class is a basic subclass\
    \ of `SKSpriteNode`. It simply adds a property that represents the type of tile:\n\
    \n```swift\nprivate var tileTipe: TileType = .Background\n```\n\nTo accommodate\
    \ transparent tiles, you provide a `convenience` initializer that loads a wall\
    \ sprite image, and sets the node to hidden:\n\n```swift\nconvenience init() {\n\
    \    self.init(imageNamed: \"spr_wall\", type: .Background)\n    self.hidden =\
    \ true\n}\n```\n\nWhen you load the level, you create a tile for each character\
    \ and store it in a grid structure using the `GridLayout` class."
  raw: '## Structure of a Level


    Let’s first look at what kind of things can be in a level in the Penguin Pairs
    game. First, there is some kind of background image. Let’s assume that this background
    is fixed when you load the level, so there is no need to store any information
    about it in the text file.


    In the level are a number of different animals, such as penguins, seals, and sharks.
    There are also icebergs, background blocks that penguins can move on, and a few
    more things. You want to store all this information in the level file. One possibility
    is to store every object’s position and type, but that would make the variable
    complicated. Another possibility is to divide the level into small blocks, also
    called tiles. Every block has a certain type (this could be a penguin, a playing
    field tile, a transparent tile, a seal, and so on). A tile can be represented
    by a single character, and you can store the structure of the level in a text
    file just like in the Chess example:


    `#.......#`


    `#...r...#`


    `#.......#`


    `#.     .#`


    `#.     .#`


    `#.     .#`


    `#.......#`


    `#...r...#`


    `#.......#`


    In this level definition, a number of different blocks are defined. An iceberg
    (wall) tile is defined by the `#` sign, a penguin by an `r` character, a background
    tile by a `.` character, and an empty tile by a space character. Later on in this
    chapter, you will write a method that uses this information to create the various
    tiles and store them somewhere (probably in an `SKNode` instance).


    In addition to the tiles, you need to store a few other things for each level:


    *   A level title

    *   A hint for the level

    *   The number of pairs to be made

    *   The width and height of the level (needed for file reading purposes)

    *   The location and direction of the hint arrow


    So, you can define a complete level in a text file as follows:


    `Splash!`


    `Don’t let the penguins fall in the water!`


    `1`


    `9 9`


    `3 7 l`


    `#.......#`


    `#...r...#`


    `#.......#`


    `#.     .#`


    `#.     .#`


    `#.     .#`


    `#.......#`


    `#...r...#`


    `#.......#`


    For every level, you add similar lines of text to the text file. If you open the
    file `levels.txt` part of the PenguinPairs4 example, you’ll see that it contains
    a number of different levels. The very first line in the text file indicates how
    many levels are defined in the text file (in the case of Penguin Pairs: 12).


    ## Reading Data From Files


    Now that the Penguin Pairs levels have been defined in a text file, you need to
    write the code that actually reads this text file. Reading a text file in Swift
    is rather straightforward. It basically consists of two steps: first you need
    to define which file needs to be read, and then you can use the `String` type,
    which has an initializer that reads the contents of a file. For example, the following
    two lines read the `levels.txt` file:


    `let filePath = NSBundle.mainBundle().pathForResource("levels", ofType:"txt")`


    `let data = try! String(contentsOfFile: filePath!, encoding: NSUTF8StringEncoding)`


    After reading the file in this way, you end up with a string containing the entire
    text file. It’s useful to split this string into multiple strings, where each
    string is a single line in the text file. You can use the method `componentsSeparatedByString`
    for that, which divides a string into multiple substrings stored in an array (note
    the use of the newline character as a separator):


    `let multipleStrings = data.componentsSeparatedByString("\n")`


    Before continuing to use the file data to read in the Penguin Pairs levels, let’s
    design a simple class to make file reading even easier. In the PenguinPairs4 example,
    you’ll find the `FileReader` class, which reads a file and provides a means of
    simple access. In the initializer, a file passed as a parameter is read, and its
    data is stored in an array of strings. So now you can read a file simply by creating
    a `FileReader` instance. For example, in the `GameScene` class, this is how you
    read the level data:


    `let levels = FileReader(filename: "levels")`


    The next step is accessing the file data. You can do that directly by accessing
    the array of strings part of the `FileReader` instance. Another way to do this
    is by using an iterator design. Basically, this means that the `FileReader` instance
    keeps track of which part of the data you retrieved while it iterates through
    the file data. Note the addition of the property named `it` to the `FileReader`
    class to keep track of where in the string array you are reading:


    `var it = -1`


    Next, define a method called `nextLine`, which increments the `it` property and
    returns the next line. Here is the complete method:


    `func nextLine() -> String {`


    `if (it >= fileData.count - 1) {`


    `return ""`


    `} else {`


    `it++`


    `return fileData[it]`


    `}`


    `}`


    So, every time you want to read the next line in the file, you simply call the
    `nextLine` method to retrieve it. Note that the interesting bit in the method
    is happening in these two lines:


    `it++`


    `return fileData[it]`


    First, you increment the iterator, and then you return the element in the array
    that the iterator corresponds to. There is a neat trick you can apply to condense
    these two lines of code into a single one. It hinges on the fact that the ++ postfix
    operator returns a result. In other words, you could do something like this:


    `var result = it++`


    The `result` variable will now contain the old value of `it`. In other words,
    if `it` had the value 3, then after this instruction, `result` would contain the
    value 3 (`it`’s old value) and `it` would contain the value 4\. You can also do
    this:


    `var anotherResult = ++it`


    In this case, `anotherResult` will contain the new value of `it` (after it has
    been incremented) since you used the prefix ++ operator. So if `it` was 3, after
    this instruction both `it` and `anotherResult` will contain the value 4\. To go
    back to the file reading example, this means that you can replace the two lines
    in the `nextLine` method with the following single line:


    `return fileData[++it]`


    Every time you need to read a line from the file, you can use the `nextLine` method.
    For example, right after loading the file in the `GameScene` class, you retrieve
    the first line of the file in order to obtain the number of levels:


    `let nrLevels = levels.nextLine().toInt()!`


    You then use a `for` loop to create a state for each level:


    `for i in 1...nrLevels {`


    `GameStateManager.instance.addChild(LevelState(fileReader: levels, levelNr: i))`


    `}`


    As you can see, you pass along the `FileReader` instance to the `LevelState` initializer,
    so that each level state can retrieve its own level data (more about that later).


    ## The Tile Class


    Before looking into creating the actual levels, let’s first do a bit of preparation
    and write a basic `Tile` class. This class is a subclass of the `SKSpriteNode`
    class. For now, you don’t consider more complicated items in the level such as
    penguins, seals, and sharks. You only look at background (transparent) tiles,
    normal tiles, and wall (iceberg) tiles. Let’s introduce an enumerated type to
    represent these different varieties of tiles:


    `enum TileType {`


        `case Wall`


        `case Background`


        `case Normal`


    `}`


    The `Tile` class is a basic subclass of `SKSpriteNode`. It simply adds a property
    that represents the type of tile:


    `private var tileTipe: TileType = .Background`


    To accommodate transparent tiles, you provide a `convenience` initializer that
    loads a wall sprite image, and sets the node to hidden:


    `convenience init() {`


        `self.init(imageNamed: "spr_wall", type: .Background)`


        `self.hidden = true`


    `}`


    When you load the level, you create a tile for each character and store it in
    a grid structure using the `GridLayout` class.'
  trans: "\n# 关卡的结构\n\n我们先来看看《企鹅配对》游戏中一个关卡里可能包含哪些元素。首先，会有一张某种类型的背景图片。我们假设这张背景在加载关卡时就固定了，因此无需在文本文件中存储与之相关的任何信息。\n\
    \n关卡中有许多不同的动物，比如企鹅、海豹和鲨鱼。此外，还有冰山、企鹅可以行走的背景方块，以及一些其他东西。你需要将所有这些信息存储在关卡文件中。一种可能性是存储每个对象的位置和类型，但这会让变量变得复杂。另一种可能性是将关卡划分为小方块，也称为瓦片。每个瓦片都有特定的类型（可以是企鹅、游戏场地瓦片、透明瓦片、海豹等）。一个瓦片可以用单个字符来表示，你可以像国际象棋示例那样，将关卡的结构存储在文本文件中：\n\
    \n```\n#.......#\n#...r...#\n#.......#\n#.     .#\n#.     .#\n#.     .#\n#.......#\n\
    #...r...#\n#.......#\n```\n\n在这个关卡定义中，定义了许多不同的方块。冰山（墙壁）瓦片由 `#` 符号定义，企鹅由 `r` 字符定义，背景瓦片由\
    \ `.` 字符定义，空瓦片由空格字符定义。在本章后面，你将编写一个方法，利用这些信息来创建各种瓦片并将它们存储在某处（可能是一个 `SKNode` 实例中）。\n\
    \n除了瓦片，你还需要为每个关卡存储一些其他信息：\n\n*   关卡标题\n*   关卡提示\n*   需要配对的组数\n*   关卡的宽度和高度（用于文件读取）\n\
    *   提示箭头的位置和方向\n\n因此，你可以像下面这样在文本文件中定义一个完整的关卡：\n\n```\nSplash!\nDon’t let the penguins\
    \ fall in the water!\n1\n9 9\n3 7 l\n#.......#\n#...r...#\n#.......#\n#.     .#\n\
    #.     .#\n#.     .#\n#.......#\n#...r...#\n#.......#\n```\n\n对于每个关卡，你都要在文本文件中添加类似的文本行。如果你打开\
    \ PenguinPairs4 示例中的 `levels.txt` 文件，你会看到它包含了许多不同的关卡。文本文件的第一行指明了文件中定义了多少个关卡（在本例中为\
    \ 12 个）。\n\n# 从文件读取数据\n\n既然《企鹅配对》的关卡已经在文本文件中定义好了，接下来你需要编写实际读取这个文本文件的代码。在 Swift\
    \ 中读取文本文件相当直接。它基本上包含两个步骤：首先，你需要指定要读取哪个文件；然后，你可以使用 `String` 类型，它有一个可以读取文件内容的初始化器。例如，以下两行代码读取了\
    \ `levels.txt` 文件：\n\n```\nlet filePath = NSBundle.mainBundle().pathForResource(\"\
    levels\", ofType:\"txt\")\nlet data = try! String(contentsOfFile: filePath!, encoding:\
    \ NSUTF8StringEncoding)\n```\n\n通过这种方式读取文件后，你会得到一个包含整个文本文件内容的字符串。将这个字符串拆分成多个字符串非常有用，其中每个字符串对应文本文件中的一行。你可以使用\
    \ `componentsSeparatedByString` 方法来实现这一点，该方法将一个字符串分割成多个子字符串，并存储在一个数组中（注意使用换行符作为分隔符）：\n\
    \n```\nlet multipleStrings = data.componentsSeparatedByString(\"\\n\")\n```\n\n\
    在继续使用文件数据来读取《企鹅配对》关卡之前，我们先设计一个简单的类，让文件读取变得更轻松。在 PenguinPairs4 示例中，你会找到 `FileReader`\
    \ 类，它负责读取文件并提供简单的访问方式。在初始化器中，会读取作为参数传入的文件，并将其数据存储在一个字符串数组中。现在，你只需创建一个 `FileReader`\
    \ 实例就可以读取文件了。例如，在 `GameScene` 类中，就是这样读取关卡数据的：\n\n```\nlet levels = FileReader(filename:\
    \ \"levels\")\n```\n\n下一步是访问文件数据。你可以直接访问 `FileReader` 实例中的字符串数组来做到这一点。另一种方法是使用迭代器设计模式。基本上，这意味着\
    \ `FileReader` 实例在遍历文件数据时，会跟踪你已经检索到数据的哪个部分。注意，我们在 `FileReader` 类中添加了一个名为 `it`\
    \ 的属性，用于记录当前在字符串数组中的读取位置：\n\n```\nvar it = -1\n```\n\n接着，定义一个名为 `nextLine` 的方法，它会递增\
    \ `it` 属性并返回下一行。以下是完整的方法：\n\n```\nfunc nextLine() -> String {\n    if (it >= fileData.count\
    \ - 1) {\n        return \"\"\n    } else {\n        it++\n        return fileData[it]\n\
    \    }\n}\n```\n\n所以，每当你想要读取文件中的下一行时，只需调用 `nextLine` 方法即可。请注意，该方法中核心的代码在于这两行：\n\
    \n```\nit++\nreturn fileData[it]\n```\n\n首先，你递增迭代器，然后返回迭代器对应的数组元素。有一个巧妙的小技巧可以将这两行代码合并成一行。这依赖于\
    \ `++` 后置运算符会返回一个结果这一事实。换句话说，你可以这样做：\n\n```\nvar result = it++\n```\n\n现在，`result`\
    \ 变量将包含 `it` 的旧值。也就是说，如果 `it` 的值是 3，那么执行这条指令后，`result` 将包含值 3（`it` 的旧值），而 `it`\
    \ 将包含值 4。你也可以这样做：\n\n```\nvar anotherResult = ++it\n```\n\n在这种情况下，因为你使用了 `++`\
    \ 前缀运算符，`anotherResult` 将包含 `it` 的新值（递增之后的值）。所以，如果 `it` 是 3，那么执行这条指令后，`it` 和 `anotherResult`\
    \ 都将包含值 4。回到文件读取的例子，这意味着你可以将 `nextLine` 方法中的两行代码替换为下面这一行：\n\n```\nreturn fileData[++it]\n\
    ```\n\n每当你需要从文件中读取一行时，都可以使用 `nextLine` 方法。例如，在 `GameScene` 类中加载文件后，你就可以检索文件的第一行以获取关卡数量：\n\
    \n```\nlet nrLevels = levels.nextLine().toInt()!\n```\n\n然后，你使用一个 `for` 循环为每个关卡创建一个状态：\n\
    \n```\nfor i in 1...nrLevels {\n    GameStateManager.instance.addChild(LevelState(fileReader:\
    \ levels, levelNr: i))\n}\n```\n\n如你所见，你将 `FileReader` 实例传递给了 `LevelState` 的初始化器，这样每个关卡状态都可以检索自己的关卡数据（稍后会详细介绍）。\n\
    \n# Tile 类\n\n在开始创建实际的关卡之前，让我们先做一些准备工作，编写一个基础的 `Tile` 类。这个类是 `SKSpriteNode` 类的子类。目前，我们不考虑关卡中更复杂的元素，比如企鹅、海豹和鲨鱼。我们只关注背景（透明）瓦片、普通瓦片和墙壁（冰山）瓦片。让我们引入一个枚举类型来表示这些不同的瓦片种类：\n\
    \n```swift\nenum TileType {\n    case Wall\n    case Background\n    case Normal\n\
    }\n```\n\n`Tile` 类是 `SKSpriteNode` 的一个基本子类。它只是添加了一个表示瓦片类型的属性：\n\n```swift\nprivate\
    \ var tileTipe: TileType = .Background\n```\n\n为了适应透明瓦片，我们提供了一个 `convenience`\
    \ 初始化器，它会加载一个墙壁精灵图片，并将节点设置为隐藏：\n\n```swift\nconvenience init() {\n    self.init(imageNamed:\
    \ \"spr_wall\", type: .Background)\n    self.hidden = true\n}\n```\n\n当你加载关卡时，你会为每个字符创建一个瓦片，并使用\
    \ `GridLayout` 类将其存储在网格结构中。\n"
- fmt: "# The Level State\n\nIn the previous chapter, you saw how to create multiple\
    \ game states such as a title screen, a level-choice menu, and an options menu.\
    \ In this section, you add several level states. Each level state is a subclass\
    \ of `SKNode` and adds its own game objects to the world. The `LevelState` initializer\
    \ expects a `FileReader` instance (in order to read level data), as well as the\
    \ level number belonging to the level. Here is part of the `LevelState` initializer:\n\
    \n```\ninit(fileReader: FileReader, levelNr : Int) {\n    super.init()\n    self.levelNr\
    \ = levelNr\n    self.name = \"level\\(levelNr)\"\n    // to do: fill this level\
    \ with game objects according to the level data\n}\n```\n\nAs you can see, each\
    \ level gets assigned a unique name. Level 1 is called “level1”, level 2 is called\
    \ “level2”, and so on. You also need to keep track of animals such as the penguins,\
    \ seals, and sharks. You do this in a separate node stored as a property of `LevelState`\
    \ so you can look animals up quickly later.\n\n```\nvar animals = SKNode()\n```\n\
    \nNow you can start creating game objects to fill the game world. First, you add\
    \ a background image to the game world:\n\n```\nlet background = SKSpriteNode(imageNamed:\
    \ \"spr_background_level\")\nbackground.zPosition = Layer.Background\nself.addChild(background)\n\
    ```\n\nNext to this, you also add the various buttons (quit, retry, and hint)\
    \ that are a part of the level. Check the `LevelState.swift` file part of the\
    \ PenguinPairs4 example to see the code.\n\nAfter adding a background and buttons,\
    \ you can start reading the data stored in the text file. The first step is reading\
    \ the level title, help information, the number of required pairs, the level size,\
    \ and hint information, and then storing all these in local variables, to be used\
    \ later on to construct the game world:\n\n```\nlet title = fileReader.nextLine()\n\
    let help = fileReader.nextLine()\nlet nrPairs = fileReader.nextLine().toInt()!\n\
    let sizeArr = fileReader.nextLine().componentsSeparatedByString(\" \")\nlet width\
    \ = sizeArr[0].toInt()!, height = sizeArr[1].toInt()!\nlet hintArr = fileReader.nextLine().componentsSeparatedByString(\"\
    \ \")\n```\n\nThe next step is actually creating the field of tiles. For this,\
    \ define a class called `TileField`, which is a subclass of `SKNode` but it adds\
    \ a grid layout. Furthermore, it also has a method `getTileType`, which returns\
    \ the type of a tile at a certain location in the grid. Later, this method is\
    \ going to be useful for checking if a penguin has fallen off the playing field,\
    \ for example. Here is the complete class:\n\n```\nclass TileField : SKNode {\n\
    \    var layout: GridLayout\n    init(rows: Int, columns: Int, cellWidth: Int,\
    \ cellHeight: Int) {\n        layout = GridLayout(rows: rows, columns: columns,\n\
    \            cellWidth: cellWidth, cellHeight: cellHeight)\n        super.init()\n\
    \        layout.target = self\n    }\n    required init?(coder aDecoder: NSCoder)\
    \ {\n        fatalError(\"init(coder:) has not been implemented\")\n    }\n  \
    \  func getTileType(col: Int, row: Int) -> TileType {\n        if let obj = layout.at(col,\
    \ row: row) as? Tile {\n            return obj.type\n        }\n        return\
    \ .Background\n    }\n}\n```\n\nIn the `LevelState` initializer, you create the\
    \ `TileField` instance, with the appropriate height, width, and cell size:\n\n\
    ```\nlet tileDimension = 75\nvar tileField = TileField(rows: height, columns:\
    \ width,\n    cellWidth: tileDimension, cellHeight: tileDimension)\ntileField.name\
    \ = \"level\\(levelNr)_tileField\"\nself.addChild(tileField)\n```\n\nNow you can\
    \ start retrieving actual level data from the text file. The next step is reading\
    \ all the remaining lines pertaining to this level and storing them in an array\
    \ so you can iterate through the array later on:\n\n```\nvar lines: [String] =\
    \ []\nfor i in 0..<height {\n    var newLine = fileReader.nextLine()\n    while\
    \ count(newLine) < width {\n        newLine += \" \"\n    }\n    lines.append(newLine)\n\
    }\n```\n\nAs you can see, there is an additional `while` loop that adds space\
    \ characters to the line you just read. This is done to avoid problems due to\
    \ level lines not being the same width. Consider the following level definition:\n\
    \n```\n.\nr.r\n.\n```\n\nThis is a very simple level with two penguins. The width\
    \ of the level is three cells. However, in the first and last line of the level\
    \ definition, the level only has two cells defined (first a space, and then a\
    \ dot), due to the layout of the level. You could ask your level designer to add\
    \ enough spaces to the text file to make sure all lines are of equal width, but\
    \ that is risky. The level designer might forget to do it, and it’s easily addressed\
    \ in the code itself using the `while` loop. This is a good example of why you\
    \ sometimes need to write extra code to make things more robust. By adding the\
    \ `while` loop, you save the level designer a lot of headaches; it makes designing\
    \ levels a much more stable experience.\n\nNow that you have all the level data\
    \ stored in an array of strings, you use another `for` loop to go through each\
    \ of the lines and create all the tiles:\n\n```\nfor i in 0..<height {\n    var\
    \ currLine = lines[height-1-i]\n    var j = 0\n    for c in currLine {\n     \
    \   j++\n        // create the tile at row i and column j\n    }\n}\n```\n\nNote\
    \ that you start with the last line in the array. This is because the grid is\
    \ filled from bottom to top (following the direction of the y axis). Depending\
    \ on the character you are currently handling, you need to create different kinds\
    \ of game objects and add them to the tile field. You could use an `if` instruction\
    \ for that:\n\n```\nif c == \".\" {\n    // create an empty tile\n} else if c\
    \ == \" \" {\n    // create a background tile\n} else if c == \"r\" {\n    //\
    \ create a penguin tile\n} else {\n    // do something else\n}\n```\n\nIn principle,\
    \ this code would work. But you have to write the condition again and again. There\
    \ is another option that allows you to write this in a slightly cleaner way. Swift\
    \ offers a special kind of instruction for handling cases: `switch`.\n\n**Note**\n\
    \nWhen defining levels in a text-based format, you have to decide what kind of\
    \ object each character represents. These decisions influence the work of both\
    \ level designers, who have to enter the characters in the level data files, and\
    \ developers, who have to write the code to interpret that level data. This shows\
    \ how important documentation is, even during active development. A “cheat sheet”\
    \ is nice to have so that when you write this code, you don’t have to remember\
    \ all the ideas you had for level design. A cheat sheet is also useful if you\
    \ work with a designer, to make sure you’re both on the same page."
