  trans: '

    # 23. 动画


    电子辅助材料 本章在线版本（doi:[10.1007/978-1-4842-0650-8_23](http://dx.doi.org/10.1007/978-1-4842-0650-8_23)）包含仅供授权用户使用的补充材料。


    在本章中，你将学习如何为游戏添加动画。在你目前开发的游戏中，游戏对象可以在屏幕上移动，但要添加一个像跑动角色这样的内容则更具挑战性。本章中，你将编写一个程序，让一个角色在屏幕上从左向右行走。该角色由玩家通过按下屏幕上的左右按钮来控制。


    ## 什么是动画？


    在了解如何编写一个在屏幕上行走的角色程序之前，你首先需要思考什么是动画。要理解这一点，你得回到 20 世纪 30 年代，当时几家动画工作室（包括沃尔特·迪士尼）制作了首批黑白卡通片。


    卡通片实际上是一系列快速播放的静态图像，这些图像也被称为帧。电视机以非常高的速率（大约每秒 25-30 次）绘制这些帧。当图像每次都有变化时，你的大脑会将其解读为运动。人脑的这一特殊功能（也被称为**似动现象**）非常有用，尤其是在编程包含移动或动画对象的游戏时。


    在你之前阅读本书开发的游戏中，你已经运用了这一功能。在游戏循环的每一次迭代中，你都会在屏幕上绘制一帧新的“画面”。通过每次在不同位置绘制精灵，你便营造出精灵在移动的假象。然而，这并非真正发生的情况：你只是每秒多次在不同位置绘制精灵，这让玩家认为精灵在移动。


    类似地，你可以绘制一个行走或奔跑的角色。除了移动精灵之外，你每次还会绘制一个略有不同的精灵。通过绘制一系列精灵（每个精灵代表行走动作的一部分），你可以创造出角色在屏幕上行走的错觉。图
    23-1 展示了这样一个精灵序列的示例。


    ![A978-1-4842-0650-8_23_Fig1_HTML.jpg](img/A978-1-4842-0650-8_23_Fig1_HTML.jpg)


    图 23-1.


    一组代表行走动作的图像序列


    ### 游戏中的动画


    在游戏中加入动画有不同的原因。当你制作 3D 游戏时，动画通常是增强真实感所必需的，但对于 2D 游戏来说，情况并非总是如此。尽管如此，动画仍能极大地丰富游戏内容。


    动画能让对象活起来。但这不一定要很复杂。一个角色简单眨眼或睁眼的动画，就能给人强烈的“角色是活的”的感觉。动画角色也更容易让人产生共鸣。如果你看像《割绳子》这样的游戏，主角（名叫奥姆诺姆）只是静静地坐在角落里。但时不时地，这个角色会做出一些有趣的动作，向你表明它在那里，并希望你给它带食物。这为玩家继续玩下去创造了非常有效的动机。


    动画还有助于将玩家的注意力吸引到某个对象、任务或事件上。例如，在按钮上添加一个小动画，能让玩家更清楚地知道他们需要按下这个按钮。一个弹跳的水滴或旋转的星星则表示应该收集或避开这个物体。动画也可以用来提供反馈。当用手指点击按钮时，按钮向下移动，这立即表明按钮点击成功了。


    然而，制作动画工作量很大。因此，需要事先仔细思考哪些地方需要动画，哪些地方可以避免，以节省时间和金钱。


    ## 纹理图集


    对于动画角色，你通常为每种运动类型设计一组精灵序列。有些动画只包含少数几个精灵。例如，Tick Tick 游戏中包含一枚飞过屏幕的火箭。这枚火箭的动画仅使用了三帧（见图
    23-2）。


    ![A978-1-4842-0650-8_23_Fig2_HTML.jpg](img/A978-1-4842-0650-8_23_Fig2_HTML.jpg)


    图 23-2.


    火箭动画的帧


    其他动画可能包含更多帧。例如，Tick Tick 游戏中的炸弹爆炸动画有 49 帧。随着你在游戏中加入更多动画，所需精灵的数量（包括 1 倍、2 倍，某些游戏甚至需要
    3 倍分辨率）会急剧增加。这会增加设备在存储所有图像数据所需内存方面的压力，同时也会增加处理能力方面的压力，以便从文件加载图像并足够快地在屏幕上显示。减少图像加载时间的一个非常常见的技巧是将多个精灵放在同一张图像上。例如，你可以将开始画面所需的所有按钮放在同一个文件中，当需要显示某个按钮时，就展示图像中代表该按钮的那部分。SpriteKit
    框架为此提供了一个简洁的解决方案，称为纹理图集。纹理图集本质上是一组精灵/纹理，它以尽可能少的图像文件进行最优存储。如果你的游戏中有大量图像，纹理图集有助于游戏加载速度显著提升。好处在于，作为开发者，你无需担心精灵在图像文件中是如何存储的。你只需告诉
    Xcode 环境，某个文件夹中的所有精灵都属于一个图集。


    要在 Xcode 中使用纹理图集，你只需将精灵放在一个名称以`.atlas`结尾的文件夹中，然后将该文件夹拖入项目即可。例如，在本章附带的 AnimationSample
    项目中，你可以看到两个图集：`spr_player_run.atlas` 和 `spr_player_idle.atlas`（分别代表奔跑和待机动画）。如果你查看
    `spr_player_run.atlas` 的内部，会发现它包含了不少不同的精灵。对于纹理图集，你需要记住一个重要的命名约定：如果你使用不同分辨率的精灵，应在文件名末尾添加“@1x”、“@2x”或“@3x”来表示精灵的分辨率。除此之外，你可以选择任何你喜欢的精灵名称。在本例中，将每个精灵命名为与其图集名称相同，加上一个数字，然后注明精灵的分辨率。


    在代码中创建纹理图集非常简单。以下是通过 `spr_player_run.atlas` 文件创建纹理图集的方法：


    ```

    let atlas = SKTextureAtlas(named: "spr_player_run")

    ```


    现在，你可以按如下方式访问图集中的特定纹理：


    ```

    let texture = atlas.textureNamed("spr_player_run0")

    ```


    图集中的纹理名称对应于你给文件起的名称（不包括分辨率标识）。然后，你可以使用此纹理创建一个节点并将其添加到游戏世界中：


    ```

    let spriteNode = SKSpriteNode(texture: texture)

    addChild(spriteNode)

    ```

    '
- fmt: "# The Animation Class\n\nFor animated characters, you usually design one sequence\
    \ of sprites for each type of movement. The example in Figure [23-1](#A978-1-4842-0650-8_23_Chapter.html#Fig1)\
    \ is the sequence for animating a running character. This is where texture atlases\
    \ are a very useful tool. You can define each frame as a separate sprite in a\
    \ texture atlas. In the AnimationSample project, I did exactly this. As a next\
    \ step, let’s design a few useful classes and methods for loading and playing\
    \ animations. The basic class for representing animations is called `Animation`,\
    \ and it is a part of the AnimationSample project. In addition to sprites stored\
    \ in a texture atlas, an animation requires extra information. For example, you\
    \ want to indicate how long each frame should be shown on the screen. You also\
    \ want to be able to loop your animation, meaning that once you reach the last\
    \ frame, you immediately move back to the first frame again, leading to a continuous,\
    \ infinite animation. Looping an animation is very useful: in the case of a walking\
    \ character, for instance, you only have to draw one walk cycle and then loop\
    \ the animation to get a continuous walking motion. Not all animations should\
    \ be looped, though. For example, a dying animation shouldn’t be looped (that\
    \ would be very cruel to the character). To deal with all these situations, the\
    \ `Animation` class has a number of properties. Here is a part of the class:\n\
    \n```\nclass Animation: SKSpriteNode {\n\n    var action = SKAction()\n\n    init(atlasNamed:\
    \ String, looping: Bool, frameTime: NSTimeInterval) {\n        // to do\n    }\n\
    \n    required init?(coder aDecoder: NSCoder) {\n        fatalError(\"init(coder:)\
    \ has not been implemented\")\n    }\n\n    ...\n}\n```\n\nAs you can see, the\
    \ `Animation` class is a subclass of `SKSpriteNode`. So, if you create an instance\
    \ of `Animation`, you can directly add it to the game world. The `Animation` class\
    \ has one single property, `action`. It refers to the action that plays the actual\
    \ animation. The action is created in the initializer. As you can see, the initializer\
    \ expects a few parameters: the name of the atlas that contains the animation\
    \ frames, a Boolean indicating whether the animation should be looping or not,\
    \ and the time between consecutive frames. Depending on the values of these parameters,\
    \ you will create a different animation action.\n\nThe first step is loading the\
    \ texture atlas. For convenience, let’s also store the number of textures that\
    \ the atlas contains in a variable:\n\n```\nlet atlas = SKTextureAtlas(named:\
    \ atlasNamed)\nlet numImages = atlas.textureNames.count\n```\n\nNow, let’s extract\
    \ all the textures from this atlas and store them in an array. Later on, you can\
    \ define an action that uses this array of texture to produce the animation. First,\
    \ declare and initialize an array of `SKTexture` objects:\n\n```\nvar frames:\
    \ [SKTexture] = []\n```\n\nThe next step is to retrieve all the textures from\
    \ the atlas. This is where the naming of the animation frames is useful. Let’s\
    \ use a `for` loop to retrieve all the frames and add them to the array of textures:\n\
    \n```\nfor i in 0..<numImages/2 {\n    let textureName = \"\\(atlasNamed)_\\(i)\"\
    \n    frames.append(atlas.textureNamed(textureName))\n}\n```\n\nA few things happen\
    \ in this bit of code. First, there is a variable `i` in the range between 0 and\
    \ `numImages/2`. The reason you need to divide the number of images in the atlas\
    \ by two is because the atlas contains images for both the 1x and 2x resolution.\
    \ Inside the `for` loop, you first construct the texture name by adding a number\
    \ behind the name of the atlas. Then, you use the `textureNamed` method to retrieve\
    \ the actual texture and append it to the array of textures.\n\nNow you can call\
    \ the initializer of the superclass. The node is initialized with the first texture\
    \ in the array:\n\n```\nsuper.init(texture: frames[0], color: UIColor.whiteColor(),\n\
    \           size: frames[0].size())\n```\n\nThen, you need to create the actual\
    \ action that animates the node, as follows:\n\n```\nlet animateAction = SKAction.animateWithTextures(frames,\n\
    \                      timePerFrame: frameTime)\n```\n\nDepending on whether the\
    \ animation should loop, you need to repeat the action indefinitely. This is handled\
    \ in the following `if` instruction:\n\n```\nif looping {\n    action = SKAction.repeatActionForever(animateAction)\n\
    } else {\n    action = animateAction\n}\n```\n\n# Supporting Multiple Animations\n\
    \nThe `Animation` class provides the groundwork for representing an animation.\
    \ An animated game object may contain a number of different animations, so you\
    \ can have a character that can perform different (animated) actions such as walking,\
    \ running, jumping, and more. Each action is represented by an animation. Depending\
    \ on the player input, you change the animation that is currently active. Let’s\
    \ define a class that makes it easy to deal with multiple animations. In the AnimationSample\
    \ project, this class is called `AnimatedNode`.\n\nTo store the different animations,\
    \ you use an array. For each animation you need, you add an instance of the `Animation`\
    \ class to the array. So, `AnimatedNode` has the following property:\n\n```\n\
    var animations : [Animation] = []\n```\n\nTo make loading and playing animations\
    \ more convenient, you add two methods to the class, `loadAnimation` and `playAnimation`.\
    \ The first method creates an `Animation` object and adds it to the `animations`\
    \ property:\n\n```\nfunc loadAnimation(atlasNamed: String, looping: Bool = false,\n\
        frameTime: NSTimeInterval = 0.05, name: String,\n    anchorPoint: CGPoint\
    \ = CGPoint(x: 0.5, y: 0)) {\n    let anim = Animation(atlasNamed: atlasNamed,\
    \ looping: looping, frameTime: frameTime)\n    anim.name = name\n    anim.anchorPoint\
    \ = anchorPoint\n    animations.append(anim)\n}\n```\n\nThe `loadAnimation` method\
    \ expects a few parameters, some of which have default values for convenience.\
    \ First, you need to provide the name of the atlas that is used for the animation.\
    \ Then, you can indicate whether the animation should be looping, and the time\
    \ between frames. Also, each animation needs to have a unique name, so that you\
    \ can retrieve and activate it later on. Finally, you can optionally provide an\
    \ anchor point for the node that is created. Here, the anchor point is set to\
    \ the bottom middle of the sprite by default. In the case of Tick Tick, this is\
    \ a useful default value, since animated characters such as the player will walk\
    \ over tiles. Having the sprite origin at the bottom center makes calculations\
    \ a bit easier, as you’ll see later.\n\nIn the method body, you create the `Animation`\
    \ instance, assign it a name and set its anchor point, and finally, you add it\
    \ to the array of animations.\n\nIn the `playAnimation` method, you have to select\
    \ the animation that needs to be played, add it to the node, and start the animation\
    \ action. First, you check whether the animation you want to play is already a\
    \ child of the node. In that case, the animation is already playing and you don’t\
    \ have to do anything else, so you can return from the method:\n\n```\nfunc playAnimation(name:\
    \ String) {\n    if childNodeWithName(name) != nil {\n        return\n    }\n\
        ...\n}\n```\n\nNext, you use a `for` loop to find the animation with the chosen\
    \ name. Once you have found it, you remove any children that this node has, add\
    \ the animation to the node, and start the action:\n\n```\nfor anim in animations\
    \ {\n    if anim.name == name {\n        self.removeAllChildren()\n        self.addChild(anim)\n\
            anim.runAction(anim.action)\n        return\n    }\n}\n```"
