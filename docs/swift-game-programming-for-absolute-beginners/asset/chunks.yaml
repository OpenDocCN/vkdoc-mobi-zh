        `var nrTouches = 0`


        `var hasTapped: Bool = false`


        `func isTouching() -> Bool {`


            `return nrTouches > 0`


        `}`


    `}`


    In the `GameScene` class, you add a property of type `InputHelper`, as follows:


    `var inputHelper = InputHelper()`


