- fmt: "# Building Your First Swift Program\n\nIn this section, you will learn how\
    \ to create a simple program in the Swift language (see also the `HelloWorld`\
    \ example belonging to this chapter). Since you are going to use the Xcode development\
    \ environment, start by launching the `Xcode` program. Click **Create a new Xcode\
    \ Project**, displayed on the welcome screen. A dialog will appear that will allow\
    \ you to choose between several template projects. By default, Xcode has templates\
    \ for iOS projects (applications that run on iPhones or iPads), watchOS projects\
    \ (applications that run on the Watch) and OS X projects (applications that run\
    \ on Macs). Let’s start by creating a simple OS X console application. In order\
    \ to do this, click the **Application** item under OS X, and select the **Command\
    \ Line Tool** project template (see Figure [1-2](#A978-1-4842-0650-8_1_Chapter.html#Fig2)).\n\
    \n![A978-1-4842-0650-8_1_Fig2_HTML.jpg](A978-1-4842-0650-8_1_Fig2_HTML.jpg)\n\n\
    **Figure 1-2.** The project template selection dialog\n\nA command line tool (also\
    \ called a console application) is one of the most basic types of programs that\
    \ exist. A command line tool is a simple program that reads and/or outputs text.\n\
    \nAfter you select the **Command Line Tool** option, click the **Next** button.\
    \ Then, choose a product name (for example, `HelloWorld`). In that same window,\
    \ make sure that the language selected for the project is Swift. After clicking\
    \ **Next**, you must select a folder in which the project and the code will be\
    \ stored; for example, you could save it to the Desktop. After you’ve selected\
    \ a location for your project, click **Create**. You just created a basic project\
    \ in which you can write code.\n\nOn the left side, you see the items associated\
    \ with the project. There are two folders. One folder contains an item called\
    \ `main.swift`, which is a text file containing the instructions that make up\
    \ the program. The second folder (called `Products`) contains a single item carrying\
    \ the name that you chose for the product. This item has a command line tool icon,\
    \ meaning that the product that is created with the project is a command line\
    \ tool.\n\nIf you click the item `main.swift`, you see that the file is opened\
    \ in an editor. The template project has already added a few lines of code for\
    \ you as a starting point. The most important line is the following one:\n\n`print(\"\
    Hello, World!\")`\n\nThis instruction tells the computer to write a line of text\
    \ to the console. The text that should be written can be found between the parentheses.\
    \ In Swift, any text expression is always written between double quotes. To see\
    \ what this program does, click the **Play** button in the top left of the Xcode\
    \ window (see Figure [1-3](#A978-1-4842-0650-8_1_Chapter.html#Fig3)). This compiles\
    \ the program and runs it. When the program runs, you will see its output in the\
    \ debug area at the bottom of the Xcode window (also shown in Figure [1-3](#A978-1-4842-0650-8_1_Chapter.html#Fig3)).\
    \ If you don’t see a debug area, activate it by clicking the corresponding view\
    \ button in the top right of the Xcode window. In Figure [1-3](#A978-1-4842-0650-8_1_Chapter.html#Fig3),\
    \ you can see three view buttons in the top right of the window. The left one\
    \ shows or hides the part of the window that lists the files and folders in the\
    \ project. The right one toggles the panel showing the project properties. Finally,\
    \ the middle one shows or hides the debug area. After the program has run, you’ll\
    \ see that the text `Hello, World!` has appeared there, as well as a message that\
    \ the program has finished execution.\n\n![A978-1-4842-0650-8_1_Fig3_HTML.jpg](A978-1-4842-0650-8_1_Fig3_HTML.jpg)\n\
    \n**Figure 1-3.** A screenshot of the Xcode environment right after the program\
    \ `HelloWorld` has been executed\n\nYou can now start changing the code to change\
    \ what the program is doing. For example, add the following line to your code:\n\
    \n`print(\"Goodbye, World!\")`\n\nWhen you run this program, two lines are printed\
    \ in the debug area. Now change the code to the following two lines:\n\n`print(\"\
    Hello, World!\", appendNewline: false)`\n\n`print(\"Goodbye, World!\")`\n\nWhen\
    \ you run this program, you’ll see that the two texts are written behind each\
    \ other. This is because `print` adds a line break after writing the text to the\
    \ console, unless you say otherwise (which is what I did in the first `print`\
    \ instruction above). The last program you executed consists of two instructions.\
    \ Each instruction tells the compiler to execute a function (or method) that consists\
    \ of other instructions. `print` is an example of a function. Here you can clearly\
    \ see that Swift is indeed a procedural language. Instructions are grouped in\
    \ functions/methods.\n\nYou can group your own instructions into your own functions/methods\
    \ very easily. Have a look at the following program:\n\n```\nfunc printData()\
    \ {\n    print(\"Name: Shirley\")\n    print(\"Age: 26\")\n    print(\"Profession:\
    \ Teacher\")\n    print(\"Married: yes\")\n    print(\"Children: 2\")\n}\n\nprintData()\n\
    printData()\nprintData()\n```\n\nIn this example, I created a function that groups\
    \ five instructions together. You create a function by using the `func` keyword\
    \ and a name. After the name, you write parentheses (more about that later). The\
    \ instructions that belong to the function are written between braces: `{` and\
    \ `}`. After defining this function, you can call the function by writing its\
    \ name and a pair of parentheses. In this example, I call the `printData` function\
    \ three times. The result is that the instructions that make up the function are\
    \ all executed three times. Enter the code above in the editor and see for yourself\
    \ what it is doing. Can you modify the program so that the data is printed six\
    \ times? Now modify the program so that the country where the person lives is\
    \ also printed. Try to add a second function that displays the data of another\
    \ person. Can you change the program so that it alternatively shows data of these\
    \ two different persons?\n\nIf you take another look at the program, perhaps you\
    \ realize that there is a difference between defining a function and executing\
    \ the instructions written inside a function. In the program above, the first\
    \ part defines a function; the second part executes (or calls) a function. Whenever\
    \ you call a function, you always need to write parentheses behind the function\
    \ call, like so:\n\n`printData()`\n\nThe reason that these parentheses are there\
    \ is because sometimes functions need extra information in order to be able to\
    \ do their work. A good example of this is the `print` function, which requires\
    \ text as extra information. After all, what good is a printing function if you\
    \ can’t tell it what it is supposed to print? Just like the `printData` function,\
    \ the `print` function also has parentheses behind it when it is called. The difference\
    \ is that in the case of `print`, there is actually information between the parentheses,\
    \ namely the text that should be printed:\n\n`print(\"Hello, World!\")`\n\nLater\
    \ on, you will see many more examples of functions and how they are called. Since\
    \ this book is about programming games, let’s now make an actual iOS game application."
  raw: '## Building Your First Swift Program


    In this section, you will learn how to create a simple program in the Swift language
    (see also the HelloWorld example belonging to this chapter). Since you are going
    to use the Xcode development environment, start by launching the Xcode program.
    Click Create a new Xcode Project, displayed on the welcome screen. A dialog will
    appear that will allow you to choose between several template projects. By default,
    Xcode has templates for iOS projects (applications that run on iPhones or iPads),
    watchOS projects (applications that run on the Watch) and OS X projects (applications
    that run on Macs). Let’s start by creating a simple OS X console application.
    In order to do this, click the Application item under OS X, and select the Command
    Line Tool project template (see Figure [1-2](#A978-1-4842-0650-8_1_Chapter.html#Fig2)).


    ![A978-1-4842-0650-8_1_Fig2_HTML.jpg](A978-1-4842-0650-8_1_Fig2_HTML.jpg)


    Figure 1-2.


    The project template selection dialog


    A command line tool (also called a console application) is one of the most basic
    types of programs that exist. A command line tool is a simple program that reads
    and/or outputs text.


    After you select the Command Line Tool option, click the Next button. Then, choose
    a product name (for example, HelloWorld). In that same window, make sure that
    the language selected for the project is Swift. After clicking Next, you must
    select a folder in which the project and the code will be stored; for example,
    you could save it to the Desktop. After you’ve selected a location for your project,
    click Create. You just created a basic project in which you can write code.


    On the left side, you see the items associated with the project. There are two
    folders. One folder contains an item called `main.swift`, which is a text file
    containing the instructions that make up the program. The second folder (called
    `Products`) contains a single item carrying the name that you chose for the product.
    This item has a command line tool icon, meaning that the product that is created
    with the project is a command line tool.


    If you click the item `main.swift`, you see that the file is opened in an editor.
    The template project has already added a few lines of code for you as a starting
    point. The most important line is the following one:


    `print("Hello, World!")`


    This instruction tells the computer to write a line of text to the console. The
    text that should be written can be found between the parentheses. In Swift, any
    text expression is always written between double quotes. To see what this program
    does, click the Play button in the top left of the Xcode window (see Figure [1-3](#A978-1-4842-0650-8_1_Chapter.html#Fig3)).
    This compiles the program and runs it. When the program runs, you will see its
    output in the debug area at the bottom of the Xcode window (also shown in Figure
    [1-3](#A978-1-4842-0650-8_1_Chapter.html#Fig3)). If you don’t see a debug area,
    activate it by clicking the corresponding view button in the top right of the
    Xcode window. In Figure [1-3](#A978-1-4842-0650-8_1_Chapter.html#Fig3), you can
    see three view buttons in the top right of the window. The left one shows or hides
    the part of the window that lists the files and folders in the project. The right
    one toggles the panel showing the project properties. Finally, the middle one
    shows or hides the debug area. After the program has run, you’ll see that the
    text Hello, World! has appeared there, as well as a message that the program has
    finished execution.


    ![A978-1-4842-0650-8_1_Fig3_HTML.jpg](A978-1-4842-0650-8_1_Fig3_HTML.jpg)


    Figure 1-3.


    A screenshot of the Xcode environment right after the program HelloWorld has been
    executed


    You can now start changing the code to change what the program is doing. For example,
    add the following line to your code:


    `print("Goodbye, World!")`


    When you run this program, two lines are printed in the debug area. Now change
    the code to the following two lines:


    `print("Hello, World!", appendNewline: false)`


    `print("Goodbye, World!")`


    When you run this program, you’ll see that the two texts are written behind each
    other. This is because print adds a line break after writing the text to the console,
    unless you say otherwise (which is what I did in the first print instruction above).
    The last program you executed consists of two instructions. Each instruction tells
    the compiler to execute a function (or method) that consists of other instructions.
    print is an example of a function. Here you can clearly see that Swift is indeed
    a procedural language. Instructions are grouped in functions/methods.


    You can group your own instructions into your own functions/methods very easily.
    Have a look at the following program:


    `func printData() {`


    `print("Name: Shirley")`


    `print("Age: 26")`


    `print("Profession: Teacher")`


    `print("Married: yes")`


    `print("Children: 2")`


    `}`


    `printData()`


    `printData()`


    `printData()`


    In this example, I created a function that groups five instructions together.
    You create a function by using the `func` keyword and a name. After the name,
    you write parentheses (more about that later). The instructions that belong to
    the function are written between braces: `{` and `}`. After defining this function,
    you can call the function by writing its name and a pair of parentheses. In this
    example, I call the `printData` function three times. The result is that the instructions
    that make up the function are all executed three times. Enter the code above in
    the editor and see for yourself what it is doing. Can you modify the program so
    that the data is printed six times? Now modify the program so that the country
    where the person lives is also printed. Try to add a second function that displays
    the data of another person. Can you change the program so that it alternatively
    shows data of these two different persons?


    If you take another look at the program, perhaps you realize that there is a difference
    between defining a function and executing the instructions written inside a function.
    In the program above, the first part defines a function; the second part executes
    (or calls) a function. Whenever you call a function, you always need to write
    parentheses behind the function call, like so:


    `printData()`


    The reason that these parentheses are there is because sometimes functions need
    extra information in order to be able to do their work. A good example of this
    is the `print` function, which requires text as extra information. After all,
    what good is a printing function if you can’t tell it what it is supposed to print?
    Just like the `printData` function, the `print` function also has parentheses
    behind it when it is called. The difference is that in the case of `print`, there
    is actually information between the parentheses, namely the text that should be
    printed:


    `print("Hello, World!")`


    Later on, you will see many more examples of functions and how they are called.
    Since this book is about programming games, let’s now make an actual iOS game
    application.'
  trans: "\n# 构建你的第一个 Swift 程序\n\n在本节中，你将学习如何使用 Swift 语言创建一个简单的程序（另请参见本章附带的 `HelloWorld`\
    \ 示例）。由于你将使用 Xcode 开发环境，请先启动 `Xcode` 程序。点击欢迎屏幕上显示的 **Create a new Xcode Project**。此时会弹出一个对话框，允许你在多个模板项目之间进行选择。默认情况下，Xcode\
    \ 提供了 iOS 项目（在 iPhone 或 iPad 上运行的应用程序）、watchOS 项目（在 Apple Watch 上运行的应用程序）和 OS\
    \ X 项目（在 Mac 上运行的应用程序）的模板。我们先创建一个简单的 OS X 控制台应用程序。为此，请单击 OS X 下的 **Application**\
    \ 项，然后选择 **Command Line Tool** 项目模板（见图 1-2）。\n\n![A978-1-4842-0650-8_1_Fig2_HTML.jpg](img/A978-1-4842-0650-8_1_Fig2_HTML.jpg)\n\
    \n**图 1-2.** 项目模板选择对话框\n\n命令行工具（也称为控制台应用程序）是现有最基本的程序类型之一。命令行工具是一个简单的程序，用于读取和/或输出文本。\n\
    \n选择 **Command Line Tool** 选项后，点击 **Next** 按钮。然后，选择一个产品名称（例如 `HelloWorld`）。在同一个窗口中，确保为项目选择的语言是\
    \ Swift。点击 **Next** 后，你必须选择一个用于存放项目和代码的文件夹；例如，你可以将其保存到桌面。选定项目位置后，点击 **Create**。你就创建好了一个可以编写代码的基本项目。\n\
    \n在左侧，你会看到与项目关联的项。有两个文件夹。一个文件夹包含一个名为 `main.swift` 的项，这是一个包含程序指令的文本文件。第二个文件夹（名为\
    \ `Products`）包含一个项，其名称就是你为产品选择的名称。此项带有一个命令行工具图标，这意味着该项目创建出的产品是一个命令行工具。\n\n如果你点击\
    \ `main.swift` 项，会看到该文件在编辑器中打开。模板项目已经为你添加了几行代码作为起点。其中最重要的一行是：\n\n`print(\"Hello,\
    \ World!\")`\n\n这条指令告诉计算机向控制台写入一行文本。需要写入的文本位于括号之间。在 Swift 中，任何文本表达式都始终写在双引号之间。要查看此程序的作用，请点击\
    \ Xcode 窗口左上角的 **Play** 按钮（见图 1-3）。这会编译并运行该程序。程序运行时，你将在 Xcode 窗口底部的调试区域看到其输出（也显示在图\
    \ 1-3 中）。如果你看不到调试区域，请点击 Xcode 窗口右上角对应的视图按钮来激活它。在图 1-3 中，你可以在窗口右上角看到三个视图按钮。左侧按钮显示或隐藏列出项目中文件和文件夹的窗口部分。右侧按钮切换显示项目属性的面板。中间的按钮显示或隐藏调试区域。程序运行后，你会看到文本\
    \ `Hello, World!` 出现在那里，同时还有一条消息显示程序已执行完毕。\n\n![A978-1-4842-0650-8_1_Fig3_HTML.jpg](img/A978-1-4842-0650-8_1_Fig3_HTML.jpg)\n\
    \n**图 1-3.** `HelloWorld` 程序执行后 Xcode 环境的截图\n\n现在你可以开始修改代码来改变程序的行为。例如，在你的代码中添加以下一行：\n\
    \n`print(\"Goodbye, World!\")`\n\n当你运行此程序时，调试区域会打印出两行。现在将代码修改为以下两行：\n\n`print(\"\
    Hello, World!\", appendNewline: false)`\n\n`print(\"Goodbye, World!\")`\n\n运行此程序后，你会看到两段文本被写在一起。这是因为\
    \ `print` 函数会在向控制台写入文本后添加一个换行符，除非你另有指定（这就是我在上面第一个 `print` 指令中所做的）。你执行的最后一个程序由两个指令组成。每个指令告诉编译器执行一个由其他指令组成的函数（或方法）。`print`\
    \ 就是一个函数的例子。这里你可以清楚地看到 Swift 确实是一种过程式语言。指令被分组到函数/方法中。\n\n你可以非常轻松地将自己的指令分组到自己的函数/方法中。看一下下面的程序：\n\
    \n```\nfunc printData() {\n    print(\"Name: Shirley\")\n    print(\"Age: 26\"\
    )\n    print(\"Profession: Teacher\")\n    print(\"Married: yes\")\n    print(\"\
    Children: 2\")\n}\n\nprintData()\nprintData()\nprintData()\n```\n\n在这个例子中，我创建了一个将五个指令组合在一起的函数。你可以使用\
    \ `func` 关键字和一个名称来创建函数。在名称之后，写上括号（关于这一点稍后会详细介绍）。属于该函数的指令写在花括号 `{` 和 `}` 之间。定义此函数后，你可以通过编写函数名加一对括号来调用它。在这个例子中，我调用了\
    \ `printData` 函数三次。结果是构成该函数的指令全部被执行了三次。在编辑器中输入上面的代码，亲自看看它的作用。你能修改程序，使数据被打印六次吗？现在修改程序，使其也打印出人物所在的国家。尝试添加第二个函数，用于显示另一个人的数据。你能修改程序，使其交替显示这两个不同人物的数据吗？\n\
    \n如果你再看一下这个程序，或许会意识到定义函数和执行函数内部编写的指令之间存在区别。在上面的程序中，第一部分定义了一个函数；第二部分执行（或调用）了一个函数。每当你调用一个函数时，你总需要在函数调用的后面写上括号，就像这样：\n\
    \n`printData()`\n\n之所以有这些括号，是因为有时函数需要额外的信息才能完成其工作。`print` 函数就是一个很好的例子，它需要文本作为额外信息。毕竟，如果一个打印函数无法被告知它应该打印什么，那它还有什么用呢？和\
    \ `printData` 函数一样，`print` 函数在被调用时后面也有括号。区别在于，对于 `print` 来说，括号之间确实有信息，即要打印的文本：\n\
    \n`print(\"Hello, World!\")`\n\n稍后，你会看到更多关于函数以及如何调用它们的示例。由于本书是关于编写游戏程序的，现在让我们实际制作一个\
    \ iOS 游戏应用程序。\n"
- fmt: "# Building Your First Swift Game\n\nIn order to get started with programming\
    \ an iOS game, you need to create a suitable project. Since iOS games do much\
    \ more than only print text, you need to create a Game project. This is very easy.\
    \ In Xcode, go to the main menu and choose **File** ➤ **New** ➤ **Project**. Then,\
    \ choose the **Game** template that you find in the iOS category. After pressing\
    \ **Next**, enter a suitable name for your game, such as `BasicGame`. Again, make\
    \ sure that `Swift` is selected as the main language. Also, make sure that `SpriteKit`\
    \ is selected as the game technology that will be used. `SpriteKit` is a collection\
    \ of functions and classes created by Apple that are useful for developing games.\
    \ Finally, select a folder where your game project and its source code should\
    \ be stored, and click **Create**. Alternatively, you can have a look at the `BasicGame`\
    \ example belonging to this chapter, which already is in the right format.\n\n\
    If you take a look at the files in the game project you just created, you see\
    \ that the basic iOS game is quite a bit more complicated than a command line\
    \ tool application. The main file where you are going to make changes to the code\
    \ is the file called `GameScene.swift`. The other files are there to set up the\
    \ right environment for iOS games. Inside the `GameScene.swift` file, you write\
    \ the code that is specific to your particular game. The most important part of\
    \ the code is the following instructions:\n\n```\nimport SpriteKit\n\nclass GameScene:\
    \ SKScene {\n\n    override func didMoveToView(view: SKView) {\n        /* Setup\
    \ your scene here */\n        let myLabel = SKLabelNode(fontNamed:\"Chalkduster\"\
    )\n        myLabel.text = \"Hello, World!\"\n        myLabel.fontSize = 65\n \
    \       myLabel.position = CGPoint(x:CGRectGetMidX(self.frame),\n        y:CGRectGetMidY(self.frame))\n\
    \n        self.addChild(myLabel)\n    }\n\n    ...\n\n}\n```\n\nWithout going\
    \ too much into detail, let’s have a look at the structure of this code. The first\
    \ instruction, `import SpriteKit`, is there to tell the compiler that the program\
    \ needs functions and classes from `SpriteKit`. This is different from using a\
    \ function such as `print`. The `print` function is built into the language itself.\
    \ Functions and classes related to dealing with sprites (images) are rather specific\
    \ and therefore they have been put in a separate collection, also called a framework.\
    \ At the beginning of a program, you may see one or more of these `import` instructions,\
    \ depending on what the program is going to need.\n\nAfter the framework import\
    \ instruction, you see a class. This is where you see that Swift is an object-oriented\
    \ language. Instructions are grouped in methods, and methods in turn are grouped\
    \ in classes. You see this same structure appearing in this example. There are\
    \ three instructions grouped in a method called `didMoveToView`. This method belongs\
    \ to a class called `GameScene`. When we define a function or a method, we use\
    \ the `func` keyword. When we define a class, we use the `class` keyword. Programmers\
    \ use methods and classes to better structure their code so that it is easier\
    \ to understand what each part of the code does and how it is related to other\
    \ parts of the program. In this case, the `GameScene` class groups methods that\
    \ do something with the game scene (in other words, the game world). The method\
    \ `didMoveToView` contains instructions that need to be executed when the game\
    \ appears on the screen of the device.\n\n## Functions or Methods?\n\nAs discussed\
    \ in this chapter, procedural programming languages group instructions into functions/methods.\
    \ Functions and methods are grouped into classes in object-oriented languages.\
    \ So what’s the difference between functions and methods? Well, there really isn’t\
    \ one. In this book, only when a function is a part of class do I call it a method.\
    \ So, `didMoveToView` from the iOS example is a method, and `printData` (from\
    \ the command line tool example) is a function. They both group together instructions,\
    \ but `didMoveToView` belongs to a class (`GameScene`) and `printData` doesn’t.\n\
    \nThe first line of code in the `didMoveToView` method (`/* Setup your scene here\
    \ */`) is a written comment that the Xcode program ignores. The second line is\
    \ an instruction that creates something called a label node. A label node represents\
    \ a text label that you can place anywhere on the screen. The two instructions\
    \ after that assign text and a font size to the label. Then, you see an instruction\
    \ that assigns a position to this label node. This instruction looks rather complicated\
    \ since it calculates what the middle of the screen is while defining the position.\
    \ You could have also written a more simple instruction:\n\n`myLabel.position\
    \ = CGPoint(x:500, y:300)`\n\nTry out a few different values for the x and y position\
    \ of the text on the screen. Note that when you use the `SpriteKit` framework,\
    \ the origin of the screen is on the bottom left, and follows the orientation\
    \ of the device, as you can see in Figure [1-4](#A978-1-4842-0650-8_1_Chapter.html#Fig4).\n\
    \n![A978-1-4842-0650-8_1_Fig4_HTML.gif](A978-1-4842-0650-8_1_Fig4_HTML.gif)\n\n\
    **Figure 1-4.** The coordinate system of iDevices places the origin at the bottom\
    \ left of the screen, regardless of the device orientation\n\nAlso note that when\
    \ you set the position of something like a text label, the position `(500, 300)`\
    \ will be at the bottom center of the text that is placed on the screen.\n\nThe\
    \ last instruction in the method tells the game engine that the label should be\
    \ a part of the scene. If you omit that instruction, the text label will not be\
    \ drawn. You can launch the application by pressing the **Play** button in the\
    \ top left of the screen. To the right of that button, you can select for which\
    \ device you would like to build the app. When you run the app, Xcode will start\
    \ a simulator program that shows you what the app will look like on the device\
    \ you selected. For example, Figure [1-5](#A978-1-4842-0650-8_1_Chapter.html#Fig5)\
    \ shows the app running in the iPhone 4s simulator. Try to simulate the app on\
    \ a few different platforms. If the simulator screen is too big, you can choose\
    \ another scale by pressing **Command+1**, **Command+2**, or **Command+3**. You\
    \ can also change the scale by selecting **Window** ➤ **Scale** in the iOS Simulator\
    \ menu.\n\n![A978-1-4842-0650-8_1_Fig5_HTML.jpg](A978-1-4842-0650-8_1_Fig5_HTML.jpg)\n\
    \n**Figure 1-5.** A basic iOS game application (running in iPhone 4s mode)\n\n\
    Again, try to play around with the program. Can you draw a different text on the\
    \ screen? Change the position of the text and see how different `x` and `y` values\
    \ result in different positions of the text on the screen."
  raw: '## Building Your First Swift Game


    In order to get started with programming an iOS game, you need to create a suitable
    project. Since iOS games do much more than only print text, you need to create
    a Game project. This is very easy. In Xcode, go to the main menu and choose File
    ➤ New ➤ Project. Then, choose the Game template that you find in the iOS category.
    After pressing Next, enter a suitable name for your game, such as BasicGame. Again,
    make sure that Swift is selected as the main language. Also, make sure that SpriteKit
    is selected as the game technology that will be used. SpriteKit is a collection
    of functions and classes created by Apple that are useful for developing games.
    Finally, select a folder where your game project and its source code should be
    stored, and click Create. Alternatively, you can have a look at the BasicGame
    example belonging to this chapter, which already is in the right format.


    If you take a look at the files in the game project you just created, you see
    that the basic iOS game is quite a bit more complicated than a command line tool
    application. The main file where you are going to make changes to the code is
    the file called `GameScene.swift`. The other files are there to set up the right
    environment for iOS games. Inside the `GameScene.swift` file, you write the code
    that is specific to your particular game. The most important part of the code
    is the following instructions:


    `import SpriteKit`


    `class GameScene: SKScene {`


    `override func didMoveToView(view: SKView) {`


    `/* Setup your scene here */`


    `let myLabel = SKLabelNode(fontNamed:"Chalkduster")`


    `myLabel.text = "Hello, World!"`


    `myLabel.fontSize = 65`


    `myLabel.position = CGPoint(x:CGRectGetMidX(self.frame),`


    `y:CGRectGetMidY(self.frame))`


    `self.addChild(myLabel)`


    `}`


    `...`


    `}`


    Without going too much into detail, let’s have a look at the structure of this
    code. The first instruction, `import SpriteKit`, is there to tell the compiler
    that the program needs functions and classes from SpriteKit. This is different
    from using a function such as `print`. The `print` function is built into the
    language itself. Functions and classes related to dealing with sprites (images)
    are rather specific and therefore they have been put in a separate collection,
    also called a framework. At the beginning of a program, you may see one or more
    of these import instructions, depending on what the program is going to need.


    After the framework import instruction, you see a class. This is where you see
    that Swift is an object-oriented language. Instructions are grouped in methods,
    and methods in turn are grouped in classes. You see this same structure appearing
    in this example. There are three instructions grouped in a method called `didMoveToView`.
    This method belongs to a class called `GameScene`. When we define a function or
    a method, we use the `func` keyword. When we define a class, we use the `class`
    keyword. Programmers use methods and classes to better structure their code so
    that it is easier to understand what each part of the code does and how it is
    related to other parts of the program. In this case, the `GameScene` class groups
    methods that do something with the game scene (in other words, the game world).
    The method `didMoveToView` contains instructions that need to be executed when
    the game appears on the screen of the device.


    Functions or Methods?


    As discussed in this chapter, procedural programming languages group instructions
    into functions/methods. Functions and methods are grouped into classes in object-oriented
    languages. So what’s the difference between functions and methods? Well, there
    really isn’t one. In this book, only when a function is a part of class do I call
    it a method. So, `didMoveToView` from the iOS example is a method, and `printData`
    (from the command line tool example) is a function. They both group together instructions,
    but `didMoveToView` belongs to a class (`GameScene`) and `printData` doesn’t.


    The first line of code in the `didMoveToView` method (`/* Setup your scene here
    */`) is a written comment that the Xcode program ignores. The second line is an
    instruction that creates something called a label node. A label node represents
    a text label that you can place anywhere on the screen. The two instructions after
    that assign text and a font size to the label. Then, you see an instruction that
    assigns a position to this label node. This instruction looks rather complicated
    since it calculates what the middle of the screen is while defining the position.
    You could have also written a more simple instruction:


    `myLabel.position = CGPoint(x:500, y:300)`


    Try out a few different values for the x and y position of the text on the screen.
    Note that when you use the SpriteKit framework, the origin of the screen is on
    the bottom left, and follows the orientation of the device, as you can see in
    Figure [1-4](#A978-1-4842-0650-8_1_Chapter.html#Fig4).


    ![A978-1-4842-0650-8_1_Fig4_HTML.gif](A978-1-4842-0650-8_1_Fig4_HTML.gif)


    Figure 1-4.


    The coordinate system of iDevices places the origin at the bottom left of the
    screen, regardless of the device orientation


    Also note that when you set the position of something like a text label, the position
    (500, 300) will be at the bottom center of the text that is placed on the screen.


    The last instruction in the method tells the game engine that the label should
    be a part of the scene. If you omit that instruction, the text label will not
    be drawn. You can launch the application by pressing the Play button in the top
    left of the screen. To the right of that button, you can select for which device
    you would like to build the app. When you run the app, Xcode will start a simulator
    program that shows you what the app will look like on the device you selected.
    For example, Figure [1-5](#A978-1-4842-0650-8_1_Chapter.html#Fig5) shows the app
    running in the iPhone 4s simulator. Try to simulate the app on a few different
    platforms. If the simulator screen is too big, you can choose another scale by
    pressing Command+1, Command+2, or Command+3\. You can also change the scale by
    selecting Window ➤ Scale in the iOS Simulator menu.


    ![A978-1-4842-0650-8_1_Fig5_HTML.jpg](A978-1-4842-0650-8_1_Fig5_HTML.jpg)


    Figure 1-5.


    A basic iOS game application (running in iPhone 4s mode)


    Again, try to play around with the program. Can you draw a different text on the
    screen? Change the position of the text and see how different x and y values result
    in different positions of the text on the screen.'
  trans: "\n# 构建你的首个 Swift 游戏\n\n要开始编写 iOS 游戏程序，你需要先创建一个合适的项目。由于 iOS 游戏的功能远不止打印文本，因此需要创建一个游戏项目。这非常简单。在\
    \ Xcode 中，进入主菜单并选择**文件** ➤ **新建** ➤ **项目**。然后，在 iOS 类别中选择**游戏**模板。点击**下一步**后，为你的游戏输入一个合适的名称，例如\
    \ `BasicGame`。同样，确保已选择 `Swift` 作为主要语言。同时，确保已选择 `SpriteKit` 作为将要使用的游戏技术。`SpriteKit`\
    \ 是一组由 Apple 创建、对游戏开发很有用的函数和类的集合。最后，选择一个用于存储游戏项目及其源代码的文件夹，然后点击**创建**。或者，你也可以查看本章附带的\
    \ `BasicGame` 示例，该示例已经采用了正确的格式。\n\n如果你查看刚创建的游戏项目中的文件，就会发现基础的 iOS 游戏比命令行工具应用程序要复杂得多。你将要修改代码的主要文件是名为\
    \ `GameScene.swift` 的文件。其他文件则用于为 iOS 游戏设置正确的环境。在 `GameScene.swift` 文件中，你可以编写特定于自己游戏的代码。代码中最重要的部分是指令如下：\n\
    \n```\nimport SpriteKit\n\nclass GameScene: SKScene {\n\n    override func didMoveToView(view:\
    \ SKView) {\n        /* Setup your scene here */\n        let myLabel = SKLabelNode(fontNamed:\"\
    Chalkduster\")\n        myLabel.text = \"Hello, World!\"\n        myLabel.fontSize\
    \ = 65\n        myLabel.position = CGPoint(x:CGRectGetMidX(self.frame),\n    \
    \    y:CGRectGetMidY(self.frame))\n\n        self.addChild(myLabel)\n    }\n\n\
    \    ...\n\n}\n```\n\n在不深入细节的前提下，让我们看看这段代码的结构。第一条指令 `import SpriteKit` 用于告诉编译器，程序需要\
    \ `SpriteKit` 中的函数和类。这与使用 `print` 这样的函数不同。`print` 函数是内置于语言本身的。而处理精灵（图像）的函数和类则相当具体，因此它们被放在一个单独的集合中，也称为框架（framework）。在程序的开头，你可能会看到一条或多条这样的\
    \ `import` 指令，具体取决于程序需要用到哪些功能。\n\n在框架导入指令之后，你可以看到一个类。从这里可以看出 Swift 是一种面向对象的语言。指令被分组为方法，而方法又被分组为类。在这个示例中你也可以看到同样的结构。有三条指令被分组到一个名为\
    \ `didMoveToView` 的方法中。这个方法属于一个名为 `GameScene` 的类。当我们定义函数或方法时，使用 `func` 关键字。当我们定义类时，使用\
    \ `class` 关键字。程序员使用方法和类来更好地组织代码，以便更容易理解每个部分的作用以及它们与程序其他部分的关联。在这个例子中，`GameScene`\
    \ 类将对游戏场景（即游戏世界）进行操作的方法分组。`didMoveToView` 方法包含了当游戏出现在设备屏幕上时需要执行的指令。\n\n## 函数还是方法？\n\
    \n正如本章所讨论的，过程式编程语言将指令分组为函数/方法。在面向对象语言中，函数和方法又被分组为类。那么函数和方法之间有什么区别呢？实际上，并没有真正的区别。在本书中，只有当函数是类的一部分时，我才称之为方法。因此，iOS\
    \ 示例中的 `didMoveToView` 是一个方法，而 `printData`（来自命令行工具示例）是一个函数。它们都是对指令进行分组，但 `didMoveToView`\
    \ 属于一个类（`GameScene`），而 `printData` 则不属于任何类。\n\n`didMoveToView` 方法中的第一行代码（`/* Setup\
    \ your scene here */`）是一条 Xcode 程序会忽略的注释。第二行是一条创建名为标签节点的指令。标签节点代表一个你可以放置在屏幕任意位置的文本标签。它之后的两条指令为标签设置了文本和字体大小。接着，你会看到一条为该标签节点分配位置的指令。这条指令看起来相当复杂，因为它定义位置时计算了屏幕的中心点。你也可以编写一条更简单的指令：\n\
    \n`myLabel.position = CGPoint(x:500, y:300)`\n\n尝试为文本在屏幕上的 x 和 y 位置设置几个不同的值。请注意，当你使用\
    \ `SpriteKit` 框架时，屏幕的原点位于左下角，并跟随设备的方向，如图 1-4 所示。\n\n![A978-1-4842-0650-8_1_Fig4_HTML.gif](img/A978-1-4842-0650-8_1_Fig4_HTML.gif)\n\
    \n**图 1-4.** iDevice 的坐标系将原点置于屏幕左下角，无论设备方向如何\n\n另外要注意，当您设置文本标签等对象的位置时，位置 `(500,\
    \ 300)` 将位于屏幕上所放置文本的底部中央。\n\n该方法中的最后一条指令告诉游戏引擎，该标签应该是场景的一部分。如果省略了这条指令，文本标签将不会被绘制出来。你可以按下屏幕左上角的**播放**按钮来启动应用程序。在该按钮的右侧，你可以选择要为哪个设备构建应用程序。当你运行应用程序时，Xcode\
    \ 会启动一个模拟器程序，向你展示应用程序在你所选设备上的外观。例如，图 1-5 展示了应用程序在 iPhone 4s 模拟器中运行的样子。尝试在几个不同的平台上模拟应用程序。如果模拟器屏幕太大，你可以通过按\
    \ **Command+1**、**Command+2** 或 **Command+3** 来选择其他缩放比例。你也可以通过在 iOS 模拟器菜单中选择**窗口**\
    \ ➤ **缩放**来更改缩放比例。\n\n![A978-1-4842-0650-8_1_Fig5_HTML.jpg](img/A978-1-4842-0650-8_1_Fig5_HTML.jpg)\n\
    \n**图 1-5.** 一个基础的 iOS 游戏应用程序（以 iPhone 4s 模式运行）\n\n再次尝试使用这个程序。你能在屏幕上绘制不同的文本吗？更改文本的位置，看看不同的\
    \ `x` 和 `y` 值如何导致文本在屏幕上处于不同的位置。\n"
- fmt: '# A Few Observations


    In the iOS game example, the code contains a lot of things that you may not yet
    recognize. For example, behind the name of the class (`GameScene`), there is a
    colon and the word `SKScene`. What this means is that the `GameScene` class is
    based on an already existing class called `SKScene`. One could also say that `GameScene
    is a special version of SKScene`. Note that `SKScene` groups a number of methods.
    `GameScene` copies these methods but also replaces one of them, namely the `didMoveToView`
    method. That’s why the word `override` is in front of that method definition.
    If this seems like a lot to take in, don’t worry. I’ll cover this aspect in detail
    in [Chapter 10](#A978-1-4842-0650-8_10_Chapter.html) of this book.


    The instructions themselves may also not make a lot of sense to you yet. In the
    following chapters, I’ll talk more about what these instructions mean. In any
    case, you see that creating a simple iOS app already entails a lot more than a
    simple command line tool. There are other kinds of applications that you can also
    develop in Swift, such as an OS X application with windows, buttons, and so on.
    This application requires yet another approach to setting up the classes and methods
    that you need (but that’s beyond the scope of this book).


    You may also have noticed that it is no longer that clear in which order instructions
    or methods are executed. When you look at the most simple command line tool, there
    is a single instruction that prints “Hello, World!” to the console. When executed,
    the program simply executes that single instruction. When you have a program containing
    many classes that group methods together that in turn group instructions, it’s
    no longer so straightforward to determine what instructions will be executed and
    in what order. In the case of the iOS example in this book, a lot happens behind
    the scenes to ensure that at some point, the method `didMoveToView` is called.
    However, there is no clear way to see that in the code itself. In this case, you
    have to rely on the Apple SpriteKit documentation, which states somewhere that
    the `didMoveToView` method will be called, and that you can put your own game
    initialization code in it. As a game developer, you will not always understand
    all the code of your game application. Often, you will use code written by other
    developers, and when you do, hopefully there are not too many mistakes in it.
    The other option is to develop everything yourself, from scratch. But in a fast-moving
    industry such as the game industry, that’s not advisable. To quote the famous
    writer Carl Sagan: “If you wish to make an apple pie from scratch, you must first
    invent the universe.”


    ## What You Have Learned


    In this chapter, you have learned the following:


    *   How computers work, and that they consist of processors to compute things
    and memory to store things

    *   How programming languages have evolved from Assembler languages to modern
    programming languages such as Swift

    *   How to create a simple application using the Swift language


    # Game Programming Basics


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​2](http://dx.doi.org/10.1007/978-1-4842-0650-8_2))
    contains supplementary material, which is available to authorized users.


    This chapter covers the basic elements of programming games and provides a starting
    point for the chapters that follow. First, you will learn about the basic skeleton
    of any game, consisting of a game world and a game loop. You will see how to create
    this skeleton in Swift by looking at various examples such as a simple application
    that changes the background color. Finally, I will talk about clarifying your
    code by using comments, layout, and whitespace in the right places.


    ## Building Blocks of a Game


    This section talks about the building blocks of a game. I discuss the game world
    in general and then show you the process of changing it using a game loop, which
    continuously updates the game world before drawing it on the screen.


    ### The Game World


    What makes games such a nice form of entertainment is that you can explore an
    imaginary world and do things there that you would never do in real life. You
    can ride on the back of a dragon, destroy entire solar systems, or create a complex
    civilization of characters who speak in an imaginary language. This imaginary
    realm in which you play the game is called the game world. Game worlds can range
    from very simple domains such as the Tetris world to complicated virtual worlds
    in games such as Grand Theft Auto and World of Warcraft.


    When a game is running on a computer or a smartphone, the device maintains an
    internal representation of the game world. This representation doesn’t look anything
    like what you see on the screen when you play the game. It consists mostly of
    numbers describing the location of objects, how many hit points an enemy can take
    from the player, how many items the player has in inventory, and so on. Fortunately,
    the program also knows how to create a visually pleasing representation of this
    world that it displays on the screen. Otherwise, playing computer games would
    probably be incredibly boring, with players having to sift through pages of numbers
    to find out whether they saved the princess or died a horrible death. Players
    never see the internal representation of the game world, but game developers do.
    When you want to develop a game, you also need to design how to represent your
    game world internally. And part of the fun of programming your own games is that
    you have complete control over this.


