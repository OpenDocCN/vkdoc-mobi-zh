- fmt: "# Loading and Drawing Multiple Sprites\n\nBuilding games that can only display\
    \ a single sprite is somewhat boring. You can make your game a bit more visually\
    \ appealing by displaying a background sprite. This means you have to load and\
    \ position two sprites instead of one. The `MovingSpriteWithBackground` example\
    \ shows you how to do this. In this example, you can see that there are now two\
    \ variables referring to a sprite:\n\n`var backgroundSprite = SKSpriteNode(imageNamed:\
    \ \"spr_background\")`\n\n`var balloonSprite = SKSpriteNode(imageNamed: \"spr_balloon\"\
    )`\n\nWhen you’re dealing with multiple sprites, you need to think about which\
    \ sprite should be drawn on top. In this example, you want the balloon to be drawn\
    \ on top of the background and not vice versa. How to do this? Until now, you’ve\
    \ seen that the game world has an x and a y axis, with the default origin at the\
    \ bottom left of the screen. In fact, the game world also has a z axis, which\
    \ is sticking out of the screen toward you. You can change the position of a sprite\
    \ on this z axis. Since it sticks out of the screen, a higher z position value\
    \ means that the sprite is closer to you. So if you choose a higher z position\
    \ for the balloon than for the background, the balloon will be drawn closer to\
    \ you and therefore it will be visible on top of the background. Here are the\
    \ two assignment instructions that achieve this:\n\n`backgroundSprite.zPosition\
    \ = 0`\n\n`balloonSprite.zPosition = 1`\n\nWhen the correct z positions of the\
    \ sprites are set, you add them to the scene (see Figure [4-4](#A978-1-4842-0650-8_4_Chapter.html#Fig4)):\n\
    \n![A978-1-4842-0650-8_4_Fig4_HTML.jpg](A978-1-4842-0650-8_4_Fig4_HTML.jpg)\n\n\
    *Figure 4-4. The MovingSpriteWithBackground example*\n\n`addChild(backgroundSprite)`\n\
    \n`addChild(balloonSprite)`\n\nIn order to make the balloon move correctly from\
    \ the left to the right, you need to modify the code in the update method that\
    \ calculates its position. This is necessary because you changed the origin of\
    \ the coordinate system to the center of the screen. The only thing you need to\
    \ do is subtract half the width of the screen from the x position, as follows:\n\
    \n`balloonSprite.position = CGPoint(x: time * size.width – size.width/2, y: 200)`\n\
    \nHere you see that you can use `size` to retrieve the size of the screen. Although\
    \ it may look like `size` is a variable, it is something else: a property. Properties\
    \ belong to a class, just like methods. The difference is that properties do not\
    \ need parameters between parentheses; they simply represent a value of some sort.\
    \ In this case, that value is the size of the screen. This value, in turn, has\
    \ two parts: a width and a height. Each represents a `CGFloat` number value. Since\
    \ `time` is also of type `CGFloat`, you can use these values in combination with\
    \ each other, without having to do any type conversions.\n\nYou’ve used properties\
    \ before. For example, you used `anchorPoint` to change the origin of the coordinate\
    \ system, which is also a property. You have even defined your own properties\
    \ already. If a variable is defined at the class level (`backgroundSprite` or\
    \ `balloonSprite` are examples of this), then this variable is called a property\
    \ of the class. Later on, I’ll discuss properties in more detail.\n\nEvery time\
    \ you want to draw a sprite on the screen, you can define an `SKSpriteNode` property\
    \ and add it to the scene. For instance, if you want to draw a few balloons at\
    \ different positions over the background, you simply define a property for every\
    \ balloon you want to add to the scene:\n\n`var balloonSprite2 = SKSpriteNode(imageNamed:\
    \ \"spr_balloon\")`\n\n`var balloonSprite3 = SKSpriteNode(imageNamed: \"spr_balloon\"\
    )`\n\n`var balloonSprite4 = SKSpriteNode(imageNamed: \"spr_balloon\")`\n\nYou\
    \ need to make sure that each sprite is added to the scene in the `didMoveToView`\
    \ method, as follows:\n\n```\noverride func didMoveToView(view: SKView) {\n  \
    \  anchorPoint = CGPoint(x: 0.5, y: 0.5)\n    backgroundSprite.zPosition = 0\n\
    \    balloonSprite.zPosition = 1\n    balloonSprite2.zPosition = 1\n    balloonSprite3.zPosition\
    \ = 1\n    balloonSprite4.zPosition = 1\n\n    addChild(backgroundSprite)\n  \
    \  addChild(balloonSprite)\n    addChild(balloonSprite2)\n    addChild(balloonSprite3)\n\
    \    addChild(balloonSprite4)\n}\n```\n\nHere you can also see that all the balloon\
    \ sprites are being drawn in front of the background. You can also draw multiple\
    \ moving sprites at the same time. For each balloon, you need to change its position\
    \ in the `update` method:\n\n```\noverride func update(currentTime: NSTimeInterval)\
    \ {\n    var time = CGFloat(currentTime % 1)\n\n    balloonSprite.position = CGPoint(x:\
    \ time * size.width - size.width/2, y: 200)\n    balloonSprite2.position = CGPoint(x:\
    \ time * size.width - size.width/2 – 100, y: 200)\n    balloonSprite3.position\
    \ = CGPoint(x: time * size.width - size.width/2, y: 0)\n    balloonSprite4.position\
    \ = CGPoint(x: time * size.width - size.width/2 – 100, y: 0)\n}\n```\n\nPlay around\
    \ with the example. Think of different ways to draw moving balloons on the screen.\
    \ Try a few different position values. Can you make some balloons move faster\
    \ or slower than others?\n\n## Configuring the Device Orientation\n\nEspecially\
    \ when developing games, it’s important to think about the orientation of the\
    \ device. Are you going to create a game that is supposed to be played in portrait\
    \ mode or in landscape mode? Some games work better in portrait mode, others in\
    \ landscape mode. This also depends on the way the player interacts with the game\
    \ world. For example, a portrait mode game is designed in such a way that you\
    \ hold the phone like you always hold it, and operate the screen with your other\
    \ hand. This is a good approach for games where you swipe over the screen such\
    \ as Temple Run. Side-scrolling games, on the other hand, are generally better\
    \ in landscape, since you want to show as much width of a level as possible to\
    \ avoid too much scrolling. In this book, you’ll develop both portrait and landscape\
    \ games.\n\nBy default, a project in Xcode allows for any device orientation,\
    \ and it will rotate the graphics accordingly. For most games, this is not desirable\
    \ because you generally create a layout that works well in either portrait mode\
    \ or landscape mode–not both. There is an easy way to change the allowed device\
    \ orientations in the project settings of Xcode. Click the project in the top\
    \ left of the screen, and then select the target (for example, `MovingSpriteWithBackground`).\
    \ Under Deployment Info, you can select the allowed orientations. In the Devices\
    \ selection box, choose whether you want to change the allowed orientations of\
    \ the iPad version, the iPhone version, or the Universal version of the app (which\
    \ is the option you choose if you want to create an app that works for both iPhones\
    \ and iPad). Figure [4-5](#A978-1-4842-0650-8_4_Chapter.html#Fig5) shows the orientation\
    \ selection screen in Xcode. Run the program and see how the app responds in the\
    \ iOS simulator when you simulate a device rotation. You can rotate the device\
    \ by going to the Hardware menu in the simulator and then choose whether you want\
    \ to rotate left or right.\n\n![A978-1-4842-0650-8_4_Fig5_HTML.jpg](A978-1-4842-0650-8_4_Fig5_HTML.jpg)\n\
    \n*Figure 4-5. Choosing the device orientations that the app supports. If the\
    \ projects and targets list is not visible, click the icon left of the menu item\
    \ General to open the panel*"
  raw: '## Loading and Drawing Multiple Sprites


    Building games that can only display a single sprite is somewhat boring. You can
    make your game a bit more visually appealing by displaying a background sprite.
    This means you have to load and position two sprites instead of one. The MovingSpriteWithBackground
    example shows you how to do this. In this example, you can see that there are
    now two variables referring to a sprite:


    `var backgroundSprite = SKSpriteNode(imageNamed: "spr_background")`


    `var balloonSprite = SKSpriteNode(imageNamed: "spr_balloon")`


    When you’re dealing with multiple sprites, you need to think about which sprite
    should be drawn on top. In this example, you want the balloon to be drawn on top
    of the background and not vice versa. How to do this? Until now, you’ve seen that
    the game world has an x and a y axis, with the default origin at the bottom left
    of the screen. In fact, the game world also has a z axis, which is sticking out
    of the screen toward you. You can change the position of a sprite on this z axis.
    Since it sticks out of the screen, a higher z position value means that the sprite
    is closer to you. So if you choose a higher z position for the balloon than for
    the background, the balloon will be drawn closer to you and therefore it will
    be visible on top of the background. Here are the two assignment instructions
    that achieve this:


    `backgroundSprite.zPosition = 0`


    `balloonSprite.zPosition = 1`


    When the correct z positions of the sprites are set, you add them to the scene
    (see Figure [4-4](#A978-1-4842-0650-8_4_Chapter.html#Fig4)):


    ![A978-1-4842-0650-8_4_Fig4_HTML.jpg](A978-1-4842-0650-8_4_Fig4_HTML.jpg)


    Figure 4-4.


    The MovingSpriteWithBackground example


    `addChild(backgroundSprite)`


    `addChild(balloonSprite)`


    In order to make the balloon move correctly from the left to the right, you need
    to modify the code in the update method that calculates its position. This is
    necessary because you changed the origin of the coordinate system to the center
    of the screen. The only thing you need to do is subtract half the width of the
    screen from the x position, as follows:


    `balloonSprite.position = CGPoint(x: time * size.width – size.width/2, y: 200)`


    Here you see that you can use `size` to retrieve the size of the screen. Although
    it may look like `size` is a variable, it is something else: a property. Properties
    belong to a class, just like methods. The difference is that properties do not
    need parameters between parentheses; they simply represent a value of some sort.
    In this case, that value is the size of the screen. This value, in turn, has two
    parts: a width and a height. Each represents a `CGFloat` number value. Since `time`
    is also of type `CGFloat`, you can use these values in combination with each other,
    without having to do any type conversions.


    You’ve used properties before. For example, you used `anchorPoint` to change the
    origin of the coordinate system, which is also a property. You have even defined
    your own properties already. If a variable is defined at the class level (`backgroundSprite`
    or `balloonSprite` are examples of this), then this variable is called a property
    of the class. Later on, I’ll discuss properties in more detail.


    Every time you want to draw a sprite on the screen, you can define an `SKSpriteNode`
    property and add it to the scene. For instance, if you want to draw a few balloons
    at different positions over the background, you simply define a property for every
    balloon you want to add to the scene:


    `var balloonSprite2 = SKSpriteNode(imageNamed: "spr_balloon")`


    `var balloonSprite3 = SKSpriteNode(imageNamed: "spr_balloon")`


    `var balloonSprite4 = SKSpriteNode(imageNamed: "spr_balloon")`


    You need to make sure that each sprite is added to the scene in the `didMoveToView`
    method, as follows:


    `override func didMoveToView(view: SKView) {`


    `anchorPoint = CGPoint(x: 0.5, y: 0.5)`


    `backgroundSprite.zPosition = 0`


    `balloonSprite.zPosition = 1`


    `balloonSprite2.zPosition = 1`


    `balloonSprite3.zPosition = 1`


    `balloonSprite4.zPosition = 1`


    `addChild(backgroundSprite)`


    `addChild(balloonSprite)`


    `addChild(balloonSprite2)`


    `addChild(balloonSprite3)`


    `addChild(balloonSprite4)`


    `}`


    Here you can also see that all the balloon sprites are being drawn in front of
    the background. You can also draw multiple moving sprites at the same time. For
    each balloon, you need to change its position in the `update` method:


    `override func update(currentTime: NSTimeInterval) {`


    `var time = CGFloat(currentTime % 1)`


    `balloonSprite.position = CGPoint(x: time * size.width - size.width/2, y: 200)`


    `balloonSprite2.position = CGPoint(x: time * size.width - size.width/2 – 100,
    y: 200)`


    `balloonSprite3.position = CGPoint(x: time * size.width - size.width/2, y: 0)`


    `balloonSprite4.position = CGPoint(x: time * size.width - size.width/2 – 100,
    y: 0)`


    `}`


    Play around with the example. Think of different ways to draw moving balloons
    on the screen. Try a few different position values. Can you make some balloons
    move faster or slower than others?


    ## Configuring the Device Orientation


    Especially when developing games, it’s important to think about the orientation
    of the device. Are you going to create a game that is supposed to be played in
    portrait mode or in landscape mode? Some games work better in portrait mode, others
    in landscape mode. This also depends on the way the player interacts with the
    game world. For example, a portrait mode game is designed in such a way that you
    hold the phone like you always hold it, and operate the screen with your other
    hand. This is a good approach for games where you swipe over the screen such as
    Temple Run. Side-scrolling games, on the other hand, are generally better in landscape,
    since you want to show as much width of a level as possible to avoid too much
    scrolling. In this book, you’ll develop both portrait and landscape games.


    By default, a project in Xcode allows for any device orientation, and it will
    rotate the graphics accordingly. For most games, this is not desirable because
    you generally create a layout that works well in either portrait mode or landscape
    mode–not both. There is an easy way to change the allowed device orientations
    in the project settings of Xcode. Click the project in the top left of the screen,
    and then select the target (for example, MovingSpriteWithBackground). Under Deployment
    Info, you can select the allowed orientations. In the Devices selection box, choose
    whether you want to change the allowed orientations of the iPad version, the iPhone
    version, or the Universal version of the app (which is the option you choose if
    you want to create an app that works for both iPhones and iPad). Figure [4-5](#A978-1-4842-0650-8_4_Chapter.html#Fig5)
    shows the orientation selection screen in Xcode. Run the program and see how the
    app responds in the iOS simulator when you simulate a device rotation. You can
    rotate the device by going to the Hardware menu in the simulator and then choose
    whether you want to rotate left or right.


    ![A978-1-4842-0650-8_4_Fig5_HTML.jpg](A978-1-4842-0650-8_4_Fig5_HTML.jpg)


    Figure 4-5.


    Choosing the device orientations that the app supports. If the projects and targets
    list is not visible, click the icon left of the menu item General to open the
    panel'
  trans: "\n# 加载与绘制多个精灵\n\n只能显示单个精灵的游戏构建起来多少有些乏味。通过显示一个背景精灵，可以让你的游戏在视觉上更具吸引力。这意味着你需要加载并定位两个精灵，而不是一个。`MovingSpriteWithBackground`\
    \ 示例展示了如何实现这一点。在这个示例中，你会看到现在有两个变量引用着两个精灵：\n\n`var backgroundSprite = SKSpriteNode(imageNamed:\
    \ \"spr_background\")`\n\n`var balloonSprite = SKSpriteNode(imageNamed: \"spr_balloon\"\
    )`\n\n当你处理多个精灵时，需要考虑哪个精灵应该绘制在最上层。在这个示例中，你希望气球绘制在背景之上，反之则不行。如何实现呢？到目前为止，你已经知道游戏世界拥有\
    \ x 轴和 y 轴，其默认原点位于屏幕左下角。实际上，游戏世界还有一个 z 轴，它垂直于屏幕指向你。你可以改变精灵在这个 z 轴上的位置。由于它垂直于屏幕，z\
    \ 位置值越高，意味着精灵离你越近。因此，如果你为气球选择比背景更高的 z 位置，气球将会绘制得离你更近，从而在背景之上可见。以下是实现此目的的两个赋值指令：\n\
    \n`backgroundSprite.zPosition = 0`\n\n`balloonSprite.zPosition = 1`\n\n当精灵的 z\
    \ 位置设置正确后，你就可以将它们添加到场景中（见图 4-4）：\n\n![A978-1-4842-0650-8_4_Fig4_HTML.jpg](img/A978-1-4842-0650-8_4_Fig4_HTML.jpg)\n\
    \n*图 4-4. MovingSpriteWithBackground 示例*\n\n`addChild(backgroundSprite)`\n\n`addChild(balloonSprite)`\n\
    \n为了让气球正确地从左向右移动，你需要修改 `update` 方法中计算其位置的代码。这是必要的，因为您已经将坐标系统的原点更改为屏幕中心。你唯一需要做的就是从\
    \ x 位置减去屏幕宽度的一半，如下所示：\n\n`balloonSprite.position = CGPoint(x: time * size.width\
    \ – size.width/2, y: 200)`\n\n这里你可以看到，可以使用 `size` 来获取屏幕的尺寸。虽然它看起来像一个变量，但它实际上是别的东西：一个属性。属性与方法一样，属于类。不同之处在于属性不需要括号内的参数；它们只是表示某种数值。在这种情况下，该值就是屏幕的尺寸。这个值又分为两部分：宽度和高度。每个部分都代表一个\
    \ `CGFloat` 数值。由于 `time` 也是 `CGFloat` 类型，你可以将这些值相互结合使用，而无需进行任何类型转换。\n\n你之前已经使用过属性。例如，你使用过\
    \ `anchorPoint` 来改变坐标系统的原点，它也是一个属性。你甚至已经定义过自己的属性。如果一个变量在类级别定义（例如 `backgroundSprite`\
    \ 或 `balloonSprite`），那么这个变量就被称为类的属性。稍后，我将更详细地讨论属性。\n\n每次你想在屏幕上绘制一个精灵时，都可以定义一个\
    \ `SKSpriteNode` 属性并将其添加到场景中。例如，如果你想在背景上不同位置绘制几个气球，只需为你想要添加到场景中的每个气球定义一个属性：\n\n\
    `var balloonSprite2 = SKSpriteNode(imageNamed: \"spr_balloon\")`\n\n`var balloonSprite3\
    \ = SKSpriteNode(imageNamed: \"spr_balloon\")`\n\n`var balloonSprite4 = SKSpriteNode(imageNamed:\
    \ \"spr_balloon\")`\n\n你需要确保在 `didMoveToView` 方法中将每个精灵添加到场景中，如下所示：\n\n```\noverride\
    \ func didMoveToView(view: SKView) {\n    anchorPoint = CGPoint(x: 0.5, y: 0.5)\n\
    \    backgroundSprite.zPosition = 0\n    balloonSprite.zPosition = 1\n    balloonSprite2.zPosition\
    \ = 1\n    balloonSprite3.zPosition = 1\n    balloonSprite4.zPosition = 1\n\n\
    \    addChild(backgroundSprite)\n    addChild(balloonSprite)\n    addChild(balloonSprite2)\n\
    \    addChild(balloonSprite3)\n    addChild(balloonSprite4)\n}\n```\n\n这里你还可以看到，所有气球精灵都绘制在背景之前。你也可以同时绘制多个移动的精灵。对于每个气球，你需要在\
    \ `update` 方法中改变其位置：\n\n```\noverride func update(currentTime: NSTimeInterval)\
    \ {\n    var time = CGFloat(currentTime % 1)\n\n    balloonSprite.position = CGPoint(x:\
    \ time * size.width - size.width/2, y: 200)\n    balloonSprite2.position = CGPoint(x:\
    \ time * size.width - size.width/2 – 100, y: 200)\n    balloonSprite3.position\
    \ = CGPoint(x: time * size.width - size.width/2, y: 0)\n    balloonSprite4.position\
    \ = CGPoint(x: time * size.width - size.width/2 – 100, y: 0)\n}\n```\n\n你可以尝试这个示例。思考在屏幕上绘制移动气球的不同方法。尝试一些不同的位置值。你能让一些气球比其他气球移动得更快或更慢吗？\n\
    \n## 配置设备方向\n\n尤其是在开发游戏时，考虑设备的方向非常重要。你是要创建一个横屏模式还是竖屏模式的游戏？有些游戏在竖屏模式下表现更好，而另一些则在横屏模式下更好。这也取决于玩家与游戏世界的交互方式。例如，竖屏模式的游戏设计方式是：你像平常一样拿着手机，用另一只手操作屏幕。这对于像《神庙逃亡》这样需要在屏幕上滑动的游戏来说是个好方法。另一方面，横版卷轴游戏通常更适合横屏，因为你希望尽可能多地显示一个关卡的宽度，以避免过多滚动。在本书中，你将同时开发竖屏和横屏游戏。\n\
    \n默认情况下，Xcode 中的项目允许任何设备方向，并且它会相应地旋转图形。对于大多数游戏来说，这并不可取，因为你通常创建的布局要么适合竖屏模式，要么适合横屏模式，而不是两者都适合。在\
    \ Xcode 的项目设置中，有一种简单的方法可以更改允许的设备方向。点击屏幕左上角的项目，然后选择目标（例如，`MovingSpriteWithBackground`）。在\
    \ “Deployment Info” 下，你可以选择允许的方向。在 “Devices” 选择框中，选择是要更改 iPad 版本、iPhone 版本还是 Universal\
    \ 版本（如果你想要创建一个同时适用于 iPhone 和 iPad 的应用程序，可以选择这个选项）的允许方向。图 4-5 显示了 Xcode 中的方向选择屏幕。运行程序，看看当你在\
    \ iOS 模拟器中模拟设备旋转时，应用程序如何响应。你可以通过进入模拟器中的 “Hardware” 菜单，然后选择向左或向右旋转来旋转设备。\n\n![A978-1-4842-0650-8_4_Fig5_HTML.jpg](img/A978-1-4842-0650-8_4_Fig5_HTML.jpg)\n\
    \n*图 4-5. 选择应用程序支持的设备方向。如果项目和目标列表不可见，请点击 “General” 菜单项左侧的图标以打开面板*\n"
- fmt: '## Music and Sounds


    Most games contain sound effects and background music. These are important for
    various reasons. Sound effects give important cues to indicate to the user that
    something has happened. For example, playing a click sound when the user clicks
    a button provides feedback to the user that the button was indeed pressed. Hearing
    footsteps indicates that enemies might be nearby, even though the player may not
    see them yet. And hearing a bell ringing in the distance can give an indication
    that something is about to happen. The old game Myst was a classic in this respect
    because many cues about how to progress were passed to the player through sounds.


    Atmospheric sound effects like dripping water, wind in the trees, and the sound
    of cars in the distance enhance the experience and give a feeling of being present
    in the game world. They make the environment more alive, even when nothing is
    actually happening on the screen.


    **Note**


    Music plays a crucial role in the way players experience the environment and the
    action. Music can be used to create tension, sadness, happiness, and many other
    emotions. However, dealing with music in games is a lot harder than it is in movies.
    In movies, it’s clear what is going to happen, so the music can match perfectly.
    But in games, part of the action is under the player’s control. Modern games use
    adaptive music that constantly changes according to how the game story evolves.


    In Swift, it’s relatively easy to play background music or sound effects. To use
    sound, you first need a sound file that you can play. In the SoundTest example
    program belonging to this chapter, the file `snd_music.mp3` serves as background
    music. In order to work with music and sound effects, you need to import the AVFoundation
    library, which contains all sorts of classes dealing with media:


    ```

    import AVFoundation

    ```


    The next step is declaring a variable that refers to an object that can play audio,
    as follows:


    ```

    var audioPlayer = AVAudioPlayer()

    ```


    Now you can initialize the audio player to start playing a certain audio file
    in the `didMoveToView` method. This happens in three steps. The first step is
    to construct a so-called URL that represents the location of the sound file. This
    URL needs to be constructed in such a way that it works across all iDevices. This
    is the line of code that achieves it:


    ```

    let soundURL = NSBundle.mainBundle().URLForResource("snd_music", withExtension:
    "mp3")

    ```


    This looks like a complicated instruction. An `NSBundle` object is a location
    in the file system that groups code and resources that can be used in a program.
    The `mainBundle` method returns an `NSBundle` object corresponding to the location
    of the app executable. Finally, the `URLForResource` method constructs a file
    location (URL) within the bundle location. So in the end, all you’re doing is
    creating a representation of where a file is located that can be easily interpreted
    by the computer.


    Now that you have constructed this file URL, you can initialize the audio player
    with a reference to that file:


    ```

    audioPlayer = try! AVAudioPlayer(contentsOfURL: soundURL!)

    ```


    Finally, you can start playing the audio by calling the `play` method, as follows:


    ```

    audioPlayer.play()

    ```


    You may want to reduce the volume of the background music so you can play (louder)
    sound effects over it later. Setting the volume is done with the following instruction:


    ```

    audioPlayer.volume = 0.4

    ```


    The `volume` property is a value between 0 and 1, where 0 means no sound and 1
    plays back the sound at full volume.


    Technically, there is no difference between background music and sound effects.
    Normally, background music is played at a lower volume; and many games loop the
    background music so that when the song ends, the audio is played from the beginning
    again. For that you can use the `numberOfLoops` property:


    ```

    audioPlayer.numberOfLoops = 0 // default behavior: audio plays only once

    audioPlayer.numberOfLoops = 1 // audio is repeated once (= audio played twice)

    audioPlayer.numberOfLoops = -1 /* a negative value means the number of loops is

    infinite, so the audio will always keep playing */

    ```


    All the games you develop in this book use both types of sound (background music
    and sound effects) to make the games more exciting. For every sound effect or
    background music object, you need to create a separate audio player object. Play
    around with the example. Can you add a few loops to the music? Also try to change
    the volume of the sound.


    **Note**


    You need to watch out for a few things when using sounds and music in your game.
    Sound can be annoying to some players, so if you do use sound effects or music,
    make sure there is a way for the player to turn them off. Also, don’t force players
    to wait until a sound has finished playing before they can continue. You might
    have composed a great song that you want to play while the introduction screen
    is shown, but players don’t launch your game to listen to your music—they want
    to play! The same principle holds for in-game video sequences. Always provide
    a way for the user to skip those (even if you got your favorite family member
    to provide the zombie sounds). Finally, some players may have limited disk space
    on their iPhone or iPad, so try to use small sound files whenever possible.


    ## What You Have Learned


    In this chapter, you have learned the following:


    *   How to load game assets such as sprites and sounds into memory

    *   How to draw multiple sprites on the screen and move them around

    *   How to play background music and sound effects in your game


    # Part II Painter


    Painter


    In this part, you will develop a game called Painter (see Figure [II-1](#A978-1-4842-0650-8_2_Part_BookFrontmatter.html#Fig1)).
    While you’re developing this game, I will also introduce a few new techniques
    that are very useful when programming games, such as organizing instructions in
    classes and methods, conditional instructions, iteration, and much more.


    ![A978-1-4842-0650-8_2_Part_BookFrontmatter_Fig1_HTML.jpg](A978-1-4842-0650-8_2_Part_BookFrontmatter_Fig1_HTML.jpg)


    Figure II-1. The Painter game


    The goal of the Painter game is to collect three different colors of paint: red,
    green, and blue. The paint falls from the sky in cans that are kept floating by
    balloons, and you must make sure each can has the right color before it falls
    through the bottom of the screen. You can change the color of the paint by shooting
    a paint ball of the desired color at the falling can. You can select the color
    that you shoot by using the R, G, and B keys on your keyboard. You can shoot a
    paint ball by left-clicking in the game screen. If you click further away from
    the paint cannon, you give the ball a higher velocity. The place where you click
    also determines the direction in which the cannon shoots. For each can that lands
    in the correct bin, you get 10 points. For each wrongly colored can, you lose
    a life (indicated by the yellow balloons at top left of the screen). You can run
    the final version of this game by downloading the example code and running the
    PainterFinal example from Chapter 11.


    # 5 Reacting to Player Input


    Electronic supplementary material The online version of this chapter (doi:10.1007/978-1-4842-0650-8_5)
    contains supplementary material, which is available to authorized users.


    An important element of a game is that it reacts to what the player is doing.
    On iPhones or iPads, games mainly respond to touch input by the player, which
    also holds true for the games you develop while reading this book. Some games
    also use other input data such as the built-in accelerometer, which I’ll briefly
    discuss in this chapter. In order to deal with input data, you’re going to need
    a few new programming concepts, such as the `if` instruction, which will be introduced
    in this chapter.'
