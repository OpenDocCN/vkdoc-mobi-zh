    \n上一章的例子中有一个如下所示的更新方法：\n\n```\noverride func update(currentTime: NSTimeInterval)\
    \ {\n\n    backgroundColor = UIColor.blueColor()\n\n}\n```\n\n如你所见，`update` 方法有一个名为\
    \ `currentTime` 的参数，它包含了当前系统时间。在方法体内部，你可以像使用变量一样使用 `currentTime`。`currentTime`\
    \ 变量的类型是 `NSTimeInterval`，它实际上是 `Double` 的类型别名。这意味着你可以对 `currentTime` 执行计算，并将这些计算的结果存储到另一个变量中：\n\
    \n```\nvar time: Double = currentTime % 1\n```\n\n表达式 `currentTime % 1` 的结果是 0\
    \ 到 1 之间的一个数字，因为它是将 `currentTime` 除以 1 后的余数。例如，如果 `currentTime` 包含值 512.34，那么\
    \ `currentTime / 1 = 512`，而余数 `currentTime % 1 = 0.34`。\n\n现在，让我们使用变量 `time` 来动态改变背景颜色。在上一章的示例中，你是这样做的：\n\
    \n```\nbackgroundColor = UIColor.blueColor()\n```\n\n在这条指令中，你为名为 `backgroundColor`\
    \ 的属性赋值。该值的类型为 `UIColor`。`UIColor` 是由 UIKit 框架提供的一种新类型，该框架包含在 SpriteKit 框架内。可以通过几种不同的方式创建该类型的值。第一种方式如上所示。`blueColor`\
    \ 是 `UIColor` 的一个方法，它创建一个值：蓝色。你也可以通过提供 0 到 1 之间的颜色值来自己创建颜色：\n\n```\nbackgroundColor\
    \ = UIColor(red: 0, green: 0, blue: 1, alpha: 1)\n```\n\n如果以这种方式构造一个 `UIColor`\
    \ 变量，你需要提供四个不同的值：红色、绿色、蓝色和透明度。红色、绿色和蓝色值决定了颜色，透明度值决定了透明度。上面的示例创建了一种蓝色。以下是其他一些颜色的示例：\n\
    \n```\nvar greenColor: UIColor = UIColor(red: 0, green: 1, blue: 0, alpha: 1)\n\
    var redColor: UIColor = UIColor(red: 1, green: 0, blue: 0, alpha: 1)\nvar grayColor:\
    \ UIColor = UIColor(red: 0.7, green: 0.7, blue: 0.7, alpha: 1)\nvar whiteColor:\
    \ UIColor = UIColor(red: 1, green: 1, blue: 1, alpha: 1)\n```\n\n如这些示例所示，颜色强度值的范围在\
    \ 0 到 1 之间，其中 1 为最高颜色强度。通过将红色值设为 1，其他两个值设为 0，你可以创建红色。将所有强度值设为 1，即可得到白色。类似地，将所有值设为\
    \ 0 即可得到黑色。使用这些 RGB 值，可以创建多种颜色。\n\n在 DiscoWorld 示例中，你将使用经过的游戏时间来改变颜色。你已经将一个值在\
    \ 0 和 1 之间变化的时间变量存储起来了，如下所示：\n\n```\nvar time: Double = currentTime % 1\n```\n\
    \n现在，你可以像下面这样使用这个变量来改变背景颜色：\n\n```\nbackgroundColor = UIColor(red: CGFloat(time),\
    \ green: 0, blue: 0, alpha: 1)\n```\n\n当你创建一个 `UIColor` 值时，它需要类型为 `CGFloat` 的参数。`CGFloat`\
    \ 类型主要针对图形应用程序（类型中的字母 “CG” 代表 Core Graphics）。所有与图形相关的 Apple 类和库都使用这种类型，包括 `UIColor`。如果应用程序为\
    \ 64 位平台编译，则 `CGFloat` 类型是 `Double` 的别名。对于 32 位平台，`CGFloat` 是 `Float` 的别名。这就是为什么有时需要将表达式转换为\
    \ `CGFloat` 的原因。在这个例子中，`time` 是一个 `Double` 值，因此你需要先将其转换为 `CGFloat` 值。对于其他参数，则无需转换，因为诸如\
    \ 0 或 1 这样的数字常量会自动转换为 `Float` 或 `Double` 值。\n\n这个示例的妙处在于，你可以看到游戏循环是如何工作的，从而动态地改变游戏世界。当你运行\
    \ DiscoWorld 示例时，你会看到颜色每秒从黑色变为红色。作为练习，你能让颜色每秒从红色变为黑色吗？你能将其改为不同的颜色吗？或者从红色过渡到蓝色呢？你能修改代码，让颜色过渡持续两秒而不是一秒吗？尝试用这个示例做一些不同的尝试。\n\
    \n为了完成这个示例，请在 `update` 方法中添加以下指令：\n\n```\nmyLabel.position = CGPoint(x: 100, y:\
    \ CGFloat(time * 200))\n```\n\n这条指令根据 `time` 变量的值改变文本标签的位置。`CGPoint` 是另一种你将经常使用的类型。它表示空间中的一个二维点。如果你创建一个类型为\
    \ `CGPoint` 的值，你需要提供 `CGFloat` 类型的参数，类似于 `UIColor`。不同之处在于，要创建一个 `CGPoint` 值，你需要提供像素空间中的\
    \ x 和 y 坐标。如果运行程序，你会看到文本标签每秒向上移动 200 像素，然后重置到屏幕底部。这是因为 `time` 变量的值始终在 0 到 1 之间，而你将该值乘以了\
    \ 200。图 3-7 显示了 DiscoWorld 示例的屏幕截图。尝试尝试使用几个不同的值。你能让标签向下移动而不是向上移动吗？或者你能让它向右移动吗？如何让它沿对角线移动？\n\
    \n![A978-1-4842-0650-8_3_Fig7_HTML.jpg](img/A978-1-4842-0650-8_3_Fig7_HTML.jpg)\n\
    \n图 3-7. DiscoWorld 示例的屏幕截图\n\n## 变量的作用域\n\n声明变量的位置会影响你可以在何处使用该变量。看看 DiscoWorld\
    \ 示例中的变量 `time`。这个变量是在 `update` 方法中声明（并赋值）的。因为它是在 `update` 方法中声明的，所以你只能在这个方法中使用它。例如，你不能在\
    \ `didMoveToView` 方法中使用这个变量。当然，你可以在 `didMoveToView` 方法中声明另一个名为 `time` 的变量，但重要的是要认识到，在这种情况下，在\
    \ `update` 中声明的 `time` 变量与在 `didMoveToView` 方法中声明的 `time` 变量并不相同。\n\n或者，如果你在类级别声明一个变量，则可以在该类中的任何地方使用它。`myLabel`\
    \ 变量是在类级别声明的，该类中的两个方法 `didMoveToView` 和 `update` 都在访问它。`didMoveToView` 方法需要访问它，因为标签需要添加到游戏世界中。`update`\
    \ 方法需要访问它以便改变其位置。因此，很合乎逻辑的是，这个变量需要在类级别声明，这样属于该类的所有方法都可以使用该变量。\n\n变量可以被使用的地方统称为变量的作用域。在这个例子中，变量\
    \ `time` 的作用域是 `update` 方法，而变量 `myLabel` 的作用域是类的范围。\n\n## 你学到的内容\n\n在本章中，你学到了以下内容：\n\
    \n*   如何使用变量在内存中存储基本信息\n*   如何创建数值以及更复杂类型的值，例如 `UIColor` 或 `CGPoint`\n*   如何使用\
    \ `update` 方法通过操作变量来改变游戏世界\n"
- fmt: "# 4. Game Assets\n\nElectronic supplementary material The online version of\
    \ this chapter (doi:[10.​1007/​978-1-4842-0650-8_​4](http://dx.doi.org/10.1007/978-1-4842-0650-8_4))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    The previous chapters showed you how to make a very basic game application in\
    \ Swift. You saw how to create a game project in Xcode, and then write a few lines\
    \ of code to change the background color of an app or to display a text label.\
    \ You were also introduced to the game loop, and you used the update part of the\
    \ game loop to vary the background color over time. This chapter will show you\
    \ how to draw images on the screen, which is the first step toward making nice-looking\
    \ games. In computer graphics, these images are also called sprites. Sprites are\
    \ generally loaded from a file. This means any program that draws sprites is no\
    \ longer simply an isolated set of instructions, but relies on game assets that\
    \ are stored somewhere. This immediately introduces a number of things that you\
    \ need to think about:\n\n- Where are sprites located?\n- How do you load and\
    \ draw a sprite on the screen?\n- How do you deal with the resolutions and aspect\
    \ ratios of the various iDevices?\n\nThis chapter answers these questions.\n\n\
    Sound is another type of game asset. And at the end of this chapter, you will\
    \ also learn how to play music and sound effects in your game.\n\n> **Note** \
    \ \n> The name sprite comes from spriting, which is the process of creating two-dimensional,\
    \ partially transparent raster graphics that are used for video games. In the\
    \ early days, creating these two-dimensional images was a lot of manual work,\
    \ but it resulted in a particular style of imagery that inspired people to create\
    \ similar images of their own, resulting in an artistic technique called pixel\
    \ art or sprite art.\n\n## Locating Sprites\n\nBefore a program can use any kind\
    \ of assets, it needs to know where to look for those assets. By default, a game\
    \ project in Xcode has a folder called `Images.xcassets`. Look at the SpriteDrawing\
    \ example belonging to this chapter. When you open this project in Xcode and left-click\
    \ `Images.xcassets`, you will see that it lists two files: one that represents\
    \ the app icon, and another one called `spr_balloon`. The latter refers to an\
    \ image of a balloon that you can draw on the screen. If you left-click the balloon,\
    \ you’ll see that the image contains several sub-images at different resolutions\
    \ (see Figure [4-1](#A978-1-4842-0650-8_4_Chapter.html#Fig1)). These different\
    \ resolutions are necessary because of the different technical specs of various\
    \ iOS devices (an iPad Air with its Retina screen has a much higher resolution\
    \ than an iPhone 4). I’ll talk more about this issue later in this chapter.\n\n\
    ![A978-1-4842-0650-8_4_Fig1_HTML.jpg](A978-1-4842-0650-8_4_Fig1_HTML.jpg)\n\n\
    **Figure 4-1.** Images used in the SpriteDrawing example\n\n## Loading and Drawing\
    \ Sprites\n\nAny image part of the `Images.xcassets` folder can be loaded and\
    \ drawn on the screen. This is done in a way very similar to drawing a text label\
    \ on the screen. The following is the `GameScene` class from the SpriteDrawing\
    \ example belonging to this chapter:\n\n```swift\nclass GameScene: SKScene {\n\
    \    var balloonSprite = SKSpriteNode(imageNamed: \"spr_balloon\")\n    override\
    \ func didMoveToView(view: SKView) {\n        backgroundColor = UIColor.lightGrayColor()\n\
    \        balloonSprite.position = CGPoint(x: 200, y: 200)\n        addChild(balloonSprite)\n\
    \    }\n}\n```\n\nYou can see that a variable called `balloonSprite` is created.\
    \ This variable refers to a value of type `SKSpriteNode`. In order to create this\
    \ value, you have to pass along a parameter: the name of the sprite that should\
    \ be loaded. In the `didMoveToView` method, you assign a position to the `balloonSprite`\
    \ variable, and finally, you add it to the scene. Figure [4-2](#A978-1-4842-0650-8_4_Chapter.html#Fig2)\
    \ shows the output of the SpriteDrawing program.\n\n![A978-1-4842-0650-8_4_Fig2_HTML.jpg](A978-1-4842-0650-8_4_Fig2_HTML.jpg)\n\
    \n**Figure 4-2.** The output of the SpriteDrawing program"
  raw: '# 4. Game Assets


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​4](http://dx.doi.org/10.1007/978-1-4842-0650-8_4))
    contains supplementary material, which is available to authorized users.


    The previous chapters showed you how to make a very basic game application in
    Swift. You saw how to create a game project in Xcode, and then write a few lines
    of code to change the background color of an app or to display a text label. You
    were also introduced to the game loop, and you used the update part of the game
    loop to vary the background color over time. This chapter will show you how to
    draw images on the screen, which is the first step toward making nice-looking
    games. In computer graphics, these images are also called sprites. Sprites are
    generally loaded from a file. This means any program that draws sprites is no
    longer simply an isolated set of instructions, but relies on game assets that
    are stored somewhere. This immediately introduces a number of things that you
    need to think about:


    *   Where are sprites located?

    *   How do you load and draw a sprite on the screen?

    *   How do you deal with the resolutions and aspect ratios of the various iDevices?


    This chapter answers these questions.


    Sound is another type of game asset. And at the end of this chapter, you will
    also learn how to play music and sound effects in your game.


    Note


    The name sprite comes from spriting, which is the process of creating two-dimensional,
    partially transparent raster graphics that are used for video games. In the early
    days, creating these two-dimensional images was a lot of manual work, but it resulted
    in a particular style of imagery that inspired people to create similar images
    of their own, resulting in an artistic technique called pixel art or sprite art.


    ## Locating Sprites


    Before a program can use any kind of assets, it needs to know where to look for
    those assets. By default, a game project in Xcode has a folder called Images.xcassets.
    Look at the SpriteDrawing example belonging to this chapter. When you open this
    project in Xcode and left-click `Images.xcassets`, you will see that it lists
    two files: one that represents the app icon, and another one called `spr_balloon`.
    The latter refers to an image of a balloon that you can draw on the screen. If
    you left-click the balloon, you’ll see that the image contains several sub-images
    at different resolutions (see Figure [4-1](#A978-1-4842-0650-8_4_Chapter.html#Fig1)).
    These different resolutions are necessary because of the different technical specs
    of various iOS devices (an iPad Air with its Retina screen has a much higher resolution
    than an iPhone 4). I’ll talk more about this issue later in this chapter.


    ![A978-1-4842-0650-8_4_Fig1_HTML.jpg](A978-1-4842-0650-8_4_Fig1_HTML.jpg)


    Figure 4-1.


    Images used in the SpriteDrawing example


    ## Loading and Drawing Sprites


    Any image part of the `Images.xcassets` folder can be loaded and drawn on the
    screen. This is done in a way very similar to drawing a text label on the screen.
    The following is the `GameScene` class from the SpriteDrawing example belonging
    to this chapter:


    `class GameScene: SKScene {`


        `var balloonSprite = SKSpriteNode(imageNamed: "spr_balloon")`


        `override func didMoveToView(view: SKView) {`


            `backgroundColor = UIColor.lightGrayColor()`


            `balloonSprite.position = CGPoint(x: 200, y: 200)`


            `addChild(balloonSprite)`


        `}`


    `}`


    You can see that a variable called `balloonSprite` is created. This variable refers
    to a value of type `SKSpriteNode`. In order to create this value, you have to
    pass along a parameter: the name of the sprite that should be loaded. In the `didMoveToView`
    method, you assign a position to the `balloonSprite` variable, and finally, you
    add it to the scene. Figure [4-2](#A978-1-4842-0650-8_4_Chapter.html#Fig2) shows
    the output of the SpriteDrawing program.


    ![A978-1-4842-0650-8_4_Fig2_HTML.jpg](A978-1-4842-0650-8_4_Fig2_HTML.jpg)


    Figure 4-2.


    The output of the SpriteDrawing program'
  trans: "\n# 4. 游戏资源\n\n电子补充材料 本章在线版本（doi:[10.​1007/​978-1-4842-0650-8_​4](http://dx.doi.org/10.1007/978-1-4842-0650-8_4)）包含补充材料，仅供授权用户使用。\n\
    \n前几章展示了如何在 Swift 中制作一个非常基础的游戏应用。你学习了如何在 Xcode 中创建游戏项目，然后编写几行代码来更改应用的背景颜色或显示文本标签。你还了解了游戏循环，并利用游戏循环的更新部分随时间改变背景颜色。本章将向你展示如何在屏幕上绘制图像，这是制作精美游戏的第一步。在计算机图形学中，这些图像也被称为精灵（sprites）。精灵通常从文件中加载。这意味着任何绘制精灵的程序都不再仅仅是一组孤立的指令，而是依赖于存储在某个位置的游戏资源。这立即引入了一些你需要考虑的问题：\n\
    \n-   精灵位于何处？\n-   如何加载并在屏幕上绘制精灵？\n-   如何处理各种 iDevice 的分辨率和宽高比？\n\n本章将解答这些问题。\n\
    \n声音是另一种游戏资源。在本章末尾，你还会学习如何在游戏中播放音乐和音效。\n\n> **注**  \n> 精灵（sprite）这个名称源于精灵绘制（spriting）技术，即创建用于视频游戏的二维、部分透明的光栅图形。早期，创建这些二维图像需要大量手工工作，但这形成了一种独特的图像风格，激发了人们创作类似图像的热情，最终发展出一种被称为像素艺术（pixel\
    \ art）或精灵艺术（sprite art）的艺术技巧。\n\n## 定位精灵\n\n在程序使用任何类型的资源之前，它需要知道去哪里寻找这些资源。默认情况下，Xcode\
    \ 中的游戏项目有一个名为 `Images.xcassets` 的文件夹。查看本章附带的 SpriteDrawing 示例。当你在 Xcode 中打开此项目并左键单击\
    \ `Images.xcassets` 时，你会看到它列出了两个文件：一个代表应用图标，另一个名为 `spr_balloon`。后者指的是一个可在屏幕上绘制的气球图像。如果你左键单击气球，你会看到该图像包含多个不同分辨率的子图像（见图\
    \ 4-1）。由于不同 iOS 设备的技术规格差异（例如配备 Retina 屏幕的 iPad Air 比 iPhone 4 的分辨率高得多），这些不同的分辨率是必要的。本章稍后会详细讨论这个问题。\n\
    \n![A978-1-4842-0650-8_4_Fig1_HTML.jpg](img/A978-1-4842-0650-8_4_Fig1_HTML.jpg)\n\
    \n**图 4-1.** SpriteDrawing 示例中使用的图像\n\n## 加载和绘制精灵\n\n`Images.xcassets` 文件夹中的任何图像都可以加载并绘制在屏幕上。其方式与在屏幕上绘制文本标签非常相似。以下是本章附带的\
    \ SpriteDrawing 示例中的 `GameScene` 类：\n\n```swift\nclass GameScene: SKScene {\n\
    \    var balloonSprite = SKSpriteNode(imageNamed: \"spr_balloon\")\n    override\
    \ func didMoveToView(view: SKView) {\n        backgroundColor = UIColor.lightGrayColor()\n\
    \        balloonSprite.position = CGPoint(x: 200, y: 200)\n        addChild(balloonSprite)\n\
    \    }\n}\n```\n\n可以看到，这里创建了一个名为 `balloonSprite` 的变量。该变量指向一个类型为 `SKSpriteNode`\
    \ 的值。为了创建这个值，你需要传入一个参数：要加载的精灵的名称。在 `didMoveToView` 方法中，你为 `balloonSprite` 变量分配了一个位置，最后将其添加到场景中。图\
    \ 4-2 显示了 SpriteDrawing 程序的输出结果。\n\n![A978-1-4842-0650-8_4_Fig2_HTML.jpg](img/A978-1-4842-0650-8_4_Fig2_HTML.jpg)\n\
    \n**图 4-2.** SpriteDrawing 程序的输出结果\n"
- fmt: "## Resolutions and Aspect Ratios\n\nA big challenge when you're developing\
    \ games for iOS is making sure that your game looks nice on different iOS devices.\
    \ It's not enough to design nice sprites; you have to make sure that the size\
    \ and resolution matches the requirement of the platform. There is a very big\
    \ difference in the required sprite quality between an iPad 2 with a screen resolution\
    \ of 1024x768 pixels versus an iPad Air that has a 2048x1536 resolution due to\
    \ its Retina screen. Not only are the resolutions different, the aspect ratios\
    \ differ between devices as well. An iPad has a much more square screen with its\
    \ 4:3 aspect ratio versus the widescreen 16:9 aspect ratio of the iPhone 6. So\
    \ how do you deal with these differences between iOS devices?\n\nOf course, a\
    \ possible solution is to create your game such that it only works on a single\
    \ device. That way, you don’t have to deal with differences between iOS devices\
    \ at all. However, you will lose a lot of players that way. In the following paragraphs,\
    \ I'll show you a way to make sure your sprites work well on several devices,\
    \ without having to change the code. The main thing you need to watch out for\
    \ is making sure that the internal game world size doesn't change too much. For\
    \ example, consider that the iPhone 4 resolution is 960x640 and the iPad Air is\
    \ 2048x1536. One way to deal with these two very different resolutions is that\
    \ the iPad Air simply shows a bigger part of the game world than the iPhone 4\
    \ (since more fits on its screen). However, that's not a good idea. When you design\
    \ a game that should always show a single screen, such as most of the example\
    \ games in this book, you can't apply this trick. And showing a much larger part\
    \ of the game world on some devices influences the gameplay. If you create a strategy\
    \ game, you don’t want iPhone 4 players to have a disadvantage compared to iPad\
    \ Air players because they cannot see oncoming attacks as well.\n\nThe other way\
    \ to deal with these different resolutions is by separating the game world size\
    \ from the screen size. This is what Apple has opted for. Internally, when you\
    \ write the code for your game, you are working with points and not with pixels\
    \ directly. However, in some cases, points and pixels correspond directly. For\
    \ example, consider the following change to the `SpriteDrawing` example:\n\n`balloonSprite.position\
    \ = CGPoint(x: 201, y: 200)`\n\nThe sprite is moved one point in the positive\
    \ x direction. On the iPhone 3GS or the iPad 2, this means that the sprite will\
    \ move one pixel in that direction. On the iPad Air however, the sprite will move\
    \ two pixels in the positive x direction. In order to have more or less the same\
    \ size visuals, you need to create two sprites: a standard resolution one (called\
    \ \"1x\" by Apple) that works on the iPhone 3GS or the iPad 2, and a Retina resolution\
    \ one (called \"2x\") for the iPad Air and the newer iPhones. When you look at\
    \ the balloon sprite, you'll see that there are sprites for both the 1x and 2x\
    \ resolution. The Retina (2x) resolution sprites are double the size of the standard\
    \ (1x) resolution. That way, the size of your game stays the same whether you\
    \ play it on an iPad 2 or on an iPad Air. In the latter case, the game will look\
    \ a lot better since you can provide higher quality artwork in the 2x resolution\
    \ format.\n\nSince the iPhone 6 Plus came out, there is also a 3x resolution option,\
    \ also called Retina HD. This resolution is currently only used by the iPhone\
    \ 6 Plus, and it allows you to create art at a yet higher resolution, namely triple\
    \ the size of the standard (1x) resolution.\n\nThe games in this book use art\
    \ that has been optimized for all the iDevices, except the iPhone 6 Plus. If you\
    \ open any of the examples, you'll see that all the sprites are provided in the\
    \ 1x and 2x resolutions. Note that the example games will run just fine on an\
    \ iPhone 6 Plus, even though the images are not optimized for it; however, the\
    \ graphics would be crisper if images at 3x resolution were used.\n\nApart from\
    \ the resolution that is used, you need to think about the aspect ratio. One thing\
    \ you can do in your code is make sure that overlays such as buttons or a health\
    \ bar are always placed relative to the size of the screen. The only area where\
    \ you need to be careful is when designing background images. If your background\
    \ images are not large enough, you will see black space on some devices.\n\nIn\
    \ this book, I use a background image of 2668x1536 pixels at Retina (2x) resolution.\
    \ The standard resolution (1x) is then 1334x768 pixels. A background image of\
    \ this size is large enough such that none of the devices show any black space.\
