    ## Other Numeric Types


    In addition to integer numbers, Swift knows other types of numbers. For example,
    Swift has a type called `Double`. Variables of that type can contain numbers with
    decimals. After the declaration


    `var d: Double`


    you give the variable a value with the assignment operation:


    `d = 2.18`


    Variables of type `Double` can also contain integer numbers:


    `d = 10`


    Behind the scenes, the compiler will automatically place a zero behind the decimal
    point. Other than with the `Int` type, dividing `Double` variables results in
    only small rounding errors:


    `d = d / 3`


    The variable `d` now contains the number 3.33333333.


    Apart from `Int` and `Double`, there are 10 other types in Swift for numeric variables.
    Eight of the 10 numeric types can be used for integer numbers. The difference
    between the types is the range of values that can be represented by a type. Some
    types allow for a bigger range of values to be represented, but the downside is
    that these types require more memory. Memory is limited, especially when you’re
    developing games for smartphones. So when you have to store a number, think beforehand
    which type is best suited. For example, if you want to store the current level
    index, it makes no sense to use a `Double` type, since level indices are integer
    numbers. In that case, a type that only holds positive integer numbers would be
    more suited. There are types that can contain both negative and positive values;
    other types only contain positive values. Table 3-1 gives an overview of the various
    integer types used in Swift.


    Table 3-1. Overview of Available Integer Numeric Types in Swift


    | Type | Space | Lowest Value | Highest Value |

    | --- | --- | --- | --- |

    | `Int8` | 8 bits/1 byte | -128 | 127 |

    | `Int16` | 16 bits/2 bytes | -32,768 | 32,767 |

    | `Int32` | 32 bits/4 bytes | -2,147,483,648 | 2,147,483,647 |

    | `Int64` | 64 bits/8 bytes | -9,223,372,036,854,775,808 | 9,223,372,036,854,775,807
    |

    | `UInt8` | 8 bits/1 byte | 0 | 255 |

    | `UInt16` | 16 bits/2 bytes | 0 | 65,535 |

    | `UInt32` | 32 bits/4 bytes | 0 | 4,294,967,295 |

    | `UInt64` | 64 bits/8 bytes | 0 | 18,446,744,073,709,551,615 |


    The `Int64` type is only needed if you’re planning to use extremely high or low
    (negative) values. The `Int8` type is used if the range of the values is limited.
    In general, the memory that this saves is only relevant if a lot of these variables
    (thousands, or even millions) are required. Each integer type also has an unsigned
    version, and its name begins with a U. Unsigned types can only contain values
    greater than or equal to 0. Finally, `Int` holds 32 bits on 32-bit platforms and
    64 bits on 64 bit platforms.


    For real numbers, there are three different types available. They not only differ
    in the maximum value that can be stored, but also in precision after the decimal
    point. You’ve already seen the `Double` type. This type has a precision of at
    least 15 digits. The precision of the `Float` type can be as little as 6 decimal
    digits, but a variable of type `Float` also only takes half the space of `Double`.
    Finally, there is a high-precision type called `Float80`, which can handle up
    to 19 digits of precision.


    Every type has its own target application. For example, the `Float80` type could
    be useful for games that require very precise physical calculations. The `Double`
    type is used for many mathematical calculations. `Float` is used if precision
    is not that important, but saving memory usage is.


    When you convert an expression of a certain type into an expression of another
    type, it’s called a type conversion. You can convert a value to another type by
    writing the type that you want to convert to in front of the expression, and write
    the expression between parentheses. For example, here is how you convert a `Double`
    to a `Float`:


    ```

    let pi: Double = 3.141592653589793

    var smallPi: Float = Float(pi) // contains the value 3.1415927

    ```


    As you can see in the example above, if you convert a `Double` to a `Float`, you
    lose precision. This is why you have to indicate explicitly to the compiler when
    you want to convert one type into another. If you want to convert a `Float` to
    a `Double`, you will not lose precision, but you still have to explicitly indicate
    that you want the compiler to convert the value, like so:


    ```

    var myDouble: Double = 12.34

    var myFloat: Float = 56.78

    var anotherDouble: Double = myFloat // error

    var yetAnotherDouble: Double = Double(myFloat) // OK

    var anotherFloat: Float = myDouble             // error

    var yetAnotherFloat: Float = Float(myDouble)   // OK

    ```'
