- fmt: "# Interaction\n\nSince you defined a physics body for each game object, you\
    \ can now manipulate the object by applying forces to it. For example, you could\
    \ give a physics body a velocity, as follows:\n\n`physicsBody?.velocity = CGVector(dx:\
    \ 10, dy: 10)`\n\nAs you can see, the `physicsBody` property is optional, which\
    \ makes sense because if the object is not part of the physics system, the property\
    \ is `nil`. The velocity property of `physicsBody` is of type `CGVector`, which\
    \ represents a two-dimensional vector. Once you assign a velocity to an object,\
    \ it automatically calculates its own position according to that velocity as the\
    \ game progresses. In the `Treasure` class, you use this to allow for dragging\
    \ of a physics-based object:\n\n```\nvar moveVector = inputHelper.getTouch(touchid)\n\
    moveVector.x -= position.x\nmoveVector.y -= position.y\nphysicsBody?.velocity\
    \ = CGVector(dx: moveVector.x * 10, dy: moveVector.y * 10)\n```\n\nFirst, you\
    \ calculate the vector that represents the direction in which the physics body\
    \ should move. You do this by retrieving the touch position, and subtracting the\
    \ current object position from it. In order for the object to move towards the\
    \ touch position fast enough, the `x` and `y` factors of the velocity vector are\
    \ multiplied by a constant value (10). Once you assign that vector to the `velocity`\
    \ property of the physics body, the object position is automatically updated.\n\
    \nAnother type of interaction you want to handle is collisions between objects.\
    \ In games, often some kind of action needs to be taken when objects collide with\
    \ each other. If the player collides with a power-up, player health should be\
    \ increased. If the player collides with an enemy, the player is damaged. If the\
    \ player collides with a star, the player should be awarded points.\n\nIn SpriteKit,\
    \ you can indicate which object is responsible for handling collisions (or contacts).\
    \ If this object then has a specific method, that method will be called whenever\
    \ there is a contact between physical bodies. SpriteKit uses a Swift feature called\
    \ a protocol to enforce this. A protocol is simply a definition of a collection\
    \ of method (or property) headers to help developers write more coherent code.\
    \ Here is an example of a protocol called `SKPhysicsContactDelegate`:\n\n```\n\
    protocol SKPhysicsContactDelegate : NSObjectProtocol {\n    optional func didBeginContact(contact:\
    \ SKPhysicsContact)\n    optional func didEndContact(contact: SKPhysicsContact)\n\
    }\n```\n\nAs you can see, this protocol contains two method headers, `didBeginContact`\
    \ and `didEndContact`. Let’s change the `GameWorld` class so that it adheres to\
    \ the `SKPhysicsContactDelegate` protocol. This is done in a way very similar\
    \ to inheritance:\n\n```\nclass GameWorld : GameObjectNode, SKPhysicsContactDelegate\
    \ {\n    // To do: class body\n}\n```\n\nIf a class adheres to a protocol, you\
    \ can also say that a class implements the protocol. In this case, `GameWorld`\
    \ now implements the protocol `SKPhysicsContactDelegate`. The protocol describes\
    \ that any class that implements it, and optionally defines the methods `didBeginContact`\
    \ and `didEndContact`. There are also protocols that oblige a class that implements\
    \ it to define methods or properties, or even initializers. Take a look at the\
    \ following protocol:\n\n```\nprotocol NSCoding {\n    func encodeWithCoder(aCoder:\
    \ NSCoder)\n    init(coder aDecoder: NSCoder)\n}\n```\n\nIf a class implements\
    \ this protocol, it has to have the method as well as the initializer defined\
    \ in the protocol. This protocol is implemented by `SKNode`, and it is one of\
    \ the reasons why any subclass of `SKNode`, including `GameObjectNode`, needs\
    \ to define a particular initializer:\n\n```\nrequired init?(coder aDecoder: NSCoder)\
    \ {\n    fatalError(\"init(coder:) has not been implemented\")\n}\n```\n\nIn the\
    \ `GameWorld` class, you add the following method defined in the `SKPhysicsContactDelegate`\
    \ protocol:\n\n```\nfunc didBeginContact(contact: SKPhysicsContact) {\n    let\
    \ firstBody = contact.bodyA.node as? Treasure\n    let secondBody = contact.bodyB.node\
    \ as? Treasure\n    print(\"Contact at position \\(contact.contactPoint)\")\n\
    }\n```\n\nAs you can see in the body of the method, the `contact` parameter contains\
    \ information about what bodies are in contact, and where the contact is in the\
    \ game world. Just for testing purposes, the contact location is printed to the\
    \ screen whenever a contact between two physics bodies has started. You can also\
    \ implement the `didEndContact` method, and then you can take an action whenever\
    \ two objects stop being in contact. For example, when the player removes a diamond\
    \ from a table, you could set off an alarm. In the next chapters, you’re going\
    \ to define more complex behavior when there is contact between game objects.\n\
    \nYou need to do one more thing to make sure that `didBeginContact` is called\
    \ whenever there is contact between two physical bodies: you need to tell the\
    \ scene that the object responsible for contact handling is the `GameWorld` instance.\
    \ You do this by adding the following line of code to the `didMoveToView` method\
    \ of `GameScene`:\n\n`physicsWorld.contactDelegate = GameScene.world`\n\nThis\
    \ completes the TutsTomb2 example. Figure [13-1](#A978-1-4842-0650-8_13_Chapter.html#Fig1)\
    \ shows a screenshot of the game so far. Run the example yourself, and see how\
    \ it works. Play around with the settings of the physics engine. For example,\
    \ can you change the gravity? Also, try to change the shapes that are used for\
    \ the game object physical bodies and see how the gameplay changes.\n\n![A978-1-4842-0650-8_13_Fig1_HTML.jpg](A978-1-4842-0650-8_13_Fig1_HTML.jpg)\n\
    \n**Figure 13-1.** A screenshot of the TutsTomb2 example program\n\n**Note** One\
    \ of the interesting things you can do with physics in games is play around with\
    \ the parameters of the physics engine. Most physics engines (including the one\
    \ provided with SpriteKit) allow you to change things such as the gravity force,\
    \ or which objects are affected by gravity. This is useful for games that take\
    \ place on alien worlds with different gravities. Also, it’s more important that\
    \ a game is playable than that it has correct physics. In strategy games, airplanes\
    \ fly as fast as soldiers can walk on the ground. This is completely unrealistic,\
    \ but it makes the game playable. Don’t hesitate to change the settings of the\
    \ physics engine to improve the gameplay. Have a look at the properties and methods\
    \ of the `SKPhysicsBody` class to get an idea of the possibilities.\n\n# What\
    \ You Have Learned\n\nIn this chapter, you have learned the following:\n\n- How\
    \ to organize game objects in a scene graph by using a basic game object class\n\
    - How to add physical behavior to your game\n- How to interact with objects in\
    \ a physical world by dragging them\n- How to take an action when two objects\
    \ collide with each other\n\n# 14. Gameplay Programming\n\nElectronic supplementary\
    \ material The online version of this chapter (doi:[10.1007/978-1-4842-0650-8_14](http://dx.doi.org/10.1007/978-1-4842-0650-8_14))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    This chapter looks into the gameplay programming of the Tut’s Tomb game. You will\
    \ learn how to use actions as an easy way to add behavior to the game world. Also,\
    \ you’ll deal with interactions between game objects (for example, when two treasures\
    \ of the same type collide)."
  raw: '## Interaction


    Since you defined a physics body for each game object, you can now manipulate
    the object by applying forces to it. For example, you could give a physics body
    a velocity, as follows:


    `physicsBody?.velocity = CGVector(dx: 10, dy: 10)`


    As you can see, the `physicsBody` property is optional, which makes sense because
    if the object is not part of the physics system, the property is `nil`. The velocity
    property of `physicsBody` is of type `CGVector`, which represents a two-dimensional
    vector. Once you assign a velocity to an object, it automatically calculates its
    own position according to that velocity as the game progresses. In the `Treasure`
    class, you use this to allow for dragging of a physics-based object:


    `var moveVector = inputHelper.getTouch(touchid)`


    `moveVector.x -= position.x`


    `moveVector.y -= position.y`


    `physicsBody?.velocity = CGVector(dx: moveVector.x * 10, dy: moveVector.y * 10)`


    First, you calculate the vector that represents the direction in which the physics
    body should move. You do this by retrieving the touch position, and subtracting
    the current object position from it. In order for the object to move towards the
    touch position fast enough, the x and y factors of the velocity vector are multiplied
    by a constant value (10). Once you assign that vector to the `velocity` property
    of the physics body, the object position is automatically updated.


    Another type of interaction you want to handle is collisions between objects.
    In games, often some kind of action needs to be taken when objects collide with
    each other. If the player collides with a power-up, player health should be increased.
    If the player collides with an enemy, the player is damaged. If the player collides
    with a star, the player should be awarded points.


    In SpriteKit, you can indicate which object is responsible for handling collisions
    (or contacts). If this object then has a specific method, that method will be
    called whenever there is a contact between physical bodies. SpriteKit uses a Swift
    feature called a protocol to enforce this. A protocol is simply a definition of
    a collection of method (or property) headers to help developers write more coherent
    code. Here is an example of a protocol called `SKPhysicsContactDelegate`:


    `protocol SKPhysicsContactDelegate : NSObjectProtocol {`


    `optional func didBeginContact(contact: SKPhysicsContact)`


    `optional func didEndContact(contact: SKPhysicsContact)`


    `}`


    As you can see, this protocol contains two method headers, `didBeginContact` and
    `didEndContact`. Let’s change the `GameWorld` class so that it adheres to the
    `SKPhysicsContactDelegate` protocol. This is done in a way very similar to inheritance:


    `class GameWorld : GameObjectNode, SKPhysicsContactDelegate {`


    `// To do: class body`


    `}`


    If a class adheres to a protocol, you can also say that a class implements the
    protocol. In this case, GameWorld now implements the protocol `SKPhysicsContactDelegate`.
    The protocol describes that any class that implements it, and optionally defines
    the methods `didBeginContact` and `didEndContact`. There are also protocols that
    oblige a class that implements it to define methods or properties, or even initializers.
    Take a look at the following protocol:


    `protocol NSCoding {`


    `func encodeWithCoder(aCoder: NSCoder)`


    `init(coder aDecoder: NSCoder)`


    `}`


    If a class implements this protocol, it has to have the method as well as the
    initializer defined in the protocol. This protocol is implemented by `SKNode`,
    and it is one of the reasons why any subclass of `SKNode`, including `GameObjectNode`,
    needs to define a particular initializer:


    `required init?(coder aDecoder: NSCoder) {`


    `fatalError("init(coder:) has not been implemented")`


    `}`


    In the `GameWorld` class, you add the following method defined in the `SKPhysicsContactDelegate`
    protocol:


    `func didBeginContact(contact: SKPhysicsContact) {`


    `let firstBody = contact.bodyA.node as? Treasure`


    `let secondBody = contact.bodyB.node as? Treasure`


    `print("Contact at position \(contact.contactPoint)")`


    `}`


    As you can see in the body of the method, the `contact` parameter contains information
    about what bodies are in contact, and where the contact is in the game world.
    Just for testing purposes, the contact location is printed to the screen whenever
    a contact between two physics bodies has started. You can also implement the `didEndContact`
    method, and then you can take an action whenever two objects stop being in contact.
    For example, when the player removes a diamond from a table, you could set off
    an alarm. In the next chapters, you’re going to define more complex behavior when
    there is contact between game objects.


    You need to do one more thing to make sure that `didBeginContact` is called whenever
    there is contact between two physical bodies: you need to tell the scene that
    the object responsible for contact handling is the `GameWorld` instance. You do
    this by adding the following line of code to the `didMoveToView` method of `GameScene`:


    `physicsWorld.contactDelegate = GameScene.world`


    This completes the TutsTomb2 example. Figure [13-1](#A978-1-4842-0650-8_13_Chapter.html#Fig1)
    shows a screenshot of the game so far. Run the example yourself, and see how it
    works. Play around with the settings of the physics engine. For example, can you
    change the gravity? Also, try to change the shapes that are used for the game
    object physical bodies and see how the gameplay changes.


    ![A978-1-4842-0650-8_13_Fig1_HTML.jpg](A978-1-4842-0650-8_13_Fig1_HTML.jpg)


    Figure 13-1.


    A screenshot of the TutsTomb2 example program


    Note One of the interesting things you can do with physics in games is play around
    with the parameters of the physics engine. Most physics engines (including the
    one provided with SpriteKit) allow you to change things such as the gravity force,
    or which objects are affected by gravity. This is useful for games that take place
    on alien worlds with different gravities. Also, it’s more important that a game
    is playable than that it has correct physics. In strategy games, airplanes fly
    as fast as soldiers can walk on the ground. This is completely unrealistic, but
    it makes the game playable. Don’t hesitate to change the settings of the physics
    engine to improve the gameplay. Have a look at the properties and methods of the
    `SKPhysicsBody` class to get an idea of the possibilities.


    ## What You Have Learned


    In this chapter, you have learned the following:


    *   How to organize game objects in a scene graph by using a basic game object
    class

    *   How to add physical behavior to your game

    *   How to interact with objects in a physical world by dragging them

    *   How to take an action when two objects collide with each other


    # 14. Gameplay Programming


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​14](http://dx.doi.org/10.1007/978-1-4842-0650-8_14))
    contains supplementary material, which is available to authorized users.


    This chapter looks into the gameplay programming of the Tut’s Tomb game. You will
    learn how to use actions as an easy way to add behavior to the game world. Also,
    you’ll deal with interactions between game objects (for example, when two treasures
    of the same type collide).'
  trans: "\n# 交互\n\n既然已经为每个游戏对象定义了物理实体，现在可以通过施加力来操控对象。例如，可以像这样为物理实体赋予一个速度：\n\n`physicsBody?.velocity\
    \ = CGVector(dx: 10, dy: 10)`\n\n如你所见，`physicsBody` 属性是可选的，这很合理，因为如果对象不属于物理系统，该属性就是\
    \ `nil`。`physicsBody` 的 `velocity` 属性的类型是 `CGVector`，它代表一个二维向量。一旦为对象指定了速度，随着游戏进程推进，它会根据该速度自动计算出自身位置。在\
    \ `Treasure` 类中，你可以利用这一特性实现对物理对象的拖拽操作：\n\n```\nvar moveVector = inputHelper.getTouch(touchid)\n\
    moveVector.x -= position.x\nmoveVector.y -= position.y\nphysicsBody?.velocity\
    \ = CGVector(dx: moveVector.x * 10, dy: moveVector.y * 10)\n```\n\n首先，计算出一个向量，它代表物理实体应当移动的方向。具体做法是获取触摸位置，然后从中减去当前对象的位置。为了让对象足够快地移动到触摸位置，速度向量的\
    \ `x` 和 `y` 分量需要乘以一个常量（10）。一旦将这个向量赋值给物理实体的 `velocity` 属性，对象的位置就会自动更新。\n\n另一种需要处理的交互类型是对象之间的碰撞。在游戏中，当对象相互碰撞时，通常需要执行某种操作。如果玩家与道具发生碰撞，玩家生命值应增加；如果玩家与敌人碰撞，玩家将受到伤害；如果玩家与星星碰撞，则应为玩家增加分数。\n\
    \n在 SpriteKit 中，你可以指定由哪个对象负责处理碰撞（或接触）。如果这个对象拥有特定的方法，那么每当物理实体之间发生接触时，该方法就会被调用。SpriteKit\
    \ 使用一种 Swift 特性——协议（protocol）来强制执行这一点。协议本质上是一组方法（或属性）头的定义，旨在帮助开发者编写更连贯的代码。以下是一个名为\
    \ `SKPhysicsContactDelegate` 的协议示例：\n\n```\nprotocol SKPhysicsContactDelegate\
    \ : NSObjectProtocol {\n    optional func didBeginContact(contact: SKPhysicsContact)\n\
    \    optional func didEndContact(contact: SKPhysicsContact)\n}\n```\n\n如你所见，该协议包含两个方法头：`didBeginContact`\
    \ 和 `didEndContact`。现在我们来修改 `GameWorld` 类，使其遵循 `SKPhysicsContactDelegate` 协议。实现方式与继承非常相似：\n\
    \n```\nclass GameWorld : GameObjectNode, SKPhysicsContactDelegate {\n    // 待完成：类主体\n\
    }\n```\n\n如果一个类遵循某个协议，也可以说这个类实现了该协议。在此例中，`GameWorld` 现在实现了 `SKPhysicsContactDelegate`\
    \ 协议。该协议描述了任何实现它的类，并可选地定义 `didBeginContact` 和 `didEndContact` 方法。还有一些协议强制要求实现它的类必须定义方法、属性，甚至是初始化器。请看以下协议：\n\
    \n```\nprotocol NSCoding {\n    func encodeWithCoder(aCoder: NSCoder)\n    init(coder\
    \ aDecoder: NSCoder)\n}\n```\n\n如果一个类实现了这个协议，它就必须拥有协议中定义的方法和初始化器。`SKNode` 实现了这个协议，这也是为什么\
    \ `SKNode` 的任何子类（包括 `GameObjectNode`）都需要定义一个特定的初始化器：\n\n```\nrequired init?(coder\
    \ aDecoder: NSCoder) {\n    fatalError(\"init(coder:) has not been implemented\"\
    )\n}\n```\n\n在 `GameWorld` 类中，添加以下来自 `SKPhysicsContactDelegate` 协议定义的方法：\n\n```\n\
    func didBeginContact(contact: SKPhysicsContact) {\n    let firstBody = contact.bodyA.node\
    \ as? Treasure\n    let secondBody = contact.bodyB.node as? Treasure\n    print(\"\
    Contact at position \\(contact.contactPoint)\")\n}\n```\n\n从方法主体中可以看到，`contact`\
    \ 参数包含了哪些物理实体发生了接触，以及接触在游戏世界中的位置等信息。为了测试，每当两个物理体之间的接触开始时，会在屏幕上打印接触位置。你也可以实现 `didEndContact`\
    \ 方法，这样就能在两个对象停止接触时执行特定动作。例如，当玩家从桌子上拿走一颗钻石时，你可以触发警报。在接下来的章节中，你将定义游戏对象接触时更复杂的行为。\n\
    \n你还需再做一件事，以确保每当两个物理体接触时都能调用 `didBeginContact`：你需要告知场景，负责处理接触的对象是 `GameWorld`\
    \ 实例。为此，在 `GameScene` 的 `didMoveToView` 方法中添加以下这行代码：\n\n`physicsWorld.contactDelegate\
    \ = GameScene.world`\n\n至此，TutsTomb2 示例就完成了。图 13-1 展示了当前游戏的截图。请自行运行这个示例，看看它是如何工作的。尝试调整物理引擎的设置，例如，你能改变重力吗？同时，试着改变游戏对象物理体的形状，观察游戏玩法会发生什么变化。\n\
    \n![A978-1-4842-0650-8_13_Fig1_HTML.jpg](img/A978-1-4842-0650-8_13_Fig1_HTML.jpg)\n\
    \n**图 13-1.** TutsTomb2 示例程序的截图\n\n**注意** 在游戏中使用物理引擎时，一个有趣的方面是调整物理引擎的参数。大多数物理引擎（包括\
    \ SpriteKit 内置的）都允许你修改诸如重力大小，或哪些对象受重力影响等参数。这对于设定在具有不同重力的外星世界的游戏非常有用。此外，游戏的可玩性比物理正确性更重要。在策略游戏中，飞机飞行速度可以像士兵在地上行走一样快。这完全不符合现实，但它让游戏变得可玩。不要犹豫，大胆改变物理引擎的设置来提升游戏体验。不妨查看一下\
    \ `SKPhysicsBody` 类的属性和方法，以了解其可能性。\n\n# 本章所学\n\n在本章中，你学习了以下内容：\n\n-   如何使用基础的游戏对象类，在场景图中组织游戏对象\n\
    -   如何为游戏添加物理行为\n-   如何通过拖拽的方式与物理世界中的对象进行交互\n-   如何在两个对象相互碰撞时执行动作\n\n# 14. 游戏玩法编程\n\
    \n电子补充材料：本章的在线版本（doi:[10.1007/978-1-4842-0650-8_14](http://dx.doi.org/10.1007/978-1-4842-0650-8_14)）包含补充材料，仅供授权用户访问。\n\
    \n本章将探讨“图坦卡蒙之墓”游戏的玩法编程。你将学习如何使用动作（actions）来轻松地为游戏世界添加行为。此外，你还将处理游戏对象之间的交互（例如，当两个相同类型的宝藏发生碰撞时）。\n"
- fmt: '# Game Object Behavior


    Previously, the way in which you added behavior to the games was by defining `handleInput`
    and `update` methods as a part of each game object class, and then making sure
    that those methods were called in each instance during the game loop. The nice
    thing about this approach is that each game object is responsible for its own
    behavior. The behavior of the ball in Painter is defined in the `Ball` class;
    the behavior of a treasure in Tut’s Tomb is defined in the `Treasure` class.


    Defining behavior in methods that are a part of the class is nice: when you look
    at the class definition, you immediately see what the behavior of an instance
    of that class entails. This approach also has its limitations. Most importantly,
    there is no way to copy behavior between different classes. The paint cans in
    Painter display the behavior of falling down again and again, with random time
    intervals. In Tut’s Tomb, treasures also fall down, but there is no simple way
    to copy the behavior from the paint cans to the treasures, apart from copying
    and pasting the code between the classes.


    Generally speaking, game objects often have a lot in common in terms of their
    behavior. Most platform games will have some kind of patrolling enemy moving from
    left to right and back again. Objects, such as bonus lives for the player, appear
    in the scene randomly or at fixed time intervals. Game objects may have simple
    special effects such as rotation or scaling (for example, for a bomb about to
    explode). Wouldn’t it be nice if you could somehow separate this behavior from
    the game objects itself, so that it can be copied more easily between classes?


    ## Actions


    The SpriteKit framework offers a very nice solution for defining game object behavior
    in a more general manner: by using so-called actions. In SpriteKit, you can attach
    these actions to instances of `SKNode` and determine how often and in which order
    they are executed. You can think of actions as simple blocks of predefined behaviors
    that can be combined in any way you desire. You can even define your own custom
    actions and add them to your game objects. Let’s look at a few examples.


    When you want a game object to have predefined behavior in the form of an action,
    you need to do two things. First, you need to define the action, and then you
    need to tell the game object to run the action. Defining actions is done by using
    the `SKAction` class. Take a look at the following action definition:


    `let rotate = SKAction.rotateByAngle(CGFloat(2 * M_PI), duration: 3)`


    The `SKAction` class has a number of class methods that you can call. Each creates
    an action of some kind. In this example, a rotate action is defined that rotates
    an object around its origin by 2π radians (360 degrees) over a timespan of three
    seconds. You can, for example, define this action in the initializer of your game
    object class. Then, you can tell the game object to run this action, as follows:


    `self.runAction(rotate)`


    Now, when you create the game object, it will rotate once around its origin. Here
    is another example of an action:


    `let fadein = SKAction.fadeInWithDuration(5)`


    `self.runAction(fadein)`


    This action fades in a game object (from completely transparent to fully opaque)
    during 5 seconds. Here is another example:


    `let playSound = SKAction.playSoundFileNamed("snd_music.mp3", waitForCompletion:
    false)`


    This action plays a sound effect. Playing a sound effect using actions is easier
    than the method explained earlier in this book. However, with actions such as
    this one, there is no means to control the volume of the sound, so although using
    actions to play sounds can be very convenient, you may need more control over
    sounds in your game.


    Instead of running only a single action, you can also create a sequence of actions,
    and run the sequence, like so:


    `let seq = SKAction.sequence([fadein, rotate])`


    The `sequence` method expects an array of `SKAction` objects and it creates a
    new action that is now the sequence of the actions in the array. You can run the
    sequence just like you run any other action:


    `self.runAction(seq)`


    And instead of running an action only once, you can also create actions that repeat,
    like so:


    `let repeat = SKAction.repeatActionForever(seq)`


    `self.runAction(repeat)`


    You can even create an action that simply executes a block of code. Here is an
    example:


    `let customAction = SKAction.runBlock({`


        `// write your own code here`


    `})`


    As you can see, actions in SpriteKit are a very powerful tool to define behavior
    for game objects. In the next section, you’re going to use actions to define some
    behavior in the Tut’s Tomb game.'
