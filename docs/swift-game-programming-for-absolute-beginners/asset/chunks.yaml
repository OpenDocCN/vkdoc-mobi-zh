- fmt: '### Small Scale: Edit-Compile-Run


    When you want to build a game in Swift, you need to write a program that contains
    many lines of instructions. Using the Xcode framework, you can edit the program
    you’re working on. A program generally consists of different text files, each
    containing instructions. Once you’re done writing down these instructions, you
    tell the Xcode program to compile the code you have written and execute the program.
    When all is well, the program is compiled and executed.


    However, most of the time, things aren’t that easy. For one thing, the text files
    you give to the compiler should contain valid Swift code because you can’t expect
    the computer to compile files containing random blabbering. The Xcode program
    checks whether the source code adheres to the language specifications of the Swift
    language. If not, it produces an error, and the compilation process stops. Of
    course, programmers make an effort to write correct Swift programs, but it’s easy
    to make a typo, and the rules for writing correct programs are very strict. So,
    you’ll most certainly encounter errors during the compilation phase.


    After a few iterations during which you resolve minor errors, the source code
    is compiled without encountering any problems. As the next step, the computer
    executes or runs the program it just created. In many cases, you then discover
    that the program doesn’t exactly do what you want it to do. Of course, you made
    an effort to correctly express what you wanted the program to do, but conceptual
    mistakes are easy to make.


    So you go back to the text editor, and you change the code. Then you try to compile
    and run the program again and hope you didn’t make new typing mistakes. You may
    find that the earlier problem is solved, only to realize that although the program
    is doing something different, it still doesn’t do exactly what you want. And it’s
    back to the editor again. Welcome to life as a programmer!


    ### Large Scale: Design-Specify-Implement


    As soon as your game becomes more complicated, it’s no longer a good idea to just
    start typing away until you’re done. Before you start implementing (writing and
    testing the game), there are two other phases.


    First, you have to design the game. What type of game are you building? Who is
    the intended audience of your game? Is it a 2D game or a 3D game? What kind of
    gameplay would you like to model? What kinds of characters are in the game, and
    what are their capabilities? Especially when you’re developing a game together
    with other people, you have to write some kind of design document that contains
    all this information, so that everybody agrees on what game they’re developing!
    Even when you’re developing a game on your own, it’s a good idea to write down
    the design of the game. The design phase is actually one of the most difficult
    tasks of game development.


    Once it’s clear what the game should do, the next step is to provide a global
    structure for the program. This is called the specification phase. Do you remember
    that the object-oriented programming paradigm organizes instructions in methods
    and methods in classes? In the specification phase, you make an overview of the
    classes needed for the game and the methods in those classes. At this stage, you
    only need to describe what a method will do, not how it’s done. However, keep
    in mind that you can’t expect impossible things from methods: they have to be
    implemented later.


    When the game specification is finished, you can start the implementation phase,
    which generally means going through the edit-compile-run cycle many times. After
    that, you can let other people play your game. In many cases, you’ll realize that
    some ideas in the game design don’t work that well. So, you begin again by changing
    the design, followed by changing the specification and finally doing a new implementation.
    You let other people play your game again, and then… Well, you get the idea. The
    edit-compile-run cycle is contained in a larger-scale cycle: the design-specify-implement
    cycle (see Figure [1-1](#A978-1-4842-0650-8_1_Chapter.html#Fig1)). Although this
    book focuses mainly on the implementation phase, you will find game design tips
    and tricks in the various chapters of this book.'
