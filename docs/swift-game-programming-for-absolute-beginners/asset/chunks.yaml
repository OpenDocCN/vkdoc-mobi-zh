    # 字符与字符串


    由于游戏现在记录了分数，它也需要在屏幕上以某种方式显示这个分数。这意味着你必须要在屏幕上绘制数字。为了让玩家清楚这是分数而非随机数字，你还将在数字前绘制“分数：”字样。Swift
    有一种用于表示文本的类型，称为 `String`。就像数字或布尔值一样，字符串在 Swift 中是一种结构体。以下是声明字符串变量的示例：


    `var name = "Patrick"`


    在 Swift 中，字符串由双引号字符界定。当使用字符串值并将其与其他变量组合时，使用引号时需格外小心。如果忘记引号，你就不再是书写文本或字符，而是在编写一段
    Swift 程序！以下几者之间有着显著区别：


    - 字符串 `"hello"` 与变量名 `hello`

    - 字符串 `"123"` 与数值 `123`

    - 字符串值 `"+"` 与运算符 `+`


    使用 `+` 运算符来组合（或称拼接）多个字符串：


    ```swift

    var string1 = "hello "

    var string2 = "world"

    var string3 = string1 + string2 // string3 现在包含 "hello world"

    ```


    注意：拼接操作仅当处理文本时才有意义。例如，无法将两个数字进行“拼接”：表达式 `1 + 2` 的结果是 `3`，而非 `12`。当然，你可以拼接以文本形式表示的数字：`"1"
    + "2"` 的结果是 `"12"`。通过使用双引号来区分文本和数字。若要将字符串与数字（或其他类型的变量，如布尔值）组合成单个字符串，可以使用特殊的 `\()`
    符号，如下所示：


    ```swift

    var age = 24

    var info = "Peter is \(age) years old"

    print(info) // 输出字符串 "Peter is 24 years old"

    ```


    这一特性称为字符串插值，在 Painter 示例中用于显示分数非常实用。首先，在游戏世界中添加一个标签节点：


    `var scoreLabel = SKLabelNode(fontNamed: "Chalkduster")`


    然后，在 `GameWorld` 的 `updateDelta` 方法中，使用字符串插值将当前分数赋值给标签：


    `scoreLabel.text = "Score: \(score)"`


    由于游戏循环的每次迭代都会更新标签，当前分数将始终显示在屏幕上。


    ## 特殊字符


    除了 `\()` 符号之外，字符串中还有其他一些也使用反斜杠符号的特殊字符，例如：


    - `\n` 用于换行符

    - `\r` 用于回车符（注意，在 iOS 字符串中换行时，直接使用 `\n` 即可）

    - `\t` 用于制表符


    这引入了一个新问题：如何表示反斜杠字符本身。反斜杠字符通过双反斜杠来表示。类似地，反斜杠符号也用于表示双引号字符：


    - `\\` 用于反斜杠符号

    - `\"` 用于双引号字符


    例如，


    ```

    print("\"You are crazy,\" she said.") // 输出: "You are crazy," she said.

    ```


    ## 添加应用图标


    需要为 Painter 游戏添加的最后一件事是应用图标。应用图标需要多种尺寸，每种尺寸用途不同。有些图标还需要多种分辨率（1x、2x 或 3x）。图 11-1
    展示了 Xcode 的屏幕截图，其中显示了为 Painter 游戏添加的图标。


    ![A978-1-4842-0650-8_11_Fig1_HTML.jpg](img/A978-1-4842-0650-8_11_Fig1_HTML.jpg)


    图 11-1. Painter 游戏中的图标


    为应用设计高质量图标非常重要。当大多数人看到你的游戏安装在朋友的设备上，或者他们在 App Store 中寻找好玩的游戏时，他们首先看到的就是图标。如果你的图标不出众，人们就不会购买你的游戏。作为一般性建议，尽量保持图标简洁，以便人们容易识别。同时，避免在图标上放置文字，因为用户在较小的屏幕上可能无法看清文字。最后，设计应用图标时，要与你创建的游戏风格保持一致。如果你的游戏非常卡通化，那么应用图标也应如此。如果你的游戏氛围阴暗忧郁，确保图标也能反映出这一点。如同常规艺术作品一样，以高分辨率设计你的应用图标，然后将其导出为缩小后的图像文件。有一些在线工具可以帮助你设计并自动导出正确格式的应用图标，例如
    [`appicontemplate.com`](http://appicontemplate.com/) 或 [`makeappicon.com`](http://makeappicon.com/)。


    ## 最后几点补充


    恭喜你——你完成了自己的第一款游戏！图 11-2 展示了最终的游戏版本。在开发这款游戏的过程中，你学到了许多重要概念。在下一款游戏中，你将基于现有工作继续拓展。同时，别忘了玩一玩游戏！你会注意到几分钟后游戏会变得非常困难，因为油漆罐下落的速度越来越快。


    ![A978-1-4842-0650-8_11_Fig2_HTML.jpg](img/A978-1-4842-0650-8_11_Fig2_HTML.jpg)


    图 11-2. 游戏《玩游戏的画家？》的最终版本


    你可能认为游戏主要是由年轻男性玩，但这完全不对。玩游戏的人占了相当大的比例。2014 年在美国有 1.88 亿活跃玩家，这超过了总人口（包括婴儿）的一半。他们在多种不同的设备上玩游戏。53%
    的玩家在智能手机上玩游戏，41% 的玩家在无线设备上玩游戏（来源：美国娱乐软件协会，2014 年）。


    如果你开发游戏，最好先想想你想要面向的受众。面向幼儿的游戏与面向中年女性的游戏不同。这些游戏应有不同的玩法、不同的视觉风格以及不同的目标。


    尽管主机游戏往往发生在大型 3D 世界中，但移动设备上的休闲游戏通常是 2D 且大小有限。此外，主机游戏的设计使其可以（并且需要）连续玩上数小时，而休闲游戏通常设计为可以在仅几分钟的片段中游玩。还有许多类型的严肃游戏，这类游戏用于培训专业人员，例如消防员、市长和医生。要意识到，你喜欢的游戏不一定就是目标受众喜欢的游戏。


    ## 本章所学内容


    在本章中，你学到了以下内容：


    - 如何向游戏中添加音乐和音效

    - 如何维护和显示分数

    - 如何使用字符串来表示和处理文本


    # 第三部分


    ## 图坦卡蒙之墓


    图坦卡蒙之墓是一款玩家需要收集法老图坦宝藏的游戏（截图见图 III-1）。各种宝藏掉入墓穴中，通过将相同的宝藏拖到一起，你就可以收集它们并获得分数。不过要注意：如果一件宝藏留在墓穴中太久，就会变成一块无用的岩石并占用空间。宝藏会不断加速下落。如果你没有从墓穴中移除足够多的宝藏，墓穴就会被完全填满，游戏结束。在接下来的章节中，你将开发这款游戏。如果你想玩完整版以体验游戏如何运作，请运行第
    16 章的示例！


    ![A978-1-4842-0650-8_3_Part_BookFrontmatter_Fig1_HTML.jpg](img/A978-1-4842-0650-8_3_Part_BookFrontmatter_Fig1_HTML.jpg)


    图 III-1. 图坦卡蒙之墓的截图

