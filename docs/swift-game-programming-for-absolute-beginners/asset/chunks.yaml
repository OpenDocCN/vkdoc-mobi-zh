    # 几点观察


    在 iOS 游戏示例中，代码包含许多你可能尚未识别的元素。例如，在类名（`GameScene`）后面有一个冒号和单词`SKScene`。这意味着`GameScene`类基于一个名为`SKScene`的现有类。也可以说`GameScene
    是 SKScene 的一个特殊版本`。请注意，`SKScene`包含了一些方法。`GameScene`复制了这些方法，但替换了其中一个，即`didMoveToView`方法。这就是为什么该方法定义前面有`override`关键词。如果你觉得信息量很大，别担心。我将在本书的第
    10 章中详细讲解这一方面。


    这些指令本身可能对你而言也意义不大。在接下来的章节中，我会进一步解释这些指令的含义。无论如何，你会发现创建一个简单的 iOS 应用比简单的命令行工具要复杂得多。还有其他类型的应用程序也可以用
    Swift 开发，例如带有窗口、按钮等的 OS X 应用。这类应用需要另一种方式来设置所需的类和方法（但这已超出本书范围）。


    你可能还注意到，指令或方法的执行顺序不再那么清晰。当你查看最简单的命令行工具时，只有一条指令向控制台输出"Hello, World!"。执行时，程序只运行那一条指令。而当你的程序包含多个类，这些类又分组了多个方法，而方法内部则分组了指令时，要确定哪些指令会执行以及执行顺序就不再那么直观了。以本书中的
    iOS 示例为例，幕后发生了许多事情，以确保最终`didMoveToView`方法会被调用。然而，仅从代码本身无法清晰地看到这一点。在这种情况下，你必须依赖
    Apple 的 SpriteKit 文档，该文档说明`didMoveToView`方法会被调用，并且你可以将自己的游戏初始化代码放在其中。作为游戏开发者，你并不总能理解游戏应用程序的所有代码。你通常会使用其他开发者编写的代码，并且希望这些代码中错误不要太多。另一种选择是自己从头开发一切。但在游戏行业这样一个快速发展的领域中，这样做并不明智。引用著名作家卡尔·萨根的话："如果你想从头制作一个苹果派，你必须先发明宇宙。"


    ## 本章所学


    在本章中，你学习了以下内容：


    *   计算机的工作原理，以及它们由负责计算的处理器和负责存储的内存组成

    *   编程语言如何从汇编语言发展到 Swift 等现代编程语言

    *   如何使用 Swift 语言创建一个简单的应用程序


    # 游戏编程基础


    电子补充资料：本章在线版本 (doi:[10.​1007/​978-1-4842-0650-8_​2](http://dx.doi.org/10.1007/978-1-4842-0650-8_2))
    包含补充资料，仅供授权用户使用。


    本章涵盖游戏编程的基本要素，并为后续章节提供起点。首先，你将学习任何游戏的基本框架，包括游戏世界和游戏循环。你将通过查看各种示例（例如一个改变背景颜色的简单应用程序）了解如何在
    Swift 中创建这个框架。最后，我将讨论如何通过合理使用注释、布局和空白来使代码更清晰。


    ## 游戏的构建模块


    本节讨论游戏的构建模块。我将首先概述游戏世界，然后向你展示使用游戏循环改变游戏世界的过程，该循环在将游戏世界绘制到屏幕之前不断更新它。


    ### 游戏世界


    游戏之所以成为一种有趣的娱乐形式，是因为你可以探索一个虚构的世界，并在其中做一些现实生活中永远不会做的事情。你可以骑在龙背上，摧毁整个太阳系，或者创造一个使用虚构语言交流的复杂文明。这个你玩游戏时所处的虚拟领域被称为**游戏世界**。游戏世界可以像俄罗斯方块世界那样简单，也可以像《侠盗猎车手》和《魔兽世界》中复杂的虚拟世界那样庞大。


    当游戏在计算机或智能手机上运行时，设备会维护一个游戏世界的内部表示。这种表示看起来完全不像你在玩游戏时屏幕上显示的内容。它主要由数字组成，描述对象的位置、敌人对玩家能造成多少伤害、玩家背包中有多少物品等等。幸运的是，程序也知道如何创建这个世界的视觉上令人愉悦的表示，并将其显示在屏幕上。否则，玩电脑游戏可能会变得极其无聊，玩家需要在成堆的数字中翻找，才能知道自己是否救出了公主，还是惨死了。玩家从未见过游戏世界的内部表示，但游戏开发者却会看到。当你想要开发一款游戏时，你也需要设计如何在内部表示你的游戏世界。而自己编写游戏程序的乐趣之一，就在于你可以完全控制这一切。


    另一个需要认识到的重要点是：就像现实世界一样，游戏世界也在不断变化。怪物会移动到不同的位置、天气会变化、汽车会用完汽油、敌人会被消灭，等等。此外，玩家实际上也在影响着游戏世界的变化！因此，仅仅在计算机内存中存储游戏世界的表示是不够的。游戏还需要持续记录玩家的操作，并据此更新这个表示。此外，游戏还需要通过在计算机显示器、电视或智能手机屏幕上显示，将游戏世界呈现给玩家。处理这一切的过程被称为**游戏循环**。

