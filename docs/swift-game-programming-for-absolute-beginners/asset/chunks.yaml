    The game loop deals with the dynamic aspects of a game. Lots of things happen
    while a game is running. The players press buttons on the gamepad or touch the
    screen of their device, and a constantly changing game world consisting of levels,
    monsters, and other characters needs to be kept up to date. There are also special
    effects such as explosions, sounds, and much more. All these different tasks that
    need to be handled by the game loop can be organized into two categories:


    *   Tasks related to updating and maintaining the game world

    *   Tasks related to displaying the game world to the player


    The game loop continuously performs these tasks, one after the other (see Figure
    [2-1](#A978-1-4842-0650-8_2_Chapter.html#Fig1)). As an example, let’s look at
    how you could handle user navigation in a simple game like Pac-Man. The game world
    mainly consists of a labyrinth with a few nasty ghosts moving around. Pac-Man
    is located somewhere in this labyrinth and is moving in a certain direction. In
    the first task (updating and maintaining the game world), you check whether the
    player is pressing an arrow key. If so, you need to update the position of Pac-Man
    according to the direction the player wants Pac-Man to go. Also, because of that
    move, Pac-Man may have eaten a white dot, which increases the score. You need
    to check whether it was the last dot in the level because that would mean the
    player has finished the level. If it was a larger white dot, the ghosts need to
    be rendered inactive. Then you need to update the rest of the game world. The
    position of the ghosts needs to be updated, you have to decide whether fruit should
    be displayed somewhere for bonus points, you need to check whether Pac-Man collides
    with one of the ghosts (if the ghost isn’t inactive), and so on. You can see that
    even in a simple game like Pac-Man, a lot of work needs to be done in this first
    task. From now on, I’ll call this collection of different tasks related to updating
    and maintaining the game world the Update action.


    ![A978-1-4842-0650-8_2_Fig1_HTML.gif](A978-1-4842-0650-8_2_Fig1_HTML.gif)


    Figure 2-1.


    The game loop, which continuously updates and then draws the game world


    The second collection of tasks is related to displaying the game world to the
    player. In the case of the Pac-Man game, this means drawing the labyrinth, the
    ghosts, Pac-Man, and information about the game that is important for the player
    to know, such as how many points they’ve scored, how many lives they have left,
    and so on. This information can be displayed in different areas of the game screen,
    such as at the top or the bottom. This part of the display is also called the
    heads-up display (HUD). Modern 3D games have a much more complicated set of drawing
    tasks. These games need to deal with lighting and shadows, reflections, culling,
    visual effects like explosions, and much more. I’ll call the part of the game
    loop that deals with all the tasks related to displaying the game world to the
    player the Draw action.


    ### The Game Loop in Swift


    The previous chapter showed how to create a simple Swift iOS game application.
    In that application, you saw that instructions are grouped into a method, which
    in turn is part of a class, as follows:


    `class GameScene: SKScene {`


    `override func didMoveToView(view: SKView) {`


    `/* Setup your scene here */`


    `let myLabel = SKLabelNode(fontNamed:"Chalkduster")`


    `myLabel.text = "Hello, World!"`


    `myLabel.fontSize = 65`


    `myLabel.position = CGPoint(x:CGRectGetMidX(self.frame),`


    `y:CGRectGetMidY(self.frame))`


    `self.addChild(myLabel)`


    `}`


    `...`


    `}`


    Basically, the `didMoveToView` method does one job here: create a game world.
    This game world is very simple since it consists of a text label. So how does
    the game loop come into play in this example? In fact, the drawing part of the
