    How do you use a random number generator to create randomness in your game world?
    Suppose you want to spawn an enemy 75% of the times that a user steps through
    a door. In that case, you generate a random number between 0 and 1\. If the number
    is less than or equal to 0.75, you spawn an enemy; otherwise, you don’t. Because
    of the uniform distribution, this will lead exactly to the behavior that you require.
    The following Swift code illustrates this:


    `var spawnEnemyProbability = CGFloat(arc4random()) / CGFloat(UInt32.max)`


    `if spawnEnemyProbability >= 0.75 {`


    `// spawn an enemy`


    `} else {`


    `// do something else`


    `}`


    In this example, you first convert the random number to a floating-point value.
    Then, you divide it by a constant `UInt32.max`, which represents the maximum value
    that a 32-bit integer can represent. As a result, the value of `spawnEnemyProbability`
    will always be in the range between 0 and 1.


