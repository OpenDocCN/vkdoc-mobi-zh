    ## Class Extensions


    Before continuing to adding a menu to Penguin Pairs, let’s go back to the class
    design used in the two previous games and reconsider what can be done to improve
    it. For the Tut’s Tomb game, I defined a class called `GameObjectNode`, which
    was a subclass of `SKNode`, and added methods for basic game loop interaction.
    This brought along some inconvenience: in order for this to work correctly, every
    node in the scene should be a `GameObjectNode` instance, or an instance of a subclass
    of `GameObjectNode`. Wouldn’t it be much easier if you could simply extend the
    functionality of the `SKNode` class itself? The good news is: you can! Swift has
    a mechanism called class extensions. It allows you to add functionality to an
    existing class and use that extended class definition in your project. If you
    open the `SKNode_Extension.swift` file belonging to the PenguinPairs2 example,
    you’ll see something like this:


    `import SpriteKit`


    `extension SKNode {`


        `...`


        `func handleInput(inputHelper: InputHelper) {`


            `...`


        `}`


        `func updateDelta(delta: NSTimeInterval) {`


            `...`


        `}`


        `func reset() {`


            `...`


        `}`


    `}`


    This tells the compiler that within the PenguinPairs2 project, the `SKNode` class
    is extended by (among others) three methods. As a result, any `SKNode` instance
    you create from now on will have the methods and properties defined in the extension.
    This means you no longer need a separate `GameObjectNode` class. Moreover, subclasses
    of `SKNode`, such as `SKSpriteNode`, will now also automatically have the methods
    and properties defined in the extension. This is very useful. For example, you
    could rewrite the `Button` class to simply be a subclass of `SKSpriteNode`:


    `class Button: SKSpriteNode {`


        `var tapped = false`


        `init(imageNamed: String) {`


            `let texture = SKTexture(imageNamed: imageNamed)`


            `super.init(texture: texture, color: UIColor.whiteColor(), size: texture.size())`


        `}`


        `required init?(coder aDecoder: NSCoder) {`


            `fatalError("init(coder:) has not been implemented")`


        `}`


        `override func handleInput(inputHelper: InputHelper) {`


            `super.handleInput(inputHelper)`


            `tapped = inputHelper.containsTap(self.box) && !self.hidden`


        `}`


    `}`


    Class extensions are very useful if you’d like to extend the functionality of
    an existing class in a framework. The `SKNode` extension is a good example of
    this. Because you directly extend the `SKNode` class, the extension is smoothly
    transferred to all classes in the SpriteKit framework that inherit from `SKNode`.
    As a result, it leads to less duplication of code. In the remaining chapters of
    this book, I’ll use class extensions to add functionality to existing classes.


    Class extensions are yet another tool in the toolkit of a developer to design
    a software architecture in a nice, generic way. However, as with any tool, you
    have to watch out how you use it. If you rely too much on class extensions, it
    may no longer be clear to you which part of a class was original and which part
    was added by you. When you start a new project, you may end up sifting through
    your previous projects to gather the bits and pieces you added to the existing
    classes and copy them to your new project. And if a new version of the SpriteKit
    framework is released, your extensions of SpriteKit classes may no longer make
    any sense (although this latter argument can be made for any piece of code that
    uses SpriteKit classes).


    ## Setting Up a Menu


    Now that the `SKNode` class has been extended with game loop functionality, let’s
    use it to create a menu for the Penguin Pairs game. When thinking about menus,
    you may think of a pull-down menu (like File or Edit) or buttons at the top of
    an application. Menus can be flexible, though, especially in games, where a menu
    is often designed in the style of the game and may in many cases cover part of
    the screen or even the entire screen. As an example, let’s see how to define a
    basic options menu screen containing two controls: one for switching hints on
    or off, and one for controlling the volume of the music. First, you need to draw
    the elements surrounding these controls. You add a background to the menu and
    then add a text label to describe the Hints control. You use the `SKLabelNode`
    class for that. You define the text that should be drawn and place it at the appropriate
    position (the following code is taken from the `GameWorld` class in the PenguinPairs2
    example belonging to this chapter):


    `let background = SKSpriteNode(imageNamed: "spr_background_options")`


    `background.zPosition = Layer.Background`


    `self.addChild(background)`


    `let onOffLabel = SKLabelNode(fontNamed: "Helvetica")`


    `onOffLabel.horizontalAlignmentMode = .Right`


    `onOffLabel.verticalAlignmentMode = .Center`


    `onOffLabel.position = CGPoint(x: -50, y: 50)`


    `onOffLabel.fontColor = UIColor(red: 0, green: 0, blue: 0.4, alpha: 1)`


    `onOffLabel.fontSize = 60`


    `onOffLabel.text = "Hints"`


    `self.addChild(onOffLabel)`


    Similarly, you add a text label for the music volume controller. For the complete
    code, see the `PenguinPairs2` example belonging to this chapter.'
