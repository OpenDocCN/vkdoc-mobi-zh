- fmt: "# Methods\n\nYou’ve already seen and used quite a few different kinds of methods\
    \ and functions. For example, there is a clear difference between the `UIColor.blackColor()`\
    \ method and the `print()` function: the latter one expects a parameter (a string),\
    \ whereas the first one doesn’t. The `blackColor` method belongs to `UIColor`,\
    \ as opposed to `print`, which is a standalone function. Additionally, some functions/methods\
    \ can have a result value that can be used in the instruction that does the method\
    \ call, such as storing the result in a variable, like so:\n\n`var myColor = UIColor.blackColor()`\n\
    \nHere, you call the `blackColor` method that is defined as a part of `UIColor`,\
    \ and you store its result in the variable `myColor`. Apparently, `blackColor`\
    \ provides a result value that can be stored. The `print` function, on the other\
    \ hand, doesn’t provide a result that you can store in a variable. Of course,\
    \ it does have an effect of some sort because it prints text to the console, which\
    \ could also be considered a result of the function call. However, when I talk\
    \ about the result of a function, I don’t mean that the function has some effect\
    \ on the screen. I mean the function call returns a value that can be stored in\
    \ a variable. This is also called the return value of a method or function. In\
    \ mathematics, it’s common that a function has a result. The mathematical function\
    \ f(x)=x² takes as a parameter an x value and it returns its square as a result.\
    \ You could write this mathematical function in Swift like so:\n\n```\nfunc square(x\
    \ : Int) -> Int {\n    return x*x\n}\n```\n\nIf you look at the header of this\
    \ method, you see that it takes one parameter called `x`. After the closing parenthesis,\
    \ you see an arrow and the word `Int`. This means that this method returns an\
    \ integer value that can be stored in a variable, like so:\n\n`var sx = square(10)`\n\
    \nAfter this instruction is executed, the variable `sx` will contain the value\
    \ 100. In the function body, you indicate using the keyword `return` the actual\
    \ value that the function returns. In the case of `square`, the function returns\
    \ the outcome of the expression `x*x`. Note that executing the `return` instruction\
    \ also terminates execution of the rest of the instructions in a function. Any\
    \ instructions placed after the `return` instruction are not executed. For example,\
    \ consider the following function:\n\n```\nfunc square(x : Int) -> Int {\n   \
    \ return 12\n    var tmp = 45\n}\n```\n\nIn this example, the second instruction\
    \ (`var tmp = 45`) will never be executed because the instruction before it ends\
    \ the function. This is a very handy feature of the `return` instruction, and\
    \ you can use it to your advantage, as in the following code:\n\n```\nfunc squareRoot(x\
    \ : Int) -> Int {\n    if x < 0 {\n        print(\"Error: cannot compute square\
    \ root of a negative number!\")\n        return 0\n    }\n    // Calculate the\
    \ square root, we are now sure that x >= 0.\n    return ...\n}\n```\n\nIn this\
    \ example, you use the `return` instruction as a safeguard against wrong input\
    \ by the user of the method. You can’t calculate the square root of a negative\
    \ number, so you handle the case where `x` is negative before you do any calculations\
    \ or raise any annoying, potentially hard-to-debug errors. Note that a function\
    \ that returns a value must return a value through all of the possible logic paths.\
    \ So if you write a function that contains an `if` instruction that handles a\
    \ few alternative cases, you have to make sure that the function returns a value\
    \ in each of those cases. In the example above, there are two cases, and in each\
    \ of the two cases a value is returned.\n\nThe `atan2` function is another example\
    \ of a function that has parameters and returns a value that you can store in\
    \ a variable, as you did in the Painter2 example:\n\n`cannonBarrel.zRotation =\
    \ atan2(opposite, adjacent)`\n\nAn example of a method that doesn’t have a return\
    \ value is the `update` method in the `GameScene` class:\n\n```\noverride func\
    \ update(currentTime: NSTimeInterval) {\n    if nrTouches > 0 {\n        touchingLabel.text\
    \ = \"touching\"\n        if !cannonRed.frame.contains(touchLocation) {\n    \
    \        let opposite = touchLocation.y - cannonBarrel.position.y\n          \
    \  let adjacent = touchLocation.x - cannonBarrel.position.x\n            cannonBarrel.zRotation\
    \ = atan2(opposite, adjacent)\n        } else if hasTapped {\n            let\
    \ tmp = cannonBlue.hidden\n            cannonBlue.hidden = cannonGreen.hidden\n\
    \            cannonGreen.hidden = cannonRed.hidden\n            cannonRed.hidden\
    \ = tmp\n        }\n    } else {\n        touchingLabel.text = \"not touching\"\
    \n    }\n    hasTapped = false\n}\n```\n\nBecause this method doesn’t have a return\
    \ value, you don’t need to use the `return` keyword in the body of the method,\
    \ although doing so can sometimes still be useful. For example, you could use\
    \ the `return` keyword here to increase code readability by removing the nested\
    \ `if` instruction, as follows:\n\n```\noverride func update(currentTime: NSTimeInterval)\
    \ {\n    if nrTouches <= 0 {\n        hasTapped = false\n        touchingLabel.text\
    \ = \"not touching\"\n        return\n    }\n    touchingLabel.text = \"touching\"\
    \n    if !cannonRed.frame.contains(touchLocation) {\n        let opposite = touchLocation.y\
    \ - cannonBarrel.position.y\n        let adjacent = touchLocation.x - cannonBarrel.position.x\n\
    \        cannonBarrel.zRotation = atan2(opposite, adjacent)\n    } else if hasTapped\
    \ {\n        let tmp = cannonBlue.hidden\n        cannonBlue.hidden = cannonGreen.hidden\n\
    \        cannonGreen.hidden = cannonRed.hidden\n        cannonRed.hidden = tmp\n\
    \    }\n    hasTapped = false\n}\n```\n\nIn this method, you first check if the\
    \ player touches the screen. If that is not the case, you reset the `hasTapped`\
    \ flag, change the text label, and return from the method. Any instructions after\
    \ that will then no longer be executed.\n\nNotice that whenever a method with\
    \ no return value is called, it has no result that can be stored in a variable.\
    \ For example, in\n\n`var what = print(\"hello!\")`\n\n`print` doesn’t have a\
    \ return value, so the compiler will raise a warning if you write such an instruction\
    \ in your program.\n\nIf a method or function has a return value, this value doesn’t\
    \ necessarily have to be stored in a variable. You can also directly use it in\
    \ an `if` instruction, as you do in the `update` method:\n\n`if !cannonRed.frame.contains(touchLocation)\
    \ {`\n`    // do something`\n`}`\n\nHere, the `contains` method returns a Boolean\
    \ value, and if this value is false, the body of the `if` instruction will be\
    \ executed (due to the exclamation mark meaning “not”). The difference between\
    \ things that have a value and things that don’t have a value is something you’ve\
    \ seen before: it’s the same difference you saw between instructions (which don’t\
    \ have a value) and expressions (which do have a value). So, this means `!cannonRed.frame.contains(touchLocation)`\
    \ is an expression, whereas `print(\"hello\")` is an instruction.\n\nIn summary,\
    \ there are methods/functions with or without parameters, and methods/functions\
    \ can have a return value or not. You can use functions and methods to organize\
    \ code into logical blocks of instructions that belong together. For example,\
    \ it makes sense to have a function called `atan2` that groups all the instructions\
    \ needed to compute the arctangent of two sides of a triangle. This way, you only\
    \ have to write those instructions once, and then later you don’t have to think\
    \ about how to calculate it; you simply call the function you wrote earlier. Games\
    \ often have many of these useful functions and methods. For example, wouldn’t\
    \ it be useful to have a method that checks whether or not an image is positioned\
    \ outside of the screen? This could be useful in a game where objects are flying\
    \ in and out of the screen, or games where you have a player that could fall through\
    \ the bottom of the screen and die (which is the case in many platform games).\
    \ Depending on what you need, you as the programmer decide if you’re going to\
    \ write a method with or without parameters and whether that method has a return\
    \ value."
  raw: '## Methods


    You’ve already seen and used quite a few different kinds of methods and functions.
    For example, there is a clear difference between the `UIColor.blackColor()` method
    and the `print()` function: the latter one expects a parameter (a string), whereas
    the first one doesn’t. The `blackColor` method belongs to `UIColor`, as opposed
    to `print`, which is a standalone function. Additionally, some functions/methods
    can have a result value that can be used in the instruction that does the method
    call, such as storing the result in a variable, like so:


    `var myColor = UIColor.blackColor()`


    Here, you call the `blackColor` method that is defined as a part of `UIColor`,
    and you store its result in the variable `myColor`. Apparently, `blackColor` provides
    a result value that can be stored. The `print` function, on the other hand, doesn’t
    provide a result that you can store in a variable. Of course, it does have an
    effect of some sort because it prints text to the console, which could also be
    considered a result of the function call. However, when I talk about the result
    of a function, I don’t mean that the function has some effect on the screen. I
    mean the function call returns a value that can be stored in a variable. This
    is also called the return value of a method or function. In mathematics, it’s
    common that a function has a result. The mathematical function f(x)=x² takes as
    a parameter an x value and it returns its square as a result. You could write
    this mathematical function in Swift like so:


    `func square(x : Int) -> Int {`


    `return x*x`


    `}`


    If you look at the header of this method, you see that it takes one parameter
    called `x`. After the closing parenthesis, you see an arrow and the word `Int`.
    This means that this method returns an integer value that can be stored in a variable,
    like so:


    `var sx = square(10)`


    After this instruction is executed, the variable `sx` will contain the value 100\.
    In the function body, you indicate using the keyword `return` the actual value
    that the function returns. In the case of `square`, the function returns the outcome
    of the expression `x*x`. Note that executing the `return` instruction also terminates
    execution of the rest of the instructions in a function. Any instructions placed
    after the `return` instruction are not executed. For example, consider the following
    function:


    `func square(x : Int) -> Int {`


    `return 12`


    `var tmp = 45`


    `}`


    In this example, the second instruction (`var tmp = 45`) will never be executed
    because the instruction before it ends the function. This is a very handy feature
    of the `return` instruction, and you can use it to your advantage, as in the following
    code:


    `func squareRoot(x : Int) -> Int {`


    `if x < 0 {`


    `print("Error: cannot compute square root of a negative number!")`


    `return 0`


    `}`


    `// Calculate the square root, we are now sure that x >=0.`


    `return ...`


    `}`


    In this example, you use the `return` instruction as a safeguard against wrong
    input by the user of the method. You can’t calculate the square root of a negative
    number, so you handle the case where `x` is negative before you do any calculations
    or raise any annoying, potentially hard-to-debug errors. Note that a function
    that returns a value must return a value through all of the possible logic paths.
    So if you write a function that contains an `if` instruction that handles a few
    alternative cases, you have to make sure that the function returns a value in
    each of those cases. In the example above, there are two cases, and in each of
    the two cases a value is returned.


    The `atan2` function is another example of a function that has parameters and
    returns a value that you can store in a variable, as you did in the Painter2 example:


    `cannonBarrel.zRotation = atan2(opposite, adjacent)`


    An example of a method that doesn’t have a return value is the `update` method
    in the `GameScene` class:


    `override func update(currentTime: NSTimeInterval) {`


    `if nrTouches > 0 {`


    `touchingLabel.text = "touching"`


    `if !cannonRed.frame.contains(touchLocation) {`


    `let opposite = touchLocation.y - cannonBarrel.position.y`


    `let adjacent = touchLocation.x - cannonBarrel.position.x`


    `cannonBarrel.zRotation = atan2(opposite, adjacent)`


    `} else if hasTapped {`


    `let tmp = cannonBlue.hidden`


    `cannonBlue.hidden = cannonGreen.hidden`


    `cannonGreen.hidden = cannonRed.hidden`


    `cannonRed.hidden = tmp`


    `}`


    `} else {`


    `touchingLabel.text = "not touching"`


    `}`


    `hasTapped = false`


    `}`


    Because this method doesn’t have a return value, you don’t need to use the `return`
    keyword in the body of the method, although doing so can sometimes still be useful.
    For example, you could use the `return` keyword here to increase code readability
    by removing the nested `if` instruction, as follows:


    `override func update(currentTime: NSTimeInterval) {`


    `if nrTouches <= 0 {`


    `hasTapped = false`


    `touchingLabel.text = "not touching"`


    `return`


    `}`


    `touchingLabel.text = "touching"`


    `if !cannonRed.frame.contains(touchLocation) {`


    `let opposite = touchLocation.y - cannonBarrel.position.y`


    `let adjacent = touchLocation.x - cannonBarrel.position.x`


    `cannonBarrel.zRotation = atan2(opposite, adjacent)`


    `} else if hasTapped {`


    `let tmp = cannonBlue.hidden`


    `cannonBlue.hidden = cannonGreen.hidden`


    `cannonGreen.hidden = cannonRed.hidden`


    `cannonRed.hidden = tmp`


    `}`


    `hasTapped = false`


    `}`


    In this method, you first check if the player touches the screen. If that is not
    the case, you reset the `hasTapped` flag, change the text label, and return from
    the method. Any instructions after that will then no longer be executed.


    Notice that whenever a method with no return value is called, it has no result
    that can be stored in a variable. For example, in


    `var what = print("hello!")`


    `print` doesn’t have a return value, so the compiler will raise a warning if you
    write such an instruction in your program.


    If a method or function has a return value, this value doesn’t necessarily have
    to be stored in a variable. You can also directly use it in an `if` instruction,
    as you do in the `update` method:


    `if !cannonRed.frame.contains(touchLocation) {`


    `// do something`


    `}`


    Here, the `contains` method returns a Boolean value, and if this value is false,
    the body of the `if` instruction will be executed (due to the exclamation mark
    meaning “not”). The difference between things that have a value and things that
    don’t have a value is something you’ve seen before: it’s the same difference you
    saw between instructions (which don’t have a value) and expressions (which do
    have a value). So, this means `!cannonRed.frame.contains(touchLocation)` is an
    expression, whereas `print("hello")` is an instruction.


    In summary, there are methods/functions with or without parameters, and methods/functions
    can have a return value or not. You can use functions and methods to organize
    code into logical blocks of instructions that belong together. For example, it
    makes sense to have a function called `atan2` that groups all the instructions
    needed to compute the arctangent of two sides of a triangle. This way, you only
    have to write those instructions once, and then later you don’t have to think
    about how to calculate it; you simply call the function you wrote earlier. Games
    often have many of these useful functions and methods. For example, wouldn’t it
    be useful to have a method that checks whether or not an image is positioned outside
    of the screen? This could be useful in a game where objects are flying in and
    out of the screen, or games where you have a player that could fall through the
    bottom of the screen and die (which is the case in many platform games). Depending
    on what you need, you as the programmer decide if you’re going to write a method
    with or without parameters and whether that method has a return value.'
  trans: "\n# 方法\n\n你已经见过并使用过许多不同类型的方法和函数。例如，`UIColor.blackColor()` 方法和 `print()`\
    \ 函数之间存在明显区别：后者需要一个参数（一个字符串），而前者则不需要。`blackColor` 方法隶属于 `UIColor`，而 `print` 则是一个独立的函数。此外，某些函数/方法可以返回一个结果值，该结果值可用于执行方法调用的指令中，例如将结果存储在一个变量中，如下所示：\n\
    \n`var myColor = UIColor.blackColor()`\n\n在这里，你调用了定义为 `UIColor` 一部分的 `blackColor`\
    \ 方法，并将其结果存储在变量 `myColor` 中。显然，`blackColor` 提供了一个可以存储的结果值。另一方面，`print` 函数并不提供可以存储在变量中的结果。当然，它确实会产生某种效果，因为它会将文本打印到控制台，这也可以被视为函数调用的一种结果。然而，当我谈论函数的结果时，我指的不是函数在屏幕上产生的某种效果，而是指函数调用返回了一个可以存储在变量中的值。这也被称为方法或函数的**返回值**。在数学中，函数通常都有一个结果。数学函数\
    \ f(x)=x² 将 x 值作为参数传入，并返回其平方作为结果。你可以像下面这样在 Swift 中编写这个数学函数：\n\n```\nfunc square(x\
    \ : Int) -> Int {\n    return x*x\n}\n```\n\n如果你查看这个方法的头部，会看到它接受一个名为 `x` 的参数。在右括号之后，你会看到一个箭头和单词\
    \ `Int`。这意味着该方法返回一个整数值，该值可以存储在一个变量中，如下所示：\n\n`var sx = square(10)`\n\n执行这条指令后，变量\
    \ `sx` 将包含值 100。在函数体中，你使用关键字 `return` 来指示函数返回的实际值。以 `square` 为例，该函数返回表达式 `x*x`\
    \ 的结果。请注意，执行 `return` 指令也会终止函数中其余指令的执行。放置在 `return` 指令之后的任何指令都不会被执行。例如，考虑下面的函数：\n\
    \n```\nfunc square(x : Int) -> Int {\n    return 12\n    var tmp = 45\n}\n```\n\
    \n在这个例子中，第二条指令（`var tmp = 45`）永远不会被执行，因为它前面的指令结束了函数。这是 `return` 指令一个非常方便的特性，你可以利用它来为自己服务，如下面的代码所示：\n\
    \n```\nfunc squareRoot(x : Int) -> Int {\n    if x < 0 {\n        print(\"错误：无法计算负数的平方根！\"\
    )\n        return 0\n    }\n    // 计算平方根，现在我们确定 x >= 0。\n    return ...\n}\n```\n\
    \n在这个例子中，你将 `return` 指令用作防范方法调用者错误输入的保障。你无法计算负数的平方根，因此在进行任何计算或引发令人讨厌且可能难以调试的错误之前，你先处理\
    \ `x` 为负数的情况。请注意，**一个返回值的函数必须通过所有可能的逻辑路径返回一个值**。所以，如果你编写一个包含处理几种备选情况的 `if` 指令的函数，你必须确保函数在每个分支中都返回一个值。在上面的例子中，有两个分支，并且在每个分支中都返回了一个值。\n\
    \n`atan2` 函数是另一个既有参数又返回值的函数示例，其返回值可以存储在变量中，就像你在 Painter2 示例中所做的那样：\n\n`cannonBarrel.zRotation\
    \ = atan2(opposite, adjacent)`\n\n一个没有返回值的**方法**示例是 `GameScene` 类中的 `update` 方法：\n\
    \n```\noverride func update(currentTime: NSTimeInterval) {\n    if nrTouches >\
    \ 0 {\n        touchingLabel.text = \"touching\"\n        if !cannonRed.frame.contains(touchLocation)\
    \ {\n            let opposite = touchLocation.y - cannonBarrel.position.y\n  \
    \          let adjacent = touchLocation.x - cannonBarrel.position.x\n        \
    \    cannonBarrel.zRotation = atan2(opposite, adjacent)\n        } else if hasTapped\
    \ {\n            let tmp = cannonBlue.hidden\n            cannonBlue.hidden =\
    \ cannonGreen.hidden\n            cannonGreen.hidden = cannonRed.hidden\n    \
    \        cannonRed.hidden = tmp\n        }\n    } else {\n        touchingLabel.text\
    \ = \"not touching\"\n    }\n    hasTapped = false\n}\n```\n\n由于这个方法没有返回值，你无需在方法体中使用\
    \ `return` 关键字，尽管在某些情况下使用它仍然有用。例如，你可以通过移除嵌套的 `if` 指令来使用 `return` 关键字提高代码可读性，如下所示：\n\
    \n```\noverride func update(currentTime: NSTimeInterval) {\n    if nrTouches <=\
    \ 0 {\n        hasTapped = false\n        touchingLabel.text = \"not touching\"\
    \n        return\n    }\n    touchingLabel.text = \"touching\"\n    if !cannonRed.frame.contains(touchLocation)\
    \ {\n        let opposite = touchLocation.y - cannonBarrel.position.y\n      \
    \  let adjacent = touchLocation.x - cannonBarrel.position.x\n        cannonBarrel.zRotation\
    \ = atan2(opposite, adjacent)\n    } else if hasTapped {\n        let tmp = cannonBlue.hidden\n\
    \        cannonBlue.hidden = cannonGreen.hidden\n        cannonGreen.hidden =\
    \ cannonRed.hidden\n        cannonRed.hidden = tmp\n    }\n    hasTapped = false\n\
    }\n```\n\n在这个方法中，你首先检查玩家是否触摸了屏幕。如果不是这种情况，你就重置 `hasTapped` 标志，更改文本标签，并从这个方法中返回。此后的任何指令将不再执行。\n\
    \n请注意，每当调用一个没有返回值的方法时，它就没有可以存储在变量中的结果。例如，在\n\n`var what = print(\"hello!\")`\n\
    \n中，`print` 没有返回值，因此如果你在程序中编写这样的指令，编译器会发出警告。\n\n如果一个方法或函数有返回值，这个值不一定要存储在变量中。你也可以直接在\
    \ `if` 指令中使用它，就像你在 `update` 方法中所做的那样：\n\n`if !cannonRed.frame.contains(touchLocation)\
    \ {`\n`    // 执行某些操作`\n`}`\n\n在这里，`contains` 方法返回一个布尔值，如果这个值是 false，`if` 指令的主体将会被执行（由于感叹号表示“非”）。有值的对象和没有值的对象之间的区别，是你之前已经见过的：这与你在指令（没有值）和表达式（有值）之间看到的区别是一样的。所以，这意味着\
    \ `!cannonRed.frame.contains(touchLocation)` 是一个表达式，而 `print(\"hello\")` 是一条指令。\n\
    \n总而言之，有带参数或不带参数的方法/函数，方法/函数可以有返回值也可以没有。你可以使用函数和方法将代码组织成属于同一逻辑块的相关指令组。例如，创建一个名为\
    \ `atan2` 的函数来组合计算三角形两条边反正切所需的所有指令是合理的。这样一来，你只需编写这些指令一次，之后就不必再考虑如何计算；只需简单地调用你之前编写的函数即可。游戏通常有许多这样有用的函数和方法。例如，有一个检查图像是否位于屏幕之外的方法是不是很有用？这在对象飞入或飞出屏幕的游戏中，或者在一个玩家可能从屏幕底部掉下并死亡（很多平台游戏都是这种情况）的游戏中会很有用。根据你的需要，作为程序员的你来决定是否要编写一个带参数或不带参数的方法，以及该方法是否具有返回值。\n"
- fmt: "# Parameter Names and Labels\n\nLet’s look a bit more in detail at parameters,\
    \ how you declare them, and how you call them. Take a look at the following function:\n\
    \n```\nfunc sign(val: Int) -> Int {\n    if val < 0 {\n        return -1\n   \
    \ } else if val > 0 {\n        return 1\n    } else {\n        return 0\n    }\n\
    }\n```\n\nThis function calculates the sign of an integer value. If the value\
    \ passed as a parameter is greater than 0, the function returns 1. If the value\
    \ is negative, the function returns -1. If the value is 0, the result of the function\
    \ call is also 0, like so:\n\n```\nvar someVariable = sign(3)  // someVariable\
    \ will contain the value 1\nsomeVariable = sign(-12)    // someVariable will now\
    \ contain the value -1\nsomeVariable = sign(0)      // someVariable now contains\
    \ the value 0\n```\n\nWhen you look at the function header, you see that the parameter\
    \ has a name (`val`). Inside the function body, you refer to the parameter by\
    \ that name. When the function is called, you simply write the value that you\
    \ need the parameter to be inside the parentheses. If a function has more than\
    \ one parameter, you simply write the parameter values between parentheses. For\
    \ example, this is the header of the `atan2` function:\n\n```\nfunc atan2(lhs:\
    \ CGFloat, rhs: CGFloat) -> CGFloat\n```\n\nThis function has two parameters,\
    \ and you call it as follows:\n\n```\ncannonBarrel.zRotation = atan2(opposite,\
    \ adjacent)\n```\n\nNext to functions, Swift also knows methods. Recall that a\
    \ method groups instructions, just like a function. But as opposed to a function,\
    \ a method is also part of a class. Swift has different rules for methods that\
    \ define the way that parameters are dealt with. Methods that have a single parameter\
    \ generally work in the same way as a function: you simply write the parameter\
    \ value between parentheses when you call the method. If a method has more than\
    \ one parameter, things change. Suppose that you define the following method inside\
    \ the `GameScene` class:\n\n```\nfunc max(val1: Int, val2: Int) -> Int {\n   \
    \ if val1 < val2 {\n        return val2\n    } else {\n        return val1\n \
    \   }\n}\n```\n\nThis method expects two parameters and it returns the highest\
    \ number of the two. Because there are two parameters, you need to be specific\
    \ about which parameter value maps to which parameter name when you call the method,\
    \ as follows:\n\n```\nvar maxValue = max(3, val2: 12)\n```\n\nIn the Swift language,\
    \ you generally don’t write the label in front of the first parameter, but you\
    \ do write one for the second, third, and so on parameters in a method. This is\
    \ the case for all methods, except for methods that create an object. In that\
    \ case, you also need to explicitly write the label for the first parameter. The\
    \ following is an example:\n\n```\nvar background = SKSpriteNode(imageNamed: \"\
    spr_background\")\n```\n\nHere you create an object of type `SKSpriteNode` and\
    \ store it in a variable. Swift then requires the parameter label `imageNamed`.\n\
    \nSwift makes a distinction between internal and external parameter labels. Let’s\
    \ slightly rewrite the `max` method as follows:\n\n```\nfunc max(val1: Int, b\
    \ val2: Int) -> Int {\n    if val1 < val2 {\n        return val2\n    } else {\n\
    \        return val1\n    }\n}\n```\n\nAs you can see, the second parameter now\
    \ has two labels. The first label, (`b`), is the external parameter label name.\
    \ If you call the method, you should use that label instead of `val2` to refer\
    \ to the second parameter, like so:\n\n```\nvar result = max(12, b: 3)\n```\n\n\
    The labels `val1` and `val2` are the internal label names. These are the label\
    \ names that should be used inside the method body. You can use external label\
    \ names to force users to also provide a label for the first parameter, by modifying\
    \ the header of the `max` method as follows:\n\n```\nfunc max(firstValue val1:\
    \ Int, secondValue val2: Int) -> Int\n```\n\nNow you need to provide both labels\
    \ when calling the `max` method:\n\n```\nresult = max(firstValue: 12, secondValue:\
    \ 3)\n```\n\nIf you decide that labels are not necessary at all, you can indicate\
    \ that by using an underscore for the external label name in the header, as follows:\n\
    \n```\nfunc max(val1: Int, _ val2: Int) -> Int\n```\n\nYou can now call the `max`\
    \ method without providing any labels whatsoever:\n\n```\nresult = max(12, 3)\n\
    ```\n\nNote that you only need to write an underscore before the second label\
    \ since the first label name is already omitted by default. As you can see, Swift\
    \ provides you with many options for defining parameter names and many ways to\
    \ refer to parameters inside and outside of the function or method body. Also,\
    \ with all these different rules for functions and methods, it can sometimes be\
    \ hard to know whether or not you should write a label name when you call a method\
    \ or function. Fortunately, the Xcode development environment will automatically\
    \ detect errors for you and propose a fix. Try it yourself by adding labels to\
    \ the `atan2` call in the `Painter2` program. You’ll see that Xcode proposes that\
    \ the labels be removed to fix the compiler error.\n\nIt is a good idea to think\
    \ about what kind of parameter labels you want to use in different situations.\
    \ Explicit parameter labels help make the meaning of the parameters clearer. For\
    \ example, the `firstValue` and `secondValue` labels in the `max` function earlier\
    \ in this chapter help to clarify the meaning of the parameters: they represent\
    \ the values of which the function returns the maximum. As another example, consider\
    \ the following function:\n\n```\nfunc calculateAgeInMonths(years y: Int, months\
    \ m: Int) {\n    return y * 12 + m\n}\n```\n\nIf you call this function, it is\
    \ useful to know which of the two parameters is what. The explicit year and month\
    \ labels help to clarify this:\n\n```\nvar myAgeInMonths = calculateAgeInMonths(years:\
    \ 18, months: 3)\n```\n\nOn the other hand, sometimes parameter labels make your\
    \ instructions longer than necessary. For instance, the `max` method doesn’t really\
    \ need explicit labels for its parameters. It doesn’t matter what the parameters\
    \ are called; the method simply returns the largest value. By carefully deciding\
    \ which parameters need labels and which don’t, your code become much cleaner\
    \ and it will be easier to understand by others.\n\n## Declarations vs Parameters\n\
    \nDeclarations of variables have a lot in common with parameters that are written\
    \ in the method header. In fact, those parameters also are declarations, but there\
    \ are a few differences:\n\n- Variables are declared in the body of the method;\
    \ parameters are declared between the parentheses in the method header.\n- Variables\
    \ get a value by using an assignment instruction; parameters automatically get\
