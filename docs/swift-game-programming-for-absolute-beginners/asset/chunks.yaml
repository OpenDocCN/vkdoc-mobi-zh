    \n`}`\n\nHumans aren’t really any better than computers at understanding “true”\
    \ randomness. This is why your MP3 player in shuffle mode sometimes seems to keep\
    \ playing the same songs over and over. You perceive naturally occurring streaks\
    \ to be non-random when in fact they are random. This means programmers sometimes\
    \ have to create a function that appears random to humans—even though it’s not\
    \ truly random.\n\nIn games, you have to deal very carefully with randomness.\
    \ A wrongly designed mechanism to spawn random units may spawn units of a certain\
    \ type more often for certain players, giving them an unfair (dis)advantage. Furthermore,\
    \ when you design your games, make sure random events don’t have too much influence\
    \ over the outcome. For example, don’t have the player roll a die after completing\
    \ 80 levels of your highly challenging platform game and let the outcome of the\
    \ roll determine whether the player dies.\n\n## Calculating a Random Velocity\
    \ and Color\n\nEach time a can falls, you want to create a random velocity and\
    \ color for it. You can use the `arc4random` and the user-defined `randomCGFloat`\
    \ functions to help you do this. Let’s first look at creating a random velocity.\
    \ In order to set a velocity for the can, you want to take into account a minimal\
    \ velocity such that the can doesn’t fall down too slowly. For that, you use the\
    \ `minVelocity` property. This property is given an initial value when a `PaintCan`\
    \ instance is created:\n\n`var minVelocity = CGFloat(40)`\n\nYou use this minimum\
    \ velocity value when you calculate a random velocity, as follows:\n\n`velocity\
    \ = CGPoint(x: 0.0, y: randomCGFloat() * -40 - minVelocity)`\n\nThe velocity in\
    \ the `x` direction is zero because cans aren’t moving horizontally—they only\
    \ fall down. The `y` velocity is calculated using the random number generator.\
    \ You multiply this random value by `-40` and subtract the value stored in the\
    \ property `minVelocity` in order to get a negative `y` velocity between `-minVelocity`\
    \ and `-minVelocity-40`. If `minVelocity` equals `40`, this results in a `y` velocity\
    \ between `-40` and `-80`.\n\nTo calculate a random color, you also use the random\
    \ number generator, but you want to choose among a few discrete options (red,\
    \ green, or blue). This is where the original `arc4random_uniform` function is\
    \ useful. The function allows for an optional parameter to indicate the range:\
    \ `arc4random_uniform(x)` returns a number between `0` and `x-1`. For example,\
    \ look at this instruction:\n\n`let randomval = arc4random_uniform(3)`\n\nThe\
    \ variable `randomval` will now contain either `0`, `1`, or `2`. Using some Boolean\
    \ logic, it is now rather straightforward to set the color of the paint can:\n\
    \n`red.hidden = randomval != 0`\n\n`green.hidden = randomval != 1`\n\n`blue.hidden\
    \ = randomval != 2`\n\nNow that you are able to generate random colors and velocities,\
    \ it’s time to define the final behavior of the paint can.\n\n## Updating the\
    \ Paint Can\n\nThe `updateDelta` method in the `PaintCan` class should do at least\
    \ the following things:\n\n* Set a randomly created velocity and color if the\
    \ can currently is not yet falling\n* Update the can position by adding the velocity\
    \ to it\n* Check whether the can has fallen completely, and reset it in that case\n\
    \nFor the first task, you can use an `if` instruction to check whether the can\
    \ currently is hidden. Furthermore, you want to introduce a bit of unpredictability\
    \ for when the can appears. In order to achieve that effect, you assign a random\
    \ velocity and color only if some random number generated by the `randomCGFloat`\
    \ function is smaller than a threshold of `0.01`. Because of the uniform distribution,\
    \ only in approximately `1` out of `100` random numbers will the number be smaller\
    \ than `0.01`. Here is the `if` instruction that achieves this:\n\n```\nif node.hidden\
    \ {\n    if randomCGFloat() > 0.01 {\n        return\n    }\n    // the code that\
    \ comes here will be executed only once in a while\n}\n```\n\nNext to this can\
    \ initialization step, you also need to update the can position by adding the\
    \ current velocity to it, taking into account the elapsed game time, just as you\
    \ did with the ball:\n\n```\nnode.position.x += velocity.x * CGFloat(delta)\n\
    node.position.y += velocity.y * CGFloat(delta)\n```\n\nNow that you’ve initialized\
    \ the can and updated its position, you need to handle the special cases. For\
    \ the paint can, you have to check whether it has fallen outside the game world.\
    \ If so, you need to reset it. The nice thing is that you already wrote a method\
    \ to check whether a certain position is outside the game world: the `isOutsideWorld`\
    \ method in the `GameWorld` class. You can now use that method again to check\
    \ whether the position of the can is outside the game world. If this is the case,\
    \ you need to reset the can so it’s placed at the top, outside the screen again.\
    \ In order to make sure that the paint can is completely out of the screen before\
    \ you reset it, you first need to calculate the top of the can:\n\n```\nlet top\
    \ = CGPoint(x: node.position.x, y: node.position.y + red.size.height/2)\n```\n\
    \nThen, you use an `if` instruction to check if the can has fallen out of the\
    \ screen. If that is the case, you hide the can:\n\n```\nif GameScene.world.isOutsideWorld(top)\
    \ {\n    node.hidden = true\n}\n```\n\nFinally, in order to make the game a bit\
    \ more challenging, you slightly increase the minimum velocity of the can each\
    \ time you go through the `updateDelta` method:\n\n```\nminVelocity += 0.02\n\
    ```\n\nBecause the minimum velocity slowly increases, the game becomes more difficult\
    \ as time progresses.\n\nAll the code for the Painter5 example is available in\
    \ the example folder belonging to this chapter. Figure [7-2](#A978-1-4842-0650-8_7_Chapter.html#Fig2)\
    \ shows a screenshot of the Painter5 example, which now has three falling paint\
