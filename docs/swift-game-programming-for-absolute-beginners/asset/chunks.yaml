    In this chapter, you will finish the Tick Tick game. First, you will add a timer
    so that the player has a limited amount of time to complete each level. Then,
    you will add a few mountains and clouds to the background to make the game visually
    more interesting. Finally, you will write the code that allows the player to progress
    through the level.


    ## Adding a Timer


    Let’s first look at adding a timer to the game. You don’t want the timer to take
    up too much screen space, so you use a text version of it. The `Timer` class inherits
    from the `SKNode` class, and it contains a background frame as well as a label
    node showing the remaining time. You want to be able to pause the timer (for example,
    when the level is finished), so you add a Boolean property called `running` that
    indicates whether the timer is running. You store the time remaining in a property
    called `timeLeft`. The number of seconds that the player has for each level is
    read from the text file and is stored in a property called `totalTime`. When the
    `reset` method is called, the timer is set to the total time, and it will start
    counting down. Here is the complete `reset` method:


    `override func reset() {`


        `super.reset()`


        `self.timeLeft = totalTime`


        `self.running = true`


    `}`


    Now the only thing you still need to do is implement the `updateDelta` method
    to program the timer behavior. As a first step, you only update the timer if it’s
    running and if there is still time left. If that’s not the case, you return from
    the method:


    `if self.timeLeft < 0 || !self.running {`


        `return`


    `}`


    Then, you subtract the elapsed game time from the current remaining time:


    `self.timeLeft -=` `delta`


    Next, you create the text that you want to print on the screen. You could simply
    print the number of seconds on the screen, but let’s make the timer a bit more
    generic so it’s also possible to define a timer that can handle minutes as well
    as seconds. For example, if you want to define a timer that counts down from two
    minutes, you initialize it as follows:


    `self.timeLeft = 120`


    You want to display “2:00” instead of “120” on the screen. To do this, you need
    to calculate in the `updateDelta` method how many minutes are left. First, you
    round up the current number of seconds. This is necessary because you want to
    show “2:00” on the screen between the 119^(th) and 120^(th) second. You use the
    `ceil` method for this:


    `let roundedTimeLeft = Int(ceil(timeLeft))`


    In addition to the `ceil` method, you have also seen the `floor` method, which
    rounds down. So `ceil(0.1)` yields 1, `floor(0.1)` yields 0\. The number of minutes
    and seconds is then calculated as follows:


    `let minutes = roundedTimeLeft / 60`


    `let seconds = roundedTimeLeft % 60`


    Now that you’ve calculated the number of minutes and seconds remaining, you can
    create a string that you draw on the screen:


    `textLabel.text = "\(minutes):\(seconds)"`


    `if seconds < 10 {`


        `textLabel.text = "\(minutes):0\(seconds)"`


    `}`


    You set the color of the text to yellow so it better fits the design of the game:


    `textLabel.fontColor = UIColor.yellowColor()`


    Finally, you want to warn the player if they don’t have a lot of time left to
    finish the level. You do this by alternating between red and yellow when printing
    the text on the screen. You can do this with an `if` instruction and a clever
    use of the remainder operator:


    `if timeLeft <= 10 && seconds % 2 == 0 {`


        `textLabel.fontColor = UIColor.redColor()`


    `}`


    Although calculating things with time in this manner is sufficient for the Tick
    Tick game, you might find yourself wanting to do more complex time or date representations.
    Swift has the `NSDate` class, which represents time, and you can use it in combination
    with the `NSDateFormatter` class, which allows you to specify exactly how you
    want to represent a date and/or time as a string.


    ### Making the Timer Go Faster or Slower


    Depending on the kind of tile the player is walking on, time should go faster
    or slower. Walking on a hot tile increases the speed at which time passes, whereas
    walking on an ice tile decreases it. To allow for a timer that runs at different
    speeds, you introduce a multiplier value in the `Timer` class. This value is stored
    as a property, which is initially set to 1:


    `var multiplier = 1.0`


    Taking this multiplier into account while the timer is running is fairly easy.
    You simply multiply the passed time by the multiplier in the `updateDelta` method,
    and you’re done:


    `self.timeLeft -= delta * multiplier`


    Now that you can change the speed at which time passes, you can do this depending
    on the kind of tile the player is walking on. In the `Player` class, you already
    maintain the `walkingOnIce` property, which indicates whether the player is walking
    on an ice tile. In order to handle hot tiles as well, you define another property
    called `walkingOnHot`, in which you keep track of whether the player is walking
    on a hot tile. To determine the value of this property, you follow the same approach
    you did for the `walkingOnIce` property. In the `handleCollisions` method, you
    initially set this property to `false`:


    `self.walkingOnHot = false`


    Then you add one line of code to update the value of the property depending on
    the current tile the player is standing on:


    `self.walkingOnHot = self.walkingOnHot || currentTile.hot`


    For the complete code, see the `Player` class belonging to the TickTickFinal example.


    Using the `walkingOnIce` and `walkingOnHot` properties, you can now update the
    timer multiplier. You do this in the player’s `updateDelta` method:


    `let timer = childNodeWithName("//timer") as! Timer`


    `if self.walkingOnHot {`


        `timer.multiplier = 2.0`


    `} else if self.walkingOnIce {`


        `timer.multiplier = 0.5`


    `} else {`


        `timer.multiplier = 1`


    `}`


    From a game design perspective, it’s probably a good idea to explicitly let the
    player know that walking on a hot tile shortens the time left for finishing the
    level. You can do this by briefly showing a warning overlay, showing a smoke animation
    around the player character, or changing the timer’s display color. You can also
    play back a warning sound. Another possibility is to change the background music
    to something more frantic, to make the player realize something has changed.


    Adapting to the Skills of the Player


    Changing the speed of the timer can make a level much easier or harder. You could
    extend the game so that in some cases the timer stops or moves back a few seconds
    if the player picked up a special item. You could even make the level progression
    adaptive so that if the player dies too often, the maximum number of seconds per
    level is increased. However, be careful about doing this. If you help the player
    in a too-obvious way, the player will realize it and adapt their strategy to it
    (in other words, the player will play worse in order to make the levels easier).
    Also, the player may feel they aren’t being treated seriously. A better way to
    deal with adapting the maximum time per level is to allow the player to (partly)
    transfer time left over from previous levels to the current level. That way, difficult
    levels can be made easier, but the player has to do something to make that happen.
    You could also consider adding difficulty levels, where a more difficult level
    has a faster timer but also better benefits such as more points, extra items to
    pick up, or extra abilities for the player. Casual game players can then select
    the “Can I play, Daddy?” difficulty level, whereas skilled players can opt for
    the extremely challenging “I am Death incarnate” level.'
  trans: "\n# 27. 完成嘀嗒嘀嗒游戏\n\n电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-0650-8_​27](http://dx.doi.org/10.1007/978-1-4842-0650-8_27)）包含补充材料，可供授权用户使用。\n\
    \n在本章中，你将完成嘀嗒嘀嗒游戏。首先，你将添加一个计时器，让玩家在有限的时间内完成每个关卡。然后，你将在背景中添加一些山脉和云朵，使游戏在视觉上更有趣。最后，你将编写允许玩家推进关卡的代码。\n\
    \n## 添加计时器\n\n我们先来看看如何为游戏添加计时器。你不希望计时器占用太多屏幕空间，因此使用文本形式的计时器。`Timer` 类继承自 `SKNode`\
    \ 类，它包含一个背景框以及一个显示剩余时间的标签节点。你需要能够暂停计时器（例如，在关卡完成时），因此添加一个名为 `running` 的布尔属性，用于指示计时器是否正在运行。你将剩余时间存储在一个名为\
    \ `timeLeft` 的属性中。玩家在每个关卡的可用秒数从文本文件中读取，并存储在一个名为 `totalTime` 的属性中。当调用 `reset` 方法时，计时器将被设置为总时间，并开始倒计时。以下是完整的\
    \ `reset` 方法：\n\n```\noverride func reset() {\n    super.reset()\n    self.timeLeft\
    \ = totalTime\n    self.running = true\n}\n```\n\n现在，你唯一需要做的就是实现 `updateDelta`\
    \ 方法来编写计时器行为。第一步，仅在计时器正在运行且仍有剩余时间时更新它。如果不是这种情况，则从该方法返回：\n\n```\nif self.timeLeft\
    \ < 0 || !self.running {\n    return\n}\n```\n\n然后，从当前剩余时间中减去已流逝的游戏时间：\n\n```\n\
    self.timeLeft -= delta\n```\n\n接下来，创建你想要在屏幕上显示的文本。你可以简单地在屏幕上显示秒数，但让我们将计时器做得更通用一些，以便也可以定义一个能够处理分钟和秒的计时器。例如，如果你想定义一个从两分钟开始倒数的计时器，可以像这样初始化它：\n\
    \n```\nself.timeLeft = 120\n```\n\n你希望在屏幕上显示“2:00”而不是“120”。为此，你需要在 `updateDelta`\
    \ 方法中计算还剩多少分钟。首先，将当前秒数向上取整。这是必要的，因为你想在第 119 秒到第 120 秒之间在屏幕上显示“2:00”。为此，你使用 `ceil`\
    \ 方法：\n\n```\nlet roundedTimeLeft = Int(ceil(timeLeft))\n```\n\n除了 `ceil` 方法，你还看到了\
    \ `floor` 方法，它是向下取整。所以 `ceil(0.1)` 得到 1，`floor(0.1)` 得到 0。分钟和秒数的计算如下：\n\n```\n\
    let minutes = roundedTimeLeft / 60\nlet seconds = roundedTimeLeft % 60\n```\n\n\
    现在你已经计算出了剩余的分钟数和秒数，可以创建一个字符串绘制在屏幕上：\n\n```\ntextLabel.text = \"\\(minutes):\\\
    (seconds)\"\nif seconds < 10 {\n    textLabel.text = \"\\(minutes):0\\(seconds)\"\
    \n}\n```\n\n将文本颜色设置为黄色，以更好地匹配游戏的设计：\n\n```\ntextLabel.fontColor = UIColor.yellowColor()\n\
    ```\n\n最后，如果玩家剩余完成关卡的时间不多了，你希望提醒他们。你可以通过在屏幕上打印文本时在红色和黄色之间交替来实现。这可以通过一个 `if` 指令和对取余运算符的巧妙运用来完成：\n\
    \n```\nif timeLeft <= 10 && seconds % 2 == 0 {\n    textLabel.fontColor = UIColor.redColor()\n\
    }\n```\n\n虽然用这种方式计算时间对于嘀嗒嘀嗒游戏来说已经足够了，但你可能希望进行更复杂的日期或时间表示。Swift 有 `NSDate` 类来表示时间，你可以将其与\
    \ `NSDateFormatter` 类结合使用，该类允许你精确指定如何将日期和/或时间表示为字符串。\n\n### 让计时器变快或变慢\n\n根据玩家行走的地砖类型，时间应该变快或变慢。走在热地砖上会使时间流逝速度加快，而在冰地砖上行走则会减慢。为了实现不同速度的计时器，你在\
    \ `Timer` 类中引入了一个乘数值。这个值存储为一个属性，初始设置为 1：\n\n```\nvar multiplier = 1.0\n```\n\n\
    在计时器运行时考虑这个乘数相当简单。你只需在 `updateDelta` 方法中将经过的时间乘以乘数即可完成：\n\n```\nself.timeLeft\
    \ -= delta * multiplier\n```\n\n现在你可以改变时间流逝的速度，具体取决于玩家行走的地砖类型。在 `Player` 类中，你已经有\
    \ `walkingOnIce` 属性，用于指示玩家是否在冰地砖上行走。为了也能处理热地砖，你定义了另一个名为 `walkingOnHot` 的属性，用于跟踪玩家是否在热地砖上行走。为了确定这个属性的值，你采用与处理\
    \ `walkingOnIce` 属性相同的方法。在 `handleCollisions` 方法中，你首先将此属性设置为 `false`：\n\n```\n\
    self.walkingOnHot = false\n```\n\n然后添加一行代码，根据玩家当前所在的地砖更新该属性的值：\n\n```\nself.walkingOnHot\
    \ = self.walkingOnHot || currentTile.hot\n```\n\n完整代码请参见属于 TickTickFinal 示例的 `Player`\
    \ 类。\n\n利用 `walkingOnIce` 和 `walkingOnHot` 属性，你现在可以更新计时器乘数。你在玩家的 `updateDelta`\
    \ 方法中执行此操作：\n\n```\nlet timer = childNodeWithName(\"//timer\") as! Timer\nif self.walkingOnHot\
    \ {\n    timer.multiplier = 2.0\n} else if self.walkingOnIce {\n    timer.multiplier\
    \ = 0.5\n} else {\n    timer.multiplier = 1\n}\n```\n\n从游戏设计角度来看，明确让玩家知道走在热地砖上会缩短完成关卡的剩余时间可能是个好主意。你可以通过短暂显示警告叠加层、在玩家角色周围显示烟雾动画、或者改变计时器的显示颜色来实现。你也可以播放警告声音。另一种可能性是将背景音乐改为更急促的旋律，让玩家意识到情况发生了变化。\n\
    \n### 适应玩家的技能水平\n\n改变计时器的速度可以使关卡变得容易得多或困难得多。你可以扩展游戏，使得在某些情况下，如果玩家捡到特殊道具，计时器会停止或回退几秒。你甚至可以让关卡进度具有自适应性，这样如果玩家死亡次数过多，每个关卡的最大秒数就会增加。但是，这样做要小心。如果你以过于明显的方式帮助玩家，玩家会意识到并据此调整策略（换句话说，玩家会玩得更差以使关卡更容易）。此外，玩家可能会觉得没有被认真对待。处理每个关卡最大时间自适应的更好方法是允许玩家将之前关卡的剩余时间（部分）转移到当前关卡。这样，困难的关卡可以变得更容易，但玩家必须做点什么才能实现这一点。你也可以考虑增加难度级别，其中较难的关卡有更快的计时器，但也有更好的奖励，例如更多分数、额外的可拾取物品或玩家获得额外能力。休闲游戏玩家可以选择“‘老爸，我能玩吗？’”的难度级别，而熟练玩家可以选择极具挑战性的“‘我是死神化身’”级别。\n"
- fmt: "### When the Timer Reaches Zero\n\nWhen the player doesn’t finish the level\
    \ on time, the bomb explodes, and the game is over. A Boolean property in the\
    \ `Player` class indicates whether the player has exploded. You then add a method\
    \ called `explode` to the class that sets the explosion in motion. This is the\
    \ complete method:\n\n```\nfunc explode() {\n    if !alive || finished {\n   \
    \     return\n    }\n    alive = false\n    exploded = true\n    velocity = CGPoint.zeroPoint\n\
    \    position.y -= 100\n    playAnimation(\"explode\")\n    playerExplodeSound.play()\n\
    }\n```\n\nFirst, the player character can’t explode if the character wasn’t alive\
    \ in the first place, or if the player finished the level. In either of those\
    \ cases, you simply return from the method. Then, you set the alive status to\
    \ `false` and the exploded status to `true`. You set the velocity to zero (explosions\
    \ don’t move). Then, you play the “explode” animation. This animation is stored\
    \ in a texture atlas and consists of 49 frames of an explosion. Finally, you play\
    \ an appropriate sound.\n\nBecause gravity also no longer affects an exploded\
    \ character, you only do the gravity physics if the player isn’t exploded:\n\n\
    ```\nif !self.exploded {\n    self.velocity.y -= CGFloat(1300 * delta)\n}\n```\n\
    \nIn the `updateDelta` method of the `LevelState` class, you check whether the\
    \ timer has reached zero, and if so, you call the `explode` method:\n\n```\nlet\
    \ timer = childNodeWithName(\"//timer\") as! Timer\nif timer.timeLeft < 0 {\n\
    \    player.explode()\n}\n```\n\n### Producing Game Assets\n\nIf you want your\
    \ game to look good, you need nice game assets. Good game assets that show coherency\
    \ will make your game more attractive to customers. This includes not only the\
    \ visuals but also the sound effects and background music. Generally, sound and\
    \ music are underestimated, but they’re important factors in establishing ambience.\
    \ Watching a film without sound is a lot less fun than watching it with music\
    \ that emotionally supports what is happening and sound effects that give body\
    \ to what the characters are doing. Games also need music and sound effects, just\
    \ like films.\n\nTo get started, you can buy premade packs of sprites. Here are\
    \ a few web sites where you can get sprites for free, buy sprites, or hire artists\
    \ who can create sprites for you:\n\n*   [`www.supergameasset.com`](http://www.supergameasset.com/)\n\
    *   [`www.graphic-buffet.com`](http://www.graphic-buffet.com/)\n*   [`www.hireanillustrator.com`](http://www.hireanillustrator.com/)\n\
    *   `opengameart.org`\n*   [`www.3dfoin.com`](http://www.3dfoin.com/)\n*   [`www.content-pack.com`](http://www.content-pack.com/)\n\
    \nJust like sprites, you can also buy music and sound effects for your games.\
    \ Take a look at these web sites:\n\n*   [`www.soundrangers.com`](http://www.soundrangers.com/)\n\
    *   [`www.indiegamemusic.com`](http://www.indiegamemusic.com/)\n*   [`www.stereobot.com`](http://www.stereobot.com/)\n\
    *   `audiojungle.net`\n*   [`www.arteriamusic.com`](http://www.arteriamusic.com/)\n\
    *   `soundcloud.com`\n\nIf you’ve already created a few games using these stock\
    \ assets, it will be much easier for you to set up connections with other indie\
    \ developers. The games you develop will form a portfolio that shows your capabilities\
    \ as a game developer.\n\n### Adding Mountains and Clouds\n\nTo make the level\
    \ background a bit more interesting, let’s add mountains and moving clouds to\
    \ it. The `LevelState` class of the TickTickFinal example has a separate method\
    \ called `addBackgrounds` in which you add the sky background, mountains, and\
    \ moving clouds. First, let’s have a look at how to add a few mountains. Depending\
    \ on the width of the level, you calculate how many mountains and clouds you will\
    \ add to the background:\n\n```\nlet nrItems: Int = Int(tileField.layout.width)\
    \ / 150\n```\n\nTo add the mountains to the background, you use a `for` instruction.\
    \ In the body of that instruction, you create a sprite node, give it a position,\
    \ and add it to the `backgrounds` node that contains all the background objects.\n\
    \nThis is the complete `for` instruction:\n\n```\nfor _ in 1...nrItems {\n   \
    \ let mountainSpriteName = \"spr_mountain_\\(arc4random_uniform(2))\"\n    let\
    \ mountain = SKSpriteNode(imageNamed: mountainSpriteName)\n    mountain.zPosition\
    \ = Layer.Background1\n    mountain.position = CGPoint(x: randomCGFloat() * (tileField.layout.width\
    \ +\n        mountain.size.width) - tileField.layout.width / 2,\n        y: -CGFloat(tileField.layout.height)/2\
    \ + mountain.size.height/2)\n    backgrounds.addChild(mountain)\n}\n```\n\nThe\
    \ first step is to create the sprite node. You want to choose randomly between\
    \ the different mountain sprites that you have. Because there are two mountain\
    \ sprites, you create a random number (either 0 or 1) to select between them.\
    \ You use the number to create the file name that corresponds to that sprite.\
    \ You position the sprite at the `Background1` layer, which is on top of the sky\
    \ node, but behind the actual scene.\n\nThen you calculate the position of the\
    \ mountain. The x-position is chosen randomly, and you use a fixed y-position\
    \ so the mountain is at the appropriate height (you don’t want mountains hanging\
    \ in the sky). Finally, the mountain object is added to the `backgrounds` node.\n\
    \nFor clouds, you do something slightly more complicated. You want the clouds\
    \ to move from left to right or vice versa, and if a cloud disappears from the\
    \ screen, you want a new one to appear. To do this, you add a `Cloud` class to\
    \ the game, which is a subclass of `SKSpriteNode`. For each cloud you want to\
    \ add to the background, you create an instance of this class. You assign it a\
    \ higher layer value than the background itself and the mountains. This ensures\
    \ that the clouds are drawn in front of the mountains. Again, you use a `for`\
    \ loop to create a number of cloud instances:\n\n```\nfor _ in 1...nrItems {\n\
    \    var cloud = Cloud()\n    cloud.zPosition = Layer.Background2\n    backgrounds.addChild(cloud)\n\
    }\n```\n\nThe `Cloud` class has a property `velocity`, since it has to move on\
    \ the screen. In the initializer, you load a random cloud sprite (there are five\
    \ different ones provided with the example). Here is the complete initializer:\n\
    \n```\ninit() {\n    let cloudSpriteName = \"spr_cloud_\\(arc4random_uniform(5))\"\
    \n    let texture = SKTexture(imageNamed: cloudSpriteName)\n    super.init(texture:\
    \ texture, color: UIColor.whiteColor(), size: texture.size())\n}\n```\n\nWhen\
    \ the level is reset, each `Cloud` instance gets a random position and velocity.\
    \ The method responsible for that is the `setRandomPositionAndVelocity` method\
    \ in the `Cloud` class. This method first sets a random y-position and a random\
    \ x velocity (either positive or negative):\n\n```\nself.position.y = randomCGFloat()\
    \ * tileField.layout.height –\n    tileField.layout.height / 2\nself.velocity.x\
    \ = (randomCGFloat() * 2 - 1) * 20\n```\n\nNote in the second instruction, you\
    \ calculate a random number between -1 and 1 and then multiply that number by\
    \ 20. This allows you to randomly create clouds with either a positive or a negative\
    \ x velocity."
  raw: '### When the Timer Reaches Zero


    When the player doesn’t finish the level on time, the bomb explodes, and the game
    is over. A Boolean property in the `Player` class indicates whether the player
    has exploded. You then add a method called `explode` to the class that sets the
    explosion in motion. This is the complete method:


    `func explode() {`


        `if !alive || finished {`


            `return`


        `}`


        `alive = false`


        `exploded = true`


        `velocity = CGPoint.zeroPoint`


        `position.y -= 100`


        `playAnimation("explode")`


        `playerExplodeSound.play()`


    `}`


    First, the player character can’t explode if the character wasn’t alive in the
    first place, or if the player finished the level. In either of those cases, you
    simply return from the method. Then, you set the alive status to `false` and the
    exploded status to `true`. You set the velocity to zero (explosions don’t move).
    Then, you play the “explode” animation. This animation is stored in a texture
    atlas and consists of 49 frames of an explosion. Finally, you play an appropriate
    sound.


    Because gravity also no longer affects an exploded character, you only do the
    gravity physics if the player isn’t exploded:


    `if !self.exploded {`


        `self.velocity.y -= CGFloat(1300 * delta)`


    `}`


    In the `updateDelta` method of the `LevelState` class, you check whether the timer
    has reached zero, and if so, you call the `explode` method:


    `let timer = childNodeWithName("//timer") as! Timer`


    `if timer.timeLeft < 0 {`


        `player.explode()`


    `}`


    Producing Game Assets


    If you want your game to look good, you need nice game assets. Good game assets
    that show coherency will make your game more attractive to customers. This includes
    not only the visuals but also the sound effects and background music. Generally,
    sound and music are underestimated, but they’re important factors in establishing
    ambience. Watching a film without sound is a lot less fun than watching it with
    music that emotionally supports what is happening and sound effects that give
    body to what the characters are doing. Games also need music and sound effects,
    just like films.


    To get started, you can buy premade packs of sprites. Here are a few web sites
    where you can get sprites for free, buy sprites, or hire artists who can create
    sprites for you:


    *   [`www.supergameasset.com`](http://www.supergameasset.com/)

    *   [`www.graphic-buffet.com`](http://www.graphic-buffet.com/)

    *   [`www.hireanillustrator.com`](http://www.hireanillustrator.com/)

    *   `opengameart.org`

    *   [`www.3dfoin.com`](http://www.3dfoin.com/)

    *   [`www.content-pack.com`](http://www.content-pack.com/)


    Just like sprites, you can also buy music and sound effects for your games. Take
    a look at these web sites:


    *   [`www.soundrangers.com`](http://www.soundrangers.com/)

    *   [`www.indiegamemusic.com`](http://www.indiegamemusic.com/)

    *   [`www.stereobot.com`](http://www.stereobot.com/)

    *   `audiojungle.net`

    *   [`www.arteriamusic.com`](http://www.arteriamusic.com/)

    *   `soundcloud.com`


    If you’ve already created a few games using these stock assets, it will be much
    easier for you to set up connections with other indie developers. The games you
    develop will form a portfolio that shows your capabilities as a game developer.


    ## Adding Mountains and Clouds


    To make the level background a bit more interesting, let’s add mountains and moving
    clouds to it. The `LevelState` class of the TickTickFinal example has a separate
    method called `addBackgrounds` in which you add the sky background, mountains,
    and moving clouds. First, let’s have a look at how to add a few mountains. Depending
    on the width of the level, you calculate how many mountains and clouds you will
    add to the background:


    `let nrItems: Int = Int(tileField.layout.width) / 150`


    To add the mountains to the background, you use a `for` instruction. In the body
    of that instruction, you create a sprite node, give it a position, and add it
    to the `backgrounds` node that contains all the background objects.


    This is the complete `for` instruction:


    `for _ in 1...nrItems {`


    `let mountainSpriteName = "spr_mountain_\(arc4random_uniform(2))"`


    `let mountain = SKSpriteNode(imageNamed: mountainSpriteName)`


    `mountain.zPosition = Layer.Background1`


    `mountain.position = CGPoint(x: randomCGFloat() * (tileField.layout.width +`


    `mountain.size.width) - tileField.layout.width / 2,`


    `y: -CGFloat(tileField.layout.height)/2 + mountain.size.height/2)`


    `backgrounds.addChild(mountain)`


    `}`


    The first step is to create the sprite node. You want to choose randomly between
    the different mountain sprites that you have. Because there are two mountain sprites,
    you create a random number (either 0 or 1) to select between them. You use the
    number to create the file name that corresponds to that sprite. You position the
    sprite at the Background1 layer, which is on top of the sky node, but behind the
    actual scene.


    Then you calculate the position of the mountain. The x-position is chosen randomly,
    and you use a fixed y-position so the mountain is at the appropriate height (you
    don’t want mountains hanging in the sky). Finally, the mountain object is added
    to the `backgrounds` node.


    For clouds, you do something slightly more complicated. You want the clouds to
    move from left to right or vice versa, and if a cloud disappears from the screen,
    you want a new one to appear. To do this, you add a `Cloud` class to the game,
    which is a subclass of `SKSpriteNode`. For each cloud you want to add to the background,
    you create an instance of this class. You assign it a higher layer value than
    the background itself and the mountains. This ensures that the clouds are drawn
    in front of the mountains. Again, you use a `for` loop to create a number of cloud
    instances:


    `for _ in 1...nrItems {`


    `var cloud = Cloud()`


    `cloud.zPosition = Layer.Background2`


    `backgrounds.addChild(cloud)`


    `}`


    The `Cloud` class has a property `velocity`, since it has to move on the screen.
    In the initializer, you load a random cloud sprite (there are five different ones
    provided with the example). Here is the complete initializer:


    `init() {`


    `let cloudSpriteName = "spr_cloud_\(arc4random_uniform(5))"`


    `let texture = SKTexture(imageNamed: cloudSpriteName)`


    `super.init(texture: texture, color: UIColor.whiteColor(), size: texture.size())`


    `}`


    When the level is reset, each `Cloud` instance gets a random position and velocity.
    The method responsible for that is the `setRandomPositionAndVelocity` method in
    the `Cloud` class. This method first sets a random y-position and a random x velocity
    (either positive or negative):


    `self.position.y = randomCGFloat() * tileField.layout.height –`


    `tileField.layout.height / 2`


    `self.velocity.x = (randomCGFloat() * 2 - 1) * 20`


    Note in the second instruction, you calculate a random number between -1 and 1
    and then multiply that number by 20\. This allows you to randomly create clouds
    with either a positive or a negative x velocity.'
  trans: "好的，作为高级文档工程师和翻译员，我将严格遵循您的格式和注意事项，将给定的英文文本翻译成中文。\n\n\n### 当计时器归零\n\n当玩家未能按时完成关卡时，炸弹会爆炸，游戏结束。`Player`\
    \ 类中的一个布尔属性指示玩家是否已爆炸。接着，你在该类中添加一个名为 `explode` 的方法，用于启动爆炸过程。这是完整的方法：\n\n```\nfunc\
    \ explode() {\n    if !alive || finished {\n        return\n    }\n    alive =\
    \ false\n    exploded = true\n    velocity = CGPoint.zeroPoint\n    position.y\
    \ -= 100\n    playAnimation(\"explode\")\n    playerExplodeSound.play()\n}\n```\n\
    \n首先，如果游戏角色一开始就未存活，或者玩家已经完成了关卡，那么角色就不会爆炸。在这两种情况下，你只需从该方法返回即可。接着，你将存活状态设为 `false`，并爆炸状态设为\
    \ `true`。你将速度设为零（爆炸后不会移动）。然后，播放“explode”动画。此动画存储在纹理图集中，包含 49 帧爆炸画面。最后，播放一个合适的音效。\n\
    \n由于重力也不再影响爆炸后的角色，因此只有在玩家未爆炸时才进行重力物理计算：\n\n```\nif !self.exploded {\n    self.velocity.y\
    \ -= CGFloat(1300 * delta)\n}\n```\n\n在 `LevelState` 类的 `updateDelta` 方法中，你需要检查计时器是否已归零，如果是，则调用\
    \ `explode` 方法：\n\n```\nlet timer = childNodeWithName(\"//timer\") as! Timer\n\
    if timer.timeLeft < 0 {\n    player.explode()\n}\n```\n\n### 制作游戏资源\n\n想要游戏画面精美，就需要优质的游戏资源。具有一致性的优质游戏资源会使你的游戏对玩家更具吸引力。这不仅包括视觉效果，还包括音效和背景音乐。通常，音效和音乐的价值被低估，但它们是营造氛围的重要因素。观看一部无声电影，远不如观看一部配有情感烘托音乐和衬托角色动作音效的电影有趣。游戏和电影一样，也需要音乐和音效。\n\
    \n作为入门，你可以购买现成的精灵素材包。以下是一些网站，你可以从中免费获取精灵素材、购买精灵素材，或聘请能为你创建精灵素材的艺术家：\n\n*   [`www.supergameasset.com`](http://www.supergameasset.com/)\n\
    *   [`www.graphic-buffet.com`](http://www.graphic-buffet.com/)\n*   [`www.hireanillustrator.com`](http://www.hireanillustrator.com/)\n\
    *   `opengameart.org`\n*   [`www.3dfoin.com`](http://www.3dfoin.com/)\n*   [`www.content-pack.com`](http://www.content-pack.com/)\n\
    \n和精灵素材一样，你也可以为你的游戏购买音乐和音效。看看这些网站：\n\n*   [`www.soundrangers.com`](http://www.soundrangers.com/)\n\
    *   [`www.indiegamemusic.com`](http://www.indiegamemusic.com/)\n*   [`www.stereobot.com`](http://www.stereobot.com/)\n\
    *   `audiojungle.net`\n*   [`www.arteriamusic.com`](http://www.arteriamusic.com/)\n\
    *   `soundcloud.com`\n\n如果你已经使用这些现成素材创建了几款游戏，那么与其他独立开发者建立联系就会容易得多。你开发的游戏将构成一个作品集，展示你作为游戏开发者的能力。\n\
    \n### 添加山脉和云朵\n\n为了使关卡背景更有趣，让我们添加一些山脉和移动的云朵。TickTickFinal 示例中的 `LevelState` 类有一个单独的方法\
    \ `addBackgrounds`，用于添加天空背景、山脉和移动的云朵。首先，我们来看看如何添加几座山脉。根据关卡的宽度，计算要添加到背景中的山脉和云朵数量：\n\
    \n```\nlet nrItems: Int = Int(tileField.layout.width) / 150\n```\n\n要添加山脉到背景中，需使用\
    \ `for` 指令。在该指令的主体中，你需要创建一个精灵节点，为其指定一个位置，然后将其添加到包含所有背景对象的 `backgrounds` 节点中。\n\
    \n这是完整的 `for` 指令：\n\n```\nfor _ in 1...nrItems {\n    let mountainSpriteName =\
    \ \"spr_mountain_\\(arc4random_uniform(2))\"\n    let mountain = SKSpriteNode(imageNamed:\
    \ mountainSpriteName)\n    mountain.zPosition = Layer.Background1\n    mountain.position\
    \ = CGPoint(x: randomCGFloat() * (tileField.layout.width +\n        mountain.size.width)\
    \ - tileField.layout.width / 2,\n        y: -CGFloat(tileField.layout.height)/2\
    \ + mountain.size.height/2)\n    backgrounds.addChild(mountain)\n}\n```\n\n第一步是创建精灵节点。你需要从已有的不同山脉精灵中随机选择。由于有两个山脉精灵，你需要创建一个随机数（0\
    \ 或 1）来在它们之间进行选择。使用这个数字来创建与该精灵对应的文件名。你将精灵置于 `Background1` 层，该层位于天空节点之上，但位于实际场景之后。\n\
    \n然后计算山脉的位置。x 坐标是随机选择的，并使用固定的 y 坐标，以便山脉位于合适的高度（你当然不希望山脉悬挂在空中）。最后，将山脉对象添加到 `backgrounds`\
    \ 节点。\n\n对于云朵，处理方式会稍微复杂一些。你希望云朵从左向右或从右向左移动，并且如果一朵云从屏幕消失，则希望出现一朵新的云。为此，你向游戏中添加一个\
    \ `Cloud` 类，它是 `SKSpriteNode` 的子类。对于要添加到背景中的每朵云，你都创建该类的一个实例。你为其分配的图层值要高于背景本身和山脉的图层值。这确保了云朵绘制在山脉的前面。同样，使用\
    \ `for` 循环创建多个云朵实例：\n\n```\nfor _ in 1...nrItems {\n    var cloud = Cloud()\n\
    \    cloud.zPosition = Layer.Background2\n    backgrounds.addChild(cloud)\n}\n\
    ```\n\n`Cloud` 类有一个 `velocity` 属性，因为它需要在屏幕上移动。在初始化器中，你加载一个随机的云朵精灵（示例中提供了五个不同的云朵精灵）。这是完整的初始化器：\n\
    \n```\ninit() {\n    let cloudSpriteName = \"spr_cloud_\\(arc4random_uniform(5))\"\
    \n    let texture = SKTexture(imageNamed: cloudSpriteName)\n    super.init(texture:\
    \ texture, color: UIColor.whiteColor(), size: texture.size())\n}\n```\n\n当关卡重置时，每个\
    \ `Cloud` 实例会获得一个随机的位置和速度。负责此功能的是 `Cloud` 类中的 `setRandomPositionAndVelocity` 方法。该方法首先设置一个随机的\
    \ y 坐标和一个随机的 x 方向速度（正值或负值）：\n\n```\nself.position.y = randomCGFloat() * tileField.layout.height\
    \ –\n    tileField.layout.height / 2\nself.velocity.x = (randomCGFloat() * 2 -\
    \ 1) * 20\n```\n\n请注意第二条指令，你计算了一个介于 -1 和 1 之间的随机数，然后将该数乘以 20。这允许你随机创建具有正 x 速度或负\
    \ x 速度的云朵。\n"
- fmt: "`setRandomPositionAndVelocity`方法要么将云放置在某关卡中（即玩家首次开始关卡时所需的效果），要么将云放置在屏幕外，使其能够移入屏幕（即云移出关卡时所需的效果）。一个名为`placeAtEdgeOfSceen`的布尔参数允许你选择云的放置位置。完整方法见本章所属`TickTickFinal`示例的`Cloud`类。\n\
    \n`Cloud`类还包含一个`updateDelta`方法，你可以在其中检查云是否已移出屏幕。如果云已移出屏幕，则需通过调用`setRandomPositionAndVelocity`并设置参数`placeAtEdgeOfScreen`为`true`来重置它。云既可从左侧也可从右侧移出屏幕。你可以计算云完全移出屏幕的最小和最大\
    \ x 值：\n\n```\nlet minx = -tileField.layout.width / 2 - self.size.width / 2\n\
    let maxx = tileField.layout.width / 2 + self.size.width / 2\n```\n\n现在，你可以使用`if`指令判断云是否已移出屏幕，若是，则调用`setRandomPositionAndVelocity`：\n\
    \n```\nif position.x < minx || position.x > maxx {\n    setRandomPositionAndVelocity(true)\n\
    }\n```\n\n图[27-1](#A978-1-4842-0650-8_27_Chapter.html#Fig1)展示了一个关卡的屏幕截图，其背景包含山脉和移动的云朵。\n\
    \n![A978-1-4842-0650-8_27_Fig1_HTML.jpg](A978-1-4842-0650-8_27_Fig1_HTML.jpg)\n\
    \n图27-1. 一个包含山脉和移动云朵背景的Tick Tick关卡\n\n## 显示帮助框架\n\n为了完善每个关卡，你还需要短暂显示一个包含提示信息的框架，并使用漂亮的定制字体使文本更具吸引力。在`LevelState`初始化器中，你需要添加框架和提示文本：\n\
    \n```\nhelpFrame.position = CGPoint(x: 0, y: GameScreen.instance.top - helpFrame.center.y\
    \ - 10)\nhelpFrame.zPosition = Layer.Overlay\nself.addChild(helpFrame)\n\nlet\
    \ textLabel = SKLabelNode(fontNamed: \"SmackAttackBB\")\ntextLabel.fontColor =\
    \ UIColor(red: 0, green: 0, blue: 0.4, alpha: 1)\ntextLabel.fontSize = 16\ntextLabel.text\
    \ = help\ntextLabel.horizontalAlignmentMode = .Center\ntextLabel.verticalAlignmentMode\
    \ = .Center\ntextLabel.zPosition = 1\ntextLabel.position = CGPoint(x: 45, y: -5)\n\
    helpFrame.addChild(textLabel)\n```\n\n为了临时显示帮助框架，你定义一个动作，并在调用`LevelState`的`reset`方法时运行它。以下是完整的`reset`方法：\n\
    \n```\noverride func reset() {\n    super.reset()\n    levelFinishedOverlay.hidden\
    \ = true\n    helpFrame.runAction(SKAction.sequence([SKAction.unhide(),\n    \
    \    SKAction.waitForDuration(5), SKAction.hide()]))\n}\n```\n\n## 完成关卡进度\n\n\
    要完成游戏，你还需要处理玩家输掉或赢得关卡的情况。你采用的方式与在Penguin Pairs游戏中处理类似：为胜利和失败添加覆盖层，并仅当玩家输掉或赢得游戏时才显示它们。为了判断玩家是否已完成一个关卡，你在`LevelState`类中添加一个`completed`属性，该属性检查两件事：\n\
    \n*   玩家是否已收集所有水滴？\n*   玩家是否已到达出口标志？\n\n这两项检查都相当容易。要检查玩家是否已到达终点标志，你可以看他们的包围盒是否相交。检查玩家是否已收集所有水滴，可通过验证所有水滴均不可见来实现。以下是完整属性：\n\
    \n```\nvar completed: Bool {\n    get {\n        for w in waterDrops {\n     \
    \       if !w.hidden {\n                return false\n            }\n        }\n\
    \        let player = childNodeWithName(\"//player\")!\n        let exit = childNodeWithName(\"\
    //exit\")!\n        return exit.box.intersects(player.box)\n    }\n}\n```\n\n\
    在`LevelState`类的`updateDelta`方法中，你检查关卡是否已完成。如果是，则调用`Player`类中的`levelFinished`方法，播放“庆祝”动画：\n\
    \n```\nif self.completed && levelFinishedOverlay.hidden {\n    levelFinishedOverlay.hidden\
    \ = false\n    player.levelFinished()\n    timer.running = false\n}\n```\n\n由于玩家已完成，你也停止计时器。同理，你还有一个`gameOver`属性用于判断玩家是否已输掉游戏：\n\
    \n```\nvar gameOver: Bool {\n    get {\n        let player = childNodeWithName(\"\
    //player\") as! Player\n        let timer = childNodeWithName(\"//timer\") as!\
    \ Timer\n        return !player.alive || timer.timeLeft < 0\n    }\n}\n```\n\n\
    在`updateDelta`方法中，你根据此属性设置Game Over覆盖层的可见性：\n\n```\ngameoverOverlay.hidden = !self.gameOver\n\
    ```\n\n处理关卡间转换的代码相当简单，几乎是Penguin Pairs游戏中代码的副本。请查看`TickTickFinal`示例中的代码以了解具体实现。\n\
    \n现在你已经了解了如何构建一款包含常见元素的平台游戏，例如收集物品、躲避敌人、游戏物理、关卡切换等。或许你也注意到，Tick Tick游戏在iOS模拟器上运行速度不快（尽管在较新的iDevices上应该运行流畅）。这里你可以看到，使用高质量美术资源、众多动画、（物理）对象间交互等，会在计算量上累积成本。另一方面，要使Tick\
    \ Tick成为一款商业上可行的游戏，仍有许多工作要做。你可能希望定义更多内容：更多关卡、更多敌人、更多不同的可拾取物品、更多挑战、更多音效。你可能还想引入一些我未提及的功能：通过网络与其他玩家对战、维护高分榜、在关卡间播放游戏内过场动画，以及其他你认为有趣的可添加内容。将Tick\
    \ Tick游戏作为你自己游戏的起点，但请始终牢记，理想情况下，你的游戏应能在尽可能多的设备上运行，这会对游戏复杂度产生限制。\n\n## 销售你的游戏\n\
    \n既然你正在编写自己的游戏，你可能已经开始思考如何将其推向现实世界。也许你不仅是为了成就感而创作游戏，还想借此赚取一些收入。幸运的是，借助App Store，发布游戏变得很容易。要发布应用，你需要成为Apple开发者，这需要支付年费。之后，挑战在于让你的游戏获得关注。在iOS上，每天有超过300款新游戏上线。其中大多数只有少数人游玩。那么，如何让你的游戏脱颖而出呢？\n\
    \n首先，你需要制作一款高质量的游戏。如果游戏不好，没人会玩。寻找拥有其他技能的人来帮助你。不要好高骛远：你不可能创造下一款《光环》！设定合理的目标。从制作小型但优秀的游戏开始。不要仅凭自己的判断：与他人讨论你的游戏，让他们试玩原型以确保玩家确实喜欢它。当你的游戏接近完成时，制定营销计划。尽可能多地发布游戏相关信息：制作新闻资料包、创建视频、向博客及其他网站发送信息等。人们只有在听说过你的游戏后才会去玩。不要以为在App\
    \ Store发布后，这一切会自动发生；你需要制定计划。在游戏发布前，建立一个潜在玩家网络——那些对你所做的事情感兴趣的人。为你的公司和/或正在创作的游戏建立一个Facebook群组。务必在Twitter等社交网络上与关注者沟通。鼓励他人玩你的游戏并撰写相关文章。"
  raw: 'The `setRandomPositionAndVelocity` method either places the cloud somewhere
    in the level (which is what you want when the player first starts the level) or
    it places the cloud just outside the screen so it can start moving in the screen
    (which is what you want if the cloud has moved outside of the level). A Boolean
    parameter called `placeAtEdgeOfSceen` allows you to choose where the cloud should
    be placed. For the complete method, see the `Cloud` class of the TickTickFinal
    example belonging to this chapter.


    The `Cloud` class also has an `updateDelta` method, in which you check whether
    the cloud has exited the screen. If the cloud has exited the screen, you reset
    it by calling the `setRandomPositionAndVelocity` with the `placeAtEdgeOfScreen`
    parameter set to true. A cloud can exit the screen either on the left side or
    on the right side. You can calculate the minimum and maximum x values for which
    the cloud has completely exited the screen:


    `let minx = -tileField.layout.width / 2 - self.size.width / 2`


    `let maxx = tileField.layout.width / 2 + self.size.width / 2`


    Now you can use an `if` instruction to determine if the cloud has exited the screen,
    and if so, call the `setRandomPositionAndVelocity`:


    `if position.x < minx || position.x > maxx {`


    `setRandomPositionAndVelocity(true)`


    `}`


    Figure [27-1](#A978-1-4842-0650-8_27_Chapter.html#Fig1) shows a screenshot of
    a level that has mountains and moving clouds in its background.


    ![A978-1-4842-0650-8_27_Fig1_HTML.jpg](A978-1-4842-0650-8_27_Fig1_HTML.jpg)


    Figure 27-1.


    A Tick Tick level with mountains and moving clouds in the background


    ## Showing the Help Frame


    To complete each level, you also briefly show a frame with a hint, using a nice
    custom font to make the text look attractive. In the `LevelState` initializer,
    you add the frame as well as the hint text:


    `helpFrame.position = CGPoint(x: 0, y: GameScreen.instance.top - helpFrame.center.y
    - 10)`


    `helpFrame.zPosition = Layer.Overlay`


    `self.addChild(helpFrame)`


    `let textLabel = SKLabelNode(fontNamed: "SmackAttackBB")`


    `textLabel.fontColor = UIColor(red: 0, green: 0, blue: 0.4, alpha: 1)`


    `textLabel.fontSize = 16`


    `textLabel.text =` `help`


    `textLabel.horizontalAlignmentMode = .Center`


    `textLabel.verticalAlignmentMode = .Center`


    `textLabel.zPosition = 1`


    `textLabel.position = CGPoint(x: 45, y: -5)`


    `helpFrame.addChild(textLabel)`


    To temporarily show the help frame, you define an action and run it when the `reset`
    method of `LevelState` is called. Here is the complete `reset` method:


    `override func reset() {`


        `super.reset()`


        `levelFinishedOverlay.hidden = true`


        `helpFrame.runAction(SKAction.sequence([SKAction.unhide(),`


            `SKAction.waitForDuration(5), SKAction.hide()]))`


    `}`


    ## Finalizing the Level Progression


    To complete the game, you still need to deal with the event that the player has
    lost or won a level. You approach this in a fashion similar to how you handled
    it in the Penguin Pairs game, by adding the overlays for winning and losing the
    game, and showing them only if the player has either lost or won the game. To
    determine whether the player has finished a level, you add a `completed` property
    to the `LevelState` class that checks for two things:


    *   Has the player collected all of the water drops?

    *   Has the player reached the exit sign?


    Both of these things are fairly easy to check. To check whether the player has
    reached the end sign, you can see whether their bounding boxes are intersecting.
    Checking whether the player has collected all the water drops can be done by verifying
    that all water drops are invisible. This is the complete property:


    `var completed: Bool {`


    `get {`


    `for w in waterDrops {`


    `if !w.hidden {`


    `return false`


    `}`


    `}`


    `let player = childNodeWithName("//player")!`


    `let exit = childNodeWithName("//exit")!`


    `return exit.box.intersects(player.box)`


    `}`


    `}`


    In the `updateDelta` method of the `LevelState` class, you check whether the level
    was completed. If so, you call the `levelFinished` method in the `Player` class,
    which plays the “celebration” animation:


    `if self.completed && levelFinishedOverlay.hidden {`


    `levelFinishedOverlay.hidden = false`


    `player.levelFinished()`


    `timer.running = false`


    `}`


    You also stop the timer because the player is done. Similarly, you also have a
    `gameOver` property that determines whether the player has lost the game:


    `var gameOver: Bool {`


    `get {`


    `let player = childNodeWithName("//player") as! Player`


    `let timer = childNodeWithName("//timer") as! Timer`


    `return !player.alive || timer.timeLeft < 0`


    `}`


    `}`


    In the `updateDelta` method, you then set the visibility of the Game Over overlay
    according to this property:


    `gameoverOverlay.hidden = !self.gameOver`


    The code to deal with transitions between levels is fairly straightforward and
    is almost a copy of the code used in the Penguin Pairs game. Have a look at the
    code in the `TickTickFinal` example to see how this is done.


    You’ve now seen how to build a platform game with commonly occurring elements
    such as collecting items, avoiding enemies, game physics, going from one level
    to another, and so on. Perhaps you also noticed that the Tick Tick game doesn’t
    run very fast in the iOS simulator (although on recent iDevices it should run
    fine). Here you see that the cost of using high-quality artwork, many animations,
    (physical) interactions between objects, and so on, does add up in terms of computation.
    On the other hand, to make Tick Tick a game that is commercially viable, a lot
    of work still needs to be done. You probably want to define more of everything:
    more levels, more enemies, more different items to pick up, more challenges, more
    sounds. You may also want to introduce a few things that I didn’t address: playing
    with other players over a network, maintaining a high-score list, playing in-game
    movies between levels, and other things you can think of that would be interesting
    to add. Use the Tick Tick game as a starting point for your own game, but always
    keep in mind that ideally your game should be playable on as many devices as possible,
    which places limits on the complexity of the games you create.


    Selling your Game


    Now that you’re programming your own games, you may have started to think about
    how to get them out in the real world. Maybe you don’t want to create a game just
    for the achievement, but to make some money with it. Fortunately, with the App
    Store, getting your game published is easy. In order to be able to publish apps,
    you need to become an Apple developer, for which you’ll have to pay a yearly fee.
    After that, the challenge lies in making your game visible. On iOS, more than
    300 new games appear every day. Most of them are played by just a few people.
    So how do you make your game stand out?


    First of all, you need to produce a quality game. If the game isn’t good, people
    won’t play it. Find other people with other skill sets to help you. Don’t be overambitious:
    you aren’t going to create the next Halo! Set reasonable goals. Start with small
    but excellent games. Don’t trust your own judgment: talk to others about your
    game, and let them play prototypes to make sure players actually like it. When
    your game is nearing completion, make a marketing plan. Post about the game wherever
    you can, make a press kit, create a video, send information to blogs and other
    web sites, and so on. People will only play your game when they hear about it.
    Don’t expect that this will happen automatically after you’ve published your game
    on the App Store; you need to make a plan. Before your game is out, build a network
    of potential players—people who are interested in what you do. Create a Facebook
    group for your company and/or the game you’re creating. Be sure to communicate
    with followers on social networks such as Twitter. Encourage others to play your
    game and write about it.'
  trans: "\n`setRandomPositionAndVelocity`方法要么将云朵放置在关卡内（即玩家首次开始关卡时所需的效果），要么将其放置在屏幕外，使其能够移入屏幕（即云朵移出关卡时所需的效果）。一个名为`placeAtEdgeOfSceen`的布尔参数允许你选择云朵的放置位置。完整方法见本章所属`TickTickFinal`示例的`Cloud`类。\n\
    \n`Cloud`类还包含一个`updateDelta`方法，你可以在其中检查云朵是否已移出屏幕。如果云朵已移出屏幕，则需通过调用`setRandomPositionAndVelocity`并设置参数`placeAtEdgeOfScreen`为`true`来重置它。云朵既可从左侧也可从右侧移出屏幕。你可以计算云朵完全移出屏幕的最小和最大\
    \ x 值：\n\n```\nlet minx = -tileField.layout.width / 2 - self.size.width / 2\n\
    let maxx = tileField.layout.width / 2 + self.size.width / 2\n```\n\n现在，你可以使用`if`指令判断云朵是否已移出屏幕，若是，则调用`setRandomPositionAndVelocity`：\n\
    \n```\nif position.x < minx || position.x > maxx {\n    setRandomPositionAndVelocity(true)\n\
    }\n```\n\n图 27-1 展示了一个关卡的屏幕截图，其背景包含山脉和移动的云朵。\n\n![A978-1-4842-0650-8_27_Fig1_HTML.jpg](img/A978-1-4842-0650-8_27_Fig1_HTML.jpg)\n\
    \n图 27-1. 一个包含山脉和移动云朵背景的 Tick Tick 关卡\n\n## 显示帮助框架\n\n为了完善每个关卡，你还需要短暂显示一个包含提示信息的框架，并使用漂亮的定制字体使文本更具吸引力。在`LevelState`初始化器中，你需要添加框架和提示文本：\n\
    \n```\nhelpFrame.position = CGPoint(x: 0, y: GameScreen.instance.top - helpFrame.center.y\
    \ - 10)\nhelpFrame.zPosition = Layer.Overlay\nself.addChild(helpFrame)\n\nlet\
    \ textLabel = SKLabelNode(fontNamed: \"SmackAttackBB\")\ntextLabel.fontColor =\
    \ UIColor(red: 0, green: 0, blue: 0.4, alpha: 1)\ntextLabel.fontSize = 16\ntextLabel.text\
    \ = help\ntextLabel.horizontalAlignmentMode = .Center\ntextLabel.verticalAlignmentMode\
    \ = .Center\ntextLabel.zPosition = 1\ntextLabel.position = CGPoint(x: 45, y: -5)\n\
    helpFrame.addChild(textLabel)\n```\n\n为了临时显示帮助框架，你定义一个动作，并在调用`LevelState`的`reset`方法时运行它。以下是完整的`reset`方法：\n\
    \n```\noverride func reset() {\n    super.reset()\n    levelFinishedOverlay.hidden\
    \ = true\n    helpFrame.runAction(SKAction.sequence([SKAction.unhide(),\n    \
    \    SKAction.waitForDuration(5), SKAction.hide()]))\n}\n```\n\n## 完成关卡进度\n\n\
    要完成游戏，你还需要处理玩家输掉或赢得关卡的情况。你采用的方式与在 Penguin Pairs 游戏中处理类似：为胜利和失败添加覆盖层，并仅当玩家输掉或赢得游戏时才显示它们。为了判断玩家是否已完成一个关卡，你在`LevelState`类中添加一个`completed`属性，该属性检查两件事：\n\
    \n*   玩家是否已收集所有水滴？\n*   玩家是否已到达出口标志？\n\n这两项检查都相当容易。要检查玩家是否已到达终点标志，你可以看他们的包围盒是否相交。检查玩家是否已收集所有水滴，可通过验证所有水滴均不可见来实现。以下是完整属性：\n\
    \n```\nvar completed: Bool {\n    get {\n        for w in waterDrops {\n     \
    \       if !w.hidden {\n                return false\n            }\n        }\n\
    \        let player = childNodeWithName(\"//player\")!\n        let exit = childNodeWithName(\"\
    //exit\")!\n        return exit.box.intersects(player.box)\n    }\n}\n```\n\n\
    在`LevelState`类的`updateDelta`方法中，你检查关卡是否已完成。如果是，则调用`Player`类中的`levelFinished`方法，播放“庆祝”动画：\n\
    \n```\nif self.completed && levelFinishedOverlay.hidden {\n    levelFinishedOverlay.hidden\
    \ = false\n    player.levelFinished()\n    timer.running = false\n}\n```\n\n由于玩家已完成，你也停止计时器。同理，你还有一个`gameOver`属性用于判断玩家是否已输掉游戏：\n\
    \n```\nvar gameOver: Bool {\n    get {\n        let player = childNodeWithName(\"\
    //player\") as! Player\n        let timer = childNodeWithName(\"//timer\") as!\
    \ Timer\n        return !player.alive || timer.timeLeft < 0\n    }\n}\n```\n\n\
    在`updateDelta`方法中，你根据此属性设置 Game Over 覆盖层的可见性：\n\n```\ngameoverOverlay.hidden =\
    \ !self.gameOver\n```\n\n处理关卡间转换的代码相当简单，几乎是 Penguin Pairs 游戏中代码的副本。请查看`TickTickFinal`示例中的代码以了解具体实现。\n\
    \n现在你已经了解了如何构建一款包含常见元素的平台游戏，例如收集物品、躲避敌人、游戏物理、关卡切换等。或许你也注意到，Tick Tick 游戏在 iOS 模拟器上运行速度不快（尽管在较新的\
    \ iDevices 上应该运行流畅）。这里你可以看到，使用高质量美术资源、众多动画、（物理）对象间交互等，会在计算量上累积成本。另一方面，要使 Tick\
    \ Tick 成为一款商业上可行的游戏，仍有许多工作要做。你可能希望定义更多内容：更多关卡、更多敌人、更多不同的可拾取物品、更多挑战、更多音效。你可能还想引入一些我未提及的功能：通过网络与其他玩家对战、维护高分榜、在关卡间播放游戏内过场动画，以及其他你认为有趣的可添加内容。将\
    \ Tick Tick 游戏作为你自己游戏的起点，但请始终牢记，理想情况下，你的游戏应能在尽可能多的设备上运行，这会对游戏复杂度产生限制。\n\n## 销售你的游戏\n\
    \n既然你正在编写自己的游戏，你可能已经开始思考如何将其推向现实世界。也许你不仅是为了成就感而创作游戏，还想借此赚取一些收入。幸运的是，借助 App Store，发布游戏变得很容易。要发布应用，你需要成为\
    \ Apple 开发者，这需要支付年费。之后，挑战在于让你的游戏获得关注。在 iOS 上，每天有超过 300 款新游戏上线。其中大多数只有少数人游玩。那么，如何让你的游戏脱颖而出呢？\n\
    \n首先，你需要制作一款高质量的游戏。如果游戏不好，没人会玩。寻找拥有其他技能的人来帮助你。不要好高骛远：你不可能创造下一款《光环》！设定合理的目标。从制作小型但优秀的游戏开始。不要仅凭自己的判断：与他人讨论你的游戏，让他们试玩原型以确保玩家确实喜欢它。当你的游戏接近完成时，制定营销计划。尽可能多地发布游戏相关信息：制作新闻资料包、创建视频、向博客及其他网站发送信息等。人们只有在听说过你的游戏后才会去玩。不要以为在\
    \ App Store 发布后，这一切会自动发生；你需要制定计划。在游戏发布前，建立一个潜在玩家网络——那些对你所做的事情感兴趣的人。为你的公司和/或正在创作的游戏建立一个\
    \ Facebook 群组。务必在 Twitter 等社交网络上与关注者沟通。鼓励他人玩你的游戏并撰写相关文章。\n"
