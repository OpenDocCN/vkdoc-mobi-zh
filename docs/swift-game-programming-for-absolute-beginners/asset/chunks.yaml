- fmt: "# Adding Sounds and Music\n\nAnother way to make the game more enjoyable is\
    \ to add some sound. This game uses both background music and sound effects. In\
    \ order to make dealing with sounds a bit easier in Swift, you add a `Sound` class\
    \ that allows you to play back and loop sounds. Here is a part of that class (for\
    \ the complete class, see the PainterFinal example):\n\n```\nclass Sound {\n \
    \   var audioPlayer = AVAudioPlayer()\n    init(_ fileName: String) {\n      \
    \  let soundURL = NSBundle.mainBundle().URLForResource(fileName, withExtension:\
    \ \"mp3\")\n        audioPlayer = try! AVAudioPlayer(contentsOfURL: soundURL!)\n\
    \    }\n    ...\n}\n```\n\nThe class contains a stored property called `audioPlayer`\
    \ that is responsible for playing the sound. In the initializer, you create a\
    \ new audio player object based on the file name passed as a parameter. The syntax\
    \ of creating the `AVAudioPlayer` object may look a bit unfamiliar to you. Creating\
    \ an `AVAudioPlayer` object may result in an error (for example, if the sound\
    \ file cannot be found). Swift forces you to choose whether to handle or ignore\
    \ such errors. Since this kind of error handling is out of the scope of this book,\
    \ I use `try!` to ignore any errors that may occur.\n\nNow let’s add some functionality\
    \ to the `Sound` class to make playing a variety of sounds easier. One thing that\
    \ many games need is the option to loop a sound. In general, background music\
    \ should be looped; sound effects (such as firing a paint ball) shouldn’t.\n\n\
    The `Sound` class contains a (computed) property called `looping` that indicates\
    \ whether the sound should be looped or not. You can loop a sound by setting the\
    \ property `numberOfLoops` in the `audioPlayer` object to an appropriate value.\
    \ If you choose a value of 0, the sound will not loop (which is what you want\
    \ for sound effects). A positive value indicates how often a sound should be looped.\
    \ A value of -1 loops the sound indefinitely until the program is ended (which\
    \ is a good option for background music). Here is the complete property:\n\n```\n\
    var looping: Bool {\n    get {\n        return audioPlayer.numberOfLoops < 0\n\
    \    }\n    set {\n        if newValue {\n            audioPlayer.numberOfLoops\
    \ = -1\n        } else {\n            audioPlayer.numberOfLoops = 0\n        }\n\
    \    }\n}\n```\n\nLet’s also add a property to change the volume of a sound that\
    \ is playing. This is particularly useful because generally you want sound effects\
    \ to be louder than background music. In some games, these volumes can be changed\
    \ by the player (later in this book you will see how to do that). Whenever you\
    \ introduce sound in your game, make sure to always provide volume or at least\
    \ mute controls. Games without the ability to mute sounds will suffer the wrath\
    \ of annoyed users via reviews! Here is the `volume` property, which is straightforward:\n\
    \n```\nvar volume: Float {\n    get {\n        return audioPlayer.volume\n   \
    \ }\n    set {\n        audioPlayer.volume = newValue\n    }\n}\n```\n\nFinally,\
    \ you add a method called `play`, which does two things. First, it sets the location\
    \ where to start playing the sound at the beginning (so, at time 0). Then, it\
    \ calls the `play` method on the `audioPlayer` object:\n\n```\nfunc play() {\n\
    \    audioPlayer.currentTime = 0\n    audioPlayer.play()\n}\n```\n\nNow you can\
    \ use the `Sound` class to easily load and play a variety of sounds in your game.\
    \ In the Painter game, there is background music as well as sound effects. For\
    \ each specific sound you want to play, you add a property to the class that uses\
    \ the sound. For example, for background music, the following property was added\
    \ to `GameWorld`:\n\n```\nvar backgroundMusic = Sound(\"snd_music\")\n```\n\n\
    In the initializer, you begin playing the background music in a loop at a low\
    \ volume, as follows:\n\n```\nbackgroundMusic.looping = true\nbackgroundMusic.volume\
    \ = 0.5\nbackgroundMusic.play()\n```\n\nYou also want to play sound effects. For\
    \ example, when the player shoots a ball, they want to hear it! So, you play this\
    \ sound effect when they start shooting the ball. In the `Ball` class, you add\
    \ a property to represent the sound effect:\n\n```\nvar shootPaintSound = Sound(\"\
    snd_shoot_paint\")\n```\n\nThen, you play the sound when the ball is shot, which\
    \ is dealt with in the `handleInput` method of the `Ball` class:\n\n```\nif (!inputHelper.isTouching\
    \ && readyToShoot && self.hidden) {\n    self.hidden = false\n    readyToShoot\
    \ = false\n    velocity.x = (inputHelper.touchLocation.x -\n        GameScene.world.cannon.position.x)\
    \ * 1.4\n    velocity.y = (inputHelper.touchLocation.y -\n        GameScene.world.cannon.position.y)\
    \ * 1.4\n    shootPaintSound.play()\n}\n```\n\nSimilarly, you also play a sound\
    \ when a paint can of the correct color falls out of the screen (see the `PaintCan`\
    \ class in the PainterFinal example for the actual code).\n\n# Maintaining a Score\n\
    \nScores are often a very effective way to motivate players to continue playing.\
    \ High scores work especially well in that regard because they introduce a competitive\
    \ factor into the game: you want to be better than AAA or XYZ (many early arcade\
    \ games allowed only three characters for each name in the high-score list, leading\
    \ to very imaginative names). High scores are so motivating that third-party systems\
    \ exist to incorporate them into games. These systems let users compare themselves\
    \ against thousands of other players around the world. In the Painter game, you\
    \ keep it simple and add the property `score` to the `GameWorld` class in which\
    \ to store the current score:\n\n```\nvar score = 0\n```\n\nThe player starts\
    \ with a score of zero. Each time a paint can falls outside the screen, the score\
    \ is updated. If a can of the correct color falls out of the screen, 10 points\
    \ are added to the score. If a can isn’t the right color, the player loses a life.\n\
    \nThe score is a part of what is called the economy of a game. The game’s economy\
    \ basically describes the different costs and merits in the game and how they\
    \ interact. When you make your own game, it’s always useful to think about its\
    \ economy. What do things cost, and what are the gains of executing different\
    \ actions as a player? And are these two things in balance with each other?\n\n\
    You update the score in the `PaintCan` class, where you can check whether the\
    \ can falls outside the screen. If so, you check whether it has the right color,\
    \ and update the score and the number of player lives accordingly. Then you hide\
    \ the `PaintCan` object so that it can fall again, like so:\n\n```\nlet top =\
    \ CGPoint(x: self.position.x, y: self.position.y + red.size.height/2)\nif GameScene.world.isOutsideWorld(top)\
    \ {\n    if color != targetColor {\n        GameScene.world.lives -= 1\n    }\
    \ else {\n        GameScene.world.score += 10\n        collectPointsSound.play()\n\
    \    }\n    self.hidden = true\n}\n```\n\nIn this code, you can also see that\
    \ whenever a can of the right color falls off the screen, you play a sound effect\
    \ stored in the `collectPointsSound` property."
