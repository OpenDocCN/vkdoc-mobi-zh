- fmt: "# The DiscoWorld Game\n\nIn the previous sections, I talked about different\
    \ variable types and how to declare and assign them. I’ve given several examples\
    \ of how to declare and assign variables of types such as `Int` and `Double`.\
    \ Next to the numeric types, there are many other types in Swift. For example,\
    \ `NSTimeInterval` is also a type and it represents a time interval in seconds.\
    \ This is used in the update part of the game loop to determine how much time\
    \ has passed. You can then use that information to change game object positions\
    \ or take other actions.\n\nThe example in the previous chapter had an update\
    \ method that looked like this:\n\n```\noverride func update(currentTime: NSTimeInterval)\
    \ {\n\n    backgroundColor = UIColor.blueColor()\n\n}\n```\n\nAs you can see,\
    \ the `update` method has a parameter called `currentTime`, which contains the\
    \ current system time. Inside the method body, you can use `currentTime` like\
    \ a variable. The type of the `currentTime` variable is `NSTimeInterval`, which\
    \ is actually a type alias for `Double`. This means that you can perform calculations\
    \ with `currentTime`, and store the result of those calculations in another variable:\n\
    \n```\nvar time: Double = currentTime % 1\n```\n\nThe outcome of the expression\
    \ `currentTime % 1` is a number between 0 and 1 since it is the remainder after\
    \ dividing `currentTime` by 1. For example, if `currentTime` contains the value\
    \ 512.34, then `currentTime / 1 = 512`, and the remainder `currentTime % 1 = 0.34`.\n\
    \nLet’s now use the variable `time` to change the background color dynamically.\
    \ In the example of the previous chapter, you did this:\n\n```\nbackgroundColor\
    \ = UIColor.blueColor()\n```\n\nIn this instruction, you assign a value to something\
    \ called `backgroundColor`. That value has a type called `UIColor`. `UIColor`\
    \ is a new type provided by the UIKit framework, which is contained within the\
    \ SpriteKit framework. Creating a value of that type can be done in a few different\
    \ ways. The first way is shown above. `blueColor` is a method that belongs to\
    \ `UIColor`, and it creates a value: the color blue. You can also create colors\
    \ yourself by providing color values between 0 and 1:\n\n```\nbackgroundColor\
    \ = UIColor(red: 0, green: 0, blue: 1, alpha: 1)\n```\n\nIf you construct a `UIColor`\
    \ variable in this way, you need to provide four different values: red, green,\
    \ blue, and alpha. The red, green, and blue values determine the color, the alpha\
    \ value determines the transparency. The example above creates a blue color. Here\
    \ are a few examples of other colors:\n\n```\nvar greenColor: UIColor = UIColor(red:\
    \ 0, green: 1, blue: 0, alpha: 1)\nvar redColor: UIColor = UIColor(red: 1, green:\
    \ 0, blue: 0, alpha: 1)\nvar grayColor: UIColor = UIColor(red: 0.7, green: 0.7,\
    \ blue: 0.7, alpha: 1)\nvar whiteColor: UIColor = UIColor(red: 1, green: 1, blue:\
    \ 1, alpha: 1)\n```\n\nAs you can see in these examples, the color intensity values\
    \ range between 0 and 1, where 1 is the highest color intensity. By setting the\
    \ red value to 1 and the other two values to 0, you create the color red. You\
    \ get the color white by setting all intensity values to 1. Similarly, a black\
    \ color is achieved by setting all values to 0. Using these RGB values, it is\
    \ possible to create a wide range of colors.\n\nIn the DiscoWorld example, you\
    \ will use the passed game time to vary the color. You already stored a time value\
    \ varying between 0 and 1 in a variable, as follows:\n\n```\nvar time: Double\
    \ = currentTime % 1\n```\n\nYou can now use this variable to change the background\
    \ color as follows:\n\n```\nbackgroundColor = UIColor(red: CGFloat(time), green:\
    \ 0, blue: 0, alpha: 1)\n```\n\nWhen you create a `UIColor` value, it expects\
    \ parameters of a type called `CGFloat`. The `CGFloat` type is mainly targeted\
    \ to graphics applications (the letters “CG” in the type stand for Core Graphics).\
    \ All of the Apple classes and libraries related to graphics use this type, including\
    \ `UIColor`. If an App is compiled for a 64-bit platform, the `CGFloat` type is\
    \ an alias for `Double`. For a 32-bit platform, `CGFloat` is an alias for `Float`.\
    \ This is why you sometimes have to convert expressions to `CGFloat`. In this\
    \ case, `time` is a `Double` value, so you need to convert it to a `CGFloat` value\
    \ first. For the other parameters, conversion is not necessary since numeric constants\
    \ such as 0 or 1 are automatically translated into `Float` or `Double` values.\n\
    \nThe nice thing in this example is that you can see how the game loop works to\
    \ dynamically change the game world. When you run the DiscoWorld example, you’ll\
    \ see the color changing from black to red every second. As an exercise, can you\
    \ make the color change from red to black every second? Can you change into a\
    \ different color? And how about going from red to blue? Can you change the code\
    \ in such a way that the color transition takes two seconds instead of one? Try\
    \ out a few different things with this example.\n\nTo finalize this example, add\
    \ the following instruction to the `update` method:\n\n```\nmyLabel.position =\
    \ CGPoint(x: 100, y: CGFloat(time * 200))\n```\n\nThis instruction changes the\
    \ position of the text label depending on the value of the `time` variable. `CGPoint`\
    \ is another type that you are going to use quite a lot. It represents a two-dimensional\
    \ point in space. If you create a value of type `CGPoint`, you need to provide\
    \ parameters of type `CGFloat`, similar to `UIColor`. The difference is that in\
    \ order to create a `CGPoint` value you need x and y coordinates in pixel space.\
    \ If you run the program, you’ll see that the text label moves up 200 pixels every\
    \ second and then resets itself to the bottom of the screen. This is because the\
    \ `time` variable is always a value between 0 and 1, and you multiply this value\
    \ by 200. Figure 3-7 shows a screenshot of the DiscoWorld example. Try to play\
    \ around with a few different values. Can you make the label move down instead\
    \ of up? Or can you make it move to the right? How about moving it diagonally?\n\
    \n![A978-1-4842-0650-8_3_Fig7_HTML.jpg](A978-1-4842-0650-8_3_Fig7_HTML.jpg)\n\n\
    Figure 3-7. A screenshot of the DiscoWorld example\n\n## Scope of Variables\n\n\
    The place where you declare a variable has consequences for where you’re allowed\
    \ to use the variable. Look at the variable `time` in the DiscoWorld example.\
    \ This variable is declared (and assigned a value) in the `update` method. Because\
    \ it’s declared in the `update` method, you’re only allowed to use it in this\
    \ method. For example, you aren’t allowed to use this variable in the `didMoveToView`\
    \ method. Of course, you could declare another variable called `time` in the `didMoveToView`\
    \ method, but it’s important to realize that the `time` variable declared in `update`\
    \ would in that case not be the same `time` variable declared in the `didMoveToView`\
    \ method.\n\nAlternatively, if you declare a variable at the class level, you\
    \ can use it anywhere in the class. The `myLabel` variable has been declared at\
    \ the class level, and it’s accessed by two methods in the class, `didMoveToView`\
    \ and `update`. The `didMoveToView` method needs to access it because the label\
    \ needs to be added to the game world. The `update` method needs to access it\
    \ in order to change its position. Therefore, it’s logical that this variable\
    \ needs to be declared at the class level so that all methods belonging to the\
    \ class can use the variable.\n\nThe places where a variable can be used are together\
    \ called the variable’s scope. In this example, the scope of the variable `time`\
    \ is the `update` method, and the scope of the variable `myLabel` is the class\
    \ scope.\n\n## What You Have Learned\n\nIn this chapter, you have learned the\
    \ following:\n\n*   How to store basic information in memory using variables\n\
    *   How to create numeric values as well as values of more complicated types such\
    \ as `UIColor` or `CGPoint`\n*   How to use the `update` method to change the\
    \ game world by manipulating variables"
  raw: '## The DiscoWorld Game


    In the previous sections, I talked about different variable types and how to declare
    and assign them. I’ve given several examples of how to declare and assign variables
    of types such as `Int` and `Double`. Next to the numeric types, there are many
    other types in Swift. For example, `NSTimeInterval` is also a type and it represents
    a time interval in seconds. This is used in the update part of the game loop to
    determine how much time has passed. You can then use that information to change
    game object positions or take other actions.


    The example in the previous chapter had an update method that looked like this:


    `override func update(currentTime: NSTimeInterval) {`


    `backgroundColor = UIColor.blueColor()`


    `}`


    As you can see, the `update` method has a parameter called `currentTime`, which
    contains the current system time. Inside the method body, you can use `currentTime`
    like a variable. The type of the `currentTime` variable is `NSTimeInterval`, which
    is actually a type alias for `Double`. This means that you can perform calculations
    with `currentTime`, and store the result of those calculations in another variable:


    `var time: Double = currentTime % 1`


    The outcome of the expression `currentTime % 1` is a number between 0 and 1 since
    it is the remainder after dividing `currentTime` by 1\. For example, if `currentTime`
    contains the value 512.34, then `currentTime / 1 = 512`, and the remainder `currentTime
    % 1 = 0.34`.


    Let’s now use the variable `time` to change the background color dynamically.
    In the example of the previous chapter, you did this:


    `backgroundColor = UIColor.blueColor()`


    In this instruction, you assign a value to something called `backgroundColor`.
    That value has a type called `UIColor. UIColor` is a new type provided by the
    UIKit framework, which is contained within the SpriteKit framework. Creating a
    value of that type can be done in a few different ways. The first way is shown
    above. `blueColor` is a method that belongs to `UIColor`, and it creates a value:
    the color blue. You can also create colors yourself by providing color values
    between 0 and 1:


    `backgroundColor = UIColor(red: 0, green: 0, blue: 1, alpha: 1)`


    If you construct a `UIColor` variable in this way, you need to provide four different
    values: red, green, blue, and alph. The red, green, and blue values determine
    the color, the alpha value determines the transparency. The example above creates
    a blue color. Here are a few examples of other colors:


    `var greenColor: UIColor = UIColor(red: 0, green: 1, blue: 0, alpha: 1)`


    `var redColor: UIColor = UIColor(red: 1, green: 0, blue: 0, alpha: 1)`


    `var grayColor: UIColor = UIColor(red: 0.7, green: 0.7, blue: 0.7, alpha: 1)`


    `var whiteColor: UIColor = UIColor(red: 1, green: 1, blue: 1, alpha: 1)`


    As you can see in these examples, the color intensity values range between 0 and
    1, where 1 is the highest color intensity. By setting the red value to 1 and the
    other two values to 0, you create the color red. You get the color white by setting
    all intensity values to 1\. Similarly, a black color is achieved by setting all
    values to 0\. Using these RGB values, it is possible to create a wide range of
    colors.


    In the DiscoWorld example, you will use the passed game time to vary the color.
    You already stored a time value varying between 0 and 1 in a variable, as follows:


    `var time: Double = currentTime % 1`


    You can now use this variable to change the background color as follows:


    `backgroundColor = UIColor(red: CGFloat(time), green: 0, blue: 0, alpha: 1)`


    When you create a `UIColor` value, it expects parameters of a type called `CGFloat`.
    The `CGFloat` type is mainly targeted to graphics applications (the letters “CG”
    in the type stand for Core Graphics). All of the Apple classes and libraries related
    to graphics use this type, including `UIColor`. If an App is compiled for a 64-bit
    platform, the `CGFloat` type is an alias for `Double`. For a 32-bit platform,
    `CGFloat` is an alias for `Float`. This is why you sometimes have to convert expressions
    to `CGFloat`. In this case, time is a `Double` value, so you need to convert it
    to a `CGFloat` value first. For the other parameters, conversion is not necessary
    since numeric constants such as 0 or 1 are automatically translated into `Float`
    or `Double` values.


    The nice thing in this example is that you can see how the game loop works to
    dynamically change the game world. When you run the DiscoWorld example, you’ll
    see the color changing from black to red every second. As an exercise, can you
    make the color change from red to black every second? Can you change into a different
    color? And how about going from red to blue? Can you change the code in such a
    way that the color transition takes two seconds instead of one? Try out a few
    different things with this example.


    To finalize this example, add the following instruction to the `update` method:


    `myLabel.position = CGPoint(x: 100, y: CGFloat(time * 200))`


    This instruction changes the position of the text label depending on the value
    of the time variable. `CGPoint` is another type that you are going to use quite
    a lot. It represents a two-dimensional point in space. If you create a value of
    type `CGPoint`, you need to provide parameters of type `CGFloat`, similar to `UIColor`.
    The difference is that in order to create a `CGPoint` value you need x and y coordinates
    in pixel space. If you run the program, you’ll see that the text label moves up
    200 pixels every second and then resets itself to the bottom of the screen. This
    is because the `time` variable is always a value between 0 and 1, and you multiply
    this value by 200. Figure [3-7](#A978-1-4842-0650-8_3_Chapter.html#Fig7) shows
    a screenshot of the DiscoWorld example. Try to play around with a few different
    values. Can you make the label move down instead of up? Or can you make it move
    to the right? How about moving it diagonally?


    ![A978-1-4842-0650-8_3_Fig7_HTML.jpg](A978-1-4842-0650-8_3_Fig7_HTML.jpg)


    Figure 3-7.


    A screenshot of the DiscoWorld example


    ## Scope of Variables


    The place where you declare a variable has consequences for where you’re allowed
    to use the variable. Look at the variable `time` in the DiscoWorld example. This
    variable is declared (and assigned a value) in the `update` method. Because it’s
    declared in the `update` method, you’re only allowed to use it in this method.
    For example, you aren’t allowed to use this variable in the `didMoveToView` method.
    Of course, you could declare another variable called `time` in the `didMoveToView`
    method, but it’s important to realize that the `time` variable declared in `update`
    would in that case not be the same `time` variable declared in the `didMoveToView`
    method.


    Alternatively, if you declare a variable at the class level, you can use it anywhere
    in the class. The `myLabel` variable has been declared at the class level, and
    it’s accessed by two methods in the class, `didMoveToView` and `update`. The `didMoveToView`
    method needs to access it because the label needs to be added to the game world.
    The `update` method needs to access it in order to change its position. Therefore,
    it’s logical that this variable needs to be declared at the class level so that
    all methods belonging to the class can use the variable.


    The places where a variable can be used are together called the variable’s scope.
    In this example, the scope of the variable `time` is the `update` method, and
    the scope of the variable `myLabel` is the class scope.


    ## What You Have Learned


    In this chapter, you have learned the following:


    *   How to store basic information in memory using variables

    *   How to create numeric values as well as values of more complicated types such
    as `UIColor` or `CGPoint`

    *   How to use the `update` method to change the game world by manipulating variables'
