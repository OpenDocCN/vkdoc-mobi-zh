    a look at the Painter3 example belonging to this chapter. You will see that the
    instructions that belong together are now grouped in methods. For example, the
    method called `initCannon` contains all the instructions for initializing the
    cannon game object:


    `func initCannon() {`


        `cannonRed.zPosition = 1`


        `cannonGreen.zPosition = 1`


        `cannonBlue.zPosition = 1`


        `cannonBarrel.anchorPoint = CGPoint(x:0.233, y:0.5)`


        `cannon.position = CGPoint(x:-430, y:-280)`


        `cannon.zPosition = 1`


        `cannonGreen.hidden = true`


        `cannonBlue.hidden = true`


        `cannon.addChild(cannonRed)`


        `cannon.addChild(cannonGreen)`


        `cannon.addChild(cannonBlue)`


        `cannon.addChild(cannonBarrel)`


    `}`


    You can see that there is now an object referred to as `cannon`, which is a property
    stored in the `GameScene` class:


    `var cannon = SKNode()`


    All the parts of the cannon (the barrel, and the three color indicators) are now
    part of this object. The `cannon` object, in turn, is part of the `gameWorld`
    object. This is done by the following line of code in the `didMoveToView` method:


    `gameWorld.addChild(cannon)`


    You can also see this in Figure [6-1](#A978-1-4842-0650-8_6_Chapter.html#Fig1),
    which displays the complete hierarchy of game objects in this example. It’s useful
    to group objects that belong together because it makes it easier to manipulate
    those objects as a whole. For example, positioning the cannon (including its barrel
    and the three color indicators) can now be done with a single instruction in the
    `initCannon` method, like so:


    ![A978-1-4842-0650-8_6_Fig1_HTML.gif](A978-1-4842-0650-8_6_Fig1_HTML.gif)


    Figure 6-1.


    The game object hierarchy of the Painter3 example


    `cannon.position = CGPoint(x:-430, y:-280)`


    Because you initialize the cannon object in a separate method, the method that
    initializes the game scene (`didMoveToView`) has now also become much easier to
    read:


    `override func didMoveToView(view: SKView) {`


        `anchorPoint = CGPoint(x: 0.5, y: 0.5)`


        `background.zPosition = 0`


        `gameWorld.addChild(background)`


        `initCannon()`


        `gameWorld.addChild(cannon)`


        `initBall()`


        `gameWorld.addChild(ball)`


        `addChild(gameWorld)`


        `delta = NSTimeInterval(view.frameInterval) / 60`


    `}`


    In Painter3, game objects have their own initialization method, except for the
    background because that is a very basic object. And as you can see, the Painter3
    example contains not only a cannon, but also a ball (which will be dealt with
    later in this chapter).


    ## Moving Between Local and World Coordinates


    One side effect is that you need to take into account that game objects now have
    different local coordinate systems. Add the following line to the Painter3 program
    at the end of the `didMoveToView` method in the `GameScene.swift` file:


    `print(cannonRed.position)`


    You will see that it prints the position (0, 0) to the console once the app is
    run. However, the `cannonRed` node is drawn at position (-430, -280). Why? Because
    that is the position of the `cannon` object. Within the `cannon` object, the `cannonRed`
    node has a local position of (0, 0). So how do you get the world position of the
    `cannonRed` node? You can do this by converting the local position of `cannonRed`
    to the node representing the world. In this example, that node is `gameWorld`.
    Replace the `print` call above with the following two lines:


    `let worldCannonRedPos = gameWorld.convertPoint(cannonRed.position, fromNode:
    cannonRed)`


    `print(worldCannonRedPos)`


    The first line calls a method called `convertPoint`. This method converts a point
    from a local coordinate system to another coordinate system. The point that is
    converted is `cannonRed.position`. The coordinate system from which the point
    is converted is the one belonging to the `cannonRed` node. And finally, the coordinate
    system to which the point is converted is the one belonging to `gameWorld`. The
    result of this conversion is stored in a variable, and then printed to the screen
    in the second instruction. When you run this code, you will see that now the world
    coordinates of the `cannonRed` object are printed.


    There are two versions of the `convertPoint` method, one that converts from a
    coordinate system, and another that converts to a coordinate system. Sometimes
    converting to a coordinate system can be useful, such as when you want to handle
    touch input. Touch input is expressed in world coordinates. If you want to check
    if the player has tapped on the cannon color indicator, you need to convert the
    touch location to the local coordinate frame of the cannon color indicator object.
    Here is how you do that with the `convertPoint` method:


    `let localTouch: CGPoint = gameWorld.convertPoint(touchLocation, toNode: cannonRed)`


    You can then compare this local touch location with the cannon color indicator
    to find out whether the player has tapped on it or not:


    `if !cannonRed.frame.contains(localTouch) {`


        `// rotate the cannon toward the player touch location`


    `} else if hasTapped {`


        `// change the cannon color`


    `}`


    You can see the complete code for handling the cannon input by looking at the
    `handleInputCannon` method in the `GameScene.swift` file of the Painter3 example.'
  trans: "\n# 默认参数值\n\n在方法或函数体中，你也可以为某些参数指定默认值。这很有用，因为它为常用情况提供了一种便捷、更简短的方法调用方式。例如，考虑一个让玩家角色跳跃的\
    \ `jump` 方法。它的头部可能如下所示：\n\n`func jump(speed: Int = 200, animate: Bool = true)`\n\
    \n在这个头部中，你可以看到该方法有两个参数：角色跳跃的速度，以及角色在跳跃时是否应该有动画效果。每个参数都有一个默认值。在这种情况下，编写该方法的程序员预期，玩家最常以\
    \ 200 的速度跳跃，并且角色应该有动画效果。由于这些默认值的存在，你可以按如下方式调用此方法：\n\n`jump()`\n\n这与以下调用方式完全等效：\n\
    \n`jump(speed: 200, animate: true)`\n\n每当一个参数有默认值时，如果你为该参数传入不同的值来调用方法，你总是需要在其前面写上标签，如上方的调用所示。这是另一个例子：\n\
    \n`jump(animate: false)`\n\n这行代码以默认速度 200 调用 `jump` 方法，但关闭了动画效果。使用默认参数值能让你的方法调用更简单，但它们并非总是必需的。例如，你可以将本章前面定义的\
    \ `max` 方法的头部改写如下：\n\n`func max(val1: Int = 12, b val2: Int = 34) -> Int`\n\n\
    在这个头部中，你为两个参数都定义了默认值，但它们并无实际意义，因为 `max` 方法并没有一组经常被调用的值。如果某个参数的默认值确实有意义（如 `jump`\
    \ 方法的情况），强烈建议在头部中将其写出。这不仅能使调用方法时代码更简短，还能让方法的使用者了解程序员预期该方法将如何使用。如果方法有很多非常底层的参数，而使用者不知道该如何选择值，后一点尤其重要。在这种情况下，默认参数值为用户提供了一个良好的基础，使他们无需了解所有参数的详细含义就能使用方法。\n\
    \n# 将指令重组为方法\n\n上一章的 Painter2 示例仍然相对简短，因为它只显示了一个背景和一个旋转的大炮。商业游戏显然比这复杂得多。它们包含许多不同的对象，这些对象可能具有复杂的行为和交互。这正是方法的用武之地。请查看本章的\
    \ Painter3 示例。你会发现，属于同一组的指令现在被组织到了方法中。例如，名为 `initCannon` 的方法包含了所有用于初始化大炮游戏对象的指令：\n\
    \n```\nfunc initCannon() {\n    cannonRed.zPosition = 1\n    cannonGreen.zPosition\
    \ = 1\n    cannonBlue.zPosition = 1\n    cannonBarrel.anchorPoint = CGPoint(x:0.233,\
    \ y:0.5)\n    cannon.position = CGPoint(x:-430, y:-280)\n    cannon.zPosition\
    \ = 1\n    cannonGreen.hidden = true\n    cannonBlue.hidden = true\n    cannon.addChild(cannonRed)\n\
    \    cannon.addChild(cannonGreen)\n    cannon.addChild(cannonBlue)\n    cannon.addChild(cannonBarrel)\n\
    }\n```\n\n你可以看到，现在有一个被引用为 `cannon` 的对象，它是存储在 `GameScene` 类中的一个属性：\n\n`var cannon\
    \ = SKNode()`\n\n大炮的所有部件（炮管和三个颜色指示器）现在都是这个对象的一部分。而 `cannon` 对象本身又是 `gameWorld`\
    \ 对象的一部分。这是通过 `didMoveToView` 方法中的以下代码行实现的：\n\n`gameWorld.addChild(cannon)`\n\n\
    你也可以在图 6-1 中看到这一点，该图展示了本例中游戏对象的完整层级结构。将属于同一组的对象组合在一起很有用，因为它使操作这些对象整体变得更加容易。例如，现在在\
    \ `initCannon` 方法中，只需一条指令即可完成大炮（包括其炮管和三个颜色指示器）的定位，如下所示：\n\n![A978-1-4842-0650-8_6_Fig1_HTML.gif](img/A978-1-4842-0650-8_6_Fig1_HTML.gif)\n\
    \n图 6-1. Painter3 示例的游戏对象层级结构\n\n`cannon.position = CGPoint(x:-430, y:-280)`\n\
    \n因为你在一个独立的方法中初始化大炮对象，所以初始化游戏场景的方法（`didMoveToView`）现在也变得更容易阅读：\n\n```\noverride\
    \ func didMoveToView(view: SKView) {\n    anchorPoint = CGPoint(x: 0.5, y: 0.5)\n\
    \    background.zPosition = 0\n    gameWorld.addChild(background)\n    initCannon()\n\
    \    gameWorld.addChild(cannon)\n    initBall()\n    gameWorld.addChild(ball)\n\
    \    addChild(gameWorld)\n    delta = NSTimeInterval(view.frameInterval) / 60\n\
    }\n```\n\n在 Painter3 中，游戏对象都有自己的初始化方法，背景除外，因为它是一个非常基础的对象。并且如你所见，Painter3 示例不仅包含一个大炮，还包含一个球（这将在本章后续部分讨论）。\n\
    \n# 在局部坐标与世界坐标之间移动\n\n一个附带影响是，你需要考虑到游戏对象现在拥有不同的局部坐标系。将以下代码行添加到 Painter3 程序的 `GameScene.swift`\
    \ 文件中 `didMoveToView` 方法的末尾：\n\n`print(cannonRed.position)`\n\n你会发现，当应用运行时，它会在控制台打印出位置\
    \ (0, 0)。然而，`cannonRed` 节点绘制在位置 (-430, -280)。为什么呢？因为那是 `cannon` 对象的位置。在 `cannon`\
    \ 对象内部，`cannonRed` 节点的局部位置是 (0, 0)。那么，如何获取 `cannonRed` 节点的世界位置呢？你可以通过将 `cannonRed`\
    \ 的局部位置转换到代表世界的节点来实现。在这个例子中，那个节点是 `gameWorld`。将上面的 `print` 调用替换为以下两行代码：\n\n```\n\
    let worldCannonRedPos = gameWorld.convertPoint(cannonRed.position, fromNode: cannonRed)\n\
    print(worldCannonRedPos)\n```\n\n第一行代码调用了一个名为 `convertPoint` 的方法。这个方法将点从一个局部坐标系转换到另一个坐标系。被转换的点是\
    \ `cannonRed.position`。被转换点所处的坐标系是属于 `cannonRed` 节点的。最后，目标坐标系是属于 `gameWorld` 的。转换的结果存储在一个变量中，然后在第二条指令中打印到屏幕上。当你运行这段代码时，你会看到现在\
    \ `cannonRed` 对象的世界坐标被打印出来了。\n\n`convertPoint` 方法有两个版本，一个从坐标系转换，另一个转换到坐标系。有时转换到坐标系会很有用，例如当你需要处理触摸输入时。触摸输入以世界坐标表示。如果你想检查玩家是否点击了大炮的颜色指示器，你需要将触摸位置转换到大炮颜色指示器对象的局部坐标框架中。以下是使用\
    \ `convertPoint` 方法实现的方法：\n\n`let localTouch: CGPoint = gameWorld.convertPoint(touchLocation,\
    \ toNode: cannonRed)`\n\n然后你可以将此局部触摸位置与大炮颜色指示器进行比较，以判断玩家是否点击了它：\n\n```\nif !cannonRed.frame.contains(localTouch)\
    \ {\n    // 将大炮转向玩家触摸位置\n} else if hasTapped {\n    // 更改大炮颜色\n}\n```\n\n你可以通过查看\
    \ Painter3 示例 `GameScene.swift` 文件中的 `handleInputCannon` 方法来了解处理大炮输入的完整代码。\n"
- fmt: "# Adding a Ball to the Game World\n\nIn the Painter game, the cannon is aimed\
    \ by following the moving finger position of the player. When the player removes\
    \ her finger from the screen, the cannon should shoot a ball matching the current\
    \ color of the cannon. For that reason, you will need three different sprites\
    \ for the ball: red, green, and blue. In the Painter3 example, these sprites are\
    \ stored as properties of the `GameScene` class, as follows:\n\n`var ballRed =\
    \ SKSpriteNode(imageNamed: \"spr_ball_red\")`\n\n`var ballGreen = SKSpriteNode(imageNamed:\
    \ \"spr_ball_green\")`\n\n`var ballBlue = SKSpriteNode(imageNamed: \"spr_ball_blue\"\
    )`\n\nThese three sprite nodes are stored as a part of a node called `ball`. In\
    \ the `initBall` method, you can see the instructions that initialize the ball:\n\
    \n`func initBall() {`  \n    `ball.zPosition = 1`  \n    `ball.addChild(ballRed)`\
    \  \n    `ball.addChild(ballGreen)`  \n    `ball.addChild(ballBlue)`  \n    `ball.hidden\
    \ = true`  \n`}`\n\nInitially the ball is hidden. As soon as the player shoots\
    \ the ball, it will become visible. Because the ball moves, you also need to store\
    \ its velocity. This velocity is a vector that defines how the position of the\
    \ ball changes over time. For example, if the ball has a velocity of (0,1), then\
    \ every second the y-position of the ball increases by 1 point (meaning the ball\
    \ flies upward). In Painter3, the velocity is represented by the `ballVelocity`\
    \ property.\n\nWhen the player wants to shoot the ball, she needs to take two\
    \ steps. First, the player aims the cannon by moving her finger over the screen.\
    \ Then, after removing her finger from the screen, the ball is shot. In order\
    \ to keep track of when the ball is ready to be shot, you add a Boolean property\
    \ `readyToShoot`:\n\n`var readyToShoot = false`\n\nIn the games you develop in\
    \ this book, most of the objects have a position and a velocity. Because the book\
    \ is only concerned with 2D games, both the position and the velocity are always\
    \ variables that consist of an `x` and a `y` variable. When you update these game\
    \ objects, you need to calculate the new position based on the velocity vector\
    \ and the time that has passed. Later in this chapter, you will see how to do\
    \ this.\n\nAlthough you will not use it for this particular game, the SpriteKit\
    \ framework has a built-in physics engine. This makes it really easy and fun to\
    \ put physics in your game. In the second game developed in this book, you’ll\
    \ learn how to use this physics engine to create a game that relies on physical\
    \ interaction, in the same vein as games like Cut the Rope or Crayon Physics.\n\
    \n## Shooting the Ball\n\nWhen the player removes his finger from the screen,\
    \ the ball is shot. The speed of the ball and the direction in which it’s moving\
    \ are determined by the position where the player placed his finger last. The\
    \ ball should move in the direction of that position; and the further away from\
    \ the cannon the player touched the screen, the higher the speed of the ball.\
    \ This is an intuitive way for the user to control the speed of the ball. Whenever\
    \ you design a game, think carefully about how instructions from the user are\
    \ received, and the most natural or efficient way to process them.\n\nIn order\
    \ to handle input, you add a `handleInputBall` method to the `GameScene` class.\
    \ Inside this method, the first step is to check whether the player is currently\
    \ touching the screen. If that is the case, and the player isn’t touching the\
    \ cannon color indicator, you know that the player is aiming the cannon. The player\
    \ can only start shooting the ball if it is not already shooting; in order words,\
    \ the ball should also be hidden. If all these things are true, set the `readyToShoot`\
    \ property to `true`:\n\n`let localTouch: CGPoint = gameWorld.convertPoint(touchLocation,\
    \ toNode: cannonRed)`  \n`if nrTouches > 0 && !cannonRed.frame.contains(localTouch)\
    \ && ball.hidden {`  \n    `readyToShoot = true`  \n`}`\n\nA second `if` instruction\
    \ checks if the player has removed her finger from the screen. This is the case\
    \ if `nrTouches` equals zero, and the `readyToShoot` property is `true`:\n\n`if\
    \ (nrTouches <= 0 && readyToShoot && ball.hidden) {`  \n    `// shoot the ball!`\
    \  \n`}`\n\nInside the `if` instruction, you need to do a couple of things. You\
    \ know the player has touched somewhere and that the ball has to be shot from\
    \ the cannon. The first thing you do is change the `hidden` status of the ball,\
    \ since when you shoot the ball, it should be visible:\n\n`ball.hidden = false`\n\
    \nNext, you reset the `readyToShoot` property to `false` as well, since the ball\
    \ is currently being shot:\n\n`readyToShoot = false`\n\nBecause the ball is now\
    \ moving, you need to give it a velocity. This velocity is a vector in the direction\
    \ of the place where the player last touched the screen. You can calculate this\
    \ direction by subtracting the ball position from the touch location. Because\
    \ the velocity has an x component and a y component, you need to do this for both\
    \ dimensions:\n\n`ballVelocity.x = touchLocation.x - cannon.position.x`  \n`ballVelocity.y\
    \ = touchLocation.y - cannon.position.y`\n\nCalculating the velocity in this way\
    \ also gives the desired effect that when the player touches further from the\
    \ cannon, the velocity is greater, because then the difference between the touch\
    \ location and the ball position is also greater. However, if you were to play\
    \ the game now, the ball would move a bit slowly. Therefore, you multiply this\
    \ velocity with a constant value that gives the ball a velocity that is usable\
    \ in the context of this game:\n\n`let velocityMultiplier = CGFloat(1.4)`  \n\
    `ballVelocity.x = (touchLocation.x - cannon.position.x) * velocityMultiplier`\
    \  \n`ballVelocity.y = (touchLocation.y - cannon.position.y) * velocityMultiplier`\n\
    \nI chose the constant value of 1.4 after testing the gameplay with different\
    \ values. Each game will have a number of these gameplay parameters that you’ll\
    \ need to tweak while play-testing the game to determine their optimal value.\
    \ Finding the right values for these parameters is crucial for a balanced game\
    \ that plays well, and you need to make sure the values you choose don’t make\
    \ the game overly easy or difficult. For example, if you chose a constant value\
    \ of 0.3 instead of 1.4, the ball would move a lot slower. This would make the\
    \ game much more difficult, and it might even make the game unplayable because\
    \ the ball might never be able to reach the far end of the screen."
  raw: '## Adding a Ball to the Game World


    In the Painter game, the cannon is aimed by following the moving finger position
    of the player. When the player removes her finger from the screen, the cannon
    should shoot a ball matching the current color of the cannon. For that reason,
    you will need three different sprites for the ball: red, green, and blue. In the
    Painter3 example, these sprites are stored as properties of the `GameScene` class,
    as follows:


    `var ballRed = SKSpriteNode(imageNamed: "spr_ball_red")`


    `var ballGreen = SKSpriteNode(imageNamed: "spr_ball_green")`


    `var ballBlue = SKSpriteNode(imageNamed: "spr_ball_blue")`


    These three sprite nodes are stored as a part of a node called `ball`. In the
    `initBall` method, you can see the instructions that initialize the ball:


    `func initBall() {`


        `ball.zPosition = 1`


        `ball.addChild(ballRed)`


        `ball.addChild(ballGreen)`


        `ball.addChild(ballBlue)`


        `ball.hidden = true`


    `}`


    Initially the ball is hidden. As soon as the player shoots the ball, it will become
    visible. Because the ball moves, you also need to store its velocity. This velocity
    is a vector that defines how the position of the ball changes over time. For example,
    if the ball has a velocity of (0,1), then every second the y-position of the ball
    increases by 1 point (meaning the ball flies upward). In Painter3, the velocity
    is represented by the `ballVelocity` property.


    When the player wants to shoot the ball, she needs to take two steps. First, the
    player aims the cannon by moving her finger over the screen. Then, after removing
    her finger from the screen, the ball is shot. In order to keep track of when the
    ball is ready to be shot, you add a Boolean property `readyToShoot`:


    `var readyToShoot = false`


    In the games you develop in this book, most of the objects have a position and
    a velocity. Because the book is only concerned with 2D games, both the position
    and the velocity are always variables that consist of an `x` and a `y` variable.
    When you update these game objects, you need to calculate the new position based
    on the velocity vector and the time that has passed. Later in this chapter, you
    will see how to do this.


    Although you will not use it for this particular game, the SpriteKit framework
    has a built-in physics engine. This makes it really easy and fun to put physics
    in your game. In the second game developed in this book, you’ll learn how to use
    this physics engine to create a game that relies on physical interaction, in the
    same vein as games like Cut the Rope or Crayon Physics.


    ### Shooting the Ball


    When the player removes his finger from the screen, the ball is shot. The speed
    of the ball and the direction in which it’s moving are determined by the position
    where the player placed his finger last. The ball should move in the direction
    of that position; and the further away from the cannon the player touched the
    screen, the higher the speed of the ball. This is an intuitive way for the user
    to control the speed of the ball. Whenever you design a game, think carefully
    about how instructions from the user are received, and the most natural or efficient
    way to process them.


    In order to handle input, you add a `handleInputBall` method to the `GameScene`
    class. Inside this method, the first step is to check whether the player is currently
    touching the screen. If that is the case, and the player isn’t touching the cannon
    color indicator, you know that the player is aiming the cannon. The player can
    only start shooting the ball if it is not already shooting; in order words, the
    ball should also be hidden. If all these things are true, set the `readyToShoot`
    property to `true`:


    `let localTouch: CGPoint = gameWorld.convertPoint(touchLocation, toNode: cannonRed)`


    `if nrTouches > 0 && !cannonRed.frame.contains(localTouch) && ball.hidden {`


        `readyToShoot = true`


    `}`


    A second `if` instruction checks if the player has removed her finger from the
    screen. This is the case if `nrTouches` equals zero, and the `readyToShoot` property
    is `true`:


    `if (nrTouches <= 0 && readyToShoot && ball.hidden) {`


        `// shoot the ball!`


    `}`


    Inside the `if` instruction, you need to do a couple of things. You know the player
    has touched somewhere and that the ball has to be shot from the cannon. The first
    thing you do is change the `hidden` status of the ball, since when you shoot the
    ball, it should be visible:


    `ball.hidden =` `false`


    Next, you reset the `readyToShoot` property to `false` as well, since the ball
    is currently being shot:


    `readyToShoot = false`


    Because the ball is now moving, you need to give it a velocity. This velocity
    is a vector in the direction of the place where the player last touched the screen.
    You can calculate this direction by subtracting the ball position from the touch
    location. Because the velocity has an x component and a y component, you need
    to do this for both dimensions:


    `ballVelocity.x = touchLocation.x - cannon.position.x`


    `ballVelocity.y = touchLocation.y - cannon.position.y`


    Calculating the velocity in this way also gives the desired effect that when the
    player touches further from the cannon, the velocity is greater, because then
    the difference between the touch location and the ball position is also greater.
    However, if you were to play the game now, the ball would move a bit slowly. Therefore,
    you multiply this velocity with a constant value that gives the ball a velocity
    that is usable in the context of this game:


    `let velocityMultiplier = CGFloat(1.4)`


    `ballVelocity.x = (touchLocation.x - cannon.position.x) * velocityMultiplier`


    `ballVelocity.y = (touchLocation.y - cannon.position.y) * velocityMultiplier`


    I chose the constant value of 1.4 after testing the gameplay with different values.
    Each game will have a number of these gameplay parameters that you’ll need to
    tweak while play-testing the game to determine their optimal value. Finding the
    right values for these parameters is crucial for a balanced game that plays well,
    and you need to make sure the values you choose don’t make the game overly easy
    or difficult. For example, if you chose a constant value of 0.3 instead of 1.4,
    the ball would move a lot slower. This would make the game much more difficult,
    and it might even make the game unplayable because the ball might never be able
    to reach the far end of the screen.'
  trans: "\n# 向游戏世界添加一个球\n\n在 Painter 游戏中，玩家通过手指在屏幕上的滑动来瞄准大炮。当玩家将手指从屏幕上抬起时，大炮应发射一个与大炮当前颜色相匹配的球。因此，你需要为球准备三种不同的精灵：红色、绿色和蓝色。在\
    \ Painter3 示例中，这些精灵作为 `GameScene` 类的属性存储，如下所示：\n\n`var ballRed = SKSpriteNode(imageNamed:\
    \ \"spr_ball_red\")`\n\n`var ballGreen = SKSpriteNode(imageNamed: \"spr_ball_green\"\
    )`\n\n`var ballBlue = SKSpriteNode(imageNamed: \"spr_ball_blue\")`\n\n这三个精灵节点被存储为一个名为\
    \ `ball` 的节点的子节点。在 `initBall` 方法中，你可以看到初始化球的指令：\n\n`func initBall() {`  \n    `ball.zPosition\
    \ = 1`  \n    `ball.addChild(ballRed)`  \n    `ball.addChild(ballGreen)`  \n    `ball.addChild(ballBlue)`\
    \  \n    `ball.hidden = true`  \n`}`\n\n初始状态下，球是隐藏的。一旦玩家发射球，它就会变得可见。由于球会移动，你还需要存储它的速度。这个速度是一个向量，定义了球的位置随时间变化的方式。例如，如果球的速度为\
    \ (0,1)，那么每秒钟球的 y 坐标会增加 1 点（这意味着球向上飞行）。在 Painter3 中，速度由 `ballVelocity` 属性表示。\n\
    \n当玩家想要发射球时，需要执行两个步骤。首先，玩家通过在屏幕上滑动手指来瞄准大炮。然后，在将手指从屏幕上抬起后，球就会被发射。为了跟踪球何时准备好发射，你添加了一个布尔属性\
    \ `readyToShoot`：\n\n`var readyToShoot = false`\n\n在本书中你开发的游戏中，大多数对象都有位置和速度。由于本书只涉及\
    \ 2D 游戏，因此位置和速度都是由 `x` 和 `y` 变量组成的变量。当你更新这些游戏对象时，你需要根据速度向量和经过的时间来计算新的位置。在本章后面，你将看到如何做到这一点。\n\
    \n虽然你不会在这个特定游戏中使用它，但 SpriteKit 框架内置了一个物理引擎。这使得为你的游戏添加物理效果变得非常容易且有趣。在本书开发的第二个游戏中，你将学习如何使用这个物理引擎来创建一个依赖物理交互的游戏，类似于《割绳子》或《蜡笔物理学》这类游戏。\n\
    \n## 发射球\n\n当玩家将手指从屏幕上抬起时，球就会被发射。球的速度和移动方向由玩家最后触摸屏幕的位置决定。球应该朝该位置的方向移动；并且玩家触摸屏幕的位置离大炮越远，球的速度就越高。这对用户来说是一种直观的控制球速的方式。在设计任何游戏时，请仔细思考如何接收用户的指令，以及处理这些指令最自然或最高效的方式。\n\
    \n为了处理输入，你在 `GameScene` 类中添加了一个 `handleInputBall` 方法。在这个方法内部，第一步是检查玩家当前是否正在触摸屏幕。如果是这种情况，并且玩家没有触摸到大炮颜色指示器，那么你就知道玩家正在瞄准大炮。只有当球尚未发射时，玩家才能开始发射它；换句话说，球也应该是隐藏的。如果所有这些条件都成立，则将\
    \ `readyToShoot` 属性设置为 `true`：\n\n`let localTouch: CGPoint = gameWorld.convertPoint(touchLocation,\
    \ toNode: cannonRed)`  \n`if nrTouches > 0 && !cannonRed.frame.contains(localTouch)\
    \ && ball.hidden {`  \n    `readyToShoot = true`  \n`}`\n\n第二个 `if` 指令检查玩家是否已将手指从屏幕上抬起。如果\
    \ `nrTouches` 等于零，并且 `readyToShoot` 属性为 `true`，则属于这种情况：\n\n`if (nrTouches <= 0\
    \ && readyToShoot && ball.hidden) {`  \n    `// 发射球！`  \n`}`\n\n在 `if` 指令内部，你需要做几件事情。你已经知道玩家触摸过某个位置，并且球必须从大炮中发射。你要做的第一件事是改变球的\
    \ `hidden` 状态，因为当你发射球时，它应该是可见的：\n\n`ball.hidden = false`\n\n接下来，你也将 `readyToShoot`\
    \ 属性重置为 `false`，因为球正在被发射：\n\n`readyToShoot = false`\n\n由于球现在正在移动，你需要给它一个速度。这个速度是一个指向玩家最后触摸屏幕位置的向量。你可以通过从触摸位置减去球的位置来计算这个方向。因为速度有\
    \ x 分量和 y 分量，你需要对两个维度都进行计算：\n\n`ballVelocity.x = touchLocation.x - cannon.position.x`\
    \  \n`ballVelocity.y = touchLocation.y - cannon.position.y`\n\n以这种方式计算速度也带来了期望的效果：当玩家触摸的位置离大炮越远，速度就越大，因为触摸位置与球位置之间的差值也更大。然而，如果你现在运行游戏，球的移动速度会有点慢。因此，你需要将这个速度乘以一个常量，使球获得一个在游戏上下文中可用的速度：\n\
    \n`let velocityMultiplier = CGFloat(1.4)`  \n`ballVelocity.x = (touchLocation.x\
    \ - cannon.position.x) * velocityMultiplier`  \n`ballVelocity.y = (touchLocation.y\
    \ - cannon.position.y) * velocityMultiplier`\n\n在通过不同数值进行游戏测试后，我选择了常量值 1.4。每个游戏中都会有一些这样的游戏参数，你需要在游戏试玩过程中进行调整，以确定它们的最佳值。为这些参数找到合适的数值对于实现平衡且流畅的游戏体验至关重要，并且你需要确保所选的数值不会使游戏变得过于简单或困难。例如，如果你选择常量值\
    \ 0.3 而不是 1.4，球的移动速度会慢得多。这会使游戏变得困难得多，甚至可能使游戏无法进行，因为球可能永远无法到达屏幕的另一端。\n"
- fmt: "### Updating the Ball Position\n\nIn this section, you are going to start\
    \ defining the behavior of the ball. There are basically two possibilities: either\
    \ the ball is waiting to be shot, or the ball is currently flying through the\
    \ air. In order to translate this behavior into instructions that update the ball’s\
    \ velocity and subsequently its position, let’s write a method called `updateBall`\
    \ in which you group these instructions. This is the complete method:\n\n```\n\
    func updateBall() {\n    if !ball.hidden {\n        ballVelocity.x *= 0.99\n \
    \       ballVelocity.y -= 15\n        ball.position.x += ballVelocity.x * CGFloat(delta)\n\
    \        ball.position.y += ballVelocity.y * CGFloat(delta)\n    }\n    else {\n\
    \        // calculate the ball position\n        let opposite = sin(cannonBarrel.zRotation)\
    \ * cannonBarrel.size.width * 0.6\n        let adjacent = cos(cannonBarrel.zRotation)\
    \ * cannonBarrel.size.width * 0.6\n        ball.position = CGPoint(x: cannon.position.x\
    \ + adjacent,\n            y: cannon.position.y + opposite)\n        // set the\
    \ ball color\n        ballRed.hidden = cannonRed.hidden\n        ballGreen.hidden\
    \ = cannonGreen.hidden\n        ballBlue.hidden = cannonBlue.hidden\n    }\n \
    \   if isOutsideWorld(ball.position) {\n        ball.hidden = true\n        readyToShoot\
    \ = false\n    }\n}\n```\n\nAs you can see, this method uses an `if` instruction\
    \ to distinguish between the two possible states that the ball is in. If the ball\
    \ is not hidden, then it must be flying through the air. In that case, the body\
    \ of the `if` instruction is executed. This body consists of four instructions.\
    \ The first two instructions update the velocity, and the last two update the\
    \ position. The first instruction updates the x direction of the velocity. You\
    \ multiply the velocity with a value of 0.99, the effect of which is that the\
    \ velocity slowly decreases. This is done to simulate air friction. The second\
    \ instruction increases the y velocity in each update. This is done to simulate\
    \ the effect that gravity has on the ball. Together, the velocity changes in the\
    \ x and y directions result in plausible ball behavior. Of course, in the real\
    \ world, the gravity is not 15. But then again, your real world doesn’t consist\
    \ of pixels, either. Physics in game worlds doesn’t always accurately represent\
    \ physics in the real world. When you want to incorporate some form of physics\
    \ in your game (be it very simple or extremely complex), the most important part\
    \ isn’t that the physics is realistic, but that the game is playable. This is\
    \ why in a strategy game, an airplane will move as fast as a soldier walking on\
    \ the ground. If the game used realistic speeds for those two objects, it would\
    \ result in an unplayable game.\n\nThe current position of the ball is updated\
    \ by adding the velocity to its x and y components. Here are the instructions\
    \ that do this:\n\n```\nball.position.x += ballVelocity.x * CGFloat(delta)\nball.position.y\
    \ += ballVelocity.y * CGFloat(delta)\n```\n\nAs you can see, the velocity is multiplied\
    \ by a factor `delta`. Why is this?\n\n### Fixed Timestep vs. Variable Timestep\n\
    \nThe `delta` factor is a property that’s defined in `GameScene`, as follows:\n\
    \n```\nvar delta: NSTimeInterval = 1/60\n```\n\nIt represents a time interval\
    \ of 1/60 seconds. This corresponds to the default frame rate set in SpriteKit,\
    \ which is 60 frames per seconds. So, in fact, `delta` represents the amount of\
    \ time that passes between game loop cycles.\n\nBy multiplying the velocity by\
    \ this factor `delta`, you are in fact taking into account the frame rate of the\
    \ game engine in your calculations. The frame rate is closely linked to the frequency\
    \ at which iOS devices refresh their screen. This frequency is fixed to 60Hz (in\
    \ other words, just like the frame rate, which is 60 times per second). It’s possible\
    \ in SpriteKit to change the frame rate to some other value by changing the `frameInterval`\
    \ property in the `SKView` class. For example, in the `didMoveToView` method,\
    \ you could set the frame interval to 2, which means the frame rate will drop\
    \ to 30 frames per second, as follows:\n\n```\nview.frameInterval = 2\n```\n\n\
    Obviously, you will then also need to update the `delta` factor so that it matches\
    \ the new frame rate:\n\n```\ndelta = NSTimeInterval(view.frameInterval) / 60\n\
    ```\n\nBut what happens when you run your game on a very slow device, and the\
    \ engine is not able to perform the game loop 60 times per second, but actually\
    \ runs at 50 frames per second? Well, since `delta` is in no way related to the\
    \ real time that has passed, it means that your entire game will slow down, since\
    \ the game logic still thinks that the fixed amount of time set in the `delta`\
    \ variable (1/60 seconds) has passed since the last time `update` was called.\
    \ Because the `delta` value is fixed, this kind of game loop is also called a\
    \ fixed timestep approach.\n\nHaving your game slow down a bit sometimes is not\
    \ a bad thing per se. You have to watch out, though, that the game doesn’t structurally\
    \ run too slow. It may have negative side effects. For one, the player could lose\
    \ interest in the game because the objects are not moving realistically anymore,\
    \ and playing the game takes too long. Another side effect could be that the game\
    \ becomes too easy to play and this would put players with older devices at an\
    \ unfair advantage.\n\nOne way to deal with this is to keep track of how much\
    \ time actually has passed since the last update. That’s why the `update` method\
    \ in `GameScene` has a parameter called `currentTime`. This parameter gives you\
    \ the current system time. You can perform a few calculations to find out how\
    \ much time has passed since the last update cycle. First, add a property in which\
    \ you store the time at the last update:\n\n```\nvar lastUpdateTimeInterval: NSTimeInterval\
    \ = 0\n```\n\nIn the `update` method, you can then calculate how much time has\
    \ passed, as follows:\n\n```\nlet timePassed: NSTimeInterval = currentTime - lastUpdateTimeInterval\n\
    lastUpdateTimeInterval = currentTime\n```\n\nWhat you can now do is calculate\
    \ the difference between the `delta` value and the actual time passed. If that\
    \ value is too big, you can decide to increase the frame interval and calculate\
    \ a new `delta` value so that the game play better matches the device. If you\
    \ want, you can write a much more advanced version that calculates an average\
    \ difference with `delta` over the last few frames and then, based on that difference,\
    \ decides if the frame rate needs to be slowed down or sped up.\n\nA completely\
    \ different approach to using a fixed `delta` value is to simply calculate the\
    \ `delta` value every time the `update` method is called, and then use that `delta`\
    \ value in the game. This is referred to as the variable timestep approach.\n\n\
    ```\ndelta = currentTime - lastUpdateTimeInterval\nlastUpdateTimeInterval = currentTime\n\
    ```"
  raw: '### Updating the Ball Position


    In this section, you are going to start defining the behavior of the ball. There
    are basically two possibilities: either the ball is waiting to be shot, or the
    ball is currently flying through the air. In order to translate this behavior
    into instructions that update the ball’s velocity and subsequently its position,
    let’s write a method called `updateBall` in which you group these instructions.
    This is the complete method:


    `func updateBall() {`


        `if !ball.hidden {`


            `ballVelocity.x *= 0.99`


            `ballVelocity.y -= 15`


            `ball.position.x += ballVelocity.x * CGFloat(delta)`


            `ball.position.y += ballVelocity.y * CGFloat(delta)`


        `}`


        `else {`


            `// calculate the ball position`


            `let opposite = sin(cannonBarrel.zRotation) * cannonBarrel.size.width
    * 0.6`


            `let adjacent = cos(cannonBarrel.zRotation) * cannonBarrel.size.width
    * 0.6`


            `ball.position = CGPoint(x: cannon.position.x + adjacent,`


                `y: cannon.position.y + opposite)`


            `// set the ball color`


            `ballRed.hidden = cannonRed.hidden`


            `ballGreen.hidden = cannonGreen.hidden`


            `ballBlue.hidden = cannonBlue.hidden`


        `}`


        `if isOutsideWorld(ball.position) {`


            `ball.hidden = true`


            `readyToShoot = false`


        `}`


    `}`


    As you can see, this method uses an `if` instruction to distinguish between the
    two possible states that the ball is in. If the ball is not hidden, then it must
    be flying through the air. In that case, the body of the `if` instruction is executed.
    This body consists of four instructions. The first two instructions update the
    velocity, and the last two update the position. The first instruction updates
    the x direction of the velocity. You multiply the velocity with a value of 0.99,
    the effect of which is that the velocity slowly decreases. This is done to simulate
    air friction. The second instruction increases the y velocity in each update.
    This is done to simulate the effect that gravity has on the ball. Together, the
    velocity changes in the x and y directions result in plausible ball behavior.
    Of course, in the real world, the gravity is not 15\. But then again, your real
    world doesn’t consist of pixels, either. Physics in game worlds doesn’t always
    accurately represent physics in the real world. When you want to incorporate some
    form of physics in your game (be it very simple or extremely complex), the most
    important part isn’t that the physics is realistic, but that the game is playable.
    This is why in a strategy game, an airplane will move as fast as a soldier walking
    on the ground. If the game used realistic speeds for those two objects, it would
    result in an unplayable game.


    The current position of the ball is updated by adding the velocity to its x and
    y components. Here are the instructions that do this:


    `ball.position.x += ballVelocity.x * CGFloat(delta)`


    `ball.position.y += ballVelocity.y * CGFloat(delta)`


    As you can see, the velocity is multiplied by a factor `delta`. Why is this?


    ## Fixed Timestep vs. Variable Timestep


    The `delta` factor is a property that’s defined in GameScene, as follows:


    `var delta: NSTimeInterval = 1/60`


    It represents a time interval of 1/60 seconds. This corresponds to the default
    frame rate set in SpriteKit, which is 60 frames per seconds. So, in fact, `delta`
    represents the amount of time that passes between game loop cycles.


    By multiplying the velocity by this factor `delta`, you are in fact taking into
    account the frame rate of the game engine in your calculations. The frame rate
    is closely linked to the frequency at which iOS devices refresh their screen.
    This frequency is fixed to 60Hz (in other words, just like the frame rate, which
    is 60 times per second). It’s possible in SpriteKit to change the frame rate to
    some other value by changing the `frameInterval` property in the `SKView` class.
    For example, in the `didMoveToView` method, you could set the frame interval to
    2, which means the frame rate will drop to 30 frames per second, as follows:


    `view.frameInterval = 2`


    Obviously, you will then also need to update the `delta` factor so that it matches
    the new frame rate:


    `delta = NSTimeInterval(view.frameInterval) / 60`


    But what happens when you run your game on a very slow device, and the engine
    is not able to perform the game loop 60 times per second, but actually runs at
    50 frames per second? Well, since `delta` is in no way related to the real time
    that has passed, it means that your entire game will slow down, since the game
    logic still thinks that the fixed amount of time set in the `delta` variable (1/60
    seconds) has passed since the last time `update` was called. Because the `delta`
    value is fixed, this kind of game loop is also called a fixed timestep approach.


    Having your game slow down a bit sometimes is not a bad thing per se. You have
    to watch out, though, that the game doesn’t structurally run too slow. It may
    have negative side effects. For one, the player could lose interest in the game
    because the objects are not moving realistically anymore, and playing the game
    takes too long. Another side effect could be that the game becomes too easy to
    play and this would put players with older devices at an unfair advantage.


    One way to deal with this is to keep track of how much time actually has passed
    since the last update. That’s why the `update` method in `GameScene` has a parameter
    called `currentTime`. This parameter gives you the current system time. You can
    perform a few calculations to find out how much time has passed since the last
    update cycle. First, add a property in which you store the time at the last update:


    `var lastUpdateTimeInterval: NSTimeInterval = 0`


    In the `update` method, you can then calculate how much time has passed, as follows:


    `let timePassed: NSTimeInterval = currentTime - lastUpdateTimeInterval`


    `lastUpdateTimeInterval = currentTime`


    What you can now do is calculate the difference between the `delta` value and
    the actual time passed. If that value is too big, you can decide to increase the
    frame interval and calculate a new `delta` value so that the game play better
    matches the device. If you want, you can write a much more advanced version that
    calculates an average difference with `delta` over the last few frames and then,
    based on that difference, decides if the frame rate needs to be slowed down or
    sped up.


    A completely different approach to using a fixed `delta` value is to simply calculate
    the `delta` value every time the `update` method is called, and then use that
    `delta` value in the game. This is referred to as the variable timestep approach.


    `delta = currentTime - lastUpdateTimeInterval`


    `lastUpdateTimeInterval = currentTime`'
  trans: "\n### 更新球的位置\n\n在本节中，您将开始定义球的行为。基本上有两种可能：要么球等待被发射，要么球正在空中飞行。为了将这种行为转化为更新球的速度继而更新其位置的指令，让我们编写一个名为`updateBall`的方法，在其中组合这些指令。这是完整的方法：\n\
    \n```\nfunc updateBall() {\n    if !ball.hidden {\n        ballVelocity.x *= 0.99\n\
    \        ballVelocity.y -= 15\n        ball.position.x += ballVelocity.x * CGFloat(delta)\n\
    \        ball.position.y += ballVelocity.y * CGFloat(delta)\n    }\n    else {\n\
    \        // 计算球的位置\n        let opposite = sin(cannonBarrel.zRotation) * cannonBarrel.size.width\
    \ * 0.6\n        let adjacent = cos(cannonBarrel.zRotation) * cannonBarrel.size.width\
    \ * 0.6\n        ball.position = CGPoint(x: cannon.position.x + adjacent,\n  \
    \          y: cannon.position.y + opposite)\n        // 设置球的颜色\n        ballRed.hidden\
    \ = cannonRed.hidden\n        ballGreen.hidden = cannonGreen.hidden\n        ballBlue.hidden\
    \ = cannonBlue.hidden\n    }\n    if isOutsideWorld(ball.position) {\n       \
    \ ball.hidden = true\n        readyToShoot = false\n    }\n}\n```\n\n如您所见，此方法使用`if`指令来区分球所处的两种可能状态。如果球未被隐藏，那么它一定是在空中飞行。在这种情况下，将执行`if`指令的主体。该主体由四条指令组成。前两条指令更新速度，后两条指令更新位置。第一条指令更新速度的\
    \ x 方向分量。您将速度乘以 0.99，其效果是速度缓慢降低。这是为了模拟空气摩擦。第二条指令在每次更新中增加 y 方向的速度。这是为了模拟重力对球的影响。x\
    \ 和 y 方向上的速度变化共同作用，产生了合理的球体行为。当然，在现实世界中，重力并非 15。但话说回来，您的现实世界也不由像素构成。游戏世界中的物理并不总是精确模拟现实世界中的物理。当您想在游戏中加入某种形式的物理机制时（无论非常简单还是极其复杂），最重要的部分并非物理机制是否逼真，而是游戏是否具有可玩性。这就是为什么在策略游戏中，飞机的移动速度可能与地面上行走的士兵一样快。如果游戏为这两种对象使用现实的速度，将导致游戏无法进行。\n\
    \n球当前的位置通过将速度的 x 和 y 分量加到其当前位置上来更新。以下是实现此操作的指令：\n\n```\nball.position.x += ballVelocity.x\
    \ * CGFloat(delta)\nball.position.y += ballVelocity.y * CGFloat(delta)\n```\n\n\
    如您所见，速度乘以了一个因子`delta`。这是为什么呢？\n\n### 固定时间步长 vs 可变时间步长\n\n`delta`因子是定义在`GameScene`中的一个属性，如下所示：\n\
    \n```\nvar delta: NSTimeInterval = 1/60\n```\n\n它表示 1/60 秒的时间间隔。这对应于 SpriteKit\
    \ 中设置的默认帧率，即每秒 60 帧。因此，实际上，`delta`表示游戏循环周期之间经过的时间量。\n\n通过将速度乘以这个因子`delta`，您实际上是在计算中考虑了游戏引擎的帧率。帧率与\
    \ iOS 设备刷新屏幕的频率密切相关。该频率固定为 60Hz（换句话说，就像帧率一样，每秒 60 次）。在 SpriteKit 中，可以通过更改`SKView`类中的`frameInterval`属性将帧率更改为其他值。例如，在`didMoveToView`方法中，您可以将帧间隔设置为\
    \ 2，这意味着帧率将降至每秒 30 帧，如下所示：\n\n```\nview.frameInterval = 2\n```\n\n显然，您还需要更新`delta`因子以匹配新的帧率：\n\
    \n```\ndelta = NSTimeInterval(view.frameInterval) / 60\n```\n\n但是，当您在一台速度非常慢的设备上运行游戏，并且引擎无法以每秒\
    \ 60 次执行游戏循环，而是以每秒 50 帧的速度运行时，会发生什么？嗯，由于`delta`与实际经过的时间毫无关联，这意味着您的整个游戏将会变慢，因为游戏逻辑仍然认为自上次调用`update`以来，已经过了`delta`变量中设置的固定时间量（1/60\
    \ 秒）。由于`delta`值是固定的，这种游戏循环也称为固定时间步长方法。\n\n有时候让游戏稍微变慢本身并不一定是坏事。不过，您必须注意不要让游戏结构性运行得太慢。它可能会产生负面副作用。其一，玩家可能会因为物体移动不再逼真且玩游戏耗时过长而对游戏失去兴趣。另一个副作用可能是游戏变得过于简单，从而使使用较旧设备的玩家获得不公平的优势。\n\
    \n处理此问题的一种方法是跟踪自上次更新以来实际经过了多少时间。这就是为什么`GameScene`中的`update`方法有一个名为`currentTime`的参数。该参数为您提供当前系统时间。您可以通过一些计算来找出自上次更新周期以来经过了多少时间。首先，添加一个属性来存储上次更新的时间：\n\
    \n```\nvar lastUpdateTimeInterval: NSTimeInterval = 0\n```\n\n然后，在`update`方法中，您可以按如下方式计算经过的时间：\n\
    \n```\nlet timePassed: NSTimeInterval = currentTime - lastUpdateTimeInterval\n\
    lastUpdateTimeInterval = currentTime\n```\n\n现在您可以做的是计算`delta`值与实际经过时间之间的差值。如果该值太大，您可以决定增加帧间隔并计算新的`delta`值，以便游戏玩法更好地匹配设备。如果您愿意，可以编写一个更高级的版本，计算过去几帧中与`delta`的平均差值，然后根据该差值决定是需要降低还是提高帧率。\n\
    \n与使用固定`delta`值完全不同的另一种方法是，在每次调用`update`方法时简单地计算`delta`值，然后在游戏中使用该`delta`值。这被称为可变时间步长方法。\n\
    \n```\ndelta = currentTime - lastUpdateTimeInterval\nlastUpdateTimeInterval =\
    \ currentTime\n```\n"
- fmt: "# Variable Timestep vs Fixed Timestep\n\n`Variable timestep` has a few advantages\
    \ over the previous method. For one, you don’t have to worry about frame rates\
    \ anymore. The `delta` value will always correspond to the time that has actually\
    \ passed. This means that your game world will automatically run at the same speed,\
    \ regardless of the actual frame rate. If the frame rate drops, the game world\
    \ speed is automatically adapted. `Variable timestep` is especially useful in\
    \ games where high frame rates are desirable, such as in first-person shooters\
    \ where camera motions can be quite fast because the camera is controlled directly\
    \ by the player. In those cases, a variable timestep can result in smoother motions\
    \ and a more pleasurable gaming experience.\n\nA disadvantage of using a variable\
    \ timestep is that your game logic needs to be robust enough to deal with large\
    \ fluctuations in `delta` values. For instance, suppose that you have an arrow\
    \ that is shooting through the air. Now suppose that at some point, the `delta`\
    \ value is very big due to a hiccup in the system, and you simply calculate the\
    \ new arrow position by multiplying the velocity by `delta` and adding that to\
    \ the current position. You may have inadvertently moved the arrow through an\
    \ object that it shouldn’t have moved through (such as an opponent), without handling\
    \ the collision. It may also lead to the player being able to enter parts of the\
    \ game world that shouldn’t be accessible to him/her. So, watch out when you use\
    \ the `delta` value in this way. It can lead to unexpected behavior.\n\nAnother\
    \ disadvantage of variable timestep is that the time continues even if the player\
    \ is temporarily doing something different (like opening a menu in the game or\
    \ saving the game). Generally, players won’t be very happy if they discover that\
    \ while they were browsing their inventory, their character was killed in the\
    \ game world. A similar thing happens when the player temporarily switches to\
    \ another app. The system time continues, and so does the game world. When using\
    \ a fixed timestep, the game simply continues where it was paused when the player\
    \ reactivates the app because the game objects don’t care about the real time\
    \ that has passed, only about the fixed `delta` value.\n\n> **Note**: In the old\
    \ days, computers were so slow that the concept of a fixed timestep didn’t exist.\
    \ Game developers assumed that everyone would be playing their game on an equally\
    \ slow machine, so they called the game-loop methods as often as possible and\
    \ simply updated the position of an object with a constant velocity factor. As\
    \ a result, when computers became faster, these games became more and more difficult\
    \ to play! Players don’t like this. Therefore, always take the elapsed time into\
    \ account when calculating things like velocities and positions, and make sure\
    \ that your game properly matches its frame rate to the capabilities of the device\
    \ it is being played on.\n\n## Updating the Ball Color\n\nIf the ball isn’t currently\
    \ shooting, the player is allowed to change its color. You do that by retrieving\
    \ the current color of the cannon and changing the color of the ball accordingly.\
    \ That way, you’re sure the color of the ball always matches the color of the\
    \ cannon. The easiest solution is simply mapping the `hidden` statuses of the\
    \ cannon color indicator objects to the different colored balls:\n\n```\nballRed.hidden\
    \ = cannonRed.hidden\nballGreen.hidden = cannonGreen.hidden\nballBlue.hidden =\
    \ cannonBlue.hidden\n```\n\nYou also need to update the position of the ball.\
    \ This is necessary because when the ball isn’t in the air, the player can modify\
    \ its shooting position by rotating the barrel of the cannon. Therefore, you need\
    \ to calculate the correct ball position here to ensure that it matches the current\
    \ orientation of the cannon barrel. Using the sine and cosine functions, you calculate\
    \ the new position as follows:\n\n```\nlet opposite = sin(cannonBarrel.zRotation)\
    \ * cannonBarrel.size.width * 0.6\nlet adjacent = cos(cannonBarrel.zRotation)\
    \ * cannonBarrel.size.width * 0.6\nball.position = CGPoint(x: cannon.position.x\
    \ + adjacent, y: cannon.position.y + opposite)\n```\n\nAs you can see, you multiply\
    \ the opposite and adjacent sides with a value of 0.6 so the ball is drawn a bit\
    \ more than halfway up the rotated barrel.\n\nThe second part of the `updateBall`\
    \ method also is an `if` instruction:\n\n```\nif isOutsideWorld(ball.position)\
    \ {\n    ball.hidden = true\n    readyToShoot = false\n}\n```\n\nThis part of\
    \ the method deals with the event that occurs when the ball goes outside the game\
    \ world. In order to calculate if this is true, you add a method called `isOutsideWorld`\
    \ to `GameScene`. The goal of this method is to check whether a given position\
    \ is outside the game world. You define the boundaries of the game world using\
    \ a few simple rules. Remember that SpriteKit’s origin is in the bottom left corner\
    \ of the screen. In the games developed in this book, the origin (or anchor point)\
    \ of the game scene is set to the center of the screen to more easily adapt to\
    \ different devices. In this setting, an object is outside the game world if its\
    \ x-position is smaller than minus half the width of the screen or larger than\
    \ half the width of the screen. An object is also outside the game world if its\
    \ y-position is less than the minus half the height of the screen. Note that I\
    \ don’t say an object is outside the game world if its y-position is very large.\
    \ Why not? I chose to do this so it’s possible for a player to shoot a ball in\
    \ the air and let the ball be momentarily above the screen before falling down\
    \ again. Often you see a similar effect in platform games, where a character can\
    \ jump up and disappear partly outside the screen as opposed to falling through\
    \ the bottom of the screen (which generally means instant death of the character).\n\
    \nIf you look at the header of this method, you see that it expects one parameter,\
    \ a position:\n\n```\nfunc isOutsideWorld(pos: CGPoint) -> Bool\n```\n\nThe return\
    \ value of this method is a Boolean. If you want to check whether a position is\
    \ outside the screen, you need to know the width and height of the screen. Painter3\
    \ adds a property called `gameSize` to the `GameScene` class. This property is\
    \ given a value in the `init` method in `GameScene`:\n\n```\noverride init(size:\
    \ CGSize) {\n    super.init(size: size)\n    gameSize = size\n}\n```\n\nLater,\
    \ I will discuss the meaning of this method in more detail. For now, let’s assume\
    \ this method is called when the app is started.\n\nIn the `isOutsideWorld` method,\
    \ you use the `gameSize` property to determine whether a position is outside the\
    \ game world. The body of the method consists of a single instruction using the\
    \ keyword `return` to calculate a Boolean value. The logical or operation is used\
    \ to cover the different cases in which the position is outside the game world:\n\
    \n```\nreturn pos.x < -gameSize.width/2 || pos.x > gameSize.width/2 || pos.y <\
    \ -gameSize.height/2\n```\n\nAs you can see, you don’t mind if the y coordinate\
    \ is greater than `gameSize.height/2`. This allows you to have the ball end up\
    \ above the screen and fall back in again.\n\nLet’s return to the `updateBall`\
    \ method. The second `if` instruction calls the `isOutsideWorld` method in its\
    \ condition; if this method returns the value `true`, then the ball is hidden\
    \ again, and the `readyToShoot` property is reset to `false` (so that the ball\
    \ can be shot again by the player).\n\nMethods such as `isOutsideWorld` can be\
    \ reused in different parts of the program, which saves development time and results\
    \ in shorter, more readable programs. For example, `isOutsideWorld` will probably\
    \ also be useful for the paint cans later in the game, to test whether they have\
    \ fallen out of the screen.\n\nWhen you run the Painter3 example, you can see\
    \ that it’s now possible to aim the cannon, choose a color, and shoot a ball (see\
    \ Figure 6-2). In the next chapter, you add paint cans to this game.\n\n![A978-1-4842-0650-8_6_Fig2_HTML.jpg](A978-1-4842-0650-8_6_Fig2_HTML.jpg)\n\
    \n**Figure 6-2.** The Painter3 example"
  raw: 'Variable timestep has a few advantages over the previous method. For one,
    you don’t have to worry about frame rates anymore. The `delta` value will always
    correspond to the time that has actually passed. This means that your game world
    will automatically run at the same speed, regardless of the actual frame rate.
    If the frame rate drops, the game world speed is automatically adapted. Variable
    timestep is especially useful in games where high frame rates are desirable, such
    as in first-person shooters where camera motions can be quite fast because the
    camera is controlled directly by the player. In those cases, a variable timestep
    can result in smoother motions and a more pleasurable gaming experience.


    A disadvantage of using a variable timestep is that your game logic needs to be
    robust enough to deal with large fluctuations in delta values. For instance, suppose
    that you have an arrow that is shooting through the air. Now suppose that at some
    point, the delta value is very big due to a hiccup in the system, and you simply
    calculate the new arrow position by multiplying the velocity by delta and adding
    that to the current position. You may have inadvertently moved the arrow through
    an object that it shouldn’t have moved through (such as an opponent), without
    handling the collision. It may also lead to the player being able to enter parts
    of the game world that shouldn’t be accessible to him/her. So, watch out when
    you use the delta value in this way. It can lead to unexpected behavior.


    Another disadvantage of variable timestep is that the time continues even if the
    player is temporarily doing something different (like opening a menu in the game
    or saving the game). Generally, players won’t be very happy if they discover that
    while they were browsing their inventory, their character was killed in the game
    world. A similar thing happens when the player temporarily switches to another
    app. The system time continues, and so does the game world. When using a fixed
    timestep, the game simply continues where it was paused when the player reactivates
    the app because the game objects don’t care about the real time that has passed,
    only about the fixed delta value.


    Note


    In the old days, computers were so slow that the concept of a fixed timestep didn’t
    exist. Game developers assumed that everyone would be playing their game on an
    equally slow machine, so they called the game-loop methods as often as possible
    and simply updated the position of an object with a constant velocity factor.
    As a result, when computers became faster, these games became more and more difficult
    to play! Players don’t like this. Therefore, always take the elapsed time into
    account when calculating things like velocities and positions, and make sure that
    your game properly matches its frame rate to the capabilities of the device it
    is being played on.


    ## Updating the Ball Color


    If the ball isn’t currently shooting, the player is allowed to change its color.
    You do that by retrieving the current color of the cannon and changing the color
    of the ball accordingly. That way, you’re sure the color of the ball always matches
    the color of the cannon. The easiest solution is simply mapping the `hidden` statuses
    of the cannon color indicator objects to the different colored balls:


    `ballRed.hidden = cannonRed.hidden`


    `ballGreen.hidden = cannonGreen.hidden`


    `ballBlue.hidden = cannonBlue.hidden`


    You also need to update the position of the ball. This is necessary because when
    the ball isn’t in the air, the player can modify its shooting position by rotating
    the barrel of the cannon. Therefore, you need to calculate the correct ball position
    here to ensure that it matches the current orientation of the cannon barrel. Using
    the sine and cosine functions, you calculate the new position as follows:


    `let opposite = sin(cannonBarrel.zRotation) * cannonBarrel.size.width * 0.6`


    `let adjacent = cos(cannonBarrel.zRotation) * cannonBarrel.size.width * 0.6`


    `ball.position = CGPoint(x: cannon.position.x + adjacent, y: cannon.position.y
    + opposite)`


    As you can see, you multiply the opposite and adjacent sides with a value of 0.6
    so the ball is drawn a bit more than halfway up the rotated barrel.


    The second part of the `updateBall` method also is an `if` instruction:


    `if isOutsideWorld(ball.position) {`


    `ball.hidden = true`


    `readyToShoot = false`


    `}`


    This part of the method deals with the event that occurs when the ball goes outside
    the game world. In order to calculate if this is true, you add a method called
    `isOutsideWorld` to `GameScene`. The goal of this method is to check whether a
    given position is outside the game world. You define the boundaries of the game
    world using a few simple rules. Remember that SpriteKit’s origin is in the bottom
    left corner of the screen. In the games developed in this book, the origin (or
    anchor point) of the game scene is set to the center of the screen to more easily
    adapt to different devices. In this setting, an object is outside the game world
    if its x-position is smaller than minus half the width of the screen or larger
    than half the width of the screen. An object is also outside the game world if
    its y-position is less than the minus half the height of the screen. Note that
    I don’t say an object is outside the game world if its y-position very large.
    Why not? I chose to do this so it’s possible for a player to shoot a ball in the
    air and let the ball be momentarily above the screen before falling down again.
    Often you see a similar effect in platform games, where a character can jump up
    and disappear partly outside the screen as opposed to falling through the bottom
    of the screen (which generally means instant death of the character).


    If you look at the header of this method, you see that it expects one parameter,
    a position:


    `func isOutsideWorld(pos: CGPoint) -> Bool`


    The return value of this method is a Boolean. If you want to check whether a position
    is outside the screen, you need to know the width and height of the screen. Painter3
    adds a property called `gameSize` to the `GameScene` class. This property is given
    a value in the `init` method in `GameScene`:


    `override init(size: CGSize) {`


    `super.init(size: size)`


    `gameSize = size`


    `}`


    Later, I will discuss the meaning of this method in more detail. For now, let’s
    assume this method is called when the app is started.


    In the `isOutsideWorld` method, you use the `gameSize` property to determine whether
    a position is outside the game world. The body of the method consists of a single
    instruction using the keyword `return` to calculate a Boolean value. The logical
    or operation is used to cover the different cases in which the position is outside
    the game world:


    `return pos.x < -gameSize.width/2 || pos.x > gameSize.width/2 || pos.y < -gameSize.height/2`


    As you can see, you don’t mind if the y coordinate is greater than `gameSize.height/2`.
    This allows you to have the ball end up above the screen and fall back in again.


    Let’s return to the `updateBall` method. The second `if` instruction calls the
    `isOutsideWorld` method in its condition; if this method returns the value `true`,
    then the ball is hidden again, and the `readyToShoot` property is reset to false
    (so that the ball can be shot again by the player).


    Methods such as `isOutsideWorld` can be reused in different parts of the program,
    which saves development time and results in shorter, more readable programs. For
    example, `isOutsideWorld` will probably also be useful for the paint cans later
    in the game, to test whether they have fallen out of the screen.


    When you run the Painter3 example, you can see that it’s now possible to aim the
    cannon, choose a color, and shoot a ball (see Figure [6-2](#A978-1-4842-0650-8_6_Chapter.html#Fig2)).
    In the next chapter, you add paint cans to this game.


    ![A978-1-4842-0650-8_6_Fig2_HTML.jpg](A978-1-4842-0650-8_6_Fig2_HTML.jpg)


    Figure 6-2.


    The Painter3 example'
  trans: "\n# 变长时间步长 vs 固定时间步长\n\n`变长时间步长`相较于之前的方法具有若干优势。首先，你无需再担心帧率问题。`delta`值将始终对应实际经过的时间。这意味着无论实际帧率如何，你的游戏世界都会自动以相同的速度运行。如果帧率下降，游戏世界速度会自动调整。`变长时间步长`在追求高帧率的游戏中尤其有用，例如第一人称射击游戏中，由于摄像机直接由玩家控制，镜头运动可能非常快速。在这种情况下，变长时间步长能带来更流畅的移动和更愉悦的游戏体验。\n\
    \n使用变长时间步长的缺点在于，你的游戏逻辑需要足够稳健以应对`delta`值的大幅波动。例如，假设有一支箭在空中飞射，此时系统出现短暂卡顿导致`delta`值非常大，而你仅通过将速度乘以`delta`再加上当前位置来计算箭的新位置，就可能导致箭意外穿过本不该穿过的物体（如对手），并且未触发碰撞处理。这也可能使玩家进入游戏世界中本不可及的区域。因此，在使用`delta`值时需格外小心，否则可能导致意外行为。\n\
    \n变长时间步长的另一个缺点是，即使玩家临时进行其他操作（如打开游戏菜单或保存游戏），时间仍在继续。通常，如果玩家发现自己在浏览物品栏时角色已在游戏世界中被击杀，他们不会感到高兴。当玩家临时切换到其他应用时也会出现类似情况：系统时间继续流逝，游戏世界也随之推进。而使用固定时间步长时，游戏只会从暂停处继续运行——因为游戏对象不关心真实经过的时间，只关心固定的`delta`值。\n\
    \n> **注意**：在早期，计算机速度较慢，固定时间步长的概念尚未出现。游戏开发者假定所有人的电脑都同样缓慢，因此尽可能频繁地调用游戏循环方法，仅用恒定速度系数更新物体位置。结果，当计算机速度提升后，这些游戏变得越来越难玩！玩家对此很不满。因此，在计算速度和位置等属性时，务必考虑经过的时间，并确保游戏的帧率与运行设备的性能相匹配。\n\
    \n## 更新球体颜色\n\n如果球体当前未处于发射状态，玩家可以更改其颜色。具体做法是获取大炮的当前颜色，并相应更改球体的颜色。这样就能确保球体颜色始终与大炮颜色一致。最简单的解决方案是将大炮颜色指示器对象的`hidden`状态直接映射到不同颜色的球体：\n\
    \n```\nballRed.hidden = cannonRed.hidden\nballGreen.hidden = cannonGreen.hidden\n\
    ballBlue.hidden = cannonBlue.hidden\n```\n\n还需要更新球体的位置。这是必要的，因为当球体未在空中时，玩家可以通过旋转炮管来调整发射位置。因此，需要在此处计算正确的球体位置，使其与大炮炮管的当前朝向匹配。使用正弦和余弦函数，按如下方式计算新位置：\n\
    \n```\nlet opposite = sin(cannonBarrel.zRotation) * cannonBarrel.size.width *\
    \ 0.6\nlet adjacent = cos(cannonBarrel.zRotation) * cannonBarrel.size.width *\
    \ 0.6\nball.position = CGPoint(x: cannon.position.x + adjacent, y: cannon.position.y\
    \ + opposite)\n```\n\n如你所见，将对边和邻边乘以系数 0.6，使球体绘制在旋转炮管大约一半以上的位置。\n\n`updateBall`方法的第二部分同样是一个`if`指令：\n\
    \n```\nif isOutsideWorld(ball.position) {\n    ball.hidden = true\n    readyToShoot\
    \ = false\n}\n```\n\n这部分处理球体飞出游戏世界的事件。为了判断是否发生这种情况，需要在`GameScene`中添加一个名为`isOutsideWorld`的方法。该方法的目标是检查给定位置是否超出游戏世界边界，并通过几条简单规则定义游戏世界边界。请记住，SpriteKit\
    \ 的原点位于屏幕左下角。本书开发的游戏中，游戏场景的原点（或锚点）被设置到屏幕中心，以便更好地适配不同设备。在这种设置下，如果对象的 x 坐标小于屏幕宽度的一半负值，或大于屏幕宽度的一半正值，则该对象位于游戏世界之外；如果对象的\
    \ y 坐标小于屏幕高度的一半负值，也属同样情况。注意，我并未说 y 坐标非常大时对象会超出游戏世界——这是为什么？我这样设计是为了让玩家能将球射向空中，使球暂时出现在屏幕上方，然后再次下落。在平台游戏中经常能看到类似效果：角色可以向上跳跃，部分消失于屏幕之外，而不会从屏幕底部掉落（后者通常意味着角色立即死亡）。\n\
    \n查看该方法的头部，可以看到它需要一个参数，即位置：\n\n```\nfunc isOutsideWorld(pos: CGPoint) -> Bool\n\
    ```\n\n该方法的返回值是布尔值。要检查位置是否在屏幕之外，需要知道屏幕的宽度和高度。Painter3 在`GameScene`类中添加了一个名为`gameSize`的属性。该属性在`GameScene`的`init`方法中被赋值：\n\
    \n```\noverride init(size: CGSize) {\n    super.init(size: size)\n    gameSize\
    \ = size\n}\n```\n\n稍后我会更详细地讨论此方法的含义。目前，假设该方法在应用启动时被调用。\n\n在`isOutsideWorld`方法中，使用`gameSize`属性判断位置是否在游戏世界之外。方法体由一条使用`return`关键字计算布尔值的指令构成。通过逻辑或运算覆盖位置超出游戏世界的不同情况：\n\
    \n```\nreturn pos.x < -gameSize.width/2 || pos.x > gameSize.width/2 || pos.y <\
    \ -gameSize.height/2\n```\n\n如你所见，y 坐标大于`gameSize.height/2`的情况未被纳入条件。这使得球体能够飞至屏幕上方后再次落回。\n\
    \n让我们回到`updateBall`方法。第二个`if`指令在其条件中调用了`isOutsideWorld`方法；如果该方法返回`true`，则球体再次隐藏，并将`readyToShoot`属性重置为`false`（以便玩家可以再次发射球体）。\n\
    \n像`isOutsideWorld`这样的方法可以在程序的不同部分重复使用，这既节省了开发时间，也使得程序更简短、更易读。例如，在后续游戏中，`isOutsideWorld`可能同样适用于检测油漆罐是否掉落出屏幕。\n\
    \n运行 Painter3 示例时，可以看到现在可以瞄准大炮、选择颜色并发射球体（见图 6-2）。下一章将向此游戏添加油漆罐。\n\n![A978-1-4842-0650-8_6_Fig2_HTML.jpg](img/A978-1-4842-0650-8_6_Fig2_HTML.jpg)\n\
    \n**图 6-2.** Painter3 示例\n"
- fmt: "## What You Have Learned\n\nIn this chapter, you have learned the following:\n\
    \n- The different kinds of methods/functions (with/without parameters, and with/without\
    \ a return value)\n- The difference between fixed and variable timesteps\n- How\
    \ to add a flying ball to the game world\n\n# 7. Game Object Types\n\nElectronic\
    \ supplementary material The online version of this chapter (doi:[10.1007/978-1-4842-0650-8_7](http://dx.doi.org/10.1007/978-1-4842-0650-8_7))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    In the previous chapters, you saw how to create a game world that contains a few\
    \ different game objects, such as a cannon and a ball. You also saw how to let\
    \ game objects interact with each other. For example, the `ball` object updates\
    \ its color according to the color of the cannon. In this chapter, you will add\
    \ falling paint cans to the game world. However, before you can do that, you have\
    \ to reexamine how to create and manage objects in Swift. I will introduce the\
    \ class concept as a means to create multiple game objects of a certain type.\
    \ Then, you will apply the class concept to other parts of the Painter game application.\
    \ Furthermore, you will learn how to incorporate randomness in your games.\n\n\
    ## Creating Multiple Objects of the Same Type\n\nUntil now, you only needed one\
    \ instance of each game object in Painter. There is only one cannon and there\
    \ is only one ball. In the Painter examples you’ve seen so far, these objects\
    \ were represented by a number of properties in the `GameScene` class. For example,\
    \ the following properties encompass the cannon object:\n\n```\nvar cannon = SKNode()\n\
    var cannonBarrel = SKSpriteNode(imageNamed:\"spr_cannon_barrel\")\nvar cannonRed\
    \ = SKSpriteNode(imageNamed: \"spr_cannon_red\")\nvar cannonGreen = SKSpriteNode(imageNamed:\
    \ \"spr_cannon_green\")\nvar cannonBlue = SKSpriteNode(imageNamed: \"spr_cannon_blue\"\
    )\n```\n\nSimilarly, the ball object also has a few properties associated with\
    \ it:\n\n```\nvar ball = SKNode()\nvar ballRed = SKSpriteNode(imageNamed: \"spr_ball_red\"\
    )\nvar ballGreen = SKSpriteNode(imageNamed: \"spr_ball_green\")\nvar ballBlue\
    \ = SKSpriteNode(imageNamed: \"spr_ball_blue\")\nvar ballVelocity = CGPoint.zeroPoint\n\
    var readyToShoot = false\n```\n\nSuppose you want to be able to shoot multiple\
    \ balls at the same time in the Painter game. If you did this the way you dealt\
    \ with objects until now, you would need to create a copy of the properties above\
    \ for every ball you want to add to the game. As a result, the `GameScene` class\
    \ would start to become very big, and thus harder to understand. Furthermore,\
    \ copying code generally is not a good idea. If in the future you want to extend\
    \ the ball with a fourth color, you would need to update the property list for\
    \ every ball you added to the game.\n\n## Classes as Types\n\nIn Swift, it’s possible\
    \ to group properties into a new type, by using a class. The Painter4 example\
    \ shows you how to use classes to group properties that belong together logically.\
    \ Take a look at the following class definition:\n\n```\nclass Cannon {\n    var\
    \ node = SKNode()\n    var barrel = SKSpriteNode(imageNamed:\"spr_cannon_barrel\"\
    )\n    var red = SKSpriteNode(imageNamed: \"spr_cannon_red\")\n    var green =\
    \ SKSpriteNode(imageNamed: \"spr_cannon_green\")\n    var blue = SKSpriteNode(imageNamed:\
    \ \"spr_cannon_blue\")\n}\n```\n\nA class creates a new type. So, after you have\
    \ defined a class `Cannon`, you can create an instance of the type `Cannon`. The\
    \ definition of the `Cannon` class establishes that a cannon contains a node (which\
    \ represents the object in the scene graph), a barrel sprite, and three sprites,\
    \ each representing a cannon color. In Painter4, this class definition is written\
    \ above the `GameScene` class. Inside `GameScene`, you no longer have to write\
    \ all those properties that encompass a cannon; you can simply create a property\
    \ of type `Cannon`, as follows:\n\n```\nvar cannon = Cannon()\n```\n\nThe `cannon`\
    \ property now contains the data as defined in the class `Cannon`. You can access\
    \ that data by using a dot. For example, this is the new version of the `initCannon`\
    \ method that now initializes the `cannon` property:\n\n```\nfunc initCannon()\
    \ {\n    cannon.red.zPosition = 1\n    cannon.green.zPosition = 1\n    cannon.blue.zPosition\
    \ = 1\n    cannon.barrel.anchorPoint = CGPoint(x:0.233, y:0.5)\n    cannon.node.position\
    \ = CGPoint(x:-430, y:-280)\n    cannon.node.zPosition = 1\n    cannon.green.hidden\
    \ = true\n    cannon.blue.hidden = true\n    cannon.node.addChild(cannon.red)\n\
    \    cannon.node.addChild(cannon.green)\n    cannon.node.addChild(cannon.blue)\n\
    \    cannon.node.addChild(cannon.barrel)\n}\n```\n\nSo, instead of accessing the\
    \ properties directly as you did in Painter3, you are now accessing them as a\
    \ part of the `cannon` object. In a similar way, you can also define a class `Ball`:\n\
    \n```\nclass Ball {\n    var node = SKNode()\n    var red = SKSpriteNode(imageNamed:\
    \ \"spr_ball_red\")\n    var green = SKSpriteNode(imageNamed: \"spr_ball_green\"\
    )\n    var blue = SKSpriteNode(imageNamed: \"spr_ball_blue\")\n    var velocity\
    \ = CGPoint.zeroPoint\n    var readyToShoot = false\n}\n```\n\nAgain, you now\
    \ only have to define a single property in `GameScene`:\n\n```\nvar ball = Ball()\n\
    ```\n\nAnd accessing the data in the `ball` object is done exactly like with the\
    \ `cannon` object. Here is an excerpt of the new `updateBall` method:\n\n```\n\
    if !ball.node.hidden {\n    ball.velocity.x *= 0.99\n    ball.velocity.y -= 15\n\
    \    ball.node.position.x += ball.velocity.x * CGFloat(delta)\n    ball.node.position.y\
    \ += ball.velocity.y * CGFloat(delta)\n}\n```\n\nThe nice part of this approach\
    \ is that it’s easy to add more balls to the game:\n\n```\nvar ball2 = Ball()\n\
    var ball3 = Ball()\nvar ball4 = Ball()\n```"
  raw: '## What You Have Learned


    In this chapter, you have learned the following:


    *   The different kinds of methods/functions (with/without parameters, and with/without
    a return value)

    *   The difference between fixed and variable timesteps

    *   How to add a flying ball to the game world


    # 7. Game Object Types


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​7](http://dx.doi.org/10.1007/978-1-4842-0650-8_7))
    contains supplementary material, which is available to authorized users.


    In the previous chapters, you saw how to create a game world that contains a few
    different game objects, such as a cannon and a ball. You also saw how to let game
    objects interact with each other. For example, the `ball` object updates its color
    according to the color of the cannon. In this chapter, you will add falling paint
    cans to the game world. However, before you can do that, you have to reexamine
    how to create and manage objects in Swift. I will introduce the class concept
    as a means to create multiple game objects of a certain type. Then, you will apply
    the class concept to other parts of the Painter game application. Furthermore,
    you will learn how to incorporate randomness in your games.


    ## Creating Multiple Objects of the Same Type


    Until now, you only needed one instance of each game object in Painter. There
    is only one cannon and there is only one ball. In the Painter examples you’ve
    seen so far, these objects were represented by a number of properties in the `GameScene`
    class. For example, the following properties encompass the cannon object:


    `var cannon = SKNode()`


    `var cannonBarrel = SKSpriteNode(imageNamed:"spr_cannon_barrel")`


    `var cannonRed = SKSpriteNode(imageNamed: "spr_cannon_red")`


    `var cannonGreen = SKSpriteNode(imageNamed: "spr_cannon_green")`


    `var cannonBlue = SKSpriteNode(imageNamed: "spr_cannon_blue")`


    Similarly, the ball object also has a few properties associated with it:


    `var ball = SKNode()`


    `var ballRed = SKSpriteNode(imageNamed: "spr_ball_red")`


    `var ballGreen = SKSpriteNode(imageNamed: "spr_ball_green")`


    `var ballBlue = SKSpriteNode(imageNamed: "spr_ball_blue")`


    `var ballVelocity = CGPoint.zeroPoint`


    `var readyToShoot = false`


    Suppose you want to be able to shoot multiple balls at the same time in the Painter
    game. If you did this the way you dealt with objects until now, you would need
    to create a copy of the properties above for every ball you want to add to the
    game. As a result, the `GameScene` class would start to become very big, and thus
    harder to understand. Furthermore, copying code generally is not a good idea.
    If in the future you want to extend the ball with a fourth color, you would need
    to update the property list for every ball you added to the game.


    ## Classes as Types


    In Swift, it’s possible to group properties into a new type, by using a class.
    The Painter4 example shows you how to use classes to group properties that belong
    together logically. Take a look at the following class definition:


    `class Cannon {`


    `var node = SKNode()`


    `var barrel = SKSpriteNode(imageNamed:"spr_cannon_barrel")`


    `var red = SKSpriteNode(imageNamed: "spr_cannon_red")`


    `var green = SKSpriteNode(imageNamed: "spr_cannon_green")`


    `var blue = SKSpriteNode(imageNamed: "spr_cannon_blue")`


    `}`


    A class creates a new type. So, after you have defined a class `Cannon`, you can
    create an instance of the type `Cannon`. The definition of the `Cannon` class
    establishes that a cannon contains a node (which represents the object in the
    scene graph), a barrel sprite, and three sprites, each representing a cannon color.
    In Painter4, this class definition is written above the `GameScene` class. Inside
    `GameScene`, you no longer have to write all those properties that encompass a
    cannon; you can simply create a property of type `Cannon`, as follows:


    `var cannon = Cannon()`


    The `cannon` property now contains the data as defined in the class `Cannon`.
    You can access that data by using a dot. For example, this is the new version
    of the `initCannon` method that now initializes the `cannon` property:


    `func initCannon() {`


    `cannon.red.zPosition = 1`


    `cannon.green.zPosition = 1`


    `cannon.blue.zPosition = 1`


    `cannon.barrel.anchorPoint = CGPoint(x:0.233, y:0.5)`


    `cannon.node.position = CGPoint(x:-430, y:-280)`


    `cannon.node.zPosition = 1`


    `cannon.green.hidden = true`


    `cannon.blue.hidden = true`


    `cannon.node.addChild(cannon.red)`


    `cannon.node.addChild(cannon.green)`


    `cannon.node.addChild(cannon.blue)`


    `cannon.node.addChild(cannon.barrel)`


    `}`


    So, instead of accessing the properties directly as you did in Painter3, you are
    now accessing them as a part of the `cannon object`. In a similar way, you can
    also define a class `Ball`:


    `class Ball {`


    `var node = SKNode()`


    `var red = SKSpriteNode(imageNamed: "spr_ball_red")`


    `var green = SKSpriteNode(imageNamed: "spr_ball_green")`


    `var blue = SKSpriteNode(imageNamed: "spr_ball_blue")`


    `var velocity = CGPoint.zeroPoint`


    `var readyToShoot = false`


    `}`


    Again, you now only have to define a single property in `GameScene`:


    `var ball = Ball()`


    And accessing the data in the `ball` object is done exactly like with the `cannon`
    object. Here is an excerpt of the new `updateBall` method:


    `if !ball.node.hidden {`


    `ball.velocity.x *= 0.99`


    `ball.velocity.y -= 15`


    `ball.node.position.x += ball.velocity.x * CGFloat(delta)`


    `ball.node.position.y += ball.velocity.y * CGFloat(delta)`


    `}`


    The nice part of this approach is that it’s easy to add more balls to the game:


    `var ball2 = Ball()`


    `var ball3 = Ball()`


    `var ball4 = Ball()`'
  trans: "\n## 本章小结\n\n在本章中，你学习了以下内容：\n\n- 不同类型的方法/函数（带/不带参数，以及带/不带返回值）\n- 固定时间步长与可变时间步长的区别\n\
    - 如何向游戏世界添加一个飞行球\n\n# 7. 游戏对象类型\n\n电子补充材料 本章在线版（doi:[10.1007/978-1-4842-0650-8_7](http://dx.doi.org/10.1007/978-1-4842-0650-8_7)）包含补充材料，仅供授权用户使用。\n\
    \n在前几章中，你已经了解了如何创建一个包含几种不同游戏对象（例如大炮和球）的游戏世界。你还了解了如何让游戏对象之间进行交互。例如，`ball`对象会根据大炮的颜色更新其颜色。在本章中，你将向游戏世界添加掉落的油漆罐。但在实现这个功能之前，你需要重新审视如何在\
    \ Swift 中创建和管理对象。我将介绍**类**这一概念，将其作为一种创建特定类型多个游戏对象的手段。然后，你将把类的概念应用到 Painter 游戏应用程序的其他部分。此外，你还将学习如何在游戏中融入随机性。\n\
    \n## 创建同一类型的多个对象\n\n到目前为止，在 Painter 中每个游戏对象只需要一个实例。只有一门大炮，也只有一个球。在您之前看到的 Painter\
    \ 示例中，这些对象由 `GameScene` 类中的一系列属性表示。例如，以下属性组成了大炮对象：\n\n```\nvar cannon = SKNode()\n\
    var cannonBarrel = SKSpriteNode(imageNamed:\"spr_cannon_barrel\")\nvar cannonRed\
    \ = SKSpriteNode(imageNamed: \"spr_cannon_red\")\nvar cannonGreen = SKSpriteNode(imageNamed:\
    \ \"spr_cannon_green\")\nvar cannonBlue = SKSpriteNode(imageNamed: \"spr_cannon_blue\"\
    )\n```\n\n类似地，球对象也有几个与之关联的属性：\n\n```\nvar ball = SKNode()\nvar ballRed = SKSpriteNode(imageNamed:\
    \ \"spr_ball_red\")\nvar ballGreen = SKSpriteNode(imageNamed: \"spr_ball_green\"\
    )\nvar ballBlue = SKSpriteNode(imageNamed: \"spr_ball_blue\")\nvar ballVelocity\
    \ = CGPoint.zeroPoint\nvar readyToShoot = false\n```\n\n假设你想在 Painter 游戏中同时发射多个球。如果你仍然沿用之前处理对象的方法，那么你每向游戏添加一个球，就需要为它复制一份上述属性。结果，`GameScene`\
    \ 类会变得非常庞大，从而难以理解。此外，复制代码通常不是一个好主意。如果将来你想给球增加第四种颜色，你就需要更新添加到游戏中的每一个球的属性列表。\n\n\
    ## 类作为类型\n\n在 Swift 中，可以通过使用类将属性组合成一个新的类型。Painter4 示例向你展示了如何使用类来将逻辑上属于一起的属性进行分组。请看一下下面的类定义：\n\
    \n```\nclass Cannon {\n    var node = SKNode()\n    var barrel = SKSpriteNode(imageNamed:\"\
    spr_cannon_barrel\")\n    var red = SKSpriteNode(imageNamed: \"spr_cannon_red\"\
    )\n    var green = SKSpriteNode(imageNamed: \"spr_cannon_green\")\n    var blue\
    \ = SKSpriteNode(imageNamed: \"spr_cannon_blue\")\n}\n```\n\n一个类创建了一个新的类型。因此，在你定义了\
    \ `Cannon` 类之后，你就可以创建 `Cannon` 类型的实例。`Cannon` 类的定义规定了一个大炮包含一个节点（表示场景图中的对象）、一个炮管精灵图和三个分别代表大炮颜色的精灵图。在\
    \ Painter4 示例中，这个类定义写在 `GameScene` 类的上方。在 `GameScene` 内部，你不再需要编写所有组成大炮的那些属性；你可以简单地创建一个\
    \ `Cannon` 类型的属性，如下所示：\n\n```\nvar cannon = Cannon()\n```\n\n现在，`cannon` 属性包含了\
    \ `Cannon` 类中定义的数据。你可以使用点号来访问这些数据。例如，这是 `initCannon` 方法的新版本，它现在初始化了 `cannon` 属性：\n\
    \n```\nfunc initCannon() {\n    cannon.red.zPosition = 1\n    cannon.green.zPosition\
    \ = 1\n    cannon.blue.zPosition = 1\n    cannon.barrel.anchorPoint = CGPoint(x:0.233,\
    \ y:0.5)\n    cannon.node.position = CGPoint(x:-430, y:-280)\n    cannon.node.zPosition\
    \ = 1\n    cannon.green.hidden = true\n    cannon.blue.hidden = true\n    cannon.node.addChild(cannon.red)\n\
    \    cannon.node.addChild(cannon.green)\n    cannon.node.addChild(cannon.blue)\n\
    \    cannon.node.addChild(cannon.barrel)\n}\n```\n\n因此，与你在 Painter3 中直接访问属性不同，现在你是将它们作为\
    \ `cannon` 对象的一部分来访问。类似地，你也可以定义一个 `Ball` 类：\n\n```\nclass Ball {\n    var node\
    \ = SKNode()\n    var red = SKSpriteNode(imageNamed: \"spr_ball_red\")\n    var\
    \ green = SKSpriteNode(imageNamed: \"spr_ball_green\")\n    var blue = SKSpriteNode(imageNamed:\
    \ \"spr_ball_blue\")\n    var velocity = CGPoint.zeroPoint\n    var readyToShoot\
    \ = false\n}\n```\n\n同样，你现在只需要在 `GameScene` 中定义一个属性：\n\n```\nvar ball = Ball()\n\
    ```\n\n并且访问 `ball` 对象中的数据的方式与访问 `cannon` 对象完全相同。以下是新 `updateBall` 方法的一个片段：\n\n\
    ```\nif !ball.node.hidden {\n    ball.velocity.x *= 0.99\n    ball.velocity.y\
    \ -= 15\n    ball.node.position.x += ball.velocity.x * CGFloat(delta)\n    ball.node.position.y\
    \ += ball.velocity.y * CGFloat(delta)\n}\n```\n\n这种方法的妙处在于，向游戏中添加更多球变得很容易：\n\n\
    ```\nvar ball2 = Ball()\nvar ball3 = Ball()\nvar ball4 = Ball()\n```\n"
- fmt: "与其为每个球定义所有属性，你只需创建一个`Ball`类的实例。目前唯一的问题是`updateBall`方法只更新`ball`引用的对象。如果你添加了`ball2`、`ball3`和`ball4`，它们不会自动更新。一个解决此问题的朴素方法是简单地将`updateBall`中的代码复制三次，并在每个副本中将`ball`替换为`ball2`、`ball3`和`ball4`。但这并非理想方案。首先，复制代码意味着你必须处理版本管理问题。例如，如果你在`updateBall`方法代码中发现了一个错误，你需要确保将改进后的代码复制到其他`Ball`对象。如果你忘记复制一份，那么在你以为已解决问题时，那个错误仍然存在。另一个问题是这种方法无法很好地扩展。如果你想扩展游戏，让玩家可以同时发射20个球，你打算把代码复制20次吗？此外，你的Swift文件越大，编译器将其翻译成机器码所需的时间就越长。最后，重复的代码看起来不美观，会使你的源代码文件杂乱无章，并让你难以找到所需的其他代码段，导致过度滚动，从而普遍降低你的编码效率。\n\
    \n解决这个问题一个稍微不那么朴素的方法是将`Ball`对象作为参数传递给`updateBall`方法：\n\n```\nfunc updateBall(aBall:\
    \ Ball) {\n\n    if !aBall.node.hidden {\n\n        aBall.velocity.x *= 0.99\n\
    \n        aBall.velocity.y -= 15\n\n        aBall.node.position.x += aBall.velocity.x\
