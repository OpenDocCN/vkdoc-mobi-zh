    -   鲨鱼\n\n你可以在 `Animal` 类中添加一些方法来判断是否正在处理这些特殊情况。例如，如果类型是 “s”，则表示你正在处理一只海豹：\n\n\
    ```\nvar isSeal: Bool {\n    get {\n        return type == \"s\" && !boxed\n \
    \   }\n}\n```\n\n如果类型是 “@” 并且它被装箱（boxed），则表示你正在处理一个空箱子：\n\n```\nvar isEmptyBox:\
    \ Bool {\n    get {\n        return type == \"@\" && boxed\n    }\n}\n```\n\n\
    `Animal` 类还包含其他一些有助于确定动物类型的属性。请查看 `PenguinPairs5` 示例程序。\n\n首先，你需要检查动物正在移动到的格子上是否有另一只动物。为此，你需要获取关卡，并使用\
    \ `LevelState` 类中的 `findAnimalAtPosition` 方法来检查是否存在另一只动物：\n\n```\nlet lvl = GameStateManager.instance.currentGameState\
    \ as? LevelState\n\nif let a = lvl?.findAnimalAtPosition(targetcol, row: targetrow)\
    \ {\n    // 处理动物交互\n}\n```\n\n`findAnimalAtPosition` 方法很直接；请查看本章示例代码中的这个方法。首先，如果另一只动物不可见，则无需执行任何操作，可以直接从该方法返回：\n\
    \n```\nif a.hidden {\n    return\n}\n```\n\n你要处理的第一个情况是企鹅与海豹发生碰撞。在这种情况下，企鹅无需执行任何操作——它只需停止移动：\n\
    \n```\nif a.isSeal {\n    stopMoving()\n}\n```\n\n下一个情况是动物与空箱子发生碰撞。如果是这种情况，你将移动中的动物设为不可见，然后通过将空箱子的类型更改为移动动物的装箱版本（由该动物类型字符的大写形式表示）来将动物移动到箱子内部：\n\
    \n```\nelse if a.isEmptyBox {\n    self.hidden = true\n    a.changeTypeTo(self.type.uppercaseString)\n\
    }\n```\n\n`changeTypeTo` 是一个辅助方法，它改变动物的类型并相应地更新纹理。以下是完整的方法；它看起来与类初始化器中使用的代码非常相似：\n\
    \n```\nfunc changeTypeTo(type: String) {\n    boxed = type.uppercaseString ==\
    \ type\n    var spriteName = \"spr_animal_\\(type)\"\n    if boxed && type !=\
    \ \"@\" {\n        spriteName = \"spr_animal_boxed_\\(type.lowercaseString)\"\n\
    \    }\n    texture = SKTexture(imageNamed: spriteName)\n    self.type = type\n\
    }\n```\n\n如果动物 `a` 的类型与这只动物的类型相同，或者其中一只是彩色企鹅，那么你找到了一对有效的企鹅，并将这两只企鹅都设为不可见：\n\n\
    ```\nelse if type.lowercaseString == a.type.lowercaseString || self.isMulticolor\
    \ || a.isMulticolor {\n    a.hidden = true\n    self.hidden = true\n}\n```\n\n\
    你还需要在屏幕左上角显示额外的一对，但我们将在下一节中处理这个问题。\n\n如果一只企鹅遇到鲨鱼，企鹅会被吃掉，而鲨鱼则挺着饱饱的肚子离开游戏场地。在游戏中，这意味着企鹅停止移动（永久地），并且鲨鱼和企鹅都变为不可见。以下代码实现了这一点：\n\
    \n```\nelse if a.isShark {\n    a.hidden = true\n    self.hidden = true\n    stopMoving()\n\
    }\n```\n\n最后，在其他所有情况下，企鹅都只是停止移动：\n\n```\nelse {\n    self.stopMoving()\n}\n```\n\
    \n# 维护配对数\n\n为了维护配对数并在屏幕上美观地绘制它们，你在游戏中添加了另一个名为 `PairList` 的类。`PairList` 类继承自 `SKNode`\
    \ 类。配对列表绘制在一个框架之上，该框架在 `LevelState` 构造函数中被添加到关卡中：\n\n```\nlet goalFrame = SKSpriteNode(imageNamed:\
    \ \"spr_frame_goal\")\ngoalFrame.zPosition = Layer.Overlay\ngoalFrame.position\
    \ = GameScreen.instance.topLeft + CGPoint(x: 10 + goalFrame.center.x, y: -40)\n\
    self.addChild(goalFrame)\n```\n\n配对列表显示一行精灵，指示已完成和所需配对的数量。因为你想要指示每个配对的颜色，所以你将此信息作为字符串值存储在一个数组中，每个字符串代表一个配对类型。这个数组是\
    \ `PairList` 类的一个属性：\n\n```\nvar colors: [String] = []\n```\n\n你向 `PairList` 类的初始化器传递一个参数\
    \ `nrPairs`，以便知道数组应该有多大。然后你填充数组，使每个元素都设置为空槽位（由精灵 “spr_pairs_e” 表示）：\n\n```\nfor\
    \ var i = 0; i < nrPairs; i++ {\n    let pairSprite = SKSpriteNode(imageNamed:\
    \ \"spr_pairs_e\")\n    pairSprite.position = CGPoint(x: CGFloat(i) * (pairSprite.size.width\
    \ + 5), y: 0)\n    self.addChild(pairSprite)\n    colors.append(\"e\")\n}\n```\n\
    \n你还向该类添加了一个名为 `addPair` 的方法，该方法在数组中查找第一个出现的空配对（类型 “e”），并将其替换为作为参数传入的配对类型：\n\n\
    ```\nfunc addPair(color: String) {\n    for var i = 0; i < colors.count; i++ {\n\
    \        if colors[i] == \"e\" {\n            let sprite = children[i] as! SKSpriteNode\n\
    \            sprite.texture = SKTexture(imageNamed: \"spr_pairs_\\(color)\")\n\
    \            colors[i] = color\n            return\n        }\n    }\n}\n```\n\
    \n此示例使用 `for` 指令来递增 `i` 变量，直到找到一个空位（即 `colors` 数组中的元素等于 “e”）。\n\n现在你添加一个有用的属性来检查玩家是否已经完成了关卡。如果配对颜色列表不再包含任何\
    \ “e” 值（意味着所有空位都已被配对替换），则关卡完成：\n\n```\nvar completed: Bool {\n    get {\n    \
    \    for color in colors {\n            if color == \"e\" {\n                return\
    \ false\n            }\n        }\n        return true\n    }\n}\n```\n\n现在你有了\
    \ `PairList` 类，你可以在 `LevelState` 类中创建它的一个实例，将其添加到游戏世界中，并将其定位在屏幕的左上角附近：\n\n```\n\
    let pairList = PairList(nrPairs: nrPairs)\npairList.name = \"pairList\"\npairList.zPosition\
    \ = Layer.Overlay1\npairList.position = GameScreen.instance.topLeft + CGPoint(x:\
    \ 130, y: -40)\nself.addChild(pairList)\n```\n\n在 `Animal` 类中，如果一只动物遇到另一只相同颜色的企鹅，或者两只动物中的一只是彩色企鹅，你就向列表中添加一个配对：\n\
    \n```\nelse if type.lowercaseString == a.type.lowercaseString || self.isMulticolor\n\
    \    || a.isMulticolor {\n    a.hidden = true\n    self.hidden = true\n    let\
    \ pairList = childNodeWithName(\"//pairList\") as! PairList\n    pairList.addPair(type)\n\
    }\n```\n\n完整的示例请参见本章附带的 `PenguinPairs5` 程序。图 20-2 显示了一个需要完成五对企鹅的关卡截图。在下一章中，你将向企鹅配对游戏添加最后的润色，例如在关卡完成时显示一个覆盖层，以及显示一个提示箭头。\n\
    \n![A978-1-4842-0650-8_20_Fig2_HTML.jpg](img/A978-1-4842-0650-8_20_Fig2_HTML.jpg)\n\
    \n**图 20-2.** 企鹅配对游戏的一个关卡。目标是组成五对黄色企鹅\n\n# 你学到了什么\n\n在本章中，你学到了以下内容：\n\n-   如何为\
    \ `CGPoint` 等类型定义运算符行为\n-   如何编程实现游戏对象选择器\n-   如何对不同类型游戏对象之间的交互进行建模\n-   如何维护玩家已完成的配对数\n"
- fmt: "# 21. Finishing the Penguin Pairs Game\n\nElectronic supplementary material\
    \ The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​21](http://dx.doi.org/10.1007/978-1-4842-0650-8_21))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    In this chapter, you will finalize the Penguin Pairs game. You will first complete\
    \ the user interface by adding a hint arrow and a help overlay that is shown for\
    \ a few seconds when the player starts playing each level. Then, you will learn\
    \ how to reset and move on to the next level. You will complete the game by adding\
    \ sound effects.\n\n## Showing Hints\n\nIn order to finish Penguin Pairs, there\
    \ are a couple more features to add to the game. As a first step, you want to\
    \ be able to show a hint when the user taps a button. The hint consists of an\
    \ orange arrow that is visible for a second. When you load the level in the `LevelState`\
    \ initializer, you read the hint position and direction from the text file. Then,\
    \ you create an `SKSpriteNode` instance, you assign the correct sprite to it,\
    \ and you position it according to the information in the text file, as follows:\n\
    \n```\nlet hintx = hintArr[0].toInt()!, hinty = hintArr[1].toInt()!\nhint = SKSpriteNode(imageNamed:\
    \ \"spr_arrow_hint_\\(hintArr[2])\")\nhint.zPosition = Layer.Scene2\nhint.position\
    \ = tileField.layout.toPosition(hintx, row: hinty)\nhint.hidden = true\nself.addChild(hint)\n\
    ```\n\nInitially, the hint arrow is hidden. In order to temporarily display the\
    \ arrow when the player taps the Hint button, you create an action stored as a\
    \ property:\n\n```\nlet hintVisibleAction = SKAction.sequence([SKAction.unhide(),\n\
    \    SKAction.waitForDuration(1), SKAction.hide()])\n```\n\nFinally, you extend\
    \ the `handleInput` method of `LevelState` to deal with the Hint button being\
    \ pressed:\n\n```\nif hintButton.tapped {\n    hint.runAction(hintVisibleAction)\n\
    }\n```\n\nThe Hint button can only be pressed if it’s visible, which in some cases\
    \ it shouldn’t be, such as the following:\n\n*   After the player makes the first\
    \ move, the Hint button should disappear, and the Retry button should appear.\n\
    *   If the player chooses to switch off hints in the Options menu, the Hint button\
    \ should never be visible.\n\nFor the first case, you need to keep track of when\
    \ the player makes her first move. You add an extra property `firstMoveMade` to\
    \ the `LevelState` class. When you give an animal a velocity, this is done in\
    \ the `AnimalSelector` class. Once the player has tapped an arrow and the animal\
    \ is moving, you call the `applyFirstMoveMade` method part of `LevelState`:\n\n\
    ```\nlet lvl = GameStateManager.instance.currentGameState as? LevelState\nif animalVelocity\
    \ != CGPoint.zeroPoint {\n    lvl?.applyFirstMoveMade()\n}\n```\n\nThe `applyFirstMoveMade`\
    \ method hides the Hint button, unhides the Retry button, and sets the `firstMoveMade`\
    \ property to `true`:\n\n```\nfunc applyFirstMoveMade() {\n    self.hintButton.hidden\
    \ = true\n    self.retryButton.hidden = false\n    firstMoveMade = true\n}\n```\n\
    \nIn the `updateDelta` method of `LevelState`, you make sure to only change the\
    \ visibility of the Hint and Retry buttons if the player has not made his first\
    \ move yet:\n\n```\nif !firstMoveMade {\n    self.hintButton.hidden = !DefaultsManager.instance.hints\n\
    \    self.retryButton.hidden = DefaultsManager.instance.hints\n}\n```\n\nAs you\
    \ can see from the two lines of code in the `if` instruction, the Hint button\
    \ is hidden only if `DefaultsManager.instance.hints` is `false`. The Retry button’s\
    \ hidden status is always the opposite of the Hint button’s hidden status. So\
    \ if the Hint button is visible, the Retry button isn’t, and vice versa. Figure\
    \ [21-1](#A978-1-4842-0650-8_21_Chapter.html#Fig1) shows a screenshot of the hint\
    \ arrow in action.\n\n![A978-1-4842-0650-8_21_Fig1_HTML.jpg](A978-1-4842-0650-8_21_Fig1_HTML.jpg)\n\
    \nFigure 21-1.\n\nThe hint arrow shows the player the first sensible move. Hmm.\
    \ . . that really helps!\n\n## Showing a Help Frame\n\nIt’s also useful to show\
    \ the player a bit of useful information when (s)he begins playing the level.\
    \ Let’s use a custom font to display the help text. You can load a custom font\
    \ in your project using the same procedure as in the Tut’s Tomb game (see [Chapter\
    \ 16](#A978-1-4842-0650-8_16_Chapter.html) for more information). The first step\
    \ is adding a help frame in the `LevelState` initializer:\n\n```\nhelpFrame.position\
    \ = CGPoint(x: 0, y: GameScreen.instance.bottom + helpFrame.center.y + 10)\nhelpFrame.zPosition\
    \ = Layer.Overlay\nself.addChild(helpFrame)\n```\n\nThe help frame is positioned\
    \ at the bottom center of the screen. On top of it, you display a text label:\n\
    \n```\nlet textLabel = SKLabelNode(fontNamed: \"Autodestruct BB\")\ntextLabel.fontColor\
    \ = UIColor(red: 0, green: 0, blue: 0.4, alpha: 1)\ntextLabel.fontSize = 24\n\
    textLabel.text = help\ntextLabel.horizontalAlignmentMode = .Center\ntextLabel.verticalAlignmentMode\
    \ = .Center\ntextLabel.zPosition = 1\nhelpFrame.addChild(textLabel)\n```\n\nThe\
    \ text label is a child of the help frame. In order to make sure it is shown on\
    \ top of the help frame, you set it at a relative z position of 1. Now, whenever\
    \ a level is reset, you add an action that shows the help frame for 5 seconds:\n\
    \n```\nhelpFrame.runAction(SKAction.sequence([SKAction.unhide(),\n    SKAction.waitForDuration(5),\
    \ SKAction.hide()]))\n```\n\nIf you take a look at the `PenguinPairsFinal` example\
    \ belonging to this chapter, you’ll see that this same custom font is now used\
    \ throughout the game, for example to show the level indices on the level buttons\
    \ (see Figure [21-2](#A978-1-4842-0650-8_21_Chapter.html#Fig2)). You can clearly\
    \ see that using a custom font makes the game look much more professional.\n\n\
    ![A978-1-4842-0650-8_21_Fig2_HTML.jpg](A978-1-4842-0650-8_21_Fig2_HTML.jpg)\n\n\
    Figure 21-2.\n\nThe level menu using the custom font\n\n## Resetting the Level\n\
    \nAfter a player moves a couple of animals around, it can happen that the level\
    \ can’t be solved anymore. Instead of having to quit and restart the game, let’s\
    \ give the player a means to reset a level to its initial state.\n\nThanks to\
    \ the proper implementation of the `reset` method everywhere throughout the game\
    \ object classes, resetting a level to its initial state is really easy. You have\
    \ to call the `reset` method on all the game objects, and then you deal with resetting\
    \ things in the `LevelState` class itself. The only thing you need to do there\
    \ is set the `firstMoveMade` property to `false` so the player can view a hint\
    \ again, and run the help frame action:\n\n```\noverride func reset() {\n    super.reset()\n\
    \    firstMoveMade = false\n    helpFrame.runAction(SKAction.sequence([SKAction.unhide(),\n\
    \        SKAction.waitForDuration(5), SKAction.hide()]))\n}\n```\n\nNote\n\nThere\
    \ are many ways in which the Penguin Pairs game can be extended. For example,\
    \ can you write code that determines whether a level is still solvable? You could\
    \ extend the game by displaying a message to the user if that happens. You may\
    \ have your own ideas about how the game could be improved. Feel free to try them\
    \ by modifying and adding to the examples."
  raw: '# 21. Finishing the Penguin Pairs Game


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​21](http://dx.doi.org/10.1007/978-1-4842-0650-8_21))
    contains supplementary material, which is available to authorized users.


    In this chapter, you will finalize the Penguin Pairs game. You will first complete
    the user interface by adding a hint arrow and a help overlay that is shown for
    a few seconds when the player starts playing each level. Then, you will learn
    how to reset and move on to the next level. You will complete the game by adding
    sound effects.


    ## Showing Hints


    In order to finish Penguin Pairs, there are a couple more features to add to the
    game. As a first step, you want to be able to show a hint when the user taps a
    button. The hint consists of an orange arrow that is visible for a second. When
    you load the level in the `LevelState` initializer, you read the hint position
    and direction from the text file. Then, you create an `SKSpriteNode` instance,
    you assign the correct sprite to it, and you position it according to the information
    in the text file, as follows:


    `let hintx = hintArr[0].toInt()!, hinty = hintArr[1].toInt()!`


    `hint = SKSpriteNode(imageNamed: "spr_arrow_hint_\(hintArr[2])")`


    `hint.zPosition = Layer.Scene2`


    `hint.position = tileField.layout.toPosition(hintx, row: hinty)`


    `hint.hidden = true`


    `self.addChild(hint)`


    Initially, the hint arrow is hidden. In order to temporarily display the arrow
    when the player taps the Hint button, you create an action stored as a property:


    `let hintVisibleAction = SKAction.sequence([SKAction.unhide(),`


        `SKAction.waitForDuration(1), SKAction.hide()])`


    Finally, you extend the `handleInput` method of `LevelState` to deal with the
    Hint button being pressed:


    `if hintButton.tapped {`


        `hint.runAction(hintVisibleAction)`


    `}`


    The Hint button can only be pressed if it’s visible, which in some cases it shouldn’t
    be, such as the following:


    *   After the player makes the first move, the Hint button should disappear, and
    the Retry button should appear.

    *   If the player chooses to switch off hints in the Options menu, the Hint button
    should never be visible.


    For the first case, you need to keep track of when the player makes her first
    move. You add an extra property `firstMoveMade` to the `LevelState` class. When
    you give an animal a velocity, this is done in the `AnimalSelector` class. Once
    the player has tapped an arrow and the animal is moving, you call the `applyFirstMoveMade`
    method part of `LevelState`:


    `let lvl = GameStateManager.instance.currentGameState as? LevelState`


    `if animalVelocity != CGPoint.zeroPoint {`


        `lvl?.applyFirstMoveMade()`


    `}`


    The `applyFirstMoveMade` method hides the Hint button, unhides the Retry button,
    and sets the `firstMoveMade` property to `true`:


    `func applyFirstMoveMade() {`


        `self.hintButton.hidden = true`


        `self.retryButton.hidden = false`


        `firstMoveMade = true`


    `}`


    In the `updateDelta` method of `LevelState`, you make sure to only change the
    visibility of the Hint and Retry buttons if the player has not made his first
    move yet:


    `if !firstMoveMade {`


        `self.hintButton.hidden = !DefaultsManager.instance.hints`


        `self.retryButton.hidden = DefaultsManager.instance.hints`


    `}`


    As you can see from the two lines of code in the `if` instruction, the Hint button
    is hidden only if `DefaultsManager.instance.hints` is `false`. The Retry button’s
    hidden status is always the opposite of the Hint button’s hidden status. So if
    the Hint button is visible, the Retry button isn’t, and vice versa. Figure [21-1](#A978-1-4842-0650-8_21_Chapter.html#Fig1)
    shows a screenshot of the hint arrow in action.


    ![A978-1-4842-0650-8_21_Fig1_HTML.jpg](A978-1-4842-0650-8_21_Fig1_HTML.jpg)


    Figure 21-1.


    The hint arrow shows the player the first sensible move. Hmm. . . that really
    helps!


    ## Showing a Help Frame


    It’s also useful to show the player a bit of useful information when (s)he begins
    playing the level. Let’s use a custom font to display the help text. You can load
    a custom font in your project using the same procedure as in the Tut’s Tomb game
    (see [Chapter 16](#A978-1-4842-0650-8_16_Chapter.html) for more information).
    The first step is adding a help frame in the `LevelState` initializer:


    `helpFrame.position = CGPoint(x: 0, y: GameScreen.instance.bottom + helpFrame.center.y
    + 10)`


    `helpFrame.zPosition = Layer.Overlay`


    `self.addChild(helpFrame)`


    The help frame is positioned at the bottom center of the screen. On top of it,
    you display a text label:


    `let textLabel = SKLabelNode(fontNamed: "Autodestruct BB")`


    `textLabel.fontColor = UIColor(red: 0, green: 0, blue: 0.4, alpha: 1)`


    `textLabel.fontSize = 24`


    `textLabel.text = help`


    `textLabel.horizontalAlignmentMode = .Center`


    `textLabel.verticalAlignmentMode = .Center`


    `textLabel.zPosition = 1`


    `helpFrame.addChild(textLabel)`


    The text label is a child of the help frame. In order to make sure it is shown
    on top of the help frame, you set it at a relative z position of 1\. Now, whenever
    a level is reset, you add an action that shows the help frame for 5 seconds:


    `helpFrame.runAction(SKAction.sequence([SKAction.unhide(),`


        `SKAction.waitForDuration(5), SKAction.hide()]))`


    If you take a look at the PenguinPairsFinal example belonging to this chapter,
    you’ll see that this same custom font is now used throughout the game, for example
    to show the level indices on the level buttons (see Figure [21-2](#A978-1-4842-0650-8_21_Chapter.html#Fig2)).
    You can clearly see that using a custom font makes the game look much more professional.


    ![A978-1-4842-0650-8_21_Fig2_HTML.jpg](A978-1-4842-0650-8_21_Fig2_HTML.jpg)


    Figure 21-2.


    The level menu using the custom font


    ## Resetting the Level


    After a player moves a couple of animals around, it can happen that the level
    can’t be solved anymore. Instead of having to quit and restart the game, let’s
    give the player a means to reset a level to its initial state.


    Thanks to the proper implementation of the `reset` method everywhere throughout
    the game object classes, resetting a level to its initial state is really easy.
    You have to call the `reset` method on all the game objects, and then you deal
    with resetting things in the `LevelState` class itself. The only thing you need
    to do there is set the `firstMoveMade` property to `false` so the player can view
    a hint again, and run the help frame action:


    `override func reset() {`


        `super.reset()`


        `firstMoveMade = false`


        `helpFrame.runAction(SKAction.sequence([SKAction.unhide(),`


            `SKAction.waitForDuration(5), SKAction.hide()]))`


    `}`


    Note


    There are many ways in which the Penguin Pairs game can be extended. For example,
    can you write code that determines whether a level is still solvable? You could
    extend the game by displaying a message to the user if that happens. You may have
    your own ideas about how the game could be improved. Feel free to try them by
    modifying and adding to the examples.'
  trans: "\n# 21. 完成企鹅配对游戏\n\n电子补充材料 本章的在线版本 (doi:[10.​1007/​978-1-4842-0650-8_​21](http://dx.doi.org/10.1007/978-1-4842-0650-8_21))\
    \ 包含补充材料，仅供授权用户使用。\n\n在本章中，你将完成企鹅配对游戏。首先，你将通过添加一个提示箭头和一个帮助覆盖层来完成用户界面，该覆盖层会在玩家开始每个关卡时显示几秒钟。然后，你将学习如何重置并进入下一关。最后，你将通过添加音效来完善游戏。\n\
    \n## 显示提示\n\n为了完成企鹅配对游戏，还需要添加几个功能。第一步，你需要能够在用户点击按钮时显示提示。提示由一个橙色箭头组成，该箭头会显示一秒钟。当你在\
    \ `LevelState` 初始化器中加载关卡时，你会从文本文件中读取提示位置和方向。然后，你创建一个 `SKSpriteNode` 实例，为其分配正确的精灵，并根据文本文件中的信息将其定位，如下所示：\n\
    \n```\nlet hintx = hintArr[0].toInt()!, hinty = hintArr[1].toInt()!\nhint = SKSpriteNode(imageNamed:\
    \ \"spr_arrow_hint_\\(hintArr[2])\")\nhint.zPosition = Layer.Scene2\nhint.position\
    \ = tileField.layout.toPosition(hintx, row: hinty)\nhint.hidden = true\nself.addChild(hint)\n\
    ```\n\n最初，提示箭头是隐藏的。为了在玩家点击提示按钮时临时显示箭头，你创建了一个存储为属性的动作：\n\n```\nlet hintVisibleAction\
    \ = SKAction.sequence([SKAction.unhide(),\n    SKAction.waitForDuration(1), SKAction.hide()])\n\
    ```\n\n最后，你扩展 `LevelState` 的 `handleInput` 方法以处理提示按钮被按下的事件：\n\n```\nif hintButton.tapped\
    \ {\n    hint.runAction(hintVisibleAction)\n}\n```\n\n提示按钮只有在可见时才能被按下，但在某些情况下它不应该可见，例如：\n\
    \n*   在玩家做出第一步移动后，提示按钮应该消失，重试按钮应该出现。\n*   如果玩家在选项菜单中选择了关闭提示，那么提示按钮应始终不可见。\n\n\
    对于第一种情况，你需要跟踪玩家何时做出了第一步移动。你在 `LevelState` 类中添加一个额外的属性 `firstMoveMade`。当你赋予动物速度时，这是在\
    \ `AnimalSelector` 类中完成的。一旦玩家点击了箭头并且动物开始移动，你就调用属于 `LevelState` 的 `applyFirstMoveMade`\
    \ 方法：\n\n```\nlet lvl = GameStateManager.instance.currentGameState as? LevelState\n\
    if animalVelocity != CGPoint.zeroPoint {\n    lvl?.applyFirstMoveMade()\n}\n```\n\
    \n`applyFirstMoveMade` 方法会隐藏提示按钮，取消隐藏重试按钮，并将 `firstMoveMade` 属性设置为 `true`：\n\n\
    ```\nfunc applyFirstMoveMade() {\n    self.hintButton.hidden = true\n    self.retryButton.hidden\
    \ = false\n    firstMoveMade = true\n}\n```\n\n在 `LevelState` 的 `updateDelta`\
    \ 方法中，你确保只在玩家尚未做出第一步移动时才改变提示按钮和重试按钮的可见性：\n\n```\nif !firstMoveMade {\n    self.hintButton.hidden\
    \ = !DefaultsManager.instance.hints\n    self.retryButton.hidden = DefaultsManager.instance.hints\n\
    }\n```\n\n从 `if` 指令中的两行代码可以看出，提示按钮仅在 `DefaultsManager.instance.hints` 为 `false`\
    \ 时才隐藏。重试按钮的隐藏状态始终与提示按钮的隐藏状态相反。因此，如果提示按钮可见，则重试按钮不可见，反之亦然。图 21-1 展示了提示箭头实际运行时的截图。\n\
    \n![A978-1-4842-0650-8_21_Fig1_HTML.jpg](img/A978-1-4842-0650-8_21_Fig1_HTML.jpg)\n\
    \n图 21-1.\n\n提示箭头向玩家展示第一步合理的移动。嗯……这确实很有帮助！\n\n## 显示帮助框\n\n当玩家开始玩某个关卡时，向他/她展示一些有用的信息也很有用。让我们使用自定义字体来显示帮助文本。你可以使用与图坦卡蒙之墓游戏中相同的过程，在项目中加载自定义字体（更多信息请参见第\
    \ 16 章）。第一步是在 `LevelState` 初始化器中添加一个帮助框：\n\n```\nhelpFrame.position = CGPoint(x:\
    \ 0, y: GameScreen.instance.bottom + helpFrame.center.y + 10)\nhelpFrame.zPosition\
    \ = Layer.Overlay\nself.addChild(helpFrame)\n```\n\n帮助框位于屏幕底部中央。在其上方，你显示一个文本标签：\n\
    \n```\nlet textLabel = SKLabelNode(fontNamed: \"Autodestruct BB\")\ntextLabel.fontColor\
    \ = UIColor(red: 0, green: 0, blue: 0.4, alpha: 1)\ntextLabel.fontSize = 24\n\
    textLabel.text = help\ntextLabel.horizontalAlignmentMode = .Center\ntextLabel.verticalAlignmentMode\
    \ = .Center\ntextLabel.zPosition = 1\nhelpFrame.addChild(textLabel)\n```\n\n文本标签是帮助框的子节点。为了确保它显示在帮助框之上，你将其相对\
    \ z 位置设置为 1。现在，每当关卡被重置时，你添加一个动作，使帮助框显示 5 秒钟：\n\n```\nhelpFrame.runAction(SKAction.sequence([SKAction.unhide(),\n\
    \    SKAction.waitForDuration(5), SKAction.hide()]))\n```\n\n如果你查看本章附带的 `PenguinPairsFinal`\
    \ 示例，你会发现现在整个游戏都使用了相同的自定义字体，例如在关卡按钮上显示关卡索引（见图 21-2）。你可以清楚地看到，使用自定义字体使游戏看起来更专业。\n\
    \n![A978-1-4842-0650-8_21_Fig2_HTML.jpg](img/A978-1-4842-0650-8_21_Fig2_HTML.jpg)\n\
    \n图 21-2.\n\n使用自定义字体的关卡菜单\n\n## 重置关卡\n\n在玩家移动了几只动物之后，关卡可能会变得无法解决。与其让玩家退出并重新开始游戏，不如让玩家有一种方法可以将关卡重置为初始状态。\n\
    \n得益于在游戏对象类中各处对 `reset` 方法的正确实现，将关卡重置为初始状态非常容易。你需要在所有游戏对象上调用 `reset` 方法，然后在 `LevelState`\
    \ 类本身中处理重置事宜。你唯一需要做的就是将 `firstMoveMade` 属性设置为 `false`，以便玩家可以再次查看提示，并运行帮助框动作：\n\
    \n```\noverride func reset() {\n    super.reset()\n    firstMoveMade = false\n\
    \    helpFrame.runAction(SKAction.sequence([SKAction.unhide(),\n        SKAction.waitForDuration(5),\
    \ SKAction.hide()]))\n}\n```\n\n注意\n\n有多种方法可以扩展企鹅配对游戏。例如，你能编写代码来判断一个关卡是否仍然可以解决吗？如果发生这种情况，你可以通过向用户显示一条消息来扩展游戏。你可能自己对如何改进游戏有想法。欢迎通过修改和添加示例来尝试实现它们。\n"
- fmt: "# Moving to the Next Level\n\nWhen the player finishes a level (hurray!),\
    \ you want to display an encouraging overlay (see Figure [21-3](#A978-1-4842-0650-8_21_Chapter.html#Fig3)).\
    \ When the player clicks or taps the screen, the next level is shown. The overlay\
    \ is added as a property to the `LevelState` class, and is initially set to hidden\
    \ in its initializer:\n\n![A978-1-4842-0650-8_21_Fig3_HTML.jpg](A978-1-4842-0650-8_21_Fig3_HTML.jpg)\n\
    \nFigure 21-3. The overlay shown to the player after they finish a level\n\n`var\
    \ levelFinishedOverlay = SKSpriteNode(imageNamed: \"spr_level_finished\")`\n\n\
    In the `updateDelta` method of `LevelState`, you check whether the pair list is\
    \ completed, and if so, you show the level finished overlay, and you play a sound:\n\
    \n```\nif levelFinishedOverlay.hidden && pairList.completed {\n    levelFinishedOverlay.hidden\
    \ = false\n    wonSound.play()\n}\n```\n\nIn the `handleInput` method of `LevelState`,\
    \ you check whether the player is still playing, or whether (s)he has finished\
    \ the level. In the latter case, you check whether the player has tapped the screen.\
    \ If so, you move to the next level. Moving to the next level is not that complicated,\
    \ but it involves updating the status of each level using the `DefaultManager`\
    \ class, finding out what the next level is, and then switching to that state.\
    \ This is the complete code:\n\n```\nif !levelFinishedOverlay.hidden {\n    if\
    \ !inputHelper.containsTap(levelFinishedOverlay.box) {\n        return\n    }\n\
    \    self.reset()\n    DefaultsManager.instance.setLevelStatus(self.levelNr, status:\
    \ \"solved\")\n    if GameStateManager.instance.has(\"level\\(levelNr+1)\") {\n\
    \        if DefaultsManager.instance.getLevelStatus(self.levelNr+1) == \"locked\"\
    \ {\n            DefaultsManager.instance.setLevelStatus(self.levelNr+1, status:\
    \ \"unsolved\")\n        }\n        GameStateManager.instance.switchTo(\"level\\\
    (levelNr+1)\")\n        GameStateManager.instance.reset()\n    } else {\n    \
    \    GameStateManager.instance.switchTo(\"level\")\n    }\n}\n```\n\nTake a look\
    \ at the `PenguinPairsFinal` example to see the complete `LevelState` class.\n\
    \n# Tutorials\n\nAs you’ve probably noticed, the first few levels of the Penguin\
    \ Pairs game also serve as a tutorial that explains how the game should be played.\
    \ When you create a game, players have to learn how to play it. If you don’t tell\
    \ the players about the challenges and goals, and how to control the game, they\
    \ might get frustrated and stop playing.\n\nSome games provide extensive help\
    \ files with long text explaining the story and the controls. Players no longer\
    \ want to read such documents or screens. They want to jump right into the game.\
    \ You have to educate players while they’re playing.\n\nYou can create a few specific\
    \ tutorial levels where the player can practice the controls without drastically\
    \ affecting the progress of the game itself. This approach is popular with casual\
    \ gamers as an introduction to your game. Seasoned gamers prefer to immediately\
    \ dive into the action. Be careful not to explain everything in the tutorial levels.\
    \ Only explain the basic controls. Explain more advanced controls during the game\
    \ as they’re required: for example, using simple pop-up messages, or in a visible\
    \ spot in a HUD.\n\nTutorials work best when they naturally integrate into the\
    \ game story. For example, the game character might start running around in their\
    \ safe home town, learning the basic movement controls. Next, the character practices\
    \ fighting with a few friends. And after, that the player goes into the woods\
    \ to try to shoot some birds with a bow. This will provide the practice needed\
    \ for the fights later in the game.\n\nYou should make sure your tutorial levels\
    \ work and that players remember the controls even if they put the game away for\
    \ a couple of days. Otherwise, they may never come back to the game.\n\n# Adding\
    \ Sound Effects\n\nTo finish the game, you should add sounds and music at the\
    \ right spots. As you may remember, one of the choices in the Options menu is\
    \ to change the background volume. You do that using the following line of code:\n\
    \n`backgroundMusic.volume = Float(musicSlider.value)`\n\nIn the `OptionMenuState`\
    \ class, you can find the `backgroundMusic` property, as well as the code to start\
    \ playing the music:\n\n```\nbackgroundMusic.looping = true\nbackgroundMusic.play()\n\
    ```\n\nSimilarly, you play sound effects at appropriate moments, just as you did\
    \ in the Tut’s Tomb and Painter games. For example, whenever a pair of penguins\
    \ is made, you play a sound effect (see the `updateDelta` method in the `Animal`\
    \ class):\n\n`pairSound.play()`\n\nIf you look at the `PenguinPairsFinal` example\
    \ belonging to this chapter, you can see how the complete game works and where\
    \ sound effects are played, and of course you can play the game yourself.\n\n\
    # Working in Teams\n\nThe first generation of games was created by programmers.\
    \ They did all the work. They designed the game mechanics, they created the art\
    \ (which consisted of just a few pixels), and they programmed the game in an Assembler\
    \ language. All the work focused on the programming. The game mechanics were often\
    \ adapted to what could be programmed efficiently.\n\nBut when more memory became\
    \ available, this slowly changed. Creating fancy-looking objects with a limited\
    \ number of pixels and colors became an art form, and pixel artists started to\
    \ play an important role in developing games. In the early days there were no\
    \ drawing programs (no computer was powerful enough for that). Pixelated characters\
    \ were designed on graph paper and then turned into hexadecimal numbers to be\
    \ put into the game code.\n\nWith the increase of computer power and storage media\
    \ like the CD-ROM, art became increasingly important, and the artists developed\
    \ with it. 3D graphics and animations became common, leading to new specialists\
    \ who could use the new tools and technologies developed to support such work.\
    \ Nowadays artists make up the majority of game production teams.\n\nAt some point,\
    \ designing the game became a separate job. Game mechanics were tuned to the interests\
    \ of user groups, and were based more and more on principles from psychology and\
    \ educational sciences. This required separate expertise. Stories assumed a crucial\
    \ role, leading to the inclusion of writers. And the teams were extended to include\
    \ producers, sound engineers, composers, and many other types of people. Today,\
    \ teams for top games can consist of hundreds of people. But without the programmers,\
    \ nothing would work.\n\n# A Few Final Notes\n\nIn this part of the book, you’ve\
    \ created a game that is quite a bit more complicated than the previous example\
    \ game, Tut’s Tomb. You’ve probably noticed that the number of classes has become\
    \ quite large, and you’re relying more and more on a certain design for the game\
    \ software. For example, you’re positioning game objects in a grid layout and\
    \ using a class to handle game states. On a more basic level, you assume that\
    \ game objects are responsible for handling their input and updating themselves.\
    \ You may not agree with some (or all) of these design choices. Perhaps, after\
    \ reading the book to this point, you’ve formed your own ideas about how game\
    \ software should be designed. This is a good thing. The design I propose in this\
    \ book isn’t the only way to do things. Designs can always be evaluated and improved,\
    \ or even thrown away and replaced by something entirely different. So, don’t\
    \ hesitate to look critically at the design I propose and try other designs. By\
    \ trying different approaches to solve a problem, you can better understand the\
    \ problem and become a better software developer as a result.\n\n# What You Have\
    \ Learned\n\nIn this chapter, you have learned the following:\n\n* How to show\
    \ a hint arrow and a help frame on the screen\n* How to reset a level to its initial\
    \ state and handle going to the next level"
  raw: '## Moving to the Next Level


    When the player finishes a level (hurray!), you want to display an encouraging
    overlay (see Figure [21-3](#A978-1-4842-0650-8_21_Chapter.html#Fig3)). When the
    player clicks or taps the screen, the next level is shown. The overlay is added
    as a property to the `LevelState` class, and is initially set to hidden in its
    initializer:


    ![A978-1-4842-0650-8_21_Fig3_HTML.jpg](A978-1-4842-0650-8_21_Fig3_HTML.jpg)


    Figure 21-3.


    The overlay shown to the player after they finish a level


    `var levelFinishedOverlay = SKSpriteNode(imageNamed: "spr_level_finished")`


    In the `updateDelta` method of `LevelState`, you check whether the pair list is
    completed, and if so, you show the level finished overlay, and you play a sound:


    `if levelFinishedOverlay.hidden && pairList.completed {`


        `levelFinishedOverlay.hidden = false`


        `wonSound.play()`


    `}`


    In the `handleInput` method of `LevelState`, you check whether the player is still
    playing, or whether (s)he has finished the level. In the latter case, you check
    whether the player has tapped the screen. If so, you move to the next level. Moving
    to the next level is not that complicated, but it involves updating the status
    of each level using the `DefaultManager` class, finding out what the next level
    is, and then switching to that state. This is the complete code:


    `if !levelFinishedOverlay.hidden {`


        `if !inputHelper.containsTap(levelFinishedOverlay.box) {`


            `return`


        `}`


        `self.reset()`


        `DefaultsManager.instance.setLevelStatus(self.levelNr, status: "solved")`


        `if GameStateManager.instance.has("level\(levelNr+1)") {`


            `if DefaultsManager.instance.getLevelStatus(self.levelNr+1) == "locked"
    {`


                `DefaultsManager.instance.setLevelStatus(self.levelNr+1, status: "unsolved")`


            `}`


            `GameStateManager.instance.switchTo("level\(levelNr+1)")`


            `GameStateManager.instance.reset()`


        `} else {`


            `GameStateManager.instance.switchTo("level")`


        `}`


    `}`


    Take a look at the PenguinPairsFinal example to see the complete `LevelState`
    class.


    Tutorials


    As you’ve probably noticed, the first few levels of the Penguin Pairs game also
    serve as a tutorial that explains how the game should be played. When you create
    a game, players have to learn how to play it. If you don’t tell the players about
    the challenges and goals, and how to control the game, they might get frustrated
    and stop playing.


    Some games provide extensive help files with long text explaining the story and
    the controls. Players no longer want to read such documents or screens. They want
    to jump right into the game. You have to educate players while they’re playing.


    You can create a few specific tutorial levels where the player can practice the
    controls without drastically affecting the progress of the game itself. This approach
    is popular with casual gamers as an introduction to your game. Seasoned gamers
    prefer to immediately dive into the action. Be careful not to explain everything
    in the tutorial levels. Only explain the basic controls. Explain more advanced
    controls during the game as they’re required: for example, using simple pop-up
    messages, or in a visible spot in a HUD.


    Tutorials work best when they naturally integrate into the game story. For example,
    the game character might start running around in their safe home town, learning
    the basic movement controls. Next, the character practices fighting with a few
    friends. And after, that the player goes into the woods to try to shoot some birds
    with a bow. This will provide the practice needed for the fights later in the
    game.


    You should make sure your tutorial levels work and that players remember the controls
    even if they put the game away for a couple of days. Otherwise, they may never
    come back to the game.


    ## Adding Sound Effects


    To finish the game, you should add sounds and music at the right spots. As you
    may remember, one of the choices in the Options menu is to change the background
    volume. You do that using the following line of code:


    `backgroundMusic.volume = Float(musicSlider.value)`


    In the `OptionMenuState` class, you can find the `backgroundMusic` property, as
    well as the code to start playing the music:


    `backgroundMusic.looping = true`


    `backgroundMusic.play()`


    Similarly, you play sound effects at appropriate moments, just as you did in the
    Tut’s Tomb and Painter games. For example, whenever a pair of penguins is made,
    you play a sound effect (see the `updateDelta` method in the `Animal` class):


    `pairSound.play()`


    If you look at the PenguinPairsFinal example belonging to this chapter, you can
    see how the complete game works and where sound effects are played, and of course
    you can play the game yourself.


    Working in Teams


    The first generation of games was created by programmers. They did all the work.
    They designed the game mechanics, they created the art (which consisted of just
    a few pixels), and they programmed the game in an Assembler language. All the
    work focused on the programming. The game mechanics were often adapted to what
    could be programmed efficiently.


    But when more memory became available, this slowly changed. Creating fancy-looking
    objects with a limited number of pixels and colors became an art form, and pixel
    artists started to play an important role in developing games. In the early days
    there were no drawing programs (no computer was powerful enough for that). Pixelated
    characters were designed on graph paper and then turned into hexadecimal numbers
    to be put into the game code.


    With the increase of computer power and storage media like the CD-ROM, art became
    increasingly important, and the artists developed with it. 3D graphics and animations
    became common, leading to new specialists who could use the new tools and technologies
    developed to support such work. Nowadays artists make up the majority of game
    production teams.


    At some point, designing the game became a separate job. Game mechanics were tuned
    to the interests of user groups, and were based more and more on principles from
    psychology and educational sciences. This required separate expertise. Stories
    assumed a crucial role, leading to the inclusion of writers. And the teams were
    extended to include producers, sound engineers, composers, and many other types
    of people. Today, teams for top games can consist of hundreds of people. But without
    the programmers, nothing would work.


    ## A Few Final Notes


    In this part of the book, you’ve created a game that is quite a bit more complicated
    than the previous example game, Tut’s Tomb. You’ve probably noticed that the number
    of classes has become quite large, and you’re relying more and more on a certain
    design for the game software. For example, you’re positioning game objects in
    a grid layout and using a class to handle game states. On a more basic level,
    you assume that game objects are responsible for handling their input and updating
    themselves. You may not agree with some (or all) of these design choices. Perhaps,
    after reading the book to this point, you’ve formed your own ideas about how game
    software should be designed. This is a good thing. The design I propose in this
    book isn’t the only way to do things. Designs can always be evaluated and improved,
    or even thrown away and replaced by something entirely different. So, don’t hesitate
    to look critically at the design I propose and try other designs. By trying different
    approaches to solve a problem, you can better understand the problem and become
    a better software developer as a result.


    ## What You Have Learned


    In this chapter, you have learned the following:


    *   How to show a hint arrow and a help frame on the screen

    *   How to reset a level to its initial state and handle going to the next level'
