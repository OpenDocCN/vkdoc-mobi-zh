    # Introduction


    Swift, the new programming language that replaces Objective C, was announced by
    Apple on June 2, 2014. Since then, there have been many updates to the language.
    At the time of writing of this book, we are at version 2. Swift is a very well-structured
    programming language that takes many features from existing modern languages such
    as C#, Haskell, and Python, and it introduces a few new features itself.


    If you want to develop for the iOS, watchOS, or OS X platforms, you must learn
    Swift. This book teaches you the Swift language in depth; at the same time, you’ll
    learn how to develop games for the iOS platform. Because this book was written
    with game development as its context, you will learn that many of the new features
    are very useful for designing game software. The book builds on the SpriteKit
    framework and shows you how to develop apps that are ready to be put in the App
    Store and to be played by everyone (and hopefully will make you a lot of money
    in the process)!


    While reading this book, you will develop four games. Each of the four games uses
    professionally-developed artwork. Each game builds on the knowledge obtained while
    developing the previous one, going from a simple point-and-shoot game and a physics-based
    reaction game, to a puzzle game, and in the end, a full-fledged platform game
    with animation, intelligent enemies, and much more. As you’ll see, building games
    can be as much fun as playing them.


    Even though this book teaches you Swift in the context of game development, after
    reading the book you will be able to use the skills you acquired to develop any
    kind of application for Apple devices.


    ## Who This Book Is For


    This book is for anyone who has an interest in learning how to create games. If
    you have no prior (Swift) programming experience, don’t worry. This book teaches
    you all you need to know. If you already know how to program, then this book will
    still be interesting for you. I show you how to develop games using the latest
    features of the Swift 2.0 language and the SpriteKit framework. The book develops
    four different games for the iOS platform. The code for these games is carefully
    developed, taking into account the proper way of organizing code and making it
    clean, robust, and easily extensible.


    ## Structure of This Book


    Each chapter in this book has its own collection of example programs. You can
    find the examples on the web site belonging to this book. I explain all the Swift
    programming concepts based on these examples. Throughout the book you will find
    many game design and development tips, such as how and when to use menus or tutorials,
    working in a team with artists, and publishing and marketing tips.


    The book is globally divided into five parts. The following is an overview of
    what each part is about.


    ### [Part I](http://dx.doi.org/10.1007/978-1-4842-0650-8_Part1)


    This part provides an overview of the Swift programming language, along with an
    introduction to its main features. I introduce the most important game programming
    structure—the game loop. You will see how to use `SpriteKit`, which is the framework
    provided by Apple for developing Swift games. You will learn about variables and
    data structures that are useful for representing a game world, and you will see
    how to include game assets such as sprites and sounds in your programs.'
