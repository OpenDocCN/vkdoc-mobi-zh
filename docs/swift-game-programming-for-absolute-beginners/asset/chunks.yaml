    This chapter will show you how to create a game world by storing information in
    memory. I will introduce basic types and variables and how they can be used to
    store or change information. Next, you will see how to store more complicated
    information in objects that consist of member variables and methods.


    ## Basic Types and Variables


    The previous chapters discussed memory a couple of times. You have seen how to
    execute a simple instruction like `backgroundColor = UIColor.blueColor()` to set
    the background color of the app screen to a certain value. In this chapter’s example,
    you will use memory to store information temporarily, in order to remember the
    results of a few simple calculations.


    ### Types


    Types, or data types, represent different kinds of structured information. The
    previous examples used different kinds of information that were passed as parameters
    to functions. For example, the function `print` requires text, the `update` method
    in the `BasicGame` example needs the current system time, and the `printData`
    function from the example in [Chapter 1](#A978-1-4842-0650-8_1_Chapter.html) doesn’t
    need any information at all in order to perform its task. The compiler can distinguish
    between all these different kinds of information and, in some cases, even convert
    information of one type to another. For example, look again at the following Swift
    instruction:


    ```

    print(currentTime)

    ```


    The `print` function wants text, but what is provided is a time value in seconds,
    which isn’t text but a number. In this case, the Swift compiler is able to automatically
    translate this number into printable text. However, in general, Swift is a rather
    strict language, so automatic conversion between different types of information
    is generally not allowed. Most of the time, you have to explicitly tell the compiler
    that a conversion between types needs to be done. Such a type conversion is also
    called a cast.


    What is the reason for having a strict policy with regard to type conversions?
    For one thing, clearly defining which type a function or method expects as a parameter
    makes it easier for other programmers to understand how to use the function. Look
    at the following header as an example:


    ```

    func playAudio(audioFileId)

    ```


    By only looking at this header, you can’t be sure if `audioFileId` is a number
    or text. That why in Swift, you have to indicate what kind of parameter is expected:


    ```

    func playAudio(audioFileId: Int)

    ```


    You can see that in this header, not only a name is provided, but also a type
    that belongs to this name. The type in this case is `Int`, which in Swift means
    an integer number.'
