    problem is to simply copy the code written in `updateBall` three times, and replace
    ball for `ball2`, `ball3`, and `ball4` in each copy. This is not an ideal solution.
    For one, copying code means you have to deal with version management problems.
    For example, what if you find a bug in the `updateBall` method code? You have
    to make sure you copy the improved code to the other `Ball` objects. If you forget
    one copy, the bug is still there when you thought you solved it. Another problem
    is that this approach simply doesn’t scale up very well. What happens if you want
    to extend the game such that the player can shoot 20 balls at the same time? Do
    you copy the code 20 times? Also, that the bigger your Swift files become, the
    longer it takes for the compiler to translate them into machine code. Finally,
    duplicated code looks ugly, clutters up your source code files, and makes it hard
    to find other sections of the code that you need, leading to excessive scrolling
    and a general reduction of your coding efficiency.


    A slightly less naïve way of addressing this problem is by supplying the `Ball`
    object as a parameter to the `updateBall` method:


    `func updateBall(aBall: Ball) {`


    `if !aBall.node.hidden {`


    `aBall.velocity.x *= 0.99`


