    it from the x and y indices. This works because normalizing a vector results in
    a vector of length 1 (unit length). Because an animal is only allowed to move
    in either the x or y direction and not diagonally, you end up with a vector (1,
    0) in the first example and (0, -1) in the second example. So you set the position
    of the animal to the position of the tile it just moved out of, as follows:


    `let tileField = childNodeWithName("//tileField") as! TileField`


    `velocity = CGPoint.normalize(velocity)`


    `let (currcol, currrow) = currentBlock`


    `position = tileField.layout.toPosition(currcol  - Int(velocity.x),`


    `row: currrow - Int(velocity.y))`


    Finally, you set the animal’s velocity to zero so it stays in its new position:


    `velocity = CGPoint.zeroPoint`'
  trans: "\n### 更新动物\n\n动物与其他游戏对象的交互是在 `Animal` 类的 `updateDelta` 方法中完成的。之所以主要在 `Animal`\
    \ 类中处理，是为了让每个动物自行处理其交互。如果你向游戏中添加多个动物（就像现在这样），则无需修改处理交互的代码。默认情况下，你会调用父类的 `updateDelta`\
    \ 方法。虽然技术上并非必须，但这样做仍然是个好主意。如果将来你决定向 `Animal` 节点添加其他子节点，就能避免潜在的更新 bug。接着，通过将速度乘以经过的时间（使用新增的\
    \ `CGPoint` 运算符扩展！）来计算动物的新位置。如果动物不可见或速度为零，则无需进行其他操作。因此，`updateDelta` 方法中的起始代码如下：\n\
    \n```\nsuper.updateDelta(delta)\n\nposition += velocity * CGFloat(delta)\n\nif\
    \ hidden || velocity == CGPoint.zeroPoint {\n\nreturn\n\n}\n```\n\n现在，你需要检查动物是否与其他游戏对象发生碰撞。由于在\
    \ `updateDelta` 方法起始位置进行了检查，因此仅对可见且正在移动的动物执行此操作。\n\n如果动物正在移动，你需要知道它当前正移入哪个瓦片。然后，你就可以检查该瓦片的类型，以及该瓦片上是否有其他游戏对象。为此，你需要向\
    \ `Animal` 类添加一个名为 `currentBlock` 的属性。为了计算动物正移入的瓦片，你需要计算动物周围包围盒的边缘。如果动物向左移动，就取左边缘；向下移动，则取底边缘。以下代码包含了\
    \ `currentBlock` 属性的完整声明与实现：\n\n```\nvar currentBlock: (Int, Int) {\n    get {\n\
    \        var p = CGPoint()\n        if let tileField = childNodeWithName(\"//tileField\"\
    ) as? TileField {\n            var edgepos = position\n            if velocity.x\
    \ > 0 {\n                edgepos.x += CGFloat(tileField.layout.cellWidth) / 2\n\
    \            } else if velocity.x < 0 {\n                edgepos.x -= CGFloat(tileField.layout.cellWidth)\
    \ / 2\n            } else if velocity.y > 0 {\n                edgepos.y += CGFloat(tileField.layout.cellHeight)\
    \ / 2\n            } else if velocity.y < 0 {\n                edgepos.y -= CGFloat(tileField.layout.cellHeight)\
    \ / 2\n            }\n            return tileField.layout.gridLocation(edgepos)\n\
    \        }\n        return (-1, -1)\n    }\n}\n```\n\n下一步是找出动物正移入的瓦片类型。为此，你可以使用\
    \ `TileField` 类中的 `getTileType` 方法。该方法能根据给定的瓦片位置获取瓦片的类型。以下是完整的方法：\n\n```\nfunc\
    \ getTileType(col: Int, row: Int) -> TileType {\n    if let obj = layout.at(col,\
    \ row: row) as? Tile {\n        return obj.type\n    }\n    return .Background\n\
    }\n```\n\n现在，你可以返回到 `Animal` 类的 `updateDelta` 方法中，检查动物是否从瓦片场中掉落。如果是，则隐藏该动物，并将其速度设为零，以确保动物在隐藏时不会无限期地继续移动：\n\
    \n```\nlet tileField = childNodeWithName(\"//tileField\") as! TileField\nlet (targetcol,\
    \ targetrow) = currentBlock\n\nif tileField.getTileType(targetcol, row: targetrow)\
    \ == .Background {\n    self.hidden = true\n    self.velocity = CGPoint.zeroPoint\n\
    }\n```\n\n另一种情况是动物撞上了一堵墙瓦片。如果是这种情况，它必须停止移动：\n\n```\nelse if tileField.getTileType(targetcol,\
    \ row: targetrow) == .Wall {\n    self.stopMoving()\n}\n```\n\n停止移动并不像听起来那么容易。你可以简单地将动物的速度设为零，但这样动物会有一部分停留在另一个瓦片中。你需要将动物放置在其刚刚离开的那个瓦片上。`stopMoving`\
    \ 方法正是用来实现这个功能的。在该方法中，首先需要计算出前一个瓦片的位置。你可以从动物当前正移入的瓦片的 x 和 y 索引入手。这些索引作为参数传入。例如，如果动物的速度向量是\
    \ (500, 0)（向右移动），则需要将 x 索引减去 1，以得到动物移出瓦片的 x 索引。如果动物的速度向量是 (0, -500)（向上移动），则需要将\
    \ y 索引加上 1，以得到动物移出瓦片的 y 索引。你可以通过归一化速度向量，然后将其从 x 和 y 索引中减去来实现这一点。这是可行的，因为归一化向量会得到一个长度为\
    \ 1 的向量（单位向量）。由于动物只能沿 x 或 y 方向移动，不能斜向移动，因此第一个例子得到的向量是 (1, 0)，第二个例子是 (0, -1)。所以，你可以将动物的位置设置为其刚刚离开的瓦片位置，如下所示：\n\
    \n```\nlet tileField = childNodeWithName(\"//tileField\") as! TileField\nvelocity\
    \ = CGPoint.normalize(velocity)\nlet (currcol, currrow) = currentBlock\nposition\
    \ = tileField.layout.toPosition(currcol - Int(velocity.x),\nrow: currrow - Int(velocity.y))\n\
    ```\n\n最后，将动物的速度设为零，使其保持在新位置：\n\n```\nvelocity = CGPoint.zeroPoint\n```\n"
- fmt: "# Meeting Other Game Objects\n\nYou still need to check whether the animal\
    \ collides with another game object, such as another penguin or a shark. There\
    \ are a few special types of animals:\n\n- Multicolored penguins\n- Empty boxes\n\
    - Seals\n- Sharks\n\nYou can add a few methods to the `Animal` class to determine\
    \ whether you’re dealing with these special cases. For example, you’re dealing\
    \ with a seal if the type is “s”:\n\n```\nvar isSeal: Bool {\n    get {\n    \
    \    return type == \"s\" && !boxed\n    }\n}\n```\n\nAnd you’re dealing with\
    \ an empty box if the type is “@” and it is boxed:\n\n```\nvar isEmptyBox: Bool\
    \ {\n    get {\n        return type == \"@\" && boxed\n    }\n}\n```\n\nThe `Animal`\
    \ class contains a few other properties that help establish the type of an animal.\
    \ Have a look at the `PenguinPairs5` example program.\n\nFirst, you need to check\
    \ whether there is another animal at the tile the animal is moving into. To do\
    \ that, you retrieve the level and use the `findAnimalAtPosition` method from\
    \ the `LevelState` class to find out whether there is another animal:\n\n```\n\
    let lvl = GameStateManager.instance.currentGameState as? LevelState\n\nif let\
    \ a = lvl?.findAnimalAtPosition(targetcol, row: targetrow) {\n    // handle the\
    \ animal interaction\n}\n```\n\nThe `findAnimalAtPosition` method is straightforward;\
    \ have a look at the method in the example code belonging to this chapter. First,\
    \ if the other animal isn’t visible, you don’t have to do anything, and you can\
    \ return from the method:\n\n```\nif a.hidden {\n    return\n}\n```\n\nThe first\
    \ case you solve is if the penguin is colliding with a seal. In that case, the\
    \ penguin doesn’t have to do anything—it simply stops moving:\n\n```\nif a.isSeal\
    \ {\n    stopMoving()\n}\n```\n\nThe next case is if the animal collides with\
    \ an empty box. If that is the case, you make the moving animal invisible and\
    \ you move the animal inside the box by changing the type of the empty box to\
    \ the boxed version of the animal that is moving, which is represented by the\
    \ uppercase version of the type character of that animal:\n\n```\nelse if a.isEmptyBox\
    \ {\n    self.hidden = true\n    a.changeTypeTo(self.type.uppercaseString)\n}\n\
    ```\n\nThe `changeTypeTo` method is a helper method that changes the type of the\
    \ animal and updates the texture accordingly. Here is the complete method; it\
    \ looks very similar to the code used in the initializer of the class:\n\n```\n\
    func changeTypeTo(type: String) {\n    boxed = type.uppercaseString == type\n\
    \    var spriteName = \"spr_animal_\\(type)\"\n    if boxed && type != \"@\" {\n\
    \        spriteName = \"spr_animal_boxed_\\(type.lowercaseString)\"\n    }\n \
    \   texture = SKTexture(imageNamed: spriteName)\n    self.type = type\n}\n```\n\
    \nIf the type of the animal `a` is the same as the type of this animal, or either\
    \ one of the animals is a multicolored penguin, you have a valid pair of penguins\
    \ and make both penguins invisible:\n\n```\nelse if type.lowercaseString == a.type.lowercaseString\
    \ || self.isMulticolor || a.isMulticolor {\n    a.hidden = true\n    self.hidden\
    \ = true\n}\n```\n\nYou also have to display an extra pair at the top left on\
    \ the screen, but you deal with that in the next section.\n\nIf a penguin encounters\
    \ a shark, the penguin is eaten and the shark leaves the playing field with a\
    \ full belly. In the game, this means the penguin stops moving (forever) and both\
    \ the shark and the penguin become invisible. The following lines of code achieve\
    \ this:\n\n```\nelse if a.isShark {\n    a.hidden = true\n    self.hidden = true\n\
    \    stopMoving()\n}\n```\n\nFinally, in all other cases, the penguin simply stops\
    \ moving:\n\n```\nelse {\n    self.stopMoving()\n}\n```\n\n# Maintaining the Number\
    \ of Pairs\n\nIn order to maintain the number of pairs and draw it nicely on the\
    \ screen, you add another class called `PairList` to the game. The `PairList`\
    \ class inherits from the `SKNode` class. The pair list is drawn on top of a frame,\
    \ which is added to the level in the `LevelState` constructor:\n\n```\nlet goalFrame\
    \ = SKSpriteNode(imageNamed: \"spr_frame_goal\")\ngoalFrame.zPosition = Layer.Overlay\n\
    goalFrame.position = GameScreen.instance.topLeft + CGPoint(x: 10 + goalFrame.center.x,\
    \ y: -40)\nself.addChild(goalFrame)\n```\n\nThe pair list shows a row of sprites\
    \ indicating the number of required and completed pairs. Because you want to indicate\
    \ the color of each pair that was made, you store this information in an array\
    \ as string values, each representing a pair type. This array is a property of\
    \ the `PairList` class:\n\n```\nvar colors: [String] = []\n```\n\nYou pass along\
    \ a parameter, `nrPairs`, to the initializer of the `PairList` class so you know\
    \ how large the array should be. You then fill the array so that each element\
    \ is set to the empty slot (which is represented by the sprite “spr_pairs_e”):\n\
    \n```\nfor var i = 0; i < nrPairs; i++ {\n    let pairSprite = SKSpriteNode(imageNamed:\
    \ \"spr_pairs_e\")\n    pairSprite.position = CGPoint(x: CGFloat(i) * (pairSprite.size.width\
    \ + 5), y: 0)\n    self.addChild(pairSprite)\n    colors.append(\"e\")\n}\n```\n\
    \nYou also add a method named `addPair` to the class, which finds the first occurrence\
    \ of an empty pair (type “e”) in the array and replaces it with the pair type\
    \ that was passed along as a parameter:\n\n```\nfunc addPair(color: String) {\n\
    \    for var i = 0; i < colors.count; i++ {\n        if colors[i] == \"e\" {\n\
    \            let sprite = children[i] as! SKSpriteNode\n            sprite.texture\
    \ = SKTexture(imageNamed: \"spr_pairs_\\(color)\")\n            colors[i] = color\n\
    \            return\n        }\n    }\n}\n```\n\nThis example uses a `for` instruction\
    \ to increment the `i` variable until you find an empty spot (i.e. the element\
    \ in the `colors` array equals “e”).\n\nNow you add a useful property to check\
    \ whether the player has completed the level. The level is completed if the list\
    \ of pair colors no longer contains any value of “e” (meaning all empty spots\
    \ have been replaced by a pair):\n\n```\nvar completed: Bool {\n    get {\n  \
    \      for color in colors {\n            if color == \"e\" {\n              \
    \  return false\n            }\n        }\n        return true\n    }\n}\n```\n\
    \nNow that you have the `PairList` class, you can create an instance of it in\
    \ the `LevelState` class, add it to the game world, and position it near the top\
    \ left of the screen:\n\n```\nlet pairList = PairList(nrPairs: nrPairs)\npairList.name\
    \ = \"pairList\"\npairList.zPosition = Layer.Overlay1\npairList.position = GameScreen.instance.topLeft\
    \ + CGPoint(x: 130, y: -40)\nself.addChild(pairList)\n```\n\nAnd in the `Animal`\
    \ class, you add a pair to the list if an animal encounters another penguin of\
    \ the same color or one of the two animals is a multicolored penguin:\n\n```\n\
    else if type.lowercaseString == a.type.lowercaseString || self.isMulticolor\n\
    \    || a.isMulticolor {\n    a.hidden = true\n    self.hidden = true\n    let\
    \ pairList = childNodeWithName(\"//pairList\") as! PairList\n    pairList.addPair(type)\n\
    }\n```\n\nFor the complete example, see the `PenguinPairs5` program belonging\
    \ to this chapter. Figure [20-2](#A978-1-4842-0650-8_20_Chapter.html#Fig2) shows\
    \ a screenshot of a level where five pairs need to be made. In the next chapter,\
    \ you will add the final touches to the Penguin Pairs game, such as showing an\
    \ overlay when the level is completed and showing a hint arrow.\n\n![A978-1-4842-0650-8_20_Fig2_HTML.jpg](A978-1-4842-0650-8_20_Fig2_HTML.jpg)\n\
    \n**Figure 20-2.** A level of Penguin Pairs game. The goal is to make five pairs\
    \ of yellow penguins\n\n# What You Have Learned\n\nIn this chapter, you have learned\
    \ the following:\n\n- How to define operator behavior for types such as `CGPoint`\n\
    - How to program a game object selector\n- How to model interactions between different\
    \ kinds of game objects\n- How to maintain the number of pairs made by the player"
