    On game-development teams, the programmer normally isn’t responsible for the design
    of the game, but it’s still very useful to have a basic understanding of this
    process. The programmer must turn the game design into code and must be able to
    advise the designer about what will work and what will be difficult to achieve.
    For this collaboration to be successful, everyone has to speak the same language.


    Designing a game primarily consists of defining the game mechanics, the setting
    of the game, and choosing the game levels. Game mechanics involve such things
    as the rules of the game, the way players control the game, the goals and challenges,
    and the reward structure. Psychology and educational science play an important
    role here. They help you understand how players get in the flow (the mood in which
    they’re fully committed to playing the game); how goals, challenges, and rewards
    can support each other; and how to vary and adapt the game’s difficulty.


    The game’s setting deals with the story, the characters, and the virtual world
    in which the game takes place. A good story can be a strong motivator for players,
    and discovering the story while playing can be a very satisfying task. Characters
    need to evoke empathy from the player to give meaning to the tasks that must be
    performed. And the game world enhances these aspects and adapts the game to certain
    demographics.


    Level design is sometimes done by special level designers, but in smaller teams
    it’s often the responsibility of the game designer. Careful level design leads
    to a good learning curve. It keeps the player challenged and motivated, and it
    should result in pleasant surprises.


    Many books have been written about game design, and you’re strongly encouraged
    to read some of them. You can also find lots of information on all aspects of
    game development on sites like [`www.gamasutra.com`](http://www.gamasutra.com/)
    .


    ## What You Have Learned


    In this chapter, you have learned the following:


    *   How to add a HUD and overlays to the game

    *   How to define a simple button that shows a frame

    *   How to deal with a few different game states such as a title screen and a
    Game Over state


    # 16. Finishing the Tut’s Tomb Game


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​16](http://dx.doi.org/10.1007/978-1-4842-0650-8_16))
    contains supplementary material, which is available to authorized users.


    In this chapter, you will finish the Tut’s Tomb game. As a first step, you will
    add a score indicator to the game, using a custom game font. Second, you will
    add a nice visual effect by showing glitter on the treasures in the game. Finally,
    you will add sound and music. Take a look at the TutsTombFinal game example. This
    contains all the code explained in this chapter.'
  trans: "\n## 叠加层\n\n向玩家呈现信息的一种非常常见的方式是使用叠加层。叠加层本质上是可以显示在游戏世界之上的图像，用于呈现信息或提供用户界面，例如菜单、小地图、状态信息等。上一节介绍的帮助框是叠加层的另一个示例。\n\
    \n叠加层可以呈现全新的游戏状态（例如游戏结束叠加层），或者它们可以通过向玩家提供信息来补充游戏世界。例如，许多策略游戏会提供关于已选单位数量、可用资源、进行中的建造过程、已收集物品等信息。这类叠加层通常一直显示在屏幕上，它们合起来被称为平视显示器（HUD）。《图坦卡蒙之墓》有一个非常基础的\
    \ HUD：它由一个显示当前分数的框（你将在下一章中添加）和一个玩家可以点击以查看帮助信息框的帮助按钮组成。\n\n除了 HUD 之外，当墓室完全被宝藏填满时，你还需要显示一个游戏结束叠加层。你需要将此叠加层添加到游戏世界中，并将其隐藏状态设置为\
    \ `true`：\n\n```swift\nvar gameover = SKSpriteNode(imageNamed: \"spr_gameover\"\
    )\nself.addChild(gameover)\ngameover.zPosition = Layer.Overlay2\ngameover.hidden\
    \ = true\n```\n\n该精灵的原点是其中心点，游戏场景的原点也在中心。后者是通过在 `GameScene` 类中添加以下代码行实现的：\n\n\
    ```swift\nanchorPoint = CGPoint(x: 0.5, y: 0.5)\n```\n\n这样，游戏结束叠加层就会自动完美地居中显示在屏幕中央。你只需要扩展\
    \ `GameWorld` 类，以便在需要时显示该叠加层。首先，你需要检查游戏何时真正结束，即墓室完全被填满的情况。那么如何衡量这一点呢？一个简单的解决方案是扩展处理物理接触的方法。如果两个宝藏对象发生接触，并且其中任何一个的\
    \ Y 轴位置高于某个阈值，则意味着墓室可能已经相当满了，否则碰撞会发生在屏幕中较低的位置。在 `didBeginContact` 方法中，以下 `if`\
    \ 指令检查了这一点：\n\n```swift\nif firstBody?.position.y > 400 || secondBody?.position.y\
    \ > 400 {\n    gameover.hidden = false\n    self.removeAllActions()\n}\n```\n\n\
    如果游戏结束，叠加层变为可见，并且所有动作都被移除，这样宝藏就不会再掉落了。\n\n不过，这个解决方案还不完美。玩家可以拖住一个宝藏并将其保持在烟囱下方。掉落的宝藏会与玩家拖住的宝藏发生碰撞，这将导致游戏结束事件，即使墓室可能完全空着。解决这个问题的一个简单方法是，当宝藏达到略低于游戏结束阈值的某个阈值时，就禁止玩家拖动它。这可以通过扩展\
    \ `Treasure` 类的 `handleInput` 方法来实现，如下所示：\n\n```swift\nif position.y >= 200 {\n\
    \    touchid = nil\n    if physicsBody?.velocity.dy >= 0 {\n        physicsBody?.velocity\
    \ = CGVector.zeroVector\n    }\n    return\n}\n```\n\n如果 Y 轴位置大于阈值 200，你通过将触摸\
    \ ID 设为 `nil` 来停止拖动宝藏。你需要处理的另一件事是玩家以高速向上拖动宝藏。为了避免这种情况，如果宝藏正在向上移动，你将物理体的速度设为零。你可以通过检查物理体速度的\
    \ `dy` 属性来衡量这一点。\n\n在 `GameWorld` 的 `handleInput` 方法中，你需要检查游戏结束叠加层是否可见。如果是这样，玩家可以点击屏幕来重新开始游戏：\n\
    \n```swift\nif !gameover.hidden {\n    if inputHelper.hasTapped {\n        gameover.hidden\
    \ = true\n        self.reset()\n        self.runAction(totalAction)\n    }\n}\n\
    ```\n\n你需要重写 `reset` 方法，因为在游戏重新开始时需要进行一些额外的工作。特别是，你必须清空宝藏节点，使墓室再次为空，并将计数器重置为 0，以便游戏从有限的宝藏范围开始。此外，你还需要调用父类的\
    \ `reset` 方法，以便重置游戏世界中的所有游戏对象：\n\n```swift\noverride func reset() {\n    super.reset()\n\
    \    self.treasures.removeAllChildren()\n    self.counter = 0\n}\n```\n\n最后需要做的事情是确保在游戏结束时不再更新游戏世界。这意味着要对\
    \ `GameWorld` 的 `updateDelta` 方法进行另一次更改，如下所示：\n\n```swift\nif titleScreen.hidden\
    \ && helpframe.hidden && gameover.hidden {\n    super.updateDelta(delta)\n}\n\
    ```\n\n图 15-3 展示了游戏结束状态。\n\n![A978-1-4842-0650-8_15_Fig3_HTML.jpg](img/A978-1-4842-0650-8_15_Fig3_HTML.jpg)\n\
    \n**图 15-3.** 太糟糕了…… 游戏设计\n\n在游戏开发团队中，程序员通常不负责游戏的设计，但对这个过程有基本的了解仍然非常有用。程序员必须将游戏设计转化为代码，并且必须能够就哪些内容可行、哪些难以实现向设计师提供建议。为了使这种协作成功，每个人都必须使用相同的语言。\n\
    \n游戏设计主要包括定义游戏机制、游戏设定和选择游戏关卡。游戏机制涉及游戏规则、玩家控制游戏的方式、目标和挑战以及奖励结构等方面。心理学和教育学在此扮演着重要角色。它们帮助你理解玩家如何进入心流状态（他们全身心投入游戏的心境）；目标、挑战和奖励如何相互支持；以及如何变化和调整游戏难度。\n\
    \n游戏设定涉及故事、角色以及游戏发生的虚拟世界。一个好的故事可以是玩家的强大动力，而在游戏过程中探索故事可以是一项非常令人满足的任务。角色需要唤起玩家的同理心，从而赋予必须完成的任务以意义。游戏世界则强化了这些方面，并使游戏适应特定的人群。\n\
    \n关卡设计有时由专门的关卡设计师完成，但在较小的团队中，这通常是游戏设计师的责任。精心的关卡设计会带来良好的学习曲线。它能让玩家保持挑战和动力，并且应该产生令人愉快的惊喜。\n\
    \n关于游戏设计已经出版了许多书籍，强烈建议你阅读其中一些。你也可以在 [www.gamasutra.com](http://www.gamasutra.com/)\
    \ 等网站上找到大量关于游戏开发各方面的信息。\n\n## 本章所学内容\n\n在本章中，你学习了以下内容：\n\n*   如何向游戏添加 HUD 和叠加层\n\
    *   如何定义一个显示框架的简单按钮\n*   如何处理几种不同的游戏状态，例如标题画面和游戏结束状态\n\n# 16. 完成《图坦卡蒙之墓》游戏\n\n\
    电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-0650-8_16](http://dx.doi.org/10.1007/978-1-4842-0650-8_16))\
    \ 包含补充材料，仅供授权用户使用。\n\n在本章中，你将完成《图坦卡蒙之墓》游戏。第一步，你将使用自定义游戏字体向游戏添加一个分数指示器。第二步，你将通过在游戏中的宝藏上显示闪光效果来添加一个漂亮的视觉效果。最后，你将添加声音和音乐。请查看\
    \ `TutsTombFinal` 游戏示例。它包含了本章中解释的所有代码。\n"
- fmt: "# Adding a Score\n\nIn Tut’s Tomb, every time two treasures of the same type\
    \ collide, they disappear from the screen and the player gets points. You need\
    \ to display those points somewhere on the screen. In this game, the score is\
    \ shown in the top left part of the screen. In the `GameWorld` class, you add\
    \ a `scoreObj` property that will represent the node for maintaining and displaying\
    \ the current score. The type of this property is `Score`, which is a class that\
    \ will be discussed in this chapter. When the game world is set up, the `Score`\
    \ instance is positioned in the top left of the screen (with a top and side margin),\
    \ and is added to the `GameWorld` node like so:\n\n```\nvar scorepos = GameScene.world.topLeft()\n\
    scorepos.x += scoreObj.sprite.size.width/2 + 10\nscorepos.y -= scoreObj.sprite.size.height/2\
    \ + 10\nscoreObj.position = scorepos\nself.addChild(scoreObj)\n```\n\nThe `Score`\
    \ class is a subclass of `GameObjectNode`. It contains a sprite, a label to display\
    \ the score, and an integer property to keep track of the current score. In the\
    \ class initializer, the `sprite` and `label` properties are positioned and added\
    \ to the node:\n\n```\nsprite.zPosition = Layer.Overlay\nself.addChild(sprite)\n\
    label.position = CGPoint(x: 100, y: 0)\nlabel.zPosition = Layer.Overlay1\nlabel.fontColor\
    \ = UIColor.blackColor()\nlabel.fontSize = 20\nlabel.verticalAlignmentMode = .Center\n\
    label.horizontalAlignmentMode = .Right\nlabel.text = \"0\"\nself.addChild(label)\n\
    ```\n\nThe label is initialized with a font color and size, as well as an alignment.\
    \ The alignment indicates how the text is displayed with respect to the label\
    \ position, which is (100, 0). The vertical alignment mode is “center.” This means\
    \ that the text is displayed such that the vertical middle of the text is at y-position\
    \ 0, local to the score node object to which the text belongs. The horizontal\
    \ alignment mode is “right,” which results in the text being right-aligned. In\
    \ terms of positioning, this means that the local x-position (which is 100) indicates\
    \ the right edge of the label text. There are a few other options for aligning\
    \ text. For example, you can vertically align text at the top, center, bottom,\
    \ or baseline (the latter means the virtual line on which the text is written,\
    \ which is different from bottom alignment, since depending on the font used,\
    \ some characters may stick out below the baseline, such as the `g` or the `p`\
    \ character). Play around with the various alignment options and label positioning\
    \ to see how it works. If you want to learn more about a certain property or method\
    \ in Xcode, Control-Click it, and select Jump to Definition. Xcode will then show\
    \ you the definition. You can also hold down Command and click a property or method\
    \ to achieve the same thing.\n\nThe `Score` class uses a stored integer property\
    \ called `scoreValue` to keep track of the current score. Accessing the score\
    \ should be done through a computed property `score`:\n\n```\nvar score: Int {\n\
    \    get {\n        return scoreValue\n    }\n    set {\n        scoreValue =\
    \ newValue\n        label.text = String(self.scoreValue)\n    }\n}\n```\n\nThe\
    \ reason why a computed property is used is that it allows you to also change\
    \ the label text when the score is changed. In the `didBeginContact` method of\
    \ `GameWorld`, the score is incremented if there is a contact between two treasures\
    \ of the same type (or if there is a magic crystal involved):\n\n```\nif firstBody?.type\
    \ == secondBody?.type || firstBody?.type == TreasureType.Magic\n    || secondBody?.type\
    \ == TreasureType.Magic {\n    self.scoreObj.score += 10\n    ...\n}\n```\n\n\
    When the score is incremented, the `set` part of the `score` property is called,\
    \ and the score label text is updated as well.\n\n# Controlling Access\n\nSuppose\
    \ that the `scoreValue` property is declared as follows in the `Score` class:\n\
    \n```\nvar scoreValue: Int = 0\n```\n\nAlthough the property is supposed to be\
    \ accessed only within the `Score` class, there is nothing that prevents a developer\
    \ from writing this:\n\n```\nself.scoreObj.scoreValue += 10\n```\n\nIf by accident\
    \ the score is updated in this fashion, it will lead to a problem in the game\
    \ because the label text will not be changed, even though the score has changed.\
    \ Is there a way to enforce that a property can only be accessed within the class\
    \ and not outside it? Yes, there is! Swift knows three keywords for controlling\
    \ access to both properties and methods in a class: `private`, `internal`, and\
    \ `public`, also called access modifiers.\n\nIf you use the `private` access modifier,\
    \ you can only access the property or method within the source file where it is\
    \ defined. So, code written in other source files will not be able to directly\
    \ access such a property. For example, in the TutsTombFinal example, this is how\
    \ the `scoreValue` property is declared:\n\n```\nprivate var scoreValue: Int =\
    \ 0\n```\n\nIf you were to now try to access the `scoreValue` property in the\
    \ `GameWorld` class, which is defined in another source file, the compiler would\
    \ give you an error. Sometimes, it’s useful to make methods `private` as well.\
    \ For example, you might add a low-level method to your class that you use internally\
    \ to compute something, but you don’t want it to be called from somewhere else.\
    \ You’ll see an example of such a method later in this chapter.\n\n`internal`\
    \ access means that properties and methods are accessible from any file within\
    \ the target where it’s defined. A target is what Xcode builds when you click\
    \ the Play button. So, in the context of this book, a target will mostly be an\
    \ app, but it can also be a library of classes that belong together or an OS X\
    \ application. By default, properties and methods have `internal` access. So,\
    \ the declaration\n\n```\nvar lives: Int = 0\n```\n\nis equivalent to\n\n```\n\
    internal var lives: Int = 0\n```\n\nFinally, a `public` property or method can\
    \ be accessed from any source file, and even outside of the target. The latter\
    \ is especially useful when you develop a library of classes that you would like\
    \ to use for multiple games."
  raw: '## Adding a Score


    In Tut’s Tomb, every time two treasures of the same type collide, they disappear
    from the screen and the player gets points. You need to display those points somewhere
    on the screen. In this game, the score is shown in the top left part of the screen.
    In the `GameWorld` class, you add a `scoreObj` property that will represent the
    node for maintaining and displaying the current score. The type of this property
    is `Score`, which is a class that will be discussed in this chapter. When the
    game world is set up, the `Score` instance is positioned in the top left of the
    screen (with a top and side margin), and is added to the `GameWorld` node like
    so:


    `var scorepos = GameScene.world.topLeft()`


    `scorepos.x += scoreObj.sprite.size.width/2 + 10`


    `scorepos.y -= scoreObj.sprite.size.height/2 + 10`


    `scoreObj.position = scorepos`


    `self.addChild(scoreObj)`


    The `Score` class is a subclass of `GameObjectNode`. It contains a sprite, a label
    to display the score, and an integer property to keep track of the current score.
    In the class initializer, the `sprite` and `label` properties are positioned and
    added to the node:


    `sprite.zPosition = Layer.Overlay`


    `self.addChild(sprite)`


    `label.position = CGPoint(x: 100, y: 0)`


    `label.zPosition = Layer.Overlay1`


    `label.fontColor = UIColor.blackColor()`


    `label.fontSize = 20`


    `label.verticalAlignmentMode = .Center`


    `label.horizontalAlignmentMode = .Right`


    `label.text = "0"`


    `self.addChild(label)`


    The label is initialized with a font color and size, as well as an alignment.
    The alignment indicates how the text is displayed with respect to the label position,
    which is (100, 0). The vertical alignment mode is “center.” This means that the
    text is displayed such that the vertical middle of the text is at y-position 0,
    local to the score node object to which the text belongs. The horizontal alignment
    mode is “right,” which results in the text being right-aligned. In terms of positioning,
    this means that the local x-position (which is 100) indicates the right edge of
    the label text. There are a few other options for aligning text. For example,
    you can vertically align text at the top, center, bottom, or baseline (the latter
    means the virtual line on which the text is written, which is different from bottom
    alignment, since depending on the font used, some characters may stick out below
    the baseline, such as the g or the p character). Play around with the various
    alignment options and label positioning to see how it works. If you want to learn
    more about a certain property or method in Xcode, Control-Click it, and select
    Jump to Definition. Xcode will then show you the definition. You can also hold
    down Command and click a property or method to achieve the same thing.


    The `Score` class uses a stored integer property called `scoreValue` to keep track
    of the current score. Accessing the score should be done through a computed property
    `score`:


    `var score: Int {`


        `get {`


            `return scoreValue`


        `}`


        `set {`


            `scoreValue = newValue`


            `label.text = String(self.scoreValue)`


        `}`


    `}`


    The reason why a computed property is used is that it allows you to also change
    the label text when the score is changed. In the `didBeginContact` method of `GameWorld`,
    the score is incremented if there is a contact between two treasures of the same
    type (or if there is a magic crystal involved):


    `if firstBody?.type == secondBody?.type || firstBody?.type == TreasureType.Magic`


        `|| secondBody?.type == TreasureType.Magic {`


        `self.scoreObj.score += 10`


        `...`


    `}`


    When the score is incremented, the `set` part of the `score` property is called,
    and the score label text is updated as well.


    ## Controlling Access


    Suppose that the `scoreValue` property is declared as follows in the `Score` class:


    `var scoreValue: Int =` `0`


    Although the property is supposed to be accessed only within the `Score` class,
    there is nothing that prevents a developer from writing this:


    `self.scoreObj.scoreValue += 10`


    If by accident the score is updated in this fashion, it will lead to a problem
    in the game because the label text will not be changed, even though the score
    has changed. Is there a way to enforce that a property can only be accessed within
    the class and not outside it? Yes, there is! Swift knows three keywords for controlling
    access to both properties and methods in a class: `private`, `internal`, and `public`,
    also called access modifiers.


    If you use the private access modifier, you can only access the property or method
    within the source file where it is defined. So, code written in other source files
    will not be able to directly access such a property. For example, in the TutsTombFinal
    example, this is how the `scoreValue` property is declared:


    `private var scoreValue: Int = 0`


    If you were to now try to access the `scoreValue` property in the `GameWorld`
    class, which is defined in another source file, the compiler would give you an
    error. Sometimes, it’s useful to make methods private as well. For example, you
    might add a low-level method to your class that you use internally to compute
    something, but you don’t want it to be called from somewhere else. You’ll see
    an example of such a method later in this chapter.


    Internal access means that properties and methods are accessible from any file
    within the target where it’s defined. A target is what Xcode builds when you click
    the Play button. So, in the context of this book, a target will mostly be an app,
    but it can also be a library of classes that belong together or an OS X application.
    By default, properties and methods have internal access. So, the declaration


    `var lives: Int = 0`


    is equivalent to


    `internal var lives: Int = 0`


    Finally, a public property or method can be accessed from any source file, and
    even outside of the target. The latter is especially useful when you develop a
    library of classes that you would like to use for multiple games.'
  trans: "\n# 添加分数\n\n在图坦之墓中，每当两个相同类型的宝藏碰撞时，它们会从屏幕上消失，玩家获得分数。你需要在屏幕的某个位置显示这些分数。在本游戏中，分数显示在屏幕的左上角。在\
    \ `GameWorld` 类中，你添加一个 `scoreObj` 属性，该属性表示用于维护和显示当前分数的节点。此属性的类型是 `Score`，这是一个将在本章讨论的类。当游戏世界设置完毕后，`Score`\
    \ 实例被定位在屏幕左上角（带有顶部和侧边距），并像这样添加到 `GameWorld` 节点中：\n\n```\nvar scorepos = GameScene.world.topLeft()\n\
    scorepos.x += scoreObj.sprite.size.width/2 + 10\nscorepos.y -= scoreObj.sprite.size.height/2\
    \ + 10\nscoreObj.position = scorepos\nself.addChild(scoreObj)\n```\n\n`Score`\
    \ 类是 `GameObjectNode` 的子类。它包含一个精灵、一个用于显示分数的标签，以及一个用于跟踪当前分数的整数属性。在类的初始化器中，`sprite`\
    \ 和 `label` 属性被定位并添加到节点中：\n\n```\nsprite.zPosition = Layer.Overlay\nself.addChild(sprite)\n\
    label.position = CGPoint(x: 100, y: 0)\nlabel.zPosition = Layer.Overlay1\nlabel.fontColor\
    \ = UIColor.blackColor()\nlabel.fontSize = 20\nlabel.verticalAlignmentMode = .Center\n\
    label.horizontalAlignmentMode = .Right\nlabel.text = \"0\"\nself.addChild(label)\n\
    ```\n\n标签初始化时会设置字体颜色、大小以及对齐方式。对齐方式指示文本相对于标签位置（即 (100, 0)）的显示方式。垂直对齐模式为“居中”。这意味着文本的显示方式使得文本的垂直中线位于\
    \ y 位置 0 处，相对于文本所属的分数节点对象局部坐标而言。水平对齐模式为“右”，导致文本右对齐。在定位方面，这意味着局部 x 位置（即 100）指示标签文本的右边缘。还有其他几种文本对齐选项。例如，你可以将文本在顶部、居中、底部或基线上垂直对齐（后者意味着文本所在的虚拟线，这与底部对齐不同，因为根据所使用的字体，某些字符可能会突出到基线下方，例如\
    \ `g` 或 `p` 字符）。尝试使用各种对齐选项和标签定位，看看效果如何。如果你想了解 Xcode 中某个属性或方法的更多信息，请按住 Control\
    \ 键并单击它，然后选择“跳转到定义”。Xcode 将显示其定义。你也可以按住 Command 键并单击某个属性或方法来实现相同效果。\n\n`Score`\
    \ 类使用一个名为 `scoreValue` 的存储整数属性来跟踪当前分数。访问分数应该通过一个计算属性 `score` 进行：\n\n```\nvar score:\
    \ Int {\n    get {\n        return scoreValue\n    }\n    set {\n        scoreValue\
    \ = newValue\n        label.text = String(self.scoreValue)\n    }\n}\n```\n\n\
    使用计算属性的原因是，它允许你在分数更改时也更改标签文本。在 `GameWorld` 的 `didBeginContact` 方法中，如果两个相同类型的宝藏之间发生接触（或者涉及魔法水晶），分数就会增加：\n\
    \n```\nif firstBody?.type == secondBody?.type || firstBody?.type == TreasureType.Magic\n\
    \    || secondBody?.type == TreasureType.Magic {\n    self.scoreObj.score += 10\n\
    \    ...\n}\n```\n\n当分数增加时，会调用 `score` 属性的 `set` 部分，分数标签文本也会随之更新。\n\n# 控制访问\n\n\
    假设 `Score` 类中的 `scoreValue` 属性声明如下：\n\n```\nvar scoreValue: Int = 0\n```\n\n尽管该属性本应仅在\
    \ `Score` 类内部访问，但没有什么能阻止开发者编写以下代码：\n\n```\nself.scoreObj.scoreValue += 10\n```\n\
    \n如果意外以这种方式更新分数，将导致游戏出现问题，因为即使分数发生了变化，标签文本也不会更改。有没有办法强制属性只能在类内部访问，而不能在类外部访问？有的！Swift\
    \ 提供了三个用于控制类中属性和方法访问权限的关键字：`private`、`internal` 和 `public`，也称为访问修饰符。\n\n如果使用 `private`\
    \ 访问修饰符，则只能在其定义所在的源文件中访问该属性或方法。因此，在其他源文件中编写的代码将无法直接访问此类属性。例如，在 TutsTombFinal 示例中，`scoreValue`\
    \ 属性的声明方式如下：\n\n```\nprivate var scoreValue: Int = 0\n```\n\n如果现在尝试在 `GameWorld`\
    \ 类（定义在另一个源文件中）中访问 `scoreValue` 属性，编译器将报错。有时，将方法设置为 `private` 也很有用。例如，你可能向类中添加一个低级方法，用于内部计算某些内容，但不希望它被其他位置调用。本章后面你将看到此类方法的一个示例。\n\
    \n`internal` 访问意味着属性和方法可以从其定义所在的目标中的任何文件访问。目标是指当你点击“播放”按钮时 Xcode 构建的内容。因此，在本书的上下文中，目标通常是一个应用程序，但它也可以是一个属于同一组的类库或一个\
    \ OS X 应用程序。默认情况下，属性和方法具有 `internal` 访问权限。因此，声明\n\n```\nvar lives: Int = 0\n```\n\
    \n等同于\n\n```\ninternal var lives: Int = 0\n```\n\n最后，`public` 属性或方法可以从任何源文件访问，甚至可以在目标之外访问。后者在你开发希望用于多个游戏的类库时特别有用。\n"
- fmt: "# Using a Custom Font\n\nIf you want to set your game apart, you have to carefully\
    \ think about the fonts that you are using in your game. You generally want to\
    \ avoid using fonts such as Times New Roman or Arial, since everybody knows and\
    \ uses those fonts already. There are lots of free fonts available that you can\
    \ use in your game. If you decide to use a custom font, make sure that you are\
    \ allowed to use it. Not all fonts can be used for commercial purposes.\n\nJust\
    \ like sprites and sounds, fonts are a type of game asset. If you use a particular\
    \ font in your game, you should package this font with your app so that you are\
    \ sure the game looks the same for all players. Packaging your font with the game\
    \ is quite easy, but it involves a few steps.\n\nFirst, you need to add the font\
    \ file to your game project. In the TutsTombFinal example, you can see that there\
    \ is a folder called Fonts, which contains a TrueType font file.\n\nThe next step\
    \ is ensuring that Xcode copies the font so that it is a part of the target. In\
    \ Xcode, click the project name on the left side of the window, and select the\
    \ TutsTombFinal target. Then go to the Build Phases tab. If you open the Copy\
    \ Bundle Resources list, it needs to show the font. If it is not there, drag it\
    \ from the project file list to the Copy Bundle Resources list (see Figure [16-1](#A978-1-4842-0650-8_16_Chapter.html#Fig1)).\n\
    \n![A978-1-4842-0650-8_16_Fig1_HTML.jpg](A978-1-4842-0650-8_16_Fig1_HTML.jpg)\n\
    \nFigure 16-1.\n\nAn overview of the assets copied when the target is built\n\n\
    Now that the font is added to the project and copied when the target is built,\
    \ you need to indicate in the project settings that your target will use that\
    \ particular font. Click the `Info.plist` file in the Supporting Files folder,\
    \ and you’ll see a list of items. There is a key called “Fonts provided by application”\
    \ and you’ll see that it contains a single item: the custom font used in the Tut’s\
    \ Tomb game. If you start a new project for your own game and you want to add\
    \ a custom font, you need to add the “Fonts provided by application” key yourself\
    \ to this list by clicking the plus sign that appears when you hover over the\
    \ Information Property List dictionary. You can then add a new key and add your\
    \ custom fonts to that key.\n\nThe final step is creating a label node using your\
    \ font. Note that a font name used in a Swift program is not necessarily the same\
    \ as the name of the font file. There is no real convenient way to find the font\
    \ name belonging to a font file. If you insert the following code snippet in your\
    \ program somewhere, the program will list all the fonts that it knows:\n\n```\n\
    let fontFamilies = UIFont.familyNames()\n\nfor familyName in fontFamilies {\n\
    \    let fontNames = UIFont.fontNamesForFamilyName(familyName)\n    print(\"\\\
    (familyName): \\(fontNames)\")\n}\n```\n\nYou can then find the name of the font\
    \ you want to use in the list that is printed to the console. Figure [16-2](#A978-1-4842-0650-8_16_Chapter.html#Fig2)\
    \ shows the score label in TutsTombFinal using a custom font for displaying the\
    \ score value.\n\n![A978-1-4842-0650-8_16_Fig2_HTML.jpg](A978-1-4842-0650-8_16_Fig2_HTML.jpg)\n\
    \nFigure 16-2.\n\nThe TutsTombFinal game with glitter\n\n# Adding Glitter\n\n\
    Currently, the treasures are simple sprites displayed on the screen. Let’s add\
    \ a nice visual effect to them: glitter. The TutsTombFinal example contains a\
    \ class called `Glitter` that you can use to represent a glitter game object (yes,\
    \ even glitter is a game object!).\n\nIn order to make glitter smoothly appear\
    \ and disappear, you are going to use actions in the `Glitter` class that change\
    \ the scale. When glitter is created, it should scale from 0 (invisible) to 1\
    \ (regular size) and back again. Whenever two treasures of the same type are in\
    \ contact, you add a number of this `Glitter` instances to the game world, randomly\
    \ positioned around the contact location.\n\nIn the `Glitter` initializer, you\
    \ initially set the scale in both the x and y direction to 0:\n\n```\nself.xScale\
    \ = 0\nself.yScale = 0\n```\n\nThen you define the actions for the glitter. In\
    \ order to avoid a lot of glitter appearing at once, you start with a waiting\
    \ action:\n\n```\nlet waitAction = SKAction.waitForDuration(0.1, withRange: 0.2)\n\
    ```\n\nThis waiting action chooses a random waiting time around 0.1 seconds, within\
    \ a range of 0.2 seconds. As a result, each added glitter shows up at a slightly\
    \ different time. Then, you define a scale up and a scale down action:\n\n```\n\
    let scaleUpAction = SKAction.scaleTo(1, duration: 0.3)\nlet scaleDownAction =\
    \ SKAction.scaleTo(0, duration: 0.3)\n```\n\nFinally, you create a sequence of\
    \ these actions, and run them:\n\n```\nlet totalAction = SKAction.sequence([waitAction,\
    \ scaleUpAction, scaleDownAction])\nself.runAction(totalAction, completion: {\n\
    \    self.removeFromParent()\n})\n```\n\nOnce the action is completed, a block\
    \ of instructions is executed. In this case, the block contains a single instruction\
    \ that removes the glitter from the game world.\n\nThe only thing left to do is\
    \ add glitter to the scene. In order to help do that, let’s add a method to the\
    \ `GameWorld` class that adds a number of glitter around a given position. Because\
    \ this method should only be used in the `GameWorld` class, this is a good example\
    \ of a method with private access. Here is the header of the method:\n\n```\n\
    private func addGlittersAroundPosition(pos: CGPoint, number: Int)\n```\n\nAs you\
    \ can see, the method expects a position and a number. Inside the method body,\
    \ you use a `for` loop to create and add a `Glitter` object a number of times.\
    \ In order to randomly position the object, you can use polar coordinates. In\
    \ other words, instead of representing a position by an x and y coordinate, you\
    \ represent it by a radius and an angle. If you randomly choose a radius in a\
    \ range, and a random angle between 0 and 2π, the glitter will appear in a circle\
    \ around the given position. You can go from the polar coordinates back to regular\
    \ (Cartesian) coordinates by using the sine and cosine mathematical functions.\
    \ Here is the complete body of the `addGlittersAroundPosition` method:\n\n```\n\
    for _ in 1...number {\n    var glitter = Glitter()\n    glitter.position = pos\n\
    \    var radius = randomDouble() * 100\n    var angle = randomDouble() * 2 * M_PI\n\
    \    glitter.position.x += CGFloat(cos(angle) * radius)\n    glitter.position.y\
    \ += CGFloat(sin(angle) * radius)\n    self.addChild(glitter)\n}\n```\n\nNote\
    \ the use of the underscore in the `for` loop since there is no need for an actual\
    \ counter variable. In the `didBeginContact` method, you can then call this method\
    \ to add glitter around the contact location. Take a look at the code in the TutsTombFinal\
    \ example to see how that is done. Figure [16-2](#A978-1-4842-0650-8_16_Chapter.html#Fig2)\
    \ shows the game with glitter!\n\n# Adding More Glitter\n\nBecause glitter doesn’t\
    \ care where it’s positioned, you can add glitter anywhere in the game at any\
    \ time you want. For example, to make the magic crystal more magical, you can\
    \ define an action that continuously adds glitter around it. The `Treasure` class\
    \ contains an `addGlitter` method that adds glitter randomly around the position\
    \ of the treasure sprite. You can then simply define an action that repeatedly\
    \ adds glitter to a magic crystal object. This action consists of calling the\
    \ `addGlitter` method, and waiting for a bit. Here is the code that defines the\
    \ action:\n\n```\nlet addGlitterAction = SKAction.runBlock({\n    self.addGlitter()\n\
    })\nlet waitAction = SKAction.waitForDuration(0.1)\nlet totalAction = SKAction.repeatActionForever(\n\
    \    SKAction.sequence([addGlitterAction, waitAction]))\nself.runAction(totalAction)\n\
    ```\n\nFigure [16-3](#A978-1-4842-0650-8_16_Chapter.html#Fig3) shows a magic crystal\
    \ with glitter.\n\n![A978-1-4842-0650-8_16_Fig3_HTML.jpg](A978-1-4842-0650-8_16_Fig3_HTML.jpg)\n\
    \nFigure 16-3.\n\nShiny!"
  raw: '## Using a Custom Font


    If you want to set your game apart, you have to carefully think about the fonts
    that you are using in your game. You generally want to avoid using fonts such
    as Times New Roman or Arial, since everybody knows and uses those fonts already.
    There are lots of free fonts available that you can use in your game. If you decide
    to use a custom font, make sure that you are allowed to use it. Not all fonts
    can be used for commercial purposes.


    Just like sprites and sounds, fonts are a type of game asset. If you use a particular
    font in your game, you should package this font with your app so that you are
    sure the game looks the same for all players. Packaging your font with the game
    is quite easy, but it involves a few steps.


    First, you need to add the font file to your game project. In the TutsTombFinal
    example, you can see that there is a folder called Fonts, which contains a TrueType
    font file.


    The next step is ensuring that Xcode copies the font so that it is a part of the
    target. In Xcode, click the project name on the left side of the window, and select
    the TutsTombFinal target. Then go to the Build Phases tab. If you open the Copy
    Bundle Resources list, it needs to show the font. If it is not there, drag it
    from the project file list to the Copy Bundle Resources list (see Figure [16-1](#A978-1-4842-0650-8_16_Chapter.html#Fig1)).


    ![A978-1-4842-0650-8_16_Fig1_HTML.jpg](A978-1-4842-0650-8_16_Fig1_HTML.jpg)


    Figure 16-1.


    An overview of the assets copied when the target is built


    Now that the font is added to the project and copied when the target is built,
    you need to indicate in the project settings that your target will use that particular
    font. Click the `Info.plist` file in the Supporting Files folder, and you’ll see
    a list of items. There is a key called “Fonts provided by application” and you’ll
    see that it contains a single item: the custom font used in the Tut’s Tomb game.
    If you start a new project for your own game and you want to add a custom font,
    you need to add the “Fonts provided by application” key yourself to this list
    by clicking the plus sign that appears when you hover over the Information Property
    List dictionary. You can then add a new key and add your custom fonts to that
    key.


    The final step is creating a label node using your font. Note that a font name
    used in a Swift program is not necessarily the same as the name of the font file.
    There is no real convenient way to find the font name belonging to a font file.
    If you insert the following code snippet in your program somewhere, the program
    will list all the fonts that it knows:


    `let fontFamilies = UIFont.familyNames()`


    `for familyName in fontFamilies {`


        `let fontNames = UIFont.fontNamesForFamilyName(familyName)`


        `print("\(familyName): \(fontNames)")`


    `}`


    You can then find the name of the font you want to use in the list that is printed
    to the console. Figure [16-2](#A978-1-4842-0650-8_16_Chapter.html#Fig2) shows
    the score label in TutsTombFinal using a custom font for displaying the score
    value.


    ![A978-1-4842-0650-8_16_Fig2_HTML.jpg](A978-1-4842-0650-8_16_Fig2_HTML.jpg)


    Figure 16-2.


    The TutsTombFinal game with glitter


    ## Adding Glitter


    Currently, the treasures are simple sprites displayed on the screen. Let’s add
    a nice visual effect to them: glitter. The TutsTombFinal example contains a class
    called `Glitter` that you can use to represent a glitter game object (yes, even
    glitter is a game object!).


    In order to make glitter smoothly appear and disappear, you are going to use actions
    in the `Glitter` class that change the scale. When glitter is created, it should
    scale from 0 (invisible) to 1 (regular size) and back again. Whenever two treasures
    of the same type are in contact, you add a number of this `Glitter` instances
    to the game world, randomly positioned around the contact location.


    In the `Glitter` initializer, you initially set the scale in both the x and y
    direction to 0:


    `self.xScale = 0`


    `self.yScale = 0`


    Then you define the actions for the glitter. In order to avoid a lot of glitter
    appearing at once, you start with a waiting action:


    `let waitAction = SKAction.waitForDuration(0.1, withRange: 0.2)`


    This waiting action chooses a random waiting time around 0.1 seconds, within a
    range of 0.2 seconds. As a result, each added glitter shows up at a slightly different
    time. Then, you define a scale up and a scale down action:


    `let scaleUpAction = SKAction.scaleTo(1, duration: 0.3)`


    `let scaleDownAction = SKAction.scaleTo(0, duration: 0.3)`


    Finally, you create a sequence of these actions, and run them:


    `let totalAction = SKAction.sequence([waitAction, scaleUpAction, scaleDownAction])`


    `self.runAction(totalAction, completion: {`


        `self.removeFromParent()`


    `})`


    Once the action is completed, a block of instructions is executed. In this case,
    the block contains a single instruction that removes the glitter from the game
    world.


    The only thing left to do is add glitter to the scene. In order to help do that,
    let’s add a method to the `GameWorld` class that adds a number of glitter around
    a given position. Because this method should only be used in the `GameWorld` class,
    this is a good example of a method with private access. Here is the header of
    the method:


    `private func addGlittersAroundPosition(pos: CGPoint, number: Int)`


    As you can see, the method expects a position and a number. Inside the method
    body, you use a `for` loop to create and add a `Glitter` object a number of times.
    In order to randomly position the object, you can use polar coordinates. In other
    words, instead of representing a position by an x and y coordinate, you represent
    it by a radius and an angle. If you randomly choose a radius in a range, and a
    random angle between 0 and 2π, the glitter will appear in a circle around the
    given position. You can go from the polar coordinates back to regular (Cartesian)
    coordinates by using the sine and cosine mathematical functions. Here is the complete
    body of the `addGlittersAroundPosition` method:


    `for _ in 1...number {`


        `var glitter = Glitter()`


        `glitter.position = pos`


        `var radius = randomDouble() * 100`


        `var angle = randomDouble() * 2 * M_PI`


        `glitter.position.x += CGFloat(cos(angle) * radius)`


        `glitter.position.y += CGFloat(sin(angle) * radius)`


        `self.addChild(glitter)`


    `}`


    Note the use of the underscore in the `for` loop since there is no need for an
    actual counter variable. In the `didBeginContact` method, you can then call this
    method to add glitter around the contact location. Take a look at the code in
    the TutsTombFinal example to see how that is done. Figure [16-2](#A978-1-4842-0650-8_16_Chapter.html#Fig2)
    shows the game with glitter!


    ## Adding More Glitter


    Because glitter doesn’t care where it’s positioned, you can add glitter anywhere
    in the game at any time you want. For example, to make the magic crystal more
    magical, you can define an action that continuously adds glitter around it. The
    `Treasure` class contains an `addGlitter` method that adds glitter randomly around
    the position of the treasure sprite. You can then simply define an action that
    repeatedly adds glitter to a magic crystal object. This action consists of calling
    the `addGlitter` method, and waiting for a bit. Here is the code that defines
    the action:


    `let addGlitterAction = SKAction.runBlock({`


        `self.addGlitter()`


    `})`


    `let waitAction = SKAction.waitForDuration(0.1)`


    `let totalAction = SKAction.repeatActionForever(`


        `SKAction.sequence([addGlitterAction, waitAction]))`


    `self.runAction(totalAction)`


    Figure [16-3](#A978-1-4842-0650-8_16_Chapter.html#Fig3) shows a magic crystal
    with glitter.


    ![A978-1-4842-0650-8_16_Fig3_HTML.jpg](A978-1-4842-0650-8_16_Fig3_HTML.jpg)


    Figure 16-3.


    Shiny!'
  trans: "\n# 使用自定义字体\n\n如果你想让你自己的游戏脱颖而出，就必须仔细思考游戏中使用的字体。一般来说，应避免使用 Times New Roman\
    \ 或 Arial 这类字体，因为每个人都已经熟知并使用了这些字体。现在有很多免费字体可供你在游戏中使用。如果你决定使用自定义字体，请确保你有权使用它。并非所有字体都可用于商业目的。\n\
    \n与精灵和声音一样，字体也是一种游戏资源。如果你在游戏中使用了特定字体，就应该随应用一起打包该字体，以确保游戏在所有玩家设备上显示一致。将字体与游戏一起打包非常简单，但需要执行几个步骤。\n\
    \n首先，你需要将字体文件添加到游戏项目中。在 TutsTombFinal 示例中，你可以看到一个名为 Fonts 的文件夹，其中包含一个 TrueType\
    \ 字体文件。\n\n下一步是确保 Xcode 复制该字体，使其成为目标的一部分。在 Xcode 中，点击窗口左侧的项目名称，然后选择 TutsTombFinal\
    \ 目标。接着进入 Build Phases 标签页。如果你展开 Copy Bundle Resources 列表，它应显示该字体。如果没有，请将其从项目文件列表拖拽到\
    \ Copy Bundle Resources 列表中（见图 16-1）。\n\n![A978-1-4842-0650-8_16_Fig1_HTML.jpg](img/A978-1-4842-0650-8_16_Fig1_HTML.jpg)\n\
    \n图 16-1.\n\n构建目标时复制的资源概览\n\n现在字体已添加到项目并在构建目标时被复制，你需要在项目设置中指明你的目标将使用该特定字体。点击 Supporting\
    \ Files 文件夹中的 `Info.plist` 文件，你会看到一个项目列表。其中有一个名为“应用提供的字体”的键，你会看到它包含一个项目：在 Tut's\
    \ Tomb 游戏中使用的自定义字体。如果你为自己的游戏启动新项目并想添加自定义字体，你需要通过悬停在信息属性列表字典上时出现的加号，自行将“应用提供的字体”键添加到该列表中。然后你可以添加一个新键，并将自定义字体添加至该键。\n\
    \n最后一步是使用你的字体创建一个标签节点。请注意，在 Swift 程序中使用的字体名称不一定与字体文件的名称相同。并没有特别便捷的方法找到属于某个字体文件的字体名称。如果你将以下代码片段插入到程序的某个位置，程序将列出其已知的所有字体：\n\
    \n```\nlet fontFamilies = UIFont.familyNames()\n\nfor familyName in fontFamilies\
    \ {\n    let fontNames = UIFont.fontNamesForFamilyName(familyName)\n    print(\"\
    \\(familyName): \\(fontNames)\")\n}\n```\n\n然后你可以在打印到控制台的列表中找到你想要使用的字体名称。图 16-2\
    \ 显示了 TutsTombFinal 中，使用自定义字体显示分数的标签。\n\n![A978-1-4842-0650-8_16_Fig2_HTML.jpg](img/A978-1-4842-0650-8_16_Fig2_HTML.jpg)\n\
    \n图 16-2.\n\n带有闪光效果的 TutsTombFinal 游戏\n\n# 添加闪光效果\n\n目前，宝藏只是屏幕上显示的简单精灵。让我们为它们添加一个漂亮的视觉特效：闪光。TutsTombFinal\
    \ 示例中包含一个名为 `Glitter` 的类，你可以用它来表示闪光游戏对象（是的，连闪光也是一个游戏对象！）。\n\n为了使闪光能够平滑地出现和消失，你将在\
    \ `Glitter` 类中使用动作来改变其缩放比例。当闪光被创建时，它应该从 0（不可见）缩放到 1（正常大小），然后再缩放回去。每当两个相同类型的宝藏接触时，你就在游戏世界中添加一定数量的\
    \ `Glitter` 实例，并将它们随机放置在接触点周围。\n\n在 `Glitter` 的初始化器中，你首先将 x 和 y 方向的缩放比例都设置为 0：\n\
    \n```\nself.xScale = 0\nself.yScale = 0\n```\n\n然后你定义了闪光的动作。为了避免大量闪光同时出现，你从一个等待动作开始：\n\
    \n```\nlet waitAction = SKAction.waitForDuration(0.1, withRange: 0.2)\n```\n\n\
    这个等待动作会在 0.2 秒的范围内，选择一个大约 0.1 秒的随机等待时间。这样，每个添加的闪光都将在略微不同的时间点出现。接下来，你定义了一个放大动作和一个缩小动作：\n\
    \n```\nlet scaleUpAction = SKAction.scaleTo(1, duration: 0.3)\nlet scaleDownAction\
    \ = SKAction.scaleTo(0, duration: 0.3)\n```\n\n最后，你创建了一个由这些动作组成的序列，并运行它们：\n\n\
    ```\nlet totalAction = SKAction.sequence([waitAction, scaleUpAction, scaleDownAction])\n\
    self.runAction(totalAction, completion: {\n    self.removeFromParent()\n})\n```\n\
    \n一旦动作完成，就会执行一个指令块。在这个例子中，该指令块包含一条指令，用于将闪光从游戏世界中移除。\n\n剩下唯一要做的事情就是将闪光添加到场景中。为此，让我们在\
    \ `GameWorld` 类中添加一个方法，它在给定位置周围添加一定数量的闪光。由于此方法应仅在 `GameWorld` 类内部使用，因此它是一个很好的具有私有访问权限的方法示例。以下是该方法的声明：\n\
    \n```\nprivate func addGlittersAroundPosition(pos: CGPoint, number: Int)\n```\n\
    \n正如你所见，该方法需要一个位置和一个数量参数。在方法体内，你使用一个 `for` 循环来创建并添加指定次数的 `Glitter` 对象。为了随机放置对象，你可以使用极坐标。换句话说，不是通过\
    \ x 和 y 坐标来表示位置，而是通过半径和角度来表示。如果你在一个范围内随机选择一个半径，以及一个介于 0 到 2π 之间的随机角度，闪光就会出现在给定位置周围的圆形区域内。你可以通过使用正弦和余弦数学函数，从极坐标转换回常规（笛卡尔）坐标。以下是\
    \ `addGlittersAroundPosition` 方法的完整实现：\n\n```\nfor _ in 1...number {\n    var\
    \ glitter = Glitter()\n    glitter.position = pos\n    var radius = randomDouble()\
    \ * 100\n    var angle = randomDouble() * 2 * M_PI\n    glitter.position.x +=\
    \ CGFloat(cos(angle) * radius)\n    glitter.position.y += CGFloat(sin(angle) *\
    \ radius)\n    self.addChild(glitter)\n}\n```\n\n注意在 `for` 循环中使用了下划线，因为这里不需要实际的计数器变量。接着，在\
    \ `didBeginContact` 方法中，你可以调用此方法来在接触点周围添加闪光。请查看 TutsTombFinal 示例中的代码以了解如何实现。图\
    \ 16-2 显示了带有闪光效果的的的游戏！\n\n# 添加更多闪光效果\n\n由于闪光效果不关心被放置在何处，你可以在游戏的任何地方、任何时间添加闪光。例如，为了让魔法水晶更具魔力，你可以定义一个动作，持续在水晶周围添加闪光。`Treasure`\
    \ 类包含一个 `addGlitter` 方法，该方法在宝藏精灵的位置周围随机添加闪光。然后你可以简单地定义一个动作，反复向魔法水晶对象添加闪光。这个动作包括调用\
    \ `addGlitter` 方法，并稍作等待。以下是定义该动作的代码：\n\n```\nlet addGlitterAction = SKAction.runBlock({\n\
    \    self.addGlitter()\n})\nlet waitAction = SKAction.waitForDuration(0.1)\nlet\
    \ totalAction = SKAction.repeatActionForever(\n    SKAction.sequence([addGlitterAction,\
    \ waitAction]))\nself.runAction(totalAction)\n```\n\n图 16-3 显示了一个带有闪光效果的魔法水晶。\n\
    \n![A978-1-4842-0650-8_16_Fig3_HTML.jpg](img/A978-1-4842-0650-8_16_Fig3_HTML.jpg)\n\
    \n图 16-3.\n\n闪闪发光！\n"
- fmt: "# Adding Music and Sound Effects\n\nJust like in the Painter game, you want\
    \ to add music and sound effects to the game to make it more attractive. As you’ve\
    \ seen, playing music and sounds is very easy in Swift. You can use the `Sound`\
    \ class that you created earlier for Painter. This is another good example of\
    \ reusing code: you created the `Sound` class once, and you’re using it for all\
    \ the games in this book!\n\nQuite a few of the classes designed for Tut’s Tomb\
    \ will be useful for the other games in this book. When you start building your\
    \ own games, you’ll probably end up with a collection of similar classes that\
    \ you will use often. When building games, it’s a good idea to think ahead. What\
    \ classes can you reuse for other projects? What is the best way to design a class\
    \ so you might be able to use it again later? As you develop more and more classes,\
    \ it may be useful to keep a list; you can then quickly scan the list as you develop\
    \ new items and implement things you might not have thought of before.\n\nWhen\
    \ the game starts, you begin playing the background music, as follows (see the\
    \ `GameWorld` class):\n\n```\nbackgroundMusic.looping = true\nbackgroundMusic.volume\
    \ = 0.5\nbackgroundMusic.play()\n```\n\nAnd when two treasures of the same type\
    \ collide, you also play a sound effect (also in the `GameWorld` class):\n\n```\n\
    if firstBody?.type == secondBody?.type || firstBody?.type == TreasureType.Magic\n\
    \    || secondBody?.type == TreasureType.Magic {\n    self.scoreObj.score += 10\n\
    \    ...\n    treasureCollectSound.play()\n}\n```\n\nFinally, you play a sound\
    \ when the game is over (again in the `GameWorld` class):\n\n```\nif firstBody?.position.y\
    \ > 400 || secondBody?.position.y > 400 {\n    gameover.hidden = false\n    self.removeAllActions()\n\
    \    gameoverSound.play()\n}\n```\n\nThis completes the Tut’s Tomb game. You can\
    \ play the game by running the TutsTombFinal example belonging to this chapter.\
    \ As an exercise, see if you’re able to extend the game yourself with new features.\
    \ For example, you could add extra animation effects when treasures collide. Or\
    \ how about adding a leaderboard/high-score list? In any case, happy treasure\
    \ hunting!\n\n## Leaderboards\n\nWhy do games contain leaderboards and high-score\
    \ lists? Early games didn’t have them because there was no semi-permanent storage\
    \ available in the game consoles. So, nothing could be remembered between playing\
    \ sessions. Also, there was no Save Game option, which had an important effect\
    \ on game mechanics: a player always had to start from the beginning, even if\
    \ they were experienced.\n\nOnce storage became available, designers started to\
    \ introduce leaderboards. Being better than somebody else always gives a feeling\
    \ of satisfaction, and it adds an important goal for the player. But this only\
    \ makes sense if multiple people are playing the game on the same device. If you’re\
    \ the sole player, the only thing you can do is try to beat yourself. Fortunately,\
    \ nowadays computers and game consoles are connected to the Internet. As a result,\
    \ you can store leaderboards online and compete with the whole world.\n\nBut this\
    \ adds an additional problem: a goal is only interesting when it’s reachable.\
    \ Being the best player among a couple of millions is unreachable for most people.\
    \ So, worldwide leaderboards can actually reduce player satisfaction. To remedy\
    \ this, games often introduce sub-leaderboards. For example, you can have a leaderboard\
    \ that is restricted to your own country or to scores reached this week. You can\
    \ also see how you rank among your friends. Carefully designing your game’s scoring\
    \ system and the way such scores are shown on leaderboards can make a crucial\
    \ difference in the satisfaction it gives to your players.\n\n## What You Have\
    \ Learned\n\nIn this chapter, you have learned the following:\n\n- How to use\
    \ custom fonts in your game\n- How to restrict access to properties and methods\n\
    - How to create glitter and attach it to game objects\n\n# Part IV  \nPenguin\
    \ Pairs\n\nIn this part of the book, you will develop the game Penguin Pairs (see\
    \ Figure [IV-1](#A978-1-4842-0650-8_4_Part_BookFrontmatter.html#Fig1)). I will\
    \ introduce a few new techniques for programming games, such as game objects in\
    \ a grid layout, file I/O, better game-state management, storing game data between\
    \ playing sessions, and more.\n\n![A978-1-4842-0650-8_4_Part_BookFrontmatter_Fig1_HTML.jpg](A978-1-4842-0650-8_4_Part_BookFrontmatter_Fig1_HTML.jpg)\n\
    \n**Figure IV-1.** The Penguin Pairs game\n\nPenguin Pairs is a puzzle game, the\
    \ goal of which is to make pairs of penguins of the same color. The player can\
    \ move the penguins by clicking or tapping them and selecting the direction in\
    \ which the penguin should move. A penguin moves until it’s stopped by another\
    \ character in the game (this can be a penguin, a seal, a shark, or an iceberg)\
    \ or it drops from the playing field, in which case it falls into the water and\
    \ is eaten by hungry sharks. The different levels of the game introduce new gameplay\
    \ elements to keep the game exciting. For example, there is a special penguin\
    \ that can match any other penguin, penguins can get stuck in a hole (meaning\
    \ they can’t move), and penguin-eating sharks can be placed on the board. You\
    \ can run the final version of this game by trying the example program belonging\
    \ to [Chapter 21](#A978-1-4842-0650-8_21_Chapter.html).\n\n# 17. Menus and Grids\n\
    \n*Electronic supplementary material* The online version of this chapter (doi:[10.1007/978-1-4842-0650-8_17](http://dx.doi.org/10.1007/978-1-4842-0650-8_17))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    Penguin Pairs is a puzzle game, and often, board games and puzzle games are based\
    \ on placing objects in some kind of grid. There are many examples of such games:\
    \ Chess, Tetris, Tic-Tac-Toe, Sudoku, Candy Crush, and many more. Often the goal\
    \ in these games is to modify the configuration of the grid in some way to achieve\
    \ points. In Tetris, completely filled rows have to be constructed; and in Sudoku,\
    \ numerical properties must hold for rows, columns, and subgrids.\n\nStructures\
    \ such as grids often impose a set of rules that binds the playing pieces to certain\
    \ positions or configurations on the playing board. For example, in a chess game,\
    \ the pieces can only be placed (meaningfully) on the white and black squares\
    \ on the playing board. You aren’t allowed to place your queen halfway between\
    \ two squares. In computer games, these kinds of restrictions are easier to enforce:\
    \ you just have to make sure the position where you place your game object is\
    \ a valid one.\n\nGrids are also useful in other parts of the game. For example,\
    \ you may want to show a grid of buttons to let the player choose between levels.\
    \ This is why grids are also often used for organizing GUI elements on the screen.\
    \ In addition to grid layouts, this chapter also introduces a few new GUI elements\
    \ such as a slider and an on-off button that are needed for the Penguin Pairs\
    \ game. You will notice that this chapter is a bit math-heavy, due to having to\
    \ deal with grid locations, slider positions, and what not. It’s worthwhile to\
    \ understand these things well, though. Once you’ve done the hard work of creating\
    \ the classes and methods, you can use them over and over again for any games\
    \ you develop in the future."
  raw: '## Adding Music and Sound Effects


    Just like in the Painter game, you want to add music and sound effects to the
    game to make it more attractive. As you’ve seen, playing music and sounds is very
    easy in Swift. You can use the `Sound` class that you created earlier for Painter.
    This is another good example of reusing code: you created the `Sound` class once,
    and you’re using it for all the games in this book!


    Quite a few of the classes designed for Tut’s Tomb will be useful for the other
    games in this book. When you start building your own games, you’ll probably end
    up with a collection of similar classes that you will use often. When building
    games, it’s a good idea to think ahead. What classes can you reuse for other projects?
    What is the best way to design a class so you might be able to use it again later?
    As you develop more and more classes, it may be useful to keep a list; you can
    then quickly scan the list as you develop new items and implement things you might
    not have thought of before.


    When the game starts, you begin playing the background music, as follows (see
    the `GameWorld` class):


    `backgroundMusic.looping = true`


    `backgroundMusic.volume = 0.5`


    `backgroundMusic.play()`


    And when two treasures of the same type collide, you also play a sound effect
    (also in the `GameWorld` class):


    `if firstBody?.type == secondBody?.type || firstBody?.type == TreasureType.Magic`


        `|| secondBody?.type == TreasureType.Magic {`


        `self.scoreObj.score += 10`


        `...`


        `treasureCollectSound.play()`


    `}`


    Finally, you play a sound when the game is over (again in the `GameWorld` class):


    `if firstBody?.position.y > 400 || secondBody?.position.y > 400 {`


        `gameover.hidden = false`


        `self.removeAllActions()`


        `gameoverSound.play()`


    `}`


    This completes the Tut’s Tomb game. You can play the game by running the TutsTombFinal
    example belonging to this chapter. As an exercise, see if you’re able to extend
    the game yourself with new features. For example, you could add extra animation
    effects when treasures collide. Or how about adding a leaderboard/high-score list?
    In any case, happy treasure hunting!


    Leaderboards


    Why do games contain leaderboards and high-score lists? Early games didn’t have
    them because there was no semi-permanent storage available in the game consoles.
    So, nothing could be remembered between playing sessions. Also, there was no Save
    Game option, which had an important effect on game mechanics: a player always
    had to start from the beginning, even if they were experienced.


    Once storage became available, designers started to introduce leaderboards. Being
    better than somebody else always gives a feeling of satisfaction, and it adds
    an important goal for the player. But this only makes sense if multiple people
    are playing the game on the same device. If you’re the sole player, the only thing
    you can do is try to beat yourself. Fortunately, nowadays computers and game consoles
    are connected to the Internet. As a result, you can store leaderboards online
    and compete with the whole world.


    But this adds an additional problem: a goal is only interesting when it’s reachable.
    Being the best player among a couple of millions is unreachable for most people.
    So, worldwide leaderboards can actually reduce player satisfaction. To remedy
    this, games often introduce sub-leaderboards. For example, you can have a leaderboard
    that is restricted to your own country or to scores reached this week. You can
    also see how you rank among your friends. Carefully designing your game’s scoring
    system and the way such scores are shown on leaderboards can make a crucial difference
    in the satisfaction it gives to your players.


    ## What You Have Learned


    In this chapter, you have learned the following:


    *   How to use custom fonts in your game

    *   How to restrict access to properties and methods

    *   How to create glitter and attach it to game objects


    # Part IV

    Penguin Pairs


    Penguin Pairs


    In this part of the book, you will develop the game Penguin Pairs (see Figure
    [IV-1](#A978-1-4842-0650-8_4_Part_BookFrontmatter.html#Fig1)). I will introduce
    a few new techniques for programming games, such as game objects in a grid layout,
    file I/O, better game-state management, storing game data between playing sessions,
    and more.


    ![A978-1-4842-0650-8_4_Part_BookFrontmatter_Fig1_HTML.jpg](A978-1-4842-0650-8_4_Part_BookFrontmatter_Fig1_HTML.jpg)


    Figure IV-1.


    The Penguin Pairs game


    Penguin Pairs is a puzzle game, the goal of which is to make pairs of penguins
    of the same color. The player can move the penguins by clicking or tapping them
    and selecting the direction in which the penguin should move. A penguin moves
    until it’s stopped by another character in the game (this can be a penguin, a
    seal, a shark, or an iceberg) or it drops from the playing field, in which case
    it falls into the water and is eaten by hungry sharks. The different levels of
    the game introduce new gameplay elements to keep the game exciting. For example,
    there is a special penguin that can match any other penguin, penguins can get
    stuck in a hole (meaning they can’t move), and penguin-eating sharks can be placed
    on the board. You can run the final version of this game by trying the example
    program belonging to [Chapter 21](#A978-1-4842-0650-8_21_Chapter.html).


    # 17. Menus and Grids


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​17](http://dx.doi.org/10.1007/978-1-4842-0650-8_17))
    contains supplementary material, which is available to authorized users.


    Penguin Pairs is a puzzle game, and often, board games and puzzle games are based
    on placing objects in some kind of grid. There are many examples of such games:
    Chess, Tetris, Tic-Tac-Toe, Sudoku, Candy Crush, and many more. Often the goal
    in these games is to modify the configuration of the grid in some way to achieve
    points. In Tetris, completely filled rows have to be constructed; and in Sudoku,
    numerical properties must hold for rows, columns, and subgrids.


    Structures such as grids often impose a set of rules that binds the playing pieces
    to certain positions or configurations on the playing board. For example, in a
    chess game, the pieces can only be placed (meaningfully) on the white and black
    squares on the playing board. You aren’t allowed to place your queen halfway between
    two squares. In computer games, these kinds of restrictions are easier to enforce:
    you just have to make sure the position where you place your game object is a
    valid one.


    Grids are also useful in other parts of the game. For example, you may want to
    show a grid of buttons to let the player choose between levels. This is why grids
    are also often used for organizing GUI elements on the screen. In addition to
    grid layouts, this chapter also introduces a few new GUI elements such as a slider
    and an on-off button that are needed for the Penguin Pairs game. You will notice
    that this chapter is a bit math-heavy, due to having to deal with grid locations,
    slider positions, and what not. It’s worthwhile to understand these things well,
    though. Once you’ve done the hard work of creating the classes and methods, you
    can use them over and over again for any games you develop in the future.'
  trans: "\n# 添加音乐与音效\n\n如同在“画家”游戏中一样，你需要为游戏添加音乐和音效，使其更具吸引力。正如你所见，在 Swift 中播放音乐和音效非常容易。你可以使用之前为“画家”游戏创建的\
    \ `Sound` 类。这是代码复用的又一个好例子：你只创建了一次 `Sound` 类，现在却可以在本书的所有游戏中使用它！\n\n为“图坦卡蒙之墓”设计的不少类，对本书中的其他游戏也很有用。当你开始构建自己的游戏时，最终可能会积累一系列经常使用的类似类。在构建游戏时，提前思考是个好主意。哪些类可以在其他项目中复用？如何设计一个类，才能使其在将来也能被再次使用？随着你开发越来越多的类，维护一个列表可能会很有用；这样你在开发新内容时，就能快速扫描列表，并实现一些此前可能未曾想到的功能。\n\
    \n游戏开始时，你会开始播放背景音乐，如下所示（参见 `GameWorld` 类）：\n\n```\nbackgroundMusic.looping = true\n\
    backgroundMusic.volume = 0.5\nbackgroundMusic.play()\n```\n\n当两个相同类型的宝藏碰撞时，你也会播放一个音效（同样在\
    \ `GameWorld` 类中）：\n\n```\nif firstBody?.type == secondBody?.type || firstBody?.type\
    \ == TreasureType.Magic\n    || secondBody?.type == TreasureType.Magic {\n   \
    \ self.scoreObj.score += 10\n    ...\n    treasureCollectSound.play()\n}\n```\n\
    \n最后，当游戏结束时，你会播放一个音效（同样在 `GameWorld` 类中）：\n\n```\nif firstBody?.position.y > 400\
    \ || secondBody?.position.y > 400 {\n    gameover.hidden = false\n    self.removeAllActions()\n\
    \    gameoverSound.play()\n}\n```\n\n至此，“图坦卡蒙之墓”游戏完成。你可以通过运行本章附带的 TutsTombFinal\
    \ 示例来游玩此游戏。作为练习，看看你是否能自己为游戏扩展新功能。例如，你可以在宝藏碰撞时添加额外的动画效果。或者，加上一个排行榜/高分列表怎么样？无论如何，祝你寻宝愉快！\n\
    \n## 排行榜\n\n为什么游戏要有排行榜和高分列表？早期的游戏没有这些功能，因为当时的游戏机没有半持久化存储空间。因此，在不同游戏会话之间无法记住任何东西。也没有“保存游戏”选项，这对游戏机制产生了重要影响：玩家总是必须从头开始，即使他们是老手。\n\
    \n当存储空间可用后，设计师们开始引入排行榜。比别人强总能带来一种满足感，并且为玩家增加了一个重要的目标。但只有当多人在同一台设备上玩游戏时，这才有意义。如果你是唯一的玩家，唯一能做的就是试图超越自己。幸运的是，如今的电脑和游戏机都连接到了互联网。因此，你可以将排行榜存储在线上，并与全世界竞争。\n\
    \n但这又增加了一个问题：一个目标只有可实现时才有吸引力。在数百万人中成为最优秀的玩家，对大多数人来说都是遥不可及的。因此，全球排行榜实际上可能会降低玩家的满意度。为了解决这个问题，游戏通常会引入子排行榜。例如，你可以设立一个仅限于本国或本周内得分的排行榜。你也可以查看自己在朋友中的排名。精心设计游戏的计分系统以及在排行榜上展示这些分数的方式，对于提升玩家的满意度至关重要。\n\
    \n## 你学到了什么\n\n在本章中，你学习了以下内容：\n\n-   如何在游戏中使用自定义字体\n-   如何限制属性和方法的访问权限\n-   如何创建闪烁效果并将其附着到游戏对象上\n\
    \n# 第四部分  \n企鹅对对碰\n\n在本书的这一部分，你将开发游戏“企鹅对对碰”（参见图 IV-1）。我将介绍一些新的游戏编程技巧，例如网格布局中的游戏对象、文件\
    \ I/O、更好的游戏状态管理、在游戏会话之间存储游戏数据等等。\n\n![A978-1-4842-0650-8_4_Part_BookFrontmatter_Fig1_HTML.jpg](img/A978-1-4842-0650-8_4_Part_BookFrontmatter_Fig1_HTML.jpg)\n\
    \n**图 IV-1.** “企鹅对对碰”游戏\n\n“企鹅对对碰”是一款益智游戏，其目标是让相同颜色的企鹅配对。玩家可以通过单击或轻触企鹅，然后选择企鹅应该移动的方向来移动它们。一只企鹅会一直移动，直到被游戏中的另一个角色（可以是企鹅、海豹、鲨鱼或冰山）挡住，或者从游戏区域掉落（掉入水中并被饥饿的鲨鱼吃掉）。游戏的不同关卡会引入新的游戏元素以保持游戏趣味性。例如，有一种特殊的企鹅可以匹配任何其他企鹅；企鹅可能会卡在洞里（这意味着它们无法移动）；以及可以在棋盘上放置食企鹅的鲨鱼。你可以尝试运行第\
    \ 21 章附带的示例程序来体验此游戏的最终版本。\n\n# 17. 菜单与网格\n\n*电子补充材料* 本章的在线版本 (doi:[10.1007/978-1-4842-0650-8_17](http://dx.doi.org/10.1007/978-1-4842-0650-8_17))\
    \ 包含补充材料，仅供授权用户使用。\n\n“企鹅对对碰”是一款益智游戏，而棋盘游戏和益智游戏通常都基于将物体放置在某种网格中。这类游戏的例子比比皆是：国际象棋、俄罗斯方块、井字棋、数独、糖果传奇等等。这些游戏的目标通常是某种方式修改网格的配置以获得分数。在俄罗斯方块中，必须构建完全填满的行；在数独中，行、列和子网格必须满足特定的数值属性。\n\
    \n像网格这样的结构通常会对游戏棋子施加一组规则，将其限制在游戏板上的特定位置或配置上。例如，在国际象棋中，棋子只能（有意义地）放置在游戏板上的白格和黑格上。你不能把你的皇后放在两个格子中间。在电脑游戏中，这类限制更容易实施：你只需确保放置游戏对象的位置是有效位置即可。\n\
    \n网格在游戏的其他部分也非常有用。例如，你可能想显示一个按钮网格，让玩家选择关卡。这就是为什么网格也常用于组织屏幕上的 GUI 元素。除了网格布局，本章还介绍了“企鹅对对碰”游戏所需的一些新\
    \ GUI 元素，例如滑块和开关按钮。你会注意到，由于需要处理网格位置、滑块位置等，本章的数学内容会稍多一些。不过，透彻理解这些概念是值得的。一旦你完成了创建这些类和方法这类艰巨的工作，你就可以在你未来开发的任何游戏中反复使用它们。\n"
- fmt: "# Game Objects in a Grid Layout\n\nBefore writing the code, let’s first think\
    \ about what a grid is, and what kinds of parameters help define a grid. Figure\
    \ [17-1](#A978-1-4842-0650-8_17_Chapter.html#Fig1) shows an overview of all the\
    \ important parameters of a grid. A grid generally consists of a number of cells.\
    \ The grids I use in this book have cells with a fixed width and height. Furthermore,\
    \ the grid will have a number of rows and columns. Since in the SpriteKit framework\
    \ the positive y axis points upward, let’s also define the grid in this way. So,\
    \ the lowest row in the grid is row 0, the row above that row 1, and so on. The\
    \ leftmost column is column 0 and the column index increases in the direction\
    \ of the positive x axis (see also Figure [17-1](#A978-1-4842-0650-8_17_Chapter.html#Fig1)).\
    \ Finally, there may be space between the cells in a grid (for example, if you\
    \ want to show a grid of buttons). This space, also called padding, is defined\
    \ for both the x and y direction.\n\n![A978-1-4842-0650-8_17_Fig1_HTML.gif](A978-1-4842-0650-8_17_Fig1_HTML.gif)\n\
    \nFigure 17-1.\n\nOverview of a grid structure with three rows and five columns\n\
    \nThe way I approach laying out objects in a grid is by creating a `GridLayout`\
    \ class of which an instance is attached to a node in the scene. The `GridLayout`\
    \ instance will be responsible for laying out the child nodes of the node to which\
    \ it is attached. The order of the children in the `children` array belonging\
    \ to `SKNode` determines where each child is located on the grid. In the grid\
    \ in Figure [17-1](#A978-1-4842-0650-8_17_Chapter.html#Fig1), the bottom five\
    \ cells (row 0) are filled with the first five elements in the array, the next\
    \ five children in the array fill row 1, and so on. Instead of adding each child\
    \ node directly to the `SKNode` instance, you call an `add` method in the `GridLayout`\
    \ class to add the child node and calculate its position on the grid.\n\nIn the\
    \ `PenguinPairs1` example, you’ll find the complete code of the `GridLayout` class.\
    \ The class has several properties in order to maintain information about the\
    \ grid size (following Figure [17-1](#A978-1-4842-0650-8_17_Chapter.html#Fig1)):\n\
    \n```\nvar cellWidth: Int = 0, cellHeight: Int = 0, rows: Int = 0, columns: Int\
    \ = 0\n\nvar xPadding: Int = 0, yPadding: Int = 0\n\nvar target: SKNode? = nil\n\
    ```\n\nThe `target` property is the `SKNode` object whose children will be laid\
    \ out in a grid. In the `GameWorld` class, you create a node to contain a number\
    \ of buttons:\n\n```\nvar levelButtons = GameObjectNode()\n```\n\nIn the `GameWorld\
    \ setup` method, you create a layout object, and assign the `levelButtons` node\
    \ as its target:\n\n```\nvar layout = GridLayout(rows: nrRows, columns: nrCols,\
    \ cellWidth: 150, cellHeight: 150)\n\nlayout.xPadding = 5\n\nlayout.yPadding =\
    \ 5\n\nlayout.target = levelButtons\n```\n\nNow let’s create a few useful methods\
    \ and properties in the `GridLayout` class. First, it is useful to be able to\
    \ calculate the total width and height of the grid, given its cell width and height\
    \ and the padding. As you can see in Figure [17-1](#A978-1-4842-0650-8_17_Chapter.html#Fig1),\
    \ the total width of the grid is the number of cells times the cell width, and\
    \ added to that is the number of cells minus 1 times the x padding. The height\
    \ is calculated in a similar way. Here are the two properties in `GridLayout`\
    \ that calculate the total grid width and height:\n\n```\nvar width : CGFloat\
    \ {\n\n    get { return CGFloat(columns * cellWidth + (columns - 1) * xPadding)\
    \ }\n\n}\n\nvar height : CGFloat {\n\n    get { return CGFloat(rows * cellHeight\
    \ + (rows - 1) * yPadding) }\n\n}\n```\n\nLet’s also add a method that can convert\
    \ a row and column index on the grid to a local position in the node. Let’s assume\
    \ that the grid’s origin is its center (just like with sprites). The bottom left\
    \ point of the grid is then `(-width/2, -height/2)`. For the x-position, you then\
    \ add the column index times the sum of the cell width and x padding. For the\
    \ y-position, you do the same with the row index and the sum of the cell height\
    \ and y padding. This gives you the bottom left point of the desired cell. Finally,\
    \ you add half the cell width and height in order to position the child nicely\
    \ in the center of the grid cell. Here is the method that performs this computation:\n\
    \n```\nfunc toPosition(col: Int, row: Int) -> CGPoint {\n\n    let xpos = -width/2\
    \ + CGFloat(col * (cellWidth + xPadding) + cellWidth / 2)\n\n    let ypos = -height/2\
    \ + CGFloat(row * (cellHeight + yPadding) + cellHeight / 2)\n\n    return CGPoint(x:\
    \ xpos, y: ypos)\n\n}\n```\n\nSimilarly, you defined a method called `toGridLocation`\
    \ that converts a position to a column and row index. Check out the code yourself\
    \ in the `PenguinPairs1` example. You can now define a method called `add` that\
    \ adds a node to the target and automatically positions it correctly. Here is\
    \ the complete method:\n\n```\nfunc add(obj: SKNode) {\n\n    if let target_unwrapped\
    \ = target {\n\n        let r = target_unwrapped.children.count / columns\n\n\
    \        let c = target_unwrapped.children.count % columns\n\n        target_unwrapped.addChild(obj)\n\
    \n        obj.position = toPosition(c, row: r)\n\n    }\n\n}\n```\n\nBecause `target`\
    \ is an optional variable, you first unwrap it and then work with the unwrapped\
    \ target. First, you calculate the row and column index belonging to the node\
    \ that will be added, using the number of children in the `children` array. Then,\
    \ you add the object to the target, and call the `toPosition` method to calculate\
    \ its actual position.\n\nFinally, you define a method called `at` that allows\
    \ you to retrieve an object at a particular location in the grid. This method\
    \ returns an optional `SKNode` object. It’s optional because in some cases there\
    \ may not be an `SKNode` object, for example if the supplied column or row index\
    \ is out of range of the grid dimensions. Here is the complete method:\n\n```\n\
    func at(col: Int, row: Int) -> SKNode? {\n\n    if col < 0 || col >= columns ||\
    \ row < 0 || row >= rows {\n\n        return nil\n\n    }\n\n    if let target_unwrapped\
    \ = target {\n\n        var index = row * columns + col\n\n        return target_unwrapped.children[index]\
    \ as? SKNode\n\n    }\n\n    return nil\n\n}\n```\n\nNow you can use the `GridLayout`\
    \ class to organize child objects into a grid structure. In the remaining chapters\
    \ of this book, you will use this class whenever you need game objects in a grid\
    \ layout.\n\nThe `PenguinPairs1` example uses the `GridLayout` class to show a\
    \ grid of level buttons on the screen. In the `GameWorld` class, the level buttons\
    \ are created and added to the grid. The first step is to determine the number\
    \ of rows and columns needed in the grid. The levels will be read from a text\
    \ file, just like with Penguin Pairs. Therefore, the code is structured so that\
    \ based on the number of levels, you can decide how many columns the grid needs,\
    \ and then the code calculates the number of rows required:\n\n```\nlet nrCols\
    \ = 6, nrLevels = 12\n\nvar nrRows = nrLevels / nrCols\n\nif nrLevels % nrCols\
    \ != 0 {\n\n    nrRows++\n\n}\n```\n\nNow you can define the layout to which the\
    \ level buttons should conform, and define x and y padding values to allow for\
    \ some space between the buttons. You also set a node as the target of this layout:\n\
    \n```\nvar layout = GridLayout(rows: nrRows, columns: nrCols, cellWidth: 150,\
    \ cellHeight: 150)\n\nlayout.xPadding = 5\n\nlayout.yPadding = 5\n\nlayout.target\
    \ = levelButtons\n```\n\nYou use a nested `for` loop to fill the grid with level\
    \ buttons, defined as simple `SKSpriteNode` instances for now:\n\n```\nfor var\
    \ i = nrRows - 1; i >= 0; i-- {\n\n    for var j = 0; j < nrCols; j++ {\n\n  \
    \      if i*nrCols + j < nrLevels {\n\n            var level = SKSpriteNode(imageNamed:\
    \ \"spr_level_unsolved\")\n\n            level.zPosition = Layer.Scene\n\n   \
    \         layout.add(level)\n\n        } else {\n\n            layout.add(SKNode())\n\
    \n        }\n\n    }\n\n}\n```"
