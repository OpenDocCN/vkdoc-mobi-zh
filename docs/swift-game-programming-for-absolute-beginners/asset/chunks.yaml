  trans: "\n# 冰块\n\n你可以在游戏中添加的另一种交互类型是当玩家行走在冰面上时的特殊行为。当玩家在冰面上移动时，你希望角色以恒定速度继续滑动，并且在玩家松开按钮时不会停止移动。尽管持续滑动并不完全符合现实（在现实生活中你会滑动并减速），但它确实带来了玩家容易理解的可预测行为，这在很多情况下比追求真实感更重要。要实现这一点，你需要做两件事：\n\
    \n*   扩展 `handleInput` 方法以处理在冰面上的移动。\n*   计算玩家是否站在冰面上。\n\n你需要在 `Player` 类中通过名为\
    \ `walkingOnIce` 的属性来跟踪玩家是否站在冰面上。我们先假设这个属性在其他地方被更新，然后来看如何扩展 `handleInput` 方法。你首先要做的是，当角色在冰面上行走时，提高玩家的行走速度。可以按如下方式操作：\n\
    \n```\nvar walkingSpeed = CGFloat(300)\n\nif self.walkingOnIce {\n    walkingSpeed\
    \ *= 1.5\n}\n```\n\n速度的乘数是一个影响游戏体验的变量。选择合适的值很重要——太快了关卡就无法玩；太慢了，冰面与普通行走表面就没有任何实质性区别。\n\
    \n如果玩家不是在冰面上行走，而是站在地面上，你需要将 x 方向的速度设为零，这样当玩家不再按下触摸按钮时，角色就会停止移动。为了实现这一点，你需要在 `Player`\
    \ 类的 `handleInput` 方法开头添加以下 `if` 指令：\n\n```\nif self.onTheGround && !self.walkingOnIce\
    \ {\n    self.velocity.x = 0\n}\n```\n\n然后处理玩家的输入。如果玩家按下了向左或向右的触摸按钮，你设置相应的 x 方向速度：\n\
    \n```\nif walkLeftButton.down {\n    self.velocity.x = -walkingSpeed\n} else if\
    \ walkRightButton.down {\n    self.velocity.x = walkingSpeed\n}\n```\n\n你唯一需要做的另一件事是判断玩家是否在冰面上行走，并据此更新\
    \ `walkingOnIce` 属性。你已经在使用 `handleCollisions` 方法来检查玩家周围的瓦片，因此要扩展该方法以同时检查玩家是否在冰面上，你只需要添加几行代码。在该方法的开头，你假设玩家不在冰面上，就像你假设玩家不在地面上一样：\n\
    \n```\nself.walkingOnIce = false\n```\n\n玩家只有在位于地面上时才能走在冰面上。你通过以下 `if` 指令来检查他们是否在地面上：\n\
    \n```\nif box.minY - ydifference >= tileBounds.maxY && tileType != .Background\
    \ {\n    self.onTheGround = true\n    self.velocity.y = 0\n    self.position.y\
    \ += depth.y\n}\n```\n\n要检查玩家所站立的瓦片是否为冰瓦片，你需要从瓦片字段中获取该瓦片并检查其 `ice` 属性。你可以通过结合\
    \ `let` 关键字的 `if` 指令来实现，如下所示：\n\n```\nif let currentTile = tiles.layout.at(x,\
    \ row: y) as? Tile {\n    // 对瓦片进行操作\n}\n```\n\n在 `if` 指令内部，你更新 `walkingOnIce`\
    \ 属性。你使用逻辑或运算符，这样即使玩家只有部分身体在冰瓦片上，该属性也会被设为 `true`：\n\n```\nself.walkingOnIce =\
    \ self.walkingOnIce || currentTile.ice\n```\n\n因为你使用逻辑或来计算玩家是否在冰面上行走，所以你会考虑到所有周围的瓦片。其效果是角色会持续移动，直到它不再站立在任何冰瓦片上（即使部分站立也不行）。运行\
    \ TickTick4 示例，来观察玩家角色现在如何与冰面进行交互。\n\n# 敌人与玩家碰撞\n\n最后一种要添加的交互类型是与敌人的碰撞。在很多情况下，当玩家与敌人碰撞时，会导致玩家死亡。在某些情况下，你需要做一些特殊处理（例如，在踩到乌龟时要跳得特别高）。在玩家这边，你需要加载一个额外的动画来显示玩家死亡。因为你不想在玩家死亡后处理玩家输入，所以你需要更新玩家当前的存活状态。你可以使用一个名为\
    \ `alive` 的属性来实现，该属性在 `Player` 实例创建时被设为 `true`。在 `handleInput` 方法中，你检查玩家是否还活着。如果不是，你就从该方法返回，这样就不会处理任何输入：\n\
    \n```\nif !self.alive {\n    return\n}\n```\n\n你还添加一个名为 `die` 的方法让玩家死亡。玩家有两种死亡方式：掉出游戏画面的洞中，以及与敌人碰撞。因此，你向\
    \ `die` 方法传递一个布尔参数，以指示玩家是掉落死亡还是与敌人碰撞死亡。\n\n在 `die` 方法中，你要做几件事。首先，你检查玩家是否已经死亡。如果是，你就直接返回该方法，不做任何操作（毕竟，一个玩家只能死一次）。你将\
    \ `alive` 变量设为 `false`。然后，你将 x 方向的速度设为零，以阻止玩家向左或向右移动。你不需要重置 y 方向的速度，所以玩家会继续下落：死亡并不会导致重力消失。接下来，你确定玩家死亡时要播放哪个声音。如果玩家摔死，产生的音效与死于敌人之手截然不同（千万别在现实中尝试，信我就好）。如果玩家因与敌人碰撞而死，你还会给玩家一个向上的速度。这个向上的速度不太符合现实，但它能带来不错的视觉效果（见图\
    \ 26-1）。最后，你播放 `die` 动画。完整的方法如下：\n\n![A978-1-4842-0650-8_26_Fig1_HTML.jpg](img/A978-1-4842-0650-8_26_Fig1_HTML.jpg)\n\
    \n图 26-1. 玩家与敌人碰撞后死亡\n\n```\nfunc die(falling: Bool = false) {\n    if !alive\
    \ {\n        return\n    }\n    alive = false\n    velocity.x = 0\n    if falling\
    \ {\n        playerFallSound.play()\n    } else {\n        velocity.y = 600\n\
    \        playerDieSound.play()\n    }\n    self.playAnimation(\"die\")\n}\n```\n\
    \n你可以在 `updateDelta` 方法中通过计算玩家的 y 位置是否超出关卡范围来检查玩家是否正在坠落死亡。如果是这种情况，你就调用 `die` 方法：\n\
    \n```\nlet tiles = childNodeWithName(\"//tileField\") as! TileField\n\nif self.box.maxY\
    \ < tiles.box.minY {\n    self.die(falling: true)\n}\n```\n\n在 `updateDelta` 方法的开头，你调用父类的\
    \ `update` 方法以确保动画被更新：\n\n```\nsuper.updateDelta(delta)\n```\n\n接下来，你处理物理和碰撞（即使玩家已经死亡，这些仍然需要处理）。然后你检查玩家是否还活着。如果不是，你就处理完毕，并从该方法返回。\n\
    \n现在玩家可以通过各种可怕的方式死亡了，你需要扩展敌人类来处理碰撞。在 `Rocket` 类中，你添加一个名为 `checkPlayerCollision`\
    \ 的方法，并在火箭的 `updateDelta` 方法中调用它。在 `checkPlayerCollision` 方法中，你只需检查玩家是否与火箭碰撞。如果是这种情况，你就调用\
    \ `Player` 对象上的 `die` 方法。完整的方法如下：\n\n```\nfunc checkPlayerCollision() {\n    let\
    \ player = childNodeWithName(\"//player\") as! Player\n    if player.box.intersects(self.box)\
    \ {\n        player.die()\n    }\n}\n```\n"
- fmt: "在巡逻敌人的情况下，你做了完全相同的事情。你向该类中添加了相同的方法，并从`updateDelta`方法中调用它。`Sparky`类中的版本略有不同：只有在Sparky当前带电时，玩家才应该死亡。因此，你将方法修改如下：\n\
    \n```\nfunc checkPlayerCollision() {\n    let player = childNodeWithName(\"//player\"\
    ) as! Player\n    if player.box.intersects(self.box) && self.waitTime <= 0 {\n\
    \        player.die()\n    }\n}\n```\n\n最后，`Turtle`敌人增加了更多的行为。你首先检查乌龟是否与玩家碰撞。如果不是这种情况，你只需从`checkPlayerCollision`方法中返回，因为处理完毕：\n\
    \n```\nlet player = childNodeWithName(\"//player\") as! Player\nif !player.box.intersects(self.box)\
    \ {\n    return\n}\n```\n\n如果发生碰撞，有两种可能性。第一种是乌龟正在打喷嚏。在这种情况下，玩家死亡：\n\n```\nif sneezing\
    \ {\n    player.die()\n}\n```\n\n第二种情况是乌龟处于等待模式，并且玩家正在跳到乌龟身上。在这种情况下，玩家应该进行一个额外的超高高跳。检查玩家是否正在跳到乌龟身上的一种简单方法是查看`y`轴速度。假设如果该速度为负，则玩家正在跳到乌龟身上。因此，你调用`jump`方法让玩家跳得更高：\n\
    \n```\nelse if player.velocity.y < 0 && player.alive {\n    player.jump(900)\n\
    }\n```\n\n当然，你只想在玩家仍然活着时才执行此操作。\n\n你现在已经完成了游戏中角色和对象之间主要交互的编程。还有一个“交互”需要添加到游戏中：玩家角色与设备屏幕之间的交互。\n\
    \n## 添加水平和垂直滚动\n\n你可能已经注意到，关卡通常比任何苹果设备的屏幕都要大。尤其是在iPad上，每个关卡的左半部分和右半部分有很大一部分在屏幕上是不可见的。为了确保游戏在所有设备上都能正常工作，你应该添加一种机制，在游戏过程中向玩家显示关卡的相关部分。在平台游戏中实现这一点的最常见方法是添加滚动行为。这意味着当玩家在游戏世界中移动时，游戏世界会在屏幕上随着玩家一起滚动。从某种意义上说，设备屏幕变成了一个移动的虚拟摄像头，可以看到游戏世界的一部分。有些游戏只允许水平（横向）滚动，其他游戏也允许垂直滚动。在Tick\
    \ Tick中，你将同时添加水平和垂直滚动。\n\n幸运的是，为Tick Tick游戏添加滚动非常容易，因为你已经做好了大部分准备工作。在`LevelState`类内部，`world`节点当前包含所有属于该关卡的物品。覆盖层（例如退出按钮或行走和跳跃按钮）不是此节点的一部分。这是一件好事，因为你不希望当关卡开始滚动时，这些按钮移出屏幕！\n\
    \n为了简单起见，我们制作一个非常基础的滚动机制，尝试跟随玩家。你将在`LevelState`的`updateDelta`方法中执行此操作。第一步是调用`super`类方法（以便更新关卡中的所有对象），并获取玩家：\n\
    \n```\nsuper.updateDelta(delta)\nlet player = childNodeWithName(\"//player\")\
    \ as! Player\n```\n\n现在你需要让虚拟摄像头跟随玩家。一种非常简单的方法是将世界位置简单地设置为与玩家位置相同：\n\n```\nworld.position\
    \ = -player.position\n```\n\n注意这里的减号。如果玩家向右移动，世界需要向左移动，这样你仍然可以看到玩家。这个特定指令的结果是，玩家将始终显示在设备屏幕的正中央，因为世界位置现在补偿了玩家位置，并且游戏场景的锚点设置在屏幕中心。虽然这种方法效果很好，但你需要解决一个问题。现在摄像头跟随玩家，当玩家接近关卡边缘时，可能会看到空白区域。这是不可取的。你希望将世界位置限制在其允许的最大值和最小值之间，这样摄像头永远不会部分位于世界之外。\n\
    \n如何计算这些值？我们先看一个例子。假设玩家正在向右移动，并且摄像头正在跟随玩家。这意味着世界节点将向左移动。你能将世界节点向左移动多少，直到开始看到空白空间？如果你将世界向左移动关卡宽度的一半，那么设备屏幕的一半将显示空白空间。为了解决这个问题，需要将设备屏幕宽度的一半加回来，以便关卡的左边缘与设备的左边缘精确对齐。这样就得到了屏幕最左侧的允许位置：\n\
    \n```\nlet minx = CGFloat(-tileField.layout.width/2) + GameScreen.instance.size.width/2\n\
    ```\n\n请参阅图26-2的说明。在该图中，玩家已经向右移动得太远，以至于世界位置必须被限制以避免显示空白空间。类似地，你也可以找到世界位置允许的最右侧值：\n\
    \n![A978-1-4842-0650-8_26_Fig2_HTML.jpg](A978-1-4842-0650-8_26_Fig2_HTML.jpg)\n\
    \n图26-2. 屏幕摄像头在关卡边界内跟随玩家\n\n```\nlet maxx = CGFloat(tileField.layout.width/2)\
    \ - GameScreen.instance.size.width/2\n```\n\n并且你可以对`y`轴执行相同操作：\n\n```\nlet miny\
    \ = CGFloat(-tileField.layout.height/2) + GameScreen.instance.size.height/2\n\
    let maxy = CGFloat(tileField.layout.height/2) - GameScreen.instance.size.height/2\n\
    ```\n\n剩下的唯一一件事就是将世界位置限制在这些最小值和最大值之间：\n\n```\nworld.position.x = clamp(-player.position.x,\
    \ minx, maxx)\nworld.position.y = clamp(-player.position.y, miny, maxy)\n```\n\
    \n现在滚动在水平和垂直方向上都有效，并且你确保设备屏幕上永远不会显示任何空白空间（除非你的关卡尺寸小于设备尺寸）。查看TickTick4示例以查看滚动效果。在第27章中，你将通过添加背景中的山和移动的云来完成这个游戏。你还将添加管理关卡之间过渡的代码。\n\
    \n## 死亡与否？\n\n我在本节中做了一个选择，即玩家在触碰敌人时立即死亡。其他选择是给玩家多条命，或者为玩家添加一个健康指示器，每次玩家触碰敌人时都会减少。\n\
    \n为游戏添加多条命或健康指示器可以使游戏更有趣，但你也必须确保关卡仍然有足够的难度。作为挑战，尝试为Tick Tick游戏扩展一个玩家的生命值条。\n\n\
    ## 你学到了什么\n\n在本章中，你学到了以下内容：\n\n*   如何编程玩家与水滴和敌人的各种交互方式\n*   如何编程冰瓦片的行为\n*   如何在某些情况下导致玩家死亡\n\
    *   如何为游戏添加水平和垂直滚动"
  raw: 'In the case of the patrolling enemy, you do exactly the same thing. You add
    the same method to that class and call it from the `updateDelta` method. The version
    in the `Sparky` class is slightly different: the player should die only if Sparky
    is currently being electrified. Therefore, you change the method as follows:


    `func checkPlayerCollision() {`


    `let player = childNodeWithName("//player") as! Player`


    `if player.box.intersects(self.box) && self.waitTime <= 0 {`


    `player.die()`


    `}`


    `}`


    Finally, the `Turtle` enemy adds even more behavior. You begin by checking whether
    the turtle collides with the player. If that’s not the case, you simply return
    from the `checkPlayerCollision` method because you’re done:


    `let player = childNodeWithName("//player") as! Player`


    `if !player.box.intersects(self.box) {`


    `return`


    `}`


    If a collision occurs, there are two possibilities. The first is that the turtle
    is currently sneezing. In that case, the player dies:


    `if sneezing {`


    `player.die()`


    `}`


    The second case is that the turtle is in waiting mode, and the player is jumping
    on the turtle. In that case, the player should make an extra-high jump. An easy
    way to check whether the player is jumping on the turtle is to look at the y velocity.
    Assume that if that velocity is negative, the player is jumping on the turtle.
    So, you call the `jump` method to make the player jump extra high:


    `else if player.velocity.y < 0 && player.alive {`


    `player.jump(900)`


    `}`


    And of course, you only want to do this if the player is still alive.


    You now have finished programming the main interactions between the characters
    and objects in the game. There is one more kind of “interaction” to add to the
    game: the interaction between the player character and the device screen.


    ## Adding Horizontal and Vertical Scrolling


    You’ve probably noticed that the levels were generally larger than the screen
    of any of the Apple devices. Especially on the iPad, a big part of the left and
    right side of each level isn’t visible on the screen. In order to make sure that
    the game works as it should on all devices, you should add a mechanism that shows
    the relevant part of the level to the player while playing. The most common way
    to achieve this in platform games is by adding scrolling behavior. This means
    that as the player is moving through the game world, the world scrolls along with
    the player on the screen. In a sense, the device screen becomes a moving virtual
    camera that sees a part of the game world. Some games only allow horizontal (side)
    scrolling, other games also allow vertical scrolling. In Tick Tick, you will add
    both horizontal and vertical scrolling.


    Fortunately, it is really easy to add scrolling to the Tick Tick game because
    you already made most of the preparations. Inside the `LevelState` class, the
    `world` node currently contains all of the items belonging to the level. The overlays
    (such as the Quit button or the walk and jump buttons) are not a part of the node.
    That’s a good thing because you don’t want the buttons to move out of the screen
    as the level starts scrolling!


    To keep things simple, let’s make a very basic scrolling mechanism that tries
    to follow the player. You will do this in the `updateDelta` method of `LevelState`.
    The first step is to call the `super` class method (so that all the objects in
    the level are updated), and retrieve the player:


    `super.updateDelta(delta)`


    `let player = childNodeWithName("//player") as! Player`


    Now you need to make the virtual camera follow the player. A very naïve way to
    do this would be to simply set the world position to be the same as the player
    position:


    `world.position = -player.` `position`


    Notice the minus sign here. If the player moves to the right, the world needs
    to move to the left so that you can still see the player. The result of this particular
    instruction is that the player will always be shown exactly in the middle of the
    device screen, since the world position is now compensating for the player position,
    and the anchor point of the game scene is set at the center of the screen. Although
    this approach works well, you need to solve a problem. Now that the camera is
    following the player, it is possible that when the player approaches the edge
    of the level, you will see empty space. This is not desirable. You want to clamp
    the world position between its allowed maximum and minimum values so that the
    camera will never be partly outside of the world.


    How do you calculate these values? Let’s first look at one example. Suppose that
    the player is moving to the right and that the camera is following the player.
    This means that the world node will be displaced to the left. How much can you
    move the world node to the left until you start seeing empty space? If you move
    the world half of the width of the level to the left, then half of the screen
    of your device will show empty space. In order to fix this, you need to add back
    half of the width of the device screen so that the left edge of the world matches
    up exactly with the left edge of the device. This gives you the leftmost allowed
    position of the screen:


    `let minx = CGFloat(-tileField.layout.width/2) + GameScreen.instance.size.width/2`


    See Figure [26-2](#A978-1-4842-0650-8_26_Chapter.html#Fig2) for an illustration.
    In it, the player has moved so far to the right that the world position has to
    be clamped to avoid showing empty space. Similarly, you can also find the rightmost
    value that is allowed for the world position:


    ![A978-1-4842-0650-8_26_Fig2_HTML.jpg](A978-1-4842-0650-8_26_Fig2_HTML.jpg)


    Figure 26-2.


    The screen camera follows the player while staying within the boundaries of the
    level


    `let maxx = CGFloat(tileField.layout.width/2) – GameScreen.instance.size.width/2`


    And you can do the same thing for the y axis:


    `let miny = CGFloat(-tileField.layout.height/2) + GameScreen.instance.size.height/2`


    `let maxy = CGFloat(tileField.layout.height/2) – GameScreen.instance.size.height/2`


    The only thing left to do is to clamp the world position between these minimum
    and maximum values:


    `world.position.x = clamp(-player.position.x, minx, maxx)`


    `world.position.y = clamp(-player.position.y, miny, maxy)`


    Now scrolling works in both horizontal and vertical directions, and you make sure
    that there is never any empty space shown on the device screen (unless your level
    size is smaller than the device size). Check out the TickTick4 example to see
    the scrolling in action. In [Chapter 27](#A978-1-4842-0650-8_27_Chapter.html),
    you will finish this game by adding mountains and moving clouds in the background.
    You will also add the code that manages transitions between the levels.


    To Die, or Not to Die?


    I made a choice in this section that the player dies immediately when they touch
    an enemy. Other options are to give the player several lives or to add a health
    indicator for the player that decreases every time the player touches an enemy.


    Adding multiple lives or a health indicator to a game can make the game more fun,
    but you also have to be sure the levels are still difficult enough. As a challenge,
    try to extend the Tick Tick game with a health bar for the player.


    ## What You Have Learned


    In this chapter, you have learned the following:


    *   How to program various kinds of player interactions with water drops and enemies

    *   How to program ice tile behavior

    *   How to cause the player to die in certain situations

    *   How to add horizontal and vertical scrolling to a game'
  trans: "```markdown\n在巡逻敌人的情况下，你做了完全相同的事情。你向该类中添加了相同的方法，并从`updateDelta`方法中调用它。`Sparky`类中的版本略有不同：只有在\
    \ Sparky 当前带电时，玩家才应该死亡。因此，你将方法修改如下：\n\n```\nfunc checkPlayerCollision() {\n  \
    \  let player = childNodeWithName(\"//player\") as! Player\n    if player.box.intersects(self.box)\
    \ && self.waitTime <= 0 {\n        player.die()\n    }\n}\n```\n\n最后，`Turtle`敌人增加了更多的行为。你首先检查乌龟是否与玩家碰撞。如果不是这种情况，你只需从`checkPlayerCollision`方法中返回，因为处理完毕：\n\
    \n```\nlet player = childNodeWithName(\"//player\") as! Player\nif !player.box.intersects(self.box)\
    \ {\n    return\n}\n```\n\n如果发生碰撞，有两种可能性。第一种是乌龟正在打喷嚏。在这种情况下，玩家死亡：\n\n```\nif sneezing\
    \ {\n    player.die()\n}\n```\n\n第二种情况是乌龟处于等待模式，并且玩家正在跳到乌龟身上。在这种情况下，玩家应该进行一个额外的超高高跳。检查玩家是否正在跳到乌龟身上的一种简单方法是查看`y`轴速度。假设如果该速度为负，则玩家正在跳到乌龟身上。因此，你调用`jump`方法让玩家跳得更高：\n\
    \n```\nelse if player.velocity.y < 0 && player.alive {\n    player.jump(900)\n\
    }\n```\n\n当然，你只想在玩家仍然活着时才执行此操作。\n\n你现在已经完成了游戏中角色和对象之间主要交互的编程。还有一个“交互”需要添加到游戏中：玩家角色与设备屏幕之间的交互。\n\
    \n## 添加水平和垂直滚动\n\n你可能已经注意到，关卡通常比任何苹果设备的屏幕都要大。尤其是在 iPad 上，每个关卡的左半部分和右半部分有很大一部分在屏幕上是不可见的。为了确保游戏在所有设备上都能正常工作，你应该添加一种机制，在游戏过程中向玩家显示关卡的相关部分。在平台游戏中实现这一点的最常见方法是添加滚动行为。这意味着当玩家在游戏世界中移动时，游戏世界会在屏幕上随着玩家一起滚动。从某种意义上说，设备屏幕变成了一个移动的虚拟摄像头，可以看到游戏世界的一部分。有些游戏只允许水平（横向）滚动，其他游戏也允许垂直滚动。在\
    \ Tick Tick 中，你将同时添加水平和垂直滚动。\n\n幸运的是，为 Tick Tick 游戏添加滚动非常容易，因为你已经做好了大部分准备工作。在`LevelState`类内部，`world`节点当前包含所有属于该关卡的物品。覆盖层（例如退出按钮或行走和跳跃按钮）不是此节点的一部分。这是一件好事，因为你不希望当关卡开始滚动时，这些按钮移出屏幕！\n\
    \n为了简单起见，我们制作一个非常基础的滚动机制，尝试跟随玩家。你将在`LevelState`的`updateDelta`方法中执行此操作。第一步是调用`super`类方法（以便更新关卡中的所有对象），并获取玩家：\n\
    \n```\nsuper.updateDelta(delta)\nlet player = childNodeWithName(\"//player\")\
    \ as! Player\n```\n\n现在你需要让虚拟摄像头跟随玩家。一种非常简单的方法是将世界位置简单地设置为与玩家位置相同：\n\n```\nworld.position\
    \ = -player.position\n```\n\n注意这里的减号。如果玩家向右移动，世界需要向左移动，这样你仍然可以看到玩家。这个特定指令的结果是，玩家将始终显示在设备屏幕的正中央，因为世界位置现在补偿了玩家位置，并且游戏场景的锚点设置在屏幕中心。虽然这种方法效果很好，但你需要解决一个问题。现在摄像头跟随玩家，当玩家接近关卡边缘时，可能会看到空白区域。这是不可取的。你希望将世界位置限制在其允许的最大值和最小值之间，这样摄像头永远不会部分位于世界之外。\n\
    \n如何计算这些值？我们先看一个例子。假设玩家正在向右移动，并且摄像头正在跟随玩家。这意味着世界节点将向左移动。你能将世界节点向左移动多少，直到开始看到空白空间？如果你将世界向左移动关卡宽度的一半，那么设备屏幕的一半将显示空白空间。为了解决这个问题，需要将设备屏幕宽度的一半加回来，以便关卡的左边缘与设备的左边缘精确对齐。这样就得到了屏幕最左侧的允许位置：\n\
    \n```\nlet minx = CGFloat(-tileField.layout.width/2) + GameScreen.instance.size.width/2\n\
    ```\n\n请参阅图 26-2 的说明。在该图中，玩家已经向右移动得太远，以至于世界位置必须被限制以避免显示空白空间。类似地，你也可以找到世界位置允许的最右侧值：\n\
    \n![A978-1-4842-0650-8_26_Fig2_HTML.jpg](img/A978-1-4842-0650-8_26_Fig2_HTML.jpg)\n\
    \n图 26-2. 屏幕摄像头在关卡边界内跟随玩家\n\n```\nlet maxx = CGFloat(tileField.layout.width/2)\
    \ - GameScreen.instance.size.width/2\n```\n\n并且你可以对`y`轴执行相同操作：\n\n```\nlet miny\
    \ = CGFloat(-tileField.layout.height/2) + GameScreen.instance.size.height/2\n\
    let maxy = CGFloat(tileField.layout.height/2) - GameScreen.instance.size.height/2\n\
    ```\n\n剩下的唯一一件事就是将世界位置限制在这些最小值和最大值之间：\n\n```\nworld.position.x = clamp(-player.position.x,\
    \ minx, maxx)\nworld.position.y = clamp(-player.position.y, miny, maxy)\n```\n\
    \n现在滚动在水平和垂直方向上都有效，并且你确保设备屏幕上永远不会显示任何空白空间（除非你的关卡尺寸小于设备尺寸）。查看 TickTick4 示例以查看滚动效果。在第\
    \ 27 章中，你将通过添加背景中的山和移动的云来完成这个游戏。你还将添加管理关卡之间过渡的代码。\n\n## 死亡与否？\n\n我在本节中做了一个选择，即玩家在触碰敌人时立即死亡。其他选择是给玩家多条命，或者为玩家添加一个健康指示器，每次玩家触碰敌人时都会减少。\n\
    \n为游戏添加多条命或健康指示器可以使游戏更有趣，但你也必须确保关卡仍然有足够的难度。作为挑战，尝试为 Tick Tick 游戏扩展一个玩家的生命值条。\n\
    \n## 你学到了什么\n\n在本章中，你学到了以下内容：\n\n*   如何编程玩家与水滴和敌人的各种交互方式\n*   如何编程冰瓦片的行为\n*  \
    \ 如何在某些情况下导致玩家死亡\n*   如何为游戏添加水平和垂直滚动\n```"
- fmt: "# 27. Finishing the Tick Tick Game\n\nElectronic supplementary material The\
    \ online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​27](http://dx.doi.org/10.1007/978-1-4842-0650-8_27))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    In this chapter, you will finish the Tick Tick game. First, you will add a timer\
    \ so that the player has a limited amount of time to complete each level. Then,\
    \ you will add a few mountains and clouds to the background to make the game visually\
    \ more interesting. Finally, you will write the code that allows the player to\
    \ progress through the level.\n\n## Adding a Timer\n\nLet’s first look at adding\
    \ a timer to the game. You don’t want the timer to take up too much screen space,\
    \ so you use a text version of it. The `Timer` class inherits from the `SKNode`\
    \ class, and it contains a background frame as well as a label node showing the\
    \ remaining time. You want to be able to pause the timer (for example, when the\
    \ level is finished), so you add a Boolean property called `running` that indicates\
    \ whether the timer is running. You store the time remaining in a property called\
    \ `timeLeft`. The number of seconds that the player has for each level is read\
    \ from the text file and is stored in a property called `totalTime`. When the\
    \ `reset` method is called, the timer is set to the total time, and it will start\
    \ counting down. Here is the complete `reset` method:\n\n```\noverride func reset()\
    \ {\n    super.reset()\n    self.timeLeft = totalTime\n    self.running = true\n\
    }\n```\n\nNow the only thing you still need to do is implement the `updateDelta`\
    \ method to program the timer behavior. As a first step, you only update the timer\
    \ if it’s running and if there is still time left. If that’s not the case, you\
    \ return from the method:\n\n```\nif self.timeLeft < 0 || !self.running {\n  \
    \  return\n}\n```\n\nThen, you subtract the elapsed game time from the current\
    \ remaining time:\n\n```\nself.timeLeft -= delta\n```\n\nNext, you create the\
    \ text that you want to print on the screen. You could simply print the number\
    \ of seconds on the screen, but let’s make the timer a bit more generic so it’s\
    \ also possible to define a timer that can handle minutes as well as seconds.\
    \ For example, if you want to define a timer that counts down from two minutes,\
    \ you initialize it as follows:\n\n```\nself.timeLeft = 120\n```\n\nYou want to\
    \ display “2:00” instead of “120” on the screen. To do this, you need to calculate\
    \ in the `updateDelta` method how many minutes are left. First, you round up the\
    \ current number of seconds. This is necessary because you want to show “2:00”\
    \ on the screen between the 119th and 120th second. You use the `ceil` method\
    \ for this:\n\n```\nlet roundedTimeLeft = Int(ceil(timeLeft))\n```\n\nIn addition\
    \ to the `ceil` method, you have also seen the `floor` method, which rounds down.\
    \ So `ceil(0.1)` yields 1, `floor(0.1)` yields 0. The number of minutes and seconds\
    \ is then calculated as follows:\n\n```\nlet minutes = roundedTimeLeft / 60\n\
    let seconds = roundedTimeLeft % 60\n```\n\nNow that you’ve calculated the number\
    \ of minutes and seconds remaining, you can create a string that you draw on the\
    \ screen:\n\n```\ntextLabel.text = \"\\(minutes):\\(seconds)\"\nif seconds < 10\
    \ {\n    textLabel.text = \"\\(minutes):0\\(seconds)\"\n}\n```\n\nYou set the\
    \ color of the text to yellow so it better fits the design of the game:\n\n```\n\
    textLabel.fontColor = UIColor.yellowColor()\n```\n\nFinally, you want to warn\
    \ the player if they don’t have a lot of time left to finish the level. You do\
    \ this by alternating between red and yellow when printing the text on the screen.\
    \ You can do this with an `if` instruction and a clever use of the remainder operator:\n\
    \n```\nif timeLeft <= 10 && seconds % 2 == 0 {\n    textLabel.fontColor = UIColor.redColor()\n\
    }\n```\n\nAlthough calculating things with time in this manner is sufficient for\
    \ the Tick Tick game, you might find yourself wanting to do more complex time\
    \ or date representations. Swift has the `NSDate` class, which represents time,\
    \ and you can use it in combination with the `NSDateFormatter` class, which allows\
    \ you to specify exactly how you want to represent a date and/or time as a string.\n\
    \n### Making the Timer Go Faster or Slower\n\nDepending on the kind of tile the\
    \ player is walking on, time should go faster or slower. Walking on a hot tile\
    \ increases the speed at which time passes, whereas walking on an ice tile decreases\
    \ it. To allow for a timer that runs at different speeds, you introduce a multiplier\
    \ value in the `Timer` class. This value is stored as a property, which is initially\
    \ set to 1:\n\n```\nvar multiplier = 1.0\n```\n\nTaking this multiplier into account\
    \ while the timer is running is fairly easy. You simply multiply the passed time\
    \ by the multiplier in the `updateDelta` method, and you’re done:\n\n```\nself.timeLeft\
    \ -= delta * multiplier\n```\n\nNow that you can change the speed at which time\
    \ passes, you can do this depending on the kind of tile the player is walking\
    \ on. In the `Player` class, you already maintain the `walkingOnIce` property,\
    \ which indicates whether the player is walking on an ice tile. In order to handle\
    \ hot tiles as well, you define another property called `walkingOnHot`, in which\
    \ you keep track of whether the player is walking on a hot tile. To determine\
    \ the value of this property, you follow the same approach you did for the `walkingOnIce`\
    \ property. In the `handleCollisions` method, you initially set this property\
    \ to `false`:\n\n```\nself.walkingOnHot = false\n```\n\nThen you add one line\
    \ of code to update the value of the property depending on the current tile the\
    \ player is standing on:\n\n```\nself.walkingOnHot = self.walkingOnHot || currentTile.hot\n\
    ```\n\nFor the complete code, see the `Player` class belonging to the TickTickFinal\
    \ example.\n\nUsing the `walkingOnIce` and `walkingOnHot` properties, you can\
    \ now update the timer multiplier. You do this in the player’s `updateDelta` method:\n\
    \n```\nlet timer = childNodeWithName(\"//timer\") as! Timer\nif self.walkingOnHot\
    \ {\n    timer.multiplier = 2.0\n} else if self.walkingOnIce {\n    timer.multiplier\
    \ = 0.5\n} else {\n    timer.multiplier = 1\n}\n```\n\nFrom a game design perspective,\
    \ it’s probably a good idea to explicitly let the player know that walking on\
    \ a hot tile shortens the time left for finishing the level. You can do this by\
    \ briefly showing a warning overlay, showing a smoke animation around the player\
    \ character, or changing the timer’s display color. You can also play back a warning\
    \ sound. Another possibility is to change the background music to something more\
    \ frantic, to make the player realize something has changed.\n\n### Adapting to\
    \ the Skills of the Player\n\nChanging the speed of the timer can make a level\
    \ much easier or harder. You could extend the game so that in some cases the timer\
    \ stops or moves back a few seconds if the player picked up a special item. You\
    \ could even make the level progression adaptive so that if the player dies too\
    \ often, the maximum number of seconds per level is increased. However, be careful\
    \ about doing this. If you help the player in a too-obvious way, the player will\
    \ realize it and adapt their strategy to it (in other words, the player will play\
    \ worse in order to make the levels easier). Also, the player may feel they aren’t\
    \ being treated seriously. A better way to deal with adapting the maximum time\
    \ per level is to allow the player to (partly) transfer time left over from previous\
    \ levels to the current level. That way, difficult levels can be made easier,\
    \ but the player has to do something to make that happen. You could also consider\
    \ adding difficulty levels, where a more difficult level has a faster timer but\
    \ also better benefits such as more points, extra items to pick up, or extra abilities\
    \ for the player. Casual game players can then select the “Can I play, Daddy?”\
    \ difficulty level, whereas skilled players can opt for the extremely challenging\
    \ “I am Death incarnate” level."
