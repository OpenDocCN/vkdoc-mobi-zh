- fmt: "# 25. Intelligent Enemies\n\nElectronic supplementary material The online\
    \ version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​25](http://dx.doi.org/10.1007/978-1-4842-0650-8_25))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    As the next step in developing the Tick Tick game, let's introduce some peril\
    \ to the player by adding dangerous enemies. If the player touches an enemy, the\
    \ player dies. The enemies generally aren't controlled by the player (that would\
    \ make it too easy). Therefore, you need to define some kind of smart (or stupid)\
    \ behavior. You don't want these enemies to be too smart: the player should be\
    \ able to complete the level. After all, that is the goal of playing a game: winning\
    \ it. What is nice is that you can build different types of enemies that exhibit\
    \ different types of behavior. As a result, the player has different gameplay\
    \ options and must develop different strategies to complete the level.\n\nDefining\
    \ the behavior of an enemy can lead to some very complex code, with many different\
    \ states, reasoning, path planning, and much more. You will see a few different\
    \ types of enemies in this chapter: a rocket, a sneezing turtle (seriously), Sparky,\
    \ and a couple of different patrolling enemies. This chapter doesn't deal with\
    \ how the player should interact with enemies—you'll only define their basic behavior.\n\
    \n## The Rocket\n\nOne of the most basic enemies is a rocket. A rocket flies from\
    \ one side of the screen to the other and then reappears after some time has passed.\
    \ If the player comes in contact with the rocket, the player dies. In the level\
    \ description, you indicate with the `r` and `R` characters that a rocket enemy\
    \ should be placed in a level. For example, consider this level description:\n\
    \n`Many, many, many, many, many rockets...`\n\n`20 15`\n\n`30`\n\n`....................`\n\
    \n`r..W...........X....`\n\n`...--..W.......--...`\n\n`....W.--........W..R`\n\
    \n`...--..........--...`\n\n`r..W......W....W....`\n\n`...--....--....--...`\n\
    \n`....W...........W...`\n\n`...--........W.--...`\n\n`r..W........--.W....`\n\
    \n`...--..........--...`\n\n`....W...........W..R`\n\n`...--..........--...`\n\
    \n`.1..................`\n\n`######..####..######`\n\nA lowercase `r` means the\
    \ rocket should fly from left to right, and an uppercase `R` means it should fly\
    \ from right to left (see Table [22-1](#A978-1-4842-0650-8_22_Chapter.html#Tab1)\
    \ in [Chapter 22](#A978-1-4842-0650-8_22_Chapter.html)).\n\n### Creating and Resetting\
    \ the Rocket\n\nLet's create a `Rocket` class that represents this particular\
    \ kind of enemy. You inherit from the `AnimatedNode` class because the rocket\
    \ is animated. The `Rocket` class has a few properties: a velocity, its starting\
    \ position in the level, and a property called `spawnTime`, which is needed to\
    \ keep track of when the rocket should appear. In the initializer, you need to\
    \ load the rocket animation and play it, and then you need to check whether the\
    \ animation should be mirrored. Because the animation has the rocket moving to\
    \ the right, you need to mirror it if the rocket moves to the left. You also store\
    \ the starting position of the rocket so you can place it back at that position\
    \ when it moves out of the screen. Here is part of the `Rocket` class definition:\n\
    \n```\nclass Rocket: AnimatedNode {\n    var startPosition: CGPoint = CGPoint.zeroPoint\n\
    \    var spawnTime: CGFloat = 0\n    var velocity = CGPoint.zeroPoint\n    init(moveToLeft:\
    \ Bool, startPos: CGPoint) {\n        startPosition = startPos\n        super.init()\n\
    \        loadAnimation(\"spr_rocket\", looping: true, frameTime: 0.5, name: \"\
    default\")\n        playAnimation(\"default\")\n        if moveToLeft {\n    \
    \        self.xScale = -1\n        }\n        reset()\n    }\n    ...\n}\n```\n\
    \nThe last instruction in the initializer is a call to the `reset` method. In\
    \ this method, you set the current position of the rocket to the starting position,\
    \ hide the rocket (it should initially be invisible), and set its velocity to\
    \ zero. You also use the random number generator to calculate a random time (in\
    \ seconds) after which the rocket should appear and start moving. You store this\
    \ time in the property `spawnTime`. You put these instructions in a separate `reset`\
    \ method because you call this method later as well, after the rocket has flown\
    \ out of the screen.\n\n### Programming the Rocket Behavior\n\nThe behavior of\
    \ the rocket is (as usual) encoded in the `updateDelta` method. Basically, a rocket\
    \ exhibits two main types of behavior: either it's visible and moving from one\
    \ end of the screen to the other, or it's invisible and waiting to appear. You\
    \ can determine which of the two states the rocket is in by looking at the value\
    \ of the `spawnTime` property. If this property contains a value larger than zero,\
    \ the rocket is waiting to be spawned. If the value is less than or equal to zero,\
    \ the rocket is visible and moving from one end of the screen to the other.\n\n\
    Let's look at the first case. If the rocket is waiting to be spawned, you simply\
    \ subtract the time that has elapsed since the last `updateDelta` call from the\
    \ spawn time:\n\n```\nif spawnTime > 0 {\n    spawnTime -= CGFloat(delta)\n  \
    \  return\n}\n```\n\nThe second case is slightly more complicated. The rocket\
    \ is moving from one end of the screen to the other. So, you set the hidden status\
    \ to `false` and you calculate the rocket velocity depending on the direction\
    \ it's moving:\n\n```\nhidden = false\nself.velocity.x = 600\nif self.xScale <\
    \ 0 {\n    self.velocity.x *= -1\n}\n```\n\nFinally, you have to check whether\
    \ the rocket has flown outside of the level. If that is the case, the rocket should\
    \ be reset. You check whether the rocket is outside of the level using the bounding\
    \ box of the tile field. If this bounding box doesn't intersect the rocket's bounding\
    \ box, you know the rocket is outside of the level, and you reset it:\n\n```\n\
    let tileField = childNodeWithName(\"//tileField\") as! TileField\nif !tileField.box.intersects(self.box)\
    \ {\n    self.reset()\n}\n```\n\nThis completes the `Rocket` class, except for\
    \ interaction with the player, which is something you will look at in more detail\
    \ in [Chapter 26](#A978-1-4842-0650-8_26_Chapter.html). For the complete class,\
    \ see the TickTick3 example code belonging to this chapter. Figure [25-1](#A978-1-4842-0650-8_25_Chapter.html#Fig1)\
    \ shows a screenshot of the level defined in the first section of this chapter.\
    \ Note that the level is only partly visible since it is bigger than the screen\
    \ of the device.\n\n![A978-1-4842-0650-8_25_Fig1_HTML.jpg](A978-1-4842-0650-8_25_Fig1_HTML.jpg)\n\
    \n**Figure 25-1.** A level with many rockets flying around\n\n## A Patrolling\
    \ Enemy\n\nThe rocket is a type of enemy that basically has no intelligent behavior.\
    \ It flies from left to right or vice versa until it flies out of the level, and\
    \ then it resets itself. You can also add enemies that are slightly smarter, such\
    \ as a patrolling enemy. Let's set up a few different types of patrolling enemies\
    \ that you can add to the game."
  raw: '# 25. Intelligent Enemies


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​25](http://dx.doi.org/10.1007/978-1-4842-0650-8_25))
    contains supplementary material, which is available to authorized users.


    As the next step in developing the Tick Tick game, let’s introduce some peril
    to the player by adding dangerous enemies. If the player touches an enemy, the
    player dies. The enemies generally aren’t controlled by the player (that would
    make it too easy). Therefore, you need to define some kind of smart (or stupid)
    behavior. You don’t want these enemies to be too smart: the player should be able
    to complete the level. After all, that is the goal of playing a game: winning
    it. What is nice is that you can build different types of enemies that exhibit
    different types of behavior. As a result, the player has different gameplay options
    and must develop different strategies to complete the level.


    Defining the behavior of an enemy can lead to some very complex code, with many
    different states, reasoning, path planning, and much more. You will see a few
    different types of enemies in this chapter: a rocket, a sneezing turtle (seriously),
    Sparky, and a couple of different patrolling enemies. This chapter doesn’t deal
    with how the player should interact with enemies—you’ll only define their basic
    behavior.


    ## The Rocket


    One of the most basic enemies is a rocket. A rocket flies from one side of the
    screen to the other and then reappears after some time has passed. If the player
    comes in contact with the rocket, the player dies. In the level description, you
    indicate with the r and R characters that a rocket enemy should be placed in a
    level. For example, consider this level description:


    `Many, many, many, many, many rockets...`


    `20 15`


    `30`


    `....................`


    `r..W...........X....`


    `...--..W.......--...`


    `....W.--........W..R`


    `...--..........--...`


    `r..W......W....W....`


    `...--....--....--...`


    `....W...........W...`


    `...--........W.--...`


    `r..W........--.W....`


    `...--..........--...`


    `....W...........W..R`


    `...--..........--...`


    `.1..................`


    `######..####..######`


    A lowercase r means the rocket should fly from left to right, and an uppercase
    R means it should fly from right to left (see Table [22-1](#A978-1-4842-0650-8_22_Chapter.html#Tab1)
    in [Chapter 22](#A978-1-4842-0650-8_22_Chapter.html)).


    ### Creating and Resetting the Rocket


    Let’s create a `Rocket` class that represents this particular kind of enemy. You
    inherit from the `AnimatedNode` class because the rocket is animated. The `Rocket`
    class has a few properties: a velocity, its starting position in the level, and
    a property called `spawnTime`, which is needed to keep track of when the rocket
    should appear. In the initializer, you need to load the rocket animation and play
    it, and then you need to check whether the animation should be mirrored. Because
    the animation has the rocket moving to the right, you need to mirror it if the
    rocket moves to the left. You also store the starting position of the rocket so
    you can place it back at that position when it moves out of the screen. Here is
    part of the `Rocket` class definition:


    `class Rocket: AnimatedNode {`


        `var startPosition: CGPoint = CGPoint.zeroPoint`


        `var spawnTime: CGFloat = 0`


        `var velocity = CGPoint.zeroPoint`


        `init(moveToLeft: Bool, startPos: CGPoint) {`


            `startPosition = startPos`


            `super.init()`


            `loadAnimation("spr_rocket", looping: true, frameTime: 0.5, name: "default")`


            `playAnimation("default")`


            `if moveToLeft {`


                `self.xScale = -1`


            `}`


            `reset()`


        `}`


        `...`


    `}`


    The last instruction in the initializer is a call to the `reset` method. In this
    method, you set the current position of the rocket to the starting position, hide
    the rocket (it should initially be invisible), and set its velocity to zero. You
    also use the random number generator to calculate a random time (in seconds) after
    which the rocket should appear and start moving. You store this time in the property
    `spawnTime`. You put these instructions in a separate `reset` method because you
    call this method later as well, after the rocket has flown out of the screen.


    ### Programming the Rocket Behavior


    The behavior of the rocket is (as usual) encoded in the `updateDelta` method.
    Basically, a rocket exhibits two main types of behavior: either it’s visible and
    moving from one end of the screen to the other, or it’s invisible and waiting
    to appear. You can determine which of the two states the rocket is in by looking
    at the value of the `spawnTime` property. If this property contains a value larger
    than zero, the rocket is waiting to be spawned. If the value is less than or equal
    to zero, the rocket is visible and moving from one end of the screen to the other.


    Let’s look at the first case. If the rocket is waiting to be spawned, you simply
    subtract the time that has elapsed since the last `updateDelta` call from the
    spawn time:


    `if spawnTime > 0 {`


        `spawnTime -= CGFloat(delta)`


        `return`


    `}`


    The second case is slightly more complicated. The rocket is moving from one end
    of the screen to the other. So, you set the hidden status to `false` and you calculate
    the rocket velocity depending on the direction it’s moving:


    `hidden = false`


    `self.velocity.x = 600`


    `if self.xScale < 0 {`


        `self.velocity.x *= -1`


    `}`


    Finally, you have to check whether the rocket has flown outside of the level.
    If that is the case, the rocket should be reset. You check whether the rocket
    is outside of the level using the bounding box of the tile field. If this bounding
    box doesn’t intersect the rocket’s bounding box, you know the rocket is outside
    of the level, and you reset it:


    `let tileField = childNodeWithName("//tileField") as! TileField`


    `if !tileField.box.intersects(self.box) {`


        `self.reset()`


    `}`


    This completes the `Rocket` class, except for interaction with the player, which
    is something you will look at in more detail in [Chapter 26](#A978-1-4842-0650-8_26_Chapter.html).
    For the complete class, see the TickTick3 example code belonging to this chapter.
    Figure [25-1](#A978-1-4842-0650-8_25_Chapter.html#Fig1) shows a screenshot of
    the level defined in the first section of this chapter. Note that the level is
    only partly visible since it is bigger than the screen of the device.


    ![A978-1-4842-0650-8_25_Fig1_HTML.jpg](A978-1-4842-0650-8_25_Fig1_HTML.jpg)


    Figure 25-1.


    A level with many rockets flying around


    ## A Patrolling Enemy


    The rocket is a type of enemy that basically has no intelligent behavior. It flies
    from left to right or vice versa until it flies out of the level, and then it
    resets itself. You can also add enemies that are slightly smarter, such as a patrolling
    enemy. Let’s set up a few different types of patrolling enemies that you can add
    to the game.'
  trans: "\n# 25. 智能敌人\n\n电子补充材料 本章在线版本（doi:[10.​1007/​978-1-4842-0650-8_​25](http://dx.doi.org/10.1007/978-1-4842-0650-8_25)）包含补充材料，仅供授权用户使用。\n\
    \n作为开发《Tick Tick》游戏的下一步，让我们通过添加危险的敌人来为玩家引入一些危险。如果玩家碰到敌人，玩家就会死亡。敌人通常不受玩家控制（那样游戏就太简单了）。因此，你需要定义某种智能（或愚蠢）的行为。你不想让这些敌人太聪明：玩家应该能够完成关卡。毕竟，玩游戏的目标就是：获胜。好处在于，你可以构建不同类型的敌人，展示不同的行为类型。这样一来，玩家将拥有不同的游戏玩法选择，并且必须制定不同的策略来完成关卡。\n\
    \n定义敌人的行为可能会导致非常复杂的代码，包含许多不同的状态、推理、路径规划等等。在本章中，你将看到几种不同类型的敌人：一枚火箭、一只打喷嚏的乌龟（没错）、闪电狗，以及几个不同的巡逻敌人。本章不涉及玩家应该如何与敌人互动——你只会定义它们的基本行为。\n\
    \n## 火箭\n\n最基本的敌人之一就是火箭。火箭从屏幕的一侧飞到另一侧，然后在一段时间后重新出现。如果玩家接触到火箭，玩家就会死亡。在关卡描述中，你用字符\
    \ `r` 和 `R` 来表示应该在关卡中放置一个火箭敌人。例如，考虑以下关卡描述：\n\n`Many, many, many, many, many rockets...`\n\
    \n`20 15`\n\n`30`\n\n`....................`\n\n`r..W...........X....`\n\n`...--..W.......--...`\n\
    \n`....W.--........W..R`\n\n`...--..........--...`\n\n`r..W......W....W....`\n\
    \n`...--....--....--...`\n\n`....W...........W...`\n\n`...--........W.--...`\n\
    \n`r..W........--.W....`\n\n`...--..........--...`\n\n`....W...........W..R`\n\
    \n`...--..........--...`\n\n`.1..................`\n\n`######..####..######`\n\
    \n小写 `r` 表示火箭应从左向右飞行，大写 `R` 表示它应从右向左飞行（参见第 22 章中的表 22-1）。\n\n### 创建与重置火箭\n\n让我们创建一个代表此类特定敌人的\
    \ `Rocket` 类。你继承自 `AnimatedNode` 类，因为火箭是动画的。`Rocket` 类有几个属性：一个速度、其在关卡中的起始位置，以及一个名为\
    \ `spawnTime` 的属性，该属性用于记录火箭应该出现的时间。在初始化器中，你需要加载火箭动画并播放它，然后检查动画是否应该镜像。由于动画中火箭是向右移动的，因此如果火箭向左移动，你需要将其镜像。你还存储了火箭的起始位置，以便在它移出屏幕时将其放回该位置。以下是\
    \ `Rocket` 类定义的一部分：\n\n```\nclass Rocket: AnimatedNode {\n    var startPosition:\
    \ CGPoint = CGPoint.zeroPoint\n    var spawnTime: CGFloat = 0\n    var velocity\
    \ = CGPoint.zeroPoint\n    init(moveToLeft: Bool, startPos: CGPoint) {\n     \
    \   startPosition = startPos\n        super.init()\n        loadAnimation(\"spr_rocket\"\
    , looping: true, frameTime: 0.5, name: \"default\")\n        playAnimation(\"\
    default\")\n        if moveToLeft {\n            self.xScale = -1\n        }\n\
    \        reset()\n    }\n    ...\n}\n```\n\n初始化器中的最后一个指令是对 `reset` 方法的调用。在这个方法中，你将火箭的当前位置设置为起始位置，隐藏火箭（它最初应该是不可见的），并将其速度设为零。你还使用随机数生成器计算一个随机时间（以秒为单位），之后火箭应出现并开始移动。你将这个时间存储在属性\
    \ `spawnTime` 中。你将这些指令放在一个单独的 `reset` 方法中，因为稍后你还会在火箭飞出屏幕后调用此方法。\n\n### 火箭行为编程\n\
    \n火箭的行为（一如既往）被编码在 `updateDelta` 方法中。基本上，火箭表现出两种主要类型的行为：要么它可见并从屏幕一端移动到另一端，要么它不可见并等待出现。你可以通过查看\
    \ `spawnTime` 属性的值来确定火箭处于这两种状态中的哪一种。如果此属性包含一个大于零的值，则火箭正在等待生成。如果该值小于或等于零，则火箭可见并从屏幕一端移动到另一端。\n\
    \n让我们看第一种情况。如果火箭正在等待生成，你只需从生成时间中减去自上次调用 `updateDelta` 以来经过的时间：\n\n```\nif spawnTime\
    \ > 0 {\n    spawnTime -= CGFloat(delta)\n    return\n}\n```\n\n第二种情况稍微复杂一些。火箭正在从屏幕一端移动到另一端。因此，你将隐藏状态设置为\
    \ `false`，并根据其移动方向计算火箭速度：\n\n```\nhidden = false\nself.velocity.x = 600\nif self.xScale\
    \ < 0 {\n    self.velocity.x *= -1\n}\n```\n\n最后，你必须检查火箭是否飞出了关卡。如果是这种情况，则应重置火箭。你使用瓦片场的边界框来检查火箭是否在关卡之外。如果此边界框与火箭的边界框不相交，你就知道火箭在关卡外部，然后重置它：\n\
    \n```\nlet tileField = childNodeWithName(\"//tileField\") as! TileField\nif !tileField.box.intersects(self.box)\
    \ {\n    self.reset()\n}\n```\n\n这样就完成了 `Rocket` 类，除了与玩家的交互部分——你将在第 26 章中更详细地研究这一点。完整的类，请参见属于本章的\
    \ TickTick3 示例代码。图 25-1 展示了本章第一节中定义的关卡的屏幕截图。请注意，该关卡仅部分可见，因为它比设备屏幕要大。\n\n![A978-1-4842-0650-8_25_Fig1_HTML.jpg](img/A978-1-4842-0650-8_25_Fig1_HTML.jpg)\n\
    \n**图 25-1.** 一个有多枚火箭飞行的关卡\n\n## 巡逻敌人\n\n火箭是一种基本上没有智能行为的敌人。它从左飞到右，或从右飞到左，直到飞出关卡，然后重置自己。你也可以添加稍微更智能一点的敌人，例如巡逻敌人。让我们设置几种不同类型的巡逻敌人，你可以将它们添加到游戏中。\n"
- fmt: "### The Basic `PatrollingEnemy` Class\n\nThe `PatrollingEnemy` class is similar\
    \ to the `Rocket` class. You want the patrolling enemy to be animated, so it inherits\
    \ from the `AnimatedNode` class. You also need to define the behavior of the enemy\
    \ in the overridden `updateDelta` method. The basic behavior of the patrolling\
    \ enemy is that it walks from left to right and back again. If the enemy character\
    \ reaches a gap or a wall tile, the enemy stops walking, waits for some time,\
    \ and turns around. You can place enemies at arbitrary positions in the level.\
    \ For the player, you define some rudimentary physics like falling and jumping.\
    \ You don’t do that for the `PatrollingEnemy` class because the enemies you define\
    \ for this game only walk from left to right and back.\n\nIn the initializer of\
    \ the `PatrollingEnemy` class, you load the main animation for the patrolling\
    \ enemy character (an angry-looking flame, as shown in Figure [25-2](#A978-1-4842-0650-8_25_Chapter.html#Fig2)).\
    \ Initially, you set a positive velocity so the enemy starts walking to the right.\
    \ You also initialize another property called `waitTime` that keeps track of how\
    \ long the enemy has been waiting on one of the edges of the platform it’s walking\
    \ on:\n\n![A978-1-4842-0650-8_25_Fig2_HTML.jpg](A978-1-4842-0650-8_25_Fig2_HTML.jpg)\n\
    \nFigure 25-2.\n\nA few patrolling enemies\n\n```\nclass PatrollingEnemy: AnimatedNode\
    \ {\n    var waitTime: CGFloat = 0\n    var velocity = CGPoint(x: 120, y: 0)\n\
    \n    override init() {\n        super.init()\n        loadAnimation(\"spr_flame\"\
    , looping: true, frameTime: 0.1, name: \"default\")\n        playAnimation(\"\
    default\")\n    }\n    ...\n}\n```\n\nIn the `updateDelta` method, you have to\
    \ distinguish between two cases: the enemy is walking or waiting. You can distinguish\
    \ between these states by looking at the `waitTime` property. If it contains a\
    \ positive value, the enemy is waiting. If the property contains a value of zero\
    \ or less, the enemy is walking. When the enemy is waiting, you don’t have to\
    \ do much. Just as you did in the `Rocket` class, you subtract the elapsed game\
    \ time from the `waitTime` property. If the wait time has reached zero, you need\
    \ to turn the character around. Here is the code to do that:\n\n```\nif waitTime\
    \ > 0 {\n    waitTime -= CGFloat(delta)\n    if waitTime <= 0 {\n        self.turnAround()\n\
    \    }\n}\n```\n\nThe `turnAround` method simply mirrors the animation and inverts\
    \ the velocity:\n\n```\nfunc turnAround() {\n    xScale = -xScale\n    velocity.x\
    \ = 120 * xScale\n}\n```\n\nIf the enemy currently is walking, not waiting, you\
    \ need to find out whether it has reached the edge of the platform it’s walking\
    \ on. It has reached an edge in two cases: either there is a gap, so the enemy\
    \ can’t move any further, or a wall tile is blocking the way. You use the enemy’s\
    \ bounding box to find this information. If the enemy is walking to the left,\
    \ you check the tile to the left of the enemy. If the enemy is walking to the\
    \ right, you check the tile to its right. You can calculate the column index of\
    \ the target tile as follows:\n\n```\nlet tileField = childNodeWithName(\"//tileField\"\
    ) as! TileField\nvar (col, row) = tileField.layout.gridLocation(self.position)\n\
    if xScale < 0 {\n    col -= 1\n} else {\n    col += 1\n}\n```\n\nNext, you have\
    \ to check whether the enemy has reached a wall tile or the border of the platform.\
    \ If the tile below the tile at the calculated indices is a background tile, the\
    \ enemy has reached the border of the platform and must stop walking. If the tile\
    \ at indices `(col, row)` (in other words, the tile right next to the enemy) is\
    \ a wall tile, the enemy also has to stop walking. In order to stop walking, you\
    \ assign a positive value to the wait time and set the x velocity to zero:\n\n\
    ```\nif tileField.getTileType(col, row: row - 1) == .Background ||\n    tileField.getTileType(col,\
    \ row: row) == .Wall {\n    waitTime = 0.5\n    velocity = CGPoint.zeroPoint\n\
    }\n```\n\n### Different Types of Enemies\n\nYou can make the patrolling enemy\
    \ slightly more interesting by introducing a few varieties. Here you can use the\
    \ power of inheritance to write a few subclasses of the `PatrollingEnemy` class\
    \ to define different enemy behaviors.\n\nFor example, you can create an enemy\
    \ that is a bit more unpredictable by letting it change direction once in a while.\
    \ At that point, you can also change the enemy’s walking speed to a random value.\
    \ You do this by defining a class called `UnpredictableEnemy` that inherits from\
    \ the `PatrollingEnemy` class. So, by default, it exhibits the same behavior as\
    \ a regular enemy. You override the `updateDelta` method and add a few lines of\
    \ code that randomly change the direction in which the enemy is walking as well\
    \ as its velocity. Because you reuse most of the `PatrollingEnemy` class code,\
    \ the `UnpredictableEnemy` class is rather short. Here is the complete class definition:\n\
    \n```\nclass UnpredictableEnemy: PatrollingEnemy {\n    override func updateDelta(delta:\
    \ NSTimeInterval) {\n        super.updateDelta(delta)\n        if waitTime <=\
    \ 0 && randomCGFloat() < 0.01 {\n            self.turnAround()\n            self.velocity.x\
    \ = randomCGFloat() * 300 * xScale\n        }\n    }\n}\n```\n\nAs you can see,\
    \ you use an `if` instruction to check whether a randomly generated number falls\
    \ below a certain value. As a result, in a few cases the condition will yield\
    \ `true`. In the body of the `if` instruction, you first turn the enemy around,\
    \ and then you calculate a new x velocity. Note that you multiply the randomly\
    \ generated velocity by the x scale. This is to ensure that the new velocity is\
    \ set in the right direction. You also first call the `updateDelta` method of\
    \ the base class so the right animation is selected, collisions with the player\
    \ are dealt with, and so on.\n\nAnother variety I can think of is an enemy that\
    \ follows the player instead of simply walking from left to the right and back\
    \ again. Again, it inherits from the `PatrollingEnemy` class. Here is a class\
    \ called `PlayerFollowingEnemy`:\n\n```\nclass PlayerFollowingEnemy: PatrollingEnemy\
    \ {\n    override func updateDelta(delta: NSTimeInterval) {\n        super.updateDelta(delta)\n\
    \        let player = childNodeWithName(\"//player\") as! Player\n        let\
    \ direction = player.position.x - self.position.x\n        if direction * velocity.x\
    \ < 0 && player.velocity != CGPoint.zeroPoint {\n            self.turnAround()\n\
    \        }\n    }\n}\n```\n\nThis class defines an enemy that follows the player\
    \ if the player is moving. This is done by checking whether the enemy is currently\
    \ walking in the direction where the player is standing (only taking the x direction\
    \ into account). If not, the enemy turns around. You place a limitation on the\
    \ enemy’s intelligence by doing that only if the player isn’t moving in the x\
    \ direction (in other words, the player’s x velocity is zero).\n\nYou should never\
    \ make enemies too smart. In addition, don’t make them too fast—it would be a\
    \ short game if enemies walked appreciably faster than the player while following\
    \ them. Enemies are there to be beaten by the player so the player can win the\
    \ game. Playing a game where the enemies are too smart or unbeatable isn’t a lot\
    \ of fun, unless you like dying over and over again!"
  raw: '### The Basic PatrollingEnemy Class


    The `PatrollingEnemy` class is similar to the `Rocket` class. You want the patrolling
    enemy to be animated, so it inherits from the `AnimatedNode` class. You also need
    to define the behavior of the enemy in the overridden `updateDelta` method. The
    basic behavior of the patrolling enemy is that it walks from left to right and
    back again. If the enemy character reaches a gap or a wall tile, the enemy stops
    walking, waits for some time, and turns around. You can place enemies at arbitrary
    positions in the level. For the player, you define some rudimentary physics like
    falling and jumping. You don’t do that for the `PatrollingEnemy` class because
    the enemies you define for this game only walk from left to right and back.


    In the initializer of the `PatrollingEnemy` class, you load the main animation
    for the patrolling enemy character (an angry-looking flame, as shown in Figure
    [25-2](#A978-1-4842-0650-8_25_Chapter.html#Fig2)). Initially, you set a positive
    velocity so the enemy starts walking to the right. You also initialize another
    property called `waitTime` that keeps track of how long the enemy has been waiting
    on one of the edges of the platform it’s walking on:


    ![A978-1-4842-0650-8_25_Fig2_HTML.jpg](A978-1-4842-0650-8_25_Fig2_HTML.jpg)


    Figure 25-2.


    A few patrolling enemies


    `class PatrollingEnemy: AnimatedNode {`


        `var waitTime: CGFloat = 0`


        `var velocity = CGPoint(x: 120, y: 0)`


        `override init() {`


            `super.init()`


            `loadAnimation("spr_flame", looping: true, frameTime: 0.1, name: "default")`


            `playAnimation("default")`


        `}`


        `...`


    `}`


    In the `updateDelta` method, you have to distinguish between two cases: the enemy
    is walking or waiting. You can distinguish between these states by looking at
    the `waitTime` property. If it contains a positive value, the enemy is waiting.
    If the property contains a value of zero or less, the enemy is walking. When the
    enemy is waiting, you don’t have to do much. Just as you did in the `Rocket` class,
    you subtract the elapsed game time from the `waitTime` property. If the wait time
    has reached zero, you need to turn the character around. Here is the code to do
    that:


    `if waitTime > 0 {`


        `waitTime -= CGFloat(delta)`


        `if waitTime <= 0 {`


            `self.turnAround()`


        `}`


    `}`


    The `turnAround` method simply mirrors the animation and inverts the velocity:


    `func turnAround() {`


        `xScale = -xScale`


        `velocity.x = 120 * xScale`


    `}`


    If the enemy currently is walking, not waiting, you need to find out whether it
    has reached the edge of the platform it’s walking on. It has reached an edge in
    two cases: either there is a gap, so the enemy can’t move any further, or a wall
    tile is blocking the way. You use the enemy’s bounding box to find this information.
    If the enemy is walking to the left, you check the tile to the left of the enemy.
    If the enemy is walking to the right, you check the tile to its right. You can
    calculate the column index of the target tile as follows:


    `let tileField = childNodeWithName("//tileField") as! TileField`


    `var (col, row) = tileField.layout.gridLocation(self.position)`


    `if xScale < 0 {`


        `col -= 1`


    `} else {`


        `col += 1`


    `}`


    Next, you have to check whether the enemy has reached a wall tile or the border
    of the platform. If the tile below the tile at the calculated indices is a background
    tile, the enemy has reached the border of the platform and must stop walking.
    If the tile at indices `(col, row)` (in other words, the tile right next to the
    enemy) is a wall tile, the enemy also has to stop walking. In order to stop walking,
    you assign a positive value to the wait time and set the x velocity to zero:


    `if tileField.getTileType(col, row: row - 1) == .Background ||`


        `tileField.getTileType(col, row: row) == .Wall {`


        `waitTime = 0.5`


        `velocity = CGPoint.zeroPoint`


    `}`


    ### Different Types of Enemies


    You can make the patrolling enemy slightly more interesting by introducing a few
    varieties. Here you can use the power of inheritance to write a few subclasses
    of the `PatrollingEnemy` class to define different enemy behaviors.


    For example, you can create an enemy that is a bit more unpredictable by letting
    it change direction once in a while. At that point, you can also change the enemy’s
    walking speed to a random value. You do this by defining a class called `UnpredictableEnemy`
    that inherits from the `PatrollingEnemy` class. So, by default, it exhibits the
    same behavior as a regular enemy. You override the `updateDelta` method and add
    a few lines of code that randomly change the direction in which the enemy is walking
    as well as its velocity. Because you reuse most of the `PatrollingEnemy` class
    code, the `UnpredictableEnemy` class is rather short. Here is the complete class
    definition:


    `class UnpredictableEnemy: PatrollingEnemy {`


        `override func updateDelta(delta: NSTimeInterval) {`


            `super.updateDelta(delta)`


            `if waitTime <= 0 && randomCGFloat() < 0.01 {`


                `self.turnAround()`


                `self.velocity.x = randomCGFloat() * 300 * xScale`


            `}`


        `}`


    `}`


    As you can see, you use an `if` instruction to check whether a randomly generated
    number falls below a certain value. As a result, in a few cases the condition
    will yield `true`. In the body of the `if` instruction, you first turn the enemy
    around, and then you calculate a new x velocity. Note that you multiply the randomly
    generated velocity by the x scale. This is to ensure that the new velocity is
    set in the right direction. You also first call the `updateDelta` method of the
    base class so the right animation is selected, collisions with the player are
    dealt with, and so on.


    Another variety I can think of is an enemy that follows the player instead of
    simply walking from left to the right and back again. Again, it inherits from
    the `PatrollingEnemy` class. Here is a class called `PlayerFollowingEnemy`:


    `class PlayerFollowingEnemy: PatrollingEnemy {`


        `override func updateDelta(delta: NSTimeInterval) {`


            `super.updateDelta(delta)`


            `let player = childNodeWithName("//player") as! Player`


            `let direction = player.position.x - self.position.x`


            `if direction * velocity.x < 0 && player.velocity != CGPoint.zeroPoint
    {`


                `self.turnAround()`


            `}`


        `}`


    `}`


    This class defines an enemy that follows the player if the player is moving. This
    is done by checking whether the enemy is currently walking in the direction where
    the player is standing (only taking the x direction into account). If not, the
    enemy turns around. You place a limitation on the enemy’s intelligence by doing
    that only if the player isn’t moving in the x direction (in other words, the player’s
    x velocity is zero).


    You should never make enemies too smart. In addition, don’t make them too fast—it
    would be a short game if enemies walked appreciably faster than the player while
    following them. Enemies are there to be beaten by the player so the player can
    win the game. Playing a game where the enemies are too smart or unbeatable isn’t
    a lot of fun, unless you like dying over and over again!'
  trans: "\n### 基本的 `PatrollingEnemy` 类\n\n`PatrollingEnemy` 类与 `Rocket` 类类似。你希望巡逻敌人具有动画效果，因此它继承自\
    \ `AnimatedNode` 类。你还需要在重写的 `updateDelta` 方法中定义敌人的行为。巡逻敌人的基本行为是：从左走到右，然后折返。如果敌人角色到达一个缺口或墙壁瓷砖处，它会停止行走，等待一段时间，然后转身。你可以在关卡中的任意位置放置敌人。对于玩家，你可以定义一些基本的物理特性，如下落和跳跃。但对于\
    \ `PatrollingEnemy` 类，你不需要这样做，因为你为本游戏定义的敌人只会从左走到右然后折返。\n\n在 `PatrollingEnemy`\
    \ 类的初始化器中，你需要加载巡逻敌人角色的主动画（一个看起来愤怒的火焰，如图 25-2 所示）。初始时，你设置一个正的速度，使敌人开始向右行走。你还初始化了另一个名为\
    \ `waitTime` 的属性，用于记录敌人在其行走的平台边缘等待了多长时间：\n\n![A978-1-4842-0650-8_25_Fig2_HTML.jpg](img/A978-1-4842-0650-8_25_Fig2_HTML.jpg)\n\
    \n图 25-2.\n几个巡逻敌人\n\n```\nclass PatrollingEnemy: AnimatedNode {\n    var waitTime:\
    \ CGFloat = 0\n    var velocity = CGPoint(x: 120, y: 0)\n\n    override init()\
    \ {\n        super.init()\n        loadAnimation(\"spr_flame\", looping: true,\
    \ frameTime: 0.1, name: \"default\")\n        playAnimation(\"default\")\n   \
    \ }\n    ...\n}\n```\n\n在 `updateDelta` 方法中，你需要区分两种情况：敌人正在行走或正在等待。你可以通过查看 `waitTime`\
    \ 属性来区分这些状态。如果该属性包含正值，则敌人在等待；如果该属性值为零或负数，则敌人在行走。当敌人等待时，你不需要做太多工作。就像在 `Rocket`\
    \ 类中一样，你从 `waitTime` 属性中减去经过的游戏时间。如果等待时间已归零，你需要让角色转身。以下是实现该功能的代码：\n\n```\nif waitTime\
    \ > 0 {\n    waitTime -= CGFloat(delta)\n    if waitTime <= 0 {\n        self.turnAround()\n\
    \    }\n}\n```\n\n`turnAround` 方法简单地镜像动画并反转速度：\n\n```\nfunc turnAround() {\n \
    \   xScale = -xScale\n    velocity.x = 120 * xScale\n}\n```\n\n如果敌人当前正在行走（而非等待），你需要判断它是否已到达所行走平台的边缘。有两种情况会触达边缘：要么前方有缺口，敌人无法继续前进；要么有墙壁瓷砖挡住了去路。你使用敌人的包围盒来获取这些信息。如果敌人向左行走，你检查敌人左侧的瓷砖；如果敌人向右行走，你检查它右侧的瓷砖。你可以按如下方式计算目标瓷砖的列索引：\n\
    \n```\nlet tileField = childNodeWithName(\"//tileField\") as! TileField\nvar (col,\
    \ row) = tileField.layout.gridLocation(self.position)\nif xScale < 0 {\n    col\
    \ -= 1\n} else {\n    col += 1\n}\n```\n\n接下来，你需要检查敌人是否碰到了墙壁瓷砖或平台边界。如果计算出的索引位置下方的瓷砖是背景瓷砖，则说明敌人到达了平台边界，必须停止行走。如果索引\
    \ `(col, row)` 处的瓷砖（即紧邻敌人的瓷砖）是墙壁瓷砖，敌人也必须停止行走。为了停止行走，你给等待时间赋予一个正值，并将 x 方向的速度设为零：\n\
    \n```\nif tileField.getTileType(col, row: row - 1) == .Background ||\n    tileField.getTileType(col,\
    \ row: row) == .Wall {\n    waitTime = 0.5\n    velocity = CGPoint.zeroPoint\n\
    }\n```\n\n### 不同类型的敌人\n\n你可以通过引入一些变体，让巡逻敌人变得稍微更有趣一些。这里你可以利用继承的强大功能，编写 `PatrollingEnemy`\
    \ 类的几个子类来定义不同的敌人行为。\n\n例如，你可以创建一个稍微更不可预测的敌人，让它偶尔改变方向。这时，你还可以将敌人的行走速度改为一个随机值。具体做法是定义一个继承自\
    \ `PatrollingEnemy` 类的类，名为 `UnpredictableEnemy`。因此，默认情况下，它表现出与普通敌人相同的行为。你重写 `updateDelta`\
    \ 方法，并添加几行代码，随机改变敌人行走的方向及其速度。因为你复用了 `PatrollingEnemy` 类的大部分代码，`UnpredictableEnemy`\
    \ 类相当简洁。以下是完整的类定义：\n\n```\nclass UnpredictableEnemy: PatrollingEnemy {\n    override\
    \ func updateDelta(delta: NSTimeInterval) {\n        super.updateDelta(delta)\n\
    \        if waitTime <= 0 && randomCGFloat() < 0.01 {\n            self.turnAround()\n\
    \            self.velocity.x = randomCGFloat() * 300 * xScale\n        }\n   \
    \ }\n}\n```\n\n如你所见，你使用一条 `if` 指令来检查随机生成的数字是否低于某个值。因此，在某些情况下，该条件会返回 `true`。在 `if`\
    \ 指令的代码体中，你首先让敌人转身，然后计算新的 x 方向速度。请注意，你将随机生成的速度乘以了 x 轴缩放比例。这是为了确保新速度的方向正确。同时，你首先调用了基类的\
    \ `updateDelta` 方法，以便选择正确的动画、处理与玩家的碰撞等等。\n\n我能想到的另一种变体是，敌人不再只是简单地从左走到右再折返，而是跟随玩家。同样，它也继承自\
    \ `PatrollingEnemy` 类。这是一个名为 `PlayerFollowingEnemy` 的类：\n\n```\nclass PlayerFollowingEnemy:\
    \ PatrollingEnemy {\n    override func updateDelta(delta: NSTimeInterval) {\n\
    \        super.updateDelta(delta)\n        let player = childNodeWithName(\"//player\"\
    ) as! Player\n        let direction = player.position.x - self.position.x\n  \
    \      if direction * velocity.x < 0 && player.velocity != CGPoint.zeroPoint {\n\
    \            self.turnAround()\n        }\n    }\n}\n```\n\n这个类定义了一个敌人，如果玩家正在移动，它会跟随玩家。这是通过检查敌人当前是否正朝着玩家所在的方向行走（仅考虑\
    \ x 方向）来实现的。如果不是，敌人就会转身。你通过设置一个限制条件来降低敌人的“智能”：仅在玩家在 x 方向上没有移动时（即玩家的 x 方向速度为零）才执行上述操作。\n\
    \n你永远不应该让敌人过于聪明。另外，也不要让它们移动得太快——如果敌人在跟随玩家时速度明显快于玩家，游戏会很快结束。敌人的存在是为了让玩家击败，这样玩家才能赢得游戏。在一个敌人过于聪明或无法战胜的游戏中游玩，乐趣会大打折扣，除非你热衷于一次又一次地“阵亡”！\n"
- fmt: "## Other Types of Enemies\n\nYet another enemy you can add to the game is\
    \ a sneezing turtle (see Figure [25-3](#A978-1-4842-0650-8_25_Chapter.html#Fig3)).\
    \ Why a turtle, you ask? And why a sneezing one? Well, I don’t really have an\
    \ answer to that question. But the idea behind this enemy is that it has both\
    \ a negative and a positive side. On the negative side, the turtle grows spikes\
    \ when it sneezes, so you shouldn’t touch it. But if the turtle isn’t sneezing,\
    \ you can use it to jump higher. Because you aren’t dealing with interaction just\
    \ yet, you only add the animated turtle for now. The turtle can be used to jump\
    \ for 5 seconds, then it sneezes and grows spikes for 5 seconds, after which it\
    \ returns to the previous state for 5 seconds, and so on.\n\n![A978-1-4842-0650-8_25_Fig3_HTML.jpg](A978-1-4842-0650-8_25_Fig3_HTML.jpg)\n\
    \nFigure 25-3.\n\nDon’t jump on the spiky turtle!\n\nThe enemy is represented\
    \ by the `Turtle` class, which is set up in a fashion similar to the previous\
    \ enemies. A turtle has two states: it’s idle, or it has sneezed and therefore\
    \ has dangerous spikes. In this case, you maintain two member variables to keep\
    \ track of which state the turtle is in and how much time has passed in that state:\
    \ the `waitTime` property tracks how much time is left in the current state, and\
    \ the `sneezing` property tracks whether the turtle is sneezing. Again, in the\
    \ `updateDelta` method, you handle the transition between the two phases, much\
    \ as you did for the rocket and the patrolling enemies. I don’t go into further\
    \ detail here because the code is very similar to the other enemy classes. You\
    \ can see the complete code in the `TickTick3` program belonging to this chapter.\n\
    \nSparky is the final enemy type that you add to the game. Just like the other\
    \ enemies, Sparky has two states (see Figure [25-4](#A978-1-4842-0650-8_25_Chapter.html#Fig4)).\
    \ Sparky is a very dangerous, electricity-loving enemy. He hangs quietly in the\
    \ air until he receives a bolt of energy, which makes him fall down. While Sparky\
    \ is hanging in the air, he isn’t dangerous; but as soon as he falls, don’t touch\
    \ him! See the `Sparky` class to see the code.\n\n![A978-1-4842-0650-8_25_Fig4_HTML.jpg](A978-1-4842-0650-8_25_Fig4_HTML.jpg)\n\
    \nFigure 25-4.\n\nSparky is dangerous when he is electrified Enemy Software Architecture\n\
    \nAll these different types of enemies look different and behave differently,\
    \ but they generally have a common class design. You could probably design a better\
    \ way to define these enemies by using a couple of generic classes that let you\
    \ define states and transitions between them. There could be conditions attached\
    \ to each transition, such as that a certain amount of time must have passed or\
    \ that an animation should be finished playing. Such a structure is called a finite\
    \ state machine. It’s a very common technique used in artificial intelligence\
    \ systems. If you’re up to the challenge, try to write a finite state machine\
    \ library and redefine the existing enemies to use it!\n\n## Loading the Different\
    \ Types of Enemies\n\nNow that you’ve defined different varieties of enemies,\
    \ the only thing left to do is load them when you read the level data from the\
    \ text file. The sprites for the different enemies are identified using characters.\n\
    \nDepending on the character you read when loading the level, you call a different\
    \ method to load the enemy by adding a few cases to the `switch` instruction in\
    \ the `LevelState` class:\n\n```\ncase \"R\":\n    return loadRocketTile(x, y:\
    \ y, moveToLeft: true)\ncase \"r\":\n    return loadRocketTile(x, y: y, moveToLeft:\
    \ false)\ncase \"A\", \"B\", \"C\":\n    return loadFlameTile(c, x: x, y: y)\n\
    case \"S\":\n    return loadSparkyTile(x, y: y)\ncase \"T\":\n    return loadTurtleTile(x,\
    \ y: y)\n```\n\nLoading an enemy is straightforward. You simply create an instance\
    \ of the enemy you would like to add, set its position, and add it to the `world`\
    \ node. For example, here is the method for loading a turtle enemy:\n\n```\nfunc\
    \ loadTurtleTile(x: Int, y: Int) -> SKNode {\n    var turtle = Turtle()\n    turtle.position\
    \ = tileField.layout.toPosition(x, row: y)\n    turtle.position.y += 20\n    turtle.zPosition\
    \ = Layer.Scene1\n    world.addChild(turtle)\n    return Tile()\n}\n```\n\nYou’ve\
    \ now defined a few different kinds of enemies with varying intelligence and capabilities.\
    \ It’s up to you to define enemies that are smarter, more devious, or even more\
    \ stupid, depending on the needs of your game. You didn’t apply any physics to\
    \ the enemies; however, once you start building smarter enemies that, for example,\
    \ can jump or fall, you’ll need to implement physics just as you did for the player.\
    \ As an exercise, try to think how you can make these enemies more capable without\
    \ having to rely on physics. Can you let them move faster when the player is nearby?\
    \ Can you create an enemy that launches particles toward the player? The possibilities\
    \ are endless, so try these things for yourself!\n\n## What You Have Learned\n\
    \nIn this chapter, you have learned the following:\n\n*   How to define different\
    \ kinds of enemies\n*   How to use inheritance to create variety in enemy behavior\n\
    \n# 26. Adding Player Interaction\n\nElectronic supplementary material The online\
    \ version of this chapter (doi:[10.1007/978-1-4842-0650-8_26](http://dx.doi.org/10.1007/978-1-4842-0650-8_26))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    In this chapter, you will add more interaction between the player and the objects\
    \ in the level. Currently, the player can walk around, and a basic physics system\
    \ allows the player to jump, collide with wall tiles, or fall out of the screen.\
    \ First, you will look at a very simple kind of interaction: collecting water\
    \ drops. Then you will see how to create the behavior that allows the player to\
    \ slide over ice. You will also focus on the part of the program that deals with\
    \ the various player-enemy interactions in the game. Finally, you will add vertical\
    \ and horizontal scrolling to the game.\n\n## Collecting Water Drops\n\nThe first\
    \ thing to add is the possibility for the player to collect water drops. A player\
    \ collects a water drop if the bomb character collides with that drop. In that\
    \ case, you make the drop invisible.\n\nMaking a drop invisible once a player\
    \ collects it isn’t the only way to approach the problem of drawing only the uncollected\
    \ drops, but it’s one of the easiest solutions. Another approach is to maintain\
    \ a list of water drops that have been collected and then add only those drops\
    \ that the player still has to find to the game scene, but this technique requires\
    \ a lot more code.\n\nThe place where you check whether the player collides with\
    \ a water drop is in the `WaterDrop` class. The reason is clear: as before, each\
    \ game object is responsible for its own behavior. If you handle these collisions\
    \ in the `WaterDrop` class, each water drop checks whether it collides with the\
    \ player. You write this code in the `updateDelta` method. The first step is to\
    \ retrieve the player:\n\n```\nlet player = childNodeWithName(\"//player\") as!\
    \ Player\n```\n\nIf the water drop is currently visible, you check whether it\
    \ collides with the player using the `intersects` method from `CGRect`. If so,\
    \ you set the hidden status of the drop to `true`. You also play a sound to let\
    \ the player know the water drop has been collected:\n\n```\nif player.box.intersects(self.box)\
    \ && !self.hidden {\n    self.hidden = true\n    waterCollectedSound.play()\n\
    }\n```\n\nLater, you can determine whether the level is completed by checking\
    \ the visibility of each water drop. If all of the water drops are invisible,\
    \ you know the player has collected all of them."
  raw: '## Other Types of Enemies


    Yet another enemy you can add to the game is a sneezing turtle (see Figure [25-3](#A978-1-4842-0650-8_25_Chapter.html#Fig3)).
    Why a turtle, you ask? And why a sneezing one? Well, I don’t really have an answer
    to that question. But the idea behind this enemy is that it has both a negative
    and a positive side. On the negative side, the turtle grows spikes when it sneezes,
    so you shouldn’t touch it. But if the turtle isn’t sneezing, you can use it to
    jump higher. Because you aren’t dealing with interaction just yet, you only add
    the animated turtle for now. The turtle can be used to jump for 5 seconds, then
    it sneezes and grows spikes for 5 seconds, after which it returns to the previous
    state for 5 seconds, and so on.


    ![A978-1-4842-0650-8_25_Fig3_HTML.jpg](A978-1-4842-0650-8_25_Fig3_HTML.jpg)


    Figure 25-3.


    Don’t jump on the spiky turtle!


    The enemy is represented by the `Turtle` class, which is set up in a fashion similar
    to the previous enemies. A turtle has two states: it’s idle, or it has sneezed
    and therefore has dangerous spikes. In this case, you maintain two member variables
    to keep track of which state the turtle is in and how much time has passed in
    that state: the `waitTime` property tracks how much time is left in the current
    state, and the `sneezing` property tracks whether the turtle is sneezing. Again,
    in the `updateDelta` method, you handle the transition between the two phases,
    much as you did for the rocket and the patrolling enemies. I don’t go into further
    detail here because the code is very similar to the other enemy classes. You can
    see the complete code in the TickTick3 program belonging to this chapter.


    Sparky is the final enemy type that you add to the game. Just like the other enemies,
    Sparky has two states (see Figure [25-4](#A978-1-4842-0650-8_25_Chapter.html#Fig4)).
    Sparky is a very dangerous, electricity-loving enemy. He hangs quietly in the
    air until he receives a bolt of energy, which makes him fall down. While Sparky
    is hanging in the air, he isn’t dangerous; but as soon as he falls, don’t touch
    him! See the `Sparky` class to see the code.


    ![A978-1-4842-0650-8_25_Fig4_HTML.jpg](A978-1-4842-0650-8_25_Fig4_HTML.jpg)


    Figure 25-4.


    Sparky is dangerous when he is electrified Enemy Software Architecture


    All these different types of enemies look different and behave differently, but
    they generally have a common class design. You could probably design a better
    way to define these enemies by using a couple of generic classes that let you
    define states and transitions between them. There could be conditions attached
    to each transition, such as that a certain amount of time must have passed or
    that an animation should be finished playing. Such a structure is called a finite
    state machine. It’s a very common technique used in artificial intelligence systems.
    If you’re up to the challenge, try to write a finite state machine library and
    redefine the existing enemies to use it!


    ## Loading the Different Types of Enemies


    Now that you’ve defined different varieties of enemies, the only thing left to
    do is load them when you read the level data from the text file. The sprites for
    the different enemies are identified using characters.


    Depending on the character you read when loading the level, you call a different
    method to load the enemy by adding a few cases to the `switch` instruction in
    the `LevelState` class:


    `case "R":`


        `return loadRocketTile(x, y: y, moveToLeft: true)`


    `case "r":`


        `return loadRocketTile(x, y: y, moveToLeft: false)`


    `case "A", "B", "C":`


        `return loadFlameTile(c, x: x, y: y)`


    `case "S":`


        `return loadSparkyTile(x, y: y)`


    `case "T":`


        `return loadTurtleTile(x, y: y)`


    Loading an enemy is straightforward. You simply create an instance of the enemy
    you would like to add, set its position, and add it to the `world` node. For example,
    here is the method for loading a turtle enemy:


    `func loadTurtleTile(x: Int, y: Int) -> SKNode {`


        `var turtle = Turtle()`


        `turtle.position = tileField.layout.toPosition(x, row: y)`


        `turtle.position.y += 20`


        `turtle.zPosition = Layer.Scene1`


        `world.addChild(turtle)`


        `return Tile()`


    `}`


    You’ve now defined a few different kinds of enemies with varying intelligence
    and capabilities. It’s up to you to define enemies that are smarter, more devious,
    or even more stupid, depending on the needs of your game. You didn’t apply any
    physics to the enemies; however, once you start building smarter enemies that,
    for example, can jump or fall, you’ll need to implement physics just as you did
    for the player. As an exercise, try to think how you can make these enemies more
    capable without having to rely on physics. Can you let them move faster when the
    player is nearby? Can you create an enemy that launches particles toward the player?
    The possibilities are endless, so try these things for yourself!


    ## What You Have Learned


    In this chapter, you have learned the following:


    *   How to define different kinds of enemies

    *   How to use inheritance to create variety in enemy behavior


    # 26. Adding Player Interaction


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​26](http://dx.doi.org/10.1007/978-1-4842-0650-8_26))
    contains supplementary material, which is available to authorized users.


    In this chapter, you will add more interaction between the player and the objects
    in the level. Currently, the player can walk around, and a basic physics system
    allows the player to jump, collide with wall tiles, or fall out of the screen.
    First, you will look at a very simple kind of interaction: collecting water drops.
    Then you will see how to create the behavior that allows the player to slide over
    ice. You will also focus on the part of the program that deals with the various
    player-enemy interactions in the game. Finally, you will add vertical and horizontal
    scrolling to the game.


    ## Collecting Water Drops


    The first thing to add is the possibility for the player to collect water drops.
    A player collects a water drop if the bomb character collides with that drop.
    In that case, you make the drop invisible.


    Making a drop invisible once a player collects it isn’t the only way to approach
    the problem of drawing only the uncollected drops, but it’s one of the easiest
    solutions. Another approach is to maintain a list of water drops that have been
    collected and then add only those drops that the player still has to find to the
    game scene, but this technique requires a lot more code.


    The place where you check whether the player collides with a water drop is in
    the `WaterDrop` class. The reason is clear: as before, each game object is responsible
    for its own behavior. If you handle these collisions in the `WaterDrop` class,
    each water drop checks whether it collides with the player. You write this code
    in the `updateDelta` method. The first step is to retrieve the player:


    `let player = childNodeWithName("//player") as! Player`


    If the water drop is currently visible, you check whether it collides with the
    player using the `intersects` method from `CGRect`. If so, you set the hidden
    status of the drop to `true`. You also play a sound to let the player know the
    water drop has been collected:


    `if player.box.intersects(self.box) && !self.hidden {`


        `self.hidden = true`


        `waterCollectedSound.play()`


    `}`


    Later, you can determine whether the level is completed by checking the visibility
    of each water drop. If all of the water drops are invisible, you know the player
    has collected all of them.'
  trans: "\n## 其他类型的敌人\n\n你可以在游戏中添加的另一种敌人是一只打喷嚏的海龟（见图 25-3）。你可能会问：为什么是海龟？又为什么是打喷嚏的海龟？嗯，我其实也回答不了这个问题。不过，这种敌人设计的思路在于它兼具消极和积极两种属性。消极方面，海龟打喷嚏时会竖起尖刺，所以你不能触碰它。但如果海龟没有打喷嚏，你就可以利用它跳得更高。由于你目前尚未处理交互逻辑，所以暂时只需添加这只带有动画效果的海龟。海龟可供跳跃\
    \ 5 秒，然后它打喷嚏并竖起尖刺持续 5 秒，之后又恢复之前的状态维持 5 秒，如此循环往复。\n\n![A978-1-4842-0650-8_25_Fig3_HTML.jpg](img/A978-1-4842-0650-8_25_Fig3_HTML.jpg)\n\
    \n图 25-3.\n\n别跳到尖刺海龟身上！\n\n该敌人由 `Turtle` 类表示，其设置方式与之前的敌人类似。海龟有两种状态：闲置状态，以及打喷嚏后状态——此时它带有危险的尖刺。在这种情况下，你需要维护两个成员变量来跟踪海龟当前处于哪种状态以及在该状态下经过了多少时间：`waitTime`\
    \ 属性用于追踪当前状态还剩多少时间，而 `sneezing` 属性则用于记录海龟是否正在打喷嚏。同样，在 `updateDelta` 方法中，你需要处理两个阶段之间的切换，就像你对火箭和巡逻敌人所做的那样。这里不再赘述，因为代码与其他敌人类非常相似。你可以查看本章附带的\
    \ `TickTick3` 程序中的完整代码。\n\nSparky 是你添加到游戏中的最后一种敌人类型。和其他敌人一样，Sparky 也有两种状态（见图 25-4）。Sparky\
    \ 是一种非常危险、热爱电力的敌人。它静静地悬浮在空中，直到接收到一股能量冲击后才会坠落。当 Sparky 悬浮在空中时，它并不危险；但一旦它坠落下来，千万别碰它！请参考\
    \ `Sparky` 类的代码。\n\n![A978-1-4842-0650-8_25_Fig4_HTML.jpg](img/A978-1-4842-0650-8_25_Fig4_HTML.jpg)\n\
    \n图 25-4.\n\n当 Sparky 带电时十分危险\n\n### 敌人软件架构\n\n所有这些不同类型的敌人外观不同，行为也各异，但它们通常拥有共同的类设计。你或许可以通过使用几个通用类来设计更好的敌人定义方式，这些类允许你定义状态以及状态之间的转换。每个转换都可以附带条件，例如必须经过一定时间，或者某个动画应该播放完毕。这种结构被称为**有限状态机**。这是人工智能系统中非常常用的一种技术。如果你愿意接受挑战，不妨尝试编写一个有限状态机库，并用它来重新定义现有的敌人！\n\
    \n## 加载不同类型的敌人\n\n既然你已经定义了多种敌人，剩下要做的就是在从文本文件读取关卡数据时将它们加载进来。不同敌人的精灵图使用字符进行标识。\n\
    \n根据加载关卡时读取到的字符，你需要在 `LevelState` 类的 `switch` 指令中添加一些分支，通过调用不同的方法来加载敌人：\n\n```\n\
    case \"R\":\n    return loadRocketTile(x, y: y, moveToLeft: true)\ncase \"r\"\
    :\n    return loadRocketTile(x, y: y, moveToLeft: false)\ncase \"A\", \"B\", \"\
    C\":\n    return loadFlameTile(c, x: x, y: y)\ncase \"S\":\n    return loadSparkyTile(x,\
    \ y: y)\ncase \"T\":\n    return loadTurtleTile(x, y: y)\n```\n\n加载敌人非常简单。你只需创建一个想要添加的敌人实例，设置其位置，然后将其添加到\
    \ `world` 节点即可。例如，下面是加载海龟敌人的方法：\n\n```\nfunc loadTurtleTile(x: Int, y: Int) ->\
    \ SKNode {\n    var turtle = Turtle()\n    turtle.position = tileField.layout.toPosition(x,\
    \ row: y)\n    turtle.position.y += 20\n    turtle.zPosition = Layer.Scene1\n\
    \    world.addChild(turtle)\n    return Tile()\n}\n```\n\n现在，你已经定义了数种具有不同智能水平和能力的敌人。你可以根据自己的游戏需求，定义更聪明、更狡猾，甚至更愚蠢的敌人。你目前没有为敌人应用任何物理效果；不过，一旦你开始构建更智能的敌人——例如能够跳跃或坠落——你就需要像为玩家角色实现物理效果那样来实现物理系统。作为练习，请思考如何在不依赖物理系统的情况下让这些敌人拥有更强的能力。你能让它们在玩家靠近时移动得更快吗？你能创建一个向玩家发射粒子的敌人吗？可能性是无限的，不妨亲自尝试一番！\n\
    \n## 本章小结\n\n在本章中，你学会了以下内容：\n\n*   如何定义不同类型的敌人\n*   如何利用继承来创造多样化的敌人行为\n\n# 26.\
    \ 添加玩家交互\n\n电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-0650-8_26](http://dx.doi.org/10.1007/978-1-4842-0650-8_26))\
    \ 包含补充材料，仅供授权用户使用。\n\n在本章中，你将增加玩家与关卡内物体之间更多的交互。目前，玩家可以四处走动，一个基本的物理系统允许玩家跳跃、与墙壁瓦片碰撞或掉出屏幕。首先，你将了解一种非常简单的交互方式：收集水滴。然后，你将看到如何创建让玩家在冰面上滑行的行为。你还会重点处理程序中涉及游戏中各种玩家与敌人交互的部分。最后，你将添加游戏的垂直和水平滚动功能。\n\
    \n## 收集水滴\n\n首先要添加的是玩家收集水滴的功能。当炸弹角色与水滴发生碰撞时，玩家就收集到了该水滴。在这种情况下，你需要让水滴变得不可见。\n\n\
    让水滴在被收集后变得不可见，并非解决只绘制未被收集水滴这一问题的唯一方法，但它是实现起来最简单的方法之一。另一种方法是维护一个已被收集的水滴列表，然后只将玩家仍需寻找的水滴添加到游戏场景中，但这种技术需要编写更多的代码。\n\
    \n检测玩家是否与水滴发生碰撞的代码位于 `WaterDrop` 类中。原因很明确：和之前一样，每个游戏对象负责自己的行为。如果在 `WaterDrop`\
    \ 类中处理这些碰撞，那么每个水滴都会检查自身是否与玩家发生碰撞。你需要在 `updateDelta` 方法中编写这段代码。第一步是获取玩家对象：\n\n\
    ```\nlet player = childNodeWithName(\"//player\") as! Player\n```\n\n如果水滴当前是可见的，则使用\
    \ `CGRect` 的 `intersects` 方法检查它是否与玩家发生碰撞。如果碰撞发生，则将水滴的隐藏状态设置为 `true`。同时播放一个音效，告知玩家水滴已被收集：\n\
    \n```\nif player.box.intersects(self.box) && !self.hidden {\n    self.hidden =\
    \ true\n    waterCollectedSound.play()\n}\n```\n\n之后，你可以通过检查每个水滴的可见性来判断关卡是否完成。如果所有水滴都变得不可见，就说明玩家已经收集了全部水滴。\n"
- fmt: "# Ice Blocks\n\nAnother type of interaction you can add to the game is special\
    \ behavior when the player is walking over ice. When the player moves over ice,\
    \ you want the character to continue sliding at a constant rate and not stop moving\
    \ when the player releases the button. Even though continuing to slide isn’t completely\
    \ realistic (in real life you would slide and slow down), it does lead to predictable\
    \ behavior that the player can easily understand, which in many cases is more\
    \ important than achieving realism. To implement this, you have to do two things:\n\
    \n*   Extend the `handleInput` method to deal with moving over ice.\n*   Calculate\
    \ whether the player is standing on ice.\n\nYou keep track of whether the player\
    \ is standing on ice in a property called `walkingOnIce` in the `Player` class.\
    \ Let’s assume for now that this property is updated somewhere else, and let’s\
    \ look at extending the `handleInput` method. The first thing you want to do is\
    \ increase the player’s walking speed when the character is walking on ice. You\
    \ can do that as follows:\n\n```\nvar walkingSpeed = CGFloat(300)\n\nif self.walkingOnIce\
    \ {\n    walkingSpeed *= 1.5\n}\n```\n\nThe value by which the speed is multiplied\
    \ is a variable that influences the gameplay. Choosing the right value is important—too\
    \ fast, and the level becomes unplayable; too slow, and the ice isn’t different\
    \ from a regular walking surface in any meaningful way.\n\nIf the player isn’t\
    \ walking on ice but is instead standing on the ground, you need to set the x\
    \ velocity to zero so the character stops moving when the player is no longer\
    \ pressing one of the touch buttons. To achieve this, you add the following `if`\
    \ instruction at the beginning of the `handleInput` method in the `Player` class:\n\
    \n```\nif self.onTheGround && !self.walkingOnIce {\n    self.velocity.x = 0\n\
    }\n```\n\nThen you handle the player input. If the player is pressing the left\
    \ or right touch button, you set the appropriate x velocity:\n\n```\nif walkLeftButton.down\
    \ {\n    self.velocity.x = -walkingSpeed\n} else if walkRightButton.down {\n \
    \   self.velocity.x = walkingSpeed\n}\n```\n\nThe only thing you still need to\
    \ do is find out whether the player is walking on ice and update the `walkingOnIce`\
    \ property accordingly. You already use the `handleCollisions` method to look\
    \ at the tiles surrounding the player, so to extend that method to also check\
    \ whether the player is walking on ice, you only need to add a few lines of code.\
    \ In the beginning of this method, you assume the player isn’t walking on ice,\
    \ just like you assume that the player isn’t on the ground:\n\n```\nself.walkingOnIce\
    \ = false\n```\n\nThe player can only walk on ice if they’re on the ground. You\
    \ check whether they’re on the ground in the following `if` instruction:\n\n```\n\
    if box.minY - ydifference >= tileBounds.maxY && tileType != .Background {\n  \
    \  self.onTheGround = true\n    self.velocity.y = 0\n    self.position.y += depth.y\n\
    }\n```\n\nTo check whether the tile the player is standing on is an ice tile,\
    \ you have to retrieve the tile from the tile field and check its `ice` property.\
    \ You can do this in an `if` instruction combined with the `let` keyword, as follows:\n\
    \n```\nif let currentTile = tiles.layout.at(x, row: y) as? Tile {\n    // do something\
    \ with the tile\n}\n```\n\nInside the `if` instruction, you update the `walkingOnIce`\
    \ property. You use a logical or operator so that if the player is only partly\
    \ on an ice tile, the property is also set to `true`:\n\n```\nself.walkingOnIce\
    \ = self.walkingOnIce || currentTile.ice\n```\n\nBecause you use the logical or\
    \ to calculate whether the player is walking on ice, you take all surrounding\
    \ tiles into account. The effect is that the character keeps moving until it isn’t\
    \ standing on an ice tile anymore (not even partly). Run the TickTick4 example\
    \ to see how the player character now interacts with ice.\n\n# Enemies Colliding\
    \ With the Player\n\nThe final kind of interaction to add is collisions with enemies.\
    \ In many cases, when the player collides with an enemy, it causes the player’s\
    \ death. In some cases, you have to do something special (such as jumping extra\
    \ high when jumping on the turtle). On the player side, you have to load an extra\
    \ animation that shows the player dying. Because you don’t want to handle player\
    \ input after the player has died, you need to update the player’s current alive\
    \ status. You do this using a property called `alive` that is set to `true` when\
    \ the `Player` instance is created. In the `handleInput` method, you check whether\
    \ the player is still alive. If not, you return from the method so you don’t handle\
    \ any input:\n\n```\nif !self.alive {\n    return\n}\n```\n\nYou also add a method\
    \ called `die` to let the player die. There are two ways the player can die: by\
    \ falling in a hole out of the game screen and by colliding with an enemy. Therefore,\
    \ you pass a Boolean parameter to the `die` method to indicate whether the player\
    \ died by falling or by colliding with an enemy.\n\nIn the `die` method, you do\
    \ a couple of things. First, you check whether the player was already dead. If\
    \ so, you return from the method without doing anything (after all, a player can\
    \ only die once). You set the `alive` variable to `false`. Then, you set the velocity\
    \ in the x direction to zero, to stop the player from moving to the left or right.\
    \ You don’t reset the y velocity, so the player keeps on falling: gravity doesn’t\
    \ cease to exist when you die. Next, you determine which sound to play when the\
    \ player dies. If the player falls to their death, the sound produced is quite\
    \ different from dying by an enemy’s hand (don’t try this for real; just take\
    \ my word for it). If the player dies because of a collision with an enemy, you\
    \ give the player an upward velocity as well. This upward velocity isn’t very\
    \ realistic, but it does provide for a nice visual effect (see Figure [26-1](#A978-1-4842-0650-8_26_Chapter.html#Fig1)).\
    \ Finally, you play the `die` animation. The complete method is as follows:\n\n\
    ![A978-1-4842-0650-8_26_Fig1_HTML.jpg](A978-1-4842-0650-8_26_Fig1_HTML.jpg)\n\n\
    Figure 26-1. The player dies after colliding with an enemy\n\n```\nfunc die(falling:\
    \ Bool = false) {\n    if !alive {\n        return\n    }\n    alive = false\n\
    \    velocity.x = 0\n    if falling {\n        playerFallSound.play()\n    } else\
    \ {\n        velocity.y = 600\n        playerDieSound.play()\n    }\n    self.playAnimation(\"\
    die\")\n}\n```\n\nYou can check in the `updateDelta` method whether the player\
    \ is falling to death by calculating if the player’s y-position falls outside\
    \ of the level. If this is the case, you call the `die` method:\n\n```\nlet tiles\
    \ = childNodeWithName(\"//tileField\") as! TileField\n\nif self.box.maxY < tiles.box.minY\
    \ {\n    self.die(falling: true)\n}\n```\n\nAt the start of the `updateDelta`\
    \ method, you call the `update` method of the superclass to ensure that the animation\
    \ is updated:\n\n```\nsuper.updateDelta(delta)\n```\n\nNext, you do the physics\
    \ and collisions (which still need to be done, even if the player is dead). Then\
    \ you check whether the player is alive. If not, you’re finished, and you return\
    \ from the method.\n\nNow that the player can die in various gruesome ways, you\
    \ have to extend the enemy classes to deal with collisions. In the `Rocket` class,\
    \ you add a method called `checkPlayerCollision` that you call in the rocket’s\
    \ `updateDelta` method. In the `checkPlayerCollision` method, you simply check\
    \ whether the player collides with the rocket. If that is the case, you call the\
    \ `die` method on the `Player` object. The complete method is as follows:\n\n\
    ```\nfunc checkPlayerCollision() {\n    let player = childNodeWithName(\"//player\"\
    ) as! Player\n    if player.box.intersects(self.box) {\n        player.die()\n\
    \    }\n}\n```"
  raw: '## Ice Blocks


    Another type of interaction you can add to the game is special behavior when the
    player is walking over ice. When the player moves over ice, you want the character
    to continue sliding at a constant rate and not stop moving when the player releases
    the button. Even though continuing to slide isn’t completely realistic (in real
    life you would slide and slow down), it does lead to predictable behavior that
    the player can easily understand, which in many cases is more important than achieving
    realism. To implement this, you have to do two things:


    *   Extend the `handleInput` method to deal with moving over ice.

    *   Calculate whether the player is standing on ice.


    You keep track of whether the player is standing on ice in a property called `walkingOnIce`
    in the `Player` class. Let’s assume for now that this property is updated somewhere
    else, and let’s look at extending the `handleInput` method. The first thing you
    want to do is increase the player’s walking speed when the character is walking
    on ice. You can do that as follows:


    `var walkingSpeed = CGFloat(300)`


    `if self.walkingOnIce {`


        `walkingSpeed *= 1.5`


    `}`


    The value by which the speed is multiplied is a variable that influences the gameplay.
    Choosing the right value is important—too fast, and the level becomes unplayable;
    too slow, and the ice isn’t different from a regular walking surface in any meaningful
    way.


    If the player isn’t walking on ice but is instead standing on the ground, you
    need to set the x velocity to zero so the character stops moving when the player
    is no longer pressing one of the touch buttons. To achieve this, you add the following
    `if` instruction at the beginning of the `handleInput` method in the `Player`
    class:


    `if self.onTheGround && !self.walkingOnIce {`


        `self.velocity.x = 0`


    `}`


    Then you handle the player input. If the player is pressing the left or right
    touch button, you set the appropriate x velocity:


    `if walkLeftButton.down {`


        `self.velocity.x = -walkingSpeed`


    `} else if walkRightButton.down {`


        `self.velocity.x = walkingSpeed`


    `}`


    The only thing you still need to do is find out whether the player is walking
    on ice and update the `walkingOnIce` property accordingly. You already use the
    `handleCollisions` method to look at the tiles surrounding the player, so to extend
    that method to also check whether the player is walking on ice, you only need
    to add a few lines of code. In the beginning of this method, you assume the player
    isn’t walking on ice, just like you assume that the player isn’t on the ground:


    `self.walkingOnIce = false`


    The player can only walk on ice if they’re on the ground. You check whether they’re
    on the ground in the following `if` instruction:


    `if box.minY - ydifference >= tileBounds.maxY && tileType != .Background {`


        `self.onTheGround = true`


        `self.velocity.y = 0`


        `self.position.y += depth.y`


    `}`


    To check whether the tile the player is standing on is an ice tile, you have to
    retrieve the tile from the tile field and check its `ice` property. You can do
    this in an `if` instruction combined with the `let` keyword, as follows:


    `if let currentTile = tiles.layout.at(x, row: y) as? Tile {`


        `// do something with the tile`


    `}`


    Inside the `if` instruction, you update the `walkingOnIce` property. You use a
    logical or operator so that if the player is only partly on an ice tile, the property
    is also set to `true`:


    `self.walkingOnIce = self.walkingOnIce || currentTile.` `ice`


    Because you use the logical or to calculate whether the player is walking on ice,
    you take all surrounding tiles into account. The effect is that the character
    keeps moving until it isn’t standing on an ice tile anymore (not even partly).
    Run the TickTick4 example to see how the player character now interacts with ice.


    ## Enemies Colliding With the Player


    The final kind of interaction to add is collisions with enemies. In many cases,
    when the player collides with an enemy, it causes the player’s death. In some
    cases, you have to do something special (such as jumping extra high when jumping
    on the turtle). On the player side, you have to load an extra animation that shows
    the player dying. Because you don’t want to handle player input after the player
    has died, you need to update the player’s current alive status. You do this using
    a property called `alive` that is set to `true` when the `Player` instance is
    created. In the `handleInput` method, you check whether the player is still alive.
