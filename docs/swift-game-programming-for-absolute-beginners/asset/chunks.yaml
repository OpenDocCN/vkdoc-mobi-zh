    locked\" {\n            DefaultsManager.instance.setLevelStatus(self.levelNr+1,\
    \ status: \"unsolved\")\n        }\n        GameStateManager.instance.switchTo(\"\
    level\\(levelNr+1)\")\n        GameStateManager.instance.reset()\n    } else {\n\
    \        GameStateManager.instance.switchTo(\"level\")\n    }\n}\n```\n\n请参阅 `PenguinPairsFinal`\
    \ 示例，了解完整的 `LevelState` 类。\n\n# 新手教程\n\n你可能已经注意到，企鹅配对游戏的前几关也起到了新手教程的作用，向玩家解释游戏规则。在制作游戏时，玩家必须学会如何游玩。如果你不告诉玩家挑战目标以及控制方式，他们可能会感到沮丧而放弃游戏。\n\
    \n有些游戏提供了详尽的帮助文件，用长篇大论说明故事背景和操作方式。但玩家已不再愿意阅读这类文档或长文本界面。他们希望直接投入游戏。你需要在玩家游玩的过程中指导他们。\n\
    \n你可以创建几个特定的教程关卡，让玩家在不严重影响游戏进程的情况下练习操作。这种方式对休闲玩家来说是一种很好的游戏入门引导。而资深玩家则更倾向于直接进入核心玩法。注意不要在教程关卡中解释所有内容——只说明基本操作即可。更高级的操作可以在游戏中需要时再通过简单弹出消息或\
    \ HUD 上的显眼位置来解释。\n\n教程若能与游戏故事自然融合，效果最佳。例如，游戏角色可以在其安全的家乡小镇中奔跑，学习基本移动操作；接着与几个朋友练习战斗；然后玩家进入森林尝试用弓箭射击小鸟。这将为后续游戏中的战斗提供必要的练习。\n\
    \n请确保教程关卡有效，并且玩家即使几天不玩游戏也能记住操作方式。否则，他们可能永远不会再回到这个游戏。\n\n# 添加音效\n\n为完成游戏，你需要在适当的位置添加音效和音乐。你可能还记得，选项菜单中的选择之一就是更改背景音量。你可以使用以下代码行来实现：\n\
    \n`backgroundMusic.volume = Float(musicSlider.value)`\n\n在 `OptionMenuState` 类中，你可以找到\
    \ `backgroundMusic` 属性以及开始播放音乐的代码：\n\n```\nbackgroundMusic.looping = true\nbackgroundMusic.play()\n\
    ```\n\n同样地，你可以在合适的时机播放音效，就像在《图坦卡蒙之墓》和《画家》游戏中做的那样。例如，每当一对企鹅配对成功时，就会播放音效（参见 `Animal`\
    \ 类的 `updateDelta` 方法）：\n\n`pairSound.play()`\n\n如果你查看本章配套的 `PenguinPairsFinal`\
    \ 示例，就能了解完整游戏的工作方式以及音效在何处播放。当然，你也可以亲自试玩这个游戏。\n\n# 团队协作\n\n第一代游戏是由程序员创造的。他们包揽了所有工作：设计游戏机制、创作美术（当时仅由几个像素组成），并用汇编语言编写游戏代码。所有工作都聚焦于编程本身，游戏机制也常常被调整为适合高效编程的形式。\n\
    \n但随着内存容量的提升，这种情况逐渐改变。用有限的像素和颜色创作出精美外观的对象成为一门艺术，像素艺术家开始在游戏开发中发挥重要作用。早期没有绘图程序（当时的计算机都不够强大），像素角色是在方格纸上设计，再转换成十六进制数字嵌入游戏代码中。\n\
    \n随着计算机性能提升以及 CD-ROM 等存储介质的出现，美术变得日益重要，艺术家也随之发展。3D 图形和动画变得普遍，催生了能够运用新工具和技术的专门人才。如今，艺术家在游戏制作团队中占据了大多数。\n\
    \n在某个阶段，游戏设计成为了一项独立工作。游戏机制会根据用户群体的兴趣进行调整，并越来越多地基于心理学和教育科学的原理。这需要专门的专长。故事剧情占据了关键地位，由此引入了编剧。团队还扩展至包括制作人、音响工程师、作曲家等众多角色。如今，顶级游戏的团队可能由数百人组成。但如果没有程序员，一切将无法运作。\n\
    \n# 最后几点提示\n\n在本书的这一部分，你创建了一个比之前《图坦卡蒙之墓》复杂得多的游戏。你可能已经注意到，类的数量变得相当庞大，并且你越来越依赖某种游戏软件设计模式。例如，你将游戏对象放置在网格布局中，并使用类来处理游戏状态。在更基础的层面上，你假设游戏对象负责处理自身输入和更新。你可能不同意这些设计选择中的某些（或全部）。也许读到此处，你已经形成了自己关于游戏软件应该如何设计的想法。这是件好事。我在本书中提出的设计并非唯一的实现方式。设计总是可以被评估和改进，甚至被完全抛弃，用全新的方案取而代之。因此，请毫不犹豫地批判性地审视我提出的设计，并尝试其他方案。通过尝试不同的方法来解决问题，你能更好地理解问题本身，并因此成为一名更优秀的软件开发者。\n\
    \n# 本章要点\n\n在本章中，你学习了以下内容：\n\n*   如何在屏幕上显示提示箭头和帮助框架\n*   如何将关卡重置到初始状态，并处理进入下一关"
- fmt: "# Part V  \nTick Tick  \n\nThe previous chapters have shown you how to build\
    \ several different types of games. In this part, you will build a platform game\
    \ with animated characters, physics, and different levels. The game is called\
    \ Tick Tick (see Figure [V-1](#A978-1-4842-0650-8_5_Part_BookFrontmatter.html#Fig1)),\
    \ and the story revolves around a slightly stressed-out bomb that will explode\
    \ within a number of seconds. Each level in the game should be finished before\
    \ the bomb explodes. A level is finished if the player collects all the refreshing\
    \ water drops and reaches the finish panel in time.  \n\n![A978-1-4842-0650-8_5_Part_BookFrontmatter_Fig1_HTML.jpg](A978-1-4842-0650-8_5_Part_BookFrontmatter_Fig1_HTML.jpg)\
    \  \n\n**Figure V-1.** The Tick Tick game  \n\nThis platform game includes a number\
    \ of basic elements that are found in many other games as well:  \n\n- It should\
    \ be possible to play different levels.  \n- These levels should be loaded from\
    \ a separate file so they can be changed without having to know how the game code\
    \ works.  \n- The game should support animated characters for both the player\
    \ and the enemies.  \n- The player should control the actions of a player character\
    \ that can run or jump.  \n- There should be some basic physics in the game to\
    \ manage falling, colliding with objects, jumping on platforms, and so on.  \n\
    \nThat is quite a list! Fortunately, you can reuse many of the classes you’ve\
    \ already developed. The following chapters look at all the items on the list.\
    \ If you want to play the complete version of the Tick Tick game, run the example\
    \ program belonging to [Chapter 27](#A978-1-4842-0650-8_27_Chapter.html).  \n\n\
    # 22. The Main Game Structure  \n\nElectronic supplementary material The online\
    \ version of this chapter (doi:[10.1007/978-1-4842-0650-8_22](http://dx.doi.org/10.1007/978-1-4842-0650-8_22))\
    \ contains supplementary material, which is available to authorized users.  \n\
    \nIn this chapter, you will lay out the framework for the Tick Tick game. Because\
    \ of all the work you’ve done for the previous games, you can rely on a lot of\
    \ preexisting classes. This means you already have a basic design for handling\
    \ game states and settings, a hierarchy of game objects, and more. Note that the\
    \ Tick Tick game is not designed to work on very small devices such as the older\
    \ iPhones, nor the iPhone 6 Plus (for which you would need 3x resolution images\
    \ anyway). If you run the game on older iPhones, a big part of the game world\
    \ will be clipped. On the iPhone 6 Plus, the game is playable, but some black\
    \ space will appear at the borders.  \n\n## Overview of the Game Structure  \n\
    \nThis game follows a structure very similar to that of the Penguin Pairs game.\
    \ There is a title screen that allows the player to go to either the level-selection\
    \ menu or a help page (see Figure [22-1](#A978-1-4842-0650-8_22_Chapter.html#Fig1)).\
    \ To keep things simple, you won’t implement an options page, although adding\
    \ it would be straightforward because you could use the same approach as in Penguin\
    \ Pairs. Because the menu structure is so similar, it isn’t discussed here. You\
    \ can see the code in the `TickTick1` example that belongs to this chapter.  \n\
    \n![A978-1-4842-0650-8_22_Fig1_HTML.jpg](A978-1-4842-0650-8_22_Fig1_HTML.jpg)\
    \  \n\n**Figure 22-1.** The title screen of the Tick Tick game  \n\nThe `LevelState`\
    \ class is used to represent levels and deals with maintaining the level status\
    \ (locked/unsolved/solved), just as in the Penguin Pairs game. Each level is a\
    \ tile-based game world, again very similar to the way Penguin Pairs is structured.\
    \  \n\n## The Structure of a Level  \n\nLet’s first look at what kind of things\
    \ can be in a level in Tick Tick. First, there is a background image. For now,\
    \ you display a simple background sprite; there is no need to store any information\
    \ about that in the level data variable. There are also different kinds of blocks\
    \ the player can jump on, along with water drops, enemies, the player’s starting\
    \ position, and the end position the player has to reach. As in the Penguin Pairs\
    \ game, you store level information in a text file, which is read when the game\
    \ is started.  \n\nYou define a level using tiles, where each tile has a certain\
    \ type (wall, background, and so on). You then represent each tile type with a\
    \ character in the text file. Just as in the Penguin Pairs game, you lay out the\
    \ level as text in a two-dimensional space corresponding to the playing field.\
    \ Next to the actual tiles, you also store a hint together with the level definition.\
    \ Here you can see the definition of the first level in the text file:  \n\n```\n\
    Pick up all the water drops and reach the exit in time.\n\n20 15\n\n60\n\n....................\n\
    .................X..\n..........##########\n....................\nWWW....WWWW.........\n\
    ---....####.........\n....................\nWWW.................\n###.........WWWWW...\n\
    ............#####...\n....WWW.............\n....###.............\n....................\n\
    .1........W.W.W.W.W.\n####################\n```\n\nThis level definition defines\
    \ a number of different tiles and objects. For example, a wall tile is defined\
    \ by the `#` sign, a water drop by a `W` character, and the start position of\
    \ the player by the `1` character. If there is no tile at the specific position,\
    \ you use the `.` character. For the platform game, you need different types of\
    \ tiles: a wall tile the player can stand on or collide with, and a background/transparent\
    \ tile that indicates there is no block in that position. You also want to define\
    \ a platform tile. This tile has the property that the player can stand on it\
    \ like a wall tile, but if they’re standing under it, they can jump through it\
    \ from below. This kind of tile is used in many classic platform games, and it\
    \ would be a pity not to include it here! In the text file, platform tiles are\
    \ represented by a `-` character. Table [22-1](#A978-1-4842-0650-8_22_Chapter.html#Tab1)\
    \ gives a complete list of the different tiles in the Tick Tick game.  \n\n**Table\
    \ 22-1.** Overview of the Different Kinds of Tiles in the Tick Tick Game  \n\n\
    | Character | Tile Description |  \n| --- | --- |  \n| `.` | Background tile |\
    \  \n| `#` | Wall tile |  \n| `^` | Wall tile (hot) |  \n| `*` | Wall tile (ice)\
    \ |  \n| `-` | Platform tile |  \n| `+` | Platform tile (hot) |  \n| `@` | Platform\
    \ tile (ice) |  \n| `X` | End tile |  \n| `W` | Water drop |  \n| `1` | Start\
    \ tile (initial player position) |  \n| `R` | Rocket enemy (moving to the left)\
    \ |  \n| `R` | Rocket enemy (moving to the right) |  \n| `S` | Sparky enemy |\
    \  \n| `T` | Turtle enemy |  \n| `A` | Flame enemy (random speed and direction\
    \ change) |  \n| `B` | Flame enemy (player following) |  \n| `C` | Flame enemy\
    \ (patrolling) |"
  raw: '# Part V

    Tick Tick


    Tick Tick


    The previous chapters have shown you how to build several different types of games.
    In this part, you will build a platform game with animated characters, physics,
    and different levels. The game is called Tick Tick (see Figure [V-1](#A978-1-4842-0650-8_5_Part_BookFrontmatter.html#Fig1)),
    and the story revolves around a slightly stressed-out bomb that will explode within
    a number of seconds. Each level in the game should be finished before the bomb
    explodes. A level is finished if the player collects all the refreshing water
    drops and reaches the finish panel in time.


    ![A978-1-4842-0650-8_5_Part_BookFrontmatter_Fig1_HTML.jpg](A978-1-4842-0650-8_5_Part_BookFrontmatter_Fig1_HTML.jpg)


    Figure V-1.


    The Tick Tick game


    This platform game includes a number of basic elements that are found in many
    other games as well:


    *   It should be possible to play different levels.

    *   These levels should be loaded from a separate file so they can be changed
    without having to know how the game code works.

    *   The game should support animated characters for both the player and the enemies.

    *   The player should control the actions of a player character that can run or
    jump.

    *   There should be some basic physics in the game to manage falling, colliding
    with objects, jumping on platforms, and so on.


    That is quite a list! Fortunately, you can reuse many of the classes you’ve already
    developed. The following chapters look at all the items on the list. If you want
    to play the complete version of the Tick Tick game, run the example program belonging
    to [Chapter 27](#A978-1-4842-0650-8_27_Chapter.html).


    # 22. The Main Game Structure


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​22](http://dx.doi.org/10.1007/978-1-4842-0650-8_22))
    contains supplementary material, which is available to authorized users.


    In this chapter, you will lay out the framework for the Tick Tick game. Because
    of all the work you’ve done for the previous games, you can rely on a lot of preexisting
    classes. This means you already have a basic design for handling game states and
    settings, a hierarchy of game objects, and more. Note that the Tick Tick game
    is not designed to work on very small devices such as the older iPhones, nor the
    iPhone 6 Plus (for which you would need 3x resolution images anyway). If you run
    the game on older iPhones, a big part of the game world will be clipped. On the
    iPhone 6 Plus, the game is playable, but some black space will appear at the borders.


    ## Overview of the Game Structure


    This game follows a structure very similar to that of the Penguin Pairs game.
    There is a title screen that allows the player to go to either the level-selection
    menu or a help page (see Figure [22-1](#A978-1-4842-0650-8_22_Chapter.html#Fig1)).
    To keep things simple, you won’t implement an options page, although adding it
    would be straightforward because you could use the same approach as in Penguin
    Pairs. Because the menu structure is so similar, it isn’t discussed here. You
    can see the code in the TickTick1 example that belongs to this chapter.


    ![A978-1-4842-0650-8_22_Fig1_HTML.jpg](A978-1-4842-0650-8_22_Fig1_HTML.jpg)


    Figure 22-1.


    The title screen of the Tick Tick game


    The `LevelState` class is used to represent levels and deals with maintaining
    the level status (locked/unsolved/solved), just as in the Penguin Pairs game.
    Each level is a tile-based game world, again very similar to the way Penguin Pairs
    is structured.


    ## The Structure of a Level


    Let’s first look at what kind of things can be in a level in Tick Tick. First,
    there is a background image. For now, you display a simple background sprite;
    there is no need to store any information about that in the level data variable.
    There are also different kinds of blocks the player can jump on, along with water
    drops, enemies, the player’s starting position, and the end position the player
    has to reach. As in the Penguin Pairs game, you store level information in a text
    file, which is read when the game is started.


    You define a level using tiles, where each tile has a certain type (wall, background,
    and so on). You then represent each tile type with a character in the text file.
    Just as in the Penguin Pairs game, you lay out the level as text in a two-dimensional
    space corresponding to the playing field. Next to the actual tiles, you also store
    a hint together with the level definition. Here you can see the definition of
    the first level in the text file:


    `Pick up all the water drops and reach the exit in time.`


    `20 15`


    `60`


    `....................`


    `.................X..`


    `..........##########`


    `....................`


    `WWW....WWWW.........`


    `---....####.........`


    `....................`


    `WWW.................`


    `###.........WWWWW...`


    `............#####...`


    `....WWW.............`


    `....###.............`


    `....................`


    `.1........W.W.W.W.W.`


    `####################`


    This level definition defines a number of different tiles and objects. For example,
    a wall tile is defined by the `#` sign, a water drop by a `W` character, and the
    start position of the player by the `1` character. If there is no tile at the
    specific position, you use the `.` character. For the platform game, you need
    different types of tiles: a wall tile the player can stand on or collide with,
    and a background/transparent tile that indicates there is no block in that position.
    You also want to define a platform tile. This tile has the property that the player
    can stand on it like a wall tile, but if they’re standing under it, they can jump
    through it from below. This kind of tile is used in many classic platform games,
    and it would be a pity not to include it here! In the text file, platform tiles
    are represented by a `-` character. Table [22-1](#A978-1-4842-0650-8_22_Chapter.html#Tab1)
    gives a complete list of the different tiles in the Tick Tick game.


    Table 22-1.


    Overview of the Different Kinds of Tiles in the Tick Tick Game


    | Character | Tile Description |

    | --- | --- |

    | `.` | Background tile |

    | `#` | Wall tile |

    | `^` | Wall tile (hot) |

    | `*` | Wall tile (ice) |

    | `-` | Platform tile |

    | `+` | Platform tile (hot) |

    | `@` | Platform tile (ice) |

    | `X` | End tile |

    | `W` | Water drop |

    | `1` | Start tile (initial player position) |

    | `R` | Rocket enemy (moving to the left) |

    | `R` | Rocket enemy (moving to the right) |

    | `S` | Sparky enemy |

    | `T` | Turtle enemy |

    | `A` | Flame enemy (random speed and direction change) |

    | `B` | Flame enemy (player following) |

    | `C` | Flame enemy (patrolling) |'
  trans: "\n# 第五部分  \n滴答炸弹  \n\n前几章展示了如何构建几种不同类型的游戏。在这一部分，你将构建一个包含动画角色、物理效果以及不同关卡的平台游戏。游戏名为《滴答炸弹》（见图\
    \ V-1），故事围绕一颗略显焦虑、将在数秒后爆炸的炸弹展开。玩家必须在炸弹爆炸前完成每一关。如果玩家收集了所有清凉的水滴并及时到达终点面板，则该关卡通关。\
    \  \n\n![A978-1-4842-0650-8_5_Part_BookFrontmatter_Fig1_HTML.jpg](img/A978-1-4842-0650-8_5_Part_BookFrontmatter_Fig1_HTML.jpg)\
    \  \n\n**图 V-1.** 《滴答炸弹》游戏  \n\n这款平台游戏包含了许多其他游戏中也常见的基本元素：  \n\n- 应能游玩不同的关卡。  \n\
    - 这些关卡应从单独的文件中加载，以便在无需了解游戏代码工作原理的情况下进行修改。  \n- 游戏应支持玩家和敌人的动画角色。  \n- 玩家应能控制一个可奔跑或跳跃的角色进行行动。\
    \  \n- 游戏中应具备一些基本的物理效果，以处理下落、物体碰撞、在平台上跳跃等情况。  \n\n这个列表可不短！幸运的是，你可以复用许多已经开发好的类。接下来的章节将逐一审视列表中的各项内容。如果你想游玩《滴答炸弹》的完整版，请运行属于第\
    \ 27 章的示例程序。  \n\n# 22. 主要游戏结构  \n\n电子补充材料 本章的在线版本（doi:[10.1007/978-1-4842-0650-8_22](http://dx.doi.org/10.1007/978-1-4842-0650-8_22)）包含补充材料，可供授权用户使用。\
    \  \n\n在本章中，你将搭建《滴答炸弹》游戏的框架。由于之前游戏开发所做的大量工作，你可以依赖很多已有的类。这意味着你已经拥有了处理游戏状态和设置的基本设计、游戏对象的层次结构等等。需要注意的是，《滴答炸弹》游戏并非为在非常小的设备（如旧款\
    \ iPhone 或 iPhone 6 Plus）上运行而设计（对于后者，你至少需要 3 倍分辨率的图像）。如果在旧款 iPhone 上运行该游戏，游戏世界的很大一部分将被裁剪。在\
    \ iPhone 6 Plus 上，游戏可玩，但边缘会出现一些黑边。  \n\n## 游戏结构概览  \n\n本游戏的结构与《企鹅配对》游戏非常相似。游戏有一个标题画面，玩家可以由此进入关卡选择菜单或帮助页面（见图\
    \ 22-1）。为了保持简单，你不会实现选项页面，尽管添加它会很简单，因为你可以使用与《企鹅配对》相同的方法。由于菜单结构非常相似，此处不再赘述。你可以在属于本章的`TickTick1`示例中看到代码。\
    \  \n\n![A978-1-4842-0650-8_22_Fig1_HTML.jpg](img/A978-1-4842-0650-8_22_Fig1_HTML.jpg)\
    \  \n\n**图 22-1.** 《滴答炸弹》游戏的标题画面  \n\n`LevelState`类用于表示关卡，并负责维护关卡状态（锁定/未解决/已解决），与《企鹅配对》游戏中的方式相同。每个关卡都是一个基于瓦片的游戏世界，再次与《企鹅配对》的结构非常相似。\
    \  \n\n## 关卡的结构  \n\n首先，让我们看看《滴答炸弹》的一个关卡中可以包含哪些内容。首先，有一个背景图像。目前，你只需显示一个简单的背景精灵；无需在关卡数据变量中存储任何相关信息。此外，还有不同类型的可供玩家跳跃的方块，以及水滴、敌人、玩家起始位置和玩家必须到达的终点位置。与《企鹅配对》游戏一样，你将关卡信息存储在一个文本文件中，该文件在游戏启动时被读取。\
    \  \n\n你使用瓦片来定义关卡，每个瓦片都有特定的类型（墙壁、背景等）。然后，你在文本文件中用一个字符表示每个瓦片类型。就像在《企鹅配对》游戏中一样，你在一个对应于游戏区域的二维空间中，以文本形式布局关卡。除了实际的瓦片，你还将提示信息与关卡定义存储在一起。下面你可以看到文本文件中第一个关卡的定义：\
    \  \n\n```\n捡起所有水滴，及时到达出口。\n\n20 15\n\n60\n\n....................\n.................X..\n\
    ..........##########\n....................\nWWW....WWWW.........\n---....####.........\n\
    ....................\nWWW.................\n###.........WWWWW...\n............#####...\n\
    ....WWW.............\n....###.............\n....................\n.1........W.W.W.W.W.\n\
    ####################\n```\n\n这个关卡定义定义了许多不同的瓦片和对象。例如，墙壁瓦片由`#`符号定义，水滴由`W`字符定义，玩家起始位置由`1`字符定义。如果某个特定位置没有瓦片，则使用`.`字符。对于这个平台游戏，你需要不同类型的瓦片：一个供玩家站立或碰撞的墙壁瓦片，以及一个表示该位置没有方块的背景/透明瓦片。你还需要定义一个平台瓦片。这种瓦片具有这样的特性：玩家可以像站在墙壁瓦片上一样站在它上面，但如果玩家站在它下面，他们可以从下方跳跃穿过它。这种瓦片在许多经典平台游戏中都有使用，不在这里包含它未免太可惜了！在文本文件中，平台瓦片由`-`字符表示。表\
    \ 22-1 给出了《滴答炸弹》游戏中不同瓦片的完整列表。  \n\n**表 22-1.** 《滴答炸弹》游戏中不同类型瓦片概览  \n\n| 字符 | 瓦片描述\
    \ |  \n| --- | --- |  \n| `.` | 背景瓦片 |  \n| `#` | 墙壁瓦片 |  \n| `^` | 墙壁瓦片（炽热） |\
    \  \n| `*` | 墙壁瓦片（冰面） |  \n| `-` | 平台瓦片 |  \n| `+` | 平台瓦片（炽热） |  \n| `@` | 平台瓦片（冰面）\
    \ |  \n| `X` | 终点瓦片 |  \n| `W` | 水滴 |  \n| `1` | 起始瓦片（玩家初始位置） |  \n| `R` | 火箭敌人（向左移动）\
    \ |  \n| `R` | 火箭敌人（向右移动） |  \n| `S` | 火花敌人 |  \n| `T` | 乌龟敌人 |  \n| `A` | 火焰敌人（随机速度和方向变化）\
    \ |  \n| `B` | 火焰敌人（追踪玩家） |  \n| `C` | 火焰敌人（巡逻） |\n"
- fmt: "# Water Drops\n\nThe goal of each level is to collect all of the water drops.\
    \ Each water drop is represented by an instance of the `WaterDrop` class. This\
    \ class is a `SKSpriteNode` subclass, but you want to add a little behavior to\
    \ it: the water drop should bounce up and down. You can do this in the `updateDelta`\
    \ method. First, you compute a bounce offset that you can add to the current position\
    \ of the water drop. This bounce offset is stored in the property `bounce`, which\
    \ is initially set to 0. You also maintain the total game time that has passed,\
    \ like so:\n\n```\nvar bounce: CGFloat = 0\nvar totalTime: CGFloat = 0\n```\n\n\
    To calculate the bounce offset in each game-loop iteration, you use a sine function.\
    \ And depending on the x-position of the water drop, you change the phase of the\
    \ sine so that not all drops move up or down at the same time:\n\n```\ntotalTime\
    \ += CGFloat(delta)\nvar t = totalTime + position.x\nself.bounce = sin(t*5) *\
    \ 5\n```\n\nYou subtract the bounce value from the y-position of the water drop:\n\
    \n```\nposition.y -= self.bounce\n```\n\nThe `-=` operator subtracts the bounce\
    \ value from the y-position (see [Chapter 5](#A978-1-4842-0650-8_5_Chapter.html)\
    \ for more about these types of operators). However, simply subtracting the bounce\
    \ value from the y-position isn’t correct because this is a bounce offset—in other\
    \ words, an offset with regard to the original y-position. To get the original\
    \ y-position, you add the bounce offset from the y-position in the first instruction\
    \ of the `updateDelta` method:\n\n```\nposition.y += self.bounce\n```\n\nThis\
    \ works because at this point, the `bounce` variable still contains the bounce\
    \ offset from the previous game-loop iteration. So, adding it to the y-position\
    \ gives you the original y-position.\n\nIn the next chapters, you add more game\
    \ objects, such as the player and a variety of enemies. But let’s first look at\
    \ how to define the tiles in a platform game such as Tick Tick.\n\n# The Tile\
    \ Class\n\nThe `Tile` class is very similar to the one used in Penguin Pairs,\
    \ but it has a few differences. First, you define the different kinds of tiles\
    \ using an enumerated type:\n\n```\nenum TileType {\n    case Wall\n    case Background\n\
    \    case Platform\n}\n```\n\nIn the `Tile` class, you then define a property\
    \ `tileType` to store the type of tile that an instance represents. In addition\
    \ to these basic tile types, you also have ice tiles and hot tiles, which are\
    \ special versions of normal or platform tiles. In the text file, an ice tile\
    \ is represented by the `*` character (or the `@` character if it’s a platform\
    \ tile), and a hot tile is represented by the `^` character (or the `+` character\
    \ for the platform version). You add two Boolean properties to the `Tile` class\
    \ to represent these different kinds of tiles. Here are the `Tile` initializers:\n\
    \n```\nconvenience init() {\n    self.init(imageNamed: \"spr_wall\", type: .Background)\n\
    }\n\ninit(imageNamed: String, type: TileType) {\n    let texture = SKTexture(imageNamed:\
    \ imageNamed)\n    super.init(texture: texture, color: UIColor.whiteColor(), size:\
    \ texture.size())\n    self.type = type\n}\n\nrequired init?(coder aDecoder: NSCoder)\
    \ {\n    fatalError(\"init(coder:) has not been implemented\")\n}\n```\n\nAs you\
    \ can see, there is a convenience initializer that allows you to create a `Tile`\
    \ instance of the `Background` type. This makes it easier to create `Tile` instances\
    \ since you don’t have to provide any parameter values. For example, the following\
    \ instruction creates a simple background (transparent) tile:\n\n```\nvar myTile\
    \ = Tile()\n```\n\nIn the `Tile` initializer, you use a `type` property that allows\
    \ you to set and get the type of the tile. In the set part of the `type` property,\
    \ you assign a new value to the `tp` property, and using Boolean logic, you hide\
    \ the tile if it is a background tile. Here are the two lines of code that achieve\
    \ this (for the full `Tile` class, see the TickTick1 example):\n\n```\ntileType\
    \ = newValue\nself.hidden = tileType == .Background\n```\n\nNow, let’s look at\
    \ the `LevelState` class and how the `Tile` instances are created.\n\n# The LevelState\
    \ Class\n\nThis section shows how the `LevelState` class is designed in Tick Tick.\
    \ It’s done in a way very similar to Penguin Pairs. In the initializer of the\
    \ `LevelState` class, you do a couple of things:\n\n- Create the background sprite\
    \ game object.\n- Add a Quit button.\n- Create the tile-based game world from\
    \ the level data.\n\nThe first two are straightforward. Have a look at the `LevelState`\
    \ class in the example code to see how they work. Creating the tile-based game\
    \ world is done using a separate method called `loadTile`. Depending on the tile\
    \ character taken from the text file, a different `Tile` object will be created.\
    \ The first step is creating a `TileField` instance with the desired height and\
    \ width, taken from the text file:\n\n```\ntileField = TileField(rows: height,\
    \ columns: width, cellWidth: 72, cellHeight: 55)\ntileField.name = \"tileField\"\
    \nworld.addChild(tileField)\n```\n\nAs you can see, the tile field is added to\
    \ a separate node called `world`, as opposed to the Quit button, which is simply\
    \ added to the level node:\n\n```\nquitButton.zPosition = Layer.Overlay\nquitButton.position\
    \ = GameScreen.instance.topRight - quitButton.center - CGPoint(x: 10, y: 10)\n\
    self.addChild(quitButton)\n```\n\nThere is a reason for this. You want to separate\
    \ overlays such as the Quit button or a help frame from the actual tile-based\
    \ game world because later on you are going to add side scrolling to this platform\
    \ game. This means that the game world needs to move around on the screen, while\
    \ the buttons should stay in the same place. This can only be done if the actual\
    \ game world is stored in a separate node. You can then change the position of\
    \ that node (and therefore also the position of the game world) without affecting\
    \ any of the buttons or other overlays. [Chapter 26](#A978-1-4842-0650-8_26_Chapter.html)\
    \ shows you how to add vertical and horizontal scrolling to your game.\n\nAfter\
    \ reading the lines defining the level from the text file, you create the `Tile`\
    \ objects and add them to the `TileField` object. You use a nested `for` loop\
    \ for this:\n\n```\nfor i in 0..<height {\n    var currLine = lines[height-1-i]\n\
    \    var j = 0\n    for c in currLine {\n        tileField.layout.add(loadTile(c,\
    \ x: j, y: i))\n        j++\n    }\n}\n```\n\nThe nested `for` loop examines all\
    \ the characters you read from the text file. The `loadTile` method creates a\
    \ `Tile` object for you, given a character and the x- and y-positions of the tile\
    \ in the grid.\n\nIn the `loadTile` method, you want to load a different tile\
    \ according to the character passed as a parameter. For each type of tile, you\
    \ add a method to the `LevelState` class that creates that particular kind of\
    \ tile. For example, `loadWaterTile` loads a background tile with a water drop\
    \ on top of it:\n\n```\nfunc loadWaterTile(x: Int, y: Int) -> SKNode {\n    var\
    \ w = WaterDrop()\n    w.position = tileField.layout.toPosition(x, row: y)\n \
    \   w.position.y += 10\n    w.zPosition = Layer.Scene1\n    world.addChild(w)\n\
    \    self.waterDrops.append(w)\n    return Tile()\n}\n```\n\nThis particular example\
    \ creates a `WaterDrop` instance and positions it in the center of the tile. You\
    \ place each water drop 10 points higher than the tile center so it doesn’t bounce\
    \ over the tile below it. Look at the `Level` class to see how to create the various\
    \ tiles and objects in each level. Figure 22-2 shows a screenshot of the objects\
    \ in the first level (other than the player character, which you will deal with\
    \ in the following chapters).\n\n![A978-1-4842-0650-8_22_Fig2_HTML.jpg](A978-1-4842-0650-8_22_Fig2_HTML.jpg)\n\
    \n*Figure 22-2.* The game world of the first level of Tick Tick\n\n# What You\
    \ Have Learned\n\nIn this chapter, you have learned the following:\n\n- How to\
    \ set up the general structure of the Tick Tick game\n- How to create a bouncing\
    \ water drop"
  raw: '## Water Drops


    The goal of each level is to collect all of the water drops. Each water drop is
    represented by an instance of the `WaterDrop` class. This class is a `SKSpriteNode`
    subclass, but you want to add a little behavior to it: the water drop should bounce
    up and down. You can do this in the `updateDelta` method. First, you compute a
    bounce offset that you can add to the current position of the water drop. This
    bounce offset is stored in the property `bounce`, which is initially set to 0\.
    You also maintain the total game time that has passed, like so:


    `var bounce: CGFloat = 0`


    `var totalTime: CGFloat = 0`


    To calculate the bounce offset in each game-loop iteration, you use a sine function.
    And depending on the x-position of the water drop, you change the phase of the
    sine so that not all drops move up or down at the same time:


    `totalTime += CGFloat(delta)`


    `var t = totalTime + position.x`


    `self.bounce = sin(t*5) * 5`


    You subtract the bounce value from the y-position of the water drop:


    `position.y -= self.bounce`


    The `-=` operator subtracts the bounce value from the y-position (see [Chapter
    5](#A978-1-4842-0650-8_5_Chapter.html) for more about these types of operators).
    However, simply subtracting the bounce value from the y-position isn’t correct
    because this is a bounce offset—in other words, an offset with regard to the original
    y-position. To get the original y-position, you add the bounce offset from the
    y-position in the first instruction of the `updateDelta` method:


    `position.y += self.bounce`


    This works because at this point, the `bounce` variable still contains the bounce
    offset from the previous game-loop iteration. So, adding it to the y-position
    gives you the original y-position.


    In the next chapters, you add more game objects, such as the player and a variety
    of enemies. But let’s first look at how to define the tiles in a platform game
    such as Tick Tick.


    ## The Tile Class


    The `Tile` class is very similar to the one used in Penguin Pairs, but it has
    a few differences. First, you define the different kinds of tiles using an enumerated
    type:


    `enum TileType {`


        `case Wall`


        `case Background`


        `case Platform`


    `}`


    In the `Tile` class, you then define a property `tileType` to store the type of
    tile that an instance represents. In addition to these basic tile types, you also
    have ice tiles and hot tiles, which are special versions of normal or platform
    tiles. In the text file, an ice tile is represented by the `*` character (or the
    `@` character if it’s a platform tile), and a hot tile is represented by the `^`
    character (or the `+` character for the platform version). You add two Boolean
    properties to the `Tile` class to represent these different kinds of tiles. Here
    are the `Tile` initializers:


    `convenience init() {`


        `self.init(imageNamed: "spr_wall", type: .Background)`


    `}`


    `init(imageNamed: String, type: TileType) {`


        `let texture = SKTexture(imageNamed: imageNamed)`


        `super.init(texture: texture, color: UIColor.whiteColor(), size: texture.size())`


        `self.type = type`


    `}`


    `required init?(coder aDecoder: NSCoder) {`


        `fatalError("init(coder:) has not been implemented")`


    `}`


    As you can see, there is a convenience initializer that allows you to create a
    `Tile` instance of the `Background` type. This makes it easier to create `Tile`
    instances since you don’t have to provide any parameter values. For example, the
    following instruction creates a simple background (transparent) tile:


    `var myTile = Tile()`


    In the `Tile` initializer, you use a `type` property that allows you to set and
    get the type of the tile. In the set part of the `type` property, you assign a
    new value to the `tp` property, and using Boolean logic, you hide the tile if
    it is a background tile. Here are the two lines of code that achieve this (for
    the full `Tile` class, see the TickTick1 example):


    `tileType = newValue`


    `self.hidden = tileType == .Background`


    Now, let’s look at the `LevelState` class and how the `Tile` instances are created.


    ## The LevelState Class


    This section shows how the `LevelState` class is designed in Tick Tick. It’s done
    in a way very similar to Penguin Pairs. In the initializer of the `LevelState`
    class, you do a couple of things:


    *   Create the background sprite game object.

    *   Add a Quit button.

    *   Create the tile-based game world from the level data.


    The first two are straightforward. Have a look at the `LevelState` class in the
    example code to see how they work. Creating the tile-based game world is done
    using a separate method called `loadTile`. Depending on the tile character taken
    from the text file, a different `Tile` object will be created. The first step
    is creating a `TileField` instance with the desired height and width, taken from
    the text file:


    `tileField = TileField(rows: height, columns: width, cellWidth: 72, cellHeight:
    55)`


    `tileField.name = "tileField"`


    `world.addChild(tileField)`


    As you can see, the tile field is added to a separate node called `world`, as
    opposed to the Quit button, which is simply added to the level node:


    `quitButton.zPosition = Layer.Overlay`


    `quitButton.position = GameScreen.instance.topRight - quitButton.center - CGPoint(x:
    10, y: 10)`


    `self.addChild(quitButton)`


    There is a reason for this. You want to separate overlays such as the Quit button
    or a help frame from the actual tile-based game world because later on you are
    going to add side scrolling to this platform game. This means that the game world
    needs to move around on the screen, while the buttons should stay in the same
    place. This can only be done if the actual game world is stored in a separate
    node. You can then change the position of that node (and therefore also the position
    of the game world) without affecting any of the buttons or other overlays. [Chapter
    26](#A978-1-4842-0650-8_26_Chapter.html) shows you how to add vertical and horizontal
    scrolling to your game.


    After reading the lines defining the level from the text file, you create the
    `Tile` objects and add them to the `TileField` object. You use a nested `for`
    loop for this:


    `for i in 0..<height {`


        `var currLine = lines[height-1-i]`


        `var j = 0`


        `for c in currLine {`


            `tileField.layout.add(loadTile(c, x: j, y: i))`


            `j++`


        `}`


    `}`


    The nested `for` loop examines all the characters you read from the text file.
    The `loadTile` method creates a `Tile` object for you, given a character and the
    x- and y-positions of the tile in the grid.


    In the `loadTile` method, you want to load a different tile according to the character
    passed as a parameter. For each type of tile, you add a method to the `LevelState`
    class that creates that particular kind of tile. For example, `loadWaterTile`
    loads a background tile with a water drop on top of it:


    `func loadWaterTile(x: Int, y: Int) -> SKNode {`


        `var w = WaterDrop()`


        `w.position = tileField.layout.toPosition(x, row: y)`


        `w.position.y += 10`


        `w.zPosition = Layer.Scene1`


        `world.addChild(w)`


        `self.waterDrops.append(w)`


        `return Tile()`


    `}`


    This particular example creates a `WaterDrop` instance and positions it in the
    center of the tile. You place each water drop 10 points higher than the tile center
    so it doesn’t bounce over the tile below it. Look at the `Level` class to see
    how to create the various tiles and objects in each level. Figure [22-2](#A978-1-4842-0650-8_22_Chapter.html#Fig2)
    shows a screenshot of the objects in the first level (other than the player character,
    which you will deal with in the following chapters).


    ![A978-1-4842-0650-8_22_Fig2_HTML.jpg](A978-1-4842-0650-8_22_Fig2_HTML.jpg)


    Figure 22-2.


    The game world of the first level of Tick Tick


    ## What You Have Learned


    In this chapter, you have learned the following:


    *   How to set up the general structure of the Tick Tick game

    *   How to create a bouncing water drop'
  trans: "好的，作为高级文档工程师和翻译员，我将严格按照您的要求，将给定的英文文本翻译成中文。\n\n\n# 水滴\n\n每个关卡的目标是收集所有的水滴。每个水滴都由一个\
    \ `WaterDrop` 类的实例表示。这个类是 `SKSpriteNode` 的子类，但你需要为它添加一点行为：水滴应该上下弹跳。你可以在 `updateDelta`\
    \ 方法中实现这一点。首先，你计算一个可以添加到水滴当前位置的弹跳偏移量。这个弹跳偏移量存储在属性 `bounce` 中，初始值为 0。你还维护了已经过去的总游戏时间，如下所示：\n\
    \n```\nvar bounce: CGFloat = 0\nvar totalTime: CGFloat = 0\n```\n\n为了在每个游戏循环迭代中计算弹跳偏移量，你使用了一个正弦函数。并且根据水滴的\
    \ x 坐标，你改变正弦函数的相位，这样所有的水滴就不会同时向上或向下移动：\n\n```\ntotalTime += CGFloat(delta)\nvar\
    \ t = totalTime + position.x\nself.bounce = sin(t*5) * 5\n```\n\n你从水滴的 y 坐标中减去弹跳值：\n\
    \n```\nposition.y -= self.bounce\n```\n\n`-=` 运算符从 y 坐标中减去弹跳值（关于这类运算符的更多信息，请参见第\
    \ 5 章）。然而，简单地从 y 坐标中减去弹跳值并不正确，因为这是一个弹跳偏移量——换句话说，是相对于原始 y 坐标的偏移量。为了得到原始的 y 坐标，你在\
    \ `updateDelta` 方法的第一条指令中，将弹跳偏移量加回到 y 坐标上：\n\n```\nposition.y += self.bounce\n\
    ```\n\n这样做是可行的，因为此时 `bounce` 变量仍然包含上一个游戏循环迭代中的弹跳偏移量。所以，将它加到 y 坐标上就得到了原始的 y 坐标。\n\
