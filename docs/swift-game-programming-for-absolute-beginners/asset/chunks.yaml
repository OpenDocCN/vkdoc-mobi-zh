    a variable in your program, you need to declare it before you can actually use
    it. This is how you declare a variable:


    `var red: Int`


    In this example, the `var` word means that you are declaring a variable. The name
    of the variable is `red`. And finally, the `Int` behind the colon means that this
    variable can store integer numbers. After declaring a variable, you can use it
    in your program to store information and access it when you need it.


    In Swift, you can declare more than a single variable at once. For example,


    `var red: Int, green: Int, fridge: Int, grandMa: Int, applePie: Int`


    Here you declare five different variables that you can now use in your program.
    When you declare these variables, they will contain arbitrary values. Swift does
    not allow you to access a variable directly after declaring it. You need to first
    initialize the variable by assigning a value to it. You can assign a value to
    a variable by using an assignment instruction. For example, let’s assign a value
    to the variable `red`, as follows:


    `red = 3`


    The assignment instruction consists of the following parts:


    *   The name of the variable that should be assigned a value

    *   The `=` sign

    *   The new value of the variable


    You can recognize the assignment instruction by the equals sign in the middle.
    However, it’s better to think of this sign as “becomes” rather than “equals” in
    Swift. After all, the variable isn’t yet equal to the value to the right of the
    equals sign—it becomes that value after the instruction is executed. The syntax
    diagram describing the assignment instruction is given in Figure [3-1](#A978-1-4842-0650-8_3_Chapter.html#Fig1).


    ![A978-1-4842-0650-8_3_Fig1_HTML.gif](A978-1-4842-0650-8_3_Fig1_HTML.gif)


    Figure 3-1.


    Syntax diagram of an assignment instruction


    So now you have seen one instruction for declaring a variable and another instruction
    to store a value in it. But if you already know which value you want to store
    in a variable when you declare it, you can combine the declaration of a variable
    and the first assignment to it:


    `var red: Int = 3`


    When this instruction is executed, the memory will contain the value 3, as shown
    in Figure [3-2](#A978-1-4842-0650-8_3_Chapter.html#Fig2).


    ![A978-1-4842-0650-8_3_Fig2_HTML.gif](A978-1-4842-0650-8_3_Fig2_HTML.gif)


    Figure 3-2.


    Memory after a declaration and assignment of a variable


    When you combine the declaration with the initialization of a variable, you don’t
    need to provide the type of information since that’s already clear from the value
    you’re assigning. So the instruction


    `var x = 12`


    is the same as


    `var x: Int = 12`


    The process of automatically defining the type of a variable by looking at the
    value that you assign to the variable is called type inference. Once a variable’s
    type is defined (either explicitly or inferred) it cannot be changed. Some languages
    (such as JavaScript) do allow changing the type of a variable at any point. This
    is why these languages, as opposed to Swift, are called loosely typed languages.
    Next to variables, Swift also allows you to declare and initialize constants.
    Constants are useful for defining things such as gravity (which will not change,
    unless your game takes place on different planets), a fixed number of levels that
    your game consists of, or a mathematical constant such as pi. You declare a constant
    by replacing `var` with `let`, such as


    `let numberOfLevels = 50`


    or with an explicit type indication, such as


    `let numberOfLevels: Int = 50`


    Here are a few more examples of declarations and assignments of numeric variables:


    `let age = 16`


    `var numberOfBananas: Int`


    `numberOfBananas = 2`


    `var a: Int, b: Int`


    `a = 4`


    `var c = 4, d = 15, e = -3`


    `c = d`


    `numberOfBananas = age + 12`


    In the fourth line of this example, you see that it’s possible to declare multiple
    variables in one declaration. You can even perform multiple declarations with
    assignments in a single declaration, as shown in the sixth line of the example
    code. On the right side of the assignment, you can put other variables or mathematical
    expressions, as you can see in the last two lines. The instruction `c = d` results
    in the value stored in variable `d` being stored in variable `c` as well. Because
    the variable `d` contains the value 15, after this instruction is executed, the
    variable `c` also contains the value 15\. The last instruction takes the value
    stored in the variable `age` (16), adds 12 to it, and stores the result in the
    variable `numberOfBananas` (which now has the value 28—a lot of bananas!). In
    summary, the memory looks something like what is depicted in Figure [3-3](#A978-1-4842-0650-8_3_Chapter.html#Fig3)
    after these instructions have been executed.


    ![A978-1-4842-0650-8_3_Fig3_HTML.gif](A978-1-4842-0650-8_3_Fig3_HTML.gif)


    Figure 3-3.


    Overview of the memory after declaration and assignment of multiple variables.
    The variable b contains an arbitrary integer value


    The syntax of declaring variables (with an optional initialization) is expressed
    in the diagram shown in Figure [3-4](#A978-1-4842-0650-8_3_Chapter.html#Fig4).
    In Figure [3-5](#A978-1-4842-0650-8_3_Chapter.html#Fig5), you see the syntax diagram
    for a constant declaration. Note that the only two differences between the two
    diagrams are the keyword that is used and the optional or obligatory initialisation
    of the variable/constant.


    ![A978-1-4842-0650-8_3_Fig5_HTML.gif](A978-1-4842-0650-8_3_Fig5_HTML.gif)


    Figure 3-5.


    Syntax diagram of constant declaration and initialization


    ![A978-1-4842-0650-8_3_Fig4_HTML.jpg](A978-1-4842-0650-8_3_Fig4_HTML.jpg)


    Figure 3-4.


    Syntax diagram of variable declaration with an optional initialization


    ### Instructions and Expressions


    If you look at the elements in the syntax diagrams, you probably notice that the
    value or program fragment on the right side of an assignment is called an expression.
    So what is the difference between an expression and an instruction? The difference
    between the two is that an instruction changes the memory in some way, whereas
    an expression has a value. Examples of instructions are method calls and assignments,
    as you saw in the previous section. Instructions often use expressions. Here are
    some examples of expressions:


    `16`


    `numberOfBananas`


    `2`


    `a + 4`


    `numberOfBananas + 12 - a`


    `-3`


    `"Hello, World!"`


    All these expressions represent a value of a certain type. Except for the last
    line, all the expressions are numbers. The last expression is a string (of characters).
    In addition to numbers and strings, there are other kinds of expressions, such
    as expressions that use operators.


    ## Operators and More Complex Expressions


    This section talks about the different operators that Swift knows. You must learn
    the priority of each operator so you know in which order calculations are performed.


    ### Arithmetic Operators


    In expressions that are numbers, you can use the following arithmetic operators:


    *   `+` (addition)

    *   `-` (subtraction)

    *   `*` (multiplication)

    *   `/` (division)

    *   `%` (remainder, or “modulus”)


    Multiplication uses an asterisk because the signs normally used in mathematics
    (∙ and ×) aren’t found on a computer keyboard. Completely omitting this operator,
    as is also done in mathematics (for example, in the formula f(x)=3x), isn’t allowed
    in Swift because it introduces confusion with variables consisting of more than
    one character.


    The remainder operator, `%`, gives the division remainder. For instance, the result
    of `14%3` is 2, and the result of `456%10` is 6\. The result always lies between
    0 and the value to the right of the operator. The result is 0 if the result of
    the division is an integer.'
