- fmt: "# Using Actions to Drop Treasures\n\nIn Tut’s Tomb, treasures need to drop\
    \ down every few seconds. Actions are very useful here to define this behavior\
    \ in a simple manner. The action of dropping a treasure needs to be repeated indefinitely,\
    \ and the game needs to wait a bit between dropping treasures in order to not\
    \ overwhelm the players with treasures immediately. In this section, you are going\
    \ to define this action in the `GameWorld` class.\n\nIn order to make the game\
    \ more interesting over time, new types of treasure will appear once in a while.\
    \ Every time a treasure drops, you’ll increment a counter. The value of the counter\
    \ determines the variety in treasure types. Let’s change the `Treasure` class\
    \ to support this behavior. The first thing that is needed is an initializer that\
    \ takes a treasure type as a parameter:\n\n```\ninit(type: UInt32) {\n    super.init()\n\
    \    self.type = type\n    sprite = SKSpriteNode(imageNamed: \"spr_treasure_\\\
    (self.type)\")\n    sprite.zPosition = 1\n    self.position.y = 500\n    self.addChild(sprite)\n\
    \    self.physicsBody = SKPhysicsBody(texture: sprite.texture!, size: sprite.size)\n\
    \    self.physicsBody?.contactTestBitMask = 1\n}\n```\n\nThis initializer creates\
    \ a sprite node depending on the treasure type. The treasure type is expressed\
    \ as an integer value. The `UInt32` type stands for a 32-bit, unsigned integer\
    \ value. The word “unsigned” means that the integer has no sign. In other words,\
    \ the type doesn’t make a distinction between positive and negative numbers. This\
    \ is good because the various treasure types are expressed as positive numbers.\
    \ You can now add a convenience initializer that randomly creates a treasure within\
    \ a range of types:\n\n```\nconvenience init(range: UInt32) {\n    let finalRange\
    \ = min(range, 20)\n    let tp = arc4random_uniform(finalRange)\n    self.init(type:\
    \ tp)\n}\n```\n\nThis convenience initializer does three things. First, it makes\
    \ sure that the range is never higher than the maximum number of sprites that\
    \ are available (20, in the case of Tut’s Tomb). The second line generates a random\
    \ integer number within the range, and finally, you call the designated initializer.\n\
    \nNow that you have extended the `Treasure` class in this way, you can easily\
    \ define an action that drops treasures. First, let’s declare a `counter` property\
    \ in the `GameWorld` class:\n\n```\nvar counter = 0\n```\n\nIn the `GameWorld`\
    \ initializer, you are going to define the actions needed to drop treasures. You\
    \ drop a treasure by creating a `Treasure` instance and adding it to the game\
    \ world. The `Treasure` initializer already places the object at the right position\
    \ (see the initializer code in this section). Depending on the current value of\
    \ the counter, you can calculate a desired range. For example, you could start\
    \ with a range of 5 and increase it by 1 every 10 treasures:\n\n```\nlet r: UInt32\
    \ = 5 + self.counter/10\n```\n\nCreating a `Treasure` instance according to this\
    \ range, and adding it to the game world can now be done in a single line of code:\n\
    \n```\nself.treasures.addChild(Treasure(range: r))\n```\n\nThe only other thing\
    \ that needs to be done in the action for dropping a treasure is incrementing\
    \ the counter. As a result, this is the action that drops a treasure:\n\n```\n\
    let dropTreasureAction = SKAction.runBlock({\n    let r: UInt32 = 5 + self.counter/10\n\
    \    self.treasures.addChild(Treasure(range: r))\n    self.counter++\n})\n```\n\
    \nAs you can see, this action is defined as a block of instructions that needs\
    \ to be executed. In order to wait between dropping treasures, you can use the\
    \ `waitForDuration` method that creates a waiting action. Here is a sequence of\
    \ the two actions, where the game waits for two seconds after dropping a treasure:\n\
    \n```\nlet seq = SKAction.sequence([dropTreasureAction, SKAction.waitForDuration(2)])\n\
    ```\n\nThe total action then infinitely repeats this sequence:\n\n```\nlet totalAction\
    \ = SKAction.repeatActionForever(seq)\nself.runAction(totalAction)\n```\n\nAs\
    \ a result of this action, a treasure will drop down every two seconds. In order\
    \ to make it look like the treasure falls out of a chimney, let’s add a chimney\
    \ sprite to the game world that is drawn over the position where the treasures\
    \ appear before they fall down. The chimney is drawn at a higher z position, so\
    \ that the treasures are drawn behind it:\n\n```\nlet chimney = SKSpriteNode(imageNamed:\"\
    spr_chimney\")\nchimney.zPosition = 10\nchimney.position.y = 510\naddChild(chimney)\n\
    ```\n\nThe `TutsTomb3` example belonging to this chapter contains the code explained\
    \ in this section. When you run it, you’ll see that treasures fall down at a regular\
    \ interval of two seconds. (see Figure [14-1](#A978-1-4842-0650-8_14_Chapter.html#Fig1)).\
    \ Play around with the example code and see if you can modify what the actions\
    \ do. Can you make treasures appear more often?\n\n![A978-1-4842-0650-8_14_Fig1_HTML.jpg](A978-1-4842-0650-8_14_Fig1_HTML.jpg)\n\
    \nFigure 14-1. Treasures falling down in the TutsTomb3 example"
  raw: '## Using Actions to Drop Treasures


    In Tut’s Tomb, treasures need to drop down every few seconds. Actions are very
    useful here to define this behavior in a simple manner. The action of dropping
    a treasure needs to be repeated indefinitely, and the game needs to wait a bit
    between dropping treasures in order to not overwhelm the players with treasures
    immediately. In this section, you are going to define this action in the `GameWorld`
    class.


    In order to make the game more interesting over time, new types of treasure will
    appear once in a while. Every time a treasure drops, you’ll increment a counter.
    The value of the counter determines the variety in treasure types. Let’s change
    the `Treasure` class to support this behavior. The first thing that is needed
    is an initializer that takes a treasure type as a parameter:


    `init(type: UInt32) {`


    `super.init()`


    `self.type = type`


    `sprite = SKSpriteNode(imageNamed: "spr_treasure_\(self.type)")`


    `sprite.zPosition = 1`


    `self.position.y = 500`


    `self.addChild(sprite)`


    `self.physicsBody = SKPhysicsBody(texture: sprite.texture!, size: sprite.size)`


    `self.physicsBody?.contactTestBitMask = 1`


    `}`


    This initializer creates a sprite node depending on the treasure type. The treasure
    type is expressed as an integer value. The `UInt32` type stands for a 32-bit,
    unsigned integer value. The word “unsigned” means that the integer has no sign.
    In other words, the type doesn’t make a distinction between positive and negative
    numbers. This is good because the various treasure types are expressed as positive
    numbers. You can now add a convenience initializer that randomly creates a treasure
    within a range of types:


    `convenience init(range: UInt32) {`


    `let finalRange = min(range, 20)`


    `let tp = arc4random_uniform(finalRange)`


    `self.init(type: tp)`


    `}`


    This convenience initializer does three things. First, it makes sure that the
    range is never higher than the maximum number of sprites that are available (20,
    in the case of Tut’s Tomb). The second line generates a random integer number
    within the range, and finally, you call the designated initializer.


    Now that you have extended the `Treasure` class in this way, you can easily define
    an action that drops treasures. First, let’s declare a `counter` property in the
    `GameWorld` class:


    `var counter = 0`


    In the `GameWorld` initializer, you are going to define the actions needed to
    drop treasures. You drop a treasure by creating a `Treasure` instance and adding
    it to the game world. The `Treasure` initializer already places the object at
    the right position (see the initializer code in this section). Depending on the
    current value of the counter, you can calculate a desired range. For example,
    you could start with a range of 5 and increase it by 1 every 10 treasures:


    `let r: UInt32 = 5 + self.counter/10`


    Creating a `Treasure` instance according to this range, and adding it to the game
    world can now be done in a single line of code:


    `self.treasures.addChild(Treasure(range: r))`


    The only other thing that needs to be done in the action for dropping a treasure
    is incrementing the counter. As a result, this is the action that drops a treasure:


    `let dropTreasureAction = SKAction.runBlock({`


    `let r: UInt32 = 5 + self.counter/10`


    `self.treasures.addChild(Treasure(range: r))`


    `self.counter++`


    `})`


    As you can see, this action is defined as a block of instructions that needs to
    be executed. In order to wait between dropping treasures, you can use the `waitForDuration`
    method that creates a waiting action. Here is a sequence of the two actions, where
    the game waits for two seconds after dropping a treasure:


    `let seq = SKAction.sequence([dropTreasureAction, SKAction.waitForDuration(2)])`


    The total action then infinitely repeats this sequence:


    `let totalAction = SKAction.repeatActionForever(seq)`


    `self.runAction(totalAction)`


    As a result of this action, a treasure will drop down every two seconds. In order
    to make it look like the treasure falls out of a chimney, let’s add a chimney
    sprite to the game world that is drawn over the position where the treasures appear
    before they fall down. The chimney is drawn at a higher z position, so that the
    treasures are drawn behind it:


    `let chimney = SKSpriteNode(imageNamed:"spr_chimney")`


    `chimney.zPosition = 10`


    `chimney.position.y = 510`


    `addChild(chimney)`


    The TutsTomb3 example belonging to this chapter contains the code explained in
    this section. When you run it, you’ll see that treasures fall down at a regular
    interval of two seconds. (see Figure [14-1](#A978-1-4842-0650-8_14_Chapter.html#Fig1)).
    Play around with the example code and see if you can modify what the actions do.
    Can you make treasures appear more often?


    ![A978-1-4842-0650-8_14_Fig1_HTML.jpg](A978-1-4842-0650-8_14_Fig1_HTML.jpg)


    Figure 14-1.


    Treasures falling down in the TutsTomb3 example'
  trans: "\n# 使用动作实现宝物掉落\n\n在图坦卡蒙之墓中，宝物需要每隔几秒掉落一次。动作非常适合用来简洁地定义这一行为。宝物掉落动作需要无限重复，而且在每次掉落之间游戏需要等待片刻，以免宝物立即堆满屏幕。在本节中，你将在`GameWorld`类中定义这个动作。\n\
    \n为了让游戏随着时间推移更有趣，每隔一段时间就会出现新类型的宝物。每次宝物掉落时，你都需要递增一个计数器。计数器的值决定了宝物类型的多样性。让我们修改`Treasure`类来支持这一行为。首先需要的是一个接受宝物类型作为参数的初始化器：\n\
    \n```\ninit(type: UInt32) {\n    super.init()\n    self.type = type\n    sprite\
    \ = SKSpriteNode(imageNamed: \"spr_treasure_\\(self.type)\")\n    sprite.zPosition\
    \ = 1\n    self.position.y = 500\n    self.addChild(sprite)\n    self.physicsBody\
    \ = SKPhysicsBody(texture: sprite.texture!, size: sprite.size)\n    self.physicsBody?.contactTestBitMask\
    \ = 1\n}\n```\n\n这个初始化器根据宝物类型创建了一个精灵节点。宝物类型用一个整数值表示。`UInt32`类型代表一个 32 位无符号整数值。\"\
    无符号\"意味着该整数没有正负号。换言之，该类型不区分正数和负数。这很好，因为各种宝物类型都是用正数表示的。现在你可以添加一个便捷初始化器，在指定类型范围内随机创建宝物：\n\
    \n```\nconvenience init(range: UInt32) {\n    let finalRange = min(range, 20)\n\
    \    let tp = arc4random_uniform(finalRange)\n    self.init(type: tp)\n}\n```\n\
    \n这个便捷初始化器做了三件事。首先，它确保范围不会超过可用精灵的最大数量（在图坦卡蒙之墓中为 20）。第二行在范围内生成一个随机整数，最后你调用了指定初始化器。\n\
    \n现在你已经以这种方式扩展了`Treasure`类，就可以轻松定义一个掉落宝物的动作了。首先，在`GameWorld`类中声明一个`counter`属性：\n\
    \n```\nvar counter = 0\n```\n\n在`GameWorld`初始化器中，你将定义掉落宝物所需的动作。你通过创建`Treasure`实例并将其添加到游戏世界来掉落宝物。`Treasure`初始化器已经将对象放置在正确的位置（参见本节中的初始化器代码）。根据计数器当前的值，你可以计算出所需的范围。例如，你可以从范围\
    \ 5 开始，每掉落 10 个宝物就增加 1：\n\n```\nlet r: UInt32 = 5 + self.counter/10\n```\n\n根据这个范围创建`Treasure`实例并将其添加到游戏世界，现在只需一行代码即可完成：\n\
    \n```\nself.treasures.addChild(Treasure(range: r))\n```\n\n在宝物掉落动作中唯一需要做的另一件事就是递增计数器。因此，这就是掉落宝物的动作：\n\
    \n```\nlet dropTreasureAction = SKAction.runBlock({\n    let r: UInt32 = 5 + self.counter/10\n\
    \    self.treasures.addChild(Treasure(range: r))\n    self.counter++\n})\n```\n\
    \n如你所见，这个动作被定义为一个需要执行的指令块。为了在宝物掉落之间等待，你可以使用`waitForDuration`方法来创建一个等待动作。以下是这两个动作的序列，游戏在掉落宝物后等待两秒：\n\
    \n```\nlet seq = SKAction.sequence([dropTreasureAction, SKAction.waitForDuration(2)])\n\
    ```\n\n然后整个动作无限重复这个序列：\n\n```\nlet totalAction = SKAction.repeatActionForever(seq)\n\
    self.runAction(totalAction)\n```\n\n作为这个动作的结果，每两秒就会掉落一个宝物。为了让宝物看起来像从烟囱里掉出来，让我们在游戏世界中添加一个烟囱精灵，它绘制在宝物掉落前出现的位置上方。烟囱绘制在更高的\
    \ z 位置，这样宝物就会绘制在它后面：\n\n```\nlet chimney = SKSpriteNode(imageNamed:\"spr_chimney\"\
    )\nchimney.zPosition = 10\nchimney.position.y = 510\naddChild(chimney)\n```\n\n\
    属于本章的`TutsTomb3`示例包含了本节解释的代码。当你运行它时，你会看到宝物以两秒的固定间隔掉落（见图 14-1）。尝试修改示例代码，看看你是否能改变这些动作的行为。你能让宝物出现得更频繁吗？\n\
    \n![A978-1-4842-0650-8_14_Fig1_HTML.jpg](img/A978-1-4842-0650-8_14_Fig1_HTML.jpg)\n\
    \n图 14-1. TutsTomb3 示例中宝物掉落\n"
- fmt: '## Special Types of Treasure


    In order to make the game a bit more interesting, there are a few special types
    of treasure. The first type is a rock. If a treasure stays in the scene for too
    long, it turns into a useless rock that doesn’t get removed from the scene (even
    if it collides with another rock). The second special treasure type is a magical
    crystal that removes anything it collides with from the screen (even a useless
    rock). In the code, you need a way to distinguish between the various types of
    treasure. One way to do this is by defining constant values that represent special
    types of treasure. For example, you could define the following constants in the
    `Treasure` class:


    ```

    static let RockType: UInt32 = 99


    static let MagicType: UInt32 = 100

    ```


    Note that I used `static` properties here, so that they can be referred to without
    needing a `Treasure` instance. The constants are of type `UInt32`, just like the
    regular treasure types.


    Another option is to use a separate class or struct that defines the special types.
    Take a look at this code:


    ```

    struct TreasureType {


    static let Rock : UInt32 = 99


    static let Magic : UInt32 = 100


    }

    ```


    Here, a separate `struct` is used to define the various types of treasure. This
    is the approach used in the TutsTomb3 (and subsequent) examples. Because the constants
    in the struct are `static`, you don’t need an instance of the struct to access
    these properties. For example,


    ```

    if type == TreasureType.Rock {


    sprite = SKSpriteNode(imageNamed: "spr_rock")


    }

    ```


    In this code (taken from the `Treasure` initializer), you check whether the type
    passed as a parameter is a rock. If so, you load the rock sprite.


    In some cases, you want to create a magic crystal instead of a regular treasure.
    This is done by the following (part of an) `if` instruction:


    ```

    if arc4random_uniform(6) == 0 {


    sprite = SKSpriteNode(imageNamed: "spr_magic")


    self.type = TreasureType.Magic


    }

    ```


    Here you see that I used a random number generator to sometimes create a magic
    crystal instead of a regular treasure.


    Sometimes, you will need a type to represent different categories of things, similar
    to the different types of treasure. Swift has a special feature for that, called
    enumerations. Enumerations are quite handy for representing a variable that has
    a category value or that represents a particular state. For example, you might
    want to store the type of character that a player represents by using an enumeration.
    You can decide yourself what kind of different states are in your type. So, before
    you can use an enumeration, you first have to define it:


    ```

    enum CharacterClan {


    case Warrior


    case Wizard


    case Elf


    case Spy


    }

    ```


    The `enum` keyword indicates that you are going to define an enumeration. After
    that, you write the name of the enumeration and, between braces, the different
    cases. Each case is preceded by the `case` keyword.


    The type definition can be placed inside a method, but you may also define it
    at the class body level, so that all the methods in the class can use the type.
    You may even define it at the global scope (outside of the class body). Here is
    an example of using the `CharacterClan` enumeration:


    ```

    let myClan = CharacterClan.Warrior

    ```


    In this case, you have created a variable of type `CharacterClan`, which may contain
    one of four values: `CharacterClan.Warrior`, `CharacterClan.Wizard`, `CharacterClan.Elf`,
    or `CharacterClan.Spy`. If the type of a variable is defined, you don’t need to
    write the full name of the enumerated type. For example,


    ```

    let myClan: CharacterClan = .Warrior

    ```


    Another example of using enumerations would be to define a type for indicating
    the days in the week or the months in a year:


    ```

    enum MonthType {


    case January, February, March, April, May, June, July, August, September, October,
    November,


    December


    }


    enum DayType {


    case Sunday, Monday, Tuesday, Wednesday, Thursday, Friday, Saturday


    }


    let currentMonth = MonthType.February


    let today = DayType.Tuesday

    ```


    As you can see in these examples, you don’t have to write the `case` keyword in
    front of every case. This makes it easier to create enumerated types with many
    different cases.


    Although enumerations are very useful in games, I didn’t use them in the TutsTomb3
    example to represent the various types of treasure. The reason is that you need
    a numerical value for the type since that determines which sprite to load. Enumerations
    are not numerical values. The `struct` defined in the TutsTomb3 example behaves
    very much like an enumeration in the code, but the cases are numerical values.
    Some programming languages, such as C#, allow for enumerations to be used as numerical
    values. This can be quite handy, but it doesn’t fit that well in Swift’s quite
    strict typing system.


    ## Turning Treasures Into Rocks


    If a treasure stays too long in the scene, it will be replaced by a rock. This
    can be achieved quite easily using actions. The `SKNode` class has a version of
    `runAction` that takes two parameters instead of one. The first parameter is the
    action to run, and the second parameter is a block of code that should be executed
    once the action is finished. If you use a waiting action, then you can use this
    approach to execute a block of code after a certain amount of time has passed:


    ```

    self.runAction(SKAction.waitForDuration(20), completion: {


        // this code will be executed after 20 seconds


    })

    ```


    Within the block are the instructions that replace this treasure by a rock. The
    first step is creating a rock, using the special rock type:


    ```

    var rock = Treasure(type: TreasureType.Rock)

    ```


    You assign the current treasure position to the rock, so it will be placed at
    the same spot as the treasure that is being replaced:


    ```

    rock.position = self.position

    ```


    Then, you add the rock to the scene, by adding it as a child to the parent of
    this treasure (which is the `treasures` node in the `GameWorld` class):


    ```

    self.parent?.addChild(rock)

    ```


    Finally, you remove the current treasure from its parent, so that it is no longer
    drawn:


    ```

    self.removeFromParent()

    ```


    Take a look at the `Treasure` class in the TutsTomb3 example belonging to this
    chapter to see the complete code of the action. Figure [14-2](#A978-1-4842-0650-8_14_Chapter.html#Fig2)
    shows that some of the treasures have turned into rocks!


    ![A978-1-4842-0650-8_14_Fig2_HTML.jpg](A978-1-4842-0650-8_14_Fig2_HTML.jpg)


    Figure 14-2.

    Treasures turning into useless rocks'
