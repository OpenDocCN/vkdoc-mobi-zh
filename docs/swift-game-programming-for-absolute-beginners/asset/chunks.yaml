    `let nrPairs = fileReader.nextLine().toInt()!`


    `let sizeArr = fileReader.nextLine().componentsSeparatedByString(" ")`


    `let width = sizeArr[0].toInt()!, height = sizeArr[1].toInt()!`


    `let hintArr = fileReader.nextLine().componentsSeparatedByString(" ")`


    The next step is actually creating the field of tiles. For this, define a class
    called `TileField`, which is a subclass of `SKNode` but it adds a grid layout.
    Furthermore, it also has a method `getTileType`, which returns the type of a tile
    at a certain location in the grid. Later, this method is going to be useful for
