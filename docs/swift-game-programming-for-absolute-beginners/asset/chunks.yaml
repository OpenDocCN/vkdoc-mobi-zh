    \n**Figure 7-2.**  \nThe Painter5 example with a cannon, a ball, and three falling\
    \ paint cans\n\n## What You Have Learned\n\nIn this chapter, you have learned\
    \ the following:\n\n* How to define and use multiple classes in your game\n* How\
    \ to create multiple instances of a type/class\n* How to add randomness to your\
    \ game to increase replayability"
