    0.5 and 1\. To achieve this, you generate a random number between 0 and 1, divide
    this number by 2, and add 0.5, like so:


    `var randomNr = CGFloat(arc4random()) / CGFloat(UInt32.max)`


    `var newSpeed = randomNr / 2 + 0.5`


