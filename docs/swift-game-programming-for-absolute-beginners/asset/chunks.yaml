    For animated characters, you usually design one sequence of sprites for each type
    of movement. The example in Figure [23-1](#A978-1-4842-0650-8_23_Chapter.html#Fig1)
    is the sequence for animating a running character. This is where texture atlases
    are a very useful tool. You can define each frame as a separate sprite in a texture
    atlas. In the AnimationSample project, I did exactly this. As a next step, let’s
    design a few useful classes and methods for loading and playing animations. The
    basic class for representing animations is called `Animation`, and it is a part
    of the AnimationSample project. In addition to sprites stored in a texture atlas,
    an animation requires extra information. For example, you want to indicate how
    long each frame should be shown on the screen. You also want to be able to loop
    your animation, meaning that once you reach the last frame, you immediately move
    back to the first frame again, leading to a continuous, infinite animation. Looping
    an animation is very useful: in the case of a walking character, for instance,
    you only have to draw one walk cycle and then loop the animation to get a continuous
    walking motion. Not all animations should be looped, though. For example, a dying
    animation shouldn’t be looped (that would be very cruel to the character). To
    deal with all these situations, the `Animation` class has a number of properties.
    Here is a part of the class:


    `class Animation: SKSpriteNode {`


    `var action = SKAction()`


    `init(atlasNamed: String, looping: Bool, frameTime: NSTimeInterval) {`


    `// to do`


    `}`


    `required init?(coder aDecoder: NSCoder) {`


    `fatalError("init(coder:) has not been implemented")`


    `}`


    `...`


    `}`


    As you can see, the `Animation` class is a subclass of `SKSpriteNode`. So, if
    you create an instance of `Animation`, you can directly add it to the game world.
    The `Animation` class has one single property, `action`. It refers to the action
    that plays the actual animation. The action is created in the initializer. As
    you can see, the initializer expects a few parameters: the name of the atlas that
    contains the animation frames, a Boolean indicating whether the animation should
    be looping or not, and the time between consecutive frames. Depending on the values
    of these parameters, you will create a different animation action.


    The first step is loading the texture atlas. For convenience, let’s also store
    the number of textures that the atlas contains in a variable:


    `let atlas = SKTextureAtlas(named: atlasNamed)`


    `let numImages = atlas.textureNames.count`


    Now, let’s extract all the textures from this atlas and store them in an array.
    Later on, you can define an action that uses this array of texture to produce
    the animation. First, declare and initialize an array of `SKTexture` objects:


    `var frames: [SKTexture] = []`


    The next step is to retrieve all the textures from the atlas. This is where the
    naming of the animation frames is useful. Let’s use a `for` loop to retrieve all
    the frames and add them to the array of textures:


    `for i in 0..<numImages/2 {`


    `let textureName = "\(atlasNamed)_\(i)"`


    `frames.append(atlas.textureNamed(textureName))`


    `}`


    A few things happen in this bit of code. First, there is a variable `i` in the
    range between 0 and `numImages/2`. The reason you need to divide the number of
    images in the atlas by two is because the atlas contains images for both the 1x
    and 2x resolution. Inside the `for` loop, you first construct the texture name
    by adding a number behind the name of the atlas. Then, you use the `textureNamed`
    method to retrieve the actual texture and append it to the array of textures.


    Now you can call the initializer of the superclass. The node is initialized with
    the first texture in the array:


    `super.init(texture: frames[0], color: UIColor.whiteColor(),`


    `size: frames[0].size())`


    Then, you need to create the actual action that animates the node, as follows:


    `let animateAction = SKAction.animateWithTextures(frames,`


    `timePerFrame: frameTime)`


    Depending on whether the animation should loop, you need to repeat the action
    indefinitely. This is handled in the following `if` instruction:


    `if looping {`


    `action = SKAction.repeatActionForever(animateAction)`


    `} else {`


    `action = animateAction`


    `}`


    ## Supporting Multiple Animations


    The `Animation` class provides the groundwork for representing an animation. An
    animated game object may contain a number of different animations, so you can
    have a character that can perform different (animated) actions such as walking,
    running, jumping, and more. Each action is represented by an animation. Depending
    on the player input, you change the animation that is currently active. Let’s
    define a class that makes it easy to deal with multiple animations. In the AnimationSample
    project, this class is called `AnimatedNode`.


    To store the different animations, you use an array. For each animation you need,
    you add an instance of the `Animation` class to the array. So, `AnimatedNode`
    has the following property:


    `var animations : [Animation] = []`


    To make loading and playing animations more convenient, you add two methods to
    the class, `loadAnimation` and `playAnimation`. The first method creates an `Animation`
    object and adds it to the `animations` property:


    `func loadAnimation(atlasNamed: String, looping: Bool = false,`


        `frameTime: NSTimeInterval = 0.05, name: String,`


        `anchorPoint: CGPoint = CGPoint(x: 0.5, y: 0)) {`


        `let anim = Animation(atlasNamed: atlasNamed, looping: looping, frameTime:
    frameTime)`


        `anim.name = name`


        `anim.anchorPoint = anchorPoint`


        `animations.append(anim)`


    `}`


    The `loadAnimation` method expects a few parameters, some of which have default
    values for convenience. First, you need to provide the name of the atlas that
    is used for the animation. Then, you can indicate whether the animation should
    be looping, and the time between frames. Also, each animation needs to have a
    unique name, so that you can retrieve and activate it later on. Finally, you can
    optionally provide an anchor point for the node that is created. Here, the anchor
    point is set to the bottom middle of the sprite by default. In the case of Tick
    Tick, this is a useful default value, since animated characters such as the player
    will walk over tiles. Having the sprite origin at the bottom center makes calculations
    a bit easier, as you’ll see later.


    In the method body, you create the `Animation` instance, assign it a name and
    set its anchor point, and finally, you add it to the array of animations.


    In the `playAnimation` method, you have to select the animation that needs to
    be played, add it to the node, and start the animation action. First, you check
    whether the animation you want to play is already a child of the node. In that
    case, the animation is already playing and you don’t have to do anything else,
    so you can return from the method:


    `func playAnimation(name: String) {`


        `if childNodeWithName(name) != nil {`


            `return`


        `}`


        `...`


    `}`


    Next, you use a `for` loop to find the animation with the chosen name. Once you
    have found it, you remove any children that this node has, add the animation to
    the node, and start the action.


    `for anim in animations {`


        `if anim.name == name {`


            `self.removeAllChildren()`


            `self.addChild(anim)`


            `anim.runAction(anim.action)`


            `return`


        `}`


    `}`'
  trans: "\n# 动画类\n\n对于动画角色，你通常会为每种运动类型设计一组独立的精灵序列。图 23-1 中的示例展示了一个奔跑角色的动画序列。这正是纹理图集大显身手的地方。你可以将每一帧定义为纹理图集中的独立精灵。在\
    \ AnimationSample 项目中，我正是这样做的。下一步，让我们设计一些用于加载和播放动画的实用类和方法。用于表示动画的基础类名为 `Animation`，它是\
    \ AnimationSample 项目的一部分。除了存储在纹理图集中的精灵之外，动画还需要额外的信息。例如，你需要指定每一帧在屏幕上显示多长时间。你还需要能够循环播放动画，这意味着一旦到达最后一帧，就立即回到第一帧，从而形成连续、无限的动画。循环播放动画非常实用：以行走角色为例，你只需绘制一个行走周期，然后循环播放该动画，就能得到连续行走的动作。不过，并非所有动画都需要循环。例如，角色死亡的动画就不应该循环（那对角色来说太残忍了）。为了处理所有这些情况，`Animation`\
    \ 类包含了许多属性。以下是该类的一部分：\n\n```\nclass Animation: SKSpriteNode {\n\n    var action\
    \ = SKAction()\n\n    init(atlasNamed: String, looping: Bool, frameTime: NSTimeInterval)\
    \ {\n        // 待实现\n    }\n\n    required init?(coder aDecoder: NSCoder) {\n\
    \        fatalError(\"init(coder:) has not been implemented\")\n    }\n\n    ...\n\
    }\n```\n\n如你所见，`Animation` 类是 `SKSpriteNode` 的子类。因此，如果你创建了一个 `Animation` 实例，你可以直接将其添加到游戏世界中。`Animation`\
    \ 类有一个单一属性 `action`，它指向实际播放动画的动作。该动作在初始化器中创建。如你所见，初始化器需要几个参数：包含动画帧的图集名称、一个指示动画是否应循环播放的布尔值，以及连续帧之间的时间间隔。根据这些参数的值，你将创建不同的动画动作。\n\
    \n第一步是加载纹理图集。为了方便起见，我们还将图集包含的纹理数量存储在一个变量中：\n\n```\nlet atlas = SKTextureAtlas(named:\
    \ atlasNamed)\nlet numImages = atlas.textureNames.count\n```\n\n现在，让我们从该图集中提取所有纹理，并将它们存储在一个数组中。稍后，你可以定义一个动作，使用这个纹理数组来生成动画。首先，声明并初始化一个\
    \ `SKTexture` 对象数组：\n\n```\nvar frames: [SKTexture] = []\n```\n\n下一步是从图集中检索所有纹理。这正是动画帧命名发挥作用的地方。让我们使用一个\
    \ `for` 循环来检索所有帧，并将它们添加到纹理数组中：\n\n```\nfor i in 0..<numImages/2 {\n    let textureName\
    \ = \"\\(atlasNamed)_\\(i)\"\n    frames.append(atlas.textureNamed(textureName))\n\
    }\n```\n\n这段代码中发生了几个操作。首先，有一个变量 `i`，其范围是从 0 到 `numImages/2`。需要将图集中的图像数量除以二，是因为图集同时包含了\
    \ 1x 和 2x 分辨率的图像。在 `for` 循环内部，你首先通过在图集名称后添加一个数字来构造纹理名称。然后，你使用 `textureNamed` 方法检索实际的纹理，并将其追加到纹理数组中。\n\
    \n现在你可以调用父类的初始化器了。节点使用数组中的第一个纹理进行初始化：\n\n```\nsuper.init(texture: frames[0], color:\
    \ UIColor.whiteColor(),\n           size: frames[0].size())\n```\n\n然后，你需要创建实际驱动节点动画的动作，操作如下：\n\
    \n```\nlet animateAction = SKAction.animateWithTextures(frames,\n            \
    \          timePerFrame: frameTime)\n```\n\n根据动画是否应该循环，你需要无限重复该动作。这通过以下 `if` 指令处理：\n\
    \n```\nif looping {\n    action = SKAction.repeatActionForever(animateAction)\n\
    } else {\n    action = animateAction\n}\n```\n\n# 支持多个动画\n\n`Animation` 类为表示动画提供了基础。一个动画游戏对象可能包含多个不同的动画，因此你可以拥有一个能够执行不同（动画）动作的角色，例如行走、奔跑、跳跃等等。每个动作都由一个动画表示。根据玩家的输入，你切换当前激活的动画。让我们定义一个便于处理多个动画的类。在\
    \ AnimationSample 项目中，这个类叫做 `AnimatedNode`。\n\n为了存储不同的动画，你使用一个数组。对于你需要的每个动画，你向数组中添加一个\
    \ `Animation` 类的实例。因此，`AnimatedNode` 拥有以下属性：\n\n```\nvar animations : [Animation]\
    \ = []\n```\n\n为了使加载和播放动画更加方便，你向该类添加了两个方法：`loadAnimation` 和 `playAnimation`。第一个方法创建一个\
    \ `Animation` 对象并将其添加到 `animations` 属性中：\n\n```\nfunc loadAnimation(atlasNamed:\
    \ String, looping: Bool = false,\n    frameTime: NSTimeInterval = 0.05, name:\
    \ String,\n    anchorPoint: CGPoint = CGPoint(x: 0.5, y: 0)) {\n    let anim =\
    \ Animation(atlasNamed: atlasNamed, looping: looping, frameTime: frameTime)\n\
        anim.name = name\n    anim.anchorPoint = anchorPoint\n    animations.append(anim)\n\
    }\n```\n\n`loadAnimation` 方法需要几个参数，其中一些为方便起见设置了默认值。首先，你需要提供用于动画的图集名称。然后，你可以指示动画是否应该循环，以及帧间的时间间隔。此外，每个动画都需要有一个唯一的名称，以便你稍后能检索并激活它。最后，你可以为创建的节点提供一个锚点。这里，锚点默认设置为精灵的底部中间位置。在\
    \ Tick Tick 这个案例中，这是一个有用的默认值，因为玩家等动画角色会在瓦片上行进。将精灵原点设置在底部中心会使计算稍微简单一些，稍后你会看到。\n\
    \n在方法体中，你创建 `Animation` 实例，为其分配名称并设置其锚点，最后将其添加到动画数组中。\n\n在 `playAnimation` 方法中，你需要选择需要播放的动画，将其添加到节点，并启动动画动作。首先，你检查想要播放的动画是否已经是该节点的子节点。如果是这种情况，说明动画已经在播放，你无需再做其他操作，因此可以从该方法返回：\n\
    \n```\nfunc playAnimation(name: String) {\n    if childNodeWithName(name) != nil\
    \ {\n        return\n    }\n    ...\n}\n```\n\n接下来，你使用一个 `for` 循环来查找具有选定名称的动画。一旦找到，你移除该节点的所有子节点，将动画添加到节点，并启动该动作：\n\
    \n```\nfor anim in animations {\n    if anim.name == name {\n        self.removeAllChildren()\n\
            self.addChild(anim)\n        anim.runAction(anim.action)\n        return\n\
        }\n}\n```\n"
- fmt: "# The Player Class\n\nTo use the `AnimatedNode` class introduced in the previous\
    \ section, you inherit from it. Because the player will control the animated character,\
    \ let's define a `Player` class that is a subclass of `AnimatedNode`. In this\
    \ class, you load the animations belonging to the player and handle the input\
    \ from the player. In the `Player` initializer, you load the animations that are\
    \ needed for this character. In this example, you want the character to walk or\
    \ stand still. So, you load two animations by calling the `loadAnimation` method\
    \ twice. You make both of these animations loop by setting the `looping` parameter\
    \ to `true`:\n\n```\nclass Player: AnimatedNode {\n\n    var velocity = CGPoint.zeroPoint\n\
    \n    override init() {\n        super.init()\n        loadAnimation(\"spr_player_idle\"\
    , looping: true, name: \"idle\")\n        loadAnimation(\"spr_player_run\", looping:\
    \ true, name: \"run\")\n    }\n\n    required init?(coder aDecoder: NSCoder) {\n\
    \        fatalError(\"init(coder:) has not been implemented\")\n    }\n\n    ...\n\
    }\n```\n\nNote that the actual idle animation of the player has only a single\
    \ frame, so it doesn't make a difference in this case whether the idle animation\
    \ loops or not. The `AnimationSample` application has one single game state, which\
    \ is an instance of `MainState`. In this game state, you add a few buttons to\
    \ the screen to control the player character, as well as the player character\
    \ itself. For the complete code, see the `MainState.swift` file.\n\nYou need to\
    \ handle the player's input in this class. When the player presses the left or\
    \ right button on the screen, the velocity of the character should change. You\
    \ do this in the `handleInput` method, using an `if` instruction:\n\n```\nlet\
    \ walkLeftButton = childNodeWithName(\"//button_walkleft\") as! Button\nlet walkRightButton\
    \ = childNodeWithName(\"//button_walkright\") as! Button\nvar walkingSpeed = CGFloat(300)\n\
    \nif walkLeftButton.down {\n    self.velocity.x = -walkingSpeed\n} else if walkRightButton.down\
    \ {\n    self.velocity.x = walkingSpeed\n} else {\n    self.velocity.x = 0\n}\n\
    ```\n\n**Note**\n\nI chose a value of 300 for the `walkingSpeed` parameter. Play\
    \ around with this value and see how it changes the character's behavior. Choosing\
    \ the right value for parameters such as this one has a big influence on gameplay.\
    \ It's important to choose values that are \"just right.\" Testing gameplay with\
    \ a variety of players can help you determine what these values should be so that\
    \ the gameplay feels natural.\n\nUsing the sprites shown in Figure [23-1](#A978-1-4842-0650-8_23_Chapter.html#Fig1)\
    \ allows you to animate a character walking to the right. To animate a character\
    \ walking to the left, you could use another set of sprites. However, there is\
    \ an easier way to accomplish this: by mirroring the sprite in the code. Mirroring\
    \ is quite easy in SpriteKit. You can use scaling to accomplish this. If you want\
    \ to mirror the node so that the character is walking to the left, you assign\
    \ it a negative x scale, as follows:\n\n```\nself.xScale = -1\n```\n\nYou only\
    \ want to set a negative x scale if the player velocity is negative. So, you add\
    \ the following `if` instruction to the `handleInput` method of the `Player` class:\n\
    \n```\nif self.velocity.x < 0 {\n    self.xScale = -1\n} else if self.velocity.x\
    \ > 0 {\n    self.xScale = 1\n}\n```\n\nI applied a little trick here. I only\
    \ change the x scale if the velocity is either greater than or less than 0. If\
    \ the velocity is exactly 0, nothing happens. The effect of this is that when\
    \ the character stops moving, it keeps looking in the direction it was moving\
    \ in, which is the behavior I desire.\n\nIn the `updateDelta` method, you select\
    \ which animation to play based on the velocity. If the velocity is zero, you\
    \ play the idle animation; otherwise you play the run animation:\n\n```\noverride\
    \ func updateDelta(delta: NSTimeInterval) {\n    super.updateDelta(delta)\n  \
    \  position += velocity * CGFloat(delta)\n    if self.velocity.x == 0 {\n    \
    \    self.playAnimation(\"idle\")\n    } else {\n        self.playAnimation(\"\
    run\")\n    }\n}\n```\n\nAs you can see, you also call the `updateDelta` method\
    \ of the superclass, and you add the velocity multiplied by the passed time to\
    \ the player's current position, so that the player can move around.\n\nIf you\
    \ run the program, you will see an animated character that you can control by\
    \ touching the left and right buttons (see Figure [23-3](#A978-1-4842-0650-8_23_Chapter.html#Fig3)).\
    \ Note that if the character walks off the visible screen, it doesn't just \"\
    stop\" off-screen—it keeps going. So, if you touch the right button for 5 seconds,\
    \ you need to touch the left button for 5 seconds as well to get the character\
    \ back.\n\n![A978-1-4842-0650-8_23_Fig3_HTML.jpg](A978-1-4842-0650-8_23_Fig3_HTML.jpg)\n\
    \nFigure 23-3. An animated character moving from left to right on the bottom of\
    \ the screen\n\nOne way around this behavior of being able to walk off the edge\
    \ of the screen is to implement wrapping: if the character walks off the right\
    \ side of the screen, it reappears on the left, and vice versa. You can implement\
    \ wrapping quite easily by adding an `if` instruction to the code that checks\
    \ the current position of the character and, depending on that position, chooses\
    \ to move the character to the other end of the screen. Can you change the example\
    \ yourself to add wrapping?\n\n## What You Have Learned\n\nIn this chapter, you\
    \ have learned the following:\n\n- How to use texture atlases to more efficiently\
    \ deal with large numbers of images\n- How to create and control an animation\n\
    - How to build an animated game object consisting of multiple animations\n\n#\
    \ Platform Game Physics\n\nElectronic supplementary material The online version\
    \ of this chapter (doi:[10.1007/978-1-4842-0650-8_24](http://dx.doi.org/10.1007/978-1-4842-0650-8_24))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    In the previous chapter, you learned how to create an animated character. You\
    \ also learned how to build a tile-based game world by reading level data from\
    \ a text file. One of the most important aspects is still missing: defining how\
    \ the character interacts with the game world. You can make a character move from\
    \ left to right, but if you simply place the character in the level, it can only\
    \ walk on the bottom of the screen. This isn't enough. You want the character\
    \ to be able to jump on top of tiles and fall down if it moves off a tile, and\
    \ you don't want the character to fall off the edge of the screen. For these things,\
    \ you need a physics system.\n\nYou could use the existing physics engine provided\
    \ with the SpriteKit framework, but there are a few reasons why it makes sense\
    \ to roll your own engine specifically for platform games. Since the physics engine\
    \ largely determines how the game plays, you need to be able to tweak the parameters\
    \ of the engine to suit the game. If you write your own physics engine, you have\
    \ a lot more control over how it behaves. Also, your own engine might use fewer\
    \ resources than the SpriteKit physics engine; platform games generally don't\
    \ need hyperrealistic physics, so you can make do with simpler rules and algorithms.\
    \ Another important reason to write your own physics engine is that some parts\
    \ of platform game behavior are difficult to integrate with an existing physics\
    \ engine. For example, the Tick Tick game has special tiles that you can jump\
    \ through when you stand below them. This kind of behavior is hard to encode using\
    \ a traditional physics engine. And finally, although writing your own physics\
    \ engine can be quite a challenge, it's a great exercise in understanding physics\
    \ and translating it into code that actually works!\n\nIn the Tick Tick game,\
    \ the main physics behavior will be implemented in the `Player` class, since the\
    \ player is the main character interacting with the game world. There are two\
    \ main aspects to dealing with physics: giving the character the ability to jump\
    \ or fall, and handling collisions between the character and other game objects,\
    \ and responding to these collisions."
  raw: '## The Player Class


    To use the `AnimatedNode` class introduced in the previous section, you inherit
    from it. Because the player will control the animated character, let’s define
    a `Player` class that is a subclass of `AnimatedNode`. In this class, you load
    the animations belonging to the player and handle the input from the player. In
    the `Player` initializer, you load the animations that are needed for this character.
    In this example, you want the character to walk or stand still. So, you load two
    animations by calling the `loadAnimation` method twice. You make both of these
    animations loop by setting the `looping` parameter to `true`:


    `class Player: AnimatedNode {`


    `var velocity = CGPoint.zeroPoint`


    `override init() {`


    `super.init()`


    `loadAnimation("spr_player_idle", looping: true, name: "idle")`


    `loadAnimation("spr_player_run", looping: true, name: "run")`


    `}`


    `required init?(coder aDecoder: NSCoder) {`


    `fatalError("init(coder:) has not been implemented")`


    `}`


    `...`


    `}`


    Note that the actual idle animation of the player has only a single frame, so
    it doesn’t make a difference in this case whether the idle animation loops or
    not. The AnimationSample application has one single game state, which is an instance
    of `MainState`. In this game state, you add a few buttons to the screen to control
    the player character, as well as the player character itself. For the complete
    code, see the `MainState.swift` file.


    You need to handle the player’s input in this class. When the player presses the
    left or right button on the screen, the velocity of the character should change.
    You do this in the `handleInput` method, using an `if` instruction:


    `let walkLeftButton = childNodeWithName("//button_walkleft") as! Button`


    `let walkRightButton = childNodeWithName("//button_walkright") as! Button`


    `var walkingSpeed = CGFloat(300)`


    `if walkLeftButton.down {`


    `self.velocity.x = -walkingSpeed`


    `} else if walkRightButton.down {`


    `self.velocity.x = walkingSpeed`


    `} else {`


    `self.velocity.x = 0`


    `}`


    Note


    I chose a value of 300 for the `walkingSpeed` parameter. Play around with this
    value and see how it changes the character’s behavior. Choosing the right value
    for parameters such as this one has a big influence on gameplay. It’s important
    to choose values that are “just right.” Testing gameplay with a variety of players
    can help you determine what these values should be so that the gameplay feels
    natural.


    Using the sprites shown in Figure [23-1](#A978-1-4842-0650-8_23_Chapter.html#Fig1)
    allows you to animate a character walking to the right. To animate a character
    walking to the left, you could use another set of sprites. However, there is an
    easier way to accomplish this: by mirroring the sprite in the code. Mirroring
    is quite easy in SpriteKit. You can use scaling to accomplish this. If you want
    to mirror the node so that the character is walking to the left, you assign it
    a negative x scale, as follows:


    `self.xScale = -1`


    You only want to set a negative x scale if the player velocity is negative. So,
    you add the following `if` instruction to the `handleInput` method of the `Player`
    class:


    `if self.velocity.x < 0 {`


    `self.xScale = -1`


    `} else if self.velocity.x > 0 {`


    `self.xScale = 1`


    `}`


    I applied a little trick here. I only change the x scale if the velocity is either
    greater than or less than 0\. If the velocity is exactly 0, nothing happens. The
    effect of this is that when the character stops moving, it keeps looking in the
    direction it was moving in, which is the behavior I desire.


    In the `updateDelta` method, you select which animation to play based on the velocity.
    If the velocity is zero, you play the idle animation; otherwise you play the run
    animation:


    `override func updateDelta(delta: NSTimeInterval) {`


    `super.updateDelta(delta)`


    `position += velocity * CGFloat(delta)`


    `if self.velocity.x == 0 {`


    `self.playAnimation("idle")`


    `} else {`


    `self.playAnimation("run")`


    `}`


    `}`


    As you can see, you also call the `updateDelta` method of the superclass, and
    you add the velocity multiplied by the passed time to the player’s current position,
    so that the player can move around.


    If you run the program, you will see an animated character that you can control
    by touching the left and right buttons (see Figure [23-3](#A978-1-4842-0650-8_23_Chapter.html#Fig3)).
    Note that if the character walks off the visible screen, it doesn’t just “stop”
    off-screen—it keeps going. So, if you touch the right button for 5 seconds, you
    need to touch the left button for 5 seconds as well to get the character back.


    ![A978-1-4842-0650-8_23_Fig3_HTML.jpg](A978-1-4842-0650-8_23_Fig3_HTML.jpg)


    Figure 23-3.


    An animated character moving from left to right on the bottom of the screen


    One way around this behavior of being able to walk off the edge of the screen
    is to implement wrapping: if the character walks off the right side of the screen,
    it reappears on the left, and vice versa. You can implement wrapping quite easily
    by adding an `if` instruction to the code that checks the current position of
    the character and, depending on that position, chooses to move the character to
    the other end of the screen. Can you change the example yourself to add wrapping?


    ## What You Have Learned


    In this chapter, you have learned the following:


    *   How to use texture atlases to more efficiently deal with large numbers of
    images

    *   How to create and control an animation

    *   How to build an animated game object consisting of multiple animations


    # 24. Platform Game Physics


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​24](http://dx.doi.org/10.1007/978-1-4842-0650-8_24))
    contains supplementary material, which is available to authorized users.


    In the previous chapter, you learned how to create an animated character. You
    also learned how to build a tile-based game world by reading level data from a
    text file. One of the most important aspects is still missing: defining how the
    character interacts with the game world. You can make a character move from left
    to right, but if you simply place the character in the level, it can only walk
    on the bottom of the screen. This isn’t enough. You want the character to be able
    to jump on top of tiles and fall down if it moves off a tile, and you don’t want
    the character to fall off the edge of the screen. For these things, you need a
    physics system.


    You could use the existing physics engine provided with the SpriteKit framework,
    but there are a few reasons why it makes sense to roll your own engine specifically
    for platform games. Since the physics engine largely determines how the game plays,
    you need to be able to tweak the parameters of the engine to suit the game. If
    you write your own physics engine, you have a lot more control over how it behaves.
    Also, your own engine might use fewer resources than the SpriteKit physics engine;
    platform games generally don’t need hyperrealistic physics, so you can make do
    with simpler rules and algorithms. Another important reason to write your own
    physics engine is that some parts of platform game behavior are difficult to integrate
    with an existing physics engine. For example, the Tick Tick game has special tiles
    that you can jump through when you stand below them. This kind of behavior is
    hard to encode using a traditional physics engine. And finally, although writing
    your own physics engine can be quite a challenge, it’s a great exercise in understanding
    physics and translating it into code that actually works!


    In the Tick Tick game, the main physics behavior will be implemented in the `Player`
    class, since the player is the main character interacting with the game world.
    There are two main aspects to dealing with physics: giving the character the ability
    to jump or fall, and handling collisions between the character and other game
    objects, and responding to these collisions.'
  trans: "\n# 玩家类\n\n要使用上一节中介绍的 `AnimatedNode` 类，你需要继承它。由于玩家将控制动画角色，我们定义一个 `Player`\
    \ 类，作为 `AnimatedNode` 的子类。在这个类中，你将加载属于玩家的动画，并处理玩家的输入。在 `Player` 的初始化方法中，你加载该角色所需的动画。在本示例中，你希望角色能够行走或站立不动。因此，你通过调用\
    \ `loadAnimation` 方法两次来加载两个动画。你通过将 `looping` 参数设置为 `true` 来让这两个动画循环播放：\n\n```\n\
    class Player: AnimatedNode {\n\n    var velocity = CGPoint.zeroPoint\n\n    override\
    \ init() {\n        super.init()\n        loadAnimation(\"spr_player_idle\", looping:\
    \ true, name: \"idle\")\n        loadAnimation(\"spr_player_run\", looping: true,\
    \ name: \"run\")\n    }\n\n    required init?(coder aDecoder: NSCoder) {\n   \
    \     fatalError(\"init(coder:) has not been implemented\")\n    }\n\n    ...\n\
    }\n```\n\n请注意，玩家的实际空闲动画只有一个帧，因此在这种情况下，空闲动画是否循环并没有区别。`AnimationSample` 应用程序只有一个游戏状态，即\
    \ `MainState` 的实例。在这个游戏状态中，你向屏幕添加了几个按钮来控制玩家角色，以及玩家角色本身。完整代码请参见 `MainState.swift`\
    \ 文件。\n\n你需要在此类中处理玩家的输入。当玩家按下屏幕上的向左或向右按钮时，角色的速度应该会改变。你在 `handleInput` 方法中使用 `if`\
    \ 指令来实现这一点：\n\n```\nlet walkLeftButton = childNodeWithName(\"//button_walkleft\"\
    ) as! Button\nlet walkRightButton = childNodeWithName(\"//button_walkright\")\
    \ as! Button\nvar walkingSpeed = CGFloat(300)\n\nif walkLeftButton.down {\n  \
    \  self.velocity.x = -walkingSpeed\n} else if walkRightButton.down {\n    self.velocity.x\
    \ = walkingSpeed\n} else {\n    self.velocity.x = 0\n}\n```\n\n**注意**\n\n我为 `walkingSpeed`\
    \ 参数选择了 300 这个值。你可以尝试调整这个值，看看它如何改变角色的行为。为此类参数选择正确的值会对游戏玩法产生很大影响。选择“恰到好处”的值非常重要。通过让不同的玩家测试游戏玩法，可以帮助你确定这些值应该是什么，以便游戏体验感觉自然。\n\
    \n使用图 23-1 所示的精灵图，你可以制作一个向右行走的角色动画。要制作向左行走的角色动画，你可以使用另一组精灵图。然而，有一种更简单的方法可以实现这一点：在代码中镜像精灵图。在\
    \ SpriteKit 中镜像非常容易。你可以使用缩放来实现这一点。如果你想镜像节点，使角色向左行走，你可以给它分配一个负的 x 缩放值，如下所示：\n\n\
    ```\nself.xScale = -1\n```\n\n你只希望在玩家速度为负时设置负的 x 缩放值。因此，你在 `Player` 类的 `handleInput`\
    \ 方法中添加以下 `if` 指令：\n\n```\nif self.velocity.x < 0 {\n    self.xScale = -1\n} else\
    \ if self.velocity.x > 0 {\n    self.xScale = 1\n}\n```\n\n我在这里用了一个小技巧。只有当速度大于或小于\
    \ 0 时，我才更改 x 缩放值。如果速度恰好为 0，则什么也不会发生。这样做的效果是，当角色停止移动时，它会保持面向它之前移动的方向，这正是我想要的行为。\n\
    \n在 `updateDelta` 方法中，你根据速度选择要播放的动画。如果速度为零，则播放空闲动画；否则播放奔跑动画：\n\n```\noverride\
    \ func updateDelta(delta: NSTimeInterval) {\n    super.updateDelta(delta)\n  \
    \  position += velocity * CGFloat(delta)\n    if self.velocity.x == 0 {\n    \
    \    self.playAnimation(\"idle\")\n    } else {\n        self.playAnimation(\"\
    run\")\n    }\n}\n```\n\n如你所见，你还调用了超类的 `updateDelta` 方法，并将速度乘以经过的时间加到玩家的当前位置上，这样玩家就可以移动了。\n\
    \n如果你运行这个程序，你将看到一个动画角色，你可以通过触摸左右按钮来控制它（见图 23-3）。请注意，如果角色走出可见屏幕，它并不会在屏幕外“停止”——它会继续移动。因此，如果你按住右键\
    \ 5 秒钟，你也需要按住左键 5 秒钟才能让角色回来。\n\n![A978-1-4842-0650-8_23_Fig3_HTML.jpg](img/A978-1-4842-0650-8_23_Fig3_HTML.jpg)\n\
    \n图 23-3. 一个动画角色在屏幕底部从左向右移动\n\n解决这种可能走出屏幕边缘行为的一种方法是实现“环绕”：如果角色从屏幕右侧走出，它会从左侧重新出现，反之亦然。你可以通过向代码中添加一个\
    \ `if` 指令来轻松实现环绕，该指令检查角色的当前位置，并根据该位置选择将角色移动到屏幕的另一端。你能自己修改示例来添加环绕功能吗？\n\n## 你学到了什么\n\
    \n在本章中，你学到了以下内容：\n\n-   如何使用纹理图集来更高效地处理大量图片\n-   如何创建和控制动画\n-   如何构建一个包含多个动画的动画游戏对象\n\
    \n# 平台游戏物理机制\n\n电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-0650-8_24](http://dx.doi.org/10.1007/978-1-4842-0650-8_24))\
    \ 包含补充材料，仅供授权用户使用。\n\n在上一章中，你学习了如何创建动画角色。你还学习了如何通过从文本文件中读取关卡数据来构建一个基于瓦片的游戏世界。然而，最重要的一个方面仍然缺失：定义角色如何与游戏世界交互。你可以让角色从左向右移动，但如果简单地将角色放置在关卡中，它只能沿着屏幕底部行走。这还不够。你希望角色能够跳到瓦片顶部，如果从瓦片上离开则会掉落，而且你不希望角色掉出屏幕边缘。为了实现这些功能，你需要一个物理系统。\n\
    \n你可以使用 SpriteKit 框架提供的现有物理引擎，但有几个理由说明为什么为平台游戏构建你自己的引擎是明智的。由于物理引擎在很大程度上决定了游戏的玩法，你需要能够调整引擎的参数以适应游戏。如果你编写自己的物理引擎，你将对其行为方式有更多的控制权。此外，你自己的引擎可能比\
    \ SpriteKit 的物理引擎使用更少的资源；平台游戏通常不需要超逼真的物理效果，因此你可以使用更简单的规则和算法。编写自己物理引擎的另一个重要原因是，平台游戏行为的某些部分很难与现有的物理引擎集成。例如，Tick\
    \ Tick 游戏中有一些特殊的瓦片，当你站在它们下方时可以跳穿过去。这种行为很难用传统的物理引擎来编码。最后，虽然编写自己的物理引擎可能是一个相当大的挑战，但这是一个很好的练习，可以帮助你理解物理原理并将其转化为真正可用的代码！\n\
    \n在 Tick Tick 游戏中，主要的物理行为将在 `Player` 类中实现，因为玩家是与游戏世界交互的主要角色。处理物理机制有两个主要方面：赋予角色跳跃或掉落的能力，以及处理角色与其他游戏对象之间的碰撞并对这些碰撞做出响应。\n"
- fmt: "# Locking the Character in the Game World\n\nThe first thing you do is lock\
    \ the character in the game world. In the example in the previous chapter, the\
    \ character could walk out of the screen without any problem. You can solve this\
    \ by placing a virtual pile of wall-type tiles to the left and right of the screen.\
    \ You then assume that your collision-handling mechanism (which you haven’t written\
    \ yet) will ensure that the character can’t walk through these walls. You only\
    \ want to prevent the character from walking out of the left or right side of\
    \ the screen. The character should be able to jump out of sight at the top of\
    \ the screen. The character should also be able to fall off the game world through\
    \ a hole in the ground (and die, obviously).\n\nIn order to build this virtual\
    \ pile of wall tiles on the left and right sides of the screen, you have to add\
    \ some behavior to the grid of tiles. You can do this in the `TileField` class,\
    \ which represents the tile-based game world. This class has a method named `getTileType`,\
    \ which returns the type of the tile given its column and row index on the grid.\
    \ The nice thing about this method is that you allow these indices to fall outside\
    \ of the valid indices in the grid. For example, it would be fine to ask for the\
    \ tile type of the tile at position `(-2,500)`. First, you check if there is a\
    \ tile at the provided location in the grid, and if so, you return its tile type:\n\
    \n```\nif let obj = layout.at(col, row: row) as? Tile {\n    return obj.type\n\
    }\n```\n\nThen, you check whether the column index is out of range. If so, you\
    \ return a wall tile type:\n\n```\nif col < 0 || col >= layout.columns {\n   \
    \ return .Wall\n}\n```\n\nIn all other cases, you return a background tile type:\n\
    \n```\nreturn .Background\n```\n\nThe complete `TileField` class can be found\
    \ in the example program `TickTick2` belonging to this chapter.\n\n# Setting the\
    \ Character at the Right Position\n\nWhen you load the level tiles from the text\
    \ file, you use the character `1` to indicate the tile on which the player’s character\
    \ is starting. Based on the location of that tile, you have to create the `Player`\
    \ object and set it at the right position. For this, you add a method named `loadStartTile`\
    \ to the `LevelState` class. In this method, you calculate the character’s starting\
    \ position based on its location in the grid. Because the character’s origin is\
    \ the bottom-center point of the sprite, you calculate this position as follows:\n\
    \n```\nvar startPosition = tileField.layout.toPosition(x, row: y)\nstartPosition.y\
    \ -= CGFloat(tileField.layout.cellHeight / 2)\n```\n\nNote that you first calculate\
    \ the position using the `toPosition` method of the grid layout. Since this gives\
    \ you the center of the tile, you subtract half of the cell height from the y-position\
    \ to end up at the bottom of the tile. You then create the `Player` object and\
    \ add it to the game world:\n\n```\nvar player = Player(startPos: startPosition)\n\
    player.name = \"player\"\nplayer.zPosition = Layer.Scene1\nworld.addChild(player)\n\
    ```\n\nFinally, you still need to make an actual tile here that can be stored\
    \ in the grid because each character should represent a tile. In this case, you\
    \ can create a background tile that is placed where the character is standing:\n\
    \n```\nreturn Tile()\n```\n\n# Jumping …\n\nYou’ve seen how a character can walk\
    \ to the left or right. How can you deal with jumping and falling? In the `TickTick2`\
    \ example, you add a jump button on the bottom right of the screen. When the player\
    \ presses that button, the character jumps. This basically means the character\
    \ gets a positive y velocity. This can be done easily in the `handleInput` method\
    \ of the `Player` class:\n\n```\nif jumpButton.tapped {\n    self.jump()\n}\n\
    ```\n\nThe `jump` method is as follows:\n\n```\nfunc jump(speed: CGFloat = 680)\
    \ {\n    self.velocity.y = speed\n}\n```\n\nSo, the effect of calling the `jump`\
    \ method without providing any parameter value is that the y velocity is set to\
    \ a value of 680. I chose this number somewhat randomly. Using a bigger number\
    \ means the character can jump higher. I chose this value so the character can\
    \ jump high enough to reach the tiles but not high enough that the game becomes\
    \ too easy (then the character could just jump to the end of the level).\n\nThere\
    \ is a minor problem with this approach: you always allow the player’s character\
    \ to jump, no matter what the character’s current situation is. So, if the character\
    \ is currently jumping or falling down a cliff, you allow the player to make the\
    \ character jump back to safety. This isn’t really what you want. You want the\
    \ character to jump only when standing on the ground. This is something that you\
    \ can detect by looking at collisions between the character and wall or platform\
    \ tiles (which are the only tiles that the character can stand on). Let’s assume\
    \ for now that your yet-to-be-written collision-detection algorithm will take\
    \ care of this and keep track of whether the character is on the ground by using\
    \ a property:\n\n```\nvar onTheGround = false\n```\n\nSometimes it’s necessary\
    \ to sketch out a class in English (as opposed to Swift) beforehand to allow you\
    \ to write other parts of a game. This is also true in the case of collision detection.\
    \ You can’t test a collision-detection algorithm until you build it in, but you\
    \ don’t want to build it in until you’ve created the algorithm and tested it.\
    \ One has to happen first, so you must mentally know what’s going on with the\
    \ other and plan it or keep notes.\n\nIf the `onTheGround` property is `true`,\
    \ you know the character is standing on the ground. You can now change the initial\
    \ `if` instruction so it only allows a character to jump from the ground and not\
    \ from the air:\n\n```\nif jumpButton.tapped && self.onTheGround {\n    self.jump()\n\
    }\n```\n\n# … And Falling\n\nThe only place where you’re currently changing the\
    \ y velocity is in the `handleInput` method, when the player wants to jump. If\
    \ the y velocity indefinitely keeps the value of 680, the character moves up in\
    \ the air, outside of the screen, out of the planet’s atmosphere, and into outer\
    \ space. Because you’re not making a game about bombs in space, you have to do\
    \ something about this. What you forgot to add to the game world is gravity.\n\
    \nYou can follow a simple approach to simulate the effect of gravity on the character’s\
    \ velocity. You subtract a small value from the velocity in the y-direction in\
    \ each update step, similar to what you did in the Painter game for the ball:\n\
    \n```\nself.velocity.y -= CGFloat(1300 * delta)\n```\n\nIf the character has a\
    \ positive velocity, this velocity slowly becomes smaller until it reaches zero\
    \ and then starts to increase again in the negative direction. The effect is that\
    \ the character jumps to a certain height and then starts falling down again,\
    \ just like in the real world. However, the collision-detection mechanism now\
    \ becomes even more important. If there is no collision detection, the character\
    \ will start falling down at the start of the game!"
  raw: '## Locking the Character in the Game World


    The first thing you do is lock the character in the game world. In the example
    in the previous chapter, the character could walk out of the screen without any
    problem. You can solve this by placing a virtual pile of wall-type tiles to the
    left and right of the screen. You then assume that your collision-handling mechanism
    (which you haven’t written yet) will ensure that the character can’t walk through
    these walls. You only want to prevent the character from walking out of the left
    or right side of the screen. The character should be able to jump out of sight
    at the top of the screen. The character should also be able to fall off the game
    world through a hole in the ground (and die, obviously).


    In order to build this virtual pile of wall tiles on the left and right sides
    of the screen, you have to add some behavior to the grid of tiles. You can do
    this in the `TileField` class, which represents the tile-based game world. This
    class has a method named `getTileType`, which returns the type of the tile given
    its column and row index on the grid. The nice thing about this method is that
    you allow these indices to fall outside of the valid indices in the grid. For
    example, it would be fine to ask for the tile type of the tile at position (-2,500).
    First, you check if there is a tile at the provided location in the grid, and
    if so, you return its tile type:


    `if let obj = layout.at(col, row: row) as? Tile {`


        `return obj.type`


    `}`


    Then, you check whether the column index is out of range. If so, you return a
    wall tile type:


    `if col < 0 || col >= layout.columns {`


        `return .Wall`


    `}`


    In all other cases, you return a background tile type:


    `return .Background`


    The complete `TileField` class can be found in the example program TickTick2 belonging
    to this chapter.


    ## Setting the Character at the Right Position


    When you load the level tiles from the text file, you use the character `1` to
    indicate the tile on which the player’s character is starting. Based on the location
    of that tile, you have to create the `Player` object and set it at the right position.
    For this, you add a method named `loadStartTile` to the `LevelState` class. In
    this method, you calculate the character’s starting position based on its location
    in the grid. Because the character’s origin is the bottom-center point of the
    sprite, you calculate this position as follows:


    `var startPosition = tileField.layout.toPosition(x, row: y)`


    `startPosition.y -= CGFloat(tileField.layout.cellHeight / 2)`


    Note that you first calculate the position using the `toPosition` method of the
    grid layout. Since this gives you the center of the tile, you subtract half of
    the cell height from the y-position to end up at the bottom of the tile. You then
    create the `Player` object and add it to the game world:


    `var player = Player(startPos: startPosition)`


    `player.name = "player"`


    `player.zPosition = Layer.Scene1`


    `world.addChild(player)`


    Finally, you still need to make an actual tile here that can be stored in the
    grid because each character should represent a tile. In this case, you can create
    a background tile that is placed where the character is standing:


    `return Tile()`


    ## Jumping …


    You’ve seen how a character can walk to the left or right. How can you deal with
    jumping and falling? In the TickTick2 example, you add a jump button on the bottom
    right of the screen. When the player presses that button, the character jumps.
    This basically means the character gets a positive y velocity. This can be done
    easily in the `handleInput` method of the `Player` class:


    `if jumpButton.tapped {`


        `self.jump()`


    `}`


    The `jump` method is as follows:


    `func jump(speed: CGFloat = 680) {`


        `self.velocity.y = speed`


    `}`


    So, the effect of calling the `jump` method without providing any parameter value
    is that the y velocity is set to a value of 680\. I chose this number somewhat
    randomly. Using a bigger number means the character can jump higher. I chose this
    value so the character can jump high enough to reach the tiles but not high enough
    that the game becomes too easy (then the character could just jump to the end
    of the level).


    There is a minor problem with this approach: you always allow the player’s character
    to jump, no matter what the character’s current situation is. So, if the character
    is currently jumping or falling down a cliff, you allow the player to make the
    character jump back to safety. This isn’t really what you want. You want the character
    to jump only when standing on the ground. This is something that you can detect
    by looking at collisions between the character and wall or platform tiles (which
    are the only tiles that the character can stand on). Let’s assume for now that
    your yet-to-be-written collision-detection algorithm will take care of this and
    keep track of whether the character is on the ground by using a property:


    `var onTheGround = false`


    Sometimes it’s necessary to sketch out a class in English (as opposed to Swift)
    beforehand to allow you to write other parts of a game. This is also true in the
    case of collision detection. You can’t test a collision-detection algorithm until
    you build it in, but you don’t want to build it in until you’ve created the algorithm
    and tested it. One has to happen first, so you must mentally know what’s going
    on with the other and plan it or keep notes.


    If the `onTheGround` property is `true`, you know the character is standing on
    the ground. You can now change the initial `if` instruction so it only allows
    a character to jump from the ground and not from the air:


    `if jumpButton.tapped && self.onTheGround {`


        `self.jump()`


    `}`


    ## … And Falling


    The only place where you’re currently changing the y velocity is in the `handleInput`
    method, when the player wants to jump. If the y velocity indefinitely keeps the
    value of 680, the character moves up in the air, outside of the screen, out of
    the planet’s atmosphere, and into outer space. Because you’re not making a game
    about bombs in space, you have to do something about this. What you forgot to
    add to the game world is gravity.


    You can follow a simple approach to simulate the effect of gravity on the character’s
    velocity. You subtract a small value from the velocity in the y-direction in each
    update step, similar to what you did in the Painter game for the ball:


    `self.velocity.y -= CGFloat(1300 * delta)`


    If the character has a positive velocity, this velocity slowly becomes smaller
    until it reaches zero and then starts to increase again in the negative direction.
    The effect is that the character jumps to a certain height and then starts falling
    down again, just like in the real world. However, the collision-detection mechanism
    now becomes even more important. If there is no collision detection, the character
    will start falling down at the start of the game!'
  trans: "\n# 将角色锁定在游戏世界中\n\n你要做的第一件事就是**将角色锁定在游戏世界中**。上一章的例子中，角色可以毫无阻碍地走出屏幕。为了解决这个问题，你可以在屏幕左右两侧放置一堵由虚拟墙砖构成的屏障。然后假定你的碰撞处理机制（虽然你还没编写）会确保角色无法穿过这些墙壁。你只需防止角色从屏幕左侧或右侧走出去。角色应该能够从屏幕顶部跳出视野，也应该能通过地面上的坑洞掉出游戏世界（当然，随后便会死亡）。\n\
    \n为了在屏幕左右两侧构建这堵虚拟墙砖屏障，你需要为网格添加一些行为逻辑。这可以在表示基于瓦片的游戏世界的 `TileField` 类中完成。该类有一个名为\
    \ `getTileType` 的方法，该方法根据给定的行列索引返回对应瓦片的类型。这个方法的一个巧妙之处是：它允许索引超出网格的有效范围。例如，即使查询位置为\
    \ `(-2,500)` 的瓦片类型也是允许的。首先，它会检查网格中指定位置是否存在瓦片，如果存在，则返回其瓦片类型：\n\n```\nif let obj\
    \ = layout.at(col, row: row) as? Tile {\n    return obj.type\n}\n```\n\n然后，它会检查列索引是否超出范围。如果是，则返回一个墙砖类型：\n\
    \n```\nif col < 0 || col >= layout.columns {\n    return .Wall\n}\n```\n\n在其他所有情况下，则返回一个背景砖类型：\n\
    \n```\nreturn .Background\n```\n\n完整的 `TileField` 类可以在本章附带的示例程序 `TickTick2` 中找到。\n\
    \n# 将角色设置在正确位置\n\n当你从文本文件加载关卡砖块时，使用字符 `1` 来表示玩家角色的起始砖块。你需要根据该砖块的位置来创建 `Player`\
    \ 对象，并将其设置在正确的位置。为此，你在 `LevelState` 类中添加一个名为 `loadStartTile` 的方法。在该方法中，你根据角色在网格中的位置计算其起始坐标。由于角色的原点位于精灵的底部中心点，你按如下方式计算这个位置：\n\
    \n```\nvar startPosition = tileField.layout.toPosition(x, row: y)\nstartPosition.y\
    \ -= CGFloat(tileField.layout.cellHeight / 2)\n```\n\n请注意，你首先使用网格布局的 `toPosition`\
    \ 方法计算位置。由于这得到的是砖块的中心点，你需要从 y 坐标中减去单元格高度的一半，才能到达砖块的底部。然后，你创建 `Player` 对象并将其添加到游戏世界中：\n\
    \n```\nvar player = Player(startPos: startPosition)\nplayer.name = \"player\"\n\
    player.zPosition = Layer.Scene1\nworld.addChild(player)\n```\n\n最后，你仍然需要在此处创建一个可以存储在网格中的实际砖块，因为每个字符都应该对应一个砖块。在这种情况下，你可以创建一个放在角色站立位置的背景砖：\n\
    \n```\nreturn Tile()\n```\n\n# 跳跃……\n\n你已经了解了角色如何向左或向右行走。那么如何处理跳跃和下落呢？在 `TickTick2`\
    \ 示例中，你在屏幕右下角添加了一个跳跃按钮。当玩家按下该按钮时，角色就会跳跃。这基本上意味着角色获得一个正的 y 方向速度。这可以很容易地在 `Player`\
    \ 类的 `handleInput` 方法中实现：\n\n```\nif jumpButton.tapped {\n    self.jump()\n}\n\
    ```\n\n`jump` 方法如下：\n\n```\nfunc jump(speed: CGFloat = 680) {\n    self.velocity.y\
    \ = speed\n}\n```\n\n所以，在不提供任何参数值的情况下调用 `jump` 方法的效果是：将 y 方向速度设置为 680。我选择这个数值是有点随机的。使用更大的数值意味着角色可以跳得更高。我选择这个值是为了让角色能跳得足够高以触及砖块，但又不会高到让游戏变得过于简单（那样角色可能直接跳到关卡尽头）。\n\
    \n这种方法存在一个小问题：你总是允许玩家角色跳跃，无论角色当前处于什么状态。也就是说，如果角色正在跳跃或掉下悬崖，你仍然允许玩家让角色跳回安全地带。这并不是你想要的。你希望角色只在站立于地面时才能跳跃。这可以通过检测角色与墙壁或平台砖块（这是角色唯一能站立其上的砖块类型）之间的碰撞来实现。让我们暂时假设你尚未编写的碰撞检测算法会处理这个问题，并使用一个属性来跟踪角色是否在地面上：\n\
    \n```\nvar onTheGround = false\n```\n\n有时，有必要先用英语（而不是 Swift）勾勒出一个类的框架，以便你能编写游戏的其他部分。碰撞检测的情况也是如此。你无法在构建碰撞检测算法之前对其进行测试，但你也不想在算法创建并测试之前就将其嵌入。必须有一方先行，所以你需要先在脑海中明确另一方的运作方式，并做好规划或记录。\n\
    \n如果 `onTheGround` 属性为 `true`，你就知道角色正站在地面上。现在你可以修改初始的 `if` 指令，使其只允许角色从地面起跳，而不能在空中起跳：\n\
    \n```\nif jumpButton.tapped && self.onTheGround {\n    self.jump()\n}\n```\n\n\
    # ……和下坠\n\n目前，唯一改变 y 方向速度的地方是在 `handleInput` 方法中，当玩家想要跳跃时。如果 y 方向速度无限期地保持在 680\
    \ 这个值，角色就会在空中向上移动，飞出屏幕，脱离地球大气层，进入外太空。因为你做的不是一款关于太空炸弹的游戏，所以你必须对此采取措施。你忘记添加到游戏世界中的是**重力**。\n\
    \n你可以采用一种简单的方法来模拟重力对角色的影响。在每个更新步骤中，从 y 方向速度中减去一个较小的值，类似于你在 Painter 游戏中处理球体时所做的那样：\n\
    \n```\nself.velocity.y -= CGFloat(1300 * delta)\n```\n\n如果角色具有正速度，这个速度会逐渐减小，直到达到零，然后开始反向增加（变为负值）。其效果是角色跳到一定高度后开始下落，就像现实世界中一样。然而，这样一来，碰撞检测机制就变得更加重要了。如果没有碰撞检测，角色在游戏开始时就会开始下坠！\n"
- fmt: "# Collision Detection\n\nDetecting collisions between game objects is a very\
    \ important part of simulating interacting game worlds. Collision detection is\
    \ used for many different things in games: detecting whether the character walks\
    \ over a power-up, detecting whether the character collides with a projectile,\
    \ detecting collisions between the character and walls or floors, and so on. You\
    \ used collision detection in the previous games discussed in this book. In Tut’s\
    \ Tomb, the physics engine dealt with detection collisions between objects. In\
    \ the Painter game, you performed a simple collision detection yourself using\
    \ bounding boxes. Here is a snippet of code from the `PaintCan` class:\n\n```\n\
    var ball = GameScene.world.ball\n\nif self.box.intersects(ball.box) {\n    color\
    \ = ball.color\n    ball.reset()\n}\n```\n\nWhat you’re doing here is detecting\
    \ a collision between the ball and the paint can by checking if their bounding\
    \ boxes intersect. This isn’t a very precise way of checking collisions. Neither\
    \ the ball nor the paint can resemble a box. As a result, in some cases a collision\
    \ is detected when there is none, and sometimes a collision isn’t detected when\
    \ the sprites are actually colliding. Still, many games use simplified shapes\
    \ such as circles and rectangles to represent objects when they do collision detection.\
    \ Because these shapes bind the object within, they’re also called bounding circles\
    \ and bounding boxes. The Tick Tick game uses axis-aligned bounding boxes, meaning\
    \ you don’t consider boxes whose sides aren’t parallel to the x- and y-axes.\n\
    \nDoing collision detection using bounding boxes isn’t always precise enough.\
    \ When game objects are close to each other, their bounding shapes may intersect\
    \ (and thus trigger a collision), but the actual objects don’t. And when a game\
    \ object is animated, its shape may change over time. You could make the bounding\
    \ shape bigger so the object fits in it under all circumstances, but that would\
    \ lead to even more false collision triggers. There are some solutions for this.\
    \ For example, instead of using boxes and circles, you could also create an outline\
    \ of the sprite by drawing lines around it. If you create a convex outline (meaning\
    \ the outline doesn’t contain any holes or inward pointing sections), you can\
    \ use the separating axes theorem to determine if there is a collision between\
    \ two such outlines. Dealing with this is outside of the scope of this book, but\
    \ suffice to say that it will be slightly more resource intensive than dealing\
    \ with boxes and circles.\n\nYet another solution, which is even more resource-hungry,\
    \ is to check for collisions on a per-pixel basis. Basically, you can write an\
    \ algorithm that walks over the non-transparent pixels in the sprite (using a\
    \ nested `for` instruction) and checks whether one or more of these pixels collides\
    \ with one of the pixels in another sprite (again, by walking through them using\
    \ a nested `for` instruction). Because such highly detailed collision detection\
    \ is costly, especially if you want your game to run smoothly on older iDevices,\
    \ you’ll use simple collision detection using bounding boxes in the Tick Tick\
    \ game, even though you’ll learn a few tricks to make the collision handling more\
    \ natural.\n\n## Retrieving Bounding Boxes\n\nTo handle collisions efficiently\
    \ in your game, you use the `box` property from the `SKNode` class that returns\
    \ the bounding box of the sprite:\n\n```\nvar box: CGRect {\n    get {\n     \
    \   var boundingBox = self.calculateAccumulatedFrame()\n        if parent != nil\
    \ {\n            boundingBox.origin = scene!.convertPoint(boundingBox.origin,\n\
    \                fromNode: parent!)\n        }\n        return boundingBox\n \
    \   }\n}\n```\n\nNote that you convert the bounding box origin to the scene coordinate\
    \ frame. This ensures that the bounding box position is expressed in world coordinates.\
    \ When doing collision detection, you want to know where the objects are in the\
    \ world—you don’t care about their local positions in a hierarchy of game objects.\n\
    \n## Handling Character-Tile Collisions\n\nIn the Tick Tick game, you mainly need\
    \ to detect collisions between the character and the tiles. You do this in a method\
    \ called `handleCollisions`, which you call from the `updateDelta` method in the\
    \ `Player` class. The idea is that you do all the calculations for jumping, falling,\
    \ and running first (you did this at the beginning of this chapter). If there\
    \ is a collision between the character and a tile, you correct the position of\
    \ the character so that it no longer collides. In the `handleCollisions` method,\
    \ you walk through the grid of tiles and check whether there is a collision between\
    \ the character and the tile you’re currently examining.\n\nYou don’t need to\
    \ check all the tiles in the grid, only those close to the character’s current\
    \ location. You can calculate the closest tile to the character’s position as\
    \ follows:\n\n```\nlet tiles = childNodeWithName(\"//tileField\") as! TileField\n\
    let (x_floor, y_floor) = tiles.layout.gridLocation(self.position)\n```\n\nNow\
    \ you can use a nested `for` instruction to look at the tiles surrounding the\
    \ character. In order to account for fast jumping and falling, you take more tiles\
    \ into account in the y-direction. In the nested `for` instruction, you then check\
    \ whether the character is colliding with the tile. However, you only need to\
    \ do that if the tile is not a background tile. The code to do all that is as\
    \ follows:\n\n```\nfor (var y = y_floor - 1; y <= y_floor + 2; ++y) {\n    for\
    \ (var x = x_floor - 1; x <= x_floor + 1; ++x) {\n        let tileType = tiles.getTileType(x,\
    \ row: y)\n        if tileType == .Background {\n            continue\n      \
    \  }\n        let tileBounds = tiles.getTileBox(x, row: y)\n        if !tileBounds.intersects(box)\
    \ {\n            continue\n        }\n        ...\n    }\n}\n```\n\nAs you can\
    \ see, you don’t directly access the `Tile` objects. The reason is that sometimes\
    \ the `x` or `y` index can be negative because the character is near the edge\
    \ of the screen. Here you see the advantage of using the `getTileType` method\
    \ you added to the `TileField` class. You don’t care if you’re really dealing\
    \ with a tile: as long as you know its type and bounding box, you can do your\
    \ job.\n\nIn the nested `for` instruction, you also see a new keyword: `continue`.\
    \ This keyword can be used in `for` or `while` instructions to stop executing\
    \ the current iteration of the loop and continue to the next one. In this case,\
    \ if the tile is of type `Background`, the rest of the instructions are no longer\
    \ executed, and you continue to increment `x` and start a new iteration to check\
    \ the next tile. The result is that only tiles that aren’t of type `Background`\
    \ are considered. The `continue` keyword is related to `break`, which stops the\
    \ loop entirely. Unlike `break`, `continue` only stops the current iteration.\n\
    \nThis code doesn’t always work correctly, though. Particularly when the character\
    \ is standing on a tile, rounding errors when calculating the bounding box can\
    \ lead to the algorithm thinking the character isn’t standing on the ground. The\
    \ character’s velocity is then increased, and the character may fall through the\
    \ tile as a result. To compensate for any rounding errors, you decrease the `y`\
    \ origin of the bounding box by 1:\n\n```\nlet tileBounds = tiles.getTileBox(x,\
    \ row: y)\nvar bbox = box\nbbox.origin.y -= 1\nif !tileBounds.intersects(bbox)\
    \ {\n    continue\n}\n// handle the collision\n```"
  raw: '## Collision Detection


    Detecting collisions between game objects is a very important part of simulating
    interacting game worlds. Collision detection is used for many different things
    in games: detecting whether the character walks over a power-up, detecting whether
    the character collides with a projectile, detecting collisions between the character
    and walls or floors, and so on. You used collision detection in the previous games
    discussed in this book. In Tut’s Tomb, the physics engine dealt with detection
    collisions between objects. In the Painter game, you performed a simple collision
    detection yourself using bounding boxes. Here is a snippet of code from the `PaintCan`
    class:


    `var ball = GameScene.world.ball`


    `if self.box.intersects(ball.box) {`


        `color = ball.color`


        `ball.reset()`


    `}`


    What you’re doing here is detecting a collision between the ball and the paint
    can by checking if their bounding boxes intersect. This isn’t a very precise way
    of checking collisions. Neither the ball nor the paint can resemble a box. As
    a result, in some cases a collision is detected when there is none, and sometimes
    a collision isn’t detected when the sprites are actually colliding. Still, many
    games use simplified shapes such as circles and rectangles to represent objects
    when they do collision detection. Because these shapes bind the object within,
    they’re also called bounding circles and bounding boxes. The Tick Tick game uses
    axis-aligned bounding boxes, meaning you don’t consider boxes whose sides aren’t
    parallel to the x- and y-axes.


    Doing collision detection using bounding boxes isn’t always precise enough. When
    game objects are close to each other, their bounding shapes may intersect (and
    thus trigger a collision), but the actual objects don’t. And when a game object
    is animated, its shape may change over time. You could make the bounding shape
    bigger so the object fits in it under all circumstances, but that would lead to
    even more false collision triggers. There are some solutions for this. For example,
    instead of using boxes and circles, you could also create an outline of the sprite
    by drawing lines around it. If you create a convex outline (meaning the outline
    doesn’t contain any holes or inward pointing sections), you can use the separating
    axes theorem to determine if there is a collision between two such outlines. Dealing
    with this is outside of the scope of this book, but suffice to say that it will
    be slightly more resource intensive than dealing with boxes and circles.


    Yet another solution, which is even more resource-hungry, is to check for collisions
    on a per-pixel basis. Basically, you can write an algorithm that walks over the
    non-transparent pixels in the sprite (using a nested `for` instruction) and checks
    whether one or more of these pixels collides with one of the pixels in another
    sprite (again, by walking through them using a nested `for` instruction). Because
    such highly detailed collision detection is costly, especially if you want your
    game to run smoothly on older iDevices, you’ll use simple collision detection
    using bounding boxes in the Tick Tick game, even though you’ll learn a few tricks
    to make the collision handling more natural.


    ## Retrieving Bounding Boxes


    To handle collisions efficiently in your game, you use the `box` property from
    the `SKNode` class that returns the bounding box of the sprite:


    `var box: CGRect {`


        `get {`


            `var boundingBox = self.calculateAccumulatedFrame()`


            `if parent != nil {`


                `boundingBox.origin = scene!.convertPoint(boundingBox.origin,`


                    `fromNode: parent!)`


            `}`


            `return boundingBox`


        `}`


    `}`


    Note that you convert the bounding box origin to the scene coordinate frame. This
    ensures that the bounding box position is expressed in world coordinates. When
    doing collision detection, you want to know where the objects are in the world—you
    don’t care about their local positions in a hierarchy of game objects.


    ## Handling Character-Tile Collisions


    In the Tick Tick game, you mainly need to detect collisions between the character
    and the tiles. You do this in a method called `handleCollisions`, which you call
    from the `updateDelta` method in the `Player` class. The idea is that you do all
    the calculations for jumping, falling, and running first (you did this at the
    beginning of this chapter). If there is a collision between the character and
    a tile, you correct the position of the character so that it no longer collides.
    In the `handleCollisions` method, you walk through the grid of tiles and check
    whether there is a collision between the character and the tile you’re currently
    examining.


    You don’t need to check all the tiles in the grid, only those close to the character’s
    current location. You can calculate the closest tile to the character’s position
    as follows:


    `let tiles = childNodeWithName("//tileField") as! TileField`


    `let (x_floor, y_floor) = tiles.layout.gridLocation(self.position)`


    Now you can use a nested `for` instruction to look at the tiles surrounding the
    character. In order to account for fast jumping and falling, you take more tiles
    into account in the y-direction. In the nested `for` instruction, you then check
    whether the character is colliding with the tile. However, you only need to do
    that if the tile is not a background tile. The code to do all that is as follows:


    `for (var y = y_floor - 1; y <= y_floor + 2; ++y) {`


        `for (var x = x_floor - 1; x <= x_floor + 1; ++x) {`


            `let tileType = tiles.getTileType(x, row: y)`


            `if tileType == .Background {`


                `continue`


            `}`


            `let tileBounds = tiles.getTileBox(x, row: y)`


            `if !tileBounds.intersects(box) {`


                `continue`


            `}`


            `...`


        `}`


    `}`


    As you can see, you don’t directly access the `Tile` objects. The reason is that
    sometimes the x or y index can be negative because the character is near the edge
    of the screen. Here you see the advantage of using the `getTileType` method you
    added to the `TileField` class. You don’t care if you’re really dealing with a
    tile: as long as you know its type and bounding box, you can do your job.


    In the nested `for` instruction, you also see a new keyword: `continue`. This
    keyword can be used in `for` or `while` instructions to stop executing the current
    iteration of the loop and continue to the next one. In this case, if the tile
    is of type `Background`, the rest of the instructions are no longer executed,
    and you continue to increment `x` and start a new iteration to check the next
    tile. The result is that only tiles that aren’t of type `Background` are considered.
    The `continue` keyword is related to `break`, which stops the loop entirely. Unlike
    `break`, `continue` only stops the current iteration.


    This code doesn’t always work correctly, though. Particularly when the character
    is standing on a tile, rounding errors when calculating the bounding box can lead
    to the algorithm thinking the character isn’t standing on the ground. The character’s
    velocity is then increased, and the character may fall through the tile as a result.
    To compensate for any rounding errors, you decrease the y origin of the bounding
    box by 1:


    `let tileBounds = tiles.getTileBox(x, row: y)`


    `var bbox = box`


    `bbox.origin.y -= 1`


    `if !tileBounds.intersects(bbox) {`


        `continue`


    `}`


    `// handle the collision`'
  trans: "\n# 碰撞检测\n\n检测游戏对象之间的碰撞是模拟交互式游戏世界的一个非常重要的部分。碰撞检测在游戏中有多种用途：检测角色是否踩到了增强道具、检测角色是否与抛射物相撞、检测角色与墙壁或地板之间的碰撞等等。你已经在本书前面讨论过的游戏中使用了碰撞检测。在图坦卡蒙之墓游戏中，物理引擎负责处理对象间的碰撞检测。在画家游戏中，你使用边界框自己实现了一个简单的碰撞检测。以下是`PaintCan`类中的一段代码：\n\
    \n```\nvar ball = GameScene.world.ball\n\nif self.box.intersects(ball.box) {\n\
    \    color = ball.color\n    ball.reset()\n}\n```\n\n这里所做的是通过检查球和油漆罐的边界框是否相交来检测它们之间的碰撞。这不是一种非常精确的碰撞检测方法。球和油漆罐的形状都不像盒子。因此，在某些情况下，没有发生碰撞时却检测到了碰撞，而有时精灵实际上正在碰撞，却又检测不到。尽管如此，许多游戏在进行碰撞检测时仍会使用简化形状，例如圆形和矩形，来表示对象。因为这些形状将对象包裹在里面，所以它们也被称为边界圆和边界框。Tick\
    \ Tick 游戏使用了轴对齐边界框，这意味着你只考虑边与 x 轴和 y 轴平行的盒子。\n\n使用边界框进行碰撞检测并不总是足够精确。当游戏对象彼此靠近时，它们的边界形状可能会相交（从而触发碰撞），但实际对象并未碰撞。而且，当游戏对象有动画时，其形状可能会随时间改变。你可以将边界形状做得更大，以便对象在任何情况下都能放入其中，但这会导致更多错误的碰撞触发。对此有一些解决方案。例如，除了使用盒子和圆形，你还可以通过围绕精灵绘制线条来创建其轮廓。如果你创建一个凸轮廓（意味着轮廓没有包含任何空洞或向内凹陷的部分），你可以使用分离轴定理来确定两个这样的轮廓之间是否存在碰撞。处理这个问题超出了本书的范围，但可以说，这比处理盒子和圆形会稍微消耗更多的资源。\n\
    \n另一种解决方案，资源消耗甚至更高，即是逐像素检查碰撞。基本上，你可以编写一个算法，遍历精灵中的非透明像素（使用嵌套的`for`指令），并检查这些像素中的一个或多个是否与另一个精灵中的像素发生碰撞（同样，通过嵌套的`for`指令遍历它们）。由于这种高度精细的碰撞检测成本高昂，特别是如果你希望游戏在较旧的\
    \ iDevice 上流畅运行，那么你将在 Tick Tick 游戏中使用基于边界框的简单碰撞检测，尽管你也会学习一些技巧，使碰撞处理更加自然。\n\n##\
    \ 获取边界框\n\n为了在游戏中高效地处理碰撞，你使用`SKNode`类中的`box`属性，该属性返回精灵的边界框：\n\n```\nvar box: CGRect\
    \ {\n    get {\n        var boundingBox = self.calculateAccumulatedFrame()\n \
    \       if parent != nil {\n            boundingBox.origin = scene!.convertPoint(boundingBox.origin,\n\
    \                fromNode: parent!)\n        }\n        return boundingBox\n \
    \   }\n}\n```\n\n注意，你将边界框的原点转换到了场景坐标系。这确保了边界框的位置是以世界坐标表示的。在进行碰撞检测时，你想知道对象在世界中的位置——你并不关心它们在游戏对象层级中的局部位置。\n\
    \n## 处理角色-瓦片碰撞\n\n在 Tick Tick 游戏中，你主要需要检测角色与瓦片之间的碰撞。你可以在一个名为`handleCollisions`的方法中完成此操作，该方法在`Player`类的`updateDelta`方法中被调用。其思路是，你首先进行所有关于跳跃、下落和奔跑的计算（你在本章开头部分已经做了这些）。如果角色与瓦片之间发生碰撞，你就修正角色的位置，使其不再碰撞。在`handleCollisions`方法中，你遍历瓦片网格，并检查当前正在检查的瓦片是否与角色发生碰撞。\n\
    \n你不需要检查网格中的所有瓦片，只需检查那些靠近角色当前位置的瓦片。你可以按如下方式计算离角色位置最近的瓦片：\n\n```\nlet tiles = childNodeWithName(\"\
    //tileField\") as! TileField\nlet (x_floor, y_floor) = tiles.layout.gridLocation(self.position)\n\
    ```\n\n现在，你可以使用一个嵌套的`for`指令来查看角色周围的瓦片。为了应对快速的跳跃和下落，你在 y 方向上考虑了更多的瓦片。在嵌套的`for`指令中，你接着检查角色是否与瓦片发生碰撞。然而，只有当瓦片不是背景瓦片时，你才需要这样做。完成所有这些操作的代码如下：\n\
    \n```\nfor (var y = y_floor - 1; y <= y_floor + 2; ++y) {\n    for (var x = x_floor\
    \ - 1; x <= x_floor + 1; ++x) {\n        let tileType = tiles.getTileType(x, row:\
    \ y)\n        if tileType == .Background {\n            continue\n        }\n\
    \        let tileBounds = tiles.getTileBox(x, row: y)\n        if !tileBounds.intersects(box)\
    \ {\n            continue\n        }\n        ...\n    }\n}\n```\n\n如你所见，你没有直接访问`Tile`对象。原因在于，有时因为角色靠近屏幕边缘，`x`或`y`索引可能是负数。这里你可以看到使用添加到`TileField`类中的`getTileType`方法的好处。你不需要关心你是否真的在处理一个瓦片：只要知道它的类型和边界框，你就可以完成你的工作。\n\
    \n在嵌套的`for`指令中，你还看到了一个新关键字：`continue`。这个关键字可以在`for`或`while`指令中使用，以停止执行当前循环的迭代并继续下一次迭代。在这个例子中，如果瓦片的类型是`Background`，则其余指令不再执行，你继续递增`x`并开始新的迭代来检查下一个瓦片。结果就是，只有非`Background`类型的瓦片才会被考虑。`continue`关键字与`break`相关，`break`会完全停止整个循环。与`break`不同，`continue`仅停止当前的迭代。\n\
    \n然而，这段代码并不总是能正确工作。特别是当角色站在瓦片上时，计算边界框时的舍入误差可能导致算法认为角色没有站在地面上。角色的速度因此增加，结果角色可能会穿过瓦片掉落下去。为了弥补任何舍入误差，你将边界框的\
    \ y 原点减少 1：\n\n```\nlet tileBounds = tiles.getTileBox(x, row: y)\nvar bbox = box\n\
    bbox.origin.y -= 1\nif !tileBounds.intersects(bbox) {\n    continue\n}\n// 处理碰撞\n\
    ```\n"
- fmt: '# Dealing with the Collision


    Now that you can detect collisions between the character and the tiles in the
    game world, you have to determine what to do when a collision happens. There are
    a couple of possibilities. You could let the game crash (not good if you want
    to sell your game to many people), you could warn users that they shouldn’t collide
    with objects in the game (resulting in a lot of pop-up messages), or you could
    automatically correct the position of the character if it collides with an object.


    In order to correct the character’s position, you need to know how bad the collision
    was. For example, if the character walked into a wall on the right, you have to
    know how far to move the character to the left to undo the collision. This is
    also called the intersection depth. Let’s extend the `CGRect` type with a method
    called `calculateIntersectionDepth` that calculates the intersection depth in
    both x- and y-directions for two `CGRect` objects. In this example, these rectangles
    are the bounding box of the character and the bounding box of the tile it’s colliding
    with.


    The intersection depth can be calculated by first determining the minimum allowed
    distance between the centers of the rectangles such that there is no collision
    between the two rectangles:


    ```

    let minDistance = CGPoint(x: (self.size.width + rect.size.width)/2,

    y: (self.size.height + rect.size.height)/2)

    ```


    Then you calculate the real distance between the two rectangle centers:


    ```

    let distance = CGPoint(x: self.midX - rect.midX, y: self.midY - rect.midY)

    ```


    Now you can calculate the difference between the minimum allowed distance and
    the actual distance to get the intersection depth. If you look at the actual distance
    between the two centers, there are two possibilities for both dimensions (x and
    y): the distance is either negative or positive. For example, if the x distance
    is negative, this means rectangle `rect` is placed to the right of rectangle `this`
    (because `rect.midX > self.midX`). If rectangle `self` represents the character,
    this means you have to move the character to the left to correct this intersection.
    Therefore, you return the x intersection depth as a negative value, which can
    be calculated as `- minDistance.x - distance.x`. Why? Because there is a collision,
    the distance between the two rectangles is smaller than `minDistance`. And because
    `distance` is negative, the expression `-minDistance.x - distance.x` gives the
    difference between the two as a negative value. If `distance` is positive, the
    expression `minDistance.x - distance.x` gives the positive difference between
    the two. The same reasoning holds for the y distance. You can then calculate the
    depth as follows:


    ```

    if distance.x > 0 {

    depth.x = minDistance.x - distance.x

    } else {

    depth.x = -minDistance.x - distance.x

    }

    if distance.y > 0 {

    depth.y = minDistance.y - distance.y

    } else {

    depth.y = -minDistance.y - distance.y

    }

    ```


    Finally, you return the depth vector as the result of this method:


    ```

    return depth

    ```


    For the complete method, see the `Math.swift` file in the TickTick2 example belonging
    to this chapter. When you know that the character collides with the tile, you
    calculate the intersection depth using the method you just added to the `CGRect`
    type:


    ```

    let depth = box.calculateIntersectionDepth(tileBounds)

    ```


    Now that you’ve calculated the intersection depth, there are two ways to solve
    this collision: move the character in the x direction, or move the character in
    the y direction. Generally, you want to move the character the least possible
    distance to avoid unnatural motions or displacements. So, if the x depth is smaller
    than the y depth, you move the character in the x direction; otherwise you move
    it in the y direction. You can check this with an `if` instruction. When comparing
    the two depth dimensions, you have to take into account that they may be negative.
    You solve this by comparing the absolute values, using the `fabs` function:


    ```

    if fabs(depth.x) < fabs(depth.y) {

    // move character in the x direction

    }

    ```


    Do you always want to move the character if there is a collision with a tile?
    Well, that depends on the tile type. Remember that `TileType` is used to represent
    three possible tile types: `TileType.Background`, `TileType.Wall`, and `TileType.Platform`.
    If the tile the character is colliding with is a background tile, you definitely
    don’t want to move the character. Also, in the case of moving in the x direction,
    you want the character to be able to pass through platform tiles. Therefore, the
    only case where you want to move the character to correct a collision is when
    it’s colliding with a wall tile (`TileType.Wall`). In that case, you move the
    character by adding the x depth value to the character position:


    ```

    if tileType == .Wall {

    self.position.x += depth.x

    }

    ```


    If you want to correct the character position in the y direction, things become
    slightly more complicated. Because you’re dealing with movement in the y direction,
    this is also a good place to determine whether the character is on the ground.
    In the beginning of the `handleCollisions` method, you set the `isOnTheGround`
    property to `false`. So, the starting point is to assume that the character is
    not on the ground. In some cases, it’s on the ground, and you have to set the
    property to `true`. How can you check if the character is on the ground? If it
    isn’t on the ground, it must be falling. If it’s falling, then the previous y-position
    is smaller than the current position. In order to have access to the previous
    y-position, you store it in a property at the end of each call to the `handleCollisions`
    method:


    ```

    self.previousYPosition = self.position.y

    ```


    Now you can use the previous y-position to determine if the character is on the
    ground. First, you calculate the difference between the previous and the current
    y-positions:


    ```

    let ydifference = self.position.y - self.previousYPosition

    ```


    If the current global y-position minus this difference is equal to or larger than
    the top of the tile the character is colliding with and the tile is not a background
    tile, then the character was falling and has reached a tile. If so, you set the
    `isOnTheGround` property to `true` and the y velocity to 0 so the character stops
    falling. You also correct the current y-position so the character no longer intersects
    the tile:


    ```

    if box.minY - ydifference >= tileBounds.maxY && tileType != .Background {

    self.onTheGround = true

    self.velocity.y = 0

    self.position.y += depth.y

    }

    ```


    The only other case you still have to deal with is if the character is not falling
    down, but jumping and has reached a wall tile. In this case, you simply want to
    correct the character position so it no longer intersects with the wall tile,
    which is covered in the following `if` instruction:


    ```

    else if tileType == .Wall {

    self.position.y += depth.y

    }

    ```


    Figure [24-1](#A978-1-4842-0650-8_24_Chapter.html#Fig1) shows a screenshot of
    the TickTick2 example. I created a simple level here that you can use to test
    the physics engine. The level is smaller than the screen of most iDevices, so
    there is some black space surrounding the level. In [Chapter 26](#A978-1-4842-0650-8_26_Chapter.html),
    I’ll show you how to add sidescrolling to the game so that you can create larger
    levels and still be able to play them on devices with varying screen sizes.


    ![A978-1-4842-0650-8_24_Fig1_HTML.jpg](A978-1-4842-0650-8_24_Fig1_HTML.jpg)


    Figure 24-1. The TickTick2 example


    ## What You Have Learned


    In this chapter, you have learned the following:


    - How to constrain a character within the environment

    - How to simulate jumping and falling

    - How to deal with collisions in games'
  raw: '## Dealing with the Collision


    Now that you can detect collisions between the character and the tiles in the
    game world, you have to determine what to do when a collision happens. There are
    a couple of possibilities. You could let the game crash (not good if you want
    to sell your game to many people), you could warn users that they shouldn’t collide
    with objects in the game (resulting in a lot of pop-up messages), or you could
    automatically correct the position of the character if it collides with an object.


    In order to correct the character’s position, you need to know how bad the collision
    was. For example, if the character walked into a wall on the right, you have to
    know how far to move the character to the left to undo the collision. This is
    also called the intersection depth. Let’s extend the `CGRect` type with a method
    called `calculateIntersectionDepth` that calculates the intersection depth in
    both x- and y-directions for two `CGRect` objects. In this example, these rectangles
    are the bounding box of the character and the bounding box of the tile it’s colliding
    with.


    The intersection depth can be calculated by first determining the minimum allowed
    distance between the centers of the rectangles such that there is no collision
    between the two rectangles:


    `let minDistance = CGPoint(x: (self.size.width + rect.size.width)/2,`


    `y: (self.size.height + rect.size.height)/2)`


    Then you calculate the real distance between the two rectangle centers:


    `let distance = CGPoint(x: self.midX - rect.midX, y: self.midY - rect.midY)`


    Now you can calculate the difference between the minimum allowed distance and
    the actual distance to get the intersection depth. If you look at the actual distance
    between the two centers, there are two possibilities for both dimensions (x and
    y): the distance is either negative or positive. For example, if the x distance
    is negative, this means rectangle `rect` is placed to the right of rectangle `this`
    (because `rect.midX > self.midX`). If rectangle `self` represents the character,
    this means you have to move the character to the left to correct this intersection.
    Therefore, you return the x intersection depth as a negative value, which can
    be calculated as `- minDistance.x - distance.x`. Why? Because there is a collision,
    the distance between the two rectangles is smaller than `minDistance`. And because
    `distance` is negative, the expression `-minDistance.x - distance.x` gives the
    difference between the two as a negative value. If `distance` is positive, the
    expression `minDistance.x - distance.x` gives the positive difference between
    the two. The same reasoning holds for the y distance. You can then calculate the
    depth as follows:


    `if distance.x > 0 {`


    `depth.x = minDistance.x - distance.x`


    `} else {`


    `depth.x = -minDistance.x - distance.x`


    `}`


    `if distance.y > 0 {`


    `depth.y = minDistance.y - distance.y`


    `} else {`


    `depth.y = -minDistance.y - distance.y`


    `}`


    Finally, you return the depth vector as the result of this method:


    `return depth`


    For the complete method, see the `Math.swift` file in the TickTick2 example belonging
    to this chapter. When you know that the character collides with the tile, you
    calculate the intersection depth using the method you just added to the `CGRect`
    type:


    `let depth = box.calculateIntersectionDepth(tileBounds)`


    Now that you’ve calculated the intersection depth, there are two ways to solve
    this collision: move the character in the x direction, or move the character in
    the y direction. Generally, you want to move the character the least possible
    distance to avoid unnatural motions or displacements. So, if the x depth is smaller
    than the y depth, you move the character in the x direction; otherwise you move
    it in the y direction. You can check this with an `if` instruction. When comparing
    the two depth dimensions, you have to take into account that they may be negative.
    You solve this by comparing the absolute values, using the `fabs` function:


    `if fabs(depth.x) < fabs(depth.y) {`


    `// move character in the x direction`


    `}`


    Do you always want to move the character if there is a collision with a tile?
    Well, that depends on the tile type. Remember that `TileType` is used to represent
    three possible tile types: `TileType.Background`, `TileType.Wall`, and `TileType.Platform`.
    If the tile the character is colliding with is a background tile, you definitely
    don’t want to move the character. Also, in the case of moving in the x direction,
    you want the character to be able to pass through platform tiles. Therefore, the
    only case where you want to move the character to correct a collision is when
    it’s colliding with a wall tile (`TileType.Wall`). In that case, you move the
    character by adding the x depth value to the character position:


    `if tileType == .Wall {`


    `self.position.x += depth.x`


    `}`


    If you want to correct the character position in the y direction, things become
    slightly more complicated. Because you’re dealing with movement in the y direction,
    this is also a good place to determine whether the character is on the ground.
    In the beginning of the `handleCollisions` method, you set the `is OnTheGround`
    property to `false`. So, the starting point is to assume that the character is
    not on the ground. In some cases, it’s on the ground, and you have to set the
    property to `true`. How can you check if the character is on the ground? If it
    isn’t on the ground, it must be falling. If it’s falling, then the previous y-position
    is smaller than the current position. In order to have access to the previous
    y-position, you store it in a property at the end of each call to the `handleCollisions`
    method:


    `self.previousYPosition = self.position.y`


    Now you can use the previous y-position to determine if the character is on the
    ground. First, you calculate the difference between the previous and the current
    y-positions:


    `let ydifference = self.position.y - self.previousYPosition`


    If the current global y-position minus this difference is equal to or larger than
    the top of the tile the character is colliding with and the tile is not a background
    tile, then the character was falling and has reached a tile. If so, you set the
    `is OnTheGround` property to `true` and the y velocity to 0 so the character stops
    falling. You also correct the current y-position so the character no longer intersects
    the tile:


    `if box.minY - ydifference >= tileBounds.maxY && tileType != .Background {`


    `self.onTheGround = true`


    `self.velocity.y = 0`


    `self.position.y += depth.y`


    `}`


    The only other case you still have to deal with is if the character is not falling
    down, but jumping and has reached a wall tile. In this case, you simply want to
    correct the character position so it no longer intersects with the wall tile,
    which is covered in the following `if` instruction:


    `else if tileType == .Wall {`


    `self.position.y += depth.y`


    `}`


    Figure [24-1](#A978-1-4842-0650-8_24_Chapter.html#Fig1) shows a screenshot of
    the TickTick2 example. I created a simple level here that you can use to test
    the physics engine. The level is smaller than the screen of most iDevices, so
    there is some black space surrounding the level. In [Chapter 26](#A978-1-4842-0650-8_26_Chapter.html),
    I’ll show you how to add sidescrolling to the game so that you can create larger
    levels and still be able to play them on devices with varying screen sizes.


    ![A978-1-4842-0650-8_24_Fig1_HTML.jpg](A978-1-4842-0650-8_24_Fig1_HTML.jpg)


    Figure 24-1.


    The TickTick2 example


    ## What You Have Learned


    In this chapter, you have learned the following:


    *   How to constrain a character within the environment

    *   How to simulate jumping and falling

    *   How to deal with collisions in games'
