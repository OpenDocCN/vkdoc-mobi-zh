  trans: "\n# 关卡状态\n\n在上一章中，你已经了解了如何创建多个游戏状态，例如标题画面、关卡选择菜单和选项菜单。在本节中，你将添加多个关卡状态。每个关卡状态都是\
    \ `SKNode` 的子类，并向世界添加自己的游戏对象。`LevelState` 的初始化器需要一个 `FileReader` 实例（以便读取关卡数据），以及该关卡对应的编号。以下是\
    \ `LevelState` 初始化器的一部分：\n\n```\ninit(fileReader: FileReader, levelNr : Int) {\n\
    \    super.init()\n    self.levelNr = levelNr\n    self.name = \"level\\(levelNr)\"\
    \n    // 待办：根据关卡数据向此关卡填充游戏对象\n}\n```\n\n如你所见，每个关卡都被分配了一个唯一的名称。关卡 1 被称为“level1”，关卡\
    \ 2 被称为“level2”，依此类推。你还需要跟踪动物，例如企鹅、海豹和鲨鱼。你可以将它们存放在一个独立的节点中，并作为 `LevelState` 的一个属性，以便之后能快速查找动物。\n\
    \n```\nvar animals = SKNode()\n```\n\n现在，你可以开始创建游戏对象来填充游戏世界了。首先，向游戏世界添加一个背景图片：\n\
    \n```\nlet background = SKSpriteNode(imageNamed: \"spr_background_level\")\nbackground.zPosition\
    \ = Layer.Background\nself.addChild(background)\n```\n\n除此之外，还需要添加属于该关卡的各种按钮（退出、重试和提示）。请查看\
    \ PenguinPairs4 示例中的 `LevelState.swift` 文件以获取相应代码。\n\n添加背景和按钮之后，你可以开始读取存储在文本文件中的数据了。第一步是读取关卡标题、帮助信息、所需配对数量、关卡尺寸以及提示信息，然后将这些信息存储到局部变量中，以便之后用于构建游戏世界：\n\
    \n```\nlet title = fileReader.nextLine()\nlet help = fileReader.nextLine()\nlet\
    \ nrPairs = fileReader.nextLine().toInt()!\nlet sizeArr = fileReader.nextLine().componentsSeparatedByString(\"\
    \ \")\nlet width = sizeArr[0].toInt()!, height = sizeArr[1].toInt()!\nlet hintArr\
    \ = fileReader.nextLine().componentsSeparatedByString(\" \")\n```\n\n下一步是实际创建瓦片区域。为此，需要定义一个名为\
    \ `TileField` 的类，它是 `SKNode` 的子类，但增加了网格布局。此外，它还有一个名为 `getTileType` 的方法，用于返回网格中某个位置上的瓦片类型。稍后，这个方法将用于检查例如企鹅是否已掉落出游戏区域等情况。以下是完整的类定义：\n\
    \n```\nclass TileField : SKNode {\n    var layout: GridLayout\n    init(rows:\
    \ Int, columns: Int, cellWidth: Int, cellHeight: Int) {\n        layout = GridLayout(rows:\
    \ rows, columns: columns,\n            cellWidth: cellWidth, cellHeight: cellHeight)\n\
    \        super.init()\n        layout.target = self\n    }\n    required init?(coder\
    \ aDecoder: NSCoder) {\n        fatalError(\"init(coder:) has not been implemented\"\
    )\n    }\n    func getTileType(col: Int, row: Int) -> TileType {\n        if let\
    \ obj = layout.at(col, row: row) as? Tile {\n            return obj.type\n   \
    \     }\n        return .Background\n    }\n}\n```\n\n在 `LevelState` 的初始化器中，你需要创建\
    \ `TileField` 实例，并指定合适的高度、宽度和单元格尺寸：\n\n```\nlet tileDimension = 75\nvar tileField\
    \ = TileField(rows: height, columns: width,\n    cellWidth: tileDimension, cellHeight:\
    \ tileDimension)\ntileField.name = \"level\\(levelNr)_tileField\"\nself.addChild(tileField)\n\
    ```\n\n现在，你可以开始从文本文件中检索实际的关卡数据了。下一步是读取该关卡剩余的所有行，并将其存储到一个数组中，以便后续遍历该数组：\n\n```\n\
    var lines: [String] = []\nfor i in 0..<height {\n    var newLine = fileReader.nextLine()\n\
    \    while count(newLine) < width {\n        newLine += \" \"\n    }\n    lines.append(newLine)\n\
    }\n```\n\n如你所见，这里有一个额外的 `while` 循环，用于向刚读取的行中添加空格字符。这样做是为了避免因关卡行的宽度不一致而产生问题。考虑以下关卡定义：\n\
    \n```\n.\nr.r\n.\n```\n\n这是一个非常简单的关卡，包含两只企鹅。该关卡的宽度为三个单元格。然而，由于关卡的布局，在关卡定义的第一行和最后一行，该关卡只定义了两个单元格（先是空格，然后是点）。你可以要求你的关卡设计师在文本文件中添加足够的空格，以确保所有行的宽度一致，但这存在风险。关卡设计师可能会忘记这样做，而通过代码中的\
    \ `while` 循环可以轻松解决这个问题。这是一个很好的例子，说明为什么有时需要编写额外的代码来使系统更健壮。通过添加 `while` 循环，可以省去关卡设计师的很多麻烦；这使得设计关卡的过程更加稳定。\n\
    \n既然你已经将所有关卡数据存储在一个字符串数组中，接下来使用另一个 `for` 循环来遍历每一行，并创建所有瓦片：\n\n```\nfor i in 0..<height\
    \ {\n    var currLine = lines[height-1-i]\n    var j = 0\n    for c in currLine\
    \ {\n        j++\n        // 在第 i 行、第 j 列创建瓦片\n    }\n}\n```\n\n注意，你从数组的最后一行开始处理。这是因为网格是从底部向上填充的（沿着\
    \ y 轴方向）。根据当前处理的字符，你需要创建不同类型的游戏对象，并将它们添加到瓦片区域。你可以使用 `if` 指令来实现：\n\n```\nif c ==\
    \ \".\" {\n    // 创建一个空瓦片\n} else if c == \" \" {\n    // 创建一个背景瓦片\n} else if\
    \ c == \"r\" {\n    // 创建一个企鹅瓦片\n} else {\n    // 执行其他操作\n}\n```\n\n原则上，这段代码是可行的。但你需要反复编写条件判断。还有一种更简洁的写法。Swift\
    \ 提供了一种专门用于处理各种情况的关键字：`switch`。\n\n**注意**\n\n当以基于文本的格式定义关卡时，你需要决定每个字符代表哪种对象。这些决策将影响关卡设计师（他们需要在关卡数据文件中输入字符）和开发人员（他们需要编写代码来解释这些关卡数据）的工作。这表明了文档的重要性，即使在积极开发阶段也是如此。拥有一份“速查表”是很好的，这样在编写代码时，你就不必记住所有关于关卡设计的想法。如果你与设计师合作，速查表也很有用，可以确保你们双方的理解保持一致。\n"
- fmt: "## Using `switch` to Handle Alternatives\n\nThe `switch` instruction allows\
    \ you to specify alternatives, and the instructions that should be executed for\
    \ each alternative. For example, the previous `if` instruction with multiple alternatives\
    \ can be rewritten as a `switch` instruction as follows:\n\n```\nswitch c {\n\
    \    case \".\": // create an empty tile\n    case \" \": // create a background\
    \ tile\n    case \"r\": // create a penguin tile\n    default: // do something\
    \ else\n}\n```\n\nThe `switch` instruction has a few handy features that make\
    \ it very useful for handling different alternatives. Have a look at the following\
    \ code example:\n\n```\nif x == 1 {\n    one()\n} else if x == 2 {\n    two()\n\
    \    alsoTwo()\n} else if x == 3 || x == 4 {\n    threeOrFour()\n} else {\n  \
    \  more()\n}\n```\n\nYou can rewrite this with a `switch` instruction as follows:\n\
    \n```\nswitch x {\n    case 1:\n        one()\n    case 2:\n        two()\n  \
    \      alsoTwo()\n    case 3, 4:\n        threeOrFour()\n    default:\n      \
    \  more()\n}\n```\n\nWhen a `switch` instruction is executed, the expression after\
    \ the `switch` keyword is evaluated. Then the instructions after the word `case`\
    \ and the particular value are executed. If there is no case that corresponds\
    \ to the value, the instructions after the `default` keyword are executed. The\
    \ values behind the different cases need to be constant values (numbers, strings\
    \ between double quotes, or variables declared as constant). As you can see, a\
    \ case can represent multiple values; in the example, 3 and 4 fall under the same\
    \ case. For each case, multiple instructions may be executed (see for example,\
    \ case 2).\n\nAn important detail is that a `switch` instruction must be exhaustive,\
    \ in order words: all cases need to be handled. This is most easily solved by\
    \ using a `default` case, as you can see in the example above. The `default` case\
    \ is what happens when neither of the explicit cases in the `switch` instruction\
    \ occur. Figure [19-1](#A978-1-4842-0650-8_19_Chapter.html#Fig1) shows a diagram\
    \ of a `switch` instruction.\n\n![A978-1-4842-0650-8_19_Fig1_HTML.gif](A978-1-4842-0650-8_19_Fig1_HTML.gif)\n\
    \nFigure 19-1. Syntax diagram for the `switch` instruction\n\n## Loading Different\
    \ Kinds of Tiles\n\nYou can use the `switch` instruction to load all the different\
    \ tiles and game objects. For each character in the level data, you need to perform\
    \ a different task. For example, when the character “.” is read, you need to create\
    \ a normal playing-field tile. The following instructions do that:\n\n```\nlet\
    \ tileSprite = \"spr_field_\\((i + j) % 2)\"\nvar tile = Tile(imageNamed: tileSprite,\
    \ type: .Normal)\ntile.zPosition = Layer.Scene\ntileField.layout.add(tile)\n```\n\
    \nThe sprite used for the tile is alternatively `spr_field_0.png` or `spr_field_1.png`.\
    \ By switching the sprite using the formula `(i + j) % 2`, you get an alternating\
    \ checkerboard pattern, as you can see by running the PenguinPairs4 program belonging\
    \ to this chapter. Another example is adding a transparent background tile:\n\n\
    ```\nvar tile = Tile()\ntile.zPosition = Layer.Scene\ntileField.layout.add(tile)\n\
    ```\n\nWhen you have to place an animal, two things need to be done:\n\n- Place\
    \ a normal tile.\n- Place the animal.\n\nBecause animals sometimes need to move\
    \ around on the playing board and you need to interact with them, you create a\
    \ class called `Animal` to represent an animal such as a penguin, a seal, or a\
    \ shark. Later in this section, you see what this class looks like. In the `switch`\
    \ instruction, you then create a normal tile and a penguin, as follows:\n\n```\n\
    let tileSprite = \"spr_field_\\((i + j) % 2)\"\nvar tile = Tile(imageNamed: tileSprite,\
    \ type: .Normal)\ntile.zPosition = Layer.Scene\ntileField.layout.add(tile)\n\n\
    var p = Animal(type: String(c))\np.position = tile.position\np.initialPosition\
    \ = tile.position\np.zPosition = Layer.Scene1\nanimals.addChild(p)\n```\n\nThe\
    \ first step is creating a regular tile and adding it to the tile field. Then\
    \ you create the `Animal` instance. The `Animal` initializer gets the current\
    \ character as a parameter, so that you can load the correct sprite in the `Animal`\
    \ initializer. After creating the `Animal` object, you set its position to the\
    \ position of the tile you created so it's placed correctly. You also set a property\
    \ called `initialPosition` to that same value. You do this so that if the player\
    \ gets stuck and presses the Retry button, you know the original position of each\
    \ animal in the level.\n\nIn the `Animal` initializer, you pass the character\
    \ along as a parameter. There are a few different kinds of animals. Depending\
    \ on the kind of animal, you need to do different things in the initializer. One\
    \ particular type of animal is the boxed animal. This represents an animal locked\
    \ in a hole in the ice. Boxed animals cannot be moved by the player. In the level\
    \ description, a boxed animal is represented by an uppercase character. You check\
    \ whether the character is in uppercase, and store that information as a Boolean\
    \ value in the property `boxed`, belonging to the `Animal` class:\n\n```\nboxed\
    \ = type.uppercaseString == type\n```\n\nThen you write a few instructions to\
    \ convert the type of animal into the sprite name:\n\n```\nvar spriteName = \"\
    spr_animal_\\(type)\"\nif boxed && type != \"@\" {\n    spriteName = \"spr_animal_boxed_\\\
    (type.lowercaseString)\"\n}\n```\n\nIf the animal is in a box, or it is an empty\
    \ box (represented by the `\"@\"` character), you use another sprite name. To\
    \ complete the `Animal` class, you add a few convenient methods to check whether\
    \ you're dealing with a special case such as a multicolored penguin, an empty\
    \ box, a seal, or a shark. Multicolored penguins can pair with any other colored\
    \ penguin, an empty boxed in a level can be used to move a penguin into, a seal\
    \ can be moved around but never makes a pair, and a shark eats anything that comes\
    \ into its path. For the complete `Animal` class, see the example PenguinPairs4\
    \ program belonging to this chapter.\n\nNow that you've dealt with all these different\
    \ cases in the `switch` instruction, you can load each level. Have a look at the\
    \ `LevelState` class in the example to see the complete level-creation process.\
    \ Figure [19-2](#A978-1-4842-0650-8_19_Chapter.html#Fig2) shows a screenshot of\
    \ one of the levels after it's been loaded.\n\n![A978-1-4842-0650-8_19_Fig2_HTML.jpg](A978-1-4842-0650-8_19_Fig2_HTML.jpg)\n\
    \nFigure 19-2. One of the levels in the Penguin Pairs game"
  raw: '### Using `switch` to Handle Alternatives


    The `switch` instruction allows you to specify alternatives, and the instructions
    that should be executed for each alternative. For example, the previous `if` instruction
    with multiple alternatives can be rewritten as a `switch` instruction as follows:


    `switch c {`


        `case ".": // create an empty tile`


        `case " ": // create a background tile`


        `case "r": // create a penguin tile`


        `default: // do something else`


    `}`


    The `switch` instruction has a few handy features that make it very useful for
    handling different alternatives. Have a look at the following code example:


    `if x == 1 {`


        `one()`


    `} else if x == 2 {`


        `two()`


        `alsoTwo()`


    `} else if x == 3 || x == 4 {`


        `threeOrFour()`


    `} else {`


        `more()`


    `}`


    You can rewrite this with a `switch` instruction as follows:


    `switch x {`


        `case 1:`


            `one()`


        `case 2:`


            `two()`


            `alsoTwo()`


        `case 3, 4:`


            `threeOrFour()`


        `default:`


            `more()`


    `}`


    When a `switch` instruction is executed, the expression after the switch keyword
    is evaluated. Then the instructions after the word `case` and the particular value
    are executed. If there is no case that corresponds to the value, the instructions
    after the `default` keyword are executed. The values behind the different cases
    need to be constant values (numbers, strings between double quotes, or variables
    declared as constant). As you can see, a case can represent multiple values; in
    the example, 3 and 4 fall under the same case. For each case, multiple instructions
    may be executed (see for example, case 2).


    An important detail is that a `switch` instruction must be exhaustive, in order
    words: all cases need to be handled. This is most easily solved by using a default
    case, as you can see in the example above. The default case is what happens when
    neither of the explicit cases in the `switch` instruction occur. Figure [19-1](#A978-1-4842-0650-8_19_Chapter.html#Fig1)
    shows a diagram of a `switch` instruction.


    ![A978-1-4842-0650-8_19_Fig1_HTML.gif](A978-1-4842-0650-8_19_Fig1_HTML.gif)


    Figure 19-1.


    Syntax diagram for the `switch` instruction


    ### Loading Different Kinds of Tiles


    You can use the `switch` instruction to load all the different tiles and game
    objects. For each character in the level data, you need to perform a different
    task. For example, when the character “.” is read, you need to create a normal
    playing-field tile. The following instructions do that:


    `let tileSprite = "spr_field_\((i + j) % 2)"`


    `var tile = Tile(imageNamed: tileSprite, type: .Normal)`


    `tile.zPosition = Layer.Scene`


    `tileField.layout.add(tile)`


    The sprite used for the tile is alternatively `spr_field_0.png` or `spr_field_1.png`.
    By switching the sprite using the formula `(i + j) % 2`, you get an alternating
    checkerboard pattern, as you can see by running the PenguinPairs4 program belonging
    to this chapter. Another example is adding a transparent background tile:


    `var tile = Tile()`


    `tile.zPosition = Layer.Scene`


    `tileField.layout.add(tile)`


    When you have to place n animal, two things need to be done:


    *   Place a normal tile.

    *   Place the animal.


    Because animals sometimes need to move around on the playing board and you need
    to interact with them, you create a class called `Animal` to represent an animal
    such as a penguin, a seal, or a shark. Later in this section, you see what this
    class looks like. In the `switch` instruction, you then create a normal tile and
    a penguin, as follows:


    `let tileSprite = "spr_field_\((i + j) % 2)"`


    `var tile = Tile(imageNamed: tileSprite, type: .Normal)`


    `tile.zPosition = Layer.Scene`


    `tileField.layout.add(tile)`


    `var p = Animal(type: String(c))`


    `p.position = tile.position`


    `p.initialPosition = tile.position`


    `p.zPosition = Layer.Scene1`


    `animals.addChild(p)`


    The first step is creating a regular tile and adding it to the tile field. Then
    you create the `Animal` instance. The `Animal` initializer gets the current character
    as a parameter, so that you can load the correct sprite in the `Animal` initializer.
    After creating the `Animal` object, you set its position to the position of the
    tile you created so it’s placed correctly. You also set a property called `initialPosition`
    to that same value. You do this so that if the player gets stuck and presses the
    Retry button, you know the original position of each animal in the level.


    In the `Animal` initializer, you pass the character along as a parameter. There
    are a few different kinds of animals. Depending on the kind of animal, you need
    to do different things in the initializer. One particular type of animal is the
    boxed animal. This represents an animal locked in a hole in the ice. Boxed animals
    cannot be moved by the player. In the level description, a boxed animal is represented
    by an uppercase character. You check whether the character is in uppercase, and
    store that information as a Boolean value in the property `boxed`, belonging to
    the `Animal` class:


    `boxed = type.uppercaseString == type`


    Then you write a few instructions to convert the type of animal into the sprite
    name:


    `var spriteName = "spr_animal_\(type)"`


    `if boxed && type != "@" {`


    `spriteName = "spr_animal_boxed_\(type.lowercaseString)"`


    `}`


    If the animal is in a box, or it is an empty box (represented by the “@” character),
    you use another sprite name. To complete the `Animal` class, you add a few convenient
    methods to check whether you’re dealing with a special case such as a multicolored
    penguin, an empty box, a seal, or a shark. Multicolored penguins can pair with
    any other colored penguin, an empty boxed in a level can be used to move a penguin
    into, a seal can be moved around but never makes a pair, and a shark eats anything
    that comes into its path. For the complete `Animal` class, see the example PenguinPairs4
    program belonging to this chapter.


    Now that you’ve dealt with all these different cases in the `switch` instruction,
    you can load each level. Have a look at the `LevelState` class in the example
    to see the complete level-creation process. Figure [19-2](#A978-1-4842-0650-8_19_Chapter.html#Fig2)
    shows a screenshot of one of the levels after it’s been loaded.


    ![A978-1-4842-0650-8_19_Fig2_HTML.jpg](A978-1-4842-0650-8_19_Fig2_HTML.jpg)


    Figure 19-2.


    One of the levels in the Penguin Pairs game'
  trans: "\n## 使用 `switch` 处理多种选择\n\n`switch` 指令允许你指定多种备选方案，以及每个方案应执行的指令。例如，之前包含多个备选方案的\
    \ `if` 指令可以改写为如下的 `switch` 指令：\n\n```\nswitch c {\n    case \".\": // 创建一个空瓦片\n\
    \    case \" \": // 创建一个背景瓦片\n    case \"r\": // 创建一个企鹅瓦片\n    default: // 执行其他操作\n\
    }\n```\n\n`switch` 指令有几个便捷特性，使其在处理不同备选方案时非常有用。请看下面的代码示例：\n\n```\nif x == 1 {\n\
    \    one()\n} else if x == 2 {\n    two()\n    alsoTwo()\n} else if x == 3 ||\
    \ x == 4 {\n    threeOrFour()\n} else {\n    more()\n}\n```\n\n你可以用 `switch` 指令将其重写如下：\n\
    \n```\nswitch x {\n    case 1:\n        one()\n    case 2:\n        two()\n  \
    \      alsoTwo()\n    case 3, 4:\n        threeOrFour()\n    default:\n      \
    \  more()\n}\n```\n\n当执行 `switch` 指令时，会计算 `switch` 关键字后的表达式。然后执行 `case` 关键字后与该特定值对应的指令。如果没有与值匹配的分支，则执行\
    \ `default` 关键字后的指令。不同 `case` 后的值必须是常量值（数字、双引号之间的字符串，或声明为常量的变量）。如你所见，一个 `case`\
    \ 可以代表多个值；在示例中，3 和 4 属于同一个 `case`。对于每个 `case`，可以执行多条指令（例如 `case 2`）。\n\n一个重要细节是，`switch`\
    \ 指令必须是穷尽的，换句话说：所有情况都必须被处理。最简单的解决方法是使用 `default` 分支，如上面的示例所示。当 `switch` 指令中所有显式分支都不匹配时，就会执行\
    \ `default` 分支的代码。图 19-1 展示了 `switch` 指令的示意图。\n\n![A978-1-4842-0650-8_19_Fig1_HTML.gif](img/A978-1-4842-0650-8_19_Fig1_HTML.gif)\n\
    \n图 19-1. `switch` 指令的语法图\n\n## 加载不同类型的瓦片\n\n你可以使用 `switch` 指令来加载所有不同的瓦片和游戏对象。对于关卡数据中的每个字符，你需要执行不同的任务。例如，当读取字符“.”时，你需要创建一个普通的游戏场地瓦片。以下指令实现了这一点：\n\
    \n```\nlet tileSprite = \"spr_field_\\((i + j) % 2)\"\nvar tile = Tile(imageNamed:\
    \ tileSprite, type: .Normal)\ntile.zPosition = Layer.Scene\ntileField.layout.add(tile)\n\
    ```\n\n瓦片使用的精灵交替为 `spr_field_0.png` 或 `spr_field_1.png`。通过使用公式 `(i + j) % 2` 切换精灵，你可以获得交替的棋盘格图案，如运行本章附带的\
    \ PenguinPairs4 程序所示。另一个例子是添加一个透明背景瓦片：\n\n```\nvar tile = Tile()\ntile.zPosition\
    \ = Layer.Scene\ntileField.layout.add(tile)\n```\n\n当你需要放置一个动物时，需要完成两件事：\n\n-\
    \ 放置一个普通瓦片。\n- 放置动物。\n\n由于动物有时需要在棋盘上移动，并且你需要与它们交互，所以你创建了一个名为 `Animal` 的类来表示动物，例如企鹅、海豹或鲨鱼。在本节稍后部分，你将看到这个类的具体样子。在\
    \ `switch` 指令中，你按如下方式创建一个普通瓦片和一只企鹅：\n\n```\nlet tileSprite = \"spr_field_\\((i\
    \ + j) % 2)\"\nvar tile = Tile(imageNamed: tileSprite, type: .Normal)\ntile.zPosition\
    \ = Layer.Scene\ntileField.layout.add(tile)\n\nvar p = Animal(type: String(c))\n\
    p.position = tile.position\np.initialPosition = tile.position\np.zPosition = Layer.Scene1\n\
    animals.addChild(p)\n```\n\n第一步是创建一个普通瓦片并将其添加到瓦片字段中。然后创建 `Animal` 实例。`Animal`\
    \ 的初始化器将当前字符作为参数，以便你可以在 `Animal` 初始化器中加载正确的精灵。创建 `Animal` 对象后，你将其位置设置为你创建的瓦片位置，以便正确放置。你还将一个名为\
    \ `initialPosition` 的属性设置为相同的值。这样做是为了如果玩家卡住并按下重试按钮，你可以知道关卡中每个动物的原始位置。\n\n在 `Animal`\
    \ 初始化器中，你将字符作为参数传递。有几种不同类型的动物。根据动物类型，你需要在初始化器中执行不同的操作。其中一种特殊类型的动物是盒装动物。这代表一只被困在冰洞中的动物。玩家无法移动盒装动物。在关卡描述中，盒装动物由大写字符表示。你检查字符是否为大写，并将该信息作为布尔值存储在\
    \ `Animal` 类的 `boxed` 属性中：\n\n```\nboxed = type.uppercaseString == type\n```\n\
    \n然后你编写几条指令将动物类型转换为精灵名称：\n\n```\nvar spriteName = \"spr_animal_\\(type)\"\nif\
    \ boxed && type != \"@\" {\n    spriteName = \"spr_animal_boxed_\\(type.lowercaseString)\"\
    \n}\n```\n\n如果动物在盒子中，或者它是一个空盒子（由 `\"@\"` 字符表示），你将使用另一个精灵名称。为了完成 `Animal` 类，你添加了几个便捷方法来检查是否在处理特殊情况，例如彩色企鹅、空盒子、海豹或鲨鱼。彩色企鹅可以与任何其他颜色的企鹅配对，关卡中的空盒子可用于将企鹅移入，海豹可以四处移动但永远不会成对，鲨鱼则会吞噬任何挡路的东西。完整的\
    \ `Animal` 类，请参阅本章附带的 PenguinPairs4 示例程序。\n\n现在，你已在 `switch` 指令中处理了所有这些不同情况，你可以加载每个关卡了。请查看示例中的\
    \ `LevelState` 类以了解完整的关卡创建过程。图 19-2 显示了其中一个关卡加载后的屏幕截图。\n\n![A978-1-4842-0650-8_19_Fig2_HTML.jpg](img/A978-1-4842-0650-8_19_Fig2_HTML.jpg)\n\
    \n图 19-2. 企鹅配对游戏中的其中一个关卡\n"
- fmt: "# Maintaining the Player’s Progress\n\nTo complete this chapter, this section\
    \ shows you a nice way to keep track of the player’s progress over different playing\
    \ sessions. You want the game to remember where the player was when they last\
    \ played the game. There are several ways to do this. One way is to let the player\
    \ do this job and simply open all the levels to the player by default. This is\
    \ a solution, but it doesn’t really motivate the player to solve each level in\
    \ sequence. Another way is to use a text file in which you store the player status.\
    \ The third option is to use so-called user defaults. This is a feature that allows\
    \ you to keep track of settings and preferences of players of your game with very\
    \ little effort. You retrieve the current set of user defaults by writing a single\
    \ line of code:\n\n```\nvar defaults = NSUserDefaults.standardUserDefaults()\n\
    ```\n\nThe `defaults` variable acts as a kind of dictionary, in which you can\
    \ store key-value pairs that retain their value over different playing sessions.\
    \ For example, you can store whether the player wants to see hints in Penguin\
    \ Pairs by storing a Boolean value in the `defaults` variable:\n\n```\ndefaults.setBool(true,\
    \ forKey: \"hints\")\n```\n\nSimilarly, reading data from the user defaults is\
    \ also very straightforward:\n\n```\nlet showHints = defaults.boolForKey(\"hints\"\
    )\n```\n\nWhen a player starts the Penguin Pairs game for the first time, of course\
    \ there is no default information present yet pertaining to the game. In that\
    \ case, you need to fill the `defaults` variable with the “default defaults.”\
    \ In the case of Penguin Pairs, this means hints are on, background music is played\
    \ at a volume of 0.5, and all levels are locked, except for the first level, which\
    \ has the status “unsolved.” This data can be stored again in a text file, and\
    \ read the first time a player starts the Penguin Pairs app.\n\nIn order to do\
    \ something slightly different, you are not going to read this data from a regular\
    \ text file, but from a Property List file (`plist`). This is a very handy text-based\
    \ file format. Behind the scenes, it uses XML to structure text, but the Xcode\
    \ environment has a very useful tool that allows you to edit these files very\
    \ easily. If you click the `defaults.plist` file in the PenguinPairs4 project,\
    \ you will see an editor screen (see Figure [19-3](#A978-1-4842-0650-8_19_Chapter.html#Fig3)).\
    \ In this editor screen, you can change the content of the defaults file. You\
    \ can add items to the list, or remove them.\n\n![A978-1-4842-0650-8_19_Fig3_HTML.jpg](A978-1-4842-0650-8_19_Fig3_HTML.jpg)\n\
    \nFigure 19-3. A screenshot of the property list editing environment in Xcode\n\
    \nReading data from a property list file is quite straightforward. You can read\
    \ the file and store its content in a dictionary with only a few lines of code:\n\
    \n```\nvar filePath = NSBundle.mainBundle().pathForResource(\"defaults\", ofType:\"\
    plist\")\nlet defaultPreferences = NSDictionary(contentsOfFile: filePath!)!\n\
    ```\n\nNow you can go through all the items in the dictionary and add them to\
    \ the user defaults, using a `for` loop as follows:\n\n```\nfor (key, value) in\
    \ defaultPreferences {\n    defaults.setObject(value, forKey: key as! String)\n\
    }\n```\n\nIn order to deal with the user defaults neatly, the PenguinPairs4 example\
    \ has a class `DefaultsManager`. This class implements the singleton design pattern,\
    \ just like the game state manager. It allows you to easily read and write the\
    \ user preferences. For example, in the options menu state, the user preference\
    \ for the background music volume is retrieved and the slider is set to the corresponding\
    \ value:\n\n```\nmusicSlider.value = CGFloat(DefaultsManager.instance.musicVolume)\n\
    ```\n\nTake a look at the PenguinPairs4 example yourself to see how it deals with\
    \ default values and preferences.\n\n## The Curse of Saved Games\n\nMost games\
    \ contain a mechanism that lets the player save their progress. This is normally\
    \ used in one of three ways: to continue playing later, to return to a previous\
    \ save point when the player fails later in the game, or to exploit alternative\
    \ strategies or storylines. These possibilities all sound reasonable, but they\
    \ also introduce problems; when you design a game, you must carefully consider\
    \ when (and how) to allow the player to save and load the game state.\n\nFor example,\
    \ in older first-person shooters, all enemies were at fixed locations in the game\
    \ world. A common strategy among players became to save a game, run into a room\
    \ to see where the enemies were (which led to instant death), load the saved game,\
    \ and, armed with the information about the location of the enemies, carefully\
    \ clean out the room. This made the game a lot easier to play, but it was definitely\
    \ not the intention of the creators. This can be partially remedied by making\
    \ it difficult to save a game or to load a saved game. Other games only allow\
    \ saves at particular save points. Some even make reaching a save point part of\
    \ the challenge. But this can lead to frustration because the player may have\
    \ to replay sections of the game over and over if there is one very difficult\
    \ spot. The most interesting games are the ones where you never have to return\
    \ to save points because you never really fail, but this is extremely difficult\
    \ to design.\n\nSo think carefully about your saving mechanism. When will you\
    \ allow saves? How many different saves will you allow? How does saving work in\
    \ the game? How does the player load a saved game? Does it cost the player something\
    \ to save or load a game? All of these decisions will influence the gameplay and\
    \ player satisfaction.\n\n## What You Have Learned\n\nIn this chapter, you have\
    \ learned the following:\n\n- How to create a tile-based game world by reading\
    \ data from a text file\n- How to use the `switch` instruction to handle different\
    \ cases\n- How to retrieve and store level-status data with user defaults\n\n\
    # 20. Interaction Between Game Objects\n\nElectronic supplementary material The\
    \ online version of this chapter (doi:[10.1007/978-1-4842-0650-8_20](http://dx.doi.org/10.1007/978-1-4842-0650-8_20))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    In this chapter, you are going to program the main gameplay for the Penguin Pairs\
    \ game. You will learn how to move penguins around on the board and what to do\
    \ when a penguin collides with another game object, such as a shark or another\
    \ penguin.\n\n## Defining Operators\n\nSince you will be dealing with moving and\
    \ colliding penguins, you will be doing quite a lot of calculations with two-dimensional\
    \ points and vectors (represented by `CGPoint` instances). At the moment, computing\
    \ things with these points is a bit of a hassle. For example, in the `LevelState`\
    \ class, this is how you have to position the Quit button:\n\n```\nquitButton.position\
    \ = GameScreen.instance.topRight\nquitButton.position.x -= quitButton.center.x\
    \ + 10\nquitButton.position.y -= quitButton.center.y + 10\n```\n\nIt would be\
    \ much easier if you could do something like this:\n\n```\nquitButton.position\
    \ = GameScreen.instance.topRight – quitButton.center –\n    CGPoint(x: 10, y:\
    \ 10)\n```\n\nUnfortunately, it’s not defined in Swift what the minus operator\
    \ does with two `CGPoint` instances. Fortunately, it is very easy to define what\
    \ the minus operator should do because Swift simply lets you write a function\
    \ to define that behavior:\n\n```\nfunc - (left: CGPoint, right: CGPoint) -> CGPoint\
    \ {\n    return CGPoint(x: left.x - right.x, y: left.y - right.y)\n}\n```\n\n\
    As you can see, the minus operator creates a new `CGPoint` instance and returns\
    \ it. Now that this function is defined, you can subtract `CGPoint` instances.\
    \ Easy, isn’t it? You can also define other operators, such as the `==` operator,\
    \ which compares two `CGPoint` instances and returns `true` if they are the same\
    \ point:\n\n```\nfunc == (left: CGPoint, right: CGPoint) -> Bool {\n    return\
    \ (left.x == right.x) && (left.y == right.y)\n}\n```\n\nTake a look at the `Math.swift`\
    \ file to see a bunch of these operators defined in order to make computing things\
    \ with `CGPoint` instances a lot easier."
  raw: '## Maintaining the Player’s Progress


    To complete this chapter, this section shows you a nice way to keep track of the
    player’s progress over different playing sessions. You want the game to remember
    where the player was when they last played the game. There are several ways to
    do this. One way is to let the player do this job and simply open all the levels
    to the player by default. This is a solution, but it doesn’t really motivate the
    player to solve each level in sequence. Another way is to use a text file in which
    you store the player status. The third option is to use so-called user defaults.
    This is a feature that allows you to keep track of settings and preferences of
    players of your game with very little effort. You retrieve the current set of
    user defaults by writing a single line of code:


    `var defaults = NSUserDefaults.standardUserDefaults()`


    The `defaults` variable acts as a kind of dictionary, in which you can store key-value
    pairs that retain their value over different playing sessions. For example, you
    can store whether the player wants to see hints in Penguin Pairs by storing a
    Boolean value in the `defaults` variable:


    `defaults.setBool(true, forKey: "hints")`


    Similarly, reading data from the user defaults is also very straightforward:


    `let showHints = defaults.boolForKey("hints")`


    When a player starts the Penguin Pairs game for the first time, of course there
    is no default information present yet pertaining to the game. In that case, you
    need to fill the defaults variable with the “default defaults.” In the case of
    Penguin Pairs, this means hints are on, background music is played at a volume
    of 0.5, and all levels are locked, except for the first level, which has the status
    “unsolved.” This data can be stored again in a text file, and read the first time
    a player starts the Penguin Pairs app.


    In order to do something slightly different, you are not going to read this data
    from a regular text file, but from a Property List file (plist). This is a very
    handy text-based file format. Behind the scenes, it uses XML to structure text,
    but the Xcode environment has a very useful tool that allows you to edit these
    files very easily. If you click the `defaults.plist` file in the PenguinPairs4
    project, you will see an editor screen (see Figure [19-3](#A978-1-4842-0650-8_19_Chapter.html#Fig3)).
    In this editor screen, you can change the content of the defaults file. You can
    add items to the list, or remove them.


    ![A978-1-4842-0650-8_19_Fig3_HTML.jpg](A978-1-4842-0650-8_19_Fig3_HTML.jpg)


    Figure 19-3.


    A screenshot of the property list editing environment in Xcode


    Reading data from a property list file is quite straightforward. You can read
    the file and store its content in a dictionary with only a few lines of code:


    `var filePath = NSBundle.mainBundle().pathForResource("defaults", ofType:"plist")`


    `let defaultPreferences = NSDictionary(contentsOfFile: filePath!)!`


    Now you can go through all the items in the dictionary and add them to the user
    defaults, using a `for` loop as follows:


    `for (key, value) in defaultPreferences {`


    `defaults.setObject(value, forKey: key as! String)`


    `}`


    In order to deal with the user defaults neatly, the PenguinPairs4 example has
    a class `DefaultsManager`. This class implements the singleton design pattern,
    just like the game state manager. It allows you to easily read and write the user
    preferences. For example, in the options menu state, the user preference for the
    background music volume is retrieved and the slider is set to the corresponding
    value:


    `musicSlider.value = CGFloat(DefaultsManager.instance.musicVolume)`


    Take a look at the PenguinPairs4 example yourself to see how it deals with default
    values and preferences.


    The Curse of Saved Games


    Most games contain a mechanism that lets the player save their progress. This
    is normally used in one of three ways: to continue playing later, to return to
    a previous save point when the player fails later in the game, or to exploit alternative
    strategies or storylines. These possibilities all sound reasonable, but they also
    introduce problems; when you design a game, you must carefully consider when (and
    how) to allow the player to save and load the game state.


    For example, in older first-person shooters, all enemies were at fixed locations
    in the game world. A common strategy among players became to save a game, run
    into a room to see where the enemies were (which led to instant death), load the
    saved game, and, armed with the information about the location of the enemies,
    carefully clean out the room. This made the game a lot easier to play, but it
    was definitely not the intention of the creators. This can be partially remedied
    by making it difficult to save a game or to load a saved game. Other games only
    allow saves at particular save points. Some even make reaching a save point part
    of the challenge. But this can lead to frustration because the player may have
    to replay sections of the game over and over if there is one very difficult spot.
    The most interesting games are the ones where you never have to return to save
    points because you never really fail, but this is extremely difficult to design.


    So think carefully about your saving mechanism. When will you allow saves? How
    many different saves will you allow? How does saving work in the game? How does
    the player load a saved game? Does it cost the player something to save or load
    a game? All of these decisions will influence the gameplay and player satisfaction.


    ## What You Have Learned


    In this chapter, you have learned the following:


    *   How to create a tile-based game world by reading data from a text file

    *   How to use the `switch` instruction to handle different cases

    *   How to retrieve and store level-status data with user defaults


    # 20. Interaction Between Game Objects


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​20](http://dx.doi.org/10.1007/978-1-4842-0650-8_20))
    contains supplementary material, which is available to authorized users.


    In this chapter, you are going to program the main gameplay for the Penguin Pairs
    game. You will learn how to move penguins around on the board and what to do when
    a penguin collides with another game object, such as a shark or another penguin.


    ## Defining Operators


    Since you will be dealing with moving and colliding penguins, you will be doing
    quite a lot of calculations with two-dimensional points and vectors (represented
    by `CGPoint` instances). At the moment, computing things with these points is
    a bit of a hassle. For example, in the `LevelState` class, this is how you have
    to position the Quit button:


    `quitButton.position = GameScreen.instance.topRight`


    `quitButton.position.x -= quitButton.center.x + 10`


    `quitButton.position.y -= quitButton.center.y + 10`


    It would be much easier if you could do something like this:


    `quitButton.position = GameScreen.instance.topRight – quitButton.center –`


        `CGPoint(x: 10, y: 10)`


    Unfortunately, it’s not defined in Swift what the minus operator does with two
    `CGPoint` instances. Fortunately, it is very easy to define what the minus operator
    should do because Swift simply lets you write a function to define that behavior:


    `func - (left: CGPoint, right: CGPoint) -> CGPoint {`


        `return CGPoint(x: left.x - right.x, y: left.y - right.y)`


    `}`


    As you can see, the minus operator creates a new `CGPoint` instance and returns
    it. Now that this function is defined, you can subtract `CGPoint` instances. Easy,
    isn’t it? You can also define other operators, such as the `==` operator, which
    compares two `CGPoint` instances and returns `true` if they are the same point:


    `func == (left: CGPoint, right: CGPoint) -> Bool {`


        `return (left.x == right.x) && (left.y == right.y)`


    `}`


    Take a look at the `Math.swift` file to see a bunch of these operators defined
    in order to make computing things with `CGPoint` instances a lot easier.'
  trans: "\n# 维护玩家游戏进度\n\n为了完成本章内容，本节将向您展示一种跟踪玩家在不同游戏会话中进展的优秀方法。您希望游戏能够记住玩家上次游玩时的位置。实现这一目标有多种方式。一种是让玩家自行处理，直接默认解锁所有关卡。这虽然是一种解决方案，但无法真正激励玩家按顺序逐个通关。另一种方式是使用文本文件存储玩家状态。第三种方案是采用所谓的用户默认设置。这项功能能让您毫不费力地追踪游戏玩家的设置和偏好。只需编写一行代码，即可获取当前的用户默认设置：\n\
    \n```\nvar defaults = NSUserDefaults.standardUserDefaults()\n```\n\n`defaults`\
    \ 变量的作用类似于字典，您可以在其中存储键值对，这些键值对能在不同游戏会话中保持其值不变。例如，您可以通过在 `defaults` 变量中存储一个布尔值，来记录玩家是否希望在《企鹅配对》游戏中查看提示：\n\
    \n```\ndefaults.setBool(true, forKey: \"hints\")\n```\n\n同样地，从用户默认设置中读取数据也非常直接：\n\
    \n```\nlet showHints = defaults.boolForKey(\"hints\")\n```\n\n当玩家首次启动《企鹅配对》游戏时，自然还没有与该游戏相关的默认信息。在这种情况下，您需要用“默认的默认值”来填充\
    \ `defaults` 变量。对于《企鹅配对》而言，这意味着提示功能开启，背景音乐音量设为 0.5，并且除第一关状态为“未解决”外，所有关卡均处于锁定状态。这些数据可以再次存储在文本文件中，并在玩家首次启动《企鹅配对》应用时读取。\n\
    \n为了采用略有不同的方法，您将不会从普通文本文件中读取这些数据，而是从属性列表文件（`plist`）中读取。这是一种非常方便的基于文本的文件格式。它在底层使用\
    \ XML 来组织文本结构，但 Xcode 环境提供了一个非常有用的工具，让您能非常轻松地编辑这些文件。如果您点击 PenguinPairs4 项目中的 `defaults.plist`\
    \ 文件，将会看到一个编辑器界面（见图 19-3）。在此编辑界面中，您可以更改默认文件的内容。您可以向列表中添加或移除项目。\n\n![A978-1-4842-0650-8_19_Fig3_HTML.jpg](img/A978-1-4842-0650-8_19_Fig3_HTML.jpg)\n\
    \n图 19-3. Xcode 中属性列表编辑界面的截图\n\n从属性列表文件中读取数据非常直接。只需几行代码，您就可以读取该文件并将其内容存储到字典中：\n\
    \n```\nvar filePath = NSBundle.mainBundle().pathForResource(\"defaults\", ofType:\"\
    plist\")\nlet defaultPreferences = NSDictionary(contentsOfFile: filePath!)!\n\
    ```\n\n现在，您可以使用如下 `for` 循环遍历字典中的所有项目，并将它们添加到用户默认设置中：\n\n```\nfor (key, value)\
    \ in defaultPreferences {\n    defaults.setObject(value, forKey: key as! String)\n\
    }\n```\n\n为了整洁地处理用户默认设置，PenguinPairs4 示例中包含了一个 `DefaultsManager` 类。该类与游戏状态管理器一样，实现了单例设计模式。它允许您轻松地读写用户偏好设置。例如，在选项菜单状态下，会检索用户对背景音乐音量的偏好，并将滑块设置为相应的值：\n\
    \n```\nmusicSlider.value = CGFloat(DefaultsManager.instance.musicVolume)\n```\n\
    \n请自行查看 PenguinPairs4 示例，了解它如何处理默认值和偏好设置。\n\n## 存档游戏的诅咒\n\n大多数游戏都包含一种让玩家保存进度的机制。这通常有三种用途：稍后继续游戏、在游戏后期失败时返回到之前的存档点，或者尝试不同的策略或故事线。这些可能性听起来都合情合理，但也引入了问题；在设计游戏时，您必须仔细考虑何时（以及如何）允许玩家保存和加载游戏状态。\n\
    \n例如，在早期的第一人称射击游戏中，所有敌人都位于游戏世界中固定的位置。玩家们形成了一种常见策略：先保存游戏，冲进一个房间查看敌人的位置（这通常会导致立即死亡），然后加载已保存的游戏，并利用获取的敌人位置信息，小心翼翼地清理房间。这大大降低了游戏难度，但这绝非创作者的本意。通过提高保存或加载游戏的难度，可以部分地弥补这个问题。其他游戏只允许在特定的存档点进行保存。有些甚至将到达存档点本身作为挑战的一部分。但这可能会导致挫败感，因为如果有一个非常困难的地点，玩家可能不得不反复重玩游戏的某些部分。最有趣的游戏是那些你永远不必返回存档点的游戏，因为你永远不会真正失败，但这在设计上极为困难。\n\
    \n因此，请仔细考虑您的存档机制。您会在何时允许保存？您会允许多少个不同的存档？游戏中保存是如何工作的？玩家如何加载已保存的游戏？保存或加载游戏是否需要玩家付出代价？所有这些决策都会影响游戏玩法和玩家满意度。\n\
    \n## 本章所学\n\n在本章中，您学习了以下内容：\n\n- 如何通过从文本文件读取数据来创建基于瓦片的游戏世界\n- 如何使用 `switch` 指令处理不同的情况\n\
    - 如何使用用户默认设置检索和存储关卡状态数据\n\n# 20. 游戏对象之间的交互\n\n电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-0650-8_20](http://dx.doi.org/10.1007/978-1-4842-0650-8_20))\
    \ 包含补充材料，仅供授权用户使用。\n\n在本章中，您将为《企鹅配对》游戏编写主要的游戏逻辑。您将学习如何在棋盘上移动企鹅，以及当企鹅与另一个游戏对象（如鲨鱼或其他企鹅）发生碰撞时该如何处理。\n\
    \n## 定义运算符\n\n由于您将处理移动和碰撞的企鹅，因此会进行大量涉及二维点和向量（由 `CGPoint` 实例表示）的计算。目前，使用这些点进行计算有点麻烦。例如，在\
    \ `LevelState` 类中，您必须这样定位退出按钮：\n\n```\nquitButton.position = GameScreen.instance.topRight\n\
    quitButton.position.x -= quitButton.center.x + 10\nquitButton.position.y -= quitButton.center.y\
    \ + 10\n```\n\n如果能像这样操作就简单多了：\n\n```\nquitButton.position = GameScreen.instance.topRight\
    \ – quitButton.center –\n    CGPoint(x: 10, y: 10)\n```\n\n遗憾的是，Swift 并没有定义减法运算符对两个\
    \ `CGPoint` 实例的作用。幸运的是，定义减法运算符应该做什么非常容易，因为 Swift 允许您通过编写一个函数来定义该行为：\n\n```\nfunc\
    \ - (left: CGPoint, right: CGPoint) -> CGPoint {\n    return CGPoint(x: left.x\
    \ - right.x, y: left.y - right.y)\n}\n```\n\n如您所见，减法运算符创建了一个新的 `CGPoint` 实例并返回它。一旦定义了此函数，您就可以对\
    \ `CGPoint` 实例进行减法运算了。很简单，不是吗？您还可以定义其他运算符，例如 `==` 运算符，它比较两个 `CGPoint` 实例，如果它们是同一个点则返回\
    \ `true`：\n\n```\nfunc == (left: CGPoint, right: CGPoint) -> Bool {\n    return\
    \ (left.x == right.x) && (left.y == right.y)\n}\n```\n\n请查看 `Math.swift` 文件，了解其中定义的一系列此类运算符，这些定义使得使用\
    \ `CGPoint` 实例进行计算变得更加容易。\n"
- fmt: "# Selecting Penguins\n\nBefore you can move penguins around, you need to be\
    \ able to select a penguin. When you tap an animal such as a penguin or a seal,\
    \ four arrows should appear that allow you to control the direction in which the\
    \ animal should move. To display these arrows and handle the input, you can add\
    \ a class called `AnimalSelector`. The animal selector contains four arrows, and\
    \ it inherits from the `SKNode` class. When you tap on a penguin, the animal selector\
    \ appears, consisting of four arrows, each pointing in a different direction (see\
    \ Figure 20-1).\n\n![A978-1-4842-0650-8_20_Fig1_HTML.jpg](A978-1-4842-0650-8_20_Fig1_HTML.jpg)\n\
    \n*Figure 20-1.* The animal selector arrows that appear around a penguin after\
    \ tapping it\n\nEach of the four arrows is an instance of the `Button` class.\
    \ The initializer of the `AnimalSelector` class expects a `spacing` parameter\
    \ that controls how far away each arrow is placed from the location of the animal\
    \ that is selected. If you choose a value of 75 for the spacing, then each arrow\
    \ is placed nicely on the grid, since the grid cell width and height is 75 points.\n\
    \nBecause the selector controls a particular animal, you also have to keep track\
    \ of which one it controls. Therefore, you also add a property named `selectedAnimal`\
    \ to the `AnimalSelector` class, which contains a reference to the target animal.\
    \ In the initializer, you position the four arrows according to the value of spacing.\
    \ Initially, you assume that no animal is selected yet, so the animal selector\
    \ is hidden. The following is the complete `AnimalSelector` initializer:\n\n```\n\
    init(spacing: Int) {\n    super.init()\n    arrowRight.position = CGPoint(x: spacing,\
    \ y: 0)\n    arrowUp.position = CGPoint(x: 0, y: spacing)\n    arrowLeft.position\
    \ = CGPoint(x: -spacing, y: 0)\n    arrowDown.position = CGPoint(x: 0, y: -spacing)\n\
    \    self.addChild(arrowRight)\n    self.addChild(arrowUp)\n    self.addChild(arrowLeft)\n\
    \    self.addChild(arrowDown)\n    self.hidden = true\n}\n```\n\nIn the `handleInput`\
    \ method, you first check whether the selector is visible. If not, it doesn’t\
    \ need to handle input:\n\n```\nif hidden {\n    return\n}\n```\n\nYou then check\
    \ whether one of the arrows was tapped. If so, you calculate the desired animal\
    \ velocity:\n\n```\nsuper.handleInput(inputHelper)\nvar animalVelocity = CGPoint.zeroPoint\n\
    if arrowRight.tapped {\n    animalVelocity.x = 1\n} else if arrowLeft.tapped {\n\
    \    animalVelocity.x = -1\n} else if arrowUp.tapped {\n    animalVelocity.y =\
    \ 1\n} else if arrowDown.tapped {\n    animalVelocity.y = -1\n}\nanimalVelocity\
    \ *= 500\n```\n\nNote the use of the custom operator and how it is defined for\
    \ multiplying a point by a constant. Once you calculated the desired animal velocity,\
    \ you assign it to the `velocity` property of the selected animal:\n\n```\nselectedAnimal?.velocity\
    \ = animalVelocity\n```\n\nFinally, if the player has tapped anywhere but on the\
    \ selected animal (for example, on another penguin or in another part of the screen),\
    \ you hide the animal selector again and set the `selectedAnimal` property to\
    \ nil:\n\n```\nif inputHelper.hasTapped && !inputHelper.containsTap(selectedAnimal!.box)\
    \ {\n    self.hidden = true\n    selectedAnimal = nil\n}\n```\n\nIn the `handleInput`\
    \ method in the `Animal` class, you have to handle tapping an animal. However,\
    \ there are some situations when you don’t have to handle this, such as the following:\n\
    \n- The animal isn’t visible.\n- The animal is in a hole in the ice.\n- The animal\
    \ is a shark.\n- The animal is already moving.\n\nIn all these cases, you don’t\
    \ do anything, and you return from the method:\n\n```\nif hidden || boxed || isShark\
    \ || velocity != CGPoint.zeroPoint {\n    return\n}\n```\n\nIf the player didn’t\
    \ tap on the animal, you can also return from the method. Therefore, you add the\
    \ following `if` instruction that verifies this:\n\n```\nif !inputHelper.containsTap(box)\
    \ {\n    return\n}\n```\n\nNow that you know the player has tapped on the animal,\
    \ you should assign the animal selector to it. The first step is finding the animal\
    \ selector game object:\n\n```\nif let animalSelector = childNodeWithName(\"//animalSelector\"\
    ) as? AnimalSelector {\n    // do something\n}\n```\n\nThe expression passed to\
    \ the `childNodeWithName` method consists of the regular expression part (`//`)\
    \ that tells the method to search in the entire tree, and the name of the animal\
    \ selector objects. Once you’ve found the animal selector, you can make the selector\
    \ visible, set its position, and assign the animal as the selector’s target animal.\
    \ However, you only do this if the player has not tapped on the animal selector\
    \ or if it is hidden. If the player tapped on the selector, then you first want\
    \ to handle that tap, so you don’t move the selector to another animal. This leads\
    \ to the following instructions:\n\n```\nif !inputHelper.containsTap(animalSelector.box)\
    \ || animalSelector.hidden {\n    animalSelector.position = self.position\n  \
    \  animalSelector.hidden = false\n    animalSelector.selectedAnimal = self\n}\n\
    ```\n\nAs you can see, properly handling user input can be complicated sometimes.\
    \ You need to take care of all possible actions that a player can take and handle\
    \ the input appropriately. If you don’t do this right, you risk introducing bugs\
    \ in the game that can lead to a crash (which is bad) or to a possibility for\
    \ the player to cheat (which is even worse, especially in online multiplayer games).\n\
    \nThe instructions you just wrote allow the player to select animals at will and\
    \ tell them to move in a particular direction. Now you need to handle the interaction\
    \ between the animal, the playing field, and other game objects."
  raw: '## Selecting Penguins


    Before you can move penguins around, you need to be able to select a penguin.
    When you tap an animal such as a penguin or a seal, four arrows should appear
    that allow you to control the direction in which the animal should move. To display
    these arrows and handle the input, you can add a class called `AnimalSelector`.
    The animal selector contains four arrows, and it inherits from the `SKNode` class.
    When you tap on a penguin, the animal selector appears, consisting of four arrows,
    each pointing in a different direction (see Figure [20-1](#A978-1-4842-0650-8_20_Chapter.html#Fig1)).


    ![A978-1-4842-0650-8_20_Fig1_HTML.jpg](A978-1-4842-0650-8_20_Fig1_HTML.jpg)


    Figure 20-1.


    The animal selector arrows that appear around a penguin after tapping it


    Each of the four arrows is an instance of the `Button` class. The initializer
    of the `AnimalSelector` class expects a `spacing` parameter that controls how
    far away each arrow is placed from the location of the animal that is selected.
    If you choose a value of 75 for the spacing, then each arrow is placed nicely
    on the grid, since the grid cell width and height is 75 points.


    Because the selector controls a particular animal, you also have to keep track
    of which one it controls. Therefore, you also add a property named `selectedAnimal`
    to the `AnimalSelector` class, which contains a reference to the target animal.
    In the initializer, you position the four arrows according to the value of spacing.
    Initially, you assume that no animal is selected yet, so the animal selector is
    hidden. The following is the complete `AnimalSelector` initializer:


    `init(spacing: Int) {`


    `super.init()`


    `arrowRight.position = CGPoint(x: spacing, y: 0)`


    `arrowUp.position = CGPoint(x: 0, y: spacing)`


    `arrowLeft.position = CGPoint(x: -spacing, y: 0)`


    `arrowDown.position = CGPoint(x: 0, y: -spacing)`


    `self.addChild(arrowRight)`


    `self.addChild(arrowUp)`


    `self.addChild(arrowLeft)`


    `self.addChild(arrowDown)`


    `self.hidden = true`


    `}`


    In the `handleInput` method, you first check whether the selector is visible.
    If not, it doesn’t need to handle input:


    `if hidden {`


    `return`


    `}`


    You then check whether one of the arrows was tapped. If so, you calculate the
    desired animal velocity:


    `super.handleInput(inputHelper)`


    `var animalVelocity = CGPoint.zeroPoint`


    `if arrowRight.tapped {`


    `animalVelocity.x = 1`


    `} else if arrowLeft.tapped {`


    `animalVelocity.x = -1`


    `} else if arrowUp.tapped {`


    `animalVelocity.y = 1`


    `} else if arrowDown.tapped {`


    `animalVelocity.y = -1`


    `}`


    `animalVelocity *= 500`


    Note the use of the custom operator and how it is defined for multiplying a point
    by a constant. Once you calculated the desired animal velocity, you assign it
    to the `velocity` property of the selected animal:


    `selectedAnimal?.velocity = animalVelocity`


    Finally, if the player has tapped anywhere but on the selected animal (for example,
    on another penguin or in another part of the screen), you hide the animal selector
    again and set the `selectedAnimal` property to nil:


    `if inputHelper.hasTapped && !inputHelper.containsTap(selectedAnimal!.box) {`


    `self.hidden = true`


    `selectedAnimal = nil`


    `}`


    In the `handleInput` method in the `Animal` class, you have to handle tapping
    an animal. However, there are some situations when you don’t have to handle this,
    such as the following:


    *   The animal isn’t visible.

    *   The animal is in a hole in the ice.

    *   The animal is a shark.

    *   The animal is already moving.


    In all these cases, you don’t do anything, and you return from the method:


    `if hidden || boxed || isShark || velocity != CGPoint.zeroPoint {`


    `return`


    `}`


    If the player didn’t tap on the animal, you can also return from the method. Therefore,
    you add the following `if` instruction that verifies this:


    `if !inputHelper.containsTap(box) {`


    `return`


    `}`


    Now that you know the player has tapped on the animal, you should assign the animal
    selector to it. The first step is finding the animal selector game object:


    `if let animalSelector = childNodeWithName("//animalSelector") as? AnimalSelector
    {`


    `// do something`


    `}`


    The expression passed to the `childNodeWithName` method consists of the regular
    expression part (`//`) that tells the method to search in the entire tree, and
    the name of the animal selector objects. Once you’ve found the animal selector,
    you can make the selector visible, set its position, and assign the animal as
    the selector’s target animal. However, you only do this if the player has not
    tapped on the animal selector or if it is hidden. If the player tapped on the
    selector, then you first want to handle that tap, so you don’t move the selector
    to another animal. This leads to the following instructions:


    `if !inputHelper.containsTap(animalSelector.box) || animalSelector.hidden {`


    `animalSelector.position = self.position`


    `animalSelector.hidden = false`


    `animalSelector.selectedAnimal = self`


    `}`


    As you can see, properly handling user input can be complicated sometimes. You
    need to take care of all possible actions that a player can take and handle the
    input appropriately. If you don’t do this right, you risk introducing bugs in
    the game that can lead to a crash (which is bad) or to a possibility for the player
    to cheat (which is even worse, especially in online multiplayer games).


    The instructions you just wrote allow the player to select animals at will and
    tell them to move in a particular direction. Now you need to handle the interaction
    between the animal, the playing field, and other game objects.'
  trans: "\n# 选择企鹅\n\n在移动企鹅之前，你需要能够选中一只企鹅。当你点击企鹅或海豹等动物时，会出现四个箭头，让你控制该动物的移动方向。为了显示这些箭头并处理输入，你可以添加一个名为\
    \ `AnimalSelector` 的类。动物选择器包含四个箭头，并继承自 `SKNode` 类。当你点击一只企鹅时，动物选择器会出现，它由四个箭头组成，每个箭头指向不同的方向（参见图\
    \ 20-1）。\n\n![A978-1-4842-0650-8_20_Fig1_HTML.jpg](img/A978-1-4842-0650-8_20_Fig1_HTML.jpg)\n\
    \n*图 20-1.* 点击企鹅后出现在其周围的动物选择器箭头\n\n这四个箭头每个都是 `Button` 类的实例。`AnimalSelector` 类的初始化器需要一个\
    \ `spacing` 参数，该参数控制每个箭头距离所选动物位置的距离。如果你为间距选择值 75，那么每个箭头都会被整齐地放置在网格上，因为网格单元格的宽度和高度都是\
    \ 75 点。\n\n由于选择器控制着特定的动物，你还必须跟踪它控制的是哪一只。因此，你还需要向 `AnimalSelector` 类添加一个名为 `selectedAnimal`\
    \ 的属性，该属性包含对目标动物的引用。在初始化器中，你根据间距的值定位四个箭头。最初，你假设尚未选中任何动物，因此动物选择器是隐藏的。以下是完整的 `AnimalSelector`\
    \ 初始化器：\n\n```\ninit(spacing: Int) {\n    super.init()\n    arrowRight.position\
    \ = CGPoint(x: spacing, y: 0)\n    arrowUp.position = CGPoint(x: 0, y: spacing)\n\
    \    arrowLeft.position = CGPoint(x: -spacing, y: 0)\n    arrowDown.position =\
    \ CGPoint(x: 0, y: -spacing)\n    self.addChild(arrowRight)\n    self.addChild(arrowUp)\n\
    \    self.addChild(arrowLeft)\n    self.addChild(arrowDown)\n    self.hidden =\
    \ true\n}\n```\n\n在 `handleInput` 方法中，你首先检查选择器是否可见。如果不可见，则无需处理输入：\n\n```\nif hidden\
    \ {\n    return\n}\n```\n\n然后，你检查是否有箭头被点击。如果有，则计算所需的动物速度：\n\n```\nsuper.handleInput(inputHelper)\n\
    var animalVelocity = CGPoint.zeroPoint\nif arrowRight.tapped {\n    animalVelocity.x\
    \ = 1\n} else if arrowLeft.tapped {\n    animalVelocity.x = -1\n} else if arrowUp.tapped\
    \ {\n    animalVelocity.y = 1\n} else if arrowDown.tapped {\n    animalVelocity.y\
    \ = -1\n}\nanimalVelocity *= 500\n```\n\n请注意自定义运算符的使用，以及它如何定义为将一个点乘以一个常数。一旦你计算了所需的动物速度，就将其分配给所选动物的\
    \ `velocity` 属性：\n\n```\nselectedAnimal?.velocity = animalVelocity\n```\n\n最后，如果玩家点击了任何地方但未点击所选动物（例如，点击了另一只企鹅或屏幕的其他部分），则再次隐藏动物选择器，并将\
    \ `selectedAnimal` 属性设置为 nil：\n\n```\nif inputHelper.hasTapped && !inputHelper.containsTap(selectedAnimal!.box)\
    \ {\n    self.hidden = true\n    selectedAnimal = nil\n}\n```\n\n在 `Animal` 类的\
    \ `handleInput` 方法中，你需要处理点击动物。然而，在某些情况下你无需处理，例如：\n\n- 动物不可见。\n- 动物在冰洞中。\n- 动物是鲨鱼。\n\
    - 动物已经在移动。\n\n在所有此类情况下，你都不执行任何操作，并直接返回该方法：\n\n```\nif hidden || boxed || isShark\
    \ || velocity != CGPoint.zeroPoint {\n    return\n}\n```\n\n如果玩家没有点击该动物，你也可以从该方法返回。因此，你添加以下\
    \ `if` 指令来验证这一点：\n\n```\nif !inputHelper.containsTap(box) {\n    return\n}\n```\n\
    \n现在，既然你知道玩家点击了这只动物，你应该将动物选择器分配给它。第一步是找到动物选择器游戏对象：\n\n```\nif let animalSelector\
    \ = childNodeWithName(\"//animalSelector\") as? AnimalSelector {\n    // 执行某些操作\n\
    }\n```\n\n传递给 `childNodeWithName` 方法的表达式由正则表达式部分（`//`）组成，该部分告诉方法在整个节点树中搜索，以及动物选择器对象的名称。一旦你找到了动物选择器，就可以使选择器可见、设置其位置，并将该动物指定为选择器的目标动物。但是，仅当玩家尚未点击动物选择器或者选择器处于隐藏状态时，才执行此操作。如果玩家点击了选择器，那么你首先要处理那次点击，以避免将选择器移动到另一只动物。这导致了以下指令：\n\
    \n```\nif !inputHelper.containsTap(animalSelector.box) || animalSelector.hidden\
    \ {\n    animalSelector.position = self.position\n    animalSelector.hidden =\
    \ false\n    animalSelector.selectedAnimal = self\n}\n```\n\n如你所见，正确处理用户输入有时可能很复杂。你需要考虑玩家可能采取的所有操作，并恰当地处理输入。如果你做得不对，就有可能引入导致游戏崩溃（这很糟糕）或让玩家有机可乘（这更糟糕，尤其是在在线多人游戏中）的错误。\n\
    \n你刚刚编写的指令允许玩家随意选择动物，并指示它们向特定方向移动。现在，你需要处理动物、游戏场地和其他游戏对象之间的交互。"
- fmt: "### Updating Animals\n\nInteraction between animals and other game objects\
    \ is done in the `updateDelta` method of the `Animal` class. The main reason for\
    \ doing this in the `Animal` class is that then each animal handles its own interaction.\
    \ If you add multiple animals to the game (as you’re doing here), you don’t have\
    \ to change anything in the code that handles the interaction. By default, you\
    \ call the `updateDelta` method of the superclass. Although technically not necessary,\
    \ it is a good idea to still do this. If in the future you decide to add other\
    \ nodes to an `Animal` node, then you have avoided a potential updating bug. Then,\
    \ you calculate the new position of the animal by adding the velocity multiplied\
    \ by the time passed (using the new `CGPoint` operator extensions!). You don’t\
    \ have to do anything else if the animal isn’t visible or if its velocity is zero.\
    \ Therefore, the first instructions in the `updateDelta` method are:\n\n```\n\
    super.updateDelta(delta)\n\nposition += velocity * CGFloat(delta)\n\nif hidden\
    \ || velocity == CGPoint.zeroPoint {\n\nreturn\n\n}\n```\n\nNow you have to check\
    \ whether the animal collides with another game object. Because of the check you\
    \ do at the start of the `updateDelta` method, you only do this for animals that\
    \ are both visible and moving.\n\nIf the animal is moving, you need to know what\
    \ tile it’s currently moving into. Then you can check what kind of tile it is\
    \ and whether other game objects are located at that tile. For this, you add a\
    \ property called `currentBlock` to the `Animal` class. In order to calculate\
    \ the tile the animal is moving into, you calculate the edge of the box surrounding\
    \ the animal. If the animal is moving left, you take the left edge. If it is moving\
    \ down, you take the bottom edge. The following code contains the complete header\
    \ and body of the `currentBlock` property:\n\n```\nvar currentBlock: (Int, Int)\
    \ {\n    get {\n        var p = CGPoint()\n        if let tileField = childNodeWithName(\"\
    //tileField\") as? TileField {\n            var edgepos = position\n         \
    \   if velocity.x > 0 {\n                edgepos.x += CGFloat(tileField.layout.cellWidth)\
    \ / 2\n            } else if velocity.x < 0 {\n                edgepos.x -= CGFloat(tileField.layout.cellWidth)\
    \ / 2\n            } else if velocity.y > 0 {\n                edgepos.y += CGFloat(tileField.layout.cellHeight)\
    \ / 2\n            } else if velocity.y < 0 {\n                edgepos.y -= CGFloat(tileField.layout.cellHeight)\
    \ / 2\n            }\n            return tileField.layout.gridLocation(edgepos)\n\
    \        }\n        return (-1, -1)\n    }\n}\n```\n\nThe next step is finding\
    \ out what kind of tile the animal is moving into. To do that, you use the `getTileType`\
    \ method from the `TileField` class. This method retrieves the type of tile for\
    \ a given tile position. Here is the complete method:\n\n```\nfunc getTileType(col:\
    \ Int, row: Int) -> TileType {\n    if let obj = layout.at(col, row: row) as?\
    \ Tile {\n        return obj.type\n    }\n    return .Background\n}\n```\n\nNow\
    \ you can go back to the `updateDelta` method in the `Animal` class and check\
    \ whether the animal has fallen off the tile field. If so, you hide the animal\
    \ and you set its velocity to zero to ensure that the animal doesn’t keep moving\
    \ indefinitely while it’s hidden:\n\n```\nlet tileField = childNodeWithName(\"\
    //tileField\") as! TileField\nlet (targetcol, targetrow) = currentBlock\n\nif\
    \ tileField.getTileType(targetcol, row: targetrow) == .Background {\n    self.hidden\
    \ = true\n    self.velocity = CGPoint.zeroPoint\n}\n```\n\nAnother possibility\
    \ is that the animal ran into a wall tile. If that is the case, it has to stop\
    \ moving:\n\n```\nelse if tileField.getTileType(targetcol, row: targetrow) ==\
    \ .Wall {\n    self.stopMoving()\n}\n```\n\nStopping moving isn’t as easy as it\
    \ sounds. You could simply set the animal’s velocity to zero, but then the animal\
    \ would be partly in another tile. You need to place the animal at the tile it\
    \ just moved out of. The method `stopMoving` accomplishes exactly that. In this\
    \ method, you first have to calculate the position of the old tile. You can do\
    \ that by starting from the x and y indices of the tile the animal is currently\
    \ moving into. These are passed along as a parameter. For example, if the animal’s\
    \ velocity is the vector (500, 0) (moving to the right), you need to subtract\
    \ 1 from the x index to get the x index of the tile the animal is moving out of.\
    \ If the animal’s velocity is (0, -500) (moving up), then you need to add 1 to\
    \ the y index to get the y index of the tile the animal is moving out of. You\
    \ can achieve this by normalizing the velocity vector and subtracting it from\
    \ the x and y indices. This works because normalizing a vector results in a vector\
    \ of length 1 (unit length). Because an animal is only allowed to move in either\
    \ the x or y direction and not diagonally, you end up with a vector (1, 0) in\
    \ the first example and (0, -1) in the second example. So you set the position\
    \ of the animal to the position of the tile it just moved out of, as follows:\n\
    \n```\nlet tileField = childNodeWithName(\"//tileField\") as! TileField\nvelocity\
    \ = CGPoint.normalize(velocity)\nlet (currcol, currrow) = currentBlock\nposition\
    \ = tileField.layout.toPosition(currcol - Int(velocity.x),\nrow: currrow - Int(velocity.y))\n\
    ```\n\nFinally, you set the animal’s velocity to zero so it stays in its new position:\n\
    \n```\nvelocity = CGPoint.zeroPoint\n```"
