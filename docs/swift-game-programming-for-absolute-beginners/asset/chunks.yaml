    \n    }\n\n    else {\n\n        // 更多的操作aBall对象的代码\n\n    }\n\n}\n```\n\n然后，在`update`方法中，你可以简单地调用此方法，将每个球作为参数传递：\n\
    \n```\noverride func update(currentTime: NSTimeInterval) {\n\n    ...\n\n    updateBall(ball)\n\
    \n    updateBall(ball2)\n\n    updateBall(ball3)\n\n    updateBall(ball4)\n\n\
    \    ...\n\n}\n```\n\n你需要为初始化每个球以及处理球的输入做同样的事情。虽然这是一个可以接受的解决方案，但从长远来看，它同样难以扩展。在Painter游戏中，只有少数几个不同的游戏对象：一个加农炮、一个球和三个油漆罐。商业游戏可能有数百个不同的游戏对象。如果你必须为每种对象类型向`GameScene`类添加初始化、输入处理和更新方法，那么该类会变得非常庞大，这反过来会使编辑代码变得极其麻烦。\n\
