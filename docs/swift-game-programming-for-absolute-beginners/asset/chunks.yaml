  raw: '## The PaintCan Class


    The final class that inherits from `ThreeColorGameObject` is `PaintCan`. Have
    a look at the Painter8 example to see the complete class. `PaintCan` overrides
    the `updateDelta` method as well as the `reset` method. Just like before, it doesn’t
    handle any input, so you don’t have to override the `handleInput` method.


    There is one interesting bit in the `PaintCan` class, and that is the part using
    the `box` computed property. Since any class inheriting from `ThreeColorGameObject`
    has that property, you can now use it to easily check whether two game objects
    collide. Take a look at the following lines of code:


    `var ball = GameScene.world.ball`


    `if self.box.intersects(ball.box) {`


        `color = ball.color`


        `ball.reset()`


    `}`


    These are just a few lines of code, but behind the scenes a lot is happening.
    Bounding boxes are computed as well as intersections between them, and the hidden
    statuses of colored sprites are changed. Because of the way the code is designed,
    you can do these tasks by writing only a couple of lines of code!


    When looking at the game object classes, you can see that another interesting
    thing has happened. Because each game object class inherits from `ThreeColorGameObject`,
    the definitions in the `ThreeColorGameObject` class determine what methods and
    properties look like. In a sense, `ThreeColorGameObject` imposes constraints on
    any game object classes that inherit from it. For example, it enforces that the
    method for handling input is called `handleInput` (and not `HandleInput`, `handleinput`,
    or `handle_input`). This is another way in which inheritance helps to increase
    the quality of your code: it results in more consistent class definitions.


    ## Polymorphism


    Because of the inheritance mechanism, you don’t always have to know to what type
    of object a variable is pointing to. Consider the following declaration and initialization:


    `var someKindOfGameObject : Cannon = Cannon()`


    And somewhere else in the code, you do this:


    `someKindOfGameObject.updateDelta(delta)`


    Now suppose you change the declaration and initialization, as follows:


    `var someKindOfGameObject : ThreeColorGameObject = Cannon()`


    This is allowed, since Cannon is a subclass of `ThreeColorGameObject`. The other
    way (assigning a `ThreeColorGameObject` instance to a variable of type `Cannon`)
    is not allowed, since not every `ThreeColorGameObject` is a cannon (some of them
    are a ball or a paint can).


    So, if `someKindOfGameObject` is of type `ThreeColorGameObject`, which version
    of the `updateDelta` method is called? It depends on the instance that the variable
    refers to. If that instance happens to be a `Cannon` instance, the `updateDelta`
    method of `Cannon` will be called. If it’s a `Ball` instance, the `updateDelta`
    method of `Ball` will be called. When the program is executed, the right version
    of the `updateDelta` method is called automatically.


    This effect is called polymorphism, and it comes in very handy sometimes. Polymorphism
    allows you to better separate code. Suppose a game company wants to release an
    extension of its game. For example, it might want to introduce a few new enemies,
    or skills that a player can learn. The company can provide these extensions as
    subclasses of generic `Enemy` and `Skill` classes. The actual game code will then
    use these objects without having to know which particular skill or enemy it’s
    dealing with. It simply calls the methods that were defined in the generic classes.


    ## Inheriting from Existing Classes


    Instead of creating a subclass of a class you wrote yourself, you can also inherit
    from classes written by other developers. In the Painter8 example, there are two
    hierarchies of game objects. One hierarchy is represented by the classes you created:
    the `GameWorld` instance contains references to the cannon, ball, and paint can
    objects. The second hierarchy is the one defined by the nodes in the scene graph.
    Generally, this is not an ideal solution. Because there are two hierarchies to
    maintain, inconsistencies can easily occur, leading to bugs and other undesired
    behavior.


    A way to solve this problem is by merging these two hierarchies. The Painter9
    example shows how this is done. The main difference between Painter8 and Painter9
    is that in Painter9, the game object classes are all (indirectly) a subclass of
    `SKNode`, which is the main representation of a node in the scene graph in the
    SpriteKit framework. The `ThreeColorGameObject` class is now a subclass of `SKNode`.
    This means that the `node` property is no longer needed because any game object
    will already be a node itself.


    If you take a look at the `ThreeColorGameObject` class in Painter9, you’ll see
    that it is now a subclass of `SKNode`. Because of this, you need to do a few extra
    things. For one, you need to call the initializer of the superclass in your own
    initializers:


    `override init() {`


        `super.init()`


        `self.addChild(red)`


        `self.addChild(green)`


        `self.addChild(blue)`


    `}`


    `init(_ spriteRed: String, _ spriteGreen: String, _ spriteBlue: String) {`


        `super.init()`


        `red = SKSpriteNode(imageNamed: spriteRed)`


        `green = SKSpriteNode(imageNamed: spriteGreen)`


        `blue = SKSpriteNode(imageNamed: spriteBlue)`


        `self.addChild(red)`


        `self.addChild(green)`


        `self.addChild(blue)`


    `}`


    The first initializer overrides the initializer of the superclass and makes sure
    that the three sprite nodes are added to this game object to ensure consistency,
    no matter what initializer is called. The second initializer is the same as before,
    except that it calls the initializer of the superclass, and sprites are now added
    to the game object itself instead of a separate node.


    Finally, you see the following initializer:


    `required init?(coder aDecoder: NSCoder) {`


        `fatalError("init(coder:) has not been implemented")`


    `}`


    When you inherit from `SKNode`, you are required to add this initializer (also
    indicated in the code itself by the `required` keyword). The reason this initializer
    is needed is because the `SKNode` class supports something called serialization.
    Serialization means that it’s possible to initialize objects from data (for example,
    stored in a file). This is a useful feature for many games because it forms the
    basis of the save game mechanism. In Painter, there is no such mechanism, however,
    so the initializer contains a single instruction that stops the program with an
    error.


    Because `ThreeColorGameObject` is a subclass of `SKNode`, any class inheriting
    from `ThreeColorGameObject` also is a subclass of `SKNode`, including the `Cannon`,
    the `Ball` and the `PaintCan` classes. As you can see in Painter9, the `GameWorld`
    class is set up in a very similar way as `ThreeColorGameObject`: it inherits from
    `SKNode`, so a separate `node` property is no longer needed.'
  trans: "\n## `PaintCan` 类\n\n最后一个继承自 `ThreeColorGameObject` 的类是 `PaintCan`。请查看 `Painter8`\
    \ 示例以了解完整的类定义。`PaintCan` 重写了 `updateDelta` 方法和 `reset` 方法。与之前一样，它不处理任何输入，因此你无需重写\
    \ `handleInput` 方法。\n\n`PaintCan` 类中有一个有趣的部分，那就是使用了 `box` 计算属性。由于任何继承自 `ThreeColorGameObject`\
    \ 的类都拥有该属性，现在你可以用它来轻松检查两个游戏对象是否发生碰撞。请看以下几行代码：\n\n```\nvar ball = GameScene.world.ball\n\
    \nif self.box.intersects(ball.box) {\n    color = ball.color\n    ball.reset()\n\
    }\n```\n\n这几行代码虽少，但幕后发生了很多事情。边界框以及它们之间的交集被计算出来，彩色精灵的隐藏状态也随之改变。由于代码的设计方式，你只需编写几行代码就能完成这些任务！\n\
    \n观察游戏对象类时，你会发现另一件有趣的事情。由于每个游戏对象类都继承自 `ThreeColorGameObject`，`ThreeColorGameObject`\
    \ 类中的定义决定了方法和属性的形态。从某种意义上说，`ThreeColorGameObject` 对任何继承自它的游戏对象类施加了约束。例如，它强制要求处理输入的方法名为\
    \ `handleInput`（而不是 `HandleInput`、`handleinput` 或 `handle_input`）。这是继承有助于提升代码质量的另一种方式：它带来了更一致的类定义。\n\
    \n## 多态性\n\n由于继承机制，你无需总是知道一个变量指向哪种类型的对象。考虑以下声明和初始化：\n\n```\nvar someKindOfGameObject\
    \ : Cannon = Cannon()\n```\n\n而在代码的其他地方，你执行以下操作：\n\n```\nsomeKindOfGameObject.updateDelta(delta)\n\
    ```\n\n现在假设你像下面这样更改声明和初始化：\n\n```\nvar someKindOfGameObject : ThreeColorGameObject\
    \ = Cannon()\n```\n\n这是允许的，因为 `Cannon` 是 `ThreeColorGameObject` 的子类。反过来（将 `ThreeColorGameObject`\
    \ 实例赋值给 `Cannon` 类型的变量）则不被允许，因为并非每个 `ThreeColorGameObject` 都是加农炮（其中一些是球或油漆罐）。\n\
    \n那么，如果 `someKindOfGameObject` 是 `ThreeColorGameObject` 类型，会调用哪个版本的 `updateDelta`\
    \ 方法？这取决于该变量所引用的实例。如果该实例恰好是 `Cannon` 实例，则会调用 `Cannon` 的 `updateDelta` 方法。如果是 `Ball`\
    \ 实例，则会调用 `Ball` 的 `updateDelta` 方法。程序执行时，会自动调用正确的 `updateDelta` 方法版本。\n\n这种效果称为多态性，有时非常有用。多态性允许你更好地分离代码。假设一家游戏公司想要发布其游戏的扩展包。例如，它可能想引入一些新敌人，或者玩家可以学习的技能。该公司可以将这些扩展作为通用\
    \ `Enemy` 和 `Skill` 类的子类来提供。实际的游戏代码随后会使用这些对象，而无需知道它正在处理的是哪个特定的技能或敌人。它只需调用在通用类中定义的方法即可。\n\
    \n## 继承现有类\n\n除了创建自己编写的类的子类外，你还可以继承其他开发者编写的类。在 `Painter8` 示例中，存在两个游戏对象层级结构。一个层级结构由你创建的类表示：`GameWorld`\
    \ 实例包含对加农炮、球和油漆罐对象的引用。第二个层级结构由场景图中的节点定义。通常情况下，这不是理想的解决方案。由于要维护两个层级结构，很容易出现不一致，导致错误和其他不期望的行为。\n\
    \n解决这个问题的一种方法是合并这两个层级结构。`Painter9` 示例展示了如何做到这一点。`Painter8` 和 `Painter9` 的主要区别在于，在\
    \ `Painter9` 中，游戏对象类都（间接地）是 `SKNode` 的子类，而 `SKNode` 是 SpriteKit 框架中场景图节点的主要表示。`ThreeColorGameObject`\
    \ 类现在是 `SKNode` 的子类。这意味着不再需要 `node` 属性，因为任何游戏对象本身已经是一个节点。\n\n如果你查看 `Painter9`\
    \ 中的 `ThreeColorGameObject` 类，会发现它现在是 `SKNode` 的子类。因此，你需要额外做几件事。其一，你需要在自定义的初始化器中调用父类的初始化器：\n\
    \n```\noverride init() {\n    super.init()\n    self.addChild(red)\n    self.addChild(green)\n\
    \    self.addChild(blue)\n}\n\ninit(_ spriteRed: String, _ spriteGreen: String,\
    \ _ spriteBlue: String) {\n    super.init()\n    red = SKSpriteNode(imageNamed:\
    \ spriteRed)\n    green = SKSpriteNode(imageNamed: spriteGreen)\n    blue = SKSpriteNode(imageNamed:\
    \ spriteBlue)\n    self.addChild(red)\n    self.addChild(green)\n    self.addChild(blue)\n\
    }\n```\n\n第一个初始化器重写了父类的初始化器，并确保将三个精灵节点添加到此游戏对象中，以保证一致性，无论调用哪个初始化器。第二个初始化器与之前相同，只是它调用了父类的初始化器，并且精灵现在被添加到游戏对象本身，而不是一个单独的节点。\n\
    \n最后，你会看到以下初始化器：\n\n```\nrequired init?(coder aDecoder: NSCoder) {\n    fatalError(\"\
    init(coder:) has not been implemented\")\n}\n```\n\n当你继承 `SKNode` 时，你必须添加这个初始化器（代码中的\
    \ `required` 关键字也表明了这一点）。需要这个初始化器的原因是 `SKNode` 类支持一种称为序列化的功能。序列化意味着可以从数据（例如，存储在文件中）初始化对象。这对许多游戏来说是一个有用的特性，因为它构成了游戏存档机制的基础。然而，在\
    \ `Painter` 中并没有这种机制，因此该初始化器只包含一条指令，用于在出现错误时停止程序。\n\n由于 `ThreeColorGameObject`\
    \ 是 `SKNode` 的子类，任何继承自 `ThreeColorGameObject` 的类也都是 `SKNode` 的子类，包括 `Cannon`、`Ball`\
    \ 和 `PaintCan` 类。正如你在 `Painter9` 中看到的，`GameWorld` 类的设置方式与 `ThreeColorGameObject`\
    \ 非常相似：它继承自 `SKNode`，因此不再需要单独的 `node` 属性。\n"
- fmt: '# Hierarchies of Classes


    You’ve seen several examples in this chapter of classes inheriting from a base
    game-object class. A class should inherit from another class only if the relationship
    between these two classes can be described as “is a kind of.” For example: a `Ball`
    is a kind of `ThreeColorGameObject`, which in turn is a kind of `SKNode`. You
    can extend that hierarchy even further. For instance, you can write a class that
    inherits from the `Ball` class, such as `BouncingBall`, a special version of a
    standard ball that bounces off paint cans instead of only colliding with them.
    And you could make another class called `BouncingElasticBall`, which inherits
    from `BouncingBall`, but is a ball that deforms according to its elastic properties
    when it bounces against a paint can. Every time you inherit from a class, you
    get the data (encoded in properties) and the behavior (encoded in methods) from
    the base class for free.


    Commercial games have a class hierarchy of different game objects with many different
    levels. Going back to the traffic-simulation example at the beginning of this
    chapter, you can imagine a very complicated hierarchy of all kinds of different
    vehicles. Figure [10-4](#A978-1-4842-0650-8_10_Chapter.html#Fig4) shows an example
    of such a hierarchy. The figure uses arrows to indicate an inheritance relation
    between classes.


    ![A978-1-4842-0650-8_10_Fig4_HTML.gif](A978-1-4842-0650-8_10_Fig4_HTML.gif)


    Figure 10-4. A complex hierarchy of game objects in a traffic-simulation game


    At the very base of the inheritance tree is a `GameObject` class. This class contains
    only very basic information such as the position or the velocity of the game object.
    For each subclass, new properties and methods can be added, which are relevant
    for the particular class and its subclasses. For example, the property `numberOfWheels`
    typically belongs in the `Vehicle` class and not in `MovingGameObject` (because
    boats don’t have wheels). The property `flightAltitude` belongs in the `Airplane`
    class, and the property `bellIsWorking` belongs in the `Bicycle` class.


    When you determine the way your classes are structured, you have to make many
    decisions. There isn’t a single best hierarchy; and, depending on the application,
    one hierarchy might be more useful than another. For instance, this example first
    divides the `MovingGameObject` class according to the medium the object uses to
    displace itself: land, air, or water. After that, the classes are divided in different
    subclasses: motorized or not motorized. You could choose to do this the other
    way around. For some classes, it isn’t entirely clear where in the hierarchy they
    belong: do you say that a motorbike is a special type of bike (one with a motor)?
    Or is it a special kind of motorized vehicle (one with only two wheels)?


    What is important is that the relationship between the classes themselves is clear.
    A sailboat is a boat, but a boat isn’t always a sailboat. A bicycle is a vehicle,
    but not every vehicle is a bicycle.


    ## What You Have Learned


    In this chapter, you have learned the following:


    *   How to use inheritance to structure related classes in a hierarchy

    *   How to override methods in a subclass to provide specific behavior for that
    class

    *   How to call a method or an initializer from the superclass, using the `super`
    keyword


    # Finishing the Painter Game


    Electronic supplementary material The online version of this chapter (doi:[10.1007/978-1-4842-0650-8_11](http://dx.doi.org/10.1007/978-1-4842-0650-8_11))
    contains supplementary material, which is available to authorized users.


    In this chapter, you will finish the Painter game by adding a few extra features
    such as motion effects, sounds, and music, and maintaining and displaying a score.
    Finally, you will learn about characters and strings in a bit more detail.


    ## Adding Motion Effects


    In order to make the game more visually appealing, you can make the paint cans
    swing back and forth slightly to simulate the effect of wind and friction on the
    falling motion. The `PainterFinal` program that belongs to this chapter is the
    final version of the game with this motion effect added to the cans. Adding such
    an effect isn’t complicated. Thanks to the work you did in the previous chapter,
    only a single line needs to be added to the `updateDelta` method of the `PaintCan`
    class. Because `PaintCan` is a subclass of `ThreeColorGameObject`, which in turn
    is a subclass of `SKNode`, it has a `zRotation` property that you can use to rotate
    the paint can.


    In order to achieve the motion effect, you use the `sin` function. By letting
    the value depend on the current position of the can, you get different values
    depending on that position. You then use this value to apply a rotation on the
    sprite. This is the line of code you add to the `updateDelta` method in the `PaintCan`
    class:


    ```

    self.zRotation = sin(position.y / 50) * 0.04

    ```


    This instruction uses the y-coordinate of the paint can position to get different
    rotation values. Furthermore, you divide it by 50 to get a nice slow movement,
    and you multiply the outcome by 0.04 to reduce the amplitude of the sine so the
    rotation looks more or less realistic. If you like, you can try out different
    values and see how they affect the behavior of the paint cans.


    ### Creating Sprites


    Even if you’re not an artist, it helps to be able to make simple sprites yourself.
    It enables you to quickly make a prototype of the game—and maybe also find out
    there is an artist inside you. To create sprites, you first need good tools. Most
    artists use a painting program like Adobe Photoshop or a vector drawing program
    like Adobe Illustrator, but others work with such simple tools as Paintbrush or
    the more extensive and free GIMP. Every tool requires practice. Work your way
    through some tutorials, and make sure you get some insight into the many different
    features. Often, the things you want can be achieved in an easy way.


    Preferably, create very large images of your game objects and then scale them
    down to the required size. The advantages are that you can change the required
    size in your game later and that you get rid of aliasing effects due to images
    being represented by pixels. When scaling images, anti-aliasing techniques blend
    the colors so the image remains smooth. If you keep the outside of the game object
    in the image transparent, then, when you scale, the border pixels will automatically
    become partially transparent. Only if you want to create the classic pixel style
    should you create the sprites in the actual size required.


    Finally, look around on the Web. There are lots of sprites that you can use for
    free. Make sure to check the license terms so the pack of sprites you’re using
    are legal for what you’re building. You can then use them as a basis for your
    own sprites. But in the end, realize that the quality of your game increases significantly
    when you work with an experienced artist.'
