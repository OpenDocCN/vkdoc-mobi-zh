- fmt: "# Initializing Objects\n\nWhenever you create an instance of a class (such\
    \ as `Ball` or `Cannon`), the object that is created needs to be initialized somehow.\
    \ For example, when you create a ball, you need to load a few sprites, set an\
    \ initial velocity, make sure the ball is hidden, and so on. In Swift, each class\
    \ has its own initializers that do this job. You can recognize that a method is\
    \ an initializer by its name. Initializers are always called `init`. Furthermore,\
    \ when you define an initializer, you omit the word `func`. Here is the initializer\
    \ of the `Ball` class:\n\n```\ninit() {\n    node.zPosition = 1\n    node.addChild(red)\n\
    \    node.addChild(green)\n    node.addChild(blue)\n    node.hidden = true\n}\n\
    ```\n\nIn the initializer body, you see that the `node` property is manipulated.\
    \ Its z position is changed (so that balls always appear before the background);\
    \ the red, green, and blue ball sprites are added; and the node is set to hidden.\
    \ This `init` method is called automatically when you create an instance of `Ball`:\n\
    \n```\nvar b = Ball()\n```\n\nAn instruction like this does a few things:\n\n\
    - Memory is reserved for storing an instance of `Ball`.\n- The stored properties\
    \ inside `Ball` are assigned a value, and these values are stored in memory.\n\
    - The `Ball` initializer is called.\n- A reference to the newly created instance\
    \ is assigned to the variable `b`.\n\nSince an initializer is very similar to\
    \ a method, you can also add parameters to it. For example, consider the following\
    \ initializer:\n\n```\ninit(position: CGPoint) {\n    node.zPosition = 1\n   \
    \ node.addChild(red)\n    node.addChild(green)\n    node.addChild(blue)\n    node.hidden\
    \ = true\n    node.position = position\n}\n```\n\nThis initializer accepts a position\
    \ and you use it as follows to create a `Ball` instance:\n\n```\nvar ballPosition\
    \ = CGPoint(x: 10, y: -50)\nvar anotherBall = Ball(position: ballPosition)\n```\n\
    \nNote that initializer parameters always need to be given a label when the initializer\
    \ is called. Of course, you can specify not to use a label explicitly, just like\
    \ you can do in a method:\n\n```\ninit(_ position: CGPoint) {\n    // initializer\
    \ code here\n}\n```\n\nA class can have many different initializers, each having\
    \ different parameters used for creating instances of your class. It is also possible\
    \ to define a class without explicitly adding an `init` method to it. In that\
    \ case, Swift uses a built-in default initializer that simply sets the default\
    \ values defined for the properties. This is actually what happened in the Painter4\
    \ example, where the `Ball` class was defined as follows:\n\n```\nclass Ball {\n\
    \    var node = SKNode()\n    var red = SKSpriteNode(imageNamed: \"spr_ball_red\"\
    )\n    var green = SKSpriteNode(imageNamed: \"spr_ball_green\")\n    var blue\
    \ = SKSpriteNode(imageNamed: \"spr_ball_blue\")\n    var velocity = CGPoint.zeroPoint\n\
    \    var readyToShoot = false\n}\n```\n\nEach of the properties in this `Ball`\
    \ class has a default value. For example, the default value for `readyToShoot`\
    \ is `false`, and the default value for the ball velocity is zero. When an instance\
    \ of this `Ball` class is created, the default initializer is called, which assigns\
    \ the default values to the properties. The Swift compiler requires that every\
    \ property part of a class is initialized when the instance of the class is created.\
    \ This requirement forces developers to make sure all the data in an instance\
    \ has been properly assigned, leading to less bugs related to uninitialized data.\n\
    \nFinally, it’s good to know that initializers can call other initializers. Swift\
    \ makes a distinction between designated initializers and convenience initializers.\
    \ A designated initializer completely initializes an instance, including all its\
    \ properties. The `init` method in `Ball` is a good example of such an initializer.\
    \ A convenience initializer has a slightly different syntax:\n\n```\nconvenience\
    \ init(position: CGPoint) {\n    self.init()\n    node.position = position\n}\n\
    ```\n\nAs you can see, it uses the `convenience` keyword to indicate that this\
    \ is not a designated initializer. The purpose of convenience initializers is\
    \ to provide a layer over the designated initializers to make creating instances\
    \ of your class easier. A convenience initializer must call another initializer\
    \ in its body, and it must do this before it can assign any values to properties.\
    \ In this example, the first line calls the designated initializer. It uses the\
    \ keyword `self`, which I’ll cover in more detail later. Instead of calling a\
    \ designated initializer, you can also call another convenience initializer (which,\
    \ in turn, calls another initializer). This results in a chain of convenience\
    \ initializer calls. The only important thing to remember is that in the end,\
    \ a designated initializer should be called. It’s useful that a convenience initializer\
    \ calls another initializer. It allows you to write shorter code. The convenience\
    \ initializer only contains two lines of code, which is one-third of this designated\
    \ initializer:\n\n```\ninit(position: CGPoint) {\n    node.zPosition = 1\n   \
    \ node.addChild(red)\n    node.addChild(green)\n    node.addChild(blue)\n    node.hidden\
    \ = true\n    node.position = position\n}\n```\n\nFurthermore, basic object initialization\
    \ code is now written in a single spot in your class: in the designated initializer.\
    \ This means that if there is a bug in that code, and you solve it for that initializer,\
    \ it is automatically solved for any convenience initializer that relies on the\
    \ designated initializer.\n\n**Note**  \nAnother name for an initializer is a\
    \ constructor. The latter is the term commonly used in languages such as C# and\
    \ Java."
  raw: '## Initializing Objects


    Whenever you create an instance of a class (such as `Ball` or `Cannon`), the object
    that is created needs to be initialized somehow. For example, when you create
    a ball, you need to load a few sprites, set an initial velocity, make sure the
    ball is hidden, and so on. In Swift, each class has its own initializers that
    do this job. You can recognize that a method is an initializer by its name. Initializers
    are always called `init`. Furthermore, when you define an initializer, you omit
    the word `func`. Here is the initializer of the `Ball` class:


    `init() {`


    `node.zPosition = 1`


    `node.addChild(red)`


    `node.addChild(green)`


    `node.addChild(blue)`


    `node.hidden = true`


    `}`


    In the initializer body, you see that the `node` property is manipulated. Its
    z position is changed (so that balls always appear before the background); the
    red, green, and blue ball sprites are added; and the node is set to hidden. This
    `init` method is called automatically when you create an instance of `Ball`:


    `var b = Ball()`


    An instruction like this does a few things:


    *   Memory is reserved for storing an instance of `Ball`.

    *   The stored properties inside `Ball` are assigned a value, and these values
    are stored in memory.

    *   The `Ball` initializer is called.

    *   A reference to the newly created instance is assigned to the variable `b`.


    Since an initializer is very similar to a method, you can also add parameters
    to it. For example, consider the following initializer:


    `init(position: CGPoint) {`


    `node.zPosition = 1`


    `node.addChild(red)`


    `node.addChild(green)`


    `node.addChild(blue)`


    `node.hidden = true`


    `node.position = position`


    `}`


    This initializer accepts a position and you use it as follows to create a `Ball`
    instance:


    `var ballPosition = CGPoint(x: 10, y: -50)`


    `var anotherBall = Ball(position: ballPosition)`


    Note that initializer parameters always need to be given a label when the initializer
    is called. Of course, you can specify not to use a label explicitly, just like
    you can do in a method:


    `init(_ position: CGPoint) {`


    `// initializer code here`


    `}`


    A class can have many different initializers, each having different parameters
    used for creating instances of your class. It is also possible to define a class
    without explicitly adding an `init` method to it. In that case, Swift uses a built-in
    default initializer that simply sets the default values defined for the properties.
    This is actually what happened in the Painter4 example, where the Ball class was
    defined as follows:


    `class Ball {`


    `var node = SKNode()`


    `var red = SKSpriteNode(imageNamed: "spr_ball_red")`


    `var green = SKSpriteNode(imageNamed: "spr_ball_green")`


    `var blue = SKSpriteNode(imageNamed: "spr_ball_blue")`


    `var velocity = CGPoint.zeroPoint`


    `var readyToShoot = false`


    `}`


    Each of the properties in this `Ball` class has a default value. For example,
    the default value for `readyToShoot` is `false`, and the default value for the
    ball velocity is zero. When an instance of this Ball class is created, the default
    initializer is called, which assigns the default values to the properties. The
    Swift compiler requires that every property part of a class is initialized when
    the instance of the class is created. This requirement forces developers to make
    sure all the data in an instance has been properly assigned, leading to less bugs
    related to uninitialized data.


    Finally, it’s good to know that initializers can call other initializers. Swift
    makes a distinction between designated initializers and convenience initializers.
    A designated initializer completely initializes an instance, including all its
    properties. The `init` method in `Ball` is a good example of such an initializer.
    A convenience initializer has a slightly different syntax:


    `convenience init(position: CGPoint) {`


    `self.init()`


    `node.position = position`


    `}`


    As you can see, it uses the `convenience` keyword to indicate that this is not
    a designated initializer. The purpose of convenience initializers is to provide
    a layer over the designated initializers to make creating instances of your class
    easier. A convenience initializer must call another initializer in its body, and
    it must do this before it can assign any values to properties. In this example,
    the first line calls the designated initializer. It uses the keyword `self`, which
    I’ll cover in more detail later. Instead of calling a designated initializer,
    you can also call another convenience initializer (which, in turn, calls another
    initializer). This results in a chain of convenience initializer calls. The only
    important thing to remember is that in the end, a designated initializer should
    be called. It’s useful that a convenience initializer calls another initializer.
    It allows you to write shorter code. The convenience initializer only contains
    two lines of code, which is one-third of this designated initializer:


    `init(position: CGPoint) {`


    `node.zPosition = 1`


    `node.addChild(red)`


    `node.addChild(green)`


    `node.addChild(blue)`


    `node.hidden = true`


    `node.position = position`


    `}`


    Furthermore, basic object initialization code is now written in a single spot
    in your class: in the designated initializer. This means that if there is a bug
    in that code, and you solve it for that initializer, it is automatically solved
    for any convenience initializer that relies on the designated initializer.


    Note


    Another name for an initializer is a constructor. The latter is the term commonly
    used in languages such as C# and Java.'
  trans: "\n# 初始化对象\n\n每当你创建一个类的实例（例如 `Ball` 或 `Cannon`）时，所创建的对象都需要以某种方式进行初始化。例如，当你创建一个球时，你需要加载一些精灵图像、设定一个初始速度、确保球处于隐藏状态等等。在\
    \ Swift 中，每个类都有自己的构造器来执行此工作。你可以通过名称来识别一个方法是构造器。构造器始终被命名为 `init`。此外，在定义构造器时，需要省略关键字\
    \ `func`。以下是 `Ball` 类的构造器：\n\n```\ninit() {\n    node.zPosition = 1\n    node.addChild(red)\n\
    \    node.addChild(green)\n    node.addChild(blue)\n    node.hidden = true\n}\n\
    ```\n\n在构造器的函数体中，可以看到 `node` 属性被操作了。其 z 轴位置被改变（以便球体始终显示在背景之前）；添加了红色、绿色和蓝色球的精灵图像；并且节点被设为隐藏状态。当你创建\
    \ `Ball` 的实例时，这个 `init` 方法会被自动调用：\n\n```\nvar b = Ball()\n```\n\n像这样的指令会完成几件事：\n\
    \n- 内存被预留用于存储 `Ball` 的一个实例。\n- `Ball` 内部的存储属性被赋予值，这些值被存储在内存中。\n- 调用了 `Ball` 的构造器。\n\
    - 对新创建的实例的引用被赋值给变量 `b`。\n\n由于构造器与方法非常相似，你也可以向其添加参数。例如，考虑以下构造器：\n\n```\ninit(position:\
    \ CGPoint) {\n    node.zPosition = 1\n    node.addChild(red)\n    node.addChild(green)\n\
    \    node.addChild(blue)\n    node.hidden = true\n    node.position = position\n\
    }\n```\n\n这个构造器接受一个位置参数，你可以像下面这样使用它来创建一个 `Ball` 实例：\n\n```\nvar ballPosition =\
    \ CGPoint(x: 10, y: -50)\nvar anotherBall = Ball(position: ballPosition)\n```\n\
    \n注意，在调用构造器时，构造器参数始终需要提供标签。当然，你也可以显式指定不使用标签，就像在方法中可以做的那样：\n\n```\ninit(_ position:\
    \ CGPoint) {\n    // 构造器代码放在这里\n}\n```\n\n一个类可以有多个不同的构造器，每个构造器都有不同的参数，用于创建类的实例。也可以定义一个类而不显式添加\
    \ `init` 方法。在这种情况下，Swift 会使用内置的默认构造器，它仅仅为属性设置已定义的默认值。实际上，这正是 Painter4 示例中所发生的情况，其中\
    \ `Ball` 类的定义如下：\n\n```\nclass Ball {\n    var node = SKNode()\n    var red =\
    \ SKSpriteNode(imageNamed: \"spr_ball_red\")\n    var green = SKSpriteNode(imageNamed:\
    \ \"spr_ball_green\")\n    var blue = SKSpriteNode(imageNamed: \"spr_ball_blue\"\
    )\n    var velocity = CGPoint.zeroPoint\n    var readyToShoot = false\n}\n```\n\
    \n这个 `Ball` 类中的每一个属性都有一个默认值。例如，`readyToShoot` 的默认值是 `false`，而球的速度默认值是零。当创建这个 `Ball`\
    \ 类的实例时，默认构造器被调用，它将默认值赋给这些属性。Swift 编译器要求，在创建类的实例时，类中的每一个属性都必须被初始化。这一要求迫使开发者确保实例中的所有数据都已被正确赋值，从而减少了与未初始化数据相关的错误。\n\
    \n最后，了解构造器可以调用其他构造器是很有益处的。Swift 区分了指定构造器和便利构造器。指定构造器能够完整地初始化一个实例，包括其所有属性。`Ball`\
    \ 中的 `init` 方法就是这类构造器的一个很好的例子。便利构造器的语法略有不同：\n\n```\nconvenience init(position:\
    \ CGPoint) {\n    self.init()\n    node.position = position\n}\n```\n\n如你所见，它使用\
    \ `convenience` 关键字来表明这不是一个指定构造器。便利构造器的用途是在指定构造器之上提供一层封装，以便更容易地创建类的实例。便利构造器必须在其函数体中调用另一个构造器，并且必须在它可以为任何属性赋值之前完成这一调用。在这个例子中，第一行代码调用了指定构造器。它使用了关键字\
    \ `self`，稍后我会更详细地介绍这个关键字。除了调用指定构造器，你也可以调用另一个便利构造器（而这个便利构造器又会调用另一个构造器）。这就形成了一条便利构造器的调用链。唯一需要记住的重要事项是，最终必须调用一个指定构造器。便利构造器能够调用另一个构造器是非常有用的特性。它允许你编写更简短的代码。这个便利构造器只包含两行代码，而下面的指定构造器有六行代码：\n\
    \n```\ninit(position: CGPoint) {\n    node.zPosition = 1\n    node.addChild(red)\n\
    \    node.addChild(green)\n    node.addChild(blue)\n    node.hidden = true\n \
    \   node.position = position\n}\n```\n\n此外，基本的对象初始化代码现在被编写在类中的一个单一位置：即指定构造器中。这意味着，如果那段代码存在错误，并且你为该构造器修复了它，那么对于任何依赖于这个指定构造器的便利构造器，该错误也会自动得到修复。\n\
    \n**注意**  \n构造器的另一个名称是构造函数。后者是 C# 和 Java 等语言中常用的术语。\n"
- fmt: '## The Self Keyword


    Now that you’ve defined a class for a few types of objects in Painter, let’s reexamine
    the code that describes what objects can do. For example, in Painter4, the cannon
    input handling was defined in the `handleInputCannon` method, part of the `GameScene`
    class. Here is an excerpt of the body of that method:


    `let opposite = touchLocation.y - cannon.node.position.y`


    `let adjacent = touchLocation.x - cannon.node.position.x`


    `cannon.barrel.zRotation = atan2(opposite, adjacent)`


    By looking at this code, it’s very easy to see which objects are being manipulated.
    In the first line, you retrieve the y-position from the node that is a part of
    the `cannon` object, and use that to calculate the opposite side of a triangle.
    In the last line of code, you’re setting the rotation around the z axis of the
    barrel sprite belonging to the cannon to a certain value, calculated using the
    opposite and adjacent sides of the same triangle. The reason why it’s easy to
    see what objects are being manipulated is because in this simple situation, each
    object has a unique name that you use to refer to it.


    Now let’s look at what that same code fragment looks like in the `Cannon` class:


    `let opposite = touchLocation.y - node.position.y`


    `let adjacent = touchLocation.x - node.position.x`


    `barrel.zRotation = atan2(opposite, adjacent)`


    The code looks almost the same, except there no longer is a reference to a `cannon`
    object. That’s because in the methods of the `Cannon` class, you don’t know the
    name of the object. For all you know, a developer could have written the following
    lines of code in the `GameScene` class:


    ```

    var cannon = Cannon()

    var anotherCannon = Cannon()

    var chrisTheCrazyCannon = Cannon()

    var aVariableNameWayTooLongForSuchASimpleThingAsACannon = Cannon()


    cannon.handleInput()

    anotherCannon.handleInput()

    chrisTheCrazyCannon.handleInput()

    aVariableNameWayTooLongForSuchASimpleThingAsACannon.handleInput()

    ```


    The `handleInput` method is called four times, each time on a different object.
    This means that inside the body of `handleInput`, sometimes `barrel` may refer
    to `anotherCannon.barrel`, sometimes it refers to `cannon.barrel`, and sometimes
    it refers to a `barrel` object belonging to yet another `Cannon` instance. In
    other words, in the body of `handleInput`, you never know the name of the object
    that the method is manipulating.


    Now let’s take another look at this line of code in the body of `handleInput`:


    `let opposite = touchLocation.y - node.position.y`


    What does `node` refer to? If `cannon.handleInput` is called, it refers to `cannon.node`.
    If `anotherCannon.handleInput` is called, it refers to `anotherCannon.node`. When
    you call a method on an object, the compiler makes a binding between that object
    and the method, and it makes sure that references to properties are properly resolved
    when the method is executed.


    Even if you don’t know the name of the object you are manipulating inside a method,
    you can still refer to that object, using the keyword `self`. In other words,
    `self` refers to the object you are currently manipulating. So instead of the
    instruction above, you could have written this:


    `let opposite = touchLocation.y – self.node.position.y`


    So, for example, if `cannon.handleInput` is called, you use `self` in the body
    of `handleInput` to refer to the instance that `cannon` refers to. So why not
    simply avoid the use of `self` altogether and write the following?


    `let opposite = touchLocation.y – cannon.node.position.y`


    This code will fail for several reasons. First, it means that your code will now
    only be suitable to work with a single `Cannon` instance, called `cannon`. That’s
    not desirable. The whole point of using a class to define a type is that you can
    create as many instances of the class that you need. Second, this is never going
    to work since `cannon` is actually part of the `GameScene` class. So if you refer
    to that object using the name `cannon`, you need to indicate where it belongs.
    In Painter4, it is part of the object that is an instance of `GameScene`, so you
    need to know the name of that instance as well. Where is this instance created?
    Have a look at the `GameViewController` class, and you’ll see this line:


    `let scene = GameScene(size: viewSize)`


    Okay, so can you then write `scene.cannon` in the `handleInput` method of the
    `Cannon` class? Unfortunately, no, you can’t. The `scene` variable is a local
    variable in the `viewWillLayoutSubviews` of the `GameViewController` class, so
    there is no way to access it outside that method.


    And this is why the `self` keyword is useful. It allows you to easily refer to
    the object you are manipulating in a method, without putting any restriction on
    the users of the class you have written. They can name the instance any way they
    like, and they can make as many instances of the class as they like.


    However, one thing you may realize now is that as soon as you introduce multiple
    classes in your game, it can be challenging to make sure that you have access
    to the objects you need. For example, take a look at the following instruction
    in the `updateBall` method of Painter4:


    `ball.red.hidden = cannon.red.hidden`


    This complicates things. It seems that the ball requires access to the `cannon`
    object. So, how do you get that object in the `updateDelta` method of the `Ball`
    class? Let’s redesign the code in order to properly solve this.'
