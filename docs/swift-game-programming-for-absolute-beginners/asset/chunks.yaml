    \ 瓦片类\n\n`Tile` 类与 Penguin Pairs 中使用的类非常相似，但有一些不同之处。首先，你使用枚举类型定义了不同种类的瓦片：\n\n\
    ```\nenum TileType {\n    case Wall\n    case Background\n    case Platform\n\
    }\n```\n\n然后，在 `Tile` 类中，你定义了一个属性 `tileType` 来存储实例所代表的瓦片类型。除了这些基本的瓦片类型之外，你还有冰瓦片和热瓦片，它们是普通瓦片或平台瓦片的特殊版本。在文本文件中，冰瓦片用\
    \ `*` 字符表示（如果是平台瓦片则为 `@` 字符），热瓦片用 `^` 字符表示（如果是平台版本则为 `+` 字符）。你向 `Tile` 类添加了两个布尔属性来表示这些不同种类的瓦片。以下是\
    \ `Tile` 的初始化方法：\n\n```\nconvenience init() {\n    self.init(imageNamed: \"spr_wall\"\
    , type: .Background)\n}\n\ninit(imageNamed: String, type: TileType) {\n    let\
    \ texture = SKTexture(imageNamed: imageNamed)\n    super.init(texture: texture,\
    \ color: UIColor.whiteColor(), size: texture.size())\n    self.type = type\n}\n\
    \nrequired init?(coder aDecoder: NSCoder) {\n    fatalError(\"init(coder:) has\
    \ not been implemented\")\n}\n```\n\n如你所见，有一个便捷初始化方法允许你创建一个 `Background` 类型的 `Tile`\
    \ 实例。这使得创建 `Tile` 实例更容易，因为你无需提供任何参数值。例如，以下指令创建了一个简单的背景（透明）瓦片：\n\n```\nvar myTile\
    \ = Tile()\n```\n\n在 `Tile` 的初始化方法中，你使用了 `type` 属性来设置和获取瓦片的类型。在 `type` 属性的设置部分，你将一个新值赋给\
    \ `tp` 属性，并使用布尔逻辑，如果是背景瓦片则将其隐藏。以下是实现这一点的两行代码（完整的 `Tile` 类，请参见 TickTick1 示例）：\n\
    \n```\ntileType = newValue\nself.hidden = tileType == .Background\n```\n\n现在，让我们看看\
    \ `LevelState` 类以及 `Tile` 实例是如何创建的。\n\n# LevelState 类\n\n本节展示了在 Tick Tick 中如何设计\
    \ `LevelState` 类。它的实现方式与 Penguin Pairs 非常相似。在 `LevelState` 类的初始化方法中，你做了几件事：\n\n\
    -   创建背景精灵游戏对象。\n-   添加一个“退出”按钮。\n-   根据关卡数据创建基于瓦片的游戏世界。\n\n前两件事很直接。请查看示例代码中的\
    \ `LevelState` 类，了解它们是如何工作的。创建基于瓦片的游戏世界是通过一个名为 `loadTile` 的独立方法来完成的。根据从文本文件中读取的瓦片字符，将创建不同的\
    \ `Tile` 对象。第一步是创建一个 `TileField` 实例，其高度和宽度取自文本文件：\n\n```\ntileField = TileField(rows:\
    \ height, columns: width, cellWidth: 72, cellHeight: 55)\ntileField.name = \"\
    tileField\"\nworld.addChild(tileField)\n```\n\n如你所见，瓦片字段被添加到一个名为 `world` 的独立节点中，而“退出”按钮则直接添加到关卡节点：\n\
    \n```\nquitButton.zPosition = Layer.Overlay\nquitButton.position = GameScreen.instance.topRight\
    \ - quitButton.center - CGPoint(x: 10, y: 10)\nself.addChild(quitButton)\n```\n\
    \n这样做是有原因的。你想将诸如“退出”按钮或帮助框架之类的覆盖层与实际基于瓦片的游戏世界分开，因为稍后你将为这个平台游戏添加侧向滚动。这意味着游戏世界需要在屏幕上移动，而按钮则应保持在原位。只有当实际游戏世界存储在一个独立的节点中时，才能实现这一点。然后，你可以更改该节点的位置（因此也就是游戏世界的位置），而不会影响任何按钮或其他覆盖层。第\
    \ 26 章 展示了如何为你的游戏添加垂直和水平滚动。\n\n在读取了定义关卡的文本文件行之后，你创建了 `Tile` 对象并将它们添加到 `TileField`\
    \ 对象中。你使用了一个嵌套的 `for` 循环来实现这一点：\n\n```\nfor i in 0..<height {\n    var currLine\
    \ = lines[height-1-i]\n    var j = 0\n    for c in currLine {\n        tileField.layout.add(loadTile(c,\
    \ x: j, y: i))\n        j++\n    }\n}\n```\n\n嵌套的 `for` 循环检查了你从文本文件中读取的所有字符。`loadTile`\
    \ 方法根据给定的字符以及瓦片在网格中的 x 和 y 位置，为你创建一个 `Tile` 对象。\n\n在 `loadTile` 方法中，你需要根据作为参数传递的字符加载不同的瓦片。对于每种类型的瓦片，你向\
    \ `LevelState` 类添加一个方法来创建那种特定类型的瓦片。例如，`loadWaterTile` 加载一个背景瓦片，并在其上方放置一个水滴：\n\n\
    ```\nfunc loadWaterTile(x: Int, y: Int) -> SKNode {\n    var w = WaterDrop()\n\
    \    w.position = tileField.layout.toPosition(x, row: y)\n    w.position.y +=\
    \ 10\n    w.zPosition = Layer.Scene1\n    world.addChild(w)\n    self.waterDrops.append(w)\n\
    \    return Tile()\n}\n```\n\n这个特定的示例创建了一个 `WaterDrop` 实例，并将其放置在瓦片的中心。你将每个水滴放置得比瓦片中心高\
    \ 10 个点，这样它就不会弹跳到下面瓦片的上方。请查看 `Level` 类，了解如何创建每个关卡中的各种瓦片和对象。图 22-2 显示了第一个关卡中对象的屏幕截图（玩家角色除外，你将在后续章节中处理它）。\n\
    \n![A978-1-4842-0650-8_22_Fig2_HTML.jpg](img/A978-1-4842-0650-8_22_Fig2_HTML.jpg)\n\
    \n*图 22-2.* Tick Tick 第一个关卡的遊戲世界\n\n# 本章所学\n\n在本章中，你学习了以下内容：\n\n-   如何搭建 Tick\
    \ Tick 游戏的整体结构\n-   如何创建一个弹跳的水滴\n"
- fmt: '# 23. Animation


    Electronic supplementary material The online version of this chapter (doi:[10.1007/978-1-4842-0650-8_23](http://dx.doi.org/10.1007/978-1-4842-0650-8_23))
    contains supplementary material, which is available to authorized users.


    In this chapter, you will see how to add animations to your game. In the games
    you’ve developed until now, game objects could move around on the screen, but
    adding something like a running character to a game is slightly more challenging.
    In this chapter, you will write a program that contains a character walking from
    left to right on the screen. The character is controlled by the player pressing
    left and right buttons on the screen.


    ## What Is Animation?


    Before you look into how to program a character walking around on the screen,
    you first have to think about what animation is. To grasp this, you have to go
    back to the 1930s, when several animation studios (among them Walt Disney) produced
    the first cartoons in black and white.


    A cartoon is actually a very fast sequence of still images, also called frames.
    A television draws these frames at a very high rate, about 25-30 times per second.
    When the image varies each time, your brain interprets this as motion. This special
    feature (also called the phi phenomenon) of the human brain is very useful, especially
    when you want to program games that contain moving or animated objects.


    You used this feature in the previous games you developed in this book. In every
    iteration of the game loop, you draw a new “frame” on the screen. By drawing sprites
    at different positions every time, you give the impression that the sprites move.
    However, this isn’t really what is happening: you’re simply drawing the sprite
    at different positions many times per second, which makes the player think the
    sprite is moving.


    In a similar fashion, you can draw a walking or running character. In addition
    to moving the sprite, you draw a slightly different sprite every time. By drawing
    a sequence of sprites, each of which represents part of a walking motion, you
    can create the illusion that a character is walking on the screen. An example
    of such a sequence of sprites is shown in Figure [23-1](#A978-1-4842-0650-8_23_Chapter.html#Fig1).


    ![A978-1-4842-0650-8_23_Fig1_HTML.jpg](A978-1-4842-0650-8_23_Fig1_HTML.jpg)


    Figure 23-1.


    A sequence of images representing a walking motion


    ### Animations in Games


    There are different reasons for putting animations in games. When you create 3D
    games, animation is normally necessary to enhance realism, but for 2D games this
    isn’t always the case. Still, animations can considerably enrich a game.


    Animation brings objects to life. But it doesn’t have to be complicated. The simple
    animation of a character closing and opening its eyes results in a strong feeling
    that the character is alive. Animated characters are also easier to relate to.
    If you look at a game like Cut the Rope, the main character (named Om Nom) is
    simply sitting in a corner. But from time to time the character makes some funny
    moves to show you it’s there and wants you to bring it food. This creates a very
    effective motivation for the player to continue playing the game.


    Animations also help draw the player’s attention to a certain object, task, or
    event. For example, having a small animation on a button makes it clearer to the
    player that they have to press the button. And a bouncing water drop or a rotating
    star indicates that this object should be collected or avoided. Animations can
    also be used to provide feedback. When a button moves downward when you tap on
    it with your finger, it’s immediately obvious that the button tap was successful.


    However, creating animations is a lot of work. So think carefully beforehand about
    where animations are needed and where they can be avoided, to save time and money.


    ## Texture Atlases


    For animated characters, you usually design one sequence of sprites for each type
    of movement. Some animations consist of only a few sprites. For example, the Tick
    Tick game contains a rocket that flies through the screen. The rocket is animated
    using three frames only (see Figure [23-2](#A978-1-4842-0650-8_23_Chapter.html#Fig2)).


    ![A978-1-4842-0650-8_23_Fig2_HTML.jpg](A978-1-4842-0650-8_23_Fig2_HTML.jpg)


    Figure 23-2.


    The frames of the rocket animation


    Other animations may have many more frames. An example is the bomb explosion animation
    in Tick Tick, which has 49 frames. As you add more animations to your game, the
    number of sprites needed (in 1x, 2x, and for some games even 3x resolutions) can
    dramatically increase. This puts a strain on the device in terms of memory necessary
    to store all the image data, but also processing power to load the images from
    files and display them on the screen fast enough. A very common trick to reduce
    image loading time is to put multiple sprites on a single image. For example,
    you could put all the buttons needed for the title screen in the same file, and
    when you need to display a button, you show that part of the image representing
    the button. The SpriteKit framework has a neat solution for this called a texture
    atlas. A texture atlas is basically a collection of sprites/textures that is optimally
    stored in as few image files as possible. If you have a lot of images in your
    game, texture atlases help make the game load much faster. The nice thing is that
    as a developer, you don’t have to worry about how the sprites are stored in the
    image file. You simply tell the Xcode environment that all the sprites in a folder
    belong to an atlas.


    In order to use texture atlases in Xcode, you can simply put sprites in a folder
    that has a name ending with `.atlas`, and then drag that folder into the project.
    For example, in the AnimationSample project belonging to this chapter, you can
    see two atlases: `spr_player_run.atlas` and `spr_player_idle.atlas` (representing
    running and idle animations). If you look inside `spr_player_run.atlas`, you see
    that it contains quite a few different sprites. There is one important naming
    convention that you need to remember for texture atlases: if you use sprites at
    different resolutions, you should add “@1x,” “@2x,” or “@3x” at the end of the
    file name to indicate the resolution of the sprite. Other than that, you can choose
    any sprite name you like. In this case, name each sprite the same as its atlas
    name, add a number, and then indicate the resolution of the sprite.


    Creating a texture atlas in your code is very simple. This is how you create a
    texture atlas from the `spr_player_run.atlas` file:


    ```

    let atlas = SKTextureAtlas(named: "spr_player_run")

    ```


    You can now access specific textures within the atlas as follows:


    ```

    let texture = atlas.textureNamed("spr_player_run0")

    ```


    The texture names in the atlas correspond to the names that you give the files,
    minus the resolution indication. You can then use this texture to create a node
    and add it to the game world:


    ```

    let spriteNode = SKSpriteNode(texture: texture)

    addChild(spriteNode)

    ```'
