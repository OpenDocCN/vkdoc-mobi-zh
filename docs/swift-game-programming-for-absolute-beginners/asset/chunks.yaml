    \n`var minVelocity = CGFloat(40)`\n\n在计算随机速度时，你会用到这个最小速度值，如下所示：\n\n`velocity =\
    \ CGPoint(x: 0.0, y: randomCGFloat() * -40 - minVelocity)`\n\n`x`方向的速度为零，因为油漆罐不会水平移动——它们只会垂直下落。`y`方向的速度通过随机数生成器计算得到。你将这个随机值乘以`-40`，再减去`minVelocity`属性中存储的值，从而得到一个介于`-minVelocity`和`-minVelocity-40`之间的负`y`速度。如果`minVelocity`等于`40`，那么结果将是一个介于`-40`和`-80`之间的`y`速度。\n\
    \n要计算随机颜色，你同样会使用随机数生成器，但你需要在少数几个离散选项（红色、绿色或蓝色）中进行选择。这正是原始`arc4random_uniform`函数的用武之地。该函数允许传入一个可选参数来指定范围：`arc4random_uniform(x)`返回一个介于`0`和`x-1`之间的数字。例如，请看这条指令：\n\
    \n`let randomval = arc4random_uniform(3)`\n\n变量`randomval`现在将包含`0`、`1`或`2`中的一个值。利用一些布尔逻辑，现在就可以很直接地设置油漆罐的颜色了：\n\
    \n`red.hidden = randomval != 0`\n\n`green.hidden = randomval != 1`\n\n`blue.hidden\
    \ = randomval != 2`\n\n既然你已经能够生成随机颜色和速度，那么是时候定义油漆罐的最终行为了。\n\n## 更新油漆罐\n\n`PaintCan`类中的`updateDelta`方法至少应该完成以下工作：\n\
    \n*   如果油漆罐当前尚未下落，则为其设置随机生成的速度和颜色\n*   通过将速度叠加到位置上来更新罐子位置\n*   检查罐子是否已完全落下，并在这种情况下重置它\n\
    \n对于第一个任务，你可以使用一个`if`指令来检查罐子当前是否处于隐藏状态。此外，你还需要为罐子的出现引入一点不可预测性。为了实现这种效果，只有当`randomCGFloat`函数生成的某个随机数小于阈值`0.01`时，你才分配随机的速度和颜色。由于是均匀分布，大约每`100`个随机数中，只有`1`个会小于`0.01`。以下是实现此功能的`if`指令：\n\
    \n```\nif node.hidden {\n    if randomCGFloat() > 0.01 {\n        return\n   \
    \ }\n    // 到达此处的代码将仅偶尔执行\n}\n```\n\n除了这个罐子初始化步骤，你还需要通过将当前速度叠加到位置上来更新罐子位置，并像处理球那样考虑经过的游戏时间：\n\
    \n```\nnode.position.x += velocity.x * CGFloat(delta)\nnode.position.y += velocity.y\
    \ * CGFloat(delta)\n```\n\n现在你已经初始化了罐子并更新了它的位置，你需要处理一些特殊情况。对于油漆罐，你必须检查它是否已经落到了游戏世界之外。如果是这样，你需要重置它。好消息是，你已经编写了一个方法来检查某个位置是否在游戏世界之外：`GameWorld`类中的`isOutsideWorld`方法。你现在可以再次使用该方法来检查油漆罐的位置是否在游戏世界之外。如果是这种情况，你需要重置罐子，使其再次被放置在屏幕顶部的上方。为了确保油漆罐在重置前完全离开屏幕，你首先需要计算罐子的顶部位置：\n\
    \n```\nlet top = CGPoint(x: node.position.x, y: node.position.y + red.size.height/2)\n\
    ```\n\n然后，你使用一个`if`指令来检查罐子是否已经落出屏幕。如果是这种情况，你就隐藏该罐子：\n\n```\nif GameScene.world.isOutsideWorld(top)\
    \ {\n    node.hidden = true\n}\n```\n\n最后，为了让游戏更具挑战性，每次执行`updateDelta`方法时，你都稍微增加罐子的最小速度：\n\
    \n```\nminVelocity += 0.02\n```\n\n由于最小速度缓慢增加，游戏会随着时间推移而变得愈发困难。\n\nPainter5 示例的所有代码都可以在本章附带的示例文件夹中找到。图\
    \ 7-2 展示了 Painter5 示例的截图，其中现在有了三个下落的油漆罐。\n\n![A978-1-4842-0650-8_7_Fig2_HTML.jpg](img/A978-1-4842-0650-8_7_Fig2_HTML.jpg)\n\
    \n**图 7-2.**  \nPainter5 示例，含有一个大炮、一个球和三个下落的油漆罐\n\n## 本章所学内容\n\n在本章中，你学习了以下内容：\n\
    \n*   如何在游戏中定义和使用多个类\n*   如何创建类型/类的多个实例\n*   如何向游戏中添加随机性以增加重复可玩性\n"
- fmt: "# Colors and Collisions\n\n**Electronic supplementary material** The online\
    \ version of this chapter (doi:[10.1007/978-1-4842-0650-8_8](http://dx.doi.org/10.1007/978-1-4842-0650-8_8))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    By now, you’ve implemented quite a large part of the Painter game. You’ve seen\
    \ how to define game object classes by using the class mechanism. By using classes,\
    \ you gain more control over how game objects are structured and how to create\
    \ game objects of a certain type. Each class is defined in its own Swift file.\
    \ That way, when you need a cannon or a ball with the same behavior in a future\
    \ game you’re working on, you can simply copy these files and create instances\
    \ of these game objects in your game.\n\nWhen you look more closely at the definition\
    \ of a class, you can see that a class defines the internal structure of an object\
    \ (which properties it consists of) as well as methods that manipulate this object\
    \ in some way. These methods can help define more precisely the possibilities\
    \ and limitations of an object. For example, if someone wanted to reuse the `Ball`\
    \ class, they wouldn’t need a lot of detailed information about how a ball is\
    \ structured. Simply creating an instance and calling the game-loop methods suffices\
    \ to add a flying ball to the game. Generally, when you design a program, whether\
    \ it’s a game or a completely different kind of application, it’s important to\
    \ clearly define what is possible with objects of a certain class. Methods are\
    \ one way to do that. This chapter shows you another way to define an object’s\
    \ possibilities: by defining computed properties. The chapter also introduces\
    \ a type used for representing colors, and shows how to handle a collision between\
    \ the ball and a paint can (if that happens, the paint can needs to change color).\n\
    \n## A Different Way to Represent Colors\n\nIn the previous versions of Painter,\
    \ you dealt with colors rather practically. For example, in the `Cannon` class,\
    \ you kept track of the current color by using the hidden statuses of the red,\
    \ green, and blue cannon sprites. You did a similar thing in the `Ball` class,\
    \ except you used colored ball sprites instead of cannon color indicator sprites.\
    \ For example, here are the instructions that update the ball color according\
    \ to the current cannon color:\n\n```\nred.hidden = GameScene.world.cannon.red.hidden\n\
    green.hidden = GameScene.world.cannon.green.hidden\nblue.hidden = GameScene.world.cannon.blue.hidden\n\
    ```\n\nBecause of the way these instructions work, the `Ball` class needs to have\
    \ knowledge about the sprites that the `Cannon` class uses internally. That’s\
    \ a pity, since classes are supposed to help separate code, not introduce dependencies.\
    \ Another issue is that it’s not really easy to understand what the code means.\
    \ To an outsider looking at the code in the `Cannon` or `Ball` class, it could\
    \ seem like you copy sprite hidden statuses for no particular reason. Of course,\
    \ you could add comments to your code to explain what you’re doing, but that doesn’t\
    \ solve the core of the problem. Ideally, code should be written in such a logical\
    \ fashion that it almost explains itself.\n\nWouldn’t it be better if you could\
    \ define colors more uniformly and use that definition in all the game-object\
    \ classes to represent different colors? Of course it would! Another reason to\
    \ start unifying the usage of colors in your games now is that the current approach\
    \ will take much longer to program if you ever decide to increase the number of\
    \ possible colors in the game (to 4, 6, 10, or more).\n\nThe Painter6 example\
    \ belonging to this chapter is a new version of the Painter game where colors\
    \ are dealt with in a different way, by using the `UIColor` type you’ve seen before.\
    \ `UIColor` has a few useful class methods that produce different colors:\n\n\
    ```\nlet redColor = UIColor.redColor()\nlet greenColor = UIColor.greenColor()\n\
    let blueColor = UIColor.blueColor()\n```\n\n## Controlled Data Access for Objects\n\
    \nThree game-object classes represent an object of a certain color: `Cannon`,\
    \ `Ball`, and `PaintCan`. For simplicity, let’s start with how you can modify\
    \ the `Cannon` class to use the color definitions from the previous section. This\
    \ is the list of properties in the `Cannon` class:\n\n```\nvar node = SKNode()\n\
    var barrel = SKSpriteNode(imageNamed: \"spr_cannon_barrel\")\nvar red = SKSpriteNode(imageNamed:\
    \ \"spr_cannon_red\")\nvar green = SKSpriteNode(imageNamed: \"spr_cannon_green\"\
    )\nvar blue = SKSpriteNode(imageNamed: \"spr_cannon_blue\")\n```\n\nWhat you could\
    \ do is add another stored property that represents the current color of the cannon:\n\
    \n```\nvar color = UIColor.redColor()\n```\n\nIf you want to know the color of\
    \ the cannon, you can then simply check the value of this property. However, this\
    \ isn’t an ideal solution. You now store redundant data because the color information\
    \ is represented by both the color property as well as the hidden statuses of\
    \ the three cannon sprites. You might introduce bugs this way if you forget to\
    \ change one of these properties when the color of the cannon changes.\n\nAnother\
    \ solution is to define two methods that allow users of the `Cannon` class to\
    \ retrieve and set the color information. You can then leave the property list\
    \ as is but add methods to read and write a color value. For example, you could\
    \ add the following two methods to the `Cannon` class:\n\n```\nfunc getColor()\
    \ -> UIColor {\n    if (!red.hidden) {\n        return UIColor.redColor()\n  \
    \  } else if (!green.hidden) {\n        return UIColor.greenColor()\n    } else\
    \ {\n        return UIColor.blueColor()\n    }\n}\n\nfunc setColor(col : UIColor)\
    \ {\n    if col != UIColor.redColor() && col != UIColor.greenColor()\n       \
    \ && col != UIColor.blueColor() {\n        return\n    }\n    red.hidden = col\
    \ != UIColor.redColor()\n    green.hidden = col != UIColor.greenColor()\n    blue.hidden\
    \ = col != UIColor.blueColor()\n}\n```\n\nNow the user of the `Cannon` class doesn’t\
    \ need to know that internally you use the sprite hidden statuses to determine\
    \ the current color of the cannon. The user can simply pass along a color definition\
    \ to read or write the color of the cannon:\n\n```\nmyCannon.setColor(UIColor.blueColor())\n\
    var cannonColor = myCannon.getColor()\n```\n\nNote that the code inside these\
    \ methods contains a safety mechanism. The `getColor` method will never return\
    \ anything other than either a red, green, or blue color. Similarly, `setColor`\
    \ will not do anything unless the color passed as a parameter is either red, green,\
    \ or blue. This is a nice approach because it provides some security that objects\
    \ of type `Cannon` will maintain a consistent state. For example, `setColor` makes\
    \ sure that there is always a single sprite that is not hidden. Of course, at\
    \ the moment that doesn’t mean so much since users of the `Cannon` class can still\
    \ change the hidden statuses by simply accessing the sprite properties. In [Chapter\
    \ 16](#A978-1-4842-0650-8_16_Chapter.html), you’ll see a way to protect the data\
    \ inside your objects more so that this is no longer possible.\n\nSometimes, the\
    \ methods that read and write data in an object are called getters and setters\
    \ by programmers. In many object-oriented programming languages, methods are the\
    \ only way to access the data inside an object, so for each property that needs\
    \ to be accessible outside of the class, programmers added a getter and a setter.\
    \ Swift provides a feature that is relatively new to object-oriented programming\
    \ languages: computed properties. A computed property is a replacement for a getter\
    \ and a setter. It defines what happens when you retrieve data from an object\
    \ and what happens when you assign a value to data inside an object."
  raw: '# 8. Colors and Collisions


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​8](http://dx.doi.org/10.1007/978-1-4842-0650-8_8))
    contains supplementary material, which is available to authorized users.


    By now, you’ve implemented quite a large part of the Painter game. You’ve seen
    how to define game object classes by using the class mechanism. By using classes,
    you gain more control over how game objects are structured and how to create game
    objects of a certain type. Each class is defined in its own Swift file. That way,
    when you need a cannon or a ball with the same behavior in a future game you’re
    working on, you can simply copy these files and create instances of these game
    objects in your game.


    When you look more closely at the definition of a class, you can see that a class
    defines the internal structure of an object (which properties it consists of)
    as well as methods that manipulate this object in some way. These methods can
    help define more precisely the possibilities and limitations of an object. For
    example, if someone wanted to reuse the `Ball` class, they wouldn’t need a lot
    of detailed information about how a ball is structured. Simply creating an instance
    and calling the game-loop methods suffices to add a flying ball to the game. Generally,
    when you design a program, whether it’s a game or a completely different kind
    of application, it’s important to clearly define what is possible with objects
    of a certain class. Methods are one way to do that. This chapter shows you another
    way to define an object’s possibilities: by defining computed properties. The
    chapter also introduces a type used for representing colors, and shows how to
    handle a collision between the ball and a paint can (if that happens, the paint
    can needs to change color).


    ## A Different Way to Represent Colors


    In the previous versions of Painter, you dealt with colors rather practically.
    For example, in the `Cannon` class, you kept track of the current color by using
    the hidden statuses of the red, green, and blue cannon sprites. You did a similar
    thing in the `Ball` class, except you used colored ball sprites instead of cannon
    color indicator sprites. For example, here are the instructions that update the
    ball color according to the current cannon color:


    `red.hidden = GameScene.world.cannon.red.hidden`


    `green.hidden = GameScene.world.cannon.green.hidden`


    `blue.hidden = GameScene.world.cannon.blue.hidden`


    Because of the way these instructions work, the `Ball` class needs to have knowledge
    about the sprites that the `Cannon` class uses internally. That’s a pity, since
    classes are supposed to help separate code, not introduce dependencies. Another
    issue is that it’s not really easy to understand what the code means. To an outsider
    looking at the code in the `Cannon` or `Ball` class, it could seem like you copy
    sprite hidden statuses for no particular reason. Of course, you could add comments
    to your code to explain what you’re doing, but that doesn’t solve the core of
    the problem. Ideally, code should be written in such a logical fashion that it
    almost explains itself.


    Wouldn’t it be better if you could define colors more uniformly and use that definition
    in all the game-object classes to represent different colors? Of course it would!
    Another reason to start unifying the usage of colors in your games now is that
    the current approach will take much longer to program if you ever decide to increase
    the number of possible colors in the game (to 4, 6, 10, or more).


    The Painter6 example belonging to this chapter is a new version of the Painter
    game where colors are dealt with in a different way, by using the `UIColor` type
    you’ve seen before. `UIColor` has a few useful class methods that produce different
    colors:


    `let redColor = UIColor.redColor()`


    `let greenColor = UIColor.greenColor()`


    `let blueColor = UIColor.blueColor()`


    ## Controlled Data Access for Objects


    Three game-object classes represent an object of a certain color: `Cannon`, `Ball`,
    and `PaintCan`. For simplicity, let’s start with how you can modify the `Cannon`
    class to use the color definitions from the previous section. This is the list
    of properties in the `Cannon` class:


    `var node = SKNode()`


    `var barrel = SKSpriteNode(imageNamed:"spr_cannon_barrel")`


    `var red = SKSpriteNode(imageNamed: "spr_cannon_red")`


    `var green = SKSpriteNode(imageNamed: "spr_cannon_green")`


    `var blue = SKSpriteNode(imageNamed: "spr_cannon_blue")`


    What you could do is add another stored property that represents the current color
    of the cannon:


    `var color = UIColor.redColor()`


    If you want to know the color of the cannon, you can then simply check the value
    of this property. However, this isn’t an ideal solution. You now store redundant
    data because the color information is represented by both the color property as
    well as the hidden statuses of the three cannon sprites. You might introduce bugs
    this way if you forget to change one of these properties when the color of the
    cannon changes.


    Another solution is to define two methods that allow users of the `Cannon` class
    to retrieve and set the color information. You can then leave the property list
    as is but add methods to read and write a color value. For example, you could
    add the following two methods to the `Cannon` class:


    `func getColor() -> UIColor {`


        `if (!red.hidden) {`


            `return UIColor.redColor()`


        `} else if (!green.hidden) {`


            `return UIColor.greenColor()`


        `} else {`


            `return UIColor.blueColor()`


        `}`


    `}`


    `func setColor(col : UIColor) {`


        `if col != UIColor.redColor() && col != UIColor.greenColor()`


            `&& col != UIColor.blueColor() {`


            `return`


        `}`


        `red.hidden = col != UIColor.redColor()`


        `green.hidden = col != UIColor.greenColor()`


        `blue.hidden = col != UIColor.blueColor()`


    `}`


    Now the user of the `Cannon` class doesn’t need to know that internally you use
    the sprite hidden statuses to determine the current color of the cannon. The user
    can simply pass along a color definition to read or write the color of the cannon:


    `myCannon.setColor(UIColor.blueColor())`


    `var cannonColor = myCannon.getColor()`


    Note that the code inside these methods contains a safety mechanism. The `getColor`
    method will never return anything other than either a red, green, or blue color.
    Similarly, `setColor` will not do anything unless the color passed as a parameter
    is either red, green, or blue. This is a nice approach because it provides some
    security that objects of type `Cannon` will maintain a consistent state. For example,
    `setColor` makes sure that there is always a single sprite that is not hidden.
    Of course, at the moment that doesn’t mean so much since users of the `Cannon`
    class can still change the hidden statuses by simply accessing the sprite properties.
    In [Chapter 16](#A978-1-4842-0650-8_16_Chapter.html), you’ll see a way to protect
    the data inside your objects more so that this is no longer possible.


    Sometimes, the methods that read and write data in an object are called getters
    and setters by programmers. In many object-oriented programming languages, methods
    are the only way to access the data inside an object, so for each property that
    needs to be accessible outside of the class, programmers added a getter and a
    setter. Swift provides a feature that is relatively new to object-oriented programming
    languages: computed properties. A computed property is a replacement for a getter
    and a setter. It defines what happens when you retrieve data from an object and
    what happens when you assign a value to data inside an object.'
  trans: "\n# 颜色与碰撞\n\n**电子补充材料** 本章的在线版本（doi:[10.1007/978-1-4842-0650-8_8](http://dx.doi.org/10.1007/978-1-4842-0650-8_8)）包含补充材料，仅供授权用户使用。\n\
    \n到目前为止，你已经实现了 Painter 游戏的很大一部分。你已经了解了如何通过使用类机制来定义游戏对象类。通过使用类，你可以更好地控制游戏对象的结构以及如何创建特定类型的游戏对象。每个类都在其自己的\
    \ Swift 文件中定义。这样，当你今后开发的某个游戏中需要具有相同行为的大炮或球时，只需复制这些文件并创建这些游戏对象的实例即可。\n\n当你更仔细地查看类的定义时，你会发现类定义了对象的内部结构（它由哪些属性组成），以及以某种方式操作该对象的方法。这些方法有助于更精确地定义对象的可能性和局限性。例如，如果有人想重用\
    \ `Ball` 类，他们不需要了解球结构的很多详细信息。只需创建一个实例并调用游戏循环方法，就足以向游戏中添加一个飞行的球。通常，在设计程序时（无论是游戏还是完全不同类型的应用程序），清晰地定义某个类的对象可以做什么是非常重要的。方法是一种实现方式。本章向你展示另一种定义对象可能性的方式：通过定义计算属性。本章还介绍了用于表示颜色的类型，并展示了如何处理球与颜料罐之间的碰撞（如果发生碰撞，颜料罐需要改变颜色）。\n\
    \n## 表示颜色的另一种方式\n\n在之前版本的 Painter 中，你相当实用地处理了颜色。例如，在 `Cannon` 类中，你通过使用红色、绿色和蓝色大炮精灵的隐藏状态来跟踪当前颜色。你在\
    \ `Ball` 类中也做了类似的事情，只不过你使用的是彩色球精灵而不是大炮颜色指示精灵。例如，以下是根据当前大炮颜色更新球颜色的指令：\n\n```\n\
    red.hidden = GameScene.world.cannon.red.hidden\ngreen.hidden = GameScene.world.cannon.green.hidden\n\
    blue.hidden = GameScene.world.cannon.blue.hidden\n```\n\n由于这些指令的工作方式，`Ball` 类需要了解\
    \ `Cannon` 类内部使用的精灵。这很遗憾，因为类本应有助于分离代码，而不是引入依赖关系。另一个问题是，并不容易理解代码的含义。对于一个查看 `Cannon`\
    \ 或 `Ball` 类代码的外部人员来说，这看起来就像是在无缘无故地复制精灵的隐藏状态。当然，你可以为代码添加注释来解释你在做什么，但这并不能解决问题的核心。理想情况下，代码应以一种逻辑性强、几乎能自我解释的方式编写。\n\
    \n如果能够更统一地定义颜色，并在所有游戏对象类中使用该定义来表示不同的颜色，那岂不是更好？当然是这样！现在开始统一游戏中颜色使用的另一个原因是：如果你决定增加游戏中可能的颜色数量（增加到\
    \ 4、6、10 或更多），当前方法的编程时间将会长得多。\n\n属于本章的 Painter6 示例是 Painter 游戏的一个新版本，其中通过使用你之前见过的\
    \ `UIColor` 类型，以不同的方式处理颜色。`UIColor` 有一些有用的类方法可以生成不同的颜色：\n\n```\nlet redColor =\
    \ UIColor.redColor()\nlet greenColor = UIColor.greenColor()\nlet blueColor = UIColor.blueColor()\n\
    ```\n\n## 对象的受控数据访问\n\n有三个游戏对象类表示某种颜色的对象：`Cannon`、`Ball` 和 `PaintCan`。为简单起见，让我们从如何修改\
    \ `Cannon` 类以使用上一节中的颜色定义开始。这是 `Cannon` 类中的属性列表：\n\n```\nvar node = SKNode()\n\
    var barrel = SKSpriteNode(imageNamed: \"spr_cannon_barrel\")\nvar red = SKSpriteNode(imageNamed:\
    \ \"spr_cannon_red\")\nvar green = SKSpriteNode(imageNamed: \"spr_cannon_green\"\
    )\nvar blue = SKSpriteNode(imageNamed: \"spr_cannon_blue\")\n```\n\n你可以做的是添加另一个存储属性来表示大炮的当前颜色：\n\
    \n```\nvar color = UIColor.redColor()\n```\n\n如果你想了解大炮的颜色，那么只需检查这个属性的值即可。然而，这并不是一个理想的解决方案。你现在存储了冗余数据，因为颜色信息既由颜色属性表示，也由三个大炮精灵的隐藏状态表示。如果你在颜色发生变化时忘记更改其中一个属性，就可能会引入错误。\n\
    \n另一种解决方案是定义两个方法，允许 `Cannon` 类的用户检索和设置颜色信息。然后你可以保留属性列表不变，但添加读取和写入颜色值的方法。例如，你可以在\
    \ `Cannon` 类中添加以下两个方法：\n\n```\nfunc getColor() -> UIColor {\n    if (!red.hidden)\
    \ {\n        return UIColor.redColor()\n    } else if (!green.hidden) {\n    \
    \    return UIColor.greenColor()\n    } else {\n        return UIColor.blueColor()\n\
    \    }\n}\n\nfunc setColor(col : UIColor) {\n    if col != UIColor.redColor()\
    \ && col != UIColor.greenColor()\n        && col != UIColor.blueColor() {\n  \
    \      return\n    }\n    red.hidden = col != UIColor.redColor()\n    green.hidden\
    \ = col != UIColor.greenColor()\n    blue.hidden = col != UIColor.blueColor()\n\
    }\n```\n\n现在 `Cannon` 类的用户无需知道内部你使用精灵隐藏状态来确定大炮的当前颜色。用户只需传递一个颜色定义来读取或写入大炮的颜色：\n\
    \n```\nmyCannon.setColor(UIColor.blueColor())\nvar cannonColor = myCannon.getColor()\n\
    ```\n\n请注意，这些方法内部的代码包含一个安全机制。`getColor` 方法永远不会返回除红色、绿色或蓝色之外的颜色。同样，`setColor` 除非传递的参数是红色、绿色或蓝色，否则不会执行任何操作。这是一种很好的方法，因为它提供了某种保障，确保\
    \ `Cannon` 类型的对象将保持一个一致的状态。例如，`setColor` 确保始终有一个精灵没有被隐藏。当然，目前这并不意味着太多，因为 `Cannon`\
    \ 类的用户仍然可以通过直接访问精灵属性来更改隐藏状态。在第 16 章中，你将看到一种保护对象内部数据的方法，使得这种操作不再可能。\n\n有时，读取和写入对象数据的方法被程序员称为\
    \ getter 和 setter。在许多面向对象的编程语言中，方法是访问对象内部数据的唯一方式，因此对于每个需要在类外部访问的属性，程序员都会添加一个 getter\
    \ 和一个 setter。Swift 提供了一个在面向对象编程语言中相对较新的功能：计算属性。计算属性是 getter 和 setter 的替代品。它定义了当你从对象中检索数据时会发生什么，以及当你为对象内的数据赋值时会发生什么。\n"
- fmt: "# Adding a Computed Property to a Class\n\nIn Swift, it is very easy to add\
    \ a computed property to a class. For example, instead of the two methods above\
    \ (`getColor` and `setColor`), you can add a computed property called `color`\
    \ as follows:\n\n```\nvar color: UIColor {\n    get {\n        if (!red.hidden)\
    \ {\n            return UIColor.redColor()\n        } else if (!green.hidden)\
    \ {\n            return UIColor.greenColor()\n        } else {\n            return\
    \ UIColor.blueColor()\n        }\n    }\n    set(col) {\n        if col != UIColor.redColor()\
    \ && col != UIColor.greenColor()\n            && col != UIColor.blueColor() {\n\
    \            return\n        }\n        red.hidden = col != UIColor.redColor()\n\
    \        green.hidden = col != UIColor.greenColor()\n        blue.hidden = col\
    \ != UIColor.blueColor()\n    }\n}\n```\n\nA computed property definition consists\
    \ of a few things:\n\n- The name of the property (for example, `color`)\n- The\
    \ type of the property (in this case, `UIColor`)\n- A `get` part and/or a `set`\
    \ part\n\nA computed property is quite similar to a stored property: it has both\
    \ a name and a type. The difference between a stored property and a computed property\
    \ is that with a computed property, you have control over what happens when a\
    \ value is written to or read from it. Reading from or writing to the computed\
    \ property `color` is done as follows:\n\n```\nmyCannon.color = UIColor.redColor()\n\
    \nif myCannon.color == UIColor.redColor() {\n    // do something\n}\n```\n\nIn\
    \ the first line of this code example, a value (`UIColor.redColor()`) is assigned\
    \ to the property. This means that the instructions in the `set` part of the property\
    \ will be executed. The second line contains an `if` instruction. In the condition\
    \ of that instruction, the `color` property value is read out. The `get` part\
    \ of the `color` property determines what happens when a property is read.\n\n\
    Behind the `set` part, you can indicate between parentheses the parameter name\
    \ you should use in the body (in the case of the `color` property, this parameter\
    \ is called `col`). If you omit the parameter name, then the name `newValue` is\
    \ used by default:\n\n```\nvar color: UIColor {\nget {\n    ...\n}\nset {\n  \
    \  if newValue != UIColor.redColor() && newValue != UIColor.greenColor() && newValue\
    \ != UIColor.blueColor() {\n        return\n    }\n    red.hidden = newValue !=\
    \ UIColor.redColor()\n    green.hidden = newValue != UIColor.greenColor()\n  \
    \  blue.hidden = newValue != UIColor.blueColor()\n}\n}\n```\n\nNot all computed\
    \ properties have to contain both a `get` and a `set` part. For example, have\
    \ a look at the following property in the `Cannon` class in the `Painter6` example:\n\
    \n```\nvar ballPosition: CGPoint {\n    get {\n        let opposite = sin(barrel.zRotation)\
    \ * barrel.size.width * 0.6\n        let adjacent = cos(barrel.zRotation) * barrel.size.width\
    \ * 0.6\n        return CGPoint(x: node.position.x + adjacent, y: node.position.y\
    \ + opposite)\n    }\n}\n```\n\nThis property calculates the position of the ball\
    \ depending on the orientation of the cannon barrel. It has `CGPoint` as a type.\
    \ In the `Ball` class, the property is used to calculate the ball position:\n\n\
    `node.position = GameScene.world.cannon.ballPosition`\n\nThe `ballPosition` property\
    \ has no `set` part. In other words, this computed property is read-only. The\
    \ following instruction would lead to a compiler error:\n\n`GameScene.world.cannon.ballPosition\
    \ = CGPoint(x: 0, y: 0)`\n\nDepending on what you need, you can define read-only\
    \ properties as well as properties that allow both reading and writing. By defining\
    \ useful properties and methods in your classes, the game code becomes generally\
    \ shorter and much easier to read. In this book, you will use stored properties,\
    \ computed properties, and methods to define behavior and data access for objects.\n\
    \n# Handling Collisions Between the Ball and the Cans\n\nThe `Painter6` example\
    \ extends the game by handling collisions between the ball and the cans. If two\
    \ objects collide, you have to handle this collision in the `update` method of\
    \ one of the two objects. In this case, you can choose to handle collisions in\
    \ the `Ball` class or in the `PaintCan` class. `Painter6` handles the collision\
    \ in the `PaintCan` class because if you were to do it in the `Ball` class, you\
    \ would need to repeat the same code three times, once for each paint can. By\
    \ handling collisions in the `PaintCan` class, you get this behavior automatically\
    \ because each can checks for itself whether it collides with the ball.\n\nDetecting\
    \ if there is a collision is very easy in the `SpriteKit` framework. The `SKNode`\
    \ class, which forms the basis for structuring the game world, contains methods\
    \ and properties for calculating a node’s bounding box (a box that encloses the\
    \ node). For representing boxes, there is a type called `CGRect`. For example,\
    \ this line of code calculates the bounding box of a node using the `frame` property:\n\
    \n`let boundingBox = node.frame`\n\nUnfortunately, the `frame` property only looks\
    \ at the node itself, not its children. This means that if the node contains children\
    \ (such as a red, green, and blue sprites), those sprites are not taken into account\
    \ when calculating the bounding box. This is not the behavior you want. Instead\
    \ of the `frame` property, `SKNode` also has a method called `calculateAccumulatedFrame`,\
    \ which does take into account the children of a node:\n\n`let accumulatedBoundingBox\
    \ = node.calculateAccumulatedFrame()`\n\nThe `CGRect` type has a method called\
    \ `intersects` that indicates whether two boxes intersect. You use that method\
    \ in the `PaintCan` class to determine if the paint can collides with the ball,\
    \ as follows:\n\n```\nlet paintCanBox = node.calculateAccumulatedFrame()\nlet\
    \ ballBox = GameScene.world.ball.node.calculateAccumulatedFrame()\n\nif paintCanBox.intersects(ballBox)\
    \ {\n    // handle the collision\n}\n```\n\nIf there is a collision between the\
    \ ball and the can, you need to change the color of the can to the color of the\
    \ ball. Next, you have to reset the ball so it can be shot again. The following\
    \ two instructions do exactly that:\n\n`color = GameScene.world.ball.color`\n\n\
    `GameScene.world.ball.reset()`\n\nIn the `reset` method of the `Ball` class, you\
    \ hide the ball and reset the `readyToShoot` variable, so that the player can\
    \ shoot the ball once more:\n\n```\nfunc reset() {\n    node.hidden = true\n \
    \   readyToShoot = false\n}\n```\n\nYou can try out the `Painter6` example to\
    \ see that collisions between the ball and the paint cans are properly handled.\n\
    \nAs you’ve probably noticed, the collision-detection method used here isn’t very\
    \ precise. In [Chapter 13](#A978-1-4842-0650-8_13_Chapter.html), you’ll see a\
    \ better way of dealing with collisions that directly uses the shape of the sprite,\
    \ although this does make your game run more slowly if you don’t watch out.\n\n\
    **Note**\n\nIn the end, simple lines of code like the ones written in this section\
    \ make all the difference in the player experience. As you build up your game\
    \ application, you’ll find that sometimes the littlest thing to the player took\
    \ the longest to program, and the biggest changes were achieved with only one\
    \ or two lines!"
  raw: '## Adding a Computed Property to a Class


    In Swift, it is very easy to add a computed property to a class. For example,
    instead of the two methods above (`getColor` and `setColor`), you can add a computed
    property called `color` as follows:


    `var color: UIColor {`


        `get {`


            `if (!red.hidden) {`


                `return UIColor.redColor()`


            `} else if (!green.hidden) {`


                `return UIColor.greenColor()`


            `} else {`


                `return UIColor.blueColor()`


            `}`


        `}`


        `set(col) {`


            `if col != UIColor.redColor() && col != UIColor.greenColor()`


                `&& col != UIColor.blueColor() {`


                `return`


            `}`


            `red.hidden = col != UIColor.redColor()`


            `green.hidden = col != UIColor.greenColor()`


            `blue.hidden = col != UIColor.blueColor()`


        `}`


    `}`


    A computed property definition consists of a few things:


    *   The name of the property (for example, `color`)

    *   The type of the property (in this case, `UIColor`)

    *   A `get` part and/or a `set` part


    A computed property is quite similar to a stored property: it has both a name
    and a type. The difference between a stored property and a computed property is
    that with a computed property, you have control over what happens when a value
    is written to or read from it. Reading from or writing to the computed property
    `color` is done as follows:


    `myCannon.color = UIColor.redColor()`


    `if myCannon.color == UIColor.redColor() {`


        `// do something`


    `}`


    In the first line of this code example, a value (`UIColor.redColor()`) is assigned
    to the property. This means that the instructions in the `set` part of the property
    will be executed. The second line contains an `if` instruction. In the condition
    of that instruction, the `color` property value is read out. The `get` part of
    the `color` property determines what happens when a property is read.


    Behind the `set` part, you can indicate between parentheses the parameter name
    you should use in the body (in the case of the `color` property, this parameter
    is called `col`). If you omit the parameter name, then the name `newValue` is
    used by default:


    `var color: UIColor {`


    `get {`


    `...`


    `}`


    `set {`


    `if newValue != UIColor.redColor() && newValue != UIColor.greenColor() && newValue
    != UIColor.blueColor() {`


    `return`


    `}`


    `red.hidden = newValue != UIColor.redColor()`


    `green.hidden = newValue != UIColor.greenColor()`


    `blue.hidden = newValue != UIColor.blueColor()`


    `}`


    `}`


    Not all computed properties have to contain both a `get` and a `set` part. For
    example, have a look at the following property in the `Cannon` class in the Painter6
    example:


    `var ballPosition: CGPoint {`


        `get {`


            `let opposite = sin(barrel.zRotation) * barrel.size.width * 0.6`


            `let adjacent = cos(barrel.zRotation) * barrel.size.width * 0.6`


            `return CGPoint(x: node.position.x + adjacent, y: node.position.y + opposite)`


        `}`


    `}`


    This property calculates the position of the ball depending on the orientation
    of the cannon barrel. It has `CGPoint` as a type. In the `Ball` class, the property
    is used to calculate the ball position:


    `node.position = GameScene.world.cannon.ballPosition`


    The `ballPosition` property has no `set` part. In other words, this computed property
    is read-only. The following instruction would lead to a compiler error:


    `GameScene.world.cannon.ballPosition = CGPoint(x: 0, y: 0)`


    Depending on what you need, you can define read-only properties as well as properties
    that allow both reading and writing. By defining useful properties and methods
    in your classes, the game code becomes generally shorter and much easier to read.
    In this book, you will use stored properties, computed properties, and methods
    to define behavior and data access for objects.


    ## Handling Collisions Between the Ball and the Cans


    The Painter6 example extends the game by handling collisions between the ball
    and the cans. If two objects collide, you have to handle this collision in the
    `update` method of one of the two objects. In this case, you can choose to handle
    collisions in the `Ball` class or in the `PaintCan` class. Painter6 handles the
    collision in the `PaintCan` class because if you were to do it in the `Ball` class,
    you would need to repeat the same code three times, once for each paint can. By
    handling collisions in the `PaintCan` class, you get this behavior automatically
    because each can checks for itself whether it collides with the ball.


    Detecting if there is a collision is very easy in the SpriteKit framework. The
    `SKNode` class, which forms the basis for structuring the game world, contains
    methods and properties for calculating a node’s bounding box (a box that encloses
    the node). For representing boxes, there is a type called `CGRect`. For example,
    this line of code calculates the bounding box of a node using the `frame` property:


    `let boundingBox = node.frame`


    Unfortunately, the `frame` property only looks at the node itself, not its children.
    This means that if the node contains children (such as a red, green, and blue
    sprites), those sprites are not taken into account when calculating the bounding
    box. This is not the behavior you want. Instead of the `frame` property, `SKNode`
    also has a method called `calculateAccumulatedFrame`, which does take into account
    the children of a node:


    `let accumulatedBoundingBox = node.calculateAccumulatedFrame()`


    The `CGRect` type has a method called `intersects` that indicates whether two
    boxes intersect. You use that method in the `PaintCan` class to determine if the
    paint can collides with the ball, as follows:


    `let paintCanBox = node.calculateAccumulatedFrame()`


    `let ballBox = GameScene.world.ball.node.calculateAccumulatedFrame()`


    `if paintCanBox.intersects(ballBox) {`


        `// handle the collision`


    `}`


    If there is a collision between the ball and the can, you need to change the color
    of the can to the color of the ball. Next, you have to reset the ball so it can
    be shot again. The following two instructions do exactly that:


    `color = GameScene.world.ball.color`


    `GameScene.world.ball.reset()`


    In the `reset` method of the `Ball` class, you hide the ball and reset the `readyToShoot`
    variable, so that the player can shoot the ball once more:


    `func reset() {`


        `node.hidden = true`


        `readyToShoot = false`


    `}`


    You can try out the Painter6 example to see that collisions between the ball and
    the paint cans are properly handled.


    As you’ve probably noticed, the collision-detection method used here isn’t very
    precise. In [Chapter 13](#A978-1-4842-0650-8_13_Chapter.html), you’ll see a better
    way of dealing with collisions that directly uses the shape of the sprite, although
    this does make your game run more slowly if you don’t watch out.


    Note


    In the end, simple lines of code like the ones written in this section make all
    the difference in the player experience. As you build up your game application,
    you’ll find that sometimes the littlest thing to the player took the longest to
    program, and the biggest changes were achieved with only one or two lines!'
  trans: "\n# 向类中添加计算属性\n\n在 Swift 中，为类添加计算属性非常容易。例如，你可以添加一个名为 `color` 的计算属性，而不是使用上述两个方法（`getColor`\
    \ 和 `setColor`），具体如下：\n\n```\nvar color: UIColor {\n    get {\n        if (!red.hidden)\
    \ {\n            return UIColor.redColor()\n        } else if (!green.hidden)\
    \ {\n            return UIColor.greenColor()\n        } else {\n            return\
    \ UIColor.blueColor()\n        }\n    }\n    set(col) {\n        if col != UIColor.redColor()\
    \ && col != UIColor.greenColor()\n            && col != UIColor.blueColor() {\n\
    \            return\n        }\n        red.hidden = col != UIColor.redColor()\n\
    \        green.hidden = col != UIColor.greenColor()\n        blue.hidden = col\
    \ != UIColor.blueColor()\n    }\n}\n```\n\n计算属性的定义包含以下几个部分：\n\n- 属性名称（例如 `color`）\n\
    - 属性类型（本例中为 `UIColor`）\n- `get` 部分和/或 `set` 部分\n\n计算属性与存储属性非常相似：它既有名称又有类型。存储属性与计算属性的区别在于，使用计算属性时，你可以控制读取或写入值时的行为。对计算属性\
    \ `color` 的读写操作如下所示：\n\n```\nmyCannon.color = UIColor.redColor()\n\nif myCannon.color\
    \ == UIColor.redColor() {\n    // 执行某些操作\n}\n```\n\n在此代码示例的第一行中，将值（`UIColor.redColor()`）赋给了该属性。这意味着属性\
    \ `set` 部分中的指令将被执行。第二行包含一个 `if` 指令。在该指令的条件中，读取了 `color` 属性的值。`color` 属性的 `get`\
    \ 部分决定了读取属性时会发生什么。\n\n在 `set` 部分后面，你可以在括号内指定在主体中使用的参数名称（对于 `color` 属性，此参数名为 `col`）。如果省略参数名称，则默认使用名称\
    \ `newValue`：\n\n```\nvar color: UIColor {\nget {\n    ...\n}\nset {\n    if newValue\
    \ != UIColor.redColor() && newValue != UIColor.greenColor() && newValue != UIColor.blueColor()\
    \ {\n        return\n    }\n    red.hidden = newValue != UIColor.redColor()\n\
    \    green.hidden = newValue != UIColor.greenColor()\n    blue.hidden = newValue\
    \ != UIColor.blueColor()\n}\n}\n```\n\n并非所有计算属性都必须同时包含 `get` 和 `set` 部分。例如，请看\
    \ `Painter6` 示例中 `Cannon` 类的以下属性：\n\n```\nvar ballPosition: CGPoint {\n    get\
    \ {\n        let opposite = sin(barrel.zRotation) * barrel.size.width * 0.6\n\
    \        let adjacent = cos(barrel.zRotation) * barrel.size.width * 0.6\n    \
    \    return CGPoint(x: node.position.x + adjacent, y: node.position.y + opposite)\n\
    \    }\n}\n```\n\n此属性根据炮管的方向计算球的位置。它的类型为 `CGPoint`。在 `Ball` 类中，该属性用于计算球的位置：\n\n\
    `node.position = GameScene.world.cannon.ballPosition`\n\n`ballPosition` 属性没有 `set`\
    \ 部分。换句话说，这个计算属性是只读的。以下指令会导致编译器报错：\n\n`GameScene.world.cannon.ballPosition = CGPoint(x:\
    \ 0, y: 0)`\n\n根据你的需求，你可以定义只读属性，也可以定义允许读写操作的属性。通过在类中定义有用的属性和方法，游戏代码通常会变得更简短且更易读。在本书中，你将使用存储属性、计算属性和方法来定义对象的行为和数据访问。\n\
    \n# 处理球与罐子之间的碰撞\n\n`Painter6` 示例通过处理球与罐子之间的碰撞来扩展游戏。如果两个物体发生碰撞，你必须在其中一个对象的 `update`\
    \ 方法中处理此次碰撞。在这种情况下，你可以选择在 `Ball` 类或 `PaintCan` 类中处理碰撞。`Painter6` 在 `PaintCan`\
    \ 类中处理碰撞，因为如果你在 `Ball` 类中这么做，就需要重复相同的代码三次，每个油漆罐一次。通过在 `PaintCan` 类中处理碰撞，你可以自动获得此行为，因为每个罐子都会自行检查是否与球发生碰撞。\n\
    \n在 `SpriteKit` 框架中检测是否发生碰撞非常简单。作为构建游戏世界基础的 `SKNode` 类，包含了用于计算节点边界框（包围节点的矩形框）的方法和属性。为了表示矩形框，有一个名为\
    \ `CGRect` 的类型。例如，这行代码使用 `frame` 属性计算节点的边界框：\n\n`let boundingBox = node.frame`\n\
    \n不幸的是，`frame` 属性只关注节点本身，而不考虑其子节点。这意味着如果节点包含子节点（例如红色、绿色和蓝色的精灵），在计算边界框时不会考虑这些子节点。这不是你想要的行为。除了\
    \ `frame` 属性，`SKNode` 还有一个名为 `calculateAccumulatedFrame` 的方法，该方法会考虑节点的子节点：\n\n\
    `let accumulatedBoundingBox = node.calculateAccumulatedFrame()`\n\n`CGRect` 类型有一个名为\
    \ `intersects` 的方法，用于指示两个矩形是否相交。你可以在 `PaintCan` 类中使用该方法来判断油漆罐是否与球发生碰撞，如下所示：\n\n\
    ```\nlet paintCanBox = node.calculateAccumulatedFrame()\nlet ballBox = GameScene.world.ball.node.calculateAccumulatedFrame()\n\
    \nif paintCanBox.intersects(ballBox) {\n    // 处理碰撞\n}\n```\n\n如果球与罐子之间发生碰撞，你需要将罐子的颜色更改为球的颜色。接着，你必须重置球，以便可以再次射击。以下两条指令正好实现了这一点：\n\
    \n`color = GameScene.world.ball.color`\n\n`GameScene.world.ball.reset()`\n\n在\
    \ `Ball` 类的 `reset` 方法中，你隐藏了球并重置了 `readyToShoot` 变量，以便玩家可以再次射击球：\n\n```\nfunc\
    \ reset() {\n    node.hidden = true\n    readyToShoot = false\n}\n```\n\n你可以尝试运行\
    \ `Painter6` 示例，看看球与油漆罐之间的碰撞是否得到了正确处理。\n\n你可能已经注意到，这里使用的碰撞检测方法并不十分精确。在第 13 章中，你将看到一种更好的处理碰撞的方法，该方法直接使用精灵的形状，不过如果你不加注意，这可能会使你的游戏运行得更慢。\n\
    \n**注意**\n\n最终，像本节所编写的这样简单的代码行，对玩家体验的影响却至关重要。在构建游戏应用程序时，你会发现，有时对玩家来说最微不足道的小事，编程时却耗时最长；而最大的改变，可能仅需一两行代码就能实现！\n"
- fmt: "# Structs\n\nIn the previous section, you saw that variables and constants\
    \ are passed by value or by reference depending on their type. Types such as `Int`\
    \ or `Bool` that are passed by value are also called structs in Swift. As opposed\
    \ to structs, variables that have a class as a type are passed by reference.\n\
    \nStructs, which are passed by value, are generally used for more basic kinds\
    \ of objects. For example, the `CGPoint` type is a struct, as is the `UIColor`\
    \ type. Consider the following variable declaration and initialization:\n\n`var\
    \ position = CGPoint()`\n\nIn Figure [8-6](#A978-1-4842-0650-8_8_Chapter.html#Fig6),\
    \ you can see what the memory looks like. Note that the `position` variable is\
    \ not a reference but a value. This means that the following instruction makes\
    \ a complete copy of the `CGPoint` object, as you can also see in Figure [8-7](#A978-1-4842-0650-8_8_Chapter.html#Fig7):\n\
    \n![A978-1-4842-0650-8_8_Fig7_HTML.gif](A978-1-4842-0650-8_8_Fig7_HTML.gif)\n\
    Figure 8-7. Two struct variables – one is a copy of the other\n\n![A978-1-4842-0650-8_8_Fig6_HTML.gif](A978-1-4842-0650-8_8_Fig6_HTML.gif)\n\
    Figure 8-6. A struct variable\n\n`var position2 = position`\n\nGenerally, classes\
    \ can be quite complicated when represented in memory. They can contain properties\
    \ of other classes or structs. Any of these types may in turn consist of other\
    \ properties, and so on.\n\nFigure [8-8](#A978-1-4842-0650-8_8_Chapter.html#Fig8)\
    \ shows what the memory could look like when you create a new instance of a `Cannon`\
    \ object. You can see the different kinds of objects that are in a `Cannon` instance.\
    \ Each object consists of other objects. For example, the `SKNode` object that\
    \ `node` refers to has a `CGPoint` struct to represent the position, a Boolean\
    \ value indicating whether the node is hidden, a link to its parent node, its\
    \ z position, and more. In some cases, references point to the same object, as\
    \ is the case with `parent` (in `red`) and `node`. When you create your classes,\
    \ it can sometimes be helpful to draw these kinds of diagrams to get a feeling\
    \ of which object belongs where and at which places references to these objects\
    \ are stored.\n\n![A978-1-4842-0650-8_8_Fig8_HTML.gif](A978-1-4842-0650-8_8_Fig8_HTML.gif)\n\
    Figure 8-8. An impression of the memory structure that represents a `Cannon` object\n\
    \nJust like you can create your own classes, you can also create your own structs.\
    \ For example, you could define a struct representing a person with a name and\
    \ an age as follows:\n\n```\nstruct Person {\n    var name: String = \"\"\n  \
    \  var age: Int = 0\n}\n```\n\n## What You Have Learned\n\nIn this chapter, you\
    \ have learned the following:\n\n- How to add properties to your classes\n- How\
    \ to handle basic collisions between game objects\n- How to define game objects\
    \ that have different colors\n- The difference between values and references\n\
    \n# 9. Limited Lives\n\nElectronic supplementary material The online version of\
    \ this chapter (doi:[10.1007/978-1-4842-0650-8_9](http://dx.doi.org/10.1007/978-1-4842-0650-8_9))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    In this chapter, you will make the Painter game more interesting by giving the\
    \ player a limited number of lives. If players miss too many paint cans, the game\
    \ is over. The chapter discusses how to deal with that and how to display the\
    \ current number of lives to the player. In order to do the latter, you will learn\
    \ a few programming constructs for repeating a group of instructions several times.\n\
    \n## Maintaining the Number of Lives\n\nTo introduce some danger and incentive\
    \ to work hard in the game, you would like to limit the number of paint cans of\
    \ the wrong color that the player can allow to fall through the bottom of the\
    \ screen. The Painter7 example adds this kind of behavior to the game and uses\
    \ a limit of five.\n\nThe choice of a limit of five paint cans is one of many\
    \ examples of the decisions you have to make as a game designer and developer.\
    \ If you give the player only a single life, then the game will be too hard to\
    \ play. Giving the player hundreds of lives removes the incentive for the player\
    \ to play well. Determining such parameters often happens by play-testing the\
    \ game and determining reasonable parameter values. In addition to testing the\
    \ game yourself, you can also ask your friends or family to play your game to\
    \ get some idea of what values to choose for these parameters.\n\nIn order to\
    \ store the life limit, you add an extra (stored) property to the `GameWorld`\
    \ class:\n\n`var lives = 5`\n\nYou initially set this value to 5 when you declare\
    \ the property in the class. Now you can update the value whenever a paint can\
    \ falls outside the screen. You perform this check in the `updateDelta` method\
    \ of the `PaintCan` class. Therefore, you have to add a few instructions in that\
    \ method to deal with this. The only thing you need to do is check whether the\
    \ color of the paint can is the same as its target color when it falls through\
    \ the bottom of the screen. If that is not the case, you have to decrement the\
    \ `lives` counter in the `GameWorld` class.\n\nBefore you can do this, you have\
    \ to extend the `PaintCan` class so that `PaintCan` objects know that they need\
    \ to have a target color when they fall out of the bottom of the screen. Painter7\
    \ passes along this target color as a parameter when you create the `PaintCan`\
    \ objects in `GameWorld`:\n\n`var can1 = PaintCan(positionOffset: -10, targetColor:\
    \ UIColor.redColor())`\n`var can2 = PaintCan(positionOffset: 190, targetColor:\
    \ UIColor.greenColor())`\n`var can3 = PaintCan(positionOffset: 390, targetColor:\
    \ UIColor.blueColor())`\n\nYou store the target color in a variable in each paint\
    \ can, as you can see in the initializer of `PaintCan`:\n\n```\ninit(positionOffset:\
    \ CGFloat, targetColor: UIColor) {\n    self.positionOffset = positionOffset\n\
    \    self.targetColor = targetColor\n    node.zPosition = 1\n    node.addChild(red)\n\
    \    node.addChild(green)\n    node.addChild(blue)\n    node.hidden = true\n}\n\
    ```\n\nYou now extend the `updateDelta` method of `PaintCan` so that it handles\
    \ the situation where the paint can falls outside the bottom of the screen. If\
    \ that happens, you need to move the paint can back to the top of the screen.\
    \ If the current color of the paint can doesn’t match the target color, you decrease\
    \ the number of lives by one:\n\n```\nlet top = CGPoint(x: node.position.x, y:\
    \ node.position.y + red.size.height/2)\nif GameScene.world.isOutsideWorld(top)\
    \ {\n    if color != targetColor {\n        GameScene.world.lives = GameScene.world.lives\
    \ - 1\n    }\n    node.hidden = true\n}\n```\n\nYou might want to decrease the\
    \ number of lives by more than one at some point. In order to facilitate this,\
    \ you can change the penalty into a variable:\n\n```\nlet penalty = 1\nif GameScene.world.isOutsideWorld(top)\
    \ {\n    if color != targetColor {\n        GameScene.world.lives = GameScene.world.lives\
    \ - penalty\n    }\n    node.hidden = true\n}\n```\n\nThis way, you can introduce\
    \ steeper penalties if you want to, or dynamic penalties (first miss costs one\
    \ life, second miss costs two, and so on). You could also introduce a special\
    \ paint can; if the player shoots that can with a ball of the right color, the\
    \ penalty for mismatching paint can colors temporarily becomes zero. Can you think\
    \ of other ways of dealing with penalties in the Painter game?"
  raw: '## Structs


    In the previous section, you saw that variables and constants are passed by value
    or by reference depending on their type. Types such as `Int` or `Bool` that are
    passed by value are also called structs in Swift. As opposed to structs, variables
    that have a class as a type are passed by reference.


    Structs, which are passed by value, are generally used for more basic kinds of
    objects. For example, the `CGPoint` type is a struct, as is the `UIColor` type.
    Consider the following variable declaration and initialization:


    `var position = CGPoint()`


    In Figure [8-6](#A978-1-4842-0650-8_8_Chapter.html#Fig6), you can see what the
    memory looks like. Note that the `position` variable is not a reference but a
    value. This means that the following instruction makes a complete copy of the
    `CGPoint` object, as you can also see in Figure [8-7](#A978-1-4842-0650-8_8_Chapter.html#Fig7):


    ![A978-1-4842-0650-8_8_Fig7_HTML.gif](A978-1-4842-0650-8_8_Fig7_HTML.gif)


    Figure 8-7.


    Two struct variables – one is a copy of the other


    ![A978-1-4842-0650-8_8_Fig6_HTML.gif](A978-1-4842-0650-8_8_Fig6_HTML.gif)


    Figure 8-6.


    A struct variable


    `var position2 = position`


    Generally, classes can be quite complicated when represented in memory. They can
    contain properties of other classes or structs. Any of these types may in turn
    consist of other properties, and so on.


    Figure [8-8](#A978-1-4842-0650-8_8_Chapter.html#Fig8) shows what the memory could
    look like when you create a new instance of a `Cannon` object. You can see the
    different kinds of objects that are in a `Cannon` instance. Each object consists
    of other objects. For example, the `SKNode` object that `node` refers to has a
    `CGPoint` struct to represent the position, a Boolean value indicating whether
    the node is hidden, a link to its parent node, its z position, and more. In some
    cases, references point to the same object, as is the case with `parent` (in `red`)
    and `node`. When you create your classes, it can sometimes be helpful to draw
    these kinds of diagrams to get a feeling of which object belongs where and at
    which places references to these objects are stored.


    ![A978-1-4842-0650-8_8_Fig8_HTML.gif](A978-1-4842-0650-8_8_Fig8_HTML.gif)


    Figure 8-8.


    An impression of the memory structure that represents a `Cannon` object


    Just like you can create your own classes, you can also create your own structs.
    For example, you could define a struct representing a person with a name and an
    age as follows:


    `struct Person {`


        `var name: String = ""`


        `var age: Int = 0`


    `}`


    ## What You Have Learned


    In this chapter, you have learned the following:


    *   How to add properties to your classes

    *   How to handle basic collisions between game objects

    *   How to define game objects that have different colors

    *   The difference between values and references


    # 9. Limited Lives


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​9](http://dx.doi.org/10.1007/978-1-4842-0650-8_9))
    contains supplementary material, which is available to authorized users.


    In this chapter, you will make the Painter game more interesting by giving the
    player a limited number of lives. If players miss too many paint cans, the game
    is over. The chapter discusses how to deal with that and how to display the current
    number of lives to the player. In order to do the latter, you will learn a few
    programming constructs for repeating a group of instructions several times.


    ## Maintaining the Number of Lives


    To introduce some danger and incentive to work hard in the game, you would like
    to limit the number of paint cans of the wrong color that the player can allow
    to fall through the bottom of the screen. The Painter7 example adds this kind
    of behavior to the game and uses a limit of five.


    The choice of a limit of five paint cans is one of many examples of the decisions
    you have to make as a game designer and developer. If you give the player only
    a single life, then the game will be too hard to play. Giving the player hundreds
    of lives removes the incentive for the player to play well. Determining such parameters
    often happens by play-testing the game and determining reasonable parameter values.
    In addition to testing the game yourself, you can also ask your friends or family
    to play your game to get some idea of what values to choose for these parameters.


    In order to store the life limit, you add an extra (stored) property to the `GameWorld`
    class:


    `var lives = 5`


    You initially set this value to 5 when you declare the property in the class.
    Now you can update the value whenever a paint can falls outside the screen. You
    perform this check in the `updateDelta` method of the `PaintCan` class. Therefore,
    you have to add a few instructions in that method to deal with this. The only
    thing you need to do is check whether the color of the paint can is the same as
    its target color when it falls through the bottom of the screen. If that is not
    the case, you have to decrement the `lives` counter in the `GameWorld` class.


    Before you can do this, you have to extend the `PaintCan` class so that `PaintCan`
    objects know that they need to have a target color when they fall out of the bottom
    of the screen. Painter7 passes along this target color as a parameter when you
    create the `PaintCan` objects in `GameWorld`:


    `var can1 = PaintCan(positionOffset: -10, targetColor: UIColor.redColor())`


    `var can2 = PaintCan(positionOffset: 190, targetColor: UIColor.greenColor())`


    `var can3 = PaintCan(positionOffset: 390, targetColor: UIColor.blueColor())`


    You store the target color in a variable in each paint can, as you can see in
    the initializer of `PaintCan`:


    `init(positionOffset: CGFloat, targetColor: UIColor) {`


        `self.positionOffset = positionOffset`


        `self.targetColor = targetColor`


        `node.zPosition = 1`


        `node.addChild(red)`


        `node.addChild(green)`


        `node.addChild(blue)`


        `node.hidden = true`


    `}`


    You now extend the `updateDelta` method of `PaintCan` so that it handles the situation
    where the paint can falls outside the bottom of the screen. If that happens, you
    need to move the paint can back to the top of the screen. If the current color
    of the paint can doesn’t match the target color, you decrease the number of lives
    by one:


    `let top = CGPoint(x: node.position.x, y: node.position.y + red.size.height/2)`


    `if GameScene.world.isOutsideWorld(top) {`


        `if color != targetColor {`


            `GameScene.world.lives = GameScene.world.lives - 1`


        `}`


        `node.hidden = true`


    `}`


    You might want to decrease the number of lives by more than one at some point.
    In order to facilitate this, you can change the penalty into a variable:


    `let penalty = 1`


    `if GameScene.world.isOutsideWorld(top) {`


        `if color != targetColor {`


            `GameScene.world.lives = GameScene.world.lives - penalty`


        `}`


        `node.hidden = true`


    `}`


    This way, you can introduce steeper penalties if you want to, or dynamic penalties
    (first miss costs one life, second miss costs two, and so on). You could also
    introduce a special paint can; if the player shoots that can with a ball of the
    right color, the penalty for mismatching paint can colors temporarily becomes
    zero. Can you think of other ways of dealing with penalties in the Painter game?'
  trans: "\n# 结构体\n\n在上一节中，你了解到变量和常量是根据其类型按值或按引用传递的。诸如 `Int` 或 `Bool` 这类按值传递的类型在 Swift\
    \ 中也被称为结构体。与结构体相反，以类为类型的变量是按引用传递的。\n\n按值传递的结构体通常用于更基础类型的对象。例如，`CGPoint` 类型是一个结构体，`UIColor`\
    \ 类型也是如此。考虑下面的变量声明和初始化：\n\n`var position = CGPoint()`\n\n在图 8-6 中，你可以看到内存的状态。请注意，`position`\
    \ 变量不是一个引用，而是一个值。这意味着下面的指令会完整地复制一份 `CGPoint` 对象，如图 8-7 所示：\n\n![A978-1-4842-0650-8_8_Fig7_HTML.gif](img/A978-1-4842-0650-8_8_Fig7_HTML.gif)\n\
    图 8-7. 两个结构体变量——一个是另一个的副本\n\n![A978-1-4842-0650-8_8_Fig6_HTML.gif](img/A978-1-4842-0650-8_8_Fig6_HTML.gif)\n\
    图 8-6. 一个结构体变量\n\n`var position2 = position`\n\n一般来说，类在内存中的表示可能相当复杂。它们可以包含其他类或结构体的属性。这些类型中的任何一个又可能由其他属性组成，以此类推。\n\
    \n图 8-8 展示了当你创建一个 `Cannon` 对象的新实例时，内存可能的样子。你可以看到一个 `Cannon` 实例中包含的各种对象。每个对象由其他对象组成。例如，`node`\
    \ 引用的 `SKNode` 对象有一个 `CGPoint` 结构体来表示位置，一个布尔值指示节点是否隐藏，一个指向其父节点的链接，它的 z 位置等等。在某些情况下，引用会指向同一个对象，就像\
    \ `parent`（红色显示）和 `node` 的情况一样。当你创建自己的类时，绘制此类图表有时会很有帮助，以便了解哪个对象属于哪里，以及这些对象的引用存储在哪里。\n\
    \n![A978-1-4842-0650-8_8_Fig8_HTML.gif](img/A978-1-4842-0650-8_8_Fig8_HTML.gif)\n\
    图 8-8. 表示 `Cannon` 对象的内存结构示意图\n\n就像你可以创建自己的类一样，你也可以创建自己的结构体。例如，你可以定义一个表示人的结构体，包含姓名和年龄，如下所示：\n\
    \n```\nstruct Person {\n    var name: String = \"\"\n    var age: Int = 0\n}\n\
    ```\n\n## 你学到的内容\n\n在本章中，你已经学到了以下内容：\n\n- 如何向类中添加属性\n- 如何处理游戏对象之间的基本碰撞\n- 如何定义具有不同颜色的游戏对象\n\
    - 值与引用之间的区别\n\n# 9. 有限的生命\n\n电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-0650-8_9](http://dx.doi.org/10.1007/978-1-4842-0650-8_9))\
    \ 包含补充材料，仅供授权用户使用。\n\n在本章中，你将通过给予玩家有限次数的生命，让 Painter 游戏变得更加有趣。如果玩家错过了太多油漆罐，游戏就结束了。本章将讨论如何处理这种情况，以及如何向玩家显示当前剩余的生命数。为了做到后者，你将学习几种重复执行一组指令的编程结构。\n\
    \n## 维护生命数量\n\n为了引入一些危险元素并激励玩家在游戏中努力表现，你需要限制玩家允许错误颜色的油漆罐掉落到屏幕底部的数量。Painter7 示例向游戏添加了这种机制，并使用了五次的上限。\n\
    \n选择五次上限是你作为游戏设计师和开发者必须做出的众多决策之一。如果你只给玩家一条命，游戏会变得太难。而给玩家上百条命，则会消除玩家好好表现的动机。确定这类参数通常通过游戏测试并确定合理的参数值来实现。除了自己测试游戏外，你还可以请朋友或家人试玩，以便对这些参数选择什么值有所了解。\n\
    \n为了存储生命上限，你在 `GameWorld` 类中添加了一个额外的（存储型）属性：\n\n`var lives = 5`\n\n当你在类中声明该属性时，初始将其设置为\
    \ 5。现在，每当油漆罐掉出屏幕时，你就可以更新这个值。你在 `PaintCan` 类的 `updateDelta` 方法中执行此检查。因此，你需要在那个方法中添加一些指令来处理这个问题。你需要做的只是检查当油漆罐掉出屏幕底部时，其颜色是否与目标颜色相同。如果不是，你必须减少\
    \ `GameWorld` 类中的 `lives` 计数器。\n\n在执行此操作之前，你必须扩展 `PaintCan` 类，以便 `PaintCan` 对象知道它们需要有一个目标颜色，以便在掉出屏幕底部时使用。Painter7\
    \ 在 `GameWorld` 中创建 `PaintCan` 对象时，将此目标颜色作为参数传递：\n\n`var can1 = PaintCan(positionOffset:\
    \ -10, targetColor: UIColor.redColor())`\n`var can2 = PaintCan(positionOffset:\
    \ 190, targetColor: UIColor.greenColor())`\n`var can3 = PaintCan(positionOffset:\
    \ 390, targetColor: UIColor.blueColor())`\n\n你将目标颜色存储在每个油漆罐的变量中，如你在 `PaintCan`\
    \ 的初始化器中看到的那样：\n\n```\ninit(positionOffset: CGFloat, targetColor: UIColor) {\n\
    \    self.positionOffset = positionOffset\n    self.targetColor = targetColor\n\
    \    node.zPosition = 1\n    node.addChild(red)\n    node.addChild(green)\n  \
    \  node.addChild(blue)\n    node.hidden = true\n}\n```\n\n你现在扩展 `PaintCan` 的 `updateDelta`\
    \ 方法，使其处理油漆罐掉出屏幕底部的情况。如果发生这种情况，你需要将油漆罐移回屏幕顶部。如果油漆罐的当前颜色与目标颜色不匹配，你将生命数量减一：\n\n\
    ```\nlet top = CGPoint(x: node.position.x, y: node.position.y + red.size.height/2)\n\
    if GameScene.world.isOutsideWorld(top) {\n    if color != targetColor {\n    \
    \    GameScene.world.lives = GameScene.world.lives - 1\n    }\n    node.hidden\
    \ = true\n}\n```\n\n你可能希望在某些情况下减少多于一条生命。为了方便实现这一点，你可以将惩罚值改为一个变量：\n\n```\nlet penalty\
    \ = 1\nif GameScene.world.isOutsideWorld(top) {\n    if color != targetColor {\n\
    \        GameScene.world.lives = GameScene.world.lives - penalty\n    }\n    node.hidden\
    \ = true\n}\n```\n\n这样，你可以在需要时引入更严厉的惩罚，或者动态惩罚（第一次失误扣除一条命，第二次失误扣除两条命，以此类推）。你还可以引入一种特殊的油漆罐；如果玩家用正确颜色的球击中这个罐子，那么因油漆罐颜色不匹配而产生的惩罚会暂时清零。你能想到在\
    \ Painter 游戏中处理惩罚的其他方法吗？\n"
- fmt: "# Indicating the Number of Lives to the Player\n\nObviously, players would\
    \ like to know how they’re doing. So, you have to indicate somehow on the screen\
    \ how many lives the player has left. In the Painter game, you do that by displaying\
    \ a number of balloons in the upper-left corner of the screen. Using the knowledge\
    \ you have, you initially add five balloons to be drawn:\n\n```\nvar livesNode\
    \ = SKNode()\nlet livesSpr1 = SKSpriteNode(imageNamed: \"spr_lives\")\nlivesSpr1.position\
    \ = CGPoint(x: 0, y: 0)\nlivesNode.addChild(livesSpr1)\nlet livesSpr2 = SKSpriteNode(imageNamed:\
    \ \"spr_lives\")\nlivesSpr2.position = CGPoint(x: Int(livesSpr2.size.width), y:\
    \ 0)\nlivesNode.addChild(livesSpr2)\nlet livesSpr3 = SKSpriteNode(imageNamed:\
    \ \"spr_lives\")\nlivesSpr3.position = CGPoint(x: 2 * Int(livesSpr3.size.width),\
    \ y: 0)\nlivesNode.addChild(livesSpr3)\nlet livesSpr4 = SKSpriteNode(imageNamed:\
    \ \"spr_lives\")\nlivesSpr4.position = CGPoint(x: 3 * Int(livesSpr4.size.width),\
    \ y: 0)\nlivesNode.addChild(livesSpr4)\nlet livesSpr5 = SKSpriteNode(imageNamed:\
    \ \"spr_lives\")\nlivesSpr5.position = CGPoint(x: 4 * Int(livesSpr5.size.width),\
    \ y: 0)\nlivesNode.addChild(livesSpr5)\n```\n\nBy multiplying the width of the\
    \ sprite by a number and storing that as the x-position of the sprite, you end\
    \ up with five sprites drawn next to each other. Now you can add a few lines in\
    \ the update method to change the hidden statuses of these sprites, so that they\
    \ correctly show the number of lives:\n\n```\nlivesSpr5.hidden = lives > 4\nlivesSpr4.hidden\
    \ = lives > 3\nlivesSpr3.hidden = lives > 2\nlivesSpr2.hidden = lives > 1\nlivesSpr1.hidden\
    \ = lives > 0\n```\n\nAlthough it works, this isn’t a very nice solution. You\
    \ are writing similar instructions several times. And what happens if you decide\
    \ that the player should get ten lives initially instead of five? You’d need to\
    \ write twice as much code. And if you decide to make the maximum number of lives\
    \ completely dynamic, for example by letting the player win extra lives, this\
    \ solution won’t work at all. Fortunately, there is a better approach: iteration.\n\
    \n## Executing Instructions Multiple Times\n\nIteration in Swift is a way to repeat\
    \ instructions a number of times. Have a look at the following code fragment:\n\
    \n```\nvar x = 10\nwhile x >= 3 {\n    x = x – 3\n}\n```\n\nThe second instruction\
    \ is called a `while` loop. This instruction consists of a kind of header (`while\
    \ x >= 3`) and a body (`x = x - 3`) between braces, which is very similar to the\
    \ structure of an `if` instruction. The header consists of the word `while` followed\
    \ by a condition. The body itself is an instruction. In this case, the instruction\
    \ subtracts 3 from a variable. However, it could just as well have been another\
    \ kind of instruction, such as calling a method or accessing a property. Figure\
    \ [9-1](#A978-1-4842-0650-8_9_Chapter.html#Fig1) shows the syntax diagram of the\
    \ `while` instruction.\n\n![A978-1-4842-0650-8_9_Fig1_HTML.gif](A978-1-4842-0650-8_9_Fig1_HTML.gif)\n\
    \nFigure 9-1. Syntax diagram of the `while` instruction\n\nWhen the `while` instruction\
    \ is executed, its body is executed multiple times. In fact, as long as the condition\
    \ in the header yields `true`, the body will be executed. In this example, the\
    \ condition is that the `x` variable contains a value that is 3 or greater. In\
    \ the beginning, the variable contains the value 10, so it’s certainly greater\
    \ than 3. Therefore, the body of the `while` instruction is executed, after which\
    \ the variable `x` contains the value 7. The condition is then evaluated again.\
    \ The variable is still greater than 3, so the body is executed once more, after\
    \ which the variable `x` contains the value 4. Again, the value is greater than\
    \ 3, so the body is executed again, and `x` will contain the value 1. At that\
    \ point, the condition is evaluated, but it’s no longer `true`. Therefore, the\
    \ repeating instruction comes to an end. So, after this piece of code is executed,\
    \ the variable `x` contains the value 1. In fact, what you’ve programmed here\
    \ is integer division using the `while` instruction. Of course, in this case it’s\
    \ easier to simply use the following single line of code that achieves the same\
    \ result:\n\n```\nvar x = 10 % 3\n```\n\nIf you want to draw the player’s number\
    \ of lives on the screen, you can use a `while` instruction to create the lives\
    \ sprites more efficiently:\n\n```\nvar livesNode = SKNode()\nvar index = 0\n\
    while index < lives {\n    let livesSpr = SKSpriteNode(imageNamed: \"spr_lives\"\
    )\n    livesSpr.position = CGPoint(x: index * Int(livesSpr.size.width), y: 0)\n\
    \    livesNode.addChild(livesSpr)\n    index = index + 1\n}\n```\n\nIn this `while`\
    \ instruction, the body is executed as long as the variable `index` contains a\
    \ value less than `lives` (which is a variable you assume is declared and initialized\
    \ to a certain value somewhere else). Every time the body is executed, you add\
    \ a sprite to the game world at a certain position, and then you increment `index`\
    \ by 1. The result is that you create a sprite object exactly `lives` times! So,\
    \ you’re using the variable `index` here as a counter.\n\n**Note:** You start\
    \ with `index` equal to zero and continue until `index` has reached the same value\
    \ as `lives`. This means the body of the `while` instruction is executed for the\
    \ values 0, 1, 2, 3, and 4 of `index`. As a result, the body is executed five\
    \ times.\n\nAs you can see in this example, the body of a `while` instruction\
    \ may contain more than a single instruction.\n\nThe position at which you draw\
    \ the sprites depends on the value of `index`. This way, you can draw each sprite\
    \ a bit further to the right, so they’re nicely placed in a row. The first time\
    \ you execute the body, you draw the sprite at x-position 0 because `index` is\
    \ 0. The next iteration, you draw the sprite at x-position `livesSpr.size.width`,\
    \ the iteration after that at `2 * livesSpr.size.width`, and so on. In this case,\
    \ you use the counter not only to determine how often you execute instructions,\
    \ but also to change what the instructions do. This is a very powerful feature\
    \ of an iteration instruction such as `while`. Because of the looping behavior,\
    \ a `while` instruction is also called a `while` loop. Figure [9-2](#A978-1-4842-0650-8_9_Chapter.html#Fig2)\
    \ shows the Painter game where the number of lives is indicated at the upper left\
    \ on the screen.\n\n![A978-1-4842-0650-8_9_Fig2_HTML.jpg](A978-1-4842-0650-8_9_Fig2_HTML.jpg)\n\
    \nFigure 9-2. The Painter game showing the player the remaining number of lives\n\
    \n## A Shorter Notation for Incrementing Counters\n\nMany `while` instructions,\
    \ especially those that use a counter, have a body that contains an instruction\
    \ for incrementing a variable. This can be done with the following instruction:\n\
    \n```\ni = i + 1\n```\n\nAs a side note, especially because of these kinds of\
    \ instructions, it’s unwise to express the assignment as “is.” The value of `i`\
    \ can, of course, never be the same as `i + 1`, but the value of `i` becomes the\
    \ old value of `i`, plus 1. These kinds of instructions are very common in programs,\
    \ so a special, shorter notation exists that does exactly the same thing:\n\n\
    ```\ni++\n```\n\nThe `++` can be expressed as “is incremented.” Because this operator\
    \ is placed after the variable it operates on, the `++` operator is called a postfix\
    \ operator. To increment a variable by more than 1, there is another notation,\n\
    \n```\ni += 2\n```\n\nand it means the same as\n\n```\ni = i + 2\n```\n\nThere\
    \ is a similar notation for other basic arithmetic operations:\n\n```\ni -= 12\
    \          // this is the same as i = i – 12\ni *= 0.99        // this is the\
    \ same as i = i * 0.99\ni /= 5           // this is the same as i = i / 5\ni--\
    \              // this is the same as i = i – 1\n```\n\nThis notation is very\
    \ useful because it allows you to write shorter code. For example,\n\n```\nlives\
    \ = lives – penalty\n```\n\nbecomes\n\n```\nlives -= penalty\n```\n\nWhen you\
    \ look at the example code belonging to this chapter and the ones following it,\
    \ you will see that this shorter notation is used in many different classes to\
    \ make the code more compact."
  raw: '## Indicating the Number of Lives to the Player


    Obviously, players would like to know how they’re doing. So, you have to indicate
    somehow on the screen how many lives the player has left. In the Painter game,
    you do that by displaying a number of balloons in the upper-left corner of the
    screen. Using the knowledge you have, you initially add five balloons to be drawn:


    `var livesNode = SKNode()`


    `let livesSpr1 = SKSpriteNode(imageNamed: "spr_lives")`


    `livesSpr1.position = CGPoint(x: 0, y: 0)`


    `livesNode.addChild(livesSpr1)`


    `let livesSpr2 = SKSpriteNode(imageNamed: "spr_lives")`


    `livesSpr2.position = CGPoint(x: Int(livesSpr2.size.width), y: 0)`


    `livesNode.addChild(livesSpr2)`


    `let livesSpr3 = SKSpriteNode(imageNamed: "spr_lives")`


    `livesSpr3.position = CGPoint(x: 2 * Int(livesSpr3.size.width), y: 0)`


    `livesNode.addChild(livesSpr3)`


    `let livesSpr4 = SKSpriteNode(imageNamed: "spr_lives")`


    `livesSpr4.position = CGPoint(x: 3 * Int(livesSpr4.size.width), y: 0)`


    `livesNode.addChild(livesSpr4)`


    `let livesSpr5 = SKSpriteNode(imageNamed: "spr_lives")`


    `livesSpr5.position = CGPoint(x: 4 * Int(livesSpr5.size.width), y: 0)`


    `livesNode.addChild(livesSpr5)`


    By multiplying the width of the sprite by a number and storing that as the x-position
    of the sprite, you end up with five sprites drawn next to each other. Now you
    can add a few lines in the update method to change the hidden statuses of these
    sprites, so that they correctly show the number of lives:


    `livesSpr5.hidden = lives > 4`


    `livesSpr4.hidden = lives > 3`


    `livesSpr3.hidden = lives > 2`


    `livesSpr2.hidden = lives > 1`


    `livesSpr1.hidden = lives > 0`


    Although it works, this isn’t a very nice solution. You are writing similar instructions
    several times. And what happens if you decide that the player should get ten lives
    initially instead of five? You’d need to write twice as much code. And if you
    decide to make the maximum number of lives completely dynamic, for example by
    letting the player win extra lives, this solution won’t work at all. Fortunately,
    there is a better approach: iteration.


    ## Executing Instructions Multiple Times


    Iteration in Swift is a way to repeat instructions a number of times. Have a look
    at the following code fragment:


    `var x = 10`


    `while x >= 3 {`


    `x = x – 3`


    `}`


    The second instruction is called a `while` loop. This instruction consists of
    a kind of header (`while x >= 3`) and a body (`x = x - 3`) between braces, which
    is very similar to the structure of an `if` instruction. The header consists of
    the word `while` followed by a condition. The body itself is an instruction. In
    this case, the instruction subtracts 3 from a variable. However, it could just
    as well have been another kind of instruction, such as calling a method or accessing
    a property. Figure [9-1](#A978-1-4842-0650-8_9_Chapter.html#Fig1) shows the syntax
    diagram of the `while` instruction.


    ![A978-1-4842-0650-8_9_Fig1_HTML.gif](A978-1-4842-0650-8_9_Fig1_HTML.gif)


    Figure 9-1.


    Syntax diagram of the `while` instruction


    When the `while` instruction is executed, its body is executed multiple times.
    In fact, as long as the condition in the header yields `true`, the body will be
    executed. In this example, the condition is that the `x` variable contains a value
    that is 3 or greater. In the beginning, the variable contains the value 10, so
    it’s certainly greater than 3\. Therefore, the body of the `while` instruction
    is executed, after which the variable `x` contains the value 7\. The condition
    is then evaluated again. The variable is still greater than 3, so the body is
    executed once more, after which the variable `x` contains the value 4\. Again,
    the value is greater than 3, so the body is executed again, and `x` will contain
    the value 1\. At that point, the condition is evaluated, but it’s no longer `true`.
    Therefore, the repeating instruction comes to an end. So, after this piece of
    code is executed, the variable `x` contains the value 1\. In fact, what you’ve
    programmed here is integer division using the `while` instruction. Of course,
    in this case it’s easier to simply use the following single line of code that
    achieves the same result:


    `var x = 10 % 3`


    If you want to draw the player’s number of lives on the screen, you can use a
    `while` instruction to create the lives sprites more efficiently:


    `var livesNode = SKNode()`


    `var index = 0`


    `while index < lives {`


    `let livesSpr = SKSpriteNode(imageNamed: "spr_lives")`


    `livesSpr.position = CGPoint(x: index * Int(livesSpr.size.width), y: 0)`


    `livesNode.addChild(livesSpr)`


    `index = index + 1`


    `}`


    In this `while` instruction, the body is executed as long as the variable `index`
    contains a value less than `lives` (which is a variable you assume is declared
    and initialized to a certain value somewhere else). Every time the body is executed,
    you add a sprite to the game world at a certain position, and then you increment
    `index` by 1\. The result is that you create a sprite object exactly `lives` times!
    So, you’re using the variable `index` here as a counter.


    Note


    You start with `index` equal to zero and continue until `index` has reached the
    same value as `lives`. This means the body of the `while` instruction is executed
    for the values 0, 1, 2, 3, and 4 of `index`. As a result, the body is executed
    five times.


    As you can see in this example, the body of a `while` instruction may contain
    more than a single instruction.


    The position at which you draw the sprites depends on the value of `index`. This
    way, you can draw each sprite a bit further to the right, so they’re nicely placed
    in a row. The first time you execute the body, you draw the sprite at x-position
    0 because `index` is 0\. The next iteration, you draw the sprite at x-position
    `livesSpr.size.width`, the iteration after that at `2 * livesSpr.size.width`,
    and so on. In this case, you use the counter not only to determine how often you
    execute instructions, but also to change what the instructions do. This is a very
    powerful feature of an iteration instruction such as `while`. Because of the looping
    behavior, a `while` instruction is also called a `while` loop. Figure [9-2](#A978-1-4842-0650-8_9_Chapter.html#Fig2)
    shows the Painter game where the number of lives is indicated at the upper left
    on the screen.


    ![A978-1-4842-0650-8_9_Fig2_HTML.jpg](A978-1-4842-0650-8_9_Fig2_HTML.jpg)


    Figure 9-2.


    The Painter game showing the player the remaining number of lives


    ## A Shorter Notation for Incrementing Counters


    Many `while` instructions, especially those that use a counter, have a body that
    contains an instruction for incrementing a variable. This can be done with the
    following instruction:


    `i = i + 1`


    As a side note, especially because of these kinds of instructions, it’s unwise
    to express the assignment as “is.” The value of `i` can, of course, never be the
    same as `i + 1`, but the value of `i becomes` the old value of `i`, plus 1\. These
    kinds of instructions are very common in programs, so a special, shorter notation
    exists that does exactly the same thing:


    `i++`


    The `++` can be expressed as “is incremented.” Because this operator is placed
    after the variable it operates on, the `++` operator is called a postfix operator.
    To increment a variable by more than 1, there is another notation,


    `i += 2`


    and it means the same as


    `i = i + 2`


    There is a similar notation for other basic arithmetic operations:


    `i -= 12         // this is the same as i = i – 12`


    `i *= 0.99       // this is the same as i = i * 0.99`


    `i /= 5          // this is the same as i = i / 5`


    `i--             // this is the same as i = i – 1`


    This notation is very useful because it allows you to write shorter code. For
    example,


    `lives = lives – penalty`


    becomes


    `lives -= penalty`


    When you look at the example code belonging to this chapter and the ones following
    it, you will see that this shorter notation is used in many different classes
    to make the code more compact.'
  trans: "\n# 向玩家显示剩余生命数\n\n显然，玩家想知道自己的游戏状态。因此，你需要在屏幕上以某种方式指示玩家还剩多少条命。在《画家》游戏中，这是通过在屏幕左上角显示多个气球来实现的。利用你已有的知识，最初你可以添加五个气球进行绘制：\n\
    \n```\nvar livesNode = SKNode()\nlet livesSpr1 = SKSpriteNode(imageNamed: \"spr_lives\"\
    )\nlivesSpr1.position = CGPoint(x: 0, y: 0)\nlivesNode.addChild(livesSpr1)\nlet\
    \ livesSpr2 = SKSpriteNode(imageNamed: \"spr_lives\")\nlivesSpr2.position = CGPoint(x:\
    \ Int(livesSpr2.size.width), y: 0)\nlivesNode.addChild(livesSpr2)\nlet livesSpr3\
    \ = SKSpriteNode(imageNamed: \"spr_lives\")\nlivesSpr3.position = CGPoint(x: 2\
    \ * Int(livesSpr3.size.width), y: 0)\nlivesNode.addChild(livesSpr3)\nlet livesSpr4\
    \ = SKSpriteNode(imageNamed: \"spr_lives\")\nlivesSpr4.position = CGPoint(x: 3\
    \ * Int(livesSpr4.size.width), y: 0)\nlivesNode.addChild(livesSpr4)\nlet livesSpr5\
    \ = SKSpriteNode(imageNamed: \"spr_lives\")\nlivesSpr5.position = CGPoint(x: 4\
    \ * Int(livesSpr5.size.width), y: 0)\nlivesNode.addChild(livesSpr5)\n```\n\n通过将精灵的宽度乘以一个数字并以此作为精灵的\
    \ x 坐标位置，你最终得到了五个并排绘制的精灵。现在，你可以在 update 方法中添加几行代码来更改这些精灵的隐藏状态，从而正确显示生命数：\n\n```\n\
    livesSpr5.hidden = lives > 4\nlivesSpr4.hidden = lives > 3\nlivesSpr3.hidden =\
    \ lives > 2\nlivesSpr2.hidden = lives > 1\nlivesSpr1.hidden = lives > 0\n```\n\
    \n虽然这样可行，但这并不是一个很好的解决方案。你多次编写了相似的指令。如果决定让玩家初始拥有十条命而不是五条，会发生什么？你需要编写两倍于此的代码。而且，如果你决定让最大生命数完全动态化，例如让玩家可以赢得额外生命，这个解决方案就完全行不通了。幸运的是，有一种更好的方法：迭代。\n\
    \n## 多次执行指令\n\nSwift 中的迭代是一种重复执行指令多次的方法。请看下面的代码片段：\n\n```\nvar x = 10\nwhile x\
    \ >= 3 {\n    x = x – 3\n}\n```\n\n第二条指令被称为 `while` 循环。这条指令由一个类似头部的部分（`while x\
    \ >= 3`）和一个用花括号括起来的循环体（`x = x - 3`）组成，这与 `if` 指令的结构非常相似。头部由关键字 `while` 后跟一个条件组成。循环体本身是一条指令。在本例中，该指令从一个变量中减去\
    \ 3。然而，它也可以是其他类型的指令，例如调用方法或访问属性。图 9-1 展示了 `while` 指令的语法图。\n\n![A978-1-4842-0650-8_9_Fig1_HTML.gif](img/A978-1-4842-0650-8_9_Fig1_HTML.gif)\n\
    \n图 9-1. `while` 指令的语法图\n\n当执行 `while` 指令时，其循环体会被执行多次。实际上，只要头部中的条件结果为 `true`，循环体就会被执行。在这个例子中，条件是变量\
    \ `x` 包含的值大于或等于 3。开始时，该变量包含值 10，因此它肯定大于 3。于是，`while` 指令的循环体被执行，之后变量 `x` 包含值 7。然后再次评估条件。变量仍然大于\
    \ 3，因此循环体再次被执行，之后变量 `x` 包含值 4。再次，该值大于 3，所以循环体又被执行一次，`x` 将包含值 1。此时，条件被评估，但不再是 `true`。因此，重复指令结束。所以，在这段代码执行后，变量\
    \ `x` 包含值 1。实际上，你在这里使用 `while` 指令实现的是整数取余运算。当然，在这种情况下，简单地使用下面这行代码就能达到相同效果，并且更简单：\n\
    \n```\nvar x = 10 % 3\n```\n\n如果你想在屏幕上绘制玩家的生命数，你可以使用 `while` 指令来更高效地创建生命精灵：\n\n\
    ```\nvar livesNode = SKNode()\nvar index = 0\nwhile index < lives {\n    let livesSpr\
    \ = SKSpriteNode(imageNamed: \"spr_lives\")\n    livesSpr.position = CGPoint(x:\
    \ index * Int(livesSpr.size.width), y: 0)\n    livesNode.addChild(livesSpr)\n\
    \    index = index + 1\n}\n```\n\n在这个 `while` 指令中，只要变量 `index` 包含的值小于 `lives`（这是一个假设在其他地方已声明并初始化为特定值的变量），循环体就会被执行。每次执行循环体时，你都会在游戏世界的某个位置添加一个精灵，然后将\
    \ `index` 递增 1。结果是你恰好创建了 `lives` 次精灵对象！因此，你在这里将变量 `index` 用作计数器。\n\n**注意：** 你从\
    \ `index` 等于 0 开始，一直持续到 `index` 达到与 `lives` 相同的值。这意味着对于 `index` 的 0、1、2、3、4 这些值，`while`\
    \ 指令的循环体会被执行。因此，循环体被执行了五次。\n\n正如你在本例中所看到的，`while` 指令的循环体可能包含不止一条指令。\n\n绘制精灵的位置取决于\
    \ `index` 的值。这样，你可以将每个精灵绘制得稍微靠右一点，从而使它们整齐地排列成一行。第一次执行循环体时，你会在 x 坐标为 0 的位置绘制精灵，因为\
    \ `index` 是 0。下一次迭代，你在 x 坐标为 `livesSpr.size.width` 的位置绘制精灵，再下一次则在 `2 * livesSpr.size.width`\
    \ 的位置，依此类推。在这种情况下，你不仅使用计数器来确定指令的执行次数，还用它来改变指令所做的事情。这是迭代指令（如 `while`）一个非常强大的特性。由于它的循环行为，`while`\
    \ 指令也被称为 `while` 循环。图 9-2 展示了《画家》游戏在屏幕左上角显示生命数的效果。\n\n![A978-1-4842-0650-8_9_Fig2_HTML.jpg](img/A978-1-4842-0650-8_9_Fig2_HTML.jpg)\n\
    \n图 9-2. 《画家》游戏向玩家显示剩余的生命数\n\n## 递增计数器的简写符号\n\n许多 `while` 指令，尤其是那些使用计数器的指令，其循环体中都包含一条递增变量的指令。这可以通过以下指令完成：\n\
    \n```\ni = i + 1\n```\n\n顺便提一下，正因为这种指令的存在，将赋值表述为“等于”是不明智的。变量 `i` 的值当然永远不可能等于 `i\
    \ + 1`，但是 `i` 的值变成了 `i` 的旧值加 1。这类指令在程序中非常常见，因此存在一种特殊的简写符号，可以完成完全相同的操作：\n\n```\n\
    i++\n```\n\n`++` 可以理解为“自增”。因为这个运算符放在它所操作的变量之后，所以 `++` 运算符被称为后缀运算符。要将一个变量增加大于 1\
    \ 的值，还有另一种符号：\n\n```\ni += 2\n```\n\n其含义与以下相同：\n\n```\ni = i + 2\n```\n\n其他基本算术运算也有类似的符号：\n\
    \n```\ni -= 12          // 等同于 i = i – 12\ni *= 0.99        // 等同于 i = i * 0.99\n\
    i /= 5           // 等同于 i = i / 5\ni--              // 等同于 i = i – 1\n```\n\n\
    这种符号非常有用，因为它允许你编写更短的代码。例如，\n\n```\nlives = lives – penalty\n```\n\n变为\n\n```\n\
    lives -= penalty\n```\n\n如果你查看本书这一章及后续章节附带的示例代码，你会发现许多不同的类都使用了这种简写符号，以使代码更加紧凑。\n"
- fmt: "## A More Compact Looping Syntax\n\nMany `while` instructions use a counting\
    \ variable and therefore have the following structure:\n\n```\nvar i = begin value\n\
    while i < end value {\n    // do something useful using i\n    i++\n}\n```\n\n\
    Because this kind of instruction is quite common, a more compact notation is available\
    \ for it:\n\n```\nfor var i = begin value; i < end value; i++ {\n    // do something\
    \ useful using i\n}\n```\n\nThe meaning of this instruction is exactly the same\
    \ as the earlier `while` instruction. The advantage of using the `for` instruction\
    \ in this case is that everything that has something to do with the counter is\
    \ nicely grouped together in the header of the instruction. This reduces the chance\
    \ of you forgetting the instruction to increment the counter (resulting in an\
    \ endless loop). In the cases where \"do something useful using `i`\" consists\
    \ of only a single instruction, you can leave out the braces, which makes the\
    \ notation even more compact. Also, you can move the declaration of the variable\
    \ `i` in the header of the `for` instruction. For example, look at the following\
    \ code fragment:\n\n```\nfor var index = 0; index < lives; index++ {\n    let\
    \ livesSpr = SKSpriteNode(imageNamed: \"spr_lives\")\n    livesSpr.position =\
    \ CGPoint(x: index * Int(livesSpr.size.width), y: 0)\n    livesNode.addChild(livesSpr)\n\
    }\n```\n\nThis is a very compact instruction that increments the counter and add\
    \ the sprites at different positions. This instruction is equivalent to the `while`\
    \ instruction shown earlier in this chapter.\n\nHere's another example:\n\n```\n\
    for var index = 0; index < livesNode.children.count; index++ {\n    var livesSpr\
    \ = livesNode.children[index] as SKNode\n    livesSpr.hidden = lives <= index\n\
    }\n```\n\nWithout actually understanding what the body does, can you (as an exercise)\
    \ rewrite this `for` instruction into its equivalent `while` instruction?\n\n\
    If you look more closely at what this `for` instruction does, you see that it\
    \ increments a counter `index` from zero to `livesNode.children.count`. The latter\
    \ expression indicates the number of children that the node `livesNode` has. Inside\
    \ the `for` loop, you see two instructions. The first instruction retrieves a\
    \ particular child object from the node. This instruction works with a concept\
    \ called an array. In [Chapter 12](#A978-1-4842-0650-8_12_Chapter.html), you'll\
    \ learn more about arrays. Without going into too much detail, you can assume\
    \ that this instruction retrieves a child node from the node `livesNode` using\
    \ the value of the counter `index`. The result is that the `for` loop retrieves\
    \ all the child nodes from `livesNode` one by one. The second instruction in the\
    \ body sets the hidden status of the node that was retrieved. In other words,\
    \ this `for` loop replaces the following instructions in the `update` method of\
    \ `GameWorld`:\n\n```\nlivesSpr5.hidden = lives <= 4\nlivesSpr4.hidden = lives\
    \ <= 3\nlivesSpr3.hidden = lives <= 2\nlivesSpr2.hidden = lives <= 1\nlivesSpr1.hidden\
    \ = lives <= 0\n```\n\nA very nice property of the new solution that uses `for`\
    \ loops is that it's now really easy to change the maximum number of lives in\
    \ the program. You only have to change the value of the `lives` variable in the\
    \ `GameWorld` class and you're done! The rest of the code works independently\
    \ of the initial value chosen for `lives`. It's a good idea to design your code\
    \ in such a way that it's easy to change. This is just a simple example of how\
    \ you can do that. The advantage is that not only is your code easier to change,\
    \ it's also much more robust. There is a single place where the initial number\
    \ of lives is set instead of multiple places. As a result, the chance that you\
    \ will introduce a bug when you change the number of lives is much smaller.\n\n\
    The condition in a `while` or `for` loop doesn't necessarily have to be related\
    \ to a counter. For example,\n\n```\nfor var nr = 8; !isPrimeNumber(nr); nr++\
    \ {\n    print(nr)\n}\n```\n\nThis `for` loop prints all the numbers 8 or higher,\
    \ until the next prime number (which is 11). Therefore, the output of this piece\
    \ of code is\n\n```\n8\n9\n10\n```\n\nSince in many cases you do need a counter,\
    \ Swift also provides a shorter syntax for dealing with counters. Look at the\
    \ following example:\n\n```\nfor index in 0...9 {\n    // do something\n}\n```\n\
    \nThis `for` loop is equivalent to\n\n```\nfor var index = 0; index <= 9; index++\
    \ {\n    // do something\n}\n```\n\nYou can also define a range that excludes\
    \ the last value, as follows:\n\n```\nfor index in 0..<5 {\n    // index will\
    \ have values 0, 1, 2, 3, 4 respectively\n}\n```\n\nThis is equivalent to\n\n\
    ```\nfor var index = 0; index < 5; index++ {\n    // do something\n}\n```\n\n\
    The nice thing about the range notation for incrementing a counter is that it\
    \ works very well with operations such as performing some task on objects in a\
    \ list. You can also use variable names instead of constants to determine the\
    \ range:\n\n```\nfor index in 0..<lives {\n    let livesSpr = SKSpriteNode(imageNamed:\
    \ \"spr_lives\")\n    livesSpr.position = CGPoint(x: index * Int(livesSpr.size.width),\
    \ y: 0)\n    livesNode.addChild(livesSpr)\n}\n```\n\nIf you simply want to execute\
    \ a block of code a number of times and you don't need a counter, then you can\
    \ omit the variable name and replace it by an underscore. For example, the following\
    \ code prints \"Hello!\" ten times on the screen:\n\n```\nfor _ in 1...10 {\n\
    \    print(\"Hello!\")\n}\n```\n\nThe use of a range in a `for` loop has one limitation:\
    \ the starting value of the range should be smaller than the end value. In other\
    \ words, this is not allowed:\n\n```\nfor index in 3...1 {\n    // do something\n\
    }\n```\n\nWhen you write down such an instruction in your code, the Xcode compiler\
    \ will not generate a compiler error. Instead, when you run the program, a runtime\
    \ error will be generated, immediately stopping the program. The reason that the\
    \ compiler doesn't detect this is because ranges can also be defined by variable\
    \ expressions. Therefore, there is no way in the syntax to define this constraint.\
    \ Figure 9-3 contains the syntax diagram of the `for` instruction. As you can\
    \ see, it contains the syntax for both the range notation and the full notation.\n\
    \n![A978-1-4842-0650-8_9_Fig3_HTML.gif](A978-1-4842-0650-8_9_Fig3_HTML.gif)\n\n\
    **Figure 9-3.** Syntax diagram of the `for` instruction\n\n## A Few Special Cases\n\
    \nThere are a few special cases that you need to know about when dealing with\
    \ `while` and `for` loops. The following subsections discuss these cases.\n\n\
    ### No Repeat at All\n\nSometimes the condition in the header of a `while` instruction\
    \ is already `false` at the beginning. Look at the following code fragment:\n\n\
    ```\nvar x = 1\nvar y = 0\nwhile x < y {\n    x++\n}\n```\n\nIn this case, the\
    \ body of the `while` instruction isn't executed—not even once! Therefore, in\
    \ this example, the variable `x` retains the value 1."
  raw: '## A More Compact Looping Syntax


    Many `while` instructions use a counting variable and therefore have the following
    structure:


    `var i =` `begin value`


    `while i <` `end value`  `{`


        `// do something useful using i`


        `i++`


    `}`


    Because this kind of instruction is quite common, a more compact notation is available
    for it:


    `for var i =` `begin value` `; i <` `end value` `; i++  {`


        `// do something useful using i`


    `}`


    The meaning of this instruction is exactly the same as the earlier `while` instruction.
    The advantage of using the `for` instruction in this case is that everything that
    has something to do with the counter is nicely grouped together in the header
    of the instruction. This reduces the chance of you forgetting the instruction
    to increment the counter (resulting in an endless loop). In the cases where “do
    something useful using `i`” consists of only a single instruction, you can leave
    out the braces, which makes the notation even more compact. Also, you can move
    the declaration of the variable `i` in the header of the `for` instruction. For
    example, look at the following code fragment:


    `for var index = 0; index < lives; index++ {`


        `let livesSpr = SKSpriteNode(imageNamed: "spr_lives")`


        `livesSpr.position = CGPoint(x: index * Int(livesSpr.size.width), y: 0)`


        `livesNode.addChild(livesSpr)`


    `}`


    This is a very compact instruction that increments the counter and add the sprites
    at different positions. This instruction is equivalent to the `while` instruction
    shown earlier in this chapter.


    Here’s another example:


    `for var index = 0; index < livesNode.children.count; index++ {`


        `var livesSpr = livesNode.children[index] as SKNode`


        `livesSpr.hidden = lives <= index`


    `}`


    Without actually understanding what the body does, can you (as an exercise) rewrite
    this `for` instruction into its equivalent `while` instruction?


    If you look more closely at what this `for` instruction does, you see that it
    increments a counter `index` from zero to `livesNode.children.count`. The latter
    expression indicates the number of children that the node `livesNode` has. Inside
    the `for` loop, you see two instructions. The first instruction retrieves a particular
    child object from the node. This instruction works with a concept called an array.
    In [Chapter 12](#A978-1-4842-0650-8_12_Chapter.html), you’ll learn more about
    arrays. Without going into too much detail, you can assume that this instruction
    retrieves a child node from the node `livesNode` using the value of the counter
    `index`. The result is that the `for` loop retrieves all the child nodes from
    `livesNode` one by one. The second instruction in the body sets the hidden status
    of the node that was retrieved. In other words, this `for` loop replaces the following
    instructions in the `update` method of `GameWorld`:


    `livesSpr5.hidden = lives <= 4`


    `livesSpr4.hidden = lives <= 3`


    `livesSpr3.hidden = lives <= 2`


    `livesSpr2.hidden = lives <= 1`


    `livesSpr1.hidden = lives <= 0`


    A very nice property of the new solution that uses `for` loops is that it’s now
    really easy to change the maximum number of lives in the program. You only have
    to change the value of the `lives` variable in the `GameWorld` class and you’re
    done! The rest of the code works independently of the initial value chosen for
    `lives`. It’s a good idea to design your code in such a way that it’s easy to
    change. This is just a simple example of how you can do that. The advantage is
    that not only is your code easier to change, it’s also much more robust. There
    is a single place where the initial number of lives is set instead of multiple
    places. As a result, the chance that you will introduce a bug when you change
    the number of lives is much smaller.


    The condition in a `while` or `for` loop doesn’t necessarily have to be related
    to a counter. For example,


    `for var nr = 8; !isPrimeNumber(nr); nr++ {`


        `print(nr)`


    `}`


    This `for` loop prints all the number 8 or higher, until the next prime number
    (which is 11). Therefore, the output of this piece of code is


    `8`


    `9`


    `10`


    Since in many cases you do need a counter, Swift also provides a shorter syntax
    for dealing with counters. Look at the following example:


    `for index in 0...9 {`


        `// do something`


    `}`


    This `for` loop is equivalent to


    `for var index = 0; index <= 9; index++ {`


        `// do something`


    `}`


    You can also define a range that excludes the last value, as follows:


    `for index in 0..<5 {`


        `// index will have values 0, 1, 2, 3, 4 respectively`


    `}`


    This is equivalent to


    `for var index = 0; index < 5; index++ {`


        `// do something`


    `}`


    The nice thing about the range notation for incrementing a counter is that it
    works very well with operations such as performing some task on objects in a list.
    You can also use variable names instead of constants to determine the range:


    `for index in 0..<lives {`


        `let livesSpr = SKSpriteNode(imageNamed: "spr_lives")`


        `livesSpr.position = CGPoint(x: index * Int(livesSpr.size.width), y: 0)`


        `livesNode.addChild(livesSpr)`


    `}`


    If you simply want to execute a block of code a number of times and you don’t
    need a counter, then you can omit the variable name and replace it by an underscore.
    For example, the following code prints “Hello!” ten times on the screen:


    `for _ in 1...10 {`


        `print("Hello!")`


    `}`


    The use of a range in a `for` loop has one limitation: the starting value of the
    range should be smaller than the end value. In other words, this is not allowed:


    `for index in 3...1 {`


        `// do something`


    `}`


    When you write down such an instruction in your code, the Xcode compiler will
    not generate a compiler error. Instead, when you run the program, a runtime error
    will be generated, immediately stopping the program. The reason that the compiler
    doesn’t detect this is because ranges can also be defined by variable expressions.
    Therefore, there is no way in the syntax to define this constraint. Figure [9-3](#A978-1-4842-0650-8_9_Chapter.html#Fig3)
    contains the syntax diagram of the `for` instruction. As you can see, it contains
    the syntax for both the range notation and the full notation.


    ![A978-1-4842-0650-8_9_Fig3_HTML.gif](A978-1-4842-0650-8_9_Fig3_HTML.gif)


    Figure 9-3.


    Syntax diagram of the `for` instruction


    ## A Few Special Cases


    There are a few special cases that you need to know about when dealing with `while`
    and `for` loops. The following subsections discuss these cases.


    ### No Repeat at All


    Sometimes the condition in the header of a `while` instruction is already `false`
    at the beginning. Look at the following code fragment:


    `var x = 1`


    `var y = 0`


    `while x < y {`


        `x++`


    `}`


    In this case, the body of the `while` instruction isn’t executed—not even once!
    Therefore, in this example, the variable `x` retains the value 1.'
  trans: "\n## 更紧凑的循环语法\n\n许多 `while` 指令都使用计数变量，因此具有以下结构：\n\n```\nvar i = 起始值\nwhile\
    \ i < 结束值 {\n    // 使用 i 做一些有用的事情\n    i++\n}\n```\n\n由于这种指令相当常见，因此有一种更简洁的表示法：\n\
    \n```\nfor var i = 起始值; i < 结束值; i++ {\n    // 使用 i 做一些有用的事情\n}\n```\n\n这条指令的含义与之前的\
    \ `while` 指令完全相同。在这种情况下使用 `for` 指令的好处是，所有与计数器相关的内容都整齐地组合在指令的头部。这降低了忘记编写计数器递增指令（导致无限循环）的可能性。在“使用\
    \ `i` 做一些有用的事情”只包含一条指令的情况下，可以省略大括号，这使得表示法更加紧凑。此外，还可以将变量 `i` 的声明移到 `for` 指令的头部。例如，请看以下代码片段：\n\
    \n```\nfor var index = 0; index < lives; index++ {\n    let livesSpr = SKSpriteNode(imageNamed:\
    \ \"spr_lives\")\n    livesSpr.position = CGPoint(x: index * Int(livesSpr.size.width),\
    \ y: 0)\n    livesNode.addChild(livesSpr)\n}\n```\n\n这是一个非常紧凑的指令，它递增计数器并将精灵添加到不同位置。该指令等价于本章前面展示的\
    \ `while` 指令。\n\n另一个例子：\n\n```\nfor var index = 0; index < livesNode.children.count;\
    \ index++ {\n    var livesSpr = livesNode.children[index] as SKNode\n    livesSpr.hidden\
    \ = lives <= index\n}\n```\n\n在不完全理解循环体作用的情况下，你能（作为练习）将这个 `for` 指令重写为等价的 `while`\
    \ 指令吗？\n\n如果你更仔细地观察这个 `for` 指令的功能，你会发现它将计数器 `index` 从零递增到 `livesNode.children.count`。后一个表达式表示节点\
    \ `livesNode` 的子节点数量。在 `for` 循环内部，有两条指令。第一条指令从节点中检索特定的子对象。这条指令涉及一个称为数组的概念。在第 12\
    \ 章中，你将了解更多关于数组的知识。无需深入细节，你可以假设这条指令使用计数器 `index` 的值从 `livesNode` 节点中检索一个子节点。结果是，`for`\
    \ 循环逐个检索 `livesNode` 的所有子节点。循环体中的第二条指令设置所检索节点的隐藏状态。换句话说，这个 `for` 循环替代了 `GameWorld`\
    \ 的 `update` 方法中的以下指令：\n\n```\nlivesSpr5.hidden = lives <= 4\nlivesSpr4.hidden\
    \ = lives <= 3\nlivesSpr3.hidden = lives <= 2\nlivesSpr2.hidden = lives <= 1\n\
    livesSpr1.hidden = lives <= 0\n```\n\n使用 `for` 循环的新解决方案有一个很好的特性，即现在改变程序中的最大生命数非常容易。你只需修改\
    \ `GameWorld` 类中 `lives` 变量的值即可！代码的其余部分独立于为 `lives` 选择的初始值运行。以易于修改的方式设计代码是一个好主意。这只是一个简单示例，说明如何做到这一点。好处不仅是代码更容易修改，而且也更加健壮。初始生命数在一个地方设置，而不是多个地方。因此，当你改变生命数时引入错误的可能性要小得多。\n\
    \n`while` 或 `for` 循环中的条件不一定非要是与计数器相关的。例如：\n\n```\nfor var nr = 8; !isPrimeNumber(nr);\
    \ nr++ {\n    print(nr)\n}\n```\n\n这个 `for` 循环打印所有大于等于 8 的数，直到遇到下一个质数（即 11）。因此，这段代码的输出是：\n\
    \n```\n8\n9\n10\n```\n\n由于在许多情况下你确实需要一个计数器，Swift 还提供了一种更短的语法来处理计数器。请看以下示例：\n\n\
    ```\nfor index in 0...9 {\n    // 做某事\n}\n```\n\n这个 `for` 循环等价于：\n\n```\nfor var\
    \ index = 0; index <= 9; index++ {\n    // 做某事\n}\n```\n\n你也可以定义一个排除最后一个值的范围，如下所示：\n\
    \n```\nfor index in 0..<5 {\n    // index 将依次取值 0, 1, 2, 3, 4\n}\n```\n\n这等价于：\n\
    \n```\nfor var index = 0; index < 5; index++ {\n    // 做某事\n}\n```\n\n范围表示法用于递增计数器的一个优点是，它与对列表中的对象执行某些任务等操作配合得很好。也可以使用变量名而不是常量来确定范围：\n\
    \n```\nfor index in 0..<lives {\n    let livesSpr = SKSpriteNode(imageNamed: \"\
    spr_lives\")\n    livesSpr.position = CGPoint(x: index * Int(livesSpr.size.width),\
    \ y: 0)\n    livesNode.addChild(livesSpr)\n}\n```\n\n如果你只是想重复执行一段代码块若干次，而不需要计数器，那么可以省略变量名，并用下划线替换。例如，以下代码会在屏幕上打印十次\"\
    Hello!\"：\n\n```\nfor _ in 1...10 {\n    print(\"Hello!\")\n}\n```\n\n在 `for`\
    \ 循环中使用范围有一个限制：范围的起始值必须小于结束值。换句话说，以下写法是不允许的：\n\n```\nfor index in 3...1 {\n  \
    \  // 做某事\n}\n```\n\n当你在代码中写下这样的指令时，Xcode 编译器不会产生编译错误。相反，当你运行程序时，会生成一个运行时错误，立即停止程序。编译器未检测到此问题的原因是，范围也可以通过变量表达式来定义。因此，语法上无法定义这个约束。图\
    \ 9-3 包含了 `for` 指令的语法图。如你所见，它包含了范围表示法和完整表示法的语法。\n\n![A978-1-4842-0650-8_9_Fig3_HTML.gif](img/A978-1-4842-0650-8_9_Fig3_HTML.gif)\n\
    \n**图 9-3.** `for` 指令的语法图\n\n## 几个特殊情况\n\n在处理 `while` 和 `for` 循环时，有几个特殊情况需要了解。以下小节将讨论这些情况。\n\
    \n### 完全不执行\n\n有时 `while` 指令头部的条件在开始时就已经是 `false`。请看以下代码片段：\n\n```\nvar x = 1\n\
    var y = 0\nwhile x < y {\n    x++\n}\n```\n\n在这种情况下，`while` 指令的循环体根本不会执行——一次也不会！因此，在此例中，变量\
    \ `x` 保持值 1 不变。\n"
- fmt: "### Infinite Repeat\n\nOne of the dangers of using `while` instructions (and,\
    \ to a lesser extent, `for` instructions) is that they might never end, if you're\
    \ not careful. You can easily write such an instruction:\n\n```\nwhile 1 + 1 ==\
    \ 2 {\n    x = x + 1\n}\n```\n\nIn this case, the value of `x` is incremented\
    \ without end. This is because the condition `1 + 1 == 2` always yields `true`,\
    \ no matter what is done in the body of the instruction. This example is quite\
    \ easy to avoid, but often a `while` instruction ends in an infinite loop because\
    \ of a programming error. Consider the following example:\n\n```\nvar x = 1\n\
    var n = 0\nwhile n < 10 {\n    x = x * 2\n}\n```\n\nThe intention of this code\
    \ is that the value of `x` is doubled ten times. But unfortunately, the programmer\
    \ forgot to increment the counter in the body of the `while` instruction. As a\
    \ result, the value of `n` will never be greater than or equal to ten, and the\
    \ body of the `while` loop is infinitely repeated. What the programmer actually\
    \ meant was:\n\n```\nvar x = 1\nvar n = 0\nwhile n < 10 {\n    x = x * 2\n   \
    \ n++\n}\n```\n\nIt would be a pity if you had to throw away your computer or\
    \ mobile device after it was put into a coma because you forgot to increment the\
    \ counter in the body of your `while` instruction. Fortunately, the operating\
    \ system of most devices (including Macs, iPads, and iPhones) can stop the execution\
    \ of a program by force, even if it hasn't finished. Once that's done, you can\
    \ start to look for the cause of the program hanging. Although such hang-ups occur\
    \ occasionally in programs, it's your job as a game programmer to make sure that\
    \ once the game is publicly available, these kinds of programming errors have\
    \ been removed from the game code. This is why proper testing is so important.\n\
    \nIn general, if the program you wrote doesn't seem to do anything on startup,\
    \ or if it hangs indefinitely, check out what is happening in the `while` instructions.\
    \ A very common mistake is to forget to increment the counter variable, so the\
    \ condition of the `while` instruction never becomes `false` and the `while` loop\
    \ continues indefinitely. Many other programming errors may lead to an infinite\
    \ loop. In fact, infinite loops are so common that a street in Cupertino, California\
    \ has been named after them—and located on that street is Apple headquarters!\n\
    \n### Nested Repeats\n\nThe body of a `while` instruction or a `for` instruction\
    \ is a block of instructions delimited by braces. Inside the block you can write\
    \ any kind of instruction: an assignment, a method call, or another `while` or\
    \ `for` loop. For example:\n\n```\nfor y in 0...5 {\n    for x in 0...y {\n  \
    \      let livesSpr = SKSpriteNode(imageNamed: \"spr_lives\")\n        livesSpr.position\
    \ = CGPoint(x: x * Int(livesSpr.size.width),\n            y: y * -Int(livesSpr.size.height))\n\
    \        livesNode.addChild(livesSpr)\n    }\n}\n```\n\nIn this fragment, the\
    \ variable `y` counts from 0 to 5. For each of these values of `y`, the body is\
    \ executed, which consists of a `for` instruction. This second `for` instruction\
    \ uses the counter `x`, which has as an upper limit the value of `y`. Therefore,\
    \ in each progression of the outer `for` instruction, the inner `for` instruction\
    \ goes on longer. The instruction that is repeated places a yellow balloon sprite\
    \ at the position calculated by using the values of the `x` and `y` counters.\
    \ The result of this loop is a number of balloons placed in the shape of a triangle\
    \ (see Figure [9-4](#A978-1-4842-0650-8_9_Chapter.html#Fig4)).\n\n![A978-1-4842-0650-8_9_Fig4_HTML.jpg](A978-1-4842-0650-8_9_Fig4_HTML.jpg)\n\
    \nFigure 9-4. Balloons in a triangle shape\n\n## Restarting the Game\n\nWhen the\
    \ player has lost all their lives, the game is over. How do you deal with this?\
    \ In the Painter game, you want to show a Game Over screen. The player can tap\
    \ on the screen, which will then restart the game. In order to add this to the\
    \ game, you load an extra sprite when the game is started that represents the\
    \ Game Over screen. You store this sprite as a property in the `GameWorld` class:\n\
    \n```\nvar gameover = SKSpriteNode(imageNamed: \"spr_gameover\")\n```\n\nIn the\
    \ initializer of `GameWorld`, you add this sprite to the main node representing\
    \ the game world. Secondly, you assign a higher z-position to the sprite, so that\
    \ it will be drawn on top of everything else. Finally, you set the hidden flag\
    \ of the sprite, so it won't be shown yet to the player:\n\n```\nnode.addChild(gameover)\n\
    gameover.zPosition = 2\ngameover.hidden = true\n```\n\nNow you can use an `if`\
    \ instruction in each of the game-loop methods to determine what you should do.\
    \ If the game is over, you don't want the cannon and the ball to handle input\
    \ anymore; you simply want to check if the player taps on the screen. If that\
    \ happens, you reset the game. So, the `handleInput` method in the `GameWorld`\
    \ class now contains the following instructions:\n\n```\nif (lives > 0) {\n  \
    \  cannon.handleInput(inputHelper)\n    ball.handleInput(inputHelper)\n} else\
    \ if (inputHelper.hasTapped) {\n    reset()\n}\n```\n\nYou add a `reset` method\
    \ to the `GameWorld` class so you can reset the game to its initial state. This\
    \ means resetting all the game objects. You also need to reset the number of lives\
    \ to five. Here is the full `reset` method in `GameWorld`:\n\n```\nfunc reset()\
    \ {\n    lives = 5\n    cannon.reset()\n    ball.reset()\n    can1.reset()\n \
    \   can2.reset()\n    can3.reset()\n}\n```\n\nFor the `updateDelta` method, you\
    \ only need to update the game objects if the game isn't over. Therefore, you\
    \ first check with an `if` instruction whether you need to update the game objects.\
    \ If not (in other words, the number of lives has reached zero), you return from\
    \ the method, like so:\n\n```\nif (lives <= 0) {\n    return\n}\n// since you\
    \ know that the player is still alive, you can update the game objects here\n\
    ```\n\n**Note:** Check if the number of lives is smaller than or equal to zero.\
    \ Are there cases in which the number of lives is less than zero? It is probably\
    \ very unlikely, but it is possible that in one iteration of the game loop two\
    \ paint cans fall out of the screen simultaneously and the number of lives is\
    \ decremented twice. If the number of lives was 1, then the new number of lives\
    \ is -1.\n\nThe Game Over overlay should only be displayed if the player is no\
    \ longer alive, so as the first instruction in the `updateDelta` method, you set\
    \ the `hidden` status of the game over sprite accordingly:\n\n```\ngameover.hidden\
    \ = lives > 0\n```\n\nIn other words, the sprite remains hidden as long as the\
    \ number of lives of the player is larger than zero. Figure [9-5](#A978-1-4842-0650-8_9_Chapter.html#Fig5)\
    \ shows the Game Over overlay drawn on top of the game world.\n\n![A978-1-4842-0650-8_9_Fig5_HTML.jpg](A978-1-4842-0650-8_9_Fig5_HTML.jpg)\n\
    \nFigure 9-5. Game over!\n\nIn Figure [9-5](#A978-1-4842-0650-8_9_Chapter.html#Fig5),\
    \ notice that the Game Over overlay doesn't completely hide the other objects\
    \ and the background. The reason is that the Game Over sprite has some transparent\
    \ pixels. Often, sprites have transparent parts so the sprites seem to be integrated\
    \ parts of the game world. The balloon, the ball, the paint cans, and the cannon\
    \ barrel all are partly transparent, which is why they seamlessly integrate into\
    \ the game world. When designing sprites, you need to make sure the image has\
    \ these transparency values set correctly. Although doing this right can be a\
    \ lot of work, modern image-editing tools such as Adobe Photoshop give you many\
    \ means to define transparency in images. Just be sure you save the image in a\
    \ format that supports transparency, such as PNG.\n\n**Note:** You can use the\
    \ (lack of) transparency of overlays to control what the player is seeing. In\
    \ some cases, you might want things obscured (such as a \"pause\" screen in a\
    \ time-sensitive game) or able to be seen (such as the Game Over screen in Painter)."
  raw: '### Infinite Repeat


    One of the dangers of using `while` instructions (and, to a lesser extent, `for`
    instructions) is that they might never end, if you’re not careful. You can easily
    write such an instruction:


    `while 1 + 1 == 2 {`


        `x = x + 1`


    `}`


    In this case, the value of `x` is incremented without end. This is because the
    condition `1 + 1 == 2` always yields `true`, no matter what is done in the body
    of the instruction. This example is quite easy to avoid, but often a `while` instruction
    ends in an infinite loop because of a programming error. Consider the following
    example:


    `var x = 1`


    `var n = 0`


    `while n < 10 {`


        `x = x * 2`


    `}`


    The intention of this code is that the value of `x` is doubled ten times. But
    unfortunately, the programmer forgot to increment the counter in the body of the
    `while` instruction. As a result, the value of `n` will never be greater than
    or equal to ten, and the body of the `while` loop is infinitely repeated. What
    the programmer actually meant was


    `var x = 1`


    `var n = 0`


    `while n < 10 {`


        `x = x * 2`


        `n++`


    `}`


    It would be a pity if you had to throw away your computer or mobile device after
    it was put into a coma because you forgot to increment the counter in the body
    of your `while` instruction. Fortunately, the operating system of most devices
    (including Macs, iPads, and iPhones) can stop the execution of a program by force,
    even if it hasn’t finished. Once that’s done, you can start to look for the cause
    of the program hanging. Although such hang-ups occur occasionally in programs,
    it’s your job as a game programmer to make sure that once the game is publicly
    available, these kinds of programming errors have been removed from the game code.
    This is why proper testing is so important.


    In general, if the program you wrote doesn’t seem to do anything on startup, or
    if it hangs indefinitely, check out what is happening in the `while` instructions.
    A very common mistake is to forget to increment the counter variable, so the condition
    of the `while` instruction never becomes `false` and the `while` loop continues
    indefinitely. Many other programming errors may lead to an infinite loop. In fact,
    infinite loops are so common that a street in Cupertino, California has been named
    after them—and located on that street is Apple headquarters!


    ### Nested Repeats


    The body of a `while` instruction or a `for` instruction is a block of instructions
    delimited by braces. Inside the block you can write any kind of instruction: an
    assignment, a method call, or another `while` or `for` loop. For example,


    `for y in 0...5 {`


        `for x in 0...y {`


            `let livesSpr = SKSpriteNode(imageNamed: "spr_lives")`


            `livesSpr.position = CGPoint(x: x * Int(livesSpr.size.width),`


                `y: y * -Int(livesSpr.size.height))`


            `livesNode.addChild(livesSpr)`


        `}`


    `}`


    In this fragment, the variable `y` counts from 0 to 5. For each of these values
    of `y`, the body is executed, which consists of a `for` instruction. This second
    `for` instruction uses the counter `x`, which has as an upper limit the value
    of `y`. Therefore, in each progression of the outer `for` instruction, the inner
    f`o`r instruction goes on longer. The instruction that is repeated places a yellow
    balloon sprite at the position calculated by using the values of the `x` and `y`
    counters. The result of this loop is a number of balloons placed in the shape
    of a triangle (see Figure [9-4](#A978-1-4842-0650-8_9_Chapter.html#Fig4)).


    ![A978-1-4842-0650-8_9_Fig4_HTML.jpg](A978-1-4842-0650-8_9_Fig4_HTML.jpg)


    Figure 9-4.


    Balloons in a triangle shape


    ## Restarting the Game


    When the player has lost all their lives, the game is over. How do you deal with
    this? In the Painter game, you want to show a Game Over screen. The player can
    tap on the screen, which will then restart the game. In order to add this to the
    game, you load an extra sprite when the game is started that represents the Game
    Over screen. You store this sprite as a property in the `GameWorld` class:


    `var gameover = SKSpriteNode(imageNamed: "spr_gameover")`


    In the initializer of `GameWorld`, you add this sprite to the main node representing
    the game world. Secondly, you assign a higher z-position to the sprite, so that
    it will be drawn on top of everything else. Finally, you set the hidden flag of
    the sprite, so it won’t be shown yet to the player:


    `node.addChild(gameover)`


    `gameover.zPosition = 2`


    `gameover.hidden = true`


    Now you can use an `if` instruction in each of the game-loop methods to determine
    what you should do. If the game is over, you don’t want the cannon and the ball
    to handle input anymore; you simply want to check if the player taps on the screen.
    If that happens, you reset the game. So, the `handleInput` method in the `GameWorld`
    class now contains the following instructions:


    `if (lives > 0) {`


    `cannon.handleInput(inputHelper)`


    `ball.handleInput(inputHelper)`


    `} else if (inputHelper.hasTapped) {`


    `reset()`


    `}`


    You add a `reset` method to the `GameWorld` class so you can reset the game to
    its initial state. This means resetting all the game objects. You also need to
    reset the number of lives to five. Here is the full `reset` method in `GameWorld`:


    `func reset() {`


    `lives = 5`


    `cannon.reset()`


    `ball.reset()`


    `can1.reset()`


    `can2.reset()`


    `can3.reset()`


    `}`


    For the `updateDelta` method, you only need to update the game objects if the
    game isn’t over. Therefore, you first check with an `if` instruction whether you
    need to update the game objects. If not (in other words, the number of lives has
    reached zero), you return from the method, like so:


    `if (lives <= 0) {`


    `return`


    `}`


    `// since you know that the player is still alive, you can update the game objects
    here`


    Note


    Check if the number of lives is smaller than or equal to zero. Are there cases
    in which the number of lives is less than zero? It is probably very unlikely,
    but it is possible that in one interation of the game loop two paint cans fall
    out of the screen simultaneously and the number of lives is decremented twice.
    If the number of lives was 1, then the new number of lives is -1.


    The Game Over overlay should only be displayed if the player is no longer alive,
    so as the first instruction in the `updateDelta` method, you set the `hidden`
    status of the game over sprite accordingly:


    `gameover.hidden = lives > 0`


    In other words, the sprite remains hidden as long as the number of lives of the
    player is larger than zero. Figure [9-5](#A978-1-4842-0650-8_9_Chapter.html#Fig5)
    shows the Game Over overlay drawn on top of the game world.


    ![A978-1-4842-0650-8_9_Fig5_HTML.jpg](A978-1-4842-0650-8_9_Fig5_HTML.jpg)


    Figure 9-5.


    Game over!


    In Figure [9-5](#A978-1-4842-0650-8_9_Chapter.html#Fig5), notice that the Game
    Over overlay doesn’t completely hide the other objects and the background. The
    reason is that the Game Over sprite has some transparent pixels. Often, sprites
    have transparent parts so the sprites seem to be integrated parts of the game
    world. The balloon, the ball, the paint cans, and the cannon barrel all are partly
    transparent, which is why they seamlessly integrate into the game world. When
    designing sprites, you need to make sure the image has these transparency values
    set correctly. Although doing this right can be a lot of work, modern image-editing
    tools such as Adobe Photoshop give you many means to define transparency in images.
    Just be sure you save the image in a format that supports transparency, such as
    PNG.


    Note


    You can use the (lack of) transparency of overlays to control what the player
    is seeing. In some cases, you might want things obscured (such as a “pause” screen
    in a time-sensitive game) or able to be seen (such as the Game Over screen in
    Painter).'
  trans: "\n### 无限循环\n\n使用`while`指令（以及较小程度上的`for`指令）的一个危险之处在于，如果你不小心，它们可能永远不会结束。你很容易写出这样的指令：\n\
    \n```\nwhile 1 + 1 == 2 {\n    x = x + 1\n}\n```\n\n在这个例子中，变量`x`的值会无限递增。这是因为无论指令体内部执行什么操作，条件`1\
    \ + 1 == 2`总是返回`true`。这个例子很容易避免，但通常`while`指令会因编程错误而陷入无限循环。请看下面的例子：\n\n```\nvar\
    \ x = 1\nvar n = 0\nwhile n < 10 {\n    x = x * 2\n}\n```\n\n这段代码的本意是将`x`的值翻倍十次。但不幸的是，程序员忘记了在`while`指令体中递增计数器。结果，`n`的值永远不会大于或等于十，因此`while`循环体被无限重复执行。程序员实际想写的是：\n\
    \n```\nvar x = 1\nvar n = 0\nwhile n < 10 {\n    x = x * 2\n    n++\n}\n```\n\n\
    如果你的电脑或移动设备因为你在`while`指令体中忘记递增计数器而陷入“昏迷”状态，最后不得不扔掉它，那将是一件很遗憾的事。幸运的是，大多数设备（包括 Mac、iPad\
    \ 和 iPhone）的操作系统即使程序尚未完成，也能强制停止其执行。一旦停止，你就可以开始查找程序卡死的原因。虽然程序中偶尔会出现此类卡死现象，但作为游戏程序员，你的职责是确保游戏公开发布时，这些编程错误已从游戏代码中移除。这就是充分测试如此重要的原因。\n\
    \n通常，如果你编写的程序启动后似乎没有任何反应，或者无限期卡死，请检查`while`指令中发生了什么。一个非常常见的错误是忘记递增计数器变量，导致`while`指令的条件永远不会变成`false`，从而无限循环下去。许多其他编程错误也可能导致无限循环。事实上，无限循环非常常见，以至于加利福尼亚州库比蒂诺市的一条街道就以它们命名——而苹果公司总部就坐落在这条街上！\n\
    \n### 嵌套循环\n\n`while`指令或`for`指令的体是一个由花括号定界的指令块。在块内部，你可以编写任何类型的指令：赋值语句、方法调用，或者另一个`while`或`for`循环。例如：\n\
    \n```\nfor y in 0...5 {\n    for x in 0...y {\n        let livesSpr = SKSpriteNode(imageNamed:\
    \ \"spr_lives\")\n        livesSpr.position = CGPoint(x: x * Int(livesSpr.size.width),\n\
    \            y: y * -Int(livesSpr.size.height))\n        livesNode.addChild(livesSpr)\n\
    \    }\n}\n```\n\n在这个片段中，变量`y`从 0 计数到 5。对于每个`y`值，其循环体（包含一个`for`指令）都会被执行。这第二个`for`指令使用计数器`x`，其上限是`y`的值。因此，随着外层`for`指令的每次推进，内层`for`指令执行的时间会更长。被重复执行的指令会在由`x`和`y`计数器值计算出的位置放置一个黄色气球精灵。这个循环的结果是许多气球被放置成三角形（见图\
    \ 9-4）。\n\n![A978-1-4842-0650-8_9_Fig4_HTML.jpg](img/A978-1-4842-0650-8_9_Fig4_HTML.jpg)\n\
    \n图 9-4. 呈三角形排列的气球\n\n## 重新开始游戏\n\n当玩家失去所有生命时，游戏结束。你如何处理这种情况？在 Painter 游戏中，你希望显示一个游戏结束画面。玩家可以点击屏幕，然后游戏将重新开始。为了在游戏中实现这一点，你需要在游戏启动时加载一个代表游戏结束画面的额外精灵。你将此精灵作为`GameWorld`类的一个属性存储：\n\
    \n```\nvar gameover = SKSpriteNode(imageNamed: \"spr_gameover\")\n```\n\n在`GameWorld`的初始化方法中，你将此精灵添加到代表游戏世界的主节点上。其次，你为这个精灵分配一个更高的\
    \ z 轴位置，以便它会被绘制在所有其他内容之上。最后，你设置精灵的隐藏标志，使其暂时不对玩家显示：\n\n```\nnode.addChild(gameover)\n\
    gameover.zPosition = 2\ngameover.hidden = true\n```\n\n现在，你可以在每个游戏循环方法中使用`if`指令来决定该做什么。如果游戏结束，你不想让大炮和球再处理输入；你只想检查玩家是否点击了屏幕。如果发生了点击，你就重置游戏。因此，`GameWorld`类中的`handleInput`方法现在包含以下指令：\n\
    \n```\nif (lives > 0) {\n    cannon.handleInput(inputHelper)\n    ball.handleInput(inputHelper)\n\
    } else if (inputHelper.hasTapped) {\n    reset()\n}\n```\n\n你向`GameWorld`类添加一个`reset`方法，以便将游戏重置到初始状态。这意味着重置所有游戏对象。你还需要将生命数量重置为五。以下是`GameWorld`中完整的`reset`方法：\n\
    \n```\nfunc reset() {\n    lives = 5\n    cannon.reset()\n    ball.reset()\n \
    \   can1.reset()\n    can2.reset()\n    can3.reset()\n}\n```\n\n对于`updateDelta`方法，你只需要在游戏未结束时更新游戏对象。因此，你首先用一个`if`指令检查是否需要更新游戏对象。如果不需要（换句话说，生命数量已降至零），你就从该方法返回，如下所示：\n\
    \n```\nif (lives <= 0) {\n    return\n}\n// 因为你知道玩家还活着，所以可以在这里更新游戏对象\n```\n\n\
    **注意：** 检查生命数量是否小于或等于零。是否存在生命数量小于零的情况？这很可能非常罕见，但有可能在一个游戏循环迭代中，两罐油漆同时掉落出屏幕，导致生命数量被减两次。如果当时生命数量是\
    \ 1，那么新的生命数量就是 -1。\n\n只有在玩家不再存活时，才应显示游戏结束覆盖层，因此在`updateDelta`方法中，作为第一条指令，你需要相应地设置\
    \ game over 精灵的`hidden`状态：\n\n```\ngameover.hidden = lives > 0\n```\n\n换句话说，只要玩家的生命数量大于零，该精灵就保持隐藏状态。图\
    \ 9-5 显示了绘制在游戏世界顶部的游戏结束覆盖层。\n\n![A978-1-4842-0650-8_9_Fig5_HTML.jpg](img/A978-1-4842-0650-8_9_Fig5_HTML.jpg)\n\
    \n图 9-5. 游戏结束！\n\n在图 9-5 中，请注意游戏结束覆盖层并没有完全隐藏其他对象和背景。原因是游戏结束精灵有一些透明像素。通常，精灵带有透明部分，以便它们看起来像是游戏世界的一个组成部分。气球、球、油漆罐和大炮管都有部分是透明的，这就是它们能无缝融入游戏世界的原因。在设计精灵时，你需要确保图像正确设置了这些透明度值。虽然正确完成这一点可能需要大量工作，但像\
    \ Adobe Photoshop 这样的现代图像编辑工具为你提供了许多定义图像透明度的方法。只需确保将图像保存为支持透明度的格式，例如 PNG。\n\n\
    **注意：** 你可以利用覆盖层的（不）透明度来控制玩家看到的内容。在某些情况下，你可能希望某些东西被遮挡（例如，在时间敏感的游戏中显示“暂停”画面）或者能够被看到（例如\
    \ Painter 游戏中的游戏结束画面）。\n"
- fmt: "## What You Have Learned\n\nIn this chapter, you have learned the following:\n\
    - How to store and display the current number of lives for a player\n- How to\
    \ repeat a group of instructions using the `while` or `for` instruction\n- How\
    \ to restart the game when the player has no lives remaining\n\n# 10. Organizing\
    \ Game Objects\n\nElectronic supplementary material The online version of this\
    \ chapter (doi:[10.1007/978-1-4842-0650-8_10](http://dx.doi.org/10.1007/978-1-4842-0650-8_10))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    You saw in the previous chapters how to use classes to group variables that belong\
    \ together. This chapter looks at the similarities between the different types\
    \ of game objects and how you can express these similarities in Swift.\n\n## Similarities\
    \ Between Game Objects\n\nIf you look at the different game objects in the Painter\
    \ game, you can see that they have a lot of things in common. For example, the\
    \ ball, the cannon, and the paint cans all use three sprites that represent each\
    \ of the three different colors. Also, most objects in the game have a velocity.\
    \ Furthermore, some of the game objects have a method for handling input, some\
    \ have an `updateDelta` method, and some have a `reset` method. Now, it isn’t\
    \ really a problem that these classes have similarities. The compiler or the players\
    \ of the game won’t complain about that. However, it’s a pity that you have to\
    \ copy code all the time. To give an example, the `Cannon`, `Ball`, and `PaintCan`\
    \ classes all have the following computed property called `color`:\n\n```\nvar\
    \ color: UIColor {\n    get {\n        if (!red.hidden) {\n            return\
    \ UIColor.redColor()\n        } else if (!green.hidden) {\n            return\
    \ UIColor.greenColor()\n        } else {\n            return UIColor.blueColor()\n\
    \        }\n    }\n    set(col) {\n        if col != UIColor.redColor() && col\
    \ != UIColor.greenColor()\n            && col != UIColor.blueColor() {\n     \
    \           return\n        }\n        red.hidden = col != UIColor.redColor()\n\
    \        green.hidden = col != UIColor.greenColor()\n        blue.hidden = col\
    \ != UIColor.blueColor()\n    }\n}\n```\n\nThe code is exactly the same, but you\
    \ have to copy it for all three classes. And every time you want to add a different\
    \ kind of colored game object, you probably need to copy this property again.\
    \ If you only have to do that for one property, it's not that much of a problem.\
    \ But there are more similarities between classes in Painter. For example, most\
    \ game object classes in the Painter game have the same stored properties: `velocity`,\
    \ `red`, `green`, and `blue`.\n\nIn general, it's better to avoid copying a lot\
    \ of code. Why is that? Because if at some point you realize there is a mistake\
    \ in that part of the code, you have to correct it everywhere you copied it to.\
    \ In a small game like Painter, this isn't a big issue. But when you develop a\
    \ commercial game with hundreds of different game-object classes, this becomes\
    \ a serious maintenance problem. Furthermore, you don't always know how far a\
    \ small game will go. If you aren't careful, you can end up copying a lot of code\
    \ (and the bugs associated with it). As a game matures, it's a good idea to keep\
    \ an eye out for where to optimize code, even if this means some extra work to\
    \ find these duplications and consolidate them. For this particular situation,\
    \ you need to think about how the different kinds of game objects are similar\
    \ and whether you can group these similarities together, just as you grouped the\
    \ properties in the previous chapters.\n\nConceptually speaking, it's easy to\
    \ say what is similar between balls, paint cans, and cannons: they're all game\
    \ objects. Basically, they are all located at a certain position; they all have\
    \ a velocity (even the cannon, but its velocity is zero); and they all have a\
    \ color that is red, green, or blue. Furthermore, most of them handle input of\
    \ some kind and are updated.\n\n## Inheritance\n\nIn Swift, you can group these\
    \ similarities together in a generic class and then define other classes that\
    \ are a special version of this generic class. In object-oriented jargon, this\
    \ is called inheritance, and it's a very powerful language feature. Consider the\
    \ following example:\n\n```\nclass Vehicle {\n    var numberOfWheels = 4\n   \
    \ var brand = \"\"\n    func what() -> String {\n        return \"nrOfWheels =\
    \ \\(numberOfWheels), brand = \\(brand)\"\n    }\n}\n```\n\nHere you have a very\
    \ simple example of a class for representing vehicles (you can imagine that this\
    \ could be useful for a traffic-simulation game). To keep things simple, a vehicle\
    \ is defined by a number of wheels and a brand. The `Vehicle` class also has a\
    \ method called `what` that returns a description of the vehicle as a `String`\
    \ value (text). This method could be useful if you wanted to create an app that\
    \ presented a list of vehicles in a table. Note that I used a special mechanism\
    \ in Swift to combine text and variables:\n\n```\nreturn \"nrOfWheels = \\(numberOfWheels),\
    \ brand = \\(brand)\"\n```\n\nIn Swift, this process of creating a `String` value\
    \ by mixing constants or variables with text is called string interpolation. If\
    \ you want to insert the value of a variable inside a text string, you simply\
    \ write the name of the variable between `\\(` and `)` . Here is an example that\
    \ creates a variable of type `Vehicle` and that prints the vehicle data to the\
    \ console:\n\n```\nvar v = Vehicle()\nv.brand = \"volkswagen\"\nprint(v.what())\
    \ // outputs \"nrOfWheels = 4, brand = volkswagen\"\n```\n\nLet's add an initializer\
    \ to the class that accepts the brand name as a parameter:\n\n```\ninit(_ b: String)\
    \ {\n    brand = b\n}\n```\n\nNow you can create a vehicle and immediately assign\
    \ it a brand name:\n\n```\nvar v = Vehicle(\"volkswagen\")\nprint(v.what())\n\
    ```\n\nThere are different types of vehicles, such as cars, bikes, motorbikes,\
    \ and so on. For some of these types, you would like to store additional information.\
    \ For example, for a car, it could be useful to store whether it's a convertible;\
    \ for the motorbike, how many cylinders it has; and so on. You can use the inheritance\
    \ mechanism in Swift to do that. Here is an example of a class called `Car`:\n\
    \n```\nclass Car: Vehicle {\n    var convertible = false\n}\n```\n\nAs you can\
    \ see, behind the name of the class, there is a colon and then the word `Vehicle`.\
    \ This means that the `Car` class inherits from `Vehicle`. In essence, this means\
    \ that `Car` copies the functionality from `Vehicle`, including the `what` method:\n\
    \n```\nvar c = Car(\"mercedes\")\nprint(c.what()) // outputs \"nrOfWheels = 4,\
    \ brand = mercedes\"\n```\n\nThe nice thing about inheritance is that you can\
    \ replace or extend functionality. For example, suppose that you want the `what`\
    \ method to return a string that also contains whether or not the car is a convertible.\
    \ In order to achieve this, you can override the original `what` method and replace\
    \ it by another one. Here is the new version of the `Car` class that overrides\
    \ the `what` method:\n\n```\nclass Car : Vehicle {\n    var convertible = false\n\
    \    override func what() -> String {\n        return \"nrOfWheels = \\(numberOfWheels),\
    \ brand = \\(brand),\n                convertible = \\(convertible)\"\n    }\n\
    }\n```\n\nAnd later on, if you use the `Car` class:\n\n```\nvar c = Car(\"mercedes\"\
    )\nprint(c.what()) // outputs \"nrOfWheels = 4, brand = mercedes,\n          \
    \      // convertible = false\"\n```\n\nBecause the `Car` class inherits from\
    \ `Vehicle`, this means that an object of type `Car` is also an object of type\
    \ `Vehicle`. So, there are two important aspects of inheritance:\n- There is a\
    \ relationship between objects (a `Car` object is also a `Vehicle`).\n- A class\
    \ that inherits from another class copies its functionality (`Car` objects have\
    \ the same (stored and computed) properties, and methods as `Vehicle` objects)."
  raw: '## What You Have Learned


    In this chapter, you have learned the following:


    *   How to store and display the current number of lives for a player

    *   How to repeat a group of instructions using the `while` or `for` instruction

    *   How to restart the game when the player has no lives remaining


    # 10. Organizing Game Objects


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​10](http://dx.doi.org/10.1007/978-1-4842-0650-8_10))
    contains supplementary material, which is available to authorized users.


    You saw in the previous chapters how to use classes to group variables that belong
    together. This chapter looks at the similarities between the different types of
    game objects and how you can express these similarities in Swift.


    ## Similarities Between Game Objects


    If you look at the different game objects in the Painter game, you can see that
    they have a lot of things in common. For example, the ball, the cannon, and the
    paint cans all use three sprites that represent each of the three different colors.
    Also, most objects in the game have a velocity. Furthermore, some of the game
    objects have a method for handling input, some have an `updateDelta` method, and
    some have a `reset` method. Now, it isn’t really a problem that these classes
    have similarities. The compiler or the players of the game won’t complain about
    that. However, it’s a pity that you have to copy code all the time. To give an
    example, the `Cannon`, `Ball`, and `PaintCan` classes all have the following computed
    property called `color`:


    `var color: UIColor {`


        `get {`


            `if (!red.hidden) {`


                `return UIColor.redColor()`


            `} else if (!green.hidden) {`


                `return UIColor.greenColor()`


            `} else {`


                `return UIColor.blueColor()`


            `}`


        `}`


        `set(col) {`


            `if col != UIColor.redColor() && col != UIColor.greenColor()`


                `&& col != UIColor.blueColor() {`


                    `return`


            `}`


            `red.hidden = col != UIColor.redColor()`


            `green.hidden = col != UIColor.greenColor()`


            `blue.hidden = col != UIColor.blueColor()`


        `}`


    `}`


    The code is exactly the same, but you have to copy it for all three classes. And
    every time you want to add a different kind of colored game object, you probably
    need to copy this property again. If you only have to do that for one property,
    it’s not that much of a problem. But there are more similarities between classes
    in Painter. For example, most game object classes in the Painter game have the
    same stored properties: `velocity`, `red`, `green`, and `blue`.


    In general, it’s better to avoid copying a lot of code. Why is that? Because if
    at some point you realize there is a mistake in that part of the code, you have
    to correct it everywhere you copied it to. In a small game like Painter, this
    isn’t a big issue. But when you develop a commercial game with hundreds of different
    game-object classes, this becomes a serious maintenance problem. Furthermore,
    you don’t always know how far a small game will go. If you aren’t careful, you
    can end up copying a lot of code (and the bugs associated with it). As a game
    matures, it’s a good idea to keep an eye out for where to optimize code, even
    if this means some extra work to find these duplications and consolidate them.
    For this particular situation, you need to think about how the different kinds
    of game objects are similar and whether you can group these similarities together,
    just as you grouped the properties in the previous chapters.


    Conceptually speaking, it’s easy to say what is similar between balls, paint cans,
    and cannons: they’re all game objects. Basically, they are all located at a certain
    position; they all have a velocity (even the cannon, but its velocity is zero);
    and they all have a color that is red, green, or blue. Furthermore, most of them
    handle input of some kind and are updated.


    ## Inheritance


    In Swift, you can group these similarities together in a generic class and then
    define other classes that are a special version of this generic class. In object-oriented
    jargon, this is called inheritance, and it’s a very powerful language feature.
    Consider the following example:


    `class Vehicle {`


    `var numberOfWheels = 4`


    `var brand = ""`


    `func what() -> String {`


    `return "nrOfWheels = \(numberOfWheels), brand = \(brand)"`


    `}`


    `}`


    Here you have a very simple example of a class for representing vehicles (you
    can imagine that this could be useful for a traffic-simulation game). To keep
    things simple, a vehicle is defined by a number of wheels and a brand. The `Vehicle`
    class also has a method called `what` that returns a description of the vehicle
    as a `String` value (text). This method could be useful if you wanted to create
    an app that presented a list of vehicles in a table. Note that I used a special
    mechanism in Swift to combine text and variables:


    `return "nrOfWheels = \(numberOfWheels), brand = \(brand)"`


    In Swift, this process of creating a `String` value by mixing constants or variables
    with text is called string interpolation. If you want to insert the value of a
    variable inside a text string, you simply write the name of the variable between
    `\(` and `)`. Here is an example that creates a variable of type `Vehicle` and
    that prints the vehicle data to the console:


    `var v = Vehicle()`


    `v.brand = "volkswagen"`


    `print(v.what()) // outputs "nrOfWheels = 4, brand = volkswagen"`


    Let’s add an initializer to the class that accepts the brand name as a parameter:


    `init(_ b: String) {`


    `brand = b`


    `}`


    Now you can create a vehicle and immediately assign it a brand name:


    `var v = Vehicle("volkswagen")`


    `print(v.what())`


    There are different types of vehicles, such as cars, bikes, motorbikes, and so
    on. For some of these types, you would like to store additional information. For
    example, for a car, it could be useful to store whether it’s a convertible; for
    the motorbike, how many cylinders it has; and so on. You can use the inheritance
    mechanism in Swift to do that. Here is an example of a class called `Car`:


    `class Car: Vehicle {`


    `var convertible = false`


    `}`


    As you can see, behind the name of the class, there is a colon and then the word
    `Vehicle`. This means that the `Car` class inherits from `Vehicle`. In essence,
    this means that `Car` copies the functionality from `Vehicle`, including the `what`
    method:


    `var c = Car("mercedes")`


    `print(c.what()) // outputs "nrOfWheels = 4, brand = mercedes"`


    The nice thing about inheritance is that you can replace or extend functionality.
    For example, suppose that you want the `what` method to return a string that also
    contains whether or not the car is a convertible. In order to achieve this, you
    can override the original `what` method and replace it by another one. Here is
    the new version of the `Car` class that overrides the `what` method:


    `class Car : Vehicle {`


    `var convertible = false`


    `override func what() -> String {`


    `return "nrOfWheels = \(numberOfWheels), brand = \(brand),`


    `convertible = \(convertible)"`


    `}`


    `}`


    And later on, if you use the `Car` class:


    `var c = Car("mercedes")`


    `print(c.what()) // outputs "nrOfWheels = 4, brand = mercedes,` `convertible =
    false"`


    Because the `Car` class inherits from `Vehicle`, this means that an object of
    type `Car` is also an object of type `Vehicle`. So, there are two important aspects
    of inheritance:


    *   There is a relationship between objects (a `Car` object is also a `Vehicle`).

    *   A class that inherits from another class copies its functionality (`Car` objects
    have the same (stored and computed) properties, and methods as `Vehicle` objects).'
  trans: "\n## 本章小结\n\n在本章中，你已经学习了以下内容：\n- 如何存储并显示玩家的当前生命数\n- 如何使用 `while` 或 `for`\
    \ 指令重复执行一组指令\n- 如何在玩家生命值归零时重启游戏\n\n# 第 10 章 组织游戏对象\n\n电子补充材料 本章在线版本（doi:[10.1007/978-1-4842-0650-8_10](http://dx.doi.org/10.1007/978-1-4842-0650-8_10)）包含补充材料，仅供授权用户使用。\n\
    \n在前几章中，你已经了解了如何使用类来组合相关的变量。本章将探讨不同类型游戏对象之间的相似性，以及如何在 Swift 中表达这些相似性。\n\n## 游戏对象间的相似性\n\
    \n观察 Painter 游戏中的不同游戏对象，你会发现它们有很多共同点。例如，球、大炮和颜料罐都使用了三个精灵来分别表示三种不同颜色。此外，游戏中大多数物体都具有速度属性。而且，部分游戏对象具有处理输入的方法，部分具有\
    \ `updateDelta` 方法，还有一些具有 `reset` 方法。这些类之间存在相似性本身并不是问题——编译器或游戏玩家不会因此抱怨。但令人困扰的是，你不得不反复复制同样的代码。举例来说，`Cannon`、`Ball`\
    \ 和 `PaintCan` 类都包含以下名为 `color` 的计算属性：\n\n```\nvar color: UIColor {\n    get {\n\
    \        if (!red.hidden) {\n            return UIColor.redColor()\n        }\
    \ else if (!green.hidden) {\n            return UIColor.greenColor()\n       \
    \ } else {\n            return UIColor.blueColor()\n        }\n    }\n    set(col)\
    \ {\n        if col != UIColor.redColor() && col != UIColor.greenColor()\n   \
    \         && col != UIColor.blueColor() {\n                return\n        }\n\
    \        red.hidden = col != UIColor.redColor()\n        green.hidden = col !=\
    \ UIColor.greenColor()\n        blue.hidden = col != UIColor.blueColor()\n   \
    \ }\n}\n```\n\n这段代码完全相同，但你必须在三个类中分别复制它。每次你想添加一种不同颜色的游戏对象时，很可能都需要再次复制这个属性。如果只是为单个属性这样做，问题还不算太大。但\
    \ Painter 游戏中的类之间还存在更多相似性。例如，Painter 游戏中多数游戏对象类都拥有相同的存储属性：`velocity`、`red`、`green`\
    \ 和 `blue`。\n\n总的来说，最好避免大量复制代码。原因何在？因为如果某天你发现这部分代码存在错误，就必须在每一个复制过它的地方进行修正。对于 Painter\
    \ 这样的小型游戏，这还算不上大问题。但当你开发一个包含数百个不同游戏对象类的商业游戏时，这将演变成一个严重的维护难题。而且，你永远不知道一个简单小游戏会发展到什么规模。如果不加注意，最终可能会复制大量代码（以及随之而来的错误）。随着游戏不断成熟，留意何处可以优化代码是个好习惯——即使这意味着需要额外工作来发现这些重复代码并进行整合。针对当前情况，你需要思考不同类型的游戏对象之间有何相似之处，以及是否能够像在前几章中整合属性那样，将这些相似性整合起来。\n\
    \n从概念上讲，很容易说出球、颜料罐和大炮之间的共同点：它们都是游戏对象。基本上，它们都位于某个位置，都具有速度（大炮也有速度，只不过速度为零），并且都具有红色、绿色或蓝色中的一种颜色。此外，它们大多能处理某种输入并执行更新操作。\n\
    \n## 继承\n\n在 Swift 中，你可以将这些相似性组合到一个通用类中，然后定义其他类作为这个通用类的特殊版本。在面向对象术语中，这被称为继承，它是一种非常强大的语言特性。请看以下示例：\n\
    \n```\nclass Vehicle {\n    var numberOfWheels = 4\n    var brand = \"\"\n   \
    \ func what() -> String {\n        return \"nrOfWheels = \\(numberOfWheels), brand\
    \ = \\(brand)\"\n    }\n}\n```\n\n这里有一个非常简单的类示例，用于表示交通工具（可以想象，这可能对交通模拟游戏很有用）。为简单起见，交通工具由轮子数量和品牌来定义。`Vehicle`\
    \ 类还有一个名为 `what` 的方法，该方法返回一个描述交通工具的 `String` 值（文本）。如果你想创建一个在表格中展示交通工具列表的应用，这个方法会很实用。注意，我在\
    \ Swift 中使用了一种特殊机制来组合文本和变量：\n\n```\nreturn \"nrOfWheels = \\(numberOfWheels),\
    \ brand = \\(brand)\"\n```\n\n在 Swift 中，这种通过将常量或变量与文本混合来创建 `String` 值的过程称为**字符串插值**。如果要在文本字符串中插入变量的值，只需将变量名写在\
    \ `\\(` 和 `)` 之间即可。下面是一个创建 `Vehicle` 类型变量并将车辆数据输出到控制台的示例：\n\n```\nvar v = Vehicle()\n\
    v.brand = \"volkswagen\"\nprint(v.what()) // 输出 \"nrOfWheels = 4, brand = volkswagen\"\
    \n```\n\n让我们为类添加一个接受品牌名称作为参数的初始化器：\n\n```\ninit(_ b: String) {\n    brand = b\n\
    }\n```\n\n现在你可以创建一辆交通工具并立即为其指定品牌名称：\n\n```\nvar v = Vehicle(\"volkswagen\")\n\
    print(v.what())\n```\n\n交通工具存在不同类型，例如汽车、自行车、摩托车等。对于其中某些类型，你可能希望存储额外信息。例如，对于汽车，存储它是否为敞篷车可能很有用；对于摩托车，则可能需要存储其气缸数等。你可以利用\
    \ Swift 中的继承机制来实现这一点。以下是一个名为 `Car` 的类示例：\n\n```\nclass Car: Vehicle {\n    var\
    \ convertible = false\n}\n```\n\n如你所见，类名后面有一个冒号和单词 `Vehicle`。这意味着 `Car` 类继承自 `Vehicle`。本质上，这意味着\
    \ `Car` 复制了 `Vehicle` 的功能，包括 `what` 方法：\n\n```\nvar c = Car(\"mercedes\")\nprint(c.what())\
    \ // 输出 \"nrOfWheels = 4, brand = mercedes\"\n```\n\n继承的妙处在于你可以替换或扩展功能。例如，假设你希望\
    \ `what` 方法返回的字符串也能包含汽车是否为敞篷车的信息。为此，你可以覆盖（override）原 `what` 方法，并用另一个方法替换它。以下是覆盖了\
    \ `what` 方法的 `Car` 类新版本：\n\n```\nclass Car : Vehicle {\n    var convertible =\
    \ false\n    override func what() -> String {\n        return \"nrOfWheels = \\\
    (numberOfWheels), brand = \\(brand),\n                convertible = \\(convertible)\"\
    \n    }\n}\n```\n\n之后使用 `Car` 类时：\n\n```\nvar c = Car(\"mercedes\")\nprint(c.what())\
    \ // 输出 \"nrOfWheels = 4, brand = mercedes,\n                // convertible =\
    \ false\"\n```\n\n由于 `Car` 类继承自 `Vehicle`，这意味着 `Car` 类型的对象也是 `Vehicle` 类型的对象。因此，继承有两个重要方面：\n\
    - 对象之间存在关系（`Car` 对象同时也是 `Vehicle`）。\n- 继承自另一个类的类会复制其功能（`Car` 对象具有与 `Vehicle` 对象相同的（存储和计算）属性和方法）。\n"
- fmt: "因为`Car`继承自`Vehicle`，你也可以说`Car`是`Vehicle`的子类或派生类，或者说`Vehicle`是`Car`的超类、父类或基类。类之间的继承关系被广泛使用；在良好的类设计中，这种关系可以被理解为“是一种”（is\
    \ a kind of）。在这个例子中，关系很明确：汽车（car）是一种交通工具（vehicle）。但反过来却不一定成立：交通工具不总是汽车。`Vehicle`可能有其他子类，例如：\n\
    \n```\nclass MotorBike: Vehicle {\n    var cylinders = 4\n    override init(_\
    \ b: String) {\n        super.init(b)\n        numberOfWheels = 2\n    }\n}\n\
    ```\n\n摩托车也是一种交通工具。`Motorbike`类继承自`Vehicle`，并添加了自定义属性来表示气缸数量。如你所见，`MotorBike`类重写了`Vehicle`类的构造器。这很有必要，因为摩托车没有四个轮子。因此，当创建`MotorBike`实例时，需要确保轮子数量被正确设置。尽管重写方法或重写构造器非常相似，但有一个关键区别：当你重写构造器时，Swift强制要求你调用超类的一个指定构造器。此外，你必须在访问超类的任何属性之前调用该构造器。这是为了确保在访问数据之前，对象已被正确初始化。`Vehicle`类包含一个唯一的（指定）构造器。下面这行代码调用了该构造器：\n\
    \n```\nsuper.init(b)\n```\n\n这是`Car`构造器主体中的第一条指令，它确保`Car`对象中属于`Vehicle`的部分被初始化。关键字`super`用于表示你调用的是属于超类的构造器。`super`指向一个对象，就像`self`一样。`self`和`super`的主要区别在于：`self`指向当前方法（或构造器）正在操作的对象，而`super`指向同一个对象，但仅限对象中属于超类的部分。在这个例子中，这意味着`self`的类型是`Car`，而`super`的类型是`Vehicle`。\n\
    \n图[10-1](#A978-1-4842-0650-8_10_Chapter.html#Fig1)展示了汽车/交通工具示例中使用的类层次结构。关于该层次结构的更详细版本，请参见图[10-4](#A978-1-4842-0650-8_10_Chapter.html#Fig4)。\n\
    \n![A978-1-4842-0650-8_10_Fig1_HTML.gif](A978-1-4842-0650-8_10_Fig1_HTML.gif)\n\
    \n图 10-1. `Vehicle`及其子类的继承关系图\n\n## 游戏对象与继承\n\n“是一种”的关系同样适用于Painter游戏中的游戏对象。球是一种游戏对象，油漆罐和大炮也是。你可以通过在程序中定义一个名为`ThreeColorGameObject`的泛型基类，并让你的实际游戏对象类继承自该泛型类，来明确这种继承关系。然后，你可以将所有定义三色游戏对象特征的内容放入该类中，而球、大炮和油漆罐将成为该类的特化版本。属于本章的`Painter8`示例展示了如何做到这一点。\n\
    \n让我们更详细地了解一下`ThreeColorGameObject`类。你将游戏中不同类型的游戏对象常用的属性放入此类。你可以定义该类的骨架如下：\n\n\
    ```\nclass ThreeColorGameObject {\n    var node = SKNode()\n    var red = SKSpriteNode()\n\
    \    var green = SKSpriteNode()\n    var blue = SKSpriteNode()\n    var velocity\
    \ = CGPoint.zeroPoint\n    ...\n}\n```\n\n每个继承自`ThreeColorGameObject`的类都将拥有一个`node`、三个`sprite`和一个`velocity`。这很好，因为现在你只需在一个地方定义这些属性，它们就可以在任何继承自`ThreeColorGameObject`的类中使用。\n\
    \n你需要做的一件事是提供一种用三个不同的精灵来初始化一个三色游戏对象的方法。当你定义`ThreeColorGameObject`类时，你还不知道要使用哪些精灵，因为它们取决于最终的游戏对象类型（大炮使用的精灵与球或油漆罐不同）。为了解决这个问题，我们添加以下构造器：\n\
    \n```\ninit(_ spriteRed: String, _ spriteGreen: String, _ spriteBlue: String)\
    \ {\n    red = SKSpriteNode(imageNamed: spriteRed)\n    green = SKSpriteNode(imageNamed:\
    \ spriteGreen)\n    blue = SKSpriteNode(imageNamed: spriteBlue)\n    node.addChild(red)\n\
    \    node.addChild(green)\n    node.addChild(blue)\n}\n```\n\n当你继承此类时，通过将图片名称作为参数传递给`ThreeColorGameObject`构造器，来定义精灵属性`red`、`green`和`blue`应为何值。\n\
    \n接下来，你需要定义基本的游戏循环方法。该类的`updateDelta`方法仅包含根据速度更新游戏对象当前位置的指令：\n\n```\nfunc updateDelta(delta:\
    \ NSTimeInterval) {\n    node.position.x += velocity.x * CGFloat(delta)\n    node.position.y\
    \ += velocity.y * CGFloat(delta)\n}\n```\n\n为了完整性，我们还可以添加处理输入和重置游戏对象的方法，这些方法可以在后续被重写：\n\
    \n```\nfunc handleInput() {\n}\n\nfunc reset() {\n}\n```\n\n如果你查看`Painter8`示例中的`ThreeColorGameObject`类，你还会看到一些添加的计算属性。第一个是`color`，它读取和写入游戏对象的颜色。第二个属性叫做`box`，它计算游戏对象的边界框。这是一个很有用的（只读）属性，用于判断两个游戏对象是否碰撞。以下是该属性的定义：\n\
    \n```\nvar box: CGRect {\n    get {\n        return node.calculateAccumulatedFrame()\n\
    \    }\n}\n```\n\n向`ThreeColorGameObject`添加方法和属性的好处在于，任何继承自它的类现在也拥有这些方法和属性。这为你省去了大量代码复制的工作！关于完整的`ThreeColorGameObject`类，请参阅属于本章的`Painter8`示例。"
  raw: 'Because `Car` inherits from `Vehicle`, you also say that `Car` is a subclass
    or derived class of `Vehicle`, or that `Vehicle` is the superclass, or parent
    class, or base class, of `Car`. The inheritance relationship between classes is
    widely used; and in a good class design, it can be interpreted as “is a kind of.”
    In this example, the relationship is clear: a car is a kind of vehicle. The other
    way around isn’t always true. A vehicle isn’t always a car. There could be other
    subclasses of `Vehicle`, such as the following:


    `class MotorBike: Vehicle {`


    `var cylinders = 4`


    `override init(_ b: String) {`


    `super.init(b)`


    `numberOfWheels = 2`


    `}`


    `}`


    A motorbike is also a kind of vehicle. The `Motorbike` class inherits from `Vehicle`
    and adds its own custom property to indicate the number of cylinders. As you can
    see, the `MotorBike` class overrides the initializer of the `Vehicle` class. This
    is necessary because a motorbike doesn’t have four wheels. So, when a `MotorBike`
    instance is created, you want to make sure that the number of wheels is set correctly.
    Although overriding a method or overriding an initializer is very similar, there
    is a crucial difference. When you override the initializer, Swift obligates you
    to call a designated initializer from the superclass. Furthermore, you have to
    call that initializer before you access any properties from the superclass. This
    is done to ensure that objects are properly initialized before you access their
    data. The `Vehicle` class contains a single (designated) initializer. This line
    of code calls that initializer:


    `super.init(b)`


    This is the first instruction in the `Car` initializer body, and it makes sure
    that the `Vehicle` part of the `Car` object is initialized. The keyword `super`
    is used to indicate that you call an initializer belonging to the superclass.
    `super` refers to an object, just like `self`. The main difference between `self`
    and `super` is that `self` refers to the object a method (or initializer) is currently
    manipulating, whereas `super` refers to that same object, but only the part of
    the object belonging to the superclass. In this example, it means that the type
    of `self` is `Car`, and the type of `super` is `Vehicle`.


    Figure [10-1](#A978-1-4842-0650-8_10_Chapter.html#Fig1) illustrates the hierarchy
    of classes used in vehicle/car example. For a more expanded version of this hierarchy,
    see Figure [10-4](#A978-1-4842-0650-8_10_Chapter.html#Fig4).


    ![A978-1-4842-0650-8_10_Fig1_HTML.gif](A978-1-4842-0650-8_10_Fig1_HTML.gif)


    Figure 10-1.


    Inheritance diagram of `Vehicle` and its subclasses


    ## Game Objects and Inheritance


    The “is a kind of” relationship also holds for the game objects in the Painter
    game. A ball is a kind of game object, and so are the paint cans and the cannon.
    You can make this inheritance relationship explicit in the program by defining
    a generic class called `ThreeColorGameObject` and having your actual game-object
    classes inherit from that generic class. You can then put everything that defines
    what a three-color game object is in that class, and the ball, the cannon, and
    the paint can will be special versions of that class. The Painter8 example belonging
    to this chapter shows how to do this.


    Let’s look at this `ThreeColorGameObject` class in more detail. You put into this
    class the properties that are commonly used by the different types of game objects
    in the game. You can define a basic skeleton of this class as follows:


    `class ThreeColorGameObject {`


        `var node = SKNode()`


        `var red = SKSpriteNode()`


        `var green = SKSpriteNode()`


        `var blue = SKSpriteNode()`


        `var velocity = CGPoint.zeroPoint`


        `...`


    `}`


    Each class that inherits from `ThreeColorGameObject` will have a node, three sprites,
    and a velocity. This is nice because now you only define these properties in one
    place, and they can be used in any class that inherits from `ThreeColorGameObject`.


    One thing that you need to do is provide a way to initialize a three-color game
    object with three different sprites. When you define the `ThreeColorGameObject`
    class, you don’t know yet which sprites to use because they will depend on the
    final type of the game object (cannons use sprites other than balls or paint cans).
    In order to solve this, let’s add the following initializer:


    `init(_ spriteRed: String, _ spriteGreen: String, _ spriteBlue: String) {`


        `red = SKSpriteNode(imageNamed: spriteRed)`


        `green = SKSpriteNode(imageNamed: spriteGreen)`


        `blue = SKSpriteNode(imageNamed: spriteBlue)`


        `node.addChild(red)`


        `node.addChild(green)`


        `node.addChild(blue)`


    `}`


    Whenever you inherit from this class, you define what the values of the sprite
    properties `red`, `green`, and `blue` should be, by passing the names of the images
    as a parameter to the `ThreeColorGameObject` initializer.


    Next, you need to define the basic game-loop methods. The `updateDelta` method
    of the class only contains the instructions that update the current position of
    the game object based on its velocity:


    `func updateDelta(delta: NSTimeInterval) {`


        `node.position.x += velocity.x * CGFloat(delta)`


        `node.position.y += velocity.y * CGFloat(delta)`


    `}`


    For completeness, let’s also add methods for handling input and for resetting
    the game object, which can be overridden later on:


    `func handleInput() {`


    `}`


    `func reset() {`


    `}`


    If you look at the `ThreeColorGameObject` class in the Painter8 example, you’ll
    see also a few computed properties added. The first one is `color`, which reads
    and writes the color of the game object. The second property is called `box`,
    and it calculates the bounding box of the game object. This is a useful (read-only)
    property for determining whether two game objects collide. Here is the property
    definition:


    `var box: CGRect {`


        `get {`


            `return node.calculateAccumulatedFrame()`


        `}`


    `}`


    The nice thing about adding methods and properties to `ThreeColorGameObject` is
    that any class that inherits from it now also has those methods and properties.
    This saves you a lot of code copying! For the complete `ThreeColorGameObject`
    class, see the Painter8 example belonging to this chapter.'
