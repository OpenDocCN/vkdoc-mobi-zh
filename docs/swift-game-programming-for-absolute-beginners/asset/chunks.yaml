  trans: "\n# 可选类型\n\n在继续代码示例之前，让我们仔细看看 Swift 语言中一个颇具创新性的特性：**可选类型**。可选类型是一种机制，它允许你拥有一个变量，其类型可以有选择地指向一个实际对象。这听起来可能没什么用，但让我们再考虑一下翻译器示例：\n\
    \n```\nvar translator = [String:String]()\ntranslator[\"house\"] = \"maison\"\n\
    translator[\"tree\"] = \"arbre\"\ntranslator[\"dog\"] = \"chien\"\n```\n\n现在假设你输入以下指令：\n\
    \n```\nvar houseTranslated = translator[\"house\"]\n```\n\n由于你已将 \"house\" 键存入字典，你可以将查找该值的结果存入一个变量。但现在假设你输入以下内容：\n\
    \n```\nvar carTranslated = translator[\"car\"]\n```\n\n`translator` 字典中没有包含 car\
    \ 的条目。那么在这种情况下应该发生什么呢？你可以想象编译器在编译程序时会报错。但编译器不可能在所有情况下都知道 `translator` 字典的内容。假设当程序启动时，这个字典的内容是从服务器检索而来的呢？或者当程序运行时，由用户输入呢？编译器根本无法总是知道字典里有什么，所以它无法检测到这类错误。但如果编译器检测不到，当条目不存在时，`carTranslated`\
    \ 变量中会存储什么值呢？在 Swift 中，这个值是 `nil`。表达式 `translator[\"car\"]` 返回的值在某些情况下可能是 `nil`。这就是为什么该表达式的类型被称为可选类型。你可以通过其名称后的问号来识别可选类型。`carTranslated`\
    \ 的类型是 `String?`。你在声明变量时也可以这样写：\n\n```\nvar carTranslated: String? = translator[\"\
    car\"]\n```\n\n因为 `carTranslated` 变量是可选类型，你可以给它赋值为 `nil`：\n\n```\ncarTranslated\
    \ = nil\n```\n\n你还可以在 `if` 指令中测试它是否为 `nil`：\n\n```\nif carTranslated == nil {\n\
    \    print(\"翻译不可用。\")\n}\n```\n\n现在假设你想将翻译结果转换成大写字母。`String` 类型有一个 `capitalizedString`\
    \ 属性可以实现这一点。然而，以下指令会导致编译器报错：\n\n```\nvar strWithCapitals = carTranslated.capitalizedString\n\
    ```\n\n编译器报错的原因是 `carTranslated` 可能指向 `nil` 而非字符串值。如果出现这种情况，`capitalizedString`\
    \ 属性就不能被使用。为了解决这个问题，你可以使用一种叫做**可选链**的方法，如下所示：\n\n```\nvar strWithCapitals = carTranslated?.capitalizedString\n\
    ```\n\n可选链会检查 `carTranslated` 是否为 `nil`。如果不是，属性的结果会存储在 `strWithCapitals` 中。如果\
    \ `carTranslated` 是 `nil`，那么 `nil` 值会被存储在 `strWithCapitals` 中。这意味着 `strWithCapitals`\
    \ 变量本身也是一个可选类型 `String?`。\n\n如果你非常确定 `carTranslated` 永远不会包含 `nil` 值，你也可以将其解包为实际的\
    \ `String` 类型。这可以通过感叹号来实现：\n\n```\nvar strWithCapitals = carTranslated!.capitalizedString\n\
    ```\n\n由于假设 `carTranslated` 永远不会是 `nil`，现在 `strWithCapitals` 的类型是 `String` 而不是\
    \ `String?`。但使用这种方法时要小心。如果你的程序存在一个 bug，导致 `carTranslated` 意外变成 `nil`，那么程序执行会因错误而停止。\n\
    \nSwift 为 `if` 指令提供了一个很好的扩展，使其仅在值解包成功时才执行一段代码块：\n\n```\nif let carTranslated =\
    \ translator[\"car\"] {\n    // 执行某些操作\n}\n```\n\n这个 `if` 指令的主体仅在表达式 `carTranslated`\
    \ 不为 `nil` 时才执行。如果是这种情况，`carTranslated` 的类型是 `String`，并包含 `translator[\"car\"\
    ]` 解包后的值。因此，上面的 `if` 指令与以下代码的功能相同：\n\n```\nlet carTranslatedOptional = translator[\"\
    car\"]\nif carTranslatedOptional != nil {\n    let carTranslated = carTranslatedOptional!\n\
    \    // 执行某些操作\n}\n```\n\n如你所见，结合值解包的 `if` 指令是一个有用的扩展，能生成更短、更易读的代码。\n\n## 注意\n\
    \n可选类型和解包机制是目前仅在 Swift 语言中可用的特性。其他编程语言，如 C# 或 Java，并不具备这些特性。通过在编程语言本身中显式处理可选值，Swift\
    \ 迫使程序员思考某个值是确定的，还是有时可能不存在。因此，在编写代码时请记得预先考虑好如何处理每种情况。这是一件好事，因为它能带来更健壮的程序。然而，如果你没有精心设计你的类和方法，最终可能会得到充满问号和感叹号的代码，这会让你的代码非常难以理解。\n"
- fmt: "# Storing Multiple Touches\n\nNow you’ll learn how to use arrays, dictionaries,\
    \ and optional types to deal with multiple touches by creating a new `InputHelper`\
    \ class. This class now contains a property called `touches`, which is an array\
    \ of `Touch` objects:\n\n`var touches: [Touch] = []`\n\nThere are three kinds\
    \ of touch events that you need to deal with:\n\n* The player starts touching\
    \ the screen with one of his fingers.\n* The player moves a finger already touching\
    \ the screen.\n* The player removes a finger from the screen.\n\nFor each of these\
    \ cases, let’s add a method to `InputHelper` that handles it. Later in this chapter,\
    \ you’ll deal with connecting these methods to actual touch events. The first\
    \ case is when the player starts touching the screen. In that case, a `Touch`\
    \ instance needs to be created, its location needs to be set to the recorded touch\
    \ location, and finally the `Touch` instance should be added to the array. Here\
    \ is the complete method:\n\n```\nfunc touchBegan(loc: CGPoint) -> Int {\n   \
    \ var touch = Touch()\n    touch.location = loc\n    touches.append(touch)\n \
    \   return touch.id\n}\n```\n\nAs you can see, this method expects a `CGPoint`\
    \ object representing the touch location as a parameter. The method returns the\
    \ identifier of the `Touch` instance that was created. This is useful because\
    \ then the caller of the method knows how to refer to that particular touch when\
    \ using the `InputHelper` instance later.\n\nWhen the player moves her finger,\
    \ another method in `InputHelper` called `touchMoved` should be called:\n\n```\n\
    func touchMoved(id: Int, loc: CGPoint) {\n    if let index = findIndex(id) {\n\
    \        touches[index].location = loc\n    }\n}\n```\n\nThis method expects a\
    \ touch identifier, and the new touch location as a parameter. It relies on a\
    \ method called `findIndex`, which searches for the index in the `touches` array\
    \ corresponding to the identifier and returns an optional `Int` value. In this\
    \ method, you walk through all the elements in the `touches` array using a `for`\
    \ loop. When you find the touch that matches the identifier of the touch data\
    \ you’re looking for, you return that data. If the touch data can’t be found,\
    \ you return nil. Here is the header and body of `findIndex`:\n\n```\nfunc findIndex(id:\
    \ Int) -> Int? {\n    for index in 0..<touches.count {\n        if touches[index].id\
    \ == id {\n            return index\n        }\n    }\n    return nil\n}\n```\n\
    \nOnce the index has been found, you set the `location` property of the `Touch`\
    \ instance in the array to the new location, which is what the second instruction\
    \ in the `touchMoved` method does.\n\nFinally, when the player has removed a finger\
    \ from the screen, the `touchEnded` method should be called, which removes the\
    \ `Touch` instance from the array:\n\n```\nfunc touchEnded(id: Int) {\n    if\
    \ let index = findIndex(id) {\n        touches.removeAtIndex(index)\n    }\n}\n\
    ```\n\nAs you can see, removing an element from an array is done with the `removeAtIndex`\
    \ method. This method takes an index as a parameter: the index indicates where\
    \ the element should be removed. Here is an example:\n\n```\nvar fib = [1, 1,\
    \ 2, 3, 5, 8, 13]\nfib.removeAtIndex(3) // fib now is [1, 1, 2, 5, 8, 13]\n```\n\
    \n## Making Dealing with Touch Input Easier\n\nYou can add a few more methods\
    \ to the `InputHelper` class to make it easier to use in games. The first is a\
    \ simple method for retrieving the position of a touch with a given id:\n\n```\n\
    func getTouch(id: Int) -> CGPoint {\n    if let index = findIndex(id) {\n    \
    \    return touches[index].location\n    } else {\n        return CGPoint.zeroPoint\n\
    \    }\n}\n```\n\nIt would also be useful to check whether the player is touching\
    \ a certain area of the screen. For example, if you want to add a button to your\
    \ game, you want to check whether the player has tapped in the area represented\
    \ by the button sprite. The following method can be used in this case:\n\n```\n\
    func containsTouch(rect: CGRect) -> Bool {\n    for touch in touches {\n     \
    \   if rect.contains(touch.location) {\n            return true\n        }\n \
    \   }\n    return false\n}\n```\n\nIn the method body is a `for` loop that checks\
    \ for each touch in the array, whether its position falls inside the rectangle.\
    \ Depending on the outcome, the method returns either `true` or `false`. In order\
    \ to find the id of the touch inside the rectangle, the following method can be\
    \ called:\n\n```\nfunc getIDInRect(rect: CGRect) -> Int? {\n    for touch in touches\
    \ {\n        if rect.contains(touch.location) {\n            return touch.id\n\
    \        }\n    }\n    return nil\n}\n```\n\nThis method is useful for checking\
    \ whether a touch id is still valid:\n\n```\nfunc isTouching(id: Int) -> Bool\
    \ {\n    return findIndex(id) != nil\n}\n```\n\nAnd finally, this method indicates\
    \ whether the player has tapped (just started touching) inside a box or not:\n\
    \n```\nfunc containsTap(rect: CGRect) -> Bool {\n    for touch in touches {\n\
    \        if rect.contains(touch.location) && touch.tapped {\n            return\
    \ true\n        }\n    }\n    return false\n}\n```\n\nThere are more methods in\
    \ the `InputHelper` class that will be useful later in the games you will develop\
    \ in this book. For an overview, see the `InputHelper` class in the TutsTomb1\
    \ example belonging to this chapter."
  raw: '## Storing Multiple Touches


    Now you’ll learn how to use arrays, dictionaries, and optional types to deal with
    multiple touches by creating a new `InputHelper` class. This class now contains
    a property called `touches`, which is an array of `Touch` objects:


    `var touches: [Touch] = []`


    There are three kinds of touch events that you need to deal with:


    *   The player starts touching the screen with one of his fingers.

    *   The player moves a finger already touching the screen.

    *   The player removes a finger from the screen.


    For each of these cases, let’s add a method to `InputHelper` that handles it.
    Later in this chapter, you’ll deal with connecting these methods to actual touch
    events. The first case is when the player starts touching the screen. In that
    case, a `Touch` instance needs to be created, its location needs to be set to
    the recorded touch location, and finally the `Touch` instance should be added
    to the array. Here is the complete method:


    `func touchBegan(loc: CGPoint) -> Int {`


        `var touch = Touch()`


        `touch.location = loc`


        `touches.append(touch)`


        `return touch.id`


    `}`


    As you can see, this method expects a `CGPoint` object representing the touch
    location as a parameter. The method returns the identifier of the `Touch` instance
    that was created. This is useful because then the caller of the method knows how
    to refer to that particular touch when using the `InputHelper` instance later.


    When the player moves her finger, another method in `InputHelper` called `touchMoved`
    should be called:


    `func touchMoved(id: Int, loc: CGPoint) {`


        `if let index = findIndex(id) {`


            `touches[index].location = loc`


        `}`


    `}`


    This method expects a touch identifier, and the new touch location as a parameter.
    It relies on a method called `findIndex`, which searches for the index in the
    touches array corresponding to the identifier and returns an optional `Int` value.
    In this method, you walk through all the elements in the `touches` array using
    a `for` loop. When you find the touch that matches the identifier of the touch
    data you’re looking for, you return that data. If the touch data can’t be found,
    you return nil. Here is the header and body of `findIndex`:


    `func findIndex(id: Int) -> Int? {`


        `for index in 0..<touches.count  {`


            `if touches[index].id == id {`


                `return index`


            `}`


        `}`


        `return nil`


    `}`


    Once the index has been found, you set the `location` property of the `Touch`
    instance in the array to the new location, which is what the second instruction
    in the `touchMoved` method does.


    Finally, when the player has removed a finger from the screen, the `touchEnded`
    method should be called, which removes the `Touch` instance from the array:


    `func touchEnded(id: Int) {`


        `if let index = findIndex(id) {`


            `touches.removeAtIndex(index)`


        `}`


    `}`


    As you can see, removing an element from an array is done with the `removeAtIndex`
    method. This method takes an index as a parameter: the index indicates where the
    element should be removed. Here is an example:


    `var fib = [1, 1, 2, 3, 5, 8, 13]`


    `fib.removeAtIndex(3) // fib now is [1, 1, 2, 5, 8, 13]`


    ## Making Dealing with Touch Input Easier


    You can add a few more methods to the `InputHelper` class to make it easier to
    use in games. The first is a simple method for retrieving the position of a touch
    with a given id:


    `func getTouch(id: Int) -> CGPoint {`


        `if let index = findIndex(id) {`


            `return touches[index].location`


        `} else {`


            `return CGPoint.zeroPoint`


        `}`


    `}`


    It would also be useful to check whether the player is touching a certain area
    of the screen. For example, if you want to add a button to your game, you want
    to check whether the player has tapped in the area represented by the button sprite.
    The following method can be used in this case:


    `func containsTouch(rect: CGRect) -> Bool {`


        `for touch in touches {`


            `if rect.contains(touch.location) {`


                `return true`


            `}`


        `}`


        `return false`


    `}`


    In the method body is a `for` loop that checks for each touch in the array, whether
    its position falls inside the rectangle. Depending on the outcome, the method
    returns either `true` or `false`. In order to find the id of the touch inside
    the rectangle, the following method can be called:


    `func getIDInRect(rect: CGRect) -> Int? {`


        `for touch in touches {`


            `if rect.contains(touch.location) {`


                `return touch.id`


            `}`


        `}`


        `return nil`


    `}`


    This method is useful for checking whether a touch id is still valid:


    `func isTouching(id: Int) -> Bool {`


        `return findIndex(id) != nil`


    `}`


    And finally, this method indicates whether the player has tapped (just started
    touching) inside a box or not:


    `func containsTap(rect: CGRect) -> Bool {`


        `for touch in touches {`


            `if rect.contains(touch.location) && touch.tapped {`


                `return true`


            `}`


        `}`


        `return false`


    `}`


    There are more methods in the `InputHelper` class that will be useful later in
    the games you will develop in this book. For an overview, see the `InputHelper`
    class in the TutsTomb1 example belonging to this chapter.'
  trans: "\n# 存储多点触摸\n\n现在，你将学习如何使用数组、字典和可选类型来处理多点触摸，通过创建一个新的 `InputHelper` 类。这个类现在包含一个名为\
    \ `touches` 的属性，它是一个 `Touch` 对象的数组：\n\n`var touches: [Touch] = []`\n\n你需要处理三种类型的触摸事件：\n\
    \n* 玩家开始用其中一根手指触摸屏幕。\n* 玩家移动已触摸屏幕的手指。\n* 玩家将手指从屏幕上移开。\n\n针对上述每一种情况，让我们向 `InputHelper`\
    \ 中添加一个处理方法。在本章稍后部分，你将把这些方法连接到实际的触摸事件上。第一种情况是玩家开始触摸屏幕。在这种情况下，需要创建一个 `Touch` 实例，将其位置设置为记录的触摸位置，最后将该\
    \ `Touch` 实例添加到数组中。以下是完整的方法：\n\n```\nfunc touchBegan(loc: CGPoint) -> Int {\n\
    \    var touch = Touch()\n    touch.location = loc\n    touches.append(touch)\n\
    \    return touch.id\n}\n```\n\n如你所见，该方法期望一个代表触摸位置的 `CGPoint` 对象作为参数。该方法会返回所创建\
    \ `Touch` 实例的标识符。这很有用，因为这样方法的调用者在之后使用 `InputHelper` 实例时，就知道如何引用那个特定的触摸。\n\n当玩家移动手指时，应调用\
    \ `InputHelper` 中的另一个名为 `touchMoved` 的方法：\n\n```\nfunc touchMoved(id: Int, loc:\
    \ CGPoint) {\n    if let index = findIndex(id) {\n        touches[index].location\
    \ = loc\n    }\n}\n```\n\n该方法期望一个触摸标识符和新的触摸位置作为参数。它依赖于一个名为 `findIndex` 的方法，该方法在\
    \ `touches` 数组中搜索与标识符对应的索引，并返回一个可选的 `Int` 值。在这个方法中，你使用 `for` 循环遍历 `touches` 数组中的所有元素。当找到与你正在查找的触摸数据标识符匹配的触摸时，你就返回该数据。如果找不到触摸数据，则返回\
    \ nil。以下是 `findIndex` 的声明和主体：\n\n```\nfunc findIndex(id: Int) -> Int? {\n    for\
    \ index in 0..<touches.count {\n        if touches[index].id == id {\n       \
    \     return index\n        }\n    }\n    return nil\n}\n```\n\n一旦找到索引，你就可以将数组中\
    \ `Touch` 实例的 `location` 属性设置为新位置，这正是 `touchMoved` 方法中第二条指令所做的。\n\n最后，当玩家将手指从屏幕上移开时，应调用\
    \ `touchEnded` 方法，该方法将 `Touch` 实例从数组中移除：\n\n```\nfunc touchEnded(id: Int) {\n\
    \    if let index = findIndex(id) {\n        touches.removeAtIndex(index)\n  \
    \  }\n}\n```\n\n如你所见，从数组中移除元素是通过 `removeAtIndex` 方法完成的。该方法接受一个索引作为参数：该索引指示应移除元素的位置。示例如下：\n\
    \n```\nvar fib = [1, 1, 2, 3, 5, 8, 13]\nfib.removeAtIndex(3) // fib 现在为 [1, 1,\
    \ 2, 5, 8, 13]\n```\n\n## 让处理触摸输入更简单\n\n你可以向 `InputHelper` 类添加更多方法，使其在游戏中更易于使用。第一个是一个简单的方法，用于检索具有给定\
    \ id 的触摸的位置：\n\n```\nfunc getTouch(id: Int) -> CGPoint {\n    if let index = findIndex(id)\
    \ {\n        return touches[index].location\n    } else {\n        return CGPoint.zeroPoint\n\
    \    }\n}\n```\n\n检查玩家是否正在触摸屏幕的某个特定区域也很有用。例如，如果你想在游戏中添加一个按钮，你需要检查玩家是否点击了按钮精灵所代表的区域。可以使用以下方法处理这种情况：\n\
    \n```\nfunc containsTouch(rect: CGRect) -> Bool {\n    for touch in touches {\n\
    \        if rect.contains(touch.location) {\n            return true\n       \
    \ }\n    }\n    return false\n}\n```\n\n在该方法体中，有一个 `for` 循环，它会检查数组中的每个触摸，看其位置是否落在矩形内。根据检查结果，该方法返回\
    \ `true` 或 `false`。为了找到矩形内触摸的 id，可以调用以下方法：\n\n```\nfunc getIDInRect(rect: CGRect)\
    \ -> Int? {\n    for touch in touches {\n        if rect.contains(touch.location)\
    \ {\n            return touch.id\n        }\n    }\n    return nil\n}\n```\n\n\
    此方法有助于检查触摸 id 是否仍然有效：\n\n```\nfunc isTouching(id: Int) -> Bool {\n    return findIndex(id)\
    \ != nil\n}\n```\n\n最后，这个方法指示玩家是否在某个区域内点击了（刚刚开始触摸）：\n\n```\nfunc containsTap(rect:\
    \ CGRect) -> Bool {\n    for touch in touches {\n        if rect.contains(touch.location)\
    \ && touch.tapped {\n            return true\n        }\n    }\n    return false\n\
    }\n```\n\n在 `InputHelper` 类中还有更多方法，这些方法在你将在本书中开发的后续游戏中会很有用。概述请参阅属于本章的 TutsTomb1\
    \ 示例中的 `InputHelper` 类。\n"
- fmt: "# Linking Touch Events to the Input Helper Class\n\nThe `InputHelper` class\
    \ is ready, but you still need to make sure that the `touchBegan`, `touchMoved`,\
    \ and `touchEnded` methods are called when necessary. In the Painter game, you\
    \ did this by adding touch event handling methods to the `GameScene` class. For\
    \ example, this was the method that handled the start of a touch:\n\n```\noverride\
    \ func touchesBegan(touches: Set<UITouch>, withEvent event: UIEvent?) {\n\nlet\
    \ touch = touches.first!\n\ninputHelper.touchLocation = touch.locationInNode(self)\n\
    \ninputHelper.nrTouches += touches.count\n\ninputHelper.hasTapped = true\n\n}\n\
    ```\n\nThe first parameter of this method is of type `Set<UITouch>`. Note that\
    \ `Set<UITouch>` is also a collection type, similar to `Array`. The difference\
    \ between arrays and sets is that an array has ordered information, whereas a\
    \ set doesn’t. Also, a set doesn’t have duplicate elements, whereas this is allowed\
    \ for arrays. Depending on what you need in your game, you can choose different\
    \ data structures. A set, for example, may be useful for representing a player\
    \ inventory, especially if the player can only have one of each item in his/her\
    \ inventory.\n\nIt makes sense that the touches are also stored in a set, since\
    \ you only allow for a particular touch to be stored once, and the order of the\
    \ touches is not important. In the `InputHelper` class, you could have also used\
    \ a set to store the touches instead of an array. Behind the `Set` word, you see\
    \ the type `UITouch` between angled brackets. Recall that in Swift, and in many\
    \ other programming languages that support so-called generic types, this means\
    \ that the set contains objects of type `UITouch`. The type `Set` itself is a\
    \ generic type because it can only be used if you indicate what kind of objects\
    \ the set specifically contains. For example, you could also declare a set of\
    \ strings:\n\n```\nvar stringSet = Set<String>()\n```\n\nInside the `touchesBegan`\
    \ method, you want to handle the possibility of multiple touches. This means you\
    \ need to deal with all the touches in the set. There is a special `for` loop\
    \ syntax to do something for each element in a collection. Take a look at the\
    \ following example:\n\n```\nvar intArray = [2, 3, 4, 6]\n\nfor value: Int in\
    \ intArray {\n\nprint(value)\n\n}\n```\n\nThis example uses a `for` loop to perform\
    \ a task for each element in the array. In many cases, you can leave out the type\
    \ because it can be inferred from the collection that you are traversing:\n\n\
    ```\nvar intArray = [2, 3, 4, 6]\n\nfor value in intArray {\n\nprint(value)\n\n\
    }\n```\n\nSimilarly, you can also perform a task for each element in a set:\n\n\
    ```\nfor touch in touches {\n\n// handle the touch\n\n}\n```\n\nInside the body\
    \ of the `for` loop, you use the `touch` variable (which is of type `UITouch`)\
    \ to calculate the location of the touch and store it in a constant, like so:\n\
    \n```\nlet location = touch.locationInNode(self)\n```\n\nThen, you call the `touchBegan`\
    \ method in `InputHelper` to add the touch to the array. This method returns an\
    \ id that you store in a variable:\n\n```\nlet id = inputHelper.touchBegan(location)\n\
    ```\n\nYou can also use a dictionary to store the mapping between `UITouch` objects\
    \ and the ids generated for the `InputHelper` class:\n\n```\nvar touchmap = [UITouch:Int]()\n\
    ```\n\nYou store the generated id in this map in the last instruction of the `touchesBegan`\
    \ event handler method:\n\n```\ntouchmap[touch] = inputHelper.touchBegan(location)\n\
    ```\n\nIn the `touchesMoved` method, you need this id in order to update the touch\
    \ location in the input helper. Just like in `touchesBegan`, you use a `for` loop\
    \ to perform this task for each moved touch location. Here is the complete method:\n\
    \n```\noverride func touchesMoved(touches: Set<UITouch>, withEvent event: UIEvent)\
    \ {\n\nfor touch in touches {\n\nlet touchid = touchmap[touch]!\n\ninputHelper.touchMoved(touchid,\
    \ loc: touch.locationInNode(self))\n\n}\n\n}\n```\n\nYou first look up the id\
    \ corresponding to that object in the dictionary. Then, the `touchMoved` method\
    \ from the `InputHelper` class is called to update the touch location information.\n\
    \n```\nlet touchid = touchmap[touch]!\n```\n\nNote the exclamation mark at the\
    \ end of the following instruction. This is needed because you need to unwrap\
    \ the optional `Int` value returned by the dictionary lookup.\n\nWhen the player\
    \ stops touching the screen, the touch-to-id correspondence should be removed\
    \ from the dictionary. This is achieved by assigning the `nil` value to the element\
    \ in the dictionary, as follows:\n\n```\nlet touchid = touchmap[touch]!\n\ntouchmap[touch]\
    \ = nil\n```\n\nFinally, the `touchEnded` method is called to update the input\
    \ helper:\n\n```\ninputHelper.touchEnded(touchid)\n```\n\nFor the complete code\
    \ to handle multitouch input, see the `InputHelper` and `GameScene` classes in\
    \ the TutsTomb1 example belonging to this chapter.\n\n## Dragging Sprites\n\n\
    As an example, let’s use the new `InputHelper` class to drag sprites around on\
    \ the screen. Take a look again at the TutsTomb1 program. Inside, you will find\
    \ the updated `InputHelper` class, as well as a simple example that loads a few\
    \ sprites, draws them on the screen, and allows you to move the sprites over the\
    \ screen by dragging them. The program also contains a basic class called `Treasure`\
    \ that is used for representing treasures in the Tut’s Tomb game.\n\nIn the TutsTomb1\
    \ example, not much of that game has been implemented yet. There are just two\
    \ `Treasure` objects drawn on the screen, which the player can drag around with\
    \ their finger. Object dragging is implemented in the `handleInput` method of\
    \ this class. This method consists of two parts. In the first part, you check\
    \ whether the player has just started dragging the object. If that is the case,\
    \ you need to store the id of that touch, so that later you can use the id to\
    \ keep track of where the player is moving their finger. In the `Treasure` class,\
    \ there is a property called `touchid` (of type `Int?`) that stores the id of\
    \ the touch currently dragging the object. If the object is not being dragged,\
    \ the id is set to `nil`. Once the player starts dragging, you store the id of\
    \ the touch in the property:\n\n```\nif inputHelper.containsTap(self.box) {\n\n\
    \    touchid = inputHelper.getIDInRect(self.box)\n\n}\n```\n\nThe next step in\
    \ the `handleInput` method is to update the position of the treasure to follow\
    \ the finger of the user as long as the user is touching the screen with that\
    \ finger. As soon as the player stops touching the screen with that finger, you\
    \ reset the `touchid` property to `nil`. This is all covered in the following\
    \ instructions:\n\n```\nif let touchUnwrap = touchid {\n\n    if inputHelper.isTouching(touchUnwrap)\
    \ {\n\n        self.position = inputHelper.getTouch(touchUnwrap)\n\n    } else\
    \ {\n\n        touchid = nil\n\n    }\n\n}\n```\n\nAnd that’s it! As you can see,\
    \ dragging functionality is not that hard to implement, but it really helps if\
    \ you have a few useful methods for dealing with (multi)touch input. In this case,\
    \ the `containsTap` method makes it very simple to know when a player starts dragging\
    \ an object around.\n\n![A978-1-4842-0650-8_12_Fig2_HTML.jpg](A978-1-4842-0650-8_12_Fig2_HTML.jpg)\n\
    \nFigure 12-2. The TutsTomb1 example\n\n## What You Have Learned\n\nIn this chapter,\
    \ you have learned the following:\n\n*   How to deal with multitouch input for\
    \ games\n*   What arrays and dictionaries are and how to use them\n*   What optionals\
    \ are and how you should use them"
  raw: '## Linking Touch Events to the Input Helper Class


    The `InputHelper` class is ready, but you still need to make sure that the `touchBegan`,
    `touchMoved`, and `touchEnded` methods are called when necessary. In the Painter
    game, you did this by adding touch event handling methods to the `GameScene` class.
    For example, this was the method that handled the start of a touch:


    `override func touchesBegan(touches: Set<UITouch>, withEvent event: UIEvent?)
    {`


    `let touch = touches.first!`


    `inputHelper.touchLocation = touch.locationInNode(self)`


    `inputHelper.nrTouches += touches.count`


    `inputHelper.hasTapped = true`


    `}`


    The first parameter of this method is of type `Set<UITouch>`. Note that `Set<UITouch>`
    is also a collection type, similar to `Array`. The difference between arrays and
    sets is that an array has ordered information, whereas a set doesn’t. Also, a
    set doesn’t have duplicate elements, whereas this is allowed for arrays. Depending
    on what you need in your game, you can choose different data structures. A set,
    for example, may be useful for representing a player inventory, especially if
    the player can only have one of each item in his/her inventory.


    It makes sense that the touches are also stored in a set, since you only allow
    for a particular touch to be stored once, and the order of the touches is not
    important. In the `InputHelper` class, you could have also used a set to store
    the touches instead of an array. Behind the `Set` word, you see the type `UITouch`
    between angled brackets. Recall that in Swift, and in many other programming languages
    that support so-called generic types, this means that the set contains objects
    of type `UITouch`. The type `Set` itself is a generic type because it can only
    be used if you indicate what kind of objects the set specifically contains. For
    example, you could also declare a set of strings:


    `var stringSet = Set<String>()`


    Inside the `touchesBegan` method, you want to handle the possibility of multiple
    touches. This means you need to deal with all the touches in the set. There is
    a special `for` loop syntax to do something for each element in a collection.
    Take a look at the following example:


    `var intArray = [2, 3, 4, 6]`


    `for value: Int in intArray {`


    `print(value)`


    `}`


    This example uses a `for` loop to perform a task for each element in the array.
    In many cases, you can leave out the type because it can be inferred from the
    collection that you are traversing:


    `var intArray = [2, 3, 4, 6]`


    `for value in intArray {`


    `print(value)`


    `}`


    Similarly, you can also perform a task for each element in a set:


    `for touch in touches {`


    `// handle the touch`


    `}`


    Inside the body of the `for` loop, you use the `touch` variable (which is of type
    `UITouch`) to calculate the location of the touch and store it in a constant,
    like so:


    `let location = touch.locationInNode(self)`


    Then, you call the `touchBegan` method in `InputHelper` to add the touch to the
    array. This method returns an id that you store in a variable:


    `let id = inputHelper.touchBegan(location)`


    You can also use a dictionary to store the mapping between `UITouch` objects and
    the ids generated for the `InputHelper` class:


    `var touchmap = [UITouch:Int]()`


    You store the generated id in this map in the last instruction of the `touchesBegan`
    event handler method:


    `touchmap[touch] = inputHelper.touchBegan(location)`


    In the `touchesMoved` method, you need this id in order to update the touch location
    in the input helper. Just like in `touchesBegan`, you use a `for` loop to perform
    this task for each moved touch location. Here is the complete method:


    `override func touchesMoved(touches: Set<UITouch>, withEvent event: UIEvent) {`


    `for touch in touches {`


    `let touchid = touchmap[touch]!`


    `inputHelper.touchMoved(touchid, loc: touch.locationInNode(self))`


    `}`


    `}`


    You first look up the id corresponding to that object in the dictionary. Then,
    the `touchMoved` method from the `InputHelper` class is called to update the touch
    location information.


    `let touchid = touchmap[touch]!`


    Note the exclamation mark at the end of the following instruction. This is needed
    because you need to unwrap the optional `Int` value returned by the dictionary
    lookup.


    When the player stops touching the screen, the touch-to-id correspondence should
    be removed from the dictionary. This is achieved by assigning the `nil` value
    to the element in the dictionary, as follows:


    `let touchid = touchmap[touch]!`


    `touchmap[touch] = nil`


    Finally, the `touchEnded` method is called to update the input helper:


    `inputHelper.touchEnded(touchid)`


    For the complete code to handle multitouch input, see the `InputHelper` and `GameScene`
    classes in the TutsTomb1 example belonging to this chapter.


    ## Dragging Sprites


    As an example, let’s use the new `InputHelper` class to drag sprites around on
    the screen. Take a look again at the TutsTomb1 program. Inside, you will find
    the updated `InputHelper` class, as well as a simple example that loads a few
    sprites, draws them on the screen, and allows you to move the sprites over the
    screen by dragging them. The program also contains a basic class called `Treasure`
    that is used for representing treasures in the Tut’s Tomb game.


    In the TutsTomb1 example, not much of that game has been implemented yet. There
    are just two `Treasure` objects drawn on the screen, which the player can drag
    around with their finger. Object dragging is implemented in the `handleInput`
    method of this class. This method consists of two parts. In the first part, you
    check whether the player has just started dragging the object. If that is the
    case, you need to store the id of that touch, so that later you can use the id
    to keep track of where the player is moving their finger. In the `Treasure` class,
    there is a property called `touchid` (of type `Int?`) that stores the id of the
    touch currently dragging the object. If the object is not being dragged, the id
    is set to nil. Once the player starts dragging, you store the id of the touch
    in the property:


    `if inputHelper.containsTap(self.box) {`


        `touchid = inputHelper.getIDInRect(self.box)`


    `}`


    The next step in the `handleInput` method is to update the position of the treasure
    to follow the finger of the user as long as the user is touching the screen with
    that finger. As soon as the player stops touching the screen with that finger,
    you reset the `touchid` property to nil. This is all covered in the following
    instructions:


    `if let touchUnwrap = touchid {`


        `if inputHelper.isTouching(touchUnwrap) {`


            `self.position = inputHelper.getTouch(touchUnwrap)`


        `} else {`


            `touchid = nil`


        `}`


    `}`


    And that’s it! As you can see, dragging functionality is not that hard to implement,
    but it really helps if you have a few useful methods for dealing with (multi)touch
    input. In this case, the `containsTap` method makes it very simple to know when
    a player starts dragging an object around.


    ![A978-1-4842-0650-8_12_Fig2_HTML.jpg](A978-1-4842-0650-8_12_Fig2_HTML.jpg)


    Figure 12-2.


    The TutsTomb1 example


    ## What You Have Learned


    In this chapter, you have learned the following:


    *   How to deal with multitouch input for games

    *   What arrays and dictionaries are and how to use them

    *   What optionals are and how you should use them'
  trans: "\n# 将触摸事件关联至输入辅助类\n\n`InputHelper`类已经准备就绪，但你仍需确保在必要时能调用`touchBegan`、`touchMoved`和`touchEnded`方法。在\
    \ Painter 游戏中，你通过在`GameScene`类中添加触摸事件处理方法实现了这一点。例如，以下是处理触摸开始的方法：\n\n```\noverride\
    \ func touchesBegan(touches: Set<UITouch>, withEvent event: UIEvent?) {\n\nlet\
    \ touch = touches.first!\n\ninputHelper.touchLocation = touch.locationInNode(self)\n\
    \ninputHelper.nrTouches += touches.count\n\ninputHelper.hasTapped = true\n\n}\n\
    ```\n\n该方法的第一个参数类型为`Set<UITouch>`。请注意，`Set<UITouch>`也是一种集合类型，与`Array`类似。数组与集合的区别在于：数组元素有序，而集合无序。此外，集合不允许重复元素，而数组允许。根据游戏需求，你可以选择不同的数据结构。例如，集合可能适用于表示玩家背包，尤其是当玩家每种物品只能拥有一个时。\n\
    \n触摸点存储在集合中是合理的，因为你只允许存储特定的触摸点一次，且触摸顺序并不重要。在`InputHelper`类中，你完全可以用集合而非数组来存储触摸点。在`Set`关键字后的尖括号内，你会看到`UITouch`类型。回顾一下，在\
    \ Swift 以及许多支持**泛型**的编程语言中，这表示该集合包含`UITouch`类型的对象。`Set`类型本身是一个泛型，只有指定了集合具体包含何种对象时才能使用。例如，你也可以声明一个字符串集合：\n\
    \n```\nvar stringSet = Set<String>()\n```\n\n在`touchesBegan`方法内部，你需要处理多点触摸的可能性。这意味着你要处理集合中的所有触摸点。有一种特殊的`for`循环语法，可以对集合中的每个元素执行操作。请看以下示例：\n\
    \n```\nvar intArray = [2, 3, 4, 6]\n\nfor value: Int in intArray {\n\nprint(value)\n\
    \n}\n```\n\n这个示例使用`for`循环对数组中的每个元素执行任务。在很多情况下，你可以省略类型，因为它可以从你遍历的集合中推断出来：\n\n```\n\
    var intArray = [2, 3, 4, 6]\n\nfor value in intArray {\n\nprint(value)\n\n}\n\
    ```\n\n类似地，你也可以对集合中的每个元素执行操作：\n\n```\nfor touch in touches {\n\n// 处理触摸\n\n}\n\
    ```\n\n在`for`循环体内，你可以使用`touch`变量（类型为`UITouch`）来计算触摸位置并将其存储在常量中，如下所示：\n\n```\n\
    let location = touch.locationInNode(self)\n```\n\n接着，调用`InputHelper`中的`touchBegan`方法，将触摸点添加到数组中。该方法会返回一个\
    \ ID，你需要将其存储在变量中：\n\n```\nlet id = inputHelper.touchBegan(location)\n```\n\n你还可以使用字典来存储`UITouch`对象与`InputHelper`类生成的\
    \ ID 之间的映射：\n\n```\nvar touchmap = [UITouch:Int]()\n```\n\n在`touchesBegan`事件处理方法的最后一条指令中，将该\
    \ ID 存储到映射中：\n\n```\ntouchmap[touch] = inputHelper.touchBegan(location)\n```\n\
    \n在`touchesMoved`方法中，你需要使用这个 ID 来更新输入辅助类中的触摸位置。与`touchesBegan`一样，你使用`for`循环对每个移动的触摸位置执行此操作。以下是完整的方法：\n\
    \n```\noverride func touchesMoved(touches: Set<UITouch>, withEvent event: UIEvent)\
    \ {\n\nfor touch in touches {\n\nlet touchid = touchmap[touch]!\n\ninputHelper.touchMoved(touchid,\
    \ loc: touch.locationInNode(self))\n\n}\n\n}\n```\n\n首先，你在字典中查找与该对象对应的 ID。然后，调用`InputHelper`类中的`touchMoved`方法来更新触摸位置信息。\n\
    \n```\nlet touchid = touchmap[touch]!\n```\n\n请注意末尾感叹号。这是必需的，因为你需要解包字典查找返回的可选`Int`值。\n\
    \n当玩家停止触摸屏幕时，应从字典中移除触摸点与 ID 的对应关系。可通过将字典元素赋值为`nil`来实现，如下所示：\n\n```\nlet touchid\
    \ = touchmap[touch]!\n\ntouchmap[touch] = nil\n```\n\n最后，调用`touchEnded`方法来更新输入辅助类：\n\
    \n```\ninputHelper.touchEnded(touchid)\n```\n\n有关处理多点触摸输入的完整代码，请参阅本章附带的 TutsTomb1\
    \ 示例中的`InputHelper`和`GameScene`类。\n\n## 拖动精灵\n\n作为示例，让我们使用新的`InputHelper`类在屏幕上拖动精灵。请再次查看\
    \ TutsTomb1 程序。在其中，你将找到更新后的`InputHelper`类，以及一个简单的示例：加载几个精灵，将其绘制在屏幕上，并允许你通过拖动在屏幕上移动精灵。该程序还包含一个名为`Treasure`的基础类，用于在图坦卡蒙墓游戏中表示宝藏。\n\
    \n在 TutsTomb1 示例中，该游戏的大部分功能尚未实现。屏幕上只绘制了两个`Treasure`对象，玩家可以用手指拖动它们。对象拖动的实现位于该类的`handleInput`方法中。该方法包含两部分。第一部分，检查玩家是否刚刚开始拖动对象。如果是，则需要存储该触摸的\
    \ ID，以便后续用该 ID 跟踪玩家手指的移动位置。在`Treasure`类中，有一个名为`touchid`的属性（类型为`Int?`），用于存储当前正在拖动该对象的触摸\
    \ ID。如果对象未被拖动，该 ID 设置为`nil`。一旦玩家开始拖动，就将触摸 ID 存储在该属性中：\n\n```\nif inputHelper.containsTap(self.box)\
    \ {\n\n    touchid = inputHelper.getIDInRect(self.box)\n\n}\n```\n\n`handleInput`方法的下一步是，只要用户的手指仍在触摸屏幕，就更新宝藏的位置，使其跟随用户手指移动。一旦玩家抬起手指，就将`touchid`属性重置为`nil`。以下指令涵盖了所有这些逻辑：\n\
    \n```\nif let touchUnwrap = touchid {\n\n    if inputHelper.isTouching(touchUnwrap)\
    \ {\n\n        self.position = inputHelper.getTouch(touchUnwrap)\n\n    } else\
    \ {\n\n        touchid = nil\n\n    }\n\n}\n```\n\n就是这样！如你所见，实现拖动功能并不困难，但如果有一些用于处理（多点）触摸输入的实用方法，确实能简化工作。在这种情况下，`containsTap`方法使得判断玩家何时开始拖动对象变得非常简单。\n\
    \n![A978-1-4842-0650-8_12_Fig2_HTML.jpg](img/A978-1-4842-0650-8_12_Fig2_HTML.jpg)\n\
    \n图 12-2. TutsTomb1 示例\n\n## 本章所学内容\n\n在本章中，你学习了以下内容：\n\n*   如何处理游戏中的多点触摸输入\n\
    *   什么是数组和字典，以及如何使用它们\n*   什么是可选类型，以及应如何使用它们\n"
- fmt: "# 13. Game Physics\n\n**Electronic supplementary material** The online version\
    \ of this chapter (doi:[10.1007/978-1-4842-0650-8_13](http://dx.doi.org/10.1007/978-1-4842-0650-8_13))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    In the Painter game, you created a very basic mechanism for objects moving around\
    \ in the game world and colliding with each other. In Tut's Tomb, this is no longer\
    \ sufficient. Objects need to fall according to gravity, they need to bounce off\
    \ walls, and they need to handle collisions differently. In this chapter, you\
    \ are going to adapt your game structure so that it is more suitable for these\
    \ advanced interactions. You will see that it's quite simple to add physically\
    \ correct behavior to your game objects in SpriteKit.\n\n## A Basic Class for\
    \ Game Objects\n\nMost games have a complicated structure of game objects. First,\
    \ there might be a background consisting of various layers of moving objects (mountains,\
    \ air, trees, and so on). Then there are interactive objects moving around. These\
    \ objects may be enemies of the player, so they need some level of intelligence;\
    \ they can also be more static, such as power-ups, trees, doors, or ladders. A\
    \ game object that represents a house might consist of many other game objects,\
    \ such as a door, stairs, windows, and a kitchen (which may, in turn, consist\
    \ of different game objects).\n\nGiven these different types of game objects and\
    \ the relations between them, you can say that game objects generally form part\
    \ of a hierarchy, which represents the game world. Most games use some kind of\
    \ hierarchy of game objects. Especially in 3D games, such a hierarchy is very\
    \ important because of the complexity of three-dimensional environments. Objects\
    \ in 3D games are normally represented not by sprites, but by one or more 3D models.\
    \ The advantage of a hierarchy is that these objects can be grouped together,\
    \ so that if you pick up a vase that contains a scroll with magic writing on it,\
    \ the scroll moves along with the vase.\n\nIn the Painter game, the basic type\
    \ of game object was represented by the `ThreeColorGameObject` class. Until now,\
    \ this is how you've represented game objects, simply because it was sufficient\
    \ for the basic examples you were working on. If you want to develop bigger, more\
    \ complicated games, you have to let go of the basic premise that a game object\
    \ is a three-colored sprite.\n\nIn SpriteKit, the most basic game object is an\
    \ object of type `SKNode`. The only thing that `SKNode` assumes is that a game\
    \ object is supposed to be a part of some kind of hierarchy (representing the\
    \ game world). The games you create in this book rely on a design that defines\
    \ how game objects are a part of the game loop in the game object classes themselves.\
    \ For example, in Painter, the `Cannon` class handles input related to the cannon,\
    \ and the `Ball` class handles input related to the ball. Also, the ball position\
    \ and any game object interaction are handled in an `update` method part of the\
    \ `Ball` class. Finally, whenever the game is restarted, each game object is reset\
    \ to its original state. This means that it's probably useful if game objects\
    \ have a `handleInput` method, an `update` method, and a `reset` method.\n\nIn\
    \ the TutsTomb2 example, you can find a class called `GameObjectNode`, which is\
    \ a subclass of `SKNode`. The `GameObjectNode` class adds exactly the three game\
    \ loop methods mentioned in the previous paragraph. Since any object of type `GameObjectNode`\
    \ is also an `SKNode` object, it may have children. If, for example, the `handleInput`\
    \ method is called on a `GameObjectNode` instance, you need to make sure that\
    \ any children of type `GameObjectNode` also handle input. So, inside the body\
    \ of the `handleInput` method, you use a `for` loop to traverse the children,\
    \ cast them to a `GameObjectNode` instance, and if the casting succeeds, call\
    \ the `handleInput` method on the child object, like so:\n\n```\nfunc handleInput(inputHelper:\
    \ InputHelper) {\n    for obj in children {\n        if let node = obj as? GameObjectNode\
    \ {\n            node.handleInput(inputHelper)\n        }\n    }\n}\n```\n\nNote\
    \ the special notation used for assigning an optional value to a variable in an\
    \ `if` instruction. The `as?` operator attempts to cast an object to a given type\
    \ (in this case, `GameObjectNode`). If the cast is not possible, the operator\
    \ returns `nil`. So, if `node` contains an actual `GameObjectNode` instance, the\
    \ `handleInput` method is called on it. If you take a look at the `GameObjectNode`\
    \ class, you'll see that something very similar is done for the `updateDelta`\
    \ and `reset` methods.\n\n## Game Object Subclasses\n\nSince the Tut's Tomb game\
    \ deals with treasures that are falling down, the TutsTomb2 example contains a\
    \ `Treasure` class, which is now a subclass of `GameObjectNode`. The `Treasure`\
    \ class overrides the `handleInput` method to implement dragging.\n\nAnother class\
    \ that is a subclass of `GameObjectNode` is `GameWorld`. The game world is filled\
    \ with game objects in the `setup` method, which is called in the `GameScene`\
    \ class, when the scene is initialized. Here is the part of the `setup` method\
    \ that adds a few `Treasure` instances to the game world:\n\n```\nfor i in 0...4\
    \ {\n    var treasure = Treasure()\n    treasure.position = CGPoint(x: -250 +\
    \ i * 120, y: 200)\n    treasures.addChild(treasure)\n}\n```\n\nAs you can see,\
    \ this code creates five `Treasure` instances, positions them according to the\
    \ loop counter `i`, and adds them to the `treasures` node, which is part of the\
    \ game world.\n\nThe nice thing about `GameWorld` being a subclass of `GameObjectNode`\
    \ is that now the game loop methods are automatically called on its children as\
    \ well, due to the way `GameObjectNode` is designed. This means that if you add\
    \ `Treasure` instances as children of another game object, then `handleInput`\
    \ method calls are now automatically propagated to the treasures. The `handleInput`\
    \ method of `GameWorld` is called in `GameScene`, which in turn calls the `handleInput`\
    \ method on all the children (and children's children) of game objects part of\
    \ the game world, including the treasures. This results in a nice, clean design\
    \ that will make creating more complex game object interactions later much easier.\
    \ As you can see in the TutsTomb2 example, the `handleInput` method of `Treasure`\
    \ calls the `handleInput` method of its superclass (`GameObjectNode`). This way,\
    \ you make sure that the chain of `handleInput` method calls is not broken, even\
    \ if in the future you decide to add child nodes to a `Treasure` instance."
  raw: '# 13. Game Physics


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​13](http://dx.doi.org/10.1007/978-1-4842-0650-8_13))
    contains supplementary material, which is available to authorized users.


    In the Painter game, you created a very basic mechanism for objects moving around
    in the game world and colliding with each other. In Tut’s Tomb, this is no longer
    sufficient. Objects need to fall according to gravity, they need to bounce off
    walls, and they need to handle collisions differently. In this chapter, you are
    going to adapt your game structure so that it is more suitable for these advanced
    interactions. You will see that it’s quite simple to add physically correct behavior
    to your game objects in SpriteKit.


    ## A Basic Class for Game Objects


    Most games have a complicated structure of game objects. First, there might be
    a background consisting of various layers of moving objects (mountains, air, trees,
    and so on). Then there are interactive objects moving around. These objects may
    be enemies of the player, so they need some level of intelligence; they can also
    be more static, such as power-ups, trees, doors, or ladders. A game object that
    represents a house might consist of many other game objects, such as a door, stairs,
    windows, and a kitchen (which may, in turn, consist of different game objects).


    Given these different types of game objects and the relations between them, you
    can say that game objects generally form part of a hierarchy, which represents
    the game world. Most games use some kind of hierarchy of game objects. Especially
    in 3D games, such a hierarchy is very important because of the complexity of three-dimensional
    environments. Objects in 3D games are normally represented not by sprites, but
    by one or more 3D models. The advantage of a hierarchy is that these objects can
    be grouped together, so that if you pick up a vase that contains a scroll with
    magic writing on it, the scroll moves along with the vase.


    In the Painter game, the basic type of game object was represented by the `ThreeColorGameObject`
    class. Until now, this is how you’ve represented game objects, simply because
    it was sufficient for the basic examples you were working on. If you want to develop
    bigger, more complicated games, you have to let go of the basic premise that a
    game object is a three-colored sprite.


    In SpriteKit, the most basic game object is an object of type `SKNode`. The only
    thing that `SKNode` assumes is that a game object is supposed to be a part of
    some kind of hierarchy (representing the game world). The games you create in
    this book rely on a design that defines how game objects are a part of the game
    loop in the game object classes themselves. For example, in Painter, the `Cannon`
    class handles input related to the cannon, and the `Ball` class handles input
    related to the ball. Also, the ball position and any game object interaction are
    handled in an `update` method part of the `Ball` class. Finally, whenever the
    game is restarted, each game object is reset to its original state. This means
    that it’s probably useful if game objects have a `handleInput` method, an `update`
    method, and a `reset` method.


    In the TutsTomb2 example, you can find a class called `GameObjectNode`, which
    is a subclass of `SKNode`. The `GameObjectNode` class adds exactly the three game
    loop methods mentioned in the previous paragraph. Since any object of type `GameObjectNode`
    is also an `SKNode` object, it may have children. If, for example, the `handleInput`
    method is called on a `GameObjectNode` instance, you need to make sure that any
    children of type `GameObjectNode` also handle input. So, inside the body of the
    `handleInput` method, you use a `for` loop to traverse the children, cast them
    to a `GameObjectNode` instance, and if the casting succeeds, call the `handleInput`
    method on the child object, like so:


    `func handleInput(inputHelper: InputHelper) {`


        `for obj in children {`


            `if let node = obj as? GameObjectNode {`


                `node.handleInput(inputHelper)`


            `}`


        `}`


    `}`


    Note the special notation used for assigning an optional value to a variable in
    an `if` instruction. The `as?` operator attempts to cast an object to a given
    type (in this case, `GameObjectNode`). If the cast is not possible, the operator
    returns `nil`. So, if `node` contains an actual `GameObjectNode` instance, the
    `handleInput` method is called on it. If you take a look at the `GameObjectNode`
    class, you’ll see that something very similar is done for the `updateDelta` and
    `reset` methods.


    ## Game Object Subclasses


    Since the Tut’s Tomb game deals with treasures that are falling down, the TutsTomb2
    example contains a `Treasure` class, which is now a subclass of `GameObjectNode`.
    The `Treasure` class overrides the `handleInput` method to implement dragging.


    Another class that is a subclass of `GameObjectNode` is `GameWorld`. The game
    world is filled with game objects in the `setup` method, which is called in the
    `GameScene` class, when the scene is initialized. Here is the part of the `setup`
    method that adds a few `Treasure` instances to the game world:


    `for i in 0...4 {`


        `var treasure = Treasure()`


        `treasure.position = CGPoint(x: -250 + i * 120, y: 200)`


        `treasures.addChild(treasure)`


    `}`


    As you can see, this code creates five `Treasure` instances, positions them according
    to the loop counter `i`, and adds them to the `treasures` node, which is part
    of the game world.


    The nice thing about `GameWorld` being a subclass of `GameObjectNode` is that
    now the game loop methods are automatically called on its children as well, due
    to the way `GameObjectNode` is designed. This means that if you add `Treasure`
    instances as children of another game object, then `handleInput` method calls
    are now automatically propagated to the treasures. The `handleInput` method of
    `GameWorld` is called in `GameScene`, which in turn calls the `handleInput` method
    on all the children (and children’s children) of game objects part of the game
    world, including the treasures. This results in a nice, clean design that will
    make creating more complex game object interactions later much easier. As you
    can see in the TutsTomb2 example, the `handleInput` method of `Treasure` calls
    the `handleInput` method of its superclass (`GameObjectNode`). This way, you make
    sure that the chain of `handleInput` method calls is not broken, even if in the
    future you decide to add child nodes to a `Treasure` instance.'
  trans: "\n# 13. 游戏物理\n\n**电子补充材料** 本章的在线版本（doi:[10.1007/978-1-4842-0650-8_13](http://dx.doi.org/10.1007/978-1-4842-0650-8_13)）包含补充材料，可供授权用户使用。\n\
    \n在《画家》游戏中，你创建了一个非常基础的机制，用于处理游戏世界中物体的移动和相互碰撞。但在《图坦之墓》中，这已不再够用。物体需要根据重力下落，需要从墙壁反弹，还需要以不同的方式处理碰撞。在本章中，你将调整游戏结构，使其更适合这些高级交互。你会发现，在\
    \ SpriteKit 中为游戏对象添加符合物理规律的行为其实相当简单。\n\n## 游戏对象的基础类\n\n大多数游戏都拥有复杂的游戏对象结构。首先，可能有一个由多层移动物体（山脉、天空、树木等）构成的背景。其次，还有交互式物体在四处移动。这些物体可能是玩家的敌人，因此需要一定程度的智能；它们也可能更加静态，比如能量道具、树木、门或梯子。一个代表房屋的游戏对象可能由许多其他游戏对象组成，例如门、楼梯、窗户和厨房（而厨房又可能由不同的游戏对象组成）。\n\
    \n考虑到这些不同类型的游戏对象以及它们之间的关系，可以说游戏对象通常构成了一个表示游戏世界的层级结构。大多数游戏都使用某种游戏对象的层级结构。尤其是在 3D\
    \ 游戏中，由于三维环境的复杂性，这种层级结构非常重要。3D 游戏中的对象通常不是由精灵图表示，而是由一个或多个 3D 模型表示。层级结构的优势在于这些对象可以被分组在一起，这样当你拿起一个里面装有写着魔法文字的卷轴的花瓶时，卷轴会随着花瓶一起移动。\n\
    \n在《画家》游戏中，游戏对象的基本类型由`ThreeColorGameObject`类表示。到目前为止，你一直这样表示游戏对象，仅仅是因为这对于你正在处理的基础示例来说已经足够。如果你想开发更大、更复杂的游戏，就必须放弃游戏对象是一个三色精灵图的基本前提。\n\
    \n在 SpriteKit 中，最基本的游戏对象是`SKNode`类型的对象。`SKNode`唯一假设的是游戏对象应该是某种层级结构（代表游戏世界）的一部分。本书中创建的游戏依赖于一种设计，该设计在游戏对象类本身中定义了游戏对象如何成为游戏循环的一部分。例如，在《画家》中，`Cannon`类处理与炮管相关的输入，而`Ball`类处理与球相关的输入。此外，球的位置以及任何游戏对象交互都在`Ball`类的`update`方法中处理。最后，每当游戏重新启动时，每个游戏对象都会重置为其初始状态。这意味着如果游戏对象拥有`handleInput`方法、`update`方法和`reset`方法，那可能会很有用。\n\
    \n在 TutsTomb2 示例中，你可以找到一个名为`GameObjectNode`的类，它是`SKNode`的子类。`GameObjectNode`类恰好添加了上一段中提到的三个游戏循环方法。由于任何`GameObjectNode`类型的对象也是`SKNode`对象，它可以有子节点。例如，如果在`GameObjectNode`实例上调用了`handleInput`方法，你需要确保任何类型为`GameObjectNode`的子节点也能处理输入。因此，在`handleInput`方法的主体内部，你使用一个`for`循环遍历子节点，将它们转换为`GameObjectNode`实例，如果转换成功，则在子对象上调用`handleInput`方法，如下所示：\n\
    \n```\nfunc handleInput(inputHelper: InputHelper) {\n    for obj in children {\n\
    \        if let node = obj as? GameObjectNode {\n            node.handleInput(inputHelper)\n\
    \        }\n    }\n}\n```\n\n注意用于在`if`指令中将可选值赋给变量的特殊写法。`as?`运算符尝试将对象转换为给定的类型（本例中为`GameObjectNode`）。如果转换不可能，该运算符返回`nil`。因此，如果`node`包含一个实际的`GameObjectNode`实例，就在其上调用`handleInput`方法。如果你查看`GameObjectNode`类，你会看到`updateDelta`和`reset`方法的实现也非常相似。\n\
    \n## 游戏对象子类\n\n由于《图坦之墓》游戏涉及掉落的宝藏，TutsTomb2 示例中包含一个`Treasure`类，它现在是`GameObjectNode`的子类。`Treasure`类重写了`handleInput`方法以实现拖拽。\n\
    \n另一个是`GameObjectNode`子类的类是`GameWorld`。游戏世界在`setup`方法中填充游戏对象，该方法在场景初始化时于`GameScene`类中被调用。以下是`setup`方法中将几个`Treasure`实例添加到游戏世界的部分：\n\
    \n```\nfor i in 0...4 {\n    var treasure = Treasure()\n    treasure.position\
    \ = CGPoint(x: -250 + i * 120, y: 200)\n    treasures.addChild(treasure)\n}\n\
    ```\n\n如你所见，这段代码创建了五个`Treasure`实例，根据循环计数器`i`定位它们，并将它们添加到属于游戏世界的`treasures`节点。\n\
    \n`GameWorld`作为`GameObjectNode`子类的好处在于，由于`GameObjectNode`的设计方式，游戏循环方法现在会自动在其子节点上被调用。这意味着如果你将`Treasure`实例添加为另一个游戏对象的子节点，那么`handleInput`方法调用现在会自动传播给这些宝藏。`GameWorld`的`handleInput`方法在`GameScene`中被调用，该方法随后会对游戏世界中所有游戏对象的子节点（以及子节点的子节点，包括宝藏）调用`handleInput`方法。这产生了一个简洁、清晰的设计，使得后续创建更复杂的游戏对象交互变得容易得多。如同你在\
    \ TutsTomb2 示例中看到的，`Treasure`的`handleInput`方法调用了其超类（`GameObjectNode`）的`handleInput`方法。通过这种方式，你可以确保`handleInput`方法调用的链条不会中断，即使将来你决定向`Treasure`实例添加子节点。\n"
- fmt: '## Adding Physics to Game Objects


    Until now, you have made game objects move by changing their position in the game
    loop. In Painter, some objects, such as the ball, had a `velocity` property, which
    you manipulated in order to make the ball move. In the physical world, things
    are slightly more complicated. Objects move because forces are exerted on them.
    For example, any object in the world is subject to a gravity force. If you push
    an object in some direction, you are applying a force to that object. And when
    objects collide with each other, they need to respond naturally to these collisions.


    If you want the game world to behave in a more physically correct manner, you
    need to have a model that simulates the physical world as a part of the game.
    The nice thing about the SpriteKit framework is that it already has a physics
    engine integrated in it that you can use to add physically plausible behavior
    to your game objects. In the Painter game, you coded the physics yourself. For
    example, you did this in the `Ball` class:


    ```

    velocity.x *= 0.99

    velocity.y -= 15

    ```


    The first line is a simple model for air friction. The second line is an approximation
    of what gravity does to the velocity of the object. In Tut’s Tomb, you are going
    to use the physics engine of SpriteKit to simulate physics, instead of writing
    the code yourself. As you’ll see, adding physics to your game world is really
    easy. Any instance of (a subclass of) `SKNode` has a property called `physicsBody`
    that allows you to control the way the object is a part of the physics system.
    If you want to add physical behavior to an object, the `physicsBody` property
    should refer to a `SKPhysicsBody` instance. This instance is an often simplified
    representation of the game object in the physical world. For example, in the `Treasure`
    class, you could add the following line to the initializer:


    ```

    self.physicsBody = SKPhysicsBody(circleOfRadius: 100)

    ```


    This creates a physical representation for the treasures. In this case, the physical
    representation is a circle with a given radius. You can also use another shape,
    such as a rectangle:


    ```

    self.physicsBody = SKPhysicsBody(rectangleOfSize: CGSize(width: 100, height: 100))

    ```


    You can also use the shape of a sprite (texture) to create the shape of the physics
    body:


    ```

    self.physicsBody = SKPhysicsBody(texture: sprite.texture!, size: sprite.size)

    ```


    If you want your game to run smoothly on many different devices, then it is a
    good idea to make sure the physics calculations do not become too complicated.
    For 2D games, this is generally not really a big issue anymore, but if you have
    many game objects with physical behavior moving around and colliding with each
    other, you may choose to use simplified shapes to deal with the physics more efficiently.
    And if a shape already looks a lot like a rectangle or a circle, it will probably
    still look good if you do the physics calculations with the simplified shape.


    In Tut’s Tomb, you are going to use the actual sprite shapes for the physics calculation.
    Now that `Treasure` instances have a `physicsBody`, they instantly exhibit physical
    behavior. In the TutsTomb2 example, a few `Treasure` instances have been added
    to the game world, just for testing purposes.


    If you were to run the game without adding any extra objects, you would see the
    five objects you added fall out of the screen immediately. This is because those
    objects are subject to a gravity force by default. In order to contain the game
    objects in the world, you need to create the ground and walls. So let’s add a
    floor to the game world. This floor also needs a physics body so that it can interact
    with the other game objects:


    ```

    let floor = SKNode()

    floor.position.y = -400

    var square = CGSize(width: GameScene.world.size.width, height: 200)

    floor.physicsBody = SKPhysicsBody(rectangleOfSize: square)

    ```


    As you can see, the floor is an `SKNode` object with a physics body attached to
    it, so there is no actual floor sprite. You simply want the objects to not fall
    down any further. In order to represent the floor in the physical world, you use
    a simplified shape–a rectangle in this case. But wait, since the floor is a physical
    object as well, won’t it simply fall down just like the other game objects? Yes,
    it will, so you explicitly tell the physics system that the floor is at a fixed
    location in the game world, and it doesn’t respond to dynamics (including forces).
    Here is how you do that:


    ```

    floor.physicsBody?.dynamic = false

    ```


    Finally, you add the `floor` object to the game world:


    ```

    addChild(floor)

    ```


    In a similar way, you also add a ceiling, a left wall, and a right wall to the
    game world. See the TutsTomb2 example for the complete code.


    Now that the game world has a floor, a ceiling and sidewalls, the game objects
    fall down and collide with the enclosing walls and each other. You get all this
    behavior for free when you use the physics engine provided by SpriteKit. Sometimes
    it’s useful for debugging to show the actual physics bodies on the screen. You
    can do this by setting the `showPhysics` property in the `SKView` object. The
    following line in the `GameViewController` class does this:


    ```

    skView.showsPhysics = true

    ```'
