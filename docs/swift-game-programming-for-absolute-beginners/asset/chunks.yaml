    Every type has its own target application. For example, the `Float80` type could
    be useful for games that require very precise physical calculations. The `Double`
    type is used for many mathematical calculations. `Float` is used if precision
    is not that important, but saving memory usage is.


    When you convert an expression of a certain type into an expression of another
    type, it’s called a type conversion. You can convert a value to another type by
    writing the type that you want to convert to in front of the expression, and write
    the expression between parentheses. For example, here is how you convert a `Double`
    to a `Float`:


    `let pi: Double = 3.141592653589793`


    `var smallPi: Float = Float(pi) // contains the value 3.1415927`


    As you can see in the example above, if you convert a `Double` to a `Float`, you
    lose precision. This is why you have to indicate explicitly to the compiler when
    you want to convert one type into another. If you want to convert a `Float` to
    a `Double`, you will not lose precision, but you still have to explicitly indicate
    that you want the compiler to convert the value, like so:


    `var myDouble: Double = 12.34`


    `var myFloat: Float = 56.78`


    `var anotherDouble: Double = myFloat // error`


    `var yetAnotherDouble: Double = Double(myFloat) // OK`


    `var anotherFloat: Float = myDouble             // error`


    `var yetAnotherFloat: Float = Float(myDouble)   //` `OK`'
