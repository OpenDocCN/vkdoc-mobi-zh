  raw: '## Completing the Slider Class


    The next step is adding a property `value` to the `Slider` class that allows you
    to retrieve and set the value of the slider. You want a value of 0 to indicate
    that the slider is fully moved to the left, and a value of 1 to indicate the fully
    right position of the slider. You can calculate the current value by looking at
    the position of the front sprite, and seeing how much it’s moved to the right.
    Therefore, the following line of code calculates the slider value from the slider
    position:


    `return (front.position.x - front.size.width/2 - (back.position.x - back.size.width/2)
    -`


    `leftMargin) / (back.size.width - front.size.width - leftMargin - rightMargin)`


    In the upper part of the fraction, you calculate how far to the right the front
    sprite has been moved. You calculate this locally to the back left position plus
    the left margin. You then divide this by the total length that the slider can
    move. This `return` instruction forms the `get` part of the `value` property.
    For the `set` part of the property, you need to convert a value between zero and
    one to the front slider x-position. This amounts to rewriting the previous formula
    such that the front x-position is the unknown, which is then calculated as follows:


    `front.position.x = newValue * (back.size.width - front.size.width - leftMargin
    -     rightMargin) + leftMargin - back.size.width/2 + front.size.width/2`


    Now that you have a way to set and get the slider value, you need to write the
    code to handle player input. The first step is checking whether the player is
    currently touching the screen. If that isn’t the case, you simply reset the dragging
    status variables to their initial values, and you’re done:


    `if !inputHelper.isTouching {`


    `dragging = false`


    `draggingIndex = nil`


    `return`


    `}`


    If instructions are executed that are written after this `if` instruction, you
    know the player is touching the screen.


    You need to check whether the player is actually touching the button. If that
    is the case, you assign a new value to the `draggingIndex` variable and set `dragging`
    to `true`:


    `if inputHelper.containsTouch(back.box) {`


    `draggingIndex = inputHelper.getIDInRect(back.box)`


    `dragging = true`


    `}`


    Then, you check whether the player is currently dragging. If not, you are done
    and you return from the method:


    `if !dragging {`


    `return`


    `}`


    The final step is updating the slider position since the player is currently dragging.
    The first step is unwrapping the dragging index. Then, you retrieve the position
    where the player is touching the screen:


    `if let draggingUnwrap = draggingIndex {`


    `let touchPos = inputHelper.getTouch(draggingUnwrap)`


    `...`


    `}`


    Next, you calculate what the x-position of the slider should be. Because the touch
    position is in world coordinates, you subtract the world position of the back
    sprite from it to get the local position of the slider. This yields the following
    expression:


    `touchPos.x - back.worldPosition.x`


    You need to do a little more work, though, because you have to make sure the slider
    can’t move outside of its range. You therefore need to clamp the slider position
    within a certain range. In order to do this, let’s add a function that can perform
    this clamping operation:


    `func clamp(number:CGFloat, min:CGFloat, max:CGFloat) -> CGFloat`


    `{`


    `if number < min {`


    `return min`


    `}`


    `else if number > max {`


    `return max`


    `}`


    `return number`


    `}`


    Now you use that function to calculate the clamped value of the slider, and you
    store it as the slider’s new x-position:


    `front.position.x = clamp(touchPos.x - back.worldPosition.x,`


    `leftMargin - back.size.width/2 + front.size.width/2, back.size.width/2 - front.size.width/2
    - rightMargin)`


    This completes the code to handle the player input. You can then use the `value`
    property in that class to change the volume of the music according to the value
    of the slider (see the `updateDelta` method of the `GameWorld` class):


    `backgroundMusic.volume = Float(musicSlider.value)`


    This completes the PenguinPairs2 example. Figure [17-4](#A978-1-4842-0650-8_17_Chapter.html#Fig4)
    shows what it looks like.


    ![A978-1-4842-0650-8_17_Fig4_HTML.jpg](A978-1-4842-0650-8_17_Fig4_HTML.jpg)


    Figure 17-4.


    The `PenguinPairs2` example


    Most games contain some menu screens. With these screens, the player can set options,
    choose levels, watch achievements, and pause the game. Creating all these additional
    screens can be a lot of work that doesn’t contribute to the actual game play,
    so developers tend to put less effort into them. But that is a very wrong decision.


    An artist once said, “Your game is as good as its worst screen.” If one of the
    menu screens has poor quality, the player will get the feeling that the game is
    unfinished and the developer didn’t put enough effort into it. So make sure all
    your menu screens look beautiful, and are easy to use and navigate.


    Think carefully about what you put in these screens. You might be tempted to create
    options for everything: the difficulty of the game, the music to play, the color
    of the background, and so on. But remember, you’re the person who should create
    the game, not the player. You or your artist should determine what gives the most
    interesting game play and the most compelling visual style, not the user.


    Try to avoid options as much as possible. For example, should a player really
    set the difficulty? Can’t you adapt the difficulty automatically by monitoring
    the player’s progress? And do you really need a level-selection screen? Can’t
    you simply remember where the player was the last time, and immediately continue
    there? Keep your interface as simple as possible!


    ## What You Have Learned


    In this chapter, you have learned the following:


    *   How to create a menu with a variety of buttons and sliders

    *   How to retrieve the values of buttons and sliders, and translate that information
    into changing game settings such as the background music volume

    *   How to use class extensions to add functionality to existing third-party classes


    # 18. Game State Management


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​18](http://dx.doi.org/10.1007/978-1-4842-0650-8_18))
    contains supplementary material, which is available to authorized users.


    Normally, you don’t immediately start playing when a game application starts.
    For example, in the Tut’s Tomb game, you see a title screen before playing. More
    complicated games may have a title screen, a menu for options, menus for selecting
    different levels, screens to display the high score after finishing a level, a
    menu to select different characters and attributes, and so on. In Tut’s Tomb,
    adding a title screen wasn’t that difficult because the title screen itself had
    very little interaction. However, when you look at the example in the previous
    chapter, you can see that building a screen with a few options and controls can
    result in quite a lot of code. You can imagine that when you add more menus and
    screens to the game, it’s going to be a pain to manage which objects belong to
    which screen and when they should be drawn or updated.


    Generally, these different menus and screens are called game states. In some programs,
    they’re called scenes, and the object responsible for managing the scenes is the
    director. Sometimes a distinction is made between game modes and game states.
    In that case, things like menus, the main playing screen, and so on are game modes,
    whereas “level finished” and “game over” are game states.


    This book follows a simplified paradigm and calls everything game states. To deal
    with these different game states, you need a manager. In this chapter, you develop
    the main classes needed for such a structure and learn how to use it to display
    different menus and switch between them while keeping the code cleanly separated.'
  trans: "\n# 完成滑块类\n\n下一步是为 `Slider` 类添加一个 `value` 属性，以便能够获取和设置滑块的值。我们希望值为 0 时表示滑块完全滑动到左侧，值为\
    \ 1 时表示滑块完全滑动到右侧。你可以通过观察前端精灵的位置以及它向右移动的距离来计算当前值。因此，以下代码行根据滑块位置计算滑块值：\n\n`return\
    \ (front.position.x - front.size.width/2 - (back.position.x - back.size.width/2)\
