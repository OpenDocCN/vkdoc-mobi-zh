- fmt: '`background.zPosition = 0`


    在 Swift 中，点（`.`）通常表示从某个对象中获取信息，或以某种方式修改该对象。当前正在操作的对象写在点之前。点之后，你指明要如何操作该对象。在上面的例子中，`background`对象有一个名为`zPosition`的信息片段（或称为属性），你通过将值`0`赋值给`zPosition`来修改该对象。以下是另一个使用点的示例：


    `var myVariable: Int = background.position.x`


    在此示例中，你从背景精灵获取位置，然后从该位置获取其 x 值。除了直接访问信息，你还可以调用操作对象的方法，例如：


    `background.removeFromParent()`


    `removeFromParent`方法通过将背景对象从游戏场景中移除来操作它。基本上，它撤销了以下指令的效果：


    `addChild(background)`


    回到触摸输入示例，`first`是`Set<UITouch>`类型的一个属性，它返回触摸集合中的第一个元素。整个表达式以感叹号结尾。这与`touches`对象可能为空有关，这意味着`first`属性无法获取位置，因为没有任何位置。感叹号表示程序员知道这一点，并保证`touches`永远不会为空——这是合理的，因为如果玩家没有开始触摸屏幕，`touchesBegan`方法永远不会被调用。第
    12 章详细讨论了感叹号的用法，也称为解包。


    `touchesBegan`方法中的第二条指令将值赋给`touchLocation`属性。该值是调用`touch`变量中的`locationInNode`方法（参数为`self`）的结果。这会计算在游戏场景内触摸位置的位置。单词`self`指的是游戏场景对象。`self`的确切含义将在后面详细讨论。


    所以，总结一下，前两条指令从一组触摸中检索触摸信息对象，计算其在游戏场景中的位置，然后将该位置赋给`touchLocation`属性。第三条也是最后一条指令简单得多；它将集合中的触摸次数（使用`count`属性获取）加到`nrTouches`属性上，如下所示：


    `nrTouches = nrTouches + touches.count`


    这条指令再次说明，在 Swift 中，你永远不应将`=`符号读作“等于”，而应始终读作“赋值。因此，此赋值的右侧是`nrTouches`当前值与已开始的新触摸次数之和。此赋值有一个简写版本，如下所示：


    `nrTouches += touches.count`


    你可以将这条指令理解为“将`touches.count`加到`nrTouches`上”。类似地，Swift 也支持减法（`-=`）、乘法（`*=`）和除法（`/=`）等操作的简写符号。


    你可以看到，减法简写符号用于`touchesEnded`方法，该方法仅包含一条指令：


    ```

    override func touchesEnded(touches: Set<UITouch>, withEvent event: UIEvent?) {


    nrTouches -= touches.count


    }

    ```


    在此方法中，你只需从`nrTouches`变量中减去已结束的触摸次数。这样，`nrTouches`变量现在可以跟踪玩家当前放置在触摸屏上的手指数量。


    你需要定义的最后一个方法是`touchesMoved`。它处理玩家的任何手指移动。由于触摸次数没有变化，该方法包含两条指令：一条用于检索触摸信息，另一条用于更新触摸位置：


    ```

    override func touchesMoved(touches: Set<UITouch>, withEvent event: UIEvent?) {


    let touch = touches.first!


    touchLocation = touch.locationInNode(self)


    }

    ```


    再次说明，请注意这种方法不兼容玩家在屏幕上多个点触摸的情况，因为你只从集合中检索了一个触摸位置。在第 12 章中，我将向你展示一个更优雅的解决方案，该方案能正确处理多点触摸和触摸移动。'
  raw: '`background.zPosition = 0`


    In Swift, the dot generally means that you retrieve information from an object
    or change the object in some way. The object that you are manipulating at the
    moment is written before the dot. Behind the dot, you indicate how you want to
    manipulate the object. In the example above, the `background` object has a piece
    of information (or: a property) called `zPosition`, and you change the object
    by assigning a value of 0 to `zPosition`. Here is another example of how you can
    use the dot:


    `var myVariable: Int = background.position.x`


    In this example, you retrieve the position from the background sprite, and then
    from that position its x value. Instead of directly accessing information, you
    can also call a method that manipulates an object, such as


    `background.removeFromParent()`


    The `removeFromParent` method manipulates the background object by removing it
    from the game scene. Basically, it undoes the following instruction:


    `addChild(background)`


    Going back to the touch input example, `first` is a property of the `Set<UITouch>`
    type, and it returns the first element in the set of touches. The whole expression
    ends with an exclamation mark. This has something to do with the fact that it
    is possible that the `touches` object is empty, meaning that the `first` property
    cannot retrieve a location, since there aren’t any locations. The exclamation
    mark means that the programmer knows about it and guarantees that `touches` will
    never be empty–which is reasonable, since the `touchesBegan` method would never
    be called if the player has not started touching the screen. [Chapter 12](#A978-1-4842-0650-8_12_Chapter.html)
    discusses the usage of the exclamation mark, also called unwrapping, in more detail.


    The second instruction in the `touchesBegan` method assigns a value to the `touchLocation`
    property. The value is the result of calling the method `locationInNode` from
    the `touch` variable with one parameter, `self`. This calculates the position
    of the touch location with respect to the game scene. The word `self` refers to
    the game scene object. The exact meaning of `self` will be discussed later in
    more detail.


    So, to summarize, the first two instructions retrieve a touch information object
    from a set of touches, calculates its location in the game scene, and then assigns
    that location to the `touchLocation` property. The third, final instruction is
    much simpler; it adds the number of touches in the set (retrieved using the `count`
    property) to the `nrTouches` property, like so:


    `nrTouches = nrTouches + touches.count`


    This instruction illustrates once more that you should never read the `=` symbol
    as “equals” in Swift but always as “becomes.” So, the right-hand side of this
    assignment is the sum of the current value of `nrTouches` and the number of new
    touches that have begun. There is a shorthand version for this assignment, and
    it looks like this:


    `nrTouches += touches.count`


    You can read this instruction as “add `touches.count` to `nrTouches`”. Similarly,
    Swift also knows shorthand notations for subtraction (`-=`), multiplication (`*=`)
    and division (`/=`), among others.


    You can see that the shorthand notation for subtraction is used in the `touchesEnded`
    method, which contains only a single instruction:


    `override func touchesEnded(touches: Set<UITouch>, withEvent event: UIEvent?)
    {`


    `nrTouches -= touches.count`


    `}`


    In this method, you simply subtract the number of touches that have ended from
    the `nrTouches` variable. As a result, the `nrTouches` variable now keeps track
    of how many fingers the player currently has placed on the touch screen.


    The final method you need to define is `touchesMoved`. This takes care of any
    finger movement by the player. Since the number of touches doesn’t change, the
    method contains two instructions: one to retrieve the touch information, and one
    to update the touch location:


    `override func touchesMoved(touches: Set<UITouch>, withEvent event: UIEvent?)
    {`


    `let touch = touches.first!`


    `touchLocation = touch.locationInNode(self)`


    `}`


    Again, realize that this approach is not compatible with the player touching the
    screen in multiple places, since you are retrieving only a single touch location
    from the set. In [Chapter 12](#A978-1-4842-0650-8_12_Chapter.html), I will show
    you a more elegant solution that properly deals with multiple touches and touch
    movements.'
  trans: '

    `background.zPosition = 0`


    在 Swift 中，点（`.`）通常表示从某个对象中获取信息，或以某种方式修改该对象。当前正在操作的对象写在点之前。点之后，你指明要如何操作该对象。在上面的例子中，`background`对象有一个名为`zPosition`的信息片段（或称为属性），你通过将值`0`赋值给`zPosition`来修改该对象。以下是另一个使用点的示例：


    `var myVariable: Int = background.position.x`


    在此示例中，你从背景精灵获取位置，然后从该位置获取其 x 值。除了直接访问信息，你还可以调用操作对象的方法，例如：


    `background.removeFromParent()`


    `removeFromParent`方法通过将背景对象从游戏场景中移除来操作它。基本上，它撤销了以下指令的效果：


    `addChild(background)`


    回到触摸输入示例，`first`是`Set<UITouch>`类型的一个属性，它返回触摸集合中的第一个元素。整个表达式以感叹号结尾。这与`touches`对象可能为空有关，这意味着`first`属性无法获取位置，因为没有任何位置。感叹号表示程序员知道这一点，并保证`touches`永远不会为空——这是合理的，因为如果玩家没有开始触摸屏幕，`touchesBegan`方法永远不会被调用。第
    12 章详细讨论了感叹号的用法，也称为解包。


    `touchesBegan`方法中的第二条指令将值赋给`touchLocation`属性。该值是调用`touch`变量中的`locationInNode`方法（参数为`self`）的结果。这会计算在游戏场景内触摸位置的位置。单词`self`指的是游戏场景对象。`self`的确切含义将在后面详细讨论。


    所以，总结一下，前两条指令从一组触摸中检索触摸信息对象，计算其在游戏场景中的位置，然后将该位置赋给`touchLocation`属性。第三条也是最后一条指令简单得多；它将集合中的触摸次数（使用`count`属性获取）加到`nrTouches`属性上，如下所示：


    `nrTouches = nrTouches + touches.count`


    这条指令再次说明，在 Swift 中，你永远不应将`=`符号读作“等于”，而应始终读作“赋值”。因此，此赋值的右侧是`nrTouches`当前值与已开始的新触摸次数之和。此赋值有一个简写版本，如下所示：


    `nrTouches += touches.count`


    你可以将这条指令理解为“将`touches.count`加到`nrTouches`上”。类似地，Swift 也支持减法（`-=`）、乘法（`*=`）和除法（`/=`）等操作的简写符号。


    你可以看到，减法简写符号用于`touchesEnded`方法，该方法仅包含一条指令：


    ```

    override func touchesEnded(touches: Set<UITouch>, withEvent event: UIEvent?) {


    nrTouches -= touches.count


    }

    ```


    在此方法中，你只需从`nrTouches`变量中减去已结束的触摸次数。这样，`nrTouches`变量现在可以跟踪玩家当前放置在触摸屏上的手指数量。


    你需要定义的最后一个方法是`touchesMoved`。它处理玩家的任何手指移动。由于触摸次数没有变化，该方法包含两条指令：一条用于检索触摸信息，另一条用于更新触摸位置：


    ```

    override func touchesMoved(touches: Set<UITouch>, withEvent event: UIEvent?) {


    let touch = touches.first!


    touchLocation = touch.locationInNode(self)


    }

    ```


    再次说明，请注意这种方法不兼容玩家在屏幕上多个点触摸的情况，因为你只从集合中检索了一个触摸位置。在第 12 章中，我将向你展示一个更优雅的解决方案，该方案能正确处理多点触摸和触摸移动。

