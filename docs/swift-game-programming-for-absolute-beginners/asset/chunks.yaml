  raw: '## Resolutions and Aspect Ratios


    A big challenge when you’re developing games for iOS is making sure that your
    game looks nice on different iOS devices. It’s not enough to design nice sprites;
    you have to make sure that the size and resolution matches the requirement of
    the platform. There is a very big difference in the required sprite quality between
    an iPad 2 with a screen resolution of 1024x768 pixels versus an iPad Air that
    has a 2048x1536 resolution due to its Retina screen. Not only are the resolutions
    different, the aspect ratios differ between devices as well. An iPad has a much
    more square screen with its 4:3 aspect ratio versus the widescreen 16:9 aspect
    ratio of the iPhone 6\. So how do you deal with these differences between iOS
    devices?


    Of course, a possible solution is to create your game such that it only works
    on a single device. That way, you don’t have to deal with differences between
    iOS devices at all. However, you will lose a lot of players that way. In the following
    paragraphs, I’ll show you a way to make sure your sprites work well on several
    devices, without having to change the code. The main thing you need to watch out
    for is making sure that the internal game world size doesn’t change too much.
    For example, consider that the iPhone 4 resolution is 960x640 and the iPad Air
    is 2048x1536\. One way to deal with these two very different resolutions is that
    the iPad Air simply shows a bigger part of the game world than the iPhone 4 (since
    more fits on its screen). However, that’s not a good idea. When you design a game
    that should always show a single screen, such as most of the example games in
    this book, you can’t apply this trick. And showing a much larger part of the game
    world on some devices influences the gameplay. If you create a strategy game,
    you don’t want iPhone 4 players to have a disadvantage compared to iPad Air players
    because they cannot see oncoming attacks as well.


    The other way to deal with these different resolutions is by separating the game
    world size from the screen size. This is what Apple has opted for. Internally,
    when you write the code for your game, you are working with points and not with
    pixels directly. However, in some cases, points and pixels correspond directly.
    For example, consider the following change to the SpriteDrawing example:


    `balloonSprite.position = CGPoint(x: 201, y: 200)`


    The sprite is moved one point in the positive x direction. On the iPhone 3GS or
    the iPad 2, this means that the sprite will move one pixel in that direction.
    On the iPad Air however, the sprite will move two pixels in the positive x direction.
    In order to have more or less the same size visuals, you need to create two sprites:
    a standard resolution one (called “1x” by Apple) that works on the iPhone 3GS
    or the iPad 2, and a Retina resolution one (called “2x”) for the iPad Air and
    the newer iPhones. When you look at the balloon sprite, you’ll see that there
    are sprites for both the 1x and 2x resolution. The Retina (2x) resolution sprites
    are double the size of the standard (1x) resolution. That way, the size of your
    game stays the same whether you play it on an iPad 2 or on an iPad Air. In the
    latter case, the game will look a lot better since you can provide higher quality
    artwork in the 2x resolution format.


    Since the iPhone 6 Plus came out, there is also a 3x resolution option, also called
    Retina HD. This resolution is currently only used by the iPhone 6 Plus, and it
    allows you to create art at a yet higher resolution, namely triple the size of
    the standard (1x) resolution.


    The games in this book use art that has been optimized for all the iDevices, except
    the iPhone 6 Plus. If you open any of the examples, you’ll see that all the sprites
    are provided in the 1x and 2x resolutions. Note that the example games will run
    just fine on an iPhone 6 Plus, even though the images are not optimized for it;
    however, the graphics would be crisper if images at 3x resolution were used.


    Apart from the resolution that is used, you need to think about the aspect ratio.
    One thing you can do in your code is make sure that overlays such as buttons or
    a health bar are always placed relative to the size of the screen. The only area
    where you need to be careful is when designing background images. If your background
    images are not large enough, you will see black space on some devices.


    In this book, I use a background image of 2668x1536 pixels at Retina (2x) resolution.
    The standard resolution (1x) is then 1334x768 pixels. A background image of this
    size is large enough such that none of the devices show any black space. Because
    the iPhone screens are much smaller than the iPad screens, an iPhone will show
    only a small part of the background. For example, the iPhone 6 in landscape mode
    has a width of 667 points and uses a 2x resolution of 1334\. This is only half
    of the total background image at Retina resolution (which is 2668 pixels). In
    order to more closely match the iPhone and iPad points, I add these lines of code
    to each of the example games used in this book:


    `var viewSize = skView.bounds.size`


    `if UIDevice.currentDevice().userInterfaceIdiom == .Phone {`


    `viewSize.height *= 2`


    `viewSize.width *= 2`


    `}`


    Without going into too much detail, this code doubles the point resolution in
    case the app is running on an iPhone. The result of this is that a background
    of 2668x1536 will now show almost completely on an iPhone 6, and when creating
    apps that should work on both iPads and iPhones, you don’t have to think that
    carefully anymore about which device your game is running on.


    Most of the devices will only be able to show a part of the background image.
    On an iPad, the sides of the background will not be visible. On an iPhone 6, a
    strip on the top and bottom will not be shown (if the trick of doubling the point
    resolution explained above is applied). After taking into account all the different
    devices, you end up with a playable area: an area of the background that is always
    visible on all devices, regardless of the aspect ratio and resolution. Figure
    [4-3](#A978-1-4842-0650-8_4_Chapter.html#Fig3) shows an overview of the playable
    area for the standard (1x) and Retina (2x) resolutions.


    ![A978-1-4842-0650-8_4_Fig3_HTML.jpg](A978-1-4842-0650-8_4_Fig3_HTML.jpg)


    Figure 4-3.


    The playable area of a background image


    You can use this information to design your backgrounds correctly. If you want
    an element of the background to be visible on all devices, make sure that it is
    located inside the playable area. Again, this is only an issue for background
    design. Other elements of the game (such as a menu, overlays, the player character,
    and so on) can be dealt with differently. If you add these elements, simply determine
    their position according to the size of the screen. You will see a few examples
    of this approach in the games that you’ll develop while reading this book.


    Note


    The backgrounds and sprites for the games in this book are designed in such a
    way that they work for most iDevices. There are a few tradeoffs involved when
    doing this. For example, on some devices only a part of the background will be
    shown. Also, game objects may look quite small on small screens such as the iPhone
    4 or 5\. If you design a game, you may consider using different assets altogether
    for specific devices, and perhaps even design different levels for the iPhone
    and iPad versions separately. It’s better to design a game that works really well
    on a limited set of devices than a game that doesn’t work all that well on any
    device.


    The ScreenSizeTest example belonging to this chapter shows you what part of the
    game world each device shows by displaying Figure [4-3](#A978-1-4842-0650-8_4_Chapter.html#Fig3)
    as a background image. Try it on different devices in the iOS simulator to see
    what it looks like. Here is one interesting line of code in this example, which
    you can find in the `didMoveToView` method within the `GameScene.swift` file:'
  trans: "\n## 分辨率和宽高比\n\n在为 iOS 开发游戏时，一个重大挑战是确保你的游戏在不同 iOS 设备上都能呈现良好视觉效果。仅设计精美的精灵图是不够的，你还必须确保其尺寸和分辨率符合平台要求。屏幕分辨率为\
    \ 1024x768 像素的 iPad 2 与配备 Retina 显示屏、分辨率高达 2048x1536 的 iPad Air 相比，所需的精灵图质量存在巨大差异。不仅分辨率不同，各设备间的宽高比也有所差异。iPad\
    \ 采用更接近方形的 4:3 宽高比，而 iPhone 6 则采用 16:9 的宽屏比例。那么，该如何应对 iOS 设备之间的这些差异呢？\n\n当然，一个可能的解决方案是将你的游戏设计成仅适用于单一设备。这样一来，你完全无需处理不同\
    \ iOS 设备间的差异。然而，这样做会流失大量玩家。在接下来的段落中，我将向你展示一种方法，确保你的精灵图能在多种设备上良好运行，且无需修改代码。你需要关注的主要事项是，确保内部游戏世界的尺寸不会变化过大。例如，考虑\
    \ iPhone 4 的 960x640 分辨率和 iPad Air 的 2048x1536 分辨率。处理这两种差异巨大的分辨率的一种方法是，让 iPad\
    \ Air 比 iPhone 4 显示更多的游戏世界区域（因为其屏幕能容纳更多内容）。然而，这并不是一个好主意。当你设计一款游戏，它应该始终显示单一屏幕，例如本书中的大多数示例游戏，你就无法运用这个技巧。在某些设备上显示更大的游戏世界区域会影响游戏玩法。如果你开发一款策略游戏，你肯定不希望\
    \ iPhone 4 玩家因无法像 iPad Air 玩家那样清晰地察觉即将到来的攻击而处于劣势。\n\n另一种处理这些不同分辨率的方法是将游戏世界尺寸与屏幕尺寸分离。这正是苹果公司所采用的方式。在内部，当你为游戏编写代码时，你操作的是点（points），而不是直接操作像素。然而，在某些情况下，点与像素是直接对应的。例如，考虑对\
    \ `SpriteDrawing` 示例进行如下修改：\n\n`balloonSprite.position = CGPoint(x: 201, y: 200)`\n\
    \n这个精灵图在 x 正方向移动了一个点。在 iPhone 3GS 或 iPad 2 上，这意味着精灵图将沿该方向移动一个像素。然而，在 iPad Air\
    \ 上，精灵图将沿 x 正方向移动两个像素。为了获得大致相同的视觉尺寸，你需要创建两种精灵图：一种标准分辨率版本（苹果称之为 \"1x\"），适用于 iPhone\
    \ 3GS 或 iPad 2；另一种 Retina 分辨率版本（称为 \"2x\"），适用于 iPad Air 和新款 iPhone。当你查看气球精灵图时，你会发现其为\
    \ 1x 和 2x 分辨率都准备了精灵图。Retina（2x）分辨率的精灵图尺寸是标准（1x）分辨率的双倍。这样一来，无论你是在 iPad 2 还是 iPad\
    \ Air 上玩游戏，你的游戏尺寸都保持不变。在后一种情况下，由于你可以提供 2x 分辨率格式的更高品质美术资源，游戏画面会看起来好得多。\n\n自从 iPhone\
    \ 6 Plus 问世以来，还提供了一种 3x 分辨率选项，也称为 Retina HD。这种分辨率目前仅由 iPhone 6 Plus 使用，它允许你以更高的分辨率创作美术资源，即标准（1x）分辨率尺寸的三倍。\n\
    \n本书中的游戏使用的美术资源已针对除 iPhone 6 Plus 之外的所有 iDevice 进行了优化。如果你打开任意一个示例，你会看到所有精灵图都以\
    \ 1x 和 2x 分辨率提供。请注意，即使图像未针对 iPhone 6 Plus 进行优化，示例游戏在其上也能正常运行；不过，如果使用 3x 分辨率的图像，图形效果会更加清晰。\n\
    \n除了使用的分辨率之外，你还需要考虑宽高比。在你的代码中，你可以做的一件事是确保诸如按钮或生命值条之类的覆盖层始终相对于屏幕尺寸进行定位。唯一需要小心处理的区域是设计背景图像时。如果你的背景图像不够大，在某些设备上你会看到黑色的空白区域。\n\
    \n在本书中，我使用的背景图像尺寸为 2668x1536 像素，采用 Retina（2x）分辨率。相应的标准（1x）分辨率则为 1334x768 像素。如此大小的背景图像足够大，使得没有任何设备会显示黑色空白区域。由于\
    \ iPhone 屏幕比 iPad 屏幕小得多，iPhone 将仅显示背景的一小部分。例如，横屏模式下的 iPhone 6 宽度为 667 点，并使用 2x\
    \ 分辨率（1334 像素）。这仅仅是 Retina 分辨率下（2668 像素）整个背景图像的一半。为了更紧密地匹配 iPhone 和 iPad 的点，我在本书使用的每个示例游戏中添加了以下几行代码：\n\
    \n```\nvar viewSize = skView.bounds.size\n\nif UIDevice.currentDevice().userInterfaceIdiom\
    \ == .Phone {\n\n    viewSize.height *= 2\n\n    viewSize.width *= 2\n\n}\n```\n\
    \n在不深入细节的情况下，这段代码在应用运行于 iPhone 时将点的分辨率加倍。这样做的结果是，一个 2668x1536 的背景现在在 iPhone 6\
    \ 上几乎可以完整显示。在创建应同时适用于 iPad 和 iPhone 的应用时，你无需再过于谨慎地考虑游戏运行在哪个设备上。\n\n大多数设备将只能显示背景图像的一部分。在\
    \ iPad 上，背景的左右两侧将不可见。在 iPhone 6 上，顶部和底部的一部分条带将不会显示（如果应用了上述点分辨率加倍的技巧）。在考虑了所有不同设备后，你最终会得到一个可玩区域：即无论宽高比和分辨率如何，在所有设备上始终可见的背景区域。图\
    \ 4-3 展示了标准（1x）和 Retina（2x）分辨率下的可玩区域概览。\n\n![A978-1-4842-0650-8_4_Fig3_HTML.jpg](img/A978-1-4842-0650-8_4_Fig3_HTML.jpg)\n\
    \n图 4-3. 背景图像的可玩区域\n\n你可以利用这一信息来正确设计你的背景。如果你希望背景中的某个元素在所有设备上可见，请确保它位于可玩区域内。再次强调，这仅是背景设计时需要关注的问题。游戏的其他元素（例如菜单、覆盖层、玩家角色等）可以有其他不同的处理方式。如果你添加这些元素，只需根据屏幕尺寸确定它们的位置。在阅读本书并开发游戏的过程中，你将看到这种方法的几个示例。\n\
    \n> **注意**：本书中游戏的背景和精灵图均以适用于大多数 iDevice 的方式进行设计。这样做需要做出一些权衡。例如，在某些设备上，只会显示背景的一部分。此外，游戏对象在诸如\
    \ iPhone 4 或 5 的小屏幕上可能看起来相当小。如果你设计一款游戏，可以考虑为特定设备使用完全不同的资源，甚至分别为 iPhone 和 iPad\
    \ 版本设计不同的关卡。设计一款在有限设备上运行效果出色的游戏，总比设计一款在任何设备上运行效果都不太理想的游戏要好。\n\n本章附带的 `ScreenSizeTest`\
    \ 示例通过将图 4-3 作为背景图像显示，向你展示每个设备会显示游戏世界的哪一部分。在 iOS 模拟器中尝试在不同设备上运行它，看看效果。以下是该示例中一行有趣的代码，你可以在\
    \ `GameScene.swift` 文件的 `didMoveToView` 方法中找到它：\n"
- fmt: '`anchorPoint = CGPoint(x: 0.5, y: 0.5)`


    Remember that the origin of the coordinate system in a scene is in the bottom
    left of the screen. The code above changes that so that the origin is in the center
    of the screen. The value set as the origin of the coordinate system is specified
    in terms of the total width and height of the screen. For example, the value `(1.0,
    1.0)` represents the top right corner. And as a result, the value `(0.5, 0.5)`
    represents the center of the screen.


    Especially for backgrounds, setting the origin to the center of the screen is
    useful because then calculating the background position for different devices
    becomes much easier. Since sprites are by default drawn with their center at the
    position, and position `(0, 0)` is now the center of the screen, sprites are now
    by default centered on the screen. Leave out this line of code (or comment it
    out), and see what happens when you run the example program.


    The line of code above is an assignment instruction. The variable called `anchorPoint`
    is assigned a value. The value that is assigned is `CGPoint(x: 0.5, y: 0.5)`.
    You can also say that this line of code assigns a value of type `CGPoint` to `anchorPoint`.
    A value of type `CGPoint` is created by writing the name of the type and then,
    between parentheses, the parameters needed in order to create that value. In this
    case, an x and a y value are needed. Here you can also see a difference between
    simple, built-in types such as `Int`. For those types, you simply write the value
    that you want to assign:


    ```

    var age: Int = 12

    ```


    For more complex types (such as `CGPoint`), you need to write the type name and
    then, between parentheses, the parameters needed to create the value. Another
    example of a more complex type is `UIColor`. Here is an example of an assignment
    that uses the `UIColor` type:


    ```

    backgroundColor = UIColor(red: CGFloat(time), green: 0, blue: 0, alpha: 1)

    ```


    Here you see the same syntax. Write the type name and then, between parentheses,
    the required parameters. One of these parameters is `red`. And that parameter
    is assigned a value that’s also created by a non-builtin type called `CGFloat`.
    Also, you can see that you write the name of the type (`CGFloat`) and, between
    parentheses, the required parameter (`time`). Whenever you create a value using
    a complex type such as `UIColor` or `CGPoint`, this value is also called an object,
    or an instance of that type.


    Types are very useful. They provide a kind of blueprint that describes what a
    value should look like. For example, the `CGPoint` type describes a data structure
    for two-dimensional points. You don’t have to think about how to create such a
    data structure; `CGPoint` does that for you. You only need to provide the right
    parameter values when you create a `CGPoint` instance.


    ## Moving Sprites


    Now that you’re able to draw a sprite on the screen, you can use the game loop
    to make it move, just like you did with the text label in the DiscoWorld example
    in [Chapter 3](#A978-1-4842-0650-8_3_Chapter.html). In the SpriteDrawing program,
    you drew a balloon on the screen. Let’s make a small extension of this program
    that changes the balloon’s position based on the passed time. First, you need
    to add the `update` method to the `GameScene` class, so that it becomes a part
    of the game loop. In the DiscoWorld example, you retrieved and stored the current
    time as follows:


    ```

    var time: Double = currentTime % 1

    ```


    Let’s try to change the position of the balloon so that it flies from the left
    side of the screen to the right side. A simple way to do this is by changing the
    position using the `time` variable. In order to avoid too many conversions between
    types, you store the time not as a `Double`, but as a `CGFloat`, which is the
    main type used in SpriteKit to represent floating point values:


    ```

    var time = CGFloat(currentTime % 1)

    ```


    Now, you can change the position of the balloon by using the `time` variable,
    as follows:


    ```

    balloonSprite.position = CGPoint(x: time * 200, y: 200)

    ```


    Since the `time` variable always has a value between 0 and 1, the x value will
    have a range from 0 to 200 (since you multiply `time` by 200). However, the width
    of the viewing area on your iDevice probably is not 200 points, but something
    else. Moreover, the width also depends on whether you hold the device horizontally
    or vertically. Fortunately, the `GameScene` class has a variable called `size`,
    which contains two other variables, `width` and `height`. Have a look at the following
    line of code:


    ```

    balloonSprite.position = CGPoint(x: time * size.width, y: 200)

    ```


    Instead of multiplying the time by a fixed value, this instruction multiplies
    the time by the current width of the screen. As a result, the balloon will move
    from the left side of the screen to the right side. The MovingSprite example belonging
    to this chapter shows the result of changing the balloon position in this way.
    If you rotate the device (in the iOS simulator, choose Hardware ➤ Rotate left,
    for example), you’ll see that the balloon still moves from the left side to the
    right side of the device regardless of the device orientation and screen width.
    Try a few different things to see how you can modify this program. Can you make
    the sprite move from the right to the left? Can you make the sprite move faster
    or slower?'
