    所以，你现在已经看到了声明变量的指令和在其中存储值的指令。但如果你在声明变量时就已经知道要存储什么值，你可以将变量声明和首次赋值合并起来：


    `var red: Int = 3`


    当这条指令执行后，内存将包含值 3，如图 3-2 所示。


    ![A978-1-4842-0650-8_3_Fig2_HTML.gif](img/A978-1-4842-0650-8_3_Fig2_HTML.gif)


    图 3-2. 变量声明和赋值后的内存状态


    当你将声明与变量初始化合并时，无需提供类型信息，因为从你赋的值已经可以明确类型。所以指令


    `var x = 12`


    等同于


    `var x: Int = 12`


    这种通过查看你赋给变量的值来自动定义变量类型的过程称为类型推断。一旦变量的类型被定义（无论是显式指定还是推断得出），就不能再更改。有些语言（例如 JavaScript）允许在任何时候更改变量的类型。与
    Swift 相反，这些语言因此被称为弱类型语言。


    除了变量，Swift 还允许你声明和初始化常量。常量对于定义诸如重力（除非你的游戏发生在不同的星球上，否则不会改变）、游戏包含的固定关卡数量或数学常量（如
    π）等非常有用。声明常量时，将 `var` 替换为 `let`，例如：


    `let numberOfLevels = 50`


