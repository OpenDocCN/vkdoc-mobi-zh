  raw: '## Handling Physics Contacts


    Before concluding this chapter, let’s take a look at the final part of the gameplay:
    handling contact between treasures. In the previous chapter, you saw how to add
    physical behavior to game objects. You also saw that contacts can be handled if
    you define a particular method inside the `GameWorld` class, which implements
    the `SKPhysicsContactDelegate` protocol:


    `func didBeginContact(contact: SKPhysicsContact) {`


        `let firstBody = contact.bodyA.node as? Treasure`


        `let secondBody = contact.bodyB.node as? Treasure`


        `// handle contact between the two bodies here`


    `}`


    You handle the contact between the two bodies by looking at a few different cases.
    The first case is that the casting of the body nodes to `Treasure` instances was
    not successful. This happens if one of the bodies actually is not a treasure at
    all (instead, for example, a wall). In that case, you simply return from the method
    because you don’t have to do anything in particular when a treasure collides with
    a wall:


    `if firstBody == nil || secondBody == nil {`


        `return`


    `}`


    If two objects collide and they are of the same type (or one of them is a magic
    crystal), both objects will be removed from the scene. In order to avoid removing
    objects from the scene multiple times (which can happen when separate parts of
    the objects are in contact at the same time), you need to check whether you already
    handled a contact between these two objects. If either of the objects has no parent
    (in other words, it has already been removed from the scene), the contact was
    already handled, and the code is as follows:


    `if firstBody?.parent == nil || secondBody?.parent == nil {`


        `return`


    `}`


    Yet another case is where two rocks collide. In that case, you also return from
    the method because when two rocks collide, nothing happens–they simply stay in
    the scene, like so:


    `if firstBody?.type == TreasureType.Rock &&`


        `secondBody?.type == TreasureType.Rock {`


        `return`


    `}`


    The final case is the one where objects need to be removed from the scene. This
    happens if the type of the two treasures matches, or either one of the treasures
    is a magic crystal. Both objects are removed from the scene in that case, by using
    the `removeFromParent` method:


    `if firstBody?.type == secondBody?.type || firstBody?.type == TreasureType.Magic`


        `|| secondBody?.type == TreasureType.Magic {`


        `firstBody?.removeFromParent()`


        `secondBody?.removeFromParent()`


    `}`


    Take a look at the `GameWorld` class in the TutsTomb3 example for the complete
    code of the method. Note that the order in which the `if` instructions are written
    inside the method body is important. For example, dealing with rocks works correctly
    because of the order. If the `if` instruction comparing the rock types was placed
    at the end of the method body, then two rocks would also be removed from the scene
    when they collide, which is undesirable. It’s important that you think carefully
    about which cases to handle when you write code like this. Bugs are easily introduced
    if you don’t watch out!


    ## What You Have Learned


    In this chapter, you have learned the following:


    *   How to program gameplay aspects and interaction between game objects

    *   How to use actions to define game object behavior

    *   How to handle physical contact in the Tut’s Tomb game


    # 15. Game States


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​15](http://dx.doi.org/10.1007/978-1-4842-0650-8_15))
    contains supplementary material, which is available to authorized users.


    In the previous chapter, you programmed the main gameplay elements of the Tut’s
    Tomb game. However, the game as it stands is far from complete. For example, nothing
    happens when the tomb is completely filled with treasures. Also, when you start
    the program, the game immediately begins without any warning. What is still needed
    is a way to incorporate menus and overlays in the game so the player can get help
    or start playing the game. When the player is, for example, in a menu screen,
    the type of interaction with the game is very different from when the player is
    solving a level or trying to survive as long as possible. When programming a game,
    you have to think about how to incorporate these different game states and switch
    between them.


    Modern games have many different game states, such as menus, maps, inventories,
    splash screens, intro movies, and much more. This chapter shows how to add different
    game states to the Tut’s Tomb game. Because this game isn’t yet very complicated,
    you can get away with using a few simple extensions to your current classes. However,
    game-state management needs to be handled properly if you want to build a commercial
    game. [Chapter 18](#A978-1-4842-0650-8_18_Chapter.html) covers a software design
    using classes that can handle game states in a very nice and generic way.


    ## Better Layer Handling


    An important thing when dealing with different game states is that things are
    drawn at different layers. You use the `zPosition` property of the `SKNode` class
    for that. Using fixed numbers to represent layers may not always be very easy
    to remember. You have to keep track of which layer represents the scene, which
    one represents an overlay, and which one represents a background. In the TutsTomb4
    example, I used a struct to represent the different layers, very similar to how
    I defined the various treasure types (see the `GameScene.swift` file):


    `struct Layer {`


        `static let Background: CGFloat = 0`


        `static let Scene: CGFloat = 1`


        `static let Scene1: CGFloat = 2`


        `static let Scene2: CGFloat = 3`


        `static let Overlay: CGFloat = 10`


        `static let Overlay1: CGFloat = 11`


        `static let Overlay2: CGFloat = 12`


    `}`


    As you can see, I define a few useful layers for the background, the scene, and
    the overlays. Now you can very easily define the layer by using these constants:


    `background.zPosition = Layer.Background`


    Take a look at the code in the TutsTomb4 example to see how these layers are used
    to structure the order in which objects in the game world are drawn.'
  trans: "\n# 处理物理接触\n\n在结束本章之前，让我们来看看游戏玩法的最后一部分：处理宝藏之间的接触。在上一章中，你已经了解了如何为游戏对象添加物理行为。你还了解到，如果在\
    \ `GameWorld` 类（该类实现了 `SKPhysicsContactDelegate` 协议）内部定义特定的方法，就可以处理接触事件：\n\n```\n\
    func didBeginContact(contact: SKPhysicsContact) {\n    let firstBody = contact.bodyA.node\
    \ as? Treasure\n    let secondBody = contact.bodyB.node as? Treasure\n    // 在这里处理两个物体之间的接触\n\
    }\n```\n\n你需要通过考虑几种不同的情况来处理两个物体之间的接触。第一种情况是将物体节点转换为 `Treasure` 实例失败。如果其中一个物体根本不是宝藏（例如，它是一堵墙），就会发生这种情况。在这种情况下，你可以直接从这个方法中返回，因为当宝藏与墙壁碰撞时，你不需要做任何特殊处理：\n\
    \n```\nif firstBody == nil || secondBody == nil {\n    return\n}\n```\n\n如果两个物体发生碰撞，且它们属于同一类型（或者其中一个是魔法水晶），那么两个物体都将从场景中移除。为了避免多次从场景中移除物体（当物体的不同部分同时发生接触时可能会发生这种情况），你需要检查是否已经处理了这两个物体之间的接触。如果这两个物体中的任何一个没有父节点（换句话说，它已经被从场景中移除了），则表示接触已经被处理过，代码如下：\n\
    \n```\nif firstBody?.parent == nil || secondBody?.parent == nil {\n    return\n\
    }\n```\n\n还有一种情况是两个岩石发生碰撞。在这种情况下，你也需要从方法中返回，因为当两个岩石碰撞时，什么都不会发生——它们只会留在场景中，如下所示：\n\
    \n```\nif firstBody?.type == TreasureType.Rock &&\n    secondBody?.type == TreasureType.Rock\
    \ {\n    return\n}\n```\n\n最后一种情况是需要将物体从场景中移除。当两个宝藏的类型匹配，或者其中一个宝藏是魔法水晶时，就会发生这种情况。在这种情况下，两个物体都会使用\
    \ `removeFromParent` 方法从场景中移除：\n\n```\nif firstBody?.type == secondBody?.type\
    \ || firstBody?.type == TreasureType.Magic\n    || secondBody?.type == TreasureType.Magic\
    \ {\n    firstBody?.removeFromParent()\n    secondBody?.removeFromParent()\n}\n\
    ```\n\n请查看 TutsTomb3 示例中的 `GameWorld` 类，以了解该方法的完整代码。请注意，方法体内 `if` 指令的编写顺序非常重要。例如，处理岩石的代码之所以能够正确工作，正是因为顺序。如果比较岩石类型的\
    \ `if` 指令放在方法体的末尾，那么两个岩石碰撞时也将从场景中被移除，这是不可取的。编写此类代码时，仔细考虑需要处理哪些情况非常重要。如果不小心，很容易引入错误！\n\
    \n## 本章所学内容\n\n在本章中，你学习了以下内容：\n\n-   如何编写游戏玩法逻辑以及游戏对象之间的交互\n-   如何使用动作来定义游戏对象的行为\n\
    -   如何在图坦卡蒙之墓游戏中处理物理接触\n\n# 游戏状态\n\n电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-0650-8_​15](http://dx.doi.org/10.1007/978-1-4842-0650-8_15)）包含补充材料，可供授权用户使用。\n\
    \n在上一章中，你编写了图坦卡蒙之墓游戏的主要玩法元素。然而，目前的游戏还远未完成。例如，当墓室完全被宝藏填满时，什么也不会发生。此外，当你启动程序时，游戏会立即开始，没有任何警告。我们仍然需要一种将菜单和覆盖层整合到游戏中的方法，以便玩家能够获取帮助或开始玩游戏。例如，当玩家处于菜单界面时，与游戏的交互类型与玩家解谜或尽力存活时的交互方式截然不同。在编写游戏程序时，你必须考虑如何整合这些不同的游戏状态，并在它们之间切换。\n\
    \n现代游戏有许多不同的游戏状态，例如菜单、地图、物品栏、启动画面、过场动画等等。本章将展示如何为图坦卡蒙之墓游戏添加不同的游戏状态。由于这个游戏目前还不太复杂，你可以通过对现有类进行一些简单的扩展来实现。然而，如果你想制作一款商业游戏，就必须妥善处理游戏状态的管理。第\
    \ 18 章将介绍一种使用类的软件设计方法，这种方法能够以非常优雅和通用的方式处理游戏状态。\n\n## 更好的图层处理\n\n处理不同游戏状态时，一个重要的方面是内容要在不同的图层上绘制。为此，你需要使用\
    \ `SKNode` 类的 `zPosition` 属性。使用固定的数字来表示图层可能不太容易记住。你需要跟踪哪个图层代表场景，哪个代表覆盖层，哪个代表背景。在\
    \ TutsTomb4 示例中，我使用了一个结构体来表示不同的图层，这与定义各种宝藏类型的方式非常相似（请参阅 `GameScene.swift` 文件）：\n\
    \n```\nstruct Layer {\n    static let Background: CGFloat = 0\n    static let\
    \ Scene: CGFloat = 1\n    static let Scene1: CGFloat = 2\n    static let Scene2:\
    \ CGFloat = 3\n    static let Overlay: CGFloat = 10\n    static let Overlay1:\
    \ CGFloat = 11\n    static let Overlay2: CGFloat = 12\n}\n```\n\n如你所见，我为背景、场景和覆盖层定义了几个有用的图层。现在，你可以非常方便地使用这些常量来定义图层：\n\
    \n```\nbackground.zPosition = Layer.Background\n```\n\n请查看 TutsTomb4 示例中的代码，了解如何使用这些图层来构建游戏世界中对象的绘制顺序。\n"
- fmt: "# Adding a Title Screen\n\nOne of the first things you can do to make a game\
    \ look more complete is add a title screen. The title screen allows the player\
    \ to get ready to play the game instead of being immediately launched into it.\
    \ You can extend the `GameWorld` class so that it loads and displays a title screen\
    \ consisting of a single image. You create a `SKSpriteNode` instance for that\
    \ and add it to the game world, like so:\n\n```\nvar titleScreen = SKSpriteNode(imageNamed:\"\
    spr_title\")\n...\ntitleScreen.zPosition = Layer.Overlay2\naddChild(titleScreen)\n\
    ```\n\nYou assign it the layer `Layer.Overlays2` so you can be sure the title\
    \ is drawn on top of everything. But you have to do a little extra work to properly\
    \ handle input and update the game world because you want the game to start only\
    \ when the title screen is no longer visible. You can do that by adding a few\
    \ instructions to the `handleInput` method to distinguish between two states,\
    \ the state in which you show the title screen and the state in which you’re playing\
    \ the game:\n\n```\nif !titleScreen.hidden {\n    if inputHelper.hasTapped {\n\
    \        titleScreen.hidden = true\n        self.runAction(totalAction)\n    }\n\
    } ... else {\n    super.handleInput(inputHelper)\n    ...\n}\n```\n\nLooking at\
    \ the `if` instructions, you can see that if the title screen is visible, the\
    \ game reacts only when the player taps on the screen. In that case, you set the\
    \ title screen’s hidden flag to `true` so it isn’t drawn anymore. Also, you start\
    \ the action that drops a treasure every few seconds. As a result, whenever the\
    \ title screen is visible, the only thing the game reacts to is the player touching\
    \ the screen. If the title screen isn’t visible, you call the `handleInput` method\
    \ of the super class; in other words, the game reacts to the player as it should\
    \ when the player is playing the game.\n\nYou follow very much the same procedure\
    \ for the `updateDelta` method, where you update the game world only if the title\
    \ isn’t visible:\n\n```\nif titleScreen.hidden {\n    super.updateDelta(delta)\n\
    }\n```\n\nWhen a player starts the game, they now see a title screen before the\
    \ game starts (see Figure [15-1](#A978-1-4842-0650-8_15_Chapter.html#Fig1)). You\
    \ aren’t done yet. In the next section, you add a simple button GUI element that\
    \ shows a help frame.\n\n![A978-1-4842-0650-8_15_Fig1_HTML.jpg](A978-1-4842-0650-8_15_Fig1_HTML.jpg)\n\
    \nFigure 15-1. The Tut’s Tomb title screen\n\n# Adding a Button to Show a Help\
    \ Frame\n\nThis section explains how to add a button to a game, which you use\
    \ to display a help frame. To do that, you add another class, `Button`, to the\
    \ program. You inherit from the `GameObjectNode` class and add some simple behavior\
    \ that checks whether the player pressed a button. In the `Button` class, you\
    \ declare a Boolean property that indicates whether the button was tapped. Then\
    \ you override the `handleInput` method to check whether the player has tapped\
    \ on the button on the screen. If the touching position is within the boundaries\
    \ of the button sprite at that time, you know the player has tapped on the button,\
    \ and you set the value of the property to `true`. How can you check whether the\
    \ touch position is within the boundaries of the sprite? By using the `box` property\
    \ of the `GameObjectNode` class and use the `containsTap` method in the `InputHelper`\
    \ class. Here is the complete `handleInput` method of `Button`:\n\n```\noverride\
    \ func handleInput(inputHelper: InputHelper) {\n    super.handleInput(inputHelper)\n\
    \    tapped = inputHelper.containsTap(self.box)\n}\n```\n\nFor the complete `Button`\
    \ class, see the `TutsTomb4` example. Now let’s add a Help button to the game\
    \ world. In the `GameWorld` class, you add a property to represent the Help button:\n\
    \n```\nvar helpbutton = Button(imageNamed: \"spr_button_help\")\n```\n\nThe next\
    \ step is to position the Help button on the screen and add it to the game world.\
    \ In Tut’s Tomb, the Help button should always be shown in the top right of the\
    \ screen, regardless of the device that is used. To write the code that achieves\
    \ this, you add a method called `topRight` to the `GameWorld` class that calculates\
    \ the position corresponding to the top right of the screen:\n\n```\nfunc topRight()\
    \ -> CGPoint {\n    return CGPoint(x: size.width/2, y: size.height/2)\n}\n```\n\
    \nUsing this method, you can now calculate the desired position of the Help button:\n\
    \n```\nvar helppos = topRight()\nhelppos.x -= helpbutton.sprite.size.width/2 +\
    \ 10\nhelppos.y -= helpbutton.sprite.size.height/2 + 10\n```\n\nBecause the origin\
    \ of a sprite is its center by default, you need to subtract half of the help\
    \ button sprite width and height of the top right position. You subtract another\
    \ 10 pixels so that there is a slight margin between the button and the edges\
    \ of the screen.\n\nBecause you want to display a help frame when the player presses\
    \ the Help button, you also add a help frame to the game world. You set its hidden\
    \ flag to `true` so it isn’t yet visible:\n\n```\nvar helpframe = SKSpriteNode(imageNamed:\
    \ \"spr_help\")\nhelpframe.zPosition = Layer.Overlay2\nhelpframe.hidden = true\n\
    ```\n\nNow you have to make sure that when the player taps the help button, the\
    \ help frame is shown. You can do this using the following `if` instruction in\
    \ the `handleInput` method of the `GameWorld` class:\n\n```\nif helpbutton.tapped\
    \ {\n    helpframe.hidden = false\n    self.removeAllActions()\n}\n```\n\nYou\
    \ have to make sure the game isn’t updated when the help frame is displayed. This\
    \ is partly done by calling the `removeAllActions` method, which disables the\
    \ action that drops treasures. You also need to make sure that game objects are\
    \ only updated if the help frame isn’t visible. Therefore, you change the `updateDelta`\
    \ method of the `GameWorld` class as follows:\n\n```\nif titleScreen.hidden &&\
    \ helpframe.hidden {\n    super.updateDelta(delta)\n}\n```\n\nFigure [15-2](#A978-1-4842-0650-8_15_Chapter.html#Fig2)\
    \ shows the game when the help frame is displayed.\n\n![A978-1-4842-0650-8_15_Fig2_HTML.jpg](A978-1-4842-0650-8_15_Fig2_HTML.jpg)\n\
    \nFigure 15-2. Screenshot of the help frame display in the game"
