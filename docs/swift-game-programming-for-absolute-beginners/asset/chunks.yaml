  raw: '## Parameter Names and Labels


    Let’s look a bit more in detail at parameters, how you declare them, and how you
    call them. Take a look at the following function:


    `func sign(val: Int) -> Int {`


    `if val < 0 {`


    `return -1`


    `} else if val > 0 {`


    `return 1`


    `} else {`


    `return 0`


    `}`


    `}`


    This function calculates the sign of an integer value. If the value passed as
    a parameter is greater than 0, the function returns 1\. If the value is negative,
    the function returns -1\. If the value is 0, the result of the function call is
    also 0, like so:


    `var someVariable = sign(3) // someVariable will contain the value 1`


    `someVariable = sign(-12)   // someVariable will now contain the value -1`


    `someVariable = sign(0)     // someVariable now contains the value 0`


    When you look at the function header, you see that the parameter has a name (`val`).
    Inside the function body, you refer to the parameter by that name. When the function
    is called, you simply write the value that you need the parameter to be inside
    the parentheses. If a function has more than one parameter, you simply write the
    parameter values between parentheses. For example, this is the header of the `atan2`
    function:


    `func atan2(lhs: CGFloat, rhs: CGFloat) -> CGFloat`


    This function has two parameters, and you call it as follows:


    `cannonBarrel.zRotation = atan2(opposite, adjacent)`


    Next to functions, Swift also knows methods. Recall that a method groups instructions,
    just like a function. But as opposed to a function, a method is also part of a
    class. Swift has different rules for methods that define the way that parameters
    are dealt with. Methods that have a single parameter generally work in the same
    way as a function: you simply write the parameter value between parentheses when
    you call the method. If a method has more than one parameter, things change. Suppose
    that you define the following method inside the `GameScene` class:


    `func max(val1: Int, val2: Int) -> Int {`


    `if val1 < val2 {`


    `return val2`


    `} else {`


    `return val1`


    `}`


    `}`


    This method expects two parameters and it returns the highest number of the two.
    Because there are two parameters, you need to be specific about which parameter
    value maps to which parameter name when you call the method, as follows:


    `var maxValue = max(3, val2: 12)`


    In the Swift language, you generally don’t write the label in front of the first
    parameter, but you do write one for the second, third, and so on parameters in
    a method. This is the case for all methods, except for methods that create an
    object. In that case, you also need to explicitly write the label for the first
    parameter. The following is an example:


    `var background = SKSpriteNode(imageNamed: "spr_background")`


    Here you create an object of type `SKSpriteNode` and store it in a variable. Swift
    then requires the parameter label `imageNamed`.


    Swift makes a distinction between internal and external parameter labels. Let’s
    slightly rewrite the `max` method as follows:


    `func max(val1: Int, b val2: Int) -> Int {`


    `if val1 < val2 {`


    `return val2`


    `} else {`


    `return val1`


    `}`


    `}`


    As you can see, the second parameter now has two labels. The first label, (`b`),
    is the external parameter label name. If you call the method, you should use that
    label instead of `val2` to refer to the second parameter, like so:


    `var result = max(12, b: 3)`


    The labels `val1` and `val2` are the internal label names. These are the label
    names that should be used inside the method body. You can use external label names
    to force users to also provide a label for the first parameter, by modifying the
    header of the `max` method as follows:


    `func max(firstValue val1: Int, secondValue val2: Int) -> Int`


    Now you need to provide both labels when calling the `max` method:


    `result = max(firstValue: 12, secondValue: 3)`


    If you decide that labels are not necessary at all, you can indicate that by using
    an underscore for the external label name in the header, as follows:


    `func max(val1: Int, _ val2: Int) -> Int`


    You can now call the `max` method without providing any labels whatsoever:


    `result = max(12, 3)`


    Note that you only need to write an underscore before the second label since the
    first label name is already omitted by default. As you can see, Swift provides
    you with many options for defining parameter names and many ways to refer to parameters
    inside and outside of the function or method body. Also, with all these different
    rules for functions and methods, it can sometimes be hard to know whether or not
    you should write a label name when you call a method or function. Fortunately,
    the Xcode development environment will automatically detect errors for you and
    propose a fix. Try it yourself by adding labels to the `atan2` call in the Painter2
    program. You’ll see that Xcode proposes that the labels be removed to fix the
    compiler error.


    It is a good idea to think about what kind of parameter labels you want to use
    in different situations. Explicit parameter labels help make the meaning of the
    parameters clearer. For example, the `firstValue` and `secondValue` labels in
    the `max` function earlier in this chapter help to clarify the meaning of the
    parameters: they represent the values of which the function returns the maximum.
    As another example, consider the following function:


    `func calculateAgeInMonths(years y: Int, months m: Int) {`


    `return y * 12 + m`


    `}`


    If you call this function, it is useful to know which of the two parameters is
    what. The explicit year and month labels help to clarify this:


    `var myAgeInMonths = calculateAgeInMonths(years: 18, months: 3)`


    On the other hand, sometimes parameter labels make your instructions longer than
    necessary. For instance, the `max` method doesn’t really need explicit labels
    for its parameters. It doesn’t matter what the parameters are called; the method
    simply returns the largest value. By carefully deciding which parameters need
    labels and which don’t, your code become much cleaner and it will be easier to
    understand by others.


    Declarations vs Parameters


    Declarations of variables have a lot in common with parameters that are written
    in the method header. In fact, those parameters also are declarations, but there
    are a few differences:


    *   Variables are declared in the body of the method; parameters are declared
    between the parentheses in the method header.

    *   Variables get a value by using an assignment instruction; parameters automatically
    get a value when the method is called.

    *   Variable declarations start with the word `var`; parameter declarations don’t.'
  trans: "\n# 参数名称与标签\n\n让我们更详细地了解一下参数、如何声明它们以及如何调用它们。请看以下函数：\n\n```\nfunc sign(val:\
    \ Int) -> Int {\n    if val < 0 {\n        return -1\n    } else if val > 0 {\n\
    \        return 1\n    } else {\n        return 0\n    }\n}\n```\n\n这个函数计算一个整数值的符号。如果作为参数传入的值大于\
    \ 0，函数返回 1。如果值为负数，函数返回-1。如果值为 0，函数调用的结果也是 0，如下所示：\n\n```\nvar someVariable = sign(3)\
    \  // someVariable 将包含值 1\nsomeVariable = sign(-12)    // someVariable 现在将包含值\
    \ -1\nsomeVariable = sign(0)      // someVariable 现在包含值 0\n```\n\n当你查看函数头时，会看到参数有一个名称（`val`）。在函数体内，你通过该名称引用参数。调用函数时，只需在括号内写入你需要的参数值。如果一个函数有多个参数，你只需在括号内写入这些参数值。例如，这是\
    \ `atan2` 函数的函数头：\n\n```\nfunc atan2(lhs: CGFloat, rhs: CGFloat) -> CGFloat\n\
    ```\n\n这个函数有两个参数，调用方式如下：\n\n```\ncannonBarrel.zRotation = atan2(opposite, adjacent)\n\
    ```\n\n除了函数，Swift 还认识方法。回想一下，方法就像函数一样组织指令。但与函数不同的是，方法也是类的一部分。Swift 对方法处理参数的方式有不同的规则。对于只有一个参数的方法，其工作方式通常与函数相同：调用方法时只需将参数值写在括号内。如果方法有多个参数，情况就不同了。假设你在\
    \ `GameScene` 类中定义了以下方法：\n\n```\nfunc max(val1: Int, val2: Int) -> Int {\n   \
    \ if val1 < val2 {\n        return val2\n    } else {\n        return val1\n \
    \   }\n}\n```\n\n这个方法期望两个参数，并返回两者中较大的数。因为有两个参数，调用方法时需要明确指出哪个参数值对应哪个参数名称，如下所示：\n\
    \n```\nvar maxValue = max(3, val2: 12)\n```\n\n在 Swift 语言中，通常不需要在第一个参数前写标签，但第二个、第三个及后续参数需要写标签。这对于所有方法都适用，除了创建对象的方法。在这种情况下，你还需要显式地写出第一个参数的标签。示例如下：\n\
    \n```\nvar background = SKSpriteNode(imageNamed: \"spr_background\")\n```\n\n\
    这里你创建了一个 `SKSpriteNode` 类型的对象并存储在一个变量中。Swift 要求提供参数标签 `imageNamed`。\n\nSwift 区分内部和外部参数标签。让我们稍微重写一下\
    \ `max` 方法，如下所示：\n\n```\nfunc max(val1: Int, b val2: Int) -> Int {\n    if val1\
    \ < val2 {\n        return val2\n    } else {\n        return val1\n    }\n}\n\
    ```\n\n如你所见，第二个参数现在有两个标签。第一个标签（`b`）是外部参数标签名称。调用该方法时，你应该使用这个标签而不是 `val2` 来引用第二个参数，如下所示：\n\
    \n```\nvar result = max(12, b: 3)\n```\n\n标签 `val1` 和 `val2` 是内部标签名称。这些是方法体内应该使用的标签名称。你可以使用外部标签名称来强制用户也为第一个参数提供标签，方法如下修改\
    \ `max` 方法的函数头：\n\n```\nfunc max(firstValue val1: Int, secondValue val2: Int)\
    \ -> Int\n```\n\n现在调用 `max` 方法时需要提供两个标签：\n\n```\nresult = max(firstValue: 12,\
    \ secondValue: 3)\n```\n\n如果你认为完全不需要标签，可以通过在函数头中使用下划线作为外部标签名称来指示，如下所示：\n\n```\n\
    func max(val1: Int, _ val2: Int) -> Int\n```\n\n现在你可以在不提供任何标签的情况下调用 `max` 方法：\n\
    \n```\nresult = max(12, 3)\n```\n\n请注意，你只需要在第二个标签前写下划线，因为第一个标签名称默认已经被省略了。如你所见，Swift\
    \ 为你提供了许多定义参数名称的选项，以及许多在函数或方法体内外引用参数的方式。此外，由于函数和方法有所有这些不同的规则，有时很难知道在调用方法或函数时是否应该写标签名称。幸运的是，Xcode\
    \ 开发环境会自动检测错误并建议修复。你可以通过在 `Painter2` 程序中向 `atan2` 调用添加标签来亲自尝试。你会看到 Xcode 建议移除这些标签以修复编译器错误。\n\
    \n考虑在不同情况下使用何种参数标签是一个好主意。显式的参数标签有助于使参数的含义更清晰。例如，本章前面 `max` 函数中的 `firstValue` 和\
    \ `secondValue` 标签有助于阐明参数的含义：它们代表函数返回最大值的那些值。作为另一个例子，考虑以下函数：\n\n```\nfunc calculateAgeInMonths(years\
    \ y: Int, months m: Int) {\n    return y * 12 + m\n}\n```\n\n调用这个函数时，知道两个参数分别是什么是很有用的。显式的年、月标签有助于澄清这一点：\n\
    \n```\nvar myAgeInMonths = calculateAgeInMonths(years: 18, months: 3)\n```\n\n\
    另一方面，有时参数标签会使你的指令变得不必要地冗长。例如，`max` 方法并不真正需要其参数的显式标签。参数叫什么名字并不重要；该方法只是简单地返回最大值。通过仔细决定哪些参数需要标签、哪些不需要，你的代码会变得清晰得多，也更容易被他人理解。\n\
    \n## 声明 vs 参数\n\n变量的声明与写在方法头中的参数有很多共同之处。事实上，这些参数本身也是声明，但存在一些差异：\n\n- 变量在方法体内声明；参数在方法头的括号内声明。\n\
    - 变量通过赋值指令获取值；参数在方法被调用时自动获取值。\n- 变量声明以关键字 `var` 开头；参数声明不以 `var` 开头。\n"
- fmt: "# Default Parameter Values\n\nIn a method or function body, you can also specify\
    \ default values for certain parameters. This can be useful because it provides\
    \ a convenient, shorter way to call the method/function for the commonly used\
    \ case. For instance, consider method `jump` that makes a player character jump\
    \ up. Its header could look like this:\n\n`func jump(speed: Int = 200, animate:\
    \ Bool = true)`\n\nIn this header, you see that the method has two parameters:\
    \ the speed at which the character should jump up, and whether or not the character\
    \ should be animated while it’s jumping. Each of these parameters has a default\
    \ value. In this case, the programmer who wrote this method expects that most\
    \ often the player will jump with a speed of 200, and the character should be\
    \ animated. Now because of those default values, you can call this method as follows:\n\
    \n`jump()`\n\nThis is exactly the same as calling the method as follows:\n\n`jump(speed:\
    \ 200, animate: true)`\n\nWhenever a parameter has a default value, you always\
    \ need to write the label in front of it when you call the method with a different\
    \ value for that parameter, as you can see in the method call above. Here is another\
    \ example:\n\n`jump(animate: false)`\n\nThis calls the `jump` method using the\
    \ default speed of 200, but with the animation off. Using default parameter values\
    \ makes calling your methods easier, but they are not always needed. For example,\
    \ you could rewrite the header of the `max` method defined earlier in this chapter\
    \ as follows:\n\n`func max(val1: Int = 12, b val2: Int = 34) -> Int`\n\nIn this\
    \ header, you defined default values for both the parameters, but they do not\
    \ make sense since there is no set of values that the `max` method will often\
    \ be called with. If a default value for a parameter does make sense (as in the\
    \ case of the `jump` method), it’s highly recommended to write it in the header.\
    \ Not only will it result in shorter code when calling the method, it will also\
    \ give the users of the method an idea of how the programmer envisions that the\
    \ method will be used. The latter argument is especially important if a method\
    \ has many, very low-level parameters and the user has no idea what value to choose.\
    \ Default parameter values in this case provide the user with a good baseline\
    \ for using the method without knowing all the details about the meaning of all\
    \ the parameters.\n\n# Reorganizing Instructions into Methods\n\nThe Painter2\
    \ example from the previous chapter was still relatively short because it only\
    \ displayed a background and a rotating cannon. Commercial games obviously are\
    \ much more complex than that. They contain many different objects that can have\
    \ complex behaviors and interactions. This is where methods are useful. Take a\
    \ look at the Painter3 example belonging to this chapter. You will see that the\
    \ instructions that belong together are now grouped in methods. For example, the\
    \ method called `initCannon` contains all the instructions for initializing the\
    \ cannon game object:\n\n```\nfunc initCannon() {\n    cannonRed.zPosition = 1\n\
    \    cannonGreen.zPosition = 1\n    cannonBlue.zPosition = 1\n    cannonBarrel.anchorPoint\
    \ = CGPoint(x:0.233, y:0.5)\n    cannon.position = CGPoint(x:-430, y:-280)\n \
    \   cannon.zPosition = 1\n    cannonGreen.hidden = true\n    cannonBlue.hidden\
    \ = true\n    cannon.addChild(cannonRed)\n    cannon.addChild(cannonGreen)\n \
    \   cannon.addChild(cannonBlue)\n    cannon.addChild(cannonBarrel)\n}\n```\n\n\
    You can see that there is now an object referred to as `cannon`, which is a property\
    \ stored in the `GameScene` class:\n\n`var cannon = SKNode()`\n\nAll the parts\
    \ of the cannon (the barrel, and the three color indicators) are now part of this\
    \ object. The `cannon` object, in turn, is part of the `gameWorld` object. This\
    \ is done by the following line of code in the `didMoveToView` method:\n\n`gameWorld.addChild(cannon)`\n\
    \nYou can also see this in Figure [6-1](#A978-1-4842-0650-8_6_Chapter.html#Fig1),\
    \ which displays the complete hierarchy of game objects in this example. It’s\
    \ useful to group objects that belong together because it makes it easier to manipulate\
    \ those objects as a whole. For example, positioning the cannon (including its\
    \ barrel and the three color indicators) can now be done with a single instruction\
    \ in the `initCannon` method, like so:\n\n![A978-1-4842-0650-8_6_Fig1_HTML.gif](A978-1-4842-0650-8_6_Fig1_HTML.gif)\n\
    \nFigure 6-1. The game object hierarchy of the Painter3 example\n\n`cannon.position\
    \ = CGPoint(x:-430, y:-280)`\n\nBecause you initialize the cannon object in a\
    \ separate method, the method that initializes the game scene (`didMoveToView`)\
    \ has now also become much easier to read:\n\n```\noverride func didMoveToView(view:\
    \ SKView) {\n    anchorPoint = CGPoint(x: 0.5, y: 0.5)\n    background.zPosition\
    \ = 0\n    gameWorld.addChild(background)\n    initCannon()\n    gameWorld.addChild(cannon)\n\
    \    initBall()\n    gameWorld.addChild(ball)\n    addChild(gameWorld)\n    delta\
    \ = NSTimeInterval(view.frameInterval) / 60\n}\n```\n\nIn Painter3, game objects\
    \ have their own initialization method, except for the background because that\
    \ is a very basic object. And as you can see, the Painter3 example contains not\
    \ only a cannon, but also a ball (which will be dealt with later in this chapter).\n\
    \n# Moving Between Local and World Coordinates\n\nOne side effect is that you\
    \ need to take into account that game objects now have different local coordinate\
    \ systems. Add the following line to the Painter3 program at the end of the `didMoveToView`\
    \ method in the `GameScene.swift` file:\n\n`print(cannonRed.position)`\n\nYou\
    \ will see that it prints the position (0, 0) to the console once the app is run.\
    \ However, the `cannonRed` node is drawn at position (-430, -280). Why? Because\
    \ that is the position of the `cannon` object. Within the `cannon` object, the\
    \ `cannonRed` node has a local position of (0, 0). So how do you get the world\
    \ position of the `cannonRed` node? You can do this by converting the local position\
    \ of `cannonRed` to the node representing the world. In this example, that node\
    \ is `gameWorld`. Replace the `print` call above with the following two lines:\n\
    \n```\nlet worldCannonRedPos = gameWorld.convertPoint(cannonRed.position, fromNode:\
    \ cannonRed)\nprint(worldCannonRedPos)\n```\n\nThe first line calls a method called\
    \ `convertPoint`. This method converts a point from a local coordinate system\
    \ to another coordinate system. The point that is converted is `cannonRed.position`.\
    \ The coordinate system from which the point is converted is the one belonging\
    \ to the `cannonRed` node. And finally, the coordinate system to which the point\
    \ is converted is the one belonging to `gameWorld`. The result of this conversion\
    \ is stored in a variable, and then printed to the screen in the second instruction.\
    \ When you run this code, you will see that now the world coordinates of the `cannonRed`\
    \ object are printed.\n\nThere are two versions of the `convertPoint` method,\
    \ one that converts from a coordinate system, and another that converts to a coordinate\
    \ system. Sometimes converting to a coordinate system can be useful, such as when\
    \ you want to handle touch input. Touch input is expressed in world coordinates.\
    \ If you want to check if the player has tapped on the cannon color indicator,\
    \ you need to convert the touch location to the local coordinate frame of the\
    \ cannon color indicator object. Here is how you do that with the `convertPoint`\
    \ method:\n\n`let localTouch: CGPoint = gameWorld.convertPoint(touchLocation,\
    \ toNode: cannonRed)`\n\nYou can then compare this local touch location with the\
    \ cannon color indicator to find out whether the player has tapped on it or not:\n\
    \n```\nif !cannonRed.frame.contains(localTouch) {\n    // rotate the cannon toward\
    \ the player touch location\n} else if hasTapped {\n    // change the cannon color\n\
    }\n```\n\nYou can see the complete code for handling the cannon input by looking\
    \ at the `handleInputCannon` method in the `GameScene.swift` file of the Painter3\
    \ example."
