    in this case? You could imagine that the compiler generates an error when it compiles
    the program. But the compiler cannot know in all cases the contents of the translator
    dictionary. Suppose that the contents of this dictionary are retrieved from a
    server when the program starts? Or that they are entered by the user when the
    program is running? The compiler simply can’t always know what is in the dictionary,
    so it cannot detect these kinds of errors. But if the compiler cannot detect it,
    what value is stored in the `carTranslated` variable if the entry doesn’t exist?
    In Swift, this is the value `nil`. The value returned by the expression `translator["car"]`
    can be `nil` in some cases. This is why the type of that expression is called
    an optional type. You can recognize an optional type by the question mark after
    its name. The type of `carTranslated` is `String?`. You can also write that when
    you declare the variable:


    `var carTranslated: String? = translator["car"]`


    Because the `carTranslated` variable is an optional, you can assign it the value
    `nil`:


    `carTranslated =` `nil`


    You can also test whether it is `nil` in an `if` instruction:


    `if carTranslated == nil {`


    `print("Translation unavailable.")`


    `}`


    Now suppose that you want to turn the result of the translation into capital letters.
    The `String` type has a property `capitalizedString` that does this. However,
    the following instruction will give a compiler error:


    `var strWithCapitals = carTranslated.capitalizedString`


    The reason that the compiler gives an error is that `carTranslated` may refer
    to `nil` instead of a string value. If that is the case, then the `capitalizedString`
    property cannot be used. In order to solve this, you can use something called
    optional chaining, as follows:


    `var strWithCapitals = carTranslated?.capitalizedString`


    Optional chaining checks if `carTranslated` is `nil`. If that is not the case,
    the result of the property is stored in `strWithCapitals`. If `carTranslated`
    is `nil`, the value `nil` is stored in `strWithCapitals`. This means that the
    `strWithCapitals` variable is itself also an optional type, `String?`.


    If you are really certain that `carTranslated` will never contain a `nil` value,
    you can also unwrap it to an actual `String` type. This is done with an exclamation
    mark:


    `var strWithCapitals = carTranslated!.capitalizedString`


    Since the assumption is that `carTranslated` is never `nil`, the type of `strWithCapitals`
    is now `String` instead of `String?`. Be careful when using this, however. If
    your program has a bug leading to `carTranslated` unexpectedly being `nil`, the
    program execution will stop with an error.


    Swift provides a nice extension of the `if` instruction to only execute a block
    of code if a value unwrap was successful:


    `if let carTranslated = translator["car"] {`


    `// do something`


    `}`


    The body of this `if` instruction is executed only if the expression `carTranslated`
    is not `nil`. If that is the case, `carTranslated` is of type `String` and contains
    the unwrapped value of `translator["car"]`. As such, the `if` instruction above
    does the same thing as the following code:


    `let carTranslatedOptional = translator["car"]`


    `if carTranslatedOptional != nil {`


    `let carTranslated = carTranslatedOptional!`


    `// do something`


    `}`


    As you can see, the combined `if` instruction with value unwrapping is a useful
    extension, leading to shorter code that is easier to read.


    Note


    Optionals and the unwrapping mechanism are features that are currently only available
    in the Swift language. Other programming languages, such as C# or Java, do not
    have these features. By dealing explicitly with optional values in the programming
    language itself, Swift forces programmers to think about whether a value is guaranteed
    or whether it sometimes doesn’t exist. So remember to think beforehand about how
    to deal with each situation when you write your code. This is a good thing because
    it leads to more robust programs. However, if you don’t carefully design your
