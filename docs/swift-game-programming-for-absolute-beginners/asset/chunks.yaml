- fmt: "## Accessing Other Objects Using Static Variables\n\nOne of the main issues\
    \ of splitting code between classes is that somehow you are going to need access\
    \ to other objects in the game. These objects (such as a ball or a paint can)\
    \ are stored as properties in a class. In order to access those properties, you\
    \ need an instance of the class, which in turn is stored somewhere else. This\
    \ leads to a large chain of objects belonging to other objects belonging to other\
    \ objects. Somehow, you need to write your code in such a way that there is a\
    \ root object, from which you access everything else.\n\nLet’s first start by\
    \ creating an object that represents the game world. In the Painter5 example,\
    \ you can see that there is a class called `GameWorld`. This class contains all\
    \ the properties related to the game world, and it makes sure that any game loop\
    \ methods are called on the objects as needed. If you can somehow make an instance\
    \ of `GameWorld` that can be accessed anywhere, then the problem of the endless\
    \ chain of objects is solved.\n\nThere are several ways in Swift to do this. One\
    \ way is to create a so-called class property (sometimes called type property).\
    \ A class property is different from a regular property in that it is not attached\
    \ to an object, but to a class. Take a look at the following simple example:\n\
    \n```\nclass Car {\n    static var nrOfCars: Int = 0\n    var nrOfSeats: Int =\
    \ 4\n    init() {\n        Car.nrOfCars++\n    }\n}\n```\n\nAs you can see, one\
    \ property (`nrOfCars`) has the keyword `static` in front of it. Now look at the\
    \ following instruction:\n\n```\nCar.nrOfCars++\n```\n\nIn order to access the\
    \ variable, you do not need an actual instance of `Car`. The property is bound\
    \ to the class itself. This also means that it doesn’t matter how many cars you\
    \ create; there will always be a single place in memory that `Car.nrOfCars` refers\
    \ to. In the `init` method, the class property `nrOfCars` is incremented. As a\
    \ result, you can now use this property to keep track of how many `Car` objects\
    \ have been created.\n\nYou can apply the class property principle to create an\
    \ instance of `GameWorld` inside the `GameScene` class:\n\n```\nstatic var world\
    \ = GameWorld()\n```\n\nSince `world` is a class property of `GameScene`, you\
    \ access it by writing `GameScene.world`. Then, once you have the instance, you\
    \ can access its properties. For example, you could write the following instruction\
