    Since the game now maintains a score, it will also have to display this score
    on the screen somehow. This means you have to draw a number on the screen. In
    order to make clear to the player that this is a score and not some random number,
    you’re also going to draw the text “Score: ” in front of the number. Swift has
    a type for representing text called `String`. Just like numbers or Booleans, strings
    are a struct in Swift. Here is an example of declaring a string variable:


    `var name = "Patrick"`


    In Swift, strings are delimited by double quote characters. When using string
    values and combining them with other variables, you have to be careful when using
    quotes. If you forget the quotes, you’re not writing text or characters anymore,
    but a piece of a Swift program! There is a big difference between the following:


    - The string `"hello"` and the variable name `hello`

    - The string `"123"` and the value `123`

    - The string value `"+"` and the operator `+`


    You use the `+` operator to combine (or concatenate) multiple strings:


    ```swift

    var string1 = "hello "

    var string2 = "world"

    var string3 = string1 + string2 // string3 now contains "hello world"

    ```


    Watch out: concatenation only makes sense when you’re dealing with text. For example,
    it isn’t possible to “concatenate” two numbers: the expression `1 + 2` results
    in `3`, not `12`. Of course, you can concatenate numbers represented as text:
    `"1" + "2"` results in `"12"`. Making the distinction between text and numbers
    is done by using double quotes. If you want to combine strings and numbers (or
    variables of another type such as Boolean) into a single string, you can use the
    special `\()` notation, like so:


    ```swift

    var age = 24

    var info = "Peter is \(age) years old"

    print(info) // prints the string "Peter is 24 years old"

    ```


    This particular feature is called string interpolation and it’s very useful in
    the Painter example for displaying the score. First, you add a label node to the
    game world:


    `var scoreLabel = SKLabelNode(fontNamed: "Chalkduster")`


    Then using string interpolation, you assign the current score to the label in
    the `updateDelta` method of `GameWorld`:


    `scoreLabel.text = "Score: \(score)"`


    Since the label is updated in every iteration of the game loop, the current score
    will now always be shown on the screen.


    ## Special Characters


    Next to the `\()` notation, there are a few other special characters in strings
    that also use the backslash symbol, such as the following:


    - `\n` for the line feed symbol

    - `\r` for the carriage return symbol (note that for a new line in an iOS string,
    you can just use `\n`)

    - `\t` for the tab symbol


    This introduces a new problem: how to indicate the backslash character itself.
    The backslash character is indicated using the double backslash. In a similar
    way, the backslash symbol is used to represent the character for the double quotes:


    - `\\` for the backslash symbol

    - `\"` for the double quote character


    For example,


    ```

    print("\"You are crazy,\" she said.") // output: "You are crazy," she said.

    ```


    ## Adding App Icons


    The final thing to add to the Painter game is an app icon. App icons are needed
    in a variety of sizes, each with a different purpose. And some icons are needed
    in several resolutions (1x, 2x, or 3x). Figure 11-1 shows a screenshot of Xcode
    showing the icons that were added for the Painter game.


    ![A978-1-4842-0650-8_11_Fig1_HTML.jpg](A978-1-4842-0650-8_11_Fig1_HTML.jpg)


    Figure 11-1. Icons in the Painter game


    Designing a high quality icon for your app is really important. The icon is what
    most people will first see when they see your game is installed on a friend’s
    device or when they look for nice games to play in the App Store. If your icon
    doesn’t stand out, people will not buy your game. As a general tip, try to keep
    your icon simple, so that people can easily recognize it. Also, avoid putting
    text on an icon, since users will probably not be able to see the text on smaller
    screens. Finally, design your app icon in a way that’s consistent with the game
    you create. If your game is very cartoon-like, then your app icon should be as
    well. If your game is very dark and moody, make sure your icon reflects this as
    well. And as with regular artwork, design your app at a high resolution, and then
    export it to scaled-down image files. There are tools available online to help
    you design and automatically export app icons in the right format, such as [http://appicontemplate.com](http://appicontemplate.com/)
    or [http://makeappicon.com](http://makeappicon.com/).


    ## A Few Final Remarks


    Congratulations—you’ve completed your first game! Figure 11-2 shows the final
    game. While developing this game, you learned many important concepts. In the
    next game, you’ll expand on the work you’ve already done. In the meantime, don’t
    forget to play the game! You’ll notice that it becomes really difficult after
    a few minutes because the paint cans come down faster and faster.


    ![A978-1-4842-0650-8_11_Fig2_HTML.jpg](A978-1-4842-0650-8_11_Fig2_HTML.jpg)


    Figure 11-2. The final version of Painter Who Plays Games?


    You might think that games are primarily played by young males, but that isn’t
    true at all. A huge percentage of people play games. In 2014 in the United States
    there were 188 million active gamers, which is more than half the total population
    (including babies). They play games on many different devices. 53% of the gamers
    play games on their smart phone and 41% play games on their wireless device (source:
    the Entertainment Software Association (ESA), 2014).


    If you develop a game, you’d better first think about the audience you want for
    it. Games for young kids are different from games for middle-aged women. The games
    should have different kinds of gameplay, different visual styles, and different
    goals.


    Although console games tend to take place in large 3D worlds, casual games on
    mobile devices are often 2D and are limited in size. Also, console games are designed
    such that they can (and need to be) played for hours and hours, whereas casual
    games are often designed to be playable in sessions of just a few minutes. There
    are also many types of serious games, which are games that are used to train professionals
    such as firefighters, mayors, and doctors. Realize that the games you like aren’t
    necessarily the games your target audience likes.


    ## What You Have Learned


    In this chapter, you have learned the following:


    - How to add music and sound effects to your game

    - How to maintain and display a score

    - How to use strings to represent and work with text


