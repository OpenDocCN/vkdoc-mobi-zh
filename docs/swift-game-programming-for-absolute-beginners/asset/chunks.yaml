- fmt: "# Using the Touch Location to Change the Game World\n\nIn the previous section,\
    \ you’ve seen how to read touch input and store a touch location in a property.\
    \ You can use that touch location to make changes to the game world. For example,\
    \ you could draw a sprite at the touch location. One of the features of the Painter\
    \ game is that it contains a cannon barrel that rotates according to the location\
    \ where the player touches the screen. This cannon is controlled by the player\
    \ in order to shoot paint balls. In this section, you will learn how to add such\
    \ a rotating cannon barrel to the game.\n\nYou have to declare a few properties\
    \ to make this possible. In any case, you will need properties for storing the\
    \ background and the cannon-barrel sprites. As you can see, the following properties\
    \ have been declared and initialized in the code:\n\n`var background = SKSpriteNode(imageNamed:\
    \ \"spr_background\")`\n\n`var cannonBarrel = SKSpriteNode(imageNamed: \"spr_cannon_barrel\"\
    )`\n\nIn the `didMoveToView` method, you need to place these objects at their\
    \ correct position, make sure that the cannon barrel is drawn on top of the background,\
    \ and add the objects to the game scene. You also need to choose the correct origin\
    \ (anchor point) for the cannon barrel because when you rotate a sprite, it will\
    \ rotate around its origin. Here are the instructions that do this:\n\n`background.zPosition\
    \ = 0`\n\n`cannonBarrel.zPosition = 1`\n\n`cannonBarrel.position = CGPoint(x:-412,\
    \ y:-220)`\n\n`cannonBarrel.anchorPoint = CGPoint(x:0.24, y:0.5)`\n\n`addChild(background)`\n\
    \n`addChild(cannonBarrel)`\n\nThe position of the barrel is chosen such that it\
    \ fits nicely on the cannon base that is already drawn on the background. The\
    \ barrel image contains a circular part with the actual barrel attached to it.\
    \ You want the barrel to rotate around the center of the circular part. That means\
    \ you have to set this center as the origin. Because the circle part is at left\
    \ on the sprite and the radius of this circle is half the height of the cannon-barrel\
    \ sprite, you set the barrel origin to `(0.24, 0.5)`, as you can see in the code.\
    \ Try changing these values in the Painter1 example to see what is happening when\
    \ you rotate the sprite.\n\nThe next step is calculating the rotation that the\
    \ cannon barrel should have depending on the touch location. Since this has to\
    \ happen every time the player moves, the best place to do this is in the `update`\
    \ method. So how do you calculate the angle? Have a look at Figure [5-1](#A978-1-4842-0650-8_5_Chapter.html#Fig1).\n\
    \n![A978-1-4842-0650-8_5_Fig1_HTML.gif](A978-1-4842-0650-8_5_Fig1_HTML.gif)\n\n\
    Figure 5-1. Calculating the angle of the barrel based on the touch location\n\n\
    If you remember your math classes, you may recall that angles in triangles can\
    \ be calculated with trigonometric functions. In this case, you can calculate\
    \ the angle using the tangent function, which is given as follows:\n\n![$$ \\\
    tan (angle)=\\frac{opposite}{adjacent} $$](A978-1-4842-0650-8_5_Chapter_TeX2GIF_Equa.gif)\n\
    \nIn other words, the angle is given by\n\n![$$ angle= \\arctan \\left(\\frac{opposite}{adjacent}\\\
    right) $$](A978-1-4842-0650-8_5_Chapter_TeX2GIF_Equb.gif)\n\nYou can calculate\
    \ the length of the opposite and adjacent sides by calculating the difference\
    \ between the touch location and the position of the cannon barrel, as follows:\n\
    \n```\nlet opposite = touchLocation.y - cannonBarrel.position.y\nlet adjacent\
    \ = touchLocation.x - cannonBarrel.position.x\n```\n\nNow you have to calculate\
    \ the arctangent using these values. How do you do this? Fortunately, Swift knows\
    \ a number of useful mathematical functions, including trigonometric functions\
    \ such as sine, cosine, and tangent, and their inverses (arcsine, arccosine, and\
    \ arctangent). There are two functions that can calculate the arctangent. The\
    \ first version takes a single value as a parameter. You can’t use this version\
    \ in this case: when the touch location is directly over the barrel, a division\
    \ by zero will occur because `adjacent` is zero.\n\nFor situations where the arctangent\
    \ needs to be calculated while taking into account possible singularities such\
    \ as this, there is an alternative arctangent function. The `atan2` function takes\
    \ opposite and adjacent lengths as separate parameters and returns the equivalent\
    \ in radians of 90 degrees in this situation. You can use this function to calculate\
    \ the angle as follows:\n\n`cannonBarrel.zRotation = atan2(opposite, adjacent)`\n\
    \nAs you can see, you rotate the cannon barrel about the z axis, which is the\
    \ axis sticking out of the screen toward the player.\n\n## Conditional Execution\
    \ Based on Touch\n\nTo further test dealing with touch input, let’s add a text\
    \ label that indicates whether or not the player is currently touching the screen.\
    \ The Painter1 example already has a property declared for that purpose:\n\n`var\
    \ touchingLabel = SKLabelNode(text:\"not touching\")`\n\nAs you can see, the label\
    \ is initialized with the text “not touching”. What you need to do is check in\
    \ the `update` method whether the `nrTouches` property contains a value larger\
    \ than zero. If that is the case, the text should be changed to “touching”. If\
    \ `nrTouches` equals zero, the text should be “not touching”. So, you need to\
    \ somehow execute instructions only if some condition is met. You can do that\
    \ with a conditional instruction, and it uses a new keyword, `if`.\n\nWith the\
    \ `if` instruction, you can provide a condition and execute a block of instructions\
    \ if this condition is true (in total, this is sometimes also referred to as a\
    \ branch). Here are some examples of conditions:\n\n- The player has touched the\
    \ screen.\n- The number of seconds that have passed since the start of the game\
    \ is larger than 1,000.\n- The cannon barrel has a rotation between 0 and 90 degrees.\n\
    - The monster has eaten your character.\n\nThese conditions can either be true\
    \ or false. A condition is an expression because it has a value (it’s either true\
    \ or false). This value is also called a Boolean value. With an `if` instruction,\
    \ you can execute a block of instructions if a condition is true. Take a look\
    \ at this example `if` instruction:\n\n```\nif nrTouches > 0 {\n    touchingLabel.text\
    \ = \"touching\"\n}\n```\n\nThe condition is written right after the `if` keyword.\
    \ A block of instructions follows, enclosed by braces. In this example, the text\
    \ of the label is changed to “touching” as soon as the number of recorded touches\
    \ is larger than 0. You can place multiple instructions between the braces if\
    \ you want:\n\n```\nif nrTouches > 0 {\n    touchingLabel.text = \"touching\"\n\
    \    let opposite = touchLocation.y - cannonBarrel.position.y\n    let adjacent\
    \ = touchLocation.x - cannonBarrel.position.x\n    cannonBarrel.zRotation = atan2(opposite,\
    \ adjacent)\n}\n```\n\nIn this example, you change the cannon rotation only if\
    \ the player is actually touching the screen. Here is another example of an `if`\
    \ instruction:\n\n```\nif nrTouches == 0 {\n    touchingLabel.text = \"not touching\"\
    \n}\n```\n\nThis instruction changes the text of the touching label to “not touching”\
    \ if the player is not touching the screen. You can also define an alternative\
    \ when you write an if instruction:\n\n```\nif nrTouches > 0 {\n    touchingLabel.text\
    \ = \"touching\"\n    let opposite = touchLocation.y - cannonBarrel.position.y\n\
    \    let adjacent = touchLocation.x - cannonBarrel.position.x\n    cannonBarrel.zRotation\
    \ = atan2(opposite, adjacent)\n} else {\n    touchingLabel.text = \"not touching\"\
    \n}\n```\n\nIn this example, if the number of touches is larger than zero, the\
    \ label text is set to “touching” and the cannon rotation is calculated. In all\
    \ other cases (if `nrTouches` is zero or smaller), the touching label text is\
    \ set to “not touching”."
  raw: '## Using the Touch Location to Change the Game World


    In the previous section, you’ve seen how to read touch input and store a touch
    location in a property. You can use that touch location to make changes to the
    game world. For example, you could draw a sprite at the touch location. One of
    the features of the Painter game is that it contains a cannon barrel that rotates
    according to the location where the player touches the screen. This cannon is
    controlled by the player in order to shoot paint balls. In this section, you will
    learn how to add such a rotating cannon barrel to the game.


    You have to declare a few properties to make this possible. In any case, you will
    need properties for storing the background and the cannon-barrel sprites. As you
    can see, the following properties have been declared and initialized in the code:


    `var background = SKSpriteNode(imageNamed: "spr_background")`


    `var cannonBarrel = SKSpriteNode(imageNamed: "spr_cannon_barrel")`


    In the `didMoveToView` method, you need to place these objects at their correct
    position, make sure that the cannon barrel is drawn on top of the background,
    and add the objects to the game scene. You also need to choose the correct origin
    (anchor point) for the cannon barrel because when you rotate a sprite, it will
    rotate around its origin. Here are the instructions that do this:


    `background.zPosition = 0`


    `cannonBarrel.zPosition = 1`


    `cannonBarrel.position = CGPoint(x:-412, y:-220)`


    `cannonBarrel.anchorPoint = CGPoint(x:0.24, y:0.5)`


    `addChild(background)`


    `addChild(cannonBarrel)`


    The position of the barrel is chosen such that it fits nicely on the cannon base
    that is already drawn on the background. The barrel image contains a circular
    part with the actual barrel attached to it. You want the barrel to rotate around
    the center of the circular part. That means you have to set this center as the
    origin. Because the circle part is at left on the sprite and the radius of this
    circle is half the height of the cannon-barrel sprite, you set the barrel origin
    to (0.24, 0.5), as you can see in the code. Try changing these values in the Painter1
    example to see what is happening when you rotate the sprite.


    The next step is calculating the rotation that the cannon barrel should have depending
    on the touch location. Since this has to happen every time the player moves, the
    best place to do this is in the `update` method. So how do you calculate the angle?
    Have a look at Figure [5-1](#A978-1-4842-0650-8_5_Chapter.html#Fig1).


    ![A978-1-4842-0650-8_5_Fig1_HTML.gif](A978-1-4842-0650-8_5_Fig1_HTML.gif)


    Figure 5-1.


    Calculating the angle of the barrel based on the touch location


    If you remember your math classes, you may recall that angles in triangles can
    be calculated with trigonometric functions. In this case, you can calculate the
    angle using the tangent function, which is given as follows:


    ![$$ \tan (angle)=\frac{opposite}{adjacent} $$](A978-1-4842-0650-8_5_Chapter_TeX2GIF_Equa.gif)


    In other words, the angle is given by


    ![$$ angle= \arctan \left(\frac{opposite}{adjacent}\right) $$](A978-1-4842-0650-8_5_Chapter_TeX2GIF_Equb.gif)


    You can calculate the length of the opposite and adjacent sides by calculating
    the difference between the touch location and the position of the cannon barrel,
    as follows:


    `let opposite = touchLocation.y - cannonBarrel.position.y`


    `let adjacent = touchLocation.x - cannonBarrel.position.x`


    Now you have to calculate the arctangent using these values. How do you do this?
    Fortunately, Swift knows a number of useful mathematical functions, including
    trigonometric functions such as sine, cosine, and tangent, and their inverses
    (arcsine, arccosine, and arctangent). There are two functions that can calculate
    the arctangent. The first version takes a single value as a parameter. You can’t
    use this version in this case: when the touch location is directly over the barrel,
    a division by zero will occur because `adjacent` is zero.


    For situations where the arctangent needs to be calculated while taking into account
    possible singularities such as this, there is an alternative arctangent function.
    The `atan2` function takes opposite and adjacent lengths as separate parameters
    and returns the equivalent in radians of 90 degrees in this situation. You can
    use this function to calculate the angle as follows:


    `cannonBarrel.zRotation = atan2(opposite, adjacent)`


    As you can see, you rotate the cannon barrel about the z axis, which is the axis
    sticking out of the screen toward the player.


    ## Conditional Execution Based on Touch


    To further test dealing with touch input, let’s add a text label that indicates
    whether or not the player is currently touching the screen. The Painter1 example
    already has a property declared for that purpose:


    `var touchingLabel = SKLabelNode(text:"not touching")`


    As you can see, the label is initialized with the text “not touching”. What you
    need to do is check in the `update` method whether the `nrTouches` property contains
    a value larger than zero. If that is the case, the text should be changed to “touching”.
    If `nrTouches` equals zero, the text should be “not touching”. So, you need to
    somehow execute instructions only if some condition is met. You can do that with
    a conditional instruction, and it uses a new keyword, `if`.


    With the `if` instruction, you can provide a condition and execute a block of
    instructions if this condition is true (in total, this is sometimes also referred
    to as a branch). Here are some examples of conditions:


    *   The player has touched the screen.

    *   The number of seconds that have passed since the start of the game is larger
    than 1,000.

    *   The cannon barrel has a rotation between 0 and 90 degrees.

    *   The monster has eaten your character.


    These conditions can either be true or false. A condition is an expression because
    it has a value (it’s either true or false). This value is also called a Boolean
    value. With an `if` instruction, you can execute a block of instructions if a
    condition is true. Take a look at this example `if` instruction:


    `if nrTouches > 0 {`


        `touchingLabel.text = "touching"`


    `}`


    The condition is written right after the `if` keyword. A block of instructions
    follows, enclosed by braces. In this example, the text of the label is changed
    to “touching” as soon as the number of recorded touches is larger than 0\. You
    can place multiple instructions between the braces if you want:


    `if nrTouches > 0 {`


        `touchingLabel.text = "touching"`


        `let opposite = touchLocation.y - cannonBarrel.position.y`


        `let adjacent = touchLocation.x - cannonBarrel.position.x`


        `cannonBarrel.zRotation = atan2(opposite, adjacent)`


    `}`


    In this example, you change the cannon rotation only if the player is actually
    touching the screen. Here is another example of an `if` instruction:


    `if nrTouches == 0 {`


        `touchingLabel.text = "not touching"`


    `}`


    This instruction changes the text of the touching label to “not touching” if the
    player is not touching the screen. You can also define an alternative when you
    write an if instruction:


    `if nrTouches > 0 {`


        `touchingLabel.text = "touching"`


        `let opposite = touchLocation.y - cannonBarrel.position.y`


        `let adjacent = touchLocation.x - cannonBarrel.position.x`


        `cannonBarrel.zRotation = atan2(opposite, adjacent)`


    `} else {`


        `touchingLabel.text = "not touching"`


    `}`


    In this example, if the number of touches is larger than zero, the label text
    is set to “touching” and the cannon rotation is calculated. In all other cases
    (if `nrTouches` is zero or smaller), the touching label text is set to “not touching”.'
  trans: "\n# 利用触摸位置改变游戏世界\n\n在上一节中，你已经了解了如何读取触摸输入并将触摸位置存储到属性中。你可以利用这个触摸位置来对游戏世界做出改变。例如，你可以根据触摸位置绘制一个精灵。Painter\
    \ 游戏的特点之一是包含一个可旋转的炮管，它会根据玩家触摸屏幕的位置进行旋转。这个炮管由玩家控制，用于发射油漆球。在本节中，你将学习如何为游戏添加这样一个可旋转的炮管。\n\
    \n要实现这一功能，你需要声明几个属性。无论如何，你都需要用属性来存储背景和炮管精灵。如下所示，代码中已经声明并初始化了以下属性：\n\n`var background\
    \ = SKSpriteNode(imageNamed: \"spr_background\")`\n\n`var cannonBarrel = SKSpriteNode(imageNamed:\
    \ \"spr_cannon_barrel\")`\n\n在 `didMoveToView` 方法中，你需要将这些对象放置到正确的位置，确保炮管绘制在背景之上，并将这些对象添加到游戏场景中。你还需要为炮管选择正确的原点（锚点），因为旋转精灵时，它会围绕其原点旋转。以下是实现这一功能的指令：\n\
    \n`background.zPosition = 0`\n\n`cannonBarrel.zPosition = 1`\n\n`cannonBarrel.position\
    \ = CGPoint(x:-412, y:-220)`\n\n`cannonBarrel.anchorPoint = CGPoint(x:0.24, y:0.5)`\n\
    \n`addChild(background)`\n\n`addChild(cannonBarrel)`\n\n炮管的位置经过精心选择，使其能够完美契合已经绘制在背景上的炮座。炮管图片包含一个圆形部分，实际的炮管附着其上。你希望炮管围绕该圆形部分的中心旋转。这意味着你必须将这个中心点设置为原点。由于圆形部分位于精灵的左侧，且该圆的半径是炮管精灵高度的一半，因此你将炮管原点设置为\
    \ `(0.24, 0.5)`，正如你在代码中看到的那样。你可以尝试在 Painter1 示例中更改这些值，以观察旋转精灵时会发生什么。\n\n下一步是计算炮管根据触摸位置应具有的旋转角度。由于每次玩家移动时都需要执行此操作，因此最好的实现位置是在\
    \ `update` 方法中。那么如何计算这个角度呢？请看图 5-1。\n\n![A978-1-4842-0650-8_5_Fig1_HTML.gif](img/A978-1-4842-0650-8_5_Fig1_HTML.gif)\n\
    \n图 5-1. 根据触摸位置计算炮管角度\n\n如果你还记得数学课上学过的知识，可能会回忆起三角形中的角度可以用三角函数来计算。在这种情况下，你可以使用正切函数来计算角度，公式如下：\n\
    \n![$$ \\tan (angle)=\\frac{opposite}{adjacent} $$](img/A978-1-4842-0650-8_5_Chapter_TeX2GIF_Equa.gif)\n\
    \n换句话说，角度由下式给出：\n\n![$$ angle= \\arctan \\left(\\frac{opposite}{adjacent}\\right)\
    \ $$](img/A978-1-4842-0650-8_5_Chapter_TeX2GIF_Equb.gif)\n\n你可以通过计算触摸位置与炮管位置之间的差值，来得到对边和邻边的长度，如下所示：\n\
    \n```\nlet opposite = touchLocation.y - cannonBarrel.position.y\nlet adjacent\
    \ = touchLocation.x - cannonBarrel.position.x\n```\n\n现在你需要使用这些值来计算反正切。该怎么做呢？幸运的是，Swift\
    \ 拥有许多有用的数学函数，包括正弦、余弦、正切等三角函数，以及它们的反函数（反正弦、反余弦和反正切）。有两个函数可以计算反正切。第一个版本接受一个单一值作为参数。但在本例中，你不能使用这个版本：当触摸位置正好位于炮管正上方时，`adjacent`\
    \ 为零，会导致除以零的错误。\n\n针对需要计算反正切并考虑此类可能奇点的情况，有一个替代的反正切函数。`atan2` 函数将对边和邻边长度作为单独的参数，并在这种情况下返回相当于\
    \ 90 度的弧度值。你可以使用此函数来计算角度，如下所示：\n\n`cannonBarrel.zRotation = atan2(opposite, adjacent)`\n\
    \n如你所见，你让炮管绕 z 轴旋转，该轴是从屏幕指向玩家的方向。\n\n## 基于触摸的条件执行\n\n为了进一步测试触摸输入的处理，我们来添加一个文本标签，用于指示玩家当前是否正在触摸屏幕。Painter1\
    \ 示例中已经为此声明了一个属性：\n\n`var touchingLabel = SKLabelNode(text:\"not touching\")`\n\
    \n如你所见，该标签被初始化为文本“not touching”。你需要做的是在 `update` 方法中检查 `nrTouches` 属性的值是否大于零。如果是，则应将文本更改为“touching”。如果\
    \ `nrTouches` 等于零，则文本应为“not touching”。因此，你需要设法仅在满足某些条件时才执行指令。你可以通过条件指令来实现这一点，它使用了一个新关键字\
    \ `if`。\n\n使用 `if` 指令，你可以提供一个条件，并在该条件为真时执行一组指令（整体而言，这也被称为**分支**）。以下是一些条件的示例：\n\
    \n- 玩家已触摸屏幕。\n- 自游戏开始以来经过的秒数大于 1,000。\n- 炮管的旋转角度在 0 到 90 度之间。\n- 怪物吃掉了你的角色。\n\n\
    这些条件要么为真，要么为假。条件是一个表达式，因为它具有一个值（要么为真，要么为假）。这个值也被称为**布尔值**。使用 `if` 指令，你可以在条件为真时执行一组指令。请看下面这个\
    \ `if` 指令示例：\n\n```\nif nrTouches > 0 {\n    touchingLabel.text = \"touching\"\
    \n}\n```\n\n条件紧跟在 `if` 关键字之后。后面跟着一组由花括号括起来的指令。在这个例子中，一旦记录的触摸次数大于 0，标签的文本就被更改为“touching”。如果愿意，你还可以在花括号中放置多条指令：\n\
    \n```\nif nrTouches > 0 {\n    touchingLabel.text = \"touching\"\n    let opposite\
    \ = touchLocation.y - cannonBarrel.position.y\n    let adjacent = touchLocation.x\
    \ - cannonBarrel.position.x\n    cannonBarrel.zRotation = atan2(opposite, adjacent)\n\
    }\n```\n\n在这个例子中，只有当玩家实际触摸屏幕时，你才改变炮管的旋转角度。下面是另一个 `if` 指令的示例：\n\n```\nif nrTouches\
    \ == 0 {\n    touchingLabel.text = \"not touching\"\n}\n```\n\n这条指令会在玩家未触摸屏幕时将触摸标签的文本更改为“not\
    \ touching”。你还可以在编写 `if` 指令时定义一个替代情况：\n\n```\nif nrTouches > 0 {\n    touchingLabel.text\
    \ = \"touching\"\n    let opposite = touchLocation.y - cannonBarrel.position.y\n\
    \    let adjacent = touchLocation.x - cannonBarrel.position.x\n    cannonBarrel.zRotation\
    \ = atan2(opposite, adjacent)\n} else {\n    touchingLabel.text = \"not touching\"\
    \n}\n```\n\n在这个例子中，如果触摸次数大于零，标签文本被设置为“touching”，并计算炮管的旋转角度。在所有其他情况（如果 `nrTouches`\
    \ 等于零或更小）下，触摸标签文本被设置为“not touching”。\n"
- fmt: "# Testing for Alternatives\n\nWhen there are multiple categories of values,\
    \ you can find out with `if` instructions which case you’re dealing with. The\
    \ second test is placed after the `else` of the first `if` instruction so that\
    \ the second test is executed only when the first test fails. A third test could\
    \ be placed after the `else` of the second `if` instruction, and so forth.\n\n\
    The following fragment determines how well the player scored, so that you can\
    \ display different messages to the player:\n\n```\nif score < 100 {\n    print(\"\
    Ouch, you definitely need to play more!\")\n} else if score < 500 {\n    print(\"\
    Good job, well done.\")\n} else if score < 1000 {\n    print(\"Very nice score!\"\
    )\n} else {\n    print(\"Awesome, you are indestructible!\")\n}\n```\n\nAfter\
    \ every `else` (except the last one) is another `if` instruction. If the player\
    \ scored very low (less than 100 points), a message (“Ouch...”) is displayed and\
    \ the rest of the instructions are ignored (they’re after the `else`, after all).\
    \ Better players, on the other hand, go through all the tests (less than 500?\
    \ less than 1000?) before you conclude that the player got a very high score.\n\
    \nI used indentation in this fragment to indicate which `else` belongs to which\
    \ `if`. When there are many different categories, the text of the program becomes\
    \ less and less readable. Therefore, as an exception to the usual rule that instructions\
    \ after the `else` should be indented, you can use a simpler layout with such\
    \ complicated `if` instructions:\n\n```\nif score < 100 {\n    print(\"Ouch, you\
    \ definitely need to play more!\")\n} else if score < 500 {\n    print(\"Good\
    \ job, well done.\")\n} else if score < 1000 {\n    print(\"Very nice score!\"\
    )\n} else {\n    print(\"Awesome, you are indestructible!\")\n}\n```\n\nThe additional\
    \ advantage here is that using this layout, it’s a lot easier to see which cases\
    \ are handled by the instructions. In addition to the `if` instruction, there\
    \ is an instruction called `switch` that is better suited for dealing with many\
    \ different alternatives. See [Chapter 19](#A978-1-4842-0650-8_19_Chapter.html)\
    \ for more information about how to use `switch`.\n\nThe syntax of the `if` instruction\
    \ with an alternative is represented by the syntax diagram in Figure [5-2](#A978-1-4842-0650-8_5_Chapter.html#Fig2).\
    \ The body of an `if` instruction consists of one or more instructions between\
    \ braces because the body is a block of instructions, as defined in the syntax\
    \ diagram in Figure [5-3](#A978-1-4842-0650-8_5_Chapter.html#Fig3). After the\
    \ `else` keyword, an arrow goes back to the `if` keyword to allow defining a chain\
    \ of alternatives, as explained previously in this section.\n\n![A978-1-4842-0650-8_5_Fig3_HTML.gif](A978-1-4842-0650-8_5_Fig3_HTML.gif)\n\
    \nFigure 5-3. Syntax diagram of a block of instructions\n\n![A978-1-4842-0650-8_5_Fig2_HTML.gif](A978-1-4842-0650-8_5_Fig2_HTML.gif)\n\
    \nFigure 5-2. Syntax diagram of the `if` instruction\n\n# Comparison Operators\n\
    \nThe condition in the header of an `if` instruction is an expression that returns\
    \ a truth value: true or false. When the outcome of the expression is true, the\
    \ body of the `if` instruction is executed. In these conditions, you’re allowed\
    \ to use comparison operators. The following operators are available:\n\n- `<`\
    \ (less than)\n- `<=` (less than or equal to)\n- `>` (greater than)\n- `>=` (greater\
    \ than or equal to)\n- `==` (equal to)\n- `!=` (not equal to)\n\nThese operators\
    \ may be used between any two values. On the left side and the right side of these\
    \ operators, you may put constant values, variables, or complete expressions with\
    \ addition, multiplication, or whatever you want. You test the equality of two\
    \ values using a double equals sign (`==`). This is very different from a single\
    \ equals sign, which denotes an assignment. The difference between these two operators\
    \ is very important:\n\n`x = 5` means Assign the value 5 to `x`.  \n`x == 5` means\
    \ Is `x` equal to 5?\n\n# Logic Operators\n\nIn logical terms, a condition is\
    \ also called a predicate. The operators that are used in logic to connect predicates\
    \ (and, or, and not) can also be used in Swift. They have a special notation:\n\
    \n- `&&` is the logical and operator.\n- `||` is the logical or operator.\n- `!`\
    \ is the logical not operator.\n\nYou can use these operators to check for complicated\
    \ logical statements so that you can execute instructions only in very particular\
    \ cases. For example, you can display a “You win!” message only if the player\
    \ has more than 10,000 points, the enemy has a life force of 0, and the player’s\
    \ life force is greater than 0:\n\n```\nif playerPoints > 10000 && enemyLifeForce\
    \ == 0 && playerLifeForce > 0 {\n    print(\"You win!\")\n}\n```"
  raw: '## Testing for Alternatives


    When there are multiple categories of values, you can find out with `if` instructions
    which case you’re dealing with. The second test is placed after the `else` of
    the first `if` instruction so that the second test is executed only when the first
    test fails. A third test could be placed after the `else` of the second `if` instruction,
    and so forth.


    The following fragment determines how well the player scored, so that you can
    display different messages to the player:


    `if score < 100 {`


        `print("Ouch, you definitely need to play more!")`


    `} else if score < 500 {`


               `print("Good job, well done.")`


           `} else if score < 1000 {`


                      `print("Very nice score!")`


                  `} else {`


                      `print("Awesome, you are indestructible!")`


                  `}`


    After every `else` (except the last one) is another `if` instruction. If the player
    scored very low (less than 100 points), a message (“Ouch...”) is displayed and
    the rest of the instructions are ignored (they’re after the `else`, after all).
    Better players, on the other hand, go through all the tests (less than 500? less
    than 1000?) before you conclude that the player got a very high score.


    I used indentation in this fragment to indicate which `else` belongs to which
    `if`. When there are many different categories, the text of the program becomes
    less and less readable. Therefore, as an exception to the usual rule that instructions
    after the `else` should be indented, you can use a simpler layout with such complicated
    `if` instructions:


    `if score < 100 {`


        `print("Ouch, you definitely need to play more!")`


    `} else if score < 500 {`


        `print("Good job, well done.")`


    `} else if score < 1000 {`


        `print("Very nice score!")`


    `} else {`


        `print("Awesome, you are indestructible!")`


    `}`


    The additional advantage here is that using this layout, it’s a lot easier to
    see which cases are handled by the instructions. In addition to the `if` instruction,
    there is an instruction called `switch` that is better suited for dealing with
    many different alternatives. See [Chapter 19](#A978-1-4842-0650-8_19_Chapter.html)
    for more information about how to use `switch`.


    The syntax of the `if` instruction with an alternative is represented by the syntax
    diagram in Figure [5-2](#A978-1-4842-0650-8_5_Chapter.html#Fig2). The body of
    an `if` instruction consists of one or more instructions between braces because
    the body is a block of instructions, as defined in the syntax diagram in Figure
    [5-3](#A978-1-4842-0650-8_5_Chapter.html#Fig3). After the `else` keyword, an arrow
    goes back to the `if` keyword to allow defining a chain of alternatives, as explained
    previously in this section.


    ![A978-1-4842-0650-8_5_Fig3_HTML.gif](A978-1-4842-0650-8_5_Fig3_HTML.gif)


    Figure 5-3.


    Syntax diagram of a block of instructions


    ![A978-1-4842-0650-8_5_Fig2_HTML.gif](A978-1-4842-0650-8_5_Fig2_HTML.gif)


    Figure 5-2.


    Syntax diagram of the `if` instruction


    ## Comparison Operators


    The condition in the header of an `if` instruction is an expression that returns
    a truth value: true or false. When the outcome of the expression is true, the
    body of the `if` instruction is executed. In these conditions, you’re allowed
    to use comparison operators. The following operators are available:


    *   `<` (less than)

    *   `<=` (less than or equal to)

    *   `>` (greater than)

    *   `>=` (greater than or equal to)

    *   `==` (equal to)

    *   `!=` (not equal to)


    These operators may be used between any two values. On the left side and the right
    side of these operators, you may put constant values, variables, or complete expressions
    with addition, multiplication, or whatever you want. You test the equality of
    two values using a double equals sign (`==`). This is very different from a single
    equals sign, which denotes an assignment. The difference between these two operators
    is very important:


    `x = 5` means Assign the value 5 to `x`.


    `x == 5` means Is `x` equal to 5?


    ## Logic Operators


    In logical terms, a condition is also called a predicate. The operators that are
    used in logic to connect predicates (and, or, and not) can also be used in Swift.
    They have a special notation:


    *   `&&` is the logical and operator.

    *   `||` is the logical or operator.

    *   `!` is the logical not operator.


    You can use these operators to check for complicated logical statements so that
    you can execute instructions only in very particular cases. For example, you can
    display a “You win!” message only if the player has more than 10,000 points, the
    enemy has a life force of 0, and the player’s life force is greater than 0:


    `if playerPoints > 10000 && enemyLifeForce == 0 && playerLifeForce > 0 {`


        `print("You win!")`


    `}`'
  trans: "\n# 判断备选情况\n\n当存在多个值类别时，可以通过`if`指令判断当前属于哪种情况。第二个测试放在第一个`if`指令的`else`之后，这样只有当第一个测试失败时，才会执行第二个测试。第三个测试可以放在第二个`if`指令的`else`之后，以此类推。\n\
    \n以下代码片段用于判断玩家得分等级，以便显示不同的消息：\n\n```\nif score < 100 {\n    print(\"哎呀，你绝对需要多练练！\"\
    )\n} else if score < 500 {\n    print(\"干得好，表现不错。\")\n} else if score < 1000 {\n\
    \    print(\"非常高的分数！\")\n} else {\n    print(\"太棒了，你简直无敌！\")\n}\n```\n\n每个`else`（最后一个除外）后面都跟着另一个`if`指令。如果玩家得分非常低（低于\
    \ 100 分），会显示一条消息（“哎呀...”），其余指令将被忽略（它们毕竟位于`else`之后）。而表现较好的玩家则会依次通过所有测试（是否低于 500\
    \ 分？是否低于 1000 分？），最终得出玩家获得高分的结论。\n\n我在代码片段中使用了缩进来表明哪个`else`属于哪个`if`。当存在多个不同类别时，程序代码的可读性会越来越差。因此，作为`else`后指令应缩进这一常规规则的例外，对于这种复杂的`if`指令，你可以使用更简洁的布局：\n\
    \n```\nif score < 100 {\n    print(\"哎呀，你绝对需要多练练！\")\n} else if score < 500 {\n\
    \    print(\"干得好，表现不错。\")\n} else if score < 1000 {\n    print(\"非常高的分数！\")\n\
    } else {\n    print(\"太棒了，你简直无敌！\")\n}\n```\n\n这种布局的另一个优势在于，能更轻松地看出指令处理了哪些情况。除了`if`指令，还有一种名为`switch`的指令，更适合处理多种备选情况。关于如何使用`switch`，请参阅第\
    \ 19 章。\n\n带备选情况的`if`指令的语法如图 5-2 的语法图所示。`if`指令的主体由花括号内的一个或多个指令组成，因为主体是一个指令块，其定义见图\
    \ 5-3 的语法图。在`else`关键字之后，有一个箭头指回`if`关键字，以便定义备选链，正如本节前面所解释的。\n\n![A978-1-4842-0650-8_5_Fig3_HTML.gif](img/A978-1-4842-0650-8_5_Fig3_HTML.gif)\n\
    \n图 5-3. 指令块的语法图\n\n![A978-1-4842-0650-8_5_Fig2_HTML.gif](img/A978-1-4842-0650-8_5_Fig2_HTML.gif)\n\
    \n图 5-2. `if`指令的语法图\n\n# 比较运算符\n\n`if`指令头部中的条件是一个返回真值的表达式：真或假。当表达式的结果为真时，将执行`if`指令的主体。在这些条件中，你可以使用比较运算符。以下是可用的运算符：\n\
    \n- `<`（小于）\n- `<=`（小于或等于）\n- `>`（大于）\n- `>=`（大于或等于）\n- `==`（等于）\n- `!=`（不等于）\n\
    \n这些运算符可以用于任意两个值之间。在这些运算符的左侧和右侧，你可以放置常量值、变量，或者包含加法、乘法等的完整表达式。测试两个值是否相等时使用双等号（`==`）。这与表示赋值的单等号截然不同。这两个运算符之间的区别非常重要：\n\
    \n`x = 5` 表示将值 5 赋给`x`。  \n`x == 5` 表示判断`x`是否等于 5？\n\n# 逻辑运算符\n\n在逻辑术语中，条件也称为谓词。Swift\
    \ 中也可以使用逻辑中连接谓词的运算符（与、或、非）。它们有特殊的表示法：\n\n- `&&` 是逻辑与运算符。\n- `||` 是逻辑或运算符。\n- `!`\
    \ 是逻辑非运算符。\n\n你可以使用这些运算符来检查复杂的逻辑语句，从而仅在特定情况下执行指令。例如，只有当玩家拥有超过 10,000 分、敌人生命值为\
    \ 0 且玩家生命值大于 0 时，才显示“你赢了！”消息：\n\n```\nif playerPoints > 10000 && enemyLifeForce\
    \ == 0 && playerLifeForce > 0 {\n    print(\"你赢了！\")\n}\n```\n"
- fmt: "# The Boolean Type\n\nExpressions that use comparison operators or that connect\
    \ other expressions with logical operators also have a type, just like expressions\
    \ that use arithmetic operators. After all, the result of such an expression is\
    \ a value, one of the two truth values of `true` or `false`. In Swift, these truth\
    \ values are represented by the `true` and `false` keywords.\n\nIn addition to\
    \ being used to express a condition in an `if` instruction, logical expressions\
    \ can be applied in a lot of different situations. A logical expression is similar\
    \ to an arithmetic expression, except that it has a different type. For example,\
    \ you can store the result of a logical expression in a variable, pass it as a\
    \ parameter, or use that result again in another expression.\n\nThe type of truth\
    \ values is `Bool` (or Boolean), named after the English mathematician and philosopher\
    \ George Boole (1815–1864). Here is an example of a declaration and an assignment\
    \ of a Boolean variable:\n\n```\nvar test: Bool\ntest = x > 3 && y < 5\n```\n\n\
    In this case, if `x` contains, for example, the value 6 and `y` contains the value\
    \ 3, the Boolean expression `x > 3 && y < 5` will evaluate to `true` and this\
    \ value will be stored in the variable `test`. You can also store the Boolean\
    \ values `true` and `false` directly in a variable:\n\n```\nvar isAlive: Bool\
    \ = false\n```\n\nBoolean variables are extremely handy for storing the status\
    \ of different objects in a game. For example, you can use a Boolean variable\
    \ to store whether the player is still alive, whether the player is currently\
    \ jumping, whether a level is finished, and so on. You can use Boolean variables\
    \ as an expression in an `if` instruction, like so:\n\n```\nif isAlive {\n   \
    \ // do something\n}\n```\n\nIn this case, if the expression `isAlive` evaluates\
    \ to `true`, the body of the `if` instruction is executed. You might think this\
    \ code would generate a compiler error and you need to do a comparison of the\
    \ Boolean variable, like this:\n\n```\nif isAlive == true {\n    // do something\n\
    }\n```\n\nHowever, this extra comparison isn’t necessary. A conditional expression\
    \ as in the `if` instruction must evaluate to `true` or `false`. Because a Boolean\
    \ variable already represents one of these two values, you don’t need to perform\
    \ the comparison.\n\nYou can use the Boolean type to store complex expressions\
    \ that are either `true` or `false`. Let’s look at a few additional examples:\n\
    \n```\nvar a = 12 > 5\nvar b = a && 3 + 4 == 8\nvar c = a || b\nif !c {\n    a\
    \ = false\n}\n```\n\nBefore you read on, try to determine the value of the variables\
    \ `a`, `b`, and `c` after these instructions have been executed. In the first\
    \ line, you declare and initialize a Boolean `a`. The truth value that is stored\
    \ in this Boolean is evaluated from the expression `12 > 5`, which evaluates to\
    \ `true`. This value is then assigned to variable `a`. In the second line, you\
    \ declare and initialize a new variable `b`, in which you store the result of\
    \ a more complex expression. The first part of this expression is the variable\
    \ `a`, which contains the value `true`. The second part of the expression is a\
    \ comparison expression `3 + 4 == 8`. This comparison is not true (3 + 4 doesn’t\
    \ equal 8), so this evaluates to `false`, and therefore the logical and also results\
    \ in `false`. Therefore, the variable `b` contains the value `false` after this\
    \ instruction executes.\n\nThe third instruction stores the result of the logical\
    \ or operation on variables `a` and `b` in variable `c`. Because `a` contains\
    \ the value `true`, the outcome of this operation is also `true`, and this outcome\
    \ is assigned to `c`. Finally, there is an `if` instruction, which assigns the\
    \ value `false` to variable `a`, but only if `!c` evaluates to `true`. In this\
    \ case, `c` is `true`, so `!c` is `false`, which means the body of the `if` instruction\
    \ is not executed. Therefore, after all the instructions are executed, `a` and\
    \ `c` both contain the value `true`, and `b` contains the value `false`.\n\nDoing\
    \ these kinds of exercises shows that it’s very easy to make logical mistakes.\
    \ This process is similar to what you do when you debug your code. Step by step,\
    \ you move through the instructions and determine the values of the variables\
    \ at various stages. A single mix-up can cause something you assume to be `true`\
    \ to evaluate to `false`!\n\n# Changing the Color of the Cannon\n\nIn the previous\
    \ sections, you saw how to use the `if` instruction to check whether the player\
    \ has touched the screen. Now, let’s extend the program so that tapping in the\
    \ center of the cannon barrel changes the color of the paint ball that the cannon\
    \ can shoot. You can see this behavior by running the Painter2 example belonging\
    \ to this chapter.\n\nTo program this behavior, you are going to need three extra\
    \ sprites, one for each color. If you open the `Images.xcassets` folder in the\
    \ Painter2 project in Xcode, you see these three extra sprites appearing in the\
    \ list. In the `GameScene` class, you add properties to refer to these sprites,\
    \ as follows:\n\n```\nvar cannonRed = SKSpriteNode(imageNamed: \"spr_cannon_red\"\
    )\nvar cannonGreen = SKSpriteNode(imageNamed: \"spr_cannon_green\")\nvar cannonBlue\
    \ = SKSpriteNode(imageNamed: \"spr_cannon_blue\")\n```\n\nThese sprites should\
    \ be at the same position as the cannon barrel (which has its origin set to the\
    \ center of the rotating disc):\n\n```\ncannonRed.position = cannonBarrel.position\n\
    cannonGreen.position = cannonBarrel.position\ncannonBlue.position = cannonBarrel.position\n\
    ```\n\nYou also have to make sure that these sprites are drawn on top of the barrel,\
    \ and not behind it. To achieve this, you set their z position to a value higher\
    \ than that of the cannon barrel (which has a z position of 1):\n\n```\ncannonRed.zPosition\
    \ = 2\ncannonGreen.zPosition = 2\ncannonBlue.zPosition = 2\n```\n\nThe issue is\
    \ that you don’t want to draw all three of these sprites but just one of them,\
    \ depending on the current paint color that the cannon will be shooting. For that,\
    \ you can use the `hidden` property that each (sprite) node has in the SpriteKit\
    \ framework. Initially, you hide the `cannonGreen` and `cannonBlue` sprites:\n\
    \n```\ncannonGreen.hidden = true\ncannonBlue.hidden = true\n```\n\nNow, only the\
    \ `cannonRed` sprite is going to be drawn on the screen. Of course, the sprites\
    \ need to be added to the scene in order for this to work correctly:\n\n```\n\
    addChild(cannonRed)\naddChild(cannonGreen)\naddChild(cannonBlue)\n```\n\nThe next\
    \ step is dealing with the player tapping in the center of the cannon barrel disc\
    \ to change the color that the cannon should shoot. One challenge that you have\
    \ to address is how to detect a tap. Until now, the program only stores a touch\
    \ location. There is no way to know whether the player has just placed his/her\
    \ finger on the screen or whether he/she has been touching that same spot on the\
    \ screen for multiple seconds. A very simply solution is to add an extra variable\
    \ that maintains whether the player has just tapped or not. This variable is of\
    \ type `Bool`, and you initially set it to `false`:\n\n```\nvar hasTapped: Bool\
    \ = false\n```\n\nNow whenever the player starts touching the screen, you set\
    \ this property to `true`. This is done in the `touchesBegan` method:\n\n```\n\
    override func touchesBegan(touches: Set<UITouch>, withEvent event: UIEvent?) {\n\
    \    let touch = touches.first!\n    touchLocation = touch.locationInNode(self)\n\
    \    nrTouches = nrTouches + touches.count\n    hasTapped = true\n}\n```\n\nIn\
    \ order to process only a single tap, you need to reset this property to `false`\
    \ again at the end of the `update` method. That way, when the player starts touching\
    \ the screen, the `hasTapped` property becomes `true` and you can deal with it\
    \ in the `update` method, after which the property immediately becomes `false`\
    \ again."
  raw: '## The Boolean Type


    Expressions that use comparison operators or that connect other expressions with
    logical operators also have a type, just like expressions that use arithmetic
    operators. After all, the result of such an expression is a value, one of the
    two truth values of true or false. In Swift, these truth values are represented
    by the `true` and `false` keywords.


    In addition to being used to express a condition in an `if` instruction, logical
    expressions can be applied in a lot of different situations. A logical expression
    is similar to an arithmetic expression, except that it has a different type. For
    example, you can store the result of a logical expression in a variable, pass
    it as a parameter, or use that result again in another expression.


    The type of truth values is `Bool` (or Boolean), named after the English mathematician
    and philosopher George Boole (1815–1864). Here is an example of a declaration
    and an assignment of a Boolean variable:


    `var test: Bool`


    `test = x > 3 && y < 5`


    In this case, if `x` contains, for example, the value 6 and `y` contains the value
    3, the Boolean expression `x > 3 && y < 5` will evaluate to `true` and this value
    will be stored in the variable `test`. You can also store the Boolean values `true`
    and `false` directly in a variable:


    `var isAlive: Bool = false`


    Boolean variables are extremely handy for storing the status of different objects
    in a game. For example, you can use a Boolean variable to store whether the player
    is still alive, whether the player is currently jumping, whether a level is finished,
    and so on. You can use Boolean variables as an expression in an `if` instruction,
    like so:


    `if isAlive {`


    `// do something`


    `}`


    In this case, if the expression `isAlive` evaluates to `true`, the body of the
    `if` instruction is executed. You might think this code would generate a compiler
    error and you need to do a comparison of the Boolean variable, like this:


    `if isAlive == true {`


    `// do something`


    `}`


    However, this extra comparison isn’t necessary. A conditional expression as in
    the `if` instruction must evaluate to `true` or `false`. Because a Boolean variable
    already represents one of these two values, you don’t need to perform the comparison.


    You can use the Boolean type to store complex expressions that are either `true`
    or `false`. Let’s look at a few additional examples:


    `var a = 12 > 5`


    `var b = a && 3 + 4 == 8`


    `var c = a || b`


    `if !c {`


    `a = false`


    `}`


    Before you read on, try to determine the value of the variables `a`, `b`, and
    `c` after these instructions have been executed. In the first line, you declare
    and initialize a Boolean `a`. The truth value that is stored in this Boolean is
    evaluated from the expression `12 > 5`, which evaluates to `true`. This value
    is then assigned to variable `a`. In the second line, you declare and initialize
    a new variable `b`, in which you store the result of a more complex expression.
    The first part of this expression is the variable `a`, which contains the value
    `true`. The second part of the expression is a comparison expression `3 + 4 ==
    8`. This comparison is not true (3 + 4 doesn’t equal 8), so this evaluates to
    `false`, and therefore the logical and also results in `false`. Therefore, the
    variable `b` contains the value `false` after this instruction executes.


    The third instruction stores the result of the logical or operation on variables
    `a` and `b` in variable `c`. Because `a` contains the value `true`, the outcome
    of this operation is also `true`, and this outcome is assigned to `c`. Finally,
    there is an `if` instruction, which assigns the value `false` to variable `a`,
    but only if `!c` evaluates to `true`. In this case, `c` is `true`, so `!c` is
    `false`, which means the body of the `if` instruction is not executed. Therefore,
    after all the instructions are executed, `a` and `c` both contain the value `true`,
    and `b` contains the value `false`.


    Doing these kinds of exercises shows that it’s very easy to make logical mistakes.
    This process is similar to what you do when you debug your code. Step by step,
    you move through the instructions and determine the values of the variables at
    various stages. A single mix-up can cause something you assume to be `true` to
    evaluate to `false`!


    ## Changing the Color of the Cannon


    In the previous sections, you saw how to use the `if` instruction to check whether
    the player has touched the screen. Now, let’s extend the program so that tapping
    in the center of the cannon barrel changes the color of the paint ball that the
    cannon can shoot. You can see this behavior by running the Painter2 example belonging
    to this chapter.


    To program this behavior, you are going to need three extra sprites, one for each
    color. If you open the `Images.xcassets` folder in the Painter2 project in Xcode,
    you see these three extra sprites appearing in the list. In the `GameScene` class,
    you add properties to refer to these sprites, as follows:


    `var cannonRed = SKSpriteNode(imageNamed: "spr_cannon_red")`


    `var cannonGreen = SKSpriteNode(imageNamed: "spr_cannon_green")`


    `var cannonBlue = SKSpriteNode(imageNamed: "spr_cannon_blue")`


    These sprites should be at the same position as the cannon barrel (which has its
    origin set to the center of the rotating disc):


    `cannonRed.position = cannonBarrel.position`


    `cannonGreen.position = cannonBarrel.position`


    `cannonBlue.position = cannonBarrel.position`


    You also have to make sure that these sprites are drawn on top of the barrel,
    and not behind it. To achieve this, you set their z position to a value higher
    than that of the cannon barrel (which has a z position of 1):


    `cannonRed.zPosition = 2`


    `cannonGreen.zPosition = 2`


    `cannonBlue.zPosition = 2`


    The issue is that you don’t want to draw all three of these sprites but just one
    of them, depending on the current paint color that the cannon will be shooting.
    For that, you can use the `hidden` property that each (sprite) node has in the
    SpriteKit framework. Initially, you hide the `cannonGreen` and `cannonBlue` sprites:


    `cannonGreen.hidden = true`


    `cannonBlue.hidden = true`


    Now, only the `cannonRed` sprite is going to be drawn on the screen. Of course,
    the sprites need to be added to the scene in order for this to work correctly:


    `addChild(cannonRed)`


    `addChild(cannonGreen)`


    `addChild(cannonBlue)`


    The next step is dealing with the player tapping in the center of the cannon barrel
    disc to change the color that the cannon should shoot. One challenge that you
    have to address is how to detect a tap. Until now, the program only stores a touch
    location. There is no way to know whether the player has just placed his/her finger
    on the screen or whether he/she has been touching that same spot on the screen
    for multiple seconds. A very simply solution is to add an extra variable that
    maintains whether the player has just tapped or not. This variable is of type
    `Bool`, and you initially set it to `false`:


    `var hasTapped: Bool = false`


    Now whenever the player starts touching the screen, you set this property to `true`.
    This is done in the `touchesBegan` method:


    `override func touchesBegan(touches: Set<UITouch>, withEvent event: UIEvent?)
    {`


    `let touch = touches.first!`


    `touchLocation = touch.locationInNode(self)`


    `nrTouches = nrTouches + touches.count`


    `hasTapped = true`


    `}`


    In order to process only a single tap, you need to reset this property to `false`
    again at the end of the `update` method. That way, when the player starts touching
    the screen, the `hasTapped` property becomes `true` and you can deal with it in
    the `update` method, after which the property immediately becomes `false` again.'
  trans: "\n# 布尔类型\n\n使用比较运算符或通过逻辑运算符连接其他表达式的表达式也拥有类型，这与使用算术运算符的表达式类似。毕竟，这类表达式的结果是一个值，即\
    \ `true` 或 `false` 这两个真值之一。在 Swift 中，这些真值由 `true` 和 `false` 关键字表示。\n\n除了用于在 `if`\
    \ 指令中表达条件外，逻辑表达式还可以应用于许多不同的场景。逻辑表达式与算术表达式类似，区别仅在于其类型不同。例如，你可以将逻辑表达式的结果存储在变量中、将其作为参数传递，或在另一个表达式中再次使用该结果。\n\
    \n真值的类型是 `Bool`（即布尔型），以英国数学家和哲学家乔治·布尔（George Boole，1815–1864）的名字命名。以下是布尔变量声明和赋值的示例：\n\
    \n```\nvar test: Bool\ntest = x > 3 && y < 5\n```\n\n例如，如果 `x` 的值为 6，`y` 的值为 3，那么布尔表达式\
    \ `x > 3 && y < 5` 的结果为 `true`，该值将存储在变量 `test` 中。你也可以直接将布尔值 `true` 和 `false` 存储在变量中：\n\
    \n```\nvar isAlive: Bool = false\n```\n\n布尔变量在存储游戏中不同对象的状态时极为方便。例如，你可以使用布尔变量来存储玩家是否还活着、玩家当前是否在跳跃、某个关卡是否已完成等信息。你可以在\
    \ `if` 指令中将布尔变量用作表达式，如下所示：\n\n```\nif isAlive {\n    // 执行某些操作\n}\n```\n\n在这种情况下，如果表达式\
    \ `isAlive` 的结果为 `true`，则会执行 `if` 指令的主体。你可能会认为这段代码会引发编译器错误，并且你需要对布尔变量进行如下比较：\n\
    \n```\nif isAlive == true {\n    // 执行某些操作\n}\n```\n\n然而，这种额外的比较并非必需。`if` 指令中的条件表达式必须得出\
    \ `true` 或 `false` 的结果。由于布尔变量本身已经代表了这两个值之一，因此你无需进行这种比较。\n\n你可以使用布尔类型来存储结果为 `true`\
    \ 或 `false` 的复杂表达式。让我们再看几个例子：\n\n```\nvar a = 12 > 5\nvar b = a && 3 + 4 == 8\n\
    var c = a || b\nif !c {\n    a = false\n}\n```\n\n在继续往下读之前，请尝试确定执行这些指令后变量 `a`、`b`\
    \ 和 `c` 的值。在第一行中，你声明并初始化了一个布尔变量 `a`。存储在其中的真值由表达式 `12 > 5` 得出，结果为 `true`。该值随后被赋值给变量\
    \ `a`。在第二行中，你声明并初始化了一个新变量 `b`，其中存储了一个更复杂的表达式的结果。该表达式的第一部分是变量 `a`，其值为 `true`。表达式的第二部分是比较表达式\
    \ `3 + 4 == 8`。此比较结果为假（3 + 4 不等于 8），因此这一部分的值为 `false`，所以逻辑与运算的结果也是 `false`。因此，执行该指令后，变量\
    \ `b` 的值为 `false`。\n\n第三条指令将对变量 `a` 和 `b` 进行逻辑或运算的结果存储在变量 `c` 中。由于 `a` 的值为 `true`，该运算的结果也为\
    \ `true`，该结果被赋值给 `c`。最后有一条 `if` 指令，仅当 `!c` 的结果为 `true` 时，才会将值 `false` 赋给变量 `a`。在本例中，`c`\
    \ 的值为 `true`，因此 `!c` 的结果为 `false`，这意味着 `if` 指令的主体不会被执行。因此，所有指令执行完毕后，`a` 和 `c`\
    \ 的值均为 `true`，而 `b` 的值为 `false`。\n\n做这类练习表明，逻辑错误的产生非常容易。这个过程类似于你调试代码时所做的事情。逐步执行指令，并确定各个阶段变量的值。一次疏忽就可能让你本以为是\
    \ `true` 的值变成了 `false`！\n\n# 更改加农炮的颜色\n\n在前面的章节中，你了解了如何使用 `if` 指令来检查玩家是否触摸了屏幕。现在，让我们扩展程序，使其在点击加农炮管中央时改变加农炮可发射的彩弹颜色。你可以通过运行本章附带的\
    \ Painter2 示例来观察此行为。\n\n要编写此行为的代码，你将需要三个额外的精灵，每种颜色一个。如果你在 Xcode 中打开 Painter2 项目中的\
    \ `Images.xcassets` 文件夹，就会在列表中看到这三个额外出现的精灵。在 `GameScene` 类中，你添加属性来引用这些精灵，如下所示：\n\
    \n```\nvar cannonRed = SKSpriteNode(imageNamed: \"spr_cannon_red\")\nvar cannonGreen\
    \ = SKSpriteNode(imageNamed: \"spr_cannon_green\")\nvar cannonBlue = SKSpriteNode(imageNamed:\
    \ \"spr_cannon_blue\")\n```\n\n这些精灵应位于加农炮管的相同位置（加农炮管的原点设置在旋转盘的中心）：\n\n```\ncannonRed.position\
    \ = cannonBarrel.position\ncannonGreen.position = cannonBarrel.position\ncannonBlue.position\
    \ = cannonBarrel.position\n```\n\n你还必须确保这些精灵绘制在炮管的上方，而不是其后面。为此，你可以将它们的高度位置属性设置得比加农炮管（其高度位置为\
    \ 1）更高：\n\n```\ncannonRed.zPosition = 2\ncannonGreen.zPosition = 2\ncannonBlue.zPosition\
    \ = 2\n```\n\n问题在于，你并不希望同时绘制这三个精灵，而只是根据加农炮当前将要发射的彩弹颜色绘制其中一个。为此，你可以使用 SpriteKit\
    \ 框架中每个（精灵）节点都具备的 `hidden` 属性。首先，你隐藏 `cannonGreen` 和 `cannonBlue` 精灵：\n\n```\n\
    cannonGreen.hidden = true\ncannonBlue.hidden = true\n```\n\n现在，只有 `cannonRed`\
    \ 精灵将绘制在屏幕上。当然，需要将这些精灵添加到场景中才能使其正常工作：\n\n```\naddChild(cannonRed)\naddChild(cannonGreen)\n\
    addChild(cannonBlue)\n```\n\n下一步是处理玩家点击加农炮管旋转盘中央以改变加农炮应发射颜色的事件。你需要解决的一个挑战是如何检测点击动作。到目前为止，程序仅存储了触摸位置。我们无法知道玩家是刚刚将手指放在屏幕上，还是已经触摸屏幕上的同一点持续了数秒。一个非常简单的解决方案是添加一个额外的变量，用于记录玩家是否刚刚点击过。该变量为\
    \ `Bool` 类型，你将其初始化为 `false`：\n\n```\nvar hasTapped: Bool = false\n```\n\n现在，每当玩家开始触摸屏幕时，你就将此属性设置为\
    \ `true`。这在 `touchesBegan` 方法中完成：\n\n```\noverride func touchesBegan(touches:\
    \ Set<UITouch>, withEvent event: UIEvent?) {\n    let touch = touches.first!\n\
    \    touchLocation = touch.locationInNode(self)\n    nrTouches = nrTouches + touches.count\n\
    \    hasTapped = true\n}\n```\n\n为了仅处理一次点击，你需要在 `update` 方法结束时将此属性再次重置为 `false`。这样，当玩家开始触摸屏幕时，`hasTapped`\
    \ 属性变为 `true`，你可以在 `update` 方法中处理它，随后该属性立即又变为 `false`。\n"
- fmt: "如果玩家正在触摸屏幕，你需要处理两种情况。第一种情况是玩家触摸屏幕的位置不在炮管圆盘中心。在这种情况下，你需要计算炮管的角度。第二种情况是玩家点击了炮管圆盘中心。在这种情况下，你需要通过隐藏或显示添加到游戏场景中的彩色精灵来改变炮管中心的颜色。\n\
    \n如何检测玩家是否点击了炮管圆盘中心？你可以通过判断触摸位置是否位于某个彩色精灵的边界内来实现。每个精灵节点都有一个属性，用于计算包围该精灵的矩形（也称为边界框）。以下是获取`cannonRed`精灵边界框的方法：\n\
    \n`let rect = cannonRed.frame`\n\n`rect`变量的类型是`CGRect`。`CGRect`类型有一些有用的方法和属性。例如，它有一个名为`contains`的方法，用于指示一个点是否位于矩形内部。以下是如何使用它：\n\
    \n```\nif rect.contains(touchLocation) {\n    // the player is touching the screen\
    \ inside the cannonRed bounding box!\n}\n```\n\n那么，让我们使用这个方法来处理 Painter 游戏中的各种情况。第一种情况是玩家触摸屏幕的位置在炮管圆盘之外：\n\
    \n```\nif !cannonRed.frame.contains(touchLocation) {\n    let opposite = touchLocation.y\
    \ - cannonBarrel.position.y\n    let adjacent = touchLocation.x - cannonBarrel.position.x\n\
    \    cannonBarrel.zRotation = atan2(opposite, adjacent)\n}\n```\n\n注意，你使用了逻辑非运算符来构造`if`指令的条件。在另一种情况下（玩家触摸位置在`cannonRed`的边界框内），你只需要在玩家也进行了点击时才执行某些操作，如下所示：\n\
    \n```\nif !cannonRed.frame.contains(touchLocation) {\n    // update the cannon\
    \ barrel angle\n}\nelse if cannonRed.frame.contains(touchLocation) && hasTapped\
    \ {\n    // change the color of the cannon barrel disc\n}\n```\n\n因为仅当`if`指令中的条件不成立时（换句话说，`cannonRed`的框架包含触摸位置），才会执行另一种情况，所以你可以编写一个更短的`if`指令来完成相同的事情：\n\
    \n```\nif !cannonRed.frame.contains(touchLocation) {\n    // update the cannon\
    \ barrel angle\n}\nelse if hasTapped {\n    // change the color of the cannon\
    \ barrel disc\n}\n```\n\n在另一种情况下，你需要改变炮管圆盘的颜色。如果它当前是红色，则需要变为绿色。如果它是绿色，则需要变为蓝色。最后，如果它是蓝色，则需要再次变为红色。这样，玩家就可以通过多次点击炮管圆盘来切换颜色。改变颜色的方法是改变三个炮管圆盘精灵的`hidden`属性。其中一个应始终为`false`，另外两个应为`true`。看一下以下几行代码：\n\
    \n```\nlet tmp = cannonBlue.hidden\ncannonBlue.hidden = cannonGreen.hidden\ncannonGreen.hidden\
    \ = cannonRed.hidden\ncannonRed.hidden = tmp\n```\n\n在这段代码的第一行中，你将`cannonBlue`的`hidden`状态存储在一个临时变量中。然后，将`cannonGreen`的`hidden`状态复制给`cannonBlue`。因此，如果绿色圆盘可见，那么蓝色圆盘现在也将可见。然后，`cannonRed.hidden`状态被赋值给`cannonGreen.hidden`状态。最后，`cannonRed.hidden`状态被设置为存储在`tmp`变量中的`hidden`状态，即原来的`cannonBlue.hidden`状态。通过这种方式在变量之间移动`hidden`值，结果恰恰是所需的行为。你可以自己尝试一下。假设红色、绿色、蓝色的`hidden`状态分别是`true`、`false`、`true`（换句话说，绿色可见）。确定执行上述指令的结果。你会看到结果是`true`、`true`、`false`（蓝色可见）。再次对这些指令运行，你将得到`false`、`true`、`true`（红色可见）。依此类推。运行\
    \ Painter2 程序以查看最终结果（截图见图 [5-4](#A978-1-4842-0650-8_5_Chapter.html#Fig4)）。\n\n\
    ![A978-1-4842-0650-8_5_Fig4_HTML.jpg](A978-1-4842-0650-8_5_Fig4_HTML.jpg)\n\n\
    图 5-4。Painter2 示例\n\n## 几句结束语\n\n既然你已经编写了实现此游戏所需行为的代码，你可能已经注意到，这导致`update`方法内部的代码相当复杂：\n\
    \n```\nif nrTouches > 0 {\n    touchingLabel.text = \"touching\"\n    if !cannonRed.frame.contains(touchLocation)\
    \ {\n        let opposite = touchLocation.y - cannonBarrel.position.y\n      \
    \  let adjacent = touchLocation.x - cannonBarrel.position.x\n        cannonBarrel.zRotation\
    \ = atan2(opposite, adjacent)\n    } else if hasTapped {\n        let tmp = cannonBlue.hidden\n\
    \        cannonBlue.hidden = cannonGreen.hidden\n        cannonGreen.hidden =\
    \ cannonRed.hidden\n        cannonRed.hidden = tmp\n    }\n} else {\n    touchingLabel.text\
    \ = \"not touching\"\n}\nhasTapped = false\n```\n\n这段代码看起来复杂的原因在于，有一个`if`指令在其内部包含了另一个`if`指令。如果你看看将要执行代码的可能路径总数，其实并没有那么多。如果玩家正在触摸屏幕，那么触摸标签文本将被更改，并且要么旋转炮管，要么（如果玩家也进行了点击）改变炮管圆盘颜色。如果玩家没有触摸屏幕，则只更改触摸标签文本。因此，总共有三条所谓的控制路径。图\
    \ [5-5](#A978-1-4842-0650-8_5_Chapter.html#Fig5) 用图表描绘了这三条控制路径。这些图表称为流程图，它们为开发者提供了关于程序某部分正在做什么的可视化反馈。如果你想阐明一段代码的工作原理，或者想规划出程序应该处理的不同情况，你可以自己绘制这些图表。另一种阐明此类代码的方法是添加注释，就像\
    \ Painter2 示例中所做的那样。\n\n![A978-1-4842-0650-8_5_Fig5_HTML.gif](A978-1-4842-0650-8_5_Fig5_HTML.gif)\n\
    \n图 5-5。描绘 Painter2 中处理触摸输入的多种方式的流程图\n\n随着你的程序变得越来越复杂，理解一段代码处理哪些情况也将变得越来越困难。这常常会导致错误。程序员可能认为他的代码处理了所有不同的情况，但当然，程序员也是人，是人就会犯错。测试代码工作量很大，这意味着并非所有错误都会被找到。这就是许多游戏公司发布已发布游戏的补丁，以修复只有在许多人玩过游戏后才明显出现的错误的原因。\n\
    \n## 本章所学内容\n\n在本章中，你学习了以下内容：\n\n*   如何使用`if`指令响应触摸输入，例如点击或手指移动\n*   如何使用布尔值公式化这些指令的条件\n\
    *   如何使用具有不同分支的`if`指令\n\n# 6. 飞行的球\n\n电子补充材料 本章的在线版本 (doi:[10.​1007/​978-1-4842-0650-8_​6](http://dx.doi.org/10.1007/978-1-4842-0650-8_6))\
    \ 包含补充材料，可供授权用户使用。\n\n在本章中，你将开始进一步组织 Painter 游戏的源代码。这是必要的，因为随着你向游戏中添加越来越多的内容，源代码会变得更加复杂。你将探索使用方法来更逻辑地组织代码。本章结束后，你将向游戏中添加一个移动的球。"
  raw: 'If the player is touching the screen, you need to handle two different cases.
    The first case is that the player is touching the screen outside of the center
    of the cannon barrel disc. In this case, you need to calculate the angle of the
    cannon barrel. The second case is that the player has tapped in the center of
    the cannon barrel. In this case, you need to change the color of the cannon center
    by hiding or showing the colored sprites you added to the game scene. How do you
    detect whether the player has tapped in the center of the cannon barrel? You can
    do this by determining if the touch location is within the bounds of one of the
    color sprites. Each sprite node has a property that calculates a rectangle surrounding
    the sprite (also called the bounding box). Here is how you retrieve the bounding
    box of the `cannonRed` sprite:


    `let rect = cannonRed.frame`


    The `rect` variable is of type `CGRect`. The `CGRect` type has a few useful methods
    and properties. For example, it has a method called `contains`, which indicates
    if a point falls inside a rectangle. Here is how you can use it:


    `if rect.contains(touchLocation) {`


    `// the player is touching the screen inside the cannonRed bounding box!`


    `}`


    So, let’s use this method to handle the various cases in the Painter game. The
    first case is that the player touches the screen outside of the cannon barrel
    disc:


    `if !cannonRed.frame.contains(touchLocation) {`


    `let opposite = touchLocation.y - cannonBarrel.position.y`


    `let adjacent = touchLocation.x - cannonBarrel.position.x`


    `cannonBarrel.zRotation = atan2(opposite, adjacent)`


    `}`


    Note how you use the logical not operator to construct the condition of the `if`
    instruction. In the alternative case (the player is touching inside the bounding
    box of `cannonRed`), you only need to do something when the player has also tapped,
    like so:


    `if !cannonRed.frame.contains(touchLocation) {`


    `// update the cannon barrel angle`


    `}`


    `else if cannonRed.frame.contains(touchLocation) && hasTapped {`


    `// change the color of the cannon barrel disc`


    `}`


    Because the alternative case is only executed if the condition in the `if` instruction
    is not true (in other words, the `cannonRed` frame contains the touch location),
    you can write a shorter `if` instruction that accomplishes the same thing:


    `if !cannonRed.frame.contains(touchLocation) {`


    `// update the cannon barrel angle`


    `}`


    `else if hasTapped {`


    `// change the color of the cannon barrel disc`


    `}`


    Inside the alternative case, you need to change the color of the cannon barrel
    disc. If it is currently red, it needs to become green. If it’s green, it needs
    to become blue. Finally, if it’s blue, it needs to become red again. This way,
    the player can switch between colors by tapping multiple times on the cannon barrel
    disc. The way to change the color is by changing the `hidden` properties of the
    three cannon barrel disc sprites. One of them should always be `false`, and the
    other two should be `true`. Take a look at the following lines of code:


    `let tmp = cannonBlue.hidden`


    `cannonBlue.hidden = cannonGreen.hidden`


    `cannonGreen.hidden = cannonRed.hidden`


    `cannonRed.hidden = tmp`


    In the first line of this code, you store the `hidden` status of `cannonBlue`
    in a temporary variable. Then, the `hidden` status of `cannonGreen` is copied
    to `cannonBlue`. So, if the green disc was visible, now the blue disc will be
    visible as well. Then, the `cannonRed.hidden` status is assigned to the `cannonGreen.hidden`
    status. Finally, the `cannonRed.hidden` status is set to the `hidden` status stored
    in the `tmp` variable, which was the old `cannonBlue.hidden` status. The result
    of moving around the `hidden` values between the variables in this way is exactly
    the behavior that is needed. Try it out yourself. Suppose that the red, green,
    blue `hidden` statuses are `true`, `false`, `true` (in other words, green is visible).
    Determine the outcome of executing the instructions above. You will see that the
    outcome is `true`, `true`, `false` (blue is visible). Run that again through the
    instructions, and you will get `false`, `true`, `true` (red is visible). And so
    on. Run the Painter2 program to see the final result (see Figure [5-4](#A978-1-4842-0650-8_5_Chapter.html#Fig4)
    for a screenshot).


    ![A978-1-4842-0650-8_5_Fig4_HTML.jpg](A978-1-4842-0650-8_5_Fig4_HTML.jpg)


    Figure 5-4.


    The Painter2 example


    ## A Few Final Remarks


    Now that you have written the code to achieve the behavior that is needed for
    this game, you probably noticed that it resulted in a rather complicated piece
    of code inside the `update` method:


    `if nrTouches > 0 {`


        `touchingLabel.text = "touching"`


        `if !cannonRed.frame.contains(touchLocation) {`


            `let opposite = touchLocation.y - cannonBarrel.position.y`


            `let adjacent = touchLocation.x - cannonBarrel.position.x`


            `cannonBarrel.zRotation = atan2(opposite, adjacent)`


        `} else if hasTapped {`


            `let tmp = cannonBlue.hidden`


            `cannonBlue.hidden = cannonGreen.hidden`


            `cannonGreen.hidden = cannonRed.hidden`


            `cannonRed.hidden = tmp`


        `}`


    `} else {`


        `touchingLabel.text = "not touching"`


    `}`


    `hasTapped =` `false`


    What makes this code look complicated is that there is an `if` instruction that
    contains another `if` instruction inside its body. If you look at the total number
    of possibilities of what code will be executed, it’s not that bad. If the player
    is touching the screen, then the touch label text will be changed and either the
    cannon will be rotated or (if the player has also tapped) the cannon barrel disc
    color will be changed. If the player is not touching the screen, only the touching
    label text is changed. So in total there are three so-called control paths. Figure
    [5-5](#A978-1-4842-0650-8_5_Chapter.html#Fig5) depicts these three control paths
    in a diagram. These diagrams are called flow charts, and they provide developers
    with visual feedback about what a piece of a program is doing. You can draw these
    charts yourself if you want to clarify how a piece of code is working, or if you
    want to map out the different cases that your program should handle. Another way
    to clarify such pieces of code is by adding comments, as is done in the Painter2
    example.


    ![A978-1-4842-0650-8_5_Fig5_HTML.gif](A978-1-4842-0650-8_5_Fig5_HTML.gif)


    Figure 5-5.


    A flow chart depicting the various ways in which touch input is dealt with in
    Painter2


    As your programs become more complex, it will also become more difficult to understand
    which cases a piece of code handles. This often leads to bugs. A programmer may
    think that his code handles all the different cases, but of course, programmers
    are also human, and humans make mistakes. Testing code is a lot of work, which
    means that not all bugs are going to be found. This is the reason why many game
    companies release patches of already released games to fix bugs that became apparent
    only after many people played the game.


    ## What You Have Learned


    In this chapter, you have learned the following:


    *   How to react to touch input such as a tap or a moving finger using `if` instructions

    *   How to formulate conditions for these instructions using Boolean values

    *   How to use `if` instructions with different alternatives


    # 6. A Flying Ball


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​6](http://dx.doi.org/10.1007/978-1-4842-0650-8_6))
    contains supplementary material, which is available to authorized users.


    In this chapter, you will start organizing the source code of the Painter game
    a bit more. This is necessary because as you start adding more and more things
    to the game, the source code will become more complicated. You will explore using
    methods to structure the code more logically. You’ll conclude this chapter by
    adding a moving ball to the game.'
  trans: "\n如果玩家正在触摸屏幕，你需要处理两种情况。第一种情况是玩家触摸屏幕的位置不在炮管圆盘中心。在这种情况下，你需要计算炮管的角度。第二种情况是玩家点击了炮管圆盘中心。在这种情况下，你需要通过隐藏或显示添加到游戏场景中的彩色精灵来改变炮管中心的颜色。\n\
    \n如何检测玩家是否点击了炮管圆盘中心？你可以通过判断触摸位置是否位于某个彩色精灵的边界内来实现。每个精灵节点都有一个属性，用于计算包围该精灵的矩形（也称为边界框）。以下是获取`cannonRed`精灵边界框的方法：\n\
    \n`let rect = cannonRed.frame`\n\n`rect`变量的类型是`CGRect`。`CGRect`类型有一些有用的方法和属性。例如，它有一个名为`contains`的方法，用于指示一个点是否位于矩形内部。以下是如何使用它：\n\
    \n```\nif rect.contains(touchLocation) {\n    // the player is touching the screen\
    \ inside the cannonRed bounding box!\n}\n```\n\n那么，让我们使用这个方法来处理 Painter 游戏中的各种情况。第一种情况是玩家触摸屏幕的位置在炮管圆盘之外：\n\
    \n```\nif !cannonRed.frame.contains(touchLocation) {\n    let opposite = touchLocation.y\
    \ - cannonBarrel.position.y\n    let adjacent = touchLocation.x - cannonBarrel.position.x\n\
    \    cannonBarrel.zRotation = atan2(opposite, adjacent)\n}\n```\n\n注意，你使用了逻辑非运算符来构造`if`指令的条件。在另一种情况下（玩家触摸位置在`cannonRed`的边界框内），你只需要在玩家也进行了点击时才执行某些操作，如下所示：\n\
    \n```\nif !cannonRed.frame.contains(touchLocation) {\n    // update the cannon\
    \ barrel angle\n}\nelse if cannonRed.frame.contains(touchLocation) && hasTapped\
    \ {\n    // change the color of the cannon barrel disc\n}\n```\n\n因为仅当`if`指令中的条件不成立时（换句话说，`cannonRed`的框架包含触摸位置），才会执行另一种情况，所以你可以编写一个更短的`if`指令来完成相同的事情：\n\
    \n```\nif !cannonRed.frame.contains(touchLocation) {\n    // update the cannon\
    \ barrel angle\n}\nelse if hasTapped {\n    // change the color of the cannon\
    \ barrel disc\n}\n```\n\n在另一种情况下，你需要改变炮管圆盘的颜色。如果它当前是红色，则需要变为绿色。如果它是绿色，则需要变为蓝色。最后，如果它是蓝色，则需要再次变为红色。这样，玩家就可以通过多次点击炮管圆盘来切换颜色。改变颜色的方法是改变三个炮管圆盘精灵的`hidden`属性。其中一个应始终为`false`，另外两个应为`true`。看一下以下几行代码：\n\
    \n```\nlet tmp = cannonBlue.hidden\ncannonBlue.hidden = cannonGreen.hidden\ncannonGreen.hidden\
    \ = cannonRed.hidden\ncannonRed.hidden = tmp\n```\n\n在这段代码的第一行中，你将`cannonBlue`的`hidden`状态存储在一个临时变量中。然后，将`cannonGreen`的`hidden`状态复制给`cannonBlue`。因此，如果绿色圆盘可见，那么蓝色圆盘现在也将可见。然后，`cannonRed.hidden`状态被赋值给`cannonGreen.hidden`状态。最后，`cannonRed.hidden`状态被设置为存储在`tmp`变量中的`hidden`状态，即原来的`cannonBlue.hidden`状态。通过这种方式在变量之间移动`hidden`值，结果恰恰是所需的行为。你可以自己尝试一下。假设红色、绿色、蓝色的`hidden`状态分别是`true`、`false`、`true`（换句话说，绿色可见）。确定执行上述指令的结果。你会看到结果是`true`、`true`、`false`（蓝色可见）。再次对这些指令运行，你将得到`false`、`true`、`true`（红色可见）。依此类推。运行\
