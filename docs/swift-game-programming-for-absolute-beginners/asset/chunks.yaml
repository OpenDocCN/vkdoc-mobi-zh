- fmt: '# Part I


    Getting Started


    The first part of this book covers the basics of developing game applications
    in Swift. You will see a number of simple examples that show how to create apps
    using Swift. I will give you an introduction to the Swift language, as well as
    the SpriteKit engine, which is used to create 2D games. This part covers core
    Swift programming constructs such as instructions, expressions, objects, and methods.
    In addition, I will introduce the game loop and how to load and draw sprites (images).


    # 1. The Swift Language


    Electronic supplementary material The online version of this chapter (doi:[10.1007/978-1-4842-0650-8_1](http://dx.doi.org/10.1007/978-1-4842-0650-8_1))
    contains supplementary material, which is available to authorized users.


    This chapter provides an introduction to the Swift programming language. Swift
    is one of the more recent developments in the evolution of programming languages.
    In order to understand Swift, you need to first understand how computers (including
    iOS devices such as iPads or iPhones) work, and how the languages used to program
    them have evolved. After talking about computers and programs (including apps)
    in general, I’ll give an introduction to Swift and how you can use some of its
    basic features to create your first program.


    ## Computers and Programs


    This section briefly covers computers and programming in general. After that,
    you’ll move on to programming your first application using Swift.


    ### Processors and Memory


    Generally speaking, a computer consists of one or more processors and forms of
    memory. This is true for all modern computers, including game consoles, smartphones,
    and tablets. I define memory as something that you can read information from and/or
    write things to. Memory comes in different varieties, mainly differing in the
    speed of data transfer and data access. For example, a computer may have memory
    in the shape of (relatively slow) hard disk memory, much faster RAM (Random Access
    Memory), a USB flash drive that’s connected to the machine, or an open network
    connection to a server that has memory itself. The main processor in the computer
    is called the central processing unit (CPU). The most common other processor on
    a computer is a graphics processing unit (GPU).


    The main task of the processor is to execute instructions. The effect of executing
    these instructions is that the memory is changed. Especially with my very broad
    definition of memory, every instruction a processor executes changes the memory
    in some way. You probably don’t want the computer to execute only one instruction.
    Generally, you have a very long list of instructions to be executed—“Move this
    part of the memory over there, clear this part of the memory, draw this image
    on the screen, check if the player is pressing a key on the gamepad, and make
    some coffee while you’re at it”—and (as you probably expect) this list of instructions
    that is executed by the computer is called a program.


    ### Programs


    In summary, a program is a long list of instructions to manipulate the computer’s
    memory. However, the program itself is also stored in memory. Before the instructions
    in the program are executed, they’re stored on a hard disk, a DVD, or a USB thumb
    drive; or on any other storage medium. When they need to be executed, the program
    is moved to the RAM memory of the machine.


    The instructions that, combined together, form the program need to be expressed
    in some way. You could use gestures, or make weird noises. Unfortunately, the
    computer doesn’t understand this very well (although with the motion tracking
    devices of today, perhaps it will understand in a couple of years). The computer
    also can’t grasp instructions typed in plain English (yet), which is why you need
    programming languages such as Swift. In practice, the instructions are coded as
    text, but you need to follow a very strict way of writing them down, according
    to a set of rules that defines a programming language. Many programming languages
    exist, because when somebody thinks of a slightly better way of expressing a certain
    type of instruction, their approach often becomes a new programming language.
    It’s difficult to say how many programming languages exist because that depends
    on whether you count all the versions and dialects of a language; but suffice
    to say that there are thousands.


    Fortunately, it’s not necessary to learn all these different languages because
    they have many similarities. In the early days, the main goal of programming languages
    was to use the new possibilities of computers. However, more recent languages
    focus on bringing some order to the chaos that writing programs can cause.'
