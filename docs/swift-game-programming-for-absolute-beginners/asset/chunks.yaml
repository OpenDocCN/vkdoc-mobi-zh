    `didMoveToView`, and one called `update`. The latter is the method that is going
    to be executed as a part of the game loop. Because the `GameScene` class is a
    special version of the `SKScene` class, the SpriteKit framework that we use in
    this book already takes care of creating the game loop and calling the `update`
    method. In this example, there is one instruction in the `update` method:


    `backgroundColor = UIColor.blueColor()`


    This instruction changes the background color of the app to the color blue. Run
    the BackgroundColor example belonging to this chapter to see what the program
    does. Now see if you can change the background color to something else. Can you
    change it to red? Or yellow?


    When you run the program, you can’t really see that the `update` method is called
    many times per second. Add the following instruction between the braces enclosing
    the instructions grouped in the `update` method:


    `print(currentTime)`


    When you run the program now, you’ll see that a slowly increasing number is printed
    to the console. This number represents the current system time, measured in seconds
    passed since the device was last restarted. Every time the update method is called,
    the system time is printed to the console.


    If you want to know how often the `update` method is called per second, there
    is an easy way to find out. Click the file called `GameViewController.swift`.
    Add the following instruction to the `viewWillLayoutSubviews` method, just before
    the closing brace:


    `skView.showsFPS = true`


    When you now run the program, you’ll see that a number is printed on the screen.
    This number, also called the frame rate, indicates how many times per second the
    game world is updated and drawn on the screen. In order to allow for a smooth
    playing experience, the game world needs to be continuously updated and drawn:
    update, draw, update, draw, update, draw, update, draw, update, draw, and so on.
    Furthermore, this happens at a very high speed. Apple devices such as the iPad
    or the iPhone can deal with frame rates with a maximum of 60 frames per second
    (or 60 Hz). Higher than that is not possible because the device screen refresh
    rate is 60 Hz. It is possible, though, that the frame rate drops because the computations
    in the update method are taking a lot of time. In [Chapter 6](#A978-1-4842-0650-8_6_Chapter.html),
    I talk more about this issue and what you can do to ensure your games run smoothly
    both on older and newer Apple devices.


    This book shows you many different ways to fill the `update` method with the tasks
    you need to perform in your game. During this process, I also introduce many programming
    techniques that are useful for games (and other applications). The following section
    looks into the basic game application in more detail. Then, you fill this basic
    skeleton of a game with additional instructions.'
  trans: "\n### 游戏循环\n\n游戏循环负责处理游戏中的动态方面。在游戏运行期间，会发生很多事情。玩家按下游戏手柄上的按钮或触摸设备屏幕，一个不断变化的游戏世界（包含关卡、怪物和其他角色）需要保持同步更新。此外，还有爆炸特效、音效以及更多其他内容。所有这些由游戏循环处理的不同任务可以归纳为两类：\n\
    \n-   与更新和维护游戏世界相关的任务\n-   与向玩家展示游戏世界相关的任务\n\n游戏循环会连续不断地依次执行这些任务（见图 2-1）。举个例子，让我们看看在像《吃豆人》这样简单的游戏中如何处理玩家导航。游戏世界主要由一个迷宫构成，里面有几个讨厌的鬼魂在移动。吃豆人位于迷宫的某个位置，并朝着特定方向移动。在第一个任务（更新和维护游戏世界）中，你需要检查玩家是否按下了方向键。如果是，则需要根据玩家希望吃豆人移动的方向来更新其位置。此外，由于这次移动，吃豆人可能吃掉了一个白点，这会增加分数。你需要检查这是否是关卡中的最后一个白点，因为那意味着玩家已完成了本关。如果是较大的白点，则需要让鬼魂失效。接着，你需要更新游戏世界的其余部分：鬼魂的位置需要更新，你必须决定是否应在某处显示水果以获取奖励分数，还需要检查吃豆人是否与某个鬼魂相撞（如果该鬼魂尚未失效）等等。你可以看到，即使是在像《吃豆人》这样简单的游戏中，第一个任务中也需要完成大量工作。从现在开始，我将这一系列与更新和维护游戏世界相关的不同任务称为“更新操作”。\n\
    \n![A978-1-4842-0650-8_2_Fig1_HTML.gif](img/A978-1-4842-0650-8_2_Fig1_HTML.gif)\n\
    \n图 2-1. 游戏循环，持续更新并绘制游戏世界\n\n第二组任务与向玩家展示游戏世界相关。在《吃豆人》游戏中，这意味着绘制迷宫、鬼魂、吃豆人以及玩家需要了解的重要游戏信息，例如他们已获得多少分数、还剩几条命等等。这些信息可以显示在游戏屏幕的不同区域，例如顶部或底部。这部分显示内容也称为抬头显示。现代\
    \ 3D 游戏拥有一套更为复杂的绘制任务。这些游戏需要处理光照与阴影、反射、剔除、爆炸等视觉效果，以及更多内容。我将把游戏循环中处理所有与向玩家展示游戏世界相关的任务部分称为“绘制操作”。\n\
    \n### Swift 中的游戏循环\n\n上一章展示了如何创建一个简单的 Swift iOS 游戏应用程序。在该应用程序中，你看到指令被分组到某个方法中，而该方法又作为某个类的一部分，如下所示：\n\
    \n```\nclass GameScene: SKScene {\n\n    override func didMoveToView(view: SKView)\
    \ {\n        /* 在此处设置你的场景 */\n        let myLabel = SKLabelNode(fontNamed:\"Chalkduster\"\
    )\n        myLabel.text = \"Hello, World!\"\n        myLabel.fontSize = 65\n \
    \       myLabel.position = CGPoint(x:CGRectGetMidX(self.frame),\n            \
    \                       y:CGRectGetMidY(self.frame))\n        self.addChild(myLabel)\n\
    \    }\n\n    ...\n}\n```\n\n基本上，`didMoveToView` 方法在此处只完成一项工作：创建一个游戏世界。这个游戏世界非常简单，因为它只包含一个文本标签。那么，游戏循环在这个示例中是如何发挥作用的呢？事实上，游戏循环的绘制部分已经由\
    \ SpriteKit 引擎处理了。`didMoveToView` 方法中的最后一条指令确保了 SpriteKit 引擎内部的绘制代码知道它应该绘制这个文本标签。如果你想创建一个更复杂的游戏世界，只需在\
    \ `didMoveToView` 中添加更多指令来创建游戏世界中的对象即可。因此，创建和绘制游戏世界似乎是可行的。但是，如何更改游戏世界呢？这就是“更新操作”的用武之地。看看下面的示例程序（另请参阅本章附带的\
    \ BackgroundColor 项目）：\n\n```\nimport SpriteKit\n\nclass GameScene: SKScene {\n\
    \n    override func didMoveToView(view: SKView) {\n        let myLabel = SKLabelNode(fontNamed:\"\
    Chalkduster\")\n        myLabel.text = \"Hello, World!\"\n        myLabel.fontSize\
    \ = 65\n        myLabel.position = CGPoint(x:CGRectGetMidX(self.frame),\n    \
    \                               y:CGRectGetMidY(self.frame))\n        addChild(myLabel)\n\
    \    }\n\n    override func update(currentTime: NSTimeInterval) {\n        backgroundColor\
    \ = UIColor.blueColor()\n    }\n}\n```\n\n如你所见，该程序与上一个示例的重大区别在于，`GameScene` 类现在包含了以下两个方法：一个名为\
    \ `didMoveToView`，另一个名为 `update`。后者是将作为游戏循环一部分执行的方法。由于 `GameScene` 类是 `SKScene`\
    \ 类的一个特殊版本，我们本书中使用的 SpriteKit 框架已经负责创建游戏循环并调用 `update` 方法。在此示例中，`update` 方法包含一条指令：\n\
    \n```\nbackgroundColor = UIColor.blueColor()\n```\n\n这条指令将应用程序的背景颜色更改为蓝色。运行本章附带的\
    \ BackgroundColor 示例，查看程序的效果。现在，看看你是否能将背景颜色更改为其他颜色。你能把它改成红色吗？或者黄色？\n\n当你运行程序时，实际上无法看到\
    \ `update` 方法每秒被调用多次。在 `update` 方法的花括号内的指令之间添加以下指令：\n\n```\nprint(currentTime)\n\
    ```\n\n现在运行程序，你会看到一个缓慢增长的数字被打印到控制台。这个数字表示当前系统时间，以设备上次重启后经过的秒数计算。每次调用 `update`\
    \ 方法时，系统时间都会打印到控制台。\n\n如果你想了解 `update` 方法每秒被调用的频率，有一种简单的方法可以找到答案。点击名为 `GameViewController.swift`\
    \ 的文件。在 `viewWillLayoutSubviews` 方法中，紧邻结束花括号之前，添加以下指令：\n\n```\nskView.showsFPS\
    \ = true\n```\n\n现在运行程序，你会看到一个数字显示在屏幕上。这个数字也称为帧率，表示游戏世界每秒被更新并绘制到屏幕上的次数。为了实现流畅的游戏体验，游戏世界需要持续不断地更新和绘制：更新、绘制、更新、绘制、更新、绘制、更新、绘制、更新、绘制，如此循环。而且，这以非常高的速度进行。苹果设备（如\
    \ iPad 或 iPhone）所能处理的帧率最高为每秒 60 帧（或 60 Hz）。高于此值是不可能的，因为设备屏幕的刷新率为 60 Hz。不过，帧率可能会因为\
    \ `update` 方法中的计算耗时过多而下降。在第 6 章中，我将更详细地讨论这个问题，以及你可以采取哪些措施来确保你的游戏在旧款和新款苹果设备上都能流畅运行。\n\
    \n本书将向你展示多种方法，让你能够将游戏所需执行的任务填充到 `update` 方法中。在此过程中，我还会介绍许多对游戏（以及其他应用程序）有用的编程技术。下一节将更详细地介绍基本的游戏应用程序。然后，你将用额外的指令填充这个游戏的基本骨架。\n"
- fmt: "## 程序的结构\n\n本节将更详细地讨论程序的结构。早期，许多计算机程序仅在屏幕上输出文本，不使用图形。这种基于文本的应用程序称为控制台应用程序。除了在屏幕上打印文本外，这些应用程序还可以读取用户在键盘上输入的文本。因此，与用户的任何交流都以问答序列的形式进行（例如：是否要格式化硬盘（Y/N）？是否确定（Y/N）？等等）。在基于窗口的操作系统普及之前，这种基于文本的界面在文本编辑程序、电子表格、数学应用程序甚至游戏中都非常常见。这些游戏被称为基于文本的冒险游戏，它们以文本形式描述游戏世界。玩家随后可以输入命令与游戏世界互动，例如：`go\
    \ west`（向西走）、`pick up matches`（捡起火柴）或`Xyzzy`。此类早期游戏的例子有`Zork`和`Adventure`。尽管它们现在看起来可能过时了，但玩起来仍然很有趣！\n\
    \n如前一章所述，我们仍然可以编写控制台应用程序，即使是用像Swift这样的语言。虽然了解如何编写此类应用程序很有趣，但本书主要专注于使用图形进行现代游戏编程。\n\
    \n### 应用程序的类型\n\n控制台应用程序只是应用程序类型中的一种。另一种非常常见的类型是窗口应用程序。这种应用程序会显示一个包含窗口、按钮和其他图形用户界面（GUI）组件的屏幕。此类应用程序通常是事件驱动的：它对诸如点击按钮或选择菜单项等事件做出反应。\n\
    \n另一种应用程序是运行在手机或平板电脑上的App。这类应用程序的屏幕空间通常有限，但提供了新的交互可能性，例如用于定位设备的GPS、检测设备方向的传感器以及触摸屏。\n\
    \n在开发应用程序时，编写一个能在所有不同平台上运行的程序是相当具有挑战性的。创建窗口应用程序与创建App有很大不同，并且在不同类型的应用程序之间重用代码也很困难。因此，基于Web的应用程序正变得越来越流行。在这种情况下，应用程序存储在服务器上，用户通过Web浏览器运行程序。此类应用程序的例子很多：想想基于Web的电子邮件程序或社交网站。然而，创建一个纯基于Web的应用程序并不总能产生最快的代码。原生App通常要快得多。此外，通过基于Web的应用程序赚钱比通过App更难。一旦你创建了自己的游戏App，将其发布到App\
    \ Store就很容易了。读完本书后，你将能够自己创建这样的游戏App。\n\n注意\n\n并非所有程序都严格属于某一种应用程序类型。一些Windows应用程序可能包含控制台组件，例如游戏引擎中的脚本接口。游戏通常也包含窗口组件，例如物品栏界面、配置菜单等。如今，程序的实际界限已变得不那么清晰。想象一个拥有数万名玩家的多人在线游戏，每个玩家在平板电脑上运行一个App或在一台台式电脑上运行一个应用程序，同时这些程序与一个同时在许多服务器上运行的复杂程序进行通信。在这种情况下，什么构成了程序？它又是什么类型的程序？\n\
    \n### 函数\n\n请记住，在命令式程序中，指令执行着程序的实际工作：它们一条接一条地被执行。这会改变内存和/或屏幕，从而让用户注意到程序正在执行某些操作。在`BackgroundColor`程序中，并非所有行都是指令。例如，下面这一行不是指令，而是函数定义的开始：\n\
    \n`override func didMoveToView(view: SKView) {`\n\n指令的一个例子是行`print(currentTime)`，它将当前系统时间打印到控制台。由于Swift是一种过程式语言，指令可以分组为函数或方法。在Swift中，指令不必是函数或方法的一部分。请看下面的程序：\n\
    \n```\nimport SpriteKit\n\nclass GameScene: SKScene {\n\n    let myLabel = SKLabelNode(text:\"\
    Hello, World!\")\n\n    override func didMoveToView(view: SKView) {\n        myLabel.position\
    \ = CGPoint(x: 100, y: 100)\n        addChild(myLabel)\n    }\n\n    override\
    \ func update(currentTime: NSTimeInterval) {\n        backgroundColor = UIColor.blueColor()\n\
    \    }\n\n}\n```\n\n如你所见，我将一条指令从`didMoveToView`方法中移出，并放在了类级别。虽然你不能总是这样做，但在本例中是允许的。在下一章中，我将更详细地讨论这一点。\n\
    \n函数和方法非常有用。它们避免了代码的重复，因为指令只存在于一个地方，并且允许程序员通过调用一个名称来轻松执行这些指令。使用花括号（`{`和`}`）将指令分组到一个函数中。这样一组分组在一起的指令块被称为函数体。在函数体上方，编写函数头。函数头示例如下：\n\
    \n`func printData()`\n\n函数头包含函数名称（本例中为`printData`）以及其他内容。作为程序员，你可以为函数选择任意名称。在某些情况下，函数名称已经为你指定了。请看下面的函数头：\n\
    \n`override func update(currentTime: NSTimeInterval)`\n\n你不能将名称（`update`）改为其他内容，因为此方法替换了在`SKScene`中定义的原始方法（因此方法头前面有`override`这个关键字）。你替换该函数是因为你想在更新`SKScene`中的游戏世界时执行一些不同于标准行为（即什么也不做）的操作，具体来说，你想改变背景颜色。\n\
    \n函数或方法的名称前面总是带有`func`这个词，并且在名称后面有一对圆括号。这些括号用于向函数内部执行的指令提供信息。例如，再次查看`update`的函数头。在此函数头中，圆括号内看到文本`currentTime:\
    \ NSTimeInterval`。这意味着`update`方法需要当前系统时间。这是合理的，因为如果你想计算游戏对象的速度（通常是在更新游戏世界时要做的事情），你需要知道经过了多少时间。"
  raw: '## The Structure of a Program


    This section talks about the structure of a program in more detail. In the early
    days, many computer programs only wrote text to the screen and didn‘t use graphics.
    Such a text-based application is called a console application. In addition to
    printing text to the screen, these applications could also read text that a user
    entered on the keyboard. So, any communication with the user was done in the form
    of question/answer sequences (Do you want to format the hard drive (Y/N)? Are
    you sure (Y/N)? and so on). Before windows-based OSes became popular, this text-based
    interface was very common for text-editing programs, spreadsheets, math applications,
    and even games. These games were called text-based adventures, and they described
    the game world in text form. The player could then enter commands to interact
    with the game world, such as go west, pick up matches, or Xyzzy. Examples of such
    early games are Zork and Adventure. Although they might seem dated now, they’re
    still fun to play!


    It’s still possible to write console applications, also in a language such as
    Swift, as you saw in the previous chapter. Although it’s interesting to see how
    to write such applications, this book focuses on programming modern games with
    graphics.


    ### Types of Applications


    The console application is only one example of a type of application. Another
    very common type is the windows application. Such an application shows a screen
    containing windows, buttons, and other parts of a graphical user interface (GUI).
    This type of application is often event-driven: it reacts to events such as clicking
    a button or selecting a menu item.


    Another type of application is the app, run on a mobile phone or a tablet. Screen
    space is generally limited in these types of applications, but new interaction
    possibilities are available, such as GPS to find out the location of the device,
    sensors that detect the orientation of the device, and a touch screen.


    When developing applications, it’s quite a challenge to write a program that works
    on all the different platforms. Creating a windows application is very different
    from creating an app. And reusing the code between different types of applications
    is difficult. For that reason, web-based applications are becoming more popular.
    In this case, the application is stored on a server, and the user runs the program
    in a web browser. There are many examples of such applications: think of web-based
    e-mail programs or social network sites. However, creating a purely web-based
    application may not always result in the fastest code. A native app generally
    is much faster. Furthermore, making money with web-based applications is more
    difficult than with apps. Once you’ve created your own game app, publishing it
    in the App Store is easy. After reading this book, you will be able to create
    such game apps by yourself.


    Note


    Not all programs fall squarely in one application type. Some Windows applications
    might have a console component, such as a script interface in a game engine. Games
    often also have a window component, such as an inventory screen, a configuration
    menu, and so on. And nowadays the limit of what a program actually is has become
    less clear. Think about a multiplayer game that has tens of thousands of players,
    each running an app on a tablet or an application on a desktop computer, while
    these programs communicate with a complex program running simultaneously on many
    servers. What constitutes the program in this case? And what type of program is
    it?


    ### Functions


    Remember that in an imperative program, the instructions are doing the actual
    job of the program: they’re executed one after the other. This changes the memory
    and/or the screen so the user notices that the program is doing something. In
    the BackgroundColor program, not all lines in the program are instructions. For
    example, the following line is not an instruction, but the start of a function
    definition:


    `override func didMoveToView(view: SKView) {`


    An example of an instruction is the line `print(currentTime)`, which prints the
    current system time to the console. Because Swift is a procedural language, the
    instructions can be grouped in functions or methods. In Swift it isn’t obligatory
    that an instruction be part of a function or method. Look at the following program:


    `import SpriteKit`


    `class GameScene: SKScene {`


        `let myLabel = SKLabelNode(text:"Hello, World!")`


        `override func didMoveToView(view: SKView) {`


            `myLabel.position = CGPoint(x: 100, y: 100)`


            `addChild(myLabel)`


        `}`


        `override func update(currentTime: NSTimeInterval) {`


            `backgroundColor = UIColor.blueColor()`


        `}`


    `}`


    As you can see, I moved one instruction out of the `didMoveToView` method and
    placed it at the class level. Although you cannot always do that, it is allowed
    in this case. In the following chapter, I will discuss this in more detail.


    Functions and methods are very useful. They prevent duplication of code because
    the instructions are only in one place, and they allow the programmer to execute
    those instructions easily by calling one name. Grouping instructions in a function
    is done with braces (`{` and `}`). Such a block of instructions grouped together
    is called the body of a function. Above the body, you write the header of the
    function. An example of a function header is as follows:


    `func printData()`


    The header contains, among other things, the name of the function (in this case
    `printData`). As a programmer, you may choose any name for a function. In some
    cases, the name of the function is already chosen for you. Look at the following
    function header:


    `override func update(currentTime: NSTimeInterval)`


    You cannot change the name (`update`) to something else because this method replaces
    the original method defined in `SKScene` (hence the word `override` in front of
    the method header). You replace that function because you want to do something
    other than the standard behavior for updating the game world in `SKScene` (which
    is doing nothing), namely you want to change the background color.


    The name of a function or method is always preceded by the word `func`, and after
    the name is a pair of parentheses. These serve to provide information to the instructions
    that are executed inside the function. For example, take another look at the header
    of `update`. In this header, you see the text `currentTime: NSTimeInterval` between
    parentheses. This means that the `update` method requires the current system time.
    This makes sense because if you want to calculate velocities of game objects (typically
    something you do when you update the game world), you need to know how much time
    has passed.'
  trans: "\n## 程序的结构\n\n本节将更详细地讨论程序的结构。早期，许多计算机程序仅在屏幕上输出文本，不使用图形。这种基于文本的应用程序称为控制台应用程序。除了在屏幕上打印文本外，这些应用程序还可以读取用户在键盘上输入的文本。因此，与用户的任何交流都以问答序列的形式进行（例如：是否要格式化硬盘（Y/N）？是否确定（Y/N）？等等）。在基于窗口的操作系统普及之前，这种基于文本的界面在文本编辑程序、电子表格、数学应用程序甚至游戏中都非常常见。这些游戏被称为基于文本的冒险游戏，它们以文本形式描述游戏世界。玩家随后可以输入命令与游戏世界互动，例如：`go\
    \ west`（向西走）、`pick up matches`（捡起火柴）或`Xyzzy`。此类早期游戏的例子有`Zork`和`Adventure`。尽管它们现在看起来可能过时了，但玩起来仍然很有趣！\n\
    \n如前一章所述，我们仍然可以编写控制台应用程序，即使是用像 Swift 这样的语言。虽然了解如何编写此类应用程序很有趣，但本书主要专注于使用图形进行现代游戏编程。\n\
    \n### 应用程序的类型\n\n控制台应用程序只是应用程序类型中的一种。另一种非常常见的类型是窗口应用程序。这种应用程序会显示一个包含窗口、按钮和其他图形用户界面（GUI）组件的屏幕。此类应用程序通常是事件驱动的：它对诸如点击按钮或选择菜单项等事件做出反应。\n\
    \n另一种应用程序是运行在手机或平板电脑上的 App。这类应用程序的屏幕空间通常有限，但提供了新的交互可能性，例如用于定位设备的 GPS、检测设备方向的传感器以及触摸屏。\n\
    \n在开发应用程序时，编写一个能在所有不同平台上运行的程序是相当具有挑战性的。创建窗口应用程序与创建 App 有很大不同，并且在不同类型的应用程序之间重用代码也很困难。因此，基于\
    \ Web 的应用程序正变得越来越流行。在这种情况下，应用程序存储在服务器上，用户通过 Web 浏览器运行程序。此类应用程序的例子很多：想想基于 Web 的电子邮件程序或社交网站。然而，创建一个纯基于\
    \ Web 的应用程序并不总能产生最快的代码。原生 App 通常要快得多。此外，通过基于 Web 的应用程序赚钱比通过 App 更难。一旦你创建了自己的游戏\
    \ App，将其发布到 App Store 就很容易了。读完本书后，你将能够自己创建这样的游戏 App。\n\n注意\n\n并非所有程序都严格属于某一种应用程序类型。一些\
    \ Windows 应用程序可能包含控制台组件，例如游戏引擎中的脚本接口。游戏通常也包含窗口组件，例如物品栏界面、配置菜单等。如今，程序的实际界限已变得不那么清晰。想象一个拥有数万名玩家的多人在线游戏，每个玩家在平板电脑上运行一个\
    \ App 或在一台台式电脑上运行一个应用程序，同时这些程序与一个同时在许多服务器上运行的复杂程序进行通信。在这种情况下，什么构成了程序？它又是什么类型的程序？\n\
    \n### 函数\n\n请记住，在命令式程序中，指令执行着程序的实际工作：它们一条接一条地被执行。这会改变内存和/或屏幕，从而让用户注意到程序正在执行某些操作。在`BackgroundColor`程序中，并非所有行都是指令。例如，下面这一行不是指令，而是函数定义的开始：\n\
    \n`override func didMoveToView(view: SKView) {`\n\n指令的一个例子是行`print(currentTime)`，它将当前系统时间打印到控制台。由于\
    \ Swift 是一种过程式语言，指令可以分组为函数或方法。在 Swift 中，指令不必是函数或方法的一部分。请看下面的程序：\n\n```\nimport\
    \ SpriteKit\n\nclass GameScene: SKScene {\n\n    let myLabel = SKLabelNode(text:\"\
    Hello, World!\")\n\n    override func didMoveToView(view: SKView) {\n        myLabel.position\
    \ = CGPoint(x: 100, y: 100)\n        addChild(myLabel)\n    }\n\n    override\
    \ func update(currentTime: NSTimeInterval) {\n        backgroundColor = UIColor.blueColor()\n\
    \    }\n\n}\n```\n\n如你所见，我将一条指令从`didMoveToView`方法中移出，并放在了类级别。虽然你不能总是这样做，但在本例中是允许的。在下一章中，我将更详细地讨论这一点。\n\
    \n函数和方法非常有用。它们避免了代码的重复，因为指令只存在于一个地方，并且允许程序员通过调用一个名称来轻松执行这些指令。使用花括号（`{`和`}`）将指令分组到一个函数中。这样一组分组在一起的指令块被称为函数体。在函数体上方，编写函数头。函数头示例如下：\n\
    \n`func printData()`\n\n函数头包含函数名称（本例中为`printData`）以及其他内容。作为程序员，你可以为函数选择任意名称。在某些情况下，函数名称已经为你指定了。请看下面的函数头：\n\
    \n`override func update(currentTime: NSTimeInterval)`\n\n你不能将名称（`update`）改为其他内容，因为此方法替换了在`SKScene`中定义的原始方法（因此方法头前面有`override`这个关键字）。你替换该函数是因为你想在更新`SKScene`中的游戏世界时执行一些不同于标准行为（即什么也不做）的操作，具体来说，你想改变背景颜色。\n\
    \n函数或方法的名称前面总是带有`func`这个词，并且在名称后面有一对圆括号。这些括号用于向函数内部执行的指令提供信息。例如，再次查看`update`的函数头。在此函数头中，圆括号内看到文本`currentTime:\
    \ NSTimeInterval`。这意味着`update`方法需要当前系统时间。这是合理的，因为如果你想计算游戏对象的速度（通常是在更新游戏世界时要做的事情），你需要知道经过了多少时间。\n"
- fmt: "# Syntax Diagrams\n\nProgramming in a language such as Swift can be difficult\
    \ if you don’t know the language’s rules. This book uses so-called syntax diagrams\
    \ to explain how the language is structured. The syntax of a programming language\
    \ refers to the formal rules that define what is a valid program (in other words,\
    \ a program that a compiler or interpreter can read). By contrast, the semantics\
    \ of a program refer to the actual meaning of it. To illustrate the difference\
    \ between syntax and semantics, look at the phrase “all your base are belong to\
    \ us.” Syntactically, this phrase isn’t valid (an interpreter of the English language\
    \ would definitely complain about it). However, the meaning of this phrase is\
    \ clear: you apparently lost all of your bases to an alien race speaking bad English.\n\
    \n**Note:** The phrase “all your base are belong to us” comes from the opening\
    \ cut-scene of the video game *Zero Wing* (1991, Sega Mega Drive) as a poor translation\
    \ of the original Japanese version. Since then, the phrase has appeared in my\
    \ articles, television series, movies, web sites, and books (such as this one!).\n\
    \nA compiler can check the syntax of a program: any program that violates the\
    \ rules is rejected. Unfortunately, a compiler can’t check whether the semantics\
    \ of the program correspond to what the programmer had in mind. So if a program\
    \ is syntactically correct, this is no guarantee that it’s semantically correct.\
    \ But if it isn’t even syntactically correct, it can’t run at all. Syntax diagrams\
    \ help you to visualize the rules of a programming language such as Swift. For\
    \ example, Figure [2-2](#A978-1-4842-0650-8_2_Chapter.html#Fig2) is a simplified\
    \ syntax diagram that shows how to define a function in Swift.\n\n![A978-1-4842-0650-8_2_Fig2_HTML.gif](A978-1-4842-0650-8_2_Fig2_HTML.gif)\n\
    \n**Figure 2-2.** The syntax diagram for a function expression\n\nYou can use\
    \ syntax diagrams to construct Swift code by starting at the top left of the diagram,\
    \ in this case at the words `function expression`, and following the arrows. When\
    \ you reach the gray dot, your piece of code is complete. Here you can clearly\
    \ see that a function definition starts with the `func` keyword, optionally preceded\
    \ by the word `override`; then you write the name of the function. After that,\
    \ you write parentheses. Between these parentheses, you can (optionally) write\
    \ any number of parameters, separated by commas. Next, you write a number of instructions,\
    \ all between braces. After that, you’re done because you’ve reached the gray\
    \ dot. Throughout this book, I use syntax diagrams to show how to structure your\
    \ code according to the syntactical rules of the Swift language.\n\n# Calling\
    \ a Function\n\nWhen an instruction like `print(\"Hello, World!\")` is executed,\
    \ you call the `print` function. In other words, you want the program to execute\
    \ the instructions grouped in the function `print`. This group of instructions\
    \ does exactly what you need for this example: namely, write text to the console.\
    \ You need to give some extra information to this function because it needs to\
    \ know what should be written to the console. The (in this case single) parameter\
    \ provides this extra information. A function can have more than one parameter,\
    \ as you saw in the syntax diagram. When a function is called, you always write\
    \ parentheses behind it, and within the parentheses are the parameters (if required).\n\
    \nDo you need to know which instructions are grouped together in the `print` function\
    \ in order to use it? No, you don’t! This is one of the nice things about grouping\
    \ instructions in functions. You (or other programmers) can use the function without\
    \ knowing how it works. By smartly grouping instructions in functions, it’s possible\
    \ to write reusable program pieces that can be used in many different contexts.\
    \ The `print` function is a good example of this. It can be used for various applications,\
    \ and you don’t need to know how the function works in order to use it. The only\
    \ thing you need to know is that you need to provide text as a parameter when\
    \ you call the function.\n\n# Program Layout\n\nThis section deals with the layout\
    \ of a program’s source code. You first see how to add clarifying comments to\
    \ your code. Then you learn how to write instructions as clearly as possible by\
    \ using single or multiple lines, whitespace, and indentation.\n\n## Comments\n\
    \nFor the human reader of a program (another programmer, or yourself in a couple\
    \ of months, when you’ve forgotten the details of how your program worked), it\
    \ can be very useful to add some clarifying comments to a program. These comments\
    \ are completely ignored by the compiler, but they make for a more understandable\
    \ program. There are two ways in Swift to mark comments in your code:\n\n- Everything\
    \ between the symbol combinations `/*` and `*/` is ignored (there can be multiple\
    \ lines of comments).\n- Everything between the symbol combination `//` and the\
    \ end of the line is ignored.\n\nIt’s useful to place comments in your code to\
    \ explain groups of instructions belonging together, the meaning of parameters,\
    \ or complete classes. If you use comments, do it to clarify the code, not to\
    \ write the code again in words: you can assume the reader of your code knows\
    \ Swift. To illustrate this, the following comment line adds to the clarity of\
    \ the instruction:\n\n```\n// Write the current system time to the console\nprint(currentTime)\n\
    ```\n\nThe following is also a comment, but it doesn’t clarify what the instruction\
    \ does:\n\n```\n/* Pass the currentTime value to the print function and execute\
    \ that function */\nprint(currentTime)\n```\n\nWhile testing your program, you\
    \ can also use comment symbols to temporarily remove instructions from the program.\
    \ Don’t forget to remove the parts of your code that are commented out once you\
    \ finish the program because they can lead to confusion when other developers\
    \ look at your source code.\n\n## Instructions vs. Lines\n\nThere are no strict\
    \ rules about how to distribute the text of a Swift program over the lines in\
    \ a text file. Usually you write every instruction on a separate line. Swift allows\
    \ you to write multiple instructions on a single line as long as you separate\
    \ them by semicolons. Sometimes, if it makes a program clearer, the programmer\
    \ writes multiple instructions on a single line. Also, sometimes a single instruction\
    \ that is very long (containing function/method calls and many different parameters)\
    \ can be distributed over multiple lines (you’ll see this later in this book).\
    \ Consider the following example:\n\n```\nlet myLabel = SKLabelNode(fontNamed:\"\
    Chalkduster\")\nmyLabel.text = \"Hello, World!\"; myLabel.fontSize = 65\nmyLabel.position\
    \ = CGPoint(x:CGRectGetMidX(self.frame),\n    y:CGRectGetMidY(self.frame))\n```\n\
    \nHere, the second line contains two instructions: one that changes the text on\
    \ the label, and one that changes the font size. In this case, writing these two\
    \ instructions on a single line is not such a bad idea. Both instructions are\
    \ rather short, and they both change some property of the label. But avoid grouping\
    \ too many instructions on a single line because it can result in unreadable code,\
    \ like the following:\n\n```\nlet myLabel = SKLabelNode(fontNamed:\"Chalkduster\"\
    ); myLabel.text = \"Hello, World!\"; myLabel.fontSize = 65; myLabel.position =\
    \ CGPoint(x:CGRectGetMidX(self.frame), y:CGRectGetMidY(self.frame))\n```"
  raw: '### Syntax Diagrams


    Programming in a language such as Swift can be difficult if you don’t know the
    language’s rules. This book uses so-called syntax diagrams to explain how the
    language is structured. The syntax of a programming language refers to the formal
    rules that define what is a valid program (in other words, a program that a compiler
    or interpreter can read). By contrast, the semantics of a program refer to the
    actual meaning of it. To illustrate the difference between syntax and semantics,
    look at the phrase “all your base are belong to us.” Syntactically, this phrase
    isn’t valid (an interpreter of the English language would definitely complain
    about it). However, the meaning of this phrase is clear: you apparently lost all
    of your bases to an alien race speaking bad English.


    Note


    The phrase “all your base are belong to us” comes from the opening cut-scene of
    the video game Zero Wing (1991, Sega Mega Drive) as a poor translation of the
    original Japanese version. Since then, the phrase has appeared in my articles,
    television series, movies, web sites, and books (such as this one!).


    A compiler can check the syntax of a program: any program that violates the rules
    is rejected. Unfortunately, a compiler can’t check whether the semantics of the
    program correspond to what the programmer had in mind. So if a program is syntactically
    correct, this is no guarantee that it’s semantically correct. But if it isn’t
    even syntactically correct, it can’t run at all. Syntax diagrams help you to visualize
    the rules of a programming language such as Swift. For example, Figure [2-2](#A978-1-4842-0650-8_2_Chapter.html#Fig2)
    is a simplified syntax diagram that shows how to define a function in Swift.


    ![A978-1-4842-0650-8_2_Fig2_HTML.gif](A978-1-4842-0650-8_2_Fig2_HTML.gif)


    Figure 2-2.


    The syntax diagram for a function expression


    You can use syntax diagrams to construct Swift code by starting at the top left
    of the diagram, in this case at the words function expression, and following the
    arrows. When you reach the gray dot, your piece of code is complete. Here you
    can clearly see that a function definition starts with the `func` keyword, optionally
    preceded by the word `override`; then you write the name of the function. After
    that, you write parentheses. Between these parentheses, you can (optionally) write
    any number of parameters, separated by commas. Next, you write a number of instructions,
    all between braces. After that, you’re done because you’ve reached the gray dot.
    Throughout this book, I use syntax diagrams to show how to structure your code
    according to the syntactical rules of the Swift language.


    ### Calling a Function


    When an instruction like `print("Hello, World!")` is executed, you call the `print`
    function. In other words, you want the program to execute the instructions grouped
    in the function `print`. This group of instructions does exactly what you need
    for this example: namely, write text to the console. You need to give some extra
    information to this function because it needs to know what should be written to
    the console. The (in this case single) parameter provides this extra information.
    A function can have more than one parameter, as you saw in the syntax diagram.
    When a function is called, you always write parentheses behind it, and within
    the parentheses are the parameters (if required).


    Do you need to know which instructions are grouped together in the `print` function
    in order to use it? No, you don’t! This is one of the nice things about grouping
    instructions in functions. You (or other programmers) can use the function without
    knowing how it works. By smartly grouping instructions in functions, it’s possible
    to write reusable program pieces that can be used in many different contexts.
    The `print` function is a good example of this. It can be used for various applications,
    and you don’t need to know how the function works in order to use it. The only
    thing you need to know is that you need to provide text as a parameter when you
    call the function.


    ## Program Layout


    This section deals with the layout of a program’s source code. You first see how
    to add clarifying comments to your code. Then you learn how to write instructions
    as clearly as possible by using single or multiple lines, whitespace, and indentation.


    ### Comments


    For the human reader of a program (another programmer, or yourself in a couple
    of months, when you’ve forgotten the details of how your program worked), it can
    be very useful to add some clarifying comments to a program. These comments are
    completely ignored by the compiler, but they make for a more understandable program.
    There are two ways in Swift to mark comments in your code:


    *   Everything between the symbol combinations `/*` and `*/` is ignored (there
    can be multiple lines of comments).

    *   Everything between the symbol combination `//` and the end of the line is
    ignored.


    It’s useful to place comments in your code to explain groups of instructions belonging
    together, the meaning of parameters, or complete classes. If you use comments,
    do it to clarify the code, not to write the code again in words: you can assume
    the reader of your code knows Swift. To illustrate this, the following comment
    line adds to the clarity of the instruction:


    `// Write the current system time to the console`


    `print(currentTime)`


    The following is also a comment, but it doesn’t clarify what the instruction does:


    `/* Pass the currentTime value to the print function and execute that function
    */`


    `print(currentTime)`


    While testing your program, you can also use comment symbols to temporarily remove
    instructions from the program. Don’t forget to remove the parts of your code that
    are commented out once you finish the program because they can lead to confusion
    when other developers look at your source code.


    ### Instructions vs. Lines


    There are no strict rules about how to distribute the text of a Swift program
    over the lines in a text file. Usually you write every instruction on a separate
    line. Swift allows you to write multiple instructions on a single line as long
    as you separate them by semicolons. Sometimes, if it makes a program clearer,
    the programmer writes multiple instructions on a single line. Also, sometimes
    a single instruction that is very long (containing function/method calls and many
    different parameters) can be distributed over multiple lines (you’ll see this
    later in this book). Consider the following example:


    `let myLabel = SKLabelNode(fontNamed:"Chalkduster")`


    `myLabel.text = "Hello, World!"; myLabel.fontSize = 65`


    `myLabel.position = CGPoint(x:CGRectGetMidX(self.frame),`


        `y:CGRectGetMidY(self.frame))`


    Here, the second line contains two instructions: one that changes the text on
    the label, and one that changes the font size. In this case, writing these two
    instructions on a single line is not such a bad idea. Both instructions are rather
    short, and they both change some property of the label. But avoid grouping too
    many instructions on a single line because it can result in unreadable code, like
    the following:


    `let myLabel = SKLabelNode(fontNamed:"Chalkduster"); myLabel.text = "Hello, World!";
    myLabel.fontSize = 65; myLabel.position = CGPoint(x:CGRectGetMidX(self.frame),
    y:CGRectGetMidY(self.frame))`'
  trans: "\n# 语法图\n\n如果你不了解一门语言的规则，使用 Swift 这样的语言进行编程可能会比较困难。本书使用所谓的语法图来解释语言的结构。编程语言的语法是指定义什么是有效程序（即编译器或解释器能够读取的程序）的正式规则。相比之下，程序的语义指的是其实际含义。为了说明语法和语义之间的区别，请看短语“all\
    \ your base are belong to us”。从语法上讲，这个短语无效（英语语言的解释器肯定会对此提出异议）。然而，这个短语的含义是明确的：你显然把你的所有基地都输给了一群说着蹩脚英语的外星种族。\n\
    \n**注意：** 短语“all your base are belong to us”源自视频游戏 *Zero Wing*（1991 年，世嘉 Mega\
    \ Drive）的开场动画，是对原始日文版的拙劣翻译。此后，这个短语出现在我的文章、电视剧、电影、网站和书籍（比如本书！）中。\n\n编译器可以检查程序的语法：任何违反规则的程序都会被拒绝。不幸的是，编译器无法检查程序的语义是否符合程序员的意图。因此，即使程序在语法上正确，也不能保证其在语义上正确。但如果程序连语法都不正确，它根本无法运行。语法图帮助你形象化地理解\
    \ Swift 等编程语言的规则。例如，图 2-2 是一个简化的语法图，展示了如何在 Swift 中定义一个函数。\n\n![A978-1-4842-0650-8_2_Fig2_HTML.gif](img/A978-1-4842-0650-8_2_Fig2_HTML.gif)\n\
    \n**图 2-2.** 函数表达式的语法图\n\n你可以使用语法图来构建 Swift 代码：从图的左上角开始，在本例中是 `function expression`\
    \ 这个词，然后沿着箭头走。当你到达灰色的圆点时，你的代码片段就完成了。在这里你可以清楚地看到，函数定义以 `func` 关键字开始，其前面可选地有 `override`\
    \ 这个词；然后你编写函数的名字。之后，你编写括号。在这些括号之间，你可以（可选地）编写任意数量的参数，用逗号分隔。接下来，你编写一些指令，全部放在花括号内。在那之后，你就完成了，因为你已经到达了灰色的圆点。在本书中，我将使用语法图来展示如何根据\
    \ Swift 语言的语法规则来组织你的代码。\n\n# 调用函数\n\n当执行像 `print(\"Hello, World!\")` 这样的指令时，你正在调用\
    \ `print` 函数。换句话说，你希望程序执行 `print` 函数中分组的指令。这组指令正好满足这个示例的需要：即向控制台写入文本。你需要向这个函数提供一些额外信息，因为它需要知道应该向控制台写入什么。（在这种情况下，单一的）参数提供了这个额外信息。如你在语法图中所见，一个函数可以有不止一个参数。当调用一个函数时，你总是在它后面写上括号，而括号内就是参数（如果需要的话）。\n\
    \n要使用 `print` 函数，你是否需要知道哪些指令被分组在一起？不，你不需要！这是将指令分组到函数中的好处之一。你（或其他程序员）可以在不了解其工作原理的情况下使用该函数。通过巧妙地将指令分组到函数中，可以编写出可重用的程序片段，并在多种不同的场景中使用。`print`\
    \ 函数就是一个很好的例子。它可以用于各种应用程序，并且你不需要知道该函数如何工作就能使用它。你唯一需要知道的是，当你调用该函数时，需要提供文本作为参数。\n\
    \n# 程序布局\n\n本节讨论程序源代码的布局。你首先会看到如何向代码中添加清晰的注释。然后你将学习如何通过使用单行或多行、空白和缩进，尽可能清晰地编写指令。\n\
    \n## 注释\n\n对于程序的人类读者（另一个程序员，或者几个月后当您忘记程序工作细节时的自己）来说，向程序添加一些说明性的注释是非常有用的。这些注释完全被编译器忽略，但它们能使程序更易于理解。在\
    \ Swift 中，有两种标记代码注释的方法：\n\n-   符号组合 `/*` 和 `*/` 之间的所有内容都将被忽略（可以是多行注释）。\n-   符号组合\
    \ `//` 到行尾之间的所有内容都将被忽略。\n\n在你的代码中放置注释来解释属于同一组的指令、参数的含义或完整的类是非常有用的。如果你使用注释，请用它来阐明代码，而不是用文字重写代码：你可以假设你的代码读者懂\
    \ Swift。为了说明这一点，下面的注释行增加了指令的清晰度：\n\n```\n// 将当前系统时间写入控制台\nprint(currentTime)\n\
    ```\n\n下面也是一条注释，但它并没有阐明指令的作用：\n\n```\n/* 将 currentTime 值传递给 print 函数并执行该函数 */\n\
    print(currentTime)\n```\n\n在测试程序时，你也可以使用注释符号来临时从程序中移除指令。在完成程序后，不要忘记删除代码中被注释掉的部分，因为当其他开发者查看你的源代码时，它们可能会导致混淆。\n\
    \n## 指令与行\n\n关于如何将 Swift 程序的文本分布到文本文件的行中，没有严格的规则。通常，你将每条指令写在单独的一行。Swift 允许你在同一行中编写多条指令，只要用分号将它们分隔开。有时，为了使程序更清晰，程序员会在同一行中编写多条指令。另外，有时一条非常长的指令（包含函数/方法调用和许多不同的参数）可以分布在多行中（你将在本书后面看到这一点）。考虑以下示例：\n\
    \n```\nlet myLabel = SKLabelNode(fontNamed:\"Chalkduster\")\nmyLabel.text = \"\
    Hello, World!\"; myLabel.fontSize = 65\nmyLabel.position = CGPoint(x:CGRectGetMidX(self.frame),\n\
    \    y:CGRectGetMidY(self.frame))\n```\n\n在这里，第二行包含两条指令：一条修改标签上的文本，另一条修改字体大小。在这种情况下，将这两条指令写在单独一行算不上一个坏主意。两条指令都相当简短，并且它们都修改了标签的某个属性。但应避免将过多指令放在同一行，因为这可能导致代码不可读，如下所示：\n\
    \n```\nlet myLabel = SKLabelNode(fontNamed:\"Chalkduster\"); myLabel.text = \"\
    Hello, World!\"; myLabel.fontSize = 65; myLabel.position = CGPoint(x:CGRectGetMidX(self.frame),\
    \ y:CGRectGetMidY(self.frame))\n```\n"
- fmt: '### Whitespace and Indentation


    As you can see, the `BackgroundColor` example uses whitespace liberally. There
    is an empty line between each method, as well as spaces between each equals sign
    and the expressions on either side of it. Spacing can help to clarify the code
    for the programmer. For the compiler, spaces have no meaning. The only place where
    a space is really important is between separate words: you aren’t allowed to write
    `func update()` as `funcupdate()`. And similarly, you aren’t allowed to write
    an extra space in the middle of a word. In text that is interpreted literally,
    spaces are also taken literally. There is a difference between


    ```

    print("blue")

    ```


    and


    ```

    print("b l u e")

    ```


    But apart from this, extra spaces are allowed everywhere. The following are good
    places to put extra whitespace:


    *   Behind every comma and semicolon (but not before)

    *   Left and right of the equals sign (`=`), as in the following:


    ```

    backgroundColor = UIColor.blueColor()

    ```


    *   At the beginning of lines, so the bodies of methods and classes are indented
    (usually four spaces) with respect to the braces enclosing the body


    You will notice that as soon as you start editing code, Xcode will do some code
    formatting for you automatically, such as correctly indenting code or placing
    the opening and closing braces at standard positions.


    ## What You Have Learned


    In this chapter, you have learned the following:


    *   That the skeleton of a game consists of the game loop and the game world the
    loop acts on

    *   How to structure a game program consisting of a few different methods that
    initialize and update the game world

    *   The basic layout rules of a Swift program, including how to place comments
    in your code and where to put extra whitespace to improve readability of the code


    # 3. Creating a Game World


