  raw: '## Accessing Other Objects Using Static Variables


    One of the main issues of splitting code between classes is that somehow you are
    going to need access to other objects in the game. These objects (such as a ball
    or a paint can) are stored as properties in a class. In order to access those
    properties, you need an instance of the class, which in turn is stored somewhere
    else. This leads to a large chain of objects belonging to other objects belonging
    to other objects. Somehow, you need to write your code in such a way that there
    is a root object, from which you access everything else.


    Let’s first start by creating an object that represents the game world. In the
    Painter5 example, you can see that there is a class called `GameWorld`. This class
    contains all the properties related to the game world, and it makes sure that
    any game loop methods are called on the objects as needed. If you can somehow
    make an instance of `GameWorld` that can be accessed anywhere, then the problem
    of the endless chain of objects is solved.


    There are several ways in Swift to do this. One way is to create a so-called class
    property (sometimes called type property). A class property is different from
    a regular property in that it is not attached to an object, but to a class. Take
    a look at the following simple example:


    `class Car {`


        `static var nrOfCars: Int = 0`


        `var nrOfSeats: Int = 4`


        `init() {`


            `Car.nrOfCars++`


        `}`


    `}`


    As you can see, one property (`nrOfCars`) has the keyword `static` in front of
    it. Now look at the following instruction:


    `Car.nrOfCars++`


    In order to access the variable, you do not need an actual instance of `Car`.
    The property is bound to the class itself. This also means that it doesn’ t matter
    how many cars you create; there will always be a single place in memory that `Car.nrOfCars`
    refers to. In the `init` method, the class property `nrOfCars` is incremented.
    As a result, you can now use this property to keep track of how many `Car` objects
    have been created.


    You can apply the class property principle to create an instance of `GameWorld`
    inside the `GameScene` class:


    `static var world = GameWorld()`


    Since `world` is a class property of `GameScene`, you access it by writing `GameScene.world`.
    Then, once you have the instance, you can access its properties. For example,
    you could write the following instruction in the `updateDelta` method of `Ball`:


    `red.hidden = GameScene.world.cannon.red.hidden`


    Another name for class property is static variable, which is the term used in
    programming languages such as Java or C# (which explains the use of the `static`
    keyword to define a class property in Swift).


    ## The Double Role of Classes


    There are two roles of classes in a program. The first is that a class groups
    methods that belong together. The second role is that a class represents a type.
    One could also say that a class is a blueprint for an object, and as such it describes
    two things:


    *   The data that is contained within an object. In the case of balls, this data
    consists of a node, a velocity, sprites that represent each color, and a variable
    indicating whether the ball is shooting. An initializer sets up an instance of
    the class.

    *   The methods that manipulate the data. In the `Ball` class, these methods are
    the game-loop methods (`handleInput` and `updateDelta`).


    The concept of classes and objects is extremely powerful. It forms the basis of
    the object-oriented programming paradigm. Swift is a very flexible language, in
    that it doesn’t oblige you to use classes. You could write code using only functions
    and global variables if you wanted to. But because classes are such a powerful
    programming concept and are widely used in the (game) industry, this book exploits
    them as much as possible. The SpriteKit framework is heavily built upon the object-oriented
    paradigm, as are many other libraries or engines targeted towards game development.
    By learning how to properly use classes, you can design much better software,
    in any object oriented programming language. For an overview of the role of a
    class, and how it is connected with other programming concepts, see Figure [7-1](#A978-1-4842-0650-8_7_Chapter.html#Fig1).


    ![A978-1-4842-0650-8_7_Fig1_HTML.gif](A978-1-4842-0650-8_7_Fig1_HTML.gif)


    Figure 7-1.


    The two roles of the class concept Note


    When programming games, you often have to make a trade-off between how long it
    takes to do something and how often you do it. In the case of Painter, if you’re
    only ever going to create one or two balls, then it might not be worth going through
    the trouble of creating a separate class for the balls. However, it’s often the
    case that things scale up slowly. Before you know it, you’re copying and pasting
    dozens of lines of code because you didn’t create an easier way to do it once.
    When you design your classes, consider the long-term gains of a proper design,
    even if that requires a short-term sacrifice such as having to do some extra programming
    work to make the class design more generic.'
  trans: "\n## 使用静态变量访问其他对象\n\n将代码拆分到不同类之间的主要问题之一，就是你将需要访问游戏中的其他对象。这些对象（例如球或油漆桶）作为属性存储在类中。要访问这些属性，你需要该类的一个实例，而该实例又存储在别处。这就导致了一个庞大的对象链，一个对象属于另一个对象，另一个对象又属于其他对象。你需要以某种方式编写代码，使其有一个根对象，然后你可以从这个根对象访问其他所有内容。\n\
    \n我们首先创建一个代表游戏世界的对象。在 Painter5 示例中，你可以看到一个名为 `GameWorld` 的类。这个类包含了与游戏世界相关的所有属性，并确保所有游戏循环方法在需要时都能在对象上被调用。如果你能创建一个可以在任何地方访问的\
    \ `GameWorld` 实例，那么无休止的对象链问题就解决了。\n\n在 Swift 中有几种方法可以做到这一点。其中一种方法是创建一个所谓的类属性（有时也称为类型属性）。类属性与常规属性的不同之处在于，它不依附于对象，而是依附于类。请看下面的简单示例：\n\
    \n```\nclass Car {\n    static var nrOfCars: Int = 0\n    var nrOfSeats: Int =\
    \ 4\n    init() {\n        Car.nrOfCars++\n    }\n}\n```\n\n如你所见，其中一个属性（`nrOfCars`）前面有关键字\
    \ `static`。现在看下面的指令：\n\n```\nCar.nrOfCars++\n```\n\n要访问这个变量，你并不需要实际的 `Car` 实例。该属性是绑定到类本身的。这也意味着无论你创建了多少辆汽车，内存中始终只有一个位置指向\
    \ `Car.nrOfCars`。在 `init` 方法中，类属性 `nrOfCars` 会增加。因此，你现在可以使用这个属性来跟踪创建了多少个 `Car`\
    \ 对象。\n\n你可以应用类属性的原理，在 `GameScene` 类中创建一个 `GameWorld` 实例：\n\n```\nstatic var world\
    \ = GameWorld()\n```\n\n由于 `world` 是 `GameScene` 的一个类属性，你可以通过 `GameScene.world`\
    \ 来访问它。之后，一旦有了这个实例，你就可以访问它的属性。例如，你可以在 `Ball` 的 `updateDelta` 方法中编写以下指令：\n\n```\n\
    red.hidden = GameScene.world.cannon.red.hidden\n```\n\n类属性的另一个名称是静态变量，这是 Java\
    \ 或 C# 等编程语言中使用的术语（这也解释了为什么在 Swift 中使用 `static` 关键字来定义类属性）。\n\n## 类的双重角色\n\n类在程序中有两个角色。第一个角色是，类将属于一起的方法进行分组。第二个角色是，类代表一种类型。也可以说，类是对象的蓝图，因此它描述了两件事：\n\
    \n*   对象中包含的数据。以球为例，这些数据包括一个节点、一个速度、代表每种颜色的精灵，以及一个指示球是否正在发射的变量。初始化器用于建立该类的一个实例。\n\
    *   操作数据的方法。在 `Ball` 类中，这些方法是游戏循环方法（`handleInput` 和 `updateDelta`）。\n\n类和对象的概念极其强大，构成了面向对象编程范式的基础。Swift\
    \ 是一种非常灵活的语言，它不强制你使用类。如果你想，你可以仅使用函数和全局变量来编写代码。但由于类是一种非常强大的编程概念，并且在（游戏）行业中广泛使用，本书将尽可能地利用它们。SpriteKit\
    \ 框架在很大程度上建立在面向对象范式之上，许多其他针对游戏开发的库或引擎也是如此。通过学习如何正确使用类，你可以在任何面向对象编程语言中设计出更好的软件。关于类的角色及其与其他编程概念的联系，请参见图\
    \ 7-1。\n\n![A978-1-4842-0650-8_7_Fig1_HTML.gif](img/A978-1-4842-0650-8_7_Fig1_HTML.gif)\n\
    \n图 7-1。\n\n类概念的双重角色 注意\n\n在编写游戏程序时，你经常需要在完成某件事所需的时间和执行的频率之间做出权衡。以 Painter 为例，如果你只打算创建一两个球，那么为球单独创建一个类可能不值得费心。然而，事情通常都是慢慢扩大的。在你意识到之前，你可能就因为当初没有创建一个更简单的方法来一次性完成，而需要复制粘贴几十行代码。在设计类时，请考虑一个合理设计所带来的长期收益，即使这需要一些短期的牺牲，例如需要额外做点编程工作以使类设计更加通用。\n"
- fmt: "# Writing a Class with Multiple Instances\n\nAs the final step in this chapter,\
    \ let’s add a few paint cans to the Painter game. These paint cans should be given\
    \ a random color, and they should fall down from the top of the screen. Once they\
    \ have fallen out of the bottom of the screen, you assign a new color to them\
    \ and move them back to the top. For the player, it seems as though different\
    \ paint cans are falling each time. Actually, you need only three paint can objects\
    \ that are reused. In the `PaintCan` class, you define what a paint can is and\
    \ its behaviors. Then, you can create multiple instances of this class. In the\
    \ `GameWorld` class, you store these instances in three different properties.\
    \ Here is a complete list of the stored properties in `GameWorld`:\n\n`var node\
    \ = SKNode()`\n\n`var background = SKSpriteNode(imageNamed: \"spr_background\"\
    )`\n\n`var cannon = Cannon()`\n\n`var ball = Ball()`\n\n`var can1 = PaintCan(pOffset:\
    \ -10)`\n\n`var can2 = PaintCan(pOffset: 190)`\n\n`var can3 = PaintCan(pOffset:\
    \ 390)`\n\nIn the `GameWorld` initializer, you set up the game world by adding\
    \ all the game objects to the node:\n\n```\ninit() {\n    background.zPosition\
    \ = 0\n    node.addChild(background)\n    node.addChild(cannon.node)\n    node.addChild(ball.node)\n\
    \    node.addChild(can1.node)\n    node.addChild(can2.node)\n    node.addChild(can3.node)\n\
    }\n```\n\nA difference between the `PaintCan` class and the `Ball` and `Cannon`\
    \ classes is that paint cans have different positions. This is why you pass along\
    \ a coordinate value as a parameter when the paint cans are created. This value\
    \ indicates the desired x-position of the paint can. The y-position doesn’t have\
    \ to be provided, because it will be calculated based on the y-velocity of each\
    \ paint can. In order to make things more interesting, you let the cans fall with\
    \ different, random velocities. (How you do that is explained later in this chapter.)\
    \ In order to calculate this velocity, you want to know the minimum velocity a\
    \ paint can should have, so it doesn’t fall too slowly. To do this, you add a\
    \ property `minVelocity` that contains the value. As a result, these are the properties\
    \ belonging to the `PaintCan` class:\n\n`var node = SKNode()`\n\n`var red = SKSpriteNode(imageNamed:\
    \ \"spr_can_red\")`\n\n`var green = SKSpriteNode(imageNamed: \"spr_can_green\"\
    )`\n\n`var blue = SKSpriteNode(imageNamed: \"spr_can_blue\")`\n\n`var velocity\
    \ = CGPoint.zeroPoint`\n\n`var positionOffset = CGFloat(0)`\n\n`var minVelocity\
    \ = CGFloat(40)`\n\nJust like the cannon and the ball, a paint can has a certain\
    \ color. By default, you choose the red paint can sprite. Initially, you set the\
    \ y-position of the paint can such that it’s drawn just outside the top of the\
    \ screen, so that later in the game, you can see it fall. In the `GameWorld` initializer,\
    \ you create three `PaintCan` objects, each with a different x-position.\n\nBecause\
    \ the paint cans don’t handle any input (only the ball and the cannon do this),\
    \ you don’t need a `handleInput` method for this class. However, the paint cans\
    \ do need to be updated. One of the things you want to do is to have the paint\
    \ cans fall at random moments and at random speeds. But how can you do this?\n\
    \n# Dealing with Randomness in Games\n\nOne of the most important parts of the\
    \ paint can behavior is that some aspects of it should be unpredictable. You don’t\
    \ want every can falling at a predictable speed or time. You want to add a factor\
    \ of randomness so that every time the player starts a new game, the game will\
    \ be different. Of course, you also need to keep this randomness in control. You\
    \ don’t want one can to take three hours to fall from top to bottom while another\
    \ can takes only one millisecond. The speed should be random, but within a playable\
    \ range of speeds.\n\nWhat does randomness actually mean? Generally, random events\
    \ or values in games and other applications are managed by a random number generator.\
    \ In Swift, there is a function called `arc4random()` that returns a random positive\
    \ integer value each time you call it:\n\n`var i = arc4random()`\n\n`/* i now\
    \ contains a random integer value in the range 0 – Uint32.max (= 4294967295) */`\n\
    \nHow does a computer generate a completely random number? Isn’t a computer a\
    \ deterministic device that can only execute programs consisting of predetermined\
    \ instructions? Indeed, theoretically, in game worlds and computer programs, you\
    \ can predict precisely what is going to happen because a computer can only do\
    \ exactly what you tell it to do. Therefore, strictly speaking, a computer isn’t\
    \ capable of producing a completely random number. One way to pretend that you\
    \ can produce random numbers is by picking a number from a predefined, very large\
    \ table of numbers. Because you aren’t really producing random numbers, this is\
    \ called a pseudo-random number generator. Sometimes random number generators\
    \ can generate a number in a range, such as between 0 and 1, but they often can\
    \ also generate an arbitrary number or a number in another range. Every number\
    \ within the range has an equal chance of being generated. In statistics, such\
    \ a distribution is called a uniform distribution.\n\nSuppose that when you start\
    \ a game, you begin generating “random” numbers by walking through the table.\
    \ Because the number table doesn’t change, every time you play the game, the same\
    \ sequence of random numbers is generated. In order to avoid this problem, some\
    \ random number generators allow you to indicate in the beginning that you want\
    \ to start at a different position in the table. The position where you start\
    \ in the table is also called the seed of the random number generator. Often,\
    \ you take a value for the seed that is different every time you start the program,\
    \ such as the current system time. In case of the `arc4random` function, you don’t\
    \ have to provide a seed value, since the function does it automatically for you.\n\
    \nHow do you use a random number generator to create randomness in your game world?\
    \ Suppose you want to spawn an enemy 75% of the times that a user steps through\
    \ a door. In that case, you generate a random number between 0 and 1. If the number\
    \ is less than or equal to 0.75, you spawn an enemy; otherwise, you don’t. Because\
    \ of the uniform distribution, this will lead exactly to the behavior that you\
    \ require. The following Swift code illustrates this:\n\n```\nvar spawnEnemyProbability\
    \ = CGFloat(arc4random()) / CGFloat(UInt32.max)\nif spawnEnemyProbability >= 0.75\
    \ {\n    // spawn an enemy\n} else {\n    // do something else\n}\n```\n\nIn this\
    \ example, you first convert the random number to a floating-point value. Then,\
    \ you divide it by a constant `UInt32.max`, which represents the maximum value\
    \ that a 32-bit integer can represent. As a result, the value of `spawnEnemyProbability`\
    \ will always be in the range between 0 and 1.\n\nLet’s look at another example.\
    \ Suppose you want to calculate a random speed between 0.5 and 1. To achieve this,\
    \ you generate a random number between 0 and 1, divide this number by 2, and add\
    \ 0.5, like so:\n\n```\nvar randomNr = CGFloat(arc4random()) / CGFloat(UInt32.max)\n\
    var newSpeed = randomNr / 2 + 0.5\n```\n\nIn order to make generating random number\
    \ easier, Painter5 contains the following function (defined in the `PaintCan.swift`\
    \ file):"
