  trans: "\n# 添加声音与音乐\n\n让游戏更有趣的另一个方法是添加一些声音。这款游戏同时使用了背景音乐和音效。为了让 Swift 中的声音处理更简单，我们添加了一个`Sound`类，它可以用来播放和循环播放声音。以下是该类的一部分（完整类请参见\
    \ PainterFinal 示例）：\n\n```\nclass Sound {\n    var audioPlayer = AVAudioPlayer()\n\
    \    init(_ fileName: String) {\n        let soundURL = NSBundle.mainBundle().URLForResource(fileName,\
    \ withExtension: \"mp3\")\n        audioPlayer = try! AVAudioPlayer(contentsOfURL:\
    \ soundURL!)\n    }\n    ...\n}\n```\n\n该类包含一个名为`audioPlayer`的存储属性，负责播放声音。在初始化方法中，我们根据传入的文件名参数创建一个新的音频播放器对象。创建`AVAudioPlayer`对象的语法可能看起来有点陌生。创建`AVAudioPlayer`对象可能会产生错误（例如，如果找不到声音文件）。Swift\
    \ 强制你选择是处理还是忽略这类错误。由于这类错误处理超出了本书范围，我使用`try!`来忽略可能发生的任何错误。\n\n现在让我们为`Sound`类添加一些功能，让播放各种声音变得更简单。许多游戏都需要的一个功能是循环播放声音的选项。通常，背景音乐应该循环播放；而音效（例如发射颜料球）则不必循环。\n\
    \n`Sound`类包含一个（计算）属性`looping`，用于指示声音是否应该循环播放。你可以通过将`audioPlayer`对象中的`numberOfLoops`属性设置为适当的值来循环播放声音。如果选择值为\
    \ 0，声音将不会循环播放（这正是音效需要的效果）。正值表示声音应该循环播放的次数。值为-1 则会使声音无限循环，直到程序结束（这是背景音乐的好选择）。以下是完整的属性：\n\
    \n```\nvar looping: Bool {\n    get {\n        return audioPlayer.numberOfLoops\
    \ < 0\n    }\n    set {\n        if newValue {\n            audioPlayer.numberOfLoops\
    \ = -1\n        } else {\n            audioPlayer.numberOfLoops = 0\n        }\n\
    \    }\n}\n```\n\n我们再添加一个属性来改变正在播放的声音的音量。这特别有用，因为通常你希望音效比背景音乐更响亮。在某些游戏中，玩家可以调整这些音量（稍后本书会介绍如何实现）。每当你在游戏中引入声音时，一定要确保提供音量控制，至少要有静音控制。无法静音的游戏会通过用户评论招致愤怒玩家的声讨！以下是`volume`属性，它很直接：\n\
    \n```\nvar volume: Float {\n    get {\n        return audioPlayer.volume\n   \
    \ }\n    set {\n        audioPlayer.volume = newValue\n    }\n}\n```\n\n最后，我们添加一个名为`play`的方法，它做两件事。首先，它将声音的播放起始位置设置在最开始（即时间\
    \ 0 处）。然后，它在`audioPlayer`对象上调用`play`方法：\n\n```\nfunc play() {\n    audioPlayer.currentTime\
    \ = 0\n    audioPlayer.play()\n}\n```\n\n现在你可以使用`Sound`类轻松地在游戏中加载和播放各种声音。在 Painter\
    \ 游戏中，既有背景音乐也有音效。对于你想要播放的每个特定声音，你需要在使用的类中添加一个属性。例如，对于背景音乐，我们在`GameWorld`中添加了以下属性：\n\
    \n```\nvar backgroundMusic = Sound(\"snd_music\")\n```\n\n在初始化方法中，我们以较低的音量开始循环播放背景音乐，如下所示：\n\
    \n```\nbackgroundMusic.looping = true\nbackgroundMusic.volume = 0.5\nbackgroundMusic.play()\n\
    ```\n\n你还需要播放音效。例如，当玩家发射球时，他们希望能听到声音！因此，当玩家开始发射球时，我们播放这个音效。在`Ball`类中，我们添加一个属性来表示音效：\n\
    \n```\nvar shootPaintSound = Sound(\"snd_shoot_paint\")\n```\n\n然后，当球被发射时播放声音，这在`Ball`类的`handleInput`方法中处理：\n\
    \n```\nif (!inputHelper.isTouching && readyToShoot && self.hidden) {\n    self.hidden\
    \ = false\n    readyToShoot = false\n    velocity.x = (inputHelper.touchLocation.x\
    \ -\n        GameScene.world.cannon.position.x) * 1.4\n    velocity.y = (inputHelper.touchLocation.y\
    \ -\n        GameScene.world.cannon.position.y) * 1.4\n    shootPaintSound.play()\n\
    }\n```\n\n类似地，当正确颜色的颜料罐掉出屏幕时，也会播放一个声音（实际代码请参见 PainterFinal 示例中的`PaintCan`类）。\n\
    \n# 维护分数\n\n分数通常是激励玩家继续玩游戏的非常有效的方式。高分榜在这方面尤为有效，因为它为游戏引入了竞争因素：你希望比 AAA 或 XYZ 做得更好（许多早期街机游戏只允许在高分榜中每个名字使用三个字符，从而催生了非常富有想象力的名字）。高分榜如此有激励作用，以至于有些第三方系统专门将其集成到游戏中。这些系统允许用户将自己与世界各地成千上万的其他玩家进行比较。在\
    \ Painter 游戏中，我们保持简单，在`GameWorld`类中添加了`score`属性来存储当前分数：\n\n```\nvar score = 0\n\
    ```\n\n玩家从零分开始。每次颜料罐掉出屏幕时，分数就会更新。如果一个正确颜色的颜料罐掉出屏幕，则加 10 分。如果颜色不对，玩家就会失去一条命。\n\n\
    分数是所谓游戏经济的一部分。游戏经济基本上描述了游戏中不同的成本与收益以及它们之间的互动关系。当你制作自己的游戏时，思考其经济结构总是很有用的。各种事物消耗什么成本？玩家执行不同行动会获得什么收益？这两者之间是否平衡？\n\
    \n我们在`PaintCan`类中更新分数，在这里可以检查颜料罐是否掉出屏幕。如果是，则检查它的颜色是否正确，并相应地更新分数和玩家的生命数。然后隐藏`PaintCan`对象，以便它可以再次落下，如下所示：\n\
    \n```\nlet top = CGPoint(x: self.position.x, y: self.position.y + red.size.height/2)\n\
    if GameScene.world.isOutsideWorld(top) {\n    if color != targetColor {\n    \
    \    GameScene.world.lives -= 1\n    } else {\n        GameScene.world.score +=\
    \ 10\n        collectPointsSound.play()\n    }\n    self.hidden = true\n}\n```\n\
    \n在这段代码中，你还可以看到，每当正确颜色的颜料罐掉出屏幕时，会播放一个存储在`collectPointsSound`属性中的音效。\n"
