    `c = d` 的结果是，变量 `d` 中存储的值也被存储到变量 `c` 中。因为变量 `d` 包含值 15，在指令执行后，变量 `c` 也包含值 15。最后一条指令获取变量
    `age` 中存储的值（16），将其加 12，然后将结果存储在变量 `numberOfBananas` 中（现在它的值是 28——好多香蕉！）。总之，在这些指令执行后，内存的状态大致如图
