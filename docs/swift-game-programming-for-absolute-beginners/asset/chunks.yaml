- fmt: "# Handling Physics Contacts\n\nBefore concluding this chapter, let’s take\
    \ a look at the final part of the gameplay: handling contact between treasures.\
    \ In the previous chapter, you saw how to add physical behavior to game objects.\
    \ You also saw that contacts can be handled if you define a particular method\
    \ inside the `GameWorld` class, which implements the `SKPhysicsContactDelegate`\
    \ protocol:\n\n```\nfunc didBeginContact(contact: SKPhysicsContact) {\n    let\
    \ firstBody = contact.bodyA.node as? Treasure\n    let secondBody = contact.bodyB.node\
    \ as? Treasure\n    // handle contact between the two bodies here\n}\n```\n\n\
    You handle the contact between the two bodies by looking at a few different cases.\
    \ The first case is that the casting of the body nodes to `Treasure` instances\
    \ was not successful. This happens if one of the bodies actually is not a treasure\
    \ at all (instead, for example, a wall). In that case, you simply return from\
    \ the method because you don’t have to do anything in particular when a treasure\
    \ collides with a wall:\n\n```\nif firstBody == nil || secondBody == nil {\n \
    \   return\n}\n```\n\nIf two objects collide and they are of the same type (or\
