    you show the title screen and the state in which you’re playing the game:


    `if !titleScreen.hidden {`


        `if inputHelper.hasTapped {`


            `titleScreen.hidden = true`


            `self.runAction(totalAction)`


        `}`


    `} ... else {`


        `super.handleInput(inputHelper)`


        `...`


    `}`


    Looking at the `if` instructions, you can see that if the title screen is visible,
    the game reacts only when the player taps on the screen. In that case, you set
    the title screen’s hidden flag to `true` so it isn’t drawn anymore. Also, you
    start the action that drops a treasure every few seconds. As a result, whenever
    the title screen is visible, the only thing the game reacts to is the player touching
    the screen. If the title screen isn’t visible, you call the `handleInput` method
    of the super class; in other words, the game reacts to the player as it should
    when the player is playing the game.


    You follow very much the same procedure for the `updateDelta` method, where you
    update the game world only if the title isn’t visible:


    `if titleScreen.hidden {`


        `super.updateDelta(delta)`


    `}`


    When a player starts the game, they now see a title screen before the game starts
    (see Figure [15-1](#A978-1-4842-0650-8_15_Chapter.html#Fig1)). You aren’t done
    yet. In the next section, you add a simple button GUI element that shows a help
    frame.


    ![A978-1-4842-0650-8_15_Fig1_HTML.jpg](A978-1-4842-0650-8_15_Fig1_HTML.jpg)


    Figure 15-1.


    The Tut’s Tomb title screen


    ## Adding a Button to Show a Help Frame


    This section explains how to add a button to a game, which you use to display
    a help frame. To do that, you add another class, `Button`, to the program. You
    inherit from the `GameObjectNode` class and add some simple behavior that checks
    whether the player pressed a button. In the `Button` class, you declare a Boolean
    property that indicates whether the button was tapped. Then you override the `handleInput`
    method to check whether the player has tapped on the button on the screen. If
    the touching position is within the boundaries of the button sprite at that time,
    you know the player has tapped on the button, and you set the value of the property
    to `true`. How can you check whether the touch position is within the boundaries
    of the sprite? By using the `box` property of the `GameObjectNode` class and use
    the `containsTap` method in the `InputHelper` class. Here is the complete `handleInput`
    method of `Button`:


    `override func handleInput(inputHelper: InputHelper) {`


        `super.handleInput(inputHelper)`


        `tapped = inputHelper.containsTap(self.box)`


    `}`


    For the complete `Button` class, see the TutsTomb4 example. Now let’s add a Help
    button to the game world. In the `GameWorld` class, you add a property to represent
    the Help button:


    `var helpbutton = Button(imageNamed: "spr_button_help")`


    The next step is to position the Help button on the screen and add it to the game
    world. In Tut’s Tomb, the Help button should always be shown in the top right
    of the screen, regardless of the device that is used. To write the code that achieves
    this, you add a method called `topRight` to the `GameWorld` class that calculates
    the position corresponding to the top right of the screen:


    `func topRight() -> CGPoint {`


        `return CGPoint(x: size.width/2, y: size.height/2)`


    `}`


    Using this method, you can now calculate the desired position of the Help button:


    `var helppos = topRight()`


    `helppos.x -= helpbutton.sprite.size.width/2 + 10`


    `helppos.y -= helpbutton.sprite.size.height/2 + 10`


    Because the origin of a sprite is its center by default, you need to subtract
    half of the help button sprite width and height of the top right position. You
    subtract another 10 pixels so that there is a slight margin between the button
    and the edges of the screen.


    Because you want to display a help frame when the player presses the Help button,
    you also add a help frame to the game world. You set its hidden flag to `true`
    so it isn’t yet visible:


    `var helpframe = SKSpriteNode(imageNamed: "spr_help")`


    `helpframe.zPosition = Layer.` `Overlay2`


    `helpframe.hidden = true`


    Now you have to make sure that when the player taps the help button, the help
    frame is shown. You can do this using the following `if` instruction in the `handleInput`
    method of the `GameWorld` class:


    `if helpbutton.tapped  {`


        `helpframe.hidden = false`


        `self.removeAllActions()`


    `}`


    You have to make sure the game isn’t updated when the help frame is displayed.
    This is partly done by calling the `removeAllActions` method, which disables the
    action that drops treasures. You also need to make sure that game objects are
    only updated if the help frame isn’t visible. Therefore, you change the `updateDelta`
    method of the `GameWorld` class as follows:


    `if titleScreen.hidden && helpframe.hidden {`


        `super.updateDelta(delta)`


    `}`


    Figure [15-2](#A978-1-4842-0650-8_15_Chapter.html#Fig2) shows the game when the
    help frame is displayed.


    ![A978-1-4842-0650-8_15_Fig2_HTML.jpg](A978-1-4842-0650-8_15_Fig2_HTML.jpg)


    Figure 15-2.


    Screenshot of the help frame display in the game'
  trans: "\n# 添加标题画面\n\n让游戏看起来更完整的第一步就是添加标题画面。标题画面能让玩家做好准备再开始游戏，而不是直接进入游戏。你可以扩展 `GameWorld`\
    \ 类，使其能够加载并显示由单张图片构成的标题画面。为此，你需要创建一个 `SKSpriteNode` 实例，并将其添加到游戏世界中，代码如下：\n\n```\n\
    var titleScreen = SKSpriteNode(imageNamed:\"spr_title\")\n...\ntitleScreen.zPosition\
    \ = Layer.Overlay2\naddChild(titleScreen)\n```\n\n你将标题画面设置为 `Layer.Overlays2`\
    \ 图层，这样就能确保标题绘制在所有内容的上方。但你还需要额外做些工作来正确处理输入并更新游戏世界，因为只有在标题画面不再可见时游戏才会开始。你可以在 `handleInput`\
    \ 方法中添加一些指令来区分两种状态：一种是显示标题画面的状态，另一种是玩家正在玩游戏的状态：\n\n```\nif !titleScreen.hidden\
    \ {\n    if inputHelper.hasTapped {\n        titleScreen.hidden = true\n     \
    \   self.runAction(totalAction)\n    }\n} ... else {\n    super.handleInput(inputHelper)\n\
    \    ...\n}\n```\n\n查看这些 `if` 指令，你会发现如果标题画面是可见的，那么游戏只会在玩家点击屏幕时做出反应。在这种情况下，你会将标题画面的隐藏标志设为\
    \ `true`，这样它就不会再被绘制出来。同时，你也会启动每几秒掉落一次宝藏的动作。因此，只要标题画面可见，游戏唯一会做出的反应就是玩家的触摸屏幕操作。如果标题画面不可见，你就会调用父类的\
    \ `handleInput` 方法；换句话说，当玩家正在游戏时，游戏会按预期对玩家操作做出反应。\n\n对于 `updateDelta` 方法，你也遵循了几乎相同的流程：只有标题不可见时才会更新游戏世界：\n\
    \n```\nif titleScreen.hidden {\n    super.updateDelta(delta)\n}\n```\n\n现在，当玩家开始游戏时，他们会在游戏开始前看到一个标题画面（见图\
    \ 15-1）。但这还没结束。在下一节中，你将添加一个简单的按钮 GUI 元素，用于显示帮助框。\n\n![A978-1-4842-0650-8_15_Fig1_HTML.jpg](img/A978-1-4842-0650-8_15_Fig1_HTML.jpg)\n\
    \n图 15-1. 图坦卡蒙之墓的标题画面\n\n# 添加用于显示帮助框的按钮\n\n本节将讲解如何为游戏添加按钮，并用它来显示帮助框。为此，你需要在程序中添加另一个类\
    \ `Button`。你继承自 `GameObjectNode` 类，并添加一些简单的行为来检查玩家是否按下了按钮。在 `Button` 类中，你声明一个布尔属性，用于指示按钮是否被点击。然后重写\
    \ `handleInput` 方法，检查玩家是否点击了屏幕上的按钮。如果触摸位置在按钮精灵的边界内，就表明玩家点击了按钮，并将该属性的值设为 `true`。如何检查触摸位置是否在精灵的边界内？通过使用\
    \ `GameObjectNode` 类的 `box` 属性以及 `InputHelper` 类中的 `containsTap` 方法即可。以下是 `Button`\
    \ 类中完整的 `handleInput` 方法：\n\n```\noverride func handleInput(inputHelper: InputHelper)\
    \ {\n    super.handleInput(inputHelper)\n    tapped = inputHelper.containsTap(self.box)\n\
    }\n```\n\n完整的 `Button` 类，请参见 `TutsTomb4` 示例。现在，让我们向游戏世界添加一个帮助按钮。在 `GameWorld`\
    \ 类中，你添加一个属性来表示帮助按钮：\n\n```\nvar helpbutton = Button(imageNamed: \"spr_button_help\"\
    )\n```\n\n下一步是将帮助按钮定位到屏幕上并将其添加到游戏世界中。在图坦卡蒙之墓中，无论使用什么设备，帮助按钮都应始终显示在屏幕的右上角。为了实现这一点，你需要在\
    \ `GameWorld` 类中添加一个名为 `topRight` 的方法，用于计算屏幕右上角对应的位置：\n\n```\nfunc topRight()\
    \ -> CGPoint {\n    return CGPoint(x: size.width/2, y: size.height/2)\n}\n```\n\
    \n使用这个方法，你现在可以计算出帮助按钮的所需位置：\n\n```\nvar helppos = topRight()\nhelppos.x -= helpbutton.sprite.size.width/2\
    \ + 10\nhelppos.y -= helpbutton.sprite.size.height/2 + 10\n```\n\n由于精灵的原点默认在中心，你需要从右上角位置减去帮助按钮精灵宽度和高度的一半。再减去\
    \ 10 个像素，是为了在按钮和屏幕边缘之间留出一点边距。\n\n因为你想在玩家按下帮助按钮时显示帮助框，所以还需要向游戏世界添加一个帮助框。你将其隐藏标志设为\
