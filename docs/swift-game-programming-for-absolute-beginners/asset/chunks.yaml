  trans: '

    ## 音乐与音效


    多数游戏都包含音效和背景音乐。这些元素因多种原因而至关重要。音效提供关键提示，向用户表明发生了某些事件。例如，当用户点击按钮时播放点击声，可向用户反馈按钮确实已被按下。听到脚步声则暗示敌人可能就在附近，即便玩家尚未看到他们。而远处传来的铃声能预示某事即将发生。经典游戏《神秘岛》在这方面堪称典范，因为许多关于如何推进游戏的线索都是通过声音传递给玩家的。


    环境音效，如滴水声、林间风声和远处车声，能增强体验并带来身临游戏世界的感觉。即便屏幕上没有任何实际活动，它们也能让环境显得更加生动。


    **注意**


    音乐在玩家体验环境和动作的方式中扮演着关键角色。音乐可用于营造紧张、悲伤、欢乐等多种情绪。然而，在游戏中处理音乐比在电影中困难得多。在电影中，事件走向是确定的，因此音乐可以完美契合。但在游戏中，部分动作由玩家控制。现代游戏采用自适应音乐，这种音乐会根据游戏故事的推进而不断变化。


    在 Swift 中，播放背景音乐或音效相对简单。要使用声音，你首先需要一个可以播放的声音文件。在属于本章的 SoundTest 示例程序中，文件 `snd_music.mp3`
    被用作背景音乐。为了处理音乐和音效，你需要导入 `AVFoundation` 库，该库包含处理媒体的各种类：


    ```

    import AVFoundation

    ```


    下一步是声明一个指向可播放音频对象的变量，如下所示：


    ```

    var audioPlayer = AVAudioPlayer()

    ```


    现在，你可以在 `didMoveToView` 方法中初始化音频播放器，使其开始播放某个音频文件。这需要三步完成。第一步是构建一个所谓的 URL，表示声音文件的位置。这个
    URL 的构建方式需要确保它在所有 iDevice 上都能正常工作。以下是实现这一目标的代码行：


    ```

    let soundURL = NSBundle.mainBundle().URLForResource("snd_music", withExtension:
    "mp3")

    ```


    这看起来像一个复杂的指令。`NSBundle` 对象是文件系统中一个对可在程序中使用的代码和资源进行分组的位置。`mainBundle` 方法返回一个对应应用程序可执行文件位置的
    `NSBundle` 对象。最后，`URLForResource` 方法在 bundle 位置内构建一个文件位置（URL）。因此，最终你所做的只是创建一个计算机可以轻松解释的文件位置表示。


    既然已经构建了这个文件 URL，你就可以用对该文件的引用来初始化音频播放器：


    ```

    audioPlayer = try! AVAudioPlayer(contentsOfURL: soundURL!)

    ```


    最后，你可以通过调用 `play` 方法来开始播放音频，如下所示：


    ```

    audioPlayer.play()

    ```


    你可能希望降低背景音乐的音量，以便稍后在其上播放（更响亮的）音效。通过以下指令设置音量：


    ```

    audioPlayer.volume = 0.4

    ```


    `volume` 属性的值介于 0 和 1 之间，其中 0 表示静音，1 表示以最大音量播放声音。


    从技术上讲，背景音乐和音效之间没有区别。通常，背景音乐以较低的音量播放；许多游戏会循环播放背景音乐，以便歌曲结束时从头开始重新播放。为此，你可以使用 `numberOfLoops`
    属性：


    ```

    audioPlayer.numberOfLoops = 0 // 默认行为：音频仅播放一次

    audioPlayer.numberOfLoops = 1 // 音频重复一次（= 音频播放两次）

    audioPlayer.numberOfLoops = -1 /* 负值表示循环播放次数无限，

    因此音频将始终持续播放 */

    ```


    你在本书中开发的所有游戏都会使用两种类型的声音（背景音乐和音效）来让游戏更刺激。对于每个音效或背景音乐对象，你需要创建一个单独的音频播放器对象。尝试使用示例进行实验。你能为音乐添加一些循环吗？也可以尝试更改声音的音量。


    **注意**


    在游戏中使用声音和音乐时，需要注意一些事项。声音可能会让某些玩家感到厌烦，因此如果你确实使用了音效或音乐，请确保提供让玩家关闭它们的途径。另外，不要强迫玩家等待声音播放完毕才能继续。你可能创作了一首很棒的音乐，希望在显示介绍画面时播放，但玩家启动你的游戏不是为了听音乐——他们是想玩游戏！同样的原则也适用于游戏内的视频序列。始终为用户提供跳过这些内容的方式（即使你让你最喜欢的家庭成员提供了僵尸音效）。最后，一些玩家的
    iPhone 或 iPad 存储空间可能有限，因此请尽可能使用较小的声音文件。


    ## 本章小结


    在本章中，你学习了以下内容：


    *   如何将游戏资源（如精灵和声音）加载到内存中

    *   如何在屏幕上绘制多个精灵并移动它们

    *   如何在游戏中播放背景音乐和音效


    # 第 II 部分 画家


    画家


    在本部分中，你将开发一个名为“画家”的游戏（见图 II-1）。在开发这个游戏的过程中，我还会介绍一些在编程游戏时非常有用的新技术，例如将指令组织成类和方法、条件指令、迭代等等。


    ![A978-1-4842-0650-8_2_Part_BookFrontmatter_Fig1_HTML.jpg](img/A978-1-4842-0650-8_2_Part_BookFrontmatter_Fig1_HTML.jpg)


    图 II-1. 画家游戏


    画家游戏的目标是收集三种不同颜色的颜料：红色、绿色和蓝色。颜料从天空中以罐子形式掉落，这些罐子由气球托浮着，你必须确保每个罐子在从屏幕底部掉落之前具有正确的颜色。你可以通过向掉落的罐子发射所需颜色的颜料球来改变颜料的颜色。你可以使用键盘上的
    R、G 和 B 键来选择发射的颜色。你可以通过左键点击游戏屏幕来发射颜料球。如果你点击的位置离颜料炮越远，你赋予球的速度就越高。你点击的位置也决定了炮的射击方向。每个落入正确箱子的罐子将获得
    10 分。每个颜色错误的罐子将损失一条生命（由屏幕左上角的黄色气球指示）。你可以通过下载示例代码并运行第 11 章的 PainterFinal 示例来运行此游戏的最终版本。


    # 5 对玩家输入做出反应


