- fmt: "# 12. Advanced Input Handling\n\nElectronic supplementary material The online\
    \ version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​12](http://dx.doi.org/10.1007/978-1-4842-0650-8_12))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    In this chapter, you will create a more advanced input handling mechanism. At\
    \ the same time, a few important programming concepts, such as arrays and dictionaries,\
    \ will be introduced. In the Painter game, input handling was rather basic. You\
    \ only kept track of the last position that the player touched. For Painter, that\
    \ was sufficient since the player plays the game using a single finger. In more\
    \ complex games, this basic method of input handling is not enough. In particular,\
    \ in Tut’s Tomb, the player may use multiple fingers to drag objects over the\
    \ screen. In this chapter, you are going to extend the `InputHelper` class and\
    \ make it suitable for handling multitouch input.\n\n## Creating a Touch Object\n\
    \nThe main issue that you need to address is that the `InputHelper` class currently\
    \ only keeps track of the information of a single touch. It stores the last recorded\
    \ touch position, and whether or not the player has tapped (in other words, whether\
    \ the player just started touching the screen with a finger). Here are the two\
    \ properties that store this information:\n\n`var touchLocation = CGPoint(x: 0,\
    \ y: 0)`\n\n`var hasTapped: Bool = false`\n\nIn order to deal with multitouch\
    \ input, you need to store and track this information for multiple positions at\
    \ the same time. Next to this, you also need a way to distinguish touches from\
    \ each other, so that the player can, for example, use one finger to move one\
    \ object and another to push a button. This means that each touch position needs\
    \ a unique identifier. In order to facilitate this, let’s create a type for representing\
    \ a touch. Until now, you’ve used classes to create your own types. Another way\
    \ to create a type is by using a struct. As explained earlier, structs, as opposed\
    \ to classes, are copied by value and not by reference. This means that every\
    \ time you copy a variable that has a struct as its type, the value is copied\
    \ in memory. As a result, structs are generally preferred for smaller data structures.\
    \ A touch is a good example of a smaller data structure. Here is an example of\
    \ defining a struct to represent a touch:\n\n```\nstruct Touch {\n    var id =\
    \ 0\n    var location = CGPoint()\n    var tapped = true\n}\n```\n\nAs you can\
    \ see, defining a struct is the same as defining a class, except that you use\
    \ the `struct` keyword instead of the `class` keyword. This struct has three properties:\
    \ an identifier, a location, and a Boolean variable indicating whether or not\
    \ the touch is a tap. You can now create a `Touch` object in a very simple way:\n\
    \n`var myTouch = Touch()`\n\nBy default, this `Touch` object will have the `id`\
    \ 0, but what you want for each `Touch` object to have a unique identifier. There\
    \ is a relatively simple way to achieve this. If you remember, class properties\
    \ are properties that belong to a class, not to an object. The `world` property\
    \ is a good example: it belongs to the `GameScene` class. No matter how many `GameScene`\
    \ instances there are, there will always be a single `world` property, and you\
    \ access it as follows:\n\n`GameScene.world`\n\nSimilarly, structs know something\
    \ called a static property. If a property is static, then it belongs to the struct\
    \ and not to an instance of the struct. Take a look at the following struct definition:\n\
    \n```\nstruct Touch {\n    var id = 0\n    var location = CGPoint()\n    var tapped\
    \ = true\n    static var idgen: Int = 0\n}\n```\n\nThis struct has a static property\
    \ of `idgen`, which is initialized to 0. Since this property belongs to the struct\
    \ and not to any particular instance, you can use it to generate unique identifiers.\
    \ You do this by assigning the current value of the `idgen` property to the `id`\
    \ property when the instance is created, and then incrementing the `idgen` property\
    \ by 1 to generate the id for the new `Touch` instance. This job can be done in\
    \ an initializer:\n\n```\ninit() {\n    id = Touch.idgen\n    Touch.idgen++\n\
    }\n```\n\nThere is an even shorter way to do this, by using the `++` postfix operator\
    \ more smartly. When you increment a variable, the old value (before incrementing\
    \ the variable) is returned by the `++` postfix operator. You can store this result\
    \ in another variable, like so:\n\n```\nvar a = 12\nvar b = a++ // after this\
    \ instruction, a = 13 and b = 12\n```\n\nAfter the second instruction in this\
    \ example has been executed, the variable `b` contains the old value of `a` (before\
    \ incrementing), and `a` contains the incremented value. You can also write the\
    \ `++` operator in front of a variable. This `++` prefix operator returns the\
    \ new value (after incrementing), like so:\n\n```\nvar c = 10\nvar d = ++c //\
    \ after this instruction, c = 11, d = 11\n```\n\nIn this case, after the second\
    \ instruction both `c` and `d` contain the value after incrementing (11). If you\
    \ apply this idea to the `Touch` struct, then you don’t need an initializer anymore;\
    \ you simply increment the `idgen` property and assign its old value to the `id`\
    \ property:\n\n```\nstruct Touch {\n    var id = idgen++\n    var location = CGPoint()\n\
    \    var tapped = true\n    static var idgen: Int = 0\n}\n```\n\nThe result is\
    \ that you can now create `Touch` instances and each instance will automatically\
    \ get a unique identifier:\n\n```\nvar aTouch = Touch()          // aTouch has\
    \ id 0\nvar anotherTouch = Touch()    // anotherTouch has id 1\nvar yetAnotherTouch\
    \ = Touch() // yetAnotherTouch has id 2\n```"
  raw: '# 12. Advanced Input Handling


    Electronic supplementary material The online version of this chapter (doi:[10.​1007/​978-1-4842-0650-8_​12](http://dx.doi.org/10.1007/978-1-4842-0650-8_12))
    contains supplementary material, which is available to authorized users.


    In this chapter, you will create a more advanced input handling mechanism. At
    the same time, a few important programming concepts, such as arrays and dictionaries,
    will be introduced. In the Painter game, input handling was rather basic. You
    only kept track of the last position that the player touched. For Painter, that
    was sufficient since the player plays the game using a single finger. In more
    complex games, this basic method of input handling is not enough. In particular,
    in Tut’s Tomb, the player may use multiple fingers to drag objects over the screen.
    In this chapter, you are going to extend the `InputHelper` class and make it suitable
    for handling multitouch input.


    ## Creating a Touch Object


    The main issue that you need to address is that the `InputHelper` class currently
    only keeps track of the information of a single touch. It stores the last recorded
    touch position, and whether or not the player has tapped (in other words, whether
    the player just started touching the screen with a finger). Here are the two properties
    that store this information:


    `var touchLocation = CGPoint(x: 0, y: 0)`


    `var hasTapped: Bool = false`


    In order to deal with multitouch input, you need to store and track this information
    for multiple positions at the same time. Next to this, you also need a way to
    distinguish touches from each other, so that the player can, for example, use
    one finger to move one object and another to push a button. This means that each
    touch position needs a unique identifier. In order to facilitate this, let’s create
    a type for representing a touch. Until now, you’ve used classes to create your
    own types. Another way to create a type is by using a struct. As explained earlier,
    structs, as opposed to classes, are copied by value and not by reference. This
    means that every time you copy a variable that has a struct as its type, the value
    is copied in memory. As a result, structs are generally preferred for smaller
    data structures. A touch is a good example of a smaller data structure. Here is
    an example of defining a struct to represent a touch:


    `struct Touch {`


    `var id = 0`


    `var location = CGPoint()`


    `var tapped = true`


    `}`


    As you can see, defining a struct is the same as defining a class, except that
    you use the `struct` keyword instead of the `class` keyword. This struct has three
    properties: an identifier, a location, and a Boolean variable indicating whether
    or not the touch is a tap. You can now create a `Touch` object in a very simple
    way:


    `var myTouch = Touch()`


    By default, this `Touch` object will have the `id` 0, but what you want for each
    `Touch` object to have a unique identifier. There is a relatively simple way to
    achieve this. If you remember, class properties are properties that belong to
    a class, not to an object. The `world` property is a good example: it belongs
    to the `GameScene` class. No matter how many `GameScene` instances there are,
    there will always be a single `world` property, and you access it as follows:


    `GameScene.world`


    Similarly, structs know something called a static property. If a property is static,
    then it belongs to the struct and not to an instance of the struct. Take a look
    at the following struct definition:


    `struct Touch {`


    `var id = 0`


    `var location = CGPoint()`


    `var tapped = true`


    `static var idgen: Int = 0`


    `}`


    This struct has a static property of `idgen`, which is initialized to 0\. Since
    this property belongs to the struct and not to any particular instance, you can
    use it to generate unique identifiers. You do this by assigning the current value
    of the `idgen` property to the `id` property when the instance is created, and
    then incrementing the `idgen` property by 1 to generate the id for the new `Touch`
    instance. This job can be done in an initializer:


    `init() {`


    `id = Touch.idgen`


    `Touch.idgen++`


    `}`


    There is an even shorter way to do this, by using the ++ postfix operator more
    smartly. When you increment a variable, the old value (before incrementing the
    variable) is returned by the ++ postfix operator. You can store this result in
    another variable, like so:


    `var a = 12`


    `var b = a++ // after this instruction, a = 13 and b = 12`


    After the second instruction in this example has been executed, the variable `b`
    contains the old value of `a` (before incrementing), and `a` contains the incremented
    value. You can also write the ++ operator in front of a variable. This ++ prefix
    operator returns the new value (after incrementing), like so:


    `var c =` `10`


    `var d = ++c // after this instruction, c = 11, d = 11`


    In this case, after the second instruction both `c` and `d` contain the value
    after incrementing (11). If you apply this idea to the `Touch` struct, then you
    don’t need an initializer anymore; you simply increment the `idgen` property and
    assign its old value to the `id` property:


    `struct Touch {`


    `var id = idgen++`


    `var location = CGPoint()`


    `var tapped = true`


    `static var idgen: Int = 0`


    `}`


    The result is that you can now create `Touch` instances and each instance will
    automatically get a unique identifier:


    `var aTouch = Touch()          // aTouch has id 0`


    `var anotherTouch = Touch()    // anotherTouch has id 1`


    `var yetAnotherTouch = Touch() // yetAnotherTouch has id 2`'
  trans: "\n# 12. 高级输入处理\n\n电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-0650-8_​12](http://dx.doi.org/10.1007/978-1-4842-0650-8_12)）包含补充材料，仅供授权用户使用。\n\
    \n在本章中，你将创建一个更高级的输入处理机制。同时，还将介绍一些重要的编程概念，例如数组和字典。在《画家》游戏中，输入处理相当基础。你只跟踪了玩家触摸的最后一个位置。对于《画家》而言，这已经足够，因为玩家仅用一根手指玩游戏。在更复杂的游戏中，这种基础的输入处理方法就不够用了。特别是在《图特的坟墓》中，玩家可能使用多根手指在屏幕上拖拽物体。在本章中，你将扩展\
    \ `InputHelper` 类，使其能够处理多点触控输入。\n\n## 创建触摸对象\n\n你需要解决的主要问题是，`InputHelper` 类目前只跟踪单个触摸的信息。它存储了最后记录的触摸位置，以及玩家是否进行了点击（换句话说，玩家是否刚刚开始用手指触摸屏幕）。以下是存储这些信息的两个属性：\n\
    \n`var touchLocation = CGPoint(x: 0, y: 0)`\n\n`var hasTapped: Bool = false`\n\
    \n为了处理多点触控输入，你需要同时存储和跟踪多个位置的信息。除此之外，你还需要一种方法来区分不同的触摸，例如，让玩家可以用一根手指移动一个物体，同时用另一根手指按下一个按钮。这意味着每个触摸位置都需要一个唯一的标识符。为了方便实现这一点，让我们创建一个表示触摸的类型。到目前为止，你一直使用类来创建自己的类型。另一种创建类型的方法是使用结构体。如前所述，与类不同，结构体是按值复制而非按引用复制。这意味着每次复制一个类型为结构体的变量时，其值都会在内存中被复制。因此，结构体通常更适用于较小的数据结构。触摸就是一个典型的小数据结构的例子。以下是定义结构体来表示触摸的示例：\n\
    \n```\nstruct Touch {\n    var id = 0\n    var location = CGPoint()\n    var tapped\
    \ = true\n}\n```\n\n如你所见，定义结构体与定义类相同，只是使用 `struct` 关键字代替 `class` 关键字。这个结构体有三个属性：一个标识符、一个位置以及一个布尔变量，用于指示触摸是否为点击。现在，你可以用一种非常简单的方式创建\
    \ `Touch` 对象：\n\n`var myTouch = Touch()`\n\n默认情况下，这个 `Touch` 对象的 `id` 为 0，但你需要每个\
    \ `Touch` 对象都有一个唯一的标识符。有一种相对简单的方法可以实现这一点。如果你还记得，类属性是属于类本身的属性，而非属于某个对象。`world`\
    \ 属性就是一个很好的例子：它属于 `GameScene` 类。无论有多少个 `GameScene` 实例，始终只有一个 `world` 属性，你可以这样访问它：\n\
    \n`GameScene.world`\n\n类似地，结构体有一种称为静态属性的特性。如果某个属性是静态的，那么它属于结构体本身，而非结构体的某个实例。请看以下结构体定义：\n\
    \n```\nstruct Touch {\n    var id = 0\n    var location = CGPoint()\n    var tapped\
    \ = true\n    static var idgen: Int = 0\n}\n```\n\n这个结构体有一个静态属性 `idgen`，初始化为 0。由于此属性属于结构体本身而非任何特定实例，你可以用它来生成唯一标识符。具体做法是：在创建实例时，将\
    \ `idgen` 属性的当前值赋给 `id` 属性，然后将 `idgen` 属性加 1，从而为新的 `Touch` 实例生成 ID。这个任务可以在初始化器中完成：\n\
    \n```\ninit() {\n    id = Touch.idgen\n    Touch.idgen++\n}\n```\n\n还有一种更简洁的方法，即更巧妙地使用\
    \ `++` 后缀运算符。当你递增一个变量时，`++` 后缀运算符会返回该变量递增前的旧值。你可以将此结果存储到另一个变量中，如下所示：\n\n```\n\
    var a = 12\nvar b = a++ // 执行这条指令后，a = 13, b = 12\n```\n\n在此示例中，第二条指令执行后，变量 `b`\
    \ 包含了 `a` 的旧值（递增前），而 `a` 包含了递增后的值。你也可以将 `++` 运算符写在变量前面。这个 `++` 前缀运算符会返回递增后的新值，如下所示：\n\
    \n```\nvar c = 10\nvar d = ++c // 执行这条指令后，c = 11, d = 11\n```\n\n在这种情况下，第二条指令执行后，`c`\
    \ 和 `d` 都包含递增后的值（11）。如果你将这个思路应用到 `Touch` 结构体中，那么就不再需要初始化器；只需递增 `idgen` 属性，并将其旧值赋给\
    \ `id` 属性：\n\n```\nstruct Touch {\n    var id = idgen++\n    var location = CGPoint()\n\
    \    var tapped = true\n    static var idgen: Int = 0\n}\n```\n\n结果是，你现在可以创建 `Touch`\
    \ 实例，并且每个实例都会自动获得一个唯一标识符：\n\n```\nvar aTouch = Touch()          // aTouch 的 id\
    \ 为 0\nvar anotherTouch = Touch()    // anotherTouch 的 id 为 1\nvar yetAnotherTouch\
    \ = Touch() // yetAnotherTouch 的 id 为 2\n```\n"
- fmt: '# Arrays


    Now that you have an easy way to generate touch locations carrying a unique identifier,
    you need to extend the `InputHelper` class so that it supports storing multiple
    instances of these touches. In Swift, a very convenient way to do this is by using
    arrays. An array is basically a numbered list. Have a look at the following examples:


    `var emptyArray: [Int] = []`


    `var intArray = [4, 8, 15, 16, 23, 42]`


    Here you see two declarations and initializations of array variables. The first
    declaration is an empty array (no elements) that can contain `Int` values. The
    second variable, `intArray`, refers to an array of length 6. You can access the
    elements in the array by their index, where the first element in the array has
    index 0:


    `var v = intArray[0]  // contains the value 4`


    `var v2 = intArray[4] // contains the value 23`


    You use square brackets to access elements in the array. You can also modify the
    values in the array using the same square brackets:


    `intArray[1] = 13 // intArray now is [4, 13, 15, 16, 23, 42]`


    It’s also possible to add an element to the array:


    `intArray.append(-3) // intArray now is [4, 13, 15, 16, 23, 42, -3]`


    Finally, each array has a `count` variable that you can access to retrieve the
    length:


    `var l = intArray.count // contains the value 7`


    You can use arrays in combination with `for` loops to do interesting things. Here’s
    an example:


    `for var i = 0; i < intArray.count; i++ {`


        `intArray[i] += 10`


    `}`


    This walks through all the elements in the array and adds 10 to each. So, after
    this code is executed, `intArray` refers to `[14, 23, 25, 26, 33, 52, 7]`. Or
    you can use a `for` loop with a range to achieve the same thing:


    `for i in 0..<intArray.count {`


        `intArray[i] += 10`


    `}`


    In addition to initializing an array in the way you just saw, there is another,
    more class-like way to create an array:


    `var myArray = Array<Int>(count: 3, repeatedValue: 10)`


    This example creates an array of size 3, each element being the value 10. So,
    the above instruction is the same as the following one:


    `var myArray = [10, 10, 10]`


    You can even create multidimensional arrays in Swift, like so:


    `var anotherArray: [[Int]] = [[1, 2, 3], [4, 5, 6]]`


    The `anotherArray` variable is an array of an array of integer values. So, as
    you can see, elements of arrays can also be arrays. Arrays of arrays are particularly
    useful to represent grid structures. Quite a few games use some kind of grid structure
    to represent the game world. For example, you can use a two-dimensional array
    to represent the playing field of a Tic Tac Toe game:


    `var tictactoe : [[String]] = [["x", "o", " "], [" ", "x", "o"], [" ", "o", "x"]]`


    The following is a simple way to represent a two-dimensional grid using a one-dimensional
    array:


    `var rows = 10, cols = 15`


    `var myGrid = Array<Int>(count: rows * cols, repeatedValue: 0)`


    Accessing the element at row `i` and column `j` can now be done as follows:


    `var elem = myGrid[i * cols + j]`


    Figure [12-1](#A978-1-4842-0650-8_12_Chapter.html#Fig1) shows a part of the expression
    syntax diagram, with the syntax for specifying an array.


    ![A978-1-4842-0650-8_12_Fig1_HTML.gif](A978-1-4842-0650-8_12_Fig1_HTML.gif)


    Figure 12-1. Partial syntax diagram of expressions


    # Dictionaries


    In addition to the array, Swift has a collection type called a dictionary. A dictionary
    is very similar to an array, except that it doesn’t represent a numbered list,
    but rather a mapping from one type to another. A dictionary is a series of key/value
    pairs, where distinct keys are used to access the associated values. The keys
    and values can be of any type. This is in contrast with an array, in which the
    “keys” are always the array indices. The following example should clarify this:


    `var translator = [String:String]()`


    `translator["house"] = "maison"`


    `translator["tree"] = "arbre"`


    `translator["dog"] = "chien"`


    As you can see, the dictionary allows you to store a mapping. In this case, the
    mapping is from a string (the key) to another string (the value), which is useful
    if you want to implement a translation table. The types used don’t have to be
    the same, though:


    `var ages = [String:Int]()`


    `ages["mary"] = 45`


    `ages["john"] = 12`'
