    # 第一部分


    入门指南


    本书第一部分介绍使用 Swift 开发游戏应用的基础知识。你将看到多个简单示例，展示如何使用 Swift 创建应用程序。我会向你介绍 Swift 语言，以及用于创建
    2D 游戏的 SpriteKit 引擎。本部分涵盖核心的 Swift 编程结构，例如指令、表达式、对象和方法。此外，我还会介绍游戏循环，以及如何加载和绘制精灵（图像）。


    # 1. Swift 语言


    电子补充材料：本章在线版本（doi:[10.1007/978-1-4842-0650-8_1](http://dx.doi.org/10.1007/978-1-4842-0650-8_1)）包含仅供授权用户使用的补充材料。


    本章将介绍 Swift 编程语言。Swift 是编程语言发展历程中较新的成果之一。要理解 Swift，你首先需要了解计算机（包括 iPad 或 iPhone
    等 iOS 设备）的工作原理，以及用于给它们编程的语言是如何演变的。在简要讨论计算机和程序（包括应用程序）之后，我将介绍 Swift，以及如何利用它的一些基本特性来创建你的第一个程序。


    ## 计算机与程序


    本节将简要介绍计算机和编程的一般概念。之后，你将开始使用 Swift 编写第一个应用程序。


    ### 处理器与内存


    一般而言，计算机由一个或多个处理器以及多种形式的内存组成。所有现代计算机（包括游戏机、智能手机和平板电脑）都是如此。我定义内存为可以从中读取信息和/或写入信息的东西。内存有多种类型，主要区别在于数据传输速度和数据访问速度。例如，一台计算机可能拥有（相对较慢的）硬盘内存、快得多的
    RAM（随机存取内存）、连接到机器的 USB 闪存驱动器，或者连接到拥有自身内存的服务器的开放网络连接。计算机中的主处理器称为中央处理器（CPU）。计算机上另一种最常见的处理器是图形处理器（GPU）。


    处理器的主要任务是执行指令。执行这些指令的效果是改变内存。特别是根据我对内存非常宽泛的定义，处理器执行的每一条指令都会以某种方式改变内存。你很可能不希望计算机只执行一条指令。通常，你会有一长串待执行的指令——“把这部分内存移到那边，清除这部分内存，在屏幕上绘制这张图像，检查玩家是否按下了手柄上的某个键，顺便泡杯咖啡”——而（正如你可能预料的）计算机执行的这一系列指令就称为程序。


    ### 程序


    总之，程序是操作计算机内存的一长串指令。然而，程序本身也存储在内存中。在程序中的指令被执行之前，它们被存储在硬盘、DVD、USB 闪存盘或任何其他存储介质上。当需要执行时，程序会被移动到机器的
    RAM 内存中。


    组成程序的指令需要以某种方式进行表达。你可以使用手势，或者发出奇怪的声音。遗憾的是，计算机对此理解得并不好（尽管借助当今的运动追踪设备，或许几年后它就能理解了）。计算机（目前）也无法理解纯英文输入的指令，这就是为什么你需要诸如
    Swift 之类的编程语言。在实践中，指令以文本形式编写，但你需要根据定义编程语言的一套规则，以非常严格的方式编写它们。存在许多编程语言，因为当有人想到一种稍好一点的表达某类指令的方式时，他们的方法往往会成为一门新的编程语言。很难说一共有多少种编程语言，因为这取决于你是否统计一门语言的所有版本和方言；但可以说有数千种之多。


    幸运的是，没有必要学习所有这些不同的语言，因为它们有许多相似之处。在早期，编程语言的主要目标是利用计算机的新功能。然而，较新的语言则侧重于为编写程序可能造成的混乱带来一些秩序。

    '
- fmt: '### Programming Languages


    In the early days, programming computer games was a very difficult task that required
    great skill. A game console like the popular Atari 2600 had only 128 bytes of
    RAM, which is really small compared to today’s computers (4GB of RAM is nearly
    33,000 times as much as 128 bytes). It also used cartridges with at most 4,096
    bytes of ROM (Read-Only Memory) that had to contain both the program and the game
    data. This limited the possibilities considerably, and the machines were also
    extremely slow.


    Programming such games was done in `Assembly`, a very basic programming language
    that defined a set of instructions that a processor could execute. Each processor
    could have a different set of instructions, leading to different Assembly languages.
    As a result, every time a new processor came around, all existing programs had
    to be completely rewritten for that processor. Therefore, a need arose for processor-independent
    programming languages. This resulted in languages such as `Fortran` (FORmula TRANslating
    System) and `BASIC` (Beginners’ All-purpose Symbolic Instruction Code). `BASIC`
    was very popular in the 1970s because it came with early personal computers such
    as the Apple II in 1978, the IBM-PC in 1979, and their descendants. Unfortunately
    this language was never standardized, so every computer brand used its own dialect
    of `BASIC`.


    As programs became more complex, it became clear that a better way of organizing
    all these instructions was necessary. So, procedural languages were created; they
    grouped instructions into procedures (also called functions, or methods). A well-known
    example of a procedural language is `C`, which was defined by Bell Labs in the
    late 1970s. `C` is still used quite a lot, although it’s slowly but surely making
    way for more modern languages, especially in the game industry.


    Over the years, games became much larger programs, and teams rather than individuals
    created them. It was important that the game code be readable, reusable, and easy
    to debug. Object-oriented programming languages address this need, by letting
    programmers group methods into something called a `class`. The memory that groups
    of methods are related to is called an `object`. A `class` can describe something
    like the ghosts in a game of Pac-Man. Then each individual ghost corresponds to
    an `object` of the `class`. This way of thinking about programming is powerful
    when applied to games. Another powerful aspect of object-oriented programming
    is inheritance, which allows developers to extend existing code and add functionality
    to it. You’ll read more about inheritance and how you use it in games in [Chapter
    10](#A978-1-4842-0650-8_10_Chapter.html).


    In the early eighties, two programmers named Brad Cox and Tom Love created a language
    called `Objective-C`, which was an extension of `C` in which object-oriented programming
    was possible. In 1988, the `Objective-C` language was licensed to NeXT, the company
    founded in 1985 by Steve Jobs after he was forced out of Apple. NeXT developed
    a lot of tools around the `Objective-C` language, such as a tool for building
    interfaces, as well as a development environment called Project Builder, the predecessor
    of what we now call `Xcode`. When Jobs returned to Apple in the nineties, the
    tools developed at NeXT became the foundation for Mac OS X.


    Over the last two decades, new languages such as `Java` and `C#` have further
    introduced useful features. Apple realized that a new language was needed for
    their platform, one that profited from programming language advances made in the
    last decades. So, on June 2, 2014, Apple announced the `Swift` programming language
    as the new programming language for both OS X and iOS. `Swift` is a much more
    modern alternative to `Objective-C`. It takes many features from languages such
    as `C#` or `JavaScript`, which makes writing programs for OS X or iOS much more
    efficient. Since the market for iOS apps is huge, `Swift` is going to have a big
    impact on the industry. This book teaches you the `Swift` language in depth, with
    a special focus on developing games. Upon finishing this chapter, you will have
    created your first program in `Swift`.


    ### Programming Games


    The goal of this book is to teach you how to program games. Games are very interesting
    (and sometimes challenging!) programs. They deal with a lot of different input
    and output devices, and the imaginary worlds that games create can be extremely
    complex.


    Until the beginning of the 1990s, games were developed for specific platforms.
    For example, a game written for a particular console couldn’t be used on any other
    device without major effort from the programmers to adapt the game program to
    the differing hardware. In the 1980s, arcade games were extremely popular, but
    almost none of the code written for them could be reused for newer games because
    of the constant changes and improvements in computer hardware.


    As games grew more complex, and as operating systems became more hardware independent,
    it made sense for the game companies to start reusing code from earlier games.
    Why write an entirely new rendering program or collision-checking program for
    each game, if you can simply use the one from your previously released game? The
    term game engine was coined in the 1990s when first-person shooters such as `Doom`
    and `Quake` became a very popular genre. These games were so popular that their
    manufacturer, `id Software`, decided to license part of the game code to other
    game companies as a separate piece of software.


    Many different game engines are available today. Modern game engines provide a
    lot of functionality to game developers, such as a 2D and 3D rendering engine,
    special effects such as particles and lighting, sound, animation, artificial intelligence,
    scripting, and much more. The main engine used for the games in this book is `SpriteKit`.
    `SpriteKit` is an engine developed by Apple targeted at game development. After
    reading this book, you will have seen all the major aspects of this engine and
    you will know how to use it to create your own games.


    ### Developing Games


    Two approaches are commonly used in developing games. Figure [1-1](#A978-1-4842-0650-8_1_Chapter.html#Fig1)
    illustrates these approaches: the outer one encompasses the inner one. When people
    are first learning to program, they typically begin writing code immediately,
    and that leads to a tight loop of writing, then testing, and then making modifications.
    Professional programmers, by contrast, spend significant upfront time doing design
    work before ever writing their first line of code.


    ![A978-1-4842-0650-8_1_Fig1_HTML.gif](A978-1-4842-0650-8_1_Fig1_HTML.gif)


    Figure 1-1. Programming on a small scale and on a large scale'
  raw: '### Programming Languages


    In the early days, programming computer games was a very difficult task that required
    great skill. A game console like the popular Atari 2600 had only 128 bytes of
    RAM, which is really small compared to today’s computers (4GB of RAM is nearly
    33,000 times as much as 128 bytes). It also used cartridges with at most 4,096
    bytes of ROM (Read-Only Memory) that had to contain both the program and the game
    data. This limited the possibilities considerably, and the machines were also
    extremely slow.


    Programming such games was done in Assembly, a very basic programming language
    that defined a set of instructions that a processor could execute. Each processor
    could have a different set of instructions, leading to different Assembly languages.
    As a result, every time a new processor came around, all existing programs had
    to be completely rewritten for that processor. Therefore, a need arose for processor-independent
    programming languages. This resulted in languages such as Fortran (FORmula TRANslating
    System) and BASIC (Beginners’ All-purpose Symbolic Instruction Code). BASIC was
    very popular in the 1970s because it came with early personal computers such as
    the Apple II in 1978, the IBM-PC in 1979, and their descendants. Unfortunately
    this language was never standardized, so every computer brand used its own dialect
    of BASIC.


    As programs became more complex, it became clear that a better way of organizing
    all these instructions was necessary. So, procedural languages were created; they
    grouped instructions into procedures (also called functions, or methods). A well-known
    example of a procedural language is C, which was defined by Bell Labs in the late
    1970s. C is still used quite a lot, although it’s slowly but surely making way
    for more modern languages, especially in the game industry.


    Over the years, games became much larger programs, and teams rather than individuals
    created them. It was important that the game code be readable, reusable, and easy
    to debug. Object-oriented programming languages address this need, by letting
    programmers group methods into something called a class. The memory that groups
    of methods are related to is called an object. A class can describe something
    like the ghosts in a game of Pac-Man. Then each individual ghost corresponds to
    an object of the class. This way of thinking about programming is powerful when
    applied to games. Another powerful aspect of object-oriented programming is inheritance,
    which allows developers to extend existing code and add functionality to it. You’ll
    read more about inheritance and how you use it in games in [Chapter 10](#A978-1-4842-0650-8_10_Chapter.html).


    In the early eighties, two programmers named Brad Cox and Tom Love created a language
    called Objective-C, which was an extension of C in which object-oriented programming
    was possible. In 1988, the Objective-C language was licensed to NeXT, the company
    founded in 1985 by Steve Jobs after he was forced out of Apple. NeXT developed
    a lot of tools around the Objective-C language, such as a tool for building interfaces,
    as well as a development environment called Project Builder, the predecessor of
    what we now call Xcode. When Jobs returned to Apple in the nineties, the tools
    developed at NeXT became the foundation for Mac OS X.


    Over the last two decades, new languages such as Java and C# have further introduced
    useful features. Apple realized that a new language was needed for their platform,
    one that profited from programming language advances made in the last decades.
    So, on June 2, 2014, Apple announced the Swift programming language as the new
    programming language for both OS X and iOS. Swift is a much more modern alternative
    to Objective-C. It takes many features from languages such as C# or JavaScript,
    which makes writing programs for OS X or iOS much more efficient. Since the market
    for iOS apps is huge, Swift is going to have a big impact on the industry. This
    book teaches you the Swift language in depth, with a special focus on developing
    games. Upon finishing this chapter, you will have created your first program in
    Swift.


    ## Programming Games


