- fmt: "### The Game Loop\n\nThe game loop deals with the dynamic aspects of a game.\
    \ Lots of things happen while a game is running. The players press buttons on\
    \ the gamepad or touch the screen of their device, and a constantly changing game\
    \ world consisting of levels, monsters, and other characters needs to be kept\
    \ up to date. There are also special effects such as explosions, sounds, and much\
    \ more. All these different tasks that need to be handled by the game loop can\
    \ be organized into two categories:\n\n- Tasks related to updating and maintaining\
    \ the game world\n- Tasks related to displaying the game world to the player\n\
    \nThe game loop continuously performs these tasks, one after the other (see Figure\
    \ [2-1](#A978-1-4842-0650-8_2_Chapter.html#Fig1)). As an example, let’s look at\
    \ how you could handle user navigation in a simple game like Pac-Man. The game\
    \ world mainly consists of a labyrinth with a few nasty ghosts moving around.\
    \ Pac-Man is located somewhere in this labyrinth and is moving in a certain direction.\
    \ In the first task (updating and maintaining the game world), you check whether\
    \ the player is pressing an arrow key. If so, you need to update the position\
    \ of Pac-Man according to the direction the player wants Pac-Man to go. Also,\
    \ because of that move, Pac-Man may have eaten a white dot, which increases the\
    \ score. You need to check whether it was the last dot in the level because that\
    \ would mean the player has finished the level. If it was a larger white dot,\
    \ the ghosts need to be rendered inactive. Then you need to update the rest of\
    \ the game world. The position of the ghosts needs to be updated, you have to\
    \ decide whether fruit should be displayed somewhere for bonus points, you need\
    \ to check whether Pac-Man collides with one of the ghosts (if the ghost isn’t\
    \ inactive), and so on. You can see that even in a simple game like Pac-Man, a\
    \ lot of work needs to be done in this first task. From now on, I’ll call this\
    \ collection of different tasks related to updating and maintaining the game world\
    \ the Update action.\n\n![A978-1-4842-0650-8_2_Fig1_HTML.gif](A978-1-4842-0650-8_2_Fig1_HTML.gif)\n\
    \nFigure 2-1. The game loop, which continuously updates and then draws the game\
    \ world\n\nThe second collection of tasks is related to displaying the game world\
    \ to the player. In the case of the Pac-Man game, this means drawing the labyrinth,\
    \ the ghosts, Pac-Man, and information about the game that is important for the\
    \ player to know, such as how many points they’ve scored, how many lives they\
    \ have left, and so on. This information can be displayed in different areas of\
    \ the game screen, such as at the top or the bottom. This part of the display\
    \ is also called the heads-up display (HUD). Modern 3D games have a much more\
    \ complicated set of drawing tasks. These games need to deal with lighting and\
    \ shadows, reflections, culling, visual effects like explosions, and much more.\
    \ I’ll call the part of the game loop that deals with all the tasks related to\
    \ displaying the game world to the player the Draw action.\n\n### The Game Loop\
    \ in Swift\n\nThe previous chapter showed how to create a simple Swift iOS game\
    \ application. In that application, you saw that instructions are grouped into\
    \ a method, which in turn is part of a class, as follows:\n\n```\nclass GameScene:\
    \ SKScene {\n\n    override func didMoveToView(view: SKView) {\n        /* Setup\
    \ your scene here */\n        let myLabel = SKLabelNode(fontNamed:\"Chalkduster\"\
    )\n        myLabel.text = \"Hello, World!\"\n        myLabel.fontSize = 65\n \
    \       myLabel.position = CGPoint(x:CGRectGetMidX(self.frame),\n            \
    \                       y:CGRectGetMidY(self.frame))\n        self.addChild(myLabel)\n\
    \    }\n\n    ...\n}\n```\n\nBasically, the `didMoveToView` method does one job\
    \ here: create a game world. This game world is very simple since it consists\
    \ of a text label. So how does the game loop come into play in this example? In\
    \ fact, the drawing part of the game loop is already taken care of by the SpriteKit\
    \ engine. The last instruction in the `didMoveToView` method makes sure that the\
    \ drawing code inside the SpriteKit engine knows that it should draw the text\
    \ label. If you want to create a more complicated game world, you can simply add\
    \ more instructions to `didMoveToView`, which creates the objects in the game\
    \ world. So, creating and drawing the game world seems doable. But how do you\
    \ change the game world? This is what the Update action is for. Take a look at\
    \ the following example program (see also the BackgroundColor project belonging\
    \ to this chapter):\n\n```\nimport SpriteKit\n\nclass GameScene: SKScene {\n\n\
    \    override func didMoveToView(view: SKView) {\n        let myLabel = SKLabelNode(fontNamed:\"\
    Chalkduster\")\n        myLabel.text = \"Hello, World!\"\n        myLabel.fontSize\
    \ = 65\n        myLabel.position = CGPoint(x:CGRectGetMidX(self.frame),\n    \
    \                               y:CGRectGetMidY(self.frame))\n        addChild(myLabel)\n\
    \    }\n\n    override func update(currentTime: NSTimeInterval) {\n        backgroundColor\
    \ = UIColor.blueColor()\n    }\n}\n```\n\nAs you can see, a big difference between\
    \ this program and the previous example is that the `GameScene` class now groups\
    \ the following two methods: one called `didMoveToView`, and one called `update`.\
    \ The latter is the method that is going to be executed as a part of the game\
    \ loop. Because the `GameScene` class is a special version of the `SKScene` class,\
    \ the SpriteKit framework that we use in this book already takes care of creating\
    \ the game loop and calling the `update` method. In this example, there is one\
    \ instruction in the `update` method:\n\n```\nbackgroundColor = UIColor.blueColor()\n\
    ```\n\nThis instruction changes the background color of the app to the color blue.\
    \ Run the BackgroundColor example belonging to this chapter to see what the program\
    \ does. Now see if you can change the background color to something else. Can\
    \ you change it to red? Or yellow?\n\nWhen you run the program, you can’t really\
    \ see that the `update` method is called many times per second. Add the following\
    \ instruction between the braces enclosing the instructions grouped in the `update`\
    \ method:\n\n```\nprint(currentTime)\n```\n\nWhen you run the program now, you’ll\
    \ see that a slowly increasing number is printed to the console. This number represents\
    \ the current system time, measured in seconds passed since the device was last\
    \ restarted. Every time the `update` method is called, the system time is printed\
    \ to the console.\n\nIf you want to know how often the `update` method is called\
    \ per second, there is an easy way to find out. Click the file called `GameViewController.swift`.\
    \ Add the following instruction to the `viewWillLayoutSubviews` method, just before\
    \ the closing brace:\n\n```\nskView.showsFPS = true\n```\n\nWhen you now run the\
    \ program, you’ll see that a number is printed on the screen. This number, also\
    \ called the frame rate, indicates how many times per second the game world is\
    \ updated and drawn on the screen. In order to allow for a smooth playing experience,\
    \ the game world needs to be continuously updated and drawn: update, draw, update,\
    \ draw, update, draw, update, draw, update, draw, and so on. Furthermore, this\
    \ happens at a very high speed. Apple devices such as the iPad or the iPhone can\
    \ deal with frame rates with a maximum of 60 frames per second (or 60 Hz). Higher\
    \ than that is not possible because the device screen refresh rate is 60 Hz. It\
    \ is possible, though, that the frame rate drops because the computations in the\
    \ `update` method are taking a lot of time. In [Chapter 6](#A978-1-4842-0650-8_6_Chapter.html),\
    \ I talk more about this issue and what you can do to ensure your games run smoothly\
    \ both on older and newer Apple devices.\n\nThis book shows you many different\
    \ ways to fill the `update` method with the tasks you need to perform in your\
    \ game. During this process, I also introduce many programming techniques that\
    \ are useful for games (and other applications). The following section looks into\
    \ the basic game application in more detail. Then, you fill this basic skeleton\
    \ of a game with additional instructions."
