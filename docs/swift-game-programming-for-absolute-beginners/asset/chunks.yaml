- fmt: "## Adding an On/off Button\n\nThe next step is adding an on/off button that\
    \ shows a hint (or doesn’t) during game play. Later in the chapter, you will see\
    \ how the value of this button is used. Just as you did for the `Button` class,\
    \ you make a special class for on/off buttons, called (not surprisingly) `OnOffButton`.\
    \ In the PenguinPairs2 example, this class is a subclass of `SKSpriteNode`, just\
    \ like the new `Button` class. It has two (stored) properties of type `SKTexture`,\
    \ each of which represents a texture (image):\n\n```\nvar onTexture  = SKTexture(imageNamed:\
    \ \"spr_button_on\")\nvar offTexture = SKTexture(imageNamed: \"spr_button_off\"\
    )\n```\n\nDepending on the state of the button, a different texture will be selected\
    \ for the sprite node. The button has two states: off and on (see also Figure\
    \ [17-3](#A978-1-4842-0650-8_17_Chapter.html#Fig3)). The on state is chosen when\
    \ the `SKSpriteNode` instance is initialized:\n\n![A978-1-4842-0650-8_17_Fig3_HTML.jpg](A978-1-4842-0650-8_17_Fig3_HTML.jpg)\n\
    \n*Figure 17-3.* The two textures used for the on/off button\n\n```\ninit() {\n\
    \    super.init(texture: onTexture, color: UIColor.whiteColor(), size: onTexture.size())\n\
    }\n```\n\nAn important aspect of the button is that you need to be able to read\
    \ and set whether it’s on or off. Because the button has two possible textures,\
    \ you can define that the button is in the off state if the current texture points\
    \ to the `offTexture` property, and that it’s in the on state if the current texture\
    \ points to the `onTexture` property. You can then add a Boolean computed property\
    \ that gets and sets this value. Here is the definition of that property:\n\n\
    ```\nvar on: Bool {\n    get {\n        return self.texture == onTexture\n   \
    \ }\n    set {\n        if newValue {\n            self.texture = onTexture\n\
    \        } else {\n            self.texture = offTexture\n        }\n    }\n}\n\
    ```\n\nFinally, you need to handle taps on the button to toggle its on and off\
    \ states. Similar to what you did in the `Button` class, you check in the `handleInput`\
    \ method whether the player tapped within the bounding box of the button. Here\
    \ is the complete `handleInput` method:\n\n```\noverride func handleInput(inputHelper:\
    \ InputHelper) {\n    super.handleInput(inputHelper)\n    if inputHelper.containsTap(self.box)\
    \ && !self.hidden {\n        self.on = !self.on\n    }\n}\n```\n\nNote that you\
    \ only toggle the button state if it is visible. In the `GameWorld` class, you\
    \ add an `OnOffButton` instance to the game world, at the desired position:\n\n\
    ```\nvar onOffButton = OnOffButton()\n...\nonOffButton.position = CGPoint(x: 200,\
    \ y: 50)\nself.addChild(onOffButton)\n```\n\n## Defining a Slider Button\n\nNext,\
    \ you add a second kind of GUI control: a slider. This slider will control the\
    \ volume of the background music in the game. It consists of two sprites: a back\
    \ sprite that represents the bar, and a front sprite that represents the actual\
    \ slider. Therefore, the `Slider` class inherits from `SKNode` and contains (among\
    \ others) two `SKSpriteNode` properties to represent each sprite. Because the\
    \ back sprite has a border, you need to take this into account when you move or\
    \ draw the slider. Therefore, you also define left and right margins that define\
    \ the border width on the left and right side of the back sprite. The complete\
    \ list of stored properties is given as follows:\n\n```\nvar back = SKSpriteNode(imageNamed:\
    \ \"spr_slider_bar\")\nvar front = SKSpriteNode(imageNamed: \"spr_slider_button\"\
    )\nlet leftMargin = CGFloat(4), rightMargin = CGFloat(7)\nvar dragging = false\n\
    var draggingIndex: Int?\n```\n\nAs you can see, you also set a Boolean property\
    \ `dragging` to `false` and you add a property `draggingIndex` that is an optional\
    \ of type `Int`. You need these properties to keep track of when the player is\
    \ dragging the slider and what the touch ID is so you update the slider position\
    \ when needed, even when the touch location isn’t within the boundaries of the\
    \ back sprite.\n\n## Calculating World Positions of Game Objects\n\nBecause you\
    \ need to track whether the player is touching the slider, you need to calculate\
    \ the bounding box of a node. If you look at the `SKNode` extension, you can see\
    \ that it defines the `box` property, which was also a part of the original `GameObjectNode`\
    \ class. In `GameObjectNode`, the `get` part of the `box` property contained a\
    \ single line:\n\n```\nreturn self.calculateAccumulatedFrame()\n```\n\nThis worked\
    \ fine for the Tut’s Tomb game because that game used a very simple hierarchy\
    \ of nodes. If a hierarchy becomes more complex, a node’s local position may be\
    \ different from its actual position in the world. This is also the case for the\
    \ slider. In the `Slider` initializer, the front part of the slider is positioned\
    \ locally at the left side of the back sprite:\n\n```\nfront.position = CGPoint(x:\
    \ leftMargin - back.size.width/2 + front.size.width/2, y: 0)\n```\n\nHowever,\
    \ the `Slider` node itself is also placed at a certain position in the scene:\n\
    \n```\nmusicSlider.position = CGPoint(x: 200, y: -100)\n```\n\nAs a result, the\
    \ local position of the slider bar is different from its actual position in the\
    \ world. This is a problem if you want to check whether or not the player is touching\
    \ the bar. Touch locations are calculated in the world space. The `calculateAccumulatedFrame`\
    \ method returns the bounding box at the local node position. This means that\
    \ an extra step is required to translate the local position into the world position.\
    \ The new `box` property uses the `convertPoint` method to do this:\n\n```\nif\
    \ parent != nil {\n    boundingBox.origin = scene!.convertPoint(boundingBox.origin,\
    \ fromNode: parent!)\n}\n```\n\nNote that it only performs the calculation if\
    \ the node has a parent, because if it hasn’t, then its local position is the\
    \ same as the world position. Since the bounding box is positioned locally to\
    \ its parent, you need to convert the node position from the parent node to the\
    \ scene node (which is the node at the root of the game world). For directly accessing\
    \ the root of the game world, you use the `scene` property, which is a part of\
    \ `SKNode`.\n\nFor convenience, let’s also add a `worldPosition` property that\
    \ calculates the position of the node in world coordinates. Here is the complete\
    \ property (which also uses the `convertPoint` method):\n\n```\nvar worldPosition:\
    \ CGPoint {\n    get {\n        if parent != nil {\n            return parent!.convertPoint(position,\
    \ toNode: scene!)\n        } else {\n            return position\n        }\n\
    \    }\n}\n```"
  raw: '## Adding an On/off Button


    The next step is adding an on/off button that shows a hint (or doesn’t) during
    game play. Later in the chapter, you will see how the value of this button is
    used. Just as you did for the `Button` class, you make a special class for on/off
    buttons, called (not surprisingly) `OnOffButton`. In the PenguinPairs2 example,
    this class is a subclass of `SKSpriteNode`, just like the new `Button` class.
    It has two (stored) properties of type `SKTexture`, each of which represents a
    texture (image):


    `var onTexture  = SKTexture(imageNamed: "spr_button_on")`


    `var offTexture = SKTexture(imageNamed: "spr_button_off")`


    Depending on the state of the button, a different texture will be selected for
    the sprite node. The button has two states: off and on (see also Figure [17-3](#A978-1-4842-0650-8_17_Chapter.html#Fig3)).
    The on state is chosen when the `SKSpriteNode` instance is initialized:


    ![A978-1-4842-0650-8_17_Fig3_HTML.jpg](A978-1-4842-0650-8_17_Fig3_HTML.jpg)


    Figure 17-3.


    The two textures used for the on/off button


    `init() {`


        `super.init(texture: onTexture, color: UIColor.whiteColor(), size: onTexture.size())`


    `}`


    An important aspect of the button is that you need to be able to read and set
    whether it’s on or off. Because the button has two possible textures, you can
    define that the button is in the off state if the current texture points to the
    `offTexture` property, and that it’s in the on state if the current texture points
    to the `onTexture` property. You can then add a Boolean computed property that
    gets and sets this value. Here is the definition of that property:


    `var on: Bool {`


        `get {`


            `return self.texture == onTexture`


        `}`


        `set {`


            `if newValue {`


                `self.texture = onTexture`


            `} else {`


                `self.texture = offTexture`


            `}`


        `}`


    `}`


    Finally, you need to handle taps on the button to toggle its on and off states.
    Similar to what you did in the `Button` class, you check in the `handleInput`
    method whether the player tapped within the bounding box of the button. Here is
    the complete `handleInput` method:


    `override func handleInput(inputHelper: InputHelper) {`


        `super.handleInput(inputHelper)`


        `if inputHelper.containsTap(self.box) && !self.hidden {`


            `self.on = !self.on`


        `}`


    `}`


    Note that you only toggle the button state if it is visible. In the `GameWorld`
    class, you add an `OnOffButton` instance to the game world, at the desired position:


    `var onOffButton = OnOffButton()`


    `...`


    `onOffButton.position = CGPoint(x: 200, y: 50)`


    `self.addChild(onOffButton)`


    ## Defining a Slider Button


    Next, you add a second kind of GUI control: a slider. This slider will control
    the volume of the background music in the game. It consists of two sprites: a
    back sprite that represents the bar, and a front sprite that represents the actual
    slider. Therefore, the `Slider` class inherits from `SKNode` and contains (among
    others) two `SKSpriteNode` properties to represent each sprite. Because the back
    sprite has a border, you need to take this into account when you move or draw
    the slider. Therefore, you also define left and right margins that define the
    border width on the left and right side of the back sprite. The complete list
    of stored properties is given as follows:


    `var back = SKSpriteNode(imageNamed: "spr_slider_bar")`


    `var front = SKSpriteNode(imageNamed: "spr_slider_button")`


    `let leftMargin = CGFloat(4), rightMargin = CGFloat(7)`


    `var dragging = false`


    `var draggingIndex: Int?`


    As you can see, you also set a Boolean property `dragging` to `false` and you
    add a property `draggingIndex` that is an optional of type `Int`. You need these
    properties to keep track of when the player is dragging the slider and what the
    touch ID is so you update the slider position when needed, even when the touch
    location isn’t within the boundaries of the back sprite.


    ## Calculating World Positions of Game Objects


    Because you need to track whether the player is touching the slider, you need
    to calculate the bounding box of a node. If you look at the `SKNode` extension,
    you can see that it defines the `box` property, which was also a part of the original
    `GameObjectNode` class. In `GameObjectNode`, the `get` part of the `box` property
    contained a single line:


    `return self.calculateAccumulatedFrame()`


    This worked fine for the Tut’s Tomb game because that game used a very simple
    hierarchy of nodes. If a hierarchy becomes more complex, a node’s local position
    may be different from its actual position in the world. This is also the case
    for the slider. In the `Slider` initializer, the front part of the slider is positioned
    locally at the left side of the back sprite:


    `front.position = CGPoint(x: leftMargin - back.size.width/2 + front.size.width/2,
    y: 0)`


    However, the `Slider` node itself is also placed at a certain position in the
    scene:


    `musicSlider.position = CGPoint(x: 200, y: -100)`


    As a result, the local position of the slider bar is different from its actual
    position in the world. This is a problem if you want to check whether or not the
    player is touching the bar. Touch locations are calculated in the world space.
    The `calculateAccumulatedFrame` method returns the bounding box at the local node
    position. This means that an extra step is required to translate the local position
    into the world position. The new `box` property uses the `convertPoint` method
    to do this:


    `if parent != nil {`


        `boundingBox.origin = scene!.convertPoint(boundingBox.origin, fromNode: parent!)`


    `}`


    Note that it only performs the calculation if the node has a parent, because if
    it hasn’t, then its local position is the same as the world position. Since the
    bounding box is positioned locally to its parent, you need to convert the node
    position from the parent node to the scene node (which is the node at the root
    of the game world). For directly accessing the root of the game world, you use
    the `scene` property, which is a part of `SKNode`.


    For convenience, let’s also add a `worldPosition` property that calculates the
    position of the node in world coordinates. Here is the complete property (which
    also uses the `convertPoint` method):


    `var worldPosition: CGPoint {`


        `get {`


            `if parent != nil {`


                `return parent!.convertPoint(position, toNode: scene!)`


            `} else {`


                `return position`


            `}`


        `}`


    `}`'
  trans: "\n## 添加开关按钮\n\n下一步是添加一个开关按钮，用于在游戏过程中显示（或不显示）提示信息。在本章后面，你将看到这个按钮的值是如何被使用的。就像你为`Button`类所做的那样，你为开关按钮创建一个专门的类，命名为（毫不意外）`OnOffButton`。在\
    \ PenguinPairs2 示例中，这个类是 `SKSpriteNode` 的子类，就像新创建的 `Button` 类一样。它拥有两个（存储）属性，类型为\
    \ `SKTexture`，每个属性代表一个纹理（图像）：\n\n```\nvar onTexture  = SKTexture(imageNamed: \"\
    spr_button_on\")\nvar offTexture = SKTexture(imageNamed: \"spr_button_off\")\n\
    ```\n\n根据按钮的状态，将为精灵节点选择不同的纹理。该按钮有两种状态：关闭和开启（另见图 17-3）。当 `SKSpriteNode` 实例被初始化时，会默认选择开启状态：\n\
    \n![A978-1-4842-0650-8_17_Fig3_HTML.jpg](img/A978-1-4842-0650-8_17_Fig3_HTML.jpg)\n\
    \n*图 17-3.* 开关按钮使用的两种纹理\n\n```\ninit() {\n    super.init(texture: onTexture, color:\
    \ UIColor.whiteColor(), size: onTexture.size())\n}\n```\n\n按钮的一个重要方面是，你需要能够读取和设置其开启或关闭状态。由于按钮有两种纹理，你可以定义：如果当前纹理指向\
    \ `offTexture` 属性，则按钮处于关闭状态；如果当前纹理指向 `onTexture` 属性，则按钮处于开启状态。然后，你可以添加一个布尔类型的计算属性来获取和设置这个值。以下是该属性的定义：\n\
    \n```\nvar on: Bool {\n    get {\n        return self.texture == onTexture\n \
    \   }\n    set {\n        if newValue {\n            self.texture = onTexture\n\
    \        } else {\n            self.texture = offTexture\n        }\n    }\n}\n\
    ```\n\n最后，你需要处理按钮上的点击操作，以切换其开启和关闭状态。类似于你在 `Button` 类中所做的，你在 `handleInput` 方法中检查玩家是否点击了按钮的边界框内。以下是完整的\
    \ `handleInput` 方法：\n\n```\noverride func handleInput(inputHelper: InputHelper)\
    \ {\n    super.handleInput(inputHelper)\n    if inputHelper.containsTap(self.box)\
    \ && !self.hidden {\n        self.on = !self.on\n    }\n}\n```\n\n请注意，只有当按钮可见时，你才切换其状态。在\
    \ `GameWorld` 类中，你会在游戏世界中添加一个 `OnOffButton` 实例，并放置到所需位置：\n\n```\nvar onOffButton\
    \ = OnOffButton()\n...\nonOffButton.position = CGPoint(x: 200, y: 50)\nself.addChild(onOffButton)\n\
    ```\n\n## 定义滑块按钮\n\n接下来，你添加第二种 GUI 控件：滑块。这个滑块将用于控制游戏中背景音乐的音量。它由两个精灵组成：一个代表滑道（条形）的背景精灵，和一个代表实际滑块的前景精灵。因此，`Slider`\
    \ 类继承自 `SKNode`，并（除其他属性外）包含两个 `SKSpriteNode` 属性来表示每个精灵。由于背景精灵有边框，你在移动或绘制滑块时需要考虑到这一点。因此，你还定义了左右边距，用于指定背景精灵左右两侧的边框宽度。完整的存储属性列表如下：\n\
    \n```\nvar back = SKSpriteNode(imageNamed: \"spr_slider_bar\")\nvar front = SKSpriteNode(imageNamed:\
    \ \"spr_slider_button\")\nlet leftMargin = CGFloat(4), rightMargin = CGFloat(7)\n\
    var dragging = false\nvar draggingIndex: Int?\n```\n\n如你所见，你还将一个布尔属性 `dragging`\
    \ 设置为 `false`，并添加了一个可选类型 `Int` 的属性 `draggingIndex`。你需要这些属性来跟踪玩家何时正在拖动滑块，以及对应的触摸\
    \ ID，以便在必要时更新滑块位置，即使触摸位置不在背景精灵的边界内。\n\n## 计算游戏对象的世界坐标位置\n\n因为你需要跟踪玩家是否正在触摸滑块，所以你需要计算节点的边界框。如果你查看\
    \ `SKNode` 的扩展，可以看到它定义了 `box` 属性，这也是原始 `GameObjectNode` 类的一部分。在 `GameObjectNode`\
    \ 中，`box` 属性的 `get` 部分包含一行代码：\n\n```\nreturn self.calculateAccumulatedFrame()\n\
    ```\n\n这对于 Tut's Tomb 游戏来说运行良好，因为该游戏使用了一个非常简单的节点层级结构。如果层级结构变得更复杂，节点的局部位置可能与其在世界中的实际位置不同。滑块正是这种情况。在\
    \ `Slider` 的初始化器中，滑块的前景部分被局部定位在背景精灵的左侧：\n\n```\nfront.position = CGPoint(x: leftMargin\
    \ - back.size.width/2 + front.size.width/2, y: 0)\n```\n\n然而，`Slider` 节点本身也被放置在场景中的某个特定位置：\n\
    \n```\nmusicSlider.position = CGPoint(x: 200, y: -100)\n```\n\n因此，滑道（bar）的局部位置与其在世界中的实际位置不同。如果你想检查玩家是否在触摸滑道，这就会成为一个问题。触摸位置是在世界空间中计算的。`calculateAccumulatedFrame`\
    \ 方法返回节点局部位置处的边界框。这意味着需要额外一步来将局部位置转换为世界位置。新的 `box` 属性使用 `convertPoint` 方法来实现这一点：\n\
    \n```\nif parent != nil {\n    boundingBox.origin = scene!.convertPoint(boundingBox.origin,\
    \ fromNode: parent!)\n}\n```\n\n请注意，它只在节点有父节点时才执行计算，因为如果没有父节点，其局部位置与世界位置相同。由于边界框是相对于其父节点局部定位的，你需要将节点位置从父节点转换到场景节点（即游戏世界的根节点）。为了直接访问游戏世界的根节点，你使用了\
    \ `scene` 属性，它是 `SKNode` 的一部分。\n\n为了方便起见，我们再添加一个 `worldPosition` 属性，用于计算节点在世界坐标中的位置。以下是该属性的完整定义（同样使用了\
    \ `convertPoint` 方法）：\n\n```\nvar worldPosition: CGPoint {\n    get {\n      \
    \  if parent != nil {\n            return parent!.convertPoint(position, toNode:\
    \ scene!)\n        } else {\n            return position\n        }\n    }\n}\n\
    ```\n"
- fmt: "# Completing the Slider Class\n\nThe next step is adding a property `value`\
    \ to the `Slider` class that allows you to retrieve and set the value of the slider.\
    \ You want a value of 0 to indicate that the slider is fully moved to the left,\
    \ and a value of 1 to indicate the fully right position of the slider. You can\
    \ calculate the current value by looking at the position of the front sprite,\
    \ and seeing how much it's moved to the right. Therefore, the following line of\
    \ code calculates the slider value from the slider position:\n\n`return (front.position.x\
    \ - front.size.width/2 - (back.position.x - back.size.width/2) - leftMargin) /\
    \ (back.size.width - front.size.width - leftMargin - rightMargin)`\n\nIn the upper\
    \ part of the fraction, you calculate how far to the right the front sprite has\
    \ been moved. You calculate this locally to the back left position plus the left\
    \ margin. You then divide this by the total length that the slider can move. This\
    \ `return` instruction forms the `get` part of the `value` property. For the `set`\
    \ part of the property, you need to convert a value between zero and one to the\
    \ front slider x-position. This amounts to rewriting the previous formula such\
    \ that the front x-position is the unknown, which is then calculated as follows:\n\
    \n`front.position.x = newValue * (back.size.width - front.size.width - leftMargin\
    \ - rightMargin) + leftMargin - back.size.width/2 + front.size.width/2`\n\nNow\
    \ that you have a way to set and get the slider value, you need to write the code\
    \ to handle player input. The first step is checking whether the player is currently\
    \ touching the screen. If that isn't the case, you simply reset the dragging status\
    \ variables to their initial values, and you're done:\n\n```\nif !inputHelper.isTouching\
    \ {\n    dragging = false\n    draggingIndex = nil\n    return\n}\n```\n\nIf instructions\
    \ are executed that are written after this `if` instruction, you know the player\
    \ is touching the screen.\n\nYou need to check whether the player is actually\
    \ touching the button. If that is the case, you assign a new value to the `draggingIndex`\
    \ variable and set `dragging` to `true`:\n\n```\nif inputHelper.containsTouch(back.box)\
    \ {\n    draggingIndex = inputHelper.getIDInRect(back.box)\n    dragging = true\n\
    }\n```\n\nThen, you check whether the player is currently dragging. If not, you\
    \ are done and you return from the method:\n\n```\nif !dragging {\n    return\n\
    }\n```\n\nThe final step is updating the slider position since the player is currently\
    \ dragging. The first step is unwrapping the dragging index. Then, you retrieve\
    \ the position where the player is touching the screen:\n\n```\nif let draggingUnwrap\
    \ = draggingIndex {\n    let touchPos = inputHelper.getTouch(draggingUnwrap)\n\
    \    ...\n}\n```\n\nNext, you calculate what the x-position of the slider should\
    \ be. Because the touch position is in world coordinates, you subtract the world\
    \ position of the back sprite from it to get the local position of the slider.\
    \ This yields the following expression:\n\n`touchPos.x - back.worldPosition.x`\n\
    \nYou need to do a little more work, though, because you have to make sure the\
    \ slider can't move outside of its range. You therefore need to clamp the slider\
    \ position within a certain range. In order to do this, let's add a function that\
    \ can perform this clamping operation:\n\n```\nfunc clamp(number:CGFloat, min:CGFloat,\
    \ max:CGFloat) -> CGFloat\n{\n    if number < min {\n        return min\n    }\n\
    \    else if number > max {\n        return max\n    }\n    return number\n}\n\
    ```\n\nNow you use that function to calculate the clamped value of the slider,\
    \ and you store it as the slider's new x-position:\n\n```\nfront.position.x =\
    \ clamp(touchPos.x - back.worldPosition.x,\n    leftMargin - back.size.width/2\
    \ + front.size.width/2, back.size.width/2 - front.size.width/2 - rightMargin)\n\
    ```\n\nThis completes the code to handle the player input. You can then use the\
    \ `value` property in that class to change the volume of the music according to\
    \ the value of the slider (see the `updateDelta` method of the `GameWorld` class):\n\
    \n`backgroundMusic.volume = Float(musicSlider.value)`\n\nThis completes the `PenguinPairs2`\
    \ example. Figure [17-4](#A978-1-4842-0650-8_17_Chapter.html#Fig4) shows what\
    \ it looks like.\n\n![A978-1-4842-0650-8_17_Fig4_HTML.jpg](A978-1-4842-0650-8_17_Fig4_HTML.jpg)\n\
    \nFigure 17-4.\n\nThe `PenguinPairs2` example\n\nMost games contain some menu\
    \ screens. With these screens, the player can set options, choose levels, watch\
    \ achievements, and pause the game. Creating all these additional screens can\
    \ be a lot of work that doesn't contribute to the actual game play, so developers\
    \ tend to put less effort into them. But that is a very wrong decision.\n\nAn\
    \ artist once said, \"Your game is as good as its worst screen.\" If one of the\
    \ menu screens has poor quality, the player will get the feeling that the game\
