    \ removed from the scene), the contact was already handled, and the code is as\
    \ follows:\n\n```\nif firstBody?.parent == nil || secondBody?.parent == nil {\n\
    \    return\n}\n```\n\nYet another case is where two rocks collide. In that case,\
    \ you also return from the method because when two rocks collide, nothing happens–they\
    \ simply stay in the scene, like so:\n\n```\nif firstBody?.type == TreasureType.Rock\
    \ &&\n    secondBody?.type == TreasureType.Rock {\n    return\n}\n```\n\nThe final\
    \ case is the one where objects need to be removed from the scene. This happens\
    \ if the type of the two treasures matches, or either one of the treasures is\
    \ a magic crystal. Both objects are removed from the scene in that case, by using\
    \ the `removeFromParent` method:\n\n```\nif firstBody?.type == secondBody?.type\
    \ || firstBody?.type == TreasureType.Magic\n    || secondBody?.type == TreasureType.Magic\
    \ {\n    firstBody?.removeFromParent()\n    secondBody?.removeFromParent()\n}\n\
    ```\n\nTake a look at the `GameWorld` class in the TutsTomb3 example for the complete\
    \ code of the method. Note that the order in which the `if` instructions are written\
    \ inside the method body is important. For example, dealing with rocks works correctly\
    \ because of the order. If the `if` instruction comparing the rock types was placed\
    \ at the end of the method body, then two rocks would also be removed from the\
