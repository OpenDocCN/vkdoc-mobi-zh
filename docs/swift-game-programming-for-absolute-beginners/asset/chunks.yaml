- fmt: "# Cannon as a Subclass of `ThreeColorGameObject`\n\nNow that you’ve created\
    \ a very basic class for colored game objects, you can reuse this basic behavior\
    \ for the actual game objects in your game by inheriting from this class. Let’s\
    \ first look at the `Cannon` class. Because you’ve defined the basic `ThreeColorGameObject`\
    \ class, you can create the `Cannon` class as a subclass of that class. Here is\
    \ a part of the definition of the `Cannon` class:\n\n```\nclass Cannon: ThreeColorGameObject\
    \ {\n\n    var barrel = SKSpriteNode(imageNamed:\"spr_cannon_barrel\")\n\n   \
    \ init() {\n        super.init(\"spr_cannon_red\", \"spr_cannon_green\", \"spr_cannon_blue\"\
    )\n        red.zPosition = 1\n        green.zPosition = 1\n        blue.zPosition\
    \ = 1\n        barrel.anchorPoint = CGPoint(x:0.233, y:0.5)\n        node.position\
    \ = CGPoint(x:-430, y:-280)\n        node.zPosition = 1\n        green.hidden\
    \ = true\n        blue.hidden = true\n        node.addChild(barrel)\n    }\n\n\
    \    ...\n}\n```\n\nThe `Cannon` class introduces an extra property, called `barrel`.\
    \ Also, the class has its own initializer. The first instruction in the `Cannon`\
    \ initializer calls the designated initializer from the superclass. Between the\
    \ parentheses, you see the three sprite parameters that this initializer expects.\
    \ Then, the rest of the `Cannon` object is initialized.\n\nNow that the new version\
    \ of the `Cannon` class has been defined, you can start adding properties and\
    \ methods to the class, just as you did before. For example, here is the `handleInput`\
    \ method:\n\n```\noverride func handleInput(inputHelper: InputHelper) {\n    if\
    \ !inputHelper.isTouching {\n        return\n    }\n    let localTouch: CGPoint\
    \ = GameScene.world.node.convertPoint(inputHelper.touchLocation, toNode: red)\n\
    \    if !red.frame.contains(localTouch) {\n        let opposite = inputHelper.touchLocation.y\
    \ - node.position.y\n        let adjacent = inputHelper.touchLocation.x - node.position.x\n\
    \        barrel.zRotation = atan2(opposite, adjacent)\n    } else if inputHelper.hasTapped\
    \ {\n        let tmp = blue.hidden\n        blue.hidden = green.hidden\n     \
    \   green.hidden = red.hidden\n        red.hidden = tmp\n    }\n}\n```\n\nAs you\
    \ can see, you can access properties such as `node` and `red` without any problem.\
    \ Because `Cannon` inherits from `ThreeColorGameObject`, it contains the same\
    \ (stored and computed) properties and methods. As you can also see, the word\
    \ `override` indicates that this method replaces the original method (which had\
    \ an empty body) from `ThreeColorGameObject`.\n\nIf you take a look at the `Cannon`\
    \ class in the Painter8 example belonging to this chapter, you can see that the\
    \ class definition is much smaller and easier to read than in the previous version\
    \ because all the generic game-object properties and methods are placed in the\
    \ `ThreeColorGameObject` class. Organizing your code in different classes and\
    \ subclasses helps to reduce code copying and results in generally cleaner designs.\
    \ There is a caveat, however: your class structure (which class inherits from\
    \ which other class) must be correct. Remember that classes should only inherit\
    \ from other classes if there is a “is a kind of” relationship between the classes.\
    \ To illustrate this, suppose you want to add an indicator at the top of the screen\
    \ that shows the current color of the ball. You could make a class for that and\
    \ let it inherit from the `Cannon` class because it needs to handle input in a\
    \ similar way:\n\n```\nclass ColorIndicator : Cannon {\n    ...\n}\n```\n\nHowever,\
    \ this is a very bad idea. A color indicator is certainly not a kind of cannon,\
    \ and designing your classes this way makes it very unclear to other developers\
    \ what the classes are used for. Furthermore, the color indicator would now also\
    \ have a barrel, which doesn’t make any sense. Class-inheritance diagrams should\
    \ be logical and easy to understand. Every time you write a class that inherits\
    \ from another class, ask yourself whether that class really “is a kind of” the\
    \ class that you inherit from. If it isn’t, then you have to rethink your design.\n\
    \n## The `Ball` Class\n\nYou define the new `Ball` class in a fashion very similar\
    \ to the `Cannon` class. Just as in the `Cannon` class, you inherit from the `ThreeColorGameObject`\
    \ class. The only difference is that you add an extra property that indicates\
    \ whether the ball is ready to be shot:\n\n```\nclass Ball : ThreeColorGameObject\
    \ {\n    var readyToShoot = false\n\n    init() {\n        super.init(\"spr_ball_red\"\
    , \"spr_ball_green\", \"spr_ball_blue\")\n        node.zPosition = 1\n       \
    \ node.hidden = true\n    }\n\n    convenience init(position: CGPoint) {\n   \
    \     self.init()\n        node.position = position\n    }\n\n    ...\n}\n```\n\
    \nWhen a `Ball` instance is created, you need to call the designated `ThreeColorGameObject`\
    \ initializer, just as you did with the `Cannon` class. In this case, you pass\
    \ along the ball sprites as parameters.\n\nThe `Ball` class clearly illustrates\
    \ what happens when you inherit from another class. Each `Ball` instance consists\
    \ of a part that has been inherited from `ThreeColorGameObject` and a part that\
    \ is defined in the `Ball` class. Figure [10-2](#A978-1-4842-0650-8_10_Chapter.html#Fig2)\
    \ shows what the memory looks like for a `Ball` object without using inheritance.\
    \ Figure [10-3](#A978-1-4842-0650-8_10_Chapter.html#Fig3) also shows a `Ball`\
    \ instance, but using the inheritance mechanism introduced in this chapter.\n\n\
    ![A978-1-4842-0650-8_10_Fig3_HTML.gif](A978-1-4842-0650-8_10_Fig3_HTML.gif)\n\n\
    Figure 10-3. An instance of the `Ball` class (which inherits from `ThreeColorGameObject`)\n\
    \n![A978-1-4842-0650-8_10_Fig2_HTML.gif](A978-1-4842-0650-8_10_Fig2_HTML.gif)\n\
    \nFigure 10-2. Overview of the memory used by an instance of the `Ball` class\
    \ (no inheritance)\n\nThe `updateDelta` method in the `ThreeColorGameObject` class\
    \ contains only two instructions that calculate the new position of the game object\
    \ based on its velocity, the time passed, and its current position:\n\n```\nnode.position.x\
    \ += velocity.x * CGFloat(delta)\nnode.position.y += velocity.y * CGFloat(delta)\n\
    ```\n\nBalls should do more than that. The ball velocity should be updated to\
    \ incorporate drag and gravity; the color of the ball should be updated if needed;\
    \ and if the ball flies outside the screen, it should be reset to its original\
    \ position. You could simply copy the `updateDelta` method from the previous version\
    \ of the `Ball` class so that it replaces the `updateDelta` method of `ThreeColorGameObject`.\
    \ A slightly nicer way to do it is to define the `updateDelta` method in the `Ball`\
    \ class but reuse the original `updateDelta` method from `ThreeColorGameObject`.\
    \ This can be done by using the `super` keyword in a way very similar to how you\
    \ used it to call the initializer of the superclass. Here is the new version of\
    \ the `updateDelta` method in the `Ball` class:\n\n```\noverride func updateDelta(delta:\
    \ NSTimeInterval) {\n    if !node.hidden {\n        velocity.x *= 0.99\n     \
    \   velocity.y -= 15\n        super.updateDelta(delta)\n    } else {\n       \
    \ // calculate the ball position\n        node.position = GameScene.world.cannon.ballPosition\n\
    \        // copy the ball color\n        self.color = GameScene.world.cannon.color\n\
    \    }\n\n    if GameScene.world.isOutsideWorld(node.position) {\n        reset()\n\
    \    }\n}\n```\n\nIn the body of the `if` instruction, you update the velocity\
    \ and then call the `updateDelta` method of the superclass, which updates the\
    \ position of the game object. The nice thing is that this approach allows you\
    \ to separate different parts of (in this case) the updating process. Any game\
    \ object with a position and velocity will need to update its position based on\
    \ its velocity in each iteration of the game loop. You define this behavior in\
    \ the `updateDelta` method of `ThreeColorGameObject` so you can reuse it for any\
    \ class that inherits from `ThreeColorGameObject`!"
  raw: '## Cannon as a Subclass of ThreeColorGameObject


    Now that you’ve created a very basic class for colored game objects, you can reuse
    this basic behavior for the actual game objects in your game by inheriting from
    this class. Let’s first look at the `Cannon` class. Because you’ve defined the
    basic `ThreeColorGameObject` class, you can create the `Cannon` class as a subclass
    of that class. Here is a part of the definition of the `Cannon` class:


    `class Cannon: ThreeColorGameObject {`


    `var barrel = SKSpriteNode(imageNamed:"spr_cannon_barrel")`


    `init() {`


    `super.init("spr_cannon_red", "spr_cannon_green", "spr_cannon_blue")`


    `red.zPosition = 1`


    `green.zPosition = 1`


    `blue.zPosition = 1`


    `barrel.anchorPoint = CGPoint(x:0.233, y:0.5)`


    `node.position = CGPoint(x:-430, y:-280)`


    `node.zPosition = 1`


    `green.hidden = true`


    `blue.hidden = true`


    `node.addChild(barrel)`


    `}`


    `...`


    `}`


    The `Cannon` class introduces an extra property, called `barrel`. Also, the class
    has its own initializer. The first instruction in the `Cannon` initializer calls
    the designated initializer from the superclass. Between the parentheses, you see
    the three sprite parameters that this initializer expects. Then, the rest of the
    `Cannon` object is initialized.


    Now that the new version of the `Cannon` class has been defined, you can start
    adding properties and methods to the class, just as you did before. For example,
    here is the `handleInput` method:


    `override func handleInput(inputHelper: InputHelper) {`


    `if !inputHelper.isTouching {`


    `return`


    `}`


    `let localTouch: CGPoint = GameScene.world.node.convertPoint(inputHelper.touchLocation,
    toNode: red)`


    `if !red.frame.contains(localTouch) {`


    `let opposite = inputHelper.touchLocation.y - node.position.y`


    `let adjacent = inputHelper.touchLocation.x - node.position.x`


    `barrel.zRotation = atan2(opposite, adjacent)`


    `} else if inputHelper.hasTapped {`


    `let tmp = blue.hidden`


    `blue.hidden = green.hidden`


    `green.hidden = red.hidden`


    `red.hidden = tmp`


    `}`


    `}`


    As you can see, you can access properties such as `node` and `red` without any
    problem. Because `Cannon` inherits from `ThreeColorGameObject`, it contains the
    same (stored and computed) properties and methods. As you can also see, the word
    `override` indicates that this method replaces the original method (which had
    an empty body) from `ThreeColorGameObject`.


    If you take a look at the `Cannon` class in the Painter8 example belonging to
    this chapter, you can see that the class definition is much smaller and easier
    to read than in the previous version because all the generic game-object properties
    and methods are placed in the `ThreeColorGameObject` class. Organizing your code
    in different classes and subclasses helps to reduce code copying and results in
    generally cleaner designs. There is a caveat, however: your class structure (which
    class inherits from which other class) must be correct. Remember that classes
    should only inherit from other classes if there is a “is a kind of” relationship
    between the classes. To illustrate this, suppose you want to add an indicator
    at the top of the screen that shows the current color of the ball. You could make
    a class for that and let it inherit from the `Cannon` class because it needs to
    handle input in a similar way:


    `class ColorIndicator : Cannon {`


    `...`


    `}`


    However, this is a very bad idea. A color indicator is certainly not a kind of
    cannon, and designing your classes this way makes it very unclear to other developers
    what the classes are used for. Furthermore, the color indicator would now also
    have a barrel, which doesn’t make any sense. Class-inheritance diagrams should
    be logical and easy to understand. Every time you write a class that inherits
    from another class, ask yourself whether that class really “is a kind of” the
    class that you inherit from. If it isn’t, then you have to rethink your design.


    ## The Ball Class


    You define the new `Ball` class in a fashion very similar to the `Cannon` class.
    Just as in the `Cannon` class, you inherit from the `ThreeColorGameObject` class.
    The only difference is that you add an extra property that indicates whether the
    ball is ready to be shot:


    `class Ball : ThreeColorGameObject {`


        `var readyToShoot = false`


        `init() {`


            `super.init("spr_ball_red", "spr_ball_green", "spr_ball_blue")`


            `node.zPosition = 1`


            `node.hidden = true`


        `}`


        `convenience init(position: CGPoint) {`


            `self.init()`


            `node.position = position`


        `}`


        `...`


    `}`


    When a `Ball` instance is created, you need to call the designated `ThreeColorGameObject`
    initializer, just as you did with the `Cannon` class. In this case, you pass along
    the ball sprites as parameters.


    The `Ball` class clearly illustrates what happens when you inherit from another
    class. Each `Ball` instance consists of a part that has been inherited from `ThreeColorGameObject`
    and a part that is defined in the `Ball` class. Figure [10-2](#A978-1-4842-0650-8_10_Chapter.html#Fig2)
    shows what the memory looks like for a `Ball` object without using inheritance.
    Figure [10-3](#A978-1-4842-0650-8_10_Chapter.html#Fig3) also shows a `Ball` instance,
    but using the inheritance mechanism introduced in this chapter.


    ![A978-1-4842-0650-8_10_Fig3_HTML.gif](A978-1-4842-0650-8_10_Fig3_HTML.gif)


    Figure 10-3.


    An instance of the `Ball` class (which inherits from `ThreeColorGameObject`)


    ![A978-1-4842-0650-8_10_Fig2_HTML.gif](A978-1-4842-0650-8_10_Fig2_HTML.gif)


    Figure 10-2.


    Overview of the memory used by an instance of the `Ball` class (no inheritance)


    The `updateDelta` method in the `ThreeColorGameObject` class contains only two
    instructions that calculate the new position of the game object based on its velocity,
    the time passed, and its current position:


    `node.position.x += velocity.x * CGFloat(delta)`


    `node.position.y += velocity.y * CGFloat(delta)`


    Balls should do more than that. The ball velocity should be updated to incorporate
    drag and gravity; the color of the ball should be updated if needed; and if the
    ball flies outside the screen, it should be reset to its original position. You
    could simply copy the `updateDelta` method from the previous version of the `Ball`
    class so that it replaces the `updateDelta` method of `ThreeColorGameObject`.
    A slightly nicer way to do it is to define the `updateDelta` method in the `Ball`
    class but reuse the original `updateDelta` method from `ThreeColorGameObject`.
    This can be done by using the `super` keyword in a way very similar to how you
    used it to call the initializer of the superclass. Here is the new version of
    the `updateDelta` method in the `Ball` class:


    `override func updateDelta(delta: NSTimeInterval) {`


        `if !node.hidden {`


            `velocity.x *= 0.99`


            `velocity.y -= 15`


            `super.updateDelta(delta)`


        `} else {`


            `// calculate the ball position`


            `node.position = GameScene.world.cannon.ballPosition`


            `// copy the ball color`


            `self.color = GameScene.world.cannon.color`


        `}`


        `if GameScene.world.isOutsideWorld(node.position) {`


            `reset()`


        `}`


    `}`


    In the body of the `if` instruction, you update the velocity and then call the
    updateDelta method of the superclass, which updates the position of the game object.
    The nice thing is that this approach allows you to separate different parts of
    (in this case) the updating process. Any game object with a position and velocity
    will need to update its position based on its velocity in each iteration of the
    game loop. You define this behavior in the `updateDelta` method of `ThreeColorGameObject`
    so you can reuse it for any class that inherits from `ThreeColorGameObject`!'
  trans: "\n# 作为 `ThreeColorGameObject` 子类的 Cannon\n\n既然你已经为彩色游戏对象创建了一个非常基础的类，你可以通过继承这个类，在你的游戏对象中复用这些基础行为。我们首先来看看\
    \ `Cannon` 类。因为你已经定义了基础的 `ThreeColorGameObject` 类，你就可以将 `Cannon` 类创建为该类的子类。以下是\
    \ `Cannon` 类定义的一部分：\n\n```\nclass Cannon: ThreeColorGameObject {\n\n    var barrel\
    \ = SKSpriteNode(imageNamed:\"spr_cannon_barrel\")\n\n    init() {\n        super.init(\"\
    spr_cannon_red\", \"spr_cannon_green\", \"spr_cannon_blue\")\n        red.zPosition\
    \ = 1\n        green.zPosition = 1\n        blue.zPosition = 1\n        barrel.anchorPoint\
    \ = CGPoint(x:0.233, y:0.5)\n        node.position = CGPoint(x:-430, y:-280)\n\
    \        node.zPosition = 1\n        green.hidden = true\n        blue.hidden\
    \ = true\n        node.addChild(barrel)\n    }\n\n    ...\n}\n```\n\n`Cannon`\
    \ 类引入了一个额外的属性，名为 `barrel`。此外，该类拥有自己的初始化器。`Cannon` 初始化器中的第一条指令调用了父类的指定初始化器。在括号中，你可以看到这个初始化器所期望的三个精灵参数。然后，`Cannon`\
    \ 对象的其余部分被初始化。\n\n既然新版本的 `Cannon` 类已经定义完成，你可以像之前一样开始向该类添加属性和方法。例如，下面是 `handleInput`\
    \ 方法：\n\n```\noverride func handleInput(inputHelper: InputHelper) {\n    if !inputHelper.isTouching\
    \ {\n        return\n    }\n    let localTouch: CGPoint = GameScene.world.node.convertPoint(inputHelper.touchLocation,\
    \ toNode: red)\n    if !red.frame.contains(localTouch) {\n        let opposite\
    \ = inputHelper.touchLocation.y - node.position.y\n        let adjacent = inputHelper.touchLocation.x\
    \ - node.position.x\n        barrel.zRotation = atan2(opposite, adjacent)\n  \
    \  } else if inputHelper.hasTapped {\n        let tmp = blue.hidden\n        blue.hidden\
    \ = green.hidden\n        green.hidden = red.hidden\n        red.hidden = tmp\n\
    \    }\n}\n```\n\n如你所见，你可以毫无问题地访问诸如 `node` 和 `red` 这样的属性。因为 `Cannon` 继承自 `ThreeColorGameObject`，它包含了相同的（存储属性和计算属性）和方法。同样你可以看到，`override`\
    \ 这个词表明该方法替换了 `ThreeColorGameObject` 中的原始方法（该方法原本有一个空实现）。\n\n如果你查看本章配套 Painter8\
    \ 示例中的 `Cannon` 类，你会发现其类定义比之前的版本更小、更易读了，因为所有通用的游戏对象属性和方法都被放在了 `ThreeColorGameObject`\
    \ 类中。将代码组织在不同的类和子类中有助于减少代码重复，从而带来更清晰的设计。然而，这里有一个注意事项：你的类结构（哪个类继承自哪个类）必须是正确的。请记住，只有当类之间存在“is\
    \ a kind of”（是一种）的关系时，才应该从一个类继承到另一个类。为了说明这一点，假设你想在屏幕顶部添加一个指示器来显示球的当前颜色。你可以为此创建一个类，并让它继承自\
    \ `Cannon` 类，因为它需要以类似的方式处理输入：\n\n```\nclass ColorIndicator : Cannon {\n    ...\n\
    }\n```\n\n然而，这是一个非常糟糕的主意。颜色指示器显然不是一种大炮，以这种方式设计你的类会让其他开发者非常不清楚这些类的用途。此外，颜色指示器现在也会有一个炮管，这毫无意义。类的继承图应该是逻辑清晰且易于理解的。每次你编写一个继承自其他类的类时，都要问问自己，该类是否真的“是一种”你所继承的类。如果不是，那么你必须重新考虑你的设计。\n\
    \n## `Ball` 类\n\n你以与 `Cannon` 类非常相似的方式定义新的 `Ball` 类。就像在 `Cannon` 类中一样，你继承自 `ThreeColorGameObject`\
    \ 类。唯一的区别是你添加了一个额外的属性，用于指示球是否准备好发射：\n\n```\nclass Ball : ThreeColorGameObject\
    \ {\n    var readyToShoot = false\n\n    init() {\n        super.init(\"spr_ball_red\"\
    , \"spr_ball_green\", \"spr_ball_blue\")\n        node.zPosition = 1\n       \
    \ node.hidden = true\n    }\n\n    convenience init(position: CGPoint) {\n   \
    \     self.init()\n        node.position = position\n    }\n\n    ...\n}\n```\n\
    \n当创建 `Ball` 实例时，你需要调用指定的 `ThreeColorGameObject` 初始化器，就像你对 `Cannon` 类所做的那样。在这种情况下，你将球的精灵作为参数传递进去。\n\
    \n`Ball` 类清晰地说明了当你继承自另一个类时会发生什么。每个 `Ball` 实例由两部分组成：一部分继承自 `ThreeColorGameObject`，另一部分定义在\
    \ `Ball` 类中。图 10-2 展示了不使用继承时，一个 `Ball` 对象的内存布局。图 10-3 也展示了一个 `Ball` 实例，但它使用了本章介绍的继承机制。\n\
    \n![A978-1-4842-0650-8_10_Fig3_HTML.gif](img/A978-1-4842-0650-8_10_Fig3_HTML.gif)\n\
    \n图 10-3. `Ball` 类的一个实例（继承自 `ThreeColorGameObject`）\n\n![A978-1-4842-0650-8_10_Fig2_HTML.gif](img/A978-1-4842-0650-8_10_Fig2_HTML.gif)\n\
    \n图 10-2. `Ball` 类实例的内存使用概览（无继承）\n\n`ThreeColorGameObject` 类中的 `updateDelta` 方法只包含两条指令，用于根据游戏对象的速度、经过的时间以及当前位置来计算其新位置：\n\
    \n```\nnode.position.x += velocity.x * CGFloat(delta)\nnode.position.y += velocity.y\
    \ * CGFloat(delta)\n```\n\n球的运行逻辑应该更复杂一些。应该更新球的速度以包含阻力和重力；如果需要，应该更新球的颜色；如果球飞出了屏幕，它应该重置到原始位置。你可以简单地从之前版本的\
    \ `Ball` 类中复制 `updateDelta` 方法，使其覆盖 `ThreeColorGameObject` 的 `updateDelta` 方法。一个稍微好一点的方式是在\
    \ `Ball` 类中定义 `updateDelta` 方法，但复用 `ThreeColorGameObject` 中的原始 `updateDelta` 方法。这可以通过使用\
    \ `super` 关键字来实现，其方式与你用它来调用父类初始化器非常相似。以下是 `Ball` 类中 `updateDelta` 方法的新版本：\n\n\
    ```\noverride func updateDelta(delta: NSTimeInterval) {\n    if !node.hidden {\n\
    \        velocity.x *= 0.99\n        velocity.y -= 15\n        super.updateDelta(delta)\n\
    \    } else {\n        // 计算球的位置\n        node.position = GameScene.world.cannon.ballPosition\n\
    \        // 复制球的颜色\n        self.color = GameScene.world.cannon.color\n    }\n\
    \n    if GameScene.world.isOutsideWorld(node.position) {\n        reset()\n  \
    \  }\n}\n```\n\n在 `if` 指令的主体中，你更新了速度，然后调用了父类的 `updateDelta` 方法，该方法会更新游戏对象的位置。这种方式的好处在于，它允许你将（本例中的）更新过程的不同部分分离开来。任何拥有位置和速度的游戏对象，都需要在游戏循环的每次迭代中根据其速度更新其位置。你在\
    \ `ThreeColorGameObject` 的 `updateDelta` 方法中定义了这种行为，这样你就可以在继承自 `ThreeColorGameObject`\
    \ 的任何类中复用该方法！\n"
- fmt: "## The `PaintCan` Class\n\nThe final class that inherits from `ThreeColorGameObject`\
    \ is `PaintCan`. Have a look at the `Painter8` example to see the complete class.\
    \ `PaintCan` overrides the `updateDelta` method as well as the `reset` method.\
    \ Just like before, it doesn’t handle any input, so you don’t have to override\
    \ the `handleInput` method.\n\nThere is one interesting bit in the `PaintCan`\
    \ class, and that is the part using the `box` computed property. Since any class\
    \ inheriting from `ThreeColorGameObject` has that property, you can now use it\
    \ to easily check whether two game objects collide. Take a look at the following\
    \ lines of code:\n\n```\nvar ball = GameScene.world.ball\n\nif self.box.intersects(ball.box)\
    \ {\n    color = ball.color\n    ball.reset()\n}\n```\n\nThese are just a few\
    \ lines of code, but behind the scenes a lot is happening. Bounding boxes are\
    \ computed as well as intersections between them, and the hidden statuses of colored\
    \ sprites are changed. Because of the way the code is designed, you can do these\
    \ tasks by writing only a couple of lines of code!\n\nWhen looking at the game\
    \ object classes, you can see that another interesting thing has happened. Because\
    \ each game object class inherits from `ThreeColorGameObject`, the definitions\
    \ in the `ThreeColorGameObject` class determine what methods and properties look\
    \ like. In a sense, `ThreeColorGameObject` imposes constraints on any game object\
    \ classes that inherit from it. For example, it enforces that the method for handling\
    \ input is called `handleInput` (and not `HandleInput`, `handleinput`, or `handle_input`).\
    \ This is another way in which inheritance helps to increase the quality of your\
    \ code: it results in more consistent class definitions.\n\n## Polymorphism\n\n\
    Because of the inheritance mechanism, you don’t always have to know to what type\
    \ of object a variable is pointing to. Consider the following declaration and\
    \ initialization:\n\n```\nvar someKindOfGameObject : Cannon = Cannon()\n```\n\n\
    And somewhere else in the code, you do this:\n\n```\nsomeKindOfGameObject.updateDelta(delta)\n\
    ```\n\nNow suppose you change the declaration and initialization, as follows:\n\
    \n```\nvar someKindOfGameObject : ThreeColorGameObject = Cannon()\n```\n\nThis\
    \ is allowed, since `Cannon` is a subclass of `ThreeColorGameObject`. The other\
    \ way (assigning a `ThreeColorGameObject` instance to a variable of type `Cannon`)\
    \ is not allowed, since not every `ThreeColorGameObject` is a cannon (some of\
    \ them are a ball or a paint can).\n\nSo, if `someKindOfGameObject` is of type\
    \ `ThreeColorGameObject`, which version of the `updateDelta` method is called?\
    \ It depends on the instance that the variable refers to. If that instance happens\
    \ to be a `Cannon` instance, the `updateDelta` method of `Cannon` will be called.\
    \ If it’s a `Ball` instance, the `updateDelta` method of `Ball` will be called.\
    \ When the program is executed, the right version of the `updateDelta` method\
    \ is called automatically.\n\nThis effect is called polymorphism, and it comes\
    \ in very handy sometimes. Polymorphism allows you to better separate code. Suppose\
    \ a game company wants to release an extension of its game. For example, it might\
    \ want to introduce a few new enemies, or skills that a player can learn. The\
    \ company can provide these extensions as subclasses of generic `Enemy` and `Skill`\
    \ classes. The actual game code will then use these objects without having to\
    \ know which particular skill or enemy it’s dealing with. It simply calls the\
    \ methods that were defined in the generic classes.\n\n## Inheriting from Existing\
    \ Classes\n\nInstead of creating a subclass of a class you wrote yourself, you\
    \ can also inherit from classes written by other developers. In the `Painter8`\
    \ example, there are two hierarchies of game objects. One hierarchy is represented\
    \ by the classes you created: the `GameWorld` instance contains references to\
    \ the cannon, ball, and paint can objects. The second hierarchy is the one defined\
    \ by the nodes in the scene graph. Generally, this is not an ideal solution. Because\
    \ there are two hierarchies to maintain, inconsistencies can easily occur, leading\
    \ to bugs and other undesired behavior.\n\nA way to solve this problem is by merging\
    \ these two hierarchies. The `Painter9` example shows how this is done. The main\
    \ difference between `Painter8` and `Painter9` is that in `Painter9`, the game\
    \ object classes are all (indirectly) a subclass of `SKNode`, which is the main\
    \ representation of a node in the scene graph in the SpriteKit framework. The\
    \ `ThreeColorGameObject` class is now a subclass of `SKNode`. This means that\
    \ the `node` property is no longer needed because any game object will already\
    \ be a node itself.\n\nIf you take a look at the `ThreeColorGameObject` class\
    \ in `Painter9`, you’ll see that it is now a subclass of `SKNode`. Because of\
    \ this, you need to do a few extra things. For one, you need to call the initializer\
    \ of the superclass in your own initializers:\n\n```\noverride init() {\n    super.init()\n\
    \    self.addChild(red)\n    self.addChild(green)\n    self.addChild(blue)\n}\n\
    \ninit(_ spriteRed: String, _ spriteGreen: String, _ spriteBlue: String) {\n \
    \   super.init()\n    red = SKSpriteNode(imageNamed: spriteRed)\n    green = SKSpriteNode(imageNamed:\
    \ spriteGreen)\n    blue = SKSpriteNode(imageNamed: spriteBlue)\n    self.addChild(red)\n\
    \    self.addChild(green)\n    self.addChild(blue)\n}\n```\n\nThe first initializer\
    \ overrides the initializer of the superclass and makes sure that the three sprite\
    \ nodes are added to this game object to ensure consistency, no matter what initializer\
    \ is called. The second initializer is the same as before, except that it calls\
    \ the initializer of the superclass, and sprites are now added to the game object\
    \ itself instead of a separate node.\n\nFinally, you see the following initializer:\n\
    \n```\nrequired init?(coder aDecoder: NSCoder) {\n    fatalError(\"init(coder:)\
    \ has not been implemented\")\n}\n```\n\nWhen you inherit from `SKNode`, you are\
    \ required to add this initializer (also indicated in the code itself by the `required`\
    \ keyword). The reason this initializer is needed is because the `SKNode` class\
    \ supports something called serialization. Serialization means that it’s possible\
    \ to initialize objects from data (for example, stored in a file). This is a useful\
    \ feature for many games because it forms the basis of the save game mechanism.\
    \ In `Painter`, there is no such mechanism, however, so the initializer contains\
    \ a single instruction that stops the program with an error.\n\nBecause `ThreeColorGameObject`\
    \ is a subclass of `SKNode`, any class inheriting from `ThreeColorGameObject`\
    \ also is a subclass of `SKNode`, including the `Cannon`, the `Ball` and the `PaintCan`\
    \ classes. As you can see in `Painter9`, the `GameWorld` class is set up in a\
    \ very similar way as `ThreeColorGameObject`: it inherits from `SKNode`, so a\
