    Tut (see Figure III-1 for a screenshot). All kinds of treasures fall down in the
    tomb, and by dragging treasures that are the same towards each other, you collect
    them and get points. Watch out, though: if a treasure stays in the tomb too long,
    it turns into a useless rock that takes up space. The treasures keep falling down
    faster and faster. If you don’t remove enough treasures from the tomb, the tomb
    will be completely filled and the game is over. In the following chapters, you
