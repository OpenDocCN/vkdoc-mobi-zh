    `updateBall(ball2)`


    `updateBall(ball3)`


    `updateBall(ball4)`


    `...`


    `}`


    You need to do the same thing for initializing each ball as well as for ball input
    handing. Although this is an acceptable solution, it doesn’t really scale in the
    long run, either. In the Painter game, only a few different game objects exist:
    a cannon, a ball, and three paint cans. Commercial games may have hundreds of
    different game objects. If you have to add initialization, input handling, and
    updating methods to the `GameScene` class for each object type, that class would
    become huge, which in turn would make it really cumbersome to edit the code.


