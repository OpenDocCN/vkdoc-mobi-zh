  trans: '

    ### 编程语言


    在早期，编写电脑游戏是一项极具挑战性的任务，需要高超的技巧。像当时流行的雅达利 2600 这样的游戏机，仅有 128 字节的内存，这与今天的电脑相比（4GB
    内存大约是 128 字节的 33000 倍）实在是微不足道。它使用的卡带也只拥有最多 4096 字节的 ROM（只读存储器），并且程序与游戏数据都必须存放在其中。这极大地限制了可能性，而且当时的机器运行速度也极其缓慢。


    编写这类游戏使用的是`汇编语言`，这是一种非常基础的编程语言，它定义了一组处理器可以执行的指令。不同的处理器可能拥有不同的指令集，从而衍生出不同的汇编语言。因此，每当出现一款新的处理器，所有现有的程序都必须为其完全重写。于是，对独立于处理器的编程语言的需求应运而生。由此诞生了诸如`Fortran`（公式翻译系统）和`BASIC`（初学者通用符号指令代码）这样的语言。`BASIC`在
    20 世纪 70 年代非常流行，因为它随早期的个人电脑一同推出，如 1978 年的苹果 II、1979 年的 IBM-PC 及其后续机型。遗憾的是，这种语言从未被标准化，因此每个电脑品牌都使用了自己版本的`BASIC`方言。


    随着程序日益复杂，显然需要一种更好的方式来组织所有这些指令。于是，过程式语言被创造出来；它们将指令分组到过程（也称为函数或方法）中。过程式语言的一个著名例子是`C`，它由贝尔实验室在
    20 世纪 70 年代末定义。`C`至今仍被广泛使用，尽管它正逐渐但坚定地被更现代的语言所取代，尤其是在游戏行业。


    多年来，游戏程序变得庞大得多，并且是由团队而非个人来创建。代码的可读性、可复用性和易于调试变得至关重要。面向对象的编程语言满足了这一需求，它允许程序员将方法分组到一种称为`类`的结构中。与方法组相关联的内存区域被称为`对象`。一个`类`可以描述像《吃豆人》游戏中的幽灵这样的东西。那么每个单独的幽灵就对应于该`类`的一个`对象`。这种编程思维方式应用于游戏时非常强大。面向对象编程的另一个强大方面是继承，它允许开发者扩展现有代码并为其添加功能。你将在第
    10 章中了解更多关于继承以及如何在游戏中使用它的内容。


    在 80 年代早期，两位名为布拉德·考克斯和汤姆·洛夫的程序员创造了一种名为`Objective-C`的语言，它是`C`语言的扩展，能够实现面向对象编程。1988
    年，`Objective-C`语言被授权给 NeXT 公司，这家公司由史蒂夫·乔布斯在 1985 年被苹果公司排挤出走后创立。NeXT 围绕`Objective-C`语言开发了大量工具，例如一个用于构建界面的工具，以及一个名为
    Project Builder 的开发环境，也就是我们现在称为`Xcode`的前身。当乔布斯在 90 年代重返苹果时，NeXT 开发的这些工具成为了 Mac
    OS X 的基础。


    在过去的二十年里，像`Java`和`C#`这样的新语言进一步引入了许多有用的特性。苹果意识到其平台需要一种能够受益于过去几十年编程语言进步的新语言。于是，在
    2014 年 6 月 2 日，苹果发布了`Swift`编程语言，作为 OS X 和 iOS 的新编程语言。`Swift`是比`Objective-C`更现代的替代方案。它吸收了`C#`或`JavaScript`等语言的许多特性，这使得为
    OS X 或 iOS 编写程序变得高效得多。由于 iOS 应用市场巨大，`Swift`将对整个行业产生重大影响。本书将深入教授你`Swift`语言，并特别侧重于游戏开发。读完本章后，你将用`Swift`创建你的第一个程序。


    ### 编程游戏


    本书的目标是教你如何编写游戏程序。游戏是非常有趣（有时也颇具挑战性！）的程序。它们涉及大量不同的输入和输出设备，并且游戏所创造的虚构世界可能极其复杂。


    直到 20 世纪 90 年代初，游戏都是针对特定平台开发的。例如，为某款特定游戏机编写的游戏，如果没有程序员付出巨大努力来使其适应不同的硬件，就无法在其他任何设备上运行。在
    80 年代，街机游戏极为流行，但由于计算机硬件不断变化和改进，为它们编写的代码几乎无法复用于更新的游戏。


    随着游戏变得日益复杂，并且操作系统变得更加独立于硬件，游戏公司开始复用先前游戏中的代码便显得合情合理。如果你可以直接使用先前发布游戏中的渲染程序或碰撞检测程序，何必为每个新游戏从头编写全新的程序呢？“游戏引擎”这个术语诞生于
    20 世纪 90 年代，当时像《毁灭战士》和《雷神之锤》这样的第一人称射击游戏变得非常流行。这些游戏如此受欢迎，以至于其制造商`id Software`决定将部分游戏代码作为独立的软件，授权给其他游戏公司使用。


    如今有许多不同的游戏引擎可供使用。现代游戏引擎为游戏开发者提供了大量功能，例如 2D 和 3D 渲染引擎、粒子特效和光照特效、声音、动画、人工智能、脚本等等。本书游戏主要使用的引擎是`SpriteKit`。`SpriteKit`是苹果公司开发的一款面向游戏开发的引擎。读完本书后，你将了解该引擎的所有主要方面，并知道如何使用它来创建自己的游戏。


    ### 开发游戏


    游戏开发通常采用两种方法。图 1-1 展示了这两种方法：外环包含内环。当人们初次学习编程时，他们通常会立刻开始编写代码，这会导致一个编写、测试、然后修改的紧密循环。相比之下，专业程序员在编写第一行代码之前，会花大量前期时间进行设计工作。


    ![A978-1-4842-0650-8_1_Fig1_HTML.gif](img/A978-1-4842-0650-8_1_Fig1_HTML.gif)


    图 1-1. 小规模编程与大规模编程

