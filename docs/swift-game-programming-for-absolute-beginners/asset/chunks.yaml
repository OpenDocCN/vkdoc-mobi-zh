- fmt: '## [Part II](http://dx.doi.org/10.1007/978-1-4842-0650-8_Part2)


    This part focuses on the first game: the Painter game. The goal of the game is
    to collect paint of three different colors: red, green, and blue. The paint is
    falling from the sky in cans that are kept floating by balloons, and you must
    make sure that each can has the right color before it falls through the bottom
    of the screen. I will show you how to react to what the player is doing by reading
    mouse, keyboard, or touch input. I will introduce the `class` as a blueprint for
    an object (also called an instance of that class). You will learn about constructor
    methods as the methods responsible for creating an instance of the class they
    belong to.


    You will learn how to write your own methods, properties, and classes, and how
    to use these programming concepts to design different game-object classes. You
    will see how game objects should interact with each other. As an example of this
    interaction, you will see how to handle basic collisions between game objects.
    You will learn how inheritance is implemented in Swift so that game-object classes
    can be hierarchically built up. You will be introduced to the concept of polymorphism,
    which lets you call the right version of a method automatically. You will finish
    the Painter game by adding a few extra features, such as motion effects, sounds,
    music, and maintaining and displaying a score.


    ## [Part III](http://dx.doi.org/10.1007/978-1-4842-0650-8_Part3)


    The second game you develop in this book is Tut’s Tomb: a game in which you have
    to collect treasures that fall down. This game illustrates how to use the physics
    engine that’s a part of the SpriteKit framework. You will learn to program more
    advanced input handling such as dragging objects around on the screen and dealing
    with multiple touches at the same time. You will also learn about making your
    game look nicer by using a custom font.


    ## [Part IV](http://dx.doi.org/10.1007/978-1-4842-0650-8_Part4)


    This part introduces the game Penguin Pairs, a puzzle game in which the goal is
    to make pairs of penguins of the same color. Throughout the different levels of
    the game, you will introduce new gameplay elements to keep the game exciting.
    For example, there is a special penguin that can pair with any other penguin,
    penguins can get stuck in a hole, and you can place penguin-eating sharks on the
    board.


    I will show you how to deal with structures and layouts in games such as a playing
    grid or a row of buttons. You will create a variety of useful GUI elements for
    menus, such as an on/off button and a slider button. You will learn about a class
    design for dealing with different game states such as menus, a title screen, and
    so on. And you will see how different states can be part of the game loop and
    how you can switch between them. Finally, you will learn about loading levels
    from a file, and how to store the player’s progress through the game and recall
    that information when the game is started again.


    ## [Part V](http://dx.doi.org/10.1007/978-1-4842-0650-8_Part5)


    The final game you will develop in this book is a platform game called Tick Tick.
    I will show you how to create a tile-based game world, similar to what you learned
    while developing the previous game. You will see how to add animations like a
    running character. You will develop your own physics engine specifically tailored
    to platform games, which includes mechanisms for jumping, falling, and handling
    collisions between the character and other objects in the game. You will also
    add some basic intelligence to enemies in the game. As a result, the player will
    have different gameplay options and must develop different strategies to complete
    each level.


    ## Tools


    In order to develop iOS games in Swift, you are going to need a Mac with Xcode
    installed on it. Xcode is the development environment provided by Apple that you
    use to create OS X, iOS, or watchOS applications. In order to be able to run the
    examples, you will need a version of Xcode that supports Swift 2.0 or higher (which
    is version 7 at the time of writing of this book). You need to enroll as an Apple
    developer to obtain Xcode, although you only need to take part in the paid program
    if you want to run apps on your iPad or iPhone and publish apps in the App Store.
    Xcode and the iOS simulator are free to use for any Apple developer.


    ## Example Games


    I supply a large number of examples that show the various aspects of programming
    Swift games. Next to the code, you also get professionally developed game assets
    at two different resolutions. The collection of examples is contained in a single
    ZIP file, which you can find on the book’s information page ([`www.apress.com/9781484206515`](http://www.apress.com/9781484206515)),
    under the Source Code/Downloads tab. This tab is located beneath the Related Titles
    section of the page.


    After you’ve downloaded the ZIP file, unpack it somewhere. When you look in the
    folder where you’ve unpacked the file, you’ll see a number of different folders.
    Each chapter in the book has its own folder. For example, if you want to run the
    final version of the Penguin Pairs game, go to the folder belonging to [Chapter
    21](#A978-1-4842-0650-8_21_Chapter.html) and open the `PenguinPairsFinal` Xcode
    project (this is the file ending with `.xcodeproj`). After Xcode has opened the
    project, run the game by pressing `Command+R` or the Play button on the top left
    of the window.


    As you can see, there are quite a few different files pertaining to this particular
    example. A simpler example can be seen if you go the folder belonging to [Chapter
    1](#A978-1-4842-0650-8_1_Chapter.html), where you will find two very basic examples
    of Swift applications: an OS X console application and an iOS game app.


    ## Contacting the Author


    If you have any questions regarding the book, please feel free to contact me directly
    at the following e-mail address: `j.egges@uu.nl`.


    ## Acknowledgments


    Many people have contributed to this book. First, I would like to thank Stefan
    Kaczmarek, the technical reviewer, for reading the chapters and providing lots
    of useful feedback during the writing process. I also want to thank the Apress
    team for helping this book become a reality. In particular, I want to thank Jonathan
    Gennick, Douglas Pundick, and Jill Balzano for their involvement in this book.
    My thanks go to Heiny Reimes, who designed the original sprites that formed the
    basis of the Painter, Penguin Pairs, and Tick Tick games. I’d like to thank Renske
    van Alebeek, who was responsible for editing and redesigning the sprites to be
    suitable for Apple devices, and who also designed a completely new set of sprites
    for the Tut’s Tomb game.'
  raw: '## [Part II](http://dx.doi.org/10.1007/978-1-4842-0650-8_Part2)


    This part focuses on the first game: the Painter game. The goal of the game is
    to collect paint of three different colors: red, green, and blue. The paint is
    falling from the sky in cans that are kept floating by balloons, and you must
    make sure that each can has the right color before it falls through the bottom
    of the screen. I will show you how to react to what the player is doing by reading
    mouse, keyboard, or touch input. I will introduce the class as a blueprint for
    an object (also called an instance of that class). You will learn about constructor
    methods as the methods responsible for creating an instance of the class they
    belong to.


    You will learn how to write your own methods, properties, and classes, and how
    to use these programming concepts to design different game-object classes. You
    will see how game objects should interact with each other. As an example of this
    interaction, you will see how to handle basic collisions between game objects.
    You will learn how inheritance is implemented in Swift so that game-object classes
    can be hierarchically built up. You will be introduced to the concept of polymorphism,
    which lets you call the right version of a method automatically. You will finish
    the Painter game by adding a few extra features, such as motion effects, sounds,
    music, and maintaining and displaying a score.


    ## [Part III](http://dx.doi.org/10.1007/978-1-4842-0650-8_Part3)


    The second game you develop in this book is Tut’s Tomb: a game in which you have
    to collect treasures that fall down. This game illustrates how to use the physics
    engine that’s a part of the SpriteKit framework. You will learn to program more
    advanced input handling such as dragging objects around on the screen and dealing
    with multiple touches at the same time. You will also learn about making your
    game look nicer by using a custom font.


    ## [Part IV](http://dx.doi.org/10.1007/978-1-4842-0650-8_Part4)


    This part introduces the game Penguin Pairs, a puzzle game in which the goal is
    to make pairs of penguins of the same color. Throughout the different levels of
    the game, you will introduce new gameplay elements to keep the game exciting.
    For example, there is a special penguin that can pair with any other penguin,
    penguins can get stuck in a hole, and you can place penguin-eating sharks on the
    board.


    I will show you how to deal with structures and layouts in games such as a playing
    grid or a row of buttons. You will create a variety of useful GUI elements for
    menus, such as an on/off button and a slider button. You will learn about a class
    design for dealing with different game states such as menus, a title screen, and
    so on. And you will see how different states can be part of the game loop and
    how you can switch between them. Finally, you will learn about loading levels
    from a file, and how to store the player’s progress through the game and recall
    that information when the game is started again.


    ## [Part V](http://dx.doi.org/10.1007/978-1-4842-0650-8_Part5)


    The final game you will develop in this book is a platform game called Tick Tick.
    I will show you how to create a tile-based game world, similar to what you learned
    while developing the previous game. You will see how to add animations like a
    running character. You will develop your own physics engine specifically tailored
    to platform games, which includes mechanisms for jumping, falling, and handling
    collisions between the character and other objects in the game. You will also
    add some basic intelligence to enemies in the game. As a result, the player will
    have different gameplay options and must develop different strategies to complete
    each level.


    ## Tools


    In order to develop iOS games in Swift, you are going to need a Mac with Xcode
    installed on it. Xcode is the development environment provided by Apple that you
    use to create OS X, iOS, or watchOS applications. In order to be able to run the
    examples, you will need a version of Xcode that supports Swift 2.0 or higher (which
    is version 7 at the time of writing of this book). You need to enroll as an Apple
    developer to obtain Xcode, although you only need to take part in the paid program
    if you want to run apps on your iPad or iPhone and publish apps in the App Store.
    Xcode and the iOS simulator are free to use for any Apple developer.


    ## Example Games


    I supply a large number of examples that show the various aspects of programming
    Swift games. Next to the code, you also get professionally developed game assets
    at two different resolutions. The collection of examples is contained in a single
    ZIP file, which you can find on the book’s information page ( [`www.apress.com/9781484206515`](http://www.apress.com/9781484206515)
    `)`, under the Source Code/Downloads tab. This tab is located beneath the Related
    Titles section of the page.


    After you’ve downloaded the ZIP file, unpack it somewhere. When you look in the
    folder where you’ve unpacked the file, you’ll see a number of different folders.
    Each chapter in the book has its own folder. For example, if you want to run the
    final version of the Penguin Pairs game, go to the folder belonging to [Chapter
    21](#A978-1-4842-0650-8_21_Chapter.html) and open the PenguinPairsFinal Xcode
    project (this is the file ending with .`xcodeproj`). After Xcode has opened the
    project, run the game by pressing Command+R or the Play button on the top left
    of the window.


    As you can see, there are quite a few different files pertaining to this particular
    example. A simpler example can be seen if you go the folder belonging to [Chapter
    1](#A978-1-4842-0650-8_1_Chapter.html), where you will find two very basic examples
    of Swift applications: an OS X console application and an iOS game app.


    ## Contacting the Author


    If you have any questions regarding the book, please feel free to contact me directly
    at the following e-mail address: `j.egges@uu.nl`.


    Acknowledgments


    Many people have contributed to this book. First, I would like to thank Stefan
    Kaczmarek, the technical reviewer, for reading the chapters and providing lots
    of useful feedback during the writing process. I also want to thank the Apress
    team for helping this book become a reality. In particular, I want to thank Jonathan
    Gennick, Douglas Pundick, and Jill Balzano for their involvement in this book.
    My thanks go to Heiny Reimes, who designed the original sprites that formed the
    basis of the Painter, Penguin Pairs, and Tick Tick games. I’d like to thank Renske
    van Alebeek, who was responsible for editing and redesigning the sprites to be
    suitable for Apple devices, and who also designed a completely new set of sprites
    for the Tut’s Tomb game.'
  trans: '

    ## [第二部分](http://dx.doi.org/10.1007/978-1-4842-0650-8_Part2)


    本部分聚焦于第一个游戏：Painter 游戏。游戏的目标是收集三种不同颜色的颜料：红色、绿色和蓝色。颜料从天空中以罐子形式落下，罐子由气球托浮在空中，你必须确保每个罐子在从屏幕底部落下之前拥有正确的颜色。我将展示如何通过读取鼠标、键盘或触摸输入来响应玩家的操作。我将介绍
    `class` 作为对象的蓝图（也可称为该类的实例）。你将学习构造器方法，这些方法负责创建它们所属类的实例。


    你将学习如何编写自己的方法、属性和类，以及如何使用这些编程概念来设计不同的游戏对象类。你将看到游戏对象之间应如何交互。作为这种交互的示例，你将了解如何处理游戏对象之间的基本碰撞。你将学习
    Swift 中继承的实现方式，以便能够分层构建游戏对象类。你还将了解多态的概念，它允许你自动调用方法的正确版本。你将通过添加一些额外功能来完成 Painter
    游戏，例如运动效果、声音、音乐以及维护和显示分数。


    ## [第三部分](http://dx.doi.org/10.1007/978-1-4842-0650-8_Part3)


    你在本书中开发的第二个游戏是 Tut''s Tomb：一个需要收集下落宝藏的游戏。这个游戏展示了如何使用 SpriteKit 框架中的物理引擎。你将学习编写更高级的输入处理，例如在屏幕上拖动对象以及同时处理多点触摸。你还将学习如何使用自定义字体让游戏看起来更美观。


    ## [第四部分](http://dx.doi.org/10.1007/978-1-4842-0650-8_Part4)


    本部分介绍 Penguin Pairs 游戏，这是一款益智游戏，目标是将相同颜色的企鹅配对。在游戏的不同关卡中，你将引入新的游戏元素来保持游戏趣味性。例如，有一种特殊的企鹅可以与任何其他企鹅配对，企鹅可能会被困在洞里，你还可以在棋盘上放置食企鹅鲨鱼。


    我将向你展示如何处理游戏中的结构和布局，例如游戏网格或一行按钮。你将创建各种用于菜单的有用 GUI 元素，例如开/关按钮和滑块按钮。你将学习如何处理不同游戏状态（如菜单、标题屏幕等）的类设计。你将看到不同状态如何成为游戏循环的一部分，以及如何在它们之间切换。最后，你将学习从文件加载关卡，以及如何存储玩家在游戏中的进度并在游戏再次启动时调用这些信息。


    ## [第五部分](http://dx.doi.org/10.1007/978-1-4842-0650-8_Part5)


    你在本书中开发的最后一个游戏是一个名为 Tick Tick 的平台游戏。我将向你展示如何创建一个基于瓦片的游戏世界，类似于你在开发前一个游戏时所学到的。你将看到如何添加动画，例如奔跑的角色。你将开发专门为平台游戏量身定制的物理引擎，其中包含跳跃、下落以及处理角色与游戏中其他对象碰撞的机制。你还将为游戏中的敌人添加一些基本智能。这样，玩家将拥有不同的游戏玩法选项，并且必须制定不同的策略才能完成每个关卡。


    ## 工具


    为了使用 Swift 开发 iOS 游戏，你需要一台安装了 Xcode 的 Mac。Xcode 是 Apple 提供的开发环境，用于创建 OS X、iOS
    或 watchOS 应用程序。为了能够运行示例，你需要一个支持 Swift 2.0 或更高版本的 Xcode 版本（在本书撰写时，该版本为 7）。你需要注册成为
    Apple 开发者才能获取 Xcode，不过只有在你想在 iPad 或 iPhone 上运行应用程序并在 App Store 发布应用时，才需要加入付费计划。Xcode
    和 iOS 模拟器对于任何 Apple 开发者都是免费使用的。


    ## 示例游戏


    我提供了大量示例，展示了 Swift 游戏编程的各个方面。除了代码外，你还可以获得专业开发的、具有两种不同分辨率的游戏资源。示例合集包含在一个 ZIP 文件中，你可以在本书的信息页面（[`www.apress.com/9781484206515`](http://www.apress.com/9781484206515)）的“源代码/下载”选项卡下找到它。该选项卡位于页面的“相关标题”部分下方。


    下载 ZIP 文件后，请将其解压到某处。当你查看解压文件的文件夹时，你会看到许多不同的文件夹。书中的每一章都有自己的文件夹。例如，如果你想运行 Penguin
    Pairs 游戏的最终版本，请转到第 21 章对应的文件夹，然后打开 `PenguinPairsFinal` Xcode 项目（这是一个以 `.xcodeproj`
    结尾的文件）。在 Xcode 打开项目后，按 `Command+R` 或点击窗口左上角的“播放”按钮来运行游戏。


    如你所见，这个特定示例有许多不同的相关文件。一个更简单的示例可以查看第 1 章对应的文件夹，你会在那里找到两个非常基础的 Swift 应用程序示例：一个 OS
    X 控制台应用程序和一个 iOS 游戏应用。


    ## 联系作者


    如果你对本书有任何疑问，请随时通过以下电子邮件地址直接与我联系：`j.egges@uu.nl`。


    ## 致谢


    许多人为此书做出了贡献。首先，我要感谢技术审阅者 Stefan Kaczmarek，他在写作过程中阅读了各章节并提供了大量有用的反馈。我还要感谢 Apress
    团队帮助这本书得以出版。我尤其要感谢 Jonathan Gennick、Douglas Pundick 和 Jill Balzano 对本书的投入。感谢 Heiny
    Reimes，她设计了构成 Painter、Penguin Pairs 和 Tick Tick 游戏基础的原始精灵素材。感谢 Renske van Alebeek，她负责编辑和重新设计精灵素材，使其适用于
    Apple 设备，并为 Tut''s Tomb 游戏设计了一套全新的精灵素材。

    '
