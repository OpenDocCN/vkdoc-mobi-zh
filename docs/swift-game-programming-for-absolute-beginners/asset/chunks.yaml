    )\nhelpframe.zPosition = Layer.Overlay2\nhelpframe.hidden = true\n```\n\n现在，你需要确保当玩家点击帮助按钮时，帮助框能够显示出来。你可以通过在\
    \ `GameWorld` 类的 `handleInput` 方法中添加以下 `if` 指令来实现：\n\n```\nif helpbutton.tapped\
    \ {\n    helpframe.hidden = false\n    self.removeAllActions()\n}\n```\n\n你还需要确保在显示帮助框时游戏不会被更新。这可以通过调用\
    \ `removeAllActions` 方法部分实现，该方法会禁用掉落宝藏的动作。同时，你还需要确保只在帮助框不可见时才更新游戏对象。因此，你将 `GameWorld`\
    \ 类的 `updateDelta` 方法修改如下：\n\n```\nif titleScreen.hidden && helpframe.hidden {\n\
    \    super.updateDelta(delta)\n}\n```\n\n图 15-2 展示了游戏中显示帮助框时的画面。\n\n![A978-1-4842-0650-8_15_Fig2_HTML.jpg](img/A978-1-4842-0650-8_15_Fig2_HTML.jpg)\n\
    \n图 15-2. 游戏中帮助框显示的截图\n"
- fmt: "## Overlays\n\nA very common way of presenting information to the player is\
    \ to use overlays. Overlays are basically images that can be displayed on top\
    \ of the game world to present information or to provide a user interface such\
    \ as a menu, a mini map, status information, and more. The help frame introduced\
    \ in the previous section is another example of an overlay.\n\nOverlays can present\
    \ an entirely new game state (such as a Game Over overlay), or they can supplement\
    \ the game world by providing information to the player. For example, many strategy\
    \ games provide information about the number of units selected, available resources,\
    \ ongoing building processes, items gathered, and so on. These kinds of overlays\
    \ are generally always on the screen, and together they’re called the heads-up\
    \ display (HUD). Tut’s Tomb has a very basic HUD: it consists of a frame that\
    \ displays the current score (which you’ll add in the next chapter), and a Help\
    \ button the user can tap to view a frame with help information.\n\nNext to the\
    \ HUD, you want to show a Game Over overlay when the tomb is filled entirely with\
    \ treasures. You add this overlay to the game world, and set its hidden status\
    \ to `true`:\n\n```swift\nvar gameover = SKSpriteNode(imageNamed: \"spr_gameover\"\
    )\nself.addChild(gameover)\ngameover.zPosition = Layer.Overlay2\ngameover.hidden\
    \ = true\n```\n\nThe origin of the sprite is its center, and the origin of the\
    \ game scene is also in the center. The latter is achieved by the following line\
    \ in the `GameScene` class:\n\n```swift\nanchorPoint = CGPoint(x: 0.5, y: 0.5)\n\
    ```\n\nThe result is that the Game Over overlay is automatically nicely positioned\
    \ in the middle of the screen. You only have to extend the `GameWorld` class to\
    \ display the overlay when needed. You first need to check when the game is actually\
    \ over, which is the case if the tomb is completely filled. So how do you measure\
    \ this? A simple solution is to extend the method dealing with physics contacts.\
    \ If two treasure objects are in contact and the y-position of either one of them\
    \ is above a certain threshold, it means that probably the tomb is quite full,\
    \ since otherwise the collision would happen lower in the screen. In the `didBeginContact`\
    \ method, the following `if` instruction checks this:\n\n```swift\nif firstBody?.position.y\
    \ > 400 || secondBody?.position.y > 400 {\n    gameover.hidden = false\n    self.removeAllActions()\n\
    }\n```\n\nIf the game is over, the overlay becomes visible, and all actions are\
    \ removed so that treasures no longer fall down.\n\nThis solution is not yet perfect,\
    \ though. The player could drag a treasure and hold it below the chimney. The\
    \ treasure falling down would then collide with the treasure that the player was\
    \ dragging, which would lead to a game over event, even though the tomb might\
    \ be completely empty. A simple way to solve this is by not letting the player\
    \ drag a treasure as soon as it reaches a threshold slightly lower than the game\
    \ over threshold. This is done by extending the `handleInput` method of the `Treasure`\
    \ class, as follows:\n\n```swift\nif position.y >= 200 {\n    touchid = nil\n\
    \    if physicsBody?.velocity.dy >= 0 {\n        physicsBody?.velocity = CGVector.zeroVector\n\
    \    }\n    return\n}\n```\n\nIf the y position is larger than the threshold of\
    \ 200, you stop dragging the treasure by setting the touch id to nil. Another\
    \ thing you need to deal with is the player dragging the treasure up at a high\
    \ velocity. In order to avoid this, you set the velocity of the physics body to\
    \ zero if the treasure is moving upward. You measure this by checking the `dy`\
    \ property of the physics body velocity.\n\nIn the `handleInput` method of `GameWorld`,\
    \ you check whether the game over overlay is visible. If that is the case, the\
    \ player can tap on the screen to restart the game:\n\n```swift\nif !gameover.hidden\
    \ {\n    if inputHelper.hasTapped {\n        gameover.hidden = true\n        self.reset()\n\
    \        self.runAction(totalAction)\n    }\n}\n```\n\nYou override the `reset`\
    \ method because you need to do a little extra work when the game restarts. Notably,\
    \ you have to clear the treasures node so that the tomb is empty again, and you\
    \ reset the counter to 0, so that the game starts with a limited range of treasures.\
    \ Furthermore, you call the `reset` method from the superclass so that all game\
    \ objects in the game world are reset as well:\n\n```swift\noverride func reset()\
    \ {\n    super.reset()\n    self.treasures.removeAllChildren()\n    self.counter\
    \ = 0\n}\n```\n\nThe final thing you need to do is make sure that the game world\
    \ is no longer updated when the game is over. This means yet another change in\
    \ the `updateDelta` method of `GameWorld`, as follows:\n\n```swift\nif titleScreen.hidden\
    \ && helpframe.hidden && gameover.hidden {\n    super.updateDelta(delta)\n}\n\
    ```\n\nFigure [15-3](#A978-1-4842-0650-8_15_Chapter.html#Fig3) shows the Game\
    \ Over state.\n\n![A978-1-4842-0650-8_15_Fig3_HTML.jpg](A978-1-4842-0650-8_15_Fig3_HTML.jpg)\n\
    \n**Figure 15-3.** Too bad . . . Designing Games\n\nOn game-development teams,\
    \ the programmer normally isn’t responsible for the design of the game, but it’s\
    \ still very useful to have a basic understanding of this process. The programmer\
    \ must turn the game design into code and must be able to advise the designer\
    \ about what will work and what will be difficult to achieve. For this collaboration\
    \ to be successful, everyone has to speak the same language.\n\nDesigning a game\
    \ primarily consists of defining the game mechanics, the setting of the game,\
    \ and choosing the game levels. Game mechanics involve such things as the rules\
    \ of the game, the way players control the game, the goals and challenges, and\
    \ the reward structure. Psychology and educational science play an important role\
    \ here. They help you understand how players get in the flow (the mood in which\
    \ they’re fully committed to playing the game); how goals, challenges, and rewards\
    \ can support each other; and how to vary and adapt the game’s difficulty.\n\n\
    The game’s setting deals with the story, the characters, and the virtual world\
    \ in which the game takes place. A good story can be a strong motivator for players,\
    \ and discovering the story while playing can be a very satisfying task. Characters\
    \ need to evoke empathy from the player to give meaning to the tasks that must\
    \ be performed. And the game world enhances these aspects and adapts the game\
    \ to certain demographics.\n\nLevel design is sometimes done by special level\
    \ designers, but in smaller teams it’s often the responsibility of the game designer.\
    \ Careful level design leads to a good learning curve. It keeps the player challenged\
    \ and motivated, and it should result in pleasant surprises.\n\nMany books have\
    \ been written about game design, and you’re strongly encouraged to read some\
    \ of them. You can also find lots of information on all aspects of game development\
    \ on sites like [www.gamasutra.com](http://www.gamasutra.com/).\n\n## What You\
    \ Have Learned\n\nIn this chapter, you have learned the following:\n\n* How to\
    \ add a HUD and overlays to the game\n* How to define a simple button that shows\
    \ a frame\n* How to deal with a few different game states such as a title screen\
    \ and a Game Over state\n\n# 16. Finishing the Tut’s Tomb Game\n\nElectronic supplementary\
    \ material The online version of this chapter (doi:[10.1007/978-1-4842-0650-8_16](http://dx.doi.org/10.1007/978-1-4842-0650-8_16))\
    \ contains supplementary material, which is available to authorized users.\n\n\
    In this chapter, you will finish the Tut’s Tomb game. As a first step, you will\
    \ add a score indicator to the game, using a custom game font. Second, you will\
    \ add a nice visual effect by showing glitter on the treasures in the game. Finally,\
    \ you will add sound and music. Take a look at the `TutsTombFinal` game example.\
    \ This contains all the code explained in this chapter."
  raw: '## Overlays


    A very common way of presenting information to the player is to use overlays.
    Overlays are basically images that can be displayed on top of the game world to
    present information or to provide a user interface such as a menu, a mini map,
    status information, and more. The help frame introduced in the previous section
    is another example of an overlay.


    Overlays can present an entirely new game state (such as a Game Over overlay),
    or they can supplement the game world by providing information to the player.
    For example, many strategy games provide information about the number of units
    selected, available resources, ongoing building processes, items gathered, and
    so on. These kinds of overlays are generally always on the screen, and together
    they’re called the heads-up display (HUD). Tut’s Tomb has a very basic HUD: it
    consists of a frame that displays the current score (which you’ll add in the next
    chapter), and a Help button the user can tap to view a frame with help information.


    Next to the HUD, you want to show a Game Over overlay when the tomb is filled
    entirely with treasures. You add this overlay to the game world, and set its hidden
    status to `true`:


    `var gameover = SKSpriteNode(imageNamed: "spr_gameover")`


    `self.addChild(gameover)`


    `gameover.zPosition = Layer.Overlay2`


    `gameover.hidden =` `true`


    The origin of the sprite is its center, and the origin of the game scene is also
    in the center. The latter is achieved by the following line in the `GameScene`
    class:


    `anchorPoint = CGPoint(x: 0.5, y: 0.5)`


    The result is that the Game Over overlay is automatically nicely positioned in
    the middle of the screen. You only have to extend the `GameWorld` class to display
    the overlay when needed. You first need to check when the game is actually over,
    which is the case if the tomb is completely filled. So how do you measure this?
    A simple solution is to extend the method dealing with physics contacts. If two
    treasure objects are in contact and the y-position of either one of them is above
    a certain threshold, it means that probably the tomb is quite full, since otherwise
    the collision would happen lower in the screen. In the `didBeginContact` method,
    the following `if` instruction checks this:


    `if firstBody?.position.y > 400 || secondBody?.position.y > 400 {`


    `gameover.hidden = false`


    `self.removeAllActions()`


    `}`


    If the game is over, the overlay becomes visible, and all actions are removed
    so that treasures no longer fall down.


    This solution is not yet perfect, though. The player could drag a treasure and
    hold it below the chimney. The treasure falling down would then collide with the
    treasure that the player was dragging, which would lead to a game over event,
    even though the tomb might be completely empty. A simple way to solve this is
    by not letting the player drag a treasure as soon as it reaches a threshold slightly
    lower than the game over threshold. This is done by extending the `handleInput`
    method of the `Treasure` class, as follows:


    `if position.y >= 200 {`


    `touchid = nil`


    `if physicsBody?.velocity.dy >= 0 {`


    `physicsBody?.velocity = CGVector.zeroVector`


    `}`


    `return`


    `}`


    If the y position is larger than the threshold of 200, you stop dragging the treasure
    by setting the touch id to nil. Another thing you need to deal with is the player
    dragging the treasure up at a high velocity. In order to avoid this, you set the
    velocity of the physics body to zero if the treasure is moving upward. You measure
    this by checking the `dy` property of the physics body velocity.


    In the `handleInput` method of `GameWorld`, you check whether the game over overlay
    is visible. If that is the case, the player can tap on the screen to restart the
    game:


    `if !gameover.hidden {`


    `if inputHelper.hasTapped {`


    `gameover.hidden = true`


    `self.reset()`


    `self.runAction(totalAction)`


    `}`


    `}`


    You override the `reset` method because you need to do a little extra work when
    the game restarts. Notably, you have to clear the treasures node so that the tomb
    is empty again, and you reset the counter to 0, so that the game starts with a
    limited range of treasures. Furthermore, you call the `reset` method from the
    superclass so that all game objects in the game world are reset as well:


    `override func reset() {`


    `super.reset()`


    `self.treasures.removeAllChildren()`


    `self.counter = 0`


    `}`


    The final thing you need to do is make sure that the game world is no longer updated
