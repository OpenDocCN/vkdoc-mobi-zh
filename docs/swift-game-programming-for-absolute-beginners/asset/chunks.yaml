    `anchorPoint = CGPoint(x: 0.5, y: 0.5)`


    请记住，场景中坐标系的原点位于屏幕的左下角。上述代码更改了这一设定，使得原点位于屏幕的中心。坐标系原点的设置值是相对于屏幕的总宽度和总高度来指定的。例如，值
    `(1.0, 1.0)` 表示屏幕的右上角。因此，值 `(0.5, 0.5)` 就代表了屏幕的中心。


    尤其是在处理背景时，将原点设置为屏幕中心非常有用，因为这样计算不同设备上的背景位置会变得容易得多。由于精灵默认以其中心点作为绘制位置，而位置 `(0, 0)`
    现在又是屏幕的中心，因此精灵默认情况下会居中显示在屏幕上。请删除这行代码（或将其注释掉），然后运行示例程序，看看会发生什么。


    上面这行代码是一条赋值指令。名为 `anchorPoint` 的变量被赋予了一个值。被赋予的值是 `CGPoint(x: 0.5, y: 0.5)`。你也可以说，这行代码将一个
    `CGPoint` 类型的值赋值给了 `anchorPoint`。一个 `CGPoint` 类型的值是通过编写该类型的名称，然后在括号内提供创建该值所需的参数来创建的。在此例中，需要提供
    x 和 y 的值。这里你还可以看到它与简单的内置类型（如 `Int`）之间的区别。对于那些类型，你只需直接编写你想要赋值的值：


    ```

    var age: Int = 12

    ```


    对于更复杂的类型（例如 `CGPoint`），你需要编写类型名称，然后在括号内提供创建该值所需的参数。另一个复杂类型的例子是 `UIColor`。下面是一个使用
    `UIColor` 类型进行赋值的示例：


    ```

    backgroundColor = UIColor(red: CGFloat(time), green: 0, blue: 0, alpha: 1)

    ```


    这里你看到了相同的语法：编写类型名称，然后在括号内提供所需的参数。其中一个参数是 `red`。而该参数被赋予的值，本身也是由一个名为 `CGFloat` 的非内置类型创建的。同样，你会看到编写了类型名称（`CGFloat`），并在括号内提供了所需的参数（`time`）。每当你使用像
    `UIColor` 或 `CGPoint` 这样的复杂类型创建值时，这个值也被称为一个对象，或者该类型的一个实例。


    类型非常有用。它们提供了一种蓝图，描述了值应该是什么样子。例如，`CGPoint` 类型描述了一个用于二维点的数据结构。你无需考虑如何创建这样一个数据结构；`CGPoint`
    会为你完成。你只需要在创建 `CGPoint` 实例时提供正确的参数值即可。


    ## 移动精灵


    现在你可以在屏幕上绘制精灵了，接下来就可以使用游戏循环来让它移动，就像你在[第 3 章](https://example.org/zh/chapter3)的
    DiscoWorld 示例中对文本标签所做的那样。在 SpriteDrawing 程序中，你在屏幕上绘制了一个气球。让我们对程序进行一点小扩展，根据经过的时间来改变气球的位置。首先，你需要在
    `GameScene` 类中添加 `update` 方法，使其成为游戏循环的一部分。在 DiscoWorld 示例中，你获取并存储当前时间的方式如下：


    ```

    var time: Double = currentTime % 1

    ```


    让我们尝试改变气球的位置，让它从屏幕左侧飞到右侧。一个简单的方法是使用 `time` 变量来改变位置。为了避免过多的类型转换，你可以将时间存储为 `CGFloat`
    类型，而不是 `Double` 类型，`CGFloat` 是 SpriteKit 中用于表示浮点值的主要类型：


    ```

    var time = CGFloat(currentTime % 1)

    ```


    现在，你可以像下面这样使用 `time` 变量来改变气球的位置：


    ```

    balloonSprite.position = CGPoint(x: time * 200, y: 200)

    ```


    由于 `time` 变量的值总在 0 到 1 之间，因此 x 值的范围将在 0 到 200 之间（因为你将 `time` 乘以了 200）。然而，你的 iDevice
    上可视区域的宽度可能不是 200 点，而是其他数值。此外，宽度还取决于你是横向还是纵向握住设备。幸运的是，`GameScene` 类有一个名为 `size`
    的变量，它包含另外两个变量 `width` 和 `height`。请看下面这行代码：


    ```

    balloonSprite.position = CGPoint(x: time * size.width, y: 200)

    ```


    这条指令没有将时间乘以一个固定值，而是将时间乘以了屏幕的当前宽度。因此，气球将从屏幕左侧移动到右侧。本章附带的 MovingSprite 示例展示了以这种方式改变气球位置的结果。如果你旋转设备（例如，在
    iOS 模拟器中，选择 Hardware ➤ Rotate left），你会看到无论设备方向或屏幕宽度如何，气球仍会从设备左侧移动到右侧。尝试一些不同的操作，看看如何修改这个程序。你能让精灵从右向左移动吗？你能让精灵移动得更快或更慢吗？

