  \n**图 IV-1.** “企鹅对对碰”游戏\n\n“企鹅对对碰”是一款益智游戏，其目标是让相同颜色的企鹅配对。玩家可以通过单击或轻触企鹅，然后选择企鹅应该移动的方向来移动它们。一只企鹅会一直移动，直到被游戏中的另一个角色（可以是企鹅、海豹、鲨鱼或冰山）挡住，或者从游戏区域掉落（掉入水中并被饥饿的鲨鱼吃掉）。游戏的不同关卡会引入新的游戏元素以保持游戏趣味性。例如，有一种特殊的企鹅可以匹配任何其他企鹅；企鹅可能会卡在洞里（这意味着它们无法移动）；以及可以在棋盘上放置食企鹅的鲨鱼。你可以尝试运行第\
  \ 21 章附带的示例程序来体验此游戏的最终版本。\n\n"
- "# 17. 菜单与网格\n\n*电子补充材料* 本章的在线版本 (doi:[10.1007/978-1-4842-0650-8_17](http://dx.doi.org/10.1007/978-1-4842-0650-8_17))\
  \ 包含补充材料，仅供授权用户使用。\n\n“企鹅对对碰”是一款益智游戏，而棋盘游戏和益智游戏通常都基于将物体放置在某种网格中。这类游戏的例子比比皆是：国际象棋、俄罗斯方块、井字棋、数独、糖果传奇等等。这些游戏的目标通常是某种方式修改网格的配置以获得分数。在俄罗斯方块中，必须构建完全填满的行；在数独中，行、列和子网格必须满足特定的数值属性。\n\
  \n像网格这样的结构通常会对游戏棋子施加一组规则，将其限制在游戏板上的特定位置或配置上。例如，在国际象棋中，棋子只能（有意义地）放置在游戏板上的白格和黑格上。你不能把你的皇后放在两个格子中间。在电脑游戏中，这类限制更容易实施：你只需确保放置游戏对象的位置是有效位置即可。\n\
  \n网格在游戏的其他部分也非常有用。例如，你可能想显示一个按钮网格，让玩家选择关卡。这就是为什么网格也常用于组织屏幕上的 GUI 元素。除了网格布局，本章还介绍了“企鹅对对碰”游戏所需的一些新\
  \ GUI 元素，例如滑块和开关按钮。你会注意到，由于需要处理网格位置、滑块位置等，本章的数学内容会稍多一些。不过，透彻理解这些概念是值得的。一旦你完成了创建这些类和方法这类艰巨的工作，你就可以在你未来开发的任何游戏中反复使用它们。\n\
  \n\n\n## 网格布局中的游戏对象\n\n在编写代码之前，让我们先思考一下什么是网格，以及哪些参数有助于定义网格。图 17-1 展示了网格所有重要参数的概览。一个网格通常由若干单元格组成。本书中使用的网格具有固定宽度和高度的单元格。此外，网格会有若干行和列。由于在\
  \ SpriteKit 框架中 y 轴正方向向上，我们也按此方式定义网格。因此，网格中最底部的行是第 0 行，其上方是第 1 行，以此类推。最左侧的列是第 0\
  \ 列，列索引沿 x 轴正方向递增（另见图 17-1）。最后，网格单元格之间可以存在间距（例如，当你想展示一个按钮网格时）。这个间距（也称为内边距）需要在 x\
  \ 和 y 两个方向上进行定义。\n\n![A978-1-4842-0650-8_17_Fig1_HTML.gif](img/A978-1-4842-0650-8_17_Fig1_HTML.gif)\n\
  \n图 17-1.\n\n一个三行五列网格结构的概览\n\n我在网格中布局对象的方法是创建一个 `GridLayout` 类，其一个实例被附加到场景中的一个节点上。`GridLayout`\
  \ 实例将负责布局它所附加节点的子节点。属于 `SKNode` 的 `children` 数组中子节点的顺序决定了每个子节点在网格上的位置。在图 17-1 的网格中，底部的五个单元格（第\
  \ 0 行）由数组中的前五个元素填充，接下来的五个子节点填充第 1 行，以此类推。你不需要直接将每个子节点添加到 `SKNode` 实例，而是调用 `GridLayout`\
  \ 类中的 `add` 方法来添加子节点并计算其在网格上的位置。\n\n在 `PenguinPairs1` 示例中，你可以找到 `GridLayout` 类的完整代码。该类有若干属性用于维护网格尺寸信息（遵循图\
  \ 17-1）：\n\n```\nvar cellWidth: Int = 0, cellHeight: Int = 0, rows: Int = 0, columns:\
  \ Int = 0\n\nvar xPadding: Int = 0, yPadding: Int = 0\n\nvar target: SKNode? = nil\n\
  ```\n\n`target` 属性是一个 `SKNode` 对象，其子节点将被布局在网格中。在 `GameWorld` 类中，你创建一个节点来包含一系列按钮：\n\
  \n```\nvar levelButtons = GameObjectNode()\n```\n\n在 `GameWorld setup` 方法中，你创建一个布局对象，并将\
  \ `levelButtons` 节点设为其目标：\n\n```\nvar layout = GridLayout(rows: nrRows, columns:\
  \ nrCols, cellWidth: 150, cellHeight: 150)\n\nlayout.xPadding = 5\n\nlayout.yPadding\
  \ = 5\n\nlayout.target = levelButtons\n```\n\n现在让我们在 `GridLayout` 类中创建一些有用的方法和属性。首先，能够根据单元格宽度、高度和内边距计算网格的总宽度和总高度是很有用的。如图\
  \ 17-1 所示，网格的总宽度等于单元格数量乘以单元格宽度，再加上（单元格数量减 1）乘以 x 方向内边距。高度也以类似方式计算。以下是 `GridLayout`\
  \ 中计算网格总宽度和高度的两个属性：\n\n```\nvar width : CGFloat {\n\n    get { return CGFloat(columns\
  \ * cellWidth + (columns - 1) * xPadding) }\n\n}\n\nvar height : CGFloat {\n\n \
  \   get { return CGFloat(rows * cellHeight + (rows - 1) * yPadding) }\n\n}\n```\n\
  \n让我们再添加一个方法，该方法可以将网格上的行和列索引转换为节点中的局部位置。假设网格的原点在其中心（与精灵类似）。那么网格的左下角点就是 `(-width/2,\
  \ -height/2)`。对于 x 坐标，你加上列索引乘以单元格宽度与 x 内边距之和。对于 y 坐标，你对行索引执行相同的操作，加上单元格高度与 y 内边距之和。这样就能得到目标单元格的左下角点。最后，你再加上半个单元格宽度和高度，以便将子节点完美地定位在网格单元格的中心。以下是执行此计算的方法：\n\
  \n```\nfunc toPosition(col: Int, row: Int) -> CGPoint {\n\n    let xpos = -width/2\
  \ + CGFloat(col * (cellWidth + xPadding) + cellWidth / 2)\n\n    let ypos = -height/2\
  \ + CGFloat(row * (cellHeight + yPadding) + cellHeight / 2)\n\n    return CGPoint(x:\
  \ xpos, y: ypos)\n\n}\n```\n\n同样，你定义了一个名为 `toGridLocation` 的方法，用于将位置转换为列和行索引。你可以在\
  \ `PenguinPairs1` 示例中自行查看代码。现在你可以定义一个名为 `add` 的方法，用于向目标添加节点并自动正确定位它。以下是该方法的完整代码：\n\
  \n```\nfunc add(obj: SKNode) {\n\n    if let target_unwrapped = target {\n\n   \
  \     let r = target_unwrapped.children.count / columns\n\n        let c = target_unwrapped.children.count\
  \ % columns\n\n        target_unwrapped.addChild(obj)\n\n        obj.position =\
  \ toPosition(c, row: r)\n\n    }\n\n}\n```\n\n因为 `target` 是一个可选变量，你需要先解包它，然后使用解包后的目标。首先，使用\
  \ `children` 数组中的子节点数量，计算将要添加的节点所属的行和列索引。然后，将对象添加到目标，并调用 `toPosition` 方法计算其实际位置。\n\
  \n最后，你定义了一个名为 `at` 的方法，允许你检索网格中特定位置的对象。该方法返回一个可选的 `SKNode` 对象。它是可选的，因为在某些情况下可能不存在\
  \ `SKNode` 对象，例如，如果提供的列或行索引超出了网格尺寸范围。以下是该方法的完整代码：\n\n```\nfunc at(col: Int, row:\
  \ Int) -> SKNode? {\n\n    if col < 0 || col >= columns || row < 0 || row >= rows\
  \ {\n\n        return nil\n\n    }\n\n    if let target_unwrapped = target {\n\n\
  \        var index = row * columns + col\n\n        return target_unwrapped.children[index]\
  \ as? SKNode\n\n    }\n\n    return nil\n\n}\n```\n\n现在你可以使用 `GridLayout` 类将子对象组织成网格结构。在本书的剩余章节中，只要需要以网格布局排列游戏对象，你就会使用这个类。\n\
  \n`PenguinPairs1` 示例使用了 `GridLayout` 类在屏幕上显示一个关卡按钮网格。在 `GameWorld` 类中，创建了关卡按钮并将其添加到网格中。第一步是确定网格所需的行数和列数。关卡将从文本文件中读取，就像\
  \ Penguin Pairs 一样。因此，代码的结构是基于关卡数量来决定网格需要多少列，然后计算所需的行数：\n\n```\nlet nrCols = 6,\
  \ nrLevels = 12\n\nvar nrRows = nrLevels / nrCols\n\nif nrLevels % nrCols != 0 {\n\
  \n    nrRows++\n\n}\n```\n\n现在你可以定义关卡按钮应遵循的布局，并设置 x 和 y 方向的内边距值，以便在按钮之间留出一些空间。你还需要将一个节点设为此布局的目标：\n\
  \n```\nvar layout = GridLayout(rows: nrRows, columns: nrCols, cellWidth: 150, cellHeight:\
  \ 150)\n\nlayout.xPadding = 5\n\nlayout.yPadding = 5\n\nlayout.target = levelButtons\n\
  ```\n\n你使用一个嵌套的 `for` 循环来用关卡按钮填充网格，这里暂时将按钮定义为简单的 `SKSpriteNode` 实例：\n\n```\nfor\
  \ var i = nrRows - 1; i >= 0; i-- {\n\n    for var j = 0; j < nrCols; j++ {\n\n\
  \        if i*nrCols + j < nrLevels {\n\n            var level = SKSpriteNode(imageNamed:\
  \ \"spr_level_unsolved\")\n\n            level.zPosition = Layer.Scene\n\n     \
  \       layout.add(level)\n\n        } else {\n\n            layout.add(SKNode())\n\
  \n        }\n\n    }\n\n}\n```\n\n\n\n嵌套`for`循环内部的`if`指令是必需的，因为底行可能只填充了部分按钮。在网格的其他位置，会添加一个空的`SKNode`实例。你可以通过运行本章附带的`PenguinPairs1`示例来查看结果。图\
  \ 17-2 展示了截图。\n\n![A978-1-4842-0650-8_17_Fig2_HTML.jpg](img/A978-1-4842-0650-8_17_Fig2_HTML.jpg)\n\
  \n图 17-2. `PenguinPairs1`示例程序中的关卡按钮网格\n\n### 类扩展\n\n在继续为 Penguin Pairs 添加菜单之前，让我们回顾一下前两个游戏中使用的类设计，并重新思考如何改进它。对于\
  \ Tut's Tomb 游戏，我定义了一个名为`GameObjectNode`的类，它是`SKNode`的子类，并添加了用于基本游戏循环交互的方法。这带来了一些不便：为了使其正确运行，场景中的每个节点都必须是`GameObjectNode`实例，或者是`GameObjectNode`子类的实例。如果能直接扩展`SKNode`类本身的功能，岂不是更简单？好消息是：你可以做到！Swift\
  \ 有一种称为类扩展的机制。它允许你向现有类添加功能，并在项目中使用该扩展后的类定义。如果你打开`PenguinPairs2`示例中的`SKNode_Extension.swift`文件，会看到类似以下内容：\n\
  \n```\nimport SpriteKit\n\nextension SKNode {\n\n    ...\n\n    func handleInput(inputHelper:\
  \ InputHelper) {\n\n        ...\n\n    }\n\n    func updateDelta(delta: NSTimeInterval)\
  \ {\n\n        ...\n\n    }\n\n    func reset() {\n\n        ...\n\n    }\n\n}\n\
  ```\n\n这告诉编译器，在`PenguinPairs2`项目中，`SKNode`类通过（其中包括）三个方法进行了扩展。因此，从现在开始你创建的任何`SKNode`实例都将拥有扩展中定义的方法和属性。这意味着你不再需要单独的`GameObjectNode`类。此外，`SKNode`的子类（例如`SKSpriteNode`）现在也会自动拥有扩展中定义的方法和属性。这非常有用。例如，你可以将`Button`类重写为`SKSpriteNode`的子类：\n\
  \n```\nclass Button: SKSpriteNode {\n\n    var tapped = false\n\n    init(imageNamed:\
  \ String) {\n\n        let texture = SKTexture(imageNamed: imageNamed)\n\n        super.init(texture:\
  \ texture, color: UIColor.whiteColor(), size: texture.size())\n\n    }\n\n    required\
  \ init?(coder aDecoder: NSCoder) {\n\n        fatalError(\"init(coder:) has not\
  \ been implemented\")\n\n    }\n\n    override func handleInput(inputHelper: InputHelper)\
  \ {\n\n        super.handleInput(inputHelper)\n\n        tapped = inputHelper.containsTap(self.box)\
  \ && !self.hidden\n\n    }\n\n}\n```\n\n如果你想扩展框架中现有类的功能，类扩展非常有用。`SKNode`扩展就是一个很好的例子。因为你直接扩展了`SKNode`类，该扩展会平滑地传递给\
  \ SpriteKit 框架中所有继承自`SKNode`的类。因此，这减少了代码重复。在本书的剩余章节中，我将使用类扩展来为现有类添加功能。\n\n类扩展是开发者工具箱中另一个用于以良好、通用的方式设计软件架构的工具。然而，与任何工具一样，你必须注意如何使用它。如果你过度依赖类扩展，可能就不清楚类的哪些部分是原生的，哪些部分是你添加的。当你开始一个新项目时，你可能需要翻阅之前的项目，收集添加到现有类中的代码片段，并将其复制到新项目中。而且，如果发布了新版本的\
  \ SpriteKit 框架，你对 SpriteKit 类的扩展可能不再有意义（尽管后一种论点适用于任何使用 SpriteKit 类的代码）。\n\n## 设置菜单\n\
  \n既然`SKNode`类已经通过游戏循环功能进行了扩展，让我们用它来为 Penguin Pairs 游戏创建一个菜单。提到菜单，你可能会想到下拉菜单（如“文件”或“编辑”）或应用程序顶部的按钮。不过，菜单可以很灵活，尤其是在游戏中，菜单通常以游戏风格设计，并且可能覆盖屏幕的一部分甚至整个屏幕。例如，让我们看看如何定义一个包含两个控件的基本选项菜单界面：一个用于切换提示的开关，另一个用于控制音乐音量。首先，你需要绘制这些控件周围的元素。为菜单添加背景，然后添加一个文本标签来描述提示控件。为此，你使用`SKLabelNode`类。定义要绘制的文本，并将其放置在适当的位置（以下代码取自本章附带的`PenguinPairs2`示例中的`GameWorld`类）：\n\
  \n```\nlet background = SKSpriteNode(imageNamed: \"spr_background_options\")\nbackground.zPosition\
  \ = Layer.Background\nself.addChild(background)\n\nlet onOffLabel = SKLabelNode(fontNamed:\
  \ \"Helvetica\")\nonOffLabel.horizontalAlignmentMode = .Right\nonOffLabel.verticalAlignmentMode\
  \ = .Center\nonOffLabel.position = CGPoint(x: -50, y: 50)\nonOffLabel.fontColor\
  \ = UIColor(red: 0, green: 0, blue: 0.4, alpha: 1)\nonOffLabel.fontSize = 60\nonOffLabel.text\
  \ = \"Hints\"\nself.addChild(onOffLabel)\n```\n\n类似地，你为音乐音量控制添加一个文本标签。完整代码请参见本章附带的`PenguinPairs2`示例。\n\
  \n\n\n## 添加开关按钮\n\n下一步是添加一个开关按钮，用于在游戏过程中显示（或不显示）提示信息。在本章后面，你将看到这个按钮的值是如何被使用的。就像你为`Button`类所做的那样，你为开关按钮创建一个专门的类，命名为（毫不意外）`OnOffButton`。在\
  \ PenguinPairs2 示例中，这个类是 `SKSpriteNode` 的子类，就像新创建的 `Button` 类一样。它拥有两个（存储）属性，类型为\
  \ `SKTexture`，每个属性代表一个纹理（图像）：\n\n```\nvar onTexture  = SKTexture(imageNamed: \"\
  spr_button_on\")\nvar offTexture = SKTexture(imageNamed: \"spr_button_off\")\n```\n\
  \n根据按钮的状态，将为精灵节点选择不同的纹理。该按钮有两种状态：关闭和开启（另见图 17-3）。当 `SKSpriteNode` 实例被初始化时，会默认选择开启状态：\n\
  \n![A978-1-4842-0650-8_17_Fig3_HTML.jpg](img/A978-1-4842-0650-8_17_Fig3_HTML.jpg)\n\
  \n*图 17-3.* 开关按钮使用的两种纹理\n\n```\ninit() {\n    super.init(texture: onTexture, color:\
  \ UIColor.whiteColor(), size: onTexture.size())\n}\n```\n\n按钮的一个重要方面是，你需要能够读取和设置其开启或关闭状态。由于按钮有两种纹理，你可以定义：如果当前纹理指向\
  \ `offTexture` 属性，则按钮处于关闭状态；如果当前纹理指向 `onTexture` 属性，则按钮处于开启状态。然后，你可以添加一个布尔类型的计算属性来获取和设置这个值。以下是该属性的定义：\n\
  \n```\nvar on: Bool {\n    get {\n        return self.texture == onTexture\n   \
  \ }\n    set {\n        if newValue {\n            self.texture = onTexture\n  \
  \      } else {\n            self.texture = offTexture\n        }\n    }\n}\n```\n\
  \n最后，你需要处理按钮上的点击操作，以切换其开启和关闭状态。类似于你在 `Button` 类中所做的，你在 `handleInput` 方法中检查玩家是否点击了按钮的边界框内。以下是完整的\
  \ `handleInput` 方法：\n\n```\noverride func handleInput(inputHelper: InputHelper)\
  \ {\n    super.handleInput(inputHelper)\n    if inputHelper.containsTap(self.box)\
  \ && !self.hidden {\n        self.on = !self.on\n    }\n}\n```\n\n请注意，只有当按钮可见时，你才切换其状态。在\
  \ `GameWorld` 类中，你会在游戏世界中添加一个 `OnOffButton` 实例，并放置到所需位置：\n\n```\nvar onOffButton\
  \ = OnOffButton()\n...\nonOffButton.position = CGPoint(x: 200, y: 50)\nself.addChild(onOffButton)\n\
  ```\n\n## 定义滑块按钮\n\n接下来，你添加第二种 GUI 控件：滑块。这个滑块将用于控制游戏中背景音乐的音量。它由两个精灵组成：一个代表滑道（条形）的背景精灵，和一个代表实际滑块的前景精灵。因此，`Slider`\
  \ 类继承自 `SKNode`，并（除其他属性外）包含两个 `SKSpriteNode` 属性来表示每个精灵。由于背景精灵有边框，你在移动或绘制滑块时需要考虑到这一点。因此，你还定义了左右边距，用于指定背景精灵左右两侧的边框宽度。完整的存储属性列表如下：\n\
  \n```\nvar back = SKSpriteNode(imageNamed: \"spr_slider_bar\")\nvar front = SKSpriteNode(imageNamed:\
  \ \"spr_slider_button\")\nlet leftMargin = CGFloat(4), rightMargin = CGFloat(7)\n\
  var dragging = false\nvar draggingIndex: Int?\n```\n\n如你所见，你还将一个布尔属性 `dragging`\
  \ 设置为 `false`，并添加了一个可选类型 `Int` 的属性 `draggingIndex`。你需要这些属性来跟踪玩家何时正在拖动滑块，以及对应的触摸\
  \ ID，以便在必要时更新滑块位置，即使触摸位置不在背景精灵的边界内。\n\n## 计算游戏对象的世界坐标位置\n\n因为你需要跟踪玩家是否正在触摸滑块，所以你需要计算节点的边界框。如果你查看\
  \ `SKNode` 的扩展，可以看到它定义了 `box` 属性，这也是原始 `GameObjectNode` 类的一部分。在 `GameObjectNode`\
  \ 中，`box` 属性的 `get` 部分包含一行代码：\n\n```\nreturn self.calculateAccumulatedFrame()\n\
  ```\n\n这对于 Tut's Tomb 游戏来说运行良好，因为该游戏使用了一个非常简单的节点层级结构。如果层级结构变得更复杂，节点的局部位置可能与其在世界中的实际位置不同。滑块正是这种情况。在\
  \ `Slider` 的初始化器中，滑块的前景部分被局部定位在背景精灵的左侧：\n\n```\nfront.position = CGPoint(x: leftMargin\
  \ - back.size.width/2 + front.size.width/2, y: 0)\n```\n\n然而，`Slider` 节点本身也被放置在场景中的某个特定位置：\n\
  \n```\nmusicSlider.position = CGPoint(x: 200, y: -100)\n```\n\n因此，滑道（bar）的局部位置与其在世界中的实际位置不同。如果你想检查玩家是否在触摸滑道，这就会成为一个问题。触摸位置是在世界空间中计算的。`calculateAccumulatedFrame`\
  \ 方法返回节点局部位置处的边界框。这意味着需要额外一步来将局部位置转换为世界位置。新的 `box` 属性使用 `convertPoint` 方法来实现这一点：\n\
  \n```\nif parent != nil {\n    boundingBox.origin = scene!.convertPoint(boundingBox.origin,\
  \ fromNode: parent!)\n}\n```\n\n请注意，它只在节点有父节点时才执行计算，因为如果没有父节点，其局部位置与世界位置相同。由于边界框是相对于其父节点局部定位的，你需要将节点位置从父节点转换到场景节点（即游戏世界的根节点）。为了直接访问游戏世界的根节点，你使用了\
  \ `scene` 属性，它是 `SKNode` 的一部分。\n\n为了方便起见，我们再添加一个 `worldPosition` 属性，用于计算节点在世界坐标中的位置。以下是该属性的完整定义（同样使用了\
  \ `convertPoint` 方法）：\n\n```\nvar worldPosition: CGPoint {\n    get {\n        if\
  \ parent != nil {\n            return parent!.convertPoint(position, toNode: scene!)\n\
  \        } else {\n            return position\n        }\n    }\n}\n```\n\n\n\n\
  ### 完成滑块类\n\n下一步是为 `Slider` 类添加一个 `value` 属性，以便能够获取和设置滑块的值。我们希望值为 0 时表示滑块完全滑动到左侧，值为\
  \ 1 时表示滑块完全滑动到右侧。你可以通过观察前端精灵的位置以及它向右移动的距离来计算当前值。因此，以下代码行根据滑块位置计算滑块值：\n\n`return\
  \ (front.position.x - front.size.width/2 - (back.position.x - back.size.width/2)\
  \ - leftMargin) / (back.size.width - front.size.width - leftMargin - rightMargin)`\n\
  \n在分数的上半部分，你计算了前端精灵向右移动的距离。这个计算是相对于背景左侧位置加上左边距进行的。然后，你将其除以滑块可移动的总长度。这条 `return`\
  \ 指令构成了 `value` 属性的 `get` 部分。对于属性的 `set` 部分，你需要将介于 0 和 1 之间的值转换为前端滑块的 x 位置。这相当于重写前面的公式，使得前端\
  \ x 位置成为未知数，然后按如下方式计算：\n\n`front.position.x = newValue * (back.size.width - front.size.width\
  \ - leftMargin - rightMargin) + leftMargin - back.size.width/2 + front.size.width/2`\n\
  \n现在你已经有了设置和获取滑块值的方法，需要编写代码来处理玩家输入。第一步是检查玩家当前是否正在触摸屏幕。如果不是，你只需将拖拽状态变量重置为初始值，然后完成操作：\n\
  \n```\nif !inputHelper.isTouching {\n    dragging = false\n    draggingIndex = nil\n\
  \    return\n}\n```\n\n如果执行了这条 `if` 指令之后编写的指令，你就知道玩家正在触摸屏幕。\n\n你需要检查玩家是否确实触摸到了按钮。如果是这种情况，你为\
  \ `draggingIndex` 变量分配一个新值，并将 `dragging` 设置为 `true`：\n\n```\nif inputHelper.containsTouch(back.box)\
  \ {\n    draggingIndex = inputHelper.getIDInRect(back.box)\n    dragging = true\n\
  }\n```\n\n然后，检查玩家当前是否正在拖拽。如果不是，你就完成操作并从方法中返回：\n\n```\nif !dragging {\n    return\n\
  }\n```\n\n最后一步是更新滑块位置，因为玩家正在拖拽。首先解包拖拽索引。然后，获取玩家触摸屏幕的位置：\n\n```\nif let draggingUnwrap\
  \ = draggingIndex {\n    let touchPos = inputHelper.getTouch(draggingUnwrap)\n \
  \   ...\n}\n```\n\n接下来，计算滑块应有的 x 位置。由于触摸位置是世界坐标，你需要从中减去背景精灵的世界位置，以获得滑块的局部位置。这样就得到了以下表达式：\n\
  \n`touchPos.x - back.worldPosition.x`\n\n不过你还需要做一点额外工作，因为必须确保滑块不能移出其范围。因此，你需要将滑块位置限制在特定范围内。为此，我们添加一个可以执行此限制操作的函数：\n\
  \n```\nfunc clamp(number:CGFloat, min:CGFloat, max:CGFloat) -> CGFloat\n{\n    if\
  \ number < min {\n        return min\n    }\n    else if number > max {\n      \
  \  return max\n    }\n    return number\n}\n```\n\n现在，你使用该函数计算滑块的限制值，并将其存储为滑块新的\
  \ x 位置：\n\n```\nfront.position.x = clamp(touchPos.x - back.worldPosition.x,\n  \
  \  leftMargin - back.size.width/2 + front.size.width/2, back.size.width/2 - front.size.width/2\
  \ - rightMargin)\n```\n\n这就完成了处理玩家输入的代码。然后，你可以使用该类中的 `value` 属性，根据滑块的值改变音乐的音量（参见\
  \ `GameWorld` 类的 `updateDelta` 方法）：\n\n`backgroundMusic.volume = Float(musicSlider.value)`\n\
  \n至此，`PenguinPairs2` 示例就完成了。图 17-4 展示了它的效果。\n\n![A978-1-4842-0650-8_17_Fig4_HTML.jpg](img/A978-1-4842-0650-8_17_Fig4_HTML.jpg)\n\
  \n图 17-4.\n\n`PenguinPairs2` 示例\n\n大多数游戏都包含一些菜单界面。通过这些界面，玩家可以设置选项、选择关卡、查看成就以及暂停游戏。创建所有这些额外的界面可能会花费大量精力，而这些努力并不会对实际游戏玩法产生贡献，因此开发者往往不太重视它们。但这是一个非常错误的决定。\n\
  \n一位艺术家曾说过：“你的游戏好不好，取决于它最差的界面。”如果某个菜单界面质量低劣，玩家会感觉游戏尚未完成，并且开发者没有投入足够的精力。所以，要确保你所有的菜单界面都外观漂亮，并且易于使用和导航。\n\
  \n仔细考虑在这些界面中放置什么内容。你可能会想为所有内容都创建选项：游戏难度、播放的音乐、背景颜色等等。但请记住，你才是应该创建游戏的人，而不是玩家。应该由你或你的艺术家来决定什么能带来最有趣的玩法和最引人注目的视觉风格，而不是用户。\n\
  \n尽可能避免使用选项。例如，玩家真的需要设置难度吗？你不能通过监控玩家的进度来自动调整难度吗？你真的需要一个关卡选择界面吗？不能简单地记住玩家上次的位置，并立即在那里继续吗？尽量让你的界面保持简洁！\n\
  \n## 本章所学内容\n\n在本章中，你学到了以下内容：\n\n-   如何创建包含各种按钮和滑块的菜单\n-   如何获取按钮和滑块的值，并将这些信息转换为更改游戏设置（例如背景音乐音量）\n\
  -   如何使用类扩展为现有的第三方类添加功能\n\n"
- "# 18. 游戏状态管理\n\n电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-0650-8_18](http://dx.doi.org/10.1007/978-1-4842-0650-8_18))\
  \ 包含补充材料，可供授权用户使用。\n\n通常，游戏应用启动时你不会立即开始玩。例如，在《图坦之墓》游戏中，你在开始游戏之前会看到一个标题界面。更复杂的游戏可能包含标题界面、选项菜单、选择不同关卡的菜单、完成关卡后显示高分的界面、选择不同角色和属性的菜单等等。在《图坦之墓》中，添加标题界面并不那么困难，因为标题界面本身的交互性非常少。然而，当你查看上一章的示例时，你会发现构建一个包含几个选项和控件的界面可能会产生相当多的代码。你可以想象，当你向游戏添加更多菜单和界面时，管理哪些对象属于哪个界面以及它们何时应该被绘制或更新将会变得非常麻烦。\n\
  \n通常，这些不同的菜单和界面被称为游戏状态。在某些程序中，它们被称为场景，而负责管理场景的对象是导演。有时会区分游戏模式和游戏状态。在这种情况下，菜单、主游戏画面等属于游戏模式，而“关卡完成”和“游戏结束”则是游戏状态。\n\
  \n本书遵循一种简化的范式，将所有内容统称为游戏状态。为了处理这些不同的游戏状态，你需要一个管理器。在本章中，你将开发此类结构所需的主要类，并学习如何使用它来显示不同的菜单并在它们之间切换，同时保持代码的清晰分离。\n\
  \n\n\n## 游戏状态管理基础\n\n要妥善处理游戏状态，你需要确保以下几点：\n\n- 游戏状态应完全独立运行。换言之，你不希望在游戏进行中处理选项菜单界面或游戏结束界面。\n\
  - 应提供简便的方法来定义、查找和切换游戏状态。这样一来，当玩家在标题画面按下“选项”按钮时，你就能轻松切换到选项菜单状态。\n\n在之前的示例代码中，总存在某个游戏世界类。从游戏状态的角度看，每个这类世界对象都代表一个独立的（进行中）游戏状态。你需要为每个不同状态定义这样的类。好在你已拥有大量现成代码可供使用。其中，`SKNode`\
  \ 类尤其有用，因为它能表示一个可能包含整个游戏对象子树的节点，这足以作为表示游戏状态的基础。在之前的游戏中，代表游戏世界的类都继承自 `SKNode` 类。在本书后续示例中，代表游戏状态的类同样将继承自\
  \ `SKNode`。因此，若拥有选项菜单、标题画面、关卡选择画面和帮助菜单，你只需为每个游戏状态分别创建独立类。唯一需要补充的是管理游戏中各游戏状态的方法，这可以通过创建游戏状态管理器来实现。\n\
  \n### 游戏状态管理器\n\n本节将创建一个名为 `GameStateManager` 的类，用于管理《企鹅配对》游戏中的各种游戏状态。该游戏状态管理器的重要设计准则是：必须易于访问，且全游戏仅存在一个可随处访问的实例。在《画家》和《图特之墓》游戏中，游戏世界作为\
  \ `GameScene` 类的类属性实现了便捷访问。对于游戏状态管理器，我将采取略有不同的做法。\n\n随着软件开发经验的积累，你会发现面对问题时常会采用相似的设计方案。在软件工程中，这些通用解决方案被称为设计模式。其中一些设计模式广为人知，在包括游戏在内的众多应用中普遍使用。针对“需要类具有唯一且可全局访问实例”这一需求，对应的设计模式称为单例模式。以下是一个采用单例设计模式的简单类示例：\n\
  \n```\nclass MyClass {\n    static let instance = MyClass()\n    var aProperty =\
  \ 12\n}\n```\n\n如您所见，`MyClass` 类包含一个名为 `instance` 的类属性，它自身就是 `MyClass` 的实例。访问该唯一实例非常简单，并通过该实例访问\
  \ `aProperty` 属性：\n\n```\nprint(MyClass.instance.aProperty) // 控制台输出 '12'\n```\n\
  \n这种做法的优势在于避免了全局变量，且类设计本身就表明该类应仅有唯一实例。接下来，我们将以完全相同的方式定义游戏状态管理器，创建名为 `GameStateManager`\
  \ 的单例类。在本章对应的 `PenguinPairs3` 示例中，你可以找到作为单例实现的游戏状态管理器。\n\n该类的设计支持存储不同的游戏状态（即不同的\
  \ `SKNode` 实例），以便你选择当前游戏状态，随后管理器会将该节点添加为自身子节点，使所选节点变为活动可见状态。\n\n各游戏状态以节点形式存储在数组中，该数组是\
  \ `GameStateManager` 类的属性：\n\n```\nvar states : [SKNode] = []\n```\n\n你还需要定义另一个属性来追踪当前活动的游戏状态（即\
  \ `SKNode` 实例）：\n\n```\nvar currentGameState: SKNode? = nil\n```\n\n当 `GameStateManager`\
  \ 实例被创建时，尚不存在任何游戏状态，因此也没有当前活动状态。因此，`currentGameState` 属性为可选值。\n\n\n\n## 为节点分配名称\n\
  \n当处理不同的游戏状态和游戏对象时，如果能通过某种方式识别这些状态/对象会非常有用。在 SpriteKit 框架中，可以为节点分配一个名称。稍后你可以使用这个名称在场景中查找该节点。例如，以下是如何定义一个带有名称的节点：\n\
  \n```\nvar someNode = SKNode()\nsomeNode.name = \"playingField\"\n```\n\n`SKNode`\
  \ 类有一个名为 `childNodeWithName` 的方法，可用于搜索节点。默认情况下，此方法会搜索调用它的节点的子节点，直到找到匹配的子节点，然后停止并返回该节点。在搜索节点时，你可以使用正则表达式语法。以下是几个搜索示例：\n\
  \n```\nvar node = self.childNodeWithName(\"playingField\") /* 搜索该节点的子节点，\n    查找第一个名为\"\
  playingField\"的节点 */\nnode = self.childNodeWithName(\"playing*\") /* 搜索该节点的子节点，\n\
  \    查找第一个名称以\"playing\"开头的节点 */\nnode = self.childNodeWithName(\"/playingField\"\
  ) /* 搜索根节点的子节点，\n    查找第一个名为\"playingField\"的节点 */\nnode = self.childNodeWithName(\"\
  //playingField\") /* 搜索整个节点树，\n    并返回找到的第一个名为\"playingField\"的节点 */\n```\n\n利用节点命名方案，你可以编写一个简单的\
  \ `get` 方法，作为 `GameStateManager` 类的一部分，根据给定的名称检索游戏状态（`SKNode` 实例）：\n\n```\nfunc\
  \ get(name: String) -> SKNode? {\n    for state in states {\n        if state.name\
  \ == name {\n            return state\n        }\n    }\n    return nil\n}\n```\n\
  \n选择当前活动的游戏状态是通过调用名为 `switchTo` 的方法完成的。在切换游戏状态时需要格外小心。一旦切换到另一个游戏状态，当前游戏状态中的任何对象都将无法再找到（因为该游戏状态不再活动）。因此，仅在每个更新周期结束时切换到另一个游戏状态会更安全。为了实现这一点，`GameStateManager`\
  \ 类有一个名为 `plannedSwitch` 的属性，它可选地包含一个应切换到的游戏状态标题。在 `switchTo` 方法中，该属性被赋值为作为参数传递的标题：\n\
  \n```\nfunc switchTo(name: String) {\n    plannedSwitch = name\n}\n```\n\n现在，你需要重写\
  \ `GameStateManager` 类中的 `updateDelta` 方法来实际执行切换。此方法的第一步是简单地调用父类的 `updateDelta`\
  \ 方法，以确保所有游戏对象都得到正确更新：\n\n```\nsuper.updateDelta(delta)\n```\n\n然后，你检查是否需要切换到另一个游戏状态。当\
  \ `plannedSwitch` 属性包含值，并且该值是一个有效的游戏状态标题时，才需要进行切换。如果这两个条件中的任何一个不成立，你就从该方法返回：\n\n\
  ```\nif plannedSwitch == nil || !has(plannedSwitch!) {\n    return\n}\n```\n\n切换到另一个游戏状态相当直接。首先，移除当前活动的所有子节点（状态）：\n\
  \n```\nself.removeAllChildren()\n```\n\n然后，定位新的游戏状态，并将其添加为游戏状态管理器所代表的节点的子节点：\n\n\
  ```\ncurrentGameState = get(plannedSwitch!)\nself.addChild(currentGameState!)\n\
  ```\n\n作为 `updateDelta` 方法中的最后一条指令，你将 `plannedSwitch` 属性的值再次设置为 `nil`，因为游戏状态切换已经完成。\n\
  \n剩下的唯一一件事就是将游戏状态管理器整合到游戏的核心部分中，因此在 `GameScene` 类的 `update` 方法中调用其游戏循环方法：\n\n```\n\
  override func update(currentTime: NSTimeInterval) {\n    GameStateManager.instance.handleInput(inputHelper)\n\
  \    GameStateManager.instance.updateDelta(delta)\n    inputHelper.reset()\n}\n\
  ```\n\n## 添加状态并在状态间切换\n\n现在你已经有了游戏状态管理器，可以开始向其中添加不同的状态了。一个非常基本的游戏状态是标题菜单状态。在 `PenguinPairs3`\
  \ 示例中，你添加了一个名为 `TitleMenuState` 的类来表示此状态。标题菜单状态由四个游戏对象组成：一个背景和三个按钮。你可以重用之前在 Tut's\
  \ Tomb 游戏中开发的 `Button` 类。以下是 `TitleMenuState` 类的初始化器：\n\n```\noverride init() {\n\
  \    super.init()\n    self.name = \"title\"\n    let layout = GridLayout(rows:\
  \ 3, columns: 1, cellWidth: Int(playButton.size.width),\n        cellHeight: Int(playButton.size.height))\n\
  \    layout.yPadding = 5\n    let buttons = SKNode()\n    buttons.position.y = -200\n\
  \    self.addChild(buttons)\n    layout.target = buttons\n    playButton.zPosition\
  \ = Layer.Scene\n    optionsButton.zPosition = Layer.Scene\n    helpButton.zPosition\
  \ = Layer.Scene\n    layout.add(helpButton)\n    layout.add(optionsButton)\n   \
  \ layout.add(playButton)\n    let background = SKSpriteNode(imageNamed: \"spr_background_title\"\
  )\n    background.zPosition = Layer.Background\n    self.addChild(background)\n\
  }\n```\n\n如你所见，这里使用了 `GridLayout` 类来非常方便地定位按钮。因为需要在按下按钮时执行某些操作，所以你必须重写 `handleInput`\
  \ 方法。在该方法中，你检查每个按钮是否被按下，如果是，则切换到另一个状态。例如，如果玩家点击了“玩游戏”按钮，你需要切换到关卡菜单：\n\n```\nif playButton.tapped\
  \ {\n    GameStateManager.instance.switchTo(\"level\")\n}\n```\n\n你为其他两个按钮添加类似的替代方案。现在标题菜单状态基本完成了。在\
  \ `GameScene` 类中，唯一需要做的就是创建一个 `TitleMenuState` 的实例并将其添加到游戏状态管理器中。对于游戏中所有其他状态，你也执行同样的操作。之后，你将当前活动状态设置为标题菜单，这样玩家在游戏启动时就会看到标题菜单：\n\
  \n```\nGameStateManager.instance.addChild(TitleMenuState())\nGameStateManager.instance.addChild(HelpState())\n\
  GameStateManager.instance.addChild(OptionsMenuState())\nGameStateManager.instance.addChild(LevelMenuState(nrLevels:\
  \ 12))\n// 当前游戏状态是标题画面\nGameStateManager.instance.switchTo(\"title\")\n```\n\n帮助和选项菜单状态以类似于\
  \ `TitleMenuState` 的方式设置。在类的初始化器中，你将游戏对象添加到游戏世界，并重写 `handleInput` 方法以在状态间切换。例如，帮助和选项菜单状态都包含一个返回标题画面的“返回”按钮：\n\
  \n```\nif backButton.tapped {\n    GameStateManager.instance.switchTo(\"title\"\
  )\n}\n```\n\n请查看 `PenguinPairs3` 示例中的 `HelpState` 和 `OptionsMenuState` 类，了解不同状态是如何设置的以及如何在状态间切换。\n\
  \n\n\n### 关卡菜单状态\n\n一个稍微复杂一点的游戏状态是关卡菜单。你希望玩家能够从一组关卡按钮中选择一个关卡。这些关卡按钮需要显示三种不同的状态，因为一个关卡可能处于锁定、解锁但尚未通关、或已通关这三种状态。为了实现这一点，你需要某种在游戏运行之间持久存储的机制，这将在下一章讨论。\n\
  \n在你创建 `LevelMenuState` 类之前，你需要添加一个名为 `LevelButton` 的类，它继承自 `Button`。在 `LevelButton`\
  \ 类中，你需要追踪该按钮对应的关卡索引，以及该关卡是已通关、未通关还是对玩家锁定。根据关卡状态，按钮应具有不同的外观。因为按钮有三种不同的状态，你需要加载三种纹理，每种状态对应一种纹理。简而言之，以下是\
  \ `LevelButton` 中定义的存储属性：\n\n```\nvar levelIndex = 0\nvar locked = SKTexture(imageNamed:\
  \ \"spr_level_locked\")\nvar unsolved = SKTexture(imageNamed: \"spr_level_unsolved\"\
  )\nvar solved = SKTexture(imageNamed: \"spr_level_solved\")\n```\n\n稍后，你将修改 `LevelButton`\
  \ 类，使其根据关卡状态显示其中一种纹理。目前，你只需在按钮创建时显示未通关纹理。此外，在初始化器中添加一个文本标签，绘制在企鹅的肚子上，这样玩家就能看到每个按钮对应的关卡，如下所示：\n\
  \n```\nlet textLabel = SKLabelNode(fontNamed: \"Helvetica\")\ntextLabel.position\
  \ = CGPoint(x: 0, y: -25)\ntextLabel.fontColor = UIColor(red: 0, green: 0, blue:\
  \ 0.4, alpha: 1)\ntextLabel.fontSize = 24\ntextLabel.text = String(levelIndex)\n\
  textLabel.horizontalAlignmentMode = .Center\ntextLabel.zPosition = Layer.Overlay\n\
  self.addChild(textLabel)\n```\n\n最后，在 `handleInput` 方法中，你检查按钮是否被点击。如果玩家点击了关卡按钮，且该关卡未被锁定，游戏应切换到对应的关卡。假设索引为\
  \ x 的关卡名称为 `\"levelx\"`。同时，当玩家切换到某个关卡时，你可能需要重置该关卡，以便玩家能够立即从头开始游戏。简而言之，以下是完整的 `handleInput`\
  \ 方法：\n\n```\noverride func handleInput(inputHelper: InputHelper) {\n    super.handleInput(inputHelper)\n\
  \    if self.texture == locked {\n        return\n    }\n    if tapped {\n     \
  \   GameStateManager.instance.switchTo(\"level\\(levelIndex)\")\n        GameStateManager.instance.reset()\n\
  \    }\n}\n```\n\n请注意，在 PenguinPairs3 示例中，这个方法实际上被注释掉了，因为还没有关卡状态。\n\n正如你所见，只要事先考虑好软件的设计，为游戏添加不同的状态并在它们之间切换并不困难。通过提前思考需要哪些类以及游戏功能如何在它们之间分配，你可以在之后节省大量时间。在下一章中，你将通过创建实际的关卡来进一步扩展这个示例。图\
  \ 18-1 展示了关卡菜单状态的截图。\n\n![A978-1-4842-0650-8_18_Fig1_HTML.jpg](img/A978-1-4842-0650-8_18_Fig1_HTML.jpg)\n\
  \n**图 18-1.** 企鹅配对游戏中的关卡菜单界面\n\n## 本章所学内容\n\n在本章中，你学习了以下内容：\n\n- 什么是设计模式以及单例模式提供了什么\n\
  - 如何使用游戏状态管理器定义不同的游戏状态\n- 如何根据玩家的操作在游戏状态之间切换\n\n"
- "# 19. 存储和读取游戏数据\n\n电子补充材料 本章在线版本 (doi:[10.​1007/​978-1-4842-0650-8_​19](http://dx.doi.org/10.1007/978-1-4842-0650-8_19))\
  \ 包含补充材料，仅供授权用户使用。\n\n许多游戏由不同的关卡组成。像解谜游戏和迷宫游戏这样的休闲游戏可能有数百个关卡。到目前为止，你的游戏都依赖随机性来保持游戏的可玩性。虽然随机性是实现可重复游玩的强大工具，但在许多情况下，游戏设计师希望更精确地控制游戏进程。这种控制通常通过设计关卡来实现。每个关卡都是一个独立的游戏世界，玩家需要在其中达成某种目标。\n\
  \n使用你目前掌握的工具，你需要为游戏中的每个关卡编写一个特定的类，在其中填充该关卡的游戏对象，并添加所需的行为。这种方法有几个缺点。最重要的缺点是，你将游戏逻辑（玩法、胜利条件等）与游戏内容混合在一起。这意味着每次你想为游戏增加一个关卡时，都必须编写一个新的类，这会大大增加开发时间。此外，如果一位游戏设计师想要在你构建的游戏中添加一个关卡，设计师需要深入了解你的代码是如何工作的。而设计师在编写代码时犯的任何错误都会导致游戏出现错误或崩溃。\n\
  \n一个更好的方法是将关卡信息与实际游戏代码分开存储。在游戏加载时，再获取这些关卡信息。理想情况下，这些信息需要以非程序员也能理解和处理的简单格式存储。这样，关卡就可以由非开发人员来设计，而无需知道游戏如何将这些数据转换为可玩的游戏关卡。存储关卡信息最便捷的方式是使用文本格式。你可以非常轻松地使用文本来描述一个关卡。请看以下示例：\n\
  \n```\nRHBQKBHR\nPPPPPPPP\n........\n........\n........\n........\npppppppp\nrhbqkbhr\n\
  ```\n\n这段文本数据描述了国际象棋游戏的起始局面，其中每个字符代表一个棋子（小写字母代表白棋，大写字母代表黑棋）。如果你创建了一个能够从文件中读取此类描述的国际象棋游戏，你就可以非常轻松地修改文件，以允许不同的起始局面。例如，你可以让设计师创建一系列取自国际象棋大师实际对局的经典棋局。你无需对游戏代码做任何修改。你甚至可以决定创建一个超级国际象棋游戏，通过增加列和行来扩大棋盘（前提是加载游戏数据的代码支持这一点）。所有这些都可以在不了解国际象棋游戏实际工作原理的情况下完成。因为是简单的文本，这种格式相对容易理解，即使是对编程经验很少或没有经验的人也是如此。你可以采用这种技术为游戏创建各种关卡，而无需修改任何代码。这对于大型游戏尤其有用，因为这类游戏通常涉及更大的团队。通过将关卡设计与代码编写分离，你就能让那些擅长游戏设计和图形设计等任务的非程序员更高效地帮助你创建出色的游戏。\n\
  \n你将类似地处理企鹅配对游戏中的不同关卡。在本章中，你将看到如何将这样的关卡加载方案构建到你的游戏中。你还需要考虑的另一件事是跨游戏会话存储和读取不同游戏的状态。像《画图》和《图坦之墓》这样的游戏不会保留玩家之前游玩时的任何信息，这对于那些游戏来说无关紧要。但对于企鹅配对游戏来说，这很重要，因为你不想让玩家每次启动游戏时都要从头开始。如果玩家完成了一个关卡，应用程序应该在下次启动时记住这一点，这样玩家就可以从上次中断的地方继续游戏。\n\
  \n\n\n## 关卡的结构\n\n我们先来看看《企鹅配对》游戏中一个关卡里可能包含哪些元素。首先，会有一张某种类型的背景图片。我们假设这张背景在加载关卡时就固定了，因此无需在文本文件中存储与之相关的任何信息。\n\
  \n关卡中有许多不同的动物，比如企鹅、海豹和鲨鱼。此外，还有冰山、企鹅可以行走的背景方块，以及一些其他东西。你需要将所有这些信息存储在关卡文件中。一种可能性是存储每个对象的位置和类型，但这会让变量变得复杂。另一种可能性是将关卡划分为小方块，也称为瓦片。每个瓦片都有特定的类型（可以是企鹅、游戏场地瓦片、透明瓦片、海豹等）。一个瓦片可以用单个字符来表示，你可以像国际象棋示例那样，将关卡的结构存储在文本文件中：\n\
  \n```\n#.......#\n#...r...#\n#.......#\n#.     .#\n#.     .#\n#.     .#\n#.......#\n\
  #...r...#\n#.......#\n```\n\n在这个关卡定义中，定义了许多不同的方块。冰山（墙壁）瓦片由 `#` 符号定义，企鹅由 `r` 字符定义，背景瓦片由\
  \ `.` 字符定义，空瓦片由空格字符定义。在本章后面，你将编写一个方法，利用这些信息来创建各种瓦片并将它们存储在某处（可能是一个 `SKNode` 实例中）。\n\
  \n除了瓦片，你还需要为每个关卡存储一些其他信息：\n\n*   关卡标题\n*   关卡提示\n*   需要配对的组数\n*   关卡的宽度和高度（用于文件读取）\n\
  *   提示箭头的位置和方向\n\n因此，你可以像下面这样在文本文件中定义一个完整的关卡：\n\n```\nSplash!\nDon’t let the penguins\
  \ fall in the water!\n1\n9 9\n3 7 l\n#.......#\n#...r...#\n#.......#\n#.     .#\n\
  #.     .#\n#.     .#\n#.......#\n#...r...#\n#.......#\n```\n\n对于每个关卡，你都要在文本文件中添加类似的文本行。如果你打开\
  \ PenguinPairs4 示例中的 `levels.txt` 文件，你会看到它包含了许多不同的关卡。文本文件的第一行指明了文件中定义了多少个关卡（在本例中为\
  \ 12 个）。\n\n## 从文件读取数据\n\n既然《企鹅配对》的关卡已经在文本文件中定义好了，接下来你需要编写实际读取这个文本文件的代码。在 Swift\
  \ 中读取文本文件相当直接。它基本上包含两个步骤：首先，你需要指定要读取哪个文件；然后，你可以使用 `String` 类型，它有一个可以读取文件内容的初始化器。例如，以下两行代码读取了\
  \ `levels.txt` 文件：\n\n```\nlet filePath = NSBundle.mainBundle().pathForResource(\"\
  levels\", ofType:\"txt\")\nlet data = try! String(contentsOfFile: filePath!, encoding:\
  \ NSUTF8StringEncoding)\n```\n\n通过这种方式读取文件后，你会得到一个包含整个文本文件内容的字符串。将这个字符串拆分成多个字符串非常有用，其中每个字符串对应文本文件中的一行。你可以使用\
  \ `componentsSeparatedByString` 方法来实现这一点，该方法将一个字符串分割成多个子字符串，并存储在一个数组中（注意使用换行符作为分隔符）：\n\
  \n```\nlet multipleStrings = data.componentsSeparatedByString(\"\\n\")\n```\n\n\
  在继续使用文件数据来读取《企鹅配对》关卡之前，我们先设计一个简单的类，让文件读取变得更轻松。在 PenguinPairs4 示例中，你会找到 `FileReader`\
  \ 类，它负责读取文件并提供简单的访问方式。在初始化器中，会读取作为参数传入的文件，并将其数据存储在一个字符串数组中。现在，你只需创建一个 `FileReader`\
  \ 实例就可以读取文件了。例如，在 `GameScene` 类中，就是这样读取关卡数据的：\n\n```\nlet levels = FileReader(filename:\
  \ \"levels\")\n```\n\n下一步是访问文件数据。你可以直接访问 `FileReader` 实例中的字符串数组来做到这一点。另一种方法是使用迭代器设计模式。基本上，这意味着\
  \ `FileReader` 实例在遍历文件数据时，会跟踪你已经检索到数据的哪个部分。注意，我们在 `FileReader` 类中添加了一个名为 `it` 的属性，用于记录当前在字符串数组中的读取位置：\n\
  \n```\nvar it = -1\n```\n\n接着，定义一个名为 `nextLine` 的方法，它会递增 `it` 属性并返回下一行。以下是完整的方法：\n\
  \n```\nfunc nextLine() -> String {\n    if (it >= fileData.count - 1) {\n      \
  \  return \"\"\n    } else {\n        it++\n        return fileData[it]\n    }\n\
  }\n```\n\n所以，每当你想要读取文件中的下一行时，只需调用 `nextLine` 方法即可。请注意，该方法中核心的代码在于这两行：\n\n```\nit++\n\
  return fileData[it]\n```\n\n首先，你递增迭代器，然后返回迭代器对应的数组元素。有一个巧妙的小技巧可以将这两行代码合并成一行。这依赖于\
  \ `++` 后置运算符会返回一个结果这一事实。换句话说，你可以这样做：\n\n```\nvar result = it++\n```\n\n现在，`result`\
  \ 变量将包含 `it` 的旧值。也就是说，如果 `it` 的值是 3，那么执行这条指令后，`result` 将包含值 3（`it` 的旧值），而 `it` 将包含值\
  \ 4。你也可以这样做：\n\n```\nvar anotherResult = ++it\n```\n\n在这种情况下，因为你使用了 `++` 前缀运算符，`anotherResult`\
  \ 将包含 `it` 的新值（递增之后的值）。所以，如果 `it` 是 3，那么执行这条指令后，`it` 和 `anotherResult` 都将包含值 4。回到文件读取的例子，这意味着你可以将\
  \ `nextLine` 方法中的两行代码替换为下面这一行：\n\n```\nreturn fileData[++it]\n```\n\n每当你需要从文件中读取一行时，都可以使用\
  \ `nextLine` 方法。例如，在 `GameScene` 类中加载文件后，你就可以检索文件的第一行以获取关卡数量：\n\n```\nlet nrLevels\
  \ = levels.nextLine().toInt()!\n```\n\n然后，你使用一个 `for` 循环为每个关卡创建一个状态：\n\n```\nfor\
  \ i in 1...nrLevels {\n    GameStateManager.instance.addChild(LevelState(fileReader:\
  \ levels, levelNr: i))\n}\n```\n\n如你所见，你将 `FileReader` 实例传递给了 `LevelState` 的初始化器，这样每个关卡状态都可以检索自己的关卡数据（稍后会详细介绍）。\n\
  \n## Tile 类\n\n在开始创建实际的关卡之前，让我们先做一些准备工作，编写一个基础的 `Tile` 类。这个类是 `SKSpriteNode` 类的子类。目前，我们不考虑关卡中更复杂的元素，比如企鹅、海豹和鲨鱼。我们只关注背景（透明）瓦片、普通瓦片和墙壁（冰山）瓦片。让我们引入一个枚举类型来表示这些不同的瓦片种类：\n\
  \n```swift\nenum TileType {\n    case Wall\n    case Background\n    case Normal\n\
  }\n```\n\n`Tile` 类是 `SKSpriteNode` 的一个基本子类。它只是添加了一个表示瓦片类型的属性：\n\n```swift\nprivate\
  \ var tileTipe: TileType = .Background\n```\n\n为了适应透明瓦片，我们提供了一个 `convenience` 初始化器，它会加载一个墙壁精灵图片，并将节点设置为隐藏：\n\
  \n```swift\nconvenience init() {\n    self.init(imageNamed: \"spr_wall\", type:\
  \ .Background)\n    self.hidden = true\n}\n```\n\n当你加载关卡时，你会为每个字符创建一个瓦片，并使用 `GridLayout`\
  \ 类将其存储在网格结构中。\n\n\n\n## 关卡状态\n\n在上一章中，你已经了解了如何创建多个游戏状态，例如标题画面、关卡选择菜单和选项菜单。在本节中，你将添加多个关卡状态。每个关卡状态都是\
  \ `SKNode` 的子类，并向世界添加自己的游戏对象。`LevelState` 的初始化器需要一个 `FileReader` 实例（以便读取关卡数据），以及该关卡对应的编号。以下是\
  \ `LevelState` 初始化器的一部分：\n\n```\ninit(fileReader: FileReader, levelNr : Int) {\n\
  \    super.init()\n    self.levelNr = levelNr\n    self.name = \"level\\(levelNr)\"\
  \n    // 待办：根据关卡数据向此关卡填充游戏对象\n}\n```\n\n如你所见，每个关卡都被分配了一个唯一的名称。关卡 1 被称为“level1”，关卡\
  \ 2 被称为“level2”，依此类推。你还需要跟踪动物，例如企鹅、海豹和鲨鱼。你可以将它们存放在一个独立的节点中，并作为 `LevelState` 的一个属性，以便之后能快速查找动物。\n\
  \n```\nvar animals = SKNode()\n```\n\n现在，你可以开始创建游戏对象来填充游戏世界了。首先，向游戏世界添加一个背景图片：\n\
  \n```\nlet background = SKSpriteNode(imageNamed: \"spr_background_level\")\nbackground.zPosition\
  \ = Layer.Background\nself.addChild(background)\n```\n\n除此之外，还需要添加属于该关卡的各种按钮（退出、重试和提示）。请查看\
  \ PenguinPairs4 示例中的 `LevelState.swift` 文件以获取相应代码。\n\n添加背景和按钮之后，你可以开始读取存储在文本文件中的数据了。第一步是读取关卡标题、帮助信息、所需配对数量、关卡尺寸以及提示信息，然后将这些信息存储到局部变量中，以便之后用于构建游戏世界：\n\
  \n```\nlet title = fileReader.nextLine()\nlet help = fileReader.nextLine()\nlet\
  \ nrPairs = fileReader.nextLine().toInt()!\nlet sizeArr = fileReader.nextLine().componentsSeparatedByString(\"\
  \ \")\nlet width = sizeArr[0].toInt()!, height = sizeArr[1].toInt()!\nlet hintArr\
  \ = fileReader.nextLine().componentsSeparatedByString(\" \")\n```\n\n下一步是实际创建瓦片区域。为此，需要定义一个名为\
  \ `TileField` 的类，它是 `SKNode` 的子类，但增加了网格布局。此外，它还有一个名为 `getTileType` 的方法，用于返回网格中某个位置上的瓦片类型。稍后，这个方法将用于检查例如企鹅是否已掉落出游戏区域等情况。以下是完整的类定义：\n\
  \n```\nclass TileField : SKNode {\n    var layout: GridLayout\n    init(rows: Int,\
  \ columns: Int, cellWidth: Int, cellHeight: Int) {\n        layout = GridLayout(rows:\
  \ rows, columns: columns,\n            cellWidth: cellWidth, cellHeight: cellHeight)\n\
  \        super.init()\n        layout.target = self\n    }\n    required init?(coder\
  \ aDecoder: NSCoder) {\n        fatalError(\"init(coder:) has not been implemented\"\
  )\n    }\n    func getTileType(col: Int, row: Int) -> TileType {\n        if let\
  \ obj = layout.at(col, row: row) as? Tile {\n            return obj.type\n     \
  \   }\n        return .Background\n    }\n}\n```\n\n在 `LevelState` 的初始化器中，你需要创建\
  \ `TileField` 实例，并指定合适的高度、宽度和单元格尺寸：\n\n```\nlet tileDimension = 75\nvar tileField\
  \ = TileField(rows: height, columns: width,\n    cellWidth: tileDimension, cellHeight:\
  \ tileDimension)\ntileField.name = \"level\\(levelNr)_tileField\"\nself.addChild(tileField)\n\
  ```\n\n现在，你可以开始从文本文件中检索实际的关卡数据了。下一步是读取该关卡剩余的所有行，并将其存储到一个数组中，以便后续遍历该数组：\n\n```\n\
  var lines: [String] = []\nfor i in 0..<height {\n    var newLine = fileReader.nextLine()\n\
  \    while count(newLine) < width {\n        newLine += \" \"\n    }\n    lines.append(newLine)\n\
  }\n```\n\n如你所见，这里有一个额外的 `while` 循环，用于向刚读取的行中添加空格字符。这样做是为了避免因关卡行的宽度不一致而产生问题。考虑以下关卡定义：\n\
  \n```\n.\nr.r\n.\n```\n\n这是一个非常简单的关卡，包含两只企鹅。该关卡的宽度为三个单元格。然而，由于关卡的布局，在关卡定义的第一行和最后一行，该关卡只定义了两个单元格（先是空格，然后是点）。你可以要求你的关卡设计师在文本文件中添加足够的空格，以确保所有行的宽度一致，但这存在风险。关卡设计师可能会忘记这样做，而通过代码中的\
  \ `while` 循环可以轻松解决这个问题。这是一个很好的例子，说明为什么有时需要编写额外的代码来使系统更健壮。通过添加 `while` 循环，可以省去关卡设计师的很多麻烦；这使得设计关卡的过程更加稳定。\n\
  \n既然你已经将所有关卡数据存储在一个字符串数组中，接下来使用另一个 `for` 循环来遍历每一行，并创建所有瓦片：\n\n```\nfor i in 0..<height\
  \ {\n    var currLine = lines[height-1-i]\n    var j = 0\n    for c in currLine\
  \ {\n        j++\n        // 在第 i 行、第 j 列创建瓦片\n    }\n}\n```\n\n注意，你从数组的最后一行开始处理。这是因为网格是从底部向上填充的（沿着\
  \ y 轴方向）。根据当前处理的字符，你需要创建不同类型的游戏对象，并将它们添加到瓦片区域。你可以使用 `if` 指令来实现：\n\n```\nif c ==\
  \ \".\" {\n    // 创建一个空瓦片\n} else if c == \" \" {\n    // 创建一个背景瓦片\n} else if c\
  \ == \"r\" {\n    // 创建一个企鹅瓦片\n} else {\n    // 执行其他操作\n}\n```\n\n原则上，这段代码是可行的。但你需要反复编写条件判断。还有一种更简洁的写法。Swift\
  \ 提供了一种专门用于处理各种情况的关键字：`switch`。\n\n**注意**\n\n当以基于文本的格式定义关卡时，你需要决定每个字符代表哪种对象。这些决策将影响关卡设计师（他们需要在关卡数据文件中输入字符）和开发人员（他们需要编写代码来解释这些关卡数据）的工作。这表明了文档的重要性，即使在积极开发阶段也是如此。拥有一份“速查表”是很好的，这样在编写代码时，你就不必记住所有关于关卡设计的想法。如果你与设计师合作，速查表也很有用，可以确保你们双方的理解保持一致。\n\
  \n\n\n### 使用 `switch` 处理多种选择\n\n`switch` 指令允许你指定多种备选方案，以及每个方案应执行的指令。例如，之前包含多个备选方案的\
  \ `if` 指令可以改写为如下的 `switch` 指令：\n\n```\nswitch c {\n    case \".\": // 创建一个空瓦片\n\
  \    case \" \": // 创建一个背景瓦片\n    case \"r\": // 创建一个企鹅瓦片\n    default: // 执行其他操作\n\
  }\n```\n\n`switch` 指令有几个便捷特性，使其在处理不同备选方案时非常有用。请看下面的代码示例：\n\n```\nif x == 1 {\n \
  \   one()\n} else if x == 2 {\n    two()\n    alsoTwo()\n} else if x == 3 || x ==\
  \ 4 {\n    threeOrFour()\n} else {\n    more()\n}\n```\n\n你可以用 `switch` 指令将其重写如下：\n\
  \n```\nswitch x {\n    case 1:\n        one()\n    case 2:\n        two()\n    \
  \    alsoTwo()\n    case 3, 4:\n        threeOrFour()\n    default:\n        more()\n\
  }\n```\n\n当执行 `switch` 指令时，会计算 `switch` 关键字后的表达式。然后执行 `case` 关键字后与该特定值对应的指令。如果没有与值匹配的分支，则执行\
  \ `default` 关键字后的指令。不同 `case` 后的值必须是常量值（数字、双引号之间的字符串，或声明为常量的变量）。如你所见，一个 `case` 可以代表多个值；在示例中，3\
  \ 和 4 属于同一个 `case`。对于每个 `case`，可以执行多条指令（例如 `case 2`）。\n\n一个重要细节是，`switch` 指令必须是穷尽的，换句话说：所有情况都必须被处理。最简单的解决方法是使用\
  \ `default` 分支，如上面的示例所示。当 `switch` 指令中所有显式分支都不匹配时，就会执行 `default` 分支的代码。图 19-1 展示了\
  \ `switch` 指令的示意图。\n\n![A978-1-4842-0650-8_19_Fig1_HTML.gif](img/A978-1-4842-0650-8_19_Fig1_HTML.gif)\n\
  \n图 19-1. `switch` 指令的语法图\n\n### 加载不同类型的瓦片\n\n你可以使用 `switch` 指令来加载所有不同的瓦片和游戏对象。对于关卡数据中的每个字符，你需要执行不同的任务。例如，当读取字符“.”时，你需要创建一个普通的游戏场地瓦片。以下指令实现了这一点：\n\
  \n```\nlet tileSprite = \"spr_field_\\((i + j) % 2)\"\nvar tile = Tile(imageNamed:\
  \ tileSprite, type: .Normal)\ntile.zPosition = Layer.Scene\ntileField.layout.add(tile)\n\
  ```\n\n瓦片使用的精灵交替为 `spr_field_0.png` 或 `spr_field_1.png`。通过使用公式 `(i + j) % 2` 切换精灵，你可以获得交替的棋盘格图案，如运行本章附带的\
  \ PenguinPairs4 程序所示。另一个例子是添加一个透明背景瓦片：\n\n```\nvar tile = Tile()\ntile.zPosition\
  \ = Layer.Scene\ntileField.layout.add(tile)\n```\n\n当你需要放置一个动物时，需要完成两件事：\n\n- 放置一个普通瓦片。\n\
  - 放置动物。\n\n由于动物有时需要在棋盘上移动，并且你需要与它们交互，所以你创建了一个名为 `Animal` 的类来表示动物，例如企鹅、海豹或鲨鱼。在本节稍后部分，你将看到这个类的具体样子。在\
  \ `switch` 指令中，你按如下方式创建一个普通瓦片和一只企鹅：\n\n```\nlet tileSprite = \"spr_field_\\((i +\
  \ j) % 2)\"\nvar tile = Tile(imageNamed: tileSprite, type: .Normal)\ntile.zPosition\
  \ = Layer.Scene\ntileField.layout.add(tile)\n\nvar p = Animal(type: String(c))\n\
  p.position = tile.position\np.initialPosition = tile.position\np.zPosition = Layer.Scene1\n\
  animals.addChild(p)\n```\n\n第一步是创建一个普通瓦片并将其添加到瓦片字段中。然后创建 `Animal` 实例。`Animal` 的初始化器将当前字符作为参数，以便你可以在\
  \ `Animal` 初始化器中加载正确的精灵。创建 `Animal` 对象后，你将其位置设置为你创建的瓦片位置，以便正确放置。你还将一个名为 `initialPosition`\
  \ 的属性设置为相同的值。这样做是为了如果玩家卡住并按下重试按钮，你可以知道关卡中每个动物的原始位置。\n\n在 `Animal` 初始化器中，你将字符作为参数传递。有几种不同类型的动物。根据动物类型，你需要在初始化器中执行不同的操作。其中一种特殊类型的动物是盒装动物。这代表一只被困在冰洞中的动物。玩家无法移动盒装动物。在关卡描述中，盒装动物由大写字符表示。你检查字符是否为大写，并将该信息作为布尔值存储在\
  \ `Animal` 类的 `boxed` 属性中：\n\n```\nboxed = type.uppercaseString == type\n```\n\n\
  然后你编写几条指令将动物类型转换为精灵名称：\n\n```\nvar spriteName = \"spr_animal_\\(type)\"\nif boxed\
  \ && type != \"@\" {\n    spriteName = \"spr_animal_boxed_\\(type.lowercaseString)\"\
  \n}\n```\n\n如果动物在盒子中，或者它是一个空盒子（由 `\"@\"` 字符表示），你将使用另一个精灵名称。为了完成 `Animal` 类，你添加了几个便捷方法来检查是否在处理特殊情况，例如彩色企鹅、空盒子、海豹或鲨鱼。彩色企鹅可以与任何其他颜色的企鹅配对，关卡中的空盒子可用于将企鹅移入，海豹可以四处移动但永远不会成对，鲨鱼则会吞噬任何挡路的东西。完整的\
  \ `Animal` 类，请参阅本章附带的 PenguinPairs4 示例程序。\n\n现在，你已在 `switch` 指令中处理了所有这些不同情况，你可以加载每个关卡了。请查看示例中的\
  \ `LevelState` 类以了解完整的关卡创建过程。图 19-2 显示了其中一个关卡加载后的屏幕截图。\n\n![A978-1-4842-0650-8_19_Fig2_HTML.jpg](img/A978-1-4842-0650-8_19_Fig2_HTML.jpg)\n\
  \n图 19-2. 企鹅配对游戏中的其中一个关卡\n\n\n\n## 维护玩家游戏进度\n\n为了完成本章内容，本节将向您展示一种跟踪玩家在不同游戏会话中进展的优秀方法。您希望游戏能够记住玩家上次游玩时的位置。实现这一目标有多种方式。一种是让玩家自行处理，直接默认解锁所有关卡。这虽然是一种解决方案，但无法真正激励玩家按顺序逐个通关。另一种方式是使用文本文件存储玩家状态。第三种方案是采用所谓的用户默认设置。这项功能能让您毫不费力地追踪游戏玩家的设置和偏好。只需编写一行代码，即可获取当前的用户默认设置：\n\
  \n```\nvar defaults = NSUserDefaults.standardUserDefaults()\n```\n\n`defaults` 变量的作用类似于字典，您可以在其中存储键值对，这些键值对能在不同游戏会话中保持其值不变。例如，您可以通过在\
  \ `defaults` 变量中存储一个布尔值，来记录玩家是否希望在《企鹅配对》游戏中查看提示：\n\n```\ndefaults.setBool(true,\
  \ forKey: \"hints\")\n```\n\n同样地，从用户默认设置中读取数据也非常直接：\n\n```\nlet showHints = defaults.boolForKey(\"\
  hints\")\n```\n\n当玩家首次启动《企鹅配对》游戏时，自然还没有与该游戏相关的默认信息。在这种情况下，您需要用“默认的默认值”来填充 `defaults`\
  \ 变量。对于《企鹅配对》而言，这意味着提示功能开启，背景音乐音量设为 0.5，并且除第一关状态为“未解决”外，所有关卡均处于锁定状态。这些数据可以再次存储在文本文件中，并在玩家首次启动《企鹅配对》应用时读取。\n\
  \n为了采用略有不同的方法，您将不会从普通文本文件中读取这些数据，而是从属性列表文件（`plist`）中读取。这是一种非常方便的基于文本的文件格式。它在底层使用\
  \ XML 来组织文本结构，但 Xcode 环境提供了一个非常有用的工具，让您能非常轻松地编辑这些文件。如果您点击 PenguinPairs4 项目中的 `defaults.plist`\
  \ 文件，将会看到一个编辑器界面（见图 19-3）。在此编辑界面中，您可以更改默认文件的内容。您可以向列表中添加或移除项目。\n\n![A978-1-4842-0650-8_19_Fig3_HTML.jpg](img/A978-1-4842-0650-8_19_Fig3_HTML.jpg)\n\
  \n图 19-3. Xcode 中属性列表编辑界面的截图\n\n从属性列表文件中读取数据非常直接。只需几行代码，您就可以读取该文件并将其内容存储到字典中：\n\n\
  ```\nvar filePath = NSBundle.mainBundle().pathForResource(\"defaults\", ofType:\"\
  plist\")\nlet defaultPreferences = NSDictionary(contentsOfFile: filePath!)!\n```\n\
  \n现在，您可以使用如下 `for` 循环遍历字典中的所有项目，并将它们添加到用户默认设置中：\n\n```\nfor (key, value) in defaultPreferences\
  \ {\n    defaults.setObject(value, forKey: key as! String)\n}\n```\n\n为了整洁地处理用户默认设置，PenguinPairs4\
  \ 示例中包含了一个 `DefaultsManager` 类。该类与游戏状态管理器一样，实现了单例设计模式。它允许您轻松地读写用户偏好设置。例如，在选项菜单状态下，会检索用户对背景音乐音量的偏好，并将滑块设置为相应的值：\n\
  \n```\nmusicSlider.value = CGFloat(DefaultsManager.instance.musicVolume)\n```\n\n\
  请自行查看 PenguinPairs4 示例，了解它如何处理默认值和偏好设置。\n\n### 存档游戏的诅咒\n\n大多数游戏都包含一种让玩家保存进度的机制。这通常有三种用途：稍后继续游戏、在游戏后期失败时返回到之前的存档点，或者尝试不同的策略或故事线。这些可能性听起来都合情合理，但也引入了问题；在设计游戏时，您必须仔细考虑何时（以及如何）允许玩家保存和加载游戏状态。\n\
  \n例如，在早期的第一人称射击游戏中，所有敌人都位于游戏世界中固定的位置。玩家们形成了一种常见策略：先保存游戏，冲进一个房间查看敌人的位置（这通常会导致立即死亡），然后加载已保存的游戏，并利用获取的敌人位置信息，小心翼翼地清理房间。这大大降低了游戏难度，但这绝非创作者的本意。通过提高保存或加载游戏的难度，可以部分地弥补这个问题。其他游戏只允许在特定的存档点进行保存。有些甚至将到达存档点本身作为挑战的一部分。但这可能会导致挫败感，因为如果有一个非常困难的地点，玩家可能不得不反复重玩游戏的某些部分。最有趣的游戏是那些你永远不必返回存档点的游戏，因为你永远不会真正失败，但这在设计上极为困难。\n\
  \n因此，请仔细考虑您的存档机制。您会在何时允许保存？您会允许多少个不同的存档？游戏中保存是如何工作的？玩家如何加载已保存的游戏？保存或加载游戏是否需要玩家付出代价？所有这些决策都会影响游戏玩法和玩家满意度。\n\
  \n## 本章所学\n\n在本章中，您学习了以下内容：\n\n- 如何通过从文本文件读取数据来创建基于瓦片的游戏世界\n- 如何使用 `switch` 指令处理不同的情况\n\
  - 如何使用用户默认设置检索和存储关卡状态数据\n\n"
- "# 20. 游戏对象之间的交互\n\n电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-0650-8_20](http://dx.doi.org/10.1007/978-1-4842-0650-8_20))\
  \ 包含补充材料，仅供授权用户使用。\n\n在本章中，您将为《企鹅配对》游戏编写主要的游戏逻辑。您将学习如何在棋盘上移动企鹅，以及当企鹅与另一个游戏对象（如鲨鱼或其他企鹅）发生碰撞时该如何处理。\n\
  \n## 定义运算符\n\n由于您将处理移动和碰撞的企鹅，因此会进行大量涉及二维点和向量（由 `CGPoint` 实例表示）的计算。目前，使用这些点进行计算有点麻烦。例如，在\
  \ `LevelState` 类中，您必须这样定位退出按钮：\n\n```\nquitButton.position = GameScreen.instance.topRight\n\
  quitButton.position.x -= quitButton.center.x + 10\nquitButton.position.y -= quitButton.center.y\
  \ + 10\n```\n\n如果能像这样操作就简单多了：\n\n```\nquitButton.position = GameScreen.instance.topRight\
  \ – quitButton.center –\n    CGPoint(x: 10, y: 10)\n```\n\n遗憾的是，Swift 并没有定义减法运算符对两个\
  \ `CGPoint` 实例的作用。幸运的是，定义减法运算符应该做什么非常容易，因为 Swift 允许您通过编写一个函数来定义该行为：\n\n```\nfunc\
  \ - (left: CGPoint, right: CGPoint) -> CGPoint {\n    return CGPoint(x: left.x -\
  \ right.x, y: left.y - right.y)\n}\n```\n\n如您所见，减法运算符创建了一个新的 `CGPoint` 实例并返回它。一旦定义了此函数，您就可以对\
  \ `CGPoint` 实例进行减法运算了。很简单，不是吗？您还可以定义其他运算符，例如 `==` 运算符，它比较两个 `CGPoint` 实例，如果它们是同一个点则返回\
  \ `true`：\n\n```\nfunc == (left: CGPoint, right: CGPoint) -> Bool {\n    return\
  \ (left.x == right.x) && (left.y == right.y)\n}\n```\n\n请查看 `Math.swift` 文件，了解其中定义的一系列此类运算符，这些定义使得使用\
  \ `CGPoint` 实例进行计算变得更加容易。\n\n\n\n### 选择企鹅\n\n在移动企鹅之前，你需要能够选中一只企鹅。当你点击企鹅或海豹等动物时，会出现四个箭头，让你控制该动物的移动方向。为了显示这些箭头并处理输入，你可以添加一个名为\
  \ `AnimalSelector` 的类。动物选择器包含四个箭头，并继承自 `SKNode` 类。当你点击一只企鹅时，动物选择器会出现，它由四个箭头组成，每个箭头指向不同的方向（参见图\
  \ 20-1）。\n\n![A978-1-4842-0650-8_20_Fig1_HTML.jpg](img/A978-1-4842-0650-8_20_Fig1_HTML.jpg)\n\
  \n*图 20-1.* 点击企鹅后出现在其周围的动物选择器箭头\n\n这四个箭头每个都是 `Button` 类的实例。`AnimalSelector` 类的初始化器需要一个\
  \ `spacing` 参数，该参数控制每个箭头距离所选动物位置的距离。如果你为间距选择值 75，那么每个箭头都会被整齐地放置在网格上，因为网格单元格的宽度和高度都是\
  \ 75 点。\n\n由于选择器控制着特定的动物，你还必须跟踪它控制的是哪一只。因此，你还需要向 `AnimalSelector` 类添加一个名为 `selectedAnimal`\
  \ 的属性，该属性包含对目标动物的引用。在初始化器中，你根据间距的值定位四个箭头。最初，你假设尚未选中任何动物，因此动物选择器是隐藏的。以下是完整的 `AnimalSelector`\
  \ 初始化器：\n\n```\ninit(spacing: Int) {\n    super.init()\n    arrowRight.position\
  \ = CGPoint(x: spacing, y: 0)\n    arrowUp.position = CGPoint(x: 0, y: spacing)\n\
  \    arrowLeft.position = CGPoint(x: -spacing, y: 0)\n    arrowDown.position = CGPoint(x:\
  \ 0, y: -spacing)\n    self.addChild(arrowRight)\n    self.addChild(arrowUp)\n \
  \   self.addChild(arrowLeft)\n    self.addChild(arrowDown)\n    self.hidden = true\n\
  }\n```\n\n在 `handleInput` 方法中，你首先检查选择器是否可见。如果不可见，则无需处理输入：\n\n```\nif hidden {\n\
  \    return\n}\n```\n\n然后，你检查是否有箭头被点击。如果有，则计算所需的动物速度：\n\n```\nsuper.handleInput(inputHelper)\n\
  var animalVelocity = CGPoint.zeroPoint\nif arrowRight.tapped {\n    animalVelocity.x\
  \ = 1\n} else if arrowLeft.tapped {\n    animalVelocity.x = -1\n} else if arrowUp.tapped\
  \ {\n    animalVelocity.y = 1\n} else if arrowDown.tapped {\n    animalVelocity.y\
  \ = -1\n}\nanimalVelocity *= 500\n```\n\n请注意自定义运算符的使用，以及它如何定义为将一个点乘以一个常数。一旦你计算了所需的动物速度，就将其分配给所选动物的\
  \ `velocity` 属性：\n\n```\nselectedAnimal?.velocity = animalVelocity\n```\n\n最后，如果玩家点击了任何地方但未点击所选动物（例如，点击了另一只企鹅或屏幕的其他部分），则再次隐藏动物选择器，并将\
  \ `selectedAnimal` 属性设置为 nil：\n\n```\nif inputHelper.hasTapped && !inputHelper.containsTap(selectedAnimal!.box)\
  \ {\n    self.hidden = true\n    selectedAnimal = nil\n}\n```\n\n在 `Animal` 类的 `handleInput`\
  \ 方法中，你需要处理点击动物。然而，在某些情况下你无需处理，例如：\n\n- 动物不可见。\n- 动物在冰洞中。\n- 动物是鲨鱼。\n- 动物已经在移动。\n\
  \n在所有此类情况下，你都不执行任何操作，并直接返回该方法：\n\n```\nif hidden || boxed || isShark || velocity\
  \ != CGPoint.zeroPoint {\n    return\n}\n```\n\n如果玩家没有点击该动物，你也可以从该方法返回。因此，你添加以下\
  \ `if` 指令来验证这一点：\n\n```\nif !inputHelper.containsTap(box) {\n    return\n}\n```\n\
  \n现在，既然你知道玩家点击了这只动物，你应该将动物选择器分配给它。第一步是找到动物选择器游戏对象：\n\n```\nif let animalSelector\
  \ = childNodeWithName(\"//animalSelector\") as? AnimalSelector {\n    // 执行某些操作\n\
  }\n```\n\n传递给 `childNodeWithName` 方法的表达式由正则表达式部分（`//`）组成，该部分告诉方法在整个节点树中搜索，以及动物选择器对象的名称。一旦你找到了动物选择器，就可以使选择器可见、设置其位置，并将该动物指定为选择器的目标动物。但是，仅当玩家尚未点击动物选择器或者选择器处于隐藏状态时，才执行此操作。如果玩家点击了选择器，那么你首先要处理那次点击，以避免将选择器移动到另一只动物。这导致了以下指令：\n\
  \n```\nif !inputHelper.containsTap(animalSelector.box) || animalSelector.hidden\
  \ {\n    animalSelector.position = self.position\n    animalSelector.hidden = false\n\
  \    animalSelector.selectedAnimal = self\n}\n```\n\n如你所见，正确处理用户输入有时可能很复杂。你需要考虑玩家可能采取的所有操作，并恰当地处理输入。如果你做得不对，就有可能引入导致游戏崩溃（这很糟糕）或让玩家有机可乘（这更糟糕，尤其是在在线多人游戏中）的错误。\n\
  \n你刚刚编写的指令允许玩家随意选择动物，并指示它们向特定方向移动。现在，你需要处理动物、游戏场地和其他游戏对象之间的交互。\n\n\n#### 更新动物\n\n\
  动物与其他游戏对象的交互是在 `Animal` 类的 `updateDelta` 方法中完成的。之所以主要在 `Animal` 类中处理，是为了让每个动物自行处理其交互。如果你向游戏中添加多个动物（就像现在这样），则无需修改处理交互的代码。默认情况下，你会调用父类的\
  \ `updateDelta` 方法。虽然技术上并非必须，但这样做仍然是个好主意。如果将来你决定向 `Animal` 节点添加其他子节点，就能避免潜在的更新 bug。接着，通过将速度乘以经过的时间（使用新增的\
  \ `CGPoint` 运算符扩展！）来计算动物的新位置。如果动物不可见或速度为零，则无需进行其他操作。因此，`updateDelta` 方法中的起始代码如下：\n\
  \n```\nsuper.updateDelta(delta)\n\nposition += velocity * CGFloat(delta)\n\nif hidden\
  \ || velocity == CGPoint.zeroPoint {\n\nreturn\n\n}\n```\n\n现在，你需要检查动物是否与其他游戏对象发生碰撞。由于在\
  \ `updateDelta` 方法起始位置进行了检查，因此仅对可见且正在移动的动物执行此操作。\n\n如果动物正在移动，你需要知道它当前正移入哪个瓦片。然后，你就可以检查该瓦片的类型，以及该瓦片上是否有其他游戏对象。为此，你需要向\
  \ `Animal` 类添加一个名为 `currentBlock` 的属性。为了计算动物正移入的瓦片，你需要计算动物周围包围盒的边缘。如果动物向左移动，就取左边缘；向下移动，则取底边缘。以下代码包含了\
  \ `currentBlock` 属性的完整声明与实现：\n\n```\nvar currentBlock: (Int, Int) {\n    get {\n\
  \        var p = CGPoint()\n        if let tileField = childNodeWithName(\"//tileField\"\
  ) as? TileField {\n            var edgepos = position\n            if velocity.x\
  \ > 0 {\n                edgepos.x += CGFloat(tileField.layout.cellWidth) / 2\n\
  \            } else if velocity.x < 0 {\n                edgepos.x -= CGFloat(tileField.layout.cellWidth)\
  \ / 2\n            } else if velocity.y > 0 {\n                edgepos.y += CGFloat(tileField.layout.cellHeight)\
  \ / 2\n            } else if velocity.y < 0 {\n                edgepos.y -= CGFloat(tileField.layout.cellHeight)\
  \ / 2\n            }\n            return tileField.layout.gridLocation(edgepos)\n\
  \        }\n        return (-1, -1)\n    }\n}\n```\n\n下一步是找出动物正移入的瓦片类型。为此，你可以使用\
  \ `TileField` 类中的 `getTileType` 方法。该方法能根据给定的瓦片位置获取瓦片的类型。以下是完整的方法：\n\n```\nfunc getTileType(col:\
  \ Int, row: Int) -> TileType {\n    if let obj = layout.at(col, row: row) as? Tile\
  \ {\n        return obj.type\n    }\n    return .Background\n}\n```\n\n现在，你可以返回到\
  \ `Animal` 类的 `updateDelta` 方法中，检查动物是否从瓦片场中掉落。如果是，则隐藏该动物，并将其速度设为零，以确保动物在隐藏时不会无限期地继续移动：\n\
  \n```\nlet tileField = childNodeWithName(\"//tileField\") as! TileField\nlet (targetcol,\
  \ targetrow) = currentBlock\n\nif tileField.getTileType(targetcol, row: targetrow)\
  \ == .Background {\n    self.hidden = true\n    self.velocity = CGPoint.zeroPoint\n\
  }\n```\n\n另一种情况是动物撞上了一堵墙瓦片。如果是这种情况，它必须停止移动：\n\n```\nelse if tileField.getTileType(targetcol,\
  \ row: targetrow) == .Wall {\n    self.stopMoving()\n}\n```\n\n停止移动并不像听起来那么容易。你可以简单地将动物的速度设为零，但这样动物会有一部分停留在另一个瓦片中。你需要将动物放置在其刚刚离开的那个瓦片上。`stopMoving`\
  \ 方法正是用来实现这个功能的。在该方法中，首先需要计算出前一个瓦片的位置。你可以从动物当前正移入的瓦片的 x 和 y 索引入手。这些索引作为参数传入。例如，如果动物的速度向量是\
  \ (500, 0)（向右移动），则需要将 x 索引减去 1，以得到动物移出瓦片的 x 索引。如果动物的速度向量是 (0, -500)（向上移动），则需要将 y\
  \ 索引加上 1，以得到动物移出瓦片的 y 索引。你可以通过归一化速度向量，然后将其从 x 和 y 索引中减去来实现这一点。这是可行的，因为归一化向量会得到一个长度为\
  \ 1 的向量（单位向量）。由于动物只能沿 x 或 y 方向移动，不能斜向移动，因此第一个例子得到的向量是 (1, 0)，第二个例子是 (0, -1)。所以，你可以将动物的位置设置为其刚刚离开的瓦片位置，如下所示：\n\
  \n```\nlet tileField = childNodeWithName(\"//tileField\") as! TileField\nvelocity\
  \ = CGPoint.normalize(velocity)\nlet (currcol, currrow) = currentBlock\nposition\
  \ = tileField.layout.toPosition(currcol - Int(velocity.x),\nrow: currrow - Int(velocity.y))\n\
  ```\n\n最后，将动物的速度设为零，使其保持在新位置：\n\n```\nvelocity = CGPoint.zeroPoint\n```\n\n\n好的，作为一名高级文档工程师和翻译员，我将严格遵循您提供的格式和注意事项，将给定的英文文本翻译成中文。\n\
  \n\n## 与其他游戏对象相遇\n\n你还需要检查动物是否与另一个游戏对象（例如另一只企鹅或鲨鱼）发生碰撞。这里有一些特殊类型的动物：\n\n-   彩色企鹅\n\
  -   空箱子\n-   海豹\n-   鲨鱼\n\n你可以在 `Animal` 类中添加一些方法来判断是否正在处理这些特殊情况。例如，如果类型是 “s”，则表示你正在处理一只海豹：\n\
  \n```\nvar isSeal: Bool {\n    get {\n        return type == \"s\" && !boxed\n \
  \   }\n}\n```\n\n如果类型是 “@” 并且它被装箱（boxed），则表示你正在处理一个空箱子：\n\n```\nvar isEmptyBox:\
  \ Bool {\n    get {\n        return type == \"@\" && boxed\n    }\n}\n```\n\n`Animal`\
  \ 类还包含其他一些有助于确定动物类型的属性。请查看 `PenguinPairs5` 示例程序。\n\n首先，你需要检查动物正在移动到的格子上是否有另一只动物。为此，你需要获取关卡，并使用\
  \ `LevelState` 类中的 `findAnimalAtPosition` 方法来检查是否存在另一只动物：\n\n```\nlet lvl = GameStateManager.instance.currentGameState\
  \ as? LevelState\n\nif let a = lvl?.findAnimalAtPosition(targetcol, row: targetrow)\
  \ {\n    // 处理动物交互\n}\n```\n\n`findAnimalAtPosition` 方法很直接；请查看本章示例代码中的这个方法。首先，如果另一只动物不可见，则无需执行任何操作，可以直接从该方法返回：\n\
  \n```\nif a.hidden {\n    return\n}\n```\n\n你要处理的第一个情况是企鹅与海豹发生碰撞。在这种情况下，企鹅无需执行任何操作——它只需停止移动：\n\
  \n```\nif a.isSeal {\n    stopMoving()\n}\n```\n\n下一个情况是动物与空箱子发生碰撞。如果是这种情况，你将移动中的动物设为不可见，然后通过将空箱子的类型更改为移动动物的装箱版本（由该动物类型字符的大写形式表示）来将动物移动到箱子内部：\n\
  \n```\nelse if a.isEmptyBox {\n    self.hidden = true\n    a.changeTypeTo(self.type.uppercaseString)\n\
  }\n```\n\n`changeTypeTo` 是一个辅助方法，它改变动物的类型并相应地更新纹理。以下是完整的方法；它看起来与类初始化器中使用的代码非常相似：\n\
  \n```\nfunc changeTypeTo(type: String) {\n    boxed = type.uppercaseString == type\n\
  \    var spriteName = \"spr_animal_\\(type)\"\n    if boxed && type != \"@\" {\n\
  \        spriteName = \"spr_animal_boxed_\\(type.lowercaseString)\"\n    }\n   \
  \ texture = SKTexture(imageNamed: spriteName)\n    self.type = type\n}\n```\n\n\
  如果动物 `a` 的类型与这只动物的类型相同，或者其中一只是彩色企鹅，那么你找到了一对有效的企鹅，并将这两只企鹅都设为不可见：\n\n```\nelse if\
  \ type.lowercaseString == a.type.lowercaseString || self.isMulticolor || a.isMulticolor\
  \ {\n    a.hidden = true\n    self.hidden = true\n}\n```\n\n你还需要在屏幕左上角显示额外的一对，但我们将在下一节中处理这个问题。\n\
  \n如果一只企鹅遇到鲨鱼，企鹅会被吃掉，而鲨鱼则挺着饱饱的肚子离开游戏场地。在游戏中，这意味着企鹅停止移动（永久地），并且鲨鱼和企鹅都变为不可见。以下代码实现了这一点：\n\
  \n```\nelse if a.isShark {\n    a.hidden = true\n    self.hidden = true\n    stopMoving()\n\
  }\n```\n\n最后，在其他所有情况下，企鹅都只是停止移动：\n\n```\nelse {\n    self.stopMoving()\n}\n```\n\
  \n## 维护配对数\n\n为了维护配对数并在屏幕上美观地绘制它们，你在游戏中添加了另一个名为 `PairList` 的类。`PairList` 类继承自 `SKNode`\
  \ 类。配对列表绘制在一个框架之上，该框架在 `LevelState` 构造函数中被添加到关卡中：\n\n```\nlet goalFrame = SKSpriteNode(imageNamed:\
  \ \"spr_frame_goal\")\ngoalFrame.zPosition = Layer.Overlay\ngoalFrame.position =\
  \ GameScreen.instance.topLeft + CGPoint(x: 10 + goalFrame.center.x, y: -40)\nself.addChild(goalFrame)\n\
  ```\n\n配对列表显示一行精灵，指示已完成和所需配对的数量。因为你想要指示每个配对的颜色，所以你将此信息作为字符串值存储在一个数组中，每个字符串代表一个配对类型。这个数组是\
  \ `PairList` 类的一个属性：\n\n```\nvar colors: [String] = []\n```\n\n你向 `PairList` 类的初始化器传递一个参数\
  \ `nrPairs`，以便知道数组应该有多大。然后你填充数组，使每个元素都设置为空槽位（由精灵 “spr_pairs_e” 表示）：\n\n```\nfor\
  \ var i = 0; i < nrPairs; i++ {\n    let pairSprite = SKSpriteNode(imageNamed: \"\
  spr_pairs_e\")\n    pairSprite.position = CGPoint(x: CGFloat(i) * (pairSprite.size.width\
  \ + 5), y: 0)\n    self.addChild(pairSprite)\n    colors.append(\"e\")\n}\n```\n\
  \n你还向该类添加了一个名为 `addPair` 的方法，该方法在数组中查找第一个出现的空配对（类型 “e”），并将其替换为作为参数传入的配对类型：\n\n```\n\
  func addPair(color: String) {\n    for var i = 0; i < colors.count; i++ {\n    \
  \    if colors[i] == \"e\" {\n            let sprite = children[i] as! SKSpriteNode\n\
  \            sprite.texture = SKTexture(imageNamed: \"spr_pairs_\\(color)\")\n \
  \           colors[i] = color\n            return\n        }\n    }\n}\n```\n\n\
  此示例使用 `for` 指令来递增 `i` 变量，直到找到一个空位（即 `colors` 数组中的元素等于 “e”）。\n\n现在你添加一个有用的属性来检查玩家是否已经完成了关卡。如果配对颜色列表不再包含任何\
  \ “e” 值（意味着所有空位都已被配对替换），则关卡完成：\n\n```\nvar completed: Bool {\n    get {\n      \
  \  for color in colors {\n            if color == \"e\" {\n                return\
  \ false\n            }\n        }\n        return true\n    }\n}\n```\n\n现在你有了 `PairList`\
  \ 类，你可以在 `LevelState` 类中创建它的一个实例，将其添加到游戏世界中，并将其定位在屏幕的左上角附近：\n\n```\nlet pairList\
  \ = PairList(nrPairs: nrPairs)\npairList.name = \"pairList\"\npairList.zPosition\
  \ = Layer.Overlay1\npairList.position = GameScreen.instance.topLeft + CGPoint(x:\
  \ 130, y: -40)\nself.addChild(pairList)\n```\n\n在 `Animal` 类中，如果一只动物遇到另一只相同颜色的企鹅，或者两只动物中的一只是彩色企鹅，你就向列表中添加一个配对：\n\
  \n```\nelse if type.lowercaseString == a.type.lowercaseString || self.isMulticolor\n\
  \    || a.isMulticolor {\n    a.hidden = true\n    self.hidden = true\n    let pairList\
  \ = childNodeWithName(\"//pairList\") as! PairList\n    pairList.addPair(type)\n\
  }\n```\n\n完整的示例请参见本章附带的 `PenguinPairs5` 程序。图 20-2 显示了一个需要完成五对企鹅的关卡截图。在下一章中，你将向企鹅配对游戏添加最后的润色，例如在关卡完成时显示一个覆盖层，以及显示一个提示箭头。\n\
  \n![A978-1-4842-0650-8_20_Fig2_HTML.jpg](img/A978-1-4842-0650-8_20_Fig2_HTML.jpg)\n\
  \n**图 20-2.** 企鹅配对游戏的一个关卡。目标是组成五对黄色企鹅\n\n## 你学到了什么\n\n在本章中，你学到了以下内容：\n\n-   如何为\
  \ `CGPoint` 等类型定义运算符行为\n-   如何编程实现游戏对象选择器\n-   如何对不同类型游戏对象之间的交互进行建模\n-   如何维护玩家已完成的配对数\n\
  \n\n\n"
- "# 21. 完成企鹅配对游戏\n\n电子补充材料 本章的在线版本 (doi:[10.​1007/​978-1-4842-0650-8_​21](http://dx.doi.org/10.1007/978-1-4842-0650-8_21))\
  \ 包含补充材料，仅供授权用户使用。\n\n在本章中，你将完成企鹅配对游戏。首先，你将通过添加一个提示箭头和一个帮助覆盖层来完成用户界面，该覆盖层会在玩家开始每个关卡时显示几秒钟。然后，你将学习如何重置并进入下一关。最后，你将通过添加音效来完善游戏。\n\
  \n## 显示提示\n\n为了完成企鹅配对游戏，还需要添加几个功能。第一步，你需要能够在用户点击按钮时显示提示。提示由一个橙色箭头组成，该箭头会显示一秒钟。当你在\
  \ `LevelState` 初始化器中加载关卡时，你会从文本文件中读取提示位置和方向。然后，你创建一个 `SKSpriteNode` 实例，为其分配正确的精灵，并根据文本文件中的信息将其定位，如下所示：\n\
  \n```\nlet hintx = hintArr[0].toInt()!, hinty = hintArr[1].toInt()!\nhint = SKSpriteNode(imageNamed:\
  \ \"spr_arrow_hint_\\(hintArr[2])\")\nhint.zPosition = Layer.Scene2\nhint.position\
  \ = tileField.layout.toPosition(hintx, row: hinty)\nhint.hidden = true\nself.addChild(hint)\n\
  ```\n\n最初，提示箭头是隐藏的。为了在玩家点击提示按钮时临时显示箭头，你创建了一个存储为属性的动作：\n\n```\nlet hintVisibleAction\
  \ = SKAction.sequence([SKAction.unhide(),\n    SKAction.waitForDuration(1), SKAction.hide()])\n\
  ```\n\n最后，你扩展 `LevelState` 的 `handleInput` 方法以处理提示按钮被按下的事件：\n\n```\nif hintButton.tapped\
  \ {\n    hint.runAction(hintVisibleAction)\n}\n```\n\n提示按钮只有在可见时才能被按下，但在某些情况下它不应该可见，例如：\n\
  \n*   在玩家做出第一步移动后，提示按钮应该消失，重试按钮应该出现。\n*   如果玩家在选项菜单中选择了关闭提示，那么提示按钮应始终不可见。\n\n对于第一种情况，你需要跟踪玩家何时做出了第一步移动。你在\
  \ `LevelState` 类中添加一个额外的属性 `firstMoveMade`。当你赋予动物速度时，这是在 `AnimalSelector` 类中完成的。一旦玩家点击了箭头并且动物开始移动，你就调用属于\
  \ `LevelState` 的 `applyFirstMoveMade` 方法：\n\n```\nlet lvl = GameStateManager.instance.currentGameState\
  \ as? LevelState\nif animalVelocity != CGPoint.zeroPoint {\n    lvl?.applyFirstMoveMade()\n\
  }\n```\n\n`applyFirstMoveMade` 方法会隐藏提示按钮，取消隐藏重试按钮，并将 `firstMoveMade` 属性设置为 `true`：\n\
  \n```\nfunc applyFirstMoveMade() {\n    self.hintButton.hidden = true\n    self.retryButton.hidden\
  \ = false\n    firstMoveMade = true\n}\n```\n\n在 `LevelState` 的 `updateDelta` 方法中，你确保只在玩家尚未做出第一步移动时才改变提示按钮和重试按钮的可见性：\n\
  \n```\nif !firstMoveMade {\n    self.hintButton.hidden = !DefaultsManager.instance.hints\n\
  \    self.retryButton.hidden = DefaultsManager.instance.hints\n}\n```\n\n从 `if`\
  \ 指令中的两行代码可以看出，提示按钮仅在 `DefaultsManager.instance.hints` 为 `false` 时才隐藏。重试按钮的隐藏状态始终与提示按钮的隐藏状态相反。因此，如果提示按钮可见，则重试按钮不可见，反之亦然。图\
  \ 21-1 展示了提示箭头实际运行时的截图。\n\n![A978-1-4842-0650-8_21_Fig1_HTML.jpg](img/A978-1-4842-0650-8_21_Fig1_HTML.jpg)\n\
  \n图 21-1.\n\n提示箭头向玩家展示第一步合理的移动。嗯……这确实很有帮助！\n\n## 显示帮助框\n\n当玩家开始玩某个关卡时，向他/她展示一些有用的信息也很有用。让我们使用自定义字体来显示帮助文本。你可以使用与图坦卡蒙之墓游戏中相同的过程，在项目中加载自定义字体（更多信息请参见第\
  \ 16 章）。第一步是在 `LevelState` 初始化器中添加一个帮助框：\n\n```\nhelpFrame.position = CGPoint(x:\
  \ 0, y: GameScreen.instance.bottom + helpFrame.center.y + 10)\nhelpFrame.zPosition\
  \ = Layer.Overlay\nself.addChild(helpFrame)\n```\n\n帮助框位于屏幕底部中央。在其上方，你显示一个文本标签：\n\
  \n```\nlet textLabel = SKLabelNode(fontNamed: \"Autodestruct BB\")\ntextLabel.fontColor\
  \ = UIColor(red: 0, green: 0, blue: 0.4, alpha: 1)\ntextLabel.fontSize = 24\ntextLabel.text\
  \ = help\ntextLabel.horizontalAlignmentMode = .Center\ntextLabel.verticalAlignmentMode\
  \ = .Center\ntextLabel.zPosition = 1\nhelpFrame.addChild(textLabel)\n```\n\n文本标签是帮助框的子节点。为了确保它显示在帮助框之上，你将其相对\
  \ z 位置设置为 1。现在，每当关卡被重置时，你添加一个动作，使帮助框显示 5 秒钟：\n\n```\nhelpFrame.runAction(SKAction.sequence([SKAction.unhide(),\n\
  \    SKAction.waitForDuration(5), SKAction.hide()]))\n```\n\n如果你查看本章附带的 `PenguinPairsFinal`\
  \ 示例，你会发现现在整个游戏都使用了相同的自定义字体，例如在关卡按钮上显示关卡索引（见图 21-2）。你可以清楚地看到，使用自定义字体使游戏看起来更专业。\n\
  \n![A978-1-4842-0650-8_21_Fig2_HTML.jpg](img/A978-1-4842-0650-8_21_Fig2_HTML.jpg)\n\
  \n图 21-2.\n\n使用自定义字体的关卡菜单\n\n## 重置关卡\n\n在玩家移动了几只动物之后，关卡可能会变得无法解决。与其让玩家退出并重新开始游戏，不如让玩家有一种方法可以将关卡重置为初始状态。\n\
  \n得益于在游戏对象类中各处对 `reset` 方法的正确实现，将关卡重置为初始状态非常容易。你需要在所有游戏对象上调用 `reset` 方法，然后在 `LevelState`\
  \ 类本身中处理重置事宜。你唯一需要做的就是将 `firstMoveMade` 属性设置为 `false`，以便玩家可以再次查看提示，并运行帮助框动作：\n\n\
  ```\noverride func reset() {\n    super.reset()\n    firstMoveMade = false\n   \
  \ helpFrame.runAction(SKAction.sequence([SKAction.unhide(),\n        SKAction.waitForDuration(5),\
  \ SKAction.hide()]))\n}\n```\n\n注意\n\n有多种方法可以扩展企鹅配对游戏。例如，你能编写代码来判断一个关卡是否仍然可以解决吗？如果发生这种情况，你可以通过向用户显示一条消息来扩展游戏。你可能自己对如何改进游戏有想法。欢迎通过修改和添加示例来尝试实现它们。\n\
  \n\n\n### 进入下一关\n\n当玩家完成一个关卡时（太棒了！），你需要显示一个鼓励性的覆盖层（见图 21-3）。当玩家点击或轻触屏幕时，下一关便会呈现。该覆盖层作为属性添加到\
  \ `LevelState` 类中，并在其初始化器中默认设置为隐藏：\n\n![A978-1-4842-0650-8_21_Fig3_HTML.jpg](img/A978-1-4842-0650-8_21_Fig3_HTML.jpg)\n\
  \n图 21-3. 玩家完成关卡后显示的覆盖层\n\n`var levelFinishedOverlay = SKSpriteNode(imageNamed:\
  \ \"spr_level_finished\")`\n\n在 `LevelState` 的 `updateDelta` 方法中，你需要检查配对列表是否已完成，如果已完成，则显示关卡完成覆盖层并播放音效：\n\
  \n```\nif levelFinishedOverlay.hidden && pairList.completed {\n    levelFinishedOverlay.hidden\
  \ = false\n    wonSound.play()\n}\n```\n\n在 `LevelState` 的 `handleInput` 方法中，你需要检查玩家是否仍在游玩，或者是否已通关。如果是后者，你需要检查玩家是否点击了屏幕。如果是，则进入下一关。进入下一关并不复杂，但涉及使用\
  \ `DefaultManager` 类更新每个关卡的状态、查找下一关是什么，然后切换到该状态。以下是完整代码：\n\n```\nif !levelFinishedOverlay.hidden\
  \ {\n    if !inputHelper.containsTap(levelFinishedOverlay.box) {\n        return\n\
  \    }\n    self.reset()\n    DefaultsManager.instance.setLevelStatus(self.levelNr,\
  \ status: \"solved\")\n    if GameStateManager.instance.has(\"level\\(levelNr+1)\"\
  ) {\n        if DefaultsManager.instance.getLevelStatus(self.levelNr+1) == \"locked\"\
  \ {\n            DefaultsManager.instance.setLevelStatus(self.levelNr+1, status:\
  \ \"unsolved\")\n        }\n        GameStateManager.instance.switchTo(\"level\\\
  (levelNr+1)\")\n        GameStateManager.instance.reset()\n    } else {\n      \
  \  GameStateManager.instance.switchTo(\"level\")\n    }\n}\n```\n\n请参阅 `PenguinPairsFinal`\
  \ 示例，了解完整的 `LevelState` 类。\n\n## 新手教程\n\n你可能已经注意到，企鹅配对游戏的前几关也起到了新手教程的作用，向玩家解释游戏规则。在制作游戏时，玩家必须学会如何游玩。如果你不告诉玩家挑战目标以及控制方式，他们可能会感到沮丧而放弃游戏。\n\
  \n有些游戏提供了详尽的帮助文件，用长篇大论说明故事背景和操作方式。但玩家已不再愿意阅读这类文档或长文本界面。他们希望直接投入游戏。你需要在玩家游玩的过程中指导他们。\n\
  \n你可以创建几个特定的教程关卡，让玩家在不严重影响游戏进程的情况下练习操作。这种方式对休闲玩家来说是一种很好的游戏入门引导。而资深玩家则更倾向于直接进入核心玩法。注意不要在教程关卡中解释所有内容——只说明基本操作即可。更高级的操作可以在游戏中需要时再通过简单弹出消息或\
  \ HUD 上的显眼位置来解释。\n\n教程若能与游戏故事自然融合，效果最佳。例如，游戏角色可以在其安全的家乡小镇中奔跑，学习基本移动操作；接着与几个朋友练习战斗；然后玩家进入森林尝试用弓箭射击小鸟。这将为后续游戏中的战斗提供必要的练习。\n\
  \n请确保教程关卡有效，并且玩家即使几天不玩游戏也能记住操作方式。否则，他们可能永远不会再回到这个游戏。\n\n## 添加音效\n\n为完成游戏，你需要在适当的位置添加音效和音乐。你可能还记得，选项菜单中的选择之一就是更改背景音量。你可以使用以下代码行来实现：\n\
  \n`backgroundMusic.volume = Float(musicSlider.value)`\n\n在 `OptionMenuState` 类中，你可以找到\
  \ `backgroundMusic` 属性以及开始播放音乐的代码：\n\n```\nbackgroundMusic.looping = true\nbackgroundMusic.play()\n\
  ```\n\n同样地，你可以在合适的时机播放音效，就像在《图坦卡蒙之墓》和《画家》游戏中做的那样。例如，每当一对企鹅配对成功时，就会播放音效（参见 `Animal`\
  \ 类的 `updateDelta` 方法）：\n\n`pairSound.play()`\n\n如果你查看本章配套的 `PenguinPairsFinal`\
  \ 示例，就能了解完整游戏的工作方式以及音效在何处播放。当然，你也可以亲自试玩这个游戏。\n\n## 团队协作\n\n第一代游戏是由程序员创造的。他们包揽了所有工作：设计游戏机制、创作美术（当时仅由几个像素组成），并用汇编语言编写游戏代码。所有工作都聚焦于编程本身，游戏机制也常常被调整为适合高效编程的形式。\n\
  \n但随着内存容量的提升，这种情况逐渐改变。用有限的像素和颜色创作出精美外观的对象成为一门艺术，像素艺术家开始在游戏开发中发挥重要作用。早期没有绘图程序（当时的计算机都不够强大），像素角色是在方格纸上设计，再转换成十六进制数字嵌入游戏代码中。\n\
  \n随着计算机性能提升以及 CD-ROM 等存储介质的出现，美术变得日益重要，艺术家也随之发展。3D 图形和动画变得普遍，催生了能够运用新工具和技术的专门人才。如今，艺术家在游戏制作团队中占据了大多数。\n\
  \n在某个阶段，游戏设计成为了一项独立工作。游戏机制会根据用户群体的兴趣进行调整，并越来越多地基于心理学和教育科学的原理。这需要专门的专长。故事剧情占据了关键地位，由此引入了编剧。团队还扩展至包括制作人、音响工程师、作曲家等众多角色。如今，顶级游戏的团队可能由数百人组成。但如果没有程序员，一切将无法运作。\n\
  \n## 最后几点提示\n\n在本书的这一部分，你创建了一个比之前《图坦卡蒙之墓》复杂得多的游戏。你可能已经注意到，类的数量变得相当庞大，并且你越来越依赖某种游戏软件设计模式。例如，你将游戏对象放置在网格布局中，并使用类来处理游戏状态。在更基础的层面上，你假设游戏对象负责处理自身输入和更新。你可能不同意这些设计选择中的某些（或全部）。也许读到此处，你已经形成了自己关于游戏软件应该如何设计的想法。这是件好事。我在本书中提出的设计并非唯一的实现方式。设计总是可以被评估和改进，甚至被完全抛弃，用全新的方案取而代之。因此，请毫不犹豫地批判性地审视我提出的设计，并尝试其他方案。通过尝试不同的方法来解决问题，你能更好地理解问题本身，并因此成为一名更优秀的软件开发者。\n\
  \n## 本章要点\n\n在本章中，你学习了以下内容：\n\n*   如何在屏幕上显示提示箭头和帮助框架\n*   如何将关卡重置到初始状态，并处理进入下一关\n\
  \n\n"
- "# 第五部分  \n滴答炸弹  \n\n前几章展示了如何构建几种不同类型的游戏。在这一部分，你将构建一个包含动画角色、物理效果以及不同关卡的平台游戏。游戏名为《滴答炸弹》（见图\
  \ V-1），故事围绕一颗略显焦虑、将在数秒后爆炸的炸弹展开。玩家必须在炸弹爆炸前完成每一关。如果玩家收集了所有清凉的水滴并及时到达终点面板，则该关卡通关。 \
  \ \n\n![A978-1-4842-0650-8_5_Part_BookFrontmatter_Fig1_HTML.jpg](img/A978-1-4842-0650-8_5_Part_BookFrontmatter_Fig1_HTML.jpg)\
  \  \n\n**图 V-1.** 《滴答炸弹》游戏  \n\n这款平台游戏包含了许多其他游戏中也常见的基本元素：  \n\n- 应能游玩不同的关卡。  \n\
  - 这些关卡应从单独的文件中加载，以便在无需了解游戏代码工作原理的情况下进行修改。  \n- 游戏应支持玩家和敌人的动画角色。  \n- 玩家应能控制一个可奔跑或跳跃的角色进行行动。\
  \  \n- 游戏中应具备一些基本的物理效果，以处理下落、物体碰撞、在平台上跳跃等情况。  \n\n这个列表可不短！幸运的是，你可以复用许多已经开发好的类。接下来的章节将逐一审视列表中的各项内容。如果你想游玩《滴答炸弹》的完整版，请运行属于第\
  \ 27 章的示例程序。  \n\n"
- "# 22. 主要游戏结构  \n\n电子补充材料 本章的在线版本（doi:[10.1007/978-1-4842-0650-8_22](http://dx.doi.org/10.1007/978-1-4842-0650-8_22)）包含补充材料，可供授权用户使用。\
  \  \n\n在本章中，你将搭建《滴答炸弹》游戏的框架。由于之前游戏开发所做的大量工作，你可以依赖很多已有的类。这意味着你已经拥有了处理游戏状态和设置的基本设计、游戏对象的层次结构等等。需要注意的是，《滴答炸弹》游戏并非为在非常小的设备（如旧款\
  \ iPhone 或 iPhone 6 Plus）上运行而设计（对于后者，你至少需要 3 倍分辨率的图像）。如果在旧款 iPhone 上运行该游戏，游戏世界的很大一部分将被裁剪。在\
  \ iPhone 6 Plus 上，游戏可玩，但边缘会出现一些黑边。  \n\n## 游戏结构概览  \n\n本游戏的结构与《企鹅配对》游戏非常相似。游戏有一个标题画面，玩家可以由此进入关卡选择菜单或帮助页面（见图\
  \ 22-1）。为了保持简单，你不会实现选项页面，尽管添加它会很简单，因为你可以使用与《企鹅配对》相同的方法。由于菜单结构非常相似，此处不再赘述。你可以在属于本章的`TickTick1`示例中看到代码。\
  \  \n\n![A978-1-4842-0650-8_22_Fig1_HTML.jpg](img/A978-1-4842-0650-8_22_Fig1_HTML.jpg)\
  \  \n\n**图 22-1.** 《滴答炸弹》游戏的标题画面  \n\n`LevelState`类用于表示关卡，并负责维护关卡状态（锁定/未解决/已解决），与《企鹅配对》游戏中的方式相同。每个关卡都是一个基于瓦片的游戏世界，再次与《企鹅配对》的结构非常相似。\
  \  \n\n## 关卡的结构  \n\n首先，让我们看看《滴答炸弹》的一个关卡中可以包含哪些内容。首先，有一个背景图像。目前，你只需显示一个简单的背景精灵；无需在关卡数据变量中存储任何相关信息。此外，还有不同类型的可供玩家跳跃的方块，以及水滴、敌人、玩家起始位置和玩家必须到达的终点位置。与《企鹅配对》游戏一样，你将关卡信息存储在一个文本文件中，该文件在游戏启动时被读取。\
  \  \n\n你使用瓦片来定义关卡，每个瓦片都有特定的类型（墙壁、背景等）。然后，你在文本文件中用一个字符表示每个瓦片类型。就像在《企鹅配对》游戏中一样，你在一个对应于游戏区域的二维空间中，以文本形式布局关卡。除了实际的瓦片，你还将提示信息与关卡定义存储在一起。下面你可以看到文本文件中第一个关卡的定义：\
  \  \n\n```\n捡起所有水滴，及时到达出口。\n\n20 15\n\n60\n\n....................\n.................X..\n\
  ..........##########\n....................\nWWW....WWWW.........\n---....####.........\n\
  ....................\nWWW.................\n###.........WWWWW...\n............#####...\n\
  ....WWW.............\n....###.............\n....................\n.1........W.W.W.W.W.\n\
  ####################\n```\n\n这个关卡定义定义了许多不同的瓦片和对象。例如，墙壁瓦片由`#`符号定义，水滴由`W`字符定义，玩家起始位置由`1`字符定义。如果某个特定位置没有瓦片，则使用`.`字符。对于这个平台游戏，你需要不同类型的瓦片：一个供玩家站立或碰撞的墙壁瓦片，以及一个表示该位置没有方块的背景/透明瓦片。你还需要定义一个平台瓦片。这种瓦片具有这样的特性：玩家可以像站在墙壁瓦片上一样站在它上面，但如果玩家站在它下面，他们可以从下方跳跃穿过它。这种瓦片在许多经典平台游戏中都有使用，不在这里包含它未免太可惜了！在文本文件中，平台瓦片由`-`字符表示。表\
  \ 22-1 给出了《滴答炸弹》游戏中不同瓦片的完整列表。  \n\n**表 22-1.** 《滴答炸弹》游戏中不同类型瓦片概览  \n\n| 字符 | 瓦片描述\
  \ |  \n| --- | --- |  \n| `.` | 背景瓦片 |  \n| `#` | 墙壁瓦片 |  \n| `^` | 墙壁瓦片（炽热） | \
  \ \n| `*` | 墙壁瓦片（冰面） |  \n| `-` | 平台瓦片 |  \n| `+` | 平台瓦片（炽热） |  \n| `@` | 平台瓦片（冰面）\
  \ |  \n| `X` | 终点瓦片 |  \n| `W` | 水滴 |  \n| `1` | 起始瓦片（玩家初始位置） |  \n| `R` | 火箭敌人（向左移动）\
  \ |  \n| `R` | 火箭敌人（向右移动） |  \n| `S` | 火花敌人 |  \n| `T` | 乌龟敌人 |  \n| `A` | 火焰敌人（随机速度和方向变化）\
  \ |  \n| `B` | 火焰敌人（追踪玩家） |  \n| `C` | 火焰敌人（巡逻） |\n\n\n好的，作为高级文档工程师和翻译员，我将严格按照您的要求，将给定的英文文本翻译成中文。\n\
  \n\n### 水滴\n\n每个关卡的目标是收集所有的水滴。每个水滴都由一个 `WaterDrop` 类的实例表示。这个类是 `SKSpriteNode` 的子类，但你需要为它添加一点行为：水滴应该上下弹跳。你可以在\
  \ `updateDelta` 方法中实现这一点。首先，你计算一个可以添加到水滴当前位置的弹跳偏移量。这个弹跳偏移量存储在属性 `bounce` 中，初始值为\
  \ 0。你还维护了已经过去的总游戏时间，如下所示：\n\n```\nvar bounce: CGFloat = 0\nvar totalTime: CGFloat\
  \ = 0\n```\n\n为了在每个游戏循环迭代中计算弹跳偏移量，你使用了一个正弦函数。并且根据水滴的 x 坐标，你改变正弦函数的相位，这样所有的水滴就不会同时向上或向下移动：\n\
  \n```\ntotalTime += CGFloat(delta)\nvar t = totalTime + position.x\nself.bounce\
  \ = sin(t*5) * 5\n```\n\n你从水滴的 y 坐标中减去弹跳值：\n\n```\nposition.y -= self.bounce\n```\n\
  \n`-=` 运算符从 y 坐标中减去弹跳值（关于这类运算符的更多信息，请参见第 5 章）。然而，简单地从 y 坐标中减去弹跳值并不正确，因为这是一个弹跳偏移量——换句话说，是相对于原始\
  \ y 坐标的偏移量。为了得到原始的 y 坐标，你在 `updateDelta` 方法的第一条指令中，将弹跳偏移量加回到 y 坐标上：\n\n```\nposition.y\
  \ += self.bounce\n```\n\n这样做是可行的，因为此时 `bounce` 变量仍然包含上一个游戏循环迭代中的弹跳偏移量。所以，将它加到 y\
  \ 坐标上就得到了原始的 y 坐标。\n\n在接下来的几章中，你会添加更多的游戏对象，例如玩家和各种各样的敌人。但让我们先来看看如何在像 Tick Tick 这样的平台游戏中定义瓦片。\n\
  \n### 瓦片类\n\n`Tile` 类与 Penguin Pairs 中使用的类非常相似，但有一些不同之处。首先，你使用枚举类型定义了不同种类的瓦片：\n\n\
  ```\nenum TileType {\n    case Wall\n    case Background\n    case Platform\n}\n\
  ```\n\n然后，在 `Tile` 类中，你定义了一个属性 `tileType` 来存储实例所代表的瓦片类型。除了这些基本的瓦片类型之外，你还有冰瓦片和热瓦片，它们是普通瓦片或平台瓦片的特殊版本。在文本文件中，冰瓦片用\
  \ `*` 字符表示（如果是平台瓦片则为 `@` 字符），热瓦片用 `^` 字符表示（如果是平台版本则为 `+` 字符）。你向 `Tile` 类添加了两个布尔属性来表示这些不同种类的瓦片。以下是\
  \ `Tile` 的初始化方法：\n\n```\nconvenience init() {\n    self.init(imageNamed: \"spr_wall\"\
  , type: .Background)\n}\n\ninit(imageNamed: String, type: TileType) {\n    let texture\
  \ = SKTexture(imageNamed: imageNamed)\n    super.init(texture: texture, color: UIColor.whiteColor(),\
  \ size: texture.size())\n    self.type = type\n}\n\nrequired init?(coder aDecoder:\
  \ NSCoder) {\n    fatalError(\"init(coder:) has not been implemented\")\n}\n```\n\
  \n如你所见，有一个便捷初始化方法允许你创建一个 `Background` 类型的 `Tile` 实例。这使得创建 `Tile` 实例更容易，因为你无需提供任何参数值。例如，以下指令创建了一个简单的背景（透明）瓦片：\n\
  \n```\nvar myTile = Tile()\n```\n\n在 `Tile` 的初始化方法中，你使用了 `type` 属性来设置和获取瓦片的类型。在\
  \ `type` 属性的设置部分，你将一个新值赋给 `tp` 属性，并使用布尔逻辑，如果是背景瓦片则将其隐藏。以下是实现这一点的两行代码（完整的 `Tile`\
  \ 类，请参见 TickTick1 示例）：\n\n```\ntileType = newValue\nself.hidden = tileType == .Background\n\
  ```\n\n现在，让我们看看 `LevelState` 类以及 `Tile` 实例是如何创建的。\n\n### LevelState 类\n\n本节展示了在\
  \ Tick Tick 中如何设计 `LevelState` 类。它的实现方式与 Penguin Pairs 非常相似。在 `LevelState` 类的初始化方法中，你做了几件事：\n\
  \n-   创建背景精灵游戏对象。\n-   添加一个“退出”按钮。\n-   根据关卡数据创建基于瓦片的游戏世界。\n\n前两件事很直接。请查看示例代码中的\
  \ `LevelState` 类，了解它们是如何工作的。创建基于瓦片的游戏世界是通过一个名为 `loadTile` 的独立方法来完成的。根据从文本文件中读取的瓦片字符，将创建不同的\
  \ `Tile` 对象。第一步是创建一个 `TileField` 实例，其高度和宽度取自文本文件：\n\n```\ntileField = TileField(rows:\
  \ height, columns: width, cellWidth: 72, cellHeight: 55)\ntileField.name = \"tileField\"\
  \nworld.addChild(tileField)\n```\n\n如你所见，瓦片字段被添加到一个名为 `world` 的独立节点中，而“退出”按钮则直接添加到关卡节点：\n\
  \n```\nquitButton.zPosition = Layer.Overlay\nquitButton.position = GameScreen.instance.topRight\
  \ - quitButton.center - CGPoint(x: 10, y: 10)\nself.addChild(quitButton)\n```\n\n\
  这样做是有原因的。你想将诸如“退出”按钮或帮助框架之类的覆盖层与实际基于瓦片的游戏世界分开，因为稍后你将为这个平台游戏添加侧向滚动。这意味着游戏世界需要在屏幕上移动，而按钮则应保持在原位。只有当实际游戏世界存储在一个独立的节点中时，才能实现这一点。然后，你可以更改该节点的位置（因此也就是游戏世界的位置），而不会影响任何按钮或其他覆盖层。第\
  \ 26 章 展示了如何为你的游戏添加垂直和水平滚动。\n\n在读取了定义关卡的文本文件行之后，你创建了 `Tile` 对象并将它们添加到 `TileField`\
  \ 对象中。你使用了一个嵌套的 `for` 循环来实现这一点：\n\n```\nfor i in 0..<height {\n    var currLine\
  \ = lines[height-1-i]\n    var j = 0\n    for c in currLine {\n        tileField.layout.add(loadTile(c,\
  \ x: j, y: i))\n        j++\n    }\n}\n```\n\n嵌套的 `for` 循环检查了你从文本文件中读取的所有字符。`loadTile`\
  \ 方法根据给定的字符以及瓦片在网格中的 x 和 y 位置，为你创建一个 `Tile` 对象。\n\n在 `loadTile` 方法中，你需要根据作为参数传递的字符加载不同的瓦片。对于每种类型的瓦片，你向\
  \ `LevelState` 类添加一个方法来创建那种特定类型的瓦片。例如，`loadWaterTile` 加载一个背景瓦片，并在其上方放置一个水滴：\n\n\
  ```\nfunc loadWaterTile(x: Int, y: Int) -> SKNode {\n    var w = WaterDrop()\n \
  \   w.position = tileField.layout.toPosition(x, row: y)\n    w.position.y += 10\n\
  \    w.zPosition = Layer.Scene1\n    world.addChild(w)\n    self.waterDrops.append(w)\n\
  \    return Tile()\n}\n```\n\n这个特定的示例创建了一个 `WaterDrop` 实例，并将其放置在瓦片的中心。你将每个水滴放置得比瓦片中心高\
  \ 10 个点，这样它就不会弹跳到下面瓦片的上方。请查看 `Level` 类，了解如何创建每个关卡中的各种瓦片和对象。图 22-2 显示了第一个关卡中对象的屏幕截图（玩家角色除外，你将在后续章节中处理它）。\n\
  \n![A978-1-4842-0650-8_22_Fig2_HTML.jpg](img/A978-1-4842-0650-8_22_Fig2_HTML.jpg)\n\
  \n*图 22-2.* Tick Tick 第一个关卡的遊戲世界\n\n## 本章所学\n\n在本章中，你学习了以下内容：\n\n-   如何搭建 Tick Tick\
  \ 游戏的整体结构\n-   如何创建一个弹跳的水滴\n\n\n\n"
- "# 23. 动画\n\n电子辅助材料 本章在线版本（doi:[10.1007/978-1-4842-0650-8_23](http://dx.doi.org/10.1007/978-1-4842-0650-8_23)）包含仅供授权用户使用的补充材料。\n\
  \n在本章中，你将学习如何为游戏添加动画。在你目前开发的游戏中，游戏对象可以在屏幕上移动，但要添加一个像跑动角色这样的内容则更具挑战性。本章中，你将编写一个程序，让一个角色在屏幕上从左向右行走。该角色由玩家通过按下屏幕上的左右按钮来控制。\n\
  \n## 什么是动画？\n\n在了解如何编写一个在屏幕上行走的角色程序之前，你首先需要思考什么是动画。要理解这一点，你得回到 20 世纪 30 年代，当时几家动画工作室（包括沃尔特·迪士尼）制作了首批黑白卡通片。\n\
  \n卡通片实际上是一系列快速播放的静态图像，这些图像也被称为帧。电视机以非常高的速率（大约每秒 25-30 次）绘制这些帧。当图像每次都有变化时，你的大脑会将其解读为运动。人脑的这一特殊功能（也被称为**似动现象**）非常有用，尤其是在编程包含移动或动画对象的游戏时。\n\
  \n在你之前阅读本书开发的游戏中，你已经运用了这一功能。在游戏循环的每一次迭代中，你都会在屏幕上绘制一帧新的“画面”。通过每次在不同位置绘制精灵，你便营造出精灵在移动的假象。然而，这并非真正发生的情况：你只是每秒多次在不同位置绘制精灵，这让玩家认为精灵在移动。\n\
  \n类似地，你可以绘制一个行走或奔跑的角色。除了移动精灵之外，你每次还会绘制一个略有不同的精灵。通过绘制一系列精灵（每个精灵代表行走动作的一部分），你可以创造出角色在屏幕上行走的错觉。图\
  \ 23-1 展示了这样一个精灵序列的示例。\n\n![A978-1-4842-0650-8_23_Fig1_HTML.jpg](img/A978-1-4842-0650-8_23_Fig1_HTML.jpg)\n\
  \n图 23-1.\n\n一组代表行走动作的图像序列\n\n### 游戏中的动画\n\n在游戏中加入动画有不同的原因。当你制作 3D 游戏时，动画通常是增强真实感所必需的，但对于\
  \ 2D 游戏来说，情况并非总是如此。尽管如此，动画仍能极大地丰富游戏内容。\n\n动画能让对象活起来。但这不一定要很复杂。一个角色简单眨眼或睁眼的动画，就能给人强烈的“角色是活的”的感觉。动画角色也更容易让人产生共鸣。如果你看像《割绳子》这样的游戏，主角（名叫奥姆诺姆）只是静静地坐在角落里。但时不时地，这个角色会做出一些有趣的动作，向你表明它在那里，并希望你给它带食物。这为玩家继续玩下去创造了非常有效的动机。\n\
  \n动画还有助于将玩家的注意力吸引到某个对象、任务或事件上。例如，在按钮上添加一个小动画，能让玩家更清楚地知道他们需要按下这个按钮。一个弹跳的水滴或旋转的星星则表示应该收集或避开这个物体。动画也可以用来提供反馈。当用手指点击按钮时，按钮向下移动，这立即表明按钮点击成功了。\n\
  \n然而，制作动画工作量很大。因此，需要事先仔细思考哪些地方需要动画，哪些地方可以避免，以节省时间和金钱。\n\n## 纹理图集\n\n对于动画角色，你通常为每种运动类型设计一组精灵序列。有些动画只包含少数几个精灵。例如，Tick\
  \ Tick 游戏中包含一枚飞过屏幕的火箭。这枚火箭的动画仅使用了三帧（见图 23-2）。\n\n![A978-1-4842-0650-8_23_Fig2_HTML.jpg](img/A978-1-4842-0650-8_23_Fig2_HTML.jpg)\n\
  \n图 23-2.\n\n火箭动画的帧\n\n其他动画可能包含更多帧。例如，Tick Tick 游戏中的炸弹爆炸动画有 49 帧。随着你在游戏中加入更多动画，所需精灵的数量（包括\
  \ 1 倍、2 倍，某些游戏甚至需要 3 倍分辨率）会急剧增加。这会增加设备在存储所有图像数据所需内存方面的压力，同时也会增加处理能力方面的压力，以便从文件加载图像并足够快地在屏幕上显示。减少图像加载时间的一个非常常见的技巧是将多个精灵放在同一张图像上。例如，你可以将开始画面所需的所有按钮放在同一个文件中，当需要显示某个按钮时，就展示图像中代表该按钮的那部分。SpriteKit\
  \ 框架为此提供了一个简洁的解决方案，称为纹理图集。纹理图集本质上是一组精灵/纹理，它以尽可能少的图像文件进行最优存储。如果你的游戏中有大量图像，纹理图集有助于游戏加载速度显著提升。好处在于，作为开发者，你无需担心精灵在图像文件中是如何存储的。你只需告诉\
  \ Xcode 环境，某个文件夹中的所有精灵都属于一个图集。\n\n要在 Xcode 中使用纹理图集，你只需将精灵放在一个名称以`.atlas`结尾的文件夹中，然后将该文件夹拖入项目即可。例如，在本章附带的\
  \ AnimationSample 项目中，你可以看到两个图集：`spr_player_run.atlas` 和 `spr_player_idle.atlas`（分别代表奔跑和待机动画）。如果你查看\
  \ `spr_player_run.atlas` 的内部，会发现它包含了不少不同的精灵。对于纹理图集，你需要记住一个重要的命名约定：如果你使用不同分辨率的精灵，应在文件名末尾添加“@1x”、“@2x”或“@3x”来表示精灵的分辨率。除此之外，你可以选择任何你喜欢的精灵名称。在本例中，将每个精灵命名为与其图集名称相同，加上一个数字，然后注明精灵的分辨率。\n\
  \n在代码中创建纹理图集非常简单。以下是通过 `spr_player_run.atlas` 文件创建纹理图集的方法：\n\n```\nlet atlas = SKTextureAtlas(named:\
  \ \"spr_player_run\")\n```\n\n现在，你可以按如下方式访问图集中的特定纹理：\n\n```\nlet texture = atlas.textureNamed(\"\
  spr_player_run0\")\n```\n\n图集中的纹理名称对应于你给文件起的名称（不包括分辨率标识）。然后，你可以使用此纹理创建一个节点并将其添加到游戏世界中：\n\
  \n```\nlet spriteNode = SKSpriteNode(texture: texture)\naddChild(spriteNode)\n```\n\
  \n\n\n### 动画类\n\n对于动画角色，你通常会为每种运动类型设计一组独立的精灵序列。图 23-1 中的示例展示了一个奔跑角色的动画序列。这正是纹理图集大显身手的地方。你可以将每一帧定义为纹理图集中的独立精灵。在\
  \ AnimationSample 项目中，我正是这样做的。下一步，让我们设计一些用于加载和播放动画的实用类和方法。用于表示动画的基础类名为 `Animation`，它是\
  \ AnimationSample 项目的一部分。除了存储在纹理图集中的精灵之外，动画还需要额外的信息。例如，你需要指定每一帧在屏幕上显示多长时间。你还需要能够循环播放动画，这意味着一旦到达最后一帧，就立即回到第一帧，从而形成连续、无限的动画。循环播放动画非常实用：以行走角色为例，你只需绘制一个行走周期，然后循环播放该动画，就能得到连续行走的动作。不过，并非所有动画都需要循环。例如，角色死亡的动画就不应该循环（那对角色来说太残忍了）。为了处理所有这些情况，`Animation`\
  \ 类包含了许多属性。以下是该类的一部分：\n\n```\nclass Animation: SKSpriteNode {\n\n    var action\
  \ = SKAction()\n\n    init(atlasNamed: String, looping: Bool, frameTime: NSTimeInterval)\
  \ {\n        // 待实现\n    }\n\n    required init?(coder aDecoder: NSCoder) {\n  \
  \      fatalError(\"init(coder:) has not been implemented\")\n    }\n\n    ...\n\
  }\n```\n\n如你所见，`Animation` 类是 `SKSpriteNode` 的子类。因此，如果你创建了一个 `Animation` 实例，你可以直接将其添加到游戏世界中。`Animation`\
  \ 类有一个单一属性 `action`，它指向实际播放动画的动作。该动作在初始化器中创建。如你所见，初始化器需要几个参数：包含动画帧的图集名称、一个指示动画是否应循环播放的布尔值，以及连续帧之间的时间间隔。根据这些参数的值，你将创建不同的动画动作。\n\
  \n第一步是加载纹理图集。为了方便起见，我们还将图集包含的纹理数量存储在一个变量中：\n\n```\nlet atlas = SKTextureAtlas(named:\
  \ atlasNamed)\nlet numImages = atlas.textureNames.count\n```\n\n现在，让我们从该图集中提取所有纹理，并将它们存储在一个数组中。稍后，你可以定义一个动作，使用这个纹理数组来生成动画。首先，声明并初始化一个\
  \ `SKTexture` 对象数组：\n\n```\nvar frames: [SKTexture] = []\n```\n\n下一步是从图集中检索所有纹理。这正是动画帧命名发挥作用的地方。让我们使用一个\
  \ `for` 循环来检索所有帧，并将它们添加到纹理数组中：\n\n```\nfor i in 0..<numImages/2 {\n    let textureName\
  \ = \"\\(atlasNamed)_\\(i)\"\n    frames.append(atlas.textureNamed(textureName))\n\
  }\n```\n\n这段代码中发生了几个操作。首先，有一个变量 `i`，其范围是从 0 到 `numImages/2`。需要将图集中的图像数量除以二，是因为图集同时包含了\
  \ 1x 和 2x 分辨率的图像。在 `for` 循环内部，你首先通过在图集名称后添加一个数字来构造纹理名称。然后，你使用 `textureNamed` 方法检索实际的纹理，并将其追加到纹理数组中。\n\
  \n现在你可以调用父类的初始化器了。节点使用数组中的第一个纹理进行初始化：\n\n```\nsuper.init(texture: frames[0], color:\
  \ UIColor.whiteColor(),\n           size: frames[0].size())\n```\n\n然后，你需要创建实际驱动节点动画的动作，操作如下：\n\
  \n```\nlet animateAction = SKAction.animateWithTextures(frames,\n              \
  \        timePerFrame: frameTime)\n```\n\n根据动画是否应该循环，你需要无限重复该动作。这通过以下 `if` 指令处理：\n\
  \n```\nif looping {\n    action = SKAction.repeatActionForever(animateAction)\n\
  } else {\n    action = animateAction\n}\n```\n\n### 支持多个动画\n\n`Animation` 类为表示动画提供了基础。一个动画游戏对象可能包含多个不同的动画，因此你可以拥有一个能够执行不同（动画）动作的角色，例如行走、奔跑、跳跃等等。每个动作都由一个动画表示。根据玩家的输入，你切换当前激活的动画。让我们定义一个便于处理多个动画的类。在\
  \ AnimationSample 项目中，这个类叫做 `AnimatedNode`。\n\n为了存储不同的动画，你使用一个数组。对于你需要的每个动画，你向数组中添加一个\
  \ `Animation` 类的实例。因此，`AnimatedNode` 拥有以下属性：\n\n```\nvar animations : [Animation]\
  \ = []\n```\n\n为了使加载和播放动画更加方便，你向该类添加了两个方法：`loadAnimation` 和 `playAnimation`。第一个方法创建一个\
  \ `Animation` 对象并将其添加到 `animations` 属性中：\n\n```\nfunc loadAnimation(atlasNamed:\
  \ String, looping: Bool = false,\n    frameTime: NSTimeInterval = 0.05, name: String,\n\
      anchorPoint: CGPoint = CGPoint(x: 0.5, y: 0)) {\n    let anim = Animation(atlasNamed:\
  \ atlasNamed, looping: looping, frameTime: frameTime)\n    anim.name = name\n    anim.anchorPoint\
  \ = anchorPoint\n    animations.append(anim)\n}\n```\n\n`loadAnimation` 方法需要几个参数，其中一些为方便起见设置了默认值。首先，你需要提供用于动画的图集名称。然后，你可以指示动画是否应该循环，以及帧间的时间间隔。此外，每个动画都需要有一个唯一的名称，以便你稍后能检索并激活它。最后，你可以为创建的节点提供一个锚点。这里，锚点默认设置为精灵的底部中间位置。在\
  \ Tick Tick 这个案例中，这是一个有用的默认值，因为玩家等动画角色会在瓦片上行进。将精灵原点设置在底部中心会使计算稍微简单一些，稍后你会看到。\n\n\
  在方法体中，你创建 `Animation` 实例，为其分配名称并设置其锚点，最后将其添加到动画数组中。\n\n在 `playAnimation` 方法中，你需要选择需要播放的动画，将其添加到节点，并启动动画动作。首先，你检查想要播放的动画是否已经是该节点的子节点。如果是这种情况，说明动画已经在播放，你无需再做其他操作，因此可以从该方法返回：\n\
  \n```\nfunc playAnimation(name: String) {\n    if childNodeWithName(name) != nil\
  \ {\n        return\n    }\n    ...\n}\n```\n\n接下来，你使用一个 `for` 循环来查找具有选定名称的动画。一旦找到，你移除该节点的所有子节点，将动画添加到节点，并启动该动作：\n\
  \n```\nfor anim in animations {\n    if anim.name == name {\n        self.removeAllChildren()\n\
          self.addChild(anim)\n        anim.runAction(anim.action)\n        return\n\
      }\n}\n```\n\n\n\n### 玩家类\n\n要使用上一节中介绍的 `AnimatedNode` 类，你需要继承它。由于玩家将控制动画角色，我们定义一个\
  \ `Player` 类，作为 `AnimatedNode` 的子类。在这个类中，你将加载属于玩家的动画，并处理玩家的输入。在 `Player` 的初始化方法中，你加载该角色所需的动画。在本示例中，你希望角色能够行走或站立不动。因此，你通过调用\
  \ `loadAnimation` 方法两次来加载两个动画。你通过将 `looping` 参数设置为 `true` 来让这两个动画循环播放：\n\n```\n\
  class Player: AnimatedNode {\n\n    var velocity = CGPoint.zeroPoint\n\n    override\
  \ init() {\n        super.init()\n        loadAnimation(\"spr_player_idle\", looping:\
  \ true, name: \"idle\")\n        loadAnimation(\"spr_player_run\", looping: true,\
  \ name: \"run\")\n    }\n\n    required init?(coder aDecoder: NSCoder) {\n     \
  \   fatalError(\"init(coder:) has not been implemented\")\n    }\n\n    ...\n}\n\
  ```\n\n请注意，玩家的实际空闲动画只有一个帧，因此在这种情况下，空闲动画是否循环并没有区别。`AnimationSample` 应用程序只有一个游戏状态，即\
  \ `MainState` 的实例。在这个游戏状态中，你向屏幕添加了几个按钮来控制玩家角色，以及玩家角色本身。完整代码请参见 `MainState.swift`\
  \ 文件。\n\n你需要在此类中处理玩家的输入。当玩家按下屏幕上的向左或向右按钮时，角色的速度应该会改变。你在 `handleInput` 方法中使用 `if`\
  \ 指令来实现这一点：\n\n```\nlet walkLeftButton = childNodeWithName(\"//button_walkleft\"\
  ) as! Button\nlet walkRightButton = childNodeWithName(\"//button_walkright\") as!\
  \ Button\nvar walkingSpeed = CGFloat(300)\n\nif walkLeftButton.down {\n    self.velocity.x\
  \ = -walkingSpeed\n} else if walkRightButton.down {\n    self.velocity.x = walkingSpeed\n\
  } else {\n    self.velocity.x = 0\n}\n```\n\n**注意**\n\n我为 `walkingSpeed` 参数选择了 300\
  \ 这个值。你可以尝试调整这个值，看看它如何改变角色的行为。为此类参数选择正确的值会对游戏玩法产生很大影响。选择“恰到好处”的值非常重要。通过让不同的玩家测试游戏玩法，可以帮助你确定这些值应该是什么，以便游戏体验感觉自然。\n\
  \n使用图 23-1 所示的精灵图，你可以制作一个向右行走的角色动画。要制作向左行走的角色动画，你可以使用另一组精灵图。然而，有一种更简单的方法可以实现这一点：在代码中镜像精灵图。在\
  \ SpriteKit 中镜像非常容易。你可以使用缩放来实现这一点。如果你想镜像节点，使角色向左行走，你可以给它分配一个负的 x 缩放值，如下所示：\n\n```\n\
  self.xScale = -1\n```\n\n你只希望在玩家速度为负时设置负的 x 缩放值。因此，你在 `Player` 类的 `handleInput`\
  \ 方法中添加以下 `if` 指令：\n\n```\nif self.velocity.x < 0 {\n    self.xScale = -1\n} else\
  \ if self.velocity.x > 0 {\n    self.xScale = 1\n}\n```\n\n我在这里用了一个小技巧。只有当速度大于或小于\
  \ 0 时，我才更改 x 缩放值。如果速度恰好为 0，则什么也不会发生。这样做的效果是，当角色停止移动时，它会保持面向它之前移动的方向，这正是我想要的行为。\n\
  \n在 `updateDelta` 方法中，你根据速度选择要播放的动画。如果速度为零，则播放空闲动画；否则播放奔跑动画：\n\n```\noverride func\
  \ updateDelta(delta: NSTimeInterval) {\n    super.updateDelta(delta)\n    position\
  \ += velocity * CGFloat(delta)\n    if self.velocity.x == 0 {\n        self.playAnimation(\"\
  idle\")\n    } else {\n        self.playAnimation(\"run\")\n    }\n}\n```\n\n如你所见，你还调用了超类的\
  \ `updateDelta` 方法，并将速度乘以经过的时间加到玩家的当前位置上，这样玩家就可以移动了。\n\n如果你运行这个程序，你将看到一个动画角色，你可以通过触摸左右按钮来控制它（见图\
  \ 23-3）。请注意，如果角色走出可见屏幕，它并不会在屏幕外“停止”——它会继续移动。因此，如果你按住右键 5 秒钟，你也需要按住左键 5 秒钟才能让角色回来。\n\
  \n![A978-1-4842-0650-8_23_Fig3_HTML.jpg](img/A978-1-4842-0650-8_23_Fig3_HTML.jpg)\n\
  \n图 23-3. 一个动画角色在屏幕底部从左向右移动\n\n解决这种可能走出屏幕边缘行为的一种方法是实现“环绕”：如果角色从屏幕右侧走出，它会从左侧重新出现，反之亦然。你可以通过向代码中添加一个\
  \ `if` 指令来轻松实现环绕，该指令检查角色的当前位置，并根据该位置选择将角色移动到屏幕的另一端。你能自己修改示例来添加环绕功能吗？\n\n## 你学到了什么\n\
  \n在本章中，你学到了以下内容：\n\n-   如何使用纹理图集来更高效地处理大量图片\n-   如何创建和控制动画\n-   如何构建一个包含多个动画的动画游戏对象\n\
  \n"
- "# 平台游戏物理机制\n\n电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-0650-8_24](http://dx.doi.org/10.1007/978-1-4842-0650-8_24))\
  \ 包含补充材料，仅供授权用户使用。\n\n在上一章中，你学习了如何创建动画角色。你还学习了如何通过从文本文件中读取关卡数据来构建一个基于瓦片的游戏世界。然而，最重要的一个方面仍然缺失：定义角色如何与游戏世界交互。你可以让角色从左向右移动，但如果简单地将角色放置在关卡中，它只能沿着屏幕底部行走。这还不够。你希望角色能够跳到瓦片顶部，如果从瓦片上离开则会掉落，而且你不希望角色掉出屏幕边缘。为了实现这些功能，你需要一个物理系统。\n\
  \n你可以使用 SpriteKit 框架提供的现有物理引擎，但有几个理由说明为什么为平台游戏构建你自己的引擎是明智的。由于物理引擎在很大程度上决定了游戏的玩法，你需要能够调整引擎的参数以适应游戏。如果你编写自己的物理引擎，你将对其行为方式有更多的控制权。此外，你自己的引擎可能比\
  \ SpriteKit 的物理引擎使用更少的资源；平台游戏通常不需要超逼真的物理效果，因此你可以使用更简单的规则和算法。编写自己物理引擎的另一个重要原因是，平台游戏行为的某些部分很难与现有的物理引擎集成。例如，Tick\
  \ Tick 游戏中有一些特殊的瓦片，当你站在它们下方时可以跳穿过去。这种行为很难用传统的物理引擎来编码。最后，虽然编写自己的物理引擎可能是一个相当大的挑战，但这是一个很好的练习，可以帮助你理解物理原理并将其转化为真正可用的代码！\n\
  \n在 Tick Tick 游戏中，主要的物理行为将在 `Player` 类中实现，因为玩家是与游戏世界交互的主要角色。处理物理机制有两个主要方面：赋予角色跳跃或掉落的能力，以及处理角色与其他游戏对象之间的碰撞并对这些碰撞做出响应。\n\
  \n\n\n## 将角色锁定在游戏世界中\n\n你要做的第一件事就是**将角色锁定在游戏世界中**。上一章的例子中，角色可以毫无阻碍地走出屏幕。为了解决这个问题，你可以在屏幕左右两侧放置一堵由虚拟墙砖构成的屏障。然后假定你的碰撞处理机制（虽然你还没编写）会确保角色无法穿过这些墙壁。你只需防止角色从屏幕左侧或右侧走出去。角色应该能够从屏幕顶部跳出视野，也应该能通过地面上的坑洞掉出游戏世界（当然，随后便会死亡）。\n\
  \n为了在屏幕左右两侧构建这堵虚拟墙砖屏障，你需要为网格添加一些行为逻辑。这可以在表示基于瓦片的游戏世界的 `TileField` 类中完成。该类有一个名为 `getTileType`\
  \ 的方法，该方法根据给定的行列索引返回对应瓦片的类型。这个方法的一个巧妙之处是：它允许索引超出网格的有效范围。例如，即使查询位置为 `(-2,500)` 的瓦片类型也是允许的。首先，它会检查网格中指定位置是否存在瓦片，如果存在，则返回其瓦片类型：\n\
  \n```\nif let obj = layout.at(col, row: row) as? Tile {\n    return obj.type\n}\n\
  ```\n\n然后，它会检查列索引是否超出范围。如果是，则返回一个墙砖类型：\n\n```\nif col < 0 || col >= layout.columns\
  \ {\n    return .Wall\n}\n```\n\n在其他所有情况下，则返回一个背景砖类型：\n\n```\nreturn .Background\n\
  ```\n\n完整的 `TileField` 类可以在本章附带的示例程序 `TickTick2` 中找到。\n\n## 将角色设置在正确位置\n\n当你从文本文件加载关卡砖块时，使用字符\
  \ `1` 来表示玩家角色的起始砖块。你需要根据该砖块的位置来创建 `Player` 对象，并将其设置在正确的位置。为此，你在 `LevelState` 类中添加一个名为\
  \ `loadStartTile` 的方法。在该方法中，你根据角色在网格中的位置计算其起始坐标。由于角色的原点位于精灵的底部中心点，你按如下方式计算这个位置：\n\
  \n```\nvar startPosition = tileField.layout.toPosition(x, row: y)\nstartPosition.y\
  \ -= CGFloat(tileField.layout.cellHeight / 2)\n```\n\n请注意，你首先使用网格布局的 `toPosition`\
  \ 方法计算位置。由于这得到的是砖块的中心点，你需要从 y 坐标中减去单元格高度的一半，才能到达砖块的底部。然后，你创建 `Player` 对象并将其添加到游戏世界中：\n\
  \n```\nvar player = Player(startPos: startPosition)\nplayer.name = \"player\"\n\
  player.zPosition = Layer.Scene1\nworld.addChild(player)\n```\n\n最后，你仍然需要在此处创建一个可以存储在网格中的实际砖块，因为每个字符都应该对应一个砖块。在这种情况下，你可以创建一个放在角色站立位置的背景砖：\n\
  \n```\nreturn Tile()\n```\n\n## 跳跃……\n\n你已经了解了角色如何向左或向右行走。那么如何处理跳跃和下落呢？在 `TickTick2`\
  \ 示例中，你在屏幕右下角添加了一个跳跃按钮。当玩家按下该按钮时，角色就会跳跃。这基本上意味着角色获得一个正的 y 方向速度。这可以很容易地在 `Player`\
  \ 类的 `handleInput` 方法中实现：\n\n```\nif jumpButton.tapped {\n    self.jump()\n}\n```\n\
  \n`jump` 方法如下：\n\n```\nfunc jump(speed: CGFloat = 680) {\n    self.velocity.y =\
  \ speed\n}\n```\n\n所以，在不提供任何参数值的情况下调用 `jump` 方法的效果是：将 y 方向速度设置为 680。我选择这个数值是有点随机的。使用更大的数值意味着角色可以跳得更高。我选择这个值是为了让角色能跳得足够高以触及砖块，但又不会高到让游戏变得过于简单（那样角色可能直接跳到关卡尽头）。\n\
  \n这种方法存在一个小问题：你总是允许玩家角色跳跃，无论角色当前处于什么状态。也就是说，如果角色正在跳跃或掉下悬崖，你仍然允许玩家让角色跳回安全地带。这并不是你想要的。你希望角色只在站立于地面时才能跳跃。这可以通过检测角色与墙壁或平台砖块（这是角色唯一能站立其上的砖块类型）之间的碰撞来实现。让我们暂时假设你尚未编写的碰撞检测算法会处理这个问题，并使用一个属性来跟踪角色是否在地面上：\n\
  \n```\nvar onTheGround = false\n```\n\n有时，有必要先用英语（而不是 Swift）勾勒出一个类的框架，以便你能编写游戏的其他部分。碰撞检测的情况也是如此。你无法在构建碰撞检测算法之前对其进行测试，但你也不想在算法创建并测试之前就将其嵌入。必须有一方先行，所以你需要先在脑海中明确另一方的运作方式，并做好规划或记录。\n\
  \n如果 `onTheGround` 属性为 `true`，你就知道角色正站在地面上。现在你可以修改初始的 `if` 指令，使其只允许角色从地面起跳，而不能在空中起跳：\n\
  \n```\nif jumpButton.tapped && self.onTheGround {\n    self.jump()\n}\n```\n\n##\
  \ ……和下坠\n\n目前，唯一改变 y 方向速度的地方是在 `handleInput` 方法中，当玩家想要跳跃时。如果 y 方向速度无限期地保持在 680 这个值，角色就会在空中向上移动，飞出屏幕，脱离地球大气层，进入外太空。因为你做的不是一款关于太空炸弹的游戏，所以你必须对此采取措施。你忘记添加到游戏世界中的是**重力**。\n\
  \n你可以采用一种简单的方法来模拟重力对角色的影响。在每个更新步骤中，从 y 方向速度中减去一个较小的值，类似于你在 Painter 游戏中处理球体时所做的那样：\n\
  \n```\nself.velocity.y -= CGFloat(1300 * delta)\n```\n\n如果角色具有正速度，这个速度会逐渐减小，直到达到零，然后开始反向增加（变为负值）。其效果是角色跳到一定高度后开始下落，就像现实世界中一样。然而，这样一来，碰撞检测机制就变得更加重要了。如果没有碰撞检测，角色在游戏开始时就会开始下坠！\n\
  \n\n\n## 碰撞检测\n\n检测游戏对象之间的碰撞是模拟交互式游戏世界的一个非常重要的部分。碰撞检测在游戏中有多种用途：检测角色是否踩到了增强道具、检测角色是否与抛射物相撞、检测角色与墙壁或地板之间的碰撞等等。你已经在本书前面讨论过的游戏中使用了碰撞检测。在图坦卡蒙之墓游戏中，物理引擎负责处理对象间的碰撞检测。在画家游戏中，你使用边界框自己实现了一个简单的碰撞检测。以下是`PaintCan`类中的一段代码：\n\
  \n```\nvar ball = GameScene.world.ball\n\nif self.box.intersects(ball.box) {\n \
  \   color = ball.color\n    ball.reset()\n}\n```\n\n这里所做的是通过检查球和油漆罐的边界框是否相交来检测它们之间的碰撞。这不是一种非常精确的碰撞检测方法。球和油漆罐的形状都不像盒子。因此，在某些情况下，没有发生碰撞时却检测到了碰撞，而有时精灵实际上正在碰撞，却又检测不到。尽管如此，许多游戏在进行碰撞检测时仍会使用简化形状，例如圆形和矩形，来表示对象。因为这些形状将对象包裹在里面，所以它们也被称为边界圆和边界框。Tick\
  \ Tick 游戏使用了轴对齐边界框，这意味着你只考虑边与 x 轴和 y 轴平行的盒子。\n\n使用边界框进行碰撞检测并不总是足够精确。当游戏对象彼此靠近时，它们的边界形状可能会相交（从而触发碰撞），但实际对象并未碰撞。而且，当游戏对象有动画时，其形状可能会随时间改变。你可以将边界形状做得更大，以便对象在任何情况下都能放入其中，但这会导致更多错误的碰撞触发。对此有一些解决方案。例如，除了使用盒子和圆形，你还可以通过围绕精灵绘制线条来创建其轮廓。如果你创建一个凸轮廓（意味着轮廓没有包含任何空洞或向内凹陷的部分），你可以使用分离轴定理来确定两个这样的轮廓之间是否存在碰撞。处理这个问题超出了本书的范围，但可以说，这比处理盒子和圆形会稍微消耗更多的资源。\n\
  \n另一种解决方案，资源消耗甚至更高，即是逐像素检查碰撞。基本上，你可以编写一个算法，遍历精灵中的非透明像素（使用嵌套的`for`指令），并检查这些像素中的一个或多个是否与另一个精灵中的像素发生碰撞（同样，通过嵌套的`for`指令遍历它们）。由于这种高度精细的碰撞检测成本高昂，特别是如果你希望游戏在较旧的\
  \ iDevice 上流畅运行，那么你将在 Tick Tick 游戏中使用基于边界框的简单碰撞检测，尽管你也会学习一些技巧，使碰撞处理更加自然。\n\n###\
  \ 获取边界框\n\n为了在游戏中高效地处理碰撞，你使用`SKNode`类中的`box`属性，该属性返回精灵的边界框：\n\n```\nvar box: CGRect\
  \ {\n    get {\n        var boundingBox = self.calculateAccumulatedFrame()\n   \
  \     if parent != nil {\n            boundingBox.origin = scene!.convertPoint(boundingBox.origin,\n\
  \                fromNode: parent!)\n        }\n        return boundingBox\n   \
  \ }\n}\n```\n\n注意，你将边界框的原点转换到了场景坐标系。这确保了边界框的位置是以世界坐标表示的。在进行碰撞检测时，你想知道对象在世界中的位置——你并不关心它们在游戏对象层级中的局部位置。\n\
  \n### 处理角色-瓦片碰撞\n\n在 Tick Tick 游戏中，你主要需要检测角色与瓦片之间的碰撞。你可以在一个名为`handleCollisions`的方法中完成此操作，该方法在`Player`类的`updateDelta`方法中被调用。其思路是，你首先进行所有关于跳跃、下落和奔跑的计算（你在本章开头部分已经做了这些）。如果角色与瓦片之间发生碰撞，你就修正角色的位置，使其不再碰撞。在`handleCollisions`方法中，你遍历瓦片网格，并检查当前正在检查的瓦片是否与角色发生碰撞。\n\
  \n你不需要检查网格中的所有瓦片，只需检查那些靠近角色当前位置的瓦片。你可以按如下方式计算离角色位置最近的瓦片：\n\n```\nlet tiles = childNodeWithName(\"\
  //tileField\") as! TileField\nlet (x_floor, y_floor) = tiles.layout.gridLocation(self.position)\n\
  ```\n\n现在，你可以使用一个嵌套的`for`指令来查看角色周围的瓦片。为了应对快速的跳跃和下落，你在 y 方向上考虑了更多的瓦片。在嵌套的`for`指令中，你接着检查角色是否与瓦片发生碰撞。然而，只有当瓦片不是背景瓦片时，你才需要这样做。完成所有这些操作的代码如下：\n\
  \n```\nfor (var y = y_floor - 1; y <= y_floor + 2; ++y) {\n    for (var x = x_floor\
  \ - 1; x <= x_floor + 1; ++x) {\n        let tileType = tiles.getTileType(x, row:\
  \ y)\n        if tileType == .Background {\n            continue\n        }\n  \
  \      let tileBounds = tiles.getTileBox(x, row: y)\n        if !tileBounds.intersects(box)\
  \ {\n            continue\n        }\n        ...\n    }\n}\n```\n\n如你所见，你没有直接访问`Tile`对象。原因在于，有时因为角色靠近屏幕边缘，`x`或`y`索引可能是负数。这里你可以看到使用添加到`TileField`类中的`getTileType`方法的好处。你不需要关心你是否真的在处理一个瓦片：只要知道它的类型和边界框，你就可以完成你的工作。\n\
  \n在嵌套的`for`指令中，你还看到了一个新关键字：`continue`。这个关键字可以在`for`或`while`指令中使用，以停止执行当前循环的迭代并继续下一次迭代。在这个例子中，如果瓦片的类型是`Background`，则其余指令不再执行，你继续递增`x`并开始新的迭代来检查下一个瓦片。结果就是，只有非`Background`类型的瓦片才会被考虑。`continue`关键字与`break`相关，`break`会完全停止整个循环。与`break`不同，`continue`仅停止当前的迭代。\n\
  \n然而，这段代码并不总是能正确工作。特别是当角色站在瓦片上时，计算边界框时的舍入误差可能导致算法认为角色没有站在地面上。角色的速度因此增加，结果角色可能会穿过瓦片掉落下去。为了弥补任何舍入误差，你将边界框的\
  \ y 原点减少 1：\n\n```\nlet tileBounds = tiles.getTileBox(x, row: y)\nvar bbox = box\n\
  bbox.origin.y -= 1\nif !tileBounds.intersects(bbox) {\n    continue\n}\n// 处理碰撞\n\
  ```\n\n\n\n### 处理碰撞\n\n现在你已经能够检测游戏世界中角色与图块之间的碰撞，接下来需要确定碰撞发生时该如何处理。有几种可能性：可以让游戏崩溃（如果你想将游戏卖给更多人，这可不太妙），可以警告用户不应与游戏中的物体碰撞（会弹出大量消息），也可以自动修正角色与物体碰撞后的位置。\n\
  \n为了修正角色位置，你需要知道碰撞的严重程度。例如，如果角色向右撞到墙壁，就必须知道要将角色向左移动多少距离才能解除碰撞。这被称为\"交叠深度\"。让我们为`CGRect`类型扩展一个名为`calculateIntersectionDepth`的方法，用于计算两个`CGRect`对象在\
  \ x 轴和 y 轴方向上的交叠深度。在本例中，这些矩形分别是角色的包围盒和与角色发生碰撞的图块的包围盒。\n\n计算交叠深度时，首先需要确定两个矩形中心之间的最小允许距离，以保证两者不发生碰撞：\n\
  \n```\nlet minDistance = CGPoint(x: (self.size.width + rect.size.width)/2,\ny: (self.size.height\
  \ + rect.size.height)/2)\n```\n\n然后计算两个矩形中心之间的实际距离：\n\n```\nlet distance = CGPoint(x:\
  \ self.midX - rect.midX, y: self.midY - rect.midY)\n```\n\n现在，你可以通过计算最小允许距离与实际距离之间的差值来得到交叠深度。观察两个中心之间的实际距离时，x\
  \ 轴和 y 轴维度各有两种可能：距离为负或为正。例如，如果 x 轴距离为负，说明矩形`rect`位于矩形`this`的右侧（因为`rect.midX > self.midX`）。如果矩形`self`代表角色，这意味着你需要将角色向左移动来修正这个交叠。因此，需要将\
  \ x 轴交叠深度返回为负值，可通过`- minDistance.x - distance.x`来计算。为什么？因为发生碰撞时，两个矩形之间的距离小于`minDistance`。而由于`distance`为负，表达式`-minDistance.x\
  \ - distance.x`会给出两者之间的负差值。如果`distance`为正，则表达式`minDistance.x - distance.x`会给出两者之间的正差值。y\
  \ 轴距离的推理逻辑相同。你可以按如下方式计算深度：\n\n```\nif distance.x > 0 {\ndepth.x = minDistance.x\
  \ - distance.x\n} else {\ndepth.x = -minDistance.x - distance.x\n}\nif distance.y\
  \ > 0 {\ndepth.y = minDistance.y - distance.y\n} else {\ndepth.y = -minDistance.y\
  \ - distance.y\n}\n```\n\n最后，将深度向量作为方法的返回值返回：\n\n```\nreturn depth\n```\n\n完整方法请参见本章所属\
  \ TickTick2 示例中的`Math.swift`文件。当你知道角色与图块发生碰撞时，可以使用刚添加到`CGRect`类型的方法来计算交叠深度：\n\n\
  ```\nlet depth = box.calculateIntersectionDepth(tileBounds)\n```\n\n现在你已经计算出了交叠深度，有两种方法可以解决这个碰撞：在\
  \ x 轴方向移动角色，或在 y 轴方向移动角色。通常情况下，你应该选择移动距离最小的方向，以避免产生不自然的运动或位移。因此，如果 x 轴深度小于 y 轴深度，就在\
  \ x 轴方向移动角色；否则就在 y 轴方向移动。你可以用`if`指令来检查这一点。比较两个深度维度时，需要考虑它们可能为负值。通过使用`fabs`函数比较绝对值来解决这个问题：\n\
  \n```\nif fabs(depth.x) < fabs(depth.y) {\n// 在 x 轴方向移动角色\n}\n```\n\n是否每次与图块发生碰撞时都需要移动角色？这取决于图块类型。请记住，`TileType`用于表示三种可能的图块类型：`TileType.Background`、`TileType.Wall`和`TileType.Platform`。如果角色碰撞的图块是背景图块，你肯定不希望移动角色。此外，在\
  \ x 轴方向移动时，你需要让角色能够穿过平台图块。因此，唯一需要移动角色来修正碰撞的情况是当角色与墙壁图块（`TileType.Wall`）碰撞时。在这种情况下，只需将\
  \ x 轴深度值加到角色位置上即可移动角色：\n\n```\nif tileType == .Wall {\nself.position.x += depth.x\n\
  }\n```\n\n如果想要修正角色在 y 轴方向的位置，情况会稍微复杂一些。由于这里处理的是 y 轴方向的移动，因此这也是判断角色是否站在地面上的好时机。在`handleCollisions`方法开始时，你将`isOnTheGround`属性设置为`false`。所以，初始假设是角色不在地面上。在某些情况下，角色站在地面上，此时需要将该属性设置为`true`。如何检查角色是否站在地面上？如果它不在地面上，那一定在下落。如果在下落，那么上一帧的\
  \ y 坐标位置小于当前位置。为了能够访问上一帧的 y 坐标，你可以在每次调用`handleCollisions`方法结束时将其存储在一个属性中：\n\n```\n\
  self.previousYPosition = self.position.y\n```\n\n现在你可以使用上一帧的 y 坐标来判断角色是否站在地面上。首先，计算上一帧与当前\
  \ y 坐标的差值：\n\n```\nlet ydifference = self.position.y - self.previousYPosition\n\
  ```\n\n如果当前全局 y 坐标减去这个差值大于或等于角色碰撞图块的顶部，并且该图块不是背景图块，那么说明角色正在下落并到达了一个图块。如果是这种情况，就将`isOnTheGround`属性设置为`true`，并将\
  \ y 轴速度设为 0，让角色停止下落。还需要修正当前 y 坐标，使角色不再与图块交叠：\n\n```\nif box.minY - ydifference >=\
  \ tileBounds.maxY && tileType != .Background {\nself.onTheGround = true\nself.velocity.y\
  \ = 0\nself.position.y += depth.y\n}\n```\n\n你还需要处理的另一种情况是：角色并非在下落，而是在跳跃过程中碰到了墙壁图块。在这种情况下，你只需修正角色位置，使其不再与墙壁图块交叠即可，这由以下`if`指令实现：\n\
  \n```\nelse if tileType == .Wall {\nself.position.y += depth.y\n}\n```\n\n图 24-1\
  \ 展示了 TickTick2 示例的屏幕截图。我在这里创建了一个简单的关卡，你可以用来测试物理引擎。该关卡比大多数 iDevice 的屏幕要小，因此关卡周围会有些黑色区域。在第\
  \ 26 章中，我将演示如何为游戏添加横向卷轴功能，这样你就能创建更大的关卡，并让它们在不同屏幕尺寸的设备上运行。\n\n![A978-1-4842-0650-8_24_Fig1_HTML.jpg](img/A978-1-4842-0650-8_24_Fig1_HTML.jpg)\n\
  \n图 24-1. TickTick2 示例\n\n## 本章所学内容\n\n在本章中，你学到了以下内容：\n\n- 如何将角色约束在环境范围内\n- 如何模拟跳跃和下落\n\
  - 如何处理游戏中的碰撞\n\n\n\n"
- "# 25. 智能敌人\n\n电子补充材料 本章在线版本（doi:[10.​1007/​978-1-4842-0650-8_​25](http://dx.doi.org/10.1007/978-1-4842-0650-8_25)）包含补充材料，仅供授权用户使用。\n\
  \n作为开发《Tick Tick》游戏的下一步，让我们通过添加危险的敌人来为玩家引入一些危险。如果玩家碰到敌人，玩家就会死亡。敌人通常不受玩家控制（那样游戏就太简单了）。因此，你需要定义某种智能（或愚蠢）的行为。你不想让这些敌人太聪明：玩家应该能够完成关卡。毕竟，玩游戏的目标就是：获胜。好处在于，你可以构建不同类型的敌人，展示不同的行为类型。这样一来，玩家将拥有不同的游戏玩法选择，并且必须制定不同的策略来完成关卡。\n\
  \n定义敌人的行为可能会导致非常复杂的代码，包含许多不同的状态、推理、路径规划等等。在本章中，你将看到几种不同类型的敌人：一枚火箭、一只打喷嚏的乌龟（没错）、闪电狗，以及几个不同的巡逻敌人。本章不涉及玩家应该如何与敌人互动——你只会定义它们的基本行为。\n\
  \n## 火箭\n\n最基本的敌人之一就是火箭。火箭从屏幕的一侧飞到另一侧，然后在一段时间后重新出现。如果玩家接触到火箭，玩家就会死亡。在关卡描述中，你用字符\
  \ `r` 和 `R` 来表示应该在关卡中放置一个火箭敌人。例如，考虑以下关卡描述：\n\n`Many, many, many, many, many rockets...`\n\
  \n`20 15`\n\n`30`\n\n`....................`\n\n`r..W...........X....`\n\n`...--..W.......--...`\n\
  \n`....W.--........W..R`\n\n`...--..........--...`\n\n`r..W......W....W....`\n\n\
  `...--....--....--...`\n\n`....W...........W...`\n\n`...--........W.--...`\n\n`r..W........--.W....`\n\
  \n`...--..........--...`\n\n`....W...........W..R`\n\n`...--..........--...`\n\n\
  `.1..................`\n\n`######..####..######`\n\n小写 `r` 表示火箭应从左向右飞行，大写 `R` 表示它应从右向左飞行（参见第\
  \ 22 章中的表 22-1）。\n\n### 创建与重置火箭\n\n让我们创建一个代表此类特定敌人的 `Rocket` 类。你继承自 `AnimatedNode`\
  \ 类，因为火箭是动画的。`Rocket` 类有几个属性：一个速度、其在关卡中的起始位置，以及一个名为 `spawnTime` 的属性，该属性用于记录火箭应该出现的时间。在初始化器中，你需要加载火箭动画并播放它，然后检查动画是否应该镜像。由于动画中火箭是向右移动的，因此如果火箭向左移动，你需要将其镜像。你还存储了火箭的起始位置，以便在它移出屏幕时将其放回该位置。以下是\
  \ `Rocket` 类定义的一部分：\n\n```\nclass Rocket: AnimatedNode {\n    var startPosition:\
  \ CGPoint = CGPoint.zeroPoint\n    var spawnTime: CGFloat = 0\n    var velocity\
  \ = CGPoint.zeroPoint\n    init(moveToLeft: Bool, startPos: CGPoint) {\n       \
  \ startPosition = startPos\n        super.init()\n        loadAnimation(\"spr_rocket\"\
  , looping: true, frameTime: 0.5, name: \"default\")\n        playAnimation(\"default\"\
  )\n        if moveToLeft {\n            self.xScale = -1\n        }\n        reset()\n\
  \    }\n    ...\n}\n```\n\n初始化器中的最后一个指令是对 `reset` 方法的调用。在这个方法中，你将火箭的当前位置设置为起始位置，隐藏火箭（它最初应该是不可见的），并将其速度设为零。你还使用随机数生成器计算一个随机时间（以秒为单位），之后火箭应出现并开始移动。你将这个时间存储在属性\
  \ `spawnTime` 中。你将这些指令放在一个单独的 `reset` 方法中，因为稍后你还会在火箭飞出屏幕后调用此方法。\n\n### 火箭行为编程\n\n\
  火箭的行为（一如既往）被编码在 `updateDelta` 方法中。基本上，火箭表现出两种主要类型的行为：要么它可见并从屏幕一端移动到另一端，要么它不可见并等待出现。你可以通过查看\
  \ `spawnTime` 属性的值来确定火箭处于这两种状态中的哪一种。如果此属性包含一个大于零的值，则火箭正在等待生成。如果该值小于或等于零，则火箭可见并从屏幕一端移动到另一端。\n\
  \n让我们看第一种情况。如果火箭正在等待生成，你只需从生成时间中减去自上次调用 `updateDelta` 以来经过的时间：\n\n```\nif spawnTime\
  \ > 0 {\n    spawnTime -= CGFloat(delta)\n    return\n}\n```\n\n第二种情况稍微复杂一些。火箭正在从屏幕一端移动到另一端。因此，你将隐藏状态设置为\
  \ `false`，并根据其移动方向计算火箭速度：\n\n```\nhidden = false\nself.velocity.x = 600\nif self.xScale\
  \ < 0 {\n    self.velocity.x *= -1\n}\n```\n\n最后，你必须检查火箭是否飞出了关卡。如果是这种情况，则应重置火箭。你使用瓦片场的边界框来检查火箭是否在关卡之外。如果此边界框与火箭的边界框不相交，你就知道火箭在关卡外部，然后重置它：\n\
  \n```\nlet tileField = childNodeWithName(\"//tileField\") as! TileField\nif !tileField.box.intersects(self.box)\
  \ {\n    self.reset()\n}\n```\n\n这样就完成了 `Rocket` 类，除了与玩家的交互部分——你将在第 26 章中更详细地研究这一点。完整的类，请参见属于本章的\
  \ TickTick3 示例代码。图 25-1 展示了本章第一节中定义的关卡的屏幕截图。请注意，该关卡仅部分可见，因为它比设备屏幕要大。\n\n![A978-1-4842-0650-8_25_Fig1_HTML.jpg](img/A978-1-4842-0650-8_25_Fig1_HTML.jpg)\n\
  \n**图 25-1.** 一个有多枚火箭飞行的关卡\n\n## 巡逻敌人\n\n火箭是一种基本上没有智能行为的敌人。它从左飞到右，或从右飞到左，直到飞出关卡，然后重置自己。你也可以添加稍微更智能一点的敌人，例如巡逻敌人。让我们设置几种不同类型的巡逻敌人，你可以将它们添加到游戏中。\n\
  \n\n\n### 基本的 `PatrollingEnemy` 类\n\n`PatrollingEnemy` 类与 `Rocket` 类类似。你希望巡逻敌人具有动画效果，因此它继承自\
  \ `AnimatedNode` 类。你还需要在重写的 `updateDelta` 方法中定义敌人的行为。巡逻敌人的基本行为是：从左走到右，然后折返。如果敌人角色到达一个缺口或墙壁瓷砖处，它会停止行走，等待一段时间，然后转身。你可以在关卡中的任意位置放置敌人。对于玩家，你可以定义一些基本的物理特性，如下落和跳跃。但对于\
  \ `PatrollingEnemy` 类，你不需要这样做，因为你为本游戏定义的敌人只会从左走到右然后折返。\n\n在 `PatrollingEnemy` 类的初始化器中，你需要加载巡逻敌人角色的主动画（一个看起来愤怒的火焰，如图\
  \ 25-2 所示）。初始时，你设置一个正的速度，使敌人开始向右行走。你还初始化了另一个名为 `waitTime` 的属性，用于记录敌人在其行走的平台边缘等待了多长时间：\n\
  \n![A978-1-4842-0650-8_25_Fig2_HTML.jpg](img/A978-1-4842-0650-8_25_Fig2_HTML.jpg)\n\
  \n图 25-2.\n几个巡逻敌人\n\n```\nclass PatrollingEnemy: AnimatedNode {\n    var waitTime:\
  \ CGFloat = 0\n    var velocity = CGPoint(x: 120, y: 0)\n\n    override init() {\n\
  \        super.init()\n        loadAnimation(\"spr_flame\", looping: true, frameTime:\
  \ 0.1, name: \"default\")\n        playAnimation(\"default\")\n    }\n    ...\n\
  }\n```\n\n在 `updateDelta` 方法中，你需要区分两种情况：敌人正在行走或正在等待。你可以通过查看 `waitTime` 属性来区分这些状态。如果该属性包含正值，则敌人在等待；如果该属性值为零或负数，则敌人在行走。当敌人等待时，你不需要做太多工作。就像在\
  \ `Rocket` 类中一样，你从 `waitTime` 属性中减去经过的游戏时间。如果等待时间已归零，你需要让角色转身。以下是实现该功能的代码：\n\n```\n\
  if waitTime > 0 {\n    waitTime -= CGFloat(delta)\n    if waitTime <= 0 {\n    \
  \    self.turnAround()\n    }\n}\n```\n\n`turnAround` 方法简单地镜像动画并反转速度：\n\n```\nfunc\
  \ turnAround() {\n    xScale = -xScale\n    velocity.x = 120 * xScale\n}\n```\n\n\
  如果敌人当前正在行走（而非等待），你需要判断它是否已到达所行走平台的边缘。有两种情况会触达边缘：要么前方有缺口，敌人无法继续前进；要么有墙壁瓷砖挡住了去路。你使用敌人的包围盒来获取这些信息。如果敌人向左行走，你检查敌人左侧的瓷砖；如果敌人向右行走，你检查它右侧的瓷砖。你可以按如下方式计算目标瓷砖的列索引：\n\
  \n```\nlet tileField = childNodeWithName(\"//tileField\") as! TileField\nvar (col,\
  \ row) = tileField.layout.gridLocation(self.position)\nif xScale < 0 {\n    col\
  \ -= 1\n} else {\n    col += 1\n}\n```\n\n接下来，你需要检查敌人是否碰到了墙壁瓷砖或平台边界。如果计算出的索引位置下方的瓷砖是背景瓷砖，则说明敌人到达了平台边界，必须停止行走。如果索引\
  \ `(col, row)` 处的瓷砖（即紧邻敌人的瓷砖）是墙壁瓷砖，敌人也必须停止行走。为了停止行走，你给等待时间赋予一个正值，并将 x 方向的速度设为零：\n\
  \n```\nif tileField.getTileType(col, row: row - 1) == .Background ||\n    tileField.getTileType(col,\
  \ row: row) == .Wall {\n    waitTime = 0.5\n    velocity = CGPoint.zeroPoint\n}\n\
  ```\n\n### 不同类型的敌人\n\n你可以通过引入一些变体，让巡逻敌人变得稍微更有趣一些。这里你可以利用继承的强大功能，编写 `PatrollingEnemy`\
  \ 类的几个子类来定义不同的敌人行为。\n\n例如，你可以创建一个稍微更不可预测的敌人，让它偶尔改变方向。这时，你还可以将敌人的行走速度改为一个随机值。具体做法是定义一个继承自\
  \ `PatrollingEnemy` 类的类，名为 `UnpredictableEnemy`。因此，默认情况下，它表现出与普通敌人相同的行为。你重写 `updateDelta`\
  \ 方法，并添加几行代码，随机改变敌人行走的方向及其速度。因为你复用了 `PatrollingEnemy` 类的大部分代码，`UnpredictableEnemy`\
  \ 类相当简洁。以下是完整的类定义：\n\n```\nclass UnpredictableEnemy: PatrollingEnemy {\n    override\
  \ func updateDelta(delta: NSTimeInterval) {\n        super.updateDelta(delta)\n\
  \        if waitTime <= 0 && randomCGFloat() < 0.01 {\n            self.turnAround()\n\
  \            self.velocity.x = randomCGFloat() * 300 * xScale\n        }\n    }\n\
  }\n```\n\n如你所见，你使用一条 `if` 指令来检查随机生成的数字是否低于某个值。因此，在某些情况下，该条件会返回 `true`。在 `if` 指令的代码体中，你首先让敌人转身，然后计算新的\
  \ x 方向速度。请注意，你将随机生成的速度乘以了 x 轴缩放比例。这是为了确保新速度的方向正确。同时，你首先调用了基类的 `updateDelta` 方法，以便选择正确的动画、处理与玩家的碰撞等等。\n\
  \n我能想到的另一种变体是，敌人不再只是简单地从左走到右再折返，而是跟随玩家。同样，它也继承自 `PatrollingEnemy` 类。这是一个名为 `PlayerFollowingEnemy`\
  \ 的类：\n\n```\nclass PlayerFollowingEnemy: PatrollingEnemy {\n    override func updateDelta(delta:\
  \ NSTimeInterval) {\n        super.updateDelta(delta)\n        let player = childNodeWithName(\"\
  //player\") as! Player\n        let direction = player.position.x - self.position.x\n\
  \        if direction * velocity.x < 0 && player.velocity != CGPoint.zeroPoint {\n\
  \            self.turnAround()\n        }\n    }\n}\n```\n\n这个类定义了一个敌人，如果玩家正在移动，它会跟随玩家。这是通过检查敌人当前是否正朝着玩家所在的方向行走（仅考虑\
  \ x 方向）来实现的。如果不是，敌人就会转身。你通过设置一个限制条件来降低敌人的“智能”：仅在玩家在 x 方向上没有移动时（即玩家的 x 方向速度为零）才执行上述操作。\n\
  \n你永远不应该让敌人过于聪明。另外，也不要让它们移动得太快——如果敌人在跟随玩家时速度明显快于玩家，游戏会很快结束。敌人的存在是为了让玩家击败，这样玩家才能赢得游戏。在一个敌人过于聪明或无法战胜的游戏中游玩，乐趣会大打折扣，除非你热衷于一次又一次地“阵亡”！\n\
  \n\n\n## 其他类型的敌人\n\n你可以在游戏中添加的另一种敌人是一只打喷嚏的海龟（见图 25-3）。你可能会问：为什么是海龟？又为什么是打喷嚏的海龟？嗯，我其实也回答不了这个问题。不过，这种敌人设计的思路在于它兼具消极和积极两种属性。消极方面，海龟打喷嚏时会竖起尖刺，所以你不能触碰它。但如果海龟没有打喷嚏，你就可以利用它跳得更高。由于你目前尚未处理交互逻辑，所以暂时只需添加这只带有动画效果的海龟。海龟可供跳跃\
  \ 5 秒，然后它打喷嚏并竖起尖刺持续 5 秒，之后又恢复之前的状态维持 5 秒，如此循环往复。\n\n![A978-1-4842-0650-8_25_Fig3_HTML.jpg](img/A978-1-4842-0650-8_25_Fig3_HTML.jpg)\n\
  \n图 25-3.\n\n别跳到尖刺海龟身上！\n\n该敌人由 `Turtle` 类表示，其设置方式与之前的敌人类似。海龟有两种状态：闲置状态，以及打喷嚏后状态——此时它带有危险的尖刺。在这种情况下，你需要维护两个成员变量来跟踪海龟当前处于哪种状态以及在该状态下经过了多少时间：`waitTime`\
  \ 属性用于追踪当前状态还剩多少时间，而 `sneezing` 属性则用于记录海龟是否正在打喷嚏。同样，在 `updateDelta` 方法中，你需要处理两个阶段之间的切换，就像你对火箭和巡逻敌人所做的那样。这里不再赘述，因为代码与其他敌人类非常相似。你可以查看本章附带的\
  \ `TickTick3` 程序中的完整代码。\n\nSparky 是你添加到游戏中的最后一种敌人类型。和其他敌人一样，Sparky 也有两种状态（见图 25-4）。Sparky\
  \ 是一种非常危险、热爱电力的敌人。它静静地悬浮在空中，直到接收到一股能量冲击后才会坠落。当 Sparky 悬浮在空中时，它并不危险；但一旦它坠落下来，千万别碰它！请参考\
  \ `Sparky` 类的代码。\n\n![A978-1-4842-0650-8_25_Fig4_HTML.jpg](img/A978-1-4842-0650-8_25_Fig4_HTML.jpg)\n\
  \n图 25-4.\n\n当 Sparky 带电时十分危险\n\n### 敌人软件架构\n\n所有这些不同类型的敌人外观不同，行为也各异，但它们通常拥有共同的类设计。你或许可以通过使用几个通用类来设计更好的敌人定义方式，这些类允许你定义状态以及状态之间的转换。每个转换都可以附带条件，例如必须经过一定时间，或者某个动画应该播放完毕。这种结构被称为**有限状态机**。这是人工智能系统中非常常用的一种技术。如果你愿意接受挑战，不妨尝试编写一个有限状态机库，并用它来重新定义现有的敌人！\n\
  \n## 加载不同类型的敌人\n\n既然你已经定义了多种敌人，剩下要做的就是在从文本文件读取关卡数据时将它们加载进来。不同敌人的精灵图使用字符进行标识。\n\n\
  根据加载关卡时读取到的字符，你需要在 `LevelState` 类的 `switch` 指令中添加一些分支，通过调用不同的方法来加载敌人：\n\n```\ncase\
  \ \"R\":\n    return loadRocketTile(x, y: y, moveToLeft: true)\ncase \"r\":\n  \
  \  return loadRocketTile(x, y: y, moveToLeft: false)\ncase \"A\", \"B\", \"C\":\n\
  \    return loadFlameTile(c, x: x, y: y)\ncase \"S\":\n    return loadSparkyTile(x,\
  \ y: y)\ncase \"T\":\n    return loadTurtleTile(x, y: y)\n```\n\n加载敌人非常简单。你只需创建一个想要添加的敌人实例，设置其位置，然后将其添加到\
  \ `world` 节点即可。例如，下面是加载海龟敌人的方法：\n\n```\nfunc loadTurtleTile(x: Int, y: Int) -> SKNode\
  \ {\n    var turtle = Turtle()\n    turtle.position = tileField.layout.toPosition(x,\
  \ row: y)\n    turtle.position.y += 20\n    turtle.zPosition = Layer.Scene1\n  \
  \  world.addChild(turtle)\n    return Tile()\n}\n```\n\n现在，你已经定义了数种具有不同智能水平和能力的敌人。你可以根据自己的游戏需求，定义更聪明、更狡猾，甚至更愚蠢的敌人。你目前没有为敌人应用任何物理效果；不过，一旦你开始构建更智能的敌人——例如能够跳跃或坠落——你就需要像为玩家角色实现物理效果那样来实现物理系统。作为练习，请思考如何在不依赖物理系统的情况下让这些敌人拥有更强的能力。你能让它们在玩家靠近时移动得更快吗？你能创建一个向玩家发射粒子的敌人吗？可能性是无限的，不妨亲自尝试一番！\n\
  \n## 本章小结\n\n在本章中，你学会了以下内容：\n\n*   如何定义不同类型的敌人\n*   如何利用继承来创造多样化的敌人行为\n\n"
- "# 26. 添加玩家交互\n\n电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-0650-8_26](http://dx.doi.org/10.1007/978-1-4842-0650-8_26))\
  \ 包含补充材料，仅供授权用户使用。\n\n在本章中，你将增加玩家与关卡内物体之间更多的交互。目前，玩家可以四处走动，一个基本的物理系统允许玩家跳跃、与墙壁瓦片碰撞或掉出屏幕。首先，你将了解一种非常简单的交互方式：收集水滴。然后，你将看到如何创建让玩家在冰面上滑行的行为。你还会重点处理程序中涉及游戏中各种玩家与敌人交互的部分。最后，你将添加游戏的垂直和水平滚动功能。\n\
  \n## 收集水滴\n\n首先要添加的是玩家收集水滴的功能。当炸弹角色与水滴发生碰撞时，玩家就收集到了该水滴。在这种情况下，你需要让水滴变得不可见。\n\n让水滴在被收集后变得不可见，并非解决只绘制未被收集水滴这一问题的唯一方法，但它是实现起来最简单的方法之一。另一种方法是维护一个已被收集的水滴列表，然后只将玩家仍需寻找的水滴添加到游戏场景中，但这种技术需要编写更多的代码。\n\
  \n检测玩家是否与水滴发生碰撞的代码位于 `WaterDrop` 类中。原因很明确：和之前一样，每个游戏对象负责自己的行为。如果在 `WaterDrop` 类中处理这些碰撞，那么每个水滴都会检查自身是否与玩家发生碰撞。你需要在\
  \ `updateDelta` 方法中编写这段代码。第一步是获取玩家对象：\n\n```\nlet player = childNodeWithName(\"\
  //player\") as! Player\n```\n\n如果水滴当前是可见的，则使用 `CGRect` 的 `intersects` 方法检查它是否与玩家发生碰撞。如果碰撞发生，则将水滴的隐藏状态设置为\
  \ `true`。同时播放一个音效，告知玩家水滴已被收集：\n\n```\nif player.box.intersects(self.box) && !self.hidden\
  \ {\n    self.hidden = true\n    waterCollectedSound.play()\n}\n```\n\n之后，你可以通过检查每个水滴的可见性来判断关卡是否完成。如果所有水滴都变得不可见，就说明玩家已经收集了全部水滴。\n\
  \n\n\n### 冰块\n\n你可以在游戏中添加的另一种交互类型是当玩家行走在冰面上时的特殊行为。当玩家在冰面上移动时，你希望角色以恒定速度继续滑动，并且在玩家松开按钮时不会停止移动。尽管持续滑动并不完全符合现实（在现实生活中你会滑动并减速），但它确实带来了玩家容易理解的可预测行为，这在很多情况下比追求真实感更重要。要实现这一点，你需要做两件事：\n\
  \n*   扩展 `handleInput` 方法以处理在冰面上的移动。\n*   计算玩家是否站在冰面上。\n\n你需要在 `Player` 类中通过名为 `walkingOnIce`\
  \ 的属性来跟踪玩家是否站在冰面上。我们先假设这个属性在其他地方被更新，然后来看如何扩展 `handleInput` 方法。你首先要做的是，当角色在冰面上行走时，提高玩家的行走速度。可以按如下方式操作：\n\
  \n```\nvar walkingSpeed = CGFloat(300)\n\nif self.walkingOnIce {\n    walkingSpeed\
  \ *= 1.5\n}\n```\n\n速度的乘数是一个影响游戏体验的变量。选择合适的值很重要——太快了关卡就无法玩；太慢了，冰面与普通行走表面就没有任何实质性区别。\n\
  \n如果玩家不是在冰面上行走，而是站在地面上，你需要将 x 方向的速度设为零，这样当玩家不再按下触摸按钮时，角色就会停止移动。为了实现这一点，你需要在 `Player`\
  \ 类的 `handleInput` 方法开头添加以下 `if` 指令：\n\n```\nif self.onTheGround && !self.walkingOnIce\
  \ {\n    self.velocity.x = 0\n}\n```\n\n然后处理玩家的输入。如果玩家按下了向左或向右的触摸按钮，你设置相应的 x 方向速度：\n\
  \n```\nif walkLeftButton.down {\n    self.velocity.x = -walkingSpeed\n} else if\
  \ walkRightButton.down {\n    self.velocity.x = walkingSpeed\n}\n```\n\n你唯一需要做的另一件事是判断玩家是否在冰面上行走，并据此更新\
  \ `walkingOnIce` 属性。你已经在使用 `handleCollisions` 方法来检查玩家周围的瓦片，因此要扩展该方法以同时检查玩家是否在冰面上，你只需要添加几行代码。在该方法的开头，你假设玩家不在冰面上，就像你假设玩家不在地面上一样：\n\
  \n```\nself.walkingOnIce = false\n```\n\n玩家只有在位于地面上时才能走在冰面上。你通过以下 `if` 指令来检查他们是否在地面上：\n\
  \n```\nif box.minY - ydifference >= tileBounds.maxY && tileType != .Background {\n\
  \    self.onTheGround = true\n    self.velocity.y = 0\n    self.position.y += depth.y\n\
  }\n```\n\n要检查玩家所站立的瓦片是否为冰瓦片，你需要从瓦片字段中获取该瓦片并检查其 `ice` 属性。你可以通过结合 `let` 关键字的 `if`\
  \ 指令来实现，如下所示：\n\n```\nif let currentTile = tiles.layout.at(x, row: y) as? Tile {\n\
  \    // 对瓦片进行操作\n}\n```\n\n在 `if` 指令内部，你更新 `walkingOnIce` 属性。你使用逻辑或运算符，这样即使玩家只有部分身体在冰瓦片上，该属性也会被设为\
  \ `true`：\n\n```\nself.walkingOnIce = self.walkingOnIce || currentTile.ice\n```\n\
  \n因为你使用逻辑或来计算玩家是否在冰面上行走，所以你会考虑到所有周围的瓦片。其效果是角色会持续移动，直到它不再站立在任何冰瓦片上（即使部分站立也不行）。运行\
  \ TickTick4 示例，来观察玩家角色现在如何与冰面进行交互。\n\n## 敌人与玩家碰撞\n\n最后一种要添加的交互类型是与敌人的碰撞。在很多情况下，当玩家与敌人碰撞时，会导致玩家死亡。在某些情况下，你需要做一些特殊处理（例如，在踩到乌龟时要跳得特别高）。在玩家这边，你需要加载一个额外的动画来显示玩家死亡。因为你不想在玩家死亡后处理玩家输入，所以你需要更新玩家当前的存活状态。你可以使用一个名为\
  \ `alive` 的属性来实现，该属性在 `Player` 实例创建时被设为 `true`。在 `handleInput` 方法中，你检查玩家是否还活着。如果不是，你就从该方法返回，这样就不会处理任何输入：\n\
  \n```\nif !self.alive {\n    return\n}\n```\n\n你还添加一个名为 `die` 的方法让玩家死亡。玩家有两种死亡方式：掉出游戏画面的洞中，以及与敌人碰撞。因此，你向\
  \ `die` 方法传递一个布尔参数，以指示玩家是掉落死亡还是与敌人碰撞死亡。\n\n在 `die` 方法中，你要做几件事。首先，你检查玩家是否已经死亡。如果是，你就直接返回该方法，不做任何操作（毕竟，一个玩家只能死一次）。你将\
  \ `alive` 变量设为 `false`。然后，你将 x 方向的速度设为零，以阻止玩家向左或向右移动。你不需要重置 y 方向的速度，所以玩家会继续下落：死亡并不会导致重力消失。接下来，你确定玩家死亡时要播放哪个声音。如果玩家摔死，产生的音效与死于敌人之手截然不同（千万别在现实中尝试，信我就好）。如果玩家因与敌人碰撞而死，你还会给玩家一个向上的速度。这个向上的速度不太符合现实，但它能带来不错的视觉效果（见图\
  \ 26-1）。最后，你播放 `die` 动画。完整的方法如下：\n\n![A978-1-4842-0650-8_26_Fig1_HTML.jpg](img/A978-1-4842-0650-8_26_Fig1_HTML.jpg)\n\
  \n图 26-1. 玩家与敌人碰撞后死亡\n\n```\nfunc die(falling: Bool = false) {\n    if !alive {\n\
  \        return\n    }\n    alive = false\n    velocity.x = 0\n    if falling {\n\
  \        playerFallSound.play()\n    } else {\n        velocity.y = 600\n      \
  \  playerDieSound.play()\n    }\n    self.playAnimation(\"die\")\n}\n```\n\n你可以在\
  \ `updateDelta` 方法中通过计算玩家的 y 位置是否超出关卡范围来检查玩家是否正在坠落死亡。如果是这种情况，你就调用 `die` 方法：\n\n\
  ```\nlet tiles = childNodeWithName(\"//tileField\") as! TileField\n\nif self.box.maxY\
  \ < tiles.box.minY {\n    self.die(falling: true)\n}\n```\n\n在 `updateDelta` 方法的开头，你调用父类的\
  \ `update` 方法以确保动画被更新：\n\n```\nsuper.updateDelta(delta)\n```\n\n接下来，你处理物理和碰撞（即使玩家已经死亡，这些仍然需要处理）。然后你检查玩家是否还活着。如果不是，你就处理完毕，并从该方法返回。\n\
  \n现在玩家可以通过各种可怕的方式死亡了，你需要扩展敌人类来处理碰撞。在 `Rocket` 类中，你添加一个名为 `checkPlayerCollision`\
  \ 的方法，并在火箭的 `updateDelta` 方法中调用它。在 `checkPlayerCollision` 方法中，你只需检查玩家是否与火箭碰撞。如果是这种情况，你就调用\
  \ `Player` 对象上的 `die` 方法。完整的方法如下：\n\n```\nfunc checkPlayerCollision() {\n    let\
  \ player = childNodeWithName(\"//player\") as! Player\n    if player.box.intersects(self.box)\
  \ {\n        player.die()\n    }\n}\n```\n\n\n```markdown\n在巡逻敌人的情况下，你做了完全相同的事情。你向该类中添加了相同的方法，并从`updateDelta`方法中调用它。`Sparky`类中的版本略有不同：只有在\
  \ Sparky 当前带电时，玩家才应该死亡。因此，你将方法修改如下：\n\n```\nfunc checkPlayerCollision() {\n    let\
  \ player = childNodeWithName(\"//player\") as! Player\n    if player.box.intersects(self.box)\
  \ && self.waitTime <= 0 {\n        player.die()\n    }\n}\n```\n\n最后，`Turtle`敌人增加了更多的行为。你首先检查乌龟是否与玩家碰撞。如果不是这种情况，你只需从`checkPlayerCollision`方法中返回，因为处理完毕：\n\
  \n```\nlet player = childNodeWithName(\"//player\") as! Player\nif !player.box.intersects(self.box)\
  \ {\n    return\n}\n```\n\n如果发生碰撞，有两种可能性。第一种是乌龟正在打喷嚏。在这种情况下，玩家死亡：\n\n```\nif sneezing\
  \ {\n    player.die()\n}\n```\n\n第二种情况是乌龟处于等待模式，并且玩家正在跳到乌龟身上。在这种情况下，玩家应该进行一个额外的超高高跳。检查玩家是否正在跳到乌龟身上的一种简单方法是查看`y`轴速度。假设如果该速度为负，则玩家正在跳到乌龟身上。因此，你调用`jump`方法让玩家跳得更高：\n\
  \n```\nelse if player.velocity.y < 0 && player.alive {\n    player.jump(900)\n}\n\
  ```\n\n当然，你只想在玩家仍然活着时才执行此操作。\n\n你现在已经完成了游戏中角色和对象之间主要交互的编程。还有一个“交互”需要添加到游戏中：玩家角色与设备屏幕之间的交互。\n\
  \n## 添加水平和垂直滚动\n\n你可能已经注意到，关卡通常比任何苹果设备的屏幕都要大。尤其是在 iPad 上，每个关卡的左半部分和右半部分有很大一部分在屏幕上是不可见的。为了确保游戏在所有设备上都能正常工作，你应该添加一种机制，在游戏过程中向玩家显示关卡的相关部分。在平台游戏中实现这一点的最常见方法是添加滚动行为。这意味着当玩家在游戏世界中移动时，游戏世界会在屏幕上随着玩家一起滚动。从某种意义上说，设备屏幕变成了一个移动的虚拟摄像头，可以看到游戏世界的一部分。有些游戏只允许水平（横向）滚动，其他游戏也允许垂直滚动。在\
  \ Tick Tick 中，你将同时添加水平和垂直滚动。\n\n幸运的是，为 Tick Tick 游戏添加滚动非常容易，因为你已经做好了大部分准备工作。在`LevelState`类内部，`world`节点当前包含所有属于该关卡的物品。覆盖层（例如退出按钮或行走和跳跃按钮）不是此节点的一部分。这是一件好事，因为你不希望当关卡开始滚动时，这些按钮移出屏幕！\n\
  \n为了简单起见，我们制作一个非常基础的滚动机制，尝试跟随玩家。你将在`LevelState`的`updateDelta`方法中执行此操作。第一步是调用`super`类方法（以便更新关卡中的所有对象），并获取玩家：\n\
  \n```\nsuper.updateDelta(delta)\nlet player = childNodeWithName(\"//player\") as!\
  \ Player\n```\n\n现在你需要让虚拟摄像头跟随玩家。一种非常简单的方法是将世界位置简单地设置为与玩家位置相同：\n\n```\nworld.position\
  \ = -player.position\n```\n\n注意这里的减号。如果玩家向右移动，世界需要向左移动，这样你仍然可以看到玩家。这个特定指令的结果是，玩家将始终显示在设备屏幕的正中央，因为世界位置现在补偿了玩家位置，并且游戏场景的锚点设置在屏幕中心。虽然这种方法效果很好，但你需要解决一个问题。现在摄像头跟随玩家，当玩家接近关卡边缘时，可能会看到空白区域。这是不可取的。你希望将世界位置限制在其允许的最大值和最小值之间，这样摄像头永远不会部分位于世界之外。\n\
  \n如何计算这些值？我们先看一个例子。假设玩家正在向右移动，并且摄像头正在跟随玩家。这意味着世界节点将向左移动。你能将世界节点向左移动多少，直到开始看到空白空间？如果你将世界向左移动关卡宽度的一半，那么设备屏幕的一半将显示空白空间。为了解决这个问题，需要将设备屏幕宽度的一半加回来，以便关卡的左边缘与设备的左边缘精确对齐。这样就得到了屏幕最左侧的允许位置：\n\
  \n```\nlet minx = CGFloat(-tileField.layout.width/2) + GameScreen.instance.size.width/2\n\
  ```\n\n请参阅图 26-2 的说明。在该图中，玩家已经向右移动得太远，以至于世界位置必须被限制以避免显示空白空间。类似地，你也可以找到世界位置允许的最右侧值：\n\
  \n![A978-1-4842-0650-8_26_Fig2_HTML.jpg](img/A978-1-4842-0650-8_26_Fig2_HTML.jpg)\n\
  \n图 26-2. 屏幕摄像头在关卡边界内跟随玩家\n\n```\nlet maxx = CGFloat(tileField.layout.width/2) -\
  \ GameScreen.instance.size.width/2\n```\n\n并且你可以对`y`轴执行相同操作：\n\n```\nlet miny =\
  \ CGFloat(-tileField.layout.height/2) + GameScreen.instance.size.height/2\nlet maxy\
  \ = CGFloat(tileField.layout.height/2) - GameScreen.instance.size.height/2\n```\n\
  \n剩下的唯一一件事就是将世界位置限制在这些最小值和最大值之间：\n\n```\nworld.position.x = clamp(-player.position.x,\
  \ minx, maxx)\nworld.position.y = clamp(-player.position.y, miny, maxy)\n```\n\n\
  现在滚动在水平和垂直方向上都有效，并且你确保设备屏幕上永远不会显示任何空白空间（除非你的关卡尺寸小于设备尺寸）。查看 TickTick4 示例以查看滚动效果。在第\
  \ 27 章中，你将通过添加背景中的山和移动的云来完成这个游戏。你还将添加管理关卡之间过渡的代码。\n\n## 死亡与否？\n\n我在本节中做了一个选择，即玩家在触碰敌人时立即死亡。其他选择是给玩家多条命，或者为玩家添加一个健康指示器，每次玩家触碰敌人时都会减少。\n\
  \n为游戏添加多条命或健康指示器可以使游戏更有趣，但你也必须确保关卡仍然有足够的难度。作为挑战，尝试为 Tick Tick 游戏扩展一个玩家的生命值条。\n\n\
  ## 你学到了什么\n\n在本章中，你学到了以下内容：\n\n*   如何编程玩家与水滴和敌人的各种交互方式\n*   如何编程冰瓦片的行为\n*   如何在某些情况下导致玩家死亡\n\
  *   如何为游戏添加水平和垂直滚动\n```\n\n\n"
- "# 27. 完成嘀嗒嘀嗒游戏\n\n电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-0650-8_​27](http://dx.doi.org/10.1007/978-1-4842-0650-8_27)）包含补充材料，可供授权用户使用。\n\
  \n在本章中，你将完成嘀嗒嘀嗒游戏。首先，你将添加一个计时器，让玩家在有限的时间内完成每个关卡。然后，你将在背景中添加一些山脉和云朵，使游戏在视觉上更有趣。最后，你将编写允许玩家推进关卡的代码。\n\
  \n## 添加计时器\n\n我们先来看看如何为游戏添加计时器。你不希望计时器占用太多屏幕空间，因此使用文本形式的计时器。`Timer` 类继承自 `SKNode`\
  \ 类，它包含一个背景框以及一个显示剩余时间的标签节点。你需要能够暂停计时器（例如，在关卡完成时），因此添加一个名为 `running` 的布尔属性，用于指示计时器是否正在运行。你将剩余时间存储在一个名为\
  \ `timeLeft` 的属性中。玩家在每个关卡的可用秒数从文本文件中读取，并存储在一个名为 `totalTime` 的属性中。当调用 `reset` 方法时，计时器将被设置为总时间，并开始倒计时。以下是完整的\
  \ `reset` 方法：\n\n```\noverride func reset() {\n    super.reset()\n    self.timeLeft\
  \ = totalTime\n    self.running = true\n}\n```\n\n现在，你唯一需要做的就是实现 `updateDelta` 方法来编写计时器行为。第一步，仅在计时器正在运行且仍有剩余时间时更新它。如果不是这种情况，则从该方法返回：\n\
  \n```\nif self.timeLeft < 0 || !self.running {\n    return\n}\n```\n\n然后，从当前剩余时间中减去已流逝的游戏时间：\n\
  \n```\nself.timeLeft -= delta\n```\n\n接下来，创建你想要在屏幕上显示的文本。你可以简单地在屏幕上显示秒数，但让我们将计时器做得更通用一些，以便也可以定义一个能够处理分钟和秒的计时器。例如，如果你想定义一个从两分钟开始倒数的计时器，可以像这样初始化它：\n\
  \n```\nself.timeLeft = 120\n```\n\n你希望在屏幕上显示“2:00”而不是“120”。为此，你需要在 `updateDelta`\
  \ 方法中计算还剩多少分钟。首先，将当前秒数向上取整。这是必要的，因为你想在第 119 秒到第 120 秒之间在屏幕上显示“2:00”。为此，你使用 `ceil`\
  \ 方法：\n\n```\nlet roundedTimeLeft = Int(ceil(timeLeft))\n```\n\n除了 `ceil` 方法，你还看到了\
  \ `floor` 方法，它是向下取整。所以 `ceil(0.1)` 得到 1，`floor(0.1)` 得到 0。分钟和秒数的计算如下：\n\n```\nlet\
  \ minutes = roundedTimeLeft / 60\nlet seconds = roundedTimeLeft % 60\n```\n\n现在你已经计算出了剩余的分钟数和秒数，可以创建一个字符串绘制在屏幕上：\n\
  \n```\ntextLabel.text = \"\\(minutes):\\(seconds)\"\nif seconds < 10 {\n    textLabel.text\
  \ = \"\\(minutes):0\\(seconds)\"\n}\n```\n\n将文本颜色设置为黄色，以更好地匹配游戏的设计：\n\n```\ntextLabel.fontColor\
  \ = UIColor.yellowColor()\n```\n\n最后，如果玩家剩余完成关卡的时间不多了，你希望提醒他们。你可以通过在屏幕上打印文本时在红色和黄色之间交替来实现。这可以通过一个\
  \ `if` 指令和对取余运算符的巧妙运用来完成：\n\n```\nif timeLeft <= 10 && seconds % 2 == 0 {\n    textLabel.fontColor\
  \ = UIColor.redColor()\n}\n```\n\n虽然用这种方式计算时间对于嘀嗒嘀嗒游戏来说已经足够了，但你可能希望进行更复杂的日期或时间表示。Swift\
  \ 有 `NSDate` 类来表示时间，你可以将其与 `NSDateFormatter` 类结合使用，该类允许你精确指定如何将日期和/或时间表示为字符串。\n\n\
  ### 让计时器变快或变慢\n\n根据玩家行走的地砖类型，时间应该变快或变慢。走在热地砖上会使时间流逝速度加快，而在冰地砖上行走则会减慢。为了实现不同速度的计时器，你在\
  \ `Timer` 类中引入了一个乘数值。这个值存储为一个属性，初始设置为 1：\n\n```\nvar multiplier = 1.0\n```\n\n在计时器运行时考虑这个乘数相当简单。你只需在\
  \ `updateDelta` 方法中将经过的时间乘以乘数即可完成：\n\n```\nself.timeLeft -= delta * multiplier\n\
  ```\n\n现在你可以改变时间流逝的速度，具体取决于玩家行走的地砖类型。在 `Player` 类中，你已经有 `walkingOnIce` 属性，用于指示玩家是否在冰地砖上行走。为了也能处理热地砖，你定义了另一个名为\
  \ `walkingOnHot` 的属性，用于跟踪玩家是否在热地砖上行走。为了确定这个属性的值，你采用与处理 `walkingOnIce` 属性相同的方法。在\
  \ `handleCollisions` 方法中，你首先将此属性设置为 `false`：\n\n```\nself.walkingOnHot = false\n\
  ```\n\n然后添加一行代码，根据玩家当前所在的地砖更新该属性的值：\n\n```\nself.walkingOnHot = self.walkingOnHot\
  \ || currentTile.hot\n```\n\n完整代码请参见属于 TickTickFinal 示例的 `Player` 类。\n\n利用 `walkingOnIce`\
  \ 和 `walkingOnHot` 属性，你现在可以更新计时器乘数。你在玩家的 `updateDelta` 方法中执行此操作：\n\n```\nlet timer\
  \ = childNodeWithName(\"//timer\") as! Timer\nif self.walkingOnHot {\n    timer.multiplier\
  \ = 2.0\n} else if self.walkingOnIce {\n    timer.multiplier = 0.5\n} else {\n \
  \   timer.multiplier = 1\n}\n```\n\n从游戏设计角度来看，明确让玩家知道走在热地砖上会缩短完成关卡的剩余时间可能是个好主意。你可以通过短暂显示警告叠加层、在玩家角色周围显示烟雾动画、或者改变计时器的显示颜色来实现。你也可以播放警告声音。另一种可能性是将背景音乐改为更急促的旋律，让玩家意识到情况发生了变化。\n\
  \n### 适应玩家的技能水平\n\n改变计时器的速度可以使关卡变得容易得多或困难得多。你可以扩展游戏，使得在某些情况下，如果玩家捡到特殊道具，计时器会停止或回退几秒。你甚至可以让关卡进度具有自适应性，这样如果玩家死亡次数过多，每个关卡的最大秒数就会增加。但是，这样做要小心。如果你以过于明显的方式帮助玩家，玩家会意识到并据此调整策略（换句话说，玩家会玩得更差以使关卡更容易）。此外，玩家可能会觉得没有被认真对待。处理每个关卡最大时间自适应的更好方法是允许玩家将之前关卡的剩余时间（部分）转移到当前关卡。这样，困难的关卡可以变得更容易，但玩家必须做点什么才能实现这一点。你也可以考虑增加难度级别，其中较难的关卡有更快的计时器，但也有更好的奖励，例如更多分数、额外的可拾取物品或玩家获得额外能力。休闲游戏玩家可以选择“‘老爸，我能玩吗？’”的难度级别，而熟练玩家可以选择极具挑战性的“‘我是死神化身’”级别。\n\
  \n\n好的，作为高级文档工程师和翻译员，我将严格遵循您的格式和注意事项，将给定的英文文本翻译成中文。\n\n\n### 当计时器归零\n\n当玩家未能按时完成关卡时，炸弹会爆炸，游戏结束。`Player`\
  \ 类中的一个布尔属性指示玩家是否已爆炸。接着，你在该类中添加一个名为 `explode` 的方法，用于启动爆炸过程。这是完整的方法：\n\n```\nfunc\
  \ explode() {\n    if !alive || finished {\n        return\n    }\n    alive = false\n\
  \    exploded = true\n    velocity = CGPoint.zeroPoint\n    position.y -= 100\n\
  \    playAnimation(\"explode\")\n    playerExplodeSound.play()\n}\n```\n\n首先，如果游戏角色一开始就未存活，或者玩家已经完成了关卡，那么角色就不会爆炸。在这两种情况下，你只需从该方法返回即可。接着，你将存活状态设为\
  \ `false`，并爆炸状态设为 `true`。你将速度设为零（爆炸后不会移动）。然后，播放“explode”动画。此动画存储在纹理图集中，包含 49 帧爆炸画面。最后，播放一个合适的音效。\n\
  \n由于重力也不再影响爆炸后的角色，因此只有在玩家未爆炸时才进行重力物理计算：\n\n```\nif !self.exploded {\n    self.velocity.y\
  \ -= CGFloat(1300 * delta)\n}\n```\n\n在 `LevelState` 类的 `updateDelta` 方法中，你需要检查计时器是否已归零，如果是，则调用\
  \ `explode` 方法：\n\n```\nlet timer = childNodeWithName(\"//timer\") as! Timer\nif\
  \ timer.timeLeft < 0 {\n    player.explode()\n}\n```\n\n### 制作游戏资源\n\n想要游戏画面精美，就需要优质的游戏资源。具有一致性的优质游戏资源会使你的游戏对玩家更具吸引力。这不仅包括视觉效果，还包括音效和背景音乐。通常，音效和音乐的价值被低估，但它们是营造氛围的重要因素。观看一部无声电影，远不如观看一部配有情感烘托音乐和衬托角色动作音效的电影有趣。游戏和电影一样，也需要音乐和音效。\n\
  \n作为入门，你可以购买现成的精灵素材包。以下是一些网站，你可以从中免费获取精灵素材、购买精灵素材，或聘请能为你创建精灵素材的艺术家：\n\n*   [`www.supergameasset.com`](http://www.supergameasset.com/)\n\
  *   [`www.graphic-buffet.com`](http://www.graphic-buffet.com/)\n*   [`www.hireanillustrator.com`](http://www.hireanillustrator.com/)\n\
