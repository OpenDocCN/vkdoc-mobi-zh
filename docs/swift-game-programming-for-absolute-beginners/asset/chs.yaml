- "# 1. Swift 语言\n\n电子补充材料：本章在线版本（doi:[10.1007/978-1-4842-0650-8_1](http://dx.doi.org/10.1007/978-1-4842-0650-8_1)）包含仅供授权用户使用的补充材料。\n\
  \n本章将介绍 Swift 编程语言。Swift 是编程语言发展历程中较新的成果之一。要理解 Swift，你首先需要了解计算机（包括 iPad 或 iPhone\
  \ 等 iOS 设备）的工作原理，以及用于给它们编程的语言是如何演变的。在简要讨论计算机和程序（包括应用程序）之后，我将介绍 Swift，以及如何利用它的一些基本特性来创建你的第一个程序。\n\
  \n## 计算机与程序\n\n本节将简要介绍计算机和编程的一般概念。之后，你将开始使用 Swift 编写第一个应用程序。\n\n### 处理器与内存\n\n一般而言，计算机由一个或多个处理器以及多种形式的内存组成。所有现代计算机（包括游戏机、智能手机和平板电脑）都是如此。我定义内存为可以从中读取信息和/或写入信息的东西。内存有多种类型，主要区别在于数据传输速度和数据访问速度。例如，一台计算机可能拥有（相对较慢的）硬盘内存、快得多的\
  \ RAM（随机存取内存）、连接到机器的 USB 闪存驱动器，或者连接到拥有自身内存的服务器的开放网络连接。计算机中的主处理器称为中央处理器（CPU）。计算机上另一种最常见的处理器是图形处理器（GPU）。\n\
  \n处理器的主要任务是执行指令。执行这些指令的效果是改变内存。特别是根据我对内存非常宽泛的定义，处理器执行的每一条指令都会以某种方式改变内存。你很可能不希望计算机只执行一条指令。通常，你会有一长串待执行的指令——“把这部分内存移到那边，清除这部分内存，在屏幕上绘制这张图像，检查玩家是否按下了手柄上的某个键，顺便泡杯咖啡”——而（正如你可能预料的）计算机执行的这一系列指令就称为程序。\n\
  \n### 程序\n\n总之，程序是操作计算机内存的一长串指令。然而，程序本身也存储在内存中。在程序中的指令被执行之前，它们被存储在硬盘、DVD、USB 闪存盘或任何其他存储介质上。当需要执行时，程序会被移动到机器的\
  \ RAM 内存中。\n\n组成程序的指令需要以某种方式进行表达。你可以使用手势，或者发出奇怪的声音。遗憾的是，计算机对此理解得并不好（尽管借助当今的运动追踪设备，或许几年后它就能理解了）。计算机（目前）也无法理解纯英文输入的指令，这就是为什么你需要诸如\
  \ Swift 之类的编程语言。在实践中，指令以文本形式编写，但你需要根据定义编程语言的一套规则，以非常严格的方式编写它们。存在许多编程语言，因为当有人想到一种稍好一点的表达某类指令的方式时，他们的方法往往会成为一门新的编程语言。很难说一共有多少种编程语言，因为这取决于你是否统计一门语言的所有版本和方言；但可以说有数千种之多。\n\
  \n幸运的是，没有必要学习所有这些不同的语言，因为它们有许多相似之处。在早期，编程语言的主要目标是利用计算机的新功能。然而，较新的语言则侧重于为编写程序可能造成的混乱带来一些秩序。\n\
  \n\n\n### 编程语言\n\n在早期，编写电脑游戏是一项极具挑战性的任务，需要高超的技巧。像当时流行的雅达利 2600 这样的游戏机，仅有 128 字节的内存，这与今天的电脑相比（4GB\
  \ 内存大约是 128 字节的 33000 倍）实在是微不足道。它使用的卡带也只拥有最多 4096 字节的 ROM（只读存储器），并且程序与游戏数据都必须存放在其中。这极大地限制了可能性，而且当时的机器运行速度也极其缓慢。\n\
  \n编写这类游戏使用的是`汇编语言`，这是一种非常基础的编程语言，它定义了一组处理器可以执行的指令。不同的处理器可能拥有不同的指令集，从而衍生出不同的汇编语言。因此，每当出现一款新的处理器，所有现有的程序都必须为其完全重写。于是，对独立于处理器的编程语言的需求应运而生。由此诞生了诸如`Fortran`（公式翻译系统）和`BASIC`（初学者通用符号指令代码）这样的语言。`BASIC`在\
  \ 20 世纪 70 年代非常流行，因为它随早期的个人电脑一同推出，如 1978 年的苹果 II、1979 年的 IBM-PC 及其后续机型。遗憾的是，这种语言从未被标准化，因此每个电脑品牌都使用了自己版本的`BASIC`方言。\n\
  \n随着程序日益复杂，显然需要一种更好的方式来组织所有这些指令。于是，过程式语言被创造出来；它们将指令分组到过程（也称为函数或方法）中。过程式语言的一个著名例子是`C`，它由贝尔实验室在\
  \ 20 世纪 70 年代末定义。`C`至今仍被广泛使用，尽管它正逐渐但坚定地被更现代的语言所取代，尤其是在游戏行业。\n\n多年来，游戏程序变得庞大得多，并且是由团队而非个人来创建。代码的可读性、可复用性和易于调试变得至关重要。面向对象的编程语言满足了这一需求，它允许程序员将方法分组到一种称为`类`的结构中。与方法组相关联的内存区域被称为`对象`。一个`类`可以描述像《吃豆人》游戏中的幽灵这样的东西。那么每个单独的幽灵就对应于该`类`的一个`对象`。这种编程思维方式应用于游戏时非常强大。面向对象编程的另一个强大方面是继承，它允许开发者扩展现有代码并为其添加功能。你将在第\
  \ 10 章中了解更多关于继承以及如何在游戏中使用它的内容。\n\n在 80 年代早期，两位名为布拉德·考克斯和汤姆·洛夫的程序员创造了一种名为`Objective-C`的语言，它是`C`语言的扩展，能够实现面向对象编程。1988\
  \ 年，`Objective-C`语言被授权给 NeXT 公司，这家公司由史蒂夫·乔布斯在 1985 年被苹果公司排挤出走后创立。NeXT 围绕`Objective-C`语言开发了大量工具，例如一个用于构建界面的工具，以及一个名为\
  \ Project Builder 的开发环境，也就是我们现在称为`Xcode`的前身。当乔布斯在 90 年代重返苹果时，NeXT 开发的这些工具成为了 Mac\
  \ OS X 的基础。\n\n在过去的二十年里，像`Java`和`C#`这样的新语言进一步引入了许多有用的特性。苹果意识到其平台需要一种能够受益于过去几十年编程语言进步的新语言。于是，在\
  \ 2014 年 6 月 2 日，苹果发布了`Swift`编程语言，作为 OS X 和 iOS 的新编程语言。`Swift`是比`Objective-C`更现代的替代方案。它吸收了`C#`或`JavaScript`等语言的许多特性，这使得为\
  \ OS X 或 iOS 编写程序变得高效得多。由于 iOS 应用市场巨大，`Swift`将对整个行业产生重大影响。本书将深入教授你`Swift`语言，并特别侧重于游戏开发。读完本章后，你将用`Swift`创建你的第一个程序。\n\
  \n### 编程游戏\n\n本书的目标是教你如何编写游戏程序。游戏是非常有趣（有时也颇具挑战性！）的程序。它们涉及大量不同的输入和输出设备，并且游戏所创造的虚构世界可能极其复杂。\n\
  \n直到 20 世纪 90 年代初，游戏都是针对特定平台开发的。例如，为某款特定游戏机编写的游戏，如果没有程序员付出巨大努力来使其适应不同的硬件，就无法在其他任何设备上运行。在\
  \ 80 年代，街机游戏极为流行，但由于计算机硬件不断变化和改进，为它们编写的代码几乎无法复用于更新的游戏。\n\n随着游戏变得日益复杂，并且操作系统变得更加独立于硬件，游戏公司开始复用先前游戏中的代码便显得合情合理。如果你可以直接使用先前发布游戏中的渲染程序或碰撞检测程序，何必为每个新游戏从头编写全新的程序呢？“游戏引擎”这个术语诞生于\
  \ 20 世纪 90 年代，当时像《毁灭战士》和《雷神之锤》这样的第一人称射击游戏变得非常流行。这些游戏如此受欢迎，以至于其制造商`id Software`决定将部分游戏代码作为独立的软件，授权给其他游戏公司使用。\n\
  \n如今有许多不同的游戏引擎可供使用。现代游戏引擎为游戏开发者提供了大量功能，例如 2D 和 3D 渲染引擎、粒子特效和光照特效、声音、动画、人工智能、脚本等等。本书游戏主要使用的引擎是`SpriteKit`。`SpriteKit`是苹果公司开发的一款面向游戏开发的引擎。读完本书后，你将了解该引擎的所有主要方面，并知道如何使用它来创建自己的游戏。\n\
  \n### 开发游戏\n\n游戏开发通常采用两种方法。图 1-1 展示了这两种方法：外环包含内环。当人们初次学习编程时，他们通常会立刻开始编写代码，这会导致一个编写、测试、然后修改的紧密循环。相比之下，专业程序员在编写第一行代码之前，会花大量前期时间进行设计工作。\n\
  \n![A978-1-4842-0650-8_1_Fig1_HTML.gif](img/A978-1-4842-0650-8_1_Fig1_HTML.gif)\n\
  \n图 1-1. 小规模编程与大规模编程\n\n\n\n### 小规模：编写-编译-运行\n\n当你想用 Swift 构建游戏时，需要编写一个包含许多行指令的程序。借助\
  \ Xcode 框架，你可以编辑正在开发的程序。一个程序通常由不同的文本文件组成，每个文件都包含指令。写完这些指令后，你告诉 Xcode 程序编译所编写的代码并执行该程序。一切顺利的话，程序会完成编译并正常运行。\n\
  \n然而，大多数时候事情并不那么简单。首先，你提供给编译器的文本文件必须包含有效的 Swift 代码，因为你不能指望计算机去编译那些毫无意义的胡乱内容。Xcode\
  \ 程序会检查源代码是否符合 Swift 语言规范。如果不符合，就会报错并停止编译过程。当然，程序员会努力编写正确的 Swift 程序，但很容易出现拼写错误，而且正确程序的编写规则非常严格。因此，你在编译阶段几乎肯定会遇到错误。\n\
  \n经过几轮修正小错误后，源代码终于能顺利编译通过。下一步，计算机就会执行或运行刚刚创建的程序。这时你常常会发现，程序并没有完全按照你的预期工作。当然，你确实努力准确地表达了期望程序做什么，但概念上的错误很容易出现。\n\
  \n于是你回到文本编辑器，修改代码。然后再次尝试编译并运行程序，希望自己没有犯新的拼写错误。你可能会发现之前的问题解决了，但很快又意识到，虽然程序表现不同了，却依然没有完全达到你的要求。于是你再次回到编辑器。欢迎来到程序员的世界！\n\
  \n### 大规模：设计-规格-实现\n\n一旦你的游戏变得复杂，就不再适合直接埋头码代码直到完成。在开始实现（编写和测试游戏）之前，还有两个阶段。\n\n首先，你需要设计游戏。你在构建什么类型的游戏？目标受众是谁？是\
  \ 2D 游戏还是 3D 游戏？你想要模拟什么样的游戏玩法？游戏中包含哪些角色，他们有哪些能力？尤其是当你在与他人共同开发游戏时，必须撰写某种包含所有这些信息的设计文档，以确保大家对正在开发的游戏达成共识！即使是独自开发游戏，写下设计思路也是一个好主意。设计阶段实际上是游戏开发中最困难的任务之一。\n\
  \n当明确了游戏应该做什么之后，下一步就是为程序提供全局结构。这被称为规格说明阶段。你还记得面向对象编程范式将指令组织成方法，并将方法组织成类吗？在规格说明阶段，你需要概览游戏所需的类以及这些类中的方法。在此阶段，你只需描述方法将做什么，而不需要关心如何实现。但请记住，不能对方法提出不切实际的要求：它们之后必须被实现。\n\
  \n当游戏规格说明完成后，就可以开始实现阶段了，这通常意味着要多次经历编写-编译-运行的循环。之后，你可以让其他人试玩你的游戏。大多数情况下，你会意识到游戏设计中的某些想法效果并不好。于是，你从头开始，修改设计，接着修改规格说明，最后进行新的实现。然后再次让别人试玩你的游戏，接着……嗯，你懂的。编写-编译-运行这个循环被包含在一个更大规模的循环中：设计-规格说明-实现循环（见图\
  \ 1-1）。虽然本书主要侧重于实现阶段，但你会在各章节中看到关于游戏设计的技巧和窍门。\n\n\n\n## 构建你的第一个 Swift 程序\n\n在本节中，你将学习如何使用\
  \ Swift 语言创建一个简单的程序（另请参见本章附带的 `HelloWorld` 示例）。由于你将使用 Xcode 开发环境，请先启动 `Xcode` 程序。点击欢迎屏幕上显示的\
  \ **Create a new Xcode Project**。此时会弹出一个对话框，允许你在多个模板项目之间进行选择。默认情况下，Xcode 提供了 iOS\
  \ 项目（在 iPhone 或 iPad 上运行的应用程序）、watchOS 项目（在 Apple Watch 上运行的应用程序）和 OS X 项目（在 Mac\
  \ 上运行的应用程序）的模板。我们先创建一个简单的 OS X 控制台应用程序。为此，请单击 OS X 下的 **Application** 项，然后选择 **Command\
  \ Line Tool** 项目模板（见图 1-2）。\n\n![A978-1-4842-0650-8_1_Fig2_HTML.jpg](img/A978-1-4842-0650-8_1_Fig2_HTML.jpg)\n\
  \n**图 1-2.** 项目模板选择对话框\n\n命令行工具（也称为控制台应用程序）是现有最基本的程序类型之一。命令行工具是一个简单的程序，用于读取和/或输出文本。\n\
  \n选择 **Command Line Tool** 选项后，点击 **Next** 按钮。然后，选择一个产品名称（例如 `HelloWorld`）。在同一个窗口中，确保为项目选择的语言是\
  \ Swift。点击 **Next** 后，你必须选择一个用于存放项目和代码的文件夹；例如，你可以将其保存到桌面。选定项目位置后，点击 **Create**。你就创建好了一个可以编写代码的基本项目。\n\
  \n在左侧，你会看到与项目关联的项。有两个文件夹。一个文件夹包含一个名为 `main.swift` 的项，这是一个包含程序指令的文本文件。第二个文件夹（名为 `Products`）包含一个项，其名称就是你为产品选择的名称。此项带有一个命令行工具图标，这意味着该项目创建出的产品是一个命令行工具。\n\
  \n如果你点击 `main.swift` 项，会看到该文件在编辑器中打开。模板项目已经为你添加了几行代码作为起点。其中最重要的一行是：\n\n`print(\"\
  Hello, World!\")`\n\n这条指令告诉计算机向控制台写入一行文本。需要写入的文本位于括号之间。在 Swift 中，任何文本表达式都始终写在双引号之间。要查看此程序的作用，请点击\
  \ Xcode 窗口左上角的 **Play** 按钮（见图 1-3）。这会编译并运行该程序。程序运行时，你将在 Xcode 窗口底部的调试区域看到其输出（也显示在图\
  \ 1-3 中）。如果你看不到调试区域，请点击 Xcode 窗口右上角对应的视图按钮来激活它。在图 1-3 中，你可以在窗口右上角看到三个视图按钮。左侧按钮显示或隐藏列出项目中文件和文件夹的窗口部分。右侧按钮切换显示项目属性的面板。中间的按钮显示或隐藏调试区域。程序运行后，你会看到文本\
  \ `Hello, World!` 出现在那里，同时还有一条消息显示程序已执行完毕。\n\n![A978-1-4842-0650-8_1_Fig3_HTML.jpg](img/A978-1-4842-0650-8_1_Fig3_HTML.jpg)\n\
  \n**图 1-3.** `HelloWorld` 程序执行后 Xcode 环境的截图\n\n现在你可以开始修改代码来改变程序的行为。例如，在你的代码中添加以下一行：\n\
  \n`print(\"Goodbye, World!\")`\n\n当你运行此程序时，调试区域会打印出两行。现在将代码修改为以下两行：\n\n`print(\"\
  Hello, World!\", appendNewline: false)`\n\n`print(\"Goodbye, World!\")`\n\n运行此程序后，你会看到两段文本被写在一起。这是因为\
  \ `print` 函数会在向控制台写入文本后添加一个换行符，除非你另有指定（这就是我在上面第一个 `print` 指令中所做的）。你执行的最后一个程序由两个指令组成。每个指令告诉编译器执行一个由其他指令组成的函数（或方法）。`print`\
  \ 就是一个函数的例子。这里你可以清楚地看到 Swift 确实是一种过程式语言。指令被分组到函数/方法中。\n\n你可以非常轻松地将自己的指令分组到自己的函数/方法中。看一下下面的程序：\n\
  \n```\nfunc printData() {\n    print(\"Name: Shirley\")\n    print(\"Age: 26\")\n\
  \    print(\"Profession: Teacher\")\n    print(\"Married: yes\")\n    print(\"Children:\
  \ 2\")\n}\n\nprintData()\nprintData()\nprintData()\n```\n\n在这个例子中，我创建了一个将五个指令组合在一起的函数。你可以使用\
  \ `func` 关键字和一个名称来创建函数。在名称之后，写上括号（关于这一点稍后会详细介绍）。属于该函数的指令写在花括号 `{` 和 `}` 之间。定义此函数后，你可以通过编写函数名加一对括号来调用它。在这个例子中，我调用了\
  \ `printData` 函数三次。结果是构成该函数的指令全部被执行了三次。在编辑器中输入上面的代码，亲自看看它的作用。你能修改程序，使数据被打印六次吗？现在修改程序，使其也打印出人物所在的国家。尝试添加第二个函数，用于显示另一个人的数据。你能修改程序，使其交替显示这两个不同人物的数据吗？\n\
  \n如果你再看一下这个程序，或许会意识到定义函数和执行函数内部编写的指令之间存在区别。在上面的程序中，第一部分定义了一个函数；第二部分执行（或调用）了一个函数。每当你调用一个函数时，你总需要在函数调用的后面写上括号，就像这样：\n\
  \n`printData()`\n\n之所以有这些括号，是因为有时函数需要额外的信息才能完成其工作。`print` 函数就是一个很好的例子，它需要文本作为额外信息。毕竟，如果一个打印函数无法被告知它应该打印什么，那它还有什么用呢？和\
  \ `printData` 函数一样，`print` 函数在被调用时后面也有括号。区别在于，对于 `print` 来说，括号之间确实有信息，即要打印的文本：\n\
  \n`print(\"Hello, World!\")`\n\n稍后，你会看到更多关于函数以及如何调用它们的示例。由于本书是关于编写游戏程序的，现在让我们实际制作一个\
  \ iOS 游戏应用程序。\n\n\n\n## 构建你的首个 Swift 游戏\n\n要开始编写 iOS 游戏程序，你需要先创建一个合适的项目。由于 iOS 游戏的功能远不止打印文本，因此需要创建一个游戏项目。这非常简单。在\
  \ Xcode 中，进入主菜单并选择**文件** ➤ **新建** ➤ **项目**。然后，在 iOS 类别中选择**游戏**模板。点击**下一步**后，为你的游戏输入一个合适的名称，例如\
  \ `BasicGame`。同样，确保已选择 `Swift` 作为主要语言。同时，确保已选择 `SpriteKit` 作为将要使用的游戏技术。`SpriteKit`\
  \ 是一组由 Apple 创建、对游戏开发很有用的函数和类的集合。最后，选择一个用于存储游戏项目及其源代码的文件夹，然后点击**创建**。或者，你也可以查看本章附带的\
  \ `BasicGame` 示例，该示例已经采用了正确的格式。\n\n如果你查看刚创建的游戏项目中的文件，就会发现基础的 iOS 游戏比命令行工具应用程序要复杂得多。你将要修改代码的主要文件是名为\
  \ `GameScene.swift` 的文件。其他文件则用于为 iOS 游戏设置正确的环境。在 `GameScene.swift` 文件中，你可以编写特定于自己游戏的代码。代码中最重要的部分是指令如下：\n\
  \n```\nimport SpriteKit\n\nclass GameScene: SKScene {\n\n    override func didMoveToView(view:\
  \ SKView) {\n        /* Setup your scene here */\n        let myLabel = SKLabelNode(fontNamed:\"\
  Chalkduster\")\n        myLabel.text = \"Hello, World!\"\n        myLabel.fontSize\
  \ = 65\n        myLabel.position = CGPoint(x:CGRectGetMidX(self.frame),\n      \
  \  y:CGRectGetMidY(self.frame))\n\n        self.addChild(myLabel)\n    }\n\n   \
  \ ...\n\n}\n```\n\n在不深入细节的前提下，让我们看看这段代码的结构。第一条指令 `import SpriteKit` 用于告诉编译器，程序需要\
  \ `SpriteKit` 中的函数和类。这与使用 `print` 这样的函数不同。`print` 函数是内置于语言本身的。而处理精灵（图像）的函数和类则相当具体，因此它们被放在一个单独的集合中，也称为框架（framework）。在程序的开头，你可能会看到一条或多条这样的\
  \ `import` 指令，具体取决于程序需要用到哪些功能。\n\n在框架导入指令之后，你可以看到一个类。从这里可以看出 Swift 是一种面向对象的语言。指令被分组为方法，而方法又被分组为类。在这个示例中你也可以看到同样的结构。有三条指令被分组到一个名为\
  \ `didMoveToView` 的方法中。这个方法属于一个名为 `GameScene` 的类。当我们定义函数或方法时，使用 `func` 关键字。当我们定义类时，使用\
  \ `class` 关键字。程序员使用方法和类来更好地组织代码，以便更容易理解每个部分的作用以及它们与程序其他部分的关联。在这个例子中，`GameScene`\
  \ 类将对游戏场景（即游戏世界）进行操作的方法分组。`didMoveToView` 方法包含了当游戏出现在设备屏幕上时需要执行的指令。\n\n### 函数还是方法？\n\
  \n正如本章所讨论的，过程式编程语言将指令分组为函数/方法。在面向对象语言中，函数和方法又被分组为类。那么函数和方法之间有什么区别呢？实际上，并没有真正的区别。在本书中，只有当函数是类的一部分时，我才称之为方法。因此，iOS\
  \ 示例中的 `didMoveToView` 是一个方法，而 `printData`（来自命令行工具示例）是一个函数。它们都是对指令进行分组，但 `didMoveToView`\
  \ 属于一个类（`GameScene`），而 `printData` 则不属于任何类。\n\n`didMoveToView` 方法中的第一行代码（`/* Setup\
  \ your scene here */`）是一条 Xcode 程序会忽略的注释。第二行是一条创建名为标签节点的指令。标签节点代表一个你可以放置在屏幕任意位置的文本标签。它之后的两条指令为标签设置了文本和字体大小。接着，你会看到一条为该标签节点分配位置的指令。这条指令看起来相当复杂，因为它定义位置时计算了屏幕的中心点。你也可以编写一条更简单的指令：\n\
  \n`myLabel.position = CGPoint(x:500, y:300)`\n\n尝试为文本在屏幕上的 x 和 y 位置设置几个不同的值。请注意，当你使用\
  \ `SpriteKit` 框架时，屏幕的原点位于左下角，并跟随设备的方向，如图 1-4 所示。\n\n![A978-1-4842-0650-8_1_Fig4_HTML.gif](img/A978-1-4842-0650-8_1_Fig4_HTML.gif)\n\
  \n**图 1-4.** iDevice 的坐标系将原点置于屏幕左下角，无论设备方向如何\n\n另外要注意，当您设置文本标签等对象的位置时，位置 `(500,\
  \ 300)` 将位于屏幕上所放置文本的底部中央。\n\n该方法中的最后一条指令告诉游戏引擎，该标签应该是场景的一部分。如果省略了这条指令，文本标签将不会被绘制出来。你可以按下屏幕左上角的**播放**按钮来启动应用程序。在该按钮的右侧，你可以选择要为哪个设备构建应用程序。当你运行应用程序时，Xcode\
  \ 会启动一个模拟器程序，向你展示应用程序在你所选设备上的外观。例如，图 1-5 展示了应用程序在 iPhone 4s 模拟器中运行的样子。尝试在几个不同的平台上模拟应用程序。如果模拟器屏幕太大，你可以通过按\
  \ **Command+1**、**Command+2** 或 **Command+3** 来选择其他缩放比例。你也可以通过在 iOS 模拟器菜单中选择**窗口**\
  \ ➤ **缩放**来更改缩放比例。\n\n![A978-1-4842-0650-8_1_Fig5_HTML.jpg](img/A978-1-4842-0650-8_1_Fig5_HTML.jpg)\n\
  \n**图 1-5.** 一个基础的 iOS 游戏应用程序（以 iPhone 4s 模式运行）\n\n再次尝试使用这个程序。你能在屏幕上绘制不同的文本吗？更改文本的位置，看看不同的\
  \ `x` 和 `y` 值如何导致文本在屏幕上处于不同的位置。\n\n\n\n## 几点观察\n\n在 iOS 游戏示例中，代码包含许多你可能尚未识别的元素。例如，在类名（`GameScene`）后面有一个冒号和单词`SKScene`。这意味着`GameScene`类基于一个名为`SKScene`的现有类。也可以说`GameScene\
  \ 是 SKScene 的一个特殊版本`。请注意，`SKScene`包含了一些方法。`GameScene`复制了这些方法，但替换了其中一个，即`didMoveToView`方法。这就是为什么该方法定义前面有`override`关键词。如果你觉得信息量很大，别担心。我将在本书的第\
  \ 10 章中详细讲解这一方面。\n\n这些指令本身可能对你而言也意义不大。在接下来的章节中，我会进一步解释这些指令的含义。无论如何，你会发现创建一个简单的 iOS\
  \ 应用比简单的命令行工具要复杂得多。还有其他类型的应用程序也可以用 Swift 开发，例如带有窗口、按钮等的 OS X 应用。这类应用需要另一种方式来设置所需的类和方法（但这已超出本书范围）。\n\
  \n你可能还注意到，指令或方法的执行顺序不再那么清晰。当你查看最简单的命令行工具时，只有一条指令向控制台输出\"Hello, World!\"。执行时，程序只运行那一条指令。而当你的程序包含多个类，这些类又分组了多个方法，而方法内部则分组了指令时，要确定哪些指令会执行以及执行顺序就不再那么直观了。以本书中的\
  \ iOS 示例为例，幕后发生了许多事情，以确保最终`didMoveToView`方法会被调用。然而，仅从代码本身无法清晰地看到这一点。在这种情况下，你必须依赖\
  \ Apple 的 SpriteKit 文档，该文档说明`didMoveToView`方法会被调用，并且你可以将自己的游戏初始化代码放在其中。作为游戏开发者，你并不总能理解游戏应用程序的所有代码。你通常会使用其他开发者编写的代码，并且希望这些代码中错误不要太多。另一种选择是自己从头开发一切。但在游戏行业这样一个快速发展的领域中，这样做并不明智。引用著名作家卡尔·萨根的话：\"\
  如果你想从头制作一个苹果派，你必须先发明宇宙。\"\n\n## 本章所学\n\n在本章中，你学习了以下内容：\n\n*   计算机的工作原理，以及它们由负责计算的处理器和负责存储的内存组成\n\
  *   编程语言如何从汇编语言发展到 Swift 等现代编程语言\n*   如何使用 Swift 语言创建一个简单的应用程序\n\n"
- "# 游戏编程基础\n\n电子补充资料：本章在线版本 (doi:[10.​1007/​978-1-4842-0650-8_​2](http://dx.doi.org/10.1007/978-1-4842-0650-8_2))\
  \ 包含补充资料，仅供授权用户使用。\n\n本章涵盖游戏编程的基本要素，并为后续章节提供起点。首先，你将学习任何游戏的基本框架，包括游戏世界和游戏循环。你将通过查看各种示例（例如一个改变背景颜色的简单应用程序）了解如何在\
  \ Swift 中创建这个框架。最后，我将讨论如何通过合理使用注释、布局和空白来使代码更清晰。\n\n## 游戏的构建模块\n\n本节讨论游戏的构建模块。我将首先概述游戏世界，然后向你展示使用游戏循环改变游戏世界的过程，该循环在将游戏世界绘制到屏幕之前不断更新它。\n\
  \n### 游戏世界\n\n游戏之所以成为一种有趣的娱乐形式，是因为你可以探索一个虚构的世界，并在其中做一些现实生活中永远不会做的事情。你可以骑在龙背上，摧毁整个太阳系，或者创造一个使用虚构语言交流的复杂文明。这个你玩游戏时所处的虚拟领域被称为**游戏世界**。游戏世界可以像俄罗斯方块世界那样简单，也可以像《侠盗猎车手》和《魔兽世界》中复杂的虚拟世界那样庞大。\n\
  \n当游戏在计算机或智能手机上运行时，设备会维护一个游戏世界的内部表示。这种表示看起来完全不像你在玩游戏时屏幕上显示的内容。它主要由数字组成，描述对象的位置、敌人对玩家能造成多少伤害、玩家背包中有多少物品等等。幸运的是，程序也知道如何创建这个世界的视觉上令人愉悦的表示，并将其显示在屏幕上。否则，玩电脑游戏可能会变得极其无聊，玩家需要在成堆的数字中翻找，才能知道自己是否救出了公主，还是惨死了。玩家从未见过游戏世界的内部表示，但游戏开发者却会看到。当你想要开发一款游戏时，你也需要设计如何在内部表示你的游戏世界。而自己编写游戏程序的乐趣之一，就在于你可以完全控制这一切。\n\
  \n另一个需要认识到的重要点是：就像现实世界一样，游戏世界也在不断变化。怪物会移动到不同的位置、天气会变化、汽车会用完汽油、敌人会被消灭，等等。此外，玩家实际上也在影响着游戏世界的变化！因此，仅仅在计算机内存中存储游戏世界的表示是不够的。游戏还需要持续记录玩家的操作，并据此更新这个表示。此外，游戏还需要通过在计算机显示器、电视或智能手机屏幕上显示，将游戏世界呈现给玩家。处理这一切的过程被称为**游戏循环**。\n\
  \n\n\n### 游戏循环\n\n游戏循环负责处理游戏中的动态方面。在游戏运行期间，会发生很多事情。玩家按下游戏手柄上的按钮或触摸设备屏幕，一个不断变化的游戏世界（包含关卡、怪物和其他角色）需要保持同步更新。此外，还有爆炸特效、音效以及更多其他内容。所有这些由游戏循环处理的不同任务可以归纳为两类：\n\
  \n-   与更新和维护游戏世界相关的任务\n-   与向玩家展示游戏世界相关的任务\n\n游戏循环会连续不断地依次执行这些任务（见图 2-1）。举个例子，让我们看看在像《吃豆人》这样简单的游戏中如何处理玩家导航。游戏世界主要由一个迷宫构成，里面有几个讨厌的鬼魂在移动。吃豆人位于迷宫的某个位置，并朝着特定方向移动。在第一个任务（更新和维护游戏世界）中，你需要检查玩家是否按下了方向键。如果是，则需要根据玩家希望吃豆人移动的方向来更新其位置。此外，由于这次移动，吃豆人可能吃掉了一个白点，这会增加分数。你需要检查这是否是关卡中的最后一个白点，因为那意味着玩家已完成了本关。如果是较大的白点，则需要让鬼魂失效。接着，你需要更新游戏世界的其余部分：鬼魂的位置需要更新，你必须决定是否应在某处显示水果以获取奖励分数，还需要检查吃豆人是否与某个鬼魂相撞（如果该鬼魂尚未失效）等等。你可以看到，即使是在像《吃豆人》这样简单的游戏中，第一个任务中也需要完成大量工作。从现在开始，我将这一系列与更新和维护游戏世界相关的不同任务称为“更新操作”。\n\
  \n![A978-1-4842-0650-8_2_Fig1_HTML.gif](img/A978-1-4842-0650-8_2_Fig1_HTML.gif)\n\
  \n图 2-1. 游戏循环，持续更新并绘制游戏世界\n\n第二组任务与向玩家展示游戏世界相关。在《吃豆人》游戏中，这意味着绘制迷宫、鬼魂、吃豆人以及玩家需要了解的重要游戏信息，例如他们已获得多少分数、还剩几条命等等。这些信息可以显示在游戏屏幕的不同区域，例如顶部或底部。这部分显示内容也称为抬头显示。现代\
  \ 3D 游戏拥有一套更为复杂的绘制任务。这些游戏需要处理光照与阴影、反射、剔除、爆炸等视觉效果，以及更多内容。我将把游戏循环中处理所有与向玩家展示游戏世界相关的任务部分称为“绘制操作”。\n\
  \n### Swift 中的游戏循环\n\n上一章展示了如何创建一个简单的 Swift iOS 游戏应用程序。在该应用程序中，你看到指令被分组到某个方法中，而该方法又作为某个类的一部分，如下所示：\n\
  \n```\nclass GameScene: SKScene {\n\n    override func didMoveToView(view: SKView)\
  \ {\n        /* 在此处设置你的场景 */\n        let myLabel = SKLabelNode(fontNamed:\"Chalkduster\"\
  )\n        myLabel.text = \"Hello, World!\"\n        myLabel.fontSize = 65\n   \
  \     myLabel.position = CGPoint(x:CGRectGetMidX(self.frame),\n                \
  \                   y:CGRectGetMidY(self.frame))\n        self.addChild(myLabel)\n\
  \    }\n\n    ...\n}\n```\n\n基本上，`didMoveToView` 方法在此处只完成一项工作：创建一个游戏世界。这个游戏世界非常简单，因为它只包含一个文本标签。那么，游戏循环在这个示例中是如何发挥作用的呢？事实上，游戏循环的绘制部分已经由\
  \ SpriteKit 引擎处理了。`didMoveToView` 方法中的最后一条指令确保了 SpriteKit 引擎内部的绘制代码知道它应该绘制这个文本标签。如果你想创建一个更复杂的游戏世界，只需在\
  \ `didMoveToView` 中添加更多指令来创建游戏世界中的对象即可。因此，创建和绘制游戏世界似乎是可行的。但是，如何更改游戏世界呢？这就是“更新操作”的用武之地。看看下面的示例程序（另请参阅本章附带的\
  \ BackgroundColor 项目）：\n\n```\nimport SpriteKit\n\nclass GameScene: SKScene {\n\n\
  \    override func didMoveToView(view: SKView) {\n        let myLabel = SKLabelNode(fontNamed:\"\
  Chalkduster\")\n        myLabel.text = \"Hello, World!\"\n        myLabel.fontSize\
  \ = 65\n        myLabel.position = CGPoint(x:CGRectGetMidX(self.frame),\n      \
  \                             y:CGRectGetMidY(self.frame))\n        addChild(myLabel)\n\
  \    }\n\n    override func update(currentTime: NSTimeInterval) {\n        backgroundColor\
  \ = UIColor.blueColor()\n    }\n}\n```\n\n如你所见，该程序与上一个示例的重大区别在于，`GameScene` 类现在包含了以下两个方法：一个名为\
  \ `didMoveToView`，另一个名为 `update`。后者是将作为游戏循环一部分执行的方法。由于 `GameScene` 类是 `SKScene`\
  \ 类的一个特殊版本，我们本书中使用的 SpriteKit 框架已经负责创建游戏循环并调用 `update` 方法。在此示例中，`update` 方法包含一条指令：\n\
  \n```\nbackgroundColor = UIColor.blueColor()\n```\n\n这条指令将应用程序的背景颜色更改为蓝色。运行本章附带的\
  \ BackgroundColor 示例，查看程序的效果。现在，看看你是否能将背景颜色更改为其他颜色。你能把它改成红色吗？或者黄色？\n\n当你运行程序时，实际上无法看到\
  \ `update` 方法每秒被调用多次。在 `update` 方法的花括号内的指令之间添加以下指令：\n\n```\nprint(currentTime)\n\
  ```\n\n现在运行程序，你会看到一个缓慢增长的数字被打印到控制台。这个数字表示当前系统时间，以设备上次重启后经过的秒数计算。每次调用 `update` 方法时，系统时间都会打印到控制台。\n\
  \n如果你想了解 `update` 方法每秒被调用的频率，有一种简单的方法可以找到答案。点击名为 `GameViewController.swift` 的文件。在\
  \ `viewWillLayoutSubviews` 方法中，紧邻结束花括号之前，添加以下指令：\n\n```\nskView.showsFPS = true\n\
  ```\n\n现在运行程序，你会看到一个数字显示在屏幕上。这个数字也称为帧率，表示游戏世界每秒被更新并绘制到屏幕上的次数。为了实现流畅的游戏体验，游戏世界需要持续不断地更新和绘制：更新、绘制、更新、绘制、更新、绘制、更新、绘制、更新、绘制，如此循环。而且，这以非常高的速度进行。苹果设备（如\
  \ iPad 或 iPhone）所能处理的帧率最高为每秒 60 帧（或 60 Hz）。高于此值是不可能的，因为设备屏幕的刷新率为 60 Hz。不过，帧率可能会因为\
  \ `update` 方法中的计算耗时过多而下降。在第 6 章中，我将更详细地讨论这个问题，以及你可以采取哪些措施来确保你的游戏在旧款和新款苹果设备上都能流畅运行。\n\
  \n本书将向你展示多种方法，让你能够将游戏所需执行的任务填充到 `update` 方法中。在此过程中，我还会介绍许多对游戏（以及其他应用程序）有用的编程技术。下一节将更详细地介绍基本的游戏应用程序。然后，你将用额外的指令填充这个游戏的基本骨架。\n\
  \n\n\n## 程序的结构\n\n本节将更详细地讨论程序的结构。早期，许多计算机程序仅在屏幕上输出文本，不使用图形。这种基于文本的应用程序称为控制台应用程序。除了在屏幕上打印文本外，这些应用程序还可以读取用户在键盘上输入的文本。因此，与用户的任何交流都以问答序列的形式进行（例如：是否要格式化硬盘（Y/N）？是否确定（Y/N）？等等）。在基于窗口的操作系统普及之前，这种基于文本的界面在文本编辑程序、电子表格、数学应用程序甚至游戏中都非常常见。这些游戏被称为基于文本的冒险游戏，它们以文本形式描述游戏世界。玩家随后可以输入命令与游戏世界互动，例如：`go\
  \ west`（向西走）、`pick up matches`（捡起火柴）或`Xyzzy`。此类早期游戏的例子有`Zork`和`Adventure`。尽管它们现在看起来可能过时了，但玩起来仍然很有趣！\n\
  \n如前一章所述，我们仍然可以编写控制台应用程序，即使是用像 Swift 这样的语言。虽然了解如何编写此类应用程序很有趣，但本书主要专注于使用图形进行现代游戏编程。\n\
  \n### 应用程序的类型\n\n控制台应用程序只是应用程序类型中的一种。另一种非常常见的类型是窗口应用程序。这种应用程序会显示一个包含窗口、按钮和其他图形用户界面（GUI）组件的屏幕。此类应用程序通常是事件驱动的：它对诸如点击按钮或选择菜单项等事件做出反应。\n\
  \n另一种应用程序是运行在手机或平板电脑上的 App。这类应用程序的屏幕空间通常有限，但提供了新的交互可能性，例如用于定位设备的 GPS、检测设备方向的传感器以及触摸屏。\n\
  \n在开发应用程序时，编写一个能在所有不同平台上运行的程序是相当具有挑战性的。创建窗口应用程序与创建 App 有很大不同，并且在不同类型的应用程序之间重用代码也很困难。因此，基于\
  \ Web 的应用程序正变得越来越流行。在这种情况下，应用程序存储在服务器上，用户通过 Web 浏览器运行程序。此类应用程序的例子很多：想想基于 Web 的电子邮件程序或社交网站。然而，创建一个纯基于\
  \ Web 的应用程序并不总能产生最快的代码。原生 App 通常要快得多。此外，通过基于 Web 的应用程序赚钱比通过 App 更难。一旦你创建了自己的游戏 App，将其发布到\
  \ App Store 就很容易了。读完本书后，你将能够自己创建这样的游戏 App。\n\n注意\n\n并非所有程序都严格属于某一种应用程序类型。一些 Windows\
  \ 应用程序可能包含控制台组件，例如游戏引擎中的脚本接口。游戏通常也包含窗口组件，例如物品栏界面、配置菜单等。如今，程序的实际界限已变得不那么清晰。想象一个拥有数万名玩家的多人在线游戏，每个玩家在平板电脑上运行一个\
  \ App 或在一台台式电脑上运行一个应用程序，同时这些程序与一个同时在许多服务器上运行的复杂程序进行通信。在这种情况下，什么构成了程序？它又是什么类型的程序？\n\
  \n### 函数\n\n请记住，在命令式程序中，指令执行着程序的实际工作：它们一条接一条地被执行。这会改变内存和/或屏幕，从而让用户注意到程序正在执行某些操作。在`BackgroundColor`程序中，并非所有行都是指令。例如，下面这一行不是指令，而是函数定义的开始：\n\
  \n`override func didMoveToView(view: SKView) {`\n\n指令的一个例子是行`print(currentTime)`，它将当前系统时间打印到控制台。由于\
  \ Swift 是一种过程式语言，指令可以分组为函数或方法。在 Swift 中，指令不必是函数或方法的一部分。请看下面的程序：\n\n```\nimport SpriteKit\n\
  \nclass GameScene: SKScene {\n\n    let myLabel = SKLabelNode(text:\"Hello, World!\"\
  )\n\n    override func didMoveToView(view: SKView) {\n        myLabel.position =\
  \ CGPoint(x: 100, y: 100)\n        addChild(myLabel)\n    }\n\n    override func\
  \ update(currentTime: NSTimeInterval) {\n        backgroundColor = UIColor.blueColor()\n\
  \    }\n\n}\n```\n\n如你所见，我将一条指令从`didMoveToView`方法中移出，并放在了类级别。虽然你不能总是这样做，但在本例中是允许的。在下一章中，我将更详细地讨论这一点。\n\
  \n函数和方法非常有用。它们避免了代码的重复，因为指令只存在于一个地方，并且允许程序员通过调用一个名称来轻松执行这些指令。使用花括号（`{`和`}`）将指令分组到一个函数中。这样一组分组在一起的指令块被称为函数体。在函数体上方，编写函数头。函数头示例如下：\n\
  \n`func printData()`\n\n函数头包含函数名称（本例中为`printData`）以及其他内容。作为程序员，你可以为函数选择任意名称。在某些情况下，函数名称已经为你指定了。请看下面的函数头：\n\
  \n`override func update(currentTime: NSTimeInterval)`\n\n你不能将名称（`update`）改为其他内容，因为此方法替换了在`SKScene`中定义的原始方法（因此方法头前面有`override`这个关键字）。你替换该函数是因为你想在更新`SKScene`中的游戏世界时执行一些不同于标准行为（即什么也不做）的操作，具体来说，你想改变背景颜色。\n\
  \n函数或方法的名称前面总是带有`func`这个词，并且在名称后面有一对圆括号。这些括号用于向函数内部执行的指令提供信息。例如，再次查看`update`的函数头。在此函数头中，圆括号内看到文本`currentTime:\
  \ NSTimeInterval`。这意味着`update`方法需要当前系统时间。这是合理的，因为如果你想计算游戏对象的速度（通常是在更新游戏世界时要做的事情），你需要知道经过了多少时间。\n\
  \n\n\n### 语法图\n\n如果你不了解一门语言的规则，使用 Swift 这样的语言进行编程可能会比较困难。本书使用所谓的语法图来解释语言的结构。编程语言的语法是指定义什么是有效程序（即编译器或解释器能够读取的程序）的正式规则。相比之下，程序的语义指的是其实际含义。为了说明语法和语义之间的区别，请看短语“all\
  \ your base are belong to us”。从语法上讲，这个短语无效（英语语言的解释器肯定会对此提出异议）。然而，这个短语的含义是明确的：你显然把你的所有基地都输给了一群说着蹩脚英语的外星种族。\n\
  \n**注意：** 短语“all your base are belong to us”源自视频游戏 *Zero Wing*（1991 年，世嘉 Mega Drive）的开场动画，是对原始日文版的拙劣翻译。此后，这个短语出现在我的文章、电视剧、电影、网站和书籍（比如本书！）中。\n\
  \n编译器可以检查程序的语法：任何违反规则的程序都会被拒绝。不幸的是，编译器无法检查程序的语义是否符合程序员的意图。因此，即使程序在语法上正确，也不能保证其在语义上正确。但如果程序连语法都不正确，它根本无法运行。语法图帮助你形象化地理解\
  \ Swift 等编程语言的规则。例如，图 2-2 是一个简化的语法图，展示了如何在 Swift 中定义一个函数。\n\n![A978-1-4842-0650-8_2_Fig2_HTML.gif](img/A978-1-4842-0650-8_2_Fig2_HTML.gif)\n\
  \n**图 2-2.** 函数表达式的语法图\n\n你可以使用语法图来构建 Swift 代码：从图的左上角开始，在本例中是 `function expression`\
  \ 这个词，然后沿着箭头走。当你到达灰色的圆点时，你的代码片段就完成了。在这里你可以清楚地看到，函数定义以 `func` 关键字开始，其前面可选地有 `override`\
  \ 这个词；然后你编写函数的名字。之后，你编写括号。在这些括号之间，你可以（可选地）编写任意数量的参数，用逗号分隔。接下来，你编写一些指令，全部放在花括号内。在那之后，你就完成了，因为你已经到达了灰色的圆点。在本书中，我将使用语法图来展示如何根据\
  \ Swift 语言的语法规则来组织你的代码。\n\n### 调用函数\n\n当执行像 `print(\"Hello, World!\")` 这样的指令时，你正在调用\
  \ `print` 函数。换句话说，你希望程序执行 `print` 函数中分组的指令。这组指令正好满足这个示例的需要：即向控制台写入文本。你需要向这个函数提供一些额外信息，因为它需要知道应该向控制台写入什么。（在这种情况下，单一的）参数提供了这个额外信息。如你在语法图中所见，一个函数可以有不止一个参数。当调用一个函数时，你总是在它后面写上括号，而括号内就是参数（如果需要的话）。\n\
  \n要使用 `print` 函数，你是否需要知道哪些指令被分组在一起？不，你不需要！这是将指令分组到函数中的好处之一。你（或其他程序员）可以在不了解其工作原理的情况下使用该函数。通过巧妙地将指令分组到函数中，可以编写出可重用的程序片段，并在多种不同的场景中使用。`print`\
  \ 函数就是一个很好的例子。它可以用于各种应用程序，并且你不需要知道该函数如何工作就能使用它。你唯一需要知道的是，当你调用该函数时，需要提供文本作为参数。\n\n\
  ### 程序布局\n\n本节讨论程序源代码的布局。你首先会看到如何向代码中添加清晰的注释。然后你将学习如何通过使用单行或多行、空白和缩进，尽可能清晰地编写指令。\n\
  \n## 注释\n\n对于程序的人类读者（另一个程序员，或者几个月后当您忘记程序工作细节时的自己）来说，向程序添加一些说明性的注释是非常有用的。这些注释完全被编译器忽略，但它们能使程序更易于理解。在\
  \ Swift 中，有两种标记代码注释的方法：\n\n-   符号组合 `/*` 和 `*/` 之间的所有内容都将被忽略（可以是多行注释）。\n-   符号组合\
  \ `//` 到行尾之间的所有内容都将被忽略。\n\n在你的代码中放置注释来解释属于同一组的指令、参数的含义或完整的类是非常有用的。如果你使用注释，请用它来阐明代码，而不是用文字重写代码：你可以假设你的代码读者懂\
  \ Swift。为了说明这一点，下面的注释行增加了指令的清晰度：\n\n```\n// 将当前系统时间写入控制台\nprint(currentTime)\n```\n\
  \n下面也是一条注释，但它并没有阐明指令的作用：\n\n```\n/* 将 currentTime 值传递给 print 函数并执行该函数 */\nprint(currentTime)\n\
  ```\n\n在测试程序时，你也可以使用注释符号来临时从程序中移除指令。在完成程序后，不要忘记删除代码中被注释掉的部分，因为当其他开发者查看你的源代码时，它们可能会导致混淆。\n\
  \n## 指令与行\n\n关于如何将 Swift 程序的文本分布到文本文件的行中，没有严格的规则。通常，你将每条指令写在单独的一行。Swift 允许你在同一行中编写多条指令，只要用分号将它们分隔开。有时，为了使程序更清晰，程序员会在同一行中编写多条指令。另外，有时一条非常长的指令（包含函数/方法调用和许多不同的参数）可以分布在多行中（你将在本书后面看到这一点）。考虑以下示例：\n\
  \n```\nlet myLabel = SKLabelNode(fontNamed:\"Chalkduster\")\nmyLabel.text = \"Hello,\
  \ World!\"; myLabel.fontSize = 65\nmyLabel.position = CGPoint(x:CGRectGetMidX(self.frame),\n\
  \    y:CGRectGetMidY(self.frame))\n```\n\n在这里，第二行包含两条指令：一条修改标签上的文本，另一条修改字体大小。在这种情况下，将这两条指令写在单独一行算不上一个坏主意。两条指令都相当简短，并且它们都修改了标签的某个属性。但应避免将过多指令放在同一行，因为这可能导致代码不可读，如下所示：\n\
  \n```\nlet myLabel = SKLabelNode(fontNamed:\"Chalkduster\"); myLabel.text = \"Hello,\
  \ World!\"; myLabel.fontSize = 65; myLabel.position = CGPoint(x:CGRectGetMidX(self.frame),\
  \ y:CGRectGetMidY(self.frame))\n```\n\n\n\n### 空格与缩进\n\n如你所见，`BackgroundColor` 示例中大量使用了空格。每个方法之间有一个空行，等号两侧以及表达式两侧也都留有空格。间距有助于程序员理解代码。对于编译器来说，空格没有意义。唯一真正需要空格的地方是单词之间：不能将\
  \ `func update()` 写成 `funcupdate()`。同样，也不能在单词中间插入额外空格。在按字面解释的文本中，空格也会被按字面处理。以下两种情况是有区别的：\n\
  \n```\nprint(\"blue\")\n```\n\n和\n\n```\nprint(\"b l u e\")\n```\n\n但除此之外，任何地方都可以加入额外空格。以下是适合添加额外空格的位置：\n\
  \n*   每个逗号和分号之后（但不要放在前面）\n*   等号（`=`）的左右两侧，如下例所示：\n\n```\nbackgroundColor = UIColor.blueColor()\n\
  ```\n\n*   行首，使方法和类的主体相对于包围它的花括号进行缩进（通常为四个空格）\n\n你会注意到，一旦开始编辑代码，Xcode 会自动为你做一些代码格式化，例如正确缩进代码或将左花括号和右花括号放在标准位置。\n\
  \n## 本章小结\n\n在本章中，你学到了以下内容：\n\n*   游戏的骨架由游戏循环以及循环所作用的游戏世界组成\n*   如何构建一个由几个不同方法组成的游戏程序，这些方法负责初始化和更新游戏世界\n\
  *   Swift 程序的基本布局规则，包括如何在代码中放置注释，以及在何处添加额外空格以提高代码可读性\n\n"
- "# 3. 创建游戏世界\n\n电子补充材料 本章的在线版本（doi：[10.1007/978-1-4842-0650-8_3](http://dx.doi.org/10.1007/978-1-4842-0650-8_3)）包含补充材料，仅供授权用户使用。\n\
  \n本章将向你展示如何通过在内存中存储信息来创建游戏世界。我将介绍基本类型和变量，以及如何使用它们来存储或更改信息。接下来，你将看到如何在由成员变量和方法组成的对象中存储更复杂的信息。\n\
  \n## 基本类型和变量\n\n前几章多次讨论了内存。你已经了解了如何执行像 `backgroundColor = UIColor.blueColor()` 这样的简单指令，将应用屏幕的背景色设置为特定值。在本章的示例中，你将使用内存来临时存储信息，以便记住一些简单计算的结果。\n\
  \n### 类型\n\n类型（或数据类型）表示不同种类的结构化信息。前面的示例使用了传递给函数的不同种类的信息作为参数。例如，函数 `print` 需要文本，`BasicGame`\
  \ 示例中的 `update` 方法需要当前系统时间，而第 1 章示例中的 `printData` 函数则不需要任何信息即可执行任务。编译器可以区分所有这些不同种类的信息，在某些情况下，甚至可以将一种类型的信息转换为另一种类型。例如，再看一下以下\
  \ Swift 指令：\n\n```\nprint(currentTime)\n```\n\n`print` 函数需要文本，但提供的是一个以秒为单位的时间值，这不是文本，而是一个数字。在这种情况下，Swift\
  \ 编译器能够自动将这个数字转换为可打印的文本。然而，一般来说，Swift 是一种相当严格的语言，因此通常不允许在不同类型的信息之间进行自动转换。大多数情况下，你必须明确告诉编译器需要进行类型转换。这种类型转换也称为强制类型转换。\n\
  \n为什么在类型转换方面要有如此严格的策略？一方面，明确定义函数或方法期望的参数类型，有助于其他程序员理解如何使用该函数。以下面的头部为例：\n\n```\n\
  func playAudio(audioFileId)\n```\n\n仅看这个头部，你无法确定 `audioFileId` 是数字还是文本。因此，在 Swift\
  \ 中，你必须指明期望的参数类型：\n\n```\nfunc playAudio(audioFileId: Int)\n```\n\n你可以看到，在这个头部中，不仅提供了名称，还提供了属于该名称的类型。这里的类型是\
  \ `Int`，在 Swift 中表示整数。\n\n\n\n### 变量的声明与赋值\n\n在 Swift 中存储信息并在后续使用是很简单的。你只需为这些信息提供一个名称，以便在需要时引用它们。这个名称被称为变量。变量是内存中一个有名称的位置。当你想在程序中使用变量时，必须先声明它，然后才能实际使用。声明变量的方式如下：\n\
  \n`var red: Int`\n\n在这个例子中，`var` 关键字表示你正在声明一个变量。变量的名称是 `red`。最后，冒号后面的 `Int` 表示这个变量可以存储整数值。声明变量后，你就可以在程序中使用它来存储信息，并在需要时访问它。\n\
  \n在 Swift 中，你可以一次性声明多个变量。例如：\n\n`var red: Int, green: Int, fridge: Int, grandMa:\
  \ Int, applePie: Int`\n\n这里你声明了五个不同的变量，可以在程序中使用。当你声明这些变量时，它们会包含任意值。Swift 不允许你在声明后直接访问变量。你需要先通过赋值来初始化变量。你可以使用赋值指令来给变量赋值。例如，我们给变量\
  \ `red` 赋值如下：\n\n`red = 3`\n\n赋值指令由以下部分组成：\n\n- 需要被赋值的变量名称\n- `=` 符号\n- 变量的新值\n\n\
  你可以通过中间的等号来识别赋值指令。不过，在 Swift 中，最好将这个符号理解为“变为”，而不是“等于”。毕竟，变量在当前时刻并不等于等号右边的值——而是在指令执行后变为那个值。描述赋值指令的语法图如图\
  \ 3-1 所示。\n\n![A978-1-4842-0650-8_3_Fig1_HTML.gif](img/A978-1-4842-0650-8_3_Fig1_HTML.gif)\n\
  \n图 3-1. 赋值指令的语法图\n\n所以，你现在已经看到了声明变量的指令和在其中存储值的指令。但如果你在声明变量时就已经知道要存储什么值，你可以将变量声明和首次赋值合并起来：\n\
  \n`var red: Int = 3`\n\n当这条指令执行后，内存将包含值 3，如图 3-2 所示。\n\n![A978-1-4842-0650-8_3_Fig2_HTML.gif](img/A978-1-4842-0650-8_3_Fig2_HTML.gif)\n\
  \n图 3-2. 变量声明和赋值后的内存状态\n\n当你将声明与变量初始化合并时，无需提供类型信息，因为从你赋的值已经可以明确类型。所以指令\n\n`var x\
  \ = 12`\n\n等同于\n\n`var x: Int = 12`\n\n这种通过查看你赋给变量的值来自动定义变量类型的过程称为类型推断。一旦变量的类型被定义（无论是显式指定还是推断得出），就不能再更改。有些语言（例如\
  \ JavaScript）允许在任何时候更改变量的类型。与 Swift 相反，这些语言因此被称为弱类型语言。\n\n除了变量，Swift 还允许你声明和初始化常量。常量对于定义诸如重力（除非你的游戏发生在不同的星球上，否则不会改变）、游戏包含的固定关卡数量或数学常量（如\
  \ π）等非常有用。声明常量时，将 `var` 替换为 `let`，例如：\n\n`let numberOfLevels = 50`\n\n或者使用显式的类型指示，例如：\n\
  \n`let numberOfLevels: Int = 50`\n\n以下是有关数值变量声明和赋值的更多示例：\n\n```\nlet age = 16\n\
  var numberOfBananas: Int\nnumberOfBananas = 2\nvar a: Int, b: Int\na = 4\nvar c\
  \ = 4, d = 15, e = -3\nc = d\nnumberOfBananas = age + 12\n```\n\n在这个示例的第四行，你可以看到可以在一次声明中声明多个变量。你甚至可以在一次声明中完成多个带赋值的声明，如示例代码的第六行所示。在赋值号的右侧，你可以放置其他变量或数学表达式，正如最后两行所示。指令\
  \ `c = d` 的结果是，变量 `d` 中存储的值也被存储到变量 `c` 中。因为变量 `d` 包含值 15，在指令执行后，变量 `c` 也包含值 15。最后一条指令获取变量\
  \ `age` 中存储的值（16），将其加 12，然后将结果存储在变量 `numberOfBananas` 中（现在它的值是 28——好多香蕉！）。总之，在这些指令执行后，内存的状态大致如图\
  \ 3-3 所示。\n\n![A978-1-4842-0650-8_3_Fig3_HTML.gif](img/A978-1-4842-0650-8_3_Fig3_HTML.gif)\n\
  \n图 3-3. 多个变量声明和赋值后的内存概览。变量 b 包含一个任意的整数值\n\n声明变量（带可选的初始化）的语法如图 3-4 中的图表所示。在图 3-5\
  \ 中，你可以看到常量声明的语法图。注意，这两张图唯一的两个区别是使用的关键字以及变量/常量初始化的可选性或强制性。\n\n![A978-1-4842-0650-8_3_Fig5_HTML.gif](img/A978-1-4842-0650-8_3_Fig5_HTML.gif)\n\
  \n图 3-5. 常量声明和初始化的语法图\n\n![A978-1-4842-0650-8_3_Fig4_HTML.jpg](img/A978-1-4842-0650-8_3_Fig4_HTML.jpg)\n\
  \n图 3-4. 带可选初始化的变量声明语法图\n\n### 指令与表达式\n\n如果你查看语法图中的元素，可能会注意到赋值号右侧的值或程序片段被称为表达式。那么表达式和指令之间有什么区别呢？两者的区别在于，指令会以某种方式改变内存，而表达式则有一个值。指令的例子包括方法调用和赋值，正如你在上一节中看到的。指令通常使用表达式。以下是一些表达式的例子：\n\
  \n```\n16\nnumberOfBananas\n2\na + 4\nnumberOfBananas + 12 - a\n-3\n\"Hello, World!\"\
  \n```\n\n所有这些表达式都代表某种类型的值。除了最后一行，所有表达式都是数字。最后一个表达式是一个字符串（字符序列）。除了数字和字符串，还有其他类型的表达式，例如使用运算符的表达式。\n\
  \n## 运算符与更复杂的表达式\n\n本节讨论 Swift 中已知的不同运算符。你必须了解每个运算符的优先级，以便知道计算的执行顺序。\n\n### 算术运算符\n\
  \n在数值表达式中，可以使用以下算术运算符：\n\n- `+`（加法）\n- `-`（减法）\n- `*`（乘法）\n- `/`（除法）\n- `%`（取余，或“模运算”）\n\
  \n乘法使用星号，因为数学中通常使用的符号（∙ 和 ×）在计算机键盘上找不到。完全省略这个运算符（就像数学中也常做的，例如公式 f(x)=3x）在 Swift\
  \ 中是不允许的，因为它会与由多个字符组成的变量产生混淆。\n\n取余运算符 `%` 给出除法的余数。例如，`14%3` 的结果是 2，`456%10` 的结果是\
  \ 6。结果始终在 0 和运算符右侧的值之间。如果除法的结果是整数，则结果为 0。\n\n\n\n### 运算符优先级\n\n当表达式中使用多个运算符时，适用常规的算术优先级规则：先乘除，后加减。因此，表达式\
  \ `1+2*3` 的结果是 7，而不是 9。加法和减法具有相同的优先级，乘法和除法也是如此。\n\n如果一个表达式包含多个优先级相同的运算符，则表达式从左到右进行运算。所以，`10-5-2`\
  \ 的结果是 3，而不是 7。当你希望偏离这些标准的优先级规则时，可以使用括号：例如 `(1+2)*3` 和 `3+(6-5)`。在实际应用中，这类表达式通常还包含变量；否则你可以自己计算出结果（分别是\
  \ 9 和 4）。\n\n使用多于必要的括号是允许的：例如 `1+(2*3)`。如果你愿意，甚至可以随心所欲地使用括号，比如 `((1)+(((2)*3)))`。但是，这样做会大大降低程序的可读性。\n\
  \n概括来说，一个表达式可以是一个常量值（如 12），可以是一个变量，可以是括号内的另一个表达式，也可以是一个表达式后跟一个运算符再跟另一个表达式。图 3-6\
  \ 展示了表示表达式的（部分）语法图。\n\n![A978-1-4842-0650-8_3_Fig6_HTML.gif](img/A978-1-4842-0650-8_3_Fig6_HTML.gif)\n\
  \n图 3-6. 表达式的部分语法图\n\n## 其他数值类型\n\n除了整数类型之外，Swift 还支持其他数值类型。例如，Swift 有一种名为 `Double`\
  \ 的类型。这种类型的变量可以包含带小数的数字。在声明\n\n`var d: Double`\n\n之后，你可以通过赋值操作给该变量一个值：\n\n`d = 2.18`\n\
  \n`Double` 类型的变量也可以包含整数：\n\n`d = 10`\n\n在后台，编译器会自动在小数点后面放置一个零。与 `Int` 类型不同，对 `Double`\
  \ 变量进行除法运算只会产生很小的舍入误差：\n\n`d = d / 3`\n\n现在变量 `d` 的值为 3.33333333。\n\n除了 `Int` 和\
  \ `Double` 之外，Swift 中还有 10 种其他类型用于数值变量。其中 8 种可用于表示整数。这些类型之间的区别在于它们所能表示的数值范围。某些类型可以表示更大范围的数值，但缺点是需要更多内存。内存是有限的，尤其是在为智能手机开发游戏时。因此，在存储数字时，应事先考虑哪种类型最合适。例如，如果要存储当前关卡索引，使用\
  \ `Double` 类型就没有意义，因为关卡索引是整数。在这种情况下，只保存正整数的类型会更合适。有些类型可以同时包含负数和正数；其他类型只能包含正数。表 3-1\
  \ 概述了 Swift 中使用的各种整数类型。\n\n表 3-1. Swift 中可用的整数数值类型概览\n\n| 类型 | 占用空间 | 最小值 | 最大值\
  \ |\n| --- | --- | --- | --- |\n| `Int8` | 8 位/1 字节 | -128 | 127 |\n| `Int16` |\
  \ 16 位/2 字节 | -32,768 | 32,767 |\n| `Int32` | 32 位/4 字节 | -2,147,483,648 | 2,147,483,647\
  \ |\n| `Int64` | 64 位/8 字节 | -9,223,372,036,854,775,808 | 9,223,372,036,854,775,807\
  \ |\n| `UInt8` | 8 位/1 字节 | 0 | 255 |\n| `UInt16` | 16 位/2 字节 | 0 | 65,535 |\n|\
  \ `UInt32` | 32 位/4 字节 | 0 | 4,294,967,295 |\n| `UInt64` | 64 位/8 字节 | 0 | 18,446,744,073,709,551,615\
  \ |\n\n仅当计划使用极高或极低（负数）值时，才需要使用 `Int64` 类型。如果数值范围有限，则使用 `Int8` 类型。通常，只有当需要大量此类变量（数千甚至数百万）时，节省的这些内存才有意义。每个整数类型也有一个无符号版本，其名称以\
  \ U 开头。无符号类型只能包含大于或等于 0 的值。最后，`Int` 在 32 位平台上占用 32 位，在 64 位平台上占用 64 位。\n\n对于实数，有三种不同的类型可用。它们不仅在于可存储的最大值不同，还在于小数点后的精度不同。你已经看到过\
  \ `Double` 类型，其精度至少为 15 位。`Float` 类型的精度可能只有 6 位小数，但 `Float` 类型变量占用的空间也只有 `Double`\
  \ 的一半。最后，还有一种高精度的 `Float80` 类型，最多可处理 19 位精度。\n\n每种类型都有自己的适用场景。例如，`Float80` 类型可能适用于需要非常精确物理计算的游戏。`Double`\
  \ 类型用于许多数学计算。`Float` 用于精度不那么重要但需要节省内存的情况。\n\n当你将某种类型的表达式转换为另一种类型的表达式时，这称之为类型转换。你可以通过在要转换的目标类型写在表达式前面，并将表达式放在括号内，来将一个值转换为另一种类型。例如，下面是将\
  \ `Double` 转换为 `Float` 的方法：\n\n```\nlet pi: Double = 3.141592653589793\nvar smallPi:\
  \ Float = Float(pi) // 值为 3.1415927\n```\n\n如上面的示例所示，如果将 `Double` 转换为 `Float`，则会丢失精度。这就是为什么当你想要转换一种类型为另一种类型时，必须向编译器明确指出的原因。如果你想将\
  \ `Float` 转换为 `Double`，不会丢失精度，但你仍然需要明确表示你希望编译器转换该值，如下所示：\n\n```\nvar myDouble: Double\
  \ = 12.34\nvar myFloat: Float = 56.78\nvar anotherDouble: Double = myFloat // 错误\n\
  var yetAnotherDouble: Double = Double(myFloat) // 正确\nvar anotherFloat: Float =\
  \ myDouble             // 错误\nvar yetAnotherFloat: Float = Float(myDouble)   //\
  \ 正确\n```\n\n\n\n### DiscoWorld 游戏\n\n在前面的小节中，我讨论了不同的变量类型以及如何声明和赋值它们。我举了几个例子，说明如何声明和赋值\
  \ `Int` 和 `Double` 等类型的变量。除了数值类型，Swift 中还有许多其他类型。例如，`NSTimeInterval` 也是一种类型，它表示以秒为单位的时间间隔。这用于游戏循环的更新部分，以确定已经过去了多少时间。然后，你可以利用这些信息来改变游戏对象的位置或执行其他操作。\n\
  \n上一章的例子中有一个如下所示的更新方法：\n\n```\noverride func update(currentTime: NSTimeInterval)\
  \ {\n\n    backgroundColor = UIColor.blueColor()\n\n}\n```\n\n如你所见，`update` 方法有一个名为\
  \ `currentTime` 的参数，它包含了当前系统时间。在方法体内部，你可以像使用变量一样使用 `currentTime`。`currentTime` 变量的类型是\
  \ `NSTimeInterval`，它实际上是 `Double` 的类型别名。这意味着你可以对 `currentTime` 执行计算，并将这些计算的结果存储到另一个变量中：\n\
  \n```\nvar time: Double = currentTime % 1\n```\n\n表达式 `currentTime % 1` 的结果是 0 到\
  \ 1 之间的一个数字，因为它是将 `currentTime` 除以 1 后的余数。例如，如果 `currentTime` 包含值 512.34，那么 `currentTime\
  \ / 1 = 512`，而余数 `currentTime % 1 = 0.34`。\n\n现在，让我们使用变量 `time` 来动态改变背景颜色。在上一章的示例中，你是这样做的：\n\
  \n```\nbackgroundColor = UIColor.blueColor()\n```\n\n在这条指令中，你为名为 `backgroundColor`\
  \ 的属性赋值。该值的类型为 `UIColor`。`UIColor` 是由 UIKit 框架提供的一种新类型，该框架包含在 SpriteKit 框架内。可以通过几种不同的方式创建该类型的值。第一种方式如上所示。`blueColor`\
  \ 是 `UIColor` 的一个方法，它创建一个值：蓝色。你也可以通过提供 0 到 1 之间的颜色值来自己创建颜色：\n\n```\nbackgroundColor\
  \ = UIColor(red: 0, green: 0, blue: 1, alpha: 1)\n```\n\n如果以这种方式构造一个 `UIColor` 变量，你需要提供四个不同的值：红色、绿色、蓝色和透明度。红色、绿色和蓝色值决定了颜色，透明度值决定了透明度。上面的示例创建了一种蓝色。以下是其他一些颜色的示例：\n\
  \n```\nvar greenColor: UIColor = UIColor(red: 0, green: 1, blue: 0, alpha: 1)\n\
  var redColor: UIColor = UIColor(red: 1, green: 0, blue: 0, alpha: 1)\nvar grayColor:\
  \ UIColor = UIColor(red: 0.7, green: 0.7, blue: 0.7, alpha: 1)\nvar whiteColor:\
  \ UIColor = UIColor(red: 1, green: 1, blue: 1, alpha: 1)\n```\n\n如这些示例所示，颜色强度值的范围在\
  \ 0 到 1 之间，其中 1 为最高颜色强度。通过将红色值设为 1，其他两个值设为 0，你可以创建红色。将所有强度值设为 1，即可得到白色。类似地，将所有值设为\
  \ 0 即可得到黑色。使用这些 RGB 值，可以创建多种颜色。\n\n在 DiscoWorld 示例中，你将使用经过的游戏时间来改变颜色。你已经将一个值在 0\
  \ 和 1 之间变化的时间变量存储起来了，如下所示：\n\n```\nvar time: Double = currentTime % 1\n```\n\n现在，你可以像下面这样使用这个变量来改变背景颜色：\n\
  \n```\nbackgroundColor = UIColor(red: CGFloat(time), green: 0, blue: 0, alpha: 1)\n\
  ```\n\n当你创建一个 `UIColor` 值时，它需要类型为 `CGFloat` 的参数。`CGFloat` 类型主要针对图形应用程序（类型中的字母 “CG”\
  \ 代表 Core Graphics）。所有与图形相关的 Apple 类和库都使用这种类型，包括 `UIColor`。如果应用程序为 64 位平台编译，则 `CGFloat`\
  \ 类型是 `Double` 的别名。对于 32 位平台，`CGFloat` 是 `Float` 的别名。这就是为什么有时需要将表达式转换为 `CGFloat`\
  \ 的原因。在这个例子中，`time` 是一个 `Double` 值，因此你需要先将其转换为 `CGFloat` 值。对于其他参数，则无需转换，因为诸如 0 或\
  \ 1 这样的数字常量会自动转换为 `Float` 或 `Double` 值。\n\n这个示例的妙处在于，你可以看到游戏循环是如何工作的，从而动态地改变游戏世界。当你运行\
  \ DiscoWorld 示例时，你会看到颜色每秒从黑色变为红色。作为练习，你能让颜色每秒从红色变为黑色吗？你能将其改为不同的颜色吗？或者从红色过渡到蓝色呢？你能修改代码，让颜色过渡持续两秒而不是一秒吗？尝试用这个示例做一些不同的尝试。\n\
  \n为了完成这个示例，请在 `update` 方法中添加以下指令：\n\n```\nmyLabel.position = CGPoint(x: 100, y:\
  \ CGFloat(time * 200))\n```\n\n这条指令根据 `time` 变量的值改变文本标签的位置。`CGPoint` 是另一种你将经常使用的类型。它表示空间中的一个二维点。如果你创建一个类型为\
  \ `CGPoint` 的值，你需要提供 `CGFloat` 类型的参数，类似于 `UIColor`。不同之处在于，要创建一个 `CGPoint` 值，你需要提供像素空间中的\
  \ x 和 y 坐标。如果运行程序，你会看到文本标签每秒向上移动 200 像素，然后重置到屏幕底部。这是因为 `time` 变量的值始终在 0 到 1 之间，而你将该值乘以了\
  \ 200。图 3-7 显示了 DiscoWorld 示例的屏幕截图。尝试尝试使用几个不同的值。你能让标签向下移动而不是向上移动吗？或者你能让它向右移动吗？如何让它沿对角线移动？\n\
  \n![A978-1-4842-0650-8_3_Fig7_HTML.jpg](img/A978-1-4842-0650-8_3_Fig7_HTML.jpg)\n\
  \n图 3-7. DiscoWorld 示例的屏幕截图\n\n## 变量的作用域\n\n声明变量的位置会影响你可以在何处使用该变量。看看 DiscoWorld\
  \ 示例中的变量 `time`。这个变量是在 `update` 方法中声明（并赋值）的。因为它是在 `update` 方法中声明的，所以你只能在这个方法中使用它。例如，你不能在\
  \ `didMoveToView` 方法中使用这个变量。当然，你可以在 `didMoveToView` 方法中声明另一个名为 `time` 的变量，但重要的是要认识到，在这种情况下，在\
  \ `update` 中声明的 `time` 变量与在 `didMoveToView` 方法中声明的 `time` 变量并不相同。\n\n或者，如果你在类级别声明一个变量，则可以在该类中的任何地方使用它。`myLabel`\
  \ 变量是在类级别声明的，该类中的两个方法 `didMoveToView` 和 `update` 都在访问它。`didMoveToView` 方法需要访问它，因为标签需要添加到游戏世界中。`update`\
  \ 方法需要访问它以便改变其位置。因此，很合乎逻辑的是，这个变量需要在类级别声明，这样属于该类的所有方法都可以使用该变量。\n\n变量可以被使用的地方统称为变量的作用域。在这个例子中，变量\
  \ `time` 的作用域是 `update` 方法，而变量 `myLabel` 的作用域是类的范围。\n\n## 你学到的内容\n\n在本章中，你学到了以下内容：\n\
  \n*   如何使用变量在内存中存储基本信息\n*   如何创建数值以及更复杂类型的值，例如 `UIColor` 或 `CGPoint`\n*   如何使用 `update`\
  \ 方法通过操作变量来改变游戏世界\n\n\n\n"
- "# 4. 游戏资源\n\n电子补充材料 本章在线版本（doi:[10.​1007/​978-1-4842-0650-8_​4](http://dx.doi.org/10.1007/978-1-4842-0650-8_4)）包含补充材料，仅供授权用户使用。\n\
  \n前几章展示了如何在 Swift 中制作一个非常基础的游戏应用。你学习了如何在 Xcode 中创建游戏项目，然后编写几行代码来更改应用的背景颜色或显示文本标签。你还了解了游戏循环，并利用游戏循环的更新部分随时间改变背景颜色。本章将向你展示如何在屏幕上绘制图像，这是制作精美游戏的第一步。在计算机图形学中，这些图像也被称为精灵（sprites）。精灵通常从文件中加载。这意味着任何绘制精灵的程序都不再仅仅是一组孤立的指令，而是依赖于存储在某个位置的游戏资源。这立即引入了一些你需要考虑的问题：\n\
  \n-   精灵位于何处？\n-   如何加载并在屏幕上绘制精灵？\n-   如何处理各种 iDevice 的分辨率和宽高比？\n\n本章将解答这些问题。\n\n\
  声音是另一种游戏资源。在本章末尾，你还会学习如何在游戏中播放音乐和音效。\n\n> **注**  \n> 精灵（sprite）这个名称源于精灵绘制（spriting）技术，即创建用于视频游戏的二维、部分透明的光栅图形。早期，创建这些二维图像需要大量手工工作，但这形成了一种独特的图像风格，激发了人们创作类似图像的热情，最终发展出一种被称为像素艺术（pixel\
  \ art）或精灵艺术（sprite art）的艺术技巧。\n\n## 定位精灵\n\n在程序使用任何类型的资源之前，它需要知道去哪里寻找这些资源。默认情况下，Xcode\
  \ 中的游戏项目有一个名为 `Images.xcassets` 的文件夹。查看本章附带的 SpriteDrawing 示例。当你在 Xcode 中打开此项目并左键单击\
  \ `Images.xcassets` 时，你会看到它列出了两个文件：一个代表应用图标，另一个名为 `spr_balloon`。后者指的是一个可在屏幕上绘制的气球图像。如果你左键单击气球，你会看到该图像包含多个不同分辨率的子图像（见图\
  \ 4-1）。由于不同 iOS 设备的技术规格差异（例如配备 Retina 屏幕的 iPad Air 比 iPhone 4 的分辨率高得多），这些不同的分辨率是必要的。本章稍后会详细讨论这个问题。\n\
  \n![A978-1-4842-0650-8_4_Fig1_HTML.jpg](img/A978-1-4842-0650-8_4_Fig1_HTML.jpg)\n\
  \n**图 4-1.** SpriteDrawing 示例中使用的图像\n\n## 加载和绘制精灵\n\n`Images.xcassets` 文件夹中的任何图像都可以加载并绘制在屏幕上。其方式与在屏幕上绘制文本标签非常相似。以下是本章附带的\
  \ SpriteDrawing 示例中的 `GameScene` 类：\n\n```swift\nclass GameScene: SKScene {\n  \
  \  var balloonSprite = SKSpriteNode(imageNamed: \"spr_balloon\")\n    override func\
  \ didMoveToView(view: SKView) {\n        backgroundColor = UIColor.lightGrayColor()\n\
  \        balloonSprite.position = CGPoint(x: 200, y: 200)\n        addChild(balloonSprite)\n\
  \    }\n}\n```\n\n可以看到，这里创建了一个名为 `balloonSprite` 的变量。该变量指向一个类型为 `SKSpriteNode` 的值。为了创建这个值，你需要传入一个参数：要加载的精灵的名称。在\
  \ `didMoveToView` 方法中，你为 `balloonSprite` 变量分配了一个位置，最后将其添加到场景中。图 4-2 显示了 SpriteDrawing\
  \ 程序的输出结果。\n\n![A978-1-4842-0650-8_4_Fig2_HTML.jpg](img/A978-1-4842-0650-8_4_Fig2_HTML.jpg)\n\
  \n**图 4-2.** SpriteDrawing 程序的输出结果\n\n\n\n## 分辨率和宽高比\n\n在为 iOS 开发游戏时，一个重大挑战是确保你的游戏在不同\
  \ iOS 设备上都能呈现良好视觉效果。仅设计精美的精灵图是不够的，你还必须确保其尺寸和分辨率符合平台要求。屏幕分辨率为 1024x768 像素的 iPad 2\
  \ 与配备 Retina 显示屏、分辨率高达 2048x1536 的 iPad Air 相比，所需的精灵图质量存在巨大差异。不仅分辨率不同，各设备间的宽高比也有所差异。iPad\
  \ 采用更接近方形的 4:3 宽高比，而 iPhone 6 则采用 16:9 的宽屏比例。那么，该如何应对 iOS 设备之间的这些差异呢？\n\n当然，一个可能的解决方案是将你的游戏设计成仅适用于单一设备。这样一来，你完全无需处理不同\
  \ iOS 设备间的差异。然而，这样做会流失大量玩家。在接下来的段落中，我将向你展示一种方法，确保你的精灵图能在多种设备上良好运行，且无需修改代码。你需要关注的主要事项是，确保内部游戏世界的尺寸不会变化过大。例如，考虑\
  \ iPhone 4 的 960x640 分辨率和 iPad Air 的 2048x1536 分辨率。处理这两种差异巨大的分辨率的一种方法是，让 iPad Air\
  \ 比 iPhone 4 显示更多的游戏世界区域（因为其屏幕能容纳更多内容）。然而，这并不是一个好主意。当你设计一款游戏，它应该始终显示单一屏幕，例如本书中的大多数示例游戏，你就无法运用这个技巧。在某些设备上显示更大的游戏世界区域会影响游戏玩法。如果你开发一款策略游戏，你肯定不希望\
  \ iPhone 4 玩家因无法像 iPad Air 玩家那样清晰地察觉即将到来的攻击而处于劣势。\n\n另一种处理这些不同分辨率的方法是将游戏世界尺寸与屏幕尺寸分离。这正是苹果公司所采用的方式。在内部，当你为游戏编写代码时，你操作的是点（points），而不是直接操作像素。然而，在某些情况下，点与像素是直接对应的。例如，考虑对\
  \ `SpriteDrawing` 示例进行如下修改：\n\n`balloonSprite.position = CGPoint(x: 201, y: 200)`\n\
  \n这个精灵图在 x 正方向移动了一个点。在 iPhone 3GS 或 iPad 2 上，这意味着精灵图将沿该方向移动一个像素。然而，在 iPad Air 上，精灵图将沿\
  \ x 正方向移动两个像素。为了获得大致相同的视觉尺寸，你需要创建两种精灵图：一种标准分辨率版本（苹果称之为 \"1x\"），适用于 iPhone 3GS 或\
  \ iPad 2；另一种 Retina 分辨率版本（称为 \"2x\"），适用于 iPad Air 和新款 iPhone。当你查看气球精灵图时，你会发现其为 1x\
  \ 和 2x 分辨率都准备了精灵图。Retina（2x）分辨率的精灵图尺寸是标准（1x）分辨率的双倍。这样一来，无论你是在 iPad 2 还是 iPad Air\
  \ 上玩游戏，你的游戏尺寸都保持不变。在后一种情况下，由于你可以提供 2x 分辨率格式的更高品质美术资源，游戏画面会看起来好得多。\n\n自从 iPhone 6\
  \ Plus 问世以来，还提供了一种 3x 分辨率选项，也称为 Retina HD。这种分辨率目前仅由 iPhone 6 Plus 使用，它允许你以更高的分辨率创作美术资源，即标准（1x）分辨率尺寸的三倍。\n\
  \n本书中的游戏使用的美术资源已针对除 iPhone 6 Plus 之外的所有 iDevice 进行了优化。如果你打开任意一个示例，你会看到所有精灵图都以 1x\
  \ 和 2x 分辨率提供。请注意，即使图像未针对 iPhone 6 Plus 进行优化，示例游戏在其上也能正常运行；不过，如果使用 3x 分辨率的图像，图形效果会更加清晰。\n\
  \n除了使用的分辨率之外，你还需要考虑宽高比。在你的代码中，你可以做的一件事是确保诸如按钮或生命值条之类的覆盖层始终相对于屏幕尺寸进行定位。唯一需要小心处理的区域是设计背景图像时。如果你的背景图像不够大，在某些设备上你会看到黑色的空白区域。\n\
  \n在本书中，我使用的背景图像尺寸为 2668x1536 像素，采用 Retina（2x）分辨率。相应的标准（1x）分辨率则为 1334x768 像素。如此大小的背景图像足够大，使得没有任何设备会显示黑色空白区域。由于\
  \ iPhone 屏幕比 iPad 屏幕小得多，iPhone 将仅显示背景的一小部分。例如，横屏模式下的 iPhone 6 宽度为 667 点，并使用 2x 分辨率（1334\
  \ 像素）。这仅仅是 Retina 分辨率下（2668 像素）整个背景图像的一半。为了更紧密地匹配 iPhone 和 iPad 的点，我在本书使用的每个示例游戏中添加了以下几行代码：\n\
  \n```\nvar viewSize = skView.bounds.size\n\nif UIDevice.currentDevice().userInterfaceIdiom\
  \ == .Phone {\n\n    viewSize.height *= 2\n\n    viewSize.width *= 2\n\n}\n```\n\
  \n在不深入细节的情况下，这段代码在应用运行于 iPhone 时将点的分辨率加倍。这样做的结果是，一个 2668x1536 的背景现在在 iPhone 6 上几乎可以完整显示。在创建应同时适用于\
  \ iPad 和 iPhone 的应用时，你无需再过于谨慎地考虑游戏运行在哪个设备上。\n\n大多数设备将只能显示背景图像的一部分。在 iPad 上，背景的左右两侧将不可见。在\
  \ iPhone 6 上，顶部和底部的一部分条带将不会显示（如果应用了上述点分辨率加倍的技巧）。在考虑了所有不同设备后，你最终会得到一个可玩区域：即无论宽高比和分辨率如何，在所有设备上始终可见的背景区域。图\
  \ 4-3 展示了标准（1x）和 Retina（2x）分辨率下的可玩区域概览。\n\n![A978-1-4842-0650-8_4_Fig3_HTML.jpg](img/A978-1-4842-0650-8_4_Fig3_HTML.jpg)\n\
  \n图 4-3. 背景图像的可玩区域\n\n你可以利用这一信息来正确设计你的背景。如果你希望背景中的某个元素在所有设备上可见，请确保它位于可玩区域内。再次强调，这仅是背景设计时需要关注的问题。游戏的其他元素（例如菜单、覆盖层、玩家角色等）可以有其他不同的处理方式。如果你添加这些元素，只需根据屏幕尺寸确定它们的位置。在阅读本书并开发游戏的过程中，你将看到这种方法的几个示例。\n\
  \n> **注意**：本书中游戏的背景和精灵图均以适用于大多数 iDevice 的方式进行设计。这样做需要做出一些权衡。例如，在某些设备上，只会显示背景的一部分。此外，游戏对象在诸如\
  \ iPhone 4 或 5 的小屏幕上可能看起来相当小。如果你设计一款游戏，可以考虑为特定设备使用完全不同的资源，甚至分别为 iPhone 和 iPad 版本设计不同的关卡。设计一款在有限设备上运行效果出色的游戏，总比设计一款在任何设备上运行效果都不太理想的游戏要好。\n\
  \n本章附带的 `ScreenSizeTest` 示例通过将图 4-3 作为背景图像显示，向你展示每个设备会显示游戏世界的哪一部分。在 iOS 模拟器中尝试在不同设备上运行它，看看效果。以下是该示例中一行有趣的代码，你可以在\
  \ `GameScene.swift` 文件的 `didMoveToView` 方法中找到它：\n\n\n\n`anchorPoint = CGPoint(x:\
  \ 0.5, y: 0.5)`\n\n请记住，场景中坐标系的原点位于屏幕的左下角。上述代码更改了这一设定，使得原点位于屏幕的中心。坐标系原点的设置值是相对于屏幕的总宽度和总高度来指定的。例如，值\
  \ `(1.0, 1.0)` 表示屏幕的右上角。因此，值 `(0.5, 0.5)` 就代表了屏幕的中心。\n\n尤其是在处理背景时，将原点设置为屏幕中心非常有用，因为这样计算不同设备上的背景位置会变得容易得多。由于精灵默认以其中心点作为绘制位置，而位置\
  \ `(0, 0)` 现在又是屏幕的中心，因此精灵默认情况下会居中显示在屏幕上。请删除这行代码（或将其注释掉），然后运行示例程序，看看会发生什么。\n\n上面这行代码是一条赋值指令。名为\
  \ `anchorPoint` 的变量被赋予了一个值。被赋予的值是 `CGPoint(x: 0.5, y: 0.5)`。你也可以说，这行代码将一个 `CGPoint`\
  \ 类型的值赋值给了 `anchorPoint`。一个 `CGPoint` 类型的值是通过编写该类型的名称，然后在括号内提供创建该值所需的参数来创建的。在此例中，需要提供\
  \ x 和 y 的值。这里你还可以看到它与简单的内置类型（如 `Int`）之间的区别。对于那些类型，你只需直接编写你想要赋值的值：\n\n```\nvar age:\
  \ Int = 12\n```\n\n对于更复杂的类型（例如 `CGPoint`），你需要编写类型名称，然后在括号内提供创建该值所需的参数。另一个复杂类型的例子是\
  \ `UIColor`。下面是一个使用 `UIColor` 类型进行赋值的示例：\n\n```\nbackgroundColor = UIColor(red:\
  \ CGFloat(time), green: 0, blue: 0, alpha: 1)\n```\n\n这里你看到了相同的语法：编写类型名称，然后在括号内提供所需的参数。其中一个参数是\
  \ `red`。而该参数被赋予的值，本身也是由一个名为 `CGFloat` 的非内置类型创建的。同样，你会看到编写了类型名称（`CGFloat`），并在括号内提供了所需的参数（`time`）。每当你使用像\
  \ `UIColor` 或 `CGPoint` 这样的复杂类型创建值时，这个值也被称为一个对象，或者该类型的一个实例。\n\n类型非常有用。它们提供了一种蓝图，描述了值应该是什么样子。例如，`CGPoint`\
  \ 类型描述了一个用于二维点的数据结构。你无需考虑如何创建这样一个数据结构；`CGPoint` 会为你完成。你只需要在创建 `CGPoint` 实例时提供正确的参数值即可。\n\
  \n## 移动精灵\n\n现在你可以在屏幕上绘制精灵了，接下来就可以使用游戏循环来让它移动，就像你在[第 3 章](https://example.org/zh/chapter3)的\
  \ DiscoWorld 示例中对文本标签所做的那样。在 SpriteDrawing 程序中，你在屏幕上绘制了一个气球。让我们对程序进行一点小扩展，根据经过的时间来改变气球的位置。首先，你需要在\
  \ `GameScene` 类中添加 `update` 方法，使其成为游戏循环的一部分。在 DiscoWorld 示例中，你获取并存储当前时间的方式如下：\n\n\
  ```\nvar time: Double = currentTime % 1\n```\n\n让我们尝试改变气球的位置，让它从屏幕左侧飞到右侧。一个简单的方法是使用\
  \ `time` 变量来改变位置。为了避免过多的类型转换，你可以将时间存储为 `CGFloat` 类型，而不是 `Double` 类型，`CGFloat` 是\
  \ SpriteKit 中用于表示浮点值的主要类型：\n\n```\nvar time = CGFloat(currentTime % 1)\n```\n\n\
  现在，你可以像下面这样使用 `time` 变量来改变气球的位置：\n\n```\nballoonSprite.position = CGPoint(x: time\
  \ * 200, y: 200)\n```\n\n由于 `time` 变量的值总在 0 到 1 之间，因此 x 值的范围将在 0 到 200 之间（因为你将 `time`\
  \ 乘以了 200）。然而，你的 iDevice 上可视区域的宽度可能不是 200 点，而是其他数值。此外，宽度还取决于你是横向还是纵向握住设备。幸运的是，`GameScene`\
  \ 类有一个名为 `size` 的变量，它包含另外两个变量 `width` 和 `height`。请看下面这行代码：\n\n```\nballoonSprite.position\
  \ = CGPoint(x: time * size.width, y: 200)\n```\n\n这条指令没有将时间乘以一个固定值，而是将时间乘以了屏幕的当前宽度。因此，气球将从屏幕左侧移动到右侧。本章附带的\
  \ MovingSprite 示例展示了以这种方式改变气球位置的结果。如果你旋转设备（例如，在 iOS 模拟器中，选择 Hardware ➤ Rotate left），你会看到无论设备方向或屏幕宽度如何，气球仍会从设备左侧移动到右侧。尝试一些不同的操作，看看如何修改这个程序。你能让精灵从右向左移动吗？你能让精灵移动得更快或更慢吗？\n\
  \n\n\n### 加载与绘制多个精灵\n\n只能显示单个精灵的游戏构建起来多少有些乏味。通过显示一个背景精灵，可以让你的游戏在视觉上更具吸引力。这意味着你需要加载并定位两个精灵，而不是一个。`MovingSpriteWithBackground`\
  \ 示例展示了如何实现这一点。在这个示例中，你会看到现在有两个变量引用着两个精灵：\n\n`var backgroundSprite = SKSpriteNode(imageNamed:\
  \ \"spr_background\")`\n\n`var balloonSprite = SKSpriteNode(imageNamed: \"spr_balloon\"\
  )`\n\n当你处理多个精灵时，需要考虑哪个精灵应该绘制在最上层。在这个示例中，你希望气球绘制在背景之上，反之则不行。如何实现呢？到目前为止，你已经知道游戏世界拥有\
  \ x 轴和 y 轴，其默认原点位于屏幕左下角。实际上，游戏世界还有一个 z 轴，它垂直于屏幕指向你。你可以改变精灵在这个 z 轴上的位置。由于它垂直于屏幕，z\
  \ 位置值越高，意味着精灵离你越近。因此，如果你为气球选择比背景更高的 z 位置，气球将会绘制得离你更近，从而在背景之上可见。以下是实现此目的的两个赋值指令：\n\
  \n`backgroundSprite.zPosition = 0`\n\n`balloonSprite.zPosition = 1`\n\n当精灵的 z 位置设置正确后，你就可以将它们添加到场景中（见图\
  \ 4-4）：\n\n![A978-1-4842-0650-8_4_Fig4_HTML.jpg](img/A978-1-4842-0650-8_4_Fig4_HTML.jpg)\n\
  \n*图 4-4. MovingSpriteWithBackground 示例*\n\n`addChild(backgroundSprite)`\n\n`addChild(balloonSprite)`\n\
  \n为了让气球正确地从左向右移动，你需要修改 `update` 方法中计算其位置的代码。这是必要的，因为您已经将坐标系统的原点更改为屏幕中心。你唯一需要做的就是从\
  \ x 位置减去屏幕宽度的一半，如下所示：\n\n`balloonSprite.position = CGPoint(x: time * size.width\
  \ – size.width/2, y: 200)`\n\n这里你可以看到，可以使用 `size` 来获取屏幕的尺寸。虽然它看起来像一个变量，但它实际上是别的东西：一个属性。属性与方法一样，属于类。不同之处在于属性不需要括号内的参数；它们只是表示某种数值。在这种情况下，该值就是屏幕的尺寸。这个值又分为两部分：宽度和高度。每个部分都代表一个\
  \ `CGFloat` 数值。由于 `time` 也是 `CGFloat` 类型，你可以将这些值相互结合使用，而无需进行任何类型转换。\n\n你之前已经使用过属性。例如，你使用过\
  \ `anchorPoint` 来改变坐标系统的原点，它也是一个属性。你甚至已经定义过自己的属性。如果一个变量在类级别定义（例如 `backgroundSprite`\
  \ 或 `balloonSprite`），那么这个变量就被称为类的属性。稍后，我将更详细地讨论属性。\n\n每次你想在屏幕上绘制一个精灵时，都可以定义一个 `SKSpriteNode`\
  \ 属性并将其添加到场景中。例如，如果你想在背景上不同位置绘制几个气球，只需为你想要添加到场景中的每个气球定义一个属性：\n\n`var balloonSprite2\
  \ = SKSpriteNode(imageNamed: \"spr_balloon\")`\n\n`var balloonSprite3 = SKSpriteNode(imageNamed:\
  \ \"spr_balloon\")`\n\n`var balloonSprite4 = SKSpriteNode(imageNamed: \"spr_balloon\"\
  )`\n\n你需要确保在 `didMoveToView` 方法中将每个精灵添加到场景中，如下所示：\n\n```\noverride func didMoveToView(view:\
  \ SKView) {\n    anchorPoint = CGPoint(x: 0.5, y: 0.5)\n    backgroundSprite.zPosition\
  \ = 0\n    balloonSprite.zPosition = 1\n    balloonSprite2.zPosition = 1\n    balloonSprite3.zPosition\
  \ = 1\n    balloonSprite4.zPosition = 1\n\n    addChild(backgroundSprite)\n    addChild(balloonSprite)\n\
  \    addChild(balloonSprite2)\n    addChild(balloonSprite3)\n    addChild(balloonSprite4)\n\
  }\n```\n\n这里你还可以看到，所有气球精灵都绘制在背景之前。你也可以同时绘制多个移动的精灵。对于每个气球，你需要在 `update` 方法中改变其位置：\n\
  \n```\noverride func update(currentTime: NSTimeInterval) {\n    var time = CGFloat(currentTime\
  \ % 1)\n\n    balloonSprite.position = CGPoint(x: time * size.width - size.width/2,\
  \ y: 200)\n    balloonSprite2.position = CGPoint(x: time * size.width - size.width/2\
  \ – 100, y: 200)\n    balloonSprite3.position = CGPoint(x: time * size.width - size.width/2,\
  \ y: 0)\n    balloonSprite4.position = CGPoint(x: time * size.width - size.width/2\
  \ – 100, y: 0)\n}\n```\n\n你可以尝试这个示例。思考在屏幕上绘制移动气球的不同方法。尝试一些不同的位置值。你能让一些气球比其他气球移动得更快或更慢吗？\n\
  \n## 配置设备方向\n\n尤其是在开发游戏时，考虑设备的方向非常重要。你是要创建一个横屏模式还是竖屏模式的游戏？有些游戏在竖屏模式下表现更好，而另一些则在横屏模式下更好。这也取决于玩家与游戏世界的交互方式。例如，竖屏模式的游戏设计方式是：你像平常一样拿着手机，用另一只手操作屏幕。这对于像《神庙逃亡》这样需要在屏幕上滑动的游戏来说是个好方法。另一方面，横版卷轴游戏通常更适合横屏，因为你希望尽可能多地显示一个关卡的宽度，以避免过多滚动。在本书中，你将同时开发竖屏和横屏游戏。\n\
  \n默认情况下，Xcode 中的项目允许任何设备方向，并且它会相应地旋转图形。对于大多数游戏来说，这并不可取，因为你通常创建的布局要么适合竖屏模式，要么适合横屏模式，而不是两者都适合。在\
  \ Xcode 的项目设置中，有一种简单的方法可以更改允许的设备方向。点击屏幕左上角的项目，然后选择目标（例如，`MovingSpriteWithBackground`）。在\
  \ “Deployment Info” 下，你可以选择允许的方向。在 “Devices” 选择框中，选择是要更改 iPad 版本、iPhone 版本还是 Universal\
  \ 版本（如果你想要创建一个同时适用于 iPhone 和 iPad 的应用程序，可以选择这个选项）的允许方向。图 4-5 显示了 Xcode 中的方向选择屏幕。运行程序，看看当你在\
  \ iOS 模拟器中模拟设备旋转时，应用程序如何响应。你可以通过进入模拟器中的 “Hardware” 菜单，然后选择向左或向右旋转来旋转设备。\n\n![A978-1-4842-0650-8_4_Fig5_HTML.jpg](img/A978-1-4842-0650-8_4_Fig5_HTML.jpg)\n\
  \n*图 4-5. 选择应用程序支持的设备方向。如果项目和目标列表不可见，请点击 “General” 菜单项左侧的图标以打开面板*\n\n\n\n## 音乐与音效\n\
  \n多数游戏都包含音效和背景音乐。这些元素因多种原因而至关重要。音效提供关键提示，向用户表明发生了某些事件。例如，当用户点击按钮时播放点击声，可向用户反馈按钮确实已被按下。听到脚步声则暗示敌人可能就在附近，即便玩家尚未看到他们。而远处传来的铃声能预示某事即将发生。经典游戏《神秘岛》在这方面堪称典范，因为许多关于如何推进游戏的线索都是通过声音传递给玩家的。\n\
  \n环境音效，如滴水声、林间风声和远处车声，能增强体验并带来身临游戏世界的感觉。即便屏幕上没有任何实际活动，它们也能让环境显得更加生动。\n\n**注意**\n\
  \n音乐在玩家体验环境和动作的方式中扮演着关键角色。音乐可用于营造紧张、悲伤、欢乐等多种情绪。然而，在游戏中处理音乐比在电影中困难得多。在电影中，事件走向是确定的，因此音乐可以完美契合。但在游戏中，部分动作由玩家控制。现代游戏采用自适应音乐，这种音乐会根据游戏故事的推进而不断变化。\n\
  \n在 Swift 中，播放背景音乐或音效相对简单。要使用声音，你首先需要一个可以播放的声音文件。在属于本章的 SoundTest 示例程序中，文件 `snd_music.mp3`\
  \ 被用作背景音乐。为了处理音乐和音效，你需要导入 `AVFoundation` 库，该库包含处理媒体的各种类：\n\n```\nimport AVFoundation\n\
  ```\n\n下一步是声明一个指向可播放音频对象的变量，如下所示：\n\n```\nvar audioPlayer = AVAudioPlayer()\n```\n\
  \n现在，你可以在 `didMoveToView` 方法中初始化音频播放器，使其开始播放某个音频文件。这需要三步完成。第一步是构建一个所谓的 URL，表示声音文件的位置。这个\
  \ URL 的构建方式需要确保它在所有 iDevice 上都能正常工作。以下是实现这一目标的代码行：\n\n```\nlet soundURL = NSBundle.mainBundle().URLForResource(\"\
  snd_music\", withExtension: \"mp3\")\n```\n\n这看起来像一个复杂的指令。`NSBundle` 对象是文件系统中一个对可在程序中使用的代码和资源进行分组的位置。`mainBundle`\
  \ 方法返回一个对应应用程序可执行文件位置的 `NSBundle` 对象。最后，`URLForResource` 方法在 bundle 位置内构建一个文件位置（URL）。因此，最终你所做的只是创建一个计算机可以轻松解释的文件位置表示。\n\
  \n既然已经构建了这个文件 URL，你就可以用对该文件的引用来初始化音频播放器：\n\n```\naudioPlayer = try! AVAudioPlayer(contentsOfURL:\
  \ soundURL!)\n```\n\n最后，你可以通过调用 `play` 方法来开始播放音频，如下所示：\n\n```\naudioPlayer.play()\n\
  ```\n\n你可能希望降低背景音乐的音量，以便稍后在其上播放（更响亮的）音效。通过以下指令设置音量：\n\n```\naudioPlayer.volume =\
  \ 0.4\n```\n\n`volume` 属性的值介于 0 和 1 之间，其中 0 表示静音，1 表示以最大音量播放声音。\n\n从技术上讲，背景音乐和音效之间没有区别。通常，背景音乐以较低的音量播放；许多游戏会循环播放背景音乐，以便歌曲结束时从头开始重新播放。为此，你可以使用\
  \ `numberOfLoops` 属性：\n\n```\naudioPlayer.numberOfLoops = 0 // 默认行为：音频仅播放一次\naudioPlayer.numberOfLoops\
  \ = 1 // 音频重复一次（= 音频播放两次）\naudioPlayer.numberOfLoops = -1 /* 负值表示循环播放次数无限，\n因此音频将始终持续播放\
  \ */\n```\n\n你在本书中开发的所有游戏都会使用两种类型的声音（背景音乐和音效）来让游戏更刺激。对于每个音效或背景音乐对象，你需要创建一个单独的音频播放器对象。尝试使用示例进行实验。你能为音乐添加一些循环吗？也可以尝试更改声音的音量。\n\
  \n**注意**\n\n在游戏中使用声音和音乐时，需要注意一些事项。声音可能会让某些玩家感到厌烦，因此如果你确实使用了音效或音乐，请确保提供让玩家关闭它们的途径。另外，不要强迫玩家等待声音播放完毕才能继续。你可能创作了一首很棒的音乐，希望在显示介绍画面时播放，但玩家启动你的游戏不是为了听音乐——他们是想玩游戏！同样的原则也适用于游戏内的视频序列。始终为用户提供跳过这些内容的方式（即使你让你最喜欢的家庭成员提供了僵尸音效）。最后，一些玩家的\
  \ iPhone 或 iPad 存储空间可能有限，因此请尽可能使用较小的声音文件。\n\n## 本章小结\n\n在本章中，你学习了以下内容：\n\n*   如何将游戏资源（如精灵和声音）加载到内存中\n\
  *   如何在屏幕上绘制多个精灵并移动它们\n*   如何在游戏中播放背景音乐和音效\n\n"
