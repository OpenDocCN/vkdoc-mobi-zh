- '# 第一部分


  入门指南


  本书第一部分介绍使用 Swift 开发游戏应用的基础知识。你将看到多个简单示例，展示如何使用 Swift 创建应用程序。我会向你介绍 Swift 语言，以及用于创建
  2D 游戏的 SpriteKit 引擎。本部分涵盖核心的 Swift 编程结构，例如指令、表达式、对象和方法。此外，我还会介绍游戏循环，以及如何加载和绘制精灵（图像）。


