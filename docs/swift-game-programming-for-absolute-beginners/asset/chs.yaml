- "# 12. 高级输入处理\n\n电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-0650-8_​12](http://dx.doi.org/10.1007/978-1-4842-0650-8_12)）包含补充材料，仅供授权用户使用。\n\
  \n在本章中，你将创建一个更高级的输入处理机制。同时，还将介绍一些重要的编程概念，例如数组和字典。在《画家》游戏中，输入处理相当基础。你只跟踪了玩家触摸的最后一个位置。对于《画家》而言，这已经足够，因为玩家仅用一根手指玩游戏。在更复杂的游戏中，这种基础的输入处理方法就不够用了。特别是在《图特的坟墓》中，玩家可能使用多根手指在屏幕上拖拽物体。在本章中，你将扩展\
  \ `InputHelper` 类，使其能够处理多点触控输入。\n\n## 创建触摸对象\n\n你需要解决的主要问题是，`InputHelper` 类目前只跟踪单个触摸的信息。它存储了最后记录的触摸位置，以及玩家是否进行了点击（换句话说，玩家是否刚刚开始用手指触摸屏幕）。以下是存储这些信息的两个属性：\n\
  \n`var touchLocation = CGPoint(x: 0, y: 0)`\n\n`var hasTapped: Bool = false`\n\n\
  为了处理多点触控输入，你需要同时存储和跟踪多个位置的信息。除此之外，你还需要一种方法来区分不同的触摸，例如，让玩家可以用一根手指移动一个物体，同时用另一根手指按下一个按钮。这意味着每个触摸位置都需要一个唯一的标识符。为了方便实现这一点，让我们创建一个表示触摸的类型。到目前为止，你一直使用类来创建自己的类型。另一种创建类型的方法是使用结构体。如前所述，与类不同，结构体是按值复制而非按引用复制。这意味着每次复制一个类型为结构体的变量时，其值都会在内存中被复制。因此，结构体通常更适用于较小的数据结构。触摸就是一个典型的小数据结构的例子。以下是定义结构体来表示触摸的示例：\n\
  \n```\nstruct Touch {\n    var id = 0\n    var location = CGPoint()\n    var tapped\
  \ = true\n}\n```\n\n如你所见，定义结构体与定义类相同，只是使用 `struct` 关键字代替 `class` 关键字。这个结构体有三个属性：一个标识符、一个位置以及一个布尔变量，用于指示触摸是否为点击。现在，你可以用一种非常简单的方式创建\
  \ `Touch` 对象：\n\n`var myTouch = Touch()`\n\n默认情况下，这个 `Touch` 对象的 `id` 为 0，但你需要每个\
  \ `Touch` 对象都有一个唯一的标识符。有一种相对简单的方法可以实现这一点。如果你还记得，类属性是属于类本身的属性，而非属于某个对象。`world` 属性就是一个很好的例子：它属于\
  \ `GameScene` 类。无论有多少个 `GameScene` 实例，始终只有一个 `world` 属性，你可以这样访问它：\n\n`GameScene.world`\n\
  \n类似地，结构体有一种称为静态属性的特性。如果某个属性是静态的，那么它属于结构体本身，而非结构体的某个实例。请看以下结构体定义：\n\n```\nstruct\
  \ Touch {\n    var id = 0\n    var location = CGPoint()\n    var tapped = true\n\
  \    static var idgen: Int = 0\n}\n```\n\n这个结构体有一个静态属性 `idgen`，初始化为 0。由于此属性属于结构体本身而非任何特定实例，你可以用它来生成唯一标识符。具体做法是：在创建实例时，将\
  \ `idgen` 属性的当前值赋给 `id` 属性，然后将 `idgen` 属性加 1，从而为新的 `Touch` 实例生成 ID。这个任务可以在初始化器中完成：\n\
  \n```\ninit() {\n    id = Touch.idgen\n    Touch.idgen++\n}\n```\n\n还有一种更简洁的方法，即更巧妙地使用\
  \ `++` 后缀运算符。当你递增一个变量时，`++` 后缀运算符会返回该变量递增前的旧值。你可以将此结果存储到另一个变量中，如下所示：\n\n```\nvar\
  \ a = 12\nvar b = a++ // 执行这条指令后，a = 13, b = 12\n```\n\n在此示例中，第二条指令执行后，变量 `b` 包含了\
  \ `a` 的旧值（递增前），而 `a` 包含了递增后的值。你也可以将 `++` 运算符写在变量前面。这个 `++` 前缀运算符会返回递增后的新值，如下所示：\n\
  \n```\nvar c = 10\nvar d = ++c // 执行这条指令后，c = 11, d = 11\n```\n\n在这种情况下，第二条指令执行后，`c`\
  \ 和 `d` 都包含递增后的值（11）。如果你将这个思路应用到 `Touch` 结构体中，那么就不再需要初始化器；只需递增 `idgen` 属性，并将其旧值赋给\
  \ `id` 属性：\n\n```\nstruct Touch {\n    var id = idgen++\n    var location = CGPoint()\n\
  \    var tapped = true\n    static var idgen: Int = 0\n}\n```\n\n结果是，你现在可以创建 `Touch`\
  \ 实例，并且每个实例都会自动获得一个唯一标识符：\n\n```\nvar aTouch = Touch()          // aTouch 的 id 为\
  \ 0\nvar anotherTouch = Touch()    // anotherTouch 的 id 为 1\nvar yetAnotherTouch\
  \ = Touch() // yetAnotherTouch 的 id 为 2\n```\n\n\n\n### 数组\n\n现在你已经有了一个简单的方法来生成携带唯一标识符的触摸位置，你需要扩展\
  \ `InputHelper` 类，使其支持存储这些触摸的多个实例。在 Swift 中，实现这一目标非常便捷的方式是使用**数组**。数组本质上是一个编号列表。请看以下示例：\n\
  \n`var emptyArray: [Int] = []`\n\n`var intArray = [4, 8, 15, 16, 23, 42]`\n\n这里展示了两个数组变量的声明与初始化。第一个声明是一个可以包含\
  \ `Int` 值的空数组（无元素）。第二个变量 `intArray` 指向一个长度为 6 的数组。你可以通过索引访问数组中的元素，其中数组第一个元素的索引为\
  \ 0：\n\n`var v = intArray[0]  // 包含值 4`\n\n`var v2 = intArray[4] // 包含值 23`\n\n\
  你使用方括号来访问数组中的元素。同样也可以使用方括号修改数组中的值：\n\n`intArray[1] = 13 // intArray 现在是 [4, 13,\
  \ 15, 16, 23, 42]`\n\n还可以向数组中添加元素：\n\n`intArray.append(-3) // intArray 现在是 [4, 13,\
  \ 15, 16, 23, 42, -3]`\n\n最后，每个数组都有一个 `count` 变量，你可以通过访问它来获取数组长度：\n\n`var l = intArray.count\
  \ // 包含值 7`\n\n你可以将数组与 `for` 循环结合使用来实现有趣的功能。示例如下：\n\n`for var i = 0; i < intArray.count;\
  \ i++ {`\n\n    `intArray[i] += 10`\n\n`}`\n\n这段代码遍历数组中的所有元素，并为每个元素加 10。因此，执行完这段代码后，`intArray`\
  \ 指向 `[14, 23, 25, 26, 33, 52, 7]`。或者，你也可以使用带范围的 `for` 循环来实现相同的效果：\n\n`for i in\
  \ 0..<intArray.count {`\n\n    `intArray[i] += 10`\n\n`}`\n\n除了你刚才看到的那种初始化数组的方式，还有另一种更类似类的方式可以创建数组：\n\
  \n`var myArray = Array<Int>(count: 3, repeatedValue: 10)`\n\n这个例子创建了一个大小为 3 的数组，每个元素的值都是\
  \ 10。因此，上述指令与下面这条指令相同：\n\n`var myArray = [10, 10, 10]`\n\n你甚至可以在 Swift 中创建多维数组，如下所示：\n\
  \n`var anotherArray: [[Int]] = [[1, 2, 3], [4, 5, 6]]`\n\n变量 `anotherArray` 是一个由整型数组组成的数组。所以，如你所见，数组的元素本身也可以是数组。数组的数组在表示网格结构时特别有用。许多游戏都使用某种网格结构来表示游戏世界。例如，你可以使用二维数组来表示井字棋游戏的棋盘：\n\
  \n`var tictactoe : [[String]] = [[\"x\", \"o\", \" \"], [\" \", \"x\", \"o\"], [\"\
  \ \", \"o\", \"x\"]]`\n\n下面是一种使用一维数组来表示二维网格的简单方法：\n\n`var rows = 10, cols = 15`\n\
  \n`var myGrid = Array<Int>(count: rows * cols, repeatedValue: 0)`\n\n现在，可以通过以下方式访问第\
  \ `i` 行、第 `j` 列的元素：\n\n`var elem = myGrid[i * cols + j]`\n\n图 12-1 展示了表达式语法图的一部分，其中包含了用于指定数组的语法。\n\
  \n![A978-1-4842-0650-8_12_Fig1_HTML.gif](img/A978-1-4842-0650-8_12_Fig1_HTML.gif)\n\
  \n图 12-1. 表达式部分语法图\n\n### 字典\n\n除了数组，Swift 还有一种集合类型，称为**字典**。字典与数组非常相似，区别在于它表示的不是一个编号列表，而是一种从一种类型到另一种类型的映射。字典是一系列键/值对，通过不同的键来访问关联的值。键和值可以是任意类型。这与数组形成对比，在数组中，“键”始终是数组索引。以下示例应该能说明这一点：\n\
  \n`var translator = [String:String]()`\n\n`translator[\"house\"] = \"maison\"`\n\
  \n`translator[\"tree\"] = \"arbre\"`\n\n`translator[\"dog\"] = \"chien\"`\n\n如你所见，字典允许你存储一个映射关系。在这个例子中，映射是从一个字符串（键）到另一个字符串（值）的映射，如果你想实现一个翻译表，这会非常有用。不过，使用的类型不必相同：\n\
  \n`var ages = [String:Int]()`\n\n`ages[\"mary\"] = 45`\n\n`ages[\"john\"] = 12`\n\
  \n\n\n### 可选类型\n\n在继续代码示例之前，让我们仔细看看 Swift 语言中一个颇具创新性的特性：**可选类型**。可选类型是一种机制，它允许你拥有一个变量，其类型可以有选择地指向一个实际对象。这听起来可能没什么用，但让我们再考虑一下翻译器示例：\n\
  \n```\nvar translator = [String:String]()\ntranslator[\"house\"] = \"maison\"\n\
  translator[\"tree\"] = \"arbre\"\ntranslator[\"dog\"] = \"chien\"\n```\n\n现在假设你输入以下指令：\n\
  \n```\nvar houseTranslated = translator[\"house\"]\n```\n\n由于你已将 \"house\" 键存入字典，你可以将查找该值的结果存入一个变量。但现在假设你输入以下内容：\n\
  \n```\nvar carTranslated = translator[\"car\"]\n```\n\n`translator` 字典中没有包含 car\
  \ 的条目。那么在这种情况下应该发生什么呢？你可以想象编译器在编译程序时会报错。但编译器不可能在所有情况下都知道 `translator` 字典的内容。假设当程序启动时，这个字典的内容是从服务器检索而来的呢？或者当程序运行时，由用户输入呢？编译器根本无法总是知道字典里有什么，所以它无法检测到这类错误。但如果编译器检测不到，当条目不存在时，`carTranslated`\
  \ 变量中会存储什么值呢？在 Swift 中，这个值是 `nil`。表达式 `translator[\"car\"]` 返回的值在某些情况下可能是 `nil`。这就是为什么该表达式的类型被称为可选类型。你可以通过其名称后的问号来识别可选类型。`carTranslated`\
  \ 的类型是 `String?`。你在声明变量时也可以这样写：\n\n```\nvar carTranslated: String? = translator[\"\
  car\"]\n```\n\n因为 `carTranslated` 变量是可选类型，你可以给它赋值为 `nil`：\n\n```\ncarTranslated\
  \ = nil\n```\n\n你还可以在 `if` 指令中测试它是否为 `nil`：\n\n```\nif carTranslated == nil {\n\
  \    print(\"翻译不可用。\")\n}\n```\n\n现在假设你想将翻译结果转换成大写字母。`String` 类型有一个 `capitalizedString`\
  \ 属性可以实现这一点。然而，以下指令会导致编译器报错：\n\n```\nvar strWithCapitals = carTranslated.capitalizedString\n\
  ```\n\n编译器报错的原因是 `carTranslated` 可能指向 `nil` 而非字符串值。如果出现这种情况，`capitalizedString`\
  \ 属性就不能被使用。为了解决这个问题，你可以使用一种叫做**可选链**的方法，如下所示：\n\n```\nvar strWithCapitals = carTranslated?.capitalizedString\n\
  ```\n\n可选链会检查 `carTranslated` 是否为 `nil`。如果不是，属性的结果会存储在 `strWithCapitals` 中。如果 `carTranslated`\
  \ 是 `nil`，那么 `nil` 值会被存储在 `strWithCapitals` 中。这意味着 `strWithCapitals` 变量本身也是一个可选类型\
  \ `String?`。\n\n如果你非常确定 `carTranslated` 永远不会包含 `nil` 值，你也可以将其解包为实际的 `String` 类型。这可以通过感叹号来实现：\n\
  \n```\nvar strWithCapitals = carTranslated!.capitalizedString\n```\n\n由于假设 `carTranslated`\
  \ 永远不会是 `nil`，现在 `strWithCapitals` 的类型是 `String` 而不是 `String?`。但使用这种方法时要小心。如果你的程序存在一个\
  \ bug，导致 `carTranslated` 意外变成 `nil`，那么程序执行会因错误而停止。\n\nSwift 为 `if` 指令提供了一个很好的扩展，使其仅在值解包成功时才执行一段代码块：\n\
  \n```\nif let carTranslated = translator[\"car\"] {\n    // 执行某些操作\n}\n```\n\n这个\
  \ `if` 指令的主体仅在表达式 `carTranslated` 不为 `nil` 时才执行。如果是这种情况，`carTranslated` 的类型是 `String`，并包含\
  \ `translator[\"car\"]` 解包后的值。因此，上面的 `if` 指令与以下代码的功能相同：\n\n```\nlet carTranslatedOptional\
  \ = translator[\"car\"]\nif carTranslatedOptional != nil {\n    let carTranslated\
  \ = carTranslatedOptional!\n    // 执行某些操作\n}\n```\n\n如你所见，结合值解包的 `if` 指令是一个有用的扩展，能生成更短、更易读的代码。\n\
  \n### 注意\n\n可选类型和解包机制是目前仅在 Swift 语言中可用的特性。其他编程语言，如 C# 或 Java，并不具备这些特性。通过在编程语言本身中显式处理可选值，Swift\
  \ 迫使程序员思考某个值是确定的，还是有时可能不存在。因此，在编写代码时请记得预先考虑好如何处理每种情况。这是一件好事，因为它能带来更健壮的程序。然而，如果你没有精心设计你的类和方法，最终可能会得到充满问号和感叹号的代码，这会让你的代码非常难以理解。\n\
  \n\n\n## 存储多点触摸\n\n现在，你将学习如何使用数组、字典和可选类型来处理多点触摸，通过创建一个新的 `InputHelper` 类。这个类现在包含一个名为\
  \ `touches` 的属性，它是一个 `Touch` 对象的数组：\n\n`var touches: [Touch] = []`\n\n你需要处理三种类型的触摸事件：\n\
  \n* 玩家开始用其中一根手指触摸屏幕。\n* 玩家移动已触摸屏幕的手指。\n* 玩家将手指从屏幕上移开。\n\n针对上述每一种情况，让我们向 `InputHelper`\
  \ 中添加一个处理方法。在本章稍后部分，你将把这些方法连接到实际的触摸事件上。第一种情况是玩家开始触摸屏幕。在这种情况下，需要创建一个 `Touch` 实例，将其位置设置为记录的触摸位置，最后将该\
  \ `Touch` 实例添加到数组中。以下是完整的方法：\n\n```\nfunc touchBegan(loc: CGPoint) -> Int {\n  \
  \  var touch = Touch()\n    touch.location = loc\n    touches.append(touch)\n  \
  \  return touch.id\n}\n```\n\n如你所见，该方法期望一个代表触摸位置的 `CGPoint` 对象作为参数。该方法会返回所创建 `Touch`\
  \ 实例的标识符。这很有用，因为这样方法的调用者在之后使用 `InputHelper` 实例时，就知道如何引用那个特定的触摸。\n\n当玩家移动手指时，应调用\
  \ `InputHelper` 中的另一个名为 `touchMoved` 的方法：\n\n```\nfunc touchMoved(id: Int, loc:\
  \ CGPoint) {\n    if let index = findIndex(id) {\n        touches[index].location\
  \ = loc\n    }\n}\n```\n\n该方法期望一个触摸标识符和新的触摸位置作为参数。它依赖于一个名为 `findIndex` 的方法，该方法在\
  \ `touches` 数组中搜索与标识符对应的索引，并返回一个可选的 `Int` 值。在这个方法中，你使用 `for` 循环遍历 `touches` 数组中的所有元素。当找到与你正在查找的触摸数据标识符匹配的触摸时，你就返回该数据。如果找不到触摸数据，则返回\
  \ nil。以下是 `findIndex` 的声明和主体：\n\n```\nfunc findIndex(id: Int) -> Int? {\n    for\
  \ index in 0..<touches.count {\n        if touches[index].id == id {\n         \
  \   return index\n        }\n    }\n    return nil\n}\n```\n\n一旦找到索引，你就可以将数组中 `Touch`\
  \ 实例的 `location` 属性设置为新位置，这正是 `touchMoved` 方法中第二条指令所做的。\n\n最后，当玩家将手指从屏幕上移开时，应调用\
  \ `touchEnded` 方法，该方法将 `Touch` 实例从数组中移除：\n\n```\nfunc touchEnded(id: Int) {\n  \
  \  if let index = findIndex(id) {\n        touches.removeAtIndex(index)\n    }\n\
  }\n```\n\n如你所见，从数组中移除元素是通过 `removeAtIndex` 方法完成的。该方法接受一个索引作为参数：该索引指示应移除元素的位置。示例如下：\n\
  \n```\nvar fib = [1, 1, 2, 3, 5, 8, 13]\nfib.removeAtIndex(3) // fib 现在为 [1, 1,\
  \ 2, 5, 8, 13]\n```\n\n## 让处理触摸输入更简单\n\n你可以向 `InputHelper` 类添加更多方法，使其在游戏中更易于使用。第一个是一个简单的方法，用于检索具有给定\
  \ id 的触摸的位置：\n\n```\nfunc getTouch(id: Int) -> CGPoint {\n    if let index = findIndex(id)\
  \ {\n        return touches[index].location\n    } else {\n        return CGPoint.zeroPoint\n\
  \    }\n}\n```\n\n检查玩家是否正在触摸屏幕的某个特定区域也很有用。例如，如果你想在游戏中添加一个按钮，你需要检查玩家是否点击了按钮精灵所代表的区域。可以使用以下方法处理这种情况：\n\
  \n```\nfunc containsTouch(rect: CGRect) -> Bool {\n    for touch in touches {\n\
  \        if rect.contains(touch.location) {\n            return true\n        }\n\
  \    }\n    return false\n}\n```\n\n在该方法体中，有一个 `for` 循环，它会检查数组中的每个触摸，看其位置是否落在矩形内。根据检查结果，该方法返回\
  \ `true` 或 `false`。为了找到矩形内触摸的 id，可以调用以下方法：\n\n```\nfunc getIDInRect(rect: CGRect)\
  \ -> Int? {\n    for touch in touches {\n        if rect.contains(touch.location)\
  \ {\n            return touch.id\n        }\n    }\n    return nil\n}\n```\n\n此方法有助于检查触摸\
  \ id 是否仍然有效：\n\n```\nfunc isTouching(id: Int) -> Bool {\n    return findIndex(id)\
  \ != nil\n}\n```\n\n最后，这个方法指示玩家是否在某个区域内点击了（刚刚开始触摸）：\n\n```\nfunc containsTap(rect:\
  \ CGRect) -> Bool {\n    for touch in touches {\n        if rect.contains(touch.location)\
  \ && touch.tapped {\n            return true\n        }\n    }\n    return false\n\
  }\n```\n\n在 `InputHelper` 类中还有更多方法，这些方法在你将在本书中开发的后续游戏中会很有用。概述请参阅属于本章的 TutsTomb1\
  \ 示例中的 `InputHelper` 类。\n\n\n\n### 将触摸事件关联至输入辅助类\n\n`InputHelper`类已经准备就绪，但你仍需确保在必要时能调用`touchBegan`、`touchMoved`和`touchEnded`方法。在\
  \ Painter 游戏中，你通过在`GameScene`类中添加触摸事件处理方法实现了这一点。例如，以下是处理触摸开始的方法：\n\n```\noverride\
  \ func touchesBegan(touches: Set<UITouch>, withEvent event: UIEvent?) {\n\nlet touch\
  \ = touches.first!\n\ninputHelper.touchLocation = touch.locationInNode(self)\n\n\
  inputHelper.nrTouches += touches.count\n\ninputHelper.hasTapped = true\n\n}\n```\n\
  \n该方法的第一个参数类型为`Set<UITouch>`。请注意，`Set<UITouch>`也是一种集合类型，与`Array`类似。数组与集合的区别在于：数组元素有序，而集合无序。此外，集合不允许重复元素，而数组允许。根据游戏需求，你可以选择不同的数据结构。例如，集合可能适用于表示玩家背包，尤其是当玩家每种物品只能拥有一个时。\n\
  \n触摸点存储在集合中是合理的，因为你只允许存储特定的触摸点一次，且触摸顺序并不重要。在`InputHelper`类中，你完全可以用集合而非数组来存储触摸点。在`Set`关键字后的尖括号内，你会看到`UITouch`类型。回顾一下，在\
  \ Swift 以及许多支持**泛型**的编程语言中，这表示该集合包含`UITouch`类型的对象。`Set`类型本身是一个泛型，只有指定了集合具体包含何种对象时才能使用。例如，你也可以声明一个字符串集合：\n\
  \n```\nvar stringSet = Set<String>()\n```\n\n在`touchesBegan`方法内部，你需要处理多点触摸的可能性。这意味着你要处理集合中的所有触摸点。有一种特殊的`for`循环语法，可以对集合中的每个元素执行操作。请看以下示例：\n\
  \n```\nvar intArray = [2, 3, 4, 6]\n\nfor value: Int in intArray {\n\nprint(value)\n\
  \n}\n```\n\n这个示例使用`for`循环对数组中的每个元素执行任务。在很多情况下，你可以省略类型，因为它可以从你遍历的集合中推断出来：\n\n```\n\
  var intArray = [2, 3, 4, 6]\n\nfor value in intArray {\n\nprint(value)\n\n}\n```\n\
  \n类似地，你也可以对集合中的每个元素执行操作：\n\n```\nfor touch in touches {\n\n// 处理触摸\n\n}\n```\n\n\
  在`for`循环体内，你可以使用`touch`变量（类型为`UITouch`）来计算触摸位置并将其存储在常量中，如下所示：\n\n```\nlet location\
  \ = touch.locationInNode(self)\n```\n\n接着，调用`InputHelper`中的`touchBegan`方法，将触摸点添加到数组中。该方法会返回一个\
  \ ID，你需要将其存储在变量中：\n\n```\nlet id = inputHelper.touchBegan(location)\n```\n\n你还可以使用字典来存储`UITouch`对象与`InputHelper`类生成的\
  \ ID 之间的映射：\n\n```\nvar touchmap = [UITouch:Int]()\n```\n\n在`touchesBegan`事件处理方法的最后一条指令中，将该\
  \ ID 存储到映射中：\n\n```\ntouchmap[touch] = inputHelper.touchBegan(location)\n```\n\n\
  在`touchesMoved`方法中，你需要使用这个 ID 来更新输入辅助类中的触摸位置。与`touchesBegan`一样，你使用`for`循环对每个移动的触摸位置执行此操作。以下是完整的方法：\n\
  \n```\noverride func touchesMoved(touches: Set<UITouch>, withEvent event: UIEvent)\
  \ {\n\nfor touch in touches {\n\nlet touchid = touchmap[touch]!\n\ninputHelper.touchMoved(touchid,\
  \ loc: touch.locationInNode(self))\n\n}\n\n}\n```\n\n首先，你在字典中查找与该对象对应的 ID。然后，调用`InputHelper`类中的`touchMoved`方法来更新触摸位置信息。\n\
  \n```\nlet touchid = touchmap[touch]!\n```\n\n请注意末尾感叹号。这是必需的，因为你需要解包字典查找返回的可选`Int`值。\n\
  \n当玩家停止触摸屏幕时，应从字典中移除触摸点与 ID 的对应关系。可通过将字典元素赋值为`nil`来实现，如下所示：\n\n```\nlet touchid\
  \ = touchmap[touch]!\n\ntouchmap[touch] = nil\n```\n\n最后，调用`touchEnded`方法来更新输入辅助类：\n\
  \n```\ninputHelper.touchEnded(touchid)\n```\n\n有关处理多点触摸输入的完整代码，请参阅本章附带的 TutsTomb1\
  \ 示例中的`InputHelper`和`GameScene`类。\n\n## 拖动精灵\n\n作为示例，让我们使用新的`InputHelper`类在屏幕上拖动精灵。请再次查看\
  \ TutsTomb1 程序。在其中，你将找到更新后的`InputHelper`类，以及一个简单的示例：加载几个精灵，将其绘制在屏幕上，并允许你通过拖动在屏幕上移动精灵。该程序还包含一个名为`Treasure`的基础类，用于在图坦卡蒙墓游戏中表示宝藏。\n\
  \n在 TutsTomb1 示例中，该游戏的大部分功能尚未实现。屏幕上只绘制了两个`Treasure`对象，玩家可以用手指拖动它们。对象拖动的实现位于该类的`handleInput`方法中。该方法包含两部分。第一部分，检查玩家是否刚刚开始拖动对象。如果是，则需要存储该触摸的\
  \ ID，以便后续用该 ID 跟踪玩家手指的移动位置。在`Treasure`类中，有一个名为`touchid`的属性（类型为`Int?`），用于存储当前正在拖动该对象的触摸\
  \ ID。如果对象未被拖动，该 ID 设置为`nil`。一旦玩家开始拖动，就将触摸 ID 存储在该属性中：\n\n```\nif inputHelper.containsTap(self.box)\
  \ {\n\n    touchid = inputHelper.getIDInRect(self.box)\n\n}\n```\n\n`handleInput`方法的下一步是，只要用户的手指仍在触摸屏幕，就更新宝藏的位置，使其跟随用户手指移动。一旦玩家抬起手指，就将`touchid`属性重置为`nil`。以下指令涵盖了所有这些逻辑：\n\
  \n```\nif let touchUnwrap = touchid {\n\n    if inputHelper.isTouching(touchUnwrap)\
  \ {\n\n        self.position = inputHelper.getTouch(touchUnwrap)\n\n    } else {\n\
  \n        touchid = nil\n\n    }\n\n}\n```\n\n就是这样！如你所见，实现拖动功能并不困难，但如果有一些用于处理（多点）触摸输入的实用方法，确实能简化工作。在这种情况下，`containsTap`方法使得判断玩家何时开始拖动对象变得非常简单。\n\
  \n![A978-1-4842-0650-8_12_Fig2_HTML.jpg](img/A978-1-4842-0650-8_12_Fig2_HTML.jpg)\n\
  \n图 12-2. TutsTomb1 示例\n\n## 本章所学内容\n\n在本章中，你学习了以下内容：\n\n*   如何处理游戏中的多点触摸输入\n* \
  \  什么是数组和字典，以及如何使用它们\n*   什么是可选类型，以及应如何使用它们\n\n\n\n"
- "# 13. 游戏物理\n\n**电子补充材料** 本章的在线版本（doi:[10.1007/978-1-4842-0650-8_13](http://dx.doi.org/10.1007/978-1-4842-0650-8_13)）包含补充材料，可供授权用户使用。\n\
  \n在《画家》游戏中，你创建了一个非常基础的机制，用于处理游戏世界中物体的移动和相互碰撞。但在《图坦之墓》中，这已不再够用。物体需要根据重力下落，需要从墙壁反弹，还需要以不同的方式处理碰撞。在本章中，你将调整游戏结构，使其更适合这些高级交互。你会发现，在\
  \ SpriteKit 中为游戏对象添加符合物理规律的行为其实相当简单。\n\n## 游戏对象的基础类\n\n大多数游戏都拥有复杂的游戏对象结构。首先，可能有一个由多层移动物体（山脉、天空、树木等）构成的背景。其次，还有交互式物体在四处移动。这些物体可能是玩家的敌人，因此需要一定程度的智能；它们也可能更加静态，比如能量道具、树木、门或梯子。一个代表房屋的游戏对象可能由许多其他游戏对象组成，例如门、楼梯、窗户和厨房（而厨房又可能由不同的游戏对象组成）。\n\
  \n考虑到这些不同类型的游戏对象以及它们之间的关系，可以说游戏对象通常构成了一个表示游戏世界的层级结构。大多数游戏都使用某种游戏对象的层级结构。尤其是在 3D\
  \ 游戏中，由于三维环境的复杂性，这种层级结构非常重要。3D 游戏中的对象通常不是由精灵图表示，而是由一个或多个 3D 模型表示。层级结构的优势在于这些对象可以被分组在一起，这样当你拿起一个里面装有写着魔法文字的卷轴的花瓶时，卷轴会随着花瓶一起移动。\n\
  \n在《画家》游戏中，游戏对象的基本类型由`ThreeColorGameObject`类表示。到目前为止，你一直这样表示游戏对象，仅仅是因为这对于你正在处理的基础示例来说已经足够。如果你想开发更大、更复杂的游戏，就必须放弃游戏对象是一个三色精灵图的基本前提。\n\
  \n在 SpriteKit 中，最基本的游戏对象是`SKNode`类型的对象。`SKNode`唯一假设的是游戏对象应该是某种层级结构（代表游戏世界）的一部分。本书中创建的游戏依赖于一种设计，该设计在游戏对象类本身中定义了游戏对象如何成为游戏循环的一部分。例如，在《画家》中，`Cannon`类处理与炮管相关的输入，而`Ball`类处理与球相关的输入。此外，球的位置以及任何游戏对象交互都在`Ball`类的`update`方法中处理。最后，每当游戏重新启动时，每个游戏对象都会重置为其初始状态。这意味着如果游戏对象拥有`handleInput`方法、`update`方法和`reset`方法，那可能会很有用。\n\
  \n在 TutsTomb2 示例中，你可以找到一个名为`GameObjectNode`的类，它是`SKNode`的子类。`GameObjectNode`类恰好添加了上一段中提到的三个游戏循环方法。由于任何`GameObjectNode`类型的对象也是`SKNode`对象，它可以有子节点。例如，如果在`GameObjectNode`实例上调用了`handleInput`方法，你需要确保任何类型为`GameObjectNode`的子节点也能处理输入。因此，在`handleInput`方法的主体内部，你使用一个`for`循环遍历子节点，将它们转换为`GameObjectNode`实例，如果转换成功，则在子对象上调用`handleInput`方法，如下所示：\n\
  \n```\nfunc handleInput(inputHelper: InputHelper) {\n    for obj in children {\n\
  \        if let node = obj as? GameObjectNode {\n            node.handleInput(inputHelper)\n\
  \        }\n    }\n}\n```\n\n注意用于在`if`指令中将可选值赋给变量的特殊写法。`as?`运算符尝试将对象转换为给定的类型（本例中为`GameObjectNode`）。如果转换不可能，该运算符返回`nil`。因此，如果`node`包含一个实际的`GameObjectNode`实例，就在其上调用`handleInput`方法。如果你查看`GameObjectNode`类，你会看到`updateDelta`和`reset`方法的实现也非常相似。\n\
  \n## 游戏对象子类\n\n由于《图坦之墓》游戏涉及掉落的宝藏，TutsTomb2 示例中包含一个`Treasure`类，它现在是`GameObjectNode`的子类。`Treasure`类重写了`handleInput`方法以实现拖拽。\n\
  \n另一个是`GameObjectNode`子类的类是`GameWorld`。游戏世界在`setup`方法中填充游戏对象，该方法在场景初始化时于`GameScene`类中被调用。以下是`setup`方法中将几个`Treasure`实例添加到游戏世界的部分：\n\
  \n```\nfor i in 0...4 {\n    var treasure = Treasure()\n    treasure.position =\
  \ CGPoint(x: -250 + i * 120, y: 200)\n    treasures.addChild(treasure)\n}\n```\n\
  \n如你所见，这段代码创建了五个`Treasure`实例，根据循环计数器`i`定位它们，并将它们添加到属于游戏世界的`treasures`节点。\n\n`GameWorld`作为`GameObjectNode`子类的好处在于，由于`GameObjectNode`的设计方式，游戏循环方法现在会自动在其子节点上被调用。这意味着如果你将`Treasure`实例添加为另一个游戏对象的子节点，那么`handleInput`方法调用现在会自动传播给这些宝藏。`GameWorld`的`handleInput`方法在`GameScene`中被调用，该方法随后会对游戏世界中所有游戏对象的子节点（以及子节点的子节点，包括宝藏）调用`handleInput`方法。这产生了一个简洁、清晰的设计，使得后续创建更复杂的游戏对象交互变得容易得多。如同你在\
  \ TutsTomb2 示例中看到的，`Treasure`的`handleInput`方法调用了其超类（`GameObjectNode`）的`handleInput`方法。通过这种方式，你可以确保`handleInput`方法调用的链条不会中断，即使将来你决定向`Treasure`实例添加子节点。\n\
  \n\n\n## 为游戏对象添加物理属性\n\n到目前为止，你一直通过在游戏循环中改变游戏对象的位置来使其移动。在《画家》游戏中，球等部分对象拥有一个 `velocity`\
  \ 属性，你通过操作该属性来让球移动。在物理世界中，情况要稍微复杂一些。物体会移动是因为有力作用在它们身上。例如，世界上的任何物体都受到重力的影响。如果你朝某个方向推一个物体，你就是在对该物体施加一个力。而当物体之间发生碰撞时，它们需要对这些碰撞做出自然的反应。\n\
  \n如果你希望游戏世界以更符合物理规律的方式运行，就需要一个能模拟物理世界的模型，并将其作为游戏的一部分。SpriteKit 框架的妙处在于，它内部已经集成了一个物理引擎，你可以用它为游戏对象添加逼真的物理行为。在《画家》游戏中，你是自己编写物理代码的。例如，在\
  \ `Ball` 类中你做过这样的事：\n\n```\nvelocity.x *= 0.99\nvelocity.y -= 15\n```\n\n第一行是一个简单的空气摩擦模型。第二行是对重力如何影响物体速度的近似处理。在图坦卡蒙之墓游戏中，你将使用\
  \ SpriteKit 的物理引擎来模拟物理效果，而不是自己编写代码。你会看到，为游戏世界添加物理属性非常简单。`SKNode` 的任何实例（或其子类）都有一个名为\
  \ `physicsBody` 的属性，它允许你控制该对象在物理系统中的参与方式。如果你想为一个对象添加物理行为，`physicsBody` 属性应指向一个 `SKPhysicsBody`\
  \ 实例。这个实例通常是游戏对象在物理世界中的简化表示。例如，在 `Treasure` 类中，你可以在初始化器里添加以下代码：\n\n```\nself.physicsBody\
  \ = SKPhysicsBody(circleOfRadius: 100)\n```\n\n这会为宝物创建一个物理表示。在这个例子中，物理表示是一个具有给定半径的圆形。你也可以使用其他形状，比如矩形：\n\
  \n```\nself.physicsBody = SKPhysicsBody(rectangleOfSize: CGSize(width: 100, height:\
  \ 100))\n```\n\n你也可以使用精灵（纹理）的形状来创建物理体形状：\n\n```\nself.physicsBody = SKPhysicsBody(texture:\
  \ sprite.texture!, size: sprite.size)\n```\n\n如果你希望游戏能在多种不同设备上流畅运行，那么确保物理计算不会过于复杂是一个好主意。对于\
  \ 2D 游戏来说，这通常已不再是主要问题，但如果你有很多游戏对象带有物理行为并相互移动碰撞，你可能会选择使用简化形状来更高效地处理物理问题。而如果一个形状看起来已经很接近矩形或圆形，那么使用简化形状进行物理计算，视觉效果通常也不会差。\n\
  \n在图坦卡蒙之墓游戏中，你将使用实际的精灵形状进行物理计算。既然 `Treasure` 实例有了 `physicsBody`，它们会立即表现出物理行为。在 TutsTomb2\
  \ 示例中，为了测试目的，已经在游戏世界中添加了几个 `Treasure` 实例。\n\n如果你不加任何额外对象直接运行游戏，你会看到你添加的五个对象会立刻掉出屏幕。这是因为这些对象默认会受到重力的影响。为了将游戏对象限制在游戏世界中，你需要创建地面和墙壁。下面我们给游戏世界添加一个地板。这个地板也需要一个物理体，以便它能与其他游戏对象交互：\n\
  \n```\nlet floor = SKNode()\nfloor.position.y = -400\nvar square = CGSize(width:\
  \ GameScene.world.size.width, height: 200)\nfloor.physicsBody = SKPhysicsBody(rectangleOfSize:\
  \ square)\n```\n\n如你所见，地板是一个附加了物理体的 `SKNode` 对象，所以并没有实际的地板精灵。你只是希望物体不再继续下落。为了在物理世界中表示地板，你使用了一个简化形状——这里是一个矩形。但是等等，既然地板也是一个物理对象，它会不会像其他游戏对象一样直接掉下去呢？是的，它会。因此，你需要明确告诉物理系统，地板在游戏世界中位于一个固定位置，并且它不响应动力学（包括力）。操作方法如下：\n\
  \n```\nfloor.physicsBody?.dynamic = false\n```\n\n最后，将 `floor` 对象添加到游戏世界：\n\n```\n\
  addChild(floor)\n```\n\n类似地，你还可以为游戏世界添加天花板、左墙和右墙。完整代码请参考 TutsTomb2 示例。\n\n现在游戏世界有了地板、天花板和侧墙，游戏物体会下落，并与围墙和彼此之间发生碰撞。当你使用\
  \ SpriteKit 提供的物理引擎时，所有这些行为都是免费获得的。有时在调试时，在屏幕上显示实际的物理体是很有用的。你可以通过设置 `SKView` 对象中的\
  \ `showPhysics` 属性来实现。`GameViewController` 类中的以下这行代码就实现了这一点：\n\n```\nskView.showsPhysics\
  \ = true\n```\n\n\n\n### 交互\n\n既然已经为每个游戏对象定义了物理实体，现在可以通过施加力来操控对象。例如，可以像这样为物理实体赋予一个速度：\n\
  \n`physicsBody?.velocity = CGVector(dx: 10, dy: 10)`\n\n如你所见，`physicsBody` 属性是可选的，这很合理，因为如果对象不属于物理系统，该属性就是\
  \ `nil`。`physicsBody` 的 `velocity` 属性的类型是 `CGVector`，它代表一个二维向量。一旦为对象指定了速度，随着游戏进程推进，它会根据该速度自动计算出自身位置。在\
  \ `Treasure` 类中，你可以利用这一特性实现对物理对象的拖拽操作：\n\n```\nvar moveVector = inputHelper.getTouch(touchid)\n\
  moveVector.x -= position.x\nmoveVector.y -= position.y\nphysicsBody?.velocity =\
  \ CGVector(dx: moveVector.x * 10, dy: moveVector.y * 10)\n```\n\n首先，计算出一个向量，它代表物理实体应当移动的方向。具体做法是获取触摸位置，然后从中减去当前对象的位置。为了让对象足够快地移动到触摸位置，速度向量的\
  \ `x` 和 `y` 分量需要乘以一个常量（10）。一旦将这个向量赋值给物理实体的 `velocity` 属性，对象的位置就会自动更新。\n\n另一种需要处理的交互类型是对象之间的碰撞。在游戏中，当对象相互碰撞时，通常需要执行某种操作。如果玩家与道具发生碰撞，玩家生命值应增加；如果玩家与敌人碰撞，玩家将受到伤害；如果玩家与星星碰撞，则应为玩家增加分数。\n\
  \n在 SpriteKit 中，你可以指定由哪个对象负责处理碰撞（或接触）。如果这个对象拥有特定的方法，那么每当物理实体之间发生接触时，该方法就会被调用。SpriteKit\
  \ 使用一种 Swift 特性——协议（protocol）来强制执行这一点。协议本质上是一组方法（或属性）头的定义，旨在帮助开发者编写更连贯的代码。以下是一个名为\
  \ `SKPhysicsContactDelegate` 的协议示例：\n\n```\nprotocol SKPhysicsContactDelegate :\
  \ NSObjectProtocol {\n    optional func didBeginContact(contact: SKPhysicsContact)\n\
  \    optional func didEndContact(contact: SKPhysicsContact)\n}\n```\n\n如你所见，该协议包含两个方法头：`didBeginContact`\
  \ 和 `didEndContact`。现在我们来修改 `GameWorld` 类，使其遵循 `SKPhysicsContactDelegate` 协议。实现方式与继承非常相似：\n\
  \n```\nclass GameWorld : GameObjectNode, SKPhysicsContactDelegate {\n    // 待完成：类主体\n\
  }\n```\n\n如果一个类遵循某个协议，也可以说这个类实现了该协议。在此例中，`GameWorld` 现在实现了 `SKPhysicsContactDelegate`\
  \ 协议。该协议描述了任何实现它的类，并可选地定义 `didBeginContact` 和 `didEndContact` 方法。还有一些协议强制要求实现它的类必须定义方法、属性，甚至是初始化器。请看以下协议：\n\
  \n```\nprotocol NSCoding {\n    func encodeWithCoder(aCoder: NSCoder)\n    init(coder\
  \ aDecoder: NSCoder)\n}\n```\n\n如果一个类实现了这个协议，它就必须拥有协议中定义的方法和初始化器。`SKNode` 实现了这个协议，这也是为什么\
  \ `SKNode` 的任何子类（包括 `GameObjectNode`）都需要定义一个特定的初始化器：\n\n```\nrequired init?(coder\
  \ aDecoder: NSCoder) {\n    fatalError(\"init(coder:) has not been implemented\"\
  )\n}\n```\n\n在 `GameWorld` 类中，添加以下来自 `SKPhysicsContactDelegate` 协议定义的方法：\n\n```\n\
  func didBeginContact(contact: SKPhysicsContact) {\n    let firstBody = contact.bodyA.node\
  \ as? Treasure\n    let secondBody = contact.bodyB.node as? Treasure\n    print(\"\
  Contact at position \\(contact.contactPoint)\")\n}\n```\n\n从方法主体中可以看到，`contact`\
  \ 参数包含了哪些物理实体发生了接触，以及接触在游戏世界中的位置等信息。为了测试，每当两个物理体之间的接触开始时，会在屏幕上打印接触位置。你也可以实现 `didEndContact`\
  \ 方法，这样就能在两个对象停止接触时执行特定动作。例如，当玩家从桌子上拿走一颗钻石时，你可以触发警报。在接下来的章节中，你将定义游戏对象接触时更复杂的行为。\n\
  \n你还需再做一件事，以确保每当两个物理体接触时都能调用 `didBeginContact`：你需要告知场景，负责处理接触的对象是 `GameWorld` 实例。为此，在\
  \ `GameScene` 的 `didMoveToView` 方法中添加以下这行代码：\n\n`physicsWorld.contactDelegate =\
  \ GameScene.world`\n\n至此，TutsTomb2 示例就完成了。图 13-1 展示了当前游戏的截图。请自行运行这个示例，看看它是如何工作的。尝试调整物理引擎的设置，例如，你能改变重力吗？同时，试着改变游戏对象物理体的形状，观察游戏玩法会发生什么变化。\n\
  \n![A978-1-4842-0650-8_13_Fig1_HTML.jpg](img/A978-1-4842-0650-8_13_Fig1_HTML.jpg)\n\
  \n**图 13-1.** TutsTomb2 示例程序的截图\n\n**注意** 在游戏中使用物理引擎时，一个有趣的方面是调整物理引擎的参数。大多数物理引擎（包括\
  \ SpriteKit 内置的）都允许你修改诸如重力大小，或哪些对象受重力影响等参数。这对于设定在具有不同重力的外星世界的游戏非常有用。此外，游戏的可玩性比物理正确性更重要。在策略游戏中，飞机飞行速度可以像士兵在地上行走一样快。这完全不符合现实，但它让游戏变得可玩。不要犹豫，大胆改变物理引擎的设置来提升游戏体验。不妨查看一下\
  \ `SKPhysicsBody` 类的属性和方法，以了解其可能性。\n\n## 本章所学\n\n在本章中，你学习了以下内容：\n\n-   如何使用基础的游戏对象类，在场景图中组织游戏对象\n\
  -   如何为游戏添加物理行为\n-   如何通过拖拽的方式与物理世界中的对象进行交互\n-   如何在两个对象相互碰撞时执行动作\n\n"
- "# 14. 游戏玩法编程\n\n电子补充材料：本章的在线版本（doi:[10.1007/978-1-4842-0650-8_14](http://dx.doi.org/10.1007/978-1-4842-0650-8_14)）包含补充材料，仅供授权用户访问。\n\
  \n本章将探讨“图坦卡蒙之墓”游戏的玩法编程。你将学习如何使用动作（actions）来轻松地为游戏世界添加行为。此外，你还将处理游戏对象之间的交互（例如，当两个相同类型的宝藏发生碰撞时）。\n\
  \n\n\n## 游戏对象行为\n\n此前，您在游戏中添加行为的方式是在每个游戏对象类中定义 `handleInput` 和 `update` 方法，然后确保在游戏循环中为每个实例调用这些方法。这种方法的好处在于每个游戏对象负责自身的行为。例如，Painter\
  \ 游戏中球的行为在 `Ball` 类中定义；Tut's Tomb 游戏中宝藏的行为则在 `Treasure` 类中定义。\n\n在类的方法中定义行为确实不错：查看类定义时，您就能立即了解该类实例所包含的行为。但这种方法也有其局限性。最重要的是，无法在不同类之间复制行为。Painter\
  \ 游戏中的油漆罐会反复掉落，且间隔时间随机。在 Tut's Tomb 中，宝藏也会掉落，但除了在类之间复制粘贴代码外，没有简单的方法可以将油漆罐的行为复制给宝藏。\n\
  \n总的来说，游戏对象在行为上往往有许多共同点。大多数平台游戏都会有某种巡逻敌人，从左到右移动，然后再返回。像玩家奖励生命这样的对象，会随机或在固定时间间隔出现在场景中。游戏对象可能拥有简单的特效，比如旋转或缩放（例如，对于即将爆炸的炸弹）。如果能够以某种方式将这些行为从游戏对象本身分离出来，从而更轻松地在类之间复制，那岂不是很好？\n\
  \n### 动作\n\nSpriteKit 框架提供了一种非常优雅的解决方案，用于以更通用的方式定义游戏对象行为：即使用所谓的“动作”。在 SpriteKit\
  \ 中，您可以将这些动作附加到 `SKNode` 的实例上，并决定它们的执行频率和顺序。您可以将动作视为预定义行为的简单模块，可以按任意方式组合。您甚至可以定义自己的自定义动作，并将其添加到游戏对象中。让我们来看几个例子。\n\
  \n当您希望游戏对象以动作的形式拥有预定义行为时，需要做两件事。首先，您需要定义动作，然后需要告诉游戏对象执行该动作。定义动作需要使用 `SKAction` 类。请看下面的动作定义：\n\
  \n`let rotate = SKAction.rotateByAngle(CGFloat(2 * M_PI), duration: 3)`\n\n`SKAction`\
  \ 类有许多可供调用的类方法。每个方法都会创建某种类型的动作。在这个例子中，定义了一个旋转动作，该动作会在三秒内使对象围绕其原点旋转 2π 弧度（360 度）。例如，您可以在游戏对象类的初始化器中定义此动作。然后，您可以告诉游戏对象执行此动作，如下所示：\n\
  \n`self.runAction(rotate)`\n\n现在，当您创建游戏对象时，它将围绕其原点旋转一次。这是另一个动作的例子：\n\n`let fadein\
  \ = SKAction.fadeInWithDuration(5)`\n\n`self.runAction(fadein)`\n\n这个动作会在 5 秒内淡入一个游戏对象（从完全透明到完全不透明）。再来看另一个例子：\n\
  \n`let playSound = SKAction.playSoundFileNamed(\"snd_music.mp3\", waitForCompletion:\
  \ false)`\n\n这个动作会播放音效。使用动作播放音效比本书前面介绍的方法更简单。然而，对于像这样的动作，无法控制音量，因此虽然使用动作播放声音非常方便，但您可能需要在游戏中对声音进行更多控制。\n\
  \n除了只执行单个动作，您还可以创建一个动作序列，并执行该序列，如下所示：\n\n`let seq = SKAction.sequence([fadein, rotate])`\n\
  \n`sequence` 方法需要一个 `SKAction` 对象数组，它会创建一个新动作，该动作就是数组中各动作的顺序组合。您可以像执行其他任何动作一样执行这个序列：\n\
  \n`self.runAction(seq)`\n\n此外，除了只执行一次动作，您还可以创建重复执行的动作，如下所示：\n\n`let repeat = SKAction.repeatActionForever(seq)`\n\
  \n`self.runAction(repeat)`\n\n您甚至可以创建一个仅执行代码块的动作。这里有一个例子：\n\n`let customAction =\
  \ SKAction.runBlock({`\n\n    `// 在此处编写您自己的代码`\n\n`})`\n\n如您所见，SpriteKit 中的动作是定义游戏对象行为的非常强大的工具。在下一节中，您将使用动作为\
  \ Tut's Tomb 游戏定义一些行为。\n\n\n\n### 使用动作实现宝物掉落\n\n在图坦卡蒙之墓中，宝物需要每隔几秒掉落一次。动作非常适合用来简洁地定义这一行为。宝物掉落动作需要无限重复，而且在每次掉落之间游戏需要等待片刻，以免宝物立即堆满屏幕。在本节中，你将在`GameWorld`类中定义这个动作。\n\
  \n为了让游戏随着时间推移更有趣，每隔一段时间就会出现新类型的宝物。每次宝物掉落时，你都需要递增一个计数器。计数器的值决定了宝物类型的多样性。让我们修改`Treasure`类来支持这一行为。首先需要的是一个接受宝物类型作为参数的初始化器：\n\
  \n```\ninit(type: UInt32) {\n    super.init()\n    self.type = type\n    sprite\
  \ = SKSpriteNode(imageNamed: \"spr_treasure_\\(self.type)\")\n    sprite.zPosition\
  \ = 1\n    self.position.y = 500\n    self.addChild(sprite)\n    self.physicsBody\
  \ = SKPhysicsBody(texture: sprite.texture!, size: sprite.size)\n    self.physicsBody?.contactTestBitMask\
  \ = 1\n}\n```\n\n这个初始化器根据宝物类型创建了一个精灵节点。宝物类型用一个整数值表示。`UInt32`类型代表一个 32 位无符号整数值。\"\
  无符号\"意味着该整数没有正负号。换言之，该类型不区分正数和负数。这很好，因为各种宝物类型都是用正数表示的。现在你可以添加一个便捷初始化器，在指定类型范围内随机创建宝物：\n\
  \n```\nconvenience init(range: UInt32) {\n    let finalRange = min(range, 20)\n\
  \    let tp = arc4random_uniform(finalRange)\n    self.init(type: tp)\n}\n```\n\n\
  这个便捷初始化器做了三件事。首先，它确保范围不会超过可用精灵的最大数量（在图坦卡蒙之墓中为 20）。第二行在范围内生成一个随机整数，最后你调用了指定初始化器。\n\
  \n现在你已经以这种方式扩展了`Treasure`类，就可以轻松定义一个掉落宝物的动作了。首先，在`GameWorld`类中声明一个`counter`属性：\n\
  \n```\nvar counter = 0\n```\n\n在`GameWorld`初始化器中，你将定义掉落宝物所需的动作。你通过创建`Treasure`实例并将其添加到游戏世界来掉落宝物。`Treasure`初始化器已经将对象放置在正确的位置（参见本节中的初始化器代码）。根据计数器当前的值，你可以计算出所需的范围。例如，你可以从范围\
  \ 5 开始，每掉落 10 个宝物就增加 1：\n\n```\nlet r: UInt32 = 5 + self.counter/10\n```\n\n根据这个范围创建`Treasure`实例并将其添加到游戏世界，现在只需一行代码即可完成：\n\
  \n```\nself.treasures.addChild(Treasure(range: r))\n```\n\n在宝物掉落动作中唯一需要做的另一件事就是递增计数器。因此，这就是掉落宝物的动作：\n\
  \n```\nlet dropTreasureAction = SKAction.runBlock({\n    let r: UInt32 = 5 + self.counter/10\n\
  \    self.treasures.addChild(Treasure(range: r))\n    self.counter++\n})\n```\n\n\
  如你所见，这个动作被定义为一个需要执行的指令块。为了在宝物掉落之间等待，你可以使用`waitForDuration`方法来创建一个等待动作。以下是这两个动作的序列，游戏在掉落宝物后等待两秒：\n\
  \n```\nlet seq = SKAction.sequence([dropTreasureAction, SKAction.waitForDuration(2)])\n\
  ```\n\n然后整个动作无限重复这个序列：\n\n```\nlet totalAction = SKAction.repeatActionForever(seq)\n\
  self.runAction(totalAction)\n```\n\n作为这个动作的结果，每两秒就会掉落一个宝物。为了让宝物看起来像从烟囱里掉出来，让我们在游戏世界中添加一个烟囱精灵，它绘制在宝物掉落前出现的位置上方。烟囱绘制在更高的\
  \ z 位置，这样宝物就会绘制在它后面：\n\n```\nlet chimney = SKSpriteNode(imageNamed:\"spr_chimney\"\
  )\nchimney.zPosition = 10\nchimney.position.y = 510\naddChild(chimney)\n```\n\n\
  属于本章的`TutsTomb3`示例包含了本节解释的代码。当你运行它时，你会看到宝物以两秒的固定间隔掉落（见图 14-1）。尝试修改示例代码，看看你是否能改变这些动作的行为。你能让宝物出现得更频繁吗？\n\
  \n![A978-1-4842-0650-8_14_Fig1_HTML.jpg](img/A978-1-4842-0650-8_14_Fig1_HTML.jpg)\n\
  \n图 14-1. TutsTomb3 示例中宝物掉落\n\n\n\n### 特殊类型的宝藏\n\n为了让游戏更有趣一些，这里设计了若干特殊类型的宝藏。第一种类型是岩石。如果一个宝藏待在场景中太久，它就会变成一块无用的岩石，并且不会从场景中移除（即使它与另一块岩石碰撞）。第二种特殊宝藏类型是魔法水晶，它会移除任何与其碰撞的东西（甚至包括无用的岩石）。在代码中，你需要一种方法来区分各种类型的宝藏。一种方法是定义代表特殊宝藏类型的常量值。例如，你可以在\
  \ `Treasure` 类中定义如下常量：\n\n```\nstatic let RockType: UInt32 = 99\n\nstatic let MagicType:\
  \ UInt32 = 100\n```\n\n注意，这里我使用了 `static` 属性，这样可以在不需要 `Treasure` 实例的情况下引用它们。这些常量的类型是\
  \ `UInt32`，与普通宝藏类型相同。\n\n另一种选择是使用一个单独的类或结构体来定义特殊类型。看看这段代码：\n\n```\nstruct TreasureType\
  \ {\n\nstatic let Rock : UInt32 = 99\n\nstatic let Magic : UInt32 = 100\n\n}\n```\n\
  \n这里，使用了一个单独的 `struct` 来定义各种宝藏类型。这也是 TutsTomb3（及后续）示例中所采用的方法。由于结构体中的常量是 `static`\
  \ 的，你无需实例化该结构体即可访问这些属性。例如：\n\n```\nif type == TreasureType.Rock {\n\nsprite = SKSpriteNode(imageNamed:\
  \ \"spr_rock\")\n\n}\n```\n\n在这段代码（取自 `Treasure` 的初始化器）中，你检查作为参数传入的类型是否是岩石。如果是，则加载岩石精灵。\n\
  \n在某些情况下，你想要创建魔法水晶而不是普通宝藏。这是通过以下（部分） `if` 指令来完成的：\n\n```\nif arc4random_uniform(6)\
  \ == 0 {\n\nsprite = SKSpriteNode(imageNamed: \"spr_magic\")\n\nself.type = TreasureType.Magic\n\
  \n}\n```\n\n这里你可以看到，我使用了一个随机数生成器，以便有时创建魔法水晶而不是普通宝藏。\n\n有时候，你需要一种类型来表示不同类别的事物，类似于不同类型的宝藏。Swift\
  \ 有一个专门用于此目的的特性，称为枚举。枚举非常适合表示具有类别值的变量，或表示特定状态的变量。例如，你可能想通过枚举来存储玩家所代表的角色类型。你可以自行决定你的类型中包含哪些不同的状态。因此，在使用枚举之前，你必须先定义它：\n\
  \n```\nenum CharacterClan {\n\ncase Warrior\n\ncase Wizard\n\ncase Elf\n\ncase Spy\n\
  \n}\n```\n\n`enum` 关键字表示你要定义一个枚举。之后，写上枚举的名称，并在花括号内编写不同的 case。每个 case 前面都有关键字 `case`。\n\
  \n类型定义可以放在方法内部，但你也可以将其定义在类体级别，这样类中的所有方法都可以使用该类型。你甚至可以在全局作用域（类体外部）中定义它。以下是使用 `CharacterClan`\
  \ 枚举的示例：\n\n```\nlet myClan = CharacterClan.Warrior\n```\n\n在这种情况下，你创建了一个 `CharacterClan`\
  \ 类型的变量，它可以包含四个值之一：`CharacterClan.Warrior`、`CharacterClan.Wizard`、`CharacterClan.Elf`\
  \ 或 `CharacterClan.Spy`。如果变量的类型已明确指定，你不需要写出枚举类型的全名。例如：\n\n```\nlet myClan: CharacterClan\
  \ = .Warrior\n```\n\n使用枚举的另一个例子是定义一个类型来表示一周中的天数或一年中的月份：\n\n```\nenum MonthType {\n\
  \ncase January, February, March, April, May, June, July, August, September, October,\
  \ November,\n\nDecember\n\n}\n\nenum DayType {\n\ncase Sunday, Monday, Tuesday,\
  \ Wednesday, Thursday, Friday, Saturday\n\n}\n\nlet currentMonth = MonthType.February\n\
  \nlet today = DayType.Tuesday\n```\n\n正如你在这些示例中所看到的，你不需要在每个 case 前面都写 `case` 关键字。这使得创建具有许多不同\
  \ case 的枚举类型更加容易。\n\n尽管枚举在游戏中非常有用，但在 TutsTomb3 示例中，我并没有使用它们来表示各种宝藏类型。原因是，你需要一个数值来表示类型，因为它决定了加载哪个精灵。枚举不是数值。TutsTomb3\
  \ 示例中定义的 `struct` 在代码中的行为非常像枚举，但其 case 是数值。一些编程语言，如 C#，允许枚举用作数值。这可能会很方便，但在 Swift\
  \ 相当严格的类型系统中不太适用。\n\n### 将宝藏变成岩石\n\n如果一个宝藏待在场景中太久，它将被替换为一块岩石。这可以使用动作非常容易地实现。`SKNode`\
  \ 类有一个版本的 `runAction` 方法，它接受两个参数而不是一个。第一个参数是要运行的动作，第二个参数是一个代码块，该代码块应在动作完成后执行。如果你使用一个等待动作，那么你可以使用这种方法在经过一定时间后执行一段代码：\n\
  \n```\nself.runAction(SKAction.waitForDuration(20), completion: {\n\n    // 这段代码将在\
  \ 20 秒后执行\n\n})\n```\n\n在代码块内部，是用于将此宝藏替换为岩石的指令。第一步是使用特殊岩石类型创建一个岩石：\n\n```\nvar rock\
  \ = Treasure(type: TreasureType.Rock)\n```\n\n你将当前宝藏的位置赋给岩石，这样它就会被放置在正被替换的宝藏的同一位置：\n\
  \n```\nrock.position = self.position\n```\n\n然后，你将岩石添加到场景中，通过将其添加为当前宝藏父节点（即 `GameWorld`\
  \ 类中的 `treasures` 节点）的子节点来实现：\n\n```\nself.parent?.addChild(rock)\n```\n\n最后，你将当前宝藏从其父节点中移除，使其不再被绘制：\n\
  \n```\nself.removeFromParent()\n```\n\n请查看本章所属的 TutsTomb3 示例中的 `Treasure` 类，以了解该动作的完整代码。图\
  \ 14-2 显示了一些宝藏已经变成了岩石！\n\n![A978-1-4842-0650-8_14_Fig2_HTML.jpg](img/A978-1-4842-0650-8_14_Fig2_HTML.jpg)\n\
  \n图 14-2.\n宝藏变成了无用的岩石\n\n\n\n## 处理物理接触\n\n在结束本章之前，让我们来看看游戏玩法的最后一部分：处理宝藏之间的接触。在上一章中，你已经了解了如何为游戏对象添加物理行为。你还了解到，如果在\
  \ `GameWorld` 类（该类实现了 `SKPhysicsContactDelegate` 协议）内部定义特定的方法，就可以处理接触事件：\n\n```\n\
  func didBeginContact(contact: SKPhysicsContact) {\n    let firstBody = contact.bodyA.node\
  \ as? Treasure\n    let secondBody = contact.bodyB.node as? Treasure\n    // 在这里处理两个物体之间的接触\n\
  }\n```\n\n你需要通过考虑几种不同的情况来处理两个物体之间的接触。第一种情况是将物体节点转换为 `Treasure` 实例失败。如果其中一个物体根本不是宝藏（例如，它是一堵墙），就会发生这种情况。在这种情况下，你可以直接从这个方法中返回，因为当宝藏与墙壁碰撞时，你不需要做任何特殊处理：\n\
  \n```\nif firstBody == nil || secondBody == nil {\n    return\n}\n```\n\n如果两个物体发生碰撞，且它们属于同一类型（或者其中一个是魔法水晶），那么两个物体都将从场景中移除。为了避免多次从场景中移除物体（当物体的不同部分同时发生接触时可能会发生这种情况），你需要检查是否已经处理了这两个物体之间的接触。如果这两个物体中的任何一个没有父节点（换句话说，它已经被从场景中移除了），则表示接触已经被处理过，代码如下：\n\
  \n```\nif firstBody?.parent == nil || secondBody?.parent == nil {\n    return\n\
  }\n```\n\n还有一种情况是两个岩石发生碰撞。在这种情况下，你也需要从方法中返回，因为当两个岩石碰撞时，什么都不会发生——它们只会留在场景中，如下所示：\n\
  \n```\nif firstBody?.type == TreasureType.Rock &&\n    secondBody?.type == TreasureType.Rock\
  \ {\n    return\n}\n```\n\n最后一种情况是需要将物体从场景中移除。当两个宝藏的类型匹配，或者其中一个宝藏是魔法水晶时，就会发生这种情况。在这种情况下，两个物体都会使用\
  \ `removeFromParent` 方法从场景中移除：\n\n```\nif firstBody?.type == secondBody?.type ||\
  \ firstBody?.type == TreasureType.Magic\n    || secondBody?.type == TreasureType.Magic\
  \ {\n    firstBody?.removeFromParent()\n    secondBody?.removeFromParent()\n}\n\
  ```\n\n请查看 TutsTomb3 示例中的 `GameWorld` 类，以了解该方法的完整代码。请注意，方法体内 `if` 指令的编写顺序非常重要。例如，处理岩石的代码之所以能够正确工作，正是因为顺序。如果比较岩石类型的\
  \ `if` 指令放在方法体的末尾，那么两个岩石碰撞时也将从场景中被移除，这是不可取的。编写此类代码时，仔细考虑需要处理哪些情况非常重要。如果不小心，很容易引入错误！\n\
  \n## 本章所学内容\n\n在本章中，你学习了以下内容：\n\n-   如何编写游戏玩法逻辑以及游戏对象之间的交互\n-   如何使用动作来定义游戏对象的行为\n\
  -   如何在图坦卡蒙之墓游戏中处理物理接触\n\n"
- "# 游戏状态\n\n电子补充材料 本章的在线版本（doi:[10.​1007/​978-1-4842-0650-8_​15](http://dx.doi.org/10.1007/978-1-4842-0650-8_15)）包含补充材料，可供授权用户使用。\n\
  \n在上一章中，你编写了图坦卡蒙之墓游戏的主要玩法元素。然而，目前的游戏还远未完成。例如，当墓室完全被宝藏填满时，什么也不会发生。此外，当你启动程序时，游戏会立即开始，没有任何警告。我们仍然需要一种将菜单和覆盖层整合到游戏中的方法，以便玩家能够获取帮助或开始玩游戏。例如，当玩家处于菜单界面时，与游戏的交互类型与玩家解谜或尽力存活时的交互方式截然不同。在编写游戏程序时，你必须考虑如何整合这些不同的游戏状态，并在它们之间切换。\n\
  \n现代游戏有许多不同的游戏状态，例如菜单、地图、物品栏、启动画面、过场动画等等。本章将展示如何为图坦卡蒙之墓游戏添加不同的游戏状态。由于这个游戏目前还不太复杂，你可以通过对现有类进行一些简单的扩展来实现。然而，如果你想制作一款商业游戏，就必须妥善处理游戏状态的管理。第\
  \ 18 章将介绍一种使用类的软件设计方法，这种方法能够以非常优雅和通用的方式处理游戏状态。\n\n## 更好的图层处理\n\n处理不同游戏状态时，一个重要的方面是内容要在不同的图层上绘制。为此，你需要使用\
  \ `SKNode` 类的 `zPosition` 属性。使用固定的数字来表示图层可能不太容易记住。你需要跟踪哪个图层代表场景，哪个代表覆盖层，哪个代表背景。在\
  \ TutsTomb4 示例中，我使用了一个结构体来表示不同的图层，这与定义各种宝藏类型的方式非常相似（请参阅 `GameScene.swift` 文件）：\n\
  \n```\nstruct Layer {\n    static let Background: CGFloat = 0\n    static let Scene:\
  \ CGFloat = 1\n    static let Scene1: CGFloat = 2\n    static let Scene2: CGFloat\
  \ = 3\n    static let Overlay: CGFloat = 10\n    static let Overlay1: CGFloat =\
  \ 11\n    static let Overlay2: CGFloat = 12\n}\n```\n\n如你所见，我为背景、场景和覆盖层定义了几个有用的图层。现在，你可以非常方便地使用这些常量来定义图层：\n\
  \n```\nbackground.zPosition = Layer.Background\n```\n\n请查看 TutsTomb4 示例中的代码，了解如何使用这些图层来构建游戏世界中对象的绘制顺序。\n\
  \n\n\n### 添加标题画面\n\n让游戏看起来更完整的第一步就是添加标题画面。标题画面能让玩家做好准备再开始游戏，而不是直接进入游戏。你可以扩展 `GameWorld`\
  \ 类，使其能够加载并显示由单张图片构成的标题画面。为此，你需要创建一个 `SKSpriteNode` 实例，并将其添加到游戏世界中，代码如下：\n\n```\n\
  var titleScreen = SKSpriteNode(imageNamed:\"spr_title\")\n...\ntitleScreen.zPosition\
  \ = Layer.Overlay2\naddChild(titleScreen)\n```\n\n你将标题画面设置为 `Layer.Overlays2` 图层，这样就能确保标题绘制在所有内容的上方。但你还需要额外做些工作来正确处理输入并更新游戏世界，因为只有在标题画面不再可见时游戏才会开始。你可以在\
  \ `handleInput` 方法中添加一些指令来区分两种状态：一种是显示标题画面的状态，另一种是玩家正在玩游戏的状态：\n\n```\nif !titleScreen.hidden\
  \ {\n    if inputHelper.hasTapped {\n        titleScreen.hidden = true\n       \
  \ self.runAction(totalAction)\n    }\n} ... else {\n    super.handleInput(inputHelper)\n\
  \    ...\n}\n```\n\n查看这些 `if` 指令，你会发现如果标题画面是可见的，那么游戏只会在玩家点击屏幕时做出反应。在这种情况下，你会将标题画面的隐藏标志设为\
  \ `true`，这样它就不会再被绘制出来。同时，你也会启动每几秒掉落一次宝藏的动作。因此，只要标题画面可见，游戏唯一会做出的反应就是玩家的触摸屏幕操作。如果标题画面不可见，你就会调用父类的\
  \ `handleInput` 方法；换句话说，当玩家正在游戏时，游戏会按预期对玩家操作做出反应。\n\n对于 `updateDelta` 方法，你也遵循了几乎相同的流程：只有标题不可见时才会更新游戏世界：\n\
  \n```\nif titleScreen.hidden {\n    super.updateDelta(delta)\n}\n```\n\n现在，当玩家开始游戏时，他们会在游戏开始前看到一个标题画面（见图\
  \ 15-1）。但这还没结束。在下一节中，你将添加一个简单的按钮 GUI 元素，用于显示帮助框。\n\n![A978-1-4842-0650-8_15_Fig1_HTML.jpg](img/A978-1-4842-0650-8_15_Fig1_HTML.jpg)\n\
  \n图 15-1. 图坦卡蒙之墓的标题画面\n\n### 添加用于显示帮助框的按钮\n\n本节将讲解如何为游戏添加按钮，并用它来显示帮助框。为此，你需要在程序中添加另一个类\
  \ `Button`。你继承自 `GameObjectNode` 类，并添加一些简单的行为来检查玩家是否按下了按钮。在 `Button` 类中，你声明一个布尔属性，用于指示按钮是否被点击。然后重写\
  \ `handleInput` 方法，检查玩家是否点击了屏幕上的按钮。如果触摸位置在按钮精灵的边界内，就表明玩家点击了按钮，并将该属性的值设为 `true`。如何检查触摸位置是否在精灵的边界内？通过使用\
  \ `GameObjectNode` 类的 `box` 属性以及 `InputHelper` 类中的 `containsTap` 方法即可。以下是 `Button`\
  \ 类中完整的 `handleInput` 方法：\n\n```\noverride func handleInput(inputHelper: InputHelper)\
  \ {\n    super.handleInput(inputHelper)\n    tapped = inputHelper.containsTap(self.box)\n\
  }\n```\n\n完整的 `Button` 类，请参见 `TutsTomb4` 示例。现在，让我们向游戏世界添加一个帮助按钮。在 `GameWorld` 类中，你添加一个属性来表示帮助按钮：\n\
  \n```\nvar helpbutton = Button(imageNamed: \"spr_button_help\")\n```\n\n下一步是将帮助按钮定位到屏幕上并将其添加到游戏世界中。在图坦卡蒙之墓中，无论使用什么设备，帮助按钮都应始终显示在屏幕的右上角。为了实现这一点，你需要在\
  \ `GameWorld` 类中添加一个名为 `topRight` 的方法，用于计算屏幕右上角对应的位置：\n\n```\nfunc topRight() ->\
  \ CGPoint {\n    return CGPoint(x: size.width/2, y: size.height/2)\n}\n```\n\n使用这个方法，你现在可以计算出帮助按钮的所需位置：\n\
  \n```\nvar helppos = topRight()\nhelppos.x -= helpbutton.sprite.size.width/2 + 10\n\
  helppos.y -= helpbutton.sprite.size.height/2 + 10\n```\n\n由于精灵的原点默认在中心，你需要从右上角位置减去帮助按钮精灵宽度和高度的一半。再减去\
  \ 10 个像素，是为了在按钮和屏幕边缘之间留出一点边距。\n\n因为你想在玩家按下帮助按钮时显示帮助框，所以还需要向游戏世界添加一个帮助框。你将其隐藏标志设为\
  \ `true`，这样它就不会立即显示：\n\n```\nvar helpframe = SKSpriteNode(imageNamed: \"spr_help\"\
  )\nhelpframe.zPosition = Layer.Overlay2\nhelpframe.hidden = true\n```\n\n现在，你需要确保当玩家点击帮助按钮时，帮助框能够显示出来。你可以通过在\
  \ `GameWorld` 类的 `handleInput` 方法中添加以下 `if` 指令来实现：\n\n```\nif helpbutton.tapped\
  \ {\n    helpframe.hidden = false\n    self.removeAllActions()\n}\n```\n\n你还需要确保在显示帮助框时游戏不会被更新。这可以通过调用\
  \ `removeAllActions` 方法部分实现，该方法会禁用掉落宝藏的动作。同时，你还需要确保只在帮助框不可见时才更新游戏对象。因此，你将 `GameWorld`\
  \ 类的 `updateDelta` 方法修改如下：\n\n```\nif titleScreen.hidden && helpframe.hidden {\n\
  \    super.updateDelta(delta)\n}\n```\n\n图 15-2 展示了游戏中显示帮助框时的画面。\n\n![A978-1-4842-0650-8_15_Fig2_HTML.jpg](img/A978-1-4842-0650-8_15_Fig2_HTML.jpg)\n\
  \n图 15-2. 游戏中帮助框显示的截图\n\n\n\n### 叠加层\n\n向玩家呈现信息的一种非常常见的方式是使用叠加层。叠加层本质上是可以显示在游戏世界之上的图像，用于呈现信息或提供用户界面，例如菜单、小地图、状态信息等。上一节介绍的帮助框是叠加层的另一个示例。\n\
  \n叠加层可以呈现全新的游戏状态（例如游戏结束叠加层），或者它们可以通过向玩家提供信息来补充游戏世界。例如，许多策略游戏会提供关于已选单位数量、可用资源、进行中的建造过程、已收集物品等信息。这类叠加层通常一直显示在屏幕上，它们合起来被称为平视显示器（HUD）。《图坦卡蒙之墓》有一个非常基础的\
  \ HUD：它由一个显示当前分数的框（你将在下一章中添加）和一个玩家可以点击以查看帮助信息框的帮助按钮组成。\n\n除了 HUD 之外，当墓室完全被宝藏填满时，你还需要显示一个游戏结束叠加层。你需要将此叠加层添加到游戏世界中，并将其隐藏状态设置为\
  \ `true`：\n\n```swift\nvar gameover = SKSpriteNode(imageNamed: \"spr_gameover\"\
  )\nself.addChild(gameover)\ngameover.zPosition = Layer.Overlay2\ngameover.hidden\
  \ = true\n```\n\n该精灵的原点是其中心点，游戏场景的原点也在中心。后者是通过在 `GameScene` 类中添加以下代码行实现的：\n\n```swift\n\
  anchorPoint = CGPoint(x: 0.5, y: 0.5)\n```\n\n这样，游戏结束叠加层就会自动完美地居中显示在屏幕中央。你只需要扩展\
  \ `GameWorld` 类，以便在需要时显示该叠加层。首先，你需要检查游戏何时真正结束，即墓室完全被填满的情况。那么如何衡量这一点呢？一个简单的解决方案是扩展处理物理接触的方法。如果两个宝藏对象发生接触，并且其中任何一个的\
  \ Y 轴位置高于某个阈值，则意味着墓室可能已经相当满了，否则碰撞会发生在屏幕中较低的位置。在 `didBeginContact` 方法中，以下 `if` 指令检查了这一点：\n\
  \n```swift\nif firstBody?.position.y > 400 || secondBody?.position.y > 400 {\n \
  \   gameover.hidden = false\n    self.removeAllActions()\n}\n```\n\n如果游戏结束，叠加层变为可见，并且所有动作都被移除，这样宝藏就不会再掉落了。\n\
  \n不过，这个解决方案还不完美。玩家可以拖住一个宝藏并将其保持在烟囱下方。掉落的宝藏会与玩家拖住的宝藏发生碰撞，这将导致游戏结束事件，即使墓室可能完全空着。解决这个问题的一个简单方法是，当宝藏达到略低于游戏结束阈值的某个阈值时，就禁止玩家拖动它。这可以通过扩展\
  \ `Treasure` 类的 `handleInput` 方法来实现，如下所示：\n\n```swift\nif position.y >= 200 {\n\
  \    touchid = nil\n    if physicsBody?.velocity.dy >= 0 {\n        physicsBody?.velocity\
  \ = CGVector.zeroVector\n    }\n    return\n}\n```\n\n如果 Y 轴位置大于阈值 200，你通过将触摸 ID\
  \ 设为 `nil` 来停止拖动宝藏。你需要处理的另一件事是玩家以高速向上拖动宝藏。为了避免这种情况，如果宝藏正在向上移动，你将物理体的速度设为零。你可以通过检查物理体速度的\
  \ `dy` 属性来衡量这一点。\n\n在 `GameWorld` 的 `handleInput` 方法中，你需要检查游戏结束叠加层是否可见。如果是这样，玩家可以点击屏幕来重新开始游戏：\n\
  \n```swift\nif !gameover.hidden {\n    if inputHelper.hasTapped {\n        gameover.hidden\
  \ = true\n        self.reset()\n        self.runAction(totalAction)\n    }\n}\n\
  ```\n\n你需要重写 `reset` 方法，因为在游戏重新开始时需要进行一些额外的工作。特别是，你必须清空宝藏节点，使墓室再次为空，并将计数器重置为 0，以便游戏从有限的宝藏范围开始。此外，你还需要调用父类的\
  \ `reset` 方法，以便重置游戏世界中的所有游戏对象：\n\n```swift\noverride func reset() {\n    super.reset()\n\
  \    self.treasures.removeAllChildren()\n    self.counter = 0\n}\n```\n\n最后需要做的事情是确保在游戏结束时不再更新游戏世界。这意味着要对\
  \ `GameWorld` 的 `updateDelta` 方法进行另一次更改，如下所示：\n\n```swift\nif titleScreen.hidden\
  \ && helpframe.hidden && gameover.hidden {\n    super.updateDelta(delta)\n}\n```\n\
  \n图 15-3 展示了游戏结束状态。\n\n![A978-1-4842-0650-8_15_Fig3_HTML.jpg](img/A978-1-4842-0650-8_15_Fig3_HTML.jpg)\n\
  \n**图 15-3.** 太糟糕了…… 游戏设计\n\n在游戏开发团队中，程序员通常不负责游戏的设计，但对这个过程有基本的了解仍然非常有用。程序员必须将游戏设计转化为代码，并且必须能够就哪些内容可行、哪些难以实现向设计师提供建议。为了使这种协作成功，每个人都必须使用相同的语言。\n\
  \n游戏设计主要包括定义游戏机制、游戏设定和选择游戏关卡。游戏机制涉及游戏规则、玩家控制游戏的方式、目标和挑战以及奖励结构等方面。心理学和教育学在此扮演着重要角色。它们帮助你理解玩家如何进入心流状态（他们全身心投入游戏的心境）；目标、挑战和奖励如何相互支持；以及如何变化和调整游戏难度。\n\
  \n游戏设定涉及故事、角色以及游戏发生的虚拟世界。一个好的故事可以是玩家的强大动力，而在游戏过程中探索故事可以是一项非常令人满足的任务。角色需要唤起玩家的同理心，从而赋予必须完成的任务以意义。游戏世界则强化了这些方面，并使游戏适应特定的人群。\n\
  \n关卡设计有时由专门的关卡设计师完成，但在较小的团队中，这通常是游戏设计师的责任。精心的关卡设计会带来良好的学习曲线。它能让玩家保持挑战和动力，并且应该产生令人愉快的惊喜。\n\
  \n关于游戏设计已经出版了许多书籍，强烈建议你阅读其中一些。你也可以在 [www.gamasutra.com](http://www.gamasutra.com/)\
  \ 等网站上找到大量关于游戏开发各方面的信息。\n\n## 本章所学内容\n\n在本章中，你学习了以下内容：\n\n*   如何向游戏添加 HUD 和叠加层\n\
  *   如何定义一个显示框架的简单按钮\n*   如何处理几种不同的游戏状态，例如标题画面和游戏结束状态\n\n"
- "# 16. 完成《图坦卡蒙之墓》游戏\n\n电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-0650-8_16](http://dx.doi.org/10.1007/978-1-4842-0650-8_16))\
  \ 包含补充材料，仅供授权用户使用。\n\n在本章中，你将完成《图坦卡蒙之墓》游戏。第一步，你将使用自定义游戏字体向游戏添加一个分数指示器。第二步，你将通过在游戏中的宝藏上显示闪光效果来添加一个漂亮的视觉效果。最后，你将添加声音和音乐。请查看\
  \ `TutsTombFinal` 游戏示例。它包含了本章中解释的所有代码。\n\n\n\n## 添加分数\n\n在图坦之墓中，每当两个相同类型的宝藏碰撞时，它们会从屏幕上消失，玩家获得分数。你需要在屏幕的某个位置显示这些分数。在本游戏中，分数显示在屏幕的左上角。在\
  \ `GameWorld` 类中，你添加一个 `scoreObj` 属性，该属性表示用于维护和显示当前分数的节点。此属性的类型是 `Score`，这是一个将在本章讨论的类。当游戏世界设置完毕后，`Score`\
  \ 实例被定位在屏幕左上角（带有顶部和侧边距），并像这样添加到 `GameWorld` 节点中：\n\n```\nvar scorepos = GameScene.world.topLeft()\n\
  scorepos.x += scoreObj.sprite.size.width/2 + 10\nscorepos.y -= scoreObj.sprite.size.height/2\
  \ + 10\nscoreObj.position = scorepos\nself.addChild(scoreObj)\n```\n\n`Score` 类是\
  \ `GameObjectNode` 的子类。它包含一个精灵、一个用于显示分数的标签，以及一个用于跟踪当前分数的整数属性。在类的初始化器中，`sprite` 和\
  \ `label` 属性被定位并添加到节点中：\n\n```\nsprite.zPosition = Layer.Overlay\nself.addChild(sprite)\n\
  label.position = CGPoint(x: 100, y: 0)\nlabel.zPosition = Layer.Overlay1\nlabel.fontColor\
  \ = UIColor.blackColor()\nlabel.fontSize = 20\nlabel.verticalAlignmentMode = .Center\n\
  label.horizontalAlignmentMode = .Right\nlabel.text = \"0\"\nself.addChild(label)\n\
  ```\n\n标签初始化时会设置字体颜色、大小以及对齐方式。对齐方式指示文本相对于标签位置（即 (100, 0)）的显示方式。垂直对齐模式为“居中”。这意味着文本的显示方式使得文本的垂直中线位于\
  \ y 位置 0 处，相对于文本所属的分数节点对象局部坐标而言。水平对齐模式为“右”，导致文本右对齐。在定位方面，这意味着局部 x 位置（即 100）指示标签文本的右边缘。还有其他几种文本对齐选项。例如，你可以将文本在顶部、居中、底部或基线上垂直对齐（后者意味着文本所在的虚拟线，这与底部对齐不同，因为根据所使用的字体，某些字符可能会突出到基线下方，例如\
  \ `g` 或 `p` 字符）。尝试使用各种对齐选项和标签定位，看看效果如何。如果你想了解 Xcode 中某个属性或方法的更多信息，请按住 Control 键并单击它，然后选择“跳转到定义”。Xcode\
  \ 将显示其定义。你也可以按住 Command 键并单击某个属性或方法来实现相同效果。\n\n`Score` 类使用一个名为 `scoreValue` 的存储整数属性来跟踪当前分数。访问分数应该通过一个计算属性\
  \ `score` 进行：\n\n```\nvar score: Int {\n    get {\n        return scoreValue\n \
  \   }\n    set {\n        scoreValue = newValue\n        label.text = String(self.scoreValue)\n\
  \    }\n}\n```\n\n使用计算属性的原因是，它允许你在分数更改时也更改标签文本。在 `GameWorld` 的 `didBeginContact`\
  \ 方法中，如果两个相同类型的宝藏之间发生接触（或者涉及魔法水晶），分数就会增加：\n\n```\nif firstBody?.type == secondBody?.type\
  \ || firstBody?.type == TreasureType.Magic\n    || secondBody?.type == TreasureType.Magic\
  \ {\n    self.scoreObj.score += 10\n    ...\n}\n```\n\n当分数增加时，会调用 `score` 属性的 `set`\
  \ 部分，分数标签文本也会随之更新。\n\n## 控制访问\n\n假设 `Score` 类中的 `scoreValue` 属性声明如下：\n\n```\nvar\
  \ scoreValue: Int = 0\n```\n\n尽管该属性本应仅在 `Score` 类内部访问，但没有什么能阻止开发者编写以下代码：\n\n```\n\
  self.scoreObj.scoreValue += 10\n```\n\n如果意外以这种方式更新分数，将导致游戏出现问题，因为即使分数发生了变化，标签文本也不会更改。有没有办法强制属性只能在类内部访问，而不能在类外部访问？有的！Swift\
  \ 提供了三个用于控制类中属性和方法访问权限的关键字：`private`、`internal` 和 `public`，也称为访问修饰符。\n\n如果使用 `private`\
  \ 访问修饰符，则只能在其定义所在的源文件中访问该属性或方法。因此，在其他源文件中编写的代码将无法直接访问此类属性。例如，在 TutsTombFinal 示例中，`scoreValue`\
  \ 属性的声明方式如下：\n\n```\nprivate var scoreValue: Int = 0\n```\n\n如果现在尝试在 `GameWorld`\
  \ 类（定义在另一个源文件中）中访问 `scoreValue` 属性，编译器将报错。有时，将方法设置为 `private` 也很有用。例如，你可能向类中添加一个低级方法，用于内部计算某些内容，但不希望它被其他位置调用。本章后面你将看到此类方法的一个示例。\n\
  \n`internal` 访问意味着属性和方法可以从其定义所在的目标中的任何文件访问。目标是指当你点击“播放”按钮时 Xcode 构建的内容。因此，在本书的上下文中，目标通常是一个应用程序，但它也可以是一个属于同一组的类库或一个\
  \ OS X 应用程序。默认情况下，属性和方法具有 `internal` 访问权限。因此，声明\n\n```\nvar lives: Int = 0\n```\n\
  \n等同于\n\n```\ninternal var lives: Int = 0\n```\n\n最后，`public` 属性或方法可以从任何源文件访问，甚至可以在目标之外访问。后者在你开发希望用于多个游戏的类库时特别有用。\n\
  \n\n\n## 使用自定义字体\n\n如果你想让你自己的游戏脱颖而出，就必须仔细思考游戏中使用的字体。一般来说，应避免使用 Times New Roman 或\
  \ Arial 这类字体，因为每个人都已经熟知并使用了这些字体。现在有很多免费字体可供你在游戏中使用。如果你决定使用自定义字体，请确保你有权使用它。并非所有字体都可用于商业目的。\n\
  \n与精灵和声音一样，字体也是一种游戏资源。如果你在游戏中使用了特定字体，就应该随应用一起打包该字体，以确保游戏在所有玩家设备上显示一致。将字体与游戏一起打包非常简单，但需要执行几个步骤。\n\
  \n首先，你需要将字体文件添加到游戏项目中。在 TutsTombFinal 示例中，你可以看到一个名为 Fonts 的文件夹，其中包含一个 TrueType 字体文件。\n\
  \n下一步是确保 Xcode 复制该字体，使其成为目标的一部分。在 Xcode 中，点击窗口左侧的项目名称，然后选择 TutsTombFinal 目标。接着进入\
  \ Build Phases 标签页。如果你展开 Copy Bundle Resources 列表，它应显示该字体。如果没有，请将其从项目文件列表拖拽到 Copy\
  \ Bundle Resources 列表中（见图 16-1）。\n\n![A978-1-4842-0650-8_16_Fig1_HTML.jpg](img/A978-1-4842-0650-8_16_Fig1_HTML.jpg)\n\
  \n图 16-1.\n\n构建目标时复制的资源概览\n\n现在字体已添加到项目并在构建目标时被复制，你需要在项目设置中指明你的目标将使用该特定字体。点击 Supporting\
  \ Files 文件夹中的 `Info.plist` 文件，你会看到一个项目列表。其中有一个名为“应用提供的字体”的键，你会看到它包含一个项目：在 Tut's\
  \ Tomb 游戏中使用的自定义字体。如果你为自己的游戏启动新项目并想添加自定义字体，你需要通过悬停在信息属性列表字典上时出现的加号，自行将“应用提供的字体”键添加到该列表中。然后你可以添加一个新键，并将自定义字体添加至该键。\n\
  \n最后一步是使用你的字体创建一个标签节点。请注意，在 Swift 程序中使用的字体名称不一定与字体文件的名称相同。并没有特别便捷的方法找到属于某个字体文件的字体名称。如果你将以下代码片段插入到程序的某个位置，程序将列出其已知的所有字体：\n\
  \n```\nlet fontFamilies = UIFont.familyNames()\n\nfor familyName in fontFamilies\
  \ {\n    let fontNames = UIFont.fontNamesForFamilyName(familyName)\n    print(\"\
  \\(familyName): \\(fontNames)\")\n}\n```\n\n然后你可以在打印到控制台的列表中找到你想要使用的字体名称。图 16-2\
  \ 显示了 TutsTombFinal 中，使用自定义字体显示分数的标签。\n\n![A978-1-4842-0650-8_16_Fig2_HTML.jpg](img/A978-1-4842-0650-8_16_Fig2_HTML.jpg)\n\
  \n图 16-2.\n\n带有闪光效果的 TutsTombFinal 游戏\n\n## 添加闪光效果\n\n目前，宝藏只是屏幕上显示的简单精灵。让我们为它们添加一个漂亮的视觉特效：闪光。TutsTombFinal\
  \ 示例中包含一个名为 `Glitter` 的类，你可以用它来表示闪光游戏对象（是的，连闪光也是一个游戏对象！）。\n\n为了使闪光能够平滑地出现和消失，你将在\
  \ `Glitter` 类中使用动作来改变其缩放比例。当闪光被创建时，它应该从 0（不可见）缩放到 1（正常大小），然后再缩放回去。每当两个相同类型的宝藏接触时，你就在游戏世界中添加一定数量的\
  \ `Glitter` 实例，并将它们随机放置在接触点周围。\n\n在 `Glitter` 的初始化器中，你首先将 x 和 y 方向的缩放比例都设置为 0：\n\
  \n```\nself.xScale = 0\nself.yScale = 0\n```\n\n然后你定义了闪光的动作。为了避免大量闪光同时出现，你从一个等待动作开始：\n\
  \n```\nlet waitAction = SKAction.waitForDuration(0.1, withRange: 0.2)\n```\n\n这个等待动作会在\
  \ 0.2 秒的范围内，选择一个大约 0.1 秒的随机等待时间。这样，每个添加的闪光都将在略微不同的时间点出现。接下来，你定义了一个放大动作和一个缩小动作：\n\
  \n```\nlet scaleUpAction = SKAction.scaleTo(1, duration: 0.3)\nlet scaleDownAction\
  \ = SKAction.scaleTo(0, duration: 0.3)\n```\n\n最后，你创建了一个由这些动作组成的序列，并运行它们：\n\n```\n\
  let totalAction = SKAction.sequence([waitAction, scaleUpAction, scaleDownAction])\n\
  self.runAction(totalAction, completion: {\n    self.removeFromParent()\n})\n```\n\
  \n一旦动作完成，就会执行一个指令块。在这个例子中，该指令块包含一条指令，用于将闪光从游戏世界中移除。\n\n剩下唯一要做的事情就是将闪光添加到场景中。为此，让我们在\
  \ `GameWorld` 类中添加一个方法，它在给定位置周围添加一定数量的闪光。由于此方法应仅在 `GameWorld` 类内部使用，因此它是一个很好的具有私有访问权限的方法示例。以下是该方法的声明：\n\
  \n```\nprivate func addGlittersAroundPosition(pos: CGPoint, number: Int)\n```\n\n\
  正如你所见，该方法需要一个位置和一个数量参数。在方法体内，你使用一个 `for` 循环来创建并添加指定次数的 `Glitter` 对象。为了随机放置对象，你可以使用极坐标。换句话说，不是通过\
  \ x 和 y 坐标来表示位置，而是通过半径和角度来表示。如果你在一个范围内随机选择一个半径，以及一个介于 0 到 2π 之间的随机角度，闪光就会出现在给定位置周围的圆形区域内。你可以通过使用正弦和余弦数学函数，从极坐标转换回常规（笛卡尔）坐标。以下是\
  \ `addGlittersAroundPosition` 方法的完整实现：\n\n```\nfor _ in 1...number {\n    var glitter\
  \ = Glitter()\n    glitter.position = pos\n    var radius = randomDouble() * 100\n\
  \    var angle = randomDouble() * 2 * M_PI\n    glitter.position.x += CGFloat(cos(angle)\
  \ * radius)\n    glitter.position.y += CGFloat(sin(angle) * radius)\n    self.addChild(glitter)\n\
  }\n```\n\n注意在 `for` 循环中使用了下划线，因为这里不需要实际的计数器变量。接着，在 `didBeginContact` 方法中，你可以调用此方法来在接触点周围添加闪光。请查看\
  \ TutsTombFinal 示例中的代码以了解如何实现。图 16-2 显示了带有闪光效果的的的游戏！\n\n## 添加更多闪光效果\n\n由于闪光效果不关心被放置在何处，你可以在游戏的任何地方、任何时间添加闪光。例如，为了让魔法水晶更具魔力，你可以定义一个动作，持续在水晶周围添加闪光。`Treasure`\
  \ 类包含一个 `addGlitter` 方法，该方法在宝藏精灵的位置周围随机添加闪光。然后你可以简单地定义一个动作，反复向魔法水晶对象添加闪光。这个动作包括调用\
  \ `addGlitter` 方法，并稍作等待。以下是定义该动作的代码：\n\n```\nlet addGlitterAction = SKAction.runBlock({\n\
  \    self.addGlitter()\n})\nlet waitAction = SKAction.waitForDuration(0.1)\nlet\
  \ totalAction = SKAction.repeatActionForever(\n    SKAction.sequence([addGlitterAction,\
  \ waitAction]))\nself.runAction(totalAction)\n```\n\n图 16-3 显示了一个带有闪光效果的魔法水晶。\n\n\
  ![A978-1-4842-0650-8_16_Fig3_HTML.jpg](img/A978-1-4842-0650-8_16_Fig3_HTML.jpg)\n\
  \n图 16-3.\n\n闪闪发光！\n\n\n\n## 添加音乐与音效\n\n如同在“画家”游戏中一样，你需要为游戏添加音乐和音效，使其更具吸引力。正如你所见，在\
  \ Swift 中播放音乐和音效非常容易。你可以使用之前为“画家”游戏创建的 `Sound` 类。这是代码复用的又一个好例子：你只创建了一次 `Sound` 类，现在却可以在本书的所有游戏中使用它！\n\
  \n为“图坦卡蒙之墓”设计的不少类，对本书中的其他游戏也很有用。当你开始构建自己的游戏时，最终可能会积累一系列经常使用的类似类。在构建游戏时，提前思考是个好主意。哪些类可以在其他项目中复用？如何设计一个类，才能使其在将来也能被再次使用？随着你开发越来越多的类，维护一个列表可能会很有用；这样你在开发新内容时，就能快速扫描列表，并实现一些此前可能未曾想到的功能。\n\
  \n游戏开始时，你会开始播放背景音乐，如下所示（参见 `GameWorld` 类）：\n\n```\nbackgroundMusic.looping = true\n\
  backgroundMusic.volume = 0.5\nbackgroundMusic.play()\n```\n\n当两个相同类型的宝藏碰撞时，你也会播放一个音效（同样在\
  \ `GameWorld` 类中）：\n\n```\nif firstBody?.type == secondBody?.type || firstBody?.type\
  \ == TreasureType.Magic\n    || secondBody?.type == TreasureType.Magic {\n    self.scoreObj.score\
  \ += 10\n    ...\n    treasureCollectSound.play()\n}\n```\n\n最后，当游戏结束时，你会播放一个音效（同样在\
  \ `GameWorld` 类中）：\n\n```\nif firstBody?.position.y > 400 || secondBody?.position.y\
  \ > 400 {\n    gameover.hidden = false\n    self.removeAllActions()\n    gameoverSound.play()\n\
  }\n```\n\n至此，“图坦卡蒙之墓”游戏完成。你可以通过运行本章附带的 TutsTombFinal 示例来游玩此游戏。作为练习，看看你是否能自己为游戏扩展新功能。例如，你可以在宝藏碰撞时添加额外的动画效果。或者，加上一个排行榜/高分列表怎么样？无论如何，祝你寻宝愉快！\n\
  \n### 排行榜\n\n为什么游戏要有排行榜和高分列表？早期的游戏没有这些功能，因为当时的游戏机没有半持久化存储空间。因此，在不同游戏会话之间无法记住任何东西。也没有“保存游戏”选项，这对游戏机制产生了重要影响：玩家总是必须从头开始，即使他们是老手。\n\
  \n当存储空间可用后，设计师们开始引入排行榜。比别人强总能带来一种满足感，并且为玩家增加了一个重要的目标。但只有当多人在同一台设备上玩游戏时，这才有意义。如果你是唯一的玩家，唯一能做的就是试图超越自己。幸运的是，如今的电脑和游戏机都连接到了互联网。因此，你可以将排行榜存储在线上，并与全世界竞争。\n\
  \n但这又增加了一个问题：一个目标只有可实现时才有吸引力。在数百万人中成为最优秀的玩家，对大多数人来说都是遥不可及的。因此，全球排行榜实际上可能会降低玩家的满意度。为了解决这个问题，游戏通常会引入子排行榜。例如，你可以设立一个仅限于本国或本周内得分的排行榜。你也可以查看自己在朋友中的排名。精心设计游戏的计分系统以及在排行榜上展示这些分数的方式，对于提升玩家的满意度至关重要。\n\
  \n## 你学到了什么\n\n在本章中，你学习了以下内容：\n\n-   如何在游戏中使用自定义字体\n-   如何限制属性和方法的访问权限\n-   如何创建闪烁效果并将其附着到游戏对象上\n\
  \n"
