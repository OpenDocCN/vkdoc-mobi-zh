- "# 5 对玩家输入做出反应\n\n电子补充材料 本章的在线版本 (doi:10.1007/978-1-4842-0650-8_5) 包含补充材料，仅供授权用户使用。\n\
  \n游戏的一个重要元素是它对玩家的操作做出反应。在 iPhone 或 iPad 上，游戏主要响应玩家的触摸输入，这同样适用于你在阅读本书时开发的游戏。一些游戏还使用其他输入数据，例如内置的加速度计，我将在本章中简要讨论。为了处理输入数据，你需要一些新的编程概念，例如\
  \ `if` 指令，这将在本章中介绍。\n\n\n\n## 处理触摸输入\n\n所有使用触摸屏的 Apple 设备都能追踪多根手指及其在屏幕上的移动轨迹。用户的手指动作可被解读为手势（例如滑动切换页面，或捏合手势进行缩放），也可直接用手指位置来控制游戏元素。要处理触摸输入，你需要在程序中处理三个重要事件：\n\
  \n- 玩家开始用手指触碰屏幕的某个位置。\n- 玩家在屏幕上移动手指。\n- 玩家停止用手指触碰屏幕。\n\n由于触摸屏能同时处理多个触点，这些事件有时涉及单根手指，有时涉及多根手指。针对这三个事件，你可以在\
  \ `GameScene` 类中分别添加一个方法来处理。在这些方法内部，你可以访问触摸屏检测到的各个手指位置。现在，我们创建一个非常简单的触摸处理程序，无论玩家在屏幕上有多少根手指，程序都只记住单个触摸位置。在本章\
  \ Painter1 示例中打开 `GameScene.swift` 文件，即可查看相关代码。\n\n你需要将触摸位置存储在某处，因此我们先在 `GameScene`\
  \ 类中添加一个 `CGPoint` 类型的属性：\n\n`var touchLocation = CGPoint(x: 0, y: 0)`\n\n为了了解多点触摸的工作原理，我们再添加一个属性来记录玩家触碰屏幕的手指数量（初始值设为\
  \ 0）：\n\n`var nrTouches = 0`\n\n现在，每当玩家与触摸屏交互时，你都需要更新 `touchLocation` 和 `nrTouches`\
  \ 属性的值。完成这些操作后，你就可以对游戏世界进行相应修改，例如移动精灵或处理玩家点击按钮的操作。\n\n为了处理触摸输入，你需要在 `GameScene`\
  \ 类中添加三个方法与前述三类事件对应。这些方法分别命名为 `touchesBegan`、`touchesMoved` 和 `touchesEnded`。以下是\
  \ `touchesBegan` 方法：\n\n```\noverride func touchesBegan(touches: Set<UITouch>, withEvent\
  \ event: UIEvent?) {\n\n   let touch = touches.first!\n\n   touchLocation = touch.locationInNode(self)\n\
  \n   nrTouches = nrTouches + touches.count\n\n}\n```\n\n该方法接收两个参数。第一个参数是名为 `touches`\
  \ 的变量，类型为 `Set<UITouch>`，表示一个或多个触摸位置。`Set` 是一种泛型类型，可表示多种集合。类型名后的尖括号表示该集合的具体类型，例如\
  \ `Set<Int>` 表示整数集合。而这里的 `Set<UITouch>` 则表示 `UITouch` 对象的集合。`UITouch` 对象包含了触摸的所有相关信息，例如触摸位置、用户开始触摸的时间等。第二个参数（在方法体中未使用）包含事件的其他信息，如事件发生的具体时间。你还会发现第二个参数有两个名称：第一个名称（`withEvent`）在调用该方法时使用，第二个名称（`event`）用于在方法体内部访问事件对象。在\
  \ Swift 中编写方法或函数时，还有许多其他特性和选项。第 6 章 将更详细地讨论方法和函数。\n\n该方法体由三条指令组成。第一条指令声明一个名为 `touch`\
  \ 的常量，并将表达式 `touches.first!` 的结果赋值给它。该表达式的前半部分是 `touches`，即玩家触摸屏幕的位置集合。其后是点号与属性名\
  \ `first`。点号的用法你之前已经见过，例如：\n\n\n\n`background.zPosition = 0`\n\n在 Swift 中，点（`.`）通常表示从某个对象中获取信息，或以某种方式修改该对象。当前正在操作的对象写在点之前。点之后，你指明要如何操作该对象。在上面的例子中，`background`对象有一个名为`zPosition`的信息片段（或称为属性），你通过将值`0`赋值给`zPosition`来修改该对象。以下是另一个使用点的示例：\n\
  \n`var myVariable: Int = background.position.x`\n\n在此示例中，你从背景精灵获取位置，然后从该位置获取其 x\
  \ 值。除了直接访问信息，你还可以调用操作对象的方法，例如：\n\n`background.removeFromParent()`\n\n`removeFromParent`方法通过将背景对象从游戏场景中移除来操作它。基本上，它撤销了以下指令的效果：\n\
  \n`addChild(background)`\n\n回到触摸输入示例，`first`是`Set<UITouch>`类型的一个属性，它返回触摸集合中的第一个元素。整个表达式以感叹号结尾。这与`touches`对象可能为空有关，这意味着`first`属性无法获取位置，因为没有任何位置。感叹号表示程序员知道这一点，并保证`touches`永远不会为空——这是合理的，因为如果玩家没有开始触摸屏幕，`touchesBegan`方法永远不会被调用。第\
  \ 12 章详细讨论了感叹号的用法，也称为解包。\n\n`touchesBegan`方法中的第二条指令将值赋给`touchLocation`属性。该值是调用`touch`变量中的`locationInNode`方法（参数为`self`）的结果。这会计算在游戏场景内触摸位置的位置。单词`self`指的是游戏场景对象。`self`的确切含义将在后面详细讨论。\n\
  \n所以，总结一下，前两条指令从一组触摸中检索触摸信息对象，计算其在游戏场景中的位置，然后将该位置赋给`touchLocation`属性。第三条也是最后一条指令简单得多；它将集合中的触摸次数（使用`count`属性获取）加到`nrTouches`属性上，如下所示：\n\
  \n`nrTouches = nrTouches + touches.count`\n\n这条指令再次说明，在 Swift 中，你永远不应将`=`符号读作“等于”，而应始终读作“赋值”。因此，此赋值的右侧是`nrTouches`当前值与已开始的新触摸次数之和。此赋值有一个简写版本，如下所示：\n\
  \n`nrTouches += touches.count`\n\n你可以将这条指令理解为“将`touches.count`加到`nrTouches`上”。类似地，Swift\
  \ 也支持减法（`-=`）、乘法（`*=`）和除法（`/=`）等操作的简写符号。\n\n你可以看到，减法简写符号用于`touchesEnded`方法，该方法仅包含一条指令：\n\
  \n```\noverride func touchesEnded(touches: Set<UITouch>, withEvent event: UIEvent?)\
  \ {\n\nnrTouches -= touches.count\n\n}\n```\n\n在此方法中，你只需从`nrTouches`变量中减去已结束的触摸次数。这样，`nrTouches`变量现在可以跟踪玩家当前放置在触摸屏上的手指数量。\n\
  \n你需要定义的最后一个方法是`touchesMoved`。它处理玩家的任何手指移动。由于触摸次数没有变化，该方法包含两条指令：一条用于检索触摸信息，另一条用于更新触摸位置：\n\
  \n```\noverride func touchesMoved(touches: Set<UITouch>, withEvent event: UIEvent?)\
  \ {\n\nlet touch = touches.first!\n\ntouchLocation = touch.locationInNode(self)\n\
  \n}\n```\n\n再次说明，请注意这种方法不兼容玩家在屏幕上多个点触摸的情况，因为你只从集合中检索了一个触摸位置。在第 12 章中，我将向你展示一个更优雅的解决方案，该方案能正确处理多点触摸和触摸移动。\n\
  \n\n\n### 利用触摸位置改变游戏世界\n\n在上一节中，你已经了解了如何读取触摸输入并将触摸位置存储到属性中。你可以利用这个触摸位置来对游戏世界做出改变。例如，你可以根据触摸位置绘制一个精灵。Painter\
  \ 游戏的特点之一是包含一个可旋转的炮管，它会根据玩家触摸屏幕的位置进行旋转。这个炮管由玩家控制，用于发射油漆球。在本节中，你将学习如何为游戏添加这样一个可旋转的炮管。\n\
  \n要实现这一功能，你需要声明几个属性。无论如何，你都需要用属性来存储背景和炮管精灵。如下所示，代码中已经声明并初始化了以下属性：\n\n`var background\
  \ = SKSpriteNode(imageNamed: \"spr_background\")`\n\n`var cannonBarrel = SKSpriteNode(imageNamed:\
  \ \"spr_cannon_barrel\")`\n\n在 `didMoveToView` 方法中，你需要将这些对象放置到正确的位置，确保炮管绘制在背景之上，并将这些对象添加到游戏场景中。你还需要为炮管选择正确的原点（锚点），因为旋转精灵时，它会围绕其原点旋转。以下是实现这一功能的指令：\n\
  \n`background.zPosition = 0`\n\n`cannonBarrel.zPosition = 1`\n\n`cannonBarrel.position\
  \ = CGPoint(x:-412, y:-220)`\n\n`cannonBarrel.anchorPoint = CGPoint(x:0.24, y:0.5)`\n\
  \n`addChild(background)`\n\n`addChild(cannonBarrel)`\n\n炮管的位置经过精心选择，使其能够完美契合已经绘制在背景上的炮座。炮管图片包含一个圆形部分，实际的炮管附着其上。你希望炮管围绕该圆形部分的中心旋转。这意味着你必须将这个中心点设置为原点。由于圆形部分位于精灵的左侧，且该圆的半径是炮管精灵高度的一半，因此你将炮管原点设置为\
  \ `(0.24, 0.5)`，正如你在代码中看到的那样。你可以尝试在 Painter1 示例中更改这些值，以观察旋转精灵时会发生什么。\n\n下一步是计算炮管根据触摸位置应具有的旋转角度。由于每次玩家移动时都需要执行此操作，因此最好的实现位置是在\
  \ `update` 方法中。那么如何计算这个角度呢？请看图 5-1。\n\n![A978-1-4842-0650-8_5_Fig1_HTML.gif](img/A978-1-4842-0650-8_5_Fig1_HTML.gif)\n\
  \n图 5-1. 根据触摸位置计算炮管角度\n\n如果你还记得数学课上学过的知识，可能会回忆起三角形中的角度可以用三角函数来计算。在这种情况下，你可以使用正切函数来计算角度，公式如下：\n\
  \n![$$ \\tan (angle)=\\frac{opposite}{adjacent} $$](img/A978-1-4842-0650-8_5_Chapter_TeX2GIF_Equa.gif)\n\
  \n换句话说，角度由下式给出：\n\n![$$ angle= \\arctan \\left(\\frac{opposite}{adjacent}\\right)\
  \ $$](img/A978-1-4842-0650-8_5_Chapter_TeX2GIF_Equb.gif)\n\n你可以通过计算触摸位置与炮管位置之间的差值，来得到对边和邻边的长度，如下所示：\n\
  \n```\nlet opposite = touchLocation.y - cannonBarrel.position.y\nlet adjacent =\
  \ touchLocation.x - cannonBarrel.position.x\n```\n\n现在你需要使用这些值来计算反正切。该怎么做呢？幸运的是，Swift\
  \ 拥有许多有用的数学函数，包括正弦、余弦、正切等三角函数，以及它们的反函数（反正弦、反余弦和反正切）。有两个函数可以计算反正切。第一个版本接受一个单一值作为参数。但在本例中，你不能使用这个版本：当触摸位置正好位于炮管正上方时，`adjacent`\
  \ 为零，会导致除以零的错误。\n\n针对需要计算反正切并考虑此类可能奇点的情况，有一个替代的反正切函数。`atan2` 函数将对边和邻边长度作为单独的参数，并在这种情况下返回相当于\
  \ 90 度的弧度值。你可以使用此函数来计算角度，如下所示：\n\n`cannonBarrel.zRotation = atan2(opposite, adjacent)`\n\
  \n如你所见，你让炮管绕 z 轴旋转，该轴是从屏幕指向玩家的方向。\n\n## 基于触摸的条件执行\n\n为了进一步测试触摸输入的处理，我们来添加一个文本标签，用于指示玩家当前是否正在触摸屏幕。Painter1\
  \ 示例中已经为此声明了一个属性：\n\n`var touchingLabel = SKLabelNode(text:\"not touching\")`\n\n\
  如你所见，该标签被初始化为文本“not touching”。你需要做的是在 `update` 方法中检查 `nrTouches` 属性的值是否大于零。如果是，则应将文本更改为“touching”。如果\
  \ `nrTouches` 等于零，则文本应为“not touching”。因此，你需要设法仅在满足某些条件时才执行指令。你可以通过条件指令来实现这一点，它使用了一个新关键字\
  \ `if`。\n\n使用 `if` 指令，你可以提供一个条件，并在该条件为真时执行一组指令（整体而言，这也被称为**分支**）。以下是一些条件的示例：\n\n\
  - 玩家已触摸屏幕。\n- 自游戏开始以来经过的秒数大于 1,000。\n- 炮管的旋转角度在 0 到 90 度之间。\n- 怪物吃掉了你的角色。\n\n这些条件要么为真，要么为假。条件是一个表达式，因为它具有一个值（要么为真，要么为假）。这个值也被称为**布尔值**。使用\
  \ `if` 指令，你可以在条件为真时执行一组指令。请看下面这个 `if` 指令示例：\n\n```\nif nrTouches > 0 {\n    touchingLabel.text\
  \ = \"touching\"\n}\n```\n\n条件紧跟在 `if` 关键字之后。后面跟着一组由花括号括起来的指令。在这个例子中，一旦记录的触摸次数大于\
  \ 0，标签的文本就被更改为“touching”。如果愿意，你还可以在花括号中放置多条指令：\n\n```\nif nrTouches > 0 {\n    touchingLabel.text\
  \ = \"touching\"\n    let opposite = touchLocation.y - cannonBarrel.position.y\n\
  \    let adjacent = touchLocation.x - cannonBarrel.position.x\n    cannonBarrel.zRotation\
  \ = atan2(opposite, adjacent)\n}\n```\n\n在这个例子中，只有当玩家实际触摸屏幕时，你才改变炮管的旋转角度。下面是另一个\
  \ `if` 指令的示例：\n\n```\nif nrTouches == 0 {\n    touchingLabel.text = \"not touching\"\
  \n}\n```\n\n这条指令会在玩家未触摸屏幕时将触摸标签的文本更改为“not touching”。你还可以在编写 `if` 指令时定义一个替代情况：\n\n\
  ```\nif nrTouches > 0 {\n    touchingLabel.text = \"touching\"\n    let opposite\
  \ = touchLocation.y - cannonBarrel.position.y\n    let adjacent = touchLocation.x\
  \ - cannonBarrel.position.x\n    cannonBarrel.zRotation = atan2(opposite, adjacent)\n\
  } else {\n    touchingLabel.text = \"not touching\"\n}\n```\n\n在这个例子中，如果触摸次数大于零，标签文本被设置为“touching”，并计算炮管的旋转角度。在所有其他情况（如果\
  \ `nrTouches` 等于零或更小）下，触摸标签文本被设置为“not touching”。\n\n\n\n### 判断备选情况\n\n当存在多个值类别时，可以通过`if`指令判断当前属于哪种情况。第二个测试放在第一个`if`指令的`else`之后，这样只有当第一个测试失败时，才会执行第二个测试。第三个测试可以放在第二个`if`指令的`else`之后，以此类推。\n\
  \n以下代码片段用于判断玩家得分等级，以便显示不同的消息：\n\n```\nif score < 100 {\n    print(\"哎呀，你绝对需要多练练！\"\
  )\n} else if score < 500 {\n    print(\"干得好，表现不错。\")\n} else if score < 1000 {\n\
  \    print(\"非常高的分数！\")\n} else {\n    print(\"太棒了，你简直无敌！\")\n}\n```\n\n每个`else`（最后一个除外）后面都跟着另一个`if`指令。如果玩家得分非常低（低于\
  \ 100 分），会显示一条消息（“哎呀...”），其余指令将被忽略（它们毕竟位于`else`之后）。而表现较好的玩家则会依次通过所有测试（是否低于 500 分？是否低于\
  \ 1000 分？），最终得出玩家获得高分的结论。\n\n我在代码片段中使用了缩进来表明哪个`else`属于哪个`if`。当存在多个不同类别时，程序代码的可读性会越来越差。因此，作为`else`后指令应缩进这一常规规则的例外，对于这种复杂的`if`指令，你可以使用更简洁的布局：\n\
  \n```\nif score < 100 {\n    print(\"哎呀，你绝对需要多练练！\")\n} else if score < 500 {\n\
  \    print(\"干得好，表现不错。\")\n} else if score < 1000 {\n    print(\"非常高的分数！\")\n} else\
  \ {\n    print(\"太棒了，你简直无敌！\")\n}\n```\n\n这种布局的另一个优势在于，能更轻松地看出指令处理了哪些情况。除了`if`指令，还有一种名为`switch`的指令，更适合处理多种备选情况。关于如何使用`switch`，请参阅第\
  \ 19 章。\n\n带备选情况的`if`指令的语法如图 5-2 的语法图所示。`if`指令的主体由花括号内的一个或多个指令组成，因为主体是一个指令块，其定义见图\
  \ 5-3 的语法图。在`else`关键字之后，有一个箭头指回`if`关键字，以便定义备选链，正如本节前面所解释的。\n\n![A978-1-4842-0650-8_5_Fig3_HTML.gif](img/A978-1-4842-0650-8_5_Fig3_HTML.gif)\n\
  \n图 5-3. 指令块的语法图\n\n![A978-1-4842-0650-8_5_Fig2_HTML.gif](img/A978-1-4842-0650-8_5_Fig2_HTML.gif)\n\
  \n图 5-2. `if`指令的语法图\n\n### 比较运算符\n\n`if`指令头部中的条件是一个返回真值的表达式：真或假。当表达式的结果为真时，将执行`if`指令的主体。在这些条件中，你可以使用比较运算符。以下是可用的运算符：\n\
  \n- `<`（小于）\n- `<=`（小于或等于）\n- `>`（大于）\n- `>=`（大于或等于）\n- `==`（等于）\n- `!=`（不等于）\n\n\
  这些运算符可以用于任意两个值之间。在这些运算符的左侧和右侧，你可以放置常量值、变量，或者包含加法、乘法等的完整表达式。测试两个值是否相等时使用双等号（`==`）。这与表示赋值的单等号截然不同。这两个运算符之间的区别非常重要：\n\
  \n`x = 5` 表示将值 5 赋给`x`。  \n`x == 5` 表示判断`x`是否等于 5？\n\n### 逻辑运算符\n\n在逻辑术语中，条件也称为谓词。Swift\
  \ 中也可以使用逻辑中连接谓词的运算符（与、或、非）。它们有特殊的表示法：\n\n- `&&` 是逻辑与运算符。\n- `||` 是逻辑或运算符。\n- `!`\
  \ 是逻辑非运算符。\n\n你可以使用这些运算符来检查复杂的逻辑语句，从而仅在特定情况下执行指令。例如，只有当玩家拥有超过 10,000 分、敌人生命值为 0\
  \ 且玩家生命值大于 0 时，才显示“你赢了！”消息：\n\n```\nif playerPoints > 10000 && enemyLifeForce ==\
  \ 0 && playerLifeForce > 0 {\n    print(\"你赢了！\")\n}\n```\n\n\n\n### 布尔类型\n\n使用比较运算符或通过逻辑运算符连接其他表达式的表达式也拥有类型，这与使用算术运算符的表达式类似。毕竟，这类表达式的结果是一个值，即\
  \ `true` 或 `false` 这两个真值之一。在 Swift 中，这些真值由 `true` 和 `false` 关键字表示。\n\n除了用于在 `if`\
  \ 指令中表达条件外，逻辑表达式还可以应用于许多不同的场景。逻辑表达式与算术表达式类似，区别仅在于其类型不同。例如，你可以将逻辑表达式的结果存储在变量中、将其作为参数传递，或在另一个表达式中再次使用该结果。\n\
  \n真值的类型是 `Bool`（即布尔型），以英国数学家和哲学家乔治·布尔（George Boole，1815–1864）的名字命名。以下是布尔变量声明和赋值的示例：\n\
  \n```\nvar test: Bool\ntest = x > 3 && y < 5\n```\n\n例如，如果 `x` 的值为 6，`y` 的值为 3，那么布尔表达式\
  \ `x > 3 && y < 5` 的结果为 `true`，该值将存储在变量 `test` 中。你也可以直接将布尔值 `true` 和 `false` 存储在变量中：\n\
  \n```\nvar isAlive: Bool = false\n```\n\n布尔变量在存储游戏中不同对象的状态时极为方便。例如，你可以使用布尔变量来存储玩家是否还活着、玩家当前是否在跳跃、某个关卡是否已完成等信息。你可以在\
  \ `if` 指令中将布尔变量用作表达式，如下所示：\n\n```\nif isAlive {\n    // 执行某些操作\n}\n```\n\n在这种情况下，如果表达式\
  \ `isAlive` 的结果为 `true`，则会执行 `if` 指令的主体。你可能会认为这段代码会引发编译器错误，并且你需要对布尔变量进行如下比较：\n\n\
  ```\nif isAlive == true {\n    // 执行某些操作\n}\n```\n\n然而，这种额外的比较并非必需。`if` 指令中的条件表达式必须得出\
  \ `true` 或 `false` 的结果。由于布尔变量本身已经代表了这两个值之一，因此你无需进行这种比较。\n\n你可以使用布尔类型来存储结果为 `true`\
  \ 或 `false` 的复杂表达式。让我们再看几个例子：\n\n```\nvar a = 12 > 5\nvar b = a && 3 + 4 == 8\n\
  var c = a || b\nif !c {\n    a = false\n}\n```\n\n在继续往下读之前，请尝试确定执行这些指令后变量 `a`、`b`\
  \ 和 `c` 的值。在第一行中，你声明并初始化了一个布尔变量 `a`。存储在其中的真值由表达式 `12 > 5` 得出，结果为 `true`。该值随后被赋值给变量\
  \ `a`。在第二行中，你声明并初始化了一个新变量 `b`，其中存储了一个更复杂的表达式的结果。该表达式的第一部分是变量 `a`，其值为 `true`。表达式的第二部分是比较表达式\
  \ `3 + 4 == 8`。此比较结果为假（3 + 4 不等于 8），因此这一部分的值为 `false`，所以逻辑与运算的结果也是 `false`。因此，执行该指令后，变量\
  \ `b` 的值为 `false`。\n\n第三条指令将对变量 `a` 和 `b` 进行逻辑或运算的结果存储在变量 `c` 中。由于 `a` 的值为 `true`，该运算的结果也为\
  \ `true`，该结果被赋值给 `c`。最后有一条 `if` 指令，仅当 `!c` 的结果为 `true` 时，才会将值 `false` 赋给变量 `a`。在本例中，`c`\
  \ 的值为 `true`，因此 `!c` 的结果为 `false`，这意味着 `if` 指令的主体不会被执行。因此，所有指令执行完毕后，`a` 和 `c` 的值均为\
  \ `true`，而 `b` 的值为 `false`。\n\n做这类练习表明，逻辑错误的产生非常容易。这个过程类似于你调试代码时所做的事情。逐步执行指令，并确定各个阶段变量的值。一次疏忽就可能让你本以为是\
  \ `true` 的值变成了 `false`！\n\n### 更改加农炮的颜色\n\n在前面的章节中，你了解了如何使用 `if` 指令来检查玩家是否触摸了屏幕。现在，让我们扩展程序，使其在点击加农炮管中央时改变加农炮可发射的彩弹颜色。你可以通过运行本章附带的\
  \ Painter2 示例来观察此行为。\n\n要编写此行为的代码，你将需要三个额外的精灵，每种颜色一个。如果你在 Xcode 中打开 Painter2 项目中的\
  \ `Images.xcassets` 文件夹，就会在列表中看到这三个额外出现的精灵。在 `GameScene` 类中，你添加属性来引用这些精灵，如下所示：\n\
  \n```\nvar cannonRed = SKSpriteNode(imageNamed: \"spr_cannon_red\")\nvar cannonGreen\
  \ = SKSpriteNode(imageNamed: \"spr_cannon_green\")\nvar cannonBlue = SKSpriteNode(imageNamed:\
  \ \"spr_cannon_blue\")\n```\n\n这些精灵应位于加农炮管的相同位置（加农炮管的原点设置在旋转盘的中心）：\n\n```\ncannonRed.position\
  \ = cannonBarrel.position\ncannonGreen.position = cannonBarrel.position\ncannonBlue.position\
  \ = cannonBarrel.position\n```\n\n你还必须确保这些精灵绘制在炮管的上方，而不是其后面。为此，你可以将它们的高度位置属性设置得比加农炮管（其高度位置为\
  \ 1）更高：\n\n```\ncannonRed.zPosition = 2\ncannonGreen.zPosition = 2\ncannonBlue.zPosition\
  \ = 2\n```\n\n问题在于，你并不希望同时绘制这三个精灵，而只是根据加农炮当前将要发射的彩弹颜色绘制其中一个。为此，你可以使用 SpriteKit 框架中每个（精灵）节点都具备的\
  \ `hidden` 属性。首先，你隐藏 `cannonGreen` 和 `cannonBlue` 精灵：\n\n```\ncannonGreen.hidden\
  \ = true\ncannonBlue.hidden = true\n```\n\n现在，只有 `cannonRed` 精灵将绘制在屏幕上。当然，需要将这些精灵添加到场景中才能使其正常工作：\n\
  \n```\naddChild(cannonRed)\naddChild(cannonGreen)\naddChild(cannonBlue)\n```\n\n\
  下一步是处理玩家点击加农炮管旋转盘中央以改变加农炮应发射颜色的事件。你需要解决的一个挑战是如何检测点击动作。到目前为止，程序仅存储了触摸位置。我们无法知道玩家是刚刚将手指放在屏幕上，还是已经触摸屏幕上的同一点持续了数秒。一个非常简单的解决方案是添加一个额外的变量，用于记录玩家是否刚刚点击过。该变量为\
  \ `Bool` 类型，你将其初始化为 `false`：\n\n```\nvar hasTapped: Bool = false\n```\n\n现在，每当玩家开始触摸屏幕时，你就将此属性设置为\
  \ `true`。这在 `touchesBegan` 方法中完成：\n\n```\noverride func touchesBegan(touches: Set<UITouch>,\
  \ withEvent event: UIEvent?) {\n    let touch = touches.first!\n    touchLocation\
  \ = touch.locationInNode(self)\n    nrTouches = nrTouches + touches.count\n    hasTapped\
  \ = true\n}\n```\n\n为了仅处理一次点击，你需要在 `update` 方法结束时将此属性再次重置为 `false`。这样，当玩家开始触摸屏幕时，`hasTapped`\
  \ 属性变为 `true`，你可以在 `update` 方法中处理它，随后该属性立即又变为 `false`。\n\n\n\n如果玩家正在触摸屏幕，你需要处理两种情况。第一种情况是玩家触摸屏幕的位置不在炮管圆盘中心。在这种情况下，你需要计算炮管的角度。第二种情况是玩家点击了炮管圆盘中心。在这种情况下，你需要通过隐藏或显示添加到游戏场景中的彩色精灵来改变炮管中心的颜色。\n\
  \n如何检测玩家是否点击了炮管圆盘中心？你可以通过判断触摸位置是否位于某个彩色精灵的边界内来实现。每个精灵节点都有一个属性，用于计算包围该精灵的矩形（也称为边界框）。以下是获取`cannonRed`精灵边界框的方法：\n\
  \n`let rect = cannonRed.frame`\n\n`rect`变量的类型是`CGRect`。`CGRect`类型有一些有用的方法和属性。例如，它有一个名为`contains`的方法，用于指示一个点是否位于矩形内部。以下是如何使用它：\n\
  \n```\nif rect.contains(touchLocation) {\n    // the player is touching the screen\
  \ inside the cannonRed bounding box!\n}\n```\n\n那么，让我们使用这个方法来处理 Painter 游戏中的各种情况。第一种情况是玩家触摸屏幕的位置在炮管圆盘之外：\n\
  \n```\nif !cannonRed.frame.contains(touchLocation) {\n    let opposite = touchLocation.y\
  \ - cannonBarrel.position.y\n    let adjacent = touchLocation.x - cannonBarrel.position.x\n\
  \    cannonBarrel.zRotation = atan2(opposite, adjacent)\n}\n```\n\n注意，你使用了逻辑非运算符来构造`if`指令的条件。在另一种情况下（玩家触摸位置在`cannonRed`的边界框内），你只需要在玩家也进行了点击时才执行某些操作，如下所示：\n\
  \n```\nif !cannonRed.frame.contains(touchLocation) {\n    // update the cannon barrel\
  \ angle\n}\nelse if cannonRed.frame.contains(touchLocation) && hasTapped {\n   \
  \ // change the color of the cannon barrel disc\n}\n```\n\n因为仅当`if`指令中的条件不成立时（换句话说，`cannonRed`的框架包含触摸位置），才会执行另一种情况，所以你可以编写一个更短的`if`指令来完成相同的事情：\n\
  \n```\nif !cannonRed.frame.contains(touchLocation) {\n    // update the cannon barrel\
  \ angle\n}\nelse if hasTapped {\n    // change the color of the cannon barrel disc\n\
  }\n```\n\n在另一种情况下，你需要改变炮管圆盘的颜色。如果它当前是红色，则需要变为绿色。如果它是绿色，则需要变为蓝色。最后，如果它是蓝色，则需要再次变为红色。这样，玩家就可以通过多次点击炮管圆盘来切换颜色。改变颜色的方法是改变三个炮管圆盘精灵的`hidden`属性。其中一个应始终为`false`，另外两个应为`true`。看一下以下几行代码：\n\
  \n```\nlet tmp = cannonBlue.hidden\ncannonBlue.hidden = cannonGreen.hidden\ncannonGreen.hidden\
  \ = cannonRed.hidden\ncannonRed.hidden = tmp\n```\n\n在这段代码的第一行中，你将`cannonBlue`的`hidden`状态存储在一个临时变量中。然后，将`cannonGreen`的`hidden`状态复制给`cannonBlue`。因此，如果绿色圆盘可见，那么蓝色圆盘现在也将可见。然后，`cannonRed.hidden`状态被赋值给`cannonGreen.hidden`状态。最后，`cannonRed.hidden`状态被设置为存储在`tmp`变量中的`hidden`状态，即原来的`cannonBlue.hidden`状态。通过这种方式在变量之间移动`hidden`值，结果恰恰是所需的行为。你可以自己尝试一下。假设红色、绿色、蓝色的`hidden`状态分别是`true`、`false`、`true`（换句话说，绿色可见）。确定执行上述指令的结果。你会看到结果是`true`、`true`、`false`（蓝色可见）。再次对这些指令运行，你将得到`false`、`true`、`true`（红色可见）。依此类推。运行\
  \ Painter2 程序以查看最终结果（截图见图 5-4）。\n\n![A978-1-4842-0650-8_5_Fig4_HTML.jpg](img/A978-1-4842-0650-8_5_Fig4_HTML.jpg)\n\
  \n图 5-4。Painter2 示例\n\n## 几句结束语\n\n既然你已经编写了实现此游戏所需行为的代码，你可能已经注意到，这导致`update`方法内部的代码相当复杂：\n\
  \n```\nif nrTouches > 0 {\n    touchingLabel.text = \"touching\"\n    if !cannonRed.frame.contains(touchLocation)\
  \ {\n        let opposite = touchLocation.y - cannonBarrel.position.y\n        let\
  \ adjacent = touchLocation.x - cannonBarrel.position.x\n        cannonBarrel.zRotation\
  \ = atan2(opposite, adjacent)\n    } else if hasTapped {\n        let tmp = cannonBlue.hidden\n\
  \        cannonBlue.hidden = cannonGreen.hidden\n        cannonGreen.hidden = cannonRed.hidden\n\
  \        cannonRed.hidden = tmp\n    }\n} else {\n    touchingLabel.text = \"not\
  \ touching\"\n}\nhasTapped = false\n```\n\n这段代码看起来复杂的原因在于，有一个`if`指令在其内部包含了另一个`if`指令。如果你看看将要执行代码的可能路径总数，其实并没有那么多。如果玩家正在触摸屏幕，那么触摸标签文本将被更改，并且要么旋转炮管，要么（如果玩家也进行了点击）改变炮管圆盘颜色。如果玩家没有触摸屏幕，则只更改触摸标签文本。因此，总共有三条所谓的控制路径。图\
  \ 5-5 用图表描绘了这三条控制路径。这些图表称为流程图，它们为开发者提供了关于程序某部分正在做什么的可视化反馈。如果你想阐明一段代码的工作原理，或者想规划出程序应该处理的不同情况，你可以自己绘制这些图表。另一种阐明此类代码的方法是添加注释，就像\
  \ Painter2 示例中所做的那样。\n\n![A978-1-4842-0650-8_5_Fig5_HTML.gif](img/A978-1-4842-0650-8_5_Fig5_HTML.gif)\n\
  \n图 5-5。描绘 Painter2 中处理触摸输入的多种方式的流程图\n\n随着你的程序变得越来越复杂，理解一段代码处理哪些情况也将变得越来越困难。这常常会导致错误。程序员可能认为他的代码处理了所有不同的情况，但当然，程序员也是人，是人就会犯错。测试代码工作量很大，这意味着并非所有错误都会被找到。这就是许多游戏公司发布已发布游戏的补丁，以修复只有在许多人玩过游戏后才明显出现的错误的原因。\n\
  \n## 本章所学内容\n\n在本章中，你学习了以下内容：\n\n*   如何使用`if`指令响应触摸输入，例如点击或手指移动\n*   如何使用布尔值公式化这些指令的条件\n\
  *   如何使用具有不同分支的`if`指令\n\n"
- "# 6. 飞行的球\n\n电子补充材料 本章的在线版本 (doi:[10.​1007/​978-1-4842-0650-8_​6](http://dx.doi.org/10.1007/978-1-4842-0650-8_6))\
  \ 包含补充材料，可供授权用户使用。\n\n在本章中，你将开始进一步组织 Painter 游戏的源代码。这是必要的，因为随着你向游戏中添加越来越多的内容，源代码会变得更加复杂。你将探索使用方法来更逻辑地组织代码。本章结束后，你将向游戏中添加一个移动的球。\n\
  \n\n\n## 方法\n\n你已经见过并使用过许多不同类型的方法和函数。例如，`UIColor.blackColor()` 方法和 `print()` 函数之间存在明显区别：后者需要一个参数（一个字符串），而前者则不需要。`blackColor`\
  \ 方法隶属于 `UIColor`，而 `print` 则是一个独立的函数。此外，某些函数/方法可以返回一个结果值，该结果值可用于执行方法调用的指令中，例如将结果存储在一个变量中，如下所示：\n\
  \n`var myColor = UIColor.blackColor()`\n\n在这里，你调用了定义为 `UIColor` 一部分的 `blackColor`\
  \ 方法，并将其结果存储在变量 `myColor` 中。显然，`blackColor` 提供了一个可以存储的结果值。另一方面，`print` 函数并不提供可以存储在变量中的结果。当然，它确实会产生某种效果，因为它会将文本打印到控制台，这也可以被视为函数调用的一种结果。然而，当我谈论函数的结果时，我指的不是函数在屏幕上产生的某种效果，而是指函数调用返回了一个可以存储在变量中的值。这也被称为方法或函数的**返回值**。在数学中，函数通常都有一个结果。数学函数\
  \ f(x)=x² 将 x 值作为参数传入，并返回其平方作为结果。你可以像下面这样在 Swift 中编写这个数学函数：\n\n```\nfunc square(x\
  \ : Int) -> Int {\n    return x*x\n}\n```\n\n如果你查看这个方法的头部，会看到它接受一个名为 `x` 的参数。在右括号之后，你会看到一个箭头和单词\
  \ `Int`。这意味着该方法返回一个整数值，该值可以存储在一个变量中，如下所示：\n\n`var sx = square(10)`\n\n执行这条指令后，变量\
  \ `sx` 将包含值 100。在函数体中，你使用关键字 `return` 来指示函数返回的实际值。以 `square` 为例，该函数返回表达式 `x*x` 的结果。请注意，执行\
  \ `return` 指令也会终止函数中其余指令的执行。放置在 `return` 指令之后的任何指令都不会被执行。例如，考虑下面的函数：\n\n```\nfunc\
  \ square(x : Int) -> Int {\n    return 12\n    var tmp = 45\n}\n```\n\n在这个例子中，第二条指令（`var\
  \ tmp = 45`）永远不会被执行，因为它前面的指令结束了函数。这是 `return` 指令一个非常方便的特性，你可以利用它来为自己服务，如下面的代码所示：\n\
  \n```\nfunc squareRoot(x : Int) -> Int {\n    if x < 0 {\n        print(\"错误：无法计算负数的平方根！\"\
  )\n        return 0\n    }\n    // 计算平方根，现在我们确定 x >= 0。\n    return ...\n}\n```\n\
  \n在这个例子中，你将 `return` 指令用作防范方法调用者错误输入的保障。你无法计算负数的平方根，因此在进行任何计算或引发令人讨厌且可能难以调试的错误之前，你先处理\
  \ `x` 为负数的情况。请注意，**一个返回值的函数必须通过所有可能的逻辑路径返回一个值**。所以，如果你编写一个包含处理几种备选情况的 `if` 指令的函数，你必须确保函数在每个分支中都返回一个值。在上面的例子中，有两个分支，并且在每个分支中都返回了一个值。\n\
  \n`atan2` 函数是另一个既有参数又返回值的函数示例，其返回值可以存储在变量中，就像你在 Painter2 示例中所做的那样：\n\n`cannonBarrel.zRotation\
  \ = atan2(opposite, adjacent)`\n\n一个没有返回值的**方法**示例是 `GameScene` 类中的 `update` 方法：\n\
  \n```\noverride func update(currentTime: NSTimeInterval) {\n    if nrTouches > 0\
  \ {\n        touchingLabel.text = \"touching\"\n        if !cannonRed.frame.contains(touchLocation)\
  \ {\n            let opposite = touchLocation.y - cannonBarrel.position.y\n    \
  \        let adjacent = touchLocation.x - cannonBarrel.position.x\n            cannonBarrel.zRotation\
  \ = atan2(opposite, adjacent)\n        } else if hasTapped {\n            let tmp\
  \ = cannonBlue.hidden\n            cannonBlue.hidden = cannonGreen.hidden\n    \
  \        cannonGreen.hidden = cannonRed.hidden\n            cannonRed.hidden = tmp\n\
  \        }\n    } else {\n        touchingLabel.text = \"not touching\"\n    }\n\
  \    hasTapped = false\n}\n```\n\n由于这个方法没有返回值，你无需在方法体中使用 `return` 关键字，尽管在某些情况下使用它仍然有用。例如，你可以通过移除嵌套的\
  \ `if` 指令来使用 `return` 关键字提高代码可读性，如下所示：\n\n```\noverride func update(currentTime:\
  \ NSTimeInterval) {\n    if nrTouches <= 0 {\n        hasTapped = false\n      \
  \  touchingLabel.text = \"not touching\"\n        return\n    }\n    touchingLabel.text\
  \ = \"touching\"\n    if !cannonRed.frame.contains(touchLocation) {\n        let\
  \ opposite = touchLocation.y - cannonBarrel.position.y\n        let adjacent = touchLocation.x\
  \ - cannonBarrel.position.x\n        cannonBarrel.zRotation = atan2(opposite, adjacent)\n\
  \    } else if hasTapped {\n        let tmp = cannonBlue.hidden\n        cannonBlue.hidden\
  \ = cannonGreen.hidden\n        cannonGreen.hidden = cannonRed.hidden\n        cannonRed.hidden\
  \ = tmp\n    }\n    hasTapped = false\n}\n```\n\n在这个方法中，你首先检查玩家是否触摸了屏幕。如果不是这种情况，你就重置\
  \ `hasTapped` 标志，更改文本标签，并从这个方法中返回。此后的任何指令将不再执行。\n\n请注意，每当调用一个没有返回值的方法时，它就没有可以存储在变量中的结果。例如，在\n\
  \n`var what = print(\"hello!\")`\n\n中，`print` 没有返回值，因此如果你在程序中编写这样的指令，编译器会发出警告。\n\
  \n如果一个方法或函数有返回值，这个值不一定要存储在变量中。你也可以直接在 `if` 指令中使用它，就像你在 `update` 方法中所做的那样：\n\n`if\
  \ !cannonRed.frame.contains(touchLocation) {`\n`    // 执行某些操作`\n`}`\n\n在这里，`contains`\
  \ 方法返回一个布尔值，如果这个值是 false，`if` 指令的主体将会被执行（由于感叹号表示“非”）。有值的对象和没有值的对象之间的区别，是你之前已经见过的：这与你在指令（没有值）和表达式（有值）之间看到的区别是一样的。所以，这意味着\
  \ `!cannonRed.frame.contains(touchLocation)` 是一个表达式，而 `print(\"hello\")` 是一条指令。\n\
  \n总而言之，有带参数或不带参数的方法/函数，方法/函数可以有返回值也可以没有。你可以使用函数和方法将代码组织成属于同一逻辑块的相关指令组。例如，创建一个名为\
  \ `atan2` 的函数来组合计算三角形两条边反正切所需的所有指令是合理的。这样一来，你只需编写这些指令一次，之后就不必再考虑如何计算；只需简单地调用你之前编写的函数即可。游戏通常有许多这样有用的函数和方法。例如，有一个检查图像是否位于屏幕之外的方法是不是很有用？这在对象飞入或飞出屏幕的游戏中，或者在一个玩家可能从屏幕底部掉下并死亡（很多平台游戏都是这种情况）的游戏中会很有用。根据你的需要，作为程序员的你来决定是否要编写一个带参数或不带参数的方法，以及该方法是否具有返回值。\n\
  \n\n\n## 参数名称与标签\n\n让我们更详细地了解一下参数、如何声明它们以及如何调用它们。请看以下函数：\n\n```\nfunc sign(val:\
  \ Int) -> Int {\n    if val < 0 {\n        return -1\n    } else if val > 0 {\n\
  \        return 1\n    } else {\n        return 0\n    }\n}\n```\n\n这个函数计算一个整数值的符号。如果作为参数传入的值大于\
  \ 0，函数返回 1。如果值为负数，函数返回-1。如果值为 0，函数调用的结果也是 0，如下所示：\n\n```\nvar someVariable = sign(3)\
  \  // someVariable 将包含值 1\nsomeVariable = sign(-12)    // someVariable 现在将包含值 -1\n\
  someVariable = sign(0)      // someVariable 现在包含值 0\n```\n\n当你查看函数头时，会看到参数有一个名称（`val`）。在函数体内，你通过该名称引用参数。调用函数时，只需在括号内写入你需要的参数值。如果一个函数有多个参数，你只需在括号内写入这些参数值。例如，这是\
  \ `atan2` 函数的函数头：\n\n```\nfunc atan2(lhs: CGFloat, rhs: CGFloat) -> CGFloat\n```\n\
  \n这个函数有两个参数，调用方式如下：\n\n```\ncannonBarrel.zRotation = atan2(opposite, adjacent)\n\
  ```\n\n除了函数，Swift 还认识方法。回想一下，方法就像函数一样组织指令。但与函数不同的是，方法也是类的一部分。Swift 对方法处理参数的方式有不同的规则。对于只有一个参数的方法，其工作方式通常与函数相同：调用方法时只需将参数值写在括号内。如果方法有多个参数，情况就不同了。假设你在\
  \ `GameScene` 类中定义了以下方法：\n\n```\nfunc max(val1: Int, val2: Int) -> Int {\n    if\
  \ val1 < val2 {\n        return val2\n    } else {\n        return val1\n    }\n\
  }\n```\n\n这个方法期望两个参数，并返回两者中较大的数。因为有两个参数，调用方法时需要明确指出哪个参数值对应哪个参数名称，如下所示：\n\n```\n\
  var maxValue = max(3, val2: 12)\n```\n\n在 Swift 语言中，通常不需要在第一个参数前写标签，但第二个、第三个及后续参数需要写标签。这对于所有方法都适用，除了创建对象的方法。在这种情况下，你还需要显式地写出第一个参数的标签。示例如下：\n\
  \n```\nvar background = SKSpriteNode(imageNamed: \"spr_background\")\n```\n\n这里你创建了一个\
  \ `SKSpriteNode` 类型的对象并存储在一个变量中。Swift 要求提供参数标签 `imageNamed`。\n\nSwift 区分内部和外部参数标签。让我们稍微重写一下\
  \ `max` 方法，如下所示：\n\n```\nfunc max(val1: Int, b val2: Int) -> Int {\n    if val1\
  \ < val2 {\n        return val2\n    } else {\n        return val1\n    }\n}\n```\n\
  \n如你所见，第二个参数现在有两个标签。第一个标签（`b`）是外部参数标签名称。调用该方法时，你应该使用这个标签而不是 `val2` 来引用第二个参数，如下所示：\n\
  \n```\nvar result = max(12, b: 3)\n```\n\n标签 `val1` 和 `val2` 是内部标签名称。这些是方法体内应该使用的标签名称。你可以使用外部标签名称来强制用户也为第一个参数提供标签，方法如下修改\
  \ `max` 方法的函数头：\n\n```\nfunc max(firstValue val1: Int, secondValue val2: Int) ->\
  \ Int\n```\n\n现在调用 `max` 方法时需要提供两个标签：\n\n```\nresult = max(firstValue: 12, secondValue:\
  \ 3)\n```\n\n如果你认为完全不需要标签，可以通过在函数头中使用下划线作为外部标签名称来指示，如下所示：\n\n```\nfunc max(val1:\
  \ Int, _ val2: Int) -> Int\n```\n\n现在你可以在不提供任何标签的情况下调用 `max` 方法：\n\n```\nresult\
  \ = max(12, 3)\n```\n\n请注意，你只需要在第二个标签前写下划线，因为第一个标签名称默认已经被省略了。如你所见，Swift 为你提供了许多定义参数名称的选项，以及许多在函数或方法体内外引用参数的方式。此外，由于函数和方法有所有这些不同的规则，有时很难知道在调用方法或函数时是否应该写标签名称。幸运的是，Xcode\
  \ 开发环境会自动检测错误并建议修复。你可以通过在 `Painter2` 程序中向 `atan2` 调用添加标签来亲自尝试。你会看到 Xcode 建议移除这些标签以修复编译器错误。\n\
  \n考虑在不同情况下使用何种参数标签是一个好主意。显式的参数标签有助于使参数的含义更清晰。例如，本章前面 `max` 函数中的 `firstValue` 和 `secondValue`\
  \ 标签有助于阐明参数的含义：它们代表函数返回最大值的那些值。作为另一个例子，考虑以下函数：\n\n```\nfunc calculateAgeInMonths(years\
  \ y: Int, months m: Int) {\n    return y * 12 + m\n}\n```\n\n调用这个函数时，知道两个参数分别是什么是很有用的。显式的年、月标签有助于澄清这一点：\n\
  \n```\nvar myAgeInMonths = calculateAgeInMonths(years: 18, months: 3)\n```\n\n另一方面，有时参数标签会使你的指令变得不必要地冗长。例如，`max`\
  \ 方法并不真正需要其参数的显式标签。参数叫什么名字并不重要；该方法只是简单地返回最大值。通过仔细决定哪些参数需要标签、哪些不需要，你的代码会变得清晰得多，也更容易被他人理解。\n\
  \n### 声明 vs 参数\n\n变量的声明与写在方法头中的参数有很多共同之处。事实上，这些参数本身也是声明，但存在一些差异：\n\n- 变量在方法体内声明；参数在方法头的括号内声明。\n\
  - 变量通过赋值指令获取值；参数在方法被调用时自动获取值。\n- 变量声明以关键字 `var` 开头；参数声明不以 `var` 开头。\n\n\n\n## 默认参数值\n\
  \n在方法或函数体中，你也可以为某些参数指定默认值。这很有用，因为它为常用情况提供了一种便捷、更简短的方法调用方式。例如，考虑一个让玩家角色跳跃的 `jump`\
  \ 方法。它的头部可能如下所示：\n\n`func jump(speed: Int = 200, animate: Bool = true)`\n\n在这个头部中，你可以看到该方法有两个参数：角色跳跃的速度，以及角色在跳跃时是否应该有动画效果。每个参数都有一个默认值。在这种情况下，编写该方法的程序员预期，玩家最常以\
  \ 200 的速度跳跃，并且角色应该有动画效果。由于这些默认值的存在，你可以按如下方式调用此方法：\n\n`jump()`\n\n这与以下调用方式完全等效：\n\
  \n`jump(speed: 200, animate: true)`\n\n每当一个参数有默认值时，如果你为该参数传入不同的值来调用方法，你总是需要在其前面写上标签，如上方的调用所示。这是另一个例子：\n\
  \n`jump(animate: false)`\n\n这行代码以默认速度 200 调用 `jump` 方法，但关闭了动画效果。使用默认参数值能让你的方法调用更简单，但它们并非总是必需的。例如，你可以将本章前面定义的\
  \ `max` 方法的头部改写如下：\n\n`func max(val1: Int = 12, b val2: Int = 34) -> Int`\n\n在这个头部中，你为两个参数都定义了默认值，但它们并无实际意义，因为\
  \ `max` 方法并没有一组经常被调用的值。如果某个参数的默认值确实有意义（如 `jump` 方法的情况），强烈建议在头部中将其写出。这不仅能使调用方法时代码更简短，还能让方法的使用者了解程序员预期该方法将如何使用。如果方法有很多非常底层的参数，而使用者不知道该如何选择值，后一点尤其重要。在这种情况下，默认参数值为用户提供了一个良好的基础，使他们无需了解所有参数的详细含义就能使用方法。\n\
  \n## 将指令重组为方法\n\n上一章的 Painter2 示例仍然相对简短，因为它只显示了一个背景和一个旋转的大炮。商业游戏显然比这复杂得多。它们包含许多不同的对象，这些对象可能具有复杂的行为和交互。这正是方法的用武之地。请查看本章的\
  \ Painter3 示例。你会发现，属于同一组的指令现在被组织到了方法中。例如，名为 `initCannon` 的方法包含了所有用于初始化大炮游戏对象的指令：\n\
  \n```\nfunc initCannon() {\n    cannonRed.zPosition = 1\n    cannonGreen.zPosition\
  \ = 1\n    cannonBlue.zPosition = 1\n    cannonBarrel.anchorPoint = CGPoint(x:0.233,\
  \ y:0.5)\n    cannon.position = CGPoint(x:-430, y:-280)\n    cannon.zPosition =\
  \ 1\n    cannonGreen.hidden = true\n    cannonBlue.hidden = true\n    cannon.addChild(cannonRed)\n\
  \    cannon.addChild(cannonGreen)\n    cannon.addChild(cannonBlue)\n    cannon.addChild(cannonBarrel)\n\
  }\n```\n\n你可以看到，现在有一个被引用为 `cannon` 的对象，它是存储在 `GameScene` 类中的一个属性：\n\n`var cannon\
  \ = SKNode()`\n\n大炮的所有部件（炮管和三个颜色指示器）现在都是这个对象的一部分。而 `cannon` 对象本身又是 `gameWorld` 对象的一部分。这是通过\
  \ `didMoveToView` 方法中的以下代码行实现的：\n\n`gameWorld.addChild(cannon)`\n\n你也可以在图 6-1 中看到这一点，该图展示了本例中游戏对象的完整层级结构。将属于同一组的对象组合在一起很有用，因为它使操作这些对象整体变得更加容易。例如，现在在\
  \ `initCannon` 方法中，只需一条指令即可完成大炮（包括其炮管和三个颜色指示器）的定位，如下所示：\n\n![A978-1-4842-0650-8_6_Fig1_HTML.gif](img/A978-1-4842-0650-8_6_Fig1_HTML.gif)\n\
  \n图 6-1. Painter3 示例的游戏对象层级结构\n\n`cannon.position = CGPoint(x:-430, y:-280)`\n\n\
  因为你在一个独立的方法中初始化大炮对象，所以初始化游戏场景的方法（`didMoveToView`）现在也变得更容易阅读：\n\n```\noverride func\
  \ didMoveToView(view: SKView) {\n    anchorPoint = CGPoint(x: 0.5, y: 0.5)\n   \
  \ background.zPosition = 0\n    gameWorld.addChild(background)\n    initCannon()\n\
  \    gameWorld.addChild(cannon)\n    initBall()\n    gameWorld.addChild(ball)\n\
  \    addChild(gameWorld)\n    delta = NSTimeInterval(view.frameInterval) / 60\n\
  }\n```\n\n在 Painter3 中，游戏对象都有自己的初始化方法，背景除外，因为它是一个非常基础的对象。并且如你所见，Painter3 示例不仅包含一个大炮，还包含一个球（这将在本章后续部分讨论）。\n\
  \n## 在局部坐标与世界坐标之间移动\n\n一个附带影响是，你需要考虑到游戏对象现在拥有不同的局部坐标系。将以下代码行添加到 Painter3 程序的 `GameScene.swift`\
  \ 文件中 `didMoveToView` 方法的末尾：\n\n`print(cannonRed.position)`\n\n你会发现，当应用运行时，它会在控制台打印出位置\
  \ (0, 0)。然而，`cannonRed` 节点绘制在位置 (-430, -280)。为什么呢？因为那是 `cannon` 对象的位置。在 `cannon`\
  \ 对象内部，`cannonRed` 节点的局部位置是 (0, 0)。那么，如何获取 `cannonRed` 节点的世界位置呢？你可以通过将 `cannonRed`\
  \ 的局部位置转换到代表世界的节点来实现。在这个例子中，那个节点是 `gameWorld`。将上面的 `print` 调用替换为以下两行代码：\n\n```\n\
  let worldCannonRedPos = gameWorld.convertPoint(cannonRed.position, fromNode: cannonRed)\n\
  print(worldCannonRedPos)\n```\n\n第一行代码调用了一个名为 `convertPoint` 的方法。这个方法将点从一个局部坐标系转换到另一个坐标系。被转换的点是\
  \ `cannonRed.position`。被转换点所处的坐标系是属于 `cannonRed` 节点的。最后，目标坐标系是属于 `gameWorld` 的。转换的结果存储在一个变量中，然后在第二条指令中打印到屏幕上。当你运行这段代码时，你会看到现在\
  \ `cannonRed` 对象的世界坐标被打印出来了。\n\n`convertPoint` 方法有两个版本，一个从坐标系转换，另一个转换到坐标系。有时转换到坐标系会很有用，例如当你需要处理触摸输入时。触摸输入以世界坐标表示。如果你想检查玩家是否点击了大炮的颜色指示器，你需要将触摸位置转换到大炮颜色指示器对象的局部坐标框架中。以下是使用\
  \ `convertPoint` 方法实现的方法：\n\n`let localTouch: CGPoint = gameWorld.convertPoint(touchLocation,\
  \ toNode: cannonRed)`\n\n然后你可以将此局部触摸位置与大炮颜色指示器进行比较，以判断玩家是否点击了它：\n\n```\nif !cannonRed.frame.contains(localTouch)\
  \ {\n    // 将大炮转向玩家触摸位置\n} else if hasTapped {\n    // 更改大炮颜色\n}\n```\n\n你可以通过查看\
  \ Painter3 示例 `GameScene.swift` 文件中的 `handleInputCannon` 方法来了解处理大炮输入的完整代码。\n\n\n\
  \n## 向游戏世界添加一个球\n\n在 Painter 游戏中，玩家通过手指在屏幕上的滑动来瞄准大炮。当玩家将手指从屏幕上抬起时，大炮应发射一个与大炮当前颜色相匹配的球。因此，你需要为球准备三种不同的精灵：红色、绿色和蓝色。在\
  \ Painter3 示例中，这些精灵作为 `GameScene` 类的属性存储，如下所示：\n\n`var ballRed = SKSpriteNode(imageNamed:\
  \ \"spr_ball_red\")`\n\n`var ballGreen = SKSpriteNode(imageNamed: \"spr_ball_green\"\
  )`\n\n`var ballBlue = SKSpriteNode(imageNamed: \"spr_ball_blue\")`\n\n这三个精灵节点被存储为一个名为\
  \ `ball` 的节点的子节点。在 `initBall` 方法中，你可以看到初始化球的指令：\n\n`func initBall() {`  \n    `ball.zPosition\
  \ = 1`  \n    `ball.addChild(ballRed)`  \n    `ball.addChild(ballGreen)`  \n    `ball.addChild(ballBlue)`\
  \  \n    `ball.hidden = true`  \n`}`\n\n初始状态下，球是隐藏的。一旦玩家发射球，它就会变得可见。由于球会移动，你还需要存储它的速度。这个速度是一个向量，定义了球的位置随时间变化的方式。例如，如果球的速度为\
  \ (0,1)，那么每秒钟球的 y 坐标会增加 1 点（这意味着球向上飞行）。在 Painter3 中，速度由 `ballVelocity` 属性表示。\n\n\
  当玩家想要发射球时，需要执行两个步骤。首先，玩家通过在屏幕上滑动手指来瞄准大炮。然后，在将手指从屏幕上抬起后，球就会被发射。为了跟踪球何时准备好发射，你添加了一个布尔属性\
  \ `readyToShoot`：\n\n`var readyToShoot = false`\n\n在本书中你开发的游戏中，大多数对象都有位置和速度。由于本书只涉及\
  \ 2D 游戏，因此位置和速度都是由 `x` 和 `y` 变量组成的变量。当你更新这些游戏对象时，你需要根据速度向量和经过的时间来计算新的位置。在本章后面，你将看到如何做到这一点。\n\
  \n虽然你不会在这个特定游戏中使用它，但 SpriteKit 框架内置了一个物理引擎。这使得为你的游戏添加物理效果变得非常容易且有趣。在本书开发的第二个游戏中，你将学习如何使用这个物理引擎来创建一个依赖物理交互的游戏，类似于《割绳子》或《蜡笔物理学》这类游戏。\n\
  \n### 发射球\n\n当玩家将手指从屏幕上抬起时，球就会被发射。球的速度和移动方向由玩家最后触摸屏幕的位置决定。球应该朝该位置的方向移动；并且玩家触摸屏幕的位置离大炮越远，球的速度就越高。这对用户来说是一种直观的控制球速的方式。在设计任何游戏时，请仔细思考如何接收用户的指令，以及处理这些指令最自然或最高效的方式。\n\
  \n为了处理输入，你在 `GameScene` 类中添加了一个 `handleInputBall` 方法。在这个方法内部，第一步是检查玩家当前是否正在触摸屏幕。如果是这种情况，并且玩家没有触摸到大炮颜色指示器，那么你就知道玩家正在瞄准大炮。只有当球尚未发射时，玩家才能开始发射它；换句话说，球也应该是隐藏的。如果所有这些条件都成立，则将\
  \ `readyToShoot` 属性设置为 `true`：\n\n`let localTouch: CGPoint = gameWorld.convertPoint(touchLocation,\
  \ toNode: cannonRed)`  \n`if nrTouches > 0 && !cannonRed.frame.contains(localTouch)\
  \ && ball.hidden {`  \n    `readyToShoot = true`  \n`}`\n\n第二个 `if` 指令检查玩家是否已将手指从屏幕上抬起。如果\
  \ `nrTouches` 等于零，并且 `readyToShoot` 属性为 `true`，则属于这种情况：\n\n`if (nrTouches <= 0 &&\
  \ readyToShoot && ball.hidden) {`  \n    `// 发射球！`  \n`}`\n\n在 `if` 指令内部，你需要做几件事情。你已经知道玩家触摸过某个位置，并且球必须从大炮中发射。你要做的第一件事是改变球的\
  \ `hidden` 状态，因为当你发射球时，它应该是可见的：\n\n`ball.hidden = false`\n\n接下来，你也将 `readyToShoot`\
  \ 属性重置为 `false`，因为球正在被发射：\n\n`readyToShoot = false`\n\n由于球现在正在移动，你需要给它一个速度。这个速度是一个指向玩家最后触摸屏幕位置的向量。你可以通过从触摸位置减去球的位置来计算这个方向。因为速度有\
  \ x 分量和 y 分量，你需要对两个维度都进行计算：\n\n`ballVelocity.x = touchLocation.x - cannon.position.x`\
  \  \n`ballVelocity.y = touchLocation.y - cannon.position.y`\n\n以这种方式计算速度也带来了期望的效果：当玩家触摸的位置离大炮越远，速度就越大，因为触摸位置与球位置之间的差值也更大。然而，如果你现在运行游戏，球的移动速度会有点慢。因此，你需要将这个速度乘以一个常量，使球获得一个在游戏上下文中可用的速度：\n\
  \n`let velocityMultiplier = CGFloat(1.4)`  \n`ballVelocity.x = (touchLocation.x\
  \ - cannon.position.x) * velocityMultiplier`  \n`ballVelocity.y = (touchLocation.y\
  \ - cannon.position.y) * velocityMultiplier`\n\n在通过不同数值进行游戏测试后，我选择了常量值 1.4。每个游戏中都会有一些这样的游戏参数，你需要在游戏试玩过程中进行调整，以确定它们的最佳值。为这些参数找到合适的数值对于实现平衡且流畅的游戏体验至关重要，并且你需要确保所选的数值不会使游戏变得过于简单或困难。例如，如果你选择常量值\
  \ 0.3 而不是 1.4，球的移动速度会慢得多。这会使游戏变得困难得多，甚至可能使游戏无法进行，因为球可能永远无法到达屏幕的另一端。\n\n\n\n####\
  \ 更新球的位置\n\n在本节中，您将开始定义球的行为。基本上有两种可能：要么球等待被发射，要么球正在空中飞行。为了将这种行为转化为更新球的速度继而更新其位置的指令，让我们编写一个名为`updateBall`的方法，在其中组合这些指令。这是完整的方法：\n\
  \n```\nfunc updateBall() {\n    if !ball.hidden {\n        ballVelocity.x *= 0.99\n\
  \        ballVelocity.y -= 15\n        ball.position.x += ballVelocity.x * CGFloat(delta)\n\
  \        ball.position.y += ballVelocity.y * CGFloat(delta)\n    }\n    else {\n\
  \        // 计算球的位置\n        let opposite = sin(cannonBarrel.zRotation) * cannonBarrel.size.width\
  \ * 0.6\n        let adjacent = cos(cannonBarrel.zRotation) * cannonBarrel.size.width\
  \ * 0.6\n        ball.position = CGPoint(x: cannon.position.x + adjacent,\n    \
  \        y: cannon.position.y + opposite)\n        // 设置球的颜色\n        ballRed.hidden\
  \ = cannonRed.hidden\n        ballGreen.hidden = cannonGreen.hidden\n        ballBlue.hidden\
  \ = cannonBlue.hidden\n    }\n    if isOutsideWorld(ball.position) {\n        ball.hidden\
  \ = true\n        readyToShoot = false\n    }\n}\n```\n\n如您所见，此方法使用`if`指令来区分球所处的两种可能状态。如果球未被隐藏，那么它一定是在空中飞行。在这种情况下，将执行`if`指令的主体。该主体由四条指令组成。前两条指令更新速度，后两条指令更新位置。第一条指令更新速度的\
  \ x 方向分量。您将速度乘以 0.99，其效果是速度缓慢降低。这是为了模拟空气摩擦。第二条指令在每次更新中增加 y 方向的速度。这是为了模拟重力对球的影响。x\
  \ 和 y 方向上的速度变化共同作用，产生了合理的球体行为。当然，在现实世界中，重力并非 15。但话说回来，您的现实世界也不由像素构成。游戏世界中的物理并不总是精确模拟现实世界中的物理。当您想在游戏中加入某种形式的物理机制时（无论非常简单还是极其复杂），最重要的部分并非物理机制是否逼真，而是游戏是否具有可玩性。这就是为什么在策略游戏中，飞机的移动速度可能与地面上行走的士兵一样快。如果游戏为这两种对象使用现实的速度，将导致游戏无法进行。\n\
  \n球当前的位置通过将速度的 x 和 y 分量加到其当前位置上来更新。以下是实现此操作的指令：\n\n```\nball.position.x += ballVelocity.x\
  \ * CGFloat(delta)\nball.position.y += ballVelocity.y * CGFloat(delta)\n```\n\n\
  如您所见，速度乘以了一个因子`delta`。这是为什么呢？\n\n#### 固定时间步长 vs 可变时间步长\n\n`delta`因子是定义在`GameScene`中的一个属性，如下所示：\n\
  \n```\nvar delta: NSTimeInterval = 1/60\n```\n\n它表示 1/60 秒的时间间隔。这对应于 SpriteKit 中设置的默认帧率，即每秒\
  \ 60 帧。因此，实际上，`delta`表示游戏循环周期之间经过的时间量。\n\n通过将速度乘以这个因子`delta`，您实际上是在计算中考虑了游戏引擎的帧率。帧率与\
  \ iOS 设备刷新屏幕的频率密切相关。该频率固定为 60Hz（换句话说，就像帧率一样，每秒 60 次）。在 SpriteKit 中，可以通过更改`SKView`类中的`frameInterval`属性将帧率更改为其他值。例如，在`didMoveToView`方法中，您可以将帧间隔设置为\
  \ 2，这意味着帧率将降至每秒 30 帧，如下所示：\n\n```\nview.frameInterval = 2\n```\n\n显然，您还需要更新`delta`因子以匹配新的帧率：\n\
  \n```\ndelta = NSTimeInterval(view.frameInterval) / 60\n```\n\n但是，当您在一台速度非常慢的设备上运行游戏，并且引擎无法以每秒\
  \ 60 次执行游戏循环，而是以每秒 50 帧的速度运行时，会发生什么？嗯，由于`delta`与实际经过的时间毫无关联，这意味着您的整个游戏将会变慢，因为游戏逻辑仍然认为自上次调用`update`以来，已经过了`delta`变量中设置的固定时间量（1/60\
  \ 秒）。由于`delta`值是固定的，这种游戏循环也称为固定时间步长方法。\n\n有时候让游戏稍微变慢本身并不一定是坏事。不过，您必须注意不要让游戏结构性运行得太慢。它可能会产生负面副作用。其一，玩家可能会因为物体移动不再逼真且玩游戏耗时过长而对游戏失去兴趣。另一个副作用可能是游戏变得过于简单，从而使使用较旧设备的玩家获得不公平的优势。\n\
  \n处理此问题的一种方法是跟踪自上次更新以来实际经过了多少时间。这就是为什么`GameScene`中的`update`方法有一个名为`currentTime`的参数。该参数为您提供当前系统时间。您可以通过一些计算来找出自上次更新周期以来经过了多少时间。首先，添加一个属性来存储上次更新的时间：\n\
  \n```\nvar lastUpdateTimeInterval: NSTimeInterval = 0\n```\n\n然后，在`update`方法中，您可以按如下方式计算经过的时间：\n\
  \n```\nlet timePassed: NSTimeInterval = currentTime - lastUpdateTimeInterval\nlastUpdateTimeInterval\
  \ = currentTime\n```\n\n现在您可以做的是计算`delta`值与实际经过时间之间的差值。如果该值太大，您可以决定增加帧间隔并计算新的`delta`值，以便游戏玩法更好地匹配设备。如果您愿意，可以编写一个更高级的版本，计算过去几帧中与`delta`的平均差值，然后根据该差值决定是需要降低还是提高帧率。\n\
  \n与使用固定`delta`值完全不同的另一种方法是，在每次调用`update`方法时简单地计算`delta`值，然后在游戏中使用该`delta`值。这被称为可变时间步长方法。\n\
  \n```\ndelta = currentTime - lastUpdateTimeInterval\nlastUpdateTimeInterval = currentTime\n\
  ```\n\n\n\n### 变长时间步长 vs 固定时间步长\n\n`变长时间步长`相较于之前的方法具有若干优势。首先，你无需再担心帧率问题。`delta`值将始终对应实际经过的时间。这意味着无论实际帧率如何，你的游戏世界都会自动以相同的速度运行。如果帧率下降，游戏世界速度会自动调整。`变长时间步长`在追求高帧率的游戏中尤其有用，例如第一人称射击游戏中，由于摄像机直接由玩家控制，镜头运动可能非常快速。在这种情况下，变长时间步长能带来更流畅的移动和更愉悦的游戏体验。\n\
  \n使用变长时间步长的缺点在于，你的游戏逻辑需要足够稳健以应对`delta`值的大幅波动。例如，假设有一支箭在空中飞射，此时系统出现短暂卡顿导致`delta`值非常大，而你仅通过将速度乘以`delta`再加上当前位置来计算箭的新位置，就可能导致箭意外穿过本不该穿过的物体（如对手），并且未触发碰撞处理。这也可能使玩家进入游戏世界中本不可及的区域。因此，在使用`delta`值时需格外小心，否则可能导致意外行为。\n\
  \n变长时间步长的另一个缺点是，即使玩家临时进行其他操作（如打开游戏菜单或保存游戏），时间仍在继续。通常，如果玩家发现自己在浏览物品栏时角色已在游戏世界中被击杀，他们不会感到高兴。当玩家临时切换到其他应用时也会出现类似情况：系统时间继续流逝，游戏世界也随之推进。而使用固定时间步长时，游戏只会从暂停处继续运行——因为游戏对象不关心真实经过的时间，只关心固定的`delta`值。\n\
  \n> **注意**：在早期，计算机速度较慢，固定时间步长的概念尚未出现。游戏开发者假定所有人的电脑都同样缓慢，因此尽可能频繁地调用游戏循环方法，仅用恒定速度系数更新物体位置。结果，当计算机速度提升后，这些游戏变得越来越难玩！玩家对此很不满。因此，在计算速度和位置等属性时，务必考虑经过的时间，并确保游戏的帧率与运行设备的性能相匹配。\n\
  \n## 更新球体颜色\n\n如果球体当前未处于发射状态，玩家可以更改其颜色。具体做法是获取大炮的当前颜色，并相应更改球体的颜色。这样就能确保球体颜色始终与大炮颜色一致。最简单的解决方案是将大炮颜色指示器对象的`hidden`状态直接映射到不同颜色的球体：\n\
  \n```\nballRed.hidden = cannonRed.hidden\nballGreen.hidden = cannonGreen.hidden\n\
  ballBlue.hidden = cannonBlue.hidden\n```\n\n还需要更新球体的位置。这是必要的，因为当球体未在空中时，玩家可以通过旋转炮管来调整发射位置。因此，需要在此处计算正确的球体位置，使其与大炮炮管的当前朝向匹配。使用正弦和余弦函数，按如下方式计算新位置：\n\
  \n```\nlet opposite = sin(cannonBarrel.zRotation) * cannonBarrel.size.width * 0.6\n\
  let adjacent = cos(cannonBarrel.zRotation) * cannonBarrel.size.width * 0.6\nball.position\
  \ = CGPoint(x: cannon.position.x + adjacent, y: cannon.position.y + opposite)\n\
  ```\n\n如你所见，将对边和邻边乘以系数 0.6，使球体绘制在旋转炮管大约一半以上的位置。\n\n`updateBall`方法的第二部分同样是一个`if`指令：\n\
  \n```\nif isOutsideWorld(ball.position) {\n    ball.hidden = true\n    readyToShoot\
  \ = false\n}\n```\n\n这部分处理球体飞出游戏世界的事件。为了判断是否发生这种情况，需要在`GameScene`中添加一个名为`isOutsideWorld`的方法。该方法的目标是检查给定位置是否超出游戏世界边界，并通过几条简单规则定义游戏世界边界。请记住，SpriteKit\
  \ 的原点位于屏幕左下角。本书开发的游戏中，游戏场景的原点（或锚点）被设置到屏幕中心，以便更好地适配不同设备。在这种设置下，如果对象的 x 坐标小于屏幕宽度的一半负值，或大于屏幕宽度的一半正值，则该对象位于游戏世界之外；如果对象的\
  \ y 坐标小于屏幕高度的一半负值，也属同样情况。注意，我并未说 y 坐标非常大时对象会超出游戏世界——这是为什么？我这样设计是为了让玩家能将球射向空中，使球暂时出现在屏幕上方，然后再次下落。在平台游戏中经常能看到类似效果：角色可以向上跳跃，部分消失于屏幕之外，而不会从屏幕底部掉落（后者通常意味着角色立即死亡）。\n\
  \n查看该方法的头部，可以看到它需要一个参数，即位置：\n\n```\nfunc isOutsideWorld(pos: CGPoint) -> Bool\n\
  ```\n\n该方法的返回值是布尔值。要检查位置是否在屏幕之外，需要知道屏幕的宽度和高度。Painter3 在`GameScene`类中添加了一个名为`gameSize`的属性。该属性在`GameScene`的`init`方法中被赋值：\n\
  \n```\noverride init(size: CGSize) {\n    super.init(size: size)\n    gameSize =\
  \ size\n}\n```\n\n稍后我会更详细地讨论此方法的含义。目前，假设该方法在应用启动时被调用。\n\n在`isOutsideWorld`方法中，使用`gameSize`属性判断位置是否在游戏世界之外。方法体由一条使用`return`关键字计算布尔值的指令构成。通过逻辑或运算覆盖位置超出游戏世界的不同情况：\n\
  \n```\nreturn pos.x < -gameSize.width/2 || pos.x > gameSize.width/2 || pos.y < -gameSize.height/2\n\
  ```\n\n如你所见，y 坐标大于`gameSize.height/2`的情况未被纳入条件。这使得球体能够飞至屏幕上方后再次落回。\n\n让我们回到`updateBall`方法。第二个`if`指令在其条件中调用了`isOutsideWorld`方法；如果该方法返回`true`，则球体再次隐藏，并将`readyToShoot`属性重置为`false`（以便玩家可以再次发射球体）。\n\
  \n像`isOutsideWorld`这样的方法可以在程序的不同部分重复使用，这既节省了开发时间，也使得程序更简短、更易读。例如，在后续游戏中，`isOutsideWorld`可能同样适用于检测油漆罐是否掉落出屏幕。\n\
  \n运行 Painter3 示例时，可以看到现在可以瞄准大炮、选择颜色并发射球体（见图 6-2）。下一章将向此游戏添加油漆罐。\n\n![A978-1-4842-0650-8_6_Fig2_HTML.jpg](img/A978-1-4842-0650-8_6_Fig2_HTML.jpg)\n\
  \n**图 6-2.** Painter3 示例\n\n\n\n## 本章小结\n\n在本章中，你学习了以下内容：\n\n- 不同类型的方法/函数（带/不带参数，以及带/不带返回值）\n\
  - 固定时间步长与可变时间步长的区别\n- 如何向游戏世界添加一个飞行球\n\n"
- "# 7. 游戏对象类型\n\n电子补充材料 本章在线版（doi:[10.1007/978-1-4842-0650-8_7](http://dx.doi.org/10.1007/978-1-4842-0650-8_7)）包含补充材料，仅供授权用户使用。\n\
  \n在前几章中，你已经了解了如何创建一个包含几种不同游戏对象（例如大炮和球）的游戏世界。你还了解了如何让游戏对象之间进行交互。例如，`ball`对象会根据大炮的颜色更新其颜色。在本章中，你将向游戏世界添加掉落的油漆罐。但在实现这个功能之前，你需要重新审视如何在\
  \ Swift 中创建和管理对象。我将介绍**类**这一概念，将其作为一种创建特定类型多个游戏对象的手段。然后，你将把类的概念应用到 Painter 游戏应用程序的其他部分。此外，你还将学习如何在游戏中融入随机性。\n\
  \n## 创建同一类型的多个对象\n\n到目前为止，在 Painter 中每个游戏对象只需要一个实例。只有一门大炮，也只有一个球。在您之前看到的 Painter\
  \ 示例中，这些对象由 `GameScene` 类中的一系列属性表示。例如，以下属性组成了大炮对象：\n\n```\nvar cannon = SKNode()\n\
  var cannonBarrel = SKSpriteNode(imageNamed:\"spr_cannon_barrel\")\nvar cannonRed\
  \ = SKSpriteNode(imageNamed: \"spr_cannon_red\")\nvar cannonGreen = SKSpriteNode(imageNamed:\
  \ \"spr_cannon_green\")\nvar cannonBlue = SKSpriteNode(imageNamed: \"spr_cannon_blue\"\
  )\n```\n\n类似地，球对象也有几个与之关联的属性：\n\n```\nvar ball = SKNode()\nvar ballRed = SKSpriteNode(imageNamed:\
  \ \"spr_ball_red\")\nvar ballGreen = SKSpriteNode(imageNamed: \"spr_ball_green\"\
  )\nvar ballBlue = SKSpriteNode(imageNamed: \"spr_ball_blue\")\nvar ballVelocity\
  \ = CGPoint.zeroPoint\nvar readyToShoot = false\n```\n\n假设你想在 Painter 游戏中同时发射多个球。如果你仍然沿用之前处理对象的方法，那么你每向游戏添加一个球，就需要为它复制一份上述属性。结果，`GameScene`\
  \ 类会变得非常庞大，从而难以理解。此外，复制代码通常不是一个好主意。如果将来你想给球增加第四种颜色，你就需要更新添加到游戏中的每一个球的属性列表。\n\n##\
  \ 类作为类型\n\n在 Swift 中，可以通过使用类将属性组合成一个新的类型。Painter4 示例向你展示了如何使用类来将逻辑上属于一起的属性进行分组。请看一下下面的类定义：\n\
  \n```\nclass Cannon {\n    var node = SKNode()\n    var barrel = SKSpriteNode(imageNamed:\"\
  spr_cannon_barrel\")\n    var red = SKSpriteNode(imageNamed: \"spr_cannon_red\"\
  )\n    var green = SKSpriteNode(imageNamed: \"spr_cannon_green\")\n    var blue\
  \ = SKSpriteNode(imageNamed: \"spr_cannon_blue\")\n}\n```\n\n一个类创建了一个新的类型。因此，在你定义了\
  \ `Cannon` 类之后，你就可以创建 `Cannon` 类型的实例。`Cannon` 类的定义规定了一个大炮包含一个节点（表示场景图中的对象）、一个炮管精灵图和三个分别代表大炮颜色的精灵图。在\
  \ Painter4 示例中，这个类定义写在 `GameScene` 类的上方。在 `GameScene` 内部，你不再需要编写所有组成大炮的那些属性；你可以简单地创建一个\
  \ `Cannon` 类型的属性，如下所示：\n\n```\nvar cannon = Cannon()\n```\n\n现在，`cannon` 属性包含了 `Cannon`\
  \ 类中定义的数据。你可以使用点号来访问这些数据。例如，这是 `initCannon` 方法的新版本，它现在初始化了 `cannon` 属性：\n\n```\n\
  func initCannon() {\n    cannon.red.zPosition = 1\n    cannon.green.zPosition =\
  \ 1\n    cannon.blue.zPosition = 1\n    cannon.barrel.anchorPoint = CGPoint(x:0.233,\
  \ y:0.5)\n    cannon.node.position = CGPoint(x:-430, y:-280)\n    cannon.node.zPosition\
  \ = 1\n    cannon.green.hidden = true\n    cannon.blue.hidden = true\n    cannon.node.addChild(cannon.red)\n\
  \    cannon.node.addChild(cannon.green)\n    cannon.node.addChild(cannon.blue)\n\
  \    cannon.node.addChild(cannon.barrel)\n}\n```\n\n因此，与你在 Painter3 中直接访问属性不同，现在你是将它们作为\
  \ `cannon` 对象的一部分来访问。类似地，你也可以定义一个 `Ball` 类：\n\n```\nclass Ball {\n    var node =\
  \ SKNode()\n    var red = SKSpriteNode(imageNamed: \"spr_ball_red\")\n    var green\
  \ = SKSpriteNode(imageNamed: \"spr_ball_green\")\n    var blue = SKSpriteNode(imageNamed:\
  \ \"spr_ball_blue\")\n    var velocity = CGPoint.zeroPoint\n    var readyToShoot\
  \ = false\n}\n```\n\n同样，你现在只需要在 `GameScene` 中定义一个属性：\n\n```\nvar ball = Ball()\n\
  ```\n\n并且访问 `ball` 对象中的数据的方式与访问 `cannon` 对象完全相同。以下是新 `updateBall` 方法的一个片段：\n\n```\n\
  if !ball.node.hidden {\n    ball.velocity.x *= 0.99\n    ball.velocity.y -= 15\n\
  \    ball.node.position.x += ball.velocity.x * CGFloat(delta)\n    ball.node.position.y\
  \ += ball.velocity.y * CGFloat(delta)\n}\n```\n\n这种方法的妙处在于，向游戏中添加更多球变得很容易：\n\n```\n\
  var ball2 = Ball()\nvar ball3 = Ball()\nvar ball4 = Ball()\n```\n\n\n\n与其为每个球定义所有属性，你只需创建一个`Ball`类的实例。目前唯一的问题是`updateBall`方法只更新`ball`引用的对象。如果你添加了`ball2`、`ball3`和`ball4`，它们不会自动更新。一个解决此问题的朴素方法是简单地将`updateBall`中的代码复制三次，并在每个副本中将`ball`替换为`ball2`、`ball3`和`ball4`。但这并非理想方案。首先，复制代码意味着你必须处理版本管理问题。例如，如果你在`updateBall`方法代码中发现了一个错误，你需要确保将改进后的代码复制到其他`Ball`对象。如果你忘记复制一份，那么在你以为已解决问题时，那个错误仍然存在。另一个问题是这种方法无法很好地扩展。如果你想扩展游戏，让玩家可以同时发射\
  \ 20 个球，你打算把代码复制 20 次吗？此外，你的 Swift 文件越大，编译器将其翻译成机器码所需的时间就越长。最后，重复的代码看起来不美观，会使你的源代码文件杂乱无章，并让你难以找到所需的其他代码段，导致过度滚动，从而普遍降低你的编码效率。\n\
  \n解决这个问题一个稍微不那么朴素的方法是将`Ball`对象作为参数传递给`updateBall`方法：\n\n```\nfunc updateBall(aBall:\
  \ Ball) {\n\n    if !aBall.node.hidden {\n\n        aBall.velocity.x *= 0.99\n\n\
  \        aBall.velocity.y -= 15\n\n        aBall.node.position.x += aBall.velocity.x\
  \ * CGFloat(delta)\n\n        aBall.node.position.y += aBall.velocity.y * CGFloat(delta)\n\
  \n    }\n\n    else {\n\n        // 更多的操作 aBall 对象的代码\n\n    }\n\n}\n```\n\n然后，在`update`方法中，你可以简单地调用此方法，将每个球作为参数传递：\n\
  \n```\noverride func update(currentTime: NSTimeInterval) {\n\n    ...\n\n    updateBall(ball)\n\
  \n    updateBall(ball2)\n\n    updateBall(ball3)\n\n    updateBall(ball4)\n\n  \
  \  ...\n\n}\n```\n\n你需要为初始化每个球以及处理球的输入做同样的事情。虽然这是一个可以接受的解决方案，但从长远来看，它同样难以扩展。在 Painter\
  \ 游戏中，只有少数几个不同的游戏对象：一个加农炮、一个球和三个油漆罐。商业游戏可能有数百个不同的游戏对象。如果你必须为每种对象类型向`GameScene`类添加初始化、输入处理和更新方法，那么该类会变得非常庞大，这反过来会使编辑代码变得极其麻烦。\n\
  \n更好的处理方式是将`initBall`、`handleInputBall`和`updateBall`方法变成`Ball`类的一部分，而不是`GameScene`类的一部分。看看属于本章的\
  \ Painter5 示例。与之前的示例相比，有一些变化。首先，`Ball`和`Cannon`类现在定义在单独的文件中。这是一件好事，因为它将使你的源代码更易于浏览。另一个变化是，用于初始化球、处理球输入和更新球的方法现在属于`Ball`类。同样，`Cannon`类现在也有了自己的方法。从现在开始，我将使用`handleInput`和`updateDelta`作为游戏循环方法中处理输入和更新游戏世界的默认名称。\n\
  \n## 在独立类中进行输入处理\n\n当你将处理输入的方法放入`Ball`和`Cannon`类时，你需要某种方式来访问玩家触摸屏幕的位置。一种方法是也定义一个独立的类来处理输入。我们称这个类为`InputHelper`。在这个类内部，你放置用于跟踪玩家触摸输入的属性。你还添加一个用于检查玩家是否正在触摸屏幕某处的方法。这是完整的类：\n\
  \n```\nclass InputHelper {\n\n    var touchLocation = CGPoint(x: 0, y: 0)\n\n  \
  \  var nrTouches = 0\n\n    var hasTapped: Bool = false\n\n    func isTouching()\
  \ -> Bool {\n\n        return nrTouches > 0\n\n    }\n\n}\n```\n\n在`GameScene`类中，你添加一个`InputHelper`类型的属性，如下所示：\n\
  \n```\nvar inputHelper = InputHelper()\n```\n\n然后，当你调用球和加农炮的`handleInput`方法时，你可以将`InputHelper`对象作为参数传递，如下所示：\n\
  \n```\ncannon.handleInput(inputHelper)\n\nball.handleInput(inputHelper)\n```\n\n\
  因此，你可以在每个游戏对象类中访问触摸信息。例如，在`Cannon`类中，你使用`InputHelper`类的`isTouching`方法来确定是否应该旋转加农炮。如果玩家没有触摸，你不需要做任何操作，只需从`handleInput`方法返回：\n\
  \n```\nif !inputHelper.isTouching() {\n\n    return\n\n}\n```\n\n\n\n### 初始化对象\n\
  \n每当你创建一个类的实例（例如 `Ball` 或 `Cannon`）时，所创建的对象都需要以某种方式进行初始化。例如，当你创建一个球时，你需要加载一些精灵图像、设定一个初始速度、确保球处于隐藏状态等等。在\
  \ Swift 中，每个类都有自己的构造器来执行此工作。你可以通过名称来识别一个方法是构造器。构造器始终被命名为 `init`。此外，在定义构造器时，需要省略关键字\
  \ `func`。以下是 `Ball` 类的构造器：\n\n```\ninit() {\n    node.zPosition = 1\n    node.addChild(red)\n\
  \    node.addChild(green)\n    node.addChild(blue)\n    node.hidden = true\n}\n\
  ```\n\n在构造器的函数体中，可以看到 `node` 属性被操作了。其 z 轴位置被改变（以便球体始终显示在背景之前）；添加了红色、绿色和蓝色球的精灵图像；并且节点被设为隐藏状态。当你创建\
  \ `Ball` 的实例时，这个 `init` 方法会被自动调用：\n\n```\nvar b = Ball()\n```\n\n像这样的指令会完成几件事：\n\
  \n- 内存被预留用于存储 `Ball` 的一个实例。\n- `Ball` 内部的存储属性被赋予值，这些值被存储在内存中。\n- 调用了 `Ball` 的构造器。\n\
  - 对新创建的实例的引用被赋值给变量 `b`。\n\n由于构造器与方法非常相似，你也可以向其添加参数。例如，考虑以下构造器：\n\n```\ninit(position:\
  \ CGPoint) {\n    node.zPosition = 1\n    node.addChild(red)\n    node.addChild(green)\n\
  \    node.addChild(blue)\n    node.hidden = true\n    node.position = position\n\
  }\n```\n\n这个构造器接受一个位置参数，你可以像下面这样使用它来创建一个 `Ball` 实例：\n\n```\nvar ballPosition = CGPoint(x:\
  \ 10, y: -50)\nvar anotherBall = Ball(position: ballPosition)\n```\n\n注意，在调用构造器时，构造器参数始终需要提供标签。当然，你也可以显式指定不使用标签，就像在方法中可以做的那样：\n\
  \n```\ninit(_ position: CGPoint) {\n    // 构造器代码放在这里\n}\n```\n\n一个类可以有多个不同的构造器，每个构造器都有不同的参数，用于创建类的实例。也可以定义一个类而不显式添加\
  \ `init` 方法。在这种情况下，Swift 会使用内置的默认构造器，它仅仅为属性设置已定义的默认值。实际上，这正是 Painter4 示例中所发生的情况，其中\
  \ `Ball` 类的定义如下：\n\n```\nclass Ball {\n    var node = SKNode()\n    var red = SKSpriteNode(imageNamed:\
  \ \"spr_ball_red\")\n    var green = SKSpriteNode(imageNamed: \"spr_ball_green\"\
  )\n    var blue = SKSpriteNode(imageNamed: \"spr_ball_blue\")\n    var velocity\
  \ = CGPoint.zeroPoint\n    var readyToShoot = false\n}\n```\n\n这个 `Ball` 类中的每一个属性都有一个默认值。例如，`readyToShoot`\
  \ 的默认值是 `false`，而球的速度默认值是零。当创建这个 `Ball` 类的实例时，默认构造器被调用，它将默认值赋给这些属性。Swift 编译器要求，在创建类的实例时，类中的每一个属性都必须被初始化。这一要求迫使开发者确保实例中的所有数据都已被正确赋值，从而减少了与未初始化数据相关的错误。\n\
  \n最后，了解构造器可以调用其他构造器是很有益处的。Swift 区分了指定构造器和便利构造器。指定构造器能够完整地初始化一个实例，包括其所有属性。`Ball`\
  \ 中的 `init` 方法就是这类构造器的一个很好的例子。便利构造器的语法略有不同：\n\n```\nconvenience init(position: CGPoint)\
  \ {\n    self.init()\n    node.position = position\n}\n```\n\n如你所见，它使用 `convenience`\
  \ 关键字来表明这不是一个指定构造器。便利构造器的用途是在指定构造器之上提供一层封装，以便更容易地创建类的实例。便利构造器必须在其函数体中调用另一个构造器，并且必须在它可以为任何属性赋值之前完成这一调用。在这个例子中，第一行代码调用了指定构造器。它使用了关键字\
  \ `self`，稍后我会更详细地介绍这个关键字。除了调用指定构造器，你也可以调用另一个便利构造器（而这个便利构造器又会调用另一个构造器）。这就形成了一条便利构造器的调用链。唯一需要记住的重要事项是，最终必须调用一个指定构造器。便利构造器能够调用另一个构造器是非常有用的特性。它允许你编写更简短的代码。这个便利构造器只包含两行代码，而下面的指定构造器有六行代码：\n\
  \n```\ninit(position: CGPoint) {\n    node.zPosition = 1\n    node.addChild(red)\n\
  \    node.addChild(green)\n    node.addChild(blue)\n    node.hidden = true\n   \
  \ node.position = position\n}\n```\n\n此外，基本的对象初始化代码现在被编写在类中的一个单一位置：即指定构造器中。这意味着，如果那段代码存在错误，并且你为该构造器修复了它，那么对于任何依赖于这个指定构造器的便利构造器，该错误也会自动得到修复。\n\
  \n**注意**  \n构造器的另一个名称是构造函数。后者是 C# 和 Java 等语言中常用的术语。\n\n\n\n### Self 关键字\n\n既然你已经为\
  \ Painter 中的几种对象类型定义了类，现在让我们重新审视一下描述对象行为的代码。例如，在 Painter4 中，炮管的输入处理是在 `GameScene`\
  \ 类的 `handleInputCannon` 方法中定义的。以下是该方法主体部分的代码片段：\n\n`let opposite = touchLocation.y\
  \ - cannon.node.position.y`\n\n`let adjacent = touchLocation.x - cannon.node.position.x`\n\
  \n`cannon.barrel.zRotation = atan2(opposite, adjacent)`\n\n看这段代码，很容易就能看出哪些对象正在被操作。第一行中，你从\
  \ `cannon` 对象所属的节点获取了 y 坐标，并用它来计算三角形的对边。在最后一行代码中，你正在将属于该炮管的 barrel 精灵绕 z 轴的旋转角度设置为某个特定值，这个值是利用同一个三角形的对边和临边计算得出的。之所以能轻易看出操作的是哪些对象，是因为在这个简单的情境中，每个对象都有一个你用来引用它的唯一名称。\n\
  \n现在让我们看看同样的代码片段在 `Cannon` 类中是什么样子：\n\n`let opposite = touchLocation.y - node.position.y`\n\
  \n`let adjacent = touchLocation.x - node.position.x`\n\n`barrel.zRotation = atan2(opposite,\
  \ adjacent)`\n\n这段代码看起来几乎相同，只是不再有对 `cannon` 对象的引用。这是因为在 `Cannon` 类的方法中，你不知道该对象的名称。说不定开发者可能在\
  \ `GameScene` 类中写过下面这些代码行：\n\n```\nvar cannon = Cannon()\nvar anotherCannon = Cannon()\n\
  var chrisTheCrazyCannon = Cannon()\nvar aVariableNameWayTooLongForSuchASimpleThingAsACannon\
  \ = Cannon()\n\ncannon.handleInput()\nanotherCannon.handleInput()\nchrisTheCrazyCannon.handleInput()\n\
  aVariableNameWayTooLongForSuchASimpleThingAsACannon.handleInput()\n```\n\n`handleInput`\
  \ 方法被调用了四次，每次都是针对不同的对象。这意味着在 `handleInput` 的方法体中，`barrel` 有时可能指向 `anotherCannon.barrel`，有时指向\
  \ `cannon.barrel`，有时又指向属于另一个 `Cannon` 实例的 `barrel` 对象。换句话说，在 `handleInput` 的方法体中，你永远无法知道该方法正在操作的对象名称。\n\
  \n现在让我们再次审视 `handleInput` 方法体中的这一行代码：\n\n`let opposite = touchLocation.y - node.position.y`\n\
  \n`node` 指向什么？如果调用的是 `cannon.handleInput`，它就指向 `cannon.node`。如果调用的是 `anotherCannon.handleInput`，它就指向\
  \ `anotherCannon.node`。当你在一个对象上调用方法时，编译器会在该对象与方法之间建立绑定，并确保在方法执行时，对属性的引用能够被正确地解析。\n\
  \n即使你不知道在方法内部操作的对象名称，你仍然可以使用关键字 `self` 来引用该对象。换句话说，`self` 指向的是你当前正在操作的对象。因此，你可以用以下代码代替上面的指令：\n\
  \n`let opposite = touchLocation.y – self.node.position.y`\n\n所以，例如，如果调用了 `cannon.handleInput`，你在\
  \ `handleInput` 的方法体中使用 `self` 来引用 `cannon` 所指向的实例。那么，为什么不干脆完全避免使用 `self`，而写成下面这样呢？\n\
  \n`let opposite = touchLocation.y – cannon.node.position.y`\n\n这段代码会因几个原因而失败。首先，这意味着你的代码现在只能适用于一个名为\
  \ `cannon` 的 `Cannon` 实例。这是不可取的。使用类来定义类型的全部意义在于，你可以创建任意多个你需要的类实例。其次，这根本行不通，因为 `cannon`\
  \ 实际上是 `GameScene` 类的一部分。所以，如果你使用名称 `cannon` 来引用该对象，你需要指明它属于哪里。在 Painter4 中，它属于\
  \ `GameScene` 的一个实例对象，因此你还需要知道该实例的名称。这个实例是在哪里创建的呢？查看 `GameViewController` 类，你会看到这一行：\n\
  \n`let scene = GameScene(size: viewSize)`\n\n好吧，那么你能否在 `Cannon` 类的 `handleInput`\
  \ 方法中写成 `scene.cannon` 呢？不幸的是，不能。`scene` 变量是 `GameViewController` 类中 `viewWillLayoutSubviews`\
  \ 方法里的一个局部变量，所以在该方法之外无法访问它。\n\n这就是 `self` 关键字如此有用的原因。它让你能够轻松引用在方法中操作的对象，而不会对你所编写的类的使用者施加任何限制。他们可以随意命名实例，也可以创建任意多个类的实例。\n\
  \n然而，你可能现在已经意识到，一旦在游戏中引入了多个类，确保能够访问到你所需的对象可能会很有挑战性。例如，看看 Painter4 中 `updateBall`\
  \ 方法的以下指令：\n\n`ball.red.hidden = cannon.red.hidden`\n\n这使事情变得复杂了。似乎 `ball` 需要访问\
  \ `cannon` 对象。那么，你如何在 `Ball` 类的 `updateDelta` 方法中获取那个对象呢？让我们重新设计代码，以便妥善解决这个问题。\n\
  \n\n\n### 使用静态变量访问其他对象\n\n将代码拆分到不同类之间的主要问题之一，就是你将需要访问游戏中的其他对象。这些对象（例如球或油漆桶）作为属性存储在类中。要访问这些属性，你需要该类的一个实例，而该实例又存储在别处。这就导致了一个庞大的对象链，一个对象属于另一个对象，另一个对象又属于其他对象。你需要以某种方式编写代码，使其有一个根对象，然后你可以从这个根对象访问其他所有内容。\n\
  \n我们首先创建一个代表游戏世界的对象。在 Painter5 示例中，你可以看到一个名为 `GameWorld` 的类。这个类包含了与游戏世界相关的所有属性，并确保所有游戏循环方法在需要时都能在对象上被调用。如果你能创建一个可以在任何地方访问的\
  \ `GameWorld` 实例，那么无休止的对象链问题就解决了。\n\n在 Swift 中有几种方法可以做到这一点。其中一种方法是创建一个所谓的类属性（有时也称为类型属性）。类属性与常规属性的不同之处在于，它不依附于对象，而是依附于类。请看下面的简单示例：\n\
  \n```\nclass Car {\n    static var nrOfCars: Int = 0\n    var nrOfSeats: Int = 4\n\
  \    init() {\n        Car.nrOfCars++\n    }\n}\n```\n\n如你所见，其中一个属性（`nrOfCars`）前面有关键字\
  \ `static`。现在看下面的指令：\n\n```\nCar.nrOfCars++\n```\n\n要访问这个变量，你并不需要实际的 `Car` 实例。该属性是绑定到类本身的。这也意味着无论你创建了多少辆汽车，内存中始终只有一个位置指向\
  \ `Car.nrOfCars`。在 `init` 方法中，类属性 `nrOfCars` 会增加。因此，你现在可以使用这个属性来跟踪创建了多少个 `Car` 对象。\n\
  \n你可以应用类属性的原理，在 `GameScene` 类中创建一个 `GameWorld` 实例：\n\n```\nstatic var world = GameWorld()\n\
  ```\n\n由于 `world` 是 `GameScene` 的一个类属性，你可以通过 `GameScene.world` 来访问它。之后，一旦有了这个实例，你就可以访问它的属性。例如，你可以在\
  \ `Ball` 的 `updateDelta` 方法中编写以下指令：\n\n```\nred.hidden = GameScene.world.cannon.red.hidden\n\
  ```\n\n类属性的另一个名称是静态变量，这是 Java 或 C# 等编程语言中使用的术语（这也解释了为什么在 Swift 中使用 `static` 关键字来定义类属性）。\n\
  \n### 类的双重角色\n\n类在程序中有两个角色。第一个角色是，类将属于一起的方法进行分组。第二个角色是，类代表一种类型。也可以说，类是对象的蓝图，因此它描述了两件事：\n\
  \n*   对象中包含的数据。以球为例，这些数据包括一个节点、一个速度、代表每种颜色的精灵，以及一个指示球是否正在发射的变量。初始化器用于建立该类的一个实例。\n\
  *   操作数据的方法。在 `Ball` 类中，这些方法是游戏循环方法（`handleInput` 和 `updateDelta`）。\n\n类和对象的概念极其强大，构成了面向对象编程范式的基础。Swift\
  \ 是一种非常灵活的语言，它不强制你使用类。如果你想，你可以仅使用函数和全局变量来编写代码。但由于类是一种非常强大的编程概念，并且在（游戏）行业中广泛使用，本书将尽可能地利用它们。SpriteKit\
  \ 框架在很大程度上建立在面向对象范式之上，许多其他针对游戏开发的库或引擎也是如此。通过学习如何正确使用类，你可以在任何面向对象编程语言中设计出更好的软件。关于类的角色及其与其他编程概念的联系，请参见图\
  \ 7-1。\n\n![A978-1-4842-0650-8_7_Fig1_HTML.gif](img/A978-1-4842-0650-8_7_Fig1_HTML.gif)\n\
  \n图 7-1。\n\n类概念的双重角色 注意\n\n在编写游戏程序时，你经常需要在完成某件事所需的时间和执行的频率之间做出权衡。以 Painter 为例，如果你只打算创建一两个球，那么为球单独创建一个类可能不值得费心。然而，事情通常都是慢慢扩大的。在你意识到之前，你可能就因为当初没有创建一个更简单的方法来一次性完成，而需要复制粘贴几十行代码。在设计类时，请考虑一个合理设计所带来的长期收益，即使这需要一些短期的牺牲，例如需要额外做点编程工作以使类设计更加通用。\n\
  \n\n\n## 编写拥有多个实例的类\n\n作为本章的最后一步，让我们为 Painter 游戏添加几个油漆罐。这些油漆罐应被赋予随机颜色，并从屏幕顶部向下坠落。当它们掉出屏幕底部后，你需要为其分配新颜色并将其移回顶部。对于玩家而言，每次看到的仿佛是不同油漆罐在掉落。实际上，你只需要三个可重复使用的油漆罐对象。在\
  \ `PaintCan` 类中，你定义了油漆罐的属性和行为。然后可以创建该类的多个实例。在 `GameWorld` 类中，你将这三个实例存储在不同的属性中。以下是\
  \ `GameWorld` 中所有存储属性的完整列表：\n\n`var node = SKNode()`\n\n`var background = SKSpriteNode(imageNamed:\
  \ \"spr_background\")`\n\n`var cannon = Cannon()`\n\n`var ball = Ball()`\n\n`var\
  \ can1 = PaintCan(pOffset: -10)`\n\n`var can2 = PaintCan(pOffset: 190)`\n\n`var\
  \ can3 = PaintCan(pOffset: 390)`\n\n在 `GameWorld` 的初始化器中，你通过将所有游戏对象添加到节点来设置游戏世界：\n\
  \n```\ninit() {\n    background.zPosition = 0\n    node.addChild(background)\n \
  \   node.addChild(cannon.node)\n    node.addChild(ball.node)\n    node.addChild(can1.node)\n\
  \    node.addChild(can2.node)\n    node.addChild(can3.node)\n}\n```\n\n`PaintCan`\
  \ 类与 `Ball` 和 `Cannon` 类的一个区别在于，油漆罐拥有不同的位置。这就是为什么在创建油漆罐时，你要将一个坐标值作为参数传入。该值指定了油漆罐所需的\
  \ x 坐标位置。由于油漆罐的 y 坐标会根据其 y 轴速度计算得出，因此无需提供 y 坐标。为了让游戏更有趣，你让油漆罐以不同的随机速度下落。（具体方法将在本章后面解释。）为了计算这个速度，你需要知道油漆罐的最小速度，以确保它不会下落得太慢。为此，你添加了一个存储该数值的属性\
  \ `minVelocity`。因此，`PaintCan` 类拥有以下属性：\n\n`var node = SKNode()`\n\n`var red = SKSpriteNode(imageNamed:\
  \ \"spr_can_red\")`\n\n`var green = SKSpriteNode(imageNamed: \"spr_can_green\")`\n\
  \n`var blue = SKSpriteNode(imageNamed: \"spr_can_blue\")`\n\n`var velocity = CGPoint.zeroPoint`\n\
  \n`var positionOffset = CGFloat(0)`\n\n`var minVelocity = CGFloat(40)`\n\n与炮台和球一样，油漆罐也有特定的颜色。默认情况下，你选择红色油漆罐的精灵图片。初始时，你将油漆罐的\
  \ y 坐标设置为刚好位于屏幕顶部之外，这样在后续游戏中，你就能看到它下落。在 `GameWorld` 初始化器中，你创建了三个 `PaintCan` 对象，每个对象具有不同的\
  \ x 坐标。\n\n由于油漆罐不处理任何输入（只有球和炮台需要处理），因此该类不需要 `handleInput` 方法。然而，油漆罐需要被更新。你需要实现的一个功能是让油漆罐以随机的时刻和速度下落。但这该如何实现呢？\n\
  \n## 处理游戏中的随机性\n\n油漆罐行为中最重要的部分之一，是其某些方面应具有不可预测性。你不希望每个罐子都以可预测的速度或时间下落。你需要增加随机性因素，这样每次玩家开始新游戏时，游戏都会有所不同。当然，你也需要控制好这种随机性。你不希望一个罐子从顶部跌到底部需要三个小时，而另一个罐子只需一毫秒。速度应该是随机的，但必须在一个可玩的范围内。\n\
  \n随机性究竟意味着什么？通常，游戏和其他应用程序中的随机事件或数值由随机数生成器管理。在 Swift 中，有一个名为 `arc4random()` 的函数，每次调用它都会返回一个随机的正整数：\n\
  \n`var i = arc4random()`\n\n`/* i 现在包含一个范围在 0 到 Uint32.max（= 4294967295）之间的随机整数值\
  \ */`\n\n计算机是如何生成完全随机的数字的呢？计算机难道不是一种只能执行由预定指令构成的程序的确定性设备吗？确实，从理论上讲，在游戏世界和计算机程序中，你可以精确预测将要发生的事情，因为计算机只能严格按照你的指令行事。因此，严格来说，计算机无法产生完全随机的数字。一种假装能生成随机数字的方法是从一个预定义的、非常大的数字表中选取一个数字。因为你实际上并没有生成随机数字，所以这被称为伪随机数生成器。有时随机数生成器能生成某个范围内的数字，例如\
  \ 0 到 1 之间，但通常它们也能生成任意数字或其它范围内的数字。该范围内的每个数字都有相同的被生成概率。在统计学中，这种分布称为均匀分布。\n\n假设当你开始一个游戏时，你通过遍历数字表开始生成“随机”数字。由于数字表不变，每次你玩游戏时，都会生成相同的随机数序列。为了避免这个问题，一些随机数生成器允许你在开始时指定想要从表中的不同位置开始。你在表中开始的位置也被称为随机数生成器的种子。通常，你会选择一个每次启动程序时都不同的值作为种子，比如当前系统时间。对于\
  \ `arc4random` 函数，你无需提供种子值，因为该函数会自动为你处理。\n\n如何使用随机数生成器在你的游戏世界中创造随机性呢？假设你希望用户每通过一扇门时，有\
  \ 75% 的概率生成一个敌人。在这种情况下，你生成一个介于 0 和 1 之间的随机数。如果该数字小于等于 0.75，则生成敌人；否则不生成。由于均匀分布，这恰好能实现你所需的行为。以下\
  \ Swift 代码对此进行了说明：\n\n```\nvar spawnEnemyProbability = CGFloat(arc4random()) / CGFloat(UInt32.max)\n\
  if spawnEnemyProbability >= 0.75 {\n    // 生成一个敌人\n} else {\n    // 执行其他操作\n}\n\
  ```\n\n在这个例子中，你首先将随机数转换为浮点值。然后，将其除以一个常量 `UInt32.max`，该常量表示 32 位整数能表示的最大值。因此，`spawnEnemyProbability`\
  \ 的值将始终在 0 到 1 之间。\n\n让我们再看一个例子。假设你想计算一个介于 0.5 和 1 之间的随机速度。为此，你生成一个介于 0 和 1 之间的随机数，将其除以\
  \ 2，再加上 0.5，如下所示：\n\n```\nvar randomNr = CGFloat(arc4random()) / CGFloat(UInt32.max)\n\
  var newSpeed = randomNr / 2 + 0.5\n```\n\n为了使随机数的生成更简单，Painter5 包含了以下函数（定义在 `PaintCan.swift`\
  \ 文件中）：\n\n\n\n`func randomCGFloat() -> CGFloat {`\n\n`return CGFloat(arc4random())\
  \ / CGFloat(UInt32.max)`\n\n`}`\n\n在理解“真正的”随机性方面，人类并不比计算机高明多少。这就是为什么你的 MP3 播放器在随机播放模式下，有时似乎会反复播放同一首歌。你本能地认为自然发生的连续重复是不随机的，但实际上它们是随机的。这意味着程序员有时需要创建一个对人类来说看似随机的函数——尽管它并不是真正随机的。\n\
  \n在游戏中，你必须非常谨慎地处理随机性。一个设计不当的随机单位生成机制，可能会导致某些类型的单位更频繁地出现在特定玩家手中，从而给他们带来不公平的（劣势）优势。此外，在设计游戏时，请确保随机事件不会对游戏结果产生过大影响。例如，不要让玩家在完成你极具挑战性的平台游戏第\
  \ 80 关后，还要掷骰子，并让掷骰子的结果决定玩家是否死亡。\n\n### 计算随机速度和颜色\n\n每当一个油漆罐下落时，你都需要为其生成随机的速度和颜色。你可以使用`arc4random`和自定义的`randomCGFloat`函数来实现这一点。我们先来看看如何创建随机速度。为了设置油漆罐的速度，你需要考虑一个最小速度，这样罐子就不会下落得太慢。为此，你可以使用`minVelocity`属性。这个属性在创建`PaintCan`实例时会赋予一个初始值：\n\
  \n`var minVelocity = CGFloat(40)`\n\n在计算随机速度时，你会用到这个最小速度值，如下所示：\n\n`velocity = CGPoint(x:\
  \ 0.0, y: randomCGFloat() * -40 - minVelocity)`\n\n`x`方向的速度为零，因为油漆罐不会水平移动——它们只会垂直下落。`y`方向的速度通过随机数生成器计算得到。你将这个随机值乘以`-40`，再减去`minVelocity`属性中存储的值，从而得到一个介于`-minVelocity`和`-minVelocity-40`之间的负`y`速度。如果`minVelocity`等于`40`，那么结果将是一个介于`-40`和`-80`之间的`y`速度。\n\
  \n要计算随机颜色，你同样会使用随机数生成器，但你需要在少数几个离散选项（红色、绿色或蓝色）中进行选择。这正是原始`arc4random_uniform`函数的用武之地。该函数允许传入一个可选参数来指定范围：`arc4random_uniform(x)`返回一个介于`0`和`x-1`之间的数字。例如，请看这条指令：\n\
  \n`let randomval = arc4random_uniform(3)`\n\n变量`randomval`现在将包含`0`、`1`或`2`中的一个值。利用一些布尔逻辑，现在就可以很直接地设置油漆罐的颜色了：\n\
  \n`red.hidden = randomval != 0`\n\n`green.hidden = randomval != 1`\n\n`blue.hidden\
  \ = randomval != 2`\n\n既然你已经能够生成随机颜色和速度，那么是时候定义油漆罐的最终行为了。\n\n### 更新油漆罐\n\n`PaintCan`类中的`updateDelta`方法至少应该完成以下工作：\n\
  \n*   如果油漆罐当前尚未下落，则为其设置随机生成的速度和颜色\n*   通过将速度叠加到位置上来更新罐子位置\n*   检查罐子是否已完全落下，并在这种情况下重置它\n\
  \n对于第一个任务，你可以使用一个`if`指令来检查罐子当前是否处于隐藏状态。此外，你还需要为罐子的出现引入一点不可预测性。为了实现这种效果，只有当`randomCGFloat`函数生成的某个随机数小于阈值`0.01`时，你才分配随机的速度和颜色。由于是均匀分布，大约每`100`个随机数中，只有`1`个会小于`0.01`。以下是实现此功能的`if`指令：\n\
  \n```\nif node.hidden {\n    if randomCGFloat() > 0.01 {\n        return\n    }\n\
  \    // 到达此处的代码将仅偶尔执行\n}\n```\n\n除了这个罐子初始化步骤，你还需要通过将当前速度叠加到位置上来更新罐子位置，并像处理球那样考虑经过的游戏时间：\n\
  \n```\nnode.position.x += velocity.x * CGFloat(delta)\nnode.position.y += velocity.y\
  \ * CGFloat(delta)\n```\n\n现在你已经初始化了罐子并更新了它的位置，你需要处理一些特殊情况。对于油漆罐，你必须检查它是否已经落到了游戏世界之外。如果是这样，你需要重置它。好消息是，你已经编写了一个方法来检查某个位置是否在游戏世界之外：`GameWorld`类中的`isOutsideWorld`方法。你现在可以再次使用该方法来检查油漆罐的位置是否在游戏世界之外。如果是这种情况，你需要重置罐子，使其再次被放置在屏幕顶部的上方。为了确保油漆罐在重置前完全离开屏幕，你首先需要计算罐子的顶部位置：\n\
  \n```\nlet top = CGPoint(x: node.position.x, y: node.position.y + red.size.height/2)\n\
  ```\n\n然后，你使用一个`if`指令来检查罐子是否已经落出屏幕。如果是这种情况，你就隐藏该罐子：\n\n```\nif GameScene.world.isOutsideWorld(top)\
  \ {\n    node.hidden = true\n}\n```\n\n最后，为了让游戏更具挑战性，每次执行`updateDelta`方法时，你都稍微增加罐子的最小速度：\n\
  \n```\nminVelocity += 0.02\n```\n\n由于最小速度缓慢增加，游戏会随着时间推移而变得愈发困难。\n\nPainter5 示例的所有代码都可以在本章附带的示例文件夹中找到。图\
  \ 7-2 展示了 Painter5 示例的截图，其中现在有了三个下落的油漆罐。\n\n![A978-1-4842-0650-8_7_Fig2_HTML.jpg](img/A978-1-4842-0650-8_7_Fig2_HTML.jpg)\n\
  \n**图 7-2.**  \nPainter5 示例，含有一个大炮、一个球和三个下落的油漆罐\n\n## 本章所学内容\n\n在本章中，你学习了以下内容：\n\
  \n*   如何在游戏中定义和使用多个类\n*   如何创建类型/类的多个实例\n*   如何向游戏中添加随机性以增加重复可玩性\n\n\n\n"
- "# 颜色与碰撞\n\n**电子补充材料** 本章的在线版本（doi:[10.1007/978-1-4842-0650-8_8](http://dx.doi.org/10.1007/978-1-4842-0650-8_8)）包含补充材料，仅供授权用户使用。\n\
  \n到目前为止，你已经实现了 Painter 游戏的很大一部分。你已经了解了如何通过使用类机制来定义游戏对象类。通过使用类，你可以更好地控制游戏对象的结构以及如何创建特定类型的游戏对象。每个类都在其自己的\
  \ Swift 文件中定义。这样，当你今后开发的某个游戏中需要具有相同行为的大炮或球时，只需复制这些文件并创建这些游戏对象的实例即可。\n\n当你更仔细地查看类的定义时，你会发现类定义了对象的内部结构（它由哪些属性组成），以及以某种方式操作该对象的方法。这些方法有助于更精确地定义对象的可能性和局限性。例如，如果有人想重用\
  \ `Ball` 类，他们不需要了解球结构的很多详细信息。只需创建一个实例并调用游戏循环方法，就足以向游戏中添加一个飞行的球。通常，在设计程序时（无论是游戏还是完全不同类型的应用程序），清晰地定义某个类的对象可以做什么是非常重要的。方法是一种实现方式。本章向你展示另一种定义对象可能性的方式：通过定义计算属性。本章还介绍了用于表示颜色的类型，并展示了如何处理球与颜料罐之间的碰撞（如果发生碰撞，颜料罐需要改变颜色）。\n\
  \n## 表示颜色的另一种方式\n\n在之前版本的 Painter 中，你相当实用地处理了颜色。例如，在 `Cannon` 类中，你通过使用红色、绿色和蓝色大炮精灵的隐藏状态来跟踪当前颜色。你在\
  \ `Ball` 类中也做了类似的事情，只不过你使用的是彩色球精灵而不是大炮颜色指示精灵。例如，以下是根据当前大炮颜色更新球颜色的指令：\n\n```\nred.hidden\
  \ = GameScene.world.cannon.red.hidden\ngreen.hidden = GameScene.world.cannon.green.hidden\n\
  blue.hidden = GameScene.world.cannon.blue.hidden\n```\n\n由于这些指令的工作方式，`Ball` 类需要了解\
  \ `Cannon` 类内部使用的精灵。这很遗憾，因为类本应有助于分离代码，而不是引入依赖关系。另一个问题是，并不容易理解代码的含义。对于一个查看 `Cannon`\
  \ 或 `Ball` 类代码的外部人员来说，这看起来就像是在无缘无故地复制精灵的隐藏状态。当然，你可以为代码添加注释来解释你在做什么，但这并不能解决问题的核心。理想情况下，代码应以一种逻辑性强、几乎能自我解释的方式编写。\n\
  \n如果能够更统一地定义颜色，并在所有游戏对象类中使用该定义来表示不同的颜色，那岂不是更好？当然是这样！现在开始统一游戏中颜色使用的另一个原因是：如果你决定增加游戏中可能的颜色数量（增加到\
  \ 4、6、10 或更多），当前方法的编程时间将会长得多。\n\n属于本章的 Painter6 示例是 Painter 游戏的一个新版本，其中通过使用你之前见过的\
  \ `UIColor` 类型，以不同的方式处理颜色。`UIColor` 有一些有用的类方法可以生成不同的颜色：\n\n```\nlet redColor = UIColor.redColor()\n\
  let greenColor = UIColor.greenColor()\nlet blueColor = UIColor.blueColor()\n```\n\
  \n## 对象的受控数据访问\n\n有三个游戏对象类表示某种颜色的对象：`Cannon`、`Ball` 和 `PaintCan`。为简单起见，让我们从如何修改\
  \ `Cannon` 类以使用上一节中的颜色定义开始。这是 `Cannon` 类中的属性列表：\n\n```\nvar node = SKNode()\nvar\
  \ barrel = SKSpriteNode(imageNamed: \"spr_cannon_barrel\")\nvar red = SKSpriteNode(imageNamed:\
  \ \"spr_cannon_red\")\nvar green = SKSpriteNode(imageNamed: \"spr_cannon_green\"\
  )\nvar blue = SKSpriteNode(imageNamed: \"spr_cannon_blue\")\n```\n\n你可以做的是添加另一个存储属性来表示大炮的当前颜色：\n\
  \n```\nvar color = UIColor.redColor()\n```\n\n如果你想了解大炮的颜色，那么只需检查这个属性的值即可。然而，这并不是一个理想的解决方案。你现在存储了冗余数据，因为颜色信息既由颜色属性表示，也由三个大炮精灵的隐藏状态表示。如果你在颜色发生变化时忘记更改其中一个属性，就可能会引入错误。\n\
  \n另一种解决方案是定义两个方法，允许 `Cannon` 类的用户检索和设置颜色信息。然后你可以保留属性列表不变，但添加读取和写入颜色值的方法。例如，你可以在\
  \ `Cannon` 类中添加以下两个方法：\n\n```\nfunc getColor() -> UIColor {\n    if (!red.hidden)\
  \ {\n        return UIColor.redColor()\n    } else if (!green.hidden) {\n      \
  \  return UIColor.greenColor()\n    } else {\n        return UIColor.blueColor()\n\
  \    }\n}\n\nfunc setColor(col : UIColor) {\n    if col != UIColor.redColor() &&\
  \ col != UIColor.greenColor()\n        && col != UIColor.blueColor() {\n       \
  \ return\n    }\n    red.hidden = col != UIColor.redColor()\n    green.hidden =\
  \ col != UIColor.greenColor()\n    blue.hidden = col != UIColor.blueColor()\n}\n\
  ```\n\n现在 `Cannon` 类的用户无需知道内部你使用精灵隐藏状态来确定大炮的当前颜色。用户只需传递一个颜色定义来读取或写入大炮的颜色：\n\n```\n\
  myCannon.setColor(UIColor.blueColor())\nvar cannonColor = myCannon.getColor()\n\
  ```\n\n请注意，这些方法内部的代码包含一个安全机制。`getColor` 方法永远不会返回除红色、绿色或蓝色之外的颜色。同样，`setColor` 除非传递的参数是红色、绿色或蓝色，否则不会执行任何操作。这是一种很好的方法，因为它提供了某种保障，确保\
  \ `Cannon` 类型的对象将保持一个一致的状态。例如，`setColor` 确保始终有一个精灵没有被隐藏。当然，目前这并不意味着太多，因为 `Cannon`\
  \ 类的用户仍然可以通过直接访问精灵属性来更改隐藏状态。在第 16 章中，你将看到一种保护对象内部数据的方法，使得这种操作不再可能。\n\n有时，读取和写入对象数据的方法被程序员称为\
  \ getter 和 setter。在许多面向对象的编程语言中，方法是访问对象内部数据的唯一方式，因此对于每个需要在类外部访问的属性，程序员都会添加一个 getter\
  \ 和一个 setter。Swift 提供了一个在面向对象编程语言中相对较新的功能：计算属性。计算属性是 getter 和 setter 的替代品。它定义了当你从对象中检索数据时会发生什么，以及当你为对象内的数据赋值时会发生什么。\n\
  \n\n\n### 向类中添加计算属性\n\n在 Swift 中，为类添加计算属性非常容易。例如，你可以添加一个名为 `color` 的计算属性，而不是使用上述两个方法（`getColor`\
  \ 和 `setColor`），具体如下：\n\n```\nvar color: UIColor {\n    get {\n        if (!red.hidden)\
  \ {\n            return UIColor.redColor()\n        } else if (!green.hidden) {\n\
  \            return UIColor.greenColor()\n        } else {\n            return UIColor.blueColor()\n\
  \        }\n    }\n    set(col) {\n        if col != UIColor.redColor() && col !=\
  \ UIColor.greenColor()\n            && col != UIColor.blueColor() {\n          \
  \  return\n        }\n        red.hidden = col != UIColor.redColor()\n        green.hidden\
  \ = col != UIColor.greenColor()\n        blue.hidden = col != UIColor.blueColor()\n\
  \    }\n}\n```\n\n计算属性的定义包含以下几个部分：\n\n- 属性名称（例如 `color`）\n- 属性类型（本例中为 `UIColor`）\n\
  - `get` 部分和/或 `set` 部分\n\n计算属性与存储属性非常相似：它既有名称又有类型。存储属性与计算属性的区别在于，使用计算属性时，你可以控制读取或写入值时的行为。对计算属性\
  \ `color` 的读写操作如下所示：\n\n```\nmyCannon.color = UIColor.redColor()\n\nif myCannon.color\
  \ == UIColor.redColor() {\n    // 执行某些操作\n}\n```\n\n在此代码示例的第一行中，将值（`UIColor.redColor()`）赋给了该属性。这意味着属性\
  \ `set` 部分中的指令将被执行。第二行包含一个 `if` 指令。在该指令的条件中，读取了 `color` 属性的值。`color` 属性的 `get` 部分决定了读取属性时会发生什么。\n\
  \n在 `set` 部分后面，你可以在括号内指定在主体中使用的参数名称（对于 `color` 属性，此参数名为 `col`）。如果省略参数名称，则默认使用名称\
  \ `newValue`：\n\n```\nvar color: UIColor {\nget {\n    ...\n}\nset {\n    if newValue\
  \ != UIColor.redColor() && newValue != UIColor.greenColor() && newValue != UIColor.blueColor()\
  \ {\n        return\n    }\n    red.hidden = newValue != UIColor.redColor()\n  \
  \  green.hidden = newValue != UIColor.greenColor()\n    blue.hidden = newValue !=\
  \ UIColor.blueColor()\n}\n}\n```\n\n并非所有计算属性都必须同时包含 `get` 和 `set` 部分。例如，请看 `Painter6`\
  \ 示例中 `Cannon` 类的以下属性：\n\n```\nvar ballPosition: CGPoint {\n    get {\n        let\
  \ opposite = sin(barrel.zRotation) * barrel.size.width * 0.6\n        let adjacent\
  \ = cos(barrel.zRotation) * barrel.size.width * 0.6\n        return CGPoint(x: node.position.x\
  \ + adjacent, y: node.position.y + opposite)\n    }\n}\n```\n\n此属性根据炮管的方向计算球的位置。它的类型为\
  \ `CGPoint`。在 `Ball` 类中，该属性用于计算球的位置：\n\n`node.position = GameScene.world.cannon.ballPosition`\n\
  \n`ballPosition` 属性没有 `set` 部分。换句话说，这个计算属性是只读的。以下指令会导致编译器报错：\n\n`GameScene.world.cannon.ballPosition\
  \ = CGPoint(x: 0, y: 0)`\n\n根据你的需求，你可以定义只读属性，也可以定义允许读写操作的属性。通过在类中定义有用的属性和方法，游戏代码通常会变得更简短且更易读。在本书中，你将使用存储属性、计算属性和方法来定义对象的行为和数据访问。\n\
  \n## 处理球与罐子之间的碰撞\n\n`Painter6` 示例通过处理球与罐子之间的碰撞来扩展游戏。如果两个物体发生碰撞，你必须在其中一个对象的 `update`\
  \ 方法中处理此次碰撞。在这种情况下，你可以选择在 `Ball` 类或 `PaintCan` 类中处理碰撞。`Painter6` 在 `PaintCan` 类中处理碰撞，因为如果你在\
  \ `Ball` 类中这么做，就需要重复相同的代码三次，每个油漆罐一次。通过在 `PaintCan` 类中处理碰撞，你可以自动获得此行为，因为每个罐子都会自行检查是否与球发生碰撞。\n\
  \n在 `SpriteKit` 框架中检测是否发生碰撞非常简单。作为构建游戏世界基础的 `SKNode` 类，包含了用于计算节点边界框（包围节点的矩形框）的方法和属性。为了表示矩形框，有一个名为\
  \ `CGRect` 的类型。例如，这行代码使用 `frame` 属性计算节点的边界框：\n\n`let boundingBox = node.frame`\n\
  \n不幸的是，`frame` 属性只关注节点本身，而不考虑其子节点。这意味着如果节点包含子节点（例如红色、绿色和蓝色的精灵），在计算边界框时不会考虑这些子节点。这不是你想要的行为。除了\
  \ `frame` 属性，`SKNode` 还有一个名为 `calculateAccumulatedFrame` 的方法，该方法会考虑节点的子节点：\n\n`let\
  \ accumulatedBoundingBox = node.calculateAccumulatedFrame()`\n\n`CGRect` 类型有一个名为\
  \ `intersects` 的方法，用于指示两个矩形是否相交。你可以在 `PaintCan` 类中使用该方法来判断油漆罐是否与球发生碰撞，如下所示：\n\n\
  ```\nlet paintCanBox = node.calculateAccumulatedFrame()\nlet ballBox = GameScene.world.ball.node.calculateAccumulatedFrame()\n\
  \nif paintCanBox.intersects(ballBox) {\n    // 处理碰撞\n}\n```\n\n如果球与罐子之间发生碰撞，你需要将罐子的颜色更改为球的颜色。接着，你必须重置球，以便可以再次射击。以下两条指令正好实现了这一点：\n\
  \n`color = GameScene.world.ball.color`\n\n`GameScene.world.ball.reset()`\n\n在 `Ball`\
  \ 类的 `reset` 方法中，你隐藏了球并重置了 `readyToShoot` 变量，以便玩家可以再次射击球：\n\n```\nfunc reset() {\n\
  \    node.hidden = true\n    readyToShoot = false\n}\n```\n\n你可以尝试运行 `Painter6`\
  \ 示例，看看球与油漆罐之间的碰撞是否得到了正确处理。\n\n你可能已经注意到，这里使用的碰撞检测方法并不十分精确。在第 13 章中，你将看到一种更好的处理碰撞的方法，该方法直接使用精灵的形状，不过如果你不加注意，这可能会使你的游戏运行得更慢。\n\
  \n**注意**\n\n最终，像本节所编写的这样简单的代码行，对玩家体验的影响却至关重要。在构建游戏应用程序时，你会发现，有时对玩家来说最微不足道的小事，编程时却耗时最长；而最大的改变，可能仅需一两行代码就能实现！\n\
  \n\n\n## 结构体\n\n在上一节中，你了解到变量和常量是根据其类型按值或按引用传递的。诸如 `Int` 或 `Bool` 这类按值传递的类型在 Swift\
  \ 中也被称为结构体。与结构体相反，以类为类型的变量是按引用传递的。\n\n按值传递的结构体通常用于更基础类型的对象。例如，`CGPoint` 类型是一个结构体，`UIColor`\
  \ 类型也是如此。考虑下面的变量声明和初始化：\n\n`var position = CGPoint()`\n\n在图 8-6 中，你可以看到内存的状态。请注意，`position`\
  \ 变量不是一个引用，而是一个值。这意味着下面的指令会完整地复制一份 `CGPoint` 对象，如图 8-7 所示：\n\n![A978-1-4842-0650-8_8_Fig7_HTML.gif](img/A978-1-4842-0650-8_8_Fig7_HTML.gif)\n\
  图 8-7. 两个结构体变量——一个是另一个的副本\n\n![A978-1-4842-0650-8_8_Fig6_HTML.gif](img/A978-1-4842-0650-8_8_Fig6_HTML.gif)\n\
  图 8-6. 一个结构体变量\n\n`var position2 = position`\n\n一般来说，类在内存中的表示可能相当复杂。它们可以包含其他类或结构体的属性。这些类型中的任何一个又可能由其他属性组成，以此类推。\n\
  \n图 8-8 展示了当你创建一个 `Cannon` 对象的新实例时，内存可能的样子。你可以看到一个 `Cannon` 实例中包含的各种对象。每个对象由其他对象组成。例如，`node`\
  \ 引用的 `SKNode` 对象有一个 `CGPoint` 结构体来表示位置，一个布尔值指示节点是否隐藏，一个指向其父节点的链接，它的 z 位置等等。在某些情况下，引用会指向同一个对象，就像\
  \ `parent`（红色显示）和 `node` 的情况一样。当你创建自己的类时，绘制此类图表有时会很有帮助，以便了解哪个对象属于哪里，以及这些对象的引用存储在哪里。\n\
  \n![A978-1-4842-0650-8_8_Fig8_HTML.gif](img/A978-1-4842-0650-8_8_Fig8_HTML.gif)\n\
  图 8-8. 表示 `Cannon` 对象的内存结构示意图\n\n就像你可以创建自己的类一样，你也可以创建自己的结构体。例如，你可以定义一个表示人的结构体，包含姓名和年龄，如下所示：\n\
  \n```\nstruct Person {\n    var name: String = \"\"\n    var age: Int = 0\n}\n```\n\
  \n## 你学到的内容\n\n在本章中，你已经学到了以下内容：\n\n- 如何向类中添加属性\n- 如何处理游戏对象之间的基本碰撞\n- 如何定义具有不同颜色的游戏对象\n\
  - 值与引用之间的区别\n\n"
- "# 9. 有限的生命\n\n电子补充材料 本章的在线版本 (doi:[10.1007/978-1-4842-0650-8_9](http://dx.doi.org/10.1007/978-1-4842-0650-8_9))\
  \ 包含补充材料，仅供授权用户使用。\n\n在本章中，你将通过给予玩家有限次数的生命，让 Painter 游戏变得更加有趣。如果玩家错过了太多油漆罐，游戏就结束了。本章将讨论如何处理这种情况，以及如何向玩家显示当前剩余的生命数。为了做到后者，你将学习几种重复执行一组指令的编程结构。\n\
  \n## 维护生命数量\n\n为了引入一些危险元素并激励玩家在游戏中努力表现，你需要限制玩家允许错误颜色的油漆罐掉落到屏幕底部的数量。Painter7 示例向游戏添加了这种机制，并使用了五次的上限。\n\
  \n选择五次上限是你作为游戏设计师和开发者必须做出的众多决策之一。如果你只给玩家一条命，游戏会变得太难。而给玩家上百条命，则会消除玩家好好表现的动机。确定这类参数通常通过游戏测试并确定合理的参数值来实现。除了自己测试游戏外，你还可以请朋友或家人试玩，以便对这些参数选择什么值有所了解。\n\
  \n为了存储生命上限，你在 `GameWorld` 类中添加了一个额外的（存储型）属性：\n\n`var lives = 5`\n\n当你在类中声明该属性时，初始将其设置为\
  \ 5。现在，每当油漆罐掉出屏幕时，你就可以更新这个值。你在 `PaintCan` 类的 `updateDelta` 方法中执行此检查。因此，你需要在那个方法中添加一些指令来处理这个问题。你需要做的只是检查当油漆罐掉出屏幕底部时，其颜色是否与目标颜色相同。如果不是，你必须减少\
  \ `GameWorld` 类中的 `lives` 计数器。\n\n在执行此操作之前，你必须扩展 `PaintCan` 类，以便 `PaintCan` 对象知道它们需要有一个目标颜色，以便在掉出屏幕底部时使用。Painter7\
  \ 在 `GameWorld` 中创建 `PaintCan` 对象时，将此目标颜色作为参数传递：\n\n`var can1 = PaintCan(positionOffset:\
  \ -10, targetColor: UIColor.redColor())`\n`var can2 = PaintCan(positionOffset: 190,\
  \ targetColor: UIColor.greenColor())`\n`var can3 = PaintCan(positionOffset: 390,\
  \ targetColor: UIColor.blueColor())`\n\n你将目标颜色存储在每个油漆罐的变量中，如你在 `PaintCan` 的初始化器中看到的那样：\n\
  \n```\ninit(positionOffset: CGFloat, targetColor: UIColor) {\n    self.positionOffset\
  \ = positionOffset\n    self.targetColor = targetColor\n    node.zPosition = 1\n\
  \    node.addChild(red)\n    node.addChild(green)\n    node.addChild(blue)\n   \
  \ node.hidden = true\n}\n```\n\n你现在扩展 `PaintCan` 的 `updateDelta` 方法，使其处理油漆罐掉出屏幕底部的情况。如果发生这种情况，你需要将油漆罐移回屏幕顶部。如果油漆罐的当前颜色与目标颜色不匹配，你将生命数量减一：\n\
  \n```\nlet top = CGPoint(x: node.position.x, y: node.position.y + red.size.height/2)\n\
  if GameScene.world.isOutsideWorld(top) {\n    if color != targetColor {\n      \
  \  GameScene.world.lives = GameScene.world.lives - 1\n    }\n    node.hidden = true\n\
  }\n```\n\n你可能希望在某些情况下减少多于一条生命。为了方便实现这一点，你可以将惩罚值改为一个变量：\n\n```\nlet penalty = 1\n\
  if GameScene.world.isOutsideWorld(top) {\n    if color != targetColor {\n      \
  \  GameScene.world.lives = GameScene.world.lives - penalty\n    }\n    node.hidden\
  \ = true\n}\n```\n\n这样，你可以在需要时引入更严厉的惩罚，或者动态惩罚（第一次失误扣除一条命，第二次失误扣除两条命，以此类推）。你还可以引入一种特殊的油漆罐；如果玩家用正确颜色的球击中这个罐子，那么因油漆罐颜色不匹配而产生的惩罚会暂时清零。你能想到在\
  \ Painter 游戏中处理惩罚的其他方法吗？\n\n\n\n### 向玩家显示剩余生命数\n\n显然，玩家想知道自己的游戏状态。因此，你需要在屏幕上以某种方式指示玩家还剩多少条命。在《画家》游戏中，这是通过在屏幕左上角显示多个气球来实现的。利用你已有的知识，最初你可以添加五个气球进行绘制：\n\
  \n```\nvar livesNode = SKNode()\nlet livesSpr1 = SKSpriteNode(imageNamed: \"spr_lives\"\
  )\nlivesSpr1.position = CGPoint(x: 0, y: 0)\nlivesNode.addChild(livesSpr1)\nlet\
  \ livesSpr2 = SKSpriteNode(imageNamed: \"spr_lives\")\nlivesSpr2.position = CGPoint(x:\
  \ Int(livesSpr2.size.width), y: 0)\nlivesNode.addChild(livesSpr2)\nlet livesSpr3\
  \ = SKSpriteNode(imageNamed: \"spr_lives\")\nlivesSpr3.position = CGPoint(x: 2 *\
  \ Int(livesSpr3.size.width), y: 0)\nlivesNode.addChild(livesSpr3)\nlet livesSpr4\
  \ = SKSpriteNode(imageNamed: \"spr_lives\")\nlivesSpr4.position = CGPoint(x: 3 *\
  \ Int(livesSpr4.size.width), y: 0)\nlivesNode.addChild(livesSpr4)\nlet livesSpr5\
  \ = SKSpriteNode(imageNamed: \"spr_lives\")\nlivesSpr5.position = CGPoint(x: 4 *\
  \ Int(livesSpr5.size.width), y: 0)\nlivesNode.addChild(livesSpr5)\n```\n\n通过将精灵的宽度乘以一个数字并以此作为精灵的\
  \ x 坐标位置，你最终得到了五个并排绘制的精灵。现在，你可以在 update 方法中添加几行代码来更改这些精灵的隐藏状态，从而正确显示生命数：\n\n```\n\
  livesSpr5.hidden = lives > 4\nlivesSpr4.hidden = lives > 3\nlivesSpr3.hidden = lives\
  \ > 2\nlivesSpr2.hidden = lives > 1\nlivesSpr1.hidden = lives > 0\n```\n\n虽然这样可行，但这并不是一个很好的解决方案。你多次编写了相似的指令。如果决定让玩家初始拥有十条命而不是五条，会发生什么？你需要编写两倍于此的代码。而且，如果你决定让最大生命数完全动态化，例如让玩家可以赢得额外生命，这个解决方案就完全行不通了。幸运的是，有一种更好的方法：迭代。\n\
  \n## 多次执行指令\n\nSwift 中的迭代是一种重复执行指令多次的方法。请看下面的代码片段：\n\n```\nvar x = 10\nwhile x >=\
  \ 3 {\n    x = x – 3\n}\n```\n\n第二条指令被称为 `while` 循环。这条指令由一个类似头部的部分（`while x >= 3`）和一个用花括号括起来的循环体（`x\
  \ = x - 3`）组成，这与 `if` 指令的结构非常相似。头部由关键字 `while` 后跟一个条件组成。循环体本身是一条指令。在本例中，该指令从一个变量中减去\
  \ 3。然而，它也可以是其他类型的指令，例如调用方法或访问属性。图 9-1 展示了 `while` 指令的语法图。\n\n![A978-1-4842-0650-8_9_Fig1_HTML.gif](img/A978-1-4842-0650-8_9_Fig1_HTML.gif)\n\
  \n图 9-1. `while` 指令的语法图\n\n当执行 `while` 指令时，其循环体会被执行多次。实际上，只要头部中的条件结果为 `true`，循环体就会被执行。在这个例子中，条件是变量\
  \ `x` 包含的值大于或等于 3。开始时，该变量包含值 10，因此它肯定大于 3。于是，`while` 指令的循环体被执行，之后变量 `x` 包含值 7。然后再次评估条件。变量仍然大于\
  \ 3，因此循环体再次被执行，之后变量 `x` 包含值 4。再次，该值大于 3，所以循环体又被执行一次，`x` 将包含值 1。此时，条件被评估，但不再是 `true`。因此，重复指令结束。所以，在这段代码执行后，变量\
  \ `x` 包含值 1。实际上，你在这里使用 `while` 指令实现的是整数取余运算。当然，在这种情况下，简单地使用下面这行代码就能达到相同效果，并且更简单：\n\
  \n```\nvar x = 10 % 3\n```\n\n如果你想在屏幕上绘制玩家的生命数，你可以使用 `while` 指令来更高效地创建生命精灵：\n\n\
  ```\nvar livesNode = SKNode()\nvar index = 0\nwhile index < lives {\n    let livesSpr\
  \ = SKSpriteNode(imageNamed: \"spr_lives\")\n    livesSpr.position = CGPoint(x:\
  \ index * Int(livesSpr.size.width), y: 0)\n    livesNode.addChild(livesSpr)\n  \
  \  index = index + 1\n}\n```\n\n在这个 `while` 指令中，只要变量 `index` 包含的值小于 `lives`（这是一个假设在其他地方已声明并初始化为特定值的变量），循环体就会被执行。每次执行循环体时，你都会在游戏世界的某个位置添加一个精灵，然后将\
  \ `index` 递增 1。结果是你恰好创建了 `lives` 次精灵对象！因此，你在这里将变量 `index` 用作计数器。\n\n**注意：** 你从 `index`\
  \ 等于 0 开始，一直持续到 `index` 达到与 `lives` 相同的值。这意味着对于 `index` 的 0、1、2、3、4 这些值，`while`\
  \ 指令的循环体会被执行。因此，循环体被执行了五次。\n\n正如你在本例中所看到的，`while` 指令的循环体可能包含不止一条指令。\n\n绘制精灵的位置取决于\
  \ `index` 的值。这样，你可以将每个精灵绘制得稍微靠右一点，从而使它们整齐地排列成一行。第一次执行循环体时，你会在 x 坐标为 0 的位置绘制精灵，因为\
  \ `index` 是 0。下一次迭代，你在 x 坐标为 `livesSpr.size.width` 的位置绘制精灵，再下一次则在 `2 * livesSpr.size.width`\
  \ 的位置，依此类推。在这种情况下，你不仅使用计数器来确定指令的执行次数，还用它来改变指令所做的事情。这是迭代指令（如 `while`）一个非常强大的特性。由于它的循环行为，`while`\
  \ 指令也被称为 `while` 循环。图 9-2 展示了《画家》游戏在屏幕左上角显示生命数的效果。\n\n![A978-1-4842-0650-8_9_Fig2_HTML.jpg](img/A978-1-4842-0650-8_9_Fig2_HTML.jpg)\n\
  \n图 9-2. 《画家》游戏向玩家显示剩余的生命数\n\n## 递增计数器的简写符号\n\n许多 `while` 指令，尤其是那些使用计数器的指令，其循环体中都包含一条递增变量的指令。这可以通过以下指令完成：\n\
  \n```\ni = i + 1\n```\n\n顺便提一下，正因为这种指令的存在，将赋值表述为“等于”是不明智的。变量 `i` 的值当然永远不可能等于 `i\
  \ + 1`，但是 `i` 的值变成了 `i` 的旧值加 1。这类指令在程序中非常常见，因此存在一种特殊的简写符号，可以完成完全相同的操作：\n\n```\n\
  i++\n```\n\n`++` 可以理解为“自增”。因为这个运算符放在它所操作的变量之后，所以 `++` 运算符被称为后缀运算符。要将一个变量增加大于 1 的值，还有另一种符号：\n\
  \n```\ni += 2\n```\n\n其含义与以下相同：\n\n```\ni = i + 2\n```\n\n其他基本算术运算也有类似的符号：\n\n```\n\
  i -= 12          // 等同于 i = i – 12\ni *= 0.99        // 等同于 i = i * 0.99\ni /= 5\
  \           // 等同于 i = i / 5\ni--              // 等同于 i = i – 1\n```\n\n这种符号非常有用，因为它允许你编写更短的代码。例如，\n\
  \n```\nlives = lives – penalty\n```\n\n变为\n\n```\nlives -= penalty\n```\n\n如果你查看本书这一章及后续章节附带的示例代码，你会发现许多不同的类都使用了这种简写符号，以使代码更加紧凑。\n\
  \n\n\n## 更紧凑的循环语法\n\n许多 `while` 指令都使用计数变量，因此具有以下结构：\n\n```\nvar i = 起始值\nwhile i\
  \ < 结束值 {\n    // 使用 i 做一些有用的事情\n    i++\n}\n```\n\n由于这种指令相当常见，因此有一种更简洁的表示法：\n\n\
  ```\nfor var i = 起始值; i < 结束值; i++ {\n    // 使用 i 做一些有用的事情\n}\n```\n\n这条指令的含义与之前的\
  \ `while` 指令完全相同。在这种情况下使用 `for` 指令的好处是，所有与计数器相关的内容都整齐地组合在指令的头部。这降低了忘记编写计数器递增指令（导致无限循环）的可能性。在“使用\
  \ `i` 做一些有用的事情”只包含一条指令的情况下，可以省略大括号，这使得表示法更加紧凑。此外，还可以将变量 `i` 的声明移到 `for` 指令的头部。例如，请看以下代码片段：\n\
  \n```\nfor var index = 0; index < lives; index++ {\n    let livesSpr = SKSpriteNode(imageNamed:\
  \ \"spr_lives\")\n    livesSpr.position = CGPoint(x: index * Int(livesSpr.size.width),\
  \ y: 0)\n    livesNode.addChild(livesSpr)\n}\n```\n\n这是一个非常紧凑的指令，它递增计数器并将精灵添加到不同位置。该指令等价于本章前面展示的\
  \ `while` 指令。\n\n另一个例子：\n\n```\nfor var index = 0; index < livesNode.children.count;\
  \ index++ {\n    var livesSpr = livesNode.children[index] as SKNode\n    livesSpr.hidden\
  \ = lives <= index\n}\n```\n\n在不完全理解循环体作用的情况下，你能（作为练习）将这个 `for` 指令重写为等价的 `while`\
  \ 指令吗？\n\n如果你更仔细地观察这个 `for` 指令的功能，你会发现它将计数器 `index` 从零递增到 `livesNode.children.count`。后一个表达式表示节点\
  \ `livesNode` 的子节点数量。在 `for` 循环内部，有两条指令。第一条指令从节点中检索特定的子对象。这条指令涉及一个称为数组的概念。在第 12\
  \ 章中，你将了解更多关于数组的知识。无需深入细节，你可以假设这条指令使用计数器 `index` 的值从 `livesNode` 节点中检索一个子节点。结果是，`for`\
  \ 循环逐个检索 `livesNode` 的所有子节点。循环体中的第二条指令设置所检索节点的隐藏状态。换句话说，这个 `for` 循环替代了 `GameWorld`\
  \ 的 `update` 方法中的以下指令：\n\n```\nlivesSpr5.hidden = lives <= 4\nlivesSpr4.hidden =\
  \ lives <= 3\nlivesSpr3.hidden = lives <= 2\nlivesSpr2.hidden = lives <= 1\nlivesSpr1.hidden\
  \ = lives <= 0\n```\n\n使用 `for` 循环的新解决方案有一个很好的特性，即现在改变程序中的最大生命数非常容易。你只需修改 `GameWorld`\
  \ 类中 `lives` 变量的值即可！代码的其余部分独立于为 `lives` 选择的初始值运行。以易于修改的方式设计代码是一个好主意。这只是一个简单示例，说明如何做到这一点。好处不仅是代码更容易修改，而且也更加健壮。初始生命数在一个地方设置，而不是多个地方。因此，当你改变生命数时引入错误的可能性要小得多。\n\
  \n`while` 或 `for` 循环中的条件不一定非要是与计数器相关的。例如：\n\n```\nfor var nr = 8; !isPrimeNumber(nr);\
  \ nr++ {\n    print(nr)\n}\n```\n\n这个 `for` 循环打印所有大于等于 8 的数，直到遇到下一个质数（即 11）。因此，这段代码的输出是：\n\
  \n```\n8\n9\n10\n```\n\n由于在许多情况下你确实需要一个计数器，Swift 还提供了一种更短的语法来处理计数器。请看以下示例：\n\n```\n\
  for index in 0...9 {\n    // 做某事\n}\n```\n\n这个 `for` 循环等价于：\n\n```\nfor var index\
  \ = 0; index <= 9; index++ {\n    // 做某事\n}\n```\n\n你也可以定义一个排除最后一个值的范围，如下所示：\n\n\
  ```\nfor index in 0..<5 {\n    // index 将依次取值 0, 1, 2, 3, 4\n}\n```\n\n这等价于：\n\n\
  ```\nfor var index = 0; index < 5; index++ {\n    // 做某事\n}\n```\n\n范围表示法用于递增计数器的一个优点是，它与对列表中的对象执行某些任务等操作配合得很好。也可以使用变量名而不是常量来确定范围：\n\
  \n```\nfor index in 0..<lives {\n    let livesSpr = SKSpriteNode(imageNamed: \"\
  spr_lives\")\n    livesSpr.position = CGPoint(x: index * Int(livesSpr.size.width),\
  \ y: 0)\n    livesNode.addChild(livesSpr)\n}\n```\n\n如果你只是想重复执行一段代码块若干次，而不需要计数器，那么可以省略变量名，并用下划线替换。例如，以下代码会在屏幕上打印十次\"\
  Hello!\"：\n\n```\nfor _ in 1...10 {\n    print(\"Hello!\")\n}\n```\n\n在 `for` 循环中使用范围有一个限制：范围的起始值必须小于结束值。换句话说，以下写法是不允许的：\n\
  \n```\nfor index in 3...1 {\n    // 做某事\n}\n```\n\n当你在代码中写下这样的指令时，Xcode 编译器不会产生编译错误。相反，当你运行程序时，会生成一个运行时错误，立即停止程序。编译器未检测到此问题的原因是，范围也可以通过变量表达式来定义。因此，语法上无法定义这个约束。图\
  \ 9-3 包含了 `for` 指令的语法图。如你所见，它包含了范围表示法和完整表示法的语法。\n\n![A978-1-4842-0650-8_9_Fig3_HTML.gif](img/A978-1-4842-0650-8_9_Fig3_HTML.gif)\n\
  \n**图 9-3.** `for` 指令的语法图\n\n## 几个特殊情况\n\n在处理 `while` 和 `for` 循环时，有几个特殊情况需要了解。以下小节将讨论这些情况。\n\
  \n### 完全不执行\n\n有时 `while` 指令头部的条件在开始时就已经是 `false`。请看以下代码片段：\n\n```\nvar x = 1\n\
  var y = 0\nwhile x < y {\n    x++\n}\n```\n\n在这种情况下，`while` 指令的循环体根本不会执行——一次也不会！因此，在此例中，变量\
  \ `x` 保持值 1 不变。\n\n\n\n### 无限循环\n\n使用`while`指令（以及较小程度上的`for`指令）的一个危险之处在于，如果你不小心，它们可能永远不会结束。你很容易写出这样的指令：\n\
  \n```\nwhile 1 + 1 == 2 {\n    x = x + 1\n}\n```\n\n在这个例子中，变量`x`的值会无限递增。这是因为无论指令体内部执行什么操作，条件`1\
  \ + 1 == 2`总是返回`true`。这个例子很容易避免，但通常`while`指令会因编程错误而陷入无限循环。请看下面的例子：\n\n```\nvar x\
  \ = 1\nvar n = 0\nwhile n < 10 {\n    x = x * 2\n}\n```\n\n这段代码的本意是将`x`的值翻倍十次。但不幸的是，程序员忘记了在`while`指令体中递增计数器。结果，`n`的值永远不会大于或等于十，因此`while`循环体被无限重复执行。程序员实际想写的是：\n\
  \n```\nvar x = 1\nvar n = 0\nwhile n < 10 {\n    x = x * 2\n    n++\n}\n```\n\n\
  如果你的电脑或移动设备因为你在`while`指令体中忘记递增计数器而陷入“昏迷”状态，最后不得不扔掉它，那将是一件很遗憾的事。幸运的是，大多数设备（包括 Mac、iPad\
  \ 和 iPhone）的操作系统即使程序尚未完成，也能强制停止其执行。一旦停止，你就可以开始查找程序卡死的原因。虽然程序中偶尔会出现此类卡死现象，但作为游戏程序员，你的职责是确保游戏公开发布时，这些编程错误已从游戏代码中移除。这就是充分测试如此重要的原因。\n\
  \n通常，如果你编写的程序启动后似乎没有任何反应，或者无限期卡死，请检查`while`指令中发生了什么。一个非常常见的错误是忘记递增计数器变量，导致`while`指令的条件永远不会变成`false`，从而无限循环下去。许多其他编程错误也可能导致无限循环。事实上，无限循环非常常见，以至于加利福尼亚州库比蒂诺市的一条街道就以它们命名——而苹果公司总部就坐落在这条街上！\n\
  \n### 嵌套循环\n\n`while`指令或`for`指令的体是一个由花括号定界的指令块。在块内部，你可以编写任何类型的指令：赋值语句、方法调用，或者另一个`while`或`for`循环。例如：\n\
  \n```\nfor y in 0...5 {\n    for x in 0...y {\n        let livesSpr = SKSpriteNode(imageNamed:\
  \ \"spr_lives\")\n        livesSpr.position = CGPoint(x: x * Int(livesSpr.size.width),\n\
  \            y: y * -Int(livesSpr.size.height))\n        livesNode.addChild(livesSpr)\n\
  \    }\n}\n```\n\n在这个片段中，变量`y`从 0 计数到 5。对于每个`y`值，其循环体（包含一个`for`指令）都会被执行。这第二个`for`指令使用计数器`x`，其上限是`y`的值。因此，随着外层`for`指令的每次推进，内层`for`指令执行的时间会更长。被重复执行的指令会在由`x`和`y`计数器值计算出的位置放置一个黄色气球精灵。这个循环的结果是许多气球被放置成三角形（见图\
  \ 9-4）。\n\n![A978-1-4842-0650-8_9_Fig4_HTML.jpg](img/A978-1-4842-0650-8_9_Fig4_HTML.jpg)\n\
  \n图 9-4. 呈三角形排列的气球\n\n## 重新开始游戏\n\n当玩家失去所有生命时，游戏结束。你如何处理这种情况？在 Painter 游戏中，你希望显示一个游戏结束画面。玩家可以点击屏幕，然后游戏将重新开始。为了在游戏中实现这一点，你需要在游戏启动时加载一个代表游戏结束画面的额外精灵。你将此精灵作为`GameWorld`类的一个属性存储：\n\
  \n```\nvar gameover = SKSpriteNode(imageNamed: \"spr_gameover\")\n```\n\n在`GameWorld`的初始化方法中，你将此精灵添加到代表游戏世界的主节点上。其次，你为这个精灵分配一个更高的\
  \ z 轴位置，以便它会被绘制在所有其他内容之上。最后，你设置精灵的隐藏标志，使其暂时不对玩家显示：\n\n```\nnode.addChild(gameover)\n\
  gameover.zPosition = 2\ngameover.hidden = true\n```\n\n现在，你可以在每个游戏循环方法中使用`if`指令来决定该做什么。如果游戏结束，你不想让大炮和球再处理输入；你只想检查玩家是否点击了屏幕。如果发生了点击，你就重置游戏。因此，`GameWorld`类中的`handleInput`方法现在包含以下指令：\n\
  \n```\nif (lives > 0) {\n    cannon.handleInput(inputHelper)\n    ball.handleInput(inputHelper)\n\
  } else if (inputHelper.hasTapped) {\n    reset()\n}\n```\n\n你向`GameWorld`类添加一个`reset`方法，以便将游戏重置到初始状态。这意味着重置所有游戏对象。你还需要将生命数量重置为五。以下是`GameWorld`中完整的`reset`方法：\n\
  \n```\nfunc reset() {\n    lives = 5\n    cannon.reset()\n    ball.reset()\n   \
  \ can1.reset()\n    can2.reset()\n    can3.reset()\n}\n```\n\n对于`updateDelta`方法，你只需要在游戏未结束时更新游戏对象。因此，你首先用一个`if`指令检查是否需要更新游戏对象。如果不需要（换句话说，生命数量已降至零），你就从该方法返回，如下所示：\n\
  \n```\nif (lives <= 0) {\n    return\n}\n// 因为你知道玩家还活着，所以可以在这里更新游戏对象\n```\n\n**注意：**\
  \ 检查生命数量是否小于或等于零。是否存在生命数量小于零的情况？这很可能非常罕见，但有可能在一个游戏循环迭代中，两罐油漆同时掉落出屏幕，导致生命数量被减两次。如果当时生命数量是\
  \ 1，那么新的生命数量就是 -1。\n\n只有在玩家不再存活时，才应显示游戏结束覆盖层，因此在`updateDelta`方法中，作为第一条指令，你需要相应地设置\
  \ game over 精灵的`hidden`状态：\n\n```\ngameover.hidden = lives > 0\n```\n\n换句话说，只要玩家的生命数量大于零，该精灵就保持隐藏状态。图\
  \ 9-5 显示了绘制在游戏世界顶部的游戏结束覆盖层。\n\n![A978-1-4842-0650-8_9_Fig5_HTML.jpg](img/A978-1-4842-0650-8_9_Fig5_HTML.jpg)\n\
  \n图 9-5. 游戏结束！\n\n在图 9-5 中，请注意游戏结束覆盖层并没有完全隐藏其他对象和背景。原因是游戏结束精灵有一些透明像素。通常，精灵带有透明部分，以便它们看起来像是游戏世界的一个组成部分。气球、球、油漆罐和大炮管都有部分是透明的，这就是它们能无缝融入游戏世界的原因。在设计精灵时，你需要确保图像正确设置了这些透明度值。虽然正确完成这一点可能需要大量工作，但像\
  \ Adobe Photoshop 这样的现代图像编辑工具为你提供了许多定义图像透明度的方法。只需确保将图像保存为支持透明度的格式，例如 PNG。\n\n**注意：**\
  \ 你可以利用覆盖层的（不）透明度来控制玩家看到的内容。在某些情况下，你可能希望某些东西被遮挡（例如，在时间敏感的游戏中显示“暂停”画面）或者能够被看到（例如\
  \ Painter 游戏中的游戏结束画面）。\n\n\n\n## 本章小结\n\n在本章中，你已经学习了以下内容：\n- 如何存储并显示玩家的当前生命数\n-\
  \ 如何使用 `while` 或 `for` 指令重复执行一组指令\n- 如何在玩家生命值归零时重启游戏\n\n"
- "# 第 10 章 组织游戏对象\n\n电子补充材料 本章在线版本（doi:[10.1007/978-1-4842-0650-8_10](http://dx.doi.org/10.1007/978-1-4842-0650-8_10)）包含补充材料，仅供授权用户使用。\n\
  \n在前几章中，你已经了解了如何使用类来组合相关的变量。本章将探讨不同类型游戏对象之间的相似性，以及如何在 Swift 中表达这些相似性。\n\n## 游戏对象间的相似性\n\
  \n观察 Painter 游戏中的不同游戏对象，你会发现它们有很多共同点。例如，球、大炮和颜料罐都使用了三个精灵来分别表示三种不同颜色。此外，游戏中大多数物体都具有速度属性。而且，部分游戏对象具有处理输入的方法，部分具有\
  \ `updateDelta` 方法，还有一些具有 `reset` 方法。这些类之间存在相似性本身并不是问题——编译器或游戏玩家不会因此抱怨。但令人困扰的是，你不得不反复复制同样的代码。举例来说，`Cannon`、`Ball`\
  \ 和 `PaintCan` 类都包含以下名为 `color` 的计算属性：\n\n```\nvar color: UIColor {\n    get {\n\
  \        if (!red.hidden) {\n            return UIColor.redColor()\n        } else\
  \ if (!green.hidden) {\n            return UIColor.greenColor()\n        } else\
  \ {\n            return UIColor.blueColor()\n        }\n    }\n    set(col) {\n\
  \        if col != UIColor.redColor() && col != UIColor.greenColor()\n         \
  \   && col != UIColor.blueColor() {\n                return\n        }\n       \
  \ red.hidden = col != UIColor.redColor()\n        green.hidden = col != UIColor.greenColor()\n\
  \        blue.hidden = col != UIColor.blueColor()\n    }\n}\n```\n\n这段代码完全相同，但你必须在三个类中分别复制它。每次你想添加一种不同颜色的游戏对象时，很可能都需要再次复制这个属性。如果只是为单个属性这样做，问题还不算太大。但\
  \ Painter 游戏中的类之间还存在更多相似性。例如，Painter 游戏中多数游戏对象类都拥有相同的存储属性：`velocity`、`red`、`green`\
  \ 和 `blue`。\n\n总的来说，最好避免大量复制代码。原因何在？因为如果某天你发现这部分代码存在错误，就必须在每一个复制过它的地方进行修正。对于 Painter\
  \ 这样的小型游戏，这还算不上大问题。但当你开发一个包含数百个不同游戏对象类的商业游戏时，这将演变成一个严重的维护难题。而且，你永远不知道一个简单小游戏会发展到什么规模。如果不加注意，最终可能会复制大量代码（以及随之而来的错误）。随着游戏不断成熟，留意何处可以优化代码是个好习惯——即使这意味着需要额外工作来发现这些重复代码并进行整合。针对当前情况，你需要思考不同类型的游戏对象之间有何相似之处，以及是否能够像在前几章中整合属性那样，将这些相似性整合起来。\n\
  \n从概念上讲，很容易说出球、颜料罐和大炮之间的共同点：它们都是游戏对象。基本上，它们都位于某个位置，都具有速度（大炮也有速度，只不过速度为零），并且都具有红色、绿色或蓝色中的一种颜色。此外，它们大多能处理某种输入并执行更新操作。\n\
  \n## 继承\n\n在 Swift 中，你可以将这些相似性组合到一个通用类中，然后定义其他类作为这个通用类的特殊版本。在面向对象术语中，这被称为继承，它是一种非常强大的语言特性。请看以下示例：\n\
  \n```\nclass Vehicle {\n    var numberOfWheels = 4\n    var brand = \"\"\n    func\
  \ what() -> String {\n        return \"nrOfWheels = \\(numberOfWheels), brand =\
  \ \\(brand)\"\n    }\n}\n```\n\n这里有一个非常简单的类示例，用于表示交通工具（可以想象，这可能对交通模拟游戏很有用）。为简单起见，交通工具由轮子数量和品牌来定义。`Vehicle`\
  \ 类还有一个名为 `what` 的方法，该方法返回一个描述交通工具的 `String` 值（文本）。如果你想创建一个在表格中展示交通工具列表的应用，这个方法会很实用。注意，我在\
  \ Swift 中使用了一种特殊机制来组合文本和变量：\n\n```\nreturn \"nrOfWheels = \\(numberOfWheels), brand\
  \ = \\(brand)\"\n```\n\n在 Swift 中，这种通过将常量或变量与文本混合来创建 `String` 值的过程称为**字符串插值**。如果要在文本字符串中插入变量的值，只需将变量名写在\
  \ `\\(` 和 `)` 之间即可。下面是一个创建 `Vehicle` 类型变量并将车辆数据输出到控制台的示例：\n\n```\nvar v = Vehicle()\n\
  v.brand = \"volkswagen\"\nprint(v.what()) // 输出 \"nrOfWheels = 4, brand = volkswagen\"\
  \n```\n\n让我们为类添加一个接受品牌名称作为参数的初始化器：\n\n```\ninit(_ b: String) {\n    brand = b\n\
  }\n```\n\n现在你可以创建一辆交通工具并立即为其指定品牌名称：\n\n```\nvar v = Vehicle(\"volkswagen\")\nprint(v.what())\n\
  ```\n\n交通工具存在不同类型，例如汽车、自行车、摩托车等。对于其中某些类型，你可能希望存储额外信息。例如，对于汽车，存储它是否为敞篷车可能很有用；对于摩托车，则可能需要存储其气缸数等。你可以利用\
  \ Swift 中的继承机制来实现这一点。以下是一个名为 `Car` 的类示例：\n\n```\nclass Car: Vehicle {\n    var convertible\
  \ = false\n}\n```\n\n如你所见，类名后面有一个冒号和单词 `Vehicle`。这意味着 `Car` 类继承自 `Vehicle`。本质上，这意味着\
  \ `Car` 复制了 `Vehicle` 的功能，包括 `what` 方法：\n\n```\nvar c = Car(\"mercedes\")\nprint(c.what())\
  \ // 输出 \"nrOfWheels = 4, brand = mercedes\"\n```\n\n继承的妙处在于你可以替换或扩展功能。例如，假设你希望\
  \ `what` 方法返回的字符串也能包含汽车是否为敞篷车的信息。为此，你可以覆盖（override）原 `what` 方法，并用另一个方法替换它。以下是覆盖了\
  \ `what` 方法的 `Car` 类新版本：\n\n```\nclass Car : Vehicle {\n    var convertible = false\n\
  \    override func what() -> String {\n        return \"nrOfWheels = \\(numberOfWheels),\
  \ brand = \\(brand),\n                convertible = \\(convertible)\"\n    }\n}\n\
  ```\n\n之后使用 `Car` 类时：\n\n```\nvar c = Car(\"mercedes\")\nprint(c.what()) // 输出 \"\
  nrOfWheels = 4, brand = mercedes,\n                // convertible = false\"\n```\n\
  \n由于 `Car` 类继承自 `Vehicle`，这意味着 `Car` 类型的对象也是 `Vehicle` 类型的对象。因此，继承有两个重要方面：\n- 对象之间存在关系（`Car`\
  \ 对象同时也是 `Vehicle`）。\n- 继承自另一个类的类会复制其功能（`Car` 对象具有与 `Vehicle` 对象相同的（存储和计算）属性和方法）。\n\
  \n\n\n因为`Car`继承自`Vehicle`，你也可以说`Car`是`Vehicle`的子类或派生类，或者说`Vehicle`是`Car`的超类、父类或基类。类之间的继承关系被广泛使用；在良好的类设计中，这种关系可以被理解为“是一种”（is\
  \ a kind of）。在这个例子中，关系很明确：汽车（car）是一种交通工具（vehicle）。但反过来却不一定成立：交通工具不总是汽车。`Vehicle`可能有其他子类，例如：\n\
  \n```\nclass MotorBike: Vehicle {\n    var cylinders = 4\n    override init(_ b:\
  \ String) {\n        super.init(b)\n        numberOfWheels = 2\n    }\n}\n```\n\n\
  摩托车也是一种交通工具。`Motorbike`类继承自`Vehicle`，并添加了自定义属性来表示气缸数量。如你所见，`MotorBike`类重写了`Vehicle`类的构造器。这很有必要，因为摩托车没有四个轮子。因此，当创建`MotorBike`实例时，需要确保轮子数量被正确设置。尽管重写方法或重写构造器非常相似，但有一个关键区别：当你重写构造器时，Swift\
  \ 强制要求你调用超类的一个指定构造器。此外，你必须在访问超类的任何属性之前调用该构造器。这是为了确保在访问数据之前，对象已被正确初始化。`Vehicle`类包含一个唯一的（指定）构造器。下面这行代码调用了该构造器：\n\
  \n```\nsuper.init(b)\n```\n\n这是`Car`构造器主体中的第一条指令，它确保`Car`对象中属于`Vehicle`的部分被初始化。关键字`super`用于表示你调用的是属于超类的构造器。`super`指向一个对象，就像`self`一样。`self`和`super`的主要区别在于：`self`指向当前方法（或构造器）正在操作的对象，而`super`指向同一个对象，但仅限对象中属于超类的部分。在这个例子中，这意味着`self`的类型是`Car`，而`super`的类型是`Vehicle`。\n\
  \n图 10-1 展示了汽车/交通工具示例中使用的类层次结构。关于该层次结构的更详细版本，请参见图 10-4。\n\n![A978-1-4842-0650-8_10_Fig1_HTML.gif](img/A978-1-4842-0650-8_10_Fig1_HTML.gif)\n\
  \n图 10-1. `Vehicle`及其子类的继承关系图\n\n## 游戏对象与继承\n\n“是一种”的关系同样适用于 Painter 游戏中的游戏对象。球是一种游戏对象，油漆罐和大炮也是。你可以通过在程序中定义一个名为`ThreeColorGameObject`的泛型基类，并让你的实际游戏对象类继承自该泛型类，来明确这种继承关系。然后，你可以将所有定义三色游戏对象特征的内容放入该类中，而球、大炮和油漆罐将成为该类的特化版本。属于本章的`Painter8`示例展示了如何做到这一点。\n\
  \n让我们更详细地了解一下`ThreeColorGameObject`类。你将游戏中不同类型的游戏对象常用的属性放入此类。你可以定义该类的骨架如下：\n\n```\n\
  class ThreeColorGameObject {\n    var node = SKNode()\n    var red = SKSpriteNode()\n\
  \    var green = SKSpriteNode()\n    var blue = SKSpriteNode()\n    var velocity\
  \ = CGPoint.zeroPoint\n    ...\n}\n```\n\n每个继承自`ThreeColorGameObject`的类都将拥有一个`node`、三个`sprite`和一个`velocity`。这很好，因为现在你只需在一个地方定义这些属性，它们就可以在任何继承自`ThreeColorGameObject`的类中使用。\n\
  \n你需要做的一件事是提供一种用三个不同的精灵来初始化一个三色游戏对象的方法。当你定义`ThreeColorGameObject`类时，你还不知道要使用哪些精灵，因为它们取决于最终的游戏对象类型（大炮使用的精灵与球或油漆罐不同）。为了解决这个问题，我们添加以下构造器：\n\
  \n```\ninit(_ spriteRed: String, _ spriteGreen: String, _ spriteBlue: String) {\n\
  \    red = SKSpriteNode(imageNamed: spriteRed)\n    green = SKSpriteNode(imageNamed:\
  \ spriteGreen)\n    blue = SKSpriteNode(imageNamed: spriteBlue)\n    node.addChild(red)\n\
  \    node.addChild(green)\n    node.addChild(blue)\n}\n```\n\n当你继承此类时，通过将图片名称作为参数传递给`ThreeColorGameObject`构造器，来定义精灵属性`red`、`green`和`blue`应为何值。\n\
  \n接下来，你需要定义基本的游戏循环方法。该类的`updateDelta`方法仅包含根据速度更新游戏对象当前位置的指令：\n\n```\nfunc updateDelta(delta:\
  \ NSTimeInterval) {\n    node.position.x += velocity.x * CGFloat(delta)\n    node.position.y\
  \ += velocity.y * CGFloat(delta)\n}\n```\n\n为了完整性，我们还可以添加处理输入和重置游戏对象的方法，这些方法可以在后续被重写：\n\
  \n```\nfunc handleInput() {\n}\n\nfunc reset() {\n}\n```\n\n如果你查看`Painter8`示例中的`ThreeColorGameObject`类，你还会看到一些添加的计算属性。第一个是`color`，它读取和写入游戏对象的颜色。第二个属性叫做`box`，它计算游戏对象的边界框。这是一个很有用的（只读）属性，用于判断两个游戏对象是否碰撞。以下是该属性的定义：\n\
  \n```\nvar box: CGRect {\n    get {\n        return node.calculateAccumulatedFrame()\n\
  \    }\n}\n```\n\n向`ThreeColorGameObject`添加方法和属性的好处在于，任何继承自它的类现在也拥有这些方法和属性。这为你省去了大量代码复制的工作！关于完整的`ThreeColorGameObject`类，请参阅属于本章的`Painter8`示例。\n\
  \n\n\n### 作为 `ThreeColorGameObject` 子类的 Cannon\n\n既然你已经为彩色游戏对象创建了一个非常基础的类，你可以通过继承这个类，在你的游戏对象中复用这些基础行为。我们首先来看看\
  \ `Cannon` 类。因为你已经定义了基础的 `ThreeColorGameObject` 类，你就可以将 `Cannon` 类创建为该类的子类。以下是 `Cannon`\
  \ 类定义的一部分：\n\n```\nclass Cannon: ThreeColorGameObject {\n\n    var barrel = SKSpriteNode(imageNamed:\"\
  spr_cannon_barrel\")\n\n    init() {\n        super.init(\"spr_cannon_red\", \"\
  spr_cannon_green\", \"spr_cannon_blue\")\n        red.zPosition = 1\n        green.zPosition\
  \ = 1\n        blue.zPosition = 1\n        barrel.anchorPoint = CGPoint(x:0.233,\
  \ y:0.5)\n        node.position = CGPoint(x:-430, y:-280)\n        node.zPosition\
  \ = 1\n        green.hidden = true\n        blue.hidden = true\n        node.addChild(barrel)\n\
  \    }\n\n    ...\n}\n```\n\n`Cannon` 类引入了一个额外的属性，名为 `barrel`。此外，该类拥有自己的初始化器。`Cannon`\
  \ 初始化器中的第一条指令调用了父类的指定初始化器。在括号中，你可以看到这个初始化器所期望的三个精灵参数。然后，`Cannon` 对象的其余部分被初始化。\n\n\
  既然新版本的 `Cannon` 类已经定义完成，你可以像之前一样开始向该类添加属性和方法。例如，下面是 `handleInput` 方法：\n\n```\noverride\
  \ func handleInput(inputHelper: InputHelper) {\n    if !inputHelper.isTouching {\n\
  \        return\n    }\n    let localTouch: CGPoint = GameScene.world.node.convertPoint(inputHelper.touchLocation,\
  \ toNode: red)\n    if !red.frame.contains(localTouch) {\n        let opposite =\
  \ inputHelper.touchLocation.y - node.position.y\n        let adjacent = inputHelper.touchLocation.x\
  \ - node.position.x\n        barrel.zRotation = atan2(opposite, adjacent)\n    }\
  \ else if inputHelper.hasTapped {\n        let tmp = blue.hidden\n        blue.hidden\
  \ = green.hidden\n        green.hidden = red.hidden\n        red.hidden = tmp\n\
  \    }\n}\n```\n\n如你所见，你可以毫无问题地访问诸如 `node` 和 `red` 这样的属性。因为 `Cannon` 继承自 `ThreeColorGameObject`，它包含了相同的（存储属性和计算属性）和方法。同样你可以看到，`override`\
  \ 这个词表明该方法替换了 `ThreeColorGameObject` 中的原始方法（该方法原本有一个空实现）。\n\n如果你查看本章配套 Painter8\
  \ 示例中的 `Cannon` 类，你会发现其类定义比之前的版本更小、更易读了，因为所有通用的游戏对象属性和方法都被放在了 `ThreeColorGameObject`\
  \ 类中。将代码组织在不同的类和子类中有助于减少代码重复，从而带来更清晰的设计。然而，这里有一个注意事项：你的类结构（哪个类继承自哪个类）必须是正确的。请记住，只有当类之间存在“is\
  \ a kind of”（是一种）的关系时，才应该从一个类继承到另一个类。为了说明这一点，假设你想在屏幕顶部添加一个指示器来显示球的当前颜色。你可以为此创建一个类，并让它继承自\
  \ `Cannon` 类，因为它需要以类似的方式处理输入：\n\n```\nclass ColorIndicator : Cannon {\n    ...\n\
  }\n```\n\n然而，这是一个非常糟糕的主意。颜色指示器显然不是一种大炮，以这种方式设计你的类会让其他开发者非常不清楚这些类的用途。此外，颜色指示器现在也会有一个炮管，这毫无意义。类的继承图应该是逻辑清晰且易于理解的。每次你编写一个继承自其他类的类时，都要问问自己，该类是否真的“是一种”你所继承的类。如果不是，那么你必须重新考虑你的设计。\n\
  \n### `Ball` 类\n\n你以与 `Cannon` 类非常相似的方式定义新的 `Ball` 类。就像在 `Cannon` 类中一样，你继承自 `ThreeColorGameObject`\
  \ 类。唯一的区别是你添加了一个额外的属性，用于指示球是否准备好发射：\n\n```\nclass Ball : ThreeColorGameObject {\n\
  \    var readyToShoot = false\n\n    init() {\n        super.init(\"spr_ball_red\"\
  , \"spr_ball_green\", \"spr_ball_blue\")\n        node.zPosition = 1\n        node.hidden\
  \ = true\n    }\n\n    convenience init(position: CGPoint) {\n        self.init()\n\
  \        node.position = position\n    }\n\n    ...\n}\n```\n\n当创建 `Ball` 实例时，你需要调用指定的\
  \ `ThreeColorGameObject` 初始化器，就像你对 `Cannon` 类所做的那样。在这种情况下，你将球的精灵作为参数传递进去。\n\n`Ball`\
  \ 类清晰地说明了当你继承自另一个类时会发生什么。每个 `Ball` 实例由两部分组成：一部分继承自 `ThreeColorGameObject`，另一部分定义在\
  \ `Ball` 类中。图 10-2 展示了不使用继承时，一个 `Ball` 对象的内存布局。图 10-3 也展示了一个 `Ball` 实例，但它使用了本章介绍的继承机制。\n\
  \n![A978-1-4842-0650-8_10_Fig3_HTML.gif](img/A978-1-4842-0650-8_10_Fig3_HTML.gif)\n\
  \n图 10-3. `Ball` 类的一个实例（继承自 `ThreeColorGameObject`）\n\n![A978-1-4842-0650-8_10_Fig2_HTML.gif](img/A978-1-4842-0650-8_10_Fig2_HTML.gif)\n\
  \n图 10-2. `Ball` 类实例的内存使用概览（无继承）\n\n`ThreeColorGameObject` 类中的 `updateDelta` 方法只包含两条指令，用于根据游戏对象的速度、经过的时间以及当前位置来计算其新位置：\n\
  \n```\nnode.position.x += velocity.x * CGFloat(delta)\nnode.position.y += velocity.y\
  \ * CGFloat(delta)\n```\n\n球的运行逻辑应该更复杂一些。应该更新球的速度以包含阻力和重力；如果需要，应该更新球的颜色；如果球飞出了屏幕，它应该重置到原始位置。你可以简单地从之前版本的\
  \ `Ball` 类中复制 `updateDelta` 方法，使其覆盖 `ThreeColorGameObject` 的 `updateDelta` 方法。一个稍微好一点的方式是在\
  \ `Ball` 类中定义 `updateDelta` 方法，但复用 `ThreeColorGameObject` 中的原始 `updateDelta` 方法。这可以通过使用\
  \ `super` 关键字来实现，其方式与你用它来调用父类初始化器非常相似。以下是 `Ball` 类中 `updateDelta` 方法的新版本：\n\n```\n\
  override func updateDelta(delta: NSTimeInterval) {\n    if !node.hidden {\n    \
  \    velocity.x *= 0.99\n        velocity.y -= 15\n        super.updateDelta(delta)\n\
  \    } else {\n        // 计算球的位置\n        node.position = GameScene.world.cannon.ballPosition\n\
  \        // 复制球的颜色\n        self.color = GameScene.world.cannon.color\n    }\n\n\
  \    if GameScene.world.isOutsideWorld(node.position) {\n        reset()\n    }\n\
  }\n```\n\n在 `if` 指令的主体中，你更新了速度，然后调用了父类的 `updateDelta` 方法，该方法会更新游戏对象的位置。这种方式的好处在于，它允许你将（本例中的）更新过程的不同部分分离开来。任何拥有位置和速度的游戏对象，都需要在游戏循环的每次迭代中根据其速度更新其位置。你在\
  \ `ThreeColorGameObject` 的 `updateDelta` 方法中定义了这种行为，这样你就可以在继承自 `ThreeColorGameObject`\
  \ 的任何类中复用该方法！\n\n\n\n### `PaintCan` 类\n\n最后一个继承自 `ThreeColorGameObject` 的类是 `PaintCan`。请查看\
  \ `Painter8` 示例以了解完整的类定义。`PaintCan` 重写了 `updateDelta` 方法和 `reset` 方法。与之前一样，它不处理任何输入，因此你无需重写\
  \ `handleInput` 方法。\n\n`PaintCan` 类中有一个有趣的部分，那就是使用了 `box` 计算属性。由于任何继承自 `ThreeColorGameObject`\
  \ 的类都拥有该属性，现在你可以用它来轻松检查两个游戏对象是否发生碰撞。请看以下几行代码：\n\n```\nvar ball = GameScene.world.ball\n\
  \nif self.box.intersects(ball.box) {\n    color = ball.color\n    ball.reset()\n\
  }\n```\n\n这几行代码虽少，但幕后发生了很多事情。边界框以及它们之间的交集被计算出来，彩色精灵的隐藏状态也随之改变。由于代码的设计方式，你只需编写几行代码就能完成这些任务！\n\
  \n观察游戏对象类时，你会发现另一件有趣的事情。由于每个游戏对象类都继承自 `ThreeColorGameObject`，`ThreeColorGameObject`\
  \ 类中的定义决定了方法和属性的形态。从某种意义上说，`ThreeColorGameObject` 对任何继承自它的游戏对象类施加了约束。例如，它强制要求处理输入的方法名为\
  \ `handleInput`（而不是 `HandleInput`、`handleinput` 或 `handle_input`）。这是继承有助于提升代码质量的另一种方式：它带来了更一致的类定义。\n\
  \n## 多态性\n\n由于继承机制，你无需总是知道一个变量指向哪种类型的对象。考虑以下声明和初始化：\n\n```\nvar someKindOfGameObject\
  \ : Cannon = Cannon()\n```\n\n而在代码的其他地方，你执行以下操作：\n\n```\nsomeKindOfGameObject.updateDelta(delta)\n\
  ```\n\n现在假设你像下面这样更改声明和初始化：\n\n```\nvar someKindOfGameObject : ThreeColorGameObject\
  \ = Cannon()\n```\n\n这是允许的，因为 `Cannon` 是 `ThreeColorGameObject` 的子类。反过来（将 `ThreeColorGameObject`\
  \ 实例赋值给 `Cannon` 类型的变量）则不被允许，因为并非每个 `ThreeColorGameObject` 都是加农炮（其中一些是球或油漆罐）。\n\n\
  那么，如果 `someKindOfGameObject` 是 `ThreeColorGameObject` 类型，会调用哪个版本的 `updateDelta`\
  \ 方法？这取决于该变量所引用的实例。如果该实例恰好是 `Cannon` 实例，则会调用 `Cannon` 的 `updateDelta` 方法。如果是 `Ball`\
  \ 实例，则会调用 `Ball` 的 `updateDelta` 方法。程序执行时，会自动调用正确的 `updateDelta` 方法版本。\n\n这种效果称为多态性，有时非常有用。多态性允许你更好地分离代码。假设一家游戏公司想要发布其游戏的扩展包。例如，它可能想引入一些新敌人，或者玩家可以学习的技能。该公司可以将这些扩展作为通用\
  \ `Enemy` 和 `Skill` 类的子类来提供。实际的游戏代码随后会使用这些对象，而无需知道它正在处理的是哪个特定的技能或敌人。它只需调用在通用类中定义的方法即可。\n\
  \n## 继承现有类\n\n除了创建自己编写的类的子类外，你还可以继承其他开发者编写的类。在 `Painter8` 示例中，存在两个游戏对象层级结构。一个层级结构由你创建的类表示：`GameWorld`\
  \ 实例包含对加农炮、球和油漆罐对象的引用。第二个层级结构由场景图中的节点定义。通常情况下，这不是理想的解决方案。由于要维护两个层级结构，很容易出现不一致，导致错误和其他不期望的行为。\n\
  \n解决这个问题的一种方法是合并这两个层级结构。`Painter9` 示例展示了如何做到这一点。`Painter8` 和 `Painter9` 的主要区别在于，在\
  \ `Painter9` 中，游戏对象类都（间接地）是 `SKNode` 的子类，而 `SKNode` 是 SpriteKit 框架中场景图节点的主要表示。`ThreeColorGameObject`\
  \ 类现在是 `SKNode` 的子类。这意味着不再需要 `node` 属性，因为任何游戏对象本身已经是一个节点。\n\n如果你查看 `Painter9` 中的\
  \ `ThreeColorGameObject` 类，会发现它现在是 `SKNode` 的子类。因此，你需要额外做几件事。其一，你需要在自定义的初始化器中调用父类的初始化器：\n\
  \n```\noverride init() {\n    super.init()\n    self.addChild(red)\n    self.addChild(green)\n\
  \    self.addChild(blue)\n}\n\ninit(_ spriteRed: String, _ spriteGreen: String,\
  \ _ spriteBlue: String) {\n    super.init()\n    red = SKSpriteNode(imageNamed:\
  \ spriteRed)\n    green = SKSpriteNode(imageNamed: spriteGreen)\n    blue = SKSpriteNode(imageNamed:\
  \ spriteBlue)\n    self.addChild(red)\n    self.addChild(green)\n    self.addChild(blue)\n\
  }\n```\n\n第一个初始化器重写了父类的初始化器，并确保将三个精灵节点添加到此游戏对象中，以保证一致性，无论调用哪个初始化器。第二个初始化器与之前相同，只是它调用了父类的初始化器，并且精灵现在被添加到游戏对象本身，而不是一个单独的节点。\n\
  \n最后，你会看到以下初始化器：\n\n```\nrequired init?(coder aDecoder: NSCoder) {\n    fatalError(\"\
  init(coder:) has not been implemented\")\n}\n```\n\n当你继承 `SKNode` 时，你必须添加这个初始化器（代码中的\
  \ `required` 关键字也表明了这一点）。需要这个初始化器的原因是 `SKNode` 类支持一种称为序列化的功能。序列化意味着可以从数据（例如，存储在文件中）初始化对象。这对许多游戏来说是一个有用的特性，因为它构成了游戏存档机制的基础。然而，在\
  \ `Painter` 中并没有这种机制，因此该初始化器只包含一条指令，用于在出现错误时停止程序。\n\n由于 `ThreeColorGameObject` 是\
  \ `SKNode` 的子类，任何继承自 `ThreeColorGameObject` 的类也都是 `SKNode` 的子类，包括 `Cannon`、`Ball`\
  \ 和 `PaintCan` 类。正如你在 `Painter9` 中看到的，`GameWorld` 类的设置方式与 `ThreeColorGameObject`\
  \ 非常相似：它继承自 `SKNode`，因此不再需要单独的 `node` 属性。\n\n\n\n### 类的层级结构\n\n在本章中，你已经看到多个从基础游戏对象类继承的类示例。只有当两个类之间的关系可以用“是一种”来描述时，一个类才应继承另一个类。例如：`Ball`\
  \ 是一种 `ThreeColorGameObject`，而 `ThreeColorGameObject` 又是一种 `SKNode`。你可以将这种层级结构进一步扩展。例如，你可以编写一个继承自\
  \ `Ball` 的类 `BouncingBall`，它是标准球的特殊版本，能够从油漆罐上弹开而不仅仅是与之碰撞。你还可以创建另一个名为 `BouncingElasticBall`\
  \ 的类，它继承自 `BouncingBall`，但这种球在撞击油漆罐时会根据其弹性特性发生形变。每次继承一个类时，你都能免费获得基类的数据（以属性形式编码）和行为（以方法形式编码）。\n\
  \n商业游戏中不同游戏对象的类层级结构往往具有多个层级。回到本章开头的交通模拟示例，你可以想象一个由各种不同车辆构成的非常复杂的层级结构。图 10-4 展示了这样一个层级结构的示例。图中使用箭头表示类之间的继承关系。\n\
  \n![A978-1-4842-0650-8_10_Fig4_HTML.gif](img/A978-1-4842-0650-8_10_Fig4_HTML.gif)\n\
  \n图 10-4. 交通模拟游戏中复杂的游戏对象层级结构\n\n继承树的最底层是 `GameObject` 类。该类仅包含非常基础的信息，例如游戏对象的位置或速度。对于每个子类，可以添加与该特定类及其子类相关的新属性和方法。例如，属性\
  \ `numberOfWheels` 通常属于 `Vehicle` 类而非 `MovingGameObject` 类（因为船只没有轮子）。属性 `flightAltitude`\
  \ 属于 `Airplane` 类，而属性 `bellIsWorking` 则属于 `Bicycle` 类。\n\n在确定类结构的方式时，你需要做出许多决策。不存在唯一的最佳层级结构；并且，根据应用场景的不同，某种层级结构可能比另一种更实用。例如，这个示例首先根据对象移动所使用的介质（陆地、空中或水上）来划分\
  \ `MovingGameObject` 类。然后，这些类再被划分为不同的子类：机动化或非机动化。你也可以选择反过来划分。对于某些类，它们在层级结构中的归属并非完全明确：你会认为摩托车是一种特殊类型的自行车（带有马达的吗？）？还是一种特殊类型的机动车辆（只有两个轮子的）？\n\
  \n重要的是，类之间的关系必须清晰。帆船是一种船，但船不总是帆船。自行车是一种车辆，但并非所有车辆都是自行车。\n\n## 本章所学内容\n\n在本章中，你学习了以下内容：\n\
  \n*   如何使用继承将相关类组织成层级结构\n*   如何在子类中重写方法，为该类提供特定行为\n*   如何使用 `super` 关键字调用超类的方法或初始化器\n\
  \n"
- "# 完成“画家”游戏\n\n电子补充材料：本章的在线版本 (doi:[10.1007/978-1-4842-0650-8_11](http://dx.doi.org/10.1007/978-1-4842-0650-8_11))\
  \ 包含补充材料，可供授权用户获取。\n\n在本章中，你将通过添加一些额外功能（如运动效果、音效和音乐，以及维护和显示分数）来完成“画家”游戏。最后，你将更详细地了解字符和字符串。\n\
  \n## 添加运动效果\n\n为了使游戏更具视觉吸引力，你可以让油漆罐轻微地来回摆动，以模拟风力和摩擦力对下落运动的影响。本章附带的 `PainterFinal`\
  \ 程序是游戏的最终版本，其中为罐子添加了这种运动效果。添加这样的效果并不复杂。得益于你在前一章所做的工作，只需在 `PaintCan` 类的 `updateDelta`\
  \ 方法中添加一行代码即可。因为 `PaintCan` 是 `ThreeColorGameObject` 的子类，而 `ThreeColorGameObject`\
  \ 又是 `SKNode` 的子类，所以它拥有一个 `zRotation` 属性，你可以利用该属性来旋转油漆罐。\n\n为了实现运动效果，你使用了 `sin`\
  \ 函数。通过让值取决于罐子的当前位置，你可以根据位置获得不同的数值。然后，你使用这个值对精灵应用旋转。以下是你添加到 `PaintCan` 类 `updateDelta`\
  \ 方法中的代码行：\n\n```\nself.zRotation = sin(position.y / 50) * 0.04\n```\n\n这条指令利用油漆罐位置的\
  \ y 坐标来获取不同的旋转值。此外，你将其除以 50 以获得一个不错的缓慢运动效果，并将结果乘以 0.04 来减小正弦波的振幅，使旋转看起来或多或少显得真实。如果你愿意，可以尝试不同的数值，看看它们如何影响油漆罐的行为。\n\
  \n### 创建精灵\n\n即使你不是艺术家，能够自己制作简单的精灵也会有所帮助。这使你能够快速制作游戏原型——也许还能发现自己体内潜藏着艺术天赋。要创建精灵，你首先需要好的工具。大多数艺术家会使用像\
  \ Adobe Photoshop 这样的绘画程序或像 Adobe Illustrator 这样的矢量绘图程序，但也有人使用像画图板这样简单的工具，或者功能更全面且免费的\
  \ GIMP。每种工具都需要练习。通过一些教程逐步学习，并确保你对其众多不同功能有所了解。通常，你想要实现的效果可以通过简单的方式达成。\n\n最好创建非常大的游戏对象图像，然后再将其缩小到所需尺寸。这样做的好处是，你可以在以后更改游戏所需的尺寸，并且还能消除因图像由像素表示而产生的锯齿效应。在缩放图像时，抗锯齿技术会混合颜色，使图像保持平滑。如果你在图像中保持游戏对象外部透明，那么在缩放时，边缘像素将自动变为部分透明。只有在你想创建经典的像素风格时，才应以实际需要的尺寸创建精灵。\n\
  \n最后，在网上四处看看。有很多免费可用的精灵资源。务必检查许可条款，确保你所使用的精灵包对于你的开发是合法的。然后，你可以将它们作为制作自己精灵的基础。但归根结底，要意识到当你与经验丰富的艺术家合作时，游戏的质量会显著提升。\n\
  \n\n\n## 添加声音与音乐\n\n让游戏更有趣的另一个方法是添加一些声音。这款游戏同时使用了背景音乐和音效。为了让 Swift 中的声音处理更简单，我们添加了一个`Sound`类，它可以用来播放和循环播放声音。以下是该类的一部分（完整类请参见\
  \ PainterFinal 示例）：\n\n```\nclass Sound {\n    var audioPlayer = AVAudioPlayer()\n\
  \    init(_ fileName: String) {\n        let soundURL = NSBundle.mainBundle().URLForResource(fileName,\
  \ withExtension: \"mp3\")\n        audioPlayer = try! AVAudioPlayer(contentsOfURL:\
  \ soundURL!)\n    }\n    ...\n}\n```\n\n该类包含一个名为`audioPlayer`的存储属性，负责播放声音。在初始化方法中，我们根据传入的文件名参数创建一个新的音频播放器对象。创建`AVAudioPlayer`对象的语法可能看起来有点陌生。创建`AVAudioPlayer`对象可能会产生错误（例如，如果找不到声音文件）。Swift\
  \ 强制你选择是处理还是忽略这类错误。由于这类错误处理超出了本书范围，我使用`try!`来忽略可能发生的任何错误。\n\n现在让我们为`Sound`类添加一些功能，让播放各种声音变得更简单。许多游戏都需要的一个功能是循环播放声音的选项。通常，背景音乐应该循环播放；而音效（例如发射颜料球）则不必循环。\n\
  \n`Sound`类包含一个（计算）属性`looping`，用于指示声音是否应该循环播放。你可以通过将`audioPlayer`对象中的`numberOfLoops`属性设置为适当的值来循环播放声音。如果选择值为\
  \ 0，声音将不会循环播放（这正是音效需要的效果）。正值表示声音应该循环播放的次数。值为-1 则会使声音无限循环，直到程序结束（这是背景音乐的好选择）。以下是完整的属性：\n\
  \n```\nvar looping: Bool {\n    get {\n        return audioPlayer.numberOfLoops\
  \ < 0\n    }\n    set {\n        if newValue {\n            audioPlayer.numberOfLoops\
  \ = -1\n        } else {\n            audioPlayer.numberOfLoops = 0\n        }\n\
  \    }\n}\n```\n\n我们再添加一个属性来改变正在播放的声音的音量。这特别有用，因为通常你希望音效比背景音乐更响亮。在某些游戏中，玩家可以调整这些音量（稍后本书会介绍如何实现）。每当你在游戏中引入声音时，一定要确保提供音量控制，至少要有静音控制。无法静音的游戏会通过用户评论招致愤怒玩家的声讨！以下是`volume`属性，它很直接：\n\
  \n```\nvar volume: Float {\n    get {\n        return audioPlayer.volume\n    }\n\
  \    set {\n        audioPlayer.volume = newValue\n    }\n}\n```\n\n最后，我们添加一个名为`play`的方法，它做两件事。首先，它将声音的播放起始位置设置在最开始（即时间\
  \ 0 处）。然后，它在`audioPlayer`对象上调用`play`方法：\n\n```\nfunc play() {\n    audioPlayer.currentTime\
  \ = 0\n    audioPlayer.play()\n}\n```\n\n现在你可以使用`Sound`类轻松地在游戏中加载和播放各种声音。在 Painter\
  \ 游戏中，既有背景音乐也有音效。对于你想要播放的每个特定声音，你需要在使用的类中添加一个属性。例如，对于背景音乐，我们在`GameWorld`中添加了以下属性：\n\
  \n```\nvar backgroundMusic = Sound(\"snd_music\")\n```\n\n在初始化方法中，我们以较低的音量开始循环播放背景音乐，如下所示：\n\
  \n```\nbackgroundMusic.looping = true\nbackgroundMusic.volume = 0.5\nbackgroundMusic.play()\n\
  ```\n\n你还需要播放音效。例如，当玩家发射球时，他们希望能听到声音！因此，当玩家开始发射球时，我们播放这个音效。在`Ball`类中，我们添加一个属性来表示音效：\n\
  \n```\nvar shootPaintSound = Sound(\"snd_shoot_paint\")\n```\n\n然后，当球被发射时播放声音，这在`Ball`类的`handleInput`方法中处理：\n\
  \n```\nif (!inputHelper.isTouching && readyToShoot && self.hidden) {\n    self.hidden\
  \ = false\n    readyToShoot = false\n    velocity.x = (inputHelper.touchLocation.x\
  \ -\n        GameScene.world.cannon.position.x) * 1.4\n    velocity.y = (inputHelper.touchLocation.y\
  \ -\n        GameScene.world.cannon.position.y) * 1.4\n    shootPaintSound.play()\n\
  }\n```\n\n类似地，当正确颜色的颜料罐掉出屏幕时，也会播放一个声音（实际代码请参见 PainterFinal 示例中的`PaintCan`类）。\n\n\
  ## 维护分数\n\n分数通常是激励玩家继续玩游戏的非常有效的方式。高分榜在这方面尤为有效，因为它为游戏引入了竞争因素：你希望比 AAA 或 XYZ 做得更好（许多早期街机游戏只允许在高分榜中每个名字使用三个字符，从而催生了非常富有想象力的名字）。高分榜如此有激励作用，以至于有些第三方系统专门将其集成到游戏中。这些系统允许用户将自己与世界各地成千上万的其他玩家进行比较。在\
  \ Painter 游戏中，我们保持简单，在`GameWorld`类中添加了`score`属性来存储当前分数：\n\n```\nvar score = 0\n\
  ```\n\n玩家从零分开始。每次颜料罐掉出屏幕时，分数就会更新。如果一个正确颜色的颜料罐掉出屏幕，则加 10 分。如果颜色不对，玩家就会失去一条命。\n\n\
  分数是所谓游戏经济的一部分。游戏经济基本上描述了游戏中不同的成本与收益以及它们之间的互动关系。当你制作自己的游戏时，思考其经济结构总是很有用的。各种事物消耗什么成本？玩家执行不同行动会获得什么收益？这两者之间是否平衡？\n\
  \n我们在`PaintCan`类中更新分数，在这里可以检查颜料罐是否掉出屏幕。如果是，则检查它的颜色是否正确，并相应地更新分数和玩家的生命数。然后隐藏`PaintCan`对象，以便它可以再次落下，如下所示：\n\
  \n```\nlet top = CGPoint(x: self.position.x, y: self.position.y + red.size.height/2)\n\
  if GameScene.world.isOutsideWorld(top) {\n    if color != targetColor {\n      \
  \  GameScene.world.lives -= 1\n    } else {\n        GameScene.world.score += 10\n\
  \        collectPointsSound.play()\n    }\n    self.hidden = true\n}\n```\n\n在这段代码中，你还可以看到，每当正确颜色的颜料罐掉出屏幕时，会播放一个存储在`collectPointsSound`属性中的音效。\n\
  \n\n\n## 字符与字符串\n\n由于游戏现在记录了分数，它也需要在屏幕上以某种方式显示这个分数。这意味着你必须要在屏幕上绘制数字。为了让玩家清楚这是分数而非随机数字，你还将在数字前绘制“分数：”字样。Swift\
  \ 有一种用于表示文本的类型，称为 `String`。就像数字或布尔值一样，字符串在 Swift 中是一种结构体。以下是声明字符串变量的示例：\n\n`var\
  \ name = \"Patrick\"`\n\n在 Swift 中，字符串由双引号字符界定。当使用字符串值并将其与其他变量组合时，使用引号时需格外小心。如果忘记引号，你就不再是书写文本或字符，而是在编写一段\
  \ Swift 程序！以下几者之间有着显著区别：\n\n- 字符串 `\"hello\"` 与变量名 `hello`\n- 字符串 `\"123\"` 与数值\
  \ `123`\n- 字符串值 `\"+\"` 与运算符 `+`\n\n使用 `+` 运算符来组合（或称拼接）多个字符串：\n\n```swift\nvar string1\
  \ = \"hello \"\nvar string2 = \"world\"\nvar string3 = string1 + string2 // string3\
  \ 现在包含 \"hello world\"\n```\n\n注意：拼接操作仅当处理文本时才有意义。例如，无法将两个数字进行“拼接”：表达式 `1 + 2` 的结果是\
  \ `3`，而非 `12`。当然，你可以拼接以文本形式表示的数字：`\"1\" + \"2\"` 的结果是 `\"12\"`。通过使用双引号来区分文本和数字。若要将字符串与数字（或其他类型的变量，如布尔值）组合成单个字符串，可以使用特殊的\
  \ `\\()` 符号，如下所示：\n\n```swift\nvar age = 24\nvar info = \"Peter is \\(age) years\
  \ old\"\nprint(info) // 输出字符串 \"Peter is 24 years old\"\n```\n\n这一特性称为字符串插值，在 Painter\
  \ 示例中用于显示分数非常实用。首先，在游戏世界中添加一个标签节点：\n\n`var scoreLabel = SKLabelNode(fontNamed: \"\
  Chalkduster\")`\n\n然后，在 `GameWorld` 的 `updateDelta` 方法中，使用字符串插值将当前分数赋值给标签：\n\n`scoreLabel.text\
  \ = \"Score: \\(score)\"`\n\n由于游戏循环的每次迭代都会更新标签，当前分数将始终显示在屏幕上。\n\n### 特殊字符\n\n除了\
  \ `\\()` 符号之外，字符串中还有其他一些也使用反斜杠符号的特殊字符，例如：\n\n- `\\n` 用于换行符\n- `\\r` 用于回车符（注意，在 iOS\
  \ 字符串中换行时，直接使用 `\\n` 即可）\n- `\\t` 用于制表符\n\n这引入了一个新问题：如何表示反斜杠字符本身。反斜杠字符通过双反斜杠来表示。类似地，反斜杠符号也用于表示双引号字符：\n\
  \n- `\\\\` 用于反斜杠符号\n- `\\\"` 用于双引号字符\n\n例如，\n\n```\nprint(\"\\\"You are crazy,\\\
  \" she said.\") // 输出: \"You are crazy,\" she said.\n```\n\n## 添加应用图标\n\n需要为 Painter\
  \ 游戏添加的最后一件事是应用图标。应用图标需要多种尺寸，每种尺寸用途不同。有些图标还需要多种分辨率（1x、2x 或 3x）。图 11-1 展示了 Xcode\
  \ 的屏幕截图，其中显示了为 Painter 游戏添加的图标。\n\n![A978-1-4842-0650-8_11_Fig1_HTML.jpg](img/A978-1-4842-0650-8_11_Fig1_HTML.jpg)\n\
  \n图 11-1. Painter 游戏中的图标\n\n为应用设计高质量图标非常重要。当大多数人看到你的游戏安装在朋友的设备上，或者他们在 App Store\
  \ 中寻找好玩的游戏时，他们首先看到的就是图标。如果你的图标不出众，人们就不会购买你的游戏。作为一般性建议，尽量保持图标简洁，以便人们容易识别。同时，避免在图标上放置文字，因为用户在较小的屏幕上可能无法看清文字。最后，设计应用图标时，要与你创建的游戏风格保持一致。如果你的游戏非常卡通化，那么应用图标也应如此。如果你的游戏氛围阴暗忧郁，确保图标也能反映出这一点。如同常规艺术作品一样，以高分辨率设计你的应用图标，然后将其导出为缩小后的图像文件。有一些在线工具可以帮助你设计并自动导出正确格式的应用图标，例如\
  \ [`appicontemplate.com`](http://appicontemplate.com/) 或 [`makeappicon.com`](http://makeappicon.com/)。\n\
  \n## 最后几点补充\n\n恭喜你——你完成了自己的第一款游戏！图 11-2 展示了最终的游戏版本。在开发这款游戏的过程中，你学到了许多重要概念。在下一款游戏中，你将基于现有工作继续拓展。同时，别忘了玩一玩游戏！你会注意到几分钟后游戏会变得非常困难，因为油漆罐下落的速度越来越快。\n\
  \n![A978-1-4842-0650-8_11_Fig2_HTML.jpg](img/A978-1-4842-0650-8_11_Fig2_HTML.jpg)\n\
  \n图 11-2. 游戏《玩游戏的画家？》的最终版本\n\n你可能认为游戏主要是由年轻男性玩，但这完全不对。玩游戏的人占了相当大的比例。2014 年在美国有 1.88\
  \ 亿活跃玩家，这超过了总人口（包括婴儿）的一半。他们在多种不同的设备上玩游戏。53% 的玩家在智能手机上玩游戏，41% 的玩家在无线设备上玩游戏（来源：美国娱乐软件协会，2014\
  \ 年）。\n\n如果你开发游戏，最好先想想你想要面向的受众。面向幼儿的游戏与面向中年女性的游戏不同。这些游戏应有不同的玩法、不同的视觉风格以及不同的目标。\n\
  \n尽管主机游戏往往发生在大型 3D 世界中，但移动设备上的休闲游戏通常是 2D 且大小有限。此外，主机游戏的设计使其可以（并且需要）连续玩上数小时，而休闲游戏通常设计为可以在仅几分钟的片段中游玩。还有许多类型的严肃游戏，这类游戏用于培训专业人员，例如消防员、市长和医生。要意识到，你喜欢的游戏不一定就是目标受众喜欢的游戏。\n\
  \n## 本章所学内容\n\n在本章中，你学到了以下内容：\n\n- 如何向游戏中添加音乐和音效\n- 如何维护和显示分数\n- 如何使用字符串来表示和处理文本\n\
  \n"
