  \  0x0000000000000008, SS:\n0x0000000000000010\nCR2: 0x0000000000000090, Error code:\
  \ 0x0000000000000002, Faulting CPU: 0x1\n\nBacktrace (CPU 1), Frame : Return Address\n\
  0xffffff808e973b40 : 0xffffff8000220702\n0xffffff808e973bc0 : 0xffffff80002c268d\n\
  0xffffff808e973d60 : 0xffffff80002d7a3d\n0xffffff808e973d80 : 0xffffff7f81345570\n\
  0xffffff808e973ea0 : 0xffffff7f813458b6\n0xffffff808e973ed0 : 0xffffff7f81345914\n\
  0xffffff808e973f00 : 0xffffff7f813459f4\n0xffffff808e973f40 : 0xffffff800063bc61\n\
  0xffffff808e973f70 : 0xffffff800023dafc\n0xffffff808e973fb0 : 0xffffff8000820057\n\
  \      Kernel Extensions in backtrace:\n         com.osxkernel.MyDebugDriver(1.0)[FF6F45C8-68F8-3150-9C43-\n\
  99A2F19B3FB1]@0xffffff7f81345000->0xffffff7f81348fff\n\nBSD process name corresponding\
  \ to current thread: kernel_task\nBoot args: debug=0xd44 _panicd_ip=192.168.1.1\
  \ panicd_ip=192.168.1.1\n\nMac OS version:\n11A511\n\nKernel version:\nDarwin Kernel\
  \ Version 11.0.0: Sat Jun 18 12:56:35 PDT 2011; root:xnu-\n1699.22.73~1/RELEASE_X86_64\n\
  Kernel UUID: 24CC17EB-30B0-3F6C-907F-1A9B2057AF78\nSystem model name: MacBook5,1\
  \ (Mac-F42D89C8)\n\nSystem uptime in nanoseconds: 200305435891999\nlast loaded kext\
  \ at 200285007562702: com.osxkernel.MyDebugDriver  1 (addr 0xffffff7f81345000,\n\
  size 16384)\nlast unloaded kext at 187374587106276: com.apple.driver.AppleUSBCDC\
  \     4.1.15 (addr\n0xffffff7f8133d000, size 12288)\nloaded kexts:\ncom.osxkernel.MyDebugDriver\
  \  1\ncom.apple.driver.AppleUSBDisplays   302.1.2\ncom.apple.driver.AppleIntelProfile\
  \  83\ncom.apple.filesystems.afpfs 9.8\n```\n\n代码清单 16-5 中的恐慌日志是在与之前不同的系统上生成的。这个系统运行的是更新的\
  \ Mac OS X Lion 版本，该系统仅运行 64 位版本的内核。该恐慌日志包含以下元素：\n\n- 发生的恐慌/问题的类型以及发生问题的 CPU（核心）编号\n\
  - CPU 状态的转储（寄存器值）\n- 崩溃时 CPU 正在执行的回溯信息\n- 崩溃中涉及的内核扩展及其依赖关系（上面没有）\n- 导致崩溃的进程（任务）名称\n\
  - 内核构建版本和版本号\n- 系统型号\n- 关于最近加载/卸载的 KEXT 的信息\n- 已加载的 KEXT 的完整列表\n\n你可能首先注意到，这次恐慌是由*页面错误*引起的，这为我们提供了后续在代码中应查找哪些内容的线索。同时，查看导致问题的任务也通常很有用。在这个例子中，崩溃发生时我们的驱动程序是在内核上下文（`kernel_task`）中执行的，而非代表用户空间线程执行。\n\
  \n首先，让我们查看回溯信息，并尝试证明我们的驱动程序确实涉及其中。我们的驱动程序被列为回溯信息的一部分，因此它极有可能与此有关。你还将注意到我们的驱动程序后面有两个地址：`0xffffff7f81345000->0xffffff7f81348fff`。这是加载地址，我们的\
  \ KEXT 的指令和数据被加载到了内核地址空间的这个位置。要确定栈上的哪些函数属于我们的驱动程序，我们可以简单地查找栈上在该范围内的地址。可以识别出四个地址——`0xffffff7f81345570`、`0xffffff7f813458b6`、`0xffffff7f81345914`\
  \ 和 `0xffffff7f813459f4`。\n\n之前我们已经知道，它们很可能对应 `testFunc3()`、`testFunc2()`、`testFunc1()`\
  \ 和 `timerFired()`。\n\n![images](img/square.jpg) **提示** 在上一个回溯信息中，列中的第一个地址是栈帧条目的地址，而第二个地址是返回地址，即当上一个函数调用完成时执行返回到的位置。在这个场景下，我们感兴趣的是返回地址。你可能会注意到，栈帧地址包含递增的地址，并且在这个例子中它们都在单个页面内。如果这些值看起来随机且分散在各地，很可能栈帧已损坏，那么回溯信息可能就没用了，因为这些信息不值得信赖。\n\
  \n假设我们完全不知道这些地址对应驱动程序中的哪些函数，我们可以使用一个简单的技巧。只需将其中一个函数的地址减去加载地址，就可以确定该函数在驱动程序可执行映像中的偏移量，如下所示：\n\
  \n```\n0xffffff7f81345570 - 0xffffff7f81345000 = 1392 字节\n```\n\n现在我们知道了该函数位于 KEXT\
  \ 起始位置偏移 1392 字节处，假设我们有该驱动程序的可用可执行映像（与崩溃中涉及的确切版本和构建一致），我们可以执行以下操作：\n\n```\n$ gdb\
  \ MyDebugDriver.kext/Contents/MacOS/MyDebugDriver\nGNU gdb 6.3.50-20050815 (Apple\
  \ version gdb-1704) (Thu Jun 23 10:48:29 UTC 2011)\nThis GDB was configured as \"\
  x86_64-apple-darwin\"...\n(gdb) disassemble 1392\nDump of assembler code for function\
  \ _ZN27com_osxkernel_MyDebugDriver9testFunc3Ejjjj:\n0x0000000000000540 <testFunc3Ejjjj+0>:\
  \       push   %rbp\n0x0000000000000541 <testFunc3Ejjjj+1>:       mov    %rsp,%rbp\n\
  0x0000000000000544 <testFunc3Ejjjj+4>:       sub    $0x20,%rsp\n0x0000000000000548\
  \ <testFunc3Ejjjj+8>:       mov    %rdi,-0x8(%rbp)\n0x000000000000054c <testFunc3Ejjjj+12>:\
  \      mov    %esi,-0xc(%rbp)\n0x000000000000054f <testFunc3Ejjjj+15>:      mov\
  \    %edx,-0x10(%rbp)\n0x0000000000000552 <testFunc3Ejjjj+18>:      mov    %ecx,-0x14(%rbp)\n\
  0x0000000000000555 <testFunc3Ejjjj+21>:      mov    %r8d,-0x18(%rbp)\n0x0000000000000559\
  \ <testFunc3Ejjjj+25>:      mov    -0x14(%rbp),%eax\n0x000000000000055c <testFunc3Ejjjj+28>:\
  \      cmp    $0x0,%eax\n0x000000000000055f <testFunc3Ejjjj+31>:      jne    0x576\
  \ <_ZN27com_osxkernel_MyDebugDriver9testFunc3Ejjjj+54>\n...\nEnd of assembler dump.\n\
  (gdb) info line *1392\nLine 14 of \"MyDebugDriver.cpp\" starts at address 0x569\n\
  <_ZN27com_osxkernel_MyDebugDriver9testFunc3Ejjjj+41> and ends at 0x576\n<_ZN27com_osxkernel_MyDebugDriver9testFunc3Ejjjj+54>.\n\
  ```\n\n\n\n我们已找到崩溃的位置！CPU 寄存器的完整描述超出了本书的范围，但只需说明它们包含大量有用信息即可。下一节我们将讨论如何利用寄存器信息来检索函数参数。崩溃日志中的处理器当时运行在\
  \ 64 位模式下。`x86_64`系统可用的寄存器数量比`i386`系统更多，且局部变量通常通过通用寄存器而非栈来传递。\n\n![images](img/square.jpg)\
  \ **提示** 技术说明 TN2063 更详细地讨论了如何调试和解读内核恐慌，并包含了 PowerPC 系统的恐慌日志调试方法：[`http://developer.apple.com/library/mac/#technotes/tn2063/_index.html`](http://developer.apple.com/library/mac/#technotes/tn2063/_index.html)。\n\
  \n### x86-64 调用约定\n\n调用约定是函数传递其参数的一种方案。调用约定取决于编程语言、操作系统、架构和编译器。理解所使用的调用约定有助于我们在发生崩溃时解码寄存器状态。例如，在运行\
  \ 64 位可执行程序或内核的 Mac OS X 上，采用 System V AMD64 ABI 约定（注意 Windows 使用不同的调用约定，因此寄存器使用方式会不同）。在\
  \ Mac OS X 的 64 位任务中，函数调用参数的寄存器分配如表 16-4 所示。\n\n![Images](img/t1604.jpg)\n\n如果函数参数超过六个，剩余参数将通过栈传递。在分析\
  \ C++代码时需要注意：非静态的 C++成员方法总是将 `this` 指针作为第一个参数传递，因此方法的实际第一个参数通过 `RDI` 传递，而 `this`\
  \ 指针则被放入 `RSI` 寄存器。\n\n让我们查看代码清单 16-5 中恐慌日志显示的寄存器，尝试通过检查寄存器状态来确定传递给函数的参数，如下所示：\n\
  \n*   `RDI`：`0xffffff801ab61100`（this 指针）\n*   `RSI`：`0x000000000000feed`（十进制 =\
  \ 65261）\n*   `RDX`：`0x000000000000beef`（十进制 = 48879）\n*   `RCX`：`0x0000000000000000`（十进制\
  \ = 0）\n*   `R8`：`0x0000000000001504`（十进制 = 5380）\n\n如您所见，代码清单 16-5 中的寄存器内容与传递给\
  \ `testFunc3()` 的四个参数完全一致：65261、48879、0 和 5380。我们还可以看到第一个参数看起来像一个指针，很可能是指向当前 `MyDebugDriver`\
  \ 实例的 `this` 指针。\n\n假设 `testFunc3()` 是一个更复杂的方法，且崩溃发生在函数更靠后的位置，那么寄存器在崩溃时可能已被重用并覆盖。在这种情况下，您可能无法恢复参数的原始值。\n\
  \n### 使用活动监视器诊断挂起的进程\n\n图 16-3 所示的 Mac OS X 活动监视器有助于诊断内核问题。\n\n![images](img/1603.jpg)\n\
  \n***图 16-3.** 来自活动监视器的进程采样输出*\n\n活动监视器中显示的任何任务都可以被采样（`kernel_task` 除外），采样期间会生成该任务所有线程的调用图。从内核调试的角度来看，这非常有用，因为您可以判断一个进程是否有线程通过诸如\
  \ `IOConnectCallMethod()` 之类的系统调用进入您的驱动程序。如果进程挂起，强制退出将启动崩溃报告程序，它会提供更详细的日志，包括线程当前在内核中运行时其内核栈的信息。进程采样功能还能帮助您确定性能问题，并找出应用程序花费时间最多的地方。\n\
  \n### 查找内存和资源泄漏\n\n对于可在运行时动态加载和卸载的扩展，防止内存和资源泄漏尤为重要。一个检测泄漏的实用工具是 `ioclasscount` 实用程序，它可以显示每个已知类（已加载到内核中）的实例计数。典型输出如下所示：\n\
  \n```\nCHUDUtils = 1\ncom_apple_AppleFSCompression_AppleFSCompressionTypeZlib =\
  \ 1\ncom_apple_BootCache = 1\ncom_apple_driver_AudioIPCDevice = 1\ncom_apple_driver_AudioIPCEngine\
  \ = 1\ncom_belkin_f2cd0007_adapter = 0\ncom_osxkernel_MyDebugDriver = 5\ncom_vmware_kext_KeyboardState\
  \ = 1\ncom_vmware_kext_UsbDevice = 2\ncom_vmware_kext_UsbPortArbiter = 1\n.....\n\
  ```\n\n它显示我们的驱动程序被保留（`retain()`）了五次。即使其控制的硬件设备已被移除，只要保留计数未归零，驱动程序的 `free()` 函数就不会被调用。这将阻止内核扩展完全卸载。通常，每次用户空间应用程序打开驱动程序时，保留计数都会增加；或者，由于另一个驱动程序或驱动程序使用的辅助支持类对其调用了\
  \ `retain()`，保留计数也会增加。未能使 `retain()` 调用与 `release()` 调用保持平衡将导致泄漏。`ioclasscount`\
  \ 实用程序无需修改内核启动参数即可使用；默认情况下它不会安装在系统上，而是作为 Xcode 分发版的一部分安装。在调试时，可以将其复制到没有 Xcode 的系统上。当一个驱动程序已被卸载，并且所有对其的引用都已释放（保留计数\
  \ = 0）时，它将被 `kextd` 守护进程卸载。尽管引用计数已降为零，但 KEXT 完全卸载可能需要一分钟。\n\n如果您能够使用 GDB 对内核进行实时调试，则可以使用诸如\
  \ `showallclasses` 或 `showregistry` 之类的宏，如下所示：\n\n```\n(gdb) showallclasses\n…\n\
  1    x    84 bytes com_vmware_kext_VmmonService\n2    x    80 bytes com_vmware_kext_UsbDevice\n\
  1    x   104 bytes com_vmware_kext_UsbPortArbiter\n1    x   136 bytes com_vmware_kext_UsbPortArbiterUserClient\n\
  1    x   132 bytes com_vmware_kext_KeyboardState\n1    x    92 bytes com_osxkernel_MyDebugDriver\n\
  ....\n(gdb) showregistry\n...\n      +-o com_osxkernel_MyDebugDriver  <object 0x0703e680,\
  \ id 0x1000007a9, vtable 0xcbc980,\n!registered, !matched, active, busy 0, retain\
  \ count 5>\n...\n```\n\n![images](img/square.jpg) **提示** `zprint` 和 `showioalloc`\
  \ 宏可以进一步帮助跟踪内存使用情况。\n\n为了进一步帮助调试引用计数错误，可以重写 `OSObject::taggedRetain(const void *tag)`\
  \ 和 `OSObject::taggedRelease(const void *)`。例如，打印一条消息或打印调用者栈的回溯，以帮助识别泄漏的来源。\n\n\n\
  \n### 摘要\n\n- 内核中可能出现一些常见问题，例如死锁和无效内存访问，进而可能导致内核崩溃。\n- 内核崩溃是一种防御机制，用于应对内核无法恢复的异常或错误状况。它基本上会禁用系统，以防止文件系统或其他文件存储遭到破坏。\n\
  - Mac OS X 开箱即提供了一系列有用的调试机制，从简单的追踪和日志记录机制，到对远程内核调试的内置支持。\n- 可以配置 Mac OS X 使用 `kdumpd`，在其崩溃时（或手动触发时）接受来自远程系统的核心转储。核心转储包含活动/固定内存，可以加载到\
  \ GDB 中。\n- 可以通过 FireWire 和以太网从远程系统调试内核。此机制是内置的，但默认未激活。通过设置适当的 NVRAM 参数和标志，可以启用远程调试。\n\
  - Apple 通常为每个发布的 Mac OS X 版本提供一个内核调试工具包 (Kernel Debug Kit)。该工具包包含脚本、内核的调试版本以及 I/O\
  \ Kit 框架 KEXT。调试工具包还包含用于简化 GDB 内核调试的宏。这些宏允许你获取有关调用栈的信息并检查内核的关键数据结构。在本地机器上运行的内核也可以使用\
  \ GDB 进行实时调试。\n- 要调试你自己的 KEXT，必须为其生成调试符号。由于 KEXT 在内核中动态加载，我们需要为 KEXT 生成正确的符号地址。内核调试工具包提供了\
  \ `createsymbolfiles` 脚本来帮助完成此操作。\n- 内核崩溃日志包含许多有用的信息，我们可以利用这些信息回溯并找到导致崩溃的位置。\n-\
  \ `ioclasscount` 工具可追踪 I/O Kit 中类的实例计数，并可用于检测内存泄漏或其他问题。\n\n## 第 17 章：高级内核编程\n\n\
  本章涵盖了更高级的内核程序员感兴趣的各种主题。我们将讨论如何在内核中使用流式 SIMD 扩展 (SSE) 和浮点运算。(SIMD 是单输入多数据 (Single\
  \ Input Multiple Data) 的缩写。) 我们还将研究处理多函数设备驱动程序的策略，并讨论 I/O Kit 框架的实现。我们将介绍内核控制 KPI，它可以用于与不使用\
  \ I/O Kit 的 KEXT（例如网络内核扩展 (NKE)）进行用户空间通信。我们还将展示如何在内核中操作和管理进程，例如获取进程的进程标识符 (PID)\
  \ 和向进程发送信号。某些驱动程序可能需要从文件系统加载额外的资源，例如固件映像。本章讨论了如何使用 `OSKextRequestResource()` 函数加载这些资源。本章最后讨论了驱动程序如何使用通知向用户空间守护进程发送消息。\n\
  \n### 内核中的 SSE 和浮点运算\n\n流式 SIMD 扩展 (SSE) 是 MMX 的后继者，是一种特殊的指令集，在大多数现代 Intel 和 AMD\
  \ 处理器上都能找到。它允许对值数组（向量）而不是单个值（标量）执行常见的指令，例如加法、乘法和移位。这可以极大地加速许多计算任务，尤其是在数字信号处理、音频、图形和视频等领域。通常情况下，内核并不是进行大量计算的好地方，但在某些领域这是不可避免的——例如，在音频驱动程序中，需要转换来自多个用户空间应用程序的音频采样并将其混合到单个输出缓冲区。RAID-5\
  \ 和 RAID-6 算法的软件实现也是可能需要在内核中进行计算并通过 SSE 进行优化的例子。\n\n传统上，在内核环境中使用 SSE 和浮点运算并非易事。某些操作系统（例如\
  \ Linux）要求你在使用前显式保存浮点/SSE 状态，并在使用后恢复；否则，线程的浮点状态可能会被覆盖。然而，在 Mac OS X 中，内核可以自由使用浮点运算和\
  \ SSE，而无需手动保存和恢复寄存器状态。通常，当一个线程用完它的时间片或因其他线程被抢占而停止执行时，该线程停止执行时的 CPU 寄存器状态会被保存到内存中，并在线程继续执行时恢复。为了优化性能，内核只存储通用寄存器，而不存储浮点和\
  \ SSE 寄存器，因为它们使用频率较低。实际上，许多程序根本不会使用浮点或 SSE。当另一个线程尝试使用这些寄存器时，CPU 会引发异常/陷阱，这将保存先前的内容并清除寄存器以供新线程使用。当原始线程即将恢复执行时，浮点和/或\
  \ SSE 寄存器将恢复到之前的状态。\n\n有两种使用 SSE 的方法：\n\n- 通过使用汇编或内联汇编直接使用 CPU 指令。\n- 通过使用 GCC 提供的内联函数\
  \ (intrinsic functions)，这些函数为大多数指令提供了更友好的 C 函数包装。对于 SSE2，这些函数在头文件 `emmintrin.h`\
  \ 中提供，该头文件不属于内核框架。但是，你可以复制该文件并将其包含在你的项目中。这是可行的，因为这些函数都是内联的，不依赖于任何外部库。\n\nSSE 指令集有许多修订版。目前最新的主要版本是\
  \ SSE4。一些较旧的系统可能不支持 2007 年推出的 SSE4。尝试在不支持 SSE4 的 CPU 上执行 SSE4 指令将导致内核崩溃。为防止这种情况，你需要在执行\
  \ SSE 指令之前提供对 CPU 能力的运行时检测，或者针对更旧的版本（例如 SSE2，它早于所有基于 Intel 的 Mac）。\n\n### 多函数驱动程序\n\
  \nUSB 和 PCI 设备可能是包含多个独立设备的复合设备，每个设备的功能可以由各自的驱动程序处理。其他设备可能由多个驱动程序处理的单个逻辑设备组成。让我们以带有\
  \ HDMI 输出端口的现代显卡为例。HDMI 能够同时传输音频和视频，因此提供一个允许该设备与 Core Audio 一起使用的音频驱动程序会很方便。该设备是显卡，因此其硬件不具备大多数音频硬件典型的\
  \ DMA 引擎。相反，音频数据在规则的垂直消隐间隔期间与视频帧一起发送。这种设计意味着音频和视频部分紧密关联，并且需要它们之间的共享状态才能运行。由于没有明确的分离，驱动程序可以如图\
  \ 17-1 所示进行构建。\n\n![图片](img/1701.jpg)\n\n**图 17-1.** 多函数驱动程序\n\n图 17-1 中的设计使用了一个中央驱动程序，它协调硬件并管理提供者。中央驱动程序用于匹配硬件提供者。然后，中央驱动程序会创建一个基于\
  \ `IOAudioFamily` 的音频驱动程序和一个基于 `IOGraphicsFamily` 的视频/图形驱动程序。管理从属驱动程序与中央驱动程序的关系有两种方法：\n\
  \n- 中央驱动程序、音频驱动程序和视频驱动程序可以位于不同的 KEXT 中。中央驱动程序匹配硬件资源，而音频和视频驱动程序将匹配中央驱动程序并将其用作提供者。\n\
  - 所有驱动程序可以位于同一个 KEXT 中。然后，中央驱动程序需要手动管理从属驱动程序的生命周期。\n\n\n\n### 编写 I/O Kit 家族（Families）\n\
  \n到目前为止，我们已经探讨了如何实现各种形式的驱动程序，其中大多数驱动都与一个或多个家族（family）进行交互。在某些情况下，你可能会想实现一个家族而不是一个驱动程序——例如，当你需要支持一种新的总线技术，或者拥有一系列依赖于相同基础设施或通用服务的硬件设备时。家族可以通过以下特征与驱动程序进行区分：\n\
  \n- 一个家族通常由多个 `IOService` 类组成，这些类被打包在一个 KEXT 中，以提供相关服务。\n- 可以将家族视为内核中用户空间共享库的对应物。\n\
  - 驱动程序依赖于家族，反之则不成立。\n- 家族不会被直接加载；它之所以被加载，是因为某个驱动程序声明了对其的依赖。\n- 家族没有匹配字典，也不参与被动或主动匹配。\n\
  - 与任何其他 KEXT 一样，家族安装于 `/System/Library/Extensions` 目录下。\n\n编写家族并没有特殊的 API 或方法。其实现方式与其他任何驱动程序完全相同。Apple\
  \ 建议专注于良好的基础面向对象设计，并让其自然演进，而不是特意着手创建一个家族。驱动程序可以通过其属性列表文件中的 `OSBundleLibraries` 键值来声明对某个家族（或任何其他\
  \ KEXT）的依赖。只有当所有依赖项都被解析并加载后，驱动程序才能被加载并链接到内核中。`kextd` 守护进程负责执行此任务。当需要加载驱动程序时，`kextd`\
  \ 守护进程会检查驱动程序的 `Info.plist` 文件以获取其依赖项。如果 `Info.plist` 错误地指定或未能列出某些依赖项，这将导致链接失败，并且驱动程序将无法加载。为了依赖于某个家族，驱动程序必须列出该家族的包标识符（bundle\
  \ ID）——例如 `com.apple.iokit.IOAudioFamily`——以及版本号——例如 `1.7.9fc8`。\n\nI/O Kit 保证在依赖于某个家族的驱动程序加载之前，该家族已被加载。这是必要的，否则驱动程序中的符号将无法解析。\n\
  \n由于 Apple 的许多 I/O Kit 家族都是开源代码，因此可以对它们进行修改并用修改后的版本替换原始版本。然而，不建议这样做，因为家族 KEXT 可能会被\
  \ Apple 随后的软件更新所覆盖，这意味着修改后的 KEXT 的功能可能会丢失。在某些情况下，通过插入额外的跟踪代码来修改家族可能有助于调试。\n\n扩展一个家族是直接修改它的更好选择。扩展起来很容易，因为\
  \ I/O Kit 家族中的大多数类都将其方法声明为虚方法（virtual），即使该类本身并非抽象类。你可能希望这样做有很多原因。例如，如果你需要支持一种 `IOUSBFamily`\
  \ 不支持的新型 USB 控制器，你可以创建自己的 `IOUSBController` 子类来表示这个新控制器。扩展后的类可以编译到需要它的驱动程序所在的同一个\
  \ KEXT 中，或者编译到你自己的库/家族 KEXT 中。`IONetworkingFamily` 和其他家族在设计时就专门支持这种形式的扩展。\n\n###\
  \ 内核控制 KPI\n\n内核控制接口 `<sys/kern_control.h>` 是一个 KPI，它允许 KEXT 与用户空间进程进行双向通信。内核控制系统位于内核的\
  \ BSD 部分，因此是用 C 语言而不是 C++ 编写的（I/O Kit 使用 C++）。\n\n该 KPI 旨在允许用户空间程序控制并配置 KEXT。例如，假设你已经实现了一个自定义防火墙\
  \ NKE（网络内核扩展）。然后，你可以使用内核控制 API 来告诉你的防火墙它应该阻止哪些地址或端口的流量，以及检索日志和统计数据。\n\n在核空间和用户空间使用该\
  \ KPI 都相对简单。实际上，在用户空间使用内核控制机制不需要特殊的 API，因为它是通过常规套接字访问的。可以使用 `getsockopt()` 或 `setsockopt()`\
  \ 系统调用函数从用户空间发出控制请求。可以将内核控制系统与 `ioctl()` 系统调用进行比较，但与 `ioctl()` 系统调用不同，内核控制系统更适合跨越内核/用户空间边界传输大量数据。从用户空间发送和接收数据时，支持使用\
  \ `send()` 和 `recv()` 系统调用函数。在内核中，数据传输是使用前面讨论过的 `mbuf` 数据结构来处理的。\n\n要使用内核控制接口，必须首先注册一个新接口，这可以确保用户空间的客户端能够找到它并与之建立连接。这可以通过声明并填充一个包含各种事件回调以及标识名称的\
  \ C 结构体来实现。C 语言不是面向对象的，因此“对象”通常由包含数据和函数指针的结构体来表示。注册结构体如 代码清单 17-1 所示。\n\n**代码清单\
  \ 17-1.** 来自 `<sys/kern_control.h>` 的 `kern_ctl_reg` 结构体\n\n```c\nstruct kern_ctl_reg\n\
  {\n    /* 控制信息 */\n    char                        ctl_name[MAX_KCTL_NAME];\n  \
  \  u_int32_t                   ctl_id;\n    u_int32_t                   ctl_unit;\n\
  \    /* 控制设置 */\n    u_int32_t                   ctl_flags;\n    u_int32_t     \
  \              ctl_sendsize;\n    u_int32_t                   ctl_recvsize;\n  \
  \  /* 分派函数 */\n    ctl_connect_func            ctl_connect;\n    ctl_disconnect_func\
  \         ctl_disconnect;\n    ctl_send_func               ctl_send;\n    ctl_setopt_func\
  \             ctl_setopt;\n    ctl_getopt_func             ctl_getopt;\n};\n```\n\
  \n让我们更详细地查看结构体的各个字段：\n\n- `ctl_name` 应设置为 KEXT 的包标识符（bundle ID）。\n- `ctl_id` 字段用于额外的寻址，因为一个\
  \ KEXT 可能同时注册多个内核控制。`ctl_id` 字段可以动态注册，也可以由 Apple 开发者技术支持（DTS）分配。\n- 仅当使用 DTS 分配的\
  \ ID 时，才使用 `ctl_unit` 字段。\n- `ctl_flags` 只有两个标志位。第一个是 `CTL_FLAG_PRIVILEGED`，如果设置了此标志，则意味着用户空间程序必须拥有\
  \ root 权限才能连接到该内核控制。第二个标志是 `CTL_FLAG_REG_ID_UNIT`，如果使用 DTS 分配的 ID，则应设置此标志。\n- `ctl_sendsize`\
  \ 和 `ctl_recvsize` 字段可用于调整通过 `send()` 和 `recv()` 发送数据时的发送和接收缓冲区大小。\n\n其余字段是函数指针，当相应的事件发生时，这些函数将被调用：\n\
  \n- 当用户空间客户端连接或断开连接时，将分别调用 `ctl_connect` 和 `ctl_disconnect` 回调。\n- 当客户端使用 `setsockopt()`\
  \ 或 `getsockopt()` 函数时，会调用 `ctl_setopt` 和 `ctl_getopt` 回调。这些函数通常用于获取或设置配置参数。接下来是\
  \ `ctl_send` 回调，这个名称可能有点令人困惑，因为它不是用于发送数据，而是用于从发送数据的客户端接收数据。要实际发送数据，请使用 `ctl_enqueuedata()`\
  \ 函数。\n\n\n\n#### 内核控制注册\n\n我们来看一个如何使用内核控制接口的示例（`HelloKernControl`）。在此示例中，你将实现一个最简化的内核控制，包含一个`get`操作和一个`set`操作。`get`操作返回内核中存储的一个字符串，`set`操作则会覆盖该字符串，使得后续的`get`操作返回新的字符串。以下是一个已填好的内核控制注册结构体示例：\n\
  \n```\nstatic struct kern_ctl_reg g_kern_ctl_reg = {\n    \"com.osxkernel.HelloKernControl\"\
  ,\n    0,\n    0,\n    CTL_FLAG_PRIVILEGED,\n    0,\n    0,\n    hello_ctl_connect,\n\
  \    hello_ctl_disconnect,\n    NULL,\n    hello_ctl_set,\n    hello_ctl_get\n};\n\
  ```\n\n我们使用动态分配的 ID，并指定该内核控制仅允许特权客户端（root）访问。我们定义了四个回调函数，但将`ctl_send`回调设为`NULL`，因为本例中不支持该功能。以下是用于注册和注销内核控制的代码：\n\
  \n```\nstatic boolean_t g_filter_registered = FALSE;\nstatic kern_ctl_ref g_ctl_ref;\n\
  \nkern_return_t HelloKernControl_start (kmod_info_t* ki, void* d)\n{\n    strncpy(g_string_buf,\
  \ DEFAULT_STRING, strlen(DEFAULT_STRING));\n\n    /* 注册控制 */\n    int ret = ctl_register(&g_kern_ctl_reg,\
  \ &g_ctl_ref);\n\n    if (ret == KERN_SUCCESS)\n    {\n        g_filter_registered\
  \ = TRUE;\n        return KERN_SUCCESS;\n    }\n    return KERN_FAILURE;\n}\n\n\
  kern_return_t HelloKernControl_stop (kmod_info_t* ki, void* d)\n{\n    if (g_clients_connected\
  \ != 0)\n        return KERN_FAILURE;\n\n    if (g_filter_registered)\n        ctl_deregister(g_ctl_ref);\n\
  \n    return KERN_SUCCESS;\n}\n```\n\n你在 KEXT 的`start()`函数中注册接口，并在`stop()`函数中注销接口，该函数会在\
  \ KEXT 被卸载前调用。由于内核控制通常会与用户空间共享数据，因此有必要定义一个共享头文件，用于存储内核和用户空间共同使用的声明。`HelloKernControl`的共享头文件如下例所示：\n\
  \n```\n#ifndef HelloKernControl_HelloKernControl_h\n#define HelloKernControl_HelloKernControl_h\n\
  \n#define BUNDLE_ID \"com.osxkernel.HelloKernControl\"\n\n#define HELLO_CONTROL_GET_STRING\
  \  1\n#define HELLO_CONTROL_SET_STRING  2\n\n#define DEFAULT_STRING            \"\
  Hello World\"\n#define MAX_STRING_LEN            256\n\n#endif\n```\n\n#### 客户端连接\n\
  \n以下是连接与断开回调函数的实现：\n\n```\nstatic int hello_ctl_connect(kern_ctl_ref ctl_ref, struct\
  \ sockaddr_ctl *sac, void** unitinfo)\n{\n    printf(\"进程 pid=%d 已连接\\n\", proc_selfpid());\n\
  \    return 0;\n}\nstatic errno_t hello_ctl_disconnect(kern_ctl_ref ctl_ref, u_int32_t\
  \ unit, void* unitinfo)\n{\n    printf(\"进程 pid=%d 已断开连接\\n\", proc_selfpid());\n\
  \    return 0;\n}\n```\n\n在上例中，`hello_ctl_connect()`函数记录了打开内核控制的客户端的 PID。通常需要维护一个按客户端划分的数据结构。该数据结构应赋值给`unitinfo`参数——例如：`*uinitinfo\
  \ = myStructure;`。这样，在其他回调函数中就可以获取该结构体。如果在客户端连接时分配了内存，则应在断开连接的回调中释放内存。如果你希望拒绝某个客户端——例如，因为同一时间只允许一个客户端，或最大客户端数已满——只需返回一个错误码，例如`EBUSY`或`EPERM`。\n\
  \n#### 获取与设置选项\n\n一旦客户端成功连接，它就可以开始向内核控制发起`get`/`set`选项请求。控制`get`函数的实现如下：\n\n```\n\
  static int hello_ctl_get(kern_ctl_ref ctl_ref, u_int32_t unit, void *unitinfo, int\
  \ opt,\n                         void *data, size_t *len)\n{\n    int ret = 0;\n\
  \    switch (opt) {\n        case HELLO_CONTROL_GET_STRING:\n            *len =\
  \ min(MAX_STRING_LEN, *len);\n            strncpy(data, g_string_buf, *len);\n \
  \           break;\n        default:\n            ret = ENOTSUP;\n            break;\n\
  \    }\n    return ret;\n}\n```\n\n`opt`参数来自客户端，指定了客户端感兴趣的选项。常见的做法是创建一个共享头文件，其中包含\
  \ KEXT 和用户空间程序共用的选项定义。\n\n![images](img/square.jpg) **警告：** 共享数据结构时要格外小心，因为 KEXT\
  \ 和用户空间程序可能对结构体进行不同的对齐填充。这可能导致错误、数据损坏甚至更严重的问题。\n\n上述 case 仅处理了一个选项。该选项由`HELLO_CONTROL_GET_STRING`定义，它返回全局变量`g_string_buf`中的字符串，该变量在所有客户端之间共享。如果在连接回调中分配了私有数据，可以通过将`unitinfo`参数的数据类型进行转换来获取它。\n\
  \n为了将字符串返回给客户端，你需要将其复制到`data`参数指向的内存地址。`len`参数是一个输入/输出参数，包含了数据缓冲区的长度。显然，你必须确保不会越界写入。如果向缓冲区写入了数据，则应修改`len`以反映实际写入的字节数。\n\
  \n`set`选项函数的实现非常相似：\n\n```\nstatic int hello_ctl_set(kern_ctl_ref ctl_ref, u_int32_t\
  \ unit, void* unitinfo, int opt,\n                         void* data, size_t len)\n\
  {\n    int ret = 0;\n    switch (opt) {\n        case HELLO_CONTROL_SET_STRING:\n\
  \            strncpy(g_string_buf, (char*)data, min(MAX_STRING_LEN, len));\n   \
  \         printf(\"HELLP_CONTROL_SET_STRING: 新字符串设置为：\\\"%s\\\"\\n\", g_string_buf);\n\
  \            break;\n       default:\n            ret = ENOTSUP;\n            break;\n\
  \   }\n   return ret;\n}\n```\n\n与控制`get`选项函数类似，我们通过`data`和`len`参数接收来自用户空间的缓冲区数据及其长度。该数据在函数返回后即失效，因此你必须复制任何需要保留的数据。\n\
  \n\n\n### 从用户空间访问内核控制接口\n\n清单 17-2 中的示例演示了如何连接前文所述的内核控制接口。\n\n**清单 17-2.** *用于连接内核控制接口的用户空间工具*\n\
  \n```c\n#include <stdio.h>\n#include <stdlib.h>\n#include <strings.h>\n#include\
  \ <unistd.h>\n\n#include <sys/socket.h>\n#include <sys/ioctl.h>\n#include <sys/kern_control.h>\n\
  #include <sys/sys_domain.h>\n\n#include \"HelloKernControl.h\"\n\nint main(int argc,\
  \ char* const*argv)\n{\n    struct ctl_info ctl_info;\n    struct sockaddr_ctl sc;\n\
  \    char str[MAX_STRING_LEN];\n\n    int sock = socket(PF_SYSTEM, SOCK_DGRAM, SYSPROTO_CONTROL);\n\
  \       if (sock < 0)\n       return -1;\n\n    bzero(&ctl_info, sizeof(struct ctl_info));\n\
  \    strcpy(ctl_info.ctl_name, \"com.osxkernel.HelloKernControl\");\n\n    if (ioctl(sock,\
  \ CTLIOCGINFO, &ctl_info) == -1)\n       return -1;\n\n    bzero(&sc, sizeof(struct\
  \ sockaddr_ctl));\n    sc.sc_len = sizeof(struct sockaddr_ctl);\n    sc.sc_family\
  \ = AF_SYSTEM;\n    sc.ss_sysaddr = SYSPROTO_CONTROL;\n    sc.sc_id = ctl_info.ctl_id;\n\
  \    sc.sc_unit = 0;\n\n    if (connect(sock, (struct sockaddr *)&sc, sizeof(struct\
  \ sockaddr_ctl)))\n        return -1;\n\n    /* 从内核获取现有字符串 */\n    unsigned int\
  \ size = MAX_STRING_LEN;\n    if (getsockopt(sock, SYSPROTO_CONTROL, HELLO_CONTROL_GET_STRING,\
  \ &str, &size) == -1)\n        return -1;\n\n    printf(\"kernel string is: %s\\\
  n\", str);\n\n    /* 设置新字符串 */\n    strcpy(str, \"Hello Kernel, here's your new\
  \ string, enjoy!\");\n    if (setsockopt(sock, SYSPROTO_CONTROL, HELLO_CONTROL_SET_STRING,\n\
  \                   str, (socklen_t)strlen(str)) == -1)\n        return -1;\n\n\
  \    close(sock);\n\n    return 0;\n}\n```\n\n执行清单 17-2 中的程序后，您应看到以下结果：\n\n```\n\
  $ sudo kextload HelloKernControl.kext\n\n$ sudo ./hello_tool\nkernel string is:\
  \ Hello World\n$ sudo ./hello_tool\nkernel string is: Hello Kernel, here's your\
  \ new string, enjoy!\n```\n\n### 在内核中处理进程\n\n内核的 BSD 部分提供了一个 KPI，用于获取系统中活动进程的信息。请注意，BSD\
  \ 中使用的是术语*进程*，而 Mach 内核部分使用的是*任务*，尽管它们实际上指的是同一事物。\n\n**内核私有 KPI**\n\n如果您在内核头文件中仔细查找，可能会遇到预处理器指令\
  \ `KERNEL_PRIVATE`。这些区域内定义的函数或其他符号不允许第三方内核扩展使用，即使包含了正确的头文件，尝试使用它们也会因无法解析的符号而导致该\
  \ KEXT 加载失败。Apple 自身的 KEXT 通过添加对 `com.apple.kpi.private` 的依赖来访问这些符号。如果您在自己的 KEXT\
  \ 中添加对此 KPI 的依赖，它将无法加载，因为只有 Apple 签名的 KEXT 才能使用它。\n\n在第 13 章的 AppWall 示例中，您已经看到如何获取进程信息的示例，当时我们使用了\
  \ `proc_selfname()` 函数来获取当前运行进程的进程名。如果该函数在内核拥有的线程中被调用，则会返回内核进程名称 `\"kernel_task\"\
  `。\n\n如果您需要知道当前运行进程的 PID 而不是名称，可以调用 `proc_selfpid()`。您也可以使用 `proc_name(int pid,\
  \ char * buf, int size)` 函数通过已知的 PID 来查找进程名称。表 17-1 概述了进程 KPI 中的函数。\n\n![images](img/t1701.jpg)\n\
  \n![images](img/t1701a.jpg)\n\n### 加载资源\n\nI/O Kit 不提供任何让驱动程序访问文件系统的类或函数。这是一个深思熟虑的设计决定，而非\
  \ I/O Kit 设计中的疏忽。理论上，驱动程序不应需要访问磁盘上的文件。驱动程序的作用是响应操作系统的请求以管理其硬件设备，而不是主动发起请求。然而，在实践中，驱动程序可能需要从文件系统访问数据的原因有很多。最常见的原因之一是读取资源数据，例如驱动程序硬件的固件数据。\n\
  \n尽管 I/O Kit 不允许常规的文件系统访问，但它确实提供了让驱动程序从其驱动程序包内的 \"Resources\" 目录访问文件的方法。I/O Kit\
  \ 的资源加载 API 定义在头文件 `<libkern/OSKextLib.h>` 中。该 API 是异步的：驱动程序请求加载其所需的资源，并提供一个回调函数，I/O\
  \ Kit 会在数据可用时通过该回调通知驱动程序。\n\n我们提到 I/O Kit 不提供常规的文件系统访问，但除此之外，I/O Kit 本身也无法访问文件系统。为了加载驱动程序的资源文件，I/O\
  \ Kit 依赖于一个用户空间辅助进程，该进程代表 I/O Kit 读取请求的文件，并将文件内容传回给 I/O Kit。然后 I/O Kit 通知发出请求的驱动程序。\n\
  \n由于 I/O Kit 依赖用户空间辅助进程来加载资源，因此在辅助进程启动之前，无法在启动过程中加载资源。然而，在大多数情况下，这不会对驱动程序造成问题，因为\
  \ I/O Kit 会将请求排队，直到辅助进程准备好从内核接收请求。\n\n驱动程序可以通过调用 `OSKextRequestResource()` 函数来请求\
  \ I/O Kit 从驱动程序的资源目录加载文件。该函数的定义如下：\n\n```c\nOSReturn OSKextRequestResource(const\
  \ char* kextIdentifier,\n                               const char* resourceName,\n\
  \                               OSKextRequestResourceCallback  callback,\n     \
  \                          void* context,\n                               OSKextRequestTag*\
  \ requestTagOut);\n```\n\n第一个参数 `kextIdentifier` 指定包含待加载资源的驱动程序的包标识符；这几乎总是由驱动程序\
  \ `Info.plist` 文件中的 `CFBundleIdentifier` 键指定的值。第二个参数 `resourceName` 是要从驱动程序包中加载的资源文件的名称。接下来的两个参数是回调函数和相关的上下文参数，该参数在资源加载完成后传递给回调函数。最后一个参数\
  \ `requestTagOut` 会立即返回给调用者，可用于跟踪加载资源的操作。\n\n如果对 `OSKextRequestResource()` 的调用成功，当请求完成时，驱动程序将通过其指定的回调函数收到通知。完成回调具有以下签名：\n\
  \n```c\ntypedef void (*OSKextRequestResourceCallback)(OSKextRequestTag requestTag,\n\
  \                                              OSReturn result,\n              \
  \                                const void* resourceData,\n                   \
  \                           uint32_t resourceDataLength,\n                     \
  \                         void* context);\n```\n\n\n\n提供给回调函数的第一个参数 `requestTag`，用于标识此完成回调所引用的资源。第二个参数\
  \ `result` 告知调用者操作是否成功完成。如果 `result` 的值为 `kIOReturnSuccess`，则表明已成功从磁盘读取资源数据，接下来的两个参数\
  \ `resourceData` 和 `resourceDataLength` 包含所请求资源文件的内容。`resourceData` 缓冲区仅在回调函数内有效，因此如果驱动程序希望在回调之外引用资源数据，必须制作一份数据副本。最后一个参数\
  \ `context` 包含传递给 `OSKextRequestResource` 函数的上下文参数值。\n\n剩下的步骤是将资源文件添加到驱动程序包中。通过\
  \ `OSKextRequestResource` 函数加载的任何资源都必须位于驱动程序包的 `Resources` 子目录中。大多数情况下，可以通过将该文件添加到驱动程序的\
  \ Xcode 项目来实现此目的。对于除源代码之外的文件类型，Xcode 在构建项目时默认会将文件复制到包的资源目录中。\n\n#### 超越 KEXT 资源\n\
  \n上一节讨论的资源加载函数是为特定目的而设计的。I/O Kit 函数为驱动程序提供了对其 `Resources` 目录中文件内容的只读访问权限。然而，在许多情况下，驱动程序访问其包之外的文件或写入磁盘上的文件是很有用的。例如，提供持久化设置的驱动程序需要某种方法来从磁盘上的文件读取这些设置。它还需要一种方法将这些设置写入磁盘。\n\
  \n尽管 I/O Kit 不包含为驱动程序提供此类功能的函数，但其资源加载函数的实现为我们提供了如何将此类功能添加到我们自己的驱动程序中的线索。正如 I/O Kit\
  \ 依赖用户空间守护进程代表内核加载资源文件一样，驱动程序可以通过提供自己的用户空间守护进程来处理代表其发出的请求，从而实现对磁盘上文件中持久化设置的读写。下一节将介绍这种设计，它开辟了一种更通用的解决方案，可以扩展到驱动程序偏好设置之外。\n\
  \n### 来自内核驱动程序的通知\n\n从内核驱动程序访问任意文件系统项的通用解决方案是实现一个用户空间守护进程，作为内核驱动程序的辅助进程。此进程将处理来自驱动程序的请求，执行指定的操作，然后将操作结果传回驱动程序。这种方法可以扩展到读取和写入文件等请求之外，并可用于执行内核中无法实现的操作，例如向用户显示对话框。源自内核的用户交互的一个典型例子是标准\
  \ USB 家族，当连接一个需要比 USB 总线所能提供的更多功率的设备时，它会显示一个警告对话框。\n\n![images](img/square.jpg)\n\
  \n**注意：** `IOUSBFamily` 目前使用一个称为内核-用户通知中心的已弃用接口来显示警告消息，例如低电量警告。I/O Kit 曾经提供一个 API，允许驱动程序通过标准的系统守护进程显示对话框。然而，这个\
  \ API 现已弃用，驱动程序现在必须提供自己的守护进程。\n\n驱动程序希望执行的任何在内核中无法实现的操作，例如写入文件、显示错误消息，甚至启动应用程序，都可以通过用户空间守护进程来执行。实际上，驱动程序代码被分为两部分：内核驱动程序和用户空间守护进程。这种设计使用了在第\
  \ 5 章中讨论的相同技术。不过，不是用户启动用户空间进程，而是由系统自动启动一个后台守护进程。\n\n用户空间守护进程和驱动程序协同工作以执行某些操作。大多数时候，用户空间守护进程处于空闲状态。它仅在收到来自内核驱动程序的请求时才会行动。用户空间守护进程需要响应三种通知：\n\
  \n- 新内核驱动程序的加载\n- 内核驱动程序的卸载\n- 来自驱动程序的操作请求\n\n由于守护进程将在系统启动时启动，它可能在其对应的内核驱动程序启动之前就启动了。因此，该进程应安装一个回调，以便在其内核驱动程序启动或停止时接收通知。在大多数情况下，守护进程与驱动程序实例之间是一对多的关系，单个守护进程将处理来自当前加载的所有驱动程序实例的请求。\n\
  \n守护进程可以通过为其驱动程序安装匹配字典来监视其内核驱动程序实例的加载和卸载，如第 5 章所述。无论是后台守护进程还是具有用户界面的应用程序，进程执行此操作的步骤都是相同的。守护进程能够通过驱动程序的\
  \ `IOUserClient` 类发送请求，使用第 5 章中描述的 I/O Kit 框架的函数与其内核驱动程序进行通信。\n\n在第 5 章中，您了解了用户空间进程如何向内核驱动程序发出请求并发送数据。这一点很重要，因为守护进程将使用这种方法将操作结果发送回内核驱动程序。现在，我们将介绍进程如何接收来自内核的通知，例如代表驱动程序执行操作的请求——例如，向用户显示错误消息。\n\
  \n从内核驱动程序到用户空间守护进程的通信通过 Mach 端口进行。建立内核驱动程序可用于向用户空间进程发送通知的通信通道涉及以下步骤：\n\n\n1.  用户空间守护进程通过调用`IOServiceOpen()`定位其驱动实例并打开与该驱动的用户客户端的连接，如第\
  \ 5 章所述。\n2.  守护进程创建一个能够接收内核驱动通知的`mach`端口。此操作通过调用`CFMachPortCreate()`函数完成。该函数接受多个参数，包括一个用于传递通知的回调函数。\n\
  3.  守护进程为该`mach`端口创建运行循环源，并将其安装到其某个线程的运行循环中。之后，当在`mach`端口上收到通知时，会在运行循环线程上执行守护进程的回调。\n\
  4.  守护进程通过调用`IOConnectSetNotificationPort()`函数将`mach`端口传递给内核驱动。作为响应，驱动的用户客户端会调用其`registerNotificationPort()`方法。\n\
  5.  在内核中，用户客户端实现了虚方法`registerNotificationPort()`。客户端接收由用户空间守护进程创建的`mach`端口，并将其值保存在一个实例变量中。\n\
  6.  当驱动希望通知用户空间守护进程某个事件时，会调用`mach_msg_send_from_kernel()`函数，并提供其希望传递给用户空间守护进程的任何数据。\n\
  7.  作为响应，守护进程的回调函数会被调用。该回调函数接收从内核驱动传递过来的任何数据，并处理内核的请求。如果操作结果需要回传给内核，用户空间守护进程可以通过调用驱动的用户客户端定义的任何方法来实现，如第\
  \ 5 章所述。\n\n在本节的剩余部分，我们将通过一个示例来演示如何将通知从内核驱动发送到用户空间进程。首先，你需要定义一个结构体，用于描述要从内核驱动发送到用户空间守护进程的数据。该结构体必须以`mach_msg_header_t`结构体开头，因为它描述了用户空间守护进程中将要接收数据的`mach`目标端口。在`mach_msg_header_t`字段之后，该结构体可以包含多个字段，用于允许将任意数据随通知一起发送到用户空间守护进程。该结构体的定义必须对用户空间守护进程和内核驱动都是可访问的，因此应放置在一个两个项目都能包含的头文件中。以下是允许将两个整数参数从内核传递到用户守护进程的结构体定义示例：\n\
  \n```\ntypedef struct {\n    mach_msg_header_t       messageHeader;\n    uint32_t\
  \                customParameter1;\n    uint32_t                customParameter2;\n\
  } MyNotificationMessage;\n```\n\n下面列出的代码是接收内核发送的通知的用户空间回调函数示例。名为`msg`的参数包含了整个`MyNotificationMessage`结构体，包括添加的两个任意整数。这些位于消息头部之后的额外字段，既可用于描述驱动希望用户空间守护进程执行的操作，也可用于传递该操作所需的其他参数。\n\
  \n```\nvoid   MyDriverRequestCallback (CFMachPortRef port, void *msg, CFIndex size,\
  \ void *info)\n{\n    MyNotificationMessage* notify = (MyNotificationMessage*)msg;\n\
  \n    printf(\"Param 1 is %x, param 2 is %x\\n\", notify->customParameter1,\n  \
  \          notify->customParameter2);\n}\n```\n\n列表 17-3 中显示的代码片段演示了用户空间守护进程为安装一个用于接收内核驱动通知的`mach`端口所必须采取的步骤。第一步是分配一个`mach`端口和相应的运行循环源，并将该`mach`端口安装到其运行循环中。接下来，将这个`mach`端口提供给内核驱动。每当驱动希望向用户空间进程发送通知时，该请求都会通过提供的`mach`端口进行传递。\n\
  \n***列表 17-3.** 用于安装回调以接收内核驱动通知的用户空间代码*\n\n```\nCFMachPortContext      portContext;\n\
  CFMachPortRef          notificationPort = NULL;\nCFRunLoopSourceRef     runLoopSource\
  \ = NULL;\nkern_return_t          kr;\n\n// Set up the CFMachPortContext structure\
  \ that is needed when creating the mach port.\nportContext.version = 0;\nportContext.info\
  \ = (void*)context; // Arbitrary pointer provided to the callback\nportContext.retain\
  \ = NULL;\nportContext.release = NULL;\nportContext.copyDescription = NULL;\n\n\
  // Create a mach port.\nnotificationPort = CFMachPortCreate(kCFAllocatorDefault,\
  \ MyDriverRequestCallback, &portContext,  NULL);\nif (notificationPort)\n{\n   \
  \ // Create a run loop source for the mach port.\n    runLoopSource = CFMachPortCreateRunLoopSource(kCFAllocatorDefault,\
  \ notificationPort, 0);\n    // Install the run loop source on the run loop that\
  \ corresponds to the current thread.\n    CFRunLoopAddSource(CFRunLoopGetCurrent(),\
  \ runLoopSource, kCFRunLoopDefaultMode);\n}\n// Pass the notification port to the\
  \ driver.\nkr = IOConnectSetNotificationPort(driverConnection, 0,\n            \
  \                      CFMachPortGetPort(notificationPort), 0);\n```\n\n用户空间函数`IOConnectSetNotificationPort()`会导致调用驱动的用户客户端的`registerNotificationPort()`方法。这是一个在`IOUserClient`基类中定义的虚方法，但需要由每个子类来实现。在下面的示例实现中，`registerNotificationPort()`方法复制了对应于用户空间进程通知端口的`mach`端口，以便将来当驱动希望向用户空间进程发送信号时可以使用它。\n\
  \n```\nIOReturn       com_osxkernel_driver_IOKitTestUserClient::\n       registerNotificationPort\
  \ (mach_port_t port, UInt32 type, io_user_reference_t refCon)\n{\n    m_notificationPort\
  \ = port;\n    return kIOReturnSuccess;\n}\n```\n\n在设置了进程的通知端口之后，内核驱动现在能够在需要时向用户空间守护进程发送信号。这通常通过`IOUserClient`子类来执行，因为通知端口特定于某个用户客户端。一个可被调用以向用户空间进程传递两个任意整数的自定义用户客户端方法示例，如列表\
  \ 17-4 所示。\n\n***列表 17-4.** 一个从驱动向用户空间进程发送通知的自定义方法*\n\n```\nIOReturn       com_osxkernel_driver_IOKitTestUserClient::\n\
  \       mySendNotification (uint32_t parameter1, uint32_t parameter2)\n{\n    MyNotificationMessage\
  \  notification;\n    IOReturn               result;\n\n    if (m_notificationPort\
  \ == MACH_PORT_NULL)\n        return kIOReturnError;\n\n    // Set up the standard\
  \ mach_msg_header_t fields.\n    notification.messageHeader.msgh_bits = MACH_MSGH_BITS(MACH_MSG_TYPE_COPY_SEND,\
  \ 0);\n    notification.messageHeader.msgh_size = sizeof(MyNotificationMessage);\n\
  \    notification.messageHeader.msgh_remote_port = m_notificationPort;\n    notification.messageHeader.msgh_local_port\
  \ = MACH_PORT_NULL;\n    notification.messageHeader.msgh_reserved = 0;\n    notification.messageHeader.msgh_id\
  \ = 0;\n\n    notification.customParameter1 = parameter1;\n    notification.customParameter2\
  \ = parameter2;\n\n    // Send the request to user space\n    result = mach_msg_send_from_kernel(\n\
  \                 &notification.messageHeader, sizeof(MyNotificationMessage));\n\
  \n    return result;\n}\n```\n\n\n### 总结\n\n本章涵盖：\n\n- 如何在内核中使用浮点和 SSE。你了解到，OS X\
  \ 与其他操作系统不同，无需任何特殊操作即可支持这些功能。\n- 编写多功能驱动程序的策略。\n- 内核控制 KPI 是一种 BSD KPI，可用于内核扩展与用户空间之间的通信。它通常与网络内核扩展（NKE）结合使用，但在\
  \ I/O Kit 中很少使用。\n- 我们介绍了从内核处理进程的 KPI。该 KPI 包含用于发送信号以及获取进程名称和进程标识符（PID）的函数。\n- 内核扩展如何从其\
  \ bundle 中加载外部资源，以及如何处理驱动程序偏好设置。\n- 内核扩展如何向用户空间进程发送消息和通知。\n\n## 第 18 章：部署\n\n到目前为止，我们提供了背景信息，并探讨了多种类型驱动程序和内核扩展的实际实现。本章重点介绍如何为最终用户交付做准备。Apple\
  \ 以提供用户友好的软件（和硬件）解决方案而闻名；Apple 及其客户都期望第三方供应商能提供同样水平的客户体验。用复杂的安装程序让客户或用户感到困扰，是在任何平台上将业务拱手让给竞争对手的好方法。部署像内核扩展这样的软件起初看似简单，但需要考虑众多问题，例如如何兼容各种不同的硬件和操作系统版本。许多客户可能不愿升级，大型企业或政府机构更是如此——因此，你可能需要同时支持最前沿的和旧版的操作系统，所有这些版本可能具有不同特性，需要特殊处理。除了外部因素，软件的分发也可能很复杂。你很少会只分发\
  \ KEXT 本身；它通常还需要额外的捆绑软件。例如，计算机显卡可能会附带一个系统偏好设置面板、一个用于访问设备特殊功能的框架、用于升级固件的应用程序，以及可能捆绑用于展示显卡功能的游戏等应用程序。你还需要处理客户可能升级或降级你软件发行版的情况。\n\
  \n虽然这一切看似艰巨——也确实如此——但仍有希望。像往常一样，Apple 提供了简化此过程的工具。对于部署，更高级的软件安装工具是 `PackageMaker`。`PackageMaker`\
  \ 允许通过易用的图形用户界面来创建安装向导。`PackageMaker` 还具有命令行工具功能，可用于将包构建集成到更大的构建系统中。\n\n### 安装与加载内核扩展\n\
  \nKEXT bundle 通常安装在系统目录 `/System/Library/Extensions` 中。你也可以将 KEXT 保存到此目录之外；但随后需要使用下一节概述的方法自行负责加载\
  \ KEXT。KEXT 仍然需要设置正确的权限。为了能够被 KEXT 守护进程（`kextd`）加载，KEXT 必须由 root 用户拥有，属于 `wheel`\
  \ 组，并具有权限掩码 `0755`。\n\n对于基于 I/O Kit 的驱动程序，当其在 I/O Registry 中注册了提供者时（假设 KEXT 在其 `Info.plist`\
  \ 文件中定义了合适的 personality），KEXT 通常会由 KEXT 守护进程自动加载。未与硬件提供者关联的 KEXT 可以在系统启动时使用 `IOResources`\
  \ 节点作为提供者来自动加载。对于非基于 I/O Kit 的 KEXT，例如 NKE 或虚拟网络驱动程序，这将无法实现，因为 `IOResources` 不适用于\
  \ I/O Kit 之外的 KEXT。\n\n对于非 I/O Kit 的 KEXT，可以创建一个 Launch Daemon。Launch Daemons 和\
  \ Agents 是 Apple 对许多传统 UNIX 服务（包括 `init.d`、`cron` 和 `inetd`）的替代品。Agents 在用户登录系统时根据该用户的安全权限运行。而\
  \ Daemons 则是系统级的，通常以 root 权限运行。我们可以使用 Launch Daemon 在计算机启动时执行一个 shell 脚本，该脚本进而加载我们的\
  \ KEXT。要创建一个 launch agent，只需定义一个如 清单 18-1 所示的 `plist` 文件。\n\n**清单 18-1.** Launch\
  \ Daemon 属性列表文件\n\n```\n<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist\
  \ PUBLIC \"-//Apple Computer//DTD PLIST 1.0//EN\"\n        \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\"\
  >\n<plist version=\"1.0\">\n<dict>\n    <key>Label</key>\n    <string>com.osxkernel.launchd.HelloWorld</string>\n\
  \    <key>ProgramArguments</key>\n    <array>\n        <string>/Library/Application\\\
  \ Support/HelloWorld/loadkext.sh</string>\n        <string>load</string>\n    </array>\n\
  \    <key>RunAtLoad</key>\n    <true/>\n</dict>\n</plist>\n```\n\n该文件应安装到 `/System/Library/LaunchDaemon`\
  \ 或 `~/Library/LaunchDaemon`，文件名为 `com.osxkernel.launchd.HelloWorld.plist`。现在，Launch\
  \ Daemon 将在启动期间触发 `loadkext.sh` 脚本。该脚本本身可以实现为 清单 18-2 所示。\n\n**清单 18-2.** 用于加载 KEXT\
  \ 的 UNIX Shell 脚本\n\n```\n#!/bin/sh\nCOMMAND=$1\n\nTHEKEXT=/System/Library/Extensions/HelloWorld.kext\n\
  \nif [ -f \"$THEKEXT\" ]\nthen\n    echo \"KEXT does not exist\"\n    exit 1\nfi\n\
  if [ \"$COMMAND\" = \"load\" ]\nthen\n        kextload $THEKEXT\nelif [ \"$COMMAND\"\
  \ = \"unload\" ]\nthen\n        kextunload $THEKEXT\nfi\n```\n\n\n\n在某些情况下，你可能希望按需加载内核扩展（KEXT），而不是在系统启动时加载。例如，对于一个\
  \ VPN（虚拟专用网络）应用程序，它可能会附带一个 `KEXT` 来处理自定义的网络级加密方案或安装一个虚拟 VPN 接口。这个 `KEXT` 仅在应用程序保持活动状态时才需要。让它在活动状态下运行会浪费内存资源，并且在启动时加载它可能会影响启动时间。此外，由于\
  \ `KEXT` 会与网络栈交互，它实际上可能会妨碍并影响系统的网络性能。在这种情况下，应用程序可能希望动态地加载和卸载 `KEXT`。这可以通过使用类似前面的脚本实现。应用程序需要以\
  \ root 权限运行才能加载和卸载 `KEXT`。然而，将整个应用程序设为 `setuid` root 并不是一个好主意，因为这可能导致严重的安全问题。另一种解决方案是使用\
  \ `AuthorizationExecuteWithPrivileges()` API 执行一个最小的辅助程序，以临时提升被执行程序的权限。这将提示用户输入计算机的系统密码。可以通过修改\
  \ `KEXT` 的 `plist` 文件包含以下内容来允许非 root 用户加载 `KEXT`：\n\n```\n<key>OSBundleAllowUserLoad</key>\n\
  <true/>\n```\n\n虽然这允许非特权进程或用户加载 `KEXT`，但随后卸载 `KEXT` 仍然需要 root 权限。因此，前一种技术更受青睐，也更安全，因为用户必须明确批准该操作。\n\
  \n### Mac App Store 上的内核扩展\n\n苹果目前不允许应用程序在 Mac App Store 或 iOS App Store 上安装 `KEXT`（iOS\
  \ App Store 没有任何在不违反许可协议的情况下构建 `KEXT` 的方法）。如果你的应用程序依赖于内核扩展，你将需要在 App Store 之外分发它。Mac\
  \ App Store 应用程序也不允许请求 root 权限，而安装和加载 `KEXT` 需要这些权限。然而，即使应用程序可能依赖于特定的硬件设备，也可以提交它们，但在这种情况下，你需要通过一个经过批准的用户空间\
  \ API 与设备通信（详见第 15 章了解如何实现）。\n\n### 内核扩展的版本管理\n\n如果你的内核扩展可以直接被用户空间应用程序访问，你可能希望提供一个版本管理系统，以防止较旧的用户空间应用程序访问较新的内核扩展，反之亦然。对于音频驱动程序或其他使用系统提供的\
  \ `IOUserClient` 的驱动程序，这不是必需的；但是，如果不是这种情况，你的 `KEXT` 本质上会向应用程序提供一个需要保持兼容的 API。如果\
  \ `KEXT` 已更新，较旧的应用程序可能会崩溃甚至导致系统崩溃。没有标准化的方法来解决这个问题，解决方案在很大程度上取决于 `KEXT` 以及访问它的应用程序的性质。一种策略是在一个共享的头文件中包含一个版本号：\n\
  \n```\n//\n// SharedHeaderFile.h\n//\n#ifndef Shared_Header_H_\n#define Shared_Header_H_\n\
  \nconst int KernelUserClientAPIVersion = 1001;\n\n#endif\n```\n\n由于 `KEXT` 和用户应用程序都将\
  \ `KernelUserClientAPIVersion` 版本号编译到它们的二进制映像中，因此用户应用程序可以确定 `KEXT` 的版本号是否与其自身匹配。每次接口发生更改时，例如，添加、移除或更改了一个\
  \ `IOUserClient` 方法，都必须更新版本号以反映这一变化。如果你的 `KEXT` 提供了可供第三方开发者使用的 API，最好的方法是提供一个在内部处理此版本管理的\
  \ API，而不是允许开发者直接访问 `IOUserClient`。这样，内核与用户空间之间的接口可以更改，而不会破坏现有应用程序；它甚至允许你向完全不同的驱动程序或\
  \ `KEXT` 提供相同的 API。\n\n### 测试与质量保证\n\n测试内核扩展可能是一项挑战。现代计算机系统和设备通常非常复杂，即使你的组件与系统其他部分相对隔离，由于它是整个机制中的一环，也可能产生不希望的副作用。适当的测试（最好由未直接参与工程过程的人员进行）至关重要——直接参与的人员可能对产品的工作方式有先入为主的观念，从而无法发现最终用户可能遇到的问题。测试内核扩展在很大程度上取决于扩展的性质和类型；因此，提供一份详尽的测试事项清单是不可能的。以下是一些通用建议：\n\
  \n- 测试驱动程序是否能够正确处理进入睡眠和唤醒。你可以使用 Xcode 附带的 `SleepX` 工具轻松进行压力测试。该应用程序允许你在计算机每次唤醒时执行脚本或外部程序。你还可以调整睡眠间隔和希望测试的周期数。你的驱动程序正确处理睡眠非常重要，尤其是对于移动设备和笔记本电脑，因为驱动程序保持活动状态意味着\
  \ CPU 需要保持活动——这将耗尽系统电池，甚至在合盖运行时可能导致笔记本电脑过热。\n- 测试驱动程序是否能够使用 `kextload` 和 `kextunload`\
  \ 处理重复加载和卸载。你可以使用 `ioclasscount` 和 `ioalloccount` 工具来测试引用泄漏或内存分配泄漏。\n- 通过执行常见的用户任务来测试使用该驱动程序的应用程序。例如，对于音频设备，尽可能多地使用不同的设置和格式组合来播放和捕获音频。\n\
  - 在所有支持的平台和操作系统上进行测试，例如 `Macbook Pro`、`Mac Mini`、`iMac`、`Mac Pro` 或 `iPod`、`iPhone`\
  \ 和 `iPad`。对于 Mac，请务必测试 32 位和 64 位版本以及所有受支持的操作系统版本，例如 `Snow Leopard`、`Lion` 等。\n\
  - 对于热插拔设备：\n    - 测试驱动程序和设备在反复插拔后是否能继续正常工作。你可能希望至少进行 100 次以上的重复测试，以确保在现场不会出现问题。\n\
  \    - 测试驱动程序是否能处理系统进入睡眠的情况。驱动程序还应准备好处理设备在系统休眠期间被移除的情况。\n- 测试 `KEXT` 的 32 位和 64\
  \ 位版本。如果你支持 pre-Lion 操作系统，你将需要提供支持 32 位和 64 位系统的通用二进制文件。\n- 测试安装程序包；确保所有文件都正确安装——具有正确的权限，并且位于正确的位置。\n\
  \n如果在测试期间或由客户报告发现问题，最好为每个已发布的 `KEXT` 预先归档符号信息和/或调试版本，以便你可以快速尝试重现问题并进行调试。这对大多数人来说似乎显而易见，但这种情况发生的频率可能超出你的想象：有人在不增加版本号的情况下传递了软件组件（例如\
  \ `KEXT`）的某个版本。每次进行更改并发布/提供给外部实体（甚至内部质量保证小组）时，版本号都应该是唯一的，否则你将很快无法跟踪并让所有相关人员感到困惑。\n\
  \n\n\n### 打包 KEXT 与软件\n\n`PackageMaker` 是打包和分发由多个组件构成的软件的首选工具。与那些所有必要组件都自包含并嵌入到应用程序包中的简单应用不同，更复杂的软件分发（例如包含\
  \ KEXT 的分发）可能需要将组件安装到文件系统的多个位置。例如，驱动程序需要将其自身放置在 `/System/Library/Extensions` 目录下，并且可能还包含用于加载偏好设置或升级固件的辅助程序，这些程序需要安装启动代理（Launch\
  \ Agents）或守护进程（Daemons）。`PackageMaker` 能够做到这一点，甚至更多。`PackageMaker` 的用户界面如图 18-1\
  \ 所示。\n\n![images](img/1801.jpg)\n\n***图 18-1.** PackageMaker 用户界面*\n\n`PackageMaker`\
  \ 的输出是一个扩展名为“*.pkg*”的二进制压缩包文件，可以通过 `Installer.app` 程序或 `installer` UNIX 命令来安装，执行命令如下所示：\n\
  \n`sudo installer -pkg HelloWorld.pkg -target /`\n\n使用 `Installer.app` 进行安装会启动一个基于\
  \ GUI 的向导，引导用户完成安装过程。如果软件包有多个可选的子组件，用户将有机会选择或取消选择它们。用户还可以更改目标宗卷（即软件包的安装位置），前提是软件包通过设置“由用户选择宗卷”选项明确允许这样做。\n\
  \n`PackageMaker` 不仅限于将软件组件放置到文件系统中。它还可以检查系统要求和先决条件，包括操作系统版本是否受支持，或者检查它所依赖的其他软件组件是否存在。它还可以在软件安装前后针对每个组件触发自定义的\
  \ UNIX 脚本。对于硬件驱动程序，`PackageMaker` 还允许你在允许用户继续操作之前验证你的设备是否存在。这适用于 FireWire、PCI 和\
  \ USB 设备。\n\n![images](img/square.jpg)**提示** 在打包 KEXT 进行分发时，请确保 Xcode 为你打算支持的架构进行构建。通过对\
  \ KEXT 的二进制文件使用 `file` 命令，你可以检查它支持哪些架构。你可能还需要确保不分发 KEXT 的调试版本。\n\n#### 为 Hello World\
  \ 内核扩展构建软件包\n\n现在，你可以构建一个快速软件包来安装示例 Hello World KEXT。你还需要安装一个启动守护进程属性列表文件（代码清单 18-1）和一个\
  \ shell 脚本（代码清单 18-2），该脚本将由启动守护进程执行，并再次加载 KEXT。在设计你自己的软件包之前，你需要确定其组件。例如，如果你要为音频设备分发驱动程序，你可能希望将驱动程序与某些允许播放或捕获音频的软件捆绑在一起，或许还需要一个\
  \ SDK，其他开发者可以使用该 SDK 来编写自己的应用程序。开发者可能只想要驱动程序，而最终用户可能只想要捆绑的应用程序而不需要 SDK，等等。在这种场景下，你可以创建三个子组件：驱动程序、应用程序和\
  \ SDK，并允许用户选择要安装的组件。对于 `HelloWorld` 软件包，你只需添加一个组件即可。\n\n要开始操作，请打开 `PackageMaker`\
  \ 并从菜单中选择“新建”。随后会弹出一个对话框，如图 18-2 所示。\n\n![images](img/1802.jpg)\n\n***图 18-2.**\
  \ 安装属性对话框*\n\n“组织”字段应为你的组织的反向 DNS 名称。该值用于标识软件包并赋予其唯一名称。“最低目标”下拉菜单允许你选择你想要支持的最旧的\
  \ OS 版本。软件包将拒绝安装在比安装目标更旧的版本上。输入你的选择后，你可以为软件包指定一个标题。\n\n#### 向软件包添加内容\n\n你现在可以开始向软件包添加文件。这可以通过从主菜单中选择“项目\
  \ ![images](img/U001.jpg) 添加内容...”来完成，或者简单地将文件拖入 `PackageMaker` 的左侧窗格。图 18-3 显示了已填充\
  \ `HelloWorld` 分发所需文件的内容窗格。\n\n![images](img/1803.jpg)\n\n***图 18-3.** HelloWorld\
  \ 分发*\n\n我们的 `HelloWorld` 软件包仅包含三个文件（如图 18-3 左侧所示）：KEXT 本身以及两个允许 KEXT 在启动时加载的辅助文件。当你将文件拖入或添加到软件包时，`PackageMaker`\
  \ 会自动创建一个*选项*，在本例中我们将其命名为“驱动程序”。该选项代表一个可由用户单独选择的子组件。但是，如果主窗格中的“用户可见”字段设置为“仅简易安装”，则即使有多个组件，也不会提示用户选择单个组件。“安装目标”选择允许你设置软件包的安装位置。此时，我们不勾选任何选项，因为我们所有的文件都使用绝对路径。如果选择了“由用户选择宗卷”，安装向导会询问用户希望安装到哪个宗卷（硬盘）。建议允许这种选择，以便给用户更大的灵活性——特别是对于大型软件包，用户可能希望将其存储在第二个更大的数据驱动器上。\n\
  \n\n\n#### 配置软件包\n\n从图 18-3 所示配置窗格中选择“编辑界面”选项，将显示软件包在通过`Installer.app`打开时的呈现视图。`PackageMaker`允许您交互式地编辑文本并设置背景图像。您还可以添加本地化设置，以便提供其他语言的说明。\n\
  \n主窗格包含三个标签页，如图图 18-3 所示。“需求”标签页用于配置适用于整个软件包的全局需求。您也可以为各个选项单独设置需求，这样即使系统不满足某些选项的需求，用户仍可安装其他组件。需求可在需求编辑器中指定，其中包含许多可配置的预定义检查项。以下是可用测试的子集：\n\
  \n- 目标卷可用兆字节数\n- 最低 CPU 频率（Hz）\n- 可用内存（字节）\n- 系统 OS 版本 / 目标 OS 版本\n- 系统中存在文件\n-\
  \ FireWire、USB、PCI 设备存在\n- 脚本执行结果\n\n当预定义测试均不适用时，最后一个选项“脚本执行结果”尤为实用。您可以编写 Shell\
  \ 脚本执行自定义测试，并根据脚本的返回代码让安装程序执行相应操作。您还可以指定当需求测试失败时显示的自定义错误信息。“操作”标签页允许您配置可自动执行的操作，包括安装前或安装后的操作。例如，对于`HelloWorld`软件包，我们可能希望确保在安装新版本之前，先卸载任何先前安装的`HelloWorld.kext`。我们可以像图\
  \ 18-4 所示那样定义此操作。\n\n![images](img/1804.jpg)\n\n***图 18-4.** 操作编辑器*\n\n在某些情况下，假设您有一个\
  \ USB 设备的驱动程序：您可能希望在安装新驱动程序之前，确保所有使用该设备的应用程序都已关闭。正在运行的应用程序可能会阻止驱动程序正常卸载。您可能会注意到没有运行程序或脚本的选项；不过，这可以通过选择文件并选择“脚本”标签页，在逐个文件的基础上实现。\n\
  \n![images](img/1805.jpg)\n\n***图 18-5.** 单个软件包的配置窗格*\n\n到目前为止，我们使用术语“软件包”来指代整个项目，但在`PackageMaker`的术语中，我们实际上指的是一个分发版，它由多个较小的软件包组成。这些较小的软件包由添加到分发版中的单个文件或对象（如\
  \ KEXT、应用程序包或 PDF 文件）构成。每个对象都关联有元数据和版本信息。\n\n图 18-5 显示了添加到分发版中的软件包的主配置窗格。“安装”字段指定源位置，而“目标”字段指定对象将安装在文件系统中的位置。选中“允许自定义位置”选项可让用户指定其他位置。源位置和目标位置可以是相对路径或绝对路径。大多数情况下，建议使用前者。在前述示例（图\
  \ 18-5）中，我们对源文件使用了相对位置，对目标位置使用了文件系统中的绝对路径，因为该文件必须安装到该目录中，且不能根据用户偏好重新定位。对于 KEXT 也是如此，我们需要它位于`/System/Library/Extensions`目录下。相对路径是相对于`PackageMaker`项目所在的位置。\n\
  \n“补丁”字段允许您指定正在安装对象的旧版本，以便安装程序可以修补现有文件，而不是安装一个全新的文件。\n\n在配置窗格中，您还可以为每个软件包单独指定版本号和标识符。“重启操作”允许您在安装完成后提示用户重新启动计算机。如果您有必须启动的启动代理或守护程序，或者您替换了系统运行时难以重新加载的驱动程序（例如存储或图形驱动程序），则可能需要进行此操作。您还可以要求用户注销或关闭系统。“需要管理员身份验证”复选框将在允许安装软件包之前提示用户输入管理员密码。如果您将文件安装在用户主目录之外，通常必须指定此项，因为安装程序默认没有管理员权限。大多数\
  \ KEXT，特别是驱动程序，必须安装在`/System`目录下，而普通用户通常没有该目录的写入权限。\n\n最后，“软件包位置”字段允许指定安装软件包对象文件的备用位置；例如，您可以指定一个\
  \ HTTP URL。\n\n软件包的“内容”标签页如图 18-6 所示。\n\n![images](img/1806.jpg)\n\n***图 18-6.**\
  \ 软件包配置窗格的“内容”标签页*\n\n“内容”标签页允许您检查软件包的各个文件。通常，软件包由一个包（bundle）或单个文件组成。一个包可能包含其他包或任意文件。如果需要排除某些文件，您可以指定正则表达式模式来实现。例如，来自源代码版本控制系统（如\
  \ Subversion）的元数据目录，可以通过模式`*/\\.svn$`排除。您还可以配置文件安装到文件系统后各个文件应具有的权限。“应用建议”按钮将根据文件类型和预期目标位置推测正确的权限。\n\
  \n![images](img/square.jpg) **注意** 内核扩展（Kernel Extensions）对其权限非常挑剔，必须由*root*用户和*wheel*组所有。此外，所有者必须具有读写和执行权限，而组应仅具有读和执行权限。这对应于\
  \ UNIX 权限掩码 0755。元数据文件（例如`Info.plist`文件）无需设置可执行位。\n\n“脚本”标签页允许为软件包定义安装前和安装后脚本。这些脚本可用于执行无法通过“操作”编辑器定义的自定义安装步骤。您可能希望使用安装前脚本在守护程序或应用程序被新版本替换之前将其关闭。您还可以清理新版本不再需要的文件。脚本通常使用\
  \ Bash 或其他脚本语言编写。如果您从脚本中删除旧文件，请谨慎使用`rm`命令，因为您的软件包可能以管理员权限运行，指定错误的文件名可能导致误删错误的文件或目录。例如，考虑以下命令：`rm\
  \ –rf /System/Library/$MYKEXT`。如果`$MYKEXT`变量最终为空，该命令将转而删除`/System/Library`目录。随之而来的将是非常不满的客户。\n\
  \n\n\n#### 构建软件包\n\n完成添加和配置所有要包含在分发版本中的部件后，您可以通过点击工具栏上的“构建”或“构建并运行”来构建它。后者会在构建完成后在\
  \ `Installer.app` 中打开该软件包。在构建阶段，软件包将经过验证和检查；如果存在错误或警告，您可以修正它们并重新构建软件包。最终结果类似于图 18-7。\n\
  \n![images](img/1807.jpg)\n\n***图 18-7.** 使用 `Installer.app` 启动时呈现的软件包*\n\n生成的软件包将写入名为\
  \ `<Title>.pkg` 的文件。该软件包是压缩的，而不是一个包，因此无法在访达中直接检查其内容。当您保存一个 PackageMaker 项目时，它会以名为\
  \ `<Title>.pmdoc` 的包的形式保存。项目包中包含定义该项目的 XML 文件。您可以使用文本编辑器编辑这些文件，或者在产品的构建过程中使用脚本自动替换或更新内容。如果您希望从命令行构建软件包，可以执行以下操作：\n\
  \n```\n$ /Developer/Applications/Utilities/PackageMaker.app/Contents/MacOS/PackageMaker\
  \ --doc HelloWorld.pmdoc --version 2.0 --title 'HelloWorld'\n```\n\n上述命令构建了版本号为\
  \ 2.0 的 `<Title>.pkg`。\n\n#### 卸载软件包\n\n遗憾的是，并不存在用于自动卸载使用 PackageMaker 创建的软件包的机制。要手动卸载软件包，您需要识别该软件包安装的文件并将其删除。您还必须停止并移除该软件包安装的任何启动代理或守护程序。更好的选择是为您的用户提供一个执行卸载操作的脚本或程序。不过，PackageMaker\
  \ 能够处理升级问题。\n\n### 总结\n\n在本章中，我们了解了以下内容：\n\n- 系统如何自动加载 I/O Kit 内核扩展，以及如何手动加载其他不会自动加载类型的\
  \ KEXT（例如网络内核扩展）。后者通常通过使用启动守护程序来实现。\n- 对 KEXT 与用户空间之间的接口进行版本控制非常重要，以避免破坏与之交互的旧版/新版应用程序。处理此问题的一种策略是在共享头文件中包含版本号。\n\
  - 质量保证和测试是开发周期的重要组成部分，也是软件分发给客户之前的最后一道防线。在所有支持的平台上全面测试软件的所有方面和使用模式非常重要。\n- PackageMaker\
  \ 软件是在 Mac OS X 上分发更复杂软件包（即包含多个组件的东西，例如 KEXT、辅助守护程序和最终用户应用程序）的首选方式。\n- PackageMaker\
  \ 是一个随 Xcode 一起分发的工具。PackageMaker 可以通过图形用户界面或命令行使用。使用 PackageMaker 创建的软件包通过 `Installer.app`\
  \ 应用程序安装。\n- PackageMaker 不提供用于卸载软件包的机制。\n\n## 索引\n\n### ![images](img/square2.jpg)\
