  raw: '### Summary


    *   A serial port provides a simple means of low-bandwidth data transfer between
    devices. Although you can no longer find an RS-232 or RS-422 serial port on modern
    Macs, many USB devices present themselves as a serial port, so support for serial
    port drivers is still part of the Mac OS X operating system.

    *   A user space application accesses a serial port through a device file in the
    `/dev` directory, as is standard for the UNIX environment.

    *   A serial port driver is implemented in the I/O Kit by implementing a subclass
    of the `IOSerialDriverSync` interface. This interface contains methods for opening
    and closing the serial port, configuring the port, and reading and writing data.

    *   The I/O Kit provides a class known as `IOSerialBSDClient` that publishes the
    serial port driver to user space applications. This class receives requests from
    user space applications to read and write to the serial port, and passes the requests
    on to the kernel serial port driver.

    *   The I/O Kit design allows a serial port driver to be implemented using the
    modern, object-oriented design of the I/O Kit, without having to deal with the
    legacy user space interface of a serial port device.


    ## C H A P T E R  12


    ## Audio Drivers


    Audio devices are among the most common peripherals attached to a computer apart
    from storage devices. They are used for everything from voice recorders to MP3
    players, headsets with microphones, security systems, and DJ and professional
    recording systems. Many video devices also have audio capabilities and come with
    their own audio drivers that allow you to use the audio features of the device
    independently or together with the video features, for example, a web camera with
    a built-in microphone. The microphone will have its own audio driver, representing
    the microphone in the system as an audio device that can be used independently
    of the camera.


    Programming drivers for audio devices present a few unique challenges. Audio devices
    have strict latency requirements and must be fed a constant stream of data to
    avoid holes or glitches during playback or recording. The human ear is extremely
    sensitive and can detect even small glitches in only a few samples worth of data.
    Furthermore, audio data cannot be excessively buffered, as this will cause an
    unacceptable delay. For example, suppose you were playing loud music and received
    a phone call. You would not be happy if it took five seconds from when you pressed
    the pause button until the music actually stopped. Similarly, if you were playing
    a game firing a gun, you would expect to hear the sound of the gun firing almost
    immediately, not several seconds after you pulled the trigger. Therefore, an audio
    device must minimize buffering in order to alleviate these effects.


    While the preceding examples specifically mentioned playback, buffering must also
    be minimized when capturing audio with an input device. For example, if you had
    a telephone connected via the input device, you wouldn''t want to hear the other
    person''s voice several seconds late. Because an audio buffer must be kept small
    in order to keep the latency or lag down, it will also need to respond to the
    hardware with as little latency as possible to avoid situations where the audio
    producer overtakes the audio consumer, or vice versa, which would lead to audible
    distortions. Because of these constraints and the fact that an audio driver needs
    to respond to multiple clients, it is a prime candidate for a kernel-level driver.


    Core Audio is the term used to describe the entirety of audio support under Mac
    OS X. This includes a myriad of user space APIs as well as the kernel KPI, implemented
    by the `IOAudioFamily` interface that will be the subject of this chapter.


    ### An Introduction to Digital Audio and Audio Devices


    Sound waves are analog by nature, and as we know, analog signals aren''t easily
    stored or manipulated by a computer system that stores and processes information
    digitally. Other devices, such as CD, DVD, and Blu-Ray players, also operate with
    digital audio.


    Digital audio information is mainly derived from an analog audio wave by a process
    known as Pulse Code Modulation (PCM). PCM works by sampling or taking a measurement
    of the analog audio wave at fixed intervals. The number of measurements taken
    per second is known as the sample rate. Audio on a CD is sampled at 44.1 kHz.
    Other sources, such as HD video, may use 48 kHz, which means there are 48000 measurements
    of the audio wave performed per second. Each measurement is known as a sample.


    The sample is a measurement of the analog signal''s amplitude at the time of the
    measurement, which is then quantized to a digital scale. The range of this scale
    is known as the bit depth or sample depth. For CD audio and many other applications,
    the bit depth is 16 bits, which gives each sample a possible value between −32768
    and 32767\. When a sample is taken, the value is converted into this scale by
    rounding it to the nearest integer value. The higher the sample rate and sample
    width, the more accurate the representation of the original audio wave.


    As computer programmers, we rarely need to care about the conversion of a signal
    from analog to digital or vice versa, as that is handled by circuitry on the audio
    hardware (ADC/DAC). However, a programmer needs to be aware of what digital PCM
    samples represent and understand the significance of the sample rate and depth.
    PCM samples are typically stored with channels interleaved in memory, as shown
    in [Figure 12-1](#Chapter12.html#fig_12_1).


    ![images](images/1201.jpg)


    ***Figure 12-1**. Buffer of interleaved 16-bit signed PCM samples*


    As you can see in [Figure 12-1](#Chapter12.html#fig_12_1), the data corresponding
    to each channel are not stored sequentially but are interleaved in the buffer.
    The buffer above uses 16 bits per sample, which means that each sample occupies
    two bytes. A pair of left/right samples is referred to as a sample frame (or sample
    group). If there were more than two channels, for example, eight (as used by HDMI),
    a sample group would instead consist of channels 1–8\. Most digital audio systems
    expect audio data in this format and usually this is how audio is stored in a
    file on a computer, assuming the audio is uncompressed. File formats such as MP3
    compress the audio data; however, they have to decompress the audio back to interleaved
    PCM samples before it can be played back by the audio hardware. Audio at 44.1
    kHz will give us 44100 sample frames per second. If the sample depth is 16 bits
    and there are two channels, we need 176.4 KB (44100 Hz * (16/8 bits) * 2 channels
    = 176400 bytes) of data to store a single second of audio. PCM samples aren''t
    necessarily always 16 bits wide, however. The sample depth can also be 8, 20,
    24, or 32 bits. Furthermore, samples can be stored as unsigned or signed, or even
    in floating point, which is the preferred audio format of Core Audio. [Table 12-1](#Chapter12.html#tab_12_1)
    shows some commonly used PCM formats.


    ![images](images/t1201.jpg)'
