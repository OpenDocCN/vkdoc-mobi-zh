  trans: "\n### 内存描述符\n\n内存描述符由 `IOMemoryDescriptor` 类实现，是 I/O Kit 中处理内存的基础。该类也是其他重要内存相关类的父类，我们将在本章后面讨论这些子类。I/O\
    \ Kit 的许多部分都将 `IOMemoryDescriptor` 作为参数接收。例如，USB 系列使用该类来描述用于 USB 读写请求的内存。\n\n\
    `IOMemoryDescriptor` 描述了内存缓冲区或内存范围的属性，但不会分配（或释放）所描述的内存。它包含元数据，并允许对内存执行某些操作。它可以描述虚拟内存和物理内存。该类用途广泛，可用于多种目的。因此，构造\
    \ `IOMemoryDescriptor` 也有多种方法。一种常见的方法是使用 `withAddressRange()` 方法，如下所示。\n\n```\n\
    static IOMemoryDescriptor* withAddressRange(mach_vm_address_t address,\n     \
    \                                       mach_vm_size_t length, IOOptionBits options,\n\
    \                                            task_t task);\n```\n\n-   第一个参数 `address`\
    \ 是描述符应操作的内存缓冲区的起始地址。\n-   `length` 参数是 `address` 指向的缓冲区的字节数。`task` 参数指定拥有该虚拟内存的任务。\n\
    -   `options` 参数指定描述符用于 I/O 传输时的方向。它可能会影响 `prepare()` 和 `complete()` 的行为。可能包含以下标志：\n\
    \    -   `kIODirectionNone`\n    -   `kIODirectionIn`\n    -   `kIODirectionOut`\n\
    \    -   `kIODirectionOutIn`\n    -   `kIODirectionInOut`\n-   最后一个参数是拥有该内存的任务。如果内核拥有该内存，可以传递\
    \ `kernel_task`，这是一个指向内核 `task_t` 结构的全局变量。\n\n`options` 标志指示 I/O 传输的方向，并可用于确定是否需要刷新处理器缓存以确保缓存一致性。\n\
    \n如果描述符将用于 I/O 传输，则必须首先调用其 `prepare()` 方法，该方法将执行以下操作：\n\n-   如果底层内存被换出，则将其换入内存。\n\
    -   锁定该内存，使其在传输完成前无法被换出。\n-   如有必要，配置设备地址转换映射。\n\n> **注意**：对 `prepare()` 的调用**必须**与对\
    \ `complete()` 的调用平衡。还必须注意，除非首先调用了 `prepare()`，否则不要调用 `complete()`。\n\n`prepare()`\
    \ 方法不是线程安全的。但是，多次调用 `prepare()` 是合法的，但随后必须调用相同次数的 `complete()`。调用描述符的 `release()`\
    \ 方法不会撤销 `prepare()` 的效果或为您调用 `complete()`，因此必须在调用 `release()` 之前调用 `complete()`。如果描述符被映射到某个地址空间，它将在\
    \ `release()` 时自动取消映射。`IOMemoryDescriptor` 也可用于描述其他类型的内存，例如物理地址。对于物理地址，`prepare()`\
    \ 和 `complete()` 方法不执行任何操作，但会成功返回。此外，物理内存描述符不与任何任务关联。静态成员方法 `withPhysicalAddress()`\
    \ 可用于为物理段构造 `IOMemoryDescriptor`，如下所示。\n\n```\nstatic IOMemoryDescriptor* withPhysicalAddress(IOPhysicalAddress\
    \ address,  \nIOByteCount withLength, IODirection withDirection);\n```\n\n###\
    \ `IOBufferMemoryDescriptor`\n\n`IOBufferMemoryDescriptor` 是 `IOMemoryDescriptor`\
    \ 的一个子类，但与其父类不同，它还会分配内存。它目前是分配旨在映射到用户空间或用于从内核分配的缓冲区执行设备 I/O 的内存的推荐方式。但是，内部使用的分配方法取决于请求的大小和在构造期间传递的选项。`IOBufferMemoryDescriptor`\
    \ 也是获取物理连续内存的推荐方式。`IOBufferMemoryDescriptors` 可以通过静态工厂方法 `inTaskWithOptions()`\
    \ 或 `inTaskWithPhysicalMask()` 进行分配，如下所示。\n\n```\nstatic IOBufferMemoryDescriptor*\
    \ inTaskWithOptions(\n    task_t                       inTask,\n    IOOptionBits\
    \                 options,\n    vm_size_t                    capacity,\n    vm_offset_t\
    \                  alignment = 1);\n\nstatic IOBufferMemoryDescriptor* inTaskWithPhysicalMask(\n\
    \    task_t                       inTask,\n    IOOptionBits                 options,\n\
    \    mach_vm_size_t               capacity,\n    mach_vm_address_t           \
    \ physicalMask);\n```\n\n`inTask` 参数指定内存应映射到哪个任务。对于内核缓冲区，这应设置为 `kernel_task`。如果指定了其他任务标识符，内存将在该任务的地址空间中分配并可访问。除了\
    \ `IOMemoryDescriptor` 可用的标志和选项外，还可以传递以下 `options` 来控制分配行为。\n\n-   `kIOMemoryPhysicallyContiguous`\
    \ 分配物理连续的内存。\n-   `kIOMemoryPageable` 分配可分页的内存。默认情况下，所有内存都是不可分页的。\n-   `kIOMemoryPurgeable`\
    \ 仅适用于可分页内存。如果指定了此选项，内存页可以被丢弃而不是被换出。\n-   如果内存将被映射到内核和用户空间任务，则应指定 `kIOMemoryKernelUserShared`。它确保内存将是页对齐的。\n\
    \n构造 `IOBufferMemoryDescriptor` 的第二种方式是通过 `inTaskWithPhysicalMask()`，它允许指定位掩码以限制缓冲区的物理地址范围。这在为无法访问某些地址范围的\
    \ DMA 设备分配内存时特别有用。例如，一些较旧的设备可能无法访问 32 位以上的物理内存。\n\n通常不鼓励请求物理连续的内存，尤其是在系统启动之后，因为内存会很快碎片化。这会使得难以找到空闲的连续缓冲区，尤其是较大的缓冲区。请求连续内存还可能导致一些内存被换出以处理该请求，这可能需要很长时间。硬件设备通常支持分散/聚集操作，其中多个较小的缓冲区被链接成一个列表并传递给设备，设备随后读取该列表以确定在物理内存中的何处找到其数据。因此，连续内存通常是不必要的。\n\
    \n就像 `IOMalloc()` 系列函数一样，`IOBufferMemoryDescriptor` 可能会休眠，因此不应从中断上下文或持有简单锁时调用它。实际上，`IOBufferMemoryDescriptor`\
    \ 在内部使用 `IOMalloc()` 和 `IOMallocAligned()` 来分配内存。\n\n### 其他内存描述符\n\n`IOMemoryDescriptor`\
    \ 还有许多其他相关的子类，如下所示。\n\n-   `IODeviceMemory` 用于描述从设备映射的一段内存范围。\n-   `IOMultiMemoryDescriptor`\
    \ 可用于表示由较小的 `IOMemoryDescriptor` 对象组成的更大连续缓冲区。\n"
- fmt: "### Mapping Memory\n\nMapping memory refers to the function of making a range\
    \ of memory from one task available to another. At the lowest level, mapping is\
    \ handled by the Mach VM subsystem, as discussed in [Chapter 2](#Chapter02.html#ch2).\
    \ Memory mapping provides a fast way for tasks to share resources without copying\
    \ memory, as mapping makes the same memory available between tasks. Writable mappings\
    \ can be shared until a modification is made, in which case the copy-on-write\
    \ (COW) optimization is used to copy only the memory that was modified. Memory\
    \ mappings can occur in a variety of different ways, between multiple tasks, or\
    \ from the kernel to a user space task or vice versa.\n\n#### Mapping Memory from\
    \ a User Space Task into Kernel Space\n\nMapping memory from a user space task\
    \ is a common operation performed by a driver. Let's use the example of an audio\
    \ device driver where an application wants to send us a data buffer containing\
    \ audio samples for play out on a hardware device. To do this, the user task—that\
    \ is, the audio player—passes us a memory pointer, which describes where in memory\
    \ the buffer is located. In user space, the copying of memory is as simple as\
    \ calling the `memcpy()` function.\n\nThings are not so simple in the kernel.\
    \ The address passed by the user task is meaningless to the kernel, as it is valid\
    \ only within the task's private address space. In order to access the memory\
    \ in the kernel, we need to create a mapping for the underlying physical memory\
    \ of the buffer in the kernel's own address space. At the low level, this process\
    \ happens by manipulating the kernel's VM Map. While it is possible to do this\
    \ using the Mach low-level interfaces, it is most commonly performed with the\
    \ help of the I/O Kit `IOMemoryDescriptor` and `IOMemoryMap` classes. [Listing\
    \ 6-2](#Chapter06.html#list_6_2) shows the portion of our imaginary audio driver\
    \ that copies memory from the user space audio player by mapping the memory buffer\
    \ into the kernel's address space.\n\n**Listing 6-2.** Mapping a User Space Buffer\
    \ into the Kernel\n\n```\nvoid copyBufferFromUserTask(task_t userTask, void* userBuffer,\n\
                                uint32_t userBufferSize, void* dstBuffer)\n{\n     uint32_t                 bytesWritten\
    \ = 0;\n     bool                     wasPrepared = false;\n     IOMemoryDescriptor*      memoryDescriptor\
    \ = NULL;\n     IOMemoryMap*             memoryMap = NULL;\n\n     memoryDescriptor\
    \ = IOMemoryDescriptor::withAddressRange\n                            (userBuffer,\
    \ userBufferSize,                     \n                            kIODirectionOut,\
    \ userTask);\n     if (memoryDescriptor == NULL)\n         goto bail;\n\n     if\
    \ (memoryDescriptor->prepare() != kIOReturnSuccess)\n         goto bail;\n     wasPrepared\
    \ = true;\n\n     memoryMap = memoryDescriptor->createMappingInTask\n                     (kernel_task,\
    \ 0, kIOMapAnywhere | kIOMapReadOnly);\n     if (memoryMap == NULL)\n         goto\
    \ bail;\n\n    void* srcBufferVirtualAddress = (void*)memoryMap->getVirtualAddress();\n\
    \n    if (srcBufferVirtualAddress != NULL)\n        bcopy(srcBufferVirtualAddress,\
    \ dstBuffer, userBufferSize);\n\n    memoryMap->release(); // This will unmap\
    \ the memory\n    memoryMap = NULL;\nbail:\n    if (memoryDescriptor)\n    {\n\
            if (wasPrepared)\n            memoryDescriptor->complete();\n        memoryDescriptor->release();\n\
            memoryDescriptor = NULL;\n    }\n}\n```\n\nTo map the memory, we first\
    \ create an `IOMemoryDescriptor` for the user space buffer. The `IOMemoryDescriptor`\
    \ provides an interface to create the memory mapping, but it also allows us to\
    \ pin the memory down while we copy from the buffer. This prevents the memory\
    \ from being paged out to secondary storage or disappearing if the audio player\
    \ should crash or the user exits the application while we are performing the copy.\n\
    \n![images](images/square.jpg) **Note** You may have noticed the use of `goto`\
    \ in the preceding method, which language purists often consider a bad practice.\
    \ However, it is often used in kernel code and provides a convenient way of providing\
    \ centralized cleanup if an error occurs, in lieu of exceptions that cannot be\
    \ used in the kernel.\n\nThe actual mapping occurs with the invocation of the\
    \ `createMappingInTask()` method:\n\n```\n    IOMemoryMap* createMappingInTask(\n\
            task_t                  intoTask,\n        mach_vm_address_t       atAddress,\n\
            IOOptionBits            options,\n        mach_vm_size_t          offset\
    \ = 0,\n        mach_vm_size_t          length = 0 );\n```\n\n![images](images/square.jpg)\
    \ **Tip** You can use `IOMemoryDescriptor::map()` method as a shortcut to create\
    \ a standard mapping into the kernel's address space. Also beware that the overloaded\
    \ variant of `map()` is deprecated in favor of `createMappingInTask()`, which\
    \ was introduced in Mac OS X 10.5.\n\n*   The first argument, `intoTask`, is the\
    \ task we want to create the mapping in. For our purposes, this is the `kernel_task`,\
    \ though it would be possible to provide the task structure of another task, thereby\
    \ making memory available from one task to another.\n*   The second argument,\
    \ `atAddress`, is interesting as well. It specifies an optional destination address\
    \ in the address space of `intoTask`. This allows the target task to locate the\
    \ mapping at a fixed address. In our example, we don't really care where in our\
    \ address space the mapping will be made; we just want one address to access it,\
    \ so we pass in zero instead of a fixed address and set `kIOMapAnywhere` in `options`.\n\
    *   The third argument, `options`, controls how the mapping will be performed\
    \ using the flags described in the Memory Descriptors section, for example, read-only\
    \ or read/write. Options also exist to control how the memory should behave in\
    \ relation to the CPU cache. The following options can be set:\n    *   `kIOMapDefaultCache`,\
    \ which specifies the caching policy for the mapping. It will disable the cache\
    \ for I/O memory; otherwise, `kIOMapCopybackCache` is used.\n    *   `kIOMapInhibitCache`,\
    \ which disables caching of this mapping.\n    *   `kIOMapWriteThruCache`, which\
    \ uses write-thru caching.\n    *   `kIOMapCopybackCache`, which uses copy-back\
    \ caching.\n    *   `kIOMapReadOnly`, which specifies the mapping will be read-only.\n\
    \    *   `kIOMapReference`, which is used when mapping an already existing mapping\
    \ and will fail if the memory is not previously mapped.\n    *   `kIOMapUnique`,\
    \ which ensures no previous mapping exists for the memory.\n*   The last two arguments\
    \ are used to specify an optional offset and length into the buffer, if you want\
    \ to map up only parts of it. However, note that mappings are a concept of the\
    \ virtual memory system and operate on *pages*. You can map memory only in units\
    \ of the page size (4096 bytes). The rounding happens internally and gives the\
    \ illusion of working with byte boundaries."
