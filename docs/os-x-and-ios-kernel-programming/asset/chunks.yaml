- fmt: "当然，以下是排版后的内容：\n\nThere are of course many other problems that can occur, but\
    \ most are variants of the preceding typical ones.\n\n### Kernel Panics\n\nA panic\
    \ is the kernel’s main defense mechanism for dealing with exceptional conditions,\
    \ such as the preceding list of problems. Instead of attempting to keep going\
    \ on a fault, the safest course of action is to terminate execution of the system\
    \ immediately to avoid damage to the file system. When a Mac OS X system panics,\
    \ the user is likely met by the multilingual panic screen, unless the kernel has\
    \ been configured with debugging options instructing the user to restart the computer,\
    \ as shown in [Figure 16-1](#Chapter16.html#fig_16_1).\n\n![images](images/1601.jpg)\n\
    \n***Figure 16-1.** Mac OS X Panic Screen, the Mac OS X equivalent of Window’s\
    \ blue screen of death*\n\nBehind the scenes, the system will preserve a panic\
    \ log, which contains a stack trace of the processor (core) the panic happened\
    \ on. The panic log will be written to the system’s non-volatile random-access\
    \ memory (NVRAM) temporarily, as it is generally unsafe to access the file system\
    \ after a system has panicked. After all, the purpose of the panic is not to annoy\
    \ the user but to shut down the party before it gets out of hand and protect the\
    \ file systems from damage.\n\nOnce the system boots again, the panic log is copied\
    \ to the `/Library/Logs/DiagnosticReports/` directory. The system will also show\
    \ the crash reporter dialog window, which allows users to report the problem to\
    \ Apple.\n\n### Debugging Mechanisms\n\nThere are many debugging techniques; which\
    \ one to use typically depends on the nature of the problem at hand. Here, we\
    \ will look at some of the techniques that can help aid in debugging kernel problems.\
    \ [Table 16-1](#Chapter16.html#tab_16_1) provides a brief overview of some of\
    \ the mechanisms we will discuss in this chapter.\n\n![Images](images/t1601.jpg)\n\
    \nMost of the preceding debugging technologies are included by default, but are\
    \ not always enabled in the kernel by default because they may cause interference\
    \ with the running kernel or hardware devices, or may pose a security risk, as\
    \ it may be possible to obtain sensitive contents of the target’s memory.\n\n\
    Enabling debugging mechanisms or controlling the kernel’s debug behavior can be\
    \ done by setting kernel boot arguments. Boot arguments can be set in two ways,\
    \ either by using the `nvram` command or by adding it to the boot arguments key\
    \ in `/Library/Preferences/SystemConfiguration/com.apple.Boot.plist`. There are\
    \ a heap of available boot arguments, but we are most interested in the `debug`\
    \ argument, which controls debugger and system debug behavior. The argument is\
    \ an integer value and can consist of the flags shown in [Table 16-2](#Chapter16.html#tab_16_2).\n\
    \n![Images](images/t1602.jpg)\n\nThe values form a bitmask and you can combine\
    \ multiple values together by ORing them. For example, to enable NMI, disable\
    \ the graphical panic screen and enter the debugger upon panic. We can combine\
    \ the values so that:\n\n`0x04 | 0x100 = 0x104`\n\nThe value can be set in the\
    \ `com.apple.Boot.plist` or using the `nvram` command:\n\n`$ sudo nvram boot-args=”original_contents\
    \ debug=0x104”`\n\nTo disable or remove debugging options, simply do the following:\n\
    \n`$ sudo nvram boot-args=”original_contents”`\n\nIf you have existing boot arguments\
    \ set, this command will overwrite them, so be sure to query the `boot-args` argument\
    \ first to prevent overwriting them.\n\n#### Recovering from Crashes During Boot\n\
    \nYour extension may be installed in the `/System/Library/Extensions` directory\
    \ and get loaded automatically during system boot. If there is a problem that\
    \ causes the extension to crash repeatedly during system boot, the system can\
    \ be recovered in the following different ways.\n\n*   Boot in safe mode by holding\
    \ the `shift` key down after you hear the startup tone and release the key when\
    \ the Apple logo appears. This should ensure only essential kernel extensions\
    \ (KEXTs) are loaded and you will be able to remove your KEXT so the system can\
    \ boot manually.\n*   Attach the system to another computer and boot it in target\
    \ disk mode using a FireWire or Thunderbolt cable by holding down the `T` key\
    \ during boot. You should then be able to remove the offending extension form\
    \ the system’s disk.\n*   Boot into a different partition if one is available.\n\
    *   If the offending KEXT is a driver for a piece of hardware, removing it from\
    \ the system will likely prevent the driver from loading.\n*   Perform an NVRAM\
    \ reset if you need to reset boot arguments.\n\nIf you are unsure what causes\
    \ the crash, you can boot the system in verbose mode by pressing `Command-V`.\n\
    \n![images](images/square.jpg) **Tip** Details of startup key combinations supported\
    \ by Intel-based Macs are available at [`http://support.apple.com/kb/ht1533`](http://support.apple.com/kb/ht1533).\n\
    \n#### Tracing with IOLog()\n\nWe have already seen tracing in action throughout\
    \ this book. Tracing involves strategically placing `IOLog(...)` statements in\
    \ your code to print variables and to test if conditional blocks are triggered.\
    \ `IOLog()` output eventually ends up in the `kernel.log` file. The kernel has\
    \ quite a limited buffer for storing messages from `IOLog()`, so if you write\
    \ a large amount of long messages too quickly, the buffer will wrap and you may\
    \ overwrite data before the `syslog` daemon has the chance to store it to the\
    \ log. This may cause confusion and lead to incorrect assumptions when expected\
    \ output is not seen.\n\nMany functions of your driver may end up being called\
    \ hundreds or even thousands of times per second, so printing a message on each\
    \ invocation may be counterproductive. Although the logging daemon has features\
    \ to coalesce identical messages, this falls apart if there are slight variations\
    \ between them. It also does nothing to prevent the buffer wrapping around and\
    \ potentially overwriting some messages.\n\nYou can change the size of the system\
    \ log buffer that `IOLog()` writes into by re-compiling the kernel or using the\
    \ much simpler way of adding the kernel flag `msgbuf=n`, where `n` is the size\
    \ of the buffer in bytes, to the kernel’s boot configuration property list `com.apple.Boot.plist`.\
    \ This file is found in the `/Library/Preferences/SystemConfiguration/` directory.\n\
    \nEven though a larger buffer may decrease the likelihood of data going missing,\
    \ it doesn’t prevent the log from being flooded with messages when printing from\
    \ functions in the “hot path” of the driver. To avoid this, you can use variations\
    \ of the technique shown in [Listing 16-1](#Chapter16.html#list_16_1).\n\n***Listing\
    \ 16-1.** Limiting IOLog Output*\n\n```\nstatic uint32_t        conditionCount\
    \ = 0;\ncom_osxkernel_MyDriver::driverMethod()\n{\n    ...\n    if (someCondition)\n\
    \    {\n        conditionCount++;\n        if (conditionCount % 1000 == 0)\n \
    \           IOLog(“condition has occurred: %u times\\n”, conditionCount);\n  \
    \  }\n}\n```\n\nThis will log the amount of times a condition occurs, but prints\
    \ a message to the log only every thousandth time. If you wish to debug a primary\
    \ interrupt filter, you can use a variant of this approach. However, the `IOLog()`\
    \ call needs to be moved out of the primary interrupt filter routine to a place\
    \ it can be safely called, for example, the secondary interrupt handler or a custom\
    \ `IOUserClient` method.\n\nIf your driver has multiple instances, you may wish\
    \ to print additional information so you can tell which instance is doing what.\
    \ If you are in the context of an `IOService`, you can print the `this` pointer\
    \ address to help uniquely identify each instance."
  raw: 'There are of course many other problems that can occur, but most are variants
    of the preceding typical ones.


    ### Kernel Panics


    A panic is the kernel’s main defense mechanism for dealing with exceptional conditions,
    such as the preceding list of problems. Instead of attempting to keep going on
    a fault, the safest course of action is to terminate execution of the system immediately
    to avoid damage to the file system. When a Mac OS X system panics, the user is
    likely met by the multilingual panic screen, unless the kernel has been configured
    with debugging options instructing the user to restart the computer, as shown
    in [Figure 16-1](#Chapter16.html#fig_16_1).


    ![images](images/1601.jpg)


    ***Figure 16-1.** Mac OS X Panic Screen, the Mac OS X equivalent of Window’s blue
    screen of death*


    Behind the scenes, the system will preserve a panic log, which contains a stack
    trace of the processor (core) the panic happened on. The panic log will be written
    to the system’s non-volatile random-access memory (NVRAM) temporarily, as it is
    generally unsafe to access the file system after a system has panicked. After
    all, the purpose of the panic is not to annoy the user but to shut down the party
    before it gets out of hand and protect the file systems from damage.


    Once the system boots again, the panic log is copied to the `/Library/Logs/DiagnosticReports/`
    directory. The system will also show the crash reporter dialog window, which allows
    users to report the problem to Apple.


    ### Debugging Mechanisms


    There are many debugging techniques; which one to use typically depends on the
    nature of the problem at hand. Here, we will look at some of the techniques that
    can help aid in debugging kernel problems. [Table 16-1](#Chapter16.html#tab_16_1)
    provides a brief overview of some of the mechanisms we will discuss in this chapter.


    ![Images](images/t1601.jpg)


    Most of the preceding debugging technologies are included by default, but are
    not always enabled in the kernel by default because they may cause interference
    with the running kernel or hardware devices, or may pose a security risk, as it
    may be possible to obtain sensitive contents of the target’s memory.


    Enabling debugging mechanisms or controlling the kernel’s debug behavior can be
    done by setting kernel boot arguments. Boot arguments can be set in two ways,
    either by using the `nvram` command or by adding it to the boot arguments key
    in `/Library/Preferences/SystemConfiguration/com.apple.Boot.plist`. There are
    a heap of available boot arguments, but we are most interested in the *debug*
    argument, which controls debugger and system debug behavior. The argument is an
    integer value and can consist of the flags shown in [Table 16-2](#Chapter16.html#tab_16_2).


    ![Images](images/t1602.jpg)


    The values form a bitmask and you can combine multiple values together by ORing
    them. For example, to enable NMI, disable the graphical panic screen and enter
    the debugger upon panic. We can combine the values so that:


    `0x04 | 0x100 = 0x104`


    The value can be set in the `com.apple.Boot.plist` or using the `nvram` command:


    **`$ sudo nvram boot-args=”original_contents debug=0x104”`**


    To disable or remove debugging options, simply do the following:


    **`$ sudo nvram boot-args=”original_contents”`**


    If you have existing boot arguments set, this command will overwrite them, so
    be sure to query the `boot-args` argument first to prevent overwriting them.


    #### Recovering from Crashes During Boot


    Your extension may be installed in the `/System/Library/Extensions` directory
    and get loaded automatically during system boot. If there is a problem that causes
    the extension to crash repeatedly during system boot, the system can be recovered
    in the following different ways.


    *   Boot in safe mode by holding the *shift* key down after you hear the startup
    tone and release the key when the Apple logo appears. This should ensure only
    essential kernel extensions (KEXTs) are loaded and you will be able to remove
    your KEXT so the system can boot manually.

    *   Attach the system to another computer and boot it in target disk mode using
    a FireWire or Thunderbolt cable by holding down the T key during boot. You should
    then be able to remove the offending extension form the system’s disk.

    *   Boot into a different partition if one is available.

    *   If the offending KEXT is a driver for a piece of hardware, removing it from
    the system will likely prevent the driver from loading.

    *   Perform an NVRAM reset if you need to reset boot arguments.


    If you are unsure what causes the crash, you can boot the system in verbose mode
    by pressing Command-V.


    ![images](images/square.jpg) **Tip** Details of startup key combinations supported
    by Intel-based Macs are available at [`http://support.apple.com/kb/ht1533`](http://support.apple.com/kb/ht1533).


    #### Tracing with IOLog()


    We have already seen tracing in action throughout this book. Tracing involves
    strategically placing `IOLog(...)` statements in your code to print variables
    and to test if conditional blocks are triggered. `IOLog()` output eventually ends
    up in the `kernel.log` file. The kernel has quite a limited buffer for storing
    messages from `IOLog(),` so if you write a large amount of long messages too quickly,
    the buffer will wrap and you may overwrite data before the *syslog* daemon has
    the chance to store it to the log. This may cause confusion and lead to incorrect
    assumptions when expected output is not seen.


    Many functions of your driver may end up being called hundreds or even thousands
    of times per second, so printing a message on each invocation may be counterproductive.
    Although the logging daemon has features to coalesce identical messages, this
    falls apart if there are slight variations between them. It also does nothing
    to prevent the buffer wrapping around and potentially overwriting some messages.


    You can change the size of the system log buffer that `IOLog()` writes into by
    re-compiling the kernel or using the much simpler way of adding the kernel flag
    `msgbuf=n`, where *n* is the size of the buffer in bytes, to the kernel’s boot
    configuration property list `com.apple.Boot.plist`. This file is found in the
    `/Library/Preferences/SystemConfiguration/` directory.


    Even though a larger buffer may decrease the likelihood of data going missing,
    it doesn’t prevent the log from being flooded with messages when printing from
    functions in the “hot path” of the driver. To avoid this, you can use variations
    of the technique shown in [Listing 16-1](#Chapter16.html#list_16_1).


    ***Listing 16-1.** Limiting IOLog Output*


    `static uint32_t        conditionCount = 0;`

    `com_osxkernel_MyDriver::driverMethod()`

    `{`

    `    ...`

    `    if (someCondition)`

    `    {`

    `        conditionCount++;`

    `        if (conditionCount % 1000 == 0)`

    `            IOLog(“condition has occurred: %u times\n”, conditionCount);`

    `    }`

    `}`


    This will log the amount of times a condition occurs, but prints a message to
    the log only every thousandth time. If you wish to debug a primary interrupt filter,
    you can use a variant of this approach. However, the `IOLog()` call needs to be
    moved out of the primary interrupt filter routine to a place it can be safely
    called, for example, the secondary interrupt handler or a custom `IOUserClient`
    method.


    If your driver has multiple instances, you may wish to print additional information
    so you can tell which instance is doing what. If you are in the context of an
    `IOService,` you can print the “*this”* pointer address to help uniquely identify
    each instance.'
  trans: "\n当然，以下是排版后的内容：\n\n当然，还可能发生许多其他问题，但大多数都是上述典型问题的变体。\n\n### 内核恐慌\n\n内核恐慌是内核处理异常情况（例如上述问题列表）的主要防御机制。与其在出错时试图继续运行，最安全的做法是立即终止系统执行，以避免对文件系统造成损坏。当\
    \ Mac OS X 系统发生内核恐慌时，用户可能会看到多语言的内核恐慌屏幕，除非内核已配置了调试选项，指示用户重启计算机，如图 Figure 16-1 所示。\n\
    \n![images](img/1601.jpg)\n\n***图 16-1.** Mac OS X 内核恐慌屏幕，相当于 Windows 的蓝屏死机*\n\
    \n在后台，系统会保存一份内核恐慌日志，其中包含发生恐慌的处理器（核心）的堆栈跟踪信息。恐慌日志会临时写入系统的非易失性随机存取存储器（NVRAM），因为系统发生恐慌后访问文件系统通常是不安全的。毕竟，内核恐慌的目的不是为了惹恼用户，而是在事态失控前紧急停机，保护文件系统免受损害。\n\
    \n一旦系统再次启动，恐慌日志会被复制到 `/Library/Logs/DiagnosticReports/` 目录。系统还会显示崩溃报告器对话框窗口，允许用户向\
    \ Apple 报告问题。\n\n### 调试机制\n\n调试技术有很多种；具体使用哪一种通常取决于待解决问题的性质。在此，我们将介绍一些有助于调试内核问题的技术。表\
    \ 16-1 简要概述了我们将在本章讨论的一些机制。\n\n![Images](img/t1601.jpg)\n\n上述大多数调试技术都默认包含在内，但内核中并不总是默认启用，因为它们可能会干扰正在运行的内核或硬件设备，或者可能构成安全风险（例如可能获取目标内存中的敏感内容）。\n\
    \n启用调试机制或控制内核的调试行为可以通过设置内核启动参数来完成。启动参数可以通过两种方式设置：使用 `nvram` 命令，或将其添加到 `/Library/Preferences/SystemConfiguration/com.apple.Boot.plist`\
    \ 的启动参数字段中。可用的启动参数非常多，但我们最感兴趣的是 `debug` 参数，它控制调试器和系统调试行为。该参数是一个整数值，可以包含表 16-2\
    \ 中所示的标志位。\n\n![Images](img/t1602.jpg)\n\n这些值构成一个位掩码，您可以通过“或”（OR）运算将它们组合在一起。例如，要启用\
    \ NMI、禁用图形化内核恐慌屏幕并在发生恐慌时进入调试器，我们可以组合这些值，使得：\n\n`0x04 | 0x100 = 0x104`\n\n该值可以在\
    \ `com.apple.Boot.plist` 中设置，或使用 `nvram` 命令：\n\n`$ sudo nvram boot-args=\"原始内容\
    \ debug=0x104\"`\n\n要禁用或移除调试选项，只需执行以下操作：\n\n`$ sudo nvram boot-args=\"原始内容\"`\n\
    \n如果您已经设置了一些启动参数，此命令会覆盖它们，因此请务必先查询 `boot-args` 参数，以免被覆盖。\n\n#### 从启动期间的崩溃中恢复\n\
    \n您的扩展可能安装在 `/System/Library/Extensions` 目录中，并在系统启动时自动加载。如果存在问题导致扩展在系统启动期间反复崩溃，可以通过以下不同方式恢复系统。\n\
    \n*   **以安全模式启动**：在听到启动声后按住 `shift` 键，直到 Apple 标志出现时松开。这应确保只加载必要的内核扩展（KEXT），然后您就可以移除有问题的\
    \ KEXT，以便系统手动启动。\n*   **使用目标磁盘模式**：将系统连接到另一台计算机，并在启动时按住 `T` 键，通过 FireWire 或 Thunderbolt\
    \ 线缆以目标磁盘模式启动。然后您应该能够从系统磁盘中移除有问题的扩展。\n*   **引导到另一个分区**（如果存在）。\n*   **如果是硬件驱动程序**：如果出问题的\
    \ KEXT 是某款硬件的驱动程序，将其从系统中移除可能会阻止该驱动加载。\n*   **执行 NVRAM 重置**：如果您需要重置启动参数。\n\n如果不确定导致崩溃的原因，您可以通过按\
    \ `Command-V` 以详细模式启动系统。\n\n![images](img/square.jpg) **提示** 有关 Intel 架构 Mac 支持的启动按键组合的详细信息，请参阅\
    \ [`http://support.apple.com/kb/ht1533`](http://support.apple.com/kb/ht1533)。\n\
    \n#### 使用 IOLog() 进行跟踪\n\n我们在本书中已经多次看到实际应用中的跟踪。跟踪涉及在代码中策略性地放置 `IOLog(...)` 语句，以打印变量并测试条件块是否被触发。`IOLog()`\
    \ 的输出最终会写入 `kernel.log` 文件。内核用于存储来自 `IOLog()` 消息的缓冲区相当有限，因此如果您短时间内写入大量或长度很长的消息，缓冲区可能会被覆盖，导致在\
    \ `syslog` 守护进程有机会将其存入日志文件之前数据丢失。这可能会引起混淆，并在看不到预期输出时导致错误判断。\n\n驱动程序的许多函数可能每秒被调用数百次甚至数千次，因此在每次调用时都打印一条消息可能会适得其反。尽管日志守护进程具有合并相同消息的功能，但如果消息之间存在细微差异，该功能就会失效。此外，它也无法防止缓冲区被覆盖并可能丢失某些消息。\n\
