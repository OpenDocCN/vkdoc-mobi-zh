    The dSYM bundle should be placed together with the KEXT before the `createsymbolfiles`
    script is run.


    ##### Debugging KEXTs with GDB


    In the following sections, we will analyze a crash caused by a hypothetical driver
    named MyDebugDriver. The header file specification for MyDebugDriver is shown
    in [Listing 16-4](#Chapter16.html#list_16_4).


    ***Listing 16-4.** MyDebugDriver Header File*


    `class com_osxkernel_MyDebugDriver : public IOService`

    `{`

    `    OSDeclareDefaultStructors(com_osxkernel_MyDebugDriver);`

    `public:`

    `    virtual bool init(OSDictionary* dict);`

    `    virtual bool start(IOService* provider);`

    `    virtual void stop(IOService* provider);`


    `    void testFunc1(UInt32 arg1, UInt32 arg2, UInt32 arg3, UInt32 arg4);`

    `    void testFunc2(UInt32 arg1, UInt32 arg2, UInt32 arg3, UInt32 arg4);`

    `    void testFunc3(UInt32 arg1, UInt32 arg2, UInt32 arg3, UInt32 arg4);`


    `    static void  timerFired(OSObject* owner, IOTimerEventSource* sender);`

    `private:`


    `    IOTimerEventSource*     fTimer;`

    `    int                     fVariable1;`

    `    int                     fVariable2;`

    `};`


    The driver starts a timer, from which `testFunc1()` is called, which in turn calls
    `testFunc2()`, which calls `testFunc3()`, which causes a kernel panic due to a
    null pointer dereference. Each function accepts four integers that have no significance
    (picked randomly) and are passed unchanged from the first function to the last.
    The values passed as arguments are 65261, 48879, 0, and 5380.


    We have successfully generated a core dump from a crash system using the FireWire
    core dump mechanism and previously, we built symbol information for our driver
    using the correct load address. We are now ready to load it up in the GDB and
    get our hands dirty. The steps we need to perform to find the bug in our driver
    are as follows:


    *   Create a symbol file with the correct load address (see the last section)

    *   Start GDB and load the core dump

    *   Add symbol information from the kernel

    *   Load Kernel Debug Kit GDB macros

    *   Load our KEXT binary of MyDebugDriver into GDB

    *   Load symbol information for MyDebugDriver (if GDB cannot find them in the
    same location as the KEXT)

    *   Tell GDB the location of the source code for MyDebugDriver (optional)


