- fmt: "### The IOUSBLib Framework\n\nThe library used to write a user-space driver\
    \ for a USB device is known as `IOUSBLib`, which is part of the I/O Kit framework\
    \ (that is, the same framework a user-space application includes if it is communicating\
    \ with a user client it defined itself).\n\nThe first task a user-space driver\
    \ needs to perform is to watch for the arrival of the particular USB devices it\
    \ is interested in. Since USB devices can be connected and disconnected from the\
    \ computer at any time, there is no guarantee the device an application is interested\
    \ in will be present when the application is launched. Therefore, it's a good\
    \ idea for an application to install a notification callback that watches for\
    \ the arrival of the USB devices it controls.\n\nIn Chapter 5, we saw how an application\
    \ can create a matching dictionary to find each instance of a specified kernel\
    \ driver. This same approach is used by an application that implements a user-space\
    \ USB driver to locate the devices it will control. As in Chapter 5, we begin\
    \ by creating a dictionary that specifies the class name of the driver objects\
    \ our application is interested in matching against. For a USB device, this can\
    \ be done as follows:\n\n`matchingDictionary = IOServiceMatching(kIOUSBDeviceClassName);`\
    \ // “IOUSBDevice”\n\nThis matching dictionary is far too general for most applications\
    \ since it will match against all USB devices connected to the computer, including\
    \ the keyboard and mouse. An application is typically interested in only one particular\
    \ USB device, so a matching dictionary such as this will be inappropriate. We\
    \ can narrow down the list of devices the matching dictionary satisfies by including\
    \ the specific Product ID and Vendor ID of the USB device our application can\
    \ support.\n\nA sample function that will create a matching dictionary for a USB\
    \ device of a specified Vendor ID and Product ID is shown in Listing 15-1.\n\n\
    **Listing 15-1.** Creating a USB Matching Dictionary\n\n```c\n#include <IOKit/IOKitLib.h>\n\
    #include <IOKit/usb/IOUSBLib.h>\n#include <CoreFoundation/CoreFoundation.h>\n\n\
    CFDictionaryRef         MyCreateUSBMatchingDictionary (SInt32 idVendor, SInt32\
    \ idProduct)\n{\n        CFMutableDictionaryRef  matchingDictionary = NULL;\n\
    \        CFNumberRef             numberRef;\n\n        // Create a matching dictionary\
