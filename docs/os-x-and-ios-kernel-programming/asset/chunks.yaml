    We simulate a hardware interrupt by setting the TX interrupt flag in our dummy
    interrupt register and then invoking our timer function to simulate an interrupt
    received from a hardware device a microsecond later.


    The transmission of the packet to the hardware is again hardware-dependent. A
    PCI or Thunderbolt-based device is likely to use DMA. In this case, there are
    two options:


    *   The first is to have a pre-allocated physically allocated buffer; for example,
    one allocated with `IOBufferMemoryDescriptor`, using the `kIOMemoryPhysicallyContiguous`
    option, which an `mbuf` will be copied into and then DMA''ed to the hardware.
    Because an `mbuf` may consist of several chained buffers, it is important to ensure
    that you walk the chain with `mbuf_next()` so that all the segments can be copied
    into the DMA buffer.

    *   The second option, if the device supports it, is to create a scatter/gather
    list directly from the `mbuf`, using a variant of `IOMbufMemoryCursor`, which
    will avoid performing an extra copy. The cursor class takes care of generating
    the list of physical segments from the `mbuf`. Several `IOMbufMemoryCursors` subclasses
    exist; which one to use depends on the device and its limitations. For example,
    if you use a device that reads addresses in big-endian format, you can use the
    `IOMbufBigMemoryCursor`, which can be created with the `withSpecification()` factory
    method:


    `static IOMbufBigMemoryCursor* withSpecification(UInt32 maxSegmentSize, UInt32
    maxNumSegments);`


    The `maxSegmentSize` can be used to limit the size of individual scatter/gather
    list elements. Similarly, the `maxNumSegments` controls the length of the list.


