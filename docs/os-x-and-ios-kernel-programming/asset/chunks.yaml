    by calling a function that takes this connection object as a parameter. When the
    application is no longer interested in controlling the driver, it makes a call
    to the function `IOServiceClose()`.


    When an application calls the function `IOServiceOpen()`, the operating system
    calls the specified driver object in the kernel, which handles the request. The
    driver''s class receives the following method call:


    `IOReturn    DriverClass::newUserClient (task_t owningTask, void* securityID,
    UInt32 type,`

    `OSDictionary* properties, IOUserClient** handler)`


    Many of the parameters to the `newUserClient()` method should look familiar. They
    are simply the values that the user space application passed to the `IOServiceOpen()`
    function. The kernel implementation of `newUserClient()` is responsible for instantiating
    a new user client object and returning it to the caller through the `handler`
    parameter. However, most drivers will never need to implement th`e newUserClient()`
    method because an implementation that is suitable for nearly all uses is provided
    by the `IOService` base class. To take advantage of this standard implementation,
    all that a driver needs to do is add a string value to its property table with
    the key “`IOUserClientClass`.” The value of this property is a string value that
    contains the class name of a driver''s user client class. This can be done either
    by adding an entry to the driver''s personality in the Info.plist file (because
    the driver''s property table is initialized from the values in the Info.plist
    file) or by manually setting the property when the driver loads. For example,
    the driver in [Figure 5-2](#Chapter05.html#fig_5_2) has a user client that is
    implemented by a class named `MyUserClient` and, as a result, would set its user
    client class with the following call:


    `setProperty("IOUserClientClass", "MyUserClient");`


    The standard implementation of `newUserClient()` will instantiate the driver''s
    specified user client class and initialize the new user client, making the main
    driver class its provider.


    Let''s look at how we would implement a user client class for the tutorial I/O
    Kit driver that was developed in [Chapter 4](#Chapter04.html#ch4). The header
    file for a skeleton user client class for this driver is shown in [Listing 5-8](#Chapter05.html#list_5_8).
    You will notice that many of the methods that the user client implements are similar
    to the methods implemented by the main driver class, which is because the class
    `IOUserClient` is derived from the same `IOService` class that every driver is
    ultimately derived from. A user client therefore implements the same initialization
    and termination methods that any other driver class must implement.


    ***Listing 5-8.** The Header File for a Basic User Client Class*


    `class com_osxkernel_driver_IOKitTestUserClient : public IOUserClient`

    `{`

    `        OSDeclareDefaultStructors(com_osxkernel_driver_IOKitTestUserClient)`


    `private:`

    `        task_t                          m_task;`

    `        com_osxkernel_driver_IOKitTest* m_driver;`


    `public:`

    `        virtual bool    initWithTask (task_t owningTask, void* securityToken,`

    `                                        UInt32 type, OSDictionary* properties);`

    `        virtual bool    start (IOService* provider);`


    `        virtual IOReturn        clientClose (void);     `

    `        virtual void    stop (IOService* provider);`

    `        virtual void    free (void);`

    `};`


    Along with the familiar methods `start()`, `stop(),` and `free()`, the user client
    provides an additional method that is part of a user client''s object management,
    namely `clientClose()`. This method is called when the user space application
    has closed its connection to the driver, either through a call to `IOServiceClose()`
    or because the application has terminated or crashed. A driver should not trust
    a user space application to be well-written and to tidy up after itself before
    the user client is closed. Therefore, the `clientClose()` method is a good place
    for a driver to make sure that the hardware is returned to an idle state and ready
