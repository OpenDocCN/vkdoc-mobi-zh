- fmt: "# I/O Kit Interrupt Mechanisms\n\nThe preferred way to handle both primary\
    \ and secondary interrupts in I/O Kit is through the work loop system. However,\
    \ direct handling is also possible. If you are unsure about how work loops operate,\
    \ check out [Chapter 7](#Chapter07.html#ch7) for more details. There are three\
    \ main mechanisms available to handle driver interrupts. [Figure 9-4](#Chapter09.html#fig_9_4)\
    \ shows how the three different mechanisms respond to primary interrupts.\n\n\
    ![images](images/0904.jpg)\n\n**Figure 9-4.** I/O Kit mechanisms for handling\
    \ device interrupts\n\n- `IOInterruptEventSource`: The standard and easiest way\
    \ to handle device interrupts. You simply register a handler method, which is\
    \ executed in the secondary interrupt context. Your driver never has to deal with\
    \ primary interrupts. Interrupts will be disabled from the provider until the\
    \ interrupt handler has completed, thus guaranteeing single-threaded handling\
    \ of the interrupt, as another handler cannot run in parallel. `IOInterruptEventSource`\
    \ is the preferred way of handling interrupts.\n- `IOFilterInterruptEventSource`:\
    \ Shown on the left in [Figure 9-4](#Chapter09.html#fig_9_4), it is a subclass\
    \ of `IOInterruptEventSource` and provides more flexibility. It allows a custom\
    \ filter action to be supplied. This filter action is invoked in primary interrupt\
    \ context and allows a driver to interrogate a hardware device to see if it really\
    \ has an interrupt. If the interrupt is shared between several devices or the\
    \ device is a complex or multi-function device with many possible interrupts or\
    \ have requirements for very low latency, this method is recommended. The secondary\
    \ interrupts are scheduled based on the return value of the installed filter action\
    \ (routine).\n- `IOService::registerInterrupt()`: The last method is to use `IOService::registerInterrupt()`\
    \ to register a C function that will be invoked during primary interrupt. This\
    \ method does not use the driver's work loop and provides no means to invoke a\
    \ secondary interrupt handler. If secondary interrupts are required, the mechanism\
    \ for handling them would have to be implemented manually.\n\n## Registering to\
    \ Receive Interrupts\n\nAs with many things in the I/O Kit, registering interrupts\
    \ is simple and most of the heavy lifting is handled internally by the I/O Kit\
    \ and the Platform Expert. We do not have to worry about assigning an IRQ number\
    \ or interrupt routing because that is automatically handled. A typical block\
    \ of code demonstrating how to register a driver to receive interrupts from its\
    \ provider (`IOPCIDevice`) with a primary interrupt filter is shown in [Listing\
    \ 9-7](#Chapter09.html#list_9_7).\n\n**Listing 9-7.** Creating a Filtering Interrupt\
    \ Event Source\n\n```\nbool MyFirstPCIDriver::start(IOService * provider)\n{\n\
    \    ...\n    IOWorkLoop *workLoop = (IOWorkLoop*)getWorkLoop();\n    if (!workLoop)\n\
    \        return false;\n\n    IOFilterInterruptEventSource* interruptSource =\n\
    \        IOFilterInterruptEventSource::filterInterruptEventSource(this,\n    \
    \            (IOInterruptEventAction) &MyFirstPCIDriver::interruptOccurred,\n\
    \                (IOFilterInterruptAction) &MyFirstPCIDriver::interruptFilter,\n\
    \                provider, 0);\n\n    if (workLoop->addEventSource(interruptSource)\
    \ != kIOReturnSuccess)\n            return false;\n    ...\n}\n```\n\nThere are\
    \ four steps involved:\n\n1. Obtain or allocate an `IOWorkLoop` instance.\n2.\
    \ Allocate the event source, which is done using the factory method `filterInterruptEventSource()`.\
    \ We pass five parameters:\n   - A pointer to ourselves,\n   - A pointer to the\
    \ secondary interrupt handler `interruptOccurred()` method,\n   - The filter action\
    \ method that will be executed in primary interrupt context,\n   - The last argument\
    \ is the interrupt index number of the provider and can be specified if a provider\
    \ has more than one interrupt type. For example, the provider may support Message\
    \ Signaled Interrupts (MSI) in addition to shared interrupts,\n   - The index\
    \ of the interrupt type. See the section \"Enabling Message Signaled Interrupts\"\
    \ for details.\n3. Add the event source to the `IOWorkLoop` instance using `addEventSource()`.\n\
    4. The last step is to enable the event source, as it is disabled by default,\
    \ even after it is added to the work loop. To start receiving interrupts, simply\
    \ call `interruptSource->enable()`.\n\nIt is important to make sure the driver\
    \ is fully initialized and ready to receive interrupts before this is called or,\
    \ if possible, ensure interrupts are deactivated on the hardware itself until\
    \ the driver is ready to process them.\n\nTo register an `IOInterruptEventSource`,\
    \ the process is nearly identical and is shown in [Listing 9-8](#Chapter09.html#list_9_8).\n\
    \n**Listing 9-8.** Creating an Interrupt Event Source\n\n```\nIOWorkLoop *workLoop\
    \ = (IOWorkLoop*)getWorkLoop();\nif (!workLoop)\n        return false;\n\nIOInterruptEventSource*\
    \ interruptSource =\n        IOInterruptEventSource::interruptEventSource(this,\n\
    \                    (IOInterruptEventAction) &MyFirstPCIDriver::interruptOccurred,\n\
    \                    provider, 0);\n\nif (workLoop->addEventSource(interruptSource)\
    \ != kIOReturnSuccess)\n        return false;\n...\n```\n\nThe only difference\
    \ is that it doesn't accept a filter action, as is the case with `IOFilterInterruptEventSource`.\n\
    \n## Enabling Message Signaled Interrupts\n\nIf you need to be sure that Message\
    \ Signaled Interrupts (MSI) is used, you must first enumerate the index of the\
    \ MSI interrupt type. In [Listings 9-7](#Chapter09.html#list_9_7) and [9-8](#Chapter09.html#list_9_8),\
    \ we simply passed 0 to get the first interrupt type of the provider, which may\
    \ or may not be MSI capable, depending on the device. The following method will\
    \ enumerate available interrupt types of the provider and return the index of\
    \ the MSI interrupt type, which can then be passed in as the index argument to\
    \ `IOInterruptEventSource::interruptEventSource()`:\n\n```\nint com_osxkernel_MyFirstPCIDriver::findMSIInterruptTypeIndex()\n\
    {\n    IOReturn ret;\n    int index, source = 0;\n\n    for (index = 0; ; index++)\n\
    \    {\n        int interruptType;\n        ret = fPCIDevice->getInterruptType(index,\
    \ &interruptType);\n        if (ret != kIOReturnSuccess)\n            break;\n\
    \n        if (interruptType & kIOInterruptTypePCIMessaged)\n        {\n      \
    \      source = index;\n            break;\n        }\n    }\n    return source;\n\
    }\n```"
