    \ I/O Registry. If you're coming from a Windows background, don't confuse the\
    \ I/O Registry with the Windows Registry. The I/O Registry is a tree of I/O Kit\
    \ objects that is created when the system is started, and then it dynamically\
    \ grows or shrinks as hardware devices and their corresponding drivers are loaded\
    \ or unloaded from the system. Unlike the Windows Registry, the I/O Registry is\
    \ never written to disk or saved between reboots of the computer.\n\nThe IOService\
    \ plane includes all objects in the I/O Registry. As such, it can be a little\
    \ overwhelming when trying to locate a particular driver. To help find a particular\
    \ driver in the I/O Registry, IORegistryExplorer provides a search field that\
    \ can be used to filter the objects shown to those whose name matches a particular\
    \ string.\n\nIORegistryExplorer also displays the property table for each driver\
    \ object. When the I/O Kit loads a driver, it initializes its property table to\
    \ the contents of the matching dictionary that corresponds to the driver personality\
    \ that was loaded; this corresponds to the `OSDictionary` object that was passed\
    \ to the driver class's `init()` method. As the driver runs, it may manipulate\
    \ its property list by adding or removing additional key/value pairs or by changing\
    \ the value of a particular key. These changes are local to the driver instance\
    \ (and so if the same driver is loaded multiple times for several devices in the\
    \ system, they each have their own property table). [Figure 4-4](#Chapter04.html#fig_4_4)\
    \ shows IORegistryExplorer for the sample IOKit driver that we developed earlier.\n\
    \n![images](images/0404.jpg)\n\n***Figure 4-4.** IORegistryExplorer displaying\
    \ the IOKitTest sample. The property table shown on the right was initialized\
    \ from the contents of the driver's matching dictionary in its Info.plist file.*\n\
    \nObjects in the I/O Registry are organized into several planes. Each plane shows\
    \ only those objects that share certain functionality. When launched, IORegistryExplorer\
    \ will default to showing the relationship of objects in the “IOService” plane,\
    \ which includes all objects in the I/O Registry. Some of the other planes that\
    \ are commonly used include:\n\n*   IODeviceTree: This is a static plane that\
    \ reflects the hardware configuration of the system; it does not change as hardware\
    \ devices are connected to the system. The contents of the device tree largely\
    \ depend on the system motherboard and will consist of a static snapshot of the\
    \ computer's configuration at boot time, including PCI slots, built-in USB ports,\
    \ and any hardware controllers that are on the motherboard, such as the CPU, memory,\
    \ and USB controllers.\n*   IOPower. This plane shows all driver objects that\
    \ have implemented power management and will receive notifications from the I/O\
    \ Kit when the system is switching to a different power state such as when entering\
    \ sleep mode.\n*   IOUSB. This plane shows all USB devices and hubs that are connected\
    \ to the system. It includes the USB devices only; the corresponding driver that\
    \ has been loaded for a device can be seen in the IOService plane.\n\nThe I/O\
    \ Registry is also accessible on the command line through the tool “ioreg.” Unlike\
    \ IORegistryExplorer, which is available if the Xcode tools have been installed,\
    \ ioreg is a standard part of a Mac OS X installation and is useful when debugging\
    \ on an end-user's machine or any other system in which the developer tools are\
    \ unlikely to be installed.\n\n### The Kernel Library: libkern\n\nThe runtime\
    \ support and base classes on which the I/O Kit is built are implemented in a\
    \ library known as libkern. The libkern library provides support that makes up\
    \ for much of the functionality that is excluded in the embedded C++ language.\
    \ The libkern library defines a class known as `OSObject,` which provides the\
    \ base class that is used by all I/O Kit classes. Since the base driver class\
    \ `IOService` is a subclass of `OSObject`, the main class of a driver will also\
    \ be derived from `OSObject`. Any class that is derived from `OSObject` gets the\
    \ following functionality:\n\n*   Runtime Type Information, which is implemented\
    \ through custom macros provided by libkern. These macros provide functionality\
    \ that includes\n    *   Type introspection, which is the ability at runtime to\
    \ determine the type of an object or whether it is derived from a given base class\n\
    \    *   Dynamic casting, which is the ability to cast an object to the type of\
    \ one of its derived classes (for example, to cast the provider class from an\
    \ object of type `IOService` to `IOUSBDevice`)\n*   Object creation, including\
    \ the ability to instantiate an object based on a string representation of its\
    \ class name\n*   Object reference counting based on retain/release semantics\n\
    *   Object tracking, that is, the ability to determine how many instances of a\
    \ certain class have been instantiated but not yet released"
  trans: "\n#### `IORegistryExplorer`\n\n苹果提供了一个非常有用的工具，用于可视化系统中已加载的驱动程序，即“`IORegistryExplorer`”。该工具是\
    \ Xcode 工具集的一部分。`IORegistryExplorer` 以图形方式展示当前系统上已加载的驱动程序，以及它们与其他驱动程序之间的关系。这种关系以层级结构呈现，其中提供者类与其所连接的客户端之间构成父子关系。\n\
    \n`IORegistryExplorer` 所展示的是被称为 I/O Registry（I/O 注册表）的实体。如果你有 Windows 背景，请不要将\
    \ I/O Registry 与 Windows 注册表混淆。I/O Registry 是一个 I/O Kit 对象的树状结构，在系统启动时创建，随后会随着硬件设备及其相应驱动程序被加载或卸载而动态增长或缩小。与\
    \ Windows 注册表不同，I/O Registry 从不写入磁盘，也不会在计算机重启之间保存。\n\n`IOService` 平面包含了 I/O Registry\
    \ 中的所有对象。因此，在尝试定位某个特定驱动程序时，可能会显得信息量过大。为了帮助在 I/O Registry 中查找特定驱动程序，`IORegistryExplorer`\
    \ 提供了一个搜索字段，可用于筛选显示的对象，仅显示名称与特定字符串匹配的对象。\n\n`IORegistryExplorer` 还会显示每个驱动程序对象的属性表。当\
    \ I/O Kit 加载一个驱动程序时，它会将属性表初始化为与所加载的驱动程序个性相匹配的字典内容；这对应于传递到驱动程序类 `init()` 方法的 `OSDictionary`\
    \ 对象。随着驱动程序的运行，它可能会通过添加或删除额外的键/值对，或更改特定键的值来操作其属性列表。这些更改仅限于该驱动程序实例本身（因此，如果同一个驱动程序因系统中多个设备而被多次加载，每个实例都有自己独立的属性表）。图\
    \ 4-4 展示了我们之前开发的示例 IOKit 驱动程序的 `IORegistryExplorer` 界面。\n\n![images](img/0404.jpg)\n\
    \n**图 4-4.** 显示 IOKitTest 示例的 `IORegistryExplorer`。右侧显示的属性表是根据驱动程序 `Info.plist`\
    \ 文件中匹配字典的内容初始化的。\n\nI/O Registry 中的对象被组织成多个平面。每个平面仅显示共享特定功能的对象。启动时，`IORegistryExplorer`\
    \ 默认显示“`IOService`”平面中对象的关系，该平面包含 I/O Registry 中的所有对象。其他常用平面包括：\n\n- **IODeviceTree:**\
    \ 这是一个静态平面，反映系统的硬件配置；它不会随着硬件设备连接到系统而改变。设备树的内容很大程度上取决于系统主板，由计算机启动时的硬件配置静态快照组成，包括\
    \ PCI 插槽、内置 USB 端口以及主板上的所有硬件控制器，例如 CPU、内存和 USB 控制器。\n- **IOPower:** 此平面显示所有实现了电源管理的驱动程序对象。当系统切换到不同的电源状态时（例如进入休眠模式），这些对象会从\
    \ I/O Kit 接收通知。\n- **IOUSB:** 此平面显示连接到系统的所有 USB 设备和集线器。它仅包含 USB 设备；为设备加载的相应驱动程序可以在\
    \ `IOService` 平面中查看。\n\nI/O Registry 也可以通过命令行工具“`ioreg`”访问。与需要安装 Xcode 工具才能使用的\
    \ `IORegistryExplorer` 不同，`ioreg` 是 Mac OS X 安装中的标准组成部分，在最终用户的机器或任何其他可能未安装开发者工具的系统上进行调试时非常有用。\n\
    \n### 内核库：`libkern`\n\nI/O Kit 所依赖的运行时支持和基类实现在一个名为 `libkern` 的库中。`libkern` 库提供了对嵌入式\
    \ C++ 语言中许多缺失功能的支持。`libkern` 库定义了一个名为 `OSObject` 的类，它作为所有 I/O Kit 类使用的基类。由于基础驱动类\
    \ `IOService` 是 `OSObject` 的子类，因此驱动程序的主类也将派生自 `OSObject`。任何派生自 `OSObject` 的类都具备以下功能：\n\
    \n- **运行时类型信息**，通过 `libkern` 提供的自定义宏实现。这些宏提供的功能包括：\n    - **类型自省**，即在运行时确定对象的类型，或判断其是否派生自某个给定基类的能力。\n\
    \    - **动态转换**，即将对象转换为某个派生类类型的能力（例如，将提供者类从 `IOService` 类型转换为 `IOUSBDevice` 类型）。\n\
    - **对象创建**，包括基于类名的字符串表示来实例化对象的能力。\n- **基于 `retain`/`release` 语义的对象引用计数**。\n- **对象追踪**，即能够确定某个类有多少实例已被实例化但尚未释放。\n"
- fmt: "# OSObject\n\nSome of the features provided by libkern should be very familiar\
    \ if you have written user applications with Apple's Cocoa framework. In particular,\
    \ the `OSObject` class can be thought of as the kernel equivalent of the `NSObject`\
    \ class in Cocoa, and the dynamic type introspection capabilities are almost identical\
    \ to their counterparts provided by the Objective-C runtime.\n\nThere is no requirement\
    \ to use `OSObject` as the superclass for classes that are private to your driver,\
    \ although you may find that the reference counting and object tracking that `OSObject`\
    \ provides (without any extra work from you) is reason enough to adopt it.\n\n\
    Adopting `OSObject` as the base class involves the following steps:\n\n1. Using\
    \ the standard C++ syntax, declare your class to be a subclass of `OSObject`,\
    \ or a class that is derived from `OSObject` (such as `IOService`). If you are\
    \ subclassing from `OSObject`, you may need to include the header file `<libkern/c++/OSObject.h>`.\n\
    2. As the first line of your class's declaration (in your class's header file),\
    \ include the macro `OSDeclareDefaultDestructors()`, passing the name of your\
    \ class as its argument. This macro, among other things, declares the standard\
    \ C++ constructor and destructor for your class, and so you should not add either\
    \ to your class declaration. Instead, add a method named `init()` to your class\
    \ to act as the constructor, and a method named `free()` to act as the destructor.\
    \ You are free to add any arguments that your class requires to the `init()` method,\
    \ as is shown in the following example.\n\n   ```\n   class com_osxkernel_driver_MyObject\
    \ : public OSObject\n   {\n       OSDeclareDefaultStructors(com_osxkernel_driver_MyObject)\n\
    \   public:\n       virtual bool     init (const char* name);\n       virtual\
    \ void     free ();\n       …\n   };\n   ```\n\n3. In the file that implements\
    \ your class, place the macro `OSDefineMetaClassAndStructors()`, which takes two\
    \ arguments, the name of the class, and the name of its direct superclass. The\
    \ first few lines of an implementation file typically follow the pattern `#include\
    \ \"MyObject.h\"`\n\n   ```\n   // Define super as a convenience macro to refer\
    \ to the superclass\n   #define super OSObject\n\n   OSDefineMetaClassAndStructors(com_osxkernel_driver_MyObject,\
    \ OSObject)\n   ```\n\n4. Provide an implementation of the methods `init()` and\
    \ `free()`. These two methods play the role of the constructor and destructor,\
    \ respectively, as shown in the following example.\n\n   ```\n   bool com_osxkernel_driver_MyObject::init\
    \ (const char* name)\n   {\n       if (! super::init())\n               return\
    \ false;\n\n       // Additional initialization\n       return true;\n   }\n \
    \  void com_osxkernel_driver_MyObject::free ()\n   {\n       // Release resources\
    \ allocated in init()\n       super::free();\n   }\n   ```\n\nHaving defined an\
    \ object that subclasses from `OSObject`, it can be instantiated in your code\
    \ by calling the C++ `new` operator followed by the `init()` method. As a convenience,\
    \ many classes provide a static method that performs both of these steps, and\
    \ return a non-`NULL` object on success, as shown in [Listing 4-4](#Chapter04.html#list_4_4).\n\
    \n**Listing 4-4.** The Definition of a Static Helper Method to Construct a New\
    \ Instance of a Custom Class\n\n```\ncom_osxkernel_driver_MyObject*\n        com_osxkernel_driver_MyObject::withName\
    \ (const char* name)\n{\n        com_osxkernel_driver_MyObject* me = new com_osxkernel_driver_MyObject;\n\
    \n        if (me && !me->init(name))\n        {\n                me->release();\n\
    \                return NULL;\n        }\n\n        return me;\n}\n```\n\nThe\
    \ lifetime of any object that is based on `OSObject` is determined by reference\
    \ counting. When an object is first created, its reference count is initialized\
    \ to 1. To free an object, rather than using the C++ operator `delete` (which\
    \ the `OSDeclareDefaultStructors` macros declare as a protected method), your\
    \ code should instead call the `release()` method. This method is implemented\
    \ by the `OSObject` class and decrements the reference count of the object by\
    \ 1. When the object's final reference is released, and the object's reference\
    \ count becomes 0, the object is released and the `free()` method is called. If\
    \ your code takes a pointer to an object that it needs to hold on to, it will\
    \ need to extend the lifetime of that object to ensure that the object is not\
    \ released while your code is holding a reference to it. This is done by calling\
    \ the `retain()` method, which increments the reference count of the target object\
    \ by 1. To prevent memory leaks, it is important that each call to `retain()`\
    \ is matched with a call to `release()`.\n\nAny object that is derived from `OSObject`\
    \ allows type introspection. To cast an object into another type, libkern provides\
    \ a macro named `OSDynamicCast(type, object)`, which performs the equivalent of\
    \ the C++ operator `dynamic_cast<type>(object)`. The macro verifies whether the\
    \ object is derived from the requested class, and if so, a pointer to the object\
    \ is returned; otherwise, the macro returns `NULL`. The most common use of dynamic\
    \ casting is to safely convert an object from a base class to a more specialized\
    \ class. For example, the driver's `start()` method is passed a pointer to its\
    \ provider class as an `IOService` object. However, the provider is actually a\
    \ more specialized class such as `IOUSBDevice` or `IOPCIDevice`, and a dynamic\
    \ cast allows this conversion to be made safely. For example, a driver that controls\
    \ a USB device will contain the following code in its `start()` method to convert\
    \ the provider from an `IOService` to an `IOUSBDevice`:\n\n```\nIOUSBDevice* usbDevice\
    \ = OSDynamicCast(IOUSBDevice, provider);\nif (usbDevice == NULL)\n{\n       \
    \ IOLog(\"Unknown provider class\\n\");\n        return false;\n}\n```\n\nThe\
    \ `OSObject` base class can also track the number of instances of each of its\
    \ derived classes that have been instantiated but not yet released. This information\
    \ is not only useful for the I/O Kit; it also provides an invaluable mechanism\
    \ for tracking memory leaks. Internally, the I/O Kit uses the instance count of\
    \ each class to ensure that it does not unload a kernel extension that has outstanding\
    \ objects, which would lead to a kernel panic. When a kernel extension no longer\
    \ has any outstanding instances for all classes that it defines, the kernel will\
    \ unload that kernel extension. The number of instances of each `OSObject`-derived\
    \ class can be examined through the command line tool `ioclasscount`.\n\n![images](images/square.jpg)\
    \ **Tip** If you open Terminal and run the command `ioclasscount` after loading\
    \ the IOKitTest tutorial, you will see a single instance of the class `com_osxkernel_driver_IOKitTest`."
