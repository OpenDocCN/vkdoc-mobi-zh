  raw: '*   `DeviceRequest`: Is a synchronous method and will not return until the
    device request has completed. The device request is described by the same `IOUSBDevRequest`
    structure used by kernel USB drivers.

    *   `DeviceRequestTO`: Is a synchronous method that takes two timeout values,
    expressed in milliseconds. The method will return once the device request has
    completed or a specified timeout period has elapsed (whichever comes first). The
    caller provides two timeout values. The device may stop sending or receiving data
    while handling the request, so one timeout value specifies the maximum amount
    of time to wait since the last data transfer before aborting the control request.
    The other timeout value specifies the maximum amount of time to allow for the
    control request to complete from start to finish. A control request is aborted
    if either of the specified timeout conditions occurs.

    *   `DeviceRequestAsync`: Is an asynchronous equivalent of the method `DeviceRequest`.
    The method takes a callback function the I/O Kit uses to notify the caller once
    the request has completed. It''s important to note that a return value of `kIOReturnSuccess`
    from this method doesn''t indicate the request completed successfully; rather,
    it indicates the operation was successfully started. The actual result of the
    operation will be returned through the callback function. The value of the `arg0`
    parameter passed to the completion callback holds the number of bytes that were
    either read from the device or written to the device.


    [Listing 15-4](#Chapter15.html#list_15_4) lists a sample function that uses the
    `DeviceRequest` method to read the manufacturer string from the USB string table.
    The function starts by calling `USBGetManufacturerStringIndex` to obtain the index
    of the manufacturer string. Next, the device request structure is prepared. The
    `bmRequestType` field specifies that the request is a data read (`kUSBIn`), is
    a standard request (as opposed to a request defined by the device class or is
    vendor-specific), and that the recipient of the request is the device (as opposed
    to an interface or an endpoint). Since the string table is treated as just another
    descriptor table by the USB Specification, the control request that is sent to
    the device to read a string is the `kUSBRqGetDescriptor` request. The `wValue`
    field indicates we are reading a string descriptor and also contains the index
    of the string to be read.


    Finally, if the string data is successfully read from the device, the function
    creates a `CFStringRef` from the returned data, which is returned from the device
    with an encoding of UTF-16 little-endian.


