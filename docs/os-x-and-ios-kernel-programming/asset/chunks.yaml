    partitioned and initialized with a file system. Before doing this, it is interesting
    to examine the state of the driver stack with the IORegisterExplorer utility.
    In addition to the `RAMDisk` transport driver and the `RAMDiskStorageDevice` nub,
    you will notice that the I/O Kit has constructed three drivers on top of the nub
