  raw: 'If the `probe()` method returns successfully and the I/O Kit doesn''t find
    a better driver, our partition driver will be added to the storage stack and its
    `start()` method will be called. The role of a partition driver''s `start()` method
    is to attach each of its `IOMedia` objects to the storage driver stack, where
    each `IOMedia` object represents a single partition entry on the disk. This is
    done through the `IOService` method named `attach()`, which inserts the `IOMedia`
    object into the service plane of the I/O Registry as a child of the partition
    driver (which is the provider class).


    As well as inserting the `IOMedia` object into the service plane of the I/O Registry,
    it may also be necessary to insert the `IOMedia` object into the device plane
    of the I/O Registry. This is only needed if the partition could potentially be
    used as the boot volume on a PowerPC-based Macintosh. This is because the boot
    volume on a PowerPC-based Macintosh is identified through its location in the
    I/O Registry device plane, so the `IOMedia` object that represents the boot partition
    needs to have an entry in the device plane. The `IOPartitionScheme` superclass
    provides a method named `attachMediaObjectToDeviceTree()`, which will insert an
    IOMedia object into the I/O Registry''s device plane.


    The `scan()` method is a custom method that determines whether the disk contains
    a partition scheme that is supported by the driver and, if so, reads the partition
    table entries from the disk and creates a set of `IOMedia` objects that represent
    each partition. This requires the partition driver to be able to read the disk,
    which is performed through the driver''s provider object. As specified in the
    driver''s matching dictionary (see [Listing 14-8](#Chapter14.html#list_14_8)),
    the partition driver''s provider class is an `IOMedia` object that represents
    the entire disk. An example implementation of the `scan()` method is provided
    in Listing 14-10.


