    ### State-Based Interaction


    Although the approach of getting and setting driver properties provides a very
    easy way to interact with a driver and a hardware device, it is rather inflexible,
    which makes it suitable only for very specific uses. The I/O Kit Framework provides
    another method for interacting with drivers from user space applications that
    is based on a connection between a user application and the driver. The use of
    a connection allows the driver to determine which user application a request has
    originated from and can therefore associate a state with the connection. (Alternatively,
    because an application can have multiple connections open to a driver, the driver
    can determine which connection a request is originating from.) This allows for
    the implementation of complex protocols and state-based control.


    For example, a hardware device may be accessible to one user space application
    at a time, which requires an application to request exclusive access to the device.
    Having obtained exclusive access, it may then need to configure the device before
    reading or writing data. With a connection-based approach, the driver can allow
    control of the hardware to the client that has been granted exclusive access to
    the device and reject requests from other connections. Furthermore, it can ensure
    that a client cannot read or write data if that connection hasn''t previously
    configured the hardware as required. The use of a connection also allows a driver
    to implement asynchronous operations. An application can send a request to the
    driver to begin a background operation and could then poll the driver to determine
    whether the transaction has been completed. Because the driver sees the request
    to begin the operation and each request to poll the status of the operation is
    being made from the same connection, it can use this to determine which operation
    the application is polling. Alternatively, the driver could use the application''s
    connection to send a notification to the application when the background operation
    has completed and thus eliminate the need for the status to be polled.


    In the kernel, each connection made to the driver from a user application is represented
    by a class known as `IOUserClient`. For each connection made to a driver, the
    I/O Kit instantiates an `IOUserClient` object, and that object is destroyed only
    when the application closes its connection to the driver or when the application
    terminates. All control requests that the application makes to the driver are
    handled by the user client object that represents that particular connection.
    A driver provides its own implementation of a class that subclasses from `IOUserClient`,
    adding any methods and instance variables that it needs to maintain the state
    of an application''s connection.


    The ingenuity of the I/O Kit design is that user client objects are themselves
    a driver object: the `IOUserClient` class inherits from `IOService` and, as with
    any other `IOService` instance, each user client has a provider class that, for
    a user client, is the instance of the driver that the application is controlling.
    An example of the relationship between a driver and its user client instances
    is shown in [Figure 5-2](#Chapter05.html#fig_5_2).


    ![images](images/0502.jpg)


    ***Figure 5-2.** The relationship between a driver object and its user client
    objects that provide the kernel-side representation of an application''s connection
    to the driver.*


