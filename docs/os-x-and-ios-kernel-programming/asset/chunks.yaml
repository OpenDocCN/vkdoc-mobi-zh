- fmt: '# 排版后的文本


    Having written a partition table and file system to the disk, the disk image can
    be mounted in the future by simply opening the disk image file. The I/O Kit will
    be able to automatically create the entire driver storage stack without any user
    involvement – from the transport driver for the disk image, the GUID partition
    scheme driver, the encryption filter scheme, and finally the HFS file system at
    the top of the stack.


    ### Summary


    - The functionality provided by a storage volume containing a file system is implemented
    through a stack of multiple drivers, each of which may be supplied by a different
    vendor. The driver at each level of the storage driver stack is responsible for
    performing a specific role.

    - At the bottom of the stack is the transport driver, which interfaces directly
    with the hardware device that provides the data storage.

    - The block storage driver provides an abstract representation of the storage
    device as a sequence of bytes that is organized into fixed-sized blocks and provides
    random-access to its data. The block storage driver sits above the transport driver
    in the driver stack.

    - A partition driver is responsible for reading the partition table from a disk
    and creating a driver object to represent each logical volume that exists in the
    partition table. The partition driver sits above the block storage driver in the
    driver stack.

    - The I/O Kit represents a logical volume through a driver object called `IOMedia`.
    Each `IOMedia` object can be accessed by a user space process through an interface
    in the `/dev` directory.

    - The I/O Kit allows vendors to insert a filter scheme driver into the storage
    driver stack to intercept all read and write requests that are made to a disk.
    This can be used to implement a RAID driver, or to encrypt the data that is written
    to a disk.

    - The file system driver sits at the very top of the storage driver stack. Although
    file system drivers read and write through the I/O Kit storage driver stack indirectly,
    they are actually part of the BSD layer of Mac OS X and are not part of the I/O
    Kit.


    ## C H A P T E R  15


    ## User-Space USB Drivers


    From a user''s perspective, an application that requires a kernel driver detracts
    from the user experience. To begin with, driver installation involves writing
    to the "Extensions" directory, which requires administrative privileges. Therefore,
    the user needs to run an installer and enter the password of an administrative
    account, and then possibly restart before they can begin using the application.
    If, on the other hand, the application doesn''t require a kernel driver, the installation
    procedure can be as simple as downloading an application from the Mac App Store.


    In some cases, an application that would typically require a kernel driver can
    instead be written without the developer having to write any code that runs inside
    the kernel. Instead, the actions that would usually be performed by the driver
    can be done by the application. The advantage of this approach is that there is
    no kernel driver that needs to be installed, so the user doesn''t need administrative
    privileges to install the application. Another advantage of moving the driver
    code out of the kernel and into the application is that any bugs that are present
    in the code can, at worst, crash the application, but they cannot cause a kernel
    panic that can bring down the entire system.


    Not all hardware devices can be controlled through a user-space driver; for example,
    devices that contain a memory-mapped address range require a kernel driver. Similarly,
    devices that generate interrupts need a kernel driver, since only kernel code
    can execute at primary interrupt level. This means that all PCI and Thunderbolt
    devices need to be supported by a kernel driver. However, USB- and FireWire-based
    hardware devices are perfect candidates for a user-space driver. In this chapter,
    we discuss writing a driver that exists solely in user space for a USB device,
    without the need to write a kernel driver.


    Not all USB and FireWire devices are suitable for a user-space driver. In particular,
    a driver that needs to create a device interface file in the `/dev` directory,
    such as a serial port driver or a storage device, needs a kernel driver. Also,
    a device that can be used by multiple applications simultaneously, or needs to
    be used by the system, such as an audio driver, should be written as a kernel
    driver. Thankfully, these cases are the exceptions, and most USB devices that
    require a custom driver can be controlled by a user-space driver.


    ### Behind the Scenes


    Having spent the initial chapters of this book describing the architecture of
    Mac OS X, and in particular stating that a modern operating system only allows
    hardware to be directly accessed from the kernel, you are probably wondering how
    this is consistent with a chapter describing user-space drivers.


    Internally, user-space drivers do indeed require a kernel driver, but this is
    provided by the same `IOUSBDevice` and `IOUSBInterface` objects that would be
    used to interact with the USB device had the developer chosen to write a kernel
    driver for the hardware. To make these objects available to user-space applications,
    the IOUSBFamily publishes a user client for each instance of `IOUSBDevice` and
    `IOUSBInterface` that is created in the kernel.


    The user client that is created for these classes is extremely generic and exists
    solely to expose the methods of the `IOUSBDevice` and `IOUSBInterface` class to
    user space. For example, the user client for the `IOUSBDevice` class contains
    methods for getting and setting the active device configuration, performing a
    device request, and iterating the device''s interfaces. The user client for the
    `IOUSBInterface` class contains methods for reading and writing data to a specified
    endpoint.


    An application doesn''t need to call the methods from the user client class directly;
    instead, the I/O Kit framework provides a high level API to control the hardware.
    This API is known as IOUSBLib. The layering involved in a user-space USB driver
    is shown in [Figure 15-1](#Chapter15.html#fig_15_1). The custom code a developer
    needs to write exists only in the application layer; the layers below are common
    libraries provided by Apple as part of Mac OS X.


    Although it isn''t necessary to have an understanding of how the IOUSBLib is implemented,
    a little knowledge will help you understand each of the steps that an application
    performs to find and interact with a USB device from user space.


    ![images](images/1501.jpg)


    **Figure 15-1.** The layers through which a user-space driver accesses its USB
    hardware'
