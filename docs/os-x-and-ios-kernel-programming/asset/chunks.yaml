  trans: '

    ### 打包 KEXT 与软件


    `PackageMaker` 是打包和分发由多个组件构成的软件的首选工具。与那些所有必要组件都自包含并嵌入到应用程序包中的简单应用不同，更复杂的软件分发（例如包含
    KEXT 的分发）可能需要将组件安装到文件系统的多个位置。例如，驱动程序需要将其自身放置在 `/System/Library/Extensions` 目录下，并且可能还包含用于加载偏好设置或升级固件的辅助程序，这些程序需要安装启动代理（Launch
    Agents）或守护进程（Daemons）。`PackageMaker` 能够做到这一点，甚至更多。`PackageMaker` 的用户界面如图 18-1
    所示。


    ![images](img/1801.jpg)


    ***图 18-1.** PackageMaker 用户界面*


    `PackageMaker` 的输出是一个扩展名为“*.pkg*”的二进制压缩包文件，可以通过 `Installer.app` 程序或 `installer`
    UNIX 命令来安装，执行命令如下所示：


    `sudo installer -pkg HelloWorld.pkg -target /`


    使用 `Installer.app` 进行安装会启动一个基于 GUI 的向导，引导用户完成安装过程。如果软件包有多个可选的子组件，用户将有机会选择或取消选择它们。用户还可以更改目标宗卷（即软件包的安装位置），前提是软件包通过设置“由用户选择宗卷”选项明确允许这样做。


    `PackageMaker` 不仅限于将软件组件放置到文件系统中。它还可以检查系统要求和先决条件，包括操作系统版本是否受支持，或者检查它所依赖的其他软件组件是否存在。它还可以在软件安装前后针对每个组件触发自定义的
    UNIX 脚本。对于硬件驱动程序，`PackageMaker` 还允许你在允许用户继续操作之前验证你的设备是否存在。这适用于 FireWire、PCI 和
    USB 设备。


    ![images](img/square.jpg)**提示** 在打包 KEXT 进行分发时，请确保 Xcode 为你打算支持的架构进行构建。通过对 KEXT
    的二进制文件使用 `file` 命令，你可以检查它支持哪些架构。你可能还需要确保不分发 KEXT 的调试版本。


    #### 为 Hello World 内核扩展构建软件包


    现在，你可以构建一个快速软件包来安装示例 Hello World KEXT。你还需要安装一个启动守护进程属性列表文件（代码清单 18-1）和一个 shell
    脚本（代码清单 18-2），该脚本将由启动守护进程执行，并再次加载 KEXT。在设计你自己的软件包之前，你需要确定其组件。例如，如果你要为音频设备分发驱动程序，你可能希望将驱动程序与某些允许播放或捕获音频的软件捆绑在一起，或许还需要一个
    SDK，其他开发者可以使用该 SDK 来编写自己的应用程序。开发者可能只想要驱动程序，而最终用户可能只想要捆绑的应用程序而不需要 SDK，等等。在这种场景下，你可以创建三个子组件：驱动程序、应用程序和
    SDK，并允许用户选择要安装的组件。对于 `HelloWorld` 软件包，你只需添加一个组件即可。


    要开始操作，请打开 `PackageMaker` 并从菜单中选择“新建”。随后会弹出一个对话框，如图 18-2 所示。


    ![images](img/1802.jpg)


    ***图 18-2.** 安装属性对话框*


    “组织”字段应为你的组织的反向 DNS 名称。该值用于标识软件包并赋予其唯一名称。“最低目标”下拉菜单允许你选择你想要支持的最旧的 OS 版本。软件包将拒绝安装在比安装目标更旧的版本上。输入你的选择后，你可以为软件包指定一个标题。


    #### 向软件包添加内容


    你现在可以开始向软件包添加文件。这可以通过从主菜单中选择“项目 ![images](img/U001.jpg) 添加内容...”来完成，或者简单地将文件拖入
    `PackageMaker` 的左侧窗格。图 18-3 显示了已填充 `HelloWorld` 分发所需文件的内容窗格。


    ![images](img/1803.jpg)


    ***图 18-3.** HelloWorld 分发*


    我们的 `HelloWorld` 软件包仅包含三个文件（如图 18-3 左侧所示）：KEXT 本身以及两个允许 KEXT 在启动时加载的辅助文件。当你将文件拖入或添加到软件包时，`PackageMaker`
    会自动创建一个*选项*，在本例中我们将其命名为“驱动程序”。该选项代表一个可由用户单独选择的子组件。但是，如果主窗格中的“用户可见”字段设置为“仅简易安装”，则即使有多个组件，也不会提示用户选择单个组件。“安装目标”选择允许你设置软件包的安装位置。此时，我们不勾选任何选项，因为我们所有的文件都使用绝对路径。如果选择了“由用户选择宗卷”，安装向导会询问用户希望安装到哪个宗卷（硬盘）。建议允许这种选择，以便给用户更大的灵活性——特别是对于大型软件包，用户可能希望将其存储在第二个更大的数据驱动器上。

    '
- fmt: '# Configuring the Package


    Choosing the “Edit Interface” option from the configuration pane in [Figure 18-3](#Chapter18.html#fig_18_3)
    will bring up a view of how the package will be presented when opened with `Installer.app`.
    `PackageMaker` allows you to interactively edit text and set a background image.
    You can also add localizations for enabling instructions in other languages.


    The main pane has three tabs, as shown in [Figure 18-3](#Chapter18.html#fig_18_3).
    The “Requirements” tab allows for the configuration of requirements that are global
    to the whole package. You can also set requirements for choices individually,
    which would allow a user to install some components even if the system didn’t
    meet the requirements for others. Requirements can be specified in the requirements
    editor, which has many pre-defined checks that can be configured. The following
    is a subset of available tests:


    - Megabytes Available on Target

    - Minimum CPU Frequency (HZ)

    - Memory Available (Bytes)

    - System OS Version / Target OS Version

    - File Exists on System

    - FireWire, USB, PCI Device Exists

    - Result of Script


    The last option, “Result of Script,” is particularly useful when none of the pre-defined
    tests are suitable. You can write a shell script to perform your own tests and
    have the installer take action based on the return code of the script. You can
    also specify custom error messages that will appear if a requirements test fails.
    The “Actions” tab allows you to configure actions that can be performed automatically,
    either pre- or post-installation. For example, in the case of the `HelloWorld`
    package, we may wish to ensure that any previously installed `HelloWorld.kext`
    is unloaded before we install the new one. We can define this action as shown
    in [Figure 18-4](#Chapter18.html#fig_18_4).


    ![images](images/1804.jpg)


    ***Figure 18-4.** The action editor*


    In some cases, suppose you have a driver for a USB device: you may want to ensure
    that all applications using the device are killed before installing a new driver.
    An open application may prevent the driver from unloading properly. You may notice
    that there is no option for running a program or script; this can, however, be
    done on a per–file basis by selecting a file and choosing the “Scripts” tab.


    ![images](images/1805.jpg)


    ***Figure 18-5.** Configuration pane for individual packages*


    For now, we have used the term *Package* to refer to the entire project as a whole,
    but in `PackageMaker` terminology, we are actually referring to a distribution
    that consists of several smaller packages. The smaller packages are made up of
    the individual files or objects added to the distributions, such as KEXTs, application
    bundles, or PDF files. Each object has meta-data and version information associated
    with it.


    [Figure 18-5](#Chapter18.html#fig_18_5) shows the main configuration pane for
    a package added to the distribution. The “Install” field specifies the source
    location, whereas the “Destination” field specifies the location in the file system
    where the object will be installed. Selecting the “Allow custom location” option
    allows the user to specify an alternative location. Both the source and destination
    location can be a relative or absolute path. In most cases, the former is recommended.
    In the preceding example ([Figure 18-5](#Chapter18.html#fig_18_5)), we have used
    a relative location for the source file and an absolute path in the file system
    for the destination, as the file must go into that directory and cannot be relocated
    based on the user’s preferences. The same will apply to the KEXT, which we require
    to be located in `/System/Library/Extensions`. A relative path is relative to
    the location of the `PackageMaker` project.


    The “Patch” field allows you to specify an older version of the object you are
    installing, so that the installer can patch an existing file, rather than install
    a completely new file.


    In the configuration pane, you can also specify a version number and identifier
    individually for each package. The “Restart Action” allows you to prompt users
    to restart their computers after the installation is complete. You may want to
    do this if you have Launch Agents or Daemons that must be started, or you have
    replaced a driver that is difficult reload (e.g., a storage or graphics driver)
    while the system is running. You can also require the user to logout or shutdown
    the system. The “Require admin authentication” checkbox will prompt the user for
    the administrator password before allowing the package to be installed. If you
    install files outside of the user’s home directory, usually, you must specify
    this, as the installer does not have admin rights by default. Most KEXTs, particularly
    drivers, must be installed under `/System`, which is not normally writable by
    a regular user.


    Finally, the “Package Location” field allows one to specify an alternate location
    where the package object file will be installed from; for example, you can specify
    an HTTP URL.


    The “Contents” tab of a package is shown in [Figure 18-6](#Chapter18.html#fig_18_6).


    ![images](images/1806.jpg)


    ***Figure 18-6.** Contents tab of the package configuration pane*


    The “Contents” tab allows you to examine individual files of a package. Usually,
    packages consist of either a bundle or an individual file. A bundle can contain
    other bundles or arbitrary files within it. If you need to exclude some files,
    you can specify regular expression patterns to do so. For instance, the meta-data
    directories from a source code versioning system, such as Subversion, can be excluded
    with the pattern `*/\.svn$`. You can also configure the file permissions the individual
    files should have once they are installed in the file system. The “Apply Recommendations”
    button will guess the correct permissions based on the file types and the intended
    destinations.


    ![images](images/square.jpg) **Caution** Kernel Extensions are picky about their
    permissions and must be owned by the *root* user and the *wheel* group. Additionally,
    the owner must have read, write and execute rights, whereas the group should have
    only read and execute rights. This corresponds to the UNIX permissions mask 0755\.
    Meta data files (such as the `Info.plist` file) do not need to have the executable
    bit set.


    The “Scripts” tab allows for the defining of pre- and post-installation scripts
    for a package. These can be used to perform custom installation steps that cannot
    be defined by the “Actions” editor. You may wish to use a pre-install script to
    shut down daemons or applications before they are replaced with new versions.
    You can also clean up files that are no longer needed by the newer versions. The
    scripts are typically written in Bash or another scripting language. If you remove
    older files from your scripts, be careful about using the `rm` command, as your
    package may run with administrative privileges, and an incorrectly specified filename
    may lead to the wrong files or directories being deleted. As an example, consider
    the following: `rm –rf /System/Library/$MYKEXT`. If the `$MYKEXT` variable ends
    up being empty, the command will instead delete the `/System/Library` directory.
    A very unhappy customer will follow.'
