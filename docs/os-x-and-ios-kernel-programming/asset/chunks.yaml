    \ runLoopSource, kCFRunLoopDefaultMode);\n\n     return error;\n}\n```\n\n应用程序可以自由地将运行循环源安装到其希望的任何特定线程的运行循环上，包括应用程序主线程的运行循环。对象所有权规则遵循所有\
    \ Core Foundation 函数的相同约定：如果应用程序通过`Create`方法获得一个对象，则它拥有该对象并负责释放它。如果应用程序通过`Get`方法获得一个对象，则它不拥有对该对象的引用，因此如果应用程序希望持有该对象，它必须先显式地保留该对象。"
