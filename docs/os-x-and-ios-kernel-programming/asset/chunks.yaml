    \nIn addition to the method `executeEvent()`, you will notice that the `IOSerialDriverSync`\
    \ interface also defines a method named `enqueueEvent()` that is used for setting\
    \ the properties of a serial port. There is a subtle difference between the two\
    \ methods; a call to the `executeEvent()` method causes a change in the serial\
    \ port's configuration to take effect as soon as the method is called, whereas\
    \ a call to `enqueueEvent()` won't take effect until all of the characters that\
