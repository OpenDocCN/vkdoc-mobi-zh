  trans: '

    ## 从应用程序与驱动程序交互


    在上一章中，我们了解了位于内核中的 I/O Kit 驱动程序。另一方面，用户与之交互的应用程序则位于用户空间。因此，如果用户要使用驱动程序提供的服务，就需要跨越内核/用户空间的边界。


    Mac OS X 提供了多种不同的机制，驱动程序可以通过这些机制向用户空间应用程序提供服务。开发者选择让特定驱动程序向用户空间应用程序提供服务的方法，取决于该驱动程序所实现的功能类型。例如，所有串行端口、音频驱动程序和存储设备都有各自由
    I/O Kit 定义的接口。这个接口允许用户空间应用程序与这些设备协同工作。应用程序能够与任何硬件供应商提供的设备协同工作，前提是该供应商的驱动程序为该设备实现了标准的
    I/O Kit 接口。从驱动程序开发者的角度来看，使用 I/O Kit 提供的通用接口最符合他们的利益，因为这能确保驱动程序可被大量用户空间应用程序访问，无需开发者为驱动程序采用自定义接口。同时，这也减少了你自身的工作量。


    串行端口驱动程序就是一个很好的例子。Mac OS X 用户空间应用程序通过一个字符设备来访问串行端口，该字符设备由文件系统中 `/dev` 路径下的一个文件表示。为了通过串行设备进行通信，用户应用程序会调用与打开、读取或写入文件系统上任何其他文件相同的函数；也就是
    `open()`、`read()` 和 `write()`。在内核中，提供串行端口的驱动程序会创建一个标准 I/O Kit 类 `IOSerialStreamSync`
    的实例。I/O Kit 的串行家族会在 `/dev` 目录中创建一个设备节点，并将该节点的路径发布到 I/O Registry 中，以便应用程序能够找到它。它还会将用户应用程序的请求传递给驱动程序实现中的方法调用，该驱动程序实现是标准
    `IOSerialDriverSync` 类的子类。驱动程序开发者在向用户空间发布其服务时无需额外工作。这一点如图 5-1 所示。


    ![images](img/0501.jpg)


    **图 5-1.** 从用户空间应用程序与串行端口通信所涉及的类。除了 `MySerialDriver` 之外，所有对象及其连接均由 I/O Kit 创建。


    并非所有驱动程序开发者都像串行端口驱动程序的开发者那样幸运，能由 I/O Kit 负责处理用户空间/内核空间的跨越。对于提供自定义功能的硬件设备，I/O Kit
    可能不提供适合你的驱动程序使用的客户端接口。在这种情况下，你的驱动程序需要实现一个自定义接口，供用户空间应用程序在与它交互时使用。正如我们在第 1 章中所见，Mac
    OS X 在用户空间和内核之间设有严格的屏障。这对此类交互的性质施加了限制。本章将介绍 I/O Kit 提供的跨越用户/内核边界并允许用户应用程序与内核驱动程序通信的方法。


    ### I/O Kit 框架


    进程通过其与内核驱动程序通信的用户空间 API 由一个名为 "IOKit.framework" 的框架提供，下文简称为 "I/O Kit 框架"。I/O Kit
    框架允许用户空间应用程序确定系统上存在的硬件设备和内核驱动程序，监控可热插拔硬件（例如 USB 设备）的接入或移除，并与 I/O Kit 驱动程序交互。I/O
    Kit 框架定义了提供内核对象用户空间表示的数据类型，以及操作这些内核对象所需的函数。尽管 I/O Kit 在内核中是基于 C++ 的框架，但用户空间的 I/O
    Kit 框架是以一组基于 C 的函数形式提供的，因此它可以被用 C 和 C++ 编写的项目使用，也可以被用 Objective-C 编写的项目使用，这对 GUI
    应用程序尤为重要。


    I/O Kit 框架提供对 I/O Registry 中存在的内核对象的访问，这些对象可以通过 `IORegistryExplorer` 工具进行检查（见第
    4 章）。I/O Registry 由内核对象组成，这些对象代表连接到计算机的硬件设备，或者已与连接的硬件设备匹配并加载到内核中的驱动程序。I/O Registry
    中的对象只能在内核中创建（包括由内核驱动程序创建），但 I/O Kit 框架为用户空间中的应用程序提供了一种检查 I/O Registry 内容的方法，包括遍历注册表、确定对象之间的关系（例如，确定哪个驱动程序已针对特定硬件设备加载），以及读写
    I/O Registry 中对象的属性。


    I/O Registry 包含的内核对象既可以代表已加载的驱动程序，也可以代表已连接的硬件设备。这意味着 I/O Kit 框架提供的功能既可以应用于驱动程序，也可以应用于硬件设备。在某些情况下，应用程序可以通过其对应的
    I/O Registry 对象直接操作硬件设备，而无需内核驱动程序；关于 USB 设备的内容将在第 15 章中讨论。I/O Kit 框架还允许应用程序安装通知，以监控特定驱动程序或硬件设备的接入。

