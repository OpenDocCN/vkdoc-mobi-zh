    \ = index;`\n`            break;`\n`        }`\n`    }`\n`    return source;`\n\
    `}`"
  trans: "\n# I/O Kit 中断机制\n\n在 I/O Kit 中，处理主中断和次中断的首选方式是通过工作循环系统。然而，直接处理也是可行的。如果您不确定工作循环是如何运作的，请查阅第\
    \ 7 章了解更多细节。驱动程序有三种主要机制可用于处理中断。图 9-4 展示了这三种不同机制如何响应主中断。\n\n![images](img/0904.jpg)\n\
    \n**图 9-4.** I/O Kit 用于处理设备中断的机制\n\n- `IOInterruptEventSource`：处理设备中断的标准且最简单的方式。您只需注册一个处理函数，该函数将在次中断上下文中执行。您的驱动程序无需处理主中断。中断将在中断处理程序完成之前从提供者处被禁用，从而保证中断的单线程处理，因为另一个处理程序无法并行运行。`IOInterruptEventSource`\
    \ 是处理中断的首选方式。\n- `IOFilterInterruptEventSource`：如图 9-4 左侧所示，它是 `IOInterruptEventSource`\
    \ 的子类，提供了更大的灵活性。它允许提供一个自定义的过滤动作。该过滤动作在主中断上下文中调用，允许驱动程序询问硬件设备是否真的有中断。如果中断在多个设备之间共享，或者设备是一个具有多种可能中断的复杂或多功能设备，或者有极低延迟的要求，则推荐使用此方法。次中断将根据已安装的过滤动作（例程）的返回值被调度。\n\
    - `IOService::registerInterrupt()`：最后一种方法是使用 `IOService::registerInterrupt()`\
    \ 注册一个将在主中断期间调用的 C 函数。此方法不使用驱动程序的工作循环，也未提供调用次中断处理程序的方法。如果需要次中断，则必须手动实现处理它们的机制。\n\
    \n## 注册以接收中断\n\n与 I/O Kit 中的许多事情一样，注册中断很简单，大部分繁重的工作由 I/O Kit 和平台专家在内部处理。我们无需担心分配\
    \ IRQ 号或中断路由，因为这些都是自动处理的。代码清单 9-7 展示了一个典型的代码块，演示了如何使用主中断过滤器，将驱动程序注册为从其提供者（`IOPCIDevice`）接收中断。\n\
    \n**代码清单 9-7.** 创建一个过滤型中断事件源\n\n```\nbool MyFirstPCIDriver::start(IOService *\
    \ provider)\n{\n    ...\n    IOWorkLoop *workLoop = (IOWorkLoop*)getWorkLoop();\n\
    \    if (!workLoop)\n        return false;\n\n    IOFilterInterruptEventSource*\
    \ interruptSource =\n        IOFilterInterruptEventSource::filterInterruptEventSource(this,\n\
    \                (IOInterruptEventAction) &MyFirstPCIDriver::interruptOccurred,\n\
    \                (IOFilterInterruptAction) &MyFirstPCIDriver::interruptFilter,\n\
    \                provider, 0);\n\n    if (workLoop->addEventSource(interruptSource)\
    \ != kIOReturnSuccess)\n            return false;\n    ...\n}\n```\n\n这涉及四个步骤：\n\
    \n1.  获取或分配一个 `IOWorkLoop` 实例。\n2.  分配事件源，这通过工厂方法 `filterInterruptEventSource()`\
    \ 完成。我们传入五个参数：\n    -   指向自身的指针，\n    -   指向次中断处理函数 `interruptOccurred()` 的指针，\n\
    \    -   将在主中断上下文中执行的过滤动作方法，\n    -   最后一个参数是提供者的中断索引号，如果提供者有多个中断类型，则可以指定。例如，提供者可能除了共享中断外，还支持消息\
    \ signaled 中断 (MSI)，\n    -   中断类型的索引。详情请参阅“启用消息 signaled 中断”部分。\n3.  使用 `addEventSource()`\
    \ 将事件源添加到 `IOWorkLoop` 实例。\n4.  最后一步是启用事件源，因为即使在添加到工作循环后，它默认也是禁用的。要开始接收中断，只需调用\
    \ `interruptSource->enable()`。\n\n确保驱动程序在调用此函数之前已完全初始化并准备好接收中断，或者如果可能，确保硬件上的中断在驱动程序准备好处理它们之前处于非激活状态，这一点非常重要。\n\
    \n注册一个 `IOInterruptEventSource` 的过程几乎相同，如代码清单 9-8 所示。\n\n**代码清单 9-8.** 创建一个中断事件源\n\
    \n```\nIOWorkLoop *workLoop = (IOWorkLoop*)getWorkLoop();\nif (!workLoop)\n  \
    \      return false;\n\nIOInterruptEventSource* interruptSource =\n        IOInterruptEventSource::interruptEventSource(this,\n\
    \                    (IOInterruptEventAction) &MyFirstPCIDriver::interruptOccurred,\n\
    \                    provider, 0);\n\nif (workLoop->addEventSource(interruptSource)\
    \ != kIOReturnSuccess)\n        return false;\n...\n```\n\n唯一的区别是它不接受过滤动作，这正符合\
    \ `IOFilterInterruptEventSource` 的情况。\n\n## 启用消息 Signaled 中断\n\n如果您需要确保使用消息 signaled\
    \ 中断 (MSI)，必须首先枚举 MSI 中断类型的索引。在代码清单 9-7 和 9-8 中，我们简单地传递了 0 来获取提供者的第一个中断类型，根据设备的不同，它可能支持\
    \ MSI，也可能不支持。以下方法将枚举提供者可用的中断类型并返回 MSI 中断类型的索引，该索引随后可以作为索引参数传递给 `IOInterruptEventSource::interruptEventSource()`：\n\
    \n```\nint com_osxkernel_MyFirstPCIDriver::findMSIInterruptTypeIndex()\n{\n  \
    \  IOReturn ret;\n    int index, source = 0;\n\n    for (index = 0; ; index++)\n\
    \    {\n        int interruptType;\n        ret = fPCIDevice->getInterruptType(index,\
    \ &interruptType);\n        if (ret != kIOReturnSuccess)\n            break;\n\
    \n        if (interruptType & kIOInterruptTypePCIMessaged)\n        {\n      \
    \      source = index;\n            break;\n        }\n    }\n    return source;\n\
    }\n```\n"
- fmt: "### Handling Primary Interrupts\n\nLet's have a look at the implementation\
    \ of the primary interrupt filter and how to schedule the secondary interrupt\
    \ handler. A Primary interrupt filter for an audio device might look something\
    \ like shown in [Listing 9-9](#Chapter09.html#list_9_9).\n\n***Listing 9-9.**\
    \ Primary Interrupt Filter Method*\n\n```\nbool com_osxkernel_MyAudioPCIDriver::interruptFilter(OSObject*\
    \ owner, IOFilterInterruptEventSource * src)\n{\n    bool scheduleSecondaryInterrupt\
    \ = false;\n\n    com_osxkernel_MyAudioPCIDriver* me = (com_osxkernel_MyAudioPCIDriver*)owner;\n\
    \n    uint32_t registerContents = me->readRegister(kHardwareInterruptRegisterOffset);\n\
    \    if (registerContents & kAudioInputInterruptBit)\n    {\n         scheduleSecondaryInterrupt\
    \ = true;\n         me->fAudioInputInterruptPending = true;\n    }\n    else if\
    \ (registerContents & kAudioOutputInterrupt)\n    {\n         scheduleSecondaryInterrupt\
    \ = true;\n         me->fAudioOutputInterruptPending = true;\n     }\n     return\
    \ scheduleSecondaryInterrupt;\n}\n```\n\nThe method accepts two arguments. The\
    \ first is an `OSObject` pointer, which value was passed during construction of\
    \ the `IOFilterInterruptEventSource` instance. We used the `this` pointer to pass\
    \ ourselves. The reason for this is that the `interruptFilter()` function is a\
    \ static class member, as regular member functions cannot be used as function\
    \ pointers in C++. We simply cast the `owner` argument back to a type of our driver\
    \ class to retrieve our instance. We are also passed an instance of the event\
    \ source.\n\n![images](images/square.jpg) **Caution** It may be tempting to put\
    \ debug statements in the primary interrupt handler to see if it triggers or that\
    \ the right registers are set in hardware with `IOLog()`. Do NOT do this. It is\
    \ a very bad idea. Did we mention it was a bad idea? Your system will crash.\n\
    \nBecause the filter function runs in primary interrupt context, it is unsafe\
    \ to call most parts of the I/O Kit framework, including memory allocation functions\
    \ and most locking functions. You should also avoid doing I/O or other long-winded\
    \ operations in primary interrupt context. In the hypothetical example shown in\
    \ [Listing 9-9](#Chapter09.html#list_9_9), we are handling interrupts for a bi-directional\
    \ audio device that has two interrupts, one for each direction. In our filter,\
    \ we first read the device's interrupt register. If either of the interrupts are\
    \ set, we set the variable `scheduleSecondaryInterrupt` to `true`, which we use\
    \ as a return value. A return of `true` means we want the secondary interrupt\
    \ handler to run, and a return of `false` means that our device wasn't interrupting.\
    \ This either means we are sharing an interrupt line with another device, which\
    \ was the one that raised the interrupt, or it could be a false interrupt due\
    \ to malfunctioning hardware or interference. If we return `true` from the filter,\
    \ our device's interrupt will be disabled until the secondary handler is scheduled\
    \ and it completes its execution. This ensures that an interrupt is serialized\
    \ so our driver doesn't need to worry about locking between the primary and secondary\
    \ handlers, as they never run in parallel.\n\nThere are some cases where this\
    \ behavior is undesired, and we can prevent the interrupt from being disabled\
    \ by modifying our interrupt filter to always return `false`, which will ensure\
    \ the interrupt doesn't get disabled, but that also prevents the secondary interrupt\
    \ from being scheduled. However, we can manually schedule it as follows instead:\n\
    \n```\nbool com_osxkernel_MyFirstPCIDriver::interruptFilter(OSObject* owner, IOFilterInterruptEventSource\
    \ * src)\n{\n…\n…\n    if (scheduleSecondaryInterrupt)\n            src->signalInterrupt();\n\
    \    return false;\n}\n```\n\nThis will have the effect of allowing the device\
    \ to issue primary interrupts, even if our secondary interrupt handler is already\
    \ running. In the case of our audio device, this may allow concurrent processing\
    \ of input and output interrupts.\n\n### Handling Secondary Interrupts\n\nThe\
    \ secondary interrupt handler is the same regardless if it is used with an `IOInterruptEventSource`\
    \ or an `IOFilterInterruptEventSource`. The prototype is similar to that of the\
    \ primary interrupt filter function, but has an additional parameter that contains\
    \ the index of the interrupt source of the provider, if a provider has more than\
    \ one interrupt. Our audio device has only one interrupt, and we need to read\
    \ the device's register to determine which events were signaled. If the device\
    \ had several interrupts, we could instead differentiate this by looking at the\
    \ `intCount` parameter. A very simplistic implementation of the secondary interrupt\
    \ handler for our imaginary audio device is shown in [Listing 9-10](#Chapter09.html#list_9_10).\n\
    \n***Listing 9-10.** Secondary Interrupt Handler Method*\n\n```\nvoid com_osxkernel_MyAudioPCIDriver::interruptOccurred(OSObject*\
    \ owner, IOInterruptEventSource* src, int intCount)\n{\n    com_osxkernel_MyFirstPCIDriver*\
    \     me;\n    me = (com_osxkernel_MyFirstPCIDriver*)owner;\n\n    if (me->fAudioInputInterruptPending)\n\
    \            me->handleAudioInputInterrupt();         // Start next DMA\n    if\
    \ (me->fAudioOutputInterruptPending)\n            me->handleAudioOutputInterrupt();\
    \        // Start next DMA\n}\n```\n\nWe detect which interrupt that was pending\
    \ and execute driver methods for handling the interrupts. The methods may, for\
    \ example, signal a user application that data is now available and setup a new\
    \ DMA transaction to fill another buffer. The reason why we use the instance variables\
    \ `fAudioInputInteruptPending` and `fAudioOutputInterruptPending` rather than\
    \ re-reading the interrupt status register from [Listing 9-9](#Chapter09.html#list_9_9)\
    \ is that many hardware devices will automatically clear the interrupt register\
    \ once the register is read, which also serves to acknowledge the interrupt.\n\
    \nThe secondary interrupt handler may run in parallel to user space threads calling\
    \ our driver, so it is important to have proper synchronization in place to guard\
    \ shared data. Note that the secondary interrupt handler itself runs on the driver's\
    \ work loop, which is single-threaded, so two secondary interrupt handlers are\
    \ guaranteed not to run in parallel."
  raw: '##### Handling Primary Interrupts


    Let''s have a look at the implementation of the primary interrupt filter and how
    to schedule the secondary interrupt handler. A Primary interrupt filter for an
    audio device might look something like shown in [Listing 9-9](#Chapter09.html#list_9_9).


    ***Listing 9-9.** Primary Interrupt Filter Method*


    `bool com_osxkernel_MyAudioPCIDriver::interruptFilter(OSObject* owner, IOFilterInterruptEventSource
    * src)`

    `{`

    `    bool scheduleSecondaryInterrupt = false;`


    `    com_osxkernel_MyAudioPCIDriver* me = (com_osxkernel_MyAudioPCIDriver*)owner;`


    `    uint32_t registerContents = me->readRegister(kHardwareInterruptRegisterOffset);`

    `    if (registerContents & kAudioInputInterruptBit)`

    `    {`

    `         scheduleSecondaryInterrupt = true;`

    `         me->fAudioInputInterruptPending = true;`

    `    }`

    `    else if (registerContents & kAudioOutputInterrupt)`

    `    {`

    `         scheduleSecondaryInterrupt = true;`

    `         me->fAudioOutputInterruptPending = true;`

    `     }`

    `     return scheduleSecondaryInterrupt;`

    `}`


    The method accepts two arguments. The first is an `OSObject` pointer, which value
    was passed during construction of the `IOFilterInterruptEventSource` instance.
    We used the `this` pointer to pass ourselves. The reason for this is that the
    `interruptFilter()` function is a static class member, as regular member functions
    cannot be used as function pointers in C++. We simply cast the `owner` argument
    back to a type of our driver class to retrieve our instance. We are also passed
    an instance of the event source.


    ![images](images/square.jpg) **Caution** It may be tempting to put debug statements
    in the primary interrupt handler to see if it triggers or that the right registers
    are set in hardware with `IOLog()`. Do NOT do this. It is a very bad idea. Did
    we mention it was a bad idea? Your system will crash.


    Because the filter function runs in primary interrupt context, it is unsafe to
    call most parts of the I/O Kit framework, including memory allocation functions
    and most locking functions. You should also avoid doing I/O or other long-winded
    operations in primary interrupt context. In the hypothetical example shown in
    [Listing 9-9](#Chapter09.html#list_9_9), we are handling interrupts for a bi-directional
    audio device that has two interrupts, one for each direction. In our filter, we
    first read the device''s interrupt register. If either of the interrupts are set,
    we set the variable `scheduleSecondaryInterrupt` to `true`, which we use as a
    return value. A return of `true` means we want the secondary interrupt handler
    to run, and a return of `false` means that our device wasn''t interrupting. This
    either means we are sharing an interrupt line with another device, which was the
    one that raised the interrupt, or it could be a false interrupt due to malfunctioning
    hardware or interference. If we return `true` from the filter, our device''s interrupt
    will be disabled until the secondary handler is scheduled and it completes its
    execution. This ensures that an interrupt is serialized so our driver doesn''t
    need to worry about locking between the primary and secondary handlers, as they
    never run in parallel.


    There are some cases where this behavior is undesired, and we can prevent the
    interrupt from being disabled by modifying our interrupt filter to always return
    `false`, which will ensure the interrupt doesn''t get disabled, but that also
    prevents the secondary interrupt from being scheduled. However, we can manually
    schedule it as follows instead:


    `bool com_osxkernel_MyFirstPCIDriver::interruptFilter(OSObject* owner, IOFilterInterruptEventSource
    * src)`

    `{`

    `…`

    `…`

    `    if (scheduleSecondaryInterrupt)`

    `            src->signalInterrupt();`

    `    return false;`

    `}`


    This will have the effect of allowing the device to issue primary interrupts,
    even if our secondary interrupt handler is already running. In the case of our
    audio device, this may allow concurrent processing of input and output interrupts.


    ##### Handling Secondary Interrupts


    The secondary interrupt handler is the same regardless if it is used with an `IOInterruptEventSource`
    or an `IOFilterInterruptEventSource`. The prototype is similar to that of the
    primary interrupt filter function, but has an additional parameter that contains
    the index of the interrupt source of the provider, if a provider has more than
    one interrupt. Our audio device has only one interrupt, and we need to read the
    device''s register to determine which events were signaled. If the device had
    several interrupts, we could instead differentiate this by looking at the `intCount`
    parameter. A very simplistic implementation of the secondary interrupt handler
    for our imaginary audio device is shown in [Listing 9-10](#Chapter09.html#list_9_10).


    ***Listing 9-10.** Secondary Interrupt Handler Method*


    `void com_osxkernel_MyAudioPCIDriver::interruptOccurred(OSObject* owner, IOInterruptEventSource*
    src, int intCount)`

    `{`

    `    com_osxkernel_MyFirstPCIDriver*     me;`

    `    me = (com_osxkernel_MyFirstPCIDriver*)owner;`


    `    if (me->fAudioInputInterruptPending)`

    `            me->handleAudioInputInterrupt();         // Start next DMA`

    `    if (me->fAudioOutputInterruptPending)`

    `            me->handleAudioOutputInterrupt();        // Start next DMA`

    `}`


    We detect which interrupt that was pending and execute driver methods for handling
    the interrupts. The methods may, for example, signal a user application that data
    is now available and setup a new DMA transaction to fill another buffer. The reason
    why we use the instance variables `fAudioInputInteruptPending` and `fAudioOutputInterruptPending`
    rather than re-reading the interrupt status register from [Listing 9-9](#Chapter09.html#list_9_9)
    is that many hardware devices will automatically clear the interrupt register
    once the register is read, which also serves to acknowledge the interrupt.


    The secondary interrupt handler may run in parallel to user space threads calling
    our driver, so it is important to have proper synchronization in place to guard
    shared data. Note that the secondary interrupt handler itself runs on the driver''s
    work loop, which is single-threaded, so two secondary interrupt handlers are guaranteed
    not to run in parallel.'
  trans: "\n### 处理主中断\n\n让我们看看主中断过滤器的实现方式，以及如何调度次中断处理程序。音频设备的主中断过滤器可能类似于代码清单 9-9 所示。\n\
    \n***代码清单 9-9.** 主中断过滤器方法*\n\n```\nbool com_osxkernel_MyAudioPCIDriver::interruptFilter(OSObject*\
    \ owner, IOFilterInterruptEventSource * src)\n{\n    bool scheduleSecondaryInterrupt\
    \ = false;\n\n    com_osxkernel_MyAudioPCIDriver* me = (com_osxkernel_MyAudioPCIDriver*)owner;\n\
    \n    uint32_t registerContents = me->readRegister(kHardwareInterruptRegisterOffset);\n\
    \    if (registerContents & kAudioInputInterruptBit)\n    {\n         scheduleSecondaryInterrupt\
    \ = true;\n         me->fAudioInputInterruptPending = true;\n    }\n    else if\
    \ (registerContents & kAudioOutputInterrupt)\n    {\n         scheduleSecondaryInterrupt\
    \ = true;\n         me->fAudioOutputInterruptPending = true;\n     }\n     return\
    \ scheduleSecondaryInterrupt;\n}\n```\n\n该方法接受两个参数。第一个参数是 `OSObject` 指针，其值在构造\
    \ `IOFilterInterruptEventSource` 实例时传入。我们使用 `this` 指针将自身传递进去。这样做的原因是 `interruptFilter()`\
    \ 函数是一个静态类成员，因为普通成员函数不能在 C++ 中用作函数指针。我们只需将 `owner` 参数强制转换回我们驱动类的类型，就能获取到实例。同时我们还获得了一个事件源的实例。\n\
    \n![images](img/square.jpg) **警告** 你可能会想在主中断处理程序中加入调试语句，使用 `IOLog()` 来查看它是否触发，或者硬件中是否正确设置了寄存器。**千万不要这样做。**\
    \ 这是一个非常糟糕的主意。我们提过这是个糟糕的主意吗？你的系统会崩溃。\n\n由于过滤器函数在主中断上下文中运行，调用 I/O Kit 框架的大部分内容都是不安全的，包括内存分配函数和大多数加锁函数。你同样应避免在主中断上下文中执行\
    \ I/O 操作或其他耗时的操作。在代码清单 9-9 所示的假设示例中，我们正在处理一个双向音频设备的中断，该设备有两个中断，每个方向各一个。在我们的过滤器中，我们首先读取设备的中断寄存器。如果两个中断中的任何一个被置位，我们就将变量\
    \ `scheduleSecondaryInterrupt` 设置为 `true`，并将其作为返回值。返回 `true` 意味着我们希望次中断处理程序运行，而返回\
    \ `false` 意味着我们的设备没有产生中断。这要么意味着我们与另一个设备共享一条中断线，而中断是由那个设备引发的，要么可能是由硬件故障或干扰导致的虚假中断。如果过滤器返回\
    \ `true`，设备的中断将被禁用，直到次处理程序被调度并执行完毕。这确保了中断被串行化，因此我们的驱动程序无需担心在主处理程序和次处理程序之间进行加锁，因为它们永远不会并行运行。\n\
    \n在某些情况下，我们不希望出现这种行为。我们可以通过修改中断过滤器使其始终返回 `false` 来防止中断被禁用，这能确保中断不会被禁用，但也会阻止次中断被调度。不过，我们可以像下面这样手动调度它：\n\
    \n```\nbool com_osxkernel_MyFirstPCIDriver::interruptFilter(OSObject* owner, IOFilterInterruptEventSource\
    \ * src)\n{\n…\n…\n    if (scheduleSecondaryInterrupt)\n            src->signalInterrupt();\n\
    \    return false;\n}\n```\n\n这样做将允许设备发出主中断，即使我们的次中断处理程序已经在运行。以我们的音频设备为例，这可以实现输入和输出中断的并发处理。\n\
    \n### 处理次中断\n\n无论次中断处理程序是与 `IOInterruptEventSource` 还是与 `IOFilterInterruptEventSource`\
    \ 一起使用，它的形式都是相同的。其原型与主中断过滤器函数类似，但多了一个参数，其中包含提供者的中断源索引（如果提供者有多个中断的话）。我们的音频设备只有一个中断，我们需要读取设备的寄存器来确定哪些事件已被触发。如果设备有多个中断，我们可以通过查看\
    \ `intCount` 参数来进行区分。对于我们虚构的音频设备，其次中断处理程序的一个极其简单的实现如代码清单 9-10 所示。\n\n***代码清单 9-10.**\
    \ 次中断处理程序方法*\n\n```\nvoid com_osxkernel_MyAudioPCIDriver::interruptOccurred(OSObject*\
    \ owner, IOInterruptEventSource* src, int intCount)\n{\n    com_osxkernel_MyFirstPCIDriver*\
    \     me;\n    me = (com_osxkernel_MyFirstPCIDriver*)owner;\n\n    if (me->fAudioInputInterruptPending)\n\
    \            me->handleAudioInputInterrupt();         // 启动下一次 DMA 传输\n    if\
    \ (me->fAudioOutputInterruptPending)\n            me->handleAudioOutputInterrupt();\
    \        // 启动下一次 DMA 传输\n}\n```\n\n我们检测哪个中断处于挂起状态，并执行驱动程序中的方法来处理这些中断。例如，这些方法可以向用户应用程序发出数据已可用的信号，并设置一个新的\
    \ DMA 事务来填充另一个缓冲区。我们之所以使用实例变量 `fAudioInputInterruptPending` 和 `fAudioOutputInterruptPending`，而不是从代码清单\
    \ 9-9 中重新读取中断状态寄存器，是因为许多硬件设备会在寄存器被读取后自动清除中断寄存器，这也起到了确认中断的作用。\n\n次中断处理程序可能与调用我们驱动程序的用户空间线程并行运行，因此，使用适当的同步机制来保护共享数据至关重要。请注意，次中断处理程序本身是在驱动程序的单线程工作循环上运行的，因此可以保证不会有两个次中断处理程序并行运行。\n"
- fmt: '### Direct Memory Access


    Direct Memory Access (DMA) is a concept that allows a device to transfer data
    to or from system memory without the involvement of the CPU, leaving it free to
    perform other tasks, which has a significant impact on overall system performance,
    as I/O transfers are typically very slow relative to the CPU. DMA also allows
    for so-called zero-copy, in that we can transfer memory from a user space buffer
    directly to a device without any memory copies. PCI doesn''t have a central DMA
    controller, but uses the concept of bus mastering, which allows the device to
    take control over the bus and initiate transfers. The `IOPCIDevice` class offers
    the `setBusMasterEnable()` method, which gives the device permission to act as
    a bus master. DMA transfers are directional. When the CPU wishes to transfer data
    from system memory to a device, this is referred to as *outbound* DMA, whereas
    transfers from a device to the system memory are referred to as *inbound* DMA.


    There are no standard I/O Kit classes for controlling DMA to PCI devices as each
    device may implement DMA differently (the DMA function of a device is often referred
    to as a DMA engine). However, in most cases, the process is very similar. A device
    may support several concurrent DMA transfers and each transfer is said to have
    its own DMA channel. The concept of a DMA transfer is simple. For an outbound
    DMA transfer, the following steps typically occur.


    1. The driver needs to identify the memory buffer to be transferred and pin the
    memory.

    2. The driver will inform the device of the location (physical address) and size
    of the memory, which is typically done by writing the values to a register.

    3. The driver will toggle a bit in one of the device''s registers to indicate
    that it should start the DMA.

    4. The device will transfer the contents of the buffer directly from system memory
    without the involvement of the CPU. It sets another register bit to indicate the
    completion of the transfer and raise an interrupt.

    5. The driver will handle the interrupt, check if the DMA completion bit is set,
    and possibly prime another DMA transaction if there are more data to send.


    The process of setting up and handling an inbound DMA transfer is the same. The
    only difference is that the device writes to the buffer instead of reading from
    it. We still need to tell the device the memory location where the data is and
    we still get an interrupt once the transfer is done. For a device like a storage
    device, the driver always initiates I/O, and it will control when to read and
    when to write data. However, devices such as network controllers are slightly
    different, in that data may arrive on the device asynchronously in response to
    an external event. In this case, the device will raise an interrupt and set a
    flag in its registers so the driver knows that the device has data in its input
    buffer. The driver will then prime a new DMA buffer and start a transfer to empty
    the device''s input buffer. Once the device has completed the transaction, it
    will raise another interrupt to inform the driver that the transfer has completed.


    While DMA is simple from a conceptual point of view, it is complicated by the
    following factors:


    - Memory caching on the CPU can cause coherency issues because data written by
    the CPU may be held in a cache on the CPU and not be committed to system memory
    straight away. If a DMA transfer is started at this time, the device may read
    the incorrect data, the previous contents of the RAM, or simply garbage. On Intel
    systems, this issue is handled automatically by hardware and does not require
    a driver to intervene. For PowerPC processors, I/O Kit provides the `IOFlushProcessorCache()`
    function which flush the CPU caches to system memory ensure that the device will
    see the correct memory contents. The function exists but does nothing on Intel
    based systems.

    - On 64-bit platforms (or when PAE is used), some older PCI-based hardware devices
    may be unable to access memory addresses greater than 32-bit. Two strategies exist
    for handling these situations. The poorest, in terms of performance, uses a bounce
    buffer that is located at an address range the device can access. Contents of
    an I/O buffer located at addresses over 32-bit would have to be copied to the
    new buffer before the device can access the data. The second approach involves
    using special hardware circuitry found on modern computers that can dynamically
    remap any memory location into a “virtual” physical address that the device can
    access.

    - Although, from a user application''s point of view, memory appears to be contiguous,
    user space memory is composed of physical pages that may be scattered across RAM.
    Let''s say an application wants to output a buffer containing a large HD video
    frame to a video device. Because the frame is severely fragmented in physical
    memory, it is not enough to simply tell the device the address and size of a single
    buffer. We need to tell it about all the fragments that make up the video frame.
    So instead of a telling the device a location and size of a buffer, we instead
    provide it with a buffer containing a list of locations for each fragment. This
    buffer is known as a scatter/gather list. We will discuss this concept in more
    detail shortly.


    Most of the complexity from a driver''s point of view exists in setting up and
    preparing the memory buffer for transfer. There are a number of steps to perform.
    The buffer needs to be pinned down, as a page-out operation on the underlying
    memory could be disastrous, particularly if the transfer is directed to a storage
    device. Since some devices can only access memory situated in a 32-bit physical
    address range, we need to ensure that the physical memory backing our buffer is
    located in a range the device can access, or we have to ensure it will be copied
    or remapped. We then need to work out the individual segments of physical memory
    that our buffer is backed by and capture each segment''s physical address and
    length to create a scatter/gather list. Things may be complicated further depending
    on the capabilities of the device, if it has special requirements for alignment,
    or limits on the length of individual segments. [Figure 9-5](#Chapter09.html#fig_9_5)
    shows a simple scatter/gather list.


    ![images](images/0905.jpg)


    ***Figure 9-5.** Simple scatter/gather list*


    An actual implementation might be more complex and have additional data associated
    with each descriptor, but we have kept it simple to illustrate the concept. [Figure
    9-5](#Chapter09.html#fig_9_5) shows how a 32K virtual buffer is composed of four
    physical segments of different lengths. The scatter/gather list is an array of
    DMA descriptor elements, each containing a pointer to the next descriptor in the
    list. Each element has an address and length of the physical segment it represents.
    When a DMA transfer is started, we can simply tell the device the location of
    the first descriptor, and the device will read memory from the first descriptor
    and then follow the next pointer to the next descriptor element until the end
    of the list, which is terminated by a `NULL` pointer in this case. Some devices
    may have S/G lists that connect the last descriptor to the first creating a circular
    buffer for continuous (streaming) DMA.


    In [Figure 9-5](#Chapter09.html#fig_9_5), we are using a data structure, which
    in computer science and engineering parlance is known as a singly linked list.
    It would perhaps be simpler to just implement the list as a standard array. However,
    the singly linked list approach is more flexible as the S/G list itself can effectively
    be scatter-gathered, as each DMA descriptor element doesn''t necessarily need
    to be adjacent to each other in memory either.'
