    \       thisWillNotWork->fVariable1 = arg3;\n15         }\n```\n\n瞧，这永远行不通！我们找到了这个\
    \ bug，看起来只有当传入的第三个参数设置为零时，它才会被触发。\n\n如果你仅有符号信息，而缺少将地址映射到特定源代码位置所需的调试信息，你可以使用 GDB\
    \ 中的 `disassemble` 命令从该地址处转储方法的反汇编。让我们看看 `testFunc3()` 的反汇编，操作如下：\n\n`(gdb)` **`disassemble\
    \ 0x009ba0b7`**\n```\n...\n0x009ba09f <testFunc3Emmmm+35>:     mov    %eax,-0x1c(%ebp)\n\
    0x009ba0a2 <testFunc3Emmmm+38>:     mov    -0x18(%ebp),%eax\n0x009ba0a5 <testFunc3Emmmm+41>:\
    \     cmp    $0x0,%eax\n0x009ba0a8 <testFunc3Emmmm+44>:     jne    0x9ba0ba <testFunc3Emmmm+62>\n\
    0x009ba0aa <testFunc3Emmmm+46>:     movl   $0x0,-0x20(%ebp)\n0x009ba0b1 <testFunc3Emmmm+53>:\
    \     mov    -0x18(%ebp),%eax\n0x009ba0b4 <testFunc3Emmmm+56>:     mov    -0x20(%ebp),%ecx\n\
    0x009ba0b7 <testFunc3Emmmm+59>:     mov    %eax,0x54(%ecx)\n0x009ba0ba <testFunc3Emmmm+62>:\
    \     add    $0x18,%esp\n...\n```\n\n如果不熟悉汇编语言，这看起来可能让人望而生畏，但通过比较反汇编和原始源代码，你能够推断出不少信息。例如，`cmp`\
    \ 指令将 `eax` 寄存器的值与常量 `$0x0` 进行比较，我们可以正确猜测出这对应于第 11 行的 `if` 语句。\n\n尽管我们已经找到了问题的根源，但假设我们暂时对为什么第三个参数传入了零值感到好奇。也许我们的驱动程序在计算传递给\
    \ `testFunc3()` 的值时，使用了某种内部状态。在这种情况下，我们可以通过查看崩溃时驱动程序所处的状态来继续我们的检查。由于 `testFunc3()`\
    \ 是 `com_osxkernel_MyDebugDriver` 的一个成员方法，我们知道指向该类实例的指针会自动作为 `this` 指针传递给该成员函数。我们可以像下面这样，从之前的栈回溯中解引用\
