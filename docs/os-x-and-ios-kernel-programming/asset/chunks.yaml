  trans: "\n#### 构建软件包\n\n完成添加和配置所有要包含在分发版本中的部件后，您可以通过点击工具栏上的“构建”或“构建并运行”来构建它。后者会在构建完成后在\
    \ `Installer.app` 中打开该软件包。在构建阶段，软件包将经过验证和检查；如果存在错误或警告，您可以修正它们并重新构建软件包。最终结果类似于图\
    \ 18-7。\n\n![images](img/1807.jpg)\n\n***图 18-7.** 使用 `Installer.app` 启动时呈现的软件包*\n\
    \n生成的软件包将写入名为 `<Title>.pkg` 的文件。该软件包是压缩的，而不是一个包，因此无法在访达中直接检查其内容。当您保存一个 PackageMaker\
    \ 项目时，它会以名为 `<Title>.pmdoc` 的包的形式保存。项目包中包含定义该项目的 XML 文件。您可以使用文本编辑器编辑这些文件，或者在产品的构建过程中使用脚本自动替换或更新内容。如果您希望从命令行构建软件包，可以执行以下操作：\n\
    \n```\n$ /Developer/Applications/Utilities/PackageMaker.app/Contents/MacOS/PackageMaker\
    \ --doc HelloWorld.pmdoc --version 2.0 --title 'HelloWorld'\n```\n\n上述命令构建了版本号为\
    \ 2.0 的 `<Title>.pkg`。\n\n#### 卸载软件包\n\n遗憾的是，并不存在用于自动卸载使用 PackageMaker 创建的软件包的机制。要手动卸载软件包，您需要识别该软件包安装的文件并将其删除。您还必须停止并移除该软件包安装的任何启动代理或守护程序。更好的选择是为您的用户提供一个执行卸载操作的脚本或程序。不过，PackageMaker\
    \ 能够处理升级问题。\n\n### 总结\n\n在本章中，我们了解了以下内容：\n\n- 系统如何自动加载 I/O Kit 内核扩展，以及如何手动加载其他不会自动加载类型的\
    \ KEXT（例如网络内核扩展）。后者通常通过使用启动守护程序来实现。\n- 对 KEXT 与用户空间之间的接口进行版本控制非常重要，以避免破坏与之交互的旧版/新版应用程序。处理此问题的一种策略是在共享头文件中包含版本号。\n\
    - 质量保证和测试是开发周期的重要组成部分，也是软件分发给客户之前的最后一道防线。在所有支持的平台上全面测试软件的所有方面和使用模式非常重要。\n- PackageMaker\
    \ 软件是在 Mac OS X 上分发更复杂软件包（即包含多个组件的东西，例如 KEXT、辅助守护程序和最终用户应用程序）的首选方式。\n- PackageMaker\
    \ 是一个随 Xcode 一起分发的工具。PackageMaker 可以通过图形用户界面或命令行使用。使用 PackageMaker 创建的软件包通过 `Installer.app`\
    \ 应用程序安装。\n- PackageMaker 不提供用于卸载软件包的机制。\n\n## 索引\n\n### ![images](img/square2.jpg)\
    \ 数字与符号\n\n`_MALLOC()` 函数, 107\n\n`_MALLOC_ZONE()` 函数, 107\n\n`<libkern/OSKextLib.h>`\
    \ 头文件, 424\n\n### ![images](img/square2.jpg) A\n\n`AbortPipe`, 375\n\n`acknowledgePowerChange()`\
    \ 方法, 219\n\n*活跃列表*, 104\n\n`activityTickle()` 方法, 217\n\n`activityTickle(type,\
    \ powerState)` 方法, 216\n\n`addAudioStream()` 方法, 267\n\n`addAvailableFormat()`,\
    \ 268\n\n`addEventSource()`, 195\n\n`addressOfMappedBuffer` 参数, 119\n\n高级图形端口\
    \ (AGP), 177\n\n高级内核编程, 411\n\n- 驱动程序通知\n  - 任意文件系统, 425\n  - 通信, 426 – 27\n \
    \ - 自定义用户客户端方法, 430 – 31\n  - 守护进程, 426\n  - `IOConnectSetNotificationPort()`\
    \ 函数, 430\n  - `IOUSBFamily`, 425\n  - `IOUserClient` 类, 426\n  - `IOUserClient`\
    \ 子类, 430\n  - 内核-用户通知中心, 425\n  - `mach_msg_header_t` 结构, 427\n  - `MyNotificationMessage`\
    \ 结构, 428\n  - `registerNotificationPort()` 方法, 430\n  - 结构定义, 427 – 28\n  - 用户空间代码,\
    \ 428 – 30\n  - 用户空间守护进程, 426\n- I/O Kit 家族, 413 – 14\n- 内核控制 KPI\n  - 访问，用户空间,\
    \ 419 – 21\n  - C 语言, 414\n  - 客户端连接, 417 – 18\n  - `getsockopt()` 系统调用函数, 414\n\
    \  - 获取和设置选项, 418 – 19\n  - `HelloKernControl` 头文件, 417\n  - `kern_ctl_reg` 结构,\
    \ 414 – 15\n  - `KEXT`, 414\n  - 注册, 415 – 17\n  - `send()` 和 `recv()` 系统调用函数,\
    \ 414\n  - `setsockopt()` 系统调用函数, 414\n  - vs. `ioctl()` 系统调用, 414\n- `KEXT` 资源,\
    \ 425\n  - 加载资源, 423 – 25\n- 多功能驱动程序, 412 – 13\n- 进程, 421 – 23\n- SSE 和浮点运算, 411\
    \ – 12\n- `app_descriptor` 结构, 286\n- Apple AHCI 存储驱动程序栈, 321\n- Apple USB 串行驱动程序,\
    \ 226\n- `AppleACPIPCI`, 177\n- `AppleRTL8139Ethernet`, 305\n- `AppleUSBCDC` 驱动程序,\
    \ 226\n- `AppleUSBCDCEthernet`, 305\n- `arg0` 参数, 364, 377\n- `atAddress` 参数,\
    \ 116\n- `attachMediaObjectToDeviceTree()`, 350\n- 音频驱动程序, 249\n  - 额外的音频引擎功能,\
    \ 275 – 76\n  - 音频引擎实现\n    - 头文件，`MyAudioEngine` 类, 263 – 64\n    - `IOAudioEngine`\
    \ 子类, 262\n  - 缓冲, 249\n  - Core Audio, 249, 251 – 53\n"
