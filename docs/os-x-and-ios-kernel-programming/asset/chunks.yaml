    \n```\nIOReturn IOUserClient::externalMethod (uint32_t selector, IOExternalMethodArguments*\
    \ args,\n                        IOExternalMethodDispatch* dispatch, OSObject*\
    \ target,\n                        void* reference);\n```\n\n当 I/O Kit 调用您类的`externalMethod()`实现时，只会填充前两个参数；`dispatch`、`target`和`reference`的值都将被设置为`NULL`。第一个参数`selector`是一个\
