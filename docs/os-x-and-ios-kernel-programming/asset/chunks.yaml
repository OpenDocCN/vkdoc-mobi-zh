- fmt: "# Unified Buffer Cache\n\nThe Unified Buffer Cache (UBC) is a cache for files.\
    \ When a file is written to, or read from, it will be loaded into physical memory\
    \ from a backing store, such as a hard drive. The UBC is intimately linked with\
    \ the VM subsystem and the UBC also caches VM objects. The structure used to cache\
    \ a `vnode` is shown in [Listing 2-1](#Chapter02.html#list_2_1).\n\n**Listing\
    \ 2-1.** The `ubc_info` Structure\n\n```\nstruct ubc_info {\n      memory_object_t\
    \             ui_pager;       /* pager */\n      memory_object_control_t     ui_control;\
    \     /* VM control for the pager */\n      uint32_t                    ui_flags;\
    \       /* flags */\n      vnode_t                     ui_vnode;       /* vnode\
    \ for this ubc_info */\n      kauth_cred_t                ui_ucred;       /* holds\
    \ credentials for NFS paging */\n      off_t                       ui_size;  \
    \      /* file size for the vnode */\n\n      struct  cl_readahead*       cl_rahead;\
    \      /* cluster read ahead context */\n      struct  cl_writebehind*     cl_wbehind;\
    \     /* cluster write behind context */\n\n      struct  cs_blob*           \
    \ cs_blobs;       /* for CODE SIGNING */\n};\n```\n\nPrior to the introduction\
    \ of the UBC, the system had two caches, a page cache and a buffer cache. The\
    \ buffer cache was indexed by a device and block number that addressed a chunk\
    \ of data on the physical device, whereas the page cache performed caching of\
    \ memory mappings.\n\nThe size of the UBC shrinks and grows dynamically depending\
    \ on the needs of the system. If a file in the cache is modified, it is marked\
    \ as dirty, to indicate that the cached copy differs from the original found on\
    \ disk. Dirty entries are periodically flushed to disk. It is possible for a user\
    \ space program to bypass UBC, and go directly to disk, by using the `F_NOCACHE`\
    \ option of the `fcntl` system call, which may improve I/O performance for workloads\
    \ that do not benefit from such caching, such as large sets of data that are unlikely\
    \ to be reused.\n\n## The I/O Kit\n\nThe last major component that makes up XNU\
    \ is the I/O Kit, which is an object-oriented framework for writing device drivers\
    \ and other kernel extensions. It provides an abstraction of system hardware,\
    \ with pre-defined base classes for many types of hardware, making it simple to\
    \ implement a new driver, as it is able to inherit much of its functionality from\
    \ a base class driver, achieving a high degree of code reuse. The I/O Kit framework\
    \ consists of the kernel level framework, as well as a user space framework called\
    \ `IOKit.framework`. The kernel framework is written in Embedded C++, a subset\
    \ of C++, whereas the user space framework is C-based.\n\nThe I/O Kit maintains\
    \ a database known as the I/O Catalog. The I/O Catalog is a registry of all available\
    \ I/O Kit classes. Another database, the I/O Registry tracks object instances\
    \ of classes in the I/O Catalog. Objects in the I/O Registry typically represent\
    \ devices, drivers, or supporting classes, and are structured in a hierarchical\
    \ manner, which mimics the way hardware devices are physically connected to each\
    \ other. For example a USB device is a child of the USB controller it is connected\
    \ to. The `ioreg` command line utility allows you to inspect the I/O Registry.\n\
    \nThe I/O Kit is based around three major concepts:\n\n*   Families\n*   Drivers\n\
    *   Nubs\n\nFamilies represent common abstractions for devices of a particular\
    \ type. For example, an `IOUSBFamily` handles many of the technicalities of implementing\
    \ support for USB related devices. Drivers are responsible for managing a specific\
    \ device or bus. A driver may have a relationship with more than one family. In\
    \ the case of a USB-based storage device, it might depend on the `IOUSBFamily`,\
    \ as well as the `IOStorageFamily`. Nubs are interfaces for a controllable entity,\
    \ such as a PCI or USB device, which a higher-level driver may use to communicate\
    \ with the device.\n\nAs a kernel programmer, you will probably spend most of\
    \ your time working with the I/O Kit, and thus much of this book will be devoted\
    \ to it, and a full description of I/O Kit is provided in [Chapter 4](#Chapter04.html#ch4).\n\
    \n## The Libkern Library\n\nThe libkern library, unlike Mach and BSD, which provide\
    \ APIs for interacting with the system, provides supporting routines and classes\
    \ to the rest of the kernel, and in particular the I/O Kit. That is, building\
    \ blocks and utilities useful to the kernel itself, as well as extensions. The\
    \ limited C++ runtime is implemented in libkern, which provides implementation\
    \ for services such as the `new` and `delete` operators.\n\nIn addition to standard\
    \ C++ runtime, libkern also provides a number of useful classes, the most fundamental\
    \ being `OSObject`, the superclass of every class in I/O Kit. It provides support\
    \ for reference counting, which works conceptually the same as `NSObject` in Cocoa,\
    \ or Cocoa Touch in user space. Other classes of interest include `OSDictionary`,\
    \ `OSArray`, `OSString`, and `OSInteger`. These classes, and others, are also\
    \ used to provide a dictionary of values from the kernel extension's `Info.plist`.\n\
    \nThe libkern library is not all about core C++ classes and runtime, as it also\
    \ provides the implementation of many functions normally found in the standard\
    \ C library. Examples of this are the `printf()` and `sccanf()` functions, as\
    \ well as others such as `strtol()` and `strsep()`. Other functions provided by\
    \ libkern include cryptographic hash algorithms (MD5 and SHA-1), UUID generation,\
    \ and the zlib compression library. The library is also home to `kxld`, the library\
    \ used to manage dynamically loaded kernel extensions.\n\nLast, but not least,\
    \ we find functions, such as `OSMalloc()`, for allocating memory and for the implementation\
    \ of locking mechanisms and synchronization primitives.\n\n![images](images/square.jpg)\
    \ **Note** The sources for libkern are found in the `libkern/` and `bsd/libkern/`\
    \ directories in the XNU source distribution.\n\n## The Platform Expert\n\nThe\
    \ platform expert contains an abstraction layer for the system. Parts of it are\
    \ available as part of the public XNU source code distribution, but the remainder\
    \ is implemented in the `com.apple.driver.AppleACPIPlatform` KEXT, for which no\
    \ source code is available. The platform expert handles device enumeration and\
    \ detection for the system bus. It can be seen as the driver for the motherboard.\
    \ The platform expert is responsible for the initial construction of the I/O Kit\
    \ device tree after the system boots (known as the I/O Registry). The platform\
    \ expert itself will form the root node of the tree, `IOPlatformExpertDevice`."
  raw: '##### Unified Buffer Cache


    The Unified Buffer Cache (UBC) is a cache for files. When a file is written to,
    or read from, it will be loaded into physical memory from a backing store, such
    as a hard drive. The UBC is intimately linked with the VM subsystem and the UBC
    also caches VM objects. The structure used to cache a `vnode` is shown in [Listing
    2-1](#Chapter02.html#list_2_1).


    ***Listing 2-1.** The ubc_info Structure*


    `struct ubc_info {`

    `      memory_object_t             ui_pager;       /* pager */`

    `      memory_object_control_t     ui_control;     /* VM control for the pager
    */`

    `      uint32_t                    ui_flags;       /* flags */`

    `      vnode_t                     ui_vnode;       /* vnode for this ubc_info
    */`

    `      kauth_cred_t                ui_ucred;       /* holds credentials for NFS
    paging */`

    `      off_t                       ui_size;        /* file size for the vnode
    */`


    `      struct  cl_readahead*       cl_rahead;      /* cluster read ahead context
    */`

    `      struct  cl_writebehind*     cl_wbehind;     /* cluster write behind context
    */`


    `      struct  cs_blob*            cs_blobs;       /* for CODE SIGNING */`

    `};`


    Prior to the introduction of the UBC, the system had two caches, a page cache
    and a buffer cache. The buffer cache was indexed by a device and block number
    that addressed a chunk of data on the physical device, whereas the page cache
    performed caching of memory mappings.


    The size of the UBC shrinks and grows dynamically depending on the needs of the
    system. If a file in the cache is modified, it is marked as dirty, to indicate
    that the cached copy differs from the original found on disk. Dirty entries are
    periodically flushed to disk. It is possible for a user space program to bypass
    UBC, and go directly to disk, by using the `F_NOCACHE` option of the *fcntl* system
    call, which may improve I/O performance for workloads that do not benefit from
    such caching, such as large sets of data that are unlikely to be reused.


    #### The I/O Kit


    The last major component that makes up XNU is the I/O Kit, which is an object-oriented
    framework for writing device drivers and other kernel extensions. It provides
    an abstraction of system hardware, with pre-defined base classes for many types
    of hardware, making it simple to implement a new driver, as it is able to inherit
    much of its functionality from a base class driver, achieving a high degree of
    code reuse. The I/O Kit framework consists of the kernel level framework, as well
    as a user space framework called `IOKit.framework`. The kernel framework is written
    in Embedded C++, a subset of C++, whereas the user space framework is C-based.


    The I/O Kit maintains a database known as the I/O Catalog. The I/O Catalog is
    a registry of all available I/O Kit classes. Another database, the I/O Registry
    tracks object instances of classes in the I/O Catalog. Objects in the I/O Registry
    typically represent devices, drivers, or supporting classes, and are structured
    in a hierarchical manner, which mimics the way hardware devices are physically
    connected to each other. For example a USB device is a child of the USB controller
    it is connected to. The `ioreg` command line utility allows you to inspect the
    I/O Registry.


    The I/O Kit is based around three major concepts:


    *   Families

    *   Drivers

    *   Nubs


    Families represent common abstractions for devices of a particular type. For example,
    an `IOUSBFamily` handles many of the technicalities of implementing support for
    USB related devices. Drivers are responsible for managing a specific device or
    bus. A driver may have a relationship with more than one family. In the case of
    a USB-based storage device, it might depend on the `IOUSBFamily`, as well as the
    `IOStorageFamily`. Nubs are interfaces for a controllable entity, such as a PCI
    or USB device, which a higher-level driver may use to communicate with the device.


    As a kernel programmer, you will probably spend most of your time working with
    the I/O Kit, and thus much of this book will be devoted to it, and a full description
    of I/O Kit is provided in [Chapter 4](#Chapter04.html#ch4).


    ##### The Libkern Library


    The libkern library, unlike Mach and BSD, which provide APIs for interacting with
    the system, provides supporting routines and classes to the rest of the kernel,
    and in particular the I/O Kit. That is, building blocks and utilities useful to
    the kernel itself, as well as extensions. The limited C++ runtime is implemented
    in libkern, which provides implementation for services such as the `new` and `delete`
    operators.


    In addition to standard C++ runtime, libkern also provides a number of useful
    classes, the most fundamental being `OSObject`, the superclass of every class
    in I/O Kit. It provides support for reference counting, which works conceptually
    the same as NSObject in Cocoa, or Cocoa Touch in user space. Other classes of
    interest include `OSDictionary`, `OSArray`, `OSString`, and `OSInteger`. These
    classes, and others, are also used to provide a dictionary of values from the
    kernel extension''s `Info.plist`.


    The libkern library is not all about core C++ classes and runtime, as it also
    provides the implementation of many functions normally found in the standard C
    library. Examples of this are the `printf()` and `sccanf()` functions, as well
    as others such as `strtol()` and `strsep()`. Other functions provided by libkern
    include cryptographic hash algorithms (MD5 and SHA-1), UUID generation, and the
    zlib compression library. The library is also home to *kxld,* the library used
    to manage dynamically loaded kernel extensions.


    Last, but not least, we find functions, such as `OSMalloc()`, for allocating memory
    and for the implementation of locking mechanisms and synchronization primitives.


    ![images](images/square.jpg) **Note** The sources for libkern are found in the
    `libkern/` and `bsd/libkern/ directories` in the XNU source distribution.


    ##### The Platform Expert


    The platform expert contains an abstraction layer for the system. Parts of it
    are available as part of the public XNU source code distribution, but the remainder
    is implemented in the `com.apple.driver.AppleACPIPlatform` KEXT, for which no
    source code is available. The platform expert handles device enumeration and detection
    for the system bus. It can be seen as the driver for the motherboard. The platform
    expert is responsible for the initial construction of the I/O Kit device tree
    after the system boots (known as the I/O Registry). The platform expert itself
    will form the root node of the tree, `IOPlatformExpertDevice`.'
  trans: "\n# 统一缓冲区缓存\n\n统一缓冲区缓存（UBC）是一种文件缓存。当文件被写入或读取时，它会从后备存储（如硬盘）加载到物理内存中。UBC 与虚拟内存子系统紧密相连，同时也缓存\
    \ VM 对象。用于缓存 `vnode` 的结构体如列表 2-1 所示。\n\n**列表 2-1.** `ubc_info` 结构体\n\n```\nstruct\
    \ ubc_info {\n      memory_object_t             ui_pager;       /* 分页器 */\n  \
    \    memory_object_control_t     ui_control;     /* 分页器的 VM 控制 */\n      uint32_t\
    \                    ui_flags;       /* 标志 */\n      vnode_t                 \
    \    ui_vnode;       /* 此 ubc_info 的 vnode */\n      kauth_cred_t            \
    \    ui_ucred;       /* 保存 NFS 分页的凭据 */\n      off_t                       ui_size;\
    \        /* 该 vnode 的文件大小 */\n\n      struct  cl_readahead*       cl_rahead; \
    \     /* 集群预读上下文 */\n      struct  cl_writebehind*     cl_wbehind;     /* 集群回写上下文\
    \ */\n\n      struct  cs_blob*            cs_blobs;       /* 用于代码签名 */\n};\n```\n\
    \n在引入 UBC 之前，系统拥有两个缓存：页面缓存和缓冲区缓存。缓冲区缓存通过设备号和块号进行索引，用于寻址物理设备上的数据块，而页面缓存则负责内存映射的缓存。\n\
    \nUBC 的大小会根据系统需求动态地增长或缩小。如果缓存中的文件被修改，它会被标记为脏页，以指示缓存副本与磁盘上的原始文件不同。脏页条目会被定期刷新到磁盘。用户空间程序可以通过使用\
    \ `fcntl` 系统调用的 `F_NOCACHE` 选项绕过 UBC，直接访问磁盘，这可能会提升那些无法从此类缓存中受益的工作负载（例如不太可能被重复使用的大数据集）的\
    \ I/O 性能。\n\n## I/O Kit\n\n构成 XNU 的最后一个主要组件是 I/O Kit，它是一个用于编写设备驱动和其他内核扩展的面向对象框架。它提供了系统硬件的抽象，并为多种硬件类型预定义了基类，使得实现新驱动程序变得简单，因为它可以从基类驱动中继承大部分功能，从而实现高度的代码复用。I/O\
    \ Kit 框架包含内核级框架以及一个名为 `IOKit.framework` 的用户空间框架。内核框架使用嵌入式 C++（C++ 的一个子集）编写，而用户空间框架则基于\
    \ C 语言。\n\nI/O Kit 维护着一个称为 I/O 目录（I/O Catalog）的数据库。I/O 目录是所有可用 I/O Kit 类的注册表。另一个数据库，I/O\
    \ 注册表（I/O Registry），则追踪 I/O 目录中类的对象实例。I/O 注册表中的对象通常代表设备、驱动程序或支持类，并以分层结构组织，这种结构模仿了硬件设备之间物理连接的方式。例如，一个\
    \ USB 设备是其连接的 USB 控制器的子节点。`ioreg` 命令行工具允许你检查 I/O 注册表。\n\nI/O Kit 基于三个主要概念：\n\n\
    *   系列（Families）\n*   驱动（Drivers）\n*   枢纽（Nubs）\n\n系列代表了特定类型设备的通用抽象。例如，`IOUSBFamily`\
    \ 处理了实现 USB 相关设备支持所需的许多技术细节。驱动程序负责管理特定的设备或总线。一个驱动程序可能与多个系列有关联。对于一个基于 USB 的存储设备，它可能依赖于\
    \ `IOUSBFamily` 和 `IOStorageFamily`。枢纽是可控制实体（如 PCI 或 USB 设备）的接口，更高级别的驱动程序可以使用它与设备进行通信。\n\
    \n作为一名内核程序员，你可能会将大部分时间花在使用 I/O Kit 上，因此本书将用很大篇幅介绍它，并在第 4 章中提供 I/O Kit 的完整描述。\n\
    \n## Libkern 库\n\n与提供系统交互 API 的 Mach 和 BSD 不同，libkern 库为内核的其余部分（特别是 I/O Kit）提供支持性的例程和类。也就是说，它提供了对内核本身以及扩展有用的构建块和工具。受限的\
    \ C++ 运行时是在 libkern 中实现的，它提供了诸如 `new` 和 `delete` 运算符等服务的实现。\n\n除了标准的 C++ 运行时，libkern\
    \ 还提供了许多有用的类，其中最基础的是 `OSObject`，它是 I/O Kit 中所有类的超类。它提供了对引用计数的支持，其工作方式在概念上与 Cocoa\
    \ 或用户空间中的 Cocoa Touch 中的 `NSObject` 相同。其他值得关注的类包括 `OSDictionary`、`OSArray`、`OSString`\
    \ 和 `OSInteger`。这些类以及其他类也用于从内核扩展的 `Info.plist` 中提供值的字典。\n\nlibkern 库并非只关注核心 C++\
    \ 类和运行时，它还提供了通常在标准 C 库中出现的许多函数的实现。例如 `printf()` 和 `scanf()` 函数，以及其他如 `strtol()`\
    \ 和 `strsep()` 等函数。libkern 提供的其他函数包括加密哈希算法（MD5 和 SHA-1）、UUID 生成以及 zlib 压缩库。该库还包含了\
    \ `kxld`，这是用于管理动态加载的内核扩展的库。\n\n最后但同样重要的是，我们还能找到诸如 `OSMalloc()` 等用于分配内存以及实现锁定机制和同步原语的函数。\n\
    \n![images](img/square.jpg) **注意** libkern 的源代码位于 XNU 源代码分发中的 `libkern/` 和 `bsd/libkern/`\
    \ 目录下。\n\n## 平台专家\n\n平台专家包含系统的抽象层。其中部分代码作为公共 XNU 源代码分发的一部分提供，但其余部分则在 `com.apple.driver.AppleACPIPlatform`\
    \ 内核扩展中实现，该扩展的源代码不可用。平台专家处理系统总线的设备枚举和检测。它可以被视为主板的驱动程序。平台专家负责系统启动后 I/O Kit 设备树（称为\
    \ I/O 注册表）的初始构建。平台专家本身将形成该树的根节点 `IOPlatformExpertDevice`。\n"
- fmt: '### Summary


    In this chapter we have:


    * Given an overview of the Mac OS X and iOS operating systems. We have discussed
    their general background and origin, with a particular focus on the kernel, the
    major topic of this book.

    * Looked at the XNU kernel, which is the kernel for both OS X and iOS.

    * Discussed the layered architecture of the XNU kernel, which consists of three
    major components: the Mach, the BSD, and the I/O Kit. The Mach layer can be seen
    as the inner ring, closest to the hardware, which provides services to the rest
    of the kernel. Services provided by the Mach layer include hardware abstraction,
    virtual memory, and task scheduling.

    * Discussed the operation of the Mach scheduler, and the difference between tasks
    and threads. A task can be seen as a container for threads that share a common
    memory address space, as well as other resources, such as open files.

    * Discussed Mach IPC, which is the mechanism used for communication within the
    kernel and the various layers it contains. Furthermore, we broke down the various
    components involved in providing virtual memory in Mach. Namely, the VM map, VM
    map entry, and VM objects.

    * Discussed the role and operation of pagers.

    * Discussed the BSD layer, which was derived from the FreeBSD operating system
    and runs on top of the Mach core, but in the same kernel address space. It provides
    the interface applications used to communicate with the kernel, most importantly
    the system calls. The BSD layer implements the networking stack, including TCP/IP
    and other protocols. It also provides support for file systems such as HFS+ that
    are implemented on top of the virtual file system layer (VFS), which is a unified
    interface for file systems.

    * Discussed the I/O Kit, a C++ based kernel framework for writing device drivers
    and other extensions. The `libkern` library provides many utility functions and
    building blocks, including the set of classes that I/O Kit is built in top of,
    such as `OSObject`.


    ## C H A P T E R  3


    ## Xcode and the Kernel Development Environment


    Apple has a good track record of taking care of its developers and providing them
    with intuitive, user-friendly tools and APIs to develop for the Mac and iOS platforms.
    Anyone who has written application software for the Mac or iPhone will be familiar
    with the object-oriented Cocoa framework, which provides a rich set of interfaces
    to support graphical user interfaces and other services required by user applications.
    Likewise, kernel developers are provided with APIs that are designed to help with
    the tasks performed by a kernel extension. For driver development, Apple provides
    the I/O Kit, which is an object-oriented framework for interfacing with hardware.
    The following chapter discusses the tools and frameworks you will need to get
    started with kernel development and includes a tutorial for building and installing
    a simple kernel extension.


    ### Language of Choice: C++


    The C language has been the *de facto* system-level language for decades. Indeed,
    the language was originally developed as an alternative to writing non-portable
    assembly code specifically for the original Unix system. The XNU kernel and many
    Mac OS X core services are written in C, while the I/O Kit framework used for
    driver development is written in a subset of the C++ language. Apple chose C++
    for the I/O Kit because it is an object-oriented language and therefore allows
    a driver model that abstracts the physical hardware connections. Apple did toy
    with the idea of an Objective-C-based framework for drivers, but finally settled
    on C++. Despite the widespread use of C++ for the development of application software,
    Mac OS X is still one of the few operating systems that allows and in fact encourages
    C++ code to be run in its kernel. However, this is not to say the Mac OS X kernel
    is immune from the same problems that make C++ code problematic in other kernels.
    To avoid some of these problems, Mac OS X kernel code must use a restricted subset
    of the features provided by C++, referred to as Embedded C++. The features that
    are not available include the following:


    * Exceptions

    * Multiple inheritance

    * Templates

    * Runtime type information


    It is worth noting that, because Embedded C++ is a subset of the standard C++
    language, any code written for Embedded C++ is compatible with a regular C++ compiler.


    While technically possible to include these language features in the kernel, Apple
    decided to disable them because they can greatly increase the size of the compiled
    code, which in turn increases the memory footprint of the kernel. Support for
    exceptions was disabled not only because of the additional code size but also
    because failure to catch an exception would result in a kernel panic.


    Although the standard runtime type information is disabled, the I/O Kit does provide
    its own limited implementation, which is discussed in the following chapter. Kernel
    developers also have access to a limited implementation of the C++ runtime library
    and with language support for templates disabled, the STL classes are unavailable.


    As a general rule, C++ is used when writing kernel extensions based on the I/O
    Kit framework, whereas C is used for everything else, including implementation
    of file systems and low-level networking code.


    ### Xcode


    To begin developing a kernel extension, you will need to install Apple''s development
    tools, known as Xcode. These are available from the Mac App Store. Installing
    the Xcode package adds a directory to the root level of your hard disk named "Developer,"
    which includes everything that is required for both Mac OS X and iOS development,
    including the following:


    * An integrated development environment (the Xcode application)

    * Compilers for C, C++, and Objective-C

    * A source code debugger

    * The APIs and header files used for kernel and application development

    * Profiling tools for measuring your code''s execution time and identifying performance
    bottlenecks

    * Utilities for examining the hardware devices connected to the system and the
    driver that has been loaded for each device


    Of these tools, the Xcode application is the one in which you will spend most
    of your time when writing a kernel extension, since it provides the source code
    editor and a front-end to the compiler. [Figure 3-1](#Chapter03.html#fig_3_1)
    shows the Xcode 4 user interface.


    ![images](images/0301.jpg)


    **Figure 3-1.** *The Xcode 4 user interface*


    Under the hood, Xcode is a front-end to the command-line compiler and debugger.
    In fact, there is nothing to stop you from bypassing Xcode completely and building
    your kernel extensions by invoking GCC directly on the command line. However,
    as we will see in the next section, Xcode provides project templates that pass
    the appropriate compiler flags for building a kernel extension.


    Previous versions of Xcode used the GCC compiler; however, starting from Xcode
    4, an alternative and modern compiler based on LLVM is provided as the default
    compiler. The LLVM compiler is an open source project led by Apple that supports
    Objective-C, C, and C++. The goal of LLVM is to provide faster compile times than
    GCC and to provide tighter integration into IDEs, such as Xcode, by providing
    more legible warning and error messages and by allowing syntax highlighting and
    code completion to be driven by the semantic analysis performed by the compiler
    itself.


    ![images](images/square.jpg) **Note** More information about Xcode, including
    information about how to obtain it, can be found at [`http://developer.apple.com/xcode`](http://developer.apple.com/xcode).'
