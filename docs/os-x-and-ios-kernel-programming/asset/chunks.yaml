- fmt: "### Finding a Driver\n\nThe first step in communicating with a kernel driver\
    \ from a user space application is to locate the running instances of the driver\
    \ of interest. On a system such as Mac OS X, hardware devices can be plugged into\
    \ the machine at any time and there may be several instances of a driver loaded\
    \ if the user has connected multiple hardware devices that are supported by your\
    \ driver. To handle these cases, the I/O Kit framework provides functions to not\
    \ only iterate over all devices and drivers in the I/O Registry that match certain\
    \ criteria, but also allows a callback function to be installed to watch for the\
    \ arrival or removal of a driver or a device that matches certain criteria.\n\n\
    To locate a specific driver in the I/O Registry, the I/O Kit framework uses a\
    \ matching dictionary that includes the properties of the driver or device that\
    \ you are interested in. The beauty of the I/O Kit design is that the matching\
    \ dictionary that a user space application uses to locate a driver or a hardware\
    \ device takes exactly the same form as the matching dictionary found in the driver\
    \ personality of a kernel driver's property list (see [Chapter 4](#Chapter04.html#ch4)).\
    \ In fact, the same code that the kernel uses to compare a driver's matching dictionary\
    \ when deciding whether to load a driver against a device is the very code that\
    \ is used to decide whether a device or driver is of interest to the application\
    \ when comparing a user space application's matching dictionary.\n\nAs with the\
    \ matching dictionary in a driver's property list, an application can create a\
    \ matching dictionary that is as generic or specific as required. For example,\
    \ depending on the properties you add to the matching dictionary, it could match\
    \ against all USB devices or, by adding a specific USB vendor ID to the matching\
    \ dictionary, against any USB device produced by a certain manufacturer. Adding\
    \ a further USB product ID to the matching dictionary would allow it to match\
    \ against only a specific USB device.\n\nAs an example, [Listing 5-1](#Chapter05.html#list_5_1)\
    \ creates a matching dictionary that will match against any USB device and uses\
    \ it to iterate over the I/O Registry, printing the name of all matching devices.\
    \ To compile this sample, a new project in Xcode that is based on the Mac OS X\
    \ application template named “Command Line Tool” is created. When prompted to\
    \ name the project, enter “DriverIterator” and select “Core Foundation” as the\
    \ project type. You will need to add the framework “I/OKit.framework” to the project;\
    \ otherwise, you will receive a link error when the project is built.\n\nThe structure\
    \ of the code should be fairly straightforward:\n\n1.  It creates a matching dictionary\
    \ that specifies the properties of the hardware device or drivers that we are\
    \ interested in. This example uses the helper function `IOServiceMatching()`,\
    \ which creates a dictionary with a single entry for the `IOProviderClass` key\
    \ with the specified value. This has the same effect as adding an `IOProviderClass`\
    \ entry to the matching dictionary of a driver's property list; any kernel object\
    \ that is a subclass of the specified class, `IOUSBDevice` in this example, will\
    \ match against the dictionary.\n2.  It calls `IOServiceGetMatchingServices()`\
    \ passing in the matching dictionary and receives as output an iterator that can\
    \ be used to traverse all kernel objects in the I/O Registry that match the matching\
    \ dictionary. The iterator represents the state of the system at the time that\
    \ the function was called; once the iterator object has been created, it will\
    \ not be modified, even if additional matching devices are added to the system.\n\
    3.  The function `IOIteratorNext()` is called repeatedly, and on each call it\
    \ returns the next object that matched the specified dictionary. When the final\
    \ object has been received, any further calls to `IOIteratorNext()` will return\
    \ 0. Any object returned by the iterator has had its reference count incremented\
    \ and needs to be released by the caller through a call to `IOObjectRelease()`.\n\
    4.  To refine this sample, the code excludes USB hubs and only lists the names\
    \ of actual USB devices. This also allows the sample to demonstrate the type introspection\
    \ functionality that user space applications can perform on kernel objects. To\
    \ do this, the function `IOObjectCopyClass()` is called, which returns the object's\
    \ class type as a CoreFoundation string. The matching dictionary will include\
    \ all objects that are either instances of `IOUSBDevice` or instances of classes\
    \ that are derived from `IOUSBDevice`, which includes the `IOUSBHubDevice` class.\
    \ To exclude USB hub devices from the listing, this sample will ignore any objects\
    \ whose class name is not an exact match of the string `IOUSBDevice`.\n\n***Listing\
    \ 5-1.** Code To Iterate All Connected USB Hardware Devices*\n\n```\n#include\
    \ <CoreFoundation/CoreFoundation.h>\n#include <IOKit/IOKitLib.h>\n\nint main (int\
    \ argc, const char * argv[])\n{\n        CFDictionaryRef         matchingDict\
    \ = NULL;\n        io_iterator_t           iter = 0;\n        io_service_t   \
    \         service = 0;\n        kern_return_t           kr;\n\n        // Create\
    \ a matching dictionary that will find any USB device.\n        matchingDict =\
    \ IOServiceMatching(\"IOUSBDevice\");\n\n        // Create an iterator for all\
    \ I/O Registry objects that match the dictionary.\n        kr = IOServiceGetMatchingServices(kIOMasterPortDefault,\
    \ matchingDict, &iter);\n        if (kr != KERN_SUCCESS)\n                return\
    \ -1;\n\n        // Iterate over all matching objects.\n        while ((service\
    \ = IOIteratorNext(iter)) != 0)\n        {\n                CFStringRef     className;\n\
    \                io_name_t       name;\n\n                // List all IOUSBDevice\
    \ objects, ignoring objects that subclass IOUSBDevice.\n                className\
    \ = IOObjectCopyClass(service);\n                if (CFEqual(className, CFSTR(\"\
    IOUSBDevice\")) == true)\n                {\n                        IORegistryEntryGetName(service,\
    \ name);\n                        printf(\"Found device with name: %s\\n\", name);\n\
    \                }\n                CFRelease(className);\n                IOObjectRelease(service);\n\
    \        }\n\n        // Release the iterator.\n        IOObjectRelease(iter);\n\
    \n        return 0;\n}\n```\n\n![images](images/square.jpg) **Note** The function\
    \ `IOServiceGetMatchingServices()` is guaranteed to release a reference on the\
    \ matching dictionary that is passed in. This is why the code in [Listing 5-1](#Chapter05.html#list_5_1)\
    \ does not need to call `CFRelease()` on the `CFDicionaryRef` that it creates."
  raw: '### Finding a Driver


    The first step in communicating with a kernel driver from a user space application
    is to locate the running instances of the driver of interest. On a system such
    as Mac OS X, hardware devices can be plugged into the machine at any time and
    there may be several instances of a driver loaded if the user has connected multiple
    hardware devices that are supported by your driver. To handle these cases, the
    I/O Kit framework provides functions to not only iterate over all devices and
    drivers in the I/O Registry that match certain criteria, but also allows a callback
    function to be installed to watch for the arrival or removal of a driver or a
    device that matches certain criteria.


    To locate a specific driver in the I/O Registry, the I/O Kit framework uses a
    matching dictionary that includes the properties of the driver or device that
    you are interested in. The beauty of the I/O Kit design is that the matching dictionary
    that a user space application uses to locate a driver or a hardware device takes
    exactly the same form as the matching dictionary found in the driver personality
    of a kernel driver''s property list (see [Chapter 4](#Chapter04.html#ch4)). In
    fact, the same code that the kernel uses to compare a driver''s matching dictionary
    when deciding whether to load a driver against a device is the very code that
    is used to decide whether a device or driver is of interest to the application
    when comparing a user space application''s matching dictionary.


    As with the matching dictionary in a driver''s property list, an application can
    create a matching dictionary that is as generic or specific as required. For example,
    depending on the properties you add to the matching dictionary, it could match
    against all USB devices or, by adding a specific USB vendor ID to the matching
    dictionary, against any USB device produced by a certain manufacturer. Adding
    a further USB product ID to the matching dictionary would allow it to match against
    only a specific USB device.


    As an example, [Listing 5-1](#Chapter05.html#list_5_1) creates a matching dictionary
    that will match against any USB device and uses it to iterate over the I/O Registry,
    printing the name of all matching devices. To compile this sample, a new project
    in Xcode that is based on the Mac OS X application template named “Command Line
    Tool” is created. When prompted to name the project, enter “DriverIterator” and
    select “Core Foundation” as the project type. You will need to add the framework
    “I/OKit.framework” to the project; otherwise, you will receive a link error when
    the project is built.


    The structure of the code should be fairly straightforward:


    1.  It creates a matching dictionary that specifies the properties of the hardware
    device or drivers that we are interested in. This example uses the helper function
    `IOServiceMatching()`, which creates a dictionary with a single entry for the
    `IOProviderClass` key with the specified value. This has the same effect as adding
    an `IOProviderClass` entry to the matching dictionary of a driver''s property
    list; any kernel object that is a subclass of the specified class, `IOUSBDevice`
    in this example, will match against the dictionary.

    2.  It calls `IOServiceGetMatchingServices()` passing in the matching dictionary
    and receives as output an iterator that can be used to traverse all kernel objects
    in the I/O Registry that match the matching dictionary. The iterator represents
    the state of the system at the time that the function was called; once the iterator
    object has been created, it will not be modified, even if additional matching
    devices are added to the system.

    3.  The function `IOIteratorNext()` is called repeatedly, and on each call it
    returns the next object that matched the specified dictionary. When the final
    object has been received, any further calls to `IOIteratorNext()` will return
    0\. Any object returned by the iterator has had its reference count incremented
    and needs to be released by the caller through a call to `IOObjectRelease()`.

    4.  To refine this sample, the code excludes USB hubs and only lists the names
    of actual USB devices. This also allows the sample to demonstrate the type introspection
    functionality that user space applications can perform on kernel objects. To do
    this, the function `IOObjectCopyClass()` is called, which returns the object''s
    class type as a CoreFoundation string. The matching dictionary will include all
    objects that are either instances of `IOUSBDevice` or instances of classes that
    are derived from `IOUSBDevice`, which includes the `IOUSBHubDevice` class. To
    exclude USB hub devices from the listing, this sample will ignore any objects
    whose class name is not an exact match of the string “`IOUSBDevice`.”


    ***Listing 5-1.** Code To Iterate All Connected USB Hardware Devices*


    `#include <CoreFoundation/CoreFoundation.h>`

    `#include <IOKit/IOKitLib.h>`


    `int main (int argc, const char * argv[])`

    `{`

    `        CFDictionaryRef         matchingDict = NULL;`

    `        io_iterator_t           iter = 0;`

    `        io_service_t            service = 0;`

    `        kern_return_t           kr;`


    `        // Create a matching dictionary that will find any USB device.`

    `        matchingDict = IOServiceMatching("IOUSBDevice");`


    `        // Create an iterator for all I/O Registry objects that match the dictionary.`

    `        kr = IOServiceGetMatchingServices(kIOMasterPortDefault, matchingDict,
    &iter);`

    `        if (kr != KERN_SUCCESS)`

    `                return -1;`


    `        // Iterate over all matching objects.`

    `        while ((service = IOIteratorNext(iter)) != 0)`

    `        {`

    `                CFStringRef     className;`

    `                io_name_t       name;`


    `                // List all IOUSBDevice objects, ignoring objects that subclass
    IOUSBDevice.`

    `                className = IOObjectCopyClass(service);`

    `                if (CFEqual(className, CFSTR("IOUSBDevice")) == true)`

    `                {`

    `                        IORegistryEntryGetName(service, name);`

    `                        printf("Found device with name: %s\n", name);`

    `                }`

    `                CFRelease(className);`

    `                IOObjectRelease(service);`

    `        }`


    `        // Release the iterator.`

    `        IOObjectRelease(iter);`


    `        return 0;`

    `}`


    ![images](images/square.jpg) **Note** The function `IOServiceGetMatchingServices()`
    is guaranteed to release a reference on the matching dictionary that is passed
    in. This is why the code in [Listing 5-1](#Chapter05.html#list_5_1) does not need
    to call `CFRelease()` on the `CFDicionaryRef` that it creates.'
  trans: "\n### 查找驱动程序\n\n从用户空间应用程序与内核驱动程序通信的第一步，是定位感兴趣的驱动程序的运行实例。在 Mac OS X 等系统中，硬件设备可以随时插入机器，如果用户连接了多个由你的驱动程序支持的硬件设备，则可能会加载该驱动程序的多个实例。为了处理这些情况，I/O\
    \ Kit 框架提供的函数不仅可以遍历 I/O Registry 中符合特定条件的所有设备和驱动程序，还可以安装一个回调函数来监视符合特定条件的驱动程序或设备的接入或移除。\n\
    \n要在 I/O Registry 中定位特定的驱动程序，I/O Kit 框架使用一个匹配字典，其中包含你感兴趣的驱动程序或设备的属性。I/O Kit 设计的美妙之处在于，用户空间应用程序用于定位驱动程序或硬件设备的匹配字典，其形式与内核驱动程序属性列表中的驱动程序个性（driver\
    \ personality）中的匹配字典完全相同（参见 第 4 章）。事实上，内核在决定是否根据设备加载驱动程序时用于比较驱动程序匹配字典的代码，正是用户空间应用程序在比较其匹配字典时用于判断设备或驱动程序是否感兴趣的代码。\n\
    \n与驱动程序属性列表中的匹配字典类似，应用程序可以根据需要创建通用或具体（generic or specific）的匹配字典。例如，根据你添加到匹配字典中的属性，它可以匹配所有\
    \ USB 设备，或者通过向匹配字典中添加特定的 USB 供应商 ID，来匹配某个制造商生产的任何 USB 设备。再向匹配字典中添加一个特定的 USB 产品\
    \ ID，则只能匹配特定的 USB 设备。\n\n作为示例，代码清单 5-1 创建了一个可匹配任何 USB 设备的匹配字典，并使用它遍历 I/O Registry，打印所有匹配设备的名称。要编译此示例，需要在\
    \ Xcode 中创建一个基于 Mac OS X 应用程序模板“命令行工具”的新项目。当提示命名项目时，输入“DriverIterator”并选择“Core\
    \ Foundation”作为项目类型。你还需要将框架“I/OKit.framework”添加到项目中；否则，构建项目时会收到链接错误。\n\n代码结构应该相当简单明了：\n\
    \n1.  它创建一个匹配字典，指定了我们感兴趣的硬件设备或驱动程序的属性。本例使用辅助函数 `IOServiceMatching()`，该函数创建一个字典，其中为\
    \ `IOProviderClass` 键添加了一个具有指定值的条目。其效果等同于将 `IOProviderClass` 条目添加到驱动程序属性列表的匹配字典中；任何属于指定类\
    \ `IOUSBDevice`（本例中）子类的内核对象都将与该字典匹配。\n2.  它调用 `IOServiceGetMatchingServices()`，传入匹配字典，并接收一个迭代器作为输出，该迭代器可用于遍历\
    \ I/O Registry 中与该匹配字典匹配的所有内核对象。该迭代器表示调用函数时系统的状态；一旦创建了迭代器对象，即使系统中添加了额外的匹配设备，它也不会被修改。\n\
    3.  重复调用函数 `IOIteratorNext()`，每次调用都会返回与指定字典匹配的下一个对象。当接收到最后一个对象后，对 `IOIteratorNext()`\
    \ 的进一步调用将返回 0。迭代器返回的任何对象，其引用计数都已增加，调用者需要通过调用 `IOObjectRelease()` 来释放它。\n4.  为了优化此示例，代码排除了\
    \ USB 集线器，仅列出实际 USB 设备的名称。这也使示例能够展示用户空间应用程序可对内核对象执行的类型内省功能。为此，调用了函数 `IOObjectCopyClass()`，该函数以\
    \ CoreFoundation 字符串形式返回对象的类类型。匹配字典将包含所有对象，既是 `IOUSBDevice` 的实例，也是从 `IOUSBDevice`\
    \ 派生的类的实例，其中包括 `IOUSBHubDevice` 类。为了从列表中排除 USB 集线器设备，此示例将忽略类名不与字符串 `IOUSBDevice`\
    \ 完全匹配的任何对象。\n\n***代码清单 5-1.** 遍历所有已连接 USB 硬件设备的代码*\n\n```c\n#include <CoreFoundation/CoreFoundation.h>\n\
    #include <IOKit/IOKitLib.h>\n\nint main (int argc, const char * argv[])\n{\n \
    \       CFDictionaryRef         matchingDict = NULL;\n        io_iterator_t  \
    \         iter = 0;\n        io_service_t            service = 0;\n        kern_return_t\
    \           kr;\n\n        // 创建一个可查找任何 USB 设备的匹配字典。\n        matchingDict = IOServiceMatching(\"\
    IOUSBDevice\");\n\n        // 为所有匹配该字典的 I/O Registry 对象创建一个迭代器。\n        kr =\
    \ IOServiceGetMatchingServices(kIOMasterPortDefault, matchingDict, &iter);\n \
    \       if (kr != KERN_SUCCESS)\n                return -1;\n\n        // 遍历所有匹配的对象。\n\
    \        while ((service = IOIteratorNext(iter)) != 0)\n        {\n          \
    \      CFStringRef     className;\n                io_name_t       name;\n\n \
    \               // 列出所有 IOUSBDevice 对象，忽略继承自 IOUSBDevice 的对象。\n              \
    \  className = IOObjectCopyClass(service);\n                if (CFEqual(className,\
    \ CFSTR(\"IOUSBDevice\")) == true)\n                {\n                      \
    \  IORegistryEntryGetName(service, name);\n                        printf(\"Found\
    \ device with name: %s\\n\", name);\n                }\n                CFRelease(className);\n\
    \                IOObjectRelease(service);\n        }\n\n        // 释放迭代器。\n \
    \       IOObjectRelease(iter);\n\n        return 0;\n}\n```\n\n![images](img/square.jpg)\
    \ **注意** 函数 `IOServiceGetMatchingServices()` 保证会释放传入的匹配字典上的一个引用。这就是为什么 代码清单 5-1\
    \ 中的代码不需要对其创建的 `CFDictionaryRef` 调用 `CFRelease()` 的原因。\n"
- fmt: "[Listing 5-1](#Chapter05.html#list_5_1) uses a function named `IOServiceGetMatchingServices()`\
    \ to create a matching dictionary for kernel objects that the application is interested\
    \ in. The first parameter to the function `IOServiceGetMatchingServices()` is\
    \ a Mach port that is used for communicating between the user space process and\
    \ the I/O Kit. In Mac OS X 10.2 and later, a convenience macro named `kIOMasterPortDefault`\
    \ was introduced, although some of the Apple sample code still uses the pre-Mac\
    \ OS X 10.2 approach of calling the `IOMasterPort()` function to obtain the I/O\
    \ Kit's Mach port.\n\nOn a system such as Mac OS X, hardware devices can be plugged\
    \ into the system at any time. The problem with the approach that we used in the\
    \ previous section is that it requires the application to poll for a list of connected\
    \ devices. A better approach is to have the I/O Kit notify your application whenever\
    \ a device that you are interested in is connected to the computer. The I/O Kit\
    \ framework provides an alternative approach in which the application specifies\
    \ a matching dictionary and a callback function to be notified when an object\
    \ that meets the matching dictionary is added to the I/O Registry. As with similar\
    \ functions in Mac OS X, notifications from the I/O Kit framework are delivered\
    \ using the standard event dispatch mechanism known as a “run loop.”\n\nThe run\
    \ loop is the fundamental means by which a Mac OS X or iOS application is notified\
    \ of events from multiple sources without having to spend CPU time polling each\
    \ source. The run loop is a Core Foundation object that monitors multiple “run\
    \ loop sources.” Whenever any of them generates an event that requires processing,\
    \ the run loop dispatches the event to a registered callback function. Each thread\
    \ on Mac OS X contains a run loop, including the main thread. The event loop on\
    \ Mac OS X, which runs on the main thread, is simply a run loop that contains\
    \ sources for keyboard and mouse events. For example, in response to the user\
    \ clicking the mouse button, the main thread's run loop will awake and generate\
    \ a Cocoa mouse down event for the application window in which the user clicked.\n\
    \n[Listing 5-2](#Chapter05.html#list_5_2) demonstrates how a command line utility\
    \ can register to receive notifications whenever a USB device is connected to\
    \ the computer. You will notice that the same matching dictionary can be used\
    \ whether using a polling method or the notification callback.\n\n**Listing 5-2.**\
    \ Code To Watch for the Arrival of USB Devices\n\n```\n#include <CoreFoundation/CoreFoundation.h>\n\
    #include <IOKit/IOKitLib.h>\n\nint main (int argc, const char * argv[])\n{\n \
    \       CFDictionaryRef                 matchingDict = NULL;\n        io_iterator_t\
    \                   iter = 0;\n        IONotificationPortRef           notificationPort\
    \ = NULL;\n        CFRunLoopSourceRef              runLoopSource;\n        kern_return_t\
    \                   kr;\n\n        // Create a matching dictionary that will find\
    \ any USB device\n        matchingDict = IOServiceMatching(\"IOUSBDevice\");\n\
    \n        notificationPort = IONotificationPortCreate(kIOMasterPortDefault);\n\
    \        runLoopSource = IONotificationPortGetRunLoopSource(notificationPort);\n\
    \        CFRunLoopAddSource(CFRunLoopGetCurrent(), runLoopSource, kCFRunLoopDefaultMode);\n\
    \n        kr = IOServiceAddMatchingNotification(notificationPort, kIOFirstMatchNotification,\n\
    \             matchingDict, DeviceAdded, NULL, &iter);\n        DeviceAdded(NULL,\
    \ iter);\n\n        CFRunLoopRun();\n\n        IONotificationPortDestroy(notificationPort);\n\
    \n        // Release the iterator\n        IOObjectRelease(iter);\n\n        return\
    \ 0;\n}\n```\n\nTo create a notification callback for device and driver objects\
    \ that meet certain criteria, the code in [Listing 5-2](#Chapter05.html#list_5_2)\
    \ performs the following steps:\n\n1. A matching dictionary is created that describes\
    \ the properties of the device that the application is interested in.\n2. The\
    \ function `IONotificationPortCreate()` is called to set up the communication\
    \ channel through which the I/O Kit is able to deliver notification messages to\
    \ the user space application.\n3. Because we want to use a run loop to dispatch\
    \ notifications to our application, we create a run loop source to represent the\
    \ notification port and install that source on the current thread's run loop.\n\
    4. We then call `IOServiceAddMatchingNotification()` to associate the matching\
    \ dictionary with the notification port (and run loop source). This function allocates\
    \ and returns an iterator object, which plays an important role in the operation\
    \ of notification messages. Following the call to `IOServiceAddMatchingNotification()`,\
    \ the iterator contains all objects from the I/O Registry that match the matching\
    \ dictionary. The I/O Kit framework won't deliver notifications for these devices,\
    \ so we need to manually call our callback function, passing in the returned iterator.\
    \ It's also important to do this because, until the end of the iterator is reached\
    \ by calling `IOIteratorNext()`, no notifications will be delivered and the callback\
    \ function will not be called. Similarly, the device callback must run through\
    \ the iterator until the final object is reached. The caller must not release\
    \ the iterator until the notification callback is no longer needed. As with the\
    \ `IOServiceGetMatchingServices()` function, when `IOServiceAddMatchingNotification()`\
    \ is called, it will always decrement the reference count of the matching dictionary.\
    \ Therefore, if the caller requires the dictionary after installing the notification,\
    \ it should manually retain the object beforehand.\n5. Since this example is a\
    \ command line utility, we need to manually run the run loop by calling `CFRunLoopRun()`.\
    \ If this were a Cocoa-based application and we were installing the notification\
    \ into the main run loop, the run loop would be started for us by the `NSApplicationMain()`\
    \ function.\n6. Finally, when the application exits, we destroy the notification\
    \ port. This automatically removes the run loop source from the run loop into\
    \ which it was added and releases the iterator object.\n\nThe callback function\
    \ `DeviceAdded` is shown in [Listing 5-3](#Chapter05.html#list_5_3). You will\
    \ notice that it is identical to the code that we used in the polling implementation.\
    \ The iterator object that is passed to the callback function is the same object\
    \ that is returned from the initial call to `IOServiceAddMatchingNotification()`.\
    \ Because the same object is re-used for all devices that the notification informs\
    \ us of, it is important that the callback does not release the iterator object,\
    \ since the iterator must remain valid while the notification is installed.\n\n\
    **Listing 5-3.** Code To Watch for the Arrival of USB Devices\n\n```\nvoid DeviceAdded\
    \ (void* refCon, io_iterator_t iterator)\n{\n        io_service_t            service\
    \ = 0;\n\n        // Iterate over all matching objects.\n        while ((service\
    \ = IOIteratorNext(iterator)) != 0)\n        {\n                CFStringRef  \
    \   className;\n                io_name_t       name;\n\n                // List\
    \ all IOUSBDevice objects, ignoring objects that subclass IOUSBDevice.\n     \
    \           className = IOObjectCopyClass(service);\n                if (CFEqual(className,\
    \ CFSTR(\"IOUSBDevice\")) == true)\n                {\n                      \
    \  IORegistryEntryGetName(service, name);\n                        printf(\"Found\
    \ device with name: %s\\n\", name);\n                }\n                CFRelease(className);\n\
    \                IOObjectRelease(service);\n         }\n}\n```"
  raw: '[Listing 5-1](#Chapter05.html#list_5_1) uses a function named `IOServiceGetMatchingServices()`
    to create a matching dictionary for kernel objects that the application is interested
    in. The first parameter to the function `IOServiceGetMatchingServices()` is a
    Mach port that is used for communicating between the user space process and the
    I/O Kit. In Mac OS X 10.2 and later, a convenience macro named `kIOMasterPortDefault`
    was introduced, although some of the Apple sample code still uses the pre-Mac
    OS X 10.2 approach of calling the `IOMasterPort()` function to obtain the I/O
    Kit''s Mach port.


    On a system such as Mac OS X, hardware devices can be plugged into the system
    at any time. The problem with the approach that we used in the previous section
    is that it requires the application to poll for a list of connected devices. A
    better approach is to have the I/O Kit notify your application whenever a device
    that you are interested in is connected to the computer. The I/O Kit framework
    provides an alternative approach in which the application specifies a matching
    dictionary and a callback function to be notified when an object that meets the
    matching dictionary is added to the I/O Registry. As with similar functions in
    Mac OS X, notifications from the I/O Kit framework are delivered using the standard
    event dispatch mechanism known as a “run loop.”


    The run loop is the fundamental means by which a Mac OS X or iOS application is
    notified of events from multiple sources without having to spend CPU time polling
    each source. The run loop is a Core Foundation object that monitors multiple “run
    loop sources.” Whenever any of them generates an event that requires processing,
    the run loop dispatches the event to a registered callback function. Each thread
    on Mac OS X contains a run loop, including the main thread. The event loop on
    Mac OS X, which runs on the main thread, is simply a run loop that contains sources
    for keyboard and mouse events. For example, in response to the user clicking the
    mouse button, the main thread''s run loop will awake and generate a Cocoa mouse
    down event for the application window in which the user clicked.


    [Listing 5-2](#Chapter05.html#list_5_2) demonstrates how a command line utility
    can register to receive notifications whenever a USB device is connected to the
    computer. You will notice that the same matching dictionary can be used whether
    using a polling method or the notification callback.


    ***Listing 5-2.** Code To Watch for the Arrival of USB Devices*


    `#include <CoreFoundation/CoreFoundation.h>`

    `#include <IOKit/IOKitLib.h>`


    `int main (int argc, const char * argv[])`

    `{`

    `        CFDictionaryRef                 matchingDict = NULL;`

    `        io_iterator_t                   iter = 0;`

    `        IONotificationPortRef           notificationPort = NULL;`

    `        CFRunLoopSourceRef              runLoopSource;`

    `        kern_return_t                   kr;`


    `        // Create a matching dictionary that will find any USB device`

    `        matchingDict = IOServiceMatching("IOUSBDevice");`


    `        notificationPort = IONotificationPortCreate(kIOMasterPortDefault);`

    `        runLoopSource = IONotificationPortGetRunLoopSource(notificationPort);`

    `        CFRunLoopAddSource(CFRunLoopGetCurrent(), runLoopSource, kCFRunLoopDefaultMode);`


    `        kr = IOServiceAddMatchingNotification(notificationPort, kIOFirstMatchNotification,`

    `             matchingDict, DeviceAdded, NULL, &iter);`

    `        DeviceAdded(NULL, iter);`


    `        CFRunLoopRun();`


    `        IONotificationPortDestroy(notificationPort);`


    `        // Release the iterator`

    `        IOObjectRelease(iter);`


    `        return 0;`

    `}`


    To create a notification callback for device and driver objects that meet certain
    criteria, the code in [Listing 5-2](#Chapter05.html#list_5_2) performs the following
    steps:


    1.  A matching dictionary is created that describes the properties of the device
    that the application is interested in.

    2.  The function `IONotificationPortCreate()` is called to set up the communication
    channel through which the I/O Kit is able to deliver notification messages to
    the user space application.

    3.  Because we want to use a run loop to dispatch notifications to our application,
    we create a run loop source to represent the notification port and install that
    source on the current thread''s run loop.

    4.  We then call `IOServiceAddMatchingNotification()` to associate the matching
    dictionary with the notification port (and run loop source). This function allocates
    and returns an iterator object, which plays an important role in the operation
    of notification messages. Following the call to `IOServiceAddMatchingNotification()`,
    the iterator contains all objects from the I/O Registry that match the matching
    dictionary. The I/O Kit framework won''t deliver notifications for these devices,
    so we need to manually call our callback function, passing in the returned iterator.
    It''s also important to do this because, until the end of the iterator is reached
    by calling `IOIteratorNext()`, no notifications will be delivered and the callback
    function will not be called. Similarly, the device callback must run through the
    iterator until the final object is reached. The caller must not release the iterator
    until the notification callback is no longer needed. As with the `IOServiceGetMatchingServices()`
    function, when `IOServiceAddMatchingNotification()` is called, it will always
    decrement the reference count of the matching dictionary. Therefore, if the caller
    requires the dictionary after installing the notification, it should manually
    retain the object beforehand.

    5.  Since this example is a command line utility, we need to manually run the
    run loop by calling `CFRunLoopRun()`. If this were a Cocoa-based application and
    we were installing the notification into the main run loop, the run loop would
    be started for us by the `NSApplicationMain()` function.

    6.  Finally, when the application exits, we destroy the notification port. This
    automatically removes the run loop source from the run loop into which it was
    added and releases the iterator object.


    The callback function `DeviceAdded` is shown in [Listing 5-3](#Chapter05.html#list_5_3).
    You will notice that it is identical to the code that we used in the polling implementation.
    The iterator object that is passed to the callback function is the same object
    that is returned from the initial call to `IOServiceAddMatchingNotification()`.
    Because the same object is re-used for all devices that the notification informs
    us of, it is important that the callback does not release the iterator object,
    since the iterator must remain valid while the notification is installed.


    ***Listing 5-3.** Code To Watch for the Arrival of USB Devices*


    `void DeviceAdded (void* refCon, io_iterator_t iterator)`

    `{`

    `        io_service_t            service = 0;`


    `        // Iterate over all matching objects.`

    `        while ((service = IOIteratorNext(iterator)) != 0)`

    `        {`

    `                CFStringRef     className;`

    `                io_name_t       name;`


    `                // List all IOUSBDevice objects, ignoring objects that subclass
    IOUSBDevice.`

    `                className = IOObjectCopyClass(service);`

    `                if (CFEqual(className, CFSTR("IOUSBDevice")) == true)`

    `                {`

    `                        IORegistryEntryGetName(service, name);`

    `                        printf("Found device with name: %s\n", name);`

    `                }`

    `                CFRelease(className);`

    `                IOObjectRelease(service);`

    `         }`

    `}`'
  trans: "\n清单 5-1 使用名为 `IOServiceGetMatchingServices()` 的函数，为应用程序感兴趣的**内核对象**创建匹配字典。函数\
    \ `IOServiceGetMatchingServices()` 的第一个参数是一个**Mach 端口**，用于用户空间进程与 I/O Kit 之间的通信。从\
    \ Mac OS X 10.2 开始，引入了一个名为 `kIOMasterPortDefault` 的便捷宏，不过部分 Apple 示例代码仍沿用 Mac\
    \ OS X 10.2 之前的方式，即调用 `IOMasterPort()` 函数来获取 I/O Kit 的 Mach 端口。\n\n在像 Mac OS X\
    \ 这样的系统中，硬件设备可以随时插入系统。我们在上一节中使用的方法存在一个问题：它要求应用程序轮询已连接设备的列表。更好的方法是让 I/O Kit 在您感兴趣的设备连接到计算机时通知您的应用程序。I/O\
    \ Kit 框架提供了一种替代方案：应用程序指定一个匹配字典和一个回调函数，当有符合匹配字典的对象被添加到 I/O Registry 时，该回调函数会被通知。与\
    \ Mac OS X 中的类似函数一样，来自 I/O Kit 框架的通知通过标准事件分发机制（称为**运行循环**）进行传递。\n\n运行循环是 Mac OS\
    \ X 或 iOS 应用程序从多个来源接收事件通知的基本手段，而无需消耗 CPU 时间去轮询每个来源。运行循环是一个 Core Foundation 对象，监视多个“运行循环源”。每当其中任何一个源生成需要处理的事件时，运行循环便会将该事件分派给已注册的回调函数。Mac\
    \ OS X 上的每个线程都包含一个运行循环，包括主线程。Mac OS X 上运行在主线程的事件循环，本质上就是一个运行循环，其中包含了键盘和鼠标事件的源。例如，当用户点击鼠标按钮时，主线程的运行循环会唤醒，并在用户点击的应用程序窗口中生成一个\
    \ Cocoa 鼠标按下事件。\n\n清单 5-2 演示了命令行工具如何注册以在 USB 设备连接到计算机时接收通知。您会注意到，无论是使用轮询方法还是通知回调，都可以使用相同的匹配字典。\n\
    \n**清单 5-2. 监视 USB 设备接入的代码**\n\n```\n#include <CoreFoundation/CoreFoundation.h>\n\
    #include <IOKit/IOKitLib.h>\n\nint main (int argc, const char * argv[])\n{\n \
    \       CFDictionaryRef                 matchingDict = NULL;\n        io_iterator_t\
    \                   iter = 0;\n        IONotificationPortRef           notificationPort\
    \ = NULL;\n        CFRunLoopSourceRef              runLoopSource;\n        kern_return_t\
    \                   kr;\n\n        // 创建一个匹配字典，用于查找任何 USB 设备\n        matchingDict\
    \ = IOServiceMatching(\"IOUSBDevice\");\n\n        notificationPort = IONotificationPortCreate(kIOMasterPortDefault);\n\
    \        runLoopSource = IONotificationPortGetRunLoopSource(notificationPort);\n\
    \        CFRunLoopAddSource(CFRunLoopGetCurrent(), runLoopSource, kCFRunLoopDefaultMode);\n\
    \n        kr = IOServiceAddMatchingNotification(notificationPort, kIOFirstMatchNotification,\n\
    \             matchingDict, DeviceAdded, NULL, &iter);\n        DeviceAdded(NULL,\
    \ iter);\n\n        CFRunLoopRun();\n\n        IONotificationPortDestroy(notificationPort);\n\
    \n        // 释放迭代器\n        IOObjectRelease(iter);\n\n        return 0;\n}\n```\n\
    \n为了创建针对符合特定条件的设备和驱动对象的通知回调，清单 5-2 中的代码执行了以下步骤：\n\n1. 创建一个匹配字典，描述应用程序感兴趣的设备的属性。\n\
    2. 调用函数 `IONotificationPortCreate()` 来建立通信通道，I/O Kit 通过该通道能够向用户空间应用程序传递通知消息。\n\
    3. 由于我们希望使用运行循环将通知分派到应用程序，因此我们创建一个运行循环源来表示通知端口，并将该源安装到当前线程的运行循环上。\n4. 然后，我们调用\
    \ `IOServiceAddMatchingNotification()` 将匹配字典与通知端口（以及运行循环源）关联起来。该函数分配并返回一个迭代器对象，该对象在通知消息的操作中扮演着重要角色。调用\
    \ `IOServiceAddMatchingNotification()` 之后，迭代器包含了与匹配字典匹配的所有 I/O Registry 对象。I/O\
    \ Kit 框架不会为这些设备发送通知，因此我们需要手动调用回调函数，并将返回的迭代器传递给它。这样做也很重要，因为只有通过调用 `IOIteratorNext()`\
    \ 遍历到迭代器的末尾，通知才会被送达，回调函数才会被调用。同样，设备回调必须遍历迭代器直到最后一个对象。在不再需要通知回调之前，调用者不得释放迭代器。与\
    \ `IOServiceGetMatchingServices()` 函数类似，当调用 `IOServiceAddMatchingNotification()`\
    \ 时，它总是会减少匹配字典的引用计数。因此，如果调用者在安装通知后还需要使用该字典，则应事先手动保留该对象。\n5. 由于本例是一个命令行工具，我们需要通过调用\
    \ `CFRunLoopRun()` 手动运行运行循环。如果这是一个基于 Cocoa 的应用程序，并且我们将通知安装到主运行循环中，那么 `NSApplicationMain()`\
    \ 函数会为我们启动运行循环。\n6. 最后，当应用程序退出时，我们销毁通知端口。这会自动将运行循环源从其加入的运行循环中移除，并释放迭代器对象。\n\n\
    回调函数 `DeviceAdded` 如清单 5-3 所示。您会注意到它与我们在轮询实现中使用的代码完全相同。传递给回调函数的迭代器对象与最初调用 `IOServiceAddMatchingNotification()`\
    \ 时返回的对象是同一个。由于该对象会被重复用于通知告知我们的所有设备，因此回调函数不能释放该迭代器对象，这一点非常重要，因为在通知安装期间，迭代器必须保持有效。\n\
    \n**清单 5-3. 监视 USB 设备接入的代码**\n\n```\nvoid DeviceAdded (void* refCon, io_iterator_t\
    \ iterator)\n{\n        io_service_t            service = 0;\n\n        // 遍历所有匹配的对象。\n\
    \        while ((service = IOIteratorNext(iterator)) != 0)\n        {\n      \
    \          CFStringRef     className;\n                io_name_t       name;\n\
    \n                // 列出所有 IOUSBDevice 对象，忽略继承了 IOUSBDevice 的子类对象。\n          \
    \      className = IOObjectCopyClass(service);\n                if (CFEqual(className,\
    \ CFSTR(\"IOUSBDevice\")) == true)\n                {\n                      \
    \  IORegistryEntryGetName(service, name);\n                        printf(\"Found\
    \ device with name: %s\\n\", name);\n                }\n                CFRelease(className);\n\
    \                IOObjectRelease(service);\n         }\n}\n```\n"
- fmt: "![images](images/square.jpg) **Tip** A common cause of problems with device\
    \ notification callbacks is failing to empty the iterator by calling `IOIteratorNext()`\
    \ until `0` is returned. Once the end of the iterator is reached, the iterator\
    \ is re-armed and the callback is enabled.\n\nFor hardware devices that have a\
    \ kernel driver, user space applications will control the hardware by sending\
    \ control requests to the driver rather than interacting with the hardware device\
    \ directly. In this case, the application isn't so much interested in the arrival\
    \ of a particular hardware device as it is interested in when the driver for the\
    \ hardware has loaded. This can be performed by creating a dictionary that matches\
    \ the class name of the driver using the function `IOServiceMatching()`. For example,\
    \ to create a dictionary that will match against the sample I/O Kit driver that\
    \ was developed in [Chapter 4](#Chapter04.html#ch4), an application would use\
    \ the following code:\n\n`IOServiceMatching(\"com_osxkernel_driver_IOKitTest\"\
    );`\n\nThe reverse-DNS naming scheme ensures that the driver's class name is unique,\
    \ which means that any driver that matches the matching dictionary is guaranteed\
    \ to be our driver.\n\n### Observing Device Removal\n\nAs well as watching for\
    \ the arrival of devices, an application may wish to watch for a device being\
    \ removed from the system, such as a USB device being unplugged. Unlike device\
    \ arrival messages, which are delivered for any device that meets the criteria\
    \ described by a matching dictionary, a device removal message is delivered only\
    \ for a particular device that the application has registered an interest in.\
    \ An application will typically register an interest in all devices that it has\
    \ opened, since the application will want to respond to the removal of a device\
    \ that it is accessing.\n\nIn our previous code examples, such as [Listing 5-3](#Chapter05.html#list_5_3),\
    \ we obtained a reference to a driver object, read properties from the driver,\
    \ and then released the driver object, all within the one function. It is far\
    \ more common that an application will hold on to the driver object beyond the\
    \ device arrival callback function, perhaps only releasing it when the application\
    \ exits or the device is removed.\n\n![images](images/square.jpg) **Note** In\
    \ our previous examples, we were able to use the local variables of a function\
    \ to hold the driver object, since the driver was released before we returned\
    \ from the function. However, if an application wishes to use the driver object\
    \ after returning from the function, it will need to allocate a structure on the\
    \ heap to hold the driver state.\n\nHaving obtained a reference to a driver instance,\
    \ an application can register to receive notifications when the driver's state\
    \ changes, including when the driver has terminated in response to its hardware\
    \ device being removed. This notification callback is installed by calling the\
    \ function named `IOServiceAddInterestNotification()`, which is defined in the\
    \ I/O Kit framework. As with the notification for device arrival, the application\
    \ needs to provide a port on which the I/O Kit will signal the application when\
    \ the driver's state has changed. This can be created with the function `IONotificationPortCreate()`,\
    \ as was shown in [Listing 5-2](#Chapter05.html#list_5_2). If the application\
    \ has already created a notification port for device arrival events, it can share\
    \ that same notification port and its corresponding run loop source to receive\
    \ device removal notifications. This is done by passing the existing notification\
    \ port to the function `IOServiceAddInterestNotification()`.\n\nWhen the application\
    \ receives a notification that a driver instance has terminated, it should release\
    \ its reference to that driver and take any action that is necessary to inform\
    \ the user that the device has been removed.\n\n[Listing 5-4](#Chapter05.html#list_5_4)\
    \ demonstrates a modification to the `DeviceAdded()` function from [Listing 5-3](#Chapter05.html#list_5_3)\
    \ that creates a structure to represent an instance of a driver within the application\
    \ and then installs a callback to receive notifications from the driver (such\
    \ as driver termination).\n\n**Listing 5-4.** Code Snippet Demonstrating How an\
    \ Application Can Install a Callback Function To Receive a Notification When a\
    \ Driver Terminates\n\n```\n#include <IOKit/IOMessage.h>\n\n// Structure to describe\
    \ a driver instance.\ntypedef struct {\n        io_service_t    service;\n   \
    \     io_object_t     notification;\n} MyDriverData;\n\n// Notification port used\
    \ for both device arrival and driver state changes.\nIONotificationPortRef   gNotificationPort\
    \ = NULL;\n\nvoid DeviceAdded (void* refCon, io_iterator_t iterator)\n{\n    \
    \    io_service_t            service = 0;\n\n        // Iterate over all matching\
    \ objects.\n        while ((service = IOIteratorNext(iterator)) != 0)\n      \
    \  {\n                MyDriverData*   myDriverData;\n                kern_return_t\
    \   kr;\n\n                // Allocate a structure to hold the driver instance.\n\
    \                myDriverData = (MyDriverData*)malloc(sizeof(MyDriverData));\n\
