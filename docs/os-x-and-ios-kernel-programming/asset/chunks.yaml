    \       {\n              // Compute the new state\n              newState = (m_currentState\
    \ & ~mask) | (state & mask);\n              // Determine the mask of changed state\
    \ bits\n              deltaState = newState ^ m_currentState;\n              //\
    \ Set the new state\n              m_currentState = newState;\n```\n"
