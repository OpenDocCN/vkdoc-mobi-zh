    In the writable regions you can see the data segment of `a.out` and `libSystem`.
    These segments contain variables defined by the program/library. Obviously, these
    can be modified, so each process needs a copy of the data segment for a shared
    library, however it is COW, so no overhead is necessary until a process makes
    modifications to the mapping.


    ![images](images/square.jpg) **Tip** If you want to inspect the virtual memory
    map of a system process, such as `launchd`, you need to run `vmmap` with `sudo`,
    as by default your user will only be able to inspect its own processes.


    ##### Pagers


    Virtual memory allows a process to have a virtual address space larger than the
    available physical memory, and it is possible for tasks running on the system
    to be combined, consuming more than the available amount of memory. The mechanism
    that makes this possible is known as a *pager.* The pager controls the transfer
    of memory pages to and from the system memory (RAM), to a secondary backing store,
    usually a hard drive. When a task that has high memory requirements needs to run,
    the *pager* can temporarily transfer (page out) memory pages belonging to inactive
    tasks to the backing store, thereby freeing up enough memory to allow the demanding
    task to execute. Similarly, if a process is found to be largely idle, the system
    can opt to page out the task''s memory to free memory for current or future tasks.
    When an application runs, and it tries to access memory that has been paged out,
    an exception known as a page fault will occur, which is also the exception that
    occurs if a task tries to access an invalid memory address. When the page fault
    occurs, the kernel will attempt to transfer back (page in) the page corresponding
    to the memory address, and if the page cannot be transferred back, it will be
    treated as an invalid memory access, and the task will be aborted. The XNU kernel
    supports three different pagers:


    *   **Default Pager:** Performs traditional paging and transfers between the main
    memory and a swap file on the system hard drive (`/var/vm/swapfile*`).

    *   **Vnode Pager:** Ties in with the Unified Buffer Cache (UBC) used by file
    systems and is used to cache files in memory.

    *   **Device Pager:** Used for managing memory mappings of hardware devices, such
    as PCI devices that map registers into memory. Mapped memory is commonly used
    by I/O Kit drivers, and I/O Kit provides abstractions for working with such memory.


    Which pager is in use is more or less transparent to higher-level parts, such
    as the VM object. Each VM object has an associated *memory object,* which provides
    (via ports) an interface to the current pager.


    ##### Memory Allocation in Mach


    Some fundamental routines for memory allocation in Mach are:


    `kern_return_t kmem_alloc(vm_map_t map, vm_offset_t *addrp, vm_size_t  size);`

    `kern_return_t kmem_alloc_contig(vm_map_t map, vm_offset_t *addrp,`

    `                                vm_size_t size, vm_offset_t mask, int flags);`

    `void kmem_free(vm_map_t map, vm_offset_t addr, vm_size_t size);`


    `kmem_alloc()` provides the main interface to obtaining memory in Mach. In order
    to allocate memory, you must provide a VM map. For most work within the kernel,
    `kernel_map` is defined and points to the VM map of `kernel_task`. The second
    variant, `kmem_alloc_contig()`, attempts to allocate memory that is physically
    contiguous, as opposed to the former, which allocates virtually contiguous memory.
    Apple recommends against making this type of allocation, as there is a significant
    penalty incurred in searching for free contiguous blocks. Mach also provides `kmem_alloc_aligned()
    function`, which allocates memory aligned to a power of two, as well as a few
    other variants that are less commonly used. The `kmem_free()` function is provided
    to free allocated memory. You have to take care to pass the same VM map as you
    used when you allocated, as well as the size of the original allocation.'
  trans: "\n### 检查任务的地址空间\n\n`vmmap` 命令行工具允许你检查进程的虚拟内存映射及其 VM 映射条目。它能清晰地展示内存区域如何映射到任务的\
    \ VM 地址空间中。`vmmap` 命令以一个进程标识符（PID）作为参数。以下展示了针对一个简单的 Hello World C 应用（`a.out`，该应用会打印一条消息然后进入休眠）的\
    \ PID 执行 `vmmap` 后的输出：\n\n---\n\n`====` **`进程 46874 的不可写区域`**\n`__PAGEZERO   \
    \        00000000-00001000   [     4K] ---/--- SM=NUL  /Users/ole/a.out`\n`__TEXT\
    \               00001000-00002000   [     4K] r-x/rwx SM=COW  /Users/ole/a.out`\n\
    `__LINKEDIT           00003000-00004000   [     4K] r--/rwx SM=COW  /Users/ole/a.out`\n\
    `MALLOC guard page    00004000-00005000   [     4K] ---/rwx SM=NUL`\n`MALLOC metadata\
    \     00021000-00022000    [     4K] r--/rwx SM=PRV`\n`__TEXT               8fe00000-8fe42000\
    \   [   264K] r-x/rwx SM=COW  /usr/lib/dyld`\n`__LINKEDIT          8fe70000-8fe84000\
    \    [    80K] r--/rwx SM=COW  /usr/lib/dyld`\n`__TEXT              9703b000-971e3000\
    \    [  1696K] r-x/r-x SM=COW  /usr/lib/libSystem.B.dylib`\n`STACK GUARD     \
    \    bc000000-bf800000    [  56.0M] ---/rwx SM=NUL  stack guard for thread 0`\n\
    **`==== 进程 46874 的可写区域`**\n`__DATA              00002000-00003000    [     4K]\
    \ rw-/rwx SM=PRV  /Users/ole/a.out`\n`MALLOC metadata     00015000-00020000  \
    \  [    44K] rw-/rwx SM=PRV`\n`   MALLOC_TINY         00100000-00200000 [  1024K]\
    \ rw-/rwx SM=PRV  DefaultMallocZone_0x5000`\n`MALLOC_SMALL        00800000-01000000\
    \    [  8192K] rw-/rwx SM=PRV  DefaultMallocZone_0x5000`\n`__DATA            \
    \  8fe42000-8fe6f000    [   180K] rw-/rwx SM=PRV  /usr/lib/dyld`\n`__IMPORT  \
    \          8fe6f000-8fe70000    [     4K] rwx/rwx SM=COW  /usr/lib/dyld`\n`shared\
    \ pmap         a0800000-a093a000    [  1256K] rw-/rwx SM=COW`\n`__DATA       \
    \       a093a000-a0952000    [    96K] rw-/rwx SM=COW  /usr/lib/libSystem.B.dylib`\n\
    `shared pmap         a0952000-a0a00000    [   696K] rw-/rwx SM=COW`\n`Stack  \
    \             bf800000-bffff000    [  8188K] rw-/rwx SM=ZER  thread 0`\n`Stack\
    \               bffff000-c0000000    [     4K] rw-/rwx SM=COW  thread 0`\n\n---\n\
    \n为了可读性，结果已被精简。输出分为不可写区域和可写区域。如你所见，前者包括零页映射，它是只读的，如果应用程序尝试写入内存地址 0-4096（十进制 4096\
    \ = 十六进制 `0x1000`），就会产生异常。这就是为什么当你试图解引用空指针时，应用程序会崩溃。下一个映射条目是应用程序的代码段，其中包含应用程序的可执行代码。你会看到代码段的共享模式（SM）被标记为\
    \ COW，这意味着如果此进程产生一个子进程，它将从父进程继承此映射，从而避免复制，直到该段中的页面被修改。\n\n除了 `a.out` 程序本身的代码段之外，你还会看到\
    \ `libSystem.B.dylib` 的映射。在 Mac OS X 和 iOS 上，`libSystem` 实现了标准 C 库、POSIX 线程 API\
    \ 以及其他系统 API。`a.out` 进程从它的父进程 `/sbin/launchd`（所有用户空间进程的父进程）继承了 `libSystem` 的映射。这确保了该库只被加载一次，从而节省内存并提高应用程序的启动速度，因为从辅助存储器（如硬盘）获取库通常很慢。\n\
    \n在可写区域中，你可以看到 `a.out` 和 `libSystem` 的数据段。这些段包含由程序/库定义的变量。显然，这些变量可以被修改，因此每个进程都需要共享库数据段的一个副本，但它是\
    \ COW 的，所以直到进程对映射进行修改时，才产生开销。\n\n![images](img/square.jpg)**提示** 如果你想检查系统进程（如\
    \ `launchd`）的虚拟内存映射，你需要使用 `sudo` 运行 `vmmap`，因为默认情况下，你的用户只能检查自己的进程。\n\n### 分页器\n\
    \n虚拟内存允许进程拥有比可用物理内存更大的虚拟地址空间，并且系统上运行的任务可以组合起来，消耗超过可用内存量的内存。实现这一点的机制被称为*分页器*。分页器控制内存页在系统内存（RAM）和辅助后备存储（通常是硬盘）之间传输。当一个内存需求高的任务需要运行时，*分页器*可以暂时将属于非活动任务的内存页传输（换出）到后备存储，从而释放足够的内存，使高需求任务得以执行。类似地，如果发现某个进程大部分时间处于空闲状态，系统可以选择换出该任务的内存，以释放内存供当前或未来的任务使用。当应用程序运行时，如果它试图访问已被换出的内存，就会发生一种称为缺页异常的异常，这也是当任务试图访问无效内存地址时发生的异常。当缺页异常发生时，内核将尝试传输回（换入）与内存地址对应的页，如果该页无法被传输回，则将被视为无效的内存访问，并且该任务将被中止。XNU\
    \ 内核支持三种不同的分页器：\n\n*   **默认分页器：**执行传统分页，在主内存和系统硬盘上的交换文件（`/var/vm/swapfile*`）之间传输数据。\n\
    *   **Vnode 分页器：**与文件系统使用的统一缓冲区缓存（UBC）结合，用于在内存中缓存文件。\n*   **设备分页器：**用于管理硬件设备的内存映射，例如将寄存器映射到内存中的\
    \ PCI 设备。映射内存通常被 I/O Kit 驱动程序使用，并且 I/O Kit 提供了用于处理此类内存的抽象层。\n\n对于更上层的部分（如 VM 对象）来说，使用哪个分页器或多或少是透明的。每个\
    \ VM 对象都有一个关联的*内存对象*，它（通过端口）提供了与当前分页器的接口。\n\n### Mach 中的内存分配\n\nMach 中一些基本的内存分配例程如下：\n\
    \n```\nkern_return_t kmem_alloc(vm_map_t map, vm_offset_t *addrp, vm_size_t  size);\n\
    kern_return_t kmem_alloc_contig(vm_map_t map, vm_offset_t *addrp,\n          \
    \                      vm_size_t size, vm_offset_t mask, int flags);\nvoid kmem_free(vm_map_t\
    \ map, vm_offset_t addr, vm_size_t size);\n```\n\n`kmem_alloc()` 提供了在 Mach 中获取内存的主要接口。为了分配内存，你必须提供一个\
    \ VM 映射。对于内核中的大多数工作，`kernel_map` 被定义并指向 `kernel_task` 的 VM 映射。第二种变体 `kmem_alloc_contig()`\
    \ 尝试分配物理上连续的内存，而前者则分配虚拟上连续的内存。Apple 不建议进行这种分配，因为搜索空闲连续块会产生显著的性能开销。Mach 还提供了 `kmem_alloc_aligned()`\
    \ 函数，该函数分配对齐到 2 的幂的内存，以及其他一些不太常用的变体。`kmem_free()` 函数用于释放已分配的内存。你必须注意传入与分配时相同的\
    \ VM 映射，以及原始分配的大小。\n"
- fmt: '### The BSD Layer


    Unlike Mach, which only provides a few fundamental services, the BSD layer sits
    between Mach and the user applications and implements many core OS functions,
    building on the services provided by Mach. In OS X and iOS, the BSD layer is running
    with the processor in privileged mode and not as a user task, as originally intended
    by the Mach project. The layer therefore does not have memory protection, and
    runs in the same address space as Mach and I/O Kit. The BSD layer refers to a
    portion of the kernel derived from the FreeBSD 5 operating system, and it is not
    a complete system in itself, but rather a portion of code originating from it.


    The BSD layer provides services such as process management, system calls, file
    systems, and networking. [Table 2-6](#Chapter02.html#tab_2_6) shows a brief overview
    of the services provided by the BSD layer.


    ![images](images/t0206.jpg)


    The BSD layer provides abstractions on top of the services provided by Mach. For
    example, its process management and memory management is implemented on top of
    Mach services.


    #### System Calls


    When an application needs services from the file system, or wishes to access the
    network, it needs to issue a system call to the kernel. The BSD layer implements
    all system calls. When a system call handler executes, the kernel context switches
    from user mode to kernel mode to service a request by the application, such as
    to read a file. This API is referred to as the `syscall` API, and it is the traditional
    Unix API for calling functions in the kernel from user space. There are hundreds
    of system calls available, ranging from calls related to process control, such
    as `fork()` and `execve()`, or file management calls, such as `open()`, `close()`,
    `read()`, and `write()`.


    The BSD layer also provides the `ioctl()` function (itself a system call), which
    is short for I/O control, and this is typically used to send commands to device
    drivers. The `sysctl()` function is provided to set or get a variety of kernel
    parameters, including but not limited to the scheduler, memory, and networking
    subsystems.


    ![images](images/square.jpg) **Tip** Available system calls are defined in `/usr/include/sys/syscall.h`.


    Mach traps are mechanisms similar to system calls, used for crossing the kernel/user
    space boundary. Unlike system calls that provide direct services to an application,
    the Mach traps are used to carry IPC messages from a user space client to a kernel
    server.


    #### Networking


    Networking is a major subsystem of the BSD portion of XNU. BSD handles most aspects
    of networking, such as the details of socket communication and the implementation
    of protocols like TCP/IP, except for low-level communication with actual hardware
    devices, which is typically handled by an I/O Kit driver. The I/O Kit network
    driver will interface with the network stack that is responsible for handling
    received buffers from the networking device, inspect them, and ensure they make
    their way down to the initiator, for example your web browser. Similarly, the
    BSD networking stack will accept outgoing data from an application, format the
    data in a packet, then route or dispatch it to the appropriate network interface.
    BSD also implements the IPFW firewall, which will filter packets to/from the computer
    according to policy set by the system administrator.


    The BSD networking layer supports a wide range of network and transport layer
    protocols, including IPv4 and IPv6, TCP, and UDP. At the higher level we find
    support for BOOTP, DHCP, and ICMP, among others. Other networking-related functions
    include routing, bridging, and Network Address Translation (NAT), as well as device
    level packet filtering with Berkeley Packet Filter (BPF).


    **NETWORK KERNEL EXTENSIONS (NKE)**


    The Network Kernel Extensions KPI (kernel programming interface) is a mechanism
    that allows various parts of the networking stack to be extended. NKEs allow new
    protocols to be defined, and for hooks or filters to be inserted at various levels
    in the networking stack. For example, it would be possible to create a filter
    that intercepted TCP connections to a certain address by a certain application
    or user. It is also possible to temporarily block network packets, or modify them
    before transmission to a higher/lower level. NKEs originate from Apple and are
    not part of the traditional BSD networking stack, but, due to their nature, they
    are now intimately tied to it. NKEs are discussed in [Chapter 13](#Chapter13.html#ch13).


    #### File Systems


    The kernel has inbuilt support for a range of different file systems, as shown
    in [Table 2-7](#Chapter02.html#tab_2_7). The primary file system used by Mac OS
    X and iOS is HFS+. It was developed as a replacement for the Mac OS file system
    HFS.


    ![images](images/t0207.jpg)


    HFS+ gained support for journaling in Mac OS X 10.2.2. Journaling improves the
    reliability of a file system by recording transactions in a *journal* prior to
    carrying them out. This makes the file system resilient to events such as a power
    failure or a crash of the kernel, as the data can be replayed after reboot in
    order to bring the file system to a consistent state.


    HFS+ supports very large files, up to 8 EiB in size (1 Exbibyte = 2^(60) bytes),
    which is also the maximum possible volume size. The file system has full support
    for Unicode characters in file names and is case insensitive by default. Support
    for both Unix style file permissions and access control lists (ACLs) exists.


    #### The Virtual File System


    The virtual file system, or VFS, provides an abstraction over specific file systems,
    such as HFS+ and AFP, and makes it possible for applications to access them using
    a single consistent interface. The VFS allows support for new file systems to
    be easily added as kernel extensions through the VFS Kernel Programming Interface
    (KPI), without the OS as a whole knowing anything about its implementation. The
    fundamental data structure of the VFS is the `vnode`. The `vnode` is how both
    a file and a directory are represented in the kernel. A `vnode` structure exists
    for every file active in the kernel.'
