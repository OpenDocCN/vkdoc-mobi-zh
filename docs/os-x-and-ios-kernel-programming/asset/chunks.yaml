    Virtual memory addresses are only available to the CPU and are meaningless to
    a hardware device, which requires physical addresses. In order to communicate
    with hardware outside the CPU, we need to translate virtual memory from the kernel
    or a user space task into physical addresses the device can use to access information
    from RAM. This task is not always trivial as virtual memory is often fragmented.
    Let''s look at an example, a 128 KB virtual memory buffer we want to send to a
    hardware device. The buffer can in the worst case consist of 32 individual 4 KB
    pages scattered anywhere throughout the system memory. Because of this, we cannot
    simply translate the address of the first byte of the buffer and tell the device
    the buffer is 128 KB long; we need to work out how many fragments the buffer consists
    of and instead send a list/array of addresses and lengths. This is often referred
    to as a scatter/gather table or list. The `IOMemoryDescriptor` and classes derived
    from it provide two methods to help with physical address translation, as follows.


    *   `getPhysicalAddress()`: Translates the address of the first byte to its physical
    address. This is mainly useful if the buffer is known to be contiguous.

    *   `getPhysicalSegment()`: Translates the address at a specified offset into
    the buffer and returns the length of the physical segment from that offset. For
    a contiguous buffer, this will always be the size of the buffer minus the offset.


    ![images](images/square.jpg) **Caution** This method can cause a kernel panic
    if used improperly. See the following discussion for correct usage.


    Note that there are two versions of `getPhysicalSegment()` depending on if you
    are using a 64-bit kernel or 32-bit kernel, as follows:


    `#ifdef __LP64__`

    `    virtual addr64_t getPhysicalSegment( IOByteCount   offset,`

    `                                         IOByteCount * length,`

    `                                         IOOptionBits  options = 0 ) = 0;`

    `#else /* !__LP64__ */`

    `    virtual addr64_t getPhysicalSegment( IOByteCount   offset,`

    `                                         IOByteCount * length,`

    `                                         IOOptionBits  options );`

    `#endif /* !__LP64__ */`


    For the 32-bit version (!__LP64__) the options argument must specify: `kIOMemoryMapperNone`
    or the method will panic for addresses over the 4 GB mark. A more flexible, safer
    and easier approach to memory translation is to use `IODMACommand` class, which
    works in conjunction with `IOMemoryDescriptor`. We discuss `IODMACommand` and
    this topic in much more detail in [Chapter 9](#Chapter09.html#ch9).


    ### Summary


    In this chapter, we have discussed:


    *   Types of memory addresses in use by the kernel. The kernel typically works
    with virtual addresses both for its own threads as well as those of user space
    tasks. Physical memory addresses are used between the CPU and memory, as well
    as hardware devices.

    *   The significance of 32-bit and 64-bit memory addressing and modes.

    *   How memory allocation is performed across the different kernel subsystems,
    Mach, BSD, and I/O Kit. In I/O Kit, the preferred mechanism is to use the `IOMalloc*()`
    functions or the `IOBufferMemoryDescriptor`.

    *   How the `IOMemoryDescriptor` and related subclasses are used by many parts
    of the I/O Kit to manage and describe memory buffers. The `IOBufferMemoryDescriptor`
    is one such subclass, which in addition to providing a memory descriptor also
    allocates memory in various forms, with alignment or even physically contiguous
    memory.

    *   How the `IOMemoryMap` class is used to manage memory mappings and allows the
    kernel to map a user space buffer into its virtual address space so memory can
    be manipulated by the kernel.

    *   How the `IOUserClient` class provides a useful method, `clientMemoryForType()`,
    which will handle the details of mapping a kernel buffer into user space.

    *   How the `IOMemoryDescriptor` provides methods such as `getPhysicalSegment()`
    that allow mapping of virtual memory addresses to physical addresses.


    ## C H A P T E R  7


    ## Synchronization and Threading


    As we have seen throughout this book, the role of a driver is to make the functionality
    that is provided by a hardware device available to the operating system and to
    user applications. This means that the code inside a driver may be called from
    any number of running applications at any time, depending on when an application
    wishes to request the services of the hardware device. In handling these requests,
    the driver runs in the thread context of the application that made the control
    call. In addition to these requests, the hardware itself can require servicing
    and may generate interrupts at arbitrary times that the driver must respond to.
    The end result for the driver developer is that driver code runs in a complex
    multithreaded environment, even without the driver creating any additional threads
    of its own.


    The computer hardware on which a driver will execute will likely have multiple
    CPU cores. So, in addition to the driver code being preempted by an interrupt
    from the device or a request from a thread in another application, it''s possible
    for your driver to be running on multiple cores simultaneously. This applies even
    to the interrupt service routine for your driver, which can run in parallel to
    the non-interrupt code of your driver on another CPU core.


    As is the case with multithreaded application code, it''s important that a driver
    provides synchronized access to its internal structures and any data that could
    potentially be read or written from multiple threads. How a driver provides the
    arbitration between multiple threads that are attempting to access its hardware
    is dependent on the type of device. Some hardware can only be accessed by one
    client at a time. For example, a serial port device will grant exclusive access
    to one user process at a time; the driver will make sure that an attempt by another
    process to open the serial port will be rejected. On the other hand, a disk device
    can expect to receive requests from multiple processes and, since the hardware
    itself can handle only one request at a time, it is the responsibility of the
    driver to queue the incoming requests and issue them to the disk device in a serial
    manner.


    The I/O Kit provides several different mechanisms that a driver can use to implement
    a scheme that provides arbitrated access to its hardware while ensuring that the
    driver''s internal structures remain valid in a multithreaded environment. This
    chapter assumes that you have a basic understanding of code synchronization and
    have previously written multithreaded application code.'
  trans: "\n# 物理地址映射\n\n虚拟内存地址仅供 CPU 使用，对硬件设备毫无意义，硬件设备需要的是物理地址。为了与 CPU 外部的硬件通信，我们需要将内核或用户空间任务的虚拟内存转换为物理地址，以便设备利用物理地址从\
    \ RAM 中访问信息。这项任务并不简单，因为虚拟内存通常是非连续（碎片化）的。来看一个例子：我们有一个 128KB 的虚拟内存缓冲区，想要发送给硬件设备。在最坏情况下，该缓冲区可能由\
    \ 32 个分散在系统内存各处的独立 4KB 页面组成。因此，我们不能简单地转换缓冲区第一个字节的地址，然后告诉设备该缓冲区长度为 128KB；而需要确定缓冲区由多少个碎片组成，并发送一个地址与长度的列表/数组。这通常被称为分散/聚集表或列表。`IOMemoryDescriptor`及其派生类提供了两种帮助进行物理地址转换的方法，如下所示：\n\
    \n* `getPhysicalAddress()`：将第一个字节的地址转换为其物理地址。这主要适用于已知缓冲区是连续的情况。\n* `getPhysicalSegment()`：将缓冲区中指定偏移量处的地址进行转换，并返回从该偏移量开始的物理段长度。对于连续缓冲区，该值始终为缓冲区大小减去偏移量。\n\
    \n![images](img/square.jpg) **注意**：如果使用不当，此方法可能导致内核恐慌。请参见后面的讨论以了解正确用法。\n\n请注意，根据您使用的是\
    \ 64 位内核还是 32 位内核，`getPhysicalSegment()`有两个版本，如下所示：\n\n```\n#ifdef __LP64__\n\
    \    virtual addr64_t getPhysicalSegment( IOByteCount   offset,\n            \
    \                             IOByteCount * length,\n                        \
    \                 IOOptionBits  options = 0 ) = 0;\n#else /* !__LP64__ */\n  \
    \  virtual addr64_t getPhysicalSegment( IOByteCount   offset,\n              \
    \                           IOByteCount * length,\n                          \
    \               IOOptionBits  options );\n#endif /* !__LP64__ */\n```\n\n对于 32\
    \ 位版本（`!__LP64__`），`options`参数必须指定：`kIOMapperNone`，否则该方法在地址超过 4GB 标记时会引发恐慌。一种更灵活、更安全且更简单的内存转换方法是使用`IODMACommand`类，该类与`IOMemoryDescriptor`协同工作。我们在第\
    \ 9 章中将更详细地讨论`IODMACommand`及相关主题。\n\n## 总结\n\n在本章中，我们讨论了：\n\n* 内核使用的内存地址类型。内核通常使用虚拟地址，无论是针对自身的线程还是用户空间任务的线程。物理内存地址则用于\
    \ CPU 与内存之间，以及硬件设备之间。\n* 32 位和 64 位内存寻址及模式的重要性。\n* 内存分配在不同内核子系统（Mach、BSD 和 I/O\
    \ Kit）中的执行方式。在 I/O Kit 中，首选机制是使用`IOMalloc*()`函数或`IOBufferMemoryDescriptor`。\n\
    * I/O Kit 的许多部分如何使用`IOMemoryDescriptor`及其相关子类来管理和描述内存缓冲区。`IOBufferMemoryDescriptor`就是这样一个子类，它不仅提供内存描述符，还以各种形式分配内存（支持对齐甚至物理连续内存）。\n\
    * `IOMemoryMap`类如何用于管理内存映射，并允许内核将用户空间缓冲区映射到其虚拟地址空间，以便内核操作内存。\n* `IOUserClient`类如何提供有用的方法`clientMemoryForType()`，该方法处理将内核缓冲区映射到用户空间的细节。\n\
    * `IOMemoryDescriptor`如何提供诸如`getPhysicalSegment()`之类的方法，支持将虚拟内存地址映射到物理地址。\n\n\
    ## 第 7 章：同步与线程化\n\n正如本书中所述，驱动程序的作用是将硬件设备提供的功能开放给操作系统和用户应用程序使用。这意味着驱动程序内部的代码可能会在任何时候被任意数量的运行中的应用所调用，具体取决于应用何时希望请求硬件设备的服务。在处理这些请求时，驱动程序在发出控制调用的应用的线程上下文中运行。除了这些请求之外，硬件本身也可能需要服务，并可能在任意时刻产生中断，驱动程序必须对这些中断做出响应。最终，对于驱动程序开发者而言，即使驱动程序本身不创建任何额外线程，其代码也会运行在复杂的多线程环境中。\n\
    \n驱动程序将要执行的计算机硬件可能包含多个 CPU 核心。因此，除了驱动程序代码可能被设备中断或其他应用的线程请求抢占外，你的驱动程序还有可能同时在多个核心上运行。这同样适用于驱动程序的中断服务例程，它可能在同一时间与另一个\
    \ CPU 核心上的非中断驱动程序代码并行运行。\n\n与多线程应用程序代码的情况一样，驱动程序必须为其内部结构以及可能被多个线程读取或写入的任何数据提供同步访问。驱动程序如何在多个尝试访问其硬件的线程之间提供仲裁，取决于设备的类型。某些硬件一次只能由一个客户端访问。例如，串行端口设备一次只授予一个用户进程独占访问权；驱动程序会确保另一个进程尝试打开串行端口的请求被拒绝。另一方面，磁盘设备可能期望接收来自多个进程的请求，由于硬件本身一次只能处理一个请求，因此驱动程序有责任对传入的请求进行排队，并以串行方式将它们发送给磁盘设备。\n\
    \nI/O Kit 提供了几种不同的机制，驱动程序可以使用这些机制来实现一个方案，在确保驱动程序内部结构在多线程环境中保持有效的同时，为其硬件提供仲裁访问。本章假设你具备代码同步的基本知识，并且之前编写过多线程应用程序代码。\n"
- fmt: "# Synchronization Primitives\n\nSynchronization problems occur when code that\
    \ is executing on two or more threads attempts to access a common resource or\
    \ structure. A common synchronization problem for I/O Kit drivers arises when\
    \ a driver needs to access its instance variables, since these are shared between\
    \ all of the threads that the driver is executing. To give a concrete example,\
    \ let's consider an actual example from the I/O Kit, namely, the `OSObject` base\
    \ class's implementation of reference counting.\n\nThe `OSObject` class is the\
    \ base class for all objects in the I/O Kit, and one of its roles is to maintain\
    \ a reference count for each object instance and to release an object when its\
    \ reference count is decremented to 0. A simplified version of the `OSObject`\
    \ implementation, without the synchronization provided by the actual implementation,\
    \ is shown in [Listing 7-1](#Chapter07.html#list_7_1).\n\n**Listing 7-1.** A Possible\
    \ Implementation of Object Reference Counting\n\n```\nvoid    Object::retain ()\n\
    {\n        retainCount += 1;               // An instance variable defined as\
    \ an int\n}\n\nvoid    Object::release ()\n{\n        retainCount -= 1;\n    \
    \    if (retainCount == 0)\n                this->free();\n}\n```\n\nAlthough\
    \ the preceding code looks correct and will run perfectly well if all calls to\
    \ `retain()` and `release()` are made from a single thread, the code is not thread-safe\
    \ and may fail if multiple threads were to simultaneously call `retain()` and\
    \ `release()` for the same object. To understand the problem, it is necessary\
    \ to examine the compiler output for the previous code. In this case, the assembler\
    \ instructions that follow were generated when the implementation was compiled\
    \ for the 64-bit Intel architecture under a Debug build. The code for `retain()`\
    \ contains the following sequence of instructions:\n\n```\n        mov     eax,\
    \ retainCount          ; Load retainCount into CPU register EAX\n        add \
    \    eax, 0x1                  ; Increment value in EAX\n        mov     retainCount,\
    \ eax          ; Write value in EAX to retainCount\n```\n\nAnd the code for `release()`\
    \ contains the following sequence of instructions:\n\n```\n        mov    eax,\
    \ retainCount           ; Load retainCount into CPU register EAX\n        sub\
    \    eax, 0x1                   ; Decrement value in EAX\n        mov    retainCount,\
    \ eax           ; Write value in EAX to retainCount\n        mov    eax, retainCount\
    \           ; Load retainCount into CPU register EAX\n        cmp    eax, 0x0\
    \                   ; Determine whether the value of EAX is 0\n        jne   \
    \ skipFree                   ; If EAX is not zero, jump over the next instruction\n\
    \        call   free()                     ; Otherwise, call the free() method\n\
    skipFree:\n        …\n```\n\nThe cause of the problem in a multithreaded environment\
    \ is that the C code both to increment and to decrement the instance variable\
    \ `retainCount` compiles to three CPU instructions: the value held by the instance\
    \ variable `retainCount` is loaded from memory into a CPU register, the value\
    \ of the CPU register is either incremented or decremented, and the result is\
    \ then written back to memory. Let's see what can happen if two threads were to\
    \ call `retain()` simultaneously for the same object. For simplicity, let us assume\
    \ that the code is executing on a machine with a single CPU core and that the\
    \ operating system's scheduler preempts the first thread at the point where the\
    \ initial `mov` instruction has been executed.\n\n![image](images/p121-01.jpg)\n\
    \nIn this scenario, thread 1 will read the value of `retainCount` from memory\
    \ into the EAX register. At this point, the operating system's scheduler preempts\
    \ thread 1 and switches to thread 2 (after saving the state of thread 1's CPU\
    \ registers). Thread 2 now runs and will read the same value of `retainCount`\
    \ into the EAX register as was read by thread 1. It then increments the value\
    \ and writes the incremented value back to memory. The operating system scheduler\
    \ then preempts thread 2 and switches execution back to thread 1 after restoring\
    \ the state of thread 1's saved CPU registers. Thread 1 now continues executing\
    \ from where it left off, incrementing the *original* value of `retainCount`,\
    \ and writing the result back to memory. Following this, `retainCount` has only\
    \ increased in value by 1, even though the `retain()` method was called twice.\n\
    \nNote that this problem will only show up under specific conditions: Either the\
    \ `retainCount` instance variable must be modified by two threads, with one preempting\
    \ the other in the way illustrated, or the two threads must be running simultaneously\
    \ on two CPU cores. A problem such as this, in which the result of executing code\
    \ depends on the timing and the order in which the code runs, is known as a race\
    \ condition. Race conditions can lead to problems that are very difficult to debug\
    \ since the problem by its nature is timing-dependent and therefore may not occur\
    \ every time the code is run. In fact, the code may appear to run perfectly fine\
    \ during testing and it will only become apparent that the driver has problems\
    \ when reports come in from users.\n\nAs well as being difficult to reproduce,\
    \ race conditions can be very difficult to diagnose when they do cause problems.\
    \ Take the example of the race condition outlined previously in which an object's\
    \ retain count is incremented by 1, even though two calls to `retain()` were made.\
    \ This wouldn't cause any immediate problems and the driver would continue to\
    \ function as if nothing were wrong until much later, when the object is released.\
    \ Since the object was retained twice, the calling code should be expected to\
    \ release the object twice. However, since the value of the retain count is one\
    \ less than the value it should be, the object will be destroyed while the driver\
    \ still holds one reference to it. This means that, at some later time, the driver\
    \ will try to access the object that it *thinks* it holds a reference to. But\
    \ that object will have been destroyed and the driver will crash with an access\
    \ to invalid memory. Note that the code that ends up crashing may be in a completely\
    \ different function to the function that contains the race condition. As a result,\
    \ tracing the cause of the bug back to `retain()` and `release()` will involve\
    \ considerable sleuth work."
  raw: '### Synchronization Primitives


    Synchronization problems occur when code that is executing on two or more threads
    attempts to access a common resource or structure. A common synchronization problem
    for I/O Kit drivers arises when a driver needs to access its instance variables,
    since these are shared between all of the threads that the driver is executing.
    To give a concrete example, let''s consider an actual example from the I/O Kit,
    namely, the `OSObject` base class''s implementation of reference counting.


    The `OSObject` class is the base class for all objects in the I/O Kit, and one
    of its roles is to maintain a reference count for each object instance and to
    release an object when its reference count is decremented to 0\. A simplified
    version of the `OSObject` implementation, without the synchronization provided
    by the actual implementation, is shown in [Listing 7-1](#Chapter07.html#list_7_1).


    ***Listing 7-1.** A Possible Implementation of Object Reference Counting*


    `void    Object::retain ()`

    `{`

    `        retainCount += 1;               // An instance variable defined as an
    int`

    `}`


    `void    Object::release ()`

    `{`

    `        retainCount -= 1;`

    `        if (retainCount == 0)`

    `                this->free();`

    `}`


    Although the preceding code looks correct and will run perfectly well if all calls
    to `retain()` and `release()` are made from a single thread, the code is not thread-safe
    and may fail if multiple threads were to simultaneously call `retain()` and `release()`
    for the same object. To understand the problem, it is necessary to examine the
    compiler output for the previous code. In this case, the assembler instructions
    that follow were generated when the implementation was compiled for the 64-bit
    Intel architecture under a Debug build. The code for `retain()` contains the following
    sequence of instructions:


    `        mov     eax, retainCount          ; Load retainCount into CPU register
    EAX`

    `        add     eax, 0x1                  ; Increment value in EAX`

    `        mov     retainCount, eax          ; Write value in EAX to retainCount`


    And the code for `release()` contains the following sequence of instructions:


    `        mov    eax, retainCount           ; Load retainCount into CPU register
    EAX`

    `        sub    eax, 0x1                   ; Decrement value in EAX`

    `        mov    retainCount, eax           ; Write value in EAX to retainCount`

    `        mov    eax, retainCount           ; Load retainCount into CPU register
    EAX`

    `        cmp    eax, 0x0                   ; Determine whether the value of EAX
    is 0`

    `        jne    skipFree                   ; If EAX is not zero, jump over the
    next instruction`

    `        call   free()                     ; Otherwise, call the free() method`

    `skipFree:`

    `        …`


    The cause of the problem in a multithreaded environment is that the C code both
    to increment and to decrement the instance variable `retainCount` compiles to
    three CPU instructions: the value held by the instance variable `retainCount`
    is loaded from memory into a CPU register, the value of the CPU register is either
    incremented or decremented, and the result is then written back to memory. Let''s
    see what can happen if two threads were to call `retain()` simultaneously for
    the same object. For simplicity, let us assume that the code is executing on a
    machine with a single CPU core and that the operating system''s scheduler preempts
    the first thread at the point where the initial `mov` instruction has been executed.


    ![image](images/p121-01.jpg)


    In this scenario, thread 1 will read the value of `retainCount` from memory into
    the EAX register. At this point, the operating system''s scheduler preempts thread
    1 and switches to thread 2 (after saving the state of thread 1''s CPU registers).
    Thread 2 now runs and will read the same value of `retainCount` into the EAX register
    as was read by thread 1\. It then increments the value and writes the incremented
    value back to memory. The operating system scheduler then preempts thread 2 and
    switches execution back to thread 1 after restoring the state of thread 1''s saved
    CPU registers. Thread 1 now continues executing from where it left off, incrementing
    the *original* value of `retainCount`, and writing the result back to memory.
    Following this, `retainCount` has only increased in value by 1, even though the
    `retain()` method was called twice.


    Note that this problem will only show up under specific conditions: Either the
    `retainCount` instance variable must be modified by two threads, with one preempting
    the other in the way illustrated, or the two threads must be running simultaneously
    on two CPU cores. A problem such as this, in which the result of executing code
    depends on the timing and the order in which the code runs, is known as a race
    condition. Race conditions can lead to problems that are very difficult to debug
    since the problem by its nature is timing-dependent and therefore may not occur
    every time the code is run. In fact, the code may appear to run perfectly fine
    during testing and it will only become apparent that the driver has problems when
    reports come in from users.


    As well as being difficult to reproduce, race conditions can be very difficult
    to diagnose when they do cause problems. Take the example of the race condition
    outlined previously in which an object''s retain count is incremented by 1, even
    though two calls to `retain()` were made. This wouldn''t cause any immediate problems
    and the driver would continue to function as if nothing were wrong until much
    later, when the object is released. Since the object was retained twice, the calling
    code should be expected to release the object twice. However, since the value
    of the retain count is one less than the value it should be, the object will be
    destroyed while the driver still holds one reference to it. This means that, at
    some later time, the driver will try to access the object that it *thinks* it
    holds a reference to. But that object will have been destroyed and the driver
    will crash with an access to invalid memory. Note that the code that ends up crashing
    may be in a completely different function to the function that contains the race
    condition. As a result, tracing the cause of the bug back to `retain()` and `release()`
    will involve considerable sleuth work.'
  trans: "\n# 同步原语\n\n当两个或更多线程上执行的代码尝试访问公共资源或结构时，就会出现同步问题。I/O Kit 驱动程序常见的同步问题出现在驱动程序需要访问其实例变量时，因为这些变量在驱动程序执行的所有线程之间共享。为了给出具体示例，我们来考虑\
    \ I/O Kit 中的一个实际案例，即 `OSObject` 基类的引用计数实现。\n\n`OSObject` 类是 I/O Kit 中所有对象的基类，其职责之一是维护每个对象实例的引用计数，并在引用计数减至\
    \ 0 时释放该对象。简化版的 `OSObject` 实现（未包含实际实现提供的同步机制）如列表 7-1 所示。\n\n**列表 7-1.** 对象引用计数的可能实现\n\
    \n```\nvoid    Object::retain ()\n{\n        retainCount += 1;               //\
    \ 一个定义类型为 int 的实例变量\n}\n\nvoid    Object::release ()\n{\n        retainCount -=\
    \ 1;\n        if (retainCount == 0)\n                this->free();\n}\n```\n\n\
    虽然上述代码看起来正确，且如果所有对 `retain()` 和 `release()` 的调用均来自单个线程，它会完美运行，但该代码并非线程安全。如果多个线程同时为同一个对象调用\
    \ `retain()` 和 `release()`，则可能失败。要理解这个问题，有必要检查前序代码的编译器输出。在此示例中，当该实现以调试版（Debug\
    \ build）为 64 位 Intel 架构编译时，生成了以下汇编指令。`retain()` 的代码包含以下指令序列：\n\n```\n        mov\
    \     eax, retainCount          ; 将 retainCount 加载到 CPU 寄存器 EAX 中\n        add\
    \     eax, 0x1                  ; 对 EAX 中的值执行加 1 操作\n        mov     retainCount,\
    \ eax          ; 将 EAX 中的值写回到 retainCount\n```\n\n而 `release()` 的代码包含以下指令序列：\n\
    \n```\n        mov    eax, retainCount           ; 将 retainCount 加载到 CPU 寄存器 EAX\
    \ 中\n        sub    eax, 0x1                   ; 对 EAX 中的值执行减 1 操作\n        mov\
    \    retainCount, eax           ; 将 EAX 中的值写回到 retainCount\n        mov    eax,\
    \ retainCount           ; 将 retainCount 加载到 CPU 寄存器 EAX 中\n        cmp    eax,\
    \ 0x0                   ; 判断 EAX 的值是否为 0\n        jne    skipFree            \
    \       ; 如果 EAX 不为零，则跳转到下一个指令\n        call   free()                     ; 否则，调用\
    \ free() 方法\nskipFree:\n        …\n```\n\n多线程环境中出现问题的原因在于，用于递增和递减实例变量 `retainCount`\
    \ 的 C 代码会编译为三条 CPU 指令：实例变量 `retainCount` 的值从内存加载到 CPU 寄存器，CPU 寄存器的值被递增或递减，然后将结果写回内存。让我们看看如果两个线程同时为同一个对象调用\
    \ `retain()` 会发生什么。为简单起见，我们假设代码在单 CPU 核心的机器上执行，并且操作系统调度器在初始 `mov` 指令执行完毕时抢占第一个线程。\n\
    \n![image](img/p121-01.jpg)\n\n在此场景中，线程 1 会将 `retainCount` 的值从内存读取到 EAX 寄存器。此时，操作系统调度器抢占线程\
    \ 1 并切换到线程 2（在保存线程 1 的 CPU 寄存器状态之后）。线程 2 现在运行，它会将 `retainCount` 的相同值（与线程 1 读取的值相同）读取到\
    \ EAX 寄存器。然后它递增该值，并将递增后的值写回内存。接着，操作系统调度器抢占线程 2，并在恢复线程 1 已保存的 CPU 寄存器状态后，将执行切换回线程\
    \ 1。线程 1 现在从离开的地方继续执行，递增 `retainCount` 的*原始*值，并将结果写回内存。此后，即使 `retain()` 方法被调用了两次，`retainCount`\
    \ 的值也只增加了 1。\n\n请注意，这个问题只会在特定条件下出现：要么 `retainCount` 实例变量必须由两个线程修改，其中一个线程以上述方式抢占另一个；要么这两个线程必须在两个\
    \ CPU 核心上同时运行。这种代码执行结果依赖于运行时机和顺序的问题，被称为竞态条件。竞态条件可能导致非常难以调试的问题，因为该问题本质上依赖于时机，因此不一定每次运行代码都会出现。实际上，代码在测试期间可能看似完美运行，只有在收到用户报告时才会发现驱动程序存在问题。\n\
    \n除了难以复现之外，竞态条件在确实引发问题时，也极难诊断。以之前概述的竞态条件为例：即使调用了两次 `retain()`，对象的保留计数也只增加了 1。这不会立即引发任何问题，驱动程序会继续正常运行，直到很久以后对象被释放时才会暴露问题。由于对象被保留了两次，调用代码理应对该对象释放两次。然而，由于保留计数的值比应有的值少\
    \ 1，对象将在驱动程序仍持有其一个引用时被销毁。这意味着，在稍后的某个时间点，驱动程序会尝试访问它*认为*自己持有引用的对象。但该对象已被销毁，驱动程序将因访问无效内存而崩溃。请注意，最终导致崩溃的代码可能与包含竞态条件的函数完全不同。因此，将错误的根源追溯回\
    \ `retain()` 和 `release()` 将涉及大量的侦破工作。\n"
- fmt: "# Atomic Operations\n\nSince the race condition in the previous example was\
    \ caused by the compiler generating a sequence of three instructions to increment\
    \ and decrement the instance variable `retainCount`, one solution is to replace\
    \ the compiler output from the sequence load-modify-store with a single instruction\
    \ that performs an equivalent operation. In this way, there is no chance for the\
    \ operation to be interrupted when execution is preempted by another thread. In\
    \ reality, however, it may not always be possible to replace an operation with\
    \ a single instruction. Instead, we use a sequence of instructions that behave\
    \ as if they *were* a single instruction. This is referred to as an “atomic” operation\
    \ because the result of the operation is the same as if the instruction sequence\
    \ had executed as a single, indivisible group.\n\nThe implementation of an atomic\
    \ operation requires support from the CPU. For example, the Intel CPU used in\
    \ Macintosh computers provides an instruction to atomically add one value to another\
    \ value in memory. However, this alone is not enough to make the operation atomic\
    \ in a multiprocessor environment. So the Intel instruction set provides a `LOCK`\
    \ prefix that prevents any other CPU in the system from accessing memory while\
    \ the instruction is executing. Since the implementation of atomic operations\
    \ relies on support that is specific to the CPU architecture, iOS devices, which\
    \ use the ARM instruction set, require a different implementation for each atomic\
    \ operation.\n\nTo make it easy to access atomic operations in driver code, the\
    \ I/O Kit includes a number of functions that provide an atomic implementation\
    \ of basic operations, such as integer addition, incrementing and decrementing\
    \ a value, and bitwise operations. These functions are listed in [Table 7-1](#Chapter07.html#tab_7_1),\
    \ which are defined in the header file `<libkern/OSAtomic.h>`.\n\n![image](images/t0701.jpg)\n\
    \n![image](images/t0701a.jpg)\n\nWith these functions at our disposal, we are\
    \ now in a position to provide an implementation of `retain()` and `release()`\
    \ that avoids the race condition that was present in the previous example. This\
    \ is shown in [Listing 7-2](#Chapter07.html#list_7_2), which assumes that the\
    \ instance variable `retainCount` is a 32-bit integer.\n\n**Listing 7-2.** An\
    \ Implementation of Object Reference Counting in a Multithreaded Environment\n\
    \n```\nvoid    Object::retain ()\n{\n        OSIncrementAtomic(&retainCount);\n\
    }\n\nvoid    Object::release ()\n{\n        uint32_t                originalValue;\n\
    \n        originalValue = OSDecrementAtomic(&retainCount);\n        if (originalValue\
    \ == 1)\n                this->free();\n}\n```\n\nIf we go back and examine the\
    \ original implementation in [Listing 7-1](#Chapter07.html#list_7_1) and the corresponding\
    \ compiler output for the `release()` method, we can see that the code actually\
    \ contained two race conditions. The conditional call to `free()` occurs when\
    \ the value of `retainCount` has been decremented to 0. However, since the compiled\
    \ code reloads the value of `retainCount` from memory before testing its value\
    \ against 0, it's possible that two calls to `release()` both read the value 0\
    \ and the `free()` method is called twice for the object, which will likely result\
    \ in a crash. To illustrate how this could occur, assume that one thread executing\
    \ `release()` has decremented the `retainCount` from 2 to 1 and has written the\
    \ decremented value back to memory. Also assume that, before it can reload the\
    \ value of `retainCount` from memory and test whether its value is 0, the thread\
    \ is preempted. Another thread now has a chance to run and, if it were to execute\
    \ `release()`, the `retainCount` would be decremented from 1 to 0 and the object\
    \ would be destroyed. When execution returns to the original thread, it will reload\
    \ the value of `retainCount`, find that it is 0, and destroy the object a second\
    \ time.\n\nThis race condition is avoided in [Listing 7-2](#Chapter07.html#list_7_2)\
    \ by using the value returned by `OSDecrementAtomic()` to determine when the final\
    \ reference count has been released. The function `OSDecrementAtomic()` returns\
    \ the original value of its parameter before it was decremented. We know that\
    \ if the original value was 1, the value of `retainCount` has now been decremented\
    \ to 0 and the object can safely be destroyed.\n\nOne group of atomic operations\
    \ that deserves special mention is the compare-and-swap family of functions. The\
    \ compare-and-swap operation writes a value to a memory address but, importantly,\
    \ the write will only take place if the value that is being overwritten is equal\
    \ to some expected value that is provided by the caller. The result of the operation\
    \ is a Boolean value that indicates whether the write succeeded. Importantly,\
    \ for the purposes of synchronization, the entire operation is performed atomically.\n\
    \nThe compare and swap function can be used to build more complex atomic operations.\
    \ For example, suppose we wish to implement a function to perform a bitwise AND\
    \ followed by a bitwise OR, with the overall operation being atomic. Clearly,\
    \ we cannot simply call `OSBitAndAtomic()` followed by `OSBitOrAtomic()` because\
    \ there is nothing to prevent the execution from being preempted between the two\
    \ functions. With the `OSCompareAndSwap()` function at our disposal, we can implement\
    \ a function that atomically performs a bitwise AND followed by a bitwise OR as\
    \ follows:\n\n```\nuint32_t        AtomicBitAndOr (uint32_t andMask, uint32_t\
    \ orMask, volatile uint32_t* address)\n{\n        uint32_t        oldValue;\n\
    \        uint32_t        newValue;\n\n        do {\n                oldValue =\
    \ *address;\n                newValue = oldValue & andMask;\n                newValue\
    \ = newValue | orMask;\n        } while (OSCompareAndSwap(oldValue, newValue,\
    \ address) == false);\n\n        return oldValue;\n}\n```\n\nYou will note that\
    \ we have no synchronization at all while we perform the two bitwise operations.\
    \ The reason that this implementation works and is atomic is because it uses the\
    \ `OSCompareAndSwap()` function to ensure that the value at `address` hasn't changed\
    \ from the original value on which we based our calculation of the new value to\
    \ be written. If another thread had modified the value at `address` while this\
    \ function was executing, then the `OSCompareAndSwap()` function would return\
    \ false and would not perform the write. As a result, we would have to go back\
    \ to the beginning of the loop and repeat the entire bitwise operation after re-reading\
    \ the value at `address`. On this next attempt, we hope to have better luck in\
    \ performing the operation without another thread modifying the value at `address`\
    \ underneath us, although we will continue retrying until we successfully write\
    \ the result to memory.\n\n![images](images/square.jpg) **Note** All atomic operations,\
    \ such as `OSAddAtomic()`, `OSIncrementAtomic()`, and `OSBitOrAtomic()` can be\
    \ implemented using only `OSCompareAndSwap()`. In fact, a number of atomic functions\
    \ provided by the libkern library are implemented this way, including all bitwise\
    \ atomic operations and the 8-bit and 16-bit variations of each operation, which\
    \ perform a compare and swap on the full 32-bit word containing the value being\
    \ modified."
  raw: '### Atomic Operations


    Since the race condition in the previous example was caused by the compiler generating
    a sequence of three instructions to increment and decrement the instance variable
    `retainCount`, one solution is to replace the compiler output from the sequence
    load-modify-store with a single instruction that performs an equivalent operation.
    In this way, there is no chance for the operation to be interrupted when execution
    is preempted by another thread. In reality, however, it may not always be possible
    to replace an operation with a single instruction. Instead, we use a sequence
    of instructions that behave as if they *were* a single instruction. This is referred
    to as an “atomic” operation because the result of the operation is the same as
    if the instruction sequence had executed as a single, indivisible group.


    The implementation of an atomic operation requires support from the CPU. For example,
    the Intel CPU used in Macintosh computers provides an instruction to atomically
    add one value to another value in memory. However, this alone is not enough to
    make the operation atomic in a multiprocessor environment. So the Intel instruction
    set provides a LOCK prefix that prevents any other CPU in the system from accessing
    memory while the instruction is executing. Since the implementation of atomic
    operations relies on support that is specific to the CPU architecture, iOS devices,
    which use the ARM instruction set, require a different implementation for each
    atomic operation.


    To make it easy to access atomic operations in driver code, the I/O Kit includes
    a number of functions that provide an atomic implementation of basic operations,
    such as integer addition, incrementing and decrementing a value, and bitwise operations.
    These functions are listed in [Table 7-1](#Chapter07.html#tab_7_1), which are
    defined in the header file `<libkern/OSAtomic.h>`.


    ![image](images/t0701.jpg)


    ![image](images/t0701a.jpg)


    With these functions at our disposal, we are now in a position to provide an implementation
    of `retain()` and `release()` that avoids the race condition that was present
    in the previous example. This is shown in [Listing 7-2](#Chapter07.html#list_7_2),
    which assumes that the instance variable `retainCount` is a 32-bit integer.


    ***Listing 7-2.** An Implementation of Object Reference Counting in a Multithreaded
    Environment*


    `void    Object::retain ()`

    `{`

    `        OSIncrementAtomic(&retainCount);`

    `}`


    `void    Object::release ()`

    `{`

    `        uint32_t                originalValue;`


    `        originalValue = OSDecrementAtomic(&retainCount);`

    `        if (originalValue == 1)`

    `                this->free();`

    `}`


    If we go back and examine the original implementation in [Listing 7-1](#Chapter07.html#list_7_1)
    and the corresponding compiler output for the `release()` method, we can see that
    the code actually contained two race conditions. The conditional call to `free()`
    occurs when the value of `retainCount` has been decremented to 0\. However, since
    the compiled code reloads the value of `retainCount` from memory before testing
    its value against 0, it''s possible that two calls to `release()` both read the
    value 0 and the `free()` method is called twice for the object, which will likely
    result in a crash. To illustrate how this could occur, assume that one thread
    executing `release()` has decremented the `retainCount` from 2 to 1 and has written
    the decremented value back to memory. Also assume that, before it can reload the
    value of `retainCount` from memory and test whether its value is 0, the thread
    is preempted. Another thread now has a chance to run and, if it were to execute
    `release()`, the `retainCount` would be decremented from 1 to 0 and the object
    would be destroyed. When execution returns to the original thread, it will reload
    the value of `retainCount`, find that it is 0, and destroy the object a second
    time.


    This race condition is avoided in [Listing 7-2](#Chapter07.html#list_7_2) by using
    the value returned by `OSDecrementAtomic()` to determine when the final reference
    count has been released. The function `OSDecrementAtomic()` returns the original
    value of its parameter before it was decremented. We know that if the original
    value was 1, the value of `retainCount` has now been decremented to 0 and the
    object can safely be destroyed.


    One group of atomic operations that deserves special mention is the compare-and-swap
    family of functions. The compare-and-swap operation writes a value to a memory
    address but, importantly, the write will only take place if the value that is
    being overwritten is equal to some expected value that is provided by the caller.
    The result of the operation is a Boolean value that indicates whether the write
    succeeded. Importantly, for the purposes of synchronization, the entire operation
    is performed atomically.


    The compare and swap function can be used to build more complex atomic operations.
    For example, suppose we wish to implement a function to perform a bitwise AND
    followed by a bitwise OR, with the overall operation being atomic. Clearly, we
    cannot simply call `OSBitAndAtomic()` followed by `OSBitOrAtomic()` because there
    is nothing to prevent the execution from being preempted between the two functions.
    With the `OSCompareAndSwap()` function at our disposal, we can implement a function
    that atomically performs a bitwise AND followed by a bitwise OR as follows:


    `uint32_t        AtomicBitAndOr (uint32_t andMask, uint32_t orMask, volatile uint32_t*
    address)`

    `{`

    `        uint32_t        oldValue;`

    `        uint32_t        newValue;`


    `        do {`

    `                oldValue = *address;`

    `                newValue = oldValue & andMask;`

    `                newValue = newValue | orMask;`

    `        } while (OSCompareAndSwap(oldValue, newValue, address) == false);`


    `        return oldValue;`

    `}`


    You will note that we have no synchronization at all while we perform the two
    bitwise operations. The reason that this implementation works and is atomic is
    because it uses the `OSCompareAndSwap()` function to ensure that the value at
    `address` hasn''t changed from the original value on which we based our calculation
    of the new value to be written. If another thread had modified the value at `address`
    while this function was executing, then the `OSCompareAndSwap()` function would
    return false and would not perform the write. As a result, we would have to go
    back to the beginning of the loop and repeat the entire bitwise operation after
    re-reading the value at `address`. On this next attempt, we hope to have better
    luck in performing the operation without another thread modifying the value at
    `address` underneath us, although we will continue retrying until we successfully
    write the result to memory.


    ![images](images/square.jpg) **Note** All atomic operations, such as `OSAddAtomic()`,
    `OSIncrementAtomic()`, and `OSBitOrAtomic()` can be implemented using only `OSCompareAndSwap()`.
    In fact, a number of atomic functions provided by the libkern library are implemented
    this way, including all bitwise atomic operations and the 8-bit and 16-bit variations
    of each operation, which perform a compare and swap on the full 32-bit word containing
    the value being modified.'
  trans: "\n# 原子操作\n\n由于前一个示例中的竞态条件是由编译器生成三条指令序列来递增和递减实例变量 `retainCount` 导致的，一种解决方案是将编译器输出的加载-修改-存储序列替换为执行等效操作的单个指令。这样，操作被另一个线程抢占执行时就没有机会被中断。然而，在现实中，用一个指令替换一个操作并不总是可行的。相反，我们使用一组行为*如同*单个指令的指令序列。这被称为“原子”操作，因为操作的结果与该指令序列作为一个不可分割的整体执行的结果相同。\n\
    \n原子操作的实现需要 CPU 的支持。例如，Macintosh 计算机中使用的 Intel CPU 提供了一条指令，可以原子地将一个值加到内存中的另一个值上。然而，仅此一项不足以保证该操作在多处理器环境中具有原子性。因此，Intel\
    \ 指令集提供了一个 `LOCK` 前缀，它能在指令执行期间阻止系统中的任何其他 CPU 访问内存。由于原子操作的实现依赖于特定于 CPU 架构的支持，使用\
    \ ARM 指令集的 iOS 设备需要为每个原子操作提供不同的实现。\n\n为了便于在驱动程序代码中访问原子操作，I/O Kit 包含了许多函数，它们提供了基本操作的原子实现，例如整数加法、递增和递减值以及按位运算。这些函数列于表\
    \ 7-1 中，它们定义在头文件 `<libkern/OSAtomic.h>` 中。\n\n![image](img/t0701.jpg)\n\n![image](img/t0701a.jpg)\n\
    \n有了这些函数，我们现在可以提供一个 `retain()` 和 `release()` 的实现，以规避前一个示例中出现的竞态条件。这如代码清单 7-2 所示，该实现假设实例变量\
    \ `retainCount` 是一个 32 位整数。\n\n**代码清单 7-2.** 多线程环境下对象引用计数的实现\n\n```\nvoid    Object::retain\
    \ ()\n{\n        OSIncrementAtomic(&retainCount);\n}\n\nvoid    Object::release\
    \ ()\n{\n        uint32_t                originalValue;\n\n        originalValue\
    \ = OSDecrementAtomic(&retainCount);\n        if (originalValue == 1)\n      \
    \          this->free();\n}\n```\n\n如果我们回头审视代码清单 7-1 中的原始实现以及对应的 `release()` 方法的编译器输出，我们可以看到代码实际上包含两个竞态条件。当\
    \ `retainCount` 的值递减到 0 时，会条件性地调用 `free()`。然而，由于编译后的代码在检查其值是否为零之前，会从内存中重新加载 `retainCount`\
    \ 的值，因此有可能两次调用 `release()` 都读取到值 0，导致该对象的 `free()` 方法被调用两次，这很可能导致崩溃。为了说明这种情况如何发生，假设一个执行\
    \ `release()` 的线程已将 `retainCount` 从 2 递减到 1，并将递减后的值写回内存。同时假设，在它能够从内存重新加载 `retainCount`\
    \ 的值并检查其值是否为 0 之前，该线程被抢占。此时另一个线程有机会运行，如果它执行 `release()`，`retainCount` 将从 1 递减到\
    \ 0，对象将被销毁。当执行返回到原始线程时，它将重新加载 `retainCount` 的值，发现其为 0，然后再次销毁该对象。\n\n代码清单 7-2 通过使用\
    \ `OSDecrementAtomic()` 返回的值来确定最终引用计数是否已被释放，从而避免了这种竞态条件。函数 `OSDecrementAtomic()`\
    \ 返回其参数在递减之前的原始值。我们知道，如果原始值为 1，则 `retainCount` 的值现已递减为 0，并且该对象可以被安全销毁。\n\n有一组值得特别提及的原子操作是“比较并交换”函数族。比较并交换操作会将一个值写入某个内存地址，但重要的是，只有当被覆盖的值等于调用者提供的某个预期值时，写入才会发生。该操作的结果是一个布尔值，指示写入是否成功。重要的是，出于同步的目的，整个操作是以原子方式执行的。\n\
    \n比较并交换函数可用于构建更复杂的原子操作。例如，假设我们希望实现一个函数，先执行按位与，再执行按位或，并且整个操作是原子的。显然，我们不能简单地先调用\
    \ `OSBitAndAtomic()` 再调用 `OSBitOrAtomic()`，因为无法阻止执行在这两个函数之间被抢占。有了 `OSCompareAndSwap()`\
    \ 函数，我们可以实现一个按位与后接按位或的原子函数，如下所示：\n\n```\nuint32_t        AtomicBitAndOr (uint32_t\
    \ andMask, uint32_t orMask, volatile uint32_t* address)\n{\n        uint32_t \
    \       oldValue;\n        uint32_t        newValue;\n\n        do {\n       \
    \         oldValue = *address;\n                newValue = oldValue & andMask;\n\
    \                newValue = newValue | orMask;\n        } while (OSCompareAndSwap(oldValue,\
    \ newValue, address) == false);\n\n        return oldValue;\n}\n```\n\n你会注意到，在执行两个按位运算时我们完全没有进行同步。这个实现之所以有效且是原子的，是因为它使用\
    \ `OSCompareAndSwap()` 函数来确保 `address` 处的值没有发生变化——我们计算要写入的新值正是基于该原始值。如果在此函数执行期间另一个线程修改了\
    \ `address` 处的值，那么 `OSCompareAndSwap()` 函数将返回 false 并且不会执行写入。因此，我们必须回到循环的起始处，在重新读取\
    \ `address` 处的值后重复整个按位操作。在下一次尝试中，我们希望运气更好，能够在没有其他线程在底层修改 `address` 处值的情况下完成操作，尽管我们会不断重试，直到成功将结果写入内存。\n\
    \n![images](img/square.jpg) **注意** 所有原子操作，例如 `OSAddAtomic()`、`OSIncrementAtomic()`\
    \ 和 `OSBitOrAtomic()`，都可以仅使用 `OSCompareAndSwap()` 来实现。事实上，libkern 库提供的许多原子函数都是以这种方式实现的，包括所有按位原子操作以及每个操作的\
    \ 8 位和 16 位变体，它们对包含被修改值的完整 32 位字执行比较并交换。\n"
- fmt: "### Locking\n\nThe use of atomic operations is a good solution for synchronizing\
    \ access to a single variable. We often need to synchronize more complex sections\
    \ of code, such as algorithms that rely on the value of multiple variables or\
    \ functions that touch hardware. To remove the possibility of race conditions\
    \ from these more complex areas of code, we rely on mutual exclusion; that is,\
    \ any other thread that wishes to execute code which could interfere with the\
    \ result of our operation is blocked until the operation is complete. The act\
    \ of obtaining exclusive access is referred to as “acquiring a lock.”\n\nThe basic\
    \ idea behind locking is that any code that accesses a shared resource, such as\
    \ the instance variables of a driver, will first acquire a lock before executing\
    \ the code. It will then release the lock when it has finished accessing the shared\
    \ resource. The important point about a lock is that it can be held by only one\
    \ client at a time; any other thread that wishes to access the same shared resource\
    \ will block when it attempts to obtain the lock and will remain blocked until\
    \ the lock is released. Obtaining a lock will prevent any other thread that relies\
    \ on the same lock from executing so it's good practice to hold a lock for as\
    \ short a time as is needed.\n\nThe I/O Kit provides several different styles\
    \ of locking mechanisms, each of which is appropriate in different situations.\
    \ The locks provided by the I/O Kit include:\n\n- `IOSimpleLock`, which implements\
    \ a spin lock\n- `IOLock`, which implements a traditional mutex\n- `IORecursiveLock`,\
    \ which implements a mutex that can safely be acquired multiple times from the\
    \ thread that is holding the lock\n- `IORWLock`, which implements a read/write\
    \ lock that can be shared between multiple threads that need to read the shared\
    \ resource but provides exclusive access to a thread that wishes to write to the\
    \ shared resource.\n\n#### Spin locks\n\nThe most basic implementation of locking\
    \ is the spin lock, which can be implemented using nothing more than atomic operations\
    \ (which may explain why the spin lock is known as `IOSimpleLock` in the I/O Kit\
    \ implementation). A spin lock may consist of nothing more than a Boolean flag\
    \ that indicates whether the lock is currently held by any thread. When a thread\
    \ wishes to acquire the lock, the implementation determines whether the lock is\
    \ held and, if not, performs an atomic set of the lock's flag. If the lock is\
    \ held, then the function will simply repeatedly try to obtain the lock until\
    \ the lock becomes available. An example implementation for a spin lock is shown\
    \ in the following code. This implementation uses an unsigned 32-bit integer to\
    \ represent the lock state, with a value of 0 indicating the lock is available\
    \ and a value of 1 indicating that the lock is held.\n\n```\ntypedef    uint32_t\
    \    MySpinLock;\n\nvoid    MyAcquireSpinLock (MySpinLock* lock)\n{\n    // If\
    \ the value of the lock is 0, set its value to 1.  \n    // Keep trying until\
    \ the value of lock is successfully set.\n    while (OSCompareAndSwap(0, 1, lock)\
    \ == false)\n        ;\n}\n```\n\nA thread that holds a spin lock must be careful\
    \ not to obtain the lock that it is currently holding a second time. If this were\
    \ to happen, then the thread would attempt to acquire the lock and spin because\
    \ the lock is not available. However, in this case, the thread will spin indefinitely\
    \ since the only thread that can release the lock is blocked waiting for the lock.\
    \ This situation is known as a deadlock.\n\nThe actual implementation of `IOSimpleLock`\
    \ used by the I/O Kit is slightly more advanced than the example given, since\
    \ it disables preemption of the running thread while the lock is held. This means\
    \ that while a simple lock is held, the thread holding the lock will not be taken\
    \ off the CPU on which it is running until the lock is released. Consequently,\
    \ an `IOSimpleLock` should only be acquired for very brief periods (such as while\
    \ a driver's instance variables are being updated) and should never perform an\
    \ operation that may block the running thread, such as allocating memory or acquiring\
    \ a mutex, since this could result in a deadlock.\n\nAlthough it may seem that\
    \ spin locks are an inefficient locking mechanism because a thread spends CPU\
    \ cycles spinning if it cannot immediately obtain a lock, they can actually be\
    \ more efficient than other locking mechanisms, provided that the lock is only\
    \ held for short periods of time. On a machine with a single CPU, `IOSimpleLock`\
    \ will never spin because, with thread preemption disabled, there is no possibility\
    \ of lock contention (in effect, synchronization is provided by disabling thread\
    \ preemption and preventing the execution of any other thread that may acquire\
    \ the lock). On a multiprocessor system, disabling preemption when an `IOSimpleLock`\
    \ is acquired does not prevent a thread running on another CPU from attempting\
    \ to access the same lock (in fact, thread preemption is only disabled for the\
    \ CPU core that has acquired the lock). However, providing that a spin lock is\
    \ held for only a short period of time, the time spent by a thread spinning while\
    \ it waits for the lock to become free will typically be much less than the overhead\
    \ of blocking the thread had a mutex been used instead of a spin lock.\n\nUnlike\
    \ a mutex, an `IOSimpleLock` will never suspend the running thread. Instead it\
    \ will spin until the lock becomes available. This makes `IOSimpleLock` perfect\
    \ for providing synchronization between code that runs within a primary interrupt\
    \ handler and non-interrupt code. In reality, this functionality is rarely needed\
    \ within an I/O Kit driver since most drivers won't ever have to handle an interrupt\
    \ directly and, if they do, most will defer the interrupt to a secondary interrupt\
    \ handler. The I/O Kit provides other locking mechanisms that are appropriate\
    \ for secondary interrupt handlers, which are discussed later in this chapter.\n\
    \nTo provide synchronization with code that runs inside a primary interrupt handler,\
    \ we need to make sure that code that acquires an `IOSimpleLock` at non-interrupt\
    \ time is never preempted by code running inside an interrupt handler that attempts\
    \ to acquire the same lock, since this would result in a deadlock. To solve this,\
    \ the I/O Kit provides a function that disables interrupts for the running CPU\
    \ before acquiring the spin lock and a counterpart that releases the spin lock\
    \ and then re-enables interrupts. Just as disabling thread preemption guarantees\
    \ that a thread holding an `IOSimpleLock` will not be preempted by another thread\
    \ on the same CPU, disabling interrupts guarantees that a thread holding an `IOSimpleLock`\
    \ will not be preempted by an interrupt handler on the same CPU. An interrupt\
    \ may fire on another CPU on the system and may attempt to acquire an `IOSimpleLock`\
    \ that is held by a thread on another CPU core (resulting in the interrupt handler\
    \ spinning) but, because the thread is running on another CPU, it can continue\
    \ to execute and will release the `IOSimpleLock` shortly afterwards.\n\nA summary\
    \ of the `IOSimpleLock` functions provided by the I/O Kit is given in [Table 7-2](#Chapter07.html#tab_7_2).\n\
    \n![image](images/t0702.jpg)"
  raw: '### Locking


    The use of atomic operations is a good solution for synchronizing access to a
    single variable. We often need to synchronize more complex sections of code, such
    as algorithms that rely on the value of multiple variables or functions that touch
    hardware. To remove the possibility of race conditions from these more complex
    areas of code, we rely on mutual exclusion; that is, any other thread that wishes
    to execute code which could interfere with the result of our operation is blocked
    until the operation is complete. The act of obtaining exclusive access is referred
    to as “acquiring a lock.”


    The basic idea behind locking is that any code that accesses a shared resource,
    such as the instance variables of a driver, will first acquire a lock before executing
    the code. It will then release the lock when it has finished accessing the shared
    resource. The important point about a lock is that it can be held by only one
    client at a time; any other thread that wishes to access the same shared resource
    will block when it attempts to obtain the lock and will remain blocked until the
    lock is released. Obtaining a lock will prevent any other thread that relies on
    the same lock from executing so it''s good practice to hold a lock for as short
    a time as is needed.


    The I/O Kit provides several different styles of locking mechanisms, each of which
    is appropriate in different situations. The locks provided by the I/O Kit include:


    *   `IOSimpleLock`, which implements a spin lock

    *   `IOLock`, which implements a traditional mutex

    *   `IORecursiveLock`, which implements a mutex that can safely be acquired multiple
    times from the thread that is holding the lock

    *   `IORWLock`, which implements a read/write lock that can be shared between
    multiple threads that need to read the shared resource but provides exclusive
    access to a thread that wishes to write to the shared resource.


    #### Spin locks


    The most basic implementation of locking is the spin lock, which can be implemented
    using nothing more than atomic operations (which may explain why the spin lock
    is known as `IOSimpleLock` in the I/O Kit implementation). A spin lock may consist
    of nothing more than a Boolean flag that indicates whether the lock is currently
    held by any thread. When a thread wishes to acquire the lock, the implementation
    determines whether the lock is held and, if not, performs an atomic set of the
    lock''s flag. If the lock is held, then the function will simply repeatedly try
    to obtain the lock until the lock becomes available. An example implementation
    for a spin lock is shown in the following code. This implementation uses an unsigned
    32-bit integer to represent the lock state, with a value of 0 indicating the lock
    is available and a value of 1 indicating that the lock is held.


    `typedef    uint32_t    MySpinLock;`


    `void    MyAcquireSpinLock (MySpinLock* lock)`

    `{`

    `        // If the value of the lock is 0, set its value to 1.  `

    `        // Keep trying until the value of lock is successfully set.`

    `        while (OSCompareAndSwap(0, 1, lock) == false)`

    `                ;`

    `}`


    A thread that holds a spin lock must be careful not to obtain the lock that it
    is currently holding a second time. If this were to happen, then the thread would
    attempt to acquire the lock and spin because the lock is not available. However,
    in this case, the thread will spin indefinitely since the only thread that can
    release the lock is blocked waiting for the lock. This situation is known as a
    deadlock.


    The actual implementation of `IOSimpleLock` used by the I/O Kit is slightly more
    advanced than the example given, since it disables preemption of the running thread
    while the lock is held. This means that while a simple lock is held, the thread
    holding the lock will not be taken off the CPU on which it is running until the
    lock is released. Consequently, an `IOSimpleLock` should only be acquired for
    very brief periods (such as while a driver''s instance variables are being updated)
    and should never perform an operation that may block the running thread, such
    as allocating memory or acquiring a mutex, since this could result in a deadlock.


    Although it may seem that spin locks are an inefficient locking mechanism because
    a thread spends CPU cycles spinning if it cannot immediately obtain a lock, they
    can actually be more efficient than other locking mechanisms, provided that the
    lock is only held for short periods of time. On a machine with a single CPU, `IOSimpleLock`
    will never spin because, with thread preemption disabled, there is no possibility
    of lock contention (in effect, synchronization is provided by disabling thread
    preemption and preventing the execution of any other thread that may acquire the
    lock). On a multiprocessor system, disabling preemption when an `IOSimpleLock`
    is acquired does not prevent a thread running on another CPU from attempting to
    access the same lock (in fact, thread preemption is only disabled for the CPU
    core that has acquired the lock). However, providing that a spin lock is held
    for only a short period of time, the time spent by a thread spinning while it
    waits for the lock to become free will typically be much less than the overhead
    of blocking the thread had a mutex been used instead of a spin lock.


    Unlike a mutex, an `IOSimpleLock` will never suspend the running thread. Instead
    it will spin until the lock becomes available. This makes `IOSimpleLock` perfect
    for providing synchronization between code that runs within a primary interrupt
    handler and non-interrupt code. In reality, this functionality is rarely needed
    within an I/O Kit driver since most drivers won''t ever have to handle an interrupt
    directly and, if they do, most will defer the interrupt to a secondary interrupt
    handler. The I/O Kit provides other locking mechanisms that are appropriate for
    secondary interrupt handlers, which are discussed later in this chapter.


    To provide synchronization with code that runs inside a primary interrupt handler,
    we need to make sure that code that acquires an `IOSimpleLock` at non-interrupt
    time is never preempted by code running inside an interrupt handler that attempts
    to acquire the same lock, since this would result in a deadlock. To solve this,
    the I/O Kit provides a function that disables interrupts for the running CPU before
    acquiring the spin lock and a counterpart that releases the spin lock and then
    re-enables interrupts. Just as disabling thread preemption guarantees that a thread
    holding an `IOSimpleLock` will not be preempted by another thread on the same
    CPU, disabling interrupts guarantees that a thread holding an `IOSimpleLock` will
    not be preempted by an interrupt handler on the same CPU. An interrupt may fire
    on another CPU on the system and may attempt to acquire an `IOSimpleLock` that
    is held by a thread on another CPU core (resulting in the interrupt handler spinning)
    but, because the thread is running on another CPU, it can continue to execute
    and will release the `IOSimpleLock` shortly afterwards.


    A summary of the `IOSimpleLock` functions provided by the I/O Kit is given in
    [Table 7-2](#Chapter07.html#tab_7_2).


