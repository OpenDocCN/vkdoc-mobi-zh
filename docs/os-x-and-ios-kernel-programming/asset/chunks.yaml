    \ `USBInterfaceOpen()` 来实现，如下所示：\n\n```c\nerror = (*usbInterface)->USBInterfaceOpen(usbInterface);\n\
    ```\n\n当应用程序使用完该接口后，应通过调用 `IOUSBInterfaceInterface` 的方法 `USBInterfaceClose()`\
