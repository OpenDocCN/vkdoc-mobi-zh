  trans: '

    #### 操作系统服务


    在现代操作系统中，由操作系统执行的功能与由应用程序执行的功能之间存在明确的界限。每当进程希望执行分配内存、从磁盘读取数据或通过网络发送数据等任务时，它都需要通过操作系统提供的一组定义良好的编程接口来进行。像
    `malloc()` 和 `read()` 这类系统函数就是提供操作系统服务的系统调用示例。这些系统调用可以由应用程序直接发起，也可以通过更高级的开发框架（例如
    Mac OS X 上的 Cocoa 框架）间接调用。在内部，Cocoa 框架正是构建在这些相同的系统调用之上，并通过调用像 `read()` 这样的底层函数来访问操作系统服务。


    然而，由于用户进程无法直接访问硬件或操作系统结构，因此对 `read()` 这类函数的调用需要突破进程地址空间的限制。当对操作系统服务发起函数调用时，控制权会从用户应用程序转移到操作系统的特权部分，即内核。将控制权转交给内核通常借助
    CPU 来完成，CPU 为此提供了一个专门的指令。例如，现代 Mac 电脑中的 Intel CPU 提供了一个 `syscall` 指令，该指令会跳转到操作系统启动时设置好的一个函数。这个内核函数首先需要识别用户进程执行的是哪个系统调用（通过调用进程写入
    CPU 寄存器的一个值来确定），然后读取传递给系统调用的函数参数（同样由调用进程通过 CPU 寄存器设置）。接着，内核代表用户进程执行函数调用，并将控制权连同任何结果代码一起返回给进程。这如图
    1-4 所示。


    ![images](img/0104.jpg)


    **图 1-4.** 系统调用中的控制流


    内核是一个特权进程，能够执行用户进程无法执行但对配置系统所必需的操作。当控制权转移到内核时（例如在系统调用之后），CPU 在内核代码执行期间会进入特权模式，然后在返回用户进程之前降回受限权限状态。


    由于内核在执行代表用户进程的系统调用时，其运行的特权级别高于用户进程，因此它必须小心谨慎，避免无意中造成安全漏洞。这种情况可能发生在内核被诱骗执行用户进程不应被允许执行的任务时，例如被要求打开一个用户没有读取权限的文件，或者被提供了一个目标缓冲区，但其地址不在进程的地址空间内。在第一种情况下，尽管内核进程本身有权限打开系统上的任何文件，但由于它代表一个权限较低的用户进程操作，因此该请求需要被拒绝。在第二种情况下，如果内核试图访问一个无效地址，结果将是一个无法恢复的错误，这会导致内核恐慌。


    内核错误是灾难性的，需要重启整个系统。为了防止这种情况发生，每当内核代表用户进程执行请求时，它都需要仔细验证进程提供的参数，并且不应假定这些参数是有效的。这适用于内核实现的系统调用，并且正如我们将在后续章节中看到的，也适用于驱动程序接受来自用户进程的控制请求时。


    #### 虚拟内存


    计算机系统中的 RAM 是一种有限的资源，系统中所有正在运行的进程都在竞争其中的一部分。当系统上运行多个应用程序时，所有进程分配的内存总量超过系统 RAM
    容量的情况并不罕见。


    支持虚拟内存的操作系统允许进程分配和使用比系统实际安装的 RAM 容量更多的内存；也就是说，进程的地址空间不受物理 RAM 数量的限制。借助虚拟内存，操作系统会使用辅存（如硬盘）上的后备存储来存放进程地址空间中无法放入
    RAM 的部分。然而，CPU 仍然只能访问位于 RAM 中的地址，因此操作系统必须根据进程运行时对内存的访问，在磁盘后备存储和 RAM 之间交换数据。


    在特定时刻，一个进程可能只需要引用其已分配内存总量中的一小部分。这被称为进程的**工作集**，只要操作系统将此工作集保留在 RAM 中，虚拟内存对执行速度的影响就微乎其微。工作集是一个动态实体，它会根据进程运行时正在使用的数据而变化。如果进程访问的某个内存地址不在
    RAM 中，相应的数据将从磁盘上的后备存储中读取并加载到 RAM 中。如果没有可用的空闲 RAM 来加载数据，则 RAM 中的部分现有数据需要事先换出到磁盘上，从而释放物理
    RAM。


    虚拟内存由操作系统处理。用户进程不参与其实现，并且不知道其地址空间的某些部分不在物理 RAM 中，也不知道它访问过的数据可能被换入到主存中。


    虚拟内存的一个后果是，进程使用的地址与物理 RAM 中的地址不对应。如果你考虑到进程的地址空间可能大于系统的 RAM 容量，这一点就很明显了。因此，进程读写操作的地址需要从进程的虚拟地址空间转换到物理
    RAM 地址。由于每次内存访问都需要地址转换，这由 CPU 来执行，以最小化对执行速度的影响。


    操作系统通常使用称为“分页”的方案来实现虚拟地址到物理地址的转换。在分页内存方案下，物理内存被划分为固定大小的块，称为**页框**。大多数操作系统，包括 Mac
    OS X 和 iOS，都使用 4096 字节的页框大小。同样，每个进程的虚拟地址空间也被划分为固定大小的块，称为**页**。每页的字节数始终与每页框的字节数相同。进程中的每个页随后可以被映射到物理内存中的一个页框，如图
    1-5 所示。


    ![images](img/0105.jpg)


    **图 1-5.** 进程地址空间中的页可以映射到内存中的任何页框。


    虚拟内存的另一个优点是，它允许进程虚拟地址空间中占据连续页面范围的缓冲区，分散到物理内存中多个不连续的页框中，如图 1-5 所示。这解决了物理内存碎片的问题，因为进程的内存分配可以分散到多个物理内存段，而不受限于最长连续物理页框组的大小。

    '
- fmt: 'As part of launching a process, the operating system creates a table to map
    addresses between the process''s virtual address space and their corresponding
    physical address. This is known as a "page table." Conceptually, the page table
    contains an entry for each page in the process''s address space containing the
    address of the physical page frame to which each page is mapped. A page table
    entry may also contain access control bits that the CPU uses to determine whether
    the page is read-only and a bit that indicates whether the page is resident in
    memory or has been swapped out to the backing store. [Figure 1-6](#Chapter01.html#fig_1_6)
    describes the steps that the CPU performs to translate a virtual address to a
    physical address.


    ![images](images/0106.jpg)


    ***Figure 1-6.** Virtual to physical address translation for a 32-bit address
    with a page size of 4096 bytes (12 bits)*


    If a process accesses a memory address that the CPU cannot translate into a physical
    address, an error known as a "page fault" occurs. Page faults are handled by the
    operating system, running at privileged execution level. The operating system
    determines whether the fault occurred because the address was not in the process''s
    address space, in which case the process has attempted to access an invalid address
    and is terminated. If the fault occurred because the page containing the address
    has been swapped out to the backing store, the operating system performs the following
    steps:


    1.  A frame in physical memory is allocated to hold the requested page; if no
    free frames are available in memory, an existing frame is swapped out to the backing
    store to make room.

    2.  The requested page is read from the backing store into memory.

    3.  The page table for the process is updated so that the requested page is mapped
    to the allocated frame.

    4.  Control returns to the calling process.


    The calling process re-executes the instruction that caused the fault, but this
    time around, the CPU finds a mapping for the requested page in the page table
    and the instruction completes successfully.


    An understanding of virtual memory and paging is essential for kernel developers.
    Although the kernel handles requests on behalf of user applications, it also has
    an address space of its own, so parameters often need to be copied or mapped from
    a process''s address space to the kernel''s address space. In addition, kernel
    code that interfaces to hardware devices often needs to obtain the physical address
    of memory. Consider a disk driver that is handling a read request for a user process.
    The destination for the data read from disk is a buffer that resides in the address
    space of the user process. As with the CPU, the hardware controlled by the driver
    can write only to an address in main memory, and not to a destination in the backing
    store. Therefore, to handle the read request, the driver needs to ensure that
    the user buffer is swapped into main memory and remains in main memory for the
    duration of the read operation. Finally, the driver needs to translate the address
    of the destination buffer from a virtual address into a physical address that
    the hardware can access. We describe this in further detail in [Chapter 6](#Chapter06.html#ch6).


    It''s worth noting that although iOS provides a page table for each process, it
    does not support a backing store. At first, it may seem that this completely defeats
    the purpose of paging. However, it serves two very important purposes. First,
    it provides each process with the view that it has sole access to memory. Second,
    it avoids problems caused by the fragmentation of physical memory.


    #### Scheduling


    Another resource that is under high contention in a computer system is the CPU.
    Each process requires access to the CPU in order to execute, but typically, there
    are more active processes wanting access to the CPU than there are CPU cores on
    the system. The operating system must therefore share the CPU cores among the
    running processes and ensure that each process is provided regular access to the
    CPU so that it can execute.


    We have seen that processes run independent of each other and are given their
    own address spaces to prevent one process from affecting the behavior of any other
    process. However, in many applications, it is useful to allow two independent
    execution paths to run simultaneously, without the restriction of having each
    path run within its own address space. This unit of execution is known as a "thread."
    Multiple threads all execute code from the same program code and are run within
    the same process (and hence share the same address space), but otherwise run independently.


    To the operating system, a thread is the basic unit of scheduling; the operating
    system scheduler needs to look at only the active threads on the system when considering
    what to schedule next on the CPU. For a process to execute, it must contain at
    least one thread; the operating system automatically creates the initial thread
    for a new process when it begins running.


    The goal of the scheduler is twofold: to prevent the CPU from becoming idle, since
    otherwise a valuable hardware component is being wasted, and to provide all threads
    with access to the CPU in a manner that is fair so that a single thread cannot
    monopolize the CPU and starve other threads from running. To do this, a thread
    is scheduled on an available CPU core until one of two events occurs:


    *   A certain amount of time has elapsed, known as the time quantum, at which
    point the thread is preempted by the operating system and another thread is scheduled.
    On Mac OS X, the default time quantum is 10 milliseconds.

    *   The thread can no longer execute because it is waiting for the completion
    of an operation, such as for data to be read from disk, or for the result of another
    thread. In this case, the scheduler allows another thread to run on the CPU while
    the original thread is blocked. This prevents the CPU from sitting idle when a
    thread has no work to do and maximizes the time that the CPU is spent executing
    code. A thread can also voluntarily give up its time on the CPU by calling one
    of the `sleep()` functions, which delay execution of the current thread for a
    specified duration.


    One reason for adding multiple threads to an application is to allow it to execute
    concurrently across multiple CPU cores so that the application''s execution can
    be sped up by dividing a complex operation into smaller steps that are run in
    parallel. However, multithreading has advantages even on a computer with a single
    CPU core. By rapidly switching between active threads, the scheduler gives the
    illusion that all threads are running concurrently. This allows a thread to block
    or sit in a tight loop with negligible impact on the responsiveness of other threads,
    so a time-consuming task can be moved to a background thread while leaving the
    rest of the application free to respond to user interaction.


    A common design used in applications that interface with hardware is to place
    the code that accesses the hardware in its own thread. Software code often has
    to block while it is waiting for the hardware to respond; by removing this code
    from the main program thread, the program''s user interface is not affected when
    the program needs to wait for the hardware.


    Another common use of threads occurs when software needs to respond to an event
    from hardware with minimal delay. The application can create a thread that is
    blocked until it receives notification from hardware, which can be signaled using
    techniques discussed in later chapters. While the thread is blocked, the scheduler
    does not need to provide it with access to the CPU, so the presence of the thread
    has no impact on the performance of the system. However, once the hardware has
    signaled an event, the thread becomes unblocked, is scheduled on the CPU, and
    it is free to take whatever action is necessary to respond to the hardware.'
  raw: 'As part of launching a process, the operating system creates a table to map
    addresses between the process''s virtual address space and their corresponding
    physical address. This is known as a “page table.” Conceptually, the page table
    contains an entry for each page in the process''s address space containing the
    address of the physical page frame to which each page is mapped. A page table
    entry may also contain access control bits that the CPU uses to determine whether
    the page is read-only and a bit that indicates whether the page is resident in
    memory or has been swapped out to the backing store. [Figure 1-6](#Chapter01.html#fig_1_6)
    describes the steps that the CPU performs to translate a virtual address to a
    physical address.


    ![images](images/0106.jpg)


    ***Figure 1-6.** Virtual to physical address translation for a 32-bit address
    with a page size of 4096 bytes (12 bits)*


    If a process accesses a memory address that the CPU cannot translate into a physical
    address, an error known as a “page fault” occurs. Page faults are handled by the
    operating system, running at privileged execution level. The operating system
    determines whether the fault occurred because the address was not in the process''s
    address space, in which case the process has attempted to access an invalid address
    and is terminated. If the fault occurred because the page containing the address
    has been swapped out to the backing store, the operating system performs the following
    steps:


    1.  A frame in physical memory is allocated to hold the requested page; if no
    free frames are available in memory, an existing frame is swapped out to the backing
    store to make room.

    2.  The requested page is read from the backing store into memory.

    3.  The page table for the process is updated so that the requested page is mapped
    to the allocated frame.

    4.  Control returns to the calling process.


    The calling process re-executes the instruction that caused the fault, but this
    time around, the CPU finds a mapping for the requested page in the page table
    and the instruction completes successfully.


    An understanding of virtual memory and paging is essential for kernel developers.
    Although the kernel handles requests on behalf of user applications, it also has
    an address space of its own, so parameters often need to be copied or mapped from
    a process''s address space to the kernel''s address space. In addition, kernel
    code that interfaces to hardware devices often needs to obtain the physical address
    of memory. Consider a disk driver that is handling a read request for a user process.
    The destination for the data read from disk is a buffer that resides in the address
    space of the user process. As with the CPU, the hardware controlled by the driver
    can write only to an address in main memory, and not to a destination in the backing
    store. Therefore, to handle the read request, the driver needs to ensure that
    the user buffer is swapped into main memory and remains in main memory for the
    duration of the read operation. Finally, the driver needs to translate the address
    of the destination buffer from a virtual address into a physical address that
    the hardware can access. We describe this in further detail in [Chapter 6](#Chapter06.html#ch6).


    It''s worth noting that although iOS provides a page table for each process, it
    does not support a backing store. At first, it may seem that this completely defeats
    the purpose of paging. However, it serves two very important purposes. First,
    it provides each process with the view that it has sole access to memory. Second,
    it avoids problems caused by the fragmentation of physical memory.


