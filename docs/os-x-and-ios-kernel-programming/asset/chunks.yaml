    #### Taking MyEthernetDriver for a Test-Drive


    If you wish to test MyEthernetDriver, it is best to do so on an isolated network
    segment or with the blessing of your network administrator because, unlike other
    samples, it will actively interact with your network. Before you test it, you
    should modify `MyEthernetHwAbstraction.cpp` so that it points to the Ethernet
    device you wish to use to transmit and receive on behalf of MyEthernetDriver.


    You can load MyEthernetDriver by using `kextload`. Unlike an NKE, which has to
    be manually loaded, MyEthernetDriver uses `IOResources` as a provider so that
    it will be loaded automatically during boot, if installed to the proper location.
    For the purpose of testing the driver, it is recommended that you do not keep
    it in your systems extensions directory in case there is a problem. When the driver
    is loaded, you can verify its presence using `IORegisterExplorer`, as shown in
    [Figure 13-7](#Chapter13.html#fig_13_7).


    ![images](images/1307.jpg)


    ***Figure 13-7.** IORegisteryExplorer showing MyEthernetDriver attached to the
    IOResources nub*


    We should also be able to see the new network interface in System Preferences
    under the Network pane, as shown in [Figure 13-8](#Chapter13.html#fig_13_8).


    ![images](images/1308.jpg)


    ***Figure 13-8.** Network pane in System Preferences showing the configuration
    options for MyEthernetDriver*


    If you have a DHCP server on your network, you may see that MyEthernetDriver was
    automatically assigned an IP address. If not, you can manually configure an IP
    address using System Preferences or using the `ifconfig` command line tool:


    * * *


    `$` **`sudo ifconfig en5 inet 192.168.1.50 netmask 255.255.255.0`**

    `$` **`ifconfig en5`**

    `en5: flags=8863<UP,BROADCAST,SMART,RUNNING,SIMPLEX,MULTICAST> mtu 1500`

    `        ether be:ef:fe:ed:12:11`

    `        inet6 fe80::bcef:feff:feed:1211%en5 prefixlen 64 scopeid 0x7`

    `        inet 192.168.1.50 netmask 0xffffff00 broadcast 192.168.1.255`

    `        media: autoselect (1000baseT <full-duplex>)`

    `        status: active`


    * * *


    Note that you may be assigned a different BSD network interface name, depending
    on how many interfaces you have installed on your system. In this case, *en5*
    is used. Provided that you have configured an IP address that is reachable by
    another host on the network, you should now be able to reach that host even if
    the slave interface is using a different IP/subnet. We can verify that it works
    correctly by using the `ping` utility on another host:


    * * *


    `othermac$` **`ping 192.168.1.50`**

    `PING 192.168.1.50 (192.168.1.50): 56 data bytes`

    `64 bytes from 192.168.1.50: icmp_seq=0 ttl=64 time=0.855 ms`

    `64 bytes from 192.168.1.50: icmp_seq=1 ttl=64 time=0.588 ms`

    `--- 192.168.1.50 ping statistics ---`

    `2 packets transmitted, 2 packets received, 0.0% packet loss`

    `round-trip min/avg/max/stddev = 0.588/0.722/0.855/0.133 ms`


    `othermac$` **`arp –a`**

    `? (192.168.1.50) at be:ef:fe:ed:12:11 on en0 ifscope [ethernet]`

    `? (192.168.255.255) at ff:ff:ff:ff:ff:ff on en0 ifscope [ethernet]`


    * * *


    You will see that the other system has picked up the hardware address (MAC) of
    MyEthernetDriver and is not using the MAC of the slave interface to reach us.


    Going back to the system with MyEthernetDriver installed, we can check the statistics
    for our interface to see the amount of packets and data it has transferred:


    * * *


    `$` **`netstat -i -I en5`** `Name  Mtu   Network       Address               Ipkts  Ierrs    Opkts  Oerrs  Coll
    en5   1500  <Link#7>      be:ef:fe:ed:12:11       61     0       67     0       0
    en5   1500  192.168.1     192.168.1.50            61      -      67     -     -`


    * * *'
