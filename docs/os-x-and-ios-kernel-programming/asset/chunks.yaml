    applications, and communicate with PCI and USB devices.


    ## C H A P T E R  2'
  trans: "  \n#### 硬件与驱动程序  \n\n除了管理 CPU 和内存等关键硬件资源外，操作系统还负责管理可能添加到系统中的硬件外设。这包括键盘、鼠标、U\
    \ 盘以及显卡等设备。虽然操作系统负责管理这些设备，但它需要借助驱动程序来完成这项工作。驱动程序可以理解为运行在操作系统内核中的插件，使系统能够与硬件设备进行交互。\
    \  \n\n支持硬件设备的代码分为两部分：一部分位于设备本身（称为固件），另一部分位于计算机中（称为驱动程序）。驱动程序的作用是代表操作系统控制硬件设备。驱动程序代码被加载到操作系统内核中，并享有与内核其他部分相同的权限，包括直接访问硬件的能力。\
    \  \n\n当设备连接到计算机（或计算机启动时），驱动程序负责初始化硬件，并将操作系统的请求翻译成一组硬件特有的操作序列，设备需要执行这些操作来完成操作系统的请求。\
    \  \n\n驱动程序从操作系统接收的请求类型取决于其执行的功能。对于某些驱动程序，操作系统会提供一个开发框架。例如，声卡需要编写音频驱动程序。音频驱动程序从操作系统接收与音频领域相关的请求，例如创建\
    \ 48 kHz 音频输出流的请求，随后是输出指定音频数据包的请求。  \n\n驱动程序也可以基于其他驱动程序构建，并可能请求其他驱动程序提供的服务。例如，USB\
    \ 音频输入设备的驱动程序使用底层通用 USB 驱动程序的服务来访问其硬件。这使得开发者无需深入了解 USB 协议，从而可以专注于自身设备的特性。与之前的例子类似，音频驱动程序从操作系统接收表示音频流操作的请求，并在响应这些请求时，创建自己的请求传递给底层\
    \ USB 驱动程序。这种分层设计实现了每个驱动程序职责的分离：音频驱动程序只需关注处理音频请求和配置音频设备，而 USB 驱动程序只需关注 USB 协议和在\
    \ USB 总线上执行数据传输。驱动程序分层方式的示例如图 1-7 所示。  \n\n![images](img/0107.jpg)  \n\n***图 1-7.**\
    \ 从应用程序到硬件的音频请求中的控制请求链*  \n\n并非所有硬件都能归入操作系统识别的特定类别。例如，3D 打印机等专用设备可能无法获得操作系统的原生支持。此时，硬件制造商需要为其硬件编写通用驱动程序。作为通用驱动程序，操作系统不会将该设备识别为打印机并发送打印请求，而是由专门的应用程序软件控制该驱动程序，直接与打印机驱动程序通信。操作系统提供了一个特殊的系统调用，允许用户应用程序向驱动程序请求操作，称为“I/O\
    \ 控制”请求，通常简写为`\"ioctl\"`。`ioctl`指定要执行的操作，并为驱动程序提供操作所需的参数，这些参数可能包括存放操作结果的缓冲区。虽然`ioctl`请求是作为系统调用向操作系统发起的，但该请求会直接传递给驱动程序。\
    \  \n\n#### 总结  \n\n操作系统负责管理计算机中的硬件资源。它为用户程序提供计算机系统的抽象模型，使每个程序看起来都能完全访问 CPU 和整个内存范围。用户运行的程序在调用操作系统提供的服务之前，无法直接操作硬件。在处理涉及外设硬件的服务时，操作系统可能需要调用该设备驱动程序提供的函数。\
    \  \n\n在后续章节中，我们将把这里介绍的概念付诸实践。我们将向您介绍 macOS X 提供的接口，使驱动程序能够处理虚拟和物理内存地址、响应用户应用程序的请求，以及与\
    \ PCI 和 USB 设备通信。  \n\n## 第 2 章  \n"
- fmt: '# Mac OS X and iOS


    Mac OS X is a modern Unix-based operating system developed by Apple Inc for their
    Macintosh computer series. OS X is the tenth incarnation of Mac OS.


    OS X features a graphical user interface known for its ease of use and visual
    appeal. Apple has gained a cult-like following for their products, and any new
    feature addition to either OS X or iOS receives widespread attention. In addition
    to the regular edition of OS X, Apple also provided a server edition of OS X called
    `Mac OS X Server`.


    The server version was later merged with the regular version in Mac OS X `10.7
    (Lion)`. OS X was the successor to Mac OS 9, and represented a radical departure
    from earlier versions. Unlike its predecessors, OS X was based on the `NeXTSTEP`
    operating system. At present, there have been eight releases of Mac OS X, with
    the latest being Mac OS X `10.7`, codenamed Lion. The Mac OS X releases to date
    are shown in [Table 2-1](#Chapter02.html#tab_2_1).


    ![images](images/t0201.jpg)


    Mac OS X comes with a range of tools for developers, including `Xcode`, which
    allow the development of a wide range of applications, including the major topic
    of this book—kernel extensions.


    For the end-user, OS X usually comes bundled with the `iLife` suite, which contains
    software for photo, audio, and video editing, as well as software for authoring
    web pages.


    ## NEXTSTEP


    OS X and iOS are based on the `NeXTSTEP` OS developed by NeXT Computer Inc, which
    was founded by Steve Jobs after he left Apple in 1985. The company was initially
    funded by Jobs himself, but later gained significant outside investments. NeXT
    was later acquired by Apple, and `NeXTSTEP` technology made its way into OS X.
    The aim of NeXT was to build a computer for academia and business. Despite limited
    commercial success relative to the competition, the NeXT computers (most notably
    the NeXTcube) had a highly innovative operating system, called `NeXTSTEP`, which
    was in many ways ahead of its time.


    `NeXTSTEP` had a graphical user interface and command line interface like the
    current versions of OS X (iOS does not provide a user accessible command line
    interface). Many core technologies introduced by `NeXTSTEP` are still found in
    its successors, such as application bundles and `Interface Builder`. `Interface
    Builder` is now part of the `Xcode` development environment and is widely used
    for both OS X and iOS Cocoa applications. `NeXTSTEP` provided `Driver Kit`, an
    object-oriented framework for driver development, which later evolved into `I/O
    Kit`, one of the major topics of this book.


    iOS was later derived from OS X, and it is Apple''s OS for mobile devices. It
    was launched with the release of the first iPhone, in 2007, and at that point
    it was called `iPhone OS`, though it was later renamed iOS to better reflect the
    fact that it runs on other mobile devices, such as the iPod Touch, the iPad, and
    more recently the Apple TV. iOS was built specifically for mobile devices with
    touch interfaces. Unlike the biggest competitor, Windows, neither OS X nor iOS
    are licensed for use by third parties, and they can officially only be used on
    Apple''s hardware products. A high-level view of the Mac OS X architecture is
    shown in [Figure 2-1](#Chapter02.html#fig_2_1).


    ![images](images/0201.jpg)


    **Figure 2-1.** Mac OS X architecture


    The core of Mac OS X and iOS is POSIX compliant and has since Mac OS X `10.5 (Leopard)`
    complied with the Unix 03 Certification. The core of OS X and iOS, which includes
    the kernel and the Unix base of the OS, is known as Darwin, and it is an open
    source operating system published by Apple. Darwin, unlike Mac OS X, does not
    include the characteristic user interface, as it is a bare bones system, in that
    it only provides the kernel and user space base of tools and services typical
    of Unix systems. At its release, the only supported architecture was the PowerPC
    platform, but Intel 32 and 64-bit support was subsequently added as part of Apple''s
    shift to the Intel architecture. Apple has thus far not released the ARM version
    of Darwin that iOS is based on. Darwin is currently downloadable in source form
    only, and has to be compiled. The Darwin distribution includes the source code
    for the `XNU` kernel. The kernel sources are a particularly useful resource for
    people wanting to know more about the inner workings of the OS, and for developing
    kernel extensions. You can often find more detailed explanations in the source
    code headers, or the code itself, than are documented on Apple''s developer website.


    The Darwin OS (and therefore OS X and iOS) runs the `XNU` kernel, which is based
    on code from the Mach kernel, as well as parts of the FreeBSD operating system.
    [Figure 2-2](#Chapter02.html#fig_2_2) shows the Mac OS X desktop.


    ![images](images/0202.jpg)


    **Figure 2-2.** The Mac OS X desktop


    ### Programming APIs


    As you can see from [Figure 2-1](#Chapter02.html#fig_2_1), OS X has a layered
    architecture. Between the Darwin core and the user application there is a rich
    set of programming APIs. The most significant of these is Cocoa, which is the
    preferred framework for GUI-based applications. The iOS equivalent is Cocoa Touch,
    which is principally the same, but offers GUI elements specialized for touch-based
    user interaction. Both Cocoa and Cocoa Touch are written in the Objective-C language.
    Objective-C is a superset of C, with support for Smalltalk style messages.


    #### OBJECTIVE-C


    Objective-C was the language of choice for application development under Mac OS
    X and iOS, as well as their predecessor, `NeXTSTEP`. Objective-C is a superset
    of the C language and provides support for object-oriented programming, but it
    lacks many of the advanced capabilities provided by languages like C++, such as
    multiple inheritance, templates, and operator overloading. Objective-C uses Smalltalk-style
    messaging and dynamic binding (which in many ways removes the need for multiple
    inheritance). The language was invented in the early 1980s by Brad Cox and Tom
    Love. Objective-C is still the de-facto standard language for application development
    on both OS X and iOS, although driver or system level programming is typically
    done in C or C++. Many core frameworks still use the `NS` (for NeXTSTEP) prefix
    in their class names, such as `NSString` and `NSArray`.


    Other programming APIs include the BSD API, which provides application access
    to low-level file and device access, as well as the POSIX threading API (`pthreads`).
    The BSD layer, unlike Cocoa, does not provide facilities for programming applications
    with a graphical user interface. Mac OS X has another major API, called Carbon.
    Carbon is a C-based API that overlaps with Cocoa in terms of functionality. It
    originally provided some backward compatibility with earlier versions of Mac OS.
    The Carbon API is now deprecated in favor of Cocoa for GUI applications, but remains
    in OS X to support legacy applications, such as Apple''s Final Cut Pro 7. The
    publically available version of Carbon remains 32-bit only, so Cocoa is needed
    for 64-bit compatibility. The fourth major API is Java, which has now also been
    deprecated. Java was removed from default installation in Mac OS X `10.7`, although
    it is still provided as an optional install.


    Graphics and multimedia are key differentiators that OS X and iOS offer over other
    operating systems. Both offer a rich set of APIs for working with graphics and
    multimedia. The core of the graphics system is the Quartz system. Quartz encompasses
    the windowing system (Quartz Compositor), as well as the API known as Quartz 2D.
    Quartz is based on the PDF (Portable Document Format) model. It offers resolution
    independent user interfaces, as well as anti-aliased rendering of text and graphics.
    The Quartz Extreme interface offers hardware-assisted OpenGL rendering of windows,
    where supported by the graphics hardware. Here''s a short overview of some important
    graphics and multimedia frameworks.'
