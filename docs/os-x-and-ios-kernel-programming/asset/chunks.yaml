  trans: '

    # 创建自定义 GUID 分区表


    我们在上一节中开发的加密过滤方案，只会针对一个 `IOMedia` 对象加载，该对象的“`Content Hint`”属性是一个我们为示例过滤方案目的而定义的自定义值。为了测试这个驱动程序，我们需要创建一个包含我们自定义
    GUID 类型分区条目的 GUID 分区表。


    这可以通过 Mac OS X 自带的多种命令行工具来实现。在本教程中，我们将创建一个包含 GUID 分区表的卷，用于测试加密过滤驱动程序。加密卷的存储设备将由一个磁盘映像提供，磁盘映像是一个充当虚拟磁盘的普通文件，包含一个文件系统（可能还有一个分区方案），可以作为一个卷挂载在
    Mac OS X 桌面上。磁盘映像为测试过滤方案和分区方案驱动程序提供了一种便捷方式，因为它们很容易创建，而无需格式化物理介质。


    本节提供了部分命令行工具的教程，这些工具可用于开发存储栈中的驱动程序。在本节中，我们将创建一个磁盘映像，写入一个包含我们指定分区类型的单个分区的 GUID
    分区表，然后向我们加密卷写入一个 HFS 文件系统。所有这些任务都将通过命令行工具完成。


    首先，打开终端应用程序。第一步是创建一个空白磁盘映像，它将为我们的介质提供存储空间，并扮演磁盘的角色。`hdiutil` 命令行实用程序是一个用于创建和操作磁盘映像文件的工具。我们可以使用以下命令创建一个
    25MiB 的空白磁盘映像：


    ```

    hdiutil create -megabytes 25 -layout NONE EncryptedImage.dmg

    ```


    这将在当前工作目录中创建一个名为“`EncryptedImage.dmg`”的文件，包含一个 25MiB 的磁盘映像。选项“`-layout NONE`”指定我们不想在磁盘映像上创建分区表。由于生成的磁盘映像不包含分区映射和文件系统，因此无法挂载。但是，我们可以使用以下命令与该磁盘映像进行交互：


    ```

    hdiutil attach -nomount EncryptedImage.dmg

    ```


    了解了存储设备在 Mac OS X 内核中的实现方式后，我们就能很好地剖析此命令在后台执行的操作。“`hdiutil attach`”命令将加载 Apple
    提供的用于管理磁盘映像的内核驱动程序；该驱动程序将派生自与用于实现 RAM 磁盘相同的 `IOBlockStorageDevice` 超类。一个存储驱动程序栈将被构建，其中包含一个代表整个磁盘映像内容的
    `IOMedia` 对象。`IOMedia` 对象将有一个对应的 `IOMediaBSDClient` 对象，该对象会在 `/dev` 目录中发布磁盘映像的设备接口。这会导致创建一个块设备（例如
    `/dev/disk1`）和一个字符设备（例如 `/dev/rdisk1`），通过它们可以访问磁盘映像。因附加磁盘映像而创建的块设备路径会打印到终端输出。


    现在，我们可以通过其块设备接口读写磁盘映像，因此下一步是在磁盘上创建一个 GUID 分区表。`gpt` 命令是 Apple 随 Mac OS X 提供的一个命令行工具，用于创建和操作磁盘的
    GUID 分区表。我们可以使用以下命令在空白磁盘上创建 GUID 分区表。请务必将路径 `/dev/diskN` 替换为与您系统上已附加磁盘映像对应的设备接口路径。


    ```

    gpt create /dev/diskN

    ```


    这会在磁盘上写入一个不包含任何分区的 GUID 分区表。我们想在磁盘上创建一个单独的分区，因此下一条命令将向磁盘的 GUID 分区表中插入一个条目：


    ```

    gpt add -t 8D7FD0BB-39A8-43C0-9432-F4E1A269F070 /dev/diskN

    ```


    虽然“`gpt add`”命令允许指定分区大小和起始块偏移量，但如果没有指定分区范围，该实用程序默认会创建一个从它在磁盘上找到的第一个未使用磁盘块范围开始的分区。这非常适合我们的目的，因为它创建了一个填充整个磁盘的单个分区。“`-t`”选项可用于指定所创建分区条目的
    GUID 类型。这使我们能够创建一个分区条目，其 GUID 类型是我们为标识加密 HFS 卷而定义的自定义 GUID。向磁盘添加分区后，会创建一个代表该分区的新设备接口。该分区块设备接口的路径会打印到终端输出，其形式为
    `/dev/diskNs1`。


    ![images](img/square.jpg) **注意** BSD 使用术语“slice”（切片）来指代磁盘分区。因此，`disk2s1` 指的是块设备“`disk2`”的第一个分区（切片）。切片编号来自
    `IOMedia` 对象的 location 值。在我们的分区方案驱动程序和加密过滤方案中，我们为我们创建的每个 `IOMedia` 对象调用了 `setLocation()`
    方法。我们提供的字符串用于生成设备接口的名称。


    在内核层面，在磁盘上创建分区表会导致 Apple 提供的 `IOGUIDPartitionScheme` 驱动程序被加载。该驱动程序响应用户添加分区条目的操作，会实例化一个
    `IOMedia` 对象来表示这个分区。该分区的 `IOMedia` 对象将有一个“`Content Hint`”属性，该属性等于我们分配给该分区的自定义
    GUID 类型。此时，我们已准备好加载我们的加密过滤驱动程序。您应该记得，我们的过滤方案驱动程序会针对任何具有我们自定义内容提示 GUID 的 `IOMedia`
    对象进行加载。如果我们没有创建具有指定内容类型的分区条目，我们的加密方案驱动程序将找不到合适的 `IOMedia` 对象进行匹配，也就无法测试我们的驱动程序了。


    我们的加密过滤方案驱动程序在加载时会创建一个新的 `IOMedia` 对象。这会导致创建另一个块设备，其接口名称类似于“`diskNs1s1`”。此接口代表磁盘分区的未加密内容。在我们的示例加密过滤驱动程序中，它创建的
    `IOMedia` 对象被赋予了一个“`Content Hint`”属性，值为 `Apple_HFS`，这告诉 Mac OS X 该介质包含默认的 HFS
    文件系统，并导致为未加密卷加载 HFS 文件系统。但是，在此阶段，磁盘分区是空的，不包含任何文件系统。我们可以使用以下命令在卷上创建 HFS 文件系统：


    ```

    newfs_hfs -v MyVolumeName /dev/diskNs1s1

    ```


    选项“`-v`”允许指定卷名称。在上面的示例中，我们将 HFS 卷命名为“`MyVolumeName`”。向（未加密）卷写入 HFS 文件系统后，我们现在可以将文件系统挂载到
    Mac OS X 桌面上。这可以通过以下命令完成：


    ```

    hdiutil mountvol /dev/diskNs1s1

    ```


    这将导致桌面上出现一个新卷。由于我们的加密过滤方案存在于存储栈中，任何写入磁盘的文件在数据写入磁盘映像文件之前，都会被我们的 XOR 加密修改。磁盘映像文件本身只是一个普通文件，因此可以通过在任何十六进制编辑器中打开
    `.dmg` 文件来检查每个磁盘块的内容。这使得磁盘映像成为调试或验证分区方案驱动程序或过滤方案驱动程序是否正常运行的一种非常有用的手段。

