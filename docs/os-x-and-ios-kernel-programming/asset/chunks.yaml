- fmt: "# I/O Engine Initialization\n\nAn `IOAudioEngine` has its own `initHardware()`\
    \ method, which should be overridden to perform any I/O engine-specific hardware\
    \ initialization, as well as allocation and initialization of other needed resources.\
    \ Once the method returns, the engine should be ready to start I/O. `performAudioEngineStart()`\
    \ can then be called to start the actual I/O. The `initHardware()` method gets\
    \ called by the `IOAudioDevice::activateAudioEngine()` method in our case. Although\
    \ `IOAudioEngine` derives from `IOService`, we do not override or call the `start()`\
    \ method in this case. This is because the class is allocated and initialized\
    \ by `MyAudioDevice` rather than by I/O Kit. The `IOAudioEngine` provides a default\
    \ implementation of the `start()` method, which is hardwired to use an `IOAudioDevice`\
    \ as its provider. Unlike `start()`, however, we do declare the `stop()` method.\
    \ The `stop()` method can be implemented to reverse any action performed in `initHardware()`.\
    \ The `initHardware()` method of our `MyAudioDevice` driver is shown in [Listing\
    \ 12-3](#Chapter12.html#list_12_3).\n\n**Listing 12-3.** The Implementation of\
    \ `initHardware()` in `MyAudioDevice`\n\n```\n#define kAudioSampleRate       \
    \           48000\n#define kAudioNumChannels                 2\n#define kAudioSampleDepth\
    \                 16\n#define kAudioSampleWidth                 16\n#define kAudioBufferSampleFrames\
    \          kAudioSampleRate/2\n// Buffer holds half second's worth of audio.\n\
    #define kAudioSampleBufferSize           (kAudioBufferSampleFrames * kAudioNumChannels\
    \ *\n                                         (kAudioSampleDepth / 8))\n\n#define\
    \ kAudioInterruptInterval           10000000 // nanoseconds (1000 ms / 100 hz\
    \ = 10ms).\n#define kAudioInterruptHZ                 100\n\nbool MyAudioEngine::initHardware(IOService\
    \ *provider)\n{\n    bool result = false;\n    IOAudioSampleRate initialSampleRate;\n\
    \    IOAudioStream*    audioStream;\n    IOWorkLoop*       workLoop = NULL;\n\n\
    \    IOLog(\"MyAudioEngine[%p]::initHardware(%p)\\n\", this, provider);\n\n  \
    \  if (!super::initHardware(provider))\n        goto done;\n\n    fAudioInterruptSource\
    \ = IOTimerEventSource::timerEventSource(this, interruptOccured);\n    if (!fAudioInterruptSource)\n\
    \        return false;\n\n    workLoop = getWorkLoop();\n        if (!workLoop)\n\
    \                return false;\n\n    if (workLoop-<addEventSource(fAudioInterruptSource)\
    \ != kIOReturnSuccess)\n        return false;\n\n    // Setup the initial sample\
    \ rate for the audio engine\n    initialSampleRate.whole = kAudioSampleRate;\n\
    \    initialSampleRate.fraction = 0;\n\n    setDescription(\"My Audio Device\"\
    );\n    setSampleRate(&initialSampleRate);\n\n    // Set the number of sample\
    \ frames in each buffer\n    setNumSampleFramesPerBuffer(kAudioBufferSampleFrames);\n\
    \    setInputSampleLatency(kAudioSampleRate / kAudioInterruptHZ);\n    setOutputSampleOffset(kAudioSampleRate\
    \ / kAudioInterruptHZ);\n\n    fOutputBuffer = (SInt16 *)IOMalloc(kAudioSampleBufferSize);\n\
    \    if (!fOutputBuffer)\n        goto done;\n\n    fInputBuffer = (SInt16 *)IOMalloc(kAudioSampleBufferSize);\n\
    \    if (!fInputBuffer)\n        goto done;\n\n    // Create an IOAudioStream\
    \ for each buffer and add it to this audio engine\n    audioStream = createNewAudioStream(kIOAudioStreamDirectionOutput,\n\
    \                                       fOutputBuffer, kAudioSampleBufferSize);\n\
    \    if (!audioStream)\n        goto done;\n\n    addAudioStream(audioStream);\n\
    \    audioStream->release();\n\n    audioStream = createNewAudioStream(kIOAudioStreamDirectionInput,\n\
    \                                       fInputBuffer, kAudioSampleBufferSize);\n\
    \    if (!audioStream)\n        goto done;\n\n    addAudioStream(audioStream);\n\
    \    audioStream->release();\n\n    result = true;\ndone:\n    return result;\n\
    }\n```\n\nThe first task the method performs is to allocate an `IOTimerEventSource`,\
    \ used to simulate interrupts in lieu of hardware. We also set the description\
    \ using the `setDescription()` method. This string will be visible to the user\
    \ in several places, including in the sound pane of *System Preferences*, as shown\
    \ in [Figure 12-4](#Chapter12.html#fig_12_4).\n\nThe next step is to set the sample\
    \ rate of our engine. The sample rate is a property of the `IOAudioEngine`. Therefore,\
    \ if the engine manages multiple streams, they must all have the same sample rate.\
    \ In the case of `MyAudioDevice`, we set the current sample rate to `kAudioSampleRate`,\
    \ which is defined as 48000 for a 48 kHz sample rate. We also need to define the\
    \ number of samples our sample buffers will contain. If there are multiple streams\
    \ in the same engine, the buffers must be of the same size. In `MyAudioEngine`,\
    \ we use two streams, one for input and one for output. The number of samples\
    \ contained in the buffer is set using the `setNumSampleFramesPerBuffer()` method.\
    \ We currently set it to `kAudioBufferSampleFrames`, which is defined as the sample\
    \ rate divided by two, corresponding to 24000 samples or half a second worth of\
    \ audio. To calculate how many bytes 24000 samples correspond to, use the following\
    \ formula:\n\n```\n24000 samples * 2 channels * (16 bits / 8 bits = 2 bytes) =\
    \  96000 bytes\n```\n\nThis sample buffer size was chosen arbitrarily in our case;\
    \ for a real world device, it will depend on the hardware's capabilities and often\
    \ the size may be configurable. The buffer and other parameters must be defined\
    \ such that Core Audio doesn't write samples to a location before the hardware\
    \ has had the chance to play them.\n\nThe `setInputSampleLatency()` and `setOutputSampleLatency()`\
    \ methods can be used to indicate to Core Audio the time it takes from when samples\
    \ were scheduled to be played until they actually start playing in hardware. Some\
    \ hardware devices may have additional buffering or delay before the audio goes\
    \ out on the DAC. You can also specify input and output latency together using\
    \ `setSampleLatency()`. We set the latency to a single interrupt period (10 milliseconds)\
    \ as we do not have any hardware delay, but we want to give Core Audio some headroom\
    \ before reading and writing samples. We have 100 virtual interrupts per second\
    \ and a sample rate of 48000, the delay corresponds to 480 samples. Again, we\
    \ have simply chosen the value 100 Hz for simplicity; the rate of interrupts for\
    \ an actual device is determined by the audio hardware.\n\nWe also have to allocate\
    \ memory for the sample buffers. In `MyAudioDevice`, we are not performing DMA\
    \ to a hardware device, so we simply allocate the input and output buffer using\
    \ `IOMalloc()`. For a hardware-based driver, you need to either allocate `IOBufferMemoryDescriptor`\
    \ or create a separate `IOMemoryDescriptor` for the buffer. The former is preferred.\
    \ The buffers will then need to be prepared for DMA or I/O transfer. For DMA,\
    \ you will need to translate the buffers' addresses into physical addresses so\
    \ they can be read by the hardware or set up a scatter/gather table, all of which\
    \ can be achieved using the `IODMACommand` class. Each buffer needs to be associated\
    \ with an `IOAudioStream`, which coordinates client access to the buffer. The\
    \ `IOAudioStream` instances are allocated using the method `createNewAudioStream()`,\
    \ which is not a member of `IOAudioEngine` but is defined to avoid duplicating\
    \ code. An `IOAudioStream` is added to the engine using the `addAudioStream()`\
    \ method. Once the streams have been added, the reference can be released; the\
    \ super class will take care of the final release."
  raw: '#### I/O Engine Initialization


    An `IOAudioEngine` has its own `initHardware()` method, which should be overridden
    to perform any I/O engine-specific hardware initialization, as well as allocation
    and initialization of other needed resources. Once the method returns, the engine
    should be ready to start I/O. `performAudioEngineStart()` can then be called to
    start the actual I/O. The `initHardware()` method gets called by the `IOAudioDevice::activateAudioEngine()`
    method in our case. Although `IOAudioEngine` derives from `IOService`, we do not
    override or call the `start()` method in this case. This is because the class
    is allocated and initialized by `MyAudioDevice` rather than by I/O Kit. The `IOAudioEngine`
    provides a default implementation of the `start()` method, which is hardwired
    to use an `IOAudioDevice` as its provider. Unlike `start(),` however, we do declare
    the `stop()` method. The `stop()` method can be implemented to reverse any action
    performed in `initHardware()`. The `initHardware()` method of our `MyAudioDevice`
    driver is shown in [Listing 12-3](#Chapter12.html#list_12_3).


    ***Listing 12-3.** The Implementation of initHardware() in MyAudioDevice*


    `#define kAudioSampleRate                  48000`

    `#define kAudioNumChannels                 2`

    `#define kAudioSampleDepth                 16`

    `#define kAudioSampleWidth                 16`

    `#define kAudioBufferSampleFrames          kAudioSampleRate/2`

    `// Buffer holds half second''s worth of audio.`

    `#define kAudioSampleBufferSize           (kAudioBufferSampleFrames * kAudioNumChannels
    *`

    `                                         (kAudioSampleDepth / 8))`


    `#define kAudioInterruptInterval           10000000 // nanoseconds (1000 ms /
    100 hz = 10ms).`

    `#define kAudioInterruptHZ                 100`


    `bool MyAudioEngine::initHardware(IOService *provider)`

    `{`

    `    bool result = false;`

    `    IOAudioSampleRate initialSampleRate;`

    `    IOAudioStream*    audioStream;`

    `    IOWorkLoop*       workLoop = NULL;`


    `    IOLog("MyAudioEngine[%p]::initHardware(%p)\n", this, provider);`


    `    if (!super::initHardware(provider))`

    `        goto done;`


    `    fAudioInterruptSource = IOTimerEventSource::timerEventSource(this, interruptOccured);`

    `    if (!fAudioInterruptSource)`

    `        return false;`


    `    workLoop = getWorkLoop();`

    `        if (!workLoop)`

    `                return false;`


    `    if (workLoop-<addEventSource(fAudioInterruptSource) != kIOReturnSuccess)`

    `        return false;`


    `    // Setup the initial sample rate for the audio engine`

    `    initialSampleRate.whole = kAudioSampleRate;`

    `    initialSampleRate.fraction = 0;`


    `    setDescription("My Audio Device");`

    `    setSampleRate(&initialSampleRate);`


    `    // Set the number of sample frames in each buffer`

    `    setNumSampleFramesPerBuffer(kAudioBufferSampleFrames);`

    `    setInputSampleLatency(kAudioSampleRate / kAudioInterruptHZ);`

    `    setOutputSampleOffset(kAudioSampleRate / kAudioInterruptHZ);`


    `    fOutputBuffer = (SInt16 *)IOMalloc(kAudioSampleBufferSize);`

    `    if (!fOutputBuffer)`

    `        goto done;`


    `    fInputBuffer = (SInt16 *)IOMalloc(kAudioSampleBufferSize);`

    `    if (!fInputBuffer)`

    `        goto done;`


    `    // Create an IOAudioStream for each buffer and add it to this audio engine`

    `    audioStream = createNewAudioStream(kIOAudioStreamDirectionOutput,`

    `                                       fOutputBuffer, kAudioSampleBufferSize);`

    `    if (!audioStream)`

    `        goto done;`


    `    addAudioStream(audioStream);`

    `    audioStream->release();`


    `    audioStream = createNewAudioStream(kIOAudioStreamDirectionInput,`

    `                                       fInputBuffer, kAudioSampleBufferSize);`

    `    if (!audioStream)`

    `        goto done;`


    `    addAudioStream(audioStream);`

    `    audioStream->release();`


    `    result = true;`

    `done:`

    `    return result;`

    `}`


    The first task the method performs is to allocate an `IOTimerEventSource`, used
    to simulate interrupts in lieu of hardware. We also set the description using
    the `setDescription()` method. This string will be visible to the user in several
    places, including in the sound pane of *System Preferences*, as show in [Figure
    12-4](#Chapter12.html#fig_12_4).


    The next step is to set the sample rate of our engine. The sample rate is a property
    of the `IOAudioEngine`. Therefore, if the engine manages multiple streams, they
    must all have the same sample rate. In the case of `MyAudioDevice`, we set the
    current sample rate to `kAudioSampleRate`, which is defined as 48000 for a 48
    kHz sample rate. We also need to define the number of samples our sample buffers
    will contain. If there are multiple streams in the same engine, the buffers must
    be of the same size. In `MyAudioEngine`, we use two streams, one for input and
    one for output. The number of samples contained in the buffer is set using the
    `setNumSampleFramesPerBuffer()` method. We currently set it to `kAudioBufferSampleFrames`,
    which is defined as the sample rate divided by two, corresponding to 24000 samples
    or half a second worth of audio. To calculate how many bytes 24000 samples correspond
    to, use the following formula:


    * * *


    `24000 samples * 2 channels * (16 bits / 8 bits = 2 bytes) =  96000 bytes`


    * * *


    This sample buffer size was chosen arbitrarily in our case; for a real world device,
    it will depend on the hardware''s capabilities and often the size may be configurable.
    The buffer and other parameters must be defined such that Core Audio doesn''t
    write samples to a location before the hardware has had the chance to play them.


    The `setInputSampleLatency()` and `setOutputSampleLatency()` methods can be used
    to indicate to Core Audio the time it takes from when samples were scheduled to
    be played until they actually start playing in hardware. Some hardware devices
    may have additional buffering or delay before the audio goes out on the DAC. You
    can also specify input and output latency together using `setSampleLatency()`.
    We set the latency to a single interrupt period (10 miliseconds) as we do not
    have any hardware delay, but we want to give Core Audio some headroom before reading
    and writing samples. We have 100 virtual interrupts per second and a sample rate
    of 48000, the delay corresponds to 480 samples. Again, we have simply chosen the
    value 100 Hz for simplicity; the rate of interrupts for an actual device is determined
    by the audio hardware.


    We also have to allocate memory for the sample buffers. In `MyAudioDevice`, we
    are not performing DMA to a hardware device, so we simply allocate the input and
    output buffer using `IOMalloc()`. For a hardware-based driver, you need to either
    allocate `IOBufferMemoryDescriptor` or create a separate `IOMemoryDescriptor`
    for the buffer. The former is preferred. The buffers will then need to be prepared
    for DMA or I/O transfer. For DMA, you will need to translate the buffers'' addresses
    into physical addresses so they can be read by the hardware or set up a scatter/gather
    table, all of which can be achieved using the `IODMACommand` class. Each buffer
    needs to be associated with an `IOAudioStream`, which coordinates client access
    to the buffer. The `IOAudioStream` instances are allocated using the method `createNewAudioStream()`,
    which is not a member of `IOAudioEngine` but is defined to avoid duplicating code.
    An `IOAudioStream` is added to the engine using the `addAudioStream()` method.
    Once the streams have been added, the reference can be released; the super class
    will take care of the final release.'
  trans: "\n# I/O 引擎初始化\n\n`IOAudioEngine` 拥有自己的 `initHardware()` 方法，应重写该方法以执行任何特定于\
    \ I/O 引擎的硬件初始化，以及分配和初始化其他所需资源。一旦该方法返回，引擎应准备好启动 I/O。随后可调用 `performAudioEngineStart()`\
    \ 来启动实际的 I/O。在我们的示例中，`initHardware()` 方法由 `IOAudioDevice::activateAudioEngine()`\
    \ 方法调用。尽管 `IOAudioEngine` 派生自 `IOService`，但在本例中我们并未重写或调用 `start()` 方法。这是因为该类是由\
    \ `MyAudioDevice` 分配和初始化的，而不是由 I/O Kit 完成的。`IOAudioEngine` 提供了 `start()` 方法的默认实现，该实现被硬编码为使用\
    \ `IOAudioDevice` 作为其提供者。但与 `start()` 不同，我们确实声明了 `stop()` 方法。`stop()` 方法可被实现来撤销\
    \ `initHardware()` 中执行的任何操作。我们的 `MyAudioDevice` 驱动的 `initHardware()` 方法如列表 12-3\
    \ 所示。\n\n**列表 12-3.** `MyAudioDevice` 中 `initHardware()` 的实现\n\n```\n#define kAudioSampleRate\
    \                  48000\n#define kAudioNumChannels                 2\n#define\
    \ kAudioSampleDepth                 16\n#define kAudioSampleWidth            \
    \     16\n#define kAudioBufferSampleFrames          kAudioSampleRate/2\n// 缓冲区容纳半秒的音频。\n\
    #define kAudioSampleBufferSize           (kAudioBufferSampleFrames * kAudioNumChannels\
    \ *\n                                         (kAudioSampleDepth / 8))\n\n#define\
    \ kAudioInterruptInterval           10000000 // 纳秒 (1000 ms / 100 hz = 10ms)。\n\
    #define kAudioInterruptHZ                 100\n\nbool MyAudioEngine::initHardware(IOService\
    \ *provider)\n{\n    bool result = false;\n    IOAudioSampleRate initialSampleRate;\n\
    \    IOAudioStream*    audioStream;\n    IOWorkLoop*       workLoop = NULL;\n\n\
    \    IOLog(\"MyAudioEngine[%p]::initHardware(%p)\\n\", this, provider);\n\n  \
    \  if (!super::initHardware(provider))\n        goto done;\n\n    fAudioInterruptSource\
    \ = IOTimerEventSource::timerEventSource(this, interruptOccured);\n    if (!fAudioInterruptSource)\n\
    \        return false;\n\n    workLoop = getWorkLoop();\n        if (!workLoop)\n\
    \                return false;\n\n    if (workLoop-<addEventSource(fAudioInterruptSource)\
    \ != kIOReturnSuccess)\n        return false;\n\n    // 设置音频引擎的初始采样率\n    initialSampleRate.whole\
    \ = kAudioSampleRate;\n    initialSampleRate.fraction = 0;\n\n    setDescription(\"\
    My Audio Device\");\n    setSampleRate(&initialSampleRate);\n\n    // 设置每个缓冲区中的采样帧数\n\
    \    setNumSampleFramesPerBuffer(kAudioBufferSampleFrames);\n    setInputSampleLatency(kAudioSampleRate\
    \ / kAudioInterruptHZ);\n    setOutputSampleOffset(kAudioSampleRate / kAudioInterruptHZ);\n\
    \n    fOutputBuffer = (SInt16 *)IOMalloc(kAudioSampleBufferSize);\n    if (!fOutputBuffer)\n\
    \        goto done;\n\n    fInputBuffer = (SInt16 *)IOMalloc(kAudioSampleBufferSize);\n\
    \    if (!fInputBuffer)\n        goto done;\n\n    // 为每个缓冲区创建一个 IOAudioStream\
    \ 并将其添加到此音频引擎\n    audioStream = createNewAudioStream(kIOAudioStreamDirectionOutput,\n\
    \                                       fOutputBuffer, kAudioSampleBufferSize);\n\
    \    if (!audioStream)\n        goto done;\n\n    addAudioStream(audioStream);\n\
    \    audioStream->release();\n\n    audioStream = createNewAudioStream(kIOAudioStreamDirectionInput,\n\
    \                                       fInputBuffer, kAudioSampleBufferSize);\n\
    \    if (!audioStream)\n        goto done;\n\n    addAudioStream(audioStream);\n\
    \    audioStream->release();\n\n    result = true;\ndone:\n    return result;\n\
    }\n```\n\n该方法执行的第一项任务是分配一个 `IOTimerEventSource`，用于模拟硬件中断。我们还通过 `setDescription()`\
    \ 方法设置了描述。该字符串将在多处对用户可见，包括*系统偏好设置*的“声音”面板，如图 12-4 所示。\n\n下一步是设置引擎的采样率。采样率是 `IOAudioEngine`\
    \ 的一个属性。因此，如果引擎管理多个流，它们必须具有相同的采样率。在 `MyAudioDevice` 的示例中，我们将当前采样率设置为 `kAudioSampleRate`，该值定义为\
    \ 48000，对应 48 kHz 采样率。我们还需要定义采样缓冲区将包含的样本数量。如果同一个引擎中存在多个流，则缓冲区必须具有相同的大小。在 `MyAudioEngine`\
    \ 中，我们使用了两个流，一个用于输入，一个用于输出。缓冲区中包含的样本数通过 `setNumSampleFramesPerBuffer()` 方法设置。我们当前将其设置为\
    \ `kAudioBufferSampleFrames`，定义为采样率除以二，对应 24000 个样本或半秒的音频。要计算 24000 个样本对应的字节数，请使用以下公式：\n\
    \n```\n24000 个样本 * 2 个通道 * (16 位 / 8 位 = 2 字节) = 96000 字节\n```\n\n在本例中，此采样缓冲区大小是任意选择的；对于实际设备，它将取决于硬件的功能，并且大小通常是可配置的。缓冲区和其它参数的定义必须确保\
    \ Core Audio 不会在硬件有机会播放样本之前将样本写入某个位置。\n\n`setInputSampleLatency()` 和 `setOutputSampleLatency()`\
    \ 方法可用于向 Core Audio 指示从计划播放样本到它们在硬件中实际开始播放所需的时间。某些硬件设备在音频输出到 DAC 之前可能会有额外的缓冲或延迟。您也可以使用\
    \ `setSampleLatency()` 同时指定输入和输出延迟。我们将延迟设置为一个中断周期（10 毫秒），因为我们没有任何硬件延迟，但我们希望在读写样本之前为\
    \ Core Audio 提供一些余量。我们每秒有 100 个虚拟中断，采样率为 48000，延迟对应 480 个样本。同样，为了简单起见，我们只是选择了\
    \ 100 Hz 这个值；实际设备的中断速率由音频硬件决定。\n\n我们还必须为样本缓冲区分配内存。在 `MyAudioDevice` 中，我们没有对硬件设备执行\
    \ DMA，因此我们简单地使用 `IOMalloc()` 分配输入和输出缓冲区。对于基于硬件的驱动程序，您需要分配 `IOBufferMemoryDescriptor`\
    \ 或为缓冲区创建一个单独的 `IOMemoryDescriptor`。前者是首选方法。然后需要准备缓冲区以进行 DMA 或 I/O 传输。对于 DMA，您需要将缓冲区的地址转换为物理地址，以便硬件能够读取它们，或者建立一份分散/聚集表，所有这些都可以通过\
    \ `IODMACommand` 类来实现。每个缓冲区需要与一个 `IOAudioStream` 关联，该流协调客户端对缓冲区的访问。`IOAudioStream`\
    \ 实例使用 `createNewAudioStream()` 方法分配，该方法不是 `IOAudioEngine` 的成员，而是为了减少代码重复而定义的。`IOAudioStream`\
    \ 通过 `addAudioStream()` 方法添加到引擎中。添加流之后，可以释放引用；父类将负责最终的释放。\n"
- fmt: '### Creating and Initializing Audio Streams


    An `IOAudioEngine` needs at least one `IOAudioStream` in order to do anything
    useful. A stream is associated with exactly one sample buffer and describes the
    formats and sample rate supported by the buffer. A stream is either an output
    or an input stream. Under the hood, `IOAudioStream` handles the mechanics of getting
    data in and out from the sample buffer. Internally, it maintains a mix buffer,
    in which audio data from multiple clients is mixed together in a single stream
    before ending up in the final sample buffer destined for the hardware. Maintaining
    the mix and sample buffers are the most complicated tasks an audio driver performs,
    and it''s all handled for us by the `IOAudioStream` class. For most cases, the
    default behavior of `IOAudioStream` should be sufficient; however, if your driver
    needs more advanced capabilities, you can override most methods in `IOAudioStream`
    to provide custom behavior. Shown below is the `createNewAudioStream()` method
    of `MyAudioEngine` responsible for creating the input and output stream.


    ```

    IOAudioStream *MyAudioEngine::createNewAudioStream(IOAudioStreamDirection direction,

                                                       void* sampleBuffer, UInt32
    sampleBufferSize)

    {

        IOAudioStream* audioStream;


        audioStream = new IOAudioStream;

        if (audioStream) {

            if (!audioStream->initWithAudioEngine(this, direction, 1)) {

                audioStream->release();

            } else {

                IOAudioSampleRate rate;

                IOAudioStreamFormat format = {

                    2,                                                  // num channels

                    kIOAudioStreamSampleFormatLinearPCM,            // sample format

                    kIOAudioStreamNumericRepresentationSignedInt,   // numeric format

                    kAudioSampleDepth,                              // 16-bit

                    kAudioSampleWidth,                              // 16-bit

                    kIOAudioStreamAlignmentHighByte,                // high byte aligned
    - unused

                                                                    // because bit
    depth == bit

                                                                    // width

                    kIOAudioStreamByteOrderBigEndian,               

                    true,                                           // format is mixable

                    0                                               // driver-defined
    tag - unused

                                                                    // by this driver

                };

                audioStream->setSampleBuffer(sampleBuffer, sampleBufferSize);            

                rate.fraction = 0;

                rate.whole = kAudioSampleRate;

                audioStream->addAvailableFormat(&format, &rate, &rate);

                audioStream->setFormat(&format);

            }

        }

        return audioStream;

    }

    ```


    The format of the sample buffer is described by the `IOAudioStreamFormat` structure.
    In the preceding case, we only added a single format and a single sample rate.
    You can define multiple supported formats and rates and add them by calling `addAvailableFormat()`
    for each defined format. The specification for our stream is Linear PCM signed
    integer samples at 16-bit depth/width in big-endian byte order. In most cases,
    bit depth and bit width are the same, such as for 16-bit samples. The depth specifies
    the number of bits used by the audio sample, whereas the width specifies the width
    in bits of the data word it''s stored in. For example, this is used if you have
    24-bit samples. A 24-bit sample occupies three bytes, which is awkward to work
    with and to align properly, so we instead use a 32-bit word to store each sample,
    which is more efficient in terms of performance (though it will waste eight bits
    per sample). If the width and depth do not match, the next field in the `IOAudioStreamFormat`
    structure must be set to either `kIOAudioStreamAlignmentHighByte` or `kIOAudioStreamAlignmentLowByte`
    to specify the alignment of the sample within the data word.


    ### Handling Format Changes


    Your `IOAudioEngine` will need to respond to requests from Core Audio to change
    the format of the engine''s audio streams. Requests to change format are handled
    with the `performFormatChange()` method, which should be overridden as the default
    is a stub that simply returns an error. The Apple `IOAudioFamily` sample implements
    the format change method, as follows:


    ```

    IOReturn SampleAudioEngine::performFormatChange(IOAudioStream *audioStream,

                                                    const IOAudioStreamFormat *newFormat,

                                                    const IOAudioSampleRate *newSampleRate)

    {

        IOLog("SampleAudioEngine[%p]::peformFormatChange(%p, %p, %p)\n", this, audioStream,
    newFormat, newSampleRate);


        // Since we only allow one format, we only need to be concerned with sample
    rate changes

        // In this case, we only allow two sample rates, 44100 and 48000,

        // so those are the only ones we check for.

        if (newSampleRate) {

            switch (newSampleRate->whole) {

                case 44100:

                    IOLog("/t-> 44.1kHz selected\n");

                    // Add code to switch hardware to 44.1khz

                    break;

                case 48000:

                    IOLog("/t-> 48kHz selected\n");

                    // Add code to switch hardware to 48kHz

                    break;

                default:

                    // This should not be possible since we only specified 44100 and
    48000

                    // as valid sample rates

                    IOLog("/t Internal Error - unknown sample rate selected.\n");

                    break;

            }

        }

        return kIOReturnSuccess;

    }

    ```


    ![images](images/square.jpg) **Note**: The `performFormatChange()` method will
    be called only for formats specified when `IOAudioStreams` were created.'
