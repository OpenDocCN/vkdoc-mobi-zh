    \ TCP 或 UDP）处理之前被调用。如果 IP 数据包是分片包，则会在传递给过滤器函数之前先完成重组。对于传出的数据包，过滤器函数将在数据包被分片之前被调用。通常情况下，一个数据包只会被过滤器函数处理一次。但有一个例外：如果数据包使用了像\
    \ IPSec 这样的加密方案，其中可能包含另一个加密的 IP 数据包。在这种情况下，过滤器函数将针对加密数据包和解密后的有效载荷各被调用一次。\n\nIP\
    \ 过滤器会跨网络接口工作，因此你会看到来自和发往系统中所有活动接口的数据包。如果你需要知道数据包来自哪个接口，可以从 `mbuf` 数据包头部获取该信息。对于传出数据包，此信息尚不可用，因为数据包到网络接口的路由是在输出过滤器函数被调用之后才进行的。这是有意设计的，因为过滤器函数有可能修改数据包的目的地址，我们稍后将看到这一点。\n\
    \nIP 过滤器不仅限于检查数据包；还可以修改数据包、拒绝数据包，以及注入你自己的数据包。为了演示 IP 过滤器的强大功能，我们可以将清单 13-4 中的\
    \ `ipf_output` 过滤器函数修改为新版本：\n\n```c\nstatic errno_t myipfilter_output_redirect(void*\
    \ cookie, mbuf_t* data, ipf_pktopts_t options)\n{\n    struct in_addr addr_old;\n\
    \    struct in_addr addr_new;\n    int ret;\n\n    struct ip* ip = (struct ip*)mbuf_data(*data);\n\
    \    if (ip->ip_v != 4)\n        return 0;\n\n    addr_old.s_addr = htonl(134744072);\
    \ // 8.8.8.8\n    addr_new.s_addr = htonl(167837964); // 10.1.1.12\n\n    // 将发往\
    \ 8.8.8.8 的数据包重定向到 IP 地址 10.1.1.12\n    if (ip->ip_dst.s_addr == addr_old.s_addr)\n\
    \    {\n        ip->ip_dst = addr_new;\n        myipfilter_update_cksum(*data);\n\
    \        ret = ipf_inject_output(*data, g_filter_ref, options);\n        return\
    \ ret == 0 ? EJUSTRETURN : ret;\n    }\n    return 0;\n}\n```\n\n上述示例会将所有发往公网\
    \ IP 地址（`8.8.8.8`）的 IP 流量重定向到我们网络中的某个内网 IP 地址（`10.1.1.12`）。我们通过检查 IP 目的地址来实现；如果匹配我们的目标地址，就修改数据包的目的地址为新地址。由于我们修改了数据包，需要重新注入它。这会导致修改后的数据包被视为新数据包，从而再次经过我们的过滤器。通过在注入数据包时传入我们过滤器的引用，可以防止该数据包被我们的过滤器再次处理，如上例所示。\n\
    \n由于我们已重新注入了数据包，需要阻止原始数据包继续向前传递，这通过返回 `EJUSTRETURN` 来实现。这将告知调用者停止处理该数据包，但无需释放它。要完全丢弃一个数据包，可以返回非零值或除\
    \ `EJUSTRETURN` 以外的值，这将导致调用者停止处理并释放该数据包。这些规则同时适用于传入和传出的数据包。在修改 IP 数据包的头部时，需要更新其校验和（CRC），以防止数据包因被视为损坏而被丢弃。IP\
    \ 校验和仅覆盖自身的头部，不包括有效载荷。TCP 和 UDP 的校验和计算会用到 IP 头部的部分字段，包括源地址和目的地址。因此，如果修改了 IP 头部的地址字段，UDP\
    \ 和 TCP 的校验和也需要重新计算。可以使用 `mbuf_inet_cksum()` 函数为 `mbuf_t` 计算 IP、TCP 和 UDP 的校验和。有关如何更新校验和的示例，请参见本书示例项目\
    \ MyIPFilter 中的 `myipfilter_update_cksum()` 函数。\n\n现在我们可以使用 `ping` 命令行工具来测试修改后的\
    \ IP 过滤器功能是否正常：\n\n```\n$ ping 8.8.8.8\nPING 8.8.8.8 (8.8.8.8): 56 data bytes\n\
    64 bytes from 10.1.1.12: icmp_seq=0 ttl=64 time=307.636 ms\n64 bytes from 10.1.1.12:\
    \ icmp_seq=1 ttl=64 time=2.513 ms\n```\n\n如你所见，我们现在会从 `10.1.1.12` 收到回复，而不是原来的\
    \ IP 地址。这在与使用 RAW 套接字的 `ping` 工具配合时可以正常工作。然而，对于像 `ssh` 这样基于常规套接字的应用程序，我们还需要修改传入数据包的源地址，以实现完整的双向通信；否则，当\
    \ IP 协议栈收到来自 `10.1.1.12` 主机的未请求数据包时，会产生混乱。你可以修改 `ipf_input` 过滤器函数来处理传入数据包，将源地址从\
    \ `10.1.1.12` 转换回 `8.8.8.8`，从而确保数据包被引导到正确的应用程序（该应用程序仍认为我们在与 `8.8.8.8` 通信）。这在概念上与网络地址转换（NAT）技术的实现方式类似。NAT\
    \ 是 Mac OS X 的互联网共享功能所使用的技术，也是 iPhone 将其 3G 连接共享给其他无线设备的技术。请参考 MyIPFilter 示例的完整源代码，了解如何在数据包输入时进行修改。\n\
    \n尽管在前面的示例中我们只修改了目的地址，但实际上可以修改数据包的任意部分，包括应用层数据。也可以完全用新数据包替换原有数据包。一个典型 IP 数据包的结构如图\
    \ 13-3 所示。\n\n![images](img/1303.jpg)\n\n***图 13-3.** 包含 IP、TCP 头部和数据有效载荷的以太网帧*\n\
    ```"
- fmt: "对于入站和出站数据包，过滤函数将看到完整的数据包，但传递给过滤函数的数据包数据不会包含任何数据链路层头部（例如以太网头部），因为这些头部会在数据包进入\
    \ IP 协议栈（我们的过滤函数会被调用）之前被处理。同样，对于出站数据包，以太网或其他数据链路层头部会在数据包通过过滤函数之后才被附加。再次强调，如果你更新了数据包的任意部分，必须确保相关的校验和也得到更新。\n\
    \n## 接口过滤器\n\n接口过滤器是使用过滤机制时最接近底层硬件的方案。它在数据包被网络接口发送或接收之前和之后立即执行操作。如果数据包的目标是一个物理接口（而非环回或虚拟接口），它很可能会被发送到`I/O\
    \ Kit`驱动程序进行物理传输。与`IP`或套接字过滤器不同，接口过滤器只绑定到单一接口；而`IP`或套接字过滤器会看到系统中所有接口的聚合数据包流量。如果你需要在多个接口上过滤数据包，必须为每个接口注册多个过滤器。接口过滤器机制与套接字和`IP`过滤器非常相似。与套接字过滤器一样，接口过滤器也可以拦截带外事件，例如发送到接口的`ioctl()`消息——例如，设置或获取`IP`地址、网络掩码或`MTU`（最大传输单元）的请求。接口过滤器还可以捕获通过内核事件`API`发送到接口的事件。与套接字和`IP`过滤器相同，接口过滤器允许插入、修改、拒绝和延迟数据包。接口过滤器由`iff_filter`结构体定义：\n\
    \n```\nstruct iff_filter {\n    void*             iff_cookie;\n    const char*\
    \       iff_name;\n    protocol_family_t iff_protocol;\n    iff_input_func   \
    \ iff_input;\n    iff_output_func   iff_output;\n    iff_event_func    iff_event;\n\
    \    iff_ioctl_func    iff_ioctl;\n    iff_detached_func iff_detached;\n};\n```\n\
    \n所有过滤函数都是可选的，你可以将不关心的函数留为`NULL`。与`IP`或套接字过滤器不同，接口过滤器会看到所有协议的数据包，这包括在内核中处理的协议（例如`ARP`）。如果你的过滤器只关心`IP`数据包，可以使用`iff_protocol`字段指定`AF_INET`（IPv4）或`AF_INET6`（IPv6），这将确保过滤函数不会被其他协议调用。但只能指定协议族，而不能指定单个协议（如`TCP`或`UDP`）。此外，如果你的过滤器需要检查`IP`数据包，请注意`IP`数据包可能已被分片；并且当使用`IPSec`时，你将没有机会检查加密的`IP`头部。[列表\
    \ 13-5](#Chapter13.html#list_13_5) 展示了一个简单接口过滤器的实现。\n\n***列表 13-5.** MyInterfaceFilter：一个简单的网络接口过滤器*\n\
    \n```\n#include <libkern/libkern.h>\n#include <sys/errno.h>\n#include <sys/kpi_mbuf.h>\n\
    #include <mach/mach_types.h>\n#include <net/kpi_interfacefilter.h>\n\n#include\
    \ <netinet/in.h>\n#include <netinet/ip.h>\n#include <net/ethernet.h>\n\nstatic\
    \ boolean_t g_filter_registered = TRUE;\nstatic boolean_t g_filter_detached =\
    \ FALSE;\nstatic interface_filter_t g_filter_ref;\n\nstatic errno_t myif_filter_input(void*\
    \ cookie, ifnet_t interface, protocol_family_t protocol,\n                   \
    \              mbuf_t* data, char** frame_ptr)\n{\n    printf(\"incoming packet:\
    \ %lu bytes\\n\", mbuf_pkthdr_len(*data));\n    return 0;\n}\n\nstatic errno_t\
    \ myif_filter_output(void* cookie, ifnet_t interface, protocol_family_t protocol,\n\
    \                                  mbuf_t* data)\n{\n    printf(\"outgoing packet:\
    \ %lu bytes\\n\", mbuf_pkthdr_len(*data));\n    return 0;\n}\nstatic void myif_filter_detached(void*\
    \ cookie, ifnet_t interface)\n{\n    g_filter_detached = TRUE;\n}\n\nstatic struct\
    \ iff_filter g_my_iff_filter =\n{\n    NULL,\n    \"com.osxkernel.MyInterfaceFilter\"\
    ,\n    0,\n    myif_filter_input,\n    myif_filter_output,\n    NULL,\n    NULL,\n\
    \    myif_filter_detached,\n};\n\nkern_return_t MyInterfaceFilter_start (kmod_info_t*\
    \ ki, void* d)\n{\n    ifnet_t interface;\n\n    if (ifnet_find_by_name(\"en1\"\
    , &interface) != KERN_SUCCESS) // change to your own interface\n        return\
    \ KERN_FAILURE;\n```"
  raw: 'In the case of both incoming and outgoing packets, a filter function will
    see the complete packet, but the packet data passed to the filter function will
    not include any data-link layer headers, such as an Ethernet header, because that
    will be processed before the packet enters the IP stack where our filter function
    gets called. Similarly for outgoing packets, the Ethernet, or other data-link
    layer header, will be attached after the packet goes through the filter function.
    Again, if you update any part of the packet, you must ensure that relevant checksums
    are updated as well.


    #### Interface Filters


    Interface filters are as close to the metal as we can get using a filtering mechanism.
    Interface filters operate just before and after a packet is sent or received by
    a network interface. If a packet is destined for a physical interface, as opposed
    to a loopback or virtual interface, it will likely be sent to an I/O Kit driver
    for physical transmission. An interface filter is bound to only one interface,
    unlike an IP or socket filter, which sees the aggregate packet flow of all interfaces
    in the system. If you need to filter packets on multiple interfaces, you must
    register multiple filters, one for each interface. The interface filter mechanism
    is very similar to that of socket and IP filters. As with socket filters, interface
    filters can also intercept out-of-band events, such as `ioctl()` messages sent
    to the interface—for example, requests to set or get the IP address, network mask,
    or MTU (maximum transfer unit). An interface filter can also trap events to the
    interface sent via the kernel event API. As with socket and IP filters, interface
    filters allow insertion, modification, rejection, and delay of packets. An interface
    filter is defined by the `iff_filter` structure:


    `struct iff_filter {`

    `    void*             iff_cookie;`

    `    const char*       iff_name;`

    `    protocol_family_t iff_protocol;`

    `    iff_input_func    iff_input;`

    `    iff_output_func   iff_output;`

    `    iff_event_func    iff_event;`

    `    iff_ioctl_func    iff_ioctl;`

    `    iff_detached_func iff_detached;`

    `};`


    All the filter functions are optional, and functions you do not care about can
    be left as `NULL`. Unlike an IP or socket filter, an interface filter will see
    all packets regardless of protocol, which will include protocols handled in the
    kernel, such as ARP. If your filter is interested only in IP packets, you can
    use the `iff_protocol` field to specify `AF_INET` for IPv4 or `AF_INET6` for IPv6,
    which will ensure that the filter function will not be called for other protocols.
    It is only possible to specify protocol families, not individual protocols, like
    TCP or UDP. Furthermore, if your filter needs to examine IP packets, be aware
    that the IP packets may now be fragmented, and you will not have the opportunity
    to examine encrypted IP headers when IPSec is used. [Listing 13-5](#Chapter13.html#list_13_5)
    shows the implementation of a simple interface filter.


    ***Listing 13-5.** MyInterfaceFilter: A Simple Network Interface Filter*


