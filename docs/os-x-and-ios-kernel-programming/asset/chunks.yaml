    Notice that although the transport driver for the RAM disk has no concept of a
    block size (since its minimum addressable unit was a byte), the `IOBlockStorageDevice`
    interface expresses the disk capacity in blocks, and operates on blocks when performing
    a read or write operation. For this reason, the nub driver''s implementation defines
    an arbitrary block size of 512 bytes.


