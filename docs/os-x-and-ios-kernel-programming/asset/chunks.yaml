    \ KPI instead. Outgoing packets can be injected using the function `ifnet_output_raw()`\
    \ or using the function `ifnet_input()` to inject an inbound packet. For an example\
    \ of how `inet_output_raw()` can be used, refer to the source code of the sample\
    \ driver `MyEthernetDriver` discussed later in this chapter.\n\n## Debugging and\
    \ Testing Network Extensions\n\nApart from the general techniques discussed in\
    \ [Chapter 16](#Chapter16.html#ch16), \"Debugging and Profiling,\" Mac OS X comes\
    \ with some tools that allow debugging of network issues, the most notable of\
    \ which are perhaps the command line tools `tcpdump` and `netcat`. The former\
    \ utilizes the `libpcap` library, which again is built on top of the Berkeley\
    \ Packet Filter (BPF) infrastructure, which is built into the kernel network stack.\
    \ BPF can plug into each network interface and install hooks, which allow incoming\
    \ and outgoing packets to be diverted to a character device file (`/dev/bpfX`)\
    \ and can thereby be analyzed by tools such as `tcpdump`. The `tcpdump` utility\
    \ allows you to view the packet flow live, or to capture it to a file for later\
    \ analysis. A wide range of third party tools can work with the packet traces\
    \ captured from `tcpdump`. If possible, the `tcpdump` utility will put the monitored\
    \ interface into promiscuous mode. Promiscuous mode is a firmware feature of most\
    \ network devices that tells it to forward packets, even if they are not addressed\
    \ to its own hardware address. Newer versions of Mac OS X require root privileges\
    \ in order to run `tcpdump`, even if promiscuous mode is disabled. Capturing packets\
    \ from a busy network can be difficult due to the sheer amount of data. To address\
    \ this, `tcpdump` takes advantage of the filtering capabilities of the BPF, which\
    \ allows you to filter out packets based on a wide range of criteria ranging from\
    \ the hardware address to the individual flags of the TCP header. The following\
    \ is an example of `tcpdump` output:\n\n```\n$ sudo tcpdump -i en0\ntcpdump: verbose\
