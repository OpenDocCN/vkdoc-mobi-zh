  trans: '

    # 配置软件包


    从图 18-3 所示配置窗格中选择“编辑界面”选项，将显示软件包在通过`Installer.app`打开时的呈现视图。`PackageMaker`允许您交互式地编辑文本并设置背景图像。您还可以添加本地化设置，以便提供其他语言的说明。


    主窗格包含三个标签页，如图图 18-3 所示。“需求”标签页用于配置适用于整个软件包的全局需求。您也可以为各个选项单独设置需求，这样即使系统不满足某些选项的需求，用户仍可安装其他组件。需求可在需求编辑器中指定，其中包含许多可配置的预定义检查项。以下是可用测试的子集：


    - 目标卷可用兆字节数

    - 最低 CPU 频率（Hz）

    - 可用内存（字节）

    - 系统 OS 版本 / 目标 OS 版本

    - 系统中存在文件

    - FireWire、USB、PCI 设备存在

    - 脚本执行结果


    当预定义测试均不适用时，最后一个选项“脚本执行结果”尤为实用。您可以编写 Shell 脚本执行自定义测试，并根据脚本的返回代码让安装程序执行相应操作。您还可以指定当需求测试失败时显示的自定义错误信息。“操作”标签页允许您配置可自动执行的操作，包括安装前或安装后的操作。例如，对于`HelloWorld`软件包，我们可能希望确保在安装新版本之前，先卸载任何先前安装的`HelloWorld.kext`。我们可以像图
    18-4 所示那样定义此操作。


    ![images](img/1804.jpg)


    ***图 18-4.** 操作编辑器*


    在某些情况下，假设您有一个 USB 设备的驱动程序：您可能希望在安装新驱动程序之前，确保所有使用该设备的应用程序都已关闭。正在运行的应用程序可能会阻止驱动程序正常卸载。您可能会注意到没有运行程序或脚本的选项；不过，这可以通过选择文件并选择“脚本”标签页，在逐个文件的基础上实现。


    ![images](img/1805.jpg)


    ***图 18-5.** 单个软件包的配置窗格*


    到目前为止，我们使用术语“软件包”来指代整个项目，但在`PackageMaker`的术语中，我们实际上指的是一个分发版，它由多个较小的软件包组成。这些较小的软件包由添加到分发版中的单个文件或对象（如
    KEXT、应用程序包或 PDF 文件）构成。每个对象都关联有元数据和版本信息。


    图 18-5 显示了添加到分发版中的软件包的主配置窗格。“安装”字段指定源位置，而“目标”字段指定对象将安装在文件系统中的位置。选中“允许自定义位置”选项可让用户指定其他位置。源位置和目标位置可以是相对路径或绝对路径。大多数情况下，建议使用前者。在前述示例（图
    18-5）中，我们对源文件使用了相对位置，对目标位置使用了文件系统中的绝对路径，因为该文件必须安装到该目录中，且不能根据用户偏好重新定位。对于 KEXT 也是如此，我们需要它位于`/System/Library/Extensions`目录下。相对路径是相对于`PackageMaker`项目所在的位置。


    “补丁”字段允许您指定正在安装对象的旧版本，以便安装程序可以修补现有文件，而不是安装一个全新的文件。


    在配置窗格中，您还可以为每个软件包单独指定版本号和标识符。“重启操作”允许您在安装完成后提示用户重新启动计算机。如果您有必须启动的启动代理或守护程序，或者您替换了系统运行时难以重新加载的驱动程序（例如存储或图形驱动程序），则可能需要进行此操作。您还可以要求用户注销或关闭系统。“需要管理员身份验证”复选框将在允许安装软件包之前提示用户输入管理员密码。如果您将文件安装在用户主目录之外，通常必须指定此项，因为安装程序默认没有管理员权限。大多数
    KEXT，特别是驱动程序，必须安装在`/System`目录下，而普通用户通常没有该目录的写入权限。


    最后，“软件包位置”字段允许指定安装软件包对象文件的备用位置；例如，您可以指定一个 HTTP URL。


    软件包的“内容”标签页如图 18-6 所示。


    ![images](img/1806.jpg)


    ***图 18-6.** 软件包配置窗格的“内容”标签页*


    “内容”标签页允许您检查软件包的各个文件。通常，软件包由一个包（bundle）或单个文件组成。一个包可能包含其他包或任意文件。如果需要排除某些文件，您可以指定正则表达式模式来实现。例如，来自源代码版本控制系统（如
    Subversion）的元数据目录，可以通过模式`*/\.svn$`排除。您还可以配置文件安装到文件系统后各个文件应具有的权限。“应用建议”按钮将根据文件类型和预期目标位置推测正确的权限。


    ![images](img/square.jpg) **注意** 内核扩展（Kernel Extensions）对其权限非常挑剔，必须由*root*用户和*wheel*组所有。此外，所有者必须具有读写和执行权限，而组应仅具有读和执行权限。这对应于
    UNIX 权限掩码 0755。元数据文件（例如`Info.plist`文件）无需设置可执行位。


    “脚本”标签页允许为软件包定义安装前和安装后脚本。这些脚本可用于执行无法通过“操作”编辑器定义的自定义安装步骤。您可能希望使用安装前脚本在守护程序或应用程序被新版本替换之前将其关闭。您还可以清理新版本不再需要的文件。脚本通常使用
    Bash 或其他脚本语言编写。如果您从脚本中删除旧文件，请谨慎使用`rm`命令，因为您的软件包可能以管理员权限运行，指定错误的文件名可能导致误删错误的文件或目录。例如，考虑以下命令：`rm
    –rf /System/Library/$MYKEXT`。如果`$MYKEXT`变量最终为空，该命令将转而删除`/System/Library`目录。随之而来的将是非常不满的客户。

    '
- fmt: "#### Building the Package\n\nOnce you have finished adding and configuring\
    \ all the parts you want included in the distribution, you can build it by pressing\
    \ the “Build” or “Build and Run” on the toolbar. The latter will open the package\
    \ in `Installer.app` once the building finishes. During the build phase, the package\
    \ will be validated and checked; if there are errors or warnings, you can correct\
    \ them and rebuild the package. The end result will look something like [Figure\
    \ 18-7](#Chapter18.html#fig_18_7).\n\n![images](images/1807.jpg)\n\n***Figure\
    \ 18-7.** Package as presented when launched with `Installer.app`*\n\nThe resulting\
    \ package will be written to the filename `<Title>.pkg`. The package is compressed\
    \ and not a bundle, so the contents cannot readily be inspected in Finder. When\
    \ you save a PackageMaker project, it will be saved as a bundle named `<Title>.pmdoc`.\
    \ The project bundle contains XML files that define the project. You can edit\
    \ these with a text editor or automatically replace or update contents with a\
    \ script during your product’s build process. If you wish to build the package\
    \ from the command line, you can do the following:\n\n```\n$ /Developer/Applications/Utilities/PackageMaker.app/Contents/MacOS/PackageMaker\
    \ --doc HelloWorld.pmdoc --version 2.0 --title 'HelloWorld'\n```\n\nThe preceding\
    \ command builds `<Title>.pkg` with a version number of 2.0.\n\n#### Uninstalling\
    \ Packages\n\nUnfortunately, no mechanism exists for automatically uninstalling\
    \ packages created with PackageMaker. To uninstall a package manually, you would\
    \ need to identify the files installed by the package and delete them. You would\
    \ also have to stop and remove any Launch Agents or Daemons installed by the package.\
    \ A better option would be to provide your users with a script or program that\
    \ performs the uninstall for them. PackageMaker are able to handle upgrades, however.\n\
    \n### Summary\n\nIn this chapter, we have looked at the following:\n\n- How the\
    \ system loads I/O Kit kernel extensions automatically and how to manually load\
    \ other types of KEXTs (such as Network Kernel Extensions) that are not loaded\
    \ automatically. The latter is usually achieved using a Launch Daemon.\n- Versioning\
    \ the interface between a KEXT and user space is important in order to avoid breaking\
    \ older/newer applications that run against it. One strategy to deal with this\
    \ is to include a version number in a shared header file.\n- Quality assurance\
    \ and testing is an important part of the development cycle and is the last point\
    \ of defense before software is distributed to a customer. It is important to\
    \ properly test all aspects and usage patterns of the software on all supported\
    \ platforms.\n- The PackageMaker software is the preferred way of distributing\
    \ more complex software packages on Mac OS X; i.e., things that include multiple\
    \ components, such as KEXTs, helper daemons, and end–user applications.\n- PackageMaker\
    \ is a tool distributed with Xcode. PackageMaker can be used via a graphical user\
    \ interface or the command line. Packages created with PackageMaker are installed\
    \ using the `Installer.app` application.\n- PackageMaker does not provide a mechanism\
    \ for uninstalling packages.\n\n## Index\n\n### ![images](images/square2.jpg)\
