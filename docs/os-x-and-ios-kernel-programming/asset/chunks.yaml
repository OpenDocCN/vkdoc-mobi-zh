  raw: '***Listing 4-1.** The Driver Personalities for a Hypothetical External Disk,
    Containing Matching Dictionaries for both FireWire and USB Connections*


    `<key>IOKitPersonalities</key>`

    `<dict>`

    `        <key>MyExternalDiskFireWire</key>`

    `        <dict>`

    `                <key>CFBundleIdentifier</key>`

    `                <string>com.mycompany.driver.MyExternalDiskDriver</string>`

    `                <key>IOClass</key>`

    `                <string>com_mycompany_driver_MyExternalDiskDriver</string>`

    `                <key>IOProviderClass</key>`

    `                <string>IOFireWireUnit</string>`

    `                <key>Unit_SW_Version</key>`

    `                <integer>1111</integer>`

    `                <key>Unit_Spec_ID</key>`

    `                <integer>2222</integer>`

    `        </dict>`

    `        <key>MyExternalDiskUSB</key>`

    `        <dict>`

    `                <key>CFBundleIdentifier</key>`

    `                <string>com.mycompany.driver.MyExternalDiskDriver</string>`

    `                <key>IOClass</key>`

    `                <string>com_mycompany_driver_MyExternalDiskDriverUSB</string>`

    `                <key>IOProviderClass</key>`

    `                <string>IOUSBDevice</string>`

    `                <key>idProduct</key>`

    `                <integer>3333</integer>`

    `                <key>idVendor</key>`

    `                <integer>4444</integer>`

    `                <key>IOProbeScore</key>`

    `                <integer>9000</integer>`


    `        </dict>`

    `</dict>`


    [Listing 4-1](#Chapter04.html#list_4_1) shows the matching dictionary for a hypothetical
    external disk device that features both FireWire and USB connections. As such,
    it contains two entries in its matching dictionary, the first of which matches
    against a specific FireWire device, and another that matches against a specific
    USB device. The driver class `com_mycompany_driver_MyExternalDiskDriver` will
    be instantiated and given a chance to probe the device whenever a FireWire device
    with a unit software version of 1111 and a unit spec ID of 2222 is plugged in
    to the computer. Likewise, the driver class `com_mycompany_driver_MyExternalDiskDriverUSB`
    will be instantiated and given a chance to probe the device whenever a USB device
    with a product ID of 3333 and a vendor ID of 4444 is plugged into the computer.
    The USB device will have a default probe score of 9000, which should make it the
    preferred driver for this device.


    #### The Driver Class


    As we saw in the previous section, when the I/O Kit loads a driver, it does so
    by instantiating a class that is designated in the driver''s property list. This
    class must be a subclass of the `IOService` class, either directly or by subclassing
    a class that is itself a child of the `IOService` class. The `IOService` class
    provides virtual methods that are called at various points during the lifetime
    of the driver—for example, when it is loaded and initialized, when it should probe
    its provider, and when the driver is stopped. Because these methods are declared
    as virtual methods in the definition of the `IOService` class, they can be easily
    overridden in the custom driver class that inherits from `IOService`.


    At this point, it may be a good time to put what you have learned into practice
    by creating a simple I/O Kit driver. To begin, open Xcode and create a new project
    based on the “IOKit Driver” template. When prompted for a product name, enter
    “IOKitTest”. You can use the company identifier “com.osxkernel”, which is a domain
    name that has been registered for the purposes of this book. Xcode will create
    a project for you with two files, a C++ implementation file named “IOKitTest.cpp”
    and its corresponding header file named “IOKitTest.h”.


    Let''s begin by declaring the class definition of our driver. Given that we are
    implementing a generic driver, and not one that provides specialized functionality
    such as a serial port or disk storage, we will define our driver''s main class
    as a subclass of `IOService` and not one of the more specialized classes that
    the I/O Kit provides. Enter in the text from [Listing 4-2](#Chapter04.html#list_4_2)
    as the contents of IOKitTest.h.


    ***Listing 4-2.** The “IOKitTest.h” Tutorial*


    `#include <IOKit/IOService.h>`


    `class com_osxkernel_driver_IOKitTest : public IOService`

    `{`

    `        OSDeclareDefaultStructors(com_osxkernel_driver_IOKitTest)`


    `public:`

    `        virtual bool    init (OSDictionary* dictionary = NULL);`

    `        virtual void    free (void);`


    `        virtual IOService*      probe (IOService* provider, SInt32* score);`

    `        virtual bool    start (IOService* provider);`

    `        virtual void    stop (IOService* provider);`

    `};`


    The contents of the header file should be fairly straightforward, with the possible
    exception of the macro `OSDeclareDefaultStructors`. As you will recall from [Chapter
    3](#Chapter03.html#ch3), the I/O Kit is implemented in a subset of the C++ language
    that does not include exceptions and runtime type information. The macro `OSDeclareDefaultStructors`
    is needed as a consequence of both of these limitations; it provides the declaration
    of the class''s constructor and destructor and metadata that provides the custom
    implementation of the I/O Kit''s version of runtime type information. We discuss
    this in greater depth later in this chapter.


    ![images](images/square.jpg) **Note** You may be wondering why we used such an
    elaborate name for our class. The kernel has a global namespace into which all
    symbols (including class names, functions, and global variables) exported by any
    active kernel extensions are loaded. The kernel will refuse to load an extension
    that contains symbols that collide with an extension that is already loaded, and
    so to avoid this, Apple recommends that all global functions, classes, and variables
    are decorated with a reverse-DNS naming scheme.


    The implementation of the driver class should be placed in the file named “IOKitTest.cpp.”
    The contents of this file are given in [Listing 4-3](#Chapter04.html#list_4_3).


    ***Listing 4-3.** The “IOKitTest.cpp” Tutorial*


    `#include "IOKitTest.h"`

    `#include <IOKit/IOLib.h>`


    `// Define the superclass.`

    `#define super IOService`


    `OSDefineMetaClassAndStructors(com_osxkernel_driver_IOKitTest, IOService)`


    `bool com_osxkernel_driver_IOKitTest::init (OSDictionary* dict)`

    `{`

    `        bool res = super::init(dict);`

    `        IOLog("IOKitTest::init\n");`

    `        return res;`

    `}`'
