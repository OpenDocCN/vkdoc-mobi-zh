- fmt: "`IOExternalMethodArguments`结构的字段应该很熟悉，因为它们与用户空间的`IOConnectCallMethod()`函数的参数列表几乎完美匹配。有两个字段值得解释：`structureInputDescriptor`和`structureOutputDescriptor`。这些字段用于在用户进程和内核驱动之间传递大于4096字节的结构。对于小于虚拟内存页面大小的结构，I/O\
    \ Kit会将整个结构从用户缓冲区复制到内核内存缓冲区。对于更大的缓冲区，I/O Kit会创建一个`IOMemoryDescriptor`对象来直接从用户进程的地址空间引用该缓冲区。`IOMemoryDescriptor`类在[第6章](#Chapter06.html#ch6)“内存管理”中描述。\n\
    \n鉴于`externalMethod()`的前两个参数为实现提供了执行请求操作所需的所有信息，您可能想知道剩下的三个参数如何适配。驱动程序的用户客户端在实现`externalMethod()`时采用的传统方法是调用`IOUserClient`超类的实现，传递提供给其方法的`selector`和`args`的值，但填写`dispatch`、`target`和`reference`参数来描述应调用的类方法以处理控制请求。\n\
    \n尽管没有什么能阻止驱动程序在不调用超类的情况下实现`externalMethod()`，但使用`IOUserClient`类提供的实现的优势在于，其实现会对调用进程提供的参数进行验证。`IOUserClient`执行的验证仅限于确保用户客户端从调用进程接收到了预期的参数——例如，确保进程提供了正确数量的标量输入输出参数，并且进程提供的结构参数大小与驱动程序将要读写的结构大小匹配。为此，`IOUserClient`对`externalMethod()`的实现需要知道驱动程序对控制请求期望的参数；这些信息来自通过`dispatch`参数传递给超类实现的`IOExternalMethodDispatch`结构。`IOExternalMethodDispatch`的类型定义如下：\n\
    \n```\nstruct IOExternalMethodDispatch\n{\n        IOExternalMethodAction    \
    \      function;\n        uint32_t                        checkScalarInputCount;\n\
    \        uint32_t                        checkStructureInputSize;\n        uint32_t\
    \                        checkScalarOutputCount;\n        uint32_t           \
    \             checkStructureOutputSize;\n};\n```\n\n`IOExternalMethodDispatch`结构描述了应调用来处理控制请求的回调函数、标量输入输出参数的数量，以及回调函数期望的任何输入输出结构参数的大小。对于可以接受可变数量标量参数或可变长度结构的回调函数，可以将常量`kIOUCVariableStructureSize`写入`IOExternalMethodDispatch`结构的相应字段。\n\
    \n回调函数具有以下签名：\n\n```\ntypedef IOReturn (*IOExternalMethodAction)(OSObject* target,\
    \ void* reference,\n                        IOExternalMethodArguments* args);\n\
    ```\n\n您会注意到，回调函数的参数对应于`IOUserClient::externalMethod()`的三个参数，包括`target`和`reference`。这不仅仅是巧合。当您的驱动程序调用超类对`externalMethod()`的实现时，它会验证用户空间进程提供的参数，如果提供了正确的参数，它会调用指定的处理函数，将`target`、`reference`和`args`的值传递给回调函数。由于回调函数是一个静态方法，它无法通过`this`指针访问用户客户端的任何实例变量。因此，`target`的值应设置为将处理控制请求的用户客户端实例，或者，如果控制请求将由不同类的方法处理，则`target`应设置为该类的实例。`reference`的值可供用户客户端自由用于向回调函数传递任意数据。\n\
    \n处理来自用户空间客户端的控制请求的整个过程，包括驱动程序的定制用户客户端实现所执行的步骤以及标准`IOUserClient`实现所执行的步骤，在以下伪代码中描述：\n\
    \n```\n// Implementation provided by the driver's IOUserClient subclass\nIOReturn\
    \           MyUserClient::externalMethod (selector, args, dispatch, target, reference)\n\
    {\n\n        Use \"selector\" to determine which control request has been requested\n\
    \n        Initialize \"newDispatch\" to the appropriate callback function to handle\
    \ the control\n        request\n        Initialize \"newTarget\" to the current\
    \ MyUserClient instance\n        Initialize \"newReference\" if we wish to provide\
    \ additional data to the callback\n        function\n\n        Call the superclass:\n\
    \        IOUserClient::externalMethod(selector, args, newDispatch, newTarget,\
    \ newReference)\n}\n\n// Implementation provided by the I/O Kit's superclass\n\
    IOReturn           IOUserClient::externalMethod(selector, args, dispatch, target,\
    \ reference)\n{\n        Check that the parameters provided by the user process\
    \ through \"args\" match the\n        parameters expected by the user client as\
    \ described in \"dispatch\".\n\n        If the parameters do not match, exit with\
    \ the result kIOReturnBadArgument\n\n        Otherwise, call the callback handler\
    \ for this control request:\n        dispatch->function(target, reference, args)\n\
    }\n```\n\n按照惯例，大多数驱动程序通过向其用户客户端类添加一个调度表来实现`externalMethod()`，该表包含用户客户端接受的每个选择器值的`IOExternalMethodDispatch`值。例如，我们的计时器用户客户端的一个可能的调度表如列表5-11所示。\n\
    \n**列表5-11.** 教程用户客户端接口的调度表\n\n```\nconst IOExternalMethodDispatch\ncom_osxkernel_driver_IOKitTestUserClient::sMethods[kTestUserClientMethodCount]\
    \ =\n{\n        // kTestUserClientStartTimer   (void)\n        { sStartTimer,\
    \ 0, 0, 0, 0 },\n\n        // kTestUserClientStopTimer   (void)\n        { sStopTimer,\
    \ 0, 0, 0, 0 },\n\n        // kTestUserClientGetElapsedTimerTime   (uint32_t*\
    \ timerValue)\n        { sGetElapsedTimerTime, 0, 0, 1, 0 },\n\n        // kTestUserClientGetElapsedTimerValue\
    \   (TimerValue* timerValue)\n        { sGetElapsedTimerValue, 0, 0, 0, sizeof(TimerValue)\
    \ },\n\n        // kTestUserClientDelayForMs   (uint32_t milliseconds)\n     \
    \   { sDelayForMs, 1, 0, 0, 0 },\n\n        // kTestUserClientDelayForTime  (const\
    \ TimerValue* timerValue)\n        { sDelayForTime, 0, sizeof(TimerValue), 0,\
    \ 0 }\n};\n```\n\n为了方便起见，我们将使用`TimerRequestCode`枚举中的值作为数组索引来访问调度表中的项目，因此调度表中的项目顺序必须与[列表5-10](#Chapter05.html#list_5_10)中定义的请求代码顺序匹配。"
  raw: 'The fields of the `IOExternalMethodArguments` structure should look familiar
    since they are an almost perfect match of the arguments list of the user space
    `IOConnectCallMethod()` function. Two fields that deserve an explanation are `structureInputDescriptor`
    and `structureOutputDescriptor`. These fields are used to pass structures that
    are larger than 4096 bytes between the user process and the kernel driver. For
    structures that are smaller than the virtual memory page size, the I/O Kit will
    copy the entire structure between the user buffer and a kernel memory buffer.
    For larger buffers, the I/O Kit creates an `IOMemoryDescriptor` object to reference
    the buffer from the user process''s address space directly. The `IOMemoryDescriptor`
    class is described in [Chapter 6](#Chapter06.html#ch6) “Memory Management.”


    Given that the first two arguments to `externalMethod()` provide the implementation
    with all the information that it requires to perform the requested operation,
    you may be wondering where the remaining three arguments fit in. The conventional
    approach taken by a driver''s user client in implementing `externalMethod()` is
    to call the `IOUserClient` superclass''s implementation, passing the values for
    `selector` and `args` that were provided to its method but filling in the `dispatch`,
    `target`, and `reference` arguments to describe the class method that should be
    called to handle the control request.


    Although there is nothing to stop a driver from implementing `externalMethod()`
    without calling through to the superclass, the advantage of using the implementation
    provided by the `IOUserClient` class is that its implementation performs validation
    of the parameters that have been provided by the calling process. The validation
    performed by the `IOUserClient` is limited to ensuring that the user client has
    received the expected parameters from the calling process—for example, ensuring
    that the process has provided the correct number of scalar input and output parameters
    and that the size of structure parameters that has been provided by the process
    matches the size of the structures that the driver will be reading and writing.
    To do this, the `IOUserClient`''s implementation of `externalMethod()` needs to
    know the parameters that the driver is expecting for a control request; this information
    comes from the `IOExternalMethodDispatch` structure that is passed to the superclass
    implementation through the `dispatch` argument. The type definition of `IOExternalMethodDispatch`
    is as follows:


    `struct IOExternalMethodDispatch`

    `{`

    `        IOExternalMethodAction          function;`

    `        uint32_t                        checkScalarInputCount;`

    `        uint32_t                        checkStructureInputSize;`

    `        uint32_t                        checkScalarOutputCount;`

    `        uint32_t                        checkStructureOutputSize;`

    `};`


    The `IOExternalMethodDispatch` structure describes the callback function that
    should be invoked to handle the control request, the number of scalar input and
    output parameters, and the size of any input and output structure parameters that
    the callback function is expecting. For a callback function that can accept a
    variable number of scalar parameters or a variable-length structure, the constant
    `kIOUCVariableStructureSize` can be written to the corresponding field of the
    `IOExternalMethodDispatch` structure.


    The callback function has the following signature:


    `typedef IOReturn (*IOExternalMethodAction)(OSObject* target, void* reference,`

    `                        IOExternalMethodArguments* args);`


    You will notice that the arguments to the callback function correspond to three
    of the arguments of `IOUserClient::externalMethod()`, including `target` and `reference`.
    This is more than just a coincidence. When your driver calls through to the superclass
    implementation of `externalMethod(),` it validates the parameters that were provided
    by the user space process and, if the correct parameters were provided, it calls
    the specified handler function, passing the values of `target`, `reference,` and
    `args` to the callback. Since the callback function is a static method, it cannot
    access any instance variables of the user client through the “`this`” pointer.
    Therefore, the value of `target` should be set to the instance of the user client
    that will handle the control request or, if the control request will be handled
    by a method in a different class, `target` should be set to the instance of that
    class. The value of `reference` is free for the user client for passing arbitrary
    data to the callback function.


    The entire process of handling a control request from a user space client, including
    the steps that are performed by the driver''s custom user client implementation
    and the steps performed by the standard `IOUserClient` implementation, is described
    in the following pseudocode:


    **`// Implementation provided by the driver''s IOUserClient subclass`**

    `IOReturn           MyUserClient::externalMethod (selector, args, dispatch, target,
    reference)`

    `{`


    `        Use “selector” to determine which control request has been requested`


    `        Initialize “newDispatch” to the appropriate callback function to handle
    the control`

    `        request`

    `        Initialize “newTarget” to the current MyUserClient instance`

    `        Initialize “newReference” if we wish to provide additional data to the
    callback`

    `        function`


    `        Call the superclass:`

    `        IOUserClient::externalMethod(selector, args, newDispatch, newTarget,
    newReference)`

    `}`


    **`// Implementation provided by the I/O Kit''s superclass`**

    `IOReturn           IOUserClient::externalMethod(selector, args, dispatch, target,
    reference)`

    `{`

    `        Check that the parameters provided by the user process through “args”
    match the`

    `        parameters expected by the user client as described in “dispatch”.`


    `        If the parameters do not match, exit with the result kIOReturnBadArgument`


    `        Otherwise, call the callback handler for this control request:`

    `        dispatch->function(target, reference, args)`

    `}`


    By convention, most drivers implement `externalMethod()` by adding a dispatch
    table to their user client class that contains the value of `IOExternalMethodDispatch`
    for each of the selector values that the user client accepts. For example, a possible
    dispatch table for our timer user client is shown in Listing 5-11.


    ***Listing 5-11.** The Dispatch Table for the Tutorial User Client Interface*


    `const IOExternalMethodDispatch`

    `com_osxkernel_driver_IOKitTestUserClient::sMethods[kTestUserClientMethodCount]
    =`

    `{`

    `        // kTestUserClientStartTimer   (void)`

    `        { sStartTimer, 0, 0, 0, 0 },`


    `        // kTestUserClientStopTimer   (void)`

    `        { sStopTimer, 0, 0, 0, 0 },`


    `        // kTestUserClientGetElapsedTimerTime   (uint32_t* timerValue)`

    `        { sGetElapsedTimerTime, 0, 0, 1, 0 },`


    `        // kTestUserClientGetElapsedTimerValue   (TimerValue* timerValue)`

    `        { sGetElapsedTimerValue, 0, 0, 0, sizeof(TimerValue) },`


    `        // kTestUserClientDelayForMs   (uint32_t milliseconds)`

    `        { sDelayForMs, 1, 0, 0, 0 },`


    `        // kTestUserClientDelayForTime  (const TimerValue* timerValue)`

    `        { sDelayForTime, 0, sizeof(TimerValue), 0, 0 }`

    `};`


    For convenience, we will be accessing items in the dispatch table using values
    from the `TimerRequestCode` enumeration as an index into the array, so it is important
    that the order of items in the dispatch table match the order of the request codes
    that were defined in [Listing 5-10](#Chapter05.html#list_5_10).'
  trans: "```markdown\n\n`IOExternalMethodArguments`结构的字段应该很熟悉，因为它们与用户空间的`IOConnectCallMethod()`函数的参数列表几乎完美匹配。有两个字段值得解释：`structureInputDescriptor`和`structureOutputDescriptor`。这些字段用于在用户进程和内核驱动之间传递大于\
    \ 4096 字节的结构。对于小于虚拟内存页面大小的结构，I/O Kit 会将整个结构从用户缓冲区复制到内核内存缓冲区。对于更大的缓冲区，I/O Kit 会创建一个`IOMemoryDescriptor`对象来直接从用户进程的地址空间引用该缓冲区。`IOMemoryDescriptor`类在第\
    \ 6 章“内存管理”中描述。\n\n鉴于`externalMethod()`的前两个参数为实现提供了执行请求操作所需的所有信息，您可能想知道剩下的三个参数如何适配。驱动程序的用户客户端在实现`externalMethod()`时采用的传统方法是调用`IOUserClient`超类的实现，传递提供给其方法的`selector`和`args`的值，但填写`dispatch`、`target`和`reference`参数来描述应调用的类方法以处理控制请求。\n\
    \n尽管没有什么能阻止驱动程序在不调用超类的情况下实现`externalMethod()`，但使用`IOUserClient`类提供的实现的优势在于，其实现会对调用进程提供的参数进行验证。`IOUserClient`执行的验证仅限于确保用户客户端从调用进程接收到了预期的参数——例如，确保进程提供了正确数量的标量输入输出参数，并且进程提供的结构参数大小与驱动程序将要读写的结构大小匹配。为此，`IOUserClient`对`externalMethod()`的实现需要知道驱动程序对控制请求期望的参数；这些信息来自通过`dispatch`参数传递给超类实现的`IOExternalMethodDispatch`结构。`IOExternalMethodDispatch`的类型定义如下：\n\
    \n```\nstruct IOExternalMethodDispatch\n{\n        IOExternalMethodAction    \
    \      function;\n        uint32_t                        checkScalarInputCount;\n\
    \        uint32_t                        checkStructureInputSize;\n        uint32_t\
    \                        checkScalarOutputCount;\n        uint32_t           \
    \             checkStructureOutputSize;\n};\n```\n\n`IOExternalMethodDispatch`结构描述了应调用来处理控制请求的回调函数、标量输入输出参数的数量，以及回调函数期望的任何输入输出结构参数的大小。对于可以接受可变数量标量参数或可变长度结构的回调函数，可以将常量`kIOUCVariableStructureSize`写入`IOExternalMethodDispatch`结构的相应字段。\n\
    \n回调函数具有以下签名：\n\n```\ntypedef IOReturn (*IOExternalMethodAction)(OSObject* target,\
    \ void* reference,\n                        IOExternalMethodArguments* args);\n\
    ```\n\n您会注意到，回调函数的参数对应于`IOUserClient::externalMethod()`的三个参数，包括`target`和`reference`。这不仅仅是巧合。当您的驱动程序调用超类对`externalMethod()`的实现时，它会验证用户空间进程提供的参数，如果提供了正确的参数，它会调用指定的处理函数，将`target`、`reference`和`args`的值传递给回调函数。由于回调函数是一个静态方法，它无法通过`this`指针访问用户客户端的任何实例变量。因此，`target`的值应设置为将处理控制请求的用户客户端实例，或者，如果控制请求将由不同类的方法处理，则`target`应设置为该类的实例。`reference`的值可供用户客户端自由用于向回调函数传递任意数据。\n\
    \n处理来自用户空间客户端的控制请求的整个过程，包括驱动程序的定制用户客户端实现所执行的步骤以及标准`IOUserClient`实现所执行的步骤，在以下伪代码中描述：\n\
    \n```\n// Implementation provided by the driver's IOUserClient subclass\nIOReturn\
    \           MyUserClient::externalMethod (selector, args, dispatch, target, reference)\n\
    {\n\n        Use \"selector\" to determine which control request has been requested\n\
    \n        Initialize \"newDispatch\" to the appropriate callback function to handle\
    \ the control\n        request\n        Initialize \"newTarget\" to the current\
    \ MyUserClient instance\n        Initialize \"newReference\" if we wish to provide\
    \ additional data to the callback\n        function\n\n        Call the superclass:\n\
    \        IOUserClient::externalMethod(selector, args, newDispatch, newTarget,\
    \ newReference)\n}\n\n// Implementation provided by the I/O Kit's superclass\n\
    IOReturn           IOUserClient::externalMethod(selector, args, dispatch, target,\
    \ reference)\n{\n        Check that the parameters provided by the user process\
    \ through \"args\" match the\n        parameters expected by the user client as\
    \ described in \"dispatch\".\n\n        If the parameters do not match, exit with\
    \ the result kIOReturnBadArgument\n\n        Otherwise, call the callback handler\
    \ for this control request:\n        dispatch->function(target, reference, args)\n\
    }\n```\n\n按照惯例，大多数驱动程序通过向其用户客户端类添加一个调度表来实现`externalMethod()`，该表包含用户客户端接受的每个选择器值的`IOExternalMethodDispatch`值。例如，我们的计时器用户客户端的一个可能的调度表如列表\
    \ 5-11 所示。\n\n**列表 5-11.** 教程用户客户端接口的调度表\n\n```\nconst IOExternalMethodDispatch\n\
    com_osxkernel_driver_IOKitTestUserClient::sMethods[kTestUserClientMethodCount]\
    \ =\n{\n        // kTestUserClientStartTimer   (void)\n        { sStartTimer,\
    \ 0, 0, 0, 0 },\n\n        // kTestUserClientStopTimer   (void)\n        { sStopTimer,\
    \ 0, 0, 0, 0 },\n\n        // kTestUserClientGetElapsedTimerTime   (uint32_t*\
    \ timerValue)\n        { sGetElapsedTimerTime, 0, 0, 1, 0 },\n\n        // kTestUserClientGetElapsedTimerValue\
    \   (TimerValue* timerValue)\n        { sGetElapsedTimerValue, 0, 0, 0, sizeof(TimerValue)\
    \ },\n\n        // kTestUserClientDelayForMs   (uint32_t milliseconds)\n     \
    \   { sDelayForMs, 1, 0, 0, 0 },\n\n        // kTestUserClientDelayForTime  (const\
    \ TimerValue* timerValue)\n        { sDelayForTime, 0, sizeof(TimerValue), 0,\
    \ 0 }\n};\n```\n\n为了方便起见，我们将使用`TimerRequestCode`枚举中的值作为数组索引来访问调度表中的项目，因此调度表中的项目顺序必须与列表\
    \ 5-10 中定义的请求代码顺序匹配。\n\n```"
- fmt: "定义一个调度表后，用户客户端的`externalMethod()`实现变得简单得多，因为它所需的几乎所有值都直接来自调度表。[代码清单5-12](#Chapter05.html#list_5_12)展示了一个可能的实现。\n\
    \n**代码清单5-12.** 自定义用户客户端`externalMethod()`的实现\n\n```\nIOReturn        com_osxkernel_driver_IOKitTestUserClient::\n\
    \                externalMethod (uint32_t selector, IOExternalMethodArguments*\
    \ arguments,\n                                IOExternalMethodDispatch* dispatch,\
    \ OSObject* target,                                 void* reference)\n{\n    \
    \    // Ensure the requested control selector is within range.\n        if (selector\
    \ >= kTestUserClientMethodCount)\n            return kIOReturnUnsupported;\n\n\
    \        dispatch = (IOExternalMethodDispatch*)&sMethods[selector];\n        target\
    \ = this;\n        reference = NULL;\n        return super::externalMethod(selector,\
    \ arguments, dispatch, target, reference);\n}\n```\n\n最后，为了完善用户客户端，我们来了解一下自定义用户客户端提供的两个选择器`GetElapsedTimerTime()`和`DelayForTime()`的可能实现。如前所述，用户客户端实现的每个选择器都有一个对应的回调函数来处理该选择器。该回调函数的参数通过`IOExternalMethodArguments`结构体传递。如果参数能直接作为函数参数传递，处理起来会容易得多，因此每个控制选择器通常有两个方法处理程序：静态回调处理程序和一个提供实际实现的实例方法。\n\
    \n静态回调方法从`IOExternalMethodArguments`结构体中解包参数，并将其传递给用户客户端类或主驱动程序类中的实例方法来执行实际工作。[代码清单5-13](#Chapter05.html#list_5_13)展示了`GetElapsedTimerTime()`和`DelayForTime()`方法的这种安排。\n\
    \n**代码清单5-13.** 两个用户客户端方法的实现\n\n```\nIOReturn        com_osxkernel_driver_IOKitTestUserClient::\n\
    \                sGetElapsedTimerTime (OSObject* target, void* reference,\n  \
    \                                      IOExternalMethodArguments* arguments)\n\
    {\n        com_osxkernel_driver_IOKitTestUserClient*       me;\n        uint32_t\
    \                timerTime;\n        IOReturn                result;\n\n     \
    \   me = (com_osxkernel_driver_IOKitTestUserClient*)target;\n\n        // Call\
    \ the method that implements the operation.\n        result = me->getElapsedTimerTime(&timerTime);\n\
    \        // Return the scalar result of the operation to the calling process.\n\
    \        arguments->scalarOutput[0] = timerTime;\n\n        return result;\n}\n\
    \nIOReturn        com_osxkernel_driver_IOKitTestUserClient::\n               \
    \ sDelayForTime (OSObject* target, void* reference,\n                        \
    \        IOExternalMethodArguments* arguments)\n{\n        com_osxkernel_driver_IOKitTestUserClient*\
    \       me;\n\n        me = (com_osxkernel_driver_IOKitTestUserClient*)target;\n\
    \        return me->delayForTime((TimerValue*)arguments->structureInput);\n}\n\
    ```\n\n请注意，在`sGetElapsedTimerTime()`的实现中，我们不需要验证`scalarOutput`数组的大小，在`sDelayForTime()`的实现中也不需要验证`structureInput`缓冲区的大小。这是因为我们可以知道这些参数已经由`IOUserClient`父类的`externalMethod()`实现验证过，该实现已将提供的参数与驱动程序期望的参数进行了比较。然而，`getElapsedTimerTime()`的实际实现会验证客户端是否在尝试读取定时器时间之前已通过调用`StartTimer()`启动了定时器。\n\
    \n![images](images/square.jpg) **注意** 驱动程序的用户客户端应始终验证从用户进程接收的参数值。该进程可能已被入侵，或者由第三方开发，其代码可能提供了驱动程序不希望接收的参数值。未能拒绝非法参数值可能导致驱动程序内核恐慌，或在系统中引入漏洞。"
  raw: 'With a dispatch table defined, the implementation of our user client''s `externalMethod()`
    becomes significantly easier, since nearly all of the values that it requires
    come straight from the dispatch table. A possible implementation is shown in [Listing
    5-12](#Chapter05.html#list_5_12).


    ***Listing 5-12.** An Implementation of a Custom User Client''s `externalMethod()`*


    `IOReturn        com_osxkernel_driver_IOKitTestUserClient::`

    `                externalMethod (uint32_t selector, IOExternalMethodArguments*
    arguments,`

    `                                IOExternalMethodDispatch* dispatch, OSObject*
    target,                                 void* reference)`

    `{`

    `        // Ensure the requested control selector is within range.`

    `        if (selector >= kTestUserClientMethodCount)`

    `            return kIOReturnUnsupported;`


    `        dispatch = (IOExternalMethodDispatch*)&sMethods[selector];`

    `        target = this;`

    `        reference = NULL;`

    `        return super::externalMethod(selector, arguments, dispatch, target, reference);`

    `}`


    Finally, to complete our user client, let''s take a look at the possible implementation
    for two of the selectors provided by our custom user client: `GetElapsedTimerTime()`
    and `DelayForTime()`. As we have seen, each selector that a user client implements
    has a corresponding callback function that is invoked to handle the selector.
    That callback function''s arguments are passed through the `IOExternalMethodArguments`
    structure. It would be much easier to work with the parameters if they were instead
    passed as parameters to the function, so it is common for each control selector
    to have two method handlers: the static callback handler and an instance method
    that provides the actual implementation.


    The static callback method unpacks the parameters from the `IOExternalMethodArguments`
    structure and passes them to an instance method in the user client class or the
    main driver class to perform the actual work. This arrangement is shown in [Listing
    5-13](#Chapter05.html#list_5_13) for the implementation of the `GetElapsedTimerTime()`
    and `DelayForTime()` methods.


    ***Listing 5-13.** An Implementation of Two User Client Methods*


    `IOReturn        com_osxkernel_driver_IOKitTestUserClient::`

    `                sGetElapsedTimerTime (OSObject* target, void* reference,`

    `                                        IOExternalMethodArguments* arguments)`

    `{`

    `        com_osxkernel_driver_IOKitTestUserClient*       me;`

    `        uint32_t                timerTime;`

    `        IOReturn                result;`


    `        me = (com_osxkernel_driver_IOKitTestUserClient*)target;`


    `        // Call the method that implements the operation.`

    `        result = me->getElapsedTimerTime(&timerTime);`

    `        // Return the scalar result of the operation to the calling process.`

    `        arguments->scalarOutput[0] = timerTime;`


    `        return result;`

    `}`


    `IOReturn        com_osxkernel_driver_IOKitTestUserClient::`

    `                sDelayForTime (OSObject* target, void* reference,`

    `                                IOExternalMethodArguments* arguments)`

    `{`

    `        com_osxkernel_driver_IOKitTestUserClient*       me;`


    `        me = (com_osxkernel_driver_IOKitTestUserClient*)target;`

    `        return me->delayForTime((TimerValue*)arguments->structureInput);`

    `}`


    Notice that we do not need to verify the size of the array `scalarOutput` in the
    implementation of `sGetElapsedTimerTime()` or the size of the buffer `structureInput`
    in the implementation of `sDelayForTime()`. This is because we can know that these
    parameters have been verified by the `IOUserClient` superclass''s implementation
    of `externalMethod()`, which has compared the provided parameters against the
    driver''s expected parameters. However, the actual implementation of `getElapsedTimerTime()`
    would verify that the client has previously started the timer by calling `StartTimer()`
    before attempting to read the timer''s time.


    ![images](images/square.jpg) **Note** A driver''s user client should always validate
    the value of parameters that it receives from a user process. The process may
    have been compromised or may be developed by a third party whose code provides
    parameter values that your driver does not expect to receive. Failing to reject
    illegal parameter values could cause your driver to kernel panic or could introduce
    vulnerabilities into the system.'
  trans: "\n定义一个调度表后，用户客户端的`externalMethod()`实现变得简单得多，因为它所需的几乎所有值都直接来自调度表。代码清单 5-12\
    \ 展示了一个可能的实现。\n\n**代码清单 5-12.** 自定义用户客户端`externalMethod()`的实现\n\n```\nIOReturn\
    \        com_osxkernel_driver_IOKitTestUserClient::\n                externalMethod\
    \ (uint32_t selector, IOExternalMethodArguments* arguments,\n                \
    \                IOExternalMethodDispatch* dispatch, OSObject* target,       \
    \                          void* reference)\n{\n        // Ensure the requested\
    \ control selector is within range.\n        if (selector >= kTestUserClientMethodCount)\n\
    \            return kIOReturnUnsupported;\n\n        dispatch = (IOExternalMethodDispatch*)&sMethods[selector];\n\
    \        target = this;\n        reference = NULL;\n        return super::externalMethod(selector,\
    \ arguments, dispatch, target, reference);\n}\n```\n\n最后，为了完善用户客户端，我们来了解一下自定义用户客户端提供的两个选择器`GetElapsedTimerTime()`和`DelayForTime()`的可能实现。如前所述，用户客户端实现的每个选择器都有一个对应的回调函数来处理该选择器。该回调函数的参数通过`IOExternalMethodArguments`结构体传递。如果参数能直接作为函数参数传递，处理起来会容易得多，因此每个控制选择器通常有两个方法处理程序：静态回调处理程序和一个提供实际实现的实例方法。\n\
    \n静态回调方法从`IOExternalMethodArguments`结构体中解包参数，并将其传递给用户客户端类或主驱动程序类中的实例方法来执行实际工作。代码清单\
    \ 5-13 展示了`GetElapsedTimerTime()`和`DelayForTime()`方法的这种安排。\n\n**代码清单 5-13.** 两个用户客户端方法的实现\n\
    \n```\nIOReturn        com_osxkernel_driver_IOKitTestUserClient::\n          \
    \      sGetElapsedTimerTime (OSObject* target, void* reference,\n            \
    \                            IOExternalMethodArguments* arguments)\n{\n      \
    \  com_osxkernel_driver_IOKitTestUserClient*       me;\n        uint32_t     \
    \           timerTime;\n        IOReturn                result;\n\n        me\
    \ = (com_osxkernel_driver_IOKitTestUserClient*)target;\n\n        // Call the\
    \ method that implements the operation.\n        result = me->getElapsedTimerTime(&timerTime);\n\
    \        // Return the scalar result of the operation to the calling process.\n\
    \        arguments->scalarOutput[0] = timerTime;\n\n        return result;\n}\n\
    \nIOReturn        com_osxkernel_driver_IOKitTestUserClient::\n               \
    \ sDelayForTime (OSObject* target, void* reference,\n                        \
    \        IOExternalMethodArguments* arguments)\n{\n        com_osxkernel_driver_IOKitTestUserClient*\
    \       me;\n\n        me = (com_osxkernel_driver_IOKitTestUserClient*)target;\n\
    \        return me->delayForTime((TimerValue*)arguments->structureInput);\n}\n\
    ```\n\n请注意，在`sGetElapsedTimerTime()`的实现中，我们不需要验证`scalarOutput`数组的大小，在`sDelayForTime()`的实现中也不需要验证`structureInput`缓冲区的大小。这是因为我们可以知道这些参数已经由`IOUserClient`父类的`externalMethod()`实现验证过，该实现已将提供的参数与驱动程序期望的参数进行了比较。然而，`getElapsedTimerTime()`的实际实现会验证客户端是否在尝试读取定时器时间之前已通过调用`StartTimer()`启动了定时器。\n\
    \n![images](img/square.jpg) **注意** 驱动程序的用户客户端应始终验证从用户进程接收的参数值。该进程可能已被入侵，或者由第三方开发，其代码可能提供了驱动程序不希望接收的参数值。未能拒绝非法参数值可能导致驱动程序内核恐慌，或在系统中引入漏洞。\n"
- fmt: "### Notifications from the Driver\n\nThe methods that we have implemented\
    \ in the sample driver's user client are designed to be blocking functions; that\
    \ is, the user process does not continue execution until the user client has completed\
    \ the requested operation. For example, the method in our user client `DelayForMs()`\
    \ would suspend the thread on which it was called until the specified delay has\
    \ elapsed. While this may not be a bad thing for a function whose aim is to explicitly\
    \ delay the calling thread, a user space application may not always wish to wait\
    \ for a driver operation to complete, particularly if that operation may take\
    \ an indeterminate amount of time or is dependent on an event over which the driver\
    \ has no control, such as the arrival of data on a serial port.\n\nTwo approaches\
    \ are used to overcome this problem. Unlike the Windows driver model, which, unless\
    \ explicitly enabled, does not allow an application to send multiple control requests\
    \ to a driver simultaneously, the I/O Kit allows as many threads to send requests\
    \ to a user client as the application requires. This means that one solution for\
    \ blocking operations is for the application to create a secondary thread on which\
    \ to call blocking user client methods. This frees up the rest of the application\
    \ to continue executing while the driver processes the request. The second approach\
    \ is for the user client to implement asynchronous operations and notify the application\
    \ when the operation completes through a callback function.\n\nThe I/O Kit framework\
    \ makes it easy for a developer to turn an operation from a synchronous, blocking\
    \ operation into an asynchronous operation. To see how it is done, let's extend\
    \ the driver interface that we have developed in this chapter to include a function\
    \ named `InstallTimer()`, which will delay for a specified period and then notify\
    \ the application through a callback function. In this way, the `InstallTimer()`\
    \ function can be thought of as an asynchronous implementation of our existing\
    \ function `DelayForTime()`.\n\nThe I/O Kit framework uses an implementation for\
    \ asynchronous notifications that is very similar to the delivery of notifications\
    \ for device arrival that was described at the start of this chapter (See [Listing\
    \ 5-2](#Chapter05.html#list_5_2)). In fact, the notifications received for device\
    \ arrival can be thought of as a special asynchronous completion callback that\
    \ is implemented by the I/O Kit framework itself. To initialize our driver library\
    \ to support the delivery of completion callbacks, we need to create a notification\
    \ port on which the kernel driver will signal the user space process when an operation\
    \ has completed. This is done in the same way in which we created a notification\
    \ port for the delivery of device arrival notifications, by calling the `IONotificationPortCreate()`\
    \ function. Although this notification port will be allocated by the driver's\
    \ user space library, it's good design practice to provide a function that allows\
    \ the application to access the port so that the application can install the notification\
    \ port on the run loop of its choice. A possible implementation of an accessor\
    \ function for a driver's notification port is shown in [Listing 5-14](#Chapter05.html#list_5_14).\n\
    \n**Listing 5-14.** Allocating a Port on Which an Application Can Receive Notifications\
    \ When an Asynchronous Operation Completes\n\n```\nIONotificationPortRef   gAsyncNotificationPort\
    \ = NULL;\n\nIONotificationPortRef   MyDriverGetAsyncCompletionPort ()\n{\n  \
    \      // If the port has been allocated, return the existing instance.\n    \
    \    if (gAsyncNotificationPort != NULL)\n                return gAsyncNotificationPort;\n\
    \n        gAsyncNotificationPort = IONotificationPortCreate(kIOMasterPortDefault);\n\
    \        return gAsyncNotificationPort;\n}\n```\n\nAn application can then allocate\
    \ and install the notification port in one of its run loops, as follows:\n\n```\n\
    CFRunLoopSourceRef      runLoopSource;\nnotificationPort = MyDriverGetAsyncCompletionPort\
    \ ();\nrunLoopSource = IONotificationPortGetRunLoopSource(notificationPort);\n\
    CFRunLoopAddSource(CFRunLoopGetCurrent(), runLoopSource, kCFRunLoopDefaultMode);\n\
    ```\n\nHaving allocated a notification port on which the user space application\
    \ can receive messages from the kernel driver, we now need to provide the port\
    \ to our kernel driver so that it has a port on which it can signal the completion\
    \ of asynchronous operations. The notification port is provided to the driver's\
    \ user client on each asynchronous control request. The I/O Kit framework provides\
    \ asynchronous variations of each of the `IOConnectCallXXX()` functions named\
    \ `IOConnectCallAsyncXXX()`. The asynchronous form of these functions take additional\
    \ arguments, including a notification port, a callback function, and a context\
    \ parameter that is passed to the callback function.\n\nIn all regards, the asynchronous\
    \ variation of the `IOConnect` functions behave identically to their synchronous\
    \ counterparts; for example, `IOConnectCallAsyncScalarMethod()` passes an array\
    \ of integer values to the user client and receives an array of integer values\
    \ from the user client. As with the synchronous form of these functions, any output\
    \ parameters are written as soon as the function returns and not when the asynchronous\
    \ operation completes (the driver may still be handling the operation when the\
    \ function returns).\n\nTo provide an example of how the asynchronous functions\
    \ are used, let's examine the implementation of our sample `InstallTimer()` function.\
    \ The user space code is shown in [Listing 5-15](#Chapter05.html#list_5_15).\n\
    \n**Listing 5-15.** The User Space Implementation of an Asynchronous Control Request\
    \ for Our Driver's `InstallTimer()` Function\n\n```\nkern_return_t   InstallTimer\
    \ (io_connect_t connection, uint32_t milliseconds,\n                        IOAsyncCallback0\
    \ timerCallback, void* context)\n{\n        io_async_ref64_t        asyncRef;\n\
    \        uint64_t                scalarIn[1];\n\n        // Set up the callback\
    \ function.\n        asyncRef[kIOAsyncCalloutFuncIndex] = (uint64_t)timerCallback;\n\
    \        asyncRef[kIOAsyncCalloutRefconIndex] = (uint64_t)context;\n\n       \
    \ // Set up the input parameter.\n        scalarIn[0] = milliseconds;\n      \
    \  return  IOConnectCallAsyncScalarMethod(connection, kTestUserClientInstallTimer,\n\
    \                IONotificationPortGetMachPort(gAsyncNotificationPort),\n    \
    \            asyncRef,  kIOAsyncCalloutCount,\n                scalarIn, 1, NULL,\
    \ NULL);\n}\n```\n\nIf you compare the preceding function to the implementation\
    \ for `DelayForTime()`, you will notice that both functions have a lot in common\
    \ and pass the same input and output parameters to the user client. The only difference\
    \ between the two functions is the addition of the `timerCallback` and `context`\
    \ arguments. The callback function and its context parameter are provided to the\
    \ `IOConnectCallAsync` functions through the structure `io_async_ref64_t`, which\
    \ is defined as an array of unsigned 64-bit integers. Because certain elements\
    \ of the `io_async_ref64_t` array are used internally by the I/O Kit, an application\
    \ should use the constants `kIOAsyncCalloutFuncIndex` and `kIOAsyncCalloutRefconIndex`\
    \ to access the array, as shown in the example.\n\nThis is all that an application\
    \ needs to do to perform an asynchronous operation. When the operation completes,\
    \ the provided callback function will be notified and will execute on the run\
    \ loop on which the application installed the run loop source. The callback function\
    \ has the following signature:\n\n```\ntypedef void (*IOAsyncCallback0)(void*\
    \ context, IOReturn result);\n```\n\nNote that the “0” in `IOAsyncCallback0` refers\
    \ to the number of parameters from the driver that the function receives. These\
    \ are separate from the output scalar count passed to the function `IOConnectCallAsyncScalarMethod()`\
    \ and are specified by the kernel when the asynchronous operation is complete."
  raw: '### Notifications from the Driver


    The methods that we have implemented in the sample driver''s user client are designed
    to be blocking functions; that is, the user process does not continue execution
    until the user client has completed the requested operation. For example, the
    method in our user client `DelayForMs()` would suspend the thread on which it
    was called until the specified delay has elapsed. While this may not be a bad
    thing for a function whose aim is to explicitly delay the calling thread, a user
    space application may not always wish to wait for a driver operation to complete,
    particularly if that operation may take an indeterminate amount of time or is
    dependent on an event over which the driver has no control, such as the arrival
    of data on a serial port.


    Two approaches are used to overcome this problem. Unlike the Windows driver model,
    which, unless explicitly enabled, does not allow an application to send multiple
    control requests to a driver simultaneously, the I/O Kit allows as many threads
    to send requests to a user client as the application requires. This means that
    one solution for blocking operations is for the application to create a secondary
    thread on which to call blocking user client methods. This frees up the rest of
    the application to continue executing while the driver processes the request.
    The second approach is for the user client to implement asynchronous operations
    and notify the application when the operation completes through a callback function.


    The I/O Kit framework makes it easy for a developer to turn an operation from
    a synchronous, blocking operation into an asynchronous operation. To see how it
    is done, let''s extend the driver interface that we have developed in this chapter
    to include a function named `InstallTimer()`, which will delay for a specified
    period and then notify the application through a callback function. In this way,
    the `InstallTimer()` function can be thought of as an asynchronous implementation
    of our existing function `DelayForTime()`.


    The I/O Kit framework uses an implementation for asynchronous notifications that
    is very similar to the delivery of notifications for device arrival that was described
    at the start of this chapter (See [Listing 5-2](#Chapter05.html#list_5_2)). In
    fact, the notifications received for device arrival can be thought of as a special
    asynchronous completion callback that is implemented by the I/O Kit framework
    itself. To initialize our driver library to support the delivery of completion
    callbacks, we need to create a notification port on which the kernel driver will
    signal the user space process when an operation has completed. This is done in
    the same way in which we created a notification port for the delivery of device
    arrival notifications, by calling the `IONotificationPortCreate()` function. Although
    this notification port will be allocated by the driver''s user space library,
    it''s good design practice to provide a function that allows the application to
    access the port so that the application can install the notification port on the
    run loop of its choice. A possible implementation of an accessor function for
    a driver''s notification port is shown in [Listing 5-14](#Chapter05.html#list_5_14).


    ***Listing 5-14.** Allocating a Port on Which an Application Can Receive Notifications
    When an Asynchronous Operation Completes*


    `IONotificationPortRef   gAsyncNotificationPort = NULL;`


    `IONotificationPortRef   MyDriverGetAsyncCompletionPort ()`

    `{`

    `        // If the port has been allocated, return the existing instance.`

    `        if (gAsyncNotificationPort != NULL)`

    `                return gAsyncNotificationPort;`


    `        gAsyncNotificationPort = IONotificationPortCreate(kIOMasterPortDefault);`

    `        return gAsyncNotificationPort;`

    `}`


    An application can then allocate and install the notification port in one of its
    run loops, as follows:


    `CFRunLoopSourceRef      runLoopSource;`

    `notificationPort = MyDriverGetAsyncCompletionPort ();`

    `runLoopSource = IONotificationPortGetRunLoopSource(notificationPort);`

    `CFRunLoopAddSource(CFRunLoopGetCurrent(), runLoopSource, kCFRunLoopDefaultMode);`


    Having allocated a notification port on which the user space application can receive
    messages from the kernel driver, we now need to provide the port to our kernel
    driver so that it has a port on which it can signal the completion of asynchronous
    operations. The notification port is provided to the driver''s user client on
    each asynchronous control request. The I/O Kit framework provides asynchronous
    variations of each of the `IOConnectCallXXX()` functions named `IOConnectCallAsyncXXX()`.
    The asynchronous form of these functions take additional arguments, including
    a notification port, a callback function, and a context parameter that is passed
    to the callback function.


    In all regards, the asynchronous variation of the `IOConnect` functions behave
    identically to their synchronous counterparts; for example, `IOConnectCallAsyncScalarMethod()`
    passes an array of integer values to the user client and receives an array of
    integer values from the user client. As with the synchronous form of these functions,
    any output parameters are written as soon as the function returns and not when
    the asynchronous operation completes (the driver may still be handling the operation
    when the function returns).


    To provide an example of how the asynchronous functions are used, let''s examine
    the implementation of our sample `InstallTimer()` function. The user space code
    is shown in [Listing 5-15](#Chapter05.html#list_5_15).


    ***Listing 5-15.** The User Space Implemenation of an Asynchronous Control Request
    for Our Driver''s `InstallTimer()` Function*


    `kern_return_t   InstallTimer (io_connect_t connection, uint32_t milliseconds,`

    `                        IOAsyncCallback0 timerCallback, void* context)`

    `{`

    `        io_async_ref64_t        asyncRef;`

    `        uint64_t                scalarIn[1];`


    `        // Set up the callback function.`

    `        asyncRef[kIOAsyncCalloutFuncIndex] = (uint64_t)timerCallback;`

    `        asyncRef[kIOAsyncCalloutRefconIndex] = (uint64_t)context;`


    `        // Set up the input parameter.`

    `        scalarIn[0] = milliseconds;`

    `        return  IOConnectCallAsyncScalarMethod(connection, kTestUserClientInstallTimer,`

    `                IONotificationPortGetMachPort(gAsyncNotificationPort),`

    `                asyncRef,  kIOAsyncCalloutCount,`

    `                scalarIn, 1, NULL, NULL);`

    `}`


    If you compare the preceding function to the implementation for `DelayForTime()`,
    you will notice that both functions have a lot in common and pass the same input
    and output parameters to the user client. The only difference between the two
    functions is the addition of the `timerCallback` and `context` arguments. The
    callback function and its context parameter are provided to the `IOConnectCallAsync`
    functions through the structure `io_async_ref64_t`, which is defined as an array
    of unsigned 64-bit integers. Because certain elements of the `io_async_ref64_t`
    array are used internally by the I/O Kit, an application should use the constants
    `kIOAsyncCalloutFuncIndex` and `kIOAsyncCalloutRefconIndex` to access the array,
    as shown in the example.


    This is all that an application needs to do to perform an asynchronous operation.
    When the operation completes, the provided callback function will be notified
    and will execute on the run loop on which the application installed the run loop
    source. The callback function has the following signature:


    `typedef void (*IOAsyncCallback0)(void* context, IOReturn result);`


    Note that the “0” in `IOAsyncCallback0` refers to the number of parameters from
    the driver that the function receives. These are separate from the output scalar
    count passed to the function `IOConnectCallAsyncScalarMethod()` and are specified
    by the kernel when the asynchronous operation is complete.'
  trans: "好的，作为一名高级文档工程师和翻译员，我将遵循您的注意事项和示例，将给定的英文文本翻译成中文。\n\n\n### 来自驱动程序的通知\n\n我们在示例驱动程序的用户客户端中实现的方法被设计为阻塞函数；也就是说，用户进程会一直等待，直到用户客户端完成请求的操作后才会继续执行。例如，我们的用户客户端中的\
    \ `DelayForMs()` 方法会挂起调用它的线程，直到指定的延迟时间结束。虽然对于一个旨在显式延迟调用线程的函数来说，这可能不是坏事，但用户空间应用程序可能并不总是希望等待驱动程序操作完成，特别是当该操作可能需要不确定的时间，或者依赖于驱动程序无法控制的事件时，例如串口数据的到达。\n\
    \n有两种方法可以解决这个问题。与 Windows 驱动程序模型不同（该模型除非显式启用，否则不允许应用程序同时向驱动程序发送多个控制请求），I/O Kit\
    \ 允许应用程序根据其需要，将尽可能多的线程的请求发送到用户客户端。这意味着对于阻塞操作的一种解决方案是，应用程序创建一个辅助线程来调用阻塞的用户客户端方法。这样，当驱动程序处理请求时，应用程序的其余部分可以继续执行。第二种方法是让用户客户端实现异步操作，并在操作完成时通过回调函数通知应用程序。\n\
    \nI/O Kit 框架使开发人员能够轻松地将同步阻塞操作转变为异步操作。为了了解具体如何实现，让我们扩展本章中开发的驱动程序接口，加入一个名为 `InstallTimer()`\
    \ 的函数。该函数将延迟指定的时间，然后通过回调函数通知应用程序。通过这种方式，`InstallTimer()` 函数可以被视为我们现有函数 `DelayForTime()`\
    \ 的异步实现版本。\n\nI/O Kit 框架实现异步通知的方式，与本章开头描述的设备到达通知的传递方式非常相似（参见代码清单 5-2）。事实上，设备到达通知可以被视为\
    \ I/O Kit 框架本身实现的一种特殊的异步完成回调。为了初始化我们的驱动程序库以支持传递完成回调，我们需要创建一个通知端口，内核驱动程序将通过该端口在操作完成时向用户空间进程发送信号。这与我们通过调用\
    \ `IONotificationPortCreate()` 函数创建用于传递设备到达通知的通知端口的方式相同。尽管此通知端口将由驱动程序的用户空间库分配，但提供一个允许应用程序访问该端口的函数是一种良好的设计实践，这样应用程序就可以将通知端口安装到其选择的运行循环上。代码清单\
    \ 5-14 展示了驱动程序通知端口的访问器函数的一种可能实现。\n\n**代码清单 5-14.** 分配一个端口，应用程序可以通过该端口在异步操作完成时接收通知\n\
    \n```\nIONotificationPortRef   gAsyncNotificationPort = NULL;\n\nIONotificationPortRef\
    \   MyDriverGetAsyncCompletionPort ()\n{\n        // 如果端口已分配，则返回现有实例。\n      \
    \  if (gAsyncNotificationPort != NULL)\n                return gAsyncNotificationPort;\n\
    \n        gAsyncNotificationPort = IONotificationPortCreate(kIOMasterPortDefault);\n\
    \        return gAsyncNotificationPort;\n}\n```\n\n然后，应用程序可以按如下方式在其某个运行循环中分配并安装通知端口：\n\
    \n```\nCFRunLoopSourceRef      runLoopSource;\nnotificationPort = MyDriverGetAsyncCompletionPort\
    \ ();\nrunLoopSource = IONotificationPortGetRunLoopSource(notificationPort);\n\
    CFRunLoopAddSource(CFRunLoopGetCurrent(), runLoopSource, kCFRunLoopDefaultMode);\n\
    ```\n\n在分配了一个用户空间应用程序可以用来接收来自内核驱动程序的消息的通知端口后，我们现在需要将此端口提供给我们的内核驱动程序，以便它拥有一个可以向其发送异步操作完成信号的端口。该通知端口在每个异步控制请求中提供给驱动程序的用户客户端。I/O\
    \ Kit 框架为每个 `IOConnectCallXXX()` 函数提供了异步变体，命名为 `IOConnectCallAsyncXXX()`。这些函数的异步形式接受额外的参数，包括一个通知端口、一个回调函数以及一个传递给回调函数的上下文参数。\n\
    \n在所有方面，`IOConnect` 函数的异步变体与其同步版本的行为相同；例如，`IOConnectCallAsyncScalarMethod()` 向用户客户端传递一个整数值数组，并从用户客户端接收一个整数值数组。与这些函数的同步形式一样，任何输出参数都会在函数返回时立即写入，而不是在异步操作完成时写入（当函数返回时，驱动程序可能仍在处理该操作）。\n\
    \n为了举例说明如何使用异步函数，让我们审视示例 `InstallTimer()` 函数的实现。用户空间代码如代码清单 5-15 所示。\n\n**代码清单\
    \ 5-15.** 驱动程序 `InstallTimer()` 函数的异步控制请求的用户空间实现\n\n```\nkern_return_t   InstallTimer\
    \ (io_connect_t connection, uint32_t milliseconds,\n                        IOAsyncCallback0\
    \ timerCallback, void* context)\n{\n        io_async_ref64_t        asyncRef;\n\
    \        uint64_t                scalarIn[1];\n\n        // 设置回调函数。\n        asyncRef[kIOAsyncCalloutFuncIndex]\
    \ = (uint64_t)timerCallback;\n        asyncRef[kIOAsyncCalloutRefconIndex] = (uint64_t)context;\n\
    \n        // 设置输入参数。\n        scalarIn[0] = milliseconds;\n        return  IOConnectCallAsyncScalarMethod(connection,\
    \ kTestUserClientInstallTimer,\n                IONotificationPortGetMachPort(gAsyncNotificationPort),\n\
    \                asyncRef,  kIOAsyncCalloutCount,\n                scalarIn, 1,\
    \ NULL, NULL);\n}\n```\n\n如果你将上面的函数与 `DelayForTime()` 的实现进行比较，你会注意到这两个函数有很多共同点，并且向用户客户端传递了相同的输入和输出参数。这两个函数之间的唯一区别是增加了\
    \ `timerCallback` 和 `context` 参数。回调函数及其上下文参数通过 `io_async_ref64_t` 结构提供给 `IOConnectCallAsync`\
    \ 函数，该结构被定义为一个无符号 64 位整数数组。因为 `io_async_ref64_t` 数组的某些元素由 I/O Kit 内部使用，应用程序应使用常量\
    \ `kIOAsyncCalloutFuncIndex` 和 `kIOAsyncCalloutRefconIndex` 来访问该数组，如示例所示。\n\n\
    这就是应用程序执行异步操作所需做的全部工作。当操作完成时，提供的回调函数将被通知，并在应用程序安装了运行循环源的运行循环上执行。回调函数具有以下签名：\n\n\
    ```\ntypedef void (*IOAsyncCallback0)(void* context, IOReturn result);\n```\n\n\
    请注意，`IOAsyncCallback0` 中的“0”指的是该函数从驱动程序接收的参数数量。这些参数与传递给 `IOConnectCallAsyncScalarMethod()`\
    \ 函数的输出标量计数是分开的，它们由内核在异步操作完成时指定。\n"
- fmt: "# 排版后的文本\n\n当然，要使操作异步进行，内核驱动程序必须确保它能从用户客户端立即返回，同时在后台继续处理请求的操作，并在操作完成时向进程发送信号。异步方法调用被用户客户端接收的方式与任何其他方法调用并无不同，并通过`externalMethod()`分派给一个处理函数，该函数通过`IOExternalMethodArguments`结构体接收其参数。然而，与同步方法不同的是，`IOExternalMethodArguments`结构体包含对异步操作有用的字段，如下定义所示：\n\
    \n```\nstruct IOExternalMethodArguments\n{\n        …\n        mach_port_t   \
    \          asyncWakePort;\n        io_user_reference_t*    asyncReference;\n \
    \       uint32_t                asyncReferenceCount;\n        …\n};\n```\n\n通过检查`asyncWakePort`的值，实现控制请求的方法可以确定用户应用程序是否通过异步函数调用调用了它。如果该值非零，则表示请求了异步操作。鉴于处理函数将在后台执行请求的操作（因为异步控制请求应避免阻塞调用应用程序），它需要保存它将需要在执行操作时引用的`IOExternalMethodArguments`结构体中的任何值。这包括复制调用者提供的任何标量和结构体输入参数值（注意，输出值会在用户客户端返回时立即返回给调用应用程序，而不是在异步操作完成时）。需要保存的`IOExternalMethodArguments`结构体中的一个重要值是`asyncReference`缓冲区，因为它用于在操作完成时向应用程序发送信号。\n\
    \n下面在[列表5-16](#Chapter05.html#list_5_16)中展示了一个如何执行异步操作的示例。\n\n**列表5-16.** 异步操作的用户客户端实现。这实现了`InstallTimer()`函数的内核端。\n\
    \n```\n// A structure to hold parameters required by the background operation.\n\
    struct TimerParams\n{\n        OSAsyncReference64              asyncRef;\n   \
    \     uint32_t                        milliseconds;\n        OSObject*       \
    \                userClient;\n};\n\nIOReturn  com_osxkernel_driver_IOKitTestUserClient::\n\
    \       sInstallTimer (OSObject* target, void* reference, IOExternalMethodArguments*\
    \ arguments)\n{\n        TimerParams*    timerParams;\n        thread_t      \
    \  newThread;\n\n        // Allocate a structure to store parameters required\
    \ by the timer.\n        timerParams = (TimerParams*)IOMalloc(sizeof(TimerParams));\n\
    \        // Take a copy of the asyncReference buffer.\n        bcopy(arguments->asyncReference,\
    \ timerParams->asyncRef, sizeof(OSAsyncReference64));\n\n        // Take a copy\
    \ of the \"milliseconds\" value provided by the user application.\n        timerParams->milliseconds\
    \ = (uint32_t)arguments->scalarInput[0];\n        // Take a reference to the userClient\
    \ object.\n        timerParams->userClient = target;\n        // Retain the user\
    \ client while an asynchronous operation is in progress.\n        target->retain();\n\
    \n        // Start a background thread to continue the operation after returning\
    \ to the caller.\n        kernel_thread_start(DelayThreadFunc, timerParams, &newThread);\n\
    \        thread_deallocate(newThread);\n\n        // Return immediately to the\
    \ calling application.\n        return kIOReturnSuccess;\n}\n\nvoid    com_osxkernel_driver_IOKitTestUserClient::\n\
    \                DelayThreadFunc (void *parameter, wait_result_t)\n{\n       \
    \ TimerParams*    timerParams = (TimerParams*)parameter;\n\n        // Sleep for\
    \ the requested time.\n        IOSleep(timerParams->milliseconds);\n        //\
    \ Send a notification to the user application that the operation has competed.\n\
    \        sendAsyncResult64(timerParams->asyncRef, kIOReturnSuccess, NULL, 0);\n\
    \n        // The background operation has completed, release the extra reference\
    \ to the\n        // user client object.\n        timerParams->userClient->release();\n\
    \n        IOFree(timerParams, sizeof(TimerParams));\n}\n```\n\n尽管前面的代码包含了很多信息，但重要的是要注意它分配一个对象来保存参数的方式，这些参数是驱动程序在后台线程上完成请求的操作时所需要的。为了防止用户客户端对象在操作进行期间被释放，该方法在启动操作时增加其保留计数，并在操作完成时减少其保留计数。最后，当后台操作完成时，用户客户端（或驱动程序）通过调用`sendAsyncResult64()`向用户应用程序发送信号。`sendAsyncResult64()`的最后两个参数在此示例中未使用，它们允许驱动程序向应用程序的回调函数提供额外的值。例如，异步读取操作可以使用它来返回读取的字节数。\n\
    \n### 总结\n\n*   几乎所有驱动程序都需要将其服务暴露给用户运行的应用程序。\n*   为了允许应用程序与内核驱动程序交互，驱动程序需要跨越用户空间代码和内核代码之间的屏障。使用I/O\
    \ Kit框架编写的驱动程序通过实现一个派生自`IOUserClient`类的类来实现这一点。\n*   应用程序可以遍历已加载的内核驱动程序，或者安装一个回调函数以在驱动程序加载和卸载时接收通知。\n\
    *   I/O Kit提供了几个函数，允许用户应用程序请求驱动程序提供的服务，包括通过读取和写入驱动程序属性，或者通过建立到驱动程序的连接并通过该连接向驱动程序发送控制请求。\n\
    \n## C H A P T E R  6"
  raw: 'Of course, for an operation to be asynchronous, the kernel driver must ensure
    that it returns immediately from the user client but will continue to handle the
    requested operation in the background and signal the process when the operation
    completes. An asynchronous method call is received by the user client no differently
    than from any other method call and is dispatched by `externalMethod()` to a handler
    function that receives its arguments through an `IOExternalMethodArguments` structure.
    However, unlike a synchronous method, the `IOExternalMethodArguments` structure
    contains fields that are useful to an asynchronous operation, as shown in the
    following definition:


    `struct IOExternalMethodArguments`

    `{`

    `        …`

    `        mach_port_t             asyncWakePort;`

    `        io_user_reference_t*    asyncReference;`

    `        uint32_t                asyncReferenceCount;`

    `        …`

    `};`


    By checking the value of `asyncWakePort,` the method that implements a control
    request can determine whether the user application invoked it through an asynchronous
    function call. If it is non-zero, an asynchronous operation was requested. Given
    that the handler function will perform the requested operation in the background
    (since an asynchronous control request should avoid blocking the calling application),
    it needs to save any values from the `IOExternalMethodArguments` structure that
    it will need to refer to while performing the operation. This includes copying
    any scalar and structure input parameter values that were provided by the caller
    (noting that the output values are returned to the calling application as soon
    as the user client returns and not when the asynchronous operation is completed).
    An important value from the `IOExternalMethodArguments` structure that needs to
    be saved is the `asyncReference` buffer, since this is used to signal the application
    when the operation has completed.


    An example of how an asynchronous operation is performed is shown below in [Listing
    5-16](#Chapter05.html#list_5_16).


    ***Listing 5-16.** The User Client Implementation of an Asynchronous Operation.
    This Implements the Kernel-side of the `InstallTimer()` Function.*


    `// A structure to hold parameters required by the background operation.`

    `struct TimerParams`

    `{`

    `        OSAsyncReference64              asyncRef;`

    `        uint32_t                        milliseconds;`

    `        OSObject*                       userClient;`

    `};`


    `IOReturn  com_osxkernel_driver_IOKitTestUserClient::`

    `       sInstallTimer (OSObject* target, void* reference, IOExternalMethodArguments*
    arguments)`

    `{`

    `        TimerParams*    timerParams;`

    `        thread_t        newThread;`


    `        // Allocate a structure to store parameters required by the timer.`

    `        timerParams = (TimerParams*)IOMalloc(sizeof(TimerParams));`

    `        // Take a copy of the asyncReference buffer.`

    `        bcopy(arguments->asyncReference, timerParams->asyncRef, sizeof(OSAsyncReference64));`


    `        // Take a copy of the "milliseconds" value provided by the user application.`

    `        timerParams->milliseconds = (uint32_t)arguments->scalarInput[0];`

    `        // Take a reference to the userClient object.`

    `        timerParams->userClient = target;`

    `        // Retain the user client while an asynchronous operation is in progress.`

    `        target->retain();`


    `        // Start a background thread to continue the operation after returning
    to the caller.`

    `        kernel_thread_start(DelayThreadFunc, timerParams, &newThread);`

    `        thread_deallocate(newThread);`


    `        // Return immediately to the calling application.`

    `        return kIOReturnSuccess;`

    `}`


    `void    com_osxkernel_driver_IOKitTestUserClient::`

    `                DelayThreadFunc (void *parameter, wait_result_t)`

    `{`

    `        TimerParams*    timerParams = (TimerParams*)parameter;`


    `        // Sleep for the requested time.`

    `        IOSleep(timerParams->milliseconds);`

    `        // Send a notification to the user application that the operation has
    competed.`

    `        sendAsyncResult64(timerParams->asyncRef, kIOReturnSuccess, NULL, 0);`


    `        // The background operation has completed, release the extra reference
    to the`

    `        // user client object.`

    `        timerParams->userClient->release();`


    `        IOFree(timerParams, sizeof(TimerParams));`

    `}`


    Although there is a lot to take in from the preceding code, it is important to
    note the way that it allocates an object to hold the parameters that are required
    while the driver completes the requested operation on a background thread. To
    prevent the user client object from being released while the operation is in progress,
    the method increments its retain count when starting the operation and decrements
    its retain count when the operation completes. Finally, when the background operation
    has completed, the user client (or driver) signals the user application by calling
    `sendAsyncResult64()`. The final two parameters of `sendAsyncResult64()`, which
    are unused in this example, allow a driver to provide additional values to the
    application''s callback function. For example, an asynchronous read operation
    could use this to return the number of bytes that it read.


    ### Summary


    *   Nearly all drivers will need to expose their services to applications run
    by the user.

    *   To allow applications to interact with a kernel driver, the driver needs to
    cross the barrier that exists between user space code and kernel code. A driver
    written using the I/O Kit framework achieves this by implementing a class that
    derives from the `IOUserClient` class.

    *   Applications can iterate loaded kernel drivers or can install a callback function
    to receive notifications when drivers are loaded and unloaded.

    *   The I/O Kit provides several functions that allow a user application to request
    services provided by a driver, including by reading and writing driver properties,
    or by establishing a connection to the driver and sending control requests to
    the driver over that connection.


    ## C H A P T E R  6'
