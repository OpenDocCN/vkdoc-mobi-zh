  raw: '##### “Hello World” Kernel Extension


    To get started with kernel programming, let''s begin by implementing a very simple
    example, the much beloved “Hello World” application or, in our case, kernel extension.
    First, launch Xcode and choose “Create a new Xcode project” from the welcome screen.
    This will present you with a list of templates for the new project. If you select
    the “System Plug-in” category, you will see that Xcode provides templates for
    both a “Generic Kernel Extension” and an “I/O Kit Driver.” Although both templates
    create a kernel extension, an I/O Kit driver requires us to nominate a hardware
    device it will match against and will load only if that device is present. A generic
    kernel extension, on the other hand, is not a hardware driver and can be loaded
    any time by the user.


    For this tutorial, we will create a project based on the “Generic Kernel Extension”
    template, so select that item and click the “Next” button. We are now asked for
    a product name and company identifier. The product name corresponds to the name
    of the executable file as seen by the user, so for this example, we will use “HelloWorld.”
    The company identifier should be a reverse DNS style string for a domain name
    you or your company has registered. For this example, you are free to use “com.osxkernel,”
    which is a domain registered for the purpose of this book. By appending the product
    name to the company identifier, Xcode creates a string that is guaranteed to be
    unique for the project and will not collide with the name of any existing kernel
    extension (the unique identifier for this tutorial would be “com.osxkernel.HelloWorld.”)


    ![images](images/square.jpg) **Note** The reverse DNS convention is used throughout
    Mac OS X in places where a unique identifier is required. We will see in later
    chapters that the I/O Kit uses a similar scheme to ensure the names of C++ classes
    are unique. Previous versions of Mac OS 9 used a unique four-character constant
    to identify applications, which required developers to register their chosen string
    with Apple. Using reverse DNS allows developers to generate their own unique identifier
    without having to register them with Apple.


    After clicking the “Create” button, Xcode will generate a project for you, including
    an implementation file named “HelloWorld.c.” You can examine the contents of the
    source file named “HelloWorld.c” by clicking on its icon in the left part of the
    project window. For this tutorial, modify the generated source code to include
    the header file `<libkern/libkern.h>` and to add two calls to `printf()`. The
    function named `HelloWorld_start()` will be called when our kernel extension is
    loaded and the function named `HelloWorld_stop()` will be called when the kernel
    extension is unloaded. When you have finished editing the file, the code should
    look like [Listing 3-1](#Chapter03.html#list_3_1).


    ***Listing 3-1.** The “HelloWorld.c” Tutorial*


    `#include <mach/mach_types.h>`

    **`#include <libkern/libkern.h>`**


    `kern_return_t   HelloWorld_start (kmod_info_t * ki, void * d) {`

    **`    printf("Hello world\n");`**

    `    return KERN_SUCCESS;`

    `}`


    `kern_return_t   HelloWorld_stop (kmod_info_t * ki, void * d) {`

    **`    printf("Goodbye world\n");`**

    `    return KERN_SUCCESS;`

    `}`


    As we mentioned in [Chapter 1](#Chapter01.html#ch1), the APIs used for writing
    kernel code are generally different to those available to user applications; this
    applies even to functions such as `printf()`. Rather than including the user space
    header `<stdio.h>`, the kernel has its own implementation of `printf` that is
    declared in the header file `<libkern/libkern.h>`. If you try to include `<stdio.h>`
    in a kernel project, the compiler will report that it cannot find the included
    header file.


    As well as including the header file that defines the `printf()` function, we
    also need to link our kernel extension against the library that provides the actual
    implementation of `printf`. Rather than a compile-time linking, the kernel resolves
    any library dependencies of a kernel extension only when the kernel extension
    is loaded. To inform the kernel of our dependencies, we need to declare the libraries
    we wish to link against in our kernel extension''s property list, a file that
    goes by the name “HelloWorld-Info.plist” in this tutorial project.


    To modify the property list, click on the file named “HelloWorld-Info.plist” in
    the project window. Although the format of the file is text-based XML, Xcode contains
    a graphical editor for manipulating property list files, as shown in [Figure 3-2](#Chapter03.html#fig_3_2).
    Add a new item to the `OSBundleLibraries` dictionary of your property list to
    include an item with the key name `com.apple.kpi.libkern` and the value `9.0.0`
    When you are finished, your property list should look identical to [Figure 3-2](#Chapter03.html#fig_3_2).


    ![images](images/0302.jpg)


    ***Figure 3-2.** The graphical property list editor in Xcode*


    The XML that corresponds to the addition we made to the property list file is
    shown in [Listing 3-2](#Chapter03.html#list_3_2).


    ***Listing 3-2.** The Value of the OSBundleLibraries Entry for Our Tutorial Kernel
    Extension*


    `<key>OSBundleLibraries</key>`

    `<dict>`

    `        <key>com.apple.kpi.libkern</key>`

    `        <string>9.0.0</string>`

    `</dict>`


    The project''s property list is not used by the compiler (other than to perform
    some preprocessing, which replaces variables such as `${PRODUCT_NAME}` with their
    actual value), but is intended for the kernel. The property list is copied to
    the compiled kernel extension and is read when the extension is loaded. The entry
    we added to the dictionary consists of a key-value pair; the key identifies a
    kernel library on which we depend and the value corresponds to the minimum required
    version of that library. In our case, we are informing the kernel that we require
    a library with the unique identifier `com.apple.kpi.libkern` and that we require
    version 9.0.0 or later of this library. The library identifier uses a reverse
    DNS prefix to ensure the name is unique; in this case, the prefix “com.apple”
    allows us to recognize the library as a standard library provided by Apple.


    ![images](images/square.jpg) **Tip** The version of the library, in our case 9.0.0,
    is the version of the Mac OS X kernel, not the version of Mac OS X itself. Version
    9.0.0 corresponds to Mac OS X 10.5.0\. You can determine the version of the kernel
    on your machine by typing the command `uname –r` into Terminal.


    ![images](images/square.jpg) **Note** You may have noticed that the project created
    from the Xcode template includes an item named “Kernel.framework” in the “Frameworks”
    group. This is not used by the linker when the project is built, but is simply
    included to help the developer by providing easy access to kernel headers.


    The kernel extension project is now complete and is ready to be built. To do this,
    choose “Build” from the “Project” menu. You should not receive any build errors,
    but if you do, make sure the contents of your “HelloWorld.c” file match those
    shown in [Listing 3-1](#Chapter03.html#list_3_1).'
  trans: "\n# “Hello World” 内核扩展\n\n要开始内核编程，让我们先实现一个非常简单的示例，即备受喜爱的 “Hello World” 应用，在此场景下则是内核扩展。首先，启动\
    \ Xcode 并从欢迎屏幕中选择 “Create a new Xcode project”。这将为你提供一个新项目的模板列表。如果你选择 “System\
    \ Plug-in” 类别，你将看到 Xcode 提供了 “Generic Kernel Extension” 和 “I/O Kit Driver” 两个模板。虽然这两个模板都会创建内核扩展，但\
    \ I/O Kit 驱动程序要求我们指定一个与之匹配的硬件设备，并且仅当该设备存在时才会加载。而通用内核扩展则不是硬件驱动程序，用户可以随时加载。\n\n\
    在本教程中，我们将基于 “Generic Kernel Extension” 模板创建一个项目，因此选择该项并点击 “Next” 按钮。现在我们需要输入产品名称和公司标识符。产品名称对应最终用户看到的可执行文件名，因此在本例中我们将使用\
    \ “HelloWorld”。公司标识符应为你的公司或你本人注册的域名对应的反向 DNS 格式字符串。在本例中，你可以自由使用 “com.osxkernel”，这是为本书目的而注册的域名。通过将产品名称附加到公司标识符后面，Xcode\
    \ 会生成一个确保项目唯一的字符串，并且不会与任何现有内核扩展的名称冲突（本教程的唯一标识符将是 “com.osxkernel.HelloWorld”）。\n\
    \n![images](img/square.jpg) **注意** 反向 DNS 约定在 Mac OS X 中广泛应用于需要唯一标识符的地方。我们将在后续章节中看到，I/O\
    \ Kit 使用类似的方案来确保 C++ 类的名称是唯一的。旧版本的 Mac OS 9 使用唯一的四字符常量来标识应用，这需要开发者向 Apple 注册他们选择的字符串。而使用反向\
    \ DNS 则允许开发者自行生成唯一标识符，无需向 Apple 注册。\n\n点击 “Create” 按钮后，Xcode 将为你生成一个项目，其中包括一个名为\
    \ “HelloWorld.c” 的实现文件。你可以通过点击项目窗口左侧的该文件图标来查看其内容。对于本教程，请修改生成的源代码，使其包含头文件 `<libkern/libkern.h>`，并添加两个对\
    \ `printf()` 的调用。名为 `HelloWorld_start()` 的函数将在内核扩展加载时被调用，而名为 `HelloWorld_stop()`\
    \ 的函数则在内核扩展卸载时被调用。编辑完成后，代码应如 代码清单 3-1 所示。\n\n***代码清单 3-1.** “HelloWorld.c” 教程*\n\
    \n```\n#include <mach/mach_types.h>\n#include <libkern/libkern.h>\n\nkern_return_t\
    \   HelloWorld_start (kmod_info_t * ki, void * d) {\n    printf(\"Hello world\\\
    n\");\n    return KERN_SUCCESS;\n}\n\nkern_return_t   HelloWorld_stop (kmod_info_t\
    \ * ki, void * d) {\n    printf(\"Goodbye world\\n\");\n    return KERN_SUCCESS;\n\
    }\n```\n\n正如我们在第 1 章中提到的，编写内核代码所用的 API 通常与用户应用程序可用的 API 不同；这甚至适用于 `printf()` 这样的函数。内核拥有自己的\
    \ `printf` 实现，声明在头文件 `<libkern/libkern.h>` 中，而非包含用户空间头文件 `<stdio.h>`。如果你尝试在内核项目中包含\
    \ `<stdio.h>`，编译器将报告找不到该头文件。\n\n除了包含定义 `printf()` 函数的头文件外，我们还需要将内核扩展与提供 `printf`\
    \ 实际实现的库进行链接。不过，这不是编译时的链接，而是在内核扩展加载时，内核才会解析其所有库依赖。为了告知内核我们的依赖关系，我们需要在内核扩展的属性列表文件中声明我们希望链接的库，在本教程项目中，该文件名为\
    \ “HelloWorld-Info.plist”。\n\n要修改属性列表，请点击项目窗口中的 “HelloWorld-Info.plist” 文件。尽管该文件的格式是基于文本的\
    \ XML，但 Xcode 包含一个用于操作属性列表文件的图形化编辑器，如图 3-2 所示。在属性列表的 `OSBundleLibraries` 字典中添加一个新项，其键名为\
    \ `com.apple.kpi.libkern`，值为 `9.0.0`。完成后，你的属性列表应与图 3-2 完全一致。\n\n![images](img/0302.jpg)\n\
    \n***图 3-2.** Xcode 中的图形化属性列表编辑器*\n\n我们对属性列表文件所做的添加对应的 XML 如代码清单 3-2 所示。\n\n***代码清单\
    \ 3-2.** 教程内核扩展中 `OSBundleLibraries` 条目的值*\n\n```\n<key>OSBundleLibraries</key>\n\
    <dict>\n        <key>com.apple.kpi.libkern</key>\n        <string>9.0.0</string>\n\
    </dict>\n```\n\n项目的属性列表并非供编译器使用（除了进行一些预处理，例如将 `${PRODUCT_NAME}` 等变量替换为实际值），而是供内核使用的。该属性列表会被复制到编译后的内核扩展中，并在扩展加载时被读取。我们添加到字典中的条目由键值对组成：键标识了我们所依赖的内核库，值则对应该库的最低所需版本。在此例中，我们告知内核，我们需要一个唯一标识符为\
    \ `com.apple.kpi.libkern` 的库，并且需要该库的 9.0.0 或更高版本。该库标识符使用了反向 DNS 前缀以确保名称的唯一性；这里，“com.apple”\
    \ 前缀让我们能够识别出这是 Apple 提供的标准库。\n\n![images](img/square.jpg) **提示** 库的版本，在本例中是 9.0.0，指的是\
    \ Mac OS X 内核的版本，而非 Mac OS X 系统本身的版本。9.0.0 版本对应于 Mac OS X 10.5.0。你可以通过在终端中执行 `uname\
    \ –r` 命令来确定你机器上的内核版本。\n\n![images](img/square.jpg) **注意** 你可能已经注意到，从 Xcode 模板创建的项目在\
    \ “Frameworks” 组中包含了一个名为 “Kernel.framework” 的项。它在项目构建时不会被链接器使用，只是为了让开发者方便访问内核头文件而包含的。\n\
    \n内核扩展项目现已完成并可以构建了。为此，请从 “Project” 菜单中选择 “Build”。你应该不会遇到任何构建错误，但如果遇到了，请确保你的 “HelloWorld.c”\
    \ 文件内容与代码清单 3-1 中所示的一致。\n"
- fmt: 'Before we run this kernel extension, it is worth taking a moment to understand
    how the kernel knows which entry points to call, given that the two functions
    contained in the source file appear to be user-defined. As you may have suspected,
    Xcode gives us a gentle push and generates some of the boilerplate code for us
    automatically. In generating this code, Xcode uses two values that are defined
    in the project''s settings, which define the kernel extension''s start and stop
    routines. These values are shown in [Figure 3-3](#Chapter03.html#fig_3_3). You
    are free to rename the entry points from `HelloWorld_start` and `HelloWorld_stop`,
    as long as you change the name of the functions defined in the source code and
    the values in the project build settings.


    ![images](images/0303.jpg)


    ***Figure 3-3.** The project settings for the “Hello World” kernel extension*


    Following a successful compile of the project, Xcode will have created a kernel
    extension with the name `HelloWorld.kext`. This file is packaged into a special
    file known as a KEXT bundle. If you are not familiar with bundles, they are essentially
    a directory that contains all the files required by the executable, but which
    the Finder presents to the user as a single file. [Listing 3-3](#Chapter03.html#list_3_3)
    shows the contents of the bundle created when we built the “Hello World” kernel
    extension.


    ***Listing 3-3.** The Contents of the `HelloWorld.kext` Bundle*


    ```

    HelloWorld.kext/

    HelloWorld.kext/Contents/Info.plist

    HelloWorld.kext/Contents/MacOS

    HelloWorld.kext/Contents/MacOS/HelloWorld

    HelloWorld.kext/Contents/Resources

    HelloWorld.kext/Contents/Resources/en.lproj

    HelloWorld.kext/Contents/Resources/en.lproj/InfoPlist.strings

    ```


    The file named `Info.plist` should be familiar, since this is a copy of the property
    list we modified earlier (with some minor processing applied by Xcode along the
    way). The other file that deserves a mention is simply named `HelloWorld` and
    is located in the subdirectory of the bundle with the path `Contents/MacOS`. This
    file contains the actual executable code of the kernel extension.


    ## Loading and Unloading Kernel Extensions


    A kernel extension is a code module that runs inside the operating system kernel.
    Having built our kernel extension, it now needs to be loaded into the kernel where
    it can be run. While Xcode is great for writing and building kernel extensions,
    it cannot be used for testing or debugging a kernel extension; in fact, for a
    kernel extension, the button named “Run” in the Xcode window will build the project
    only, but won''t actually load or run the resulting output. Instead, kernel extensions
    on Mac OS X can be loaded one of two ways: automatically, by copying the kernel
    extension bundle to the directory `/System/Library/Extensions`, or manually through
    the command line.


    To load the kernel extension, we first need to locate the compiled binary that
    was built by Xcode. By default, Xcode 4 will place the output from the compiler
    in a different location than the project directory that contains the source code,
    which can make it difficult to find the path to the kernel extension in order
    to load it on the command line. To locate the path in which Xcode has written
    the kernel extension, right-click on the product named `HelloWorld.kext`, which
    displays a contextual menu, and select the item “Show in Finder,” as shown in
    [Figure 3-4](#Chapter03.html#fig_3_4).


    ![images](images/0304.jpg)


    ***Figure 3-4.** Locating the path to the built kernel extension*


    A kernel extension that is copied to the `/System/Library/Extensions` directory
    will be loaded when needed by the operating system. This could be when the system
    boots or, in the case of a driver, when a hardware device that requires the driver
    is connected to the computer. However, during development, it is typically more
    convenient to load the kernel extension manually from the command line.


    For security, because a kernel extension is granted the same elevated privileges
    as the core operating system code, kernel extensions can only be installed or
    loaded by a user with administrative access to the system. As a further security
    measure, the system has strict requirements regarding the file permissions of
    the kernel extension''s bundle and will refuse to load a kernel extension that
    does not meet these requirements, particularly the following.


    - The KEXT bundle and all files and folders inside it must be owned by the user
    “root” (user id 0).

    - The KEXT bundle and all files and folders inside it must be owned by the group
    “wheel” (group id 0).

    - The KEXT bundle and any directory inside it must have the permissions mask `0755`
    (`rwxr-xr-x`).

    - All files inside the KEXT bundle must have the permissions mask `0644` (`rw-r--r--`).


    When you build a kernel extension in Xcode, the KEXT bundle it produces will have
    the correct permission mask for the bundle and its contents, but user and group
    ownership will correspond to the user who ran the compiler. To correct the file
    ownership to that required by a kernel extension, you can use the following command
    in Terminal.


    ```

    sudo chown -R root:wheel HelloWorld.kext

    ```


    Note that if you change the ownership of the KEXT inside the Xcode build directory,
    Xcode will not have sufficient permission to overwrite the KEXT when the project
    is next built, which will result in a build error. To overcome this, you can copy
    the KEXT from the Xcode build directory to another directory (such as `/tmp`)
    before changing its ownership and loading it.


    Mac OS X contains a number of command line utilities for the purpose of working
    with kernel extensions. Some of the commonly used commands include:


    - `kextload`, which loads a KEXT into the kernel

    - `kextunload`, which stops a loaded KEXT and unloads it from the kernel

    - `kextutil`, which is a developer-oriented utility for loading KEXTs into the
    kernel and can provide diagnostic information detailing why a kernel extension
    failed to load and can produce symbols that are useful when debugging an active
    kernel extension

    - `kextstat`, which displays a list of all KEXTs loaded into the kernel'
