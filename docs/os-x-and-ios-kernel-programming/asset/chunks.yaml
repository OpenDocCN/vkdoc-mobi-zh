- fmt: '### Loading USB Drivers


    To have your driver loaded automatically when a device is inserted, you must configure
    your driver''s `Info.plist`, as we learned in [Chapter 4](#Chapter04.html#ch4).
    As we saw in the previous section, a single driver may handle a USB device, or
    it may have several drivers, one for each interface (function) presented. For
    a USB device, a driver is matched against it using keys from the device''s device
    descriptor. The I/O Kit follows the rules for driver matching set by the Universal
    Serial Bus Common Class Specification. The following combinations of keys are
    valid for matching a driver against a USB device:


    - `idVendor` & `idProduct` & `bcdDevice`

    - `idVendor` & `idProduct`

    - `idVendor` & `bDeviceSubClass` & `bDeviceProtocol` (only if `bDeviceClass ==
    0xff`)

    - `idVendor` & `bDeviceSubClass` (only if `bDeviceClass == 0xff`)

    - `bDeviceClass` & `bDeviceSubClass` & `bDeviceProtocol` (only if `bDeviceClass
    != 0xff`)

    - `bDeviceClass` & `bDeviceSubClass` (only if `bDeviceClass != 0xff`)


    Each key represents an entry in the device''s device descriptor. The `bcdDevice`
    field is used to store the device''s revision number. If the `bDeviceClass` field
    is `0xff`, it means the device class is vendor specific. A matching dictionary
    in `Info.plist`, which matches against a vendor ID, a product ID, and a revision
    number (`bcdDevice`), is shown in [Listing 8-1](#Chapter08.html#list_8_1).


    **Listing 8-1.** Matching Dictionary for Matching Against Vendor ID, Product ID,
    and Device Revision


    ```

    <key>MyUSBDriver</key>

    <dict>

    <key>CFBundleIdentifier</key>

        <string>com.osxkernel.MyUSBDriver</string>

        <key>IOClass</key>

        <string>com_osxkernel_MyUSBDriver</string>

        <key>IOProviderClass</key>

        <string>IOUSBDevice</string>

        <key>bcdDevice</key>

        <integer>1</integer>

        <key>idProduct</key>

        <integer>2323</integer>

        <key>idVendor</key>

        <integer>0001</integer>

    </dict>

    ```


    The entry must be located in the `IOKitPersonalities` section of your driver''s
    `Info.plist` file to have any effect.


    Devices that are not matched by the previous rules will be handled by the `IOUSBCompositeDriver`,
    which selects a device configuration, if the device has multiple configurations
    present, and then initiates matching against the device''s interfaces instead.
    The keys that can be used to match against device interfaces are shown here:


    - `idVendor` & `idProduct` & `bcdDevice` & `bConfigurationValue` & `bInterfaceNumber`

    - `idVendor` & `idProduct` & `bConfigurationValue` & `bInterfaceNumber`

    - `idVendor` & `bInterfaceSubClass` & `bInterfaceProtocol` (only if `bInterfaceClass
    == 0xff`)

    - `idVendor` & `bInterfaceSubClass` (only if `bInterfaceClass == 0xff`)

    - `bInterfaceClass` & `bInterfaceSubClass` & `bInterfaceProtocol` (only if `bInterfaceClass
    != 0xff`)

    - `bInterfaceClass` & `bInterfaceSubClass` (only if `bInterfaceClass != 0xff`)


    **Note:** You cannot create your own combinations of keys; you have to use one
    of the combinations shown above for either an interface or a device. However,
    you can add several personalities to your driver, which can each match against
    a different combination, but it has to be one of the valid combinations.


    Each key represents a field in an interface descriptor. The matching rules are
    ordered according to how specific they are. The last rule, for example, which
    matches against the interface class and subclass, is used by Apple''s USB Mass
    Storage driver to match all devices that conform to that interface, regardless
    of vendor or product ID. The `Info.plist` for the Apple mass storage driver is
    shown in [Listing 8-2](#Chapter08.html#list_8_2) (though some keys unrelated to
    matching were trimmed for readability).


    **Listing 8-2.** Matching Dictionary for Matching Against a USB Interface Class
    and Subclass


    ```

    <key>IOUSBMassStorageClass6</key>

    <dict>

        <key>CFBundleIdentifier</key>

        <string>com.apple.iokit.IOUSBMassStorageClass</string>

        <key>IOClass</key>

        <string>IOUSBMassStorageClass</string>

        <key>IOProviderClass</key>

        <string>IOUSBInterface</string>

        <key>bInterfaceClass</key>

        <integer>8</integer>

        <key>bInterfaceSubClass</key>

        <integer>6</integer>

    </dict>

    ```


    Unlike the example in [Listing 8-1](#Chapter08.html#list_8_1), the `IOProviderClass`
    is specified as `IOUSBInterface`, which will be the provider passed to your driver''s
    `start()` method instead of `IOUSBDevice`.


    ### USB Prober


    Before we start looking at actual code, it is worth mentioning a highly useful
    tool called USB Prober. USB Prober is a utility that is bundled with the Xcode
    distribution. The USB Prober tool is shown in [Figure 8-6](#Chapter08.html#fig_8_6).


    **Figure 8-6.** USB Prober utility


    USB Prober allows you to probe available USB buses on your system and inspect
    the hierarchy of devices attached to each bus. It also allows you to inspect the
    device, configuration, interface, and endpoint descriptors. The *IORegistry* tab
    allows you to inspect the *IOService* plane of the I/O Registry as it pertains
    to USB devices, which is very useful during development of a USB driver, as it
    allows you to verify that your driver was matched correctly. USB prober can also
    perform USB specific tracing from the IOUSBFamily, which may be useful for debugging
    your driver in some cases. This requires some setup, including downloading the
    USB Debug Kit from Apple''s developer website. The kit contains an alternate version
    of IOUSBFamily, which provides verbose logging. Access to the debug kit is restricted
    to members of the Mac developer program.'
