    ## IOUSBInterfaceInterface 类\n\n`IOUSBInterfaceInterface` 类是一个用户空间类，提供与内核驱动程序使用的\
    \ `IOUSBInterface` 类等效的功能。应用程序可以通过遍历设备的接口来获取对 `IOUSBInterfaceInterface` 类的引用，如清单\
    \ 15-5 所示；或者，应用程序可以通过创建一个指定服务名 `kIOUSBInterfaceClassName` 的匹配字典来直接获取 `IOUSBInterfaceInterface`\
    \ 对象。\n\n一个 USB 接口包含一个或多个端点，这些端点允许向设备写入数据或从设备读取数据。用户空间的 USB 驱动程序在使用端点类型方面不受任何限制；所有端点类型，包括批量端点、等时端点和中断端点，都可被用户空间驱动程序使用。用户空间驱动程序能够达到与内核驱动程序相似的数据带宽，这意味着即使是需要大量数据传输的应用程序也可以在用户空间中编写。\n\
    \n无论应用程序是使用 `IOUSBDeviceInterface` 来遍历 USB 接口，还是使用匹配字典直接获取 USB 接口来创建迭代器，应用程序都会收到一个\
    \ `io_service_t`，它提供了内核中底层 `IOUSBInterface` 对象的用户空间表示。清单 15-6 演示了如何从 `io_service_t`\
    \ 对象创建一个 `IOUSBInterfaceInterface` 对象。\n\n***清单 15-6.** 从 io_service_t 实例化一个 IOUSBInterfaceInterface\
    \ 对象*\n\n```c\nIOUSBInterfaceInterface300**     MyCreateInterfaceClass (io_service_t\
    \ usbInterfaceRef)\n{\n        SInt32                          score;\n      \
    \  IOCFPlugInInterface**           plugin;\n        IOUSBInterfaceInterface300**\
    \    usbInterface = NULL;\n        kern_return_t                   err;\n\n  \
    \      err = IOCreatePlugInInterfaceForService(usbInterfaceRef,\n            \
    \        kIOUSBInterfaceUserClientTypeID,         \n                    kIOCFPlugInInterfaceID,\
    \ &plugin, &score);\n        if (err == 0)\n        {\n                err = (*plugin)->QueryInterface(plugin,\n\
    \                        CFUUIDGetUUIDBytes(kIOUSBInterfaceInterfaceID300),\n\
    \                        (LPVOID)&usbInterface);\n                IODestroyPlugInInterface(plugin);\n\
    \        }\n\n        return usbInterface;\n}\n```\n\n与 USB 设备类一样，应用程序必须先获得 USB\
