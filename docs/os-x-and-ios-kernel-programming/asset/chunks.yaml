    The format of the sample buffer is described by the *IOAudioStreamFormat* structure.
    In the preceding case, we only added a single format and a single sample rate.
    You can define multiple supported formats and rates and add them by calling `addAvailableFormat()`
    for each defined format. The specification for our stream is Linear PCM signed
    integer samples at 16-bit depth/width in big-endian byte order. In most cases,
    bit depth and bit width are the same, such as for 16-bit samples. The depth specifies
    the number of bits used by the audio sample, whereas the width specifies the width
    in bits of the data word it''s stored in. For example, this is used if you have
    24-bit samples. A 24-bit sample occupies three bytes, which is awkward to work
    with and to align properly, so we instead use a 32-bit word to store each sample,
    which is more efficient in terms of performance (though it will waste eight bits
    per sample). If the width and depth do not match, the next field in the `IOAudioStreamFormat`
    structure must be set to either `kIOAudioStreamAlignmentHighByte` or `kIOAudioStreamAlignmentLowByte`
    to specify the alignment of the sample within the data word.


    ##### Handling Format Changes


    Your `IOAudioEngine` will need to respond to requests from Core Audio to change
    the format of the engine''s audio streams. Requests to change format are handled
    with the `performFormatChange()` method, which should be overridden as the default
    is a stub that simply returns an error. The Apple `IOAudioFamily` sample implements
    the format change method, as follows:


    `IOReturn SampleAudioEngine::performFormatChange(IOAudioStream *audioStream,`

    `                                                const IOAudioStreamFormat *newFormat,`

    `                                                const IOAudioSampleRate *newSampleRate)`

    `{`

    `    IOLog("SampleAudioEngine[%p]::peformFormatChange(%p, %p, %p)\n", this, audioStream,
    newFormat, newSampleRate);`


    `    // Since we only allow one format, we only need to be concerned with sample
    rate changes`

    `    // In this case, we only allow two sample rates, 44100 and 48000,`

    `    // so those are the only ones we check for.`

    `    if (newSampleRate) {`

    `        switch (newSampleRate->whole) {`

    `            case 44100:`

    `                IOLog("/t-> 44.1kHz selected\n");`

    `                // Add code to switch hardware to 44.1khz`

    `                break;`

    `            case 48000:`

    `                IOLog("/t-> 48kHz selected\n");`

    `                // Add code to switch hardware to 48kHz`

    `                break;`

    `            default:`

    `                // This should not be possible since we only specified 44100
    and 48000`

    `                // as valid sample rates`

    `                IOLog("/t Internal Error - unknown sample rate selected.\n");`

    `                break;`

    `        }`

    `    }`

    `    return kIOReturnSuccess;`

    `}`


    ![images](images/square.jpg) **Note** The `performFormatChange()` method will
    be called only for formats specified when `IOAudioStreams` were created.'
  trans: '

    ### 创建与初始化音频流


    一个`IOAudioEngine`至少需要一个`IOAudioStream`才能执行有用的操作。每个流都与一个采样缓冲区唯一关联，并描述该缓冲区支持的格式和采样率。流可以是输出流或输入流。在底层，`IOAudioStream`负责处理数据进出采样缓冲区的机制。在其内部，它维护了一个混音缓冲区，来自多个客户端的音频数据在此混合成单一流，然后送入最终要发往硬件的采样缓冲区。维护混音缓冲区和采样缓冲区是音频驱动程序执行的最复杂任务，而这一切都由`IOAudioStream`类为我们处理。在大多数情况下，`IOAudioStream`的默认行为应该足够；但是，如果你的驱动程序需要更高级的功能，可以覆盖`IOAudioStream`中的大多数方法以提供自定义行为。下面展示的是`MyAudioEngine`中负责创建输入和输出流的`createNewAudioStream()`方法。


    ```

    IOAudioStream *MyAudioEngine::createNewAudioStream(IOAudioStreamDirection direction,

                                                       void* sampleBuffer, UInt32
    sampleBufferSize)

    {

        IOAudioStream* audioStream;


        audioStream = new IOAudioStream;

        if (audioStream) {

            if (!audioStream->initWithAudioEngine(this, direction, 1)) {

                audioStream->release();

            } else {

                IOAudioSampleRate rate;

                IOAudioStreamFormat format = {

                    2,                                                  // 通道数

                    kIOAudioStreamSampleFormatLinearPCM,            // 采样格式

                    kIOAudioStreamNumericRepresentationSignedInt,   // 数值格式

                    kAudioSampleDepth,                              // 16 位

                    kAudioSampleWidth,                              // 16 位

                    kIOAudioStreamAlignmentHighByte,                // 高位字节对齐 - 未使用

                                                                    // 因为位深度 == 位宽

                    kIOAudioStreamByteOrderBigEndian,               

                    true,                                           // 格式可混合

                    0                                               // 驱动程序定义的标签 -
    未使用

                                                                    // 此驱动程序不使用

                };

                audioStream->setSampleBuffer(sampleBuffer, sampleBufferSize);            

                rate.fraction = 0;

                rate.whole = kAudioSampleRate;

                audioStream->addAvailableFormat(&format, &rate, &rate);

                audioStream->setFormat(&format);

            }

        }

        return audioStream;

    }

    ```


    采样缓冲区的格式由`IOAudioStreamFormat`结构体描述。在上述示例中，我们只添加了一种格式和一种采样率。你可以定义多种支持的格式和速率，并通过为每种定义的格式调用`addAvailableFormat()`来添加它们。我们流的规格是大端字节序的
    16 位深度/宽度的线性 PCM 有符号整数采样。在大多数情况下，位深度和位宽是相同的，例如对于 16 位采样。深度指定了音频样本使用的位数，而宽度则指定了存储该样本的数据字的位宽。例如，当你使用
    24 位样本时会用到这一点。一个 24 位样本占用三个字节，这导致操作和对齐很不便，因此我们改用 32 位字来存储每个样本，这在性能方面效率更高（尽管每个样本会浪费八个位）。如果宽度和深度不匹配，则必须将`IOAudioStreamFormat`结构体中的下一个字段设置为`kIOAudioStreamAlignmentHighByte`或`kIOAudioStreamAlignmentLowByte`，以指定样本在数据字中的对齐方式。


    ### 处理格式变更


    你的`IOAudioEngine`需要响应来自 Core Audio 的请求，以更改引擎音频流的格式。格式变更请求通过`performFormatChange()`方法处理，应覆盖此方法，因为默认方法只是一个直接返回错误的桩。Apple
    `IOAudioFamily`示例实现了格式变更方法，如下所示：


    ```

    IOReturn SampleAudioEngine::performFormatChange(IOAudioStream *audioStream,

                                                    const IOAudioStreamFormat *newFormat,

                                                    const IOAudioSampleRate *newSampleRate)

    {

        IOLog("SampleAudioEngine[%p]::peformFormatChange(%p, %p, %p)\n", this, audioStream,
    newFormat, newSampleRate);


        // 由于我们只允许一种格式，只需要关注采样率变化即可

        // 在这种情况下，我们只允许两种采样率：44100 和 48000，

        // 因此我们只需要检查这两种。

        if (newSampleRate) {

            switch (newSampleRate->whole) {

                case 44100:

                    IOLog("/t-> 44.1kHz selected\n");

                    // 添加将硬件切换到 44.1kHz 的代码

                    break;

                case 48000:

                    IOLog("/t-> 48kHz selected\n");

                    // 添加将硬件切换到 48kHz 的代码

                    break;

                default:

                    // 由于我们仅指定了 44100 和 48000 为有效采样率，此情况不应发生

                    IOLog("/t Internal Error - unknown sample rate selected.\n");

                    break;

            }

        }

        return kIOReturnSuccess;

    }

    ```


    ![images](img/square.jpg) **注意**：`performFormatChange()`方法仅针对创建`IOAudioStreams`时指定的格式被调用。

