- fmt: '### The `IOUSBDeviceInterface` Class


    The `IOUSBDeviceInterface` class is a user-space class that provides equivalent
    functionality to the `IOUSBDevice` class used by kernel drivers. It''s worth noting
    that although the user client class provides similar functionality to its kernel
    counterpart, it implements it through a different set of methods. Therefore, a
    kernel USB driver written to work with the `IOUSBDevice` class cannot simply be
    brought into a user-space USB driver.


    After obtaining a reference to the user-space `IOUSBDeviceInterface`, the first
    thing an application will need to do is to configure the USB hardware. The steps
    an application will take to do this will closely match those explained in [Chapter
    8](#Chapter08.html#ch8) for a kernel driver. First, the application needs to obtain
    exclusive access to the USB hardware and prevent the hardware''s configuration
    from being changed by another driver, which could either be another user-space
    driver or a kernel driver. This is achieved by calling the `IOUSBDeviceInterface`
    method `USBDeviceOpen()`, as follows:


    ```

    error = (*usbDevice)->USBDeviceOpen(usbDevice);

    ```


    If the error code returned from the method is `kIOReturnSuccess`, the application
    has been granted exclusive access to configure the hardware. If another application
    or driver has already obtained exclusive access to the hardware, the call to `USBDeviceOpen()`
    will fail with the error code `kIOReturnExclusiveAccess` and the application should
    abort all further access to the device, possibly reporting an error to the user.


    When an application has finished using the device, it should relinquish its exclusive
    access to the hardware by calling the `IOUSBDeviceInterface` method `USBDeviceClose()`,
    as follows:


    ```

    error = (*usbDevice)->USBDeviceClose(usbDevice);

    ```


    What follows is a summary of the methods provided by the `IOUSBDeviceInterface`
    class that provide access to the information contained in the USB device descriptor.
    In this chapter, we describe the `IOUSBDeviceInterface300` class, so some of the
    following methods will not be present in earlier versions of the `IOUSBDeviceInterface`
    class.


    -   `GetDeviceClass`, `GetDeviceSubClass`, and `GetDeviceProtocol`: Returns the
    device class (`bDeviceClass`), subclass (`bDeviceSubClass`), and protocol (`bDeviceProtocol`)
    from the USB device descriptor. Together, these three values define the function
    of the device based on values defined in the USB specification.

    -   `GetDeviceVendor`: Returns the USB Vendor ID of the device (`idVendor`).

    -   `GetDeviceProduct`: Returns the USB Product ID of the device (`idProduct`).

    -   `GetDeviceReleaseNumber`: Returns the device release number (`bcdDevice`).

    -   `USBGetManufacturerStringIndex`: Returns the index of the string for the device''s
    manufacturer name (`iManufacturer`). To read the actual string from the device,
    an application must follow up by sending the standard device request “get descriptor”
    to read an entry from the device''s string table.

    -   `USBGetProductStringIndex`: Returns the index of the string for the device''s
    product name (`iProduct`).

    -   `USBGetSerialNumberStringIndex`: Returns the index of the string for the device''s
    serial number (`iSerialNumber`).

    -   `GetNumberOfConfigurations`: Returns the number of configurations the device
    supports at its current speed (`bNumConfigurations`).


    The following methods allow an application to read dynamic properties that relate
    to the current state of the USB device:


    -   `GetDeviceAddress`: Returns the address of the USB device, which is unique
    for the bus it is connected to.

    -   `GetDeviceSpeed`: Returns the speed of the device. Possible values include
    `kUSBDeviceSpeedLow`, `kUSBDeviceSpeedFull`, or `kUSBDeviceSpeedHigh`.

    -   `GetLocationID`: Returns a 32-bit value that uniquely identifies a USB device
    on the system, based on the USB hub and port the device is connected to. The Location
    ID won''t change following a restart of the computer, but will change if the device
    is connected to another hub or port. Therefore, if the USB device provides a serial
    number string, it is a preferable way to track a device across reboots and disconnections.

    -   `GetBusFrameNumber`: Returns the current frame number of the USB bus to which
    the device is connected. The function also returns the system host time that corresponds
    to the time at which the kernel driver handled the request. The system time may
    fall anywhere within the returned USB frame.

    -   `GetBusFrameNumberWithTime`: Returns the current frame number of the USB bus
    to which the device is connected, but also returns the system host time that corresponds
    to the start of that frame. This method was introduced in later versions of the
    `IOUSBDeviceInterface` class and supersedes the method `GetBusFrameNumber()`.

    -   `GetBusMicroFrameNumber`: Returns the current microframe number of the USB
    bus to which the device is connected. The function also returns the system host
    time that corresponds to the time at which the kernel driver handled the request
    (and so this method behaves like `GetBusFrameNumber()`).


    The following methods provide a way for an application to reset the USB device:


    -   `ResetDevice`: Resets the USB device, returning it to the non-configured state.

    -   `USBDeviceReEnumerate`: Instructs the hub to which this device is connected
    to reset the port that this device is connected to. This is equivalent to disconnecting
    the device from the USB port and reconnecting it.

    -   `USBDeviceSuspend`: Despite the name of this method, it can either suspend
    or resume the port to which the USB device is connected, depending on the value
    of a Boolean parameter. If the method suspends the device, any outstanding transactions
    to the device will be aborted.

    -   `USBDeviceAbortPipeZero`: Aborts any outstanding transaction on the control
    endpoint.


    The `IOUSBDeviceInterface` class provides the following methods to allow an application
    to send control requests to the device on endpoint zero:'
  raw: '### The IOUSBDeviceInterface Class


    The `IOUSBDeviceInterface` class is a user-space class that provides equivalent
    functionality to the `IOUSBDevice` class used by kernel drivers. It''s worth noting
    that although the user client class provides similar functionality to its kernel
    counterpart, it implements it through a different set of methods. Therefore, a
    kernel USB driver written to work with the `IOUSBDevice` class cannot simply be
    brought into a user-space USB driver.


    After obtaining a reference to the user-space `IOUSBDeviceInterface`, the first
    thing an application will need to do is to configure the USB hardware. The steps
    an application will take to do this will closely match those explained in [Chapter
    8](#Chapter08.html#ch8) for a kernel driver. First, the application needs to obtain
    exclusive access to the USB hardware and prevent the hardware''s configuration
    from being changed by another driver, which could either be another user-space
    driver or a kernel driver. This is achieved by calling the `IOUSBDeviceInterface`
    method `USBDeviceOpen()`, as follows:


    `error = (*usbDevice)->USBDeviceOpen(usbDevice);`


    If the error code returned from the method is `kIOReturnSuccess`, the application
    has been granted exclusive access to configure the hardware. If another application
    or driver has already obtained exclusive access to the hardware, the call to `USBDeviceOpen()`
    will fail with the error code `kIOReturnExclusiveAccess` and the application should
    abort all further access to the device, possibly reporting an error to the user.


    When an application has finished using the device, it should relinquish its exclusive
    access to the hardware by calling the `IOUSBDeviceInterface` method `USBDeviceClose()`,
    as follows:


    `error = (*usbDevice)->USBDeviceClose(usbDevice);`


    What follows is a summary of the methods provided by the `IOUSBDeviceInterface`
    class that provide access to the information contained in the USB device descriptor.
    In this chapter, we describe the `IOUSBDeviceInterface300` class, so some of the
    following methods will not be present in earlier versions of the `IOUSBDeviceInterface`
    class.


    *   `GetDeviceClass`, `GetDeviceSubClass`, and `GetDeviceProtocol`: Returns the
    device class (`bDeviceClass`), subclass (`bDeviceSubClass`), and protocol (`bDeviceProtocol`)
    from the USB device descriptor. Together, these three values define the function
    of the device based on values defined in the USB specification.

    *   `GetDeviceVendor`: Returns the USB Vendor ID of the device (`idVendor`).

    *   `GetDeviceProduct`: Returns the USB Product ID of the device (`idProduct`).

    *   `GetDeviceReleaseNumber`: Returns the device release number (`bcdDevice`).

    *   `USBGetManufacturerStringIndex`: Returns the index of the string for the device''s
    manufacturer name (`iManufacturer`). To read the actual string from the device,
    an application must follow up by sending the standard device request “get descriptor”
    to read an entry from the device''s string table.

    *   `USBGetProductStringIndex`: Returns the index of the string for the device''s
    product name (`iProduct`).

    *   `USBGetSerialNumberStringIndex`: Returns the index of the string for the device''s
    serial number (`iSerialNumber`).

    *   `GetNumberOfConfigurations`: Returns the number of configurations the device
    supports at its current speed (`bNumConfigurations`).


    The following methods allow an application to read dynamic properties that relate
    to the current state of the USB device:


    *   `GetDeviceAddress`: Returns the address of the USB device, which is unique
    for the bus it is connected to.

    *   `GetDeviceSpeed`: Returns the speed of the device. Possible values include
    `kUSBDeviceSpeedLow`, `kUSBDeviceSpeedFull`, or `kUSBDeviceSpeedHigh`.

    *   `GetLocationID`: Returns a 32-bit value that uniquely identifies a USB device
    on the system, based on the USB hub and port the device is connected to. The Location
    ID won''t change following a restart of the computer, but will change if the device
    is connected to another hub or port. Therefore, if the USB device provides a serial
    number string, it is a preferable way to track a device across reboots and disconnections.

    *   `GetBusFrameNumber`: Returns the current frame number of the USB bus to which
    the device is connected. The function also returns the system host time that corresponds
    to the time at which the kernel driver handled the request. The system time may
    fall anywhere within the returned USB frame.

    *   `GetBusFrameNumberWithTime` returns the current frame number of the USB bus
    to which the device is connected, but also returns the system host time that corresponds
    to the start of that frame. This method was introduced in later versions of the
    `IOUSBDeviceInterface` class and supersedes the method `GetBusFrameNumber()`.

    *   `GetBusMicroFrameNumber`: Returns the current microframe number of the USB
    bus to which the device is connected. The function also returns the system host
    time that corresponds to the time at which the kernel driver handled the request
    (and so this method behaves like `GetBusFrameNumber()`).


    The following methods provide a way for an application to reset the USB device:


    *   `ResetDevice`: Resets the USB device, returning it to the non-configured state.

    *   `USBDeviceReEnumerate`: Instructs the hub to which this device is connected
    to reset the port that this device is connected to. This is equivalent to disconnecting
    the device from the USB port and reconnecting it.

    *   `USBDeviceSuspend`: Despite the name of this method, it can either suspend
    or resume the port to which the USB device is connected, depending on the value
    of a Boolean parameter. If the method suspends the device, any outstanding transactions
    to the device will be aborted.

    *   `USBDeviceAbortPipeZero`: Aborts any outstanding transaction on the control
    endpoint.


    The `IOUSBDeviceInterface` class provides the following methods to allow an application
    to send control requests to the device on endpoint zero:'
