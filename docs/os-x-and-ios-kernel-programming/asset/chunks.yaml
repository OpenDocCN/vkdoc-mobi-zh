- fmt: '### Requesting Power State Changes


    So far we have looked at how a driver responds to requests from the system to
    change its power state in response to events such as the system being put into
    the sleep state. However, there are times when a driver may wish to initiate a
    change in the power state of its device independent of the overall power state
    of the system. For example, an LCD monitor may dim its backlight after a few minutes
    of inactivity, or a disk may spin down if it hasn''t been accessed for some time.


    A driver should use the I/O Kit''s power management API even for power state changes
    that affect only the device that it is controlling. Doing so will not only ensure
    that any change of power state that is initiated by the driver is synchronized
    with power state changes requested by the system but it also allows your driver
    to take advantage of support provided by the I/O Kit for such tasks as installing
    a timer to monitor the device''s activity and request a transition to a lower
    power state if the device is not accessed for a period of time. Lastly, if there
    are devices that rely on your hardware for their power, you will need to use the
    I/O Kit methods to transition your hardware''s power so that any children devices
    are informed of possible changes to their input power.


    There are three methods that can be called to change the current power state of
    a device:


    - `changePowerStateTo(powerStateOrdinal)`: Requests a change to the power state
    at the specified index in the registered power state array.

    - `changePowerStateToPriv(powerStateOrdinal)`: Performs a similar function to
    the previous method, with the difference that this is a protected method in the
    `IOService` class, and so cannot be called by objects other than the driver itself.

    - `makeUsable()`: Requests a power change to the highest power state supported
    by the driver. This method is typically called by another client of this driver
    (such as the driver''s user client) to ensure that the device is fully functional
    before it makes further use of the device.


    These three methods are implemented by the `IOService` class, and there is typically
    no need for a driver to override any of these methods. Internally, the implementation
    of the `makeUsable()` method calls through to the same code path as `changePowerStateToPriv()`,
    which means that each driver has two power states associated with it: the value
    requested through `changePowerStateTo()` and the value requested through `changePowerStateToPriv()`/`makeUsable()`.


    The power state that the I/O Kit ultimately switches the device to is the maximum
    of the value requested by `changePowerStateTo()`, the value requested by `changePowerStateToPriv()`,
    and the maximum state that satisfies the requirements of any children that are
    dependent on the device for power. If the device has any children in the power
    plane that require power, then the parent device cannot be placed in a power state
    that has an `outputPowerCharacter` property that is not `kIOPMPowerOn`.


    You may be wondering why the I/O Kit provides two nearly identical methods for
    setting a device''s power state. The private method `changePowerStateToPriv()`
    allows a driver to set a minimum power level that cannot be affected by any clients
    of the driver, which only have the ability to call the public `changePowerStateTo()`
    method. A client may raise the power state above the level set by `changePowerStateToPriv()`,
    but the driver will never be placed into a power state lower than the value set
    by `changePowerStateToPriv()`. The one exception to this behavior is when the
    system is placed into the sleep state, at which time the device will be put into
    the lowest power state, overriding the power state that has been set through `changePowerStateToPriv()`.
    When the system wakes from sleep, it returns to the power state that was previously
    active.


    By convention, a driver should set its power state through the protected method
    `changePowerStateToPriv()`. To remove any influence from the public power level,
    a driver should place a call to the public method `changePowerStateTo(0)` in its
    `start()` method after registering the driver for power management. Setting the
    public power state to 0 allows the power state that is requested by `changePowerStateToPriv()`
    to be applied without alteration (providing that the power requirements of any
    children devices can be satisfied).


    Because the power state for the device is derived from three possible values,
    it is recalculated whenever the power state of one of its power children changes
    or a call it made to either the `changePowerStateTo()` or `changePowerStateToPriv()`
    method is called. If the calculated power state differs from the current power
    state of the driver, the I/O Kit will send the driver a request to change its
    power state. The driver will receive this request as described in the previous
    section of this chapter, "Responding to Power State Changes", and should respond
    to the request in the way previously described.


    The methods `changePowerStateTo()`, `changePowerStateToPriv()`, and `makeUsable()`
    are all asynchronous, and may return to the caller before the device has transitioned
    to its new power state. The implication of this is that a driver that wishes to
    change its own power state (using, for example, the `changePowerStateToPriv()`
    method) should wait until its `setPowerState()` method is called before reprogramming
    its hardware to the new power state. A client that wishes to change the power
    state of another driver by calling a public method (such as `changePowerStateTo()`
    or `makeUsable()`) cannot assume that the device is running in the new power state
    when the method returns. Instead, it should register to receive notifications
    when the device''s state changes. This is discussed in the section "Observing
    Device Power State Changes" later in this chapter.'
  raw: '### Requesting Power State Changes


    So far we have looked at how a driver responds to requests from the system to
    change its power state in response to events such as the system being put into
    the sleep state. However, there are times when a driver may wish to initiate a
    change in the power state of its device independent of the overall power state
    of the system. For example, an LCD monitor may dim its backlight after a few minutes
    of inactivity, or a disk may spin down if it hasn''t been accessed for some time.


    A driver should use the I/O Kit''s power management API even for power state changes
    that affect only the device that it is controlling. Doing so will not only ensure
    that any change of power state that is initiated by the driver is synchronized
    with power state changes requested by the system but it also allows your driver
    to take advantage of support provided by the I/O Kit for such tasks as installing
    a timer to monitor the device''s activity and request a transition to a lower
    power state if the device is not accessed for a period of time. Lastly, if there
    are devices that rely on your hardware for their power, you will need to use the
    I/O Kit methods to transition your hardware''s power so that any children devices
    are informed of possible changes to their input power.


    There are three methods that can be called to change the current power state of
    a device:


    *   `changePowerStateTo(powerStateOrdinal)`: Requests a change to the power state
    at the specified index in the registered power state array.

    *   `changePowerStateToPriv(powerStateOrdinal)`: Performs a similar function to
    the previous method, with the difference that this is a protected method in the
    `IOService` class, and so cannot be called by objects other than the driver itself.

    *   `makeUsable()`: Requests a power change to the highest power state supported
    by the driver. This method is typically called by another client of this driver
    (such as the driver''s user client) to ensure that the device is fully functional
    before it makes further use of the device.


    These three methods are implemented by the `IOService` class, and there is typically
    no need for a driver to override any of these methods. Internally, the implementation
    of the `makeUsable()` method calls through to the same code path as `changePowerStateToPriv()`,
    which means that each driver has two power states associated with it: the value
    requested through `changePowerStateTo()` and the value requested through `changePowerStateToPriv()`/`makeUsable()`.


    The power state that the I/O Kit ultimately switches the device to is the maximum
    of the value requested by `changePowerStateTo()`, the value requested by `changePowerStateToPriv()`,
    and the maximum state that satisfies the requirements of any children that are
    dependent on the device for power. If the device has any children in the power
    plane that require power, then the parent device cannot be placed in a power state
    that has an `outputPowerCharacter` property that is not `kIOPMPowerOn`.


    You may be wondering why the I/O Kit provides two nearly identical methods for
    setting a device''s power state. The private method `changePowerStateToPriv()`
    allows a driver to set a minimum power level that cannot be affected by any clients
    of the driver, which only have the ability to call the public `changePowerStateTo()`
    method. A client may raise the power state above the level set by `changePowerStateToPriv()`,
    but the driver will never be placed into a power state lower than the value set
    by `changePowerStateToPriv()`. The one exception to this behavior is when the
    system is placed into the sleep state, at which time the device will be put into
    the lowest power state, overriding the power state that has been set through `changePowerStateToPriv()`.
    When the system wakes from sleep, it returns to the power state that was previously
    active.


    By convention, a driver should set its power state through the protected method
    `changePowerStateToPriv()`. To remove any influence from the public power level,
    a driver should place a call to the public method `changePowerStateTo(0)` in its
    `start()` method after registering the driver for power management. Setting the
    public power state to 0 allows the power state that is requested by `changePowerStateToPriv()`
    to be applied without alteration (providing that the power requirements of any
    children devices can be satisfied).


    Because the power state for the device is derived from three possible values,
    it is recalculated whenever the power state of one of its power children changes
    or a call it made to either the `changePowerStateTo()` or `changePowerStateToPriv()`
    method is called. If the calculated power state differs from the current power
    state of the driver, the I/O Kit will send the driver a request to change its
    power state. The driver will receive this request as described in the previous
    section of this chapter, “Responding to Power State Changes”, and should respond
    to the request in the way previously described.


    The methods `changePowerStateTo()`, `changePowerStateToPriv()`, and `makeUsable()`
    are all asynchronous, and may return to the caller before the device has transitioned
    to its new power state. The implication of this is that a driver that wishes to
    change its own power state (using, for example, the `changePowerStateToPriv()`
    method) should wait until its `setPowerState()` method is called before reprogramming
    its hardware to the new power state. A client that wishes to change the power
    state of another driver by calling a public method (such as `changePowerStateTo()`
    or `makeUsable()`) cannot assume that the device is running in the new power state
    when the method returns. Instead, it should register to receive notifications
    when the device''s state changes. This is discussed in the section “Observing
    Device Power State Changes” later in this chapter.'
  trans: '

    ### 请求电源状态变更


    到目前为止，我们已经了解了驱动程序如何响应系统请求，根据诸如系统进入睡眠状态等事件来更改其电源状态。但是，有时驱动程序可能希望独立于系统的整体电源状态，主动发起其设备的电源状态变更。例如，LCD
    显示器可能在不活动几分钟后调暗背光，或者硬盘如果在某段时间内未被访问则可能停转。


    即便是仅影响其控制的设备的电源状态变更，驱动程序也应使用 I/O Kit 的电源管理 API。这样做不仅可以确保由驱动发起的任何电源状态变更与系统请求的电源状态变更同步，还能让你的驱动程序利用
    I/O Kit 为此类任务提供的支持，例如安装定时器以监控设备的活动，并在设备在一段时间内未被访问时请求转换到较低功耗状态。最后，如果有其他设备依赖你的硬件供电，你将需要使用
    I/O Kit 的方法来转换你硬件的电源状态，以便所有子设备都能获知其输入电源可能发生的变化。


    有三种方法可以被调用来更改设备的当前电源状态：


    - `changePowerStateTo(powerStateOrdinal)`：请求将电源状态更改为已注册电源状态数组中指定索引的状态。

    - `changePowerStateToPriv(powerStateOrdinal)`：执行与上一个方法类似的功能，区别在于这是 `IOService`
    类中的一个保护方法，因此只能由驱动程序自身调用，不能被其他对象调用。

    - `makeUsable()`：请求将电源更改为驱动程序支持的最高电源状态。此方法通常由该驱动的其他客户端（例如驱动的用户客户端）调用，以确保设备在进一步使用之前处于完全可用的状态。


    这三个方法由 `IOService` 类实现，通常驱动程序无需重写任何这些方法。在内部，`makeUsable()` 方法的实现会调用与 `changePowerStateToPriv()`
    相同的代码路径，这意味着每个驱动都有两个与之关联的电源状态：一个是通过 `changePowerStateTo()` 请求的值，另一个是通过 `changePowerStateToPriv()`/`makeUsable()`
    请求的值。


    I/O Kit 最终将设备切换到的电源状态是以下几个值中的最大值：由 `changePowerStateTo()` 请求的值、由 `changePowerStateToPriv()`
    请求的值，以及满足所有依赖该设备供电的子设备要求所必需的最高状态。如果设备在电源平面中有任何需要电源的子设备，则父设备不能切换到其 `outputPowerCharacter`
    属性不是 `kIOPMPowerOn` 的电源状态。


    你可能想知道为什么 I/O Kit 提供了两个几乎相同的方法来设置设备的电源状态。私有方法 `changePowerStateToPriv()` 允许驱动程序设置一个最低电源级别，该级别不受驱动任何客户端的影响，这些客户端只能调用公共方法
    `changePowerStateTo()`。客户端可以将电源状态提高到 `changePowerStateToPriv()` 设定的级别之上，但驱动程序的电源状态绝不会低于
    `changePowerStateToPriv()` 设定的值。这种行为有一个例外：当系统进入睡眠状态时，设备将被置于最低电源状态，覆盖通过 `changePowerStateToPriv()`
    设置的电源状态。当系统从睡眠中唤醒时，它会恢复到之前活跃的电源状态。


    按照惯例，驱动程序应通过保护方法 `changePowerStateToPriv()` 来设置其电源状态。为了消除公共电源级别的影响，驱动程序在注册电源管理后，应在其
    `start()` 方法中调用公共方法 `changePowerStateTo(0)`。将公共电源状态设置为 0，可以使得 `changePowerStateToPriv()`
    请求的电源状态在未更改的情况下生效（前提是满足所有子设备的电源需求）。


    由于设备的电源状态由三个可能值推导得出，因此每当其任一电源子设备的电源状态发生变化，或者调用了 `changePowerStateTo()` 或 `changePowerStateToPriv()`
    方法时，都会重新计算该电源状态。如果计算出的电源状态与驱动程序的当前电源状态不同，I/O Kit 将向驱动程序发送一个请求以更改其电源状态。驱动程序将按照本章上一节“响应电源状态变更”中所述的方式接收此请求，并应按照之前描述的方式对该请求进行响应。


    `changePowerStateTo()`、`changePowerStateToPriv()` 和 `makeUsable()` 方法都是异步的，可能在设备转换到新电源状态之前就返回给调用者。这意味着，希望更改自身电源状态的驱动程序（例如，使用
    `changePowerStateToPriv()` 方法）应等待其 `setPowerState()` 方法被调用后，再对其硬件重新编程以进入新的电源状态。希望通过调用公共方法（如
    `changePowerStateTo()` 或 `makeUsable()`）来更改另一个驱动程序电源状态的客户端，不能假设当方法返回时设备已在新的电源状态下运行。相反，它应注册以接收设备状态变更的通知。这将在本章后面的“观察设备电源状态变更”部分讨论。

    '
- fmt: '### Handling Device Idle


    A common reason for a driver to lower the power state of its device is to reduce
    its power consumption when the device hasn''t been accessed for a certain period
    of time. This involves creating a timer for the idle period of the device. If
    the timer expires and the device hasn''t been accessed during that period, the
    driver places the device into a lower power state. After the device has been placed
    into a lower power state, the next time that the driver needs to access the device,
    it will need to place the hardware back in a usable state. Because these operations
    are common for all drivers that perform an idle power saving mode, this functionality
    is built into the I/O Kit and provided to driver developers through the `IOService`
    class.


    There are two basic methods that a driver needs to call to let the I/O Kit track
    when its device has been idle and lower its power state.


    - `setIdleTimerPeriod(period)`: Installs a timer that expires after the specified
    number of seconds has elapsed.

    - `activityTickle(type, powerState)`: Is called by the driver before every access
    of the device, which informs the I/O Kit of the time at which the hardware was
    last accessed.


    The method `setIdleTimerPeriod()` is typically called once, following the initialization
    of power management in the driver''s `start()` method. Once called, the I/O Kit
    creates a timer that runs at the specified timeout period (in seconds). If the
    device hasn''t been accessed during this period, the I/O Kit will lower the power
    state of the driver to the state below the driver''s current power level. If the
    device remains inactive for the next idle period, the driver''s power state is
    lowered again. In both cases, the driver receives a request to lower its power
    state through the same method, `setPowerState()`, that is used to deliver all
    power request changes, as described in the section “Responding to Power State
    Changes” earlier in this chapter. This continues until the device has been placed
    into the off state (power state 0).


    When the device''s power state is lowered as a result of inactivity, the I/O Kit
    sets the power state using the method `changePowerStateToPriv()`. Just as if the
    driver had called `changePowerStateToPriv()` itself, the new power state for the
    device cannot drop below the value set by the public method `changePowerStateTo()`
    or the power state required by the device''s children. This means that the public
    power level that is set through `changePowerStateTo()` determines the minimum
    power state that the device can be placed in when idle. Typically, a driver that
    uses an idle timer will make a call to `changePowerStateTo(0)` in its `start()`
    method, thereby allowing the idle timer to take the device all the way down to
    the off state.


    The idle timer requires the driver to inform the I/O Kit of every access to the
    hardware device, otherwise the idle timer will fire and lower the power state
    of the device while it is in use. To do this, the driver makes a call to the `activityTickle()`
    method when the device is used, typically at the start of each operation. The
    signature of the `activityTickle()` method is provided as follows:


    ```

    bool    activityTickle(unsigned long type, unsigned long stateNumber);

    ```


    The `activityTickle()` method takes two parameters, a type and a power state ordinal,
    that the caller uses to specify the minimum power level that the device must be
    in to handle the upcoming operation. The I/O Kit provides two pre-defined values
    for the `type` parameter in the header file `IOKit/pwr_mgt/IOPM.h`:


    - `kIOPMSubclassPolicy`

    - `kIOPMSuperclassPolicy1`


    The `type` parameter defines which implementation should handle the `activityTickle()`
    request, either the driver itself (in which case `kIOPMSubclassPolicy` is passed)
    or the `IOService` superclass (in which case `kIOPMSuperclassPolicy1` is passed).
    If the driver wishes to provide a custom implementation of `activityTickle()`,
    as well as passing `kIOPMSubclassPolicy` as the `type` parameter for each call
    to `activityTickle()`, it also needs to override the implementation of the `activityTickle()`
    method.


    Most drivers, however, will be able to use the default implementation of `activityTickle()`
    provided by the `IOService` superclass. It''s important that a driver that wishes
    to use the default implementation passes a value of `kIOPMSuperclassPolicy1` for
    the `type` parameter of each call to `activityTickle()`, since the `IOService`
    implementation will ignore a request that has any other value passed as the `type`
    parameter.


    The default implementation of `activityTickle()` will raise the power level of
    the device to the power state specified by the `stateNumber` parameter. Internally,
    the `IOService` class raises the device''s power state by calling the `changePowerStateToPriv()`
    method, which the driver will receive through a call to its `setPowerState()`
    method. The Boolean value returned from the method indicates whether the device
    was already in the requested power state; a return value of `true` indicates that
    no power state transition was necessary, whereas a return value of `false` indicates
    that the power state of the device needed to be raised.


    Since the `activityTickle()` method is asynchronous, it is important that the
    caller wait until the driver has completed the transition to the power state,
    and should not assume that the device is in a usable state when the `activityTickle()`
    method returns. The means by which a driver can observe power changes in a driver,
    including power changes in other driver objects, is explained in the next section.'
