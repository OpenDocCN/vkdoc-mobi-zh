  trans: "\n\n在上述代码中，`service` 表示应用程序希望连接的驱动程序，该驱动程序通过之前描述的标准驱动匹配技术找到，`owningTask`\
    \ 表示正在运行的应用程序，而 `type` 是一个无符号 32 位整数，其值由驱动程序以任意方式自行解释。如果函数成功完成，`driverConnection`\
    \ 参数将返回给调用方，并代表与驱动程序建立的连接。应用程序向驱动程序发送的任何请求，都将通过调用一个以该连接对象为参数的函数来实现。当应用程序不再需要控制驱动程序时，它会调用\
    \ `IOServiceClose()` 函数。\n\n当应用程序调用 `IOServiceOpen()` 函数时，操作系统会调用内核中指定的驱动程序对象来处理该请求。驱动程序的类将收到以下方法调用：\n\
    \n```\nIOReturn    DriverClass::newUserClient (task_t owningTask, void* securityID,\
    \ UInt32 type,\nOSDictionary* properties, IOUserClient** handler)\n```\n\n`newUserClient()`\
    \ 方法的许多参数应该看起来很熟悉。它们就是用户空间应用程序传递给 `IOServiceOpen()` 函数的值。`newUserClient()` 的内核实现负责实例化一个新的用户客户端对象，并通过\
    \ `handler` 参数将其返回给调用方。然而，大多数驱动程序并不需要实现 `newUserClient()` 方法，因为 `IOService` 基类已经提供了一个适用于几乎所有用途的实现。要利用这个标准实现，驱动程序只需在其属性表中添加一个键为\
    \ `IOUserClientClass` 的字符串值即可。该属性的值是一个字符串，其中包含了驱动程序的用户客户端类的类名。这可以通过在 `Info.plist`\
    \ 文件中添加驱动程序个性条目来实现（因为驱动程序的属性表是根据 `Info.plist` 文件中的值初始化的），也可以在驱动程序加载时手动设置该属性。例如，图\
    \ 5-2 中的驱动程序有一个由名为 `MyUserClient` 的类实现的用户客户端，因此它会通过以下调用来设置其用户客户端类：\n\n```\nsetProperty(\"\
    IOUserClientClass\", \"MyUserClient\");\n```\n\n`newUserClient()` 的标准实现会实例化驱动程序指定的用户客户端类，并初始化新的用户客户端，将主驱动程序类作为其提供者。\n\
    \n现在，让我们看看如何为第 4 章中开发的教程 I/O Kit 驱动程序实现一个用户客户端类。该驱动程序骨架用户客户端类的头文件如清单 5-8 所示。你会注意到，用户客户端实现的许多方法与主驱动程序类实现的方法类似，这是因为\
    \ `IOUserClient` 类派生自与所有驱动程序最终派生自的同一个 `IOService` 类。因此，用户客户端实现了与任何其他驱动程序类必须实现的相同的初始化和终止方法。\n\
    \n**清单 5-8.** 基本用户客户端类的头文件\n\n```\nclass com_osxkernel_driver_IOKitTestUserClient\
    \ : public IOUserClient\n{\n        OSDeclareDefaultStructors(com_osxkernel_driver_IOKitTestUserClient)\n\
    \nprivate:\n        task_t                          m_task;\n        com_osxkernel_driver_IOKitTest*\
    \ m_driver;\n\npublic:\n        virtual bool    initWithTask (task_t owningTask,\
    \ void* securityToken,\n                                        UInt32 type, OSDictionary*\
    \ properties);\n        virtual bool    start (IOService* provider);\n\n     \
    \   virtual IOReturn        clientClose (void);     \n        virtual void   \
    \ stop (IOService* provider);\n        virtual void    free (void);\n};\n```\n\
    \n除了熟悉的方法 `start()`、`stop()` 和 `free()` 之外，用户客户端还提供了一个属于用户客户端对象管理范畴的额外方法，即 `clientClose()`。当用户空间应用程序关闭与驱动程序的连接时，无论是通过调用\
    \ `IOServiceClose()`，还是因为应用程序终止或崩溃，都会调用此方法。驱动程序不应信任用户空间应用程序能够编写良好并在用户客户端关闭前自行清理。因此，`clientClose()`\
    \ 方法是驱动程序确保硬件恢复到空闲状态并准备好供下一个希望使用它的用户空间应用程序使用的好地方。\n\n![images](img/square.jpg)\
    \ **提示** `IOUserClient` 类提供了一个名为 `clientDied()` 的方法。子类可以选择实现此方法，如果它需要区分客户端连接是由于用户空间进程未调用\
    \ `IOServiceClose()` 而终止导致的关闭。由于 `clientDied()` 的默认实现只是简单地调用 `clientClose()`，大多数用户客户端实现可以通过实现\
    \ `clientClose()` 方法来同时处理这两种情况。\n\n示例用户客户端类的实现如清单 5-9 所示。为简洁起见，省略了 `stop()` 和\
    \ `free()` 的实现方法，因为对于我们的基本用户客户端，这些方法只是简单地调用了超类提供的实现。\n\n**清单 5-9.** 基本用户客户端类的实现\n\
    \n```\n// 定义超类。\n#define super IOUserClient\n\nOSDefineMetaClassAndStructors(com_osxkernel_driver_IOKitTestUserClient,\
    \ IOUserClient)\n\nbool    com_osxkernel_driver_IOKitTestUserClient::initWithTask\
    \ (task_t owningTask, void*\nsecurityToken, UInt32 type, OSDictionary* properties)\n\
    {\n        if (!owningTask)\n                return false;\n\n        if (! super::initWithTask(owningTask,\
    \ securityToken , type, properties))\n                return false;\n\n      \
    \  m_task = owningTask;\n\n        // 可选：判断调用进程是否具有管理员权限。\n        IOReturn ret\
    \ = clientHasPrivilege(securityToken, kIOClientPrivilegeAdministrator);\n    \
    \    if ( ret == kIOReturnSuccess )\n        {\n                // m_taskIsAdmin\
    \ = true;\n        }\n\n        return true;\n}\n\nbool    com_osxkernel_driver_IOKitTestUserClient::start\
    \ (IOService* provider)\n{\n        if (! super::start(provider))\n          \
    \      return false;\n\n        m_driver = OSDynamicCast(com_osxkernel_driver_IOKitTest,\
    \ provider);\n        if (!m_driver)\n                return false;\n\n      \
    \  return true;\n}\n\nIOReturn        com_osxkernel_driver_IOKitTestUserClient::clientClose\
    \ (void)\n{\n        terminate();\n        return kIOReturnSuccess;\n}\n```\n\n\
    关于清单 5-9 中展示的三个用户客户端方法的实现，有几点需要注意：\n\n"
- fmt: "在`initWithTask()`方法中，我们将参数`owningTask`保存到一个实例变量中。正如本章后面将要看到的，当我们希望访问客户端地址空间中的内存时（例如，当驱动程序将数据写入由客户端进程分配的缓冲区时），需要用到这个值。`initWithTask()`方法也是确定调用进程权限的一个机会。虽然不常用，但用户客户端可能希望将某些操作限制在具有管理员权限运行的任务上。例如，以太网卡可以使用此方法来防止非特权进程启用混杂模式并访问所有网络数据包。\n\
    \n`start()`方法相当直接，但值得注意的是，作为参数传入的提供者类是主驱动程序类的一个实例。由于用户客户端的角色是接收用户空间应用程序的控制请求并将这些请求传递给驱动程序，因此提供者类需要引用主驱动程序类。这可以通过将`start()`方法中的提供者类保存到实例变量来实现。\n\
    \n`clientClose()`方法是在调用进程通过调用`IOServiceClose()`函数关闭其与驱动程序的连接，或者在没有关闭与驱动程序连接的情况下终止时被调用的。用户客户端在作为`IOService`终止过程一部分（如`stop()`和`free()`）调用的任何其他方法之前，会先接收到`clientClose()`。`clientClose()`的实现应释放代表调用进程分配的所有资源，并将硬件恢复到空闲状态。最后，重要的是实现必须调用`terminate()`方法，该方法会启动销毁用户客户端对象的过程。\n\
    \n用户客户端的角色是作为用户空间应用程序与内核驱动程序之间所有通信的中介。来自用户空间的请求由一个32位整数控制码标识，该控制码由驱动程序开发者定义。对于每个请求，应用程序还可以提供参数并从控制请求接收结果。创建用户客户端类之后，剩下的就是定义一个接口，将驱动程序的功能暴露给用户空间应用程序。此接口将由两部分组成：\n\
    \n*   可供希望利用内核驱动程序提供的服务的用户空间应用程序调用的函数库\n*   用户客户端类中与每个用户函数相对应并提供接口的内核侧实现的多个方法\n\
    \n用户空间中的库函数和内核中的用户客户端方法都只需要基本实现，因为功能本身来自主驱动程序类。用户空间接口中函数的作用是编码操作及其参数，并将请求传递给驱动程序。当用户客户端接收到请求时，其作用是解码操作和参数，并调用实现所请求功能的适当驱动程序函数。\n\
    \n对于我们的简单用户客户端，我们将定义一个为应用程序提供计时功能的接口。用户空间接口将实现以下函数：\n\n```\nkern_return_t   StartTimer\
    \ (io_connect_t connection);\nkern_return_t   StopTimer (io_connect_t connection);\n\
    kern_return_t   GetElapsedTimerTime (io_connect_t connection, uint32_t* timerTime);\n\
    kern_return_t   GetElapsedTimerValue (io_connect_t connection, TimerValue* timerValue);\n\
    kern_return_t   DelayForMs (io_connect_t connection, uint32_t milliseconds);\n\
    kern_return_t   DelayForTime (io_connect_t connection, const TimerValue* timerValue);\n\
    ```\n\n所有驱动程序接口都有用户空间实现和内核用户客户端实现都需要使用的值和类型定义。对于我们定义的接口，共享定义包括请求码和类型定义，例如`TimerValue`结构体。为了允许这些定义在两个项目之间共享，此类定义通常放在一个公共头文件中，该头文件可以被用户空间应用程序和内核项目包含。我们驱动程序的共享定义如[列表5-10](#Chapter05.html#list_5_10)所示。\n\
    \n***列表5-10.** “TestDriverInterface.h”的内容，包含内核用户客户端和用户空间接口都需要的定义.*\n\n```\ntypedef\
    \ struct TimerValue\n{\n        uint64_t        time;\n        uint64_t      \
    \  timebase;\n} TimerValue;\n\n// 用户客户端方法的控制请求码。\nenum TimerRequestCode {\n  \
    \      kTestUserClientStartTimer,\n        kTestUserClientStopTimer,\n       \
    \ kTestUserClientGetElapsedTimerTime,\n        kTestUserClientGetElapsedTimerValue,\n\
    \        kTestUserClientDelayForMs,\n        kTestUserClientDelayForTime,\n\n\
    \        kTestUserClientMethodCount\n};\n```\n\n![images](images/square.jpg) **注意**\
    \ `IOUserClient`将控制请求分派给适当处理程序的接口在Mac OS X 10.5中已更改，以支持64位内核。新的实现与旧版本的Mac OS X不向后兼容。本章仅描述更新后的接口。\n\
    \nI/O Kit框架包含许多应用程序可用来调用驱动程序的用户客户端中的方法的函数。对于特定控制请求，应用程序应使用哪个函数取决于操作所需的参数类型。对于参数基于整数的请求，`IOConnectCallScalarMethod()`函数是一个合适的选择，因为它允许将可变大小的64位整数数组从用户进程传递到内核用户客户端，并从内核驱动程序接收包含操作结果的64位整数数组：\n\
    \n```\nkern_return_t   IOConnectCallScalarMethod(\n                        io_connect_t\
    \            connection,\n                        uint32_t                selector,\n\
    \                        const uint64_t*         inputValues,\n              \
    \          uint32_t                inputCount,\n                        uint64_t*\
    \               outputValues,\n                        uint32_t*             \
    \  outputCount);\n```\n\n该函数的第一个参数是与驱动程序用户客户端的连接，调用者之前已通过调用`IOServiceOpen()`获取了该连接。下一个参数`selector`是由驱动程序定义的控制码，用于描述用户客户端应执行哪个操作。这将是[列表5-10](#Chapter05.html#list_5_10)中定义的`TimerRequestCode`枚举中的一个值。函数的其余参数允许应用程序传递用户客户端在执行操作时所需的任何参数，并在操作之后从用户客户端接收任何结果。标记为输入的参数由调用应用程序提供给用户客户端。标记为输出的参数由用户客户端返回给应用程序。`outputCount`参数既是输入参数也是输出参数；调用者将其值初始化为`outputValues`数组中的元素数量，这告诉用户客户端它可以安全地向该数组写入多少个值。当函数完成时，实际写入`outputValues`数组的值的数量通过`outputCount`的值返回。如果调用者不期望用户客户端返回任何值，则可以将`NULL`作为`outputCount`参数传递。"
  raw: '*   In the `initWithTask()` method, we save the parameter `owningTask` to
    an instance variable. As we will see later in the chapter, this value is needed
    when we wish to access memory in the client''s address space, such as when writing
    data from the driver to a buffer that has been allocated by the client process.
    The `initWithTask()` method is also an opportunity to determine the privileges
    of the calling process. Although not commonly needed, it is possible that the
    user client may wish to limit certain operations to tasks that are running with
    administrative privileges. For example, an Ethernet card could use this to prevent
    a non-privileged process from enabling promiscuous mode and having access to all
    network packets.

    *   The `start()` method is fairly straightforward, although it is worth noting
    that the provider class that is passed in as an argument is an instance to the
    main driver class. Since the user client''s role is to accept control requests
    from a user space application and pass these requests on to the driver, the provider
    class will need a reference to the main driver class. This can be obtained by
    saving the provider class from the `start()` method to an instance variable.

    *   The `clientClose()` method is called in response to the calling process closing
    its driver connection by calling the `IOServiceClose()` function or otherwise
    terminating without closing its connection to the driver. The user client receives
    `clientClose()` before any other methods that are called as part of an `IOService`
    termination, such as `stop()` and `free()`. An implementation of `clientClose()`
    should release any resources that were allocated on behalf of the calling process
    and return the hardware to an idle state. Finally, it is important that the implementation
    calls the `terminate()` method, which begins the process of destroying the user
    client object.


    The role of the user client is to act as an intermediary between all communications
    between an application in user space and a kernel driver. Requests from user space
    are identified by a 32-bit integer control code that is defined by the driver
    developer. Along with each request, the application can also provide parameters
    and receive results back from the control request. Having created the user client
    class, all that remains is for us to define an interface to expose the driver''s
    functionality to user space applications. This interface will consist of two parts:


    *   A library of functions that can be called by user space applications that
    wish to take advantage of services provided by the kernel driver

    *   A number of methods in the user client class that correspond to each user
    function and that provide the kernel-side implementation of the interface


    Both the library functions in user space and the user client methods in the kernel
    require only a basic implementation, since the functionality itself comes from
    the main driver class. The role of the functions in the user space interface is
    to encode the operation and its parameters and pass the request on to the driver.
    When the user client receives the request, its role is to decode the operation
    and parameters and to call the appropriate driver function that implements the
    requested functionality.


    For our simple user client, we will define an interface that provides timing functionality
    to applications. The user space interface will implement the following functions:


    `kern_return_t   StartTimer (io_connect_t connection);`

    `kern_return_t   StopTimer (io_connect_t connection);`

    `kern_return_t   GetElapsedTimerTime (io_connect_t connection, uint32_t* timerTime);`

    `kern_return_t   GetElapsedTimerValue (io_connect_t connection, TimerValue* timerValue);`

    `kern_return_t   DelayForMs (io_connect_t connection, uint32_t milliseconds);`

    `kern_return_t   DelayForTime (io_connect_t connection, const TimerValue* timerValue);`


    All driver interfaces have values and type definitions that are needed by both
    the user space implementation and the kernel''s user client implementation. For
    the interface that we have defined, the shared definitions include the request
    codes and the definition of types, such as the `TimerValue` structure. To allow
    these definitions to be shared between both projects, such definitions are usually
    placed in a common header file that can be included by both the user space application
    and the kernel project. The shared definitions for our driver are shown in [Listing
    5-10](#Chapter05.html#list_5_10).


    ***Listing 5-10.** The Contents of “TestDriverInterface.h” Containing Definitions
    That Are Required by Both the Kernel User Client and the User Space Interface.*


    `typedef struct TimerValue`

    `{`

    `        uint64_t        time;`

    `        uint64_t        timebase;`

    `} TimerValue;`


    `// Control request codes for user client methods.`

    `enum TimerRequestCode {`

    `        kTestUserClientStartTimer,`

    `        kTestUserClientStopTimer,`

    `        kTestUserClientGetElapsedTimerTime,`

    `        kTestUserClientGetElapsedTimerValue,`

    `        kTestUserClientDelayForMs,`

    `        kTestUserClientDelayForTime,`


    `        kTestUserClientMethodCount`

    `};`


    ![images](images/square.jpg) **Note** The interface by which `IOUserClient` dispatches
    a control requests to an appropriate handler was changed in Mac OS X 10.5 to support
    a 64-bit kernel. The new implementation is not backwards compatible with older
    versions of Mac OS X. This chapter describes the updated interface only.


    The I/O Kit framework contains a number of functions that an application can use
    to invoke a method in a driver''s user client. The choice of which function an
    application should use for a particular control request depends on the type of
    parameters that are required by the operation. For a request whose parameters
    are integer-based, the function `IOConnectCallScalarMethod()` is an appropriate
    choice since it allows a variable-sized array of 64-bit integers to be passed
    from the user process to the kernel user client and receives an array of 64-bit
    integers from the kernel driver containing the result of the operation:


    `kern_return_t   IOConnectCallScalarMethod(`

    `                        io_connect_t            connection,`

    `                        uint32_t                selector,`

    `                        const uint64_t*         inputValues,`

    `                        uint32_t                inputCount,`

    `                        uint64_t*               outputValues,`

    `                        uint32_t*               outputCount);`


    The first argument to the function is a connection to a driver''s user client,
    which the caller will have previously obtained by calling `IOServiceOpen()`. The
    next argument, `selector`, is the control code that is defined by the driver and
    describes which operation the user client should perform. This will be a value
    from the `TimerRequestCode` enumeration defined in [Listing 5-10](#Chapter05.html#list_5_10).
    The remaining arguments to the function allow the application to pass any parameters
    that are needed by the user client when it performs the operation and to receive
    any results back from the user client following the operation. Parameters that
    are labeled as inputs are provided by the calling application to the user client.
    Parameters that are labeled as outputs are returned to the application by the
    user client. The `outputCount` argument is both an input and an output argument;
    the caller initializes its value to the number of elements in the `outputValues`
    array, which tells the user client how many values it can safely write to the
    array. When the function completes, the number of values that were actually written
    to the `outputValues` array is returned in the value of `outputCount`. If the
    caller isn''t expecting any values to be returned by the user client, it can simply
    pass `NULL` as the `outputCount` argument.'
