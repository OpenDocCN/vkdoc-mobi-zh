    {\n    UInt32 res = 0xffffffff;\n    if (!fDeviceRemoved)\n    {\n        res\
    \ = OSReadLittleInt32(fBar0Address, offset);\n        if (res == 0xffffffff)\n\
    \            fDeviceRemoved = true;\n    }\n    return res;\n}\n```\n\nThe method\
    \ will prevent further accesses to registers once the device has been removed.\
