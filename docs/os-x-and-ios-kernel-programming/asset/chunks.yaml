    以下内容描述了一个`IOBlockStorageDevice`子类需要实现的方法，这些方法按功能分组排序。


    首先介绍的方法会向用户返回设备的人类可读描述。这些字符串用于帮助用户识别与已挂载卷对应的存储设备。如果存储介质尚未格式化，则不会有卷与设备关联，这些标识字符串将是用户确保他们即将格式化的设备正是他们认为的设备的唯一手段。因此，这些字符串应返回描述性名称，例如，标识
    USB 闪存盘的制造商，或提供连接接口的描述（如“USB to SATA 适配器”），以便用户轻松识别设备。这些字符串会出现在诸如“磁盘工具”等实用程序以及“系统信息”生成的系统配置文件中。


    *   `getVendorString`：返回存储设备的制造商名称。

    *   `getProductString`：返回产品型号的描述性名称。

    *   `getRevisionString`：返回一个字符串，其解释可由驱动程序开发者决定。这可用于标识存储设备上运行的固件版本，或提供产品设计的标识。由于该值是字符串，因此也可以同时包含这两种值。

    *   `getAdditionalDeviceInfoString`：当前未被 I/O Kit 实现使用，但可由专有的磁盘实用程序软件从驱动程序中查询。


    以下方法被调用以查询存储设备的能力：


    *   `reportRemovability`和`reportEjectability`：两者都返回类似的信息。如果介质可以在驱动程序存在的情况下插入和移除，则该设备被视为可移动。这意味着
    I/O Kit 可能会定期轮询传输驱动程序以确定当前是否存在磁盘。此外，如果一个可移动设备可以通过软件控制（如 CD 驱动器）移除，则它被认为是可弹出的。如果设备不可弹出，用户仍然可以通过“访达”或“磁盘工具”执行“弹出”操作，尽管
    macOS 会卸载文件系统，但不会弹出介质。

    *   `reportLockability`：被调用来确定可移动驱动器中的介质是否可以被“锁定”以防止用户移除。锁定设备的例子是，一个前面板上有弹出按钮的
    CD 驱动器，当 CD 被挂载时可以禁用（锁定）该按钮。

    *   `reportPollRequirements`：被调用来确定驱动程序是否需要被定期调用以检查介质是否已插入或移除，而不是驱动程序本身能够在介质到达时生成通知。如果设备需要轮询，驱动程序可以通过`reportPollRequirements`方法返回一个额外的标志，以指示轮询是否开销较大，例如，仅能通过旋转设备来检测介质。I/O
    Kit 只会轮询那些轮询开销不大的设备。

    *   `reportMediaState`：被调用来确定设备中是否存在介质。此方法在存储驱动程序堆栈创建时被调用一次，以读取硬件的初始状态，此后仅在驱动程序指示需要轮询来确定介质存在时才会被调用。


    以下方法被调用以查询当前介质的能力。每当检测到新介质时，都会调用这些方法。


    *   `reportBlockSize`：应返回设备磁盘扇区（或块）的字节大小。用户空间进程可以通过`ioctl`命令`DKIOCGETBLOCKSIZE`访问此值。

