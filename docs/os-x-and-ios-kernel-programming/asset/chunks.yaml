    \nFinally, we need to define the driver's matching dictionary and library dependencies\
    \ through the `Info.plist` file. Add a new dictionary key named \"IOKitTest\"\
    \ to the `IOKitPersonalities` dictionary that contains the following values:\n\
    \n![images](images/p59-01.jpg)\n\nWe also need to add two entries to the `OSBundleLibraries`\
    \ dictionary:\n\n![images](images/p59-02.jpg)\n\nThe final version of the project's\
    \ property list is shown in [Figure 4-3](#Chapter04.html#fig_4_3).\n\n![images](images/0403.jpg)\n\
    \n***Figure 4-3.** The property list, including the matching dictionary, for the\
    \ IOKitTest tutorial*\n\nGiven that the purpose of a driver is to control hardware,\
    \ and that the I/O Kit will load a driver only when its hardware device is present,\
    \ you may be wondering how it is possible to test this driver. Thankfully, the\
    \ I/O Kit provides a special nub known as `IOResources` that can be used as the\
    \ provider class of a driver that has no hardware device, such as the tutorial\
    \ driver listed here. In a system, there will be multiple drivers matching against\
    \ the `IOResources` nub, and so to allow more than one driver to attach itself\
    \ to `IOResources`, the `IOMatchCategory` key in the driver's matching dictionary\
    \ must be defined.\n\nSince the I/O Kit allows a nub to have one driver attached\
    \ to it per match category, specifying a unique category allows the driver to\
    \ load and doesn't prevent other drivers from matching against the `IOResources`\
    \ provider class after we have loaded. To complete the matching dictionary, we\
    \ need to specify matching criteria that are unique for the provider class. If\
    \ the provider class is a USB device, this may take the form of a USB product\
    \ ID and vendor ID. In the case of our tutorial, the provider class is `IOResources`.\
    \ A single key named \"`IOResourceMatch`\" is the matching criteria used by `IOResources`.\
    \ In the sample driver's matching dictionary, this value is set to \"`IOKit`\"\
    . This tells the provider class to defer loading the driver until the IOKit subsystem\
    \ has been fully loaded and initialized during system startup.\n\nYou can now\
    \ build the `IOKitTest` project, which can be loaded using the same \"kextload\"\
    \ command that was used in [Chapter 3](#Chapter03.html#ch3). If you open the \"\
    Console\" utility and examine the contents of the \"kernel.log\" file, you should\
    \ see that the various methods of the driver's class have been called.\n\nThe\
    \ order in which the methods of the driver class are called is as follows:\n\n\
    1.  `init()`. This method is guaranteed to be called before any other method in\
    \ the class. Its purpose is the same as a constructor of a C++ class. A driver's\
    \ `init()` method should first call the implementation provided by the superclass,\
    \ and if this fails, it should abort immediately. This method is passed one parameter,\
    \ a copy of the matching dictionary corresponding to the selected driver personality\
    \ in the `Info.plist` file. If this method succeeds, it should return `true`;\
    \ otherwise, it should return `false`.\n2.  `probe()`. This method is called during\
    \ matching to give the driver a chance to examine the hardware device, which is\
    \ passed to the method through the argument named \"`provider`.\" Although the\
    \ parameter \"`provider`\" is a pointer to an `IOService`, it can be cast to the\
    \ more specialized provider class specified in the matching dictionary (such as\
    \ `IOUSBDevice`). The driver's implementation of `probe()` should first call the\
    \ superclass's implementation, and if this succeeds, perform any investigation\
    \ of the hardware required to determine whether the driver is able to control\
    \ it. If the driver is unable to control the hardware, it should return `NULL`\
    \ from the `probe()` method; otherwise, it should return an instance of the `IOService`\
    \ subclass that should control this device. In almost all cases, this method will\
    \ return the current `IOService` instance (\"`this`\").\n3.  `start()`. If the\
    \ previous call to `probe()` succeeded, and the driver has been chosen as being\
    \ the best suited to control the hardware device (based on its probe score), its\
    \ `start()` method is called. The implementation should first call the superclass's\
    \ implementation of `start()`, and if this fails, it should abort immediately.\
    \ The driver should use the `start()` method to configure the hardware for operation,\
    \ and should initialize any resources that it needs while running. If for any\
    \ reason the method fails and the driver is unable to go on to control the hardware,\
    \ the method should return `false`. The I/O Kit will then provide the driver with\
    \ the next highest probe score a chance to control the device.\n4.  `stop()`.\
