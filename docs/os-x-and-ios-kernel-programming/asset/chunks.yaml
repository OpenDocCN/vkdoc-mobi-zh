    If you plan on having a permanently running panic server, it is recommended this
    IP be static. It is not possible to use a hostname or DNS name for the server,
    as name resolution is not possible.


    The following output will appear on the screen of the target machine if you press
    the power button:


    * * *


    `Entering system dump routine`

    `Attempting connection to panic server configured at IP 192.168.1.1, port 1069`

    `Resolved 192.168.1.1’s (or proxy’s) link level address`

    `Transmitting packets to link level address: 00:16:cb:a6:73:8b`

    `Kernel map size is 4546437120`

    `Sending write request for core-xnu-1699.22.73-192.168.1.2-2fe8a6d9`

    `Protocol features: 0x1`

    `Kernel map has 1389 entries`

    `Generated Mach-O header size was 100224`


    * * *


    The target machine will write dots (.) to the screen until the dump is complete.
    If it was an NMI event that triggered the dump, the system will resume; if it
    was a panic, the system will wait for a remote debugger to be attached.


    #### KDB


    The kernel supports an in-kernel debugger called KDB. KDB only supports debugging
    over the serial port. It is not included in the kernel build by default; therefore,
    you need to compile and install a custom kernel in order to use it. KDB has some
    applications for very low-level debugging where neither FireWire nor Ethernet
    is available. KDB requires a native serial port on the machine being debugged,
    which is only found on the now discontinued Xserve (although a serial port is
    available if Mac OS X is used under a virtual machine). For all intents and purposes,
    the GNU Debugger (GDB) is recommended; we only mention KDB here to avoid confusion
    with GDB.


    #### Remote Debugging with GDB over Ethernet or FireWire


    The kernel has support for using the GDB over Ethernet (IP/UDP) or FireWire connections.
    Again, this requires two computers running Mac OS X. While GDB is supported through
    Xcode, you cannot debug the kernel using Xcode; you will have to use the command-line
    interface. GDB is, however, part of Xcode. It is not necessary to install Xcode
    on the machine being debugged; it is only needed on the remote system (the client).


    ![images](images/square.jpg) **Note** Strictly speaking, it would be possible
    to use another operating system running GDB as the host to debug a Mac OS X target
    system. Although there is no documentation for doing this, some documentation
    suggests it is possible, however non-trivial, to configure.


    The debugging support is built in to the kernel by default, unlike KDB. However,
    the debugging capabilities are disabled by default, but can easily be enabled
    by adding the appropriate boot arguments on the target machine, for example:


    `$` **`sudo nvram boot-args="debug=0x144 -v".`**


    The “-v” (verbose) flag isn’t strictly necessary. It has the effect of disabling
    the grey screen with the Apple logo during boot and instead showing a text console,
    commonly found on UNIX and Linux systems, which shows log messages as the system
    boots. Once the boot arguments have been set, the system needs to be rebooted
