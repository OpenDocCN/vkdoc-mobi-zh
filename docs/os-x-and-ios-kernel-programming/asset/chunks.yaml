- fmt: "### Writing I/O Kit Families\n\nUntil now we have looked at how to implement\
    \ various forms of drivers, most of which interact with one or more family. In\
    \ some circumstances, you may want to implement a family instead of a driver—for\
    \ example, if you need to support a new bus technology or have a family of hardware\
    \ devices that all depend on the same infrastructure or general services. A family\
    \ can be characterized and differentiated from a driver by the following traits:\n\
    \n- A family usually consists of more than one `IOService` classes bundled together\
    \ in a KEXT providing related services.\n- A family can be thought of as the kernel\
    \ analog of a user space shared library.\n- A driver has a dependency on a family,\
    \ not the other way around.\n- A family is not loaded directly; it is loaded because\
    \ a driver has expressed a dependency.\n- A family does not have a matching dictionary\
    \ and does not partake in either passive or active matching.\n- Just like any\
    \ other KEXT, a family is installed under `/System/Library/Extensions`.\n\nThere\
    \ is no special API or approach to writing a family. It is simply done in the\
    \ same way as any other driver. Apple recommends focusing on a good fundamental\
    \ object-oriented design and allowing it to evolve naturally, rather than specifically\
    \ setting out to create a family. A driver can express a dependency on a family\
    \ (or any other KEXT) using the `OSBundleLibraries` key in its property list file.\
    \ A driver cannot be loaded and linked into the kernel until all dependencies\
    \ have been resolved and loaded first. The `kextd` daemon is responsible for performing\
    \ this task. When a driver needs to be loaded, the `kextd` daemon will examine\
    \ the driver's `Info.plist` file for its dependencies. If the `Info.plist` has\
    \ incorrectly specified or has failed to list some dependencies, this will result\
    \ in a link failure and the driver will not be loaded. In order to depend on a\
    \ family, a driver has to list the family's bundle ID—for example, `com.apple.iokit.IOAudioFamily`—and\
    \ version number—for example, `1.7.9fc8`.\n\nI/O Kit guarantees that a dependent\
    \ family is loaded before the driver that depends on it, which is necessary, otherwise\
    \ symbols in the driver would be left unresolved.\n\nSince many of Apple's I/O\
    \ Kit families are open-source code, it is possible to modify the families and\
    \ replace the original versions with modified version. This is not recommended,\
    \ however, as the family KEXT might be overwritten by a subsequent software update\
    \ from Apple, which means that functionality of the modified KEXT might be lost.\
    \ In some situations, modifying a family by inserting additional tracing might\
    \ help you with debugging.\n\nExtending a family is a better option than modifying\
    \ it directly. Extending is easy, since most classes in I/O Kit families declare\
    \ their methods as virtual, even if the class itself is non-abstract. There are\
    \ many reasons why you might wish to do so. For example, if you were required\
    \ to support a new type of USB controller not supported by the `IOUSBFamily`,\
    \ you could create your own `IOUSBController` subclass to represent the new controller.\
    \ The extended class can be compiled into the same KEXT as the driver that needs\
    \ it, or in your own library/family KEXT. The `IONetworkingFamily` and other families\
    \ were designed specifically to allow this form of extension.\n\n### Kernel Control\
    \ KPI\n\nThe kernel control interface `<sys/kern_control.h>` is a KPI, which allows\
    \ a KEXT to communicate bi-directionally with user space processes. The kernel\
    \ control system lives in the BSD portion of the kernel and is therefore written\
    \ in C and not C++ (I/O Kit uses C++).\n\nThe KPI is intended to allow a user\
    \ space program to control and configure a KEXT. For example, let's say you had\
    \ implemented a custom firewall NKE (Network Kernel Extension). You could then\
    \ use the kernel control API to tell your firewall which addresses or ports it\
    \ should block traffic from, as well as retrieving logs and statistics.\n\nThe\
    \ KPI is relatively simple to use in both kernel space and user space. In fact,\
    \ there is no special API required to use the kernel control mechanism for user\
    \ space, because it is accessed via a regular socket. The `getsockopt()` or `setsockopt()`\
    \ system call functions can be used to issue control requests from user space.\
    \ The kernel control system may be compared to the `ioctl()` system call, but\
    \ unlike the `ioctl()` system call the kernel control system is better suited\
    \ for transferring large amounts of data across the kernel/user space boundary.\
    \ Sending and receiving data are supported using the `send()` and `recv()` system\
    \ call functions from user space. In the kernel, data transfers are handled using\
    \ the `mbuf` data structure discussed earlier.\n\nTo use the kernel control interface,\
    \ you must first register a new interface, which ensures that user space clients\
    \ can find it and connect to it. This is accomplished by declaring and filling\
    \ out a C structure containing callbacks for various events, as well as an identifying\
    \ name. The C language is not object-oriented, and therefore \"objects\" are often\
    \ represented by structures containing data and function pointers. The registration\
    \ structure is shown in [Listing 17-1](#Chapter17.html#list_17_1).\n\n**Listing\
    \ 17-1.** The `kern_ctl_reg` Structure from `<sys/kern_control.h>`\n\n```c\nstruct\
    \ kern_ctl_reg\n{\n    /* control information */\n    char                   \
    \     ctl_name[MAX_KCTL_NAME];\n    u_int32_t                   ctl_id;\n    u_int32_t\
    \                   ctl_unit;\n    /* control settings */\n    u_int32_t     \
    \              ctl_flags;\n    u_int32_t                   ctl_sendsize;\n   \
    \ u_int32_t                   ctl_recvsize;\n    /* Dispatch functions */\n  \
    \  ctl_connect_func            ctl_connect;\n    ctl_disconnect_func         ctl_disconnect;\n\
    \    ctl_send_func               ctl_send;\n    ctl_setopt_func             ctl_setopt;\n\
    \    ctl_getopt_func             ctl_getopt;\n};\n```\n\nLet's look at the fields\
    \ of the structure in more detail:\n\n- The `ctl_name` should be set to the bundle\
    \ ID for the KEXT.\n- The `ctl_id` field is used for additional addressing because\
    \ a KEXT may have several kernel controls registered at once. The `ctl_id` field\
    \ can be dynamically registered or assigned by Apple's developer technical support\
    \ (DTS).\n- The `ctl_unit` field is used only with a DTS-assigned ID. There are\
    \ only two flags for the `ctl_flags`. The first is `CTL_FLAG_PRIVILEGED`, which\
    \ if set means that a user space program must have root privileges in order to\
    \ connect to the kernel control. The second flag is `CTL_FLAG_REG_ID_UNIT`, which\
    \ should be set if using a DTS assigned ID.\n- The `ctl_sendsize` and `ctl_recvsize`\
    \ fields can be used to tune the size of the send and receive buffers for sending\
    \ data using `send()` and `recv()`.\n\nThe remaining fields are function pointers,\
    \ which will be called when their corresponding events occur:\n\n- The `ctl_connect`\
    \ and `ctl_disconnect` callbacks will be called when a user space client connects\
    \ or disconnects.\n- The `ctl_setopt` and `ctl_getopt` callbacks are invoked when\
    \ a client uses the `setsockopt()` or `getsockopt()` functions. These are often\
    \ used to get or set configuration parameters. The next callback is `ctl_send`,\
    \ which may be a bit confusing, as it's used not to send data but to receive data\
    \ from a sending client. To actually send data, use the `ctl_enqueuedata()` function."
  raw: '### Writing I/O Kit Families


    Until now we have looked at how to implement various forms of drivers, most of
    which interact with one or more family. In some circumstances, you may want to
    implement a family instead of a driver—for example, if you need to support a new
    bus technology or have a family of hardware devices that all depend on the same
    infrastructure or general services. A family can be characterized and differentiated
    from a driver by the following traits:


    *   A family usually consists of more than one `IOService` classes bundled together
    in a KEXT providing related services.

    *   A family can be thought of as the kernel analog of a user space shared library.

    *   A driver has a dependency on a family, not the other way around.

    *   A family is not loaded directly; it is loaded because a driver has expressed
    a dependency.

    *   A family does not have a matching dictionary and does not partake in either
    passive or active matching.

    *   Just like any other KEXT, a family is installed under /System/Library/Extensions.


    There is no special API or approach to writing a family. It is simply done in
    the same way as any other driver. Apple recommends focusing on a good fundamental
    object-oriented design and allowing it to evolve naturally, rather than specifically
    setting out to create a family. A driver can express a dependency on a family
    (or any other KEXT) using the `OSBundleLibraries` key in its property list file.
    A driver cannot be loaded and linked into the kernel until all dependencies have
    been resolved and loaded first. The `kextd` daemon is responsible for performing
    this task. When a driver needs to be loaded, the kextd daemon will examine the
    driver''s `Info.plist` file for its dependencies. If the `Info.plist` has incorrectly
    specified or has failed to list some dependencies, this will result in a link
    failure and the driver will not be loaded. In order to depend on a family, a driver
    has to list the family''s bundle ID—for example, `com.apple.iokit.IOAudioFamily`—and
    version number—for example, `1.7.9fc8`.


    I/O Kit guarantees that a dependent family is loaded before the driver that depends
    on it, which is necessary, otherwise symbols in the driver would be left unresolved.


    Since many of Apple''s I/O Kit families are open-source code, it is possible to
    modify the families and replace the original versions with modified version. This
    is not recommended, however, as the family KEXT might be overwritten by a subsequent
    software update from Apple, which means that functionality of the modified KEXT
    might be lost. In some situations, modifying a family by inserting additional
    tracing might help you with debugging.


    Extending a family is a better option than modifying it directly. Extending is
    easy, since most classes in I/O Kit families declare their methods as virtual,
    even if the class itself is non-abstract. There are many reasons why you might
    wish to do so. For example, if you were required to support a new type of USB
    controller not supported by the `IOUSBFamily`, you could create your own `IOUSBController`
    subclass to represent the new controller. The extended class can be compiled into
    the same KEXT as the driver that needs it, or in your own library/family KEXT.
    The `IONetworkingFamily` and other families were designed specifically to allow
    this form of extension.


    ### Kernel Control KPI


    The kernel control interface `<sys/kern_control.h>` is a KPI, which allows a KEXT
    to communicate bi-directionally with user space processes. The kernel control
    system lives in the BSD portion of the kernel and is therefore written in C and
    not C++ (I/O Kit uses C++).


    The KPI is intended to allow a user space program to control and configure a KEXT.
    For example, let''s say you had implemented a custom firewall NKE (Network Kernel
    Extension). You could then use the kernel control API to tell your firewall which
    addresses or ports it should block traffic from, as well as retrieving logs and
    statistics.


    The KPI is relatively simple to use in both kernel space and user space. In fact,
    there is no special API required to use the kernel control mechanism for user
    space, because it is accessed via a regular socket. The `getsockopt()` or `setsockopt()`
    system call functions can be used to issue control requests from user space. The
    kernel control system may be compared to the `ioctl()` system call, but unlike
    the ioctl() system call the kernel control system is better suited for transferring
    large amounts of data across the kernel/user space boundary. Sending and receiving
    data are supported using the `send()` and `recv()` system call functions from
    user space. In the kernel, data transfers are handled using the `mbuf` data structure
    discussed earlier.


    To use the kernel control interface, you must first register a new interface,
    which ensures that user space clients can find it and connect to it. This is accomplished
    by declaring and filling out a C structure containing callbacks for various events,
    as well as an identifying name. The C language is not object-oriented, and therefore
    “objects” are often represented by structures containing data and function pointers.
    The registration structure is shown in [Listing 17-1](#Chapter17.html#list_17_1).


    ***Listing 17-1.** The kern_ctl_reg Structure from <sys/kern_control.h>*


    `struct kern_ctl_reg`

    `{`

    `    /* control information */`

    `    char                        ctl_name[MAX_KCTL_NAME];`

    `    u_int32_t                   ctl_id;`

    `    u_int32_t                   ctl_unit;`

    `    /* control settings */`

    `    u_int32_t                   ctl_flags;`

    `    u_int32_t                   ctl_sendsize;`

    `    u_int32_t                   ctl_recvsize;`

    `    /* Dispatch functions */`

    `    ctl_connect_func            ctl_connect;`

    `    ctl_disconnect_func         ctl_disconnect;`

    `    ctl_send_func               ctl_send;`

    `    ctl_setopt_func             ctl_setopt;`

    `    ctl_getopt_func             ctl_getopt;`

    `};`


    Let''s look at the fields of the structure in more detail:


    *   The `ctl_name` should be set to the bundle ID for the KEXT.

    *   The `ctl_id` field is used for additional addressing because a KEXT may have
    several kernel controls registered at once. The `ctl_id` field can be dynamically
    registered or assigned by Apple''s developer technical support (DTS).

    *   The `ctl_unit` field is used only with a DTS-assigned ID. There are only two
    flags for the `ctl_flags`. The first is `CTL_FLAG_PRIVILEGED`, which if set means
    that a user space program must have root privileges in order to connect to the
    kernel control. The second flag is `CTL_FLAG_REG_ID_UNIT`, which should be set
    if using a DTS assigned ID.

    *   The `ctl_sendsize` and `ctl_recvsize` fields can be used to tune the size
    of the send and receive buffers for sending data using `send()` and `recv()`.


    The remaining fields are function pointers, which will be called when their corresponding
    events occur:


    *   The `ctl_connect` and `ctl_disconnect` callbacks will be called when a user
    space client connects or disconnects.

    *   The `ctl_setopt` and `ctl_getopt` callbacks are invoked when a client uses
    the `setsockopt()` or `getsockopt()` functions. These are often used to get or
    set configuration parameters. The next callback is `ctl_send`, which may be a
    bit confusing, as it''s used not to send data but to receive data from a sending
    client. To actually send data, use the `ctl_enqueuedata()` function.'
  trans: "\n### 编写 I/O Kit 家族（Families）\n\n到目前为止，我们已经探讨了如何实现各种形式的驱动程序，其中大多数驱动都与一个或多个家族（family）进行交互。在某些情况下，你可能会想实现一个家族而不是一个驱动程序——例如，当你需要支持一种新的总线技术，或者拥有一系列依赖于相同基础设施或通用服务的硬件设备时。家族可以通过以下特征与驱动程序进行区分：\n\
    \n- 一个家族通常由多个 `IOService` 类组成，这些类被打包在一个 KEXT 中，以提供相关服务。\n- 可以将家族视为内核中用户空间共享库的对应物。\n\
    - 驱动程序依赖于家族，反之则不成立。\n- 家族不会被直接加载；它之所以被加载，是因为某个驱动程序声明了对其的依赖。\n- 家族没有匹配字典，也不参与被动或主动匹配。\n\
    - 与任何其他 KEXT 一样，家族安装于 `/System/Library/Extensions` 目录下。\n\n编写家族并没有特殊的 API 或方法。其实现方式与其他任何驱动程序完全相同。Apple\
    \ 建议专注于良好的基础面向对象设计，并让其自然演进，而不是特意着手创建一个家族。驱动程序可以通过其属性列表文件中的 `OSBundleLibraries`\
    \ 键值来声明对某个家族（或任何其他 KEXT）的依赖。只有当所有依赖项都被解析并加载后，驱动程序才能被加载并链接到内核中。`kextd` 守护进程负责执行此任务。当需要加载驱动程序时，`kextd`\
    \ 守护进程会检查驱动程序的 `Info.plist` 文件以获取其依赖项。如果 `Info.plist` 错误地指定或未能列出某些依赖项，这将导致链接失败，并且驱动程序将无法加载。为了依赖于某个家族，驱动程序必须列出该家族的包标识符（bundle\
    \ ID）——例如 `com.apple.iokit.IOAudioFamily`——以及版本号——例如 `1.7.9fc8`。\n\nI/O Kit 保证在依赖于某个家族的驱动程序加载之前，该家族已被加载。这是必要的，否则驱动程序中的符号将无法解析。\n\
    \n由于 Apple 的许多 I/O Kit 家族都是开源代码，因此可以对它们进行修改并用修改后的版本替换原始版本。然而，不建议这样做，因为家族 KEXT\
    \ 可能会被 Apple 随后的软件更新所覆盖，这意味着修改后的 KEXT 的功能可能会丢失。在某些情况下，通过插入额外的跟踪代码来修改家族可能有助于调试。\n\
    \n扩展一个家族是直接修改它的更好选择。扩展起来很容易，因为 I/O Kit 家族中的大多数类都将其方法声明为虚方法（virtual），即使该类本身并非抽象类。你可能希望这样做有很多原因。例如，如果你需要支持一种\
    \ `IOUSBFamily` 不支持的新型 USB 控制器，你可以创建自己的 `IOUSBController` 子类来表示这个新控制器。扩展后的类可以编译到需要它的驱动程序所在的同一个\
    \ KEXT 中，或者编译到你自己的库/家族 KEXT 中。`IONetworkingFamily` 和其他家族在设计时就专门支持这种形式的扩展。\n\n\
    ### 内核控制 KPI\n\n内核控制接口 `<sys/kern_control.h>` 是一个 KPI，它允许 KEXT 与用户空间进程进行双向通信。内核控制系统位于内核的\
    \ BSD 部分，因此是用 C 语言而不是 C++ 编写的（I/O Kit 使用 C++）。\n\n该 KPI 旨在允许用户空间程序控制并配置 KEXT。例如，假设你已经实现了一个自定义防火墙\
    \ NKE（网络内核扩展）。然后，你可以使用内核控制 API 来告诉你的防火墙它应该阻止哪些地址或端口的流量，以及检索日志和统计数据。\n\n在核空间和用户空间使用该\
    \ KPI 都相对简单。实际上，在用户空间使用内核控制机制不需要特殊的 API，因为它是通过常规套接字访问的。可以使用 `getsockopt()` 或 `setsockopt()`\
    \ 系统调用函数从用户空间发出控制请求。可以将内核控制系统与 `ioctl()` 系统调用进行比较，但与 `ioctl()` 系统调用不同，内核控制系统更适合跨越内核/用户空间边界传输大量数据。从用户空间发送和接收数据时，支持使用\
    \ `send()` 和 `recv()` 系统调用函数。在内核中，数据传输是使用前面讨论过的 `mbuf` 数据结构来处理的。\n\n要使用内核控制接口，必须首先注册一个新接口，这可以确保用户空间的客户端能够找到它并与之建立连接。这可以通过声明并填充一个包含各种事件回调以及标识名称的\
    \ C 结构体来实现。C 语言不是面向对象的，因此“对象”通常由包含数据和函数指针的结构体来表示。注册结构体如 代码清单 17-1 所示。\n\n**代码清单\
    \ 17-1.** 来自 `<sys/kern_control.h>` 的 `kern_ctl_reg` 结构体\n\n```c\nstruct kern_ctl_reg\n\
    {\n    /* 控制信息 */\n    char                        ctl_name[MAX_KCTL_NAME];\n\
    \    u_int32_t                   ctl_id;\n    u_int32_t                   ctl_unit;\n\
    \    /* 控制设置 */\n    u_int32_t                   ctl_flags;\n    u_int32_t   \
    \                ctl_sendsize;\n    u_int32_t                   ctl_recvsize;\n\
    \    /* 分派函数 */\n    ctl_connect_func            ctl_connect;\n    ctl_disconnect_func\
    \         ctl_disconnect;\n    ctl_send_func               ctl_send;\n    ctl_setopt_func\
    \             ctl_setopt;\n    ctl_getopt_func             ctl_getopt;\n};\n```\n\
    \n让我们更详细地查看结构体的各个字段：\n\n- `ctl_name` 应设置为 KEXT 的包标识符（bundle ID）。\n- `ctl_id` 字段用于额外的寻址，因为一个\
    \ KEXT 可能同时注册多个内核控制。`ctl_id` 字段可以动态注册，也可以由 Apple 开发者技术支持（DTS）分配。\n- 仅当使用 DTS 分配的\
    \ ID 时，才使用 `ctl_unit` 字段。\n- `ctl_flags` 只有两个标志位。第一个是 `CTL_FLAG_PRIVILEGED`，如果设置了此标志，则意味着用户空间程序必须拥有\
    \ root 权限才能连接到该内核控制。第二个标志是 `CTL_FLAG_REG_ID_UNIT`，如果使用 DTS 分配的 ID，则应设置此标志。\n-\
    \ `ctl_sendsize` 和 `ctl_recvsize` 字段可用于调整通过 `send()` 和 `recv()` 发送数据时的发送和接收缓冲区大小。\n\
    \n其余字段是函数指针，当相应的事件发生时，这些函数将被调用：\n\n- 当用户空间客户端连接或断开连接时，将分别调用 `ctl_connect` 和 `ctl_disconnect`\
    \ 回调。\n- 当客户端使用 `setsockopt()` 或 `getsockopt()` 函数时，会调用 `ctl_setopt` 和 `ctl_getopt`\
    \ 回调。这些函数通常用于获取或设置配置参数。接下来是 `ctl_send` 回调，这个名称可能有点令人困惑，因为它不是用于发送数据，而是用于从发送数据的客户端接收数据。要实际发送数据，请使用\
    \ `ctl_enqueuedata()` 函数。\n"
- fmt: "# Kernel Control Registration\n\nLet’s look at an example (`HelloKernControl`)\
    \ of how a kernel control interface is used. In this example, you will implement\
    \ a very minimal kernel control with one `get` and one `set` operation. The `get`\
    \ operation returns a string stored in the kernel. The `set` operation overwrites\
    \ this string so that subsequent `get` operations return the new string instead.\
    \ The following is an example of a filled out kernel control registration structure:\n\
    \n```\nstatic struct kern_ctl_reg g_kern_ctl_reg = {\n    \"com.osxkernel.HelloKernControl\"\
    ,\n    0,\n    0,\n    CTL_FLAG_PRIVILEGED,\n    0,\n    0,\n    hello_ctl_connect,\n\
    \    hello_ctl_disconnect,\n    NULL,\n    hello_ctl_set,\n    hello_ctl_get\n\
    };\n```\n\nWe use a dynamically assigned ID and specify that our kernel control\
    \ will be accessible only by privileged clients (root). We defined four callbacks,\
    \ but we leave the `ctl_send` callback as `NULL` because we don’t support it in\
    \ this example. The following is the code used to register and deregister the\
    \ kernel control:\n\n```\nstatic boolean_t g_filter_registered = FALSE;\nstatic\
    \ kern_ctl_ref g_ctl_ref;\n\nkern_return_t HelloKernControl_start (kmod_info_t*\
    \ ki, void* d)\n{\n    strncpy(g_string_buf, DEFAULT_STRING, strlen(DEFAULT_STRING));\n\
    \n    /* Register the control */\n    int ret = ctl_register(&g_kern_ctl_reg,\
    \ &g_ctl_ref);\n\n    if (ret == KERN_SUCCESS)\n    {\n        g_filter_registered\
    \ = TRUE;\n        return KERN_SUCCESS;\n    }\n    return KERN_FAILURE;\n}\n\n\
    kern_return_t HelloKernControl_stop (kmod_info_t* ki, void* d)\n{\n    if (g_clients_connected\
    \ != 0)\n        return KERN_FAILURE;\n\n    if (g_filter_registered)\n      \
    \  ctl_deregister(g_ctl_ref);\n\n    return KERN_SUCCESS;\n}\n```\n\nYou register\
    \ the interface in the KEXT’s `start()` function and deregister it in the `stop()`\
    \ function, which will be called before the KEXT is unloaded. Because a kernel\
    \ control often shares some data with user space, it is necessary to define a\
    \ shared header file to store common declarations used by both the kernel and\
    \ user space. The shared header file for `HelloKernControl` is shown in the following\
    \ example:\n\n```\n#ifndef HelloKernControl_HelloKernControl_h\n#define HelloKernControl_HelloKernControl_h\n\
    \n#define BUNDLE_ID \"com.osxkernel.HelloKernControl\"\n\n#define HELLO_CONTROL_GET_STRING\
    \  1\n#define HELLO_CONTROL_SET_STRING  2\n\n#define DEFAULT_STRING          \
    \  \"Hello World\"\n#define MAX_STRING_LEN            256\n\n#endif\n```\n\n##\
    \ Client Connections\n\nThe following are the implementation of the connect and\
    \ disconnect callbacks:\n\n```\nstatic int hello_ctl_connect(kern_ctl_ref ctl_ref,\
    \ struct sockaddr_ctl *sac, void** unitinfo)\n{\n    printf(\"process with pid=%d\
    \ connected\\n\", proc_selfpid());\n    return 0;\n}\nstatic errno_t hello_ctl_disconnect(kern_ctl_ref\
    \ ctl_ref, u_int32_t unit, void* unitinfo)\n{\n    printf(\"process with pid=%d\
    \ disconnected\\n\", proc_selfpid());\n    return 0;\n}\n```\n\nIn the preceding\
    \ example the `hello_ctl_connect()` function logs the PID of the client that opened\
    \ the kernel control. It is often necessary to maintain some per-client data structure.\
    \ The data structure should be assigned to the `unitinfo` parameter—for example:\
    \ `*uinitinfo = myStructure;`. The structure can now be retrieved in other callbacks.\
    \ If you allocate memory when the client connects, you should free the memory\
    \ in the disconnect callback. If you wish to refuse a client—for example, because\
    \ only one client is allowed at a time, or the maximum number of clients is already\
    \ connected—you can simply return an error code, such as `EBUSY` or `EPERM`.\n\
    \n## Getting and Setting Options\n\nOnce a client is successfully connected, it\
    \ can start issuing `get`/`set` option requests to the kernel control. The implementation\
    \ of the control `get` function is as follows:\n\n```\nstatic int hello_ctl_get(kern_ctl_ref\
    \ ctl_ref, u_int32_t unit, void *unitinfo, int opt,\n                        \
    \ void *data, size_t *len)\n{\n    int ret = 0;\n    switch (opt) {\n        case\
    \ HELLO_CONTROL_GET_STRING:\n            *len = min(MAX_STRING_LEN, *len);\n \
    \           strncpy(data, g_string_buf, *len);\n            break;\n        default:\n\
    \            ret = ENOTSUP;\n            break;\n    }\n    return ret;\n}\n```\n\
    \nThe `opt` argument comes from the client and specifies which option the client\
    \ is interested in. A common approach is to create a shared header file, which\
    \ contains option definitions that are shared between the KEXT and the user space\
    \ program.\n\n![images](images/square.jpg) **Caution:** Be careful about sharing\
    \ data structures, because the KEXT and the user space program may pad the structure\
    \ differently. This can cause bugs, corruptions, or worse.\n\nThe preceding case\
    \ only handles one option. This option is defined by `HELLO_CONTROL_GET_STRING`,\
    \ which returns the string in the global `g_string_buf` variable shared between\
    \ all clients. If you had allocated private data during the connect callback,\
    \ you could retrieve it by casting the type of the data from the `unitinfo` argument.\n\
    \nTo return the string to the client, you will copy it to the memory address given\
    \ in the `data` argument. The `len` argument is an input/output argument and contains\
    \ the length of the data buffer. Obviously, you must ensure that you do not write\
    \ out of bounds. If you write to the buffer, you should modify `len` to reflect\
    \ how many bytes were actually written.\n\nThe implementation of the `set` option\
    \ function is very similar:\n\n```\nstatic int hello_ctl_set(kern_ctl_ref ctl_ref,\
    \ u_int32_t unit, void* unitinfo, int opt,\n                         void* data,\
    \ size_t len)\n{\n    int ret = 0;\n    switch (opt) {\n        case HELLO_CONTROL_SET_STRING:\n\
    \            strncpy(g_string_buf, (char*)data, min(MAX_STRING_LEN, len));\n \
    \           printf(\"HELLP_CONTROL_SET_STRING: new string set to: \\\"%s\\\"\\\
    n\", g_string_buf);\n            break;\n       default:\n            ret = ENOTSUP;\n\
    \            break;\n   }\n   return ret;\n}\n```\n\nAs with the control `get`\
    \ option function, we are passed a buffer with data coming from user space and\
    \ the length of the buffer in the `data` and `len` arguments. The data is not\
    \ valid once the function returns, so you must copy any data you want to preserve."
  raw: '#### Kernel Control Registration


    Let''s look at an example (HelloKernControl) of how a kernel control interface
    is used. In this example, you will implement a very minimal kernel control with
    one get and one set operation. The get operation returns a string stored in the
    kernel. The set operation overwrites this string so that subsequent get operations
    return the new string instead. The following is an example of a filled out kernel
    control registration structure:


    `static struct kern_ctl_reg g_kern_ctl_reg = {`

    `    "com.osxkernel.HelloKernControl",              `

    `    0,`

    `    0,`

    `    CTL_FLAG_PRIVILEGED,`

    `    0,`

    `    0,`

    `    hello_ctl_connect,`

    `    hello_ctl_disconnect,`

    `    NULL,`

    `    hello_ctl_set,`

    `    hello_ctl_get`

    `};`


    We use a dynamically assigned ID and specify that our kernel control will be accessible
    only by privileged clients (root). We defined four callbacks, but we leave the
    `ctl_send` callback as `NULL` because we don''t support it in this example. The
    following is the code used to register and deregister the kernel control:


    `static boolean_t g_filter_registered = FALSE;`

    `static kern_ctl_ref g_ctl_ref;`


    `kern_return_t HelloKernControl_start (kmod_info_t* ki, void* d)`


    `{    `

    `    strncpy(g_string_buf, DEFAULT_STRING, strlen(DEFAULT_STRING));`


    `    /* Register the control */`

    `    int ret = ctl_register(&g_kern_ctl_reg, &g_ctl_ref);`


    `    if (ret == KERN_SUCCESS)`

    `    {`

    `        g_filter_registered = TRUE;`

    `        return KERN_SUCCESS;`

    `    }`

    `    return KERN_FAILURE;`

    `}`


    `kern_return_t HelloKernControl_stop (kmod_info_t* ki, void* d)`

    `{    `

    `    if (g_clients_connected != 0)`

    `        return KERN_FAILURE;`


    `    if (g_filter_registered)`

    `        ctl_deregister(g_ctl_ref);`


    `    return KERN_SUCCESS;`

    `}`


    You register the interface in the KEXT''s `start()` function and deregister it
    in the `stop()` function, which will be called before the KEXT is unloaded. Because
    a kernel control often shares some data with user space, it is necessary to define
    a shared header file to store common declarations used by both the kernel and
    user space. The shared header file for HelloKernControl is shown in the following
    example:


    `#ifndef HelloKernControl_HelloKernControl_h`

    `#define HelloKernControl_HelloKernControl_h`


    `#define BUNDLE_ID "com.osxkernel.HelloKernControl"`


    `#define HELLO_CONTROL_GET_STRING  1`

    `#define HELLO_CONTROL_SET_STRING  2`


    `#define DEFAULT_STRING            "Hello World"`

    `#define MAX_STRING_LEN            256`


    `#endif`


    #### Client Connections


    The following are the implementation of the connect and disconnect callbacks:


    `static int hello_ctl_connect(kern_ctl_ref ctl_ref, struct sockaddr_ctl *sac,
    void** unitinfo)`

    `{`

    `    printf("process with pid=%d connected\n", proc_selfpid());`

    `    return 0;`

    `}`

    `static errno_t hello_ctl_disconnect(kern_ctl_ref ctl_ref, u_int32_t unit, void*
    unitinfo)`

    `{    `

    `    printf("process with pid=%d disconnected\n", proc_selfpid());`

    `    return 0;`

    `}`


    In the preceding example the `hello_ctl_connect()` function, logs the PID of the
    client that opened the kernel control. It is often necessary to maintain some
    per-client data structure. The data structure should be assigned to the `unitinfo`
    parameter—for example: `*uinitinfo = myStructure;`. The structure can now be retrieved
    in other callbacks. If you allocate memory when the client connects, you should
    free the memory in the disconnect callback. If you wish to refuse a client—for
    example, because only one client is allowed at a time, or the maximum number of
    clients is already connected—you can simply return an error code, such as EBUSY
    or EPERM.


    #### Getting and Setting Options


    `Once a client is successfully connected, it can start issuing get/set option
    requests to the kernel control. The implementation of the control get function
    is as follows:`


    `static int hello_ctl_get(kern_ctl_ref ctl_ref, u_int32_t unit, void *unitinfo,
    int opt,`

    `                         void *data, size_t *len)`

    `{`

    `    int ret = 0;`

    `    switch (opt) {`

    `        case HELLO_CONTROL_GET_STRING:`

    `            *len = min(MAX_STRING_LEN, *len);`

    `            strncpy(data, g_string_buf, *len);`

    `            break;`

    `        default:`

    `            ret = ENOTSUP;`

    `            break;`

    `    }`

    `    return ret;`

    `}`


    The `opt` argument comes from the client and specifies which option the client
    is interested in. A common approach is to create a shared header file, which contains
    option definitions that are shared between the KEXT and the user space program.


    ![images](images/square.jpg) **Caution** Be careful about sharing data structures,
    because the KEXT and the user space program may pad the structure differently.
    This can cause bugs, corruptions, or worse.


    The preceding case only handles one option. This option is defined by `HELLO_CONTROL_GET_STRING`,
    which returns the string in the global `g_string_buf` variable shared between
    all clients. If you had allocated private data during the connect callback, you
    could retrieve it by casting the type of the data from the `unitinfo` argument.


    To return the string to the client, you will copy it to the memory address given
    in the data argument. The len argument is an input/output argument and contains
    the length of the data buffer. Obviously, you must ensure that you do not write
    out of bounds. If you write to the buffer, you should modify len to reflect how
    many bytes were actually written.


    The implementation of the set option function is very similar:


    `static int hello_ctl_set(kern_ctl_ref ctl_ref, u_int32_t unit, void* unitinfo,
    int opt,`

    `                         void* data, size_t len)`

    `{`

    `    int ret = 0;`

    `    switch (opt) {`

    `        case HELLO_CONTROL_SET_STRING:`

    `            strncpy(g_string_buf, (char*)data, min(MAX_STRING_LEN, len));`

    `            printf("HELLP_CONTROL_SET_STRING: new string set to: \"%s\"\n", g_string_buf);`

    `            break;`

    `       default:`

    `            ret = ENOTSUP;`

    `            break;`

    `   }`

    `   return ret;`

    `}`


    As with the control get option function, we are passed a buffer with data coming
    from user space and the length of the buffer in the `data` and `len` arguments.
    The data is not valid once the function returns, so you must copy any data you
    want to preserve.'
  trans: "\n# 内核控制注册\n\n我们来看一个如何使用内核控制接口的示例（`HelloKernControl`）。在此示例中，你将实现一个最简化的内核控制，包含一个`get`操作和一个`set`操作。`get`操作返回内核中存储的一个字符串，`set`操作则会覆盖该字符串，使得后续的`get`操作返回新的字符串。以下是一个已填好的内核控制注册结构体示例：\n\
    \n```\nstatic struct kern_ctl_reg g_kern_ctl_reg = {\n    \"com.osxkernel.HelloKernControl\"\
    ,\n    0,\n    0,\n    CTL_FLAG_PRIVILEGED,\n    0,\n    0,\n    hello_ctl_connect,\n\
    \    hello_ctl_disconnect,\n    NULL,\n    hello_ctl_set,\n    hello_ctl_get\n\
    };\n```\n\n我们使用动态分配的 ID，并指定该内核控制仅允许特权客户端（root）访问。我们定义了四个回调函数，但将`ctl_send`回调设为`NULL`，因为本例中不支持该功能。以下是用于注册和注销内核控制的代码：\n\
    \n```\nstatic boolean_t g_filter_registered = FALSE;\nstatic kern_ctl_ref g_ctl_ref;\n\
    \nkern_return_t HelloKernControl_start (kmod_info_t* ki, void* d)\n{\n    strncpy(g_string_buf,\
    \ DEFAULT_STRING, strlen(DEFAULT_STRING));\n\n    /* 注册控制 */\n    int ret = ctl_register(&g_kern_ctl_reg,\
    \ &g_ctl_ref);\n\n    if (ret == KERN_SUCCESS)\n    {\n        g_filter_registered\
    \ = TRUE;\n        return KERN_SUCCESS;\n    }\n    return KERN_FAILURE;\n}\n\n\
    kern_return_t HelloKernControl_stop (kmod_info_t* ki, void* d)\n{\n    if (g_clients_connected\
    \ != 0)\n        return KERN_FAILURE;\n\n    if (g_filter_registered)\n      \
    \  ctl_deregister(g_ctl_ref);\n\n    return KERN_SUCCESS;\n}\n```\n\n你在 KEXT 的`start()`函数中注册接口，并在`stop()`函数中注销接口，该函数会在\
    \ KEXT 被卸载前调用。由于内核控制通常会与用户空间共享数据，因此有必要定义一个共享头文件，用于存储内核和用户空间共同使用的声明。`HelloKernControl`的共享头文件如下例所示：\n\
    \n```\n#ifndef HelloKernControl_HelloKernControl_h\n#define HelloKernControl_HelloKernControl_h\n\
    \n#define BUNDLE_ID \"com.osxkernel.HelloKernControl\"\n\n#define HELLO_CONTROL_GET_STRING\
    \  1\n#define HELLO_CONTROL_SET_STRING  2\n\n#define DEFAULT_STRING          \
    \  \"Hello World\"\n#define MAX_STRING_LEN            256\n\n#endif\n```\n\n##\
    \ 客户端连接\n\n以下是连接与断开回调函数的实现：\n\n```\nstatic int hello_ctl_connect(kern_ctl_ref\
    \ ctl_ref, struct sockaddr_ctl *sac, void** unitinfo)\n{\n    printf(\"进程 pid=%d\
    \ 已连接\\n\", proc_selfpid());\n    return 0;\n}\nstatic errno_t hello_ctl_disconnect(kern_ctl_ref\
    \ ctl_ref, u_int32_t unit, void* unitinfo)\n{\n    printf(\"进程 pid=%d 已断开连接\\\
    n\", proc_selfpid());\n    return 0;\n}\n```\n\n在上例中，`hello_ctl_connect()`函数记录了打开内核控制的客户端的\
    \ PID。通常需要维护一个按客户端划分的数据结构。该数据结构应赋值给`unitinfo`参数——例如：`*uinitinfo = myStructure;`。这样，在其他回调函数中就可以获取该结构体。如果在客户端连接时分配了内存，则应在断开连接的回调中释放内存。如果你希望拒绝某个客户端——例如，因为同一时间只允许一个客户端，或最大客户端数已满——只需返回一个错误码，例如`EBUSY`或`EPERM`。\n\
    \n## 获取与设置选项\n\n一旦客户端成功连接，它就可以开始向内核控制发起`get`/`set`选项请求。控制`get`函数的实现如下：\n\n```\n\
    static int hello_ctl_get(kern_ctl_ref ctl_ref, u_int32_t unit, void *unitinfo,\
    \ int opt,\n                         void *data, size_t *len)\n{\n    int ret\
    \ = 0;\n    switch (opt) {\n        case HELLO_CONTROL_GET_STRING:\n         \
    \   *len = min(MAX_STRING_LEN, *len);\n            strncpy(data, g_string_buf,\
    \ *len);\n            break;\n        default:\n            ret = ENOTSUP;\n \
    \           break;\n    }\n    return ret;\n}\n```\n\n`opt`参数来自客户端，指定了客户端感兴趣的选项。常见的做法是创建一个共享头文件，其中包含\
    \ KEXT 和用户空间程序共用的选项定义。\n\n![images](img/square.jpg) **警告：** 共享数据结构时要格外小心，因为 KEXT\
    \ 和用户空间程序可能对结构体进行不同的对齐填充。这可能导致错误、数据损坏甚至更严重的问题。\n\n上述 case 仅处理了一个选项。该选项由`HELLO_CONTROL_GET_STRING`定义，它返回全局变量`g_string_buf`中的字符串，该变量在所有客户端之间共享。如果在连接回调中分配了私有数据，可以通过将`unitinfo`参数的数据类型进行转换来获取它。\n\
    \n为了将字符串返回给客户端，你需要将其复制到`data`参数指向的内存地址。`len`参数是一个输入/输出参数，包含了数据缓冲区的长度。显然，你必须确保不会越界写入。如果向缓冲区写入了数据，则应修改`len`以反映实际写入的字节数。\n\
    \n`set`选项函数的实现非常相似：\n\n```\nstatic int hello_ctl_set(kern_ctl_ref ctl_ref, u_int32_t\
    \ unit, void* unitinfo, int opt,\n                         void* data, size_t\
    \ len)\n{\n    int ret = 0;\n    switch (opt) {\n        case HELLO_CONTROL_SET_STRING:\n\
    \            strncpy(g_string_buf, (char*)data, min(MAX_STRING_LEN, len));\n \
    \           printf(\"HELLP_CONTROL_SET_STRING: 新字符串设置为：\\\"%s\\\"\\n\", g_string_buf);\n\
    \            break;\n       default:\n            ret = ENOTSUP;\n           \
    \ break;\n   }\n   return ret;\n}\n```\n\n与控制`get`选项函数类似，我们通过`data`和`len`参数接收来自用户空间的缓冲区数据及其长度。该数据在函数返回后即失效，因此你必须复制任何需要保留的数据。\n"
- fmt: "### Accessing Kernel Controls from User Space\n\nThe example in [Listing 17-2](#Chapter17.html#list_17_2)\
    \ demonstrates how we can connect the kernel control interface described in the\
    \ previous sections.\n\n**Listing 17-2.** *User Space Tool for Connecting to a\
    \ Kernel Control Interface*\n\n```c\n#include <stdio.h>\n#include <stdlib.h>\n\
    #include <strings.h>\n#include <unistd.h>\n\n#include <sys/socket.h>\n#include\
    \ <sys/ioctl.h>\n#include <sys/kern_control.h>\n#include <sys/sys_domain.h>\n\n\
    #include \"HelloKernControl.h\"\n\nint main(int argc, char* const*argv)\n{\n \
    \   struct ctl_info ctl_info;\n    struct sockaddr_ctl sc;\n    char str[MAX_STRING_LEN];\n\
    \n    int sock = socket(PF_SYSTEM, SOCK_DGRAM, SYSPROTO_CONTROL);\n       if (sock\
    \ < 0)\n       return -1;\n\n    bzero(&ctl_info, sizeof(struct ctl_info));\n\
    \    strcpy(ctl_info.ctl_name, \"com.osxkernel.HelloKernControl\");\n\n    if\
    \ (ioctl(sock, CTLIOCGINFO, &ctl_info) == -1)\n       return -1;\n\n    bzero(&sc,\
    \ sizeof(struct sockaddr_ctl));\n    sc.sc_len = sizeof(struct sockaddr_ctl);\n\
    \    sc.sc_family = AF_SYSTEM;\n    sc.ss_sysaddr = SYSPROTO_CONTROL;\n    sc.sc_id\
    \ = ctl_info.ctl_id;\n    sc.sc_unit = 0;\n\n    if (connect(sock, (struct sockaddr\
    \ *)&sc, sizeof(struct sockaddr_ctl)))\n        return -1;\n\n    /* Get an existing\
    \ string from the kernel */\n    unsigned int size = MAX_STRING_LEN;\n    if (getsockopt(sock,\
    \ SYSPROTO_CONTROL, HELLO_CONTROL_GET_STRING, &str, &size) == -1)\n        return\
    \ -1;\n\n    printf(\"kernel string is: %s\\n\", str);\n\n    /* Set a new string\
    \ */\n    strcpy(str, \"Hello Kernel, here's your new string, enjoy!\");\n   \
    \ if (setsockopt(sock, SYSPROTO_CONTROL, HELLO_CONTROL_SET_STRING,\n         \
    \          str, (socklen_t)strlen(str)) == -1)\n        return -1;\n\n    close(sock);\n\
    \n    return 0;\n}\n```\n\nWhen the program in [Listing 17-2](#Chapter17.html#list_17_2)\
    \ is executed, you should see the following results:\n\n```\n$ sudo kextload HelloKernControl.kext\n\
    \n$ sudo ./hello_tool\nkernel string is: Hello World\n$ sudo ./hello_tool\nkernel\
    \ string is: Hello Kernel, here's your new string, enjoy!\n```\n\n### Working\
    \ with Processes in the Kernel\n\nThe BSD portion of the kernel provides a KPI\
    \ for getting information about active processes in the system. Note that the\
    \ term *process* is used in BSD as opposed to *task*, which is used in the Mach\
    \ portion of the kernel, though they really refer to the same thing.\n\n**KERNEL\
    \ PRIVATE KPIS**\n\nIf you are digging around in the kernel headers, you may come\
    \ across the preprocessor directive `KERNEL_PRIVATE`. Functions or other symbols\
    \ defined within these sections are not available for use by third-party kernel\
    \ extensions, and attempting to use one even if the correct header is included\
    \ will result in a failure to load that KEXT due to unresolved symbols. Apple's\
    \ own KEXTs are able to access these symbols by adding a dependency to `com.apple.kpi.private`.\
    \ If you add a dependency for this KPI in your own KEXT it will fail to load,\
    \ as only Apple-signed KEXTs can use it.\n\nYou have already seen examples of\
    \ how to get information about a process in the AppWall example in [Chapter 13](#Chapter13.html#ch13),\
    \ where we used the `proc_selfname()` function to get the process name of the\
    \ currently running process. If the function is called in a thread owned by the\
    \ kernel, the kernel process name `\"kernel_task\"` will be returned.\n\nIf you\
    \ need to know the PID of the currently running process instead of its name, you\
    \ can call `proc_selfpid()`. You can also find the name of a process if you know\
    \ its PID by using the `proc_name(int pid, char * buf, int size)` function. An\
    \ overview of functions in the process KPI is outlined in [Table 17-1](#Chapter17.html#tab_17_1).\n\
    \n![images](images/t1701.jpg)\n\n![images](images/t1701a.jpg)\n\n### Loading Resources\n\
    \nThe I/O Kit does not provide any classes or functions that provide a driver\
    \ with access to the file system. This is a deliberate design decision, not an\
    \ oversight in the I/O Kit design. In theory, a driver should not need to access\
    \ files on disk. The driver's role is to respond to requests from the operating\
    \ system to manage its own hardware device, and not to initiate requests of its\
    \ own. In practice, however, there are many reasons why a driver may need to access\
    \ data from the file system. One of the most common reasons is to read resource\
    \ data, such as the firmware data for the driver's hardware.\n\nAlthough the I/O\
    \ Kit doesn't allow general file system access, it does provide a means for a\
    \ driver to access files from the \"Resources\" directory inside the driver bundle.\
    \ The I/O Kit's resource-loading API is defined in the header file `<libkern/OSKextLib.h>`.\
    \ The API is asynchronous; a driver makes a request for the resource that it wishes\
    \ to load and provides a callback function that the I/O Kit uses to notify the\
    \ driver when the data is available.\n\nWe mentioned that the I/O Kit doesn't\
    \ provide general file system access, but in addition to this, the I/O Kit itself\
    \ doesn't have access to the file system. In order to load the resource file for\
    \ a driver, the I/O Kit relies on a user space helper process, which reads the\
    \ requested file on behalf of the I/O Kit and passes the file's contents back\
    \ to the I/O Kit. The I/O Kit then notifies the driver that made the request.\n\
    \nSince the I/O Kit relies on a user space helper process to load resources, it\
    \ is not possible to load resources in the boot process until the helper process\
    \ has been launched. However, in most cases this does not cause a problem for\
    \ the driver, since the I/O Kit will queue the request until the helper process\
    \ is available to receive requests from the kernel.\n\nA driver can request that\
    \ the I/O Kit load a file from the driver's resources directory by calling the\
    \ function `OSKextRequestResource()`. This function's definition is as follows:\n\
    \n```c\nOSReturn OSKextRequestResource(const char* kextIdentifier,\n         \
    \                      const char* resourceName,\n                           \
    \    OSKextRequestResourceCallback  callback,\n                              \
    \ void* context,\n                               OSKextRequestTag* requestTagOut);\n\
    ```\n\nThe first parameter, `kextIdentifier`, specifies the bundle identifier\
    \ of the driver that contains the resource to load; this will almost always be\
    \ the value specified by the `CFBundleIdentifier` key of the driver's `Info.plist`\
    \ file. The second parameter, `resourceName`, is the name of the resource file\
    \ to be loaded from the driver's bundle. The next two parameters are the callback\
    \ function and an associated context argument that is passed to the callback function\
    \ when the resource has been loaded. The final parameter, `requestTagOut`, is\
    \ returned immediately to the caller and can be used to track the operation to\
    \ load the resource.\n\nIf the call to `OSKextRequestResource()` succeeds, the\
    \ driver will be notified through its specified callback function when the request\
    \ has completed. The completion callback has the following signature:\n\n```c\n\
    typedef void (*OSKextRequestResourceCallback)(OSKextRequestTag requestTag,\n \
    \                                             OSReturn result,\n             \
    \                                 const void* resourceData,\n                \
    \                              uint32_t resourceDataLength,\n                \
    \                              void* context);\n```"
  raw: '#### Accessing Kernel Controls from User Space


    The example in [Listing 17-2](#Chapter17.html#list_17_2) demonstrates how we can
    connect the kernel control interface described in the previous sections.


    ***Listing 17-2.** User Space Tool for Connecting to a Kernel Control Interface*


    `#include <stdio.h>`

    `#include <stdlib.h>`

    `#include <strings.h>`

    `#include <unistd.h>`


    `#include <sys/socket.h>`

    `#include <sys/ioctl.h>`

    `#include <sys/kern_control.h>`

    `#include <sys/sys_domain.h>`


    `#include "HelloKernControl.h"`


    `int main(int argc, char* const*argv)`

    `{`

    `    struct ctl_info ctl_info;`

    `    struct sockaddr_ctl sc;`

    `    char str[MAX_STRING_LEN];`


    `    int sock = socket(PF_SYSTEM, SOCK_DGRAM, SYSPROTO_CONTROL);`

    `       if (sock < 0)`

    `       return -1;`


    `    bzero(&ctl_info, sizeof(struct ctl_info));`

    `    strcpy(ctl_info.ctl_name, "com.osxkernel.HelloKernControl");`


    `    if (ioctl(sock, CTLIOCGINFO, &ctl_info) == -1)`

    `       return -1;`


    `    bzero(&sc, sizeof(struct sockaddr_ctl));`

    `    sc.sc_len = sizeof(struct sockaddr_ctl);`

    `    sc.sc_family = AF_SYSTEM;`

    `    sc.ss_sysaddr = SYSPROTO_CONTROL;`

    `    sc.sc_id = ctl_info.ctl_id;`

    `    sc.sc_unit = 0;`


    `    if (connect(sock, (struct sockaddr *)&sc, sizeof(struct sockaddr_ctl)))`

    `        return -1;`


    `    /* Get an existing string from the kernel */`

    `    unsigned int size = MAX_STRING_LEN;`

    `    if (getsockopt(sock, SYSPROTO_CONTROL, HELLO_CONTROL_GET_STRING, &str, &size)
    == -1)`

    `        return -1;`


    `    printf("kernel string is: %s\n", str);`


    `    /* Set a new string */`

    `    strcpy(str, "Hello Kernel, here''s your new string, enjoy!");`

    `    if (setsockopt(sock, SYSPROTO_CONTROL, HELLO_CONTROL_SET_STRING,`

    `                   str, (socklen_t)strlen(str)) == -1)`

    `        return -1;`


    `    close(sock);`


    `    return 0;`

    `}`


    When the program in [Listing 17-2](#Chapter17.html#list_17_2) is executed, you
    should see the following results:


    * * *


    `$ sudo kextload HelloKernControl.kext`


    `$` **`sudo ./hello_tool`**

    `kernel string is: Hello World`

    `$` **`sudo ./hello_tool`**

    `kernel string is: Hello Kernel, here''s your new string, enjoy!`


    * * *


    ### Working with Processes in the Kernel


    The BSD portion of the kernel provides a KPI for getting information about active
    processes in the system. Note that the term *process* is used in BSD as opposed
    to *task*, which is used in the Mach portion of the kernel, though they really
    refer to the same thing.


    **KERNEL PRIVATE KPIS**


    If you are digging around in the kernel headers, you may come across the preprocessor
    directive `KERNEL_PRIVATE`. Functions or other symbols defined within these sections
    are not available for use by third-party kernel extensions, and attempting to
    use one even if the correct header is included will result in a failure to load
    that KEXT due to unresolved symbols. Apple''s own KEXTs are able to access these
    symbols by adding a dependency to *`com.apple.kpi.private`*. If you add a dependency
    for this KPI in your own KEXT it will fail to load, as only Apple-signed KEXTs
    can use it.


    You have already seen examples of how to get information about a process in the
    AppWall example in [Chapter 13](#Chapter13.html#ch13), where we used the `proc_selfname()`
    function to get the process name of the currently running process. If the function
    is called in a thread owned by the kernel, the kernel process name *“kernel_task”*
    will be returned.


    If you need to know the PID of the currently running process instead of its name,
    you can call `proc_selfpid()`. You can also find the name of a process if you
    know its PID by using the `proc_name(int pid, char * buf, int size);` function.
    An overview of functions in the process KPI is outlined in [Table 17-1](#Chapter17.html#tab_17_1).


    ![images](images/t1701.jpg)


    ![images](images/t1701a.jpg)


    ### Loading Resources


    The I/O Kit does not provide any classes or functions that provide a driver with
    access to the file system. This is a deliberate design decision, not an oversight
    in the I/O Kit design. In theory, a driver should not need to access files on
    disk. The driver''s role is to respond to requests from the operating system to
    manage its own hardware device, and not to initiate requests of its own. In practice,
    however, there are many reasons why a driver may need to access data from the
    file system. One of the most common reasons is to read resource data, such as
    the firmware data for the driver''s hardware.


    Although the I/O Kit doesn''t allow general file system access, it does provide
    a means for a driver to access files from the “Resources” directory inside the
    driver bundle. The I/O Kit''s resource-loading API is defined in the header file
    `<libkern/OSKextLib.h>`. The API is asynchronous; a driver makes a request for
    the resource that it wishes to load and provides a callback function that the
    I/O Kit uses to notify the driver when the data is available.


    We mentioned that the I/O Kit doesn''t provide general file system access, but
    in addition to this, the I/O Kit itself doesn''t have access to the file system.
    In order to load the resource file for a driver, the I/O Kit relies on a user
    space helper process, which reads the requested file on behalf of the I/O Kit
    and passes the file''s contents back to the I/O Kit. The I/O Kit then notifies
    the driver that made the request.


    Since the I/O Kit relies on a user space helper process to load resources, it
    is not possible to load resources in the boot process until the helper process
    has been launched. However, in most cases this does not cause a problem for the
    driver, since the I/O Kit will queue the request until the helper process is available
    to receive requests from the kernel.


    A driver can request that the I/O Kit load a file from the driver''s resources
    directory by calling the function `OSKextRequestResource()`. This function''s
    definition is as follows:


    `OSReturn OSKextRequestResource(const char* kextIdentifier,`

    `                               const char* resourceName,`

    `                               OSKextRequestResourceCallback  callback,`

    `                               void* context,`

    `                               OSKextRequestTag* requestTagOut);`


    The first parameter, `kextIdentifier`, specifies the bundle identifier of the
    driver that contains the resource to load; this will almost always be the value
    specified by the `CFBundleIdentifier` key of the driver''s `Info.plist` file.
    The second parameter, `resourceName`, is the name of the resource file to be loaded
    from the driver''s bundle. The next two parameters are the callback function and
    an associated context argument that is passed to the callback function when the
    resource has been loaded. The final parameter, `requestTagOut`, is returned immediately
    to the caller and can be used to track the operation to load the resource.


    If the call to `OSKextRequestResource` succeeds, the driver will be notified through
    its specified callback function when the request has completed. The completion
    callback has the following signature:


    `typedef void (*OSKextRequestResourceCallback)(OSKextRequestTag requestTag,`

    `                                              OSReturn result,`

    `                                              const void* resourceData,`

    `                                              uint32_t resourceDataLength,`

    `                                              void* context);`'
