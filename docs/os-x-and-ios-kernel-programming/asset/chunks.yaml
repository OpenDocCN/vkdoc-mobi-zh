    and line number. We can also see the arguments that were passed to the methods
    and that they correspond to the values we picked earlier. Let’s examine the crash
    further by jumping to the fifth stack frame, the location where the crash occurred,
    as follows:


    `(gdb)` **`frame 5`**

    `#5  0x009ba0b7 in com_osxkernel_MyDebugDriver::testFunc3 (this=0x4e80f80, arg1=65261,`

    `arg2=48879, arg3=0, arg4=5380) at MyDebugDriver.cpp:14`

    `14                     thisWillNotWork->fVariable1 = arg3;`

    `Current language:  auto; currently c++`

    `(gdb) print thisWillNotWork`

    `$1 = (com_osxkernel_MyDebugDriver *) 0x0`


    I think we found the problem! We are trying to assign a value to the member variable
    `fVariable1` but the object is not initialized. We can also list the source code
    of `testFunc3()`, as follows:


    `(gdb)` **`list com_osxkernel_MyDebugDriver::testFunc3,15`**

    `9      void com_osxkernel_MyDebugDriver::testFunc3(UInt32 arg1, UInt32 arg2,
    UInt32 arg3, UInt32 arg4)`

    `10     {`

    `11         if (arg3 == 0)`

    `12         {`

    `13             com_osxkernel_MyDebugDriver *thisWillNotWork = NULL;`

    `14             thisWillNotWork->fVariable1 = arg3;`

    `15         }`


    Well, that would never work! We have found our bug, which appears to be triggered
    only when the third argument passed is set to zero.


    If you only have symbol information and lack the debug information required to
    map addresses to a specific source code location, you can use the `disassemble`
    command in GDB to show a dump disassembly of the method from its address. Let’s
    look at the disassembly of `testFunc3()`, as follows:


    `(gdb)` **`disassemble 0x009ba0b7`**

    `…`

    `0x009ba09f <testFunc3Emmmm+35>:     mov    %eax,-0x1c(%ebp)`

    `0x009ba0a2 <testFunc3Emmmm+38>:     mov    -0x18(%ebp),%eax`

    `0x009ba0a5 <testFunc3Emmmm+41>:     cmp    $0x0,%eax`

    `0x009ba0a8 <testFunc3Emmmm+44>:     jne    0x9ba0ba <testFunc3Emmmm+62>`

    `0x009ba0aa <testFunc3Emmmm+46>:     movl   $0x0,-0x20(%ebp)`

    `0x009ba0b1 <testFunc3Emmmm+53>:     mov    -0x18(%ebp),%eax`

    `0x009ba0b4 <testFunc3Emmmm+56>:     mov    -0x20(%ebp),%ecx`

    `0x009ba0b7 <testFunc3Emmmm+59>:     mov    %eax,0x54(%ecx)`

    `0x009ba0ba <testFunc3Emmmm+62>:     add    $0x18,%esp`

    `...`


    While this looks very uninviting if you are not familiar with assembly, you will
    be able to infer a number of things by comparing the disassembly to the original
    source code. For example, the *cmp* instruction compares the value of the *eax*
    register against the constant value $0x0, which we can correctly guess corresponds
    to the if statement on line 11.


    Although we have already found the source of the problem, let’s pretend for a
    moment we are curious as to why a zero value was passed for the third argument.
    Perhaps our driver used an internal state to calculate the value passed to `testFunc3()`.
    In this case, we could continue our examination by looking at the state of the
    driver was in at the time of the crash. Because `testFunc3()` is a member method
    of the `com_osxkernel_MyDebugDriver`, we know that a pointer to the class instance
    is always passed automatically to the member function as the *this* pointer. We
    can dereference the `this` pointer address from the previous stack trace as follows:


    `(gdb)` **`print *(com_osxkernel_MyDebugDriver*)0x4e80f80`**

    `$9 = {`

    `  <IOService> = {`

    `    <IORegistryEntry> = {`

    `      <OSObject> = {`

    `        <OSMetaClassBase> = {`

    `          _vptr$OSMetaClassBase = 0x9baa00`

    `        },`

    `        members of OSObject:`

    `        retainCount = 65537`

    `      },`

    `      members of IORegistryEntry:`

    `      reserved = 0x4e71a40,`

    `      fRegistryTable = 0xb693800,`

    `      fPropertyTable = 0x503a400`

    `    },`

    `    members of IOService:`

    `    reserved = 0x0,`

    `    __provider = 0x4d17f00,`

    `…….`

    `  },`

    `  members of com_osxkernel_MyDebugDriver:`

    `  fTimer = 0xb63adc0,`

    `  fVariable1 = 2,`

    `  fVariable2 = 4,`

    `  static gMetaClass = {`

    `    <OSMetaClass> = {`

    `      <OSMetaClassBase> = {`

    `        _vptr$OSMetaClassBase = 0x9ba980`

    `      },`

    `      members of OSMetaClass:`

    `      reserved = 0xb63ba00,`

    `      superClassLink = 0x85fac8,`

    `      className = 0x4e5b5a0,`

    `      classSize = 92,`

    `      instanceCount = 1`

    `    }, <No data fields>},`

    `  static metaClass = 0x9ba000,`

    `  static superClass = 0x9ba020`


    We can now examine the internal state of our driver instance and we can see the
    values of its member variables `fVariable1` and `fVariable2`. We can also see
    how many instances of our class exist from the meta class information and determine
    the retain count of the driver.'
