    \ & PD_S_ACQUIRED)\n       {\n              // Abort if the caller has requested\
    \ non-blocking operation\n              if (sleep == false)\n                \
    \     return kIOReturnExclusiveAccess;\n\n              // Sleep until the acquired\
    \ bit becomes clear\n              state = 0;\n              rtn = watchState(&state,\
    \ PD_S_ACQUIRED, refCon);\n              if (rtn != kIOReturnSuccess)\n      \
    \               return rtn;\n       }\n\n       // Set the acquired bit and clear\
