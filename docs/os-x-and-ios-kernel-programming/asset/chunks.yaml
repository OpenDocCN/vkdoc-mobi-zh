- fmt: '### Summary


    - 串口提供了一种设备间低带宽数据传输的简单方式。尽管现代Mac上已找不到RS-232或RS-422串口，但许多USB设备会将其自身呈现为串口，因此对串口驱动程序的支持仍是Mac
    OS X操作系统的一部分。

    - 用户空间应用程序通过`/dev`目录下的设备文件访问串口，这是UNIX环境的标准做法。

    - 串口驱动程序在I/O Kit中通过实现`IOSerialDriverSync`接口的子类来实现。该接口包含用于打开和关闭串口、配置端口以及读取和写入数据的方法。

    - I/O Kit提供了一个名为`IOSerialBSDClient`的类，它将串口驱动程序发布到用户空间应用程序。该类接收来自用户空间应用程序的读写串口请求，并将这些请求传递给内核串口驱动程序。

    - I/O Kit的设计允许使用现代面向对象的I/O Kit设计来实现串口驱动程序，而无需处理串口设备遗留的用户空间接口。


    ## C H A P T E R  12


    ## Audio Drivers


    音频设备是计算机上除存储设备外最常见的外设之一。它们用于从录音笔到MP3播放器、带麦克风的耳机、安全系统，以及DJ和专业录音系统等各种场景。许多视频设备也具有音频功能，并配有专属音频驱动程序，允许你独立使用或与视频功能结合使用设备的音频特性，例如内置麦克风的网络摄像头。麦克风将拥有自己的音频驱动程序，在系统中将麦克风表示为一个可以独立于摄像头使用的音频设备。


    为音频设备编写驱动程序面临一些独特的挑战。音频设备有严格的延迟要求，必须持续提供数据流，以避免在播放或录音时出现中断或杂音。人耳极为敏感，即使是少量样本数据中的微小杂音也能察觉。此外，音频数据不能过度缓冲，否则会导致不可接受的延迟。例如，假设你正在播放嘈杂的音乐，这时接到一个电话。如果从你按下暂停键到音乐实际停止需要五秒钟，你肯定不会满意。同样，如果你在玩开枪的游戏，你期望几乎在扣动扳机的同时听到枪声，而不是几秒钟之后。因此，音频设备必须尽量减少缓冲以缓解这些影响。


    虽然前面的例子特别提到了播放，但在使用输入设备采集音频时，缓冲也必须尽量减少。例如，如果通过输入设备连接了一部电话，你肯定不想在几秒钟后才听到对方的声音。为了保持低延迟，音频缓冲区必须保持很小，因此它还需要以尽可能低的延迟响应硬件，以避免出现音频生产者超过音频消费者，或反之亦然的情况，这会导致可听失真。由于这些限制，再加上音频驱动程序需要响应多个客户端，因此它非常适合作为内核级驱动程序。


    **Core Audio** 是用于描述Mac OS X下所有音频支持的总称。这包括大量用户空间API以及内核KPI，由`IOAudioFamily`接口实现，本章将重点介绍该接口。


    ### 数字音频与音频设备简介


    声波本质上是模拟的，正如我们所知，模拟信号不易被以数字方式存储和处理信息的计算机系统所存储或操作。其他设备，如CD、DVD和蓝光播放器，也使用数字音频工作。


    数字音频信息主要通过一种称为**脉冲编码调制（PCM）**的过程从模拟音频波中导出。PCM的工作原理是以固定间隔对模拟音频波进行采样或称测量。每秒的测量次数称为**采样率**。CD音频的采样率为44.1
    kHz。其他来源，如高清视频，可能使用48 kHz，这意味着每秒对音频波进行48000次测量。每次测量称为一个**样本**。


    该样本是测量时模拟信号幅度的测量值，然后将其量化为数字刻度。该刻度的范围称为**位深度**或**样本深度**。对于CD音频和许多其他应用，位深度为16位，这使得每个样本的可能值在-32768到32767之间。当采集一个样本时，该值会通过四舍五入到最接近的整数值来转换为此刻度。采样率和样本宽度越高，对原始音频波的表示就越精确。


    作为计算机程序员，我们很少需要关心信号从模拟到数字或反之的转换，因为这由音频硬件上的电路（ADC/DAC）处理。然而，程序员需要了解数字PCM样本代表什么，并理解采样率和样本深度的意义。PCM样本通常以通道交错的方式存储在内存中，如图12-1所示。


    ![images](images/1201.jpg)


    **图12-1**. 交错16位有符号PCM样本的缓冲区


    如图12-1所示，每个通道对应的数据不是顺序存储的，而是在缓冲区中交错排列。上面的缓冲区每样本使用16位，这意味着每个样本占用两个字节。一对左/右样本称为一个**样本帧**（或样本组）。如果有两个以上通道，例如八个（如HDMI使用的），一个样本组将由通道1-8组成。大多数数字音频系统期望音频数据采用这种格式，并且假设音频未压缩，这通常是音频在计算机文件中存储的方式。诸如MP3之类的文件格式会压缩音频数据；然而，它们必须将音频解压缩回交错的PCM样本，然后才能由音频硬件播放。44.1
    kHz的音频每秒将提供44100个样本帧。如果样本深度为16位且有两个通道，我们需要176.4 KB（44100 Hz * (16/8 位) * 2 通道
    = 176400 字节）的数据来存储一秒钟的音频。然而，PCM样本不一定总是16位宽。样本深度也可以是8、20、24或32位。此外，样本可以存储为无符号或有符号，甚至浮点格式，这是Core
    Audio偏好的音频格式。表12-1展示了一些常用的PCM格式。


