    \        if (ret == THREAD_INTERRUPTED)\n            return kIOReturnAborted;\n\
    \    }\n\n    return kIOReturnSuccess;\n}\n```\n\n请注意，列表 11-5 中 `watchState()`\
    \ 的实现将确保 `PD_S_ACQUIRED` 或 `PD_S_ACTIVE` 位被监视，如果没有，则会在掩码中增加一个额外状态来监视 `PD_S_ACTIVE`\
    \ 位变为清除状态。这确保了当串口关闭时，所有在调用 `watchState()` 时被阻塞的线程都会被唤醒并返回给调用者。如果没有显式添加串口停用的掩码，被阻塞的线程将永远不会唤醒，从而导致串口驱动程序死锁。\n\
    \n## 串口事件\n\n硬件串口需要配置，以匹配串口连接另一端设备使用的设置。可配置的设置包括参数，例如数据发送的波特率、数据字符中的位数、是否传输校验位以及每个字符结束时发送的停止位数。\n\
    \n这些串口设置由打开串口的用户空间进程决定，并通过诸如 `tcsetattr()` 和 `tcgetattr()` 等函数进行配置。这些函数通过 I/O\
    \ Kit 的 `IOSerialBSDClient` 类进入内核，该类通过其 `executeEvent()` 方法将各个配置选项传递给串口驱动程序。\n\
    \n`executeEvent()` 方法与 `requestEvent()` 方法配对，后者由 `IOSerialBSDClient` 类用于查询串口的当前配置。`executeEvent()`\
    \ 和 `requestEvent()` 方法的原型如下：\n\n```\nIOReturn          executeEvent(UInt32 event,\
    \ UInt32 data, void* refCon);\nIOReturn          requestEvent(UInt32 event, UInt32*\
    \ data, void* refCon);\n```\n\n参数 `event` 是来自 `IOSerialStreamSync.h` 的一个枚举，用于标识正在配置或查询的属性。参数\
    \ `data` 用于通过 `executeEvent()` 传递正在设置的属性的新值，或通过 `requestEvent()` 传递正在查询的属性的当前值。大多数驱动程序通过一个基于\
    \ `event` 参数值的大型 `switch` 语句来实现 `executeEvent()` 和 `requestEvent()` 方法。下面 表 11-1\
    \ 给出了可能的事件类型的描述。\n\n![images](img/t1101.jpg)\n\n![images](img/t1101a.jpg)\n\n\
    ![images](img/t1101b.jpg)\n\n除了 `executeEvent()` 方法，你还会注意到 `IOSerialDriverSync`\
    \ 接口还定义了一个名为 `enqueueEvent()` 的方法，用于设置串口的属性。这两种方法有一个微妙的区别：调用 `executeEvent()`\
    \ 方法会导致串口配置在调用该方法后立即生效，而调用 `enqueueEvent()` 则要等到串口驱动程序发送缓冲区中的所有字符都写入硬件后才会生效。\n\
    \n要实现 `enqueueEvent()` 的正确行为，串口驱动程序需要定义一个由事件队列和每个事件关联的数据组成的发送缓冲区。然后，每次调用 `enqueueEvent()`\
    \ 都会将值对 `{event, data}` 附加到发送队列的末尾。类似地，用于传输的字符数据也需要被视为一个事件，并附加到发送缓冲区的末尾。每当发送缓冲区不为空时，串口驱动程序就会从队列中取出下一个事件，该事件要么是改变串口配置的事件，要么是要通过串口发送的字符。\n\
    \n串口驱动程序并不要求严格遵循 `enqueueEvent()` 的正确实现。如果你查看 `AppleUSBCDCDMM` 驱动程序的源代码，你会看到它通过调用\
    \ `executeEvent()` 来实现 `enqueueEvent()`，这会立即将请求的更改应用于串口配置。\n\n类似地，串口驱动程序的接收缓冲区允许在从串口读取的数据字节之间插入事件。对于接收队列，事件表示从串口读取数据时发生的错误。以下描述了一些可以报告的错误：\n"
- fmt: "# 排版后内容\n\n- `PD_RS232_E_RX_LINE_BREAK` indicates that a break condition was\
    \ detected by the receiver.\n- `PD_E_FRAMING_ERROR` indicates that the character\
    \ data was incorrectly framed. (The stop bit was not in the expected position.)\n\
    - `PD_E_INTEGRITY_ERROR` indicates a parity error was detected.\n- `PD_E_HW_OVERRUN_ERROR`\
    \ and `PD_E_SW_OVERRUN_ERROR` indicate that character data was not pulled from\
    \ the hardware or the software buffers fast enough to prevent the buffer from\
    \ filling and data being lost.\n\nBefore reading any data from the serial port,\
    \ the `IOSerialBSDClient` class will make a call to the serial driver's `nextEvent()`\
    \ method. If the next element in the serial driver's receive queue is an error\
    \ event, `nextEvent()` will return the event type to the caller, and the caller\
    \ will respond by calling the driver's `dequeueEvent()` method. Otherwise, if\
    \ the next element in the serial driver's receive queue is a data byte that has\
    \ been read from the serial port, it should return `PD_E_EOQ`.\n\nAs with the\
    \ transmit side of the serial driver, it is not strictly necessary for a driver\
    \ to fully implement the queuing of events in its receive queue. In fact, the\
    \ implementation provided by the `AppleUSBCDCDMM` driver reports no events on\
    \ its receive queue at all; its implementation of `nextEvent()` and `dequeueEvent()`\
    \ will check that the serial port has been activated and, if so, will always return\
    \ a value of `kIOReturnSuccess`. Note that `kIOReturnSuccess` has a value of 0,\
    \ and therefore, corresponds to the event `PD_E_EOQ`, which also has a value of\
    \ 0.\n\n## Serial Data Transfer\n\nThe remaining methods to be implemented from\
    \ the `IOSerialDriverSync` interface are the data transfer methods. The serial\
    \ driver will be provided with data to be transmitted over the serial port through\
    \ the method `enqueueData()`, and the data that the driver has received from the\
    \ serial port is provided to clients through the `dequeueData()` method.\n\nWhen\
    \ a user space process writes data to a serial port, it is first handled in the\
    \ kernel by the `IOSerialBSDClient` class, which is responsible for passing the\
    \ data on to the serial port driver. The `IOSerialBSDClient` will provide the\
    \ data to the serial driver by calling its `enqueueData()` method, which has the\
    \ following signature:\n\n`IOReturn enqueueData(UInt8 *buffer, UInt32 size, UInt32\
    \ *count, bool sleep, void *refCon);`\n\nThe data bytes to be sent are held in\
    \ the `buffer` parameter, and the number of bytes to be sent is described by the\
    \ `size` parameter. The typical design of a serial driver is to copy the data\
    \ that has been provided into an internal buffer that it has allocated (known\
    \ as the transmit buffer) and then return to the caller immediately. The driver\
    \ will then continue handling the write request by transferring data from its\
    \ transmit buffer to the hardware serial port asynchronously. Before returning\
    \ from the `enqueueData()` method, the driver will return, through the `count`\
    \ parameter, the number of bytes that it accepted; note that this is simply the\
    \ number of bytes that the driver was able to copy to its transmit buffer, not\
    \ the number of bytes that have been written over the hardware serial port. The\
    \ `sleep` parameter allows the caller to request that, if the driver cannot accept\
    \ all of the bytes that it has been provided, the driver should block and not\
    \ return to the caller until all bytes have been copied to the driver's internal\
    \ transmit buffer.\n\nThe current implementation of the `IOSerialBSDClient` will\
    \ never request that the serial driver sleep if it cannot accept all of the data\
    \ bytes that have been provided. Rather, it will make sure that it doesn't provide\
    \ the serial driver with more data than it can accept, which is done by calling\
    \ the driver's `requestEvent()` method with the event `PD_E_TXQ_AVAILABLE`. The\
    \ `IOSerialBSDClient` will watch various states of the driver's transmit buffer\
    \ to determine when the driver is able to accept more data, including the states\
    \ `PD_S_TXQ_LOW_WATER`, `PD_S_TXQ_EMPTY`, and `PD_S_TX_BUSY`.\n\nA sample implementation\
    \ of the `enqueueData()` method is provided in [Listing 11-6](#Chapter11.html#list_11_6).\
    \ Note that this implementation copies the data bytes to a transmit buffer that\
    \ has been allocated by the serial driver, and then checks whether the hardware\
    \ is currently writing data out on the serial port. If not, a hypothetical function\
    \ named `StartHardwareTransmit()` is called which, although implementation specific,\
    \ has the purpose of telling the hardware to begin sending data bytes from the\
    \ driver's transmit buffer out over the serial port.\n\n**Listing 11-6.** A Sample\
    \ Implementation of the `enqueueData()` Method. The Method Is Assumed to Have\
    \ Been Called Through an `IOCommandGate`.\n\n```\nIOReturn           MySerialDriver::enqueueDataGated(UInt8*\
    \ buffer, UInt32 size, UInt32* count,\n                                      \
    \    bool sleep, void* refCon)\n{\n       // Abort if the serial port has not\
    \ been acquired\n       *count = 0;\n       if ((m_currentState & PD_S_ACTIVE)\
    \ == 0)\n              return kIOReturnNotOpen;\n\n       // Copy the provided\
    \ data to the driver's transmit buffer\n       *count = AddToTransmitQueue(buffer,\
    \ size);\n       // Regenerate the status bits for the transmit buffer\n     \
    \  CheckQueues(refCon);\n\n       // If no hardware transmission is in progress,\
    \ begin outputting bytes from the driver's\n       // buffer\n       if ((m_currentState\
    \ & PD_S_TX_BUSY) == 0)\n              StartHardwareTransmit();\n```"
  raw: '*   `PD_RS232_E_RX_LINE_BREAK` indicates that a break condition was detected
    by the receiver.

    *   `PD_E_FRAMING_ERROR` indicates that the character data was incorrectly framed.
    (The stop bit was not in the expected position.)

    *   `PD_E_INTEGRITY_ERROR` indicates a parity error was detected.

    *   `PD_E_HW_OVERRUN_ERROR` and `PD_E_SW_OVERRUN_ERROR` indicate that character
    data was not pulled from the hardware or the software buffers fast enough to prevent
    the buffer from filling and data being lost.


    Before reading any data from the serial port, the `IOSerialBSDClient` class will
    make a call to the serial driver''s `nextEvent()` method. If the next element
    in the serial driver''s receive queue is an error event, `nextEvent()` will return
    the event type to the caller, and the caller will respond by calling the driver''s
    `dequeueEvent()` method. Otherwise, if the next element in the serial driver''s
    receive queue is a data byte that has been read from the serial port, it should
    return `PD_E_EOQ`.


    As with the transmit side of the serial driver, it is not strictly necessary for
    a driver to fully implement the queuing of events in its receive queue. In fact,
    the implementation provided by the `AppleUSBCDCDMM` driver reports no events on
    its receive queue at all; its implementation of `nextEvent()` and `dequeueEvent()`
    will check that the serial port has been activated and, if so, will always return
    a value of `kIOReturnSuccess`. Note that `kIOReturnSuccess` has a value of 0,
    and therefore, corresponds to the event `PD_E_EOQ`, which also has a value of
    0.


    ### Serial Data Transfer


    The remaining methods to be implemented from the `IOSerialDriverSync` interface
    are the data transfer methods. The serial driver will be provided with data to
    be transmitted over the serial port through the method `enqueueData()`, and the
    data that the driver has received from the serial port is provided to clients
    through the `dequeueData()` method.


    When a user space process writes data to a serial port, it is first handled in
    the kernel by the `IOSerialBSDClient` class, which is responsible for passing
    the data on to the serial port driver. The `IOSerialBSDClient` will provide the
    data to the serial driver by calling its `enqueueData()` method, which has the
    following signature:


    `IOReturn  enqueueData(UInt8 *buffer, UInt32 size, UInt32 *count, bool sleep,
    void *refCon);`


    The data bytes to be sent are held in the `buffer` parameter, and the number of
    bytes to be sent is described by the `size` parameter. The typical design of a
    serial driver is to copy the data that has been provided into an internal buffer
    that it has allocated (known as the transmit buffer) and then return to the caller
    immediately. The driver will then continue handling the write request by transferring
    data from its transmit buffer to the hardware serial port asynchronously. Before
    returning from the `enqueueData()` method, the driver will return, through the
    `count` parameter, the number of bytes that it accepted; note that this is simply
    the number of bytes that the driver was able to copy to its transmit buffer, not
    the number of bytes that have been written over the hardware serial port. The
    `sleep` parameter allows the caller to request that, if the driver cannot accept
    all of the bytes that it has been provided, the driver should block and not return
    to the caller until all bytes have been copied to the driver''s internal transmit
    buffer.


    The current implementation of the `IOSerialBSDClient` will never request that
    the serial driver sleep if it cannot accept all of the data bytes that have been
    provided. Rather, it will make sure that it doesn''t provide the serial driver
    with more data than it can accept, which is done by calling the driver''s `requestEvent()`
    method with the event `PD_E_TXQ_AVAILABLE`. The `IOSerialBSDClient` will watch
    various states of the driver''s transmit buffer to determine when the driver is
    able to accept more data, including the states `PD_S_TXQ_LOW_WATER`, `PD_S_TXQ_EMPTY`,
    and `PD_S_TX_BUSY`.


    A sample implementation of the `enqueueData()` method is provided in [Listing
    11-6](#Chapter11.html#list_11_6). Note that this implementation copies the data
    bytes to a transmit buffer that has been allocated by the serial driver, and then
    checks whether the hardware is currently writing data out on the serial port.
    If not, a hypothetical function named `StartHardwareTransmit()` is called which,
    although implementation specific, has the purpose of telling the hardware to begin
    sending data bytes from the driver''s transmit buffer out over the serial port.


    ***Listing 11-6.** A Sample Implementation of the `enqueueData()` Method. The
    Method Is Assumed to Have Been Called Through an `IOCommandGate`.*


    `IOReturn           MySerialDriver::enqueueDataGated(UInt8* buffer, UInt32 size,
    UInt32* count,`

    `                                          bool sleep, void* refCon)`

    `{`

    `       // Abort if the serial port has not been acquired`

    `       *count = 0;`

    `       if ((m_currentState & PD_S_ACTIVE) == 0)`

    `              return kIOReturnNotOpen;`


    `       // Copy the provided data to the driver''s transmit buffer`

    `       *count = AddToTransmitQueue(buffer, size);`

    `       // Regenerate the status bits for the transmit buffer`

    `       CheckQueues(refCon);`


    `       // If no hardware transmission is in progress, begin outputting bytes
    from the driver''s`

    `       // buffer`

    `       if ((m_currentState & PD_S_TX_BUSY) == 0)`

    `              StartHardwareTransmit();`'
  trans: "\n# 排版后内容\n\n- `PD_RS232_E_RX_LINE_BREAK` 表示接收器检测到中断条件。\n- `PD_E_FRAMING_ERROR`\
    \ 表示字符数据的帧格式错误。（停止位不在预期位置。）\n- `PD_E_INTEGRITY_ERROR` 表示检测到奇偶校验错误。\n- `PD_E_HW_OVERRUN_ERROR`\
    \ 和 `PD_E_SW_OVERRUN_ERROR` 表示未能足够快地从硬件或软件缓冲区取出字符数据，导致缓冲区填满并丢失数据。\n\n在从串口读取任何数据之前，`IOSerialBSDClient`\
    \ 类会调用串口驱动程序的 `nextEvent()` 方法。如果串口驱动程序接收队列中的下一个元素是错误事件，`nextEvent()` 会将事件类型返回给调用者，调用者随后会调用驱动程序的\
    \ `dequeueEvent()` 方法来响应。否则，如果串口驱动程序接收队列中的下一个元素是从串口读取的数据字节，则应返回 `PD_E_EOQ`。\n\n\
    与串口驱动程序的发送端类似，驱动程序并非必须在其接收队列中完整实现事件的排队功能。事实上，`AppleUSBCDCDMM` 驱动程序提供的实现在其接收队列中根本不报告任何事件；其\
    \ `nextEvent()` 和 `dequeueEvent()` 的实现会检查串口是否已激活，如果已激活，则始终返回值为 `kIOReturnSuccess`\
    \ 的结果。请注意，`kIOReturnSuccess` 的值为 0，因此，它对应于事件 `PD_E_EOQ`，该事件的值也为 0。\n\n## 串行数据传输\n\
    \n`IOSerialDriverSync` 接口中剩余需要实现的方法是数据传输方法。串口驱动程序将通过 `enqueueData()` 方法获取需通过串口发送的数据，而驱动程序从串口接收到的数据则通过\
    \ `dequeueData()` 方法提供给客户端。\n\n当用户空间进程向串口写入数据时，该数据首先在内核中由 `IOSerialBSDClient`\
    \ 类处理，该类负责将数据传递给串口驱动程序。`IOSerialBSDClient` 通过调用串口驱动程序的 `enqueueData()` 方法来提供数据，其签名如下：\n\
    \n`IOReturn enqueueData(UInt8 *buffer, UInt32 size, UInt32 *count, bool sleep,\
    \ void *refCon);`\n\n待发送的数据字节保存在 `buffer` 参数中，待发送的字节数由 `size` 参数描述。串口驱动程序的典型设计是将提供的数据复制到其分配的内部缓冲区（称为发送缓冲区）中，然后立即返回给调用者。驱动程序随后会通过异步方式，将数据从其发送缓冲区传输到硬件串口，以继续处理写请求。在从\
    \ `enqueueData()` 方法返回之前，驱动程序会通过 `count` 参数返回其接受的字节数；请注意，这只是驱动程序能够复制到其发送缓冲区的字节数，而非已通过硬件串口写入的字节数。`sleep`\
    \ 参数允许调用者请求：如果驱动程序无法接受提供的所有字节，则应阻塞，并且在所有字节被复制到驱动程序内部发送缓冲区之前，不要返回给调用者。\n\n`IOSerialBSDClient`\
    \ 的当前实现绝不会在串口驱动程序无法接受所有提供的数据字节时要求其休眠。相反，它会确保不向串口驱动程序提供超过其接受能力的数据量，这是通过以事件 `PD_E_TXQ_AVAILABLE`\
    \ 调用驱动程序的 `requestEvent()` 方法来实现的。`IOSerialBSDClient` 会监视驱动程序发送缓冲区的各种状态，以确定驱动程序何时能够接受更多数据，这些状态包括\
    \ `PD_S_TXQ_LOW_WATER`、`PD_S_TXQ_EMPTY` 和 `PD_S_TX_BUSY`。\n\n`enqueueData()` 方法的示例实现见列表\
    \ 11-6。请注意，该实现将数据字节复制到由串口驱动程序分配的发送缓冲区，然后检查硬件当前是否正在串口上写入数据。如果否，则会调用一个名为 `StartHardwareTransmit()`\
    \ 的假设函数，该函数虽与具体实现相关，但其目的是告知硬件开始从驱动程序的发送缓冲区通过串口发送数据字节。\n\n**列表 11-6.** `enqueueData()`\
    \ 方法的示例实现。假设该方法是通过 `IOCommandGate` 调用的。\n\n```\nIOReturn           MySerialDriver::enqueueDataGated(UInt8*\
    \ buffer, UInt32 size, UInt32* count,\n                                      \
    \    bool sleep, void* refCon)\n{\n       // 如果串口未被获取，则中止\n       *count = 0;\n\
