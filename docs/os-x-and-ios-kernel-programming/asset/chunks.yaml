  trans: "\n### 为 KEXT 创建符号信息\n\n在 GDB 中调试你自己的 KEXT 之前，需要先生成该 KEXT 的符号信息。由于 KEXT 是动态加载的，我们无法预先知道它在内存中的具体位置。虽然我们的\
    \ KEXT 包含了符号信息，但函数和数据的地址都是相对于 KEXT 二进制文件而言的。一旦 KEXT 被加载，其内部函数的绝对地址将是 `kernel_load_address\
    \ + relative_address`。\n\n幸运的是，内核调试工具包 (Kernel Debug Kit) 提供了一个小脚本，可以帮助我们生成包含内核地址空间内绝对地址的最终符号表。该脚本名为\
    \ `createsymbolfiles`，使用方法如下：\n\n```\n$ /Volumes/KernelDebugKit/createsymbolfiles\
    \ -a i386 -s ./ MyDebugDriver.kext\nMyDebugDriver.kext appears to be loadable\
    \ (not including linkage for on-disk libraries).\n\nEnter the hexadecimal load\
    \ addresses for these extensions\n(press Return to skip symbol generation for\
    \ an extension):\n\ncom.osxkernel.MyDebugDriver: 0x9b9000\n```\n\n加载地址可以从多个地方找到，例如，使用\
    \ `kextstat` 命令，如下所示：\n\n```\n$ kextstat\nIndex Refs Address    Size       Wired\
    \      Name (Version) <Linked Against>\n  126    0 0x9b9000   0x3000     0x2000\
    \     com.osxkernel.MyDebugDriver (1) <5 4 3>\n```\n\n在上面的例子中，这个 KEXT 没有额外的依赖项；然而，在实际情况中，一个\
    \ KEXT 可能依赖于一个或多个其他 KEXT，例如某个 I/O Kit 家族，此时系统也会提示你输入它们的地址。如果你正在调试来自远程系统的崩溃转储，或者直接调试一个崩溃的系统，那么如果你的扩展导致了崩溃，它的加载地址以及所有依赖项的加载地址都可以在崩溃日志中找到。请注意，你的\
    \ KEXT 每次加载时都可能被分配不同的地址，因此你需要每次都重新生成符号信息。\n\n以上步骤足以让我们获得基本的符号信息，但这仅限于函数的符号名称，无法提供源代码行信息。要获得源代码行信息，你可以像图\
    \ 16-2 所示那样配置扩展的调试信息格式。\n\n![images](img/1602.jpg)\n\n**图 16-2.** 使用 Xcode 设置调试信息格式\n\
    \n带有 dSYM 的 DWARF 格式会为你创建一个独立的文件，其中包含一套完整的符号以及将代码位置映射回源代码行所需的信息。在进行调试构建时，这些信息通常会被嵌入到可执行文件中；但对于驱动的发布构建，你可以将这些信息生成到外部文件中。一个好的做法是将这些调试信息归档以备后用。这样，当用户报告崩溃时，调试工作会变得更加容易。在我们的例子中，dSYM\
    \ 文件（实际上是一个包）将被命名为 `MyDebugDriver.kext.dSYM`。在运行 `createsymbolfiles` 脚本之前，应将 dSYM\
    \ 包与 KEXT 放在一起。\n\n### 使用 GDB 调试 KEXT\n\n在接下来的部分中，我们将分析一个由假设的驱动程序 `MyDebugDriver`\
    \ 引起的崩溃。`MyDebugDriver` 的头文件规范如代码清单 16-4 所示。\n\n**代码清单 16-4.** MyDebugDriver 头文件\n\
    \n```\nclass com_osxkernel_MyDebugDriver : public IOService\n{\n    OSDeclareDefaultStructors(com_osxkernel_MyDebugDriver);\n\
    public:\n    virtual bool init(OSDictionary* dict);\n    virtual bool start(IOService*\
    \ provider);\n    virtual void stop(IOService* provider);\n\n    void testFunc1(UInt32\
    \ arg1, UInt32 arg2, UInt32 arg3, UInt32 arg4);\n    void testFunc2(UInt32 arg1,\
    \ UInt32 arg2, UInt32 arg3, UInt32 arg4);\n    void testFunc3(UInt32 arg1, UInt32\
    \ arg2, UInt32 arg3, UInt32 arg4);\n\n    static void  timerFired(OSObject* owner,\
    \ IOTimerEventSource* sender);\nprivate:\n\n    IOTimerEventSource*     fTimer;\n\
    \    int                     fVariable1;\n    int                     fVariable2;\n\
    };\n```\n\n该驱动程序启动了一个定时器，定时器会调用 `testFunc1()`，接着 `testFunc1()` 调用 `testFunc2()`，`testFunc2()`再调用\
    \ `testFunc3()`，而 `testFunc3()` 由于解引用了一个空指针导致内核恐慌。每个函数都接受四个整数参数（这些参数是随机选取的，没有实际意义），并且这些参数从第一个函数到最后一个函数保持不变。传入的参数值分别是\
    \ 65261、48879、0 和 5380。\n\n我们之前已经使用 FireWire 内核转储机制成功地从崩溃系统生成了一个核心转储，并且使用正确的加载地址为我们的驱动程序构建了符号信息。现在，我们准备在\
    \ GDB 中加载它并开始实际工作。要找到驱动程序中的错误，我们需要执行以下步骤：\n\n-   使用正确的加载地址创建一个符号文件（参见上一节）\n- \
    \  启动 GDB 并加载核心转储\n-   从内核添加符号信息\n-   加载内核调试工具包 GDB 宏\n-   将我们的 KEXT 二进制文件 `MyDebugDriver`\
    \ 加载到 GDB 中\n-   为 `MyDebugDriver` 加载符号信息（如果 GDB 无法在与 KEXT 相同的位置找到它们）\n-   告诉\
    \ GDB `MyDebugDriver` 源代码的位置（可选）\n\n以下是针对 `MyDebugDriver` 的完整调试会话：\n\n```\n$ gdb\
    \ -c core-xnu-1504.15.3-0.0.0.0-fb3a74d3\nGNU gdb 6.3.50-20050815 (Apple version\
    \ gdb-1704) (Thu Jun 23 10:48:29 UTC 2011)\n…\nThis GDB was configured as \"x86_64-apple-darwin\"\
    .\n#0  0x002b1e3e in ?? ()\n(gdb) add-symbol-file /Volumes/KernelDebugKit/mach_kernel\n\
    add symbol table from file \"/Volumes/KernelDebugKit/mach_kernel\"? (y or n) y\n\
    Reading symbols from /Volumes/KernelDebugKit/mach_kernel...Reading symbols from\
    \ /Volumes/KernelDebugKit/mach_kernel.dSYM/Contents/Resources/DWARF/mach_kernel...done.\n\
