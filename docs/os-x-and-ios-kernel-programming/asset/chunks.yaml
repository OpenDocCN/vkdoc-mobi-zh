    CPU issues an exception/trap, which will save the previous contents and clear
    the registers for the new thread. When the orginal thread is about to resume execution,
    floating point and/or SSE registers will be restored to the previous state.


    There are two ways of using SSE:


    *   By directly using the CPU instructions through the use of assembly or inline
    assembly.

    *   By using the intrinsic functions provided by GCC, which provides user-friendlier
    C function wrappers around most instructions. For SSE2, these are provided in
    the header file `emmintrin.h`, which is not part of the kernel framework. However,
    you can copy the file and include it in your project. This is possible as the
    functions are all inline and do not depend on any external libraries.


    There are many revisions of the SSE instruction set. The latest major version
    is currently SSE4\. Some older systems may not support SSE4, which became available
    in 2007\. Attempting to execute SSE4 instructions on a CPU that doesn''t support
    it will result in a kernel panic. To prevent this, you need to provide run-time
    detection of the CPU''s capabilities prior to executing the SSE instructions,
    or target an older version such as SSE2, which predates all Intel-based Macs.


    ### Multi-Function Drivers


    USB and PCI devices may be composite devices that include multiple independent
    devices in which each device''s separate driver can handle each function. Other
    devices may consist of one logical device handled by multiple drivers. Let''s
    consider a modern graphics card with an HDMI output port as an example. HDMI is
    able to carry both audio and video, so it would be nice to provide an audio driver
    that allowed the device to be used with Core Audio. The device is a graphics card,
    so the hardware doesn''t have the typical DMA engine of most audio hardware. Instead,
    audio data is sent along with video frames at regular vertical blanking intervals.
    This design means that the audio and video parts are intimately linked and need
    a shared state between them in order to operate. Since there is no clear separation,
    the driver can be structured as shown in [Figure 17-1](#Chapter17.html#fig_17_1).


    ![images](images/1701.jpg)


    ***Figure 17-1.** Multi-function driver*


    The design in [Figure 17-1](#Chapter17.html#fig_17_1) uses a central driver, which
    coordinates the hardware and manages the provider. The central driver is used
    for matching against the hardware provider. The central driver then creates an
    audio driver based on the *IOAudioFamily* and a video/graphics driver based on
    the *IOGraphicsFamily*. There are two ways of managing the relationship of the
    subordinate drivers to the central driver:


    *   The central, audio, and video drivers can be in separate KEXTs. The central
    driver matches against the hardware resource, whereas the audio and video drivers
    will match against the central driver and use it as the provider.

    *   All drivers can be located in the same KEXT. The central driver would then
    need to manage the lifecycle of the subordinated drivers manually.'
  trans: '

    ### 摘要


    - 内核中可能出现一些常见问题，例如死锁和无效内存访问，进而可能导致内核崩溃。

    - 内核崩溃是一种防御机制，用于应对内核无法恢复的异常或错误状况。它基本上会禁用系统，以防止文件系统或其他文件存储遭到破坏。

    - Mac OS X 开箱即提供了一系列有用的调试机制，从简单的追踪和日志记录机制，到对远程内核调试的内置支持。

    - 可以配置 Mac OS X 使用 `kdumpd`，在其崩溃时（或手动触发时）接受来自远程系统的核心转储。核心转储包含活动/固定内存，可以加载到 GDB
    中。

    - 可以通过 FireWire 和以太网从远程系统调试内核。此机制是内置的，但默认未激活。通过设置适当的 NVRAM 参数和标志，可以启用远程调试。

    - Apple 通常为每个发布的 Mac OS X 版本提供一个内核调试工具包 (Kernel Debug Kit)。该工具包包含脚本、内核的调试版本以及
    I/O Kit 框架 KEXT。调试工具包还包含用于简化 GDB 内核调试的宏。这些宏允许你获取有关调用栈的信息并检查内核的关键数据结构。在本地机器上运行的内核也可以使用
    GDB 进行实时调试。

    - 要调试你自己的 KEXT，必须为其生成调试符号。由于 KEXT 在内核中动态加载，我们需要为 KEXT 生成正确的符号地址。内核调试工具包提供了 `createsymbolfiles`
    脚本来帮助完成此操作。

    - 内核崩溃日志包含许多有用的信息，我们可以利用这些信息回溯并找到导致崩溃的位置。

    - `ioclasscount` 工具可追踪 I/O Kit 中类的实例计数，并可用于检测内存泄漏或其他问题。


    ## 第 17 章：高级内核编程


    本章涵盖了更高级的内核程序员感兴趣的各种主题。我们将讨论如何在内核中使用流式 SIMD 扩展 (SSE) 和浮点运算。(SIMD 是单输入多数据 (Single
    Input Multiple Data) 的缩写。) 我们还将研究处理多函数设备驱动程序的策略，并讨论 I/O Kit 框架的实现。我们将介绍内核控制 KPI，它可以用于与不使用
    I/O Kit 的 KEXT（例如网络内核扩展 (NKE)）进行用户空间通信。我们还将展示如何在内核中操作和管理进程，例如获取进程的进程标识符 (PID)
    和向进程发送信号。某些驱动程序可能需要从文件系统加载额外的资源，例如固件映像。本章讨论了如何使用 `OSKextRequestResource()` 函数加载这些资源。本章最后讨论了驱动程序如何使用通知向用户空间守护进程发送消息。


    ### 内核中的 SSE 和浮点运算


    流式 SIMD 扩展 (SSE) 是 MMX 的后继者，是一种特殊的指令集，在大多数现代 Intel 和 AMD 处理器上都能找到。它允许对值数组（向量）而不是单个值（标量）执行常见的指令，例如加法、乘法和移位。这可以极大地加速许多计算任务，尤其是在数字信号处理、音频、图形和视频等领域。通常情况下，内核并不是进行大量计算的好地方，但在某些领域这是不可避免的——例如，在音频驱动程序中，需要转换来自多个用户空间应用程序的音频采样并将其混合到单个输出缓冲区。RAID-5
    和 RAID-6 算法的软件实现也是可能需要在内核中进行计算并通过 SSE 进行优化的例子。


    传统上，在内核环境中使用 SSE 和浮点运算并非易事。某些操作系统（例如 Linux）要求你在使用前显式保存浮点/SSE 状态，并在使用后恢复；否则，线程的浮点状态可能会被覆盖。然而，在
    Mac OS X 中，内核可以自由使用浮点运算和 SSE，而无需手动保存和恢复寄存器状态。通常，当一个线程用完它的时间片或因其他线程被抢占而停止执行时，该线程停止执行时的
    CPU 寄存器状态会被保存到内存中，并在线程继续执行时恢复。为了优化性能，内核只存储通用寄存器，而不存储浮点和 SSE 寄存器，因为它们使用频率较低。实际上，许多程序根本不会使用浮点或
    SSE。当另一个线程尝试使用这些寄存器时，CPU 会引发异常/陷阱，这将保存先前的内容并清除寄存器以供新线程使用。当原始线程即将恢复执行时，浮点和/或 SSE
    寄存器将恢复到之前的状态。


    有两种使用 SSE 的方法：


    - 通过使用汇编或内联汇编直接使用 CPU 指令。

    - 通过使用 GCC 提供的内联函数 (intrinsic functions)，这些函数为大多数指令提供了更友好的 C 函数包装。对于 SSE2，这些函数在头文件
    `emmintrin.h` 中提供，该头文件不属于内核框架。但是，你可以复制该文件并将其包含在你的项目中。这是可行的，因为这些函数都是内联的，不依赖于任何外部库。


    SSE 指令集有许多修订版。目前最新的主要版本是 SSE4。一些较旧的系统可能不支持 2007 年推出的 SSE4。尝试在不支持 SSE4 的 CPU 上执行
    SSE4 指令将导致内核崩溃。为防止这种情况，你需要在执行 SSE 指令之前提供对 CPU 能力的运行时检测，或者针对更旧的版本（例如 SSE2，它早于所有基于
    Intel 的 Mac）。


    ### 多函数驱动程序


    USB 和 PCI 设备可能是包含多个独立设备的复合设备，每个设备的功能可以由各自的驱动程序处理。其他设备可能由多个驱动程序处理的单个逻辑设备组成。让我们以带有
    HDMI 输出端口的现代显卡为例。HDMI 能够同时传输音频和视频，因此提供一个允许该设备与 Core Audio 一起使用的音频驱动程序会很方便。该设备是显卡，因此其硬件不具备大多数音频硬件典型的
    DMA 引擎。相反，音频数据在规则的垂直消隐间隔期间与视频帧一起发送。这种设计意味着音频和视频部分紧密关联，并且需要它们之间的共享状态才能运行。由于没有明确的分离，驱动程序可以如图
    17-1 所示进行构建。


    ![图片](img/1701.jpg)


    **图 17-1.** 多函数驱动程序


    图 17-1 中的设计使用了一个中央驱动程序，它协调硬件并管理提供者。中央驱动程序用于匹配硬件提供者。然后，中央驱动程序会创建一个基于 `IOAudioFamily`
    的音频驱动程序和一个基于 `IOGraphicsFamily` 的视频/图形驱动程序。管理从属驱动程序与中央驱动程序的关系有两种方法：


    - 中央驱动程序、音频驱动程序和视频驱动程序可以位于不同的 KEXT 中。中央驱动程序匹配硬件资源，而音频和视频驱动程序将匹配中央驱动程序并将其用作提供者。

    - 所有驱动程序可以位于同一个 KEXT 中。然后，中央驱动程序需要手动管理从属驱动程序的生命周期。

