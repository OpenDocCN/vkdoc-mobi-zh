- fmt: "1.  我们获得一个指向提供者类的指针，它是一个代表整个磁盘的`IOMedia`对象。所有磁盘读取操作都通过此对象执行，包括从磁盘读取分区表。\n\
    2.  在检查分区表之前，我们先检查磁盘介质的任何属性。如果磁盘介质未格式化，我们中止扫描。这也是验证必要条件（例如分区方案可能要求的最小磁盘块大小）的合适位置。\n\
    3.  从磁盘读取的所有数据都将写入一个`IOMemoryDescriptor`作为目标。因此，我们分配一个`IOBufferMemoryDescriptor`来保存此方法将从磁盘读取的数据内容。由于此内存描述符将用于从磁盘读取数据的操作，其方向必须设置为`kIODirectionIn`。\n\
    4.  我们分配一个`OSSet`容器来保存代表磁盘上找到的每个分区的`IOMedia`对象集合。尽管`OSSet`集合的初始容量为8个对象，但若插入超过8个`IOMedia`对象，`OSSet`将自动扩展。\n\
    5.  存储驱动程序堆栈（分区驱动程序是其一部分）已打开以进行读取访问。由于分区驱动程序将从磁盘读取分区表，但不修改磁盘内容，它只需要读取访问权限。\n6.\
    \  从磁盘读取第一个磁盘扇区。这通常是分区表头的位置。此示例中使用的假设分区方案将其头部存储在第一个磁盘扇区中。`read()`方法的`buffer`参数同时指定了读取数据的目标和要读取的字节数。\n\
    7.  根据从磁盘读取的数据，分区驱动程序确定磁盘是否包含其支持的分区方案。此代码将特定于分区方案；我们的示例驱动程序使用的假设分区方案通过写入磁盘第一个块的字符串常量来标识。因此，驱动程序使用`strcmp()`函数来确定此字符串是否存在，如果找不到，则假定磁盘上存在其他分区方案并返回失败。\n\
    8.  代码遍历从磁盘读取的分区表中的每个条目。此代码将特定于分区方案；此示例中使用的假设分区方案将整个分区表存储在初始磁盘扇区中。\n9.  验证分区条目。这可能涉及检查分区条目的起始块和长度是否不超过磁盘的容量等。\n\
    10. 实例化一个新的`IOMedia`对象来表示该分区条目。\n11. 如果成功扫描了分区表，则关闭存储驱动程序堆栈（以平衡之前对`open()`的调用），并将`IOMedia`对象集返回给调用者。\n\
    12. 如果发生错误，代码将释放任何已部分分配的资源。\n\n作为第10步的一部分调用的`instantiateMediaObject()`方法的实现见[列表\
    \ 14-11](#Chapter14.html#list_14_11)。这是一个由我们的分区方案驱动程序定义的自定义方法。\n\n***列表 14-11.**\
    \ 实例化代表单个磁盘分区的`IOMedia`对象的方法*\n\n```\nIOMedia* com_osxkernel_driver_PartitionScheme::instantiateMediaObject\n\
    \                                (SamplePartitionEntry* sampleEntry, int index)\n\
    {\n        IOMedia*        media           = getProvider();\n        UInt64  \
    \        mediaBlockSize  = media->getPreferredBlockSize();\n        IOMedia* \
    \       newMedia;\n\n1       newMedia = new IOMedia;\n        if ( newMedia )\n\
    \        {\n                UInt64          partitionBase, partitionSize;\n\n\
    2               partitionBase = OSSwapLittleToHostInt64(sampleEntry->blockStart)\
    \ *\n                                      mediaBlockSize;\n                partitionSize\
    \ = OSSwapLittleToHostInt64(sampleEntry->blockCount) *\n                     \
    \                 mediaBlockSize;\n\n3               if ( newMedia->init(partitionBase,\
    \ partitionSize, mediaBlockSize,\n                     media->getAttributes(),\
    \ false, media->isWritable()))\n                {\n4                       //\
    \ Set a name for this partition.\n                        newMedia->setName(sampleEntry->name);\n\
    \n                        // Set a location value (the partition number) for this\
    \ partition.\n                        char location[12];\n                   \
    \     snprintf(location, sizeof(location), \"%d\", index);\n                 \
    \       newMedia->setLocation(location);\n\n                        // Set the\
    \ \"Partition ID\" key for this partition.\n                        newMedia->setProperty(kIOMediaPartitionIDKey,\
    \ index, 32);\n                }\n                else\n                {\n5 \
    \                      newMedia->release();\n                        newMedia\
    \ = NULL;\n                }\n        }\n\n6       return newMedia;\n}\n```\n\n\
    对应[列表 14-11](#Chapter14.html#list_14_11)中的编号行，以下是列表中执行步骤的概述：\n\n1.  使用 C++ “`new`”运算符分配一个`IOMedia`对象。\n\
    2.  从分区表条目中读取分区的起始磁盘块号和分区大小。分区方案具有标准的字节序，可能与驱动程序运行的主机的本机字节顺序不同，因此使用诸如`OSSwapLittleToHostInt64()`之类的字节序宏来确保正确读取数据非常重要。\n\
    3.  初始化已分配的`IOMedia`对象。此处提供了`IOMedia::init()`方法的参数：\n\n```\n      virtual bool\
    \ init(UInt64                base,\n                        UInt64           \
    \       size,\n                        UInt64                  preferredBlockSize,\n\
    \                        IOMediaAttributeMask    attributes,\n               \
    \         bool                    isWhole,\n                        bool     \
    \               isWritable,\n                        const char*             contentHint\
    \ = 0,\n                        OSDictionary*           properties  = 0);\n```\n\
    \n参数`base`和`size`定义了分区在磁盘上的位置，以字节为单位。另一个重要参数是布尔参数`isWhole`，它被设置为`false`以表明此`IOMedia`对象代表一个分区，而不是整个磁盘。参数`contentHint`描述了分区的内容，例如卷使用的文件系统。关于`contentHint`属性的描述将在下一节中说明。\n\
    \n4.  分区的各种属性在分区的`IOMedia`对象上设置。这些包括分区名称，以及位置和分区ID，两者都源自于该分区在分区表中的索引。\n5.  如果`IOMedia`对象未能成功初始化，则释放它。\n\
    6.  将初始化后的`IOMedia`对象返回给调用者，如果对象未能成功初始化则返回`NULL`。\n\n最后，当分区方案的驱动程序被卸载时，它必须从其驱动程序堆栈中移除其`IOMedia`对象并释放它们。分区驱动程序可能因磁盘被弹出或磁盘被重新格式化而被卸载，在后一种情况下，可能已将新的分区表写入磁盘，甚至可能使用了不同的分区方案。"
  raw: "1.  We obtain a pointer to our provider class, which is an `IOMedia` object\
    \ that represents the entire disk. All disk reads are performed through this object,\
    \ which includes reading the partition table off the disk.\n2.  We check any properties\
    \ of the disk's media before checking for a partition table. If the disk's media\
    \ is not formatted, we abort the scan. This is also a suitable place to verify\
    \ requirements, such as a minimum disk block size that may be required by the\
    \ partition scheme.\n3.  All data that is read from the disk is written into an\
    \ `IOMemoryDescriptor` as the destination. We therefore allocate an `IOBufferMemoryDescriptor`\
    \ to hold the contents of the data that this method will read from the disk. Since\
    \ this memory descriptor will be used in an operation that reads data from the\
    \ disk, its direction must be set to `kIODirectionIn`.\n4.  We allocate an `OSSet`\
    \ container to hold the collection of `IOMedia` objects that represent each partition\
    \ that is found on the disk. Although the initial capacity of the `OSSet` collection\
    \ is 8 objects, the `OSSet` will automatically expand if more than 8 `IOMedia`\
    \ objects are inserted.\n5.  The storage driver stack (of which the partition\
    \ driver is a part of) is opened for read access. Since the partition driver will\
    \ read the partition table from the disk, but not modify the disk contents, it\
    \ only requires read access.\n6.  The first disk sector is read from the disk.\
    \ This is typically the location of the partition table's header. The hypothetical\
    \ partition scheme used in this sample stores its header in the first disk sector.\
    \ The buffer parameter to the `read()` method specifies both the destination for\
    \ the data that is read, and the number of bytes to read.\n7.  Based on the data\
    \ read from the disk, the partition driver determines whether the disk contains\
    \ a partition scheme that it supports. This code will be specific to the partition\
    \ scheme; the hypothetical partition scheme used by our sample driver is identified\
    \ through a string constant that is written to the first block on the disk. As\
    \ such, the driver uses the `strcmp()` function to determine whether this string\
    \ exists, and if it cannot be found, it assumes that another partition scheme\
    \ exists on the disk and returns unsuccessfully.\n8.  The code iterates over each\
    \ entry in the partition table that was read from the disk. This code will be\
    \ specific to the partition scheme; the hypothetical partition scheme used in\
    \ this sample stores the entire partition table in the initial disk sector.\n\
    9.  The partition entry is verified. This may involve such checks as making sure\
    \ that the starting block and length of the partition entry do not exceed the\
    \ capacity of the disk.\n10.  A new `IOMedia` object is instantiated to represent\
    \ the partition entry.\n11.  If the partition table was successfully scanned,\
    \ the storage driver stack is closed (to balance the call to `open()` that was\
    \ made earlier), and the set of `IOMedia` objects is returned to the caller.\n\
    12.  If an error occurred, the code releases any resources that were partially\
    \ allocated.\n\nThe implementation of the `instantiateMediaObject()` method that\
    \ is called as a part of Step 10 is provided in [Listing 14-11](#Chapter14.html#list_14_11).\
    \ This is a custom method that is defined by our partition scheme driver.\n\n\
    ***Listing 14-11.** A Method to Instantiate `IOMedia` Objects That Represent an\
    \ Individual Disk Partition*\n\n`IOMedia* com_osxkernel_driver_PartitionScheme::instantiateMediaObject`\n\
    `                                (SamplePartitionEntry* sampleEntry, int index)`\n\
    `{`\n`        IOMedia*        media           = getProvider();`\n`        UInt64          mediaBlockSize  =\
    \ media->getPreferredBlockSize();`\n`        IOMedia*        newMedia;`\n\n`1       newMedia\
    \ = new IOMedia;`\n`        if ( newMedia )`\n`        {`\n`                UInt64          partitionBase,\
    \ partitionSize;`\n\n`2               partitionBase = OSSwapLittleToHostInt64(sampleEntry->blockStart)\
    \ *`\n`                                      mediaBlockSize;`\n`                partitionSize\
    \ = OSSwapLittleToHostInt64(sampleEntry->blockCount) *`\n`                                      mediaBlockSize;`\n\
    \n`3               if ( newMedia->init(partitionBase, partitionSize, mediaBlockSize,`\n\
    `                     media->getAttributes(), false, media->isWritable()))`\n\
    `                {`\n`4                       // Set a name for this partition.`\n\
    `                        newMedia->setName(sampleEntry->name);`\n\n`                        //\
    \ Set a location value (the partition number) for this partition.`\n`                        char\
    \ location[12];`\n`                        snprintf(location, sizeof(location),\
    \ \"%d\", index);`\n`                        newMedia->setLocation(location);`\n\
    \n`                        // Set the \"Partition ID\" key for this partition.`\n\
    `                        newMedia->setProperty(kIOMediaPartitionIDKey, index,\
    \ 32);`\n`                }`\n`                else`\n`                {`\n`5                       newMedia->release();`\n\
    `                        newMedia = NULL;`\n`                }`\n`        }`\n\
    \n`6       return newMedia;`\n`}`\n\nCorresponding to the numbered lines in [Listing\
    \ 14-11](#Chapter14.html#list_14_11), the following is an overview of the steps\
    \ performed in the listing:\n\n1.  An `IOMedia` object is allocated using the\
    \ C++ “`new`” operator.\n2.  The initial disk block number of the partition and\
    \ the size of the partition are read from the partition table entry. A partition\
    \ scheme will have a standard endianness that may differ from the native byte\
    \ order of the host on which the driver is running, so it's important to use byte\
    \ order macros such as `OSSwapLittleToHostInt64()` to make sure that the data\
    \ is read correctly.\n3.  The allocated `IOMedia` object is initialized. The parameters\
    \ of the `IOMedia::init()` method are provided here:\n\n`      virtual bool init(UInt64                base,`\n\
    \    `                      UInt64                  size,`\n    `                      UInt64                  preferredBlockSize,`\n\
    \    `                      IOMediaAttributeMask    attributes,`\n    `                      bool                    isWhole,`\n\
    \    `                      bool                    isWritable,`\n    `                      const\
    \ char*             contentHint = 0,`\n    `                      OSDictionary*           properties  =\
    \ 0);`\n\nThe parameters `base` and `size` define the location of the partition\
    \ on the disk, specified in bytes. Another important parameter is the Boolean\
    \ parameter `isWhole`, which is set false to indicate that this `IOMedia` object\
    \ represents a partition, and not the entire disk. The parameter `contentHint`\
    \ describes the content of the partition, such as the file system that the volume\
    \ uses. A description of the `contentHint` property is described in the following\
    \ section.\n\n4.  Various properties of the partition are set on the partition's\
    \ `IOMedia` object. These include the partition name, and the location and partition\
    \ IDs, both of which are derived from the index of this partition in the partition\
    \ table.\n5.  If the `IOMedia` object could not be successfully initialized, it\
    \ is released.\n6.  The initialized `IOMedia` object is returned to the caller\
    \ or `NULL` if the object could not be successfully initialized.\n\nFinally, when\
    \ the driver for the partition scheme is unloaded, it must remove its `IOMedia`\
    \ objects from the driver stack and release them. A partition driver may be unloaded\
    \ because the disk has been ejected, or because the disk has been reformatted,\
    \ in which case a new partition table may have been written to the disk, and potentially\
    \ even a different partition scheme."
  trans: "\n1.  我们获得一个指向提供者类的指针，它是一个代表整个磁盘的`IOMedia`对象。所有磁盘读取操作都通过此对象执行，包括从磁盘读取分区表。\n\
    2.  在检查分区表之前，我们先检查磁盘介质的任何属性。如果磁盘介质未格式化，我们中止扫描。这也是验证必要条件（例如分区方案可能要求的最小磁盘块大小）的合适位置。\n\
    3.  从磁盘读取的所有数据都将写入一个`IOMemoryDescriptor`作为目标。因此，我们分配一个`IOBufferMemoryDescriptor`来保存此方法将从磁盘读取的数据内容。由于此内存描述符将用于从磁盘读取数据的操作，其方向必须设置为`kIODirectionIn`。\n\
    4.  我们分配一个`OSSet`容器来保存代表磁盘上找到的每个分区的`IOMedia`对象集合。尽管`OSSet`集合的初始容量为 8 个对象，但若插入超过\
    \ 8 个`IOMedia`对象，`OSSet`将自动扩展。\n5.  存储驱动程序堆栈（分区驱动程序是其一部分）已打开以进行读取访问。由于分区驱动程序将从磁盘读取分区表，但不修改磁盘内容，它只需要读取访问权限。\n\
    6.  从磁盘读取第一个磁盘扇区。这通常是分区表头的位置。此示例中使用的假设分区方案将其头部存储在第一个磁盘扇区中。`read()`方法的`buffer`参数同时指定了读取数据的目标和要读取的字节数。\n\
    7.  根据从磁盘读取的数据，分区驱动程序确定磁盘是否包含其支持的分区方案。此代码将特定于分区方案；我们的示例驱动程序使用的假设分区方案通过写入磁盘第一个块的字符串常量来标识。因此，驱动程序使用`strcmp()`函数来确定此字符串是否存在，如果找不到，则假定磁盘上存在其他分区方案并返回失败。\n\
    8.  代码遍历从磁盘读取的分区表中的每个条目。此代码将特定于分区方案；此示例中使用的假设分区方案将整个分区表存储在初始磁盘扇区中。\n9.  验证分区条目。这可能涉及检查分区条目的起始块和长度是否不超过磁盘的容量等。\n\
    10. 实例化一个新的`IOMedia`对象来表示该分区条目。\n11. 如果成功扫描了分区表，则关闭存储驱动程序堆栈（以平衡之前对`open()`的调用），并将`IOMedia`对象集返回给调用者。\n\
    12. 如果发生错误，代码将释放任何已部分分配的资源。\n\n作为第 10 步的一部分调用的`instantiateMediaObject()`方法的实现见列表\
    \ 14-11。这是一个由我们的分区方案驱动程序定义的自定义方法。\n\n***列表 14-11.** 实例化代表单个磁盘分区的`IOMedia`对象的方法*\n\
    \n```\nIOMedia* com_osxkernel_driver_PartitionScheme::instantiateMediaObject\n\
    \                                (SamplePartitionEntry* sampleEntry, int index)\n\
    {\n        IOMedia*        media           = getProvider();\n        UInt64  \
    \        mediaBlockSize  = media->getPreferredBlockSize();\n        IOMedia* \
    \       newMedia;\n\n1       newMedia = new IOMedia;\n        if ( newMedia )\n\
    \        {\n                UInt64          partitionBase, partitionSize;\n\n\
    2               partitionBase = OSSwapLittleToHostInt64(sampleEntry->blockStart)\
    \ *\n                                      mediaBlockSize;\n                partitionSize\
    \ = OSSwapLittleToHostInt64(sampleEntry->blockCount) *\n                     \
    \                 mediaBlockSize;\n\n3               if ( newMedia->init(partitionBase,\
    \ partitionSize, mediaBlockSize,\n                     media->getAttributes(),\
    \ false, media->isWritable()))\n                {\n4                       //\
    \ 为此分区设置一个名称。\n                        newMedia->setName(sampleEntry->name);\n\
    \n                        // 为此分区设置一个位置值（分区编号）。\n                        char\
    \ location[12];\n                        snprintf(location, sizeof(location),\
    \ \"%d\", index);\n                        newMedia->setLocation(location);\n\n\
    \                        // 为此分区设置“分区 ID”键。\n                        newMedia->setProperty(kIOMediaPartitionIDKey,\
    \ index, 32);\n                }\n                else\n                {\n5 \
    \                      newMedia->release();\n                        newMedia\
    \ = NULL;\n                }\n        }\n\n6       return newMedia;\n}\n```\n\n\
    对应列表 14-11 中的编号行，以下是列表中执行步骤的概述：\n\n1.  使用 C++ “`new`”运算符分配一个`IOMedia`对象。\n2. \
    \ 从分区表条目中读取分区的起始磁盘块号和分区大小。分区方案具有标准的字节序，可能与驱动程序运行的主机的本机字节顺序不同，因此使用诸如`OSSwapLittleToHostInt64()`之类的字节序宏来确保正确读取数据非常重要。\n\
    3.  初始化已分配的`IOMedia`对象。此处提供了`IOMedia::init()`方法的参数：\n\n```\n      virtual bool\
    \ init(UInt64                base,\n                        UInt64           \
    \       size,\n                        UInt64                  preferredBlockSize,\n\
    \                        IOMediaAttributeMask    attributes,\n               \
    \         bool                    isWhole,\n                        bool     \
    \               isWritable,\n                        const char*             contentHint\
    \ = 0,\n                        OSDictionary*           properties  = 0);\n```\n\
    \n参数`base`和`size`定义了分区在磁盘上的位置，以字节为单位。另一个重要参数是布尔参数`isWhole`，它被设置为`false`以表明此`IOMedia`对象代表一个分区，而不是整个磁盘。参数`contentHint`描述了分区的内容，例如卷使用的文件系统。关于`contentHint`属性的描述将在下一节中说明。\n\
    \n4.  分区的各种属性在分区的`IOMedia`对象上设置。这些包括分区名称，以及位置和分区 ID，两者都源自于该分区在分区表中的索引。\n5.  如果`IOMedia`对象未能成功初始化，则释放它。\n\
    6.  将初始化后的`IOMedia`对象返回给调用者，如果对象未能成功初始化则返回`NULL`。\n\n最后，当分区方案的驱动程序被卸载时，它必须从其驱动程序堆栈中移除其`IOMedia`对象并释放它们。分区驱动程序可能因磁盘被弹出或磁盘被重新格式化而被卸载，在后一种情况下，可能已将新的分区表写入磁盘，甚至可能使用了不同的分区方案。\n"
- fmt: "# 排版后的内容\n\nAn example of the implementation of the `stop()` and `free()`\
    \ methods for a partition scheme driver is shown in [Listing 14-12](#Chapter14.html#list_14_12).\
    \ The `stop()` method removes each `IOMedia` object from the device plane of the\
    \ I/O Registry, undoing the call to `attachMediaObjectToDeviceTree()` that the\
    \ partition driver performed in its `start()` method. Before the partition driver\
    \ is unloaded, its `free()` method is called, which releases the `OSSet` that\
    \ holds the collection of `IOMedia` objects for each partition entry.\n\n**Listing\
    \ 14-12.** An Implementation of the `stop()` and `free()` Methods for a Partition\
    \ Scheme Driver\n\n```\nvoid com_osxkernel_driver_PartitionScheme::stop(IOService*\
    \ provider)\n{\n        IOMedia*                partition;\n        OSIterator*\
    \             partitionIterator;\n\n        // Detach the media objects we previously\
    \ attached to the device tree.\n        partitionIterator = OSCollectionIterator::withCollection(m_partitions);\n\
    \        if (partitionIterator)\n        {\n                while ((partition\
    \ = (IOMedia*)partitionIterator->getNextObject()))\n                {\n      \
    \                  detachMediaObjectFromDeviceTree(partition);\n             \
    \   }\n\n                partitionIterator->release();\n        }\n\n        super::stop(provider);\n\
    }\n\nvoid com_osxkernel_driver_PartitionScheme::free (void)\n{\n        if (m_partitions\
    \ != NULL)\n                m_partitions->release();\n\n        super::free();\n\
    }\n```\n\n## The Media Content Hint Property\n\nAs we saw in [Listing 14-11](#Chapter14.html#list_14_11),\
    \ the initialization method of the `IOMedia` class takes a parameter named `contentHint`.\
    \ Although this parameter is not interpreted by the `IOMedia` object, it plays\
    \ a very important role in the construction of the driver storage stack. The `contentHint`\
    \ parameter is a string value that describes the content that is contained by\
    \ the `IOMedia` object on the disk. For an `IOMedia` object that represents an\
    \ entire disk, the content hint may identify the partition scheme that the disk\
    \ contains. For an `IOMedia` object that represents a single partition, the content\
    \ hint may identify the type of file system that the volume uses. The content\
    \ hint can also be used for a custom purpose; for example, a driver that provides\
    \ disk encryption could use the content hint to describe the encryption scheme\
    \ that has been used on the disk.\n\nThe content hint is not used to describe\
    \ the content to the user, but rather to provide information that can be used\
    \ by other drivers on the system. The `contentHint` parameter that is passed to\
    \ the initialization method of the `IOMedia` class is set as an I/O Registry property\
    \ on the `IOMedia` object. This makes the value of content hint accessible to\
    \ other drivers in the storage stack, but more importantly, it provides a property\
    \ that can be specified and matched against another driver's matching dictionary.\n\
    \nWhen we created our partition scheme driver, we specified an `IOPropertyMatch`\
    \ item (see [Listing 14-8](#Chapter14.html#list_14_8)), which limited the driver\
    \ to matching against specific `IOMedia` objects. In the case of the partition\
    \ scheme driver, we matched against only `IOMedia` objects that represented the\
    \ entire disk. This was done by informing the I/O Kit that the partition driver\
    \ should only match against an `IOMedia` object that contained a property named\
    \ `\"Whole\"` with the value `true`. Similarly, a driver can add an `IOPropertyMatch`\
    \ item to its matching dictionary that contains the key `\"Content Hint\"`, and\
    \ specify a value that contains the particular content type that the driver is\
    \ interested in. This could be used, for example, to prevent a disk encryption\
    \ driver from loading against `IOMedia` volumes that are not encrypted.\n\nAnother\
    \ important use of the content hint property is to identify the correct file system\
    \ driver to load for an `IOMedia` volume. Mac OS X will load a file system driver\
    \ only if the content hint value of the `IOMedia` object identifies a supported\
    \ file system.\n\nSince the content hint value needs to be specified when an `IOMedia`\
    \ object is initialized, any driver that instantiates an `IOMedia` object needs\
    \ to know the content of the disk or partition that is represented by that object.\
    \ For a partition scheme driver, the content hint will come from the partition\
    \ table that is stored on the disk. For example, the Apple Partition Map contains\
    \ a string value for each partition entry that is used as the content hint value\
    \ directly. The GUID partition table contains a 128-bit GUID for each partition\
    \ that identifies the file system and content of that partition. This GUID is\
    \ converted to a string representation, which is then used as the content hint.\
    \ This means that there may be multiple content hint values that identify a particular\
    \ file system, so a file system driver must match against each possible value\
    \ of the `IOMedia`'s content hint that could identify its file system."
  raw: 'An example of the implementation of the `stop()` and `free()` methods for
    a partition scheme driver is shown in [Listing 14-12](#Chapter14.html#list_14_12).
    The `stop()` method removes each `IOMedia` object from the device plane of the
    I/O Registry, undoing the call to `attachMediaObjectToDeviceTree()` that the partition
    driver performed in its `start()` method. Before the partition driver is unloaded,
    its `free()` method is called, which releases the `OSSet` that holds the collection
    of `IOMedia` objects for each partition entry.


    ***Listing 14-12.** An Implementation of the `stop()` and `free()` Methods for
    a Partition Scheme Driver*


    `void com_osxkernel_driver_PartitionScheme::stop(IOService* provider)`

    `{`

    `        IOMedia*                partition;`

    `        OSIterator*             partitionIterator;`


    `        // Detach the media objects we previously attached to the device tree.`

    `        partitionIterator = OSCollectionIterator::withCollection(m_partitions);`

    `        if (partitionIterator)`

    `        {`

    `                while ((partition = (IOMedia*)partitionIterator->getNextObject()))`

    `                {`

    `                        detachMediaObjectFromDeviceTree(partition);`

    `                }`


    `                partitionIterator->release();`

    `        }`


    `        super::stop(provider);`

    `}`


    `void com_osxkernel_driver_PartitionScheme::free (void)`

    `{`

    `        if (m_partitions != NULL)`

    `                m_partitions->release();`


    `        super::free();`

    `}`


    #### The Media Content Hint Property


    As we saw in [Listing 14-11](#Chapter14.html#list_14_11), the initialization method
    of the `IOMedia` class takes a parameter named `contentHint`. Although this parameter
    is not interpreted by the `IOMedia` object, it plays a very important role in
    the construction of the driver storage stack. The `contentHint` parameter is a
    string value that describes the content that is contained by the `IOMedia` object
    on the disk. For an `IOMedia` object that represents an entire disk, the content
    hint may identify the partition scheme that the disk contains. For an `IOMedia`
    object that represents a single partition, the content hint may identify the type
    of file system that the volume uses. The content hint can also be used for a custom
    purpose; for example, a driver that provides disk encryption could use the content
    hint to describe the encryption scheme that has been used on the disk.


    The content hint is not used to describe the content to the user, but rather to
    provide information that can be used by other drivers on the system. The `contentHint`
    parameter that is passed to the initialization method of the `IOMedia` class is
    set as an I/O Registry property on the `IOMedia` object. This makes the value
    of content hint accessible to other drivers in the storage stack, but more importantly,
    it provides a property that can be specified and matched against another driver''s
    matching dictionary.


    When we created our partition scheme driver, we specified an `IOPropertyMatch`
    item (see [Listing 14-8](#Chapter14.html#list_14_8)), which limited the driver
    to matching against specific `IOMedia` objects. In the case of the partition scheme
    driver, we matched against only `IOMedia` objects that represented the entire
    disk. This was done by informing the I/O Kit that the partition driver should
    only match against an `IOMedia` object that contained a property named “`Whole`”
    with the value `true`. Similarly, a driver can add an `IOPropertyMatch` item to
    its matching dictionary that contains the key “`Content Hint`”, and specify a
    value that contains the particular content type that the driver is interested
    in. This could be used, for example, to prevent a disk encryption driver from
    loading against `IOMedia` volumes that are not encrypted.


    Another important use of the content hint property is to identify the correct
    file system driver to load for an `IOMedia` volume. Mac OS X will load a file
    system driver only if the content hint value of the `IOMedia` object identifies
    a supported file system.


    Since the content hint value needs to be specified when an `IOMedia` object is
    initialized, any driver that instantiates an `IOMedia` object needs to know the
    content of the disk or partition that is represented by that object. For a partition
    scheme driver, the content hint will come from the partition table that is stored
    on the disk. For example, the Apple Partition Map contains a string value for
    each partition entry that is used as the content hint value directly. The GUID
    partition table contains a 128-bit GUID for each partition that identifies the
    file system and content of that partition. This GUID is converted to a string
    representation, which is then used as the content hint. This means that there
    may be multiple content hint values that identify a particular file system, so
    a file system driver must match against each possible value of the `IOMedia`''s
    content hint that could identify its file system.'
  trans: "\n# 排版后的内容\n\n列表 14-12 展示了一个分区方案驱动程序实现 `stop()` 和 `free()` 方法的示例。`stop()`\
    \ 方法将每个 `IOMedia` 对象从 I/O Registry 的设备平面中移除，从而撤销分区驱动在其 `start()` 方法中执行的 `attachMediaObjectToDeviceTree()`\
    \ 调用。在卸载分区驱动之前，会调用其 `free()` 方法，该方法释放了用于存储各分区条目 `IOMedia` 对象集合的 `OSSet`。\n\n**列表\
    \ 14-12.** 分区方案驱动程序中 `stop()` 和 `free()` 方法的实现\n\n```\nvoid com_osxkernel_driver_PartitionScheme::stop(IOService*\
    \ provider)\n{\n        IOMedia*                partition;\n        OSIterator*\
    \             partitionIterator;\n\n        // 分离我们先前附加到设备树中的媒体对象。\n        partitionIterator\
    \ = OSCollectionIterator::withCollection(m_partitions);\n        if (partitionIterator)\n\
    \        {\n                while ((partition = (IOMedia*)partitionIterator->getNextObject()))\n\
    \                {\n                        detachMediaObjectFromDeviceTree(partition);\n\
    \                }\n\n                partitionIterator->release();\n        }\n\
    \n        super::stop(provider);\n}\n\nvoid com_osxkernel_driver_PartitionScheme::free\
    \ (void)\n{\n        if (m_partitions != NULL)\n                m_partitions->release();\n\
    \n        super::free();\n}\n```\n\n## 媒体内容提示属性\n\n正如我们在列表 14-11 中所见，`IOMedia`\
    \ 类的初始化方法接受一个名为 `contentHint` 的参数。虽然该参数不会被 `IOMedia` 对象解释，但在驱动存储栈的构建中却扮演着非常重要的角色。`contentHint`\
    \ 参数是一个字符串值，用于描述 `IOMedia` 对象在磁盘上包含的内容。对于一个表示整个磁盘的 `IOMedia` 对象而言，内容提示可以标识该磁盘包含的分区方案。对于一个表示单个分区的\
    \ `IOMedia` 对象，内容提示可以标识该卷所使用的文件系统类型。内容提示也可用于自定义目的；例如，提供磁盘加密功能的驱动可以使用内容提示来描述磁盘上已采用的加密方案。\n\
    \n内容提示并非用于向用户描述内容，而是为系统上的其他驱动提供可用的信息。传递给 `IOMedia` 类初始化方法的 `contentHint` 参数，会作为\
    \ `IOMedia` 对象上的一个 I/O Registry 属性进行设置。这使得存储栈中的其他驱动可以访问内容提示的值，但更重要的是，它提供了一个可以被指定并与另一个驱动的匹配字典进行匹配的属性。\n\
    \n当我们创建分区方案驱动时，我们指定了一个 `IOPropertyMatch` 项（见列表 14-8），这限制了驱动只与特定的 `IOMedia` 对象进行匹配。就分区方案驱动而言，我们只匹配那些代表整个磁盘的\
    \ `IOMedia` 对象。这是通过告知 I/O Kit：分区驱动应仅与包含名为 `\"Whole\"` 且值为 `true` 的属性的 `IOMedia`\
    \ 对象进行匹配来实现的。类似地，一个驱动可以向其匹配字典中添加包含键 `\"Content Hint\"` 的 `IOPropertyMatch` 项，并指定一个包含该驱动感兴趣的具体内容类型的值。例如，这可用于防止磁盘加密驱动加载到未加密的\
    \ `IOMedia` 卷上。\n\n内容提示属性的另一个重要用途是识别要为某个 `IOMedia` 卷加载的正确文件系统驱动。仅当 `IOMedia` 对象的内容提示值标识出一个受支持的文件系统时，Mac\
    \ OS X 才会加载该文件系统驱动。\n\n由于在初始化 `IOMedia` 对象时需要指定内容提示值，因此任何实例化 `IOMedia` 对象的驱动都需要了解该对象所代表的磁盘或分区的内容。对于分区方案驱动，内容提示将来自存储在磁盘上的分区表。例如，Apple\
    \ 分区映射包含一个直接用作内容提示值的字符串，对应每个分区条目。GUID 分区表则为每个分区包含一个 128 位的 GUID，用于标识该分区的文件系统和内容。该\
    \ GUID 会被转换为字符串表示形式，然后用作内容提示。这意味着可能存在多个内容提示值来标识同一文件系统，因此一个文件系统驱动必须针对 `IOMedia`\
    \ 内容提示中每个可能标识其文件系统的值进行匹配。\n"
- fmt: "### Media Filter Drivers\n\nThe top of the driver storage stack may contain\
    \ one or more media filter drivers. A media filter driver, also known as a filter\
    \ scheme driver, matches against an existing `IOMedia` object in the storage stack,\
    \ and creates a new `IOMedia` object that represents the filtered media object.\
    \ All read and write requests to the disk pass through the filter scheme driver,\
    \ allowing the filter driver to manipulate the blocks that are read, or even to\
    \ manipulate the data as it travels between the original `IOMedia` object and\
    \ the filtered `IOMedia` object above it in the storage stack.\n\nA filter scheme\
    \ driver can be used to implement various types of functionality. For example,\
    \ a filter driver could be used to implement block-level disk encryption by matching\
    \ against an `IOMedia` object that represents an encrypted partition on the disk,\
    \ and publishing an `IOMedia` object that represents the unencrypted partition\
    \ that is used by the file system. Another use of a filter scheme driver could\
    \ be to implement a RAID driver, which matches against multiple `IOMedia` objects,\
    \ each of which represents an individual disk in the RAID set, and creates a single\
    \ `IOMedia` object that represents the logical volume. The relationship between\
    \ a filter scheme driver and the `IOMedia` objects that it controls, and the `IOMedia`\
    \ object that it publishes, is shown in [Figure 14-8](#Chapter14.html#fig_14_8).\n\
    \n![images](images/1408.jpg)\n\n***Figure 14-8.** The relationship between a filter\
    \ scheme driver and its provider classes and the `IOMedia` objects that it creates\
    \ for an encryption scheme (left) and a RAID driver (right)*\n\nThe partition\
    \ scheme driver that was developed in the previous section can be thought of as\
    \ a specialized form of a filter driver. Like a filter driver, the partition scheme\
    \ driver loads against an existing `IOMedia` object and creates one or more `IOMedia`\
    \ objects that represent the partitions on the disk. However, unlike the partition\
    \ scheme, the general filter driver can have multiple provider classes, as in\
    \ the case of the RAID driver shown in [Figure 14-8](#Chapter14.html#fig_14_8).\
    \ Another difference is that unlike a filter driver, a partition scheme driver\
    \ typically isn't involved in handling each read or write request that is made\
    \ through the `IOMedia` objects that it creates.\n\nThe I/O Kit provides a class\
    \ known as `IOFilterScheme` that forms the superclass of any driver that implements\
    \ a media filter scheme. A filter scheme driver will typically use the “Content\
    \ Hint” property value of the `IOMedia` object that it matches against to restrict\
    \ the filter scheme to loading only against an `IOMedia` object that the filter\
    \ scheme can support. For example, the Apple software RAID driver formats each\
    \ disk in the RAID set with the GUID partition table and, as such, each disk's\
    \ `IOMedia` object contains a GUID as its “Content Hint” property. Apple has defined\
    \ a GUID to indicate that the disk partition forms part of a RAID set, which the\
    \ Apple RAID driver will match against. When the Apple RAID driver creates its\
    \ child `IOMedia` object to represent the logical volume, it gives this `IOMedia`\
    \ object a content hint that represents the file system that was written to the\
    \ overall RAID set.\n\n![images](images/square.jpg) **Note** File system drivers\
    \ will load against only the top-level (leaf) `IOMedia` object in the driver storage\
    \ stack. This means that, even though a filter scheme driver may match against\
    \ an `IOMedia` object that contains a readable file system, and creates another\
    \ `IOMedia` object with a readable file system, only the object above the filter\
    \ scheme driver in the stack will be mounted on the user's desktop.\n\n#### A\
    \ Sample Filter Scheme for Encryption\n\nLet's examine the implementation of a\
    \ sample filter scheme driver by implementing a simple block-level encryption\
    \ driver. The sample driver doesn't do anything sophisticated in terms of security–it\
    \ simply implements a basic XOR encryption scheme–but it does demonstrate the\
    \ structure of a filter scheme driver.\n\nThe filter scheme that we will develop\
    \ will encrypt the contents of an entire partition, and our sample will require\
    \ the disk to be formatted with the standard GUID partition table. To identify\
    \ an encrypted partition, we will define a new GUID to describe the content of\
    \ the partition, which we can generate using the command line tool `uuidgen`.\
    \ Throughout this sample, we will use the GUID `8D7FD0BB-39A8-43C0-9432-F4E1A269F070`,\
    \ which our sample driver has defined to describe an encrypted disk partition\
    \ that contains the HFS file system. Hereafter, we will use the term `Encrypted_HFS_GUID`\
    \ in the chapter text instead of writing the GUID in full.\n\nFor this sample,\
    \ we will use the standard GUID partition table, which means that the driver for\
    \ the partition scheme in the storage driver stack will be the standard Apple\
    \ GUID partition scheme driver. The Apple driver sets the “Content Hint” property\
    \ of each partition's `IOMedia` object to the partition type GUID from the partition\
    \ header on the disk. This means that the `IOMedia` object that our encryption\
    \ filter driver wishes to load against will have a content hint of `Encrypted_HFS_GUID`.\
    \ The encryption filter driver can ignore all other `IOMedia` objects, since it\
    \ knows that they do not represent an encrypted partition. This requirement can\
    \ be expressed in the filter driver's matching dictionary by adding an `IOPropertyMatch`\
    \ key, as shown in [Listing 14-13](#Chapter14.html#list_14_13).\n\n***Listing\
    \ 14-13.** The Matching Dictionary from the Property List of a Sample Filter Scheme\
    \ Driver That Implements Encryption*\n\n```\n<key>IOKitPersonalities</key>\n<dict>\n\
    \        <key>SampleEncryptionFilter</key>\n        <dict>\n                <key>Content\
    \ Mask</key>\n                <string>Sample_Encrypted_Data</string>\n       \
    \         <key>CFBundleIdentifier</key>\n                <string>com.osxkernel.SampleEncryptionFilter</string>\n\
    \                <key>IOClass</key>\n                <string>com_osxkernel_driver_SampleEncryptionFilter</string>\n\
    \                <key>IOMatchCategory</key>\n                <string>IOStorage</string>\n\
    \                <key>IOProviderClass</key>\n                <string>IOMedia</string>\n\
    \                <key>IOPropertyMatch</key>\n                <dict>\n        \
    \                <key>Content Hint</key>\n                        <string>8D7FD0BB-39A8-43C0-9432-F4E1A269F070</string>\n\
    \                </dict>\n        </dict>\n</dict>\n```\n\nWhen a filter scheme\
    \ driver loads, it may need to probe its `IOMedia` provider class to determine\
    \ whether it contains content supported by the filter driver. If it does, it creates\
    \ one or more `IOMedia` children objects that represent the filtered volume. These\
    \ steps are similar to the implementation of the `probe()` and `start()` methods\
    \ of the partition scheme driver shown in [Listing 14-9](#Chapter14.html#list_14_9).\
    \ However, unlike the partition scheme driver, our sample encryption filter scheme\
    \ driver can ignore the `probe()` method, since the driver's property list has\
    \ been set up to ensure that the driver will load only against an `IOMedia` object\
    \ whose “Content Hint” property contains our `Encrypted_HFS_GUID` type. Therefore,\
    \ if the driver loads, we can assume that it is loading against an encrypted partition."
  raw: '### Media Filter Drivers


    The top of the driver storage stack may contain one or more media filter drivers.
    A media filter driver, also known as a filter scheme driver, matches against an
    existing `IOMedia` object in the storage stack, and creates a new `IOMedia` object
    that represents the filtered media object. All read and write requests to the
    disk pass through the filter scheme driver, allowing the filter driver to manipulate
    the blocks that are read, or even to manipulate the data as it travels between
    the original `IOMedia` object and the filtered `IOMedia` object above it in the
    storage stack.


    A filter scheme driver can be used to implement various types of functionality.
    For example, a filter driver could be used to implement block-level disk encryption
    by matching against an `IOMedia` object that represents an encrypted partition
    on the disk, and publishing an `IOMedia` object that represents the unencrypted
    partition that is used by the file system. Another use of a filter scheme driver
    could be to implement a RAID driver, which matches against multiple `IOMedia`
    objects, each of which represents an individual disk in the RAID set, and creates
    a single `IOMedia` object that represents the logical volume. The relationship
    between a filter scheme driver and the `IOMedia` objects that it controls, and
    the `IOMedia` object that it publishes, is shown in [Figure 14-8](#Chapter14.html#fig_14_8).


    ![images](images/1408.jpg)


    ***Figure 14-8.** The relationship between a filter scheme driver and its provider
    classes and the `IOMedia` objects that it creates for an encryption scheme (left)
    and a RAID driver (right)*


    The partition scheme driver that was developed in the previous section can be
    thought of as a specialized form of a filter driver. Like a filter driver, the
    partition scheme driver loads against an existing `IOMedia` object and creates
    one or more `IOMedia` objects that represent the partitions on the disk. However,
    unlike the partition scheme, the general filter driver can have multiple provider
    classes, as in the case of the RAID driver shown in [Figure 14-8](#Chapter14.html#fig_14_8).
    Another difference is that unlike a filter driver, a partition scheme driver typically
    isn''t involved in handling each read or write request that is made through the
    `IOMedia` objects that it creates.


    The I/O Kit provides a class known as `IOFilterScheme` that forms the superclass
    of any driver that implements a media filter scheme. A filter scheme driver will
    typically use the “`Content Hint`” property value of the `IOMedia` object that
    it matches against to restrict the filter scheme to loading only against an `IOMedia`
    object that the filter scheme can support. For example, the Apple software RAID
    driver formats each disk in the RAID set with the GUID partition table and, as
    such, each disk''s `IOMedia` object contains a GUID as its “`Content Hint`” property.
    Apple has defined a GUID to indicate that the disk partition forms part of a RAID
    set, which the Apple RAID driver will match against. When the Apple RAID driver
    creates its child `IOMedia` object to represent the logical volume, it gives this
    `IOMedia` object a content hint that represents the file system that was written
    to the overall RAID set.


    ![images](images/square.jpg) **Note** File system drivers will load against only
    the top-level (leaf) `IOMedia` object in the driver storage stack. This means
    that, even though a filter scheme driver may match against an `IOMedia` object
    that contains a readable file system, and creates another `IOMedia` object with
    a readable file system, only the object above the filter scheme driver in the
    stack will be mounted on the user''s desktop.


    #### A Sample Filter Scheme for Encryption


    Let''s examine the implementation of a sample filter scheme driver by implementing
    a simple block-level encryption driver. The sample driver doesn''t do anything
    sophisticated in terms of security–it simply implements a basic XOR encryption
    scheme–but it does demonstrate the structure of a filter scheme driver.


    The filter scheme that we will develop will encrypt the contents of an entire
    partition, and our sample will require the disk to be formatted with the standard
    GUID partition table. To identify an encrypted partition, we will define a new
    GUID to describe the content of the partition, which we can generate using the
    command line tool `uuidgen`. Throughout this sample, we will use the GUID `8D7FD0BB-39A8-43C0-9432-F4E1A269F070`,
    which our sample driver has defined to describe an encrypted disk partition that
    contains the HFS file system. Hereafter, we will use the term `Encrypted_HFS_GUID`
    in the chapter text instead of writing the GUID in full.


    For this sample, we will use the standard GUID partition table, which means that
    the driver for the partition scheme in the storage driver stack will be the standard
    Apple GUID partition scheme driver. The Apple driver sets the “`Content Hint`”
    property of each partition''s `IOMedia` object to the partition type GUID from
    the partition header on the disk. This means that the `IOMedia` object that our
    encryption filter driver wishes to load against will have a content hint of `Encrypted_HFS_GUID`.
    The encryption filter driver can ignore all other `IOMedia` objects, since it
    knows that they do not represent an encrypted partition. This requirement can
    be expressed in the filter driver''s matching dictionary by adding an `IOPropertyMatch`
    key, as shown in [Listing 14-13](#Chapter14.html#list_14_13).


    ***Listing 14-13.** The Matching Dictionary from the Property List of a Sample
    Filter Scheme Driver That Implements Encryption*


    `<key>IOKitPersonalities</key>`

    `<dict>`

    `        <key>SampleEncryptionFilter</key>`

    `        <dict>`

    `                <key>Content Mask</key>`

    `                <string>Sample_Encrypted_Data</string>`

    `                <key>CFBundleIdentifier</key>`

    `                <string>com.osxkernel.SampleEncryptionFilter</string>`

    `                <key>IOClass</key>`

    `                <string>com_osxkernel_driver_SampleEncryptionFilter</string>`

    `                <key>IOMatchCategory</key>`

    `                <string>IOStorage</string>`

    `                <key>IOProviderClass</key>`

    `                <string>IOMedia</string>`

    `                <key>IOPropertyMatch</key>`

    `                <dict>`

    `                        <key>Content Hint</key>`

    `                        <string>8D7FD0BB-39A8-43C0-9432-F4E1A269F070</string>`

    `                </dict>`

    `        </dict>`

    `</dict>`


    When a filter scheme driver loads, it may need to probe its `IOMedia` provider
    class to determine whether it contains content supported by the filter driver.
    If it does, it creates one or more `IOMedia` children objects that represent the
    filtered volume. These steps are similar to the implementation of the `probe()`
    and `start()` methods of the partition scheme driver shown in [Listing 14-9](#Chapter14.html#list_14_9).
    However, unlike the partition scheme driver, our sample encryption filter scheme
    driver can ignore the `probe()` method, since the driver''s property list has
    been set up to ensure that the driver will load only against an `IOMedia` object
    whose “`Content Hint`” property contains our `Encrypted_HFS_GUID` type. Therefore,
    if the driver loads, we can assume that it is loading against an encrypted partition.'
  trans: "\n### 媒体过滤器驱动程序\n\n驱动程序存储栈的顶部可能包含一个或多个媒体过滤器驱动程序。媒体过滤器驱动程序（也称为过滤方案驱动程序）会匹配存储栈中现有的\
    \ `IOMedia` 对象，并创建一个新的 `IOMedia` 对象来表示经过过滤的媒体对象。所有对磁盘的读写请求都会经过该过滤方案驱动程序，使得过滤驱动程序能够操控所读取的数据块，甚至在数据于原始\
    \ `IOMedia` 对象与存储栈中其上方的已过滤 `IOMedia` 对象之间传输时对其进行操控。\n\n过滤方案驱动程序可用于实现多种类型的功能。例如，过滤驱动程序可通过匹配磁盘上表示加密分区的\
    \ `IOMedia` 对象，并发布一个表示文件系统所使用的未加密分区的 `IOMedia` 对象，来实现块级磁盘加密。过滤方案驱动程序的另一种用途是实现\
    \ RAID 驱动程序，该程序匹配多个 `IOMedia` 对象（每个对象代表 RAID 集中的一块独立磁盘），并创建一个表示逻辑卷的单一 `IOMedia`\
    \ 对象。过滤方案驱动程序与其所控制的 `IOMedia` 对象，以及其发布的 `IOMedia` 对象之间的关系，如图 14-8 所示。\n\n![images](img/1408.jpg)\n\
    \n***图 14-8.** 过滤方案驱动程序与其提供者类的关系，以及它为加密方案（左）和 RAID 驱动程序（右）创建的 `IOMedia` 对象*\n\n\
    先前章节中开发的分区方案驱动程序可被视为过滤驱动程序的一种特殊形式。与过滤驱动程序类似，分区方案驱动程序会针对现有的 `IOMedia` 对象加载，并创建一个或多个表示磁盘分区的\
    \ `IOMedia` 对象。然而，与分区方案不同的是，通用过滤驱动程序可以有多个提供者类，如图 14-8 中所示的 RAID 驱动程序。另一个区别在于，与过滤驱动程序不同，分区方案驱动程序通常不参与处理通过其所创建的\
    \ `IOMedia` 对象进行的每次读写请求。\n\nI/O Kit 提供了一个名为 `IOFilterScheme` 的类，它构成了实现媒体过滤方案的任何驱动程序的超类。过滤方案驱动程序通常会利用其所匹配的\
    \ `IOMedia` 对象的“内容提示”属性值，将过滤方案限制为仅加载到该过滤方案能够支持的 `IOMedia` 对象上。例如，Apple 软件 RAID\
    \ 驱动程序使用 GUID 分区表格式化 RAID 集中的每个磁盘，因此，每个磁盘的 `IOMedia` 对象都包含一个 GUID 作为其“内容提示”属性。Apple\
    \ 定义了一个 GUID 来指示该磁盘分区构成 RAID 集的一部分，Apple RAID 驱动程序将与之匹配。当 Apple RAID 驱动程序创建其子\
    \ `IOMedia` 对象以表示逻辑卷时，它会为该 `IOMedia` 对象赋予一个表示写入整个 RAID 集的文件系统的内容提示。\n\n![images](img/square.jpg)\
    \ **注意** 文件系统驱动程序只会加载到驱动程序存储栈中的顶层（叶节点）`IOMedia` 对象。这意味着，即使过滤方案驱动程序可能匹配一个包含可读文件系统的\
    \ `IOMedia` 对象，并创建另一个具有可读文件系统的 `IOMedia` 对象，但只有堆栈中位于该过滤方案驱动程序上方的对象才会被挂载到用户的桌面上。\n\
    \n#### 用于加密的示例过滤方案\n\n让我们通过实现一个简单的块级加密驱动程序，来研究示例过滤方案驱动程序的实现。此示例驱动程序在安全性方面并未采用复杂设计——它仅实现了一个基础的\
    \ XOR 加密方案——但它确实展示了过滤方案驱动程序的结构。\n\n我们将开发的过滤方案会加密整个分区的内容，并且我们的示例要求磁盘使用标准 GUID 分区表进行格式化。为了标识加密分区，我们将定义一个新的\
    \ GUID 来描述该分区的内容，我们可以使用命令行工具 `uuidgen` 来生成该 GUID。在本示例中，我们将使用 GUID `8D7FD0BB-39A8-43C0-9432-F4E1A269F070`，我们的示例驱动程序已将其定义为描述包含\
    \ HFS 文件系统的加密磁盘分区。此后，我们将在章节文本中使用术语 `Encrypted_HFS_GUID`，而非完整地写出该 GUID。\n\n对于此示例，我们将使用标准\
    \ GUID 分区表，这意味着存储驱动程序栈中的分区方案驱动程序将是标准的 Apple GUID 分区方案驱动程序。Apple 驱动程序会将每个分区的 `IOMedia`\
    \ 对象的“内容提示”属性设置为磁盘分区头中的分区类型 GUID。这意味着我们的加密过滤驱动程序希望加载的 `IOMedia` 对象将具有 `Encrypted_HFS_GUID`\
    \ 的内容提示。加密过滤驱动程序可以忽略所有其他 `IOMedia` 对象，因为它知道它们不代表加密分区。通过添加 `IOPropertyMatch` 键，可以在过滤驱动程序的匹配字典中表达此要求，如代码清单\
    \ 14-13 所示。\n\n***代码清单 14-13.** 实现加密的示例过滤方案驱动程序的属性列表中的匹配字典*\n\n```\n<key>IOKitPersonalities</key>\n\
    <dict>\n        <key>SampleEncryptionFilter</key>\n        <dict>\n          \
    \      <key>Content Mask</key>\n                <string>Sample_Encrypted_Data</string>\n\
    \                <key>CFBundleIdentifier</key>\n                <string>com.osxkernel.SampleEncryptionFilter</string>\n\
    \                <key>IOClass</key>\n                <string>com_osxkernel_driver_SampleEncryptionFilter</string>\n\
    \                <key>IOMatchCategory</key>\n                <string>IOStorage</string>\n\
    \                <key>IOProviderClass</key>\n                <string>IOMedia</string>\n\
    \                <key>IOPropertyMatch</key>\n                <dict>\n        \
    \                <key>Content Hint</key>\n                        <string>8D7FD0BB-39A8-43C0-9432-F4E1A269F070</string>\n\
    \                </dict>\n        </dict>\n</dict>\n```\n\n当过滤方案驱动程序加载时，它可能需要探测其\
    \ `IOMedia` 提供者类，以确定它是否包含过滤驱动程序支持的内容。如果是，它会创建一个或多个表示已过滤卷的 `IOMedia` 子对象。这些步骤类似于代码清单\
    \ 14-9 中所示的分区方案驱动程序的 `probe()` 和 `start()` 方法的实现。然而，与分区方案驱动程序不同，我们的示例加密过滤方案驱动程序可以忽略\
    \ `probe()` 方法，因为驱动程序的属性列表已设置，以确保驱动程序仅加载到其“内容提示”属性包含我们的 `Encrypted_HFS_GUID` 类型的\
    \ `IOMedia` 对象上。因此，如果驱动程序加载，我们可以假定它正在加载到一个加密分区上。\n"
