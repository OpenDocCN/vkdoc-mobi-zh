- fmt: "```c\nif (iflt_attach(interface, &g_my_iff_filter, &g_filter_ref) == KERN_SUCCESS)\n\
    {\n    g_filter_registered = TRUE;\n}\n\nifnet_release(interface);\n\nreturn KERN_SUCCESS;\n\
    }\n\nkern_return_t MyInterfaceFilter_stop (kmod_info_t* ki, void* d)\n{\n    if\
    \ (g_filter_registered)\n    {\n        iflt_detach(g_filter_ref);\n        g_filter_registered\
    \ = FALSE;\n    }\n    if (!g_filter_detached)\n        return KERN_NO_ACCESS;\
    \ // Don't allow unload until filter is detached.\n\n    return KERN_SUCCESS;\n\
    }\n```\n\nInterface filters can be attached to a network interface using the `iflt_attach()`\
    \ function. You can register a single `iff_filter` against multiple interfaces.\
    \ A network interface is represented by the opaque type `ifnet_t`, which can be\
    \ manipulated using the interface KPI (`kpi_interface.h`). In the preceding example,\
    \ we use the interface KPI function `ifnet_find_by_name()` to obtain a reference\
    \ to the network interface with the BSD name \"en1,\" which, on a MacBook, corresponds\
    \ to the Wi-Fi interface.\n\nThe `iff_input` filter function is called when an\
    \ incoming packet is received by the interface. The callback takes five arguments:\n\
    \n- The `cookie` argument contains the pointer assigned to the `iff_cookie` field\
    \ when the filter was registered.\n- The `ifnet_t` argument is a reference to\
    \ the network interface that received the packet. This is especially useful in\
    \ case the same filter function handles filters attached to more than one network\
    \ interface.\n- The next parameter is the `protocol` family the incoming packet\
    \ belongs to. Unless zero is specified for the `iff_protocol` field, this will\
    \ always be the family you specified.\n- The `mbuf_t` represents the buffer containing\
    \ the packet data.\n- The last argument, `frame_ptr`, is a pointer to the data-link\
