    # 排版后的文本


    在磁盘上写入分区表和文件系统后，未来只需通过打开磁盘映像文件即可挂载该磁盘映像。I/O Kit 能够自动创建整个驱动程序存储栈，无需用户参与——从磁盘映像的传输驱动程序、GUID
    分区方案驱动程序、加密过滤方案，最后到栈顶的 HFS 文件系统。


    ### 总结


    -   包含文件系统的存储卷所提供的功能是通过多个驱动程序的栈来实施的，其中每个驱动程序可能由不同的供应商提供。存储驱动程序栈中每一层的驱动程序都负责执行特定的角色。

    -   栈的底层是传输驱动程序，它直接与提供数据存储的硬件设备交互。

    -   块存储驱动程序将存储设备抽象表示为一个字节序列，该序列被组织成固定大小的块，并提供对其数据的随机访问。块存储驱动程序位于驱动程序栈中传输驱动程序的上方。

    -   分区驱动程序负责从磁盘读取分区表，并创建一个驱动程序对象来表示分区表中存在的每个逻辑卷。分区驱动程序位于驱动程序栈中块存储驱动程序的上方。

    -   I/O Kit 通过一个名为 `IOMedia` 的驱动程序对象来表示逻辑卷。每个 `IOMedia` 对象都可以通过 `/dev` 目录中的接口被用户空间进程访问。

    -   I/O Kit 允许供应商将过滤方案驱动程序插入到存储驱动程序栈中，以拦截所有对磁盘的读写请求。这可用于实现 RAID 驱动程序，或对写入磁盘的数据进行加密。

    -   文件系统驱动程序位于存储驱动程序栈的最顶层。虽然文件系统驱动程序间接通过 I/O Kit 存储驱动程序栈进行读写，但它们实际上是 Mac OS X
    的 BSD 层的一部分，不属于 I/O Kit。


    ## 第 15 章


    ## 用户空间 USB 驱动程序


    从用户的角度来看，一个需要内核驱动程序的应用程序会降低用户体验。首先，驱动程序安装涉及写入“Extensions”目录，这需要管理员权限。因此，用户需要运行安装程序并输入管理员帐户的密码，然后可能需要重启才能开始使用该应用程序。另一方面，如果应用程序不需要内核驱动程序，则安装过程可以简单到从
    Mac App Store 下载应用程序即可。


    在某些情况下，通常需要内核驱动程序的应用程序可以无需开发人员编写任何在内核中运行的代码就能实现。相反，通常由驱动程序执行的操作可以由应用程序来完成。这种方法的好处是无需安装内核驱动程序，因此用户不需要管理员权限即可安装应用程序。将驱动程序代码移出内核并移入应用程序的另一个好处是，代码中存在的任何错误最多只会导致应用程序崩溃，而不会引发可能导致整个系统崩溃的内核恐慌。


    并非所有硬件设备都能通过用户空间驱动程序进行控制；例如，包含内存映射地址范围的设备需要内核驱动程序。同样，产生中断的设备也需要内核驱动程序，因为只有内核代码才能在主中断级别执行。这意味着所有
    PCI 和 Thunderbolt 设备都需要内核驱动程序的支持。然而，基于 USB 和 FireWire 的硬件设备是用户空间驱动程序的理想候选。在本章中，我们将讨论为一个
    USB 设备编写一个完全位于用户空间的驱动程序，而无需编写内核驱动程序。


    并非所有 USB 和 FireWire 设备都适合使用用户空间驱动程序。特别是，需要在 `/dev` 目录中创建设备接口文件的驱动程序（例如串行端口驱动程序或存储设备）需要内核驱动程序。此外，可以被多个应用程序同时使用的设备，或者需要被系统使用的设备（例如音频驱动程序），应该编写为内核驱动程序。值得庆幸的是，这些情况属于例外，大多数需要自定义驱动程序的
    USB 设备都可以通过用户空间驱动程序进行控制。


    ### 幕后原理


    在本书的开头章节描述了 Mac OS X 的架构，并特别指出现代操作系统只允许从内核直接访问硬件之后，你可能想知道这与描述用户空间驱动程序的章节如何保持一致。


    本质上，用户空间驱动程序确实需要一个内核驱动程序，但这个内核驱动程序由相同的 `IOUSBDevice` 和 `IOUSBInterface` 对象提供，如果开发人员选择为硬件编写内核驱动程序，它们本应用于与
    USB 设备交互。为了使这些对象对用户空间应用程序可用，IOUSBFamily 为在内核中创建的每个 `IOUSBDevice` 和 `IOUSBInterface`
    实例发布一个用户客户端。


    为这些类创建的用户客户端是极其通用的，其存在的唯一目的是将 `IOUSBDevice` 和 `IOUSBInterface` 类的方法暴露给用户空间。例如，`IOUSBDevice`
    类的用户客户端包含用于获取和设置活动设备配置、执行设备请求以及遍历设备接口的方法。`IOUSBInterface` 类的用户客户端包含用于向指定端点读写数据的方法。


    应用程序不需要直接调用用户客户端类的方法；相反，I/O Kit 框架提供了一个高级 API 来控制硬件。这个 API 被称为 IOUSBLib。用户空间 USB
    驱动程序所涉及的层次结构如 图 15-1 所示。开发人员需要编写的自定义代码仅存在于应用程序层；下面的层是 Apple 作为 Mac OS X 一部分提供的通用库。


    虽然了解 IOUSBLib 是如何实现的并非必需，但一点相关知识将帮助你理解应用程序从用户空间查找并与 USB 设备交互所需执行的每个步骤。


    ![images](img/1501.jpg)


    **图 15-1.** 用户空间驱动程序访问其 USB 硬件的层次结构

