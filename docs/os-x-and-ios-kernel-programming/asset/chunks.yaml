- fmt: '### Networking in the I/O Kit


    The `IONetworkingFamily` of classes represents the bottom part of the kernel network
    stack. As previously discussed, the I/O Kit is the preferred layer for implementing
    drivers for hardware-based network devices. The class hierarchy of the `IONetworkingFamily`
    is shown in [Figure 13-4](#Chapter13.html#fig_13_4).


    ![images](images/1304.jpg)


    ***Figure 13-4.** The `IONetworkingFamily` class hierarchy*


    The family may look quite expansive, but many of the classes are auxiliary helper
    classes, and some, we do not need to worry about at all because they are only
    used internally in the family. The key classes in the family are the `IONetworkController`
    and `IONetworkInterface`. The former is used to represent a driver for network
    hardware, whereas the latter is used to interface with the data-link interface
    layer (DLIL) in the BSD layer. It serves as an adapter that allows I/O Kit network
    interfaces to be seen as BSD layer network interfaces, so you can use traditional
    UNIX tools, such as `ifconfig`, to configure the device. Let''s have a look at
    the responsibilities of the individual classes:


    *   `IOEthernetController` is the base class for all Ethernet-based devices, including
    802.11-based wireless devices. You would normally subclass this when writing a
    driver for an Ethernet or Wi-Fi-based device driver.

    *   `IOEthernetInterface` acts as a client of an `IOEthernetController` and provides
    the glue between the controller and the BSD networking layer. If you are implementing
    an Ethernet driver, you do not normally need to subclass `IOEthernetInterface`
    unless you have special requirements.

    *   `IOKernelDebugger` is a replacement driver, which will be used against an
    `IONetworkController` in lieu of an `IONetworkInterface` when the kernel debugger
    is active. You do not need to support this if you are writing a third party network
    driver.

    *   `IOMbufMemoryCursor` provides an object-oriented cursor around the `mbuf`
    structure, which allows translation of `mbuf` clusters to physical addresses for
    the purpose of DMA. Several specialized subclasses are available: `IOMBufBigMemoryCursor`,
    `IOMbufDBMAMemoryCursor`, `IOMbufLittleMemoryCursor`, `IOMbufNaturalMemoryCursor`.

    *   `IONetworkController` is the base class of `IOEthernetController`. You must
    subclass `IONetworkController` if you are writing a driver for a non-Ethernet
    compatible device.

    *   `IONetworkData` represents a fixed size data buffer used by `IONetworkInterface`
    to export interface data to user space, notably, usage statistics such as information
    about dropped packets and collisions.

    *   `IONetworkInterface` provides the glue to bind an `IONetworkController` to
    the BSD data-link layer (BDIL) and the rest of the network stack. The `IONetworkInterface`
    is an abstract class and must be re-implemented if your driver is based on `IONetworkInterface`.

    *   `IONetworkUserClient` is a subclass of `IOUserClient`, providing a user-client
    for `IONetworkInterface`.

    *   `IOOutputQueue` is a packet queue, which handles multiple producers and a
    single consumer (a device). Two specialized subclasses are available: `IOBasicOutputQueue`
    and `IOGatedOutputQueue`.

    *   `IOPacketQueue` implements a FIFO queue of `mbufs` synchronized by a spinlock.


    You may have noticed the absence of any mention of 802.11x networking support.
    Apple does not publish a framework for development of wireless networking drivers.
    Apple''s own AirPort drivers are located in the `IO802Family.kext`, but no source
    or header files are published for this. This does not preclude writing of wireless
    network drivers, but it does mean that you can''t take advantage of pre-written
    classes, and you may have to provide your own `IOUserClient` and possible user
    space tools for configuration of the device. Apple''s AirPort devices are subclasses
    of the private `IO80211Controller`, which, again, is a subclass of `IOEthernetController`.
    That being said all modern Macs have built-in wireless networking, so demand for
    third-party devices in this area is low.


    ### Building a Simple Ethernet Controller Driver


    Let''s get our hands dirty with I/O Kit networking, by building a simple Ethernet
    driver. Since implementing a full working driver is highly complex and hardware-dependent,
    it is difficult to demonstrate in its entirety, and probably not that useful to
    someone having to implement a driver for a completely different device. We will
    instead focus on the fundamentals and on familiarizing ourselves with the tools
    an I/O Kit provides to aid in developing network drivers. We will do this by implementing
    a virtual Ethernet driver called `MyEthernetDriver`. The driver will demonstrate
    how core elements of an I/O Kit network driver are implemented and will show how
    packets flow through it to interact with the rest of the system. [Figure 13-5](#Chapter13.html#fig_13_5)
    shows how `MyEthernetDriver` interacts with other I/O Kit classes.


    ![images](images/1305.jpg)


    ***Figure 13-5.** `MyEthernetDriver`: Interaction with I/O Kit and the network
    stack*


    In this case, `MyEthernetDriver` uses the `IOResources` nub as a provider, but
    for a real network device backed by a physical device, it would more probably
    use `IOPCIDevice`, `IOUSBDevice`, `IOUSBInterface`, or another nub representing
    a hardware device.


    ![images](images/square.jpg) **Tip**  If you are curious to see a network driver
    for a real device, the `IOUSBFamily` source distribution used to include the source
    code for `AppleUSBCDCEthernet`, which is the driver for devices that follow the
    USB Ethernet specification. The driver is not part of newer versions, but can
    still be found in older versions of `IOUSBFamily` at Apple''s open-source website
    ([`opensource.apple.com`](http://www.opensource.apple.com)). There is also source
    code available for a driver for the popular PCI based Realtek 8139 chipset called
    `AppleRTL8139Ethernet`. For an example of a network driver derived directly from
    `IONetworkController`, have a look at `IOFireWireIP`, which implements TCP/IP
    networking over FireWire.


    The main driver class `MyEthernetDriver` will inherit from `IOEthernetController`,
    which again inherits from `IONetworkController`. The driver will also allocate
    an `IOEthernetInterface` instance, which will be used to interface with the network
    stack. The `IOEthernetInterface` class is not abstract and can be allocated and
    used directly.'
  raw: '### Networking in the I/O Kit


    The `IONetworkingFamily` of classes represents the bottom part of the kernel network
    stack. As previously discussed, the I/O Kit is the preferred layer for implementing
    drivers for hardware-based network devices. The class hierarchy of the `IONetworkingFamily`
    is shown in [Figure 13-4](#Chapter13.html#fig_13_4).


    ![images](images/1304.jpg)


    ***Figure 13-4.** The IONetworkingFamily class hierachy*


    The family may look quite expansive, but many of the classes are auxiliary helper
    classes, and some, we do not need to worry about at all because they are only
    used internally in the family. The key classes in the family are the `IONetworkController`
    and `IONetworkInterface`. The former is used to represent a driver for network
    hardware, whereas the latter is used to interface with the data-link interface
    layer (DLIL) in the BSD layer. It serves as an adapter that allows I/O Kit network
    interfaces to be seen as BSD layer network interfaces, so you can use traditional
    UNIX tools, such as `ifconfig`, to configure the device. Let''s have a look at
    the responsibilities of the individual classes:


    *   `IOEthernetController` is the base class for all Ethernet-based devices, including
    802.11-based wireless devices. You would normally subclass this when writing a
    driver for an Ethernet or Wi-Fi-based device driver.

    *   `IOEthernetInterface` acts as a client of an `IOEthernetController` and provides
    the glue between the controller and the BSD networking layer. If you are implementing
    an Ethernet driver, you do not normally need to subclass `IOEthernetInterface`
    unless you have special requirements.

    *   `IOKernelDebugger` is a replacement driver, which will be used against an
    `IONetworkController` in lieu of an `IONetworkInterface` when the kernel debugger
    is active. You do not need to support this if you are writing a third party network
    driver.

    *   `IOMbufMemoryCursor` provides an object-oriented cursor around the `mbuf`
    structure, which allows translation of `mbuf` clusters to physical addresses for
    the purpose of DMA. Several specialized subclasses are available: `IOMBufBigMemoryCursor`,
    `IOMbufDBMAMemoryCursor`, `IOMbufLittleMemoryCursor`, `IOMbufNaturalMemoryCursor`.

    *   `IONetworkController` is the base class of `IOEthernetController`. You must
    subclass `IONetworkController` if you are writing a driver for a non-Ethernet
    compatible device.

    *   `IONetworkData` represents a fixed size data buffer used by `IONetworkInterface`
    to export interface data to user space, notably, usage statistics such as information
    about dropped packets and collisions.

    *   `IONetworkInterface` provides the glue to bind an `IONetworkController` to
    the BSD data-link layer (BDIL) and the rest of the network stack. The `IONetworkInterface`
    is an abstract class and must be re-implemented if your driver is based on `IONetworkInterface`.

    *   `IONetworkUserClient` is a subclass of `IOUserClient`, providing a user-client
    for `IONetworkInterface`.

    *   `IOOutputQueue` is a packet queue, which handles multiple producers and a
    single consumer (a device). Two specialized subclasses are available: `IOBasicOutputQueue`
    and `IOGatedOutputQueue`.

    *   `IOPacketQueue` implements a FIFO queue of `mbufs` synchronized by a spinlock.


    You may have noticed the absence of any mention of 802.11x networking support.
    Apple does not publish a framework for development of wireless networking drivers.
    Apple''s own AirPort drivers are located in the `IO802Family.kext`, but no source
    or header files are published for this. This does not preclude writing of wireless
    network drivers, but it does mean that you can''t take advantage of pre-written
    classes, and you may have to provide your own `IOUserClient` and possible user
    space tools for configuration of the device. Apple''s AirPort devices are subclasses
    of the private `IO80211Controller`, which, again, is a subclass of `IOEthernetController`.
    That being said all modern Macs have built-in wireless networking, so demand for
    third-party devices in this area is low.


    #### Building a Simple Ethernet Controller Driver


    Let''s get our hands dirty with I/O Kit networking, by building a simple Ethernet
    driver. Since implementing a full working driver is highly complex and hardware-dependent,
    it is difficult to demonstrate in its entirety, and probably not that useful to
    someone having to implement a driver for a completely different device. We will
    instead focus on the fundamentals and on familiarizing ourselves with the tools
    an I/O Kit provides to aid in developing network drivers. We will do this by implementing
    a virtual Ethernet driver called MyEthernetDriver. The driver will demonstrate
    how core elements of an I/O Kit network driver are implemented and will show how
    packets flow through it to interact with the rest of the system. [Figure 13-5](#Chapter13.html#fig_13_5)
    shows how MyEthernetDriver interacts with other I/O Kit classes.


    ![images](images/1305.jpg)


    ***Figure 13-5.** MyEthernetDriver: Interaction with I/O Kit and the network stack*


    In this case, MyEthernetDriver uses the `IOResources` nub as a provider, but for
    a real network device backed by a physical device, it would more probably use
    `IOPCIDevice`, `IOUSBDevice`, `IOUSBInterface`, or another *nub* representing
    a hardware device.


    ![images](images/square.jpg) **Tip**  If you are curious to see a network driver
    for a real device, the `IOUSBFamily` source distribution used to include the source
    code for `AppleUSBCDCEthernet`, which is the driver for devices that follow the
    USB Ethernet specification. The driver is not part of newer versions, but can
    still be found in older versions of `IOUSBFamily` at Apple''s open-source website
    ([`opensource.apple.com`](http://www.opensource.apple.com)). There is also source
    code available for a driver for the popular PCI based Realtek 8139 chipset called
    `AppleRTL8139Ethernet`. For an example of a network driver derived directly from
