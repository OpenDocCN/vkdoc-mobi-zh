    \ World”内核扩展，展示了如何从其他内核库导入符号，并介绍了常用的命令行工具，用于加载和处理内核扩展。\n\n---\n\n## 第 4 章 I/O\
    \ Kit 框架\n\nMac OS X 的设备驱动程序是使用名为 I/O Kit 的框架编写的。I/O Kit 由提供驱动程序所需服务的头文件和库，以及用户空间代码用于定位内核驱动程序并与之交互的头文件和库组成。I/O\
    \ Kit 包含两个主要部分：\n\n*   `Kernel.framework`\n*   `IOKit.framework`\n\n虽然稍微有点反直觉，但\
    \ I/O Kit 框架是为用户空间应用程序设计的，而不是用于在内核中开发 I/O Kit 驱动程序。相反，`Kernel.framework`包含用于内核空间驱动程序开发的头文件。如果您检查`Kernel.framework`的内容，会看到其中包含一个名为`IOKit`的目录，该目录包含用于内核空间驱动程序开发的头文件。`Kernel.framework`中另一个重要的目录名为`libkern`，其中包含内核\
    \ I/O Kit 框架所基于的基础类和类型。\n\n用户空间 I/O Kit 框架有两个用途。它为用户应用程序提供以下功能：确定运行机器上存在的硬件设备、为特定硬件设备定位合适的驱动程序，以及向该驱动程序发送控制请求和请求状态。这些主题将在第\
    \ 5 章中进一步讨论。此外，用户空间 I/O Kit 框架还允许用户空间应用程序直接与某些硬件设备通信，从而无需内核驱动程序。这对于特定范围的设备是可行的，最显著的是不需要在多个运行中的应用程序之间共享的\
    \ USB 和 FireWire 设备。我们在第 15 章中讨论 I/O Kit 的这一方面。\n"
- fmt: "### The I/O Kit Model\n\nThe I/O Kit is an object-oriented framework, thus\
    \ it requires a language that provides an object-oriented programming abstraction.\
    \ Apple chose to implement the I/O Kit in the C++ language, and consequently,\
    \ drivers that are written for Mac OS X are developed in C++.\n\nWhile the choice\
    \ of C++ for driver development is unique among operating systems, it reflects\
    \ the modern nature of Mac OS X. The initial version of Mac OS X was released\
    \ in 2001, and Apple took the opportunity to design a completely new model for\
    \ driver development. The choice of C++ reflects the state of both computer hardware\
    \ and compilers when the I/O Kit was designed.\n\nThe choice of an object-oriented\
    \ language has considerable advantages. Hardware in a computer system is, by its\
    \ nature, an interconnected series of devices connected via a number of different\
    \ buses. For example, a USB device may be connected to the internal USB hub of\
    \ a keyboard, which itself is connected to the USB port on an iMac. Internally,\
    \ the USB port is handled by a USB controller chip on the iMac's motherboard,\
    \ which is connected to the motherboard's chipset controller via an internal PCI\
    \ bus. By adopting an object-oriented driver model, the I/O Kit is able to mirror\
    \ this same hardware connection through the driver objects.\n\nThe role of a driver\
    \ is to enable the operating system—and ultimately the user—to take advantage\
    \ of the services that are implemented by hardware. The operating system helps\
    \ the driver by loading the driver when its hardware device is present, providing\
    \ the driver with a way to access and interact with its hardware device, and by\
    \ providing access points for the driver to plug its own services into the operating\
    \ system.\n\n![images](images/square.jpg)  \n**Note:** The I/O Kit uses the term\
    \ “nub” to describe a driver that provides services to other drivers. For example,\
    \ the driver of a USB hub would be a nub because it provides services to the drivers\
    \ of the USB devices that connect to it.\n\nThe choice of an object-oriented design\
    \ serves the I/O Kit well. Each driver is implemented as a C++ class, which allows\
    \ the I/O Kit to instantiate a new driver object for each instance of the hardware\
    \ device present on the system. The driver's hardware device is accessed through\
    \ an object known as the driver's “provider,” which is provided to the driver\
    \ at initialization. The I/O Kit will use a provider class that is appropriate\
    \ for the hardware bus used by the device. For example, a USB device will have\
    \ a provider class that is an instance of `IOUSBDevice`, whereas a driver for\
    \ a PCI card will have a provider class that is an instance of `IOPCIDevice`.\
    \ The different capabilities of these bus interfaces are abstracted by the different\
    \ provider class types. For example, USB devices have a number of endpoints that\
    \ data is transferred to or read from, so the `IOUSBDevice` class contains methods\
    \ for reading or writing a data buffer to a specified endpoint. On the other hand,\
    \ a PCI card is accessed by mapping a set of registers into the kernel's address\
    \ space, which can then be read from and written to by the driver the same way\
    \ in which it writes to any other memory address.\n\nLastly, drivers need a way\
    \ to provide their services to the rest of the operating system. This is perhaps\
    \ the area where the object-oriented design of the I/O Kit shines. The main class\
    \ of the driver can be implemented as the subclass of one of the specialized classes\
    \ provided by the I/O Kit for certain types of driver. For example, a driver that\
    \ implements a serial port will subclass the standard `IOSerialStreamSync` class.\
    \ Similarly, a driver that implements an audio output device will subclass the\
    \ `IOAudioDevice` class.\n\nThe advantage of implementing a driver by subclassing\
    \ is that your driver inherits the behavior and implementation from the parent\
    \ class. There are certain operations that are common to every serial port and\
    \ to every audio device, and this behavior is implemented by the superclass, saving\
    \ driver developers from having to write boilerplate code. Developers can then\
    \ concentrate on code that is specific to their particular hardware device. The\
    \ superclass will call the driver when a device-specific action is required.\n\
    \nIf you've implemented a driver for any other operating system, you have no doubt\
    \ had to implement a dispatch routine that usually takes the form of one large\
    \ `switch` statement in order to handle all the possible requests that the operating\
    \ system may make and then calling the appropriate function in your driver that\
    \ implements that request. The I/O Kit takes a different approach. Driver requests\
    \ take the form of method calls. The driver simply needs to implement or override\
    \ methods that are provided by its superclass. These methods are specific to the\
    \ driver type. For example, a serial driver is concerned with transmitting bytes\
    \ and receiving bytes over the serial port, so the `IOSerialStreamSync` class\
    \ provides pure virtual methods `enqueueData()` and `dequeueData()` to be implemented\
    \ by the subclass when these actions need to be performed.\n\nFor a specialized\
    \ device, the I/O Kit may not provide a suitable superclass. For example, there\
    \ is no suitable superclass provided by the I/O Kit to implement a driver for\
    \ a specialized medical imaging device. The driver for such a device would be\
    \ implemented by a class that subclasses from the generic `IOService` class. The\
    \ `IOService` provides methods to manage the driver's lifecycle, including initialization\
    \ and destroying the driver object.\n\nLastly, a driver may provide an interface\
    \ to user space applications. In I/O Kit terminology, this is handled by implementing\
    \ a class known as a “user client.” The user client is a custom class implemented\
    \ by the driver that subclasses the `IOUserClient` class. Whenever an application\
    \ opens a connection to the driver, the I/O Kit instantiates a new user client\
    \ object that handles all the requests coming from that application's connection\
    \ to the driver. When the application closes that connection to the driver, or\
    \ the application terminates (or crashes), the user client is destroyed. If an\
    \ application opens multiple connections to the driver, the I/O Kit will instantiate\
    \ as many user client objects as there are connections made.\n\n### Object Relationship\n\
    \nAs we have seen, there are two important classes for an I/O Kit driver, one\
    \ being the superclass that the main driver class inherits from and the other\
    \ being the provider class that the driver uses to access its hardware. This design\
    \ means that the functionality that the driver implements is separate from the\
    \ way in which the driver's hardware device connects to the computer. For example,\
    \ a driver that supports a PCI sound card and a driver that supports a USB audio\
    \ output device will both inherit from the same `IOAudioDevice` superclass, and\
    \ the operating system will interface to both drivers by making the same calls\
    \ to each driver. After all, the operating system's audio subsystem shouldn't\
    \ need to care how an audio output device connects to the computer.\n\nThis separation\
    \ also encourages code reuse. A company that manufactures both PCI and USB based\
    \ audio devices could potentially use the same driver for both devices, with the\
    \ driver receiving a provider class that is of type `IOPCIDevice` or `IOUSBDevice`,\
    \ depending on which of the two hardware devices is connected to the computer.\
    \ Or, perhaps more conceivably, the hardware vendor could create its own superclass\
    \ that implements the common functionality for both devices, which is itself a\
    \ subclass of `IOAudioDevice`. The driver for the vendor's PCI and USB devices\
    \ would need only a minimal implementation, with much of the common functionality\
    \ coming from their custom superclass. Such an arrangement is shown in [Figure\
    \ 4-1](#Chapter04.html#fig_4_1).\n\n![images](images/0401.jpg)\n\n***Figure 4-1.**\
    \ An example of the relationship between an I/O Kit driver and its superclass\
    \ and provider class*"
  raw: '### The I/O Kit Model


    The I/O Kit is an object-oriented framework, thus it requires a language that
    provides an object-oriented programming abstraction. Apple chose to implement
    the I/O Kit in the C++ language, and consequently, drivers that are written for
    Mac OS X are developed in C++.


    While the choice of C++ for driver development is unique among operating systems,
    it reflects the modern nature of Mac OS X. The initial version of Mac OS X was
    released in 2001, and Apple took the opportunity to design a completely new model
    for driver development. The choice of C++ reflects the state of both computer
    hardware and compilers when the I/O Kit was designed.


    The choice of an object-oriented language has considerable advantages. Hardware
    in a computer system is, by its nature, an interconnected series of devices connected
    via a number of different buses. For example, a USB device may be connected to
    the internal USB hub of a keyboard, which itself is connected to the USB port
    on an iMac. Internally, the USB port is handled by a USB controller chip on the
    iMac''s motherboard, which is connected to the motherboard''s chipset controller
    via an internal PCI bus. By adopting an object-oriented driver model, the I/O
    Kit is able to mirror this same hardware connection through the driver objects.


    The role of a driver is to enable the operating system—and ultimately the user—to
    take advantage of the services that are implemented by hardware. The operating
    system helps the driver by loading the driver when its hardware device is present,
    providing the driver with a way to access and interact with its hardware device,
    and by providing access points for the driver to plug its own services into the
    operating system.


    ![images](images/square.jpg) **Note** The I/O Kit uses the term “nub” to describe
    a driver that provides services to other drivers. For example, the driver of a
    USB hub would be a nub because it provides services to the drivers of the USB
    devices that connect to it.


    The choice of an object-oriented design serves the I/O Kit well. Each driver is
    implemented as a C++ class, which allows the I/O Kit to instantiate a new driver
    object for each instance of the hardware device present on the system. The driver''s
    hardware device is accessed through an object known as the driver''s “provider,”
    which is provided to the driver at initialization. The I/O Kit will use a provider
    class that is appropriate for the hardware bus used by the device. For example,
    a USB device will have a provider class that is an instance of an `IOUSBDevice`,
    whereas a driver for a PCI card will have a provider class that is an instance
    of an `IOPCIDevice`. The different capabilities of these bus interfaces are abstracted
    by the different provider class types. For example, USB devices have a number
    of endpoints that data is transferred to or read from, so the `IOUSBDevice` class
    contains methods for reading or writing a data buffer to a specified endpoint.
    On the other hand, a PCI card is accessed by mapping a set of registers into the
    kernel''s address space, which can then be read from and written to by the driver
    the same way in which it writes to any other memory address.


    Lastly, drivers need a way to provide their services to the rest of the operating
    system. This is perhaps the area where the object-oriented design of the I/O Kit
    shines. The main class of the driver can be implemented as the subclass of one
    of the specialized classes provided by the I/O Kit for certain types of driver.
    For example, a driver that implements a serial port will subclass the standard
    `IOSerialStreamSync` class. Similarly, a driver that implements an audio output
    device will subclass the `IOAudioDevice` class.


    The advantage of implementing a driver by subclassing is that your driver inherits
    the behavior and implementation from the parent class. There are certain operations
    that are common to every serial port and to every audio device, and this behavior
    is implemented by the superclass, saving driver developers from having to write
    boilerplate code. Developers can then concentrate on code that is specific to
    their particular hardware device. The superclass will call the driver when a device-specific
    action is required.


    If you''ve implemented a driver for any other operating system, you have no doubt
    had to implement a dispatch routine that usually takes the form of one large switch
    statement in order to handle all the possible requests that the operating system
    may make and then calling the appropriate function in your driver that implements
    that request. The I/O Kit takes a different approach. Driver requests take the
    form of method calls. The driver simply needs to implement or override methods
    that are provided by its superclass. These methods are specific to the driver
    type. For example, a serial driver is concerned with transmitting bytes and receiving
    bytes over the serial port, so the `IOSerialStreamSync` class provides pure virtual
    methods `enqueueData()` and `dequeueData()` to be implemented by the subclass
    when these actions need to be performed.


    For a specialized device, the I/O Kit may not provide a suitable superclass. For
    example, there is no suitable superclass provided by the I/O Kit to implement
    a driver for a specialized medical imaging device. The driver for such a device
    would be implemented by a class that subclasses from the generic `IOService` class.
    The `IOService` provides methods to manage the driver''s lifecycle, including
    initialization and destroying the driver object.


    Lastly, a driver may provide an interface to user space applications. In I/O Kit
    terminology, this is handled by implementing a class known as a “user client.”
    The user client is a custom class implemented by the driver that subclasses the
    `IOUserClient` class. Whenever an application opens a connection to the driver,
    the I/O Kit instantiates a new user client object that handles all the requests
    coming from that application''s connection to the driver. When the application
    closes that connection to the driver, or the application terminates (or crashes),
    the user client is destroyed. If an application opens multiple connections to
    the driver, the I/O Kit will instantiate as many user client objects as there
    are connections made.


    ### Object Relationship


    As we have seen, there are two important classes for an I/O Kit driver, one being
    the superclass that the main driver class inherits from and the other being the
    provider class that the driver uses to access its hardware. This design means
    that the functionality that the driver implements is separate from the way in
    which the driver''s hardware device connects to the computer. For example, a driver
    that supports a PCI sound card and a driver that supports a USB audio output device
    will both inherit from the same `IOAudioDevice` superclass, and the operating
    system will interface to both drivers by making the same calls to each driver.
    After all, the operating system''s audio subsystem shouldn''t need to care how
    an audio output device connects to the computer.


    This separation also encourages code reuse. A company that manufactures both PCI
    and USB based audio devices could potentially use the same driver for both devices,
    with the driver receiving a provider class that is of type `IOPCIDevice` or `IOUSBDevice`,
    depending on which of the two hardware devices is connected to the computer. Or,
    perhaps more conceivably, the hardware vendor could create its own superclass
    that implements the common functionality for both devices, which is itself a subclass
    of `IOAudioDevice`. The driver for the vendor''s PCI and USB devices would need
    only a minimal implementation, with much of the common functionality coming from
    their custom superclass. Such an arrangement is shown in [Figure 4-1](#Chapter04.html#fig_4_1).


    ![images](images/0401.jpg)


    ***Figure 4-1.** An example of the relationship between an I/O Kit driver and
    its superclass and provider class*'
  trans: "\n### I/O Kit 模型\n\nI/O Kit 是一个面向对象的框架，因此它需要一种能提供面向对象编程抽象的语言。苹果公司选择使用 C++\
    \ 语言来实现 I/O Kit，因此，为 Mac OS X 编写的驱动程序都是用 C++ 开发的。\n\n虽然选择 C++ 进行驱动开发在操作系统中独树一帜，但这反映了\
    \ Mac OS X 的现代特性。Mac OS X 的初始版本于 2001 年发布，苹果公司借此机会设计了全新的驱动开发模型。选择 C++ 体现了 I/O\
    \ Kit 设计时计算机硬件和编译器的状态。\n\n选择面向对象语言具有显著优势。计算机系统中的硬件，本质上是通过多种不同总线连接的一系列设备。例如，一个\
    \ USB 设备可能连接到键盘的内部 USB 集线器，而该集线器本身又连接到 iMac 的 USB 端口。在内部，USB 端口由 iMac 主板上的 USB\
    \ 控制器芯片处理，该芯片通过内部 PCI 总线连接到主板芯片组控制器。通过采用面向对象的驱动模型，I/O Kit 能够通过驱动对象镜像出相同的硬件连接结构。\n\
    \n驱动程序的作用是让操作系统——最终是用户——能够利用硬件实现的服务。操作系统通过以下方式帮助驱动程序：当硬件设备存在时加载其驱动程序，为驱动程序提供访问和与硬件设备交互的方式，并提供接入点，使驱动程序能够将其服务插入操作系统。\n\
    \n![images](img/square.jpg)  \n**注意：** I/O Kit 使用术语“nub”来描述为其他驱动程序提供服务的驱动。例如，USB\
    \ 集线器的驱动程序就是一个 nub，因为它为连接到其上的 USB 设备的驱动程序提供服务。\n\n选择面向对象的设计对 I/O Kit 非常有利。每个驱动程序都作为一个\
    \ C++ 类实现，这使得 I/O Kit 能够为系统中存在的每个硬件设备实例实例化一个新的驱动对象。驱动程序的硬件设备通过一个称为驱动“提供者”（provider）的对象来访问，该对象在初始化时提供给驱动程序。I/O\
    \ Kit 将使用适合于设备所用硬件总线的提供者类。例如，一个 USB 设备将拥有一个 `IOUSBDevice` 实例的提供者类，而一个 PCI 卡的驱动程序将拥有一个\
    \ `IOPCIDevice` 实例的提供者类。这些总线接口的不同能力被不同的提供者类类型所抽象化。例如，USB 设备有多个用于数据传输或读取的端点，因此\
    \ `IOUSBDevice` 类包含了用于向指定端点读取或写入数据缓冲区的方法。另一方面，访问 PCI 卡需要通过将一组寄存器映射到内核的地址空间，然后驱动程序可以像写入任何其他内存地址一样，对这些寄存器进行读写操作。\n\
    \n最后，驱动程序需要一种方法将其服务提供给操作系统其余部分。这或许是 I/O Kit 面向对象设计最出色的地方。驱动程序的主类可以实现为 I/O Kit\
    \ 为特定类型驱动提供的专用类的子类。例如，实现串口的驱动程序将继承标准 `IOSerialStreamSync` 类。类似地，实现音频输出设备的驱动程序将继承\
    \ `IOAudioDevice` 类。\n\n通过子类化实现驱动程序的优势在于，你的驱动程序继承了父类的行为和实现。每个串口和每个音频设备都有一些通用操作，这些行为由超类实现，从而免除了驱动开发者编写样板代码的负担。开发者可以专注于特定硬件设备相关的代码。当需要执行设备特定的操作时，超类会调用驱动程序。\n\
    \n如果你曾为其他任何操作系统实现过驱动程序，你无疑需要实现一个分发例程，该例程通常采用一个庞大的 `switch` 语句形式，以处理操作系统可能发出的所有请求，然后调用驱动中实现该请求的适当函数。I/O\
    \ Kit 采用了不同的方法。驱动请求以方法调用的形式存在。驱动程序只需实现或重写其超类提供的方法即可。这些方法特定于驱动类型。例如，串口驱动程序关注的是通过串口传输和接收字节，因此\
    \ `IOSerialStreamSync` 类提供了纯虚方法 `enqueueData()` 和 `dequeueData()`，以便在需要执行这些操作时由子类实现。\n\
    \n对于专用设备，I/O Kit 可能不提供合适的超类。例如，对于实现专用医疗成像设备的驱动程序，I/O Kit 没有提供合适的超类。此类设备的驱动程序将通过一个继承自通用\
    \ `IOService` 类的类来实现。`IOService` 提供了管理驱动生命周期的方法，包括驱动对象的初始化和销毁。\n\n最后，驱动程序可以向用户空间应用程序提供接口。用\
    \ I/O Kit 的术语来说，这是通过实现一个称为“用户客户端”（user client）的类来处理的。用户客户端是驱动程序实现的一个自定义类，它继承自\
    \ `IOUserClient` 类。每当应用程序打开与驱动程序的连接时，I/O Kit 就会实例化一个新的用户客户端对象，用于处理来自该应用程序与驱动程序连接的所有请求。当应用程序关闭与驱动程序的连接，或者应用程序终止（或崩溃）时，该用户客户端会被销毁。如果应用程序打开了与驱动程序的多个连接，I/O\
    \ Kit 将实例化与连接数量相同的用户客户端对象。\n\n### 对象关系\n\n正如我们所看到的，I/O Kit 驱动程序有两个重要的类：一个是主驱动类继承的超类，另一个是驱动程序用来访问其硬件的提供者类。这种设计意味着驱动程序实现的功能与驱动程序硬件设备连接到计算机的方式是分离的。例如，支持\
    \ PCI 声卡的驱动和支持 USB 音频输出设备的驱动都将继承自同一个 `IOAudioDevice` 超类，操作系统将通过向每个驱动发出相同的调用来与这两个驱动交互。毕竟，操作系统的音频子系统不应该关心音频输出设备是如何连接到计算机的。\n\
    \n这种分离也鼓励了代码复用。一家同时生产基于 PCI 和 USB 音频设备的公司，可以为这两种设备使用相同的驱动程序，驱动程序接收到的提供者类根据连接到计算机的是两种硬件设备中的哪一种，而分别是\
    \ `IOPCIDevice` 或 `IOUSBDevice` 类型。或者，更有可能的是，硬件厂商可以创建自己的超类来实现这两种设备的通用功能，这个超类本身又是\
    \ `IOAudioDevice` 的子类。厂商的 PCI 和 USB 设备的驱动程序只需极少的实现，大部分通用功能都来自其自定义的超类。这种安排如图 4-1\
    \ 所示。\n\n![images](img/0401.jpg)\n\n***图 4-1.** I/O Kit 驱动与其超类及提供者类之间关系的示例*\n"
- fmt: '### The Info.plist File


    The Macintosh platform has always supported a plug-and-play design for devices,
    which requires no configuration after installing the driver. Mac OS X, with the
    help of the I/O Kit, is no exception. Unlike the kernel extension that we developed
    in the previous chapter, which loads as soon as it is added to the system, a driver
    is loaded only when one of the devices that it supports is connected to the computer.
    In this way, even though there may be hundreds of drivers installed on a system,
    only those that correspond to hardware that is actually connected to the computer
    will be loaded and taking up memory.


    In [Chapter 3](#Chapter03.html#ch3), we saw that a kernel extension requires a
    property list file to define such things as its entry points. The property list
    is even more important for a kernel extension that implements an I/O Kit driver.
    For an I/O Kit driver, the property list specifies the list of hardware devices
    that the driver is able to support. Each device supported by a driver contains
    its own "personality" in the property list, which consists of a "matching dictionary"
    that consists of an array that describes each hardware device to match against.
    The driver will be loaded only if one of the hardware devices described in its
    matching dictionary is connected to the computer.


    One of the most important values contained in each matching dictionary is the
    `IOProviderClass`, which defines the class type of the driver''s provider, such
    as `IOUSBDevice` or `IOPCIDevice`. Whenever a new hardware device is connected
    to the computer, the I/O Kit creates an appropriate nub for that device, and then
    begins the process of finding a suitable driver for that nub. For example, a USB
    device connection is handled as follows:


    1. The user connects a USB device to the computer.

    2. A new instance of `IOUSBDevice` is created to represent the device.

    3. The I/O Kit iterates over all drivers that contain a matching dictionary listing
    a provider class of `IOUSBDevice`.

    4. The `IOUSBDevice` examines the entire contents of the matching dictionary for
    the driver.

    5. If the requested properties of the matching dictionary correspond to the properties
    of the device, the driver is added to a list of potential drivers for the device.


    Importantly, it is the provider class that decides whether a driver is suitable
    for a particular hardware device. It does this by examining the properties from
    a potential driver''s matching dictionary; however, the particular properties
    that are used will be specific to the driver family. For example, a USB driver
    may match against a specific vendor ID and product ID of the USB device, or may
    match against a generic class of device such as any USB keyboard. A PCI device
    may be matched on the vendor ID and device ID specified in the device''s PCI configuration
    space or against any PCI class, such as a network card or a display card.


    Following the preceding steps, the I/O Kit has narrowed the list of drivers for
    the device down to an array of potential matches. To determine the best driver
    for the hardware device, the I/O Kit uses the notion of a "probe score" for each
    driver. Each driver nominates a probe score that provides a relative measure,
    in some way, of that driver''s suitability for the device. The driver with the
    highest probe score is the one that is ultimately chosen to work with the device.


    The driver''s probe score can be set in two ways. One way is for a driver to provide
    a probe score in its matching dictionary. For example, a company that manufactures
    a custom USB keyboard could provide a driver whose matching dictionary matches
    against the exact product ID of the company''s keyboard, with a probe score that
    is higher than the system''s default keyboard driver. Another way that the probe
    score can be set is through "active matching," in which the I/O Kit instantiates
    each potential driver, temporarily attaches it to the hardware device, and provides
    it with a chance to interrogate the device and determine its probe score. During
    probe, the driver has full access to the hardware, so it can perform as much interrogation
    of the device as is required to determine its suitability to drive that device.
    The driver can adjust its probe score, or more commonly, can use the `probe` method
    to opt-out of matching against a device if it determines that it is unable to
    work with the connected hardware.


    For example, a driver''s implementation of `probe` could determine the version
    of firmware that is loaded on the device, and if the firmware is of a later version
    than that supported by the driver, it could refuse to load. Failing during the
    `probe` stage is more efficient than failing later on, when the driver has been
    selected as the driver for the device, because the I/O Kit does not need to continue
    on and start your driver, although, in both cases, the I/O Kit will continue by
    attempting to load the driver with the next highest probe score.


    While in almost all cases only one driver is attached to a device, the I/O Kit
    does allow multiple drivers to be loaded for a single device. By adding an extra
    key to a driver''s matching dictionary known as a "match category," the I/O Kit
    will load the driver with the highest probe score in each match category and attach
    it to the device. If no match category is given in the driver''s matching dictionary,
    a default category is assumed.


    The matching process is recursive, and drivers may themselves be nubs that act
    as a provider to other classes. For example, the driver for a PCI card that implements
    a USB host controller would match against an `IOPCIDevice`, but would create `IOUSBDevice`
    instances of its own to represent devices that have been connected to its own
    ports. In this way, the `IOUSBDevice` instances created by the driver would in
    turn become the provider class for other drivers, as shown in [Figure 4-2](#Chapter04.html#fig_4_2).
    Rather than instantiate a class of type `IOUSBDevice` directly, a driver of this
    type would likely provide its own implementation of a class that inherits from
    `IOUSBDevice`, which is shown in [Figure 4-2](#Chapter04.html#fig_4_2) as `MyUSBDevice`.


    Any driver that uses an instance of `MyUSBDevice` as a provider would talk to
    the provider through its standard `IOUSBDevice` interface, but the use of virtual
    methods would allow the `MyUSBDevice` implementation to override these methods
    and provide its own implementation.


    ![images](images/0402.jpg)


    ***Figure 4-2.** An example of a driver that is also a nub, creating objects that
    serve as the provider class to other drivers*


    Another example of a driver that acts as a nub, which is in fact a far more common
    scenario, is a driver that accepts connections from user applications. As mentioned
    earlier, for each connection that a user application makes to a driver, the I/O
    Kit instantiates a new object known as a "user client" to handle the control requests
    from the application and to pass them on to the driver. Like the main driver class,
    the user client class is also an I/O Kit service and it inherits from the same
    `IOService` base class as any other driver object. Each user client uses the main
    driver object as its provider class. Unlike the main driver, however, a user client
    doesn''t need to go through the matching stage because the driver nominates the
    specific class name of its user client.'
