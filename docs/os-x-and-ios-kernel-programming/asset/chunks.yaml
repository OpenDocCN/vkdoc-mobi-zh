    of the kernel, all these commands must be run with super-user permissions. This
    can be accomplished by prefixing commands with *sudo*.


    We are now ready to load the “Hello World” kernel extension. To do this, run the
    following command in Terminal:


    `sudo kextload HelloWorld.kext`


    Although the “Hello World” kernel extension has been loaded and its start entry
    point called, you won''t see the result of our call to `printf` in the terminal
    window. Instead, the output from calling the kernel''s implementation of `printf`
    is written to a log file. To confirm the “Hello World” kernel extension was loaded,
    you can use the `kextstat` command, as follows:


    `kextstat`


    This will print a list of the running kernel extensions. Since the “Hello World”
    extension will be one of the most recent extensions to have been loaded, it should
    appear at the end of the list. An example of the output from `kextstat` is shown
    in [Listing 3-4](#Chapter03.html#list_3_4).


    ***Listing 3-4.** The Output from the kextstat Command, with Our Kernel Extension
    Highlighted*


    `Index  Refs   Address             Size        Wired     Name (Version) <Linked
