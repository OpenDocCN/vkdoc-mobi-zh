- fmt: '### Book Structure


    以下是对本书各章节的简要描述：


    **[Chapter 1](#Chapter01.html#ch1), Operating System Fundamentals**。详细介绍了操作系统的功能及其在管理计算机硬件资源中的作用。我们描述了设备驱动程序的目的及其何时需要，并介绍了内核环境编程与标准应用程序开发之间的区别。


    **[Chapter 2](#Chapter02.html#ch2), Mac OS X and iOS**。简要概述了`XNU`（Mac OS X 和 iOS
    使用的内核）的技术结构。


    **[Chapter 3](#Chapter03.html#ch3), Xcode and the Kernel Development Environment**。概述了
    Apple 为 Mac OS X 和 iOS 开发提供的开发工具。本章以一个简短的“Hello world”内核扩展结束。


    **[Chapter 4](#Chapter04.html#ch4), The I/O Kit Framework**。介绍了提供 Mac OS X 驱动模型及其面向对象架构的`I/O
    Kit`框架。我们解释了`I/O Kit`如何找到合适的设备驱动程序来管理硬件设备。我们演示了一个通用设备驱动程序，以说明任何`I/O Kit`驱动程序的基本结构。


    **[Chapter 5](#Chapter05.html#ch5), Interacting with Drivers from Applications**。解释了应用程序代码如何访问内核驱动程序。我们演示了如何搜索和匹配特定驱动程序，以及如何安装通知以等待驱动程序或特定设备的到来。我们将展示应用程序如何向驱动程序发送命令并监视驱动程序发送的事件。


    **[Chapter 6](#Chapter06.html#ch6), Memory Management**。概述了内核内存管理以及驱动程序需要处理的不同类型的内存。我们描述了物理地址、内核虚拟地址与用户空间内存之间的区别。我们还向读者介绍了内存描述符和内存映射等概念。


    **[Chapter 7](#Chapter07.html#ch7), Synchronization and Threading**。描述了同步的基本原理以及为什么每个内核驱动程序都需要同步。我们讨论了内核锁定机制（如`IOLock`和`IOCommandGate`）的使用及其适用场景。我们解释了典型驱动程序如何在其自身线程、用户空间线程和硬件中断之间进行同步。我们讨论了用于创建内核线程和异步定时器的内核设施。


    **[Chapter 8](#Chapter08.html#ch8), USB Drivers**。向读者介绍了 USB 的架构以及驱动程序如何与其交互。我们概述了`I/O
    Kit` USB API 及其提供的用于枚举设备和向 USB 设备传输数据或从 USB 设备接收数据的类。我们还讨论了支持设备移除所需的步骤，并提供了一个示例，展示驱动程序如何枚举管道等资源。


    **[Chapter 9](#Chapter09.html#ch9), PCI and Thunderbolt**。概述了 PCI 架构。我们还描述了 PCI
    驱动程序独有的概念，例如内存映射 I/O、通过直接内存访问（DMA）进行高速数据传输以及设备中断的处理。我们概述了`I/O Kit`提供的用于访问和配置 PCI
    设备的`IOPCIDevice`类。我们还讨论了相关的、更新的 Thunderbolt 技术。


    **[Chapter 10](#Chapter10.html#ch10), Power Management**。描述了驱动程序需要实现的方法，以允许系统进入低功耗状态（如机器休眠）。我们还描述了高级电源管理，如果驱动程序希望在其硬件空闲一段时间后将其置于低功耗状态，则可以实施该管理。


    **[Chapter 11](#Chapter11.html#ch11), Serial Port Drivers**。描述了如何在 Mac OS X 上实现串行端口驱动程序。我们介绍了相关的数据结构，例如循环队列，以及通过阻塞
    I/O 和通知事件管理数据流的技术。我们展示了用户应用程序如何枚举和访问串行端口驱动程序。


    **[Chapter 12](#Chapter12.html#ch12), Audio Drivers**。讨论了如何使用`IOAudioFamily`框架开发系统范围的音频输入和输出设备。我们演示了一个简单的虚拟音频设备，它将音频输出复制到其输入。


    **[Chapter 13](#Chapter13.html#ch13), Network Drivers**。描述了如何使用`IONetworkingFamily`实现网络接口。我们还介绍了如何编写网络过滤器来过滤、阻止和修改网络数据包。本章以一个如何编写以太网驱动程序的示例结束。


    **[Chapter 14](#Chapter14.html#ch14), Storage Drivers**。涵盖了 Mac OS X 上为磁盘和 CD
    等存储设备提供支持的存储驱动程序栈。我们描述了存储栈每一层的驱动程序，包括如何编写 RAM 磁盘、分区方案以及提供磁盘加密的过滤器驱动程序。


    **[Chapter 15](#Chapter15.html#ch15), User Space USB Drivers**。描述了某些驱动程序如何完全在用户应用程序内部实现。我们描述了这种方法的优点以及可能不适用的场景。


    **[Chapter 16](#Chapter16.html#ch16), Debugging**。包含关于如何调试驱动程序的实用信息，以及常见问题和陷阱。它将使读者能够从内核崩溃报告追溯到其代码中的位置，这是内核开发者经常面对的场景。我们将讨论
    OS X 为实现此目的提供的工具，例如 GNU 调试器（`GDB`）。


    **[Chapter 17](#Chapter17.html#ch17), Advanced Kernel Programming**。探讨了内核编程中的一些更高级主题，例如使用
    SSE 和浮点运算或实现高级驱动程序架构。


    **[Chapter 18](#Chapter18.html#ch18), Deployment**。通过描述如何向最终用户分发驱动程序来结束本书。我们介绍了
    Apple 安装系统在首次安装和升级中的使用。本章包含关于如何避免常见驱动程序安装问题的实用技巧。


