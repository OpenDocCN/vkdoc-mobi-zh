- fmt: "# “Hello World” Kernel Extension\n\nTo get started with kernel programming,\
    \ let's begin by implementing a very simple example, the much beloved “Hello World”\
    \ application or, in our case, kernel extension. First, launch Xcode and choose\
    \ “Create a new Xcode project” from the welcome screen. This will present you\
    \ with a list of templates for the new project. If you select the “System Plug-in”\
    \ category, you will see that Xcode provides templates for both a “Generic Kernel\
    \ Extension” and an “I/O Kit Driver.” Although both templates create a kernel\
    \ extension, an I/O Kit driver requires us to nominate a hardware device it will\
    \ match against and will load only if that device is present. A generic kernel\
    \ extension, on the other hand, is not a hardware driver and can be loaded any\
    \ time by the user.\n\nFor this tutorial, we will create a project based on the\
    \ “Generic Kernel Extension” template, so select that item and click the “Next”\
    \ button. We are now asked for a product name and company identifier. The product\
    \ name corresponds to the name of the executable file as seen by the user, so\
    \ for this example, we will use “HelloWorld.” The company identifier should be\
    \ a reverse DNS style string for a domain name you or your company has registered.\
    \ For this example, you are free to use “com.osxkernel,” which is a domain registered\
    \ for the purpose of this book. By appending the product name to the company identifier,\
    \ Xcode creates a string that is guaranteed to be unique for the project and will\
    \ not collide with the name of any existing kernel extension (the unique identifier\
    \ for this tutorial would be “com.osxkernel.HelloWorld.”)\n\n![images](images/square.jpg)\
    \ **Note** The reverse DNS convention is used throughout Mac OS X in places where\
    \ a unique identifier is required. We will see in later chapters that the I/O\
    \ Kit uses a similar scheme to ensure the names of C++ classes are unique. Previous\
    \ versions of Mac OS 9 used a unique four-character constant to identify applications,\
    \ which required developers to register their chosen string with Apple. Using\
    \ reverse DNS allows developers to generate their own unique identifier without\
    \ having to register them with Apple.\n\nAfter clicking the “Create” button, Xcode\
    \ will generate a project for you, including an implementation file named “HelloWorld.c.”\
    \ You can examine the contents of the source file named “HelloWorld.c” by clicking\
    \ on its icon in the left part of the project window. For this tutorial, modify\
    \ the generated source code to include the header file `<libkern/libkern.h>` and\
    \ to add two calls to `printf()`. The function named `HelloWorld_start()` will\
    \ be called when our kernel extension is loaded and the function named `HelloWorld_stop()`\
    \ will be called when the kernel extension is unloaded. When you have finished\
    \ editing the file, the code should look like [Listing 3-1](#Chapter03.html#list_3_1).\n\
    \n***Listing 3-1.** The “HelloWorld.c” Tutorial*\n\n```\n#include <mach/mach_types.h>\n\
    #include <libkern/libkern.h>\n\nkern_return_t   HelloWorld_start (kmod_info_t\
    \ * ki, void * d) {\n    printf(\"Hello world\\n\");\n    return KERN_SUCCESS;\n\
    }\n\nkern_return_t   HelloWorld_stop (kmod_info_t * ki, void * d) {\n    printf(\"\
    Goodbye world\\n\");\n    return KERN_SUCCESS;\n}\n```\n\nAs we mentioned in [Chapter\
    \ 1](#Chapter01.html#ch1), the APIs used for writing kernel code are generally\
    \ different to those available to user applications; this applies even to functions\
    \ such as `printf()`. Rather than including the user space header `<stdio.h>`,\
    \ the kernel has its own implementation of `printf` that is declared in the header\
    \ file `<libkern/libkern.h>`. If you try to include `<stdio.h>` in a kernel project,\
    \ the compiler will report that it cannot find the included header file.\n\nAs\
    \ well as including the header file that defines the `printf()` function, we also\
    \ need to link our kernel extension against the library that provides the actual\
    \ implementation of `printf`. Rather than a compile-time linking, the kernel resolves\
    \ any library dependencies of a kernel extension only when the kernel extension\
    \ is loaded. To inform the kernel of our dependencies, we need to declare the\
    \ libraries we wish to link against in our kernel extension’s property list, a\
    \ file that goes by the name “HelloWorld-Info.plist” in this tutorial project.\n\
    \nTo modify the property list, click on the file named “HelloWorld-Info.plist”\
    \ in the project window. Although the format of the file is text-based XML, Xcode\
    \ contains a graphical editor for manipulating property list files, as shown in\
    \ [Figure 3-2](#Chapter03.html#fig_3_2). Add a new item to the `OSBundleLibraries`\
    \ dictionary of your property list to include an item with the key name `com.apple.kpi.libkern`\
    \ and the value `9.0.0`. When you are finished, your property list should look\
    \ identical to [Figure 3-2](#Chapter03.html#fig_3_2).\n\n![images](images/0302.jpg)\n\
    \n***Figure 3-2.** The graphical property list editor in Xcode*\n\nThe XML that\
    \ corresponds to the addition we made to the property list file is shown in [Listing\
    \ 3-2](#Chapter03.html#list_3_2).\n\n***Listing 3-2.** The Value of the `OSBundleLibraries`\
    \ Entry for Our Tutorial Kernel Extension*\n\n```\n<key>OSBundleLibraries</key>\n\
    <dict>\n        <key>com.apple.kpi.libkern</key>\n        <string>9.0.0</string>\n\
    </dict>\n```\n\nThe project’s property list is not used by the compiler (other\
    \ than to perform some preprocessing, which replaces variables such as `${PRODUCT_NAME}`\
    \ with their actual value), but is intended for the kernel. The property list\
    \ is copied to the compiled kernel extension and is read when the extension is\
    \ loaded. The entry we added to the dictionary consists of a key-value pair; the\
    \ key identifies a kernel library on which we depend and the value corresponds\
    \ to the minimum required version of that library. In our case, we are informing\
    \ the kernel that we require a library with the unique identifier `com.apple.kpi.libkern`\
    \ and that we require version 9.0.0 or later of this library. The library identifier\
    \ uses a reverse DNS prefix to ensure the name is unique; in this case, the prefix\
    \ “com.apple” allows us to recognize the library as a standard library provided\
    \ by Apple.\n\n![images](images/square.jpg) **Tip** The version of the library,\
    \ in our case 9.0.0, is the version of the Mac OS X kernel, not the version of\
    \ Mac OS X itself. Version 9.0.0 corresponds to Mac OS X 10.5.0. You can determine\
    \ the version of the kernel on your machine by typing the command `uname –r` into\
    \ Terminal.\n\n![images](images/square.jpg) **Note** You may have noticed that\
    \ the project created from the Xcode template includes an item named “Kernel.framework”\
