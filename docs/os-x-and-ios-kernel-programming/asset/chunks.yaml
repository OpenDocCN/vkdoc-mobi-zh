    call the superclass''s implementation of `start()`, and if this fails, it should
    abort immediately. The driver should use the `start()` method to configure the
    hardware for operation, and should initialize any resources that it needs while
    running. If for any reason the method fails and the driver is unable to go on
    to control the hardware, the method should return false. The I/O Kit will then
    provide the driver with the next highest probe score a chance to control the device.

    4.  `stop()`. This method isn''t called until either the device is removed or
    the driver is manually unloaded. This method is the opposite of `start()`; any
    configuration or allocation that was performed in the `start()` method should
    be released when `stop()` is called. Finally, the implementation should call the
    superclass''s implementation of `stop()`.

    5.  `free()`. Finally, before the driver''s object is destroyed, the I/O Kit calls
    its `free()` method. Its purpose is the same as a destructor of a C++ class. This
    provides the driver with a chance to release any resources that were allocated
    in its `init()` method. This method is called even if a driver was never selected
    as the best match for a particular device. The implementation should end by calling
    the superclass''s implementation of `free()`.


    A consequence of limited exception support is that rather than using the traditional
    C++ approach of performing object initialization in the class''s constructor and
    throwing an exception if an error occurs, the initialization of I/O Kit objects
    is performed in a custom method named “`init`,” which returns a Boolean value
    to signal success.'
  trans: "```cpp\nvoid com_osxkernel_driver_IOKitTest::free (void)\n{\n        IOLog(\"\
    IOKitTest::free\\n\");    \n        super::free();\n}\n\nIOService* com_osxkernel_driver_IOKitTest::probe\
    \ (IOService* provider, SInt32* score)\n{\n        IOService *res = super::probe(provider,\
    \ score);\n        IOLog(\"IOKitTest::probe\\n\");    \n        return res;\n\
    }\n\nbool com_osxkernel_driver_IOKitTest::start (IOService *provider)\n{\n   \
    \     bool res = super::start(provider);      \n        IOLog(\"IOKitTest::start\\\
    n\");    \n        return res;\n}\n\nvoid com_osxkernel_driver_IOKitTest::stop\
    \ (IOService *provider)\n{\n        IOLog(\"IOKitTest::stop\\n\");    \n     \
    \   super::stop(provider);\n}\n```\n\n![images](img/square.jpg) **注意：** I/O Kit\
    \ 的约定是定义一个名为“super”的宏作为当前类的父类名称。这允许将方法轻松委托给父类实现，如代码清单 4-3 所示。\n\n最后，我们需要通过 `Info.plist`\
    \ 文件定义驱动程序的匹配字典和库依赖项。在 `IOKitPersonalities` 字典中添加一个名为“IOKitTest”的新字典键，该键包含以下值：\n\
    \n![images](img/p59-01.jpg)\n\n我们还需要向 `OSBundleLibraries` 字典添加两个条目：\n\n![images](img/p59-02.jpg)\n\
    \n项目属性列表的最终版本如图 4-3 所示。\n\n![images](img/0403.jpg)\n\n***图 4-3.** IOKitTest 教程的属性列表，包含匹配字典*\n\
    \n鉴于驱动程序的目标是控制硬件，并且 I/O Kit 仅在其硬件设备存在时才会加载驱动程序，您可能会想知道如何测试此驱动程序。幸运的是，I/O Kit 提供了一个特殊的桩（nub），名为\
    \ `IOResources`，它可以作为无硬件设备驱动程序的提供者类，例如这里列出的教程驱动程序。在系统中，会有多个驱动程序与 `IOResources`\
    \ 桩匹配，因此为了允许多个驱动程序附加到 `IOResources`，必须在驱动程序的匹配字典中定义 `IOMatchCategory` 键。\n\n由于\
    \ I/O Kit 允许一个桩在每个匹配类别上附加一个驱动程序，指定一个唯一的类别可以使驱动程序加载，并且不会阻止其他驱动程序在我们加载后与 `IOResources`\
    \ 提供者类匹配。为了完善匹配字典，我们需要为提供者类指定唯一的匹配标准。如果提供者类是一个 USB 设备，这可能是 USB 产品 ID 和供应商 ID 的形式。在我们的教程中，提供者类是\
    \ `IOResources`。一个名为“`IOResourceMatch`”的键是 `IOResources` 使用的匹配标准。在示例驱动程序的匹配字典中，此值设置为“`IOKit`”。这告诉提供者类在系统启动期间延迟加载驱动程序，直到\
    \ IOKit 子系统完全加载并初始化。\n\n您现在可以构建 `IOKitTest` 项目，该项目可以使用与第 3 章 中相同的“kextload”命令加载。如果您打开“控制台”实用工具并检查“kernel.log”文件的内容，您应该会看到驱动程序类的各个方法已被调用。\n\
    \n驱动程序类的调用顺序如下：\n\n1.  `init()`。此方法保证在类中的任何其他方法之前被调用。其目的与 C++ 类的构造函数相同。驱动程序的 `init()`\
    \ 方法应首先调用父类提供的实现，如果失败，应立即中止。此方法接收一个参数，即与 `Info.plist` 文件中选定驱动程序个性对应的匹配字典的副本。如果此方法成功，应返回\
    \ `true`；否则，应返回 `false`。\n2.  `probe()`。此方法在匹配期间被调用，使驱动程序有机会检查硬件设备，该设备通过名为“`provider`”的参数传递给方法。虽然参数“`provider`”是指向\
    \ `IOService` 的指针，但可以将其转换为匹配字典中指定的更专门的提供者类（例如 `IOUSBDevice`）。驱动程序的 `probe()` 实现应首先调用父类的实现，如果成功，则执行任何所需的硬件调查以确定驱动程序是否能够控制该硬件。如果驱动程序无法控制硬件，应从\
    \ `probe()` 方法返回 `NULL`；否则，应返回应控制此设备的 `IOService` 子类的实例。在几乎所有情况下，此方法将返回当前的 `IOService`\
    \ 实例（“`this`”）。\n3.  `start()`。如果之前对 `probe()` 的调用成功，并且驱动程序被选为最适合控制硬件设备（基于其探测分数），则调用其\
    \ `start()` 方法。实现应首先调用父类的 `start()` 实现，如果失败，应立即中止。驱动程序应使用 `start()` 方法配置硬件以供运行，并应初始化其运行时所需的任何资源。如果由于任何原因方法失败且驱动程序无法继续控制硬件，则方法应返回\
    \ `false`。然后，I/O Kit 将向具有次高探测分数的驱动程序提供控制设备的机会。\n4.  `stop()`。此方法在设备被移除或驱动程序被手动卸载之前不会被调用。此方法与\
    \ `start()` 相反；在调用 `stop()` 时，应释放 `start()` 方法中执行的任何配置或分配。最后，实现应调用父类的 `stop()`\
    \ 实现。\n5.  `free()`。最后，在驱动程序对象被销毁之前，I/O Kit 会调用其 `free()` 方法。其目的与 C++ 类的析构函数相同。这为驱动程序提供了释放其\
    \ `init()` 方法中分配的任何资源的机会。即使驱动程序从未被选为特定设备的最佳匹配，也会调用此方法。实现应通过调用父类的 `free()` 实现来结束。\n\
    \n异常支持有限的一个后果是，I/O Kit 对象的初始化不是使用传统的 C++ 方法在类的构造函数中执行对象初始化并在发生错误时抛出异常，而是在一个名为“`init`”的自定义方法中执行，该方法返回一个布尔值来表示成功。"
- fmt: "#### `IORegistryExplorer`\n\nApple provides a very useful tool for visualizing\
    \ the drivers loaded on a system, known as “`IORegistryExplorer`.” This is included\
    \ as part of the Xcode tools. `IORegistryExplorer` displays a graphical representation\
    \ of the drivers that are currently loaded on the system and their relationship\
    \ to other drivers. This relationship is shown as a hierarchical representation,\
    \ with a provider class having a parent relationship to the clients that are connected\
    \ to it.\n\n`IORegistryExplorer` shows a representation of an entity known as\
    \ the I/O Registry. If you're coming from a Windows background, don't confuse\
    \ the I/O Registry with the Windows Registry. The I/O Registry is a tree of I/O\
    \ Kit objects that is created when the system is started, and then it dynamically\
    \ grows or shrinks as hardware devices and their corresponding drivers are loaded\
    \ or unloaded from the system. Unlike the Windows Registry, the I/O Registry is\
    \ never written to disk or saved between reboots of the computer.\n\nThe `IOService`\
    \ plane includes all objects in the I/O Registry. As such, it can be a little\
    \ overwhelming when trying to locate a particular driver. To help find a particular\
    \ driver in the I/O Registry, `IORegistryExplorer` provides a search field that\
    \ can be used to filter the objects shown to those whose name matches a particular\
    \ string.\n\n`IORegistryExplorer` also displays the property table for each driver\
    \ object. When the I/O Kit loads a driver, it initializes its property table to\
    \ the contents of the matching dictionary that corresponds to the driver personality\
    \ that was loaded; this corresponds to the `OSDictionary` object that was passed\
    \ to the driver class's `init()` method. As the driver runs, it may manipulate\
    \ its property list by adding or removing additional key/value pairs or by changing\
    \ the value of a particular key. These changes are local to the driver instance\
    \ (and so if the same driver is loaded multiple times for several devices in the\
    \ system, they each have their own property table). [Figure 4-4](#Chapter04.html#fig_4_4)\
    \ shows `IORegistryExplorer` for the sample IOKit driver that we developed earlier.\n\
    \n![images](images/0404.jpg)\n\n**Figure 4-4.** `IORegistryExplorer` displaying\
    \ the IOKitTest sample. The property table shown on the right was initialized\
    \ from the contents of the driver's matching dictionary in its `Info.plist` file.\n\
    \nObjects in the I/O Registry are organized into several planes. Each plane shows\
    \ only those objects that share certain functionality. When launched, `IORegistryExplorer`\
    \ will default to showing the relationship of objects in the “`IOService`” plane,\
    \ which includes all objects in the I/O Registry. Some of the other planes that\
    \ are commonly used include:\n\n- **IODeviceTree:** This is a static plane that\
    \ reflects the hardware configuration of the system; it does not change as hardware\
    \ devices are connected to the system. The contents of the device tree largely\
    \ depend on the system motherboard and will consist of a static snapshot of the\
    \ computer's configuration at boot time, including PCI slots, built-in USB ports,\
    \ and any hardware controllers that are on the motherboard, such as the CPU, memory,\
    \ and USB controllers.\n- **IOPower:** This plane shows all driver objects that\
    \ have implemented power management and will receive notifications from the I/O\
    \ Kit when the system is switching to a different power state such as when entering\
    \ sleep mode.\n- **IOUSB:** This plane shows all USB devices and hubs that are\
    \ connected to the system. It includes the USB devices only; the corresponding\
    \ driver that has been loaded for a device can be seen in the `IOService` plane.\n\
    \nThe I/O Registry is also accessible on the command line through the tool “`ioreg`.”\
    \ Unlike `IORegistryExplorer`, which is available if the Xcode tools have been\
    \ installed, `ioreg` is a standard part of a Mac OS X installation and is useful\
    \ when debugging on an end-user's machine or any other system in which the developer\
    \ tools are unlikely to be installed.\n\n### The Kernel Library: `libkern`\n\n\
    The runtime support and base classes on which the I/O Kit is built are implemented\
    \ in a library known as `libkern`. The `libkern` library provides support that\
    \ makes up for much of the functionality that is excluded in the embedded C++\
    \ language. The `libkern` library defines a class known as `OSObject`, which provides\
    \ the base class that is used by all I/O Kit classes. Since the base driver class\
    \ `IOService` is a subclass of `OSObject`, the main class of a driver will also\
    \ be derived from `OSObject`. Any class that is derived from `OSObject` gets the\
    \ following functionality:\n\n- **Runtime Type Information**, which is implemented\
    \ through custom macros provided by `libkern`. These macros provide functionality\
    \ that includes:\n    - **Type introspection**, which is the ability at runtime\
    \ to determine the type of an object or whether it is derived from a given base\
    \ class\n    - **Dynamic casting**, which is the ability to cast an object to\
    \ the type of one of its derived classes (for example, to cast the provider class\
    \ from an object of type `IOService` to `IOUSBDevice`)\n- **Object creation**,\
    \ including the ability to instantiate an object based on a string representation\
    \ of its class name\n- **Object reference counting** based on `retain`/`release`\
    \ semantics\n- **Object tracking**, that is, the ability to determine how many\
    \ instances of a certain class have been instantiated but not yet released"
