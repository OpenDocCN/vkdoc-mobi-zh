  trans: '

    #### 配置空间寄存器


    所有 PCI 设备（包括桥接器）都有一组称为配置空间的寄存器。对于传统 PCI 设备，该空间最小为 256 字节，但在基于 PCI-X 2.0 和 PCI
    Express 的技术中，配置空间可长达 4096 字节，被称为扩展配置空间。配置空间寄存器的前 48 字节如图 9-1 所示。


    ![images](img/0901.jpg)


    ***图 9-1.** 标准 PCI 配置空间寄存器*


    灰色部分为必需寄存器；其他寄存器为可选寄存器。前 48 字节是标准化的，无论设备是基于 PCI、PCI-X 还是 PCIe，布局均相同。由于 PCI Express
    采用点对点架构（不使用共享总线），许多寄存器已不再适用。


    下面我们详细了解图 9-1 中的强制寄存器。


    - **厂商 ID（Vendor ID）**：包含一个 16 位的标识符，每个硬件制造商有唯一值。厂商 ID 由 PCI-SIG（特殊兴趣小组）分配给各硬件制造商。例如，苹果公司的厂商
    ID 为`0x106b`。操作系统通常根据厂商 ID 和设备 ID 的组合来确定应为设备加载哪个驱动程序。`0xffff`不是有效的厂商 ID。

    - **设备 ID（Device ID）**：同样为 16 位宽。与厂商 ID 不同，设备 ID 可由制造商自行分配，无需在中央注册表中维护。

    - **类别代码（Class Code）**：一个 24 位的寄存器，用于保存设备的类型分类。前 8 位保存基类（Base Class）。基类示例包括：未分类（`0x0`）、大容量存储控制器（`0x1`）、网络控制器（`0x2`）、显示控制器（`0x3`）等。接下来的
    8 位保存子类（Subclass）。例如，如果基类是显示控制器，子类可能是 VGA（`0x0`）、XGA（`0x1`）或其他（`0x80`）。剩余的 8 位用于指定设备的程序接口（寄存器级接口）（如果存在多种可能）。USB
    控制器会利用这些位来验证其是否符合 UHCI、OHCI、EHCI 或 XCHI 接口——这些寄存器级规范决定了驱动程序应如何与设备交互。

    - **子系统厂商/设备 ID（Subsystem Vendor/Device ID）**：遵循与厂商 ID 和设备 ID 相同的规则和分配原则。当多家不同制造商使用同一芯片（OEM）销售产品时，子系统
    ID 用于识别芯片。典型的例子是 Nvidia 和 ATI。他们制造 GPU 芯片，随后由第三方制造商利用这些芯片生产最终产品。此类设备的 PCI 配置空间包含第三方制造商的厂商
    ID 和设备 ID，但使用 Nvidia 或 ATI 作为子系统厂商 ID，并使用其设备 ID 作为子系统设备 ID。这样一来，即使板卡并非由 ATI 或
    Nvidia 直接制造，他们的驱动程序也能被使用。

    - **基地址 0-5（Base Address 0-5）**：包含最多六个 I/O 区域，这些区域可以是 I/O 端口或内存区域。后者更为常见。稍后我们将更详细地讨论
    I/O 区域。基地址常缩写为 BAR（基地址寄存器）。


    ### I/O Kit 中的 PCI


    I/O Kit 中的 PCI 由`IOPCIFamily`处理，它与`IOUSBFamily`一样，在其自身的 KEXT 中实现。就提供的类数量而言，`IOPCIFamily`比`IOUSBFamily`更简单。这意味着在实现驱动程序时，可供我们使用的构建块更少。从驱动程序的视角看，PCI
    比 USB 更底层，因此 PCI 设备的驱动程序编写通常更为复杂。图 9-2 展示了`IOPCIFamily`的类层次结构。


    ![images](img/0902.jpg)


    ***图 9-2.** IOPCIFamily 类层次结构*


    `IOPCIDevice`对象充当所有基于 PCI 的设备（包括 PCIe、Thunderbolt 和 ExpressCard）的*节点（nub）*或提供者。一个名为`IOAGPDevice`的`IOPCIDevice`子类用于处理较老的
    AGP（高级图形端口）显卡，然而，所有基于 Intel 的 Mac 都不再配备 AGP。在许多情况下，你只需与`IOPCIFamily`中的`IOPCIDevice`类进行交互。系统中每个
    PCI 设备都有一个此对象的实例；同样，系统中每个 PCI 桥接器都有一个`IOPCIBridge`实例。在某些情况下，驱动程序可能需要与其桥接器交互，以读取或写入桥接器的配置空间。虽然不常见，但也可以创建你自己的
    PCI 桥接器驱动程序。我们将在本章稍后讨论设备与桥接器的访问。根 PCI 桥接器（也称为主机桥接器和根复合体）由`IOPCIBridge`的一个名为`AppleACPIPCI`类的子类实现。此类是平台专家（Platform
    Expert）的一部分，由`AppleACPIPlatform` KEXT 实现，并控制对系统中所有设备与桥接器的访问。该类只有一个实例。`IOPCI2PCIBridge`类是
    PCI 到 PCI 桥接器的驱动程序。


    ![images](img/square.jpg) **提示** 与`IOUSBFamily`一样，`IOPCIFamily`并非*xnu*源代码发行版的一部分；而是可以从[`http://opensource.apple.com`](http://opensource.apple.com)单独下载得到。该源代码包包含了上述类的源代码，以及一个
    PCI 驱动程序示例和用于从 PCI 设备转储信息的用户空间工具源代码。

    '
- fmt: "#### Matching and Loading Drivers\n\nPCI drivers are commonly matched against\
    \ properties found in their configuration space registers, such as the vendor\
    \ ID, device ID, class, subsystem vendor ID, and subsystem device ID. Often, the\
    \ latter two are needed if a PCI device is based on a generic chip.\n\nThough\
    \ the configuration spaces contain more fields, they cannot be matched against\
    \ using a matching dictionary (property-based matching). If you need more advanced\
    \ matching, your driver will have to override the `IOService::probe(IOProvider*\
    \ service)` method, and you will have to examine the `IOPCIDevice` yourself to\
    \ determine if your driver matches the device. The keys listed in [Table 9-1](#Chapter09.html#tab_9_1)\
    \ can be used for matching against PCI-based devices.\n\n![images](images/t0901.jpg)\n\
    \n[Listing 9-1](#Chapter09.html#list_9_1) shows the matching dictionary for a\
    \ typical PCI device with a vendor ID or subsystem vendor ID of `0xabcd` and a\
    \ device ID or subsystem device ID of `0x1234`.\n\n**Listing 9-1.** *Simple Matching\
    \ Dictionary for a PCI Driver*\n\n```\n<key>IOKitPersonalities</key>\n<dict>\n\
    \    <key>MyPCIDriver</key>\n    <dict>\n        <key>CFBundleIdentifier</key>\n\
    \        <string>com.osxkernel.MyPCIDriver</string>\n        <key>IOClass</key>\n\
    \        <string>com_osxkernel_MyPCIDriver</string>\n        <key>IOProviderClass</key>\n\
    \        <string>IOPCIDevice</string>\n        <key>IOPCIMatch</key>\n       \
    \ <string>0x1234abcd</string>\n     </dict>\n</dict>\n```\n\nThe value is specified\
    \ as a 32-bit hexadecimal string in little-endian format. The first four characters\
    \ will represent the device ID and the last four characters will represent the\
    \ vendor ID. It is worth noting that the value is of the string type and not an\
    \ integer. The key `IOProviderClass` must have the value `IOPCIDevice` in order\
    \ for the I/O Kit to pass your driver an `IOPCIDevice` instance. If you need to\
    \ match against the vendor ID and device ID, you can substitute `IOPCIMatch` with\
    \ `IOPCIPrimaryMatch` or, if you only wish to match the subsystem IDs, you can\
    \ use `IOPCISecondaryMatch`.\n\nIf your driver handles multiple devices, this\
    \ can be done as a space-separated list as follows:\n\n```\n<key>IOPCIMatch</key>\n\
    <string>0x1234abcd 0x1235abcd 0x1236abcd</string>\n```\n\nThis will match device\
    \ IDs `0x1234`, `0x1235`, and `0x1236` of vendor `0xabcd`. If your driver supports\
    \ a large family of devices, you can use masks to achieve the same effect, rather\
    \ than enumerating each device separately.\n\n```\n<key>IOPCIMatch</key>\n<string>0x1230abcd&0xfff0ffff</string>\n\
    ```\n\n![images](images/square.jpg) **Note** If you are editing `Info.plist` directly,\
    \ you must express the ampersand (&) as `&amp`, as the ampersand symbol is used\
    \ to indicate an escape sequence in XML.\n\nThis will match every device ID beginning\
    \ with `0x123X`; for example, the range from `0x1230` to `0x123F`, and a vendor\
    \ ID of `0xabcd`. Bits that should be ignored by the mask must be set to zero.\n\
    \nYou can also match against the class register. To do this, you must specify\
    \ the `IOPCIClassMatch` key. The class register is 3 bytes wide. However, to match\
    \ against it, the I/O Kit requires you to specify a 4 byte value. The last byte\
    \ is ignored. The following example matches display controllers (base class code\
    \ `0x03`):\n\n```\n<key>IOPCIClassMatch</key>\n<string>0x03000000&amp;0xFF000000</string>\n\
    ```\n\nAs all PCI devices are assigned names according to their devices and vendor\
    \ IDs, it is also possible to use `IONameMatch` to match PCI devices as shown\
    \ in [Listing 9-2](#Chapter09.html#list_9_2).\n\n**Listing 9-2.** *Matching Based\
    \ on Name Property*\n\n```\n<key>IONameMatch</key>\n<array>\n    <string>pciabcd,1234</string>\n\
    \    <string>pciabcd,1235</string>\n    <string>pciabcd,1236</string>\n</array>\n\
    ```\n\nThe previous approach is perhaps more readable, but the downside is that\
    \ it is not possible to match against the subsystem vendor and device ID.\n\n\
    ![images](images/square.jpg) **Note** Remember to add a dependency to the `IOPCIFamily`\
    \ in your driver's `Info.plist` file under the `OSBundleLibraries` section.\n\n\
    During system boot, drivers for PCI devices installed in a physical slot or embedded\
    \ on the motherboard are loaded. Thunderbolt and ExpressCard drivers are loaded\
    \ at boot-time or on demand as they are plugged in.\n\nWhile Thunderbolt devices\
    \ follow PCI devices' rules for identification, they need an additional change\
    \ in order for the driver to load. In the driver's `Info.plist` file, under each\
    \ personality specified, the following key needs to be set:\n\n```\n<key>IOPCITunnelCompatible</key>\n\
    <true/>\n```\n\nThis tells the system that the driver is Thunderbolt-ready, and\
    \ therefore, is safe to unload. It is possible for a Thunderbolt and a PCIe device\
    \ to share the same device driver; however, PCI drivers may in many cases be written\
    \ under the assumption that the driver/device will never be removed during operation.\
    \ A driver will not be loaded against a Thunderbolt device unless this key is\
    \ set.\n\n**THUNDERBOLT UNIQUE INDENTIFIER**\n\nAll Thunderbolt devices have a\
    \ device ROM (DROM) that contains an additional ID identifying the vendor, referred\
    \ to as an Authority ID. This ID is part of a 64-bit UID number, which is unique\
    \ for every Thunderbolt device, just like the MAC address of a network interface.\
    \ The authority ID is assigned by the Thunderbolt naming authority (Intel) and\
    \ not the PCI-SIG. At the time of writing, there are no publications explaining\
    \ how to access this number from the I/O Kit, or if it can be used to match Thunderbolt\
    \ devices."
  raw: '#### Matching and Loading Drivers


    PCI drivers are commonly matched against properties found in their configuration
    space registers, such as the vendor ID, device ID, class, subsystem vendor ID,
    and subsystem device ID. Often, the latter two are needed if a PCI device is based
    on a generic chip.


    Though the configuration spaces contain more fields, they cannot be matched against
    using a matching dictionary (property-based matching). If you need more advanced
    matching, your driver will have to override the `IOService::probe(IOProvider*
    service)` method, and you will have to examine the `IOPCIDevice` yourself to determine
    if your driver matches the device. The keys listed in [Table 9-1](#Chapter09.html#tab_9_1)
    can be used for matching against PCI-based devices.


    ![images](images/t0901.jpg)


    [Listing 9-1](#Chapter09.html#list_9_1) shows the matching dictionary for a typical
    PCI device with a vendor ID or subsystem vendor ID of 0xabcd and a device ID or
    subsystem device ID of 0x1234.


    ***Listing 9-1.** Simple Matching Dictionary for a PCI Driver*


    `<key>IOKitPersonalities</key>`

    `<dict>`

    `    <key>MyPCIDriver</key>`

    `    <dict>`

    `        <key>CFBundleIdentifier</key>`

    `        <string>com.osxkernel.MyPCIDriver</string>`

    `        <key>IOClass</key>`

    `        <string>com_osxkernel_MyPCIDriver</string>`

    `        <key>IOProviderClass</key>`

    `        <string>IOPCIDevice</string>`

    `        <key>`**`IOPCIMatch`**`</key>`

    `        <string>`**`0x1234abcd`**`</string>`

    `     </dict>`

    `</dict>`


    The value is specified as a 32-bit hexadecimal string in little-endian format.
    The first four characters will represent the device ID and the last four characters
    will represent the vendor ID. It is worth noting that the value is of the string
    type and not an integer. The key `IOProviderClass` must have the value `IOPCIDevice`
    in order for the I/O Kit to pass your driver an `IOPCIDevice` instance. If you
    need to match against the vendor ID and device ID, you can substitute `IOPCIMatch`
    with `IOPCIPrimaryMatch` or, if you only wish to match the subsystem IDs, you
    can use `IOPCISecondaryMatch`.


    If your driver handles multiple devices, this can be done as a space-separated
    list as follows:


    `<key>IOPCIMatch</key>`

    `<string>`**`0x1234`**`abcd 0x`**`1235`**`abcd 0x`**`1236`**`abcd</string>`


    This will match device IDs 0x1234, 0x1235, and 0x1236 of vendor 0xabcd. If your
    driver supports a large family of devices, you can use masks to achieve the same
    effect, rather than enumerating each device separately.


    `<key>IOPCIMatch</key>`

    `<string>0x1230abcd&0xfff0ffff</string>`


    ![images](images/square.jpg) **Note** If you are editing `Info.plist` directly,
    you must express the ampersand (&) as &amp, as the ampersand symbol is used to
    indicate an escape sequence in XML.


    This will match every device ID beginning with 0x123X; for example, the range
    from 0x1230 to 0x123F, and a vendor ID of 0xabcd. Bits that should be ignored
    by the mask must be set to zero.


    You can also match against the class register. To do this, you must specify the
    `IOPCIClassMatch` key. The class register is 3 bytes wide. However, to match against
    it, the I/O Kit requires you to specify a 4 byte value. The last byte is ignored.
    The following example matches display controllers (base class code 0x03):


    `<key>IOPCIClassMatch</key>`

    `<string>0x03000000&amp;0xFF000000</string>`


    As all PCI devices are assigned names according to their devices and vendor IDs,
    it is also possible to use `IONameMatch` to match PCI devices as shown in [Listing
    9-2](#Chapter09.html#list_9_2).


    ***Listing 9-2.** Matching Based on Name Property*


    `<key>IONameMatch</key>`

    `<array>`

    `    <string>pciabcd,1234</string>`

    `    <string>pciabcd,1235</string>`

    `    <string>pciabcd,1236</string>`

    `</array>`


    The previous approach is perhaps more readable, but the downside is that it is
    not possible to match against the subsystem vendor and device ID.


    ![images](images/square.jpg) **Note** Remember to add a dependency to the `IOPCIFamily`
    in your driver''s `Info.plist` file under the `OSBundleLibraries` section.


    During system boot, drivers for PCI devices installed in a physical slot or embedded
    on the motherboard are loaded. Thunderbolt and ExpressCard drivers are loaded
    at boot-time or on demand as they are plugged in.


    While Thunderbolt devices follow PCI devices'' rules for identification, they
    need an additional change in order for the driver to load. In the driver''s Info.plist
    file, under each personality specified, the following key needs to be set:


    `<key>IOPCITunnelCompatible</key>`

    `<true/>`


    This tells the system that the driver is Thunderbolt-ready, and therefore, is
    safe to unload. It is possible for a Thunderbolt and a PCIe device to share the
    same device driver; however, PCI drivers may in many cases be written under the
    assumption that the driver/device will never be removed during operation. A driver
    will not be loaded against a Thunderbolt device unless this key is set.


    **THUNDERBOLT UNIQUE INDENTIFIER**


    All Thunderbolt devices have a device ROM (DROM) that contains an additional ID
    identifying the vendor, referred to as an Authority ID. This ID is part of a 64-bit
    UID number, which is unique for every Thunderbolt device, just like the MAC address
    of a network interface. The authority ID is assigned by the Thunderbolt naming
    authority (Intel) and not the PCI-SIG. At the time of writing, there are no publications
    explaining how to access this number from the I/O Kit, or if it can be used to
    match Thunderbolt devices.'
  trans: "\n#### 驱动匹配与加载\n\nPCI 驱动通常根据其配置空间寄存器中的属性进行匹配，例如供应商 ID、设备 ID、类别、子系统供应商 ID\
    \ 和子系统设备 ID。通常，如果 PCI 设备基于通用芯片，则需要用到后两项。\n\n尽管配置空间包含更多字段，但无法使用匹配字典（基于属性的匹配）来匹配它们。如果您需要更高级别的匹配，您的驱动必须重写\
    \ `IOService::probe(IOProvider* service)` 方法，并且您需要自行检查 `IOPCIDevice` 以确定您的驱动是否与设备匹配。表\
    \ 9-1 中列出的键可用于匹配基于 PCI 的设备。\n\n![images](img/t0901.jpg)\n\n清单 9-1 展示了一个典型 PCI\
    \ 设备的匹配字典，该设备具有为 `0xabcd` 的供应商 ID 或子系统供应商 ID，以及为 `0x1234` 的设备 ID 或子系统设备 ID。\n\n\
    **清单 9-1.** *PCI 驱动的简单匹配字典*\n\n```\n<key>IOKitPersonalities</key>\n<dict>\n  \
    \  <key>MyPCIDriver</key>\n    <dict>\n        <key>CFBundleIdentifier</key>\n\
    \        <string>com.osxkernel.MyPCIDriver</string>\n        <key>IOClass</key>\n\
    \        <string>com_osxkernel_MyPCIDriver</string>\n        <key>IOProviderClass</key>\n\
    \        <string>IOPCIDevice</string>\n        <key>IOPCIMatch</key>\n       \
    \ <string>0x1234abcd</string>\n     </dict>\n</dict>\n```\n\n该值以 32 位十六进制字符串的形式以小端格式指定。前四个字符代表设备\
    \ ID，后四个字符代表供应商 ID。值得注意的是，该值属于字符串类型，而非整数。`IOProviderClass` 键的值必须为 `IOPCIDevice`，以便\
    \ I/O Kit 将 `IOPCIDevice` 实例传递给您的驱动。如果您需要根据供应商 ID 和设备 ID 进行匹配，可以用 `IOPCIPrimaryMatch`\
    \ 替换 `IOPCIMatch`；或者，如果您只想匹配子系统 ID，可以使用 `IOPCISecondaryMatch`。\n\n如果您的驱动处理多个设备，可以将其作为空格分隔的列表实现，如下所示：\n\
    \n```\n<key>IOPCIMatch</key>\n<string>0x1234abcd 0x1235abcd 0x1236abcd</string>\n\
    ```\n\n这将匹配供应商 `0xabcd` 的设备 ID `0x1234`、`0x1235` 和 `0x1236`。如果您的驱动支持大量设备，您可以使用掩码来实现相同的效果，而无需分别枚举每个设备。\n\
    \n```\n<key>IOPCIMatch</key>\n<string>0x1230abcd&0xfff0ffff</string>\n```\n\n\
    ![images](img/square.jpg) **注意** 如果您直接编辑 `Info.plist`，必须将 & 符号（&）表示为 `&amp`，因为在\
    \ XML 中该符号用于指示转义序列。\n\n这将匹配所有以 `0x123X` 开头的设备 ID；例如，范围从 `0x1230` 到 `0x123F`，以及供应商\
    \ ID 为 `0xabcd`。掩码中应忽略的位必须设置为零。\n\n您也可以根据类别寄存器进行匹配。为此，您必须指定 `IOPCIClassMatch`\
    \ 键。类别寄存器宽 3 个字节。但是，为了匹配它，I/O Kit 要求您指定一个 4 字节的值。最后一个字节将被忽略。以下示例匹配显示控制器（基类代码 `0x03`）：\n\
    \n```\n<key>IOPCIClassMatch</key>\n<string>0x03000000&amp;0xFF000000</string>\n\
    ```\n\n由于所有 PCI 设备都根据其设备 ID 和供应商 ID 分配了名称，因此也可以使用 `IONameMatch` 来匹配 PCI 设备，如清单\
    \ 9-2 所示。\n\n**清单 9-2.** *基于名称属性的匹配*\n\n```\n<key>IONameMatch</key>\n<array>\n\
    \    <string>pciabcd,1234</string>\n    <string>pciabcd,1235</string>\n    <string>pciabcd,1236</string>\n\
    </array>\n```\n\n上述方法可能更具可读性，但其缺点是无法匹配子系统供应商和设备 ID。\n\n![images](img/square.jpg)\
    \ **注意** 记得在驱动的 `Info.plist` 文件的 `OSBundleLibraries` 部分中添加对 `IOPCIFamily` 的依赖。\n\
    \n系统启动期间，会加载安装在物理插槽或板载的 PCI 设备的驱动。Thunderbolt 和 ExpressCard 驱动会在启动时或按需（插入时）加载。\n\
    \n虽然 Thunderbolt 设备遵循 PCI 设备的识别规则，但它们需要额外更改才能让驱动加载。在驱动的 `Info.plist` 文件的每个个性描述下，需要设置以下键：\n\
    \n```\n<key>IOPCITunnelCompatible</key>\n<true/>\n```\n\n这告诉系统该驱动已为 Thunderbolt\
    \ 做好准备，因此可以安全卸载。Thunderbolt 设备和 PCIe 设备有可能共享同一个设备驱动；然而，在许多情况下，PCI 驱动的编写可能基于“驱动/设备在运行期间永远不会被移除”的假设。除非设置了此键，否则驱动将不会为\
    \ Thunderbolt 设备加载。\n\n**THUNDERBOLT 唯一标识符**\n\n所有 Thunderbolt 设备都有一个设备 ROM（DROM），其中包含一个标识供应商的附加\
    \ ID，称为授权 ID（Authority ID）。该 ID 是一个 64 位 UID 编号的一部分，该 UID 对于每个 Thunderbolt 设备都是唯一的，就像网络接口的\
    \ MAC 地址一样。授权 ID 由 Thunderbolt 命名机构（Intel）分配，而非 PCI-SIG。截至撰写本文时，尚无出版物解释如何从 I/O\
    \ Kit 访问此号码，或者它是否可用于匹配 Thunderbolt 设备。\n"
- fmt: "#### Driver Example: A Simple PCI Driver\n\nIt's time to get our hands dirty.\
    \ In order to demonstrate a PCI driver in action, we will take advantage of the\
    \ `IOMatchCategory` key to allow the loading of a secondary driver for a device.\
    \ We will load our driver against the display controller (graphics card/GPU) in\
    \ this case, as it is a device guaranteed to be present on all Macs—even laptops—as\
    \ they all use PCIe internally. We will use the following to match against the\
    \ display controller:\n\n`<key>IOPCIClassMatch</key>`\n`<string>0x03000000&amp;0xFF000000</string>`\n\
    \n![images](images/square.jpg) **Caution** Be careful about making your own modifications\
    \ to `MyFirstPCIDriver`, as it attaches to a device already controlled by another\
    \ driver. Therefore, performing actions other than querying information may be\
    \ unsafe and cause your system to crash or become corrupt.\n\nRecall that `0x03`\
    \ is a base class for display controllers. If you have more than one GPU, this\
    \ will cause multiple instances of the driver to be instantiated—one per device.\n\
    \nLet's start with the class declaration for our driver, as shown in [Listing\
    \ 9-3](#Chapter09.html#list_9_3).\n\n***Listing 9-3.** MyFirstPCIDriver Class\
    \ Declaration*\n\n```\n#include <IOKit/IOLib.h>\n#include <IOKit/pci/IOPCIDevice.h>\n\
    \nclass com_osxkernel_MyFirstPCIDriver : public IOService\n{\n    OSDeclareDefaultStructors(com_osxkernel_MyFirstPCIDriver);\n\
    \nprivate:\n    IOPCIDevice*        fPCIDevice;\n\npublic:\n    virtual bool start(IOService*\
    \ provider);\n    virtual void stop(IOService* provider);\n};\n```\n\nThere should\
    \ be few surprises here if you've followed earlier examples. We simply declare\
    \ a sub-class of `IOService` and override the `start()` and `stop()` methods.\
    \ Note that we include the file `IOKit/pci/IOPCIDevice.h` that contains the definition\
    \ of the `IOPCIDevice` class.\n\nThe implementation of `MyFirstPCIDriver` is shown\
    \ in [Listing 9-4](#Chapter09.html#list_9_4).\n\n***Listing 9-4.** MyFirstPCIDriver\
    \ Class Implementation*\n\n```\n#include \"MyFirstPCIDriver.h\"\n\n#define super\
    \ IOService\nOSDefineMetaClassAndStructors(com_osxkernel_MyFirstPCIDriver, IOService);\n\
    \nbool com_osxkernel_MyFirstPCIDriver::start(IOService * provider)\n{    \n  \
    \  IOLog(\"%s::start\\n\", getName());\n\n    if(!super::start(provider))\n  \
    \      return false ;\n\n    fPCIDevice = OSDynamicCast(IOPCIDevice, provider);\n\
    \    if (!fPCIDevice)\n        return false;\n\n    fPCIDevice->setMemoryEnable(true);\n\
    \n    registerService();\n\n    return true;\n}\n\nvoid com_osxkernel_MyFirstPCIDriver::stop(\
    \ IOService * provider )\n{\n    IOLog(\"%s::stop\\n\", getName());\n    super::stop(provider);\n\
    }\n```\n\nWhen a driver is matched successfully, either from the `Info.plist`\
    \ dictionary or by invocation of the driver's `probe()` method, your driver will\
    \ have its `start()` method called. As with the USB driver in [chapter 8](#Chapter08.html#ch8),\
    \ we check to ensure that the provider that is passed to us is in fact of the\
    \ right type (`IOPCIDevice`), which is good practice although it shouldn't happen\
    \ if your `Info.plist` correctly specifies the `IOProviderClass` key.\n\nIf we\
    \ have a valid `IOPCIDevice`, the next step is to enable the I/O resources of\
    \ the device by calling the `IOPCIDevice::setMemoryEnable(bool enable)` method.\
    \ This will set a toggle bit in the device's command register, letting it know\
    \ that we want to access its resources. Finally, our driver calls `registerService()`,\
    \ which will notify potential clients (possibly a higher-level driver) of our\
    \ driver's arrival. We return `true` to indicate to the I/O Kit that the driver\
    \ was loaded successfully.\n\nWe can now attempt to load `MyFirstPCIDriver` using\
    \ the `kextload` utility. You can verify that it gets loaded correctly by checking\
    \ `kernel.log` in `Console.app` or by searching for it using `IORegistryExplorer`\
    \ as shown in [Figure 9-3](#Chapter09.html#fig_9_3).\n\n![images](images/0903.jpg)\n\
    \n***Figure 9-3.** IORegistryExplorer showing MyFirstPCIDriver loaded*\n\n####\
    \ Accessing Configuration Space Registers\n\nThe `IOPCIDevice` class contains\
    \ a number of helper methods that make it easy to access a device's configuration\
    \ space registers. The following methods allow you to read and write configuration\
    \ space registers.\n\n```\nvirtual UInt8 configRead8(UInt8 offset);\nvirtual UInt16\
    \ configRead16(UInt8 offset);\nvirtual UInt32 configRead32(UInt8 offset);\n\n\
    virtual void configWrite8(UInt8 offset, UInt8 data);\nvirtual void configWrite16(UInt8\
    \ offset, UInt16 data);\nvirtual void configWrite32(UInt8 offset, UInt32 data);\n\
    ```\n\nThere are three variants of read methods and three variants of write methods,\
    \ which allow you to read or write an 8-bit value, a 16-bit value, or a 32-bit\
    \ value from the offset specified. The `offset` parameter is a byte-offset into\
    \ the configuration space and must be between 0-255. To read a device's device\
    \ ID and vendor ID, we can do the following:\n\n```\nUInt16 vendorID = fPCIDevice->configRead16(0);\n\
    UInt16 deviceID = fPCIDevice->configRead16(2);\nIOLog(\"vendor ID = 0x%04x device\
    \ ID = 0x%04x\\n\", vendorID, deviceID);\n```\n\nThe previous request could also\
    \ be achieved by a single call:\n\n```\nUInt32 bothIDs = fPCIDevice->configRead32(0);\n\
    IOLog(\"vendor ID = 0x%04x device ID = 0x%04x\\n\", bothIDs >> 16, bothIDs & 0x0000FFFF);\n\
    ```\n\nThe preceding call uses integer byte offsets, but the `IOPCIDevice.h` file\
    \ specifies constants that can be used to address common register locations. So\
    \ to make the code more readable, you can use `kIOPCIConfigVendorID` and `kIOPCIConfigDeviceID`\
    \ instead of the hard coded values. The full list of available constants is shown\
    \ in [Listing 9-5](#Chapter09.html#list_9_5).\n\n***Listing 9-5.** Constants for\
    \ Offsets of Common PCI Configuration Space Registers (IOPCIDevice.h)*\n\n```\n\
    enum {\n    kIOPCIConfigVendorID = 0x00,\n    kIOPCIConfigDeviceID = 0x02,\n \
    \   kIOPCIConfigCommand = 0x04,\n    kIOPCIConfigStatus = 0x06,\n    kIOPCIConfigRevisionID\
    \ = 0x08,\n    kIOPCIConfigClassCode = 0x09,\n    kIOPCIConfigCacheLineSize =\
    \ 0x0C,\n    kIOPCIConfigLatencyTimer = 0x0D,\n    kIOPCIConfigHeaderType = 0x0E,\n\
    \    kIOPCIConfigBIST = 0x0F,\n    kIOPCIConfigBaseAddress0 = 0x10,\n    kIOPCIConfigBaseAddress1\
    \ = 0x14,\n    kIOPCIConfigBaseAddress2 = 0x18,\n    kIOPCIConfigBaseAddress3\
    \ = 0x1C,\n    kIOPCIConfigBaseAddress4 = 0x20,\n    kIOPCIConfigBaseAddress5\
    \ = 0x24,\n    kIOPCIConfigCardBusCISPtr = 0x28,\n    kIOPCIConfigSubSystemVendorID\
    \ = 0x2C,\n    kIOPCIConfigSubSystemID = 0x2E,\n    kIOPCIConfigExpansionROMBase\
    \ = 0x30,\n    kIOPCIConfigCapabilitiesPtr = 0x34,\n    kIOPCIConfigInterruptLine\
    \ = 0x3C,\n    kIOPCIConfigInterruptPin = 0x3D,\n    kIOPCIConfigMinimumGrant\
    \ = 0x3E,\n    kIOPCIConfigMaximumLatency = 0x3F\n};\n```\n\n`IOPCIDevice` also\
    \ provides a convenient method for setting individual bits of a register called\
    \ `setConfigBits()`.\n\nA read request to a missing or malfunctioning device will\
    \ return a value of `0xFFFF` (`0xFF` or `0xFFFFFFFF` for the 8 and 32-bit variants),\
    \ which is an invalid device/vendor ID. So if this value is returned while reading\
    \ either register it can be used to determine if a problem has occurred or if\
    \ a Thunderbolt device has been unplugged.\n\nWriting values to the configuration\
    \ space is simple but there are a few things to note. Many areas of the configuration\
    \ space are read-only. For example, the device ID and vendor ID are programmed\
    \ into the device's PCI controller firmware. Also note that it is not possible\
    \ to determine if a write to a register location succeeded; you would have to\
    \ read back the register or another that was affected by the write transaction\
    \ in order to determine its success.\n\n![images](images/square.jpg) **Note**\
    \ If your driver needs to maintain compatibility with PowerPC-based systems, be\
    \ aware that the PCI config space is stored in little-endian format, however `IOPCIDevice`\
    \ handles byte swapping for you."
  raw: '#### Driver Example: A Simple PCI Driver


    It''s time to get our hands dirty. In order to demonstrate a PCI driver in action,
    we will take advantage of the `IOMatchCategory` key to allow the loading of a
    secondary driver for a device. We will load our driver against the display controller
    (graphics card/GPU) in this case, as it is a device guaranteed to be present on
    all Macs—even laptops—as they all use PCIe internally. We will use the following
    to match against the display controller:


    `<key>IOPCIClassMatch</key>`

    `<string>0x03000000&amp;0xFF000000</string>`


    ![images](images/square.jpg) **Caution** Be careful about making your own modifications
    to `MyFirstPCIDriver`, as it attaches to a device already controlled by another
    driver. Therefore, performing actions other than querying information may be unsafe
    and cause your system to crash or become corrupt.


    Recall that 0x03 is a base class for display controllers. If you have more than
    one GPU, this will cause multiple instances of the driver to be instantiated—one
    per device.


    Let''s start with the class declaration for our driver, as shown in [Listing 9-3](#Chapter09.html#list_9_3).


    ***Listing 9-3.** MyFirstPCIDriver Class Declaration*


    `#include <IOKit/IOLib.h>`

    `#include <IOKit/pci/IOPCIDevice.h>`


    `class com_osxkernel_MyFirstPCIDriver : public IOService`

    `{`

    `    OSDeclareDefaultStructors(com_osxkernel_MyFirstPCIDriver);`


    `private:`

    `    IOPCIDevice*        fPCIDevice;`


    `public:`

    `    virtual bool start(IOService* provider);`

    `    virtual void stop(IOService* provider);`

    `};`


    There should be few surprises here if you''ve followed earlier examples. We simply
    declare a sub-class of `IOService` and override the `start()` and `stop()` methods.
    Note that we include the file `IOKit/pci/IOPCIDevice.h` that contains the definition
    of the `IOPCIDevice` class.


    The implementation of `MyFirstPCIDriver` is shown in [Listing 9-4](#Chapter09.html#list_9_4).


    ***Listing 9-4.** MyFirstPCIDriver Class Implementation*


    `#include "MyFirstPCIDriver.h"`


    `#define super IOService`

    `OSDefineMetaClassAndStructors(com_osxkernel_MyFirstPCIDriver, IOService);`


    `bool com_osxkernel_MyFirstPCIDriver::start(IOService * provider)`

    `{    `

    `    IOLog("%s::start\n", getName());`


    `    if(!super::start(provider))`

    `        return false ;`


    `    fPCIDevice = OSDynamicCast(IOPCIDevice, provider);`

    `    if (!fPCIDevice)`

    `        return false;`


    `    fPCIDevice->setMemoryEnable(true);`


    `    registerService();`


    `    return true;`

    `}`


    `void com_osxkernel_MyFirstPCIDriver::stop( IOService * provider )`

    `{`

    `    IOLog("%s::stop\n", getName());`

    `    super::stop(provider);`

    `}`


    When a driver is matched successfully, either from the `Info.plist` dictionary
    or by invocation of the driver''s `probe()` method, your driver will have its
    `start()` method called. As with the USB driver in [chapter 8](#Chapter08.html#ch8),
    we check to ensure that the provider that is passed to us is in fact of the right
    type (`IOPCIDevice)`, which is good practice although it shouldn''t happen if
    your `Info.plist` correctly specifies the `IOProviderClass` key.


    If we have a valid `IOPCIDevice`, the next step is to enable the I/O resources
    of the device by calling the `IOPCIDevice::setMemoryEnable(bool enable)` method.
    This will set a toggle bit in the device''s command register, letting it know
    that we want to access its resources. Finally, our driver calls `registerService()`,
    which will notify potential clients (possibly a higher-level driver) of our driver''s
    arrival. We return `true` to indicate to the I/O Kit that the driver was loaded
    successfully.


    We can now attempt to load `MyFirstPCIDriver` using the `kextload` utility. You
    can verify that it gets loaded correctly by checking `kernel.log` in `Console.app`
    or by searching for it using `IORegistryExplorer` as shown in [Figure 9-3](#Chapter09.html#fig_9_3).


    ![images](images/0903.jpg)


    ***Figure 9-3.** IORegistryExplorer showing MyFirstPCIDriver loaded*


    #### Accessing Configuration Space Registers


    The `IOPCIDevice` class contains a number of helper methods that make it easy
    to access a device''s configuration space registers. The following methods allow
    you to read and write configuration space registers.


    `virtual UInt8 configRead8(UInt8 offset);`

    `virtual UInt16 configRead16(UInt8 offset);`

    `virtual UInt32 configRead32(UInt8 offset);`


    `virtual void configWrite8(UInt8 offset, UInt8 data);`

    `virtual void configWrite16(UInt8 offset, UInt16 data);`

    `virtual void configWrite32(UInt8 offset, UInt32 data);`


    There are three variants of read methods and three variants of write methods,
    which allow you to read or write an 8-bit value, a 16-bit value, or a 32-bit value
    from the offset specified. The `offset` parameter is a byte-offset into the configuration
    space and must be between 0-255\. To read a device''s device ID and vendor ID,
    we can do the following:


    `UInt16 vendorID = fPCIDevice->configRead16(0);`

    `UInt16 deviceID = fPCIDevice->configRead16(2);`

    `IOLog(“vendor ID = 0x%04x device ID = 0x%04x\n”, vendorID, deviceID);`


    The previous request could also be achieved by a single call:


    `UInt32 bothIDs = fPCIDevice->configRead32(0);`

    `IOLog(“vendor ID = 0x%04x device ID = 0x%04x\n”, bothIDs >> 16, bothIDs & 0x0000FFFF);`


    The preceding call uses integer byte offsets, but the `IOPCIDevice.h` file specifies
    constants that can be used to address common register locations. So to make the
    code more readable, you can use `kIOPCIConfigVendorID` and `kIOPCIConfigDeviceID`
    instead of the hard coded values. The full list of available constants is shown
    in [Listing 9-5](#Chapter09.html#list_9_5).


    ***Listing 9-5.** Constants for Offsets of Common PCI Configuration Space Registers
    (IOPCIDevice.h)*


    `enum {`

    `    kIOPCIConfigVendorID = 0x00,`

    `    kIOPCIConfigDeviceID = 0x02,`

    `    kIOPCIConfigCommand = 0x04,`

    `    kIOPCIConfigStatus = 0x06,`

    `    kIOPCIConfigRevisionID = 0x08,`

    `    kIOPCIConfigClassCode = 0x09,`

    `    kIOPCIConfigCacheLineSize = 0x0C,`

    `    kIOPCIConfigLatencyTimer = 0x0D,`

    `    kIOPCIConfigHeaderType = 0x0E,`

    `    kIOPCIConfigBIST = 0x0F,`

    `    kIOPCIConfigBaseAddress0 = 0x10,`

    `    kIOPCIConfigBaseAddress1 = 0x14,`

    `    kIOPCIConfigBaseAddress2 = 0x18,`

    `    kIOPCIConfigBaseAddress3 = 0x1C,`

    `    kIOPCIConfigBaseAddress4 = 0x20,`

    `    kIOPCIConfigBaseAddress5 = 0x24,`

    `    kIOPCIConfigCardBusCISPtr = 0x28,`

    `    kIOPCIConfigSubSystemVendorID = 0x2C,`

    `    kIOPCIConfigSubSystemID = 0x2E,`

    `    kIOPCIConfigExpansionROMBase = 0x30,`

    `    kIOPCIConfigCapabilitiesPtr = 0x34,`

    `    kIOPCIConfigInterruptLine = 0x3C,`

    `    kIOPCIConfigInterruptPin = 0x3D,`

    `    kIOPCIConfigMinimumGrant = 0x3E,`

    `    kIOPCIConfigMaximumLatency = 0x3F`

    `};`


    `IOPCIDevice` also provides a convenient method for setting individual bits of
    a register called `setConfigBits()`.


    A read request to a missing or malfunctioning device will return a value of 0xFFFF
    (0xFF or 0xFFFFFFFF for the 8 and 32-bit variants), which is an invalid device/vendor
    ID. So if this value is returned while reading either register it can be used
    to determine if a problem has occurred or if a Thunderbolt device has been unplugged.


    Writing values to the configuration space is simple but there are a few things
    to note. Many areas of the configuration space are read-only. For example, the
    device ID and vendor ID are programmed into the device''s PCI controller firmware.
    Also note that it is not possible to determine if a write to a register location
    succeeded; you would have to read back the register or another that was affected
    by the write transaction in order to determine its success.


    ![images](images/square.jpg) **Note** If your driver needs to maintain compatibility
    with PowerPC-based systems, be aware that the PCI config space is stored in little-endian
    format, however `IOPCIDevice` handles byte swapping for you.'
  trans: "\n#### 驱动程序示例：一个简单的 PCI 驱动程序\n\n现在让我们动手实践。为了演示 PCI 驱动程序的实际运行，我们将利用 `IOMatchCategory`\
    \ 键，允许为设备加载一个辅助驱动程序。在本例中，我们将驱动加载到显示控制器（显卡/GPU）上，因为它是所有 Mac（即便是笔记本电脑）上都存在的设备——它们内部都使用\
    \ PCIe。我们将使用以下配置来匹配显示控制器：\n\n`<key>IOPCIClassMatch</key>`\n`<string>0x03000000&amp;0xFF000000</string>`\n\
    \n![images](img/square.jpg) **警告** 请谨慎修改 `MyFirstPCIDriver`，因为它会附加到一个已被其他驱动程序控制的设备上。因此，执行除查询信息之外的任何操作都可能不安全，并可能导致系统崩溃或损坏。\n\
    \n回想一下，`0x03` 是显示控制器的基类。如果你有多个 GPU，那么驱动程序的多个实例将被实例化——每个设备一个。\n\n让我们从驱动程序的类声明开始，如代码清单\
    \ 9-3 所示。\n\n***代码清单 9-3.** MyFirstPCIDriver 类声明*\n\n```\n#include <IOKit/IOLib.h>\n\
    #include <IOKit/pci/IOPCIDevice.h>\n\nclass com_osxkernel_MyFirstPCIDriver : public\
    \ IOService\n{\n    OSDeclareDefaultStructors(com_osxkernel_MyFirstPCIDriver);\n\
    \nprivate:\n    IOPCIDevice*        fPCIDevice;\n\npublic:\n    virtual bool start(IOService*\
    \ provider);\n    virtual void stop(IOService* provider);\n};\n```\n\n如果你已经阅读过前面的示例，这里应该不会有什么意外。我们只是声明了一个\
    \ `IOService` 的子类，并重写了 `start()` 和 `stop()` 方法。注意，我们包含了文件 `IOKit/pci/IOPCIDevice.h`，其中包含了\
    \ `IOPCIDevice` 类的定义。\n\n`MyFirstPCIDriver` 的实现如代码清单 9-4 所示。\n\n***代码清单 9-4.**\
    \ MyFirstPCIDriver 类实现*\n\n```\n#include \"MyFirstPCIDriver.h\"\n\n#define super\
    \ IOService\nOSDefineMetaClassAndStructors(com_osxkernel_MyFirstPCIDriver, IOService);\n\
    \nbool com_osxkernel_MyFirstPCIDriver::start(IOService * provider)\n{    \n  \
    \  IOLog(\"%s::start\\n\", getName());\n\n    if(!super::start(provider))\n  \
    \      return false ;\n\n    fPCIDevice = OSDynamicCast(IOPCIDevice, provider);\n\
    \    if (!fPCIDevice)\n        return false;\n\n    fPCIDevice->setMemoryEnable(true);\n\
    \n    registerService();\n\n    return true;\n}\n\nvoid com_osxkernel_MyFirstPCIDriver::stop(\
    \ IOService * provider )\n{\n    IOLog(\"%s::stop\\n\", getName());\n    super::stop(provider);\n\
    }\n```\n\n当驱动程序被成功匹配时（无论是通过 `Info.plist` 字典还是调用驱动程序的 `probe()` 方法），你的驱动程序的 `start()`\
    \ 方法就会被调用。与第 8 章中的 USB 驱动程序类似，我们检查确保传递给我们的提供者确实是正确的类型（`IOPCIDevice`），这是一种良好实践，尽管如果你的\
    \ `Info.plist` 正确指定了 `IOProviderClass` 键，这种情况本不该发生。\n\n如果我们拥有一个有效的 `IOPCIDevice`，下一步是通过调用\
    \ `IOPCIDevice::setMemoryEnable(bool enable)` 方法来启用设备的 I/O 资源。这将在设备的命令寄存器中设置一个切换位，告知设备我们想要访问其资源。最后，我们的驱动程序调用\
    \ `registerService()`，这将通知潜在的客户端（可能是更高级别的驱动程序）我们驱动程序已就绪。我们返回 `true` 来向 I/O Kit\
    \ 指示驱动程序已成功加载。\n\n现在，我们可以尝试使用 `kextload` 工具来加载 `MyFirstPCIDriver`。你可以通过检查 `Console.app`\
    \ 中的 `kernel.log`，或使用 `IORegistryExplorer` 搜索来验证它是否被正确加载，如图 9-3 所示。\n\n![images](img/0903.jpg)\n\
    \n***图 9-3.** IORegistryExplorer 显示 MyFirstPCIDriver 已加载*\n\n#### 访问配置空间寄存器\n\n\
    `IOPCIDevice` 类包含许多辅助方法，使得访问设备的配置空间寄存器变得容易。以下方法允许你读取和写入配置空间寄存器。\n\n```\nvirtual\
    \ UInt8 configRead8(UInt8 offset);\nvirtual UInt16 configRead16(UInt8 offset);\n\
    virtual UInt32 configRead32(UInt8 offset);\n\nvirtual void configWrite8(UInt8\
    \ offset, UInt8 data);\nvirtual void configWrite16(UInt8 offset, UInt16 data);\n\
    virtual void configWrite32(UInt8 offset, UInt32 data);\n```\n\n有三种读取方法和三种写入方法变体，它们允许你从指定的偏移量读取或写入\
    \ 8 位、16 位或 32 位的值。`offset` 参数是配置空间中的字节偏移量，必须在 0-255 之间。要读取设备的设备 ID 和供应商 ID，我们可以执行以下操作：\n\
    \n```\nUInt16 vendorID = fPCIDevice->configRead16(0);\nUInt16 deviceID = fPCIDevice->configRead16(2);\n\
    IOLog(\"vendor ID = 0x%04x device ID = 0x%04x\\n\", vendorID, deviceID);\n```\n\
    \n之前的请求也可以通过一次调用完成：\n\n```\nUInt32 bothIDs = fPCIDevice->configRead32(0);\nIOLog(\"\
    vendor ID = 0x%04x device ID = 0x%04x\\n\", bothIDs >> 16, bothIDs & 0x0000FFFF);\n\
    ```\n\n前面的调用使用了整数字节偏移量，但 `IOPCIDevice.h` 文件指定了可用于寻址常用寄存器位置的常量。因此，为了使代码更易读，你可以使用\
    \ `kIOPCIConfigVendorID` 和 `kIOPCIConfigDeviceID` 来代替硬编码的值。可用常量的完整列表如代码清单 9-5\
    \ 所示。\n\n***代码清单 9-5.** 常用 PCI 配置空间寄存器偏移量的常量 (IOPCIDevice.h)*\n\n```\nenum {\n\
    \    kIOPCIConfigVendorID = 0x00,\n    kIOPCIConfigDeviceID = 0x02,\n    kIOPCIConfigCommand\
    \ = 0x04,\n    kIOPCIConfigStatus = 0x06,\n    kIOPCIConfigRevisionID = 0x08,\n\
    \    kIOPCIConfigClassCode = 0x09,\n    kIOPCIConfigCacheLineSize = 0x0C,\n  \
    \  kIOPCIConfigLatencyTimer = 0x0D,\n    kIOPCIConfigHeaderType = 0x0E,\n    kIOPCIConfigBIST\
    \ = 0x0F,\n    kIOPCIConfigBaseAddress0 = 0x10,\n    kIOPCIConfigBaseAddress1\
    \ = 0x14,\n    kIOPCIConfigBaseAddress2 = 0x18,\n    kIOPCIConfigBaseAddress3\
    \ = 0x1C,\n    kIOPCIConfigBaseAddress4 = 0x20,\n    kIOPCIConfigBaseAddress5\
    \ = 0x24,\n    kIOPCIConfigCardBusCISPtr = 0x28,\n    kIOPCIConfigSubSystemVendorID\
    \ = 0x2C,\n    kIOPCIConfigSubSystemID = 0x2E,\n    kIOPCIConfigExpansionROMBase\
    \ = 0x30,\n    kIOPCIConfigCapabilitiesPtr = 0x34,\n    kIOPCIConfigInterruptLine\
    \ = 0x3C,\n    kIOPCIConfigInterruptPin = 0x3D,\n    kIOPCIConfigMinimumGrant\
    \ = 0x3E,\n    kIOPCIConfigMaximumLatency = 0x3F\n};\n```\n\n`IOPCIDevice` 还提供了一个设置寄存器单个位的便捷方法，名为\
    \ `setConfigBits()`。\n\n对缺失或故障设备发出的读取请求将返回值 `0xFFFF`（对于 8 位和 32 位变体，返回 `0xFF`\
    \ 或 `0xFFFFFFFF`），这是一个无效的设备/供应商 ID。因此，如果在读取任一寄存器时返回此值，可用于判断是否发生了问题，或者 Thunderbolt\
    \ 设备是否已被拔出。\n\n向配置空间写入值很简单，但需要注意几点。配置空间的许多区域是只读的。例如，设备 ID 和供应商 ID 被编程到设备的 PCI\
    \ 控制器固件中。另请注意，无法确定对寄存器位置的写入是否成功；你必须回读该寄存器或受写入事务影响的其他寄存器，才能确定其成功与否。\n\n![images](img/square.jpg)\
    \ **注意** 如果你的驱动程序需要保持与基于 PowerPC 的系统的兼容性，请注意 PCI 配置空间是以小端格式存储的，不过 `IOPCIDevice`\
    \ 会为你处理字节交换。\n"
- fmt: "`IOPCIDevice`的许多方法（如`setMemoryEnable()`）是便捷的抽象方法，它们代表您执行相应的配置空间读写操作。对配置空间的I/O操作会由`IOPCIDevice`传递给其父设备（大多数情况下是`IOPCIBridge`），最终到达由平台专家实现的根桥设备，具体细节取决于系统实现。\n\
    \n### 访问扩展配置空间\n\n您可能注意到上一节中I/O函数存在不一致性。前文提到扩展配置空间为4096字节。当`config*()`系列函数的偏移量参数采用`UInt8`类型时，如何访问大于255的偏移量？答案在于以下方法族：\n\
    \n```\nUInt32 extendedConfigRead32(IOByteCount offset);\nUInt16 extendedConfigRead16(IOByteCount\
    \ offset);\nUInt8 extendedConfigRead8(IOByteCount offset);\n\nvoid extendedConfigWrite32(IOByteCount\
    \ offset, UInt32 data);\nvoid extendedConfigWrite16(IOByteCount offset, UInt16\
    \ data);\nvoid extendedConfigWrite8(IOByteCount offset, UInt8 data);\n```\n\n\
    这些方法与前述接口具有相同的接口形式。但它们在`offset`参数上使用了更宽的数据类型`IOByteCount`，从而允许访问大于255的偏移量。\n\n\
    ### 搜索能力寄存器\n\n由于能力寄存器并非位于固定偏移量，查找能力寄存器的过程需要先搜索能力ID，然后读取下一个字节以确定该能力的长度，这同时也给出了下一个能力的偏移量。按此流程沿链表向下搜索，直到找到目标能力。幸运的是，我们无需手动编写此代码，因为`IOPCIDevice`类提供了两个辅助方法定位能力：\n\
    \n```\nvirtual UInt32 findPCICapability(UInt8 capabilityID, UInt8* offset = 0\
    \ );\nvirtual UInt32 extendedFindPCICapability(UInt32 capabilityID, IOByteCount*\
    \ offset = 0 );\n```\n\n以下示例演示如何获取PCIe链路状态寄存器，该寄存器包含设备的活动通道数（第4-9位）和链路速度（第0-3位）：\n\
    \n```\nIOByteCount offset = 0;\nif (fPCIDevice->extendedFindPCICapability(kIOPCIPCIExpressCapability,\
    \ &offset))\n{\n    UInt16 value = fPCIDevice->extendedConfigRead16(offset + 0x12);\n\
    }\n```\n\n该方法将返回能力ID（本例中为`kIOPCIExpressCapability`），如果未找到指定ID的能力则返回零。输出参数`offset`用于存储已找到能力的偏移量。找到能力后，我们可以通过将偏移量加上`0x12`（18）来读取链路状态寄存器。\n\
    \n## PCI I/O 内存区域\n\nPCI设备最多可拥有六个I/O区域。每个区域包含I/O内存或I/O空间（端口）。后者在新设备中很少使用，因为I/O端口通常是一种非常慢的I/O方式，且只能通过特殊的in/out\
    \ CPU指令访问。某些传统设备（如IDE控制器）可能同时包含I/O端口和内存，并可通过任一种方式控制。另一方面，I/O内存效率更高且更易访问，因为它可以直接映射到系统的内存空间，像普通内存一样被访问。I/O内存通常被称为内存映射I/O（MMIO）。此概念不应与虚拟地址空间之间的内存映射或文件内存映射（`mmap`）混淆。\n\
    \n如果设备内存区域设置了内存预取位，CPU可能会缓存对已映射设备内存的访问。\n\n如何通过内存区域控制设备？这完全取决于设备本身。例如，一个区域可用于控制和状态寄存器，而另一个区域可用于读取或写入数据（例如来自摄像头的输入视频）。如果您正在以电子形式阅读本文，那么这段文字可能正被持续写入代表显卡帧缓冲区的内存区域。与USB类似，基于PCI的设备也存在一系列标准化接口。例如，VGA兼容显卡允许通过包含内存区域和/或端口的已知接口实现显卡的基本操作。IDE、SATA和基于PCI的USB控制器也存在标准化接口，使操作系统能够为符合此类接口的任何设备使用默认驱动程序。\n\
    \n由于PCI是“即插即用”的，PCI设备的I/O资源由内核/EFI（或传统PC中的BIOS）自动配置，这与过时的ISA总线形成对比——在ISA总线上，必须通过物理跳线为每个设备单独选择基本I/O地址和中断线，以避免资源冲突。\n\
    \n当设备配置完成后，配置空间中存在的每个区域都将被分配各自的地址范围。范围的大小取决于设备。\n\n设备配置完成后，系统会为其分配一个物理内存地址范围。从[图9-1](#Chapter09.html#fig_9_1)可以看出，没有用于存储每个内存区域大小的寄存器。那么系统如何知道每个区域有多大呢？系统通过将配置空间中某个基地址槽的所有位设为1，然后读回该值来确定内存区域的大小。内存区域的大小必须是2的幂。如果设备支持，可以将两个BAR组合起来形成64位地址。\n\
    \n在系统或驱动程序访问任何I/O区域之前，需要通过切换设备命令寄存器中的某个位来启用它们。我们在`MyFirstPCIDriver`中已经看到了如何实现这一点：在驱动程序的`start()`方法中调用`fPCIDevice->setMemoryEnable(true)`。\n\
    \n### 枚举I/O区域\n\n为了发现PCI设备的可用内存区域（最多六个），让我们修改`MyFirstPCIDriver`，在其`start()`方法中通过添加[列表9-6](#Chapter09.html#list_9_6)中的代码（位于`setMemoryEnable()`调用之后）来转储设备的附加信息。\n\
    \n***列表9-6.** 枚举PCI I/O内存区域*\n\n```\nfor (UInt32 i = 0; i < fPCIDevice->getDeviceMemoryCount();\
    \ i++)\n{\n    IODeviceMemory* memoryDesc = fPCIDevice->getDeviceMemoryWithIndex(i);\n\
    \    if (!memoryDesc)\n        continue;\n    #ifdef __LP64__\n        IOLog(\"\
    region%u: length=%llu bytes\\n\", i, memoryDesc->getLength());\n    #else\n\n\
    \        IOLog(\"region%lu: length=%lu bytes\\n\", i, memoryDesc->getLength());\n\
    \    #endif\n}\n```\n\n如果您编译并加载该驱动程序，应该在`kernel.log`中看到类似以下输出：\n\n```\nApr 1 11:06:18\
    \ macbook kernel[0]: com_osxkernel_MyFirstPCIDriver::start\nApr 1 11:06:18 macbook\
    \ kernel[0]: region0: length=16777216 bytes\nApr 1 11:06:18 macbook kernel[0]:\
    \ region1: length=268435456 bytes\nApr 1 11:06:18 macbook kernel[0]: region2:\
    \ length=33554432 bytes\nApr 1 11:06:18 macbook kernel[0]: region3: length=128\
    \ bytes\nApr 1 11:06:18 macbook kernel[0]: region4: length=131072 bytes\n```\n\
    \n您的输出可能因系统型号和显卡而异（也可能有多个显卡）。本例中最大的区域（256 MB）是区域1，即显卡的帧缓冲区。"
  raw: 'A number of methods of `IOPCIDevice`, such as *setMemoryEnable(),* are simply
    convenient abstractions that perform the appropriate configuration space reads
    or writes on your behalf. I/O to configuration space is forwarded by an `IOPCIDevice`
    to its parent (an `IOPCIBridge` in most cases) until it reaches the root bridge,
    which is implemented by the Platform Expert, as the exact details are system dependent.


    ##### Accessing the Extended Configuration Space


    You may have noticed an inconsistency with the I/O functions in the previous section.
    We saw earlier that the extended configuration space is 4096 bytes. How do you
    address offsets greater than 255 when the `config*()` functions take a `UInt8`
    type for the offset argument? The answer is the following family of methods.


    `UInt32 extendedConfigRead32(IOByteCount offset);`

    `UInt16 extendedConfigRead16(IOByteCount offset);`

    `UInt8 extendedConfigRead8(IOByteCount offset);`


    `void extendedConfigWrite32(IOByteCount offset, UInt32 data);`

    `void extendedConfigWrite16(IOByteCount offset, UInt16 data);`

    `void extendedConfigWrite8(IOByteCount offset, UInt8 data);`


    The methods have the same interface as is shown above. However, they use the wider
    data-type `IOByteCount` for the `offset` parameter to allow access to offsets
    greater than 255.


    ##### Searching for Capabilities Registers


    Because capability registers are not located at a fixed offset, the process of
    finding a capability register involves searching for a capability ID and then
    reading the next byte to determine the length of the capability, which also tells
    you the offset of the next capability. This process is followed moving down the
    list until the right capability is located. Fortunately, we do not need to write
    this code manually as the `IOPCIDevice` class provides two helper methods to locate
    capabilities:


    `virtual UInt32 findPCICapability(UInt8 capabilityID, UInt8* offset = 0 );`

    `virtual UInt32 extendedFindPCICapability(UInt32 capabilityID, IOByteCount* offset
    = 0 );`


    The following demonstrates how to fetch the PCIe link status register, which contains
    the number of active lanes (bits 4-9) and the link speed (bits 0-3) for the device.


    `IOByteCount offset = 0;`

    `if (fPCIDevice->extendedFindPCICapability(kIOPCIPCIExpressCapability, &offset))`

    `{`

    `       UInt16 value = fPCIDevice->extendedConfigRead16(offset + 0x12);`

    `}`


    The method will return the capability ID (`kIOPCIExpressCapability` in this case)
    or zero if the capability with the specified ID could not be found. The output
    argument `offset` is used to store the offset of the found capability. Once the
    capability is found we can read the link status register by adding 0x12 (18) to
    the offset.


    #### PCI I/O Memory Regions


    PCI devices may have up to six I/O regions. Each region contains either I/O memory
    or I/O space (ports). The latter is seldom used in new devices as I/O ports are
    generally a very slow way of performing I/O and can only be accessed using special
    in/out CPU instructions. Some legacy devices, such as IDE controllers, may have
    both I/O ports and memory and can be controlled by either. On the other hand,
    I/O memory is more efficient and also easier to access, as it can simply be mapped
    into the system''s memory space and accessed like regular memory. I/O memory is
    commonly referred to as Memory Mapped I/O (MMIO). This concept is not to be confused
    with mapping of memory between virtual address spaces or the mapping of files
    in memory (mmap).


    Access to and from mapped device memory can be cached by the CPU if the region
    has the memory prefetchable bit set.


    How is a device controlled through a memory region? That is entirely up to the
    device. For example, one region could be used for control and status registers,
    while a second region could be used to read or write data, for example input video
    from a camera. If you are reading this in electronic form, then this very text
    may be continuously written to the memory region representing the frame buffer
    of your graphics card. Just like USB, there are a number of standardized interfaces
    for PCI-based devices as well. An example of this is VGA compatible graphics cards,
    which allow for the basic operation of a graphics card using a known interface
    including memory regions and/or ports. Standardized interfaces for IDE, SATA,
    and PCI-based USB controllers also exist, enabling an operating system to use
    its default driver for any device that complies with such an interface.


    Because PCI is “plug and play,” I/O resource for a PCI device is configured automatically
    by the kernel/EFI (or BIOS in traditional PCs), in contrast to the obsolete ISA
    bus, where jumpers had to be physically placed to select the base I/O addresses
    and interrupt line for each device separately in an attempt to avoid resource
    conflicts.


    When a device is configured, each region present in the configuration space will
    be configured with its own address range. The size of the range depends on the
    device.


    When a device is configured, it will be assigned a physical memory address range
    by the system. As you can see from [Figure 9-1](#Chapter09.html#fig_9_1) there
    is no register for storing the size of each memory region. So how does the system
    know how big each region is? The size of a memory region is determined by the
    system by setting all bits in one of the base address slots in the configuration
    space and then reading back the value. A region must be of a size that is a power
    of two. Devices, if they support it, can combine two BARs to form a 64-bit address.


    Before the system or a driver can access any of the I/O regions, they need to
    be enabled by toggling a bit in the device''s command register. We already saw
    how this was done in `MyFirstPCIDriver` by calling `fPCIDevice->setMemoryEnable(true)`
    in the driver''s `start()` method.


    ##### Enumerating I/O Regions


    To discover available memory regions of a PCI device (there may be up to six),
    let''s modify `MyFirstPCIDriver` to dump some additional information about the
    device in its `start()` method, by adding the code in [Listing 9-6](#Chapter09.html#list_9_6)
    after the call to `setMemoryEnable()`.


    ***Listing 9-6.** Enumerating PCI I/O Memory Regions*


    `for (UInt32 i = 0; i < fPCIDevice->getDeviceMemoryCount(); i++)`

    `{`

    `    IODeviceMemory* memoryDesc = fPCIDevice->getDeviceMemoryWithIndex(i);`

    `    if (!memoryDesc)`

    `        continue;`

    `    #ifdef __LP64__`

    `        IOLog("region%u: length=%llu bytes\n", i, memoryDesc->getLength());`

    `    #else`


    `        IOLog("region%lu: length=%lu bytes\n", i, memoryDesc->getLength());`

    `    #endif`

    `}`


    If you compile and load the driver, you should see something like the following
    printed in the `kernel.log`:


    * * *


    `Apr 1 11:06:18 macbook kernel[0]: com_osxkernel_MyFirstPCIDriver::start`

    `Apr 1 11:06:18 macbook kernel[0]: region0: length=16777216 bytes`

    `Apr 1 11:06:18 macbook kernel[0]: region1: length=268435456 bytes`

    `Apr 1 11:06:18 macbook kernel[0]: region2: length=33554432 bytes`

    `Apr 1 11:06:18 macbook kernel[0]: region3: length=128 bytes`

    `Apr 1 11:06:18 macbook kernel[0]: region4: length=131072 bytes`


    * * *


    Your output may differ depending on your system model and graphics card (you may
    even have multiple). In this case, the largest region (256 MB) is region 1, which
    is the graphics card''s frame buffer.'
  trans: "```markdown\n`IOPCIDevice` 的许多方法（如 `setMemoryEnable()`）是便捷的抽象方法，它们代表您执行相应的配置空间读写操作。对配置空间的\
    \ I/O 操作会由 `IOPCIDevice` 传递给其父设备（大多数情况下是 `IOPCIBridge`），最终到达由平台专家实现的根桥设备，具体细节取决于系统实现。\n\
    \n### 访问扩展配置空间\n\n您可能注意到上一节中 I/O 函数存在不一致性。前文提到扩展配置空间为 4096 字节。当 `config*()` 系列函数的偏移量参数采用\
    \ `UInt8` 类型时，如何访问大于 255 的偏移量？答案在于以下方法族：\n\n```\nUInt32 extendedConfigRead32(IOByteCount\
    \ offset);\nUInt16 extendedConfigRead16(IOByteCount offset);\nUInt8  extendedConfigRead8(IOByteCount\
    \ offset);\n\nvoid extendedConfigWrite32(IOByteCount offset, UInt32 data);\nvoid\
    \ extendedConfigWrite16(IOByteCount offset, UInt16 data);\nvoid extendedConfigWrite8(IOByteCount\
    \ offset, UInt8 data);\n```\n\n这些方法与前述接口具有相同的接口形式。但它们在 `offset` 参数上使用了更宽的数据类型\
    \ `IOByteCount`，从而允许访问大于 255 的偏移量。\n\n### 搜索能力寄存器\n\n由于能力寄存器并非位于固定偏移量，查找能力寄存器的过程需要先搜索能力\
    \ ID，然后读取下一个字节以确定该能力的长度，这同时也给出了下一个能力的偏移量。按此流程沿链表向下搜索，直到找到目标能力。幸运的是，我们无需手动编写此代码，因为\
    \ `IOPCIDevice` 类提供了两个辅助方法定位能力：\n\n```\nvirtual UInt32 findPCICapability(UInt8\
    \ capabilityID, UInt8* offset = 0 );\nvirtual UInt32 extendedFindPCICapability(UInt32\
    \ capabilityID, IOByteCount* offset = 0 );\n```\n\n以下示例演示如何获取 PCIe 链路状态寄存器，该寄存器包含设备的活动通道数（第\
    \ 4-9 位）和链路速度（第 0-3 位）：\n\n```\nIOByteCount offset = 0;\nif (fPCIDevice->extendedFindPCICapability(kIOPCIPCIExpressCapability,\
    \ &offset))\n{\n    UInt16 value = fPCIDevice->extendedConfigRead16(offset + 0x12);\n\
    }\n```\n\n该方法将返回能力 ID（本例中为 `kIOPCIExpressCapability`），如果未找到指定 ID 的能力则返回零。输出参数\
    \ `offset` 用于存储已找到能力的偏移量。找到能力后，我们可以通过将偏移量加上 `0x12`（18）来读取链路状态寄存器。\n\n## PCI I/O\
