    \ the state of the driver.\n\n### Summary\n\n- The I/O Kit provides an object-oriented\
    \ framework for developing drivers on Mac OS X.\n- Drivers written using the framework\
    \ inherit from a suitable base class that is chosen based on the functionality\
    \ that the driver implements. The I/O Kit provides base classes for drivers such\
    \ as audio input and output streams, serial ports, and disk devices.\n- A driver\
    \ accesses its hardware through an object known as its provider, which allows\
    \ communication with hardware in a way that is natural to the bus on which the\
    \ hardware is connected.\n- A driver is loaded only when its hardware is present\
    \ in the system, as described by matching criteria described in the driver's property\
    \ list.\n- The I/O Kit is built on top of a library known as `libkern`, which\
    \ provides runtime support to the kernel by way of object instantiation, reference\
    \ counting, and container classes.\n\n## C H A P T E R  5"
  raw: '#### Container Classes


    As well as defining the base class and providing a runtime environment for the
    kernel, libkern also defines a number of container classes to manage a collection
    of objects. The container classes provided by libkern include arrays, dictionaries,
    and both ordered and unordered sets. While all these containers can contain objects
    of varying types and can even contain objects of differing types within the same
    container, a container can contain only objects that are derived from the `OSObject`
    class.


    ![images](images/square.jpg) **Note**If you are familiar with user space programming
    on Mac OS X, the libkern container classes are equivalent to `NSMutableArray`,
    `NSMutableDictionary`, and `NSMutableSet`, or the Core Foundation types `CFMutableDictionary`,
    `CFMutableArray`, and `CFMutableSet`.


    To allow non-object scalar types such as Booleans, integers, and strings to be
    included in the container types, libkern provides the corresponding classes `OSBoolean`,
    `OSNumber,` and `OSString` for wrapping a `bool`, an integer value of up to 64
    bits in length, and a C-string, respectively.


    The handling of strings in libkern deserves special mention. The libkern library
    provides two classes for representing a string, `OSString` and `OSSymbol` (which
    is a subclass of `OSString`). The purpose of `OSSymbol` is not to provide a general
    wrapper for a string, but rather to hold string values that represent “symbols”
    in the kernel, such as commonly used keys in a matching dictionary. When a new
    instance of `OSSymbol` is created, the constructor checks for an existing `OSSymbol`
    object that contains the same string value, and if one is found, returns an instance
    of the existing object rather than creating a new instance. This means that for
    a given string value, there is at most one `OSSymbol` object representing that
    value. As a consequence, a dictionary that is keyed on `OSSymbol` values needs
    to compare the address of only two `OSSymbol` values rather than performing a
    more expensive string comparison.


    All the container classes follow the same behavior with regard to object ownership.
    Any object added to a container is retained by that container class, and objects
    are released by the container class once they are removed from the container or
    the final reference of the container itself is released and so the container is
    deallocated. After inserting an object into a container, if the caller no longer
    requires its own reference to that object, it is free to release the inserted
    object since the container class will maintain a reference to the object.


    After querying a container for an object that it contains, the caller should retain
    that object if there is any chance that the container could be released while
    the caller is still using the returned object. The libkern container classes do
    not increment the reference of their content objects before returning it to the
    caller (for example, the `OSArray` method `getLastObject()` will not increment
    the reference count of its last object before returning it to the caller).


    It is important to note that the container classes do not provide any synchronization
    for use in a multi-threaded environment. That is not to say that they cannot be
    used in a driver that contains multi-threaded code, but rather that it is the
    caller''s responsibility to add its own locking to ensure that calls to the container
    classes are serialized.


    The container classes provided by libkern include the following:


    *   `OSArray`, which provides storage and retrieval of objects based on the index
    within the array

    *   `OSDictionary`, which provides storage and retrieval based on a provided string
    value (which is known as the “key”)

    *   `OSSet`, which provides storage for objects and the ability to test whether
    an object is in the set

    *   `OSOrderedSet`, which provides storage that is sorted based on a provided
    comparison function and retrieval based on an index


    All libkern container classes can be iterated over using the class `OSCollectionIterator`,
    as shown in [Listing 4-5](#Chapter04.html#list_4_5). When iterating over an `OSDictionary`,
    the objects returned by the iterator represent the keys of the dictionary, and
    not the values contained in the dictionary itself.


    ***Listing 4-5.** A Sample Function to Iterate Over the Objects Contained in an
    OSArray*


    `void    IterateArray (OSArray* array)`

    `{`

    `        OSCollectionIterator*   iter;`


    `        iter = OSCollectionIterator::withCollection(array);`

    `        if (iter != NULL)`

    `        {`

    `                OSObject*       anObject;`


    `                while ((anObject = iter->getNextObject()) != NULL)`

    `                {`

    `                        // Assume the array only contains string values:`

    `                        // OSString* aString = OSDynamicCast(OSString, anObject);`

    `                }`


    `                iter->release();`

    `        }`

    `}`


    A special container object for drivers is their property table. This is a dictionary
    that contains a number of key/value pairs that are local to a particular driver
    instance. When a driver is loaded, the I/O Kit fills its property table with the
    entries of the matching dictionary from the driver''s Info.plist file. However,
    as the driver runs, it is free to add or remove additional values from its property
    table. A driver''s property table is special because it can be accessed by user
    space applications, including IORegistryExplorer. This makes it a perfect means
    for passing small amounts of data, such as integer values, between the driver
    and user space.


    Alternatively, a driver can write the values of certain important variables to
    keys in its property table, which can then be monitored in IORegistryExplorer
    (or a custom application) to track the state of the driver.


    ### Summary


    *   The I/O Kit provides an object-oriented framework for developing drivers on
    Mac OS X.

    *   Drivers written using the framework inherit from a suitable base class that
    is chosen based on the functionality that the driver implements. The I/O Kit provides
    base classes for drivers such as audio input and output streams, serial ports,
    and disk devices.

    *   A driver accesses its hardware through an object known as its provider, which
    allows communication with hardware in a way that is natural to the bus on which
    the hardware is connected.

    *   A driver is loaded only when its hardware is present in the system, as described
    by matching criteria described in the driver''s property list.

    *   The I/O Kit is built on top of a library known as libkern, which provides
    runtime support to the kernel by way of object instantiation, reference counting,
    and container classes.


    ## C H A P T E R  5'
  trans: "\n#### 容器类\n\n`libkern` 除了定义基类并为内核提供运行时环境外，还定义了许多用于管理对象集合的容器类。`libkern`\
    \ 提供的容器类包括数组、字典，以及有序和无序集合。虽然所有这些容器都可以包含不同类型的对象，甚至可以在同一个容器中包含不同类型的对象，但容器只能包含派生自\
    \ `OSObject` 类的对象。\n\n> **注意：** 如果你熟悉 Mac OS X 上的用户空间编程，`libkern` 容器类相当于 `NSMutableArray`、`NSMutableDictionary`\
    \ 和 `NSMutableSet`，或者 Core Foundation 类型 `CFMutableDictionary`、`CFMutableArray`\
    \ 和 `CFMutableSet`。\n\n为了允许将非对象标量类型（例如布尔值、整数和字符串）包含到容器类型中，`libkern` 提供了相应的类 `OSBoolean`、`OSNumber`\
    \ 和 `OSString`，分别用于封装 `bool`、最长 64 位的整数值以及 C 字符串。\n\n`libkern` 中对字符串的处理值得特别一提。`libkern`\
    \ 库提供了两个用于表示字符串的类：`OSString` 和 `OSSymbol`（后者是 `OSString` 的子类）。`OSSymbol` 的目的并非提供一个通用的字符串封装器，而是保存代表内核中“符号”的字符串值，例如匹配字典中的常用键。当创建\
    \ `OSSymbol` 的新实例时，构造函数会检查是否已存在包含相同字符串值的 `OSSymbol` 对象；如果找到，则返回已有对象的实例，而不是创建一个新实例。这意味着，对于给定的字符串值，最多只有一个\
    \ `OSSymbol` 对象表示该值。因此，一个以 `OSSymbol` 值作为键的字典，只需比较两个 `OSSymbol` 值的地址，而无需执行开销更大的字符串比较。\n\
    \n所有容器类在对象所有权方面都遵循相同的行为。添加到容器中的任何对象都会被该容器类保留（retain），而当对象从容器中移除，或者容器本身的最后一个引用被释放导致容器被释放时，容器类会释放（release）这些对象。将对象插入容器后，如果调用者不再需要自己对该对象的引用，则可以自由释放该插入的对象，因为容器类会保持对该对象的一个引用。\n\
    \n在向容器查询其包含的对象后，如果调用者仍在使用返回的对象期间容器可能被释放，则调用者应保留（retain）该对象。`libkern` 容器类在将内容对象返回给调用者之前，不会增加其引用计数（例如，`OSArray`\
    \ 的 `getLastObject()` 方法在将其最后一个对象返回给调用者之前，不会增加该对象的引用计数）。\n\n需要注意的是，容器类不提供任何用于多线程环境的同步机制。这并非意味着它们不能在包含多线程代码的驱动程序中使用，而是意味着调用者有责任添加自己的锁定机制，以确保对容器类的调用是串行化的。\n\
    \n`libkern` 提供的容器类包括以下内容：\n\n- `OSArray`，提供基于数组索引的对象存储和检索\n- `OSDictionary`，提供基于提供的字符串值（称为“键”）的对象存储和检索\n\
    - `OSSet`，提供对象的存储以及测试对象是否在集合中的能力\n- `OSOrderedSet`，提供基于提供的比较函数进行排序的存储和基于索引的检索\n\
    \n所有 `libkern` 容器类都可以使用类 `OSCollectionIterator` 进行迭代，如代码清单 4-5 所示。当迭代 `OSDictionary`\
    \ 时，迭代器返回的对象代表字典的键，而非字典本身包含的值。\n\n**代码清单 4-5.** 一个遍历 `OSArray` 中包含对象的示例函数\n\n\
    ```\nvoid    IterateArray (OSArray* array)\n{\n        OSCollectionIterator* \
    \  iter;\n\n        iter = OSCollectionIterator::withCollection(array);\n    \
    \    if (iter != NULL)\n        {\n                OSObject*       anObject;\n\
    \n                while ((anObject = iter->getNextObject()) != NULL)\n       \
    \         {\n                        // 假设数组中只包含字符串值：\n                      \
    \  // OSString* aString = OSDynamicCast(OSString, anObject);\n               \
    \ }\n\n                iter->release();\n        }\n}\n```\n\n驱动程序的一个特殊容器对象是它们的属性表。这是一个字典，包含特定驱动程序实例本地的多个键/值对。当加载驱动程序时，I/O\
    \ Kit 会用来自驱动程序 `Info.plist` 文件的匹配字典条目填充其属性表。然而，当驱动程序运行时，它可以自由地在其属性表中添加或删除额外的值。驱动程序属性表的特殊性在于，它可以被用户空间应用程序（包括\
    \ `IORegistryExplorer`）访问。这使得它成为在驱动程序和用户空间之间传递少量数据（例如整数值）的理想方式。\n\n或者，驱动程序可以将某些重要变量的值写入其属性表中的键，然后可以在\
    \ `IORegistryExplorer`（或自定义应用程序）中监控这些值，以追踪驱动程序的状态。\n\n### 总结\n\n- I/O Kit 提供了一个面向对象的框架，用于在\
    \ Mac OS X 上开发驱动程序。\n- 使用该框架编写的驱动程序继承自一个合适的基类，基类的选择基于驱动程序实现的功能。I/O Kit 为驱动程序提供了基类，例如音频输入和输出流、串行端口和磁盘设备。\n\
    - 驱动程序通过一个称为其提供者（provider）的对象访问其硬件，该对象允许以与硬件所连接的总线相适宜的方式进行硬件通信。\n- 只有当硬件存在于系统中时，驱动程序才会被加载，这由驱动程序属性列表中描述的匹配标准决定。\n\
    - I/O Kit 构建在一个名为 `libkern` 的库之上，该库通过对象实例化、引用计数和容器类为内核提供运行时支持。\n\n## 第 5 章\n"
- fmt: '## Interacting with Drivers from Applications


    In the previous chapter, we learnt about I/O Kit drivers, which live in the kernel.
    On the other hand, the applications that users interact with live in user space.
    So, if the user is going to use the services provided by your driver, the kernel/user
    space boundary needs to be crossed.


    Mac OS X provides several different mechanisms through which a driver can provide
    its services to user space applications. The method that a developer chooses to
    allow a particular driver to provide its services to user space applications is
    dependent on the type of functionality that the driver implements. For example,
    all serial ports, audio drivers, and storage devices have their own interface
    that is defined by the I/O Kit. This interface allows a user space application
    to work with these devices. An application will work with devices provided by
    any hardware vendor, provided that the vendor''s driver implements the standard
    I/O Kit interface for that device. From a driver developer''s point of view, using
    the common interface provided by the I/O Kit is in their best interest because
    it ensures that the driver is accessible to a large number of user space applications
    without forcing developers to adopt a custom interface for the driver. It also
    requires less work on your part.


    A good example of this is a serial port driver. A Mac OS X user space application
    accesses serial ports through a character device that is represented by a file
    in the `/dev` path of the file system. To communicate over a serial device, a
    user application calls the same functions as it would to open, read, or write
    to any other file on the file system; that is `open()`, `read()`, and `write()`.
    In the kernel, a driver that provides a serial port will create an instance of
    the standard I/O Kit class `IOSerialStreamSync`. The I/O Kit''s serial family
    will create a device node in the `/dev` directory, publishing the path of the
    node in the I/O Registry so that applications can find it. It will also pass requests
    from user applications to method calls in the driver''s implementation, which
    is a subclass of the standard `IOSerialDriverSync` class. There was no work required
    by the driver developer in publishing its services to user space. This is illustrated
    in [Figure 5-1](#Chapter05.html#fig_5_1).


    ![images](images/0501.jpg)


    **Figure 5-1.** The classes involved in communicating with a serial port from
    a user space application. With the exception of `MySerialDriver`, all of the objects
    and their connections are created by the I/O Kit.


    Not all driver developers are as fortunate as the developers of a serial port
    driver in having the I/O Kit take care of crossing the user space/kernel boundary.
    For a hardware device that provides custom functionality, the I/O Kit may not
    provide an appropriate client interface that your driver is able to use. In this
    case, your driver will need to implement a custom interface for user space applications
    to use when interacting with it. As we saw in [Chapter 1](#Chapter01.html#ch1),
    Mac OS X has a strict barrier between user space and the kernel. This places restrictions
    on the nature of how this interaction takes place. This chapter describes the
    methods provided by the I/O Kit to cross the user/kernel boundary and allow communication
    between user applications and a kernel driver.


    ### The I/O Kit Framework


    The user space API through which a process communicates with a kernel driver is
    provided by a framework known as "IOKit.framework," which will hereafter be referred
    to as the "I/O Kit framework." The I/O Kit framework allows a user space application
    to determine the hardware devices and kernel drivers that are present on the system,
    to watch for the arrival or removal of hardware that can be hot-plugged (such
    as USB devices), and to interact with I/O Kit drivers. The I/O Kit framework defines
    the data types that provide a user space representation of kernel objects and
    the functions that are needed to manipulate these kernel objects. Although the
    I/O Kit is a C++ based framework in the kernel, the user space I/O Kit framework
    is provided as a set of C-based functions, so it can be used by projects that
    are written in both C and C++ or by projects that are written in Objective-C,
    which is of particular importance for GUI applications.


    The I/O Kit framework provides access to the kernel objects that are present in
    the I/O Registry, which can be examined with the `IORegistryExplorer` utility
    (see [Chapter 4](#Chapter04.html#ch4)). The I/O Registry consists of kernel objects
    that represent hardware devices that are connected to the computer or drivers
    that have matched against connected hardware devices and have been loaded into
    the kernel. The objects in the I/O Registry can be created only within the kernel,
    including by kernel drivers, but the I/O Kit framework provides a way for applications
    in user space to examine the contents of the I/O Registry, including iterating
    the registry, determining the relationship between objects (for example, to determine
    which driver has been loaded against a particular hardware device), and to read
    and write the properties of an object in the I/O Registry.


    The I/O Registry contains kernel objects that may represent either loaded drivers
    or connected hardware devices. This means that the functionality provided by the
    I/O Kit framework can be applied to both a driver and to a hardware device. In
    some cases, an application can directly manipulate a hardware device through its
    corresponding I/O Registry object without the need for a kernel driver; this is
    discussed in [Chapter 15](#Chapter15.html#ch15) for USB devices. The I/O Kit framework
    also allows an application to install a notification to watch for the arrival
    of a particular driver or hardware device.'
