    Because the Mach layer is still, to some degree, an isolated component, many refer
    to XNU as a hybrid kernel, as opposed to a microkernel or a monolithic kernel,
    where all OS services run in the same context. [Figure 2-3](#Chapter02.html#fig_2_3)
    shows a simplified view of XNU''s architecture.


    ![images](images/0203.jpg)


    ***Figure 2-3.** The XNU kernel architecture*


    The second major component of XNU is the BSD layer, which can be thought of as
    an outer ring around the Mach layer. BSD again provides a programming interface
    to end-user applications. Responsibilities include process management, file systems,
    and networking.


    The last major component is the I/O Kit, which provides an object-oriented framework
    for device drivers.


    While it would be nice if each layer had clear responsibilities, reality is somewhat
    more complicated and the lines between each layer are blurred, as many OS services
    and tasks span the borders of multiple components.


    ![images](images/square.jpg) **Tip** You can download the full source code for
    XNU at Apple''s open source website: http://[`www.opensource.apple.com`](http://www.opensource.apple.com).


    #### Kernel Extensions (KEXTs)


    The XNU kernel, like most, if not all, modern operating systems, supports dynamically
    loading code into the kernel''s address space at runtime. This allows extra functionality,
    such as drivers, to be loaded and unloaded while the kernel is running. A main
    focus of this book will be the development of such kernel extensions, with a particular
    focus on drivers, as this is the most common reason to implement a kernel extension.
    There are two principal classes of kernel extensions. The first class is for I/O
    Kit-based kernel extensions, which are used for hardware drivers. These extensions
    are written in C++. The second class is for generic kernel extensions, which are
    typically written in C (though C++ is possible here, too). These extensions can
    implement anything from new network protocols to file systems. Generic kernel
    extensions usually interface with the BSD or Mach layers.


    #### Mach


    The Mach layer can be seen as the core of the kernel, a provider of lower-level
    services to higher-level components like the BSD layer and I/O Kit. It is responsible
    for hardware abstraction, hiding the differences between the PowerPC architecture
    and the Intel x86 and x86-64 architectures. This includes details for handling
    traps and interrupts, as well as managing memory, including virtual memory and
    paging. This design allows the kernel to be easily adapted to new hardware architectures,
    as proven with Apple''s move to Intel x86, and later to ARM for iOS. In addition
    to hardware abstraction, Mach is responsible for the scheduling of threads. It
    supports symmetric multiprocessing (SMP), which refers to the ability to schedule
    processes between multiple CPUs or CPU cores. In fact, the difficulty of implementing
    proper SMP support in the existing BSD Unix kernel was instrumental in the development
    of Mach.


    Interprocess communication (IPC) is the core tenet of Mach''s design. IPC in Mach
    is implemented as a client/server system. A task (the client) is able to request
    services from another task (the server). The endpoints in this system are known
    as ports. A port has associated rights, which determine if a client has access
    to a particular service. This IPC mechanism is used internally throughout the
    XNU kernel. The following sections will outline the key abstractions and services
    provided by the Mach layer.


    ![images](images/square.jpg) **Tip** Mach API documentation can be found in the
    `osfmk/man` directory of the XNU source package.


    ##### Tasks and Threads


    A task is a group consisting of zero or more executable threads that share resources
    and memory address space. A task needs at least one thread to be executed. A Mach
    task maps one to one to a Unix (BSD layer) process. The XNU kernel is also a task
    (known as the `kernel_task`) consisting of multiple threads. Task resources are
    private and cannot normally be accessed by the threads of another task.


    Unlike a task, a thread is an executable entity that can be scheduled and run
    by the CPU. A thread shares resources, such as open files or network sockets,
    with other threads in the same task. Threads of the same task can execute on different
    CPUs concurrently. A thread has its own state, which includes a copy of the processor
    state (registers and instruction counter) and its own stack. The state of a thread
    is restored when it is scheduled to run on a CPU. Mach supports preemptive multitasking,
    which means that a thread''s execution can be interrupted before its allocated
    time slice (10ms in XNU) is up. Preemption happens under a variety of circumstances,
    such as when a high priority OS event occurs, when a higher priority thread needs
    to run, or when waiting for long I/O operations to complete. A thread can also
    voluntarily preempt itself by going to sleep. A Mach thread is scheduled independently
    from other threads, regardless of the task to which it belongs. The scheduler
    is also unaware of process parent-child relationships traditional in Unix systems
    (the BSD layer, however, is aware).'
  trans: '

    ### XNU 内核


    `XNU` 内核庞大而复杂，对其架构的完整描述超出了本书的范围（有其他书籍可满足此需求），但我们将在以下章节中概述构成 `XNU` 的一些主要组件，并简要说明其职责与运作模式。在大多数情况下，为内核编程时，你将编写的是扩展程序，而非修改核心内核本身（除非你恰好是苹果工程师或
    Darwin 贡献者）。但了解整个内核的基本架构仍然很有帮助，因为这能让你更好地理解内核扩展在整体框架中的定位。后续章节将侧重于介绍内核提供的一些更重要的编程框架，例如
    I/O Kit。


    `XNU` 内核是 Mac OS X 和 iOS 的核心。`XNU` 采用分层架构，由三个主要组件构成。内核的最内层被称为 Mach 层，源自卡内基梅隆大学开发的
    Mach 3.0 内核。本书中所有提及 Mach 之处，均指在 OS X 和 iOS 中实现的版本，而非原始项目。Mach 最初是作为微内核开发的，是一个仅提供基础服务的薄层，例如处理器管理与调度，以及
    IPC（进程间通信）——这是 Mach 内核的核心概念。由于采用分层架构，iOS 与 Mac OS X 版本的 `XNU` 差异极小。


    尽管 `XNU` 中 Mach 层的职责与原始项目相同，但其他操作系统服务（如文件系统和网络）则与 Mach 运行在同一内存空间中。苹果将性能作为采用此设计的关键原因，因为在地址空间之间切换（上下文切换）是一项代价高昂的操作。


    由于 Mach 层在某种程度上仍然是一个独立的组件，许多人将 `XNU` 称为混合内核，以区别于微内核或宏内核（后者中所有操作系统服务运行在同一上下文中）。图
    2-3 展示了 `XNU` 架构的简化示意图。


    ![images](img/0203.jpg)


    ***图 2-3.** XNU 内核架构*


    `XNU` 的第二个主要组件是 BSD 层，可将其视为 Mach 层外围的环。BSD 再次为终端用户应用程序提供编程接口。其职责包括进程管理、文件系统和网络。


    最后一个主要组件是 I/O Kit，它为设备驱动程序提供了一个面向对象的框架。


    尽管理想情况下每个层应有清晰的职责划分，但现实情况更为复杂，各层之间的界限是模糊的，因为许多操作系统服务和任务跨越了多个组件的边界。


    ![images](img/square.jpg) **提示** 你可以在苹果开源网站下载 `XNU` 的完整源代码：[`www.opensource.apple.com`](http://www.opensource.apple.com)。


    ### 内核扩展 (KEXT)


    `XNU` 内核与大多数（即便不是全部）现代操作系统一样，支持在运行时将代码动态加载到内核地址空间中。这使得在内核运行时可以加载和卸载额外的功能（如驱动程序）。本书的一个主要焦点便是此类内核扩展的开发，尤其侧重于驱动程序，因为这是实现内核扩展最常见的原因。内核扩展主要有两类。第一类是基于
    I/O Kit 的内核扩展，用于硬件驱动程序。这些扩展使用 C++ 编写。第二类是通用内核扩展，通常使用 C 编写（虽然 C++ 也可行）。这些扩展可以实现从新网络协议到文件系统的任何功能。通用内核扩展通常与
    BSD 或 Mach 层交互。


    ### Mach


    Mach 层可被视为内核的核心，为 BSD 层和 I/O Kit 等更高级别的组件提供底层服务。它负责硬件抽象，隐藏了 PowerPC 架构与 Intel
    x86 及 x86-64 架构之间的差异。这包括处理陷阱和中断的细节，以及管理内存（包括虚拟内存和分页）。这种设计使得内核能够轻松适配新的硬件架构，苹果从
    Intel x86 迁移，而后又为 iOS 采用 ARM 架构便证明了这一点。除了硬件抽象，Mach 还负责线程的调度。它支持对称多处理（SMP），即在多个
    CPU 或 CPU 核心之间调度进程的能力。事实上，在已有的 BSD Unix 内核中实现完善的 SMP 支持的难度，正是促使 Mach 开发的关键因素之一。


    进程间通信（IPC）是 Mach 设计的核心原则。Mach 中的 IPC 以客户端/服务器系统形式实现。一个任务（客户端）能够请求另一个任务（服务器）的服务。此系统中的端点被称为端口。端口具有相关的权限，该权限决定了客户端是否有权访问特定服务。这种
    IPC 机制在 `XNU` 内核内部被广泛使用。以下章节将概述 Mach 层提供的关键抽象和服务。


    ![images](img/square.jpg) **提示**  Mach API 文档可在 `XNU` 源代码包的 `osfmk/man` 目录中找到。


    #### 任务与线程


    一个任务是由零个或多个共享资源和内存地址空间的可执行线程组成的组。一个任务至少需要一个线程才能被执行。一个 Mach 任务与一个 Unix（BSD 层）进程一一对应。`XNU`
    内核本身也是一个任务（称为 `kernel_task`），由多个线程组成。任务资源是私有的，通常不能被其他任务的线程访问。


    与任务不同，线程是一个可被 CPU 调度和运行的可执行实体。线程与同一任务中的其他线程共享资源，例如打开的文件或网络套接字。同一任务的线程可以并发地在不同的
    CPU 上执行。线程拥有自己的状态，包括处理器状态的副本（寄存器和指令计数器）和自身的栈。当线程被调度到某个 CPU 上运行时，其状态会被恢复。Mach 支持抢占式多任务处理，这意味着线程的执行可以在其分配的时隙（`XNU`
    中为 10 毫秒）用完之前被中断。抢占发生在多种情况下，例如当高优先级操作系统事件发生时，当更高优先级的线程需要运行，或当等待长时间 I/O 操作完成时。线程也可以通过进入休眠状态来自愿进行抢占。一个
    Mach 线程独立于其他线程进行调度，无论它属于哪个任务。调度器也不了解传统 Unix 系统中进程的父子关系（不过 BSD 层是了解的）。

