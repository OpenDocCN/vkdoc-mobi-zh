- fmt: "#### Driver Example: USB Mass Storage Device Driver\n\nLet's put what we've\
    \ learned so far into practice by putting together a simple USB-based driver,\
    \ which will print log messages as various events occur. Now we could make a purely\
    \ virtual driver, but that wouldn't be any fun, so let's instead create a driver\
    \ that piggybacks on a real USB device so that we can see what happens when the\
    \ device is plugged in and removed from the bus, but without interfering with\
    \ the device's operation. The object-oriented nature of the I/O Kit makes it such\
    \ that writing a device driver requires relatively little effort. Moreover, writing\
    \ a device driver for a USB device is very similar to writing a driver for Firewire,\
    \ PCI, or the virtual IOKitTest driver from [Chapter 4](#Chapter04.html#ch4).\n\
    \nTo try this example, you need a thumb/flash drive or external USB hard drive.\
    \ It doesn't have to be formatted for Mac, as we are not going to access the data.\n\
    \n![images](images/square.jpg) **Caution** It is recommended to try examples in\
    \ this book on a Mac that is not being used to store important data. A kernel\
    \ crash may corrupt your files or operating system. If you do not have a dedicated\
    \ Mac for this purpose, ensure you have working backups of your data.\n\nOur driver\
    \ will be called `MyFirstUSBDriver`, and the class declaration is shown in [Listing\
    \ 8-3](#Chapter08.html#list_8_3).\n\n***Listing 8-3.** `MyFirstUSBDriver.h`: Class\
    \ Declaration for `MyFirstUSBDriver`*\n\n```\n#include <IOKit/usb/IOUSBDevice.h>\n\
    \nclass com_osxkernel_MyFirstUSBDriver : public IOService\n{\n    OSDeclareDefaultStructors(com_osxkernel_MyFirstUSBDriver)\n\
    \npublic:\n    virtual bool init(OSDictionary *propTable);\n    virtual IOService*\
    \ probe(IOService *provider, SInt32 *score );\n    virtual bool attach(IOService\
    \ *provider);\n    virtual void detach(IOService *provider);\n    virtual bool\
    \ start(IOService *provider);\n    virtual void stop(IOService *provider);\n \
    \   virtual bool terminate(IOOptionBits options = 0);\n};\n```\n\nYou will notice\
    \ that the class is structurally nearly identical to the IOKitTest driver, with\
    \ a few minor changes, which we will discuss later. The implementation of `MyFirstUSBDriver`\
    \ is shown in [Listing 8-4](#Chapter08.html#list_8_4).\n\n***Listing 8-4.** `MyFirstUSBDriver.cpp`:\
    \ Implementation of `MyFirstUSBDriver` Class*\n\n```\n#include <IOKit/IOLib.h>\n\
    #include <IOKit/usb/IOUSBInterface.h>\n#include \"MyFirstUSBDriver.h\"\n\nOSDefineMetaClassAndStructors(com_osxkernel_MyFirstUSBDriver,\
    \ IOService)\n#define super IOService\n\nvoid logEndpoint(IOUSBPipe* pipe)\n{\n\
    \    IOLog(\"Endpoint #%d \", pipe->GetEndpointNumber());\n    IOLog(\"--> Type:\
    \ \");\n    switch (pipe->GetType())\n    {\n        case kUSBControl: IOLog(\"\
    kUSBControl \"); break;\n        case kUSBBulk: IOLog(\"kUSBBulk \"); break;\n\
    \        case kUSBIsoc: IOLog(\"kUSBIsoc \"); break;\n        case kUSBInterrupt:\
    \ IOLog(\"kUSBInterrupt \"); break;\n    }\n    IOLog(\"--> Direction: \");\n\
    \    switch (pipe->GetDirection())\n    {\n        case kUSBOut: IOLog(\"OUT (kUSBOut)\
    \ \"); break;\n        case kUSBIn: IOLog(\"IN (kUSBIn) \"); break;\n        case\
    \ kUSBAnyDirn: IOLog(\"ANY (Control Pipe) \"); break;\n    }        \n    IOLog(\"\
    maxPacketSize: %d interval: %d\\n\", pipe->GetMaxPacketSize(), pipe->GetInterval());\
    \    \n}\n\nbool com_osxkernel_MyFirstUSBDriver::init(OSDictionary* propTable)\n\
    {\n    IOLog(\"com_osxkernel_MyFirstUSBDriver::init(%p)\\n\", this);\n    return\
    \ super::init(propTable);\n}\n\nIOService* com_osxkernel_MyFirstUSBDriver::probe(IOService*\
    \ provider, SInt32* score)\n{\n    IOLog(\"%s(%p)::probe\\n\", getName(), this);\n\
    \    return super::probe(provider, score);\n}\n\nbool com_osxkernel_MyFirstUSBDriver::attach(IOService*\
    \ provider)\n{\n    IOLog(\"%s(%p)::attach\\n\", getName(), this);\n    return\
    \ super::attach(provider);\n}\n\nvoid com_osxkernel_MyFirstUSBDriver::detach(IOService*\
    \ provider)\n{\n    IOLog(\"%s(%p)::detach\\n\", getName(), this);\n    return\
    \ super::detach(provider);\n}\n\nbool com_osxkernel_MyFirstUSBDriver::start(IOService*\
    \ provider)\n{\n    IOUSBInterface* interface;\n    IOUSBFindEndpointRequest request;\n\
    \    IOUSBPipe* pipe = NULL;\n\n    IOLog(\"%s(%p)::start\\n\", getName(), this);\n\
    \n    if (!super::start(provider))\n        return false;\n\n    interface = OSDynamicCast(IOUSBInterface,\
    \ provider);\n    if (interface == NULL)\n    {\n        IOLog(\"%s(%p)::start\
    \ -> provider not a IOUSBInterface\\n\", getName(), this);\n        return false;\n\
    \    }\n\n    // Mass Storage Devices use two bulk pipes, one for reading and\
    \ one for writing.\n\n    // Find the Bulk In Pipe.\n    request.type = kUSBBulk;\n\
    \    request.direction = kUSBIn;\n    pipe = interface->FindNextPipe(NULL, &request,\
    \ true);\n    if (pipe)\n    {\n        logEndpoint(pipe);\n        pipe->release();\n\
    \    }\n\n    // Find the Bulk Out Pipe.\n    request.type = kUSBBulk;\n    request.direction\
    \ = kUSBOut;\n    pipe = interface->FindNextPipe(NULL, &request, true);\n    if\
    \ (pipe)\n    {\n        logEndpoint(pipe);\n        pipe->release();\n    } \
    \ \n    return true;\n}\n\nvoid com_osxkernel_MyFirstUSBDriver::stop(IOService\
    \ *provider)\n{\n    IOLog(\"%s(%p)::stop\\n\", getName(), this);\n    super::stop(provider);\n\
    }\n\nbool com_osxkernel_MyFirstUSBDriver::terminate(IOOptionBits options)\n{\n\
    \    IOLog(\"%s(%p)::terminate\\n\", getName(), this);\n    return super::terminate(options);\n\
    }\n```\n\nAs you may see, there is very little logic in this driver, with the\
    \ exception of logging when the various methods of our driver are called. The\
    \ `start()` method will also attempt to find the bulk IN and bulk OUT endpoints,\
    \ and log information about the endpoints. We will test the driver shortly, but\
    \ first we have to create a matching dictionary so that the I/O Kit will know\
    \ when to load our driver. The matching dictionary for `MyFirstUSBDriver` is shown\
    \ in [Listing 8-5](#Chapter08.html#list_8_5).\n\n***Listing 8-5.** Matching Dictionary\
    \ for `MyFirstUSBDriver`*\n\n```\n<key>IOKitPersonalities</key>\n<dict>\n    <key>MyFirstUSBDriver</key>\n\
    \    <dict>\n        <key>bInterfaceClass</key>\n        <integer>8</integer>\n\
    \        <key>bInterfaceSubClass</key>\n        <integer>6</integer>\n       \
    \ <key>CFBundleIdentifier</key>\n        <string>com.osxkernel.MyFirstUSBDriver</string>\n\
    \        <key>IOClass</key>\n        <string>com_osxkernel_MyFirstUSBDriver</string>\n\
    \        <key>IOMatchCategory</key>\n        <string>com_osxkernel_MyFirstUSBDriver</string>\n\
    \        <key>IOProviderClass</key>\n        <string>IOUSBInterface</string>\n\
    \    </dict>\n</dict>\n```\n\nThe matching dictionary is more or less the same\
    \ as the example in [Listing 8-2](#Chapter08.html#list_8_2). It will match against\
    \ a USB interface rather than a USB device. We set `bInterfaceClass` to 8, which\
    \ is the class code for mass storage devices, and we set `bInterfaceSubClass`\
    \ to 6, which indicates that it uses the SCSI command set to communicate with\
    \ the device (which doesn't necessarily imply that the drive/storage itself understands\
    \ the SCSI protocol, but it is used to tunnel commands to the device over the\
    \ bus, where another controller may translate it into, for example, ATA commands).\n\
    \nBecause Apple's default `IOUSBMassStorageClass` matches against the same keys\
    \ as us, we need to specify a match category so that our driver will also be loaded.\
    \ We do this by adding the `IOMatchCategory` key. We set it to the name of our\
    \ class, but it could be any string.\n\n![images](images/square.jpg) **Tip** When\
    \ you open a `Info.plist` file in Xcode, it is opening in the property list editor\
    \ by default. If you wish to cut and paste to the property list, or you are curious\
    \ about the format it is stored in, you can right-click the file and choose “Open\
    \ as,” and then choose “Source Code,” which will present it in XML format."
  raw: '#### Driver Example: USB Mass Storage Device Driver


    Let''s put what we''ve learned so far into practice by putting together a simple
    USB-based driver, which will print log messages as various events occur. Now we
    could make a purely virtual driver, but that wouldn''t be any fun, so let''s instead
    create a driver that piggybacks on a real USB device so that we can see what happens
    when the device is plugged in and removed from the bus, but without interfering
    with the device''s operation. The object-oriented nature of the I/O Kit makes
    it such that writing a device driver requires relatively little effort. Moreover,
    writing a device driver for a USB device is very similar to writing a driver for
    Firewire, PCI, or the virtual IOKitTest driver from [Chapter 4](#Chapter04.html#ch4).


    To try this example, you need a thumb/flash drive or external USB hard drive.
    It doesn''t have to be formatted for Mac, as we are not going to access the data.


    ![images](images/square.jpg) **Caution** It is recommended to try examples in
    this book on a Mac that is not being used to store important data. A kernel crash
    may corrupt your files or operating system. If you do not have a dedicated Mac
    for this purpose, ensure you have working backups of your data.


    Our driver will be called MyFirstUSBDriver, and the class declaration is shown
    in [Listing 8-3](#Chapter08.html#list_8_3).


    ***Listing 8-3.** MyFirstUSBDriver.h: Class Declaration for MyFirstUSBDriver*


    `#include <IOKit/usb/IOUSBDevice.h>`


    `class com_osxkernel_MyFirstUSBDriver : public IOService`

    `{`

    `    OSDeclareDefaultStructors(com_osxkernel_MyFirstUSBDriver)`


    `public:`

    `    virtual bool init(OSDictionary *propTable);`

    `    virtual IOService* probe(IOService *provider, SInt32 *score );`

    `    virtual bool attach(IOService *provider);`

    `    virtual void detach(IOService *provider);`

    `    virtual bool start(IOService *provider);`

    `    virtual void stop(IOService *provider);`

    `    virtual bool terminate(IOOptionBits options = 0);`

    `};`


    You will notice that the class is structurally nearly identical to the IOKitTest
    driver, with a few minor changes, which we will discuss later. The implementation
    of MyFirstUSBDriver is shown in [Listing 8-4](#Chapter08.html#list_8_4).


    ***Listing 8-4.** MyFirstUSBDriver.cpp: Implementation of MyFirstUSBDriver Class*


    `#include <IOKit/IOLib.h>`

    `#include <IOKit/usb/IOUSBInterface.h>`

    `#include "MyFirstUSBDriver.h"`


    `OSDefineMetaClassAndStructors(com_osxkernel_MyFirstUSBDriver, IOService)`

    `#define super IOService`


    `void logEndpoint(IOUSBPipe* pipe)`

    `{`

    `    IOLog("Endpoint #%d ", pipe->GetEndpointNumber());`

    `    IOLog("--> Type: ");`

    `    switch (pipe->GetType())`

    `    {`

    `        case kUSBControl: IOLog("kUSBControl "); break;`

    `        case kUSBBulk: IOLog("kUSBBulk "); break;`

    `        case kUSBIsoc: IOLog("kUSBIsoc "); break;`

    `        case kUSBInterrupt: IOLog("kUSBInterrupt "); break;`

    `    }`

    `    IOLog("--> Direction: ");`

    `    switch (pipe->GetDirection())`

    `    {`

    `        case kUSBOut: IOLog("OUT (kUSBOut) "); break;`

    `        case kUSBIn: IOLog("IN (kUSBIn) "); break;`

    `        case kUSBAnyDirn: IOLog("ANY (Control Pipe) "); break;`

    `    }        `

    `    IOLog("maxPacketSize: %d interval: %d\n", pipe->GetMaxPacketSize(), pipe->GetInterval());    `

    `}`


    `bool com_osxkernel_MyFirstUSBDriver::init(OSDictionary* propTable)`

    `{`

    `    IOLog("com_osxkernel_MyFirstUSBDriver::init(%p)\n", this);`

    `    return super::init(propTable);`

    `}`


    `IOService* com_osxkernel_MyFirstUSBDriver::probe(IOService* provider, SInt32*
    score)`

    `{`

    `    IOLog("%s(%p)::probe\n", getName(), this);`

    `    return super::probe(provider, score);`

    `}`


    `bool com_osxkernel_MyFirstUSBDriver::attach(IOService* provider)`

    `{`

    `    IOLog("%s(%p)::attach\n", getName(), this);`

    `    return super::attach(provider);`

    `}`


    `void com_osxkernel_MyFirstUSBDriver::detach(IOService* provider)`

    `{`

    `    IOLog("%s(%p)::detach\n", getName(), this);`

    `    return super::detach(provider);`

    `}`


    `bool com_osxkernel_MyFirstUSBDriver::start(IOService* provider)`

    `{`

    `    IOUSBInterface* interface;`

    `    IOUSBFindEndpointRequest request;`

    `    IOUSBPipe* pipe = NULL;`


    `    IOLog("%s(%p)::start\n", getName(), this);`


    `    if (!super::start(provider))`

    `        return false;`


    `    interface = OSDynamicCast(IOUSBInterface, provider);`

    `    if (interface == NULL)`

    `    {`

    `        IOLog("%s(%p)::start -> provider not a IOUSBInterface\n", getName(),
    this);`

    `        return false;`

    `    }`


    `    // Mass Storage Devices use two bulk pipes, one for reading and one for writing.`


    `    // Find the Bulk In Pipe.`

    `    request.type = kUSBBulk;`

    `    request.direction = kUSBIn;`

    `    pipe = interface->FindNextPipe(NULL, &request, true);`

    `    if (pipe)`

    `    {`

    `        logEndpoint(pipe);`

    `        pipe->release();`

    `    }`


    `    // Find the Bulk Out Pipe.`

    `    request.type = kUSBBulk;`

    `    request.direction = kUSBOut;`

    `    pipe = interface->FindNextPipe(NULL, &request, true);`

    `    if (pipe)`

    `    {`

    `        logEndpoint(pipe);`

    `        pipe->release();`

    `    }  `

    `    return true;`

    `}`


    `void com_osxkernel_MyFirstUSBDriver::stop(IOService *provider)`

    `{`

    `    IOLog("%s(%p)::stop\n", getName(), this);`

    `    super::stop(provider);`

    `}`


    `bool com_osxkernel_MyFirstUSBDriver::terminate(IOOptionBits options)`

    `{`

    `    IOLog("%s(%p)::terminate\n", getName(), this);`

    `    return super::terminate(options);`

    `}`


    As you may see, there is very little logic in this driver, with the exception
    of logging when the various methods of our driver are called. The `start()` method
    will also attempt to find the bulk IN and bulk OUT endpoints, and log information
    about the endpoints. We will test the driver shortly, but first we have to create
    a matching dictionary so that the I/O Kit will know when to load our driver. The
    matching dictionary for MyFirstUSBDriver is shown in [Listing 8-5](#Chapter08.html#list_8_5).


    ***Listing 8-5.** Matching Dictionary for MyFirstUSBDriver*


    `<key>IOKitPersonalities</key>`

    `<dict>`

    `    <key>MyFirstUSBDriver</key>`

    `    <dict>`

    `        <key>bInterfaceClass</key>`

    `        <integer>8</integer>`

    `        <key>bInterfaceSubClass</key>`

    `        <integer>6</integer>`

    `        <key>CFBundleIdentifier</key>`

    `        <string>com.osxkernel.MyFirstUSBDriver</string>`

    `        <key>IOClass</key>`

    `        <string>com_osxkernel_MyFirstUSBDriver</string>`

    `        <key>IOMatchCategory</key>`

    `        <string>com_osxkernel_MyFirstUSBDriver</string>`

    `        <key>IOProviderClass</key>`

    `        <string>IOUSBInterface</string>`

    `    </dict>`

    `</dict>`


    The matching dictionary is more or less the same as the example in [Listing 8-2](#Chapter08.html#list_8_2).
    It will match against a USB interface rather than a USB device. We set `bInterfaceClass`
    to 8, which is the class code for mass storage devices, and we set `bInterfaceSubClass`
    to 6, which indicates that it uses the SCSI command set to communicate with the
    device (which doesn''t necessarily imply that the drive/storage itself understands
    the SCSI protocol, but it is used to tunnel commands to the device over the bus,
    where another controller may translate it into, for example, ATA commands).


    Because Apple''s default `IOUSBMassStorageClass` matches against the same keys
    as us, we need to specify a match category so that our driver will also be loaded.
    We do this by adding the `IOMatchCategory` key. We set it to the name of our class,
    but it could be any string.


    ![images](images/square.jpg) **Tip** When you open a `Info.plist` file in Xcode,
    it is opening in the property list editor by default. If you wish to cut and paste
    to the property list, or you are curious about the format it is stored in, you
    can right-click the file and choose “Open as,” and then choose “Source Code,”
    which will present it in XML format.'
  trans: "\n#### 驱动程序示例：USB 大容量存储设备驱动程序\n\n现在，让我们将目前所学付诸实践，构建一个简单的基于 USB 的驱动程序，当各种事件发生时，它会打印日志消息。我们可以制作一个纯虚拟驱动程序，但那未免太无趣了，所以不如创建一个挂载在真实\
    \ USB 设备上的驱动程序，这样我们就能观察设备插入和从总线移除时发生的情况，同时又不干扰设备的正常运行。I/O Kit 的面向对象特性使得编写设备驱动程序相对省力。此外，编写\
    \ USB 设备驱动程序与编写 Firewire、PCI 或第 4 章中的虚拟 IOKitTest 驱动程序非常相似。\n\n要尝试此示例，您需要一个 U\
    \ 盘/闪存盘或外置 USB 硬盘。它不需要为 Mac 格式化，因为我们不会访问数据。\n\n![images](img/square.jpg) **注意**\
    \ 建议在非存储重要数据的 Mac 上尝试本书中的示例。内核崩溃可能会损坏您的文件或操作系统。如果您没有专用的 Mac，请确保拥有数据的工作备份。\n\n\
    我们的驱动程序将命名为 `MyFirstUSBDriver`，其类声明如代码清单 8-3 所示。\n\n***代码清单 8-3.** `MyFirstUSBDriver.h`：`MyFirstUSBDriver`\
    \ 的类声明*\n\n```\n#include <IOKit/usb/IOUSBDevice.h>\n\nclass com_osxkernel_MyFirstUSBDriver\
    \ : public IOService\n{\n    OSDeclareDefaultStructors(com_osxkernel_MyFirstUSBDriver)\n\
    \npublic:\n    virtual bool init(OSDictionary *propTable);\n    virtual IOService*\
    \ probe(IOService *provider, SInt32 *score );\n    virtual bool attach(IOService\
    \ *provider);\n    virtual void detach(IOService *provider);\n    virtual bool\
    \ start(IOService *provider);\n    virtual void stop(IOService *provider);\n \
    \   virtual bool terminate(IOOptionBits options = 0);\n};\n```\n\n您会注意到，该类的结构几乎与\
    \ IOKitTest 驱动程序完全相同，只有一些细微的改动，我们稍后会讨论。`MyFirstUSBDriver` 的实现如代码清单 8-4 所示。\n\n\
    ***代码清单 8-4.** `MyFirstUSBDriver.cpp`：`MyFirstUSBDriver` 类的实现*\n\n```\n#include\
    \ <IOKit/IOLib.h>\n#include <IOKit/usb/IOUSBInterface.h>\n#include \"MyFirstUSBDriver.h\"\
    \n\nOSDefineMetaClassAndStructors(com_osxkernel_MyFirstUSBDriver, IOService)\n\
    #define super IOService\n\nvoid logEndpoint(IOUSBPipe* pipe)\n{\n    IOLog(\"\
    端点 #%d \", pipe->GetEndpointNumber());\n    IOLog(\"--> 类型: \");\n    switch (pipe->GetType())\n\
    \    {\n        case kUSBControl: IOLog(\"kUSBControl \"); break;\n        case\
    \ kUSBBulk: IOLog(\"kUSBBulk \"); break;\n        case kUSBIsoc: IOLog(\"kUSBIsoc\
    \ \"); break;\n        case kUSBInterrupt: IOLog(\"kUSBInterrupt \"); break;\n\
    \    }\n    IOLog(\"--> 方向: \");\n    switch (pipe->GetDirection())\n    {\n \
    \       case kUSBOut: IOLog(\"输出 (kUSBOut) \"); break;\n        case kUSBIn: IOLog(\"\
    输入 (kUSBIn) \"); break;\n        case kUSBAnyDirn: IOLog(\"任意 (控制管道) \"); break;\n\
    \    }        \n    IOLog(\"maxPacketSize: %d interval: %d\\n\", pipe->GetMaxPacketSize(),\
    \ pipe->GetInterval());    \n}\n\nbool com_osxkernel_MyFirstUSBDriver::init(OSDictionary*\
    \ propTable)\n{\n    IOLog(\"com_osxkernel_MyFirstUSBDriver::init(%p)\\n\", this);\n\
    \    return super::init(propTable);\n}\n\nIOService* com_osxkernel_MyFirstUSBDriver::probe(IOService*\
    \ provider, SInt32* score)\n{\n    IOLog(\"%s(%p)::probe\\n\", getName(), this);\n\
    \    return super::probe(provider, score);\n}\n\nbool com_osxkernel_MyFirstUSBDriver::attach(IOService*\
    \ provider)\n{\n    IOLog(\"%s(%p)::attach\\n\", getName(), this);\n    return\
    \ super::attach(provider);\n}\n\nvoid com_osxkernel_MyFirstUSBDriver::detach(IOService*\
    \ provider)\n{\n    IOLog(\"%s(%p)::detach\\n\", getName(), this);\n    return\
    \ super::detach(provider);\n}\n\nbool com_osxkernel_MyFirstUSBDriver::start(IOService*\
    \ provider)\n{\n    IOUSBInterface* interface;\n    IOUSBFindEndpointRequest request;\n\
    \    IOUSBPipe* pipe = NULL;\n\n    IOLog(\"%s(%p)::start\\n\", getName(), this);\n\
    \n    if (!super::start(provider))\n        return false;\n\n    interface = OSDynamicCast(IOUSBInterface,\
    \ provider);\n    if (interface == NULL)\n    {\n        IOLog(\"%s(%p)::start\
    \ -> provider not a IOUSBInterface\\n\", getName(), this);\n        return false;\n\
    \    }\n\n    // 大容量存储设备使用两个批量管道，一个用于读取，一个用于写入。\n\n    // 查找批量输入管道。\n    request.type\
    \ = kUSBBulk;\n    request.direction = kUSBIn;\n    pipe = interface->FindNextPipe(NULL,\
    \ &request, true);\n    if (pipe)\n    {\n        logEndpoint(pipe);\n       \
    \ pipe->release();\n    }\n\n    // 查找批量输出管道。\n    request.type = kUSBBulk;\n\
    \    request.direction = kUSBOut;\n    pipe = interface->FindNextPipe(NULL, &request,\
    \ true);\n    if (pipe)\n    {\n        logEndpoint(pipe);\n        pipe->release();\n\
    \    }  \n    return true;\n}\n\nvoid com_osxkernel_MyFirstUSBDriver::stop(IOService\
    \ *provider)\n{\n    IOLog(\"%s(%p)::stop\\n\", getName(), this);\n    super::stop(provider);\n\
    }\n\nbool com_osxkernel_MyFirstUSBDriver::terminate(IOOptionBits options)\n{\n\
    \    IOLog(\"%s(%p)::terminate\\n\", getName(), this);\n    return super::terminate(options);\n\
    }\n```\n\n如您所见，除了在调用驱动程序的各种方法时记录日志外，此驱动程序中的逻辑非常少。`start()` 方法还会尝试查找批量输入和批量输出端点，并记录有关端点的信息。我们稍后将测试驱动程序，但首先必须创建匹配字典，以便\
    \ I/O Kit 知道何时加载我们的驱动程序。`MyFirstUSBDriver` 的匹配字典如代码清单 8-5 所示。\n\n***代码清单 8-5.**\
    \ `MyFirstUSBDriver` 的匹配字典*\n\n```\n<key>IOKitPersonalities</key>\n<dict>\n  \
    \  <key>MyFirstUSBDriver</key>\n    <dict>\n        <key>bInterfaceClass</key>\n\
    \        <integer>8</integer>\n        <key>bInterfaceSubClass</key>\n       \
    \ <integer>6</integer>\n        <key>CFBundleIdentifier</key>\n        <string>com.osxkernel.MyFirstUSBDriver</string>\n\
    \        <key>IOClass</key>\n        <string>com_osxkernel_MyFirstUSBDriver</string>\n\
    \        <key>IOMatchCategory</key>\n        <string>com_osxkernel_MyFirstUSBDriver</string>\n\
    \        <key>IOProviderClass</key>\n        <string>IOUSBInterface</string>\n\
    \    </dict>\n</dict>\n```\n\n该匹配字典与代码清单 8-2 中的示例大致相同。它将匹配 USB 接口而非 USB 设备。我们将\
    \ `bInterfaceClass` 设置为 8，这是大容量存储设备的类代码；将 `bInterfaceSubClass` 设置为 6，表示它使用 SCSI\
    \ 命令集与设备通信（这并不一定意味着驱动器/存储器本身理解 SCSI 协议，而是用于通过总线向设备传输命令，设备上的另一个控制器可能会将其转换为，例如，ATA\
    \ 命令）。\n\n由于 Apple 默认的 `IOUSBMassStorageClass` 会匹配相同的键，我们需要指定一个匹配类别，以便我们的驱动程序也能被加载。我们通过添加\
    \ `IOMatchCategory` 键来实现这一点。我们将其设置为我们的类名，但它可以是任何字符串。\n\n![images](img/square.jpg)\
    \ **提示** 当您在 Xcode 中打开 `Info.plist` 文件时，默认情况下它会在属性列表编辑器中打开。如果您希望复制粘贴到属性列表中，或者对它的存储格式感到好奇，可以右键单击该文件，选择“打开方式”，然后选择“源代码”，它将以\
    \ XML 格式呈现。\n"
- fmt: "# Driver Property List and Loading\n\nThere is one additional change we need\
    \ to make to our driver's property list file, and that is to include our dependencies\
    \ under the `OSBundleLibraries` dictionary; otherwise, the driver will fail to\
    \ load. Dependencies can be found using the `kextlibs` tool. We used the following\
    \ section to add a dependency to `libkern` and `IOUSBFamily`:\n\n```\n<key>OSBundleLibraries</key>\n\
    <dict>\n        <key>com.apple.iokit.IOUSBFamily</key>\n        <string>4.1.8</string>\n\
    \        <key>com.apple.kernel.libkern</key>\n        <string>6.0</string>\n</dict>\n\
    ```\n\nWe are now ready to load the driver, or rather to allow I/O Kit to load\
    \ the driver for us. For the driver to load automatically, as the USB device is\
    \ plugged in, it must be located in the directory `/System/Library/Extensions`,\
    \ the standard location for all KEXTs.\n\nWhen all is done, you should now be\
    \ able to plug the device in. Before you do, however, you can bring up the Console\
    \ application, and select `kernel.log` from the log list. Once you insert your\
    \ compatible device, you should see the following entries being printed to the\
    \ log in response to the insertion:\n\n---\n\n```\nJun 16 22:37:56 macbook kernel[0]:\
    \ com_osxkernel_MyFirstUSBDriver::init(0x1361f900)\nJun 16 22:37:56 macbook kernel[0]:\
    \ com_osxkernel_MyFirstUSBDriver(0x1361f900)::attach\nJun 16 22:37:56 macbook\
    \ kernel[0]: com_osxkernel_MyFirstUSBDriver(0x1361f900)::probe\nJun 16 22:37:56\
    \ macbook kernel[0]: com_osxkernel_MyFirstUSBDriver(0x1361f900)::detach\nJun 16\
    \ 22:37:56 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver(0x1361f900)::attach\n\
    Jun 16 22:37:56 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver(0x1361f900)::start\n\
    Jun 16 22:37:56 macbook kernel[0]: Endpoint #4 --> Type: kUSBBulk --> Direction:\
    \ IN (kUSBIn)\nmaxPacketSize: 512 interval: 0\nJun 16 22:37:56 macbook kernel[0]:\
    \ Endpoint #3 --> Type: kUSBBulk --> Direction: OUT\n(kUSBOut) maxPacketSize:\
    \ 512 interval: 0\n```\n\n---\n\nThe first five calls are part of the matching\
    \ process. The first method `attach()` is used to connect our driver into the\
    \ `IOService` plane of the I/O Registry, which in this case will attach us as\
    \ a client of the `IOUSBInterface` nub, which again is the client of the `IOUSBDevice`\
    \ we just plugged in. As we know from [Chapter 4](#Chapter04.html#ch4), the `probe`\
    \ method is used for active matching, and allows us to further interrogate the\
    \ device, or interface in this case, to determine if we are a match for it. I/O\
    \ Kit then calls `detach()`, and the decision to which driver to load is made\
    \ once all possible matches have been examined. It is usually not recommended\
    \ to allocate any resources in `attach()` as it can be called multiple times.\
    \ Usually, it is not necessary to override `attach()` or `detach()`, as the default\
    \ ones provided by `IOService` are almost always sufficient. Once I/O Kit has\
    \ selected our driver, which is guaranteed in our case (as we specified a unique\
    \ `IOMatchCategory`), we will be getting a call to our `attach()` method again,\
    \ and then finally the `start()` method of our driver. We can now use USB Prober\
    \ to verify where in the hierarchy our driver was placed, as shown in [Figure\
    \ 8-7](#Chapter08.html#fig_8_7).\n\n![images](images/0807.jpg)\n\n***Figure 8-7.**\
    \ USB Prober showing the `com_osxkernel_MyFirstUSBDriver` attached to the `IOService`\
    \ plane*\n\nYou will notice that we are attached to the `IOUSBInterface` of the\
    \ storage device, together with the `IOUSBMassStorageClass` driver, and that the\
    \ USB device itself is managed by the composite driver `IOUSBCompositeDriver`.\n\
    \n## Driver Startup\n\nThe implementation of our `start()` method in `MyFirstUSBDriver`\
    \ is deliberately sparse because the `IOUSBMassStorageClass` driver is also managing\
    \ the interface, and we do not wish to interfere with its use of the USB interface.\
    \ We do a basic sanity check, which is commonly done in the `start()` method,\
    \ to ensure that we get a provider that is of the type we expect. However, nothing\
    \ is preventing you from writing a driver that can accept and work with multiple\
    \ types of providers—for example, an `IOUSBDevice` and `IOUSBInterface`, or even\
    \ an `IOPCIDevice` provider.\n\nHere's an outline of the steps a USB driver typically\
    \ must perform in its `start()` method:\n\n*   Verify that the `IOService` provider\
    \ object passed to us is of the type we expect. We do this with the help of the\
    \ `OSDynamicCast()` macro, which works with I/O Kit's runtime type identification\
    \ system, and returns a pointer to the object if the cast is successful, or `NULL`\
    \ otherwise.\n*   Store a pointer to the provider for later use.\n*   Attempt\
    \ to open the provider by calling its `open(IOService* forClient, ...)` method.\n\
    *   If your driver is operating on an `IOUSBDevice` you may have to set the device's\
    \ configuration. For `IOUSBInterface`-based drivers, the `IOUSBCompositeDriver`\
    \ normally handles this. You can set the configuration using `IOUSBDevice::SetConfiguration()`.\n\
    *   Find and verify the interfaces you will use for a driver that has an `IOUSBDevice`\
    \ provider. And search for the appropriate endpoints needed by your driver. More\
    \ about this in the section \"Enumerating Device Resources.\"\n*   Interrogate\
    \ the device for status information, and perform the needed configuration of the\
    \ device by issuing control requests to it.\n*   Allocate any driver specific\
    \ resources you may need, for example I/O buffers or auxiliary classes needed\
    \ by your driver.\n*   If your driver is a *nub* and intends to provide services\
    \ to other drivers, it needs to allocate and register these. For example, in the\
    \ case of `IOUSBMassStorageClass` it will allocate `IOSCSILogicalUnitNub` objects\
    \ for each logical unit provided by the interface, and for each of these call\
    \ `registerService()`, a method inherited from `IOService`. The method ensures\
    \ that matching will begin for each `IOSCSILogicalUnitNub` object.\n*   If everything\
    \ succeeds, `start()` should return `true`. If `false` is returned, the driver\
    \ will obviously not be loaded, and the I/O Kit will try to load a new driver,\
    \ if any, possibly one that \"lost\" and got a lower score previously. Be aware\
    \ that `stop()` will not be called if you return `false` from `start()`.\n\n![images](images/square.jpg)\
    \ **Tip** To uninstall `MyFirstUSBDriver`, simply use the command: `sudo rm –rf\
    \ /System/Library/Extensions/MyFirstUSBDriver.kext`\n\n## Handling Device Removals\n\
    \nUSB devices and drivers must be able to cope with the removal of a device at\
    \ any point in time. When the `IOUSBController` detects that a device is removed,\
    \ it will propagate this information recursively down the driver stack. The first\
    \ notification to a driver is made by calling its `terminate()` method. The following\
    \ sequence of calls is the result of unplugging the mass storage device that `MyFirstUSBDriver`\
    \ is attached to:\n\n```\nJun 16 22:58:46 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver(0xb4e6100)::terminate\n\
    Jun 16 22:58:46 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver(0xb4e6100)::stop\n\
    Jun 16 22:58:46 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver(0xb4e6100)::detach\n\
    ```\n\nAny incomplete I/O can be cancelled using `IOUSBPipe::Abort()` and can\
    \ be done when the `terminate()` method gets called, or in the `willTerminate()`\
    \ or `didTerminate()` methods if overridden by the driver.\n\nThe next step in\
    \ the removal process is that the driver's `stop()` method will be called, which\
    \ should reverse actions taken in the `start()` method. After that `detach()`\
    \ and finally `free()` will be called, which should clean up all remaining resources.\n\
    \nIf your driver is opened by a user application, for example through a `IOUserClient`,\
    \ it will not be deallocated (the `free()` method will not be called) until the\
    \ application releases its reference to the device. If the device happens to be\
    \ re-inserted at this time, the application is not able to resume using the device,\
    \ as a new instance of the driver is created each time a device is inserted. The\
    \ application can handle this by using notifications, as described in [Chapter\
    \ 5](#Chapter05.html#ch5)."
