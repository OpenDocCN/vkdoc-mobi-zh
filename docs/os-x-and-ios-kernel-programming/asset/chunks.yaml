    ### `IOUSBDeviceInterface` 类


    `IOUSBDeviceInterface` 类是一个用户空间类，提供了与内核驱动程序所使用的 `IOUSBDevice` 类等效的功能。值得注意的是，虽然用户客户端类提供了与其内核对应类相似的功能，但它通过一组不同的方法来实现。因此，为
    `IOUSBDevice` 类编写的内核 USB 驱动程序不能简单地移植到用户空间 USB 驱动程序中。


    在获得对用户空间 `IOUSBDeviceInterface` 的引用后，应用程序需要做的第一件事就是配置 USB 硬件。应用程序执行此操作的步骤将与第 8
    章中为内核驱动程序解释的步骤非常相似。首先，应用程序需要获得对 USB 硬件的独占访问权限，并防止硬件的配置被另一个驱动程序（可能是另一个用户空间驱动程序或内核驱动程序）更改。这是通过调用
    `IOUSBDeviceInterface` 方法 `USBDeviceOpen()` 来实现的，如下所示：


    ```

    error = (*usbDevice)->USBDeviceOpen(usbDevice);

    ```


    如果该方法返回的错误代码是 `kIOReturnSuccess`，则表明应用程序已获得配置硬件的独占访问权限。如果另一个应用程序或驱动程序已经获得了对硬件的独占访问权限，那么对
    `USBDeviceOpen()` 的调用将失败，并返回错误代码 `kIOReturnExclusiveAccess`，并且应用程序应中止对该设备的所有进一步访问，可能还需要向用户报告错误。


    当应用程序使用完设备后，应通过调用 `IOUSBDeviceInterface` 方法 `USBDeviceClose()` 来放弃对硬件的独占访问权限，如下所示：


    ```

    error = (*usbDevice)->USBDeviceClose(usbDevice);

    ```


    以下是 `IOUSBDeviceInterface` 类提供的用于访问 USB 设备描述符中包含信息的方法摘要。在本章中，我们描述的是 `IOUSBDeviceInterface300`
    类，因此以下某些方法在早期版本的 `IOUSBDeviceInterface` 类中可能不存在。


    -   `GetDeviceClass`、`GetDeviceSubClass` 和 `GetDeviceProtocol`：从 USB 设备描述符中返回设备类别（`bDeviceClass`）、子类别（`bDeviceSubClass`）和协议（`bDeviceProtocol`）。这三个值共同根据
    USB 规范中定义的值定义了设备的功能。

    -   `GetDeviceVendor`：返回设备的 USB 供应商 ID（`idVendor`）。

    -   `GetDeviceProduct`：返回设备的 USB 产品 ID（`idProduct`）。

    -   `GetDeviceReleaseNumber`：返回设备发布编号（`bcdDevice`）。

    -   `USBGetManufacturerStringIndex`：返回设备制造商名称字符串的索引（`iManufacturer`）。要读取设备中的实际字符串，应用程序必须随后发送标准设备请求“获取描述符”以读取设备字符串表中的条目。

    -   `USBGetProductStringIndex`：返回设备产品名称字符串的索引（`iProduct`）。

    -   `USBGetSerialNumberStringIndex`：返回设备序列号字符串的索引（`iSerialNumber`）。

    -   `GetNumberOfConfigurations`：返回设备在当前速度下支持的配置数量（`bNumConfigurations`）。


    以下方法允许应用程序读取与 USB 设备当前状态相关的动态属性：


    -   `GetDeviceAddress`：返回 USB 设备的地址，该地址对于其连接的总线是唯一的。

    -   `GetDeviceSpeed`：返回设备的速度。可能的值包括 `kUSBDeviceSpeedLow`、`kUSBDeviceSpeedFull`
    或 `kUSBDeviceSpeedHigh`。

    -   `GetLocationID`：返回一个 32 位值，该值基于设备所连接的 USB 集线器和端口，在系统上唯一标识一个 USB 设备。位置 ID 在计算机重启后不会改变，但如果设备连接到另一个集线器或端口则会改变。因此，如果
    USB 设备提供了序列号字符串，则它是跨重启和断开连接跟踪设备的更优选方式。

    -   `GetBusFrameNumber`：返回设备所连接的 USB 总线的当前帧编号。该函数还返回与内核驱动程序处理请求的时间相对应的系统主机时间。系统时间可能落在返回的
    USB 帧内的任何位置。

    -   `GetBusFrameNumberWithTime`：返回设备所连接的 USB 总线的当前帧编号，同时还返回与该帧开始时间相对应的系统主机时间。此方法是在
    `IOUSBDeviceInterface` 类的后期版本中引入的，并取代了 `GetBusFrameNumber()` 方法。

    -   `GetBusMicroFrameNumber`：返回设备所连接的 USB 总线的当前微帧编号。该函数还返回与内核驱动程序处理请求的时间相对应的系统主机时间（因此此方法的行为类似于
    `GetBusFrameNumber()`）。


    以下方法为应用程序提供了重置 USB 设备的方式：


    -   `ResetDevice`：重置 USB 设备，将其恢复到未配置状态。

    -   `USBDeviceReEnumerate`：指示此设备所连接的集线器重置此设备所连接的端口。这相当于将设备从 USB 端口断开并重新连接。

    -   `USBDeviceSuspend`：尽管有该方法名，但它可以根据一个布尔参数的值来挂起或恢复 USB 设备所连接的端口。如果该方法挂起设备，则任何未完成的设备事务都将被中止。

    -   `USBDeviceAbortPipeZero`：中止控制端点上的任何未完成事务。


    `IOUSBDeviceInterface` 类提供了以下方法，允许应用程序在端点零上向设备发送控制请求：

    '
- fmt: "```markdown\n-   `DeviceRequest`：是一种同步方法，在设备请求完成之前不会返回。设备请求使用与内核 USB 驱动程序相同的\
    \ `IOUSBDevRequest` 结构体描述。\n-   `DeviceRequestTO`：是一种同步方法，它接受两个以毫秒为单位的超时值。该方法将在设备请求完成或指定的超时周期到期（以先发生者为准）后返回。调用方提供两个超时值。设备在处理请求时可能停止发送或接收数据，因此一个超时值指定了在放弃控制请求之前，自上次数据传输以来等待的最长时间。另一个超时值指定了允许控制请求从头到尾完成的最长时间。如果指定的任一超时条件发生，则控制请求被中止。\n\
    -   `DeviceRequestAsync`：是 `DeviceRequest` 方法的异步等效方法。该方法接受一个回调函数，I/O Kit 使用该回调函数在请求完成时通知调用方。需要注意的是，此方法返回\
    \ `kIOReturnSuccess` 并不表示请求成功完成；而是表示操作已成功启动。操作的实际结果将通过回调函数返回。传递给完成回调的 `arg0` 参数的值保存了从设备读取或写入设备的字节数。\n\
    \n[Listing 15-4](#Chapter15.html#list_15_4) 列出了一个示例函数，该函数使用 `DeviceRequest` 方法从\
    \ USB 字符串表中读取制造商字符串。该函数首先调用 `USBGetManufacturerStringIndex` 来获取制造商字符串的索引。接下来，准备设备请求结构体。`bmRequestType`\
    \ 字段指定该请求是数据读取（`kUSBIn`），是一个标准请求（而非由设备类定义的请求或供应商特定的请求），并且该请求的接收者是设备（而非接口或端点）。由于根据\
    \ USB 规范，字符串表仅被视为另一个描述符表，因此发送给设备以读取字符串的控制请求是 `kUSBRqGetDescriptor` 请求。`wValue`\
    \ 字段表示我们正在读取一个字符串描述符，并且还包含要读取字符串的索引。\n\n最后，如果成功从设备读取了字符串数据，该函数会根据返回的数据创建一个 `CFStringRef`，该数据以\
    \ UTF-16 小端编码从设备返回。\n\n***Listing 15-4.** 演示通过 `IOUSBDeviceInterface` 类进行设备请求的函数*\n\
    \n```\n#include <IOKit/usb/IOUSBLib.h>\n#include <IOKit/usb/USBSpec.h>\n#include\
