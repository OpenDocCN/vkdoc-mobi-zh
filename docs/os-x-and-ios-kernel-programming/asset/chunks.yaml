    `myReadDataFromDevice()` 方法。


    ### 总结


    *   每台运行 Mac OS X 的计算机都可以进入一种称为“睡眠”的低功耗模式。在睡眠模式下，大多数硬件组件要么完全断电，要么仅提供降低后的电流。

    *   设备驱动程序可以注册并响应来自电源管理系统的请求，在睡眠前为其硬件做好断电准备，并在系统从睡眠中唤醒时恢复其硬件状态。

    *   I/O Kit 的电源管理 API 由 `IOService` 基类实现。这使得每个驱动程序都能提供对电源管理的支持。

    *   驱动程序可以选择独立于计算机是否处于睡眠模式来降低其设备的电源状态。当设备在一段时间内未被使用时，这有助于降低其功耗。

    *   驱动程序可以观测系统中任何硬件设备的电源状态。驱动程序可以利用这一点，在设备改变其电源状态之前接收通知，并在设备转换到新电源状态之后也接收通知。


    ## 第 11 章


    ## 串口驱动程序


    串口提供了一种基本的通信接口，用于将低带宽数据传入和传出计算机。尽管 USB 和 FireWire 等现代接口已经取代了许多传统串口曾经使用的应用场景，但串口驱动程序在现代操作系统（包括
    Mac OS X）中仍然得到了很好的支持，尽管苹果公司已经超过十年没有发布带有内置串口的硬件了。


    串口之所以经久不衰，有几个原因。首先，串口在硬件上实现起来简单且成本低廉，这使其成为热衷于为电子项目添加计算机通信功能的爱好者们的热门选择。其次，它是一种非常灵活的接口。串口驱动程序只负责在串口和用户空间应用程序之间传输数据字节。驱动程序在解释数据流方面不发挥作用；它只处理数据的传输。


    这便将实现所连接设备协议的任务留给了用户空间应用程序，这意味着许多通常由驱动程序完成的工作转而由用户空间应用程序承担。这也意味着硬件供应商不必为其设备提供驱动程序；他们只需公布描述其通过串口传输数据格式的协议，并将协议的实现工作留给其他人。使用串口的设备包括
    GPS 接收器和条形码扫描器。它们也常用于在硬件上提供调试输出。


    Macintosh 计算机已不再有串口；它们已被 USB 和 FireWire 端口所取代。诸如 GPS 接收器和条形码扫描器之类的串行设备通过 USB 连接到计算机，但它们对系统而言表现为基于
    USB 的串口，可供用户空间应用程序连接。如果你正在与一个通过串口通信的设备进行交互，在几乎所有情况下，你的应用程序都能使用现有的串口驱动程序。很少有需要自行实现串口驱动程序的情况；即使是使用基于
    USB 的串口的项目，也会使用标准驱动程序来提供串口接口。


    本章描述如何在 I/O Kit 中实现串口驱动程序，以及如何在用户空间应用程序中读写串口。串口驱动程序的实现可以看作是驱动技术的一个实际示例，包括实现阻塞调用、环形缓冲区、同步与通知。因此，即使串口驱动程序与你并不直接相关，我们即将讨论的概念也可以应用于其他驱动程序。

    '
- fmt: '### Mac OS X Serial Port Architecture Overview


    On Mac OS X, serial ports have an interesting architecture. In the kernel, a serial
    driver is implemented using the object-oriented I/O Kit framework, but in user
    space it is accessed through the BSD layer, and the serial port is presented as
    a traditional UNIX device file. For each serial driver that is loaded in the kernel,
    the I/O Kit''s serial family creates a corresponding device object in the `/dev`
    directory of the file system. To interact with a serial port, applications open
    the device file and read and write to it as if it were an ordinary file. This
    is an alternative to communicating with a driver through a user client; in fact,
    serial drivers don''t have a user client. The advantage of this architecture is
    that it allows traditional UNIX applications that have been written using the
    POSIX APIs to access a serial port on Mac OS X without any changes to their code.


    Although serial port drivers are not accessed through the I/O Kit framework from
    user space, they are still implemented in the kernel as a full I/O Kit driver.
    This means that a serial driver can take advantage of all of the features that
    the I/O Kit brings, including object-oriented design and dynamic driver loading
    and matching. The I/O Kit includes a family that is specific to serial devices,
    known as the `IOSerialFamily`. The `IOSerialFamily`, which is available through
    the Darwin open source project, contains the header files for the base classes
    that a serial port driver is derived from, as well as the implementation of the
    serial port subsystem of Mac OS X.


    [Figure 11-1](#Chapter11.html#fig_11_1) shows the various entities that are involved
    in handling communications over a serial port on Mac OS X. For this example, we
    have assumed that the serial port is implemented by a USB device (such as a USB
    to RS-232 adapter), which is why the leftmost provider object in the diagram is
    an `IOUSBDevice`.


    ![images](images/1101.jpg)


    ***Figure 11-1.** The objects involved in communicating with a serial port from
    a user space application*


    Starting in user space, an application connects to a serial port driver by opening
    a character device file from the `/dev` directory that corresponds to the serial
    port driver. Each serial driver has two entries in the `/dev` directory, one whose
    name begins with the prefix “`tty.`” and another whose name begins with the prefix
    “`cu.`”. The reason for this is largely historical and comes from a time when
    the serial port was the means by which a modem or a fax was connected to a computer.
    In this situation, the “`tty`” device was the dial-in device that was used to
    receive a call, and the “`cu`” was the callout device that was used to make a
    call.


    A process that wished to receive a call would open the dial-in device; the open
    function would block until the carrier detect line was signaled, meaning that
    the modem had established a connection. However, to make an outgoing call, a process
    needed to be able to open the serial port without waiting for the carrier detect
    line, so it would open the callout device, which doesn''t block on the carrier
    detect signal. When communicating with modern serial devices, given that most
    devices will not be connected to a phone line, Apple recommends opening the callout
    device.


    The two device files in `/dev` are created by an I/O Kit class known as `IOSerialBSDClient`.
    This is a class that is provided by the `IOSerialFamily` and handles the kernel-side
    of operations that are made by a user space process on the device file. The `IOSerialBSDClient`
    handles any system call made by a user space process to operate on a serial port,
    including any of the following the functions: `open()`, `close()`, `read()`, `write()`,
    `ioctl()`, and `select()`. In this way, the `IOSerialBSDClient` can be thought
    of as playing the role of the user client for a serial driver (although it isn''t
    derived from the `IOUserClient` class). Like a user client, the `IOSerialBSDClient`
    class is simply a conduit between a user space process and the kernel driver object.
    The class is responsible for handling the differences between blocking and non-blocking
    calls, but its main role is to translate function calls received from user space
    into method calls to the `IOSerialStreamSync` object.


    The `IOSerialStreamSync` class is another class that is provided by the I/O Kit
    in the `IOSerialFamily` package. Its role is nothing more than a conduit between
    the `IOSerialBSDClient` and the implementation of the actual serial driver. In
    fact, for each method of the `IOSerialStreamSync` class, it calls a method of
    the same name in the `IOSerialDriverSync` class.


    The `IOSerialDriverSync` class is a pure abstract interface that provides the
    base class for any serial driver on Mac OS X. It provides methods for reading
    and writing data, and for reporting changes in the state of the serial port, such
    as whether a carrier signal has been detected, the arrival of data on the serial
    port for reading, and whether the serial port can accept more bytes for transmission.


    Finally, the last object that is involved in the serial driver stack is the provider
    class of the serial driver. In this example, we are assuming that the serial port
    is implemented by a USB-to-serial adapter, which is why the provider class has
    the type `IOUSBDevice`. Whenever the serial port driver needs to read data from
    the serial port or write data over the serial port, it will access the underlying
    hardware device through the `IOUSBDevice` instance.


    The role of each class that plays a part in implementing a serial port driver
    is as follows:


    - The serial port driver''s provider class, `IOUSBDevice` in our example, performs
    the data transfer into and out of the computer to the serial port adapter.

    - The main driver, which is a subclass of `IOSerialDriverSync`, manages the serial
    port''s receive and transmit buffers, reading data from the hardware as it arrives,
    and writing data to the hardware when it is provided by user space.

    - The `IOSerialBSDClient` manages interaction with user space applications.'
