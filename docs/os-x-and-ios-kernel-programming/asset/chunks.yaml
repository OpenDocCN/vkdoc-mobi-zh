    \ 目录中。\n\n尽管更大的缓冲区可能会降低数据丢失的可能性，但当从驱动程序“热路径”上的函数中打印消息时，它并不能阻止日志被淹没。为避免这种情况，您可以使用清单\
    \ 16-1 所示技术的变体。\n\n***清单 16-1.** 限制 IOLog 输出*\n\n```\nstatic uint32_t        conditionCount\
    \ = 0;\ncom_osxkernel_MyDriver::driverMethod()\n{\n    ...\n    if (someCondition)\n\
    \    {\n        conditionCount++;\n        if (conditionCount % 1000 == 0)\n \
    \           IOLog(\"条件已发生: %u 次\\n\", conditionCount);\n    }\n}\n```\n\n这将记录条件发生的次数，但仅每千次才向日志打印一条消息。如果您想调试主中断过滤器，可以使用此方法的变体。但是，需要将\
    \ `IOLog()` 调用从主中断过滤器例程中移出，放到一个可以安全调用的地方，例如次中断处理程序或自定义的 `IOUserClient` 方法中。\n\n\
    如果您的驱动程序有多个实例，您可能希望打印附加信息，以便区分是哪个实例在执行何种操作。如果您处于 `IOService` 的上下文中，您可以打印 `this`\
    \ 指针地址，以帮助唯一标识每个实例。\n"
- fmt: "Should you always leave `IOLog()` statements in your driver code? Yes and\
    \ no. Opinions differ on this, but it is definitely frowned upon for a driver\
    \ to spam the system logs with unnecessary output that may hide other potentially\
    \ important messages from other parts of the system. However, it may be acceptable\
    \ to print a few messages about exceptional conditions. If you prefer to leave\
    \ `IOLog()` statements in your code, you can prevent them from being outputted,\
    \ using a conditional variable, which can be toggled on or off by a user space\
    \ client. The problem with this is a slight increase in the executable size, as\
    \ well as extra work to be done by the CPU in executing the conditional debug\
    \ statements. The other approach is to use pre-processor directives, such as `#ifdef\
    \ DEBUG … #endif`, so the statements will be compiled away from the resulting\
    \ executable. Of course, there is also an option to leave most debug statements\
    \ out entirely, which may make the code more readable. If a user reports a problem,\
    \ the downside to the two last approaches is that there is no way to enable debugging\
    \ once the driver is in the field, short of asking the user to install a debug\
    \ version of the driver. A combination of all three is certainly also possible,\
    \ but the general advice here is not to litter your code with debug logging, but\
    \ to place them at strategic places where they are likely to be of use to you\
    \ even for problems you didn’t anticipate.\n\nWhile tracing using `IOLog()` seems\
    \ like a primitive approach, it is often very effective in finding bugs. Of course,\
    \ this approach works best when the system doesn’t actually crash so you can observe\
    \ the behavior through the system log. However, if the system crashes, the `syslog`\
    \ daemon will not be able to write the latest contents of the log buffer to the\
    \ log file. Consequently, the output may be lost at the next reboot. There are\
    \ ways to get around this, including remote tracing over FireWire, which is discussed\
    \ later in this chapter.\n\n### Printing Stack Traces\n\nThe `IOLog()` function\
    \ is good enough for many purposes; but in some cases, it is not enough to know\
    \ a function is called. You also need to know the call stack that led to a call\
    \ to your function as it may be called from multiple code paths. Printing the\
    \ call stack can be achieved using the `OSReportWithBackTrace()` function, as\
    \ demonstrated in [Listing 16-2](#Chapter16.html#list_16_2).\n\n***Listing 16-2.**\
    \ Using `OSReportWithBackTrace()` to Dump the Call Stack*\n\n```\nvoid testFunc3()\
    \ {\n    IOLog(\"address of testFunc3: %p\\n\", &testFunc3);\n    OSReportWithBacktrace(\"\
    OSReportWithBacktrace() called from testFunc3()\");\n}\nvoid testFunc2() {\n \
    \   IOLog(\"address of testFunc2: %p\\n\", &testFunc2);\n    testFunc3();\n}\n\
    void testFunc1() {\n    IOLog(\"address of testFunc1: %p\\n\", &testFunc1);\n\
    \    testFunc2();\n}\nbool com_osxkernel_MyDebugDriver::start(IOService * provider)\
    \ {\n    testFunc1();\n    ….\n}\n```\n\nThe code in [Listing 16-2](#Chapter16.html#list_16_2)\
    \ should give the following results:\n\n---\n\n```\naddress of testFunc1: 0x9ac280\n\
    address of testFunc2: 0x9ac250\naddress of testFunc3: 0x9ac220\nOSReportWithBacktrace()\
    \ called from testFunc3()\nBacktrace 0x9ac26f 0x9ac29f 0x9ac2ee 0x543f60 0x542137\
    \ 0x5426e9 0x5443d5\n    Kernel Extensions in backtrace (with dependencies):\n\
    \         com.osxkernel.MyDebugDriver(1)@0x9ab000->0x9acfff\n```\n\n---\n\nYou\
    \ may notice the printed addresses of the test functions are similar, but not\
    \ the same as the ones printed in the back trace. The addresses printed by `IOLog()`\
    \ are relative to the start of each function; however, in the back trace, you\
    \ instead see the address of where each test function is calling the next test\
    \ function. The `OSReportWithBacktrace()` function also prints the start and end\
    \ addresses of any KEXTs involved in the back trace. We see our KEXT is loaded\
    \ at the memory address `0x9ab000` and you may notice that `testFunc1()`, `testFunc2()`,\
    \ and `testFunc3()` are all within the address range of the `MyDebugDriver`. Using\
    \ this information, we can also work out the offset where a function is located\
    \ within its executable image by subtracting the address of a function from the\
    \ base address, for example, for `testFunc1(): 0x9ac280 - 0x9ab000 = 4736 bytes`.\
    \ You can then use the GDB debugger with the `disassemble <offset>` command."
  raw: 'Should you always leave `IOLog()` statements in your driver code? Yes and
    no. Opinions differ on this, but it is definitely frowned upon for a driver to
    spam the system logs with unnecessary output that may hide other potentially important
    messages from other parts of the system. However, it may be acceptable to print
    a few messages about exceptional conditions. If you prefer to leave `IOLog()`
    statements in your code, you can prevent them from being outputted, using a conditional
    variable, which can be toggled on or off by a user space client. The problem with
    this is a slight increase in the executable size, as well as extra work to be
    done by the CPU in executing the conditional debug statements. The other approach
    is to use pre-processor directives, such as `#ifdef DEBUG … #endif,` so the statements
    will be compiled away from the resulting executable. Of course, there is also
    an option to leave most debug statements out entirely, which may make the code
    more readable. If a user reports a problem, the downside to the two last approaches
    is that there is no way to enable debugging once the driver is in the field, short
    of asking the user to install a debug version of the driver. A combination of
    all three is certainly also possible, but the general advice here is not to litter
    your code with debug logging, but to place them at strategic places where they
    are likely to be of use to you even for problems you didn’t anticipate.


    While tracing using `IOLog()` seems like a primitive approach, it is often very
    effective in finding bugs. Of course, this approach works best when the system
    doesn’t actually crash so you can observe the behavior through the system log.
    However, if the system crashes, the *syslog* daemon will not be able to write
    the latest contents of the log buffer to the log file. Consequently, the output
    may be lost at the next reboot. There are ways to get around this, including remote
    tracing over FireWire, which is discussed later in this chapter.


    #### Printing Stack Traces


    The `IOLog()` function is good enough for many purposes; but in some cases, it
    is not enough to know a function is called. You also need to know the call stack
    that led to a call to your function as it may be called from multiple code paths.
    Printing the call stack can be achieved using the `OSReportWithBackTrace()` function,
    as demonstrated in [Listing 16-2](#Chapter16.html#list_16_2).


    ***Listing 16-2.** Using `OSReportWithBackTrace()` to Dump the Call Stack*


    `void testFunc3() {`

    `    IOLog("address of testFunc3: %p\n", &testFunc3);`

    `    OSReportWithBacktrace("OSReportWithBacktrace() called from testFunc3()");`

    `}`

    `void testFunc2() {`

    `    IOLog("address of testFunc2: %p\n", &testFunc2);`

    `    testFunc3();`

    `}`

    `void testFunc1() {`

    `    IOLog("address of testFunc1: %p\n", &testFunc1);`

    `    testFunc2();`

    `}`

    `bool com_osxkernel_MyDebugDriver::start(IOService * provider) {`

    `    testFunc1();`

    `    ….`

    `}`


    The code in [Listing 16-2](#Chapter16.html#list_16_2) should give the following
    results:


    * * *


    `address of testFunc1: 0x9ac280`

    `address of testFunc2: 0x9ac250`

    `address of testFunc3: 0x9ac220`

    `OSReportWithBacktrace() called from testFunc3()`

    `Backtrace 0x9ac26f 0x9ac29f 0x9ac2ee 0x543f60 0x542137 0x5426e9 0x5443d5`

    `    Kernel Extensions in backtrace (with dependencies):`

    `         com.osxkernel.MyDebugDriver(1)@0x9ab000->0x9acfff`


    * * *


    You may notice the printed addresses of the test functions are similar, but not
    the same as the ones printed in the back trace. The addresses printed by `IOLog()`
    are relative to the start of each function; however, in the back trace, you instead
    see the address of where each test function is calling the next test function.
    The `OSReportWithBacktrace()` function also prints the start and end addresses
    of any KEXTs involved in the back trace. We see our KEXT is loaded at the memory
    address 0x9ab000 and you may notice that `testFunc1()`, `testFunc2()`, and `testFunc3()`
    are all within the address range of the `MyDebugDriver`. Using this information,
    we can also work out the offset where a function is located within its executable
    image by subtracting the address of a function from the base address, for example,
    for `testFunc1(): 0x9ac280` - 0x9ab000 = 4736 bytes. You can then use the GDB
    debugger with the *disassemble <offset>* command.'
  trans: "\n是否应该在驱动程序代码中始终保留 `IOLog()` 语句？答案既是肯定的，又是否定的。对此看法不一，但驱动程序向系统日志输出大量不必要的内容，从而可能掩盖系统中其他部分潜在的重要消息，这种做法绝对是不受欢迎的。不过，针对异常情况打印少量信息可能是可以接受的。如果你更倾向于在代码中保留\
    \ `IOLog()` 语句，可以使用条件变量来禁止它们输出，该变量可由用户空间客户端开启或关闭。这种做法的问题在于可执行文件大小会略微增加，并且 CPU\
    \ 在执行条件调试语句时需要额外的工作。另一种方法是使用预处理指令，例如 `#ifdef DEBUG … #endif`，这样这些语句将不会被编译进最终的可执行文件中。当然，也可以选择彻底移除大部分调试语句，这可能会使代码更易读。如果用户报告问题，后两种方法的缺点在于，一旦驱动程序发布到现场，就无法启用调试功能，除非要求用户安装调试版本的驱动程序。将三种方法结合起来当然也是可行的，但这里的一般建议是：不要在代码中随意堆砌调试日志，而是应该将它们放置在关键位置，即使对于你未曾预料到的问题，这些日志也能派上用场。\n\
    \n虽然使用 `IOLog()` 进行跟踪看似原始，但在发现错误时往往非常有效。当然，这种方法在系统没有真正崩溃的情况下效果最佳，因为你可以通过系统日志观察行为。然而，如果系统崩溃，`syslog`\
    \ 守护进程将无法将日志缓冲区的最新内容写入日志文件。因此，在下次重启时，这些输出可能会丢失。有一些方法可以解决这个问题，包括通过 FireWire 进行远程跟踪，这将在本章后面讨论。\n\
    \n### 打印堆栈回溯\n\n`IOLog()` 函数足以满足许多用途；但在某些情况下，仅仅知道某个函数被调用是不够的。你还需要了解导致你的函数被调用的调用堆栈，因为它可能从多个代码路径被调用。可以使用\
    \ `OSReportWithBackTrace()` 函数打印调用堆栈，如 列表 16-2 所示。\n\n***列表 16-2.** 使用 `OSReportWithBackTrace()`\
    \ 转储调用堆栈*\n\n```\nvoid testFunc3() {\n    IOLog(\"address of testFunc3: %p\\n\"\
    , &testFunc3);\n    OSReportWithBacktrace(\"OSReportWithBacktrace() called from\
    \ testFunc3()\");\n}\nvoid testFunc2() {\n    IOLog(\"address of testFunc2: %p\\\
    n\", &testFunc2);\n    testFunc3();\n}\nvoid testFunc1() {\n    IOLog(\"address\
    \ of testFunc1: %p\\n\", &testFunc1);\n    testFunc2();\n}\nbool com_osxkernel_MyDebugDriver::start(IOService\
    \ * provider) {\n    testFunc1();\n    ….\n}\n```\n\n列表 16-2 中的代码应输出以下结果：\n\n\
    ---\n\n```\naddress of testFunc1: 0x9ac280\naddress of testFunc2: 0x9ac250\naddress\
    \ of testFunc3: 0x9ac220\nOSReportWithBacktrace() called from testFunc3()\nBacktrace\
    \ 0x9ac26f 0x9ac29f 0x9ac2ee 0x543f60 0x542137 0x5426e9 0x5443d5\n    Kernel Extensions\
    \ in backtrace (with dependencies):\n         com.osxkernel.MyDebugDriver(1)@0x9ab000->0x9acfff\n\
    ```\n\n---\n\n你可能会注意到，测试函数打印的地址与回溯中打印的地址相似，但并不相同。`IOLog()` 打印的地址是相对于每个函数起始位置的；然而，在回溯中，你看到的是每个测试函数调用下一个测试函数时的地址。`OSReportWithBackTrace()`\
    \ 函数还会打印回溯中涉及的任何 KEXT 的起始地址和结束地址。我们看到我们的 KEXT 加载在内存地址 `0x9ab000` 处，你可能会注意到 `testFunc1()`、`testFunc2()`\
    \ 和 `testFunc3()` 都在 `MyDebugDriver` 的地址范围内。利用这些信息，我们还可以通过从基地址中减去函数地址来计算函数在其可执行映像中的偏移量，例如，对于\
    \ `testFunc1(): 0x9ac280 - 0x9ab000 = 4736 字节`。然后，你可以使用 GDB 调试器和 `disassemble\
    \ <offset>` 命令。\n"
- fmt: "### Remote Tracing over FireWire\n\nIt is possible to redirect output from\
    \ the `krprintf()` function over a FireWire connection to another system. This\
    \ method is more robust than using `IOLog()`, as log output will be preserved\
    \ on the remote system in the event of a crash. Another advantage of this approach\
    \ is that it is available in the very early boot process, which is useful for\
    \ debugging a driver that’s involved with the system boot process, such as storage\
    \ and display drivers. It also allows debugging of shutdown and sleep events.\
    \ Your driver does not need any special support or modifications to support outputting\
    \ log information over FireWire.\n\nEverything needed to configure remote logging\
    \ over FireWire is already included in Mac OS X from versions 10.5 and above and\
    \ there is no need to install additional KEXTs. You need two Macs to set this\
    \ up. It is not necessary for both systems to run the same version of Mac OS X.\n\
    \nOn the target machine, the machine you wish to send log output from, do the\
    \ following.\n\n`sudo nvram boot-args=\"debug=0x8\"`\n\nThis boot option enables\
    \ redirection of the `kprintf()` function so output will be mirrored to the FireWire\
    \ interface as well as the system log. The system should be rebooted for this\
    \ option to take effect. The next step is to connect a FireWire cable between\
    \ the two systems. Unlike `IOLog()`, the `kprintf()` function is synchronous,\
    \ which means by the time it returns, it will have transmitted the message over\
    \ FireWire. The `kprintf()` disables interrupts until it completes, which can\
    \ affect timing-related issues when used excessively. Because interrupts are disabled,\
    \ the function may cause a crash if memory referenced by the functions arguments\
    \ happens to be paged out.\n\n![images](images/square.jpg) **Caution:** It is\
    \ recommended that both the target and debug machines have all other FireWire\
    \ devices disconnected during debugging.\n\nOn the machine that will receive the\
    \ debug output, run the `fwkpfv` command, which is the FireWire log viewer utility.\
    \ If the target machine was connected correctly and the cable properly attached,\
    \ you will receive debug output after a few seconds. The following example shows\
    \ an extract from a session captured while the target machine boots:\n\n---\n\n\
    `Welcome to FireWireKPrintf. (viewer v2.6)`\n`AppleFWOHCI_KPF: version 4.7.1 –\
    \ init`\n`u>626665 AppleFWOHCI_KPF: Time format-> Microseconds = 'u>clock_uptime_micro'`\n\
    `u>1141021 AppleUSBHub::setPowerState(0x4fbe200, 0 -> 4) took 301 ms`\n`u>2065689\
    \ [Bluetooth::CSRHIDTransition] DeviceRequest error: e00002ed`\n`u>2109928 AppleUSBHub::powerStateWillChangeTo(0x4f13200,\
    \ AppleUSBHub, 4 -> 3) took 100 ms`\n`u>2117294 AppleUSBHub::powerStateWillChangeTo(0x4f70e00,\
    \ AppleUSBHub, 4 -> 3) took 100 ms`\n`u>2130057 AppleUSBHub::powerStateWillChangeTo(0x4f70a00,\
    \ AppleUSBHub, 4 -> 3) took 100 ms`\n`…`\n`…`\n`…`\n`u>20236388 Adding domain\
    \ PPP (family 34)`\n`u>24073549 kPEDisableScreen -1`\n`u>24158956 kPEDisableScreen\
    \ 1`\n`u>25568081 initialize_screen: b=4645B000, w=00000690, h=0000041A, r=00002000,\
    \ d=00000001`\n`u>25568131 kPEEnableScreen 1`\n`u>304129579 IOSCSIPeripheralDeviceType00::setPowerState(0x4fe3500,\
    \ 3 -> 4) async took 351 ms`\n`u>1070371211 IOSCSIPeripheralDeviceType00::setPowerState(0x4fe3500,\
    \ 3 -> 2) async took 1153 ms`\n\n---\n\nIf you wish to log over FireWire from\
    \ your own KEXT, you will have to use the `kprintf()` function to log with rather\
    \ than `IOLog()`, which doesn’t use `kprintf` internally but rather calls `printf()`,\
    \ which only goes to the kernel log. A strategy to deal with this is to create\
    \ your own wrapper function for `IOLog()` and `kprintf()` that calls the former\
    \ for a release build and the latter for a debug build.\n\n[Listing 16-3](#Chapter16.html#list_16_3)\
    \ shows an example of how to log using `kprintf()`.\n\n**Listing 16-3.** Logging\
    \ Messages to a Remote Machine over FireWire Using `kprintf()`\n\n```\n#include\
    \ <kern/debug.h> // Declares kprintf()\nbool com_osxkernel_MyDebugDriver::start(IOService\
    \ * provider)\n{\n        kprintf(\"%s::start - Hello FireWire Listeners\\n\"\
    , getName());\n        return true;\n}\n```\n\nRunning this yields the following\
    \ on the remote system:\n\n---\n\n`u>1071578492 com_osxkernel_MyDebugDriver::start\
    \ - Hello FireWire Listeners`\n\n---\n\nIf the kernel crashes, you can also get\
    \ the panic log through the FireWire log viewer. It is also possible to use FireWire\
    \ to attach the GNU debugger remotely to the kernel, as we will see later in this\
    \ chapter."
  raw: '#### Remote Tracing over FireWire


    It is possible to redirect output from the `krprintf()` function over a FireWire
    connection to another system. This method is more robust than using `IOLog()`,
    as log output will be preserved on the remote system in the event of a crash.
    Another advantage of this approach is that it is available in the very early boot
    process, which is useful for debugging a driver that’s involved with the system
    boot process, such as storage and display drivers. It also allows debugging of
    shutdown and sleep events. Your driver does not need any special support or modifications
    to support outputting log information over FireWire.


    Everything needed to configure remote logging over FireWire is already included
    in Mac OS X from versions 10.5 and above and there is no need to install additional
    KEXTs. You need two Macs to set this up. It is not necessary for both systems
    to run the same version of Mac OS X.


    On the target machine, the machine you wish to send log output from, do the following.


    `$` **`sudo nvram boot-args="debug=0x8"`**


    This boot option enables redirection of the `kprintf()` function so output will
    be mirrored to the FireWire interface as well as the system log. The system should
    be rebooted for this option to take effect. The next step is to connect a FireWire
    cable between the two systems. Unlike `IOLog()`, the `kprintf()` function is synchronous,
    which means by the time it returns, it will have transmitted the message over
    FireWire. The `kprintf()` disables interrupts until it completes, which can affect
    timing-related issues when used excessively. Because interrupts are disabled,
    the function may cause a crash if memory referenced by the functions arguments
    happens to be paged out.


    ![images](images/square.jpg) **Caution** It is recommended that both the target
    and debug machines have all other FireWire devices disconnected during debugging.


    On the machine that will receive the debug output, run the `fwkpfv` command, which
    is the FireWire log viewer utility. If the target machine was connected correctly
    and the cable properly attached, you will receive debug output after a few seconds.
    The following example shows an extract from a session captured while the target
    machine boots:


    * * *


    `Welcome to FireWireKPrintf. (viewer v2.6)`

    `AppleFWOHCI_KPF: version 4.7.1 – init`

    `u>626665 AppleFWOHCI_KPF: Time format-> Microseconds = ''u>clock_uptime_micro''`

    `u>1141021 AppleUSBHub::setPowerState(0x4fbe200, 0 -> 4) took 301 ms`

    `u>2065689 [Bluetooth::CSRHIDTransition] DeviceRequest error: e00002ed`

    `u>2109928 AppleUSBHub::powerStateWillChangeTo(0x4f13200, AppleUSBHub, 4 -> 3)
    took 100 ms`

    `u>2117294 AppleUSBHub::powerStateWillChangeTo(0x4f70e00, AppleUSBHub, 4 -> 3)
    took 100 ms`

    `u>2130057 AppleUSBHub::powerStateWillChangeTo(0x4f70a00, AppleUSBHub, 4 -> 3)
    took 100 ms`

    `…`

    `…`

    `…`

    `u>20236388 Adding domain PPP (family 34)`

    `u>24073549 kPEDisableScreen -1`

    `u>24158956 kPEDisableScreen 1`

    `u>25568081 initialize_screen: b=4645B000, w=00000690, h=0000041A, r=00002000,
    d=00000001`

    `u>25568131 kPEEnableScreen 1`

    `u>304129579 IOSCSIPeripheralDeviceType00::setPowerState(0x4fe3500, 3 -> 4) async
    took 351 ms`

    `u>1070371211 IOSCSIPeripheralDeviceType00::setPowerState(0x4fe3500, 3 -> 2) async
    took 1153`

    `ms`


    * * *


    If you wish to log over FireWire from your own KEXT, you will have to use the
    `kprintf()` function to log with rather than `IOLog()`, which doesn’t use `kprintf`
    internally but rather calls `printf()`, which only goes to the kernel log. A strategy
    to deal with this is to create your own wrapper function for `IOLog()` and `kprintf()`
    that calls the former for a release build and the latter for a debug build.


    [Listing 16-3](#Chapter16.html#list_16_3) shows an example of how to log using
    `kprintf()`.


    ***Listing 16-3.** Logging Messages to a Remote Machine over FireWire Using kprintf()*


    `#include <kern/debug.h> // Declares kprintf()`

    `bool com_osxkernel_MyDebugDriver::start(IOService * provider)`

    `{`

    `        kprintf("%s::start - Hello FireWire Listeners\n", getName());`

    `        return true;`

    `}`


    Running this yields the following on the remote system:


    * * *


    `u>1071578492 com_osxkernel_MyDebugDriver::start - Hello FireWire Listeners`


    * * *


    If the kernel crashes, you can also get the panic log through the FireWire log
    viewer. It is also possible to use FireWire to attach the GNU debugger remotely
    to the kernel, as we will see later in this chapter.'
  trans: "\n### 通过 FireWire 进行远程跟踪\n\n可以通过 FireWire 连接将 `krprintf()` 函数的输出重定向到另一台系统。此方法比使用\
    \ `IOLog()` 更稳健，因为在崩溃发生时，日志输出将被保存在远程系统上。该方法的另一个优势是它在非常早期的启动过程中即可使用，这对于调试参与系统启动过程的驱动程序（例如存储和显示驱动程序）非常有用。它还可以调试关机和睡眠事件。您的驱动程序无需任何特殊支持或修改，即可通过\
    \ FireWire 输出日志信息。\n\n配置通过 FireWire 进行远程日志记录所需的一切都已包含在 Mac OS X 10.5 及更高版本中，无需安装额外的\
    \ KEXT。您需要两台 Mac 电脑来设置此项。两台系统不必运行相同版本的 Mac OS X。\n\n在目标机器（即您希望从中发送日志输出的机器）上，执行以下操作。\n\
    \n`sudo nvram boot-args=\"debug=0x8\"`\n\n此启动选项启用 `kprintf()` 函数的重定向，以便输出将同时镜像到\
    \ FireWire 接口和系统日志。应重启系统以使此选项生效。下一步是使用 FireWire 线缆连接两台系统。与 `IOLog()` 不同，`kprintf()`\
    \ 函数是同步的，这意味着当其返回时，它已经将消息通过 FireWire 传输完毕。`kprintf()` 在完成之前会禁用中断，如果使用过于频繁，可能会影响与时序相关的问题。由于中断被禁用，如果函数参数引用的内存恰好被换出到磁盘，该函数可能会导致崩溃。\n\
    \n![images](img/square.jpg) **警告：** 建议在调试期间，目标机器和调试机器都断开所有其他 FireWire 设备的连接。\n\
    \n在接收调试输出的机器上，运行 `fwkpfv` 命令，这是 FireWire 日志查看工具。如果目标机器连接正确且线缆已正确连接，几秒钟后您将收到调试输出。以下示例展示了在目标机器启动时捕获的会话摘录：\n\
    \n---\n\n`Welcome to FireWireKPrintf. (viewer v2.6)`\n`AppleFWOHCI_KPF: version\
    \ 4.7.1 – init`\n`u>626665 AppleFWOHCI_KPF: Time format-> Microseconds = 'u>clock_uptime_micro'`\n\
    `u>1141021 AppleUSBHub::setPowerState(0x4fbe200, 0 -> 4) took 301 ms`\n`u>2065689\
    \ [Bluetooth::CSRHIDTransition] DeviceRequest error: e00002ed`\n`u>2109928 AppleUSBHub::powerStateWillChangeTo(0x4f13200,\
    \ AppleUSBHub, 4 -> 3) took 100 ms`\n`u>2117294 AppleUSBHub::powerStateWillChangeTo(0x4f70e00,\
    \ AppleUSBHub, 4 -> 3) took 100 ms`\n`u>2130057 AppleUSBHub::powerStateWillChangeTo(0x4f70a00,\
    \ AppleUSBHub, 4 -> 3) took 100 ms`\n`…`\n`…`\n`…`\n`u>20236388 Adding domain\
    \ PPP (family 34)`\n`u>24073549 kPEDisableScreen -1`\n`u>24158956 kPEDisableScreen\
    \ 1`\n`u>25568081 initialize_screen: b=4645B000, w=00000690, h=0000041A, r=00002000,\
    \ d=00000001`\n`u>25568131 kPEEnableScreen 1`\n`u>304129579 IOSCSIPeripheralDeviceType00::setPowerState(0x4fe3500,\
    \ 3 -> 4) async took 351 ms`\n`u>1070371211 IOSCSIPeripheralDeviceType00::setPowerState(0x4fe3500,\
    \ 3 -> 2) async took 1153 ms`\n\n---\n\n如果您希望从自己的 KEXT 通过 FireWire 进行日志记录，则必须使用\
    \ `kprintf()` 函数进行记录，而不是 `IOLog()`，后者内部不使用 `kprintf`，而是调用 `printf()`，该调用仅会进入内核日志。处理此问题的一种策略是为\
    \ `IOLog()` 和 `kprintf()` 创建您自己的包装函数，在发布版本中调用前者，在调试版本中调用后者。\n\n列表 16-3 展示了如何使用\
    \ `kprintf()` 记录日志的示例。\n\n**列表 16-3.** 通过 FireWire 使用 `kprintf()` 将日志消息记录到远程机器\n\
    \n```\n#include <kern/debug.h> // 声明 kprintf()\nbool com_osxkernel_MyDebugDriver::start(IOService\
    \ * provider)\n{\n        kprintf(\"%s::start - Hello FireWire Listeners\\n\"\
    , getName());\n        return true;\n}\n```\n\n在远程系统上运行此代码将产生以下输出：\n\n---\n\n\
    `u>1071578492 com_osxkernel_MyDebugDriver::start - Hello FireWire Listeners`\n\
    \n---\n\n如果内核崩溃，您也可以通过对 FireWire 日志查看器获取崩溃日志。还可以使用 FireWire 将 GNU 调试器远程附加到内核，我们将在本章后面看到这一点。\n"
- fmt: '# Remote Kernel Core Dumps


    Mac OS X provides a mechanism for transmitting core dumps from a crashed (or hung)
    system to a remote machine over the network. A core dump is a binary image of
    the wired contents of the system’s memory. By capturing a core dump, we can retain
    evidence of the exact state the system was in at the time of the crash and we
    can use this image with the `GDB` to get stack traces for all threads in the system
    and examine memory contents as well as kernel data structures.


    Conveniently, everything you need to enable core dumps is already present in Mac
    OS X. Only minor configuration is required. On the dump server, the machine that
    receives the core dumps from crashed machines, you need to activate the `kdumpd`
    daemon, as follows:


    `# sudo vi /System/Library/LaunchDaemons/com.apple.kdumpd.plist`


    Change the `Disabled` key from `true` to `false`. If you wish, you can also configure
    the directory where dumps will be located. The default is `/PanicDumps`. The `kdumpd`
    daemon is started as follows:


    `# sudo launchctl load /System/Library/LaunchDaemons/com.apple.kdumpd.plist`

    `# sudo launchctl start com.apple.kdumpd`


    The server uses UDP on port 1069, so you should ensure there is no firewall between
    the target machines and the server. The target and server do not need to be running
    the same version of Mac OS X.


    ![images](images/square.jpg) **Note** To use `kdumpd`, the target machine (the
    crashing system) needs to be connected to the network using Ethernet. It is not
    possible to use an AirPort device, as the driver for KDB (Kernel Debugging Protocol),
    which handles transmission of the dump, only works with Ethernet devices. When
    loaded, you can check where the kernel debugging driver is attached using `IORegisteryExplorer`
    and search for the driver named `IOKernelDebugger`.


    The `kdumpd` daemon is able to receive core dumps from multiple machines and will
    archive each dump with the machine’s IP address. If you work for a company that
    develops software that runs in the kernel, you can configure all your Macs to
    automatically send dumps to a central server when a crash occurs. This saves a
    lot of time when quality assurance testers encounter problems during testing,
    as engineering can simply start debugging the dumped image immediately.


    ![images](images/square.jpg) **Caution** Care should be taken to only use `kdumpd`
    in trusted networks, as memory contents of the crashed system are transmitted
    unencrypted over the network and may contain sensitive information, such as passwords
    and private keys.


    Configuring the target machine is equally simple and is done by setting kernel
    boot arguments either in `/Library/Preferences/SystemConfiguration/com.apple.Boot.plist`
    or using the `nvram` command, as follows:


    `# sudo nvram boot-args="debug=0xd44 _panicd_ip=192.168.1.1"`


    The preceding instructs the kernel to dump core when it panics or if an NMI (non-maskable
    interrupt) event was triggered. The latter is highly useful in the cases where
    the system hangs completely and appears unresponsive but does not actually panic.
    In this case, you can use the power button on the computer to trigger the NMI
    event, which will start the core dump. During this time, the machine will be frozen
    and no processes will run. If the machine is responsive and you do this, the machine
    will simply resume as if nothing had happened after the core dump is transferred.


    The `_panicd_ip` parameter specifies the IP address of the machine running `kdumpd`.
    If you plan on having a permanently running panic server, it is recommended this
    IP be static. It is not possible to use a hostname or DNS name for the server,
    as name resolution is not possible.


    The following output will appear on the screen of the target machine if you press
    the power button:


    ```

    Entering system dump routine

    Attempting connection to panic server configured at IP 192.168.1.1, port 1069

    Resolved 192.168.1.1’s (or proxy’s) link level address

    Transmitting packets to link level address: 00:16:cb:a6:73:8b

    Kernel map size is 4546437120

    Sending write request for core-xnu-1699.22.73-192.168.1.2-2fe8a6d9

    Protocol features: 0x1

    Kernel map has 1389 entries

    Generated Mach-O header size was 100224

    ```


    The target machine will write dots (.) to the screen until the dump is complete.
    If it was an NMI event that triggered the dump, the system will resume; if it
    was a panic, the system will wait for a remote debugger to be attached.


    ## KDB


    The kernel supports an in-kernel debugger called `KDB`. `KDB` only supports debugging
    over the serial port. It is not included in the kernel build by default; therefore,
    you need to compile and install a custom kernel in order to use it. `KDB` has
    some applications for very low-level debugging where neither FireWire nor Ethernet
    is available. `KDB` requires a native serial port on the machine being debugged,
    which is only found on the now discontinued Xserve (although a serial port is
    available if Mac OS X is used under a virtual machine). For all intents and purposes,
    the GNU Debugger (`GDB`) is recommended; we only mention `KDB` here to avoid confusion
    with `GDB`.


    ## Remote Debugging with GDB over Ethernet or FireWire


    The kernel has support for using the `GDB` over Ethernet (IP/UDP) or FireWire
    connections. Again, this requires two computers running Mac OS X. While `GDB`
    is supported through Xcode, you cannot debug the kernel using Xcode; you will
    have to use the command-line interface. `GDB` is, however, part of Xcode. It is
    not necessary to install Xcode on the machine being debugged; it is only needed
    on the remote system (the client).


    ![images](images/square.jpg) **Note** Strictly speaking, it would be possible
    to use another operating system running `GDB` as the host to debug a Mac OS X
    target system. Although there is no documentation for doing this, some documentation
    suggests it is possible, however non-trivial, to configure.


    The debugging support is built in to the kernel by default, unlike `KDB`. However,
    the debugging capabilities are disabled by default, but can easily be enabled
    by adding the appropriate boot arguments on the target machine, for example:


    `$ sudo nvram boot-args="debug=0x144 -v"`


    The `-v` (verbose) flag isn’t strictly necessary. It has the effect of disabling
    the grey screen with the Apple logo during boot and instead showing a text console,
    commonly found on UNIX and Linux systems, which shows log messages as the system
    boots. Once the boot arguments have been set, the system needs to be rebooted
    for the changes to take effect.'
  raw: '#### Remote Kernel Core Dumps


    Mac OS X provides a mechanism for transmitting core dumps from a crashed (or hung)
    system to a remote machine over the network. A core dump is a binary image of
    the wired contents of the system’s memory. By capturing a core dump, we can retain
    evidence of the exact state the system was in at the time of the crash and we
    can use this image with the GDB to get stack traces for all threads in the system
    and examine memory contents as well as kernel data structures.


