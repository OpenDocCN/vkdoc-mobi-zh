  raw: '##### Mapping and Accessing Device Memory Regions


    The previous section showed us how we can obtain information about available I/O
    memory regions. We need to do some more work before we can actually access data
    from the regions. Furthermore, in most real-world drivers, it is unnecessary to
    explicitly enumerate the regions, as a driver usually knows exactly which regions,
    if not all that it needs to map. The following `IOPCIDevice` method can be used
    to map a BAR region directly:


    `virtual IOMemoryMap * mapDeviceMemoryWithRegister(UInt8 reg, IOOptionBits options
    = 0);`


    The following is an example of its use.


    `IOMemoryMap *bar0Map = fPCIDevice->mapDeviceMemoryWithRegister(kIOPCIConfigBaseAddress0);`

    `IOMemoryMap *bar1Map = fPCIDevice->mapDeviceMemoryWithRegister(kIOPCIConfigBaseAddress1);`

    `if (bar0Map)`

    `{`

    `     UInt8 *address = (UInt8*)bar0Map->getVirtualAddress();`

    `// do something with` *`address`*

    `}`

    `…`


    If you have already obtained an `IODeviceMemory` *(*subclass of `IOMemoryDescriptor`*)*
    object by calling `getDeviceMemoryWithIndex()` as in [Listing 9-6](#Chapter09.html#list_9_6),
    you can simply call the `map()` method which does the same thing. In fact, that
    is exactly what `mapDeviceMemoryWithRegister()` does under the hood. Once an `IOMemoryMap`
    object is obtained, you can call the `getVirtualAddress()` method to obtain a
    kernel virtual address which can be used to access the mapping. The returned pointer
    can be read and written to in the same way as regular memory assuming it points
    to I/O memory and not I/O space.


    When a driver is done accessing the memory it should call the `unmap()` method.


    ##### Accessing I/O Space


    I/O Space consists of a 16-bit address space and is an older way of communicating
    with devices. I/O ports were also used for communication with serial and parallel
    ports in older computers, so it is not specific to PCI, but rather a way for an
    external device (to the CPU) to interface with the processor. I/O Space ranges
    assigned to a device can be accessed and mapped just like memory regions by using
    `mapDeviceMemoryWithRegister()` and `getDeviceMemoryWithIndex()`. The difference
    however, is that you cannot simply access the pointer returned by `getVirtualAddress()`
    as above directly. You have to use one of the following methods.


    `virtual void ioWrite32(UInt16 offset, UInt32 value, IOMemoryMap* map = 0);`

    `virtual void ioWrite16(UInt16 offset, UInt16 value, IOMemoryMap* map = 0);`

    `virtual void ioWrite8(UInt16 offset, UInt8 value, IOMemoryMap* map = 0);`

    `virtual UInt32 ioRead32(UInt16 offset, IOMemoryMap* map = 0);`

    `virtual UInt16 ioRead16(UInt16 offset, IOMemoryMap* map = 0);`

    `virtual UInt8 ioRead8(UInt16 offset, IOMemoryMap* map = 0);`


    Using I/O space in new devices is frowned upon, due to poor performance and the
    limited address space it provides. Accessing mapped memory can take as little
    as 1 CPU cycle, while accessing a port can take as many as 100 cycles on certain
    architectures.


    Before I/O space can be accessed, it needs to be enabled in the device''s command
    register. `IOPCIDevice` provides the `setIOEnable()` method for this purpose.


    #### Handling Device Removal


    Thunderbolt and ExpressCard devices may be unplugged during operation. Therefore,
    drivers that handle these devices need some additional modifications over traditional
    PCI drivers, which are usually not written with removal of the device in mind.
    Improper handling of device removal may lead to hanging applications, system crashes,
    or disruptions to system stability or performance. For Thunderbolt devices, removal
    is not an exceptional condition so a driver must be able to cope with the removal
    of the device.


    ![images](images/square.jpg) **Caution** Storage devices with mounted file systems
    may NOT be unplugged without the user first “Ejecting” (unmounting) the file system.
    Failure to do so may result in loss or, in the worst-case scenario, corruption
    of the file system. Thunderbolt based storage drivers should call: `setProperty(kIOPropertyPhysicalInterconnectLocationKey,
    kIOPropertyExternalKey)` early in the driver''s `start()` method to indicate to
    the I/O Kit that the storage is externally connected.


    While it may seem complicated to handle device removals, the I/O Kit was designed
    specifically to allow removal of devices. The `IOService` class handles a lot
    of the heavy lifting for us automatically.


    Your driver may detect the first sign that a device has been removed if it receives
    the value 0xffffffff (assuming a 32-bit read) while reading a value from memory
    mapped I/O (MMIO) or PCI configuration space registers. Of course the value might
    actually be valid for some registers, however you can read an alternate register
    or memory location that you know is guaranteed never to contain that value to
    confirm if the device is unresponsive. The driver may detect this condition before
    the I/O Kit messages the driver informing it that the device has been removed.
    If a driver determines that a device is removed, it should cease all access to
    mapped memory and the configuration space as further requests will result in timing
    out requests, which can take up to several milliseconds and may affect overall
    system performance. Apple recommends funneling all accesses to MMIO through a
    single method, as follows:


    `UInt32 com_osxkernel_MyFirstPCIDriver::readRegister32(UInt32 offset)`

    `{`

    `    UInt32 res = 0xffffffff;`

    `    if (!fDeviceRemoved)`

    `    {`

    `        res = OSReadLittleInt32(fBar0Address, offset);`

    `        if (res == 0xffffffff)`

    `            fDeviceRemoved = true;`

    `    }`

    `    return res;`

    `}`


    The method will prevent further accesses to registers once the device has been
    removed. We can now use the member variable `fDeviceRemoved` in other parts of
    the driver to prevent operations that will communicate with the hardware.


    The I/O Kit handles device removal in three phases:'
  trans: "\n### 映射与访问设备内存区域\n\n上一节展示了如何获取可用 I/O 内存区域的信息。在实际访问这些区域的数据之前，我们还需要完成一些额外工作。此外，在大多数实际驱动中，无需显式枚举这些区域，因为驱动通常明确知道需要映射哪些区域（即便不是全部）。以下\
    \ `IOPCIDevice` 方法可用于直接映射 BAR 区域：\n\n`virtual IOMemoryMap * mapDeviceMemoryWithRegister(UInt8\
    \ reg, IOOptionBits options = 0);`\n\n以下是其使用示例：\n\n```\nIOMemoryMap *bar0Map =\
    \ fPCIDevice->mapDeviceMemoryWithRegister(kIOPCIConfigBaseAddress0);\nIOMemoryMap\
    \ *bar1Map = fPCIDevice->mapDeviceMemoryWithRegister(kIOPCIConfigBaseAddress1);\n\
    if (bar0Map)\n{\n    UInt8 *address = (UInt8*)bar0Map->getVirtualAddress();\n\
    // 对 *address 进行操作\n}\n…\n```\n\n如果您已通过调用 `getDeviceMemoryWithIndex()` 获得了 `IODeviceMemory`（`IOMemoryDescriptor`\
    \ 的子类）对象（如列表 9-6 所示），则可直接调用功能相同的 `map()` 方法。实际上，`mapDeviceMemoryWithRegister()`\
    \ 底层执行的正是此操作。获得 `IOMemoryMap` 对象后，可调用 `getVirtualAddress()` 获取内核虚拟地址，用于访问映射区域。假设该指针指向\
    \ I/O 内存而非 I/O 空间，则可像操作常规内存一样对其进行读写。\n\n当驱动完成内存访问后，应调用 `unmap()` 方法。\n\n### 访问\
    \ I/O 空间\n\nI/O 空间由一个 16 位地址空间组成，是较早期的设备通信方式。在旧式计算机中，I/O 端口也用于串行和并行端口的通信，因此它并非\
    \ PCI 专属，而是外部设备（相对于 CPU）与处理器交互的一种方式。分配给设备的 I/O 空间范围可通过 `mapDeviceMemoryWithRegister()`\
    \ 和 `getDeviceMemoryWithIndex()` 像内存区域一样进行访问和映射。但区别在于，不能像上文那样直接访问 `getVirtualAddress()`\
    \ 返回的指针，而必须使用以下方法之一：\n\n```\nvirtual void ioWrite32(UInt16 offset, UInt32 value,\
    \ IOMemoryMap* map = 0);\nvirtual void ioWrite16(UInt16 offset, UInt16 value,\
    \ IOMemoryMap* map = 0);\nvirtual void ioWrite8(UInt16 offset, UInt8 value, IOMemoryMap*\
    \ map = 0);\nvirtual UInt32 ioRead32(UInt16 offset, IOMemoryMap* map = 0);\nvirtual\
    \ UInt16 ioRead16(UInt16 offset, IOMemoryMap* map = 0);\nvirtual UInt8 ioRead8(UInt16\
    \ offset, IOMemoryMap* map = 0);\n```\n\n由于 I/O 空间性能较差且地址空间有限，新设备中已不推荐使用。访问映射内存可能仅需\
    \ 1 个 CPU 周期，而在某些架构上，访问一个 I/O 端口可能需要多达 100 个周期。\n\n在访问 I/O 空间前，需在设备的命令寄存器中启用它。`IOPCIDevice`\
    \ 提供了 `setIOEnable()` 方法用于此目的。\n\n### 处理设备移除\n\n雷电（Thunderbolt）和 ExpressCard 设备可能在运行过程中被拔出。因此，处理这些设备的驱动需要在传统\
    \ PCI 驱动（通常不涉及设备移除场景）基础上进行额外修改。不当的设备移除处理可能导致应用挂起、系统崩溃或影响系统稳定性与性能。对于雷电设备，移除并非异常情况，因此驱动必须能够应对设备移除。\n\
    \n![images](img/square.jpg) **警告** 挂载了文件系统的存储设备不得在用户未先“弹出”（卸载）文件系统的情况下拔除。否则可能导致数据丢失，甚至最坏情况下造成文件系统损坏。基于雷电的存储驱动应在驱动的\
    \ `start()` 方法中尽早调用 `setProperty(kIOPropertyPhysicalInterconnectLocationKey, kIOPropertyExternalKey)`，以向\
    \ I/O Kit 表明该存储设备为外部连接。\n\n虽然处理设备移除看似复杂，但 I/O Kit 本身就是为支持设备移除而设计的。`IOService`\
    \ 类自动为我们处理了大量繁重工作。\n\n当驱动从内存映射 I/O（MMIO）或 PCI 配置空间寄存器中读取到值 `0xffffffff`（假设为 32\
    \ 位读取）时，可能检测到设备已移除的初步迹象。当然，该值对某些寄存器而言可能是有效值，但您可以读取一个已知绝不会包含该值的替代寄存器或内存位置，以确认设备是否无响应。驱动可能在\
    \ I/O Kit 通知设备已移除之前就检测到这一状况。如果驱动判定设备已移除，应立即停止所有对映射内存和配置空间的访问，因为后续请求将导致超时（可能耗时数毫秒），从而影响系统整体性能。Apple\
    \ 建议将所有对 MMIO 的访问集中到单个方法中，如下所示：\n\n```\nUInt32 com_osxkernel_MyFirstPCIDriver::readRegister32(UInt32\
    \ offset)\n{\n    UInt32 res = 0xffffffff;\n    if (!fDeviceRemoved)\n    {\n\
    \        res = OSReadLittleInt32(fBar0Address, offset);\n        if (res == 0xffffffff)\n\
    \            fDeviceRemoved = true;\n    }\n    return res;\n}\n```\n\n该方法将在设备移除后阻止后续对寄存器的访问。现在，我们可以在驱动的其他部分使用成员变量\
    \ `fDeviceRemoved` 来阻止与硬件通信的操作。\n\nI/O Kit 通过三个阶段处理设备移除：\n"
- fmt: '1. 总线控制器（PCI 根）会在其客户端 *nub* 上调用`terminate()`方法，该方法会再次向其客户端发送消息，依此类推，直到到达栈底。覆盖了`message()`方法的`IOService`对象也会收到`kIOServicesIsTerminated`消息。此时驱动被视为非活跃状态，无法被新客户端枚举或附加。但保持驱动打开状态的现有客户端仍将继续活跃。


    2. 栈中的驱动会依次调用其`willTerminate()`方法，随后调用`didTerminate()`。此过程以相反顺序进行，即客户端会调用其提供者，而非相反方向，直到到达最初发起`terminate()`调用的原始提供者。请记住，这些方法是可选的，你可以根据驱动需求选择是否实现。当驱动的`willTerminate()`方法被调用时，它应清除所有排队请求并取消正在进行的
    I/O 操作（例如未完成的 DMA 传输）。


    3. 移除过程的最后阶段会调用驱动的`stop()`方法，随后调用`detach()`，这将从 I/O Registry 中移除该驱动。如果驱动的保留计数归零，驱动将被释放并调用其`free()`方法。


    如果用户重新插入同一设备，会分配一个新的驱动实例。此时任何正在访问驱动的应用程序仍将附着在旧的驱动实例上。为处理此情况，应用程序必须安装通知机制，以检测驱动/设备何时被移除或添加至系统。由于设备重新插入时驱动实例不会被重用，因此在处理设备移除后，驱动无需恢复到默认状态。但重要的是，它必须正确释放和释放所有已使用的资源，因为新实例会重新分配或回收这些资源，否则可能导致内存泄漏或新驱动实例无法正常启动。


    ![images](images/square.jpg) **Tip** Xcode 提供了一个名为`ioclasscount`的命令行工具，用于打印`OSObject`派生类的实例计数，可用于调试与设备移除相关的内存泄漏。更多信息请参见[第
    16 章](#Chapter16.html#ch16)。


    ### Interrupts


    中断提供了一种机制，使得 PCI 及其他硬件设备能够在感兴趣的事件发生时（例如键盘按键被按下、鼠标移动或按钮被点击）异步地向 CPU 发出信号。网络摄像头可能会在每帧新视频数据可用时发送一个中断，从而让驱动知道何时可以从其映射的内存区域读取新帧。中断避免了
    CPU 通过轮询每个设备来判断是否有新数据可用。传统的 PCI 设备使用专用中断引脚，这些引脚通过物理线路从 PCI 卡/插槽连接到 CPU 的引脚。更现代的
    Thunderbolt 和基于 PCIe 的技术则使用消息信号中断（MSI），从而避免了设备与 CPU 或中断控制器芯片之间需要专用物理线路的问题。传统 PCI
    卡有四个中断引脚，限制了设备可用的中断数量。而 MSI 允许每个设备最多有 32 个中断。尽管 MSI 在电气特性上与传统中断不同，但从驱动的角度来看，它们的功能表现是相同的。


    当 CPU 接收到一个中断时，它会将当前正在运行的线程挂起，即使该线程属于内核自身也是如此。当中断发生时，CPU 会尝试查找对应触发中断的中断服务例程（ISR）。


    ISR 会被路由到“拥有”该设备的驱动。传统的基于中断的设备可能共享中断线路。在这种情况下，驱动需要查询设备（通常通过读取内存映射寄存器）来确定是否是其设备引发了中断。


    MSI 中断永远不会被共享，尽管预先考虑这种情况仍是一种良好的实践。中断并不总是由 PCI 等硬件设备产生。系统定时器也会发送中断，用于驱动操作系统服务（如调度器）。


    当 ISR 运行时，处理中断的 CPU 会禁用其他中断，这意味着在 ISR 完成之前，该 CPU 上不会有任何其他操作执行。


    可想而知，如果驱动在 ISR 回调中执行大量工作，将对系统性能产生不良影响。事实上，强烈建议驱动在 ISR 中只做一件事：确认中断。如果中断未被确认，可能导致
    ISR 持续触发，从而影响性能和稳定性。当 ISR 运行时，通常被称为*主中断上下文*。为了提升系统性能，大多数操作系统（包括 OS X 和 iOS）都提供了将中断处理延迟到稍后时间由内核线程执行的机制。这通常被称为*次中断上下文*。正是在次中断上下文（线程）中，才执行处理中断的实际工作，例如从网络复制传入的数据包。主处理器通常确认中断，然后，如果有工作需要处理，会通知次处理器。


    在主上下文中，无法执行阻塞或休眠操作，这包括大多数内存分配例程以及持有自旋锁以外的锁。这是因为阻塞/休眠是通过放弃 CPU 访问权并临时让出给其他线程来实现的。然而，ISR
    并不与任何任务或线程描述符关联。因此，调度器无法像调度普通线程那样将 ISR 再次调度回来，因为它是由 CPU 直接触发的。


    次中断处理器则没有此类限制，可以愉快地分配内存并阻塞等待锁变为可用。这在 OS X 和 iOS 下是可行的，但某些操作系统可能在不允许这样做的上下文中运行次处理器（也称为底半部，主处理器为顶半部）。


    尽管 OS X 和 iOS 对次中断处理器中的操作施加了较少的限制，但它仍然必须非常高效。


    主中断的处理无法由用户空间程序完成。如果用户空间程序需要知道中断何时发生，则必须由驱动来通知它。


    在 OS X 中，所有主中断都被路由到 CPU 0（核心），而次中断则分散到所有核心，这允许多个驱动并行运行。由于次中断运行在独立的内核线程（高优先级）中，它可以像任何其他线程一样被调度，因此可以在中断启用的情况下运行。中断机制在概念上实现起来很简单。然而，如果数据在主处理器和次处理器之间共享，或者用户线程可能调用需要访问相同数据的驱动，那么中断的并行性可能会使其变得复杂。必须非常小心地确保没有死锁，并减少不同执行线程之间的争用。这确保了没有线程需要过度等待才能获得所需资源。有关同步的更多信息，请参阅[第
    7 章](#Chapter07.html#ch7)。


    ![images](images/square.jpg) **Note** 术语“主中断”有时被称为直接中断，而“次中断”则被称为间接中断。'
  raw: '1.  The bus controller (PCI root) will call the `terminate()` method on its
    client *nub*, which will message its clients again and so forth until it reaches
    the bottom of the stack. An `IOService` object that overrides the `message()`
    method will also receive a `kIOServicesIsTerminated` message. The driver is now
    considered inactive and cannot be enumerated or attached to by new clients. Existing
    clients holding the driver open will still remain active.

    2.  Drivers in the stack will have their `willTerminate()` method called, and
    thereafter `didTerminate()`. This process happens in reverse order, so clients
    will call their providers instead of the other way around, until it reaches the
    original provider that initiated the call to `terminate()` in the first place.
    Remember that these methods are optional, and you can choose to implement these
    based on your driver''s needs. In response to having its `willTerminate()` method
    called, a driver should clear all queued requests and cancel in-flight I/O such
    as unfinished DMA transfers.

    3.  The last phase of the removal will call the drivers `stop()` method, then
    `detach()` which will remove it from the I/O Registry. If the driver''s retain
    count reaches zero, the driver will be deallocated and its `free()` method will
    be called.


    If a user plugs the same device back again, a new instance of the driver will
    be allocated. Any applications accessing the driver at the time will still be
    attached to the old instance of the driver. To handle this situation, the application
    must install a notification to detect when the driver/device is removed or added
    to the system. Because a driver instance is not reused when a device is reinserted,
    it doesn''t need to return to its default state once it has handled a device removal.
    However, it is important it properly release and free any used resources, as the
    new instance will reallocate or reclaim those which could result in a memory leak
    or the new driver instance not coming up properly.


    ![images](images/square.jpg) **Tip** Xcode supplies a command-line tool called
    `ioclasscount` that prints instance counts for `OSObject` derived classes and
    can be used to help debug memory leaks related to device removals. See [Chapter
    16](#Chapter16.html#ch16) for more information.


    ### Interrupts


    Interrupts provide a mechanism for PCI and other hardware devices to signal the
    CPU asynchronously when an event of interest occurs, such as when a key on a keyboard
    is pressed or when the position of the mouse is moved or its buttons clicked.
    A web camera might send an interrupt every time a new video frame becomes available,
    which will allow its driver to know when the new frame can be read from its mapped
    memory region. Interrupts save the CPU from polling each device to determine if
    new data is available. Legacy PCI devices used dedicated interrupt pins that were
    physically wired from the PCI card/slot to a pin on the CPU. More modern Thunderbolt
    and PCIe-based technologies use message-signaled interrupts (MSI), avoiding the
    need for dedicated physical lines between a device and the CPU or interrupt controller
    chip. Traditional PCI cards had four interrupt pins, which limited the amount
    of interrupts that could be used for a device. MSI however allow for up to 32
    interrupts per device. While MSI is electrically different from traditional interrupts,
    they do appear to function identically from a driver''s point of view.


    When a CPU receives an interrupt, it puts the currently running thread to sleep,
    even if the thread belongs to the kernel itself. When the interrupt occur the
    CPU will try to locate an Interrupt Service Routine (ISR) for the interrupt that
    was triggered.


    The ISR gets routed to the driver that “owns” the device. It is possible for legacy
    interrupt based devices to share interrupt lines. In this case, the driver will
    need to interrogate the device, usually by reading a memory mapped register to
    determine if its device raised the interrupt.


    MSI interrupts are never shared, although it is still good practice to anticipate
    this scenario. Interrupts are not always generated just from hardware devices
    such as PCI. Interrupts are also sent by the system timer, which is used to drive
    OS services such as the scheduler.


    While an ISR runs, the CPU handling the interrupt will disable other interrupts,
    which means that nothing will execute on the CPU until the ISR has completed.


    As you can imagine, it would not be ideal for system performance if a driver performed
    large amounts of work in the ISR callback. In fact, it is highly recommended that
    a driver do nothing but acknowledge the interrupt. If the interrupt is not acknowledged,
    it may cause the ISR to go off continuously, which would affect both performance
    and stability. When an ISR runs, this is often referred to as the *primary interrupt
    context*. To improve system performance, most OSs, including OS X and iOS, have
    mechanisms to defer handling of interrupts to a kernel thread at a later time.
    This is often referred to as the *secondary interrupt context*. It is in the secondary
    interrupt context (thread) that the real work of handling an interrupt is performed,
    such as copying incoming packets from a network. The primary handler usually acknowledges
    the interrupt and then, if there is work to do, signals the secondary handler.


    In the primary context, it is not possible to do an operation that blocks or sleeps,
    which includes most memory allocation routines and holding locks other than spin
    locks. This is because blocking/sleeping is performed by giving up access to the
    CPU and temporarily yielding in favor of some other thread. However, the ISR is
    not associated with a task or thread descriptor. Therefore, the scheduler is not
    able to schedule the ISR back again as it is fired directly by the CPU.


    The secondary interrupt handler has no such restrictions and can happily allocate
    memory and block waiting for locks to become available. This is possible under
    OS X and iOS, but some operating systems may run the secondary handler (also called
    bottom half, the primary being the top half) in a context that does not allow
    this.


    While OS X and iOS impose fewer restrictions for what you can do in a secondary
    interrupt handler, it still has to be very efficient.


    Handling of primary interrupts cannot be done by a user space program. If a user
    space program needs to know when an interrupt occur, it would need to be signaled
    by the driver instead.


    In OS X, all primary interrupts are routed to CPU 0 (core) and secondary interrupts
    are spread across all cores, which allows multiple drivers to run in parallel.
    Because secondary interrupts run in a separate kernel thread (high priority),
    it can be scheduled like any other thread and thus run while interrupts are enabled.
    Interrupt mechanisms are conceptually simple to implement. However, they can be
    complicated by their parallelism if data is shared between the primary and secondary
    handler, and also by user threads that may call into the driver that needs to
    access the same data. Great care needs to be taken to ensure that there are no
    deadlocks and also to reduce contention between the various threads of execution.
    This ensures that no thread will have to wait excessively to gain access to needed
    resources. For more information on synchronization, refer to [Chapter 7](#Chapter07.html#ch7).


    ![images](images/square.jpg) **Note** The term primary interrupt is sometimes
    referred to as direct interrupt, and secondary interrupts as indirect interrupts.'
  trans: '

    1. 总线控制器（PCI 根）会在其客户端 *nub* 上调用`terminate()`方法，该方法会再次向其客户端发送消息，依此类推，直到到达栈底。覆盖了`message()`方法的`IOService`对象也会收到`kIOServicesIsTerminated`消息。此时驱动被视为非活跃状态，无法被新客户端枚举或附加。但保持驱动打开状态的现有客户端仍将继续活跃。


    2. 栈中的驱动会依次调用其`willTerminate()`方法，随后调用`didTerminate()`。此过程以相反顺序进行，即客户端会调用其提供者，而非相反方向，直到到达最初发起`terminate()`调用的原始提供者。请记住，这些方法是可选的，你可以根据驱动需求选择是否实现。当驱动的`willTerminate()`方法被调用时，它应清除所有排队请求并取消正在进行的
    I/O 操作（例如未完成的 DMA 传输）。


    3. 移除过程的最后阶段会调用驱动的`stop()`方法，随后调用`detach()`，这将从 I/O Registry 中移除该驱动。如果驱动的保留计数归零，驱动将被释放并调用其`free()`方法。


    如果用户重新插入同一设备，会分配一个新的驱动实例。此时任何正在访问驱动的应用程序仍将附着在旧的驱动实例上。为处理此情况，应用程序必须安装通知机制，以检测驱动/设备何时被移除或添加至系统。由于设备重新插入时驱动实例不会被重用，因此在处理设备移除后，驱动无需恢复到默认状态。但重要的是，它必须正确释放和释放所有已使用的资源，因为新实例会重新分配或回收这些资源，否则可能导致内存泄漏或新驱动实例无法正常启动。


    ![images](img/square.jpg) **提示** Xcode 提供了一个名为`ioclasscount`的命令行工具，用于打印`OSObject`派生类的实例计数，可用于调试与设备移除相关的内存泄漏。更多信息请参见第
    16 章。


    ### 中断


    中断提供了一种机制，使得 PCI 及其他硬件设备能够在感兴趣的事件发生时（例如键盘按键被按下、鼠标移动或按钮被点击）异步地向 CPU 发出信号。网络摄像头可能会在每帧新视频数据可用时发送一个中断，从而让驱动知道何时可以从其映射的内存区域读取新帧。中断避免了
    CPU 通过轮询每个设备来判断是否有新数据可用。传统的 PCI 设备使用专用中断引脚，这些引脚通过物理线路从 PCI 卡/插槽连接到 CPU 的引脚。更现代的
    Thunderbolt 和基于 PCIe 的技术则使用消息信号中断（MSI），从而避免了设备与 CPU 或中断控制器芯片之间需要专用物理线路的问题。传统 PCI
    卡有四个中断引脚，限制了设备可用的中断数量。而 MSI 允许每个设备最多有 32 个中断。尽管 MSI 在电气特性上与传统中断不同，但从驱动的角度来看，它们的功能表现是相同的。


    当 CPU 接收到一个中断时，它会将当前正在运行的线程挂起，即使该线程属于内核自身也是如此。当中断发生时，CPU 会尝试查找对应触发中断的中断服务例程（ISR）。


    ISR 会被路由到“拥有”该设备的驱动。传统的基于中断的设备可能共享中断线路。在这种情况下，驱动需要查询设备（通常通过读取内存映射寄存器）来确定是否是其设备引发了中断。


    MSI 中断永远不会被共享，尽管预先考虑这种情况仍是一种良好的实践。中断并不总是由 PCI 等硬件设备产生。系统定时器也会发送中断，用于驱动操作系统服务（如调度器）。


    当 ISR 运行时，处理中断的 CPU 会禁用其他中断，这意味着在 ISR 完成之前，该 CPU 上不会有任何其他操作执行。


    可想而知，如果驱动在 ISR 回调中执行大量工作，将对系统性能产生不良影响。事实上，强烈建议驱动在 ISR 中只做一件事：确认中断。如果中断未被确认，可能导致
    ISR 持续触发，从而影响性能和稳定性。当 ISR 运行时，通常被称为*主中断上下文*。为了提升系统性能，大多数操作系统（包括 OS X 和 iOS）都提供了将中断处理延迟到稍后时间由内核线程执行的机制。这通常被称为*次中断上下文*。正是在次中断上下文（线程）中，才执行处理中断的实际工作，例如从网络复制传入的数据包。主处理器通常确认中断，然后，如果有工作需要处理，会通知次处理器。


    在主上下文中，无法执行阻塞或休眠操作，这包括大多数内存分配例程以及持有自旋锁以外的锁。这是因为阻塞/休眠是通过放弃 CPU 访问权并临时让出给其他线程来实现的。然而，ISR
    并不与任何任务或线程描述符关联。因此，调度器无法像调度普通线程那样将 ISR 再次调度回来，因为它是由 CPU 直接触发的。


    次中断处理器则没有此类限制，可以愉快地分配内存并阻塞等待锁变为可用。这在 OS X 和 iOS 下是可行的，但某些操作系统可能在不允许这样做的上下文中运行次处理器（也称为底半部，主处理器为顶半部）。


    尽管 OS X 和 iOS 对次中断处理器中的操作施加了较少的限制，但它仍然必须非常高效。


    主中断的处理无法由用户空间程序完成。如果用户空间程序需要知道中断何时发生，则必须由驱动来通知它。


    在 OS X 中，所有主中断都被路由到 CPU 0（核心），而次中断则分散到所有核心，这允许多个驱动并行运行。由于次中断运行在独立的内核线程（高优先级）中，它可以像任何其他线程一样被调度，因此可以在中断启用的情况下运行。中断机制在概念上实现起来很简单。然而，如果数据在主处理器和次处理器之间共享，或者用户线程可能调用需要访问相同数据的驱动，那么中断的并行性可能会使其变得复杂。必须非常小心地确保没有死锁，并减少不同执行线程之间的争用。这确保了没有线程需要过度等待才能获得所需资源。有关同步的更多信息，请参阅第
    7 章。


    ![images](img/square.jpg) **注意** 术语“主中断”有时被称为直接中断，而“次中断”则被称为间接中断。

