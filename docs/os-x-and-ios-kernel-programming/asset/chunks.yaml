    ```\n\nThe other part of data transfer is reading bytes that have been received\
    \ from the hardware serial port. A serial driver will obtain data that has been\
    \ received from its hardware device and copy it into its internal receive buffer.\
    \ The exact means by which the hardware will notify the serial driver that data\
    \ has been received will be implementation-specific, but may be signaled by a\
    \ PCI interrupt or the completion of a USB transaction. The driver now needs to\
