    #### Low-Latency Isochronous Transfers


    Isochronous endpoints are typically used to transfer multimedia data, such as
    audio or video that is continually streamed to or from the USB device. An application
    that processes this data typically wishes to do so with minimal latency; for example,
    an application may wish to begin processing audio data that has been read from
    a microphone as soon as it is received by the USB device. One of the problems
    with the isochronous methods described previously is that the application must
    wait until the completion callback function is notified before it can begin processing
    the data that was read. If an application issues an isochronous request that spans
    10 milliseconds worth of USB frames, this means there is a latency of at least
    10 milliseconds from the start of the request until the application can begin
    to process the data that was read from the device.


    As a solution to this, the `IOUSBInterfaceInterface` class contains low-latency
    isochronous transfer methods that give an application access to data as soon as
    it has been received by the device, even if the overall isochronous request hasn''t
    completed. To do this, the I/O Kit updates the values of the frame list while
    the isochronous transaction is in flight; the values of `frStatus` and `frActCount`
    are written and available to the application during the transfer. Rather than
    waiting for the completion callback to fire, an application can periodically examine
    the values of its frame list and determine when new data is available to be processed.
    This can be done from a real-time thread in a user-space application, for example.


    An application specifies how often the I/O Kit should update the frame list while
    the operation is in flight by specifying the number of milliseconds between updates
    (a value between 0–8). For example, an update frequency of 1 means the application''s
    frame list will be updated by the I/O Kit every millisecond during the transfer.
    A value of 0 means the I/O Kit will not update the frame list until the end of
    the transfer, although the updated frame list will be available to the application
    as soon as the transaction has completed but before the application receives the
    completion callback.


    To use low-latency isochronous transfers, the buffers used for the frame list
    array and to hold the source or destination data from the transfer must be allocated
    using methods provided by the `IOUSBInterfaceInterface` class. This allows the
    I/O Kit to ensure the buffers are available to both the kernel, which updates
    the buffers during the transfer, and the application, which reads the result during
    the transfer.


    Note that instead of using the `IOUSBIsocFrame` structure to describe the transfer
    for a USB frame, the low-latency methods use the `IOUSBLowLatencyIsocFrame` structure.
    This structure includes an additional field, `frTimeStamp`, which holds the time
    at which the I/O Kit updated the structure''s values.


    The following methods are provided for low-latency isochronous transfers:


    *   `LowLatencyCreateBuffer`: Allocates a buffer used to hold either the source
    data for a low-latency isochronous write, the destination data for a low-latency
    isochronous read, or the array of `IOUSBLowLatencyIsocFrame` elements that describes
    an isochronous transfer. The application''s intent for the buffer must be specified
    by providing one of the enumeration values— `kUSBLowLatencyWriteBuffer`, `kUSBLowLatencyReadBuffer`,
    or `kUSBLowLatencyFrameListBuffer`.

    *   `LowLatencyDestroyBuffer`: Releases a buffer that has previously been allocated
    by the method `LowLatencyCreateBuffer`.

    *   `LowLatencyReadIsochPipeAsync`: Performs a read from an isochronous endpoint
    on the USB device. The parameters to this method extend those of the method `ReadIsochPipeAsync`
    to include a parameter named `updateFrequency` that specifies how often the I/O
    Kit should update the frame list during the transfer (specified in milliseconds).
    The `IOUSBLowLatencyIsocFrame` array and the destination buffer must both have
    been allocated by the method `LowLatencyCreateBuffer`.

    *   `LowLatencyWriteIsochPipeAsync`: Performs a write to an isochronous endpoint
    on the USB device. The parameters to this method extend those of the method `WriteIsochPipeAsync`
    to include a parameter named `updateFrequency` that specifies how often the I/O
    Kit should update the frame list during the transfer (specified in milliseconds).
    The `IOUSBLowLatencyIsocFrame` array and the source buffer must both have been
    allocated by the method `LowLatencyCreateBuffer`.'
