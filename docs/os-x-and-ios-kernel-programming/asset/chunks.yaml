- fmt: "### Implementing an Audio Driver\n\nNow let's look at how a kernel audio driver\
    \ can be implemented using the example project `MyAudioDevice`. We only show excerpts\
    \ from this as it pertains to the topic in question; however, you can inspect\
    \ the full source code of `MyAudioDevice` by downloading it from the Apress web\
    \ site. For the sake of simplicity, we will make the driver as basic as possible.\
    \ As there is no standardized widely available audio hardware we can build a driver\
    \ for, we will build a virtual audio driver. The driver will have one output and\
    \ one input so we can perform both functions. The driver will operate as a loopback\
    \ device, which means that audio we play will be transferred from the output buffer\
    \ to the input buffer. We leave it as an exercise for you, the reader, to do something\
    \ more interesting, perhaps attach it to an actual audio device and forward audio\
    \ data to or from it, or route audio to or from a network.\n\nIf everything works,\
    \ we should be able to play a song using an application like iTunes and then capture\
    \ the results using the audio recording feature of the QuickTime player. We will\
    \ not be able to hear the audio as it plays, as it is not routed to a speaker.\
    \ Additionally, the OS X sound preferences only allow output on a single device\
    \ at a time, which prevents us from hearing the audio played on a different audio\
    \ output. However, we will be able to hear the recording once we play it back\
    \ again (after having selected an output other than our device). Once the driver\
    \ is loaded, it should be visible under *System Preferences*![images](images/U001.jpg)*Sound*,\
    \ as shown in [Figure 12-4](#Chapter12.html#fig_12_4).\n\n![images](images/1204.jpg)\n\
    \n**Figure 12-4.** The Audio pane of System Preferences showing `MyAudioDevice`\
    \ selected as the active output\n\nThe driver will be based on the example driver\
    \ provided by the `IOAudioFamily` source code distribution called `SampleAudioDevice`.\
    \ If you wish to learn more about audio drivers, you can look at its implementation\
    \ as well as the second example, `SamplePCIAudioDevice`. Note that neither example\
    \ is actually functional; rather, they serve as skeletons or starting points for\
    \ a new driver, unlike `MyAudioDevice`, which is a working implementation of an\
    \ audio driver.\n\nIn order to interface with the Core Audio system, our driver\
    \ needs to implement an instance of `IOAudioDevice`. Note that it is entirely\
    \ possible to implement a driver for an audio device without using the `IOAudioFamily`\
    \ at all. The downside is that you would need to provide your own API for applications\
    \ to access the device. Furthermore, existing applications would need modifications\
    \ to be able to use your device because most applications depend on Core Audio\
    \ or a framework that uses Core Audio instead.\n\nOur driver will use `IOAudioFamily`.\
    \ The architecture of `MyAudioDevice` and how it interacts with the classes of\
    \ the `IOAudioFamily` can be seen in [Figure 12-5](#Chapter12.html#fig_12_5).\n\
    \n![images](images/1205.jpg)\n\n**Figure 12-5.** `MyAudioDevice` architecture\n\
    \nThe virtual device will consist of a subclass of `IOAudioDevice` called `MyAudioDevice`.\
    \ This will in turn allocate a single instance of the `MyAudioEngine` class, which\
    \ is derived from `IOAudioEngine`. The main class will also allocate a number\
    \ of `IOAudioControl` instances, which will be used to represent controls for\
    \ adjusting the output and input volume levels for the left and right channels,\
    \ as well as controls to mute the output and input. Because we do not have an\
    \ actual hardware device, these controls will not do anything, but we implement\
    \ them anyway for demonstration purposes. The `MyAudioEngine` class will represent\
    \ the I/O engine in lieu of actual hardware. The class will allocate two `IOAudioStream`\
    \ instances, one for the output sample buffer and one for the input sample buffer.\
    \ When data enters the output buffer, we will simply copy the data over to the\
    \ input buffer.\n\n### Driver and Hardware Initialization\n\n`IOAudioEngine` primarily\
    \ performs hardware initialization and its implementation is often quite minimalistic,\
    \ as much of the complexity of an audio driver will be implemented as a subclass\
    \ of `IOAudioEngine`. Nevertheless, the class performs some important tasks internally,\
    \ such as providing a central `IOWorkLoop` and `IOCommandGate`, which are shared\
    \ by subordinate classes such as `IOAudioEngine` and are used to serialize access\
    \ to the driver and hardware. The `IOAudioEngine` class also provides a shared\
    \ timer service that can be used by other objects in the driver. An object can\
    \ register to receive timer events with the `addTimerEvent()` function, as follows:\n\
    \n`virtual IOReturn addTimerEvent(OSObject *target, TimerEvent event, AbsoluteTime\
    \ interval);`\n\nThe `target` argument should be a pointer to the object that\
    \ will be notified of the timer event. The `interval` specifies the frequency\
    \ of the timer event in units of `AbsoluteTime (nanoseconds)`. The `event` argument\
    \ specifies the callback function. An audio driver may typically need several\
    \ timer events, for example, to poll the status of an output connector to sense\
    \ if a jack was connected.\n\nThe following steps are typically performed by an\
    \ audio driver's `IOAudioDevice` subclass.\n\n* Configure the hardware device's\
    \ provider and enumerate any needed resources. For PCI or Thunderbolt, this means\
    \ mapping device memory or I/O regions. For USB devices, enumerate interfaces\
    \ and/or pipes.\n* Configure the device for operation. For example, take it out\
    \ of reset/sleep mode by accessing the device's registers or sending control requests.\n\
    * If your driver supports multiple audio chips or a chip with a varying number\
    \ of DMA channels, inputs, or outputs, the driver will need to interrogate the\
    \ device to work out its exact capabilities.\n* Set the name and description of\
    \ the audio device, which will identify it to Core Audio and user space applications.\n\
    * Based on information extracted from the device, create the appropriate number\
    \ of `IOAudioEngine` instances, which in turn will allocate one or more `IOAudioStream`\
    \ instances, along with associated sample buffers.\n\nThe header file for the\
    \ `MyAudioDevice` class is shown in [Listing 12-1](#Chapter12.html#list_12_1).\n\
    \n**Listing 12-1.** Header File for the `MyAudioDevice` Class\n\n```\n#ifndef\
    \ _MYAUDIODEVICE_H__\n#define _MYAUDIODEVICE_H__\n\n#include <IOKit/audio/IOAudioDevice.h>\n\
    \n#define MyAudioDevice com_osxkernel_MyAudioDevice\n\nclass MyAudioDevice : public\
    \ IOAudioDevice\n{    \n    OSDeclareDefaultStructors(MyAudioDevice);\n\n    virtual\
    \ bool initHardware(IOService *provider);\n    bool createAudioEngine();\n\n \
    \   // Control callbacks\n    static IOReturn volumeChangeHandler(OSObject* target,\
    \ IOAudioControl *volumeControl,\n                                        SInt32\
    \ oldValue, SInt32 newValue);\n    virtual IOReturn volumeChanged(IOAudioControl\
    \ *volumeControl, SInt32 oldValue, SInt32\n                                  \
    \ newValue);\n\n    static IOReturn outputMuteChangeHandler(OSObject* target,\
    \ IOAudioControl *muteControl,\n                                            SInt32\
    \ oldValue, SInt32 newValue);\n    virtual IOReturn outputMuteChanged(IOAudioControl*\
    \ muteControl, SInt32 oldValue, SInt32\n                                     \
    \  newValue);\n\n    static IOReturn gainChangeHandler(OSObject* target, IOAudioControl*\
    \ gainControl, SInt32\n                                      oldValue, SInt32\
    \ newValue);\n    virtual IOReturn gainChanged(IOAudioControl* gainControl, SInt32\
    \ oldValue, SInt32\n                                 newValue);\n\n    static\
    \ IOReturn inputMuteChangeHandler(OSObject* target, IOAudioControl *muteControl,\n\
    \                                           SInt32 oldValue, SInt32 newValue);\n\
    \    virtual IOReturn inputMuteChanged(IOAudioControl* muteControl, SInt32 oldValue,\
    \ SInt32\n                                      newValue);\n};\n\n#endif\n```"
  raw: '### Implementing an Audio Driver


    Now let''s look at how a kernel audio driver can be implemented using the example
    project `MyAudioDevice`. We only show excerpts from this as it pertains to the
    topic in question; however, you can inspect the full source code of `MyAudioDevice`
    by downloading it from the Apress web site. For the sake of simplicity, we will
    make the driver as basic as possible. As there is no standardized widely available
    audio hardware we can build a driver for, we will build a virtual audio driver.
    The driver will have one output and one input so we can perform both functions.
    The driver will operate as a loopback device, which means that audio we play will
    be transferred from the output buffer to the input buffer. We leave it as an exercise
    for you, the reader, to do something more interesting, perhaps attach it to an
    actual audio device and forward audio data to or from it, or route audio to or
    from a network.


    If everything works, we should be able to play a song using an application like
    iTunes and then capture the results using the audio recording feature of the QuickTime
    player. We will not be able to hear the audio as it plays, as it is not routed
    to a speaker. Additionally, the OS X sound preferences only allow output on a
    single device at a time, which prevents us from hearing the audio played on a
    different audio output. However, we will be able to hear the recording once we
    play it back again (after having selected an output other than our device). Once
    the driver is loaded, it should be visible under *System Preferences* ![images](images/U001.jpg)
    *Sound*, as shown in [Figure 12-4](#Chapter12.html#fig_12_4).


    ![images](images/1204.jpg)


    ***Figure 12-4.** The Audio pane of System Preferences showing MyAudioDevice selected
    as the active output*


    The driver will be based on the example driver provided by the `IOAudioFamily`
    source code distribution called `SampleAudioDevice`. If you wish to learn more
    about audio drivers, you can look at its implementation as well as the second
    example, `SamplePCIAudioDevice`. Note that neither example is actually functional;
    rather, they serve as skeletons or starting points for a new driver, unlike `MyAudioDevice`,
    which is a working implementation of an audio driver.


    In order to interface with the Core Audio system, our driver needs to implement
    an instance of `IOAudioDevice`. Note that it is entirely possible to implement
    a driver for an audio device without using the `IOAudioFamily` at all. The downside
    is that you would need to provide your own API for applications to access the
    device. Furthermore, existing applications would need modifications to be able
    to use your device because most applications depend on Core Audio or a framework
    that uses Core Audio instead.


    Our driver will use `IOAudioFamily`. The architecture of `MyAudioDevice` and how
    it interacts with the classes of the `IOAudioFamily` can be seen in [Figure 12-5](#Chapter12.html#fig_12_5).


    ![images](images/1205.jpg)


    ***Figure 12-5.** MyAudioDevice architecture*


    The virtual device will consist of a subclass of `IOAudioDevice` called `MyAudioDevice`.
    This will in turn allocate a single instance of the `MyAudioEngine` class, which
    is derived from `IOAudioEngine`. The main class will also allocate a number of
    `IOAudioControl` instances, which will be used to represent controls for adjusting
    the output and input volume levels for the left and right channels, as well as
    controls to mute the output and input. Because we do not have an actual hardware
    device, these controls will not do anything, but we implement them anyway for
    demonstration purposes. The `MyAudioEngine` class will represent the I/O engine
    in lieu of actual hardware. The class will allocate two `IOAudioStream` instances,
    one for the output sample buffer and one for the input sample buffer. When data
    enters the output buffer, we will simply copy the data over to the input buffer.


    #### Driver and Hardware Initialization


    `IOAudioEngine` primarily performs hardware initialization and its implementation
    is often quite minimalistic, as much of the complexity of an audio driver will
    be implemented as a subclass of `IOAudioEngine`. Nevertheless, the class performs
    some important tasks internally, such as providing a central `IOWorkLoop` and
    `IOCommandGate`, which are shared by subordinate classes such as `IOAudioEngine`
    and are used to serialize access to the driver and hardware. The `IOAudioEngine`
    class also provides a shared timer service that can be used by other objects in
    the driver. An object can register to receive timer events with the `addTimerEvent()`
    function, as follows:


    `virtual IOReturn addTimerEvent(OSObject *target, TimerEvent event, AbsoluteTime
    interval);`


    The `target` argument should be a pointer to the object that will be notified
    of the timer event. The `interval` specifies the frequency of the timer event
    in units of `AbsoluteTime (nanoseconds)`. The `event` argument specifies the callback
    function. An audio driver may typically need several timer events, for example,
    to poll the status of an output connector to sense if a jack was connected.


    The following steps are typically performed by an audio driver''s `IOAudioDevice`
    subclass.


    *   Configure the hardware device''s provider and enumerate any needed resources.
    For PCI or Thunderbolt, this means mapping device memory or I/O regions. For USB
    devices, enumerate interfaces and/or pipes.

    *   Configure the device for operation. For example, take it out of reset/sleep
    mode by accessing the device''s registers or sending control requests.

    *   If your driver supports multiple audio chips or a chip with a varying number
    of DMA channels, inputs, or outputs, the driver will need to interrogate the device
    to work out its exact capabilities.

    *   Set the name and description of the audio device, which will identify it to
    Core Audio and user space applications.

    *   Based on information extracted from the device, create the appropriate number
    of `IOAudioEngine` instances, which in turn will allocate one or more `IOAudioStream`
    instances, along with associated sample buffers.


    The header file for the `MyAudioDevice` class is shown in [Listing 12-1](#Chapter12.html#list_12_1).


    ***Listing 12-1.** Header File for the MyAudioDevice Class*


    `#ifndef _MYAUDIODEVICE_H__`

    `#define _MYAUDIODEVICE_H__`


    `#include <IOKit/audio/IOAudioDevice.h>`


    `#define MyAudioDevice com_osxkernel_MyAudioDevice`


    `class MyAudioDevice : public IOAudioDevice`

    `{    `

    `    OSDeclareDefaultStructors(MyAudioDevice);`


    `    virtual bool initHardware(IOService *provider);`

    `    bool createAudioEngine();`


    `    // Control callbacks`

    `    static IOReturn volumeChangeHandler(OSObject* target, IOAudioControl *volumeControl,`

    `                                        SInt32 oldValue, SInt32 newValue);`

    `    virtual IOReturn volumeChanged(IOAudioControl *volumeControl, SInt32 oldValue,
    SInt32`

    `                                   newValue);`


    `    static IOReturn outputMuteChangeHandler(OSObject* target, IOAudioControl
    *muteControl,`

    `                                            SInt32 oldValue, SInt32 newValue);`

    `    virtual IOReturn outputMuteChanged(IOAudioControl* muteControl, SInt32 oldValue,
    SInt32`

    `                                       newValue);`


    `    static IOReturn gainChangeHandler(OSObject* target, IOAudioControl* gainControl,
    SInt32`

    `                                      oldValue, SInt32 newValue);`

    `    virtual IOReturn gainChanged(IOAudioControl* gainControl, SInt32 oldValue,
    SInt32`

    `                                 newValue);`


    `    static IOReturn inputMuteChangeHandler(OSObject* target, IOAudioControl *muteControl,`

    `                                           SInt32 oldValue, SInt32 newValue);`

    `    virtual IOReturn inputMuteChanged(IOAudioControl* muteControl, SInt32 oldValue,
    SInt32`

    `                                      newValue);`

    `};`


    `#endif`'
  trans: "\n### 实现音频驱动程序\n\n现在，我们来看看如何使用示例项目`MyAudioDevice`来实现内核音频驱动。由于这部分内容与讨论的主题相关，我们仅展示其中的摘录；不过，你可以从\
    \ Apress 网站下载`MyAudioDevice`的完整源代码来查看。为简单起见，我们将尽可能使驱动程序保持基础。由于没有标准化且广泛可用的音频硬件可供我们为其构建驱动程序，因此我们将构建一个虚拟音频驱动程序。该驱动将具有一个输出端和一个输入端，以便我们执行两种功能。驱动将作为回环设备运行，这意味着我们播放的音频会从输出缓冲区传输到输入缓冲区。我们将此作为练习留给读者您，去实现一些更有趣的功能，也许可以将其连接到一个实际的音频设备，并向其转发或从其接收音频数据，或者通过网络路由音频。\n\
    \n如果一切正常，我们应该能够使用像 iTunes 这样的应用程序播放一首歌曲，然后使用 QuickTime 播放器的录音功能捕获结果。我们无法听到播放时的音频，因为它没有路由到扬声器。此外，OS\
    \ X 的声音偏好设置一次只允许在一个设备上输出，这阻止了我们听到在其他音频输出上播放的音频。然而，一旦我们重新播放录音（在选择了除我们设备之外的输出后），我们就能听到它。加载驱动程序后，它应该会显示在“系统偏好设置”![images](img/U001.jpg)下的“声音”中，如图\
    \ 12-4 所示。\n\n![images](img/1204.jpg)\n\n**图 12-4.** 系统偏好设置中的“音频”窗格，显示`MyAudioDevice`被选为活动输出\n\
    \n该驱动将基于`IOAudioFamily`源代码发行版中名为`SampleAudioDevice`的示例驱动。如果你想了解更多关于音频驱动的知识，可以查看它的实现以及另一个示例`SamplePCIAudioDevice`。请注意，这两个示例实际上都不能正常运行；相反，它们是作为新驱动的框架或起点而存在的，这与`MyAudioDevice`不同，后者是一个可工作的音频驱动实现。\n\
    \n为了与 Core Audio 系统交互，我们的驱动需要实现一个`IOAudioDevice`实例。注意，完全不使用`IOAudioFamily`来实现音频设备驱动也是完全可能的。缺点是你需要为应用程序提供自己的\
    \ API 来访问设备。此外，现有的应用程序需要修改才能使用你的设备，因为大多数应用程序依赖于 Core Audio 或使用 Core Audio 的框架。\n\
    \n我们的驱动将使用`IOAudioFamily`。`MyAudioDevice`的架构以及它如何与`IOAudioFamily`的类交互，可以在图 12-5\
    \ 中看到。\n\n![images](img/1205.jpg)\n\n**图 12-5.** `MyAudioDevice`架构\n\n这个虚拟设备将由`IOAudioDevice`的一个子类`MyAudioDevice`组成。它接下来将分配`MyAudioEngine`类（派生自`IOAudioEngine`）的单个实例。主类还将分配多个`IOAudioControl`实例，这些实例将用于表示控制左右声道输出和输入音量的控件，以及用于静音输出和输入的控件。由于我们没有实际的硬件设备，这些控件不会执行任何操作，但为了演示目的，我们还是实现了它们。`MyAudioEngine`类将代表\
    \ I/O 引擎，代替实际的硬件。该类将分配两个`IOAudioStream`实例，一个用于输出采样缓冲区，一个用于输入采样缓冲区。当数据进入输出缓冲区时，我们只需将数据复制到输入缓冲区。\n\
    \n### 驱动程序与硬件初始化\n\n`IOAudioDevice`主要执行硬件初始化，其实现通常非常简约，因为音频驱动的大部分复杂性将作为`IOAudioEngine`的子类来实现。尽管如此，该类在内部执行一些重要任务，例如提供一个中央`IOWorkLoop`和`IOCommandGate`，这些由`IOAudioEngine`等下级类共享，并用于序列化对驱动和硬件的访问。`IOAudioDevice`类还提供了一个共享的定时器服务，可供驱动中的其他对象使用。对象可以使用`addTimerEvent()`函数注册以接收定时器事件，如下所示：\n\
    \n`virtual IOReturn addTimerEvent(OSObject *target, TimerEvent event, AbsoluteTime\
    \ interval);`\n\n`target`参数应该是一个指向将接收定时器事件通知的对象的指针。`interval`参数以`AbsoluteTime`（纳秒）为单位指定定时器事件的频率。`event`参数指定回调函数。音频驱动通常可能需要多个定时器事件，例如，用于轮询输出连接器的状态以检测插孔是否已连接。\n\
    \n音频驱动的`IOAudioDevice`子类通常执行以下步骤。\n\n* 配置硬件设备的提供者，并枚举任何所需的资源。对于 PCI 或 Thunderbolt，这意味着映射设备内存或\
    \ I/O 区域。对于 USB 设备，枚举接口和/或管道。\n* 配置设备以供操作。例如，通过访问设备的寄存器或发送控制请求，使其退出复位/睡眠模式。\n\
    * 如果你的驱动支持多个音频芯片或具有可变数量 DMA 通道、输入或输出的芯片，则驱动需要询问设备以确定其确切能力。\n* 设置音频设备的名称和描述，这将使其在\
    \ Core Audio 和用户空间应用程序中可被识别。\n* 根据从设备提取的信息，创建适当数量的`IOAudioEngine`实例，这些实例将分配一个或多个`IOAudioStream`实例以及相关的采样缓冲区。\n\
    \n`MyAudioDevice`类的头文件如代码清单 12-1 所示。\n\n**代码清单 12-1.** `MyAudioDevice`类的头文件\n\n\
    ```\n#ifndef _MYAUDIODEVICE_H__\n#define _MYAUDIODEVICE_H__\n\n#include <IOKit/audio/IOAudioDevice.h>\n\
    \n#define MyAudioDevice com_osxkernel_MyAudioDevice\n\nclass MyAudioDevice : public\
    \ IOAudioDevice\n{    \n    OSDeclareDefaultStructors(MyAudioDevice);\n\n    virtual\
    \ bool initHardware(IOService *provider);\n    bool createAudioEngine();\n\n \
    \   // 控件回调函数\n    static IOReturn volumeChangeHandler(OSObject* target, IOAudioControl\
    \ *volumeControl,\n                                        SInt32 oldValue, SInt32\
    \ newValue);\n    virtual IOReturn volumeChanged(IOAudioControl *volumeControl,\
    \ SInt32 oldValue, SInt32\n                                   newValue);\n\n \
    \   static IOReturn outputMuteChangeHandler(OSObject* target, IOAudioControl *muteControl,\n\
    \                                            SInt32 oldValue, SInt32 newValue);\n\
    \    virtual IOReturn outputMuteChanged(IOAudioControl* muteControl, SInt32 oldValue,\
    \ SInt32\n                                       newValue);\n\n    static IOReturn\
    \ gainChangeHandler(OSObject* target, IOAudioControl* gainControl, SInt32\n  \
    \                                    oldValue, SInt32 newValue);\n    virtual\
    \ IOReturn gainChanged(IOAudioControl* gainControl, SInt32 oldValue, SInt32\n\
    \                                 newValue);\n\n    static IOReturn inputMuteChangeHandler(OSObject*\
    \ target, IOAudioControl *muteControl,\n                                     \
    \      SInt32 oldValue, SInt32 newValue);\n    virtual IOReturn inputMuteChanged(IOAudioControl*\
    \ muteControl, SInt32 oldValue, SInt32\n                                     \
    \ newValue);\n};\n\n#endif\n```\n"
- fmt: "# As you may have noticed, a number of the usual I/O Kit lifecycle methods,\
    \ such as `start()` and `stop()`, are missing. This is because the super-class\
    \ `IOAudioDevice` implements them for us. The `start()` method will take care\
    \ of registering for power management and will then call the `initHardware()`\
    \ method, which a driver should implement.\n\nOur class also implements a number\
    \ of callbacks for audio controls, which we will discuss in more detail later\
    \ in this chapter. The `initHardware()` is the preferred method for performing\
    \ hardware-related initialization. Before the method returns, it should create\
    \ at least one instance of an `IOAudioEngine` and activate it, which is done by\
    \ calling the `activateAudioEngine()` method.\n\nThe `initHardware()` method of\
    \ `MyAudioDevice` is implemented as follows:\n\n```\nbool MyAudioDevice::initHardware(IOService\
    \ *provider)\n{\n    bool result = false;\n\n    IOLog(\"MyAudioDevice[%p]::initHardware(%p)\\\
    n\", this, provider);\n\n    if (!super::initHardware(provider))\n        goto\
    \ done;\n\n    setDeviceName(\"My Audio Device\");\n    setDeviceShortName(\"\
    MyAudioDevice\");\n    setManufacturerName(\"osxkernel.com\");\n\n    if (!createAudioEngine())\n\
    \        goto done;\n\n    result = true;\n\ndone:\n    return result;\n}\n```\n\
    \nSince `MyAudioDevice` is not backed by a real hardware device, there is not\
    \ much to do. We set the device name, a short name, and the manufacturer name,\
    \ which will be used by Core Audio for various purposes. The device name will\
    \ be visible in the OS X System Preferences. Strings set by an audio driver should\
    \ be localized if possible because OS X is multi-lingual. If you have a descriptive\
    \ string such as \"Headphone Output\" or \"Microphone Input,\" these may not be\
    \ meaningful to someone who doesn't speak English.\n\nThe final step of the function\
    \ is to call an internal method called `createAudioEngine()`, which will initialize\
    \ and create an instance of the `IOAudioEngine` subclass, `MyAudioEngine`. The\
    \ method simply allocates an instance and then calls `activateAudioEngine()` on\
    \ the created instance before returning. The method also creates the audio controls,\
    \ as you shall see next.\n\n![images](images/square.jpg) **Note**: Once `activateAudioEngine()`\
    \ returns, you can call `release()` on the instance if you no longer need it,\
    \ because it will be retained and released internally by the `IOAudioEngine` super\
    \ class anyway.\n\n## Registering Audio Controls\n\nAn audio device will usually\
    \ have one or more controllable attributes, such as the ability to adjust the\
    \ volume level, mute, or perform some other adjustment. In order to make these\
    \ controls visible to user space clients, an `IOAudioControl` is needed to describe\
    \ each attribute.\n\nAs previously mentioned, there are three subclasses of `IOAudioControl`\
    \ provided by `IOAudioFamily`. The first is `IOAudioLevelControl`, which is used\
    \ to control volume level. The control can also be used for creating any type\
    \ of control that allows you to select a value out of a range. Following is an\
    \ example of how to create and register a volume control for the left channel\
    \ from Apple's `SampleAudioDevice` driver.\n\n```\n    control = IOAudioLevelControl::createVolumeControl\n\
    \                  (65535,   // Initial value\n                   0,         \
    \         // min value\n                   65535,              // max value\n\
    \                  (-22 << 16) + (32768), // -22.5 in IOFixed (16.16)\n      \
    \             0,                  // max 0.0 in IOFixed\n                   kIOAudioControlChannelIDDefaultLeft,\n\
    \                   kIOAudioControlChannelNameLeft,\n                   0,   \
    \               // control ID - driver-defined\n                   kIOAudioControlUsageOutput);\n\
    \    if (!control) {\n        goto Done;\n    }\n\n    control->setValueChangeHandler(volumeChangeHandler,\
    \ this);\n    audioEngine->addDefaultAudioControl(control);\n    control->release();\n\
    ```\n\nThe volume control is created using the special factory method `createVolumeControl()`.\
    \ The three first parameters of the method represent the initial volume value,\
    \ the minimum value, and the maximum value. You may specify different values to\
    \ match your hardware's register specification or you can translate the values\
    \ in the callback to match the range expected by the hardware's volume control\
    \ register.\n\nThe two next parameters set the dB values the minimum and maximum\
    \ values correspond to. The volume scale usually goes from 0.0 dB, which represents\
    \ full volume, to some negative dB value. The volume is at its default level at\
    \ 0.0 dB and is attenuated in order to lower the volume of the signal. The dB\
    \ value is stored as a fixed-point value.\n\nThe next parameter is the channel\
    \ ID. We specify `kIOAudioControlChannelIDDefaultLeft` to indicate that this control\
    \ is for the left stereo channel. The `IOAudioFamily` specifies constant names\
    \ for other channels as well, such as `kIOAudioControlChannelIDDefaultCenter`,\
    \ `kIOAudioControlChannelIDDefaultSub`, and `kIOAudioControlChannelIDDefaultLeftRear`.\
    \ The channel definitions are declared in `IOKit/audio/AudioDefines.h`.\n\nThe\
    \ next parameter is a string with a descriptive name for the channel. As with\
    \ the channel ID, we use a predefined constant. The next parameter is an identifier\
    \ that can be used by the driver to pass a value, which will not be interpreted\
    \ by either `IOAudioFamily` or Core Audio. The last argument specifies what the\
    \ control will be used for. In our case, we set it to `kIOAudioControlUsageOutput`,\
    \ which indicates to Core Audio this is an output volume control. Other possible\
    \ values are `kIOAudioControlUsageInput`, `kIOAudioControlUsagePassThru`, or `kIOAudioControlUsageCoreAudioProperty`.\n\
    \nOnce a control is constructed successfully, you need to set the callback function,\
    \ which will be invoked when the control is manipulated from user space. This\
    \ callback must be a static member function, which can be implemented as follows:\n\
    \n```\nIOReturn SampleAudioDevice::volumeChangeHandler(IOService *target, IOAudioControl\
    \ *volumeControl, SInt32 oldValue, SInt32 newValue)\n{\n    IOReturn result =\
    \ kIOReturnBadArgument;\n    SampleAudioDevice *audioDevice;\n\n    audioDevice\
    \ = (SampleAudioDevice *)target;\n    if (audioDevice) {\n        result = audioDevice->volumeChanged(volumeControl,\
    \ oldValue, newValue);\n    }\n    return result;\n}\n```"
  raw: 'As you may have noticed, a number of the usual I/O Kit lifecycle methods,
    such as `start()` and `stop()`, are missing. This is because the super-class `IOAudioDevice`
    implements them for us. The `start()` method will take care of registering for
    power management and will then call the `initHardware() method`, which a driver
    should implement. Our class also implements a number of callbacks for audio controls,
    which we will discuss in more detail later in this chapter. The `initHardware()`
    is the preferred method for performing hardware-related initialization. Before
    the method returns, it should create at least one instance of an `IOAudioEngine`
    and activate it, which is done by calling the `activateAudioEngine()` method.
    The `initHardware()` method of `MyAudioDevice` is implemented as follows:


    `bool MyAudioDevice::initHardware(IOService *provider)`

    `{`

    `    bool result = false;`


    `    IOLog("MyAudioDevice[%p]::initHardware(%p)\n", this, provider);`


    `    if (!super::initHardware(provider))`

    `        goto done;`


    `    setDeviceName("My Audio Device");`

    `    setDeviceShortName("MyAudioDevice");`

    `    setManufacturerName("osxkernel.com");`


    `    if (!createAudioEngine())`

    `        goto done;`


    `    result = true;`


    `done:`

    `    return result;`

    `}`


    Since `MyAudioDevice` is not backed by a real hardware device, there is not much
    to do. We set the device name, a short name, and the manufacturer name, which
    will be used by Core Audio for various purposes. The device name will be visible
    in the OS X System Preferences. Strings set by an audio driver should be localized
    if possible because OS X is multi-lingual. If you have a descriptive string such
    as “Headphone Output” or “Microphone Input,” these may not be meaningful to someone
    who doesn''t speak English.


    The final step of the function is to call an internal method called `createAudioEngine()`,
    which will initialize and create an instance of the `IOAudioEngine` subclass,
    `MyAudioEngine`. The method simply allocates an instance and then calls `activateAudioEngine()`
    on the created instance before returning. The method also creates the audio controls,
    as you shall see next.


    ![images](images/square.jpg) **Note** Once `activateAudioEngine()` returns, you
    can call `release()` on the instance if you no longer need it, because it will
    be retained and released internally by the `IOAudioEngine` super class anyway.


    #### Registering Audio Controls


    An audio device will usually have one or more controllable attributes, such as
    the ability to adjust the volume level, mute, or perform some other adjustment.
    In order to make these controls visible to user space clients, an `IOAudioControl`
    is needed to describe each attribute. As previously mentioned, there are three
    subclasses of `IOAudioControl` provided by `IOAudioFamily`. The first is `IOAudioLevelControl`,
    which is used to control volume level. The control can also be used for creating
    any type of control that allows you to select a value out of a range. Following
    is an example of how to create and register a volume control for the left channel
    from Apple''s `SampleAudioDevice` driver.


    `    control = IOAudioLevelControl::createVolumeControl`

    `                  (65535,   // Initial value 0,                  // min value`

    `                   65535,                                        // max value`

    `                  (-22 << 16) + (32768),                         // -22.5 in
    IOFixed (16.16)`

    `                   0,                                            // max 0.0 in
    IOFixed`

    `                   kIOAudioControlChannelIDDefaultLeft,`

    `                   kIOAudioControlChannelNameLeft,`

    `                   0,                                           // control ID
    - driver-defined`

    `                   kIOAudioControlUsageOutput);`

    `    if (!control) {`

    `        goto Done;`

    `    }`


    `    control->setValueChangeHandler(volumeChangeHandler, this);`

    `    audioEngine->addDefaultAudioControl(control);`

    `    control->release();`


    The volume control is created using the special factory method `createVolumeControl()`.
    The three first parameters of the method represent the initial volume value, the
    minimum value, and the maximum value. You may specify different values to match
    your hardware''s register specification or you can translate the values in the
    callback to match the range expected by the hardware''s volume control register.
    The two next parameters set the dB values the minimum and maximum values correspond
    to. The volume scale usually goes from 0.0 dB, which represents full volume, to
    some negative dB value. The volume is at its default level at 0.0 dB and is attenuated
    in order to lower the volume of the signal. The dB value is stored as a fixed-point
    value. The next parameter is the channel ID. We specify `kIOAudioControlChannelIDDefaultLeft`
    to indicate that this control is for the left stereo channel. The `IOAudioFamily`
    specifies constant names for other channels as well, such as `kIOAudioControlChannelIDDefaultCenter`,
    `kIOAudioControlChannelIDDefaultSub`, and `kIOAudioControlChannelIDDefaultLeftRear`.
    The channel definitions are declared in `IOKit/audio/AudioDefines.h`.


    The next parameter is a string with a descriptive name for the channel. As with
    the channel ID, we use a predefined constant. The next parameter is an identifier
    that can be used by the driver to pass a value, which will not be interpreted
    by either `IOAudioFamily` or Core Audio. The last argument specifies what the
    control will be used for. In our case, we set it to `kIOAudioControlUsageOutput`,
    which indicates to Core Audio this is an output volume control. Other possible
    values are `kIOAudioControlUsageInput`, `kIOAudioControlUsagePassThru`, or `kIOAudioControlUsageCoreAudioProperty`.


    Once a control is constructed successfully, you need to set the callback function,
    which will be invoked when the control is manipulated from user space. This callback
    must be a static member function, which can be implemented as follows:


    `IOReturn SampleAudioDevice::volumeChangeHandler(IOService *target, IOAudioControl
    *volumeControl, SInt32 oldValue, SInt32 newValue)`

    `{`

    `    IOReturn result = kIOReturnBadArgument;`

    `    SampleAudioDevice *audioDevice;`


    `    audioDevice = (SampleAudioDevice *)target;`

    `    if (audioDevice) {`

    `        result = audioDevice->volumeChanged(volumeControl, oldValue, newValue);`

    `    }`

    `    return result;`

    `}`'
  trans: "\n# 你可能已经注意到，许多常见的 I/O Kit 生命周期方法，例如 `start()` 和 `stop()` ，都缺失了。这是因为父类 `IOAudioDevice`\
    \ 已经为我们实现了这些方法。`start()` 方法会负责注册电源管理，然后调用驱动程序应实现的 `initHardware()` 方法。\n\n我们的类还实现了一些用于音频控制的回调函数，我们将在本章后面更详细地讨论它们。`initHardware()`\
    \ 是执行硬件相关初始化的首选方法。在该方法返回之前，它应至少创建一个 `IOAudioEngine` 实例并激活它，这通过调用 `activateAudioEngine()`\
    \ 方法来完成。\n\n`MyAudioDevice` 的 `initHardware()` 方法实现如下：\n\n```\nbool MyAudioDevice::initHardware(IOService\
    \ *provider)\n{\n    bool result = false;\n\n    IOLog(\"MyAudioDevice[%p]::initHardware(%p)\\\
    n\", this, provider);\n\n    if (!super::initHardware(provider))\n        goto\
    \ done;\n\n    setDeviceName(\"My Audio Device\");\n    setDeviceShortName(\"\
    MyAudioDevice\");\n    setManufacturerName(\"osxkernel.com\");\n\n    if (!createAudioEngine())\n\
    \        goto done;\n\n    result = true;\n\ndone:\n    return result;\n}\n```\n\
    \n由于 `MyAudioDevice` 并非基于真实的硬件设备，因此需要做的工作并不多。我们设置了设备名称、简短名称以及制造商名称，Core Audio\
    \ 将出于各种目的使用这些信息。设备名称在 OS X 系统偏好设置中可见。如果可能，音频驱动程序设置的字符串应进行本地化，因为 OS X 是多语言系统。如果你有一个描述性字符串，例如“耳机输出”或“麦克风输入”，对于不懂英语的人来说可能毫无意义。\n\
    \n该函数的最后一步是调用一个名为 `createAudioEngine()` 的内部方法，该方法将初始化并创建一个 `IOAudioEngine` 子类\
    \ `MyAudioEngine` 的实例。该方法简单地分配一个实例，然后在返回前对创建的实例调用 `activateAudioEngine()` 方法。该方法还会创建音频控件，接下来你将看到这一点。\n\
    \n![images](img/square.jpg) **注意**：一旦 `activateAudioEngine()` 返回，如果你不再需要该实例，可以对其调用\
    \ `release()` 方法，因为无论如何，`IOAudioEngine` 父类内部都会保留并释放它。\n\n## 注册音频控件\n\n一个音频设备通常拥有一个或多个可控制的属性，例如调节音量大小、静音或执行其他调整的能力。为了使这些控件对用户空间客户端可见，需要有一个\
    \ `IOAudioControl` 来描述每个属性。\n\n如前所述，`IOAudioFamily` 提供了三个 `IOAudioControl` 的子类。第一个是\
    \ `IOAudioLevelControl`，用于控制音量大小。该控件也可用于创建任何允许你从一定范围内选择值的控件类型。以下是一个示例，展示了如何从 Apple\
    \ 的 `SampleAudioDevice` 驱动程序中创建并注册一个用于左声道的音量控件。\n\n```\n    control = IOAudioLevelControl::createVolumeControl\n\
    \                  (65535,   // 初始值\n                   0,                  //\
    \ 最小值\n                   65535,              // 最大值\n                  (-22 <<\
    \ 16) + (32768), // 以 IOFixed (16.16) 表示的 -22.5\n                   0,       \
    \           // 以 IOFixed 表示的最大值 0.0\n                   kIOAudioControlChannelIDDefaultLeft,\n\
    \                   kIOAudioControlChannelNameLeft,\n                   0,   \
    \               // 控件 ID - 驱动程序定义\n                   kIOAudioControlUsageOutput);\n\
    \    if (!control) {\n        goto Done;\n    }\n\n    control->setValueChangeHandler(volumeChangeHandler,\
    \ this);\n    audioEngine->addDefaultAudioControl(control);\n    control->release();\n\
    ```\n\n该音量控件是使用特殊的工厂方法 `createVolumeControl()` 创建的。该方法的三个首要参数分别代表初始音量值、最小值和最大值。你可以指定不同的值来匹配你的硬件寄存器规范，或者你可以在回调中转换这些值，以匹配硬件音量控制寄存器所预期的范围。\n\
    \n接下来的两个参数分别设置了最小值和最大值所对应的分贝（dB）值。音量范围通常从代表最大音量的 0.0 dB 到某个负的分贝值。音量在 0.0 dB 时处于默认水平，通过衰减来降低信号音量。分贝值存储为定点值。\n\
    \n下一个参数是声道 ID。我们指定 `kIOAudioControlChannelIDDefaultLeft` 以表明此控件用于左立体声道。对于其他声道，`IOAudioFamily`\
    \ 也指定了常量名称，例如 `kIOAudioControlChannelIDDefaultCenter`、`kIOAudioControlChannelIDDefaultSub`\
    \ 和 `kIOAudioControlChannelIDDefaultLeftRear`。这些声道定义声明在 `IOKit/audio/AudioDefines.h`\
    \ 中。\n\n下一个参数是一个字符串，是声道的描述性名称。与声道 ID 一样，我们使用了一个预定义的常量。再下一个参数是一个标识符，驱动程序可用它来传递一个值，`IOAudioFamily`\
    \ 或 Core Audio 都不会解释该值。最后一个参数指定了该控件的用途。在我们的例子中，我们将其设置为 `kIOAudioControlUsageOutput`，这向\
    \ Core Audio 表明这是一个输出音量控件。其他可能的值有 `kIOAudioControlUsageInput`、`kIOAudioControlUsagePassThru`\
    \ 或 `kIOAudioControlUsageCoreAudioProperty`。\n\n一旦成功构建了一个控件，你需要设置回调函数，当该控件被用户空间操作时，此函数将被调用。这个回调函数必须是一个静态成员函数，其实现方式如下：\n\
    \n```\nIOReturn SampleAudioDevice::volumeChangeHandler(IOService *target, IOAudioControl\
    \ *volumeControl, SInt32 oldValue, SInt32 newValue)\n{\n    IOReturn result =\
    \ kIOReturnBadArgument;\n    SampleAudioDevice *audioDevice;\n\n    audioDevice\
    \ = (SampleAudioDevice *)target;\n    if (audioDevice) {\n        result = audioDevice->volumeChanged(volumeControl,\
    \ oldValue, newValue);\n    }\n    return result;\n}\n```\n"
