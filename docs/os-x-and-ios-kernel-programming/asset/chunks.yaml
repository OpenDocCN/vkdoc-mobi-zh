    The following methods are used by an application to examine and set the device
    configuration, and to iterate the device''s interfaces. These methods are usually
    called by an application to initialize the USB device when it is first detected:


    *   `GetConfigurationDescriptionPtr`: Returns a pointer to the descriptor for
    the specified configuration; note that although the caller receives a pointer
    to an `IOUSBConfigurationDescriptorPtr` structure, the buffer is owned by the
    `IOUSBDeviceInterface` object and should not be released by the caller.

    *   `GetConfiguration`: Returns the active configuration number of the device.
    Note that this is not the index of the configuration, but rather the value of
    `bConfigurationValue` from the active configuration description.

    *   `SetConfiguration`: Sets the active configuration of the device. The configuration
    is specified by passing the `bConfigurationValue` from the desired configuration
    description.

    *   `CreateInterfaceIterator`: Creates an iterator over the device''s interfaces.
    Like its kernel equivalent, the caller provides an `IOUSBFindInterfaceRequest`
    structure that specifies the properties that returned interfaces must match.


    Having examined the functionality provided by the `IOUSBDeviceInterface` class,
    we are now in a position to consider the steps an application will typically take
    to initialize a new USB device that has been attached to the system. A sample
    initialization function is given in [Listing 15-5](#Chapter15.html#list_15_5).


