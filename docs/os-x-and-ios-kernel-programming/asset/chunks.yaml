- fmt: '# Audio Device and Driver Concepts


    An audio device and driver usually revolve around the concept of a sample buffer.
    The sample buffer usually contains interleaved PCM samples (assuming there is
    more than one channel). The sample buffer is a circular buffer allocated by the
    driver. For audio playback, the hardware device usually continuously reads the
    buffer. The device will access the memory of the buffer directly via direct memory
    access (DMA) without involving the CPU and issue an interrupt at some fixed interval
    to let the driver know the current location the device is reading from. This is
    necessary so that whatever is producing the audio data can write to the correct
    location without interfering with the device. After a period has elapsed, we know
    that a certain number of samples have been played by the device. In this case,
    it is common for the driver to erase the played samples. This ensures that silence
    will be outputted rather than repeating previous data should the buffer wrap around
    to the start without any new audio being inserted into the buffer. In the case
    of audio input, the process is simply reversed. Instead of reading from the buffer,
    the device will be writing audio samples into the sample buffer. It will also
    issue an interrupt, letting you know when/where audio samples can be read.


    Some audio devices may have multiple independent inputs and outputs. In this case,
    each input and output may have its own sample buffer. Mac OS X comes with a USB
    audio device driver so no third party driver is generally needed for devices that
    conform to the USB audio interface.


    ## Core Audio


    Core Audio is an umbrella term used to describe the collective audio support under
    Mac OS X and iOS. This support consists of a number of frameworks, including the
    `CoreAudio.Framework` itself. The audio architecture is shown in [Figure 12-2](#Chapter12.html#fig_12_2).


    ![images](images/1202.jpg)


    ***Figure 12-2.** Mac OS X and iOS audio architecture*


    The core of the architecture is implemented in the Audio HAL (hardware abstraction
    layer), which acts as an intermediary between the frameworks, applications, and
    the audio hardware and driver. The current architecture exists to address a number
    of limitations with the previous audio architecture found in Mac OS 9\. In OS
    9, an application using an audio device wrote directly into the driver''s double-buffered
    sample buffer. As a consequence, OS 9 could only handle audio output from a single
    application at a time. Furthermore, because of the direct access, the application
    had to write audio in a format supported by the audio device, which limited it
    to only support mono or stereo 16-bit PCM samples.


    Under OS X and iOS, this limitation is removed. Instead of having an application
    talk directly to the driver, it instead interfaces with the Audio HAL. Core Audio
    takes care of combining audio from multiple applications and threads into a single
    buffer. Each application is free to choose any audio format supported by the HAL.
    The HAL will convert the audio buffer into 32-bit floating-point samples before
    handing the buffer to the driver. The driver is then responsible for converting
    the buffer from floating-point format to the native format supported by the audio
    hardware. The same is also the case for audio input. The driver is expected to
    convert incoming audio into 32-bit floating samples before the audio can be transferred
    back to the HAL. 32-bit floating-point format is used as it has a very high dynamic
    range, which ensures that precision will not be lost during conversion to or from
    another format.


    While the Core Audio framework itself provides low-level access to audio drivers,
    Core Audio as the collective audio architecture provides numerous other frameworks
    built on top of it, such as follows:


    *   *Audio Toolbox* framework provides a diverse set of APIs for tasks such as
    audio clock synchronization, reading and writing of audio files, APIs for music
    playback, Audio conversion API, Audio graph API, and much more.

    *   *Audio Units* framework provides support for writing filters, such as equalizers
    and band-pass filters.

    *   *Core Audio Kit* framework allows the creation of Cocoa GUIs for Audio Units.

    *   *Core MIDI / MIDI Server* framework contains APIs for working MIDI.

    *   *OpenAL* is the Mac OS X implementation of the Open Audio Library.


    ## I/O Kit Audio Support


    The `IOAudioFamily` handles audio in the kernel and facilitates the creation of
    drivers for audio hardware. The responsibility of an audio driver is conceptually
    very simple; it merely transfers data to and from the hardware on behalf of clients
    (much like any hardware driver). It is also responsible for performing actions
    like muting, controlling the volume, or other configurable attributes. Core Audio
    uses 32-bit floating-point format as its native audio format and because not all
    devices will support this, a driver must handle conversion to and from a format
    the hardware is able to handle. [Figure 12-3](#Chapter12.html#fig_12_3) shows
    the hierarchy of classes that make up the `IOAudioFamily`.


    ![images](images/1203.jpg)


    ***Figure 12-3.** IOAudioFamily classes*


    Let''s have a look at the role of each class in the family.


    *   The `IOAudioDevice` class serves as a central coordination point for an audio
    driver. It is responsible for attaching to a hardware provider and configuring
    and initializing the hardware. The class itself is not usually directly involved
    in the I/O of audio, which instead is the role of `IOAudioEngine`. The `IOAudioDevice`
    class also centralizes timing and synchronization services.

    *   The `IOAudioEngine` represents the DMA or I/O engine of an audio driver. Because
    an audio device can have many inputs and outputs that operate independently, it
    makes sense to encapsulate their behavior into their own class. If you look at
    the I/O Registry entries for the Apple built-in audio device on a Mac Pro, you
    will see the Apple audio driver has five instances of `IOAudioEngine` representing
    Line input, S/PDIF optical input, Headphone output, Line output, and S/PDIF optical
    output. An `IOAudioEngine` must allocate at least one `IOAudioStream`. The `IOAudioEngine`
    is an abstract class.

    *   The `IOAudioStream` represents a sample buffer. A sample buffer has a direction
    associated with it, which can be either input or output. It also has metadata
    that describes the formats it is capable of supporting, such as the numeric format
    of the contained samples, the sample rate, and the number of channels supported.
    The class is not abstract and can be instantiated directly. The class does not
    allocate memory for the sample buffer itself. It has to be told the location of
    the buffer. It is responsible for exposing the sample buffer to user space consumers.
    The audio stream also maintains an internal mix buffer where audio from multiple
    sources is mixed together into a single stream.

    *   The `IOAudioControl` class represents a tunable parameter of the device, such
    as the input volume, output volume, and mute. The `IOAudioControl` class is directly
    usable, but you can also subclass it yourself to create custom controls. Three
    subclasses of `IOAudioControl` exist, `IOAudioLevelControl`, `IOAudioSelectorControl`,
    and `IOAudioToggleControl`. A control may belong to the device itself, the engine,
    or an `IOAudioPort`.

    *   `IOAudioPort` can be used to represent a logical or physical port, such as
    Line out or Headphone out. The use of this class is not required for an audio
    driver.

    *   The Core Audio framework communicates with an `IOAudioEngine` through the
    `IOAudioEngineUserClient`, which allows it to interact with the engine''s sample
    buffers for the purpose of playing back or capturing audio.

    *   The `IOAudioControlUserClient` serves as a user client for `IOAudioControl`
    instances and allows manipulation. This is how an application, such as *System
    Preferences*, can control volume or mute.'
