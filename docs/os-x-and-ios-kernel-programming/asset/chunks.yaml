    you will be presented with a dialog similar to that displayed in [Figure 14-4](#Chapter14.html#fig_14_4).
    This does not indicate a problem with the device, but it does indicate that Mac
    OS X was unable to find a readable file system on the disk. Given that the disk
    has yet to be written to, this is an expected error.


    ![images](images/1404.jpg)


