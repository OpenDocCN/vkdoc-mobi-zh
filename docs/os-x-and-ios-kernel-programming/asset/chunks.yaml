- fmt: '以下内容描述了一个`IOBlockStorageDevice`子类需要实现的方法，这些方法按功能分组排序。


    首先介绍的方法会向用户返回设备的人类可读描述。这些字符串用于帮助用户识别与已挂载卷对应的存储设备。如果存储介质尚未格式化，则不会有卷与设备关联，这些标识字符串将是用户确保他们即将格式化的设备正是他们认为的设备的唯一手段。因此，这些字符串应返回描述性名称，例如，标识USB闪存盘的制造商，或提供连接接口的描述（如“USB
    to SATA适配器”），以便用户轻松识别设备。这些字符串会出现在诸如“磁盘工具”等实用程序以及“系统信息”生成的系统配置文件中。


    *   `getVendorString`：返回存储设备的制造商名称。

    *   `getProductString`：返回产品型号的描述性名称。

    *   `getRevisionString`：返回一个字符串，其解释可由驱动程序开发者决定。这可用于标识存储设备上运行的固件版本，或提供产品设计的标识。由于该值是字符串，因此也可以同时包含这两种值。

    *   `getAdditionalDeviceInfoString`：当前未被I/O Kit实现使用，但可由专有的磁盘实用程序软件从驱动程序中查询。


    以下方法被调用以查询存储设备的能力：


    *   `reportRemovability`和`reportEjectability`：两者都返回类似的信息。如果介质可以在驱动程序存在的情况下插入和移除，则该设备被视为可移动。这意味着I/O
    Kit可能会定期轮询传输驱动程序以确定当前是否存在磁盘。此外，如果一个可移动设备可以通过软件控制（如CD驱动器）移除，则它被认为是可弹出的。如果设备不可弹出，用户仍然可以通过“访达”或“磁盘工具”执行“弹出”操作，尽管macOS会卸载文件系统，但不会弹出介质。

    *   `reportLockability`：被调用来确定可移动驱动器中的介质是否可以被“锁定”以防止用户移除。锁定设备的例子是，一个前面板上有弹出按钮的CD驱动器，当CD被挂载时可以禁用（锁定）该按钮。

    *   `reportPollRequirements`：被调用来确定驱动程序是否需要被定期调用以检查介质是否已插入或移除，而不是驱动程序本身能够在介质到达时生成通知。如果设备需要轮询，驱动程序可以通过`reportPollRequirements`方法返回一个额外的标志，以指示轮询是否开销较大，例如，仅能通过旋转设备来检测介质。I/O
    Kit只会轮询那些轮询开销不大的设备。

    *   `reportMediaState`：被调用来确定设备中是否存在介质。此方法在存储驱动程序堆栈创建时被调用一次，以读取硬件的初始状态，此后仅在驱动程序指示需要轮询来确定介质存在时才会被调用。


    以下方法被调用以查询当前介质的能力。每当检测到新介质时，都会调用这些方法。


    *   `reportBlockSize`：应返回设备磁盘扇区（或块）的字节大小。用户空间进程可以通过`ioctl`命令`DKIOCGETBLOCKSIZE`访问此值。

    *   `reportMaxValidBlock`：返回设备的容量，用设备最后一个块的地址表示。由于磁盘块从0开始索引，因此最大有效块比设备的总块数少1。

    *   `reportWriteProtection`：被调用来确定介质是否可以写入，或者是否受到写保护。如果受到写保护，它将被挂载为只读卷。用户空间进程可以通过`ioctl`命令`DKIOCISWRITABLE`访问此值。


    以下方法执行介质的低级格式化。并非所有设备都支持低级格式化。尽管这些方法必须在`IOBlockStorageDevice`接口的实现中存在，但如果未提供该功能，则可返回错误。


    *   `doGetFormatCapacities`：被调用来获取一个列表，其中包含介质可以格式化成的每种大小（以字节为单位）。用于保存此方法结果的存储空间由调用者提供，该方法返回实际写入列表的项目数。如果调用者希望确定实现支持的格式数量而不接收实际列表，则可以将`NULL`指针传递给列表存储。用户空间进程可以通过`ioctl`命令`DKIOCGETFORMATCAPACITIES`请求此列表。

    *   `doFormatMedia`：被调用来执行设备的低级格式化。如果未实现此功能，该方法可以自由返回一个错误，例如`kIOReturnUnsupported`。用户空间进程可以通过发送`ioctl`命令`DKIOCFORMAT`来执行此操作。

    *   `doDiscard`方法被调用不是为了格式化整个磁盘，而是为了擦除那些不再存储文件系统所需数据的块。对于固态磁盘，此方法提供了一个机会，可以为被丢弃的块发出TRIM命令。用户空间进程可以通过发送`ioctl`命令`DKIOCDISCARD`来执行此操作。此方法在Mac
    OS X 10.6的后续版本中已被弃用，并被`doUnmap`方法取代。

    *   `doUnmap`方法引入作为`doDiscard`方法的替代。它执行类似的功能，即释放文件系统未使用的磁盘块。与`doDiscard`方法（仅能释放单个物理连续的磁盘块区间）不同，`doUnmap`方法接收一个数组，其中包含一个或多个不再使用的磁盘块范围。用户空间进程可以通过发送`ioctl`命令`DKIOCUNMAP`来执行此操作。


    以下方法允许通过软件控制介质弹出：


    *   `doLockUnlockMedia`：被调用来防止用户弹出介质，例如禁用CD驱动器前面的弹出按钮。该方法接收一个布尔参数，该参数决定驱动程序应锁定设备中的介质（阻止用户弹出）还是解锁介质（允许用户弹出）。

