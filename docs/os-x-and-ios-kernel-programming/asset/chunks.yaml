    `...`

    `130       0  0xffffff7f810ce000   0x51000     0x51000   com.apple.filesystems.afpfs
    (9.8) <129 7 6 5 4 3 1>`

    **`144       0  0xffffff7f807b8000   0x2000      0x2000    com.osxkernel.HelloWorld
    (1) <4>`**


    Finally, we will unload the “Hello World” extension, which will result in the
    `HelloWorld_stop()` function being called and the kernel extension being unloaded
    from the kernel. This can be accomplished with the following command:


    `sudo kextunload HelloWorld.kext`


    ##### Using Console to View Output


    The resulting output from calling `printf()` in the kernel is written to a log
    file on disk. This log takes the format of a plain text file that allows it to
    be examined with the standard Unix commands `tail` and `cat`, passing the path
    to the logfile /var/log/kernel.log. Alternatively, the contents of the log can
    be inspected with an application included with Mac OS X named “Console,” which
    can be found in the /Applications/Utilities directory. The Console application
    consolidates logs from a wide range of system services and applications, including
    the kernel logfile. A screenshot of the output from our tutorial viewed through
    Console is shown in [Figure 3-5](#Chapter03.html#fig_3_5).


    ![images](images/0305.jpg)


    ***Figure 3-5.** The output from a successful load and unload of our kernel extension,
    as shown in the Console utility*


    Although it may seem primitive if you are accustomed to source level debuggers
    from user-space development, being able to print debug output to the console remains
    one of the fundamental debug techniques for kernel code. You can find more information
    on debugging in [Chapter 16](#Chapter16.html#ch16).


    #### Summary


    Kernel extensions for Mac OS X are developed using the tools contained within
    the Xcode package provided by Apple. In this chapter, we created a tutorial “Hello
    World” kernel extension, showed how to import symbols from other kernel libraries,
    and introduced the command line utilities commonly used to load and work with
    kernel extensions.


    ## C H A P T E R  4


    ## The I/O Kit Framework


    Device drivers for Mac OS X are written using a framework known as the I/O Kit.
    The I/O Kit consists of header files and libraries that provide the services required
    by drivers, as well as header files and libraries that are used by user space
    code to locate a kernel driver and interact with it. There are two main parts
    of the I/O Kit:


    *   Kernel.framework

    *   IOKit.framework


    Although it is slightly counterintuitive, the I/O Kit framework is designed for
    user space applications and not for developing I/O Kit drivers in the kernel.
    Instead, the Kernel framework contains the header files used for kernel space
    driver development. If you examine the contents of the Kernel framework, you will
    see that it contains a directory named IOKit that consists of the header files
    used for kernel space driver development. Another important directory in the Kernel
    framework is named libkern, which contains the foundation classes and types on
    which the kernel I/O Kit framework is built.


    The user space I/O Kit framework serves two purposes. It provides user applications
    with functions for determining the hardware devices present on the machine on
    which it is running, functions for locating the appropriate driver for a particular
    hardware device, and functions for sending control requests and request statuses
    from that driver. These topics are further discussed in [Chapter 5](#Chapter05.html#ch5).
    In addition, the user I/O Kit framework provides the user space application the
    ability to communicate with certain hardware devices directly, removing the need
    for a kernel driver. This is possible for a select range of devices, most notably
    USB and FireWire devices that do not need to be shared between multiple running
    applications. We discuss this aspect of the I/O Kit in [Chapter 15](#Chapter15.html#ch15).'
