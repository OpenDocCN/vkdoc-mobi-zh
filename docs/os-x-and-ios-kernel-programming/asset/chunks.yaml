    ## 关于作者


    ![image](img/square.jpg) **奥勒·亨利·哈弗森** 目前是一家领先专业视频设备制造商的资深软件工程师，负责为 Mac、Linux
    和 PC 平台的高端高清视频硬件开发驱动与软件。他曾是首批为 USB 3.0 和雷雳接口创造视频硬件设备的团队成员之一。他拥有澳大利亚莫纳什大学网络计算学士学位和信息技术硕士学位。此前，他曾在硅谷图形公司担任研发工程师，负责为超级计算和高性能计算领域的
    NAS 和 SAN 存储技术与解决方案。


    在不陪伴家人的时候，他喜欢为内核、iOS、Linux 和 Web 进行编程，也热爱阅读、观影、玩游戏和健身。


    ![image](img/square.jpg) **道格拉斯·克拉克** 从事 Macintosh 专业开发已有 15 年。他的职业生涯大部分时间都专注于硬件开发和设备驱动编写，曾为
    Mac OS 9、Mac OS X 和 Windows 编写驱动程序。他首次接触 I/O Kit 是在 Mac OS X 最初发布前一年，并从此持续使用它。他目前致力于开发支持实时视频应用的驱动程序。他毕业于澳大利亚莫纳什大学，获计算机科学学位。


    ## 关于技术审校


    ![image](img/square.jpg) **菲尔·乔丹** 毕业于英国约克大学，获得物理学与计算机模拟方向的物理学硕士学位。之后他加入 Kuju
    London 的核心技术团队，为任天堂 Wii 平台的《战场：太平洋战役 2》扩展和优化内部引擎与工具。移居维也纳后，他创办了自己的软件开发承包公司，从事游戏与引擎编程，以及移动端、网页端和定制商业应用的开发。


    凭借与游戏主机硬件密切合作的经验，他为 Mac OS X 和 Linux 编写了开源内核驱动程序。目前他正致力于开发一款能够充分发挥固态硬盘性能的内核驱动程序。


    ![image](img/square.jpg) **格雷厄姆·李** 自称“安全专家”，专攻 Mac 及智能手机和平板平台的安全领域。他曾为 Mac 编写防病毒和磁盘加密软件，并担任过多款
    Cocoa 和 Cocoa Touch 应用的顾问或承包商。格雷厄姆还就苹果相关安全问题发表演讲和撰写文章。他维护着一个博客，网址为 [`http://blog.securemacprogramming.com`](http://blog.securemacprogramming.com)。他居住在英国牛津，闲暇时会思索自己的空余时间究竟去哪儿了。


    ## 引言


    内核开发是一项艰巨的任务，与传统用户应用程序的编程截然不同。内核环境更加多变和复杂。必须格外小心，确保内核代码没有错误，因为任何问题都可能对系统的稳定性、安全性和性能造成严重后果。本书涵盖了开始进行内核编程所需的基础知识。我们从理论和实践两个角度探讨内核开发，涵盖虚拟内存、同步等内核开发的基本概念，以及更偏实践的知识。本书主要聚焦于
    Mac OS X，不过 XNU 内核同样被 iOS 使用，因此书中的理论知识也适用于 iOS。到目前为止，在内核执行环境中进行开发最常见的原因是实现一个用于控制内部或外部硬件设备的驱动程序。正因如此，本书的很大一部分内容都集中在设备驱动程序的开发上。XNU
    内核中用于设备驱动程序开发的主要框架是 I/O Kit，我们将对其进行深入探讨。由于理论内容容易让人感到乏味，我们提供了可运行的代码示例，供你学习研究，或作为开发自己驱动程序的起点。


    希望你能像我们享受编写过程一样，愉快地阅读本书。


    ### 本书面向的读者？


    本书面向所有对苹果 iOS 和 Mac OS X 操作系统感兴趣的人，重点关注实际的内核开发，尤其是驱动开发。无论你是爱好者、学生还是专业工程师，我们都希望为你提供有价值的材料。虽然重点是内核编程与开发，但我们也涉及操作系统的许多理论层面，并提供
    OS X 和 iOS 内核环境的详细概述。本书旨在提供开始开发内核扩展和驱动程序所需的知识。我们将特别侧重于用于编写设备驱动程序和扩展的 I/O Kit 框架，同时也会介绍一些通用知识，让你更深入地理解
    I/O Kit 如何与操作系统交互。如果你主要对开发 OS X 或 iOS 用户应用程序感兴趣，本书可能不适合你。我们不会介绍 Cocoa 或任何其他用于开发最终用户应用程序的框架。本书涵盖的是在苹果
    OS X 和 iOS 平台上进行驱动程序和内核扩展开发这类内核编程主题。


    具备一些操作系统内部原理的知识将有助于理解本书中讨论的概念。完成一门计算机科学或工程学的入门课程会是一个有益的起点。此外，要理解书中的示例，至少需要掌握一门编程语言。由于我们重点介绍的
    I/O Kit 是用 C++ 的一个子集——嵌入式 C++ 编写的，因此拥有一些 C++（或至少是 C 语言）的经验将极大地帮助你充分利用本书。本书不涉及通用的编程主题或理论。我们只会简要介绍一些
    OS 理论的基本概念，为后续讨论提供语境。

