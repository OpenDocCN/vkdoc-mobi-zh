  trans: '

    #### BSD 系统中的内存分配


    BSD 子系统中的内存分配由以下函数和宏实现：


    `#define MALLOC(space, cast, size, type, flags) (space) = (cast)_MALLOC(size,
    type, flags)`

    `#define FREE(addr, type) _FREE((void *)addr, type)`

    `#define MALLOC_ZONE(space, cast, size, type, flags) (space) = (cast)_MALLOC_ZONE(size,
    type, flags)`

    `#define FREE_ZONE(addr, size, type) _FREE_ZONE((void *)addr, size, type)`


    `void* _MALLOC(size_t size, int type, int flags);`

    `void _FREE(void *addr, int type);`

    `void* _MALLOC_ZONE(size_t size, int type, int flags);`

    `void _FREE_ZONE(void *elem, size_t size, int type);`


    在底层，`_MALLOC()` 函数根据传入的标志使用 `kalloc()` 的某个变体来分配内存；例如，如果需要非阻塞分配，则会调用 `kalloc_noblock()`
    (`M_NOWAIT`)。`_MALLOC_ZONE()` 函数则直接调用区域分配器，而不是通过 `kalloc()` 间接调用。它允许你访问常用对象类型的区域，例如文件描述符、网络套接字或网络子系统使用的
    `mbuf` 描述符，而不是使用通用的 `kalloc.X` 区域。`type` 参数用于确定访问哪个区域。尽管 `_MALLOC()` 也接受 `type`
    参数，但除了检查该值是否小于允许的最大值外，该参数会被忽略。已定义了一百多种不同的类型。`flags` 参数可以是以下值之一：


    `#define M_WAITOK 0x0000`

    `#define M_NOWAIT 0x0001`

    `#define M_ZERO 0x0004 /* bzero the allocation */`


    ![images](img/square.jpg) **提示** `MALLOC` 函数族以及区域类型定义在 `sys/malloc.h` 中。


    如果指定了 `M_ZERO` 标志，则在将内存返回给调用者之前，会使用 `bzero()` 函数将内存清零。否则，内存中可能仍保留着上一个使用者写入的内容，或者如果从未使用过，则可能包含随机的垃圾数据。


    #### I/O Kit 内存分配


    I/O Kit 提供了一套完整的内存分配函数。以下所有函数都返回内核虚拟地址，可以直接访问：


    `void* IOMalloc(vm_size_t size);`

    `void* IOMallocAligned(vm_size_t size, vm_size_t alignment);`

    `void* IOMallocPageable(vm_size_t size, vm_size_t alignment);`


    对应的释放内存函数如下：


    `void IOFree(void* address, vm_size_t size);`

    `void IOFreeAligned(vm_size_t size);`

    `void IOFreePageable(void* address, vm_size_t size);`


    第一个函数 `IOMalloc()` 是 `kalloc()` 的一个封装，并受同样的限制。具体来说，它不能在原子上下文中使用（例如主中断处理程序），因为它可能会阻塞（休眠）以获取内存。如果需要对齐的内存，也不能使用
    `IOMalloc()`，因为它不提供任何保证。`IOFree()` 是 `kfree()` 函数的封装，也可能会阻塞（休眠）。如果在持有简单锁（例如 `OSSpinLock`）时调用
    `IOMalloc()` 或 `IOFree()`，也可能导致系统死锁，因为这两个函数休眠时线程可能会被抢占。如果中断处理程序试图获取同一个锁，就可能导致死锁。此外，`IOMalloc()`
    分配的内存旨在用于小型快速分配，不适合映射到用户空间。因为 `IOMalloc()` 预留的内存来自一个较小的固定大小池，过度使用 `IOMalloc()`
    可能会耗尽该池，如果池被耗尽，则会导致内核恐慌。


    ![images](img/square.jpg) **警告** 使用例如 `IOFree()` 释放由 `IOMallocAligned()` 分配的内存是错误的。请始终使用与原始分配函数对应的释放函数。即使现在能正常工作（偶然情况下），该机制也可能在未来的更新中发生变化并导致崩溃。


    `IOMallocAligned()` 受到与 `IOMalloc()` 相同的限制，但与 `IOMalloc()` 不同的是，它会返回对齐到特定值的内存地址。例如，如果你需要页对齐的内存，可以传入
    4096 以获取对齐到页起始位置的地址。以下是请求对齐内存的一些原因：


    -   硬件无法访问未对齐到特定边界的内存，或者访问速度很慢。

    -   用于向量计算的内存，如果地址未对齐到特定字节边界（SSE 通常为 16 字节），速度可能会过慢。

    -   将用于映射到用户空间进程的内存。由于映射仅对整个页面可行，你可能希望确保缓冲区从页边界开始。

    -   你希望数据结构对 CPU 缓存友好。


    `IOMallocPageable()` 分配可分页的内存，而其他变体分配的内存总是被固定且无法换出。适用于 `IOMalloc()` 和 `IOMallocAligned()`
    的限制也同样适用于 `IOMallocPageable()`。通过它获得的内存不能用于设备 I/O（如 DMA），也不能用于无法阻塞/休眠的代码路径，除非先将其固定。


    还有最后一个变体 `IOMallocContiguous()`，它分配物理上连续的内存。该函数现已弃用。苹果建议使用 `IOBufferMemoryDescriptor`
    作为替代。


    每个内存分配函数都有一个对应的释放内存函数。务必调用与分配内存时所用函数匹配的正确释放函数。每个变体的内存来源不同，来自不同的底层机制，因此它们不可互换。实际上，`IOMalloc()`
    可能从不止一个来源获取内存。较大的分配（>8 KB）可能通过 `kmem_alloc()` 分配；但是，较小的分配则来自*区域分配器*。


    这恰好解释了为什么必须将原始分配的大小传递给 `IOFree*()` 函数，因为它用于确定内存来自何处。


    #### 使用 C++ new 运算符分配内存


    libkern 库实现了一个基本的 C++ 运行时环境，I/O Kit 构建于此之上。在 C++ 中，内存分配通常分别使用 `new` 和 `new[]`
    运算符来分配单个对象和数组。在 libkern 中，`new` 运算符内部通过调用 `kalloc()` 来获取内存实现。由于 `kfree()` 需要原始分配的大小，libkern
    会修改传递给 `new` 运算符的大小，为能够保存分配大小的一个小结构腾出空间，这样当 `delete` 运算符调用 `kfree()` 时，它可以在 `new`
    返回地址之前的四个字节中检索到这个大小。


    由 `new` 或 `new[]` 分配的内存总是被清零，这与用户空间中这些运算符的大多数实现不同。


    ![images](img/square.jpg) **提示** `new`、`new[]`、`delete`、`delete[]` 运算符的实现可以在 XNU
    源码分发的 `libkern/c++/OSRuntime.cpp` 中找到。

