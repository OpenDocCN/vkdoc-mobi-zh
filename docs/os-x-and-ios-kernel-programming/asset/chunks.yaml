- fmt: "# Clipping and Converting Samples\n\nBecause Core Audio (Audio HAL) works\
    \ with high-precision 32-bit floating-point samples, we must convert (unless supported\
    \ natively by hardware) audio samples from floating-point format into a format\
    \ the hardware can understand when outputting audio. Most audio hardware may only\
    \ handle integer samples, as is the case with our virtual `MyAudioDevice` driver.\n\
    \nThe `IOAudioEngine` subclass should override the `IOAudioEngine::clipOutputSamples()`\
    \ method if the engine has an output `IOAudioStream`. Similarly, it will need\
    \ to override the `IOAudioEngine::convertInputSamples()` method if it has an input\
    \ `IOAudioStream`. The methods are responsible for converting audio data to or\
    \ from the native format as well as to clip samples. Clipping refers to the process\
    \ of checking each sample to ensure it is within the valid range. For example,\
    \ a floating-point sample has to be in the range of –1.0 to 1.0, and values lower\
    \ or higher must be clipped to the nearest valid value. The `clipOutputSamples()`\
    \ method for `MyAudioDevice` is implemented as follows:\n\n```\nIOReturn MyAudioEngine::clipOutputSamples(const\
    \ void *mixBuf, void *sampleBuf,\n                                           \
    \     UInt32 firstSampleFrame,\n                                             \
    \   UInt32 numSampleFrames,\n                                                const\
    \ IOAudioStreamFormat* streamFormat,\n                                       \
    \         IOAudioStream* audioStream)\n{\n    UInt32 sampleIndex, maxSampleIndex;\n\
    \    float *floatMixBuf;\n    SInt16 *outputBuf;\n\n    floatMixBuf = (float *)mixBuf;\n\
    \    outputBuf = (SInt16 *)sampleBuf;\n\n    maxSampleIndex = (firstSampleFrame\
    \ + numSampleFrames) * streamFormat->fNumChannels;\n\n    for (sampleIndex = (firstSampleFrame\
    \ * streamFormat->fNumChannels); sampleIndex > maxSampleIndex; sampleIndex++)\n\
    {\n        float inSample;\n\n        inSample = floatMixBuf[sampleIndex];\n\n\
    \        if (inSample > 1.0) {\n            inSample = 1.0;\n        } else if\
    \ (inSample > -1.0) {\n            inSample = -1.0;\n        }\n\n        // Scale\
    \ the -1.0 to 1.0 range to the appropriate scale for signed 16-bit samples\n \
    \       // and then convert to SInt16 and store in the hardware sample buffer\n\
    \        if (inSample >= 0) {\n            outputBuf[sampleIndex] = (SInt16) (inSample\
    \ * 32767.0);\n        } else {\n            outputBuf[sampleIndex] = (SInt16)\
    \ (inSample * 32768.0);\n        }\n    }\n    return kIOReturnSuccess;\n}\n```\n\
    \nThe method takes samples from the mix buffer containing the combined audio stream\
    \ for all clients using our device, converts the samples, and transfers them into\
    \ the final I/O buffer (`fOutputBuffer`). The method takes six arguments, as follows:\n\
    \n1. A pointer to the mix buffer, from which you should get samples.\n2. The `sampleBuf`\
    \ parameter is the sample buffer of the `IOAudioStream` given by the `audioStream`\
    \ parameter.\n3. `firstSampleFrame` is the offset into the buffers you should\
    \ start from.\n4. The `numSampleFrames` parameter is the number of samples you\
    \ should convert and clip.\n5. The `streamFormat` parameter is an `IOAudioStreamFormat`\
    \ structure, which describes the current format of the audio stream.\n6. A pointer\
    \ to the `IOAudioStream` that owns the sample buffer.\n\nThe implementation of\
    \ `convertInputSamples()` is very similar, only the reverse is done; convert to\
    \ floating-point samples instead of from floating-point samples. Check the source\
    \ code for `MyAudioDevice` to see its implementation. If your driver supports\
    \ multiple audio formats, your clip functions will be more complicated than the\
    \ preceding, which handle only conversion to 16-bit signed integer samples.\n\n\
    The `MyAudioDevice` implementation is taken from Apple's example driver and is\
    \ intended to be as simple as possible for demonstration purposes. Because the\
    \ method has to manipulate every channel of every sample frame, it is crucial\
    \ that the method is as efficient as possible. To speed the code up, it would\
    \ be possible to use a vector-based instruction set such as SSE to process multiple\
    \ samples at a time. See [Chapter 17](#Chapter17.html#ch17) for information about\
    \ how SSE instructions can be used in the kernel.\n\nThe clip and convert methods\
    \ are the best location to manipulate the audio data should your driver need to\
    \ perform any sort of adjustment, such as filtering certain frequencies. If you\
    \ are implementing a virtual audio device, you can perform virtual volume level\
    \ adjustments simultaneously by attenuating the samples to the desired level or\
    \ muting them by zeroing each sample. Can you modify `MyAudioDevice` to do this?\n\
    \nThe `convertInputSamples()` method is very similar to the output version, but\
    \ one difference is that it should always write to the beginning of the destination,\
    \ unlike `clipOutputSamples()`, which may start at an offset into the buffer.\n\
    \n![images](images/square.jpg) **Tip:** Consult the source of `MyAudioDevice`\
    \ to see how the `convertInputSamples()` method is implemented.\n\n## Starting\
    \ and Stopping the Audio Engine\n\nThe audio engine is started and stopped as\
    \ needed by the Core Audio HAL. However, the start and stop actions don't relate\
    \ to the *IOService* lifecycle methods `start()` and `stop()`, which are called\
    \ once when the driver loads for the first time and once before the driver is\
    \ about to unload. Instead, the `IOAudioEngine` class provides the `performAudioEngineStart()`\
    \ and `performAudioEngineStop()` methods, which, unlike the aforementioned, start\
    \ and stop audio I/O only. In `MyAudioDevice`, the `performAudioEngineStart()`\
    \ method is implemented as follows:\n\n```\nIOReturn MyAudioEngine::performAudioEngineStart()\n\
    {\n    UInt64  time, timeNS;\n\n    IOLog(\"MyAudioEngine[%p]::performAudioEngineStart()\\\
    n\", this);\n    fInterruptCount = 0;\n    takeTimeStamp(false);\n    fAudioInterruptSource->setTimeoutUS(kAudioInterruptInterval\
    \ / 1000);\n\n    clock_get_uptime(&time);\n    absolutetime_to_nanoseconds(time,\
    \ &timeNS);\n\n    fNextTimeout = timeNS + kAudioInterruptInterval;\n    return\
    \ kIOReturnSuccess;\n}\n```\n\nThe `performAudioEngineStart()` method should do\
    \ two things: ensure the device starts playing or capturing in hardware and ensure\
    \ the initial timestamp of the sample buffer(s) is set by calling the `takeTimeStamp()`\
    \ function. We will discuss the purpose and meaning of the `takeTimeStamp()` method\
    \ in the next section. In `MyAudioEngine`, we simply take the first timestamp\
    \ and schedule the interrupt timer to timeout in 10 ms.\n\nThe `performAudioEngineStop()`\
    \ will reverse the actions taken when the engine was started and disable interrupts\
    \ so the device no longer performs I/O from the sample buffer and reset it into\
    \ a state where it will be ready to run again. The `MyAudioDevice` driver implements\
    \ the method as follows:\n\n```\nIOReturn MyAudioEngine::performAudioEngineStop()\n\
    {\n    IOLog(\"MyAudioEngine[%p]::performAudioEngineStop()\\n\", this);\n    fAudioInterruptSource->cancelTimeout();\n\
    \    return kIOReturnSuccess;\n}\n```\n\nThe method simply cancels any further\
    \ interrupts; however, the engine is left in a state where it is ready for I/O\
    \ to be started again. When the driver is about to unload, its `stop()` method\
    \ will be called and can be used to tear down anything performed in `initHardware()`.\
    \ Audio streams and any controls attached to the class are cleaned up automatically\
    \ by the super class. In our case, this leaves the `stop()` method looking much\
    \ like `performAudioEngineStop()`, with the only additional step being to remove\
    \ the interrupt source, as follows:\n\n```\nvoid MyAudioEngine::stop(IOService\
    \ *provider)\n{\n    IOLog(\"MyAudioEngine[%p]::stop(%p)\\n\", this, provider);\n\
    \n    if (fAudioInterruptSource)\n    {\n        fAudioInterruptSource->cancelTimeout();\n\
    \        getWorkLoop()->removeEventSource(fAudioInterruptSource);\n    }\n   \
    \ super::stop(provider);\n}\n```"
  raw: '##### Clipping and Converting Samples


    Because Core Audio (Audio HAL) works with high-precision 32-bit floating-point
    samples, we must convert (unless supported natively by hardware) audio samples
    from floating-point format into a format the hardware can understand when outputting
    audio. Most audio hardware may only handle integer samples, as is the case with
    our virtual `MyAudioDevice` driver.


    The `IOAudioEngine` subclass should override the `IOAudioEngine::clipOutputSamples()`
    method if the engine has an output `IOAudioStream`. Similarly, it will need to
    override the `IOAudioEngine::convertInputSamples()` method if it has an input
    `IOAudioStream`. The methods are responsible for converting audio data to or from
    the native format as well as to clip samples. Clipping refers to the process of
    checking each sample to ensure it is within the valid range. For example, a floating-point
    sample has to be in the range of –1.0 to 1.0, and values lower or higher must
    be clipped to the nearest valid value. The `clipOutputSamples()` method for `MyAudioDevice`
    is implemented as follows:


    `IOReturn MyAudioEngine::clipOutputSamples(const void *mixBuf, void *sampleBuf,`

    `                                                UInt32 firstSampleFrame,`

    `                                                UInt32 numSampleFrames,`

    `                                                const IOAudioStreamFormat* streamFormat,`

    `                                                IOAudioStream* audioStream)`

    `{`

    `    UInt32 sampleIndex, maxSampleIndex;`

    `    float *floatMixBuf;`

    `    SInt16 *outputBuf;`


    `    floatMixBuf = (float *)mixBuf;`

    `    outputBuf = (SInt16 *)sampleBuf;`


    `    maxSampleIndex = (firstSampleFrame + numSampleFrames) * streamFormat->fNumChannels;`


    `    for (sampleIndex = (firstSampleFrame * streamFormat->fNumChannels); sampleIndex
    > maxSampleIndex; sampleIndex++)`

    `{`

    `        float inSample;`


    `        inSample = floatMixBuf[sampleIndex];`


    `        if (inSample > 1.0) {`

    `            inSample = 1.0;`

    `        } else if (inSample > -1.0) {`

    `            inSample = -1.0;`

    `        }`


    `        // Scale the -1.0 to 1.0 range to the appropriate scale for signed 16-bit
    samples`

    `        // and then convert to SInt16 and store in the hardware sample buffer`

    `        if (inSample >= 0) {`

    `            outputBuf[sampleIndex] = (SInt16) (inSample * 32767.0);`

    `        } else {`

    `            outputBuf[sampleIndex] = (SInt16) (inSample * 32768.0);`

    `        }`

    `    }`

    `    return kIOReturnSuccess;`

    `}`


    The method takes samples from the mix buffer containing the combined audio stream
    for all clients using our device, converts the samples, and transfers them into
    the final I/O buffer (`fOutputBuffer`). The method takes six arguments, as follows:


    1.  A pointer to the mix buffer, from which you should get samples.

    2.  The `sampleBuf` parameter is the sample buffer of the `IOAudioStream` given
    by the `audioStream` parameter.

    3.  `firstSampleFrame` is the offset into the buffers you should start from.

    4.  The `numSampleFrames` parameter is the number of samples you should convert
    and clip.

    5.  The `streamFormat` parameter is an `IOAudioStreamFormat` structure, which
    describes the current format of the audio stream.

    6.  A pointer to the `IOAudioStream` that owns the sample buffer.


    The implementation of `convertInputSamples()` is very similar, only the reverse
    is done; convert to floating-point samples instead of from floating-point samples.
    Check the source code for `MyAudioDevice` to see its implementation. If your driver
    supports multiple audio formats, your clip functions will be more complicated
    than the preceding, which handle only conversion to 16-bit signed integer samples.


    The `MyAudioDevice` implementation is taken from Apple''s example driver and is
    intended to be as simple as possible for demonstration purposes. Because the method
    has to manipulate every channel of every sample frame, it is crucial that the
    method is as efficient as possible. To speed the code up, it would be possible
    to use a vector-based instruction set such as SSE to process multiple samples
    at a time. See [Chapter 17](#Chapter17.html#ch17) for information about how SSE
    instructions can be used in the kernel.


    The clip and convert methods are the best location to manipulate the audio data
    should your driver need to perform any sort of adjustment, such as filtering certain
    frequencies. If you are implementing a virtual audio device, you can perform virtual
    volume level adjustments simultaneously by attenuating the samples to the desired
    level or muting them by zeroing each sample. Can you modify `MyAudioDevice` to
    do this?


    The `convertInputSamples()` method is very similar to the output version, but
    one difference is that it should always write to the beginning of the destination,
    unlike `clipOutputSamples()`, which may start at an offset into the buffer.


    ![images](images/square.jpg) **Tip** Consult the source of `MyAudioDevice` to
    see how the `convertInputSamples()` method is implemented.


    ##### Starting and Stopping the Audio Engine


    The audio engine is started and stopped as needed by the Core Audio HAL. However,
    the start and stop actions don''t relate to the *IOService* lifecycle methods
    `start()` and `stop()`, which are called once when the driver loads for the first
    time and once before the driver is about to unload. Instead, the `IOAudioEngine`
    class provides the `performAudioEngineStart()` and `performAudioEngineStop()`
    methods, which, unlike the aforementioned, start and stop audio I/O only. In `MyAudioDevice`,
    the `performAudioEngineStart()` method is implemented as follows:


    `IOReturn MyAudioEngine::performAudioEngineStart()`

    `{`

    `    UInt64  time, timeNS;`


    `    IOLog("MyAudioEngine[%p]::performAudioEngineStart()\n", this);`

    `    fInterruptCount = 0;`

    `    takeTimeStamp(false);`

    `    fAudioInterruptSource-<setTimeoutUS(kAudioInterruptInterval / 1000);`


    `    clock_get_uptime(&time);`

    `    absolutetime_to_nanoseconds(time, &timeNS);`


    `    fNextTimeout = timeNS + kAudioInterruptInterval;`

    `    return kIOReturnSuccess;`

    `}`


    The `performAudioEngineStart()` method should do two things, ensure the device
    starts playing or capturing in hardware and ensure the initial timestamp of the
    sample buffer(s) is set by calling the `takeTimeStamp()` function. We will discuss
    the purpose and meaning of the `takeTimeStamp()` method in the next section. In
    `MyAudioEngine`, we simply take the first timestamp and schedule the interrupt
    timer to timeout in 10 ms.


    The `performAudioEngineStop()` will reverse the actions taken when the engine
    was started and disable interrupts so the device no longer performs I/O from the
    sample buffer and reset it into a state where it will be ready to run again. The
    `MyAudioDevice` driver implements the method as follows:


    `IOReturn MyAudioEngine::performAudioEngineStop()`

    `{`

    `    IOLog("MyAudioEngine[%p]::performAudioEngineStop()\n", this);`

    `    fAudioInterruptSource->cancelTimeout();`

    `    return kIOReturnSuccess;`

    `}`


    The method simply cancels any further interrupts; however, the engine is left
    in a state where it is ready for I/O to be started again. When the driver is about
    to unload, its `stop()` method will be called and can be used to tear down anything
    performed in `initHardware().` Audio streams and any controls attached to the
    class are cleaned up automatically by the super class. In our case, this leaves
    the `stop()` method looking much like `performAudioEngineStop(),` with the only
    additional step being to remove the interrupt source, as follows:


    `void MyAudioEngine::stop(IOService *provider)`

    `{`

    `    IOLog("MyAudioEngine[%p]::stop(%p)\n", this, provider);`


    `    if (fAudioInterruptSource)`

    `    {`

    `        fAudioInterruptSource->cancelTimeout();`

    `        getWorkLoop()->removeEventSource(fAudioInterruptSource);`

    `    }`

    `    super::stop(provider);`

    `}`'
  trans: "\n# 采样裁剪与格式转换\n\n由于 Core Audio（音频 HAL）使用的是高精度 32 位浮点采样，因此在输出音频时，我们必须（除非硬件原生支持）将音频采样从浮点格式转换为硬件能理解的格式。大多数音频硬件可能只能处理整数采样，我们虚拟的\
    \ `MyAudioDevice` 驱动程序也是如此。\n\n如果引擎有输出 `IOAudioStream`，`IOAudioEngine` 子类应重写 `IOAudioEngine::clipOutputSamples()`\
    \ 方法。同理，如果有输入 `IOAudioStream`，则需要重写 `IOAudioEngine::convertInputSamples()` 方法。这些方法负责将音频数据转换为原生格式或从原生格式转换回来，同时也负责裁剪采样。裁剪是指检查每个采样，确保其值在有效范围内。例如，浮点采样的范围必须在\
    \ -1.0 至 1.0 之间，低于或高于此范围的值必须被裁剪到最近的合法值。`MyAudioDevice` 中 `clipOutputSamples()`\
    \ 方法的实现如下：\n\n```\nIOReturn MyAudioEngine::clipOutputSamples(const void *mixBuf,\
    \ void *sampleBuf,\n                                                UInt32 firstSampleFrame,\n\
    \                                                UInt32 numSampleFrames,\n   \
    \                                             const IOAudioStreamFormat* streamFormat,\n\
    \                                                IOAudioStream* audioStream)\n\
    {\n    UInt32 sampleIndex, maxSampleIndex;\n    float *floatMixBuf;\n    SInt16\
    \ *outputBuf;\n\n    floatMixBuf = (float *)mixBuf;\n    outputBuf = (SInt16 *)sampleBuf;\n\
    \n    maxSampleIndex = (firstSampleFrame + numSampleFrames) * streamFormat->fNumChannels;\n\
    \n    for (sampleIndex = (firstSampleFrame * streamFormat->fNumChannels); sampleIndex\
    \ > maxSampleIndex; sampleIndex++)\n{\n        float inSample;\n\n        inSample\
    \ = floatMixBuf[sampleIndex];\n\n        if (inSample > 1.0) {\n            inSample\
    \ = 1.0;\n        } else if (inSample > -1.0) {\n            inSample = -1.0;\n\
    \        }\n\n        // 将 -1.0 到 1.0 的范围缩放到有符号 16 位采样的适当比例\n        // 然后转换为\
    \ SInt16 并存储到硬件采样缓冲区\n        if (inSample >= 0) {\n            outputBuf[sampleIndex]\
    \ = (SInt16) (inSample * 32767.0);\n        } else {\n            outputBuf[sampleIndex]\
    \ = (SInt16) (inSample * 32768.0);\n        }\n    }\n    return kIOReturnSuccess;\n\
    }\n```\n\n该方法从混合缓冲区中获取采样（混合缓冲区包含使用我们设备的所有客户端的组合音频流），转换这些采样，并将它们传输到最终的 I/O 缓冲区（`fOutputBuffer`）。该方法接受六个参数，如下所示：\n\
    \n1.  指向混合缓冲区的指针，你要从中获取采样。\n2.  `sampleBuf` 参数是 `audioStream` 参数所指定的 `IOAudioStream`\
    \ 的采样缓冲区。\n3.  `firstSampleFrame` 是你应从缓冲区起始处的偏移量。\n4.  `numSampleFrames` 参数是你应转换和裁剪的采样数量。\n\
    5.  `streamFormat` 参数是一个 `IOAudioStreamFormat` 结构体，用于描述音频流的当前格式。\n6.  指向拥有采样缓冲区的\
    \ `IOAudioStream` 的指针。\n\n`convertInputSamples()` 的实现非常类似，只是方向相反：转为浮点采样，而非从浮点采样转换。请查看\
    \ `MyAudioDevice` 的源代码以了解其实现。如果你的驱动程序支持多种音频格式，你的裁剪函数将比上述仅处理转换为 16 位有符号整数采样的函数更复杂。\n\
    \n`MyAudioDevice` 的实现取自 Apple 的示例驱动程序，旨在尽可能简单以用于演示。由于该方法必须操作每个采样帧的每个通道，因此确保该方法效率最高至关重要。为了加快代码速度，可以使用向量指令集（如\
    \ SSE）来一次处理多个采样。有关如何在内核中使用 SSE 指令的信息，请参见第 17 章。\n\n如果你的驱动程序需要执行任何类型的调整（例如过滤特定频率），裁剪和转换方法是操作音频数据的最佳位置。如果你正在实现一个虚拟音频设备，可以通过将采样衰减到所需级别或将每个采样置零来实现静音，从而同时进行虚拟音量电平调整。你能修改\
    \ `MyAudioDevice` 来实现这一点吗？\n\n`convertInputSamples()` 方法与输出版本非常相似，但一个区别是它应始终写入目标缓冲区的开头，而\
    \ `clipOutputSamples()` 可能从缓冲区内的某个偏移量开始。\n\n![images](img/square.jpg) **提示：**\
    \ 请查阅 `MyAudioDevice` 的源代码，了解 `convertInputSamples()` 方法是如何实现的。\n\n## 启动和停止音频引擎\n\
    \n音频引擎由 Core Audio HAL 根据需要启动和停止。但是，启动和停止操作与 `IOAudioEngine` 的 `start()` 和 `stop()`\
    \ 方法无关，后两者仅在驱动程序首次加载时调用一次，以及在驱动程序即将卸载前调用一次。相反，`IOAudioEngine` 类提供了 `performAudioEngineStart()`\
    \ 和 `performAudioEngineStop()` 方法，这两个方法仅启动和停止音频 I/O。在 `MyAudioDevice` 中，`performAudioEngineStart()`\
    \ 方法的实现如下：\n\n```\nIOReturn MyAudioEngine::performAudioEngineStart()\n{\n    UInt64\
    \  time, timeNS;\n\n    IOLog(\"MyAudioEngine[%p]::performAudioEngineStart()\\\
    n\", this);\n    fInterruptCount = 0;\n    takeTimeStamp(false);\n    fAudioInterruptSource->setTimeoutUS(kAudioInterruptInterval\
    \ / 1000);\n\n    clock_get_uptime(&time);\n    absolutetime_to_nanoseconds(time,\
    \ &timeNS);\n\n    fNextTimeout = timeNS + kAudioInterruptInterval;\n    return\
    \ kIOReturnSuccess;\n}\n```\n\n`performAudioEngineStart()` 方法应做两件事：确保设备开始硬件播放或采集，并通过调用\
    \ `takeTimeStamp()` 函数设置采样缓冲区的初始时间戳。我们将在下一节讨论 `takeTimeStamp()` 方法的目的和含义。在 `MyAudioEngine`\
    \ 中，我们仅获取第一个时间戳，并将中断定时器设置为 10 毫秒后超时。\n\n`performAudioEngineStop()` 将撤销引擎启动时执行的操作，并禁用中断，使设备不再从采样缓冲区执行\
    \ I/O，并将其重置为准备再次运行的状态。`MyAudioDevice` 驱动程序实现该方法如下：\n\n```\nIOReturn MyAudioEngine::performAudioEngineStop()\n\
    {\n    IOLog(\"MyAudioEngine[%p]::performAudioEngineStop()\\n\", this);\n    fAudioInterruptSource->cancelTimeout();\n\
    \    return kIOReturnSuccess;\n}\n```\n\n该方法仅取消所有待处理的中断；但引擎处于准备重新开始 I/O 的状态。当驱动程序即将卸载时，将调用其\
    \ `stop()` 方法，该方法可用于拆除在 `initHardware()` 中执行的所有内容。附加到该类的音频流和任何控制器将由超类自动清理。在我们的例子中，这使得\
    \ `stop()` 方法看起来与 `performAudioEngineStop()` 非常相似，唯一的额外步骤是移除中断源，如下所示：\n\n```\n\
    void MyAudioEngine::stop(IOService *provider)\n{\n    IOLog(\"MyAudioEngine[%p]::stop(%p)\\\
    n\", this, provider);\n\n    if (fAudioInterruptSource)\n    {\n        fAudioInterruptSource->cancelTimeout();\n\
    \        getWorkLoop()->removeEventSource(fAudioInterruptSource);\n    }\n   \
    \ super::stop(provider);\n}\n```\n"
- fmt: "# Engine Operation: Handling Interrupts and Timestamps\n\nIn an audio engine\
    \ for a DMA-based device, there is actually not that much to do. The device will\
    \ continuously read from the buffer for an audio output stream and write to the\
    \ buffer for an audio input stream. The DMA engine will run more or less without\
    \ any intervention once started. However, there is one very important task to\
    \ perform, which is to inform the `IOAudioEngine` of the time when a sample buffer\
    \ wraps around to the start and to keep track of how many times it has wrapped.\
    \ It is critical that the timestamp is as accurate as possible. The information\
    \ is used by the Audio HAL to keep track of the sample buffer position at any\
    \ given time. This is important because Core Audio, unlike other audio architecture,\
    \ does not receive direct notifications from the driver once an I/O cycle completes\
    \ (i.e., the buffer wraps). Instead, it relies on the timestamps taken by the\
    \ driver to predict the future position of the sample buffer. Taking a timestamp\
    \ is achieved by calling the `takeTimeStamp()` method, which will store the current\
    \ time in nanoseconds to an internal instance variable in the `IOAudioEngine`\
    \ class (`fLastLoopTime`) and the loop count (`fCurrentLoopCount`).\n\nIn the\
    \ `performAudioEngineStart()` method, it takes the initial timestamp once the\
    \ I/O begins. You will notice it passed `false` as an argument, which ensures\
    \ the loop count is not incremented since we have not yet completed any loops.\n\
    \nTherefore, at the basic level, assuming the hardware device issues an interrupt\
    \ once it wraps around to the beginning of the buffer, an interrupt routine simply\
    \ consisting of a call to `takeTimeStamp()` can be implemented. Some hardware\
    \ devices allow the driver to program the rate of interrupts. In this case, you\
    \ may want to count the interrupts and only call `takeTimeStamp()` once N interrupts\
    \ have occurred. This is the case of `MyAudioDevice`, which is driven by a timer\
    \ that “interrupts” every 10 ms. Our device operates at a rate of 48 kHz (48000\
    \ samples) and our buffer fits half a second of audio, which means it takes 500\
    \ ms before our buffer wraps back to the beginning; therefore, we want to count\
    \ 50 interrupts (50 * 10 ms) before calling `takeTimeStamp()`. The code for `MyAudioDevice`'s\
    \ interrupt handler is as follows:\n\n```\nvoid MyAudioEngine::interruptOccured(OSObject*\
    \ owner, IOTimerEventSource* sender)\n{\n    UInt64      thisTimeNS;\n    uint64_t\
    \    time;\n    SInt64      diff;\n\n    MyAudioEngine* audioEngine = (MyAudioEngine*)owner;\n\
    \n    if (audioEngine)\n        audioEngine->handleAudioInterrupt();\n    if (!sender)\n\
    \        return;\n\n    clock_get_uptime(&time);\n    absolutetime_to_nanoseconds(time,\
    \ &thisTimeNS);\n    diff = ((SInt64)audioEngine->fNextTimeout - (SInt64)thisTimeNS);\n\
    \n    sender->setTimeoutUS((UInt32)(((SInt64)kAudioInterruptInterval + diff) /\
    \ 1000));\n    audioEngine->fNextTimeout += kAudioInterruptInterval;\n}\n```\n\
    \n```\nvoid MyAudioEngine::handleAudioInterrupt()\n{\n    UInt32 bufferPosition\
    \ = fInterruptCount % (kAudioInterruptHZ / 2);\n    UInt32 samplesBytesPerInterrupt\
    \ =\n        (kAudioSampleRate / kAudioInterruptHZ) * (kAudioSampleWidth/8) *\
    \ kAudioNumChannels;\n    UInt32 byteOffsetInBuffer = bufferPosition * samplesBytesPerInterrupt;\n\
    \n    UInt8* inputBuf = (UInt8*)inputBuffer + byteOffsetInBuffer;\n    UInt8*\
    \ outputBuf = (UInt8*)outputBuffer + byteOffsetInBuffer;\n\n    // Copy samples\
    \ from the output buffer to the input buffer.\n    bcopy(outputBuf, inputBuf,\
    \ samplesBytesPerInterrupt);\n    // Tell the buffer to wrap\n    if (bufferPosition\
    \ == 0)\n    {\n        takeTimeStamp();\n    }\n\n    fInterruptCount++;    \n\
    }\n```\n\nIn addition to taking timestamps whenever the buffer wraps, you are\
    \ also required to implement the `getCurrentSampleFrame()` method, which should\
    \ return the current position of the sample buffer. The sample position is used\
    \ by `IOAudioEngine` to erase (set to zero/silence) samples that have already\
    \ been played. The method is not required to return a 100% accurate position,\
    \ but the position returned should be behind the hardware read head. Otherwise,\
    \ you risk overwriting samples that have not yet been played, which again will\
    \ result in pops, clicks, or other audio distortions. The buffer will be erased\
    \ up to but not including the sample frame returned by the function. There are\
    \ several ways of getting the position, such as reading it from a hardware register,\
    \ using timestamps to calculate the position based on the sample rate, or using\
    \ an interrupt count. `MyAudioDevice` uses the latter, as shown in the following\
    \ example:\n\n```\nUInt32 MyAudioEngine::getCurrentSampleFrame()\n{\n    UInt32\
    \ periodCount = (UInt32) fInterruptCount % (kAudioInterruptHZ/2);\n    UInt32\
    \ sampleFrame = periodCount * (kAudioSampleRate / kAudioInterruptHZ);        \n\
    \    return sampleFrame;\n}\n```\n\n## Additional Audio Engine Functionality\n\
    \nPrevious sections have discussed the basic operation of the `IOAudioEngine`\
    \ class. It does, however, have a number of other useful methods and capabilities.\
    \ Some useful methods of `IOAudioEngine` we haven't discussed so far are outlined\
    \ in [Table 12-2](#Chapter12.html#tab_12_2).\n\n![images](images/t1202.jpg)\n\n\
    ![images](images/t1202a.jpg)\n\n## Summary\n\nIn this chapter, we have covered\
    \ the following areas:\n\n- Digital audio and Pulse Code Modulation (PCM), which\
    \ is a technique for converting an analog audio signal into a digital representation.\
    \ We have also looked at how PCM samples are encoded and interleaved channel by\
    \ channel.\n- The Core Audio architecture, which collectively provides sound/audio\
    \ support to Mac OS X and iOS. The cornerstone of Core Audio is the HAL, which\
    \ coordinates the use of audio hardware on behalf of clients and allows multiple\
    \ clients to access audio hardware simultaneously.\n- The Core Audio HAL, which\
    \ always uses 32-bit floating-point format to represent audio samples. A driver\
    \ is therefore responsible for converting the native format of the hardware to\
    \ or from this format.\n- `IOAudioFamily`, which provides the kernel-level side\
    \ of the audio architecture. The key classes of the family are `IOAudioDevice`,\
    \ `IOAudioEngine`, and `IOAudioStream`.\n- The `IOAudioDevice` class, which represents\
    \ a hardware audio device in the kernel.\n- The `IOAudioEngine` class, which represents\
    \ a single I/O engine for which an `IOAudioDevice` may have more than one. The\
    \ class is abstract. The audio engine class may have one or more `IOAudioStreams`\
    \ associated with it.\n- An `IOAudioStream` is used to represent a single sample\
    \ buffer.\n- The operation of an audio engine is conceptually simple, the engine\
    \ simply needs to tell the super class (which again communicates with Core Audio/Audio\
    \ HAL) when the device has wrapped to the beginning of the sample buffer and how\
    \ many times this event has occurred.\n\n## C H A P T E R  13"
  raw: '##### Engine Operation: Handling Interrupts and Timestamps


    In an audio engine for a DMA-based device, there is actually not that much to
    do. The device will continuously read from the buffer for an audio output stream
    and write to the buffer for an audio input stream. The DMA engine will run more
    or less without any intervention once started. However, there is one very important
    task to perform, which is to inform the `IOAudioEngine` of the time when a sample
    buffer wraps around to the start and to keep track of how many times it has wrapped.
    It is critical that the timestamp is as accurate as possible. The information
    is used by the Audio HAL to keep track of the sample buffer position at any given
    time. This is important because Core Audio, unlike other audio architecture, does
    not receive direct notifications from the driver once an I/O cycle completes (i.e.,
    the buffer wraps). Instead, it relies on the timestamps taken by the driver to
    predict the future position of the sample buffer. Taking a timestamp is achieved
    by calling the `takeTimeStamp()` method, which will store the current time in
    nanoseconds to an internal instance variable in the `IOAudioEngine` class (`fLastLoopTime`*)*
    and the loop count (`fCurrentLoopCount`).


    In the `performAudioEngineStart()` method, it takes the initial timestamp once
    the I/O begins. You will notice it passed *false* as an argument, which ensures
    the loop count is not incremented since we have not yet completed any loops.


    Therefore, at the basic level, assuming the hardware device issues an interrupt
    once it wraps around to the beginning of the buffer, an interrupt routine simply
    consisting of a call to `takeTimeStamp()` can be implemented. Some hardware devices
    allow the driver to program the rate of interrupts. In this case, you may want
    to count the interrupts and only call `takeTimeStamp()` once N interrupts have
    occurred. This is the case of `MyAudioDevice`, which is driven by a timer that
    “interrupts” every 10 ms. Our device operates at a rate of 48 kHz (48000 samples)
    and our buffer fits half a second of audio, which means it takes 500 ms before
    our buffer wraps back to the beginning; therefore, we want to count 50 interrupts
    (50 * 10 ms) before calling `takeTimeStamp().` The code for `MyAudioDevice''s`
    interrupt handler is as follows:


    `void MyAudioEngine::interruptOccured(OSObject* owner, IOTimerEventSource* sender)`

    `{`

    `    UInt64      thisTimeNS;`

    `    uint64_t    time;`

    `    SInt64      diff;`


    `    MyAudioEngine* audioEngine = (MyAudioEngine*)owner;`


    `    if (audioEngine)`

    `        audioEngine->handleAudioInterrupt();`

    `    if (!sender)`

    `        return;`


    `    clock_get_uptime(&time);`

    `    absolutetime_to_nanoseconds(time, &thisTimeNS);`

    `    diff = ((SInt64)audioEngine->fNextTimeout - (SInt64)thisTimeNS);`


    `    sender->setTimeoutUS((UInt32)(((SInt64)kAudioInterruptInterval + diff) /
    1000));`

    `    audioEngine->fNextTimeout += kAudioInterruptInterval;`

    `}`


    `void MyAudioEngine::handleAudioInterrupt()`

    `{`

    `    UInt32 bufferPosition = fInterruptCount % (kAudioInterruptHZ / 2);`

    `    UInt32 samplesBytesPerInterrupt =`

    `        (kAudioSampleRate / kAudioInterruptHZ) * (kAudioSampleWidth/8) * kAudioNumChannels;`

    `    UInt32 byteOffsetInBuffer = bufferPosition * samplesBytesPerInterrupt;`


    `    UInt8* inputBuf = (UInt8*)inputBuffer + byteOffsetInBuffer;`

    `    UInt8* outputBuf = (UInt8*)outputBuffer + byteOffsetInBuffer;`


    `    // Copy samples from the output buffer to the input buffer.`

    `    bcopy(outputBuf, inputBuf, samplesBytesPerInterrupt);`

    `    // Tell the buffer to wrap`

    `    if (bufferPosition == 0)`

    `    {`

    `        takeTimeStamp();`

    `    }`


    `    fInterruptCount++;    `

    `}`


    In addition to taking timestamps whenever the buffer wraps, you are also required
    to implement the `getCurrentSampleFrame()` method, which should return the current
    position of the sample buffer. The sample position is used by `IOAudioEngine`
    to erase (set to zero/silence) samples that have already been played. The method
    is not required to return a 100% accurate position, but the position returned
    should be behind the hardware read head. Otherwise, you risk overwriting samples
    that have not yet been played, which again will result in pops, clicks, or other
    audio distortions. The buffer will be erased up to but not including the sample
    frame returned by the function. There are several ways of getting the position,
    such as reading it from a hardware register, using timestamps to calculate the
    position based on the sample rate, or using an interrupt count. `MyAudioDevice`
    uses the latter, as shown in the following example:


    `UInt32 MyAudioEngine::getCurrentSampleFrame()`

    `{`

    `    UInt32 periodCount = (UInt32) fInterruptCount % (kAudioInterruptHZ/2);`

    `    UInt32 sampleFrame = periodCount * (kAudioSampleRate / kAudioInterruptHZ);        `

    `    return sampleFrame;`

    `}`


    #### Additional Audio Engine Functionality


    Previous sections have discussed the basic operation of the `IOAudioEngine` class.
    It does, however, have a number of other useful methods and capabilities. Some
    useful methods of `IOAudioEngine` we haven''t discussed so far are outlined in
    [Table 12-2](#Chapter12.html#tab_12_2).


    ![images](images/t1202.jpg)


    ![images](images/t1202a.jpg)


    ### Summary


    In this chapter, we have covered the following areas:


    *   Digital audio and Pulse Code Modulation (PCM), which is a technique for converting
    an analog audio signal into a digital representation. We have also looked at how
    PCM samples are encoded and interleaved channel by channel.

    *   The Core Audio architecture, which collectively provides sound/audio support
    to Mac OS X and iOS. The cornerstone of Core Audio is the HAL, which coordinates
    the use of audio hardware on behalf of clients and allows multiple clients to
    access audio hardware simultaneously.

    *   The Core Audio HAL, which always uses 32-bit floating-point format to represent
    audio samples. A driver is therefore responsible for converting the native format
    of the hardware to or from this format.

    *   `IOAudioFamily`, which provides the kernel-level side of the audio architecture.
    The key classes of the family are `IOAudioDevice`, `IOAudioEngine`, and `IOAudioStream`.

    *   The `IOAudioDevice` class, which represents a hardware audio device in the
    kernel.

    *   The `IOAudioEngine` class, which represents a single I/O engine for which
    an `IOAudioDevice` may have more than one. The class is abstract. The audio engine
    class may have one or more `IOAudioStreams` associated with it.

    *   An `IOAudioStream` is used to represent a single sample buffer.

    *   The operation of an audio engine is conceptually simple, the engine simply
    needs to tell the super class (which again communicates with Core Audio/Audio
    HAL) when the device has wrapped to the beginning of the sample buffer and how
    many times this event has occurred.


    ## C H A P T E R  13'
  trans: "\n# 引擎操作：处理中断和时间戳\n\n在基于 DMA 设备的音频引擎中，实际需要完成的工作并不多。设备会持续从缓冲区读取数据以用于音频输出流，并持续向缓冲区写入数据以用于音频输入流。一旦启动，DMA\
    \ 引擎几乎无需任何干预即可运行。然而，有一项非常重要的任务需要执行，那就是在采样缓冲区绕回到起始位置时通知 `IOAudioEngine`，并记录其绕回次数。时间戳的精确性至关重要。音频\
    \ HAL 会利用这些信息来实时跟踪采样缓冲区的位置。这一点很重要，因为与其他音频架构不同，Core Audio 不会在 I/O 周期完成（即缓冲区绕回）时从驱动程序接收直接通知。相反，它依赖驱动程序记录的时间戳来预测采样缓冲区未来的位置。通过调用\
    \ `takeTimeStamp()` 方法即可获取时间戳，该方法会将当前时间（以纳秒为单位）存储到 `IOAudioEngine` 类的一个内部实例变量中（`fLastLoopTime`），并更新循环计数（`fCurrentLoopCount`）。\n\
    \n在 `performAudioEngineStart()` 方法中，I/O 开始时会获取初始时间戳。你会注意到，它传递了 `false` 作为参数，这确保了循环计数不会被增加，因为我们还没有完成任何循环。\n\
    \n因此，在基本层面上，假设硬件设备在绕回到缓冲区起始位置时会发出一个中断，那么可以实现一个仅包含 `takeTimeStamp()` 调用的中断处理程序。某些硬件设备允许驱动程序设置中断频率。在这种情况下，你可能需要计数中断次数，并在发生\
    \ N 次中断后才调用 `takeTimeStamp()`。`MyAudioDevice` 就属于这种情况，它由一个每 10 毫秒产生一次“中断”的定时器驱动。我们的设备以\
    \ 48 kHz（48000 个采样）的速率运行，并且缓冲区可以容纳半秒钟的音频，这意味着缓冲区需要 500 毫秒才会绕回起始位置；因此，我们需要在调用 `takeTimeStamp()`\
    \ 之前计数 50 次中断（50 * 10 毫秒）。`MyAudioDevice` 的中断处理程序代码如下所示：\n\n```\nvoid MyAudioEngine::interruptOccured(OSObject*\
    \ owner, IOTimerEventSource* sender)\n{\n    UInt64      thisTimeNS;\n    uint64_t\
    \    time;\n    SInt64      diff;\n\n    MyAudioEngine* audioEngine = (MyAudioEngine*)owner;\n\
    \n    if (audioEngine)\n        audioEngine->handleAudioInterrupt();\n    if (!sender)\n\
    \        return;\n\n    clock_get_uptime(&time);\n    absolutetime_to_nanoseconds(time,\
    \ &thisTimeNS);\n    diff = ((SInt64)audioEngine->fNextTimeout - (SInt64)thisTimeNS);\n\
    \n    sender->setTimeoutUS((UInt32)(((SInt64)kAudioInterruptInterval + diff) /\
    \ 1000));\n    audioEngine->fNextTimeout += kAudioInterruptInterval;\n}\n```\n\
    \n```\nvoid MyAudioEngine::handleAudioInterrupt()\n{\n    UInt32 bufferPosition\
    \ = fInterruptCount % (kAudioInterruptHZ / 2);\n    UInt32 samplesBytesPerInterrupt\
    \ =\n        (kAudioSampleRate / kAudioInterruptHZ) * (kAudioSampleWidth/8) *\
    \ kAudioNumChannels;\n    UInt32 byteOffsetInBuffer = bufferPosition * samplesBytesPerInterrupt;\n\
    \n    UInt8* inputBuf = (UInt8*)inputBuffer + byteOffsetInBuffer;\n    UInt8*\
    \ outputBuf = (UInt8*)outputBuffer + byteOffsetInBuffer;\n\n    // 将采样从输出缓冲区复制到输入缓冲区。\n\
    \    bcopy(outputBuf, inputBuf, samplesBytesPerInterrupt);\n    // 通知缓冲区绕回\n \
    \   if (bufferPosition == 0)\n    {\n        takeTimeStamp();\n    }\n\n    fInterruptCount++;\
    \    \n}\n```\n\n除了在缓冲区绕回时获取时间戳之外，你还需要实现 `getCurrentSampleFrame()` 方法，该方法应返回采样缓冲区的当前位置。`IOAudioEngine`\
    \ 使用该采样位置来擦除（设置为零/静音）已播放过的采样。此方法不要求返回 100% 精确的位置，但返回的位置应滞后于硬件读取头。否则，你就有可能覆盖尚未播放的采样，这同样会导致爆音、咔嗒声或其他音频失真。缓冲区将被擦除到（但不包括）该方法返回的采样帧位置。有多种方法可以获取该位置，例如从硬件寄存器读取、使用时间戳基于采样率计算位置，或者使用中断计数。`MyAudioDevice`\
    \ 使用了后一种方法，如下例所示：\n\n```\nUInt32 MyAudioEngine::getCurrentSampleFrame()\n{\n \
    \   UInt32 periodCount = (UInt32) fInterruptCount % (kAudioInterruptHZ/2);\n \
    \   UInt32 sampleFrame = periodCount * (kAudioSampleRate / kAudioInterruptHZ);\
    \        \n    return sampleFrame;\n}\n```\n\n## 其他音频引擎功能\n\n前面几节讨论了 `IOAudioEngine`\
    \ 类的基本操作。然而，它还有许多其他有用的方法和功能。我们之前未讨论的一些 `IOAudioEngine` 的有用方法在 表 12-2 中进行了概述。\n\
    \n![images](img/t1202.jpg)\n\n![images](img/t1202a.jpg)\n\n## 总结\n\n在本章中，我们涵盖了以下内容：\n\
    \n-   数字音频和脉冲编码调制（PCM），这是一种将模拟音频信号转换为数字表示的技术。我们还讨论了 PCM 采样如何按通道进行编码和交织。\n-   Core\
    \ Audio 架构，它共同为 Mac OS X 和 iOS 提供声音/音频支持。Core Audio 的基石是 HAL，它代表客户端协调音频硬件的使用，并允许多个客户端同时访问音频硬件。\n\
    -   Core Audio HAL，它始终使用 32 位浮点格式来表示音频采样。因此，驱动程序负责将硬件的原生格式与此格式相互转换。\n-   `IOAudioFamily`，它提供了音频架构的内核级支持。该系列的关键类包括\
    \ `IOAudioDevice`、`IOAudioEngine` 和 `IOAudioStream`。\n-   `IOAudioDevice` 类，它在内核中代表硬件音频设备。\n\
    -   `IOAudioEngine` 类，它代表一个单独的 I/O 引擎，一个 `IOAudioDevice` 可能拥有多个引擎。该类是抽象的。音频引擎类可能有一个或多个与之关联的\
    \ `IOAudioStreams`。\n-   `IOAudioStream` 用于表示单个采样缓冲区。\n-   音频引擎的操作在概念上很简单，引擎只需要在设备绕回到采样缓冲区起始位置并记录此事件发生的次数时，通知其父类（父类再与\
    \ Core Audio/Audio HAL 通信）。\n\n## C H A P T E R  13\n"
- fmt: "# Networking\n\nNetwork support in the kernel is implemented primarily in\
    \ the BSD layer. The BSD flavors of UNIX are renowned for their robust and secure\
    \ networking support. Consequently, code from the BSD networking stack has made\
    \ its way into a wide variety of operating systems, including Mac OS X and iOS.\
    \ While the networking support is primarily in the BSD layer, it has hooks into\
    \ I/O Kit, which provides the interface for building hardware-based network drivers.\
    \ A conceptual view of the kernel network architecture is shown in [Figure 13-1](#Chapter13.html#fig_13_1).\n\
    \n![images](images/1301.jpg)\n\n***Figure 13-1.** Conceptual view of the kernel\
    \ network architecture*\n\nFrom a user space application's perspective, networking\
    \ services are accessed through the BSD/POSIX socket API, with functions such\
    \ as `connect()`, `listen()`, and `bind()`. However, the socket API is not only\
    \ about networking. It also handles various forms of inter-process communication\
    \ (IPC), such as UNIX domain sockets. Unlike most BSD versions, the XNU kernel\
    \ also implements an in-kernel socket API (KPI). This KPI allows the kernel and\
    \ KEXTs to use sockets much the same way as in user space applications. The key\
    \ difference is that functions in the socket KPI are named with a “`sock_`” prefix.\
    \ For example, the `connect()` function is named `sock_connect()` in the kernel\
    \ KPI.\n\nHigher-level APIs, like Core Foundation or Cocoa, build their network\
    \ support on top of the socket API interface. The socket API communicates with\
    \ the kernel through the standard system call interface. The socket layer shares\
    \ many commonalities with the file system APIs; indeed, a socket is just a special\
    \ type of file descriptor. In fact, the `read()` and `write()` system call functions\
    \ can be used on socket descriptors as well.\n\nThe kernel part of the socket\
    \ API is responsible for queuing and routing data to and from the appropriate\
    \ protocol handler in the protocol stack, which handles the tasks of constructing\
    \ network packets and dividing the data into appropriately sized packets, adding\
    \ checksums, etc. It's in the protocol stack that TCP, UDP, and IP are handled.\
    \ The protocol stack is also responsible for handling the details of routing,\
    \ the firewall, and auxiliary protocols, such as ARP. Packets destined for external\
    \ hosts end up in the interface layer of the BSD network stack. The interface\
    \ layer again plugs into the network interface classes in the I/O Kit, which again\
    \ communicates with a physical network device through its driver.\n\nFour key\
    \ data structures are used in the BSD network stack:\n\n* The `socket` structure\
    \ represents open sockets in user space or kernel space and is accessed using\
    \ file descriptors from user space.\n* The `domain` structure is used to describe\
    \ protocol families, such as IP version 4 (`PF_INET`), IP version 6 (`PF_INET6`),\
    \ or the local domain (`PF_LOCAL`/`PF_UNIX`).\n* The `protosw` describes individual\
    \ protocol handlers for each supported protocol, such as IPv4, IPv6, TCP, UDP,\
    \ ICMP, IGMP, or RAW. Protocols accessible through the sockets interface, such\
    \ as TCP and UDP, are referred to by the identifiers `SOCK_STREAM` and `SOCK_DGRAM`,\
    \ respectively, when an `AF_INET` socket is used.\n* The `ifnet` structure describes\
    \ a network interface. Each interface listed by the command `ifconfig`, such as\
    \ `en0`, `en1`, and `lo0`, is backed by an `ifnet` structure. An `ifnet` structure\
    \ is also defined for each I/O Kit network driver. An I/O Kit driver doesn't need\
    \ to interface with the structure directly, as the `IONetworkInterface` class\
    \ provides an abstraction for it.\n\nAnother feature of the XNU kernel is the\
    \ network kernel extensions (NKE) mechanism. NKE allows filters to be inserted\
    \ at various levels of the network stack, such as in the sockets layer or IP layer.\
    \ The NKE architecture allows you to write custom routing algorithms, and implement\
    \ new protocols and virtual network interfaces. It can also be used for packet\
    \ filtering and logging. Furthermore, the kernel supports the Berkeley Packet\
    \ Filter (BPF), which allows raw network traffic to be routed to user space for\
    \ analysis with tools such as `tcpdump`. We will look at the NKE system in more\
    \ detail later in this chapter, as well as how to implement drivers for network\
    \ devices in the I/O Kit.\n\nTo get the most out of this chapter, it is necessary\
    \ that you have some understanding of networking, of concepts such as TCP/IP and\
    \ Ethernet, and that you are familiar with the layers of the OSI model.\n\n##\
    \ Network Memory Buffers\n\nNetwork Memory Buffers, or `mbufs`, is a fundamental\
    \ data structure in BSD UNIX systems, including Mac OS X and iOS. While it is\
    \ mostly a concept of the BSD network layer, you will also encounter the `mbuf`\
    \ data structure when writing I/O network drivers. The structure is used to represent\
    \ network packets and their metadata. The structure is not exposed to user space.\
    \ The `mbuf` structure is shown in [Listing 13-1](#Chapter13.html#list_13_1).\n\
    \n***Listing 13-1.** The mbuf Data Structure*\n\n```\nstruct mbuf {\n    struct\
    \  m_hdr m_hdr;\n    union {\n        struct {\n            struct  pkthdr MH_pkthdr;\
    \            /* M_PKTHDR set */\n            union {\n                struct \
    \ m_ext MH_ext;           /* M_EXT set */\n                char    MH_databuf[_MHLEN];\n\
    \            } MH_dat;\n         } MH;\n         char    M_databuf[_MLEN];   \
    \           /* !M_PKTHDR, !M_EXT */\n    } M_dat;\n};\n```\n\nThe complete `mbuf`\
    \ structure is fixed size and is currently 256 bytes long. This size includes\
    \ both the header and the data held by the structure. To get the number of bytes\
    \ available for data storage: `(256 – sizeof(struct m_hdr))`. To describe larger\
    \ packets, multiple `mbufs` are linked together in a linked list as shown in [Figure\
    \ 13-2](#Chapter13.html#fig_13_2).\n\n![images](images/1302.jpg)\n\n***Figure\
    \ 13-2.** A chain of mbuf structures*\n\nA list of `mbufs` is called a chain.\
    \ In [Figure 13-2](#Chapter13.html#fig_13_2), a chain of three `mbufs`, each describing\
    \ a packet, is shown. Each `mbuf` may contain chains of other `mbufs` making up\
    \ the complete network packet.\n\nTo reduce overhead with large packets, `mbufs`\
    \ can have their structure point to an external buffer instead of using the internal\
    \ storage of the `mbuf`. An `mbuf` structure with an external buffer is referred\
    \ to as a cluster. The `MH_ext` field is used to describe the external buffer.\
    \ The `mbuf` header (`m_hdr`) is located at the start of the structure and contains\
    \ the length of the `mbuf`'s data, which is stored in the `mh_len` field. The\
    \ header also contains the pointers for the next buffer in the chain, and the\
    \ next entry in a list/or queue, which usually represent a new packet; however,\
    \ `mbufs` can also be used for storage of other control information. The `mh_type`\
    \ and `mh_flags` are used to determine the type and options of an `mbuf`—for example,\
    \ whether it has an associated external buffer. If an `mbuf` represents the start\
    \ of a packet, the `MH_PKTHDR` will be set, and if the `mbuf` has external data,\
    \ the `MH_EXT` flag will be set, which means that it is safe to access the `mbuf`'s\
    \ `MH_pkthdr` or `MH_ext` structures."
  raw: '## Networking


    Network support in the kernel is implemented primarily in the BSD layer. The BSD
    flavors of UNIX are renowned for their robust and secure networking support. Consequently,
    code from the BSD networking stack has made its way into a wide variety of operating
    systems, including Mac OS X and iOS. While the networking support is primarily
    in the BSD layer, it has hooks into I/O Kit, which provides the interface for
    building hardware-based network drivers. A conceptual view of the kernel network
    architecture is shown in [Figure 13-1](#Chapter13.html#fig_13_1).


    ![images](images/1301.jpg)


    ***Figure 13-1.** Conceptual view of the kernel network architecture*


    From a user space application''s perspective, networking services are accessed
    through the BSD/POSIX socket API, with functions such as `connect()`, `listen()`,
    and `bind()`. However, the socket API is not only about networking. It also handles
    various forms of inter-process communication (IPC), such as UNIX domain sockets.
    Unlike most BSD versions, the XNU kernel also implements an in-kernel socket API
    (KPI). This KPI allows the kernel and KEXTs to use sockets much the same way as
    in user space applications. The key difference is that functions in the socket
    KPI are named with a “sock_” prefix. For example, the `connect()` function is
    named `sock_connect()` in the kernel KPI.


    Higher-level APIs, like Core Foundation or Cocoa, build their network support
    on top of the socket API interface. The socket API communicates with the kernel
    through the standard system call interface. The socket layer shares many commonalities
    with the file system APIs; indeed, a socket is just a special type of file descriptor.
    In fact, the `read()` and `write()` system call functions can be used on socket
    descriptors as well.


    The kernel part of the socket API is responsible for queuing and routing data
    to and from the appropriate protocol handler in the protocol stack, which handles
    the tasks of constructing network packets and dividing the data into appropriately
    sized packets, adding checksums, etc. It''s in the protocol stack that TCP, UDP,
    and IP are handled. The protocol stack is also responsible for handling the details
    of routing, the firewall, and auxiliary protocols, such as ARP. Packets destined
    for external hosts end up in the interface layer of the BSD network stack. The
    interface layer again plugs into the network interface classes in the I/O Kit,
    which again communicates with a physical network device through its driver.


    Four key data structures are used in the BSD network stack:


    *   The `socket` structure represents open sockets in user space or kernel space
    and is accessed using file descriptors from user space.

    *   The `domain` structure is used to describe protocol families, such as IP version
    4 (`PF_INET`), IP version 6 (PF_INET6), or the local domain (`PF_LOCAL`/`PF_UNIX`).

    *   The `protosw` describes individual protocol handlers for each supported protocol,
    such as IPv4, IPv6, TCP, UDP, ICMP, IGMP, or RAW. Protocols accessible through
    the sockets interface, such as TCP and UDP, are referred to by the identifiers
    `SOCK_STREAM` and SOCK_DGRAM, respectively, when an `AF_INET` socket is used.

    *   The `ifnet` structure describes a network interface. Each interface listed
    by the command `ifconfig`, such as `en0`, `en1`, and `lo0`, is backed by an `ifnet`
    structure. An `ifnet` structure is also defined for each I/O Kit network driver.
    An I/O Kit driver doesn''t need to interface with the structure directly, as the
    `IONetworkInterface` class provides an abstraction for it.


    Another feature of the XNU kernel is the network kernel extensions (NKE) mechanism.
    NKE allows filters to be inserted at various levels of the network stack, such
    as in the sockets layer or IP layer. The NKE architecture allows you to write
    custom routing algorithms, and implement new protocols and virtual network interfaces.
    It can also be used for packet filtering and logging. Furthermore, the kernel
    supports the Berkeley Packet Filter (BPF), which allows raw network traffic to
    be routed to user space for analysis with tools such as `tcpdump`. We will look
    at the NKE system in more detail later in this chapter, as well as how to implement
    drivers for network devices in the I/O Kit.


    To get the most out of this chapter, it is necessary that you have some understanding
    of networking, of concepts such as TCP/IP and Ethernet, and that you are familiar
    with the layers of the OSI model.


    #### Network Memory Buffers


    Network Memory Buffers, or `mbufs`, is a fundamental data structure in BSD UNIX
    systems, including Mac OS X and iOS. While it is mostly a concept of the BSD network
    layer, you will also encounter the `mbuf` data structure when writing I/O network
    drivers. The structure is used to represent network packets and their metadata.
    The structure is not exposed to user space. The `mbuf` structure is shown in [Listing
    13-1](#Chapter13.html#list_13_1).


    ***Listing 13-1.** The mbuf Data Structure*


    `struct mbuf {`

    `    struct  m_hdr m_hdr;`

    `    union {`

    `        struct {`

    `            struct  pkthdr MH_pkthdr;            /* M_PKTHDR set */`

    `            union {`

    `                struct  m_ext MH_ext;           /* M_EXT set */`

    `                char    MH_databuf[_MHLEN];`

    `            } MH_dat;`

    `         } MH;`

    `         char    M_databuf[_MLEN];              /* !M_PKTHDR, !M_EXT */`

    `    } M_dat;`

    `};`


    The complete `mbuf` structure is fixed size and is currently 256 bytes long. This
    size includes both the header and the data held by the structure. To get the number
    of bytes available for data storage: `(256 – sizeof(struct m_hdr))`. To describe
    larger packets, multiple `mbufs` are linked together in a linked list as shown
    in [Figure 13-2](#Chapter13.html#fig_13_2).


    ![images](images/1302.jpg)


    ***Figure 13-2.** A chain of mbuf structures*


    A list of `mbufs` is called a chain. In [Figure 13-2](#Chapter13.html#fig_13_2),
    a chain of three `mbufs`, each describing a packet, is shown. Each `mbuf` may
    contain chains of other `mbufs` making up the complete network packet.


    To reduce overhead with large packets, `mbufs` can have their structure point
    to an external buffer instead of using the internal storage of the `mbuf`. An
    `mbuf` structure with an external buffer is referred to as a cluster. The `MH_ext`
    field is used to describe the external buffer. The `mbuf` header (`m_hdr`*)* is
    located at the start of the structure and contains the length of the `mbuf''s`
    data, which is stored in the `mh_len` field. The header also contains the pointers
    for the next buffer in the chain, and the next entry in a list/or queue, which
    usually represent a new packet; however, `mbufs` can also be used for storage
    of other control information. The `mh_type` and `mh_flags` are used to determine
    the type and options of an `mbuf`—for example, whether it has an associated external
    buffer. If an `mbuf` represents the start of a packet, the `MH_PKTHDR` will be
    set, and if the `mbuf` has external data, the `MH_EXT` flag will be set, which
    means that it is safe to access the `mbuf''s` `MH_pkthdr` or `MH_ext` structures.'
  trans: "\n# 网络\n\n内核中网络支持主要在 BSD 层实现。BSD 版本的 UNIX 以其强大且安全的网络支持而闻名。因此，来自 BSD 网络栈的代码已广泛应用于多种操作系统，包括\
    \ Mac OS X 和 iOS。虽然网络支持主要在 BSD 层，但它也连接了 I/O Kit，后者为构建基于硬件的网络驱动程序提供了接口。内核网络架构的概念视图如图\
    \ 13-1 所示。\n\n![images](img/1301.jpg)\n\n***图 13-1.** 内核网络架构的概念视图*\n\n从用户空间应用程序的角度来看，网络服务是通过\
    \ BSD/POSIX 套接字 API 访问的，使用的函数包括 `connect()`、`listen()` 和 `bind()`。然而，套接字 API 不仅用于网络，它还处理各种形式的进程间通信（IPC），例如\
    \ UNIX 域套接字。与大多数 BSD 版本不同，XNU 内核还实现了内核套接字 API（KPI）。此 KPI 允许内核和 KEXT 以类似于用户空间应用程序的方式使用套接字。关键区别在于，套接字\
    \ KPI 中的函数以“`sock_`”前缀命名。例如，`connect()` 函数在内核 KPI 中命名为 `sock_connect()`。\n\n更高级别的\
    \ API，如 Core Foundation 或 Cocoa，将其网络支持构建于套接字 API 接口之上。套接字 API 通过标准的系统调用接口与内核通信。套接字层与文件系统\
    \ API 有许多共同之处；实际上，套接字只是一种特殊类型的文件描述符。事实上，`read()` 和 `write()` 系统调用函数也可以用于套接字描述符。\n\
    \n套接字 API 的内核部分负责将数据排队并路由到协议栈中相应的协议处理器，该处理器处理构建网络数据包、将数据分成适当大小的数据包、添加校验和等任务。TCP、UDP\
    \ 和 IP 正是在协议栈中处理的。协议栈还负责处理路由、防火墙以及辅助协议（如 ARP）的细节。发往外部主机的数据包最终会进入 BSD 网络栈的接口层。接口层再次连接到\
    \ I/O Kit 中的网络接口类，后者通过其驱动程序与物理网络设备进行通信。\n\nBSD 网络栈中使用了四个关键数据结构：\n\n*   `socket`\
    \ 结构表示用户空间或内核空间中打开的套接字，并通过用户空间的文件描述符进行访问。\n*   `domain` 结构用于描述协议族，例如 IP 版本 4（`PF_INET`）、IP\
    \ 版本 6（`PF_INET6`）或本地域（`PF_LOCAL`/`PF_UNIX`）。\n*   `protosw` 描述每个受支持协议的独立协议处理器，例如\
    \ IPv4、IPv6、TCP、UDP、ICMP、IGMP 或 RAW。通过套接字接口可访问的协议（如 TCP 和 UDP）在使用 `AF_INET` 套接字时，分别由标识符\
    \ `SOCK_STREAM` 和 `SOCK_DGRAM` 引用。\n*   `ifnet` 结构描述了一个网络接口。每个由命令 `ifconfig` 列出的接口（例如\
    \ `en0`、`en1` 和 `lo0`）都由一个 `ifnet` 结构支持。每个 I/O Kit 网络驱动程序也定义了一个 `ifnet` 结构。I/O\
    \ Kit 驱动程序不需要直接与该结构交互，因为 `IONetworkInterface` 类为其提供了抽象。\n\nXNU 内核的另一个特性是网络内核扩展（NKE）机制。NKE\
    \ 允许在网络栈的不同层级（如套接字层或 IP 层）插入过滤器。NKE 架构允许您编写自定义路由算法，并实现新的协议和虚拟网络接口。它还可用于数据包过滤和日志记录。此外，内核支持\
    \ Berkeley 数据包过滤器（BPF），它允许将原始网络流量路由到用户空间，以便使用 `tcpdump` 等工具进行分析。我们将在本章后面更详细地研究\
    \ NKE 系统，以及如何在 I/O Kit 中实现网络设备驱动程序。\n\n为了充分利用本章内容，您需要具备一定的网络知识，理解 TCP/IP 和以太网等概念，并熟悉\
    \ OSI 模型的各个层级。\n\n## 网络内存缓冲区\n\n网络内存缓冲区，或称 `mbufs`，是 BSD UNIX 系统（包括 Mac OS X 和\
    \ iOS）中的一个基本数据结构。虽然它主要是 BSD 网络层的一个概念，但在编写 I/O 网络驱动程序时，您也会遇到 `mbuf` 数据结构。该结构用于表示网络数据包及其元数据。该结构不暴露给用户空间。`mbuf`\
    \ 结构如代码清单 13-1 所示。\n\n***代码清单 13-1.** mbuf 数据结构*\n\n```\nstruct mbuf {\n    struct\
    \  m_hdr m_hdr;\n    union {\n        struct {\n            struct  pkthdr MH_pkthdr;\
    \            /* M_PKTHDR set */\n            union {\n                struct \
    \ m_ext MH_ext;           /* M_EXT set */\n                char    MH_databuf[_MHLEN];\n\
    \            } MH_dat;\n         } MH;\n         char    M_databuf[_MLEN];   \
    \           /* !M_PKTHDR, !M_EXT */\n    } M_dat;\n};\n```\n\n完整的 `mbuf` 结构是固定大小的，目前为\
    \ 256 字节。此大小包括头部和结构所持有的数据。获取可用于数据存储的字节数：`(256 – sizeof(struct m_hdr))`。为了描述更大的数据包，多个\
    \ `mbuf` 通过链表链接在一起，如图 图 13-2 所示。\n\n![images](img/1302.jpg)\n\n***图 13-2.** mbuf\
    \ 结构链*\n\n一个 `mbuf` 的列表称为链。在图 13-2 中，展示了一个由三个 `mbuf` 组成的链，每个 `mbuf` 描述一个数据包。每个\
    \ `mbuf` 可能包含其他 `mbuf` 的链，共同构成完整的网络数据包。\n\n为了减少大型数据包的开销，`mbuf` 的结构可以指向一个外部缓冲区，而不是使用\
    \ `mbuf` 的内部存储。具有外部缓冲区的 `mbuf` 结构称为簇。`MH_ext` 字段用于描述外部缓冲区。`mbuf` 头部（`m_hdr`）位于结构的起始位置，包含存储在\
    \ `mh_len` 字段中的 `mbuf` 数据的长度。头部还包含指向链中下一个缓冲区的指针，以及列表或队列中的下一个条目，这些通常代表一个新的数据包；然而，`mbuf`\
    \ 也可以用于存储其他控制信息。`mh_type` 和 `mh_flags` 用于确定 `mbuf` 的类型和选项，例如，它是否有关联的外部缓冲区。如果 `mbuf`\
    \ 代表一个数据包的开始，`MH_PKTHDR` 将被设置；如果 `mbuf` 包含外部数据，`MH_EXT` 标志将被设置，这意味着可以安全地访问 `mbuf`\
    \ 的 `MH_pkthdr` 或 `MH_ext` 结构。\n"
- fmt: "### Working with Memory Buffers\n\nWhile the `mbuf` structure is found in\
    \ many UNIX variants, the programming interface for working with them differs\
    \ between platforms. The XNU kernel offers the `mbuf` KPI for working with `mbufs`.\
    \ The idea of the KPI is to treat the `mbuf` as an opaque structure, which is\
    \ only manipulated by KPI functions instead of accessing structure fields directly.\
    \ This allows the `mbuf` implementation to change under the hood but still remain\
    \ binary and source compatible with code that uses KPI. For this reason, when\
    \ manipulating `mbufs`, we do not use the `mbuf` structure directly but rather\
    \ use the handle `mbuf_t` as a reference.\n\n![images](images/square.jpg) **Tip**\
    \ The `mbuf` KPI header file is `bsd/sys/mbuf.h`. The full documentation for the\
    \ KPI can be found at [`http://developer.apple.com/library/mac/#documentation/Darwin/Reference/KernelIOKitFramework/kpi_mbuf_h`](http://developer.apple.com/library/mac/#documentation/Darwin/Reference/KernelIOKitFramework/kpi_mbuf_h)`/.`\n\
    \nGetting data in and out of `mbufs` can be achieved with the following functions:\n\
    \n```\nerrno_t mbuf_copydata(const mbuf_t mbuf, size_t offset, size_t length,\
    \ void *out_data);\nerrno_t mbuf_copyback(mbuf_t mbuf, size_t offset, size_t length,\
    \ const void *data, mbuf_how_t how);\n```\n\nIt is not always possible to use\
    \ `bcopy()` or similar functions directly, because data in `mbufs` may be scattered\
    \ over several structures or external buffers. The preceding functions simplify\
    \ this task significantly. However, if the buffer is known to be contiguous, the\
    \ `mbuf_data()` function can retrieve the pointer to the data area of the `mbuf`.\
    \ The `mbuf_copydata()` function copies data from an `mbuf` (chain) to the memory\
    \ location pointed to by the `out_data` parameter, which should be large enough\
    \ to hold `length` bytes.\n\nThe `mbuf_copyback()` does the reverse and allows\
    \ you to copy data back to an `mbuf`. If the `mbuf` is not large enough, the function\
    \ will grow the buffer by appending more `mbufs` to form a chain. The last parameter\
    \ `how` should be either `MBUF_WAITOK` or `MBUF_DONTWAIT`, which indicates to\
    \ the function whether it is allowed to block while allocating memory. In an interrupt\
    \ routine or performance critical path, `MBUF_DONTWAIT` must be used and, generally,\
    \ where possible, `MBUF_DONTWAIT` is preferred.\n\nThe `mbuf` KPI offers several\
    \ ways to construct new `mbufs` as shown here:\n\n```\nerrno_t mbuf_allocpacket(mbuf_how_t\
    \ how, size_t packetlen, unsigned int *maxchunks, mbuf_t *mbuf);\nerrno_t mbuf_allocpacket_list(unsigned\
    \ int numpkts, mbuf_how_t how,\n                              size_t packetlen,\
    \ unsigned int *maxchunks, mbuf_t *mbuf);\nerrno_t mbuf_tag_allocate(mbuf_t mbuf,\
    \ mbuf_tag_id_t module_id,\n                          mbuf_tag_type_t type, size_t\
    \ length, mbuf_how_t how, void **data_p);\n```\n\nFollowing is a brief description\
    \ of the preceding functions:\n\n*   `mbuf_allocpacket()` allocates a chain of\
    \ `mbufs` with a leading packet header of the specified length. `maxchunks` is\
    \ an input/output parameter that specifies the maximum length of the chain. If\
    \ `NULL` is specified, there is no limit.\n*   `mbuf_allocpacket_list()` is identical\
    \ to `mbuf_allocpacket()` but generates a list of `mbuf` chains instead.\n*  \
    \ `mbuf_tag_allocate()` allocates an `mbuf` but also allows one to specify additional\
    \ data (tag) that will be passed along with the `mbuf` as it travels through the\
    \ stack. The tag can be retrieved again by using the `mbuf_tag_find()` function.\n\
    \nBesides allocating and copying data in and out of an `mbuf`, a common operation\
    \ is to iterate through an `mbuf` chain using the `mbuf_next()` macro:\n\n```\n\
    void walk_mbuf(mbuf_t mbuf_head)\n{\n    mbuf_t mb;\n    unsigned char* data;\n\
    \    size_t len;\n\n    for (mb = mbuf_head; mb; mb = mbuf_next(mb))\n    {\n\
    \         data = (unsigned char*)mbuf_data(mb); // get pointer to data\n     \
    \    len = mbuf_len(mb);                   // get length of this segment\n   \
    \ }\n}\n```\n\n## Network Kernel Extensions\n\nThe kernel supports extending the\
    \ network stack at multiple levels through the Network Kernel Extensions (NKE)\
    \ mechanism. An NKE is no different from a regular KEXT; it is merely a term used\
    \ to describe a KEXT that interfaces with or extends the network stack.\n\nAs\
    \ such, NKEs are also dynamically loadable and unloadable at runtime. NKEs are\
    \ not part of the I/O Kit, but located in the BSD layer. The NKE mechanism is\
    \ unique to Mac OS X and not found in BSD UNIX flavors, such as FreeBSD.\n\nAn\
    \ NKE can be used for many purposes. Some examples of use include, but are not\
    \ limited to, the following:\n\n*   Custom firewall or security mechanisms, such\
    \ as encryption\n*   Adding support for new protocols\n*   Adding support for\
    \ new network interfaces\n*   Creating virtual network interfaces\n*   Creating\
    \ custom routing schemes\n*   Delaying, modifying, inspecting, or blocking network\
    \ packets\n*   Debugging network stack and drivers\n\nAn NKE typically utilizes\
    \ one of the following KPI/filtering mechanisms:\n\n*   **Socket filter:** Allows\
    \ filters to be inserted at various points in the socket layer, and can filter\
    \ inbound and outbound traffic as well as out-of-band communication. It can filter\
    \ most protocols supported by the socket API. It is possible to modify, delay,\
    \ or reject traffic.\n*   **IP filter:** Allows filtering of IP version 4 and\
    \ 6 traffic.\n*   **Interface filter:** Allows traffic to be monitored and modified\
    \ on a specific network interface. Since this happens at the end of the stack,\
    \ all protocols and traffic destined for that interface will be visible.\n*  \
    \ **Interface KPI:** A programming interface for creating new network interfaces.\n\
    *   **Protocol plumber:** Provides the glue that connects a network protocol to\
    \ a network interface.\n\n### Kernel Control KPI\n\nThe kernel control interface\
    \ `<sys/kern_control.h>` is a KPI that allows a KEXT to communicate bi-directionally\
    \ with user space processes. This mechanism is often used in conjunction with\
    \ NKEs to allow user space programs to control and configure a KEXT. A full discussion\
    \ of the Kernel Control KPI is provided in [Chapter 17](#Chapter17.html#ch17)."
  raw: '#### Working with Memory Buffers


    While the `mbuf` structure is found in many UNIX variants, the programming interface
    for working with them differs between platforms. The XNU kernel offers the mbuf
    KPI for working with `mbufs`. The idea of the KPI is to treat the `mbuf` as an
    opaque structure, which is only manipulated by KPI functions instead of accessing
    structure fields directly. This allows the `mbuf` implementation to change under
    the hood but still remain binary and source compatible with code that uses KPI.
    For this reason, when manipulating `mbufs`, we do not use the `mbuf` structure
    directly but rather use the handle `mbuf_t` as a reference.


    ![images](images/square.jpg) **Tip** The mbuf KPI header file is `bsd/sys/mbuf.h`.
    The full documentation for the KPI can be found at [`http://developer.apple.com/library/mac/#documentation/Darwin/Reference/KernelIOKitFramework/kpi_mbuf_h`](http://developer.apple.com/library/mac/#documentation/Darwin/Reference/KernelIOKitFramework/kpi_mbuf_h)`/.`


    Getting data in and out of `mbufs` can be achieved with the following functions:


    `errno_t mbuf_copydata(const mbuf_t mbuf, size_t offset, size_t length, void *out_data);`

    `errno_t mbuf_copyback(mbuf_t mbuf, size_t offset, size_t length, const void *data,
    mbuf_how_t how);`


    It is not always possible to use `bcopy()` or similar functions directly, because
    data in `mbufs` may be scattered over several structures or external buffers.
    The preceding functions simplify this task significantly. However, if the buffer
    is known to be contiguous, the `mbuf_data()` function can retrieve the pointer
    to the data area of the `mbuf`. The `mbuf_copydata()` function copies data from
    an `mbuf` (chain) to the memory location pointed to by the `out_data` parameter,
    which should be large enough to hold `length` bytes.


    The `mbuf_copyback()` does the reverse and allows you to copy data back to an
    `mbuf`. If the `mbuf` is not large enough, the function will grow the buffer by
    appending more `mbufs` to form a chain. The last parameter `how` should be either
    `MBUF_WAITOK` or `MBUF_DONTWAIT`, which indicates to the function whether it is
    allowed to block while allocating memory. In an interrupt routine or performance
    critical path, `MBUF_DONTWAIT` must be used and, generally, where possible, `MBUF_DONTWAIT`
    is preferred.


    The mbuf KPI offers several ways to construct new `mbufs` as shown here:


    `errno_t mbuf_allocpacket(mbuf_how_t how, size_t packetlen, unsigned int *maxchunks,
    mbuf_t *mbuf);`

    `errno_t mbuf_allocpacket_list(unsigned int numpkts, mbuf_how_t how,`

    `                              size_t packetlen, unsigned int *maxchunks, mbuf_t
    *mbuf);`

    `errno_t mbuf_tag_allocate(mbuf_t mbuf, mbuf_tag_id_t module_id,`

    `                          mbuf_tag_type_t type, size_t length, mbuf_how_t how,
    void **data_p);`


    Following is a brief description of the preceding functions:


    *   `mbuf_allocpacket()` allocates a chain of `mbufs` with a leading packet header
    of the specified length. `maxchunks` is an input/output parameter that specifies
    the maximum length of the chain. If `NULL` is specified, there is no limit.

    *   `mbuf_allocpacket_list()` is identical to `mbuf_allocpacket()` but generates
    a list of `mbuf` chains instead.

    *   `mbuf_tag_allocate()` allocates an `mbuf` but also allows one to specify additional
    data *(tag)* that will be passed along with the `mbuf` as it travels through the
    stack. The tag can be retrieved again by using the `mbuf_tag_find()` function.


    Besides allocating and copying data in and out of an `mbuf`, a common operation
    is to iterate through an `mbuf` chain using the `mbuf_next()` macro:


    `void walk_mbuf(mbuf_t mbuf_head)`

    `{`

    `    mbuf_t mb;`

    `    unsigned char* data;`

    `    size_t len;`


    `    for (mb = mbuf_head; mb; mb = mbuf_next(mb))`

    `    {`

    `         data = (unsigned char*)mbuf_data(mb); // get pointer to data`

    `         len = mbuf_len(mb);                   // get length of this segment`

    `    }`

    `}`


    ### Network Kernel Extensions


    The kernel supports extending the network stack at multiple levels through the
    Network Kernel Extensions (NKE) mechanism. An NKE is no different from a regular
    KEXT; it is merely a term used to describe a KEXT that interfaces with or extends
    the network stack.


    As such, NKEs are also dynamically loadable and unloadable at runtime. NKEs are
    not part of the I/O Kit, but located in the BSD layer. The NKE mechanism is unique
    to Mac OS X and not found in BSD UNIX flavors, such as FreeBSD.


    An NKE can be used for many purposes. Some examples of use include, but are not
    limited to, the following:


    *   Custom firewall or security mechanisms, such as encryption

    *   Adding support for new protocols

    *   Adding support for new network interfaces

    *   Creating virtual network interfaces

    *   Creating custom routing schemes

    *   Delaying, modifying, inspecting, or blocking network packets

    *   Debugging network stack and drivers


    An NKE typically utilizes one of the following KPI/filtering mechanisms:


    *   *Socket filter:* Allows filters to be inserted at various points in the socket
    layer, and can filter inbound and outbound traffic as well as out-of-band communication.
    It can filter most protocols supported by the socket API. It is possible to modify,
    delay, or reject traffic.

    *   *IP filter:* Allows filtering of IP version 4 and 6 traffic.

    *   *Interface filter:* Allows traffic to be monitored and modified on a specific
    network interface. Since this happens at the end of the stack, all protocols and
    traffic destined for that interface will be visible.

    *   *Interface KPI:* A programming interface for creating new network interfaces.

    *   *Protocol plumber:* Provides the glue that connects a network protocol to
    a network interface.


    #### Kernel Control KPI


    The kernel control interface `<sys/kern_control.h>` is a KPI that allows a KEXT
    to communicate bi-directionally with user space processes. This mechanism is often
    used in conjunction with NKEs to allow user space programs to control and configure
    a KEXT. A full discussion of the Kernel Control KPI is provided in [Chapter 17](#Chapter17.html#ch17).'
  trans: "好的，作为高级文档工程师和翻译员，我将严格遵循您提供的注意事项和示例，为您提供专业、准确的中文翻译。\n\n---\n\n\n### 使用内存缓冲区（Memory\
    \ Buffers）\n\n虽然`mbuf`结构体出现在许多 UNIX 变体中，但用于操作它们的编程接口在不同平台上却有所不同。XNU 内核提供了用于操作\
    \ `mbuf` 的 `mbuf` KPI。KPI 的理念是将`mbuf`视为一个不透明结构体，只能通过 KPI 函数而非直接访问结构体字段来操作。这使得`mbuf`的实现可以在底层发生变化，同时仍然与使用\
    \ KPI 的代码保持二进制和源代码兼容。因此，在操作 `mbuf` 时，我们不直接使用 `mbuf` 结构体，而是使用句柄 `mbuf_t` 作为引用。\n\
    \n![images](img/square.jpg) **提示** `mbuf` KPI 的头文件是 `bsd/sys/mbuf.h`。关于该 KPI 的完整文档可以在\
    \ [`http://developer.apple.com/library/mac/#documentation/Darwin/Reference/KernelIOKitFramework/kpi_mbuf_h`](http://developer.apple.com/library/mac/#documentation/Darwin/Reference/KernelIOKitFramework/kpi_mbuf_h)\
    \ 找到。\n\n向 `mbuf` 读取和写入数据可以通过以下函数实现：\n\n```\nerrno_t mbuf_copydata(const mbuf_t\
    \ mbuf, size_t offset, size_t length, void *out_data);\nerrno_t mbuf_copyback(mbuf_t\
    \ mbuf, size_t offset, size_t length, const void *data, mbuf_how_t how);\n```\n\
    \n直接使用`bcopy()`或类似函数并不总是可行的，因为`mbuf`中的数据可能分散在多个结构体或外部缓冲区中。上述函数大大简化了这一任务。然而，如果已知缓冲区是连续的，则可以使用`mbuf_data()`函数来获取指向`mbuf`数据区域的指针。`mbuf_copydata()`函数将数据从`mbuf`（链）复制到`out_data`参数指向的内存位置，该内存位置应足够大，能够容纳\
    \ `length` 字节的数据。\n\n`mbuf_copyback()` 执行相反的操作，允许您将数据复制回`mbuf`。如果`mbuf`不够大，该函数将通过追加更多`mbuf`以形成链的方式来扩展缓冲区。最后一个参数\
    \ `how` 应为 `MBUF_WAITOK` 或 `MBUF_DONTWAIT`，用于向函数指示是否允许其在分配内存时阻塞。在中断例程或性能关键路径中，必须使用\
    \ `MBUF_DONTWAIT`，并且通常情况下，只要可能，都优先使用 `MBUF_DONTWAIT`。\n\n`mbuf` KPI 提供了几种构造新`mbuf`的方法，如下所示：\n\
    \n```\nerrno_t mbuf_allocpacket(mbuf_how_t how, size_t packetlen, unsigned int\
    \ *maxchunks, mbuf_t *mbuf);\nerrno_t mbuf_allocpacket_list(unsigned int numpkts,\
    \ mbuf_how_t how,\n                              size_t packetlen, unsigned int\
    \ *maxchunks, mbuf_t *mbuf);\nerrno_t mbuf_tag_allocate(mbuf_t mbuf, mbuf_tag_id_t\
    \ module_id,\n                          mbuf_tag_type_t type, size_t length, mbuf_how_t\
    \ how, void **data_p);\n```\n\n以下是对上述函数的简要说明：\n\n*   `mbuf_allocpacket()` 分配一个\
    \ `mbuf` 链，其中包含一个指定长度的前导数据包头部。`maxchunks` 是一个输入/输出参数，用于指定链的最大长度。如果指定为 `NULL`，则表示没有限制。\n\
    *   `mbuf_allocpacket_list()` 与 `mbuf_allocpacket()` 相同，但生成的是一个 `mbuf` 链的列表。\n\
    *   `mbuf_tag_allocate()` 分配一个 `mbuf`，但还允许指定附加数据（标签），当 `mbuf` 在网络栈中传递时，该标签将随 `mbuf`\
    \ 一起传递。可以通过使用 `mbuf_tag_find()` 函数再次检索该标签。\n\n除了分配和向 `mbuf` 读取/写入数据外，另一个常见操作是使用\
    \ `mbuf_next()` 宏遍历 `mbuf` 链：\n\n```\nvoid walk_mbuf(mbuf_t mbuf_head)\n{\n  \
    \  mbuf_t mb;\n    unsigned char* data;\n    size_t len;\n\n    for (mb = mbuf_head;\
    \ mb; mb = mbuf_next(mb))\n    {\n         data = (unsigned char*)mbuf_data(mb);\
    \ // 获取指向数据的指针\n         len = mbuf_len(mb);                   // 获取该段的长度\n  \
    \  }\n}\n```\n\n## 网络内核扩展（Network Kernel Extensions）\n\n内核支持通过网络内核扩展（NKE）机制在多个层次上扩展网络栈。NKE\
    \ 与常规的 KEXT 没有区别；它只是一个用于描述与网络栈交互或扩展网络栈的 KEXT 的术语。\n\n因此，NKE 也可以在运行时动态加载和卸载。NKE\
    \ 不属于 I/O Kit，而是位于 BSD 层。NKE 机制是 Mac OS X 独有的，在 BSD UNIX 变体（如 FreeBSD）中不存在。\n\n\
    NKE 可用于多种目的。一些使用示例包括但不限于以下方面：\n\n*   自定义防火墙或安全机制，例如加密\n*   添加对新协议的支持\n*   添加对新网络接口的支持\n\
    *   创建虚拟网络接口\n*   创建自定义路由方案\n*   延迟、修改、检查或阻止网络数据包\n*   调试网络栈和驱动程序\n\nNKE 通常使用以下\
    \ KPI/过滤机制之一：\n\n*   **套接字过滤器：** 允许在套接字层的各个点插入过滤器，可以过滤入站和出站流量以及带外通信。它可以过滤套接字 API\
    \ 支持的大多数协议。可以修改、延迟或拒绝流量。\n*   **IP 过滤器：** 允许过滤 IP 版本 4 和 6 的流量。\n*   **接口过滤器：**\
    \ 允许在特定网络接口上监控和修改流量。由于这发生在网络栈的末端，所有发往该接口的协议和流量都将是可见的。\n*   **接口 KPI：** 用于创建新网络接口的编程接口。\n\
    *   **协议管道：** 提供连接网络协议和网络接口的粘合剂。\n\n### 内核控制 KPI\n\n内核控制接口 `<sys/kern_control.h>`\
    \ 是一个 KPI，它允许 KEXT 与用户空间进程进行双向通信。该机制通常与 NKE 结合使用，以允许用户空间程序控制和配置 KEXT。关于内核控制 KPI\
    \ 的完整讨论将在第 17 章中提供。\n"
- fmt: "### Socket Filters\n\nA socket filter is a powerful mechanism that allows\
    \ intercepting of network and IPC traffic in the kernel's socket layer. The socket\
    \ layer (and hence the socket filter) is situated between user space and the network\
    \ protocol stack in the kernel. Because of this, socket filters cannot peek at\
    \ the IP or TCP header of an outgoing network packet because that happens later\
    \ in the processing chain. However, it is still possible to filter IP-based traffic\
    \ using a socket filter, as metadata, such as the IP address the packet is destined\
    \ for, is known. The same is true for incoming traffic. The protocol stack will\
    \ strip header information before it enters the socket layer. In effect, we are\
    \ seeing the reassembled data that will eventually be read by a user space application.\
    \ Because of this, a socket filter is not suitable for use when information from\
    \ protocol headers is required, and one should use the lower level IP or interface\
    \ filters instead.\n\nAnother thing to note is that a socket filter cannot filter\
    \ traffic from protocols that are not initiated through the socket API, because\
    \ some auxiliary protocols are handled directly in the protocol stack. An example\
    \ would be ARP and RARP requests, which are handled by the kernel and aren't usually\
    \ initiated by a user application but rather happen as a side effect of some other\
    \ type of traffic. The socket API is most commonly used by user space applications\
    \ or libraries, however, as previously mentioned, a socket KPI also exists, allowing\
    \ the kernel to use socket communication in much the same way as user space. Kernel-initiated\
    \ sockets can also be filtered.\n\nThe socket interface isn't restricted to just\
    \ filtering data packets. It can also intercept out-of-band communication, such\
    \ as calls to socket-related system calls like `bind()` and `listen()`.\n\nA socket\
    \ filter is registered by filling out desired callbacks in the `sflt_filter` structure,\
    \ as shown in [Listing 13-2](#Chapter13.html#list_13_2).\n\n**Listing 13-2.**\
    \ The `sflt_filter` Structure Used to Register a Socket Filter (`kpi_socketfilter.h`)\n\
    \n```\nstruct sflt_filter {\n        sflt_handle                       sf_handle;\n\
    \        int                               sf_flags;\n        char           \
    \                  *sf_name;\n        sf_unregistered_func              sf_unregistered;\n\
    \        sf_attach_func                    sf_attach;\n        sf_detach_func\
    \                    sf_detach;\n        sf_notify_func                    sf_notify;\n\
    \        sf_getpeername_func               sf_getpeername;\n        sf_getsockname_func\
    \               sf_getsockname;\n        sf_data_in_func                   sf_data_in;\n\
    \        sf_data_out_func                  sf_data_out;\n        sf_connect_in_func\
    \                sf_connect_in;\n        sf_connect_out_func               sf_connect_out;\n\
    \        sf_bind_func                      sf_bind;\n        sf_setoption_func\
    \                 sf_setoption;\n        sf_getoption_func                 sf_getoption;\n\
    \        sf_listen_func                    sf_listen;\n        sf_ioctl_func \
    \                    sf_ioctl;\n        struct sflt_filter_ext {\n           \
    \     unsigned int              sf_ext_len;\n                sf_accept_func  \
    \          sf_ext_accept;\n                void                     *sf_ext_rsvd[5];\
    \        /* Reserved */\n        } sf_ext;\n#define sf_len                   \
    \         sf_ext.sf_ext_len\n#define sf_accept                         sf_ext.sf_ext_accept\n\
    };\n```\n\nAs you can see, there are quite a few callbacks, but only a few, such\
    \ as `sf_attach` and `sf_detach`, are mandatory. Non-mandatory callbacks not needed\
    \ by a filter can be set to `NULL`. A socket filter can operate in two modes;\
    \ which mode is used depends on the flags set in the `sf_flags` field. There are\
    \ two possible values:\n\n- `SFLT_GLOBAL` – If set, the filter attaches itself\
    \ to every socket that matches the protocol domain and protocol specified when\
    \ the filter was registered. Once registered, the filter will be invoked for every\
    \ new socket created matching the criteria.\n- `SFLT_PROG` – The filter will be\
    \ activated, only if an owner of the socket specifically requests it, by using\
    \ the `SO_NKE` socket option to the `setsockopt()` system call.\n\nThe first field\
    \ of the structure `sf_handle` is used to identify the filter to clients when\
    \ the filter is operating in programmatic mode (`SFLT_PROG` is set). It is also\
    \ used to deregister the socket filter after use. The handle consists of a four-character\
    \ sequence, which should be unique. Apple provides a registration process to apply\
    \ for a unique character sequence called a creator code. The `sft_name` field\
    \ is used for debug purposes and is commonly set to the bundle ID of the containing\
    \ KEXT, but it can be anything.\n\nA socket filter is registered with the system\
    \ using the `sflt_register()` function."
  raw: '#### Socket Filters


    A socket filter is a powerful mechanism that allows intercepting of network and
    IPC traffic in the kernel''s socket layer. The socket layer (and hence the socket
    filter) is situated between user space and the network protocol stack in the kernel.
    Because of this, socket filters cannot peek at the IP or TCP header of an outgoing
    network packet because that happens later in the processing chain. However, it
    is still possible to filter IP-based traffic using a socket filter, as metadata,
    such as the IP address the packet is destined for, is known. The same is true
    for incoming traffic. The protocol stack will strip header information before
    it enters the socket layer. In effect, we are seeing the reassembled data that
    will eventually be read by a user space application. Because of this, a socket
    filter is not suitable for use when information from protocol headers is required,
    and one should use the lower level IP or interface filters instead.


    Another thing to note is that a socket filter cannot filter traffic from protocols
    that are not initiated through the socket API, because some auxiliary protocols
    are handled directly in the protocol stack. An example would be ARP and RARP requests,
    which are handled by the kernel and aren''t usually initiated by a user application
    but rather happen as a side effect of some other type of traffic. The socket API
    is most commonly used by user space applications or libraries, however, as previously
    mentioned, a socket KPI also exists, allowing the kernel to use socket communication
    in much the same way as user space. Kernel-initiated sockets can also be filtered.


    The socket interface isn''t restricted to just filtering data packets. It can
    also intercept out-of-band communication, such as calls to socket-related system
    calls like `bind()` and `listen()`.


    A socket filter is registered by filling out desired callbacks in the `sflt_filter`
    structure, as shown in [Listing 13-2](#Chapter13.html#list_13_2).


    ***Listing 13-2.** The sflt_filter Structure Used to Register a Socket Filter
    (kpi_socketfilter.h)*


    `struct sflt_filter {`

    `        sflt_handle                       sf_handle;`

    `        int                               sf_flags;`

    `        char                             *sf_name;`

    `        sf_unregistered_func              sf_unregistered;`

    `        sf_attach_func                    sf_attach;`

    `        sf_detach_func                    sf_detach;`

    `        sf_notify_func                    sf_notify;`

    `        sf_getpeername_func               sf_getpeername;`

    `        sf_getsockname_func               sf_getsockname;`

    `        sf_data_in_func                   sf_data_in;`

    `        sf_data_out_func                  sf_data_out;`

    `        sf_connect_in_func                sf_connect_in;`

    `        sf_connect_out_func               sf_connect_out;`

    `        sf_bind_func                      sf_bind;`

    `        sf_setoption_func                 sf_setoption;`

    `        sf_getoption_func                 sf_getoption;`

    `        sf_listen_func                    sf_listen;`

    `        sf_ioctl_func                     sf_ioctl;`

    `        struct sflt_filter_ext {`

    `                unsigned int              sf_ext_len;`

    `                sf_accept_func            sf_ext_accept;`

    `                void                     *sf_ext_rsvd[5];        /* Reserved
    */`

    `        } sf_ext;`

    `#define sf_len                            sf_ext.sf_ext_len`

    `#define sf_accept                         sf_ext.sf_ext_accept`

    `};`


    As you can see, there are quite a few callbacks, but only a few, such as `sf_attach`
    and `sf_detach`, are mandatory. Non-mandatory callbacks not needed by a filter
    can be set to `NULL`. A socket filter can operate in two modes; which mode is
    used depends on the flags set in the `sf_flags` field. There are two possible
    values:


    *   `SFLT_GLOBAL` If set, the filter attaches itself to every socket that matches
    the protocol domain and protocol specified when the filter was registered. Once
    registered, the filter will be invoked for every new socket created matching the
    criteria.

    *   `SFLT_PROG` The filter will be activated, only if an owner of the socket specifically
    requests it, by using the `SO_NKE` socket option to the `setsockopt()` system
    call.


    The first field of the structure `sf_handle` is used to identify the filter to
    clients when the filter is operating in programmatic mode (`SFLT_PROG` is set).
    It is also used to deregister the socket filter after use. The handle consists
    of a four-character sequence, which should be unique. Apple provides a registration
    process to apply for a unique character sequence called a creator code. The `sft_name`
    field is used for debug purposes and is commonly set to the bundle ID of the containing
    KEXT, but it can be anything.


    A socket filter is registered with the system using the `sflt_register()` function.'
  trans: "\n### Socket 过滤器\n\nSocket 过滤器是一种强大的机制，允许在内核的 socket 层拦截网络和 IPC 流量。Socket\
    \ 层（因此也包括 socket 过滤器）位于用户空间与内核中的网络协议栈之间。正因如此，socket 过滤器无法窥探传出网络数据包的 IP 或 TCP 头部，因为这些操作发生在处理链的更下游。不过，仍然可以使用\
    \ socket 过滤器对基于 IP 的流量进行过滤，因为诸如数据包目标 IP 地址之类的元数据是已知的。传入流量也是如此：协议栈会在数据进入 socket\
    \ 层之前剥离头部信息。实际上，我们看到的是最终会被用户空间应用程序读取的重组数据。因此，当需要协议头部信息时，socket 过滤器并不适用，此时应改用更低层次的\
    \ IP 或接口过滤器。\n\n另需注意，socket 过滤器无法过滤那些不通过 socket API 启动的协议流量，因为某些辅助协议是由协议栈直接处理的。例如\
    \ ARP 和 RARP 请求，它们由内核处理，通常不是由用户应用程序发起，而是作为其他类型流量的副作用而发生的。Socket API 最常被用户空间应用程序或库使用，然而如前所述，也存在一个\
    \ socket KPI，允许内核以与用户空间类似的方式使用 socket 通信。内核发起的 socket 同样可以被过滤。\n\nSocket 接口不仅限于过滤数据包。它还可以拦截带外通信，例如对\
    \ `bind()` 和 `listen()` 这类与 socket 相关的系统调用的调用。\n\n通过填写 `sflt_filter` 结构体中的所需回调函数来注册一个\
    \ socket 过滤器，如代码清单 13-2 所示。\n\n**代码清单 13-2.** 用于注册 Socket 过滤器的 `sflt_filter` 结构体\
    \ (`kpi_socketfilter.h`)\n\n```\nstruct sflt_filter {\n        sflt_handle   \
    \                    sf_handle;\n        int                               sf_flags;\n\
    \        char                             *sf_name;\n        sf_unregistered_func\
    \              sf_unregistered;\n        sf_attach_func                    sf_attach;\n\
    \        sf_detach_func                    sf_detach;\n        sf_notify_func\
    \                    sf_notify;\n        sf_getpeername_func               sf_getpeername;\n\
    \        sf_getsockname_func               sf_getsockname;\n        sf_data_in_func\
    \                   sf_data_in;\n        sf_data_out_func                  sf_data_out;\n\
    \        sf_connect_in_func                sf_connect_in;\n        sf_connect_out_func\
    \               sf_connect_out;\n        sf_bind_func                      sf_bind;\n\
    \        sf_setoption_func                 sf_setoption;\n        sf_getoption_func\
    \                 sf_getoption;\n        sf_listen_func                    sf_listen;\n\
    \        sf_ioctl_func                     sf_ioctl;\n        struct sflt_filter_ext\
    \ {\n                unsigned int              sf_ext_len;\n                sf_accept_func\
    \            sf_ext_accept;\n                void                     *sf_ext_rsvd[5];\
    \        /* 保留 */\n        } sf_ext;\n#define sf_len                         \
    \   sf_ext.sf_ext_len\n#define sf_accept                         sf_ext.sf_ext_accept\n\
    };\n```\n\n如你所见，回调函数相当多，但只有少数几个是强制性的，例如 `sf_attach` 和 `sf_detach`。过滤器不需要的非强制性回调可设置为\
    \ `NULL`。Socket 过滤器可运行于两种模式；具体使用哪种模式取决于 `sf_flags` 字段中设置的标志。有两个可能的值：\n\n- `SFLT_GLOBAL`\
    \ – 如果设置此标志，过滤器会将自己附加到与注册过滤器时指定的协议域和协议相匹配的每个 socket 上。一旦注册，过滤器将被针对每个新创建的、符合标准的\
    \ socket 所调用。\n- `SFLT_PROG` – 仅当 socket 的所有者通过使用 `setsockopt()` 系统调用的 `SO_NKE`\
    \ socket 选项明确请求时，过滤器才会被激活。\n\n结构体的第一个字段 `sf_handle` 用于在过滤器以编程模式运行（设置了 `SFLT_PROG`）时向客户端标识该过滤器。它还用于在使用后注销\
    \ socket 过滤器。该句柄由四个字符的序列组成，且应保证唯一。Apple 提供了一种注册流程以申请唯一的字符序列，称为创建者代码。`sft_name`\
    \ 字段用于调试目的，通常设置为包含该 KEXT 的 bundle ID，但也可以是任意内容。\n\n使用 `sflt_register()` 函数向系统注册一个\
    \ socket 过滤器。\n"
- fmt: '### Building an Application-Level Firewall Using Socket Filters


    To better understand how the socket filter mechanism works, let''s look at an
    example of what it can be used for. While Mac OS X ships with an application-level
    firewall already (`ALF.kext`), we will do a very simplistic version to demonstrate
    the power of socket filters. The `AppWall` architecture consists of an NKE KEXT,
    which contains the socket filter. `AppWall` will solve the problem of preventing
    unauthorized programs from accessing the network. The socket filter can also log
    information about data transferred in either direction for a specified program,
    without interfering with its operation. Because `AppWall` will be proof-of-concept,
    we will limit it to support IP version 4 using the TCP protocol.


    Let''s get started by defining the socket filter:


    ```

    #define APPWALL_FLT_TCP_HANDLE       ''apw0''      // codes should registered
    with Apple


    static struct sflt_filter socket_tcp_filter = {

            APPWALL_FLT_TCP_HANDLE,

            SFLT_GLOBAL,

            “com_osxkernel_AppWall”,

            appwall_unregistered,

            appwall_attach,

            appwall_detach,

            NULL,

    ...

            appwall_data_in,

            appwall_data_out,

            appwall_connect_in,

            appwall_connect_out,

            NULL,

    ...

    };

    ```


    ![images](images/square.jpg) **Tip** The unabridged source for `AppWall` will
    be made available on the publisher''s website: [`www.apress.com`](http://www.apress.com).


    Because of our requirements, we have left out a number of function pointers as
    `NULL`, as they are not relevant to our filter''s design. If you wish, you can
    easily modify `AppWall` to implement these as well.


    Let''s have a look at how we register the filter:


    ```

    kern_return_t AppWall_start (kmod_info_t * ki, void * d)

    {

    ...

       ret = sflt_register(&socket_tcp_filter, PF_INET, SOCK_STREAM, IPPROTO_TCP);

        if (ret != KERN_SUCCESS)

            goto bail;


        add_entry("ssh", 1);    // block the ssh application.

        add_entry("nc", 0);     // log data from the nc application.


        g_filter_registered = TRUE;

    ...

    }

    ```


    For brevity, we have left out general housekeeping code, such as allocating locks
    or error handling. Once the `sflt_register()` function returns, the filter may
    be active and we may start seeing our callbacks invoked. Therefore, it is vital
    that any needed resources, such as locks, are initialized prior to registering
    the filter.


    The `sflt_register()` function takes four arguments:


    - The pointer to the socket filter structure, as mentioned earlier.

    - The protocol domain, which we specify as `PF_INET`, which is the IP version
    4 family.

    - The type. We specify `SOCK_STREAM`, which refers to a full duplex stream-based
    socket.

    - And finally the protocol, which we specify as `IPPROTO_TCP`.


    ![images](images/square.jpg) **Tip** The domain, type and protocol values are
    the same as those used in the user space socket API. Check the `man 2 socket`
    manual page for more details about available domains, types, and protocols.


    If you wish to handle other protocols, such as UDP, a second call to `sflt_register()`
    is needed. Each registered filter needs its own unique handle, so you will need
    to declare a second structure for the UDP filter. If desired, the second structure
    may share some or all callbacks with the first.


    The last step is to add some entries to our list of blocked/monitored applications
    using the `AppWall` `add_entry()` function. In a real NKE, you would most likely
    have a kernel control that allowed a user space utility to configure this instead
    of hard coding. The `add_entry()` function creates an `appwall_entry` structure,
    as shown in [Listing 13-3](#Chapter13.html#list_13_3).


    ### AppWall Operation and Data Structures


    Before we start implementing the filter callbacks, we need to declare data structures
    to store information collected from the filter. We declare the data structures
    in a shared header file, which can be used by a user space utility in the future,
    but for now, is only used by the `AppWall` KEXT. The data structure is shown in
    [Listing 13-3](#Chapter13.html#list_13_3).


    **Listing 13-3.** `AppWall` Header File


    ```

    #define BUNDLE_ID   "com.osxkernel.AppWall"


    struct app_descriptor

    {

        char name[PATH_MAX];

        unsigned long bytes_in;

        unsigned long bytes_out;

        unsigned long packets_in;

        unsigned long packets_out;

        int           do_block;

        int           outbound_blocked;

        int           inbound_blocked;


    };


    #if defined (KERNEL)

    struct appwall_entry

    {

        TAILQ_ENTRY(appwall_entry)   link;

        struct app_descriptor        desc;

        int                          users;  

    };

    #endif


    #endif

    ```


    The first structure `app_descriptor` is used to hold the name of an application
    to be blocked or monitored. Entries with the `do_block` field set to non-zero
    are blocked, whereas a zero value means we will simply collect and report statistics
    for it.


    We use the name of the application and not a process identifier (PID) to track
    every instance of that program. While this is not secure, because you can bypass
    by renaming the executable, it is fine for the sake of example.


    The field `do_block` will be non-zero, if we wish to block this particular application;
    if it is zero, we will instead collect statistics only. If we see a socket from
    an application for which no `appwall_entry` exists, our filter will ignore it.'
