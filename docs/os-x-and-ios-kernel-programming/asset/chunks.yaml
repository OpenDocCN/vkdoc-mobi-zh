    The other part of data transfer is reading bytes that have been received from
    the hardware serial port. A serial driver will obtain data that has been received
    from its hardware device and copy it into its internal receive buffer. The exact
    means by which the hardware will notify the serial driver that data has been received
    will be implementation-specific, but may be signaled by a PCI interrupt or the
    completion of a USB transaction. The driver now needs to pass the received data
    on to the `IOSerialBSDClient`, which in turn will provide the data to a user space
    process.


    The I/O Kit uses a pull model to return data from the serial driver to the `IOSerialBSDClient`
    class. The `IOSerialBSDClient` will call the driver''s `dequeueData()` method
    to obtain data that has been received on the hardware serial port; the signature
    for this method is as follows:


    `IOReturn    dequeueData(UInt8* buffer, UInt32 size, UInt32* count, UInt32 min,
    void* refCon);`


    Upon receiving this method, the serial driver should copy data from its internal
    receive buffer to the provided parameter `buffer`. The parameter `size` describes
    the maximum number of bytes that the provided buffer can hold. The parameter `count`
    is used to return the actual number of bytes that were written to the provided
    buffer. The caller can request that the `dequeueData()` method block and not return
    to the caller until a minimum number of bytes are available; this is done by specifying
    a non-zero value in the `min` parameter, which provides the minimum number of
    bytes that the caller should return.


    Rather than continually polling the `dequeueData()` method until data is available,
    the `IOSerialBSDClient` class will specify a minimum read size of 1 byte. The
    effect of this is to block in the call to `dequeueData()` but have the method
    return immediately as soon as the serial port has received data. The `AppleUSBCDCDMM`
    serial port driver implements this method by calling through to the `watchState()`
    method, and waiting until the `PD_S_RXQ_EMPTY` state is clear, indicating that
    data is available in the driver''s receive buffer. An advantage of this design
    is that it ensures that the driver will unblock a wait in the `dequeueData()`
    method when the serial port is closed, since the `watchState()` method will abort
    if the `PD_S_ACTIVE` flag is ever cleared (which happens when the user process
    closes the serial port).


    A sample implementation of the `dequeueData()` method is given in [Listing 11-7](#Chapter11.html#list_11_7).
    This implementation copies data out of the driver''s internal receive buffer and
