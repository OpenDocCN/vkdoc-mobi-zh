    resource that this completion callback refers to. The second parameter, `result`,
    informs the caller whether the operation was completed successfully. If the value
    of `result` is `kIOReturnSuccess`, the resource data has been successfully read
    from the disk and the next two parameters, `resourceData` and `resourceDataLength`,
    contain the contents of the requested resource file. The `resourceData` buffer
    is valid only within the callback, so if the driver wishes to refer to the resource
    data outside the callback, it must make a copy of the data. The final parameter,
    `context`, contains the value of the context parameter that was passed to the
    `OSKextRequestResource` function.


    The remaining step is to add the resource file to the driver''s bundle. Any resource
    loaded through the `OSKextRequestResource` function must be present in the `Resources`
    subdirectory of the driver''s bundle. In most cases, this can be achieved by adding
    the file to the Xcode project for the driver. For file types other than source
    code, Xcode will default to copying the file to the bundle''s resource directory
    when the project is built.


    ## Beyond KEXT Resources


    The resource loading functions discussed in the previous section are designed
    for a specific purpose. The I/O Kit functions provide a driver with read-only
    access to the contents of a file within its `Resources` directory. However, there
    are many situations where it is useful for a driver to access a file outside of
    its bundle and to write to a file on disk. For example, a driver that provides
    persistent settings will need some way to read those settings from a file on disk.
    It will also need a way to write those settings to disk.


    Although the I/O Kit contains no functions that provide such functionality to
    a driver, its implementation of the resource loading functions provides us with
    a hint of how we might add such functionality to our own drivers. Just as the
    I/O Kit relies upon a user space daemon process to load resource files on behalf
    of the kernel, a driver can implement the reading and writing of its persistent
    settings from a file on disk by providing its own user space daemon process to
    handle requests on its behalf. This design, covered in the following section,
    opens up a more general solution that can be extended beyond driver preferences.


    ## Notifications from Kernel Drivers


    A general solution to the problem of accessing arbitrary file system items from
    a kernel driver is to implement a user space daemon process that acts as a helper
    process on behalf of the kernel driver. This process will handle requests from
    the driver, perform the specified operation, and then pass the result of the operation
    back to the driver. This approach can be extended beyond requests such as reading
    and writing files, and can be used to perform operations that are not possible
    within the kernel, such as displaying a dialog to the user. A good example of
    user interaction that originates from the kernel is the standard USB family, which
    presents a warning dialog if a device is connected that requires more power than
    the USB bus can deliver.


    ![images](images/square.jpg)


    **Note:** The `IOUSBFamily` currently uses a deprecated interface known as the
    Kernel-User Notification Center to display alert messages, such as the lower power
    warning. The I/O Kit used to provide an API that allowed a driver to display a
    dialog box through a standard system daemon process. However, this API is now
    deprecated and a driver must now provide its own daemon process.


    Any operation that a driver wishes to perform that is not possible within the
    kernel, such as writing to a file, displaying an error message, or even launching
    an application, can be performed through a user space daemon process. In effect,
    the driver code is split into two parts: the kernel driver and the user space
    daemon. This design uses the same techniques that were discussed in [Chapter 5](#Chapter05.html#ch5).
    However, instead of the user launching the user space process, the process will
    be a background daemon that is launched automatically by the system.


    The user space daemon process and the driver work together to perform certain
    operations. Most of the time, the user space daemon is idle. It only acts when
    it receives a request from the kernel driver. There are three notifications that
    the user space daemon will need to respond to:


    - The arrival of a new kernel driver

    - The unloading of a kernel driver

    - A request to perform an operation from a driver


    Since the daemon process will be launched at system startup, it may be launched
    before its corresponding kernel driver has started. For this reason, the process
    should install a callback to receive notifications when its kernel driver is started
    or is stopped. In most cases, the daemon will have a one-to-many relationship
    with driver instances, and a single daemon will handle requests from all instances
    of its driver that are currently loaded.


    A daemon can watch for instances of its kernel driver arriving and unloading by
    installing a matching dictionary for its driver, as described in [Chapter 5](#Chapter05.html#ch5).
    A process performs the same steps to do this whether it is a background daemon
    or an application with a user interface. The daemon process is able to communicate
    with its kernel driver by sending requests through the driver''s `IOUserClient`
    class, using the functions from the I/O Kit framework that were described in [Chapter
    5](#Chapter05.html#ch5).


    In [Chapter 5](#Chapter05.html#ch5), you saw how a user space process can issue
    requests and send data to a kernel driver. This is important, since this is the
    approach that the daemon will use to send the results of an operation back to
    the kernel driver. Now, we''ll cover how a process receives notifications from
    the kernel, such as a request to perform an operation on behalf of the driver—for
    example, display an error message to the user.


    Communication from the kernel driver to the user space daemon occurs over a mach
    port. The following steps are involved in setting up a communication channel that
    a kernel driver can use to send a notification to a user space process:'
