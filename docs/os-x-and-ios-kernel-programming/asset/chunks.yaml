  trans: '

    ### BSD 层


    与仅提供少量基础服务的 Mach 不同，BSD 层位于 Mach 和用户应用程序之间，基于 Mach 提供的服务实现了许多核心操作系统功能。在 OS X 和
    iOS 中，BSD 层运行在处理器特权模式下，而不是像 Mach 项目最初设想的那样作为用户任务运行。因此，该层没有内存保护，并且与 Mach 和 I/O
    Kit 运行在相同的地址空间中。BSD 层指的是派生自 FreeBSD 5 操作系统的那部分内核，它本身不是一个完整的系统，而是源自该操作系统的一部分代码。


    BSD 层提供服务，例如进程管理、系统调用、文件系统和网络。表 2-6 简要概述了 BSD 层提供的服务。


    ![images](img/t0206.jpg)


    BSD 层在 Mach 提供的服务之上提供了抽象。例如，其进程管理和内存管理是在 Mach 服务之上实现的。


    #### 系统调用


    当应用程序需要文件系统的服务，或者希望访问网络时，它需要向内核发出系统调用。BSD 层实现了所有系统调用。当系统调用处理程序执行时，内核上下文会从用户模式切换到内核模式，以处理应用程序的请求，例如读取文件。此
    API 被称为 `syscall` API，是从用户空间调用内核中函数的传统 Unix API。系统调用有数百个，包括与进程控制相关的调用，例如 `fork()`
    和 `execve()`，或者文件管理调用，例如 `open()`、`close()`、`read()` 和 `write()`。


    BSD 层还提供了 `ioctl()` 函数（它本身就是一个系统调用），该函数是 I/O 控制的缩写，通常用于向设备驱动程序发送命令。提供 `sysctl()`
    函数用于设置或获取各种内核参数，包括但不限于调度器、内存和网络子系统。


    ![images](img/square.jpg) **提示** 可用的系统调用定义在 `/usr/include/sys/syscall.h` 中。


    Mach 陷阱是类似于系统调用的机制，用于跨越内核/用户空间边界。与为应用程序提供直接服务的系统调用不同，Mach 陷阱用于将 IPC 消息从用户空间客户端传送到内核服务器。


    #### 网络


    网络是 XNU 中 BSD 部分的一个主要子系统。BSD 处理网络的大部分方面，例如套接字通信的细节和 TCP/IP 等协议的实现，但与实际硬件设备的低级通信除外，这通常由
    I/O Kit 驱动程序处理。I/O Kit 网络驱动程序将负责处理从网络设备接收的缓冲区、检查它们并确保它们最终到达发起方（例如您的 Web 浏览器）的网络堆栈接口。类似地，BSD
    网络堆栈将接受来自应用程序的出站数据，将数据格式化为数据包，然后路由或分派到适当的网络接口。BSD 还实现了 IPFW 防火墙，它将根据系统管理员设置的策略过滤进出计算机的数据包。


    BSD 网络层支持广泛的网络和传输层协议，包括 IPv4 和 IPv6、TCP 和 UDP。在更高层次上，我们发现了对 BOOTP、DHCP 和 ICMP
    等的支持。其他与网络相关的功能包括路由、桥接和网络地址转换（NAT），以及使用伯克利包过滤器（BPF）的设备级包过滤。


    **网络内核扩展 (NKE)**


    网络内核扩展 KPI（内核编程接口）是一种允许扩展网络堆栈各个部分的机制。NKE 允许定义新协议，并在网络堆栈的各个级别插入钩子或过滤器。例如，可以创建一个过滤器，拦截特定应用程序或用户对某个地址的
    TCP 连接。也可以临时阻止网络数据包，或者在将其传输到更高/更低层级之前修改它们。NKE 源自 Apple，不是传统 BSD 网络堆栈的一部分，但由于其性质，现在它们已与之紧密相连。NKE
    将在第 13 章中讨论。


    #### 文件系统


    内核内置支持一系列不同的文件系统，如表 2-7 所示。Mac OS X 和 iOS 使用的主要文件系统是 HFS+。它是作为 Mac OS 文件系统 HFS
    的替代品而开发的。


    ![images](img/t0207.jpg)


    HFS+ 在 Mac OS X 10.2.2 中获得了对日志的支持。日志通过在执行事务之前将事务记录在*日志*中来提高文件系统的可靠性。这使得文件系统能够抵御诸如断电或内核崩溃等事件，因为可以在重启后重放数据，从而使文件系统恢复到一致状态。


    HFS+ 支持非常大的文件，最大可达 8 EiB（1 Exbibyte = 2⁶⁰ 字节），这也是最大的可能卷大小。该文件系统完全支持文件名中的 Unicode
    字符，并且默认不区分大小写。同时支持 Unix 风格的文件权限和访问控制列表（ACL）。


    #### 虚拟文件系统


    虚拟文件系统（VFS）提供了对特定文件系统（如 HFS+ 和 AFP）的抽象，使应用程序能够使用单一一致的接口访问它们。VFS 允许通过 VFS 内核编程接口（KPI）轻松地将新文件系统作为内核扩展添加支持，而整个操作系统无需了解其实现的任何信息。VFS
    的基本数据结构是 `vnode`。`vnode` 是文件和目录在内核中的表示方式。内核中每个活跃的文件都存在一个 `vnode` 结构。

