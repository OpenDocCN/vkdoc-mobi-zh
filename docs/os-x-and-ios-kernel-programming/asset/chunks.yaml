    IP address all on the same subnet. The network stack is responsible for framing
    the packet, so by the time MyEthernetDriver receives it, it will already have
    an Ethernet frame header attached, where the destination address will be `00:17:f2:0a:86:60`
    and the arbitrarily picked source address `be:ef:fe:ed:12:11` of MyEthernetDriver.
    Most Ethernet based network devices allow sending a packet with a (fake) source
    address that differs from its own. Therefore, if everything is correctly configured,
    we should be able to receive the packet on the remote host received from MyEthernetDriver''s
    MAC and IP address.


    Getting the reply from the remote host back to our driver is somewhat more problematic,
    as the *en0* interface will most likely ignore a frame not addressed to itself.
    To work around this, we will simply enable promiscuous mode on *en0*, which will
    enable it to receive packets not destined to itself. We will then install an interface
    filter on the input queue for *en0* and check whether a packet is addressed to
    it, in which case, we leave it alone, or if it is addressed to MyEthernetDriver,
    steal it and divert it to its input queue instead. The end result is a virtual
    Ethernet bridge/switch. This is conceptually close to how virtual machine software,
    such as Parallels or VMWare fusion, enables a virtual machine guest''s operating
    system to participate on the network in bridged mode. Because we have done this
    at the Ethernet level, the changes are completely transparent to higher-level
    protocols like IP, and we can even use an external DHCP server to obtain an IP
    address for our virtual interface.


    This should leave us with a more or less working device driver, which, for all
    intents and purposes, is able to send and receive actual network traffic and provide
    a good approximation of a real device for us to play with. As much as possible,
    we will hide the fact that this bridging occurs from the driver by putting the
    code in a separate class called `MyEthernetHwAbstraction`. The class will handle
    communication with the “hardware” while the main driver will interface with I/O
    Kit. This design would allow us to quickly swap out the hardware abstraction class
    with one that talks to actual hardware instead. The design would also make it
    possible to subclass the abstraction class so that new variants of the hardware
    can be supported gracefully.


    ![Image](images/square.jpg) **Note**  `MyEthernetDriver` needs a wired Ethernet
    device to piggyback onto. This is because a wireless device generally does not
    allow packets to be transmitted with a source address different from its own.
    This is a limitation of the device''s firmware.


    The header file for MyEthernetDriver is shown in [Listing 13-6](#Chapter13.html#list_13_6).


    ***Listing 13-6.** MyEthernetDriver Header File*


    `#ifndef MyEthernetDriver_h`

    `#define MyEthernetDriver_h`


    `#include <IOKit/assert.h>`

    `#include <IOKit/IOTimerEventSource.h>`

    `#include <IOKit/IOBufferMemoryDescriptor.h>`

    `#include <IOKit/network/IOEthernetController.h>`

    `#include <IOKit/network/IOEthernetInterface.h>`

    `#include <IOKit/network/IOGatedOutputQueue.h>`

    `#include <IOKit/network/IOMbufMemoryCursor.h>`

    `#include <IOKit/network/IONetworkMedium.h>`

    `#include <IOKit/IOUserClient.h>`


    `#include "MyEthernetHwAbstraction.h"`


    `class com_osxkernel_MyEthernetDriver : public IOEthernetController`

    `{`

    `    friend class com_osxkernel_MyEthernetHwAbstraction;`


    `    OSDeclareDefaultStructors(com_osxkernel_MyEthernetDriver);`

    `public:`

    `    virtual bool init(OSDictionary* properties);`

    `    virtual bool start(IOService* provider);`

    `    virtual void stop(IOService* provider);`

    `    virtual void free();`


    `    virtual bool configureInterface(IONetworkInterface* netif);`


    `    virtual IOReturn enable(IONetworkInterface* netif);`

    `    virtual IOReturn disable(IONetworkInterface* netif);`


    `    virtual IOReturn getHardwareAddress(IOEthernetAddress* addrP);`


    `    // Allow our driver''s Mac address to be set`

    `    virtual IOReturn setHardwareAddress(const IOEthernetAddress* addrP);`


    `    virtual UInt32 outputPacket(mbuf_t m, void* param);`


    `    virtual IOReturn setPromiscuousMode(bool active) { return kIOReturnSuccess;
    }`

    `    virtual IOReturn setMulticastMode(bool active) { return kIOReturnSuccess;
    }`


    `    bool createMediumDict();`


    `private:    `


    `    static void  interruptOccured(OSObject* owner, IOTimerEventSource* sender);`


    `    IOTimerEventSource*    fInterruptSource;  // Simulate HW rx interrupt`

    `    IOEthernetInterface*   fNetworkInterface;`

    `    OSDictionary*          fMediumDict;`

    `    IOWorkLoop*            fWorkLoop;`


    `    IONetworkStats*        fNetworkStats;`

    `    IOEthernetStats*       fEthernetStats;`


    `    com_osxkernel_MyEthernetHwAbstraction* fHWAbstraction; // Low-level hardware
    access.`

    `};`


    `#endif`'
  trans: "\n# MyEthernetDriver 的设计\n\n为了理解 `MyEthernetDriver` 的设计背景，假设我们受雇为一种新型以太网设备开发驱动程序。该设备是一个可插入\
    \ Mac 雷雳（Thunderbolt）端口的加密狗。由于这项技术当时尚属新兴，获取所需部件有所延迟，因此我们暂时无法拿到实际设备。虽然我们都希望能整天上网冲浪还能领薪水，但毕竟还是要靠本事吃饭。所以在没有实际设备的情况下，我们就开始着手开发驱动程序。我们的目标是尽可能实现那些无需硬件设备就能完成的功能。然而，我们很快意识到，以太网设备的一个主要组成部分是处理实际的网络\
    \ I/O。虽然你可以很快构建一个虚拟设备驱动程序，为其分配一个 IP 地址，并开始与之通信，但这里有一个主要问题：发往同一主机上另一个接口或自身接口的网络数据包实际上根本不会被转发到该设备，而是会在协议栈内部循环，不会涉及\
    \ I/O Kit 驱动程序。I/O Kit 是专门设计来与实际硬件设备交互的，因此，如果你需要一个虚拟网络接口，BSD 层才是实现它的最佳位置。\n\n\
    我们解决这个问题的方法是将我们的虚拟以太网设备挂载到一个真实的以太网接口上，并利用它来代我们发送和接收数据包。其设置方案类似于 图 13-6 中的示意图。\n\
    \n![images](img/1306.jpg)\n\n**图 13-6.** MyEthernetDriver 测试设置\n\n当 `MyEthernetDriver`\
    \ 从网络协议栈接收到一个数据包时，它会将该数据包排队，然后通过连接到物理网络交换机的 `en0` 接口将数据包发送到网络上。如果你没有网络交换机，你可以使用一根直通\
    \ cat5 网线直接连接到远程机器来进行测试。测试设置中的每个接口都配置了各自位于同一子网的 IP 地址。网络协议栈负责封装数据包，因此当 `MyEthernetDriver`\
    \ 收到数据包时，它已经带有一个以太网帧头，其中的目标地址是 `00:17:f2:0a:86:60`，而源地址是 `MyEthernetDriver` 随机选取的\
    \ `be:ef:fe:ed:12:11`。大多数基于以太网的网络设备都允许发送带有与自己不同的（虚假）源地址的数据包。因此，如果一切配置正确，我们应该能够在远程主机上接收到来自\
    \ `MyEthernetDriver` 的 MAC 和 IP 地址的数据包。\n\n让远程主机的回复回到我们的驱动程序则更棘手一些，因为 `en0` 接口很可能会忽略不是发给自己地址的帧。为了解决这个问题，我们只需在\
    \ `en0` 上启用混杂模式，这将使其能够接收并非发给自己地址的数据包。然后，我们将在 `en0` 的输入队列上安装一个接口过滤器，检查数据包是否发往它自己——如果是，我们就放行；如果是发往\
    \ `MyEthernetDriver` 的，我们则将其截取并转而导入到 `MyEthernetDriver` 的输入队列。最终结果是一个虚拟的以太网桥接器/交换机。这在概念上接近于虚拟机软件（如\
    \ Parallels 或 VMWare Fusion）如何让客户操作系统以桥接模式参与网络。由于我们在以太网层面实现了这一点，这些更改对于像 IP 这样的上层协议是完全透明的，我们甚至可以使用外部\
    \ DHCP 服务器为我们的虚拟接口获取 IP 地址。\n\n这应该能给我们留下一个或多或少能正常工作的设备驱动程序，它实际上能够发送和接收真实的网络流量，并为我们提供一个良好近似于真实设备的操作环境。我们将尽可能通过把相关代码放到一个名为\
    \ `MyEthernetHwAbstraction` 的独立类中，来向驱动程序隐藏这种桥接操作的发生。该类将负责与“硬件”的通信，而主驱动程序则与 I/O\
    \ Kit 交互。这种设计使得我们能够快速地将硬件抽象类替换为与实际硬件通信的类。此外，该设计还允许对抽象类进行子类化，以便能够优雅地支持硬件的新变种。\n\
    \n![Image](img/square.jpg) **注意**  `MyEthernetDriver` 需要一个有线以太网设备来挂载。这是因为无线设备通常不允许发送源地址与自身不同的数据包。这是设备固件的局限性。\n\
    \n`MyEthernetDriver` 的头文件如 代码清单 13-6 所示。\n\n**代码清单 13-6.** MyEthernetDriver 头文件\n\
    \n```\n#ifndef MyEthernetDriver_h\n#define MyEthernetDriver_h\n\n#include <IOKit/assert.h>\n\
    #include <IOKit/IOTimerEventSource.h>\n#include <IOKit/IOBufferMemoryDescriptor.h>\n\
    #include <IOKit/network/IOEthernetController.h>\n#include <IOKit/network/IOEthernetInterface.h>\n\
    #include <IOKit/network/IOGatedOutputQueue.h>\n#include <IOKit/network/IOMbufMemoryCursor.h>\n\
    #include <IOKit/network/IONetworkMedium.h>\n#include <IOKit/IOUserClient.h>\n\n\
    #include \"MyEthernetHwAbstraction.h\"\n\nclass com_osxkernel_MyEthernetDriver\
    \ : public IOEthernetController\n{\n    friend class com_osxkernel_MyEthernetHwAbstraction;\n\
    \n    OSDeclareDefaultStructors(com_osxkernel_MyEthernetDriver);\npublic:\n  \
    \  virtual bool init(OSDictionary* properties);\n    virtual bool start(IOService*\
    \ provider);\n    virtual void stop(IOService* provider);\n    virtual void free();\n\
    \n    virtual bool configureInterface(IONetworkInterface* netif);\n\n    virtual\
    \ IOReturn enable(IONetworkInterface* netif);\n    virtual IOReturn disable(IONetworkInterface*\
    \ netif);\n\n    virtual IOReturn getHardwareAddress(IOEthernetAddress* addrP);\n\
    \n    // 允许设置我们驱动程序的 Mac 地址\n    virtual IOReturn setHardwareAddress(const IOEthernetAddress*\
    \ addrP);\n\n    virtual UInt32 outputPacket(mbuf_t m, void* param);\n\n    virtual\
    \ IOReturn setPromiscuousMode(bool active) { return kIOReturnSuccess; }\n    virtual\
    \ IOReturn setMulticastMode(bool active) { return kIOReturnSuccess; }\n\n    bool\
    \ createMediumDict();\n\nprivate:    \n\n    static void  interruptOccured(OSObject*\
    \ owner, IOTimerEventSource* sender);\n\n    IOTimerEventSource*    fInterruptSource;\
    \  // 模拟硬件接收中断\n    IOEthernetInterface*   fNetworkInterface;\n    OSDictionary*\
    \          fMediumDict;\n    IOWorkLoop*            fWorkLoop;\n\n    IONetworkStats*\
    \        fNetworkStats;\n    IOEthernetStats*       fEthernetStats;\n\n    com_osxkernel_MyEthernetHwAbstraction*\
    \ fHWAbstraction; // 底层硬件访问\n};\n\n#endif\n```\n"
- fmt: "### Driver Initialization and Startup\n\nNetwork drivers follow the usual\
    \ `IOService` lifecycle. Initialization of a driver and the device happens in\
    \ the driver's `start()` method. For a typical device, the following steps may\
    \ be performed:\n\n1.  Configure the device's provider and enumerate any needed\
    \ resources. For PCI or Thunderbolt, this means mapping device memory or I/O regions.\
    \ For USB devices, enumerate interfaces and pipes.\n2.  Configure the device for\
    \ operation—for example, take it out of sleep state by accessing the device's\
    \ registers or sending control requests.\n3.  Extract information from the device,\
    \ such as the MAC address, and information about the device's capabilities, like\
    \ supported media and speeds. Many Ethernet devices support the *Media Independent\
    \ Interface* (MII) bus, which is a standard for accessing device status, information,\
    \ and configuration in a consistent manner, decoupled from the part of the device\
    \ that is concerned with physical transmission (usually referred to as the PHY).\
    \ The MII registers contain information about the link status, supported network\
    \ speeds, error reporting, and more. Gigabit or 10 Gigabit Ethernet devices are\
    \ supported by the GMII and XGMII specifications, respectively. MII, GMII, and\
    \ XGMII are all IEEE standards. These standards do not, however, dictate how the\
    \ DMA engine is implemented or how I/O to the device should occur.\n4.  Allocate\
    \ and configure `IOInterruptEventSource` or `IOTimerEventSources` as needed, depending\
    \ on requirements and underlying hardware. Many network devices use a software\
    \ timer as a watchdog timer to continuously monitor the device for fault and attempt\
    \ to reset the device should a fault occur.\n5.  Instantiate and register an instance\
    \ of `IOEthernetInterface`, which will make our network controller visible to\
    \ the BSD networking stack and the rest of the system.\n\nThe `start()` method\
    \ for `MyEthernetDriver` is shown in [Listing 13-7](#Chapter13.html#list_13_7).\n\
    \n**Listing 13-7.** *MyEthernetDriver's* `start()` *Method*\n\n```\nbool com_osxkernel_MyEthernetDriver::start(IOService*\
    \ provider)\n{    \n    if (!super::start(provider))\n        return false;\n\n\
    \    fHWAbstraction = new com_osxkernel_MyEthernetHwAbstraction();\n    if (!fHWAbstraction)\n\
    \        return false;\n    if (!fHWAbstraction->init(this))\n        return false;\n\
    \n    if (!createMediumDict())\n        return false;\n\n    fWorkLoop = getWorkLoop();\n\
    \    if (!fWorkLoop)\n        return false;\n    fWorkLoop->retain();\n\n    if\
    \ (attachInterface((IONetworkInterface**)&fNetworkInterface) == false)\n     \
    \   return false;\n\n    fNetworkInterface->registerService();\n\n    fInterruptSource\
    \ = IOTimerEventSource::timerEventSource(this, interruptOccured);\n    if (!fInterruptSource)\n\
    \        return false;\n\n    if (fWorkLoop->addEventSource(fInterruptSource)\
    \ != kIOReturnSuccess)\n        return false;\n\n    IOLog(\"%s::start() -> success\\\
    n\", getName());\n    return true;\n}\n```\n\nWhat needs to be done in the `start()`\
    \ method is entirely dependent on the device's capabilities. In this case, we\
    \ do not have a provider representing a hardware device, so we can bypass opening\
    \ the provider. The next step performed is to allocate an instance of the class\
    \ `com_osxkernel_MyEthernetHwAbstraction` and initialize it. The class contains\
    \ code to interface with the hardware device, such as methods to read its registers\
    \ and setup I/O transfers. In our case it instead contains code that allows us\
    \ to piggyback on another device. This step is not technically required—you could\
    \ easily all code in the main driver. However, we made the design decision so\
    \ that in the future, when the *“MyEthernetDevice 2000 Pro”* becomes available,\
    \ we can simply handle the hardware differences by inheriting from our existing\
    \ hardware abstraction class. This allows the main driver to be kept clean and\
    \ makes it easy to support several hardware variants with the same driver. We\
    \ will look at the hardware abstraction class shortly.\n\nAfter the “hardware”\
    \ is initialized, we call the `createMedium()` function to publish details about\
    \ which transmission standards and speeds our device support. We will discuss\
    \ this process further in the next section.\n\nThe next method called is `attachInterface()`,\
    \ which will return an instance of an `IONetworkInterface` class, which provides\
    \ the glue that exposes our driver to the kernel network layer. In our case, the\
    \ returned instance will be an `IOEthernetInterface` instance. If you need to\
    \ subclass `IOEthernetInterace` for any reason, you can override `IONetworkController::createInterface()`,\
    \ which is called by `attachInterface()` internally to allocate the overrided\
    \ class instead. Before `attachInterface()` returns, it will also call `IONetworkController::configureInterface()`,\
    \ which you can also override to perform additional configuration for the interface\
    \ class. `MyEthernetDriver` implements the `configureInterface()` method as follows:\n\
    \n```\nbool com_osxkernel_MyEthernetDriver::configureInterface(IONetworkInterface\
    \ *netif)\n{\n    IONetworkData* nd;\n\n    if (super::configureInterface(netif)\
    \ == false)\n        return false;\n\n    nd = netif->getNetworkData(kIONetworkStatsKey);\n\
    \    if (!nd || !(fNetworkStats = (IONetworkStats *)nd->getBuffer()))\n      \
    \  return false;\n\n    nd = netif->getParameter(kIOEthernetStatsKey);\n    if\
    \ (!nd || !(fEthernetStats = (IOEthernetStats*)nd->getBuffer()))\n        return\
    \ false;\n\n    return true;\n}\n```\n\nThe method obtains pointers to the interface's\
    \ network statistics buffers, which will be used to record information about received/transmitted\
    \ packets, collisions, and other events. The information is used by user space\
    \ in several places, such as the network tab in the *Activity Monitor*.\n\nTo\
    \ register an `IOEthernetInterface` instance with the system, we call its `registerService()`\
    \ method.\n\nOur final action before `start()` returns is to create an interrupt\
    \ source. We simulate interrupts using an `IOTimerEventSource`, however, a hardware\
    \ device would likely use `IOFilterInterruptEventSource` or `IOInterruptEventSource`\
    \ to respond to actual hardware interrupts.\n\nMost network drivers will also\
    \ want to use a timer to provide watchdog functionality that periodically monitors\
    \ the device for erroneous conditions, and check for things like the current link\
    \ status, so that the network system and user space can be notified of events\
    \ such as a cable being unplugged. Many drivers trigger their watchdog timer once\
    \ every second."
  raw: '#### Driver Initialization and Startup


    Network drivers follow the usual `IOService` lifecycle. Initialization of a driver
    and the device happens in the driver''s `start()` method. For a typical device,
    the following steps may be performed:


    1.  Configure the device''s provider and enumerate any needed resources. For PCI
    or Thunderbolt, this means mapping device memory or I/O regions. For USB devices,
    enumerate interfaces and pipes.

    2.  Configure the device for operation—for example, take it out of sleep state
    by accessing the device''s registers or sending control requests.

    3.  Extract information from the device, such as the MAC address, and information
    about the device''s capabilities, like supported media and speeds. Many Ethernet
    devices support the *Media Independent Interface* (MII) bus, which is a standard
    for accessing device status, information, and configuration in a consistent manner,
    decoupled from the part of the device that is concerned with physical transmission
    (usually referred to as the PHY). The MII registers contain information about
    the link status, supported network speeds, error reporting, and more. Gigabit
    or 10 Gigabit Ethernet devices are supported by the GMII and XGMII specifications,
    respectively. MII, GMII, and XGMII are all IEEE standards. These standards do
    not, however, dictate how the DMA engine is implemented or how I/O to the device
    should occur.

    4.  Allocate and configure `IOInterruptEventSource` or `IOTimerEventSources` as
    needed, depending on requirements and underlying hardware. Many network devices
    use a software timer as a watchdog timer to continuously monitor the device for
    fault and attempt to reset the device should a fault occur.

    5.  Instantiate and register an instance of `IOEthernetInterface`, which will
    make our network controller visible to the BSD networking stack and the rest of
    the system.


    The `start()` method for MyEthernetDriver is shown in [Listing 13-7](#Chapter13.html#list_13_7).


    ***Listing 13-7.** MyEthernetDriver''s* `start()` *Method*


    `bool com_osxkernel_MyEthernetDriver::start(IOService* provider)`

    `{    `

    `    if (!super::start(provider))`

    `        return false;`


    `    fHWAbstraction = new com_osxkernel_MyEthernetHwAbstraction();`

    `    if (!fHWAbstraction)`

    `        return false;`

    `    if (!fHWAbstraction->init(this))`

    `        return false;`


    `    if (!createMediumDict())`

    `        return false;`


    `    fWorkLoop = getWorkLoop();`

    `    if (!fWorkLoop)`

    `        return false;`

    `    fWorkLoop->retain();`


    `    if (attachInterface((IONetworkInterface**)&fNetworkInterface) == false)`

    `        return false;`


    `    fNetworkInterface->registerService();`


    `    fInterruptSource = IOTimerEventSource::timerEventSource(this, interruptOccured);`

    `    if (!fInterruptSource)`

    `        return false;`


    `    if (fWorkLoop->addEventSource(fInterruptSource) != kIOReturnSuccess)`

    `        return false;`


    `    IOLog("%s::start() -> success\n", getName());`

    `    return true;`

    `}`


    What needs to be done in the `start()` method is entirely dependent on the device''s
    capabilities. In this case, we do not have a provider representing a hardware
    device, so we can bypass opening the provider. The next step performed is to allocate
    an instance of the class `com_osxkernel_MyEthernetHwAbstraction` and initialize
    it. The class contains code to interface with the hardware device, such as methods
    to read its registers and setup I/O transfers. In our case it instead contains
    code that allows us to piggyback on another device. This step is not technically
    required—you could easily all code in the main driver. However, we made the design
    decision so that in the future, when the “ *MyEthernetDevice 2000 Pro”* becomes
    available, we can simply handle the hardware differences by inheriting from our
    existing hardware abstraction class. This allows the main driver to be kept clean
    and makes it easy to support several hardware variants with the same driver. We
    will look at the hardware abstraction class shortly.


    After the “hardware” is initialized, we call the `createMedium()` function to
    publish details about which transmission standards and speeds our device support.
    We will discuss this process further in the next section.


    The next method called is `attachInterface()`, which will return an instance of
    an `IONetworkInterface` class, which provides the glue that exposes our driver
    to the kernel network layer. In our case, the returned instance will be an `IOEthernetInterface`
    instance. If you need to subclass `IOEthernetInterace` for any reason, you can
    override `IONetworkController::createInterface()`, which is called by `attachInterface()`
    internally to allocate the overrided class instead. Before `attachInterface()`
    returns, it will also call `IONetworkController::configureInterface()`, which
    you can also override to perform additional configuration for the interface class.
    MyEthernetDriver implements the `configureInterface()` method as follows:


    `bool com_osxkernel_MyEthernetDriver::configureInterface(IONetworkInterface *netif)`

    `{`

    `    IONetworkData* nd;`


    `    if (super::configureInterface(netif) == false)`

    `        return false;`


    `    nd = netif->getNetworkData(kIONetworkStatsKey);`

    `    if (!nd || !(fNetworkStats = (IONetworkStats *)nd->getBuffer()))`

    `        return false;`


    `    nd = netif->getParameter(kIOEthernetStatsKey);`

    `    if (!nd || !(fEthernetStats = (IOEthernetStats*)nd->getBuffer()))`

    `        return false;`


    `    return true;`

    `}`


    The method obtains pointers to the interface''s network statistics buffers, which
    will be used to record information about received/transmitted packets, collisions,
    and other events. The information is used by user space in several places, such
    as the network tab in the *Activity Monitor*.


    To register an `IOEthernetInterface` instance with the system, we call its `registerService()`
    method.


    Our final action before `start()` returns is to create an interrupt source. We
    simulate interrupts using an `IOTimerEventSource`, however, a hardware device
    would likely use `IOFilterInterruptEventSource` or `IOInterruptEventSource` to
    respond to actual hardware interrupts.


    Most network drivers will also want to use a timer to provide watchdog functionality
    that periodically monitors the device for erroneous conditions, and check for
    things like the current link status, so that the network system and user space
    can be notified of events such as a cable being unplugged. Many drivers trigger
    their watchdog timer once every second.'
  trans: "\n### 驱动程序初始化与启动\n\n网络驱动程序遵循常规的 `IOService` 生命周期。驱动程序和设备的初始化发生在驱动程序的 `start()`\
    \ 方法中。对于典型设备，可能需要执行以下步骤：\n\n1.  配置设备的提供程序并枚举任何所需资源。对于 PCI 或 Thunderbolt，这意味着映射设备内存或\
    \ I/O 区域。对于 USB 设备，枚举接口和管道。\n2.  配置设备以使其能够运行——例如，通过访问设备寄存器或发送控制请求，使其退出休眠状态。\n\
    3.  从设备提取信息，例如 MAC 地址，以及关于设备能力的信息，例如支持的介质和速率。许多以太网设备支持 *媒体独立接口*（MII）总线，这是一项标准，用于以一致的方式访问设备状态、信息和配置，并与负责物理传输的设备部分（通常称为\
    \ PHY）解耦。MII 寄存器包含关于链路状态、支持的网速、错误报告等信息。千兆或万兆以太网设备分别由 GMII 和 XGMII 规范支持。MII、GMII\
    \ 和 XGMII 都是 IEEE 标准。然而，这些标准并未规定 DMA 引擎如何实现，或设备的 I/O 应如何进行。\n4.  根据需求和底层硬件，按需分配和配置\
    \ `IOInterruptEventSource` 或 `IOTimerEventSource`。许多网络设备使用软件定时器作为看门狗定时器，持续监视设备故障，并在发生故障时尝试重置设备。\n\
    5.  实例化并注册一个 `IOEthernetInterface` 实例，这将使我们的网络控制器对 BSD 网络协议栈和系统其余部分可见。\n\n`MyEthernetDriver`\
    \ 的 `start()` 方法如列表 13-7 所示。\n\n**列表 13-7.** *MyEthernetDriver* 的 `start()` *方法*\n\
    \n```\nbool com_osxkernel_MyEthernetDriver::start(IOService* provider)\n{    \n\
    \    if (!super::start(provider))\n        return false;\n\n    fHWAbstraction\
    \ = new com_osxkernel_MyEthernetHwAbstraction();\n    if (!fHWAbstraction)\n \
    \       return false;\n    if (!fHWAbstraction->init(this))\n        return false;\n\
    \n    if (!createMediumDict())\n        return false;\n\n    fWorkLoop = getWorkLoop();\n\
    \    if (!fWorkLoop)\n        return false;\n    fWorkLoop->retain();\n\n    if\
    \ (attachInterface((IONetworkInterface**)&fNetworkInterface) == false)\n     \
    \   return false;\n\n    fNetworkInterface->registerService();\n\n    fInterruptSource\
    \ = IOTimerEventSource::timerEventSource(this, interruptOccured);\n    if (!fInterruptSource)\n\
    \        return false;\n\n    if (fWorkLoop->addEventSource(fInterruptSource)\
    \ != kIOReturnSuccess)\n        return false;\n\n    IOLog(\"%s::start() -> success\\\
    n\", getName());\n    return true;\n}\n```\n\n在 `start()` 方法中需要完成的工作完全取决于设备的能力。在这个例子中，我们没有代表硬件设备的提供程序，因此可以跳过打开提供程序。下一步是分配一个\
    \ `com_osxkernel_MyEthernetHwAbstraction` 类的实例并对其进行初始化。该类包含与硬件设备交互的代码，例如读取其寄存器和设置\
    \ I/O 传输的方法。在我们的例子中，它包含的代码允许我们利用另一个设备。严格来说，这一步并非必需——你可以轻松地将所有代码放在主驱动程序中。然而，我们做出了这样的设计决策，以便将来当\
    \ *“MyEthernetDevice 2000 Pro”* 问世时，我们可以通过继承现有的硬件抽象类来轻松处理硬件差异。这使得主驱动程序保持简洁，并轻松支持使用同一驱动程序处理多种硬件变体。我们稍后将介绍硬件抽象类。\n\
    \n在“硬件”初始化之后，我们调用 `createMedium()` 函数来发布关于我们的设备支持哪些传输标准和速率的详细信息。我们将在下一节进一步讨论此过程。\n\
    \n接下来调用的方法是 `attachInterface()`，它将返回一个 `IONetworkInterface` 类的实例，该类提供了将我们的驱动程序暴露给内核网络层的粘合层。在我们的例子中，返回的实例将是一个\
    \ `IOEthernetInterface` 实例。如果你因任何原因需要对 `IOEthernetInterface` 进行子类化，你可以重写 `IONetworkController::createInterface()`，该方法由\
    \ `attachInterface()` 在内部调用，以分配你重写的类。在 `attachInterface()` 返回之前，它还会调用 `IONetworkController::configureInterface()`，你也可以重写该方法来对接口类执行额外的配置。`MyEthernetDriver`\
    \ 如下实现了 `configureInterface()` 方法：\n\n```\nbool com_osxkernel_MyEthernetDriver::configureInterface(IONetworkInterface\
    \ *netif)\n{\n    IONetworkData* nd;\n\n    if (super::configureInterface(netif)\
    \ == false)\n        return false;\n\n    nd = netif->getNetworkData(kIONetworkStatsKey);\n\
    \    if (!nd || !(fNetworkStats = (IONetworkStats *)nd->getBuffer()))\n      \
    \  return false;\n\n    nd = netif->getParameter(kIOEthernetStatsKey);\n    if\
    \ (!nd || !(fEthernetStats = (IOEthernetStats*)nd->getBuffer()))\n        return\
    \ false;\n\n    return true;\n}\n```\n\n该方法获取指向接口网络统计缓冲区的指针，这些缓冲区将用于记录关于接收/发送数据包、冲突和其他事件的信息。用户空间在多个地方使用这些信息，例如*活动监视器*中的网络选项卡。\n\
    \n要向系统注册一个 `IOEthernetInterface` 实例，我们调用它的 `registerService()` 方法。\n\n在 `start()`\
    \ 返回之前，我们的最后一个操作是创建一个中断源。我们使用 `IOTimerEventSource` 模拟中断，然而，硬件设备可能使用 `IOFilterInterruptEventSource`\
    \ 或 `IOInterruptEventSource` 来响应实际的硬件中断。\n\n大多数网络驱动程序可能还想使用一个定时器来提供看门狗功能，该功能周期性地监视设备是否存在错误状态，并检查当前链路状态等情况，以便在出现诸如网线被拔掉等事件时通知网络系统和用户空间。许多驱动程序每一秒触发一次它们的看门狗定时器。\n"
- fmt: "#### Medium and Status Selection\n\nThe `createMedium()` method creates a\
    \ dictionary that will publish details about the device's media capabilities to\
    \ the BSD stack and user space. Most modern Ethernet devices can also support\
    \ older Ethernet standards and transmission speeds. For example, the Ethernet\
    \ device in a Macbook Pro can support the 1000BaseT, 100BaseTX and 10BaseT/UTP\
    \ in full or half duplex modes with or without flow control. If the device and\
    \ the driver support it, the media can be controlled via the UNIX command line\
    \ tool `ifconfig` or via the *Network* pane in *System Preferences*. Most devices\
    \ are able to auto-detect current media. Media capabilities are represented by\
    \ the `IONetworkMedium` class. The implementation of the `createMedium()` class\
    \ is shown in [Listing 13-8](#Chapter13.html#list_13_8).\n\n***Listing 13-8.**\
    \ Method for Publishing Details about Supported Ethernet Media*\n```\nstatic struct\
    \ MediumTable\n{\n    UInt32      type;\n    UInt32      speed;\n}\n\nmediumTable[]\
    \ =\n{\n    {kIOMediumEthernetNone, 0},\n    {kIOMediumEthernetAuto, 0},\n   \
    \ {kIOMediumEthernet10BaseT | kIOMediumOptionFullDuplex,  10},\n    {kIOMediumEthernet100BaseTX\
    \ | kIOMediumOptionFullDuplex, 100},\n    {kIOMediumEthernet1000BaseT | kIOMediumOptionFullDuplex,\
    \ 1000},\n};\n\nbool com_osxkernel_MyEthernetDriver::createMediumDict()\n{\n \
    \   IONetworkMedium*  medium;\n    UInt32                            i;\n\n  \
    \  fMediumDict = OSDictionary::withCapacity(sizeof(mediumTable) /\n          \
    \                                   sizeof(struct MediumTable));\n    if (fMediumDict\
    \ == 0)\n        return false;\n\n    for (i = 0; i < sizeof(mediumTable) / sizeof(struct\
    \ MediumTable); i++)\n    {\n        medium = IONetworkMedium::medium(mediumTable[i].type,\
    \ mediumTable[i].speed);\n        if (medium)\n        {\n            IONetworkMedium::addMedium(fMediumDict,\
    \ medium);\n            medium->release();\n        }\n    }\n\n    if (publishMediumDictionary(fMediumDict)\
    \ != true)\n        return false;\n\n    medium = IONetworkMedium::getMediumWithType(fMediumDict,\
    \ kIOMediumEthernetAuto);\n    setSelectedMedium(medium);\n    return true;\n\
    }\n```\nThe method builds an `OSDictionary` containing the supported medium. The\
    \ medium dictionary must be published with the method `publishMediumDictionary()`\
    \ to advertise the driver's capabilities to the OS. If you want your driver to\
    \ support manual selection of media, you need to override the `IONetworkController::selectMedium()`\
    \ method. The default method will simply return `kIOReturnUnsupported`. Your driver\
    \ can call `setSelectedMedium()` to inform the system of its medium selection.\
    \ The `setLinkStatus()` method can be used to set the medium and the link status\
    \ together. The link status flags are: `kIONetworkLinkValid` or `kIONetworkLinkActive`,\
    \ which, for an Ethernet device, can be used to indicate whether a cable is connected,\
    \ as well as if the device is active.\n\n#### Configuring the Device Hardware\
    \ Address\n\nEthernet networks use the Media Access Control (MAC) address, which\
    \ should be a 48-bit globally unique address identifying the network controller.\
    \ A MAC address conflict on the network may cause confusion to switches, hosts,\
    \ and other networking gear. The MAC address is usually programmed into the device's\
    \ EEPROM when it is being manufactured in a range assigned to each manufacturer\
    \ by IEEE. Our driver needs to publish the MAC address to the networking stack\
    \ and user space. The address serves no other purpose in user space other than\
    \ to help uniquely identify the device for informational and configuration purposes.\
    \ However, the networking stack does need to know the address to properly format\
    \ outgoing packets and for address resolution for other protocols such as IP (ARP/RARP).\
    \ The network stack will call the `getHardwareAddress()` function of our driver\
    \ to get the MAC address. `MyEthernetDriver` implements it as follows:\n```\n\
    IOReturn com_osxkernel_MyEthernetDriver::getHardwareAddress(IOEthernetAddress\
    \ *addrP)\n{\n    addrP->bytes[0] = fHWAbstraction->readRegister8(kMyMacAddressRegisterOffset\
    \ + 0);\n    addrP->bytes[1] = fHWAbstraction->readRegister8(kMyMacAddressRegisterOffset\
    \ + 1);\n    addrP->bytes[2] = fHWAbstraction->readRegister8(kMyMacAddressRegisterOffset\
    \ + 2);\n    addrP->bytes[3] = fHWAbstraction->readRegister8(kMyMacAddressRegisterOffset\
    \ + 3);\n    addrP->bytes[4] = fHWAbstraction->readRegister8(kMyMacAddressRegisterOffset\
    \ + 4);\n    addrP->bytes[5] = fHWAbstraction->readRegister8(kMyMacAddressRegisterOffset\
    \ + 5);\n\n    return kIOReturnSuccess;\n}\n```\nThe `getHardwareAddress()` method\
    \ is the only mandatory method (pure virtual) in the `IOEthernetController` and,\
    \ hence, must be implemented. As we don't have a valid MAC address for `MyEthernetDriver`,\
    \ we arbitrarily chose the address: `be:ef:6c:8e:12:11`. The implementation shows\
    \ how you would likely fetch the MAC address from a device's registers.\n\nIf\
    \ your device supports changing the MAC address to a user-defined value, you can\
    \ override the `setHardwareAddress()` method. The method should write the new\
    \ MAC address to the device's registers and return `kIOReturnSuccess`, if it was\
    \ changed successfully. The default implementation will return `kIOReturnUnsupported`."
  raw: '#### Medium and Status Selection


    The `createMedium()` method creates a dictionary that will publish details about
    the device''s media capabilities to the BSD stack and user space. Most modern
    Ethernet devices can also support older Ethernet standards and transmission speeds.
    For example, the Ethernet device in a Macbook Pro can support the 1000BaseT, 100BaseTX
    and 10BaseT/UTP in full or half duplex modes with or without flow control. If
    the device and the driver support it, the media can be controlled via the UNIX
    command line tool `ifconfig` or via the *Network* pane in *System Preferences*.
    Most devices are able to auto-detect current media. Media capabilities are represented
    by the `IONetworkMedium` class. The implementation of the `createMedium()` class
    is shown in [Listing 13-8](#Chapter13.html#list_13_8).


    ***Listing 13-8.** Method for Publishing Details about Supported Ethernet Media*


    `static struct MediumTable`

    `{`

    `    UInt32      type;`

    `    UInt32      speed;`

    `}`


    `mediumTable[] =`

    `{`

    `    {kIOMediumEthernetNone, 0},`

    `    {kIOMediumEthernetAuto, 0},`

    `    {kIOMediumEthernet10BaseT | kIOMediumOptionFullDuplex,  10},`

    `    {kIOMediumEthernet100BaseTX | kIOMediumOptionFullDuplex, 100},`

    `    {kIOMediumEthernet1000BaseT | kIOMediumOptionFullDuplex, 1000},`

    `};`


    `bool com_osxkernel_MyEthernetDriver::createMediumDict()`

    `{`

    `    IONetworkMedium*  medium;`

    `    UInt32                            i;`


    `    fMediumDict = OSDictionary::withCapacity(sizeof(mediumTable) /`

    `                                             sizeof(struct MediumTable));`

    `    if (fMediumDict == 0)`

    `        return false;`


    `    for (i = 0; i < sizeof(mediumTable) / sizeof(struct MediumTable); i++)`

    `    {`

    `        medium = IONetworkMedium::medium(mediumTable[i].type, mediumTable[i].speed);`

    `        if (medium)`

    `        {`

    `            IONetworkMedium::addMedium(fMediumDict, medium);`

    `            medium->release();`

    `        }`

    `    }`


    `    if (publishMediumDictionary(fMediumDict) != true)`

    `        return false;`


    `    medium = IONetworkMedium::getMediumWithType(fMediumDict, kIOMediumEthernetAuto);`

    `    setSelectedMedium(medium);`

    `    return true;`

    `}`


    The method builds an `OSDictionary` containing the supported medium. The medium
    dictionary must be published with the method `publishMediumDictionary()` to advertise
    the driver''s capabilities to the OS. If you want your driver to support manual
    selection of media, you need to override the `IONetworkController::selectMedium()`
    method. The default method will simply return `kIOReturnUnsupported`. Your driver
    can call `setSelectedMedium()` to inform the system of its medium selection. The
    `setLinkStatus()` method can be used to set the medium and the link status together.
    The link status flags are: `kIONetworkLinkValid` or `kIONetworkLinkActive`, which,
    for an Ethernet device, can be used to indicate whether a cable is connected,
    as well as if the device is active.


    #### Configuring the Device Hardware Address


    Ethernet networks use the Media Access Control (MAC) address, which should be
    a 48-bit globally unique address identifying the network controller. A MAC address
    conflict on the network may cause confusion to switches, hosts, and other networking
    gear. The MAC address is usually programmed into the device''s EEPROM when it
    is being manufactured in a range assigned to each manufacturer by IEEE. Our driver
    needs to publish the MAC address to the networking stack and user space. The address
    serves no other purpose in user space other than to help uniquely identify the
    device for informational and configuration purposes. However, the networking stack
    does need to know the address to properly format outgoing packets and for address
    resolution for other protocols such as IP (ARP/RARP). The network stack will call
    the `getHardwareAddress()` function of our driver to get the MAC address. MyEthernetDriver
    implements it as follows:


    `IOReturn com_osxkernel_MyEthernetDriver::getHardwareAddress(IOEthernetAddress
    *addrP)`

    `{`

    `    addrP->bytes[0] = fHWAbstraction->readRegister8(kMyMacAddressRegisterOffset
    + 0);`

    `    addrP->bytes[1] = fHWAbstraction->readRegister8(kMyMacAddressRegisterOffset
    + 1);`

    `    addrP->bytes[2] = fHWAbstraction->readRegister8(kMyMacAddressRegisterOffset
    + 2);`

    `    addrP->bytes[3] = fHWAbstraction->readRegister8(kMyMacAddressRegisterOffset
    + 3);`

    `    addrP->bytes[4] = fHWAbstraction->readRegister8(kMyMacAddressRegisterOffset
    + 4);`

    `    addrP->bytes[5] = fHWAbstraction->readRegister8(kMyMacAddressRegisterOffset
    + 5);`


    `    return kIOReturnSuccess;`

    `}`


    The `getHardwareAddress()` method is the only mandatory method (pure virtual)
    in the *IOEthernetController* and, hence, must be implemented. As we don''t have
    a valid MAC address for MyEthernetDriver, we arbitrarily chose the address: `be:ef:6c:8e:12:11`.
    The implementation shows how you would likely fetch the MAC address from a device''s
    registers.


    If your device supports changing the MAC address to a user-defined value, you
    can override the `setHardwareAddress()` method. The method should write the new
    MAC address to the device''s registers and return `kIOReturnSuccess`, if it was
    changed successfully. The default implementation will return `kIOReturnUnsupported`.'
  trans: "\n#### 介质与状态选择\n\n`createMedium()` 方法会创建一个字典，向 BSD 协议栈和用户空间发布设备媒体能力的详细信息。大多数现代以太网设备也支持较旧的以太网标准和传输速率。例如，Macbook\
    \ Pro 中的以太网设备可以在全双工或半双工模式下支持 1000BaseT、100BaseTX 和 10BaseT/UTP，可选择是否启用流控制。如果设备和驱动程序支持，则可以通过\
    \ UNIX 命令行工具 `ifconfig` 或通过*系统偏好设置*中的*网络*窗格来控制介质。大多数设备能够自动检测当前介质。媒体能力由 `IONetworkMedium`\
    \ 类表示。`createMedium()` 类的实现如代码清单 13-8 所示。\n\n***代码清单 13-8.** 用于发布支持的以太网媒体详细信息的方法*\n\
    ```\nstatic struct MediumTable\n{\n    UInt32      type;\n    UInt32      speed;\n\
    }\n\nmediumTable[] =\n{\n    {kIOMediumEthernetNone, 0},\n    {kIOMediumEthernetAuto,\
    \ 0},\n    {kIOMediumEthernet10BaseT | kIOMediumOptionFullDuplex,  10},\n    {kIOMediumEthernet100BaseTX\
    \ | kIOMediumOptionFullDuplex, 100},\n    {kIOMediumEthernet1000BaseT | kIOMediumOptionFullDuplex,\
    \ 1000},\n};\n\nbool com_osxkernel_MyEthernetDriver::createMediumDict()\n{\n \
    \   IONetworkMedium*  medium;\n    UInt32                            i;\n\n  \
    \  fMediumDict = OSDictionary::withCapacity(sizeof(mediumTable) /\n          \
    \                                   sizeof(struct MediumTable));\n    if (fMediumDict\
    \ == 0)\n        return false;\n\n    for (i = 0; i < sizeof(mediumTable) / sizeof(struct\
    \ MediumTable); i++)\n    {\n        medium = IONetworkMedium::medium(mediumTable[i].type,\
    \ mediumTable[i].speed);\n        if (medium)\n        {\n            IONetworkMedium::addMedium(fMediumDict,\
    \ medium);\n            medium->release();\n        }\n    }\n\n    if (publishMediumDictionary(fMediumDict)\
    \ != true)\n        return false;\n\n    medium = IONetworkMedium::getMediumWithType(fMediumDict,\
    \ kIOMediumEthernetAuto);\n    setSelectedMedium(medium);\n    return true;\n\
    }\n```\n该方法构建了一个包含所支持介质的 `OSDictionary`。介质字典必须通过 `publishMediumDictionary()` 方法发布，以向操作系统通告驱动程序的能力。如果希望驱动程序支持手动选择介质，则需要覆盖\
    \ `IONetworkController::selectMedium()` 方法。默认方法将简单地返回 `kIOReturnUnsupported`。你的驱动程序可以调用\
    \ `setSelectedMedium()` 来通知系统其介质选择。`setLinkStatus()` 方法可用于同时设置介质和链路状态。链路状态标志包括：`kIONetworkLinkValid`\
    \ 或 `kIONetworkLinkActive`，对于以太网设备，这些标志可用于指示电缆是否已连接以及设备是否处于活动状态。\n\n#### 配置设备硬件地址\n\
    \n以太网网络使用媒体访问控制（MAC）地址，该地址应为标识网络控制器的 48 位全球唯一地址。网络上的 MAC 地址冲突可能会导致交换机、主机和其他网络设备出现混乱。MAC\
    \ 地址通常在生产设备时，在 IEEE 分配给每个制造商的地址范围内编程到设备的 EEPROM 中。我们的驱动程序需要将 MAC 地址发布到网络协议栈和用户空间。在用户空间中，该地址除了在信息和配置目的上有助于唯一标识设备外，没有其他作用。然而，网络协议栈确实需要知道该地址，以便正确格式化出站数据包，并为其他协议（如\
    \ IP（ARP/RARP））进行地址解析。网络协议栈将调用我们驱动程序的 `getHardwareAddress()` 函数来获取 MAC 地址。`MyEthernetDriver`\
    \ 的实现如下：\n```\nIOReturn com_osxkernel_MyEthernetDriver::getHardwareAddress(IOEthernetAddress\
    \ *addrP)\n{\n    addrP->bytes[0] = fHWAbstraction->readRegister8(kMyMacAddressRegisterOffset\
    \ + 0);\n    addrP->bytes[1] = fHWAbstraction->readRegister8(kMyMacAddressRegisterOffset\
    \ + 1);\n    addrP->bytes[2] = fHWAbstraction->readRegister8(kMyMacAddressRegisterOffset\
    \ + 2);\n    addrP->bytes[3] = fHWAbstraction->readRegister8(kMyMacAddressRegisterOffset\
    \ + 3);\n    addrP->bytes[4] = fHWAbstraction->readRegister8(kMyMacAddressRegisterOffset\
    \ + 4);\n    addrP->bytes[5] = fHWAbstraction->readRegister8(kMyMacAddressRegisterOffset\
    \ + 5);\n\n    return kIOReturnSuccess;\n}\n```\n`getHardwareAddress()` 方法是 `IOEthernetController`\
    \ 中唯一必需的方法（纯虚函数），因此必须实现。由于 `MyEthernetDriver` 没有有效的 MAC 地址，我们任意选择了地址 `be:ef:6c:8e:12:11`。该实现展示了你可能如何从设备的寄存器中获取\
    \ MAC 地址。\n\n如果你的设备支持将 MAC 地址更改为用户定义的值，你可以覆盖 `setHardwareAddress()` 方法。该方法应将新的\
    \ MAC 地址写入设备的寄存器，如果成功更改，则返回 `kIOReturnSuccess`。默认实现将返回 `kIOReturnUnsupported`。\n"
- fmt: "#### Enabling and Disabling the Device\n\nAlthough the `start` method could\
    \ fully prepare and make the device operational, the preferred way is to make\
    \ the device active (that is, in a state where it can receive and transmit) when\
    \ the driver's `enable()` method is called. Similarly, the device should become\
    \ as dormant as it can, even sleep, if possible, when the driver's `disable()`\
    \ method is called. A driver should do this because a user may elect to turn the\
    \ device off at times, in which case, it should refrain from using resources,\
    \ which again is important to ensure it doesn't drain a device's battery or waste\
    \ energy. `MyEthernetDriver`'s `enable()` method is shown here:\n\n```\nIOReturn\
    \ com_osxkernel_MyEthernetDriver::enable(IONetworkInterface* netif)\n{\n    IOMediumType\
    \          mediumType = kIOMediumEthernet1000BaseT | kIOMediumOptionFullDuplex;\n\
    \    IONetworkMedium*      medium;\n\n    medium = IONetworkMedium::getMediumWithType(fMediumDict,\
    \ mediumType);\n\n    if (!fHWAbstraction->enableHardware())\n        return kIOReturnError;\n\
    \n    setLinkStatus(kIONetworkLinkActive | kIONetworkLinkValid, medium, 1000 *\
    \ 1000000);    \n    return kIOReturnSuccess;\n}\n```\n\nThe exact implementation\
    \ is highly hardware-dependent, of course. In our case, the implementation will\
    \ call into the hardware abstraction class, which will attach to the “slave” network\
    \ interface we will use to enable transmission and reception of packets. For a\
    \ real device, the method would likely bring the device out of sleep, and then\
    \ enable interrupts. The implementation of the hardware abstraction `enableHardware()`\
    \ method is shown here:\n\n```\nbool    com_osxkernel_MyEthernetHwAbstraction::enableHardware()\n\
    {\n    bool success = true;\n\n    fRxPacketQueue = IOPacketQueue::withCapacity();\n\
    \    if (!fRxPacketQueue)\n        return false;\n\n    if (ifnet_find_by_name(\"\
    en0\", &interface) != KERN_SUCCESS) // change to your own interface\n        return\
    \ false;\n\n    ifnet_set_promiscuous(interface, 1);\n\n    if (iflt_attach(interface,\
    \ &interfaceFilter, &gFilterReference) != KERN_SUCCESS)\n        success = false;\n\
    \n    filterRegistered = true;    \n    return success;\n}\n```\n\nThe method\
    \ will look for the device network interface `en0`, which should be an Ethernet\
    \ device. It then puts the device into promiscuous mode, which is needed to ensure\
    \ it will accept packets destined for `MyEthernetDriver`'s MAC address. Finally,\
    \ an interface filter is installed on the slave interface to intercept incoming\
    \ packets. We will examine each incoming packet and divert packets addressed to\
    \ us to our own input queue: `fRxPacketQueue`, while ignoring all other packets,\
    \ and allow them to be processed by the original interface.\n\nThe `disable()`\
    \ method should reverse the actions we performed when we enabled the device, and\
    \ bring the device back into its original state. For our purposes, this means\
    \ removing the interface filter so that we will no longer get incoming packets:\n\
    \n```\nvoid    com_osxkernel_MyEthernetHwAbstraction::disableHardware()\n{\n \
    \   if (filterRegistered == true)\n    {\n        iflt_detach(gFilterReference);\n\
    \        while (filterRegistered);\n\n        ifnet_set_promiscuous(interface,\
    \ 0);\n        ifnet_release(interface);\n\n        fRxPacketQueue->flush();\n\
    \        fRxPacketQueue->release();\n        fRxPacketQueue = NULL;\n    }\n}\n\
    ```\n\n#### Transmitting Network Packets\n\nNow that we have successfully configured\
    \ and prepared the device, we are ready to start doing some actual I/O. Networking\
    \ I/O is conceptually very simple for a network driver. The network stack handles\
    \ the heavy lifting of formatting the packet as well as determining that a packet\
    \ is actually destined for our interface. Our driver need only be concerned with\
    \ transmitting the raw bytes to the device. Packets are delivered to a driver\
    \ via `IONetworkController::outputPacket()`, which your driver should override\
    \ to receive packets from the network stack. The `outputPacket()` method of `MyEthernetDriver`\
    \ is shown here:\n\n```\nUInt32 com_osxkernel_MyEthernetDriver::outputPacket(mbuf_t\
    \ packet, void* param)\n{\n    IOReturn result = kIOReturnOutputSuccess;\n   \
    \ if (fHWAbstraction->transmitPacketToHardware(packet) != kIOReturnSuccess)\n\
    \    {\n        result = kIOReturnOutputStall;\n    }\n    return result;\n}\n\
    ```\n\n![Image](images/square.jpg) **Note**  A driver should free the `mbuf_t`\
    \ if a packet was accepted by the `outputPacket()` method. `MyEthernetDriver`\
    \ does not need to do this because it passes the packet to another driver that\
    \ will be responsible for freeing it.\n\nAn implementation should return `kIOReturnOutputSuccess`\
    \ if the packet was handled successfully. If the hardware is busy and cannot accept\
    \ another packet at this time, you can return `kIOReturnOutputStall`, which will\
    \ retry the same packet again at a later stage. To drop packets, simply return\
    \ `kIOReturnOutputDropped`. The `outputPacket()` method should not block or sleep.\n\
    \nBy default, the `outputPacket()` method is called by the `IONetworkInterface`\
    \ instance for the controller, unless an output queue was created manually by\
    \ overriding the `createOutputQueue()` method, which should return a subclass\
    \ of `IOOutputQueue`. It is highly recommended to implement an output queue (or\
    \ provide your own queuing mechanism). If a queue is not present, you lose the\
    \ ability to temporarily stall the queue, and you must handle the packet in your\
    \ driver's `outputPacket()` method, otherwise it will be dropped. If the hardware\
    \ is already busy transmitting packets at the time `outputPacket()` is called,\
    \ the only way to handle this situation is to queue the packet until the hardware\
    \ is ready again.\n\nIf you do implement a queue and it is stalled, the queue\
    \ must be restarted when your hardware is ready to transmit packets again by calling\
    \ `IOOutputQueue::start()`, or you will not receive further packets.\n\n![images](images/square.jpg)\
    \ **Note**  Creating an output queue is highly recommended; however, `MyEthernetDriver`\
    \ skips this step, as it transmits packets directly to another network interface,\
    \ which implements its own queuing.\n\nCreating a queue can be done by overriding\
    \ the `createOutputQueue()` method. When a device is disabled, you should call\
    \ `flush()` on the queue to remove any queued packets.\n\nA typical network device\
    \ will issue an (TX) interrupt whenever the hardware has put a packet (or packets)\
    \ out on the wire, which also indicates there is now more room in its transmit\
    \ buffer, or that a new DMA transaction can now be performed. You can notify the\
    \ queue that the device is now ready for more data by calling the output queue's\
    \ `service()` method. A side-effect of this will be another call to the driver's\
    \ `outputPacket()` method, which will deliver a new packet, if one is available.\n\
    \nThe `transmitPacketToHardware()` method from the preceding section is implemented\
    \ as follows:\n\n```\nIOReturn    com_osxkernel_MyEthernetHwAbstraction::transmitPacketToHardware(mbuf_t\
    \ packet)\n{    \n    if (ifnet_output_raw(interface, 0, packet) != KERN_SUCCESS)\n\
    \        return kIOReturnOutputDropped;\n\n    // Raise an interrupt to the driver\
    \ to inform it the packet was sent.\n    fRegisterMap.interruptStatusRegister\
    \ |= kTXInterruptPending;\n    fDriver->fInterruptSource->setTimeoutUS(1);\n\n\
    \    return kIOReturnSuccess;\n}\n```"
  raw: '#### Enabling and Disabling the Device


    Although the start method could fully prepare and make the device operational,
    the preferred way is to make the device active (that is, in a state where it can
    receive and transmit) when the driver''s `enable()` method is called. Similarly,
    the device should become as dormant as it can, even sleep, if possible, when the
    driver''s `disable()` method is called. A driver should do this because a user
    may elect to turn the device off at times, in which case, it should refrain from
    using resources, which again is important to ensure it doesn''t drain a device''s
    battery or waste energy. `MyEthernetDriver''s enable()` method is shown here:


    `IOReturn com_osxkernel_MyEthernetDriver::enable(IONetworkInterface* netif)`

    `{`

    `    IOMediumType          mediumType = kIOMediumEthernet1000BaseT | kIOMediumOptionFullDuplex;`

    `    IONetworkMedium*      medium;`


    `    medium = IONetworkMedium::getMediumWithType(fMediumDict, mediumType);`


    `    if (!fHWAbstraction->enableHardware())`

    `        return kIOReturnError;`


    `    setLinkStatus(kIONetworkLinkActive | kIONetworkLinkValid, medium, 1000 *
    1000000);    `

    `    return kIOReturnSuccess;`

    `}`


    The exact implementation is highly hardware-dependent, of course. In our case,
    the implementation will call into the hardware abstraction class, which will attach
    to the “slave” network interface we will use to enable transmission and reception
    of packets. For a real device, the method would likely bring the device out of
    sleep, and then enable interrupts. The implementation of the hardware abstraction
    `enableHardware()` method is shown here:


    `bool    com_osxkernel_MyEthernetHwAbstraction::enableHardware()`

    `{`

    `    bool success = true;`


    `    fRxPacketQueue = IOPacketQueue::withCapacity();`

    `    if (!fRxPacketQueue)`

    `        return false;`


    `    if (ifnet_find_by_name("en0", &interface) != KERN_SUCCESS) // change to your
    own interface`

    `        return false;`


    `    ifnet_set_promiscuous(interface, 1);`


    `    if (iflt_attach(interface, &interfaceFilter, &gFilterReference) != KERN_SUCCESS)`

    `        success = false;`


    `    filterRegistered = true;    `

    `    return success;`

    `}`


    The method will look for the device network interface *en0*, which should be an
    Ethernet device. It then puts the device into promiscuous mode, which is needed
    to ensure it will accept packets destined for MyEthernetDriver''s MAC address.
    Finally, an interface filter is installed on the slave interface to intercept
    incoming packets. We will examine each incoming packet and divert packets addressed
    to us to our own input queue: `fRxPacketQueue`, while ignoring all other packets,
    and allow them to be processed by the original interface.


    The `disable()` method should reverse the actions we performed when we enabled
    the device, and bring the device back into its original state. For our purposes,
    this means removing the interface filter so that we will no longer get incoming
    packets:


    `void    com_osxkernel_MyEthernetHwAbstraction::disableHardware()`

    `{`

    `    if (filterRegistered == true)`

    `    {`

    `        iflt_detach(gFilterReference);`

    `        while (filterRegistered);`


    `        ifnet_set_promiscuous(interface, 0);`

    `        ifnet_release(interface);`


    `        fRxPacketQueue->flush();`

    `        fRxPacketQueue->release();`

    `        fRxPacketQueue = NULL;`

    `    }`

    `}`


    #### Transmitting Network Packets


    Now that we have successfully configured and prepared the device, we are ready
    to start doing some actual I/O. Networking I/O is conceptually very simple for
    a network driver. The network stack handles the heavy lifting of formatting the
    packet as well as determining that a packet is actually destined for our interface.
    Our driver need only be concerned with transmitting the raw bytes to the device.
    Packets are delivered to a driver via `IONetworkController::outputPacket()`, which
    your driver should override to receive packets from the network stack. The `outputPacket()`
    method of MyEthernetDriver is shown here:


    `UInt32 com_osxkernel_MyEthernetDriver::outputPacket(mbuf_t packet, void* param)`

    `{`

    `    IOReturn result = kIOReturnOutputSuccess;`

    `    if (fHWAbstraction->transmitPacketToHardware(packet) != kIOReturnSuccess)`

    `    {`

    `        result = kIOReturnOutputStall;`

    `    }`

    `    return result;`

    `}`


    ![Image](images/square.jpg) **Note**  A driver should free the `mbuf_t` if a packet
    was accepted by the `outputPacket()` method. MyEthernetDriver does not need to
    do this because it passes the packet to another driver that will be responsible
    for freeing it.


    An implementation should return `kIOReturnOutputSuccess` if the packet was handled
    successfully. If the hardware is busy and cannot accept another packet at this
    time, you can return `kIOReturnOutputStall`, which will retry the same packet
    again at a later stage. To drop packets, simply return `kIOReturnOutputDropped`.
    The `outputPacket()` method should not block or sleep.


    By default, the `outputPacket()` method is called by the `IONetworkInterface`
    instance for the controller, unless an output queue was created manually by overriding
    the `createOutputQueue()` method, which should return a subclass of `IOOutputQueue`.
    It is highly recommended to implement an output queue (or provide your own queuing
    mechanism). If a queue is not present, you lose the ability to temporarily stall
    the queue, and you must handle the packet in your driver''s `outputPacket()` method,
    otherwise it will be dropped. If the hardware is already busy transmitting packets
    at the time `outputPacket()` is called, the only way to handle this situation
    is to queue the packet until the hardware is ready again.


    If you do implement a queue and it is stalled, the queue must be restarted when
    your hardware is ready to transmit packets again by calling `IOOutputQueue::start()`,
    or you will not receive further packets.


    ![images](images/square.jpg) **Note**  Creating an output queue is highly recommended;
    however, MyEthernetDriver skips this step, as it transmits packets directly to
    another network interface, which implements its own queuing.


    Creating a queue can be done by overriding the `createOutputQueue()` method. When
    a device is disabled, you should call `flush()` on the queue to remove any queued
    packets.


    A typical network device will issue an (TX) interrupt whenever the hardware has
    put a packet (or packets) out on the wire, which also indicates there is now more
    room in its transmit buffer, or that a new DMA transaction can now be performed.
    You can notify the queue that the device is now ready for more data by calling
    the output queue''s `service()` method. A side-effect of this will be another
    call to the driver''s `outputPacket()` method, which will deliver a new packet,
    if one is available.


    The `transmitPacketToHardware()` method from the preceding section is implemented
    as follows:


    `IOReturn    com_osxkernel_MyEthernetHwAbstraction::transmitPacketToHardware(mbuf_t
    packet)`

    `{    `

    `    if (ifnet_output_raw(interface, 0, packet) != KERN_SUCCESS)`

    `        return kIOReturnOutputDropped;`


    `    // Raise an interrupt to the driver to inform it the packet was sent.`

    `    fRegisterMap.interruptStatusRegister |= kTXInterruptPending;`

    `    fDriver->fInterruptSource->setTimeoutUS(1);`


    `    return kIOReturnSuccess;`

    `}`'
  trans: "好的，作为高级文档工程师和翻译员，我将严格按照您的要求，将给定的英文文本翻译成中文。\n\n\n#### 启用和禁用设备\n\n尽管 `start`\
    \ 方法可以完全准备好并使设备可操作，但更推荐的方式是，在调用驱动程序的 `enable()` 方法时使设备激活（即处于可以接收和发送的状态）。类似地，当调用驱动程序的\
    \ `disable()` 方法时，设备应尽可能进入休眠状态，甚至在可能的情况下进入睡眠状态。驱动程序应该这样做，因为用户可能偶尔选择关闭设备，在这种情况下，它应避免使用资源，这对于确保它不会耗尽设备电池或浪费能源同样重要。`MyEthernetDriver`\
    \ 的 `enable()` 方法如下所示：\n\n```\nIOReturn com_osxkernel_MyEthernetDriver::enable(IONetworkInterface*\
    \ netif)\n{\n    IOMediumType          mediumType = kIOMediumEthernet1000BaseT\
