- fmt: "### Mapping and Accessing Device Memory Regions\n\nThe previous section showed\
    \ us how we can obtain information about available I/O memory regions. We need\
    \ to do some more work before we can actually access data from the regions. Furthermore,\
    \ in most real-world drivers, it is unnecessary to explicitly enumerate the regions,\
    \ as a driver usually knows exactly which regions, if not all that it needs to\
    \ map. The following `IOPCIDevice` method can be used to map a BAR region directly:\n\
    \n`virtual IOMemoryMap * mapDeviceMemoryWithRegister(UInt8 reg, IOOptionBits options\
    \ = 0);`\n\nThe following is an example of its use.\n\n```\nIOMemoryMap *bar0Map\
    \ = fPCIDevice->mapDeviceMemoryWithRegister(kIOPCIConfigBaseAddress0);\nIOMemoryMap\
    \ *bar1Map = fPCIDevice->mapDeviceMemoryWithRegister(kIOPCIConfigBaseAddress1);\n\
    if (bar0Map)\n{\n    UInt8 *address = (UInt8*)bar0Map->getVirtualAddress();\n\
    // do something with *address\n}\n…\n```\n\nIf you have already obtained an `IODeviceMemory`\
    \ (subclass of `IOMemoryDescriptor`) object by calling `getDeviceMemoryWithIndex()`\
    \ as in [Listing 9-6](#Chapter09.html#list_9_6), you can simply call the `map()`\
    \ method which does the same thing. In fact, that is exactly what `mapDeviceMemoryWithRegister()`\
    \ does under the hood. Once an `IOMemoryMap` object is obtained, you can call\
    \ the `getVirtualAddress()` method to obtain a kernel virtual address which can\
    \ be used to access the mapping. The returned pointer can be read and written\
    \ to in the same way as regular memory assuming it points to I/O memory and not\
    \ I/O space.\n\nWhen a driver is done accessing the memory it should call the\
    \ `unmap()` method.\n\n### Accessing I/O Space\n\nI/O Space consists of a 16-bit\
    \ address space and is an older way of communicating with devices. I/O ports were\
    \ also used for communication with serial and parallel ports in older computers,\
    \ so it is not specific to PCI, but rather a way for an external device (to the\
    \ CPU) to interface with the processor. I/O Space ranges assigned to a device\
    \ can be accessed and mapped just like memory regions by using `mapDeviceMemoryWithRegister()`\
    \ and `getDeviceMemoryWithIndex()`. The difference however, is that you cannot\
    \ simply access the pointer returned by `getVirtualAddress()` as above directly.\
    \ You have to use one of the following methods.\n\n```\nvirtual void ioWrite32(UInt16\
    \ offset, UInt32 value, IOMemoryMap* map = 0);\nvirtual void ioWrite16(UInt16\
    \ offset, UInt16 value, IOMemoryMap* map = 0);\nvirtual void ioWrite8(UInt16 offset,\
    \ UInt8 value, IOMemoryMap* map = 0);\nvirtual UInt32 ioRead32(UInt16 offset,\
    \ IOMemoryMap* map = 0);\nvirtual UInt16 ioRead16(UInt16 offset, IOMemoryMap*\
    \ map = 0);\nvirtual UInt8 ioRead8(UInt16 offset, IOMemoryMap* map = 0);\n```\n\
    \nUsing I/O space in new devices is frowned upon, due to poor performance and\
    \ the limited address space it provides. Accessing mapped memory can take as little\
    \ as 1 CPU cycle, while accessing a port can take as many as 100 cycles on certain\
    \ architectures.\n\nBefore I/O space can be accessed, it needs to be enabled in\
    \ the device's command register. `IOPCIDevice` provides the `setIOEnable()` method\
    \ for this purpose.\n\n### Handling Device Removal\n\nThunderbolt and ExpressCard\
    \ devices may be unplugged during operation. Therefore, drivers that handle these\
    \ devices need some additional modifications over traditional PCI drivers, which\
    \ are usually not written with removal of the device in mind. Improper handling\
    \ of device removal may lead to hanging applications, system crashes, or disruptions\
    \ to system stability or performance. For Thunderbolt devices, removal is not\
    \ an exceptional condition so a driver must be able to cope with the removal of\
    \ the device.\n\n![images](images/square.jpg) **Caution** Storage devices with\
    \ mounted file systems may NOT be unplugged without the user first “Ejecting”\
    \ (unmounting) the file system. Failure to do so may result in loss or, in the\
    \ worst-case scenario, corruption of the file system. Thunderbolt based storage\
    \ drivers should call: `setProperty(kIOPropertyPhysicalInterconnectLocationKey,\
    \ kIOPropertyExternalKey)` early in the driver's `start()` method to indicate\
    \ to the I/O Kit that the storage is externally connected.\n\nWhile it may seem\
    \ complicated to handle device removals, the I/O Kit was designed specifically\
    \ to allow removal of devices. The `IOService` class handles a lot of the heavy\
    \ lifting for us automatically.\n\nYour driver may detect the first sign that\
    \ a device has been removed if it receives the value `0xffffffff` (assuming a\
    \ 32-bit read) while reading a value from memory mapped I/O (MMIO) or PCI configuration\
    \ space registers. Of course the value might actually be valid for some registers,\
    \ however you can read an alternate register or memory location that you know\
    \ is guaranteed never to contain that value to confirm if the device is unresponsive.\
    \ The driver may detect this condition before the I/O Kit messages the driver\
    \ informing it that the device has been removed. If a driver determines that a\
    \ device is removed, it should cease all access to mapped memory and the configuration\
