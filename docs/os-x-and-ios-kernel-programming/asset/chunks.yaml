    #### USB Prober


    Before we start looking at actual code, it is worth mentioning a highly useful
    tool called USB Prober. USB Prober is a utility that is bundled with the Xcode
    distribution. The USB Prober tool is shown in [Figure 8-6](#Chapter08.html#fig_8_6).


    ![images](images/0806.jpg)


    ***Figure 8-6.** USB Prober utility*


    USB Prober allows you to probe available USB buses on your system and inspect
    the hierarchy of devices attached to each bus. It also allows you to inspect the
    device, configuration, interface, and endpoint descriptors. The *IORegistry* tab
    allows you to inspect the *IOService* plane of the I/O Registry as it pertains
    to USB devices, which is very useful during development of a USB driver, as it
    allows you to verify that your driver was matched correctly. USB prober can also
    perform USB specific tracing from the IOUSBFamily, which may be useful for debugging
    your driver in some cases. This requires some setup, including downloading the
    USB Debug Kit from Apple''s developer website. The kit contains an alternate version
    of IOUSBFamily, which provides verbose logging. Access to the debug kit is restricted
    to members of the Mac developer program.'
  trans: '

    ### 加载 USB 驱动程序


    若要实现在插入设备时自动加载驱动程序，你必须按照第 4 章所学的内容，配置驱动程序的 `Info.plist` 文件。正如上一节所述，单个驱动程序可以处理一个
    USB 设备，也可以有多个驱动程序，分别对应设备提供的每个接口（功能）。对于 USB 设备，驱动程序会通过设备描述符中的键值进行匹配。I/O Kit 遵循《通用串行总线通用类别规范》制定的驱动程序匹配规则。以下键值组合可用于将驱动程序与
    USB 设备进行匹配：


    - `idVendor` & `idProduct` & `bcdDevice`

    - `idVendor` & `idProduct`

    - `idVendor` & `bDeviceSubClass` & `bDeviceProtocol`（仅当 `bDeviceClass == 0xff`
    时有效）

    - `idVendor` & `bDeviceSubClass`（仅当 `bDeviceClass == 0xff` 时有效）

    - `bDeviceClass` & `bDeviceSubClass` & `bDeviceProtocol`（仅当 `bDeviceClass != 0xff`
    时有效）

    - `bDeviceClass` & `bDeviceSubClass`（仅当 `bDeviceClass != 0xff` 时有效）


    每个键代表设备描述符中的一个条目。`bcdDevice` 字段用于存储设备的修订号。如果 `bDeviceClass` 字段的值为 `0xff`，则表示该设备类别由供应商自定义。代码清单
    8-1 展示了 `Info.plist` 中一个匹配供应商 ID、产品 ID 和修订号（`bcdDevice`）的匹配字典。


    **代码清单 8-1.** 匹配供应商 ID、产品 ID 和设备修订的匹配字典


    ```

    <key>MyUSBDriver</key>

    <dict>

    <key>CFBundleIdentifier</key>

        <string>com.osxkernel.MyUSBDriver</string>

        <key>IOClass</key>

        <string>com_osxkernel_MyUSBDriver</string>

        <key>IOProviderClass</key>

        <string>IOUSBDevice</string>

        <key>bcdDevice</key>

        <integer>1</integer>

        <key>idProduct</key>

        <integer>2323</integer>

        <key>idVendor</key>

        <integer>0001</integer>

    </dict>

    ```


    该条目必须位于驱动程序 `Info.plist` 文件的 `IOKitPersonalities` 部分才能生效。


    未被上述规则匹配到的设备将由 `IOUSBCompositeDriver` 处理。如果设备存在多个配置，该驱动程序会选择一个设备配置，然后转而针对设备的接口进行匹配。可用于匹配设备接口的键值如下所示：


    - `idVendor` & `idProduct` & `bcdDevice` & `bConfigurationValue` & `bInterfaceNumber`

    - `idVendor` & `idProduct` & `bConfigurationValue` & `bInterfaceNumber`

    - `idVendor` & `bInterfaceSubClass` & `bInterfaceProtocol`（仅当 `bInterfaceClass
    == 0xff` 时有效）

    - `idVendor` & `bInterfaceSubClass`（仅当 `bInterfaceClass == 0xff` 时有效）

    - `bInterfaceClass` & `bInterfaceSubClass` & `bInterfaceProtocol`（仅当 `bInterfaceClass
    != 0xff` 时有效）

    - `bInterfaceClass` & `bInterfaceSubClass`（仅当 `bInterfaceClass != 0xff` 时有效）


    **注意：** 你不能自行创建键值组合；必须使用上述针对接口或设备的组合之一。不过，你可以为驱动程序添加多个特性集，每个特性集可以匹配不同的组合，但所使用组合必须是有效组合之一。


    每个键代表接口描述符中的一个字段。匹配规则按具体程度排序。例如，最后一条规则匹配接口类别和子类，Apple 的 USB 大容量存储驱动程序正是利用该规则来匹配所有符合该接口的设备，无论其供应商或产品
    ID 是什么。代码清单 8-2 展示了 Apple 大容量存储驱动程序的 `Info.plist` 文件（为便于阅读，省略了部分与匹配无关的键）。


    **代码清单 8-2.** 匹配 USB 接口类别和子类的匹配字典


    ```

    <key>IOUSBMassStorageClass6</key>

    <dict>

        <key>CFBundleIdentifier</key>

        <string>com.apple.iokit.IOUSBMassStorageClass</string>

        <key>IOClass</key>

        <string>IOUSBMassStorageClass</string>

        <key>IOProviderClass</key>

        <string>IOUSBInterface</string>

        <key>bInterfaceClass</key>

        <integer>8</integer>

        <key>bInterfaceSubClass</key>

        <integer>6</integer>

    </dict>

    ```


    与代码清单 8-1 中的示例不同，这里的 `IOProviderClass` 指定为 `IOUSBInterface`，它将作为提供者传递给驱动程序的 `start()`
    方法，而非 `IOUSBDevice`。


    ### USB Prober


    在开始查看实际代码之前，有必要介绍一个非常实用的工具——USB Prober。USB Prober 是一个与 Xcode 发行版捆绑在一起的实用工具。USB
    Prober 工具如图 8-6 所示。


    **图 8-6.** USB Prober 实用工具


    USB Prober 允许你探测系统上可用的 USB 总线，并检查连接到每条总线上的设备层次结构。它还允许你检查设备描述符、配置描述符、接口描述符和端点描述符。*IORegistry*
    选项卡允许你检查 I/O Registry 中与 USB 设备相关的 *IOService* 平面，这在开发 USB 驱动程序时非常有用，因为它可以验证你的驱动程序是否匹配正确。USB
    Prober 还可以执行来自 IOUSBFamily 的 USB 特定跟踪，这在某些情况下可能有助于调试驱动程序。这需要进行一些设置，包括从 Apple 开发者网站下载
    USB Debug Kit。该工具包包含一个替代版本的 IOUSBFamily，它提供了详细的日志记录。访问该调试工具包仅限于 Mac 开发者计划的成员。

