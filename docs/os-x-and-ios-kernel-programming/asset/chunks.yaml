    ### 本章小结


    在本章中，我们探讨了内核网络过滤 KPI 以及如何为以太网控制器实现驱动程序。以下是一些关键要点：


    - 内核网络支持分为两部分：BSD 层（实现对所有协议和防火墙等网络服务的支持）和 I/O Kit（为编写网络硬件驱动程序提供工具）。

    - 内核过滤 KPI 允许在不同层级过滤和操纵网络数据包，包括套接字、IP 和接口层级。

    - 内核网络子系统最重要的数据结构是 `mbuf` 结构体，用于存储网络数据包或其他相关数据。在内核扩展中，可以通过不透明引用 `mbuf_t` 和 mbuf
    KPI 提供的函数来操作 `mbufs`。`mbufs` 的概念在内核的 BSD 部分和 I/O Kit 中均有使用。

    - 套接字过滤器允许拦截基于套接字的通信和带外事件。它可以拦截传入和传出的数据。套接字过滤器可以全局附加到系统中的每个套接字，也可以通过编程方式逐套接字附加。使用套接字过滤器，您可以修改、拒绝或注入新的数据包。

    - IP 过滤器与套接字过滤器类似，但工作于 IP 层。IP 过滤器将看到系统中所有 IP 流量，无论其接口为何。它也会看到并非直接通过套接字发起的 IP
    数据包。

    - 接口过滤器允许将过滤器附加到特定的网络接口。接口过滤器可以看到进出该接口的所有流量，无论其协议为何。也可以将所见的流量限制为特定的协议族，例如 IPv4
    或 IPv6。

    - `IONetworkingFamily` 提供了实现网络硬件设备驱动程序所必需的编程接口。它包括用于队列管理的类以及用于抽象 I/O Kit 与 BSD
    层之间接口的类。

    - `IONetworkController` 类代表一个网络驱动程序。`IOEthernetController` 提供了一个专门用于处理以太网兼容设备的类。`IONetworkInterface`
    提供了将网络设备连接到内核网络系统其他部分的粘合剂。


    ## 第 14 章


    ## 存储系统


    存储设备涵盖多种类型，包括硬盘驱动器、CD 和 DVD、USB 闪存驱动器、基于 FireWire 的硬盘，以及作为虚拟驱动器挂载的基于文件的磁盘映像。对用户而言，存储设备表现为桌面上的一个宗卷，他们可以从中读取和写入文件，但用户看不到的是内核中协同工作以实现这一点的多个驱动程序。


    存储设备需要多个驱动程序的原因在于其可能呈现的多种不同形式。考虑到外部 USB 闪存驱动器和内部硬盘之间的差异（两者对用户来说都是存储设备），您就能理解需要处理的差异。例如：


    - 存储设备与计算机连接的接口可能是 USB 或 FireWire 端口（用于外部存储设备），或通过 SATA 端口（通常用于内部硬盘）。

    - 计算机可以通过发送 SCSI 命令来控制存储设备（如 USB 大容量存储设备或 FireWire SPB-2 驱动器），或通过向 AHCI 接口发送 ATA/ATAPI
    命令来控制（如内部连接的 SATA 磁盘）。

    - 存储设备可能包含单个宗卷，也可能被划分为多个宗卷。

    - 每个宗卷将使用用户选择的文件系统进行格式化，可能是 HFS+（Mac OS X 使用的默认文件系统）、NTFS（Windows 使用的默认文件系统）或
    Mac OS X 支持的众多文件系统之一。


    为了处理所有这些可能的变体，I/O Kit 通过构建一个由多个驱动程序组成的分层堆栈来实现存储设备，其中每一层负责处理一个方面，例如物理连接（USB、FireWire
    或 SATA）、命令协议（SCSI 或 ATA/ATAPI）以及逻辑宗卷。对各种文件系统的支持由虚拟文件系统层（VFS 层）提供，该层虽然是内核的一部分，但位于内核的
    BSD 部分，且处于 I/O Kit 之外。


    I/O Kit 存储堆栈设计中的这种模块化意味着驱动程序堆栈的每一层都与相邻层解耦，每个驱动程序只需处理其所在层提供的功能。这意味着可以编写一个新的文件系统，而无需了解该文件系统可能驻留的存储设备类型，因为该文件系统永远不需要直接与磁盘设备的硬件通信。类似地，在为新型存储设备编写驱动程序时，开发者不需要实现任何文件系统细节；相反，磁盘可以使用
    Mac OS X 支持的任一现有文件系统进行格式化。存储设备的驱动程序堆栈如图 14-1 所示。


    ![images](img/1401.jpg)


    ***图 14-1.** 支持存储设备所涉及驱动程序的抽象视图*


    并非每一层都需要实现驱动程序。例如，要实现对新型硬盘的支持，您只需在传输层编写一个驱动程序；其余驱动程序堆栈会与您的自定义驱动程序匹配，而您的新磁盘设备将作为标准磁盘呈现给用户。

    '
- fmt: '### Transport Layer Drivers


    The driver for a storage device is implemented in the I/O Kit as a transport driver
    that resides within the Transport Layer of [Figure 14-1](#Chapter14.html#fig_14_1).
    Like any other I/O Kit driver, a transport driver will match against the provider
    class that represents its hardware device; the provider class is also the means
    by which the driver accesses the underlying hardware. For example, a storage device
    that is USB-based will have a provider class that is an instance of `IOUSBDevice`
    or `IOUSBInterface`.


    The I/O Kit provides no restrictions on the superclass that a transport driver
    can be derived from, other than ultimately deriving from the `IOService` class,
    as is required by all I/O Kit drivers. This allows a transport driver a large
    degree of freedom, since it can use a set of methods that is natural for the communication
    protocol used by the disk device, rather than being forced to implement an interface
    that is imposed by the I/O Kit''s storage family.


    The lack of a common interface for transport drivers does provide a problem, since
    the upper layers of the driver stack, in particular, the generic block storage
    driver that sits immediately above the transport driver, has no common interface
    allowing it to call methods in the transport driver. To solve this, the I/O Kit
    defines a driver class known as `IOBlockStorageDevice`, which is a small lightweight
    “nub” driver that sits between the transport layer and generic block storage driver.


    The role of the `IOBlockStorageDevice` class is to provide an abstract representation
    of the disk to the generic block storage driver, and to pass on all requests to
    the transport driver, which in turn implements the behavior that is specific to
    the disk device. The transport driver is responsible for defining a concrete subclass
    of the `IOBlockStorageDevice` class and instantiating it. An illustration of the
    relationship between the transport driver and the layers above and below it in
    the storage driver stack is shown in [Figure 14-2](#Chapter14.html#fig_14_2),
    which uses the Apple AHCI driver as an example.


    ![images](images/1402.jpg)


    ***Figure 14-2.** The relationship between drivers in the Apple AHCI storage driver
    stack*


    ![images](images/square.jpg) **Note** Since the I/O Kit puts no restrictions on
    how a transport driver should be implemented, the transport driver may be built
    from a stack of several drivers. Apple takes advantage of this in the drivers
    for devices that use the SCSI command set, including USB Mass Storage devices
    and FireWire devices. The drivers for these devices all make use of a common driver
    that implements the SCSI protocol.


    ### The IOBlockStorageDevice Interface


    The upper layers of the storage driver stack communicate with the transport driver
    through a class that is derived from the `IOBlockStorageDevice` interface. The
    `IOBlockStorageDevice` presents a view of the storage device as a linear array
    of logical blocks that can be either read from or written to by the caller. A
    logical block is the minimum number of bytes that the disk is capable of reading
    or writing, and a disk operation must operate on a multiple of blocks. Depending
    on the disk, the block size will be anywhere from 512 bytes to 4096 bytes. All
    operations performed by the `IOBlockStorageDevice` class work on a contiguous
    range of disk blocks.


    The methods that must be implemented by a subclass of the `IOBlockStorageDevice`
    interface are described in [Listing 14-1](#Chapter14.html#list_14_1). The `IOBlockStorageDevice`
    class is not designed to provide a full implementation of the behavior of these
    methods; instead, it passes them on to its provider class, which is the transport
    driver within the storage driver stack.


    ***Listing 14-1.** The Methods to Be Implemented by a Subclass of the `IOBlockStorageDevice`
    Interface*


    ```

    class IOBlockStorageDevice : public IOService

    {

            virtual bool            init(OSDictionary * properties);

            virtual IOReturn        doEjectMedia(void) = 0;

            virtual IOReturn        doFormatMedia(UInt64 byteCapacity) = 0;

            virtual UInt32          doGetFormatCapacities(UInt64 * capacities,

                                        UInt32   capacitiesMaxCount) const = 0;

            virtual IOReturn        doLockUnlockMedia(bool doLock) = 0;

            virtual IOReturn        doSynchronizeCache(void) = 0;

            virtual char*           getVendorString(void) = 0;

            virtual char*           getProductString(void) = 0;

            virtual char*           getRevisionString(void) = 0;

            virtual char*           getAdditionalDeviceInfoString(void) = 0;

            virtual IOReturn        reportBlockSize(UInt64 *blockSize) = 0;

            virtual IOReturn        reportEjectability(bool *isEjectable) = 0;

            virtual IOReturn        reportLockability(bool *isLockable) = 0;

            virtual IOReturn        reportMaxValidBlock(UInt64 *maxBlock) = 0;

            virtual IOReturn        reportMediaState(bool *mediaPresent,bool *changedState)
    = 0;

            virtual IOReturn        reportPollRequirements(bool *pollRequired,

                                        bool *pollIsExpensive) = 0;

            virtual IOReturn        reportRemovability(bool *isRemovable) = 0;

            virtual IOReturn        reportWriteProtection(bool *isWriteProtected)
    = 0;

            virtual IOReturn        getWriteCacheState(bool *enabled) = 0;

            virtual IOReturn        setWriteCacheState(bool enabled) = 0;

            virtual IOReturn        doAsyncReadWrite(IOMemoryDescriptor *buffer, UInt64
    block,

                                        UInt64 nblks, IOStorageAttributes *attributes,

                                        IOStorageCompletion *completion) = 0;

            virtual IOReturn        requestIdle(void);

            virtual IOReturn        doDiscard(UInt64 block, UInt64 nblks);

            virtual IOReturn        doUnmap(IOBlockStorageDeviceExtent* extents,

                                        UInt32 extentsCount, UInt32 options);

    };

    ```'
