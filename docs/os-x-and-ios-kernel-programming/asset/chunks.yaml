    Often, the `IOSerialBSDClient` class, or even the serial port driver itself, needs
    to block the current thread until a particular state has become active or inactive.
    The serial driver provides this functionality through a method named `watchState()`.
    The events that the caller wishes to observe are described by two parameters.
    The “`mask`” parameter contains a bitmask of the state bits that the caller wishes
    to observe. The “`state`” parameter describes the corresponding value of each
    state bit that the caller wishes to observe. For example, if a bit is set in “`mask`”,
    but not set in “`state`”, the caller is interested in that state becoming inactive.
    If a bit is set in “`mask`” and also set in “`state`”, the caller is interested
    in that state becoming active.


    The `watchState()` method will return as soon as any of the observed state bits
    match the current state of the serial port. Upon return, the current state of
    the serial port is returned to the caller through the “`state`” parameter. If
    the serial port is closed while a thread is blocked in `watchState()`, the sleep
    will be aborted and the method will fail and return an error code to the caller,
    such as `kIOReturnNotOpen`. The following code gives an example of how `watchState()`
    can be used; this code will block until either the driver''s transmit buffer becomes
    empty (`PD_S_TXQ_EMPTY` is set) or the hardware finishes a write to the serial
    port hardware (`PD_S_TX_BUSY` is clear):


    `UInt32       state;`

    `IOReturn     rtn;`


    `state = PD_S_TXQ_EMPTY;`

    `rtn = watchState(&state, PD_S_TXQ_EMPTY | PD_S_TX_BUSY, refCon);`

    `if (rtn != kIOReturnSuccess)`

    `       handle error;`


    The implementation of the `watchState()` method is closely related to the implementation
    of the `setState()` method. As well as setting bits in the serial port state word,
    the `setState()` method is also responsible for waking any threads that are waiting
    for a particular state to be set. In [Chapter 7](#Chapter07.html#ch7), we introduced
    condition variables and saw how one thread could sleep on a condition variable
    and remain blocked until another thread signaled the condition variable to indicate
    that an event had occurred. This provides a mechanism that a serial port driver
    can use to suspend a thread in the `watchState()` method and to signal it from
    the `setState()` method when the observed state has changed.


    When the `setState()` method is called, the serial driver updates a variable that
    maintains the current serial port state, and then signals all threads that are
    blocked in the `watchState()` method, allowing them to test whether the state
    on which they are waiting has become active. As an optimization, rather than waking
    up threads blocked in `watchState()` for every change to the serial port state,
    the `AppleUSBCDCDMM` driver maintains a union of all state bits that are being
    waited on across all current calls to `watchState()`, and will only unblock the
    threads if the value of a state bit that is being watched has changed.


    A sample implementation of the `setState()` and `watchState()` methods is provided
    in [Listing 11-5](#Chapter11.html#list_11_5).


