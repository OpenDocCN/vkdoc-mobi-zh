    在运行此内核扩展之前，值得花点时间了解内核如何知道调用哪些入口点，因为源文件中的两个函数看起来是用户自定义的。正如你可能已经猜到的，Xcode 给了我们一些助力，自动为我们生成了部分样板代码。在生成这些代码时，Xcode
    使用了项目设置中定义的两个值，它们分别指定了内核扩展的启动和停止例程。这些值如图 3-3 所示。你可以自由地将入口点从 `HelloWorld_start`
    和 `HelloWorld_stop` 重命名，只要同时更改源代码中定义的函数名称以及项目构建设置中的对应值即可。


    ![images](img/0303.jpg)


    ***图 3-3.** “Hello World”内核扩展的项目设置*


    项目编译成功后，Xcode 会创建一个名为 `HelloWorld.kext` 的内核扩展。该文件被打包成一个称为 KEXT bundle 的特殊文件。如果你对
    bundle 不熟悉，它本质上是一个目录，其中包含可执行文件所需的所有文件，但访达会将其作为一个单一文件呈现给用户。代码清单 3-3 展示了构建“Hello
    World”内核扩展时创建的 bundle 的内容。


    ***代码清单 3-3.** `HelloWorld.kext` bundle 的内容*


    ```

    HelloWorld.kext/

    HelloWorld.kext/Contents/Info.plist

    HelloWorld.kext/Contents/MacOS

    HelloWorld.kext/Contents/MacOS/HelloWorld

    HelloWorld.kext/Contents/Resources

    HelloWorld.kext/Contents/Resources/en.lproj

    HelloWorld.kext/Contents/Resources/en.lproj/InfoPlist.strings

    ```


    名为 `Info.plist` 的文件应该很熟悉，因为它正是我们之前修改过的属性列表的副本（Xcode 在过程中做了一些微小的处理）。另一个值得一提的文件直接名为
    `HelloWorld`，位于 bundle 的子目录 `Contents/MacOS` 中。该文件包含了内核扩展的实际可执行代码。


    ## 加载与卸载内核扩展


    内核扩展是运行在操作系统内核内部的代码模块。构建完成后，它需要被加载到内核中才能运行。虽然 Xcode 在编写和构建内核扩展方面表现出色，但它不能用于测试或调试内核扩展；事实上，对于内核扩展，Xcode
    窗口中的“运行”按钮只会构建项目，而不会实际加载或运行生成的输出。相反，在 Mac OS X 上，内核扩展可以通过两种方式之一加载：自动加载，即通过将内核扩展
    bundle 复制到 `/System/Library/Extensions` 目录；或者通过命令行手动加载。


    要加载内核扩展，我们首先需要找到 Xcode 构建的已编译二进制文件。默认情况下，Xcode 4 会将编译器的输出放置在不同于包含源代码的项目目录的位置，这可能会增加通过命令行加载内核扩展时查找路径的难度。要定位
    Xcode 写入内核扩展的路径，请右键点击名为 `HelloWorld.kext` 的产品，这将显示一个上下文菜单，然后选择“在访达中显示”项，如图 3-4
    所示。


    ![images](img/0304.jpg)


    ***图 3-4.** 定位已构建内核扩展的路径*


    复制到 `/System/Library/Extensions` 目录的内核扩展将在操作系统需要时加载。这可能发生在系统启动时，或者对于驱动程序而言，当需要该驱动程序的硬件设备连接到计算机时。然而，在开发过程中，通过命令行手动加载内核扩展通常更为便捷。


    出于安全考虑，由于内核扩展被授予与核心操作系统代码相同的高级权限，因此内核扩展只能由具有系统管理员访问权限的用户安装或加载。作为进一步的安全措施，系统对内核扩展
    bundle 的文件权限有严格要求，并且会拒绝加载不满足这些要求的扩展，特别是以下几点：


    - KEXT bundle 及其内部的所有文件和文件夹必须属于用户“root”（用户 ID 0）。

    - KEXT bundle 及其内部的所有文件和文件夹必须属于组“wheel”（组 ID 0）。

    - KEXT bundle 及其内部的任何目录必须具有权限掩码 `0755`（`rwxr-xr-x`）。

    - KEXT bundle 内部的所有文件必须具有权限掩码 `0644`（`rw-r--r--`）。


    当你在 Xcode 中构建内核扩展时，它生成的 KEXT bundle 会具有正确的 bundle 及其内容的权限掩码，但用户和组的所有权将与运行编译器的用户一致。要纠正文件所有权以符合内核扩展的要求，你可以在终端中使用以下命令：


    ```

    sudo chown -R root:wheel HelloWorld.kext

    ```


    请注意，如果你在 Xcode 构建目录内更改了 KEXT 的所有权，下次构建项目时 Xcode 将没有足够的权限覆盖该 KEXT，这将导致构建错误。要解决此问题，你可以先将
    KEXT 从 Xcode 构建目录复制到另一个目录（例如 `/tmp`），然后再更改其所有权并进行加载。


    Mac OS X 包含许多用于处理内核扩展的命令行工具。一些常用的命令包括：


    - `kextload`，用于将 KEXT 加载到内核中

    - `kextunload`，用于停止已加载的 KEXT 并将其从内核中卸载

    - `kextutil`，一个面向开发者的实用工具，用于将 KEXT 加载到内核中，可以提供诊断信息详细说明内核扩展加载失败的原因，并能生成对调试活动内核扩展有用的符号

    - `kextstat`，用于显示加载到内核中的所有 KEXT 的列表

