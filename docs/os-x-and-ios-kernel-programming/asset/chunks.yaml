  trans: "\n### 锁机制\n\n使用原子操作是同步单个变量访问的有效方案。但我们通常需要同步更复杂的代码段，例如依赖多个变量值的算法或操作硬件的函数。为了消除这些复杂代码区域中的竞态条件可能性，我们依赖互斥机制；也就是说，任何其他试图执行可能干扰我们操作结果的代码的线程都将被阻塞，直到操作完成。获取独占访问权限的行为被称为“获取锁”。\n\
    \n锁机制的基本思想是：任何访问共享资源（例如驱动程序的实例变量）的代码，在执行前都会先获取锁，并在完成共享资源访问后释放锁。锁的关键点在于同一时间只能被一个客户端持有；任何其他想要访问同一共享资源的线程，在尝试获取锁时都会被阻塞，并保持阻塞状态直到锁被释放。获取锁会阻止任何其他依赖同一锁的线程执行，因此最佳实践是只在必要的最短时间内持有锁。\n\
    \nI/O Kit 提供了几种不同风格的锁机制，每种都适用于不同场景。I/O Kit 提供的锁包括：\n\n-   `IOSimpleLock`，实现自旋锁\n\
    -   `IOLock`，实现传统互斥锁\n-   `IORecursiveLock`，实现一种互斥锁，可由持有锁的线程安全地多次获取\n-   `IORWLock`，实现读写锁，可由多个需要读取共享资源的线程共享，但为希望写入共享资源的线程提供独占访问权限。\n\
    \n#### 自旋锁\n\n最基本的锁实现是自旋锁，它可以仅使用原子操作来实现（这或许能解释为什么自旋锁在 I/O Kit 实现中被称为 `IOSimpleLock`）。自旋锁可能仅由一个布尔标志组成，该标志指示当前是否有任何线程持有该锁。当一个线程希望获取锁时，实现逻辑会判断锁是否被持有；如果没有被持有，则原子地设置锁的标志。如果锁被持有，则该函数会简单地不断重试获取锁，直到锁可用为止。以下代码展示了一个自旋锁的实现示例。该实现使用一个无符号\
    \ 32 位整数来表示锁状态，值为 0 表示锁可用，值为 1 表示锁被持有。\n\n```\ntypedef    uint32_t    MySpinLock;\n\
    \nvoid    MyAcquireSpinLock (MySpinLock* lock)\n{\n    // 如果锁的值为 0，则将其值设置为 1。\n\
    \    // 持续尝试直到锁的值被成功设置。\n    while (OSCompareAndSwap(0, 1, lock) == false)\n \
    \       ;\n}\n```\n\n持有自旋锁的线程必须小心，不能再次获取自己当前持有的锁。如果发生这种情况，线程会尝试获取锁并自旋，因为锁不可用。然而，在这种情况下，线程会无限期自旋，因为唯一能释放锁的线程正被阻塞等待该锁。这种情况称为死锁。\n\
    \nI/O Kit 实际使用的 `IOSimpleLock` 实现比给出的示例稍高级一些，因为它在持有锁期间会禁用运行中线程的抢占。这意味着，当持有简单锁时，持有锁的线程在锁释放之前不会被从其所运行的\
    \ CPU 上移走。因此，`IOSimpleLock` 应仅在极短的时间内持有（例如在更新驱动程序的实例变量时），并且绝不应执行可能阻塞运行中线程的操作，例如分配内存或获取互斥锁，因为这可能导致死锁。\n\
    \n尽管自旋锁看起来是一种低效的锁机制，因为线程在无法立即获取锁时会消耗 CPU 周期进行自旋，但只要锁仅持有很短时间，它们实际上可能比其他锁机制更高效。在单\
    \ CPU 机器上，`IOSimpleLock` 永远不会自旋，因为在线程抢占被禁用的情况下，不存在锁竞争的可能性（实际上，同步是通过禁用线程抢占并阻止任何可能获取锁的其他线程执行来实现的）。在多处理器系统上，获取\
    \ `IOSimpleLock` 时禁用抢占并不能阻止在另一个 CPU 上运行的线程尝试访问同一锁（实际上，线程抢占仅对已获取锁的 CPU 核心禁用）。然而，只要自旋锁的持有时间很短，线程在等待锁释放期间自旋所花费的时间通常会远小于使用互斥锁替代自旋锁时阻塞线程的开销。\n\
    \n与互斥锁不同，`IOSimpleLock` 永远不会挂起正在运行的线程。相反，它会自旋直到锁可用。这使得 `IOSimpleLock` 非常适合在主要中断处理程序中运行的代码与非中断代码之间提供同步。实际上，在\
    \ I/O Kit 驱动中很少需要此功能，因为大多数驱动程序永远不需要直接处理中断，即使需要处理，大多数也会将中断延迟到次级中断处理程序。I/O Kit 提供了其他适用于次级中断处理程序的锁机制，本章稍后将讨论这些机制。\n\
    \n为了与在主要中断处理程序内运行的代码提供同步，我们需要确保在非中断时间获取 `IOSimpleLock` 的代码永远不会被中断处理程序内尝试获取同一锁的代码抢占，因为这会导致死锁。为了解决这个问题，I/O\
    \ Kit 提供了一个函数，该函数在获取自旋锁之前禁用运行 CPU 的中断，以及一个对应的函数，用于释放自旋锁然后重新启用中断。正如禁用线程抢占可以保证持有\
    \ `IOSimpleLock` 的线程不会在同一 CPU 上被另一个线程抢占一样，禁用中断可以保证持有 `IOSimpleLock` 的线程不会在同一 CPU\
    \ 上被中断处理程序抢占。系统上另一个 CPU 可能会触发中断，并尝试获取被另一个 CPU 核心上的线程持有的 `IOSimpleLock`（导致中断处理程序自旋），但由于该线程运行在另一个\
    \ CPU 上，它可以继续执行并很快释放该 `IOSimpleLock`。\n\nI/O Kit 提供的 `IOSimpleLock` 函数总结于表 7-2\
    \ 中。\n\n![image](img/t0702.jpg)\n"
- fmt: "# Mutexes\n\nAlthough spin locks are efficient for certain applications, they\
    \ are not suitable in cases in which a thread needs to hold the lock for a long\
    \ time or when a thread performs an operation that may block while the lock is\
    \ held, such as allocating memory or acquiring a second lock. In these cases,\
    \ the use of a spin lock would be very inefficient, since any lock contention\
    \ will result in a thread spinning continuously while it attempts to obtain the\
    \ lock, which would prevent the CPU from performing any useful work. A mutex lock\
    \ does not have this problem because a thread that attempts to acquire a mutex\
    \ lock that is already taken will be suspended until the lock becomes available.\
    \ Rather than spending CPU time spinning, the operating system is able to schedule\
    \ another thread on the CPU. The I/O Kit provides support for mutex locks through\
    \ an object known as an `IOLock`. Because a mutex may block if it cannot be acquired\
    \ immediately, mutex locks cannot be used within an interrupt handler.\n\nThe\
    \ functionality provided by `IOLock` is very similar to that provided by the POSIX\
    \ mutex lock functions that are available to user space applications. You can\
    \ use an `IOLock` in driver code in similar ways to how you would use a POSIX\
    \ mutex in user space code. Unlike an `IOSimpleLock`, which shouldn't be held\
    \ for long periods because it disables preemption (and possibly interrupts), a\
    \ mutex has no such effect on the state of the CPU or operating system's scheduler.\
    \ A thread holding a mutex will still be preempted by another thread once its\
    \ time quantum has expired and a thread holding a mutex can still be preempted\
    \ if the CPU needs to handle an interrupt. However, these points can be seen as\
    \ advantages of using a mutex, since they mean that there are no restrictions\
    \ on what operations can be performed while a mutex is held. While a mutex is\
    \ held, a thread can allocate memory, map memory from user space into the kernel\
    \ (which may result in memory paging), and can obtain another mutex (which is\
    \ an operation that may block).\n\nAs with a spin lock, a thread that holds a\
    \ mutex must be careful not to obtain a mutex that it is currently holding a second\
    \ time. Otherwise, a deadlock will occur. At first, this may seem like an artificial\
    \ problem, since it's simply a matter of ensuring that a thread doesn't attempt\
    \ to obtain a lock that it is already holding. However, this can become complicated\
    \ if the code that is executed while a lock is held calls other functions that\
    \ may themselves call other functions that end up acquiring the lock.\n\nFor example,\
    \ let's pretend that we have a function named `ListEnqueue()` that requires synchronization\
    \ because it can be called from multiple threads. The `ListEnqueue()` function\
    \ may be called from many locations in our project's codebase and some of the\
    \ calling functions may already hold the synchronization lock but other calling\
    \ functions may not hold the lock. If our sample `ListEnqueue()` function were\
    \ to acquire a lock to ensure that it is synchronized when called from functions\
    \ that do not already hold the lock, we would introduce a deadlock when `ListEnqueue()`\
    \ is called from functions that do hold the lock. This situation can be solved\
    \ by using a recursive mutex.\n\nOnce a thread has acquired a recursive mutex,\
    \ any code that runs on that same thread is able to reacquire the mutex multiple\
    \ times without resulting in a deadlock. The shared resource is still synchronized,\
    \ since any other thread that attempts to acquire the mutex will be blocked until\
    \ all acquisitions made by the owning thread have been released. The I/O Kit provides\
    \ support for a recursive mutex through the `IORecursiveLock` object.\n\nA summary\
    \ of the mutex operations provided by the I/O Kit is given in [Table 7-3](#Chapter07.html#tab_7_3)\n\
    \n![image](images/t0703.jpg)\n\n![image](images/t0703a.jpg)\n\n# Condition Variables\n\
    \nAs well as providing a mutex for exclusive access to a shared resource, the\
    \ `IOLock` and `IORecursiveLock` objects provide support for a synchronization\
    \ primitive known as a condition variable. A condition variable allows synchronization\
    \ between multiple threads by providing a mechanism by which one thread can suspend\
    \ its execution until a particular condition (or event) occurs.\n\nAs an example,\
    \ let's consider the driver for a serial port. Our hypothetical driver will receive\
    \ blocking read requests from a user space application. These requests will block\
    \ and only return to user space once data has been received on the serial port.\
    \ Rather than continually polling inside the driver until data is available, a\
    \ better approach is to create a condition variable and suspend the thread so\
    \ that it does not use any CPU time while it is waiting. When the driver receives\
    \ data from hardware, it will wake any threads that are waiting on the condition\
    \ variable. This is illustrated in the following sample code:\n\n```\nvoid    MyDriver::read\
    \ (void* buffer, uint32_t* bytesRead)\n{\n        IOLockLock(m_lock);\n      \
    \  do {\n                // Attempt to read from hardware\n                *bytesRead\
    \ = readFromHardware(buffer);\n\n                // If no data available, sleep\
    \ until the hardware receives data\n                if (*bytesRead == 0)\n   \
    \             {\n                        int     result;\n\n                 \
    \       result = IOLockSleep(m_lock, m_readEvent, THREAD_ABORTSAFE);\n       \
    \                 if (result != THREAD_AWAKENED)\n                           \
    \     break;\n                }\n        } while (*bytesRead == 0);\n        IOLockUnlock(m_lock);\n\
    }\n\nvoid    MyDriver::DataAvailable ()\n{\n        // Wake any threads that are\
    \ sleeping on m_readEvent\n        IOLockWakeup(m_lock, m_readEvent, false);\n\
    }\n```\n\nIn the preceding example, the `read()` method will attempt to receive\
    \ any data from the hardware device, but if no data is available, then it will\
    \ block the current thread until the hardware has data. When the hardware has\
    \ data available, the `DataAvailable()` method is called (which could be called\
    \ in response to a hardware interrupt) and any blocked thread is woken. Note that\
    \ the entire contents of the `read()` method are protected by an `IOLock`. This\
    \ ensures that all attempts to read data from the hardware device are serialized.\
    \ Otherwise, a potential race condition would exist when the hardware signals\
    \ the availability of data as multiple threads are awoken and simultaneously attempt\
    \ to read data from the device. The behavior of `IOLockSleep()` is similar to\
    \ that of its equivalent user space function `pthread_cond_wait()`. The first\
    \ parameter is a lock that must be held by the caller; `IOLockSleep()` will atomically\
    \ release the lock when it sleeps and reacquire the lock once the event has been\
    \ signaled. In this way, the lock is not held while the thread is suspended.\n\
    \nThe parameter `m_readEvent` is the condition variable; the waiting thread specifies\
    \ the event that it is waiting on through the condition variable. The signaling\
    \ thread indicates the event that has occurred by providing the same condition\
    \ variable. A driver will define a number of condition variables that correspond\
    \ to events that it uses to coordinate between its threads. Condition variables\
    \ in the I/O Kit do not have a specific type, rather a condition variable is an\
    \ arbitrary `void*` that uniquely identifies an event. A driver will usually use\
    \ the address of an instance variable (such as the address of the lock itself)\
    \ as a condition variable, since the use of an address guarantees that the value\
    \ will be unique among multiple instances of the driver and other drivers in the\
    \ system.\n\nA summary of the condition variable synchronization operations provided\
    \ by the I/O Kit is given in [Table 7-4](#Chapter07.html#tab_7_4).\n\n![image](images/t0704.jpg)"
  raw: '#### Mutexes


    Although spin locks are efficient for certain applications, they are not suitable
    in cases in which a thread needs to hold the lock for a long time or when a thread
    performs an operation that may block while the lock is held, such as allocating
    memory or acquiring a second lock. In these cases, the use of a spin lock would
    be very inefficient, since any lock contention will result in a thread spinning
    continuously while it attempts to obtain the lock, which would prevent the CPU
    from performing any useful work. A mutex lock does not have this problem because
    a thread that attempts to acquire a mutex lock that is already taken will be suspended
    until the lock becomes available. Rather than spending CPU time spinning, the
    operating system is able to schedule another thread on the CPU. The I/O Kit provides
    support for mutex locks through an object known as an `IOLock`. Because a mutex
    may block if it cannot be acquired immediately, mutex locks cannot be used within
    an interrupt handler.


    The functionality provided by `IOLock` is very similar to that provided by the
    POSIX mutex lock functions that are available to user space applications. You
    can use an `IOLock` in driver code in similar ways to how you would use a POSIX
    mutex in user space code. Unlike an `IOSimpleLock`, which shouldn''t be held for
    long periods because it disables preemption (and possibly interrupts), a mutex
    has no such effect on the state of the CPU or operating system''s scheduler. A
    thread holding a mutex will still be preempted by another thread once its time
    quantum has expired and a thread holding a mutex can still be preempted if the
    CPU needs to handle an interrupt. However, these points can be seen as advantages
    of using a mutex, since they mean that there are no restrictions on what operations
    can be performed while a mutex is held. While a mutex is held, a thread can allocate
    memory, map memory from user space into the kernel (which may result in memory
    paging), and can obtain another mutex (which is an operation that may block).


    As with a spin lock, a thread that holds a mutex must be careful not to obtain
    a mutex that it is currently holding a second time. Otherwise, a deadlock will
    occur. At first, this may seem like an artificial problem, since it''s simply
    a matter of ensuring that a thread doesn''t attempt to obtain a lock that it is
    already holding. However, this can become complicated if the code that is executed
    while a lock is held calls other functions that may themselves call other functions
    that end up acquiring the lock.


    For example, let''s pretend that we have a function named `ListEnqueue()` that
    requires synchronization because it can be called from multiple threads. The `ListEnqueue()`
    function may be called from many locations in our project''s codebase and some
    of the calling functions may already hold the synchronization lock but other calling
    functions nay not hold the lock. If our sample `ListEnqueue()` function were to
    acquire a lock to ensure that it is synchronized when called from functions that
    do not already hold the lock, we would introduce a deadlock when `ListEnqueue()`
    is called from functions that do hold the lock. This situation can be solved by
    using a recursive mutex.


    Once a thread has acquired a recursive mutex, any code that runs on that same
    thread is able to reacquire the mutex multiple times without resulting in a deadlock.
    The shared resource is still synchronized, since any other thread that attempts
    to acquire the mutex will be blocked until all acquisitions made by the owning
    thread have been released. The I/O Kit provides support for a recursive mutex
    through the `IORecursiveLock` object.


    A summary of the mutex operations provided by the I/O Kit is given in [Table 7-3](#Chapter07.html#tab_7_3)


    ![image](images/t0703.jpg)


    ![image](images/t0703a.jpg)


    #### Condition Variables


    As well as providing a mutex for exclusive access to a shared resource, the `IOLock`
    and `IORecursiveLock` objects provide support for a synchronization primitive
    known as a condition variable. A condition variable allows synchronization between
    multiple threads by providing a mechanism by which one thread can suspend its
    execution until a particular condition (or event) occurs.


    As an example, let''s consider the driver for a serial port. Our hypothetical
    driver will receive blocking read requests from a user space application. These
    requests will block and only return to user space once data has been received
    on the serial port. Rather than continually polling inside the driver until data
    is available, a better approach is to create a condition variable and suspend
    the thread so that it does not use any CPU time while it is waiting. When the
    driver receives data from hardware, it will wake any threads that are waiting
    on the condition variable. This is illustrated in the following sample code:


    `void    MyDriver::read (void* buffer, uint32_t* bytesRead)`

    `{`

    `        IOLockLock(m_lock);`

    `        do {`

    `                // Attempt to read from hardware`

    `                *bytesRead = readFromHardware(buffer);`


    `                // If no data available, sleep until the hardware receives data`

    `                if (*bytesRead == 0)`

    `                {`

    `                        int     result;`


    `                        result = IOLockSleep(m_lock, m_readEvent, THREAD_ABORTSAFE);`

    `                        if (result != THREAD_AWAKENED)`

    `                                break;`

    `                }`

    `        } while (*bytesRead == 0);`

    `        IOLockUnlock(m_lock);`

    `}`


    `void    MyDriver::DataAvailable ()`

    `{`

    `        // Wake any threads that are sleeping on m_readEvent`

    `        IOLockWakeup(m_lock, m_readEvent, false);`

    `}`


    In the preceding example, the `read()` method will attempt to receive any data
    from the hardware device, but if no data is available, then it will block the
    current thread until the hardware has data. When the hardware has data available,
    the `DataAvailable()` method is called (which could be called in response to a
    hardware interrupt) and any blocked thread is woken. Note that the entire contents
    of the `read()` method are protected by an `IOLock`. This ensures that all attempts
    to read data from the hardware device are serialized. Otherwise, a potential race
    condition would exist when the hardware signals the availability of data as multiple
    threads are awoken and simultaneously attempt to read data from the device. The
    behavior of `IOLockSleep()` is similar to that of its equivalent user space function
    `pthread_cond_wait()`. The first parameter is a lock that must be held by the
    caller; `IOLockSleep()` will atomically release the lock when it sleeps and reacquire
    the lock once the event has been signaled. In this way, the lock is not held while
    the thread is suspended.


    The parameter `m_readEvent` is the condition variable; the waiting thread specifies
    the event that it is waiting on through the condition variable. The signaling
    thread indicates the event that has occurred by providing the same condition variable.
    A driver will define a number of condition variables that correspond to events
    that it uses to coordinate between its threads. Condition variables in the I/O
    Kit do not have a specific type, rather a condition variable is an arbitrary `void*`
    that uniquely identifies an event. A driver will usually use the address of an
    instance variable (such as the address of the lock itself) as a condition variable,
    since the use of an address guarantees that the value will be unique among multiple
    instances of the driver and other drivers in the system.


    A summary of the condition variable synchronization operations provided by the
    I/O Kit is given in [Table 7-4](#Chapter07.html#tab_7_4).


    ![image](images/t0704.jpg)'
  trans: "\n# 互斥锁\n\n尽管自旋锁在某些应用中效率很高，但在线程需要长时间持有锁，或在持有锁时执行可能阻塞的操作（例如分配内存或获取第二个锁）的情况下，它并不适用。此时使用自旋锁效率极低，因为任何锁竞争都会导致线程在尝试获取锁时持续空转，这会阻止\
    \ CPU 执行任何有用的工作。互斥锁没有这个问题，因为尝试获取已被占用的互斥锁的线程会被挂起，直到锁可用为止。操作系统不会让 CPU 空转，而是能调度另一个线程到\
    \ CPU 上。I/O Kit 通过一个名为`IOLock`的对象提供对互斥锁的支持。由于互斥锁在无法立即获取时可能会阻塞，因此不能在中断处理程序中使用互斥锁。\n\
    \n`IOLock`提供的功能与用户空间程序可用的 POSIX 互斥锁函数非常相似。你可以在驱动代码中以类似于在用户空间代码中使用 POSIX 互斥锁的方式使用`IOLock`。与`IOSimpleLock`（因为它会禁用抢占，也可能禁用中断，所以不应长时间持有）不同，互斥锁对\
    \ CPU 或操作系统调度器的状态没有此类影响。持有互斥锁的线程在其时间片耗尽后仍会被另一个线程抢占，并且如果 CPU 需要处理中断，持有互斥锁的线程也仍然可以被抢占。然而，这些点可以被视为使用互斥锁的优势，因为它们意味着在持有互斥锁时，对可以执行的操作没有限制。在持有互斥锁时，线程可以分配内存、将用户空间的内存映射到内核空间（这可能导致内存分页），并且可以获取另一个互斥锁（这是一个可能阻塞的操作）。\n\
    \n与自旋锁一样，持有互斥锁的线程必须小心，不要再次获取它当前已经持有的互斥锁。否则，就会发生死锁。起初这看起来像是一个人为问题，因为只需确保线程不尝试获取自己已经持有的锁即可。然而，如果在持有锁时执行的代码调用了其他函数，而这些函数又可能调用其他最终会获取该锁的函数，情况就会变得复杂。\n\
    \n例如，假设我们有一个名为`ListEnqueue()`的函数，它需要同步，因为它可能被多个线程调用。`ListEnqueue()`函数可能在我们项目代码库的许多地方被调用，一些调用函数可能已经持有了同步锁，但其他调用函数可能没有持有锁。如果我们的示例`ListEnqueue()`函数获取了一个锁，以确保当它从尚未持有锁的函数调用时是同步的，那么当`ListEnqueue()`从确实持有锁的函数调用时，我们就会引入死锁。这种情况可以通过使用递归互斥锁来解决。\n\
    \n一旦线程获取了递归互斥锁，该同一线程上运行的任何代码都可以多次重新获取该互斥锁，而不会导致死锁。共享资源仍然保持同步，因为任何其他尝试获取该互斥锁的线程都会被阻塞，直到拥有该锁的线程释放其所有获取为止。I/O\
    \ Kit 通过`IORecursiveLock`对象提供对递归互斥锁的支持。\n\nI/O Kit 提供的互斥锁操作总结于表 7-3。\n\n![image](img/t0703.jpg)\n\
    \n![image](img/t0703a.jpg)\n\n# 条件变量\n\n除了提供用于对共享资源进行独占访问的互斥锁之外，`IOLock`和`IORecursiveLock`对象还提供对一种称为条件变量的同步原语的支持。条件变量允许多个线程之间的同步，它提供了一种机制，通过该机制一个线程可以暂停其执行，直到某个特定条件（或事件）发生。\n\
    \n作为例子，让我们考虑一个串行端口驱动程序。我们假设的驱动程序会从用户空间应用程序接收阻塞的读取请求。这些请求将阻塞，并且只有在串行端口接收到数据后才返回到用户空间。与其在驱动程序内部持续轮询直到数据可用，更好的方法是创建一个条件变量并挂起线程，这样它在等待时就不会占用任何\
    \ CPU 时间。当驱动程序从硬件接收到数据时，它会唤醒所有正在等待该条件变量的线程。这在以下示例代码中进行了说明：\n\n```\nvoid    MyDriver::read\
    \ (void* buffer, uint32_t* bytesRead)\n{\n        IOLockLock(m_lock);\n      \
    \  do {\n                // 尝试从硬件读取\n                *bytesRead = readFromHardware(buffer);\n\
    \n                // 如果没有可用数据，则休眠直到硬件接收到数据\n                if (*bytesRead ==\
    \ 0)\n                {\n                        int     result;\n\n         \
    \               result = IOLockSleep(m_lock, m_readEvent, THREAD_ABORTSAFE);\n\
    \                        if (result != THREAD_AWAKENED)\n                    \
    \            break;\n                }\n        } while (*bytesRead == 0);\n \
    \       IOLockUnlock(m_lock);\n}\n\nvoid    MyDriver::DataAvailable ()\n{\n  \
    \      // 唤醒任何在 m_readEvent 上休眠的线程\n        IOLockWakeup(m_lock, m_readEvent,\
    \ false);\n}\n```\n\n在前面的示例中，`read()`方法会尝试从硬件设备接收任何数据，但如果没有可用数据，它将阻塞当前线程，直到硬件有数据。当硬件有数据可用时，会调用`DataAvailable()`方法（这可能在响应硬件中断时被调用），并且任何被阻塞的线程都会被唤醒。请注意，`read()`方法的全部内容都由一个`IOLock`保护。这确保了对硬件设备的所有读取尝试都是串行化的。否则，当硬件发出数据可用信号时，多个线程被唤醒并同时尝试从设备读取数据，就会存在潜在的竞态条件。`IOLockSleep()`的行为类似于其等效的用户空间函数`pthread_cond_wait()`。第一个参数是调用者必须持有的锁；`IOLockSleep()`会在休眠时原子性地释放该锁，并在事件被信号通知后重新获取该锁。通过这种方式，线程被挂起时不会持有锁。\n\
    \n参数`m_readEvent`是条件变量；等待线程通过条件变量指定它正在等待的事件。信号通知线程通过提供相同的条件变量来指示已发生的事件。驱动程序会定义多个条件变量，这些变量对应于它用于协调其线程之间的事件。I/O\
    \ Kit 中的条件变量没有特定类型，相反，条件变量是一个任意的`void*`指针，用于唯一标识一个事件。驱动程序通常使用实例变量的地址（例如锁本身的地址）作为条件变量，因为使用地址可以保证该值在驱动程序的多个实例以及系统中的其他驱动程序之间是唯一的。\n\
    \nI/O Kit 提供的条件变量同步操作总结于表 7-4。\n\n![image](img/t0704.jpg)\n"
- fmt: "提供给`sleep`函数的`interruptType`参数决定了当拥有该线程的进程收到`SIGHUP`或`SIGKILL`等信号时，该函数是否应返回。如果等待是由用户客户端为响应控制请求而执行的，并且驱动程序函数运行在用户空间应用程序创建的线程上，那么这个参数非常有用。根据具体情况，如果进程收到信号，驱动程序可能希望中止等待，因为客户端进程可能已被终止。`interruptType`的可能值如下：\n\
    \n- `THREAD_UNINT`指定睡眠不应被任何信号中止\n- `THREAD_INTERRUPTIBLE`指定睡眠在收到`SIGKILL`信号时可能被中止\n\
    - `THREAD_ABORTSAFE`指定睡眠在收到任何信号时可能被中止\n\n从睡眠中唤醒后，该函数将返回以下结果值之一：\n\n- `THREAD_AWAKENED`指示函数正常返回，并且事件已通过调用`IOLockWakeup()`发出信号\n\
    - `THREAD_TIMED_OUT`指示事件未在指定截止时间前发出信号\n- `THREAD_INTERRUPTED`指示拥有驱动程序所在线程的用户进程收到了信号\n\
    - `THREAD_RESTART`指示应完全重新启动等待操作\n\n## 读/写互斥锁\n\n互斥锁的一个问题是，只允许单个线程持有锁通常过于限制。在许多情况下，应该允许多个线程读取共享资源。只有当线程希望写入共享资源或以其他方式修改它时，才需要独占访问。这个问题通过一种称为读/写互斥锁的特殊类型互斥锁得到解决。\n\
    \nI/O Kit通过一个名为`IORWLock`的对象提供读/写互斥锁。读/写互斥锁的使用方式与标准互斥锁类似。一个区别是，调用者必须确定它是打算读取共享资源（在这种情况下它可以与其他读取者共享互斥锁）还是打算写入共享资源（在这种情况下它需要对互斥锁的独占访问）。I/O\
    \ Kit根据调用代码希望执行的操作提供了两个不同的函数。\n\nI/O Kit提供的读/写互斥锁同步操作摘要见[表7-5](#Chapter07.html#tab_7_5)。\n\
    \n![image](images/t0705.jpg)\n\n![image](images/square.jpg) **注意** I/O Kit锁原语都构建在Mach类型之上。I/O\
    \ Kit包含用于获取底层Mach锁类型的函数，包括`IOSimpleLockGetMachLock()`，`IOLockGetMachLock()`，`IORecursiveLockGetMachLock()`和`IORWLockGetMachLock()`。这些函数可用于利用Mach级别实现但I/O\
    \ Kit函数未公开的行为。例如，Mach读/写锁可以从共享读取访问升级为独占写入访问，但I/O Kit没有提供等效函数。\n\n## 同步异步事件：工作循环\n\
    \n如果驱动程序需要响应硬件中断或定时器等异步事件，驱动程序内部的同步将变得复杂。这增加了一层额外的复杂性，因为除了需要在多个执行线程之间进行同步外，驱动程序现在还必须处理在多个线程上运行的代码与响应异步事件而运行的代码之间的同步。为了简化驱动程序开发人员的工作，I/O\
    \ Kit提供了一个名为`IOWorkLoop`的类，它创建一个处理所有异步事件的单个线程。在I/O Kit术语中，该线程被称为“工作循环”，驱动程序将其任何异步事件源（如中断处理程序和定时器）注册到`IOWorkLoop`对象中。\n\
    \n在大部分时间里，工作循环线程将处于空闲状态，不消耗CPU时间，只是等待事件发生。一旦事件发生，相应的事件源将向工作循环发出信号。工作循环线程将唤醒、处理事件，然后返回睡眠状态。由于所有事件都在同一个工作循环线程上处理，这种设计为同步驱动程序内的多个事件源提供了一个优雅的解决方案。该设计的另一个优点是，由于所有事件源都在同一个线程上处理，处理程序函数不需要提供任何额外的锁定，因为不可能有多个处理程序同时运行。\n\
    \n工作循环是每个I/O Kit驱动程序的内在组成部分。`IOService`类（最终派生所有驱动程序对象的基类）提供了一个名为`getWorkLoop()`的方法，通过该方法，提供者类可以与其子驱动程序共享其工作循环。驱动程序可以选择使用其提供者类创建的`IOWorkLoop`对象（通过调用`IOService::getWorkLoop()`），或选择创建自己的`IOWorkLoop`对象。如果驱动程序预计只接收偶尔的异步事件，并且事件处理程序的延迟不需要保持在最低限度，那么共享其提供者类的工作循环是一种有吸引力的方法。这还将简化构成驱动程序构造函数和析构函数的代码，并消除为驱动程序自己的工作循环创建额外内核线程的开销。处理硬件中断的驱动程序应创建自己专用的`IOWorkLoop`对象，因为这能保证最低延迟，因为工作循环不与来自其提供者驱动程序的事件源共享。\n\
    \n驱动程序通常在其`start()`方法内部初始化其工作循环。如果驱动程序决定共享其提供者的工作循环，则可以通过以下方式获取工作循环：\n\n```\n\
    m_workLoop = getWorkLoop();        // Implemented by the IOService superclass\n\
    if (m_workLoop == NULL)\n        abort with error;\nm_workLoop->retain();\n```\n\
    \n如果驱动程序决定创建自己专用的工作循环，则可以按如下方式实例化一个新的`IOWorkLoop`对象：\n\n```\nm_workLoop = IOWorkLoop::workLoop();\n\
    if (m_workLoop == NULL)\n        abort with error;\n```\n\n如果驱动程序实例化了自己的`IOWorkLoop`对象，则应考虑重写`IOService`方法`getWorkLoop()`，以将其工作循环暴露给其任何子驱动程序。"
  raw: 'The `interruptType` parameter that is provided to the sleep functions determines
    whether the function should return if the process that owns the thread receives
    a signal such as `SIGHUP` or `SIGKILL`. This is useful if the wait is being performed
    by a user client in response to a control request in which case the driver function
    will be running on a thread that was created by the user space application. Depending
    on the situation, the driver may wish to abort the wait if the process receives
    a signal, since the client process may have been terminated. The possible values
    for `interruptType` are:


    *   `THREAD_UNINT` specifies that the sleep should not be aborted by any signal

    *   `THREAD_INTERRUPTIBLE` specifies that the sleep may be aborted if a `SIGKILL`
    signal is received

    *   `THREAD_ABORTSAFE` specifies that the sleep may be aborted if any signal is
    received


    Upon waking from a sleep, the function will return one of the following result
    values:


    *   `THREAD_AWAKENED` indicates the function returned normally and the event was
    signaled by a call to `IOLockWakeup()`

    *   `THREAD_TIMED_OUT` indicates that the event was not signaled by the specified
    deadline

    *   `THREAD_INTERRUPTED` indicates the user process that owns the thread on which
    the driver was sleeping received a signal

    *   `THREAD_RESTART` indicates that the wait operation should be restarted entirely


    #### Read/Write Mutexes


    One of the problems with a mutex is that allowing only a single thread to hold
    the lock can often be unnecessarily restrictive. In many cases, there is no reason
    why multiple threads should not be allowed to read a shared resource. It is only
    when a thread wishes to write to the shared resource or otherwise modify it that
    exclusive access is required. This problem is solved by a specialized type of
    mutex known as a read/write mutex.


    The I/O Kit provides read/write mutexes through an object known as `IORWLock`.
    A read/write mutex can be used in a similar way to a standard mutex. The one distinction
    is the caller must determine whether it intends to read the shared resource (in
    which case it can share the mutex with other readers) or intends to write to the
    shared resource (in which case it requires exclusive access to the mutex). The
    I/O Kit provides two separate functions depending on the action that the calling
    code wishes to take.


    A summary of the read/write mutex synchronization operations provided by the I/O
    Kit is given in [Table 7-5](#Chapter07.html#tab_7_5).


    ![image](images/t0705.jpg)


    ![image](images/square.jpg) **Note** The I/O Kit locking primitives are all built
    on top of Mach types. The I/O Kit contains functions to get at the underlying
    Mach locking types, including `IOSimpleLockGetMachLock()`, `IOLockGetMachLock()`,
    `IORecursiveLockGetMachLock()`, and `IORWLockGetMachLock()`. These functions can
    be useful to take advantage of behavior that is implemented at the Mach level
    but not exposed by the I/O Kit functions. For example, Mach read/write locks can
    be upgraded from shared read access to exclusive write access, but the I/O Kit
    provides no equivalent function.


    ### Synchronizing Asynchronous Events: Work Loops


    Synchronization within a driver becomes difficult if the driver needs to respond
    to asynchronous events such as hardware interrupts or timers. This adds an extra
    layer of complexity since, in addition to requiring synchronization between multiple
    threads of execution, the driver now has to contend with the synchronization of
    code that runs on multiple threads and code that runs in response to asynchronous
    events. To simplify the work required by the driver developer, the I/O Kit provides
    a class known as `IOWorkLoop` that creates a single thread on which all asynchronous
    events are handled. In I/O Kit nomenclature, this thread is known as a “work loop”
    and a driver registers any of its asynchronous event sources, such as interrupt
    handlers and timers, with an `IOWorkLoop` object.


    For much of the time, the work loop thread will be idle, consuming no CPU time
    and simply waiting for an event to occur. Once an event occurs, the corresponding
    event source will signal the work loop. The work loop thread will wake up, handle
    the event, and then return to the sleep state. Since all events are handled on
    the same work loop thread, this design provides an elegant solution for synchronizing
    multiple sources within a driver. Another advantage of this design is that, since
    all event sources are handled on the same thread, the handler functions do not
    need to provide any additional locking because there is no possibility of multiple
    handlers running at the same time.


    The work loop is an intrinsic part of every I/O Kit driver. The `IOService` class,
    which is the base class from which every driver object is ultimately derived,
    provides a method named `getWorkLoop()` through which a provider class can share
    its work loop with its child drivers. A driver can choose to use the `IOWorkLoop`
    object created by its provider class (by calling `IOService::getWorkLoop()`) or
    can opt to create its own `IOWorkLoop` object. If a driver expects to receive
    only the occasional asynchronous event and the latency of the event handler doesn''t
    need to be kept to a minimum, then sharing the work loop of its provider class
    is an attractive approach. This will also simplify the code that forms the driver''s
    constructor and destructor and eliminate the overhead of creating an additional
    kernel thread for the driver''s own work loop. Drivers that handle hardware interrupts
    should create their own dedicated `IOWorkLoop` object since this guarantees minimum
    latency because the work loop is not shared with event sources from its provider
    driver.


    A driver will typically initialize its work loop inside the driver''s `start()`
    method. If a driver decides that it will share the work loop of its provider,
    then it can obtain a work loop in the following way:


    `m_workLoop = getWorkLoop();        // Implemented by the IOService superclass`

    `if (m_workLoop == NULL)`

    `        abort with error;`

    `m_workLoop->retain();`


    If a driver decides that it will create a dedicated work loop of its own, then
    it can instantiate a new `IOWorkLoop` object as follows:


    `m_workLoop = IOWorkLoop::workLoop();`

    `if (m_workLoop == NULL)`

    `        abort with error;`


    If a driver instantiates its own `IOWorkLoop` object, then it should consider
    overriding the `IOService` method `getWorkLoop()` to expose its work loop to any
    child drivers of its own.'
  trans: "\n提供给`sleep`函数的`interruptType`参数决定了当拥有该线程的进程收到`SIGHUP`或`SIGKILL`等信号时，该函数是否应返回。如果等待是由用户客户端为响应控制请求而执行的，并且驱动程序函数运行在用户空间应用程序创建的线程上，那么这个参数非常有用。根据具体情况，如果进程收到信号，驱动程序可能希望中止等待，因为客户端进程可能已被终止。`interruptType`的可能值如下：\n\
    \n- `THREAD_UNINT`指定睡眠不应被任何信号中止\n- `THREAD_INTERRUPTIBLE`指定睡眠在收到`SIGKILL`信号时可能被中止\n\
    - `THREAD_ABORTSAFE`指定睡眠在收到任何信号时可能被中止\n\n从睡眠中唤醒后，该函数将返回以下结果值之一：\n\n- `THREAD_AWAKENED`指示函数正常返回，并且事件已通过调用`IOLockWakeup()`发出信号\n\
    - `THREAD_TIMED_OUT`指示事件未在指定截止时间前发出信号\n- `THREAD_INTERRUPTED`指示拥有驱动程序所在线程的用户进程收到了信号\n\
    - `THREAD_RESTART`指示应完全重新启动等待操作\n\n## 读/写互斥锁\n\n互斥锁的一个问题是，只允许单个线程持有锁通常过于限制。在许多情况下，应该允许多个线程读取共享资源。只有当线程希望写入共享资源或以其他方式修改它时，才需要独占访问。这个问题通过一种称为读/写互斥锁的特殊类型互斥锁得到解决。\n\
    \nI/O Kit 通过一个名为`IORWLock`的对象提供读/写互斥锁。读/写互斥锁的使用方式与标准互斥锁类似。一个区别是，调用者必须确定它是打算读取共享资源（在这种情况下它可以与其他读取者共享互斥锁）还是打算写入共享资源（在这种情况下它需要对互斥锁的独占访问）。I/O\
    \ Kit 根据调用代码希望执行的操作提供了两个不同的函数。\n\nI/O Kit 提供的读/写互斥锁同步操作摘要见表 7-5。\n\n![image](img/t0705.jpg)\n\
    \n![image](img/square.jpg) **注意** I/O Kit 锁原语都构建在 Mach 类型之上。I/O Kit 包含用于获取底层 Mach\
    \ 锁类型的函数，包括`IOSimpleLockGetMachLock()`，`IOLockGetMachLock()`，`IORecursiveLockGetMachLock()`和`IORWLockGetMachLock()`。这些函数可用于利用\
    \ Mach 级别实现但 I/O Kit 函数未公开的行为。例如，Mach 读/写锁可以从共享读取访问升级为独占写入访问，但 I/O Kit 没有提供等效函数。\n\
    \n## 同步异步事件：工作循环\n\n如果驱动程序需要响应硬件中断或定时器等异步事件，驱动程序内部的同步将变得复杂。这增加了一层额外的复杂性，因为除了需要在多个执行线程之间进行同步外，驱动程序现在还必须处理在多个线程上运行的代码与响应异步事件而运行的代码之间的同步。为了简化驱动程序开发人员的工作，I/O\
    \ Kit 提供了一个名为`IOWorkLoop`的类，它创建一个处理所有异步事件的单个线程。在 I/O Kit 术语中，该线程被称为“工作循环”，驱动程序将其任何异步事件源（如中断处理程序和定时器）注册到`IOWorkLoop`对象中。\n\
    \n在大部分时间里，工作循环线程将处于空闲状态，不消耗 CPU 时间，只是等待事件发生。一旦事件发生，相应的事件源将向工作循环发出信号。工作循环线程将唤醒、处理事件，然后返回睡眠状态。由于所有事件都在同一个工作循环线程上处理，这种设计为同步驱动程序内的多个事件源提供了一个优雅的解决方案。该设计的另一个优点是，由于所有事件源都在同一个线程上处理，处理程序函数不需要提供任何额外的锁定，因为不可能有多个处理程序同时运行。\n\
    \n工作循环是每个 I/O Kit 驱动程序的内在组成部分。`IOService`类（最终派生所有驱动程序对象的基类）提供了一个名为`getWorkLoop()`的方法，通过该方法，提供者类可以与其子驱动程序共享其工作循环。驱动程序可以选择使用其提供者类创建的`IOWorkLoop`对象（通过调用`IOService::getWorkLoop()`），或选择创建自己的`IOWorkLoop`对象。如果驱动程序预计只接收偶尔的异步事件，并且事件处理程序的延迟不需要保持在最低限度，那么共享其提供者类的工作循环是一种有吸引力的方法。这还将简化构成驱动程序构造函数和析构函数的代码，并消除为驱动程序自己的工作循环创建额外内核线程的开销。处理硬件中断的驱动程序应创建自己专用的`IOWorkLoop`对象，因为这能保证最低延迟，因为工作循环不与来自其提供者驱动程序的事件源共享。\n\
    \n驱动程序通常在其`start()`方法内部初始化其工作循环。如果驱动程序决定共享其提供者的工作循环，则可以通过以下方式获取工作循环：\n\n```\n\
    m_workLoop = getWorkLoop();        // Implemented by the IOService superclass\n\
    if (m_workLoop == NULL)\n        abort with error;\nm_workLoop->retain();\n```\n\
    \n如果驱动程序决定创建自己专用的工作循环，则可以按如下方式实例化一个新的`IOWorkLoop`对象：\n\n```\nm_workLoop = IOWorkLoop::workLoop();\n\
    if (m_workLoop == NULL)\n        abort with error;\n```\n\n如果驱动程序实例化了自己的`IOWorkLoop`对象，则应考虑重写`IOService`方法`getWorkLoop()`，以将其工作循环暴露给其任何子驱动程序。\n"
- fmt: "Having obtained an `IOWorkLoop` object, the driver next needs to register\
    \ the event sources that it wishes to handle on the work loop thread. Event sources\
    \ are objects that inherit from the `IOEventSource` base class. The I/O Kit provides\
    \ specializations, including the `IOInterruptEventSource` class and the `IOTimerEventSource`\
    \ class, for creating an event source for a PCI card's interrupt handler and a\
    \ timer event, respectively. When an event source is instantiated, a callback\
    \ function is provided, which will be invoked when the event requires servicing.\
    \ The callback function is guaranteed to either be called from the work loop thread\
    \ or to be synchronized with any code running on the work loop thread. An example\
    \ of code to create an event source for a timer and add it to a work loop is given\
    \ here:\n\n```\nm_timerEventSource = IOTimerEventSource::timerEventSource(this,\
    \ TimerFiredFunc);\nif (m_timerEventSource == NULL)\n        abort with error;\n\
    \nresult = m_workLoop->addEventSource(m_timerEventSource);\nif (result != kIOReturnSuccess)\n\
    \        abort with error;\n```\n\n![image](images/square.jpg) **Note** In the\
    \ case of an interrupt handler, the callback that is run on the work loop thread\
    \ corresponds to the secondary interrupt handler; the primary interrupt is still\
    \ taken at the hardware interrupt level and will run in an arbitrary thread context.\n\
    \nA driver will typically specify a static method in its main driver class as\
    \ the callback function of an `IOEventSource`. Although the arguments provided\
    \ to the callback function differ depending on the type of event source that is\
    \ being invoked, the first argument is always a pointer to an `OSObject` class\
    \ that can be used to pass the driver's instance to the callback function. Depending\
    \ on the complexity of the callback function, the implementation may either handle\
    \ the event directly in the static class function or call through to an instance\
    \ method of the driver.\n\n### IOCommandGate\n\nOne problem that remains is that\
    \ a driver may need to synchronize code running on its own threads against event\
    \ actions that run on the work loop thread. For example, consider the driver for\
    \ a disk device that receives requests for read and write transactions from user\
    \ space applications. Since the hardware can only service one transaction at a\
    \ time, any additional transactions will be added to a queue and, whenever a transaction\
    \ has completed (which is signaled through an interrupt), the driver will remove\
    \ the next transaction from the head of the queue and service it. Since this hypothetical\
    \ driver manipulates the transaction queue both from within its interrupt handler\
    \ (which will run on the work loop) and from its user client, it requires some\
    \ way of synchronizing code that runs on the work loop thread with code that runs\
    \ in an arbitrary thread context.\n\nTo solve this problem, the I/O Kit provides\
    \ a special event source known as a command gate, implemented by a class named\
    \ `IOCommandGate`. A command gate is installed on a work loop like any other event\
    \ source but, instead of generating events itself, it is used to execute an arbitrary\
    \ callback function on the work loop thread. The `IOCommandGate` class contains\
    \ a method named `runAction()` that takes a function pointer and runs that function\
    \ such that it is synchronized with any other work loop event. A function that\
    \ is executed through an `IOCommandGate` object is said to be a “gated” function.\
    \ The gated function isn't actually run on the work loop thread. It is simply\
    \ serialized against all other work loop sources, including other gated functions\
    \ that are called through the same `IOCommandGate`. The command gate actually\
    \ runs the function on whichever thread made the call to `runAction()`. This removes\
    \ the overhead of a context switch to the work loop thread. An example of calling\
    \ a function through an `IOCommandGate` is shown in the following code:\n\n```\n\
    // Method called outside the gate\nIOReturn MyDriver::startTransaction(Transaction*\
    \ transaction)\n{\n        // Call the function StartTransactionAction through\
    \ the command gate\n        return m_commandGate->runAction((IOCommandGate::Action)StartTransactionAction);\n\
    }\n\n// IOCommandGate::Action\nIOReturn MyDriver::StartTransactionAction(MyDriver*\
    \ self, Transaction* transaction)\n{\n        // This static method is synchronized\
    \ against all work loop methods\n        ...\n        return kIOReturnSuccess;\n\
    }\n```\n\nIn the previous example, we provided a single parameter to the action\
    \ function, namely the argument `transaction`. The `IOCommandGate` allows up to\
    \ four parameters to be provided to an action function.\n\nThe `IOCommandGate`\
    \ achieves its synchronization through a recursive lock. This allows a function\
    \ that has been called through the `IOCommandGate` to call other functions through\
    \ the same `IOCommandGate` without causing a deadlock. It also allows a gated\
    \ function to sleep and wake on condition variables, using an approach that is\
    \ similar to that discussed earlier in this chapter. The `IOCommandGate` class\
    \ contains two methods for sleeping on a condition variable, one which will timeout\
    \ after a specified period and one which will sleep until the condition variable\
    \ is signaled. These two methods are described as follows:\n\n```\nIOReturn  \
    \           commandSleep(void* event, UInt32 interruptType);\nIOReturn       \
    \      commandSleep(void* event, AbsoluteTime deadline, UInt32 interruptType);\n\
    ```\n\nThe parameters `event`, `interruptType`, and `deadline` have the same meaning\
    \ as the parameters of the same name that are passed to the functions `IOLockSleep()`\
    \ and `IOLockSleepDeadline()` described in [Table 7-4](#Chapter07.html#tab_7_4).\
    \ As we saw in the section on “Condition Variables,” a thread can only sleep on\
    \ a condition variable if it is holding a synchronization lock. The same rule\
    \ applies for the `commandSleep()` method, which must be called from a function\
    \ that has been called through an `IOCommandGate` object.\n\nTo signal a command\
    \ gate's condition variable when an event has occurred, the `IOCommandGate` class\
    \ provides the following method that takes the same form as the `IOLockWakeup()`\
    \ function described in [Table 7-4](#Chapter07.html#tab_7_4):\n\n```\nvoid   \
    \ commandWakeup(void* event, bool oneThread);\n```\n\nThe `IOCommandGate` object\
    \ provides all of the synchronization capabilities of an `IORecursiveLock`, including\
    \ mutex locking and condition variable support. This allows a driver to use an\
    \ `IOCommandGate` object instead of an I/O Kit lock for all of its synchronization.\
    \ This can be useful if a driver needs a work loop to provide synchronization\
    \ against asynchronous events; the driver can create an `IOCommandGate` and use\
    \ the work loop throughout its implementation instead of creating additional locks."
  raw: 'Having obtained an `IOWorkLoop` object, the driver next needs to register
    the event sources that it wishes to handle on the work loop thread. Event sources
    are objects that inherit from the `IOEventSource` base class. The I/O Kit provides
    specializations, including the `IOInterruptEventSource` class and the `IOTimerEventSource`
    class, for creating an event source for a PCI card''s interrupt handler and a
    timer event, respectively. When an event source is instantiated, a callback function
    is provided, which will be invoked when the event requires servicing. The callback
    function is guaranteed to either be called from the work loop thread or to be
    synchronized with any code running on the work loop thread. An example of code
    to create an event source for a timer and add it to a work loop is given here:


    `m_timerEventSource = IOTimerEventSource::timerEventSource(this, TimerFiredFunc);`

    `if (m_timerEventSource == NULL)`

    `        abort with error;`


    `result = m_workLoop->addEventSource(m_timerEventSource);`

    `if (result != kIOReturnSuccess)`

    `        abort with error;`


    ![image](images/square.jpg) **Note** In the case of an interrupt handler, the
    callback that is run on the work loop thread corresponds to the secondary interrupt
    handler; the primary interrupt is still taken at the hardware interrupt level
    and will run in an arbitrary thread context.


    A driver will typically specify a static method in its main driver class as the
    callback function of an `IOEventSource`. Although the arguments provided to the
    callback function differ depending on the type of event source that is being invoked,
    the first argument is always a pointer to an `OSObject` class that can be used
    to pass the driver''s instance to the callback function. Depending on the complexity
    of the callback function, the implementation may either handle the event directly
    in the static class function or call through to an instance method of the driver.


    #### IOCommandGate


    One problem that remains is that a driver may need to synchronize code running
    on its own threads against event actions that run on the work loop thread. For
    example, consider the driver for a disk device that receives requests for read
    and write transactions from user space applications. Since the hardware can only
    service one transaction at a time, any additional transactions will be added to
    a queue and, whenever a transaction has completed (which is signaled through an
    interrupt), the driver will remove the next transaction from the head of the queue
    and service it. Since this hypothetical driver manipulates the transaction queue
    both from within its interrupt handler (which will run on the work loop) and from
    its user client, it requires some way of synchronizing code that runs on the work
    loop thread with code that runs in an arbitrary thread context.


    To solve this problem, the I/O Kit provides a special event source known as a
    command gate, implemented by a class named `IOCommandGate`. A command gate is
    installed on a work loop like any other event source but, instead of generating
    events itself, it is used to execute an arbitrary callback function on the work
    loop thread. The `IOCommandGate` class contains a method named `runAction()` that
    takes a function pointer and runs that function such that it is synchronized with
    any other work loop event. A function that is executed through an `IOCommandGate`
    object is said to be a “gated” function. The gated function isn''t actually run
    on the work loop thread. It is simply serialized against all other work loop sources,
    including other gated functions that are called through the same `IOCommandGate`.
    The command gate actually runs the function on whichever thread made the call
    to `runAction()`. This removes the overhead of a context switch to the work loop
    thread. An example of calling a function through an `IOCommandGate` is shown in
    the following code:


    `// Method called outside the gate`

    `IOReturn MyDriver::startTransaction(Transaction* transaction)`

    `{`

    `        // Call the function StartTransactionAction through the command gate`

    `        return m_commandGate->runAction((IOCommandGate::Action)StartTransactionAction);`

    `}`


    `// IOCommandGate::Action`

    `IOReturn MyDriver::StartTransactionAction(MyDriver* self, Transaction* transaction)`

    `{`

    `        // This static method is synchronized against all work loop methods`

    `        ...`

    `        return kIOReturnSuccess;`

    `}`


    In the previous example, we provided a single parameter to the action function,
    namely the argument “`transaction`”. The `IOCommandGate` allows up to four parameters
    to be provided to an action function.


    The `IOCommandGate` achieves its synchronization through a recursive lock. This
    allows a function that has been called through the `IOCommandGate` to call other
    functions through the same `IOCommandGate` without causing a deadlock. It also
    allows a gated function to sleep and wake on condition variables, using an approach
    that is similar to that discussed earlier in this chapter. The `IOCommandGate`
    class contains two methods for sleeping on a condition variable, one which will
    timeout after a specified period and one which will sleep until the condition
    variable is signaled. These two methods are described as follows:


    `IOReturn             commandSleep(void* event, UInt32 interruptType);`

    `IOReturn             commandSleep(void* event, AbsoluteTime deadline, UInt32
    interruptType);`


    The parameters `event`, `interruptType`, and `deadline` have the same meaning
    as the parameters of the same name that are passed to the functions `IOLockSleep()`
    and `IOLockSleepDeadline()` described in [Table 7-4](#Chapter07.html#tab_7_4).
    As we saw in the section on “Condition Variables,” a thread can only sleep on
    a condition variable if it is holding a synchronization lock. The same rule applies
    for the `commandSleep()` method, which must be called from a function that has
    been called through an `IOCommandGate` object.


    To signal a command gate''s condition variable when an event has occurred, the
    `IOCommandGate` class provides the following method that takes the same form as
    the `IOLockWakeup()` function described in [Table 7-4](#Chapter07.html#tab_7_4):


    `void    commandWakeup(void* event, bool oneThread);`


    The `IOCommandGate` object provides all of the synchronization capabilities of
    an `IORecursiveLock`, including mutex locking and condition variable support.
    This allows a driver to use an `IOCommandGate` object instead of an I/O Kit lock
    for all of its synchronization. This can be useful if a driver needs a work loop
    to provide synchronization against asynchronous events; the driver can create
    an `IOCommandGate` and use the work loop throughout its implementation instead
    of creating additional locks.'
  trans: "\n获取到`IOWorkLoop`对象后，驱动程序接下来需要注册它希望在工循环线程上处理的事件源。事件源是继承自`IOEventSource`基类的对象。I/O\
    \ Kit 提供了专用子类，包括`IOInterruptEventSource`类和`IOTimerEventSource`类，分别用于为 PCI 卡的中断处理程序和定时器事件创建事件源。实例化事件源时，需提供一个回调函数，该函数在事件需要被处理时会被调用。该回调函数保证要么从工作循环线程调用，要么与在工作循环线程上运行的任何代码保持同步。以下是一个为定时器创建事件源并将其添加到工作循环的代码示例：\n\
    \n```\nm_timerEventSource = IOTimerEventSource::timerEventSource(this, TimerFiredFunc);\n\
    if (m_timerEventSource == NULL)\n        出错并中止；\n\nresult = m_workLoop->addEventSource(m_timerEventSource);\n\
    if (result != kIOReturnSuccess)\n        出错并中止；\n```\n\n![image](img/square.jpg)\
    \ **注意** 对于中断处理程序而言，在工作循环线程上运行的回调对应于次级中断处理程序；主中断仍然在硬件中断级别处理，并会在任意线程上下文中运行。\n\n\
    驱动程序通常会在其主驱动类中指定一个静态方法作为`IOEventSource`的回调函数。虽然提供给回调函数的参数因所调用的事件源类型而异，但第一个参数始终是指向`OSObject`类的指针，可用于将驱动程序实例传递给回调函数。根据回调函数的复杂程度，其实现可以直接在静态类函数中处理事件，或者转而调用驱动程序的实例方法。\n\
    \n### IOCommandGate\n\n仍然存在的一个问题是，驱动程序可能需要将在其自身线程上运行的代码与在工作循环线程上运行的事件操作同步。例如，考虑一个磁盘设备的驱动程序，它从用户空间应用程序接收读取和写入事务的请求。由于硬件一次只能处理一个事务，任何额外的事务都将被加入队列，并且每当一个事务完成（通过中断发出信号）时，驱动程序将从队列头部取出下一个事务并处理它。由于这个假设的驱动程序既在其中断处理程序（在工作循环上运行）中操作事务队列，也在其用户客户端中操作事务队列，因此它需要一种将工作循环线程上运行的代码与在任意线程上下文中运行的代码同步的方法。\n\
    \n为了解决这个问题，I/O Kit 提供了一种特殊的事件源，称为命令门，由名为`IOCommandGate`的类实现。命令门像其他事件源一样安装在工作循环上，但它本身不生成事件，而是用于在工作循环线程上执行一个任意的回调函数。`IOCommandGate`类包含一个名为`runAction()`的方法，该方法接受一个函数指针并运行该函数，使其与任何其他工作循环事件同步。通过`IOCommandGate`对象执行的函数被称为“门控”函数。门控函数实际上并非在工作循环线程上运行。它只是与所有其他工作循环源（包括通过同一个`IOCommandGate`调用的其他门控函数）被串行化。命令门实际上会在调用`runAction()`的线程上运行该函数。这消除了上下文切换到工作循环线程的开销。以下代码展示了一个通过`IOCommandGate`调用函数的示例：\n\
    \n```\n// 在门外部调用的方法\nIOReturn MyDriver::startTransaction(Transaction* transaction)\n\
    {\n        // 通过命令门调用函数 StartTransactionAction\n        return m_commandGate->runAction((IOCommandGate::Action)StartTransactionAction);\n\
    }\n\n// IOCommandGate::Action\nIOReturn MyDriver::StartTransactionAction(MyDriver*\
    \ self, Transaction* transaction)\n{\n        // 此静态方法已与所有工作循环方法同步\n        ...\n\
    \        return kIOReturnSuccess;\n}\n```\n\n在上一个示例中，我们向动作函数提供了一个参数，即参数`transaction`。`IOCommandGate`允许向动作函数提供最多四个参数。\n\
    \n`IOCommandGate`通过递归锁实现其同步。这允许通过`IOCommandGate`调用的函数再通过同一个`IOCommandGate`调用其他函数，而不会导致死锁。它还允许门控函数在条件变量上休眠和唤醒，使用的方法与本章前面讨论的方法类似。`IOCommandGate`类包含两个用于在条件变量上休眠的方法，一个会在指定时间后超时，另一个会一直休眠直到条件变量被触发。这两个方法描述如下：\n\
    \n```\nIOReturn             commandSleep(void* event, UInt32 interruptType);\n\
    IOReturn             commandSleep(void* event, AbsoluteTime deadline, UInt32 interruptType);\n\
    ```\n\n参数`event`、`interruptType`和`deadline`与传递给表 7-4 中描述的`IOLockSleep()`和`IOLockSleepDeadline()`函数的同名参数含义相同。正如我们在“条件变量”部分所见，线程只有在持有同步锁时才能在条件变量上休眠。同样的规则适用于`commandSleep()`方法，该方法必须从通过`IOCommandGate`对象调用的函数中调用。\n\
    \n当事件发生时，为了触发命令门的条件变量，`IOCommandGate`类提供了以下方法，其形式与表 7-4 中描述的`IOLockWakeup()`函数相同：\n\
    \n```\nvoid    commandWakeup(void* event, bool oneThread);\n```\n\n`IOCommandGate`对象提供了`IORecursiveLock`的所有同步能力，包括互斥锁锁定和条件变量支持。这使得驱动程序可以使用`IOCommandGate`对象替代\
    \ I/O Kit 锁来完成所有同步。如果驱动程序需要一个工作循环来提供针对异步事件的同步，这将非常有用；驱动程序可以创建一个`IOCommandGate`，并在其整个实现中使用该工作循环，而无需创建额外的锁。\n"
- fmt: "## Timers\n\nThe final event source that we will discuss is the `IOTimerEventSource`,\
    \ which provides a basic, non-periodic timer. A common use of an `IOTimerEventSource`\
    \ is for creating a watchdog timer to cancel operations that have not completed\
    \ within a certain period of time.\n\nWhen a timer is created, the caller provides\
    \ a callback function that will be run when the timer expires. Like any other\
    \ event source, a timer must be added to an `IOWorkLoop` object and its callback\
    \ function will be run from a context that is synchronized to all other event\
    \ sources installed on the work loop.\n\nA timer can be initialized and added\
    \ to an existing work loop as shown in the following code:\n\n```\nm_timer = IOTimerEventSource::timerEventSource(this,\
    \ TimerFired);\nif (m_timer == NULL)\n        abort with error;\n\nresult = m_workLoop->addEventSource(m_timer);\n\
    if (result != kIOReturnSuccess)\n        abort with error;\n```\n\nThe method\
    \ `IOTimerEventSource::timerEventSource()` instantiates a new `IOTimerEventSource`\
    \ object. Its first parameter is a pointer to an `OSObject`, which is passed to\
    \ the callback function, allowing it to access the driver object.\n\nNext, the\
    \ timer needs to be activated. This is done by specifying a timeout period from\
    \ the current time until the timer fires. The `IOTimerEventSource` class provides\
    \ methods to specify the timeout in milliseconds, microseconds, nanoseconds, or\
    \ in arbitrary time units:\n\n```\nIOReturn         setTimeoutMS(UInt32 ms);\n\
    IOReturn         setTimeoutUS(UInt32 us);\nIOReturn         setTimeout(UInt32\
    \ interval, UInt32 scale_factor = kNanosecondScale);\n```\n\nWhen the timer fires,\
    \ the specified callback function will be run, which has the following signature:\n\
    \n```\nvoid    MyDriver::TimerFired(OSObject* owner, IOTimerEventSource* sender)\n\
    {\n}\n```\n\nAlthough the timer provided by `IOTimerEventSource` is not periodic,\
    \ the timer's next timeout value can be set from within its callback function.\
    \ You will notice that the `IOTimerEventSource` instance is provided as a parameter\
    \ to the callback function, which allows the callback to easily re-install the\
    \ timer. If the drift between subsequent firings of the timer needs to be avoided\
    \ for a specific application, the `IOTimerEventSource` provides a `wakeAtTime()`\
    \ method that allows the timeout to be specified as an absolute time. A periodic\
    \ timer that does not drift over time can be created by specifying an absolute\
    \ time each time the timer is reinstalled.\n\nIf a timer needs to be cancelled,\
    \ for example, because the operation that a watchdog timer was guarding has successfully\
    \ completed, the `IOTimerEventSource` class includes a method named `cancelTimeout()`.\
    \ This method is also a synchronization point, and will guarantee that the timer's\
    \ callback function will not be called by the time this method has returned.\n\
    \n## Releasing Work Loops\n\nWhen a driver is unloaded, it will need to release\
    \ any work loop that it has created. This is a two-step process and involves removing\
    \ event sources from the work loop and then releasing the `IOWorkLoop` object.\
    \ The first part is usually performed by a driver in its `stop()` method, but\
    \ the work loop itself is typically not released until the driver's `free()` method\
    \ is called. A possible implementation follows:\n\n```\nvoid    MyDriver::stop(IOService*\
    \ provider)\n{\n        // Remove and release the command gate event source.\n\
    \        if (m_commandGate != NULL)\n        {\n                m_workLoop->removeEventSource(m_commandGate);\n\
    \                m_commandGate->release();\n                m_commandGate = NULL;\n\
    \        }\n\n        // Remove and release the timer event source.\n        if\
    \ (m_timer != NULL)\n        {\n                m_timer->cancelTimeout();\n  \
    \              m_workLoop->removeEventSource(m_timer);\n                m_timer->release();\n\
    \                m_timer = NULL;\n        }\n\n        super::stop(provider);\n\
    }\n\nvoid    MyDriver::free()\n{\n        // Release the work loop\n        if\
    \ (m_workLoop != NULL)\n        {\n                m_workLoop->release();\n  \
    \              m_workLoop = NULL;\n        }\n\n        super::free();\n}\n```"
  raw: '#### Timers


    The final event source that we will discuss is the `IOTimerEventSource`, which
    provides a basic, non-periodic timer. A common use of an `IOTimerEventSource`
    is for creating a watchdog timer to cancel operations that have not completed
    within a certain period of time.


    When a timer is created, the caller provides a callback function that will be
    run when the timer expires. Like any other event source, a timer must be added
    to an `IOWorkLoop` object and its callback function will be run from a context
    that is synchronized to all other event sources installed on the work loop.


    A timer can be initialized and added to an existing work loop as shown in the
    following code:


    `m_timer = IOTimerEventSource::timerEventSource(this, TimerFired);`

    `if (m_timer == NULL)`

    `        abort with error;`


    `result = m_workLoop->addEventSource(m_timer);`

    `if (result != kIOReturnSuccess)`

    `        abort with error;`


    The method `IOTimerEventSource::timerEventSource()` instantiates a new `IOTimerEventSource`
    object. Its first parameter is a pointer to an `OSObject`, which is passed to
    the callback function, allowing it to access the driver object.


    Next, the timer needs to be activated. This is done by specifying a timeout period
    from the current time until the timer fires. The `IOTimerEventSource` class provides
    methods to specify the timeout in milliseconds, microseconds, nanoseconds, or
    in arbitrary time units:


    `IOReturn         setTimeoutMS(UInt32 ms);`

    `IOReturn         setTimeoutUS(UInt32 us);`

    `IOReturn         setTimeout(UInt32 interval, UInt32 scale_factor = kNanosecondScale);`


    When the timer fires, the specified callback function will be run, which has the
    following signature:


    `void    MyDriver::TimerFired(OSObject* owner, IOTimerEventSource* sender)`

    `{`

    `}`


    Although the timer provided by `IOTimerEventSource` is not periodic, the timer''s
    next timeout value can be set from within its callback function. You will notice
    that the `IOTimerEventSource` instance is provided as a parameter to the callback
    function, which allows the callback to easily re-install the timer. If the drift
    between subsequent firings of the timer needs to be avoided for a specific application,
    the `IOTimerEventSource` provides a `wakeAtTime()` method that allows the timeout
    to be specified as an absolute time. A periodic timer that does not drift over
    time can be created by specifying an absolute time each time the timer is reinstalled.


    If a timer needs to be cancelled, for example, because the operation that a watchdog
    timer was guarding has successfully completed, the `IOTimerEventSource` class
    includes a method named `cancelTimeout()`. This method is also a synchronization
    point, and will guarantee that the timer''s callback function will not be called
    by the time this method has returned.


    #### Releasing Work Loops


    When a driver is unloaded, it will need to release any work loop that it has created.
    This is a two-step process and involves removing event sources from the work loop
    and then releasing the `IOWorkLoop` object. The first part is usually performed
    by a driver in its `stop()` method, but the work loop itself is typically not
    released until the driver''s `free()` method is called. A possible implementation
    follows:


    `void    MyDriver::stop(IOService* provider)`

    `{`

    `        // Remove and release the command gate event source.`

    `        if (m_commandGate != NULL)`

    `        {`

    `                m_workLoop->removeEventSource(m_commandGate);`

    `                m_commandGate->release();`

    `                m_commandGate = NULL;`

    `        }`


    `        // Remove and release the timer event source.`

    `        if (m_timer != NULL)`

    `        {`

    `                m_timer->cancelTimeout();`

    `                m_workLoop->removeEventSource(m_timer);`

    `                m_timer->release();`

    `                m_timer = NULL;`

    `        }`


    `        super::stop(provider);`

    `}`


    `void    MyDriver::free()`

    `{`

    `        // Release the work loop`

    `        if (m_workLoop != NULL)`

    `        {`

    `                m_workLoop->release();`

    `                m_workLoop = NULL;`

    `        }`


    `        super::free();`

    `}`'
  trans: "\n## 定时器\n\n我们将讨论的最后一个事件源是 `IOTimerEventSource`，它提供了一个基本的非周期性定时器。`IOTimerEventSource`\
    \ 的一个常见用途是创建看门狗定时器，用于取消在特定时间内未完成的操作。\n\n创建定时器时，调用者需提供一个回调函数，该函数将在定时器到期时执行。与其他事件源一样，定时器必须添加到\
    \ `IOWorkLoop` 对象中，其回调函数将在与工作循环上安装的所有其他事件源同步的上下文中运行。\n\n以下代码展示了如何初始化定时器并将其添加到现有的工作循环中：\n\
    \n```\nm_timer = IOTimerEventSource::timerEventSource(this, TimerFired);\nif (m_timer\
    \ == NULL)\n        abort with error;\n\nresult = m_workLoop->addEventSource(m_timer);\n\
    if (result != kIOReturnSuccess)\n        abort with error;\n```\n\n`IOTimerEventSource::timerEventSource()`\
    \ 方法实例化了一个新的 `IOTimerEventSource` 对象。其第一个参数是一个指向 `OSObject` 的指针，该指针会传递给回调函数，使其能够访问驱动对象。\n\
    \n接下来，需要激活定时器。这可以通过指定从当前时间到定时器触发的超时时间来实现。`IOTimerEventSource` 类提供了以毫秒、微秒、纳秒或任意时间单位指定超时时间的方法：\n\
    \n```\nIOReturn         setTimeoutMS(UInt32 ms);\nIOReturn         setTimeoutUS(UInt32\
    \ us);\nIOReturn         setTimeout(UInt32 interval, UInt32 scale_factor = kNanosecondScale);\n\
    ```\n\n当定时器触发时，将执行指定的回调函数，其签名如下：\n\n```\nvoid    MyDriver::TimerFired(OSObject*\
    \ owner, IOTimerEventSource* sender)\n{\n}\n```\n\n尽管 `IOTimerEventSource` 提供的定时器是非周期性的，但可以在其回调函数中设置定时器的下一次超时值。你会注意到\
    \ `IOTimerEventSource` 实例作为参数传递给了回调函数，这使得回调函数可以方便地重新安装定时器。如果特定应用需要避免定时器后续触发之间的漂移，`IOTimerEventSource`\
    \ 提供了 `wakeAtTime()` 方法，允许将超时指定为绝对时间。通过每次重新安装定时器时指定一个绝对时间，可以创建一个随时间不漂移的周期性定时器。\n\
    \n如果需要取消定时器（例如，因为看门狗定时器所保护的操作已成功完成），`IOTimerEventSource` 类包含一个名为 `cancelTimeout()`\
    \ 的方法。该方法也是一个同步点，能保证在该方法返回时，定时器的回调函数不会被调用。\n\n## 释放工作循环\n\n当驱动程序被卸载时，它需要释放其创建的任何工作循环。这分为两步：先从工作循环中移除事件源，然后释放\
    \ `IOWorkLoop` 对象。通常，驱动在其 `stop()` 方法中执行第一步，但工作循环本身通常直到调用驱动的 `free()` 方法时才被释放。一个可能的实现如下：\n\
    \n```\nvoid    MyDriver::stop(IOService* provider)\n{\n        // 移除并释放命令门事件源。\n\
    \        if (m_commandGate != NULL)\n        {\n                m_workLoop->removeEventSource(m_commandGate);\n\
    \                m_commandGate->release();\n                m_commandGate = NULL;\n\
    \        }\n\n        // 移除并释放定时器事件源。\n        if (m_timer != NULL)\n        {\n\
    \                m_timer->cancelTimeout();\n                m_workLoop->removeEventSource(m_timer);\n\
    \                m_timer->release();\n                m_timer = NULL;\n      \
    \  }\n\n        super::stop(provider);\n}\n\nvoid    MyDriver::free()\n{\n   \
    \     // 释放工作循环\n        if (m_workLoop != NULL)\n        {\n                m_workLoop->release();\n\
    \                m_workLoop = NULL;\n        }\n\n        super::free();\n}\n\
    ```\n"
- fmt: "### Kernel Threads\n\nUnlike a user space application, a driver doesn't have\
    \ a main thread that is always running while the driver is active. Instead, a\
    \ driver typically executes on existing threads in response to certain events.\
    \ For example, when a user space process makes a control request through the driver's\
    \ user client, the driver executes within the context of the calling thread owned\
    \ by the user process. Similarly, when a driver's hardware generates an interrupt,\
    \ the driver's secondary interrupt handler is executed from the work loop thread.\
    \ Because a driver executes in response to such events, if a driver isn't handling\
    \ an event, such as a control request or an interrupt handler, it will typically\
    \ have no code executing on any thread in the system.\n\nThe lack of an equivalent\
    \ of a main thread can be a problem for a driver, particularly if it needs to\
    \ have code executing continually so that it can periodically poll its hardware\
    \ device or if it wishes to perform a time-consuming operation such as downloading\
    \ firmware to its hardware. In these cases, a driver can create its own kernel\
    \ thread on which to continue executing code without tying up the thread of a\
    \ user process or the work loop thread.\n\nA good example of the use of a kernel\
    \ thread is shown in [Listing 5-16](#Chapter05.html#list_5_16) from [Chapter 5](#Chapter05.html#ch5).\
    \ In this example, a user space application made a control request to the driver\
    \ to perform a delay operation. Rather than performing the delay within the context\
    \ of the process thread, which would have blocked the calling process, the driver\
    \ instead chose to create a background thread on which to perform the sleep operation.\
    \ Once the delay had completed, the driver then signaled the user process with\
    \ an asynchronous notification. This simple design pattern demonstrates how a\
    \ driver can use a kernel thread to turn a synchronous operation that would block\
    \ the thread from the calling process into an operation that appears to be asynchronous\
    \ to the calling process.\n\nThe APIs for creating a kernel thread come from the\
    \ lower-level Mach layer and are declared in the header file `<kern/thread.h>`.\
    \ You should never need to include this header file directly though, since it\
    \ is included by the header file `<IOKit/IOLib.h>`. If you look at the contents\
    \ of `IOLib.h`, you will see that it contains a small number of threading functions,\
    \ including support for creating a thread. Starting in Mac OS X 10.6, however,\
    \ these functions have been deprecated by Apple in favor of the Mach functions.\n\
    \nThe function `kernel_thread_start()` can be used to create kernel thread. Its\
    \ prototype is given as follows:\n\n```\nkern_return_t   kernel_thread_start(thread_continue_t\
    \ continuation, void* parameter,\n                        thread_t* new_thread);\n\
    ```\n\nThe argument “`continuation`” is actually a function pointer to the start\
    \ routine of the newly created thread. If a thread was successfully created, the\
    \ return value from `kernel_thread_start()` will be `kIOReturnSuccess` and the\
    \ argument “`new_thread`” will contain a reference to the newly created thread,\
    \ much like the reference that is returned by the user space function `pthread_create()`.\
    \ The `thread_t` object that is returned isn't terribly useful to the caller,\
    \ since there are very few public kernel APIs for thread manipulation. However,\
    \ the `thread_t` value can be compared against the value returned by `current_thread()`\
    \ to determine whether the active function is running on a particular thread.\n\
    \nIn most cases, the caller immediately releases the `thread_t` object after successfully\
    \ creating a thread; this does not impact the execution of the background thread\
    \ itself. To release the `thread_t` object, the function `thread_deallocate()`\
    \ should be used, which has the following prototype:\n\n```\nvoid    thread_deallocate(thread_t\
    \ thread);\n```\n\n![image](images/square.jpg) **Note:** It is important that\
    \ the `thread_t` object that is returned by `kernel_thread_start()` is released\
    \ to prevent a memory leak.\n\nThe start routine for the thread has the following\
    \ signature:\n\n```\nvoid    ThreadFunction (void* parameter, wait_result_t waitResult)\n\
    ```\n\nThe first argument to the function, `parameter`, corresponds to the value\
    \ that was passed to `kernel_thread_start()` and allows the creator of the thread\
    \ to pass context to the thread's function. The second argument to the function,\
    \ `waitResult`, is not useful for threads created through `kernel_thread_start()`;\
    \ its presence is simply a consequence of the thread function being defined as\
    \ the type `thread_continue_t`. Internally, the kernel makes use of the type `thread_continue_t`\
    \ elsewhere and the value of `waitResult` is used in these cases.\n\nFinally,\
    \ once a thread has completed its operation and wishes to terminate, the thread\
    \ function should call the function `thread_terminate()`, as demonstrated:\n\n\
    ```\nthread_terminate(current_thread());\n```\n\nNote that although it might seem\
    \ that it is possible to terminate a background thread from another thread, this\
    \ will fail with an error returned to the caller. The `thread_terminate()` function\
    \ only allows the current thread to be terminated. To terminate a background thread,\
    \ for example, when a driver is unloaded, the driver should instead signal the\
    \ background thread that it needs to exit and allow the thread to terminate itself.\
    \ This signaling can be done either by setting a Boolean flag that the background\
    \ thread checks periodically or by setting a condition variable that the background\
    \ thread sleeps on.\n\n### Summary\n\n*   A driver runs in a multithreaded environment.\n\
    *   The methods of a driver class can potentially be called from an arbitrary\
    \ thread. This means that, even if a driver creates no threads of its own, it\
    \ cannot escape the need for synchronized access to its shared instance variables\
    \ and hardware.\n*   The I/O Kit provides synchronization functions that a driver\
    \ can use to prevent multiple threads from modifying shared data at the same time.\n\
    *   A spin lock is a suitable synchronization mechanism for code that will hold\
    \ the lock only for a short period of time or for code that will execute inside\
    \ a primary interrupt handler.\n*   A mutex is a better choice if the lock will\
    \ be held for longer periods, but it cannot be used inside a primary interrupt\
    \ handler.\n*   To synchronize events that can occur at an arbitrary time, such\
    \ as a hardware interrupt or a software timer, the I/O Kit provides a dedicated\
    \ thread on which the handler for these events is run. This is known as the work\
    \ loop thread and the I/O Kit ensures that all event sources that are installed\
    \ on the work loop are executed in a serial manner."
