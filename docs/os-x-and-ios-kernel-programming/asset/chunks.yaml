    \ the `mbuf_t` contains the entire frame including the data-link header, instead\
    \ of pointing to the data after the data-link header. If we wish to examine the\
    \ IP header of an incoming packet in an interface filter's output function, we\
    \ need to first parse the data-link header to find the offset of the IP header.\
    \ An example of this is shown here:\n\n```c\nstatic errno_t myif_filter_output(void*\
    \ cookie, ifnet_t interface, protocol_family_t protocol,\n                   \
    \               mbuf_t* data)\n{\n    char                  src[64], dst[64];\n\
    \    unsigned char*        pktbuf = mbuf_data(*data);\n    struct ether_header*\
    \  eth = (struct ether_header *)pktbuf;\n\n    if (ifnet_hdrlen(interface) !=\
    \ ETHER_HDR_LEN)\n        return 0;\n\n    if (ntohs(eth->ether_type) == ETHERTYPE_IP)\n\
    \    {\n        struct ip* iphdr = (struct ip*)(pktbuf + ETHER_HDR_LEN);\n   \
    \     inet_ntop(AF_INET, &iphdr->ip_src, src, sizeof(src));\n        inet_ntop(AF_INET,\
    \ &iphdr->ip_dst, dst, sizeof(dst));\n        printf(\"outgoing packet: %lu bytes\
    \ ip_src: %s ip_dst: %s\\n\",\n                mbuf_pkthdr_len(*data), src, dst);\n\
    \    }\n    else\n        printf(\"outgoing packet: %lu bytes\\n\", mbuf_pkthdr_len(*data));\n\
    \    return 0;\n}\n```\n\nThe interface filter KPI does not provide functions\
