  trans: "\n### 内存映射\n\n内存映射是指将某个任务的一段内存区域提供给另一个任务使用的功能。在最底层，映射由 Mach 虚拟内存子系统处理，如第二章所述。内存映射为任务间共享资源提供了一种快速方式，无需复制内存，因为映射使得不同任务之间可以访问同一块内存。可写映射在发生修改之前可以共享，此时会采用写时复制（COW）优化技术，仅复制被修改的内存部分。内存映射可以通过多种不同方式实现，可以在多个任务之间进行，也可以在内核与用户空间任务之间双向进行。\n\
    \n#### 将用户空间任务的内存映射到内核空间\n\n从用户空间任务映射内存是驱动程序执行的常见操作。我们以音频设备驱动程序为例，假设某个应用程序希望向我们发送一个包含音频样本的数据缓冲区，以便在硬件设备上播放。为此，用户任务（即音频播放器）会向我们传递一个内存指针，该指针描述了缓冲区在内存中的位置。在用户空间中，复制内存就像调用\
    \ `memcpy()` 函数一样简单。\n\n但在内核中，情况就没这么简单了。用户任务传递的地址对内核来说是无效的，因为它只在任务自身的私有地址空间中有效。为了在内核中访问该内存，我们需要在内核自己的地址空间中为缓冲区的底层物理内存创建映射。在底层，此过程通过操作内核的虚拟内存映射（VM\
    \ Map）来实现。虽然可以使用 Mach 底层接口完成此操作，但更常见的是借助 I/O Kit 的 `IOMemoryDescriptor` 和 `IOMemoryMap`\
    \ 类来实现。代码清单 6-2 展示了一个虚构的音频驱动程序中的部分代码，该部分通过将内存缓冲区映射到内核地址空间，从而从用户空间音频播放器复制内存。\n\n\
    **代码清单 6-2.** 将用户空间缓冲区映射到内核\n\n```\nvoid copyBufferFromUserTask(task_t userTask,\
    \ void* userBuffer,\n                            uint32_t userBufferSize, void*\
    \ dstBuffer)\n{\n     uint32_t                 bytesWritten = 0;\n     bool                     wasPrepared\
    \ = false;\n     IOMemoryDescriptor*      memoryDescriptor = NULL;\n     IOMemoryMap*             memoryMap\
    \ = NULL;\n\n     memoryDescriptor = IOMemoryDescriptor::withAddressRange\n                            (userBuffer,\
    \ userBufferSize,                     \n                            kIODirectionOut,\
    \ userTask);\n     if (memoryDescriptor == NULL)\n         goto bail;\n\n     if\
    \ (memoryDescriptor->prepare() != kIOReturnSuccess)\n         goto bail;\n     wasPrepared\
    \ = true;\n\n     memoryMap = memoryDescriptor->createMappingInTask\n                     (kernel_task,\
    \ 0, kIOMapAnywhere | kIOMapReadOnly);\n     if (memoryMap == NULL)\n         goto\
    \ bail;\n\n    void* srcBufferVirtualAddress = (void*)memoryMap->getVirtualAddress();\n\
    \n    if (srcBufferVirtualAddress != NULL)\n        bcopy(srcBufferVirtualAddress,\
    \ dstBuffer, userBufferSize);\n\n    memoryMap->release(); // 这将解除内存映射\n    memoryMap\
    \ = NULL;\nbail:\n    if (memoryDescriptor)\n    {\n        if (wasPrepared)\n\
                memoryDescriptor->complete();\n        memoryDescriptor->release();\n\
            memoryDescriptor = NULL;\n    }\n}\n```\n\n要映射内存，我们首先为用户空间缓冲区创建一个 `IOMemoryDescriptor`。`IOMemoryDescriptor`\
    \ 提供了创建内存映射的接口，同时它还允许我们在从缓冲区复制数据期间将内存锁定。这样可以防止在复制过程中，如果音频播放器崩溃或用户退出应用程序，该内存被换出到辅助存储器或消失。\n\
    \n![images](img/square.jpg) **注意** 你可能注意到在上述方法中使用了 `goto`，语言纯粹主义者通常认为这是一种不良做法。然而，它经常用于内核代码中，并提供了在发生错误时进行集中清理的便捷方式，以替代在内核中无法使用的异常机制。\n\
    \n实际映射发生在调用 `createMappingInTask()` 方法时：\n\n```\n    IOMemoryMap* createMappingInTask(\n\
            task_t                  intoTask,\n        mach_vm_address_t       atAddress,\n\
            IOOptionBits            options,\n        mach_vm_size_t          offset\
    \ = 0,\n        mach_vm_size_t          length = 0 );\n```\n\n![images](img/square.jpg)\
    \ **提示** 你可以使用 `IOMemoryDescriptor::map()` 方法作为快捷方式，在内核地址空间中创建标准映射。还要注意，`map()`\
    \ 的重载变体已弃用，推荐使用在 Mac OS X 10.5 中引入的 `createMappingInTask()`。\n\n*   第一个参数 `intoTask`\
    \ 是我们希望在其中创建映射的任务。就我们的目的而言，这里是 `kernel_task`，不过也可以提供另一个任务的任务结构，从而使一个任务的内存可供另一个任务使用。\n\
    *   第二个参数 `atAddress` 也很有意思。它指定了 `intoTask` 地址空间中的一个可选目标地址。这允许目标任务将映射定位在固定地址。在我们的示例中，我们并不关心映射在地址空间中的具体位置；我们只需要一个地址来访问它，因此我们传入零而不是固定地址，并在\
    \ `options` 中设置 `kIOMapAnywhere`。\n*   第三个参数 `options` 使用“内存描述符”部分中描述的标志来控制映射的执行方式，例如只读或读/写。此外，还有用于控制内存相对于\
    \ CPU 缓存行为的选项。可设置以下选项：\n    *   `kIOMapDefaultCache`，指定映射的缓存策略。对于 I/O 内存，它将禁用缓存；否则使用\
    \ `kIOMapCopybackCache`。\n    *   `kIOMapInhibitCache`，禁用此映射的缓存。\n    *   `kIOMapWriteThruCache`，使用写通缓存。\n\
    \    *   `kIOMapCopybackCache`，使用写回缓存。\n    *   `kIOMapReadOnly`，指定映射为只读。\n  \
    \  *   `kIOMapReference`，当映射已存在的映射时使用，如果该内存之前未被映射，则会失败。\n    *   `kIOMapUnique`，确保该内存不存在之前的映射。\n\
    *   最后两个参数用于指定缓冲区中的可选偏移量和长度，如果你想仅映射部分缓冲区。但请注意，映射是虚拟内存系统的一个概念，并基于*页*进行操作。你只能以页大小（4096\
    \ 字节）为单位映射内存。取整操作在内部进行，从而为用户提供了按字节边界操作的假象。\n"
- fmt: "# The IOMemoryMap Class\n\nThe `createMappingInTask()` method in [Listing\
    \ 6-2](#Chapter06.html#list_6_2) will return an instance of `IOMemoryMap` to represent\
    \ the mapping. In our previous example, we call the `IOMemoryMap::getVirtualAddress()`\
    \ method, which returns a value of the `IOVirtualAddress` type. The exact primitive\
    \ data type of `IOVirtualAddress` depends on the architecture, but for 64-bit\
    \ kernels, a 64-bit unsigned integer (`uin64_t`) is used and not a pointer type.\n\
    \nWhen we no longer need the mapping, we simply release the `IOMemoryMap` object,\
    \ which takes care of unmapping. You may wonder why we do not call the `IOMemoryMap::unmap()`\
    \ function to release the mapping. When you create a mapping, it is possible for\
    \ another thread or the same thread to map the buffer again. While the mapping\
    \ will of course only be created once, performing the mapping multiple times will\
    \ increment an internal reference counter. However, calling `unmap()` will not\
    \ simply decrement the reference count and remove the mapping if the count hits\
    \ zero, it will destroy the mapping regardless of how many times it is referenced.\
    \ This may lead to the kernel accessing an invalid address; hence, care should\
    \ be taken when using `unmap()`. Simply calling `release()` for the map will decrement\
    \ or remove the mapping if required. A collection of other interesting `IOMemoryMap`\
    \ methods are described in [Table 6-2](#Chapter06.html#tab_6_2).\n\nNote that\
    \ in the [Listing 6-2](#Chapter06.html#list_6_2) example, we could just as well\
    \ have copied memory into the mapped buffer with some small modifications to create\
    \ a writable mapping.\n\n![images](images/t0602.jpg)\n\n![images](images/square.jpg)\
    \ **Note** It is not necessary to map memory into the kernel unless the kernel\
    \ needs to actively modify it. If DMA is performed from a user space buffer and\
    \ the data in the buffer does not have to be modified by the kernel, it is not\
    \ necessary to map it into the kernel's address space, the buffer can be transferred\
    \ directly to a hardware device. See [Chapter 9](#Chapter09.html#ch9) for more\
    \ information about DMA.\n\n## Mapping Memory from the Kernel to a User Space\
    \ Task\n\nThe previous sections showed how we can take memory allocated in user\
    \ space and map that memory into the kernel's address space so the kernel can\
    \ access it. While it is possible for the kernel to both read and write from the\
    \ mapping, it may sometimes be desirable for a user space task to map kernel memory\
    \ into its address space. It should be noted that Apple recommends against this\
    \ practice for security and stability reasons and it should be avoided whenever\
    \ possible. One possible reason for doing it might be the need to map device memory\
    \ (for example, from a PCI device) to user space so it can access the device's\
    \ registers.\n\nIn I/O Kit this form of memory mapping is usually done through\
    \ the `IOUserClient` class. Available memory mappings should be returned via the\
    \ `clientMemoryForType()` method. A generic example of how this can be achieved\
    \ is shown in [Listing 6-3](#Chapter06.html#list_6_3).\n\n***Listing 6-3.** Mapping\
    \ Kernel Memory to User Space via IOUserClient*\n\n```\n#define kTestUserClientDriverBuffer\
    \             0\nIOReturn com_osxkernel_TestUserClient::\nclientMemoryForType(UInt32\
    \ type, UInt32 *flags, IOMemoryDescriptor **memory)\n{\n     IOReturn ret = kIOReturnUnsupported;\n\
    \     switch (type)\n     {\n          case kTestUserClientDriverBuffer:\n   \
    \           // Returns a pointer to an IOMemoryDescriptor or\n              //\
    \ if a hardware device, an IODeviceMemory pointer which is a\n              //\
    \ subclass of IOMemoryDescriptor\n              *memory = driver->getBufferMemoryDescriptor();\n\
    \              *memory->retain();\n              ret = kIOReturnSuccess;\n   \
    \           break;\n          default:\n              break;\n     }\n     return\
    \ ret;\n}\n```\n\nNote that we need to call `retain()` on the `IOMemoryDescriptor`\
    \ before returning it, as it will be released when the user client closes and\
    \ we do not want the descriptor to be de-allocated as it is a shared resource\
    \ owned by the driver. In this example, we call a hypothetical *driver* that,\
    \ for the sake of the example, has a method called `getBufferMemoryDescriptor()`\
    \ that returns an `IOMemoryDescriptor` for a kernel-allocated buffer (or it could\
    \ even be device memory mapped into the kernel's address space). The `type` argument\
    \ here is simply an integer and can be anything; the important thing is that the\
    \ user space program that will access the memory knows the value so it can reference\
    \ the right memory mapping.\n\nIn user space code, you can do the following to\
    \ map the memory from the `IOUserClient`.\n\n```\nvoid* addressOfMappedBuffer\
    \ = NULL;\nint sizeOfMappedBuffer;\nIOConnectMapMemory(openDeviceHandleHere,\n\
    \                   kTestUserClientDriverBuffer,\n                   mach_task_self(),\n\
    \                   (vm_address_t *) &addressOfMappedBuffer,\n               \
    \    &sizeOfMappedBuffer,\n                   kIOMapAnywhere);\n```\n\nYou may\
    \ notice the similarity to creating a mapping in the kernel. The `kIOMapAnywhere`\
    \ here signifies that we don't care where in our address space the mapping is\
    \ made; the `addressOfMappedBuffer` argument will contain the address of the mapping\
    \ if the call succeeds and can be used to access the mapped memory. If `kIOMapAnywhere`\
    \ is not specified, the `addressOfMappedBuffer` argument is used to specify the\
    \ preferred address for the mapping. The second last argument will tell us the\
    \ size of the mapping. The smallest amount that can be mapped is a single page;\
    \ therefore, if you map buffers smaller than 4096, it would allow a client to\
    \ see the memory of the entire page the buffer is contained within, which could\
    \ be a potential security problem.\n\n## Mapping Memory to a Specific User Space\
    \ Task\n\nThe preceding example allows any task to map the memory and our driver\
    \ code does not need to know which task the memory will be mapped to. However,\
    \ if you know the specific task memory should be mapped to, you can use the approach\
    \ from [Listing 6-2](#Chapter06.html#list_6_2). The difference is simply that\
    \ the user space task identifier is passed to `IOMemoryDescriptor::createMappingInTask()`\
    \ in place of `kernel_task`.\n\nApple recommends not mapping memory obtained from\
    \ functions such as `IOMalloc()` and `IOMallocAligned()` (though it is possible\
    \ using the latter) because they come from the zone allocator, which is intended\
    \ for private and temporary allocations and not for sharing. The recommended way\
    \ of mapping memory is to use the `IOBufferMemoryDescriptor`, a subclass of `IOMemoryDescriptor`\
    \ that also allocates memory, as follows.\n\n```\nIOBufferMemoryDescriptor* memoryDescriptor\
    \ = NULL;  \nmemoryDescriptor = IOBufferMemoryDescriptor::withOptions(\n    kIODirectionOutIn\
    \ | kIOMemoryKernelUserShared, sizeInBytes, 4096);\n```\n\nAn interesting parameter\
    \ to note is `kIOMemoryKernelUserShared`, which indicates to the allocator that\
    \ we wish to share the memory with a user task. We pass 4096 (the page size) to\
    \ get page-aligned memory, as memory mappings can only be done on page-sized units."
  raw: '#### The IOMemoryMap Class


    The `createMappingInTask()` method in [Listing 6-2](#Chapter06.html#list_6_2)
    will return an instance of `IOMemoryMap` to represent the mapping. In our previous
    example, we call the `IOMemoryMap::getVirtualAddress()` method, which returns
    a value of the `IOVirtualAddress` type. The exact primitive data type of `IOVirtualAddress`
    depends on the architecture, but for 64-bit kernels, a 64-bit unsigned integer
    (`uin64_t`) is used and not a pointer type.


    When we no longer need the mapping, we simply release the `IOMemoryMap` object,
    which takes care of unmapping. You may wonder why we do not call the `IOMemoryMap::unmap()`
    function to release the mapping. When you create a mapping, it is possible for
    another thread or the same thread to map the buffer again. While the mapping will
    of course only be created once, performing the mapping multiple times will increment
    an internal reference counter. However, calling `unmap()` will not simply decrement
    the reference count and remove the mapping if the count hits zero, it will destroy
    the mapping regardless of how many times it is referenced. This may lead to the
    kernel accessing an invalid address; hence, care should be taken when using `unmap()`.
    Simply calling `release()` for the map will decrement or remove the mapping if
    required. A collection of other interesting `IOMemoryMap` methods are described
    in [Table 6-2](#Chapter06.html#tab_6_2).


    Note that in the [Listing 6-2](#Chapter06.html#list_6_2) example, we could just
    as well have copied memory into the mapped buffer with some small modifications
    to create a writable mapping.


    ![images](images/t0602.jpg)


    ![images](images/square.jpg) **Note** It is not necessary to map memory into the
    kernel unless the kernel needs to actively modify it. If DMA is performed from
    a user space buffer and the data in the buffer does not have to be modified by
    the kernel, it is not necessary to map it into the kernel''s address space, the
    buffer can be transferred directly to a hardware device. See [Chapter 9](#Chapter09.html#ch9)
    for more information about DMA.


    #### Mapping Memory from the Kernel to a User Space Task


    The previous sections showed how we can take memory allocated in user space and
    map that memory into the kernel''s address space so the kernel can access it.
    While it is possible for the kernel to both read and write from the mapping, it
    may sometimes be desirable for a user space task to map kernel memory into its
    address space. It should be noted that Apple recommends against this practice
    for security and stability reasons and it should be avoided whenever possible.
    One possible reason for doing it might be the need to map device memory (for example,
    from a PCI device) to user space so it can access the device''s registers.


    In I/O Kit this form of memory mapping is usually done through the `IOUserClient`
    class. Available memory mappings should be returned via the `clientMemoryForType()`
    method. A generic example of how this can be achieved is shown in [Listing 6-3](#Chapter06.html#list_6_3).


    ***Listing 6-3.** Mapping Kernel Memory to User Space via IOUserClient*


    `#define kTestUserClientDriverBuffer             0`

    `IOReturn com_osxkernel_TestUserClient::`

    `clientMemoryForType(UInt32 type, UInt32 *flags, IOMemoryDescriptor **memory)`

    `{`

    `     IOReturn ret = kIOReturnUnsupported;`

    `     switch (type)`

    `     {`

    `          case kTestUserClientDriverBuffer:`

    `              // Returns a pointer to an IOMemoryDescriptor or`

    `              // if a hardware device, an IODeviceMemory pointer which is a`

    `              // subclass of IOMemoryDescriptor`

    `              *memory = driver->getBufferMemoryDescriptor();`

    `              *memory->retain();`

    `              ret = kIOReturnSuccess;`

    `              break;`

    `          default:`

    `              break;`

    `     }`

    `     return ret;`

    `}`


    Note that we need to call `retain()` on the `IOMemoryDescriptor` before returning
    it, as it will be released when the user client closes and we do not want the
    descriptor to be de-allocated as it is a shared resource owned by the driver.
    In this example, we call a hypothetical *driver* that, for the sake of the example,
    has a method called `getBufferMemoryDescriptor()` that returns an `IOMemoryDescriptor`
    for a kernel-allocated buffer (or it could even be device memory mapped into the
    kernel''s address space). The `type` argument here is simply an integer and can
    be anything; the important thing is that the user space program that will access
    the memory knows the value so it can reference the right memory mapping.


    In user space code, you can do the following to map the memory from the `IOUserClient`.


    `void* addressOfMappedBuffer = NULL;`

    `int sizeOfMappedBuffer;`

    `IOConnectMapMemory(openDeviceHandleHere,`

    `                   kTestUserClientDriverBuffer,`

    `                   mach_task_self(),`

    `                   (vm_address_t *) &addressOfMappedBuffer,`

    `                   &sizeOfMappedBuffer,`

    `                   kIOMapAnywhere);`


    You may notice the similarity to creating a mapping in the kernel. The `kIOMapAnywhere`
    here signifies that we don''t care where in our address space the mapping is made;
    the `addressOfMappedBuffer` argument will contain the address of the mapping if
    the call succeeds and can be used to access the mapped memory. If `kIOMapAnywhere`
    is not specified, the `addressOfMappedBuffer` argument is used to specify the
    preferred address for the mapping. The second last argument will tell us the size
    of the mapping. The smallest amount that can be mapped is a single page; therefore,
    if you map buffers smaller than 4096, it would allow a client to see the memory
    of the entire page the buffer is contained within, which could be a potential
    security problem.


    #### Mapping Memory to a Specific User Space Task


    The preceding example allows any task to map the memory and our driver code does
    not need to know which task the memory will be mapped to. However, if you know
    the specific task memory should be mapped to, you can use the approach from [Listing
    6-2](#Chapter06.html#list_6_2). The difference is simply that the user space task
    identifier is passed to `IOMemoryDescriptor::createMappingInTask()` in place of
    `kernel_task`.


    Apple recommends not mapping memory obtained from functions such as `IOMalloc()`
    and `IOMallocAligned()` (though it is possible using the latter) because they
    come from the zone allocator, which is intended for private and temporary allocations
    and not for sharing. The recommended way of mapping memory is to use the `IOBufferMemoryDescriptor`,
    a subclass of `IOMemoryDescriptor` that also allocates memory, as follows.


    `IOBufferMemoryDescriptor* memoryDescriptor = NULL;  `

    `memoryDescriptor = IOBufferMemoryDescriptor::withOptions(`

    `    kIODirectionOutIn | kIOMemoryKernelUserShared, sizeInBytes, 4096);`


    An interesting parameter to note is `kIOMemoryKernelUserShared`, which indicates
    to the allocator that we wish to share the memory with a user task. We pass 4096
    (the page size) to get page-aligned memory, as memory mappings can only be done
    on page-sized units.'
