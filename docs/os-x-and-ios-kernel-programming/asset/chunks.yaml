    \ */\n    unsigned int size = MAX_STRING_LEN;\n    if (getsockopt(sock, SYSPROTO_CONTROL,\
    \ HELLO_CONTROL_GET_STRING, &str, &size) == -1)\n        return -1;\n\n    printf(\"\
    kernel string is: %s\\n\", str);\n\n    /* 设置新字符串 */\n    strcpy(str, \"Hello\
    \ Kernel, here's your new string, enjoy!\");\n    if (setsockopt(sock, SYSPROTO_CONTROL,\
