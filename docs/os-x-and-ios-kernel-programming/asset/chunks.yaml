    \n可以通过重写 `createOutputQueue()` 方法来创建队列。当设备被禁用时，你应该调用队列的 `flush()` 方法来移除任何排队的数据包。\n\
    \n一个典型的网络设备会在硬件将一个（或多个）数据包发送到线缆上时发出一个（TX）中断。这也表明其发送缓冲区中现在有更多空间，或者可以执行新的 DMA 事务了。你可以通过调用输出队列的\
    \ `service()` 方法来通知队列设备已准备好接收更多数据。这样做的一个副作用是再次调用驱动程序的 `outputPacket()` 方法，如果有可用数据包，则会传递一个新数据包。\n\
    \n上一节中的 `transmitPacketToHardware()` 方法的实现如下：\n\n```\nIOReturn    com_osxkernel_MyEthernetHwAbstraction::transmitPacketToHardware(mbuf_t\
    \ packet)\n{    \n    if (ifnet_output_raw(interface, 0, packet) != KERN_SUCCESS)\n\
    \        return kIOReturnOutputDropped;\n\n    // 向驱动程序引发一个中断，通知其数据包已发送。\n   \
    \ fRegisterMap.interruptStatusRegister |= kTXInterruptPending;\n    fDriver->fInterruptSource->setTimeoutUS(1);\n\
    \n    return kIOReturnSuccess;\n}\n```\n"
- fmt: "# 排版后内容\n\nThe method will inject the received packet to the slave device's\
    \ output queue. We simulate a hardware interrupt by setting the TX interrupt flag\
    \ in our dummy interrupt register and then invoking our timer function to simulate\
    \ an interrupt received from a hardware device a microsecond later.\n\nThe transmission\
    \ of the packet to the hardware is again hardware-dependent. A PCI or Thunderbolt-based\
    \ device is likely to use DMA. In this case, there are two options:\n\n* The first\
    \ is to have a pre-allocated physically allocated buffer; for example, one allocated\
    \ with `IOBufferMemoryDescriptor`, using the `kIOMemoryPhysicallyContiguous` option,\
    \ which an `mbuf` will be copied into and then DMA'ed to the hardware. Because\
    \ an `mbuf` may consist of several chained buffers, it is important to ensure\
    \ that you walk the chain with `mbuf_next()` so that all the segments can be copied\
    \ into the DMA buffer.\n* The second option, if the device supports it, is to\
    \ create a scatter/gather list directly from the `mbuf`, using a variant of `IOMbufMemoryCursor`,\
    \ which will avoid performing an extra copy. The cursor class takes care of generating\
    \ the list of physical segments from the `mbuf`. Several `IOMbufMemoryCursors`\
    \ subclasses exist; which one to use depends on the device and its limitations.\
    \ For example, if you use a device that reads addresses in big-endian format,\
    \ you can use the `IOMbufBigMemoryCursor`, which can be created with the `withSpecification()`\
    \ factory method:\n\n`static IOMbufBigMemoryCursor* withSpecification(UInt32 maxSegmentSize,\
    \ UInt32 maxNumSegments);`\n\nThe `maxSegmentSize` can be used to limit the size\
    \ of individual scatter/gather list elements. Similarly, the `maxNumSegments`\
    \ controls the length of the list.\n\n## Receiving Packets\n\nIncoming packets\
    \ arrive asynchronously from the network and a network driver's responsibility\
    \ is to offload them from the hardware device when an RX interrupt occurs and\
    \ deliver them to the network stack via its `IONetworkInterface` or `IOEthernetInterface`,\
    \ in the case of an Ethernet driver. `MyEthernetDriver`'s interrupt handler is\
    \ shown in [Listing 13-9](#Chapter13.html#list_13_9).\n\n**Listing 13-9.** Implementation\
    \ of `MyEthernetDriver`'s Interrupt Handler\n\n```\nvoid com_osxkernel_MyEthernetDriver::interruptOccured(OSObject*\
    \ owner, IOTimerEventSource* sender)\n{\n    mbuf_t packet;\n\n    com_osxkernel_MyEthernetDriver*\
    \ me = (com_osxkernel_MyEthernetDriver*)owner;\n    com_osxkernel_MyEthernetHwAbstraction*\
    \ hwAbstraction = me->fHWAbstraction;\n    if (!me)\n        return;\n\n    UInt32\
