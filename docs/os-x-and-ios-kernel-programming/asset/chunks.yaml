    a file system. This process involves writing a partition table to the disk, which
    is required even if the disk contains only a single partition, and then writing
    a file system to that partition. To format a disk using Disk Utility, select the
    device from the list of disks on the left, and click the Erase tab. The name of
    the device that is displayed in Disk Utility is derived from the descriptive strings
    returned by the `IOBlockStorageDevice` nub, so in the case of the sample RAM disk,
    this results in a device with the name “RAM Disk Media.”


