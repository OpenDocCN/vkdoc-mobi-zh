  trans: '作为进程启动的一部分，操作系统会创建一个表格，用于映射进程虚拟地址空间与其对应物理地址之间的地址关系。这个表格被称为“页表”。从概念上讲，页表为进程地址空间中的每个页面都包含一个表项，其中记录了每个页面所映射到的物理页框的地址。页表项还可能包含
    CPU 用于判断页面是否只读的访问控制位，以及一个用于指示该页面是驻留在内存中还是已被交换到后备存储器的标志位。图 1-6 描述了 CPU 将虚拟地址转换为物理地址所执行的步骤。


    ![images](img/0106.jpg)


    ***图 1-6.** 针对 32 位地址、页大小为 4096 字节（12 位）的虚拟地址到物理地址的转换*


    如果进程访问了一个 CPU 无法转换为物理地址的内存地址，就会发生一种称为“缺页错误”的错误。缺页错误由操作系统在特权执行级别进行处理。操作系统会判断该错误是否因为地址不在进程的地址空间内而发生，如果是这种情况，则进程试图访问一个无效地址，并被终止。如果该错误是因为包含该地址的页面已被交换到后备存储器而发生，操作系统将执行以下步骤：


    1.  在物理内存中分配一个帧来存放所请求的页面；如果内存中没有空闲帧可用，则将一个现有帧交换到后备存储器以腾出空间。

    2.  将所请求的页面从后备存储器读入内存。

    3.  更新进程的页表，使得所请求的页面映射到已分配的帧。

    4.  将控制权返回给调用进程。


    调用进程会重新执行导致该错误的指令，但这一次，CPU 会在页表中找到所请求页面的映射，并且该指令成功完成。


    理解虚拟内存和分页机制对于内核开发者至关重要。尽管内核代表用户应用程序处理请求，但它也有自己的地址空间，因此参数通常需要从进程的地址空间复制或映射到内核的地址空间。此外，与硬件设备交互的内核代码通常需要获取内存的物理地址。考虑一个为用户进程处理读取请求的磁盘驱动程序。从磁盘读取数据的目标缓冲区位于用户进程的地址空间中。与
    CPU 类似，驱动程序控制的硬件只能写入主内存中的地址，而不能写入后备存储器中的地址。因此，为了处理读取请求，驱动程序需要确保用户缓冲区被交换到主内存中，并在读取操作期间一直保留在主内存中。最后，驱动程序需要将目标缓冲区的地址从虚拟地址转换为硬件可以访问的物理地址。我们将在第
    6 章中对此进行更详细的描述。


    值得注意的是，尽管 iOS 为每个进程提供了一个页表，但它并不支持后备存储器。乍一看，这似乎完全违背了分页的目的。然而，它服务于两个非常重要的目的。首先，它向每个进程提供了其独占访问内存的视图。其次，它避免了由物理内存碎片化引起的问题。


    #### 调度


    计算机系统中另一个竞争激烈的资源是 CPU。每个进程都需要访问 CPU 才能执行，但通常情况下，希望访问 CPU 的活动进程数量多于系统上的 CPU 核心数量。因此，操作系统必须在运行中的进程之间共享
    CPU 核心，并确保每个进程都能定期获得 CPU 的访问权以便执行。


    我们已经看到，进程彼此独立运行，并被赋予各自的地址空间，以防止一个进程影响任何其他进程的行为。然而，在许多应用程序中，允许两个独立的执行路径同时运行是有用的，而不必受限于每个执行路径在其自己的地址空间内运行。这种执行单元被称为“线程”。多个线程都执行来自同一程序代码的代码，并在同一进程内运行（因此共享相同的地址空间），但除此之外，它们独立运行。


    对于操作系统来说，线程是调度的基本单元；操作系统调度器在考虑下一步在 CPU 上调度什么时，只需要查看系统中的活动线程。进程要执行，必须至少包含一个线程；当新进程开始运行时，操作系统会自动为其创建初始线程。


    调度器的目标有两个：一是防止 CPU 空闲，因为否则宝贵的硬件资源就会被浪费；二是以公平的方式向所有线程提供对 CPU 的访问权，使得单个线程无法独占 CPU
    并导致其他线程无法运行。为此，线程会在一个可用的 CPU 核心上被调度，直到发生以下两个事件之一：


    *   经过了一定量的时间，称为时间量子，此时该线程被操作系统抢占，并调度另一个线程运行。在 Mac OS X 上，默认的时间量子是 10 毫秒。

    *   线程无法继续执行，因为它正在等待某个操作完成，例如等待从磁盘读取数据，或等待另一个线程的结果。在这种情况下，调度器会在原始线程被阻塞时允许另一个线程在
    CPU 上运行。这可以防止在某个线程没有工作可做时 CPU 处于空闲状态，并最大化 CPU 用于执行代码的时间。线程也可以通过调用某个`sleep()`函数来自愿放弃其在
    CPU 上的时间，该函数会延迟当前线程的执行一段指定的时间。


    为应用程序添加多个线程的一个原因是允许它在多个 CPU 核心上并发执行，这样通过将一个复杂操作划分为并行运行的更小步骤，可以加速应用程序的执行。然而，即使在具有单个
    CPU 核心的计算机上，多线程也有优势。通过在活动线程之间快速切换，调度器会给人一种所有线程都在并发运行的假象。这允许一个线程阻塞或处于紧凑循环中，而对其余线程的响应能力影响微乎其微，因此可以将耗时的任务移到后台线程，同时让应用程序的其余部分自由响应用户交互。


    在与硬件交互的应用程序中，一个常见的设计是将访问硬件的代码放在其自己的线程中。软件代码在等待硬件响应时通常必须阻塞；通过将这些代码从主程序线程中移出，当程序需要等待硬件时，程序的用户界面不会受到影响。


    线程的另一个常见用途出现在软件需要以最小延迟响应来自硬件的事件时。应用程序可以创建一个线程，该线程在收到硬件通知之前一直处于阻塞状态，可以使用后续章节讨论的技术来发出信号。当线程被阻塞时，调度器不需要为其提供对
    CPU 的访问权，因此该线程的存在对系统性能没有影响。然而，一旦硬件发出了事件信号，线程便会解除阻塞，被调度到 CPU 上，并且可以自由地采取任何必要的行动来响应硬件。'
- fmt: '#### Hardware and Drivers


    In addition to managing essential hardware resources such as the CPU and memory,
    the operating system is also responsible for managing hardware peripherals that
    may be added to the system. This includes devices such as the keyboard and mouse,
    a USB flash drive, and the graphics card. Although the operating system is responsible
    for managing these devices, it does so with the help of drivers, which can be
    thought of as plug-ins that run inside the operating system kernel and allow the
    system to interface to hardware devices.


    The code to support a hardware device can be found in two places: on the device
    itself (known as firmware) and on the computer (known as the driver). The role
    of the driver is to act on behalf of the operating system in controlling the hardware
    device. Driver code is loaded into the operating system kernel and is granted
    the same privileges as the rest of the kernel, including the ability to directly
    access hardware.


    The driver has the responsibility of initializing the hardware when the device
    is plugged into the computer (or when the computer boots) and of translating requests
    from the operating system into a sequence of hardware-specific operations that
    the device needs to perform to complete the operating system''s request.


    The type of requests that a driver will receive from the operating system depends
    on what function the driver performs. For certain drivers, the operating system
    provides a framework for driver developers. For example, a sound card requires
    an audio driver to be written. The audio driver receives requests from the operating
    system that are specific to the world of audio, such as a request to create a
    48 kHz audio output stream, followed by requests to output a provided packet of
    audio.


    Drivers may also be built on top of other drivers and may request services provided
    by other drivers. For example, the driver of a USB audio input device uses the
    services of a lower-level generic USB driver to access its hardware. This relieves
    the developer from having to become intimate with the USB protocol, and the developer
    is instead free to concentrate on the specifics of his own device. As in the previous
    example, the audio driver receives requests from the operating system that represent
    audio stream operations, and in responding to these, the driver creates requests
    of its own that are passed to a lower-level USB driver. This allows a separation
    in the responsibility of each driver: The audio driver needs to concern itself
    only with handling audio requests and configuring the audio device, and the USB
    driver needs to concern itself only with the USB protocol and performing data
    transfers over the USB bus. An example of the way in which drivers can be layered
    is illustrated in [Figure 1-7](#Chapter01.html#fig_1_7).


    ![images](images/0107.jpg)


    ***Figure 1-7.** The chain of control requests in an audio request from application
    to hardware*


    Not all hardware fits into a specific class that is understood by the operating
    system. A specialized device, such as a 3D printer, is unlikely to have support
    from the operating system. Instead, the hardware manufacturer needs to write a
    generic driver for their hardware. As a generic driver, the operating system does
    not recognize the device as a printer and issue printing requests to it, but instead
    the driver is controlled by specialized application software, which communicates
    with the printer driver directly. The operating system provides a special system
    call to allow a user application to request an operation from a driver, known
    as an "i/o control" request, often shortened to `"ioctl"`. An `ioctl` specifies
    the operation to be performed and provides the driver with parameters required
    by the operation, which may include a buffer to place the result of the operation.
    Although the `ioctl` request is implemented as a system call to the operating
    system, the request is passed directly to the driver.


    #### Summary


    The operating system is responsible for managing the hardware resources in a computer.
    It provides an abstract model of the computer system to user programs, giving
    the appearance that each program has full access to the CPU and the entire memory
    range. Programs that are run by the user cannot touch hardware without calling
    upon services provided by the operating system. In handling services that involve
    peripheral hardware devices, the operating system may need to call functions provided
    by the driver of that device.


    In subsequent chapters, we will put the concepts we have covered here into practice.
    We will introduce you to the interfaces provided by Mac OS X to allow drivers
    to work with virtual and physical memory addresses, respond to requests from user
    applications, and communicate with PCI and USB devices.


    ## C H A P T E R  2'
