    their support for the technology. Thunderbolt is an external expansion interface
    that allows PCIe and DisplayPort 1.1 to be tunneled over the same cable. A cable
    can carry two bi-directional channels of up to 10 Gbps of data, which amounts
    to a total bandwidth of 40 Gbps per cable. The channels are independent of each
    other, and it is not possible to aggregate the bandwidth between them. Thunderbolt
    is also able to provide up to 10 Watts of power to devices connected to the bus.
    The cable uses the Mini DisplayPort connector, which is indentical at both ends.


    The current specification of Thunderbolt allows up to six devices to be daisy
    chained. Later revisions will showcase a tree-like topology similar to that of
    USB. However, unlike USB, Thunderbolt allows host-to-host connections like Firewire.
    Apple has also enabled a target disk mode using Thunderbolt, as well as the ability
    to boot the operating system from Thunderbolt attached storage. Due to the fact
    that Thunderbolt devices communicate directly with the PCIe host system, existing
    devices can be updated to support Thunderbolt with relatively few modifications
    to the hardware (ignoring the fact that an external case and possibly an external
    power source are needed). On the software side, very few changes are needed (devices
    are still managed by the `IOPCIFamily`); however, one requirement is that the
    driver must support being dynamically unloaded.


    Thunderbolt makes it possible for the Mac Mini, iMac or MacBook series computers
    to access high-speed storage and storage area networks, as well as high-bandwidth
    uncompressed video capture, which was previously reserved for the high-end Mac
    Pro and Xserve.


    ##### ExpressCard


    ExpressCard is an older expansion interface found in the MacBook Pro series. ExpressCard
    is being phased out in favour of Thunderbolt; however, laptops with both ExpressCard
    and Thunderbolt ports are available (at the time of writing). ExpressCard is the
    modern version of PCMCIA and is based on PCIe. The latest standard supports transfer
    speeds of up to 5 Gbps.'
  trans: '

    # PCI Express 与 Thunderbolt


    PCI（外设组件互连）是英特尔在 90 年代初开发的一种高速总线，旨在取代 EISA、ISA、MCA 和 VESA 等老旧且速度较慢的总线技术。术语 PCI
    常用于描述基于原始 PCI 规范的一系列技术。在本章中，当提到 PCI 时，我们指的是基于 PCI 的技术中的共性，即 PCI Express、Thunderbolt，以及较小程度上的
    ExpressCard。大多数人将 PCI 与插入计算机的扩展板相关联，但值得注意的是，PCI 是许多计算机系统的基础——即使是那些没有 PCI 插槽的计算机，例如
    iMac——其内部也有 PCI 总线将 CPU 连接到 USB、Firewire 和 SATA 控制器。近年来基于 PCI 的进步（如 Thunderbolt）允许将
    PCI 总线扩展到计算机外部，其方式与 USB 和 Firewire 非常相似。


    PCI 被广泛采用，并解决了旧总线技术中的许多问题；例如，它消除了在扩展卡上配置跳线的需要，因为内存区域和中断等资源由系统 BIOS 和/或操作系统本身自动配置。


    PCI 通过 PCI-X 和 PCI-X 2.0 标准进行了扩展，这些标准支持 64 位总线宽度，而传统 PCI 是 32 位总线宽度。PCI-X 标准已被
    PCI Express（PCIe）标准取代，现已过时。然而，与 PCI-X 不同，PCIe 采用基于数据包的串行协议，而非其前代产品的并行接口特性。PCIe
    允许总线上的设备拥有专用带宽，而无需与同一总线上的其他设备共享总线带宽。尽管 PCIe 和 PCI 在电气和物理层面有显著差异，但在软件层面它们向后兼容；因此，驱动程序只需进行微小（或无需）更改即可支持新标准。


    如前所述，存在着无数与 PCI 相关的标准。我们将仅讨论苹果当前销售的技术，包括 PCIe、Thunderbolt 和 ExpressCard。大多数 2011
    年或更新的 Mac 上都配备了 Thunderbolt。Thunderbolt 和 ExpressCard 都基于 PCIe 技术，并连接到 PCI 主桥。然而，在所有
    Mac 上，ExpressCard 正被逐步淘汰，转而采用 Thunderbolt，目前仅见于 17 英寸 MacBook Pro。在 XServe 停产后，Mac
    Pro 是目前唯一拥有物理可访问 PCI Express 插槽的 Mac。


    本章首先讨论适用于当前一代 Mac 的各种 PCI 技术。我们将重点关注从软件角度理解以及为基于 PCI 的设备构建功能驱动程序所必需的部分。例如，作为程序员，我们无需关注
    PCI 在电气层面的工作原理。本章的第二部分将重点讨论如何在 I/O Kit 中与基于 PCI 的设备交互，如何匹配和配置它们、读取寄存器以及处理设备的移除。我们还将介绍如何处理中断和执行
    DMA（直接内存访问），这是基于 PCI 的驱动程序执行的两种典型任务。


    ## PCI Express


    PCIe 旨在取代 PCI 和 PCI-X，以及 AGP（加速图形端口）——一种图形卡采用的临时解决方案，以提供 PCI-X 无法实现的高带宽。PCIe 使用称为“通道”的单向点对点连接。这种方法避免了
    PCI 和 PCI-X 的共享总线问题；尽管系统设计者可以通过将每个物理 PCI 插槽放在其专用总线上来在一定程度上缓解此问题。尽管如此，PCIe 的速度仍远超其前代产品。


    到目前为止，PCIe 标准已发布三个修订版。第二代将单个 PCIe 通道的可能带宽从 250 MB/s 翻倍至 500 MB/s。第三修订版再次翻倍，每个通道可处理高达
    1 GB/s 的带宽。PCIe 通常采用 1x、4x、8x、16x 和 32x 的通道配置；不过，后者不太常见，尤其对于物理插槽而言。图形卡/GPU 的插槽通常为
    16x 通道宽度，因为它们需要大量带宽。最新版本的 Mac Pro 符合 PCIe 2.0 标准。最新版 Mac Pro（5,1）有四个 16x 通道插槽，但只有插槽
    1 和 2 能以 16x 速率运行，而插槽 3 和 4 则以 4x 速率运行。


    ## Thunderbolt


    Thunderbolt 是一项相对较新的技术，最初由英特尔开发，后来被苹果采用；苹果是目前唯一一家出货支持 Thunderbolt 的电脑的供应商。尽管设备可用性有限，但包括
    Blackmagic Design、Promise Technology 和 Western Digital 在内的多家公司已宣布支持该技术。Thunderbolt
    是一种外部扩展接口，允许通过同一根线缆传输 PCIe 和 DisplayPort 1.1 信号。一根线缆可承载两个双向通道，每个通道数据速率高达 10 Gbps，每根线缆的总带宽达
    40 Gbps。这些通道相互独立，无法聚合它们之间的带宽。Thunderbolt 还能为连接到总线上的设备提供高达 10 瓦的电力。线缆使用 Mini DisplayPort
    连接器，两端相同。


    Thunderbolt 的当前规范允许最多六个设备以菊花链方式连接。后续修订版将展示类似于 USB 的树状拓扑结构。然而，与 USB 不同，Thunderbolt
    支持像 Firewire 一样的主机到主机连接。苹果还利用 Thunderbolt 实现了目标磁盘模式，并支持从连接 Thunderbolt 的存储设备启动操作系统。由于
    Thunderbolt 设备直接与 PCIe 主机系统通信，现有设备只需对硬件进行相对较少的修改（忽略需要外部机箱和可能的外部电源这一事实）即可更新以支持
    Thunderbolt。在软件方面，需要的更改很少（设备仍由 `IOPCIFamily` 管理）；然而，一个要求是驱动程序必须支持动态卸载。


    Thunderbolt 使 Mac Mini、iMac 或 MacBook 系列计算机能够访问高速存储和存储区域网络，以及高带宽无压缩视频采集，这以前是高端
    Mac Pro 和 Xserve 的专属功能。


    ## ExpressCard


    ExpressCard 是 MacBook Pro 系列中的一种较旧的扩展接口。ExpressCard 正被逐步淘汰，以支持 Thunderbolt；然而，目前仍有同时配备
    ExpressCard 和 Thunderbolt 端口的笔记本电脑在售。ExpressCard 是 PCMCIA 的现代版本，基于 PCIe 技术。最新标准支持高达
    5 Gbps 的传输速度。

    '
- fmt: '#### Configuration Space Registers


    All PCI devices (including bridges) have a set of registers known as the configuration
    space. This space is a minimum of 256 bytes for conventional PCI devices, but
    on technologies based on PCI-X 2.0 and PCI Express, the configuration space is
    up to 4096 bytes long and is referred to as the extended configuration space.
    The first 48 bytes of the configuration space registers are shown in [Figure 9-1](#Chapter09.html#fig_9_1).


    ![images](images/0901.jpg)


    ***Figure 9-1.** Standard PCI configuration space registers*


    The required registers are shown in gray; other registers are optional. The first
    48 bytes are standardized and you will find the same layout regardless of whether
    the device is PCI, PCI-X, or PCIe-based. Many of the registers are no longer applicable
    because PCI Express is point-to-point based— it doesn''t use a shared bus.


    Let''s look at the mandatory registers from [Figure 9-1](#Chapter09.html#fig_9_1)
    in more detail.


    - **Vendor ID**: Contains a 16-bit identifier unique to each hardware manufacturer.
    Vendor IDs are assigned by the PCI-SIG (special interest group) of each hardware
    manufacturer. Apple, for example, is assigned the vendor ID `0x106b`. The combination
    of vendor ID and device ID is often used by operating systems to determine which
    driver to load for a device. `0xffff` is not a valid vendor ID.

    - **Device ID**: Also 16-bits wide. Unlike the vendor ID, the device ID can be
    assigned by the manufacturer and is not maintained in a central register.

    - **Class Code**: A 24-bit register that holds the type classification for the
    device. The first 8 bits hold the base class. Examples of base classes include
    Unclassified (`0x0`), Mass Storage controller (`0x1`), Network Controller (`0x2`),
    Display Controller (`0x3`), etc. The next 8 bits hold the subclass. If the base
    class is a display controller, for instance, the subclasses might be VGA (`0x0`),
    XGA (`0x1`), or other (`0x80`). The remaining 8 bits are used to specify the program
    interface (register-level interface) of the device if more than one is possible.
    This is used for USB controllers to verify whether they comply with the UHCI,
    OHCI, EHCI, or XCHI interfaces, which are register-level specifications that determine
    how a driver should interact with a device.

    - **Subsystem Vendor/Device ID**: Follows the same rules and assignments as the
    vendor and device IDs. The subsystem IDs are used to identify the chip, when many
    different manufacturers sell products using the same chip (OEM). Prime examples
    of this are Nvidia and ATI. They manufacture GPU chips that are subsequently used
    by third-party manufacturers to make the final product. The PCI configuration
    space of such a device contains the third-party''s vendor ID and device ID, but
    uses either Nvidia or ATI as the subsystem vendor ID, as well as their device
    ID as the subsystem device ID. This allows ATI''s and Nvidia''s drivers to be
    used, even if they didn''t manufacture the board directly.

    - **Base Address 0-5**: Contains up to six I/O regions, which can be either I/O
    ports or memory regions. The latter is much more common. We will discuss I/O regions
    in more detail shortly. A base address is often abbreviated BAR (Base Address
    Register).


    ### PCI in I/O Kit


    PCI in the I/O Kit is handled by the `IOPCIFamily`, which, just like the `IOUSBFamily`,
    is implemented in its own KEXT. The `IOPCIFamily` is simpler than the `IOUSBFamily`
    in terms of the number of provided classes. This means there are fewer building
    blocks to help us out when implementing drivers. PCI is more low-level than USB
    from a driver point-of-view, and, as such, the writing of drivers for PCI devices
    is often more complex. [Figure 9-2](#Chapter09.html#fig_9_2) shows the class hierarchy
    of the `IOPCIFamily`.


    ![images](images/0902.jpg)


    ***Figure 9-2.** IOPCIFamily class hierarchy*


    The `IOPCIDevice` object acts a *nub* or provider for all PCI-based devices, including
    PCIe, Thunderbolt, and ExpressCard. An `IOPCIDevice` subclass called `IOAGPDevice`
    handles older AGP (Advanced Graphics Port)-based graphics cards; however, no Intel-based
    Macs feature AGP. In many cases, you only need to interact with the `IOPCIDevice`
    class from the `IOPCIFamily`. An instance of this object is provided for each
    PCI device in the system; similarly, an `IOPCIBridge` instance exists for each
    PCI bridge in the system. There are cases where a driver may need to interact
    with its bridge to read or write the bridge''s configuration space. Although uncommon,
    it is also possible to create your own PCI bridge driver. We will discuss device
    and bridge access later in this chapter. The root PCI bridge (also known as the
    host bridge and root complex) is implemented by a subclass of `IOPCIBridge` called
    `AppleACPIPCI` class. This class is part of the Platform Expert implemented by
    the `AppleACPIPlatform` KEXT and controls access to all devices and bridges in
    the system. There is only one instance of this class. The `IOPCI2PCIBridge` class
    is the driver for PCI-to-PCI bridges.


    ![images](images/square.jpg) **Tip** As with the `IOUSBFamily`, the `IOPCIFamily`
    is not part of the *xnu* source distribution; rather, it is available as a separate
    download from [`http://opensource.apple.com`](http://opensource.apple.com). The
    source package contains the source code for the classes discussed above, as well
    as a sample PCI driver and source code for user space tools to dump information
    from a PCI device.'
