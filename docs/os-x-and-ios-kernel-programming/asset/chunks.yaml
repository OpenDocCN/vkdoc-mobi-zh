    \ = 4,\n  static gMetaClass = {\n    <OSMetaClass> = {\n      <OSMetaClassBase>\
    \ = {\n        _vptr$OSMetaClassBase = 0x9ba980\n      },\n      members of OSMetaClass:\n\
    \      reserved = 0xb63ba00,\n      superClassLink = 0x85fac8,\n      className\
    \ = 0x4e5b5a0,\n      classSize = 92,\n      instanceCount = 1\n    }, <No data\
