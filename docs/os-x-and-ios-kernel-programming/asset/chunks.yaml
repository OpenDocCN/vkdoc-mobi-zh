    \n### 总结\n\nMac OS X的内核扩展使用Apple提供的Xcode包中的工具进行开发。在本章中，我们创建了一个教程性的\"Hello World\"\
    内核扩展，展示了如何从其他内核库导入符号，并介绍了常用的命令行工具，用于加载和处理内核扩展。\n\n---\n\n## 第4章 I/O Kit框架\n\n\
    Mac OS X的设备驱动程序是使用名为I/O Kit的框架编写的。I/O Kit由提供驱动程序所需服务的头文件和库，以及用户空间代码用于定位内核驱动程序并与之交互的头文件和库组成。I/O\
    \ Kit包含两个主要部分：\n\n*   `Kernel.framework`\n*   `IOKit.framework`\n\n虽然稍微有点反直觉，但I/O\
    \ Kit框架是为用户空间应用程序设计的，而不是用于在内核中开发I/O Kit驱动程序。相反，`Kernel.framework`包含用于内核空间驱动程序开发的头文件。如果您检查`Kernel.framework`的内容，会看到其中包含一个名为`IOKit`的目录，该目录包含用于内核空间驱动程序开发的头文件。`Kernel.framework`中另一个重要的目录名为`libkern`，其中包含内核I/O\
    \ Kit框架所基于的基础类和类型。\n\n用户空间I/O Kit框架有两个用途。它为用户应用程序提供以下功能：确定运行机器上存在的硬件设备、为特定硬件设备定位合适的驱动程序，以及向该驱动程序发送控制请求和请求状态。这些主题将在[第5章](#Chapter05.html#ch5)中进一步讨论。此外，用户空间I/O\
    \ Kit框架还允许用户空间应用程序直接与某些硬件设备通信，从而无需内核驱动程序。这对于特定范围的设备是可行的，最显著的是不需要在多个运行中的应用程序之间共享的USB和FireWire设备。我们在[第15章](#Chapter15.html#ch15)中讨论I/O\
    \ Kit的这一方面。"
