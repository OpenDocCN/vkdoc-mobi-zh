    It is generally unnecessary to deal directly with physical addresses, even when
    writing drivers.


    **PHYSICAL ADDRESS EXTENSIONS**


    Physical Address Extensions (PAE) is a feature developed by Intel to allow a larger
    physical address space, which works around the 4 GB memory limit on 32-bit systems.
    PAE is available on all versions of Mac OS X that support Intel processors (10.4.4
    and higher). PAE expands available address space up to 36 bits (obviously, there
    are no 36-bit data types so addresses are represented with a 64-bit type), which
    allows it to address up to 64 GB of physical memory. However, PAE does not change
    the size of the virtual address space used by a process, which is still limited
    to 4 GB. While no process (or the kernel) can use more than 4 GB, the system collectively
    can use up to 64 GB.


    #### Bus Physical Addresses


    The introduction of 64-bit computing presented a challenge as legacy I/O buses
    such as PCI and PCI-X were unable to access memory addresses over 32-bit. To work
    around this, PowerPC G5-based Macs had an additional MMU on their *north bridge*,
    used for remapping memory from 64-bit addresses into 32-bit addresses the device
    can read from. This MMU is referred to as the Device Address Resolution Table
    (DART). The DART presents the translated memory as physical addresses to the device,
    however these addresses are translated and not the same physical address as the
    CPU use. Intel-based computers have similar capabilities known as I/O memory management
    unit (IOMMU), one of the virtualization technologies for directed I/O (VT-d).


    A *bus physical address* appears to be a physical address to a hardware device,
    though in reality, it is a virtual address translated by the DART. If you are
    confused, don''t worry; you rarely have to deal with these addresses. In fact,
    if you use I/O Kit, it will do all the required translations for you automatically
    if you use `IOMemoryDescriptor`, which is discussed later in this chapter. Drivers
    can use the `IOPhysicalAddress` type to handle physical addresses. The size of
    the type depends on the underlying architecture. Because of PAE, it may be 64-bit,
    even on 32-bit systems.'
  trans: '

    # 内存管理


    内核中的内存管理比用户空间程序中的内存管理要复杂得多。用户空间程序通常处理的是平坦的线性地址空间，可以以任意大小的块分配内存，而无需关心这些内存的来源或布局。它拥有简单的接口，通常以字节大小作为参数，并根据所请求内存的可用性返回成功或失败的结果。最糟糕的情况下，内存分配失败或使用不当的后果是导致出错进程被终止。


    然而，内核中的情况却并非如此简单。内核必须处理多个内存空间，包括其自身的内存空间，以及这些内存空间与物理内存之间的映射。用户空间程序处理的是虚拟内存，底层物理布局无关紧要，而内核通常需要知道内存是否是连续的以及位于何处。这是因为某些硬件设备无法从特定内存地址读取数据，或者对内存对齐有特殊要求，例如，只能从已按
    16 字节边界对齐的内存中读取数据，或者无法读取高于 32 位的地址。然而，内核内存管理最明显的挑战是尽可能少地使用内存，因为它是稀缺资源，尤其对于 iPhone
    或 iPad 等嵌入式设备而言。在内核中错误地使用内存可能导致微妙或并不微妙的后果。


    在本章中，我们旨在解释作为内核程序员将遇到的各种内存类型、它们的用途，以及最有效、最安全的内存使用方式。我们还将讨论用于分配和管理内存的机制与方法，以及操作系统用于管理内存的一些底层机制。我们还将了解如何执行内存映射操作，即如何将一个地址空间的内存映射到另一个任务的地址空间中。


    ## 内存类型


    内核处理多种类型的内存，因此理解它们之间的差异是实现成功驱动程序或内核扩展的关键。


    内存类型可分为：


    *   CPU 物理地址

    *   总线物理地址

    *   用户与内核虚拟地址


    除了这三种内存地址类型外，可寻址的内存量也因架构而异，范围从 32 位到 64 位。根据架构的不同，内存的字节序也可能不同，可以是小端序或大端序。


    以下各节将讨论每种内存类型在内核编程中的重要性和用途。


    ### CPU 物理地址


    物理地址指的是 CPU 用于访问物理内存的寻址系统。通常，物理地址隐藏在 CPU 的内存管理单元（MMU）之后。MMU 将内核和用户空间通常使用的虚拟地址转换为物理地址。对于
    32 位系统，物理地址空间是线性的，范围从 `0` 到 `0xffffffff`（`2³²`）；对于 64 位系统，范围从 `0` 到 `0xffffffffffffffff`（`2⁶⁴`）。对物理内存的访问会缓存在较小的内存缓冲区中，例如通常位于
    CPU 芯片上的 L1 和 L2 缓存。


    通常，即使是在编写驱动程序时，也无需直接处理物理地址。


    **物理地址扩展**


    物理地址扩展（PAE）是英特尔开发的一项特性，允许更大的物理地址空间，从而绕过了 32 位系统上 4 GB 的内存限制。所有支持英特尔处理器的 Mac OS
    X 版本（10.4.4 及更高版本）都支持 PAE。PAE 将可用地址空间扩展到 36 位（显然，不存在 36 位的数据类型，因此地址用 64 位类型表示），从而能够寻址高达
    64 GB 的物理内存。然而，PAE 并不改变进程使用的虚拟地址空间大小，后者仍然限制在 4 GB。虽然单个进程或内核无法使用超过 4 GB 的内存，但整个系统总共可以使用高达
    64 GB 的内存。


    ### 总线物理地址


    64 位计算的引入带来了一个挑战，因为传统的 I/O 总线（如 PCI 和 PCI-X）无法访问超过 32 位的内存地址。为了解决这个问题，基于 PowerPC
    G5 的 Mac 在其*北桥*上增加了一个额外的 MMU，用于将 64 位地址重映射为设备可以读取的 32 位地址。这个 MMU 被称为设备地址解析表（DART）。DART
    将转换后的内存作为物理地址呈现给设备，然而这些地址是经过转换的，与 CPU 使用的物理地址不同。基于英特尔的计算机具有类似的能力，称为 I/O 内存管理单元（IOMMU），是用于定向
    I/O 的虚拟化技术之一。


    对于硬件设备来说，*总线物理地址*看起来是一个物理地址，但实际上它是由 DART 转换而来的虚拟地址。如果你感到困惑，不必担心；你很少需要处理这些地址。事实上，如果你使用
    I/O Kit，并且使用了本章稍后讨论的 `IOMemoryDescriptor`，它将会自动为你完成所有必要的转换。驱动程序可以使用 `IOPhysicalAddress`
    类型来处理物理地址。该类型的大小取决于底层架构。由于 PAE 的存在，即使在 32 位系统上，它也可能是 64 位的。

