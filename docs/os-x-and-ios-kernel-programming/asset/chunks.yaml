  trans: "\n### 使用套接字过滤器构建应用层防火墙\n\n为了更好地理解套接字过滤器机制的工作原理，我们来看一个具体的应用示例。尽管 Mac OS X\
    \ 本身已内置应用层防火墙（`ALF.kext`），我们仍将创建一个极简版本来展示套接字过滤器的强大功能。`AppWall` 架构包含一个 NKE KEXT，其中实现了套接字过滤器。`AppWall`\
    \ 将解决阻止未授权程序访问网络的问题，同时还能记录指定程序双向传输的数据信息，且不影响其正常运行。由于 `AppWall` 为概念验证项目，我们将限制其仅支持基于\
    \ TCP 协议的 IPv4。\n\n首先，我们定义套接字过滤器：\n\n```\n#define APPWALL_FLT_TCP_HANDLE       'apw0'      //\
    \ 代码应向 Apple 注册\n\nstatic struct sflt_filter socket_tcp_filter = {\n        APPWALL_FLT_TCP_HANDLE,\n\
            SFLT_GLOBAL,\n        \"com_osxkernel_AppWall\",\n        appwall_unregistered,\n\
            appwall_attach,\n        appwall_detach,\n        NULL,\n...\n        appwall_data_in,\n\
            appwall_data_out,\n        appwall_connect_in,\n        appwall_connect_out,\n\
            NULL,\n...\n};\n```\n\n![images](img/square.jpg) **提示** `AppWall` 的完整源代码将在出版社网站\
    \ [`www.apress.com`](http://www.apress.com) 上提供。\n\n根据需求，我们将大量函数指针设为 `NULL`，因为它们与本过滤器的设计无关。如有需要，您可以轻松修改\
    \ `AppWall` 来实现这些功能。\n\n接下来查看过滤器注册方式：\n\n```\nkern_return_t AppWall_start (kmod_info_t\
    \ * ki, void * d)\n{\n...\n   ret = sflt_register(&socket_tcp_filter, PF_INET,\
    \ SOCK_STREAM, IPPROTO_TCP);\n    if (ret != KERN_SUCCESS)\n        goto bail;\n\
    \n    add_entry(\"ssh\", 1);    // 阻止 ssh 应用\n    add_entry(\"nc\", 0);     //\
    \ 记录 nc 应用数据\n\n    g_filter_registered = TRUE;\n...\n}\n```\n\n为简洁起见，我们省略了通用维护代码（如锁分配或错误处理）。一旦\
    \ `sflt_register()` 函数返回，过滤器即刻生效，回调函数可能被触发。因此，在注册过滤器前必须完成所有必要资源（如锁）的初始化。\n\n`sflt_register()`\
    \ 函数接受四个参数：\n\n- 指向套接字过滤器结构的指针（如前所述）。\n- 协议域，我们指定为 `PF_INET`（IPv4 协议族）。\n- 类型，我们指定为\
    \ `SOCK_STREAM`（全双工流式套接字）。\n- 最后是协议，我们指定为 `IPPROTO_TCP`。\n\n![images](img/square.jpg)\
    \ **提示** 域、类型和协议值与用户空间套接字 API 中使用的相同。请查阅 `man 2 socket` 手册页了解可用域、类型和协议的详细信息。\n\
    \n如需处理其他协议（如 UDP），需要再次调用 `sflt_register()`。每个已注册过滤器需要独立的处理句柄，因此您需要为 UDP 过滤器声明第二个结构体。根据需要，第二个结构体可与第一个共享部分或全部回调函数。\n\
    \n最后一步是通过 `AppWall` 的 `add_entry()` 函数向被阻止/监控的应用列表添加条目。在实际 NKE 中，通常会通过内核控制接口允许用户空间工具配置这些条目，而非硬编码。`add_entry()`\
    \ 函数创建的 `appwall_entry` 结构体如代码清单 13-3 所示。\n\n### AppWall 运行机制与数据结构\n\n在实现过滤器回调函数之前，我们需要声明用于存储过滤器收集信息的数据结构。这些数据结构声明在共享头文件中，未来可被用户空间工具使用，但目前仅用于\
    \ `AppWall` KEXT。数据结构如代码清单 13-3 所示。\n\n**代码清单 13-3.** `AppWall` 头文件\n\n```\n#define\
    \ BUNDLE_ID   \"com.osxkernel.AppWall\"\n\nstruct app_descriptor\n{\n    char\
    \ name[PATH_MAX];\n    unsigned long bytes_in;\n    unsigned long bytes_out;\n\
    \    unsigned long packets_in;\n    unsigned long packets_out;\n    int      \
    \     do_block;\n    int           outbound_blocked;\n    int           inbound_blocked;\n\
    \n};\n\n#if defined (KERNEL)\nstruct appwall_entry\n{\n    TAILQ_ENTRY(appwall_entry)\
    \   link;\n    struct app_descriptor        desc;\n    int                   \
    \       users;  \n};\n#endif\n\n#endif\n```\n\n第一个结构体 `app_descriptor` 用于存储待阻止或监控的应用程序名称。`do_block`\
    \ 字段为非零的条目将被阻止，而零值表示仅收集和报告统计数据。\n\n我们使用应用程序名称（而非进程标识符 PID）来跟踪该程序的每个实例。虽然这种方案不够安全（可通过重命名可执行文件绕过），但作为示例而言已经足够。\n\
    \n如果希望阻止特定应用程序，`do_block` 字段设为非零值；若为零则仅收集统计信息。当检测到不存在对应 `appwall_entry` 的应用程序套接字时，过滤器将忽略该连接。\n"
- fmt: "### Attaching and Detaching the Filter\n\nThe `attach` (`sf_attach`) and `detach`\
    \ (`sf_detach`) functions are called whenever our filter attaches itself to a\
    \ socket. This happens either because the client that owns the socket specifically\
    \ requests that we attach or for a global filter, when the socket is created.\
    \ It is not possible to attach to a socket that is already established.\n\nBecause\
    \ a filter may intercept a high volume of sockets, the callbacks should avoid\
    \ doing any heavy processing, as it may impact the system's network performance.\
    \ `AppWall` was designed for demonstration and to be as simple as possible, not\
    \ as a high-performance socket filter.\n\nLet's look at the implementation of\
    \ the attach callback in `AppWall`:\n\n```c\nstatic   errno_t appwall_attach(void**\
    \ cookie, socket_t so)\n{\n    errno_t                 result = 0;\n    struct\
    \ appwall_entry*   entry;\n    char                    name[PATH_MAX];\n\n   \
    \ *cookie = NULL;\n\n    proc_selfname(name, PATH_MAX);\n\n    lck_mtx_lock(g_mutex);\n\
    \n    entry = find_entry_by_name(name);\n    if (entry)\n    {\n        entry->users++;\n\
    \        *cookie = (void*)entry;\n        printf(\"AppWall: attaching to process:\
    \ %s\\n\", name);\n    }\n    else\n        result = ENOPOLICY; // don't attach\
    \ to this socket.\n\n    lck_mtx_unlock(g_mutex);\n\n    return result;\n}\n```\n\
    \nWe are passed two arguments: The first is a `cookie` parameter that we can use\
    \ to assign per-socket data. The `cookie` pointer will be passed back to us in\
    \ every callback. The second argument is an opaque reference to the socket itself.\
    \ Since the socket is opaque, it must be accessed with the socket KPI.\n\n###\
    \ Retrieving the IP Address of a Socket\n\nThe following example shows how to\
    \ use the socket KPI to get the IP address the socket is bound to:\n\n```c\nunsigned\
    \ char addstr[256];\nstruct sockaddr_in  addr;\nsock_getsockname(so, (struct sockaddr*)&addr,\
    \ sizeof(addr));\ninet_ntop(AF_INET, &addr.sin_addr, (char*)addstr, sizeof(addstr));\n\
    printf(\"%s:%d\\n\", addstr, ntohs(addr.sin_port));\n```\n\nWhen the `appwall_attach()`\
    \ function gets called, we are executing in the context of the task that created\
    \ the socket, and we can, therefore, call `proc_selfname()`, which returns the\
    \ process name of the current task. Once we have a name, we search the global\
    \ linked list of `appwall_entry` structures to see if we can find a match. If\
    \ a match is found, we increment its `users` count, and assign to the `cookie`\
    \ return argument.\n\nAll manipulation of the linked list is performed under a\
    \ global mutex to protect against concurrent access. If a match is not found,\
    \ we return `ENOPOLICY`. Any non-zero return code from the function will have\
    \ the effect of preventing the filter from being attached to this socket (without\
    \ affecting the socket's lifecycle) and, hence, no further callbacks will be seen\
    \ for that socket.\n\nIf you have a `socket_t` handle, you can manually attach\
    \ to the socket by calling the `sf_attach()` function.\n\nThe `sf_detach()` callback\
    \ will be invoked when the filter should be detached from the socket, which occurs\
    \ when a socket closes or as a result of the filter being unregistered with `sflt_unregister()`.\
    \ The detach callback in `AppWall` is implemented as follows:\n\n```c\nstatic\
    \ void\nappwall_detach(void* cookie, socket_t so)\n{\n    struct appwall_entry*\
    \       entry;\n\n    if (cookie)\n    {\n        entry = (struct appwall_entry*)cookie;\n\
    \n        lck_mtx_lock(g_mutex);\n\n        entry->users--;\n        if (entry->users\
    \ == 0)\n        {\n            printf(\"report for: %s\\n\", entry->desc.name);\n\
    \            printf(\"===================================\\n\");\n\n         \
    \   if (entry->desc.do_block)\n            {\n                printf(\"inbound_blocked:\
    \ %d\\n\", entry->desc.inbound_blocked);\n                printf(\"outbound_blocked:\
    \ %d\\n\", entry->desc.outbound_blocked);                  \n            }\n \
    \           else\n            {\n                printf(\"bytes_in: %lu\\n\",\
    \ entry->desc.bytes_in);\n                printf(\"bytes_out: %lu\\n\", entry->desc.bytes_out);\n\
    \                printf(\"entry->desc.packets_in: %lu\\n\", entry->desc.packets_in);\n\
    \                printf(\"entry->desc.packets_out: %lu\\n\",entry->desc.packets_out);\n\
    \            }\n            cookie = NULL;\n        }        \n        lck_mtx_unlock(g_mutex);\n\
    \    }\n    return;\n}\n```\n\nThe function simply prints a report of how many\
    \ times connections were blocked, or if the application was monitored, dumps statistics\
    \ for how many bytes and packets were transmitted.\n\n### Handling Connections\n\
    \nA socket filter can intercept calls to the `connect()` system call for outgoing\
    \ connections. The system call handler calls our filter by using the `sf_connect_out`\
    \ filter function. The filter function is passed the following three arguments:\n\
    \n- The `cookie`\n- A handle to the `socket` itself\n- A `sockaddr` structure\
    \ describing the intended destination of the socket\n\nReturning non-zero from\
    \ the callback will have the effect of propagating the error directly back to\
    \ the caller of the `connect()` function (from kernel or user space) and will\
    \ prevent the socket from being established without any packets going out on the\
    \ network, which is how `AppWall` is able to block outgoing connections.\n\nThere\
    \ is a catch here for UDP. UDP is connectionless and is not required to call `connect()`\
    \ at all; it will do so only to set the default address for `send()` and `recv()`,\
    \ which does not result in outgoing network traffic. Blocking UDP traffic can\
    \ instead be done in the data out or in callbacks on a per-packet basis.\n\nThe\
    \ `sf_connect_in` function, on the other hand, is not called in response to a\
    \ system call like `sf_connect_out` but called by a protocol handler just before\
    \ a new connection is established. The `sf_connect_in` callback is currently only\
    \ invoked for TCP and does not apply to UDP (it's connectionless).\n\nAs with\
    \ the output filter, it is possible to reject the connection by returning non-zero,\
    \ preventing it from being established and sending any further data to the socket.\
    \ The `sf_connect_in` callback takes the same arguments as the output callback,\
    \ but the `sockaddr` structure will describe the remote address instead. `AppWall`\
    \ implements the `sf_connect_in` filter function as follows:\n\n```c\nstatic \
    \ errno_t\nappwall_connect_in(void* cookie, socket_t so, const struct sockaddr*\
    \ from)\n{\n    struct appwall_entry*       entry;\n    errno_t              \
    \       result = 0;\n\n    entry = (struct appwall_entry*)cookie;\n    if (!entry)\n\
    \        goto bail;\n\n    lck_mtx_lock(g_mutex);\n\n    if (entry->desc.do_block)\n\
    \    {\n        printf(\"blocked incoming connection to: %s\", entry->desc.name);\n\
    \        if (from)\n        {\n            printf(\" from: \");\n            log_ip_and_port_addr((struct\
    \ sockaddr_in*)from);\n        }        \n        entry->desc.inbound_blocked++;\n\
    \        result = EPERM;\n    }\n    lck_mtx_unlock(g_mutex);\nbail:\n\n    return\
    \ result;\n}\n```\n\nThe function looks for a non-`NULL` cookie, and if one is\
    \ present, checks if the application owning the current socket should be blocked."
  raw: '##### Attaching and Detaching the Filter


    The attach (`sf_attach`) and detach (`sf_detach`) functions are called whenever
    our filter attaches itself to a socket. This happens either because the client
    that owns the socket specifically request that we attach or for a global filter,
    when the socket is created. It is not possible to attach to a socket that is already
    established.


    Because a filter may intercept a high volume of sockets, the callbacks should
    avoid doing any heavy processing, as it may impact the system''s network performance.
    AppWall was designed for demonstration and to be as simple as possible, not as
    a high-performance socket filter.


    Let''s look at the implementation of the attach callback in AppWall:


    `static   errno_t appwall_attach(void** cookie, socket_t so)`

    `{`

    `    errno_t                 result = 0;`

    `    struct appwall_entry*   entry;`

    `    char                    name[PATH_MAX];`


    `    *cookie = NULL;`


    `    proc_selfname(name, PATH_MAX);`


    `    lck_mtx_lock(g_mutex);`


    `    entry = find_entry_by_name(name);`

    `    if (entry)`

    `    {`

    `        entry->users++;`

    `        *cookie = (void*)entry;`

    `        printf("AppWall: attaching to process: %s\n", name);`

    `    }`

    `    else`

    `        result = ENOPOLICY; // don''t attach to this socket.`


    `    lck_mtx_unlock(g_mutex);`


    `    return result;`

    `}`


    We are passed two arguments: The first is a `cookie` parameter that we can use
    to assign per-socket data. The `cookie` pointer will be passed back to us in every
    callback. The second argument is an opaque reference to the socket itself. Since
    the socket is opaque, it must be accessed with the socket KPI.


    **RETRIEVING THE IP ADDRESS OF A SOCKET**


    The following example shows how to use the socket KPI to get the IP address the
    socket is bound to:


    `unsigned char addstr[256];`

    `struct sockaddr_in  addr;`

    `sock_getsockname(so, (struct sockaddr*)&addr, sizeof(addr));`

    `inet_ntop(AF_INET, &addr.sin_addr, (char*)addstr, sizeof(addstr));`

    `printf("%s:%d\n", addstr, ntohs(addr.sin_port));`


    When the `appwall_attach()` function gets called, we are executing in the context
    of the task that created the socket, and we can, therefore, call `proc_selfname()`,
    which returns the process name of the current task. Once we have a name, we search
    the global linked list of `appwall_entry` structures to see if we can find a match.
    If a match is found, we increment its `users` count, and assign to the `cookie`
    return argument.


    All manipulation of the linked list is performed under a global mutex to protect
    against concurrent access. If a match is not found, we return `ENOPOLICY`. Any
    non-zero return code from the function will have the effect of preventing the
    filter from being attached to this socket (without affecting the sockets lifecycle)
    and, hence, no further callbacks will be seen for that socket.


    If you have a `socket_t` handle, you can manually attach to the socket by calling
    the `sf_attach()` function.


    The `sf_detach()` callback will be invoked when the filter should be detached
    from the socket, which occurs when a socket closes or as a result of the filter
    being unregistered with `sflt_unregister()`. The detach callback in AppWall is
    implemented as follows:


    `static void`

    `appwall_detach(void* cookie, socket_t so)`

    `{`

    `    struct appwall_entry*       entry;`


    `    if (cookie)`

    `    {`

    `        entry = (struct appwall_entry*)cookie;`


    `        lck_mtx_lock(g_mutex);`


    `        entry->users--;`

    `        if (entry->users == 0)`

    `        {`

    `            printf("report for: %s\n", entry->desc.name);`

    `            printf("===================================\n");`


    `            if (entry->desc.do_block)`

    `            {`

    `                printf("inbound_blocked: %d\n", entry->desc.inbound_blocked);`

    `                printf("outbound_blocked: %d\n", entry->desc.outbound_blocked);                  `

    `            }`

    `            else`

    `            {`

    `                printf("bytes_in: %lu\n", entry->desc.bytes_in);`

    `                printf("bytes_out: %lu\n", entry->desc.bytes_out);`

    `                printf("entry->desc.packets_in: %lu\n", entry->desc.packets_in);`

    `                printf("entry->desc.packets_out: %lu\n",entry->desc.packets_out);`

    `            }`

    `            cookie = NULL;`

    `        }        `

    `        lck_mtx_unlock(g_mutex);`

    `    }`

    `    return;`

    `}`


    The function simply prints a report of how many times connections were blocked,
    or if the application was monitored, dumps statistics for how many bytes and packets
    were transmitted.


    ##### Handling Connections


    A socket filter can intercept calls to the `connect()` system call for outgoing
    connections. The system call handler calls our filter by using the `sf_connect_out`
    filter function. The filter function is passed the following three arguments.


    *   The `cookie`

    *   A handle to the `socket` itself

    *   A `sockaddr` structure describing the intended destination of the socket


    Returning non-zero from the callback will have the effect of propagating the error
    directly back to the caller of the `connect()` function (from kernel or user space)
    and will prevent the socket from being established without any packets going out
    on the network, which is how AppWall is able to block outgoing connections.


    There is a catch here for UDP. UDP is connectionless and is not required to call
    `connect()` at all; it will do so only to set the default address for `send()`
    and `recv()`, which does not result in outgoing network traffic. Blocking UDP
    traffic can instead be done in the data out or in callbacks on a per packet basis.


    The `sf_connect_in` function, on the other hand, is not called in response to
    a system call like `sf_connect_out` but called by a protocol handler just before
    a new connection is established. The `sf_connect_in` callback is currently only
    invoked for TCP and does not apply to UDP. (It''s connectionless.)


    As with the output filter, it is possible to reject the connection by returning
    non-zero, preventing it from being established and sending any further data to
    the socket. The `sf_connect_in` callback takes the same arguments as the output
    callback, but the `sockaddr` structure will describe the remote address instead.
    AppWall implements the `sf_connect_in` filter function as follows:


    `static  errno_t`

    `appwall_connect_in(void* cookie, socket_t so, const struct sockaddr* from)`

    `{`

    `    struct appwall_entry*       entry;`

    `    errno_t                     result = 0;`


    `    entry = (struct appwall_entry*)cookie;`

    `    if (!entry)`

    `        goto bail;`


    `    lck_mtx_lock(g_mutex);`


    `    if (entry->desc.do_block)`

    `    {`

    `        printf("blocked incoming connection to: %s", entry->desc.name);`

    `        if (from)`

    `        {`

    `            printf(" from: ");`

    `            log_ip_and_port_addr((struct sockaddr_in*)from);`

    `        }        `

    `        entry->desc.inbound_blocked++;`

    `        result = EPERM;`

    `    }`

    `    lck_mtx_unlock(g_mutex);`

    `bail:`


    `    return result;`

    `}`


    The function looks for a non-`NULL` cookie, and if one is present, checks if the
    application owning the current socket should be blocked.'
  trans: "\n### 附加与分离过滤器\n\n当我们的过滤器附加到套接字上时，会调用 `attach` (`sf_attach`) 和 `detach`\
    \ (`sf_detach`) 函数。这要么是因为拥有该套接字的客户端明确请求我们附加，要么对于全局过滤器而言，是在套接字创建时发生的。无法附加到已建立的套接字上。\n\
    \n由于过滤器可能会拦截大量套接字，回调函数应避免进行任何繁重的处理，因为这可能会影响系统的网络性能。`AppWall` 的设计旨在演示并尽可能保持简单，而非作为一个高性能的套接字过滤器。\n\
    \n我们来看一下 `AppWall` 中附加回调的实现：\n\n```c\nstatic   errno_t appwall_attach(void** cookie,\
    \ socket_t so)\n{\n    errno_t                 result = 0;\n    struct appwall_entry*\
    \   entry;\n    char                    name[PATH_MAX];\n\n    *cookie = NULL;\n\
    \n    proc_selfname(name, PATH_MAX);\n\n    lck_mtx_lock(g_mutex);\n\n    entry\
    \ = find_entry_by_name(name);\n    if (entry)\n    {\n        entry->users++;\n\
    \        *cookie = (void*)entry;\n        printf(\"AppWall: 正在附加到进程: %s\\n\",\
    \ name);\n    }\n    else\n        result = ENOPOLICY; // 不附加到此套接字。\n\n    lck_mtx_unlock(g_mutex);\n\
    \n    return result;\n}\n```\n\n我们接收两个参数：第一个是 `cookie` 参数，我们可以用它来分配每个套接字的数据。`cookie`\
    \ 指针将在每个回调中传回给我们。第二个参数是对套接字本身的不透明引用。由于套接字是不透明的，因此必须使用套接字 KPI 来访问它。\n\n### 检索套接字的\
    \ IP 地址\n\n以下示例展示了如何使用套接字 KPI 获取套接字绑定的 IP 地址：\n\n```c\nunsigned char addstr[256];\n\
    struct sockaddr_in  addr;\nsock_getsockname(so, (struct sockaddr*)&addr, sizeof(addr));\n\
    inet_ntop(AF_INET, &addr.sin_addr, (char*)addstr, sizeof(addstr));\nprintf(\"\
    %s:%d\\n\", addstr, ntohs(addr.sin_port));\n```\n\n当调用 `appwall_attach()` 函数时，我们正在创建该套接字的任务上下文中执行，因此，我们可以调用\
    \ `proc_selfname()`，该函数返回当前任务的进程名称。获得名称后，我们会搜索 `appwall_entry` 结构体的全局链表，看看是否能找到匹配项。如果找到匹配项，我们会增加其\
    \ `users` 计数，并将其赋值给 `cookie` 返回参数。\n\n对链表的所有操作都在全局互斥锁的保护下进行，以防止并发访问。如果未找到匹配项，则返回\
    \ `ENOPOLICY`。函数返回任何非零值都将阻止过滤器附加到此套接字（不影响套接字的生命周期），因此，将不再看到针对该套接字的进一步回调。\n\n如果你有一个\
    \ `socket_t` 句柄，可以通过调用 `sf_attach()` 函数手动附加到该套接字。\n\n当过滤器需要从套接字分离时，将调用 `sf_detach()`\
    \ 回调。这发生在套接字关闭时，或者是由于使用 `sflt_unregister()` 注销过滤器的结果。`AppWall` 中的分离回调实现如下：\n\n\
    ```c\nstatic void\nappwall_detach(void* cookie, socket_t so)\n{\n    struct appwall_entry*\
    \       entry;\n\n    if (cookie)\n    {\n        entry = (struct appwall_entry*)cookie;\n\
    \n        lck_mtx_lock(g_mutex);\n\n        entry->users--;\n        if (entry->users\
    \ == 0)\n        {\n            printf(\"以下应用的报告: %s\\n\", entry->desc.name);\n\
    \            printf(\"===================================\\n\");\n\n         \
    \   if (entry->desc.do_block)\n            {\n                printf(\"入站已阻止:\
    \ %d\\n\", entry->desc.inbound_blocked);\n                printf(\"出站已阻止: %d\\\
    n\", entry->desc.outbound_blocked);                  \n            }\n       \
    \     else\n            {\n                printf(\"入站字节数: %lu\\n\", entry->desc.bytes_in);\n\
    \                printf(\"出站字节数: %lu\\n\", entry->desc.bytes_out);\n         \
    \       printf(\"入站数据包数: %lu\\n\", entry->desc.packets_in);\n                printf(\"\
    出站数据包数: %lu\\n\",entry->desc.packets_out);\n            }\n            cookie\
    \ = NULL;\n        }        \n        lck_mtx_unlock(g_mutex);\n    }\n    return;\n\
    }\n```\n\n该函数只是打印一份报告，显示连接被阻止的次数，或者如果应用程序被监控，则转储传输的字节数和数据包数的统计数据。\n\n### 处理连接\n\
    \n套接字过滤器可以拦截对 `connect()` 系统调用（用于出站连接）的调用。系统调用处理程序通过 `sf_connect_out` 过滤器函数调用我们的过滤器。过滤器函数接收以下三个参数：\n\
    \n-   `cookie`\n-   指向 `socket` 自身的句柄\n-   一个描述套接字预期目的地的 `sockaddr` 结构体\n\n从回调返回非零值将导致错误直接传播回\
    \ `connect()` 函数的调用者（来自内核或用户空间），并阻止套接字建立连接，且不会有任何数据包发送到网络上，这正是 `AppWall` 能够阻止出站连接的方式。\n\
    \n这里对 UDP 有一个需要注意的地方。UDP 是无连接的，并且根本不需要调用 `connect()`；它只会调用 `connect()` 来设置 `send()`\
    \ 和 `recv()` 的默认地址，这不会导致出站网络流量。阻止 UDP 流量可以在数据输出或输入回调中逐数据包进行。\n\n另一方面，`sf_connect_in`\
    \ 函数不像 `sf_connect_out` 那样响应系统调用而被调用，而是由协议处理程序在新连接建立之前调用。`sf_connect_in` 回调目前仅针对\
    \ TCP 调用，不适用于 UDP（它是无连接的）。\n\n与输出过滤器一样，可以通过返回非零值来拒绝连接，从而阻止其建立并向套接字发送任何进一步的数据。`sf_connect_in`\
    \ 回调接受的参数与输出回调相同，但 `sockaddr` 结构体将描述远程地址。`AppWall` 按如下方式实现 `sf_connect_in` 过滤器函数：\n\
    \n```c\nstatic  errno_t\nappwall_connect_in(void* cookie, socket_t so, const struct\
    \ sockaddr* from)\n{\n    struct appwall_entry*       entry;\n    errno_t    \
    \                 result = 0;\n\n    entry = (struct appwall_entry*)cookie;\n\
    \    if (!entry)\n        goto bail;\n\n    lck_mtx_lock(g_mutex);\n\n    if (entry->desc.do_block)\n\
    \    {\n        printf(\"已阻止到以下应用的入站连接: %s\", entry->desc.name);\n        if (from)\n\
    \        {\n            printf(\" 来自: \");\n            log_ip_and_port_addr((struct\
    \ sockaddr_in*)from);\n        }        \n        entry->desc.inbound_blocked++;\n\
    \        result = EPERM;\n    }\n    lck_mtx_unlock(g_mutex);\nbail:\n\n    return\
    \ result;\n}\n```\n\n该函数查找非 `NULL` 的 `cookie`，如果存在，则检查拥有当前套接字的应用程序是否应被阻止。\n"
- fmt: "# Socket Data Input and Output\n\nThe real power of socket filters are in\
    \ the `sf_data_in` and `sf_data_out` filter functions. They allow interception\
    \ of incoming and outgoing packets. Packets seen by a socket filter's data functions\
    \ are stripped of (or have not yet had attached) protocol header information,\
    \ such as IP, TCP, or UDP headers. In the case of TCP and UDP, the information\
    \ will represent the actual payload data, which will be delivered to or from a\
    \ socket. If you need data from the protocol headers, you may wish to write an\
    \ IP or interface filter instead. For incoming data packets, you can determine\
    \ the network interface a packet received by calling `mbuf_pkthdr_rcvif()` on\
    \ the `mbuf`. For outgoing packets, this information isn't available because the\
    \ filter function executes before the packet is routed to a network interface.\
    \ The `sf_data_out` function in AppWall is implemented as follows:\n\n```\nstatic\
    \  errno_t\nappwall_data_out(void* cookie, socket_t so, const struct sockaddr*\
    \ to, mbuf_t* data,\n                 mbuf_t* control, sflt_data_flag_t flags)\n\
    {\n   struct appwall_entry*       entry;\n   errno_t                     result\
    \ = 0;\n\n    entry = (struct appwall_entry*)cookie;\n    if (!entry)\n      \
    \  goto bail;\n\n    lck_mtx_lock(g_mutex);\n    entry->desc.bytes_out += mbuf_pkthdr_len(*data);\n\
    \    entry->desc.packets_out++;\n\n    if (entry->desc.do_block)\n        result\
    \ = EPERM;\n    lck_mtx_unlock(g_mutex);\nbail:\n    return result;\n}\n```\n\n\
    The function accepts the following six parameters:\n\n*   The `cookie` containing\
    \ the pointer to the `appwall_entry` structure.\n*   A `socket_t` reference to\
    \ socket transmitting data.\n*   A `sockaddr` structure containing the address\
    \ of the host to which the packet is destined. The argument is `NULL` for TCP\
    \ packets, but set for UDP. The destination of a TCP socket can be determined\
    \ at the time the connection is created (`sf_connect_out`).\n*   A pointer to\
    \ an `mbuf_t` handle. Note that you cannot use the `mbuf_t` directly, as it is\
    \ merely a handle, you have to use the mbuf KPI to extract data and information\
    \ from it. Also note that the `mbuf` argument is a pointer, so it also functions\
    \ as an output argument. It is possible to assign a different `mbuf_t`, which\
    \ will be transmitted in lieu of the original.\n*   A pointer to an `mbuf_t` handle\
    \ containing additional control data.\n*   The sixth parameter is used to indicate\
    \ the type of data, such as normal, out-of-band or records data. There are two\
    \ valid flags: `sock_data_filt_flag_oob` and `sock_data_filt_flag_record`. A value\
    \ of zero indicates normal data.\n\nIn the AppWall case, the data in function\
    \ is implemented in a similar way to the connect function by checking if the calling\
    \ socket has a cookie attached, which in turn means that the packet should either\
    \ be logged or blocked. We return `EPERM` to signal the caller that it should\
    \ free the packet and halt further processing if the packet should be blocked\
    \ (filtered). If you wish to keep the packet, but prevent it from progressing\
    \ further, you can return `EJUSTRETURN` instead, which will prevent the caller\
    \ from freeing the packet.\n\nAppWall implements the data input function nearly\
    \ identically. It will block an incoming packet by returning `EPERM`.\n\n![images](images/square.jpg)\
    \ **Tip**  If you wish to learn more about socket filters, Apple provides a more\
    \ comprehensive socket filter example, called: *tcplognke*, which can be found\
    \ on their developer website. It shows how to log connections as well as how to\
    \ swallow (delay) and re-inject packets at a later time. It also demonstrates\
    \ some of the other filter functions we have not covered here and the user of\
    \ the kernel control mechanism.\n\n## Internet Protocol Filters\n\nInternet Protocol\
    \ (IP) filters allow filtering and injection of incoming and outgoing IP packets.\
    \ The IP filter mechanism works both for IPv4 and for IPv6. Because the IP operates\
    \ at the network layer, there is no concept of connections or sessions, as that\
    \ is handled by higher layer protocols and mechanisms. At the IP level, there\
    \ are only packets going in and out. As a result, IP filters are significantly\
    \ less complex than socket filters. The programming interface is similar to that\
    \ of socket filters. An IP filter is defined by the structure `ipf_filter`:\n\n\
    ```\nstruct ipf_filter {\n    void*           cookie;\n    const char*     name;\n\
    \    ipf_input_func  ipf_input;\n    ipf_output_func ipf_output;\n    ipf_detach_func\
    \ ipf_detach;\n};\n```\n\nThe structure consists of the following fields and callbacks:\n\
    \n*   The `cookie` field is used to assign a pointer containing some data that\
    \ should be passed along to all the filter functions.\n*   The `name` is used\
    \ for debugging purposes and should be set to something identifying your filter/KEXT.\n\
    *   The `ipf_input` and `ipf_output` fields define the actual filter functions,\
    \ which will be called for incoming and outgoing IP packets, respectively.\n*\
    \   The `ipf_detach` function will be called when the filter is detached. Unlike\
    \ a socket filter, which detaches when a socket close is terminated, IP filters\
    \ need to be detached/removed explicitly by calling `ipf_remove()`. Note that\
    \ the `ipf_remove()` function may defer removal of the filter if one of the filter\
    \ functions are executing when the function is called. Therefore, you need to\
    \ wait for the `ipf_detach` filter function to complete before a KEXT can be unloaded\
    \ to avoid a kernel panic when the IP stack tries to call `ipf_detach` after it\
    \ has been unloaded from memory.\n\nA complete example of a minimal IP filter\
    \ is shown in [Listing 13-4](#Chapter13.html#list_13_4).\n\n**Listing 13-4.**\
    \ MyIPFilter: Implementation of a Simple IP Filter\n\n```\n#include <mach/mach_types.h>\n\
    #include <sys/kernel_types.h>\n#include <sys/systm.h>\n#include <sys/kpi_mbuf.h>\n\
    #include <netinet/ip.h>\n#include <netinet/kpi_ipfilter.h>\n\nenum {\n    kMyFiltDirIn,\n\
    \    kMyFiltDirOut,\n    kMyFiltNumDirs\n};\n\nstruct myfilter_stats {\n    unsigned\
    \ long udp_packets[kMyFiltNumDirs];\n    unsigned long tcp_packets[kMyFiltNumDirs];\n\
    \    unsigned long icmp_packets[kMyFiltNumDirs];\n    unsigned long other_packets[kMyFiltNumDirs];\n\
    };\n\nstatic struct myfilter_stats g_filter_stats;\nstatic ipfilter_t g_filter_ref;\n\
    static boolean_t g_filter_registered = FALSE;\nstatic boolean_t g_filter_detached\
    \ = FALSE;\n\nstatic void log_ip_packet(mbuf_t* data, int dir) {\n    char src[32],\
    \ dst[32];\n    struct ip *ip = (struct ip*)mbuf_data(*data);\n\n    if (ip->ip_v\
    \ != 4)\n        return;\n\n    bzero(src, sizeof(src));\n    bzero(dst, sizeof(dst));\n\
    \    inet_ntop(AF_INET, &ip->ip_src, src, sizeof(src));\n    inet_ntop(AF_INET,\
    \ &ip->ip_dst, dst, sizeof(dst));\n\n    switch (ip->ip_p) {\n        case IPPROTO_TCP:\n\
    \            printf(\"TCP: \");\n            g_filter_stats.tcp_packets[dir]++;\n\
    \            break;\n        case IPPROTO_UDP:\n            printf(\"UDP: \");\n\
    \            g_filter_stats.udp_packets[dir]++;\n            break;\n        case\
    \ IPPROTO_ICMP:\n            printf(\"ICMP: \");\n            g_filter_stats.icmp_packets[dir]++;\n\
    \        default:\n            printf(\"OTHER: \");\n            g_filter_stats.other_packets[dir]++;\n\
    \            break;\n    }  \n    printf(\"%s -> %s\\n\", src, dst);\n}\n\nstatic\
    \ errno_t myipfilter_output(void* cookie, mbuf_t* data, ipf_pktopts_t options)\
    \ {\n    if (data)\n        log_ip_packet(data, kMyFiltDirOut);\n    return 0;\n\
    }\n\nstatic errno_t myipfilter_input(void* cookie, mbuf_t* data, int offset, u_int8_t\
    \ protocol) {\n    if (data)\n        log_ip_packet(data, kMyFiltDirIn);\n   \
    \ return 0;\n}\n```"
  raw: '##### Socket Data Input and Output


    The real power of socket filters are in the `sf_data_in` and `sf_data_out` filter
    functions. They allow interception of incoming and outgoing packets. Packets seen
    by a socket filter''s data functions are stripped of (or have not yet had attached)
    protocol header information, such as IP, TCP, or UDP headers. In the case of TCP
    and UDP, the information will represent the actual payload data, which will be
    delivered to or from a socket. If you need data from the protocol headers, you
    may wish to write an IP or interface filter instead. For incoming data packets,
    you can determine the network interface a packet received by calling `mbuf_pkthdr_rcvif()`
    on the `mbuf`. For outgoing packets, this information isn''t available because
    the filter function executes before the packet is routed to a network interface.
    The `sf_data_out` function in AppWall is implemented as follows:


    `static  errno_t`

    `appwall_data_out(void* cookie, socket_t so, const struct sockaddr* to, mbuf_t*
    data,`

    `                 mbuf_t* control, sflt_data_flag_t flags)`

    `{`

    `   struct appwall_entry*       entry;`

    `   errno_t                     result = 0;`


    `    entry = (struct appwall_entry*)cookie;`

    `    if (!entry)`

    `        goto bail;`


    `    lck_mtx_lock(g_mutex);`

    `    entry->desc.bytes_out += mbuf_pkthdr_len(*data);`

    `    entry->desc.packets_out++;`


    `    if (entry->desc.do_block)`

    `        result = EPERM;`

    `    lck_mtx_unlock(g_mutex);`

    `bail:`

    `    return result;`

    `}`


    The function accepts the following six parameters:


    *   The `cookie` containing the pointer to the `appwall_entry` structure.

    *   A `socket_t` reference to socket transmitting data.

    *   A `sockaddr` structure containing the address of the host to which the packet
    is destined. The argument is `NULL` for TCP packets, but set for UDP. The destination
    of a TCP socket can be determined at the time the connection is created (`sf_connect_out`*)*.

    *   A pointer to an `mbuf_t` handle. Note that you cannot use the `mbuf_t` directly,
    as it is merely a handle, you have to use the mbuf KPI to extract data and information
    from it. Also note that the `mbuf` argument is a pointer, so it also functions
    as an output argument. It is possible to assign a different `mbuf_t`, which will
    be transmitted in lieu of the original.

    *   A pointer to an `mbuf_t` handle containing additional control data.

    *   The sixth parameter is used to indicate the type of data, such as normal,
    out-of-band or records data. There are two valid flags: `sock_data_filt_flag_oob`
    and `sock_data_filt_flag_record`. A value of zero indicates normal data.


    In the AppWall case, the data in function is implemented in a similar way to the
    connect function by checking if the calling socket has a cookie attached, which
    in turn means that the packet should either be logged or blocked. We return `EPERM`
    to signal the caller that it should free the packet and halt further processing
    if the packet should be blocked (filtered). If you wish to keep the packet, but
    prevent it from progressing further, you can return `EJUSTRETURN` instead, which
    will prevent the caller from freeing the packet.


    AppWall implements the data input function nearly identically. It will block an
    incoming packet by returning `EPERM`.


    ![images](images/square.jpg) **Tip**  If you wish to learn more about socket filters,
    Apple provides a more comprehensive socket filter example, called: *tcplognke,*
    which can be found on their developer website. It shows how to log connections
    as well as how to swallow (delay) and re-inject packets at a later time. It also
    demonstrates some of the other filter functions we have not covered here and the
    user of the kernel control mechanism.


    #### Internet Protocol Filters


    Internet Protocol (IP) filters allow filtering and injection of incoming and outgoing
    IP packets. The IP filter mechanism works both for IPv4 and for IPv6\. Because
    the IP operates at the network layer, there is no concept of connections or sessions,
    as that is handled by higher layer protocols and mechanisms. At the IP level,
    there are only packets going in and out. As a result, IP filters are significantly
    less complex than socket filters. The programming interface is similar to that
    of socket filters. An IP filter is defined by the structure `ipf_filter`:


    `struct ipf_filter {`

    `    void*           cookie;`

    `    const char*     name;`

    `    ipf_input_func  ipf_input;`

    `    ipf_output_func ipf_output;`

    `    ipf_detach_func ipf_detach;`

    `};`


    The structure consists of the following fields and callbacks:


    *   The `cookie` field is used to assign a pointer containing some data that should
    be passed along to all the filter functions.

    *   The `name` is used for debugging purposes and should be set to something identifying
    your filter/KEXT.

    *   The `ipf_input` and `ipf_output` fields define the actual filter functions,
    which will be called for incoming and outgoing IP packets, respectively.

    *   The `ipf_detach` function will be called when the filter is detached. Unlike
    a socket filter, which detaches when a socket close is terminated, IP filters
    need to be detached/removed explicitly by calling `ipf_remove()`. Note that the
    `ipf_remove()` function may defer removal of the filter if one of the filter functions
    are executing when the function is called. Therefore, you need to wait for the
    `ipf_detach` filter function to complete before a KEXT can be unloaded to avoid
    a kernel panic when the IP stack tries to call `ipf_detach` after it has been
    unloaded from memory.


    A complete example of a minimal IP filter is shown in [Listing 13-4](#Chapter13.html#list_13_4).


    ***Listing 13-4.** MyIPFilter: Implementation of a Simple IP Filter*


    `#include <mach/mach_types.h>`

    `#include <sys/kernel_types.h>`

    `#include <sys/systm.h>`

    `#include <sys/kpi_mbuf.h>`

    `#include <netinet/ip.h>`

    `#include <netinet/kpi_ipfilter.h>`


    `enum {`

    `    kMyFiltDirIn,`

    `    kMyFiltDirOut,`

    `    kMyFiltNumDirs`

    `};`


    `struct myfilter_stats {`

    `    unsigned long udp_packets[kMyFiltNumDirs];`

    `    unsigned long tcp_packets[kMyFiltNumDirs];`

    `    unsigned long icmp_packets[kMyFiltNumDirs];`

    `    unsigned long other_packets[kMyFiltNumDirs];`

    `};`


    `static struct myfilter_stats g_filter_stats;`

    `static ipfilter_t g_filter_ref;`

    `static boolean_t g_filter_registered = FALSE;`

    `static boolean_t g_filter_detached = FALSE;`


    `static void log_ip_packet(mbuf_t* data, int dir) {`

    `    char src[32], dst[32];`

    `    struct ip *ip = (struct ip*)mbuf_data(*data);`


    `    if (ip->ip_v != 4)`

    `        return;`


    `    bzero(src, sizeof(src));`

    `    bzero(dst, sizeof(dst));`

    `    inet_ntop(AF_INET, &ip->ip_src, src, sizeof(src));`

    `    inet_ntop(AF_INET, &ip->ip_dst, dst, sizeof(dst));`


    `    switch (ip->ip_p) {`

    `        case IPPROTO_TCP:`

    `            printf("TCP: ");`

    `            g_filter_stats.tcp_packets[dir]++;`

    `            break;`

    `        case IPPROTO_UDP:`

    `            printf("UDP: ");`

    `            g_filter_stats.udp_packets[dir]++;`

    `            break;`

    `        case IPPROTO_ICMP:`

    `            printf("ICMP: ");`

    `            g_filter_stats.icmp_packets[dir]++;`

    `        default:`

    `            printf("OTHER: ");`

    `            g_filter_stats.other_packets[dir]++;`

    `            break;`

    `    }  `

    `    printf("%s -> %s\n", src, dst);`

    `}`


    `static errno_t myipfilter_output(void* cookie, mbuf_t* data, ipf_pktopts_t options)
    {`

    `    if (data)`

    `        log_ip_packet(data, kMyFiltDirOut);`

    `    return 0;`

    `}`


    `static errno_t myipfilter_input(void* cookie, mbuf_t* data, int offset, u_int8_t
    protocol) {`

    `    if (data)`

    `        log_ip_packet(data, kMyFiltDirIn);`

    `    return 0;`

    `}`'
  trans: "\n# Socket 数据输入与输出\n\nSocket 过滤器的真正强大之处在于 `sf_data_in` 和 `sf_data_out` 这两个过滤函数。它们能够拦截传入和传出的数据包。Socket\
    \ 过滤器的数据函数所看到的数据包，其协议头部信息（如 IP、TCP 或 UDP 头部）已被剥离（或尚未附加）。对于 TCP 和 UDP 而言，这些信息将代表实际的有效载荷数据，这些数据将被投递给\
    \ socket 或从 socket 发出。如果你需要协议头部的数据，你可能希望编写一个 IP 过滤器或接口过滤器。对于传入的数据包，你可以通过对 `mbuf`\
    \ 调用 `mbuf_pkthdr_rcvif()` 来确定接收该数据包的网络接口。对于传出的数据包，此信息不可用，因为过滤函数是在数据包被路由到网络接口之前执行的。AppWall\
    \ 中的 `sf_data_out` 函数实现如下：\n\n```\nstatic  errno_t\nappwall_data_out(void* cookie,\
    \ socket_t so, const struct sockaddr* to, mbuf_t* data,\n                 mbuf_t*\
    \ control, sflt_data_flag_t flags)\n{\n   struct appwall_entry*       entry;\n\
    \   errno_t                     result = 0;\n\n    entry = (struct appwall_entry*)cookie;\n\
    \    if (!entry)\n        goto bail;\n\n    lck_mtx_lock(g_mutex);\n    entry->desc.bytes_out\
    \ += mbuf_pkthdr_len(*data);\n    entry->desc.packets_out++;\n\n    if (entry->desc.do_block)\n\
    \        result = EPERM;\n    lck_mtx_unlock(g_mutex);\nbail:\n    return result;\n\
    }\n```\n\n该函数接受以下六个参数：\n\n*   `cookie`，包含指向 `appwall_entry` 结构体的指针。\n*   一个 `socket_t`\
    \ 引用，指向正在传输数据的 socket。\n*   一个 `sockaddr` 结构体，包含数据包目标主机的地址。对于 TCP 数据包，该参数为 `NULL`，但对于\
    \ UDP 数据包则会被设置。TCP socket 的目标地址可以在连接创建时（`sf_connect_out`）确定。\n*   一个指向 `mbuf_t`\
    \ 句柄的指针。请注意，你不能直接使用 `mbuf_t`，因为它仅仅是一个句柄，你必须使用 mbuf KPI 来从中提取数据和信息。同时也要注意，`mbuf`\
    \ 参数是一个指针，因此它也可以作为输出参数。可以为其分配一个不同的 `mbuf_t`，该 `mbuf_t` 将替代原始数据包被传输。\n*   一个指向\
    \ `mbuf_t` 句柄的指针，包含额外的控制数据。\n*   第六个参数用于指示数据的类型，例如普通数据、带外数据或记录数据。有两个有效的标志位：`sock_data_filt_flag_oob`\
    \ 和 `sock_data_filt_flag_record`。值为零表示普通数据。\n\n在 AppWall 的案例中，数据输入函数的实现方式与连接函数类似，通过检查发起调用的\
    \ socket 是否附加了 cookie，这进而意味着该数据包应被记录或阻止。如果数据包应被阻止（过滤），我们返回 `EPERM` 以通知调用者它应该释放该数据包并停止进一步处理。如果你希望保留数据包，但阻止其继续传递，你可以改为返回\
    \ `EJUSTRETURN`，这将阻止调用者释放数据包。\n\nAppWall 的数据输入函数实现几乎完全相同。它通过返回 `EPERM` 来阻止传入的数据包。\n\
    \n![images](img/square.jpg) **提示**  如果你希望了解更多关于 socket 过滤器的信息，Apple 提供了一个更全面的\
    \ socket 过滤器示例，名为：*tcplognke*，可以在他们的开发者网站上找到。它展示了如何记录连接，以及如何吞掉（延迟）并在稍后重新注入数据包。它还演示了我们在这里未涉及的一些其他过滤函数以及内核控制机制的使用。\n\
    \n## 互联网协议过滤器\n\n互联网协议（IP）过滤器允许过滤和注入传入及传出的 IP 数据包。IP 过滤机制同时适用于 IPv4 和 IPv6。由于\
