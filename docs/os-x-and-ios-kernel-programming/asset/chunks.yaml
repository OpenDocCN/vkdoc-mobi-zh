    The implementation of the `RAMDisk` class should be fairly straightforward. In
    its `start()` method, the transport driver allocates a memory buffer that provides
    the storage for the disk device. This buffer isn''t released until the RAM disk
    driver is unloaded and its `free()` method is called. The `RAMDisk` driver class
    also defines two methods that provide access to the storage buffer, namely `performRead()`
    and `performWrite()`.


    As a general rule, the transport driver should be implemented in a way that matches
    the functionality and protocol of the device that it is controlling. The interface
    for the RAM disk in [Listing 14-2](#Chapter14.html#list_14_2) certainly meets
    this requirement, with its very simple set of methods. A consequence of this freedom
    is that the transport driver needs a nub driver, which implements the `IOBlockStorageDevice`
    interface, to accept method calls from the upper layers of the storage driver
    stack and to pass them on to the transport driver. In our sample RAM disk driver,
    this functionality is provided by a class named `com_osxkernel_driver_RAMDiskStorageDevice`,
    which is derived from the `IOBlockStorageDevice` interface.


    A class that implements the `IOBlockStorageDevice` interface sits between the
    transport driver and the upper-layer drivers; it implements methods that are called
    by the upper-layer drivers, and in turn needs to call methods that are implemented
    in the transport driver. As such, it needs a reference to an instance of the transport
    driver class. This is usually done by making the transport driver the provider
    class of the `IOBlockStorageDevice` nub.


    In our RAM disk driver, the transport driver directly instantiates the `RAMDiskStorageDevice`
    nub and attaches it to itself. Attaching the `RAMDiskStorageDevice` to the transport
    driver sets up the transport driver as the provider class of the `RAMDiskStorageDevice`.
    This process is implemented in a private method named `createBlockStorageDevice()`,
    which the transport driver calls from its `start()` method. The implementation
    of this is given in [Listing 14-4](#Chapter14.html#list_14_4).


