    Scheme That Provides Encryption*


    `Void    com_osxkernel_driver_SampleEncryptionFilter::write (IOService* client,`

    `                                UInt64 byteStart,`

    `                                IOMemoryDescriptor* buffer, IOStorageAttributes*
    attributes,`

    `                                IOStorageCompletion* completion)`

    `{`

    `        IOMemoryDescriptor*             newDesc;`


    `        // Allocate a buffer to hold the encrypted data and perform the encryption`

    `        newDesc = encryptBuffer(buffer);`

    `        if (newDesc == NULL)`

    `        {`

    `                // Return an error if a destination buffer could not be allocated.`

    `                complete(completion, kIOReturnNoMemory);`

    `                return;`

    `        }`


    `        // Perform a write of the encrypted data to the encrypted IOMedia object.`

    `        m_encryptedMedia->write(client, byteStart, newDesc, attributes, completion);`


    `        // Release our reference to the encrypted IOMemoryDescriptor`

    `        newDesc->release();`

    `}`'
  trans: "\n```c\n        // 调用原始调用方的完成函数。\n        complete(&context->completion,\
    \ status, actualByteCount);\n        context->buffer->release();\n        IOFree(context,\
    \ sizeof(ReadCompletionParams));\n    }\n```\n\n对应列表 14-15 中的编号行，以下是列表中所执行步骤的概述：\n\
    \n1.  由于读取操作是异步执行的，因此在读取完成回调中所需的任何变量或状态都必须保存到临时结构中。我们使用`IOMalloc()`函数在内存中分配一个结构，以保存需要传递给完成回调的所有内容。\n\
    2.  初始化已分配的上下文结构。需要保存的一个参数是调用方提供的`IOStorageCompletion`结构；该结构包含调用方希望在读取完成时收到通知的回调函数。我们还保存了一个对`IOMemoryDescriptor`的引用，磁盘中的数据会被读取到此描述符中。由于我们将在回调中引用此对象，因此我们对其执行保留操作，以防止其在回调触发之前被释放。\n\
    3.  我们设置一个`IOStorageCompletion`结构，以传递我们自己的回调函数，从而在异步读取完成时收到通知。\n4.  我们从加密的`IOMedia`对象执行读取操作。\n\
    5.  当读取完成时，将调用我们指定的回调函数（`readCompleted`）。如果读取成功完成，我们将解密从加密的`IOMedia`对象读回的数据。\n\
    6.  我们调用调用方提供的`IOStorageCompletion`回调，该回调通知调用方其缓冲区中包含所请求的解密数据。\n7.  我们释放之前对`IOMemoryDescriptor`的引用，并释放在步骤\
    \ 1 中分配的结构。\n\n加密过滤器方案的写入操作实现相当直接，因为它可以在将结果数据写入加密的`IOMedia`对象之前执行加密。因此，即使写入操作是异步执行的，也无需替换调用方提供的完成回调（这与读取操作不同）。\n\
    \n我们并非在原地加密数据，而是分配一个新的`IOMemoryDescriptor`来保存加密后的数据。这使得我们可以保持调用方缓冲区不变，这一点很重要，因为写入操作不应更改源缓冲区的内容。尽管写入操作是异步执行的，但在写入期间，执行该操作的存储栈中的驱动程序会保留`IOMemoryDescriptor`缓冲区。这使我们能够在向加密的`IOMedia`对象发出写入后立即释放我们对该对象的引用。\n\
    \n加密过滤器方案的`write()`方法实现如列表 14-16 所示。\n\n***列表 14-16.** 为提供加密功能的示例过滤器方案实现的 `write()`\
    \ 方法*\n\n```c\nvoid    com_osxkernel_driver_SampleEncryptionFilter::write (IOService*\
    \ client,\n                                UInt64 byteStart,\n               \
    \                 IOMemoryDescriptor* buffer, IOStorageAttributes* attributes,\n\
    \                                IOStorageCompletion* completion)\n{\n       \
    \ IOMemoryDescriptor*             newDesc;\n\n        // 分配一个缓冲区来保存加密数据并执行加密\n\
    \        newDesc = encryptBuffer(buffer);\n        if (newDesc == NULL)\n    \
    \    {\n                // 如果无法分配目标缓冲区，则返回错误。\n                complete(completion,\
    \ kIOReturnNoMemory);\n                return;\n        }\n\n        // 将加密数据写入加密的\
    \ IOMedia 对象。\n        m_encryptedMedia->write(client, byteStart, newDesc, attributes,\
    \ completion);\n\n        // 释放对加密 IOMemoryDescriptor 的引用\n        newDesc->release();\n\
    }\n```\n"
- fmt: '# Creating a Custom GUID Partition Table


    The encryption filter scheme that we developed in the previous section will load
    only against an `IOMedia` object whose “`Content Hint`” property is a custom value
    that we have defined for the purposes of the sample filter scheme. To test out
    the driver, we need to create a GUID partition table that contains a partition
    entry with our custom GUID type.


    This can be performed through various command line tools that are included with
    Mac OS X. For this tutorial we will create a volume containing a GUID partition
    table that we can use to test the encryption filter driver. The storage device
    for the encrypted volume will be provided by a disk image, which is a regular
    file that behaves as a virtual disk, and contains a file system (and possibly
    a partition scheme) that can be mounted as a volume on the Mac OS X desktop. Disk
    images provide a convenient way to test filter scheme and partition scheme drivers,
    since they can be easily created without having to format physical media.


    This section provides a tutorial of some of the command line tools that can be
    used while developing drivers in the storage stack. In this section, we will create
    a disk image, write a GUID partition table that contains a single partition of
    our specified partition type, and write an HFS file system to our encrypted volume.
    All of these tasks will be performed through command line tools.


    To begin, open the Terminal application. The first step is to create a blank disk
    image that will provide the storage for our media, and will play the role of a
    disk. The `hdiutil` command line utility is a tool for creating and manipulating
    disk image files. We can create a 25MiB blank disk image with the following command:


    ```

    hdiutil create -megabytes 25 -layout NONE EncryptedImage.dmg

    ```


    This will create a file named “`EncryptedImage.dmg`” in the current working directory,
    consisting of a 25MiB disk image. The option “`-layout NONE`” specifies that we
    do not want a partition table created on the disk image. Since the resulting disk
    image contains no partition map and no file system, it cannot be mounted. However,
    we can interact with the disk image by using the following command:


    ```

    hdiutil attach -nomount EncryptedImage.dmg

    ```


    With our understanding of how storage devices are implemented in the Mac OS X
    kernel, we are in a good position to examine what this command is doing behind
    the scenes. The “`hdiutil attach`” command will load the kernel driver supplied
    by Apple that manages disk images; this will be derived from the same `IOBlockStorageDevice`
    superclass that we used to implement the RAM disk. A storage driver stack will
    be constructed, consisting of a single `IOMedia` object that represents the entire
    disk image''s contents. The `IOMedia` object will have a corresponding `IOMediaBSDClient`
    object, which will publish the device interfaces for the disk image in the `/dev`
    directory. This results in the creation of a block device, such as `/dev/disk1`
    and a character device, such as `/dev/rdisk1`, through which the disk image can
    be accessed. The path to the block device that was created as a result of attaching
    the disk image is printed to the terminal output.


    We can now read and write to the disk image through its block device interface,
    so the next step is to create a GUID partition table on the disk. The `gpt` command
    is a command line tool supplied by Apple with Mac OS X for creating and manipulating
    a disk''s GUID partition table. We can create a GUID partition table on a blank
    disk with the following command. Make sure to replace the path `/dev/diskN` with
    the path to the device interface that corresponds to the attached disk image on
    your system.


    ```

    gpt create /dev/diskN

    ```


    This writes a GUID partition table that contains no partitions to the disk. We
    wish to create a single partition on the disk, so the next command will insert
    an entry into the disk''s GUID partition table:


    ```

    gpt add -t 8D7FD0BB-39A8-43C0-9432-F4E1A269F070 /dev/diskN

    ```


    Although the “`gpt add`” command allows the partition size and initial block offset
    to be specified, if no partition range is specified, the utility will default
    to creating a partition that begins on the first unused range of disk blocks that
    it finds on the disk. This is perfect for our purposes, since it creates a single
    partition that fills the entire disk. The “`-t`” option can be used to specify
    the GUID type of the partition entry that is created. This allows us to create
    a partition entry that has our custom GUID type that we defined to identify an
    encrypted HFS volume. As a result of adding a partition to the disk, a new device
    interface is created that represents the partition. The path to the partition''s
    block device interface is printed to the terminal output, and will take the form
    `/dev/diskNs1`.


    ![images](images/square.jpg) **Note** BSD uses the term “slice” to refer to disk
    partitions. Therefore, `disk2s1` refers to the first partition (slice) of the
    block device “`disk2`.” The slice number comes from `IOMedia` object''s location
    value. In our partition scheme driver and encryption filter scheme, we called
    the method `setLocation()` for each `IOMedia` object that we created. The string
    that we provided is used to generate the name of the device interfaces.


    At the kernel level, creating a partition table on the disk resulted in the Apple-supplied
    `IOGUIDPartitionScheme` driver loading. This driver, in response to us having
    added a partition entry, will instantiate an `IOMedia` object to represent the
    partition. The partition''s `IOMedia` object will have a “`Content Hint`” property
    that is equal to the custom GUID type that we gave the partition. At this point,
    we are ready to load our encryption filter driver. As you will recall, our filter
    scheme driver will load against any `IOMedia` object that has our custom content
    hint GUID. If we had not created a partition entry with the specified content
    type, our encryption scheme driver would not find a suitable `IOMedia` object
    to match against, and we would be unable to test our driver.


    Our encryption filter scheme driver will create a new `IOMedia` object when it
    loads. This results in another block device being created, which will have an
    interface name similar to “`diskNs1s1`.” This interface represents the unencrypted
    content of the disk partition. In the case of our sample encryption filter driver,
    the `IOMedia` object that it created was given a “`Content Hint`” property of
    `Apple_HFS`, which informs Mac OS X that the media contains the default HFS file
    system, and causes the HFS file system to be loaded for the unencrypted volume.
    However, at this stage, the disk partition is empty and doesn''t contain any file
    system. We can create an HFS file system on the volume with the following command:


    ```

    newfs_hfs -v MyVolumeName /dev/diskNs1s1

    ```


    The option “`-v`” allows a volume name to be specified. In the preceding example,
    we are naming the HFS volume “`MyVolumeName`”. Having written an HFS file system
    to the (unencrypted) volume, we can now mount the file system on the Mac OS X
    desktop. This can be done with the following command:


    ```

    hdiutil mountvol /dev/diskNs1s1

    ```


    This will result in a new volume appearing on the desktop. Because of the presence
    of our encryption filter scheme in the storage stack, any files written to the
    disk will be modified by our XOR encryption before the data is written to the
    disk image file. The disk image file itself is just a regular file, so the contents
    of each disk block can be examined by opening the `.dmg` file in any hex editor.
    This makes disk images a very useful means for debugging or verifying that a partition
    scheme driver, or a filter scheme driver, is operating correctly.'
