  raw: 'In our sample filter scheme driver''s `start()` method, we need to create
    a new `IOMedia` object that represents the filtered disk contents; this is the
    `IOMedia` object through which we expose the unencrypted data to the rest of the
    system (such as the file system). As with a partition scheme driver, it''s important
    that the filter driver correctly sets the `contentHint` parameter of any child
    `IOMedia` object that it creates, since this is the means by which the system
    is able to identify which file system (or even another filter scheme driver) to
    load against the `IOMedia` volume. In the case of our sample encryption filter,
    we have made the arbitrary design choice that it will encrypt an HFS file system,
    so the `IOMedia` child object that is published by the filter scheme will be created
    with a `contentHint` value of “`Apple_HFS`.”


    The implementation of the `start()` method for our sample encryption filter scheme
    is shown in [Listing 14-14](#Chapter14.html#list_14_14). Our sample filter scheme
    does not provide an implementation of the `init()` or `probe() methods`, because
    the implementation provided by the superclass is sufficient.


    ***Listing 14-14.** An Implementation of the `start()` Method for a Sample Filter
    Scheme that Provides Encryption*


    `#include <IOKit/storage/IOFilterScheme.h>`


    `// Define the superclass.`

    `#define super IOFilterScheme`


    `OSDefineMetaClassAndStructors(com_osxkernel_driver_SampleEncryptionFilter, IOFilterScheme)`


    `bool com_osxkernel_driver_SampleEncryptionFilter::start (IOService *provider)`

    `{`

    `        if (super::start(provider) == false)`

    `                return false;`


    `        // Save a reference to our provider class, and verify that it is an IOMedia
    object.`

    `        m_encryptedMedia = OSDynamicCast(IOMedia, provider);`

    `        if (m_encryptedMedia == NULL)`

    `                return false;`


    `        // Create a child IOMedia object to represent the unencrypted data.`

    `        m_childMedia = instantiateMediaObject();`

    `        if (m_childMedia == NULL)`

    `                return false;`


    `        // Attach the unencrypted IOMedia object to the storage driver stack.`

    `        if (m_childMedia->attach(this) == false)`

    `                return false;`

    `        m_childMedia->registerService();`


    `        return true;`

    `}`


    `IOMedia* com_osxkernel_driver_SampleEncryptionFilter::instantiateMediaObject
    ()`

    `{`

    `        IOMedia*        newMedia;`


    `        // Allocate a new IOMedia object.`

    `        newMedia = new IOMedia;`

    `        if ( newMedia )`

    `        {`

    `                // Initialize the child IOMedia object.`

    `                // Nearly all of its parameters can be obtained from the provider
    class.`

    `                if ( newMedia->init(0,                          // base`

    `                                m_encryptedMedia->getSize(),`

    `                                m_encryptedMedia->getPreferredBlockSize(),`

    `                                m_encryptedMedia->getAttributes(),`

    `                                false,                          // isWhole`

    `                                m_encryptedMedia->isWritable(),`

    `                                "Apple_HFS"))                   // contentHint`

    `                {`

    `                        // Set a location value (the partition number) for this
    media object.`

    `                        newMedia->setLocation("1");`

    `                }`

    `                else`

    `                {`

    `                        newMedia->release();`

    `                        newMedia = NULL;`

    `                }`

    `        }`


    `        return newMedia;`

    `}`


    The method named `instantiateMediaObject()` is a custom method defined by the
    `SampleEncryptionFilter` class and is responsible for creating a child `IOMedia`
    object to represent the unencrypted disk contents. Many of the properties of the
    child `IOMedia` object can come straight from the filter driver''s encrypted `IOMedia`
    provider class. For a driver that implements block-level encryption, there is
    no need to modify properties such as the size of the volume and the size of a
    disk block for the child `IOMedia` object. In general, there is nothing to prevent
    a filter scheme driver from creating an `IOMedia` device of a different size or
    block size to that of its provider class, as may be required by the filter scheme
    of a RAID driver.


    For our sample encryption driver, we need to intercept all read and write operations
    that are performed on the unencrypted child `IOMedia` object. Because our filter
    scheme sits between the unencrypted `IOMedia` object (the child object that we
    created) and the encrypted `IOMedia` object (our provider class), all read and
    write operations made on the child `IOMedia` object pass through our filter driver,
    so intercepting these operations involves nothing more than overriding the superclass
    implementation of the `read()` and `write()` methods.


    In the case of a read operation, our encryption filter driver needs to pass the
    read request on to the encrypted `IOMedia` object and decrypt the data that is
    returned. This is complicated by the fact that the read is performed asynchronously,
    so the filter driver needs to provide completion callback to be notified when
    the read has completed. At this point, the data that was read back from the encrypted
    volume is decrypted, and the original read completion callback, as provided by
    the client that initiated the read, is called. The implementation of this is given
    in [Listing 14-15](#Chapter14.html#list_14_15).


    ***Listing 14-15.** An Implementation of the `read()` Method for a Sample Filter
    Scheme That Provides Encryption*


    `void    com_osxkernel_driver_SampleEncryptionFilter::read (IOService* client,`

    `                                UInt64 byteStart,`

    `                                IOMemoryDescriptor* buffer, IOStorageAttributes*
    attributes,`

    `                                IOStorageCompletion* completion)`

    `{`

    `        ReadCompletionParams*   context;`

    `        IOStorageCompletion     newCompletion;`


    `        // Allocate a structure to hold state while the read`

    `        // is being performed asynchronously.`

    `1       context = (ReadCompletionParams*)IOMalloc(sizeof(ReadCompletionParams));`

    `        if (context == NULL)`

    `        {`

    `                complete(completion, kIOReturnNoMemory);`

    `                return;`

    `        }`


    `2       context->completion = *completion;`

    `        context->buffer = buffer;`

    `        context->buffer->retain();`


    `        // Setup a callback function so that we will be notified`

    `        // when the encrypted data has been read from disk.`

    `3       newCompletion.target = this;`

    `        newCompletion.action = readCompleted;`

    `        newCompletion.parameter = context;`


    `        // Perform a read of the encrypted data from disk.`

    `4       m_encryptedMedia->read(client, byteStart, buffer, attributes, &newCompletion);`

    `}`


    `void    com_osxkernel_driver_SampleEncryptionFilter::readCompleted (void* target,`

    `                                                                    void* parameter,`

    `                                                      IOReturn status, UInt64
    actualByteCount)`

    `{`

    `        ReadCompletionParams*   context = (ReadCompletionParams*)parameter;`


    `        // Decrypt the data read from disk.`

    `5       if (status == kIOReturnSuccess)`

    `                status = decryptBuffer(context->buffer, actualByteCount);`


    `        // If  either the read from disk or the decryption operation failed,`

    `        // set the actualByteCount value to 0.`

    `        if (status != kIOReturnSuccess)`

    `                actualByteCount = 0;`'
