    Interface filters can be attached to a network interface using the `iflt_attach()`
    function. You can register a single `iff_filter` against multiple interfaces.
    A network interface is represented by the opaque type `ifnet_t`, which can be
    manipulated using the interface KPI (`kpi_interface.h`*)*. In the preceding example,
    we use the interface KPI function `ifnet_find_by_name()` to obtain a reference
    to the network interface with the BSD name “*en1*,” which, on a MacBook, corresponds
    to the Wi-Fi interface.


    The `iff_input` filter function is called when an incoming packet is received
    by the interface. The callback takes five arguments:


    *   The `cookie` argument contains the pointer assigned to the `iff_cookie` field
    when the filter was registered.

    *   The `ifnet_t` argument is a reference to the network interface that received
    the packet. This is especially useful in case the same filter function handles
    filters attached to more than one network interface.

    *   The next parameter is the `protocol` family the incoming packet belongs to.
    Unless zero is specified for the `iff_protocol` field, this will always be the
    family you specified.

    *   The `mbuf_t` represents the buffer containing the packet data.

    *   The last argument, `frame_ptr`, is a pointer to the data-link frame header
    of the interface. The size and structure of the frame header varies depending
    on the network interface. For an Ethernet interface, the frame header consists
    of a source and destination MAC address as well as a 16-bit “ethertype” field,
    which determines the encapsulated protocol. The field will be 0x0800 for an Ethernet
    frame containing an IP packet. You can determine the length of the frame header
    for an interface by calling the `ifnet_hdrlen(ifnet_t)` function.


    The output filter function `iff_output` is similar to the input function, but
    does not provide the frame header as a separate argument; rather the `mbuf_t`
    contains the entire frame including the data-link header, instead of pointing
    to the data after the data-link header. If we wish to examine the IP header of
    an incoming packet in an interface filter''s output function, we need to first
    parse the data-link header to find the offset of the IP header. An example of
    this is shown here:


    `static errno_t myif_filter_output(void* cookie, ifnet_t interface, protocol_family_t
    protocol,`

    `                                  mbuf_t* data)`

    `{`

    `    char                  src[64], dst[64];`

    `    unsigned char*        pktbuf = mbuf_data(*data);`

    `    struct ether_header*  eth = (struct ether_header *)pktbuf;`


    `    if (ifnet_hdrlen(interface) != ETHER_HDR_LEN)`

    `        return 0;`


    `    if (ntohs(eth->ether_type) == ETHERTYPE_IP)`

    `    {`

    `        struct ip* iphdr = (struct ip*)(pktbuf + ETHER_HDR_LEN);`

    `        inet_ntop(AF_INET, &iphdr->ip_src, src, sizeof(src));`

    `        inet_ntop(AF_INET, &iphdr->ip_dst, dst, sizeof(dst));`

    `        printf("outgoing packet: %lu bytes ip_src: %s ip_dst: %s\n",`

    `                mbuf_pkthdr_len(*data), src, dst);`

    `    }`

    `    else`

    `        printf("outgoing packet: %lu bytes\n", mbuf_pkthdr_len(*data));`

    `    return 0;`

    `}`


    The interface filter KPI does not provide functions for injecting incoming and
    outgoing packets. This is provided by the interface KPI instead. Outgoing packets
    can be injected using the function `ifnet_output_raw()` or using the function
    `ifnet_input()` to inject an inbound packet. For an example of how `inet_output_raw()`
    can be used, refer to the source code of the sample driver MyEthernetDriver discussed
    later in this chapter.


    ### Debugging and Testing Network Extensions


    Apart from the general techniques discussed in [Chapter 16](#Chapter16.html#ch16),
    “Debugging and Profiling,” Mac OS X comes with some tools that allow debugging
    of network issues, the most notable of which are perhaps the command line tools
    `tcpdump` and `netcat`. The former utilizes the libpcap library, which again is
    built on top of the Berkeley Packet Filter (BPF) infrastructure, which is built
    into the kernel network stack. BPF can plug into each network interface and install
    hooks, which allow incoming and outgoing packets to be diverted to a character
    device file (`/dev/bpfX`*)* and can thereby be analyzed by tools such as `tcpdump`.
    The `tcpdump` utility allows you to view the packet flow live, or to capture it
    to a file for later analysis. A wide range of third party tools can work with
    the packet traces captured from `tcpdump`. If possible, the `tcpdump` utility
    will put the monitored interface into promiscuous mode. Promiscuous mode is a
    firmware feature of most network devices that tells it to forward packets, even
    if they are not addressed to its own hardware address. Newer versions of Mac OS
