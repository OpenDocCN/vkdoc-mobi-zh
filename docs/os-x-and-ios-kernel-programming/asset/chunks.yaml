- fmt: "### Property Methods\n\n`IOUSBInterfaceInterface`类包含用于获取和设置与接口及USB设备相关属性的方法。尽管其中一些方法可能看似与之前描述的`IOUSBDeviceInterface`类提供的功能重复，但这是有意的，因为它允许与USB接口类（而非USB设备类）匹配的应用程序仍然能够访问通用的设备功能。\n\
    \n以下方法虽然位于`IOUSBInterfaceInterface`类中，但与USB设备相关：\n\n*   `GetDeviceVendor`：返回USB设备的厂商ID（Vendor\
    \ ID）。\n*   `GetDeviceProduct`：返回USB设备的产品ID（Product ID）。\n*   `GetDeviceReleaseNumber`：返回USB设备的设备发行号。\n\
    *   `GetLocationID`：返回一个32位值，该值基于设备所连接的USB集线器和端口，在系统上唯一标识一个USB设备。\n*   `GetDevice`：返回一个`io_service_t`，该类型对应于内核中的`IOUSBDevice`对象。从此对象出发，应用程序可以实例化一个代表该USB设备的`IOUSBDeviceInterface`。\n\
    *   `GetBusFrameNumber`：返回设备所连接的USB总线的当前帧号。\n*   `GetBusFrameNumberWithTime`：返回设备所连接的USB总线的当前帧号，并同时返回该帧起始时刻对应的系统主机时间。\n\
    *   `GetBusMicroFrameNumber`：返回设备所连接的USB总线的当前微帧号。\n*   `GetFrameListTime`：其作用类似于`IOUSBDeviceInterface`的`GetDeviceSpeed`方法，不过设备的速率是以其当前速度下每个USB帧所对应的微秒数来返回的。全速设备将返回`kUSBFullSpeedMicrosecondsInFrame`（1000微秒），而高速设备将返回`kUSBHighSpeedMicrosecondsInFrame`（125微秒）。\n\
    \n以下方法与获取和设置接口的属性有关：\n\n*   `GetInterfaceClass`、`GetInterfaceSubClass`和`GetInterfaceProtocol`：从USB接口描述符中返回接口类（`bInterfaceClass`）、子类（`bInterfaceSubClass`）和协议（`bInterfaceProtocol`）。这三个值共同基于USB规范中定义的值来定义接口的功能。\n\
    *   `GetConfigurationValue`：标识包含此接口的设备配置。返回的值是活动配置描述中的`bConfigurationValue`。\n\
    *   `GetInterfaceNumber`：返回此接口在活动配置中的基于零的索引（`bInterfaceNumber`）。\n*   `GetAlternateSetting`：返回此接口的当前活跃备用设置（`bAlternateSetting`）。\n\
    *   `SetAlternateInterface`：设置此接口的活跃备用设置。通过传递所需接口描述的`bAlternateSetting`值来指定备用设置。\n\
    *   `USBInterfaceGetStringIndex`：返回接口描述的字符串索引，该索引来自接口描述符中的`iInterface`字段。\n\n\
    ### Endpoint Data Transfer Methods\n\n一个USB接口可以包含一个或多个端点，数据可以从这些端点读取或写入。与内核USB驱动程序不同，`IOUSBLib`不包含用于表示到端点的管道的用户空间对象；相反，所有数据传输都通过`IOUSBInterfaceInterface`类进行。应用程序可以使用以下方法确定接口上存在的端点：\n\
    \n*   `GetNumEndpoints`：返回接口提供的端点数量。\n*   `GetEndpointProperties`：返回指定端点的类型（`bDescriptorType`）、最大数据包大小（`wMaxPacketSize`）和轮询间隔（`bInterval`）。通过三个值来指定端点——它所在的备用接口设置、其端点号以及端点的传输方向。\n\
    *   `GetPipeProperties`：此方法允许应用程序指定一个从0到`GetNumEndpoints`返回值（含）之间的端点索引，这与`GetEndpointProperties`不同，后者要求调用者知道其感兴趣端点的端点号和方向。索引0处的端点对应于默认控制端点。此方法返回的信息几乎包含端点描述符的所有数据，包括端点的编号、方向、类型、最大数据包大小以及轮询间隔（如果是中断或同步端点）。\n\
    *   `GetPipeStatus`：可用于确定指定管道是否处于停滞状态。如果管道停滞，此方法将返回`kIOUSBPipeStalled`，否则返回`kIOReturnSuccess`。如果调用者指定了无效的管道索引，它将返回`kIOUSBUnknownPipeErr`。\n\
    *   `AbortPipe`：中止指定管道索引上的未完成事务。任何被中止的操作都将完成，并返回结果`kIOReturnAborted`。\n*   `ResetPipe`和`ClearPipeStall`：尽管这两种方法相同，但更推荐使用`ClearPipeStall`。应用程序调用其中任一方法以重置已停滞的端点。端点的暂停位被清除，其数据翻转位也被重置。\n\
    *   `ClearPipeStallBothEnds`：等同于`ClearPipeStall`，区别在于除了清除主机端的暂停位并重置数据翻转外，设备端的暂停位也被清除，并且设备的数据翻转也被重置。这确保了由于主机和设备都已重置，下次向端点传输数据或从端点接收数据时不会丢失数据。\n\
    \n为了向端点传输数据或从端点接收数据，应用程序必须确定与要访问的端点相对应的管道索引。虽然端点地址是恒定的（因为它来自设备提供的描述符），但管道索引是由I/O\
    \ Kit分配的。因此，确定给定端点管道索引的唯一方法是枚举USB接口中包含的每个管道。示例如下所示（参见[Listing 15-7](#Chapter15.html#list_15_7)）。\n\
    \n***Listing 15-7.** 查找批量输出端点管道引用的函数*\n\n```\nIOReturn        MyFindBulkOutEndpoint\
    \ (IOUSBInterfaceInterface300** usbInterface,\n                              \
    \         UInt8* pipeRef)\n{\n        UInt8           numEndpoints;\n        UInt8\
    \           i;\n        IOReturn        error;\n\n        // Determine the number\
    \ of endpoints in this interface.\n        error = (*usbInterface)->GetNumEndpoints(usbInterface,\
    \ &numEndpoints);\n        if (error != kIOReturnSuccess)\n                return\
    \ error;\n\n        // Iterate over all endpoints in the interface (skipping endpoint\
    \ 0, the control\n        // endpoint).\n        for (i = 1; i <= numEndpoints;\
    \ i++)\n        {\n                UInt8           direction, number, transferType;\n\
    \                UInt16          maxPacketSize;\n                UInt8       \
    \    interval;\n```"
  raw: '#### Property Methods


    The `IOUSBInterfaceInterface` class contains methods to both get and set properties
    relating to the interface and the USB device. Although some of these methods may
    seem to duplicate functionality provided by the `IOUSBDeviceInterface` class that
    was previously described, this is intentional, as it allows an application that
    has matched against the USB interface class and not the USB device class to still
    have access to common device functionality.


    The following methods, although in the `IOUSBInterfaceInterface` class, relate
    to the USB device:


    *   `GetDeviceVendor`: Returns the USB Vendor ID of the USB device.

    *   `GetDeviceProduct`: Returns the USB Product ID of the USB device.

    *   `GetDeviceReleaseNumber`: Returns the device release number of the USB device.

    *   `GetLocationID`: Returns a 32-bit value that uniquely identifies a USB device
    on the system, based on the USB hub and port the device is connected to.

    *   `GetDevice`: Returns an `io_service_t` that corresponds to the kernel `IOUSBDevice`
    object. From this object, an application can instantiate an `IOUSBDeviceInterface`
    that represents the USB device.

    *   `GetBusFrameNumber`: Returns the current frame number of the USB bus on which
    the device is connected.

    *   `GetBusFrameNumberWithTime`: Returns the current frame number of the USB bus
    to which the device is connected and also returns the system host time that corresponds
    to the start of that frame.

    *   `GetBusMicroFrameNumber`: Returns the current microframe number of the USB
    bus to which the device is connected.

    *   `GetFrameListTime`: Performs a similar role to the `IOUSBDeviceInterface`
    method `GetDeviceSpeed`, although the device''s speed is returned as the number
    of microseconds per USB frame at its current speed. A full speed device will return
    `kUSBFullSpeedMicrosecondsInFrame` (1000 microseconds), whereas a high speed device
    will return `kUSBHighSpeedMicrosecondsInFrame` (125 microseconds).


    The following methods relate to getting and setting properties of the interface:


    *   `GetInterfaceClass`, `GetInterfaceSubClass,` and `GetInterfaceProtocol`: Return
    the interface class (`bInterfaceClass`), subclass (`bInterfaceSubClass`), and
    protocol (`bInterfaceProtocol`) from the USB interface descriptor. Together, these
    three values define the function of the interface based on values defined in the
    USB specification.

    *   `GetConfigurationValue`: Identifies the device configuration that contains
    this interface. The returned value is the `bConfigurationValue` from the active
    configuration''s description.

    *   `GetInterfaceNumber`: Returns the zero-based index of this interface within
    the active configuration (`bInterfaceNumber`).

    *   `GetAlternateSetting`: Returns the active alternate setting of this interface
    (`bAlternateSetting`).

    *   `SetAlternateInterface`: Sets the active alternate setting for this interface.
    The alternate setting is specified by passing the `bAlternateSetting` value of
    the desired interface description.

    *   `USBInterfaceGetStringIndex`: Returns the index of the string for the interface
    description, which comes from the `iInterface` field from the interface descriptor.


    #### Endpoint Data Transfer Methods


    A USB interface can contain one or more endpoints from which data can be read
    from or written to. Unlike a kernel USB driver, the IOUSBLib contains no user-space
    object to represent the pipe to an endpoint; instead, all data transfers are made
    through the `IOUSBInterfaceInterface` class. An application can determine the
    endpoints present on an interface using the following methods:


    *   `GetNumEndpoints`: Returns the number of endpoints provided by the interface.

    *   `GetEndpointProperties`: Returns the type (`bDescriptorType`), maximum packet
    size (`wMaxPacketSize`), and polling interval (`bInterval`) of a specified endpoint.
    The endpoint is specified by three values—the alternate interface setting it is
    on, its endpoint number, and the transfer direction of the endpoint.

    *   `GetPipeProperties`: This method allows an application to specify the index
    of an endpoint from 0 up to and including the value returned by `GetNumEndpoints`,
    unlike `GetEndpointProperties`, which requires the caller to know the endpoint
    number and direction of an endpoint it is interested in. The endpoint at index
    0 corresponds to the default control endpoint. The information returned by this
    method consists of almost all the data for an endpoint descriptor, including the
    endpoint''s number, direction, type, maximum packet size, and polling interval
    (if an interrupt or isochronous endpoint).

    *   `GetPipeStatus`: Can be used to determine whether a specified pipe is stalled.
    This method will return `kIOUSBPipeStalled` if the pipe is stalled and `kIOReturnSuccess`
    otherwise. It will return `kIOUSBUnknownPipeErr` if the caller has specified an
    invalid pipe index.

    *   `AbortPipe`: Aborts an outstanding transaction from a specified pipe index.
    Any operations that are aborted will complete, with the result `kIOReturnAborted`.

    *   `ResetPipe` and `ClearPipeStall`: Although these two methods are identical,
    the use of `ClearPipeStall` is preferred. Either method is called by an application
    to reset an endpoint that has stalled. The endpoint''s halt bit is cleared and
    its data toggle bit is reset.

    *   `ClearPipeStallBothEnds`: Is equivalent to `ClearPipeStall`, with the distinction
    that in addition to clearing the halt bit and resetting the data toggle on the
    host side, the halt bit is cleared on the device and the device''s data toggle
    is reset. This ensures that, since both the host and device have been reset, there
    is no loss of data when data is next transferred to or from the endpoint.


    To transfer data to or from an endpoint, an application must determine the pipe
    index that corresponds to the endpoint it wants to access. Although an endpoint
    address is constant, since it comes from a descriptor supplied by the device,
    the pipe index is assigned by the I/O Kit. Therefore, the only way to determine
    a pipe index for a given endpoint is to enumerate over each pipe contained within
    a USB interface. An example of this is given in [Listing 15-7](#Chapter15.html#list_15_7).


    ***Listing 15-7.** A Function to Find a Pipe Reference for a Bulk Output Endpoint*


    `IOReturn        MyFindBulkOutEndpoint (IOUSBInterfaceInterface300** usbInterface,`

    `                                       UInt8* pipeRef)`

    `{`

    `        UInt8           numEndpoints;`

    `        UInt8           i;`

    `        IOReturn        error;`


    `        // Determine the number of endpoints in this interface.`

    `        error = (*usbInterface)->GetNumEndpoints(usbInterface, &numEndpoints);`

    `        if (error != kIOReturnSuccess)`

    `                return error;`


    `        // Iterate over all endpoints in the interface (skipping endpoint 0,
    the control`

    `        // endpoint).`

    `        for (i = 1; i <= numEndpoints; i++)`

    `        {`

    `                UInt8           direction, number, transferType;`

    `                UInt16          maxPacketSize;`

    `                UInt8           interval;`'
