  raw: '#### Building the Package


    Once you have finished adding and configuring all the parts you want included
    in the distribution, you can build it by pressing the “Build” or “Build and Run”
    on the toolbar. The latter will open the package in `Installer.app` once the building
    finishes. During the build phase, the package will be validated and checked; if
    there are errors or warnings, you can correct them and rebuild the package. The
    end result will look something like [Figure 18-7](#Chapter18.html#fig_18_7).


    ![images](images/1807.jpg)


    ***Figure 18-7.** Package as presented when launched with Installer.app*


    The resulting package will be written to the filename `<Title>.pkg`. The package
    is compressed and not a bundle, so the contents cannot readily be inspected in
    Finder. When you save a PackageMaker project, it will be saved as a bundle named
    `<Title>.pmdoc`. The project bundle contains XML files that define the project.
    You can edit these with a text editor or automatically replace or update contents
    with a script during your product’s build process. If you wish to build the package
    from the command line, you can do the following:


    * * *


    `$` **`/Developer/Applications/Utilities/PackageMaker.app/Contents/MacOS/PackageMaker
    --doc`**

    **`HelloWorld.pmdoc --version 2.0 --title ''HelloWorld''`**


    * * *


    The preceding command builds `<Title>.pkg` with a version number of 2.0.


    #### Uninstalling Packages


    Unfortunately, no mechanism exists for automatically uninstalling packages created
    with PackageMaker. To uninstall a package manually, you would need to identify
    the files installed by the package and delete them. You would also have to stop
    and remove any Launch Agents or Daemons installed by the package. A better option
    would be to provide your users with a script or program that performs the uninstall
    for them. PackageMaker are able to handle upgrades, however.


    ### Summary


    In this chapter, we have looked at the following:


    *   How the system loads I/O Kit kernel extensions automatically and how to manually
    load other types of KEXTs (such as Network Kernel Extensions) that are not loaded
    automatically. The latter is usually achieved using a Launch Daemon.

    *   Versioning the interface between a KEXT and user space is important in order
    to avoid breaking older/newer applications that run against it. One strategy to
    deal with this is to include a version number in a shared header file.

    *   Quality assurance and testing is an important part of the development cycle
    and is the last point of defense before software is distributed to a customer.
    It is important to properly test all aspects and usage patterns of the software
    on all supported platforms.

    *   The PackageMaker software is the preferred way of distributing more complex
    software packages on Mac OS X; i.e., things that include multiple components,
    such as KEXTs, helper daemons, and end–user applications.

    *   PackageMaker is a tool distributed with Xcode. PackageMaker can be used via
    a graphical user interface or the command line. Packages created with PackageMaker
    are installed using the `Installer.app` application.

    *   PackageMaker does not provide a mechanism for uninstalling packages.


    ## Index


