    it unloads. The filter will print the source and destination of each received
    IP packet to the console, as well as keep track of statistics for TCP, UDP, and
    ICMP packets, for which a summary is printed once the filter is detached.


    The `ipf_filter` structure is registered using the `ipf_addv4()` function, which
    registers an IPv4 filter. IPv6 filters can be registered with `ipf_addv6().`


    The `ipf_input` and `ipf_output` callbacks are invoked from the IP stack on arrival
    or departure of an IP packet. For incoming IP packets, the filter function will
    be called just before the packet gets processed by a higher-level protocol handler,
    such as TCP or UDP. If the IP packet was fragmented, it is reassembled before
    being passed to the filter function. For outgoing packets, the filter function
    will be called before the packet is fragmented. Normally, a packet would only
    be seen by a filter function once. However, there is one exception, which is if
    the packet uses an encryption scheme like IPSec, where an IP packet may contain
    another encrypted IP packet. In this case, the filter function will be called
    once for the encrypted packet and once for the decrypted payload.


    IP filters work across interfaces, so you will see packets from and to all active
    interfaces in the system. If you need to know which interface the packet arrived
    from, this information can be obtained from the mbuf packet header. For outgoing
    packets, this information is not yet available, because routing of the packet
    to a network interface happens after the output filter function is called. This
    is by design, because it is possible for the filter function to alter the destination
    of a packet, as we will see shortly.


