    `6       complete(&context->completion, status, actualByteCount);`


    `7       context->buffer->release();`

    `        IOFree(context, sizeof(ReadCompletionParams));`

    `}`


    Corresponding to the numbered lines in [Listing 14-15](#Chapter14.html#list_14_15),
    the following is an overview of the steps performed in the listing:


    1.  Since the read is performed asynchronously, any variables or state that is
    needed in the completion callback for the read need to be saved to a temporary
    structure. We use the `IOMalloc()` function to allocate a structure in memory
    to save anything that we need to pass to the completion callback.

    2.  The allocated context structure is initialized. One parameter that needs to
    be saved is the `IOStorageCompletion` structure provided by the caller; this contains
    the callback function that the caller wishes to be notified on when the read completes.
    We also save a reference to the `IOMemoryDescriptor` that the data from the disk
    is read into. Since we will be referencing this object in the callback, we retain
    it to prevent it from being released before the callback fires.

    3.  We set up an `IOStorageCompletion` structure to pass our own callback function
    to be notified when the asynchronous read completes.

    4.  We perform a read from the encrypted `IOMedia` object.

    5.  When the read completes, our specified callback function (`readCompleted`)
    will be called. If the read completed successfully, we decrypt the data that was
    read back from the encrypted `IOMedia` object.

    6.  We call the `IOStorageCompletion` callback that was provided by the caller,
    which notifies the caller that its buffer contains the decrypted data that it
    requested.

    7.  We release our reference to the `IOMemoryDescriptor` that we took, and release
    the structure that was allocated in Step 1.


    The implementation of the encryption filter scheme''s write operation is quite
    straightforward because it can perform the encryption before writing the resulting
    data to the encrypted `IOMedia` object. As such, even though the write is performed
    asynchronously, it doesn''t need to replace the completion callback that was provided
    by the caller (unlike the read operation).


    Rather than encrypt the data in-place, we allocate a new `IOMemoryDescriptor`
    to hold the encrypted data. This allows us to leave the caller''s buffer unmodified,
    which is important because the write operation should not change the contents
    of the source buffer. Even though the write is performed asynchronously, the driver
    in the storage stack that performs the operation will retain the `IOMemoryDescriptor`
    buffer for the duration of the write. This allows us to release our own reference
    to the object immediately after issuing the write to the encrypted `IOMedia` object.


    The implementation of the encryption filter scheme''s `write()` method is provided
    in [Listing 14-16](#Chapter14.html#list_14_16).


