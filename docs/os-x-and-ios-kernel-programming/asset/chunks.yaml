- fmt: "# Physical Address Mapping\n\nVirtual memory addresses are only available\
    \ to the CPU and are meaningless to a hardware device, which requires physical\
    \ addresses. In order to communicate with hardware outside the CPU, we need to\
    \ translate virtual memory from the kernel or a user space task into physical\
    \ addresses the device can use to access information from RAM. This task is not\
    \ always trivial as virtual memory is often fragmented. Let's look at an example,\
    \ a 128 KB virtual memory buffer we want to send to a hardware device. The buffer\
    \ can in the worst case consist of 32 individual 4 KB pages scattered anywhere\
    \ throughout the system memory. Because of this, we cannot simply translate the\
    \ address of the first byte of the buffer and tell the device the buffer is 128\
    \ KB long; we need to work out how many fragments the buffer consists of and instead\
    \ send a list/array of addresses and lengths. This is often referred to as a scatter/gather\
    \ table or list. The `IOMemoryDescriptor` and classes derived from it provide\
    \ two methods to help with physical address translation, as follows.\n\n* `getPhysicalAddress()`:\
    \ Translates the address of the first byte to its physical address. This is mainly\
    \ useful if the buffer is known to be contiguous.\n* `getPhysicalSegment()`: Translates\
    \ the address at a specified offset into the buffer and returns the length of\
    \ the physical segment from that offset. For a contiguous buffer, this will always\
    \ be the size of the buffer minus the offset.\n\n![images](images/square.jpg)\
    \ **Caution** This method can cause a kernel panic if used improperly. See the\
    \ following discussion for correct usage.\n\nNote that there are two versions\
    \ of `getPhysicalSegment()` depending on if you are using a 64-bit kernel or 32-bit\
    \ kernel, as follows:\n\n```\n#ifdef __LP64__\n    virtual addr64_t getPhysicalSegment(\
    \ IOByteCount   offset,\n                                         IOByteCount\
    \ * length,\n                                         IOOptionBits  options =\
    \ 0 ) = 0;\n#else /* !__LP64__ */\n    virtual addr64_t getPhysicalSegment( IOByteCount\
    \   offset,\n                                         IOByteCount * length,\n\
    \                                         IOOptionBits  options );\n#endif /*\
    \ !__LP64__ */\n```\n\nFor the 32-bit version (`!__LP64__`) the `options` argument\
    \ must specify: `kIOMapperNone` or the method will panic for addresses over the\
    \ 4 GB mark. A more flexible, safer and easier approach to memory translation\
    \ is to use `IODMACommand` class, which works in conjunction with `IOMemoryDescriptor`.\
    \ We discuss `IODMACommand` and this topic in much more detail in [Chapter 9](#Chapter09.html#ch9).\n\
    \n## Summary\n\nIn this chapter, we have discussed:\n\n* Types of memory addresses\
    \ in use by the kernel. The kernel typically works with virtual addresses both\
    \ for its own threads as well as those of user space tasks. Physical memory addresses\
    \ are used between the CPU and memory, as well as hardware devices.\n* The significance\
    \ of 32-bit and 64-bit memory addressing and modes.\n* How memory allocation is\
    \ performed across the different kernel subsystems, Mach, BSD, and I/O Kit. In\
    \ I/O Kit, the preferred mechanism is to use the `IOMalloc*()` functions or the\
    \ `IOBufferMemoryDescriptor`.\n* How the `IOMemoryDescriptor` and related subclasses\
    \ are used by many parts of the I/O Kit to manage and describe memory buffers.\
    \ The `IOBufferMemoryDescriptor` is one such subclass, which in addition to providing\
    \ a memory descriptor also allocates memory in various forms, with alignment or\
    \ even physically contiguous memory.\n* How the `IOMemoryMap` class is used to\
    \ manage memory mappings and allows the kernel to map a user space buffer into\
    \ its virtual address space so memory can be manipulated by the kernel.\n* How\
    \ the `IOUserClient` class provides a useful method, `clientMemoryForType()`,\
    \ which will handle the details of mapping a kernel buffer into user space.\n\
    * How the `IOMemoryDescriptor` provides methods such as `getPhysicalSegment()`\
    \ that allow mapping of virtual memory addresses to physical addresses.\n\n##\
    \ Chapter 7: Synchronization and Threading\n\nAs we have seen throughout this\
    \ book, the role of a driver is to make the functionality that is provided by\
    \ a hardware device available to the operating system and to user applications.\
    \ This means that the code inside a driver may be called from any number of running\
    \ applications at any time, depending on when an application wishes to request\
    \ the services of the hardware device. In handling these requests, the driver\
    \ runs in the thread context of the application that made the control call. In\
    \ addition to these requests, the hardware itself can require servicing and may\
    \ generate interrupts at arbitrary times that the driver must respond to. The\
    \ end result for the driver developer is that driver code runs in a complex multithreaded\
    \ environment, even without the driver creating any additional threads of its\
    \ own.\n\nThe computer hardware on which a driver will execute will likely have\
    \ multiple CPU cores. So, in addition to the driver code being preempted by an\
    \ interrupt from the device or a request from a thread in another application,\
    \ it's possible for your driver to be running on multiple cores simultaneously.\
    \ This applies even to the interrupt service routine for your driver, which can\
    \ run in parallel to the non-interrupt code of your driver on another CPU core.\n\
    \nAs is the case with multithreaded application code, it's important that a driver\
    \ provides synchronized access to its internal structures and any data that could\
    \ potentially be read or written from multiple threads. How a driver provides\
    \ the arbitration between multiple threads that are attempting to access its hardware\
    \ is dependent on the type of device. Some hardware can only be accessed by one\
    \ client at a time. For example, a serial port device will grant exclusive access\
    \ to one user process at a time; the driver will make sure that an attempt by\
    \ another process to open the serial port will be rejected. On the other hand,\
    \ a disk device can expect to receive requests from multiple processes and, since\
    \ the hardware itself can handle only one request at a time, it is the responsibility\
    \ of the driver to queue the incoming requests and issue them to the disk device\
    \ in a serial manner.\n\nThe I/O Kit provides several different mechanisms that\
    \ a driver can use to implement a scheme that provides arbitrated access to its\
    \ hardware while ensuring that the driver's internal structures remain valid in\
    \ a multithreaded environment. This chapter assumes that you have a basic understanding\
    \ of code synchronization and have previously written multithreaded application\
    \ code."
