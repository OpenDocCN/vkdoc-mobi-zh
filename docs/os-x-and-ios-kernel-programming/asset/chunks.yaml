    provided by the operating system to perform tasks while they execute, in many
    cases without the user—or even the programmer—giving much thought to them. For
    an application to read a file from disk, for example, the programmer simply needs
    to call a function that the operating system provides. The operating system handles
    the specific steps required to perform that read. This frees the application programmer
    from having to worry about the differences between reading a file that resides
    on the computer''s internal hard disk or a file on an external USB flash drive;
    the operating system takes care of such matters.


    Most programmers are familiar with developing code that is run by the user and
    perhaps uses a framework such as Cocoa to provide a graphical user interface with
    which to interact with the user. All of the applications available on the Mac
    or iPhone App Store fit into this category. This book is not about writing application
    software, but rather about writing kernel extensions—that is, code that provides
    services to applications. Two possible situations in which a kernel extension
    is necessary are allowing the operating system to work with custom hardware devices
    and adding support for new file systems. For example, a kernel extension could
    allow a new USB audio device to be used by iTunes or allow an Ethernet card to
    provide an interface for networking applications, as shown in [Figure 1-1](#Chapter01.html#fig_1_1).
    A file system kernel extension could allow a hard disk formatted on a Windows
    computer to mount on a Mac as if it were a standard Mac drive.


    ![images](images/0101.jpg)


    ***Figure 1-1.** The network interfaces listed in the Mac OS X system preferences
    represent network kernel extensions.*


    An important role of the operating system is to manage the computer''s hardware
    resources, such as memory and the CPU, and peripherals, such as disk storage and
    the keyboard. The collection of hardware devices that the operating system needs
    to support varies greatly from machine to machine. The hardware configuration
    of a MacBook Air is very different to that of a Mac Pro, although they both run
    the same operating system. To allow the operating system to support multiple hardware
    configurations without becoming bloated, the code required to support each hardware
    component is packaged into a special type of kernel extension known as a driver.
    This modularity allows the operating system to load drivers on demand, depending
    on the hardware that is present on the system. This approach also allows for drivers
    to be installed into the system by vendors to support their custom hardware. The
    standard installation of Mac OS X comes with over one hundred drivers, of which
    only a subset is needed to run a particular system.


    Developing a kernel extension is very different from writing an application. The
    execution of an application tends to be driven by events originating from the
    user. The application runs when the user launches it; it may then wait for the
    user to click a button or select a menu item, at which point the application handles
    that request. Kernel extensions, on the other hand, have no user interface and
    do not interact with the user. They are loaded by the operating system, and are
    called by the operating system to perform tasks that it could not perform by itself,
    such as when the operating system needs to access a hardware device that the kernel
    extension is driving.


    To help with the security and stability of the system, modern operating systems,
    such as Mac OS X, isolate the core operating system code (the kernel) from the
    applications and services that are run by the user. Any code that runs as part
    of the kernel, such as driver code, is said to run in “kernel space.” Code that
    runs in kernel space is granted privileges that standard user applications do
    not have, such as the ability to directly read and write to hardware devices connected
    to the computer.


    In contrast, the standard application code that users work with are said to run
    in “user space.” Software that runs in user space has no direct access to hardware.
    Therefore, to access hardware, user code must send a request to the kernel, such
    as a disk read request, to request that the kernel perform a task on behalf of
    the application.


    There is a strict barrier between code that runs in user space and code that runs
    in the kernel. Applications can only access the kernel by calling functions that
    the operating system publishes to user space code. Similarly, code that executes
    in kernel space runs in a separate environment to user space code. Rather than
    using the same rich programming APIs that are available to user space code, the
    kernel provides its own set of APIs that developers of kernel extensions must
    use. If you are accustomed to user space programming, these APIs may appear restrictive
    at first, since operations such as user interaction and file system access are
    typically not available to kernel extensions. [Figure 1-2](#Chapter01.html#fig_1_2)
    shows the separation of user space code and kernel space code, and the interaction
    between each layer.


    ![images](images/0102.jpg)


    ***Figure 1-2.** The separate layers of responsibility in a modern operating system*


    An advantage of forcing applications to make a request to the kernel to access
    hardware is that the kernel (and kernel driver) becomes the central arbiter of
    a hardware device. Consider the case of a sound card. There may be multiple applications
    on the system that are playing audio at any one time, but because their requests
    are funneled through to a single audio driver, that driver is able to mix the
    audio streams from all applications and provide the sound card with the resulting
    mixed stream.


    In the remainder of this chapter, we provide an overview of the functionality
    provided by the operating system kernel, with a focus on its importance in providing
    user applications with access to hardware. We begin at the highest level, looking
    at application software, and then digging down into the operating system kernel
    level, and finally down into the deepest level, the hardware driver. If you are
    already familiar with these concepts, you can safely proceed to [Chapter 2](#Chapter02.html#ch2).'
  trans: '

    # 操作系统基础


    操作系统的角色在于提供一个环境，使用户能够运行应用软件。用户运行的应用在执行过程中依赖操作系统提供的服务来完成任务，通常用户——甚至程序员——都无需过多关注这些细节。例如，当应用需要从磁盘读取文件时，程序员只需调用操作系统提供的某个函数即可。操作系统会处理执行该读取操作所需的具体步骤。这使应用程序员无需担心读取计算机内置硬盘上的文件与读取外部
    USB 闪存盘上的文件之间的差异；操作系统会处理这些事务。


    大多数程序员都熟悉开发由用户运行的代码，或许还会使用诸如 Cocoa 之类的框架来提供图形用户界面与用户交互。Mac 或 iPhone App Store
    上提供的所有应用都属于此类。本书并非关于编写应用软件，而是关于编写内核扩展——也就是为应用提供服务的代码。需要内核扩展的两种情况包括：让操作系统支持自定义硬件设备，以及添加对新文件系统的支持。例如，内核扩展可以让
    iTunes 使用新的 USB 音频设备，或者让以太网卡为网络应用提供接口，如图 图 1-1 所示。文件系统内核扩展则可以让在 Windows 计算机上格式化的硬盘像标准
    Mac 驱动器一样挂载到 Mac 上。


    ![images](img/0101.jpg)


    ***图 1-1.** Mac OS X 系统偏好设置中列出的网络接口即代表网络内核扩展。*


    操作系统的一个重要角色是管理计算机的硬件资源，例如内存和 CPU，以及外设，比如磁盘存储和键盘。操作系统需要支持的硬件设备集合因机器而异。MacBook Air
    的硬件配置与 Mac Pro 截然不同，尽管它们运行着相同的操作系统。为了让操作系统能够支持多种硬件配置而不会变得臃肿，支持每个硬件组件的代码被打包成一种特殊类型的内核扩展，即驱动程序。这种模块化设计使操作系统能够根据系统中存在的硬件按需加载驱动程序。这种方式也允许供应商将驱动程序安装到系统中，以支持其自定义硬件。Mac
    OS X 的标准安装包含一百多个驱动程序，但运行特定系统只需其中一部分。


    开发内核扩展与编写应用软件截然不同。应用的执行通常由用户触发的事件驱动。应用在用户启动时运行；随后它可能等待用户点击按钮或选择菜单项，此时应用会处理该请求。相比之下，内核扩展没有用户界面，也不与用户交互。它们由操作系统加载，并由操作系统调用以执行其自身无法完成的任务，例如当操作系统需要访问内核扩展所驱动的硬件设备时。


    为了提升系统的安全性与稳定性，现代操作系统（如 Mac OS X）将核心操作系统代码（内核）与用户运行的应用和服务隔离开来。任何作为内核一部分运行的代码（例如驱动程序代码）被称为运行在“内核空间”。运行在内核空间的代码拥有标准用户应用所不具备的特权，例如能够直接读写连接到计算机的硬件设备。


    相反，用户使用的标准应用代码被称为运行在“用户空间”。运行在用户空间的软件无法直接访问硬件。因此，为了访问硬件，用户代码必须向内核发送请求，例如磁盘读取请求，以请求内核代表应用执行任务。


    运行在用户空间的代码与运行在内核的代码之间存在严格的界限。应用只能通过调用操作系统发布给用户空间代码的函数来访问内核。同样，在内核空间执行的代码运行在与用户空间代码分离的环境中。内核不提供用户空间代码可用的丰富编程
    API，而是提供自身的一套 API，内核扩展的开发者必须使用这些 API。如果你习惯了用户空间编程，这些 API 起初可能会显得受限，因为用户交互和文件系统访问等操作通常对内核扩展不可用。图
    1-2 展示了用户空间代码与内核空间代码的分离，以及各层之间的交互。


    ![images](img/0102.jpg)


    ***图 1-2.** 现代操作系统中各层职责的分离*


    强制应用向内核发出请求以访问硬件的一个优势在于，内核（及内核驱动程序）成为硬件设备的中央仲裁者。以声卡为例，系统上可能同时有多个应用在播放音频，但由于它们的请求都汇聚到单个音频驱动程序，该驱动程序能够混合来自所有应用的音频流，并将混合后的结果流提供给声卡。


    在本章的剩余部分，我们将概述操作系统内核所提供的功能，重点阐述其在为用户应用提供硬件访问权限方面的重要性。我们从最高层开始，审视应用软件，然后深入探讨操作系统内核层，最后深入最底层——硬件驱动程序。如果你对这些概念已经熟悉，可以直接进入第
    2 章。

    '
- fmt: '#### The Role of the Operating System


    As part of the boot sequence, the operating system determines the hardware configuration
    of the system, finds any external devices connected to USB ports or plugged into
    PCI expansion slots, and initializes them, loading drivers along the way, if necessary.


    Once the operating system has completed loading, the user is able to run application
    software. Application software may need to allocate memory or write a file to
    disk, and it is the operating system that handles these requests. To the user,
    the involvement of the operating system is largely transparent.


    The operating system provides a layer of abstraction between running applications
    and the physical hardware. Applications typically communicate with hardware by
    issuing high-level requests to the operating system. Because the operating system
    handles these requests, the application can be completely unaware of the hardware
    configuration on which it is running, such as the amount of RAM installed and
    whether the disk storage is an internal SSD or an external USB drive.


    This abstraction allows application software to be run on a wide variety of different
    hardware configurations without the programmer having to add support for each
    one, even if new hardware devices are created after the program has been released.


    Application developers can often ignore many of the details of the workings of
    a computer system, because the operating system abstracts away the intricacies
    of the hardware platform on which the application is running. As a driver developer,
    however, the code that you write becomes part of the operating system and will
    interface directly with the computer''s hardware; you are not immune to the inner-workings
    of a system. For this reason, a basic understanding of how the operating system
    performs its duties is necessary.


    #### Process Management


    A user typically has many applications installed on his or her computer. These
    are purely passive entities. The programs on disk contain data that is needed
    only when the program is run, consisting of the executable code and application
    data. When the user launches an application, the operating system loads the program''s
    code and data into memory from disk and begins executing its code. A program being
    executed is known as a “process.” Unlike a program, a process is an active entity,
    and consists of a snapshot of the state of the program at a single instance during
    execution. This includes the program''s code, the memory that the program has
    allocated, and the current state of its execution, such as the CPU instruction
    of the function that the program is currently executing, and the contents of its
    variables and memory allocations.


    There are typically many processes running on a system at once. These include
    applications that the user has launched (such as iTunes or Safari), as well as
    processes that are started automatically by the operating system and that run
    with no indication to the user. For example, the Time Machine backup service will
    automatically run a background process every hour to perform a backup of your
    data. There may even be multiple instances of the same program being executed
    at any one time, each of which is considered a distinct process by the operating
    system. [Figure 1-3](#Chapter01.html#fig_1_3) shows the `Activity Monitor` utility
    that is included with Mac OS X, which allows all of the processes running on the
    system to be examined.


    ![images](images/0103.jpg)


    ***Figure 1-3.** Activity Monitor on Mac OS X showing all processes running on
    the system. Compare this to the Dock, which shows the visible user applications.*


    #### Process Address Spaces


    Although there are typically many processes running at any one time, each process
    is unaware of the other processes running on the system. In fact, without explicit
    code, one process cannot interact or influence the behavior of another process.


    The operating system provides each process with a range of memory within which
    it is allowed to operate; this is known as the process''s address space. The address
    space is dynamic and changes during execution as a process allocates memory. If
    a process attempts to read or write to a memory address outside of its address
    space, the operating system typically terminates it, and the user informed that
    the application has crashed.


    Although protected memory is not new, it is only within the last decade that it
    has been found on consumer desktop systems. Prior to Mac OS X, a process running
    under Mac OS 9 was able to read or write to any memory address, even if that address
    corresponded to a buffer that was allocated by another process or belonged to
    the operating system itself.


    Without memory protection, applications were able to bypass the operating system
    and implement their own inter-process communication schemes based on directly
    modifying the memory and variables of a different process, with or without the
    consent of that process. This was also true for operating system structures. For
    example, Mac OS 9 had an internal global variable that contained a linked list
    of every GUI window that was open. Although this linked list was nominally owned
    and manipulated by the operating system, applications were able to walk and modify
    the list without making any calls to the operating system.


    Without memory protection, an operating system is susceptible to bugs in user
    applications. An application running on a system with memory protection can, at
    worst, corrupt its own memory and structures, but the damage is localized to the
    application itself. On a system without memory protection, such as Mac OS 9, a
    bug in an application could potentially overwrite the internal structures of the
    operating system, which could cause the system to crash entirely and require a
    reboot to recover.


    It is worth noting that on a modern operating system such as Mac OS X, the kernel
    has an address space of its own. This allows the kernel to operate independently
    of all running processes. On Mac OS X, a single address space is used for both
    the kernel and all kernel extensions that are loaded. This means that there is
    nothing protecting core operating system structures from being inadvertently overwritten
    by a buggy driver. Unlike a user process, which can simply be aborted, if this
    situation occurs in the kernel, the entire system is brought down and the computer
    must be rebooted. This type of error presents itself as a kernel panic on Mac
    OS X, or the “blue screen of death” on Windows. For this reason, developers of
    kernel extensions need to be careful with memory management to ensure that all
    memory accesses are valid.'
