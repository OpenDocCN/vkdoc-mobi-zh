    #### Implementing an Audio Engine


    The audio engine performs the actual I/O in an audio driver. An audio engine is
    implemented as a subclass of the abstract `IOAudioEngine` class. It controls the
    I/O behavior and handles the transfer of one or more related sample buffers. Many
    audio devices can drive multiple independent inputs and outputs at the same time;
    in this case, it is recommended to create more than one instance of `IOAudioEngine`,
    one for each I/O channel. The following steps are needed to implement an `IOAudioEngine`
    subclass:


    *   Override the `initHardware()` method to perform any additional hardware initialization
    needed.

    *   Allocate sample buffers and associated `IOAudioStream` instances.

    *   Implement the `performAudioEngineStart()` and `performAudioEngineStop()` methods
    to start and stop the I/O.

    *   Implement the `free()` method to clean up any used resources.

    *   Implement the `getCurrentSampleFrame()` method.

    *   Implement the `performFormatChange()` method to respond to change of format
    requests from Core Audio.

    *   Implement a mechanism to inform the super class of the timestamp of when the
    sample buffer wraps back to the beginning.

    *   Implement the `clipOutputSamples()` method for output streams and/or the `convertInputSamples()`
    method for input streams.


    We will discuss the preceding steps in more detail in the following sections by
    examining the implementation of the `MyAudioDevice` example driver.


    An `IOAudioEngine` subclass is started and stopped directly by Core Audio through
    the `IOAudioEngineUserClient`. Once started, the engine will continuously run
    through the sample buffer. The `IOAudioEngine` subclass is responsible for telling
    the super class when the buffer wraps around to the start of the buffer by taking
    a timestamp. The Core Audio framework uses the timestamp to accurately predict
    the position of the sample buffer. The audio engine will also ensure that played
    samples in the sample buffer are erased.


    The header file for *MyAudioDevice*''s *IOAudioEngine* subclass is shown in [Listing
    12-2](#Chapter12.html#list_12_2).


