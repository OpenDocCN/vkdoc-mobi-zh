- fmt: "# Scheduling\n\nThe scheduler is responsible for coordinating the access of\
    \ threads to the CPU. Most modern kernels, including XNU, use a timesharing scheduler,\
    \ where each thread is allocated a finite (10ms in XNU, as we've seen) time quantum\
    \ in which the thread is allowed to execute. Upon expiration of the thread's quantum,\
    \ it is put to sleep so that other threads can run. While it may seem reasonable\
    \ and fair that each thread gets to run for an equal amount of time, this is impractical,\
    \ as some threads have a greater need for low latencies, for example to perform\
    \ audio and video playback. The XNU scheduler employs a priority-based algorithm\
    \ to schedule threads. [Table 2-3](#Chapter02.html#tab_2_3) shows the priority\
    \ levels used by the scheduler.\n\n![images](images/t0203.jpg)\n\nThe kernel organizes\
    \ threads in doubly-linked lists. This collection of lists is known as the *run\
    \ queue*. There is one list per priority level (currently 0–127). Each processor\
    \ (core) in the system maintains its own run queue structure (`osfmk/kern/sched.h`):\n\
    \n```\n  struct run_queue {\n        int                         highq;      \
    \            /* highest runnable queue */\n        int                       \
    \  bitmap[NRQBM];          /* run queue bitmap array */\n        int         \
    \                count;                  /* # of threads total */\n        int\
    \                         urgency;                /* level of preemption urgency\
    \ */\n        queue_head_t                queues[NRQS];           /* one for each\
    \ priority */\n  };\n```\n\nA regular application thread starts with a priority\
    \ of 31. Its priority may decrease over time, as a side effect of the scheduling\
    \ algorithm. This will happen, for example, if a thread is highly compute intensive.\
    \ By lowering the priority of such threads, it will improve the scheduling latency\
    \ of I/O bound threads, which spend most of their time sleeping in-between issuing\
    \ I/O requests, thus usually going back to sleep before their quantum expires,\
    \ and thus allowing compute intensive threads access to the CPU again. The end\
    \ result is improved system responsiveness.\n\nTo avoid getting into a situation\
    \ where the thread's priority will be too low for it to run, the Mach scheduler\
    \ will decay a thread's processor usage accounting over time, eventually resetting\
    \ it, and thus a thread's priority will fluctuate over time.\n\nThe Mach scheduler\
    \ provides support for real-time threads, although it does not provide guaranteed\
    \ latency; however, every effort is made to ensure it will run for the required\
    \ amount of clock cycles. A real-time thread may be downgraded to normal priority\
    \ if it does not block/sleep frequently enough, for example if it is highly compute\
    \ bound.\n\n# Mach IPC: Ports and Messages\n\nA port is a unidirectional communications\
    \ endpoint, which represents a resource referred to as an object. If you are familiar\
    \ with TCP/IP networking, many parallels can be drawn between Mach's IPC and the\
    \ UDP protocol, though unlike the UDP protocol, Mach IPC is used for more than\
    \ just data transfers. It can be used to provide synchronization, or to send notifications\
    \ between tasks. An IPC client can send messages to a port. The owner of the port\
    \ receives the messages. For bidirectional communication, two ports are needed.\
    \ A port is implemented as a message queue (though other mechanisms exist). Messages\
    \ for the port are queued until a thread is available to service them. A port\
    \ can receive messages from multiple senders, but there can be only one receiver\
    \ per port.\n\nPorts have protection mechanisms known as port rights. A task must\
    \ have the proper permissions in order to interact with a port. Port rights are\
    \ associated with a task; therefore, all threads in a task share the same privileges\
    \ to a port. The following are examples of port rights: send, send once, and receive.\
    \ The rights can be copied or moved between tasks. Unlike Unix permissions, port\
    \ rights are not inherited from parent to child processes (Mach tasks do not have\
    \ this concept). [Table 2-4](#Chapter02.html#tab_2_4) shows the available port\
    \ right types.\n\n![images](images/t0204.jpg)\n\nA group of ports are collectively\
    \ known as a port set. The message queue is shared between all ports in a set.\
    \ A 32-bit integer number addresses ports in the system. There is no global register\
    \ or namespace for ports.\n\nThe Mach IPC system is also available in user space\
    \ programs and can be used to pass messages between tasks or from a task to the\
    \ kernel. It offers an alternative to system calls, though the mechanism uses\
    \ system calls under the hood."
  raw: '##### Scheduling


    The scheduler is responsible for coordinating the access of threads to the CPU.
    Most modern kernels, including XNU, use a timesharing scheduler, where each thread
    is allocated a finite (10ms in XNU, as we''ve seen) time quantum in which the
    thread is allowed to execute. Upon expiration of the thread''s quantum, it is
    put to sleep so that other threads can run. While it may seem reasonable and fair
    that each thread gets to run for an equal amount of time, this is impractical,
    as some threads have a greater need for low latencies, for example to perform
    audio and video playback. The XNU scheduler employs a priority-based algorithm
    to schedule threads. [Table 2-3](#Chapter02.html#tab_2_3) shows the priority levels
    used by the scheduler.


    ![images](images/t0203.jpg)


    The kernel organizes threads in doubly-linked lists. This collection of lists
    is known as the *run queue*. There is one list per priority level (currently 0–127).
    Each processor (core) in the system maintains its own run queue structure (osfmk/kern/sched.h):


    `  struct run_queue {`

    `        int                         highq;                  /* highest runnable
    queue */`

    `        int                         bitmap[NRQBM];          /* run queue bitmap
    array */`

    `        int                         count;                  /* # of threads total
    */`

    `        int                         urgency;                /* level of preemption
    urgency */`

    `        queue_head_t                queues[NRQS];           /* one for each priority
    */`

    `  };`


    A regular application thread starts with a priority of 31\. Its priority may decrease
    over time, as a side effect of the scheduling algorithm. This will happen, for
    example, if a thread is highly compute intensive. By lowering the priority of
    such threads, it will improve the scheduling latency of I/O bound threads, which
    spend most of their time sleeping in-between issuing I/O requests, thus usually
    going back to sleep before their quantum expires, and thus allowing compute intensive
    threads access to the CPU again. The end result is improved system responsiveness.


    To avoid getting into a situation where the thread''s priority will be too low
    for it to run, the Mach scheduler will decay a thread''s processor usage accounting
    over time, eventually resetting it, and thus a thread''s priority will fluctuate
    over time.


    The Mach scheduler provides support for real-time threads, although it does not
    provide guaranteed latency; however, every effort is made to ensure it will run
    for the required amount of clock cycles. A real-time thread may be downgraded
    to normal priority if it does not block/sleep frequently enough, for example if
    it is highly compute bound.


    ##### Mach IPC: Ports and Messages


    A port is a unidirectional communications endpoint, which represents a resource
    referred to as an object. If you are familiar with TCP/IP networking, many parallels
    can be drawn between Mach''s IPC and the UDP protocol, though unlike the UDP protocol,
    Mach IPC is used for more than just data transfers. It can be used to provide
    synchronization, or to send notifications between tasks. An IPC client can send
    messages to a port. The owner of the port receives the messages. For bidirectional
    communication, two ports are needed. A port is implemented as a message queue
    (though other mechanisms exist). Messages for the port are queued until a thread
    is available to service them. A port can receive messages from multiple senders,
    but there can be only one receiver per port.


    Ports have protection mechanisms known as port rights. A task must have the proper
    permissions in order to interact with a port. Port rights are associated with
    a task; therefore, all threads in a task share the same privileges to a port.
    The following are examples of port rights: send, send once, and receive. The rights
    can be copied or moved between tasks. Unlike Unix permissions, port rights are
    not inherited from parent to child processes (Mach tasks do not have this concept).
    [Table 2-4](#Chapter02.html#tab_2_4) shows the available port right types.


    ![images](images/t0204.jpg)


    A group of ports are collectively known as a port set. The message queue is shared
    between all ports in a set. A 32-bit integer number addresses ports in the system.
    There is no global register or namespace for ports.


    The Mach IPC system is also available in user space programs and can be used to
    pass messages between tasks or from a task to the kernel. It offers an alternative
    to system calls, though the mechanism uses system calls under the hood.'
  trans: "\n# 调度\n\n调度器负责协调线程对 CPU 的访问。包括 XNU 在内的大多数现代内核都采用分时调度器，即每个线程被分配一个有限的（如 XNU\
    \ 中为 10 毫秒）时间量子，在此时间内线程允许执行。当线程的时间量子耗尽时，它会被强制休眠，以便其他线程能够运行。虽然让每个线程都获得相等的运行时间看似合理公平，但这在实践中并不可行，因为某些线程对低延迟有更高需求，例如执行音频和视频播放。XNU\
    \ 调度器采用基于优先级的算法来调度线程。表 2-3 展示了调度器使用的优先级等级。\n\n![images](img/t0203.jpg)\n\n内核将线程组织在双向链表中。这些链表的集合被称为*运行队列*。每个优先级等级（当前为\
    \ 0–127）对应一个链表。系统中的每个处理器（核心）都维护着自己的运行队列结构（`osfmk/kern/sched.h`）：\n\n```\n  struct\
    \ run_queue {\n        int                         highq;                  /*\
    \ 最高可运行队列 */\n        int                         bitmap[NRQBM];          /* 运行队列位图数组\
    \ */\n        int                         count;                  /* 线程总数 */\n\
    \        int                         urgency;                /* 抢占紧迫程度 */\n  \
    \      queue_head_t                queues[NRQS];           /* 每个优先级对应一个队列 */\n\
    \  };\n```\n\n普通应用程序线程的初始优先级为 31。随着时间推移，其优先级可能会因调度算法的副作用而降低。例如，当一个线程属于高度计算密集型时，这种情况就会发生。通过降低此类线程的优先级，可以改善\
    \ I/O 密集型线程的调度延迟——这些线程大部分时间在发出 I/O 请求之间处于休眠状态，通常会在其时间量子耗尽前再次进入休眠，从而使计算密集型线程能再次获得\
    \ CPU 访问权。最终结果是提升了系统的响应性能。\n\n为了避免线程优先级过低而无法运行的情况，Mach 调度器会随时间推移逐渐衰减线程的处理器使用量记录，最终重置该记录，因此线程的优先级会随时间波动。\n\
    \nMach 调度器支持实时线程，但并不能保证确定的延迟；然而它会尽最大努力确保实时线程能够运行所需的时钟周期数。如果一个实时线程没有足够频繁地阻塞/休眠（例如属于高度计算密集型），它可能会被降级为普通优先级。\n\
    \n# Mach IPC：端口与消息\n\n端口是一个单向通信端点，代表一种称为\"对象\"的资源。如果你熟悉 TCP/IP 网络，会发现 Mach 的 IPC\
    \ 与 UDP 协议有很多相似之处，但与 UDP 协议不同的是，Mach IPC 不仅能用于数据传输。它还可以用于提供同步机制，或在任务之间发送通知。一个\
    \ IPC 客户端可以向端口发送消息，而端口的拥有者则接收这些消息。要实现双向通信，需要两个端口。端口在实现上表现为一个消息队列（尽管也存在其他机制）。发往该端口的消息会排队，直到有线程可用以处理它们。一个端口可以接收来自多个发送者的消息，但每个端口只能有一个接收者。\n\
    \n端口具有称为端口权限的保护机制。一个任务必须拥有适当的权限才能与端口交互。端口权限与任务相关联；因此，同一任务中的所有线程对该端口享有相同的权限。端口权限的示例如下：发送权限、单次发送权限和接收权限。这些权限可以在任务间复制或转移。与\
    \ Unix 权限不同，端口权限不会从父进程继承给子进程（Mach 任务没有继承概念）。表 2-4 展示了可用的端口权限类型。\n\n![images](img/t0204.jpg)\n\
    \n一组端口的集合被称为端口集。端口集中的所有端口共享同一个消息队列。系统中使用 32 位整型数来寻址端口。端口没有全局注册表或命名空间。\n\nMach\
    \ IPC 系统同样可用于用户空间程序，并可在任务之间或从任务到内核之间传递消息。它提供了一种系统调用的替代方案，尽管其底层机制仍然使用了系统调用。\n"
- fmt: "### Mach Exceptions\n\nExceptions are interrupts sent by a CPU when certain\
    \ (exceptional) events or conditions occur during the execution of a thread. An\
    \ exception will result in the interruption of a thread's execution, while the\
    \ OS (Mach) processes the exception. The task may resume afterwards, depending\
    \ on the type of exception that occurred. Common causes for exceptions include\
    \ access to invalid or non-existing memory, execution of an invalid processor\
    \ instruction, passing invalid arguments, or division by zero. These exceptions\
    \ usually result in the termination of the offending task, but there are also\
    \ a number of non-erroneous exceptions that can occur.\n\nA system call is one\
    \ such exception. A user space application may issue a system call exception when\
    \ it needs to perform a low-level operation involving the kernel, such as writing\
    \ from a file, or receiving data on a network socket. When the OS handles the\
    \ system call, it inspects a register for the system call number, which is then\
    \ used to look up the handler for that call, for example `read()` or `recv()`.\
    \ A task may also generate an exception if attempting to access paged out memory.\
    \ In this case, a page fault exception is generated, which will be handled by\
    \ retrieving the missing page from the backing store, or result in an invalid\
    \ memory access. A task may also issue deliberate exceptions with the `EXC_BREAKPOINT`\
    \ exception, which are typically used in debugging or tracing applications, such\
    \ as Xcode, to temporarily halt the execution of a thread.\n\nIt is possible,\
    \ of course, for the kernel itself to misbehave and cause exceptions. In this\
    \ case, the OS will be halted and the *grey screen of death* will be shown (unless\
    \ the kernel debugger is activated), informing the user to reboot the computer.\
    \ [Table 2-5](#Chapter02.html#tab_2_5) shows a subset of defined Mach exceptions.\n\
    \n![images](images/t0205.jpg)\n\nWhen an exception occurs, the kernel will suspend\
    \ the thread which caused the exception, and send an IPC message to the thread's\
    \ exception port. If the thread does not handle the exception, it's forwarded\
    \ to the containing task's exception port, and finally to the system's (host)\
    \ exception port. The following structure encapsulates a thread, task, or processor's\
    \ (host) exception ports:\n\n```\nstruct exception_action {\n        struct ipc_port*\
    \               port;               /* exception port */\n        thread_state_flavor_t\
    \          flavor;             /* state flavor to send */\n        exception_behavior_t\
    \           behavior;           /* exception type to raise */\n        boolean_t\
    \                      privileged;         /* survives ipc_task_reset */\n};\n\
    ```\n\nEach thread, task, and host has an array of the structure `exception_action`,\
    \ which specifies exception behavior, one structure is defined for each exception\
    \ type (as defined in [Table 2-5](#Chapter02.html#tab_2_5)). The `flavor` and\
    \ `behavior` fields specify the type of information that should be sent with the\
    \ exception message, such as the state of general purpose, or other specialized\
    \ CPU registers, and the handler, which should be executed. The handler will be\
    \ either `catch_mach_exception_raise()`, `catch_mach_exception_raise_state()`\
    \ or `catch_mach_exception_raise_state_identity()`. When an exception has been\
    \ dispatched, the kernel waits for a reply in order to determine the course of\
    \ action. A return of `KERN_SUCCESS` means the exception was handled, and the\
    \ thread will be allowed to resume.\n\nA thread's exception port defaults to `PORT_NULL`,\
    \ unless a port is explicitly allocated, exceptions will be handled by task's\
    \ exception port instead. When a process issues the `fork()` system call to spawn\
    \ a child process, the child will inherit exception ports from the parent task.\
    \ The Unix signaling mechanism is implemented on top of the Mach's exception system.\n\
    \n### Time Management\n\nProper timekeeping is a vital responsibility of any OS,\
    \ not only to serve user applications, but also to serve other important kernel\
    \ functions such as scheduling processes. In Mach, the abstraction for time management\
    \ is known as a clock. A clock object in Mach represents time in nanoseconds as\
    \ a monotonically increasing value. There are three main clocks defined: the real-time\
    \ clock, the calendar clock, and the high-resolution clock. The real-time clock\
    \ keeps the time since the last boot, while the calendar clock is typically battery\
    \ backed, so its value is persistent across system reboots, or in periods when\
    \ the computer is powered off. It has a resolution of seconds and as the name\
    \ implies, it is used to keep track of the current time. The Mach time KPI consists\
    \ of three functions:\n\n```\nvoid clock_get_uptime(uint64_t* result);\nvoid clock_get_system_nanotime(uint32_t*\
    \ secs, uint32_t* nanosecs);\nvoid clock_get_calendar_nanotime(uint32_t* secs,\
    \ uint32_t* nanosecs);\n```\n\nThe calendar clock is typically only used by applications,\
    \ as the kernel itself rarely needs to concern itself with the current time or\
    \ date, and doing so, in fact, is considered poor design. The kernel uses the\
    \ relative time provided by the real-time clock. The time from the real-time clock\
    \ typically comes from a circuit on the computer's motherboard that contains an\
    \ oscillating crystal. The real-time clock circuit (RTC) is programmable, and\
    \ wired to the CPUs' (every CPU/core) interrupt pins. The RTC gets programmed\
    \ in XNU with a deadline of 100 Hz (using `clock_set_timer_deadline()`).\n\n###\
    \ Memory Management\n\nThe Mach layer is responsible for coordinating the use\
    \ of physical memory in a machine independent manner, providing a consistent interface\
    \ to higher-level components. The virtual memory subsystem of Mach, the Mach VM,\
    \ provides protected memory and facilities to applications, and the kernel itself,\
    \ for allocating, sharing, and mapping memory. A solid understanding of memory\
    \ management is essential to a successful kernel programmer."
  raw: '##### Mach Exceptions


    Exceptions are interrupts sent by a CPU when certain (exceptional) events or conditions
    occur during the execution of a thread. An exception will result in the interruption
    of a thread''s execution, while the OS (Mach) processes the exception. The task
    may resume afterwards, depending on the type of exception that occurred. Common
    causes for exceptions include access to invalid or non-existing memory, execution
    of an invalid processor instruction, passing invalid arguments, or division by
    zero. These exceptions usually result in the termination of the offending task,
    but there are also a number of non-erroneous exceptions that can occur.


    A system call is one such exception. A user space application may issue a system
    call exception when it needs to perform a low-level operation involving the kernel,
    such as writing from a file, or receiving data on a network socket. When the OS
    handles the system call, it inspects a register for the system call number, which
    is then used to look up the handler for that call, for example `read()` or `recv()`.
    A task may also generate an exception if attempting to access paged out memory.
    In this case, a page fault exception is generated, which will be handled by retrieving
    the missing page from the backing store, or result in an invalid memory access.
    A task may also issue deliberate exceptions with the `EXC_BREAKPOINT` exception,
    which are typically used in debugging or tracing applications, such as Xcode,
    to temporarily halt the execution of a thread.


    It is possible, of course, for the kernel itself to misbehave and cause exceptions.
    In this case, the OS will be halted and the *grey screen of death* will be shown
    (unless the kernel debugger is activated), informing the user to reboot the computer.
    [Table 2-5](#Chapter02.html#tab_2_5) shows a subset of defined Mach exceptions.


    ![images](images/t0205.jpg)


    When an exception occurs, the kernel will suspend the thread which caused the
    exception, and send an IPC message to the thread''s exception port. If the thread
    does not handle the exception, it''s forwarded to the containing task''s exception
    port, and finally to the system''s (host) exception port. The following structure
    encapsulates a thread, task, or processor''s (host) exception ports:


    `struct exception_action {`

    `        struct ipc_port*               port;               /* exception port
    */`

    `        thread_state_flavor_t          flavor;             /* state flavor to
    send */`

    `        exception_behavior_t           behavior;           /* exception type
    to raise */`

    `        boolean_t                      privileged;         /* survives ipc_task_reset
    */`

    `};`


    Each thread, task, and host has an array of the structure `exception_action`,
    which specifies exception behavior, one structure is defiend for each exception
    type (as defined in [Table 2-5](#Chapter02.html#tab_2_5)). The `flavor` and `behavior`
    fields specify the type of information that should be sent with the exception
    message, such as the state of general purpose, or other specialized CPU registers,
    and the handler, which should be executed. The handler will be either `catch_mach_exception_raise()`,
    `catch_mach_exception_raise_state()` or `catch_mach_exception_raise_state_identity()`.
    When an exception has been dispatched, the kernel waits for a reply in order to
    determine the course of action. A return of `KERN_SUCCESS` means the exception
    was handled, and the thread will be allowed to resume.


    A thread''s exception port defaults to `PORT_NULL`, unless a port is explicitly
    allocated, exceptions will be handled by task''s exception port instead. When
    a process issues the `fork()` system call to spawn a child process, the child
    will inherit exception ports from the parent task. The Unix signaling mechanism
    is implemented on top of the Mach''s exception system.


    ##### Time Management


    Proper timekeeping is a vital responsibility of any OS, not only to serve user
    applications, but also to serve other important kernel functions such as scheduling
    processes. In Mach, the abstraction for time management is known as a clock. A
    clock object in Mach represents time in nanoseconds as a monotonically increasing
    value. There are three main clocks defined: the real-time clock, the calendar
    clock, and the high-resolution clock. The real-time clock keeps the time since
    the last boot, while the calendar clock is typically battery backed, so its value
    is persistent across system reboots, or in periods when the computer is powered
    off. It has a resolution of seconds and as the name implies, it is used to keep
    track of the current time. The Mach time KPI consists of three functions:


    `void clock_get_uptime(uint64_t* result);`

    `void clock_get_system_nanotime(uint32_t* secs, uint32_t* nanosecs);`

    `void clock_get_calendar_nanotime(uint32_t* secs, uint32_t* nanosecs);`


    The calendar clock is typically only used by applications, as the kernel itself
    rarely needs to concern itself with the current time or date, and doing so, in
    fact, is considered poor design. The kernel uses the relative time provided by
    the real-time clock. The time from the real-time clock typically comes from a
    circuit on the computer''s motherboard that contains an oscillating crystal. The
    real-time clock circuit (RTC) is programmable, and wired to the CPUs'' (every
    CPU/core) interrupt pins. The RTC gets programmed in XNU with a deadline of 100
    Hz (using `clock_set_timer_deadline()`).


    ##### Memory Management


    The Mach layer is responsible for coordinating the use of physical memory in a
    machine independent manner, providing a consistent interface to higher-level components.
    The virtual memory subsystem of Mach, the Mach VM, provides protected memory and
    facilities to applications, and the kernel itself, for allocating, sharing, and
    mapping memory. A solid understanding of memory management is essential to a successful
    kernel programmer.'
  trans: "\n### Mach 异常\n\n异常是 CPU 在线程执行期间发生某些（特殊的）事件或条件时发送的中断。异常会导致线程执行中断，同时操作系统（Mach）处理该异常。根据发生的异常类型，任务之后可能会恢复执行。常见的异常原因包括访问无效或不存在的内存、执行无效的处理器指令、传递无效参数或除零。这些异常通常会导致违规任务终止，但也会发生一些非错误的异常。\n\
    \n系统调用就是这样一种异常。当用户空间应用程序需要执行涉及内核的低级操作时，例如写入文件或通过网络套接字接收数据，它可能会发出系统调用异常。当操作系统处理系统调用时，它会检查一个寄存器以获取系统调用号，然后使用该号码查找该调用的处理程序，例如\
    \ `read()` 或 `recv()`。如果任务试图访问已分页出去的内存，也可能会产生异常。在这种情况下，会生成一个缺页异常，该异常将通过从后备存储中检索缺失的页面来处理，或者导致无效的内存访问。任务也可能使用\
    \ `EXC_BREAKPOINT` 异常发出故意的异常，这些异常通常用于调试或跟踪应用程序，例如 Xcode，以暂时挂起线程的执行。\n\n当然，内核本身也可能出现错误行为并导致异常。在这种情况下，操作系统将被挂起，并显示*灰屏死机*（除非内核调试器被激活），通知用户重启计算机。表\
    \ 2-5 显示了已定义的 Mach 异常的子集。\n\n![图片](img/t0205.jpg)\n\n当异常发生时，内核将挂起导致异常的线程，并向该线程的异常端口发送一条\
    \ IPC 消息。如果线程没有处理该异常，它会被转发到其所属任务的异常端口，最后转发到系统（主机）异常端口。以下结构封装了线程、任务或处理器（主机）的异常端口：\n\
    \n```\nstruct exception_action {\n        struct ipc_port*               port;\
    \               /* 异常端口 */\n        thread_state_flavor_t          flavor;   \
    \          /* 要发送的状态风格 */\n        exception_behavior_t           behavior;  \
    \         /* 要引发的异常类型 */\n        boolean_t                      privileged; \
    \        /* 是否在 ipc_task_reset 后存活 */\n};\n```\n\n每个线程、任务和主机都有一个 `exception_action`\
    \ 结构数组，该结构指定了异常行为，为每种异常类型（如表 2-5 所定义）定义了一个结构。`flavor` 和 `behavior` 字段指定了应与异常消息一同发送的信息类型，例如通用寄存器或其他专用\
    \ CPU 寄存器的状态，以及应执行的处理程序。处理程序将是 `catch_mach_exception_raise()`、`catch_mach_exception_raise_state()`\
    \ 或 `catch_mach_exception_raise_state_identity()`。当异常被分派后，内核会等待回复以决定后续操作。返回 `KERN_SUCCESS`\
    \ 表示异常已处理，并允许该线程恢复执行。\n\n线程的异常端口默认为 `PORT_NULL`，除非显式分配了一个端口，否则异常将由任务的异常端口处理。当进程发出\
    \ `fork()` 系统调用以生成子进程时，子进程将从父任务继承异常端口。Unix 信号机制是在 Mach 的异常系统之上实现的。\n\n### 时间管理\n\
    \n准确计时是任何操作系统的重要职责，不仅是为了服务用户应用程序，也是为了服务其他重要的内核功能，例如调度进程。在 Mach 中，时间管理的抽象概念被称为时钟。Mach\
    \ 中的时钟对象将时间表示为纳秒级的单调递增的值。定义了三个主要的时钟：实时时钟、日历时钟和高分辨率时钟。实时时钟记录自上次启动以来的时间，而日历时钟通常由电池供电，因此其值在系统重启或计算机关机期间保持不变。它的分辨率是秒，顾名思义，它用于跟踪当前时间。Mach\
    \ 时间 KPI 由三个函数组成：\n\n```\nvoid clock_get_uptime(uint64_t* result);\nvoid clock_get_system_nanotime(uint32_t*\
    \ secs, uint32_t* nanosecs);\nvoid clock_get_calendar_nanotime(uint32_t* secs,\
    \ uint32_t* nanosecs);\n```\n\n日历时钟通常仅由应用程序使用，因为内核本身很少需要关注当前时间或日期，事实上，这样做被认为是糟糕的设计。内核使用实时时钟提供的相对时间。实时时钟的时间通常来自计算机主板上的一个包含振荡晶体的电路。实时时钟电路（RTC）是可编程的，并连接到\
    \ CPU（每个 CPU/核心）的中断引脚。RTC 在 XNU 中被编程为 100 Hz 的截止时间（使用 `clock_set_timer_deadline()`）。\n\
    \n### 内存管理\n\nMach 层负责以机器无关的方式协调物理内存的使用，为更高级别的组件提供一致的接口。Mach 的虚拟内存子系统，即 Mach VM，为应用程序和内核本身提供受保护的内存以及分配、共享和映射内存的功能。扎实理解内存管理对于成为一个成功的内核程序员至关重要。\n"
- fmt: '# Task Address Space


    Each Mach task has its own virtual address (VM) space. For a 32-bit task, the
    address space is 4 GB, while for a 64-bit task it is substantially larger, with
    51-bits (approximately 2 petabytes) of usable address space. Specialized applications,
    such as video editing or effects software, often exceed the 32-bit address space.
    Support for 64-bit virtual address space became available in OS X 10.4.


    > **Note:** While 32-bit applications are limited to a 4 GB address space, this
    does not correlate with the amount of physical memory that can be used in a system.
    Technologies such as Physical Address Extensions (PAE) are supported by OS X and
    allow 32-bit x86 processors (or 64-bit processors running in 32-bit mode) to address
    up to 36-bits (64 GB) of physical memory; however, a task''s address space remains
    limited to 4 GB.


    A task''s address space is fundamental to the concept of protected memory. A task
    is not allowed to access the address space, and thus the underlying physical memory
    containing the data of another task, unless explicitly allowed to do so, through
    the use of shared memory or other mechanisms.


    ## Kernel Address Space Management


    The kernel itself has its own task, the `kernel_task`, which has its own separate
    address space. Let''s assume a 32-bit OS such as iOS. Some Unix-based operating
    systems, including Linux, have a design where the kernel''s address space is mapped
    into each task''s address space. The kernel has 1GB of address space available,
    while a task has 3GB available. When a task context switches into kernel space,
    the MMU (memory management unit) can avoid reconfiguring the translation lookaside
    buffer (TLB) with a new address space, as the kernel is already at a known location,
    thus speeding up the otherwise expensive context switch. The drawback, of course,
    is the limited amount of address space available for the kernel, as well as having
    only 3GB available for the task. In XNU, the kernel runs in its own virtual address
    space, which is not shared with user tasks, leaving 4GB for the kernel and 4GB
    for the user task.


    ## VM Maps and Entries


    The virtual memory (VM) map is the actual representation of a task''s address
    space. Each task has its own VM map. The map is represented by the structure `vm_map`.
    There is no map associated with a thread as they share the VM map of the task
    that owns them.


    A VM map represents a doubly-linked list of memory regions that is mapped into
    the process address space. Each region is a virtually contiguous range of memory
    addresses (not necessarily backed by contiguous physical memory) described by
    a start and end address, as well as other meta-data, such as protection flags,
    which can be any combination of read, write, and execute. The regions are represented
    by the `vm_map_entry` structure. A VM map entry may be merged with another adjacent
    entry when more memory is allocated before or after an existing entry or split
    into smaller regions. Splitting will occur if the protection flags are modified
    for a range of addresses described by an entry, as protection flags can only be
    set on VM map entries. [Figure 2-4](#Chapter02.html#fig_2_4) shows a VM map with
    two VM map entries.


    **Figure 2-4.** Relationship between VM subsystem structures


    > **Tip:** The relevant structures pertaining to task address spaces are defined
    in `mach/vm_map.h` and `mach/vm_region.h` in the XNU source package.


    ## The Physical Map


    Each VM map has an associated physical map, or `pmap` structure. This structure
    helps hold information on virtual to physical memory mappings being used by the
    task. The portion of the Mach VM that deals with physical mappings is machine
    dependent, as it interacts with the memory management unit (MMU), a specialized
    hardware component of the system that takes care of address translation.


    ## VM Objects


    A VM map entry can point to either a VM object or a VM submap. A submap is a container
    for other (VM map) mappings. A submap is used to share memory between address
    spaces. The VM object is a representation of the location, or rather how the described
    memory is accessed. Memory pages underlying the object may not be present in physical
    memory, but could be located on an external backing store (a hard drive on OS
    X). In this case, the VM object will have information on how to *page in* the
    external pages. Transfer to or from a backing store is handled by the *pager*
    discussed next.


    A VM object describes memory in units of pages. A page in XNU is currently 4096
    bytes. A virtual page is described by the `vm_page` structure. A VM object may
    contain many pages, but a page is only ever associated with one VM object.


    ### Pages


    A page is the smallest unit of the virtual memory system. On Mac OS X and iOS,
    as well as many other operating systems, the size of a page is 4096 bytes (4KB).
    The page size is determined by the processor, as the processor, or rather its
    memory management unit (MMU), is responsible for virtual to physical mappings
    and manages the VM page table cache, also called a TLB. The page size of many
    architectures can be set by the operating system, and can be, for architectures
    such as the x86, up to 4 MB, or even a mixture between more than one page size.
    The operating system maintains a data structure called the page table, which contains
    one `struct vm_page` for each page-sized block of physical memory. The structure
    contains metadata, such as whether the page is in use.


    When memory needs to be shared between tasks, a VM map entry will point into the
    foreign address space via a submap, as opposed to a VM object. This commonly happens
    when a shared library is used. The shared library gets mapped into the task''s
    address space.


    Let''s consider another example. When a Unix process issues the `fork()` system
    call to create a child process, a new process will be created as a copy of the
    parent. To avoid having to copy the memory from the parent to the child, an optimization
    known as copy-on-write (COW) is employed. Read access to a child''s memory will
    simply reference the same pages as the parent. If the child process modifies its
    memory, the page describing that memory will be copied, and a shadow VM object
    will be created. On the next read to that memory region, a check is performed
    to see if the shadow object has a copy of the page, and if not the original shared
    page is referenced. The previously described behavior is only true when the inheritance
    property of the original VM map entry from the parent is set to *copy*. Other
    possible values are *shared,* in which case the child will continue both the read
    and write operation to the original memory location. If the setting is *none,*
    the memory pages referenced by the map entry will not be mapped into the child''s
    address space. The fourth possible value is *copy and delete,* where the memory
    will be copied to the child and deleted from the parent.


    > **Note:** Copy-on-write is also used by Mach IPC to optimize the transfer of
    data between tasks.'
