  trans: '

    ### Info.plist 文件


    Macintosh 平台一直支持设备的即插即用设计，安装驱动后无需额外配置。借助 I/O Kit，Mac OS X 也不例外。与我们上一章开发的、一旦添加到系统就会加载的内核扩展不同，驱动程序仅在其支持的某个设备连接到计算机时才会被加载。这样一来，即使系统上可能安装了数百个驱动程序，也只有那些与计算机实际连接的硬件相对应的驱动才会被加载并占用内存。


    在第 3 章中，我们看到内核扩展需要一个属性列表文件来定义其入口点等内容。对于实现 I/O Kit 驱动的内核扩展来说，属性列表更为重要。对于 I/O Kit
    驱动，属性列表指明了该驱动能够支持的硬件设备列表。驱动支持的每个设备在属性列表中都拥有自己的“个性”，由一个“匹配字典”组成，该字典包含一个数组，描述了每个要匹配的硬件设备。只有当其匹配字典中描述的某个硬件设备连接到计算机时，该驱动才会被加载。


    每个匹配字典中最重要的值之一是 `IOProviderClass`，它定义了驱动提供者的类类型，例如 `IOUSBDevice` 或 `IOPCIDevice`。每当有新硬件设备连接到计算机时，I/O
    Kit 就会为该设备创建一个合适的桩（nub），然后开始为该桩寻找合适的驱动程序。例如，USB 设备的连接处理如下：


    1.  用户将 USB 设备连接到计算机。

    2.  创建一个新的 `IOUSBDevice` 实例来表示该设备。

    3.  I/O Kit 遍历所有包含匹配字典且其提供者类为 `IOUSBDevice` 的驱动程序。

    4.  `IOUSBDevice` 检查该驱动程序匹配字典的全部内容。

    5.  如果匹配字典中请求的属性与设备的属性相对应，则该驱动将被添加到该设备的潜在驱动列表中。


    重要的是，由提供者类来决定一个驱动是否适合某个特定的硬件设备。它通过检查潜在驱动匹配字典中的属性来实现这一点；然而，所使用的具体属性将取决于驱动家族。例如，一个
    USB 驱动可能匹配 USB 设备的特定供应商 ID 和产品 ID，也可能匹配通用的设备类别，比如任何 USB 键盘。一个 PCI 设备可能根据设备 PCI
    配置空间中指定的供应商 ID 和设备 ID 进行匹配，或者针对任何 PCI 类别（如网卡或显卡）进行匹配。


    遵循上述步骤，I/O Kit 已将设备的驱动程序列表缩小到一组潜在匹配项。为了确定硬件设备的最佳驱动程序，I/O Kit 使用了每个驱动的“探测分数”概念。每个驱动都会提名一个探测分数，该分数以某种方式提供了该驱动对设备适用性的相对度量。探测分数最高的驱动最终被选中与设备协同工作。


    驱动的探测分数可以通过两种方式设置。一种方式是驱动在其匹配字典中提供一个探测分数。例如，一家制造自定义 USB 键盘的公司可以提供一个驱动，其匹配字典精确匹配该公司键盘的产品
    ID，并提供比系统默认键盘驱动更高的探测分数。另一种设置探测分数的方式是通过“主动匹配”，在此过程中，I/O Kit 实例化每个潜在驱动，将其临时连接到硬件设备，并让其有机会询问设备并确定其探测分数。在探测期间，驱动可以完全访问硬件，因此它可以执行所需的任意多次询问来确定其驱动该设备的适用性。驱动可以调整其探测分数，或者更常见的是，如果确定无法与连接的硬件协同工作，可以使用
    `probe` 方法选择退出与该设备的匹配。


    例如，一个驱动的 `probe` 实现可以确定设备上加载的固件版本，如果固件版本高于驱动支持的版本，它可以拒绝加载。在 `probe` 阶段失败比在之后驱动已被选为设备驱动时失败更高效，因为
    I/O Kit 不需要继续启动你的驱动，尽管在这两种情况下，I/O Kit 都会继续尝试加载具有次高探测分数的驱动。


    虽然几乎在所有情况下，一个设备只附加一个驱动，但 I/O Kit 确实允许为单个设备加载多个驱动。通过在驱动的匹配字典中添加一个名为“匹配类别”的额外键，I/O
    Kit 将加载每个匹配类别中探测分数最高的驱动并将其附加到设备上。如果驱动的匹配字典中没有给出匹配类别，则假定为默认类别。


    匹配过程是递归的，驱动本身也可能是桩，充当其他类的提供者。例如，实现 USB 主机控制器的 PCI 卡驱动会匹配 `IOPCIDevice`，但会创建自己的
    `IOUSBDevice` 实例来表示连接到其端口的设备。这样，该驱动创建的 `IOUSBDevice` 实例反过来又成为其他驱动的提供者类，如图 4-2
    所示。这种类型的驱动很可能不是直接实例化 `IOUSBDevice` 类型的类，而是提供自己继承自 `IOUSBDevice` 的类的实现，这在图 4-2
    中显示为 `MyUSBDevice`。


    任何使用 `MyUSBDevice` 实例作为提供者的驱动都将通过其标准的 `IOUSBDevice` 接口与该提供者通信，但虚拟方法的使用允许 `MyUSBDevice`
    的实现覆盖这些方法并提供自己的实现。


    ![图片](img/0402.jpg)


    ***图 4-2.** 一个既是桩又是驱动的示例，创建作为其他驱动提供者类的对象*


    另一个驱动充当桩的示例（实际上这要常见得多）是接受用户应用程序连接的驱动。如前所述，对于用户应用程序每次与驱动的连接，I/O Kit 都会实例化一个称为“用户客户端”的新对象来处理来自应用程序的控制请求，并将其传递给驱动。与主驱动类一样，用户客户端类也是一个
    I/O Kit 服务，并且它与其他任何驱动对象一样继承自同一个 `IOService` 基类。每个用户客户端都将主驱动对象作为其提供者类。然而，与主驱动不同，用户客户端不需要经历匹配阶段，因为驱动直接指定了其用户客户端的具体类名。

    '
- fmt: "### Listing 4-1. The Driver Personalities for a Hypothetical External Disk,\
    \ Containing Matching Dictionaries for both FireWire and USB Connections\n\n```\n\
    <key>IOKitPersonalities</key>\n<dict>\n    <key>MyExternalDiskFireWire</key>\n\
    \    <dict>\n        <key>CFBundleIdentifier</key>\n        <string>com.mycompany.driver.MyExternalDiskDriver</string>\n\
    \        <key>IOClass</key>\n        <string>com_mycompany_driver_MyExternalDiskDriver</string>\n\
    \        <key>IOProviderClass</key>\n        <string>IOFireWireUnit</string>\n\
    \        <key>Unit_SW_Version</key>\n        <integer>1111</integer>\n       \
    \ <key>Unit_Spec_ID</key>\n        <integer>2222</integer>\n    </dict>\n    <key>MyExternalDiskUSB</key>\n\
    \    <dict>\n        <key>CFBundleIdentifier</key>\n        <string>com.mycompany.driver.MyExternalDiskDriver</string>\n\
    \        <key>IOClass</key>\n        <string>com_mycompany_driver_MyExternalDiskDriverUSB</string>\n\
    \        <key>IOProviderClass</key>\n        <string>IOUSBDevice</string>\n  \
    \      <key>idProduct</key>\n        <integer>3333</integer>\n        <key>idVendor</key>\n\
    \        <integer>4444</integer>\n        <key>IOProbeScore</key>\n        <integer>9000</integer>\n\
    \    </dict>\n</dict>\n```\n\n[Listing 4-1](#Chapter04.html#list_4_1) shows the\
    \ matching dictionary for a hypothetical external disk device that features both\
    \ FireWire and USB connections. As such, it contains two entries in its matching\
    \ dictionary, the first of which matches against a specific FireWire device, and\
    \ another that matches against a specific USB device. The driver class `com_mycompany_driver_MyExternalDiskDriver`\
    \ will be instantiated and given a chance to probe the device whenever a FireWire\
    \ device with a unit software version of 1111 and a unit spec ID of 2222 is plugged\
    \ in to the computer. Likewise, the driver class `com_mycompany_driver_MyExternalDiskDriverUSB`\
    \ will be instantiated and given a chance to probe the device whenever a USB device\
    \ with a product ID of 3333 and a vendor ID of 4444 is plugged into the computer.\
    \ The USB device will have a default probe score of 9000, which should make it\
    \ the preferred driver for this device.\n\n#### The Driver Class\n\nAs we saw\
    \ in the previous section, when the I/O Kit loads a driver, it does so by instantiating\
    \ a class that is designated in the driver's property list. This class must be\
    \ a subclass of the `IOService` class, either directly or by subclassing a class\
    \ that is itself a child of the `IOService` class. The `IOService` class provides\
    \ virtual methods that are called at various points during the lifetime of the\
    \ driver—for example, when it is loaded and initialized, when it should probe\
    \ its provider, and when the driver is stopped. Because these methods are declared\
    \ as virtual methods in the definition of the `IOService` class, they can be easily\
    \ overridden in the custom driver class that inherits from `IOService`.\n\nAt\
    \ this point, it may be a good time to put what you have learned into practice\
    \ by creating a simple I/O Kit driver. To begin, open Xcode and create a new project\
    \ based on the \"IOKit Driver\" template. When prompted for a product name, enter\
    \ \"IOKitTest\". You can use the company identifier \"com.osxkernel\", which is\
    \ a domain name that has been registered for the purposes of this book. Xcode\
    \ will create a project for you with two files, a C++ implementation file named\
    \ \"IOKitTest.cpp\" and its corresponding header file named \"IOKitTest.h\".\n\
    \nLet's begin by declaring the class definition of our driver. Given that we are\
    \ implementing a generic driver, and not one that provides specialized functionality\
    \ such as a serial port or disk storage, we will define our driver's main class\
    \ as a subclass of `IOService` and not one of the more specialized classes that\
    \ the I/O Kit provides. Enter in the text from [Listing 4-2](#Chapter04.html#list_4_2)\
    \ as the contents of `IOKitTest.h`.\n\n### Listing 4-2. The \"IOKitTest.h\" Tutorial\n\
    \n```\n#include <IOKit/IOService.h>\n\nclass com_osxkernel_driver_IOKitTest :\
    \ public IOService\n{\n    OSDeclareDefaultStructors(com_osxkernel_driver_IOKitTest)\n\
    \npublic:\n    virtual bool    init (OSDictionary* dictionary = NULL);\n    virtual\
    \ void    free (void);\n\n    virtual IOService*      probe (IOService* provider,\
    \ SInt32* score);\n    virtual bool    start (IOService* provider);\n    virtual\
    \ void    stop (IOService* provider);\n};\n```\n\nThe contents of the header file\
    \ should be fairly straightforward, with the possible exception of the macro `OSDeclareDefaultStructors`.\
    \ As you will recall from [Chapter 3](#Chapter03.html#ch3), the I/O Kit is implemented\
    \ in a subset of the C++ language that does not include exceptions and runtime\
    \ type information. The macro `OSDeclareDefaultStructors` is needed as a consequence\
    \ of both of these limitations; it provides the declaration of the class's constructor\
    \ and destructor and metadata that provides the custom implementation of the I/O\
    \ Kit's version of runtime type information. We discuss this in greater depth\
    \ later in this chapter.\n\n![images](images/square.jpg) **Note** You may be wondering\
    \ why we used such an elaborate name for our class. The kernel has a global namespace\
    \ into which all symbols (including class names, functions, and global variables)\
    \ exported by any active kernel extensions are loaded. The kernel will refuse\
    \ to load an extension that contains symbols that collide with an extension that\
    \ is already loaded, and so to avoid this, Apple recommends that all global functions,\
