  trans: '

    ### 配置主机


    搭建目标系统很简单，但主机需要多做些准备。在开始调试前，您需要为目标系统所使用的内核版本下载正确的内核调试套件（Kernel Debug Kit）。苹果公司似乎不会及时为每个编译版本发布对应的套件，因此您可能需要降级或升级目标系统，以匹配已发布的某个内核调试套件版本。如果使用了错误的版本，GDB
    可能无法解析正确的符号和数据结构，从而导致错误结果和严重混乱，例如出现不应被调用的函数被调用的情况。


    ![images](img/square.jpg) **提示** 内核调试套件不属于 Xcode 组件，可从 [`http://developer.apple.com/hardwaredrivers/download/kerneldebugkits.html`](http://developer.apple.com/hardwaredrivers/download/kerneldebugkits.html)
    下载。该页面包含旧版套件，而较新的版本则发布在 Apple 开发者网站的 *下载* ![Images](img/U001.jpg) *开发者工具* 部分。此页面仅供
    Mac 开发者计划成员访问（成为会员需要缴纳年费）。


    内核调试套件包含以下内容：


    -   内核调试版本（`mach_kernel`）

    -   I/O Kit 框架及选定 KEXT 的调试版本

    -   符号文件

    -   各种脚本

    -   GDB 宏


    ![images](img/square.jpg) **警告** 请勿将内核调试套件中的文件替换到您的系统上；这些文件无需安装在目标系统或主机上。实际上，您无需安装套件中的任何文件，直接通过挂载的映像访问即可。


    您可以将 Mac OS X 系统的默认内核（`mach_kernel`）替换为内核调试套件中的调试版本。由于优化已被禁用，这将帮助您获得更准确的结果和堆栈跟踪。


    如果您在主机上安装了 XNU 内核的源代码，还可以将其链接到调试器，从而在调试器中查看源代码而非汇编代码；不过，如果您仅仅调试自己的扩展程序，通常不需要这样做（这种情况下，您只需链接自己扩展程序的源代码即可）。


    ### 连接到远程目标


    如果在目标系统上使用 `nvram` 命令设置了合适的引导参数，并在主机上准备好了内核调试套件，您现在就可以通过按下目标系统的电源按钮来触发一个非屏蔽中断（NMI）事件。这应该在屏幕左上角显示以下文本：


    ```

    Debugger called: <Button SCI>

    ethernet MAC address: 00:16:cb:a6:74:8b

    ip address: 192.168.1.1


    Waiting for remote debugger connection.

    ```


    启动 GDB 并连接到远程目标可通过以下步骤完成：


    ```

    $ gdb -arch i386 /Volumes/KernelDebugKit/mach_kernel

    ```


    如果调试主机与目标系统的架构不同，可以指定 `arch` 参数。例如，在本例中，我们正在调试一个运行 32 位内核的目标系统，而主机运行的是 64 位内核。您也可以通过指定
    `x86_64` 来进行反向操作。


    ```

    (gdb) source /Volumes/KernelDebugKit/kgmacros

    ```


    上一行将加载专门的 GDB 宏，这些宏将帮助您检查目标系统内核的状态。例如，您可以转储正在运行的任务或线程列表。输入 `help kgm` 可获取所有可用宏的完整列表。


    要连接目标，请使用以下命令：


    ```

    (gdb) target remote-kdp

    (gdb) attach 192.168.1.1

    Connected.

    (gdb)

    ```


    上述命令将连接到远程目标，这样我们就可以开始调试会话。然后我们可以开始发出命令，例如，使用 `bt` 获取堆栈跟踪，其输出将类似于以下内容：


    ```

    #0  Debugger (message=0xba97e4 "Button SCI") at /SourceCache/xnu/xnu-

    1504.15.3/osfmk/i386/AT386/model_dep.c:867

    #1  0x00ba8de3 in ?? ()

    #2  0x00556636 in IOFilterInterruptEventSource::normalInterruptOccurred (this=0x4eab980)
    at

    /SourceCache/xnu/xnu-1504.15.3/iokit/Kernel/IOFilterInterruptEventSource.cpp:140

    #3  0x00b73a50 in ?? ()

    #4  0x00b72ccd in ?? ()

    #5  0x00b85fc5 in ?? ()

    #6  0x00b89621 in ?? ()

    #7  0x0056ac20 in IOSharedInterruptController::handleInterrupt (this=0x4e9cd80,

    nub=0x4e9cd80) at /SourceCache/xnu/xnu-1504.15.3/iokit/Kernel/IOInterruptController.cpp:727

    #8  0x00bcf5bb in ?? ()

    #9  0x00b66213 in ?? ()

    #10 0x00b71911 in ?? ()

    #11 0x00580d96 in PE_incoming_interrupt (interrupt=73) at /SourceCache/xnu/xnu-

    1504.15.3/pexpert/i386/pe_interrupt.c:65

    #12 0x002ab432 in interrupt (state=0x4e9dd20) at /SourceCache/xnu/xnu-

    1504.15.3/osfmk/i386/trap.c:511

    #13 0x002a1c2e in lo_allintrs () at cpu_data.h:397

    #14 0x00225bba in processor_idle (thread=0x10bff0, processor=0x4cf0dac) at

    /SourceCache/xnu/xnu-1504.15.3/osfmk/kern/sched_prim.c:2982

    #15 0x0022698c in thread_select (thread=0x5e407a8, processor=<value temporarily
    unavailable,

    due to optimizations>) at /SourceCache/xnu/xnu-1504.15.3/osfmk/kern/sched_prim.c:1327

    #16 0x002275b0 in thread_block_reason (continuation=0, parameter=0x0, reason=<value

    temporarily unavailable, due to optimizations>) at /SourceCache/xnu/xnu-

    1504.15.3/osfmk/kern/sched_prim.c:1856

    #17 0x00227654 in thread_block (continuation=0) at /SourceCache/xnu/xnu-

    1504.15.3/osfmk/kern/sched_prim.c:1875

    #18 0x464debbc in ?? ()

    ```


    该命令将显示内核堆栈，即 NMI 事件发生时 CPU 正在执行的函数调用序列。我们从中可以看到，系统在中断前所做的最后一件事是响应 NMI 中断。如果您好奇当时其他
    CPU（核心）在做什么，可以发出 `showcurrentstacks` 命令，该命令将打印系统中每个 CPU（核心）的堆栈跟踪。


    现在您可以设置断点或检查内核状态。发出 `continue` 命令将恢复内核运行。我们将在本章后面更详细地探讨如何使用 GDB。

    '
- fmt: '# Debugging Using FireWire


    In addition to Ethernet, the Kernel Debugging Protocol can also be used over FireWire,
    using the `FireWireKDP` mechanism. The `fwkdp` tool can be used to help set the
    appropriate debug parameters, but you can also set them manually. `FireWireKDP`
    is also compatible with logging over FireWire and can be used to transmit core
    dumps to a remote system.


    To configure `FireWireKDP` on the target system, you can do as follows:


    ```

    $ sudo fwkdp --setargs

    FireWire KDP Tool (v1.3)

    Boot-args helper mode:

    *** Would you like to enable kernel core dumps? y|[n] > y

    Setting boot-args with ''sudo nvram boot-args="debug=0xd46 kdp_match_name=firewire

    _panicd_ip=1.2.3.4"''

    Setting boot-args... done.

    Restart for the nvram changes to take effect.

    ```


    ![images](images/square.jpg) **Tip** The manual (man) page for `fwkdp` has more
    info.


    On the host system, where you will run the debugger, you will need to run `fwkdp`
    as well. Be sure to start it in proxy mode. Once that is done, you can use `GDB`
    to debug in the same way as with Ethernet. The process of attaching to the remote
    target is nearly identical; the only major difference is that you attach to **localhost**,
    not the target’s IP address. Once the target system is rebooted, you can enter
    the debugger by pressing the power button to generate an `NMI` event as before,
    which should give the following results on the target’s screen:


    ---


    ```

    Debugger Called: <Button SCI>

    Entering system dump routine

    Attempting connection to panic server configured at 1.2.3.4 port 1069

    AppleFWOHCI_KDP: Darwin Kernel Version 10.8.0: Tue Jun 7 16:33:36 PDT 2011; root:xnu-

    1504.15.3~1/RELEASE_i386

    AppleFWOHCI_KDP: v4.7.3 configured as KDP sender/receiver.

    Recevied a debugger packet, transferring control to the debugger

    Transmitting packets to link level address: 00:1c:df:f7:e0:72

    Kernel map size is 1187131392

    Sending write request for core-xnu-1504.15.3-0.0.0.0-ff28cfb5

    Kernel map has 850 entries

    Generated Mach-O header size was 79932

    Transmitting kernel state, please wait: ……

    Total number of packets transmitted: 502848

    Waiting for remote debugger connection.

    Connected to remote debugger.

    ```


    ---


    If all goes well, the `fwkdp` proxy running on the host will download the core
    file to its working directory. The core dump in the preceding example was named
    `core-xnu-1504.15.3-0.0.0.0-ff28cfb5`. After the core is downloaded, the remote
    system will wait for a debugger to be attached.


    ## Live Debugging of a Running Kernel


    A less known but powerful feature available in Mac OS X (since version 10.5) is
    the ability to attach the debugger to a running system. Live debugging requires
    you to enable support for the `/dev/kmem` character device file, which allows
    a user space process to read and write to the kernel’s memory address space. You
    can enable support for `/dev/kmem` with the following command:


    ```

    $ sudo nvram boot-args="kmem=1"

    ```


    ![images](images/square.jpg) **Note** The preceding command will clear existing
    boot arguments, so you would need to add this in addition to any other arguments
    you want, for example, to enable remote debugging or FireWire logging.


    You can test if it worked by checking that the `/dev/kmem` file is present after
    a reboot. The process of attaching to the live kernel is similar to that of attaching
    to a remote target. The steps are as follows:


    ```

    $ sudo gdb /Volumes/KernelDebugKit/mach_kernel


    (gdb) target darwin-kernel

    (gdb) source /Volumes/KernelDebugKit/kgmacros

    Loading Kernel GDB Macros package. Type "help kgm" for more info.


    (gdb) attach

    Connected.

    ```


    At this point, you can examine the state of the kernel, for example, using the
    `showcurrentthreads` command.


    Live debugging is useful in a number of cases, for example, if an application
    using your driver hangs in the kernel while executing a user client method. You
    can attach to the kernel and find out where the issue is. You can also examine
    the memory of your driver and its data structures. Live debugging can only be
    used when the system is operational and cannot be used to debug a crashed or deadlocked
    system.


    ## Debugging Using a Virtual Machine


    If you do not have a second machine available, it is possible to perform kernel
    debugging using a virtual machine. Software such as VMware Fusion or Parallels
    Desktop allows another copy of Mac OS X to run virtualized. Enabling the kernel
    debug features on the virtual machine can be done by putting the desired boot
    arguments in the `/Library/Preferences/SystemConfiguration/com.apple.Boot.plist`.
    Debugging hardware drivers may not be possible under a virtual machine, as you
    cannot use PCI or Thunderbolt devices directly under a virtual machine. However,
    it is possible to assign USB devices to a virtual machine instance. Mac OS X Lion
    is able to run as a virtualized instance, however, prior to that, only the server
    version of Mac OS X could be virtualized.


    ## Debugging in the Kernel Using GDB


    There are several ways `GDB` can be used to debug the kernel or KEXTs loaded into
    it, such as:


    - Remotely over Ethernet

    - Remotely over FireWire

    - On a captured core dump file

    - On a live system

    - Using a virtual machine


    Additionally, a kernel can drop into the debugger in the following ways:


    - Because of a kernel panic

    - Manually triggered `NMI` event

    - Because the `DB_HALT` option was set to halt the system at boot and enter the
    debugger

    - Programmatically in code by calling the `PE_enter_debugger()` function


    Programmatically entering the debugger is only possible with a remote debugging
    setup; live debugging cannot occur during boot, when the system is crashed, or
    halted with an `NMI` event, nor programmatically, as this stops the system until
    a remote debugger is attached and thereby the `gdb` instance running the debugging
    session as well.


    ### Kernel GDB Macros


    The Kernel Debug Kit comes with a wealth of helpful `GDB` macro functions, which
    greatly simplify the task of examining the kernel. The macros can help interpret
    common kernel data structures, such as task and thread descriptors, and memory-related
    data structures, such as VM maps. Furthermore, it provides functions for accessing
    PCI configuration space, I/O space, and un-translated access to physical memory.
    A small subset of available macros is shown in [Table 16-3](#Chapter16.html#tab_16_3).


    ![Images](images/t1603.jpg)'
  raw: '##### Debugging Using FireWire


    In addition to Ethernet, the Kernel Debugging Protocol can also be used over FireWire,
    using the FireWireKDP mechanism. The `fwkdp` tool can be used to help set the
    appropriate debug parameters, but you can also set them manually. FireWireKDP
    is also compatible with logging over FireWire and can be used to transmit core
    dumps to a remote system.


    To configure FireWireKDP on the target system, you can do as follows:


    `$` **`sudo fwkdp --setargs`**

    `FireWire KDP Tool (v1.3)`

    `Boot-args helper mode:`

    `*** Would you like to enable kernel core dumps? y|[n] >` **`y`**

    `Setting boot-args with ''sudo nvram boot-args="debug=0xd46 kdp_match_name=firewire`

    `_panicd_ip=1.2.3.4"''`

    `Setting boot-args... done.`

    `Restart for the nvram changes to take effect.`


    ![images](images/square.jpg) **Tip** The manual (man) page for `fwkdp` has more
    info.


    On the host system, where you will run the debugger, you will need to run `fwkdp`
    as well. Be sure to start it in proxy mode. Once that is done, you can use GDB
    to debug in the same way as with Ethernet. The process of attaching to the remote
    target is nearly identical; the only major difference is that you attach to ***localhost***,
    not the target’s IP address. Once the target system is rebooted, you can enter
    the debugger by pressing the power button to generate an NMI event as before,
    which should give the following results on the target’s screen:


    * * *


    `Debugger Called: <Button SCI>`

    `Entering system dump routine`

    `Attempting connection to panic server configured at 1.2.3.4 port 1069`

    `AppleFWOHCI_KDP: Darwin Kernel Version 10.8.0: Tue Jun 7 16:33:36 PDT 2011; root:xnu-`

    `1504.15.3~1/RELEASE_i386`

    `AppleFWOHCI_KDP: v4.7.3 configured as KDP sender/receiver.`

    `Recevied a debugger packet, transferring control to the debugger`

    `Transmitting packets to link level address: 00:1c:df:f7:e0:72`

    `Kernel map size is 1187131392`

    `Sending write request for core-xnu-1504.15.3-0.0.0.0-ff28cfb5`

    `Kernel map has 850 entries`

    `Generated Mach-O header size was 79932`

    `Transmitting kernel state, please wait: ……`

    `Total number of packets transmitted: 502848`

    `Waiting for remote debugger connection.`

    `Connected to remote debugger.`


    * * *


    If all goes well, the `fwkdp` proxy running on the host will download the core
    file to its working directory. The core dump in the preceding example was named
    `core-xnu-1504.15.3-0.0.0.0-ff28cfb5`. After the core is downloaded, the remote
    system will wait for a debugger to be attached.


    #### Live Debugging of a Running Kernel


    A less known but powerful feature available in Mac OS X (since version 10.5) is
    the ability to attach the debugger to a running system. Live debugging requires
    you to enable support for the `/dev/kmem` character device file, which allows
    a user space process to read and write to the kernel’s memory address space. You
    can enable support for `/dev/kmem` with the following command:


    `$` **`sudo nvram boot-args=”kmem=1”`**


    ![images](images/square.jpg) **Note** The preceding command will clear existing
    boot arguments, so you would need to add this in addition to any other arguments
    you want, for example, to enable remote debugging or FireWire logging.


    You can test if it worked by checking that the `/dev/kmem` file is present after
    a reboot. The process of attaching to the live kernel is similar to that of attaching
    to a remote target. The steps are as follows:


    `$` **`sudo gdb /Volumes/KernelDebugKit/mach_kernel`**


    `(gdb`**`) target darwin-kernel`**

    `(gdb)` **`source /Volumes/KernelDebugKit/kgmacros`**

    `Loading Kernel GDB Macros package. Type "help kgm" for more info.`


    `(gdb)` **`attach`**

    `Connected.`


    At this point, you can examine the state of the kernel, for example, using the
    `showcurrentthreads` command.


    Live debugging is useful in a number of cases, for example, if an application
    using your driver hangs in the kernel while executing a user client method. You
    can attach to the kernel and find out where the issue is. You can also examine
    the memory of your driver and its data structures. Live debugging can only be
    used when the system is operational and cannot be used to debug a crashed or deadlocked
    system.


    #### Debugging Using a Virtual Machine


    If you do not have a second machine available, it is possible to perform kernel
