- fmt: "如果一个控制请求接受不同类型的参数，那么定义一个包含所有提供给用户客户端的参数的结构体，以及一个用于接收方法返回结果的结构体，可能会更自然。I/O\
    \ Kit 框架提供的`IOConnectCallStructMethod()`函数实现了这一点：\n\n```\nkern_return_t   IOConnectCallStructMethod(\n\
    \                        io_connect_t    connection,\n                       \
    \ uint32_t        selector,\n                        const void*     inputStruct,\n\
    \                        size_t          inputStructSize,\n                  \
    \      void*           outputStruct,\n                        size_t*        \
    \ outputStructSize);\n```\n\n指向包含输入参数的结构体的指针通过`inputStruct`参数提供，输入结构体的字节大小通过`inputStructSize`参数传递。与标量函数一样，`outputStructSize`参数既是输入参数也是输出参数。调用者将其初始化设为`outputStruct`缓冲区的最大字节大小；完成后，用户客户端通过`outputStructSize`参数返回写入`outputStruct`缓冲区的字节数。\n\
    \n您可能想知道为什么返回的结构体大小会与输出结构体的预期大小不同。函数`IOConnectCallStructMethod()`可用于从用户客户端读取可变长度数组或可变长度字符串。在这些情况下，调用者事先不知道将返回多少字节。如果控制请求不需要输入结构体，则可以将`NULL`作为`inputStruct`参数传递，并将`inputStructSize`设为0字节。如果控制请求不返回输出结构体，则可以为`outputStruct`和`outputStructSize`参数都传递`NULL`。\n\
    \nI/O Kit 框架还允许混合使用标量参数和结构体参数，适用于那些既有基于整数的输入或输出参数，又需要输入或输出结构体参数的函数：\n\n```\nkern_return_t\
    \   IOConnectCallMethod(\n                        io_connect_t    connection,\n\
    \                        uint32_t        selector,\n                        const\
    \ uint64_t* inputValues,\n                        uint32_t        inputCount,\n\
    \                        const void*     inputStruct,\n                      \
    \  size_t          inputStructSize,\n                        uint64_t*       outputValues,\n\
    \                        uint32_t*       outputCount,\n                      \
    \  void*           outputStruct,\n                        size_t*         outputStructSize);\n\
    ```\n\n尽管 I/O Kit 框架提供了三个用于调用用户客户端方法的函数，但`IOConnectCallScalarMethod()`和`IOConnectCallStructMethod()`仅仅是基于`IOConnectCallMethod()`构建的便捷函数。\n\
    \n鉴于 I/O Kit 框架提供了三种调用用户客户端方法的方式，我们来看看如何为示例驱动程序实现用户空间接口。`StartTimer()`和`StopTimer()`函数不向用户客户端传递额外参数，因此它们可以通过调用三个`IOConnectCallXXX()`函数中的任何一个来实现。我们选择使用`IOConnectCallMethod()`函数来实现`StartTimer()`和`StopTimer()`。`StartTimer()`的用户空间实现如下：\n\
    \n```\nkern_return_t   StartTimer (io_connect_t connection)\n{\n        return\
    \ IOConnectCallMethod(connection, kTestUserClientStartTimer,\n               \
    \                 NULL, 0, NULL, 0, NULL, NULL, NULL, NULL);\n}\n```\n\n`GetElapsedTimerTime()`的实现从用户客户端读取一个32位整数，因此使用`IOConnectCallScalarMethod()`函数来实现它似乎很自然。I/O\
    \ Kit 用于表示标量值的整数类型是64位无符号整数，而不是调用者期望的32位值，因此我们需要通过一个临时的64位变量对从用户客户端接收到的结果进行类型转换。在`IOConnectCallScalarMethod()`函数完成后，我们不会检查`scalarOutCount`的值，因为如果操作成功完成，我们可以信赖驱动程序的实现返回了一个整数。\n\
    \n```\nkern_return_t   GetElapsedTimerTime (io_connect_t connection, uint32_t*\
    \ timerTime)\n{\n        uint64_t                scalarOut[1];\n        uint32_t\
    \                scalarOutCount;\n        kern_return_t           result;\n\n\
    \        scalarOutCount = 1;     // 初始化为 scalarOut 数组的大小\n        result = IOConnectCallScalarMethod(connection,\
    \ kTestUserClientGetElapsedTimerTime,\n                                      \
    \  NULL, 0, scalarOut, &scalarOutCount);\n        if (result == kIOReturnSuccess)\n\
    \                *timerTime = (uint32_t)scalarOut[0];\n\n        return result;\n\
    }\n```\n\n最后，我们来看看用户空间库中`DelayForTime()`函数的实现。该函数通过结构体将其参数传递给用户客户端，因此我们使用`IOConnectCallStructMethod()`函数来实现它。\n\
    \n```\nkern_return_t   DelayForTime (io_connect_t connection, const TimerValue*\
    \ timerValue)\n{\n        return IOConnectCallStructMethod(connection, kTestUserClientDelayForTime,\n\
    \                                        timerValue, sizeof(TimerValue), NULL,\
    \ 0);\n}\n```\n\n来自用户空间应用程序的所有请求都将调用用户客户端类中名为`externalMethod()`的方法，该方法负责调度适当的方法来处理控制请求并解包用户空间应用程序提供的参数。`IOUserClient`基类提供了`externalMethod()`的实现；然而，任何为控制请求提供支持的用户客户端都应当重写基类的实现。在进一步研究驱动程序用户客户端应如何实现`externalMethod()`之前，值得先看看它的接口：\n\
    \n```\nIOReturn IOUserClient::externalMethod (uint32_t selector, IOExternalMethodArguments*\
    \ args,\n                        IOExternalMethodDispatch* dispatch, OSObject*\
    \ target,\n                        void* reference);\n```\n\n当 I/O Kit 调用您类的`externalMethod()`实现时，只会填充前两个参数；`dispatch`、`target`和`reference`的值都将被设置为`NULL`。第一个参数`selector`是一个32位的控制代码，用于指定客户端应用程序请求的操作。下一个参数`args`包含应用程序传递给用户客户端的所有标量和结构体参数。`IOExternalMethodArguments`结构体的定义如下所示，为了清晰起见，省略了一些字段：\n\
    \n```\nstruct IOExternalMethodArguments\n{\n        …\n        const uint64_t*\
    \         scalarInput;\n        uint32_t                scalarInputCount;\n\n\
    \        const void*             structureInput;\n        uint32_t           \
    \     structureInputSize;\n\n        IOMemoryDescriptor*     structureInputDescriptor;\n\
    \n        uint64_t*               scalarOutput;\n        uint32_t            \
    \    scalarOutputCount;\n\n        void*                   structureOutput;\n\
    \        uint32_t                structureOutputSize;\n\n        IOMemoryDescriptor*\
    \     structureOutputDescriptor;\n        uint32_t                structureOutputDescriptorSize;\n\
    };\n```"
  raw: 'If a control request takes parameters of different types, it may be more natural
    to define a structure that combines all of the parameters that are provided to
    the user client and a structure to receive the result of the method. This is provided
    by the I/O Kit framework''s `IOConnectCallStructMethod()` function:


    `kern_return_t   IOConnectCallStructMethod(`

    `                        io_connect_t    connection,`

    `                        uint32_t        selector,`

    `                        const void*     inputStruct,`

    `                        size_t          inputStructSize,`

    `                        void*           outputStruct,`

    `                        size_t*         outputStructSize);`


    A pointer to the structure containing the input parameters is provided through
    the `inputStruct` argument, and the size of the input structure in bytes is passed
    as the `inputStructSize` argument. As with the scalar function, the argument `outputStructSize`
    is both an input and an output argument. The caller initializes its value to the
    maximum size in bytes of the `outputStruct` buffer and, on completion, the user
    client returns through the `outputStructSize` argument the number of bytes written
    to the `outputStruct` buffer.


    You may be wondering why the size of the returned structure would ever differ
    from the expected size of the output structure. The function `IOConnectCallStructMethod()`
    may be used to read a variable-length array or a variable-length string from the
    user client. In these instances, the caller doesn''t know beforehand the number
    of bytes that will be returned. If the control request takes no input structure,
    then `NULL` can be passed as the `inputStruct` argument with an `inputStructSize`
    of 0 bytes. If the control request returns no output structure, then `NULL` can
    be passed for both the `outputStruct` and the `outputStructSize` arguments.


    The I/O Kit framework also allows a mix of both scalar parameters and structure
    parameters for functions that have some integer-based input or output parameters,
    as well as requiring an input or output structure parameter:


    `kern_return_t   IOConnectCallMethod(`

    `                        io_connect_t    connection,`

    `                        uint32_t        selector,`

    `                        const uint64_t* inputValues,`

    `                        uint32_t        inputCount,`

    `                        const void*     inputStruct,`

    `                        size_t          inputStructSize,`

    `                        uint64_t*       outputValues,`

    `                        uint32_t*       outputCount,`

    `                        void*           outputStruct,`

    `                        size_t*         outputStructSize);`


    Although the I/O Kit framework provides three functions for calling user client
    methods, the functions `IOConnectCallScalarMethod()` and `IOConnectCallStructMethod()`
    are merely convenience functions that are built on top of `IOConnectCallMethod()`.


    Given the three methods that the I/O Kit framework provides for calling user client
    methods, let''s look at how we can implement the user space interface for our
    sample driver. The functions `StartTimer()` and `StopTimer()` pass no additional
    parameters to the user client, so they could be implemented by calling any of
    the three `IOConnectCallXXX()` functions. We have chosen to implement `StartTimer()`
    and `StopTimer()` using the `IOConnectCallMethod()` function. The user space implementation
    for `StartTimer()` is as follows:


    `kern_return_t   StartTimer (io_connect_t connection)`

    `{`

    `        return IOConnectCallMethod(connection, kTestUserClientStartTimer,`

    `                                NULL, 0, NULL, 0, NULL, NULL, NULL, NULL);`

    `}`


    The implementation of `GetElapsedTimerTime()` reads a 32-bit integer from the
    user client, and so it seems natural to implement it using the function `IOConnectCallScalarMethod()`.
    The integer type used to represent scalar values used by the I/O Kit is a 64-bit
    unsigned integer and not the 32-bit value that our caller is expecting so we need
    to thunk the result that is received from the user client through a temporary
    64-bit variable. We don''t check the value of `scalarOutCount` after the `IOConnectCallScalarMethod()`
    function completes, because we can trust our driver''s implementation to have
    returned a single integer if the operation completes successfully.


    `kern_return_t   GetElapsedTimerTime (io_connect_t connection, uint32_t* timerTime)`

    `{`

    `        uint64_t                scalarOut[1];`

    `        uint32_t                scalarOutCount;`

    `        kern_return_t           result;`


    `        scalarOutCount = 1;     // Initialize to the size of scalarOut array`

    `        result = IOConnectCallScalarMethod(connection, kTestUserClientGetElapsedTimerTime,`

    `                                        NULL, 0, scalarOut, &scalarOutCount);`

    `        if (result == kIOReturnSuccess)`

    `                *timerTime = (uint32_t)scalarOut[0];`


    `        return result;`

    `}`


    Finally, let''s take a look at the implementation of the function `DelayForTime()`
    in our user space library. This function passes its parameters to the user client
    through a structure, so we have implemented it using the function `IOConnectCallStructMethod()`.


    `kern_return_t   DelayForTime (io_connect_t connection, const TimerValue* timerValue)`

    `{`

    `        return IOConnectCallStructMethod(connection, kTestUserClientDelayForTime,`

    `                                        timerValue, sizeof(TimerValue), NULL,
    0);`

    `}`


    All requests from a user space application will invoke a method named `externalMethod()`
    in the user client class, which has the responsibility of dispatching the appropriate
    method to handle the control request and unpacking the parameters that were provided
    by the user space application. The `IOUserClient` base class provides an implementation
    of `externalMethod()`; however, any user client that provides support for control
    requests should override the base class''s implementation. Before looking any
    further into how a driver''s user client should implement `externalMethod()`,
    it is worth taking a look at its interface:


    `IOReturn IOUserClient::externalMethod (uint32_t selector, IOExternalMethodArguments*
    args,`

    `                        IOExternalMethodDispatch* dispatch, OSObject* target,`

    `                        void* reference);`


    When the I/O Kit calls your class''s implementation of `externalMethod()`, only
    the first two arguments will be filled in; the value of `dispatch`, `target,`
    and `reference` will all be set to `NULL`. The first argument, `selector`, is
    the 32-bit control code that specifies which operation the client application
    is requesting. The next argument, `args`, contains all of the scalar and structure
    parameters that the application passed to the user client. The definition of the
    `IOExternalMethodArguments` structure is shown in the following listing, with
    some fields omitted for clarity:


    `struct IOExternalMethodArguments`

    `{`

    `        …`

    `        const uint64_t*         scalarInput;`

    `        uint32_t                scalarInputCount;`


    `        const void*             structureInput;`

    `        uint32_t                structureInputSize;`


    `        IOMemoryDescriptor*     structureInputDescriptor;`


    `        uint64_t*               scalarOutput;`

    `        uint32_t                scalarOutputCount;`


    `        void*                   structureOutput;`

    `        uint32_t                structureOutputSize;`


    `        IOMemoryDescriptor*     structureOutputDescriptor;`

    `        uint32_t                structureOutputDescriptorSize;`

    `};`'
