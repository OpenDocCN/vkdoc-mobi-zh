  raw: '![images](images/square.jpg) **Tip** A common cause of problems with device
    notification callbacks is failing to empty the iterator by calling `IOIteratorNext()`
    until 0 is returned. Once the end of the iterator is reached, the iterator is
    re-armed and the callback is enabled.


    For hardware devices that have a kernel driver, user space applications will control
    the hardware by sending control requests to the driver rather than interacting
    with the hardware device directly. In this case, the application isn''t so much
    interested in the arrival of a particular hardware device as it is interested
    in when the driver for the hardware has loaded. This can be performed by creating
    a dictionary that matches the class name of the driver using the function `IOServiceMatching()`.
    For example, to create a dictionary that will match against the sample I/O Kit
    driver that was developed in [Chapter 4](#Chapter04.html#ch4), an application
    would use the following code:


    `IOServiceMatching("com_osxkernel_driver_IOKitTest");`


    The reverse-DNS naming scheme ensures that the driver''s class name is unique,
    which means that any driver that matches the matching dictionary is guaranteed
    to be our driver.


    ### Observing Device Removal


    As well as watching for the arrival of devices, an application may wish to watch
    for a device being removed from the system, such as a USB device being unplugged.
    Unlike device arrival messages, which are delivered for any device that meets
    the criteria described by a matching dictionary, a device removal message is delivered
    only for a particular device that the application has registered an interest in.
    An application will typically register an interest in all devices that it has
    opened, since the application will want to respond to the removal of a device
    that it is accessing.


    In our previous code examples, such as [Listing 5-3](#Chapter05.html#list_5_3),
    we obtained a reference to a driver object, read properties from the driver, and
    then released the driver object, all within the one function. It is far more common
    that an application will hold on to the driver object beyond the device arrival
    callback function, perhaps only releasing it when the application exits or the
    device is removed.


    ![images](images/square.jpg) **Note** In our previous examples, we were able to
    use the local variables of a function to hold the driver object, since the driver
    was released before we returned from the function. However, if an application
    wishes to use the driver object after returning from the function, it will need
    to allocate a structure on the heap to hold the driver state.


    Having obtained a reference to a driver instance, an application can register
    to receive notifications when the driver''s state changes, including when the
    driver has terminated in response to its hardware device being removed. This notification
    callback is installed by calling the function named `IOServiceAddInterestNotification()`,
    which is defined in the I/O Kit framework. As with the notification for device
    arrival, the application needs to provide a port on which the I/O Kit will signal
    the application when the driver''s state has changed. This can be created with
    the function `IONotificationPortCreate()`, as was shown in [Listing 5-2](#Chapter05.html#list_5_2).
    If the application has already created a notification port for device arrival
    events, it can share that same notification port and its corresponding run loop
    source to receive device removal notifications. This is done by passing the existing
    notification port to the function `IOServiceAddInterestNotification()`.


    When the application receives a notification that a driver instance has terminated,
    it should release its reference to that driver and take any action that is necessary
    to inform the user that the device has been removed.


    [Listing 5-4](#Chapter05.html#list_5_4) demonstrates a modification to the `DeviceAdded()`
    function from [Listing 5-3](#Chapter05.html#list_5_3) that creates a structure
    to represent an instance of a driver within the application and then installs
    a callback to receive notifications from the driver (such as driver termination).


    ***Listing 5-4.** Code Snippet Demonstrating How an Application Can Install a
    Callback Function To Receive a Notification When a Driver Terminates*


    `#include <IOKit/IOMessage.h>`


    `// Structure to describe a driver instance.`

    `typedef struct {`

    `        io_service_t    service;`

    `        io_object_t     notification;`

    `} MyDriverData;`


    `// Notification port used for both device arrival and driver state changes.`

    `IONotificationPortRef   gNotificationPort = NULL;`


    `void DeviceAdded (void* refCon, io_iterator_t iterator)`

    `{`

    `        io_service_t            service = 0;`


    `        // Iterate over all matching objects.`

    `        while ((service = IOIteratorNext(iterator)) != 0)`

    `        {`

    `                MyDriverData*   myDriverData;`

    `                kern_return_t   kr;`


    `                // Allocate a structure to hold the driver instance.`

    `                myDriverData = (MyDriverData*)malloc(sizeof(MyDriverData));`

    `                // Save the io_service_t for this driver instance.`

    `                myDriverData->service = service;`


    `                // Install a callback to receive notification of driver state
    changes.`

    `                kr = IOServiceAddInterestNotification(gNotificationPort,`

    `                                        service,                        // driver
    object`

    `                                        kIOGeneralInterest,`

    `                                        DeviceNotification,             // callback`

    `                                        myDriverData,           // refCon passed
    to callback`

    `                                        &myDriverData->notification);`

    `        }`

    `}`


    `void DeviceNotification (void* refCon, io_service_t service, natural_t messageType,`

    `     void* messageArgument)`

    `{`

    `        MyDriverData*   myDriverData = (MyDriverData*)refCon;`

    `        kern_return_t   kr;`


    `        // Only handle driver termination notifications.`

    `        if (messageType == kIOMessageServiceIsTerminated)`

    `        {`

    `                // Print the name of the removed device.`

    `                io_name_t       name;`

    `                IORegistryEntryGetName(service, name);`

    `                printf("Device removed: %s\n", name);`


    `                // Remove the driver state change notification.`

    `                kr = IOObjectRelease(myDriverData->notification);`


    `                // Release our reference to the driver object.`

    `                IOObjectRelease(myDriverData->service);`


    `                // Release our structure that holds the driver connection.`

    `                free(myDriverData);`

    `        }`

    `}`'
  trans: "\n![images](img/square.jpg) **提示** 设备通知回调出现问题的常见原因，是在调用`IOIteratorNext()`返回`0`之前未能清空迭代器。一旦到达迭代器末尾，迭代器便会重新激活，并且回调功能也会启用。\n\
    \n对于拥有内核驱动程序的硬件设备，用户空间应用程序将通过向驱动程序发送控制请求来操控硬件，而非直接与硬件设备交互。在这种情况下，应用程序关注的并非特定硬件设备的接入，而是该硬件驱动程序何时完成加载。这可以通过使用`IOServiceMatching()`函数创建一个与驱动程序类名匹配的字典来实现。例如，要创建一个与第\
    \ 4 章中开发的示例 I/O Kit 驱动程序相匹配的字典，应用程序应使用以下代码：\n\n`IOServiceMatching(\"com_osxkernel_driver_IOKitTest\"\
    );`\n\n这种反向 DNS 命名方案确保了驱动程序类名的唯一性，这意味着任何与匹配字典相匹配的驱动程序都必定是我们的驱动程序。\n\n### 监测设备移除\n\
    \n除了监测设备接入，应用程序可能还希望监测设备从系统中移除的情况，例如 USB 设备被拔出。与设备接入消息不同（只要设备符合匹配字典描述的条件就会发送），设备移除消息仅针对应用程序已注册关注兴趣的特定设备发送。应用程序通常会注册关注其已打开的所有设备，因为它需要响应正在访问的设备的移除事件。\n\
    \n在我们之前的代码示例中，例如代码清单 5-3，我们在同一个函数内获取驱动程序对象的引用、读取其属性，然后释放该对象。更常见的情况是，应用程序会在设备接入回调函数之后仍然持有驱动程序对象的引用，可能直到应用程序退出或设备被移除时才释放。\n\
    \n![images](img/square.jpg) **注意** 在前面的示例中，我们能够使用函数的局部变量来保存驱动程序对象，因为我们在返回函数之前就释放了该驱动程序。但是，如果应用程序希望在返回函数后继续使用驱动程序对象，则需要在堆上分配一个结构体来保存驱动程序状态。\n\
    \n获取驱动程序实例的引用后，应用程序可以注册以接收驱动程序状态变化的通知，包括其硬件设备被移除时驱动程序终止的通知。此通知回调通过调用 I/O Kit 框架中定义的`IOServiceAddInterestNotification()`函数来安装。与设备接入通知类似，应用程序需要提供一个端口，I/O\
    \ Kit 将通过该端口在驱动程序状态变化时向应用发出信号。该端口可以使用`IONotificationPortCreate()`函数创建，如代码清单 5-2\
    \ 所示。如果应用程序已为设备接入事件创建了通知端口，则可以共享该通知端口及其对应的运行循环源来接收设备移除通知。只需将现有的通知端口传递给`IOServiceAddInterestNotification()`函数即可实现。\n\
    \n当应用程序收到驱动程序实例已终止的通知时，应释放对该驱动程序的引用，并采取必要措施告知用户设备已被移除。\n\n代码清单 5-4 演示了对代码清单 5-3\
    \ 中`DeviceAdded()`函数的修改，该修改创建了一个结构体用于表示应用程序中的驱动程序实例，然后安装了一个回调函数，以接收来自驱动程序的通知（例如驱动程序终止通知）。\n\
    \n**代码清单 5-4.** 演示应用程序如何安装回调函数以在驱动程序终止时接收通知的代码片段\n\n```\n#include <IOKit/IOMessage.h>\n\
    \n// 用于描述驱动程序实例的结构体。\ntypedef struct {\n        io_service_t    service;\n   \
    \     io_object_t     notification;\n} MyDriverData;\n\n// 用于设备接入和驱动程序状态变化的通知端口。\n\
    IONotificationPortRef   gNotificationPort = NULL;\n\nvoid DeviceAdded (void* refCon,\
    \ io_iterator_t iterator)\n{\n        io_service_t            service = 0;\n\n\
    \        // 遍历所有匹配的对象。\n        while ((service = IOIteratorNext(iterator)) !=\
    \ 0)\n        {\n                MyDriverData*   myDriverData;\n             \
    \   kern_return_t   kr;\n\n                // 分配一个结构体来保存驱动程序实例。\n            \
    \    myDriverData = (MyDriverData*)malloc(sizeof(MyDriverData));\n           \
    \     // 为此驱动程序实例保存 io_service_t。\n                myDriverData->service = service;\n\
    \n                // 安装回调函数以接收驱动程序状态变化通知。\n                kr = IOServiceAddInterestNotification(gNotificationPort,\n\
    \                                        service,                        // 驱动程序对象\n\
    \                                        kIOGeneralInterest,\n               \
    \                         DeviceNotification,             // 回调函数\n          \
    \                              myDriverData,           // 传递给回调函数的 refCon\n  \
    \                                      &myDriverData->notification);\n       \
    \ }\n}\n\nvoid DeviceNotification (void* refCon, io_service_t service, natural_t\
    \ messageType,\n     void* messageArgument)\n{\n        MyDriverData*   myDriverData\
    \ = (MyDriverData*)refCon;\n        kern_return_t   kr;\n\n        // 仅处理驱动程序终止通知。\n\
    \        if (messageType == kIOMessageServiceIsTerminated)\n        {\n      \
    \          // 打印已移除设备的名称。\n                io_name_t       name;\n           \
    \     IORegistryEntryGetName(service, name);\n                printf(\"设备已移除:\
    \ %s\\n\", name);\n\n                // 移除驱动程序状态变化通知。\n                kr = IOObjectRelease(myDriverData->notification);\n\
    \n                // 释放我们对驱动程序对象的引用。\n                IOObjectRelease(myDriverData->service);\n\
    \n                // 释放保存驱动程序连接的结构体。\n                free(myDriverData);\n  \
    \      }\n}\n```\n"
- fmt: "### Modifying Driver Properties\n\nOnce an application has located the driver\
    \ object that it is interested in, it can interact with the driver and the hardware\
    \ device that it controls. The I/O Kit framework provides two ways to interact\
    \ with a driver from user space. One method requires the application to open a\
    \ connection to the driver and then to use that connection to send control requests\
    \ to the driver and receive status. A connection-based approach is necessary if\
    \ the driver needs to maintain the state of a client or needs access control to\
    \ ensure that only one client at a time can access the hardware device. This is\
    \ discussed later in this chapter.\n\nAnother method, which is far simpler, is\
    \ to allow an application to read and write key/value property values to the driver.\
    \ The driver can perform certain types of operations without having to know which\
    \ client sent the request, such as reading or writing driver preference values\
    \ or configuring the settings of a hardware device. For example, the volume level\
    \ of an audio device is a single value that could be read or written by any user\
    \ application. When that value is set, the driver can reconfigure the hardware\
    \ device for the new volume setting, regardless of which application set the value.\n\
    \nAs we saw in [Chapter 4](#Chapter04.html#ch4), each I/O Kit driver contains\
    \ a property table that is a dictionary of key/value pairs. A driver's property\
    \ table is accessible from any user space application without restriction (which\
    \ is how the `I/ORegistryExplorer` utility is able to display each driver's properties).\
    \ Furthermore, an application can add new key/value pairs to a driver's property\
    \ table and can modify the value of an existing property. This can be used to\
    \ easily exchange small amounts of data between a user space application and a\
    \ kernel driver. Since this approach is not connection based, the driver cannot\
    \ modify its behavior for different user applications; every user application\
    \ can access the same property table values. However, if there are multiple instances\
    \ of the same driver loaded, each instance has its own property table. It should\
    \ be noted that the driver's property table is volatile and will not be saved\
    \ when the driver is unloaded.\n\nOnce an application has located the driver that\
    \ it is interested in, the I/O Kit framework contains functions that make it very\
    \ easy to read and write a driver's property table. The function `IORegistryEntryCreateCFProperties()`\
    \ provides the calling application with a snapshot of the state of a driver's\
    \ property table as a Core Foundation dictionary. If the application is interested\
    \ in the value of a particular key, then the function `IORegistryEntryCreateCFProperty()`\
    \ can be used. For example, suppose we wished to modify the callback function\
    \ from [Listing 5-3](#Chapter05.html#list_5_3) so that it prints the name of the\
    \ manufacturer for each USB device that is connected to the computer rather than\
    \ printing the device name. The `IOUSBDevice` class makes the manufacturer string\
    \ available through its property table with a key \"USB Vendor Name\". The code\
    \ in [Listing 5-5](#Chapter05.html#list_5_5) shows the modified callback function,\
    \ which reads the vendor name from the device's property table.\n\n**Listing 5-5.**\
    \ Reading the Property Table of a USB Device To Obtain the Device's Manufacturer\
    \ String\n\n```\nvoid DeviceAdded (void* refCon, io_iterator_t iterator)\n{\n\
    \        io_service_t            service = 0;\n\n        // Iterate over all matching\
    \ objects\n        while ((service = IOIteratorNext(iterator)) != 0)\n       \
    \ {\n                CFStringRef     className;\n\n                // List all\
    \ IOUSBDevice objects, ignoring objects that subclass IOUSBDevice.\n         \
    \       className = IOObjectCopyClass(service);\n                if (CFEqual(className,\
    \ CFSTR(\"IOUSBDevice\")) == true)\n                {\n                      \
    \  CFTypeRef               vendorName;\n\n                        vendorName =\
    \ IORegistryEntryCreateCFProperty(service,\n                              CFSTR(\"\
    USB Vendor Name\"), kCFAllocatorDefault, 0);\n                        CFShow(vendorName);\n\
    \                }\n                CFRelease(className);\n                IOObjectRelease(service);\n\
    \        }\n}\n```\n\nAs the code in [Listing 5-5](#Chapter05.html#list_5_5) shows,\
    \ the property table is a very convenient way for a driver to publish information\
    \ to user applications, such as a description of its hardware, the driver's current\
    \ state, or debugging information. Another use of a driver's property table is\
    \ to allow an application to pass small amounts of data to a driver. As an example,\
    \ let's modify the sample I/O Kit driver that was developed in [Chapter 4](#Chapter04.html#ch4)\
    \ to allow an application to specify a custom message to be printed when the driver\
    \ is unloaded. We will do this by adding a string value to the property table\
    \ under the key `StopMessage`. This key will be added to the property table by\
    \ a user space application but will be read from the property table by the kernel\
    \ driver when it is being unloaded.\n\nLet's begin by modifying the user space\
    \ application. First, it needs to locate the I/O Kit driver that was written in\
    \ [Chapter 4](#Chapter04.html#ch4). This can be done by creating the following\
    \ matching dictionary:\n\n```\nmatchingDict = IOServiceMatching(\"com_osxkernel_driver_IOKitTest\"\
    );\n```\n\nNext, we will write string value \"The driver has stopped\" to the\
    \ driver's property table and make it accessible under the key `StopMessage`:\n\
    \n```\nIORegistryEntrySetCFProperty(service, CFSTR(\"StopMessage\"), CFSTR(\"\
    The driver has stopped\"));\n```\n\nThat's all that is required from the user\
    \ space application. In this example, we have chosen to use a string value, although\
    \ the value of a driver's property may be any of the Core Foundation types `CFString`,\
    \ `CFNumber`, `CFBoolean`, `CFData`, or a `CFArray` or `CFDictionary` containing\
    \ objects of the supported Core Foundation types.\n\nWhen a driver's property\
    \ is set from a user space application, the method `setProperties()` in the corresponding\
    \ driver object is called with a parameter containing a dictionary of the properties\
    \ that have been set. The method `setProperties()` is defined in the `IORegistryEntry`\
    \ class, but since every I/O Kit driver class is a subclass of `IOService`, which\
    \ is itself a subclass of `IORegistryEntry`, every driver object can override\
    \ this method. By default, the base class implementation of `setProperties()`\
    \ does nothing. So unless your driver provides an implementation, any properties\
    \ set on your driver by a user space application will be ignored.\n\nThe `setProperties()`\
    \ method provides a driver with a chance to immediately respond to a value that\
    \ has been set from a user space application. If the modified property requires\
    \ the driver to reconfigure the underlying hardware device, the `setProperties()`\
    \ method is the place in which this should be performed. For our sample driver,\
    \ when an application changes the `StopMessage` property, we will have the driver\
    \ update its property table and insert the provided string value. This will also\
    \ make the property available so that it can be read by user applications, including\
    \ `I/ORegistryExplorer`. The code to handle this is shown in [Listing 5-6](#Chapter05.html#list_5_6).\n\
    \n**Listing 5-6.** A Sample Implementation of the Driver's `setProperties()` Method\n\
    \n```\nIOReturn com_osxkernel_driver_IOKitTest::setProperties (OSObject* properties)\n\
    {\n        OSDictionary*   propertyDict;\n\n        // The provided properties\
    \ object should be an OSDictionary object.\n        propertyDict = OSDynamicCast(OSDictionary,\
    \ properties);\n        if (propertyDict != NULL)\n        {\n               \
    \ OSObject*               theValue;\n                OSString*               theString;\n\
    ```"
