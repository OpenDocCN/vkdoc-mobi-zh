  trans: '

    # 远程内核核心转储


    Mac OS X 提供了一种通过网络将崩溃（或挂起）系统的核心转储传输到远程机器的机制。核心转储是系统内存中连线内容的二进制镜像。通过捕获核心转储，我们可以保留系统在崩溃时所处确切状态的证据，并且可以使用此镜像与
    `GDB` 一起获取系统中所有线程的堆栈跟踪，同时检查内存内容以及内核数据结构。


    方便的是，启用核心转储所需的一切都已存在于 Mac OS X 中。仅需进行少量配置。在转储服务器（即从崩溃机器接收核心转储的机器）上，你需要按如下方式激活
    `kdumpd` 守护进程：


    `# sudo vi /System/Library/LaunchDaemons/com.apple.kdumpd.plist`


    将 `Disabled` 键从 `true` 改为 `false`。如果你愿意，还可以配置转储文件的存放目录。默认目录是 `/PanicDumps`。按如下方式启动
    `kdumpd` 守护进程：


    `# sudo launchctl load /System/Library/LaunchDaemons/com.apple.kdumpd.plist`

    `# sudo launchctl start com.apple.kdumpd`


    该服务器使用 UDP 端口 1069，因此应确保目标机器与服务器之间没有防火墙。目标机器和服务器无需运行相同版本的 Mac OS X。


    ![images](img/square.jpg) **注意** 要使用 `kdumpd`，目标机器（崩溃系统）需要通过以太网连接到网络。不能使用 AirPort
    设备，因为处理转储传输的 KDB（内核调试协议）驱动程序仅适用于以太网设备。加载后，你可以使用 `IORegisteryExplorer` 检查内核调试驱动程序连接在何处，并搜索名为
    `IOKernelDebugger` 的驱动程序。


    `kdumpd` 守护进程能够从多台机器接收核心转储，并将每个转储文件以机器的 IP 地址归档。如果你在一家开发内核运行软件的公司工作，你可以配置所有 Mac
    电脑，使其在崩溃时自动将转储发送到中央服务器。当质量保证测试人员在测试中遇到问题时，这可以节省大量时间，因为工程人员可以立即开始调试转储的镜像。


    ![images](img/square.jpg) **警告** 应谨慎操作，仅在受信任的网络中使用 `kdumpd`，因为崩溃系统的内存内容会以未加密方式通过网络传输，可能包含敏感信息，例如密码和私钥。


    配置目标机器同样简单，可以通过在 `/Library/Preferences/SystemConfiguration/com.apple.Boot.plist`
    中设置内核启动参数，或者使用 `nvram` 命令来完成，如下所示：


    `# sudo nvram boot-args="debug=0xd44 _panicd_ip=192.168.1.1"`


    上述指令指示内核在发生内核恐慌或触发 NMI（不可屏蔽中断）事件时进行核心转储。后者在系统完全挂起、看似无响应但实际上并未发生内核恐慌的情况下非常有用。此时，你可以使用电脑上的电源按钮触发
    NMI 事件，这将启动核心转储。在此期间，机器将冻结，不会运行任何进程。如果机器仍有响应而你执行了此操作，机器将在核心转储传输完成后恢复正常运行，仿佛什么都没发生过。


    `_panicd_ip` 参数指定了运行 `kdumpd` 的机器的 IP 地址。如果你计划让恐慌服务器永久运行，建议将此 IP 地址设为静态。不能使用主机名或
    DNS 名称作为服务器地址，因为无法进行名称解析。


    如果你按下电源按钮，目标机器的屏幕上将显示以下输出：


    ```

    Entering system dump routine

    Attempting connection to panic server configured at IP 192.168.1.1, port 1069

    Resolved 192.168.1.1’s (or proxy’s) link level address

    Transmitting packets to link level address: 00:16:cb:a6:73:8b

    Kernel map size is 4546437120

    Sending write request for core-xnu-1699.22.73-192.168.1.2-2fe8a6d9

    Protocol features: 0x1

    Kernel map has 1389 entries

    Generated Mach-O header size was 100224

    ```


    目标机器将在屏幕上写入点 (.)，直到转储完成。如果转储是由 NMI 事件触发的，系统将恢复运行；如果是由内核恐慌触发的，系统将等待远程调试器连接。


    ## KDB


    内核支持一个名为 `KDB` 的内核内调试器。`KDB` 仅支持通过串口进行调试。它默认不包含在内核构建中；因此，你需要编译并安装自定义内核才能使用它。`KDB`
    在既无法使用 FireWire 也无法使用以太网进行极低级别调试时有一些应用。`KDB` 需要在被调试的机器上有一个原生串口，这仅存在于现已停产的 Xserve
    上（尽管如果在虚拟机中运行 Mac OS X，串口也可用）。出于所有实际目的，推荐使用 GNU 调试器（`GDB`）；我们在此提及 `KDB` 只是为了避免与
    `GDB` 混淆。


    ## 通过以太网或 FireWire 使用 GDB 进行远程调试


    内核支持通过以太网（IP/UDP）或 FireWire 连接使用 `GDB`。同样，这需要两台运行 Mac OS X 的电脑。虽然 Xcode 支持 `GDB`，但你无法使用
    Xcode 调试内核；你必须使用命令行界面。不过，`GDB` 是 Xcode 的一部分。无需在被调试的机器上安装 Xcode；它只需要安装在远程系统（客户端）上。


    ![images](img/square.jpg) **注意** 严格来说，也可以使用其他运行 `GDB` 的操作系统作为主机来调试 Mac OS X 目标系统。虽然没有相关文档，但一些文档暗示这是可能的，不过配置起来并不简单。


    与 `KDB` 不同，调试支持默认内置于内核中。但是，调试功能在默认情况下是禁用的，可以通过在目标机器上添加适当的启动参数轻松启用，例如：


    `$ sudo nvram boot-args="debug=0x144 -v"`


    `-v`（详细输出）标志并非严格必需。它的作用是禁用启动时带有 Apple 标志的灰屏，而是显示一个文本控制台（常见于 UNIX 和 Linux 系统），在系统启动时显示日志消息。设置好启动参数后，需要重新启动系统才能使更改生效。'
- fmt: '### Configuring the Host Machine


    Setting up the target is straightforward. However, the host machine requires a
    little more preparation. Before you can start debugging, you need to download
    the correct Kernel Debug Kit for the kernel version used by the target system.
    Apple doesn’t appear to publish a version for every build in a timely manner,
    so the target system would have to be downgraded or upgraded to match a published
    version of the Kernel Debug Kit. If you use the wrong version, GDB may fail to
    resolve the correct symbols and data structures and the results may be wrong and
    cause great confusion, for example, functions getting called that should not have.


    ![images](images/square.jpg) **Tip** Kernel Debug Kits are not part of Xcode and
    can be downloaded from [`http://developer.apple.com/hardwaredrivers/download/kerneldebugkits.html`](http://developer.apple.com/hardwaredrivers/download/kerneldebugkits.html).
    This page contains legacy versions, while newer versions are published in the
    *Downloads* ![Images](images/U001.jpg) *Developer Tools* section on the Apple
    developer site. This page is restricted to members of the Mac developer program
    (there’s an annual fee to become a member).


    The Kernel Debug Kit contains the following:


    - Debug version of the kernel (`mach_kernel`)

    - Debug version of I/O Kit families and selected KEXTs

    - Symbol files

    - Various scripts

    - Macros for GDB


    ![images](images/square.jpg) **Caution** Do not replace files on your system with
    files from the Kernel Debug Kit; they do not need to be installed on the target
    or host system. In fact, you do not need to install any files from the kit; you
    can access them directly through the mounted image.


    You can replace the default kernel (`mach_kernel`) of a Mac OS X system with the
    debug version found in the Kernel Debug Kit. This will help you get more accurate
    results and stack traces, as optimization has been disabled.


    If you have the sources for the XNU kernel installed on the host system, it is
    possible to link this with the debugger, which allows you to see source code instead
    of assembly code in the debugger, though this is often not needed if you are only
    debugging your own extension (in which case you can link the source for your own
    extension only).


    ### Attaching to the Remote Target


    If you have set the appropriate boot arguments with the `nvram` command on the
    target system and have the Kernel Debug Kit ready on the host machine, you can
    now trigger an NMI event on the target system by pressing the system’s power button.
    This should cause the following text to appear on the top left corner of the screen:


    ```

    Debugger called: <Button SCI>

    ethernet MAC address: 00:16:cb:a6:74:8b

    ip address: 192.168.1.1


    Waiting for remote debugger connection.

    ```


    Starting GDB and attaching to the remote target can be done using the following
    steps:


    ```

    $ gdb -arch i386 /Volumes/KernelDebugKit/mach_kernel

    ```


    The `arch` argument can be specified if the debug host is running on a different
    architecture from the target system. For example, in this case, we are debugging
    a target running a 32-bit kernel on a system with a 64-bit kernel. You can also
    do the reverse by specifying `x86_64`.


    ```

    (gdb) source /Volumes/KernelDebugKit/kgmacros

    ```


    The preceding line will load specialized GDB macros, which will help you examine
    the state of the target system’s kernel. You can, for example, dump a list of
    running tasks or threads. Type `help kgm` to get a full list of available macros.


    To attach to the target, use the following:


    ```

    (gdb) target remote-kdp

    (gdb) attach 192.168.1.1

    Connected.

    (gdb)

    ```


    The preceding will attach to the remote target so we can begin our debugging session.
    We can then start issuing commands, for example, `bt` to get a stack trace, which
    will look something like the following:


    ```

    #0  Debugger (message=0xba97e4 "Button SCI") at /SourceCache/xnu/xnu-

    1504.15.3/osfmk/i386/AT386/model_dep.c:867

    #1  0x00ba8de3 in ?? ()

    #2  0x00556636 in IOFilterInterruptEventSource::normalInterruptOccurred (this=0x4eab980)
    at

    /SourceCache/xnu/xnu-1504.15.3/iokit/Kernel/IOFilterInterruptEventSource.cpp:140

    #3  0x00b73a50 in ?? ()

    #4  0x00b72ccd in ?? ()

    #5  0x00b85fc5 in ?? ()

    #6  0x00b89621 in ?? ()

    #7  0x0056ac20 in IOSharedInterruptController::handleInterrupt (this=0x4e9cd80,

    nub=0x4e9cd80) at /SourceCache/xnu/xnu-1504.15.3/iokit/Kernel/IOInterruptController.cpp:727

    #8  0x00bcf5bb in ?? ()

    #9  0x00b66213 in ?? ()

    #10 0x00b71911 in ?? ()

    #11 0x00580d96 in PE_incoming_interrupt (interrupt=73) at /SourceCache/xnu/xnu-

    1504.15.3/pexpert/i386/pe_interrupt.c:65

    #12 0x002ab432 in interrupt (state=0x4e9dd20) at /SourceCache/xnu/xnu-

    1504.15.3/osfmk/i386/trap.c:511

    #13 0x002a1c2e in lo_allintrs () at cpu_data.h:397

    #14 0x00225bba in processor_idle (thread=0x10bff0, processor=0x4cf0dac) at

    /SourceCache/xnu/xnu-1504.15.3/osfmk/kern/sched_prim.c:2982

    #15 0x0022698c in thread_select (thread=0x5e407a8, processor=<value temporarily
    unavailable,

    due to optimizations>) at /SourceCache/xnu/xnu-1504.15.3/osfmk/kern/sched_prim.c:1327

    #16 0x002275b0 in thread_block_reason (continuation=0, parameter=0x0, reason=<value

    temporarily unavailable, due to optimizations>) at /SourceCache/xnu/xnu-

    1504.15.3/osfmk/kern/sched_prim.c:1856

    #17 0x00227654 in thread_block (continuation=0) at /SourceCache/xnu/xnu-

    1504.15.3/osfmk/kern/sched_prim.c:1875

    #18 0x464debbc in ?? ()

    ```


    The command will show the kernel stack, which is the sequence of function calls
    the CPU was executing at the time of the NMI event. We can see in this case that
    the last thing the system did before we halted it was to respond to the NMI interrupt.
    If you are curious what the other CPUs (cores) were doing at the time, you can
    issue the command `showcurrentstacks`, which will print a stack trace for each
    CPU (core) in the system.


    You can now set breakpoints or examine the state of the kernel. Issuing the `continue`
    command will resume the kernel. We will look at how GDB can be used in more detail
    later in this chapter.'
