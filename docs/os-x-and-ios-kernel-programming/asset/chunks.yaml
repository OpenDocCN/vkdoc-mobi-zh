  trans: '

    ### USB 协议


    与串口设备不同——串口设备没有协议（协议需由应用程序自行实现），只有连续的比特和字节流——USB 使用的是基于数据包的协议。由于总线是共享的，并且可以连接多个设备，每个设备都需要单独寻址，因此这种协议是必要的。除非你是为
    USB 设备编写固件的硬件工程师，否则你并不需要真正理解甚至了解这种通信发生的具体细节，但在某些情况下，对协议层面的通信方式有一个基本了解，可能有助于调试问题。


    USB 协议在主控制器和设备之间实现，它决定了数据在总线上的传输方式。驱动程序实际上并不能洞察或影响这一过程，因为相关细节是由主机和设备的电子元件处理的，而非驱动程序——这与网络通信不同，网络通信协议的许多方面都受软件控制。为了查看或截获实际在线路上传输的数据，需要使用
    USB 数据包分析器。USB 分析器是一种专用设备（通常非常昂贵），可以连接在设备和主机之间，捕获它们之间的通信流量。


    USB 数据包由采用小端序（LSB）的 8 位字组成。USB 协议有四种主要的数据包类型：


    - **令牌包：** 它充当头部，告知接收方接下来是什么类型的数据包/数据。三种令牌包类型分别是 `IN`、`OUT` 和 `Setup`。前两种指明了数据包的方向，最后一种用于启动控制传输。方向是从主机端角度定义的，因此
    `IN` 表示从设备到主机的传输，`OUT` 表示从主机到设备的传输。

    - **数据包：** 可携带任意数据，每个数据包包含 0–1024 字节。

    - **握手包：** 用于确认数据包的成功（`ACK`）或失败（`NAK`）投递，以及报告暂停（`STALL`）状态。

    - **帧起始包：** 按固定时间间隔发送，用于同步等时传输模式的数据流。


    每种数据包类型的布局可参见图 8-2。


    ![images](img/0802.jpg)


    ***图 8-2.** USB 数据包类型布局*


    所有 USB 数据包都以 **同步** 和 **PID**（数据包标识符）字段开头。同步字段位于其他数据之前，接收方可用于时钟同步。该字段在低速和全速设备中为
    8 位，在高速设备中为 32 位。PID（数据包标识符）字段允许解码器确定其后跟随的数据包类型。PID 字段的可能取值见表 8-2。PID 宽度为 4 位，但总长度为
    8 位。最后四位是一个校验字段，包含前四位的补码，有助于判断数据包是否有效且未被损坏。


    ![images](img/t0802.jpg)


    令牌包用于寻址特定设备。地址字段指明数据包发往或来自哪个设备，其值为 1 到 127，用于寻址总线上的设备。一个 USB 设备可能有多个端点，这些端点是独立的通信通道。**端点**
    字段指明数据包将投递给设备上的哪个端点。端点将在本章稍后讨论。


    所有数据包类型都有一个 CRC（循环冗余校验——用于验证数据完整性）字段。除了数据包采用更宽的 16 位 CRC 字段外，其他所有数据包类型的 CRC 字段均为
    5 位宽。


    数据包结束（EOP）字段用作分隔符。


    一次 USB 事务最多可由三个数据包组成。数据包由 PID 字段指示，可以是以下之一：`DATA0`、`DATA1`、`DATA2` 和 `MDATA`，不过后两者仅用于等时传输模式。PID
    字段决定了传输的是哪个数据包，如表 8-2 所示。


    一次从主机到设备的数据传输可能如下所示：


    1.  包含设备和端点地址的令牌包。PID 指示为 `OUT` 传输。

    2.  包含 1024 字节有效载荷的 Data 0 数据包。

    3.  包含 322 字节有效载荷的 Data 1 数据包。

    4.  从设备发送到主机的握手包，指示传输状态，如 `ACK`、`NAK` 或 `STALL`。


    ### 端点


    主控制器与 USB 设备之间的通信基于端点的概念。端点是单向的，方向为 IN 或 OUT——即从设备到主机的通信，或从主机到设备的通信。主控制器到端点的连接称为管道。管道有两种类型：**流管道**，用于传输数据；**消息管道**，用于传输控制请求。一个
    USB 设备最多可支持 32 个端点，其中最多 16 个 IN 端点和 16 个 OUT 端点。端点地址 0 是特殊的，保留用于设备配置。共有四种不同类型的端点可用：


    - **批量端点：** 用于传输大量数据。批量传输不保证及时交付或带宽，但保证交付和错误检测。批量传输不适用于低速模式。硬盘、扫描仪、打印机和网卡通常使用批量传输。

    - **控制端点：** 用于设备配置和状态检索。对控制端点的请求通过使用预留带宽来保证交付。

    - **中断端点：** 用于交换少量对时间敏感的数据，并保证交付。

    - **等时端点：** 提供有保证的带宽，但不保证交付。数据丢失后不会重新发送，这对于视频和音频应用来说是理想的。

    '
- fmt: '#### USB Descriptors


    A USB descriptor is used to describe a device''s capabilities, type, requirements,
    and more. Descriptors are organized in a hierarchy consisting of the following
    main descriptor types:


    - *Device Descriptor:* This contains the product ID (`idProduct`) and vendor ID
    (`idVendor`) of the USB device. There is only one device descriptor per device.
    It also contains information on how many descriptors follow it. Both the vendor
    ID and product ID are 16-bit integers. The vendor ID is assigned by the USB-IF.
    A vendor can choose any 16-bit value for the product ID. The vendor/product ID
    combination must be unique to avoid problems, as they are used to determine the
    correct drivers for a device. The device descriptor also contains two fields to
    indicate the type of device: `bDeviceClass` and `bDeviceSubClass`.

    - *Configuration Descriptor:* This specifies an alternate configuration in which
    a device can operate. For example, a device might have two configurations: one
    configuration when it is self-powered and one configuration when it is bus-powered.
    The latter can operate in a limited mode that only allows a subset of overall
    functionality, or perhaps only provide the ability to program the device''s firmware.
    Only one configuration can be active at any given time. The configuration descriptor
    may have several interfaces underneath it, and it is uncommon for a device to
    have more than one configuration descriptor.

    - *Interface Descriptor:* This is a collection or group of endpoints that together
    perform a function. It can be useful to think of it as a logical subdevice. An
    interface may have zero or more endpoints. For example, in [Figure 8-3](#Chapter08.html#fig_8_3),
    we see a multifunction USB device, which contains two interfaces: interface #0
    is a printer, while interface #1 is a scanner device. Multiple interfaces may
    be active and operate simultaneously. Just like the device descriptor, the interface
    descriptor has fields to indicate the class of interface, which is given by `bInterfaceClass`
    and `bInterfaceSubClass`.

    - *Endpoint Descriptor:* This describes the type (bulk, interrupt, isochronous,
    or control) and the direction (IN, OUT) of an endpoint.


    ![images](images/0803.jpg)


    ***Figure 8-3.** USB compound device with two interfaces*


    #### USB Device Classes


    The USB descriptors contain class codes, which identify the class of a device
    to the system and can be used to identify the appropriate driver to load for the
    device. The class code may be specified in the device descriptor, the interface
    descriptor, or both. A class code of `00h` specified in the device descriptor
    means that the actual class code should be read from the interface descriptors
    instead. There is also a subclass field that further narrows down the type of
    device. [Table 8-3](#Chapter08.html#tab_8_3) shows a small subset of available
    class codes.


    ![images](images/t0803.jpg)


    Many operating systems, including Mac OS X and iOS, provide default drivers for
    devices that conform to the standard classes, and therefore the OS can handle
    any mass storage or audio USB device without having to install a third party driver.
    It is still possible for a vendor to supply an optional driver for devices that
    provide additional capabilities not found in the generic driver supplied by the
    OS. For this, the I/O Kit matching system can be used to ensure that the more
    specific driver is matched, rather than the default driver.


    ![images](images/square.jpg) **Tip** The full list of class codes, as well as
    more detailed descriptions, can be found at [`http://www.usb.org/developers/defined_class`](http://www.usb.org/developers/defined_class).


    ### I/O Kit USB Support


    USB support in the I/O Kit is provided by the `IOUSBFamily`, which is a dynamically
    loadable KEXT, identified by the bundle identifier `com.apple.iokit.IOUSBFamily`.
    The USB family provides the central core of USB handling in the kernel and contains
    drivers for the host controllers, as well as abstraction classes for representing
    USB devices, interfaces, and pipes. The class hierarchy of the USB Family is shown
    in [Figure 8-4](#Chapter08.html#fig_8_4).


    ![images](images/0804.jpg)


    ***Figure 8-4.** IOUSBFamily class hierarchy*


    Most of these classes are irrelevant if you only want to implement a driver for
    a USB device. The main classes used for USB driver development are shown in gray,
    in [Figure 8-4](#Chapter08.html#fig_8_4), and include `IOUSBPipe`, `IOUSBDevice`,
    and `IOUSBInterface`, which we will discuss in detail later.


    If you need to implement support for a new host controller, this can be done by
    inheriting from `IOUSBController`; however, the kernel already provides drivers
    for UHCI-, OHCI-, and EHCI-compliant host controllers. Although not shown in [Figure
    8-4](#Chapter08.html#fig_8_4), these are subclasses of `IOUSBController`, and
    they are called `AppleUSBUHCI`, `AppleUSBOHCI`, and `AppleUSBEHCI`, respectively.


    ![images](images/square.jpg) **Tip** The USB Family is not part of the XNU source
    distribution, but is nevertheless available in source code form as a download
    from [`http://opensource.apple.com`](http://opensource.apple.com). The source
    package includes source for the entire USB Family, including the implementation
    of the UHCI, OCHI, and EHCI controllers. It also includes sample code for USB
    drivers, and how to enumerate and access USB devices from user space.


    #### USB Device and Driver Handling


    When a USB device is inserted, the USB Family will create an instance of the `IOUSBDevice`
    class, a subclass of `IOService`, and insert it into the I/O Registry. Exactly
    one instance of `IOUSBDevice` will be created for each device inserted onto the
    bus. The provider for an `IOUSBDevice` is the `IOUSBController` to which the device
    is attached. The `IOUSBDevice` class provides an abstraction of the USB device''s
    device and configuration descriptors. Interface descriptors can be accessed from
    the `IOUSBInterface` class. The `IOUSBDevice` acts as a provider for `IOUSBInterface`
    classes, as seen in [Figure 8-5](#Chapter08.html#fig_8_5).


    ![images](images/0805.jpg)


    ***Figure 8-5.** USB device and driver provider relationships*


    [Figure 8-5](#Chapter08.html#fig_8_5) shows three USB devices and how they relate
    to their higher-level providers:


    - *The driver on the left:* This is a driver for an audio device. You may have
    noticed that there is an additional driver between `IOUSBDevice` and `IOUSBInterface`
    called `IOUSBCompositeDriver`. This composite driver is matched against, and loaded
    for, any USB device that has its device class and subclass set to zero in its
    device descriptor and that has no other vendor specific driver matched against
    it. The name of the driver may suggest that it is only for composite drivers with
    multiple functions, but the driver is loaded even for devices with a single interface.
    The only function the composite driver performs is to select the device''s active
    configuration (if it has multiple configuration descriptors), and then ensure
    that other drivers can be matched against the selected configuration''s interfaces.

    - *The driver in the middle:* This is a vendor specific driver attached directly
    to the `IOUSBDevice` nub. The `IOUSBCompositeDriver` was not loaded as the device
    class, and the subclass fields in the device descriptor were set to `0xFF/0xFF`,
    indicating a vendor specific device, and a driver was properly matched against
    the device.

    - *The driver on the right:* This has the same organization as on the left, with
    an `IOUSBCompositeDriver` attached to the `IOUSBDevice` nub. The composite driver
    will enumerate all device interfaces and ensure that they are made available for
    matching. In this case, there are two interfaces, each with an attached independent
    driver.'
