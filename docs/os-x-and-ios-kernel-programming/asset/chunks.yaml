    \        return kIOReturnError;\n\n    setLinkStatus(kIONetworkLinkActive | kIONetworkLinkValid,\
    \ medium, 1000 * 1000000);    \n    return kIOReturnSuccess;\n}\n```\n\n当然，具体的实现高度依赖于硬件。在我们的案例中，实现将调用硬件抽象类，该类会附加到我们将用来启用数据包发送和接收的“从属”网络接口。对于真实设备，该方法可能会将设备从睡眠中唤醒，然后启用中断。硬件抽象\
    \ `enableHardware()` 方法的实现如下所示：\n\n```\nbool    com_osxkernel_MyEthernetHwAbstraction::enableHardware()\n\
    {\n    bool success = true;\n\n    fRxPacketQueue = IOPacketQueue::withCapacity();\n\
