    \n***代码清单 11-3*** `acquirePort()`方法的示例实现。假设该方法是通过`IOCommandGate`调用的。\n\n```\n\
    IOReturn       MySerialDriver::acquirePortGated (bool sleep, void* refCon)\n{\n\
    \       UInt32      state;\n       IOReturn    rtn;\n\n       // If the serial\
