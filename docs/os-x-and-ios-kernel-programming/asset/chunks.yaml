  trans: '

    ### 直接内存访问


    直接内存访问是一种允许设备在无需 CPU 参与的情况下向系统内存传输数据或从系统内存读取数据的概念，从而使 CPU 能够空闲出来执行其他任务。由于 I/O
    传输相对于 CPU 来说通常非常缓慢，这一特性对系统整体性能有着显著影响。DMA 还实现了所谓的零拷贝，即我们可以将用户空间缓冲区的内存直接传输到设备，而无需任何内存拷贝。PCI
    没有中央 DMA 控制器，而是采用了总线主控的概念，允许设备控制总线并发起传输。`IOPCIDevice`类提供了`setBusMasterEnable()`方法，该方法赋予设备作为总线主控的权限。DMA
    传输是有方向性的。当 CPU 希望将数据从系统内存传输到设备时，这被称为*出站* DMA，而从设备到系统内存的传输则被称为*入站* DMA。


    I/O Kit 中没有用于控制 PCI 设备 DMA 的标准类，因为每个设备可能以不同的方式实现 DMA（设备的 DMA 功能通常被称为 DMA 引擎）。然而，在大多数情况下，这个过程非常相似。一个设备可能支持多个并发的
    DMA 传输，每个传输都有其独立的 DMA 通道。DMA 传输的概念很简单。对于一次出站 DMA 传输，通常遵循以下步骤。


    1. 驱动程序需要识别要传输的内存缓冲区并锁定该内存。

    2. 驱动程序将告知设备内存的位置（物理地址）和大小，这通常是通过将这些值写入寄存器来完成的。

    3. 驱动程序会切换设备某个寄存器中的一个位，以指示设备应启动 DMA。

    4. 设备将在无需 CPU 参与的情况下，直接从系统内存传输缓冲区的内容。它会设置另一个寄存器位来表示传输完成，并触发一个中断。

    5. 驱动程序将处理该中断，检查 DMA 完成位是否已设置，如果还有更多数据要发送，则可能准备下一次 DMA 事务。


    设置和处理入站 DMA 传输的过程是相同的。唯一的区别在于设备是向缓冲区写入数据，而非从中读取数据。我们仍然需要告诉设备数据所在的内存位置，并且在传输完成后我们仍然会收到一个中断。对于像存储设备这样的设备，驱动程序总是发起
    I/O，并控制何时读取和写入数据。然而，像网络控制器这样的设备则略有不同，因为数据可能会异步地响应外部事件而到达设备。在这种情况下，设备会触发一个中断并在其寄存器中设置一个标志，以便驱动程序知道设备的输入缓冲区中有数据。然后，驱动程序会准备一个新的
    DMA 缓冲区并启动传输，以清空设备的输入缓冲区。一旦设备完成传输，它会再次触发一个中断，通知驱动程序传输已完成。


    虽然 DMA 从概念上讲很简单，但以下因素使其变得复杂：


    - CPU 上的内存缓存可能导致一致性问题，因为 CPU 写入的数据可能保存在 CPU 的缓存中，而不会立即提交到系统内存。如果此时启动 DMA 传输，设备可能会读取到错误的数据、RAM
    中之前的内容，或干脆是垃圾数据。在 Intel 系统上，此问题由硬件自动处理，无需驱动程序干预。对于 PowerPC 处理器，I/O Kit 提供了`IOFlushProcessorCache()`函数，该函数会刷新
    CPU 缓存到系统内存，确保设备能看到正确的内存内容。此函数存在，但在基于 Intel 的系统上不执行任何操作。

    - 在 64 位平台（或使用 PAE 时）上，一些较旧的基于 PCI 的硬件设备可能无法访问超过 32 位的内存地址。存在两种策略来处理这些情况。性能最差的一种是使用位于设备可访问地址范围内的反弹缓冲区。位于
    32 位以上地址的 I/O 缓冲区内容在设备访问数据之前，必须先复制到新缓冲区。第二种方法涉及使用现代计算机上发现的特殊硬件电路，这些电路可以动态地将任何内存位置重映射到设备可访问的“虚拟”物理地址。

    - 尽管从用户应用程序的角度来看，内存似乎是连续的，但用户空间内存由可能散布在 RAM 各处的物理页面组成。假设一个应用程序想要将一个包含大型高清视频帧的缓冲区输出到视频设备。因为该帧在物理内存中严重碎片化，仅仅告诉设备单个缓冲区的地址和大小是不够的。我们需要告诉它构成该视频帧的所有碎片。因此，我们不直接告诉设备缓冲区的地址和大小，而是向其提供一个包含每个碎片位置列表的缓冲区。这个缓冲区被称为分散/聚集列表。我们稍后将更详细地讨论这个概念。


    从驱动程序的角度来看，大部分复杂性在于设置和准备用于传输的内存缓冲区。需要执行多个步骤。缓冲区需要被锁定，因为对底层内存进行页面换出操作可能是灾难性的，特别是当传输定向到存储设备时。由于某些设备只能访问位于
    32 位物理地址范围内的内存，我们需要确保支持我们缓冲区的物理内存位于设备可访问的范围内，或者我们必须确保它会被复制或重映射。然后，我们需要计算出支撑缓冲区的各个物理内存段，并捕获每个段的物理地址和长度，以创建一个分散/聚集列表。根据设备的能力，事情可能进一步复杂化，例如如果设备有特殊的对齐要求，或者对单个段的长度有限制。图
    9-5 显示了一个简单的分散/聚集列表。


    ![images](img/0905.jpg)


    ***图 9-5.** 简单分散/聚集列表*


    实际的实现可能更复杂，并且每个描述符可能关联有额外的数据，但为了说明概念，我们将其保持简单。图 9-5 展示了一个 32K 虚拟缓冲区如何由四个不同长度的物理段组成。分散/聚集列表是一个
    DMA 描述符元素的数组，每个元素包含一个指向列表中下一个描述符的指针。每个元素包含其所代表的物理段的地址和长度。当启动 DMA 传输时，我们可以简单地告诉设备第一个描述符的位置，设备将从第一个描述符读取内存，然后跟随下一个指针找到下一个描述符元素，直到列表末尾，在本例中由`NULL`指针终止。一些设备可能具有将最后一个描述符连接到第一个描述符的
    S/G 列表，从而为连续（流式）DMA 创建一个环形缓冲区。


    在图 9-5 中，我们使用了一种数据结构，在计算机科学和工程术语中，这种结构被称为单向链表。也许简单地将列表实现为标准数组会更简单。然而，单向链表的方法更加灵活，因为
    S/G 列表本身实际上也可以被分散聚集，因为每个 DMA 描述符元素在内存中不一定需要彼此相邻。

    '
- fmt: "\n##### Translating Physical Addresses to Bus Addresses\n\nModern computer\
    \ systems may take advantage of a special memory management unit (MMU) referred\
    \ to as the IOMMU, or I/O Memory Management Unit. The IOMMU is similar to the\
    \ system MMU that provides virtual to physical memory translation for the CPU,\
    \ but the IOMMU differs in that it provides translation to a hardware device instead.\
    \ When an IOMMU is involved a hardware device will use addresses provided by the\
    \ IOMMU instead of using physical addresses directly. The term *bus address* is\
    \ typically used to avoid confusion with physical addresses. [Figure 9-6](#Chapter09.html#fig_9_6)\
    \ shows how the IOMMU interacts with a system conceptually.\n\n![images](images/0906.jpg)\n\
    \n**Figure 9-6.** IOMMU address translation\n\nWhen an IOMMU is not used, a hardware\
    \ device will use the same physical addresses as the CPU. The IOMMU offers many\
    \ advantages that range from security to performance and solves some of the issues\
    \ discussed earlier, such as DMA transfers to older devices that are limited to\
    \ 32-bit addressing. The IOMMU can remap memory, even if the physical memory is\
    \ located at high memory addresses, so that the device can access the memory.\
    \ This helps system performance, as the only other solution for this problem is\
    \ to have a “bounce buffer” that we can copy to and perform DMA from, should the\
    \ original buffer be located at an address inaccessible to the device. From a\
    \ security/stability point of view, the IOMMU works like protected/virtual memory\
    \ does between tasks. PCI devices normally have full access to hardware, so if\
    \ a driver or device is malfunctioning, it is possible for it to corrupt random\
    \ parts of memory. The IOMMU can map up a limited aperture and prevent access\
    \ to addresses outside that window. The IOMMU is traditionally used for virtualization\
    \ on PC servers as it allows hardware to be shared without interference between\
    \ virtual machine instances and prevents rogue drivers from performing DMA transfers\
    \ to parts of memory belonging to other VM instances, which poses a serious security\
    \ problem.\n\nMac OS X will take advantage of the IOMMU where present. An IOMMU\
    \ would be represented by a subclass of the `IOMapper` class, so you can search\
    \ for that in `IORegistryExplorer` to determine if your system has one. Fortunately,\
    \ we never have to deal with the IOMMU directly. Classes like `IOMemoryDescriptor`\
    \ and `IODMACommand` (discussed later in this chapter) take care of setting this\
    \ up internally, and we can remain blissfully unaware if the address from functions,\
    \ such as `getPhysicalAddress()`, is a bus address mapped by the IOMMU or an actual\
    \ physical address. Though there should be few reasons to do so, you can implement\
    \ your own subclass of `IOMapper` to handle address translation yourself, and\
    \ supply this to classes such as `IODMACommand`. IOMMUs were typically only found\
    \ in high-powered workstations and servers, but are now also found in consumer\
    \ grade platforms such as Intel's Core i7.\n\n##### Preparing Memory for DMA\n\
    \nBefore a DMA transfer can occur, there are a few things that need to be done\
    \ to prepare the memory for transfer. The first is to ensure the memory is paged\
    \ into resident memory, and that the memory pages backing the buffer are locked\
    \ (pinned) so they will not be paged-out during the DMA transfer. To achieve this,\
    \ you need to create an `IOMemoryDescriptor` for the buffer. The memory descriptor\
    \ must be constructed with the task the buffer belongs to, `kernel_task` if the\
    \ kernel owns the buffer, otherwise the task pointer of a user space process.\
    \ If the direction of transfer is known at this time, you can pass that while\
    \ constructing the descriptor. The direction will be `kIODirectionOut`, if memory\
    \ is to be transferred to the device, and `kIODirectionIn`, if memory is to be\
    \ transferred from the device. There is also `kIODirectionInOut`, which can be\
    \ used for buffers that need to be used for transfers in either direction. It\
    \ is important to specify the correct direction as it may have implications for\
    \ cache-coherency as discussed above.\n\nIf you need to DMA from a kernel buffer,\
    \ the recommended way is to use `IOBufferMemoryDescriptor`, which is a subclass\
    \ of `IOMemoryDescriptor` that also allocates memory for you.\n\nThe `prepare()`\
    \ method of `IOMemoryDescriptor` takes care of paging in memory and pinning it\
    \ down. You can optionally pass the direction of the DMA transfer `to prepare()`\
    \ if it wasn't specified at the time the descriptor was initialized.\n\n![images](images/square.jpg)\
    \ **Caution** Calls to `IOMemoryDescriptor::prepare()` must be matched with a\
    \ call to `IOMemoryDescriptor::complete()`. It is a bug to call `complete()` on\
    \ a descriptor that was not previously prepared or prepared unsuccessfully.\n\n\
    ##### Building a Scatter/Gather List\n\nThere are several ways of building an\
    \ S/G list. The most basic way is to use `IOMemoryDescriptor::getPhysicalSegment()`\
    \ to enumerate the underlying physical segments as shown in [Listing 9-11](#Chapter09.html#list_9_11).\n\
    \n**Listing 9-11.** Retrieving Physical Segments from a Buffer\n\n```\nIOBufferMemoryDescriptor*\
    \ fDMABuffer =\nIOBufferMemoryDescriptor::inTaskWithOptions(kernel_task, kIODirectionOut,\
    \ 1024 * 1024, 4096);\nIOByteCount offset = 0;\nwhile (offset < fDMABuffer->getLength())\n\
    {   \n    IOByteCount segmentLength = 0;\n\n#ifdef __LP64__\n    addr64_t address\
    \ = fDMABuffer->getPhysicalSegment(offset, &segmentLength);     \n    // In a\
    \ real driver, we would store the address and length in a S/G list.\n    // We\
    \ just log it here.\n    IOLog(\"Physical segment: address 0x%llx segmentLength:\
    \ %llu\\n\", address, segmentLength);\n#else\n    addr64_t address = fDMABuffer->getPhysicalSegment(offset,\
    \ &segmentLength,\nkIOMemoryMapperNone);\n    IOLog(\"Physical segment: address\
    \ 0x%llx segmentLength: %lu\\n\", address, segmentLength);\n#endif\n    offset\
    \ += segmentLength;\n}\n```\n\nThe output of [Listing 9-11](#Chapter09.html#list_9_11)\
    \ will produce something similar to what is shown here:\n\n```\nJun 3 22:28:12\
    \ macpro kernel[0]:  Physical segment: address 0x13837000 segmentLength: 4096\n\
    Jun 3 22:28:12 macpro kernel[0]:  Physical segment: address 0x143b6000 segmentLength:\
    \ 4096\nJun 3 22:28:12 macpro kernel[0]:  Physical segment: address 0x1c035000\
    \ segmentLength: 4096\n…\n…\nJul 3 22:28:12 macbook kernel[0]: Physical segment:\
    \ address 0x14172000 segmentLength: 4096\n```\n\nIn the preceding output, there\
    \ were no contiguous segments so every segment consists of a separate page (4096\
    \ bytes). However, if we pass the `kIOMemoryPhysicallyContiguous` flag when we\
    \ allocate the buffer, we get the following:\n\n```\nJun 3 22:21:08 macpro kernel[0]:\
    \  Physical segment: address 0x5975000 segmentLength: 1048576\n```\n\nIt's not\
    \ a good idea to allocate memory contiguously in a driver; for a full discussion\
    \ why, see the section on `IOBufferMemoryDescriptor` in [Chapter 6](#Chapter06.html#ch6).\
    \ We do it here for demonstration purposes.\n\nThe approach in [Listing 9-11](#Chapter09.html#list_9_11)\
    \ may work just fine depending on the capabilities of your device, but there are\
    \ some problems with this technique:\n\n*   Some hardware devices have constraints\
    \ on the maximum or minimum length of a physical segment it can handle in an S/G\
    \ list.\n*   The device may require segments of a certain size, for example, page\
    \ sized segments, so it will match the hardware's buffer. In this case we may\
    \ need to break larger segments into smaller chunks manually.\n*   Many hardware\
    \ devices work with big-endian addressing. Therefore, we need to manually byte\
    \ swap the physical addresses to ensure that the device actually accesses the\
    \ correct location.\n"
  raw: '##### Translating Physical Addresses to Bus Addresses


    Modern computer systems may take advantage of a special memory management unit
    (MMU) referred to as the IOMMU, or I/O Memory Management Unit. The IOMMU is similar
    to the system MMU that provides virtual to physical memory translation for the
    CPU, but the IOMMU differs in that it provides translation to a hardware device
    instead. When an IOMMU is involved a hardware device will use addresses provided
    by the IOMMU instead of using physical addresses directly. The term *bus address*
    is typically used to avoid confusion with physical addresses. [Figure 9-6](#Chapter09.html#fig_9_6)
    shows how the IOMMU interacts with a system conceptually.


    ![images](images/0906.jpg)


    ***Figure 9-6.** IOMMU address translation*


    When an IOMMU is not used, a hardware device will use the same physical addresses
    as the CPU. The IOMMU offers many advantages that range from security to performance
    and solves some of the issues discussed earlier, such as DMA transfers to older
    devices that are limited to 32-bit addressing. The IOMMU can remap memory, even
    if the physical memory is located at high memory addresses, so that the device
    can access the memory. This helps system performance, as the only other solution
    for this problem is to have a “bounce buffer” that we can copy to and perform
    DMA from, should the original buffer be located at an address inaccessible to
    the device. From a security/stability point of view, the IOMMU works like protected/virtual
    memory does between tasks. PCI devices normally have full access to hardware,
    so if a driver or device is malfunctioning, it is possible for it to corrupt random
    parts of memory. The IOMMU can map up a limited aperture and prevent access to
    addresses outside that window. The IOMMU is traditionally used for virtualization
    on PC servers as it allows hardware to be shared without interference between
    virtual machine instances and prevents rogue drivers from performing DMA transfers
    to parts of memory belonging to other VM instances, which poses a serious security
    problem.


    Mac OS X will take advantage of the IOMMU where present. An IOMMU would be represented
    by a subclass of the `IOMapper` class, so you can search for that in `IORegistryExplorer`
    to determine if your system has one. Fortunately, we never have to deal with the
    IOMMU directly. Classes like `IOMemoryDescriptor` and `IODMACommand` (discussed
    later in this chapter) take care of setting this up internally, and we can remain
    blissfully unaware if the address from functions, such as `getPhysicalAddress(),`
    is a bus address mapped by the IOMMU or an actual physical address. Though there
    should be few reasons to do so, you can implement your own subclass of `IOMapper`
    to handle address translation yourself, and supply this to classes such as `IODMACommand`.
    IOMMUs were typically only found in high-powered workstations and servers, but
    are now also found in consumer grade platforms such as Intel''s Core i7.


    ##### Preparing Memory for DMA


    Before a DMA transfer can occur, there are a few things that need to be done to
    prepare the memory for transfer. The first is to ensure the memory is paged into
    resident memory, and that the memory pages backing the buffer are locked (pinned)
    so they will not be paged-out during the DMA transfer. To achieve this, you need
    to create an `IOMemoryDescriptor` for the buffer. The memory descriptor must be
    constructed with the task the buffer belongs to, `kernel_task` if the kernel owns
    the buffer, otherwise the task pointer of a user space process. If the direction
    of transfer is known at this time, you can pass that while constructing the descriptor.
    The direction will be `kIODirectionOut`, if memory is to be transferred to the
    device, and `kIODirectionIn`, if memory is to be transferred from the device.
    There is also `kIODirectionInOut`, which can be used for buffers that need to
    be used for transfers in either direction. It is important to specify the correct
    direction as it may have implications for cache-coherency as discussed above.


    If you need to DMA from a kernel buffer, the recommended way is to use `IOBufferMemoryDescriptor`,
    which is a subclass of `IOMemoryDescriptor` that also allocates memory for you.


    The `prepare()` method of `IOMemoryDescriptor` takes care of paging in memory
    and pinning it down. You can optionally pass the direction of the DMA transfer
    `to prepare()` if it wasn''t specified at the time the descriptor was initialized.


    ![images](images/square.jpg) **Caution** Calls to `IOMemoryDescriptor::prepare()`
    must be matched with a call to `IOMemoryDescriptor::complete()`. It is a bug to
    call `complete()` on a descriptor that was not previously prepared or prepared
    unsuccessfully.


    ##### Building a Scatter/Gather List


    There are several ways of building an S/G list. The most basic way is to use `IOMemoryDescriptor::getPhysicalSegment()`
    to enumerate the underlying physical segments as shown in [Listing 9-11](#Chapter09.html#list_9_11).


    ***Listing 9-11.** Retrieving Physical Segments from a Buffer*


    `IOBufferMemoryDescriptor* fDMABuffer =`

    `IOBufferMemoryDescriptor::inTaskWithOptions(kernel_task, kIODirectionOut, 1024
    * 1024, 4096);`

    `IOByteCount offset = 0;`

    `while (offset < fDMABuffer->getLength())`

    `{   `

    `    IOByteCount segmentLength = 0;`


    `#ifdef __LP64__`

    `    addr64_t address = fDMABuffer->getPhysicalSegment(offset, &segmentLength);     `

    `    // In a real driver, we would store the address and length in a S/G list.`

    `    // We just log it here.`

    `    IOLog("Physical segment: address 0x%llx segmentLength: %llu\n", address,
    segmentLength);`

    `#else`

    `    addr64_t address = fDMABuffer->getPhysicalSegment(offset, &segmentLength,`

    `kIOMemoryMapperNone);`

    `    IOLog("Physical segment: address 0x%llx segmentLength: %lu\n", address, segmentLength);`

    `#endif`

    `    offset += segmentLength;`

    `}`


    The output of [Listing 9-11](#Chapter09.html#list_9_11) will produce something
    similar to what is shown here:


    * * *


    `Jun 3 22:28:12 macpro kernel[0]:  Physical segment: address 0x13837000 segmentLength:
    4096`

    `Jun 3 22:28:12 macpro kernel[0]:  Physical segment: address 0x143b6000 segmentLength:
    4096`

    `Jun 3 22:28:12 macpro kernel[0]:  Physical segment: address 0x1c035000 segmentLength:
    4096`

    `…`

    `…`

    `Jul 3 22:28:12 macbook kernel[0]: Physical segment: address 0x14172000 segmentLength:
    4096`


    * * *


    In the preceding output, there were no contiguous segments so every segment consists
    of a separate page (4096 bytes). However, if we pass the `kIOMemoryPhysicallyContiguous`
    flag when we allocate the buffer, we get the following:


    * * *


    `Jun 3 22:21:08 macpro kernel[0]:  Physical segment: address 0x5975000 segmentLength:
    1048576`


    * * *


    It''s not a good idea to allocate memory contiguously in a driver; for a full
    discussion why, see the section on `IOBufferMemoryDescriptor` in [Chapter 6](#Chapter06.html#ch6).
    We do it here for demonstration purposes.


    The approach in [Listing 9-11](#Chapter09.html#list_9_11) may work just fine depending
    on the capabilities of your device, but there are some problems with this technique:


    *   Some hardware devices have constraints on the maximum or minimum length of
    a physical segment it can handle in an S/G list.

    *   The device may require segments of a certain size, for example, page sized
    segments, so it will match the hardware''s buffer. In this case we may need to
    break larger segments into smaller chunks manually.

    *   Many hardware devices work with big-endian addressing. Therefore, we need
    to manually byte swap the physical addresses to ensure that the device actually
    accesses the correct location.'
  trans: "\n\n##### 将物理地址转换为总线地址\n\n现代计算机系统可能会利用一种特殊的内存管理单元（MMU），称为 IOMMU，即输入/输出内存管理单元。IOMMU\
    \ 类似于为 CPU 提供虚拟地址到物理地址转换的系统 MMU，但 IOMMU 的不同之处在于它为硬件设备提供地址转换。当涉及 IOMMU 时，硬件设备将使用\
    \ IOMMU 提供的地址，而不是直接使用物理地址。术语 *总线地址* 通常用于避免与物理地址混淆。图 9-6 展示了 IOMMU 在概念上如何与系统交互。\n\
    \n![images](img/0906.jpg)\n\n**图 9-6.** IOMMU 地址转换\n\n当不使用 IOMMU 时，硬件设备将使用与 CPU\
    \ 相同的物理地址。IOMMU 提供了许多优势，从安全性到性能，并解决了之前讨论的一些问题，例如对受限于 32 位寻址的旧设备进行 DMA 传输。即使物理内存位于高内存地址，IOMMU\
    \ 也能重新映射内存，以便设备可以访问该内存。这有助于提高系统性能，因为解决此问题的唯一其他方法是使用“反弹缓冲区”，如果原始缓冲区位于设备无法访问的地址，我们可以将数据复制到该缓冲区并从中执行\
    \ DMA。从安全/稳定性的角度来看，IOMMU 的作用类似于任务之间的受保护/虚拟内存。PCI 设备通常对硬件拥有完全访问权限，因此如果驱动程序或设备发生故障，它可能会损坏随机的内存部分。IOMMU\
    \ 可以映射一个有限的地址窗口，并阻止访问该窗口之外的地址。IOMMU 传统上用于 PC 服务器上的虚拟化，因为它允许硬件在虚拟机实例之间共享而不会相互干扰，并防止恶意驱动程序对属于其他\
    \ VM 实例的内存部分执行 DMA 传输，这会造成严重的安全问题。\n\nMac OS X 会在存在 IOMMU 的情况下加以利用。IOMMU 将由 `IOMapper`\
    \ 类的子类表示，因此您可以在 `IORegistryExplorer` 中搜索该类，以确定您的系统是否具有 IOMMU。幸运的是，我们永远不必直接处理 IOMMU。像\
    \ `IOMemoryDescriptor` 和 `IODMACommand` 这样的类（本章稍后将讨论）会在内部处理其设置，我们可以愉快地不必关心来自诸如\
    \ `getPhysicalAddress()` 等函数的地址是由 IOMMU 映射的总线地址还是实际的物理地址。尽管这样做应该很少有理由，但您可以实现自己的\
    \ `IOMapper` 子类来自己处理地址转换，并将其提供给诸如 `IODMACommand` 等类。IOMMU 通常只出现在高性能工作站和服务器中，但现在也出现在消费级平台中，例如\
    \ Intel 的 Core i7。\n\n##### 为 DMA 准备内存\n\n在 DMA 传输可以发生之前，需要做一些事情来为传输准备内存。首先是确保内存被分页到驻留内存中，并且支撑缓冲区的内存页被锁定（固定），以便它们在\
    \ DMA 传输期间不会被换出。为了实现这一点，您需要为缓冲区创建一个 `IOMemoryDescriptor`。内存描述符必须使用缓冲区所属的任务来构造，如果内核拥有该缓冲区，则使用\
    \ `kernel_task`，否则使用用户空间进程的任务指针。如果在此时已知传输方向，您可以在构造描述符时传递该方向。如果内存要传输到设备，方向将是 `kIODirectionOut`；如果内存要从设备传输，方向将是\
    \ `kIODirectionIn`。还有 `kIODirectionInOut`，可用于需要在任一方向上进行传输的缓冲区。指定正确的方向很重要，因为它可能像上面讨论的那样影响缓存一致性。\n\
    \n如果您需要从内核缓冲区进行 DMA，推荐的方法是使用 `IOBufferMemoryDescriptor`，它是 `IOMemoryDescriptor`\
    \ 的一个子类，并且会为您分配内存。\n\n`IOMemoryDescriptor` 的 `prepare()` 方法负责将内存分页并固定下来。如果在初始化描述符时未指定方向，您可以选择将\
    \ DMA 传输的方向传递给 `prepare()`。\n\n![images](img/square.jpg) **注意** 对 `IOMemoryDescriptor::prepare()`\
    \ 的调用必须与对 `IOMemoryDescriptor::complete()` 的调用配对。对之前未准备或准备失败的描述符调用 `complete()`\
    \ 是一个错误。\n\n##### 构建分散/聚集列表\n\n有几种构建 S/G 列表的方法。最基本的方法是使用 `IOMemoryDescriptor::getPhysicalSegment()`\
    \ 来枚举底层的物理段，如清单 9-11 所示。\n\n**清单 9-11.** 从缓冲区中检索物理段\n\n```\nIOBufferMemoryDescriptor*\
    \ fDMABuffer =\nIOBufferMemoryDescriptor::inTaskWithOptions(kernel_task, kIODirectionOut,\
    \ 1024 * 1024, 4096);\nIOByteCount offset = 0;\nwhile (offset < fDMABuffer->getLength())\n\
    {   \n    IOByteCount segmentLength = 0;\n\n#ifdef __LP64__\n    addr64_t address\
    \ = fDMABuffer->getPhysicalSegment(offset, &segmentLength);     \n    // 在真正的驱动程序中，我们会将地址和长度存储在\
    \ S/G 列表中。\n    // 这里我们仅记录它。\n    IOLog(\"物理段: address 0x%llx segmentLength: %llu\\\
    n\", address, segmentLength);\n#else\n    addr64_t address = fDMABuffer->getPhysicalSegment(offset,\
    \ &segmentLength,\nkIOMemoryMapperNone);\n    IOLog(\"物理段: address 0x%llx segmentLength:\
    \ %lu\\n\", address, segmentLength);\n#endif\n    offset += segmentLength;\n}\n\
    ```\n\n清单 9-11 的输出将产生类似于此处所示的内容：\n\n```\nJun 3 22:28:12 macpro kernel[0]:  物理段:\
    \ address 0x13837000 segmentLength: 4096\nJun 3 22:28:12 macpro kernel[0]:  物理段:\
    \ address 0x143b6000 segmentLength: 4096\nJun 3 22:28:12 macpro kernel[0]:  物理段:\
    \ address 0x1c035000 segmentLength: 4096\n…\n…\nJul 3 22:28:12 macbook kernel[0]:\
    \ 物理段: address 0x14172000 segmentLength: 4096\n```\n\n在上述输出中，没有连续的段，因此每个段由一个单独的页（4096\
    \ 字节）组成。但是，如果我们在分配缓冲区时传递了 `kIOMemoryPhysicallyContiguous` 标志，我们将得到以下结果：\n\n```\n\
    Jun 3 22:21:08 macpro kernel[0]:  物理段: address 0x5975000 segmentLength: 1048576\n\
    ```\n\n在驱动程序中连续分配内存不是一个好主意；关于原因的完整讨论，请参阅第 6 章 中关于 `IOBufferMemoryDescriptor` 的部分。我们在此处这样做是为了演示目的。\n\
    \n清单 9-11 中的方法可能根据您设备的能力而工作得很好，但是这种技术存在一些问题：\n\n-   某些硬件设备对 S/G 列表中能处理的物理段的最大或最小长度有限制。\n\
    -   设备可能需要特定大小的段，例如，页大小的段，以便与硬件的缓冲区匹配。在这种情况下，我们可能需要手动将较大的段分解为较小的块。\n-   许多硬件设备使用大端寻址。因此，我们需要手动对物理地址进行字节交换，以确保设备实际访问正确的位置。\n\
    \n"
- fmt: "### The IODMACommand Class\n\nThe `IODMACommand` solves a number of the previously\
    \ discussed problems associated with DMA. It can automatically divide segments\
    \ to the correct size needed by the hardware, as well as ensure that devices only\
    \ capable of 32-bit addressing are guaranteed to be in the correct range. This\
    \ is achieved by using the IOMMU to remap addresses if an IOMMU is present, or\
    \ by employing a workaround if not. It is also capable of providing 32-bit or\
    \ 64-bit physical or bus addresses in little or big-endian format. The `IODMACommand`\
    \ class supersedes the `IOMemoryCursor` class, which performs many of the same\
    \ functions, but offers fewer options.\n\nAn instance of the `IODMACommand` can\
    \ be constructed with the factory method `withSpecification()` as following.\n\
    \n```\nstatic IODMACommand * withSpecification(\n    SegmentFunction outSegFunc,\n\
    \    UInt8 numAddressBits,\n    UInt64 maxSegmentSize,\n    MappingOptions mappingOptions\
    \ = kMapped,\n    UInt64 maxTransferSize = 0,\n    UInt32 alignment = 1,\n   \
    \ IOMapper *mapper = 0,\n    void *refCon = 0);\n```\n\nLet's look at the parameters\
    \ in more detail. The first parameter is a function pointer to a function that\
    \ is used to output segment information. You can write your own if you are supporting\
    \ an esoteric hardware device, however, for most cases, you can use one of the\
    \ supplied ones:\n\n- `kIODMACommandOutputHost32` outputs 32-bit addresses in\
    \ host byte order\n- `kIODMACommandOutputBig32` outputs 32-bit addresses in big-endian\
    \ format\n- `kIODMACommandOutputLittle32` outputs 32-bit addresses in little-endian\
    \ format\n- `kIODMACommandOutputHost64` outputs 64-bit addresses in host byte\
    \ order\n- `kIODMACommandOutputBig64` outputs 64-bit addresses in big-endian format\n\
    - `kIODMACommandOutputLittle64` outputs 64-bit addresses in little-endian format\n\
    \nThe next parameter, `numAddressBits`, allows you to specify the maximum number\
    \ of address bits the hardware can address, which is not always 32-bit or 64-bit.\
    \ It can, for example, be 36-bit or even less than 32-bit in some cases. If the\
    \ value passed is greater than 32-bit, you must specify one of the 64-bit output\
    \ segment functions.\n\nIf physical pages are located at an address higher than\
    \ what the device can address, some or all pages may be copied to temporary pages\
    \ that meet the address requirements, unless there is an IOMMU present. Needless\
    \ to say extra copying is expensive and can be avoided if you DMA from memory\
    \ allocated by an `IOBufferMemoryDescriptor` with the `inTaskWithPhysicalMask()`\
    \ factory method, as it allows you to allocate memory with physical addresses\
    \ that are in the range specified by a bitmask. This method can also be used to\
    \ allocate memory directly into the address space of a user space task. This is\
    \ useful as DMA to/from user space allocated buffers can be problematic, as there\
    \ is no way to control how the memory is allocated.\n\nThe parameter `maxSegmentSize`\
    \ should be set to the largest physical contiguous segment that a device can handle\
    \ as a segment in a scatter/gather list. Zero can be passed if there are no such\
    \ restrictions.\n\nThe `mappingOptions` parameter allows bypassing of the IOMMU\
    \ if one is present in the system. The default is to use the IOMMU. The `mapper`\
    \ parameter allows you to specify an alternate `IOMapper` instance to be used\
    \ instead of the default.\n\nThe `maxTransferSize` is the total number of bytes\
    \ that can be transferred per DMA transaction. For example, a hard drive may have\
    \ 1MB cache buffer, so we would not want to transfer more information than what\
    \ it can accept.\n\nIf the hardware has specific alignment requirements, this\
    \ can be specified with the `alignment` parameter. If the supplied memory is not\
    \ aligned properly, it may again result in the copying or remapping of memory.\n\
    \nLet's modify the previous example in [Listing 9-11](#Chapter09.html#list_9_11)\
    \ that used `IOMemoryDescriptor::getPhysicalSegment()` to instead use `IODMACommand`\
    \ as shown in [Listing 9-12](#Chapter09.html#list_9_12).\n\n**Listing 9-12.**\
    \ Generating a Scatter/Gather List Using IODMACommand\n\n```\nIOReturn com_osxkernel_MyFirstPCIDriver::prepareDMATransfer()\n\
    {    \n    IODMACommand*      dmaCommand;\n    IOReturn                      \
    \  ret = kIOReturnSuccess;\n\n    dmaCommand = IODMACommand::withSpecification(kIODMACommandOutputHost64,\
    \ 36, 2048,                 \n                 IODMACommand::kMapped, 0, 1);\n\
    \    if (!dmaCommand)\n    {\n        return kIOReturnNoMemory;\n    }\n\n   \
    \ // Will also prepare the memory descriptor.\n    ret = dmaCommand->setMemoryDescriptor(fDMABuffer);\n\
    \    if (ret != kIOReturnSuccess)\n        return ret;\n\n    UInt64 offset =\
