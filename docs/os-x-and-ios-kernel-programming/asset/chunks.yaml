    ```\n$9 = {\n  <IOService> = {\n    <IORegistryEntry> = {\n      <OSObject> =\
    \ {\n        <OSMetaClassBase> = {\n          _vptr$OSMetaClassBase = 0x9baa00\n\
    \        },\n        members of OSObject:\n        retainCount = 65537\n     \
    \ },\n      members of IORegistryEntry:\n      reserved = 0x4e71a40,\n      fRegistryTable\
    \ = 0xb693800,\n      fPropertyTable = 0x503a400\n    },\n    members of IOService:\n\
    \    reserved = 0x0,\n    __provider = 0x4d17f00,\n    …….\n  },\n  members of\
