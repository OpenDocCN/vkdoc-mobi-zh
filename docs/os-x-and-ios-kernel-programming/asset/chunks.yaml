    \ (IOService* client,\n                                UInt64 byteStart,\n   \
    \                             IOMemoryDescriptor* buffer, IOStorageAttributes*\
    \ attributes,\n                                IOStorageCompletion* completion)\n\
    {\n        IOMemoryDescriptor*             newDesc;\n\n        // Allocate a buffer\
    \ to hold the encrypted data and perform the encryption\n        newDesc = encryptBuffer(buffer);\n\
    \        if (newDesc == NULL)\n        {\n                // Return an error if\
    \ a destination buffer could not be allocated.\n                complete(completion,\
    \ kIOReturnNoMemory);\n                return;\n        }\n\n        // Perform\
    \ a write of the encrypted data to the encrypted IOMedia object.\n        m_encryptedMedia->write(client,\
    \ byteStart, newDesc, attributes, completion);\n\n        // Release our reference\
    \ to the encrypted IOMemoryDescriptor\n        newDesc->release();\n}\n```"
