    \ I/O 方式，且只能通过特殊的 in/out CPU 指令访问。某些传统设备（如 IDE 控制器）可能同时包含 I/O 端口和内存，并可通过任一种方式控制。另一方面，I/O\
    \ 内存效率更高且更易访问，因为它可以直接映射到系统的内存空间，像普通内存一样被访问。I/O 内存通常被称为内存映射 I/O（MMIO）。此概念不应与虚拟地址空间之间的内存映射或文件内存映射（`mmap`）混淆。\n\
    \n如果设备内存区域设置了内存预取位，CPU 可能会缓存对已映射设备内存的访问。\n\n如何通过内存区域控制设备？这完全取决于设备本身。例如，一个区域可用于控制和状态寄存器，而另一个区域可用于读取或写入数据（例如来自摄像头的输入视频）。如果您正在以电子形式阅读本文，那么这段文字可能正被持续写入代表显卡帧缓冲区的内存区域。与\
    \ USB 类似，基于 PCI 的设备也存在一系列标准化接口。例如，VGA 兼容显卡允许通过包含内存区域和/或端口的已知接口实现显卡的基本操作。IDE、SATA\
    \ 和基于 PCI 的 USB 控制器也存在标准化接口，使操作系统能够为符合此类接口的任何设备使用默认驱动程序。\n\n由于 PCI 是“即插即用”的，PCI\
