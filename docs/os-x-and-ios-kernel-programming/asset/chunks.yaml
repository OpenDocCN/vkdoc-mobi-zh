    \    // Failure - release resources and return NULL\n        if (matchingDictionary\
    \ != NULL)\n                CFRelease(matchingDictionary);\n\n        return NULL;\n\
    }\n```\n\n![images](images/square.jpg) **Note:** An application can narrow the\
    \ matching dictionary by adding any of the keys that could be placed in the property\
    \ list of a kernel-based USB driver (see Chapter 8). For example, an application\
    \ may include any of the keys `idVendor`, `idProduct`, `bcdDevice`, `bDeviceSubClass`,\
    \ or `bDeviceProtocol`.\n\nFor a composite USB device, a driver may prefer to\
    \ match against a particular interface rather than the entire USB device. A user-space\
    \ driver is able to do this by creating a matching dictionary for a specific instance\
    \ of an `IOUSBInterface` object. This is because the I/O Kit defines a user client\
    \ for every instance of both the `IOUSBDevice` class and the `IOUSBInterface`\
    \ class that is created in the kernel, which makes both of these classes available\
    \ to user processes.\n\nHaving created a matching dictionary, an application is\
    \ able to use the dictionary to iterate over all kernel objects that match its\
    \ specifications or to install a callback to receive notifications when such a\
    \ kernel object appears. This was described in Chapter 5. An example of a function\
    \ to iterate over all kernel devices described by a given matching dictionary\
    \ is given in Listing 15-2.\n\n**Listing 15-2.** Finding and Iterating Over Devices\
    \ That Satisfy a Matching Dictionary\n\n```c\nvoid    MyFindMatchingDevices (CFDictionaryRef\
