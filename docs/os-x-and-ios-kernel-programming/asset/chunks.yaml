    提供给回调函数的第一个参数 `requestTag`，用于标识此完成回调所引用的资源。第二个参数 `result` 告知调用者操作是否成功完成。如果 `result`
    的值为 `kIOReturnSuccess`，则表明已成功从磁盘读取资源数据，接下来的两个参数 `resourceData` 和 `resourceDataLength`
    包含所请求资源文件的内容。`resourceData` 缓冲区仅在回调函数内有效，因此如果驱动程序希望在回调之外引用资源数据，必须制作一份数据副本。最后一个参数
    `context` 包含传递给 `OSKextRequestResource` 函数的上下文参数值。


    剩下的步骤是将资源文件添加到驱动程序包中。通过 `OSKextRequestResource` 函数加载的任何资源都必须位于驱动程序包的 `Resources`
    子目录中。大多数情况下，可以通过将该文件添加到驱动程序的 Xcode 项目来实现此目的。对于除源代码之外的文件类型，Xcode 在构建项目时默认会将文件复制到包的资源目录中。


    ## 超越 KEXT 资源


    上一节讨论的资源加载函数是为特定目的而设计的。I/O Kit 函数为驱动程序提供了对其 `Resources` 目录中文件内容的只读访问权限。然而，在许多情况下，驱动程序访问其包之外的文件或写入磁盘上的文件是很有用的。例如，提供持久化设置的驱动程序需要某种方法来从磁盘上的文件读取这些设置。它还需要一种方法将这些设置写入磁盘。


    尽管 I/O Kit 不包含为驱动程序提供此类功能的函数，但其资源加载函数的实现为我们提供了如何将此类功能添加到我们自己的驱动程序中的线索。正如 I/O Kit
    依赖用户空间守护进程代表内核加载资源文件一样，驱动程序可以通过提供自己的用户空间守护进程来处理代表其发出的请求，从而实现对磁盘上文件中持久化设置的读写。下一节将介绍这种设计，它开辟了一种更通用的解决方案，可以扩展到驱动程序偏好设置之外。


    ## 来自内核驱动程序的通知


    从内核驱动程序访问任意文件系统项的通用解决方案是实现一个用户空间守护进程，作为内核驱动程序的辅助进程。此进程将处理来自驱动程序的请求，执行指定的操作，然后将操作结果传回驱动程序。这种方法可以扩展到读取和写入文件等请求之外，并可用于执行内核中无法实现的操作，例如向用户显示对话框。源自内核的用户交互的一个典型例子是标准
    USB 家族，当连接一个需要比 USB 总线所能提供的更多功率的设备时，它会显示一个警告对话框。


    ![images](img/square.jpg)


    **注意：** `IOUSBFamily` 目前使用一个称为内核-用户通知中心的已弃用接口来显示警告消息，例如低电量警告。I/O Kit 曾经提供一个 API，允许驱动程序通过标准的系统守护进程显示对话框。然而，这个
    API 现已弃用，驱动程序现在必须提供自己的守护进程。


    驱动程序希望执行的任何在内核中无法实现的操作，例如写入文件、显示错误消息，甚至启动应用程序，都可以通过用户空间守护进程来执行。实际上，驱动程序代码被分为两部分：内核驱动程序和用户空间守护进程。这种设计使用了在第
    5 章中讨论的相同技术。不过，不是用户启动用户空间进程，而是由系统自动启动一个后台守护进程。


    用户空间守护进程和驱动程序协同工作以执行某些操作。大多数时候，用户空间守护进程处于空闲状态。它仅在收到来自内核驱动程序的请求时才会行动。用户空间守护进程需要响应三种通知：


    - 新内核驱动程序的加载

    - 内核驱动程序的卸载

    - 来自驱动程序的操作请求


    由于守护进程将在系统启动时启动，它可能在其对应的内核驱动程序启动之前就启动了。因此，该进程应安装一个回调，以便在其内核驱动程序启动或停止时接收通知。在大多数情况下，守护进程与驱动程序实例之间是一对多的关系，单个守护进程将处理来自当前加载的所有驱动程序实例的请求。


    守护进程可以通过为其驱动程序安装匹配字典来监视其内核驱动程序实例的加载和卸载，如第 5 章所述。无论是后台守护进程还是具有用户界面的应用程序，进程执行此操作的步骤都是相同的。守护进程能够通过驱动程序的
    `IOUserClient` 类发送请求，使用第 5 章中描述的 I/O Kit 框架的函数与其内核驱动程序进行通信。


    在第 5 章中，您了解了用户空间进程如何向内核驱动程序发出请求并发送数据。这一点很重要，因为守护进程将使用这种方法将操作结果发送回内核驱动程序。现在，我们将介绍进程如何接收来自内核的通知，例如代表驱动程序执行操作的请求——例如，向用户显示错误消息。


    从内核驱动程序到用户空间守护进程的通信通过 Mach 端口进行。建立内核驱动程序可用于向用户空间进程发送通知的通信通道涉及以下步骤：

    '
- fmt: "1.  用户空间守护进程通过调用`IOServiceOpen()`定位其驱动实例并打开与该驱动的用户客户端的连接，如[第5章](#Chapter05.html#ch5)所述。\n\
    2.  守护进程创建一个能够接收内核驱动通知的`mach`端口。此操作通过调用`CFMachPortCreate()`函数完成。该函数接受多个参数，包括一个用于传递通知的回调函数。\n\
    3.  守护进程为该`mach`端口创建运行循环源，并将其安装到其某个线程的运行循环中。之后，当在`mach`端口上收到通知时，会在运行循环线程上执行守护进程的回调。\n\
    4.  守护进程通过调用`IOConnectSetNotificationPort()`函数将`mach`端口传递给内核驱动。作为响应，驱动的用户客户端会调用其`registerNotificationPort()`方法。\n\
    5.  在内核中，用户客户端实现了虚方法`registerNotificationPort()`。客户端接收由用户空间守护进程创建的`mach`端口，并将其值保存在一个实例变量中。\n\
    6.  当驱动希望通知用户空间守护进程某个事件时，会调用`mach_msg_send_from_kernel()`函数，并提供其希望传递给用户空间守护进程的任何数据。\n\
    7.  作为响应，守护进程的回调函数会被调用。该回调函数接收从内核驱动传递过来的任何数据，并处理内核的请求。如果操作结果需要回传给内核，用户空间守护进程可以通过调用驱动的用户客户端定义的任何方法来实现，如[第5章](#Chapter05.html#ch5)所述。\n\
    \n在本节的剩余部分，我们将通过一个示例来演示如何将通知从内核驱动发送到用户空间进程。首先，你需要定义一个结构体，用于描述要从内核驱动发送到用户空间守护进程的数据。该结构体必须以`mach_msg_header_t`结构体开头，因为它描述了用户空间守护进程中将要接收数据的`mach`目标端口。在`mach_msg_header_t`字段之后，该结构体可以包含多个字段，用于允许将任意数据随通知一起发送到用户空间守护进程。该结构体的定义必须对用户空间守护进程和内核驱动都是可访问的，因此应放置在一个两个项目都能包含的头文件中。以下是允许将两个整数参数从内核传递到用户守护进程的结构体定义示例：\n\
    \n```\ntypedef struct {\n    mach_msg_header_t       messageHeader;\n    uint32_t\
    \                customParameter1;\n    uint32_t                customParameter2;\n\
    } MyNotificationMessage;\n```\n\n下面列出的代码是接收内核发送的通知的用户空间回调函数示例。名为`msg`的参数包含了整个`MyNotificationMessage`结构体，包括添加的两个任意整数。这些位于消息头部之后的额外字段，既可用于描述驱动希望用户空间守护进程执行的操作，也可用于传递该操作所需的其他参数。\n\
    \n```\nvoid   MyDriverRequestCallback (CFMachPortRef port, void *msg, CFIndex\
    \ size, void *info)\n{\n    MyNotificationMessage* notify = (MyNotificationMessage*)msg;\n\
    \n    printf(\"Param 1 is %x, param 2 is %x\\n\", notify->customParameter1,\n\
    \            notify->customParameter2);\n}\n```\n\n[列表 17-3](#Chapter17.html#list_17_3)\
    \ 中显示的代码片段演示了用户空间守护进程为安装一个用于接收内核驱动通知的`mach`端口所必须采取的步骤。第一步是分配一个`mach`端口和相应的运行循环源，并将该`mach`端口安装到其运行循环中。接下来，将这个`mach`端口提供给内核驱动。每当驱动希望向用户空间进程发送通知时，该请求都会通过提供的`mach`端口进行传递。\n\
    \n***列表 17-3.** 用于安装回调以接收内核驱动通知的用户空间代码*\n\n```\nCFMachPortContext      portContext;\n\
    CFMachPortRef          notificationPort = NULL;\nCFRunLoopSourceRef     runLoopSource\
    \ = NULL;\nkern_return_t          kr;\n\n// Set up the CFMachPortContext structure\
    \ that is needed when creating the mach port.\nportContext.version = 0;\nportContext.info\
    \ = (void*)context; // Arbitrary pointer provided to the callback\nportContext.retain\
    \ = NULL;\nportContext.release = NULL;\nportContext.copyDescription = NULL;\n\n\
    // Create a mach port.\nnotificationPort = CFMachPortCreate(kCFAllocatorDefault,\
    \ MyDriverRequestCallback, &portContext,  NULL);\nif (notificationPort)\n{\n \
    \   // Create a run loop source for the mach port.\n    runLoopSource = CFMachPortCreateRunLoopSource(kCFAllocatorDefault,\
    \ notificationPort, 0);\n    // Install the run loop source on the run loop that\
    \ corresponds to the current thread.\n    CFRunLoopAddSource(CFRunLoopGetCurrent(),\
    \ runLoopSource, kCFRunLoopDefaultMode);\n}\n// Pass the notification port to\
    \ the driver.\nkr = IOConnectSetNotificationPort(driverConnection, 0,\n      \
    \                            CFMachPortGetPort(notificationPort), 0);\n```\n\n\
    用户空间函数`IOConnectSetNotificationPort()`会导致调用驱动的用户客户端的`registerNotificationPort()`方法。这是一个在`IOUserClient`基类中定义的虚方法，但需要由每个子类来实现。在下面的示例实现中，`registerNotificationPort()`方法复制了对应于用户空间进程通知端口的`mach`端口，以便将来当驱动希望向用户空间进程发送信号时可以使用它。\n\
    \n```\nIOReturn       com_osxkernel_driver_IOKitTestUserClient::\n       registerNotificationPort\
    \ (mach_port_t port, UInt32 type, io_user_reference_t refCon)\n{\n    m_notificationPort\
    \ = port;\n    return kIOReturnSuccess;\n}\n```\n\n在设置了进程的通知端口之后，内核驱动现在能够在需要时向用户空间守护进程发送信号。这通常通过`IOUserClient`子类来执行，因为通知端口特定于某个用户客户端。一个可被调用以向用户空间进程传递两个任意整数的自定义用户客户端方法示例，如[列表\
    \ 17-4](#Chapter17.html#list_17_4) 所示。\n\n***列表 17-4.** 一个从驱动向用户空间进程发送通知的自定义方法*\n\
    \n```\nIOReturn       com_osxkernel_driver_IOKitTestUserClient::\n       mySendNotification\
    \ (uint32_t parameter1, uint32_t parameter2)\n{\n    MyNotificationMessage  notification;\n\
    \    IOReturn               result;\n\n    if (m_notificationPort == MACH_PORT_NULL)\n\
    \        return kIOReturnError;\n\n    // Set up the standard mach_msg_header_t\
    \ fields.\n    notification.messageHeader.msgh_bits = MACH_MSGH_BITS(MACH_MSG_TYPE_COPY_SEND,\
    \ 0);\n    notification.messageHeader.msgh_size = sizeof(MyNotificationMessage);\n\
    \    notification.messageHeader.msgh_remote_port = m_notificationPort;\n    notification.messageHeader.msgh_local_port\
    \ = MACH_PORT_NULL;\n    notification.messageHeader.msgh_reserved = 0;\n    notification.messageHeader.msgh_id\
    \ = 0;\n\n    notification.customParameter1 = parameter1;\n    notification.customParameter2\
    \ = parameter2;\n\n    // Send the request to user space\n    result = mach_msg_send_from_kernel(\n\
    \                 &notification.messageHeader, sizeof(MyNotificationMessage));\n\
    \n    return result;\n}\n```"
  raw: '1.  The user space daemon locates an instance of its driver and opens a connection
    to the driver''s user client by calling `IOServiceOpen()`, as described in [Chapter
    5](#Chapter05.html#ch5).

    2.  The daemon creates a mach port that is able to receive notifications from
    the kernel driver. This is done using the function `CFMachPortCreate()`. The function
    accepts a number of arguments including a callback function, which is used to
    deliver notifications.

    3.  The daemon creates a run loop source for the mach port and installs the source
    into one of its thread''s run loops. Later, when a notification is received on
    the mach port, the daemon''s callback is run on the run loop thread.

    4.  The daemon passes the mach port to the kernel driver, using the function `IOConnectSetNotificationPort()`.
    In response, the driver''s user client receives a call to its method `registerNotificationPort()`.

    5.  In the kernel, the user client implements the virtual method `registerNotificationPort()`.
    The client receives the mach port that was created by the user space daemon and
    saves the value in an instance variable.

    6.  When the driver wishes to notify the user space daemon of an event, it calls
    the function `mach_msg_send_from_kernel()` and provides any data that it wishes
    to pass to the user space daemon.

    7.  In response, the daemon''s callback function is invoked. The callback function
    receives any data that was passed from the kernel driver, and it handles the kernel''s
    request. If the result of the operation needs to be passed back to the kernel,
    the user space daemon can do so by calling any of the methods defined by the driver''s
    user client, as described in [Chapter 5](#Chapter05.html#ch5).


    In the rest of this section, we''ll go through an example of sending a notification
    from a kernel driver to a user space process. To begin with, you need to define
    a structure that will describe the data to be sent from the kernel driver to the
    user space daemon. This structure must begin with the `mach_msg_header_t` structure,
    since this describes the destination mach port within the user space daemon that
    will receive the data. Following the `mach_msg_header_t` field, the structure
    may contain a number of fields that allow arbitrary data to be sent along with
    the notification to the user space daemon. The definition of this structure must
    be accessible to both the user space daemon and the kernel driver, so it should
    be placed in a header file that can be included by both projects. The following
    is a sample definition for a structure that allows two integer parameters to be
    passed from the kernel to the user daemon:


    `typedef struct {`

    `       mach_msg_header_t       messageHeader;`

    `       uint32_t                customParameter1;`

    `       uint32_t                customParameter2;`

    `} MyNotificationMessage;`


    An example of the user space callback function that receives the notification
    sent from the kernel is given in the following listing. The parameter named `msg`
    contains the entire `MyNotificationMessage` structure, including the two arbitrary
    integers that were added. These extra fields that follow the message header can
    be used both to describe the operation that the driver wishes the user space daemon
    to perform and to pass additional parameters that are needed for the operation.


    `void   MyDriverRequestCallback (CFMachPortRef port, void *msg, CFIndex size,
    void *info)`

    `{`

    `       MyNotificationMessage* notify = (MyNotificationMessage*)msg;`


    `       printf("Param 1 is %x, param 2 is %x\n", notify->customParameter1,`

    `               notify->customParameter2);`

    `}`


    The code snippet shown in [Listing 17-3](#Chapter17.html#list_17_3) demonstrates
    the steps that the user space daemon must take to install a mach port where it
    will receive notifications from the kernel driver. The first step is to allocate
    a mach port and a corresponding run loop source, and to install the mach port
    into its run loop. Next, the mach port is provided to the kernel driver. Whenever
    the driver wishes to send a notification to the user space process, that request
    is delivered over the provided mach port.


    ***Listing 17-3.** User Space Code to Install a Callback to Receive Notifications
    from a Kernel Driver*


    `CFMachPortContext      portContext;`

    `CFMachPortRef          notificationPort = NULL;`

    `CFRunLoopSourceRef     runLoopSource = NULL;`

    `kern_return_t          kr;`


    `// Set up the CFMachPortContext structure that is needed when creating the mach
    port.`

    `portContext.version = 0;`

    `portContext.info = (void*)context; // Aribtrary pointer provided to the callback`

    `portContext.retain = NULL;`

    `portContext.release = NULL;`

    `portContext.copyDescription = NULL;`


    `// Create a mach port.`

    `notificationPort = CFMachPortCreate(kCFAllocatorDefault, MyDriverRequestCallback,
    &portContext,  NULL);`

    `if (notificationPort)`

    `{`

    `     // Create a run loop source for the mach port.`

    `     runLoopSource = CFMachPortCreateRunLoopSource(kCFAllocatorDefault, notificationPort,
    0);`

    `     // Install the run loop source on the run loop that corresponds to the current
    thread.`

    `     CFRunLoopAddSource(CFRunLoopGetCurrent(), runLoopSource, kCFRunLoopDefaultMode);`

    `}`

    `/``/ Pass the notification port to the driver.`

    `kr = IOConnectSetNotificationPort(driverConnection, 0,`

    `                                  CFMachPortGetPort(notificationPort), 0);`


    The user space function `IOConnectSetNotificationPort()` results in a call to
    the driver''s user client of the method `registerNotificationPort()`. This is
    a virtual method that is defined in the `IOUserClient` base class, but which needs
    to be implemented by each subclass. In the following sample implementation, the
    `registerNotificationPort()` method takes a copy of the mach port that corresponds
    to the user space process''s notification port so that it can be used in the future
    whenever the driver wishes to signal the user space process.


    `IOReturn       com_osxkernel_driver_IOKitTestUserClient::`

    `       registerNotificationPort (mach_port_t port, UInt32 type, io_user_reference_t
    refCon)`

    `{`

    `     m_notificationPort = port;`

    `     return kIOReturnSuccess;`

    `}`


    Having set up the process''s notification port, the kernel driver is now able
    to signal the user space daemon when needed. This is typically performed through
    the `IOUserClient` subclass, since the notification port is specific to a particular
    user client. An example of a custom user client method that can be called to pass
    two arbitrary integers to the user space process is shown in [Listing 17-4](#Chapter17.html#list_17_4).


    ***Listing 17-4.** A Custom Method to Send a Notification from a Driver to a User
    Space Process*


    `IOReturn       com_osxkernel_driver_IOKitTestUserClient::`

    `       mySendNotification (uint32_t parameter1, uint32_t parameter2)`

    `{`

    `     MyNotificationMessage  notification;`

    `     IOReturn               result;`


    `     if (m_notificationPort == MACH_PORT_NULL)`

    `         return kIOReturnError;`


    `     // Set up the standard mach_msg_header_t fields.`

    `     notification.messageHeader.msgh_bits = MACH_MSGH_BITS(MACH_MSG_TYPE_COPY_SEND,
    0);`

    `     notification.messageHeader.msgh_size = sizeof(MyNotificationMessage);`

    `     notification.messageHeader.msgh_remote_port = m_notificationPort;`

    `     notification.messageHeader.msgh_local_port = MACH_PORT_NULL;`

    `     notification.messageHeader.msgh_reserved = 0;`

    `     notification.messageHeader.msgh_id = 0;`


    `     notification.customParameter1 = parameter1;`

    `     notification.customParameter2 = parameter2;`


    `     // Send the request to user space`

    `     result = mach_msg_send_from_kernel(`

    `                  &notification.messageHeader, sizeof(MyNotificationMessage));`


    `     return result;`

    `}`'
  trans: "1.  用户空间守护进程通过调用`IOServiceOpen()`定位其驱动实例并打开与该驱动的用户客户端的连接，如第 5 章所述。\n2. \
    \ 守护进程创建一个能够接收内核驱动通知的`mach`端口。此操作通过调用`CFMachPortCreate()`函数完成。该函数接受多个参数，包括一个用于传递通知的回调函数。\n\
    3.  守护进程为该`mach`端口创建运行循环源，并将其安装到其某个线程的运行循环中。之后，当在`mach`端口上收到通知时，会在运行循环线程上执行守护进程的回调。\n\
    4.  守护进程通过调用`IOConnectSetNotificationPort()`函数将`mach`端口传递给内核驱动。作为响应，驱动的用户客户端会调用其`registerNotificationPort()`方法。\n\
    5.  在内核中，用户客户端实现了虚方法`registerNotificationPort()`。客户端接收由用户空间守护进程创建的`mach`端口，并将其值保存在一个实例变量中。\n\
    6.  当驱动希望通知用户空间守护进程某个事件时，会调用`mach_msg_send_from_kernel()`函数，并提供其希望传递给用户空间守护进程的任何数据。\n\
    7.  作为响应，守护进程的回调函数会被调用。该回调函数接收从内核驱动传递过来的任何数据，并处理内核的请求。如果操作结果需要回传给内核，用户空间守护进程可以通过调用驱动的用户客户端定义的任何方法来实现，如第\
    \ 5 章所述。\n\n在本节的剩余部分，我们将通过一个示例来演示如何将通知从内核驱动发送到用户空间进程。首先，你需要定义一个结构体，用于描述要从内核驱动发送到用户空间守护进程的数据。该结构体必须以`mach_msg_header_t`结构体开头，因为它描述了用户空间守护进程中将要接收数据的`mach`目标端口。在`mach_msg_header_t`字段之后，该结构体可以包含多个字段，用于允许将任意数据随通知一起发送到用户空间守护进程。该结构体的定义必须对用户空间守护进程和内核驱动都是可访问的，因此应放置在一个两个项目都能包含的头文件中。以下是允许将两个整数参数从内核传递到用户守护进程的结构体定义示例：\n\
    \n```\ntypedef struct {\n    mach_msg_header_t       messageHeader;\n    uint32_t\
    \                customParameter1;\n    uint32_t                customParameter2;\n\
    } MyNotificationMessage;\n```\n\n下面列出的代码是接收内核发送的通知的用户空间回调函数示例。名为`msg`的参数包含了整个`MyNotificationMessage`结构体，包括添加的两个任意整数。这些位于消息头部之后的额外字段，既可用于描述驱动希望用户空间守护进程执行的操作，也可用于传递该操作所需的其他参数。\n\
    \n```\nvoid   MyDriverRequestCallback (CFMachPortRef port, void *msg, CFIndex\
    \ size, void *info)\n{\n    MyNotificationMessage* notify = (MyNotificationMessage*)msg;\n\
    \n    printf(\"Param 1 is %x, param 2 is %x\\n\", notify->customParameter1,\n\
    \            notify->customParameter2);\n}\n```\n\n列表 17-3 中显示的代码片段演示了用户空间守护进程为安装一个用于接收内核驱动通知的`mach`端口所必须采取的步骤。第一步是分配一个`mach`端口和相应的运行循环源，并将该`mach`端口安装到其运行循环中。接下来，将这个`mach`端口提供给内核驱动。每当驱动希望向用户空间进程发送通知时，该请求都会通过提供的`mach`端口进行传递。\n\
    \n***列表 17-3.** 用于安装回调以接收内核驱动通知的用户空间代码*\n\n```\nCFMachPortContext      portContext;\n\
    CFMachPortRef          notificationPort = NULL;\nCFRunLoopSourceRef     runLoopSource\
    \ = NULL;\nkern_return_t          kr;\n\n// Set up the CFMachPortContext structure\
    \ that is needed when creating the mach port.\nportContext.version = 0;\nportContext.info\
    \ = (void*)context; // Arbitrary pointer provided to the callback\nportContext.retain\
    \ = NULL;\nportContext.release = NULL;\nportContext.copyDescription = NULL;\n\n\
    // Create a mach port.\nnotificationPort = CFMachPortCreate(kCFAllocatorDefault,\
    \ MyDriverRequestCallback, &portContext,  NULL);\nif (notificationPort)\n{\n \
    \   // Create a run loop source for the mach port.\n    runLoopSource = CFMachPortCreateRunLoopSource(kCFAllocatorDefault,\
    \ notificationPort, 0);\n    // Install the run loop source on the run loop that\
    \ corresponds to the current thread.\n    CFRunLoopAddSource(CFRunLoopGetCurrent(),\
    \ runLoopSource, kCFRunLoopDefaultMode);\n}\n// Pass the notification port to\
    \ the driver.\nkr = IOConnectSetNotificationPort(driverConnection, 0,\n      \
    \                            CFMachPortGetPort(notificationPort), 0);\n```\n\n\
    用户空间函数`IOConnectSetNotificationPort()`会导致调用驱动的用户客户端的`registerNotificationPort()`方法。这是一个在`IOUserClient`基类中定义的虚方法，但需要由每个子类来实现。在下面的示例实现中，`registerNotificationPort()`方法复制了对应于用户空间进程通知端口的`mach`端口，以便将来当驱动希望向用户空间进程发送信号时可以使用它。\n\
    \n```\nIOReturn       com_osxkernel_driver_IOKitTestUserClient::\n       registerNotificationPort\
    \ (mach_port_t port, UInt32 type, io_user_reference_t refCon)\n{\n    m_notificationPort\
    \ = port;\n    return kIOReturnSuccess;\n}\n```\n\n在设置了进程的通知端口之后，内核驱动现在能够在需要时向用户空间守护进程发送信号。这通常通过`IOUserClient`子类来执行，因为通知端口特定于某个用户客户端。一个可被调用以向用户空间进程传递两个任意整数的自定义用户客户端方法示例，如列表\
    \ 17-4 所示。\n\n***列表 17-4.** 一个从驱动向用户空间进程发送通知的自定义方法*\n\n```\nIOReturn       com_osxkernel_driver_IOKitTestUserClient::\n\
    \       mySendNotification (uint32_t parameter1, uint32_t parameter2)\n{\n   \
    \ MyNotificationMessage  notification;\n    IOReturn               result;\n\n\
    \    if (m_notificationPort == MACH_PORT_NULL)\n        return kIOReturnError;\n\
    \n    // Set up the standard mach_msg_header_t fields.\n    notification.messageHeader.msgh_bits\
    \ = MACH_MSGH_BITS(MACH_MSG_TYPE_COPY_SEND, 0);\n    notification.messageHeader.msgh_size\
    \ = sizeof(MyNotificationMessage);\n    notification.messageHeader.msgh_remote_port\
    \ = m_notificationPort;\n    notification.messageHeader.msgh_local_port = MACH_PORT_NULL;\n\
    \    notification.messageHeader.msgh_reserved = 0;\n    notification.messageHeader.msgh_id\
    \ = 0;\n\n    notification.customParameter1 = parameter1;\n    notification.customParameter2\
    \ = parameter2;\n\n    // Send the request to user space\n    result = mach_msg_send_from_kernel(\n\
    \                 &notification.messageHeader, sizeof(MyNotificationMessage));\n\
    \n    return result;\n}\n```"
- fmt: "### Summary\n\nThis chapter covered:\n\n- How to use floating point and SSE\
    \ in the kernel. You learned that OS X, unlike other operating systems, does not\
    \ require any special actions to support these activities.\n- Strategies for writing\
    \ multi-function drivers.\n- The kernel control KPI is a BSD KPI that can be used\
    \ for communicating between a kernel extension and user space. It is commonly\
    \ used in conjunction with Network Kernel Extensions (NKE) but rarely used in\
    \ I/O Kit.\n- We covered the KPI for working with processes from the kernel. The\
    \ KPI has functions for sending signals and getting the name and process identifier\
    \ (PID) of a process.\n- How a kernel extension can load external resources from\
    \ its bundle and how to handle driver preferences.\n- How a kernel extension can\
    \ message and notify a user space process.\n\n## Chapter 18: Deployment\n\nThus\
    \ far, we have provided background information and looked at the practical implementation\
    \ of several types of drivers and kernel extensions. This chapter focuses on how\
    \ we prepare our work for end–user delivery. Apple is known for providing user–friendly\
    \ software (and hardware) solutions; both Apple and its customers have come to\
    \ expect the same level of customer experience from third-party vendors. Frustrating\
    \ customers or users with complex installation procedures is a good way to lose\
    \ business to competitors on any platform. Deploying a piece of software like\
    \ a kernel extension may seem easy at first, but there are a multitude of issues\
    \ to consider, such as how to accommodate a wide range of different hardware and\
    \ operating system versions. Many customers may be reluctant to upgrade. This\
    \ is especially true for larger business or government installations—so, you may\
    \ be required to support bleeding edge, as well as legacy operating system versions—all\
    \ of which may have different features that require special handling. Besides\
    \ the external factors, your software’s distribution may be complicated. Rarely\
    \ will you distribute only the KEXT itself; it often requires additional bundled\
    \ software. For example, a computer graphics card may be delivered with a system\
    \ preferences pane, a framework used to access the device’s special features,\
    \ applications for upgrading firmware, and perhaps bundled applications that show\
    \ off the card’s capabilities like games. You will also need to handle the possibility\
    \ that a customer will upgrade or downgrade your software distribution.\n\nWhile\
    \ all this may seem daunting—and it is—there is hope. Apple, as usual, provides\
    \ tools that simplify this process. For deployment, the tool of choice for more\
    \ advanced software installation is `PackageMaker`. `PackageMaker` allows installation\
    \ wizards to be created from an easy–to–use graphical user–interface. `PackageMaker`\
    \ also has a command line utility feature, which can be used to integrate package\
    \ building into a larger build system.\n\n### Installing and Loading Kernel Extensions\n\
    \nKEXT bundles will normally be installed in the system directory `/System/Library/Extensions`.\
    \ You can keep KEXTs outside of this directory; however, you will then need to\
    \ take care of loading the KEXT yourself by using the method outlined in the next\
    \ section. The KEXT will still need to have the correct permissions set. A KEXT\
    \ needs to be owned by the root user, belong to the `wheel` group, and have the\
    \ permissions mask `0755` in order to be loadable by the KEXT daemon (`kextd`).\n\
    \nFor I/O Kit-based drivers, the KEXT is usually loaded automatically by the KEXT\
    \ daemon when its provider is registered in the I/O Registry (assuming the KEXT\
    \ has a proper personality defined in its `Info.plist` file). A KEXT not associated\
    \ with a hardware provider can load itself automatically at system startup by\
    \ using the `IOResources` nub as a provider. For non-I/O Kit based KEXTs, such\
    \ as NKEs or virtual network drivers, this will not be possible, as `IOResources`\
    \ is not available for KEXTs outside the I/O Kit.\n\nFor non I/O Kit KEXTs, a\
    \ Launch Daemon can be created. Launch Daemons and Agents are Apple’s replacements\
    \ for a number of traditional UNIX services including `init.d`, `cron`, and `inetd`.\
    \ Agents are run as a user logs into the system based on that user’s security\
    \ permissions. Daemons, on the other hand, are system–wide and are generally run\
    \ with root permissions. We can use a Launch Daemon to execute a shell script\
    \ when the computer starts, which will in turn load our KEXT. To create a launch\
    \ agent, simply define a `plist` file as shown in [Listing 18-1](#Chapter18.html#list_18_1).\n\
    \n**Listing 18-1.** Launch Daemon Property List File\n\n```\n<?xml version=\"\
    1.0\" encoding=\"UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple Computer//DTD PLIST\
    \ 1.0//EN\"\n        \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n<plist\
    \ version=\"1.0\">\n<dict>\n    <key>Label</key>\n    <string>com.osxkernel.launchd.HelloWorld</string>\n\
    \    <key>ProgramArguments</key>\n    <array>\n        <string>/Library/Application\\\
    \ Support/HelloWorld/loadkext.sh</string>\n        <string>load</string>\n   \
    \ </array>\n    <key>RunAtLoad</key>\n    <true/>\n</dict>\n</plist>\n```\n\n\
    This file should be installed to `/System/Library/LaunchDaemon` or `~/Library/LaunchDaemon`,\
    \ as `com.osxkernel.launchd.HelloWorld.plist`. The Launch Daemon will now trigger\
    \ the `loadkext.sh` script during startup. The script itself can be implemented\
    \ as shown in [Listing 18-2](#Chapter18.html#list_18_2).\n\n**Listing 18-2.**\
    \ UNIX Shell Script for Loading a KEXT\n\n```\n#!/bin/sh\nCOMMAND=$1\n\nTHEKEXT=/System/Library/Extensions/HelloWorld.kext\n\
    \nif [ -f \"$THEKEXT\" ]\nthen\n    echo \"KEXT does not exist\"\n    exit 1\n\
    fi\nif [ \"$COMMAND\" = \"load\" ]\nthen\n        kextload $THEKEXT\nelif [ \"\
    $COMMAND\" = \"unload\" ]\nthen\n        kextunload $THEKEXT\nfi\n```"
  raw: '### Summary


    This chapter covered:


    *   How to use floating point and SSE in the kernel. You learned that OS X, unlike
    other operating systems, does not require any special actions to support these
    activities.

    *   Strategies for writing multi-function drivers.

    *   The kernel control KPI is a BSD KPI that can be used for communicating between
    a kernel extension and user space. It is commonly used in conjunction with Network
    Kernel Extensions (NKE) but rarely used in I/O Kit.

    *   We covered the KPI for working with processes from the kernel. The KPI has
    functions for sending signals and getting the name and process identifier (PID)
    of a process.

    *   How a kernel extension can load external resources from its bundle and how
    to handle driver preferences.

    *   How a kernel extension can message and notify a user space process.


    ## C H A P T E R  18


    ## Deployment


    Thus far, we have provided background information and looked at the practical
    implementation of several types of drivers and kernel extensions. This chapter
    focuses on how we prepare our work for end–user delivery. Apple is known for providing
    user–friendly software (and hardware) solutions; both Apple and its customers
    have come to expect the same level of customer experience from third-party vendors.
    Frustrating customers or users with complex installation procedures is a good
    way to lose business to competitors on any platform. Deploying a piece of software
    like a kernel extension may seem easy at first, but there are a multitude of issues
    to consider, such as how to accommodate a wide range of different hardware and
    operating system versions. Many customers may be reluctant to upgrade. This is
    especially true for larger business or government installations— so, you may be
    required to support bleeding edge, as well as legacy operating system versions—
    all of which may have different features that require special handling. Besides
    the external factors, your software’s distribution may be complicated. Rarely
    will you distribute only the KEXT itself; it often requires additional bundled
    software. For example, a computer graphics card may be delivered with a system
    preferences pane, a framework used to access the device’s special features, applications
    for upgrading firmware, and perhaps bundled applications that show off the card’s
    capabilities like games. You will also need to handle the possibility that a customer
    will upgrade or downgrade your software distribution.


    While all this may seem daunting—and it is—there is hope. Apple, as usual, provides
    tools that simplify this process. For deployment, the tool of choice for more
    advanced software installation is PackageMaker. PackageMaker allows installation
    wizards to be created from an easy–to–use graphical user–interface. PackageMaker
    also has a command line utility feature, which can be used to integrate package
    building into a larger build system.


    ### Installing and Loading Kernel Extensions


    KEXT bundles will normally be installed in the system directory`/System/Library/Extensions`.
    You can keep KEXTs outside of this directory; however, you will then need to take
    care of loading the KEXT yourself by using the method outlined in the next section.
    The KEXT will still need to have the correct permissions set. A KEXT needs to
    be owned by the root user, belong to the wheel group, and have the permissions
    mask 0755 in order to be loadable by the KEXT daemon (*kextd*).


    For I/O Kit-based drivers, the KEXT is usually loaded automatically by the KEXT
    daemon when its provider is registered in the I/O Registry (assuming the KEXT
    has a proper personality defined in its `Info.plist` file). A KEXT not associated
    with a hardware provider can load itself automatically at system startup by using
    the `IOResources` nub as a provider. For non-I/O Kit based KEXTs, such as NKEs
    or virtual network drivers, this will not be possible, as `IOResources` is not
    available for KEXTs outside the I/O Kit.


    For non I/O Kit KEXTs, a Launch Daemon can be created. Launch Daemons and Agents
    are Apple’s replacements for a number of traditional UNIX services including `init.d`,
    `cron`, and `inetd`. Agents are run as a user logs into the system based on that
    user’s security permissions. Daemons, on the other hand, are system–wide and are
    generally run with root permissions. We can use a Launch Daemon to execute a shell
    script when the computer starts, which will in turn load our KEXT. To create a
    launch agent, simply define a `plist` file as shown in [Listing 18-1](#Chapter18.html#list_18_1).


    ***Listing 18-1.** Launch Daemon Property List File*


    `<?xml version="1.0" encoding="UTF-8"?>`

    `<!DOCTYPE plist PUBLIC "-//Apple Computer//DTD PLIST 1.0//EN"`

    `        "http://www.apple.com/DTDs/PropertyList-1.0.dtd">`

    `<plist version="1.0">`

    `<dict>`

    `    <key>Label</key>`

    `    <string>com.osxkernel.launchd.HelloWorld</string>`

    `    <key>ProgramArguments</key>`

    `    <array>`

    `        <string>/Library/Application\ Support/HelloWorld/loadkext.sh</string>`

    `        <string>load</string>`

    `    </array>`

    `    <key>RunAtLoad</key>`

    `    <true/>`

    `</dict>`

    `</plist>`


    This file should be installed to `/System/Library/LaunchDaemon` or `~/Library/LaunchDaemon`,
    as `com.osxkernel.launchd.HelloWorld.plist`. The Launch Daemon will now trigger
    the `loadkext.sh` script during startup. The script itself can be implemented
    as shown in [Listing 18-2](#Chapter18.html#list_18_2).


    ***Listing 18-2.** UNIX Shell Script for Loading a KEXT*


    `#!/bin/sh`

    `COMMAND=$1`


    `THEKEXT=/System/Library/Extensions/HelloWorld.kext`


    `if [ -f "$THEKEXT" ]`

    `then`

    `    echo "KEXT does not exist"`

    `    exit 1`

    `fi`

    `if [ "$COMMAND" = "load" ]`

    `then`

    `        kextload $THEKEXT`

    `elif [ "$COMMAND" = "unload" ]`

    `then`

    `        kextunload $THEKEXT`

    `fi`'
  trans: "\n### 总结\n\n本章涵盖：\n\n- 如何在内核中使用浮点和 SSE。你了解到，OS X 与其他操作系统不同，无需任何特殊操作即可支持这些功能。\n\
    - 编写多功能驱动程序的策略。\n- 内核控制 KPI 是一种 BSD KPI，可用于内核扩展与用户空间之间的通信。它通常与网络内核扩展（NKE）结合使用，但在\
    \ I/O Kit 中很少使用。\n- 我们介绍了从内核处理进程的 KPI。该 KPI 包含用于发送信号以及获取进程名称和进程标识符（PID）的函数。\n\
    - 内核扩展如何从其 bundle 中加载外部资源，以及如何处理驱动程序偏好设置。\n- 内核扩展如何向用户空间进程发送消息和通知。\n\n## 第 18\
    \ 章：部署\n\n到目前为止，我们提供了背景信息，并探讨了多种类型驱动程序和内核扩展的实际实现。本章重点介绍如何为最终用户交付做准备。Apple 以提供用户友好的软件（和硬件）解决方案而闻名；Apple\
    \ 及其客户都期望第三方供应商能提供同样水平的客户体验。用复杂的安装程序让客户或用户感到困扰，是在任何平台上将业务拱手让给竞争对手的好方法。部署像内核扩展这样的软件起初看似简单，但需要考虑众多问题，例如如何兼容各种不同的硬件和操作系统版本。许多客户可能不愿升级，大型企业或政府机构更是如此——因此，你可能需要同时支持最前沿的和旧版的操作系统，所有这些版本可能具有不同特性，需要特殊处理。除了外部因素，软件的分发也可能很复杂。你很少会只分发\
    \ KEXT 本身；它通常还需要额外的捆绑软件。例如，计算机显卡可能会附带一个系统偏好设置面板、一个用于访问设备特殊功能的框架、用于升级固件的应用程序，以及可能捆绑用于展示显卡功能的游戏等应用程序。你还需要处理客户可能升级或降级你软件发行版的情况。\n\
    \n虽然这一切看似艰巨——也确实如此——但仍有希望。像往常一样，Apple 提供了简化此过程的工具。对于部署，更高级的软件安装工具是 `PackageMaker`。`PackageMaker`\
    \ 允许通过易用的图形用户界面来创建安装向导。`PackageMaker` 还具有命令行工具功能，可用于将包构建集成到更大的构建系统中。\n\n### 安装与加载内核扩展\n\
    \nKEXT bundle 通常安装在系统目录 `/System/Library/Extensions` 中。你也可以将 KEXT 保存到此目录之外；但随后需要使用下一节概述的方法自行负责加载\
    \ KEXT。KEXT 仍然需要设置正确的权限。为了能够被 KEXT 守护进程（`kextd`）加载，KEXT 必须由 root 用户拥有，属于 `wheel`\
    \ 组，并具有权限掩码 `0755`。\n\n对于基于 I/O Kit 的驱动程序，当其在 I/O Registry 中注册了提供者时（假设 KEXT 在其\
    \ `Info.plist` 文件中定义了合适的 personality），KEXT 通常会由 KEXT 守护进程自动加载。未与硬件提供者关联的 KEXT\
    \ 可以在系统启动时使用 `IOResources` 节点作为提供者来自动加载。对于非基于 I/O Kit 的 KEXT，例如 NKE 或虚拟网络驱动程序，这将无法实现，因为\
    \ `IOResources` 不适用于 I/O Kit 之外的 KEXT。\n\n对于非 I/O Kit 的 KEXT，可以创建一个 Launch Daemon。Launch\
    \ Daemons 和 Agents 是 Apple 对许多传统 UNIX 服务（包括 `init.d`、`cron` 和 `inetd`）的替代品。Agents\
    \ 在用户登录系统时根据该用户的安全权限运行。而 Daemons 则是系统级的，通常以 root 权限运行。我们可以使用 Launch Daemon 在计算机启动时执行一个\
    \ shell 脚本，该脚本进而加载我们的 KEXT。要创建一个 launch agent，只需定义一个如 清单 18-1 所示的 `plist` 文件。\n\
    \n**清单 18-1.** Launch Daemon 属性列表文件\n\n```\n<?xml version=\"1.0\" encoding=\"\
    UTF-8\"?>\n<!DOCTYPE plist PUBLIC \"-//Apple Computer//DTD PLIST 1.0//EN\"\n \
    \       \"http://www.apple.com/DTDs/PropertyList-1.0.dtd\">\n<plist version=\"\
    1.0\">\n<dict>\n    <key>Label</key>\n    <string>com.osxkernel.launchd.HelloWorld</string>\n\
    \    <key>ProgramArguments</key>\n    <array>\n        <string>/Library/Application\\\
    \ Support/HelloWorld/loadkext.sh</string>\n        <string>load</string>\n   \
    \ </array>\n    <key>RunAtLoad</key>\n    <true/>\n</dict>\n</plist>\n```\n\n\
    该文件应安装到 `/System/Library/LaunchDaemon` 或 `~/Library/LaunchDaemon`，文件名为 `com.osxkernel.launchd.HelloWorld.plist`。现在，Launch\
    \ Daemon 将在启动期间触发 `loadkext.sh` 脚本。该脚本本身可以实现为 清单 18-2 所示。\n\n**清单 18-2.** 用于加载\
    \ KEXT 的 UNIX Shell 脚本\n\n```\n#!/bin/sh\nCOMMAND=$1\n\nTHEKEXT=/System/Library/Extensions/HelloWorld.kext\n\
    \nif [ -f \"$THEKEXT\" ]\nthen\n    echo \"KEXT does not exist\"\n    exit 1\n\
    fi\nif [ \"$COMMAND\" = \"load\" ]\nthen\n        kextload $THEKEXT\nelif [ \"\
    $COMMAND\" = \"unload\" ]\nthen\n        kextunload $THEKEXT\nfi\n```\n"
- fmt: "在某些情况下，你可能希望按需加载内核扩展（KEXT），而不是在系统启动时加载。例如，对于一个 VPN（虚拟专用网络）应用程序，它可能会附带一个 `KEXT`\
    \ 来处理自定义的网络级加密方案或安装一个虚拟 VPN 接口。这个 `KEXT` 仅在应用程序保持活动状态时才需要。让它在活动状态下运行会浪费内存资源，并且在启动时加载它可能会影响启动时间。此外，由于\
    \ `KEXT` 会与网络栈交互，它实际上可能会妨碍并影响系统的网络性能。在这种情况下，应用程序可能希望动态地加载和卸载 `KEXT`。这可以通过使用类似前面的脚本实现。应用程序需要以\
    \ root 权限运行才能加载和卸载 `KEXT`。然而，将整个应用程序设为 `setuid` root 并不是一个好主意，因为这可能导致严重的安全问题。另一种解决方案是使用\
    \ `AuthorizationExecuteWithPrivileges()` API 执行一个最小的辅助程序，以临时提升被执行程序的权限。这将提示用户输入计算机的系统密码。可以通过修改\
    \ `KEXT` 的 `plist` 文件包含以下内容来允许非 root 用户加载 `KEXT`：\n\n```\n<key>OSBundleAllowUserLoad</key>\n\
    <true/>\n```\n\n虽然这允许非特权进程或用户加载 `KEXT`，但随后卸载 `KEXT` 仍然需要 root 权限。因此，前一种技术更受青睐，也更安全，因为用户必须明确批准该操作。\n\
    \n## Mac App Store 上的内核扩展\n\n苹果目前不允许应用程序在 Mac App Store 或 iOS App Store 上安装 `KEXT`（iOS\
    \ App Store 没有任何在不违反许可协议的情况下构建 `KEXT` 的方法）。如果你的应用程序依赖于内核扩展，你将需要在 App Store 之外分发它。Mac\
    \ App Store 应用程序也不允许请求 root 权限，而安装和加载 `KEXT` 需要这些权限。然而，即使应用程序可能依赖于特定的硬件设备，也可以提交它们，但在这种情况下，你需要通过一个经过批准的用户空间\
    \ API 与设备通信（详见[第15章](#Chapter15.html#ch15)了解如何实现）。\n\n## 内核扩展的版本管理\n\n如果你的内核扩展可以直接被用户空间应用程序访问，你可能希望提供一个版本管理系统，以防止较旧的用户空间应用程序访问较新的内核扩展，反之亦然。对于音频驱动程序或其他使用系统提供的\
    \ `IOUserClient` 的驱动程序，这不是必需的；但是，如果不是这种情况，你的 `KEXT` 本质上会向应用程序提供一个需要保持兼容的 API。如果\
    \ `KEXT` 已更新，较旧的应用程序可能会崩溃甚至导致系统崩溃。没有标准化的方法来解决这个问题，解决方案在很大程度上取决于 `KEXT` 以及访问它的应用程序的性质。一种策略是在一个共享的头文件中包含一个版本号：\n\
    \n```\n//\n// SharedHeaderFile.h\n//\n#ifndef Shared_Header_H_\n#define Shared_Header_H_\n\
    \nconst int KernelUserClientAPIVersion = 1001;\n\n#endif\n```\n\n由于 `KEXT` 和用户应用程序都将\
    \ `KernelUserClientAPIVersion` 版本号编译到它们的二进制映像中，因此用户应用程序可以确定 `KEXT` 的版本号是否与其自身匹配。每次接口发生更改时，例如，添加、移除或更改了一个\
    \ `IOUserClient` 方法，都必须更新版本号以反映这一变化。如果你的 `KEXT` 提供了可供第三方开发者使用的 API，最好的方法是提供一个在内部处理此版本管理的\
    \ API，而不是允许开发者直接访问 `IOUserClient`。这样，内核与用户空间之间的接口可以更改，而不会破坏现有应用程序；它甚至允许你向完全不同的驱动程序或\
    \ `KEXT` 提供相同的 API。\n\n## 测试与质量保证\n\n测试内核扩展可能是一项挑战。现代计算机系统和设备通常非常复杂，即使你的组件与系统其他部分相对隔离，由于它是整个机制中的一环，也可能产生不希望的副作用。适当的测试（最好由未直接参与工程过程的人员进行）至关重要——直接参与的人员可能对产品的工作方式有先入为主的观念，从而无法发现最终用户可能遇到的问题。测试内核扩展在很大程度上取决于扩展的性质和类型；因此，提供一份详尽的测试事项清单是不可能的。以下是一些通用建议：\n\
    \n- 测试驱动程序是否能够正确处理进入睡眠和唤醒。你可以使用 Xcode 附带的 `SleepX` 工具轻松进行压力测试。该应用程序允许你在计算机每次唤醒时执行脚本或外部程序。你还可以调整睡眠间隔和希望测试的周期数。你的驱动程序正确处理睡眠非常重要，尤其是对于移动设备和笔记本电脑，因为驱动程序保持活动状态意味着\
    \ CPU 需要保持活动——这将耗尽系统电池，甚至在合盖运行时可能导致笔记本电脑过热。\n- 测试驱动程序是否能够使用 `kextload` 和 `kextunload`\
    \ 处理重复加载和卸载。你可以使用 `ioclasscount` 和 `ioalloccount` 工具来测试引用泄漏或内存分配泄漏。\n- 通过执行常见的用户任务来测试使用该驱动程序的应用程序。例如，对于音频设备，尽可能多地使用不同的设置和格式组合来播放和捕获音频。\n\
    - 在所有支持的平台和操作系统上进行测试，例如 `Macbook Pro`、`Mac Mini`、`iMac`、`Mac Pro` 或 `iPod`、`iPhone`\
    \ 和 `iPad`。对于 Mac，请务必测试 32 位和 64 位版本以及所有受支持的操作系统版本，例如 `Snow Leopard`、`Lion` 等。\n\
    - 对于热插拔设备：\n    - 测试驱动程序和设备在反复插拔后是否能继续正常工作。你可能希望至少进行 100 次以上的重复测试，以确保在现场不会出现问题。\n\
    \    - 测试驱动程序是否能处理系统进入睡眠的情况。驱动程序还应准备好处理设备在系统休眠期间被移除的情况。\n- 测试 `KEXT` 的 32 位和 64\
    \ 位版本。如果你支持 pre-Lion 操作系统，你将需要提供支持 32 位和 64 位系统的通用二进制文件。\n- 测试安装程序包；确保所有文件都正确安装——具有正确的权限，并且位于正确的位置。\n\
    \n如果在测试期间或由客户报告发现问题，最好为每个已发布的 `KEXT` 预先归档符号信息和/或调试版本，以便你可以快速尝试重现问题并进行调试。这对大多数人来说似乎显而易见，但这种情况发生的频率可能超出你的想象：有人在不增加版本号的情况下传递了软件组件（例如\
    \ `KEXT`）的某个版本。每次进行更改并发布/提供给外部实体（甚至内部质量保证小组）时，版本号都应该是唯一的，否则你将很快无法跟踪并让所有相关人员感到困惑。"
  raw: "In some cases, it may be desirable to load the KEXT on demand, rather than\
    \ at system boot. For example, in the case of a VPN (Virtual Private Network)\
    \ application, it may come with a KEXT to handle a custom network level encryption\
    \ scheme or install a virtual VPN interface. This KEXT is only needed for as long\
    \ as the application remains active. Having it active wastes memory resources,\
    \ and loading it at boot may potentially impact startup time. Furthermore, since\
    \ the KEXT interacts with the network stack, it may actually get in the way and\
    \ impact the system’s network performance. In this case, the application may wish\
    \ to load and unload the KEXT dynamically. This can be achieved by using a script\
    \ like the preceding one. The application would need to run with root privileges\
    \ in order to load and unload the KEXT. It is not a good idea, however, to make\
    \ an entire application *setuid* root, as this can lead to a serious security\
    \ problem. An alternative solution involves executing a minimal helper program\
    \ using the `AuthorizationExecuteWithPrivileges()` API to temporarily escalate\
    \ the privileges of the executed program. This will prompt the user for the computer’s\
    \ system password. It is possible to allow a KEXT to be loaded by a non–root user\
    \ by modifying its `plist` file to include the following:\n\n`    <key>OSBundleAllowUserLoad</key>`\n\
    `    <true/>`\n\nWhile this will allow a non–privileged process or user to load\
    \ the KEXT, root privileges are still required to unload the KEXT afterward. As\
    \ such, the former technique is preferred and is also more secure, as users will\
    \ have to approve the action explicitly.\n\n**KERNEL EXTENSIONS ON THE APP STORE**\n\
    \nApple does not currently permit applications to install KEXTs on either the\
    \ Mac App Store or the iOS App Store (which doesn’t have any means of building\
    \ KEXTs without violating license agreements). If your application depends on\
    \ a kernel extension, you would need to distribute it outside of the App Store.\
    \ Mac App Store applications are not allowed to request root privileges either,\
    \ which would be needed to install and load a KEXT. It is possible, however, to\
    \ submit applications even though they may depend on a specific hardware device,\
    \ but in this case you would need to talk to it through an approved user–space\
    \ API (see [Chapter 15](#Chapter15.html#ch15) for details on how this can be done).\n\
    \n### Versioning Kernel Extensions\n\nIf your kernel extension is directly accessible\
    \ to a user–space application, you may wish to provide a versioning system to\
    \ prevent an older user–space application from accessing a newer kernel extension\
    \ or vice versa. This is not necessary, for say, audio drivers or other drivers\
    \ that use a system–supplied `IOUserClient`; however, in the case that it does\
    \ not, your KEXT will essentially present an API to the application, which needs\
    \ to be remain compatible. If the KEXT has been updated, an older application\
    \ may break or even cause a crash. There is no standardized way to deal with this\
    \ issue, and the solution is largely dependent on the nature of the KEXT and the\
    \ applications that access it. One strategy is to include a version number in\
    \ a shared header file:\n\n`//`\n`// SharedHeaderFile.h`\n`//`\n`#ifndef Shared_Header_H_`\n\
    `#define Shared_Header_H_`\n\n`const int KernelUserClientAPIVersion = 1001;`\n\
    \n`#endif`\n\nSince both the KEXT and the user application compile the `KernelUserClientAPIVersion`\
    \ version number into their binary images, the user application can determine\
    \ if the KEXT’s version number matches that of its own. Every time the interface\
    \ is changed; for example, if an `IOUserClient` method is added, removed, or changed,\
    \ the version number must be updated to reflect this. If your KEXT presents an\
    \ API available to third party developers, the best approach is to provide an\
    \ API that takes care of this versioning internally rather than allowing developers\
    \ access to the `IOUserClient` directly. This allows the interface between the\
    \ kernel and user space to change without breaking existing applications; it even\
    \ allows you to present the same API to a completely different driver or KEXT.\n\
    \n### Testing and Quality Assurance\n\nTesting a kernel extension can be a challenge.\
    \ Modern computer systems and devices are usually very complex, and even if your\
    \ component is fairly isolated from the rest of the system, unwanted side effects\
    \ happen as result of it being another cog in the machinery. Proper testing, preferably\
    \ conducted by those not directly involved in the engineering process, is essential—those\
    \ directly involved may have preconceived notions of how the product works and\
    \ fail to discover issues an end-user would. Testing kernel extensions is very\
    \ dependent on the nature and type of the extension; so, providing an exhaustive\
    \ list of things to test for is impossible. The following are some general suggestions:\n\
    \n*   Test that the driver handles going to sleep and waking up. You can stress\
    \ test this easily by using the SleepX tool included as part of Xcode. The application\
    \ allows you to execute a script or external program every time the computer wakes\
    \ up. You can also tune sleep intervals and the number of cycles you wish to test.\
    \ It is extremely important that your driver handles sleep properly, especially\
    \ for mobile devices and laptops, as having the driver still active means the\
    \ CPU will need to be active—this will drain the system’s battery and could even\
    \ cause a laptop to overheat if it is operating with the lid closed.\n*   Test\
    \ that the driver handles repeated loading and unloading with `kextload` and `kextunload`.\
    \ You can test for reference leaks or memory allocation leaks using the `ioclasscount`\
    \ and `ioalloccount` tools.\n*   Test applications that use the driver by performing\
    \ common user tasks. For example, for an audio device, playback and capture audio\
    \ with as many permutations of settings and formats as possible.\n*   Test on\
    \ all supported platforms and operating systems, such as Macbook Pro, Mac Mini,\
    \ iMac, Mac Pro or iPod, iPhone, and iPad. For Macs, be sure to test both 32-bit\
    \ and 64-bit versions and all supported OS versions; e.g., Snow Leopard, Lion,\
    \ etc.\n*   For hot–pluggable devices:\n    *   Test that drivers and devices\
    \ continue to work correctly after repeated plugging and unplugging. You may wish\
    \ to do a minimum of 100+ repetitions to be confident no issue will happen in\
    \ the field.\n    *   Test that the driver handles the system going to sleep.\
    \ The driver should also be prepared to handle the device being removed while\
    \ the system was sleeping.\n*   Test 32-bit and 64-bit versions of a KEXT. If\
    \ you support pre-Lion operating systems, you will want to provide universal binaries\
    \ with support for both 32-bit and 64-bit systems.\n*   Test the installer package;\
    \ make sure that all files are installed correctly—with the correct permissions,\
    \ and in the correct location.\n\nIf a problem is discovered either during testing\
    \ or reported by a customer, it is a good idea to have pre-archived symbol information\
    \ and/or debug versions for every released KEXT, so you can quickly attempt to\
    \ reproduce a problem and debug it. This may seem obvious to most people, but\
    \ it does happen more often than you might think: someone passes on a release\
    \ of a software component, such as a KEXT, without incrementing its version number.\
    \ Every time a change is made and released/given to some external entity (or even\
    \ the internal QA group), the version number should be unique, or you will quickly\
    \ lose track and confuse everyone involved."
  trans: "\n在某些情况下，你可能希望按需加载内核扩展（KEXT），而不是在系统启动时加载。例如，对于一个 VPN（虚拟专用网络）应用程序，它可能会附带一个\
    \ `KEXT` 来处理自定义的网络级加密方案或安装一个虚拟 VPN 接口。这个 `KEXT` 仅在应用程序保持活动状态时才需要。让它在活动状态下运行会浪费内存资源，并且在启动时加载它可能会影响启动时间。此外，由于\
    \ `KEXT` 会与网络栈交互，它实际上可能会妨碍并影响系统的网络性能。在这种情况下，应用程序可能希望动态地加载和卸载 `KEXT`。这可以通过使用类似前面的脚本实现。应用程序需要以\
    \ root 权限运行才能加载和卸载 `KEXT`。然而，将整个应用程序设为 `setuid` root 并不是一个好主意，因为这可能导致严重的安全问题。另一种解决方案是使用\
    \ `AuthorizationExecuteWithPrivileges()` API 执行一个最小的辅助程序，以临时提升被执行程序的权限。这将提示用户输入计算机的系统密码。可以通过修改\
    \ `KEXT` 的 `plist` 文件包含以下内容来允许非 root 用户加载 `KEXT`：\n\n```\n<key>OSBundleAllowUserLoad</key>\n\
    <true/>\n```\n\n虽然这允许非特权进程或用户加载 `KEXT`，但随后卸载 `KEXT` 仍然需要 root 权限。因此，前一种技术更受青睐，也更安全，因为用户必须明确批准该操作。\n\
    \n## Mac App Store 上的内核扩展\n\n苹果目前不允许应用程序在 Mac App Store 或 iOS App Store 上安装 `KEXT`（iOS\
    \ App Store 没有任何在不违反许可协议的情况下构建 `KEXT` 的方法）。如果你的应用程序依赖于内核扩展，你将需要在 App Store 之外分发它。Mac\
    \ App Store 应用程序也不允许请求 root 权限，而安装和加载 `KEXT` 需要这些权限。然而，即使应用程序可能依赖于特定的硬件设备，也可以提交它们，但在这种情况下，你需要通过一个经过批准的用户空间\
    \ API 与设备通信（详见第 15 章了解如何实现）。\n\n## 内核扩展的版本管理\n\n如果你的内核扩展可以直接被用户空间应用程序访问，你可能希望提供一个版本管理系统，以防止较旧的用户空间应用程序访问较新的内核扩展，反之亦然。对于音频驱动程序或其他使用系统提供的\
    \ `IOUserClient` 的驱动程序，这不是必需的；但是，如果不是这种情况，你的 `KEXT` 本质上会向应用程序提供一个需要保持兼容的 API。如果\
    \ `KEXT` 已更新，较旧的应用程序可能会崩溃甚至导致系统崩溃。没有标准化的方法来解决这个问题，解决方案在很大程度上取决于 `KEXT` 以及访问它的应用程序的性质。一种策略是在一个共享的头文件中包含一个版本号：\n\
    \n```\n//\n// SharedHeaderFile.h\n//\n#ifndef Shared_Header_H_\n#define Shared_Header_H_\n\
    \nconst int KernelUserClientAPIVersion = 1001;\n\n#endif\n```\n\n由于 `KEXT` 和用户应用程序都将\
    \ `KernelUserClientAPIVersion` 版本号编译到它们的二进制映像中，因此用户应用程序可以确定 `KEXT` 的版本号是否与其自身匹配。每次接口发生更改时，例如，添加、移除或更改了一个\
    \ `IOUserClient` 方法，都必须更新版本号以反映这一变化。如果你的 `KEXT` 提供了可供第三方开发者使用的 API，最好的方法是提供一个在内部处理此版本管理的\
    \ API，而不是允许开发者直接访问 `IOUserClient`。这样，内核与用户空间之间的接口可以更改，而不会破坏现有应用程序；它甚至允许你向完全不同的驱动程序或\
    \ `KEXT` 提供相同的 API。\n\n## 测试与质量保证\n\n测试内核扩展可能是一项挑战。现代计算机系统和设备通常非常复杂，即使你的组件与系统其他部分相对隔离，由于它是整个机制中的一环，也可能产生不希望的副作用。适当的测试（最好由未直接参与工程过程的人员进行）至关重要——直接参与的人员可能对产品的工作方式有先入为主的观念，从而无法发现最终用户可能遇到的问题。测试内核扩展在很大程度上取决于扩展的性质和类型；因此，提供一份详尽的测试事项清单是不可能的。以下是一些通用建议：\n\
    \n- 测试驱动程序是否能够正确处理进入睡眠和唤醒。你可以使用 Xcode 附带的 `SleepX` 工具轻松进行压力测试。该应用程序允许你在计算机每次唤醒时执行脚本或外部程序。你还可以调整睡眠间隔和希望测试的周期数。你的驱动程序正确处理睡眠非常重要，尤其是对于移动设备和笔记本电脑，因为驱动程序保持活动状态意味着\
    \ CPU 需要保持活动——这将耗尽系统电池，甚至在合盖运行时可能导致笔记本电脑过热。\n- 测试驱动程序是否能够使用 `kextload` 和 `kextunload`\
    \ 处理重复加载和卸载。你可以使用 `ioclasscount` 和 `ioalloccount` 工具来测试引用泄漏或内存分配泄漏。\n- 通过执行常见的用户任务来测试使用该驱动程序的应用程序。例如，对于音频设备，尽可能多地使用不同的设置和格式组合来播放和捕获音频。\n\
    - 在所有支持的平台和操作系统上进行测试，例如 `Macbook Pro`、`Mac Mini`、`iMac`、`Mac Pro` 或 `iPod`、`iPhone`\
    \ 和 `iPad`。对于 Mac，请务必测试 32 位和 64 位版本以及所有受支持的操作系统版本，例如 `Snow Leopard`、`Lion` 等。\n\
    - 对于热插拔设备：\n    - 测试驱动程序和设备在反复插拔后是否能继续正常工作。你可能希望至少进行 100 次以上的重复测试，以确保在现场不会出现问题。\n\
    \    - 测试驱动程序是否能处理系统进入睡眠的情况。驱动程序还应准备好处理设备在系统休眠期间被移除的情况。\n- 测试 `KEXT` 的 32 位和 64\
    \ 位版本。如果你支持 pre-Lion 操作系统，你将需要提供支持 32 位和 64 位系统的通用二进制文件。\n- 测试安装程序包；确保所有文件都正确安装——具有正确的权限，并且位于正确的位置。\n\
    \n如果在测试期间或由客户报告发现问题，最好为每个已发布的 `KEXT` 预先归档符号信息和/或调试版本，以便你可以快速尝试重现问题并进行调试。这对大多数人来说似乎显而易见，但这种情况发生的频率可能超出你的想象：有人在不增加版本号的情况下传递了软件组件（例如\
    \ `KEXT`）的某个版本。每次进行更改并发布/提供给外部实体（甚至内部质量保证小组）时，版本号都应该是唯一的，否则你将很快无法跟踪并让所有相关人员感到困惑。\n"
- fmt: '### Packaging KEXTs and Software


    `PackageMaker` is the preferred tool for packaging and distributing software consisting
    of multiple components. Unlike simple applications where every needed component
    is self–contained and embedded within the application’s bundle, more advanced
    software distributions, such as those containing KEXTs, may need to install components
    to multiple locations on the file system. For example, a driver will need to place
    itself within the `/System/Library/Extensions` directory, and it may further contain
    helper programs to load preferences or upgrade firmware, which require Launch
    Agents or Daemons to be installed. `PackageMaker` is able to do this and more.
    The `PackageMaker` user interface is shown in [Figure 18-1](#Chapter18.html#fig_18_1).


    ![images](images/1801.jpg)


    ***Figure 18-1.** PackageMaker user interface*


    `PackageMaker`’s output is a binary compressed package file with the extension
    “*.pkg*” that can be installed using the `Installer.app` program or the `installer`
    UNIX command, by executing something like the following:


    `sudo installer -pkg HelloWorld.pkg -target /`


    Installing using `Installer.app` brings up a GUI–based wizard that guides the
    user through the installation procedure. If the package has multiple optional
    sub-components, the user will have the opportunity to select or deselect them.
    The user can also change the target volume, where the package will be installed,
    provided that the package explicitly allows this, by setting the “Volume selected
    by user” option.


    `PackageMaker` isn’t just limited to placing software components in the file system.
    It can also check for system requirements and pre-requisites, including whether
    the operating system version is supported, or check if some other software component
    it depends on is present. It can also trigger custom UNIX scripts before and after
    the software is installed for each component. For hardware drivers, `PackageMaker`
    also allows you to verify that your device is present before the user is allowed
    to continue. This works for FireWire, PCI, and USB.


    ![images](images/square.jpg)**Tip** When packaging KEXTs for distribution, ensure
    that Xcode builds for the architectures you intend to support. By using the `file`
    command on the KEXT’s binary, you can check which architectures it supports. You
    may also wish to ensure you are not distributing the debug version of your KEXT.


    #### Building a Package for the Hello World Kernel Extension


    Now, you can build a quick package for installing the sample Hello World KEXT.
    You will also need to install a Launch Daemon property lists file ([Listing 18-1](#Chapter18.html#list_18_1))
    and a shell script ([Listing 18-2](#Chapter18.html#list_18_2)) that will be executed
    by the Launch Daemon, which will again load the KEXT. Before designing your own
    package, you will need to determine its components. For example, if you are distributing
    drivers for an audio device, you may wish to bundle the driver with some software
    that allows playback or capture of audio, and perhaps an SDK that other developers
    can use to write their own applications using the card. A developer may only want
    the driver, whereas an end–user may only want the bundled application and not
    the SDK, etc. In this scenario, you can create three sub-components: the driver,
    the application, and the SDK, and allow the user to select which components should
    be installed. For the `HelloWorld` package, you only need to add a single component.


    To get started, open `PackageMaker` and chose “new” from the menu. You will then
    be prompted by a dialog, as shown in [Figure 18-2](#Chapter18.html#fig_18_2).


    ![images](images/1802.jpg)


    ***Figure 18-2.** Install Properties dialog*


    The “Organization” field should be the reverse–DNS name of your organization.
    The value is used to identify the package and uniquely name it. The minimum target
    drop–down allows you to select the oldest OS version you wish to target. The package
    will refuse to install on versions older than the install target. Once you have
    entered your selection, you can give your package a title.


    #### Adding Contents to the Package


    You can now start adding files to your package. This can be done by either choosing
    “Project ![images](images/U001.jpg) Add Contents . . .” from the main menu, or
    simply by dragging files into the left pane of `PackageMaker`. [Figure 18-3](#Chapter18.html#fig_18_3)
    shows the content pane populated with the files required for the `HelloWorld`
    distribution.


    ![images](images/1803.jpg)


    ***Figure 18-3.** The HelloWorld distribution*


    Our `HelloWorld` package consists of only three files (shown on the left in [Figure
    18-3](#Chapter18.html#fig_18_3)): The KEXT itself and two helper files to allow
    the KEXT to load at boot–time. When you drag or add some files to the package,
    `PackageMaker` will automatically create a *choice*, which, in this case, we have
    named “Driver.” The choice represents a sub-component that can be individually
    selected by the user. However, if the “User Sees” field in the main pane is set
    to “Easy Install Only,” a user will not be prompted to select individual components,
    even though there may be more than one. The “Installation Destination” selection
    allows you to set the location where the package will be installed. At this point,
    we do not check any of the options, as all of our files go into absolute paths.
    If the “Volume selected by user” is selected, the instillation wizard will ask
    which volume (hard drive) the user wishes to install to. It is recommended to
    allow this choice to give the user more flexibility—particularly for large software
    packages, which a user may wish to store on a second, larger data drive.'
