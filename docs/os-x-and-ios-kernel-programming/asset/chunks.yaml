    \ 方法。\n\n请注意，在清单 6-2 的示例中，我们只需稍作修改，创建一个可写映射，就能同样轻松地将内存复制到映射缓冲区中。\n\n![images](img/t0602.jpg)\n\
    \n![images](img/square.jpg) **注意** 除非内核需要主动修改内存，否则没有必要将内存映射到内核空间。如果从用户空间缓冲区执行\
    \ DMA，并且内核不需要修改缓冲区中的数据，则无需将其映射到内核地址空间，缓冲区可以直接传输到硬件设备。有关 DMA 的更多信息，请参见第 9 章。\n\n\
    ## 将内存从内核空间映射到用户空间任务\n\n前几节展示了如何获取用户空间分配的内存，并将其映射到内核地址空间，以便内核能够访问。虽然内核可以对该映射进行读写操作，但有时也希望用户空间任务能够将内核内存映射到其地址空间。需要注意的是，出于安全和稳定性原因，Apple\
