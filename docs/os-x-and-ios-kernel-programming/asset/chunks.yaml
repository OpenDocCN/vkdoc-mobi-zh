  trans: '

    ### Mac OS X 串口架构概述


    在 Mac OS X 上，串口具有一种有趣的架构。在内核中，串口驱动程序是使用面向对象的 I/O Kit 框架实现的，但在用户空间中，它是通过 BSD 层访问的，并且串口呈现为传统的
    UNIX 设备文件。对于在内核中加载的每个串口驱动程序，I/O Kit 的串口家族都会在文件系统的 `/dev` 目录中创建相应的设备对象。要与串口交互，应用程序打开该设备文件，并像操作普通文件一样对其进行读写操作。这是一种通过用户客户端（user
    client）与驱动程序通信的替代方案；实际上，串口驱动程序并没有用户客户端。这种架构的优点是，它允许使用 POSIX API 编写的传统 UNIX 应用程序在无需修改代码的情况下，在
    Mac OS X 上访问串口。


    尽管串口驱动程序在用户空间中并非通过 I/O Kit 框架访问，但它们在内核中仍然作为完整的 I/O Kit 驱动程序实现。这意味着串口驱动程序可以利用 I/O
    Kit 带来的所有特性，包括面向对象的设计以及动态驱动程序加载与匹配。I/O Kit 包含一个专门针对串行设备的家族，称为 `IOSerialFamily`。`IOSerialFamily`
    可通过 Darwin 开源项目获取，其中包含了串口驱动程序所派生基类的头文件，以及 Mac OS X 串口子系统的实现。


    图 11-1 展示了在 Mac OS X 上处理串口通信所涉及的各个实体。在本示例中，我们假设串口是由一个 USB 设备（例如 USB 转 RS-232 适配器）实现的，因此图中最左侧的提供者对象是一个
    `IOUSBDevice`。


    ![图片](img/1101.jpg)


    ***图 11-1.** 从用户空间应用程序与串口通信所涉及的对象*


    从用户空间开始，应用程序通过从 `/dev` 目录中打开与串口驱动程序对应的字符设备文件来连接到该驱动程序。每个串口驱动程序在 `/dev` 目录中都有两个条目，一个名称以前缀
    “`tty.`” 开头，另一个名称以前缀 “`cu.`” 开头。这个原因很大程度上是历史遗留的，源自串口是调制解调器或传真机连接计算机方式的时代。在这种情况下，“`tty`”
    设备是用于接听呼叫的拨入设备，而 “`cu`” 是用于拨出呼叫的呼出设备。


    希望接听呼叫的进程会打开拨入设备；`open()` 函数会阻塞，直到载波检测线被触发，这意味着调制解调器已建立连接。然而，要拨出呼叫，进程需要能够打开串口而无需等待载波检测线，因此它会打开呼出设备，该设备不会在载波检测信号上阻塞。当与现代串行设备通信时，鉴于大多数设备不会连接到电话线，Apple
    建议打开呼出设备。


    `/dev` 中的两个设备文件由一个名为 `IOSerialBSDClient` 的 I/O Kit 类创建。这是由 `IOSerialFamily` 提供的一个类，负责处理用户空间进程在设备文件上执行操作的内核端。`IOSerialBSDClient`
    处理用户空间进程为操作串口而进行的任何系统调用，包括以下任何函数：`open()`、`close()`、`read()`、`write()`、`ioctl()`
    和 `select()`。通过这种方式，可以将 `IOSerialBSDClient` 视为充当串口驱动程序的用户客户端角色（尽管它并非派生自 `IOUserClient`
    类）。与用户客户端一样，`IOSerialBSDClient` 类仅仅是用户空间进程与内核驱动程序对象之间的一个通道。该类负责处理阻塞调用与非阻塞调用之间的差异，但其主要作用是将从用户空间接收的函数调用转换为对
    `IOSerialStreamSync` 对象的方法调用。


    `IOSerialStreamSync` 类是 I/O Kit 在 `IOSerialFamily` 包中提供的另一个类。其作用仅仅是 `IOSerialBSDClient`
    与实际串口驱动程序实现之间的一个通道。事实上，对于 `IOSerialStreamSync` 类的每个方法，它都会调用 `IOSerialDriverSync`
    类中同名的方法。


    `IOSerialDriverSync` 类是一个纯抽象接口，为 Mac OS X 上的任何串口驱动程序提供基类。它提供了读取和写入数据的方法，以及报告串口状态变化的方法，例如是否检测到载波信号、串口上是否有数据到达可供读取、以及串口是否能够接受更多字节用于传输。


    最后，涉及串口驱动程序栈的最后一个对象是串口驱动程序的提供者类。在本示例中，我们假设串口是由一个 USB 转串口适配器实现的，因此提供者类的类型为 `IOUSBDevice`。每当串口驱动程序需要从串口读取数据或通过串口写入数据时，它会通过
    `IOUSBDevice` 实例访问底层硬件设备。


    在实现串口驱动程序过程中，每个参与其中的类的作用如下：


    - 串口驱动程序的提供者类（在我们示例中为 `IOUSBDevice`）负责执行数据进出计算机与串口适配器之间的传输。

    - 主驱动程序（`IOSerialDriverSync` 的子类）管理串口的接收和发送缓冲区，在数据到达时从硬件读取数据，并在用户空间提供数据时向硬件写入数据。

    - `IOSerialBSDClient` 管理与用户空间应用程序的交互。

    '
- fmt: "### Serial Port Drivers\n\nSerial port drivers on Mac OS X are implemented\
    \ by creating a class that is derived from the `IOSerialDriverSync` class. In\
    \ this section, we describe the implementation of a serial port driver by walking\
    \ through the source code of a driver provided by Apple for USB serial communication\
    \ devices. Although it is unlikely that you will need to implement your own serial\
    \ driver directly, this section can be seen as providing a working application\
    \ of I/O Kit techniques and driver design, and many of the techniques used by\
    \ the Apple USB serial driver can potentially be applied to other drivers that\
    \ you will develop.\n\nTo follow along with this section, you may wish to download\
    \ the source code for the serial port driver that we are discussing. The classes\
    \ that play a part in the kernel serial driver stack are spread between the following\
    \ two projects in the Darwin source code repository:\n\n*   The base classes,\
    \ on which all serial drivers are built, including the implementation of the `IOSerialBSDClient`\
    \ class, are contained within the `IOSerialFamily` project. To implement your\
    \ own serial port driver, you would need only the classes contained within the\
    \ `IOSerialFamily` project.\n*   The driver that loads against USB-based serial\
    \ communication devices is contained within the project named `AppleUSBCDCDriver`.\
    \ (`USBCDC` is an acronym for USB Communications Device Class.)\n\nGiven the number\
    \ of supporting classes that are created to handle a serial port driver by the\
    \ I/O Kit, it's instructive to understand how these classes are instantiated.\
    \ When a USB device that implements the Communications Device Class is connected\
    \ to a Mac, the USB host controller will create a new `IOUSBDevice` object to\
    \ represent that device. When this `IOUSBDevice` object is published, it initiates\
    \ the I/O Kit's driver matching process, which searches for an appropriate driver\
    \ for the USB device. In this case, the I/O Kit will select the `AppleUSBCDC`\
    \ driver, since its matching dictionary specifies that it should load against\
    \ any USB device that supports the Communications Device Class. Note that the\
    \ `AppleUSBCDC` driver is not a serial driver. It is a subclass of the generic\
    \ `IOService` class, and its role is simply to configure the USB hardware for\
    \ use as a serial device. It does this by iterating over the USB interfaces that\
    \ the device supports and setting the active interface to one that provides communications\
    \ support.\n\nOnce the `AppleUSBCDC` driver has configured the active USB device\
    \ interface, the I/O Kit's USB family creates an `IOUSBInterface` object to represent\
    \ the active interface. This kicks off another round of the I/O Kit's driver matching\
    \ process, which searches for an appropriate driver for the `IOUSBInterface` object.\
    \ For the purpose of this section, we will examine the implementation of the `AppleUSBCDCDMM`\
    \ class, which will match against any `IOUSBInterface` object that implements\
    \ a specific type of USB Communications Devices. This class is implemented in\
    \ the file `AppleUSBCDCDMM.cpp`, and the class is declared in the file `AppleUSBCDCDMM.h`.\n\
    \nThe `AppleUSBCDCDMM` class is a direct subclass of the `IOSerialDriverSync`\
    \ class, so it is responsible for implementing the methods that are required for\
    \ a serial port driver. To send and receive data over the hardware device, the\
    \ `AppleUSBCDCDMM` class sends USB transfer requests to its provider class, which\
    \ is an `IOUSBInterface` object.\n\n### Manually Instantiating a Driver Object\n\
    \nUntil this point, the instantiation and loading of kernel objects has been fairly\
    \ standard and has followed the same I/O Kit driver matching process that all\
    \ drivers go through. However, a serial port driver is different from many drivers\
    \ that you will write, in that it has a child driver. Thus, your serial port driver\
    \ will act as the provider for another I/O Kit driver.\n\nThe child of a serial\
    \ port driver is an object that inherits from the `IOSerialStreamSync` class (or\
    \ a class that is derived from `IOSerialStreamSync`). For a serial port driver,\
    \ its child driver isn't created through the I/O Kit's driver matching procedure;\
    \ rather, the child driver object is explicitly instantiated and attached to the\
    \ serial driver by the serial driver itself.\n\nIn the case of the `AppleUSBCDCDMM`\
    \ driver, the child driver has the type `IOModemSerialStreamSync`, a class that\
    \ inherits directly from the `IOSerialStreamSync` class. The `AppleUSBCDCDMM`\
    \ class instantiates its child object in a method named `createSerialStream()`,\
    \ which is called from the serial port driver's `start()` method. The method `createSerialStream()`\
    \ is a custom method that is private to the `AppleUSBCDCDMM` class. A sample implementation\
    \ of `createSerialStream()` that is based on the `AppleUSBCDCDMM` driver is shown\
    \ in [Listing 11-1](#Chapter11.html#list_11_1).\n\n**Listing 11-1.** The Implementation\
    \ of a Method to Create the `IOSerialStreamSync` Object of a Serial Port Driver\n\
    \n```\n#include <IOKit/serial/IOModemSerialStreamSync.h>\n#include <IOKit/serial/IOSerialKeys.h>\n\
    \nbool   MySerialDriver::createSerialStream()\n{\n       IOSerialStreamSync* \
    \   pChild;\n       bool                   result;\n\n       // Instantiate the\
    \ child driver object\n       pChild = new IOModemSerialStreamSync;\n       if\
    \ (pChild == NULL)\n              return false;\n\n       // Initialize the child\
    \ driver\n       result = pChild->init(0, 0);\n       if (result == false)\n \
    \             goto bail;\n\n       // Attach pChild as a child device of ourself\n\
    \       result = pChild->attach(this);   // Pass \"this\" as the child driver's\
    \ provider\n       if (result == false)\n              goto bail;\n\n       //\
    \ Setup the properties used when naming the device file in /dev\n       pChild->setProperty(kIOTTYBaseNameKey,\
    \ \"my_serial\");\n       pChild->setProperty(kIOTTYSuffixKey, \"\");\n\n    \
    \   // Allow matching of drivers that use pChild as their provider class\n   \
    \    pChild->registerService();\n\n       // Fall-through on success\nbail:\n\
    \       pChild->release();\n       return result;\n}\n```\n\nThe code in [Listing\
    \ 11-1](#Chapter11.html#list_11_1) provides an example of how a driver can instantiate\
    \ its own child driver explicitly, without having to create a property list file\
    \ for the child driver and have the I/O Kit's matching mechanism invoked. The\
    \ three basic steps to creating a new driver object are: (1) allocating an instance\
    \ of the driver class by calling the C++ `new` operator, (2) initializing the\
    \ returned object by calling its `init()` method, and (3) attaching the driver\
    \ object to its parent through the `attach()` method. The parameter passed to\
    \ `attach()` is the provider class of the child device, which will typically be\
    \ the object that instantiated the child driver."
  raw: '### Serial Port Drivers


    Serial port drivers on Mac OS X are implemented by creating a class that is derived
    from the `IOSerialDriverSync` class. In this section, we describe the implementation
    of a serial port driver by walking through the source code of a driver provided
    by Apple for USB serial communication devices. Although it is unlikely that you
    will need to implement your own serial driver directly, this section can be seen
    as providing a working application of I/O Kit techniques and driver design, and
    many of the techniques used by the Apple USB serial driver can potentially be
    applied to other drivers that you will develop.


    To follow along with this section, you may wish to download the source code for
    the serial port driver that we are discussing. The classes that play a part in
    the kernel serial driver stack are spread between the following two projects in
    the Darwin source code repository:


    *   The base classes, on which all serial drivers are built, including the implementation
    of the `IOSerialBSDClient` class, are contained within the IOSerialFamily project.
    To implement your own serial port driver, you would need only the classes contained
    within the IOSerialFamily project.

    *   The driver that loads against USB-based serial communication devices is contained
    within the project named `AppleUSBCDCDriver`. (USBCDC is an acronym for USB Communications
    Device Class.)


    Given the number of supporting classes that are created to handle a serial port
    driver by the I/O Kit, it''s instructive to understand how these classes are instantiated.
    When a USB device that implements the Communications Device Class is connected
    to a Mac, the USB host controller will create a new `IOUSBDevice` object to represent
    that device. When this `IOUSBDevice` object is published, it initiates the I/O
    Kit''s driver matching process, which searches for an appropriate driver for the
    USB device. In this case, the I/O Kit will select the `AppleUSBCDC` driver, since
    its matching dictionary specifies that it should load against any USB device that
    supports the Communications Device Class. Note that the `AppleUSBCDC` driver is
    not a serial driver. It is a subclass of the generic `IOService` class, and its
    role is simply to configure the USB hardware for use as a serial device. It does
    this by iterating over the USB interfaces that the device supports and setting
    the active interface to one that provides communications support.


    Once the `AppleUSBCDC` driver has configured the active USB device interface,
    the I/O Kit''s USB family creates an `IOUSBInterface` object to represent the
    active interface. This kicks off another round of the I/O Kit''s driver matching
    process, which searches for an appropriate driver for the `IOUSBInterface` object.
    For the purpose of this section, we will examine the implementation of the `AppleUSBCDCDMM`
    class, which will match against any `IOUSBInterface` object that implements a
    specific type of USB Communications Devices. This class is implemented in the
    file `AppleUSBCDCDMM.cpp`, and the class is declared in the file `AppleUSBCDCDMM.h`.


    The `AppleUSBCDCDMM` class is a direct subclass of the `IOSerialDriverSync` class,
    so it is responsible for implementing the methods that are required for a serial
    port driver. To send and receive data over the hardware device, the `AppleUSBCDCDMM`
    class sends USB transfer requests to its provider class, which is an `IOUSBInterface`
    object.


    ##### Manually Instantiating a Driver Object


    Until this point, the instantiation and loading of kernel objects has been fairly
    standard and has followed the same I/O Kit driver matching process that all drivers
    go through. However, a serial port driver is different from many drivers that
    you will write, in that it has a child driver. Thus, your serial port driver will
    act as the provider for another I/O Kit driver.


    The child of a serial port driver is an object that inherits from the `IOSerialStreamSync`
    class (or a class that is derived from `IOSerialStreamSync`). For a serial port
    driver, its child driver isn''t created through the I/O Kit''s driver matching
    procedure; rather, the child driver object is explicitly instantiated and attached
    to the serial driver by the serial driver itself.


    In the case of the `AppleUSBCDCDMM` driver, the child driver has the type `IOModemSerialStreamSync`,
    a class that inherits directly from the `IOSerialStreamSync` class. The `AppleUSBCDCDMM`
    class instantiates its child object in a method named `createSerialStream()`,
    which is called from the serial port driver''s `start()` method. The method `createSerialStream()`
    is a custom method that is private to the `AppleUSBCDCDMM` class. A sample implementation
    of `createSerialStream()` that is based on the `AppleUSBCDCDMM` driver is shown
    in [Listing 11-1](#Chapter11.html#list_11_1).


    ***Listing 11-1.** The Implementation of a Method to Create the `IOSerialStreamSync`
    Object of a Serial Port Driver*


    `#include <IOKit/serial/IOModemSerialStreamSync.h>`

    `#include <IOKit/serial/IOSerialKeys.h>`


    `bool   MySerialDriver::createSerialStream()`

    `{`

    `       IOSerialStreamSync*    pChild;`

    `       bool                   result;`


    `       // Instantiate the child driver object`

    `       pChild = new IOModemSerialStreamSync;`

    `       if (pChild == NULL)`

    `              return false;`


    `       // Initialize the child driver`

    `       result = pChild->init(0, 0);`

    `       if (result == false)`

    `              goto bail;`


    `       // Attach pChild as a child device of ourself`

    `       result = pChild->attach(this);   // Pass "this" as the child driver''s
    provider`

    `       if (result == false)`

    `              goto bail;`


    `       // Setup the properties used when naming the device file in /dev`

    `       pChild->setProperty(kIOTTYBaseNameKey, "my_serial");`

    `       pChild->setProperty(kIOTTYSuffixKey, "");`


    `       // Allow matching of drivers that use pChild as their provider class`

    `       pChild->registerService();`


    `       // Fall-through on success`

    `bail:`

    `       pChild->release();`

    `       return result;`

    `}`


    The code in [Listing 11-1](#Chapter11.html#list_11_1) provides an example of how
    a driver can instantiate its own child driver explicitly, without having to create
    a property list file for the child driver and have the I/O Kit''s matching mechanism
    invoked. The three basic steps to creating a new driver object are: (1) allocating
    an instance of the driver class by calling the C++ `new` operator, (2) initializing
    the returned object by calling its `init()` method, and (3) attaching the driver
    object to its parent through the `attach()` method. The parameter passed to `attach()`
    is the provider class of the child device, which will typically be the object
    that instantiated the child driver.'
  trans: "\n### 串行端口驱动程序\n\n在 Mac OS X 上，串行端口驱动程序通过创建一个派生自 `IOSerialDriverSync` 类的类来实现。在本节中，我们将通过解析\
    \ Apple 为 USB 串行通信设备提供的驱动程序源代码，来介绍串行端口驱动程序的实现。尽管你直接实现自己的串行驱动程序的可能性不大，但本节可被视为提供了\
    \ I/O Kit 技术和驱动程序设计的实际应用，并且 Apple USB 串行驱动程序使用的许多技术有可能应用于你将开发的其他驱动程序。\n\n若想跟随本节内容进行学习，你可能希望下载我们正在讨论的串行端口驱动程序的源代码。在内核串行驱动程序栈中发挥作用的类分布在\
    \ Darwin 源代码存储库的以下两个项目中：\n\n*   所有串行驱动程序所基于的基类（包括 `IOSerialBSDClient` 类的实现）都包含在\
    \ `IOSerialFamily` 项目中。要实现你自己的串行端口驱动程序，你只需要 `IOSerialFamily` 项目中的类即可。\n*   针对基于\
    \ USB 的串行通信设备加载的驱动程序包含在名为 `AppleUSBCDCDriver` 的项目中。（`USBCDC` 是 USB 通信设备类（USB Communications\
    \ Device Class）的缩写。）\n\n考虑到 I/O Kit 为处理串行端口驱动程序而创建的大量支持类，了解这些类是如何实例化的将很有启发。当一个实现了通信设备类的\
    \ USB 设备连接到 Mac 时，USB 主机控制器会创建一个新的 `IOUSBDevice` 对象来表示该设备。当这个 `IOUSBDevice` 对象发布后，它会启动\
    \ I/O Kit 的驱动匹配过程，该过程会为 USB 设备搜索合适的驱动程序。在这种情况下，I/O Kit 将选择 `AppleUSBCDC` 驱动程序，因为其匹配字典指定它应针对任何支持通信设备类的\
    \ USB 设备加载。请注意，`AppleUSBCDC` 驱动程序并非串行驱动程序。它是通用 `IOService` 类的子类，其作用仅仅是将 USB 硬件配置为用作串行设备。它通过遍历设备支持的\
    \ USB 接口并将活动接口设置为提供通信支持的接口来实现这一点。\n\n一旦 `AppleUSBCDC` 驱动程序配置了活动的 USB 设备接口，I/O\
    \ Kit 的 USB 家族会创建一个 `IOUSBInterface` 对象来表示该活动接口。这又会启动新一轮的 I/O Kit 驱动匹配过程，为 `IOUSBInterface`\
    \ 对象搜索合适的驱动程序。出于本节的目的，我们将分析 `AppleUSBCDCDMM` 类的实现，该类会匹配任何实现了特定类型 USB 通信设备的 `IOUSBInterface`\
    \ 对象。该类在文件 `AppleUSBCDCDMM.cpp` 中实现，并在文件 `AppleUSBCDCDMM.h` 中声明。\n\n`AppleUSBCDCDMM`\
    \ 类是 `IOSerialDriverSync` 类的直接子类，因此它负责实现串行端口驱动程序所需的方法。为了通过硬件设备发送和接收数据，`AppleUSBCDCDMM`\
    \ 类向其提供者类（一个 `IOUSBInterface` 对象）发送 USB 传输请求。\n\n### 手动实例化驱动程序对象\n\n在此之前，内核对象的实例化和加载都相当标准，并且遵循所有驱动程序都要经历的相同\
    \ I/O Kit 驱动匹配过程。然而，串行端口驱动程序与你将编写的许多驱动程序不同，因为它有一个子驱动程序。因此，你的串行端口驱动程序将充当另一个 I/O\
    \ Kit 驱动程序的提供者。\n\n串行端口驱动程序的子对象是一个继承自 `IOSerialStreamSync` 类（或派生自 `IOSerialStreamSync`\
    \ 的类）的对象。对于串行端口驱动程序，其子驱动程序并非通过 I/O Kit 的驱动匹配过程创建；相反，子驱动程序对象是由串行驱动程序本身显式实例化并附加到串行驱动程序上的。\n\
    \n在 `AppleUSBCDCDMM` 驱动程序的情况下，子驱动程序的类型为 `IOModemSerialStreamSync`，这是一个直接继承自 `IOSerialStreamSync`\
    \ 类的类。`AppleUSBCDCDMM` 类在一个名为 `createSerialStream()` 的方法中实例化其子对象，该方法从串行端口驱动程序的\
    \ `start()` 方法中调用。`createSerialStream()` 方法是一个自定义方法，对 `AppleUSBCDCDMM` 类来说是私有的。以下基于\
    \ `AppleUSBCDCDMM` 驱动程序的 `createSerialStream()` 示例实现如代码清单 11-1 所示。\n\n**代码清单 11-1.**\
    \ 创建串行端口驱动程序的 `IOSerialStreamSync` 对象的方法实现\n\n```\n#include <IOKit/serial/IOModemSerialStreamSync.h>\n\
    #include <IOKit/serial/IOSerialKeys.h>\n\nbool   MySerialDriver::createSerialStream()\n\
    {\n       IOSerialStreamSync*    pChild;\n       bool                   result;\n\
    \n       // 实例化子驱动程序对象\n       pChild = new IOModemSerialStreamSync;\n       if\
    \ (pChild == NULL)\n              return false;\n\n       // 初始化子驱动程序\n      \
    \ result = pChild->init(0, 0);\n       if (result == false)\n              goto\
    \ bail;\n\n       // 将 pChild 作为我们自身的子设备附加\n       result = pChild->attach(this);\
    \   // 传递 \"this\" 作为子驱动程序的提供者\n       if (result == false)\n              goto\
    \ bail;\n\n       // 设置用于命名 /dev 中设备文件的属性\n       pChild->setProperty(kIOTTYBaseNameKey,\
    \ \"my_serial\");\n       pChild->setProperty(kIOTTYSuffixKey, \"\");\n\n    \
    \   // 允许以 pChild 作为提供者类的驱动程序进行匹配\n       pChild->registerService();\n\n     \
    \  // 成功时落入此处\nbail:\n       pChild->release();\n       return result;\n}\n```\n\
    \n代码清单 11-1 中的代码展示了一个驱动程序如何显式实例化其自身的子驱动程序，而无需为子驱动程序创建属性列表文件并调用 I/O Kit 的匹配机制。创建新驱动程序对象的三个基本步骤是：(1)\
    \ 通过调用 C++ `new` 运算符来分配驱动程序类的实例，(2) 通过调用返回对象的 `init()` 方法来初始化它，以及 (3) 通过 `attach()`\
    \ 方法将驱动程序对象附加到其父对象上。传递给 `attach()` 的参数是子设备的提供者类，这通常是实例化子驱动程序的父对象。\n"
- fmt: "你会注意到，由于 I/O Kit 使用的嵌入式 C++ 语言不支持异常，为了检查 `new` 操作符的调用是否失败，我们需要检查返回值是否为 `NULL`。请注意，在从方法返回之前，我们无条件地释放了对子对象的引用；如果\
    \ `attach()` 调用成功，子驱动程序对象将被 I/O Kit 保留，因此方法末尾的 `release()` 调用不会销毁该对象，而是会释放我们持有的对该对象的引用（防止内存泄漏）。另一方面，如果子驱动程序在\
    \ `init()` 方法中失败或无法被附加，我们需要释放（并销毁）该子驱动程序对象。\n\n由 `createSerialStream()` 方法实例化的\
    \ `IOModemSerialStreamSync` 类扮演着两个类之间通道的角色，即处理用户空间应用程序对串行端口操作的 `IOSerialBSDClient`\
    \ 类，以及串行端口驱动程序的实现（在之前的例子中是 `MySerialDriver`）。然而，串行端口驱动程序无法直接访问 `IOSerialBSDClient`\
    \ 类。为了指定在 `/dev` 目录中创建的字符设备文件的名称，它需要能够将某些参数传递给 `IOSerialBSDClient` 的初始化方法。为此，它在\
    \ `IOSerialBSDClient` 类创建之前，在 `IOSerialStreamSync` 对象上设置了两个属性，然后 `IOSerialBSDClient`\
    \ 对象在其初始化过程中就能够读取这些属性。\n\n串行端口驱动程序在 `IOSerialStreamSync` 对象上调用 `registerService()`\
    \ 方法，这通知 I/O Kit 应该开始对子设备进行匹配过程。任何希望将 `IOSerialStreamSync` 对象作为其父类（提供者类）使用的驱动程序都将被加载。这就是\
    \ `IOSerialBSDClient` 类被加载并附加到由串行端口驱动程序创建的 `IOSerialStreamSync` 对象上的方式。IOSerialFamily\
    \ 内核模块包含一个针对 `IOSerialBSDClient` 类的匹配字典，该字典会匹配任何 `IOSerialStreamSync` 对象（或派生自\
    \ `IOSerialStreamSync` 的类）。\n\n![images](images/square.jpg) **注意**：通常，显式实例化并将子驱动程序附加到自身的驱动程序不应该为子驱动程序调用\
    \ `registerService()`，因为这通常由子驱动程序自己处理。然而，对于 `IOSerialStreamSync` 类，它不会自行注册以进行驱动程序匹配，因此在实例化它之后，我们显式地调用其\
    \ `registerDriver()` 方法。\n\n当 `IOSerialStreamSync` 类向 I/O Kit 注册后，会创建并附加一个 `IOSerialBSDClient`\
    \ 类的实例，从而完成串行端口所需的一组驱动程序对象。当 `IOSerialBSDClient` 类被初始化时，它会在 `/dev` 目录中为串行端口创建两个设备节点，一个对应于拨入字符设备文件，另一个对应于呼出字符设备文件。为了确定这些文件的名称，`IOSerialBSDClient`\
    \ 类读取 `kIOTTYBaseNameKey` 和 `kIOTTYSuffixKey` 属性的值，然后使用以下格式创建两个文件：\n\n```\n“tty.”\
    \ + kIOTTYBaseNameKey + kIOTTYSuffixKey\n```\n\n以及\n\n```\n“cu.” + kIOTTYBaseNameKey\
    \ + kIOTTYSuffixKey\n```\n\n对于[列表 11-1](#Chapter11.html#list_11_1) 中的示例，这会产生一个名为\
    \ `tty.my_serial` 的拨入设备字符设备文件，以及一个名为 `cu.my_serial` 的呼出设备字符设备文件。\n\n### 实现 `IOSerialDriverSync`\
    \ 类\n\nMac OS X 上的串行驱动程序必须派生自 `IOSerialDriverSync` 类。`IOSerialDriverSync` 类是一个纯抽象类，它提供了串行驱动程序必须实现的接口。串行驱动程序必须实现的方法在[列表\
    \ 11-2](#Chapter11.html#list_11_2) 中给出。\n\n***列表 11-2.** `IOSerialDriverSync`\
    \ 的接口，声明了串行端口驱动程序必须实现的方法*\n\n```\nclass IOSerialDriverSync : public IOService\n\
    {\n       OSDeclareAbstractStructors(IOSerialDriverSync);\n\npublic:\n       virtual\
    \ IOReturn  acquirePort(bool sleep, void *refCon) = 0;\n\n       virtual IOReturn\
    \  releasePort(void *refCon) = 0;\n\n       virtual IOReturn  setState(UInt32\
    \ state, UInt32 mask, void *refCon) = 0;\n\n       virtual UInt32    getState(void\
    \ *refCon) = 0;\n\n       virtual IOReturn  watchState(UInt32 *state, UInt32 mask,\
    \ void *refCon) = 0;\n\n       virtual UInt32    nextEvent(void *refCon) = 0;\n\
    \n       virtual IOReturn  executeEvent(UInt32 event, UInt32 data, void *refCon)\
    \ = 0;\n\n       virtual IOReturn  requestEvent(UInt32 event, UInt32 *data, void\
    \ *refCon) = 0;\n\n       virtual IOReturn  enqueueEvent(UInt32 event, UInt32\
    \ data,\n                                   bool sleep, void *refCon) = 0;\n\n\
    \       virtual IOReturn  dequeueEvent(UInt32 *event, UInt32 *data,\n        \
    \                           bool sleep, void *refCon) = 0;\n\n       virtual IOReturn\
    \  enqueueData(UInt8 *buffer, UInt32 size, UInt32 *count,\n                  \
    \                 bool sleep, void *refCon) = 0;\n\n       virtual IOReturn  dequeueData(UInt8\
    \ *buffer, UInt32 size, UInt32 *count,\n                                   UInt32\
    \ min, void *refCon) = 0;\n};\n```\n\n你会注意到每个方法都带有一个名为 `refCon` 的参数。`refCon` 值可以被串行端口驱动程序用来标识该方法正在操作的串行端口。`refCon`\
    \ 值实际上由串行端口驱动程序自身指定，并在实例化时传递给 `IOSerialStreamSync` 对象。作为回报，每当 `IOSerialStreamSync`\
    \ 类调用驱动程序类中的方法时，它都会将这个 `refCon` 值传回给驱动程序。在大多数情况下，并不需要 `refCon` 值，因为串行端口驱动程序所需的任何数据都可以作为实例变量添加到驱动程序类中。然而，对于管理具有多个串行端口的硬件（例如带有\
    \ COM1 和 COM2 端口的 USB 适配器）的串行端口驱动程序来说，驱动程序需要某种方法来识别方法调用中引用的是哪个端口。为此，串行驱动程序会创建两个\
    \ `IOSerialStreamSync` 类的实例（每个硬件端口一个），并为每个端口提供一个唯一的 `refCon` 值。\n\n这个接口看起来可能令人望而生畏，但这些方法可以分为三类：\n\
    \n-   调整串行端口状态并监视串行端口状态变化的方法\n-   获取或设置串行端口属性的方法\n-   通过串行端口读写数据的方法\n\n以下是 `IOSerialDriverSync`\
    \ 接口定义的方法的简要说明：\n\n-   打开和关闭串行端口：`acquirePort()`、`releasePort()`\n-   管理表示串行端口状态的位掩码，并阻塞调用线程直到特定条件发生。状态位描述了诸如串行端口是否已打开、是否已通过串行端口接收到数据并可读、以及串行端口是否可以接受写入字节等条件：`setState()`、`getState()`、`watchState()`\n\
    -   设置串行端口的属性：`executeEvent()`、`enqueueEvent()`\n-   获取串行端口的属性：`nextEvent()`、`requestEvent()`\n\
    -   通过串行端口写入数据：`enqueueData()`\n-   读取已从串行端口接收到的数据：`dequeueData()`"
  raw: "You will notice that because the embedded C++ language used by the I/O Kit\
    \ does not support exceptions, to check whether the call to the C++ `new` operator\
    \ has failed, we check to see if the returned value is `NULL`. Note that we unconditionally\
    \ release a reference to the child object before returning from the method; if\
    \ the call to `attach()` succeeded, the child driver object will be retained by\
    \ the I/O Kit, so the call to `release()` at the end of the method won't destroy\
    \ the object but will release the reference to the object that we hold (preventing\
    \ a leak). On the other hand, if the child driver failed in its `init()` method\
    \ or couldn't be attached, we need to release (and destroy) the child driver object.\n\
    \nThe `IOModemSerialStreamSync` class that is instantiated by the `createSerialStream()`\
    \ method performs the role of a conduit between two classes, namely the `IOSerialBSDClient`\
    \ class that handles operations on the serial port that are performed by user\
    \ space applications, and the implementation of the serial port driver (`MySerialDriver`\
    \ in the previous example). However, the serial port driver has no direct access\
    \ to the `IOSerialBSDClient` class. To specify the name of the character device\
    \ file that is created in the `/dev` directory, it needs to be able to pass certain\
    \ parameters to the `IOSerialBSDClient`'s initialization method. To do this, it\
    \ sets two properties on the `IOSerialStreamSync` object before the `IOSerialBSDClient`\
    \ class is created, and the `IOSerialBSDClient` object is then able to read these\
    \ properties in its initialization.\n\nThe serial port driver calls the `registerService()`\
    \ method on the `IOSerialStreamSync` object, which informs the I/O Kit that it\
    \ should begin the matching procedure for the child device. Any driver that wishes\
    \ to use the `IOSerialStreamSync` object as its parent (provider class) will be\
    \ loaded. This is the means by which the `IOSerialBSDClient` class is loaded and\
    \ attached to the `IOSerialStreamSync` object created by the serial port driver.\
    \ The IOSerialFamily kernel module contains a matching dictionary for the `IOSerialBSDClient`\
    \ class which matches against any `IOSerialStreamSync` object (or a class derived\
    \ from `IOSerialStreamSync`).\n\n![images](images/square.jpg) **Note** In general,\
    \ a driver that explicitly instantiates and attaches a child driver to itself\
    \ should not need to call `registerSerivce()` for the child driver, since this\
    \ will usually be taken care of by the child driver itself. However, in the case\
    \ of the `IOSerialStreamSync` class, it does not register itself for driver matching,\
    \ so after instantiating it we explicitly call its `registerDriver()` method.\n\
    \nWhen the `IOSerialStreamSync` class is registered with the I/O Kit, an instance\
    \ of the `IOSerialBSDClient` class is created and attached, completing the set\
    \ of driver objects that are required for a serial port. When the `IOSerialBSDClient`\
    \ class is initialized, it creates two device nodes for the serial port in the\
    \ `/dev` directory, one corresponding to the dial-in character device file and\
    \ the other corresponding to the callout character device file. To determine the\
    \ name to give these files, the `IOSerialBSDClient` class reads the value of the\
    \ `kIOTTYBaseNameKey` and the `kIOTTYSuffixKey` properties and then creates two\
    \ files using the format:\n\n`“tty.” + kIOTTYBaseNameKey + kIOTTYSuffixKey`\n\n\
    and\n\n`“cu.” + kIOTTYBaseNameKey + kIOTTYSuffixKey`\n\nFor the example in [Listing\
    \ 11-1](#Chapter11.html#list_11_1), this results in a character device file with\
    \ the name `tty.my_serial` for the dial-in device and a character device file\
    \ with the name `cu.my_serial` for the callout device.\n\n### Implementing the\
    \ IOSerialDriverSync Class\n\nSerial drivers on Mac OS X must be derived from\
    \ the `IOSerialDriverSync` class. The `IOSerialDriverSync` class is a pure abstract\
    \ class that provides an interface that must be implemented by the serial driver.\
    \ The methods that must be implemented by a serial driver are given in [Listing\
    \ 11-2](#Chapter11.html#list_11_2).\n\n***Listing 11-2.** The Interface of IOSerialDriverSync,\
    \ Which Declares the Methods That Must Be Implemented by a Serial Port Driver*\n\
    \n`class IOSerialDriverSync : public IOService`\n`{`\n`       OSDeclareAbstractStructors(IOSerialDriverSync);`\n\
    \n`public:`\n`       virtual IOReturn  acquirePort(bool sleep, void *refCon) =\
    \ 0;`\n\n`       virtual IOReturn  releasePort(void *refCon) = 0;`\n\n`       virtual\
    \ IOReturn  setState(UInt32 state, UInt32 mask, void *refCon) = 0;`\n\n`       virtual\
    \ UInt32    getState(void *refCon) = 0;`\n\n`       virtual IOReturn  watchState(UInt32\
    \ *state, UInt32 mask, void *refCon) = 0;`\n\n`       virtual UInt32    nextEvent(void\
    \ *refCon) = 0;`\n\n`       virtual IOReturn  executeEvent(UInt32 event, UInt32\
    \ data, void *refCon) = 0;`\n\n`       virtual IOReturn  requestEvent(UInt32 event,\
    \ UInt32 *data, void *refCon) = 0;`\n\n`       virtual IOReturn  enqueueEvent(UInt32\
    \ event, UInt32 data,`\n`                                   bool sleep, void *refCon)\
    \ = 0;`\n\n`       virtual IOReturn  dequeueEvent(UInt32 *event, UInt32 *data,`\n\
    `                                   bool sleep, void *refCon) = 0;`\n\n`       virtual\
    \ IOReturn  enqueueData(UInt8 *buffer, UInt32 size, UInt32 *count,`\n`                                   bool\
    \ sleep, void *refCon) = 0;`\n\n`       virtual IOReturn  dequeueData(UInt8 *buffer,\
    \ UInt32 size, UInt32 *count,`\n`                                   UInt32 min,\
    \ void *refCon) = 0;`\n`};`\n\nYou will notice that each method is provided with\
    \ a parameter named “`refCon`”. The `refCon` value can be used by a serial port\
    \ driver to identify which serial port the method is operating on. The `refCon`\
    \ value is actually specified by the serial port driver itself, and is passed\
    \ to the `IOSerialStramSync` object at instantiation. In return, the `IOSerialStreamSync`\
    \ class passes this `refCon` value back to the driver whenever it calls a method\
    \ from the driver's class. In most cases, the `refCon` value is not needed, since\
    \ any data that the serial port driver needs can be added as instance variables\
    \ to the driver class. However, in the case of a serial port driver that manages\
    \ hardware with multiple serial ports, such as a USB adapter with a COM1 and a\
    \ COM2 port, the driver would need some way to identify which port is being referred\
    \ to in a method call. To do this, the serial driver would create two instances\
    \ of the `IOSerialStreamSync` class, one for each of its hardware ports, and provide\
    \ a unique `refCon` value for each port.\n\nThe interface may appear to be daunting,\
    \ but the methods can be broken into three categories:\n\n*   Methods that adjust\
    \ the serial port's status and watch for changes in the serial port's state\n\
    *   Methods that get or set properties of the serial port\n*   Methods that read\
    \ and write data over the serial port\n\nThe following are brief descriptions\
    \ of the methods defined by the `IOSerialDriverSync` interface:\n\n*   Opening\
    \ and closing the serial port: `acquirePort()`\n    `releasePort()`\n*   Managing\
    \ a bitmask that represents the state of the serial port, and blocking the calling\
    \ thread until a particular condition occurs. State bits describe such conditions\
    \ as whether the serial port has been opened, whether data has been received over\
    \ the serial port and is available for reading, and whether the serial port can\
    \ accept bytes for writing: `setState()`\n    `getState()`\n    `watchState()`\n\
    *   Setting properties of the serial port: `executeEvent()`\n    `enqueueEvent()`\n\
    *   Getting properties of the serial port: `nextEvent()`\n    `requestEvent()`\n\
    *   Writing data over the serial port: `enqueueData()`\n*   Reading data that\
    \ has been received from the serial port: `dequeueData()`"
  trans: "\n你会注意到，由于 I/O Kit 使用的嵌入式 C++ 语言不支持异常，为了检查 `new` 操作符的调用是否失败，我们需要检查返回值是否为\
    \ `NULL`。请注意，在从方法返回之前，我们无条件地释放了对子对象的引用；如果 `attach()` 调用成功，子驱动程序对象将被 I/O Kit 保留，因此方法末尾的\
    \ `release()` 调用不会销毁该对象，而是会释放我们持有的对该对象的引用（防止内存泄漏）。另一方面，如果子驱动程序在 `init()` 方法中失败或无法被附加，我们需要释放（并销毁）该子驱动程序对象。\n\
    \n由 `createSerialStream()` 方法实例化的 `IOModemSerialStreamSync` 类扮演着两个类之间通道的角色，即处理用户空间应用程序对串行端口操作的\
    \ `IOSerialBSDClient` 类，以及串行端口驱动程序的实现（在之前的例子中是 `MySerialDriver`）。然而，串行端口驱动程序无法直接访问\
    \ `IOSerialBSDClient` 类。为了指定在 `/dev` 目录中创建的字符设备文件的名称，它需要能够将某些参数传递给 `IOSerialBSDClient`\
    \ 的初始化方法。为此，它在 `IOSerialBSDClient` 类创建之前，在 `IOSerialStreamSync` 对象上设置了两个属性，然后\
    \ `IOSerialBSDClient` 对象在其初始化过程中就能够读取这些属性。\n\n串行端口驱动程序在 `IOSerialStreamSync` 对象上调用\
    \ `registerService()` 方法，这通知 I/O Kit 应该开始对子设备进行匹配过程。任何希望将 `IOSerialStreamSync`\
    \ 对象作为其父类（提供者类）使用的驱动程序都将被加载。这就是 `IOSerialBSDClient` 类被加载并附加到由串行端口驱动程序创建的 `IOSerialStreamSync`\
    \ 对象上的方式。IOSerialFamily 内核模块包含一个针对 `IOSerialBSDClient` 类的匹配字典，该字典会匹配任何 `IOSerialStreamSync`\
    \ 对象（或派生自 `IOSerialStreamSync` 的类）。\n\n![images](img/square.jpg) **注意**：通常，显式实例化并将子驱动程序附加到自身的驱动程序不应该为子驱动程序调用\
    \ `registerService()`，因为这通常由子驱动程序自己处理。然而，对于 `IOSerialStreamSync` 类，它不会自行注册以进行驱动程序匹配，因此在实例化它之后，我们显式地调用其\
    \ `registerDriver()` 方法。\n\n当 `IOSerialStreamSync` 类向 I/O Kit 注册后，会创建并附加一个 `IOSerialBSDClient`\
    \ 类的实例，从而完成串行端口所需的一组驱动程序对象。当 `IOSerialBSDClient` 类被初始化时，它会在 `/dev` 目录中为串行端口创建两个设备节点，一个对应于拨入字符设备文件，另一个对应于呼出字符设备文件。为了确定这些文件的名称，`IOSerialBSDClient`\
    \ 类读取 `kIOTTYBaseNameKey` 和 `kIOTTYSuffixKey` 属性的值，然后使用以下格式创建两个文件：\n\n```\n“tty.”\
    \ + kIOTTYBaseNameKey + kIOTTYSuffixKey\n```\n\n以及\n\n```\n“cu.” + kIOTTYBaseNameKey\
    \ + kIOTTYSuffixKey\n```\n\n对于列表 11-1 中的示例，这会产生一个名为 `tty.my_serial` 的拨入设备字符设备文件，以及一个名为\
    \ `cu.my_serial` 的呼出设备字符设备文件。\n\n### 实现 `IOSerialDriverSync` 类\n\nMac OS X 上的串行驱动程序必须派生自\
    \ `IOSerialDriverSync` 类。`IOSerialDriverSync` 类是一个纯抽象类，它提供了串行驱动程序必须实现的接口。串行驱动程序必须实现的方法在列表\
    \ 11-2 中给出。\n\n***列表 11-2.** `IOSerialDriverSync` 的接口，声明了串行端口驱动程序必须实现的方法*\n\n\
    ```\nclass IOSerialDriverSync : public IOService\n{\n       OSDeclareAbstractStructors(IOSerialDriverSync);\n\
    \npublic:\n       virtual IOReturn  acquirePort(bool sleep, void *refCon) = 0;\n\
    \n       virtual IOReturn  releasePort(void *refCon) = 0;\n\n       virtual IOReturn\
    \  setState(UInt32 state, UInt32 mask, void *refCon) = 0;\n\n       virtual UInt32\
    \    getState(void *refCon) = 0;\n\n       virtual IOReturn  watchState(UInt32\
    \ *state, UInt32 mask, void *refCon) = 0;\n\n       virtual UInt32    nextEvent(void\
    \ *refCon) = 0;\n\n       virtual IOReturn  executeEvent(UInt32 event, UInt32\
    \ data, void *refCon) = 0;\n\n       virtual IOReturn  requestEvent(UInt32 event,\
    \ UInt32 *data, void *refCon) = 0;\n\n       virtual IOReturn  enqueueEvent(UInt32\
    \ event, UInt32 data,\n                                   bool sleep, void *refCon)\
    \ = 0;\n\n       virtual IOReturn  dequeueEvent(UInt32 *event, UInt32 *data,\n\
    \                                   bool sleep, void *refCon) = 0;\n\n       virtual\
    \ IOReturn  enqueueData(UInt8 *buffer, UInt32 size, UInt32 *count,\n         \
    \                          bool sleep, void *refCon) = 0;\n\n       virtual IOReturn\
    \  dequeueData(UInt8 *buffer, UInt32 size, UInt32 *count,\n                  \
    \                 UInt32 min, void *refCon) = 0;\n};\n```\n\n你会注意到每个方法都带有一个名为\
    \ `refCon` 的参数。`refCon` 值可以被串行端口驱动程序用来标识该方法正在操作的串行端口。`refCon` 值实际上由串行端口驱动程序自身指定，并在实例化时传递给\
    \ `IOSerialStreamSync` 对象。作为回报，每当 `IOSerialStreamSync` 类调用驱动程序类中的方法时，它都会将这个 `refCon`\
    \ 值传回给驱动程序。在大多数情况下，并不需要 `refCon` 值，因为串行端口驱动程序所需的任何数据都可以作为实例变量添加到驱动程序类中。然而，对于管理具有多个串行端口的硬件（例如带有\
    \ COM1 和 COM2 端口的 USB 适配器）的串行端口驱动程序来说，驱动程序需要某种方法来识别方法调用中引用的是哪个端口。为此，串行驱动程序会创建两个\
    \ `IOSerialStreamSync` 类的实例（每个硬件端口一个），并为每个端口提供一个唯一的 `refCon` 值。\n\n这个接口看起来可能令人望而生畏，但这些方法可以分为三类：\n\
    \n-   调整串行端口状态并监视串行端口状态变化的方法\n-   获取或设置串行端口属性的方法\n-   通过串行端口读写数据的方法\n\n以下是 `IOSerialDriverSync`\
    \ 接口定义的方法的简要说明：\n\n-   打开和关闭串行端口：`acquirePort()`、`releasePort()`\n-   管理表示串行端口状态的位掩码，并阻塞调用线程直到特定条件发生。状态位描述了诸如串行端口是否已打开、是否已通过串行端口接收到数据并可读、以及串行端口是否可以接受写入字节等条件：`setState()`、`getState()`、`watchState()`\n\
    -   设置串行端口的属性：`executeEvent()`、`enqueueEvent()`\n-   获取串行端口的属性：`nextEvent()`、`requestEvent()`\n\
    -   通过串行端口写入数据：`enqueueData()`\n-   读取已从串行端口接收到的数据：`dequeueData()`\n"
- fmt: '### 实现 `IOSerialDriverSync` 接口的同步问题


    实现 `IOSerialDriverSync` 接口的复杂性之一在于它需要细致的同步。该接口的方法可能在任何时候被多个线程调用，这意味着实现需要确保每个方法都正确同步，以防止出现诸如
    `dequeueData()` 方法在串口已关闭后仍返回数据等情况。更复杂的是，有几个方法可能会阻塞调用线程，直到某个特定事件发生；`watchState()`
    方法尤其如此，它在串口进入请求状态之前不会返回。这两个同步问题都可以通过使用互斥锁和一个条件变量来通知串口状态的变化来解决。


    对于 `AppleUSBCDCDMM` 驱动程序，存在一个更大的同步问题：通过 `IOSerialDriverSync` 接口调用的方法需要与 USB 异步传输完成时触发的回调进行协调。这是为了防止
    USB 写入操作的完成回调在 `dequeueData()` 方法尝试从同一缓冲区读取数据的同时将数据放入该缓冲区。


    尽管上述描述描绘了一个非常困难的同步问题，但 I/O Kit 设计提供了一个令人惊讶的优雅解决方案。所有 USB 完成回调都在 USB 工作循环（work
    loop）上运行，因此为了同步串口方法与 USB 代码，`AppleUSBCDCDMM` 驱动程序确保所有串口方法都在 USB 工作循环上处理。其实现如下：


    ```cpp

    bool AppleUSBCDCDMM::start(IOService *provider)

    {

           …

           // Get the USB work loop (superclass will use the provider class'' work
    loop)

           fWorkLoop = getWorkLoop();

           …

           // Create a command gate and install it on the USB work loop

           fCommandGate = IOCommandGate::commandGate(this);

           fWorkLoop->addEventSource(fCommandGate);

           …

    }

    ```


    对于每个串口方法，`AppleUSBCDCDMM` 驱动程序都通过命令门（command gate）调用该方法，确保它与 USB 工作循环同步。下面展示了
    `releasePort()` 的实现：


    ```cpp

    IOReturn AppleUSBCDCDMM::releasePort(void *refCon)

    {

           IOReturn       ret = kIOReturnSuccess;


           // Call the static method releasePortAction() on the work loop, which requires
    no

           // parameters

           ret = fCommandGate->runAction(releasePortAction);


           return ret;

    }


    IOReturn AppleUSBCDCDMM::releasePortAction(OSObject *owner, void *, void *, void
    *, void *)

    {

           // Call through to the method releasePortGated()

           return ((AppleUSBCDCDMM*)owner)->releasePortGated();

    }


    IOReturn AppleUSBCDCDMM::releasePortGated()

    {

           …

           // Implementation of releasePort

           …

    }

    ```


    `IOCommandGate` 还提供了一个对象，线程可以在其上休眠，并且可以在事件发生时用来通知休眠的线程。正如我们将看到的，这提供了一种方便的方法来实现串口的
    `watchState()` 方法。


    ### 串口状态


    实现 `IOSerialDriverSync` 接口的核心部分是管理串口的状态。串口状态是一个 32 位的位域，用于报告事件（例如串口上数据的到达），以及保存端口的整体状态（例如它是否已被用户空间进程打开）。尽管有一些方法直接参与操作状态位掩码，但最终串口从
    `IOSerialDriverSync` 实现的每个方法都需要访问串口的状态，即使仅仅是为了在尝试执行操作之前验证串口是否已被打开。


    状态位定义在头文件 `IOSerialStreamSync.h` 中。每个位的含义描述如下：


    - `PD_S_ACQUIRED` 表示串口已被打开，并且正在被用户空间应用程序使用。此状态位从不通过 `setState()` 方法设置或清除，而是在 `acquirePort()`
    方法中设置，并在 `releasePort()` 方法中清除。

    - `PD_S_ACTIVE` 在获取串口后立即设置，并在释放串口前立即清除。此状态位从不通过 `setState()` 方法设置或清除；相反，该位通过 `executeEvent()`
    方法设置或清除，该方法使用事件类型 `PD_E_ACTIVE` 来操作此状态位。

    - `PD_S_TX_ENABLE` 和 `PD_S_RX_ENABLE` 被设置以指示串口的发送和接收接口已启用。大多数实现（包括 `AppleUSBCDCDMM`
    驱动程序）在串口打开时设置这些位，在串口关闭时清除它们，但除此之外不对这些状态位做其他使用。

    - `PD_S_TX_BUSY` 和 `PD_S_RX_BUSY` 被设置以指示串口驱动程序正在将其发送缓冲区中的数据发送到串口硬件，或者正在将已通过串口硬件发送的数据读入驱动程序缓冲区。

    - `PD_S_TX_EVENT` 和 `PD_S_RX_EVENT` 是 `IOSerialBSDClient` 类内部使用的两个状态，用于通知写或读操作的开始。尽管串口驱动程序未使用这些状态位，但它需要在
    `setState()` 中设置相应的位，并允许客户端通过 `watchState()` 观察该位，以确保 `IOSerialBSDClient` 正确运行。


    许多位描述了串口驱动程序的发送和接收缓冲区的状态。发送缓冲区由串口驱动程序用于保存通过 `enqueueData()` 方法提供给它的、但尚未通过串口硬件发送的字节。接收缓冲区保存串口驱动程序已从串口硬件读取但尚未通过
    `dequeueData()` 方法传递的字节。以下是串口驱动程序缓冲区状态位的描述：


    - `PD_S_TXQ_EMPTY` 和 `PD_S_RXQ_EMPTY` 指示发送缓冲区或接收缓冲区为空，不包含任何字节。

    - `PD_S_TXQ_LOW_WATER` 和 `PD_S_RXQ_LOW_WATER` 指示发送缓冲区或接收缓冲区中的字节数低于“低水位线”。`AppleUSBCDCDMM`
    驱动程序将低水位线设置为整个发送缓冲区或接收缓冲区大小的三分之一。

    - `PD_S_TXQ_HIGH_WATER` 和 `PD_S_RXQ_HIGH_WATER` 指示发送缓冲区或接收缓冲区中的字节数高于“高水位线”。`AppleUSBCDCDMM`
    驱动程序将高水位线设置为整个发送缓冲区或接收缓冲区大小的三分之二。

    - `PD_S_TXQ_FULL` 和 `PD_S_RXQ_FULL` 指示发送缓冲区或接收缓冲区已完全满，无法接受更多数据。'
  raw: 'One of the complexities in implementing the `IOSerialDriverSync` interface
    is that it requires careful synchronization. The interface methods may be called
    from multiple threads at any time, meaning that the implementation needs to make
    sure that each method is correctly synchronized to prevent such situations as
    the `dequeueData()` method returning data once the serial port has been closed.
    To further complicate matters, several methods may block the calling thread until
    a particular event occurs; this is particularly true of the `watchState()` method,
    which doesn''t return until the serial port has entered a requested state. Both
    of these synchronization problems can be solved by using a mutex lock and a condition
    variable to signal changes in the serial port''s state.


    In the case of the `AppleUSBCDCDMM` driver, there is an even greater synchronization
    problem; the methods called through the `IOSerialDriverSync` interface need to
    be coordinated with callbacks that fire upon the completion of an asynchronous
    transfer over USB. This is necessary to prevent the completion callback for a
    USB write from placing data into a buffer at the same time that the `dequeueData()`
    method attempts to read out of that same buffer.


    Although this description paints the picture of a very difficult synchronization
    problem, the I/O Kit design offers a surprisingly elegant solution. All USB completion
    callbacks are run on the USB work loop, so to synchronize serial port methods
    with USB code, the `AppleUSBCDCDMM` driver ensures that all serial port methods
    are handled on the USB work loop. This is performed as follows:


    `bool AppleUSBCDCDMM::start(IOService *provider)`

    `{`

    `       …`

    `       // Get the USB work loop (superclass will use the provider class'' work
    loop)`

    `       fWorkLoop = getWorkLoop();`

    `       …`

    `       // Create a command gate and install it on the USB work loop`

    `       fCommandGate = IOCommandGate::commandGate(this);`

    `       fWorkLoop->addEventSource(fCommandGate);`

    `       …`

    `}`


    For each serial port method, the `AppleUSBCDCDMM` driver calls each method through
    the command gate, ensuring that it is synchronized to the USB work loop. This
    is shown below for the implementation of `releasePort()`:


    `IOReturn AppleUSBCDCDMM::releasePort(void *refCon)`

    `{`

    `       IOReturn       ret = kIOReturnSuccess;`


    `       // Call the static method releasePortAction() on the work loop, which
    requires no`

    `       // parameters`

    `       ret = fCommandGate->runAction(releasePortAction);`


    `       return ret;`

    `}`


    `IOReturn AppleUSBCDCDMM::releasePortAction(OSObject *owner, void *, void *, void
    *, void *)`

    `{`

    `       // Call through to the method releasePortGated()`

    `       return ((AppleUSBCDCDMM*)owner)->releasePortGated();`

    `}`


    `IOReturn AppleUSBCDCDMM::releasePortGated()`

    `{`

    `       …`

    `       // Implementation of releasePort`

    `       …`

    `}`


    The `IOCommandGate` also provides an object that a thread can sleep on and can
    be used to signal sleeping threads when an event occurs. As we will see, this
    provides a convenient means for implementing the serial port `watchState()` method.


    ### Serial Port State


    A central part of implementing the `IOSerialDriverSync` interface is managing
    the serial port''s state. The serial port state is a bitfield of 32-bits that
    is used to report events, such as the arrival of data on the serial port, as well
    as to save the overall state of the port, such as whether it has been opened by
    a user space process or not. Although there are methods that are directly involved
    in manipulating the state bitmask, ultimately every method that the serial port
    implements from `IOSerialDriverSync` will need to access the serial port''s state,
    even if for no other reason than to verify that the serial port has been opened
    before attempting to perform an operation.


    The state bits are defined in the header file `IOSerialStreamSync.h`. The meaning
    of each bit is described as follows:


    *   `PD_S_ACQUIRED` indicates that the serial port has been opened and is in use
    by a user space application. This state bit is never set or cleared through the
    `setState()` method but rather is set in the `acquirePort()` method and cleared
    in the `releasePort()` method.

    *   `PD_S_ACTIVE` is set immediately following the acquisition of the serial port
    and is cleared immediately before the serial port is released. This state bit
    is never set or cleared through the `setState()` method; instead, the bit is set
    or cleared through the `executeEvent()` method, which uses an event type of `PD_E_ACTIVE`
    to manipulate this state bit.

    *   `PD_S_TX_ENABLE` and `PD_S_RX_ENABLE` are set to indicate that the serial
    port''s transmit and receive interfaces are enabled. Most implementations, including
    the `AppleUSBCDCDMM` driver, set these bits when the serial port is opened and
    clear them when the serial port is closed, but otherwise make no other use of
    these state bits.

    *   `PD_S_TX_BUSY` and `PD_S_RX_BUSY` are set to indicate that the serial port
    driver is in the middle of sending data from its transmit buffer to the serial
    port hardware, or it is in the middle of reading data that has been sent over
    the serial port hardware into a driver buffer.

    *   `PD_S_TX_EVENT` and `PD_S_RX_EVENT` are two states that are used internally
    by the `IOSerialBSDClient` class to signal the beginning of a write or read operation.
    Although these state bits are unused by the serial driver, it needs to set the
    corresponding bit in `setState()` and allow a client to observe the bit through
    `watchState()` to ensure that the `IOSerialBSDClient` operates correctly.


    A number of bits describe the status of the serial driver''s transmit and receive
    buffers. The transmit buffer is used by the serial driver to hold bytes that it
    has been provided with through the `enqueueData()` method but that it has yet
    to send over the serial port hardware. The receive buffer holds bytes that the
    serial driver has read from the serial port hardware but has yet to pass on through
    the `dequeueData()` method. Following are descriptions of the serial driver buffer
    state bits:


    *   `PD_S_TXQ_EMPTY` and `PD_S_RXQ_EMPTY` indicate that the transmit buffer or
    receive buffer is empty and contains no bytes.

    *   `PD_S_TXQ_LOW_WATER` and `PD_S_RXQ_LOW_WATER` indicate that the number of
    bytes in the transmit buffer or receive buffer is below a “low water level.” The
    `AppleUSBCDCDMM` driver sets the low water level to be one-third of the size of
    the overall transmit buffer or receive buffer.

    *   `PD_S_TXQ_HIGH_WATER` and `PD_S_RXQ_HIGH_WATER` indicate that the number of
    bytes in the transmit buffer or receive buffer is above a “high water level.”
    The `AppleUSBCDCDMM` driver sets the high water level to be two-thirds of the
    size of the overall transmit buffer or receive buffer.

    *   `PD_S_TXQ_FULL` and `PD_S_RXQ_FULL` indicate that the transmit buffer or receive
    buffer is completely full and cannot accept any further data.'
  trans: "\n### 实现 `IOSerialDriverSync` 接口的同步问题\n\n实现 `IOSerialDriverSync` 接口的复杂性之一在于它需要细致的同步。该接口的方法可能在任何时候被多个线程调用，这意味着实现需要确保每个方法都正确同步，以防止出现诸如\
    \ `dequeueData()` 方法在串口已关闭后仍返回数据等情况。更复杂的是，有几个方法可能会阻塞调用线程，直到某个特定事件发生；`watchState()`\
    \ 方法尤其如此，它在串口进入请求状态之前不会返回。这两个同步问题都可以通过使用互斥锁和一个条件变量来通知串口状态的变化来解决。\n\n对于 `AppleUSBCDCDMM`\
    \ 驱动程序，存在一个更大的同步问题：通过 `IOSerialDriverSync` 接口调用的方法需要与 USB 异步传输完成时触发的回调进行协调。这是为了防止\
    \ USB 写入操作的完成回调在 `dequeueData()` 方法尝试从同一缓冲区读取数据的同时将数据放入该缓冲区。\n\n尽管上述描述描绘了一个非常困难的同步问题，但\
    \ I/O Kit 设计提供了一个令人惊讶的优雅解决方案。所有 USB 完成回调都在 USB 工作循环（work loop）上运行，因此为了同步串口方法与\
    \ USB 代码，`AppleUSBCDCDMM` 驱动程序确保所有串口方法都在 USB 工作循环上处理。其实现如下：\n\n```cpp\nbool AppleUSBCDCDMM::start(IOService\
    \ *provider)\n{\n       …\n       // Get the USB work loop (superclass will use\
    \ the provider class' work loop)\n       fWorkLoop = getWorkLoop();\n       …\n\
    \       // Create a command gate and install it on the USB work loop\n       fCommandGate\
    \ = IOCommandGate::commandGate(this);\n       fWorkLoop->addEventSource(fCommandGate);\n\
    \       …\n}\n```\n\n对于每个串口方法，`AppleUSBCDCDMM` 驱动程序都通过命令门（command gate）调用该方法，确保它与\
    \ USB 工作循环同步。下面展示了 `releasePort()` 的实现：\n\n```cpp\nIOReturn AppleUSBCDCDMM::releasePort(void\
    \ *refCon)\n{\n       IOReturn       ret = kIOReturnSuccess;\n\n       // Call\
    \ the static method releasePortAction() on the work loop, which requires no\n\
    \       // parameters\n       ret = fCommandGate->runAction(releasePortAction);\n\
    \n       return ret;\n}\n\nIOReturn AppleUSBCDCDMM::releasePortAction(OSObject\
    \ *owner, void *, void *, void *, void *)\n{\n       // Call through to the method\
    \ releasePortGated()\n       return ((AppleUSBCDCDMM*)owner)->releasePortGated();\n\
    }\n\nIOReturn AppleUSBCDCDMM::releasePortGated()\n{\n       …\n       // Implementation\
    \ of releasePort\n       …\n}\n```\n\n`IOCommandGate` 还提供了一个对象，线程可以在其上休眠，并且可以在事件发生时用来通知休眠的线程。正如我们将看到的，这提供了一种方便的方法来实现串口的\
    \ `watchState()` 方法。\n\n### 串口状态\n\n实现 `IOSerialDriverSync` 接口的核心部分是管理串口的状态。串口状态是一个\
    \ 32 位的位域，用于报告事件（例如串口上数据的到达），以及保存端口的整体状态（例如它是否已被用户空间进程打开）。尽管有一些方法直接参与操作状态位掩码，但最终串口从\
    \ `IOSerialDriverSync` 实现的每个方法都需要访问串口的状态，即使仅仅是为了在尝试执行操作之前验证串口是否已被打开。\n\n状态位定义在头文件\
    \ `IOSerialStreamSync.h` 中。每个位的含义描述如下：\n\n- `PD_S_ACQUIRED` 表示串口已被打开，并且正在被用户空间应用程序使用。此状态位从不通过\
    \ `setState()` 方法设置或清除，而是在 `acquirePort()` 方法中设置，并在 `releasePort()` 方法中清除。\n-\
    \ `PD_S_ACTIVE` 在获取串口后立即设置，并在释放串口前立即清除。此状态位从不通过 `setState()` 方法设置或清除；相反，该位通过 `executeEvent()`\
    \ 方法设置或清除，该方法使用事件类型 `PD_E_ACTIVE` 来操作此状态位。\n- `PD_S_TX_ENABLE` 和 `PD_S_RX_ENABLE`\
    \ 被设置以指示串口的发送和接收接口已启用。大多数实现（包括 `AppleUSBCDCDMM` 驱动程序）在串口打开时设置这些位，在串口关闭时清除它们，但除此之外不对这些状态位做其他使用。\n\
    - `PD_S_TX_BUSY` 和 `PD_S_RX_BUSY` 被设置以指示串口驱动程序正在将其发送缓冲区中的数据发送到串口硬件，或者正在将已通过串口硬件发送的数据读入驱动程序缓冲区。\n\
    - `PD_S_TX_EVENT` 和 `PD_S_RX_EVENT` 是 `IOSerialBSDClient` 类内部使用的两个状态，用于通知写或读操作的开始。尽管串口驱动程序未使用这些状态位，但它需要在\
    \ `setState()` 中设置相应的位，并允许客户端通过 `watchState()` 观察该位，以确保 `IOSerialBSDClient` 正确运行。\n\
    \n许多位描述了串口驱动程序的发送和接收缓冲区的状态。发送缓冲区由串口驱动程序用于保存通过 `enqueueData()` 方法提供给它的、但尚未通过串口硬件发送的字节。接收缓冲区保存串口驱动程序已从串口硬件读取但尚未通过\
    \ `dequeueData()` 方法传递的字节。以下是串口驱动程序缓冲区状态位的描述：\n\n- `PD_S_TXQ_EMPTY` 和 `PD_S_RXQ_EMPTY`\
    \ 指示发送缓冲区或接收缓冲区为空，不包含任何字节。\n- `PD_S_TXQ_LOW_WATER` 和 `PD_S_RXQ_LOW_WATER` 指示发送缓冲区或接收缓冲区中的字节数低于“低水位线”。`AppleUSBCDCDMM`\
    \ 驱动程序将低水位线设置为整个发送缓冲区或接收缓冲区大小的三分之一。\n- `PD_S_TXQ_HIGH_WATER` 和 `PD_S_RXQ_HIGH_WATER`\
    \ 指示发送缓冲区或接收缓冲区中的字节数高于“高水位线”。`AppleUSBCDCDMM` 驱动程序将高水位线设置为整个发送缓冲区或接收缓冲区大小的三分之二。\n\
    - `PD_S_TXQ_FULL` 和 `PD_S_RXQ_FULL` 指示发送缓冲区或接收缓冲区已完全满，无法接受更多数据。\n"
- fmt: "头文件`IORS232SerialStreamSync.h`定义了标准RS-232信号的状态位。例如，为诸如清除发送（`PD_RS232_S_CTS`）和数据终端就绪（`PD_RS232_S_DTR`）等信号提供了定义。软件流控制（通过传输特殊的XON和XOFF字符实现）的状态由状态位`PD_RS232_S_TXO`和`PD_RS232_S_RXO`指示。\n\
    \n串行端口驱动程序维护一个32位整数，该整数包含描述串行端口当前状态的状态位掩码。串行驱动程序必须实现以下三个方法，以允许操作串行端口状态：`getState()`、`setState()`和`watchState()`。除了在`IOSerialBSDClient`类需要访问串行端口状态时被调用外，这三个方法还在串行端口类的许多其他方法的实现中被调用。\n\
    \n例如，用于打开串行端口以进行独占访问的串口方法`acquirePort()`，以及用于关闭串行端口的`releasePort()`，都是通过设置状态位`PD_S_ACQUIRED`来实现的。`acquirePort()`方法的一个可能实现如[代码清单11-3](#Chapter11.html#list_11_3)所示。该示例使用`setState()`来设置`PD_S_ACQUIRED`位。如果串行端口已经被占用，并且调用方请求该方法应阻塞直到串行端口变为空闲，则该实现会调用`watchState()`来等待，直到`PD_S_ACQUIRED`状态位被清除。\n\
    \n***代码清单11-3*** `acquirePort()`方法的示例实现。假设该方法是通过`IOCommandGate`调用的。\n\n```\nIOReturn\
    \       MySerialDriver::acquirePortGated (bool sleep, void* refCon)\n{\n     \
    \  UInt32      state;\n       IOReturn    rtn;\n\n       // If the serial port\
    \ is already acquired, wait until it is released\n       while (m_currentState\
    \ & PD_S_ACQUIRED)\n       {\n              // Abort if the caller has requested\
    \ non-blocking operation\n              if (sleep == false)\n                \
    \     return kIOReturnExclusiveAccess;\n\n              // Sleep until the acquired\
    \ bit becomes clear\n              state = 0;\n              rtn = watchState(&state,\
    \ PD_S_ACQUIRED, refCon);\n              if (rtn != kIOReturnSuccess)\n      \
    \               return rtn;\n       }\n\n       // Set the acquired bit and clear\
    \ all other state bits\n       setState(PD_S_ACQUIRED, 0xFFFFFFFF, refCon);\n\n\
    \       // Serial port has been acquired, perform further initialization\n   \
    \    ...\n\n       return kIOReturnSuccess;\n}\n```\n\n`releasePort()`方法的一个可能实现如[代码清单11-4](#Chapter11.html#list_11_4)所示，该方法使用`setState()`来清除`PD_S_ACQUIRED`状态。\n\
    \n***代码清单11-4*** `releasePort()`方法的示例实现。假设该方法是通过`IOCommandGate`调用的。\n\n```\nIOReturn\
    \       MySerialDriver::releasePortGated (void* refCon)\n{\n       // Return an\
    \ error if trying to release a port that hasn't been acquired\n       if ((m_currentState\
    \ & PD_S_ACQUIRED) == 0)\n              return kIOReturnNotOpen;\n\n       //\
    \ Clear the entire state word, which also deactivates the port\n       setState(0,\
    \ 0xFFFFFFFF, refCon);\n\n       return kIOReturnSuccess;\n}\n```\n\n通常，`IOSerialBSDClient`类，甚至串行端口驱动程序本身，需要阻塞当前线程，直到某个特定状态变为活动或非活动。串行驱动程序通过名为`watchState()`的方法提供此功能。调用方希望观察的事件由两个参数描述。`mask`参数包含了调用方希望观察的状态位的位掩码。`state`参数描述了调用方希望观察的每个状态位的对应值。例如，如果一个位在`mask`中被设置，但未在`state`中被设置，则调用方对该状态变为非活动感兴趣。如果一个位在`mask`中被设置，并且也在`state`中被设置，则调用方对该状态变为活动感兴趣。\n\
    \n一旦任何被观察的状态位与串行端口的当前状态匹配，`watchState()`方法就会返回。返回时，串行端口的当前状态会通过`state`参数返回给调用方。如果在线程因`watchState()`阻塞期间串行端口被关闭，则休眠将被中止，该方法将失败并向调用方返回一个错误码，例如`kIOReturnNotOpen`。以下代码给出了如何使用`watchState()`的示例；此代码将阻塞，直到驱动程序的发送缓冲区变空（`PD_S_TXQ_EMPTY`被设置）或硬件完成对串行端口硬件的写入（`PD_S_TX_BUSY`被清除）：\n\
    \n```\nUInt32       state;\nIOReturn     rtn;\n\nstate = PD_S_TXQ_EMPTY;\nrtn\
    \ = watchState(&state, PD_S_TXQ_EMPTY | PD_S_TX_BUSY, refCon);\nif (rtn != kIOReturnSuccess)\n\
    \       handle error;\n```\n\n`watchState()`方法的实现与`setState()`方法的实现密切相关。除了在串行端口状态字中设置位之外，`setState()`方法还负责唤醒所有正在等待设置特定状态的线程。在第[7章](#Chapter07.html#ch7)中，我们介绍了条件变量，并了解了一个线程如何在一个条件变量上休眠并保持阻塞状态，直到另一个线程发送信号给该条件变量以指示某个事件已发生。这提供了一种机制，串行端口驱动程序可以使用该机制在`watchState()`方法中挂起一个线程，并在观察到的状态发生变化时从`setState()`方法中向它发送信号。\n\
    \n当调用`setState()`方法时，串行驱动程序会更新维护当前串行端口状态的变量，然后向所有在`watchState()`方法中被阻塞的线程发送信号，允许它们测试它们正在等待的状态是否已变为活动。作为一种优化，而不是针对串行端口状态的每一次更改都唤醒被`watchState()`阻塞的线程，`AppleUSBCDCDMM`驱动程序维护所有正在被当前所有`watchState()`调用等待的状态位的并集，并且仅当被监视的状态位的值发生变化时才解除线程阻塞。\n\
    \n`setState()`和`watchState()`方法的示例实现如[代码清单11-5](#Chapter11.html#list_11_5)所示。\n\
    \n***代码清单11-5*** `setState()`和`watchState()`方法的示例实现。假设这些方法是通过`IOCommandGate`调用的。\n\
    \n```\nIOReturn       MySerialDriver::setStateGated(UInt32 state, UInt32 mask,\
    \ void* refCon)\n{\n       UInt32   newState;\n       UInt32   deltaState;\n\n\
    \        // Verify that the serial port has been acquired or is being acquired\
    \ by this call\n       if ((m_currentState & PD_S_ACQUIRED) || (state & PD_S_ACQUIRED))\n\
    \       {\n              // Compute the new state\n              newState = (m_currentState\
    \ & ~mask) | (state & mask);\n              // Determine the mask of changed state\
    \ bits\n              deltaState = newState ^ m_currentState;\n              //\
    \ Set the new state\n              m_currentState = newState;\n```"
  raw: 'The header file `IORS232SerialStreamSync.h` defines status bits for the standard
    RS-232 signals. For example, definitions are provided for signals such as Clear
    To Send (`PD_RS232_S_CTS`) and Data Terminal Ready (`PD_RS232_S_DTR`). The state
    of software flow control, which uses the transmission of special XON and XOFF
    characters, is indicated through state bits `PD_RS232_S_TXO` and `PD_RS232_S_RXO`.


    A serial port driver maintains a 32-bit integer that holds a bitmask of the state
    bits that describe the current state of the serial port. A serial driver must
    implement the following three methods to allow the serial port state to be manipulated:
    `getState()`, `setState(),` and `watchState()`. As well as being called by the
    `IOSerialBSDClient` class when it requires access to the state of the serial port,
    these three methods are called in the implementation of many other methods in
    the serial port class.


    For example, the serial port method `acquirePort()`, which is called to open a
    serial port for exclusive access, and `releasePort()`, which is called to close
    the serial port, do so by setting the state bit `PD_S_ACQUIRED`. A possible implementation
    of the `acquirePort()` method is shown in [Listing 11-3](#Chapter11.html#list_11_3).
    This sample uses `setState()` to set the `PD_S_ACQUIRED` bit. If the serial port
    has already been acquired and the caller has requested that the method should
    block until the serial port becomes free, the implementation calls `watchState()`
    to wait until the `PD_S_ACQUIRED` state bit has been cleared.


    ***Listing 11-3.** A Sample Implementation of the `acquirePort()` Method. The
    Method Is Assumed to Have Been Called Through an `IOCommandGate`.*


    `IOReturn       MySerialDriver::acquirePortGated (bool sleep, void* refCon)`

    `{`

    `       UInt32      state;`

    `       IOReturn    rtn;`


    `       // If the serial port is already acquired, wait until it is released`

    `       while (m_currentState & PD_S_ACQUIRED)`

    `       {`

    `              // Abort if the caller has requested non-blocking operation`

    `              if (sleep == false)`

    `                     return kIOReturnExclusiveAccess;`


    `              // Sleep until the acquired bit becomes clear`

    `              state = 0;`

    `              rtn = watchState(&state, PD_S_ACQUIRED, refCon);`

    `              if (rtn != kIOReturnSuccess)`

    `                     return rtn;`

    `       }`


    `       // Set the acquired bit and clear all other state bits`

    `       setState(PD_S_ACQUIRED, 0xFFFFFFFF, refCon);`


    `       // Serial port has been acquired, perform further initialization`

    `       ...`


    `       return kIOReturnSuccess;`

    `}`


    A possible implementation of the `releasePort()` method, which uses `setState()`
    to clear the `PD_S_ACQUIRED` state is given in [Listing 11-4](#Chapter11.html#list_11_4).


    ***Listing 11-4.** A Sample Implementation of the `releasePort()` Method. The
    Method Is Assumed to Have Been Called Through an `IOCommandGate`.*


