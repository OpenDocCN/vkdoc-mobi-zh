  trans: '

    ### I/O Kit 中的网络功能


    `IONetworkingFamily` 类族代表了内核网络栈的底层部分。如前所述，I/O Kit 是用于实现基于硬件的网络设备驱动程序的首选层。`IONetworkingFamily`
    的类层次结构如图 13-4 所示。


    ![images](img/1304.jpg)


    ***图 13-4.** `IONetworkingFamily` 类层次结构*


    该家族看起来可能相当庞大，但许多类都是辅助性的帮助类，有些我们甚至完全无需关心，因为它们仅在该家族内部使用。该家族中的关键类是 `IONetworkController`
    和 `IONetworkInterface`。前者用于表示网络硬件的驱动程序，而后者则用于与 BSD 层中的数据链路接口层 (DLIL) 对接。它作为一个适配器，使
    I/O Kit 的网络接口能够被视作 BSD 层的网络接口，这样你就可以使用传统的 UNIX 工具（如 `ifconfig`）来配置设备。接下来，让我们看看各个类的职责：


    *   `IOEthernetController` 是所有基于以太网的设备（包括基于 802.11 的无线设备）的基类。在编写以太网或 Wi-Fi 设备的驱动程序时，你通常需要继承此类。

    *   `IOEthernetInterface` 作为 `IOEthernetController` 的客户端，提供了控制器与 BSD 网络层之间的粘合层。如果你正在实现一个以太网驱动程序，除非有特殊需求，否则通常无需继承
    `IOEthernetInterface`。

    *   `IOKernelDebugger` 是一个替代驱动程序。当内核调试器激活时，它将替代 `IONetworkInterface` 与 `IONetworkController`
    配合使用。如果你正在编写第三方网络驱动程序，则无需支持此类。

    *   `IOMbufMemoryCursor` 围绕 `mbuf` 结构提供了一个面向对象的游标，允许将 `mbuf` 簇转换为物理地址，以供 DMA 使用。有几个专门的子类可用：`IOMBufBigMemoryCursor`、`IOMbufDBMAMemoryCursor`、`IOMbufLittleMemoryCursor`、`IOMbufNaturalMemoryCursor`。

    *   `IONetworkController` 是 `IOEthernetController` 的基类。如果你正在为不兼容以太网的设备编写驱动程序，则必须继承
    `IONetworkController`。

    *   `IONetworkData` 代表一个固定大小的数据缓冲区，由 `IONetworkInterface` 用于导出接口数据到用户空间，尤其是使用统计信息，例如关于丢包和冲突的信息。

    *   `IONetworkInterface` 提供了将 `IONetworkController` 绑定到 BSD 数据链路层 (BDIL) 以及网络栈其余部分的粘合层。`IONetworkInterface`
    是一个抽象类，如果你的驱动程序基于 `IONetworkInterface`，则必须重新实现它。

    *   `IONetworkUserClient` 是 `IOUserClient` 的子类，为 `IONetworkInterface` 提供了一个用户客户端。

    *   `IOOutputQueue` 是一个数据包队列，处理多个生产者和一个消费者（设备）。有两个专门的子类可用：`IOBasicOutputQueue`
    和 `IOGatedOutputQueue`。

    *   `IOPacketQueue` 实现了一个由自旋锁同步的 `mbuf` FIFO 队列。


    你可能已经注意到，这里完全没有提及对 802.11x 网络的支持。Apple 并未发布用于开发无线网络驱动程序的框架。Apple 自家的 AirPort 驱动程序位于
    `IO802Family.kext` 中，但并未发布其源代码或头文件。这并不妨碍你编写无线网络驱动程序，但这意味着你无法利用预先编写好的类，并且可能需要提供你自己的
    `IOUserClient` 以及可能的用户空间工具来配置设备。Apple 的 AirPort 设备是私有 `IO80211Controller` 的子类，而
    `IO80211Controller` 本身又是 `IOEthernetController` 的子类。话虽如此，所有现代 Mac 都内置了无线网络功能，因此对此领域第三方设备的需求较低。


    ### 构建一个简单的以太网控制器驱动程序


    让我们通过构建一个简单的以太网驱动程序来亲身体验 I/O Kit 的网络功能。由于实现一个完整可用的驱动程序非常复杂且依赖于硬件，因此很难完整演示，对于那些要为完全不同的设备实现驱动程序的人来说，也可能没什么用。我们将转而专注于基础知识，并熟悉
    I/O Kit 提供的用于帮助开发网络驱动程序的工具。我们将通过实现一个名为 `MyEthernetDriver` 的虚拟以太网驱动程序来做到这一点。该驱动程序将演示
    I/O Kit 网络驱动程序的核心元素是如何实现的，并展示数据包如何流经它以与系统的其余部分交互。图 13-5 展示了 `MyEthernetDriver`
    如何与其他 I/O Kit 类交互。


    ![images](img/1305.jpg)


    ***图 13-5.** `MyEthernetDriver`：与 I/O Kit 和网络栈的交互*


    在本例中，`MyEthernetDriver` 使用 `IOResources` 节点作为提供者，但对于由物理设备支持的真实网络设备，它更可能使用 `IOPCIDevice`、`IOUSBDevice`、`IOUSBInterface`
    或另一个代表硬件设备的节点。


    ![images](img/square.jpg) **提示**  如果你好奇想看看真实设备的网络驱动程序，`IOUSBFamily` 源代码发行版中曾包含
    `AppleUSBCDCEthernet` 的源代码，这是用于遵循 USB 以太网规范设备的驱动程序。该驱动程序不属于新版本，但仍然可以在 Apple 开源网站
    (`opensource.apple.com`) 上找到的旧版 `IOUSBFamily` 中获取。还有一种基于流行 PCI 总线的 Realtek 8139
    芯片组的驱动程序源代码可用，名为 `AppleRTL8139Ethernet`。对于直接派生自 `IONetworkController` 的网络驱动程序示例，可以查看
    `IOFireWireIP`，它实现了通过 FireWire 的 TCP/IP 网络功能。


    主驱动类 `MyEthernetDriver` 将继承自 `IOEthernetController`，而 `IOEthernetController` 又继承自
    `IONetworkController`。驱动程序还将分配一个 `IOEthernetInterface` 实例，用于与网络栈对接。`IOEthernetInterface`
    类不是抽象的，可以直接分配和使用。

