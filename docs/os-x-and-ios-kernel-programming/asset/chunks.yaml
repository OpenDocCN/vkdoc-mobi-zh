    \ method for input streams.\n\nWe will discuss the preceding steps in more detail\
    \ in the following sections by examining the implementation of the `MyAudioDevice`\
    \ example driver.\n\nAn `IOAudioEngine` subclass is started and stopped directly\
    \ by Core Audio through the `IOAudioEngineUserClient`. Once started, the engine\
    \ will continuously run through the sample buffer. The `IOAudioEngine` subclass\
