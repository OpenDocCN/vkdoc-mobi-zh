- fmt: "# The Design of MyEthernetDriver\n\nTo put the design of `MyEthernetDriver`\
    \ into context, let's say we are employed to develop a driver for a new Ethernet\
    \ device. The device will be a dongle that can be connected to a Mac's Thunderbolt\
    \ port. As this is an emerging technology at this point, there is some delay in\
    \ getting the needed parts, so we do not yet have access to a proper device. As\
    \ much as we would all like to get paid to surf the net all day, we need to earn\
    \ our bread and butter. So we get started on the driver without a working device.\
    \ Our aim is to implement what can be done without having a hardware device. However,\
    \ we quickly realize that a major component of the Ethernet device is going to\
    \ be handling actual network I/O. While you can build a virtual device driver\
    \ quite quickly, assign it an IP, and start talking to it, there is one major\
    \ problem. Network packets destined to another interface or itself on the same\
    \ host will not actually be forwarded to the device at all, but instead loop through\
    \ the protocol stack without involving the I/O Kit driver. The I/O Kit was designed\
    \ specifically to interface with actual hardware devices, so if you need a virtual\
    \ network interface, the BSD layer is the best place for it.\n\nOur solution to\
    \ this problem will be to piggyback our virtual Ethernet device onto a real Ethernet\
    \ interface and use it to send and receive packets on our behalf. The setup will\
    \ look similar to the diagram in [Figure 13-6](#Chapter13.html#fig_13_6).\n\n\
    ![images](images/1306.jpg)\n\n**Figure 13-6.** MyEthernetDriver test setup\n\n\
    When `MyEthernetDriver` receives a packet from the network stack, it will queue\
    \ the packet and then transmit the packet out on the network using the interface\
    \ `en0`, which is attached to a physical network switch. If you do not have a\
    \ network switch, you can test this by using a straight through cat5 cable to\
    \ connect directly to a remote machine. Each interface in the test setup is configured\
    \ with its own IP address all on the same subnet. The network stack is responsible\
    \ for framing the packet, so by the time `MyEthernetDriver` receives it, it will\
    \ already have an Ethernet frame header attached, where the destination address\
    \ will be `00:17:f2:0a:86:60` and the arbitrarily picked source address `be:ef:fe:ed:12:11`\
    \ of `MyEthernetDriver`. Most Ethernet based network devices allow sending a packet\
    \ with a (fake) source address that differs from its own. Therefore, if everything\
    \ is correctly configured, we should be able to receive the packet on the remote\
    \ host received from `MyEthernetDriver`'s MAC and IP address.\n\nGetting the reply\
    \ from the remote host back to our driver is somewhat more problematic, as the\
    \ `en0` interface will most likely ignore a frame not addressed to itself. To\
    \ work around this, we will simply enable promiscuous mode on `en0`, which will\
    \ enable it to receive packets not destined to itself. We will then install an\
    \ interface filter on the input queue for `en0` and check whether a packet is\
    \ addressed to it, in which case, we leave it alone, or if it is addressed to\
    \ `MyEthernetDriver`, steal it and divert it to its input queue instead. The end\
    \ result is a virtual Ethernet bridge/switch. This is conceptually close to how\
    \ virtual machine software, such as Parallels or VMWare fusion, enables a virtual\
    \ machine guest's operating system to participate on the network in bridged mode.\
    \ Because we have done this at the Ethernet level, the changes are completely\
    \ transparent to higher-level protocols like IP, and we can even use an external\
    \ DHCP server to obtain an IP address for our virtual interface.\n\nThis should\
    \ leave us with a more or less working device driver, which, for all intents and\
    \ purposes, is able to send and receive actual network traffic and provide a good\
    \ approximation of a real device for us to play with. As much as possible, we\
    \ will hide the fact that this bridging occurs from the driver by putting the\
    \ code in a separate class called `MyEthernetHwAbstraction`. The class will handle\
    \ communication with the “hardware” while the main driver will interface with\
    \ I/O Kit. This design would allow us to quickly swap out the hardware abstraction\
    \ class with one that talks to actual hardware instead. The design would also\
    \ make it possible to subclass the abstraction class so that new variants of the\
    \ hardware can be supported gracefully.\n\n![Image](images/square.jpg) **Note**  `MyEthernetDriver`\
    \ needs a wired Ethernet device to piggyback onto. This is because a wireless\
    \ device generally does not allow packets to be transmitted with a source address\
    \ different from its own. This is a limitation of the device's firmware.\n\nThe\
    \ header file for `MyEthernetDriver` is shown in [Listing 13-6](#Chapter13.html#list_13_6).\n\
    \n**Listing 13-6.** MyEthernetDriver Header File\n\n```\n#ifndef MyEthernetDriver_h\n\
    #define MyEthernetDriver_h\n\n#include <IOKit/assert.h>\n#include <IOKit/IOTimerEventSource.h>\n\
    #include <IOKit/IOBufferMemoryDescriptor.h>\n#include <IOKit/network/IOEthernetController.h>\n\
    #include <IOKit/network/IOEthernetInterface.h>\n#include <IOKit/network/IOGatedOutputQueue.h>\n\
    #include <IOKit/network/IOMbufMemoryCursor.h>\n#include <IOKit/network/IONetworkMedium.h>\n\
    #include <IOKit/IOUserClient.h>\n\n#include \"MyEthernetHwAbstraction.h\"\n\n\
    class com_osxkernel_MyEthernetDriver : public IOEthernetController\n{\n    friend\
    \ class com_osxkernel_MyEthernetHwAbstraction;\n\n    OSDeclareDefaultStructors(com_osxkernel_MyEthernetDriver);\n\
    public:\n    virtual bool init(OSDictionary* properties);\n    virtual bool start(IOService*\
    \ provider);\n    virtual void stop(IOService* provider);\n    virtual void free();\n\
    \n    virtual bool configureInterface(IONetworkInterface* netif);\n\n    virtual\
    \ IOReturn enable(IONetworkInterface* netif);\n    virtual IOReturn disable(IONetworkInterface*\
    \ netif);\n\n    virtual IOReturn getHardwareAddress(IOEthernetAddress* addrP);\n\
    \n    // Allow our driver's Mac address to be set\n    virtual IOReturn setHardwareAddress(const\
    \ IOEthernetAddress* addrP);\n\n    virtual UInt32 outputPacket(mbuf_t m, void*\
    \ param);\n\n    virtual IOReturn setPromiscuousMode(bool active) { return kIOReturnSuccess;\
    \ }\n    virtual IOReturn setMulticastMode(bool active) { return kIOReturnSuccess;\
    \ }\n\n    bool createMediumDict();\n\nprivate:    \n\n    static void  interruptOccured(OSObject*\
    \ owner, IOTimerEventSource* sender);\n\n    IOTimerEventSource*    fInterruptSource;\
    \  // Simulate HW rx interrupt\n    IOEthernetInterface*   fNetworkInterface;\n\
    \    OSDictionary*          fMediumDict;\n    IOWorkLoop*            fWorkLoop;\n\
    \n    IONetworkStats*        fNetworkStats;\n    IOEthernetStats*       fEthernetStats;\n\
    \n    com_osxkernel_MyEthernetHwAbstraction* fHWAbstraction; // Low-level hardware\
    \ access.\n};\n\n#endif\n```"
