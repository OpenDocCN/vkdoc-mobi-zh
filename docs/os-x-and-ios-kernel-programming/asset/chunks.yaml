    {\n     uint8_t*           destinationBuffer = (uint8_t*)refcon;\n     IOUSBIsocFrame*\
    \    frameList = (IOUSBIsocFrame*)arg0;\n\n     // 如果读取成功完成，处理从设备读取的任何数据。\n  \
    \   if (result == kIOReturnSuccess)\n     {\n         for (int i = 0; i < framesPerRequest;\
    \ i++)\n         {\n              if (frameList[i].frStatus == kIOReturnSuccess)\n\
    \              {\n                UInt16          bytesRead;\n\n             \
    \   // 处理在此帧上读取的数据\n                bytesRead = frameList[i].frActCount;\n   \
    \             ProcessReadData(destinationBuffer, bytesRead);\n              }\n\
    \n              // 计算下一帧数据的起始地址\n              destinationBuffer += frameList[i].frReqCount;\n\
    \         }\n     }\n\n     // 释放在 MyScheduleIsocRead 中分配的帧列表。\n     free(frameList);\n\
    }\n```\n\n### 低延迟等时传输\n\n等时端点通常用于传输多媒体数据，例如持续传输到 USB 设备或从 USB 设备流式传输的音频或视频。处理这些数据的应用程序通常希望以最小的延迟来完成；例如，一个应用程序可能希望在麦克风数据被\
    \ USB 设备接收后立即开始处理。先前描述的等时方法的一个问题是，应用程序必须等待完成回调函数被通知后，才能开始处理读取的数据。如果一个应用程序发起一个跨越\
    \ 10 毫秒 USB 帧的等时请求，这意味着从请求开始到应用程序能够处理从设备读取的数据，至少存在 10 毫秒的延迟。\n\n作为解决方案，`IOUSBInterfaceInterface`\
    \ 类包含低延迟等时传输方法，这些方法允许应用程序在数据被设备接收后立即访问，即使整个等时请求尚未完成。为此，I/O Kit 会在等时事务进行中更新帧列表的值；在传输期间，`frStatus`\
    \ 和 `frActCount` 的值会被写入并可供应用程序读取。应用程序无需等待完成回调触发，而是可以定期检查其帧列表的值，并确定何时有新的数据可供处理。例如，这可以在用户空间应用程序的实时线程中完成。\n\
    \n应用程序通过指定更新间隔（0–8 毫秒之间的值），来确定 I/O Kit 在操作进行中更新帧列表的频率。例如，更新频率为 1 意味着在传输过程中，I/O\
    \ Kit 将每毫秒更新一次应用程序的帧列表。值为 0 意味着 I/O Kit 将在传输结束时才更新帧列表，尽管在事务完成后、应用程序收到完成回调之前，更新后的帧列表即可供应用程序使用。\n\
    \n要使用低延迟等时传输，用于帧列表数组以及保存传输源或目标数据的缓冲区必须使用 `IOUSBInterfaceInterface` 类提供的方法进行分配。这使得\
    \ I/O Kit 能够确保缓冲区同时对内核（在传输期间更新缓冲区）和应用程序（在传输期间读取结果）可用。\n\n请注意，低延迟方法不使用 `IOUSBIsocFrame`\
    \ 结构来描述 USB 帧的传输，而是使用 `IOUSBLowLatencyIsocFrame` 结构。该结构包含一个额外字段 `frTimeStamp`，用于保存\
    \ I/O Kit 更新该结构值的时间。\n\n以下方法可用于低延迟等时传输：\n\n- `LowLatencyCreateBuffer`：分配一个缓冲区，用于保存低延迟等时写入的源数据、低延迟等时读取的目标数据，或描述等时传输的\
    \ `IOUSBLowLatencyIsocFrame` 元素数组。必须通过提供以下枚举值之一来指定应用程序对该缓冲区的意图：`kUSBLowLatencyWriteBuffer`、`kUSBLowLatencyReadBuffer`\
    \ 或 `kUSBLowLatencyFrameListBuffer`。\n- `LowLatencyDestroyBuffer`：释放先前由 `LowLatencyCreateBuffer`\
    \ 方法分配的缓冲区。\n- `LowLatencyReadIsochPipeAsync`：从 USB 设备上的等时端点执行读取操作。此方法的参数在 `ReadIsochPipeAsync`\
    \ 方法的基础上进行了扩展，新增了一个名为 `updateFrequency` 的参数，用于指定 I/O Kit 在传输期间更新帧列表的频率（以毫秒为单位）。`IOUSBLowLatencyIsocFrame`\
    \ 数组和目标缓冲区都必须由 `LowLatencyCreateBuffer` 方法分配。\n- `LowLatencyWriteIsochPipeAsync`：向\
    \ USB 设备上的等时端点执行写入操作。此方法的参数在 `WriteIsochPipeAsync` 方法的基础上进行了扩展，新增了一个名为 `updateFrequency`\
    \ 的参数，用于指定 I/O Kit 在传输期间更新帧列表的频率（以毫秒为单位）。`IOUSBLowLatencyIsocFrame` 数组和源缓冲区都必须由\
    \ `LowLatencyCreateBuffer` 方法分配。\n"
- fmt: '### Summary


    - For certain types of devices, including USB devices, the I/O Kit makes it possible
    to forgo a kernel driver and implement the driver completely in user space. For
    the end user, this provides a much better experience.

    - Not all USB devices are suitable for a user-space driver. A device that needs
    to be used by the system itself, such as a system-wide audio device or a USB storage
    device, must be implemented in the kernel.

    - The I/O Kit provides a user-space library known as `IOUSBLib` that an application
    uses to interact with a USB device. The `IOUSBLib` provides a user-space equivalent
    to the `IOUSBDevice` and `IOUSBInterface` kernel classes, known as `IOUSBDeviceInterface`
    and `IOUSBInterfaceInterface`, respectively.

    - An application can watch for the arrival and removal of the USB devices it supports
    by creating a matching dictionary and installing a notification callback, as described
    in [Chapter 5](#Chapter05.html#ch5). Once an application has been notified that
    a USB device or a USB interface it is interested in has been attached to the computer,
    it can instantiate an `IOUSBDeviceInterface` or `IOUSBInterfaceInterface` object
    to provide access to the USB hardware.

    - The `IOUSBLib` provides full support for the functionality of a USB device to
    a user-space driver. All endpoint types are supported in user space, including
    control, bulk, interrupt, and isochronous transfers.

    - An application can perform either synchronous or asynchronous operations with
    `IOUSBLib`. A callback is used to notify the application of the completion of
    an asynchronous request.


    ## C H A P T E R  16


    ## Debugging


    Debugging is part of the development process and the ongoing maintenance of a
    kernel level driver or extension. Therefore, having the skills and knowledge to
    debug the kernel effectively is an important part of a kernel engineer’s job description.
    Although great care is taken during the development and quality assurance process,
    bugs are often unavoidable. This is partly because, once released, your driver
    is likely to run against hardware/software combinations that haven’t been as well
    tested, if at all. For example, your driver may run on a faster or slower CPU
    than was tested initially, thus uncovering timing issues.


    Many regard kernel debugging as a black art, and with good reason. When an application
    crashes, it can be dumped into the debugger and it then is often possible to pinpoint
    the exact code line that caused the problem. In the kernel, things are not that
    easy; although debugging with the GNU Debugger (GDB) is possible, it requires
    some setup and often two computers. Furthermore, crashes in the kernel can often
    manifest themselves in completely unrelated parts of your extension, making it
    hard to prove if your driver was involved. You may be lucky enough to extract
    information or attach a debugger after a crash; however, the memory may be corrupted
    and the values of data structures or the call stack may not be trustworthy.


    If you are writing drivers for hardware devices, things may be even more complicated
    as malfunctioning devices (more common if using a prototype device) may also corrupt
    memory or cause the computer to lock up or crash. This sometimes makes it difficult
    to determine if it’s a hardware or software problem.


    In this chapter, we will look at various techniques and strategies to help debug
    common problems.


    ### Common Types of Problems


    There are many reasons why the kernel may crash or why other problems may happen.
    However, they are usually variations on common errors and once you know what class
    of problem you are dealing with, it makes it a lot easier to start examining your
    code for problems. Let’s have a broad look at some of the problems you may encounter
    during kernel development.


    - **Race Conditions:** A general class of bugs used to describe a problem where
    multiple threads of execution conflict with each other and the outcome depends
    on which thread gets there first. Race conditions are quite common and are often
    due to poor design or poor locking in multi-threaded environments. They can sometimes
    be tricky to reproduce and may be hiding a long time before discovery. Things
    go wrong when a particular sequence of events happen in a specific order, for
    example, because it is dependent on user input.

    - **Deadlocks:** Happen when locking is poorly implemented and when one thread
    is waiting on an event or lock that will never happen, possibly because a second
    thread failed to release the lock after use. Once this happens, the condition
    can spread to new threads in the system also needing the lock. From a user’s point
    of view, it can look like their application hangs and they may be unable to force
    quitting it because it is stuck waiting for an event in the kernel.

    - **Lock Contention:** A performance problem, which happens when many threads
    need the same lock and spend excessive time waiting for the lock rather than doing
    anything useful. Lock contention is usually the result of poor design and can
    be prevented by implementing a proper locking scheme. The general rule is to lock
    access to data and not to code. Having large blocks of code protected may seem
    easier than fine-grained locking of shared data only; however, it will decrease
    performance and make it more likely for deadlocks to occur.

    - **Access to Invalid Memory:** The most common cause for kernel panics. Unlike
    user space programs, which are aborted, the kernel simply panics if the CPU causes
    an invalid memory exception. If a debugger is enabled, the kernel will dump into
    the debugger instead of showing the grey screen of death on Mac OS X or rebooting,
    which is the behavior under iOS. Buffer overruns will sometimes cause an invalid
    memory exception, unless the buffer happens to be followed by valid memory, in
    which case silent memory corruption may occur.

    - **Memory and Resource Leaks:** Can happen, for example, if a driver unloads
    and resources such as objects and buffers were not properly disposed of. It can
    also be that an extension allocates some memory each time it receives a request,
    but fails to free the memory after it is finished. The kernel has no garbage collection
    capabilities, so leaks can accumulate over time and cause a kernel panic.

    - **Illegal Instruction/Operand:** These exceptions are issued by the CPU if it
    detects an invalid instruction or an invalid argument to an instruction. This
    can happen as the result of memory corruption or a poorly written driver that
    attempts to use features not present on the CPU, for example, using the SSE3 instruction
    set on machines that do not support it. You could also see this exception as a
    result of memory corruption.

    - **Blocking in Primary Interrupt Context:** Results in a panic, as you cannot
    block during primary interrupt context. Blocking requires a scheduled thread,
    as blocking is implemented by putting the thread to sleep voluntarily. In this
    case the thread’s state is saved and later restored when the scheduler determines
    it is time to run that thread again. A primary interrupt handler cannot be resumed;
    it must run to completion without being interrupted. Many kernel APIs may block
    under certain circumstances. For example, memory allocation may block if the system
    is low on memory, which will result in some memory being paged out to disk to
    free up memory for the request. Because of this, functions such as `IOMalloc()`
    or even `IOLog()` cannot be used during primary interrupt context.

    - **Volunteered Panics:** Happen when the kernel voluntarily decides to crash
    because it has determined that something is about to go horribly wrong or an exceptional
    condition has occurred that it can’t recover from. An example of this is if a
    memory allocation that cannot block fails. Your driver can panic the kernel by
    calling `IOPanic()`, which is a wrapper for the `panic()` function.'
