    Having determined the pipe index (referred to as the pipe reference by methods
    in IOUSBLib), an application can read or write data over the pipe. Which methods
    an application uses to manage a pipe will depend on the type of endpoint the pipe
    represents. The `IOUSBInterfaceInterface` class provides different methods depending
    on whether the pipe is connected to a control, bulk, interrupt, or isochronous
    endpoint.


    The `IOUSBInterfaceInterface` class provides several methods for transferring
    data to or from an endpoint. Depending on the method called, the operation may
    complete synchronously or asynchronously. Other methods allow the caller to provide
    a timeout value that specifies the maximum amount of time to allow the operation
    to complete before aborting the request. Finally, there are methods that complete
    asynchronously and allow the caller to specify a timeout value.


    The convention adopted by IOUSBLib is that a method completes synchronously unless
    the method contains “`Async`” in its name. An asynchronous method takes two extra
    parameters in addition to those passed to its synchronous counterpart—a callback
    function that runs when the operation completes and an arbitrary pointer that
    can be used to pass context information to the callback function.


    A method that allows the caller to specify a timeout contains the letters “`TO`”
    in its name. The timeout value is described by two additional parameters that
    are passed to the method. The device may stop sending or receiving data while
    handling the request, so one timeout value specifies the maximum amount of time
    to wait from the last data transfer before aborting the operation. The second
    timeout value specifies the maximum amount of time to allow the operation to complete
    from start to finish. The request is aborted if either of the specified timeout
    conditions occurs.


    The following methods are provided by the `IOUSBInterfaceInterface` class to perform
    a control transfer. These methods are similar to those provided by the `IOUSBDeviceInterface`
    class, with the exception that they each take an additional parameter, the pipe
    reference. If a value of 0 is passed for the pipe reference, the control request
    is sent to the default control endpoint, endpoint 0.


    *   `ControlRequest`: Performs a control request synchronously. This method takes
    an `IOUSBDevRequest` structure describing a control request, and sends it to the
    specified control endpoint.

    *   `ControlRequestAsync`: Performs a control request asynchronously. This method
    takes an `IOUSBDevRequest` structure and sends it to the specified control endpoint.
    When the request has completed, a callback function that was provided to the function
    is executed. The value of the `arg0` parameter that is passed to the completion
    callback specifies the number of bytes that were either read from the device or
    written to the device.

    *   `ControlRequestTO`: Performs a control request synchronously and allows the
    caller to specify timeout parameters.

    *   `ControlRequestAsyncTO`: Performs a control request asynchronously, with a
    maximum time limit placed on how long the request is allowed to take.


    A device is likely to use a bulk endpoint for its data transfer. As we saw in
    [Chapter 8](#Chapter08.html#ch8), bulk endpoints allow large amounts of data to
    be read or written to the device with high throughput and guaranteed data delivery,
    but with variable latency (depending on whether other devices are attempting to
    transfer data over the USB bus at the same time). The `IOUSBInterfaceInterface`
    class provides the following methods to allow an application to read and write
    buffers over a pipe to a bulk endpoint. The following methods are also applicable
    to transferring data over an interrupt endpoint:


    *   `ReadPipe`: Performs a data transfer synchronously from a bulk or interrupt
    endpoint on the USB device to an application-supplied buffer. The application''s
    buffer is described by its address and the size of the buffer in bytes. The buffer
    size is also an output parameter; if the method completes successfully, the number
    of bytes that were read into the buffer is reported to the caller through the
    same `size` parameter.

    *   `WritePipe`: Performs a data transfer synchronously from an application-supplied
    buffer to a bulk or interrupt endpoint on the USB device. The application''s buffer
    is described by its address and the size of the buffer in bytes.

    *   `ReadPipeAsync`: Performs a data transfer asynchronously from a bulk or interrupt
    endpoint on the USB device to an application-supplied buffer. When the transfer
    has completed, the provided callback function is passed the result of the operation
    and the number of bytes that were read from the device (which is passed through
    the `arg0` argument).

    *   `WritePipeAsync`: Performs a data transfer asynchronously from an application-supplied
    buffer to a bulk or interrupt endpoint on the USB device. When the transfer has
    completed, the provided callback function is passed the result of the operation
    and the number of bytes that were written to the device (which is passed through
    the `arg0` argument).

    *   `ReadPipeTO`: Performs a data transfer synchronously from a bulk or interrupt
    endpoint to an application buffer with a timeout value specified for the operation.

    *   `WritePipeTO`: Performs a data transfer synchronously from an application
    buffer to a bulk or interrupt endpoint with a timeout value specified for the
    operation.

    *   `ReadPipeAsyncTO`: Is an asynchronous equivalent of the `ReadPipeTO` method.
    When the transfer has completed or has timed out, a callback function that has
    been provided by the application is called.

    *   `WritePipeAsyncTO`: Is an asynchronous equivalent of the `WritePipeTO` method.
    When the transfer has completed or has timed out, a callback function that has
    been provided by the application is called.


