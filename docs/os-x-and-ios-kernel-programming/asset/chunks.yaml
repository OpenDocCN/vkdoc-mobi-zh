  trans: "\n# OSObject\n\n如果你使用过苹果的 Cocoa 框架编写用户应用程序，那么 libkern 所提供的某些功能应该会非常熟悉。特别是，`OSObject`\
    \ 类可以被视为 Cocoa 中 `NSObject` 类在内核中的等价物，而动态类型内省能力几乎与 Objective-C 运行时提供的对应功能完全相同。\n\
    \n对于驱动内部私有的类，并不要求使用 `OSObject` 作为其超类，不过你可能会发现，`OSObject` 提供的引用计数和对象追踪功能（无需你额外工作）本身就足以成为采用它的理由。\n\
    \n采用 `OSObject` 作为基类需要遵循以下步骤：\n\n1.  使用标准 C++ 语法，将你的类声明为 `OSObject` 的子类，或者是派生自\
    \ `OSObject` 的类（例如 `IOService`）。如果你是从 `OSObject` 派生子类，可能需要包含头文件 `<libkern/c++/OSObject.h>`。\n\
    2.  在类声明的第一行（在你的头文件中），包含宏 `OSDeclareDefaultDestructors()`，并将你的类名作为参数传入。该宏除了其他功能外，还会为你的类声明标准\
    \ C++ 的构造函数和析构函数，因此你不应再向类声明中添加这两个函数。相反，应添加一个名为 `init()` 的方法作为构造函数，以及一个名为 `free()`\
    \ 的方法作为析构函数。你可以根据需要向 `init()` 方法添加任何参数，如下例所示。\n\n    ```\n    class com_osxkernel_driver_MyObject\
    \ : public OSObject\n    {\n        OSDeclareDefaultStructors(com_osxkernel_driver_MyObject)\n\
    \    public:\n        virtual bool     init (const char* name);\n        virtual\
    \ void     free ();\n        …\n    };\n    ```\n3.  在实现你类的文件中，放置宏 `OSDefineMetaClassAndStructors()`，该宏接受两个参数：类名及其直接超类的类名。实现文件的前几行通常遵循\
    \ `#include \"MyObject.h\"` 的模式。\n\n    ```\n    // 定义 super 作为引用超类的便捷宏\n    #define\
    \ super OSObject\n\n    OSDefineMetaClassAndStructors(com_osxkernel_driver_MyObject,\
    \ OSObject)\n    ```\n4.  提供 `init()` 和 `free()` 方法的实现。这两个方法分别扮演构造函数和析构函数的角色，如下例所示。\n\
    \n    ```\n    bool com_osxkernel_driver_MyObject::init (const char* name)\n \
    \   {\n        if (! super::init())\n                return false;\n\n       \
    \ // 其他初始化操作\n        return true;\n    }\n    void com_osxkernel_driver_MyObject::free\
    \ ()\n    {\n        // 释放 init() 中分配的资源\n        super::free();\n    }\n    ```\n\
    \n在定义了一个从 `OSObject` 派生的对象后，可以在代码中通过调用 C++ `new` 运算符后跟 `init()` 方法来实例化它。为了方便起见，许多类提供了一个静态方法同时执行这两个步骤，并在成功时返回一个非\
    \ `NULL` 的对象，如列表 4-4 所示。\n\n**列表 4-4.** 用于构造自定义类新实例的静态辅助方法定义\n\n```\ncom_osxkernel_driver_MyObject*\n\
    \        com_osxkernel_driver_MyObject::withName (const char* name)\n{\n     \
    \   com_osxkernel_driver_MyObject* me = new com_osxkernel_driver_MyObject;\n\n\
    \        if (me && !me->init(name))\n        {\n                me->release();\n\
    \                return NULL;\n        }\n\n        return me;\n}\n```\n\n任何基于\
    \ `OSObject` 的对象的生命周期都由引用计数决定。当对象首次创建时，其引用计数被初始化为 1。若要释放对象，不应使用 C++ 运算符 `delete`（`OSDeclareDefaultStructors`\
    \ 宏将其声明为受保护的方法），而应在代码中调用 `release()` 方法。该方法由 `OSObject` 类实现，将对象的引用计数减 1。当对象的最后一个引用被释放，且其引用计数变为\
    \ 0 时，对象即被释放，并调用 `free()` 方法。如果你的代码持有了一个指向某对象的指针，并且需要保留它，那么就需要延长该对象的生命周期，以确保在你代码持有该对象引用期间，它不会被释放。这可以通过调用\
    \ `retain()` 方法来实现，该方法将目标对象的引用计数加 1。为防止内存泄漏，务必确保每次调用 `retain()` 都对应一次 `release()`\
    \ 调用。\n\n任何派生自 `OSObject` 的对象都支持类型内省。为了将对象转换为另一种类型，libkern 提供了一个名为 `OSDynamicCast(type,\
    \ object)` 的宏，其功能等同于 C++ 运算符 `dynamic_cast<type>(object)`。该宏会验证对象是否派生自所请求的类，如果是，则返回指向该对象的指针；否则，宏返回\
    \ `NULL`。动态转换最常见的用途是安全地将对象从基类转换为更具体的类。例如，驱动的 `start()` 方法会接收到一个指向其提供者类的指针，类型为\
    \ `IOService` 对象。然而，该提供者实际上是一个更具体的类，如 `IOUSBDevice` 或 `IOPCIDevice`，而动态转换则允许安全地进行此转换。例如，控制\
    \ USB 设备的驱动会在其 `start()` 方法中包含以下代码，将提供者从 `IOService` 转换为 `IOUSBDevice`：\n\n```\n\
    IOUSBDevice* usbDevice = OSDynamicCast(IOUSBDevice, provider);\nif (usbDevice\
    \ == NULL)\n{\n        IOLog(\"Unknown provider class\\n\");\n        return false;\n\
    }\n```\n\n`OSObject` 基类还可以追踪其每个派生类已被实例化但尚未释放的实例数量。此信息不仅对 I/O Kit 有用，它还提供了一种追踪内存泄漏的宝贵机制。在内部，I/O\
    \ Kit 使用每个类的实例计数来确保不会卸载仍存在未释放对象的内核扩展，否则将导致内核恐慌。当一个内核扩展为其定义的所有类都不再有未释放的实例时，内核将卸载该内核扩展。每个\
    \ `OSObject` 派生类的实例数可以通过命令行工具 `ioclasscount` 来查看。\n\n![images](img/square.jpg)\
    \ **提示** 如果你打开终端并在加载 IOKitTest 教程后运行命令 `ioclasscount`，你会看到类 `com_osxkernel_driver_IOKitTest`\
    \ 的一个实例。\n"
- fmt: "#### Container Classes\n\nAs well as defining the base class and providing\
    \ a runtime environment for the kernel, `libkern` also defines a number of container\
    \ classes to manage a collection of objects. The container classes provided by\
    \ `libkern` include arrays, dictionaries, and both ordered and unordered sets.\
    \ While all these containers can contain objects of varying types and can even\
    \ contain objects of differing types within the same container, a container can\
    \ contain only objects that are derived from the `OSObject` class.\n\n> **Note:**\
    \ If you are familiar with user space programming on Mac OS X, the `libkern` container\
    \ classes are equivalent to `NSMutableArray`, `NSMutableDictionary`, and `NSMutableSet`,\
    \ or the Core Foundation types `CFMutableDictionary`, `CFMutableArray`, and `CFMutableSet`.\n\
    \nTo allow non-object scalar types such as Booleans, integers, and strings to\
    \ be included in the container types, `libkern` provides the corresponding classes\
    \ `OSBoolean`, `OSNumber`, and `OSString` for wrapping a `bool`, an integer value\
    \ of up to 64 bits in length, and a C-string, respectively.\n\nThe handling of\
    \ strings in `libkern` deserves special mention. The `libkern` library provides\
    \ two classes for representing a string, `OSString` and `OSSymbol` (which is a\
    \ subclass of `OSString`). The purpose of `OSSymbol` is not to provide a general\
    \ wrapper for a string, but rather to hold string values that represent “symbols”\
    \ in the kernel, such as commonly used keys in a matching dictionary. When a new\
    \ instance of `OSSymbol` is created, the constructor checks for an existing `OSSymbol`\
    \ object that contains the same string value, and if one is found, returns an\
    \ instance of the existing object rather than creating a new instance. This means\
    \ that for a given string value, there is at most one `OSSymbol` object representing\
    \ that value. As a consequence, a dictionary that is keyed on `OSSymbol` values\
    \ needs to compare the address of only two `OSSymbol` values rather than performing\
    \ a more expensive string comparison.\n\nAll the container classes follow the\
    \ same behavior with regard to object ownership. Any object added to a container\
    \ is retained by that container class, and objects are released by the container\
    \ class once they are removed from the container or the final reference of the\
    \ container itself is released and so the container is deallocated. After inserting\
    \ an object into a container, if the caller no longer requires its own reference\
    \ to that object, it is free to release the inserted object since the container\
    \ class will maintain a reference to the object.\n\nAfter querying a container\
    \ for an object that it contains, the caller should retain that object if there\
    \ is any chance that the container could be released while the caller is still\
    \ using the returned object. The `libkern` container classes do not increment\
    \ the reference of their content objects before returning it to the caller (for\
    \ example, the `OSArray` method `getLastObject()` will not increment the reference\
    \ count of its last object before returning it to the caller).\n\nIt is important\
    \ to note that the container classes do not provide any synchronization for use\
    \ in a multi-threaded environment. That is not to say that they cannot be used\
    \ in a driver that contains multi-threaded code, but rather that it is the caller's\
    \ responsibility to add its own locking to ensure that calls to the container\
    \ classes are serialized.\n\nThe container classes provided by `libkern` include\
    \ the following:\n\n- `OSArray`, which provides storage and retrieval of objects\
    \ based on the index within the array\n- `OSDictionary`, which provides storage\
    \ and retrieval based on a provided string value (which is known as the “key”)\n\
    - `OSSet`, which provides storage for objects and the ability to test whether\
    \ an object is in the set\n- `OSOrderedSet`, which provides storage that is sorted\
    \ based on a provided comparison function and retrieval based on an index\n\n\
    All `libkern` container classes can be iterated over using the class `OSCollectionIterator`,\
    \ as shown in [Listing 4-5](#Chapter04.html#list_4_5). When iterating over an\
    \ `OSDictionary`, the objects returned by the iterator represent the keys of the\
    \ dictionary, and not the values contained in the dictionary itself.\n\n**Listing\
    \ 4-5.** A Sample Function to Iterate Over the Objects Contained in an `OSArray`\n\
    \n```\nvoid    IterateArray (OSArray* array)\n{\n        OSCollectionIterator*\
    \   iter;\n\n        iter = OSCollectionIterator::withCollection(array);\n   \
    \     if (iter != NULL)\n        {\n                OSObject*       anObject;\n\
    \n                while ((anObject = iter->getNextObject()) != NULL)\n       \
    \         {\n                        // Assume the array only contains string\
    \ values:\n                        // OSString* aString = OSDynamicCast(OSString,\
    \ anObject);\n                }\n\n                iter->release();\n        }\n\
    }\n```\n\nA special container object for drivers is their property table. This\
    \ is a dictionary that contains a number of key/value pairs that are local to\
    \ a particular driver instance. When a driver is loaded, the I/O Kit fills its\
    \ property table with the entries of the matching dictionary from the driver's\
