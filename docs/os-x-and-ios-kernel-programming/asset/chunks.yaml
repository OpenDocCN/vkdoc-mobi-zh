  raw: '##### Isochronous I/O


    Isochronous transfers are continuous in nature and are suitable for use with devices,
    such as audio and video, where information is continuously streaming and there
    is a need for guaranteed bandwidth and bounded latency. Data integrity can be
    verified using a CRC, but corrupted data is never re-sent automatically. The amount
    of bandwidth needed by a device is specified in the isochronous endpoint descriptor.
    If the host controller is unable to guarantee enough bandwidth to support the
    device, which can happen if another device already has reserved bandwidth on the
    bus, the device may be unable to function. If the device is able to operate with
    less bandwidth, it can define alternate interface descriptors with more conservative
    requirements. Maximum payloads for isochronous transfers are as follows:


    *   High-speed devices have a maximum packet size of 1024 bytes.

    *   Full-speed devices have a maximum packet size of 1023 bytes.

    *   Low-speed devices do not support isochronous transfers.


    Isochronous transfers use the concept of microframes. A microframe is 125 microseconds
    long. For high-speed devices, up to three packets can be transmitted per microframe,
    giving a maximum data-rate of 3 x 1024 x 8000 microframes per second = 24 MB/s.
    This is slightly lower than the maximum bandwidth possible over a bulk endpoint.


    A microframe is represented by the `IOUSBIsocFrame` structure:


    `typedef struct IOUSBIsocFrame {`

    `    IOReturn              frStatus;`

    `    UInt16                frReqCount;`

    `    UInt16                frActCount;`

    `} IOUSBIsocFrame;`


    The structure describes how many bytes of data should be transmitted or received
    fromt the I/O buffer in each microframe. The `frReqCount` field is the amount
    of bytes requested, whereas the `frActCount` is the count actually transferred.
    The structure also contains a status field.


    The methods for reading and writing to an isochronous endpoint are similar to
    those used to read and write from interrupt and bulk endpoints:


    `virtual IOReturn Read(IOMemoryDescriptor* buffer, UInt64 frameStart, UInt32 numFrames,`

    `                      IOUSBIsocFrame* frameList, IOUSBIsocCompletion* completion
    = 0);`

    `virtual IOReturn Write(IOMemoryDescriptor* buffer, UInt64 frameStart, UInt32
    numFrames,`

    `                       IOUSBIsocFrame *frameList, IOUSBIsocCompletion * completion
    = 0);`


    The methods take the following arguments:


    *   The `buffer` argument is a virtually contiguous buffer containing the data
    to be transferred. The memory descriptor should have its `prepare()` method called
    to ensure memory is paged in and pinned down for the duration of the transfer.
    There are no special requirements otherwise for the memory and it can be either
    user space or kernel memory.

    *   The `frameStart` argument specifies the index of the USB frame from which
    to start. One USB frame corresponds to 8 microframes.

    *   The `numFrames` argument is a count of the microframe descriptors contained
    in the `frameList` array.

    *   The `frameList` argument is a pointer to an array of `IOUSBIsocFrame` structures.

    *   An optional `completion` structure. If specified, this will perform the transfer
    asynchronously.


    ##### Asynchronous Requests


    It is often necessary to perform requests to USB devices asynchronously—for example,
    when performing large bulk requests to a hard drive. Instead of having the caller
    thread blocked, the request can be handled by the USB controller, and it will
    notify us, through a callback method, when the request is completed.


    To do this, you must supply an `IOUSBCompletion` structure to the `Read()`, `Write()`,
    `DeviceRequest()`, or `ControlRequest()` methods:


    `typedef struct IOUSBCompletion {`

    `    void* target;`

    `    IOUSBCompletionAction action;`

    `    void* parameter;`

    `} IOUSBCompletion;  `


    *   The `target` field is a pointer that can contain user-defined data. Often
    it is used to pass the pointer to the class that sent the request, so that you
    can cast the pointer back to the original class in the completion function.

    *   The `action` field is the actual callback, and should be a pointer to a function
    matching the `IOUSBCompletionAction` prototype. The method will be called once
    the request completes.

    *   The `parameter` field can carry an additional parameter, which will also be
    passed to the completion function.


    The `IOUSBCompletionAction` callback has the following prototype:


    `typedef void ( *IOUSBCompletionAction)(void* target, void* parameter,`

    `                                       IOReturn status, UInt32 bufferSizeRemaining);`


    As you can see, the `target` and `parameter` fields of the `IOUSBCompletion` structure
    are passed directly to the callback. The callback will also get the `status` of
    the transfer, and the `bufferSizeRemaining` field will contain the number of bytes
    left to transfer if the request was not fully completed.


    Asynchronous requests are completed on the `IOUSBFamily` work loop thread, which
    means that if you access data in the callback from your own driver, you must ensure
    that this access is properly synchronized.


    Generally speaking, USB drivers never operate in a primary interrupt context,
    with the exception of the low latency versions of the isochronous `Read()` and
    `Write()` methods, which allows asynchronous isochronous I/O to have the completion
    callback called at primary interrupt time. In this case, extreme care needs to
    be taken to avoid calling code that may block. The use of low latency isochronous
    I/O should be used sparingly, and is generally not required even for audio and
    video drivers.


    ### Summary


    *   At the time of writing, the Universal Serial Bus Specification exists in three
    major revisions, the latest being USB 3.0\. USB 3.0, although emerging rapidly
    in the PC segment, has not yet been adopted by Apple, which at the time of writing
    only supports USB 2.0,

    *   A USB uses a shared bus topology, where up to 127 devices can be controlled
    by a single host. The host controller is the master of the bus, and controls all
    activity on the bus. A device is never allowed to use the bus without permission
    from the host.

    *   A USB device is described by a hierarchical structure of descriptors, which
    contain information about the class, type, capabilities, and requirements of the
    device.

    *   A USB device may consist of zero or more interfaces, which are groups of endpoints.
    An interface typically represents a logical device function, such as a printer
    or scanner.

    *   There are four types of endpoints: control, bulk, interrupt, and isochronous.
    Control transfers are used for device configuration and control. Bulk endpoints
    are used for applications such as hard drives or network devices. Interrupt endpoints
    provide bounded latency, but they can only transfer small amounts. Isochronous
    is ideal for video and audio applications that require guaranteed and predictable
    bandwidth, as well as low latency.

    *   The `IOUSBFamily` handles USB support in the kernel. The family implements
    support for common USB controllers. The three principal classes relevant to a
    driver developer are `IOUSBDevice`, `IOUSBInterface`, and `IOUSBPipe`. A USB driver
    can use either `IOUSBDevice` or `IOUSBInterface` as its provider.

    *   The `IOUSBPipe` provides an abstraction around endpoints. It has methods to
    deal with all four endpoints. It supports synchronous and asynchronous I/O.


    ## C H A P T E R  9'
  trans: "\n### 等时传输 I/O\n\n等时传输本质上具有连续性，适用于音频和视频等设备，这些设备需要持续传输数据流，并且需要保证带宽和有限延迟。数据完整性可以通过\
    \ CRC 校验，但损坏的数据不会自动重传。设备所需的带宽量在等时端点描述符中指定。如果主机控制器无法保证足够的带宽来支持该设备（例如当总线上已有其他设备预留了带宽时），该设备可能无法正常工作。如果设备可以在较低带宽下运行，则可以通过定义要求更为保守的备用接口描述符来解决。等时传输的最大有效载荷如下：\n\
    \n- 高速设备的最大数据包大小为 1024 字节。\n- 全速设备的最大数据包大小为 1023 字节。\n- 低速设备不支持等时传输。\n\n等时传输使用微帧的概念。一个微帧的长度为\
    \ 125 微秒。对于高速设备，每个微帧最多可以传输三个数据包，因此最大数据速率为 3 × 1024 × 8000 微帧/秒 = 24 MB/s。这略低于批量端点能够达到的最大带宽。\n\
    \n一个微帧由 `IOUSBIsocFrame` 结构体表示：\n\n```c\ntypedef struct IOUSBIsocFrame {\n   \
    \ IOReturn              frStatus;\n    UInt16                frReqCount;\n   \
    \ UInt16                frActCount;\n} IOUSBIsocFrame;\n```\n\n该结构体描述了在每个微帧中应从\
    \ I/O 缓冲区传输或接收多少字节的数据。`frReqCount` 字段是请求的字节数，而 `frActCount` 是实际传输的字节数。该结构体还包含一个状态字段。\n\
    \n对等时端点进行读写的方法类似于对中断端点和批量端点进行读写的方法：\n\n```cpp\nvirtual IOReturn Read(IOMemoryDescriptor*\
    \ buffer, UInt64 frameStart, UInt32 numFrames,\n                      IOUSBIsocFrame*\
    \ frameList, IOUSBIsocCompletion* completion = 0);\nvirtual IOReturn Write(IOMemoryDescriptor*\
    \ buffer, UInt64 frameStart, UInt32 numFrames,\n                       IOUSBIsocFrame\
    \ *frameList, IOUSBIsocCompletion * completion = 0);\n```\n\n这些方法接受以下参数：\n\n-\
    \ `buffer` 参数是一个虚拟连续缓冲区，包含要传输的数据。应调用该内存描述符的 `prepare()` 方法，以确保在传输期间将内存分页并锁定。除此之外，对内存没有特殊要求，它可以是用户空间或内核内存。\n\
    - `frameStart` 参数指定要开始的 USB 帧索引。一个 USB 帧对应 8 个微帧。\n- `numFrames` 参数是 `frameList`\
    \ 数组中包含的微帧描述符的数量。\n- `frameList` 参数是指向 `IOUSBIsocFrame` 结构体数组的指针。\n- 可选的 `completion`\
    \ 结构体。如果指定，将以异步方式执行此传输。\n\n### 异步请求\n\n通常需要向 USB 设备异步执行请求——例如，在对硬盘进行大量批量请求时。这种情况下，无需阻塞调用线程，USB\
    \ 控制器即可处理该请求，并在请求完成时通过回调方法通知我们。\n\n为此，您必须向 `Read()`、`Write()`、`DeviceRequest()`\
    \ 或 `ControlRequest()` 方法提供一个 `IOUSBCompletion` 结构体：\n\n```c\ntypedef struct IOUSBCompletion\
    \ {\n    void* target;\n    IOUSBCompletionAction action;\n    void* parameter;\n\
    } IOUSBCompletion;\n```\n\n- `target` 字段是一个指针，可以包含用户定义的数据。通常用于传递发送请求的类的指针，以便您可以在完成函数中将该指针强制转换回原始类。\n\
    - `action` 字段是实际回调，应是一个指向符合 `IOUSBCompletionAction` 原型的函数指针。该函数将在请求完成后被调用。\n-\
    \ `parameter` 字段可以携带一个附加参数，该参数也会传递给完成函数。\n\n`IOUSBCompletionAction` 回调具有以下原型：\n\
    \n```cpp\ntypedef void ( *IOUSBCompletionAction)(void* target, void* parameter,\n\
    \                                       IOReturn status, UInt32 bufferSizeRemaining);\n\
    ```\n\n如您所见，`IOUSBCompletion` 结构体的 `target` 和 `parameter` 字段会直接传递给回调函数。回调函数还将获得传输的\
    \ `status`，并且如果请求未完全完成，`bufferSizeRemaining` 字段将包含剩余的字节数。\n\n异步请求在 `IOUSBFamily`\
    \ 工作循环线程上完成，这意味着如果您在自己的驱动程序中访问回调中的数据，则必须确保此访问已正确同步。\n\n一般来说，USB 驱动程序不会在主中断上下文中运行，但等时\
    \ `Read()` 和 `Write()` 方法的低延迟版本除外，后者允许异步等时 I/O 在主中断时间调用完成回调。在这种情况下，需要格外小心，避免调用可能阻塞的代码。应谨慎使用低延迟等时\
    \ I/O，即使对于音频和视频驱动程序，通常也并非必需。\n\n### 总结\n\n- 截至撰写本文时，通用串行总线规范存在三个主要修订版本，最新的是 USB\
    \ 3.0。USB 3.0 虽然在 PC 领域迅速普及，但尚未被 Apple 采用，截至撰写本文时，Apple 仅支持 USB 2.0。\n- USB 使用共享总线拓扑，单个主机最多可控制\
    \ 127 个设备。主机控制器是总线的主控设备，控制总线上的所有活动。设备未经主机许可，绝不允许使用总线。\n- USB 设备由描述符的分层结构描述，这些描述符包含有关设备类别、类型、功能和需求的信息。\n\
    - USB 设备可以包含零个或多个接口，这些接口是端点的分组。接口通常代表一个逻辑设备功能，例如打印机或扫描仪。\n- 端点有四种类型：控制、批量、中断和等时。控制传输用于设备配置和控制。批量端点用于硬盘或网络设备等应用。中断端点提供有限的延迟，但只能传输少量数据。等时传输非常适合需要保证和可预测带宽以及低延迟的视频和音频应用。\n\
    - `IOUSBFamily` 处理内核中的 USB 支持。该家族实现了对常见 USB 控制器的支持。与驱动程序开发者相关的三个主要类是 `IOUSBDevice`、`IOUSBInterface`\
    \ 和 `IOUSBPipe`。USB 驱动程序可以使用 `IOUSBDevice` 或 `IOUSBInterface` 作为其提供者。\n- `IOUSBPipe`\
    \ 提供了端点之上的抽象。它具有处理所有四种端点的方法。它支持同步和异步 I/O。\n\n## 第 9 章\n"
- fmt: '# PCI Express and Thunderbolt


    PCI (Peripheral Component Interconnect) is a high-speed bus developed by Intel,
    in the early nineties, to replace various older and slower bus technologies such
    as EISA, ISA, MCA, and VESA. The term PCI is often used to describe the family
    of technologies based on the original PCI specification. Throughout this chapter,
    when we refer to PCI, we refer to commonalities found in the PCI–based technologies;
    namely, PCI Express, Thunderbolt, and to a lesser extent ExpressCard. Most people
    associate PCI with expansion boards plugged into a computer, but it is worth noting
    that PCI is fundamental to many computer systems—even those without PCI slots,
    such as iMacs— that have internal PCI buses that connect the CPU to USB, Firewire,
    and SATA controllers. Recent PCI-based advancements (like Thunderbolt) allow the
    PCI bus to be extended outside of the computer, much in the same way as USB and
    Firewire.


    PCI enjoyed widespread adoption and solved many of the problems found in older
    bus technologies; for example, it eliminated the need to configure jumpers on
    expansion cards, as resources such as memory regions and interrupts were configured
    automatically by the system BIOS and/or the OS itself.


    PCI was extended by the PCI-X and PCI-X 2.0 standards, which allowed for a 64-bit
    bus width as opposed to the Legacy PCI''s 32-bit bus width. PCI-X standards, having
    been succeeded by the PCI Express (PCIe) standard, have become obsolete. Unlike
    PCI-X however, PCIe uses a packet-based serial protocol, rather than the parallel
    interface characteristic of its predecessors. PCIe allows devices on a bus to
    have dedicated bandwidth instead of sharing bus bandwidth with other devices on
    the same bus. While PCIe and PCI are substantially different from an electrical
    and physical standpoint, they are backwards compatible from a software point of
    view; consequently, drivers require only minor (or no) changes to support newer
    standards.


    As previously mentioned, there are myriads of PCI-related standards. We will discuss
    only technologies currently sold by Apple, which include PCIe, Thunderbolt, and
    ExpressCard. Thunderbolt is found in most 2011 or newer Macs. Thunderbolt and
    ExpressCard are based on PCIe technology and connect to the PCI host bridge. However,
    ExpressCard is being phased out in favor of Thunderbolt on all Macs, and is now
    found only in the 17” MacBook Pro. The Mac Pro is currently the only Mac to have
    physically accessible PCI Express slots after the XServe was discontinued.


    This chapter begins with a discussion of the various PCI technologies that apply
    to the current generation of Macs. We will focus on the parts that are important
    to understand from a software point of view and necessary to build a functional
    driver for a PCI-based device. For example, we as programmers need not be concerned
    with how PCI functions at the electrical level. The second part of this chapter
    focuses on how we can interface with PCI-based devices in I/O Kit, how to match
    and configure them, read registers, and deal with the removal of devices. We will
    also address how to handle interrupts and perform DMA (Direct Memory Access),
    which are two typical tasks performed by a PCI-based driver.


    ## PCI Express


    PCIe was designed to replace PCI and PCI-X, as well as the AGP (Accelerated Graphics
    Port), a stopgap employed by graphics cards allowing for higher bandwidths not
    possible with PCI-X. PCIe uses uni-directional, point-to-point connections known
    as “lanes.” This approach avoids the PCI and PCI-X''s shared bus problem; although
    system designers could somewhat alleviate this issue by putting each physical
    PCI slot on its own dedicated bus. Still, PCIe is substantially faster than its
    predecessors.


    So far, three revisions of the PCIe standard have been released. The second generation
    doubled the possible bandwidth for a single PCIe lane from 250 MB/s to 500 MB/s.
    The third revision doubled that and can handle up to 1 GB/s per lane. PCIe typically
    uses lane configurations of 1x, 4x, 8x, 16x, and 32x; although, the latter is
    less common, especially for physical slots. Slots for graphics cards/GPUs are
    typically 16x lanes wide, as they require massive amounts of bandwidth. The latest
    revision of the Mac Pro conforms to the PCIe 2.0 standard. The latest version
    of Mac Pro (5,1) has four 16x lane slots, but only slots 1 and 2 are able to operate
    at 16x, while slots 3 and 4 operate at 4x.


    ## Thunderbolt


    Thunderbolt, a relatively new technology, was initially developed by Intel and
    later adopted by Apple; the latter is currently the only vendor shipping Thunderbolt-enabled
    computers. Although the availability of devices is limited, several companies,
    including Blackmagic Design, Promise Technology, and Western Digital, have announced
    their support for the technology. Thunderbolt is an external expansion interface
    that allows PCIe and DisplayPort 1.1 to be tunneled over the same cable. A cable
    can carry two bi-directional channels of up to 10 Gbps of data, which amounts
    to a total bandwidth of 40 Gbps per cable. The channels are independent of each
    other, and it is not possible to aggregate the bandwidth between them. Thunderbolt
    is also able to provide up to 10 Watts of power to devices connected to the bus.
    The cable uses the Mini DisplayPort connector, which is indentical at both ends.


    The current specification of Thunderbolt allows up to six devices to be daisy
    chained. Later revisions will showcase a tree-like topology similar to that of
    USB. However, unlike USB, Thunderbolt allows host-to-host connections like Firewire.
    Apple has also enabled a target disk mode using Thunderbolt, as well as the ability
    to boot the operating system from Thunderbolt attached storage. Due to the fact
    that Thunderbolt devices communicate directly with the PCIe host system, existing
    devices can be updated to support Thunderbolt with relatively few modifications
    to the hardware (ignoring the fact that an external case and possibly an external
    power source are needed). On the software side, very few changes are needed (devices
    are still managed by the `IOPCIFamily`); however, one requirement is that the
    driver must support being dynamically unloaded.


    Thunderbolt makes it possible for the Mac Mini, iMac or MacBook series computers
    to access high-speed storage and storage area networks, as well as high-bandwidth
    uncompressed video capture, which was previously reserved for the high-end Mac
    Pro and Xserve.


    ## ExpressCard


    ExpressCard is an older expansion interface found in the MacBook Pro series. ExpressCard
    is being phased out in favour of Thunderbolt; however, laptops with both ExpressCard
    and Thunderbolt ports are available (at the time of writing). ExpressCard is the
    modern version of PCMCIA and is based on PCIe. The latest standard supports transfer
    speeds of up to 5 Gbps.'
