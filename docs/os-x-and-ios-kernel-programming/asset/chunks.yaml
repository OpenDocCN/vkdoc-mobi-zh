    into each task''s address space. The kernel has 1GB of address space available,
    while a task has 3GB available. When a task context switches into kernel space,
    the MMU (memory management unit) can avoid reconfiguring the translation lookaside
    buffer (TLB) with a new address space, as the kernel is already at a known location,
    thus speeding up the otherwise expensive context switch. The drawback, of course,
    is the limited amount of address space available for the kernel, as well as having
    only 3GB available for the task. In XNU, the kernel runs in its own virtual address
    space, which is not shared with user tasks, leaving 4GB for the kernel and 4GB
    for the user task.


    ##### VM Maps and Entries


    The virtual memory (VM) map is the actual representation of a task''s address
    space. Each task has its own VM map. The map is represented by the structure `vm_map`.
    There is no map associated with a thread as they share the VM map of the task
    that owns them.


    A VM map represents a doubly-linked list of memory regions that is mapped into
    the process address space. Each region is a virtually contiguous range of memory
    addresses (not necessarily backed by contiguous physical memory) described by
    a start and end address, as well as other meta-data, such as protection flags,
    which can be any combination of read, write, and execute. The regions are represented
    by the `vm_map_entry` structure. A VM map entry may be merged with another adjacent
    entry when more memory is allocated before or after an existing entry or split
    into smaller regions. Splitting will occur if the protection flags are modified
    for a range of addresses described by an entry, as protection flags can only be
    set on VM map entries. [Figure 2-4](#Chapter02.html#fig_2_4) shows a VM map with
    two VM map entries.


    ![images](images/0204.jpg)


    ***Figure 2-4.** Relationship between VM subsystem structures*


    ![images](images/square.jpg) **Tip** The relevant structures pertaining to task
    address spaces are defined in `mach/vm_map.h` and `mach/vm_region.h` in the XNU
    source package.


    ##### The Physical Map


    Each VM map has an associated physical map, or `pmap` structure. This structure
    helps hold information on virtual to physical memory mappings being used by the
    task. The portion of the Mach VM that deals with physical mappings is machine
    dependent, as it interacts with the memory management unit (MMU), a specialized
    hardware component of the system that takes care of address translation.


    ##### VM Objects


    A VM map entry can point to either a VM object or a VM submap. A submap is a container
    for other (VM map) mappings. A submap is used to share memory between addresses
    spaces. The VM object is a representation of the location, or rather how the described
    memory is accessed. Memory pages underlying the object may not be present in physical
    memory, but could be located on an external backing store (a hard drive on OS
    X). In this case, the VM object will have information on how to *page in* the
    external pages. Transfer to or from a backing store is handled by the *pager*
    discussed next.


    A VM object describes memory in units of pages. A page in XNU is currently 4096
    bytes. A virtual page is described by the `vm_page` structure. A VM object may
    contain many pages, but a page is only ever associated with one VM object.


    **PAGES**


    A page is the smallest unit of the virtual memory system. On Mac OS X and iOS,
    as well as many other operating systems, the size of a page is 4096 bytes (4KB).
    The page size is determined by the processor, as the processor, or rather its
    memory management unit (MMU), is responsible for virtual to physical mappings
    and manages the VM page table cache, also called a TLB. The page size of many
    architectures can be set by the operating system, and can be, for architectures
    such as the x86, up to 4 MB, or even a mixture between more than one page size.
    The operating system maintains a data structure called the page table, which contains
    one `struct vm_page` for each page-sized block of physical memory. The structure
    contains metadata, such as whether the page is in use.


    When memory needs to be shared between tasks, a VM map entry will point into the
    foreign address space via a submap, as opposed to a VM object. This commonly happens
    when a shared library is used. The shared library gets mapped into the task''s
    address space.


    Let''s consider another example. When a Unix process issues the `fork()` system
    call to create a child process, a new process will be created as a copy of the
    parent. To avoid having to copy the memory from the parent to the child, an optimization
    known as copy-on-write (COW) is employed. Read access to a child''s memory will
    simply reference the same pages as the parent. If the child process modifies its
    memory, the page describing that memory will be copied, and a shadow VM object
    will be created. On the next read to that memory region, a check is performed
    to see if the shadow object has a copy of the page, and if not the original shared
    page is referenced. The previously described behavior is only true when the inheritance
    property of the original VM map entry from the parent is set to *copy*. Other
    possible values are *shared,* in which case the child will continue both the read
    and write operation to the original memory location. If the setting is *none,*
    the memory pages referenced by the map entry will not be mapped into the child''s
    address space. The fourth possible value is *copy and delete,* where the memory
    will be copied to the child and deleted from the parent.


    ![images](images/square.jpg) **Note** Copy-on-write is also used by Mach IPC to
    optimize the transfer of data between tasks.'
  trans: '

    # 任务地址空间


    每个 Mach 任务都有其自身的虚拟地址（VM）空间。对于 32 位任务，地址空间为 4 GB；而对于 64 位任务，地址空间则大得多，具有 51 位（约
    2 PB）的可用地址空间。视频编辑或特效软件等专业应用经常超出 32 位地址空间的限制。对 64 位虚拟地址空间的支持在 OS X 10.4 中可用。


    > **注：** 尽管 32 位应用受限于 4 GB 地址空间，但这与系统中可用的物理内存量无关。OS X 支持物理地址扩展（PAE）等技术，允许 32 位
    x86 处理器（或以 32 位模式运行的 64 位处理器）寻址多达 36 位（64 GB）的物理内存；然而，任务地址空间仍被限制在 4 GB。


    任务的地址空间是受保护内存概念的基础。除非通过共享内存或其他机制明确允许，否则任务不得访问另一个任务的地址空间及其包含数据的底层物理内存。


    ## 内核地址空间管理


    内核自身拥有其任务，即 `kernel_task`，该任务具有独立的地址空间。我们以 iOS 这样的 32 位操作系统为例。某些基于 Unix 的操作系统（包括
    Linux）采用一种设计，将内核地址空间映射到每个任务的地址空间。内核有 1 GB 的可用地址空间，而任务有 3 GB 可用空间。当任务上下文切换到内核空间时，MMU（内存管理单元）可以避免使用新地址空间重新配置
    TLB（转换检测缓冲区），因为内核已位于已知位置，从而加速了原本开销高昂的上下文切换。当然，其缺点在于内核可用的地址空间有限，并且任务仅有 3 GB 可用。在
    XNU 中，内核运行在其自身的虚拟地址空间中，不与用户任务共享，这为内核留下了 4 GB 空间，为用户任务留下了 4 GB 空间。


    ## VM 映射与条目


    虚拟内存（VM）映射是任务地址空间的实际表示。每个任务都有其自身的 VM 映射。该映射由 `vm_map` 结构表示。线程没有关联的映射，因为它们共享其所属任务的
    VM 映射。


    VM 映射表示映射到进程地址空间中的内存区域的双向链表。每个区域是一段虚拟连续的地址范围（不一定由连续的物理内存支持），由起始地址和结束地址以及其他元数据（例如保护标志，可以是读取、写入和执行权限的任意组合）描述。这些区域由
    `vm_map_entry` 结构表示。当在现有条目之前或之后分配更多内存时，VM 映射条目可能与相邻条目合并，或者拆分为更小的区域。如果修改了条目所描述地址范围的保护标志，则会发生拆分，因为保护标志只能在
    VM 映射条目上设置。图 2-4 展示了一个包含两个 VM 映射条目的 VM 映射。


    **图 2-4.** VM 子系统结构之间的关系


    > **提示：** 与任务地址空间相关的结构定义在 XNU 源代码包中的 `mach/vm_map.h` 和 `mach/vm_region.h` 文件中。


    ## 物理映射


    每个 VM 映射都有一个关联的物理映射，即 `pmap` 结构。该结构有助于保存任务正在使用的虚拟到物理内存映射的信息。Mach VM 中处理物理映射的部分是与机器相关的，因为它与
    MMU（内存管理单元）交互，MMU 是系统中负责地址转换的专用硬件组件。


    ## VM 对象


    VM 映射条目可以指向 VM 对象或 VM 子映射。子映射是其他（VM 映射）映射的容器。子映射用于在地址空间之间共享内存。VM 对象是对位置的表示，或者更确切地说是对所描述内存如何访问的表示。对象底层的物理内存页可能不在物理内存中，但可能位于外部后备存储（OS
    X 中的硬盘驱动器）上。在这种情况下，VM 对象将包含如何*换入*外部页面的信息。与后备存储之间的传输由接下来讨论的*分页器*处理。


    VM 对象以页面为单位描述内存。XNU 中的一个页面当前为 4096 字节。虚拟页面由 `vm_page` 结构描述。一个 VM 对象可以包含多个页面，但一个页面仅与一个
    VM 对象相关联。


    ### 页面


    页面是虚拟内存系统的最小单元。在 Mac OS X 和 iOS 以及许多其他操作系统中，页面的大小为 4096 字节（4 KB）。页面大小由处理器决定，因为处理器（更确切地说是其
    MMU）负责虚拟到物理的映射并管理 VM 页表缓存（也称为 TLB）。许多架构的页面大小可以由操作系统设置，并且对于 x86 等架构，可以高达 4 MB，甚至混合使用多种页面大小。操作系统维护一个称为页表的数据结构，其中包含物理内存中每个页面大小的块的
    `struct vm_page`。该结构包含元数据，例如该页面是否正在使用中。


    当任务之间需要共享内存时，VM 映射条目将通过子映射指向外部地址空间，而不是 VM 对象。这通常发生在使用共享库时。共享库被映射到任务的地址空间。


    让我们考虑另一个示例。当 Unix 进程发出 `fork()` 系统调用来创建子进程时，将创建一个新进程作为父进程的副本。为了避免必须将内存从父进程复制到子进程，采用了一种称为写时复制（COW）的优化技术。对子进程内存的读取访问将简单地引用与父进程相同的页面。如果子进程修改其内存，则描述该内存的页面将被复制，并创建一个影子
    VM 对象。在下一次对该内存区域的读取时，会进行检查以查看影子对象是否已拥有该页面的副本，如果没有，则引用原始的共享页面。仅当父进程中原始 VM 映射条目的继承属性设置为*复制*时，才会发生上述行为。其他可能的值包括*共享*，在这种情况下，子进程将继续对原始内存位置进行读取和写入操作。如果设置为*无*，则映射条目引用的内存页面将不会映射到子进程的地址空间中。第四个可能的值是*复制并删除*，此时内存将被复制到子进程并从父进程中删除。


    > **注：** Mach IPC 也使用写时复制来优化任务间的数据传输。

