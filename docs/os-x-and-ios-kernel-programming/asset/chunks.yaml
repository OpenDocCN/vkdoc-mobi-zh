  trans: '

    #### 操作系统的角色


    作为启动序列的一部分，操作系统会确定系统的硬件配置，查找连接到 USB 端口或插入 PCI 扩展槽的外部设备，并对它们进行初始化，必要时还会加载驱动程序。


    一旦操作系统完成加载，用户便可运行应用软件。应用软件可能需要分配内存或将文件写入磁盘，而这些请求都由操作系统处理。对用户而言，操作系统的参与在很大程度上是透明的。


    操作系统在运行的应用程序与物理硬件之间提供了一层抽象。应用程序通常通过向操作系统发出高级请求来与硬件通信。由于操作系统处理这些请求，应用程序可以完全不了解其运行的硬件配置，例如安装的
    RAM 容量以及磁盘存储是内部 SSD 还是外部 USB 驱动器。


    这种抽象使应用软件能够在各种不同的硬件配置上运行，而程序员无需为每种配置添加支持，即使在程序发布后出现了新的硬件设备也是如此。


    应用程序开发者通常可以忽略计算机系统工作细节中的许多内容，因为操作系统抽象化了应用程序所运行的硬件平台的复杂性。然而，作为驱动程序开发者，你编写的代码将成为操作系统的一部分，并直接与计算机硬件交互；你无法回避系统的内部运行机制。因此，有必要对操作系统如何履行职责有一个基本的了解。


    #### 进程管理


    用户的计算机上通常安装了许多应用程序。它们纯粹是被动实体。磁盘上的程序包含仅在程序运行时才需要的数据，由可执行代码和应用程序数据组成。当用户启动应用程序时，操作系统会将程序的代码和数据从磁盘加载到内存中，并开始执行其代码。正在执行的程序被称为“进程”。与程序不同，进程是一个活动实体，由程序在执行的某个时刻的状态快照组成。这包括程序代码、程序已分配的内存以及其执行的当前状态，例如程序当前正在执行的函数的
    CPU 指令，以及其变量和内存分配的内容。


    通常，系统上同时运行着许多进程。这包括用户启动的应用程序（例如 iTunes 或 Safari），以及由操作系统自动启动且对用户无任何提示的进程。例如，Time
    Machine 备份服务将每小时自动运行一个后台进程来备份数据。甚至可能同时存在同一程序的多个实例，操作系统会将每个实例视为一个独立的进程。图 1-3 显示了
    Mac OS X 附带的 `Activity Monitor` 实用工具，可用于查看系统上运行的所有进程。


    ![images](img/0103.jpg)


    ***图 1-3.** Mac OS X 上的活动监视器，显示系统上运行的所有进程。将其与显示可见用户应用程序的 Dock 进行比较。*


    #### 进程地址空间


    尽管通常同时有许多进程在运行，但每个进程并不知道系统上其他进程的存在。事实上，如果没有明确的代码，一个进程无法与另一个进程交互或影响其行为。


    操作系统为每个进程提供了一段允许其运行的内存范围；这被称为进程的地址空间。地址空间是动态的，并在进程分配内存时随着执行而变化。如果某个进程试图读写其地址空间之外的内存地址，操作系统通常会终止该进程，并告知用户应用程序已崩溃。


    尽管受保护内存并非新概念，但它直到最近十年才出现在消费级桌面系统上。在 Mac OS X 之前，在 Mac OS 9 下运行的进程能够读写任何内存地址，即使该地址对应于由另一个进程分配或属于操作系统本身的缓冲区。


    在没有内存保护的情况下，应用程序能够绕过操作系统，并在未经另一个进程同意的情况下，基于直接修改该进程的内存和变量来实施自己的进程间通信方案。操作系统结构也是如此。例如，Mac
    OS 9 有一个内部全局变量，其中包含所有打开的 GUI 窗口的链表。尽管此链表名义上由操作系统拥有和操作，但应用程序能够在不调用操作系统的情况下遍历和修改该链表。


    没有内存保护时，操作系统容易受到用户应用程序中错误的影响。在具有内存保护的系统上运行的应用程序，最坏的情况下也只能破坏自身的内存和结构，但损害仅限于应用程序本身。在像
    Mac OS 9 这样没有内存保护的系统中，应用程序的一个错误可能会覆盖操作系统的内部结构，从而导致系统完全崩溃，并需要重新启动才能恢复。


    值得注意的是，在像 Mac OS X 这样的现代操作系统中，内核拥有自己的地址空间。这使得内核能够独立于所有运行的进程进行操作。在 Mac OS X 上，内核和所有已加载的内核扩展共享一个地址空间。这意味着，没有东西可以保护核心操作系统结构免于被有缺陷的驱动程序意外覆盖。与用户进程（可以简单地中止）不同，如果在内核中出现这种情况，整个系统会崩溃，计算机必须重新启动。这种类型的错误在
    Mac OS X 上表现为内核恐慌，在 Windows 上则表现为“蓝屏死机”。因此，内核扩展的开发人员需要小心管理内存，以确保所有内存访问都是有效的。

    '
- fmt: '#### Operating System Services


    With a modern operating system, there is a clear separation between the functions
    performed by the operating system and the functions performed by the application.
    Whenever a process wishes to perform a task such as allocating memory, reading
    data from disk, or sending data over a network, it needs to go through the operating
    system using a set of well-defined programming interfaces that are provided by
    the system. System functions such as `malloc()` and `read()` are examples of system
    calls that provide operating system services. These system calls may be made directly
    by the application or indirectly through a higher-level development framework
    such as the Cocoa framework on Mac OS X. Internally, the Cocoa framework is implemented
    on top of these same system calls, and accesses operating system services by invoking
    lower-level functions such as `read()`.


    However, because user processes have no direct access to hardware or to operating
    system structures, a call to a function such as `read()` needs to break out of
    the confines of the process''s address space. When a function call to an operating
    system service is made, control passes from the user application to the privileged
    section of the operating system, known as the kernel. Transferring control to
    the kernel is usually performed with the help of the CPU, which provides an instruction
    for this purpose. For example, the Intel CPU found in modern-day Macs provides
    a `syscall` instruction that jumps to a function that was set up when the operating
    system booted. This kernel function first needs to identify which system call
    the user process executed (determined by a value written to a CPU register by
    the calling process) and then reads the function parameters passed to the system
    call (again, set up by the calling process through CPU registers). The kernel
    then performs the function call on behalf of the user process and returns control
    to the process along with any result code. This is illustrated in Figure 1-4.


    ![images](images/0104.jpg)


    **Figure 1-4.** The flow of control in a system call


    The kernel is a privileged process and has the ability to perform operations that
    are not available to user processes, but are necessary for configuring the system.
    When control transfers to the kernel, such as following a system call, the CPU
    enters a privileged mode while kernel code is executed and then drops back to
    restricted privileges before returning to the user process.


    Since the kernel executes at a higher privilege level than the user process while
    it is executing a system call on behalf of the process, it needs to be careful
    that it doesn''t inadvertently cause a security breach. This could happen if the
    kernel were tricked into performing a task that the user process should not be
    allowed to do, such as being asked to open a file for which the user does not
    have read permission, or being provided with a destination buffer whose address
    is not within the process''s address space. In the first case, although the kernel
    process itself has permission to open any file on the system, because it is operating
    on behalf of a lesser-privileged user process, the request needs to be denied.
    In the second case, if the kernel were to access an invalid address, the result
    would be an unrecoverable error, which would lead to a kernel panic.


    Kernel errors are catastrophic, requiring the entire system to be rebooted. To
    prevent this from occurring, whenever the kernel performs a request on behalf
    of a user process, it needs to take care to validate the parameters that have
    been provided by the process and should not assume that they are valid. This applies
    to system calls implemented by the kernel and, as we will see in subsequent chapters,
    whenever a driver accepts a control request from a user process.


    #### Virtual Memory


    The RAM in a computer system is a limited resource, with all of the running processes
    on the system competing for a share of it. When there are multiple applications
    running on a system, it is not unusual for the total amount of memory allocated
    by all processes to exceed the amount of RAM on the system.


    An operating system that supports virtual memory allows a process to allocate
    and use more memory than the amount of RAM installed on the system; that is, the
    address space of a process is not constrained by the amount of physical RAM. With
    virtual memory, the operating system uses a backing store on secondary storage,
    such as the hard disk, to keep portions of a process address space that will not
    fit into RAM. The CPU, however, can still access only addresses that are resident
    in RAM, so the operating system must swap data between the disk backing store
    and RAM in response to memory accesses made by the process as it runs.


    At a particular time, a process may only need to reference a small subset of the
    total memory that has been allocated. This is known as the working set of the
    process and, as long as the operating system keeps this working set in RAM, there
    is negligible impact on the execution speed imposed by virtual memory. The working
    set is a dynamic entity, and it changes based on the data that is actively being
    used as the process runs. If a process accesses a memory address that is not resident
    in RAM, the corresponding data is read from the backing store on disk and brought
    into RAM. If there is no free RAM available to load the data into, some of the
    existing data in RAM will need to be swapped out to disk beforehand, thus freeing
    up physical RAM.


    Virtual memory is handled by the operating system. A user process plays no part
    in its implementation, and is unaware that portions of its address space are not
    in physical RAM or that data it has accessed needed to be swapped into main memory.


    A consequence of virtual memory is that the addresses used by a process do not
    correspond to addresses in physical RAM. This is apparent if you consider that
    a process''s address space may be larger than the amount of RAM on the system.
    Therefore, the addresses that a process reads from and writes to need to be translated
    from the process''s virtual address space into a physical RAM address. Since every
    memory access requires an address translation, this is performed by the CPU to
    minimize the impact on execution speed.


    Operating systems typically use a scheme known as "paging" to implement virtual
    to physical address translation. Under a paged memory scheme, physical memory
    is divided into fixed-sized blocks known as page frames. Most operating systems,
    including both Mac OS X and iOS, use a frame size of 4096 bytes. Similarly, the
    virtual address space of each process is divided into fixed-size blocks, known
    as pages. The number of bytes per page is always the same as the number of bytes
    per frame. Each page in a process can then be mapped to a frame in physical memory,
    as shown in [Figure 1-5](#Chapter01.html#fig_1_5).


    ![images](images/0105.jpg)


    **Figure 1-5.** The pages in a process''s address space can be mapped to any page
    frames in memory.


    Another advantage of virtual memory is it allows a buffer that occupies a contiguous
    range of pages in the process''s virtual address space to be spread over a number
    of discontiguous frames in physical memory, as seen in [Figure 1-5](#Chapter01.html#fig_1_5).
    This solves the problem of fragmentation of physical memory, since a process''s
    memory allocation can be spread over several physical memory segments and is not
    limited to the size of the longest contiguous group of physical page frames.'
