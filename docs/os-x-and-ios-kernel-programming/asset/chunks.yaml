    ### 摘要


    在本章中，我们：


    *   概述了 Mac OS X 和 iOS 操作系统。我们讨论了它们的一般背景和起源，特别关注了内核，这是本书的主要主题。

    *   审视了 XNU 内核，即 OS X 和 iOS 共用的内核。

    *   讨论了 XNU 内核的分层架构，它由三个主要组件构成：**Mach**、**BSD** 和 **I/O Kit**。Mach 层可视为最内层，最接近硬件，为内核的其他部分提供服务。Mach
    层提供的服务包括硬件抽象、虚拟内存和任务调度。

    *   讨论了 Mach 调度器的运作方式，以及任务与线程之间的区别。任务可被视为线程的容器，这些线程共享共同的地址空间以及其他资源，例如打开的文件。

    *   讨论了 Mach IPC，这是内核及其包含的各个层之间进行通信的机制。此外，我们还分解了在 Mach 中提供虚拟内存所涉及的各个组件，即：**VM
    映射**、**VM 映射条目**和 **VM 对象**。

    *   讨论了分页程序（pager）的作用和运作方式。

    *   讨论了 BSD 层，它源自 FreeBSD 操作系统，运行在 Mach 核心之上，但位于相同的内核地址空间内。它提供了应用程序用于与内核通信的接口，其中最重要的是系统调用。BSD
    层实现了网络协议栈，包括 TCP/IP 和其他协议。它还支持文件系统，例如在虚拟文件系统层（VFS，即文件系统的统一接口）之上实现的 HFS+。

    *   讨论了 I/O Kit，这是一个基于 C++ 的内核框架，用于编写设备驱动程序和其他扩展。`libkern` 库提供了许多实用函数和构建块，包括构成
    I/O Kit 基础的类集合，例如 `OSObject`。


    ## 第 3 章


    ## Xcode 与内核开发环境


    Apple 在关怀开发者方面有着良好记录，为他们提供了用于 Mac 和 iOS 平台开发的直观、用户友好的工具和 API。任何为 Mac 或 iPhone
    编写过应用软件的人都会熟悉面向对象的 Cocoa 框架，它提供了丰富的接口来支持图形用户界面和用户应用所需的其他服务。同样，内核开发者也可以使用专为辅助内核扩展任务而设计的
    API。对于驱动程序开发，Apple 提供了 I/O Kit，这是一个用于与硬件交互的面向对象框架。本章将讨论你入门内核开发所需的工具和框架，并包含一个构建和安装简单内核扩展的教程。


    ### 首选语言：C++


    几十年来，C 语言一直是*事实上的*系统级语言。实际上，C 语言最初就是作为编写不可移植汇编代码的替代方案而开发的，专门用于最初的 Unix 系统。XNU
    内核和许多 Mac OS X 核心服务都是用 C 语言编写的，而用于驱动程序开发的 I/O Kit 框架则是用 C++ 语言的一个子集编写的。Apple 选择
    C++ 用于 I/O Kit，是因为它是一种面向对象的语言，因此允许使用一种抽象物理硬件连接的驱动程序模型。Apple 也曾考虑过使用基于 Objective-C
    的框架来开发驱动程序，但最终确定了 C++。尽管 C++ 在应用软件开发中广泛使用，但 Mac OS X 仍然是少数几个允许并实际上鼓励在其内核中运行 C++
    代码的操作系统之一。然而，这并不意味着 Mac OS X 内核能够免疫那些使 C++ 代码在其他内核中产生问题的相同弊端。为了避免其中一些问题，Mac OS
    X 内核代码必须使用 C++ 提供的一个受限功能子集，称为**嵌入式 C++**。以下功能不可用：


    *   异常处理

    *   多继承

    *   模板

    *   运行时类型信息


    值得注意的是，由于嵌入式 C++ 是标准 C++ 语言的一个子集，任何为嵌入式 C++ 编写的代码都与常规的 C++ 编译器兼容。


    虽然从技术上讲，可以将这些语言特性包含在内核中，但 Apple 决定禁用它它们，因为它们会显著增加编译后代码的大小，从而增加内核的内存占用。禁用对异常的支持不仅是因为额外的代码大小，还因为未能捕获异常会导致内核恐慌。


    尽管标准的运行时类型信息被禁用，但 I/O Kit 确实提供了自己的有限实现，这将在下一章讨论。内核开发者还可以使用 C++ 运行时库的有限实现，并且由于语言对模板的支持被禁用，STL
    类也无法使用。


    作为一般规则，在编写基于 I/O Kit 框架的内核扩展时使用 C++，而其他所有内容（包括文件系统和底层网络代码的实现）则使用 C 语言。


    ### Xcode


    要开始开发内核扩展，你需要安装 Apple 的开发工具，即 Xcode。这些工具可以从 Mac App Store 获取。安装 Xcode 包后，会在硬盘根级别添加一个名为“Developer”的目录，其中包含了
    Mac OS X 和 iOS 开发所需的一切，包括：


    *   一个集成开发环境（Xcode 应用程序）

    *   用于 C、C++ 和 Objective-C 的编译器

    *   一个源代码调试器

    *   用于内核和应用开发的 API 和头文件

    *   用于衡量代码执行时间并识别性能瓶颈的分析工具

    *   用于检查连接到系统的硬件设备以及为每个设备加载的驱动程序的实用工具


    在这些工具中，Xcode 应用程序将是你编写内核扩展时花费大部分时间的地方，因为它提供了源代码编辑器和编译器的前端。图 3-1 展示了 Xcode 4 的用户界面。


    ![images](img/0301.jpg)


    **图 3-1.** *Xcode 4 用户界面*


    在底层，Xcode 是命令行编译器和调试器的前端。事实上，完全可以绕过 Xcode，直接在命令行上调用 GCC 来构建你的内核扩展。然而，正如我们将在下一节中看到的，Xcode
    提供了项目模板，这些模板会传递用于构建内核扩展的适当编译器标志。


    以前版本的 Xcode 使用 GCC 编译器；然而，从 Xcode 4 开始，一个基于 LLVM 的替代性现代编译器被提供为默认编译器。LLVM 编译器是由
    Apple 领导的开源项目，支持 Objective-C、C 和 C++。LLVM 的目标是提供比 GCC 更快的编译时间，并通过提供更清晰易读的警告和错误信息，以及允许由编译器自身执行的语义分析来驱动语法高亮和代码补全，从而提供与
    IDE（如 Xcode）的更紧密集成。


    ![images](img/square.jpg) **注意** 关于 Xcode 的更多信息，包括如何获取它的信息，可以在 [`http://developer.apple.com/xcode`](http://developer.apple.com/xcode)
    找到。

