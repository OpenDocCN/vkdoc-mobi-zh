  trans: '

    # 通用串行总线


    通用串行总线（USB）是一种无处不在的技术，广泛应用于各种产品中，尤其是计算机外设，包括鼠标、键盘、硬盘和打印机，以及几乎所有其他可连接到计算机的设备或装备。USB
    是一种规范，定义了设备（如打印机或手机）与主机（由计算机设备控制，如 Mac 或 iPad）之间的通信。USB 规范于 1996 年由包括康柏、DEC、IBM、英特尔、微软、NEC
    和北电在内的多家公司组成的联盟共同制定。其初衷是用一种通用连接器取代一系列连接器，从而更轻松地将外部设备连接到个人计算机。USB 规范目前为 3.0 版本。对
    3.0 的支持仍在逐步普及，而当前对 2.0 版本的支持最为广泛。苹果公司尚未发布能够支持最新 USB 3.0 规范的硬件，但自 OS X 之前的时代起，苹果计算机就已支持
    USB。iOS 系列的设备本身就是 USB 设备，但它们也可以充当 USB 主机。一个例子是 iPad，它可以作为 USB 设备（如数码相机）的主机。


    USB 基于主从系统，其中控制器（主机）与从设备进行通信。一个主机通常与一条总线保持一对一的关联。


    作为一名内核程序员，如果你负责为某硬件设备编写驱动程序，很大可能这个驱动是针对 USB 设备的。好消息是（至少对我们这些懒惰的程序员来说），如果你的设备符合
    USB 实施者论坛（USB-IF）定义的某一类别，那么即使没有驱动也能正常工作。例如，键盘和鼠标符合人机接口设备（HID）规范，这使得供应商无需提供驱动程序，因为操作系统已经具备可用于与这些设备通信的通用驱动程序。然而，供应商仍可选择开发驱动程序——例如，如果设备具有高级功能，比如鼠标上额外的可自定义按钮。


    本章将提供 USB 规范及架构的广泛概述。该规范的长度远超本书，因此显然无法进行详细讨论。我们将聚焦于为 USB 设备实现驱动程序时最重要的部分。我们还将讨论
    I/O Kit 提供的 USB 子系统架构，并提供一个虚构的 USB 设备驱动程序代码。值得一提的是，USB 驱动程序既可以在内核中编写，也可以在用户空间中编写。当驱动程序/设备可以被多个应用程序同时访问时，或者驱动程序的主要客户端是内核本身时，通常需要内核驱动程序。典型的内核实现设备包括存储、网络、音频和显示驱动程序，而打印机、鼠标和键盘的驱动则可以完全或部分由用户空间驱动程序处理。在本章中，我们将重点介绍
    USB 的一般概念，以及内核空间驱动程序的实现。关于用户空间驱动程序的讨论将在第 15 章中提供。


    ## USB 架构


    在 USB 系统中，主机控制器是主设备，USB 设备是从属设备。USB 拓扑结构以树状形式组织，形成一条总线，主机控制器作为根节点，并控制子设备。主机控制器负责协调总线上的活动，未经主机请求，设备无法在总线上执行
    I/O 或任何其他操作。


    树状结构借助集线器进行分支，这些集线器允许连接的设备成为总线的一部分，从而作为新分支扩展总线。一个集线器的子设备可以连接其他集线器——最多可达四层深度。根集线器通常嵌入并集成在主机控制器本身中。图
    8-1 展示了 MacBook 计算机的 USB 拓扑结构。


    ![图片](img/0801.jpg)


    ***图 8-1.** 系统信息显示 MacBook 的 USB 拓扑结构，已连接外部设备*


    图 8-1 中的系统有四个内置 USB 总线，但只有两条总线实际连接到外部 USB 端口。虽然大多数人将 USB 设备与外部设备联系起来，但 USB 也常用于与计算机系统中的固定内部设备通信。图
    8-1 中 MacBook 的前两条 USB 总线是笔记本内部总线，用于连接内置键盘、触控板和红外接收器。第二条内部总线连接到蓝牙 USB 主机控制器。这两条总线都是
    USB 1.1 总线，这没问题，因为连接到它们的设备带宽需求都较低。


    这台 MacBook 连接了两个外部 USB 设备：一个外部硬盘和一个 iPhone，每个设备都连接到系统的一个独立物理 USB 端口。虽然你可能认为外部
    USB 端口有自己专用的总线，但情况并非总是如此。正如你在图 8-1 中看到的，其中一条总线还连接了一个额外的 USB 设备，即内置的 iSight 摄像头。该摄像头所需的带宽超过了
    1.1 USB 总线/控制器所能提供的范围，因此它被连接到两个 USB 2.0 控制器之一，这很可能是为了避免为 iSight 单独设置一个控制器，从而节省空间、零件、成本以及电池电量。其缺点是，外部设备将与
    iSight 摄像头（当它被使用时）共享带宽。


    确切的 USB 拓扑结构因系统而异，这只是其组织方式的一个示例。


    USB 系统中的每条总线最多可支持 127 个设备，包括集线器设备（这些设备也属于 USB 设备）。USB 总线上的带宽在连接的设备之间共享，因此大量活跃设备的存在会显著降低性能，这就是为什么现在常见的做法是将物理
    USB 端口连接到独立的主机控制器上——每个控制器提供一条总线，而不是将所有端口连接到一个单一控制器。


    USB 设计为支持热插拔，这意味着系统可以在运行期间的任何时候处理设备的插入或移除，尽管根据设备类型，这未必总是安全的——最典型的例子是硬盘，如果在错误的时间拔掉，可能导致文件系统损坏。从开发者的角度来看，这意味着你的驱动程序代码需要设计成能够预判设备的接入或移除。


    USB 规范还支持通过总线为设备供电，这是相比旧式总线技术的一大优势，例如，它允许你只需将 iPhone 插入笔记本电脑即可为其充电，或者为硬盘等设备提供自供电。


    USB 的关键特征可总结如下：'
- fmt: '*   Single connector type for all devices, designed to replace a variety of
    older connectors, such as the `PS/2`.

    *   Ability to connect many devices to the same connector.

    *   `USB` buses can be expanded with the help of hubs, supporting up to 127 devices
    per bus.

    *   Devices are hot-pluggable.

    *   Devices can be powered by the bus, which enables them to be charted or fully
    powered through the bus, depending on power requirements.

    *   Bandwidth is shared between devices on a bus.

    *   A `USB` device is a slave device and cannot initiate any activity on the bus
    without the permission of the host.


    One key characteristic that sets the `USB` apart from traditional hardware architectures,
    such as the `PCI`, is that it does not directly generate system interrupts. The
    ability for a device to asynchronously notify the system of some event is essential
    for the operation of many types of common devices—for example, a network device
    that will notify the system each time a new network packet arrives, or a mouse
    or keyboard that relies on telling the system its current position or which key
    was pressed.


    A `USB` device can still provide interrupt-like capabilities, but it is not able
    to directly interrupt a `CPU` in the same way that a `PCI` device can. To receive
    an interrupt from a `USB` device, an interrupt transfer has to be issued to the
    device. Once the transfer is issued, and an event occurs, such as the arrival
    of a network packet, the `USB` device is not simply free to signal the host controller—it
    has to be polled by the host controller. A `USB` device can only interact on the
    bus if told to do so by the host. The host controller provides a maximum latency
    guarantee for interrupt transfers. The lowest achievable latency is 125 microseconds.
    A device can specify the desired interval for interrupt polling in its endpoint
    descriptors.


    It should be noted that although a `USB` device cannot directly interrupt a `CPU`
    itself, a `USB` host controller certainly can, and may do so in response to a
    completed interrupt transfer from a device. Most modern computer systems talk
    to `USB` controllers via `PCI`.


    ![images](images/square.jpg) **Tip** The USB specifications are governed by the
    USB Implementers Forum (USB-IF), a not-for-profit organization. Their website
    can be found at [`http://www.usb.org`](http://www.usb.org).


    #### USB Transfer Speeds


    The first iteration of the `USB` standard supported two speeds: a low speed, at
    1.5 Mbit/s, and a full speed, at 12 Mbit/s. Low speed devices are less susceptible
    to electromagnetic interference, and therefore these can be made cheaper, as they
    can be created using lower quality parts. This reduces the cost of simpler `USB`
    devices, which do not require the additional bandwidth needed for a full speed
    device. The `USB 2.0` standard included the full speed mode, capable of operating
    at speeds up to 480 Mbits/s, while also being backward compatible with `USB 1.0`.
    This made the `USB` competitive with the `Firewire` specification, which at the
    time operated at 400 Mbits/s (see [Table 8-1](#Chapter08.html#tab_8_1) for `USB`
    transfer speeds).


    ![images](images/t0801.jpg)


    The `USB 3.0` specification supports speeds up to 5 Gbits/s, and it was the fastest
    generally available external bus until `Thunderbolt` was released in 2011. Apple
    has so far not opted to include `USB 3.0` compatible devices in its computers,
    although there are third party offerings available for Macs that support `ExpressCard`
    or `PCI-Express`.


    #### Host Controllers


    Host controllers are governed by separate specifications that determine how the
    computer system will communicate with the host controller. Modern systems typically
    embed the `USB` host controller on the motherboard''s I/O controller (south bridge).
    Most host controllers have a `PCI` interface that is used by the system for communication
    with the controller. When a driver talks to a `USB` device, it does not do so
    directly—it talks to the host controller over `PCI`, although to the driver it
    looks as if it is communicating with the device directly, due to the object-oriented
    abstraction layer provided by the I/O Kit. The `USB` does not generate interrupts
    directly; however, the host controller uses both `DMA` and interrupts.


    Typically, a 32-bit x86 system has only 16 interrupt lines, and often as few as
    2–3 interrupt lines, available for use by external peripherals. The `USB` solves
    this problem, as the computer system needs only a single interrupt line to the
    `USB` host controller to communicate with all of the devices connected to the
    controller. The `USB` specifications standardize the way in which a host communicates
    with a `USB` device; however, there are several standards for how a computer system
    communicates with a host controller:


    *   *Universal Host Controller Interface (UHCI):* `UHCI` was developed by Intel.
    The `UHCI` specification supports `USB 1.x` devices at low and full speed.

    *   *Open Host Controller Interface (OHCI):* `OHCI` was developed by Microsoft
    and Compaq, among others, also for `USB 1.x` devices. The `OCHI` controller is
    *smarter* than `UHCI`, in that it has more logic embedded in the controller itself,
    as opposed to `UHCI`, which is simpler on a hardware level, but requires a more
    complicated host controller driver in the OS.

    *   *Enhanced Host Controller Interface (EHCI):* `EHCI` was created for `USB 2.0`
    and supports 480 Mbits/s high-speed devices. The `EHCI` does not handle `USB 1.x`
    devices, so it needs to incorporate a `UCHI`- or `OHCI`-based controller to handle
    devices based on the `1.x` series of specifications.

    *   *Extensible Host Controller Interface (xHCI):* `xHCI` was designed by Intel
    and supports the `USB 3.0` specification. It was designed as a unified host controller,
    making `EHCI`, `OHCI`, and `UHCI` redundant.


    It is not uncommon for a computer system to have several host controllers, each
    supporting a different host controller interface. For example, the MacBook in
    [Figure 8-1](#Chapter08.html#fig_8_1) has two `OHCI` controllers and two `EHCI`
    controllers for `USB 2.0` support. Mac OS X presently has controller drivers to
    support `OCHI`, `UHCI`, and `EHCI`, but not `xHCI`.


    **USB ON-THE-GO**


    An additional standard exists as part of the `USB 2.0` specification, called `USB
    On-The-Go (OTG)`. While embedded devices, such as mobile phones, typically act
    as `USB` (slave) devices, `USB OTG` allows for a role switch, with the mobile
    device itself acting as a `USB` host. The `USB OTG` only works between two devices
    and does not support hubs. The `iPad` is a good example of this, as the `iPad`
    can be connected to a computer system as a `USB` device. However, using a special
    adapter, the `iPad` can also act as a `USB` host, to which you can connect digital
    cameras or memory cards.'
