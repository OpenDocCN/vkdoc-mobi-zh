  trans: '

    ### 处理设备空闲状态


    驱动程序降低其设备电源状态的一个常见原因是，当设备在特定时间内未被访问时，减少其功耗。这涉及到为设备的空闲时段创建一个定时器。如果定时器超时且设备在此期间未被访问，驱动程序会将设备置于较低的电源状态。将设备置于较低电源状态后，下一次驱动程序需要访问设备时，它必须将硬件恢复至可用状态。由于这些操作对所有执行空闲省电模式的驱动程序来说都很常见，因此该功能已内置于
    I/O Kit 中，并通过 `IOService` 类提供给驱动程序开发者。


    驱动程序需要调用两种基本方法，让 I/O Kit 跟踪其设备何时空闲并降低其电源状态。


    - `setIdleTimerPeriod(period)`：安装一个在指定秒数过后超时的定时器。

    - `activityTickle(type, powerState)`：由驱动程序在每次访问设备前调用，用于将硬件最后被访问的时间告知 I/O Kit。


    `setIdleTimerPeriod()` 方法通常仅在驱动程序的 `start()` 方法中完成电源管理初始化后调用一次。一旦被调用，I/O Kit 会创建一个以指定超时时间（以秒为单位）运行的定时器。如果在此期间设备未被访问，I/O
    Kit 会将驱动程序的电源状态降低到当前电源级别以下的某个状态。如果设备在下一个空闲周期内仍处于非活动状态，驱动程序的电源状态会再次降低。在这两种情况下，驱动程序都会通过同一个方法
    `setPowerState()` 收到降低其电源状态的请求，这与本章前面“响应电源状态更改”一节中描述的所有电源请求变更的传递方式相同。这一过程会持续进行，直到设备被置于关闭状态（电源状态
    0）。


    当设备因不活动而导致电源状态降低时，I/O Kit 会使用 `changePowerStateToPriv()` 方法来设置电源状态。就像驱动程序自己调用了
    `changePowerStateToPriv()` 一样，设备新的电源状态不能低于通过公共方法 `changePowerStateTo()` 设置的值，也不能低于设备子节点所要求的电源状态。这意味着通过
    `changePowerStateTo()` 设置的公共电源级别决定了设备空闲时可被置于的最低电源状态。通常，使用空闲定时器的驱动程序会在其 `start()`
    方法中调用 `changePowerStateTo(0)`，从而允许空闲定时器将设备一路降至关闭状态。


    空闲定时器要求驱动程序在每次访问硬件设备时都告知 I/O Kit，否则空闲定时器会在设备正在使用时触发并降低其电源状态。为此，驱动程序在设备被使用时（通常在每次操作开始时）会调用
    `activityTickle()` 方法。`activityTickle()` 方法的签名如下所示：


    ```

    bool    activityTickle(unsigned long type, unsigned long stateNumber);

    ```


    `activityTickle()` 方法接受两个参数：一个类型（type）和一个电源状态序数（stateNumber），调用者使用它们来指定设备处理即将到来的操作所必须处于的最低电源级别。I/O
    Kit 在头文件 `IOKit/pwr_mgt/IOPM.h` 中为 `type` 参数提供了两个预定义值：


    - `kIOPMSubclassPolicy`

    - `kIOPMSuperclassPolicy1`


    `type` 参数定义了应由哪个实现来处理 `activityTickle()` 请求，是驱动程序本身（此时传递 `kIOPMSubclassPolicy`）还是
    `IOService` 超类（此时传递 `kIOPMSuperclassPolicy1`）。如果驱动程序希望提供 `activityTickle()` 的自定义实现，除了在每次调用
    `activityTickle()` 时传递 `kIOPMSubclassPolicy` 作为 `type` 参数外，还需要覆盖 `activityTickle()`
    方法的实现。


    然而，大多数驱动程序将能够使用 `IOService` 超类提供的 `activityTickle()` 默认实现。重要的是，希望使用默认实现的驱动程序，在每次调用
    `activityTickle()` 时必须为 `type` 参数传递 `kIOPMSuperclassPolicy1` 值，因为 `IOService`
    的实现会忽略任何其他值作为 `type` 参数传递的请求。


    `activityTickle()` 的默认实现会将设备的电源级别提升到由 `stateNumber` 参数指定的电源状态。在内部，`IOService`
    类通过调用 `changePowerStateToPriv()` 方法来提高设备的电源状态，驱动程序将通过其 `setPowerState()` 方法的调用接收到此请求。该方法返回的布尔值指示设备是否已经处于请求的电源状态；返回值为
    `true` 表示无需进行电源状态转换，而返回值为 `false` 表示需要提高设备的电源状态。


    由于 `activityTickle()` 方法是异步的，调用者务必等待驱动程序完成到目标电源状态的转换，并且不应在 `activityTickle()`
    方法返回时就假定设备已处于可用状态。关于驱动程序如何观察电源变化（包括其他驱动对象中的电源变化）的方法，将在下一节中解释。

    '
- fmt: '### 观察设备电源状态变化


    I/O Kit 允许驱动程序观察系统中任何设备的电源状态，并在设备驱动程序更改其电源状态时接收通知。例如，不属于电源平面但需要与电源管理驱动程序交互的驱动程序可以使用此功能。或者，这些通知允许通过诸如`changePowerStateToPriv()`或`activityTickle()`等方法发起自身电源状态更改的驱动程序，来确定电源更改何时完成。


    要接收其他驱动程序电源状态更改的通知，您的驱动程序必须注册对该驱动程序的电源状态的关注。`IOService`超类提供了两种方法来实现此目的：


    - `registerInterestedDriver(IOService* driver)`

    - `deRegisterInterestedDriver(IOService* driver)`


    这两种方法都在您感兴趣观察其电源状态的驱动程序对象上调用。方法的参数是接收通知的驱动程序，因此您通常会传递`this`指针。驱动程序可以随时调用这两种方法中的任意一种，以开始或停止接收其他驱动程序电源状态更改的通知。驱动程序在卸载前取消注册所有已安装的通知至关重要，否则可能导致内核恐慌。


    当驱动程序注册了对其他驱动程序电源状态更改的关注后，它将在设备开始转换到新电源状态之前收到一次通知，并在设备完成转换到新电源状态后收到另一次通知。这两个通知通过以下两种方法传递：


    - `IOReturn powerStateWillChangeTo(IOPMPowerFlags capabilities, unsigned long
    stateNumber, IOService* whatDevice)`

    - `IOReturn powerStateDidChangeTo(IOPMPowerFlags capabilities, unsigned long stateNumber,
    IOService* whatDevice)`


    这两种通知方法是希望接收通知的驱动程序实现的虚拟方法。`powerStateWillChangeTo()`通知在被观察驱动程序的`setPowerState()`方法调用之前传递。`powerStateDidChangeTo()`通知在被观察驱动程序的`setPowerState()`方法调用之后传递。两种方法都接收一组相同的参数。`capabilities`参数是被观察驱动程序正在转换到的`IOPMPowerState`中`capabilityFlags`位掩码的值。`stateNumber`参数是被观察驱动程序正在转换到的电源状态的索引。`whatDevice`参数是其电源状态正在被更改的驱动程序对象。


    处理任一通知后，驱动程序应返回`IOPMAckImplied`值。如果您的驱动程序希望异步处理通知，则可以从通知方法返回一个非零值，表示驱动程序完成请求所需的最大时间（以微秒为单位）。然后驱动程序可以在后台线程上继续处理通知；驱动程序完成通知后，应调用`acknowledgePowerChange()`方法通知
    I/O Kit 通知已处理。`acknowledgePowerChange()`方法可用于确认`willChange`和`didChange`两种通知。


    处理电源管理的驱动程序会自动注册对自身的关注，因此对于响应其自身电源状态更改的驱动程序，这两种通知方法也会被调用。然而，大多数驱动程序无需实现这两种通知方法，除非驱动程序正在观察其他设备的状态，因为驱动程序自身的电源更改应在`setPowerState()`方法中处理。相反，为此目的，I/O
    Kit 提供了另一种通知方法，当驱动程序自身的电源状态已更改且其所有子驱动程序都已确认电源更改时，该方法会被发送给该驱动程序。要接收此通知方法，驱动程序应实现以下虚拟方法：


    `void powerChangeDone (unsigned long previousStateNumber);`


    该方法在驱动程序处理完电源状态更改（通过`setPowerState()`方法）并且所有已注册关注该设备电源状态的驱动程序都已收到电源更改通知后发送。`powerChangeDone()`方法提供了一种便捷方式，供驱动程序确定其发起的电源状态更改是否已完成以及设备是否已变得可用。需要注意的是，传递给`powerChangeDone()`方法的参数是设备更改前的电源级别，而不是设备的新电源状态。要确定设备当前所处的电源状态，I/O
    Kit 提供了一个名为`getPowerState()`的访问器方法，如下所述：


    `UInt32 getPowerState(void);`'
  raw: '### Observing Device Power State Changes


    The I/O Kit allows a driver to observe the power state of any device in the system
    and to receive notifications when the device''s driver changes its power state.
    This can be used, for example, by a driver that is not part of the power plane
    but needs to interface with drivers that are power managed. Alternatively, these
    notifications allow a driver that initiates a change to its own power state through
    a method such as `changePowerStateToPriv()` or `activityTickle()` to determine
    when the power change has completed.


    To receive notifications when another driver''s power state changes, your driver
    must register for interest in that driver''s power state. The `IOService` superclass
    provides two methods for doing this:


    *   `registerInterestedDriver(IOService* driver)`

    *   `deRegisterInterestedDriver(IOService* driver)`


    Both of these methods are called on the driver object whose power state you are
    interested in observing. The parameter to the method is the driver that will receive
    the notifications, and so you will typically pass the “`this`” pointer. A driver
    can call either of these methods at any time to start and stop receiving notifications
    for changes to the power state of another driver. It is important that a driver
    deregister any notifications that are installed before it unloads; failure to
    do so could lead to a kernel panic.


    When a driver has registered interest in another driver''s power state changes,
    it will receive a notification before the device begins its transition to the
    new power state and another notification once the device has completed the transition
    to the new power state. These two notifications are delivered through the two
    methods described as follows:


    *   `IOReturn       powerStateWillChangeTo(IOPMPowerFlags capabilities,`


    `                     unsigned long stateNumber, IOService* whatDevice)`

    *   `IOReturn       powerStateDidChangeTo(IOPMPowerFlags capabilities,`


    `                     unsigned long stateNumber, IOService* whatDevice)`


    These two notification methods are virtual methods that are implemented by the
    driver that wishes to receive the notifications. The notification `powerStateWillChangeTo()`
    is delivered before the observed driver''s `setPowerState()` method is called.
    The notification `powerStateDidChangeTo()` is delivered after the observed driver''s
    `setPowerState()` method is called. Both methods are passed an identical set of
    arguments. The `capabilities` argument is the value of the `capabilityFlags` bitmask
    from the `IOPMPowerState` that the observed driver is transitioning to. The `stateNumber`
    argument is the index of the power state that the observed driver is transitioning
    to. The `whatDevice` argument is the driver object whose power state is being
    changed.


    After handling either notification, the driver should return a value of `IOPMAckImplied`.
    If your driver wishes to handle the notification asynchronously, it can return
    a non-zero value from the notification method that indicates the maximum amount
    of time (in microseconds) that the driver requires to complete the request. The
    driver can then continue processing the notification on a background thread; once
    the driver has completed the notification, it should call the method `acknowledgePowerChange()`
    to inform the I/O Kit that the notification has been handled. The method `acknowledgePowerChange()`
    can be called to acknowledge both the `willChange` and `didChange` notifications.


    A driver that handles power management will automatically register for interest
    in itself, and so the two notification methods will be called for a driver that
    is responding to a change in its power state. Most drivers, however, will have
    no need to implement these two notification methods unless the driver is observing
    the state of another device, since a driver''s own power changes should be handled
    within the `setPowerState()` method. Instead, for this purpose, the I/O Kit provides
    another notification method that is sent to a driver when its own power state
    has been changed and all of its children drivers have acknowledged the power change.
    To receive this notification method, a driver should implement the following virtual
    method:


    `void    powerChangeDone (unsigned long previousStateNumber);`


    The method is sent once the driver has handled the power state change (through
    the `setPowerState()` method) and all drivers that have registered an interest
    for the device''s power state have been notified of the power change. The `powerChangeDone()`
    method provides a convenient way for a driver to determine when a power state
    change that it initiated has been completed and the device has become usable.
    It is important to note the parameter that is passed to the `powerChangeDone()`
    method is the power level that the device changed from and not the new power state
    of the device. To determine the power state that the device is currently in, the
    I/O Kit provides an accessor method named `getPowerState()`, as described as follows:


    `UInt32  getPowerState(void);`'
