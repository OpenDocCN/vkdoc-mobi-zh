    `}`


    If the application had created a matching dictionary that specified an `IOUSBInterface`,
    each of the `io_service_t` values it receives would represent a kernel `IOUSBInterface`
    object and not an `IOUSBDevice` object. In this case, the user-space class the
    application would instantiate to represent the kernel object would be an `IOUSBInterfaceInterface`.
    This only requires one change to the parameters that are passed to two of the
    functions called in [Listing 15-3](#Chapter15.html#list_15_3). The call to `IOCreatePlugInInterfaceForService`
    would be called as follows.


    `err = IOCreatePlugInInterfaceForService(usbDeviceRef, kIOUSBInterfaceUserClientTypeID,`

    `                                                kIOCFPlugInInterfaceID, &plugin,
    &score);`


    Similarly, the call to `QueryInterface` on the returned `plugin` object would
    take the following parameters:


    `IOUSBInterfaceInterface300**            usbInterface = NULL;`

    `err = (*plugin)->QueryInterface(plugin,`

    `                        CFUUIDGetUUIDBytes(kIOUSBInterfaceInterfaceID300),`

    `                        (LPVOID)&usbInterface);`


    Whether the application is instantiating an `IOUSBDeviceInterface` or an `IOUSBInterfaceInterface`,
    the structure of the code is the same. In both cases, the first step is to call
    the function `IOCreatePlugInInterfaceForService()`, which returns an object that
    has the type `IOCFPlugInInterface`. This object serves as a factory for instantiating
    the user-space I/O Kit classes and serves no purpose once this has been done.
    In fact, as [Listing 15-3](#Chapter15.html#list_15_3) shows, the object is released
    with a call to `IODestroyPlugInInterface()` as soon as the `IOUSBDeviceInterface`
    object has been created.


    The `IOCFPlugInInterface` class contains a method named `QueryInterface()` that
    an application uses to receive a pointer to the `IOUSBDeviceInterface` or the
    `IOUSBInterfaceInterface` object. The IOUSBLib provides a way of versioning classes.
    This allows a future release of Mac OS X to extend a class, such as `IOUSBDeviceInterface,`
    to include additional functionality while maintaining backwards compatibility
    with applications that were written for an older version of the class.


    When an application requests an interface, such as `IOUSBDeviceInterface`, it
    must also specify the version of that class it expects to receive. The version
    of the class is part of the class name; for example, `IOUSBDeviceInterface300`
    identifies the version of the `IOUSBDeviceInterface` class included with the IOUSBFamily
    version 3.0.0\. This was shipped with Mac OS X 10.5\. A full set of the class
    names and their version, and the minimum version of the operating system required
    to support that class is provided in the `IOUSBLib.h` header file.


    ![images](images/square.jpg) **Tip** As a general rule, the version of the `IOUSBDeviceInterface`
    and `IOUSBInterfaceInterface` classes you should use will be tied to the minimum
    version of Mac OS X your application needs to support. For example, an application
    that requires Mac OS X 10.5 or later should use `IOUSBDeviceInterface300` and
    `IOUSBInterfaceInterface300`.


    One aspect of the user client classes that can take some time to get used to is
    that IOUSBLib returns a pointer to the object pointer. This means that before
    calling a method from the object, the variable holding the interface requires
    an additional dereference. Another idiosyncrasy of the IOUSBLib classes is that
    each method requires a reference to the object to be passed as the first parameter.
    For example, consider the method `QueryInterface()` implemented by the `IOCFPlugInInterface`
    class, although you would expect to call the method with the following line of
    code:


    `plugin->QueryInterface(parameters);     // INCORRECT`


    Instead, because the “`plugin`” variable will have the type `IOCFPlugInInterface**`
    and is therefore a pointer to a pointer, the method must actually be called using
    the following structure:


    `(*plugin)->QueryInterface(plugin, parameters);`


    ![images](images/square.jpg) **Note** If you are familiar with Microsoft''s Component
    Object Model (COM), you will instantly recognize the method name `QueryInterface()`.
    All IOUSBLib classes are based on the COM programming model and are derived from
    the base class `IUnknown`. The biggest impact of this design on an application
    using IOUSBLib is that all IOUSBLib objects are reference counted; they can be
    retained by calling the method `AddRef()` and can be released by calling the method
    `Release()`.


    ### Handling Asynchronous Operations


    As we will see in our later discussion of IOUSBLib classes, many methods perform
    operations that complete asynchronously. All such asynchronous methods take two
    parameters, a pointer to a callback function and a parameter named “`refcon`”
    that allows the application to pass an arbitrary context value to its callback.
    The callback function has the following signature:


    `void    MyCallbackFunction (void* refcon, IOReturn result, void* arg0);`


    The first parameter, `refcon`, is the application''s arbitrary context parameter.
    The second parameter reports the overall result of the operation; a value of `kIOReturnSuccess`
    indicates the operation completed successfully. The final argument, `arg0`, is
    provided by the IOUSBLib and is dependent on the type of operation performed.
    In this chapter, when we describe an asynchronous method, we will also describe
    the value passed by IOUSBLib to the callback function through the `arg0` parameter.


    Just as a kernel driver uses a work loop to synchronize its completion routines
    against other driver code, a user-space application can synchronize completion
    callbacks from IOUSBLib against the rest of its code using a run loop.


    To begin, an application must create a run loop source for the IOUSBLib class
    that will be performing asynchronous operations. The IOUSBLib classes contain
    methods for creating either a run loop source or a mach port to receive asynchronous
    notifications; however, most applications will need to work only with the run
    loop source.


    It''s important to note the IOUSBLib classes provide a method with the prefix
    “Create” and with the prefix “Get”(such as `CreateDeviceAsyncEventSource` and
    `GetDeviceAsyncEventSource`). However, the “Get” method will only return an object
    that has previously been initialized through the “Create” method. An example function
    to create and install a run loop source that will be used to receive asynchronous
    notifications from the `IOUSBDeviceInterface` class is shown in the following
    snippet.


    `IOReturn   InstallRunLoopSourceForUSBDevice (IOUSBDeviceInterface300** usbDevice)`

    `{`

    `     CFRunLoopSourceRef         runLoopSource;`

    `     IOReturn                   error;`


    `     error = (*usbDevice)->CreateDeviceAsyncEventSource(usbDevice, &runLoopSource);`

    `     if (error == kIOReturnSuccess)`

    `           CFRunLoopAddSource(CFRunLoopGetCurrent(), runLoopSource, kCFRunLoopDefaultMode);`


    `     return error;`

    `}`


    An application is free to install the run loop source on the run loop of any particular
    thread it wishes, including the run loop for the application''s main thread. The
    object ownership rules follow the same convention as all Core Foundation functions:
    If an application obtains an object from a “Create” method, it owns that object
    and is responsible for releasing it. If an application obtains an object from
    a “Get” method, it does not own a reference to that object, so if the application
    wishes to hold on to that object, it must explicitly retain the object first.'
