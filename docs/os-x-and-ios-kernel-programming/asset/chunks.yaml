    \ 17-2 中的程序后，您应看到以下结果：\n\n```\n$ sudo kextload HelloKernControl.kext\n\n$ sudo\
    \ ./hello_tool\nkernel string is: Hello World\n$ sudo ./hello_tool\nkernel string\
    \ is: Hello Kernel, here's your new string, enjoy!\n```\n\n### 在内核中处理进程\n\n内核的\
    \ BSD 部分提供了一个 KPI，用于获取系统中活动进程的信息。请注意，BSD 中使用的是术语*进程*，而 Mach 内核部分使用的是*任务*，尽管它们实际上指的是同一事物。\n\
    \n**内核私有 KPI**\n\n如果您在内核头文件中仔细查找，可能会遇到预处理器指令 `KERNEL_PRIVATE`。这些区域内定义的函数或其他符号不允许第三方内核扩展使用，即使包含了正确的头文件，尝试使用它们也会因无法解析的符号而导致该\
    \ KEXT 加载失败。Apple 自身的 KEXT 通过添加对 `com.apple.kpi.private` 的依赖来访问这些符号。如果您在自己的 KEXT\
    \ 中添加对此 KPI 的依赖，它将无法加载，因为只有 Apple 签名的 KEXT 才能使用它。\n\n在第 13 章的 AppWall 示例中，您已经看到如何获取进程信息的示例，当时我们使用了\
    \ `proc_selfname()` 函数来获取当前运行进程的进程名。如果该函数在内核拥有的线程中被调用，则会返回内核进程名称 `\"kernel_task\"\
    `。\n\n如果您需要知道当前运行进程的 PID 而不是名称，可以调用 `proc_selfpid()`。您也可以使用 `proc_name(int pid,\
    \ char * buf, int size)` 函数通过已知的 PID 来查找进程名称。表 17-1 概述了进程 KPI 中的函数。\n\n![images](img/t1701.jpg)\n\
    \n![images](img/t1701a.jpg)\n\n### 加载资源\n\nI/O Kit 不提供任何让驱动程序访问文件系统的类或函数。这是一个深思熟虑的设计决定，而非\
    \ I/O Kit 设计中的疏忽。理论上，驱动程序不应需要访问磁盘上的文件。驱动程序的作用是响应操作系统的请求以管理其硬件设备，而不是主动发起请求。然而，在实践中，驱动程序可能需要从文件系统访问数据的原因有很多。最常见的原因之一是读取资源数据，例如驱动程序硬件的固件数据。\n\
    \n尽管 I/O Kit 不允许常规的文件系统访问，但它确实提供了让驱动程序从其驱动程序包内的 \"Resources\" 目录访问文件的方法。I/O Kit\
    \ 的资源加载 API 定义在头文件 `<libkern/OSKextLib.h>` 中。该 API 是异步的：驱动程序请求加载其所需的资源，并提供一个回调函数，I/O\
    \ Kit 会在数据可用时通过该回调通知驱动程序。\n\n我们提到 I/O Kit 不提供常规的文件系统访问，但除此之外，I/O Kit 本身也无法访问文件系统。为了加载驱动程序的资源文件，I/O\
    \ Kit 依赖于一个用户空间辅助进程，该进程代表 I/O Kit 读取请求的文件，并将文件内容传回给 I/O Kit。然后 I/O Kit 通知发出请求的驱动程序。\n\
    \n由于 I/O Kit 依赖用户空间辅助进程来加载资源，因此在辅助进程启动之前，无法在启动过程中加载资源。然而，在大多数情况下，这不会对驱动程序造成问题，因为\
    \ I/O Kit 会将请求排队，直到辅助进程准备好从内核接收请求。\n\n驱动程序可以通过调用 `OSKextRequestResource()` 函数来请求\
    \ I/O Kit 从驱动程序的资源目录加载文件。该函数的定义如下：\n\n```c\nOSReturn OSKextRequestResource(const\
    \ char* kextIdentifier,\n                               const char* resourceName,\n\
    \                               OSKextRequestResourceCallback  callback,\n   \
    \                            void* context,\n                               OSKextRequestTag*\
    \ requestTagOut);\n```\n\n第一个参数 `kextIdentifier` 指定包含待加载资源的驱动程序的包标识符；这几乎总是由驱动程序\
    \ `Info.plist` 文件中的 `CFBundleIdentifier` 键指定的值。第二个参数 `resourceName` 是要从驱动程序包中加载的资源文件的名称。接下来的两个参数是回调函数和相关的上下文参数，该参数在资源加载完成后传递给回调函数。最后一个参数\
    \ `requestTagOut` 会立即返回给调用者，可用于跟踪加载资源的操作。\n\n如果对 `OSKextRequestResource()` 的调用成功，当请求完成时，驱动程序将通过其指定的回调函数收到通知。完成回调具有以下签名：\n\
    \n```c\ntypedef void (*OSKextRequestResourceCallback)(OSKextRequestTag requestTag,\n\
    \                                              OSReturn result,\n            \
    \                                  const void* resourceData,\n               \
    \                               uint32_t resourceDataLength,\n               \
    \                               void* context);\n```\n"
