- fmt: "### Understanding Kernel Panic Logs\n\nA panic log can be found in the `/Library/Logs/DiagnosticReports/`\
    \ directory after a crash or can be obtained by extracting it from a core dump\
    \ or a remote GDB session to a crashed target. As a kernel programmer, you might\
    \ be expected to analyze kernel panic logs sent from customers’ computers, which\
    \ you will rarely have physical access to. Furthermore, the customer may be reluctant\
    \ or unable to assist you in getting a core dump. It is therefore vital to be\
    \ able to understand and extract as much information as possible from the logs.\
    \ Let’s start to look at the panic log and what information we can extract from\
    \ it. A panic log for the `MyDebugDriver` crash discussed in the previous sections\
    \ is shown in [Listing 16-5](#Chapter16.html#list_16_5).\n\n**Listing 16-5.**\
    \ Panic Log from `MyDebugDriver` Crash\n\n```\npanic(cpu 1 caller 0xffffff80002c268d):\
    \ Kernel trap at 0xffffff7f81345570, type 14=page fault,\nregisters:\nCR0: 0x000000008001003b,\
    \ CR2: 0x0000000000000090, CR3: 0x0000000000100000, CR4:\n0x0000000000000660\n\
    RAX: 0x0000000000000000, RBX: 0x0000000000000000, RCX: 0x0000000000000000, RDX:\n\
    0x000000000000beef\nRSP: 0xffffff808e973e80, RBP: 0xffffff808e973ea0, RSI: 0x000000000000feed,\
    \ RDI:\n0xffffff801ab61100\nR8:  0x0000000000001504, R9:  0x000000000000beef,\
    \ R10: 0x0000000000000000, R11:\n0x0000000000001504\nR12: 0xffffff7f8134591a,\
    \ R13: 0xffffff800c81d200, R14: 0xffffff800c81d200, R15:\n0xffffff800b735880\n\
    RFL: 0x0000000000010246, RIP: 0xffffff7f81345570, CS:  0x0000000000000008, SS:\n\
    0x0000000000000010\nCR2: 0x0000000000000090, Error code: 0x0000000000000002, Faulting\
    \ CPU: 0x1\n\nBacktrace (CPU 1), Frame : Return Address\n0xffffff808e973b40 :\
    \ 0xffffff8000220702\n0xffffff808e973bc0 : 0xffffff80002c268d\n0xffffff808e973d60\
    \ : 0xffffff80002d7a3d\n0xffffff808e973d80 : 0xffffff7f81345570\n0xffffff808e973ea0\
    \ : 0xffffff7f813458b6\n0xffffff808e973ed0 : 0xffffff7f81345914\n0xffffff808e973f00\
    \ : 0xffffff7f813459f4\n0xffffff808e973f40 : 0xffffff800063bc61\n0xffffff808e973f70\
    \ : 0xffffff800023dafc\n0xffffff808e973fb0 : 0xffffff8000820057\n      Kernel\
    \ Extensions in backtrace:\n         com.osxkernel.MyDebugDriver(1.0)[FF6F45C8-68F8-3150-9C43-\n\
    99A2F19B3FB1]@0xffffff7f81345000->0xffffff7f81348fff\n\nBSD process name corresponding\
    \ to current thread: kernel_task\nBoot args: debug=0xd44 _panicd_ip=192.168.1.1\
    \ panicd_ip=192.168.1.1\n\nMac OS version:\n11A511\n\nKernel version:\nDarwin\
    \ Kernel Version 11.0.0: Sat Jun 18 12:56:35 PDT 2011; root:xnu-\n1699.22.73~1/RELEASE_X86_64\n\
    Kernel UUID: 24CC17EB-30B0-3F6C-907F-1A9B2057AF78\nSystem model name: MacBook5,1\
    \ (Mac-F42D89C8)\n\nSystem uptime in nanoseconds: 200305435891999\nlast loaded\
    \ kext at 200285007562702: com.osxkernel.MyDebugDriver  1 (addr 0xffffff7f81345000,\n\
    size 16384)\nlast unloaded kext at 187374587106276: com.apple.driver.AppleUSBCDC\
    \     4.1.15 (addr\n0xffffff7f8133d000, size 12288)\nloaded kexts:\ncom.osxkernel.MyDebugDriver\
    \  1\ncom.apple.driver.AppleUSBDisplays   302.1.2\ncom.apple.driver.AppleIntelProfile\
    \  83\ncom.apple.filesystems.afpfs 9.8\n```\n\nThe panic log in [Listing 16-5](#Chapter16.html#list_16_5)\
    \ was generated on a different system than before. This system is running a newer\
    \ version of Mac OS X Lion, which only runs the 64-bit version of the kernel.\
    \ The panic log consists of the following elements:\n\n- The type of panic/problem\
    \ that occurred and the CPU (core) number it occurred on\n- A dump of the CPU\
    \ state (register values)\n- Back trace of what the CPU was doing at the time\
    \ of the crash\n- Kernel extensions involved in the crash and their dependencies\
    \ (none above)\n- The name of the process (task) that caused the crash\n- Kernel\
    \ build and version numbers\n- System model\n- Information about recently loaded/unloaded\
    \ KEXTs\n- A complete list of KEXTs loaded\n\nThe first thing you may notice is\
    \ that the panic was caused by a *page fault*, which gives us a clue about what\
    \ to look for later in our code. It is often useful to look at the task that caused\
    \ the problem as well. In this case, our driver was executing in kernel context\
    \ (`kernel_task`) when the crash occurred and not on the behalf of a user space\
    \ thread.\n\nFirst let’s look at the back trace and try to prove that our driver\
    \ was indeed involved. There is a very good chance that it was, as our driver\
    \ is listed as being part of the back trace. You will also notice two addresses\
    \ after our driver: `0xffffff7f81345000->0xffffff7f81348fff`. This is the load\
    \ address where the instructions and data for our KEXT were loaded into the kernel’s\
    \ address space. To determine which functions on the stack belong to our driver,\
    \ we can simply look for addresses on the stack that are within that range. Four\
    \ addresses can be identified—`0xffffff7f81345570`, `0xffffff7f813458b6`, `0xffffff7f81345914`,\
    \ and `0xffffff7f813459f4`.\n\nWe already know from earlier that they will most\
    \ likely correspond to `testFunc3()`, `testFunc2()`, `testFunc1()`, and `timerFired()`.\n\
    \n![images](images/square.jpg) **Tip** In the previous back trace, the first address\
    \ in the column is the address of the stack frame entry, while the second address\
    \ is the return address, which is the point where execution returns to when the\
    \ previous function call completes. It’s the return address that is interesting\
    \ to us in this case. You may notice that the stack frame addresses contain increasing\
    \ addresses and are all within a single page in this case. If the values look\
    \ random and all over the place, it is likely the stack frame has been corrupted\
    \ and the back trace may then be useless as the information cannot be trusted.\n\
    \nAssuming we had no clue what functions the addresses corresponded to within\
    \ our driver, we can employ a simple trick. By simply subtracting the address\
    \ of one of the functions from the load address, we can determine the offset of\
    \ the function in the executable image of the driver, as follows:\n\n```\n0xffffff7f81345570\
    \ - 0xffffff7f81345000 = 1392 bytes\n```\n\nWe now know that the function is 1392\
    \ bytes from the start of the KEXT and assuming we have the executable image (the\
    \ exact version and build that was involved in the crash) of the driver available,\
    \ we can do the following:\n\n```\n$ gdb MyDebugDriver.kext/Contents/MacOS/MyDebugDriver\n\
    GNU gdb 6.3.50-20050815 (Apple version gdb-1704) (Thu Jun 23 10:48:29 UTC 2011)\n\
    This GDB was configured as \"x86_64-apple-darwin\"...\n(gdb) disassemble 1392\n\
    Dump of assembler code for function _ZN27com_osxkernel_MyDebugDriver9testFunc3Ejjjj:\n\
    0x0000000000000540 <testFunc3Ejjjj+0>:       push   %rbp\n0x0000000000000541 <testFunc3Ejjjj+1>:\
    \       mov    %rsp,%rbp\n0x0000000000000544 <testFunc3Ejjjj+4>:       sub   \
    \ $0x20,%rsp\n0x0000000000000548 <testFunc3Ejjjj+8>:       mov    %rdi,-0x8(%rbp)\n\
    0x000000000000054c <testFunc3Ejjjj+12>:      mov    %esi,-0xc(%rbp)\n0x000000000000054f\
    \ <testFunc3Ejjjj+15>:      mov    %edx,-0x10(%rbp)\n0x0000000000000552 <testFunc3Ejjjj+18>:\
    \      mov    %ecx,-0x14(%rbp)\n0x0000000000000555 <testFunc3Ejjjj+21>:      mov\
    \    %r8d,-0x18(%rbp)\n0x0000000000000559 <testFunc3Ejjjj+25>:      mov    -0x14(%rbp),%eax\n\
    0x000000000000055c <testFunc3Ejjjj+28>:      cmp    $0x0,%eax\n0x000000000000055f\
    \ <testFunc3Ejjjj+31>:      jne    0x576 <_ZN27com_osxkernel_MyDebugDriver9testFunc3Ejjjj+54>\n\
    ...\nEnd of assembler dump.\n(gdb) info line *1392\nLine 14 of \"MyDebugDriver.cpp\"\
    \ starts at address 0x569\n<_ZN27com_osxkernel_MyDebugDriver9testFunc3Ejjjj+41>\
    \ and ends at 0x576\n<_ZN27com_osxkernel_MyDebugDriver9testFunc3Ejjjj+54>.\n```"
  raw: '##### Understanding Kernel Panic Logs


    A panic log can be found in the `/Library/Logs/DiagnosticReports/` directory after
    a crash or can be obtained by extracting it from a core dump or a remote GDB session
    to a crashed target. As a kernel programmer, you might be expected to analyze
    kernel panic logs sent from customers’ computers, which you will rarely have,
    physical access to. Furthermore, the customer may be reluctant or unable to assist
    you in getting a core dump. It is therefore vital to be able to understand and
    extract as much information as possible from the logs. Let’s start to look at
    the panic log and what information we can extract from it. A panic log for the
    MyDebugDriver crash discussed in the previous sections is shown in [Listing 16-5](#Chapter16.html#list_16_5).


    ***Listing 16-5.** Panic Log from MyDebugDriver Crash*


    `panic(cpu 1 caller 0xffffff80002c268d): Kernel trap at 0xffffff7f81345570, type
    14=page fault,`

    `registers:`

    `CR0: 0x000000008001003b, CR2: 0x0000000000000090, CR3: 0x0000000000100000, CR4:`

    `0x0000000000000660`

    `RAX: 0x0000000000000000, RBX: 0x0000000000000000, RCX: 0x0000000000000000, RDX:`

    `0x000000000000beef`

    `RSP: 0xffffff808e973e80, RBP: 0xffffff808e973ea0, RSI: 0x000000000000feed, RDI:`

    `0xffffff801ab61100`

    `R8:  0x0000000000001504, R9:  0x000000000000beef, R10: 0x0000000000000000, R11:`

    `0x0000000000001504`

    `R12: 0xffffff7f8134591a, R13: 0xffffff800c81d200, R14: 0xffffff800c81d200, R15:`

    `0xffffff800b735880`

    `RFL: 0x0000000000010246, RIP: 0xffffff7f81345570, CS:  0x0000000000000008, SS:`

    `0x0000000000000010`

    `CR2: 0x0000000000000090, Error code: 0x0000000000000002, Faulting CPU: 0x1`


    `Backtrace (CPU 1), Frame : Return Address`

    `0xffffff808e973b40 : 0xffffff8000220702`

    `0xffffff808e973bc0 : 0xffffff80002c268d`

    `0xffffff808e973d60 : 0xffffff80002d7a3d`

    `0xffffff808e973d80 : 0xffffff7f81345570`

    `0xffffff808e973ea0 : 0xffffff7f813458b6`

    `0xffffff808e973ed0 : 0xffffff7f81345914`

    `0xffffff808e973f00 : 0xffffff7f813459f4`

    `0xffffff808e973f40 : 0xffffff800063bc61`

    `0xffffff808e973f70 : 0xffffff800023dafc`

    `0xffffff808e973fb0 : 0xffffff8000820057`

    `      Kernel Extensions in backtrace:`

    `         com.osxkernel.MyDebugDriver(1.0)[FF6F45C8-68F8-3150-9C43-`

    `99A2F19B3FB1]@0xffffff7f81345000->0xffffff7f81348fff`


    `BSD process name corresponding to current thread: kernel_task`

    `Boot args: debug=0xd44 _panicd_ip=192.168.1.1 panicd_ip=192.168.1.1`


    `Mac OS version:`

    `11A511`


    `Kernel version:`

    `Darwin Kernel Version 11.0.0: Sat Jun 18 12:56:35 PDT 2011; root:xnu-`

    `1699.22.73~1/RELEASE_X86_64`

    `Kernel UUID: 24CC17EB-30B0-3F6C-907F-1A9B2057AF78`

    `System model name: MacBook5,1 (Mac-F42D89C8)`


    `System uptime in nanoseconds: 200305435891999`

    `last loaded kext at 200285007562702: com.osxkernel.MyDebugDriver  1 (addr 0xffffff7f81345000,`

    `size 16384)`

    `last unloaded kext at 187374587106276: com.apple.driver.AppleUSBCDC     4.1.15
    (addr`

    `0xffffff7f8133d000, size 12288)`

    `loaded kexts:`

    `com.osxkernel.MyDebugDriver  1`

    `com.apple.driver.AppleUSBDisplays   302.1.2`

    `com.apple.driver.AppleIntelProfile  83`

    `com.apple.filesystems.afpfs 9.8`


    The panic log in [Listing 16-5](#Chapter16.html#list_16_5) was generated on a
    different system than before. This system is running a newer version of Mac OS
    X Lion, which only runs the 64-bit version of the kernel. The panic log consists
    of the following elements:


    *   The type of panic/problem that occurred and the CPU (core) number it occurred
    on

    *   A dump of the CPU state (register values)

    *   Back trace of what the CPU was doing at the time of the crash

    *   Kernel extensions involved in the crash and their dependencies (none above)

    *   The name of the process (task) that caused the crash

    *   Kernel build and version numbers

    *   System model

    *   Information about recently loaded/unloaded KEXTs

    *   A complete list of KEXTs loaded


    The first thing you may notice is that the panic was caused by a *page fault*,
    which gives us a clue about what to look for later in our code. It is often useful
    to look at the task that caused the problem as well. In this case, our driver
    was executing in kernel context (kernel_task*)* when the crash occurred and not
    on the behalf of a user space thread.


    First let’s look at the back race and try to prove that our driver was indeed
    involved. There is a very good chance that it was, as our driver is listed as
    being part of the back trace. You will also notice two addresses after our driver:
    0xffffff7f81345000->0xffffff7f81348fff. This is the load address where the instructions
    and data for our KEXT were loaded into the kernel’s address space. To determine
    which functions on the stack belong to our driver, we can simply look for addresses
    on the stack that are within that range. Four addresses can be identified—0xffffff7f81345570,
    0xffffff7f813458b6, 0xffffff7f81345914, and 0xffffff7f813459f4.


    We already know from earlier that they will most likely correspond to `testFunc3()`,
    `testFunc2()`, `testFunc1()`, and `timerFired()`.


    ![images](images/square.jpg) **Tip** In the previous back trace, the first address
    in the column is the address of the stack frame entry, while the second address
    is the return address, which is the point where execution returns to when the
    previous function call completes. It’s the return address that is interesting
    to us in this case. You may notice that the stack frame addresses contain increasing
    addresses and are all within a single page in this case. If the values look random
    and all over the place, it is likely the stack frame has been corrupted and the
    back trace may then be useless as the information cannot be trusted.


    Assuming we had no clue what functions the addresses corresponded to within our
    driver, we can employ a simple trick. By simply subtracting the address of one
    of the functions from the load address, we can determine the offset of the function
    in the executable image of the driver, as follows:


    * * *


    `0xffffff7f81345570 - 0xffffff7f81345000 = 1392 bytes`


    * * *


    We now know that the function is 1392 bytes from the start of the KEXT and assuming
    we have the executable image (the exact version and build that was involved in
    the crash) of the driver available, we can do the following:


    `$` **`gdb MyDebugDriver.kext/Contents/MacOS/MyDebugDriver`**

    `GNU gdb 6.3.50-20050815 (Apple version gdb-1704) (Thu Jun 23 10:48:29 UTC 2011)`

    `This GDB was configured as "x86_64-apple-darwin"...`

    `(gdb)` **`disassemble 1392`**

    `Dump of assembler code for function _ZN27com_osxkernel_MyDebugDriver9testFunc3Ejjjj:`

    `0x0000000000000540 <testFunc3Ejjjj+0>:       push   %rbp`

    `0x0000000000000541 <testFunc3Ejjjj+1>:       mov    %rsp,%rbp`

    `0x0000000000000544 <testFunc3Ejjjj+4>:       sub    $0x20,%rsp`

    `0x0000000000000548 <testFunc3Ejjjj+8>:       mov    %rdi,-0x8(%rbp)`

    `0x000000000000054c <testFunc3Ejjjj+12>:      mov    %esi,-0xc(%rbp)`

    `0x000000000000054f <testFunc3Ejjjj+15>:      mov    %edx,-0x10(%rbp)`

    `0x0000000000000552 <testFunc3Ejjjj+18>:      mov    %ecx,-0x14(%rbp)`

    `0x0000000000000555 <testFunc3Ejjjj+21>:      mov    %r8d,-0x18(%rbp)`

    `0x0000000000000559 <testFunc3Ejjjj+25>:      mov    -0x14(%rbp),%eax`

    `0x000000000000055c <testFunc3Ejjjj+28>:      cmp    $0x0,%eax`

    `0x000000000000055f <testFunc3Ejjjj+31>:      jne    0x576 <_ZN27com_osxkernel_MyDebugDriver9testFunc3Ejjjj+54>`

    `…`

    `End of assembler dump.`

    `(gdb)` **`info line *1392`**

    `Line 14 of "MyDebugDriver.cpp" starts at address 0x569`

    `<_ZN27com_osxkernel_MyDebugDriver9testFunc3Ejjjj+41> and ends at 0x576`

    `<_ZN27com_osxkernel_MyDebugDriver9testFunc3Ejjjj+54>.`'
  trans: "\n### 理解内核恐慌日志\n\n在系统崩溃后，可以在 `/Library/Logs/DiagnosticReports/` 目录中找到恐慌日志，或者可以通过从核心转储或远程\
    \ GDB 会话中提取崩溃目标信息来获取。作为一名内核程序员，你可能需要分析从客户计算机发送来的内核恐慌日志，而这些计算机你很少能进行物理访问。此外，客户可能不愿意或无法协助你获取核心转储。因此，能够理解并从日志中提取尽可能多的信息至关重要。现在，让我们开始查看恐慌日志以及我们可以从中提取哪些信息。之前章节讨论的\
    \ `MyDebugDriver` 崩溃的恐慌日志如代码清单 16-5 所示。\n\n**代码清单 16-5.** `MyDebugDriver` 崩溃的恐慌日志\n\
    \n```\npanic(cpu 1 caller 0xffffff80002c268d): Kernel trap at 0xffffff7f81345570,\
    \ type 14=page fault,\nregisters:\nCR0: 0x000000008001003b, CR2: 0x0000000000000090,\
    \ CR3: 0x0000000000100000, CR4:\n0x0000000000000660\nRAX: 0x0000000000000000,\
    \ RBX: 0x0000000000000000, RCX: 0x0000000000000000, RDX:\n0x000000000000beef\n\
    RSP: 0xffffff808e973e80, RBP: 0xffffff808e973ea0, RSI: 0x000000000000feed, RDI:\n\
    0xffffff801ab61100\nR8:  0x0000000000001504, R9:  0x000000000000beef, R10: 0x0000000000000000,\
    \ R11:\n0x0000000000001504\nR12: 0xffffff7f8134591a, R13: 0xffffff800c81d200,\
    \ R14: 0xffffff800c81d200, R15:\n0xffffff800b735880\nRFL: 0x0000000000010246,\
    \ RIP: 0xffffff7f81345570, CS:  0x0000000000000008, SS:\n0x0000000000000010\n\
    CR2: 0x0000000000000090, Error code: 0x0000000000000002, Faulting CPU: 0x1\n\n\
    Backtrace (CPU 1), Frame : Return Address\n0xffffff808e973b40 : 0xffffff8000220702\n\
    0xffffff808e973bc0 : 0xffffff80002c268d\n0xffffff808e973d60 : 0xffffff80002d7a3d\n\
    0xffffff808e973d80 : 0xffffff7f81345570\n0xffffff808e973ea0 : 0xffffff7f813458b6\n\
    0xffffff808e973ed0 : 0xffffff7f81345914\n0xffffff808e973f00 : 0xffffff7f813459f4\n\
    0xffffff808e973f40 : 0xffffff800063bc61\n0xffffff808e973f70 : 0xffffff800023dafc\n\
    0xffffff808e973fb0 : 0xffffff8000820057\n      Kernel Extensions in backtrace:\n\
    \         com.osxkernel.MyDebugDriver(1.0)[FF6F45C8-68F8-3150-9C43-\n99A2F19B3FB1]@0xffffff7f81345000->0xffffff7f81348fff\n\
    \nBSD process name corresponding to current thread: kernel_task\nBoot args: debug=0xd44\
    \ _panicd_ip=192.168.1.1 panicd_ip=192.168.1.1\n\nMac OS version:\n11A511\n\n\
    Kernel version:\nDarwin Kernel Version 11.0.0: Sat Jun 18 12:56:35 PDT 2011; root:xnu-\n\
    1699.22.73~1/RELEASE_X86_64\nKernel UUID: 24CC17EB-30B0-3F6C-907F-1A9B2057AF78\n\
    System model name: MacBook5,1 (Mac-F42D89C8)\n\nSystem uptime in nanoseconds:\
    \ 200305435891999\nlast loaded kext at 200285007562702: com.osxkernel.MyDebugDriver\
    \  1 (addr 0xffffff7f81345000,\nsize 16384)\nlast unloaded kext at 187374587106276:\
    \ com.apple.driver.AppleUSBCDC     4.1.15 (addr\n0xffffff7f8133d000, size 12288)\n\
    loaded kexts:\ncom.osxkernel.MyDebugDriver  1\ncom.apple.driver.AppleUSBDisplays\
    \   302.1.2\ncom.apple.driver.AppleIntelProfile  83\ncom.apple.filesystems.afpfs\
    \ 9.8\n```\n\n代码清单 16-5 中的恐慌日志是在与之前不同的系统上生成的。这个系统运行的是更新的 Mac OS X Lion 版本，该系统仅运行\
    \ 64 位版本的内核。该恐慌日志包含以下元素：\n\n- 发生的恐慌/问题的类型以及发生问题的 CPU（核心）编号\n- CPU 状态的转储（寄存器值）\n\
    - 崩溃时 CPU 正在执行的回溯信息\n- 崩溃中涉及的内核扩展及其依赖关系（上面没有）\n- 导致崩溃的进程（任务）名称\n- 内核构建版本和版本号\n\
    - 系统型号\n- 关于最近加载/卸载的 KEXT 的信息\n- 已加载的 KEXT 的完整列表\n\n你可能首先注意到，这次恐慌是由*页面错误*引起的，这为我们提供了后续在代码中应查找哪些内容的线索。同时，查看导致问题的任务也通常很有用。在这个例子中，崩溃发生时我们的驱动程序是在内核上下文（`kernel_task`）中执行的，而非代表用户空间线程执行。\n\
    \n首先，让我们查看回溯信息，并尝试证明我们的驱动程序确实涉及其中。我们的驱动程序被列为回溯信息的一部分，因此它极有可能与此有关。你还将注意到我们的驱动程序后面有两个地址：`0xffffff7f81345000->0xffffff7f81348fff`。这是加载地址，我们的\
    \ KEXT 的指令和数据被加载到了内核地址空间的这个位置。要确定栈上的哪些函数属于我们的驱动程序，我们可以简单地查找栈上在该范围内的地址。可以识别出四个地址——`0xffffff7f81345570`、`0xffffff7f813458b6`、`0xffffff7f81345914`\
    \ 和 `0xffffff7f813459f4`。\n\n之前我们已经知道，它们很可能对应 `testFunc3()`、`testFunc2()`、`testFunc1()`\
    \ 和 `timerFired()`。\n\n![images](img/square.jpg) **提示** 在上一个回溯信息中，列中的第一个地址是栈帧条目的地址，而第二个地址是返回地址，即当上一个函数调用完成时执行返回到的位置。在这个场景下，我们感兴趣的是返回地址。你可能会注意到，栈帧地址包含递增的地址，并且在这个例子中它们都在单个页面内。如果这些值看起来随机且分散在各地，很可能栈帧已损坏，那么回溯信息可能就没用了，因为这些信息不值得信赖。\n\
    \n假设我们完全不知道这些地址对应驱动程序中的哪些函数，我们可以使用一个简单的技巧。只需将其中一个函数的地址减去加载地址，就可以确定该函数在驱动程序可执行映像中的偏移量，如下所示：\n\
    \n```\n0xffffff7f81345570 - 0xffffff7f81345000 = 1392 字节\n```\n\n现在我们知道了该函数位于\
    \ KEXT 起始位置偏移 1392 字节处，假设我们有该驱动程序的可用可执行映像（与崩溃中涉及的确切版本和构建一致），我们可以执行以下操作：\n\n```\n\
    $ gdb MyDebugDriver.kext/Contents/MacOS/MyDebugDriver\nGNU gdb 6.3.50-20050815\
    \ (Apple version gdb-1704) (Thu Jun 23 10:48:29 UTC 2011)\nThis GDB was configured\
    \ as \"x86_64-apple-darwin\"...\n(gdb) disassemble 1392\nDump of assembler code\
    \ for function _ZN27com_osxkernel_MyDebugDriver9testFunc3Ejjjj:\n0x0000000000000540\
    \ <testFunc3Ejjjj+0>:       push   %rbp\n0x0000000000000541 <testFunc3Ejjjj+1>:\
    \       mov    %rsp,%rbp\n0x0000000000000544 <testFunc3Ejjjj+4>:       sub   \
    \ $0x20,%rsp\n0x0000000000000548 <testFunc3Ejjjj+8>:       mov    %rdi,-0x8(%rbp)\n\
    0x000000000000054c <testFunc3Ejjjj+12>:      mov    %esi,-0xc(%rbp)\n0x000000000000054f\
    \ <testFunc3Ejjjj+15>:      mov    %edx,-0x10(%rbp)\n0x0000000000000552 <testFunc3Ejjjj+18>:\
    \      mov    %ecx,-0x14(%rbp)\n0x0000000000000555 <testFunc3Ejjjj+21>:      mov\
    \    %r8d,-0x18(%rbp)\n0x0000000000000559 <testFunc3Ejjjj+25>:      mov    -0x14(%rbp),%eax\n\
    0x000000000000055c <testFunc3Ejjjj+28>:      cmp    $0x0,%eax\n0x000000000000055f\
    \ <testFunc3Ejjjj+31>:      jne    0x576 <_ZN27com_osxkernel_MyDebugDriver9testFunc3Ejjjj+54>\n\
    ...\nEnd of assembler dump.\n(gdb) info line *1392\nLine 14 of \"MyDebugDriver.cpp\"\
    \ starts at address 0x569\n<_ZN27com_osxkernel_MyDebugDriver9testFunc3Ejjjj+41>\
    \ and ends at 0x576\n<_ZN27com_osxkernel_MyDebugDriver9testFunc3Ejjjj+54>.\n```\n"
- fmt: 'We have found the location of the crash! A full description of CPU registers
    is outside the scope of this book, but suffice it to say they contain a wealth
    of useful information. We will discuss how we can use register information to
    retrieve function arguments in the next section. The processor in the panic log
    was running in 64-bit mode. The `x86_64` has a larger amount of registers available
    than `i386` systems, and local variables are usually passed in general purpose
    registers instead of the stack.


    ![images](images/square.jpg) **Tip** Technical Note 2063 discusses how to debug
    and understand kernel panics in much more detail and includes debugging panic
    logs from PowerPC systems: [`http://developer.apple.com/library/mac/#technotes/tn2063/_index.html`](http://developer.apple.com/library/mac/#technotes/tn2063/_index.html).


    ### x86-64 Calling Conventions


    A calling convention is a scheme for how functions are passed their arguments.
    The calling convention depends on the programming language, operating system,
    architecture, and compiler. Understanding the calling convention used can help
    us decode the register state when a crash occurs. For example, on Mac OS X running
    a 64-bit executable or kernel, the System V AMD64 ABI convention is used (note
    that Windows uses a different calling convention, so the register usage will be
    different). On Mac OS X for a 64-bit task, the register assignments for function
    call arguments are shown in [Table 16-4](#Chapter16.html#tab_16_4).


    ![Images](images/t1604.jpg)


    If a function takes more than six arguments, the remaining arguments will be passed
    on the stack. One thing to consider when examining C++ code is that a non-static
    C++ member method always passes the `this` pointer as the first argument, so the
    actual first argument to the method is passed in `RDI` whereas the `this` pointer
    will be put in the register `RSI`.


    Let’s look at the registers in the panic log shown in [Listing 16-5](#Chapter16.html#list_16_5)
    and see if we can work out which arguments were passed to our function by examining
    the register state, as follows:


    *   `RDI`: `0xffffff801ab61100` (this pointer)

    *   `RSI`: `0x000000000000feed` (decimal = 65261)

    *   `RDX`: `0x000000000000beef` (decimal = 48879)

    *   `RCX`: `0x0000000000000000` (decimal = 0)

    *   `R8`: `0x0000000000001504` (decimal = 5380)


    As you can see, the register contents from [Listing 16-5](#Chapter16.html#list_16_5)
    match exactly the four arguments passed to `testFunc3()`: 65261, 48879, 0, and
    5380. We can also see that the first argument looks like a pointer and is likely
    to be the `this` pointer representing the current instance of `MyDebugDriver`.


    Assuming `testFunc3()` was a longer and more complicated method and that the crash
    happened further down in the function, it is possible that the registers may have
    been reused and overwritten at the point of the crash. In that case, you may not
    be able to recover the original values of the arguments.


    ## Diagnosing Hung Processes with Activity Monitor


    The Mac OS X activity monitor shown in [Figure 16-3](#Chapter16.html#fig_16_3)
    can be helpful in diagnosing kernel problems.


    ![images](images/1603.jpg)


    ***Figure 16-3.** Sample process output from Activity Monitor*


    Any task shown in the Activity Monitor can be sampled (except the `kernel_task`),
    which will generate call graphs for all the threads of that task during the sample
    period. This is useful from a kernel debugging point of view in that you are able
    to see if a process has threads that are calling in to your driver through system
    calls like `IOConnectCallMethod()`. If a process is hung, force quitting it will
    start the Crash Reporter, which will give you a more detailed log, including the
    kernel stack of a thread if it is currently running in the kernel. The sample
    process function can also help you determine performance issues and find where
    an application is spending the most time.


    ## Finding Memory and Resource Leaks


    Preventing memory and resource leaks is particularly important for extensions
    that can be dynamically loaded and unloaded during runtime. A handy tool to detect
    leaks is the `ioclasscount` utility, which shows the instance count of each known
    class (loaded into the kernel). Typical output will look like the following:


    ```

    CHUDUtils = 1

    com_apple_AppleFSCompression_AppleFSCompressionTypeZlib = 1

    com_apple_BootCache = 1

    com_apple_driver_AudioIPCDevice = 1

    com_apple_driver_AudioIPCEngine = 1

    com_belkin_f2cd0007_adapter = 0

    com_osxkernel_MyDebugDriver = 5

    com_vmware_kext_KeyboardState = 1

    com_vmware_kext_UsbDevice = 2

    com_vmware_kext_UsbPortArbiter = 1

    .....

    ```


    It shows that our driver has been retained (`retain()`) five times. The driver’s
    `free()` function will not be called until the retain count reaches zero, even
    if the hardware device it controls is removed. This will prevent the kernel extension
    from being completely unloaded. The retain count typically increases for each
    user space application that opens the driver, or it can increase because another
    driver or ancillary support class used by the driver calls `retain()` on it. Failure
    to balance a call to `retain()` with a call to `release()` will result in a leak.
    The `ioclasscount` utility can be used without changes to kernel boot parameters;
    it is not installed on a system by default, but is installed as part of the Xcode
    distribution. It can be copied onto a system without Xcode for debugging purposes.
    A driver that has been unloaded and has all references to it released (retain
    count = 0) will be unloaded by the `kextd` daemon. Although the reference count
    has dropped to zero, it may take up to a minute for the KEXT to be fully unloaded.


    If you are able to live debug the kernel using GDB, you can use macros such as
    `showallclasses` or `showregistry`, as follows:


    ```

    (gdb) showallclasses

    …

    1    x    84 bytes com_vmware_kext_VmmonService

    2    x    80 bytes com_vmware_kext_UsbDevice

    1    x   104 bytes com_vmware_kext_UsbPortArbiter

    1    x   136 bytes com_vmware_kext_UsbPortArbiterUserClient

    1    x   132 bytes com_vmware_kext_KeyboardState

    1    x    92 bytes com_osxkernel_MyDebugDriver

    ....

    (gdb) showregistry

    ...

          +-o com_osxkernel_MyDebugDriver  <object 0x0703e680, id 0x1000007a9, vtable
    0xcbc980,

    !registered, !matched, active, busy 0, retain count 5>

    ...

    ```


    ![images](images/square.jpg) **Tip** The `zprint` and `showioalloc` macros can
    further assist in tracking memory usage.


    To further help debug reference counting bugs, it is possible to override `OSObject::taggedRetain(const
    void *tag)` and `OSObject::taggedRelease(const void *)`. For example, print a
    message or print a back trace of the caller’s stack to help identify where the
    leak comes from.'
  raw: 'And we have found the location of the crash! A full description of CPU registers
    is outside the scope of this book, but suffice it to say they contain a wealth
    of useful information. We will discuss how we can use register information to
    retrieve function arguments in the next section. The processor in the panic log
    was running in 64-bit mode. The x86_64 has a larger amount of registers available
    than i386 systems, and local variables are usually passed in general purpose registers
    instead of the stack.


    ![images](images/square.jpg) **Tip** Technical Note 2063 discusses how to debug
    and understand kernel panics in much more detail and includes debugging panic
    logs from PowerPC systems: [`http://developer.apple.com/library/mac/#technotes/tn2063/_index.html`](http://developer.apple.com/library/mac/#technotes/tn2063/_index.html).


    ##### x86-64 Calling Conventions


    A calling convention is a scheme for how functions are passed their arguments.
    The calling convention depends on the programming language, operating system,
    architecture, and compiler. Understanding the calling convention used can help
    us decode the register state when a crash occurs. For example, on Mac OS X running
    a 64-bit executable or kernel, the System V AMD64 ABI convention is used (note
    that Windows uses a different calling convention, so the register usage will be
    different). On Mac OS X for a 64-bit task, the register assignments for function
    call arguments are shown in [Table 16-4](#Chapter16.html#tab_16_4).


    ![Images](images/t1604.jpg)


    If a function takes more than six arguments, the remaining arguments will be passed
    on the stack. One thing to consider when examining C++ code is that a non-static
    C++ member method always passes the *this* pointer as the first argument, so the
    actual first argument to the method is passed in *RDI* whereas the *this* pointer
    will be put in the register *RSI*.


    Let’s look at the registers in the panic log shown in [Listing 16-5](#Chapter16.html#list_16_5)
    and see if we can work out which arguments were passed to our function by examining
    the register state, as follows:


    *   RDI: 0xffffff801ab61100 (this pointer)

    *   RSI: 0x000000000000feed (decimal = 65261)

    *   RDX: 0x000000000000beef (decimal = 48879)

    *   RCX: 0x0000000000000000 (decimal = 0)

    *   R8: 0x0000000000001504 (decimal = 5380)


    As you can see, the register contents from [Listing 16-5](#Chapter16.html#list_16_5)
    match exactly the four arguments passed to `testFunc3()`: 65261, 48879, 0, and
    5380. We can also see that the first argument looks like a pointer and is likely
    to be the *this* pointer representing the current instance of MyDebugDriver.


    Assuming `testFunc3()` was a longer and more complicated method and that the crash
    happened further down in the function, it is possible that the registers may have
    been reused and overwritten at the point of the crash. In that case, you may not
    be able to recover the original values of the arguments.


    #### Diagnosing Hung Processes with Activity Monitor


    The Mac OS X activity monitor shown in [Figure 16-3](#Chapter16.html#fig_16_3)
    can be helpful in diagnosing kernel problems.


    ![images](images/1603.jpg)


    ***Figure 16-3.** Sample process output from Acitivty Monitor*


    Any task shown in the Activity Monitor can be sampled (except the kernel_task),
    which will generate call graphs for all the threads of that task during the sample
    period. This is useful from a kernel debugging point of view in that you are able
    to see if a process has threads that are calling in to your driver through system
    calls like `IOConnectCallMethod()`. If a process is hung, force quitting it will
    start the Crash Reporter, which will give you a more detailed log, including the
    kernel stack of a thread if it is currently running in the kernel. The sample
    process function can also help you determine performance issues and find where
    an application is spending the most time.


    #### Finding Memory and Resource Leaks


    Preventing memory and resource leaks is particularly important for extensions
    that can be dynamically loaded and unloaded during runtime. A handy tool to detect
    leaks is the `ioclasscount` utility, which shows the instance count of each known
    class (loaded into the kernel). Typical output will look like the following:


    * * *


    `CHUDUtils = 1`

    `com_apple_AppleFSCompression_AppleFSCompressionTypeZlib = 1`

    `com_apple_BootCache = 1`

    `com_apple_driver_AudioIPCDevice = 1`

    `com_apple_driver_AudioIPCEngine = 1`

    `com_belkin_f2cd0007_adapter = 0`

    **`com_osxkernel_MyDebugDriver`** `= 5`

    `com_vmware_kext_KeyboardState = 1`

    `com_vmware_kext_UsbDevice = 2`

    `com_vmware_kext_UsbPortArbiter = 1`

    `.....`


    * * *


    It shows that our driver has been retained `(retain())` five times. The driver’s
    `free()` function will not be called until the retain count reaches zero, even
    if the hardware device it controls is removed. This will prevent the kernel extension
    from being completely unloaded. The retain count typically increases for each
    user space application that opens the driver, or it can increase because another
    driver or ancillary support class used by the driver calls `retain()` on it. Failure
    to balance a call to `retain()` with a call `release()` will result in a leak.
    The `ioclasscount` utility can be used without changes to kernel boot parameters;
    it is not installed on a system by default, but is installed as part of the Xcode
    distribution. It can be copied onto a system without Xcode for debugging purposes.
    A driver that has been unloaded and has all references to it released (retain
    count = 0) will be unloaded by the *kextd* daemon. Although the reference count
    has dropped to zero, it may take up to a minute for the KEXT to be fully unloaded.


    If you are able to live debug the kernel using GDB, you can use macros such as
    `showallclasses` or `showregistry`, as follows:


    `(gdb)` **`showallclasses`**

    `…`

    `1    x    84 bytes com_vmware_kext_VmmonService`

    `2    x    80 bytes com_vmware_kext_UsbDevice`

    `1    x   104 bytes com_vmware_kext_UsbPortArbiter`

    `1    x   136 bytes com_vmware_kext_UsbPortArbiterUserClient`

    `1    x   132 bytes com_vmware_kext_KeyboardState`

    `1    x    92 bytes com_osxkernel_MyDebugDriver`

    `....`

    `(gdb)` **`showregistry`**

    `...`

    `      +-o com_osxkernel_MyDebugDriver  <object 0x0703e680, id 0x1000007a9, vtable
    0xcbc980,`

    `!registered, !matched, active, busy 0, retain count 5>`

    `...`


    ![images](images/square.jpg) **Tip** The `zprint` and `showioalloc` macros can
    further assist in tracking memory usage.


    To further help debug reference counting bugs, it is possible to override `OSObject::taggedRetain(const
    void *tag)` and `OSObject::taggedRelease(const void *)`. For example, print a
    message or print a back trace of the caller’s stack to help identify where the
    leak comes from.'
  trans: "\n我们已找到崩溃的位置！CPU 寄存器的完整描述超出了本书的范围，但只需说明它们包含大量有用信息即可。下一节我们将讨论如何利用寄存器信息来检索函数参数。崩溃日志中的处理器当时运行在\
    \ 64 位模式下。`x86_64`系统可用的寄存器数量比`i386`系统更多，且局部变量通常通过通用寄存器而非栈来传递。\n\n![images](img/square.jpg)\
    \ **提示** 技术说明 TN2063 更详细地讨论了如何调试和解读内核恐慌，并包含了 PowerPC 系统的恐慌日志调试方法：[`http://developer.apple.com/library/mac/#technotes/tn2063/_index.html`](http://developer.apple.com/library/mac/#technotes/tn2063/_index.html)。\n\
    \n### x86-64 调用约定\n\n调用约定是函数传递其参数的一种方案。调用约定取决于编程语言、操作系统、架构和编译器。理解所使用的调用约定有助于我们在发生崩溃时解码寄存器状态。例如，在运行\
    \ 64 位可执行程序或内核的 Mac OS X 上，采用 System V AMD64 ABI 约定（注意 Windows 使用不同的调用约定，因此寄存器使用方式会不同）。在\
    \ Mac OS X 的 64 位任务中，函数调用参数的寄存器分配如表 16-4 所示。\n\n![Images](img/t1604.jpg)\n\n如果函数参数超过六个，剩余参数将通过栈传递。在分析\
    \ C++代码时需要注意：非静态的 C++成员方法总是将 `this` 指针作为第一个参数传递，因此方法的实际第一个参数通过 `RDI` 传递，而 `this`\
    \ 指针则被放入 `RSI` 寄存器。\n\n让我们查看代码清单 16-5 中恐慌日志显示的寄存器，尝试通过检查寄存器状态来确定传递给函数的参数，如下所示：\n\
    \n*   `RDI`：`0xffffff801ab61100`（this 指针）\n*   `RSI`：`0x000000000000feed`（十进制\
    \ = 65261）\n*   `RDX`：`0x000000000000beef`（十进制 = 48879）\n*   `RCX`：`0x0000000000000000`（十进制\
    \ = 0）\n*   `R8`：`0x0000000000001504`（十进制 = 5380）\n\n如您所见，代码清单 16-5 中的寄存器内容与传递给\
    \ `testFunc3()` 的四个参数完全一致：65261、48879、0 和 5380。我们还可以看到第一个参数看起来像一个指针，很可能是指向当前 `MyDebugDriver`\
    \ 实例的 `this` 指针。\n\n假设 `testFunc3()` 是一个更复杂的方法，且崩溃发生在函数更靠后的位置，那么寄存器在崩溃时可能已被重用并覆盖。在这种情况下，您可能无法恢复参数的原始值。\n\
    \n## 使用活动监视器诊断挂起的进程\n\n图 16-3 所示的 Mac OS X 活动监视器有助于诊断内核问题。\n\n![images](img/1603.jpg)\n\
    \n***图 16-3.** 来自活动监视器的进程采样输出*\n\n活动监视器中显示的任何任务都可以被采样（`kernel_task` 除外），采样期间会生成该任务所有线程的调用图。从内核调试的角度来看，这非常有用，因为您可以判断一个进程是否有线程通过诸如\
    \ `IOConnectCallMethod()` 之类的系统调用进入您的驱动程序。如果进程挂起，强制退出将启动崩溃报告程序，它会提供更详细的日志，包括线程当前在内核中运行时其内核栈的信息。进程采样功能还能帮助您确定性能问题，并找出应用程序花费时间最多的地方。\n\
    \n## 查找内存和资源泄漏\n\n对于可在运行时动态加载和卸载的扩展，防止内存和资源泄漏尤为重要。一个检测泄漏的实用工具是 `ioclasscount`\
    \ 实用程序，它可以显示每个已知类（已加载到内核中）的实例计数。典型输出如下所示：\n\n```\nCHUDUtils = 1\ncom_apple_AppleFSCompression_AppleFSCompressionTypeZlib\
    \ = 1\ncom_apple_BootCache = 1\ncom_apple_driver_AudioIPCDevice = 1\ncom_apple_driver_AudioIPCEngine\
    \ = 1\ncom_belkin_f2cd0007_adapter = 0\ncom_osxkernel_MyDebugDriver = 5\ncom_vmware_kext_KeyboardState\
    \ = 1\ncom_vmware_kext_UsbDevice = 2\ncom_vmware_kext_UsbPortArbiter = 1\n.....\n\
    ```\n\n它显示我们的驱动程序被保留（`retain()`）了五次。即使其控制的硬件设备已被移除，只要保留计数未归零，驱动程序的 `free()` 函数就不会被调用。这将阻止内核扩展完全卸载。通常，每次用户空间应用程序打开驱动程序时，保留计数都会增加；或者，由于另一个驱动程序或驱动程序使用的辅助支持类对其调用了\
    \ `retain()`，保留计数也会增加。未能使 `retain()` 调用与 `release()` 调用保持平衡将导致泄漏。`ioclasscount`\
    \ 实用程序无需修改内核启动参数即可使用；默认情况下它不会安装在系统上，而是作为 Xcode 分发版的一部分安装。在调试时，可以将其复制到没有 Xcode\
    \ 的系统上。当一个驱动程序已被卸载，并且所有对其的引用都已释放（保留计数 = 0）时，它将被 `kextd` 守护进程卸载。尽管引用计数已降为零，但 KEXT\
    \ 完全卸载可能需要一分钟。\n\n如果您能够使用 GDB 对内核进行实时调试，则可以使用诸如 `showallclasses` 或 `showregistry`\
    \ 之类的宏，如下所示：\n\n```\n(gdb) showallclasses\n…\n1    x    84 bytes com_vmware_kext_VmmonService\n\
    2    x    80 bytes com_vmware_kext_UsbDevice\n1    x   104 bytes com_vmware_kext_UsbPortArbiter\n\
    1    x   136 bytes com_vmware_kext_UsbPortArbiterUserClient\n1    x   132 bytes\
    \ com_vmware_kext_KeyboardState\n1    x    92 bytes com_osxkernel_MyDebugDriver\n\
    ....\n(gdb) showregistry\n...\n      +-o com_osxkernel_MyDebugDriver  <object\
    \ 0x0703e680, id 0x1000007a9, vtable 0xcbc980,\n!registered, !matched, active,\
    \ busy 0, retain count 5>\n...\n```\n\n![images](img/square.jpg) **提示** `zprint`\
    \ 和 `showioalloc` 宏可以进一步帮助跟踪内存使用情况。\n\n为了进一步帮助调试引用计数错误，可以重写 `OSObject::taggedRetain(const\
    \ void *tag)` 和 `OSObject::taggedRelease(const void *)`。例如，打印一条消息或打印调用者栈的回溯，以帮助识别泄漏的来源。\n"
- fmt: '### Summary


    - Some common problems are likely to occur in the kernel, such as deadlocks and
    invalid memory accesses, which in turn can cause a kernel panic.

    - A kernel panic is a defense mechanism against exceptional or erroneous conditions
    the kernel cannot recover from. It basically disables the system in order to prevent
    corruption of the file system or other file storage.

    - Mac OS X provides a wide range of useful debugging mechanisms out of the box,
    ranging from a simple tracing and logging mechanism to the built-in support for
    remote kernel debugging.

    - Mac OS X can be configured using the `kdumpd` to accept a core dump from a remote
    system when it crashes (or if triggered manually). The core dump consists of active/wired
    memory and can be loaded into GDB.

    - The kernel can be debugged from a remote system over FireWire and Ethernet.
    This mechanism is built in, but not activated by default. Remote debugging can
    be enabled by setting the appropriate NVRAM parameters and flags.

    - Apple usually provides a Kernel Debug Kit for each released build of Mac OS
    X. The kit contains scripts, a debug version of the kernel, and I/O Kit family
    KEXTs. The debug kit also contains macros for simplifying kernel debugging in
    GDB. The macros allow you to get information about call stacks and examine the
    kernel’s key data structures. The kernel can also be live debugged with GDB while
    running from the same machine.

    - To debug your own KEXT, you have to generate debugging symbols for it. Because
    a KEXT is dynamically loaded in the kernel, we need to generate the correct symbol
    addresses for a KEXT. The Kernel Debug Kit provides the `createsymbolfiles` script
    to help with this.

    - A kernel panic log contains a lot of useful information we can use to backtrack
    and find the location that caused the crash.

    - The `ioclasscount` tool tracks instance counts of classes in I/O Kit and can
    be used to detect memory leaks or other problems.


    ## Chapter 17: Advanced Kernel Programming


    This chapter covers miscellaneous topics that are of interest to more advanced
    kernel programmers. We''ll discuss how Streaming SIMD Extensions (SSE) and floating
    point can be used in the kernel. (SIMD is short for Single Input Multiple Data.)
    We will also examine strategies for dealing with drivers for multi-function devices,
    and discuss the implementation of I/O Kit families. We''ll cover the kernel control
    KPI that can be used for user space communication with KEXTs such as Network Kernel
    Extensions (NKE) that does not use the I/O Kit. We also show how to work with
    and manipulate processes from the kernel, such as getting the process identifier
    (PID) of a process and sending signals to the process. Some drivers may need additional
    resources loaded from the file system, such as firmware images. This chapter provides
    a discussion of how these resources can be loaded using the `OSKextRequestResource()`
    function. The chapter concludes with a discussion of how a driver can send messages
    to a user space daemon using notifications.


    ### SSE and Floating Point in the Kernel


    Streaming SIMD Extensions (SSE) is the successor to MMX and is a special instruction
    set found on most modern Intel and AMD processors that allow common instructions
    such as add, multiply, and shift to be performed on arrays (vectors) of values
    instead of single values (scalar). This can greatly speed up many computation
    tasks, especially in areas such as digital signal processing, audio, graphics,
    and video. Normally the kernel is not a great place to perform heavy computation,
    but there are some areas where it is unavoidable—for example, in the case of audio
    drivers, which need to convert audio samples from multiple user space applications
    and mix them into a single buffer for output. Software implementations of the
    RAID-5 and RAID-6 algorithms are also examples of computations that may need to
    occur in the kernel and which can be optimized using SSE.


    Traditionally, SSE and floating point have been non-trivial for use in kernel
    environments. Some operating systems, such as Linux, require you to explicitly
    save the floating point/SSE state and restore it after use; otherwise, a thread''s
    floating point state may be overwritten. In Mac OS X, however, the kernel is free
    to use both floating point and SSE without needing to manually save and restore
    the registers'' states. Normally, when a thread finishes its time-slice or is
    preempted in favor of another thread, the state of the CPU registers at the time
    when the thread stopped executing is saved to memory and subsequently restored
    when the thread continues execution. To optimize performance, the kernel only
    stores the general-purpose registers and not the floating point and SSE registers,
    as they are less frequently used. In fact, many programs will not use floating
    point or SSE at all. When a different thread attempts to use the registers, the
    CPU issues an exception/trap, which will save the previous contents and clear
    the registers for the new thread. When the orginal thread is about to resume execution,
    floating point and/or SSE registers will be restored to the previous state.


    There are two ways of using SSE:


    - By directly using the CPU instructions through the use of assembly or inline
    assembly.

    - By using the intrinsic functions provided by GCC, which provides user-friendlier
    C function wrappers around most instructions. For SSE2, these are provided in
    the header file `emmintrin.h`, which is not part of the kernel framework. However,
    you can copy the file and include it in your project. This is possible as the
    functions are all inline and do not depend on any external libraries.


    There are many revisions of the SSE instruction set. The latest major version
    is currently SSE4. Some older systems may not support SSE4, which became available
    in 2007. Attempting to execute SSE4 instructions on a CPU that doesn''t support
    it will result in a kernel panic. To prevent this, you need to provide run-time
    detection of the CPU''s capabilities prior to executing the SSE instructions,
    or target an older version such as SSE2, which predates all Intel-based Macs.


    ### Multi-Function Drivers


    USB and PCI devices may be composite devices that include multiple independent
    devices in which each device''s separate driver can handle each function. Other
    devices may consist of one logical device handled by multiple drivers. Let''s
    consider a modern graphics card with an HDMI output port as an example. HDMI is
    able to carry both audio and video, so it would be nice to provide an audio driver
    that allowed the device to be used with Core Audio. The device is a graphics card,
    so the hardware doesn''t have the typical DMA engine of most audio hardware. Instead,
    audio data is sent along with video frames at regular vertical blanking intervals.
    This design means that the audio and video parts are intimately linked and need
    a shared state between them in order to operate. Since there is no clear separation,
    the driver can be structured as shown in Figure 17-1.


    ![images](images/1701.jpg)


    **Figure 17-1.** Multi-function driver


    The design in Figure 17-1 uses a central driver, which coordinates the hardware
    and manages the provider. The central driver is used for matching against the
    hardware provider. The central driver then creates an audio driver based on the
    `IOAudioFamily` and a video/graphics driver based on the `IOGraphicsFamily`. There
    are two ways of managing the relationship of the subordinate drivers to the central
    driver:


    - The central, audio, and video drivers can be in separate KEXTs. The central
    driver matches against the hardware resource, whereas the audio and video drivers
    will match against the central driver and use it as the provider.

    - All drivers can be located in the same KEXT. The central driver would then need
    to manage the lifecycle of the subordinated drivers manually.'
