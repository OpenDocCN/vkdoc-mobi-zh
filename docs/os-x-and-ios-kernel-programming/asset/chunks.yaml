- fmt: "### Creating Symbol Information for KEXTs\n\nBefore you can debug your own\
    \ KEXTs in GDB, you need to generate symbol information for the KEXT. Because\
    \ a KEXT is dynamically loadable, we have no way of knowing where in memory it\
    \ will be located. Although our KEXT includes symbol information, the addresses\
    \ of functions and data are relative to the KEXT binary. The absolute address\
    \ of a function in a KEXT will be the `kernel_load_address + relative_address`\
    \ once the KEXT is loaded.\n\nFortunately, the Kernel Debug Kit gives us a helping\
    \ hand by providing a small script that helps generate the final symbol table\
    \ containing the absolute addresses within the kernel address space. The script\
    \ is called `createsymbolfiles` and can be used as follows:\n\n```\n$ /Volumes/KernelDebugKit/createsymbolfiles\
    \ -a i386 -s ./ MyDebugDriver.kext\nMyDebugDriver.kext appears to be loadable\
    \ (not including linkage for on-disk libraries).\n\nEnter the hexadecimal load\
    \ addresses for these extensions\n(press Return to skip symbol generation for\
    \ an extension):\n\ncom.osxkernel.MyDebugDriver: 0x9b9000\n```\n\nThe load address\
    \ can be found in several places, for example, with `kextstat`, as follows:\n\n\
    ```\n$ kextstat\nIndex Refs Address    Size       Wired      Name (Version) <Linked\
    \ Against>\n  126    0 0x9b9000   0x3000     0x2000     com.osxkernel.MyDebugDriver\
    \ (1) <5 4 3>\n```\n\nIn the preceding case, the KEXT had no additional dependencies;\
    \ however, in a real world situation, a KEXT may have dependencies on one or more\
    \ other KEXTs, such as an I/O Kit family, in which case you will be prompted to\
    \ enter their addresses as well. If you are debugging a crash dump from a remote\
    \ system or directly debugging a crashed system, the load address of your extension\
    \ and any dependencies will be found in the panic log if your extension was involved\
    \ in the crash. Note that your KEXT may be given a different address each time\
    \ it loads, so you will need to regenerate the symbol information each time.\n\
    \nThe above is enough to get us basic symbol information, but it is restricted\
    \ to symbolic names of functions only and is not able to give us source code line\
    \ information. You can get this by configuring your extension’s debug information\
    \ format, as shown in [Figure 16-2](#Chapter16.html#fig_16_2).\n\n![images](images/1602.jpg)\n\
    \n**Figure 16-2.** Setting the debug information format with Xcode\n\nDWARF with\
    \ dSYM creates a separate file for you containing a full set of symbols and information\
    \ needed to map a code location back to a source code line. This information is\
    \ normally embedded into an executable when doing a debug build; however, you\
    \ can generate that information in an external file for release builds of the\
    \ driver. It is good practice to archive this debug information for later use.\
    \ This will make debugging easier if crashes should be reported by a user. The\
    \ dSYM file (actually bundle) will be named `MyDebugDriver.kext.dSYM` in our case.\
    \ The dSYM bundle should be placed together with the KEXT before the `createsymbolfiles`\
    \ script is run.\n\n### Debugging KEXTs with GDB\n\nIn the following sections,\
    \ we will analyze a crash caused by a hypothetical driver named `MyDebugDriver`.\
    \ The header file specification for `MyDebugDriver` is shown in [Listing 16-4](#Chapter16.html#list_16_4).\n\
    \n**Listing 16-4.** MyDebugDriver Header File\n\n```\nclass com_osxkernel_MyDebugDriver\
    \ : public IOService\n{\n    OSDeclareDefaultStructors(com_osxkernel_MyDebugDriver);\n\
    public:\n    virtual bool init(OSDictionary* dict);\n    virtual bool start(IOService*\
    \ provider);\n    virtual void stop(IOService* provider);\n\n    void testFunc1(UInt32\
    \ arg1, UInt32 arg2, UInt32 arg3, UInt32 arg4);\n    void testFunc2(UInt32 arg1,\
    \ UInt32 arg2, UInt32 arg3, UInt32 arg4);\n    void testFunc3(UInt32 arg1, UInt32\
    \ arg2, UInt32 arg3, UInt32 arg4);\n\n    static void  timerFired(OSObject* owner,\
    \ IOTimerEventSource* sender);\nprivate:\n\n    IOTimerEventSource*     fTimer;\n\
    \    int                     fVariable1;\n    int                     fVariable2;\n\
    };\n```\n\nThe driver starts a timer, from which `testFunc1()` is called, which\
    \ in turn calls `testFunc2()`, which calls `testFunc3()`, which causes a kernel\
    \ panic due to a null pointer dereference. Each function accepts four integers\
    \ that have no significance (picked randomly) and are passed unchanged from the\
    \ first function to the last. The values passed as arguments are 65261, 48879,\
    \ 0, and 5380.\n\nWe have successfully generated a core dump from a crash system\
    \ using the FireWire core dump mechanism and previously, we built symbol information\
    \ for our driver using the correct load address. We are now ready to load it up\
    \ in the GDB and get our hands dirty. The steps we need to perform to find the\
    \ bug in our driver are as follows:\n\n- Create a symbol file with the correct\
    \ load address (see the last section)\n- Start GDB and load the core dump\n- Add\
    \ symbol information from the kernel\n- Load Kernel Debug Kit GDB macros\n- Load\
    \ our KEXT binary of `MyDebugDriver` into GDB\n- Load symbol information for `MyDebugDriver`\
    \ (if GDB cannot find them in the same location as the KEXT)\n- Tell GDB the location\
    \ of the source code for `MyDebugDriver` (optional)\n\nFollowing is a complete\
    \ debug session for `MyDebugDriver`:\n\n```\n$ gdb -c core-xnu-1504.15.3-0.0.0.0-fb3a74d3\n\
    GNU gdb 6.3.50-20050815 (Apple version gdb-1704) (Thu Jun 23 10:48:29 UTC 2011)\n\
    …\nThis GDB was configured as \"x86_64-apple-darwin\".\n#0  0x002b1e3e in ?? ()\n\
    (gdb) add-symbol-file /Volumes/KernelDebugKit/mach_kernel\nadd symbol table from\
    \ file \"/Volumes/KernelDebugKit/mach_kernel\"? (y or n) y\nReading symbols from\
    \ /Volumes/KernelDebugKit/mach_kernel...Reading symbols from /Volumes/KernelDebugKit/mach_kernel.dSYM/Contents/Resources/DWARF/mach_kernel...done.\n\
    done.\n(gdb) source /Volumes/KernelDebugKit/kgmacros\nLoading Kernel GDB Macros\
    \ package.  Type \"help kgm\" for more info.\n```\n\nThe preceding sequence of\
    \ commands loads the core dump file, adds symbol information for the kernel from\
    \ the Kernel Debug Kit, and finally loads the GDB macros, which must be loaded\
    \ after the kernel symbol information to initialize properly.\n\nWe can now issue\
    \ the `backtrace` command to see where the system crashed, as follows:"
