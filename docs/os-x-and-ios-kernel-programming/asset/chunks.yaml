    own kernel thread on which to continue executing code without tying up the thread
    of a user process or the work loop thread.


    A good example of the use of a kernel thread is shown in [Listing 5-16](#Chapter05.html#list_5_16)
    from [Chapter 5](#Chapter05.html#ch5). In this example, a user space application
    made a control request to the driver to perform a delay operation. Rather than
    performing the delay within the context of the process thread, which would have
    blocked the calling process, the driver instead chose to create a background thread
    on which to perform the sleep operation. Once the delay had completed, the driver
    then signaled the user process with an asynchronous notification. This simple
    design pattern demonstrates how a driver can use a kernel thread to turn a synchronous
    operation that would block the thread from the calling process into an operation
    that appears to be asynchronous to the calling process.


    The APIs for creating a kernel thread come from the lower-level Mach layer and
    are declared in the header file `<kern/thread.h>`. You should never need to include
    this header file directly though, since it is included by the header file `<IOKit/IOLib.h>`.
    If you look at the contents of `IOLib.h`, you will see that it contains a small
    number of threading functions, including support for creating a thread. Starting
    in Mac OS X 10.6, however, these functions have been deprecated by Apple in favor
    of the Mach functions.


    The function `kernel_thread_start()` can be used to create kernel thread. Its
    prototype is given as follows:


    `kern_return_t   kernel_thread_start(thread_continue_t continuation, void* parameter,`

    `                        thread_t* new_thread);`


    The argument “`continuation`” is actually a function pointer to the start routine
    of the newly created thread. If a thread was successfully created, the return
    value from `kernel_thread_start()` will be `kIOReturnSuccess` and the argument
    “`new_thread`” will contain a reference to the newly created thread, much like
    the reference that is returned by the user space function `pthread_create()`.
    The `thread_t` object that is returned isn''t terribly useful to the caller, since
    there are very few public kernel APIs for thread manipulation. However, the `thread_t`
    value can be compared against the value returned by `current_thread()` to determine
    whether the active function is running on a particular thread.


    In most cases, the caller immediately releases the `thread_t` object after successfully
    creating a thread; this does not impact the execution of the background thread
    itself. To release the `thread_t` object, the function `thread_deallocate()` should
    be used, which has the following prototype:


    `void    thread_deallocate(thread_t thread);`


    ![image](images/square.jpg) **Note** It is important that the `thread_t` object
    that is returned by `kernel_thread_start()` is released to prevent a memory leak.


    The start routine for the thread has the following signature:


    `void    ThreadFunction (void* parameter, wait_result_t waitResult)`


    The first argument to the function, `parameter`, corresponds to the value that
    was passed to `kernel_thread_start()` and allows the creator of the thread to
    pass context to the thread''s function. The second argument to the function, `waitResult`,
    is not useful for threads created through `kernel_thread_start()`; its presence
    is simply a consequence of the thread function being defined as the type `thread_continue_t`.
    Internally, the kernel makes use of the type `thread_continue_t` elsewhere and
    the value of `waitResult` is used in these cases.


    Finally, once a thread has completed its operation and wishes to terminate, the
    thread function should call the function `thread_terminate()`, as demonstrated:


    `thread_terminate(current_thread());`


    Note that although it might seem that it is possible to terminate a background
    thread from another thread, this will fail with an error returned to the caller.
    The `thread_terminate()` function only allows the current thread to be terminated.
    To terminate a background thread, for example, when a driver is unloaded, the
    driver should instead signal the background thread that it needs to exit and allow
    the thread to terminate itself. This signaling can be done either by setting a
    Boolean flag that the background thread checks periodically or by setting a condition
    variable that the background thread sleeps on.


    ### Summary


    *   A driver runs in a multithreaded environment.

    *   The methods of a driver class can potentially be called from an arbitrary
    thread. This means that, even if a driver creates no threads of its own, it cannot
    escape the need for synchronized access to its shared instance variables and hardware.

    *   The I/O Kit provides synchronization functions that a driver can use to prevent
    multiple threads from modifying shared data at the same time.

    *   A spin lock is a suitable synchronization mechanism for code that will hold
    the lock only for a short period of time or for code that will execute inside
    a primary interrupt handler.

    *   A mutex is a better choice if the lock will be held for longer periods, but
    it cannot be used inside a primary interrupt handler.

    *   To synchronize events that can occur at an arbitrary time, such as a hardware
    interrupt or a software timer, the I/O Kit provides a dedicated thread on which
    the handler for these events is run. This is known as the work loop thread and
    the I/O Kit ensures that all event sources that are installed on the work loop
    are executed in a serial manner.


    ## C H A P T E R  8'
  trans: "\n### 内核线程\n\n与用户空间应用程序不同，驱动程序在活跃时并没有一个始终运行的主线程。相反，驱动程序通常会在现有线程上响应特定事件而执行。例如，当用户空间进程通过驱动程序用户客户端发出控制请求时，驱动程序会在该用户进程所拥有的调用线程的上下文中执行。类似地，当驱动程序的硬件产生中断时，驱动程序的中断次处理函数会在工作循环线程上执行。由于驱动程序是响应此类事件而执行，如果驱动程序没有在处理事件（例如控制请求或中断处理程序），那么系统任意线程上通常都不会有其代码在运行。\n\
    \n缺乏等效的主线程可能会给驱动程序带来问题，特别是当它需要持续执行代码以便定期轮询其硬件设备，或者希望执行如将固件下载到硬件这类耗时操作时。在这些情况下，驱动程序可以创建自己的内核线程，以便在该线程上继续执行代码，而不会占用用户进程的线程或工作循环线程。\n\
    \n第 5 章中的代码清单 5-16 展示了一个使用内核线程的绝佳示例。在此示例中，用户空间应用程序向驱动程序发出一个控制请求以执行延迟操作。驱动程序并没有在进程线程的上下文中执行延迟（这将会阻塞调用进程），而是选择创建一个后台线程来执行睡眠操作。一旦延迟完成，驱动程序便通过异步通知向用户进程发送信号。这种简单的设计模式展示了驱动程序如何利用内核线程，将原本会阻塞调用进程线程的同步操作，转变为一个对调用进程而言看似异步的操作。\n\
    \n用于创建内核线程的 API 来自更底层的 Mach 层，并在头文件 `<kern/thread.h>` 中声明。不过，你永远不需要直接包含这个头文件，因为它已被头文件\
    \ `<IOKit/IOLib.h>` 所包含。如果你查看 `IOLib.h` 的内容，会发现其中包含少量线程函数，包括对创建线程的支持。然而，从 Mac\
    \ OS X 10.6 开始，Apple 已弃用这些函数，转而推荐使用 Mach 函数。\n\n函数 `kernel_thread_start()` 可用于创建内核线程。其原型如下所示：\n\
    \n```\nkern_return_t   kernel_thread_start(thread_continue_t continuation, void*\
    \ parameter,\n                        thread_t* new_thread);\n```\n\n参数 “`continuation`”\
    \ 实际上是一个函数指针，指向新创建线程的起始例程。如果线程创建成功，`kernel_thread_start()` 的返回值将为 `kIOReturnSuccess`，并且参数\
    \ “`new_thread`” 将包含对新创建线程的引用，这与用户空间函数 `pthread_create()` 返回的引用类似。返回的 `thread_t`\
    \ 对象对调用者来说并不是非常有用，因为用于线程操作的公共内核 API 非常少。不过，可以将 `thread_t` 值与 `current_thread()`\
    \ 返回的值进行比较，以确定活跃函数是否正在特定线程上运行。\n\n在大多数情况下，调用者在成功创建线程后会立即释放 `thread_t` 对象；这不会影响后台线程本身的执行。要释放\
    \ `thread_t` 对象，应使用函数 `thread_deallocate()`，其原型如下：\n\n```\nvoid    thread_deallocate(thread_t\
    \ thread);\n```\n\n![image](img/square.jpg) **注意：** 务必释放由 `kernel_thread_start()`\
    \ 返回的 `thread_t` 对象，以防止内存泄漏。\n\n线程的起始例程具有以下签名：\n\n```\nvoid    ThreadFunction\
    \ (void* parameter, wait_result_t waitResult)\n```\n\n该函数的第一个参数 `parameter` 对应于传递给\
    \ `kernel_thread_start()` 的值，允许线程的创建者将上下文传递给线程函数。第二个参数 `waitResult` 对于通过 `kernel_thread_start()`\
    \ 创建的线程没有用处；它的存在仅仅是线程函数被定义为 `thread_continue_t` 类型的结果。在内部，内核在其他地方也使用了 `thread_continue_t`\
    \ 类型，而在那些情况下会用到 `waitResult` 的值。\n\n最后，一旦线程完成其操作并希望终止，线程函数应调用 `thread_terminate()`\
    \ 函数，如下所示：\n\n```\nthread_terminate(current_thread());\n```\n\n请注意，虽然看起来可能可以从另一个线程终止后台线程，但这会失败并向调用者返回错误。`thread_terminate()`\
    \ 函数只允许终止当前线程。要终止后台线程（例如在卸载驱动程序时），驱动程序应通知后台线程它需要退出，并让线程自行终止。此通知可以通过设置一个后台线程定期检查的布尔标志，或者设置一个后台线程在其上睡眠的条件变量来实现。\n\
    \n### 总结\n\n*   驱动程序在多线程环境中运行。\n*   驱动类的方法可能从任意线程被调用。这意味着，即使驱动程序自身不创建任何线程，它也无法避免对其共享实例变量和硬件进行同步访问的需求。\n\
    *   I/O Kit 提供了同步函数，驱动程序可以使用这些函数来防止多个线程同时修改共享数据。\n*   自旋锁是一种适用于仅短时间持有锁的代码，或者将在主中断处理程序内部执行的代码的同步机制。\n\
    *   如果锁将被持有较长时间，互斥锁是更好的选择，但不能在主中断处理程序内部使用它。\n*   为了同步可能在任意时间发生的事件（例如硬件中断或软件定时器），I/O\
    \ Kit 提供了一个专用线程，这些事件的处理程序在该线程上运行。这被称为工作循环线程，并且 I/O Kit 确保所有安装在工作循环上的事件源都按串行方式执行。"
- fmt: '# Universal Serial Bus


    The Universal Serial Bus (USB) is a ubiquitous technology found in a wide variety
    of products, notably computer peripherals, including mice, keyboards, hard drives,
    and printers, as well as almost any other type of device or equipment that can
    be connected to a computer. The USB is a specification that defines the communication
    between a device, such as a printer or mobile phone, and a host controlled by
    a computer device, such as your Mac or iPad. The USB specification was developed
    in 1996 by a consortium of companies, including Compaq, DEC, IBM, Intel, Microsoft,
    NEC, and Nortel. The motivation was to replace a series of connectors with a universal
    connector, making it easier to connect external devices to personal computers.
    The USB specification is currently at version 3.0. Support for 3.0 is still emerging,
    and support for version 2.0 is by far the most ubiquitous at this time. Apple
    has yet to release hardware capable of supporting the latest USB 3.0 specification,
    but Apple computers have shipped with USB support since before OS X. The iOS series
    of devices are themselves USB devices, but they can also act as USB hosts. An
    example of this is the iPad, which can act as a host for USB devices, such as
    digital cameras.


    USB is based on a master-slave system, where a controller (host) communicates
    with slave devices. A host commonly has a one-to-one relationship with a bus.


    As a kernel programmer, if you are tasked with writing a driver for a hardware
    device, there is a major chance that it would be for a USB device. The good news
    (for us lazy programmers, anyway) is that you can get away without having a driver
    if your device conforms to one of the classes defined by the USB Implementers
    Forum (USB-IF). For example, keyboards and mice comply with the human interface
    device (HID) specification, which makes it unnecessary for a vendor to supply
    a driver, as the OS will already have a generic driver that can be used to communicate
    with these devices. However, the vendor could still elect to develop a driver—for
    example, if the device has advanced capabilities, such as additional customizable
    buttons on a mouse.


    This chapter will provide a broad overview of the USB specification and architecture.
    The specification is much longer than this book, so obviously a detailed discussion
    is out of the question. We will instead focus on the parts that matter when implementing
    a driver for a USB device. We will also discuss the architecture of the USB subsystem
    provided by I/O Kit, as well as provide code for a fictional USB device driver.
    It is worth mentioning that USB drivers can be written both in the kernel and
    in user space. A kernel driver is generally needed when a driver/device can be
    accessed concurrently by many applications, or if the primary client of the driver
    is the kernel itself. Examples of devices typically implemented in the kernel
    are storage, networking, audio, and display drivers, whereas drivers for printers,
    mice, and keyboards may be handled fully or partially by a user space driver.
    In this chapter, we will focus on the USB in general, and on the implementation
    of kernel space drivers. A discussion about user space drivers is provided in
    [Chapter 15](#Chapter15.html#ch15).


    ## USB Architecture


    In a USB system, the host controller is the master and the USB devices are the
    subordinates. The USB topology is organized in a tree-like structure, which forms
    a bus, with the host controller being the root and the controller of the subordinated
    device. The host controller is responsible for coordinating activities on the
    bus, and a device is not able to perform I/O, or any other activity on the bus,
    without first being asked to do so by the host.


    The tree structure branches out with the help of hubs, which allow connected devices
    to become part of the bus, and thus extend it, as a new branch. The subordinate
    devices of a hub can have other hubs connected to them— up to four levels deep
    is possible. The root hub is usually embedded into, and part of, the host controller
    itself. [Figure 8-1](#Chapter08.html#fig_8_1) shows the USB topology for a MacBook
    computer.


    ![images](images/0801.jpg)


    ***Figure 8-1.** System Information showing the USB topology of a MacBook, with
    external devices connected*


    The system in [Figure 8-1](#Chapter08.html#fig_8_1) has four built-in USB buses,
    but only two buses are actually connected to external USB ports. While most people
    associate USB devices with external devices, USB is often used to communicate
    with fixed internal devices in the computer system. The first two USB buses of
    the MacBook in [Figure 8-1](#Chapter08.html#fig_8_1) are internal to the notebook,
    and are used to connect to the internal keyboard, the trackpad, and the IR Receiver.
    The second internal bus connects to the Bluetooth USB host controller. Both of
    these buses are USB 1.1 buses, which is fine because the devices connected to
    them all have low bandwidth requirements.


    This MacBook has two external USB devices connected, an external hard drive and
    an iPhone, each connected to a separate physical USB port on the system. Although
    you would think that an external USB port has its own dedicated bus, this may
    not always be the case. As you can see in [Figure 8-1](#Chapter08.html#fig_8_1),
    one of the buses has an additional USB device attached to it, namely the built-in
    iSight camera. The camera requires more bandwidth than the 1.1 USB buses/controllers
    can provide, so it is instead attached to one of the two USB 2.0 controllers,
    likely to avoid having a separate controller just for the iSight, saving space,
    parts, cost, and battery power. The downside is that an external device will share
    bandwidth with the iSight camera (when it is in use).


    The exact USB topology will vary from system to system, and this is just one example
    of how it can be organized.


    Each bus in a USB system can support up to 127 devices, including hub devices,
    which are also USB devices. Bandwidth on a USB bus is shared between the connected
    devices, so having a large number of active devices will incur a significant penalty,
    which is why it is now common to have physical USB ports on separate host controllers—each
    providing a bus, rather than having ports connected to a single controller.


    A USB is designed to be hot-pluggable, which means that the system can handle
    the insertion or removal of any device at any time during operation, although,
    depending on the type of device, this may not necessarily be safe to do—the prime
    example is a hard drive, which, if unplugged at the wrong time, can lead to corruption
    of the drive''s file system. From a developer''s perspective, this means that
    your driver code needs to be designed to anticipate the arrival or removal of
    a device.


    The USB specification also supports power for devices through the bus, a major
    advantage over older bus technologies, as this, for example, will allow you to
    charge an iPhone simply by plugging it in to your laptop, or to self-power a device
    such as a hard drive.


    The key characteristics of the USB can be summarized as follows:'
