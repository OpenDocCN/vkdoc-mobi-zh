    \ IP 192.168.1.2 > 192.168.1.3: ICMP echo reply, id 64769, seq 0, length 64\n\
    20:44:11.911836 IP 192.168.1.2.ipp > 192.168.255.255.ipp: UDP, length 237\n20:46:01.413453\
    \ IP 192.168.1.2.netbios-ns > 192.168.255.255.netbios-ns: NBT UDP PACKET(137):\n\
    QUERY; REQUEST; BROADCAST\n20:46:01.451950 IP 192.168.1.2.netbios-dgm > 192.168.255.255.netbios-dgm:\
    \ NBT UDP\nPACKET(138)\n```\n\nThe `netcat` utility has many uses. For network\
    \ debugging, it is useful in its ability to create TCP- and UDP-based clients\
    \ or servers, as it can be used to generate traffic in either direction for the\
