    \ != kIODirectionIn) && (direction != kIODirectionOut))\n      return kIOReturnBadArgument;\n\
    \n    // 通过传输驱动程序执行读取或写入操作。\n    if (direction == kIODirectionIn)\n      actualByteCount\
    \ = m_provider->performRead(buffer, (block*kDiskBlockSize),\n                \
    \                               (nblks*kDiskBlockSize));\n    else\n      actualByteCount\
    \ = m_provider->performWrite(buffer, (block*kDiskBlockSize),\n               \
    \                                 (nblks*kDiskBlockSize));\n\n    // 调用完成函数。\n\
    \    (completion->action)(completion->target, completion->parameter, kIOReturnSuccess,\n\
    \                         actualByteCount);\n\n    return kIOReturnSuccess;\n\
    }\n```\n\n请注意，尽管 RAM 磁盘的传输驱动程序没有块大小的概念（因为其最小可寻址单元是字节），但`IOBlockStorageDevice`接口以块为单位表示磁盘容量，并在执行读取或写入操作时以块为操作单位。因此，枢纽驱动程序的实现定义了一个任意的块大小为\
    \ 512 字节。\n\n最后，与每个 I/O Kit 驱动程序一样，我们的 RAM 磁盘驱动程序需要一个属性列表来描述驱动程序的需求，包括其匹配字典。RAM\
    \ 磁盘驱动程序实现的`IOBlockStorageDevice`接口是 I/O Kit 的`IOStorageFamily`框架的一部分，因此我们需要在\
    \ RAM 磁盘驱动程序的属性列表中显式包含这个依赖关系。这通过在`Info.plist`文件的`OSBundleLibraries`部分添加一个条目来实现，该条目引用了内核模块`com.apple.iokit.IOStorageFamily`。在此示例中，我们导入的是`IOStorageFamily`\
    \ 1.6 版本，对应于 Mac OS X 10.6 中包含的版本。\n\n![images](img/square.jpg) **注意** 任何实现存储驱动程序栈中某部分驱动程序的的内核扩展，都需要在其属性列表中将`IOStorageFamily`作为依赖项包含在内。\n\
    \n示例 RAM 磁盘驱动程序的属性列表（包括其匹配字典和库依赖项）如图 14-3 所示。\n\n![images](img/1403.jpg)\n\n***图\
    \ 14-3.** 示例 RAM 磁盘驱动程序的属性列表*\n\n构建 RAM 磁盘驱动程序并加载生成的内核扩展后，将显示一个类似于图 14-4 所示的对话框。这并不表示设备存在问题，但确实表明\
    \ Mac OS X 无法在磁盘上找到可读取的文件系统。鉴于磁盘尚未写入数据，这是一个预期的错误。\n\n![images](img/1404.jpg)\n\
    \n***图 14-4.** 当插入的磁盘不包含可读取的文件系统时，Mac OS X 显示的标准对话框*\n\n点击图 14-4 所示对话框中的“初始化…”按钮，将启动“磁盘工具”应用程序，从而允许对存储设备进行分区并使用文件系统进行初始化。在此之前，使用\
    \ IORegisterExplorer 工具检查驱动程序栈的状态会很有趣。除了`RAMDisk`传输驱动程序和`RAMDiskStorageDevice`枢纽之外，您将注意到\
    \ I/O Kit 在枢纽驱动程序之上构建了三个驱动程序。驱动程序栈的状态如图 14-5 所示。\n\n![images](img/1405.jpg)\n\n\
    ***图 14-5.** 加载未格式化的存储设备时创建的驱动程序栈*\n\n磁盘工具应用程序允许对磁盘进行格式化并初始化为文件系统。此过程包括向磁盘写入分区表（即使磁盘仅包含单个分区也需要），然后向该分区写入文件系统。要使用磁盘工具格式化磁盘，请从左侧磁盘列表中选择设备，然后点击“抹掉”选项卡。磁盘工具中显示的设备名称源自`IOBlockStorageDevice`枢纽返回的描述性字符串，因此对于示例\
    \ RAM 磁盘，结果会得到一个名为“RAM Disk Media”的设备。\n\n默认情况下，磁盘工具会向磁盘写入 GUID 分区表，并使用 Mac OS\
    \ 扩展文件系统（也称为 HFS+文件系统）。磁盘工具不会对卷执行低级格式化，因此无需实现`IOBlockStorageDevice`的`doFormatMedia`方法。初始化卷的过程如图\
    \ 14-6 所示。\n\n![images](img/1406.jpg)\n\n***图 14-6.** 在磁盘工具中初始化新卷*\n"
- fmt: "After a partition map and a file system has been written to the disk, the\
    \ storage driver stack for the RAM disk will now contain three more drivers, as\
    \ shown in [Figure 14-7](#Chapter14.html#fig_14_7). On top of the `IOMedia` object\
    \ that represents the entire disk is an I/O Kit class that represents the partition\
    \ table that is present on the disk; in this case, it is the GUID partition table.\
    \ Each partition has an `IOMedia` object that represents the logical volume of\
    \ the partition.\n\n![images](images/1407.jpg)\n\n***Figure 14-7.** The driver\
    \ stack for a device that is partitioned with a GUID partition table containing\
    \ a single partition*\n\nWhen we implemented the driver for our RAM disk, all\
    \ of the methods that we implemented were specific to accessing data from the\
    \ device; it didn't need to provide any methods to handle partition schemes or\
    \ file systems, or to make the device accessible to a user space process. All\
    \ of this functionality is handled by classes provided by the I/O Kit's `IOStorageFamily`,\
    \ in particular the `IOBlockStorageDriver`, `IOMedia`, and `IOMediaBSDClient`\
    \ classes. The benefit of this design is that the functionality is largely common\
    \ across all storage devices and can be implemented in shared classes, which removes\
    \ the need for each storage device to rewrite the same functionality.\n\nThe `IOBlockStorageDevice`\
    \ and `IOBlockStorageDriver` classes represent the disk drive hardware, and the\
    \ `IOMedia` class represents the disk that is currently present in that drive.\
    \ In the case of our sample RAM disk driver, or a USB flash drive, there will\
    \ always be media present when there is a storage device; the two are inseparable.\
    \ However, this does not always have to be true; a CD drive for example, will\
    \ create an `IOBlockStorageDevice` (for which the I/O Kit will create a corresponding\
    \ `IOBlockStorageDriver`), but unless there is a CD in the drive, there will be\
    \ no `IOMedia` object in the driver stack.\n\nThe `IOMedia` class provides a logical\
    \ representation of the disk. If the disk has been partitioned, a storage device\
    \ will have multiple `IOMedia` objects, one for each partition, and another that\
    \ represents the overall disk. In the case of a RAID, where a single volume has\
    \ been created across multiple disks, there will be a single `IOMedia` object\
    \ that represents the entire logical RAID volume.\n\nEach `IOMedia` object in\
    \ the kernel has an accompanying object known as the `IOMediaBSDClient`, which\
    \ is responsible for making the logical disk available to user space processes.\
    \ In most cases, a process won't need to interact with the disk driver directly.\
    \ Rather, it will simply use the file system on the mounted volume to read and\
    \ write files that are contained on that volume. In some cases, a user space process\
    \ may need to read or write to the disk device directly or to send ioctl calls\
    \ to the disk driver directly.\n\nFollowing the convention of BSD, both a block\
    \ device interface and a character device interface are created for every disk\
    \ and every disk partition. The block device performs buffered I/O, with each\
    \ read and write going through a buffer cache. When a process performs a read\
    \ operation, the disk blocks that contain the accessed data are read from disk,\
    \ placed into a buffer cache, and then copied into the destination buffer supplied\
    \ by the user process. If a process reads a disk block that has recently been\
    \ accessed, the data is likely to be present in the buffer cache, and the read\
    \ request can be completed without having to access the disk.\n\nThe character\
    \ device provides raw access to the disk storage, and doesn't go through the buffer\
    \ cache. This means that every read or write to the device will result in a method\
    \ call of the device's `IOBlockStorageDevice` interface, which will read or write\
    \ directly into the process's buffer. As a consequence of this, all read and write\
    \ operations performed to the character device must start on a disk block boundary,\
    \ and the number of bytes transferred must be a multiple of the disk block size.\n\
    \nThe block device and character device interfaces are created by the `IOMediaBSDClient`\
    \ class. The block device interface can be accessed through the path `/dev/diskN`,\
    \ and the character device interface can be accessed through the path `/dev/rdiskN`,\
    \ where `N` is an integer to give the device a unique name.\n\nAfter building\
    \ and loading the RAM disk driver, a list of the disk devices that are present\
    \ in the system can be examined by running the terminal command `diskutil list`.\
    \ An example of the output from this command for the RAM disk device is shown\
    \ in [Listing 14-7](#Chapter14.html#list_14_7). The interface `disk1` corresponds\
    \ to the entire storage device, and the interface `disk1s1` corresponds to the\
    \ HFS+ partition.\n\n***Listing 14-7.** The Output from the Command `diskutil\
    \ list` for the RAM Disk Device*\n\n```\n/dev/disk1\n   #:   TYPE            \
    \        NAME            SIZE            IDENTIFIER\n   0:   GUID_partition_scheme\
    \                   *16.8 MB        disk1\n   1:   Apple_HFS               VolumeName\
    \      16.7 MB         disk1s1\n```\n\n### Partition Schemes\n\nA disk may be\
    \ split into several smaller logical units, each of which appear as a separate\
    \ disk to the user. Even if a hard disk only has a single partition it will contain\
    \ a partition map, which lists the one or more partitions that have been created\
    \ from the disk. Mac OS X provides support for many common partition schemes,\
    \ including the GUID partition scheme that is the default on Mac OS X, the Master\
    \ Boot Record that is still common on Windows, and the Apple Partition Map, which\
    \ was the default partition scheme for Mac OS before the transition to Intel-based\
    \ Macs.\n\nSupport for new partition schemes can be added to Mac OS X by writing\
    \ an I/O Kit driver that is derived from the `IOPartitionScheme` class. A partition\
    \ scheme driver loads whenever a disk is inserted, and scans the disk for a partition\
    \ table that it recognizes. If a partition table that is supported by the driver\
    \ is found, it creates an `IOMedia` object for each entry in the partition table,\
    \ and attaches these `IOMedia` objects above it on the driver storage stack. The\
    \ `IOMedia` objects created by the partition driver will describe only the section\
    \ of the disk that is covered by the partition, and not the entire disk contents.\n\
    \nAn `IOMedia` object can describe either the entire disk or a single partition\
    \ consisting of a physically contiguous subset of blocks on the disk. When an\
    \ `IOMedia` object is instantiated, its constructor takes a property that identifies\
    \ whether the `IOMedia` object describes the entire disk or not. Although a partition\
    \ driver will load against an `IOMedia` object, it will only load against one\
    \ that describes the entire disk contents, because typically a partition table\
    \ is not located within a partition.\n\nAfter the partition scheme driver has\
    \ successfully scanned a disk, the end result is the construction of a storage\
    \ driver stack similar to that shown in [Figure 14-7](#Chapter14.html#fig_14_7),\
    \ with an `IOMedia` object that describes the entire disk's contents (the object\
    \ above the `IOBlockStorageDriver` in the driver stack) and an `IOMedia` object\
    \ for each partition (the object above the `IOGUIDPartitionTableScheme` in the\
    \ driver stack).\n\nIt is worth noting that a partition scheme driver is responsible\
    \ only for reading a partition table that already exists on the disk; the `IOPartitionScheme`\
    \ class contains no methods for writing a partition table. A partition table could\
    \ be created by providing a user space utility process that writes to the disk\
    \ device directly."
  raw: 'After a partition map and a file system has been written to the disk, the
    storage driver stack for the RAM disk will now contain three more drivers, as
    shown in [Figure 14-7](#Chapter14.html#fig_14_7). On top of the `IOMedia` object
    that represents the entire disk is an I/O Kit class that represents the partition
    table that is present on the disk; in this case, it is the GUID partition table.
    Each partition has an `IOMedia` object that represents the logical volume of the
    partition.


    ![images](images/1407.jpg)


    ***Figure 14-7.** The driver stack for a device that is partitioned with a GUID
    partition table containing a single partition*


    When we implemented the driver for our RAM disk, all of the methods that we implemented
    were specific to accessing data from the device; it didn''t need to provide any
    methods to handle partition schemes or file systems, or to make the device accessible
    to a user space process. All of this functionality is handled by classes provided
    by the I/O Kit''s IOStorageFamily, in particular the `IOBlockStorageDriver`, `IOMedia,`
    and `IOMediaBSDClient` classes. The benefit of this design is that the functionality
    is largely common across all storage devices and can be implemented in shared
    classes, which removes the need for each storage device to rewrite the same functionality.


    The `IOBlockStorageDevice` and `IOBlockStorageDriver` classes represent the disk
    drive hardware, and the `IOMedia` class represents the disk that is currently
    present in that drive. In the case of our sample RAM disk driver, or a USB flash
    drive, there will always be media present when there is a storage device; the
    two are inseparable. However, this does not always have to be true; a CD drive
    for example, will create an `IOBlockStorageDevice` (for which the I/O Kit will
    create a corresponding `IOBlockStorageDriver`), but unless there is a CD in the
    drive, there will be no `IOMedia` object in the driver stack.


    The `IOMedia` class provides a logical representation of the disk. If the disk
    has been partitioned, a storage device will have multiple `IOMedia` objects, one
    for each partition, and another that represents the overall disk. In the case
    of a RAID, where a single volume has been created across multiple disks, there
    will be a single `IOMedia` object that represents the entire logical RAID volume.


    Each `IOMedia` object in the kernel has an accompanying object known as the `IOMediaBSDClient`,
    which is responsible for making the logical disk available to user space processes.
    In most cases, a process won''t need to interact with the disk driver directly.
    Rather, it will simply use the file system on the mounted volume to read and write
    files that are contained on that volume. In some cases, a user space process may
    need to read or write to the disk device directly or to send ioctl calls to the
    disk driver directly.


    Following the convention of BSD, both a block device interface and a character
    device interface are created for every disk and every disk partition. The block
    device performs buffered I/O, with each read and write going through a buffer
    cache. When a process performs a read operation, the disk blocks that contain
    the accessed data are read from disk, placed into a buffer cache, and then copied
    into the destination buffer supplied by the user process. If a process reads a
    disk block that has recently been accessed, the data is likely to be present in
    the buffer cache, and the read request can be completed without having to access
    the disk.


    The character device provides raw access to the disk storage, and doesn''t go
    through the buffer cache. This means that every read or write to the device will
    result in a method call of the device''s `IOBlockStorageDevice` interface, which
    will read or write directly into the process''s buffer. As a consequence of this,
    all read and write operations performed to the character device must start on
    a disk block boundary, and the number of bytes transferred must be a multiple
    of the disk block size.


    The block device and character device interfaces are created by the `IOMediaBSDClient`
    class. The block device interface can be accessed through the path `/dev/diskN`,
    and the character device interface can be accessed through the path `/dev/rdiskN`,
    where N is an integer to give the device a unique name.


    After building and loading the RAM disk driver, a list of the disk devices that
    are present in the system can be examined by running the terminal command `diskutil
    list`. An example of the output from this command for the RAM disk device is shown
    in [Listing 14-7](#Chapter14.html#list_14_7). The interface `disk1` corresponds
    to the entire storage device, and the interface `disk1s1` corresponds to the HFS+
    partition.


    ***Listing 14-7.** The Output from the Command `diskutil list` for the RAM Disk
    Device*


    `/dev/disk1`

    `   #:   TYPE                    NAME            SIZE            IDENTIFIER`

    `   0:   GUID_partition_scheme                   *16.8 MB        disk1`

    `   1:   Apple_HFS               VolumeName      16.7 MB         disk1s1`


    ### Partition Schemes


    A disk may be split into several smaller logical units, each of which appear as
    a separate disk to the user. Even if a hard disk only has a single partition it
    will contain a partition map, which lists the one or more partitions that have
    been created from the disk. Mac OS X provides support for many common partition
    schemes, including the GUID partition scheme that is the default on Mac OS X,
    the Master Boot Record that is still common on Windows, and the Apple Partition
    Map, which was the default partition scheme for Mac OS before the transition to
    Intel-based Macs.


    Support for new partition schemes can be added to Mac OS X by writing an I/O Kit
    driver that is derived from the `IOPartitionScheme` class. A partition scheme
    driver loads whenever a disk is inserted, and scans the disk for a partition table
    that it recognizes. If a partition table that is supported by the driver is found,
    it creates an `IOMedia` object for each entry in the partition table, and attaches
    these `IOMedia` objects above it on the driver storage stack. The `IOMedia` objects
    created by the partition driver will describe only the section of the disk that
    is covered by the partition, and not the entire disk contents.


    An `IOMedia` object can describe either the entire disk or a single partition
    consisting of a physically contiguous subset of blocks on the disk. When an `IOMedia`
    object is instantiated, its constructor takes a property that identifies whether
    the `IOMedia` object describes the entire disk or not. Although a partition driver
    will load against an `IOMedia` object, it will only load against one that describes
    the entire disk contents, because typically a partition table is not located within
    a partition.


    After the partition scheme driver has successfully scanned a disk, the end result
    is the construction of a storage driver stack similar to that shown in [Figure
    14-7](#Chapter14.html#fig_14_7), with an `IOMedia` object that describes the entire
    disk''s contents (the object above the `IOBlockStorageDriver` in the driver stack)
    and an `IOMedia` object for each partition (the object above the `IOGUIDPartitionTableScheme`
    in the driver stack).


    It is worth noting that a partition scheme driver is responsible only for reading
    a partition table that already exists on the disk; the `IOPartitionScheme` class
    contains no methods for writing a partition table. A partition table could be
    created by providing a user space utility process that writes to the disk device
    directly.'
  trans: "\n当分区表和文件系统被写入磁盘后，RAM 磁盘的存储驱动程序栈将再多包含三个驱动程序，如图 14-7 所示。在代表整个磁盘的 `IOMedia`\
    \ 对象之上，是一个代表磁盘上分区表的 I/O Kit 类；在本例中，该分区表为 GUID 分区表。每个分区都有一个 `IOMedia` 对象，代表该分区的逻辑卷。\n\
    \n![images](img/1407.jpg)\n\n***图 14-7.** 使用 GUID 分区表（包含单个分区）进行分区后的设备驱动程序栈*\n\n\
    当我们为 RAM 磁盘实现驱动程序时，所实现的所有方法都特定于从设备访问数据；它无需提供任何方法来处理分区方案或文件系统，也无需让用户空间进程能够访问该设备。所有这些功能都由\
    \ I/O Kit 的 `IOStorageFamily` 所提供的类来处理，特别是 `IOBlockStorageDriver`、`IOMedia` 和\
    \ `IOMediaBSDClient` 类。这种设计的好处在于，这些功能在所有存储设备中大部分是通用的，可以在共享类中实现，从而无需每个存储设备都重写相同的功能。\n\
    \n`IOBlockStorageDevice` 和 `IOBlockStorageDriver` 类代表磁盘驱动器硬件，而 `IOMedia` 类代表该驱动器中当前存在的磁盘。以我们的示例\
    \ RAM 磁盘驱动程序或 USB 闪存驱动器为例，只要存在存储设备，就始终存在介质；这两者密不可分。然而，情况并非总是如此；例如，一个 CD 驱动器会创建一个\
    \ `IOBlockStorageDevice`（I/O Kit 会为其创建一个对应的 `IOBlockStorageDriver`），但除非驱动器中有一张\
    \ CD，否则驱动程序栈中将不存在 `IOMedia` 对象。\n\n`IOMedia` 类提供了磁盘的逻辑表示。如果磁盘已分区，一个存储设备将拥有多个 `IOMedia`\
    \ 对象，每个分区对应一个，此外还有一个代表整个磁盘的对象。在 RAID 的情况下，如果跨越多个磁盘创建了一个单一卷，则会有一个 `IOMedia` 对象代表整个逻辑\
    \ RAID 卷。\n\n内核中的每个 `IOMedia` 对象都有一个名为 `IOMediaBSDClient` 的伴随对象，它负责让用户空间进程能够访问该逻辑磁盘。在大多数情况下，进程无需直接与磁盘驱动程序交互。相反，它只需使用已挂载卷上的文件系统来读写该卷中包含的文件。在某些情况下，用户空间进程可能需要直接读写磁盘设备，或直接向磁盘驱动程序发送\
    \ ioctl 调用。\n\n遵循 BSD 的惯例，每个磁盘和每个磁盘分区都会创建一个块设备接口和一个字符设备接口。块设备执行带缓冲的 I/O，每次读写都通过缓冲区缓存进行。当进程执行读取操作时，包含所访问数据的磁盘块会从磁盘读取，放入缓冲区缓存，然后复制到用户进程提供的目标缓冲区中。如果进程读取最近访问过的磁盘块，数据很可能已在缓冲区缓存中，从而无需访问磁盘即可完成读取请求。\n\
    \n字符设备提供对磁盘存储的原始访问，不经过缓冲区缓存。这意味着对设备的每次读写都会导致调用设备的 `IOBlockStorageDevice` 接口的方法，该方法会直接读取或写入进程的缓冲区。因此，对字符设备执行的所有读写操作都必须从磁盘块边界开始，并且传输的字节数必须是磁盘块大小的整数倍。\n\
    \n块设备和字符设备接口由 `IOMediaBSDClient` 类创建。块设备接口可通过路径 `/dev/diskN` 访问，字符设备接口可通过路径 `/dev/rdiskN`\
    \ 访问，其中 `N` 是一个整数，用于赋予设备唯一名称。\n\n构建并加载 RAM 磁盘驱动程序后，可以通过运行终端命令 `diskutil list`\
    \ 来查看系统中存在的磁盘设备列表。针对 RAM 磁盘设备，此命令输出的示例如列表 14-7 所示。接口 `disk1` 对应于整个存储设备，接口 `disk1s1`\
    \ 对应于 HFS+ 分区。\n\n***列表 14-7.** 针对 RAM 磁盘设备运行命令 `diskutil list` 的输出*\n\n```\n\
    /dev/disk1\n   #:   TYPE                    NAME            SIZE            IDENTIFIER\n\
    \   0:   GUID_partition_scheme                   *16.8 MB        disk1\n   1:\
    \   Apple_HFS               VolumeName      16.7 MB         disk1s1\n```\n\n###\
    \ 分区方案\n\n一个磁盘可能被分割成多个更小的逻辑单元，每个单元对用户来说都像是一个独立的磁盘。即使一个硬盘只有一个分区，它也会包含一个分区表，列出了从该磁盘创建的一个或多个分区。Mac\
    \ OS X 支持许多常见的分区方案，包括 Mac OS X 默认的 GUID 分区方案、在 Windows 上仍然常见的**主引导记录**，以及 **Apple\
    \ 分区映射**（后者是 Mac OS 在转向基于 Intel 的 Mac 之前的默认分区方案）。\n\n通过编写一个派生自 `IOPartitionScheme`\
    \ 类的 I/O Kit 驱动程序，可以向 Mac OS X 添加对新分区方案的支持。分区方案驱动程序会在磁盘插入时加载，并扫描磁盘以寻找它能识别的分区表。如果找到了该驱动程序支持的分区表，它会为分区表中的每个条目创建一个\
    \ `IOMedia` 对象，并将这些 `IOMedia` 对象附加到其上方（位于驱动程序存储栈中）。由分区驱动程序创建的 `IOMedia` 对象仅描述分区所覆盖的磁盘区域，而非整个磁盘内容。\n\
    \n一个 `IOMedia` 对象可以描述整个磁盘，也可以描述一个由磁盘上物理上连续的块子集组成的单个分区。当实例化 `IOMedia` 对象时，其构造函数会接收一个属性，用于标识该\
    \ `IOMedia` 对象是否描述整个磁盘。尽管分区驱动程序会针对一个 `IOMedia` 对象加载，但它只会针对描述整个磁盘内容的 `IOMedia`\
    \ 对象加载，因为分区表通常不会位于某个分区内部。\n\n分区方案驱动程序成功扫描磁盘后，最终结果是构建了一个类似于图 14-7 所示的存储驱动程序栈：一个描述整个磁盘内容的\
    \ `IOMedia` 对象（位于驱动程序栈中 `IOBlockStorageDriver` 之上的对象），以及每个分区对应的一个 `IOMedia` 对象（位于驱动程序栈中\
    \ `IOGUIDPartitionTableScheme` 之上的对象）。\n\n值得注意的是，分区方案驱动程序仅负责读取磁盘上已有的分区表；`IOPartitionScheme`\
    \ 类不包含任何用于写入分区表的方法。可以通过提供一个直接写入磁盘设备的用户空间工具程序来创建分区表。\n"
- fmt: "# Implementing a Sample Partition Scheme\n\nIn this section we will examine\
    \ how the driver for a hypothetical partition map would be implemented in the\
    \ I/O Kit. To begin with, let’s examine the property list of the driver, in particular\
    \ its matching dictionary, as shown in [Listing 14-8](#Chapter14.html#list_14_8).\n\
    \n**Listing 14-8.** A Sample Matching Dictionary from the Property List of a Partition\
    \ Scheme Driver\n\n```xml\n<key>IOKitPersonalities</key>\n<dict>\n    <key>SamplePartitionScheme</key>\n\
    \    <dict>\n        <key>CFBundleIdentifier</key>\n        <string>com.osxkernel.SamplePartitionScheme</string>\n\
    \        <key>IOClass</key>\n        <string>com_osxkernel_driver_SamplePartitionScheme</string>\n\
    \        <key>IOMatchCategory</key>\n        <string>IOStorage</string>\n    \
    \    <key>IOProviderClass</key>\n        <string>IOMedia</string>\n        <key>IOPropertyMatch</key>\n\
    \        <dict>\n            <key>Whole</key>\n            <true/>\n        </dict>\n\
    \    </dict>\n</dict>\n```\n\nThere are three important aspects of the matching\
    \ dictionary:\n\n- It specifies a provider class of `IOMedia`, so whenever a new\
    \ disk is inserted (and an `IOMedia` object is created to represent that disk),\
    \ the partition driver will be given the chance to examine the contents of that\
    \ disk for a supported partition table.\n- The partition driver is interested\
    \ only in an `IOMedia` object that represents the entire disk, since partition\
    \ tables cannot be located within a disk partition. To narrow the match to `IOMedia`\
    \ objects that represent an entire disk only, the matching dictionary uses the\
    \ `IOPropertyMatch` key to specify that the I/O Kit should load the driver only\
    \ against an `IOMedia` object that contains a property named `Whole` with the\
    \ Boolean value of `true`. This is a standard property of `IOMedia` objects that\
    \ specifies whether the object covers the entire disk, or a partition of that\
    \ disk.\n- The property list specifies an `IOMatchCategory` of `IOStorage`. This\
    \ property appears in the property table of the partition driver, and is important\
    \ for the correct construction of the storage driver stack. In particular, certain\
    \ drivers will use the `IOMatchCategory` property to determine whether they are\
    \ at the top of the driver stack, or whether the driver on top is also a part\
    \ of the `IOStorage` stack.\n\nAlthough a partition scheme driver is part of the\
    \ storage driver stack, and is unloaded only after the disk is removed, the driver\
    \ itself plays a role only when the disk is first inserted, when it is responsible\
    \ for reading the partition table from the disk and instantiating an `IOMedia`\
    \ object for each partition that it finds. As a driver that is derived from the\
    \ standard I/O Kit class `IOService`, the partition scheme driver does this through\
    \ the `init()`, `probe()`, and `start()` methods and on unloading through the\
    \ `stop()` and `free()` methods.\n\nThe `probe()` method is of particular significance\
    \ for an `IOPartitionScheme` driver. A partition scheme driver will be instantiated\
    \ whenever a disk is added to the system, and it is up to the driver to determine\
    \ whether the disk contains a supported partition table and, if not, to allow\
    \ an `IOPartitionScheme` driver that is better suited to load instead. This is\
    \ done through the standard `IOService` method `probe()`. In general, the purpose\
    \ of the `probe()` method is to examine the hardware to determine whether the\
    \ driver is able to support the device, and if so, to return an integer value\
    \ that represents how well suited the driver is to the hardware. The driver with\
    \ the highest probe score is the one that will be loaded by the I/O Kit.\n\nIn\
    \ the case of an `IOPartitionScheme` driver, the role of the `probe()` method\
    \ is to read enough of the disk to determine whether the partition table on the\
    \ disk is supported by the driver and, if so, to go on to read the partition table\
    \ entries. It isn’t strictly necessary to read the entire partition table in the\
    \ `probe()` method, but doing so prevents the need to rescan the partition table\
    \ when the driver’s `start()` method is called. The partition scheme drivers provided\
    \ by Apple as a part of Mac OS X go one step further and actually instantiate\
    \ an `IOMedia` object for each partition that is found in the `probe()` method.\n\
    \nIf a disk contains a partition table that the partition scheme driver recognizes\
    \ and the partition driver is selected by the I/O Kit as the most suitable driver,\
    \ its `start()` method will be called. At this point, the partition scheme driver\
    \ should create an `IOMedia` object for each partition entry and attach it to\
    \ the storage driver stack.\n\nA sample implementation of the `probe()` and `start()`\
    \ methods is demonstrated in [Listing 14-9](#Chapter14.html#list_14_9). This driver\
    \ is based on the partition scheme drivers that are included as part of the Darwin\
    \ source code in the `IOStorage` family.\n\nAs with the partition drivers included\
    \ in Darwin, the implementation in [Listing 14-9](#Chapter14.html#list_14_9) has\
    \ a custom method named `scan()` to examine the disk, and if a supported partition\
    \ table is found, to instantiate an `IOMedia` object for each partition and return\
    \ the partition set to the caller through an `OSSet` object. If no `IOMedia` objects\
    \ were found during the scan, the `probe()` method returns unsuccessfully, as\
    \ indicated by a `NULL` result value, and the I/O Kit will continue searching\
    \ for another partition scheme driver for the disk. If a supported partition table\
    \ was found instead, the probe method saves the set of `IOMedia` objects representing\
    \ each partition to an instance variable named `m_partitions`.\n\n**Listing 14-9.**\
    \ An Implementation of the `probe()` and `start()` Methods for a Partition Scheme\
    \ Driver\n\n```cpp\n#include <IOKit/storage/IOPartitionScheme.h>\n\n// Define\
    \ the superclass\n#define super IOPartitionScheme\n\nOSDefineMetaClassAndStructors(com_osxkernel_driver_PartitionScheme,\
    \ IOPartitionScheme)\n\nIOService* com_osxkernel_driver_PartitionScheme::probe(IOService*\
    \ provider, SInt32* score)\n{\n    if (super::probe(provider, score) == NULL)\n\
    \        return NULL;\n\n    // Scan the IOMedia for a supported partition table.\n\
    \    m_partitions = scan(score);\n\n    // If no partition table was found, return\
    \ NULL.\n    return m_partitions ? this : NULL;\n}\n\nbool com_osxkernel_driver_PartitionScheme::start\
    \ (IOService *provider)\n{\n    IOMedia*                partition;\n    OSIterator*\
    \             partitionIterator;\n\n    if (super::start(provider) == false)\n\
    \        return false;\n\n    // Create an iterator for the IOMedia objects that\
    \ were\n    // found and instantiated during probe.\n    partitionIterator = OSCollectionIterator::withCollection(m_partitions);\n\
    \    if (partitionIterator == NULL)\n        return false;\n\n    // Attach and\
    \ register each IOMedia object (representing found partitions).\n    while ((partition\
    \ = (IOMedia*)partitionIterator->getNextObject()))\n    {\n        if (partition->attach(this))\n\
    \        {\n            attachMediaObjectToDeviceTree(partition);\n          \
    \  partition->registerService();\n        }\n    }\n    partitionIterator->release();\n\
    \n    return true;\n}\n```"
  raw: '#### Implementing a Sample Partition Scheme


    In this section we will examine how the driver for a hypothetical partition map
    would be implemented in the I/O Kit. To begin with, let''s examine the property
    list of the driver, in particular its matching dictionary, as shown in [Listing
    14-8](#Chapter14.html#list_14_8).


    ***Listing 14-8.** A Sample Matching Dictionary from the Property List of a Partition
    Scheme Driver*


    `<key>IOKitPersonalities</key>`

    `<dict>`

    `        <key>SamplePartitionScheme</key>`

    `        <dict>`

    `                <key>CFBundleIdentifier</key>`

    `                <string>com.osxkernel.SamplePartitionScheme</string>`

    `                <key>IOClass</key>`

    `                <string>com_osxkernel_driver_SamplePartitionScheme</string>`

    `                <key>IOMatchCategory</key>`

    `                <string>IOStorage</string>`

    `                <key>IOProviderClass</key>`

    `                <string>IOMedia</string>`

    `                <key>IOPropertyMatch</key>`

    `                <dict>`

    `                        <key>Whole</key>`

    `                        <true/>`

    `                </dict>`

    `        </dict>`

    `</dict>`


    There are three important aspects of the matching dictionary:


    *   It specifies a provider class of `IOMedia`, so whenever a new disk is inserted
    (and an `IOMedia` object is created to represent that disk), the partition driver
    will be given the chance to examine the contents of that disk for a supported
    partition table.

    *   The partition driver is interested only in an `IOMedia` object that represents
    the entire disk, since partition tables cannot be located within a disk partition.
    To narrow the match to `IOMedia` objects that represent an entire disk only, the
    matching dictionary uses the `IOPropertyMatch` key to specify that the I/O Kit
    should load the driver only against an `IOMedia` object that contains a property
    named “Whole” with the Boolean value of true. This is a standard property of `IOMedia`
    objects that specifies whether the object covers the entire disk, or a partition
    of that disk.

    *   The property list specifies an `IOMatchCategory` of `IOStorage`. This property
    appears in the property table of the partition driver, and is important for the
    correct construction of the storage driver stack. In particular, certain drivers
    will use the `IOMatchCategory` property to determine whether they are at the top
    of the driver stack, or whether the driver on top is also a part of the `IOStorage`
    stack.


    Although a partition scheme driver is part of the storage driver stack, and is
    unloaded only after the disk is removed, the driver itself plays a role only when
    the disk is first inserted, when it is responsible for reading the partition table
    from the disk and instantiating an `IOMedia` object for each partition that it
    finds. As a driver that is derived from the standard I/O Kit class `IOService`,
    the partition scheme driver does this through the `init()`, `probe()`, and `start()`
    methods and on unloading through the `stop()` and `free()` methods.


    The `probe()` method is of particular significance for an `IOPartitionScheme`
    driver. A partition scheme driver will be instantiated whenever a disk is added
    to the system, and it is up to the driver to determine whether the disk contains
    a supported partition table and, if not, to allow an `IOPartitionScheme` driver
    that is better suited to load instead. This is done through the standard `IOService`
    method `probe()`. In general, the purpose of the `probe()` method is to examine
    the hardware to determine whether the driver is able to support the device, and
    if so, to return an integer value that represents how well suited the driver is
    to the hardware. The driver with the highest probe score is the one that will
    be loaded by the I/O Kit.


    In the case of an `IOPartitionScheme` driver, the role of the `probe()` method
    is to read enough of the disk to determine whether the partition table on the
    disk is supported by the driver and, if so, to go on to read the partition table
    entries. It isn''t strictly necessary to read the entire partition table in the
    `probe()` method, but doing so prevents the need to rescan the partition table
    when the driver''s `start()` method is called. The partition scheme drivers provided
    by Apple as a part of Mac OS X go one step further and actually instantiate an
    `IOMedia` object for each partition that is found in the `probe()` method.


    If a disk contains a partition table that the partition scheme driver recognizes
    and the partition driver is selected by the I/O Kit as the most suitable driver,
    its `start()` method will be called. At this point, the partition scheme driver
    should create an `IOMedia` object for each partition entry and attach it to the
    storage driver stack.


    A sample implementation of the `probe()` and `start()` methods is demonstrated
    in [Listing 14-9](#Chapter14.html#list_14_9). This driver is based on the partition
    scheme drivers that are included as part of the Darwin source code in the `IOStorage`
    family.


    As with the partition drivers included in Darwin, the implementation in [Listing
    14-9](#Chapter14.html#list_14_9) has a custom method named `scan()` to examine
    the disk, and if a supported partition table is found, to instantiate an `IOMedia`
    object for each partition and return the partition set to the caller through an
    `OSSet` object. If no `IOMedia` objects were found during the scan, the `probe()`
    method returns unsuccessfully, as indicated by a NULL result value, and the I/O
    Kit will continue searching for another partition scheme driver for the disk.
    If a supported partition table was found instead, the probe method saves the set
    of `IOMedia` objects representing each partition to an instance variable name
    `d m_partitions`.


    ***Listing 14-9.** An Implementation of the `probe()` and `start()` Methods for
    a Partition Scheme Driver*


    `#include <IOKit/storage/IOPartitionScheme.h>`


    `// Define the superclass`

    `#define super IOPartitionScheme`


    `OSDefineMetaClassAndStructors(com_osxkernel_driver_PartitionScheme, IOPartitionScheme)`


    `IOService* com_osxkernel_driver_PartitionScheme::probe(IOService* provider, SInt32*
    score)`

    `{`

    `        if (super::probe(provider, score) == NULL)`

    `                return NULL;`


    `        // Scan the IOMedia for a supported partition table.`

    `        m_partitions = scan(score);`


    `        // If no partition table was found, return NULL.`

    `        return m_partitions ? this : NULL;`

    `}`


    `bool com_osxkernel_driver_PartitionScheme::start (IOService *provider)`

    `{`

    `        IOMedia*                partition;`

    `        OSIterator*             partitionIterator;`


    `        if (super::start(provider) == false)`

    `                return false;`


    `        // Create an iterator for the IOMedia objects that were`

    `        // found and instantiated during probe.`

    `        partitionIterator = OSCollectionIterator::withCollection(m_partitions);`

    `        if (partitionIterator == NULL)`

    `                return false;`


    `        // Attach and register each IOMedia object (representing found partitions).`

    `        while ((partition = (IOMedia*)partitionIterator->getNextObject()))`

    `        {`

    `                if (partition->attach(this))`

    `                {`

    `                        attachMediaObjectToDeviceTree(partition);`

    `                        partition->registerService();`

    `                }`

    `        }`

    `        partitionIterator->release();`


    `        return true;`

    `}`'
  trans: "  \n# 实现分区方案示例\n\n在本节中，我们将探讨如何为 I/O Kit 中的假想分区映射驱动程序实现其功能。首先，让我们查看驱动程序的属性列表，特别是其匹配字典，如代码清单\
    \ 14-8 所示。\n\n**代码清单 14-8.** 分区方案驱动程序属性列表中的示例匹配字典\n\n```xml\n<key>IOKitPersonalities</key>\n\
    <dict>\n    <key>SamplePartitionScheme</key>\n    <dict>\n        <key>CFBundleIdentifier</key>\n\
    \        <string>com.osxkernel.SamplePartitionScheme</string>\n        <key>IOClass</key>\n\
    \        <string>com_osxkernel_driver_SamplePartitionScheme</string>\n       \
    \ <key>IOMatchCategory</key>\n        <string>IOStorage</string>\n        <key>IOProviderClass</key>\n\
    \        <string>IOMedia</string>\n        <key>IOPropertyMatch</key>\n      \
    \  <dict>\n            <key>Whole</key>\n            <true/>\n        </dict>\n\
    \    </dict>\n</dict>\n```\n\n匹配字典有三个重要方面：\n\n-   它指定了提供者类为 `IOMedia`，因此每当插入新磁盘（并创建\
    \ `IOMedia` 对象来表示该磁盘）时，分区驱动程序将有机会检查磁盘内容以查找支持的分区表。\n-   分区驱动程序只关心代表整个磁盘的 `IOMedia`\
    \ 对象，因为分区表不可能位于磁盘分区内部。为了将匹配范围缩小到仅代表整个磁盘的 `IOMedia` 对象，匹配字典使用了 `IOPropertyMatch`\
    \ 键，指定 I/O Kit 仅针对包含 `Whole` 属性且布尔值为 `true` 的 `IOMedia` 对象加载驱动程序。这是 `IOMedia`\
    \ 对象的标准属性，用于指明该对象是覆盖整个磁盘，还是磁盘的某个分区。\n-   属性列表指定了 `IOMatchCategory` 为 `IOStorage`。该属性出现在分区驱动程序的属性表中，对于正确构建存储驱动程序堆栈至关重要。特别是，某些驱动程序会使用\
    \ `IOMatchCategory` 属性来判断自身是否位于驱动程序堆栈的顶部，或者其顶层的驱动程序是否也属于 `IOStorage` 堆栈的一部分。\n\
    \n尽管分区方案驱动程序是存储驱动程序堆栈的一部分，并且仅在磁盘拔出后才被卸载，但该驱动程序本身只在磁盘首次插入时发挥作用——此时它负责从磁盘读取分区表，并为其找到的每个分区实例化一个\
    \ `IOMedia` 对象。作为派生自标准 I/O Kit 类 `IOService` 的驱动程序，分区方案驱动程序通过 `init()`、`probe()`\
    \ 和 `start()` 方法执行这些操作，并在卸载时通过 `stop()` 和 `free()` 方法完成清理。\n\n`probe()` 方法对于 `IOPartitionScheme`\
    \ 驱动程序尤为重要。每当磁盘添加到系统时，分区方案驱动程序就会被实例化，由该驱动程序判断磁盘是否包含支持的分区表，如果不支持，则允许更适合的 `IOPartitionScheme`\
    \ 驱动程序加载。这一过程通过标准的 `IOService` 方法 `probe()` 实现。通常，`probe()` 方法的目的是检查硬件，确定驱动程序是否能够支持该设备，如果可以，则返回一个整数值，表示驱动程序与硬件的匹配程度。探测分值最高的驱动程序将由\
    \ I/O Kit 加载。\n\n对于 `IOPartitionScheme` 驱动程序，`probe()` 方法的职责是读取足够的磁盘信息，以判断磁盘上的分区表是否被驱动程序支持，如果支持，则继续读取分区表条目。严格来说，并非必须在\
    \ `probe()` 方法中读取整个分区表，但这样做可以避免在调用驱动程序的 `start()` 方法时重新扫描分区表。Apple 作为 Mac OS X\
    \ 一部分提供的分区方案驱动程序更进一步，实际上会在 `probe()` 方法中为找到的每个分区实例化一个 `IOMedia` 对象。\n\n如果磁盘包含分区方案驱动程序可识别的分区表，并且\
    \ I/O Kit 选定该分区驱动程序为最合适的驱动程序，则会调用其 `start()` 方法。此时，分区方案驱动程序应为每个分区条目创建一个 `IOMedia`\
    \ 对象，并将其附加到存储驱动程序堆栈中。\n\n`probe()` 和 `start()` 方法的示例实现如代码清单 14-9 所示。该驱动程序基于 `IOStorage`\
    \ 家族中作为 Darwin 源代码一部分包含的分区方案驱动程序。\n\n与 Darwin 中包含的分区驱动程序一样，代码清单 14-9 中的实现有一个名为\
    \ `scan()` 的自定义方法，用于检查磁盘，如果找到支持的分区表，则为每个分区实例化一个 `IOMedia` 对象，并通过 `OSSet` 对象将分区集合返回给调用者。如果在扫描过程中未找到任何\
    \ `IOMedia` 对象，则 `probe()` 方法返回失败（以 `NULL` 结果值表示），I/O Kit 将继续为磁盘搜索其他分区方案驱动程序。如果找到支持的分区表，探测方法会将表示每个分区的\
    \ `IOMedia` 对象集合保存到名为 `m_partitions` 的实例变量中。\n\n**代码清单 14-9.** 分区方案驱动程序中 `probe()`\
    \ 和 `start()` 方法的实现\n\n```cpp\n#include <IOKit/storage/IOPartitionScheme.h>\n\n\
    // 定义超类\n#define super IOPartitionScheme\n\nOSDefineMetaClassAndStructors(com_osxkernel_driver_PartitionScheme,\
    \ IOPartitionScheme)\n\nIOService* com_osxkernel_driver_PartitionScheme::probe(IOService*\
    \ provider, SInt32* score)\n{\n    if (super::probe(provider, score) == NULL)\n\
    \        return NULL;\n\n    // 扫描 IOMedia 以寻找支持的分区表。\n    m_partitions = scan(score);\n\
    \n    // 如果未找到分区表，则返回 NULL。\n    return m_partitions ? this : NULL;\n}\n\nbool\
    \ com_osxkernel_driver_PartitionScheme::start (IOService *provider)\n{\n    IOMedia*\
    \                partition;\n    OSIterator*             partitionIterator;\n\n\
    \    if (super::start(provider) == false)\n        return false;\n\n    // 为在探测过程中找到并实例化的\
    \ IOMedia 对象创建迭代器。\n    partitionIterator = OSCollectionIterator::withCollection(m_partitions);\n\
    \    if (partitionIterator == NULL)\n        return false;\n\n    // 附加并注册每个 IOMedia\
    \ 对象（代表找到的分区）。\n    while ((partition = (IOMedia*)partitionIterator->getNextObject()))\n\
    \    {\n        if (partition->attach(this))\n        {\n            attachMediaObjectToDeviceTree(partition);\n\
    \            partition->registerService();\n        }\n    }\n    partitionIterator->release();\n\
    \n    return true;\n}\n```  \n"
