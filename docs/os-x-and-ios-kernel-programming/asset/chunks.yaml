- fmt: '### Summary


    In this chapter, we have looked at the kernel network filtering KPIs as well as
    how to implement a driver for an Ethernet controller. Some key points are as follows:


    - The kernel network support is split into two parts: the BSD layer that implements
    support for all protocols and network services such as firewalls, and the I/O
    Kit, which provides facilities for writing drivers for network hardware.

    - The kernel filtering KPI allows one to filter and manipulate network packets
    at various levels, including the socket, IP, and interface levels.

    - The most important data-structure of the kernel network subsystem is the `mbuf`
    structure used to store network packets or other related data. In kernel extensions,
    `mbufs` can be manipulated using the opaque reference `mbuf_t` and the functions
    provided by the mbuf KPI. The concept of `mbufs` is used both in the BSD section
    of the kernel and in the I/O Kit.

    - A socket filter allows interception of socket-based communication and out-of-band
    events. It can intercept incoming and outgoing data. Socket filters can be attached
    globally for every socket in the system, or programmatically per socket. With
    a socket filter, you can, among other things, modify, reject, or inject new packets.

    - An IP filter is similar to a socket filter, but works at the IP layer. The IP
    filter will see all IP traffic in the system regardless of interface. It will
    also see IP packets that were not directly initiated through a socket.

    - An interface filter allows a filter to be attached to a specific network interface.
    An interface filter can see all traffic to or from that interface regardless of
    protocol. It is possible to restrict seen packets to a specific protocol family,
    such as IPv4 or IPv6.

    - The `IONetworkingFamily` provides the programming interfaces necessary to implement
    device drivers for network hardware. It includes classes for queuing and classes
    for abstracting the interface between the I/O Kit and the BSD layer.

    - The `IONetworkController` class represents a network driver. A specialized class
    for handling an Ethernet compatible device is provided by `IOEthernetController`.
    The `IONetworkInterface` provides the glue that connects network devices to other
    parts of the kernel network system.


    ## C H A P T E R 14


    ## Storage Systems


    Storage devices encompass many types of devices, including hard disk drives, CDs
    and DVDs, USB flash drives, FireWire-based hard disks, and a file-based disk image
    that has been mounted as a virtual drive. For the user, a storage device appears
    as a volume on their desktop that they can read files from and write files to,
    but what the user doesn''t see is the multiple drivers that work together in the
    kernel to make this possible.


    The reason why storage devices require multiple drivers is a result of the myriad
    of different forms that a storage device may take. If you consider the difference
    between an external USB flash drive and an internal hard disk, both of which appear
    to the user as storage devices, you can appreciate the differences that need to
    be handled. For example:


    - The interface through which a storage device is connected to the computer may
    be a USB or FireWire port (used for external storage devices), or through a SATA
    port (commonly used by the internal hard disk).

    - The computer may control the storage device by sending SCSI commands, as is
    done for USB mass storage devices or FireWire SPB-2 drives, or by sending ATA/ATAPI
    commands to the AHCI interface, as is done for the internally connected SATA disks.

    - The storage device may contain a single volume, or may be partitioned into multiple
    volumes.

    - Each volume will be formatted with a file system chosen by the user, and may
    be HFS+ (the default file system used by Mac OS X), NTFS (the default file system
    used by Windows), or one of the many file systems that Mac OS X supports.


    To handle all of these possible variations, the I/O Kit implements storage devices
    by building a layered stack of multiple drivers, where each layer is responsible
    for handling one aspect, such as the physical connection (USB, FireWire or SATA),
    the command protocol (SCSI or ATA/ATAPI), and the logical volume. Support for
    various file systems is provided by the Virtual File System layer (VFS layer),
    which, although a part of the kernel, resides in the BSD portion of the kernel
    and is located outside of the I/O Kit.


    This modularity in the design of the I/O Kit''s storage stack means that each
    layer of the driver stack is decoupled from the surrounding layers, and each driver
    needs to deal only with the functionality provided by its layer. This means that
    a new file system can be written without any knowledge of the types of storage
    devices on which the file system may reside, since the file system will never
    need to directly communicate with the disk device''s hardware. Similarly, in writing
    a driver for a new type of storage device, the developer doesn''t need to implement
    any details of the file system; instead, the disk can be formatted with any of
    the existing file systems supported by Mac OS X. The driver stack for a storage
    device is shown in [Figure 14-1](#Chapter14.html#fig_14_1).


    ![images](images/1401.jpg)


    ***Figure 14-1.** An abstract view of the drivers involved in supporting a storage
    device*


    It is not necessary to implement a driver in each layer. For example, to implement
    support for a new hard disk, you would need only to write a driver in the transport
    layer; the rest of the driver stack would match against your custom driver, and
    your new disk device would be presented to the user as a standard disk.'
