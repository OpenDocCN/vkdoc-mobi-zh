  trans: '

    # Mac OS X 与 iOS


    Mac OS X 是一款由苹果公司为其 Macintosh 电脑系列开发的基于 Unix 的现代操作系统。OS X 是 Mac OS 的第十代版本。


    OS X 以其易用性和视觉吸引力著称的图形用户界面而闻名。苹果公司的产品拥有狂热的追随者，无论是 OS X 还是 iOS 增添的任何新功能都会引起广泛关注。除了标准版
    OS X 外，苹果还提供了一款名为 `Mac OS X Server` 的服务器版本。


    服务器版后来在 Mac OS X `10.7 (Lion)` 中与标准版合并。OS X 是 Mac OS 9 的继任者，并与早期版本有根本性的不同。与它的前辈们不同，OS
    X 基于 `NeXTSTEP` 操作系统。目前，Mac OS X 已有八个版本发布，最新版本是代号为 Lion 的 Mac OS X `10.7`。迄今为止发布的
    Mac OS X 版本如表 2-1 所示。


    ![images](img/t0201.jpg)


    Mac OS X 附带了一系列面向开发者的工具，包括 `Xcode`，这使得开发各种应用程序成为可能，其中包含本书的主要主题——内核扩展。


    对于最终用户而言，OS X 通常预装了 `iLife` 套件，其中包含用于照片、音频和视频编辑的软件，以及用于编写网页的软件。


    ## NeXTSTEP


    OS X 和 iOS 基于由 NeXT Computer Inc 开发的 `NeXTSTEP` 操作系统。NeXT 公司由史蒂夫·乔布斯于 1985 年离开苹果后创立。该公司最初由乔布斯本人资助，后来获得了大量外部投资。NeXT
    后来被苹果收购，`NeXTSTEP` 技术也随之融入 OS X。NeXT 的目标是为学术界和商业界打造一台计算机。尽管与竞争对手相比在商业上取得的成功有限，但
    NeXT 计算机（尤其是 NeXTcube）拥有一个极具创新性的操作系统，名为 `NeXTSTEP`，它在很多方面都领先于时代。


    `NeXTSTEP` 像当前版本的 OS X 一样，拥有图形用户界面和命令行界面（iOS 不提供用户可访问的命令行界面）。`NeXTSTEP` 引入的许多核心技术至今仍在其后继系统中存在，例如应用程序包和
    `Interface Builder`。`Interface Builder` 现在是 `Xcode` 开发环境的一部分，并广泛应用于 OS X 和 iOS
    的 Cocoa 应用程序开发。`NeXTSTEP` 提供了 `Driver Kit`，这是一个面向对象的驱动开发框架，后来演变为 `I/O Kit`，这是本书的主要主题之一。


    iOS 后来从 OS X 派生而来，是苹果公司面向移动设备的操作系统。它于 2007 年随着第一款 iPhone 的发布而推出，当时被称为 `iPhone
    OS`，但后来更名为 iOS，以更好地反映其也运行在 iPod Touch、iPad 以及最近的 Apple TV 等其他移动设备上。iOS 是专为具有触摸界面的移动设备构建的。与其最大的竞争对手
    Windows 不同，OS X 和 iOS 均未授权给第三方使用，它们只能正式用于苹果的硬件产品。Mac OS X 架构的高级视图如图 2-1 所示。


    ![images](img/0201.jpg)


    **图 2-1.** Mac OS X 架构


    Mac OS X 和 iOS 的核心符合 POSIX 标准，并且自 Mac OS X `10.5 (Leopard)` 起已符合 Unix 03 认证。OS
    X 和 iOS 的核心（包括内核和操作系统的 Unix 基础部分）被称为 Darwin，它是苹果公司发布的一个开源操作系统。与 Mac OS X 不同，Darwin
    不包含标志性的用户界面，因为它是一个精简系统，仅提供内核以及典型的 Unix 系统用户空间基础工具和服务。在其发布之初，唯一支持的架构是 PowerPC 平台，但作为苹果向
    Intel 架构过渡的一部分，随后添加了对 Intel 32 位和 64 位的支持。苹果迄今尚未发布 iOS 所基于的 ARM 版本的 Darwin。Darwin
    目前仅以源代码形式提供下载，需要自行编译。Darwin 发行版包含 `XNU` 内核的源代码。对于想要深入了解操作系统内部工作原理以及开发内核扩展的人来说，内核源代码是非常宝贵的资源。你常常能在源代码的头文件或代码本身中找到比苹果开发者网站上记录的更详细的解释。


    Darwin 操作系统（因此也包括 OS X 和 iOS）运行着 `XNU` 内核，该内核基于 Mach 内核以及 FreeBSD 操作系统的部分代码。图
    2-2 展示了 Mac OS X 的桌面。


    ![images](img/0202.jpg)


    **图 2-2.** Mac OS X 桌面


    ### 编程 API


    正如从图 2-1 中所见，OS X 采用分层架构。在 Darwin 核心和用户应用程序之间是一套丰富的编程 API。其中最重要的是 Cocoa，它是基于 GUI
    的应用程序的首选框架。iOS 中的对应框架是 Cocoa Touch，两者基本相同，但 Cocoa Touch 提供了专为基于触摸的用户交互而设计的 GUI
    元素。Cocoa 和 Cocoa Touch 都是用 Objective-C 语言编写的。Objective-C 是 C 语言的超集，并支持 Smalltalk
    风格的消息传递。


    #### OBJECTIVE-C


    Objective-C 是 Mac OS X、iOS 及其前身 `NeXTSTEP` 下应用程序开发的首选语言。Objective-C 是 C 语言的超集，提供了对面向对象编程的支持，但它缺乏
    C++ 等语言提供的许多高级功能，例如多重继承、模板和运算符重载。Objective-C 使用 Smalltalk 风格的消息传递和动态绑定（这在很多方面消除了对多重继承的需求）。该语言由
    Brad Cox 和 Tom Love 在 20 世纪 80 年代初发明。尽管驱动或系统级编程通常使用 C 或 C++ 完成，但 Objective-C 仍是
    OS X 和 iOS 应用程序开发的事实标准语言。许多核心框架在其类名中仍使用 `NS`（代表 NeXTSTEP）前缀，例如 `NSString` 和 `NSArray`。


    其他编程 API 包括 BSD API，它提供了对底层文件和设备访问的应用程序接口，以及 POSIX 线程 API（`pthreads`）。与 Cocoa
    不同，BSD 层不提供使用图形用户界面开发应用程序的工具。Mac OS X 还有另一个主要 API，称为 Carbon。Carbon 是一个基于 C 语言的
    API，在功能上与 Cocoa 有所重叠。它最初为早期版本的 Mac OS 提供了一些向后兼容性。Carbon API 现已弃用，GUI 应用程序转而使用
    Cocoa，但它在 OS X 中仍然存在，用于支持遗留应用程序，例如苹果的 Final Cut Pro 7。Carbon 的公开版本仍然是 32 位版本，因此需要
    Cocoa 来实现 64 位兼容性。第四个主要 API 是 Java，现在也已弃用。Java 已在 Mac OS X `10.7` 中从默认安装中移除，但仍然可以作为可选安装提供。


    图形和多媒体是 OS X 和 iOS 区别于其他操作系统的关键因素。两者都提供了一套丰富的用于处理图形和多媒体的 API。图形系统的核心是 Quartz 系统。Quartz
    包含了窗口系统（Quartz Compositor）以及被称为 Quartz 2D 的 API。Quartz 基于 PDF（便携式文档格式）模型。它提供了分辨率无关的用户界面，以及对文本和图形的抗锯齿渲染。Quartz
    Extreme 接口提供了硬件辅助的 OpenGL 窗口渲染（在图形硬件支持的情况下）。以下是一些重要的图形和多媒体框架的简短概述。

    '
- fmt: '*   `Quartz`: Consists of the `Quartz 2D` API and the `Quartz Compositor`,
    which provides the graphical window server. `Cocoa Drawing` offers an object-oriented
    interface on top of `Quartz` for use in Cocoa applications.

    *   `OpenGL`: The industry standard API for developing 3D applications. iOS supports
    a version of `OpenGL` called `OpenGL ES`, a subset designed for embedded devices.

    *   `Core Animation`: A layer-based API integrated with Cocoa that makes it easy
    to create animated content and do transformations.

    *   `Core Image`: Provides support for working with images, including adding effects,
    cropping, or color correction.

    *   `Core Audio`: Offers support for audio playback, recording, mixing, and processing.

    *   `QuickTime`: An advanced library for working with multimedia. It allows playback
    and the recording of audio and video, including professional formats.

    *   `Core Text`: A C-based API for text rendering and layout. The `Cocoa Text`
    API is based on `Core Text`.


    ### Supported Platforms


    At its release, OS X was only supported on the PowerPC platform. In January 2006,
    Apple released version 10.4.4, which finally brought Mac OS X to the Intel x86-platform,
    as announced at WWDC 2005. The reason for transitioning away from the PowerPC
    platform was, according to Apple, their disappointment in IBM''s ability to deliver
    a competitive microprocessor, especially for low-power processors intended for
    laptops. The transition to Intel was smooth for Apple, and indeed it is one of
    the few examples of a successful platform shift within the industry.


    Apple provided an elegant solution, called `Rosetta`, which is a dynamic translator
    that would allow existing PowerPC applications to run on x86-based Macs (naturally
    with some performance penalties). Apple also provided developers with `Universal
    Binaries`, which allowed native code for more than one architecture to exist within
    a single binary executable (also referred to as fat binaries). While support for
    PowerPC was discontinued, as of Mac OS X 10.6 (Snow Leopard), `Universal Binaries`
    is still used to provide 32-bit, and 64-bit x86 or `x86_64`, executables.


    ### 164-bit Operating System


    Mac OS X 10.5 (Leopard) allowed, for the first time, GUI applications to be 64-bit
    native, accomplished through a new 64-bit version of Cocoa, which allowed developers
    to tap the additional benefits provided by the 64-bit CPUs found in the current
    generation of Macs. Applications based on the `Carbon` API are still 32-bit only.
    The subsequent release of Mac OS X 10.6 (Snow Leopard) took things one-step further
    by allowing the kernel to run in 64-bit mode.


    While most applications and APIs were already 64-bit in Leopard, the kernel itself
    was still running in 32-bit mode. Although Snow Leopard made a 64-bit mode kernel
    possible, only some of the models defaulted to 64-bit, while other models required
    it to be enabled manually. Snow Leopard was the first release that did not include
    support for PowerPC computers, although PowerPC applications could still be run
    with `Rosetta`. Support for `Rosetta` was removed in Lion, along with support
    for the 32-bit kernel. While user space is able to support both 64-bit and 32-bit
    applications side by side, the kernel is incompatible with 32-bit drivers and
    extensions when running in 64-bit mode. A 64-bit kernel provides many advantages,
    and a larger address space means large amounts of memory can be supported.


    ### iOS


    iOS, or iPhone OS 1.0 as it was initially called, was released in June 2007 (see
    [Table 2-2](#Chapter02.html#tab_2_2) for iOS releases). It was based on Mac OS
    X and shared most of its fundamental architecture with its older sibling. It featured,
    however, a new and innovative user interface provided by the Cocoa Touch API (sharing
    many traits and parts with the original Cocoa), which was specifically designed
    for the iPhone''s capacitive touch screen. In addition to Cocoa Touch, iOS had
    a number of other programming APIs, like the `Accelerate` framework, which provided
    math and other related functions, optimized for the iOS hardware. The `External
    Accessory Framework` allows iOS devices to communicate with third-party hardware
    devices via Bluetooth or the inbuilt 30-pin connector.


    ![images](images/t0202.jpg)


    At its launch, iPhone OS was not able to run native third party applications,
    but it could run web applications tailored to the iPhone, which could be added
    to the iPhone''s home screen. An SDK for the iPhone was later announced at the
    beginning of 2008, which allowed development of third party applications. Unlike
    most computer platforms, however, Apple requires all iPhone applications to be
    submitted and pre-approved, and thus digitally signed, before a customer can install
    it through the App Store. While many criticized the approach (and still do), it
    allowed Apple to weed out poorly written, slow, and malicious software, thereby
    improving the overall user experience, and ultimately the popularity of the platform.
    Unofficially, it has been possible to “Jailbreak” iOS and gain access to the underlying
    Unix and kernel environment, but this voids the warranty. Due to concerns about
    battery life, the iPhone was not able to properly multitask third-party applications
    until the release of iOS 4.0. iOS now supports the iPhone, iPod Touch, and iPad,
    and also runs on the latest generation of Apple TVs, which were previously based
    on OS X, running on Intel x86 CPUs. Apple does not support third party applications
    on the Apple TV at this time.'
