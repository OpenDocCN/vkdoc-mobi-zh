    \n    super::stop(provider);\n}\n```\n\n## 基于状态的交互\n\n虽然获取和设置驱动属性的方法为与驱动及硬件设备交互提供了一种非常简便的方式，但它相当不灵活，因此仅适用于非常特定的用途。I/O\
    \ Kit 框架提供了另一种从用户空间应用程序与驱动交互的方法，该方法基于用户应用程序与驱动之间的连接。使用连接允许驱动确定请求来自哪个用户应用程序，从而可以将状态与连接关联起来。（或者，由于一个应用程序可以打开与驱动的多个连接，驱动可以确定请求来自哪个连接。）这使得实现复杂的协议和基于状态的控制成为可能。\n\
    \n例如，一个硬件设备可能同时只允许一个用户空间应用程序访问，这就需要应用程序请求对设备的独占访问权。获得独占访问权后，它可能需要先配置设备，然后才能读写数据。通过基于连接的方法，驱动可以将硬件的控制权授予已获得设备独占访问权的客户端，并拒绝来自其他连接的请求。此外，它可以确保如果某个连接尚未按需配置硬件，则该客户端无法读写数据。使用连接还允许驱动实现异步操作。应用程序可以向驱动发送一个请求以开始后台操作，然后可以轮询驱动以确定操作是否已完成。由于驱动看到开始操作的请求和每次轮询操作状态的请求都来自同一连接，因此它可以用此信息来确定应用程序正在轮询哪个操作。或者，驱动可以使用应用程序的连接，在后台操作完成时向应用程序发送通知，从而无需轮询状态。\n\
    \n在内核中，用户应用程序与驱动的每个连接都由一个名为`IOUserClient`的类来表示。对于与驱动的每个连接，I/O Kit 会实例化一个`IOUserClient`对象，并且该对象仅在应用程序关闭与驱动的连接或应用程序终止时才会被销毁。应用程序向驱动发出的所有控制请求都由代表该特定连接的用户客户端对象处理。驱动提供了从`IOUserClient`子类化的自定义类实现，并添加了维持应用程序连接状态所需的任何方法和实例变量。\n\
    \nI/O Kit 设计的巧妙之处在于，用户客户端对象本身就是一个驱动对象：`IOUserClient`类继承自`IOService`，并且与任何其他`IOService`实例一样，每个用户客户端都有一个提供者类。对于用户客户端而言，其提供者就是应用程序正在控制的驱动实例。驱动与其用户客户端实例之间的关系示例如图\
    \ 5-2 所示。\n\n![images](img/0502.jpg)\n\n**图 5-2.** 驱动对象与其用户客户端对象之间的关系，后者提供了应用程序连接到驱动的内核端表示。\n\
    \n要建立与驱动的连接，应用程序只需按如下方式调用函数`IOServiceOpen()`：\n\n```cpp\ntask_port_t     owningTask\
    \ = mach_task_self();\nuint32_t        type = 0;\nio_connect_t    driverConnection;\n\
    kern_return_t   kr;\n\nkr = IOServiceOpen(service, owningTask, type, &driverConnection);\n\
    ```\n"
- fmt: "\nIn the preceding code, `service` represents the driver that the application\
    \ wishes to connect to, which is found using the standard driver matching techniques\
    \ described earlier, `owningTask` represents the running application, and `type`\
    \ is an unsigned 32-bit integer whose value is interpreted by the driver in any\
    \ way that it chooses. The `driverConnection` parameter is returned to the caller\
    \ if the function completes successfully and represents the established connection\
    \ to the driver. Any request that the application sends to the driver will be\
    \ made by calling a function that takes this connection object as a parameter.\
    \ When the application is no longer interested in controlling the driver, it makes\
    \ a call to the function `IOServiceClose()`.\n\nWhen an application calls the\
    \ function `IOServiceOpen()`, the operating system calls the specified driver\
    \ object in the kernel, which handles the request. The driver's class receives\
    \ the following method call:\n\n```\nIOReturn    DriverClass::newUserClient (task_t\
    \ owningTask, void* securityID, UInt32 type,\nOSDictionary* properties, IOUserClient**\
    \ handler)\n```\n\nMany of the parameters to the `newUserClient()` method should\
    \ look familiar. They are simply the values that the user space application passed\
    \ to the `IOServiceOpen()` function. The kernel implementation of `newUserClient()`\
    \ is responsible for instantiating a new user client object and returning it to\
    \ the caller through the `handler` parameter. However, most drivers will never\
    \ need to implement the `newUserClient()` method because an implementation that\
    \ is suitable for nearly all uses is provided by the `IOService` base class. To\
    \ take advantage of this standard implementation, all that a driver needs to do\
    \ is add a string value to its property table with the key `IOUserClientClass`.\
    \ The value of this property is a string value that contains the class name of\
    \ a driver's user client class. This can be done either by adding an entry to\
    \ the driver's personality in the `Info.plist` file (because the driver's property\
    \ table is initialized from the values in the `Info.plist` file) or by manually\
    \ setting the property when the driver loads. For example, the driver in [Figure\
    \ 5-2](#Chapter05.html#fig_5_2) has a user client that is implemented by a class\
    \ named `MyUserClient` and, as a result, would set its user client class with\
    \ the following call:\n\n```\nsetProperty(\"IOUserClientClass\", \"MyUserClient\"\
    );\n```\n\nThe standard implementation of `newUserClient()` will instantiate the\
    \ driver's specified user client class and initialize the new user client, making\
    \ the main driver class its provider.\n\nLet's look at how we would implement\
    \ a user client class for the tutorial I/O Kit driver that was developed in [Chapter\
    \ 4](#Chapter04.html#ch4). The header file for a skeleton user client class for\
    \ this driver is shown in [Listing 5-8](#Chapter05.html#list_5_8). You will notice\
    \ that many of the methods that the user client implements are similar to the\
    \ methods implemented by the main driver class, which is because the class `IOUserClient`\
    \ is derived from the same `IOService` class that every driver is ultimately derived\
    \ from. A user client therefore implements the same initialization and termination\
    \ methods that any other driver class must implement.\n\n**Listing 5-8.** The\
    \ Header File for a Basic User Client Class\n\n```\nclass com_osxkernel_driver_IOKitTestUserClient\
    \ : public IOUserClient\n{\n        OSDeclareDefaultStructors(com_osxkernel_driver_IOKitTestUserClient)\n\
    \nprivate:\n        task_t                          m_task;\n        com_osxkernel_driver_IOKitTest*\
    \ m_driver;\n\npublic:\n        virtual bool    initWithTask (task_t owningTask,\
    \ void* securityToken,\n                                        UInt32 type, OSDictionary*\
    \ properties);\n        virtual bool    start (IOService* provider);\n\n     \
    \   virtual IOReturn        clientClose (void);     \n        virtual void   \
    \ stop (IOService* provider);\n        virtual void    free (void);\n};\n```\n\
    \nAlong with the familiar methods `start()`, `stop()`, and `free()`, the user\
    \ client provides an additional method that is part of a user client's object\
    \ management, namely `clientClose()`. This method is called when the user space\
    \ application has closed its connection to the driver, either through a call to\
    \ `IOServiceClose()` or because the application has terminated or crashed. A driver\
    \ should not trust a user space application to be well-written and to tidy up\
    \ after itself before the user client is closed. Therefore, the `clientClose()`\
    \ method is a good place for a driver to make sure that the hardware is returned\
    \ to an idle state and ready for the next user space application that wishes to\
    \ use it.\n\n![images](images/square.jpg) **Tip** The `IOUserClient` class provides\
    \ a method named `clientDied()`. A subclass can choose to implement this method\
    \ if it needs to distinguish between a client connection closing as a result of\
    \ the user space process terminating without calling `IOServiceClose()`. Since\
    \ the default implementation of `clientDied()` simply calls `clientClose()`, most\
    \ user client implementations can get by with an implementation of the `clientClose()`\
    \ method which handles both cases.\n\nThe implementation of a sample user client\
    \ class is shown in [Listing 5-9](#Chapter05.html#list_5_9). For brevity, the\
    \ implementation methods of `stop()` and `free()` have been omitted because, for\
    \ our basic user client, these methods are simply calling through to the implementation\
    \ provided by the superclass.\n\n**Listing 5-9.** The Implementation of a Basic\
    \ User Client Class\n\n```\n// Define the superclass.\n#define super IOUserClient\n\
    \nOSDefineMetaClassAndStructors(com_osxkernel_driver_IOKitTestUserClient, IOUserClient)\n\
    \nbool    com_osxkernel_driver_IOKitTestUserClient::initWithTask (task_t owningTask,\
    \ void*\nsecurityToken, UInt32 type, OSDictionary* properties)\n{\n        if\
    \ (!owningTask)\n                return false;\n\n        if (! super::initWithTask(owningTask,\
    \ securityToken , type, properties))\n                return false;\n\n      \
    \  m_task = owningTask;\n\n        // Optional:  Determine whether the calling\
    \ process has admin privileges.\n        IOReturn ret = clientHasPrivilege(securityToken,\
    \ kIOClientPrivilegeAdministrator);\n        if ( ret == kIOReturnSuccess )\n\
    \        {\n                // m_taskIsAdmin = true;\n        }\n\n        return\
    \ true;\n}\n\nbool    com_osxkernel_driver_IOKitTestUserClient::start (IOService*\
    \ provider)\n{\n        if (! super::start(provider))\n                return\
    \ false;\n\n        m_driver = OSDynamicCast(com_osxkernel_driver_IOKitTest, provider);\n\
    \        if (!m_driver)\n                return false;\n\n        return true;\n\
    }\n\nIOReturn        com_osxkernel_driver_IOKitTestUserClient::clientClose (void)\n\
    {\n        terminate();\n        return kIOReturnSuccess;\n}\n```\n\nThere are\
    \ several important points to note about the implementation of the three user\
    \ client methods shown in [Listing 5-9](#Chapter05.html#list_5_9):\n"
