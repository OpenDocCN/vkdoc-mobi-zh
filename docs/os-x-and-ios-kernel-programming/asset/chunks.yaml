    #### USB 传输速度


    `USB`标准的首个版本支持两种速度：低速 1.5 Mbit/s 和全速 12 Mbit/s。低速设备不易受电磁干扰影响，因此可以使用质量较低的部件制造，从而降低成本。这降低了不需要全速设备额外带宽的简单`USB`设备的成本。`USB
    2.0`标准包含了全速模式，运行速度可达 480 Mbit/s，同时向后兼容`USB 1.0`。这使得`USB`与当时运行速度为 400 Mbit/s 的`Firewire`规格具有竞争力（参见表
    8-1 中的`USB`传输速度）。


    ![images](img/t0801.jpg)


    `USB 3.0`规格支持高达 5 Gbit/s 的速度，在 2011 年`Thunderbolt`发布之前，它是最快的通用外部总线。苹果迄今未在其计算机中选用兼容`USB
    3.0`的设备，不过支持`ExpressCard`或`PCI-Express`的 Mac 已有第三方产品可用。


    #### 主机控制器


    主机控制器由单独的规格定义，这些规格决定了计算机系统如何与主机控制器通信。现代系统通常将`USB`主机控制器嵌入主板的 I/O 控制器（南桥）中。大多数主机控制器具有`PCI`接口，系统通过该接口与控制器通信。当驱动程序与`USB`设备通信时，它并非直接进行——而是通过`PCI`与主机控制器通信，但由于
    I/O Kit 提供的面向对象抽象层，对驱动程序而言，它看起来就像是在直接与设备通信。`USB`不会直接产生中断；但主机控制器同时使用`DMA`和中断。


    通常，一个 32 位 x86 系统只有 16 条中断线，可供外部外设使用的中断线常常只有 2 到 3 条。`USB`解决了这个问题，因为计算机系统只需要一条连接到`USB`主机控制器的中断线，即可与连接到该控制器的所有设备通信。`USB`规格标准化了主机与`USB`设备的通信方式；然而，关于计算机系统如何与主机控制器通信，存在多种标准：


    *   *通用主机控制器接口（UHCI）：* `UHCI`由英特尔开发。`UHCI`规格支持低速和全速的`USB 1.x`设备。

    *   *开放主机控制器接口（OHCI）：* `OHCI`主要由微软和康柏等公司为`USB 1.x`设备开发。`OHCI`控制器比`UHCI`更“智能”，因为它在控制器本身内置了更多逻辑，而`UHCI`在硬件层面更简单，但在操作系统中需要更复杂的主机控制器驱动程序。

    *   *增强型主机控制器接口（EHCI）：* `EHCI`是为`USB 2.0`创建的，支持 480 Mbit/s 的高速设备。`EHCI`不处理`USB
    1.x`设备，因此需要集成一个基于`UHCI`或`OHCI`的控制器来处理基于`1.x`系列规格的设备。

    *   *可扩展主机控制器接口（xHCI）：* `xHCI`由英特尔设计，支持`USB 3.0`规格。它被设计为统一的主机控制器，使`EHCI`、`OHCI`和`UHCI`变得多余。


    计算机系统拥有多个主机控制器并不罕见，每个控制器支持不同的主机控制器接口。例如，图 8-1 中的 MacBook 有两个`OHCI`控制器和两个`EHCI`控制器，以支持`USB
    2.0`。Mac OS X 目前拥有支持`OHCI`、`UHCI`和`EHCI`的控制器驱动程序，但不支持`xHCI`。


    **USB ON-THE-GO**


    作为`USB 2.0`规格的一部分，还存在一个名为`USB On-The-Go (OTG)`的附加标准。虽然移动电话等嵌入式设备通常充当`USB`（从）设备，但`USB
    OTG`允许角色切换，使移动设备本身充当`USB`主机。`USB OTG`仅在两台设备之间工作，不支持集线器。`iPad`就是一个很好的例子，`iPad`可以作为`USB`设备连接到计算机系统。然而，使用专用适配器，`iPad`也可以充当`USB`主机，你可以将数码相机或存储卡连接到它。

    '
- fmt: '### The USB Protocol


    Unlike serial port devices, where there are no protocols (it''s up to the application
    to implement one) and just streams of bits and bytes, the USB has a packet-based
    protocol. This is necessary as the bus is shared and there can be many devices
    connected to it, which has to be individually addressed. Unless you are a hardware
    engineer programming the firmware for a USB device, you don''t really need to
    understand, or even know about, the specifics of how this communication occurs,
    but it may be helpful, in some cases, to have a basic understanding of how the
    communication happens at the protocol level, in order to debug problems.


    The USB protocol is implemented between the host controller and the device, and
    it determines how data is transferred on the bus. A driver does not really have
    insight or influence over this process, as the details are handled by the electronics
    of the host and the device, and not the driver—unlike with networking, where many
    aspects of the communication protocol are under software control. In order to
    see or intercept what is actually crossing the wire, a USB packet analyzer is
    needed. A USB analyzer is a specialized (usually very expensive) device that can
    be connected between the device and the host to capture the traffic between them.


    USB packets consist of 8-bit words in little-endian format (LSB). The USB protocol
    has four main packet types:


    - **Token packet:** This acts a header, and tells the recipient what type of packet/data
    follows. The three types of token packets are `IN`, `OUT`, and `Setup`. The first
    two specify the direction of the packet and the last is used to initiate a control
    transfer. The direction is seen from the host side, so `IN` means a transfer from
    the device to the host, and `OUT` means a transfer from the host to the device.

    - **Data packet:** This can carry arbitrary data, with 0–1024 bytes per data packet.

    - **Handshake packet:** This is sent to acknowledge the successful (`ACK`) or
    unsuccessful (`NAK`) delivery of a packet, as well as to report stalls (`STALL`).

    - **Start of Frame packet:** This is sent at regular intervals to synchronize
    data flow for isochronous transfer modes.


    The layout of each packet type can be seen in [Figure 8-2](#Chapter08.html#fig_8_2).


    ![images](images/0802.jpg)


    ***Figure 8-2.** Layout of USB packet types*


    All USB packets start with the **sync** and **PID** (packet identifier) fields.
    The sync field precedes other data and can be used by the receiver for clock synchronization.
    The field is 8-bits for low and full speed devices, and 32-bits for high-speed
    devices. The PID (packet identifier) field allows the decoder to determine the
    packet type that follows it. Possible values for the PID field are shown in [Table
    8-2](#Chapter08.html#tab_8_2). The PID is 4-bits wide, though it is 8-bits in
    total. The last four bits are a check field containing a complement of the first
    four bits, which helps determine if the packet is valid and has not been corrupted.


    ![images](images/t0802.jpg)


    Token packets are used for addressing a specific device. The address field specifies
    which device the packet is to or from, and is a number from 1–127, which addresses
    the device on the bus. A USB device may have several endpoints, which are independent
    communication channels, and the **endpoint** field specifies to which endpoint
    on a device the packet will be delivered. Endpoints are discussed later in this
    chapter.


    All packet types have a CRC (Cyclic Redundancy Check—used to verify the integrity
    of the data) field. All packet types have a CRC field that is 5-bits wide, except
    data packets, which instead have a wider 16-bit CRC field.


    The end of packet (EOP) field is used as a delimiter.


    A USB transaction can consist of up to three data packets. Data packets are indicated
    by the PID field and can be one of the following: `DATA0`, `DATA1`, `DATA2`, and
    `MDATA`, though the latter two are used only for isochronous transfer modes. The
    PID field determines which of the data packets are transmitted, as shown in [Table
    8-2](#Chapter08.html#tab_8_2).


    A data transfer from the host to a device might look like this:


    1. Token Packet containing the address of the device and the endpoint. PID indicates
    an `OUT` transfer.

    2. Data 0 Packet containing 1024 bytes of payload data.

    3. Data 1 Packet containing 322 bytes of payload data.

    4. Handshake Packet sent from the device to the host indicating the status of
    the transfer, such as `ACK`, `NAK`, or `STALL`.


    ### Endpoints


    Communication between a host controller and a USB device is based on the concept
    of endpoints. An endpoint is uni-directional, and the direction is either IN or
    OUT—that is, communication from the device to the host, or communication from
    the host to the device. The connection from a host controller to an endpoint is
    referred to as a pipe. There are two types of pipes: a **stream pipe**, which
    carries data, and a **message pipe**, which carries control requests. A USB device
    can support up to 32 endpoints, with a maximum of 16 IN endpoints and 16 OUT endpoints.
    Endpoint address 0 is special, reserved for device configuration. There are four
    different types of endpoints available:


    - **Bulk endpoints:** These are used for transferring large amounts of data. Bulk
    transfers offer no guarantees about timely delivery or bandwidth, but do offer
    guaranteed delivery and error detection. Bulk transfers are not available for
    low speed modes. Hard drives, scanners, printers, and network cards typically
    use bulk transfers.

    - **Control endpoints:** These are used for device configuration and status retrieval.
    Requests to a control endpoint are guaranteed delivery by using reserved bandwidth.

    - **Interrupt endpoints:** These are intended for exchanging small amounts of
    time-sensitive data with guaranteed delivery.

    - **Isochronous endpoints:** These provide guaranteed bandwidth, but not guaranteed
    delivery. Data is not re-sent if it is lost, which is ideal for video and audio
    applications.'
