    file, and that is to include our dependencies under the `OSBundleLibraries` dictionary;
    otherwise, the driver will fail to load. Dependencies can be found using the `kextlibs`
    tool. We used the following section to add a dependency to libkern and `IOUSBFamily`:


    `<key>OSBundleLibraries</key>`

    `<dict>`

    `        <key>com.apple.iokit.IOUSBFamily</key>`

    `        <string>4.1.8</string>`

    `        <key>com.apple.kernel.libkern</key>`

    `        <string>6.0</string>`

    `</dict>`


    We are now ready to load the driver, or rather to allow I/O Kit to load the driver
    for us. For the driver to load automatically, as the USB device is plugged in,
    it must be located in the directory `/System/Library/Extensions`, the standard
    location for all KEXTs.


    When all is done, you should now be able to plug the device in. Before you do,
    however, you can bring up the Console application, and select kernel.log from
    the log list. Once you insert your compatible device, you should see the following
    entries being printed to the log in response to the insertion:


    * * *


    `Jun 16 22:37:56 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver::init(0x1361f900)`

    `Jun 16 22:37:56 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver(0x1361f900)::attach`

    `Jun 16 22:37:56 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver(0x1361f900)::probe`

    `Jun 16 22:37:56 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver(0x1361f900)::detach`

    `Jun 16 22:37:56 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver(0x1361f900)::attach`

    `Jun 16 22:37:56 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver(0x1361f900)::start`

    `Jun 16 22:37:56 macbook kernel[0]: Endpoint #4 --> Type: kUSBBulk --> Direction:
    IN (kUSBIn)`

    `maxPacketSize: 512 interval: 0`

    `Jun 16 22:37:56 macbook kernel[0]: Endpoint #3 --> Type: kUSBBulk --> Direction:
    OUT`

    `(kUSBOut) maxPacketSize: 512 interval: 0`


    * * *


    The first five calls are part of the matching process. The first method `attach()`
    is used to connect our driver into the IOService plane of the I/O Registry, which
    in this case will attach us as a client of the `IOUSBInterface` nub, which again
    is the client of the `IOUSBDevice` we just plugged in. As we know from [Chapter
    4](#Chapter04.html#ch4), the probe method is used for active matching, and allows
    us to further interrogate the device, or interface in this case, to determine
    if we are a match for it. I/O Kit then calls `detach()`, and the decision to which
    driver to load is made once all possible matches have been examined. It is usually
    not recommended to allocate any resources in `attach()` as it can be called multiple
    times. Usually, it is not necessary to override `attach()` or `detach()`, as the
    default ones provided by `IOService` are almost always sufficient. Once I/O Kit
    has selected our driver, which is guaranteed in our case (as we specified a unique
    `IOMatchCategory`), we will be getting a call to our `attach()` method again,
    and then finally the `start()` method of our driver. We can now use USB Prober
    to verify where in the hierarchy our driver was placed, as shown in [Figure 8-7](#Chapter08.html#fig_8_7).


    ![images](images/0807.jpg)


    ***Figure 8-7.** USB Prober showing the com_osxkernel_MyFirstUSBDriver attached
    to the IOService plane*


    You will notice that we are attached to the `IOUSBInterface` of the storage device,
    together with the `IOUSBMassStorageClass` driver, and that the USB device itself
    is managed by the composite driver `IOUSBCompositeDriver`.


    #### Driver Startup


    The implementation of our `start()` method in MyFirstUSBDriver is deliberately
    sparse because the `IOUSBMassStorageClass` driver is also managing the interface,
    and we do not wish to interfere with its use of the USB interface. We do a basic
    sanity check, which is commonly done in the `start()` method, to ensure that we
    get a provider that is of the type we expect. However, nothing is preventing you
    from writing a driver that can accept and work with multiple types of providers—for
    example, an `IOUSBDevice` and `IOUSBInterface`, or even an `IOPCIDevice` provider.


    Here''s an outline of the steps a USB driver typically must perform in its `start()`
    method:


    *   Verify that the IOService provider object passed to us is of the type we expect.
    We do this with the help of the `OSDynamicCast()` macro, which works with I/O
    Kit''s runtime type identification system, and returns a pointer to the object
    if the cast is successful, or `NULL` otherwise.

    *   Store a pointer to the provider for later use.

    *   Attempt to open the provider by calling its `open(IOService* forClient, …)`
    method.

    *   If your driver is operating on an `IOUSBDevice` you may have to set the device''s
    configuration. For `IOUSBInterface`-based drivers, the `IOUSBCompositeDriver`
    normally handles this. You can set the configuration using `IOUSBDevice::SetConfiguration()`.

    *   Find and verify the interfaces you will use for a driver that has an `IOUSBDevice`
    provider. And search for the appropriate endpoints needed by your driver. More
    about this in the section “Enumerating Device Resources.”

    *   Interrogate the device for status information, and perform the needed configuration
    of the device by issuing control requests to it.

    *   Allocate any driver specific resources you may need, for example I/O buffers
    or auxiliary classes needed by your driver.

    *   If your driver is a *nub* and intends to provide services to other drivers,
    it needs to allocate and register these. For example, in the case of `IOUSBMassStorageClass`
    it will allocate `IOSCSILogicalUnitNub` objects for each logical unit provided
    by the interface, and for each of these call `registerService()`, a method inherited
    from `IOService`. The method ensures that matching will begin for each `IOSCSILogicalUnitNub`
    object.

    *   If everything succeeds, `start()` should return `true`. If `false` is returned,
    the driver will obviously not be loaded, and the I/O Kit will try to load a new
    driver, if any, possibly one that “lost” and got a lower score previously. Be
    aware that `stop()` will not be called if you return `false` from `start()`.


    ![images](images/square.jpg) **Tip** To uninstall `MyFirstUSBDriver`, simply use
    the command: `sudo rm –rf /System/Library/Extensions/MyFirstUSBDriver.kext`


    #### Handling Device Removals


    USB devices and drivers must be able to cope with the removal of a device at any
    point in time. When the `IOUSBController` detects that a device is removed, it
    will propagate this information recursively down the driver stack. The first notification
    to a driver is made by calling its `terminate()` method. The following sequence
    of calls is the result of unplugging the mass storage device that MyFirstUSBDriver
    is attached to:


    `Jun 16 22:58:46 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver(0xb4e6100)::terminate`

    `Jun 16 22:58:46 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver(0xb4e6100)::stop`

    `Jun 16 22:58:46 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver(0xb4e6100)::detach`


    Any incomplete I/O can be cancelled using `IOUSBPipe::Abort()` and can be done
    when the `terminate()` method gets called, or in the `willTerminate()` or `didTerminate()`
    methods if overridden by the driver.


    The next step in the removal process is that the driver''s `stop()` method will
    be called, which should reverse actions taken in the `start()` method. After that
    `detach()` and finally `free()` will be called, which should clean up all remaining
    resources.


    If your driver is opened by a user application, for example through a `IOUserClient`,
    it will not be deallocated (the `free()` method will not be called) until the
    application releases its reference to the device. If the device happens to be
    re-inserted at this time, the application is not able to resume using the device,
    as a new instance of the driver is created each time a device is inserted. The
    application can handle this by using notifications, as described in [Chapter 5](#Chapter05.html#ch5).'
  trans: "\n# 驱动程序属性列表与加载\n\n我们需要对驱动程序的属性列表文件进行一项额外修改：在 `OSBundleLibraries` 字典中包含我们的依赖项；否则驱动程序将无法加载。可以使用\
    \ `kextlibs` 工具查找依赖项。我们使用以下部分为 `libkern` 和 `IOUSBFamily` 添加了依赖关系：\n\n```\n<key>OSBundleLibraries</key>\n\
    <dict>\n        <key>com.apple.iokit.IOUSBFamily</key>\n        <string>4.1.8</string>\n\
    \        <key>com.apple.kernel.libkern</key>\n        <string>6.0</string>\n</dict>\n\
    ```\n\n现在我们已经准备好加载驱动程序，或者更准确地说，是让 I/O Kit 为我们加载驱动程序。为了让驱动程序在 USB 设备插入时自动加载，它必须位于\
    \ `/System/Library/Extensions` 目录中，这是所有 KEXT 的标准位置。\n\n完成所有操作后，你现在应该可以插入设备了。不过在插入之前，你可以打开\
    \ Console 应用程序，并从日志列表中选择 `kernel.log`。一旦插入兼容的设备，你应该会看到以下条目被打印到日志中以响应插入操作：\n\n\
    ---\n\n```\nJun 16 22:37:56 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver::init(0x1361f900)\n\
    Jun 16 22:37:56 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver(0x1361f900)::attach\n\
    Jun 16 22:37:56 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver(0x1361f900)::probe\n\
    Jun 16 22:37:56 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver(0x1361f900)::detach\n\
    Jun 16 22:37:56 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver(0x1361f900)::attach\n\
    Jun 16 22:37:56 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver(0x1361f900)::start\n\
    Jun 16 22:37:56 macbook kernel[0]: Endpoint #4 --> Type: kUSBBulk --> Direction:\
    \ IN (kUSBIn)\nmaxPacketSize: 512 interval: 0\nJun 16 22:37:56 macbook kernel[0]:\
    \ Endpoint #3 --> Type: kUSBBulk --> Direction: OUT\n(kUSBOut) maxPacketSize:\
    \ 512 interval: 0\n```\n\n---\n\n前五次调用属于匹配过程。第一个方法 `attach()` 用于将我们的驱动程序连接到 I/O\
    \ Registry 的 `IOService` 平面，在本例中，这将使我们成为 `IOUSBInterface` 节点的客户端，而该节点又是我们刚刚插入的\
    \ `IOUSBDevice` 的客户端。正如我们从第 4 章中了解到的，`probe` 方法用于主动匹配，并允许我们进一步询问设备（或本例中的接口）以确定是否匹配。然后\
    \ I/O Kit 会调用 `detach()`，并在检查所有可能的匹配项后做出加载哪个驱动程序的决定。通常不建议在 `attach()` 中分配任何资源，因为它可能被多次调用。通常不需要重写\
    \ `attach()` 或 `detach()`，因为 `IOService` 提供的默认方法几乎总是足够的。一旦 I/O Kit 选择了我们的驱动程序（在我们的情况下是确定的，因为我们指定了唯一的\
    \ `IOMatchCategory`），我们将再次收到对 `attach()` 方法的调用，然后最终调用驱动程序的 `start()` 方法。我们现在可以使用\
    \ USB Prober 来验证驱动程序在层次结构中的位置，如图 8-7 所示。\n\n![images](img/0807.jpg)\n\n***图 8-7.**\
    \ USB Prober 显示 `com_osxkernel_MyFirstUSBDriver` 已附加到 `IOService` 平面*\n\n你会注意到，我们与\
    \ `IOUSBMassStorageClass` 驱动程序一起附加到了存储设备的 `IOUSBInterface`，而 USB 设备本身则由复合驱动程序\
    \ `IOUSBCompositeDriver` 管理。\n\n## 驱动程序启动\n\n我们在 `MyFirstUSBDriver` 中实现的 `start()`\
    \ 方法故意保持精简，因为 `IOUSBMassStorageClass` 驱动程序也正在管理该接口，并且我们不希望干扰它对 USB 接口的使用。我们进行了一个基本的完整性检查（这是\
    \ `start()` 方法中的常见做法），以确保我们获得的提供程序是我们期望的类型。但是，这并不妨碍你编写一个能够接受并与多种类型提供程序（例如 `IOUSBDevice`\
    \ 和 `IOUSBInterface`，甚至 `IOPCIDevice` 提供程序）一起工作的驱动程序。\n\n以下是 USB 驱动程序在其 `start()`\
    \ 方法中通常必须执行的步骤概述：\n\n*   验证传递给我们的 `IOService` 提供程序对象是否是我们期望的类型。我们借助 `OSDynamicCast()`\
    \ 宏来完成此操作，该宏与 I/O Kit 的运行时类型识别系统协同工作，如果转换成功则返回指向对象的指针，否则返回 `NULL`。\n*   存储提供程序的指针以备后用。\n\
    *   尝试通过调用提供程序的 `open(IOService* forClient, ...)` 方法打开它。\n*   如果你的驱动程序在 `IOUSBDevice`\
    \ 上运行，你可能需要设置设备的配置。对于基于 `IOUSBInterface` 的驱动程序，通常由 `IOUSBCompositeDriver` 处理。你可以使用\
    \ `IOUSBDevice::SetConfiguration()` 设置配置。\n*   对于具有 `IOUSBDevice` 提供程序的驱动程序，查找并验证你将使用的接口。并搜索驱动程序所需的适当端点。更多信息请参阅“枚举设备资源”一节。\n\
    *   向设备询问状态信息，并通过向其发送控制请求来执行所需的设备配置。\n*   分配驱动程序可能需要的任何特定资源，例如 I/O 缓冲区或驱动程序所需的辅助类。\n\
    *   如果你的驱动程序是一个 *节点*，并打算为其他驱动程序提供服务，则需要分配并注册这些服务。例如，在 `IOUSBMassStorageClass`\
    \ 的情况下，它会为接口提供的每个逻辑单元分配 `IOSCSILogicalUnitNub` 对象，并为每个对象调用 `registerService()`（从\
    \ `IOService` 继承的方法）。此方法确保将开始为每个 `IOSCSILogicalUnitNub` 对象进行匹配。\n*   如果一切成功，`start()`\
    \ 应返回 `true`。如果返回 `false`，驱动程序显然将无法加载，并且 I/O Kit 将尝试加载一个新的驱动程序（如果存在），可能是一个之前“失败”且评分较低的驱动程序。请注意，如果从\
    \ `start()` 返回 `false`，则不会调用 `stop()`。\n\n![images](img/square.jpg) **提示** 要卸载\
    \ `MyFirstUSBDriver`，只需使用命令：`sudo rm –rf /System/Library/Extensions/MyFirstUSBDriver.kext`\n\
    \n## 处理设备移除\n\nUSB 设备和驱动程序必须能够应对设备在任何时间被移除的情况。当 `IOUSBController` 检测到设备被移除时，它会递归地将此信息向下传播到驱动程序栈。驱动程序收到的第一个通知是通过调用其\
    \ `terminate()` 方法进行的。以下调用序列是拔掉 `MyFirstUSBDriver` 所附加的大容量存储设备的结果：\n\n```\nJun\
    \ 16 22:58:46 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver(0xb4e6100)::terminate\n\
    Jun 16 22:58:46 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver(0xb4e6100)::stop\n\
    Jun 16 22:58:46 macbook kernel[0]: com_osxkernel_MyFirstUSBDriver(0xb4e6100)::detach\n\
    ```\n\n任何未完成的 I/O 都可以使用 `IOUSBPipe::Abort()` 取消，可以在调用 `terminate()` 方法时执行，或者在驱动程序重写的\
    \ `willTerminate()` 或 `didTerminate()` 方法中执行。\n\n移除过程的下一步是调用驱动程序的 `stop()` 方法，该方法应撤消在\
    \ `start()` 方法中执行的操作。然后会调用 `detach()`，最后调用 `free()`，它应该清理所有剩余的资源。\n\n如果你的驱动程序被用户应用程序打开（例如通过\
    \ `IOUserClient`），那么在应用程序释放其对设备的引用之前，它不会被释放（`free()` 方法不会被调用）。如果此时设备恰好被重新插入，应用程序将无法恢复使用该设备，因为每次插入设备时都会创建驱动程序的新实例。应用程序可以通过使用通知来处理此问题，如第\
    \ 5 章所述。\n"
- fmt: "# Enumerating Interfaces\n\nDuring a USB driver's `start()` method, it is\
    \ usually necessary to find and configure the endpoints and interfaces that will\
    \ be used by the device. If your driver is based on the `IOUSBDevice` provider,\
    \ chances are that you need to search for one or more of the interfaces that will\
    \ be used by your driver. This can be done using the `IOUSBDevice::FindNextInterface()`\
    \ method:\n\n```\nvirtual IOUSBInterface* FindNextInterface(IOUSBInterface* current,\n\
    \                                          IOUSBFindInterfaceRequest* request);\n\
    ```\n\nThe first parameter can be specified to start the search from an existing\
    \ `IOUSBInterface` instance and ignore any interfaces before it. `NULL` can be\
    \ specified to start the search from the first interface.\n\nThe second parameter\
    \ is a structure of the type `IOUSBFindInterfaceRequest`:\n\n```\ntypedef struct\
    \ {\n    UInt16 bInterfaceClass;\n    UInt16 bInterfaceSubClass;\n    UInt16 bInterfaceProtocol;\n\
    \    UInt16 bAlternateSetting;\n} IOUSBFindInterfaceRequest;\n```\n\nTo find an\
    \ interface, you can fill out the `IOUSBFindInterfaceRequest` structure with the\
    \ desired properties for the interface.\n\n- `bInterfaceClass` and `bInterfaceSubClass`\
    \ can be filled in to search for an interface of a specific class and subclass.\
    \ The values correspond to the codes in [Table 8-3](#Chapter08.html#tab_8_3).\
    \ The header file `USBSpec.h` in the `IOUSBFamily` source distribution define\
    \ symbolic constants such as `kUSBMassStorageInterfaceClass` or `kUSBPrintingClass`.\n\
    - The `bInterfaceProtocol` specifies the protocol used by the interface. The field\
    \ is meaningless without the class and subclass. A HID (Human Interaction Device)\
    \ may for example specify the protocol as `kHIDKeyboardInterfaceProtocol` or `kHIDMouseInterfaceProtocol`.\n\
    - It is possible for an interface to have alternate versions of itself that uses\
    \ a different set of endpoints, the `bAlternateSetting` field can therefore be\
    \ set to request the specific interface desired.\n\nFields that does not matter\
    \ can be set to `kIOUSBFindInterfaceDontCare`. Setting every field to this value\
    \ will simply return the next interface regardless.\n\n[Listing 8-6](#Chapter08.html#list_8_6)\
    \ shows an extract from the Apple USB Ethernet driver which uses the `FindNextInterface()`\
    \ method to search a USB device (`IOUSBDevice`) for an interface that supports\
    \ Ethernet.\n\n**Listing 8-6.** Searching a IOUSBDevice for a Interface (from\
    \ USBCDCEthernet.cpp)\n\n```\nIOUSBFindInterfaceRequest               req;\nIOUSBInterface*\
    \                         fCommInterface = NULL;\n\nreq.bInterfaceClass =    kUSBCommClass;\n\
    req.bInterfaceSubClass = kEthernetControlModel;\nreq.bInterfaceProtocol = kIOUSBFindInterfaceDontCare;\n\
    req.bAlternateSetting =  kIOUSBFindInterfaceDontCare;\n\nfCommInterface = fpDevice->FindNextInterface(NULL,\
    \ &req);    \nif (!fCommInterface)\n{\n     // not found\n     …\n}\n```\n\n#\
    \ Enumerating Endpoints\n\nAn interface does not do anything useful by itself,\
    \ so once the correct interface is retrieved by the driver, it must enumerate\
    \ the interface's endpoints which are used for actual I/O. The enumeration/search\
    \ process is similar to that of finding an interface and is done with the `IOUSBInterface::FindNextPipe()`\
    \ method:\n\n```\nvirtual IOUSBPipe *FindNextPipe(IOUSBPipe *current, IOUSBFindEndpointRequest\
    \ *request);\nvirtual IOUSBPipe* FindNextPipe(IOUSBPipe *current, IOUSBFindEndpointRequest\
    \ *request,\n        bool withRetain);\n```\n\nThe first parameter if non-`NULL`\
    \ tells the method to ignore pipes before it. The second parameter is a pointer\
    \ to an `IOUSBFindEndpointRequest`:\n\n```\ntypedef struct {\n    UInt8 type;\n\
    \    UInt8 direction;\n    UInt16 maxPacketSize;\n    UInt8 interval;\n} IOUSBFindEndpointRequest;\n\
    ```\n\n- The `type` field can be `kUSBControl`, `kUSBIsoc`, `kUSBBulk`, `kUSBInterrupt`,\
    \ or `kUSBAnyType`.\n- The `direction` field must be set to `kUSBOut`, `kUSBIn`,\
    \ or `kUSBAnyDirn`.\n- The `maxPacketSize` field is the max packet size in bytes\
    \ that endpoint zero supports, and should be 8, 16, 32, or 64. It can be set to\
    \ 0 if irrelevant.\n- The `interval` field can be used to search for an endpoint\
    \ that has a specific polling interval. The polling interval only applies to isochronous\
    \ and interrupts endpoints.\n\n[Listing 8-7](#Chapter08.html#list_8_7) shows how\
    \ the Apple USB Ethernet driver uses the `FindNextPipe()` method to enumerate\
    \ endpoints.\n\n**Listing 8-7.** Enumerating IOUSBPipe Instances for an Interface\
    \ (from USBCDCEthernet.cpp)\n\n```\nIOUSBFindEndpointRequest        epReq;   \
    \       // endPoint request struct on stack\n…\n// Open all the end points\n\n\
    epReq.type = kUSBBulk;\nepReq.direction = kUSBIn;\nepReq.maxPacketSize     = 0;\n\
    epReq.interval = 0;\nfInPipe = fDataInterface->FindNextPipe(0, &epReq);\nif (!fInPipe)\n\
    {\n    …\n    return false;\n}\n…\nepReq.direction = kUSBOut;\nfOutPipe = fDataInterface->FindNextPipe(0,\
    \ &epReq);\nif (!fOutPipe)\n{\n    …\n    return false;\n}\nfOutPacketSize = epReq.maxPacketSize;\n\
    …\n// Interrupt pipe - Comm Interface\n\nepReq.type = kUSBInterrupt;\nepReq.direction\
    \ = kUSBIn;\nfCommPipe = fCommInterface->FindNextPipe(0, &epReq);\nif (!fCommPipe)\n\
    {\n      ….\n}\n```\n\nThe driver in [Listing 8-7](#Chapter08.html#list_8_7) is\
    \ a USB Ethernet driver. It uses three endpoints for its operation. The first\
    \ is a bulk IN endpoint, which is used to read network data from the device. The\
    \ second endpoint is a bulk OUT pipe, which is used to transmit packets to the\
    \ device. The last endpoint is an interrupt IN endpoint, which is used to signal\
    \ the arrival of a network packet and for notification of other events. In the\
    \ following sections, we will look at how endpoints are used to perform I/O."
  raw: '#### Enumerating Interfaces


    During a USB driver''s `start()` method, it is usually necessary to find and configure
    the endpoints and interfaces that will be used by the device. If your driver is
    based on the `IOUSBDevice` provider, chances are that you need to search for one
    or more of the interfaces that will be used by your driver. This can be done using
    the `IOUSBDevice::FindNextInterface()` method:


    `virtual IOUSBInterface* FindNextInterface(IOUSBInterface* current,`

    `                                          IOUSBFindInterfaceRequest* request);`


    The first parameter can be specified to start the search from an existing `IOUSBInterface`
    instance and ignore any interfaces before it. `NULL` can be specified to start
    the search from the first interface.


    The second parameter is a structure of the type `IOUSBFindInterfaceRequest`:


    `typedef struct {`

    `    UInt16 bInterfaceClass;`

    `    UInt16 bInterfaceSubClass;`

    `    UInt16 bInterfaceProtocol;`

    `    UInt16 bAlternateSetting;`

    `} IOUSBFindInterfaceRequest;`


    To find an interface, you can fill out the `IOUSBFindInterfaceRequest` structure
    with the desired properties for the interface.


    *   `bInterfaceClass` and `bInterfaceSubClass` can be filled in to search for
    an interface of a specific class and subclass. The values correspond to the codes
    in [Table 8-3](#Chapter08.html#tab_8_3). The header file `USBSpec.h` in the `IOUSBFamily`
    source distribution define symbolic constants such as `kUSBMassStorageInterfaceClass`
    or `kUSBPrintingClass`.

    *   The `bInterfaceProtocol` specifies the protocol used by the interface. The
    field is meaningless without the class and subclass. A HID (Human Interaction
    Device) may for example specify the protocol as `kHIDKeyboardInterfaceProtocol`
    or `kHIDMouseInterfaceProtocol`.

    *   It is possible for an interface to have alternate versions of itself that
    uses a different set of endpoints, the `bAlternateSetting` field can therefore
    be set to request the specific interface desired.


    Fields that does not matter can be set to `kIOUSBFindInterfaceDontCare`. Setting
    every field to this value will simply return the next interface regardless.


    [Listing 8-6](#Chapter08.html#list_8_6) shows an extract from the Apple USB Ethernet
    driver which uses the `FindNextInterface()` method to search a USB device (`IOUSBDevice`*)*
    for an interface that supports Ethernet.


    ***Listing 8-6.** Searching a IOUSBDevice for a Interface (from USBCDCEthernet.cpp)*


    `IOUSBFindInterfaceRequest               req;`

    `IOUSBInterface*                         fCommInterface = NULL;`


    `req.bInterfaceClass =    kUSBCommClass;`

    `req.bInterfaceSubClass = kEthernetControlModel;`

    `req.bInterfaceProtocol = kIOUSBFindInterfaceDontCare;`

    `req.bAlternateSetting =  kIOUSBFindInterfaceDontCare;`


    `fCommInterface = fpDevice->FindNextInterface(NULL, &req);    `

    `if (!fCommInterface)`

    `{`

    `     // not found`

    `     …`

    `}`


    #### Enumerating Endpoints


    An interface does not do anything useful by itself, so once the correct interface
    is retrieved by the driver, it must enumerate the interface''s endpoints which
    are used for actual I/O. The enumeration/search is process is similar to that
    of finding an interface and is done with the `IOUSBInterface::FindNextPipe()`
    method:


    `virtual IOUSBPipe *FindNextPipe(IOUSBPipe *current, IOUSBFindEndpointRequest
    *request);`

    `virtual IOUSBPipe* FindNextPipe(IOUSBPipe *current, IOUSBFindEndpointRequest
    *request,`

    `        bool withRetain);`


    The first parameter if non-`NULL` tells the method to ignore pipes before it.
    The second parameter is a pointer to an `IOUSBFindEndpointRequest`:


    `typedef struct {`

    `    UInt8 type;`

    `    UInt8 direction;`

    `    UInt16 maxPacketSize;`

    `    UInt8 interval;`

    `} IOUSBFindEndpointRequest;`


    *   The `type` field can be `kUSBControl`, `kUSBIsoc`, `kUSBBulk`, `kUSBInterrupt`,
    or `kUSBAnyType`.

    *   The `direction` field must be set to `kUSBOut`, `kUSBIn`, or `kUSBAnyDirn`.

    *   The `maxPacketSize` field is the max packet size in bytes that endpoint zero
    supports, and should be 8, 16, 32, or 64\. It can be set to 0 if irrelevant.

    *   The `interval` field can be used to search for an endpoint that has a specific
    polling interval. The polling interval only applies to isochronous and interrupts
    endpoints.


    [Listing 8-7](#Chapter08.html#list_8_7) shows how the Apple USB Ethernet driver
    uses the `FindNextPipe()` method to enumerate endpoints.


    ***Listing 8-7.** Enumerating IOUSBPipe Instances for an Interface (from USBCDCEthernet.cpp)*


    `IOUSBFindEndpointRequest        epReq;          // endPoint request struct on
    stack`

    `…`

    `// Open all the end points`


    `epReq.type = kUSBBulk;`

    `epReq.direction = kUSBIn;`

    `epReq.maxPacketSize     = 0;`

    `epReq.interval = 0;`

    `fInPipe = fDataInterface->FindNextPipe(0, &epReq);`

    `if (!fInPipe)`

    `{`

    `    …`

    `    return false;`

    `}`

    `…`

    `epReq.direction = kUSBOut;`

    `fOutPipe = fDataInterface->FindNextPipe(0, &epReq);`

    `if (!fOutPipe)`

    `{`

    `    …`

    `    return false;`

    `}`

    `fOutPacketSize = epReq.maxPacketSize;`

    `…`

    `// Interrupt pipe - Comm Interface`


    `epReq.type = kUSBInterrupt;`

    `epReq.direction = kUSBIn;`

    `fCommPipe = fCommInterface->FindNextPipe(0, &epReq);`

    `if (!fCommPipe)`

    `{`

    `      ….`

    `}`


    The driver in [Listing 8-7](#Chapter08.html#list_8_7) is a USB Ethernet driver.
    It uses three endpoints for its operation. The first is a bulk IN endpoint, which
    is used to read network data from the device. The second endpoint is a bulk OUT
    pipe, which is used to transmit packets to the device. The last end point is an
    interrupt IN endpoint, which is used to signal the arrival of a network packet
    and for notification of other events. In the following sections, we will look
    at how endpoints are used to perform I/O.'
  trans: "\n# 枚举接口\n\n在 USB 驱动的 `start()` 方法中，通常需要查找并配置设备将要使用的端点和接口。如果你的驱动基于 `IOUSBDevice`\
    \ 提供者，很可能需要搜索一个或多个驱动将要使用的接口。这可以通过 `IOUSBDevice::FindNextInterface()` 方法实现：\n\n\
    ```\nvirtual IOUSBInterface* FindNextInterface(IOUSBInterface* current,\n    \
    \                                      IOUSBFindInterfaceRequest* request);\n\
    ```\n\n第一个参数可以指定为从某个已有的 `IOUSBInterface` 实例开始搜索，并忽略它之前的所有接口。若指定为 `NULL`，则从第一个接口开始搜索。\n\
    \n第二个参数是 `IOUSBFindInterfaceRequest` 类型的结构体：\n\n```\ntypedef struct {\n    UInt16\
    \ bInterfaceClass;\n    UInt16 bInterfaceSubClass;\n    UInt16 bInterfaceProtocol;\n\
    \    UInt16 bAlternateSetting;\n} IOUSBFindInterfaceRequest;\n```\n\n要查找一个接口，你可以用所需的属性填充\
    \ `IOUSBFindInterfaceRequest` 结构体。\n\n-   `bInterfaceClass` 和 `bInterfaceSubClass`\
    \ 可用于搜索特定类和子类的接口。这些值对应 表 8-3 中的代码。`IOUSBFamily` 源代码发行版中的头文件 `USBSpec.h` 定义了符号常量，例如\
    \ `kUSBMassStorageInterfaceClass` 或 `kUSBPrintingClass`。\n-   `bInterfaceProtocol`\
    \ 指定了接口使用的协议。如果没有类和子类，该字段没有意义。例如，一个 HID（人机交互设备）可以将协议指定为 `kHIDKeyboardInterfaceProtocol`\
    \ 或 `kHIDMouseInterfaceProtocol`。\n-   一个接口可能存在使用不同端点集的替代版本，因此 `bAlternateSetting`\
    \ 字段可以被设置为请求所需的特定接口。\n\n无关紧要的字段可以设置为 `kIOUSBFindInterfaceDontCare`。将所有字段都设置为该值将简单地返回下一个接口，无论其是什么。\n\
    \n代码清单 8-6 展示了 Apple USB 以太网驱动的一个摘录，它使用 `FindNextInterface()` 方法在 USB 设备（`IOUSBDevice`）上搜索支持以太网的接口。\n\
    \n**代码清单 8-6.** 在 IOUSBDevice 中搜索接口（来自 USBCDCEthernet.cpp）\n\n```\nIOUSBFindInterfaceRequest\
    \               req;\nIOUSBInterface*                         fCommInterface =\
    \ NULL;\n\nreq.bInterfaceClass =    kUSBCommClass;\nreq.bInterfaceSubClass = kEthernetControlModel;\n\
    req.bInterfaceProtocol = kIOUSBFindInterfaceDontCare;\nreq.bAlternateSetting =\
    \  kIOUSBFindInterfaceDontCare;\n\nfCommInterface = fpDevice->FindNextInterface(NULL,\
    \ &req);    \nif (!fCommInterface)\n{\n     // 未找到\n     …\n}\n```\n\n# 枚举端点\n\
    \n一个接口本身并不能做什么有用的事情，因此一旦驱动检索到正确的接口，它就必须枚举该接口用于实际 I/O 的端点。枚举/搜索过程类似于查找接口的过程，并通过\
    \ `IOUSBInterface::FindNextPipe()` 方法完成：\n\n```\nvirtual IOUSBPipe *FindNextPipe(IOUSBPipe\
    \ *current, IOUSBFindEndpointRequest *request);\nvirtual IOUSBPipe* FindNextPipe(IOUSBPipe\
    \ *current, IOUSBFindEndpointRequest *request,\n        bool withRetain);\n```\n\
    \n如果第一个参数非 `NULL`，则告知方法忽略它之前的管道。第二个参数是指向 `IOUSBFindEndpointRequest` 的指针：\n\n```\n\
    typedef struct {\n    UInt8 type;\n    UInt8 direction;\n    UInt16 maxPacketSize;\n\
    \    UInt8 interval;\n} IOUSBFindEndpointRequest;\n```\n\n-   `type` 字段可以是 `kUSBControl`、`kUSBIsoc`、`kUSBBulk`、`kUSBInterrupt`\
    \ 或 `kUSBAnyType`。\n-   `direction` 字段必须设置为 `kUSBOut`、`kUSBIn` 或 `kUSBAnyDirn`。\n\
    -   `maxPacketSize` 字段是端点零支持的最大数据包大小（以字节为单位），应为 8、16、32 或 64。如果无关紧要，可以设置为 0。\n\
    -   `interval` 字段可用于搜索具有特定轮询间隔的端点。轮询间隔仅适用于等时和中断端点。\n\n代码清单 8-7 展示了 Apple USB 以太网驱动如何使用\
    \ `FindNextPipe()` 方法枚举端点。\n\n**代码清单 8-7.** 为接口枚举 IOUSBPipe 实例（来自 USBCDCEthernet.cpp）\n\
    \n```\nIOUSBFindEndpointRequest        epReq;          // 栈上的端点请求结构体\n…\n// 打开所有端点\n\
    \nepReq.type = kUSBBulk;\nepReq.direction = kUSBIn;\nepReq.maxPacketSize     =\
    \ 0;\nepReq.interval = 0;\nfInPipe = fDataInterface->FindNextPipe(0, &epReq);\n\
    if (!fInPipe)\n{\n    …\n    return false;\n}\n…\nepReq.direction = kUSBOut;\n\
    fOutPipe = fDataInterface->FindNextPipe(0, &epReq);\nif (!fOutPipe)\n{\n    …\n\
    \    return false;\n}\nfOutPacketSize = epReq.maxPacketSize;\n…\n// 中断管道 - 通信接口\n\
    \nepReq.type = kUSBInterrupt;\nepReq.direction = kUSBIn;\nfCommPipe = fCommInterface->FindNextPipe(0,\
    \ &epReq);\nif (!fCommPipe)\n{\n      ….\n}\n```\n\n代码清单 8-7 中的驱动是一个 USB 以太网驱动。它使用三个端点进行操作。第一个是批量\
    \ IN 端点，用于从设备读取网络数据。第二个端点是批量 OUT 管道，用于向设备传输数据包。最后一个端点是中断 IN 端点，用于通知网络数据包到达以及其他事件。在接下来的章节中，我们将研究如何使用端点来执行\
    \ I/O。\n"
- fmt: "# Performing Device Requests\n\nDevice requests are I/O requests to the default\
    \ bi-directional default control pipe zero of the USB device, typically used for\
    \ device configuration and accessing device registers. There are three classes\
    \ of device requests:\n\n* **Standard USB requests**: These are standard requests\
    \ implemented by all devices. An example of a standard device request is querying\
    \ a device's status. A list of symbolic constants for standard requests can be\
    \ found in `USBSpec.h`.\n* **Class specific requests**: These are specific to\
    \ a class of device. For example, an Ethernet device may provide a number of requests\
    \ for configuring Ethernet related parameters.\n* **Vendor specific requests**\n\
    \nTo perform a device request, both `IOUSBDevice` and `IOUSBInterface` provide\
    \ a special `DeviceRequest()` convenience method, which under the hood uses the\
    \ `IOUSBPipe` object, representing the default pipe, to transmit the request.\
    \ If you wish, you can enumerate the `IOUSBPipe` instance for the zero endpoint\
    \ and use it directly as well. The method is declared as follows:\n\n```\nDeviceRequest(IOUSBDevRequest\
    \ *request, UInt32 noDataTimeout,\n              UInt32 completionTimeout, IOUSBCompletion\
    \ *completion);\nDeviceRequest(IOUSBDevRequestDesc *, UInt32 noDataTimeout,\n\
    \              UInt32 completionTimeout, IOUSBCompletion *completion);\n```\n\n\
    In order to send a request, you must create an `IOUSBDevRequest` or `IOUSBDeviceRequestDesc`\
    \ structure and fill in the appropriate fields.\n\n```\ntypedef struct {     \
    \                  typedef struct {\n    UInt8 bmRequestType;                \
    \   UInt8 bmRequestType;\n    UInt8 bRequest;                        UInt8 bRequest;\n\
    \    UInt16 wValue;                         UInt16 wValue;\n    UInt16 wIndex;\
    \                         UInt16 wIndex;\n    UInt16 wLength;                \
    \        UInt16 wLength;\n    void *pData;                           IOMemoryDescriptor\
    \ *pData;\n    UInt32 wLenDone;                       UInt32 wLenDone;\n} IOUSBDevRequest;\
    \                     } IOUSBDevRequestDesc;\n```\n\n* The `bmRequestType` field:\
    \ Is a composite field that specifies the type of request, the direction, the\
    \ type, and the recipient. The field can be generated by using the `USBmakebmRequestType(direction,\
    \ type, recipient)` macro with the following parameters:\n    * The `direction`\
    \ will be either `kUSBIn`, `kUSBOut`, or `kUSBNone`.\n    * The `type` will be\
    \ either `kUSBStandard`, `kUSBClass`, or `kUSBVendor`.\n    * The `recipient`\
    \ will be either `kUSBInterface`, `kUSBEndpoint`, or `kUSBDevice`.\n* The `bRequest`\
    \ field: This is a 8-bit value that selects the request to be performed.\n* The\
    \ `wValue` and `wIndex`: These can be used to pass arguments along with the request.\
    \ Their meaning depends on the request. For interface and endpoint requests, the\
    \ `wIndex` number specifies the index number of the endpoint/interface to which\
    \ the request is addressed. You can get the index number by calling either `IOUSBPipe::GetEndpointNumber()`\
    \ or `IOUSBInterface->GetInterfaceNumber()`.\n* The `wLength` field: This is the\
    \ number of bytes for the `pData` field.\n* The `pData` field: This is either\
    \ a pointer to a memory buffer or an `IOMemoryDescriptor`. The `pData` pointer\
    \ may be set to `NULL` if no additional data is needed for the request. The buffer\
    \ will either be read from or written to, depending on the direction of the request.\
    \ If an `IOMemoryDescriptor` is used you should call `prepare()` on it first to\
    \ ensure the memory is paged in and pinned down until the request is completed.\
    \ The memory may come from user space if a memory descriptor is used. If the `void*`\
    \ variant is used, the pointer must be in the kernel's virtual address space.\n\
    * The `wLenDone` field: This should not be filled in, as it is used to return\
    \ the number of bytes actually transferred.\n\nApart from the `request` parameters,\
    \ the `DeviceRequest()` methods takes another three parameters.\n\n* `noDataTimeout`:\
    \ This is the timeout, in milliseconds, to wait before aborting the request if\
    \ no data has been sent/received.\n* `completionTimeout`: This specifies a timeout\
    \ value for the entire command with data, and is also in milliseconds.\n* `completion`:\
    \ This is optional, and if specified it allows us to perform the request asynchronously,\
    \ which may often be desired to avoid blocking the calling thread. We will discuss\
    \ asynchronous requests in more detail later in this chapter.\n\nLet's look at\
    \ an example of how a device request can be issued, again using the Apple USB\
    \ Ethernet driver as an example. The code in [Listing 8-8](#Chapter08.html#list_8_8)\
    \ is called by the driver from a periodic timer and is used to get statistics\
    \ and status information from the Ethernet device, such as collisions, dropped\
    \ packets, incoming packets, etc.\n\n**Listing 8-8.** Device Request for Downloading\
    \ Statistics From An Ethernet Device (USBCDCEthernet.cpp)\n\n```\nSTREQ = (IOUSBDevRequest*)IOMalloc(sizeof(IOUSBDevRequest));\n\
    if (!STREQ)\n{\n     ...\n} else {\n     bzero(STREQ, sizeof(IOUSBDevRequest));\n\
    \     // Now build the Statistics Request\n    STREQ->bmRequestType = USBmakebmRequestType(kUSBOut,\
    \ kUSBClass, kUSBInterface);\n    STREQ->bRequest = kGet_Ethernet_Statistics;\n\
    \    STREQ->wValue = currStat;\n    STREQ->wIndex = fCommInterfaceNumber;\n  \
    \  STREQ->wLength = 4;\n    STREQ->pData = &fStatValue;\n\n    fStatsCompletionInfo.parameter\
    \ = STREQ;\n\n    rc = fpDevice->DeviceRequest(STREQ, &fStatsCompletionInfo);\n\
    \    if (rc != kIOReturnSuccess)\n    {\n    ...\n        IOFree(STREQ, sizeof(IOUSBDevRequest));\n\
    \    } else {\n       fStatInProgress = true;\n    }\n}\n```\n\nThe request in\
    \ [Listing 8-8](#Chapter08.html#list_8_8) is performed asynchronously. Because\
    \ the `IOUSBDevRequest` structure must persist until the request finishes, it\
    \ must not be allocated on the stack, although this is fine for a synchronous\
    \ request. The request performed in [Listing 8-8](#Chapter08.html#list_8_8) is\
    \ directed to a specific interface, and it is a class specific request, which\
    \ means it will work the same on all interfaces with the same class code. The\
    \ `wValue` field of the request is an index number specifying the statistic that\
    \ should be transferred.\n\n## Control Requests\n\nDevice requests, discussed\
    \ in the previous section, are I/O to the default control pipe (zero). The `DeviceRequest()`\
    \ method cannot be used for control endpoints other than the default. If we wish\
    \ to perform requests to another control endpoint, we must use the `IOUSBPipe::ControlRequest()`\
    \ method instead. There are four `ControlRequest()` methods available:\n\n```\n\
    virtual IOReturn ControlRequest(IOUSBDevRequestDesc* request,\n        IOUSBCompletion*\
    \ completion = 0);\nvirtual IOReturn ControlRequest(IOUSBDevRequest* request,\
    \ IOUSBCompletion* completion = 0);\nvirtual IOReturn ControlRequest(IOUSBDevRequestDesc*\
    \ request,\n        UInt32 noDataTimeout,\n        UInt32 completionTimeout,\n\
    \        IOUSBCompletion* completion = 0);\nvirtual IOReturn ControlRequest(IOUSBDevRequest*\
    \ request,\n        UInt32 noDataTimeout,\n        UInt32 completionTimeout,\n\
    \        IOUSBCompletion* completion = 0);\n```\n\nThe two first methods use the\
    \ exact same arguments as the `DeviceRequest()` method discussed earlier. The\
    \ two last also support the `noDataTimeout` and `completionTimeout` parameters."
  raw: "#### Performing Device Requests\n\nDevice requests are I/O requests to the\
    \ default bi-directional default control pipe zero of the USB device, typically\
    \ used for device configuration and accessing device registers. There are three\
    \ classes of device requests:\n\n*   Standard USB requests: These are standard\
    \ requests implemented by all device. An example of a standard device request\
    \ is querying a device's status. A list of symbolic constants for standard requests\
    \ can be found in `USBSpec.h`.\n*   Class specific requests: These are specific\
    \ to a class of device. For example, an Ethernet device may provide a number of\
    \ requests for configuring Ethernet related parameters.\n*   Vendor specific requests\n\
    \nTo perform a device request, both `IOUSBDevice` and `IOUSBInterface` provide\
    \ a special `DeviceRequest()` convenience method, which under the hood uses the\
    \ `IOUSBPipe` object, representing the default pipe, to transmit the request.\
    \ If you wish, you can enumerate the `IOUSBPipe` instance for the zero endpoint\
    \ and use it directly as well. The method is declared as follows:\n\n`DeviceRequest(IOUSBDevRequest\
    \ *request, UInt32 noDataTimeout,`\n`              UInt32 completionTimeout, IOUSBCompletion\
    \ *completion);`\n`DeviceRequest(IOUSBDevRequestDesc *, UInt32 noDataTimeout,`\n\
    `              UInt32 completionTimeout, IOUSBCompletion *completion);`\n\nIn\
    \ order to send a request, you must create an `IOUSBDevRequest` or `IOUSBDeviceRequestDesc`\
    \ structure and fill in the appropriate fields.\n\n`typedef struct {                       typedef\
    \ struct {`\n`    UInt8 bmRequestType;                   UInt8 bmRequestType;`\n\
    `    UInt8 bRequest;                        UInt8 bRequest;`\n`    UInt16 wValue;                         UInt16\
    \ wValue;`\n`    UInt16 wIndex;                         UInt16 wIndex;`\n`    UInt16\
    \ wLength;                        UInt16 wLength;`\n`    void *pData;                           IOMemoryDescriptor\
    \ *pData;`\n`    UInt32 wLenDone;                       UInt32 wLenDone;`\n`}\
    \ IOUSBDevRequest;                     } IOUSBDevRequestDesc;`\n\n*   The `bmRequestType`\
    \ field: Is a composite field that specifies the type of request, the direction,\
    \ the type, and the recpient. The field can be generated by using the `USBmakebmRequestType(direction,\
    \ type, recpient)` macro with the following paramters:\n    *   The `direction`\
    \ will be either `kUSBIn`, `kUSBOut`, or `kUSBNone`.\n    *   The `type` will\
    \ be either `kUSBStandard`, `kUSBClass`, or `kUSBVendor`.\n    *   The `recpient`\
    \ will be either `kUSBInterface`, `kUSBEndpoint`, or `kUSBDevice`.\n*   The `bRequest`\
    \ field: This is a 8-bit value that selects the request to be performed.\n*  \
    \ The `wValue` and `wIndex`: These can be used to pass arguments along with the\
    \ request. Their meaning depends on the request. For interface and endpoint requests,\
    \ the `wIndex` number specifies the index number of the endpoint/interface to\
    \ which the request is addressed. You can get the index number by calling either\
    \ `IOUSBPipe::GetEndpointNumber()` or `IOUSBInterface->GetInterfaceNumber()`.\n\
    *   The `wLength` field: This is the number of bytes for the `pData` field.\n\
    *   The `pData` field: This is either a pointer to a memory buffer or an `IOMemoryDescriptor`.\
    \ The `pData` pointer may be set to `NULL` if no additional data is needed for\
    \ the request. The buffer will either be read from or written to, depending on\
    \ the direction of the request. If an `IOMemoryDescriptor` is used you should\
    \ call `prepare()` on it first to ensure the memory is paged in and pinned down\
    \ until the request is completed. The memory may come from user space if a memory\
    \ descriptor is used. If the `void*` variant is used, the pointer must be in the\
    \ kernel's virtual address space.\n*   The `wLenDone` field: This should not be\
    \ filled in, as it is used to return the number of bytes actually transferred.\n\
    \nApart from the `request` parameters, the `DeviceRequest()` methods takes another\
    \ three parameters.\n\n*   `noDataTimeout`: This is the timeout, in milliseconds,\
    \ to wait before aborting the request if no data has been sent/received.\n*  \
    \ `completionTimeout`: This specifies a timeout value for the entire command with\
    \ data, and is also in milliseconds.\n*   `completion`: This is optional, and\
    \ if specified it allows us to perform the request asynchronously, which may often\
    \ be desired to avoid blocking the calling thread. We will discuss asynchronous\
    \ requests in more detail later in this chapter.\n\nLet's look at an example of\
    \ how a device request can be issued, again using the Apple USB Ethernet driver\
    \ as an example. The code in [Listing 8-8](#Chapter08.html#list_8_8) is called\
    \ by the driver from a periodic timer and is used to get statistics and status\
    \ information from the Ethernet device, such as collisions, dropped packets, incoming\
    \ packets, etc.\n\n***Listing 8-8.** Device Request for Downloading Statistics\
    \ From An Ethernet Device (USBCDCEthernet.cpp)*\n\n`STREQ = (IOUSBDevRequest*)IOMalloc(sizeof(IOUSBDevRequest));`\n\
    `if (!STREQ)`\n`{`\n`     ...`\n`} else {`\n`     bzero(STREQ, sizeof(IOUSBDevRequest));`\n\
    `     // Now build the Statistics Request`\n`    STREQ->bmRequestType = USBmakebmRequestType(kUSBOut,\
    \ kUSBClass, kUSBInterface);`\n`    STREQ->bRequest = kGet_Ethernet_Statistics;`\n\
    `    STREQ->wValue = currStat;`\n`    STREQ->wIndex = fCommInterfaceNumber;`\n\
    `    STREQ->wLength = 4;`\n`    STREQ->pData = &fStatValue;`\n\n`    fStatsCompletionInfo.parameter\
    \ = STREQ;`\n\n`    rc = fpDevice->DeviceRequest(STREQ, &fStatsCompletionInfo);`\n\
    `    if (rc != kIOReturnSuccess)`\n`    {`\n`    ...`\n`        IOFree(STREQ,\
    \ sizeof(IOUSBDevRequest));`\n`    } else {`\n`       fStatInProgress = true;`\n\
    `    }`\n`}`\n\nThe request in [Listing 8-8](#Chapter08.html#list_8_8) is performed\
    \ asynchronously. Because the `IOUSBDevRequest` structure must persist until the\
    \ request finishes, it must not be allocated on the stack, although this is fine\
    \ for a synchronous request. The request performed in [Listing 8-8](#Chapter08.html#list_8_8)\
    \ is directed to a specific interface, and it is a class specific request, which\
    \ means it will work the same on all interfaces with the same class code. The\
    \ `wValue` field of the request is an index number specifying the statistic that\
    \ should be transferred.\n\n##### Control Requests\n\nDevice requests, discussed\
    \ in the previous section, are I/O to the default control pipe (zero). The `DeviceRequest()`\
    \ method cannot be used for control endpoints other than the default. If we wish\
    \ to perform requests to another control endpoint, we must use the `IOUSBPipe::ControlRequest()`\
    \ method instead. There are four `ControlRequest()` methods available:\n\n`virtual\
    \ IOReturn ControlRequest(IOUSBDevRequestDesc* request,`\n`        IOUSBCompletion*\
    \ completion = 0);`\n`virtual IOReturn ControlRequest(IOUSBDevRequest* request,\
    \ IOUSBCompletion* completion = 0);`\n`virtual IOReturn ControlRequest(IOUSBDevRequestDesc*\
    \ request,`\n`        UInt32 noDataTimeout,`\n`        UInt32 completionTimeout,`\n\
    `        IOUSBCompletion* completion = 0);`\n`virtual IOReturn ControlRequest(IOUSBDevRequest*\
    \ request,`\n`        UInt32 noDataTimeout,`\n`        UInt32 completionTimeout,`\n\
    `        IOUSBCompletion* completion = 0);`\n\nThe two first methods use the exact\
    \ same arguments as the `DeviceRequest()` method discussed earlier. The two last\
    \ also support the `noDataTimeout` and `completionTimeout` parameters."
  trans: "\n# 执行设备请求\n\n设备请求是指针对 USB 设备默认双向控制端点 0 的 I/O 请求，通常用于设备配置和访问设备寄存器。设备请求分为三类：\n\
    \n* **标准 USB 请求**：所有设备都需实现的标准化请求，例如查询设备状态。标准请求的符号常量列表可在`USBSpec.h`中找到。\n* **类特定请求**：针对特定设备类别的请求。例如，以太网设备可能提供多个用于配置以太网相关参数的请求。\n\
    * **厂商特定请求**\n\n为执行设备请求，`IOUSBDevice`和`IOUSBInterface`均提供了便捷的`DeviceRequest()`方法，该方法底层使用代表默认管道的`IOUSBPipe`对象来传输请求。您也可以自行枚举零端点的`IOUSBPipe`实例并直接使用。该方法的声明如下：\n\
    \n```\nDeviceRequest(IOUSBDevRequest *request, UInt32 noDataTimeout,\n       \
    \       UInt32 completionTimeout, IOUSBCompletion *completion);\nDeviceRequest(IOUSBDevRequestDesc\
    \ *, UInt32 noDataTimeout,\n              UInt32 completionTimeout, IOUSBCompletion\
    \ *completion);\n```\n\n要发送请求，您必须创建一个`IOUSBDevRequest`或`IOUSBDeviceRequestDesc`结构体并填写相应字段。\n\
    \n```\ntypedef struct {                       typedef struct {\n    UInt8 bmRequestType;\
    \                   UInt8 bmRequestType;\n    UInt8 bRequest;                \
    \        UInt8 bRequest;\n    UInt16 wValue;                         UInt16 wValue;\n\
    \    UInt16 wIndex;                         UInt16 wIndex;\n    UInt16 wLength;\
    \                        UInt16 wLength;\n    void *pData;                   \
    \        IOMemoryDescriptor *pData;\n    UInt32 wLenDone;                    \
    \   UInt32 wLenDone;\n} IOUSBDevRequest;                     } IOUSBDevRequestDesc;\n\
    ```\n\n* `bmRequestType`字段：这是一个复合字段，用于指定请求类型、方向、类别和接收方。可通过`USBmakebmRequestType(direction,\
    \ type, recipient)`宏生成该字段，其参数如下：\n    * `direction` 可以是 `kUSBIn`、`kUSBOut` 或 `kUSBNone`。\n\
    \    * `type` 可以是 `kUSBStandard`、`kUSBClass` 或 `kUSBVendor`。\n    * `recipient`\
    \ 可以是 `kUSBInterface`、`kUSBEndpoint` 或 `kUSBDevice`。\n* `bRequest`字段：这是一个 8 位值，用于选择要执行的请求。\n\
    * `wValue`和`wIndex`：可用于随请求传递参数，其具体含义取决于请求类型。对于接口和端点请求，`wIndex`数值指定了请求所针对的端点/接口的索引号。您可以通过调用`IOUSBPipe::GetEndpointNumber()`或`IOUSBInterface->GetInterfaceNumber()`获取该索引号。\n\
    * `wLength`字段：表示`pData`字段的字节数。\n* `pData`字段：指向内存缓冲区的指针或`IOMemoryDescriptor`。如果请求无需额外数据，可将`pData`指针设为`NULL`。根据请求方向，该缓冲区将用于读取或写入数据。若使用`IOMemoryDescriptor`，应首先调用其`prepare()`方法确保内存已分页并锁定，直至请求完成。使用内存描述符时，内存可来自用户空间。若使用`void*`变体，指针必须位于内核虚拟地址空间中。\n\
    * `wLenDone`字段：无需填写，该字段用于返回实际传输的字节数。\n\n除`request`参数外，`DeviceRequest()`方法还接收另外三个参数。\n\
    \n* `noDataTimeout`：若未发送/接收任何数据，在放弃请求前等待的超时时间（毫秒）。\n* `completionTimeout`：为整个包含数据的命令指定超时时间，单位同样为毫秒。\n\
    * `completion`：可选参数。若指定，允许异步执行请求，这通常用于避免阻塞调用线程。我们将在本章后续部分详细讨论异步请求。\n\n让我们看一个发起设备请求的示例，再次以\
    \ Apple USB 以太网驱动程序为例。代码清单 8-8 中的代码由驱动程序通过定时器周期调用，用于从以太网设备获取统计信息和状态信息，如冲突、丢包、入站数据包等。\n\
    \n**代码清单 8-8.** 从以太网设备下载统计信息的设备请求（USBCDCEthernet.cpp）\n\n```\nSTREQ = (IOUSBDevRequest*)IOMalloc(sizeof(IOUSBDevRequest));\n\
    if (!STREQ)\n{\n     ...\n} else {\n     bzero(STREQ, sizeof(IOUSBDevRequest));\n\
    \     // 现在构建统计请求\n    STREQ->bmRequestType = USBmakebmRequestType(kUSBOut, kUSBClass,\
    \ kUSBInterface);\n    STREQ->bRequest = kGet_Ethernet_Statistics;\n    STREQ->wValue\
    \ = currStat;\n    STREQ->wIndex = fCommInterfaceNumber;\n    STREQ->wLength =\
    \ 4;\n    STREQ->pData = &fStatValue;\n\n    fStatsCompletionInfo.parameter =\
    \ STREQ;\n\n    rc = fpDevice->DeviceRequest(STREQ, &fStatsCompletionInfo);\n\
    \    if (rc != kIOReturnSuccess)\n    {\n    ...\n        IOFree(STREQ, sizeof(IOUSBDevRequest));\n\
    \    } else {\n       fStatInProgress = true;\n    }\n}\n```\n\n代码清单 8-8 中的请求是异步执行的。由于`IOUSBDevRequest`结构体必须保持有效直到请求完成，因此不能在栈上分配，但对于同步请求则无此限制。代码清单\
    \ 8-8 中执行的请求针对特定接口，且属于类特定请求，这意味着它对所有具有相同类代码的接口都适用。该请求的`wValue`字段是索引号，用于指定要传输的统计信息。\n\
    \n## 控制请求\n\n上一节讨论的设备请求是针对默认控制管道（端点 0）的 I/O 操作。`DeviceRequest()`方法不能用于除默认端点外的其他控制端点。若要对其他控制端点执行请求，必须使用`IOUSBPipe::ControlRequest()`方法。共有四种`ControlRequest()`方法可用：\n\
    \n```\nvirtual IOReturn ControlRequest(IOUSBDevRequestDesc* request,\n       \
    \ IOUSBCompletion* completion = 0);\nvirtual IOReturn ControlRequest(IOUSBDevRequest*\
    \ request, IOUSBCompletion* completion = 0);\nvirtual IOReturn ControlRequest(IOUSBDevRequestDesc*\
    \ request,\n        UInt32 noDataTimeout,\n        UInt32 completionTimeout,\n\
    \        IOUSBCompletion* completion = 0);\nvirtual IOReturn ControlRequest(IOUSBDevRequest*\
    \ request,\n        UInt32 noDataTimeout,\n        UInt32 completionTimeout,\n\
    \        IOUSBCompletion* completion = 0);\n```\n\n前两种方法的参数与前述`DeviceRequest()`方法完全相同。后两种方法额外支持`noDataTimeout`和`completionTimeout`参数。\n"
- fmt: "# Performing I/O to Bulk and Interrupt Endpoints\n\nSending and Receiving\
    \ data is performed with the help of the `IOUSBPipe` class, which represents an\
    \ endpoint. The `IOUSBPipe` class presents a simple interface for performing I/O,\
    \ which is reminiscent of how user space performs file I/O. USB does not utilize\
    \ DMA directly, although the host controller does use DMA to transfer data, but\
    \ the details of this are abstracted away from us. This also means that we do\
    \ not need to worry about memory alignment, if the memory is physically contiguous,\
    \ is in the correct address range, or translating memory addresses to physical\
    \ addresses. We can also perform I/O from a user space buffer.\n\nThe `IOUSBPipe`\
    \ class supports I/O to all endpoint types: control, bulk, interrupt, and isochronous.\n\
    \nThe methods for performing bulk and interrupt I/O are the `Read()` and `Write()`\
    \ methods:\n\n```\nvirtual IOReturn Read(IOMemoryDescriptor* buffer,\n       \
    \               UInt32 noDataTimeout,\n                      UInt32 completionTimeout,\n\
    \                      IOByteCount reqCount,\n                      IOUSBCompletion*\
    \ completion = 0,\n                      IOByteCount* bytesRead = 0);\n```\n\n\
    ```\nvirtual IOReturn Write(IOMemoryDescriptor* buffer,\n                    \
    \   UInt32 noDataTimeout,\n                       UInt32 completionTimeout,\n\
    \                       IOByteCount reqCount,\n                       IOUSBCompletion*\
    \ completion = 0);\n```\n\n- The `buffer` is an `IOMemoryDescriptor` containing\
    \ the buffer for which data should be read or written. The memory descriptor should\
    \ have its `prepare()` method called to ensure memory is paged in and pinned down.\
    \ The memory may be in the kernel or a user task's address space.\n- The `noDataTimeout`\
    \ argument specifies the amount of time, in milliseconds, to wait for data transfer\
    \ on the bus before the request is considered unsuccessful.\n- The `completionTimeout`\
    \ is the time to allow, in milliseconds, for the entire request to complete before\
    \ it is considered unsuccessful.\n- The `reqCount` is the amount of data, in bytes,\
    \ that should be read or written. It must be less or equal to the size of the\
    \ buffer, as returned by `IOMemoryDescriptor::getLength()`.\n- The `completion`\
    \ parameter is a structure of the type `IOUSBCompletion`, and is used for asynchronous\
    \ requests. The parameter can be specified as `NULL` to perform the request synchronously,\
    \ in which case the call will block until the request is complete or times out.\
    \ We will look at asynchronous I/O later.\n- For the `Read()` method `bytesRead`\
    \ will return the number of bytes that were read. It may be less than what was\
    \ requested. The value is only set for synchronous requests.\n\n[Listing 8-9](#Chapter08.html#list_8_9)\
    \ shows example invocations of the `Read()` and `Write()` methods.\n\n**Listing\
    \ 8-9.** *Examples of Synchronous Read() and Write() to a Bulk Pipe*\n\n```\n\
    UInt32 bytesRead;\nIOMemoryDescriptor* readBuffer;\nIOMemoryDescriptor* writeBuffer;\n\
    …\nif (myBulkPipeIn->Read(readBuffer, 1000, 5000,\n                       readBuffer->GetLength(),\
    \ 0, &bytesRead) != kIOReturnSuccess)\n{\n     // Handle error\n}\nelse\n    IOLog(“We\
    \ read: %u bytes\\n”, bytesRead);\n\nif (myBulkPipeOut->Write(writeBuffer, 1000,\
    \ 5000,\n                         writeBuffer->GetLength()) != kIOReturnSuccess)\n\
    {\n    // Handle error\n}\n```\n\nSince we didn't specify the `completion` argument\
    \ for either method, they will both be executed synchronously, which means that\
    \ the request will be executed in its entirety by the time the method returns\
    \ control to us. Recall that all pipes are uni-directional, with the exception\
    \ of the default control pipe, so the IN and OUT requests are performed on two\
    \ separate pipes.\n\n![images](images/square.jpg) **Note** Another overloaded\
    \ set of `Read()` and `Write()` exists that does not accept a `reqCount` parameter,\
    \ but rather uses the `GetLength()` method of the `IOMemoryDescriptor`. These\
    \ methods are now deprecated and should not be used.\n\nThe example in [Listing\
    \ 8-9](#Chapter08.html#list_8_9) will also work for an interrupt endpoint. There\
    \ is no special programming interface needed to work with interrupt endpoints.\
    \ I/O is handled in the same way as with bulk endpoints. The difference is in\
    \ behavior. An interrupt endpoint provides bounded latency and the host controller\
    \ guarantees to poll the device for data no less often than what is requested\
    \ in the endpoint's descriptor. The minimum-polling interval is 125 microseconds.\
    \ Interrupt transfers use reserved bandwidth, which guarantees that the requests\
    \ make it through even in the event that there are high amounts of activity on\
    \ the bus. Unlike bulk transfers, interrupt transfers are not suitable for transferring\
    \ large amounts of data and are limited to 8, 64, or, 1024 bytes for low-speed,\
    \ full-speed, and high-speed, respectively. Note that interrupt endpoints are\
    \ not related to system interrupts in any way. I/O to interrupt endpoints is performed\
    \ in a normal kernel thread.\n\n## Dealing with Errors and Pipe Stalls\n\nWhen\
    \ an endpoint is unable to transmit or receive data due to an error, the host\
    \ or device may set the HALT bit. Communicating with an endpoint in this state,\
    \ or an endpoint with an error, will return a STALL handshake packet. An error\
    \ needs to be resolved before I/O can continue on the endpoint. The `IOUSBPipe`\
    \ class provides two methods for clearing a pipe stall and allowing I/O to resume:\n\
    \n```\nvirtual IOReturn ClearStall(void);\nvirtual IOReturn ClearPipeStall(bool\
    \ withDeviceRequest);\n```\n\nThe second version clears the error (toggle bit)\
    \ on the controller, but it does not send out a device request to the endpoint\
    \ if `withDeviceRequest` is false. Both methods will cause outstanding I/O to\
    \ be completed with the return code `kIOUSBTransactionReturned`."
  raw: '#### Performing I/O to Bulk and Interrupt Endpoints


    Sending and Receiving data is performed with the help of the `IOUSBPipe` class,
    which represents an endpoint. The `IOUSBPipe` class presents a simple interface
    for performing I/O, which is reminiscent of how user space performs file I/O.
    USB does not utilize DMA directly, although the host controller does use DMA to
    transfer data, but the details of this are abstracted away from us. This also
    means that we do not need to worry about memory alignment, if the memory is physically
    contiguous, is in the correct address range, or translating memory addresses to
    physical addresses. We can also perform I/O from a user space buffer.


    The `IOUSBPipe` class supports I/O to all endpoint types: control, bulk, interrupt,
    and isochronous.


    The methods for performing bulk and interrupt I/O are the `Read()` and `Write()`
    methods:


    `virtual IOReturn Read(IOMemoryDescriptor* buffer,`

    `                      UInt32 noDataTimeout,`

    `                      UInt32 completionTimeout,`

    `                      IOByteCount reqCount,`

    `                      IOUSBCompletion* completion = 0,`

    `                      IOByteCount* bytesRead = 0);`


    `virtual IOReturn Write(IOMemoryDescriptor* buffer,`

    `                       UInt32 noDataTimeout,`

    `                       UInt32 completionTimeout,`

    `                       IOByteCount reqCount,`

    `                       IOUSBCompletion* completion = 0);`


    *   The `buffer` is an `IOMemoryDescriptor` containing the buffer for which data
    should be read or written. The memory descriptor should have its `prepare()` method
    called to ensure memory is paged in and pinned down. The memory may be in the
    kernel or a user task''s address space.

    *   The `noDataTimeout` argument specifies the amount of time, in milliseconds,
    to wait for data transfer on the bus before the request is considered unsuccessful.

    *   The `completionTimeout` is the time to allow, in milliseconds, for the entire
    request to complete before it is considered unsuccessful.

    *   The `reqCount` is the amount of data, in bytes, that should be read or written.
    It must be less or equal to the size of the buffer, as returned by `IOMemoryDescriptor::getLength()`.

    *   The *completion* parameter is a structure of the type `IOUSBCompletion`, and
    is used for asynchronous requests. The parameter can be specified as `NULL` to
    perform the request synchronously, in which case the call will block until the
    request is complete or times out. We will look at asynchronous I/O later.

    *   For the `Read()` method `bytesRead` will return the number of bytes that were
    read. It may be less than what was requested. The value is only set for synchronous
    requests.


    [Listing 8-9](#Chapter08.html#list_8_9) shows example invocations of the `Read()`
    and `Write()` methods.


    **Listing 8-9.** *Examples of Synchronous Read() and Write() to a Bulk Pipe*


    `UInt32 bytesRead;`

    `IOMemoryDescriptor* readBuffer;`

    `IOMemoryDescriptor* writeBuffer;`

    `…`

    `if (myBulkPipeIn->Read(readBuffer, 1000, 5000,`

    `                       readBuffer->GetLength(), 0, &bytesRead) != kIOReturnSuccess)`

    `{`

    `     // Handle error`

    `}`

    `else`

    `    IOLog(“We read: %u bytes\n”, bytesRead);`


    `if (myBulkPipeOut->Write(writeBuffer, 1000, 5000,`

    `                         writeBuffer->GetLength()) != kIOReturnSuccess)`

    `{`

    `    // Handle error`

    `}`


    Since we didn''t specify the `completion` argument for either method, they will
    both be executed synchronously, which means that the request will be executed
    in its entirety by the time the method returns control to us. Recall that all
    pipes are uni-directional, with the exception of the default control pipe, so
    the IN and OUT requests are performed on two separate pipes.


    ![images](images/square.jpg) **Note** Another overloaded set of `Read()` and `Write()`
    exists that does not accept a `reqCount` parameter, but rather uses the `GetLength()`
    method of the `IOMemoryDescriptor`. These methods are now deprecated and should
    not be used.


    The example in [Listing 8-9](#Chapter08.html#list_8_9) will also work for an interrupt
    endpoint. There is no special programming interface needed to work with interrupt
    endpoints. I/O is handled in the same way as with bulk endpoints. The difference
    is in behavior. An interrupt endpoint provides bounded latency and the host controller
    guarantees to poll the device for data no less often than what is requested in
    the endpoint''s descriptor. The minimum-polling interval is 125 microseconds.
    Interrupt transfers use reserved bandwidth, which guarantees that the requests
    make it through even in the event that there are high amounts of activity on the
    bus. Unlike bulk transfers, interrupt transfers are not suitable for transferring
    large amounts of data and are limited to 8, 64, or, 1024 bytes for low-speed,
    full-speed, and high-speed, respectively. Note that interrupt endpoints are not
    related to system interrupts in any way. I/O to interrupt endpoints is performed
    in a normal kernel thread.


    ##### Dealing with Errors and Pipe Stalls


    When an endpoint is unable to transmit or receive data due to an error, the host
    or device may set the HALT bit. Communicating with an endpoint in this state,
    or an endpoint with an error, will return a STALL handshake packet. An error needs
    to be resolved before I/O can continue on the endpoint. The `IOUSBPipe` class
    provides two methods for clearing a pipe stall and allowing I/O to resume:


    `virtual IOReturn ClearStall(void);`

    `virtual IOReturn ClearPipeStall(bool withDeviceRequest);`


    The second version clears the error (toggle bit) on the controller, but it does
    not send out a device request to the endpoint if `withDeviceRequest` is false.
    Both methods will cause outstanding I/O to be completed with the return code `kIOUSBTransactionReturned`.'
  trans: "\n# 对批量端点和中断端点执行 I/O\n\n数据的发送和接收借助 `IOUSBPipe` 类完成，该类代表一个端点。`IOUSBPipe`\
    \ 类提供了一个用于执行 I/O 的简单接口，其方式类似于用户空间执行文件 I/O。USB 并不直接使用 DMA，尽管主机控制器会使用 DMA 传输数据，但这些细节对我们来说是抽象的。这也意味着我们无需担心内存对齐、物理连续性、地址范围或地址转换问题。我们甚至可以从用户空间缓冲区执行\
    \ I/O。\n\n`IOUSBPipe` 类支持对所有端点类型执行 I/O：控制端点、批量端点、中断端点和等时端点。\n\n执行批量 I/O 和中断 I/O\
    \ 的方法是 `Read()` 和 `Write()`：\n\n```\nvirtual IOReturn Read(IOMemoryDescriptor*\
    \ buffer,\n                      UInt32 noDataTimeout,\n                     \
    \ UInt32 completionTimeout,\n                      IOByteCount reqCount,\n   \
    \                   IOUSBCompletion* completion = 0,\n                      IOByteCount*\
    \ bytesRead = 0);\n```\n\n```\nvirtual IOReturn Write(IOMemoryDescriptor* buffer,\n\
    \                       UInt32 noDataTimeout,\n                       UInt32 completionTimeout,\n\
    \                       IOByteCount reqCount,\n                       IOUSBCompletion*\
    \ completion = 0);\n```\n\n- `buffer` 是一个 `IOMemoryDescriptor`，包含用于读取或写入数据的缓冲区。应调用该内存描述符的\
    \ `prepare()` 方法，以确保内存被分页并锁定。该内存可以位于内核或用户任务的地址空间中。\n- `noDataTimeout` 参数指定在认为请求失败之前，等待总线上数据传输的时间（以毫秒为单位）。\n\
    - `completionTimeout` 参数指定在认为请求失败之前，允许整个请求完成的时间（以毫秒为单位）。\n- `reqCount` 是要读取或写入的数据量（以字节为单位）。它必须小于或等于缓冲区的大小，该大小由\
    \ `IOMemoryDescriptor::getLength()` 返回。\n- `completion` 参数是一个 `IOUSBCompletion`\
    \ 类型的结构体，用于异步请求。该参数可以指定为 `NULL` 以同步执行请求，此时调用将阻塞，直到请求完成或超时。我们稍后会讨论异步 I/O。\n- 对于\
    \ `Read()` 方法，`bytesRead` 将返回实际读取的字节数。它可能少于请求的数量。该值仅对同步请求有效。\n\n清单 8-9 展示了 `Read()`\
    \ 和 `Write()` 方法的调用示例。\n\n**清单 8-9.** *对批量管道进行同步 Read() 和 Write() 的示例*\n\n```\n\
    UInt32 bytesRead;\nIOMemoryDescriptor* readBuffer;\nIOMemoryDescriptor* writeBuffer;\n\
    …\nif (myBulkPipeIn->Read(readBuffer, 1000, 5000,\n                       readBuffer->GetLength(),\
    \ 0, &bytesRead) != kIOReturnSuccess)\n{\n     // 处理错误\n}\nelse\n    IOLog(“我们读取了:\
    \ %u 字节\\n”, bytesRead);\n\nif (myBulkPipeOut->Write(writeBuffer, 1000, 5000,\n\
    \                         writeBuffer->GetLength()) != kIOReturnSuccess)\n{\n\
    \    // 处理错误\n}\n```\n\n由于我们没有为任一方法指定 `completion` 参数，它们都将同步执行，这意味着当方法将控制权返回给我们时，请求已全部执行完毕。请记住，除了默认的控制管道外，所有管道都是单向的，因此\
    \ IN 和 OUT 请求在两个独立的管道上执行。\n\n![images](img/square.jpg) **注意** 另一组重载的 `Read()`\
    \ 和 `Write()` 方法不接受 `reqCount` 参数，而是使用 `IOMemoryDescriptor` 的 `GetLength()` 方法。这些方法现已弃用，不应再使用。\n\
    \n清单 8-9 中的示例同样适用于中断端点。处理中断端点不需要特殊的编程接口。I/O 的处理方式与批量端点相同。区别在于行为表现。中断端点提供有界延迟，并且主机控制器保证按照端点描述符中请求的频率轮询设备数据。最小轮询间隔为\
    \ 125 微秒。中断传输使用预留带宽，这确保了即使在总线上有大量活动的情况下，请求也能顺利完成。与批量传输不同，中断传输不适合传输大量数据，并且对于低速、全速和高速设备，其数据量分别限制为\
    \ 8、64 或 1024 字节。请注意，中断端点与系统中断没有任何关系。对中断端点的 I/O 是在正常的内核线程中执行的。\n\n## 处理错误和管道停滞\n\
    \n当端点因错误而无法传输或接收数据时，主机或设备可能会设置 HALT 位。与此状态下的端点或存在错误的端点通信将返回一个 STALL 握手包。在可以继续对该端点执行\
    \ I/O 之前，必须先解决错误。`IOUSBPipe` 类提供了两种方法来清除管道停滞并允许恢复 I/O：\n\n```\nvirtual IOReturn\
    \ ClearStall(void);\nvirtual IOReturn ClearPipeStall(bool withDeviceRequest);\n\
    ```\n\n第二种版本会清除控制器上的错误（翻转位），但如果 `withDeviceRequest` 为 false，则不会向端点发送设备请求。这两种方法都会导致未完成的\
    \ I/O 以返回码 `kIOUSBTransactionReturned` 完成。\n"
- fmt: "### Isochronous I/O\n\nIsochronous transfers are continuous in nature and\
    \ are suitable for use with devices, such as audio and video, where information\
    \ is continuously streaming and there is a need for guaranteed bandwidth and bounded\
    \ latency. Data integrity can be verified using a CRC, but corrupted data is never\
    \ re-sent automatically. The amount of bandwidth needed by a device is specified\
    \ in the isochronous endpoint descriptor. If the host controller is unable to\
    \ guarantee enough bandwidth to support the device, which can happen if another\
    \ device already has reserved bandwidth on the bus, the device may be unable to\
    \ function. If the device is able to operate with less bandwidth, it can define\
    \ alternate interface descriptors with more conservative requirements. Maximum\
    \ payloads for isochronous transfers are as follows:\n\n- High-speed devices have\
    \ a maximum packet size of 1024 bytes.\n- Full-speed devices have a maximum packet\
    \ size of 1023 bytes.\n- Low-speed devices do not support isochronous transfers.\n\
    \nIsochronous transfers use the concept of microframes. A microframe is 125 microseconds\
    \ long. For high-speed devices, up to three packets can be transmitted per microframe,\
    \ giving a maximum data-rate of 3 x 1024 x 8000 microframes per second = 24 MB/s.\
    \ This is slightly lower than the maximum bandwidth possible over a bulk endpoint.\n\
    \nA microframe is represented by the `IOUSBIsocFrame` structure:\n\n```c\ntypedef\
    \ struct IOUSBIsocFrame {\n    IOReturn              frStatus;\n    UInt16   \
    \             frReqCount;\n    UInt16                frActCount;\n} IOUSBIsocFrame;\n\
    ```\n\nThe structure describes how many bytes of data should be transmitted or\
    \ received from the I/O buffer in each microframe. The `frReqCount` field is the\
    \ amount of bytes requested, whereas the `frActCount` is the count actually transferred.\
    \ The structure also contains a status field.\n\nThe methods for reading and writing\
    \ to an isochronous endpoint are similar to those used to read and write from\
    \ interrupt and bulk endpoints:\n\n```cpp\nvirtual IOReturn Read(IOMemoryDescriptor*\
    \ buffer, UInt64 frameStart, UInt32 numFrames,\n                      IOUSBIsocFrame*\
    \ frameList, IOUSBIsocCompletion* completion = 0);\nvirtual IOReturn Write(IOMemoryDescriptor*\
    \ buffer, UInt64 frameStart, UInt32 numFrames,\n                       IOUSBIsocFrame\
    \ *frameList, IOUSBIsocCompletion * completion = 0);\n```\n\nThe methods take\
    \ the following arguments:\n\n- The `buffer` argument is a virtually contiguous\
    \ buffer containing the data to be transferred. The memory descriptor should have\
    \ its `prepare()` method called to ensure memory is paged in and pinned down for\
    \ the duration of the transfer. There are no special requirements otherwise for\
    \ the memory and it can be either user space or kernel memory.\n- The `frameStart`\
    \ argument specifies the index of the USB frame from which to start. One USB frame\
    \ corresponds to 8 microframes.\n- The `numFrames` argument is a count of the\
    \ microframe descriptors contained in the `frameList` array.\n- The `frameList`\
    \ argument is a pointer to an array of `IOUSBIsocFrame` structures.\n- An optional\
    \ `completion` structure. If specified, this will perform the transfer asynchronously.\n\
    \n### Asynchronous Requests\n\nIt is often necessary to perform requests to USB\
    \ devices asynchronously—for example, when performing large bulk requests to a\
    \ hard drive. Instead of having the caller thread blocked, the request can be\
    \ handled by the USB controller, and it will notify us, through a callback method,\
    \ when the request is completed.\n\nTo do this, you must supply an `IOUSBCompletion`\
    \ structure to the `Read()`, `Write()`, `DeviceRequest()`, or `ControlRequest()`\
    \ methods:\n\n```c\ntypedef struct IOUSBCompletion {\n    void* target;\n    IOUSBCompletionAction\
    \ action;\n    void* parameter;\n} IOUSBCompletion;\n```\n\n- The `target` field\
    \ is a pointer that can contain user-defined data. Often it is used to pass the\
    \ pointer to the class that sent the request, so that you can cast the pointer\
    \ back to the original class in the completion function.\n- The `action` field\
    \ is the actual callback, and should be a pointer to a function matching the `IOUSBCompletionAction`\
    \ prototype. The method will be called once the request completes.\n- The `parameter`\
    \ field can carry an additional parameter, which will also be passed to the completion\
    \ function.\n\nThe `IOUSBCompletionAction` callback has the following prototype:\n\
    \n```cpp\ntypedef void ( *IOUSBCompletionAction)(void* target, void* parameter,\n\
    \                                       IOReturn status, UInt32 bufferSizeRemaining);\n\
    ```\n\nAs you can see, the `target` and `parameter` fields of the `IOUSBCompletion`\
    \ structure are passed directly to the callback. The callback will also get the\
    \ `status` of the transfer, and the `bufferSizeRemaining` field will contain the\
    \ number of bytes left to transfer if the request was not fully completed.\n\n\
    Asynchronous requests are completed on the `IOUSBFamily` work loop thread, which\
    \ means that if you access data in the callback from your own driver, you must\
    \ ensure that this access is properly synchronized.\n\nGenerally speaking, USB\
    \ drivers never operate in a primary interrupt context, with the exception of\
    \ the low latency versions of the isochronous `Read()` and `Write()` methods,\
    \ which allows asynchronous isochronous I/O to have the completion callback called\
    \ at primary interrupt time. In this case, extreme care needs to be taken to avoid\
    \ calling code that may block. The use of low latency isochronous I/O should be\
    \ used sparingly, and is generally not required even for audio and video drivers.\n\
    \n### Summary\n\n- At the time of writing, the Universal Serial Bus Specification\
    \ exists in three major revisions, the latest being USB 3.0. USB 3.0, although\
    \ emerging rapidly in the PC segment, has not yet been adopted by Apple, which\
    \ at the time of writing only supports USB 2.0.\n- A USB uses a shared bus topology,\
    \ where up to 127 devices can be controlled by a single host. The host controller\
    \ is the master of the bus, and controls all activity on the bus. A device is\
    \ never allowed to use the bus without permission from the host.\n- A USB device\
    \ is described by a hierarchical structure of descriptors, which contain information\
    \ about the class, type, capabilities, and requirements of the device.\n- A USB\
    \ device may consist of zero or more interfaces, which are groups of endpoints.\
    \ An interface typically represents a logical device function, such as a printer\
    \ or scanner.\n- There are four types of endpoints: control, bulk, interrupt,\
    \ and isochronous. Control transfers are used for device configuration and control.\
    \ Bulk endpoints are used for applications such as hard drives or network devices.\
    \ Interrupt endpoints provide bounded latency, but they can only transfer small\
    \ amounts. Isochronous is ideal for video and audio applications that require\
    \ guaranteed and predictable bandwidth, as well as low latency.\n- The `IOUSBFamily`\
    \ handles USB support in the kernel. The family implements support for common\
    \ USB controllers. The three principal classes relevant to a driver developer\
    \ are `IOUSBDevice`, `IOUSBInterface`, and `IOUSBPipe`. A USB driver can use either\
    \ `IOUSBDevice` or `IOUSBInterface` as its provider.\n- The `IOUSBPipe` provides\
