  raw: '##### The IODMACommand Class


    The `IODMACommand` solves a number of the previously discussed problems associated
    with DMA. It can automatically divide segments to the correct size needed by the
    hardware, as well as ensure that devices only capable of 32-bit addressing are
    guaranteed to be in the correct range. This is achieved by using the IOMMU to
    remap addresses if an IOMMU is present, or by employing a workaround if not. It
    is also capable of providing 32-bit or 64-bit physical or bus addresses in little
    or big-endian format. The `IODMACommand` class supersedes the `IOMemoryCursor`
    class, which performs many of the same functions, but offers fewer options.


    An instance of the `IODMACommand` can be constructed with the factory method `withSpecification()`
    as following.


    `static IODMACommand * withSpecification(`

    `    SegmentFunction outSegFunc,`

    `    UInt8 numAddressBits,`

    `    UInt64 maxSegmentSize,`

    `    MappingOptions mappingOptions = kMapped,`

    `    UInt64 maxTransferSize = 0,`

    `    UInt32 alignment = 1,`

    `    IOMapper *mapper = 0,`

    `    void *refCon = 0);`


    Let''s look at the parameters in more detail. The first parameter is a function
    pointer to a function that is used to output segment information. You can write
    your own if you are supporting an esoteric hardware device, however, for most
    cases, you can use one of the supplied ones:


    *   `kIODMACommandOutputHost32` outputs 32-bit addresses in host byte order

    *   `kIODMACommandOutputBig32` outputs 32-bit addresses in big-endian format

    *   `kIODMACommandOutputLittle32` outputs 32-bit addresses in little-endian format

    *   `kIODMACommandOutputHost64` outputs 64-bit addresses in host byte order

    *   `kIODMACommandOutputBig64` outputs 64-bit addresses in big-endian format

    *   `kIODMACommandOutputLittle64` outputs 64-bit addresses in little-endian format


    The next parameter, `numAddressBits`, allows you to specify the maximum number
    of address bits the hardware can address, which is not always 32-bit or 64-bit.
    It can, for example, be 36-bit or even less than 32-bit in some cases. If the
    value passed is greater than 32-bit, you must specify one of the 64-bit output
    segment functions.


    If physical pages are located at an address higher than what the device can address,
    some or all pages may be copied to temporary pages that meet the address requirements,
    unless there is an IOMMU present. Needless to say extra copying is expensive and
    can be avoided if you DMA from memory allocated by an `IOBufferMemoryDescriptor`
    with the `inTaskWithPhysicalMask()` factory method, as it allows you to allocate
    memory with physical addresses that are in the range specified by a bitmask. This
    method can also be used to allocate memory directly into the address space of
    a user space task. This is useful as DMA to/from user space allocated buffers
    can be problematic, as there is no way to control how the memory is allocated.


    The parameter `maxSegmentSize` should be set to the largest physical contiguous
    segment that a device can handle as a segment in a scatter/gather list. Zero can
    be passed if there are no such restrictions.


    The `mappingOptions` parameter allows bypassing of the IOMMU if one is present
    in the system. The default is to use the IOMMU. The `mapper` parameter allows
    you to specify an alternate `IOMapper` instance to be used instead of the default.


    The `maxTransferSize` is the total number of bytes that can be transferred per
    DMA transaction. For example, a hard drive may have 1MB cache buffer, so we would
    not want to transfer more information than what it can accept.


    If the hardware has specific alignment requirements, this can be specified with
    the `alignment` parameter. If the supplied memory is not aligned properly, it
    may again result in the copying or remapping of memory.


    Let''s modify the previous example in [Listing 9-11](#Chapter09.html#list_9_11)
    that used `IOMemoryDescriptor::getPhysicalSegment()` to instead use `IODMACommand`
    as shown in [Listing 9-12](#Chapter09.html#list_9_12).


    ***Listing 9-12.** Generating a Scatter/Gather List Using IODMACommand*


    `IOReturn com_osxkernel_MyFirstPCIDriver::prepareDMATransfer()`

    `{    `

    `    IODMACommand*      dmaCommand;`

    `    IOReturn                        ret = kIOReturnSuccess;`


    `    dmaCommand = IODMACommand::withSpecification(kIODMACommandOutputHost64, 36,
    2048,                 `

    `                 IODMACommand::kMapped, 0, 1);`

    `    if (!dmaCommand)`

    `    {`

    `        return kIOReturnNoMemory;`

    `    }`


    `    // Will also prepare the memory descriptor.`

    `    ret = dmaCommand->setMemoryDescriptor(fDMABuffer);`

    `    if (ret != kIOReturnSuccess)`

    `        return ret;`


    `    UInt64 offset = 0;`

    `    while (offset < fDMABuffer->getLength())`

    `    {`

    `        IODMACommand::Segment64 segment;`

    `        UInt32 numSeg = 1;`


    `        ret = dmaCommand->gen64IOVMSegments(&offset, &segment, &numSeg);`


    `        IOLog("%s::gen64IOVMSegments() addr 0x%qx, len %llu bytes\n",`

    `              getName(), segment.fIOVMAddr, segment.fLength);`


    `        if (ret != kIOReturnSuccess)`

    `            break;`

    `    }`


    `    //`

    `    // Setup DMA transfer here for real hardware devices.`

    `    //`


    `    if (dmaCommand->clearMemoryDescriptor() != kIOReturnSuccess)`

    `    {`

    `        IOLog("Failed to clear/complete memory descriptor\n");`

    `    }`


    `    dmaCommand->release();`

    `    return ret;`

    `}`


    In the previous example, we created an `IODMACommand` with constraints on the
    maximum physical address bits we want to 36 bits, and the maximum physical segment
    size to a half page, or 2048 bytes. The output of this code gives something as
    follows:


    * * *


    `kernel[0]: com_osxkernel_MyFirstPCIDriver::gen64IOVMSegments() addr 0x13b9d5000,
    len 2048`

    `kernel[0]: com_osxkernel_MyFirstPCIDriver::gen64IOVMSegments() addr 0x13b9d5800,
    len 2048`

    `kernel[0]: com_osxkernel_MyFirstPCIDriver::gen64IOVMSegments() addr 0x1335d4000,
    len 2048`

    `kernel[0]: com_osxkernel_MyFirstPCIDriver::gen64IOVMSegments() addr 0x1335d4800,
    len 2048`

    `kernel[0]: com_osxkernel_MyFirstPCIDriver::gen64IOVMSegments() addr 0x3f913000,
    len 2048`

    `kernel[0]: com_osxkernel_MyFirstPCIDriver::gen64IOVMSegments() addr 0x3f913800,
    len 2048`

    `kernel[0]: com_osxkernel_MyFirstPCIDriver::gen64IOVMSegments() addr 0x3b1d2000,
    len 2048`

    `kernel[0]: com_osxkernel_MyFirstPCIDriver::gen64IOVMSegments() addr 0x3b1d2800,
    len 2048`

    `kernel[0]: com_osxkernel_MyFirstPCIDriver::gen64IOVMSegments() addr 0x18b11000,
    len 2048`

    `kernel[0]: com_osxkernel_MyFirstPCIDriver::gen64IOVMSegments() addr 0x18b11800,
    len 2048`

    `….`


    * * *


    You will notice first that we have some addresses that are greater than 32-bit,
    but still below our 36-bit specification, and that segments are now limited to
    2048 bytes, even though the first segment is physically contiguous with the second.'
  trans: "\n### IODMACommand 类\n\n`IODMACommand` 解决了先前讨论的与 DMA 相关的多个问题。它能够自动将段分割为硬件所需的正确大小，并确保仅支持\
    \ 32 位寻址的设备能够位于正确的地址范围内。这通过以下方式实现：如果存在 IOMMU，则使用 IOMMU 重映射地址；否则采用备用方案。此外，它还能以小端或大端格式提供\
    \ 32 位或 64 位的物理地址或总线地址。`IODMACommand` 类取代了 `IOMemoryCursor` 类，后者虽然实现许多相同功能，但选项更少。\n\
    \n`IODMACommand` 的实例可以通过工厂方法 `withSpecification()` 构造，如下所示：\n\n```\nstatic IODMACommand\
    \ * withSpecification(\n    SegmentFunction outSegFunc,\n    UInt8 numAddressBits,\n\
    \    UInt64 maxSegmentSize,\n    MappingOptions mappingOptions = kMapped,\n  \
    \  UInt64 maxTransferSize = 0,\n    UInt32 alignment = 1,\n    IOMapper *mapper\
    \ = 0,\n    void *refCon = 0);\n```\n\n让我们更详细地查看这些参数。第一个参数是一个函数指针，指向用于输出段信息的函数。如果你要支持一种特殊硬件设备，可以自行编写该函数；不过在大多数情况下，你可以使用系统提供的以下函数之一：\n\
    \n-   `kIODMACommandOutputHost32`：以主机字节序输出 32 位地址\n-   `kIODMACommandOutputBig32`：以大端格式输出\
    \ 32 位地址\n-   `kIODMACommandOutputLittle32`：以小端格式输出 32 位地址\n-   `kIODMACommandOutputHost64`：以主机字节序输出\
    \ 64 位地址\n-   `kIODMACommandOutputBig64`：以大端格式输出 64 位地址\n-   `kIODMACommandOutputLittle64`：以小端格式输出\
    \ 64 位地址\n\n下一个参数 `numAddressBits` 允许你指定硬件可寻址的最大地址位数，该值不一定是 32 位或 64 位。例如，在某些情况下，它可以是\
    \ 36 位，甚至小于 32 位。如果传递的值大于 32 位，则必须指定一个 64 位输出段函数。\n\n如果物理页面位于设备可寻址范围之外的地址上，除非存在\
    \ IOMMU，否则部分或全部页面可能会被拷贝到满足地址要求的临时页面中。毋庸置疑，额外拷贝开销很大，如果你使用 `IOBufferMemoryDescriptor`\
    \ 的 `inTaskWithPhysicalMask()` 工厂方法分配 DMA 内存，则可以避免这种拷贝，因为该方法允许你分配物理地址位于位掩码指定范围内的内存。该方法还可以用于将内存直接分配到用户空间任务的地址空间中。这非常有用，因为从/向用户空间分配的缓冲区进行\
    \ DMA 可能会出现问题，因为无法控制内存的分配方式。\n\n参数 `maxSegmentSize` 应设置为一个散列/聚集列表中，设备能够处理的最大的物理连续段。如果没有此类限制，可以传递零值。\n\
    \n`mappingOptions` 参数允许在系统存在 IOMMU 时绕过它。默认情况下会使用 IOMMU。`mapper` 参数允许你指定一个备用的 `IOMapper`\
    \ 实例来代替默认实例。\n\n`maxTransferSize` 是每次 DMA 事务可以传输的总字节数。例如，硬盘可能拥有 1MB 的缓存缓冲区，因此我们不应传输超过其接受能力的信息。\n\
    \n如果硬件有特定的对齐要求，可以通过 `alignment` 参数指定。如果提供的内存未正确对齐，同样可能导致内存的拷贝或重映射。\n\n现在，让我们修改之前使用\
    \ `IOMemoryDescriptor::getPhysicalSegment()` 的示例（见代码清单 9-11），改为使用 `IODMACommand`，如代码清单\
    \ 9-12 所示。\n\n**代码清单 9-12.** 使用 IODMACommand 生成散列/聚集列表\n\n```\nIOReturn com_osxkernel_MyFirstPCIDriver::prepareDMATransfer()\n\
    {    \n    IODMACommand*      dmaCommand;\n    IOReturn                      \
    \  ret = kIOReturnSuccess;\n\n    dmaCommand = IODMACommand::withSpecification(kIODMACommandOutputHost64,\
    \ 36, 2048,                 \n                 IODMACommand::kMapped, 0, 1);\n\
    \    if (!dmaCommand)\n    {\n        return kIOReturnNoMemory;\n    }\n\n   \
    \ // 同时会准备内存描述符\n    ret = dmaCommand->setMemoryDescriptor(fDMABuffer);\n    if\
    \ (ret != kIOReturnSuccess)\n        return ret;\n\n    UInt64 offset = 0;\n \
    \   while (offset < fDMABuffer->getLength())\n    {\n        IODMACommand::Segment64\
    \ segment;\n        UInt32 numSeg = 1;\n\n        ret = dmaCommand->gen64IOVMSegments(&offset,\
    \ &segment, &numSeg);\n\n        IOLog(\"%s::gen64IOVMSegments() addr 0x%qx, len\
    \ %llu bytes\\n\",\n              getName(), segment.fIOVMAddr, segment.fLength);\n\
    \n        if (ret != kIOReturnSuccess)\n            break;\n    }\n\n    //\n\
    \    // 在此处为真实硬件设备设置 DMA 传输\n    //\n\n    if (dmaCommand->clearMemoryDescriptor()\
    \ != kIOReturnSuccess)\n    {\n        IOLog(\"清除/完成内存描述符失败\\n\");\n    }\n\n\
    \    dmaCommand->release();\n    return ret;\n}\n```\n\n在上面的示例中，我们创建了一个 `IODMACommand`，并设置了约束条件：最大物理地址位数为\
    \ 36 位，最大物理段大小为半页（即 2048 字节）。这段代码的输出结果如下：\n\n```\nkernel[0]: com_osxkernel_MyFirstPCIDriver::gen64IOVMSegments()\
    \ addr 0x13b9d5000, len 2048\nkernel[0]: com_osxkernel_MyFirstPCIDriver::gen64IOVMSegments()\
    \ addr 0x13b9d5800, len 2048\nkernel[0]: com_osxkernel_MyFirstPCIDriver::gen64IOVMSegments()\
    \ addr 0x1335d4000, len 2048\nkernel[0]: com_osxkernel_MyFirstPCIDriver::gen64IOVMSegments()\
    \ addr 0x1335d4800, len 2048\nkernel[0]: com_osxkernel_MyFirstPCIDriver::gen64IOVMSegments()\
    \ addr 0x3f913000, len 2048\nkernel[0]: com_osxkernel_MyFirstPCIDriver::gen64IOVMSegments()\
    \ addr 0x3f913800, len 2048\nkernel[0]: com_osxkernel_MyFirstPCIDriver::gen64IOVMSegments()\
    \ addr 0x3b1d2000, len 2048\nkernel[0]: com_osxkernel_MyFirstPCIDriver::gen64IOVMSegments()\
    \ addr 0x3b1d2800, len 2048\nkernel[0]: com_osxkernel_MyFirstPCIDriver::gen64IOVMSegments()\
    \ addr 0x18b11000, len 2048\nkernel[0]: com_osxkernel_MyFirstPCIDriver::gen64IOVMSegments()\
    \ addr 0x18b11800, len 2048\n….\n```\n\n首先你会注意到，有些地址大于 32 位，但仍在我们指定的 36 位范围内；而且，尽管第一个段与第二个段在物理上是连续的，但所有段的长度现在都被限制为\
    \ 2048 字节。\n"
- fmt: '### Summary


    In this chapter, we have discussed:


    - A technology overview of the PCI related standards `PCI Express`, `Thunderbolt`
    and also the lesser-used `ExpressCard` standard.

    - The PCI configuration space, which is used by the operating system to enumerate,
    control, and operate PCI-based devices. Later in the chapter, we also discussed
    how accessing these from a driver using I/O Kit provided functionality.

    - PCI support in the I/O Kit with `IOPCIFamily`. The cornerstone of the kernel
    PCI layer is the `IOPCIDevice` class, which is used as a provider for PCI-based
    drivers.

    - Thunderbolt devices are compatible with PCI and also represented by the `IOPCIDevice`
    class.

    - How to create a matching dictionary for PCI-based devices so that a driver can
    be loaded automatically when the device is plugged in or at boot.

    - How to access and use memory mapped I/O memory and regions.

    - How to handle removal of externally connected devices, notably for Thunderbolt
    and ExpressCard.

    - Interrupt handling in the I/O Kit for primary and secondary interrupts using
    `IOInterruptEventFilter` and related classes.

    - Direct Memory Access and how to create scatter/gather lists for transferring
    large non-contiguous chunks of memory. We also discussed common problems related
    to DMA.

    - The `IODMACommand` is used to help translate memory addresses into bus addresses
    and to help manage the complexity of building scatter/gather lists.


    ## C H A P T E R 10


    ## Power Management


    Power management has become a fundamental feature across all computing devices.
    Every platform that runs Mac OS X can be put into a lower power mode, and so power
    management is just as important for a desktop computer that is always connected
    to a power supply as it is for a laptop or an iPhone that is running from a battery.


    Even a Mac Pro, for example, can be placed into “sleep” mode, which puts the computer
    and its connected peripherals into a low power mode. During sleep mode, the CPU
    is put into a suspended state, the computer''s display is powered off, and the
    hard drive is spun down. If the computer has PCI expansion slots, these will be
    powered down during sleep, with only a small amount of auxiliary power provided
    to allow a PCI card to initiate waking the computer from sleep.


    Not all drivers will need to handle power management events. Whether a driver
    needs to implement power management will depend on the capabilities of the device
    and where the device draws power from. For example, if the driver for a PCI device
    doesn''t support power management, the system must maintain full power to its
    PCI slots when it enters sleep mode because a PCI card is powered from the computer''s
    motherboard. This leaves the computer in a state called “doze”, which is not a
    complete sleep mode. Note that if the power to PCI slots is suspended during sleep,
    any PCI devices will lose their configuration and must be reinitialized by their
    driver when the system wakes, which can only happen if the driver receives power
    management events.


    As the example of a PCI card''s driver demonstrates, the drivers for hardware
    devices play a role in the system''s transition from one power state to another.
    Drivers can opt to receive a notification before the system goes into the low
    power sleep mode, at which time the driver can prepare its device for the new
    power state. Similarly, a driver can receive a notification when the system wakes
    from sleep, at which time the driver can restore its device to full operating
    functionality.


    ### The I/O Registry Power Plane


    Part of the complexities of power management is that the power state for one device
    usually cannot be looked at in isolation, since a device will typically be dependent
    on another device through which it draws power and, in turn, may have devices
    that are dependent on it for their power. Consider, for example, a PCI peripheral
    card that implements a USB host and provides USB ports. The card will be powered
    by the PCI bus and will provide power over the USB bus to devices that are connected
    to its ports. This has implications for the power management system; the PCI card
    can only enter a low power state if there are no USB devices connected to it or
    only if all of the USB devices connected to it are in a low power state themselves.
    Similarly, when the system is put to sleep, the PCI slot will lose power, and
    any USB devices that are connected to the card must be informed of the change
    in power state as well.


    To model this power dependency, the I/O Kit maintains a tree that represents the
    power dependencies between hardware devices in the system. This tree is stored
    in its own section of the I/O Registry in a plane known as the “power plane.”
    The power plane can be viewed using the `IORegistryExplorer` utility, as shown
    in [Figure 10-1](#Chapter10.html#fig_10_1).


    ![images](images/1001.jpg)


    **Figure 10-1.** A view of the power plane in `IORegistryExplorer`


    Each driver that supports power management is represented as a node in the power
    plane connected to the parent nodes, which represents devices that provide it
    power, and with children nodes, which represent devices that it provides power
    to. The parent of a device in the power plane is typically the driver''s provider
    class (that is, the same object that the driver is connected to in the service
    plane of the I/O Registry), although this does not need to be the case.


    The tree representation makes it very easy to visualize the power dependencies
    between devices in the system and to see which devices draw their power from a
    particular hardware device. The tree structure also provides an important role
    for the system itself, since it allows the system to determine which devices will
    be affected when the power state of one device changes.'
