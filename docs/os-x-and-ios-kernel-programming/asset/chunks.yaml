    which handles transmission of the dump, only works with Ethernet devices. When
    loaded, you can check where the kernel debugging driver is attached using IORegisteryExplorer
    and search for the driver named IOKernelDebugger.


    The *kdumpd* daemon is able to receive core dumps from multiple machines and will
