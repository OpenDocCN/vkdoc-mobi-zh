- fmt: "`doAsyncReadWrite` is the generic data read and write method of the `IOBlockStorageDevice`\
    \ interface. It takes as its parameters an `IOMemoryDescriptor` object that describes\
    \ the source buffer (for a disk read) or the destination buffer (for a disk write),\
    \ a contiguous range of disk blocks to read from or write to, and associated attribute\
    \ flags. The `IOMemoryDescriptor` also serves to determine whether the requested\
    \ operation is a read or a write; the driver calls the method `getDirection()`\
    \ on the `IOMemoryDescriptor` object, and if the returned value is `kIODirectionIn`,\
    \ a read operation has been requested. If the returned value is `kIODirectionOut`,\
    \ a write operation has been requested. The disk operation is performed asynchronously,\
    \ and when it completes, the caller is notified through a callback function that\
    \ is provided.\n\n`setWriteCacheState` is called to enable or disable any hardware\
    \ caching that the device has. The corresponding method `getWriteCacheState` returns\
    \ the current state of the device cache.\n\n`doSynchronizeCache` is called to\
    \ flush the contents of the hardware cache to the media. This is a synchronous\
    \ method that should not return until the contents of the cache have been written\
    \ to a disk. This method is also called in response to the `ioctl` `DKIOCSYNCHRONIZECACHE`\
    \ from a user space process.\n\n## Building a RAM Disk Device\n\nHaving examined\
    \ the methods that must be implemented to support the `IOBlockStorageDevice` interface,\
    \ we can now take a look at how a simple RAM disk device can be implemented in\
    \ Mac OS X. As with the driver for any disk device in the I/O Kit, we will split\
    \ our driver into two classes: the transport driver class, which implements the\
    \ functionality and communicates with the hardware device, and a class that implements\
    \ the `IOBlockStorageDevice` interface, which acts as an interface between the\
    \ transport driver and the device services layer of the storage driver stack.\n\
    \nAs we have seen, the I/O Kit does not require the transport driver for a storage\
    \ device to be written in any particular way or to subclass from any particular\
    \ superclass. This allows the transport driver to be written in a way that is\
    \ most natural for the type of hardware that provides access to the disk storage.\
    \ For our RAM disk, the \"hardware\" controlled by the transport driver is nothing\
    \ more than a memory allocation that provides the storage for the RAM disk. As\
    \ we learned in [Chapter 4](#Chapter04.html#ch4), an I/O Kit driver that has no\
    \ hardware device to match against will use the global `IOResources` class as\
    \ its provider class. This will be the provider class of our RAM disk's transport\
    \ driver. Since our transport driver is implemented as a generic driver, we will\
    \ implement it as a subclass of the generic `IOService` class.\n\nFor simplicity,\
    \ our RAM disk's transport driver will allocate the storage for the disk when\
    \ it loads, and will not release it until the driver unloads. The storage is a\
    \ fixed-size memory allocation. Our transport driver will also be responsible\
    \ for instantiating the `IOBlockStorageDevice` object, which will provide the\
    \ interface, through which the upper layer of the driver stack will communicate,\
    \ with our transport driver. The header file for a RAM disk's transport driver\
    \ is given in [Listing 14-2](#Chapter14.html#list_14_2).\n\n**Listing 14-2.**\
    \ The Header File of the Transport Driver for a RAM Disk Device\n\n```\n#include\
    \ <IOKit/IOService.h>\n#include <IOKit/IOBufferMemoryDescriptor.h>\n\nclass com_osxkernel_driver_RAMDisk\
    \ : public IOService\n{\n        OSDeclareDefaultStructors(com_osxkernel_driver_RAMDisk)\n\
    \nprivate:\n        IOBufferMemoryDescriptor*       m_memoryDesc;\n        void*\
    \                           m_buffer;\n\nprotected:\n     bool               \
    \     createBlockStorageDevice ();\n\npublic:\n     virtual bool            start\
    \ (IOService* provider);\n     virtual void            free (void);\n\n     virtual\
    \ IOByteCount     performRead (IOMemoryDescriptor* dstDesc, UInt64 byteOffset,\n\
    \                                             UInt64 byteCount);\n     virtual\
    \ IOByteCount     performWrite (IOMemoryDescriptor* srcDesc, UInt64 byteOffset,\n\
    \                                             UInt64 byteCount);\n};\n```\n\n\
    The implementation of a RAM disk's transport driver is given in [Listing 14-3](#Chapter14.html#list_14_3).\n\
    \n**Listing 14-3.** The Implementation of the Transport Driver for a RAM Disk\
    \ Device\n\n```\n// Define the superclass\n#define super IOService\n\nOSDefineMetaClassAndStructors(com_osxkernel_driver_RAMDisk,\
    \ IOService)\n\n#define kDiskByteSize           (16*1024*1024)  // Fix RAM disk\
    \ size at 16MiB\n\nbool com_osxkernel_driver_RAMDisk::start (IOService *provider)\n\
    {\n        if (super::start(provider) == false)\n                return false;\n\
    \n        // Allocate storage for the disk.\n        m_memoryDesc = IOBufferMemoryDescriptor::withCapacity(kDiskByteSize,\n\
    \                                                              kIODirectionOutIn);\n\
    \        if (m_memoryDesc == NULL)\n                return false;\n        m_buffer\
    \ = m_memoryDesc->getBytesNoCopy();\n\n        // Allocate an IOBlockStorageDevice\
    \ nub.\n        if (createBlockStorageDevice() == false)\n                return\
    \ false;\n\n        return true;\n}\n```"
  raw: '*   `doAsyncReadWrite` is the generic data read and write method of the `IOBlockStorageDevice`
    interface. It takes as its parameters an `IOMemoryDescriptor` object that describes
    the source buffer (for a disk read) or the destination buffer (for a disk write),
    a contiguous range of disk blocks to read from or write to, and associated attribute
    flags. The `IOMemoryDescriptor` also serves to determine whether the requested
    operation is a read or a write; the driver calls the method `getDirection()` on
    the `IOMemoryDescriptor` object, and if the returned value is `kIODirectionIn`,
    a read operation has been requested. If the returned value is `kIODirectionOut`,
    a write operation has been requested. The disk operation is performed asynchronously,
    and when it completes, the caller is notified through a callback function that
    is provided.

    *   `setWriteCacheState` is called to enable or disable any hardware caching that
    the device has. The corresponding method `getWriteCacheState` returns the current
    state of the device cache.

    *   `doSynchronizeCache` is called to flush the contents of the hardware cache
    to the media. This is a synchronous method that should not return until the contents
    of the cache have been written to a disk. This method is also called in response
    to the ioctl `DKIOCSYNCHRONIZECACHE` from a user space process.


    ### Building a RAM Disk Device


    Having examined the methods that must be implemented to support the `IOBlockStorageDevice`
    interface, we can now take a look at how a simple RAM disk device can be implemented
    in Mac OS X. As with the driver for any disk device in the I/O Kit, we will split
    our driver into two classes: the transport driver class, which implements the
    functionality and communicates with the hardware device, and a class that implements
    the `IOBlockStorageDevice` interface, which acts as an interface between the transport
    driver and the device services layer of the storage driver stack.


    As we have seen, the I/O Kit does not require the transport driver for a storage
    device to be written in any particular way or to subclass from any particular
    superclass. This allows the transport driver to be written in a way that is most
    natural for the type of hardware that provides access to the disk storage. For
    our RAM disk, the “hardware” controlled by the transport driver is nothing more
    than a memory allocation that provides the storage for the RAM disk. As we learned
    in [Chapter 4](#Chapter04.html#ch4), an I/O Kit driver that has no hardware device
    to match against will use the global `IOResources` class as its provider class.
    This will be the provider class of our RAM disk''s transport driver. Since our
    transport driver is implemented as a generic driver, we will implement it as a
    subclass of the generic `IOService` class.


    For simplicity, our RAM disk''s transport driver will allocate the storage for
    the disk when it loads, and will not release it until the driver unloads. The
    storage is a fixed-size memory allocation. Our transport driver will also be responsible
    for instantiating the `IOBlockStorageDevice` object, which will provide the interface,
    through which the upper layer of the driver stack will communicate, with our transport
    driver. The header file for a RAM disk''s transport driver is given in [Listing
    14-2](#Chapter14.html#list_14_2).


    ***Listing 14-2.** The Header File of the Transport Driver for a RAM Disk Device*


    `#include <IOKit/IOService.h>`

    `#include <IOKit/IOBufferMemoryDescriptor.h>`


