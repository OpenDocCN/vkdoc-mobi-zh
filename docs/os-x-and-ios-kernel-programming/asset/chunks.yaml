  raw: '### The IOUSBLib Framework


    The library used to write a user-space driver for a USB device is known as IOUSBLib,
    which is part of the I/O Kit framework (that is, the same framework a user-space
    application includes if it is communicating with a user client it defined itself).


    The first task a user-space driver needs to perform is to watch for the arrival
    of the particular USB devices it is interested in. Since USB devices can be connected
    and disconnected from the computer at any time, there is no guarantee the device
    an application is interested in will be present when the application is launched.
    Therefore, it''s a good idea for an application to install a notification callback
    that watches for the arrival of the USB devices it controls.


    In [Chapter 5](#Chapter05.html#ch5), we saw how an application can create a matching
    dictionary to find each instance of a specified kernel driver. This same approach
    is used by an application that implements a user-space USB driver to locate the
    devices it will control. As in [Chapter 5](#Chapter05.html#ch5), we begin by creating
    a dictionary that specifies the class name of the driver objects our application
    is interested in matching against. For a USB device, this can be done as follows:


    `matchingDictionary = IOServiceMatching(kIOUSBDeviceClassName);  // “IOUSBDevice”`


    This matching dictionary is far too general for most applications since it will
    match against all USB devices connected to the computer, including the keyboard
    and mouse. An application is typically interested in only one particular USB device,
    so a matching dictionary such as this will be inappropriate. We can narrow down
    the list of devices the matching dictionary satisfies by including the specific
    Product ID and Vendor ID of the USB device our application can support.


    A sample function that will create a matching dictionary for a USB device of a
    specified Vendor ID and Product ID is shown in [Listing 15-1](#Chapter15.html#list_15_1).


    ***Listing 15-1.** Creating a USB Matching Dictionary*


    `#include <IOKit/IOKitLib.h>`

    `#include <IOKit/usb/IOUSBLib.h>`

    `#include <CoreFoundation/CoreFoundation.h>`


    `CFDictionaryRef         MyCreateUSBMatchingDictionary (SInt32 idVendor, SInt32
    idProduct)`

    `{`

    `        CFMutableDictionaryRef  matchingDictionary = NULL;`

    `        CFNumberRef             numberRef;`


    `        // Create a matching dictionary for IOUSBDevice`

    `        matchingDictionary = IOServiceMatching(kIOUSBDeviceClassName);`

    `        if (matchingDictionary == NULL)`

    `                goto bail;`


    `        // Add the USB Vendor ID to the matching dictionary`

    `        numberRef = CFNumberCreate(kCFAllocatorDefault, kCFNumberSInt32Type,
    &idVendor);`

    `        if (numberRef == NULL)`

    `                goto bail;`

    `        CFDictionaryAddValue(matchingDictionary, CFSTR(kUSBVendorID), numberRef);`

    `        CFRelease(numberRef);`


    `        // Add the USB Product ID to the matching dictionary`

    `        numberRef = CFNumberCreate(kCFAllocatorDefault, kCFNumberSInt32Type,
    &idProduct);`

    `        if (numberRef == NULL)`

    `                goto bail;`

    `        CFDictionaryAddValue(matchingDictionary, CFSTR(kUSBProductID), numberRef);`

    `        CFRelease(numberRef);`


    `        // Success - return the dictionary to the caller`

    `        return matchingDictionary;`


    `bail:`

    `        // Failure - release resources and return NULL`

    `        if (matchingDictionary != NULL)`

    `                CFRelease(matchingDictionary);`


    `        return NULL;`

    `}`


    ![images](images/square.jpg) **Note** An application can narrow the matching dictionary
    by adding any of the keys that could be placed in the property list of a kernel-based
    USB driver (see [Chapter 8](#Chapter08.html#ch8)). For example, an application
    may include any of the keys idVendor, idProduct, bcdDevice, bDeviceSubClass, or
    bDeviceProtocol.


    For a composite USB device, a driver may prefer to match against a particular
    interface rather than the entire USB device. A user-space driver is able to do
    this by creating a matching dictionary for a specific instance of an `IOUSBInterface`
    object. This is because the I/O Kit defines a user client for every instance of
    both the `IOUSBDevice` class and the `IOUSBInterface` class that is created in
    the kernel, which makes both of these classes available to user processes.


    Having created a matching dictionary, an application is able to use the dictionary
    to iterate over all kernel objects that match its specifications or to install
    a callback to receive notifications when such a kernel object appears. This was
    described in [Chapter 5](#Chapter05.html#ch5). An example of a function to iterate
    over all kernel devices described by a given matching dictionary is given in [Listing
    15-2](#Chapter15.html#list_15_2).


    ***Listing 15-2.** Finding and Iterating Over Devices That Satisfy a Matching
    Dictionary*


    `void    MyFindMatchingDevices (CFDictionaryRef matchingDictionary)`

    `{`

    `        io_iterator_t           iterator = 0;`

    `        io_service_t            usbDeviceRef;`

    `        kern_return_t           err;`


    `        // Find all kernel objects that match the dictionary.`

    `        err = IOServiceGetMatchingServices(kIOMasterPortDefault, matchingDictionary,`

    `                       &iterator);`

    `        if (err == 0)`

    `        {`

    `                // Iterate over all matching kernel objects.`

    `                while ((usbDeviceRef = IOIteratorNext(iterator)) != 0)`

    `                {`

    `                        IOUSBDeviceInterface300**       usbDevice;`


    `                        // Create a driver for this device instance`

    `                        usbDevice = MyStartDriver(usbDeviceRef);`

    `                        IOObjectRelease(usbDeviceRef);`

    `                }`


    `                IOObjectRelease(iterator);`

    `        }`

    `}`


    The iterator for a matching dictionary, such as that shown in [Listing 15-2](#Chapter15.html#list_15_2),
    will return a number of `io_service_t` objects, each of which represents a kernel
    object. The `io_service_t` object is a user- space representation of an `IOUSBDevice`
    or `IOUSBInterface` object that resides in the kernel. Like any I/O Kit class,
    both `IOUSBDevice` and `IOUSBInterface` are each implemented by a C++ class. These
    classes contain a public interface that defines the methods through which a kernel
    driver interacts with a USB hardware device.


    The IOUSBLib interface is implemented through a C++ class that wraps an `io_service_t`
    object representing either an `IOUSBDevice` or an `IOUSBInterface`. The user-space
    equivalent of the `IOUSBDevice` class is implemented by a class named `IOUSBDeviceInterface`
    and the user-space equivalent of the `IOUSBInterface` class is implemented by
    a class named `IOUSBInterfaceInterface`. The declaration of these classes can
    be found in the header file `<IOKit/usb/IOUSBLib.h>`. The code sample in [Listing
    15-3](#Chapter15.html#list_15_3) demonstrates how a user-space application can
    instantiate an `IOUSBDeviceInterface` class from an `io_service_t`.


    ***Listing 15-3.** Instantiating an `IOUSBDeviceInterface` object from an `io_service_t`*


    `IOUSBDeviceInterface300**       MyStartDriver (io_service_t usbDeviceRef)`

    `{`

    `        SInt32                          score;`

    `        IOCFPlugInInterface**           plugin;`

    `        IOUSBDeviceInterface300**       usbDevice = NULL;`

    `        kern_return_t                   err;`


    `        err = IOCreatePlugInInterfaceForService(usbDeviceRef, kIOUSBDeviceUserClientTypeID,`

    `                                                   kIOCFPlugInInterfaceID, &plugin,
    &score);`

    `        if (err == 0)`

    `        {`

    `                err = (*plugin)->QueryInterface(plugin,`

    `                        CFUUIDGetUUIDBytes(kIOUSBDeviceInterfaceID300),`

    `                        (LPVOID)&usbDevice);`

    `                IODestroyPlugInInterface(plugin);`

    `        }`'
  trans: "\n### IOUSBLib 框架\n\n用于为 USB 设备编写用户空间驱动程序的库称为 `IOUSBLib`，它是 I/O Kit 框架的一部分（也就是说，如果用户空间应用程序要与它自己定义的用户客户端通信，它也会包含同一个框架）。\n\
    \n用户空间驱动程序需要执行的第一个任务是监视其感兴趣的特定 USB 设备的接入。由于 USB 设备可以在任何时候连接到计算机或从计算机断开，因此无法保证应用程序启动时其所关注的设备一定存在。因此，应用程序最好安装一个通知回调，用于监视其控制的\
    \ USB 设备的接入。\n\n在第 5 章中，我们了解了应用程序如何创建匹配字典来查找指定内核驱动程序的每个实例。实现用户空间 USB 驱动程序的应用程序也使用同样的方法来定位它将控制的设备。与第\
    \ 5 章一样，我们首先创建一个字典，指定我们的应用程序希望匹配的驱动程序对象的类名。对于 USB 设备，可以按如下方式完成：\n\n`matchingDictionary\
    \ = IOServiceMatching(kIOUSBDeviceClassName);` // \"IOUSBDevice\"\n\n对于大多数应用程序来说，这个匹配字典过于通用，因为它会匹配连接到计算机的所有\
    \ USB 设备，包括键盘和鼠标。一个应用程序通常只关注一个特定的 USB 设备，因此这样的匹配字典是不合适的。我们可以通过包含应用程序支持的特定 USB\
    \ 设备的产品 ID 和供应商 ID 来缩小匹配字典所满足的设备列表。\n\n清单 15-1 展示了一个示例函数，用于为指定供应商 ID 和产品 ID 的\
    \ USB 设备创建匹配字典。\n\n**清单 15-1.** 创建 USB 匹配字典\n\n```c\n#include <IOKit/IOKitLib.h>\n\
    #include <IOKit/usb/IOUSBLib.h>\n#include <CoreFoundation/CoreFoundation.h>\n\n\
    CFDictionaryRef         MyCreateUSBMatchingDictionary (SInt32 idVendor, SInt32\
    \ idProduct)\n{\n        CFMutableDictionaryRef  matchingDictionary = NULL;\n\
    \        CFNumberRef             numberRef;\n\n        // 为 IOUSBDevice 创建一个匹配字典\n\
    \        matchingDictionary = IOServiceMatching(kIOUSBDeviceClassName);\n    \
    \    if (matchingDictionary == NULL)\n                goto bail;\n\n        //\
    \ 将 USB 供应商 ID 添加到匹配字典中\n        numberRef = CFNumberCreate(kCFAllocatorDefault,\
    \ kCFNumberSInt32Type, &idVendor);\n        if (numberRef == NULL)\n         \
    \       goto bail;\n        CFDictionaryAddValue(matchingDictionary, CFSTR(kUSBVendorID),\
    \ numberRef);\n        CFRelease(numberRef);\n\n        // 将 USB 产品 ID 添加到匹配字典中\n\
    \        numberRef = CFNumberCreate(kCFAllocatorDefault, kCFNumberSInt32Type,\
    \ &idProduct);\n        if (numberRef == NULL)\n                goto bail;\n \
    \       CFDictionaryAddValue(matchingDictionary, CFSTR(kUSBProductID), numberRef);\n\
    \        CFRelease(numberRef);\n\n        // 成功 - 将字典返回给调用方\n        return matchingDictionary;\n\
    \nbail:\n        // 失败 - 释放资源并返回 NULL\n        if (matchingDictionary != NULL)\n\
    \                CFRelease(matchingDictionary);\n\n        return NULL;\n}\n```\n\
    \n![images](img/square.jpg) **注意：** 应用程序可以通过添加可置于基于内核的 USB 驱动程序属性列表中的任何键来缩小匹配字典的范围（参见第\
    \ 8 章）。例如，应用程序可以包含 `idVendor`、`idProduct`、`bcdDevice`、`bDeviceSubClass` 或 `bDeviceProtocol`\
    \ 中的任何键。\n\n对于复合 USB 设备，驱动程序可能更倾向于匹配特定的接口，而不是整个 USB 设备。用户空间驱动程序可以通过为 `IOUSBInterface`\
    \ 对象的特定实例创建匹配字典来实现这一点。这是因为 I/O Kit 为在内核中创建的 `IOUSBDevice` 类和 `IOUSBInterface`\
    \ 类的每个实例都定义了一个用户客户端，这使得这两个类都对用户进程可用。\n\n创建了匹配字典后，应用程序可以使用该字典来遍历所有符合其规范的内核对象，或者安装一个回调以在出现此类内核对象时接收通知。这已在第\
    \ 5 章中描述。清单 15-2 给出了一个遍历给定匹配字典所描述的所有内核设备的函数示例。\n\n**清单 15-2.** 查找并遍历满足匹配字典的设备\n\
    \n```c\nvoid    MyFindMatchingDevices (CFDictionaryRef matchingDictionary)\n{\n\
    \        io_iterator_t           iterator = 0;\n        io_service_t         \
    \   usbDeviceRef;\n        kern_return_t           err;\n\n        // 查找所有匹配该字典的内核对象。\n\
    \        err = IOServiceGetMatchingServices(kIOMasterPortDefault, matchingDictionary,\n\
    \                       &iterator);\n        if (err == 0)\n        {\n      \
    \          // 遍历所有匹配的内核对象。\n                while ((usbDeviceRef = IOIteratorNext(iterator))\
    \ != 0)\n                {\n                        IOUSBDeviceInterface300**\
    \       usbDevice;\n\n                        // 为此设备实例创建一个驱动程序\n            \
    \            usbDevice = MyStartDriver(usbDeviceRef);\n                      \
    \  IOObjectRelease(usbDeviceRef);\n                }\n\n                IOObjectRelease(iterator);\n\
    \        }\n}\n```\n\n匹配字典的迭代器（如清单 15-2 所示）将返回多个 `io_service_t` 对象，每个对象代表一个内核对象。`io_service_t`\
    \ 对象是驻留在内核中的 `IOUSBDevice` 或 `IOUSBInterface` 对象在用户空间的表示。与任何 I/O Kit 类一样，`IOUSBDevice`\
    \ 和 `IOUSBInterface` 都由一个 C++ 类实现。这些类包含一个公共接口，定义了内核驱动程序与 USB 硬件设备交互的方法。\n\n`IOUSBLib`\
    \ 接口是通过一个 C++ 类实现的，该类封装了一个代表 `IOUSBDevice` 或 `IOUSBInterface` 的 `io_service_t`\
    \ 对象。`IOUSBDevice` 类在用户空间的等价物由一个名为 `IOUSBDeviceInterface` 的类实现，而 `IOUSBInterface`\
    \ 类在用户空间的等价物由一个名为 `IOUSBInterfaceInterface` 的类实现。这些类的声明可以在头文件 `<IOKit/usb/IOUSBLib.h>`\
    \ 中找到。清单 15-3 中的代码示例演示了用户空间应用程序如何从 `io_service_t` 实例化一个 `IOUSBDeviceInterface`\
    \ 类。\n\n**清单 15-3.** 从 `io_service_t` 实例化一个 `IOUSBDeviceInterface` 对象\n\n```c\n\
    IOUSBDeviceInterface300**       MyStartDriver (io_service_t usbDeviceRef)\n{\n\
    \        SInt32                          score;\n        IOCFPlugInInterface**\
    \           plugin;\n        IOUSBDeviceInterface300**       usbDevice = NULL;\n\
    \        kern_return_t                   err;\n\n        err = IOCreatePlugInInterfaceForService(usbDeviceRef,\
    \ kIOUSBDeviceUserClientTypeID,\n                                            \
    \       kIOCFPlugInInterfaceID, &plugin, &score);\n        if (err == 0)\n   \
    \     {\n                err = (*plugin)->QueryInterface(plugin,\n           \
    \             CFUUIDGetUUIDBytes(kIOUSBDeviceInterfaceID300),\n              \
    \          (LPVOID)&usbDevice);\n                IODestroyPlugInInterface(plugin);\n\
    \        }\n```\n"
- fmt: "`return usbDevice;`\n}`\n\n如果应用程序创建了一个匹配字典，指定了`IOUSBInterface`，那么它接收到的每个`io_service_t`值将代表一个内核`IOUSBInterface`对象，而不是`IOUSBDevice`对象。在这种情况下，应用程序实例化以表示内核对象的用户空间类将是`IOUSBInterfaceInterface`。这只需要对[Listing\
    \ 15-3](#Chapter15.html#list_15_3)中调用的两个函数所传递的参数进行一处更改。对`IOCreatePlugInInterfaceForService`的调用应如下进行：\n\
    \n```\nerr = IOCreatePlugInInterfaceForService(usbDeviceRef, kIOUSBInterfaceUserClientTypeID,\n\
    \                                                kIOCFPlugInInterfaceID, &plugin,\
    \ &score);\n```\n\n类似地，对返回的`plugin`对象调用`QueryInterface`时，应使用以下参数：\n\n```\nIOUSBInterfaceInterface300**\
    \            usbInterface = NULL;\nerr = (*plugin)->QueryInterface(plugin,\n \
    \                       CFUUIDGetUUIDBytes(kIOUSBInterfaceInterfaceID300),\n \
    \                       (LPVOID)&usbInterface);\n```\n\n无论应用程序实例化的是`IOUSBDeviceInterface`还是`IOUSBInterfaceInterface`，代码结构都是相同的。在这两种情况下，第一步都是调用函数`IOCreatePlugInInterfaceForService()`，该函数返回一个类型为`IOCFPlugInInterface`的对象。这个对象作为实例化用户空间\
    \ I/O Kit 类的工厂，一旦完成此操作，它就没有其他用途了。事实上，如[Listing 15-3](#Chapter15.html#list_15_3)所示，一旦`IOUSBDeviceInterface`对象被创建，该对象会通过调用`IODestroyPlugInInterface()`立即释放。\n\
    \n`IOCFPlugInInterface`类包含一个名为`QueryInterface()`的方法，应用程序使用该方法来接收指向`IOUSBDeviceInterface`或`IOUSBInterfaceInterface`对象的指针。`IOUSBLib`提供了一种对类进行版本控制的方法。这使得未来版本的\
    \ Mac OS X 可以扩展某个类（例如`IOUSBDeviceInterface`），以包含额外功能，同时保持与为旧版本类编写的应用程序的向后兼容性。\n\
    \n当应用程序请求一个接口（例如`IOUSBDeviceInterface`）时，它还必须指定它期望接收的该类版本。类的版本是类名的一部分；例如，`IOUSBDeviceInterface300`标识了随\
    \ `IOUSBFamily` 3.0.0 版本一起提供的`IOUSBDeviceInterface`类的版本。该版本随 Mac OS X 10.5 一起提供。`IOUSBLib.h`头文件中提供了完整的类名及其版本，以及支持该类所需的最低操作系统版本。\n\
    \n![images](images/square.jpg) **提示** 作为一般规则，您应该使用的`IOUSBDeviceInterface`和`IOUSBInterfaceInterface`类的版本，将与您的应用程序需要支持的最低\
    \ Mac OS X 版本相关联。例如，需要 Mac OS X 10.5 或更高版本的应用程序应使用`IOUSBDeviceInterface300`和`IOUSBInterfaceInterface300`。\n\
    \n用户客户端类的一个需要花些时间适应的方面是，`IOUSBLib`返回的是指向对象指针的指针。这意味着在调用对象的方法之前，持有该接口的变量需要额外的一次解引用。`IOUSBLib`类的另一个特性是，每个方法都需要将对对象的引用作为第一个参数传递。例如，考虑由`IOCFPlugInInterface`类实现的`QueryInterface()`方法，尽管您可能期望使用以下代码行调用该方法：\n\
    \n```\nplugin->QueryInterface(parameters);     // 不正确\n```\n\n相反，因为`plugin`变量的类型是`IOCFPlugInInterface**`，因此是一个指向指针的指针，该方法实际上必须使用以下结构来调用：\n\
    \n```\n(*plugin)->QueryInterface(plugin, parameters);\n```\n\n![images](images/square.jpg)\
    \ **注意** 如果您熟悉微软的组件对象模型(COM)，您会立即认出方法名`QueryInterface()`。所有`IOUSBLib`类都基于 COM\
    \ 编程模型，并派生自基类`IUnknown`。这种设计对使用`IOUSBLib`的应用程序的最大影响是，所有`IOUSBLib`对象都是引用计数的；它们可以通过调用方法`AddRef()`来保留，通过调用方法`Release()`来释放。\n\
    \n### 处理异步操作\n\n正如我们稍后在讨论`IOUSBLib`类时将看到的，许多方法执行的操作是异步完成的。所有此类异步方法都接受两个参数：一个指向回调函数的指针，以及一个名为`refcon`的参数，该参数允许应用程序向回调函数传递任意上下文值。回调函数具有以下签名：\n\
    \n```\nvoid    MyCallbackFunction (void* refcon, IOReturn result, void* arg0);\n\
    ```\n\n第一个参数`refcon`是应用程序的任意上下文参数。第二个参数报告操作的整体结果；值为`kIOReturnSuccess`表示操作成功完成。最后一个参数`arg0`由`IOUSBLib`提供，并取决于所执行操作的类型。在本章中，当我们描述异步方法时，我们还将描述`IOUSBLib`通过`arg0`参数传递给回调函数的值。\n\
    \n正如内核驱动程序使用工作循环来将其完成例程与其他驱动程序代码同步一样，用户空间应用程序可以使用运行循环来将其来自`IOUSBLib`的完成回调与其余代码同步。\n\
    \n首先，应用程序必须为将要执行异步操作的`IOUSBLib`类创建一个运行循环源。`IOUSBLib`类包含用于创建运行循环源或 Mach 端口以接收异步通知的方法；然而，大多数应用程序只需要处理运行循环源。\n\
    \n需要注意的是，`IOUSBLib`类提供了前缀为`Create`和`Get`的方法（例如`CreateDeviceAsyncEventSource`和`GetDeviceAsyncEventSource`）。然而，`Get`方法只会返回一个之前通过`Create`方法初始化过的对象。以下代码片段显示了一个示例函数，用于创建和安装一个运行循环源，该源将用于接收来自`IOUSBDeviceInterface`类的异步通知：\n\
    \n```\nIOReturn   InstallRunLoopSourceForUSBDevice (IOUSBDeviceInterface300**\
    \ usbDevice)\n{\n     CFRunLoopSourceRef         runLoopSource;\n     IOReturn\
    \                   error;\n\n     error = (*usbDevice)->CreateDeviceAsyncEventSource(usbDevice,\
