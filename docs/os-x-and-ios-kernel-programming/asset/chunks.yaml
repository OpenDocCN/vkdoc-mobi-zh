  trans: '

    ### 摘要


    -   对于特定类型的设备（包括 USB 设备），I/O Kit 使得开发者可以省略内核驱动程序，并完全在用户空间中实现驱动程序。对最终用户而言，这提供了更好的体验。

    -   并非所有 USB 设备都适合使用用户空间驱动程序。那些需要由系统自身使用的设备，例如系统级的音频设备或 USB 存储设备，必须在内核中实现其驱动。

    -   I/O Kit 提供了一个名为 `IOUSBLib` 的用户空间库，供应用程序与 USB 设备进行交互。`IOUSBLib` 提供了 `IOUSBDevice`
    和 `IOUSBInterface` 内核类的用户空间等价物，分别称为 `IOUSBDeviceInterface` 和 `IOUSBInterfaceInterface`。

    -   应用程序可以通过创建匹配字典并安装通知回调来监视其支持的 USB 设备的接入和移除，如第 5 章所述。一旦应用程序收到通知，得知其关注的 USB 设备或
    USB 接口已连接到计算机，它就可以实例化一个 `IOUSBDeviceInterface` 或 `IOUSBInterfaceInterface` 对象，以提供对
    USB 硬件的访问。

    -   `IOUSBLib` 为用户空间驱动程序提供了对 USB 设备功能的完整支持。所有端点类型均在用户空间中得到支持，包括控制传输、批量传输、中断传输和等时传输。

    -   应用程序可以使用 `IOUSBLib` 执行同步或异步操作。使用回调来通知应用程序异步请求的完成。


    ## 第 16 章


    ## 调试


    调试是内核级驱动程序或扩展的开发和持续维护工作的一部分。因此，拥有有效调试内核的技能和知识是内核工程师工作描述中的重要组成部分。尽管在开发和质量保证过程中会格外小心，但错误往往是不可避免的。部分原因在于，一旦发布，你的驱动程序很可能会在未经充分测试的硬件/软件组合上运行。例如，你的驱动程序可能在比最初测试时更快或更慢的
    CPU 上运行，从而暴露出时序问题。


    许多人认为内核调试是一门玄学，这种看法不无道理。当应用程序崩溃时，它可以被转储到调试器中，并且通常可以精确定位导致问题的代码行。在内核中，事情就没那么容易了；虽然可以使用
    GNU 调试器 (GDB) 进行调试，但这需要一些设置，并且通常需要两台计算机。此外，内核崩溃常常表现为扩展中完全无关部分的问题，使得难以证明你的驱动程序是否牵涉其中。你或许有幸在崩溃后提取信息或附加调试器；然而，内存可能已被破坏，数据结构的值或调用栈可能不再可信。


    如果你正在为硬件设备编写驱动程序，事情可能会更复杂，因为出现故障的设备（在使用原型设备时更常见）也可能破坏内存，或导致计算机死锁或崩溃。这有时使得判断问题出在硬件还是软件上变得困难。


    在本章中，我们将探讨各种有助于调试常见问题的技术和策略。


    ### 常见问题类型


    内核崩溃或出现其他问题的原因有很多。然而，它们通常都是常见错误的变体，一旦你知道了所处理问题的类别，开始检查代码中的问题就容易得多。让我们大致看看在内核开发过程中可能遇到的一些问题。


    -   **竞态条件：** 一类常见的缺陷，用于描述多个执行线程相互冲突，结果取决于哪个线程先抵达的情况。竞态条件相当常见，通常是由于多线程环境下设计不佳或锁机制不当造成的。它们有时很难复现，并且可能在发现之前隐藏很长时间。当特定的事件序列以特定的顺序发生时，问题就会出现，例如，因为它依赖于用户输入。

    -   **死锁：** 当锁实现不佳，并且一个线程在等待一个永远不会发生的事件或锁时发生，可能是因为第二个线程在使用后未能释放该锁。一旦发生这种情况，该条件可能会蔓延到系统中也需要该锁的新线程。从用户的角度来看，这看起来像是他们的应用程序挂起了，并且他们可能无法强制退出，因为它正卡在内核中等待某个事件。

    -   **锁竞争：** 一种性能问题，发生在许多线程需要同一个锁，并且花费过多时间等待该锁而不是做任何有用工作的时候。锁竞争通常是设计不佳的结果，可以通过实施合适的锁定方案来预防。一般原则是锁定对数据的访问，而不是对代码的锁定。保护大块代码看似比仅对共享数据进行细粒度锁定更简单；然而，这会降低性能，并增加发生死锁的可能性。

    -   **访问无效内存：** 导致内核恐慌的最常见原因。与用户空间程序（会被中止）不同，如果 CPU 引发了无效内存异常，内核会直接恐慌。如果启用了调试器，内核会转储到调试器中，而不是在
    Mac OS X 上显示灰色的死亡屏幕或重新启动（这是 iOS 下的行为）。缓冲区溢出有时会导致无效内存异常，除非缓冲区恰好后面跟着有效内存，在这种情况下可能会发生静默的内存损坏。

    -   **内存和资源泄漏：** 例如，当驱动程序卸载且未正确释放诸如对象和缓冲区等资源时可能发生。也可能是扩展每次收到请求时分配一些内存，但在使用完后未能释放内存。内核没有垃圾回收功能，因此泄漏会随时间累积并导致内核恐慌。

    -   **非法指令/操作数：** 如果 CPU 检测到无效指令或指令的无效参数，则会引发这些异常。这可能是内存损坏或编写不良的驱动程序试图使用 CPU 不存在的特性（例如，在不支持的机器上使用
    SSE3 指令集）的结果。你也可能因内存损坏而看到此异常。

    -   **在主中断上下文中阻塞：** 会导致恐慌，因为你无法在主中断上下文中阻塞。阻塞需要一个被调度的线程，因为阻塞是通过让线程自愿进入睡眠状态来实现的。在这种情况下，线程的状态被保存，并在调度器决定再次运行该线程时被恢复。主中断处理程序不能被恢复；它必须不受中断地运行完成。许多内核
    API 在某些情况下可能会阻塞。例如，如果系统内存不足，内存分配可能会阻塞，这会导致将某些内存换出到磁盘以释放内存供请求使用。因此，诸如 `IOMalloc()`
    甚至 `IOLog()` 之类的函数不能在主中断上下文中使用。

    -   **主动引发的恐慌：** 当内核因判断某些事情即将严重出错或发生了无法恢复的异常情况而自愿决定崩溃时发生。一个例子是当一次不能阻塞的内存分配失败时。你的驱动程序可以通过调用
    `IOPanic()` 来使内核恐慌，该函数是 `panic()` 函数的封装。

