- fmt: "### Examining a Task's Address Space\n\nThe `vmmap` command line utility allows\
    \ you to inspect a process virtual memory map and its VM map entries. It clearly\
    \ illustrates how memory regions are mapped into a task's VM address space. The\
    \ `vmmap` command takes a process identifier (PID) as an argument. The following\
    \ shows the output of `vmmap` executed with the PID of a simple Hello World C\
    \ application (`a.out`), which prints a message and then goes to sleep:\n\n---\n\
    \n`====` **`Non-writable regions for process 46874`**\n`__PAGEZERO           00000000-00001000\
    \   [     4K] ---/--- SM=NUL  /Users/ole/a.out`\n`__TEXT               00001000-00002000\
    \   [     4K] r-x/rwx SM=COW  /Users/ole/a.out`\n`__LINKEDIT           00003000-00004000\
    \   [     4K] r--/rwx SM=COW  /Users/ole/a.out`\n`MALLOC guard page    00004000-00005000\
    \   [     4K] ---/rwx SM=NUL`\n`MALLOC metadata     00021000-00022000    [   \
    \  4K] r--/rwx SM=PRV`\n`__TEXT               8fe00000-8fe42000   [   264K] r-x/rwx\
    \ SM=COW  /usr/lib/dyld`\n`__LINKEDIT          8fe70000-8fe84000    [    80K]\
    \ r--/rwx SM=COW  /usr/lib/dyld`\n`__TEXT              9703b000-971e3000    [\
    \  1696K] r-x/r-x SM=COW  /usr/lib/libSystem.B.dylib`\n`STACK GUARD         bc000000-bf800000\
    \    [  56.0M] ---/rwx SM=NUL  stack guard for thread 0`\n**`==== Writable regions\
    \ for process 46874`**\n`__DATA              00002000-00003000    [     4K] rw-/rwx\
    \ SM=PRV  /Users/ole/a.out`\n`MALLOC metadata     00015000-00020000    [    44K]\
    \ rw-/rwx SM=PRV`\n`   MALLOC_TINY         00100000-00200000 [  1024K] rw-/rwx\
    \ SM=PRV  DefaultMallocZone_0x5000`\n`MALLOC_SMALL        00800000-01000000  \
    \  [  8192K] rw-/rwx SM=PRV  DefaultMallocZone_0x5000`\n`__DATA              8fe42000-8fe6f000\
    \    [   180K] rw-/rwx SM=PRV  /usr/lib/dyld`\n`__IMPORT            8fe6f000-8fe70000\
    \    [     4K] rwx/rwx SM=COW  /usr/lib/dyld`\n`shared pmap         a0800000-a093a000\
    \    [  1256K] rw-/rwx SM=COW`\n`__DATA              a093a000-a0952000    [  \
    \  96K] rw-/rwx SM=COW  /usr/lib/libSystem.B.dylib`\n`shared pmap         a0952000-a0a00000\
    \    [   696K] rw-/rwx SM=COW`\n`Stack               bf800000-bffff000    [  8188K]\
    \ rw-/rwx SM=ZER  thread 0`\n`Stack               bffff000-c0000000    [     4K]\
    \ rw-/rwx SM=COW  thread 0`\n\n---\n\nThe result has been trimmed for readability.\
    \ The output is divided between non-writable regions and writable regions. The\
    \ former, as you can see, includes the page zero mapping, which is read-only and\
    \ will generate an exception if an application tries to write to memory addresses\
    \ 0-4096 (4096 decimal = `0x1000` hex). This is why your application will crash\
    \ if you try to dereference a null-pointer. The next map entry is the text segment\
    \ of the application, which contains the executable code of the application. You\
    \ will see that the text segment is marked as having a share mode (SM) of COW,\
    \ which means that if this process spawns a child, it will inherit this mapping\
    \ from the parent, thus avoiding a copy until pages in that segment are modified.\n\
    \nIn addition to the text segment for the `a.out` program itself, you will also\
    \ see a mapping for `libSystem.B.dylib`. On Mac OS X and iOS, `libSystem` implements\
    \ the standard C Library and the POSIX thread API, as well as other system APIs.\
    \ The `a.out` process inherited the mapping for `libSystem` from its parent process\
    \ `/sbin/launchd`, the parent of all user space processes. This ensures the library\
    \ is only loaded once, saving memory and improving the launch speed of applications,\
    \ as fetching a library from secondary storage, such as a hard drive, is usually\
    \ slow.\n\nIn the writable regions you can see the data segment of `a.out` and\
    \ `libSystem`. These segments contain variables defined by the program/library.\
    \ Obviously, these can be modified, so each process needs a copy of the data segment\
    \ for a shared library, however it is COW, so no overhead is necessary until a\
    \ process makes modifications to the mapping.\n\n![images](images/square.jpg)\
    \ **Tip** If you want to inspect the virtual memory map of a system process, such\
    \ as `launchd`, you need to run `vmmap` with `sudo`, as by default your user will\
    \ only be able to inspect its own processes.\n\n### Pagers\n\nVirtual memory allows\
    \ a process to have a virtual address space larger than the available physical\
    \ memory, and it is possible for tasks running on the system to be combined, consuming\
    \ more than the available amount of memory. The mechanism that makes this possible\
    \ is known as a *pager.* The pager controls the transfer of memory pages to and\
    \ from the system memory (RAM), to a secondary backing store, usually a hard drive.\
    \ When a task that has high memory requirements needs to run, the *pager* can\
    \ temporarily transfer (page out) memory pages belonging to inactive tasks to\
    \ the backing store, thereby freeing up enough memory to allow the demanding task\
    \ to execute. Similarly, if a process is found to be largely idle, the system\
    \ can opt to page out the task's memory to free memory for current or future tasks.\
    \ When an application runs, and it tries to access memory that has been paged\
    \ out, an exception known as a page fault will occur, which is also the exception\
    \ that occurs if a task tries to access an invalid memory address. When the page\
    \ fault occurs, the kernel will attempt to transfer back (page in) the page corresponding\
    \ to the memory address, and if the page cannot be transferred back, it will be\
    \ treated as an invalid memory access, and the task will be aborted. The XNU kernel\
    \ supports three different pagers:\n\n*   **Default Pager:** Performs traditional\
    \ paging and transfers between the main memory and a swap file on the system hard\
    \ drive (`/var/vm/swapfile*`).\n*   **Vnode Pager:** Ties in with the Unified\
    \ Buffer Cache (UBC) used by file systems and is used to cache files in memory.\n\
    *   **Device Pager:** Used for managing memory mappings of hardware devices, such\
    \ as PCI devices that map registers into memory. Mapped memory is commonly used\
    \ by I/O Kit drivers, and I/O Kit provides abstractions for working with such\
    \ memory.\n\nWhich pager is in use is more or less transparent to higher-level\
    \ parts, such as the VM object. Each VM object has an associated *memory object,*\
    \ which provides (via ports) an interface to the current pager.\n\n### Memory\
    \ Allocation in Mach\n\nSome fundamental routines for memory allocation in Mach\
    \ are:\n\n```\nkern_return_t kmem_alloc(vm_map_t map, vm_offset_t *addrp, vm_size_t\
    \  size);\nkern_return_t kmem_alloc_contig(vm_map_t map, vm_offset_t *addrp,\n\
    \                                vm_size_t size, vm_offset_t mask, int flags);\n\
    void kmem_free(vm_map_t map, vm_offset_t addr, vm_size_t size);\n```\n\n`kmem_alloc()`\
    \ provides the main interface to obtaining memory in Mach. In order to allocate\
    \ memory, you must provide a VM map. For most work within the kernel, `kernel_map`\
    \ is defined and points to the VM map of `kernel_task`. The second variant, `kmem_alloc_contig()`,\
    \ attempts to allocate memory that is physically contiguous, as opposed to the\
    \ former, which allocates virtually contiguous memory. Apple recommends against\
    \ making this type of allocation, as there is a significant penalty incurred in\
    \ searching for free contiguous blocks. Mach also provides `kmem_alloc_aligned()`\
    \ function, which allocates memory aligned to a power of two, as well as a few\
    \ other variants that are less commonly used. The `kmem_free()` function is provided\
    \ to free allocated memory. You have to take care to pass the same VM map as you\
    \ used when you allocated, as well as the size of the original allocation."
