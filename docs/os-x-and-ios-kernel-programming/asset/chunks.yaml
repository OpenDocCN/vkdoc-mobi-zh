- fmt: '# Memory Management


    Memory management in the kernel is significantly more complex than it is for a
    user space program. A user space program typically deals with a flat linear address
    space and can allocate memory in more or less arbitrary blocks without worrying
    about the source or arrangement of this memory. It has simple interfaces that
    typically take a size in bytes as an argument and deliver a yay or nay result,
    depending on the availability of the requested memory. At worst, the consequence
    of a failed allocation or misuse of memory is the termination of the offending
    process.


    However, things are not as straightforward in the kernel. The kernel has to deal
    with multiple memory spaces, including its own, as well as the mapping of memory
    between those memory spaces and physical memory. While user space programs deal
    with virtual memory, where the underlying physical arrangement is irrelevant,
    the kernel often needs to know whether the memory is contiguous and where it is
    located. This is because some hardware devices are unable to read from certain
    memory addresses or have specific requirements regarding the alignment of the
    memory, for example, because it can read only from memory that has been aligned
    to a 16-byte boundary or because it cannot read from addresses higher than 32-bit.
    However, the most obvious challenge of kernel memory management is to use as little
    as possible because it is a scarce resource, especially for embedded devices such
    as the iPhone or iPad. Incorrect use of memory in the kernel can lead to subtle
    and not so subtle consequences.


    In this chapter, we aim to explain the various types of memory you will encounter
    as a kernel programmer, their purpose, and the most effective and safe use of
    memory. We also discuss mechanisms and methods for allocating and managing memory,
    as well as some low-level mechanisms used by the OS to manage memory. We will
    also look at how to perform memory mapping operations, where memory from one address
    space can be mapped into the address space of another task.


    ## Types of Memory


    The kernel deals with multiple types of memory, so understanding the difference
    is key to implementing a successful driver or kernel extension.


    The types of memory can be categorized as:


    *   CPU physical address

    *   bus physical address

    *   user and kernel virtual addresses


    In addition to the three types of memory addresses, the amount of addressable
    memory differs between architectures and can be from 32-bit to 64-bit. Memory
    may also be ordered differently depending on the architecture and can be of little
    or big endian.


    The following sections will discuss the importance and usage of each type of memory
    as it applies to kernel programming.


    ### CPU Physical Address


    A physical address refers to the addressing system used by the CPU to access physical
    memory. Typically, physical addresses are hidden behind the Memory Management
    Unit (MMU) of the CPU. The MMU translates virtual addresses normally used by the
    kernel and user space into physical addresses. The physical address space is linear
    and goes from `0` to `0xffffffff` (`2^32`) for 32-bit systems and `0` to `0xffffffffffffffff`
    (`2^64`) for 64-bit systems. Access to physical memory is cached in smaller memory
    buffers, such as L1 and L2 caches typically contained on the CPU die.


    It is generally unnecessary to deal directly with physical addresses, even when
    writing drivers.


    **PHYSICAL ADDRESS EXTENSIONS**


    Physical Address Extensions (PAE) is a feature developed by Intel to allow a larger
    physical address space, which works around the 4 GB memory limit on 32-bit systems.
    PAE is available on all versions of Mac OS X that support Intel processors (10.4.4
    and higher). PAE expands available address space up to 36 bits (obviously, there
    are no 36-bit data types so addresses are represented with a 64-bit type), which
    allows it to address up to 64 GB of physical memory. However, PAE does not change
    the size of the virtual address space used by a process, which is still limited
    to 4 GB. While no process (or the kernel) can use more than 4 GB, the system collectively
    can use up to 64 GB.


    ### Bus Physical Addresses


    The introduction of 64-bit computing presented a challenge as legacy I/O buses
    such as PCI and PCI-X were unable to access memory addresses over 32-bit. To work
    around this, PowerPC G5-based Macs had an additional MMU on their *north bridge*,
    used for remapping memory from 64-bit addresses into 32-bit addresses the device
    can read from. This MMU is referred to as the Device Address Resolution Table
    (DART). The DART presents the translated memory as physical addresses to the device,
    however these addresses are translated and not the same physical address as the
    CPU use. Intel-based computers have similar capabilities known as I/O memory management
    unit (IOMMU), one of the virtualization technologies for directed I/O (VT-d).


    A *bus physical address* appears to be a physical address to a hardware device,
    though in reality, it is a virtual address translated by the DART. If you are
    confused, don’t worry; you rarely have to deal with these addresses. In fact,
    if you use I/O Kit, it will do all the required translations for you automatically
    if you use `IOMemoryDescriptor`, which is discussed later in this chapter. Drivers
    can use the `IOPhysicalAddress` type to handle physical addresses. The size of
    the type depends on the underlying architecture. Because of PAE, it may be 64-bit,
    even on 32-bit systems.'
