    ### Summary


    * Every computer that runs Mac OS X has the ability to be placed in a low power
    mode known as "sleep". While in sleep mode, most hardware components are either
    powered down completely or are provided with only a reduced current.

    * A device driver can register and respond to requests from the power management
    system to prepare its hardware for a loss of power before sleep and to restore
    the state of its hardware when the system is woken from sleep.

    * The I/O Kit''s power management API is implemented by the `IOService` base class.
    This makes it possible for every driver to provide support for power management.

    * A driver may opt to lower the power state of its device independently of whether
    the computer is in the sleep mode. This can be useful for reducing the power consumption
    of the device when it has not been used for a period of time.

    * A driver can observe the power state of any hardware device in the system. This
    can be used by a driver to receive a notification before a device changes its
    power state and a notification after the device has transitioned to its new power
    state.


    ## C H A P T E R 11


    ## Serial Port Drivers


    A serial port provides a basic communications interface for the purpose of getting
    low bandwidth data into and out of a computer. Although modern interfaces such
    as USB and FireWire have replaced many applications in which the traditional serial
    port was once used, the serial port driver is still well supported in modern day
    operating systems, including Mac OS X, despite the fact that Apple has not released
    hardware with a built-in serial port for over a decade.


    There are several reasons for the longevity of the serial port. First, a serial
    port is simple and inexpensive to implement in hardware, making it a popular choice
    for hobbyists who are adding computer communications to their electronic projects.
    Second, it is a very flexible interface. The serial driver is concerned only with
    transferring data bytes between the serial port and the user space application.
    The driver plays no role in interpreting the data stream; it simply deals with
    the transmission of the data.


    This leaves the user space application to implement the protocol of the connected
    device, which means that much of the work that would usually be done by a driver
    is instead left to the user space application. This means that a hardware vendor
    doesn''t have to provide a driver for their device; they can simply publish the
    protocol describing the format of the data that they transmit over their serial
    port, and leave the implementation of the protocol for others. Devices that use
    serial ports include GPS receivers and barcode scanners. They are also commonly
    used to provide debugging output on hardware.


    Serial ports are no longer found on Macintosh computers; they have been replaced
    by USB and FireWire ports. Serial devices, such as GPS receivers and barcode scanners,
    attach to a computer by USB, but they appear to the system as a USB-based serial
    port that a user space application can connect to. If you are interacting with
    a device that communicates over a serial port, in nearly all cases your application
    will be able to use an existing serial port driver. There are very few cases where
    you will need to implement your own serial port driver; even projects that use
    a USB-based serial port will use standard drivers to provide the serial port interface.


    This chapter describes how a serial port driver is implemented within the I/O
    Kit, and how to read and write from a serial port in a user space application.
    The implementation of a serial port driver can be seen as a practical example
    of driver techniques, including implementing blocking calls, circular buffers,
    and synchronization and notification. Therefore, even if a serial port driver
    is not directly relevant to you, the concepts that we will cover can be applied
    to other drivers.'
