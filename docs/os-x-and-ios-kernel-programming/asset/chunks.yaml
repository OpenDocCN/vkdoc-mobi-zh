    ```\n\n现在我们已经加载了驱动程序及其符号信息，并告知了 GDB 查找 `MyDebugDriver` 源代码的位置。内核自身源代码的位置被硬编码在调试内核映像中。如果你希望在\
    \ GDB 中显示源代码，则需要为你下载 XNU 源代码的位置创建一个指向 `/SourceCache/` 目录的符号链接。\n\n接下来，让我们在加载了\
    \ KEXT 和符号信息的情况下，再次尝试 `backtrace` 命令，操作如下：\n\n`(gdb)` **`backtrace`**\n```\n...\n\
    #5  0x009ba0b7 in com_osxkernel_MyDebugDriver::testFunc3 (this=0x4e80f80, arg1=65261,\n\
    arg2=48879, arg3=0, arg4=5380) at MyDebugDriver.cpp:14\n#6  0x009ba356 in com_osxkernel_MyDebugDriver::testFunc2\
