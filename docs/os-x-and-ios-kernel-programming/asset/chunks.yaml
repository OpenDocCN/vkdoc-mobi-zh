- fmt: "# User and Kernel Virtual Addresses\n\nVirtual addresses are linear addresses\
    \ that are translated into physical addresses by a special chip on the CPU called\
    \ the Memory Management Unit (MMU). Each user space process has its own memory\
    \ address space, and for all intents and purposes it looks like a process owns\
    \ all physical memory. It may use any memory location in its address space, even\
    \ on addresses located beyond the amount of physical memory. The virtual address\
    \ space appears linear to a process, although the memory that backs it may be\
    \ fragmented.\n\nIn Mac OS X, the entire virtual address space is available for\
    \ a process to use. On a 32-bit system this includes memory addresses from 0–4\
    \ GB. Operating systems such as Microsoft Windows or Linux use a split model,\
    \ where the kernel is mapped into the virtual address space of each process. For\
    \ example, on Windows (32-bit), user space virtual memory occupies addresses from\
    \ 0 to `0x7FFFFFFF`, whereas memory addresses reserved for the kernel go from\
    \ `0x80000000` to `0xFFFFFFFF`. Because the kernel is already mapped, the CPU\
    \ doesn't have to change the page tables when a process context switches into\
    \ kernel mode (an already expensive operation). The downside of this approach\
    \ is that the kernel and user space processes have less address space available,\
    \ and hence in the case of Windows, only 2 GB can be accessed at any given time\
    \ by either the kernel or a user space process. On Linux, the split is typically\
    \ 3 GB/1 GB, with only 1 GB available to the kernel (though everything in Linux\
    \ is configurable and other configurations are also available). If the system\
    \ has a GPU enabled, this typically comes with onboard memory of up to 1 GB, which\
    \ has to be mapped into virtual address space and may result in some physical\
    \ memory being unable to be used as the GPU's large frame buffer *shadows* it.\n\
    \nTo avoid the shadowing problem, Mac OS X has completely separate address spaces\
    \ for the kernel (4GB) and user space processes (4GB), but as mentioned the downside\
    \ is more expensive context switching.\n\nThe 64-bit kernel introduced in Mac\
    \ OS X 10.6 Snow Leopard solved the problem of limited address space once for\
    \ all. In 64-bit kernels, the kernel address space is always mapped in. Mac OS\
    \ X splits the address space so the upper 128 terabytes (!) are reserved for the\
    \ kernel, while the lower 128 terabytes belong to the currently running user space\
    \ task. Though the address space is shared with user space, tasks are not able\
    \ to access kernel memory due to page protection flags.\n\nA virtual memory address\
    \ may not always be backed by a physical memory location, as memory may have been\
    \ migrated to an external backing store, such as a hard drive, because it was\
    \ infrequently used or because a running process required more memory than was\
    \ available. If the CPU accesses an address and the memory for the address is\
    \ not resident, it will result in a *page fault exception*. The *pager*, a component\
    \ of the OS, will attempt to fetch the page containing the given memory address.\n\
    \nThe first page (0–4 KB) of the virtual address space is inaccessible to a process\
    \ and an exception will be generated if access is attempted.\n\nThe architecture\
    \ agnostic type `IOVirtualAddress` can be used to handle virtual addresses in\
    \ I/O Kit code. This type is, again, the alias of `mach_vm_address_t`, the type\
    \ for virtual memory addresses in the Mach layer.\n\n![images](images/square.jpg)\
    \ **Tip** For a more detailed discussion about virtual memory, see [Chapter 1](#Chapter01.html#ch1),\
    \ or for details about the OS X and iOS implementation, see [Chapter 2](#Chapter02.html#ch2).\n\
    \n## Memory Ordering: Big vs. Little Endian\n\nEndianess refers to the ordering\
    \ of the components of a binary word in memory. The ordering will be either little-endian\
    \ or big-endian depending on the CPU architecture that is used. The effects of\
    \ this can be illustrated with a simple C program, as shown in [Listing 6-1](#Chapter06.html#list_6_1).\n\
    \n***Listing 6-1.** Print the Byte Order of a 32-bit Word*\n\n```\n#include <stdio.h>\n\
    #include <stdint.h>\nint main(int argc, char *argv[])\n{\n        uint32_t word\
    \ = 0xaabbccdd;\n        uint8_t* ptr = (uint8_t*)&word;\n        printf(\"%02x\
    \ %02x %02x %02x\\n\", ptr[0], ptr[1], ptr[2], ptr[3]);\n        return 0;\n}\n\
    ```\n\nThe result of executing on a system with little endinaness will be:\n\n\
    - - -\n\n`dd cc bb aa`\n\n- - -\n\nWhile on a big endian system:\n\n- - -\n\n\
    `aa bb cc dd`\n\n- - -\n\nAs you can see, the ordering is reversed on little-endian\
    \ systems. All current-generation Macs are little-endian, as the Intel x86/x86_64\
    \ processors are little-endian; so too are ARM-based iOS devices. The older PowerPC-based\
    \ Macs were big-endian. Why should you care about big-endian then? Well, some\
    \ hardware architectures or network protocols, such as TCP/IP, use big-endian;\
    \ additionally, your driver or kernel extensions may have to be compatible with\
    \ older Macs that are based on the PowerPC architecture. Furthermore, OS X has\
    \ support for *Rosetta*, which emulates PowerPC applications on Intel-based Macs.\
    \ It is possible your driver will be accessed by a *Rosetta* client task. Some\
    \ user space APIs, such as the Carbon File Manager, also work with big-endian\
    \ data structures.\n\nThe C pre-processor macros `__LITTLE_ENDIAN__` and `__BIG_ENDIAN__`\
    \ are defined by the compiler and can be used to determine the byte order at compile\
    \ time.\n\n## 32-bit vs. 64-bit Memory Addressing\n\nModern Mac OS X systems are\
    \ now 64-bit. By 64-bit, we mean the CPU's ability to work with addresses of a\
    \ 64-bit width, including general-purpose registers, and the ability to use a\
    \ 64-bit data bus and 64-bit virtual memory addressing.\n\n**THE INTEL 64 ARCHITECTURE**\n\
    \nThe Intel 64 (x86-64) architecture is an extension of the traditional Intel\
    \ x86 instruction set, which enables it to operate in 64-bit mode and allows it\
    \ to support large quantities of physical memory. While Intel invented the x86\
    \ compatible processors, this extension was originally created by AMD and was\
    \ marketed as AMD64. Intel subsequently released their version of the 64-bit extensions,\
    \ initially named EM64T and IA-32e, which provided compatibility with AMD's solution.\
    \ Intel originally placed their bets on the designed-from-scratch IA64 (Itainum).\
    \ IA64 ditched the legacy of x86. HP and other high-performance server vendors,\
    \ such as SGI, pushed IA64 heavily but adoption was slow. Intel 64 / AMD64 remain\
    \ the dominant architectures today. Intel 64-capable CPUs are found in all current-generation\
    \ Macs. An x86-64 processor can operate in two modes, *long mode* or *legacy mode*.\
    \ The former is the 64-bit mode and offers compatibility, which allows 32-bit\
    \ and 16-bit applications to execute. The OS has to be 64-bit aware to operate\
    \ in this mode. The latter is a 32-bit mode, for 32-bit only operating systems.\n\
    \n[Table 6-1](#Chapter06.html#tab_6_1) shows the supported addressing modes and\
    \ native pointer sizes of architectures supported by OS X and iOS.\n\n![images](images/t0601.jpg)\n\
    \nBecause it is possible for the kernel to be running in 32-bit mode while an\
    \ application runs in 64-bit mode, great care must be taken when a 64-bit process\
    \ exchanges data with the kernel, for example, through an `ioctl()` or an `IOUserClient`\
    \ method. The same is true when running a 64-bit kernel and communicating with\
    \ a 32-bit application. The problem is that 32-bit and 64-bit compilers may define\
    \ data types differently. For example, the C data type `long` is 4 bytes wide\
    \ in 32-bit programs and 8 bytes in a program compiled for a 64-bit instruction\
    \ set."
  raw: '#### User and Kernel Virtual Addresses


    Virtual addresses are linear addresses that are translated into physical addresses
    by a special chip on the CPU called the Memory Management Unit (MMU). Each user
    space process has its own memory address space, and for all intents and purposes
    it looks like a process owns all physical memory. It may use any memory location
    in its address space, even on addresses located beyond the amount of physical
    memory. The virtual address space appears linear to a process, although the memory
    that backs it may be fragmented.


    In Mac OS X, the entire virtual address space is available for a process to use.
    On a 32-bit system this includes memory addresses from 0–4 GB. Operating systems
    such as Microsoft Windows or Linux use a split model, where the kernel is mapped
    into the virtual address space of each process. For example, on Windows (32-bit),
    user space virtual memory occupies addresses from 0 to 0x7FFFFFFF, whereas memory
    addresses reserved for the kernel go from 0x80000000 to 0xFFFFFFFF. Because the
    kernel is already mapped, the CPU doesn''t have to change the page tables when
    a process context switches into kernel mode (an already expensive operation).
    The downside of this approach is that the kernel and user space processes have
    less address space available, and hence in the case of Windows, only 2 GB can
    be accessed at any given time by either the kernel or a user space process. On
    Linux, the split is typically 3 GB/1 GB, with only 1 GB available to the kernel
    (though everything in Linux is configurable and other configurations are also
    available). If the system has a GPU enabled, this typically comes with onboard
    memory of up to 1 GB, which has to be mapped into virtual address space and may
    result in some physical memory being unable to be used as the GPU''s large frame
    buffer *shadows* it.


    To avoid the shadowing problem, Mac OS X has completely separate address spaces
    for the kernel (4GB) and user space processes (4GB), but as mentioned the downside
    is more expensive context switching.


    The 64-bit kernel introduced in Mac OS X 10.6 Snow Leopard solved the problem
    of limited address space once for all. In 64-bit kernels, the kernel address space
    is always mapped in. Mac OS X splits the address space so the upper 128 terabytes
    (!) are reserved for the kernel, while the lower 128 terabytes belong to the currently
    running user space task. Though the address space is shared with user space, tasks
    are not able to access kernel memory due to page protection flags.


    A virtual memory address may not always be backed by a physical memory location,
    as memory may have been migrated to an external backing store, such as a hard
    drive, because it was infrequently used or because a running process required
    more memory than was available. If the CPU accesses an address and the memory
    for the address is not resident, it will result in a *page fault exception*. The
    *pager*, a component of the OS, will attempt to fetch the page containing the
    given memory address.


    The first page (0–4 KB) of the virtual address space is inaccessible to a process
    and an exception will be generated if access is attempted.


    The architecture agnostic type `IOVirtualAddress` can be used to handle virtual
    addresses in I/O Kit code. This type is, again, the alias of `mach_vm_address_t`,
    the type for virtual memory addresses in the Mach layer.


    ![images](images/square.jpg) **Tip** For a more detailed discussion about virtual
    memory, see [Chapter 1](#Chapter01.html#ch1), or for details about the OS X and
    iOS implementation, see [Chapter 2](#Chapter02.html#ch2).


    #### Memory Ordering: Big vs. Little Endian


    Endianess refers to the ordering of the components of a binary word in memory.
    The ordering will be either little-endian or big-endian depending on the CPU architecture
    that is used. The effects of this can be illustrated with a simple C program,
    as shown in [Listing 6-1](#Chapter06.html#list_6_1).


    ***Listing 6-1.** Print the Byte Order of a 32-bit Word*


    `#include <stdio.h>`

    `#include <stdint.h>`

    `int main(int argc, char *argv[])`

    `{`

    `        uint32_t word = 0xaabbccdd;`

    `        uint8_t* ptr = (uint8_t*)&word;`

    `        printf("%02x %02x %02x %02x\n", ptr[0], ptr[1], ptr[2], ptr[3]);`

    `        return 0;`

    `}`


    The result of executing on a system with little endinaness will be:


    * * *


    `dd cc bb aa`


    * * *


    While on a big endian system:


    * * *


    `aa bb cc dd`


    * * *


    As you can see, the ordering is reversed on little-endian systems. All current-generation
    Macs are little-endian, as the Intel x86/x86_64 processors are little-endian;
    so too are ARM-based iOS devices. The older PowerPC-based Macs were big-endian.
    Why should you care about big-endian then? Well, some hardware architectures or
    network protocols, such as TCP/IP, use big-endian; additionally, your driver or
    kernel extensions may have to be compatible with older Macs that are based on
    the PowerPC architecture. Furthermore, OS X has support for *Rosetta*, which emulates
    PowerPC applications on Intel-based Macs. It is possible your driver will be accessed
    by a *Rosetta* client task. Some user space APIs, such as the Carbon File Manager,
    also work with big-endian data structures.


    The C pre-processor macros `__LITTLE_ENDIAN__` and `__BIG_ENDIAN__` are defined
    by the compiler and can be used to determine the byte order at compile time.


    #### 32-bit vs. 64-bit Memory Addressing


    Modern Mac OS X systems are now 64-bit. By 64-bit, we mean the CPU''s ability
    to work with addresses of a 64-bit width, including general-purpose registers,
    and the ability to use a 64-bit data bus and 64-bit virtual memory addressing.


    **THE INTEL 64 ARCHITECTURE**


    The Intel 64 (x86-64) architecture is an extension of the traditional Intel x86
    instruction set, which enables it to operate in 64-bit mode and allows it to support
    large quantities of physical memory. While Intel invented the x86 compatible processors,
    this extension was originally created by AMD and was marketed as AMD64\. Intel
    subsequently released their version of the 64-bit extensions, initially named
    EM64T and IA-32e, which provided compatibility with AMD''s solution. Intel originally
    placed their bets on the designed-from-scratch IA64 (Itainum). IA64 ditched the
    legacy of x86\. HP and other high-performance server vendors, such as SGI, pushed
    IA64 heavily but adoption was slow. Intel 64 / AMD64 remain the dominant architectures
    today. Intel 64-capable CPUs are found in all current-generation Macs. An x86-64
    processor can operate in two modes, *long mode* or *legacy mode*. The former is
    the 64-bit mode and offers compatibility, which allows 32-bit and 16-bit applications
    to execute. The OS has to be 64-bit aware to operate in this mode. The latter
    is a 32-bit mode, for 32-bit only operating systems.


    [Table 6-1](#Chapter06.html#tab_6_1) shows the supported addressing modes and
    native pointer sizes of architectures supported by OS X and iOS.


    ![images](images/t0601.jpg)


    Because it is possible for the kernel to be running in 32-bit mode while an application
    runs in 64-bit mode, great care must be taken when a 64-bit process exchanges
    data with the kernel, for example, through an `ioctl()` or an `IOUserClient` method.
    The same is true when running a 64-bit kernel and communicating with a 32-bit
    application. The problem is that 32-bit and 64-bit compilers may define data types
    differently. For example, the C data type `long` is 4 bytes wide in 32-bit programs
    and 8 bytes in a program compiled for a 64-bit instruction set.'
  trans: "\n# 用户和内核虚拟地址\n\n虚拟地址是线性地址，由 CPU 上名为内存管理单元（MMU）的专用芯片转换为物理地址。每个用户空间进程都有自己的内存地址空间，并且从所有实际用途来看，该进程似乎拥有所有物理内存。它可以使用其地址空间中的任何内存位置，甚至包括超过物理内存大小的地址。虚拟地址空间对进程来说呈线性，尽管支撑它的物理内存可能是碎片化的。\n\
    \n在 Mac OS X 中，整个虚拟地址空间都可供进程使用。在 32 位系统上，这包括从 0 到 4 GB 的内存地址。诸如 Microsoft Windows\
    \ 或 Linux 之类的操作系统使用分离模型，其中内核被映射到每个进程的虚拟地址空间中。例如，在 Windows（32 位）上，用户空间虚拟内存占用从 0\
    \ 到 `0x7FFFFFFF` 的地址，而保留给内核的内存地址则从 `0x80000000` 到 `0xFFFFFFFF`。由于内核已经被映射，当进程上下文切换到内核模式时（这本身已是一项昂贵的操作），CPU\
    \ 无需更改页表。这种方法的缺点是内核和用户空间进程可用的地址空间更少，因此以 Windows 为例，在任何给定时间，内核或用户空间进程只能访问 2 GB\
    \ 内存。在 Linux 上，典型的分割是 3 GB/1 GB，内核只使用 1 GB（尽管 Linux 中一切都是可配置的，也存在其他配置）。如果系统启用了\
    \ GPU，通常其具有高达 1 GB 的板载内存，这些内存必须映射到虚拟地址空间中，并且可能导致某些物理内存无法使用，因为 GPU 的大帧缓冲区*遮蔽*了这些内存。\n\
    \n为了避免遮蔽问题，Mac OS X 为内核（4 GB）和用户空间进程（4 GB）提供了完全独立的地址空间，但如前所述，缺点是上下文切换的开销更大。\n\n\
    Mac OS X 10.6 Snow Leopard 引入的 64 位内核彻底解决了地址空间有限的问题。在 64 位内核中，内核地址空间始终被映射。Mac\
    \ OS X 分割地址空间，使得上 128 TB（！）保留给内核，而下 128 TB 属于当前运行的用户空间任务。尽管地址空间与用户空间共享，但由于页保护标志，任务无法访问内核内存。\n\
    \n虚拟内存地址可能并非始终有物理内存位置作为支撑，因为内存可能已被迁移到外部后备存储（如硬盘驱动器），这是因为它使用频率低，或者因为正在运行的进程需要超过可用量的内存。如果\
    \ CPU 访问一个地址，而该地址的内存不在驻留状态，就会产生*缺页异常*。操作系统的组件*分页器*会尝试获取包含该内存地址的页面。\n\n虚拟地址空间的第一个页面（0–4\
    \ KB）对进程不可访问，如果尝试访问将会产生异常。\n\n与架构无关的类型 `IOVirtualAddress` 可用于在 I/O Kit 代码中处理虚拟地址。该类型同样是\
    \ `mach_vm_address_t` 的别名，后者是 Mach 层中虚拟内存地址的类型。\n\n![images](img/square.jpg) **提示**\
    \ 有关虚拟内存更详细的讨论，请参阅第 1 章，有关 OS X 和 iOS 实现的详细信息，请参阅第 2 章。\n\n## 内存字节序：大端序 vs. 小端序\n\
    \n字节序指的是二进制字在内存中各部分的排列顺序。根据所使用的 CPU 架构，其排列顺序将为小端序或大端序。这种影响可以通过一个简单的 C 程序来演示，如代码清单\
    \ 6-1 所示。\n\n***代码清单 6-1.** 打印一个 32 位字的字节序*\n\n```\n#include <stdio.h>\n#include\
    \ <stdint.h>\nint main(int argc, char *argv[])\n{\n        uint32_t word = 0xaabbccdd;\n\
    \        uint8_t* ptr = (uint8_t*)&word;\n        printf(\"%02x %02x %02x %02x\\\
    n\", ptr[0], ptr[1], ptr[2], ptr[3]);\n        return 0;\n}\n```\n\n在小端序系统上执行的结果将是：\n\
    \n- - -\n\n`dd cc bb aa`\n\n- - -\n\n而在大端序系统上：\n\n- - -\n\n`aa bb cc dd`\n\n-\
    \ - -\n\n正如你所见，在小端序系统上顺序是相反的。所有当前世代的 Mac 都是小端序，因为 Intel x86/x86_64 处理器是小端序；基于\
    \ ARM 的 iOS 设备也是如此。较旧的基于 PowerPC 的 Mac 是大端序。那么你为什么还要关心大端序呢？嗯，一些硬件架构或网络协议（如 TCP/IP）使用大端序；此外，你的驱动程序或内核扩展可能需要与基于\
    \ PowerPC 架构的旧 Mac 兼容。而且，OS X 支持 *Rosetta*，它在基于 Intel 的 Mac 上模拟 PowerPC 应用程序。你的驱动程序可能会被\
    \ *Rosetta* 客户端任务访问。一些用户空间 API（例如 Carbon 文件管理器）也使用大端序数据结构。\n\nC 预处理宏 `__LITTLE_ENDIAN__`\
    \ 和 `__BIG_ENDIAN__` 由编译器定义，可用于在编译时确定字节序。\n\n## 32 位与 64 位内存寻址\n\n现代 Mac OS X\
    \ 系统现在已是 64 位。所谓 64 位，我们指的是 CPU 处理 64 位宽度地址（包括通用寄存器）的能力，以及使用 64 位数据总线和 64 位虚拟内存寻址的能力。\n\
    \n**INTEL 64 架构**\n\nIntel 64 (x86-64) 架构是传统 Intel x86 指令集的扩展，使其能够在 64 位模式下运行，并支持大量物理内存。虽然\
    \ Intel 发明了 x86 兼容处理器，但此扩展最初由 AMD 创建，并以 AMD64 的名称推向市场。Intel 随后发布了他们自己的 64 位扩展版本，最初命名为\
    \ EM64T 和 IA-32e，提供了与 AMD 解决方案的兼容性。Intel 最初押注于从零设计的 IA64 (Itanium)。IA64 摒弃了 x86\
    \ 的遗留问题。HP 和其他高性能服务器供应商（如 SGI）大力推广 IA64，但普及速度缓慢。Intel 64/AMD64 至今仍是主导架构。所有当前世代的\
    \ Mac 中都含有具备 Intel 64 能力的 CPU。一个 x86-64 处理器可以在两种模式下运行，*长模式*或*传统模式*。前者是 64 位模式，并提供兼容性，允许执行\
    \ 32 位和 16 位应用程序。操作系统必须支持 64 位才能在此模式下运行。后者是 32 位模式，用于仅支持 32 位的操作系统。\n\n表 6-1 展示了\
    \ OS X 和 iOS 所支持架构的寻址模式和原生指针大小。\n\n![images](img/t0601.jpg)\n\n由于内核可能在 32 位模式下运行，而应用程序在\
    \ 64 位模式下运行，因此当 64 位进程与内核交换数据时（例如，通过 `ioctl()` 或 `IOUserClient` 方法），必须格外小心。在运行\
    \ 64 位内核并与 32 位应用程序通信时也是如此。问题在于，32 位和 64 位编译器对数据类型的定义可能不同。例如，C 数据类型 `long` 在 32\
    \ 位程序中是 4 字节宽，而在为 64 位指令集编译的程序中则是 8 字节宽。\n"
- fmt: "### Memory Allocation\n\nThe XNU kernel provides a rich set of tools for allocating\
    \ memory. Kernel memory allocation is not as trivial and straightforward as the\
    \ `malloc()` / `free()` interface found in user space libraries. Kernel memory\
    \ allocation facilities range from high-level mechanisms analogous to the user\
    \ space `malloc()` interface to direct allocation of raw pages. There are dozens\
    \ of various functions for obtaining memory. Which one to use depends on the subsystem\
    \ you are working within—for example, Mach, BSD, or the I/O Kit—as well as the\
    \ requirements for the memory, such as size or alignment. Memory is arguably one\
    \ of the most limited resources on a computer system, especially for the iOS platform,\
    \ which has limited amounts of physical memory compared to most Mac OS X-based\
    \ computers.\n\nAt the fundamental level, the kernel keeps track of physical memory\
    \ using the structure `vm_page`. A `vm_page` structure exists for every physical\
    \ page of memory. Available pages are part of one of the following page lists:\n\
    \n- *Active List:* Contains physical pages mapped into at least one virtual address\
    \ space and have recently been used.\n- *Inactive List:* Contains pages that are\
    \ allocated but have not recently been used.\n- *Free List:* Contains unallocated\
    \ pages.\n\nGetting a free page from the free list is done with the `vm_page_grab()`\
    \ function or its higher-level interface `vm_page_alloc()`, which unlike the former,\
    \ places the page in a `vm_object` as opposed to merely removing it from the free\
    \ list. The kernel will signal the pageout daemon if it detects that the level\
    \ of free pages falls behind a threshold. In this case, the pager will evict pages\
    \ from the inactive list in a least recently used (LRU) fashion. Pages, which\
    \ are mapped from an on-disk file, are prime candidates and can simply be discarded.\
    \ The VM page cache and file system cache are combined on Mac OS X and iOS, which\
    \ avoids duplication, and are collectively referred to as the Universal Buffer\
    \ Cache (UBC). Pages originating from the file system are managed by the *vnode*\
    \ pager, while pages in the VM cache are managed by the *default* pager.\n\nThe\
    \ following sections will provide an overview of the various mechanisms for memory\
    \ allocation available to kernel developers, as well as of their use and restrictions.\n\
    \n### Low-Level Allocation Mechanisms\n\nThe kernel has several families of memory\
    \ allocation routines. Each major subsystem, such as Mach, BSD, or I/O Kit, has\
    \ their own families of functions. The VM subsystem lives in the Mach portion\
    \ of the kernel, which implements the fundamental interfaces for allocating memory.\
    \ These interfaces are in turn used to form higher-level memory allocation mechanisms\
    \ for use in other subsystems such as BSD and I/O Kit.\n\nFor working in the Mach\
    \ sections of the kernel, the `kmem_alloc*()` family of functions is used. These\
    \ functions are fairly low-level and are only a few levels away from the raw `vm_page_alloc()`\
    \ function. The following functions are available:\n\n```\nkern_return_t kmem_alloc(vm_map_t\
    \ map, vm_offset_t* addrp, vm_size_t  size);\nkern_return_t mem_alloc_aligned(vm_map_t\
    \ map, vm_offset_t* addrp, vm_size_t size);\nkern_return_t kmem_alloc_wired(vm_map_t\
    \ map, vm_offset_t* addrp, vm_size_t size);\nkern_return_t kmem_alloc_pageable(vm_map_t\
    \ map, vm_offset_t* addrp, vm_size_t size);\nkern_return_t kmem_alloc_contig(vm_map_t\
    \ map, vm_offset_t* addrp, vm_size_t size,\n                                vm_offset_t\
    \ mask, int flags);\nvoid kmem_free(vm_map_t map, vm_offset_t addr, vm_size_t\
    \ size);\n```\n\nAll the functions require you to specify a VM Map belonging to\
    \ either a user space task or `kernel_map`. All the above functions allocate wired\
    \ memory, which cannot be paged out, with the exception of `kmem_alloc_pageable()`.\n\
    \n### The Mach Zone Allocator\n\nThe Mach zone allocator is an allocation mechanism\
    \ that can allocate fixed-size blocks of memory called zones. A zone usually represents\
    \ a commonly used kernel data structure, such as a file descriptor or a task descriptor,\
    \ but can also point to blocks of memory for more general use. Examples of data\
    \ structures allocated by the zone allocator include:\n\n- file descriptors\n\
    - BSD sockets\n- tasks (`struct task`)\n- virtual memory structures (VM Maps,\
    \ VM Objects)\n\nAs a kernel programmer, you can create your own zones with the\
    \ `zinit()` function if you have a need for frequent and fast allocation and de-allocation\
    \ of data objects of the same type. To create a new zone, you need to tell the\
    \ allocator the size of the object, the maximum size of the queue, and the allocation\
    \ size, which specifies how much memory will be added when the zone is exhausted.\n\
    \n### The kalloc Family\n\nThe `kalloc` family provides a slightly higher-level\
    \ interface for fast memory allocation. The API would be familiar to those who\
    \ have used the `malloc()` interface in user space. In fact, the kernel also has\
    \ a `malloc()` function defined by the *libkern* kernel library, which again uses\
    \ memory sourced by `kalloc()`.\n\n```\nvoid* kalloc(vm_size_t size);\nvoid* kalloc_noblock(vm_size_t\
    \ size);\nvoid* kalloc_canblock(vm_size_t size, boolean_t canblock);\nvoid* krealloc(void**\
    \ addrp, vm_size_t old_size, vm_size_t new_size);\nvoid kfree(void *data, vm_size_t\
    \ size);\n```\n\nMemory for the `kalloc` family of functions is obtained via the\
    \ Mach zone allocator discussed in the previous section. Larger memory allocations\
    \ are handled by `kmem_alloc()` function. Because memory can come from two sources,\
    \ the `kfree()` function needs to know the size of the original allocation to\
    \ determine its origin and to free the memory in the appropriate place. The `kalloc`\
    \ family provides the API upon which fundamental memory functions in I/O Kit and\
    \ the BSD layer are built. It is also the function used to provide memory for\
    \ the C++ `new` and `new[]` operators for memory allocation.\n\nThe `kalloc` functions\
    \ and variants, except `kalloc_noblock()`, may block (sleep) to obtain memory.\
    \ The same is true for the `kfree()` function. Therefore, you must use `kalloc_noblock()`\
    \ if you need memory in an interrupt context or while holding a simple lock.\n\
    \nThe available zones can be queried; following is the trimmed output of the `zprint`\
    \ command showing the zones used by the `kalloc` functions.\n\n```\n         \
    \             elem   cur      max    cur      max    cur    alloc    alloc\nzone\
    \ name             size   size    size   #elts    #elts   inuse   size    count\n\
    -----------------------------------------------------------------------------------\n\
    kalloc.16               16    660K    922K   42240   59049   30284    4K     256\
    \ C\nkalloc.32               32   3356K   4920K  107392  157464   73407    4K\
    \     128 C\nkalloc.64               64   4792K   6561K   76672  104976   75837\
    \    4K      64 C\nkalloc.128             128   2732K   3888K   21856   31104\
    \   20571    4K      32 C\nkalloc.256             256   4248K   5184K   16992\
    \   20736   15950    4K      16 C\nkalloc.512             512    968K   1152K\
    \    1936    2304    1870    4K       8 C\nkalloc.1024           1024    784K\
    \   1024K     784    1024     735    4K       4 C\nkalloc.2048           2048\
    \   3396K   4608K    1698    2304    1586    4K       2 C\nkalloc.4096       \
    \    4096   2204K   4096K     551    1024     508    4K       1 C\nkalloc.8192\
    \           8192   3160K  32768K     395    4096     383    8K       1 C\nkalloc.large\
    \         41375   5697K   6743K     141     166     141   40K       1 C\n```\n\
    \nThere is one zone for each size up to 8 KB. Allocations smaller than 8 KB return\
    \ an element from the smallest matching zone. It is not possible to partially\
    \ allocate an element, so, for example, if you need 5000 bytes of memory, you\
    \ will actually be allocated 8192 bytes (3192 bytes wasted per allocation!). Allocations\
    \ greater than 8 KB are handled by the appropriate `kmem_alloc()` function instead\
    \ of the zone allocator, but are nevertheless recorded in the virtual zone *kalloc.large*."
  raw: '### Memory Allocation


    The XNU kernel provides a rich set of tools for allocating memory. Kernel memory
    allocation is not as trivial and straightforward as the `malloc()` / `free()`
    interface found in user space libraries. Kernel memory allocation facilities range
    from high-level mechanisms analogous to the user space `malloc()` interface to
    direct allocation of raw pages. There are dozens of various functions for obtaining
    memory. Which one to use depends on the subsystem you are working within—for example,
    Mach, BSD, or the I/O Kit—as well as the requirements for the memory, such as
    size or alignment. Memory is arguably one of the most limited resources on a computer
    system, especially for the iOS platform, which has limited amounts of physical
    memory compared to most Mac OS X-based computers.


    At the fundamental level, the kernel keeps track of physical memory using the
    structure `vm_page`. A `vm_page` structure exists for every physical page of memory.
    Available pages are part of one of the following page lists:


    *   *Active List:* Contains physical pages mapped into at least one virtual address
    space and have recently been used.

    *   *Inactive List:* Contains pages that are allocated but have not recently been
    used.

    *   *Free List:* Contains unallocated pages.


    Getting a free page from the free list is done with the `vm_page_grab()` function
    or its higher-level interface `vm_page_alloc()`, which unlike the former, places
    the page in a `vm_object` as opposed to merely removing it from the free list.
    The kernel will signal the pageout daemon if it detects that the level of free
    pages falls behind a threshold. In this case, the pager will evict pages from
    the inactive list in a least recently used (LRU) fashion. Pages, which are mapped
    from an on-disk file, are prime candidates and can simply be discarded. The VM
    page cache and file system cache are combined on Mac OS X and iOS, which avoids
    duplication, and are collectively referred to as the Universal Buffer Cache (UBC).
    Pages originating from the file system are managed by the *vnode* pager, while
    pages in the VM cache are managed by the *default* pager.


    The following sections will provide an overview of the various mechanisms for
    memory allocation available to kernel developers, as well as of their use and
    restrictions.


    #### Low-Level Allocation Mechanisms


    The kernel has several families of memory allocation routines. Each major subsystem,
    such as Mach, BSD, or I/O Kit, has their own families of functions. The VM subsystem
    lives in the Mach portion of the kernel, which implements the fundamental interfaces
    for allocating memory. These interfaces are in turn used to form higher-level
    memory allocation mechanisms for use in other subsystems such as BSD and I/O Kit.


    For working in the Mach sections of the kernel, the `kmem_alloc*()` family of
    functions is used. These functions are fairly low-level and are only a few levels
    away from the raw `vm_page_alloc()` function. The following functions are available:


    `kern_return_t kmem_alloc(vm_map_t map, vm_offset_t* addrp, vm_size_t  size);`

    `kern_return_t mem_alloc_aligned(vm_map_t map, vm_offset_t* addrp, vm_size_t size);`

    `kern_return_t kmem_alloc_wired(vm_map_t map, vm_offset_t* addrp, vm_size_t size);`

    `kern_return_t kmem_alloc_pageable(vm_map_t map, vm_offset_t* addrp, vm_size_t
    size);`

    `kern_return_t kmem_alloc_contig(vm_map_t map, vm_offset_t* addrp, vm_size_t size,`

    `                                vm_offset_t mask, int flags);`

    `void kmem_free(vm_map_t map, vm_offset_t addr, vm_size_t size);`


    All the functions require you to specify a VM Map belonging to either a user space
    task or `kernel_map`. All the above functions allocate wired memory, which cannot
    be paged out, with the exception of `kmem_alloc_pageable().`


    #### The Mach Zone Allocator


    The Mach zone allocator is an allocation mechanism that can allocate fixed-size
    blocks of memory called zones. A zone usually represents a commonly used kernel
    data structure, such as a file descriptor or a task descriptor, but can also point
    to blocks of memory for more general use. Examples of data structures allocated
    by the zone allocator include:


    *   file descriptors

    *   BSD sockets

    *   tasks (`struct task`)

    *   virtual memory structures (VM Maps, VM Objects)


    As a kernel programmer, you can create your own zones with the `zinit()` function
    if you have a need for frequent and fast allocation and de-allocation of data
    objects of the same type. To create a new zone, you need to tell the allocator
    the size of the object, the maximum size of the queue, and the allocation size,
    which specifies how much memory will be added when the zone is exhausted.


    #### The kalloc Family


    The `kalloc` family provides a slightly higher-level interface for fast memory
    allocation. The API would be familiar to those who have used the `malloc()` interface
    in user space. In fact, the kernel also has a `malloc()` function defined by the
    *libkern* kernel library, which again uses memory sourced by `kalloc()`.


    `void* kalloc(vm_size_t size);`

    `void* kalloc_noblock(vm_size_t size);`

    `void* kalloc_canblock(vm_size_t size, boolean_t canblock);`

    `void* krealloc(void** addrp, vm_size_t old_size, vm_size_t new_size);`

    `void kfree(void *data, vm_size_t size);`


    Memory for the `kalloc` family of functions is obtained via the Mach zone allocator
    discussed in the previous section. Larger memory allocations are handled by `kmem_alloc()`
    function. Because memory can come from two sources, the `kfree()` function needs
    to know the size of the original allocation to determine its origin and to free
    the memory in the appropriate place. The `kalloc` family provides the API upon
    which fundamental memory functions in I/O Kit and the BSD layer are built. It
    is also the function used to provide memory for the C++ `new` and `new[]` operators
    for memory allocation.


    The `kalloc` functions and variants, except `kalloc_noblock()`, may block (sleep)
    to obtain memory. The same is true for the `kfree()` function. Therefore, you
    must use `kalloc_noblock()` if you need memory in an interrupt context or while
    holding a simple lock.


    The available zones can be queried; following is the trimmed output of the `zprint`
    command showing the zones used by the `kalloc` functions.


    `                      elem   cur      max    cur      max    cur    alloc    alloc`

    `zone name             size   size    size   #elts    #elts   inuse   size    count`

    `-----------------------------------------------------------------------------------`

    `kalloc.16               16    660K    922K   42240   59049   30284    4K     256
    C`

    `kalloc.32               32   3356K   4920K  107392  157464   73407    4K     128
    C`

    `kalloc.64               64   4792K   6561K   76672  104976   75837    4K      64
    C`

    `kalloc.128             128   2732K   3888K   21856   31104   20571    4K      32
    C`

    `kalloc.256             256   4248K   5184K   16992   20736   15950    4K      16
    C`

    `kalloc.512             512    968K   1152K    1936    2304    1870    4K       8
    C`

    `kalloc.1024           1024    784K   1024K     784    1024     735    4K       4
    C`

    `kalloc.2048           2048   3396K   4608K    1698    2304    1586    4K       2
    C`

    `kalloc.4096           4096   2204K   4096K     551    1024     508    4K       1
    C`

    `kalloc.8192           8192   3160K  32768K     395    4096     383    8K       1
    C`

    `kalloc.large         41375   5697K   6743K     141     166     141   40K       1
    C`


    There is one zone for each size up to 8 KB. Allocations smaller than 8 KB return
    an element from the smallest matching zone. It is not possible to partially allocate
    an element, so, for example, if you need 5000 bytes of memory, you will actually
    be allocated 8192 bytes (3192 bytes wasted per allocation!). Allocations greater
    than 8 KB are handled by the appropriate `kmem_alloc()` function instead of the
    zone allocator, but are nevertheless recorded in the virtual zone *kalloc.large*.'
  trans: "\n### 内存分配\n\nXNU 内核提供了一组丰富的工具用于分配内存。内核内存分配并不像用户空间库中的 `malloc()` / `free()`\
    \ 接口那样简单直接。内核内存分配设施涵盖的范围从类似于用户空间 `malloc()` 接口的高级机制，到原始页面的直接分配。有几十种不同的函数可用于获取内存。具体使用哪一个取决于你工作的子系统——例如，Mach、BSD\
    \ 或 I/O Kit——以及内存的需求，例如大小或对齐方式。可以说，内存是计算机系统上最有限的资源之一，尤其是对于 iOS 平台而言，与大多数基于 Mac\
    \ OS X 的计算机相比，其物理内存数量有限。\n\n在基本层面上，内核使用 `vm_page` 结构来跟踪物理内存。每个物理内存页面都存在一个 `vm_page`\
    \ 结构。可用的页面是以下页面列表之一的一部分：\n\n-   **活跃列表：** 包含映射到至少一个虚拟地址空间并且最近被使用过的物理页面。\n-   **非活跃列表：**\
    \ 包含已分配但最近未被使用的页面。\n-   **空闲列表：** 包含未分配的页面。\n\n从空闲列表中获取一个空闲页面是通过 `vm_page_grab()`\
    \ 函数或其更高级的接口 `vm_page_alloc()` 完成的。与前者不同，后者将页面放入一个 `vm_object` 中，而不仅仅是将其从空闲列表中移除。如果内核检测到空闲页面数量低于某个阈值，它将通知页面换出守护进程。在这种情况下，分页器将以最近最少使用（LRU）的方式从非活跃列表中驱逐页面。那些从磁盘文件映射而来的页面是首要候选对象，并且可以被简单地丢弃。在\
    \ Mac OS X 和 iOS 上，VM 页面缓存和文件系统缓存是合并在一起的，这避免了重复，它们被统称为通用缓冲区缓存（UBC）。源自文件系统的页面由\
    \ *vnode* 分页器管理，而 VM 缓存中的页面则由 *default* 分页器管理。\n\n以下各节将概述内核开发人员可用的各种内存分配机制，以及它们的使用方法和限制。\n\
    \n### 底层分配机制\n\n内核有几族内存分配例程。每个主要子系统，例如 Mach、BSD 或 I/O Kit，都有自己的函数族。VM 子系统位于内核的\
    \ Mach 部分，它实现了用于分配内存的基本接口。这些接口又反过来用于形成更高级别的内存分配机制，供 BSD 和 I/O Kit 等其他子系统使用。\n\n\
    对于在内核的 Mach 部分工作，使用 `kmem_alloc*()` 函数族。这些函数是相当底层的，距离原始的 `vm_page_alloc()` 函数仅有几层之遥。可用的函数如下：\n\
    \n```\nkern_return_t kmem_alloc(vm_map_t map, vm_offset_t* addrp, vm_size_t  size);\n\
    kern_return_t mem_alloc_aligned(vm_map_t map, vm_offset_t* addrp, vm_size_t size);\n\
    kern_return_t kmem_alloc_wired(vm_map_t map, vm_offset_t* addrp, vm_size_t size);\n\
    kern_return_t kmem_alloc_pageable(vm_map_t map, vm_offset_t* addrp, vm_size_t\
    \ size);\nkern_return_t kmem_alloc_contig(vm_map_t map, vm_offset_t* addrp, vm_size_t\
    \ size,\n                                vm_offset_t mask, int flags);\nvoid kmem_free(vm_map_t\
    \ map, vm_offset_t addr, vm_size_t size);\n```\n\n所有函数都要求你指定一个属于用户空间任务或 `kernel_map`\
    \ 的 VM Map。除 `kmem_alloc_pageable()` 之外，上述所有函数都分配不可换出的线内（wired）内存。\n\n### Mach\
    \ 区域分配器\n\nMach 区域分配器是一种分配机制，可以分配固定大小的内存块，这些内存块被称为区域。一个区域通常代表一个常用的内核数据结构，例如文件描述符或任务描述符，但也可以指向用于更通用目的的内存块。由区域分配器分配的数据结构示例包括：\n\
    \n-   文件描述符\n-   BSD 套接字\n-   任务（`struct task`）\n-   虚拟内存结构（VM Map、VM Object）\n\
    \n作为一名内核程序员，如果你需要频繁且快速地分配和释放相同类型的数据对象，你可以使用 `zinit()` 函数创建你自己的区域。要创建一个新区域，你需要告诉分配器对象的大小、队列的最大大小以及分配大小，该大小指定了当区域耗尽时将添加多少内存。\n\
    \n### kalloc 族\n\n`kalloc` 族为快速内存分配提供了一个稍高级别的接口。那些使用过用户空间 `malloc()` 接口的人会熟悉这个\
    \ API。事实上，内核也有一个由 *libkern* 内核库定义的 `malloc()` 函数，该函数同样使用由 `kalloc()` 提供的内存。\n\n\
    ```\nvoid* kalloc(vm_size_t size);\nvoid* kalloc_noblock(vm_size_t size);\nvoid*\
    \ kalloc_canblock(vm_size_t size, boolean_t canblock);\nvoid* krealloc(void**\
    \ addrp, vm_size_t old_size, vm_size_t new_size);\nvoid kfree(void *data, vm_size_t\
    \ size);\n```\n\n`kalloc` 族函数的内存是通过上一节讨论的 Mach 区域分配器获取的。更大的内存分配由 `kmem_alloc()`\
    \ 函数处理。由于内存可能来自两个来源，`kfree()` 函数需要知道原始分配的大小以确定其来源，并在正确的位置释放内存。`kalloc` 族提供了构成\
    \ I/O Kit 和 BSD 层中基本内存函数基础的 API。它也是用于为 C++ 的 `new` 和 `new[]` 运算符提供内存分配的函数。\n\n\
    `kalloc` 函数及其变体，除了 `kalloc_noblock()`，可能会阻塞（休眠）以获取内存。`kfree()` 函数也是如此。因此，如果你需要在中断上下文或持有简单锁时获取内存，则必须使用\
    \ `kalloc_noblock()`。\n\n可以查询可用的区域；以下是 `zprint` 命令的输出片段，显示了 `kalloc` 函数使用的区域。\n\
    \n```\n                      elem   cur      max    cur      max    cur    alloc\
    \    alloc\nzone name             size   size    size   #elts    #elts   inuse\
    \   size    count\n-----------------------------------------------------------------------------------\n\
    kalloc.16               16    660K    922K   42240   59049   30284    4K     256\
    \ C\nkalloc.32               32   3356K   4920K  107392  157464   73407    4K\
    \     128 C\nkalloc.64               64   4792K   6561K   76672  104976   75837\
    \    4K      64 C\nkalloc.128             128   2732K   3888K   21856   31104\
    \   20571    4K      32 C\nkalloc.256             256   4248K   5184K   16992\
    \   20736   15950    4K      16 C\nkalloc.512             512    968K   1152K\
    \    1936    2304    1870    4K       8 C\nkalloc.1024           1024    784K\
    \   1024K     784    1024     735    4K       4 C\nkalloc.2048           2048\
    \   3396K   4608K    1698    2304    1586    4K       2 C\nkalloc.4096       \
    \    4096   2204K   4096K     551    1024     508    4K       1 C\nkalloc.8192\
    \           8192   3160K  32768K     395    4096     383    8K       1 C\nkalloc.large\
    \         41375   5697K   6743K     141     166     141   40K       1 C\n```\n\
    \n每个大小直到 8KB 都有一个对应的区域。小于 8KB 的分配会从最小匹配区域返回一个元素。不能部分分配一个元素，所以，例如，如果你需要 5000 字节的内存，你实际上会被分配\
    \ 8192 字节（每次分配浪费 3192 字节！）。大于 8KB 的分配由相应的 `kmem_alloc()` 函数处理，而不是区域分配器，但仍然记录在虚拟区域\
    \ *kalloc.large* 中。\n"
- fmt: '#### Memory Allocation in BSD


    Memory allocation in the BSD subsystem is implemented by the following functions
    and macros:


    `#define MALLOC(space, cast, size, type, flags) (space) = (cast)_MALLOC(size,
    type, flags)`

    `#define FREE(addr, type) _FREE((void *)addr, type)`

    `#define MALLOC_ZONE(space, cast, size, type, flags) (space) = (cast)_MALLOC_ZONE(size,
    type, flags)`

    `#define FREE_ZONE(addr, size, type) _FREE_ZONE((void *)addr, size, type)`


    `void* _MALLOC(size_t size, int type, int flags);`

    `void _FREE(void *addr, int type);`

    `void* _MALLOC_ZONE(size_t size, int type, int flags);`

    `void _FREE_ZONE(void *elem, size_t size, int type);`


    Under the hood, the `_MALLOC()` function allocates memory using some variant of
    `kalloc()`, depending on the flags that are passed; for example, if non-blocking
    allocation is required, (`M_NOWAIT`) `kalloc_noblock()` is called. The `_MALLOC_ZONE()`
    function invokes the zone allocator directly instead of indirectly through `kalloc()`.
    Instead of using the general purpose `kalloc.X` zones, it allows you to access
    zones of commonly used object types, such as file descriptors, network sockets,
    or `mbuf` descriptors, used by the networking subsystem. The `type` argument is
    used to determine which zone to access. Although `_MALLOC()` also takes a `type`
    argument, it is ignored, except to check that the value is less than the maximum
    allowed. There are over a hundred different types defined. The flags parameter
    can be one of the following:


    `#define M_WAITOK 0x0000`

    `#define M_NOWAIT 0x0001`

    `#define M_ZERO 0x0004 /* bzero the allocation */`


    ![images](images/square.jpg) **Tip** `MALLOC` family of functions, along with
    zone types, are defined in `sys/malloc.h`.


    The `M_ZERO` flag, if specified, will use the `bzero()` function to overwrite
    the memory with zeros before the memory is returned to the caller. If not, the
    memory will still have the contents written there by the last user or will contain
    random garbage if never used.


    #### I/O Kit Memory Allocation


    The I/O Kit provides a full set of functions for memory allocation. All the following
    functions return kernel virtual addresses, which can be accessed directly:


    `void* IOMalloc(vm_size_t size);`

    `void* IOMallocAligned(vm_size_t size, vm_size_t alignment);`

    `void* IOMallocPageable(vm_size_t size, vm_size_t alignment);`


    The corresponding functions for freeing memory are as follows.


    `void IOFree(void* address, vm_size_t size);`

    `void IOFreeAligned(vm_size_t size);`

    `void IOFreePageable(void* address, vm_size_t size);`


    The first function, `IOMalloc()`, is a wrapper for `kalloc()` and is subject to
    the same restrictions. Specifically, it cannot be used in an atomic context, such
    as a primary interrupt handler, as it may block (sleep) to obtain memory. Nor
    can `IOMalloc()` be used if aligned memory is required, as no guarantees are made.
    `IOFree()` is a wrapper for the `kfree()` function and may also block (sleep).
    It is also possible to deadlock the system if you call either `IOMalloc()` or
    `IOFree()` while holding a simple lock, such as `OSSpinLock`, as the thread may
    be preempted if either function sleeps. It could cause a deadlock if an interrupt
    handler attempted to claim the same lock. Furthermore, memory from `IOMalloc()`
    is intended for small and fast allocations and is not suitable for mapping into
    user space. Because the memory reserved for `IOMalloc()` comes from a small fixed-size
    pool, excessive use of `IOMalloc()` can drain this pool and panic the kernel if
    the pool is exhausted.


    ![images](images/square.jpg) **Caution** It is a bug to free memory allocated
    by, for example, `IOMallocAligned()` with `IOFree()`. Always use the free function
    corresponding to the original allocation function. Even if it works now (by accident),
    the mechanism could change in a future update and cause a crash.


    `IOMallocAligned()` is subject to the same restrictions as `IOMalloc()`, but unlike
    `IOMalloc()`, it will return memory addresses aligned to a specific value. For
    example, if you need page-aligned memory you can pass in 4096 to get an address
    aligned to the beginning of a page. Following are some reasons for requesting
    aligned memory.


    * Hardware cannot access memory that is not aligned to a specific boundary, or
    it does so slowly.

    * Memory used in vector computation may be excessively slow from addresses not
    aligned to a specific byte boundary (typically 16 bytes for SSE).

    * Memory will be used for mapping into a user space process. Since mapping is
    only possible for whole pages, you may wish to ensure the buffer starts on a page
    boundary.

    * You want a data structure that is friendly to the CPU cache.


    `IOMallocPageable()` allocates memory that can be paged, unlike the other variants,
    which always create memory that is wired and cannot be paged out. The restrictions
    that apply to `IOMalloc()` and `IOMallocAligned()` are also valid for `IOMallocPageable()`.
    Memory obtained by it cannot be used for device I/O such as DMA or in a code path
    that is not able to block/sleep without it being wired down first.


    There is also a last variant, `IOMallocContiguous()`, that allocates memory that
    is physically contiguous. Its use is now deprecated. Apple recommends using `IOBufferMemoryDescriptor`
    instead.


    Each of the memory allocation functions has a corresponding function to free the
    memory. It is important to call the right free function that matches the function
    you used for allocating the memory. Each of the variants source memory from different
    low-level mechanisms, hence they are not interchangeable. In fact, `IOMalloc()`
    may source its memory from more than one source. Larger allocations (>8 KB) may
    be allocated with `kmem_alloc()`; however, smaller allocations come from the *zone
    allocator*.


    This happens to be the reason why you must pass in the size of the original allocation
    to the `IOFree*()` functions, as it is used to determine where the memory came
    from.


    #### Allocating Memory with the C++ New Operator


    The libkern library implements a basic C++ runtime, upon which I/O Kit is built.
    Memory allocation in C++ is typically done with the `new` and `new[]` operators
    for single objects and arrays, respectively. In libkern, the `new` operator is
    implemented internally by calling `kalloc()` to obtain memory. Because `kfree()`
    requires the size of the original allocation, libkern modifies the size passed
    to the new operator to include space for a small structure that can hold the size
    of the allocation, so that when the `delete` operator calls `kfree()`, it can
    retrieve the size in the four bytes preceding the address returned by `new`.


    Memory allocated by `new` or `new[]` is always zeroed out, unlike most implementations
    of these operators in user space.


    ![images](images/square.jpg) **Tip** The implementation of the `new`, `new[]`,
    `delete`, `delete[]` operators can be found in the XNU source distribution under
    `libkern/c++/OSRuntime.cpp`.'
