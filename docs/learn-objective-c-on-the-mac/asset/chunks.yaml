    ## `NSError`


    现在您知道，Cocoa中的异常通常不用于流程控制，而是主要用于指出bug。如今使用的一些其他语言和框架，会将异常用于各类非bug，但可能是开发者无法直接控制条件的副作用，例如尝试访问文件时的文件相关错误，或尝试从套接字读取数据时的网络错误。在Cocoa中，这类情况通常使用一个名为`NSError`的类来处理。在本节中，我们将学习`NSError`对象的内容、导致其创建的情况以及如何在代码中处理它，包括赋予应用程序重试某些触发错误的操作的能力。


    ### 域和代码


    传统上，每个操作系统都有自己的系统错误报告方式，通常提供一个整数值，我们可以将其与头文件中的预定义列表进行比较，以确定如何应对。例如，在基于UNIX的系统中，我们可以在每次系统调用（包括打开文件、读取文件、写入文件等函数）后检查`errno`的值（`errno`是一个全局变量，或一个调用函数的符号，这取决于我们在此不展开讨论的多个因素）。其理念是，如果任何系统函数遇到问题，它会将一个整数值放入`errno`，以告知我们错误的性质。


    在“经典Mac OS”编程（OS X之前的所有产品）中，情况略有不同。许多系统函数不填充全局变量，而是返回一个`OSStatus`类型，这同样归结为一个整数，我们应在每次调用函数后检查它，以确保没有发生意外。


    OS X是一种混合操作系统。其底层深深植根于UNIX，并且如您所知，它包含了构成Cocoa的所有Objective-C框架。它还包含Carbon，这是一套从旧版Mac
    OS改编而来的大型API和技术。此外，还有为OS X和iOS完全用C编写的现代API。每个“世界”都包含一个或多个需要用某种方式报告错误代码的函数或方法，并且由于这些世界是分别发展的，错误代码集之间当然存在一些重叠。在某个时候，Apple意识到用统一方式处理来自这些不同世界的错误消息可能有益，让它们各自继续使用它们一直使用的相同错误代码（确保与现有软件的二进制兼容性），同时通过用字符串为每个错误标记其域来避免混淆风险。


    这正是我们在`NSError`类中拥有的内容，它基本上将系统级错误代码封装在一个Objective-C对象中。每个`NSError`实例都有一个`NSString`来指定其“域”的名称（通常，它来自哪个库或框架），一个整数来指定相关的错误代码，以及一个可选的`NSDictionary`，其中可以包含关于该错误的附加信息。由于这些是普通的Objective-C对象，它们可以像任何其他对象一样被处理：传递、放入`NSArray`等。


    Cocoa包含一些预定义的字符串常量，用于对Cocoa框架中`NSError`对象的主要来源进行分类。作为Cocoa程序员，您最可能遇到的域如下：


    * `NSPOSIXErrorDomain`：UNIX错误（属于POSIX标准一部分的错误）。

    * `NSOSStatusErrorDomain`：来自Carbon函数的错误（这些函数通常返回`OSStatus`）。

    * `NSCocoaErrorDomain`：直接来自Cocoa自身类的错误。


    每当一个Cocoa方法给我们一个`NSError`时，它的域很可能是这些之一。如果您开始在代码中创建自己的`NSError`实例，您可能希望定义自己的域和错误代码，以便在应用程序中更容易处理它们。


    每个预定义的错误域都有一个相关的错误代码列表，定义在一个或多个头文件中。适用于`NSPOSIXErrorDomain`的错误代码在`errno.h`中。`NSOSStatusErrorDomain`的错误代码在`MacErrors.h`中；`NSCocoaErrorDomain`使用的错误代码包含在`FoundationErrors.h`、`AppKitErrors.h`和`CoreDataErrors.h`中。在Xcode中，通过调出“快速打开”窗口（![images](images/arrow7.jpg)
    O）并输入文件名，可以轻松找到这些头文件。


    ### 识别错误


    现在我们了解了`NSError`类的一些知识。但是，`NSError`实例从哪里来，以及它们在应用程序运行时如何影响应用程序？与异常不同，`NSError`对象不会对代码流程做出任何改变。通常，`NSError`实例通过方法调用返回给我们，不是作为返回值，而是通过引用我们传入的一个指针。这种参数弄巧成拙的方式在C中并不罕见，但在Objective-C中相当不常见。其理念是，一个容易出错的方法应该接收一个指向`NSError`指针的指针作为参数。这意味着我们不传入一个指向`NSError`的指针，而是一个指向指针的指针（我们指针的地址），以便接收方法可以创建一个`NSError`实例并将我们的指针指向它！（这听起来可能令人困惑，但一旦您看到这个模式，事情就会变得清晰。）'
  raw: '%@", object); } ```    Then add a `[self freedObject];` line to the `applicationDidFinishLaunching:`
    method, run the app, and see what happens. The program will halt and show something
    like that in [Figure 13-7](#9781430245421_Ch13.xhtml#Fig7).    ![9781430245421_Fig13-07.jpg](images/9781430245421_Fig13-07.jpg)    [Figure
    13-7](#9781430245421_Ch13.xhtml#_Fig7) .  The green bar shows the spot where the
    program halted. This isn’t very helpful! Good thing we have other stack frames
    to look at, too    As with the previous signal-generating bug, the program may
    receive a different signal than the one shown here, but it’ll certainly receive
    something, and if we look in the call stack for the uppermost stack frame containing
    our code, we’ll see that it contains both our `freedObject` method and the `NSLog`
    function that it was calling.    The way to fix this is, as with the previous
    case, a matter of self-discipline: any time we send an object a `release` or `autorelease`
    message, if we still have a pointer to that object in a variable, immediately
    point that variable at `nil`! Sending `release` or `autorelease` may not always
    immediately cause the object to be freed (since some other code may have increased
    its retain count as well), but locally within each method, we should consider
    anything we’ve released to be off-limits, and get rid of any dangling pointers
    to it as soon as we can.    In this case, the solution is to follow up the `[object
    release];` line with this:    ``` object = nil; ```    Add that line, run the
    app again, and we’re back to smooth sailing! Again, this type of bug can really
    only occur if we’re not using ARC. And, apart from this relatively simple rule
    of thumb about setting pointers to `nil` after releasing objects, there are other
    ways that a non-ARC app can wind up in similar situations, such as forgetting
    to retain an object that we want to use for a while. These bugs can be some of
    the trickiest to track down, which is one of the strongest reasons for using ARC
    wherever possible.    Before moving on, we need to re-enable ARC in our project.
    Once again, select the top-level project item in the project navigator, find the
    *Objective-C Automatic Reference Counting* item in the *Build Settings* tab, and
    turn it on. We’ll also need to delete the `[object release];` line from the `freedObject`
    method in the app delegate, since ARC doesn’t let us call release explicitly.    NSError    Now
    you know that exceptions in Cocoa aren’t typically used for flow control, instead
    being used primarily to point out bugs. Some other languages and frameworks in
    use today use exceptions for all sorts of things that aren’t bugs but can be side
    effects of conditions outside the developer’s direct control, such as file-related
    errors when trying to access a file, or network errors when trying to read data
    from a socket. In Cocoa, these types of situations are handled more often using
    a class called `NSError`. In this section, we’ll learn about the content of an
    `NSError` object, what kinds of situations lead to its creation, and how to deal
    with it in our code, including giving our application the ability to retry certain
    kinds of error-triggering operations.    Domains and Codes    Traditionally, every
    operating system has its own ways of reporting system errors, typically providing
    an integer value that we can compare with a predefined list in a header file to
    determine what to do. In UNIX-based systems, for example, we can (in fact, *should*)
    examine the value of `errno` (which is either a global variable, or a symbol that
    calls a function, depending on a number of factors we won’t get into here) after
    every system call, including functions to open a file, read from a file, write
    to a file, and the like. The idea is that if any system function encounters a
    problem, it will put an integer into `errno` to let us know the nature of the
    error.


    In “classic Mac OS” programming (everything predating OS X), things were a bit
    different. Instead of populating a global variable, many system functions have
    a return type of `OSStatus`, which again boils down to an integer that we should
    check after calling each function to make sure nothing unexpected happened.    OS
    X is sort of a hybrid OS. Its underpinnings are firmly rooted in UNIX, and, as
    you know, it contains all of the Objective-C frameworks that make up Cocoa. It
    also includes Carbon, a large set of APIs and technologies adapted from older
    versions of Mac OS. Furthermore, there are modern APIs written entirely in C for
    both OS X and iOS. Each of these “worlds” contains functions and/or methods that
    need to report back error codes in one way or another, and since these worlds
    developed in a separate fashion, of course there is some overlap between the sets
    of error codes. At some point, Apple realized that there could be some benefit
    to dealing with error messages from these different worlds in a common way, letting
    each of them continue to use the same error codes they always have (ensuring binary
    compatibility with existing software) without any risk of confusion by tagging
    each error with a string specifying its domain.    And that’s what we have in
    the `NSError` class, which basically wraps a system-level error code in an Objective-C
    object. Each `NSError` instance has an `NSString` to specify the name of its “domain”
    (generically, which library or framework it came from), an integer to specify
    the relevant error code, and an optional `NSDictionary` that can contain additional
    information about the error. Because these are normal Objective-C objects, they
    can be dealt with like any other object: passed around, put into an `NSArray`,
    and so on.    Cocoa includes some predefined string constants to categorize the
    main sources of `NSError` objects in the Cocoa frameworks themselves. The domains
    you’re most likely to encounter as a Cocoa programmer are the following:    *   NSPOSIXErrorDomain:
    UNIX errors (those that are part of the POSIX standard). *   NSOSStatusErrorDomain:
    Errors from Carbon functions (which typically return an OSStatus). *   NSCocoaErrorDomain:
    Errors arising directly within Cocoa’s own classes.    Whenever a Cocoa method
    gives us an `NSError`, its domain will likely be one of these. If you start creating
    your own `NSError` instances in your code, you’ll probably want to define your
    own domains and error codes in order to make it easier for you to handle them
    in your application.    Each of the predefined error domains also has an associated
    list of error codes, defined in one or more header files. The error codes applicable
    to `NSPOSIXErrorDomain` are found in *errno.h*. Those for `NSOSStatusErrorDomain`
    are in *MacErrors.h*; and the error codes in use for the `NSCocoaErrorDomain`
    are contained in *FoundationErrors.h*, *AppKitErrors.h*, and *CoreDataErrors.h*.
    Each of these headers can be found easily in Xcode by bringing up the *Open Quickly*
    window (![images](images/arrow7.jpg)O) and typing the name of the file.    Recognizing
    an Error    So now we know a little bit about the `NSError` class. But, where
    do `NSError` instances come from, and how do they affect our application while
    it’s running? Unlike exceptions, `NSError` objects don’t do anything to change
    the flow of our code. Typically, an `NSError` instance is returned to us from
    a method call, not as the return value but by referencing a pointer we pass in.
    This form of parameter twiddling is not too uncommon in C, but fairly unusual
    in Objective-C. The idea is that an error-prone method should receive as a parameter
    a pointer to an `NSError` pointer. This means we don’t pass in a pointer to an
    `NSError`, but rather a pointer to a pointer (the address of our pointer) so that
    the receiving method can create an `NSError` instance and assign our pointer to
    it! (This may sound confusing, but once you see the pattern, things should clear
    up.'
