    此时，我们将其重置为指向当前最后一个对象。接下来，第 4 节检查`selectedRow`是否为 0 或更高。这个检查很重要，因为第 3 节确实有可能将其设置为-1！想象一下这种情况：数组中只有一个对象，然后点击“移除”按钮：起初`selectedRow`为
    0（数组中唯一行的索引），但经过第 3 节后它将变为-1，第 4 节通过直接跳过方法剩余部分来处理这种情况。最后，第 5 节取消表格视图中的所有选中项，然后选中当前需要选择的行，最后根据当前选择更新所有视图。这看起来可能不明显，但先取消选中表格视图中的所有行很重要，否则`tableViewSelectionDidChange:`委托方法可能不会被总是调用（因为删除一行后，选中的行索引通常还是同一个数字，而表格视图无法知道我们已经从内容数组中删除了一个对象，导致该行索引现在指向了不同的对象）。


    现在编译并运行应用程序；我们可以删除选中的反派，并且控件中的值将随之更新以匹配新的选中项。我们只剩下最后一个功能要实现。用户还不能直接在表格视图中编辑值。现在就来解决这个问题。


    ## 在表格视图中编辑


    用户应该能够编辑反派的名字，或将新的头像拖拽到表格视图中的任意行，并更新相应的反派。由于表格视图的列是`NSViews`，表格视图中的每个单元格都可以在 Interface
    Builder 中指定目标和动作；表格视图内部的用户界面元素与其他视图的工作方式完全相同。当用户在表格视图中编辑值时，该动作可以连接到我们的代码，通知我们发生了更改。限制在于目标必须是表格视图的委托，但这对本应用程序来说不是问题。此外，我们现有的`takeName:`和`takeMugshot:`方法仍然可用，但需要做一些小的调整。这些方法针对选中的反派进行操作，但如果用户没有选中行（即选中反派），就无法在表格视图中编辑值。然而，这些方法目前只期望从详细信息视图中的控件调用，但现在我们增加了从多个位置进行设置的能力。对于本应用，我们将只允许在行内编辑名字和头像，并禁止编辑最后出现日期。


    还有一个小障碍需要解决。默认情况下，表格视图单元格是不可编辑的。在 Xcode 中可以轻松更改此设置。


    要建立连接，我们需要从每个列中的视图按住 Control 键拖拽到`VillianTrackerAppDelegate`实例。但是，表格视图单元格嵌套在窗口视图层次结构的较深层，因此我们将采用另一种方式来建立连接，这样更易于找到正确的用户界面组件。


    回到 Xcode，打开`MainMenu.xib`文件，该文件将在 Interface Builder 画布中打开。点击屏幕左下角的小展开三角形，这将把屏幕左侧的对象停靠栏展开为窗口视图层次结构的轮廓。同时，打开实用工具区域中的*属性检查器*。


