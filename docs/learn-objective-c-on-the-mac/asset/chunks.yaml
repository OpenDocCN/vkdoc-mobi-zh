- fmt: "# Chapter 17 Concurrency\n\nThat's a fairly complicated interaction, and until\
    \ you're used to it, it's not really obvious how it works because parts of it\
    \ occurs behind the scenes, thanks to Cocoa bindings. If you don't quite understand\
    \ how it's working, consider rereading this chapter and see if it brings you any\
    \ closer to the a-ha! moment where it suddenly all makes sense. Otherwise, proceed\
    \ to the next chapter and learn how to use concurrency to make our application\
    \ more responsive.\n\nOne of the biggest challenges in software development is\
    \ writing software that will do more than one thing at a time. For decades, computers\
    \ have been able to give an illusion of concurrency by quickly switching between\
    \ tasks at a high rate, making it seem that they're doing several things at once\
    \ (when in reality they're continuously flipping from one task to the next, only\
    \ \"paying attention\" to one at a time). Today's computers frequently contain\
    \ two or more computation cores so they really can do multiple things at once,\
    \ simultaneously executing instructions on all cores at the same time.\n\nHowever,\
    \ even if our computer's hardware and OS are capable of working with a multitude\
    \ of cores, writing application software that can effectively make use of multiple\
    \ cores is still technically challenging. In most development environments, the\
    \ default assumption is that the code we're writing is performed sequentially,\
    \ one operation after the other, and splitting things up so that work can be performed\
    \ concurrently can be a pretty big task.\n\nThis chapter will present an example\
    \ of a common situation in which Cocoa applications can benefit from concurrency\
    \ and show how it's done. You're surely familiar with OS X's spinning disk cursor\
    \ (sometimes called the \"spinning beach ball of death\") that appears whenever\
    \ an application isn't responding to user actions. This typically appears after\
    \ we click a button or menu item that triggers any sort of processing that takes\
    \ more than a few seconds. OS X notices that the process isn't handling input\
    \ events and shows the spinning disk cursor to alert the user. This also happens\
    \ whenever an application has really stopped responding entirely and is on its\
    \ way to crashing (or being killed by the user). So when an app stops responding\
    \ and starts showing the spinning disk cursor, the immediate reaction for many\
    \ users is a moment of panic when they suspect that the app is about to crash!\n\
    \nTherefore, it's in our best interests to make sure that any sort of long-running\
    \ operation in our application is handled in such a way that the user can still\
    \ interact with our application and not get the spinning disk—by making the operation\
    \ occur in the background and letting our application still handle user input\
    \ events as it normally does. This chapter will demonstrate two ways to add this\
    \ sort of concurrency to a Cocoa application with a minimum of fuss. We'll use\
    \ the concepts embodied by the `NSOperation` and `NSOperationQueue` classes available\
    \ in the Foundation framework, and we'll also see how it can be done using Grand\
    \ Central Dispatch (GCD from here on out), which is a C-language API usable by\
    \ all OS X applications, whether they are Cocoa-based or not.\n\n## SlowWorker\n\
    \nAs a platform for demonstrating these concurrency options, we'll create a simple\
    \ application called SlowWorker, which simulates doing some long-running operations\
    \ such as fetching data from a server and performing some calculations. This app\
    \ presents the user with a button to initiate some work and shows the results\
    \ in a text view (see [Figure 17-1](#9781430245421_Ch17.xhtml#Fig1)).\n\n![9781430245421_Fig17-01.jpg](images/9781430245421_Fig17-01.jpg)\n\
    \n[Figure 17-1](#9781430245421_Ch17.xhtml#_Fig1) . The SlowWorker in action (inaction?)\n\
    \nStart by making a new Cocoa application in Xcode. Name it SlowWorker, and use\
    \ `SW` as the class prefix. No Core Data or Document support is necessary. Once\
    \ that's done, add the following bold code to *SWAppDelegate.h*:\n\n```objc\n\
    #import <Cocoa/Cocoa.h>\n\n@interface SWAppDelegate : NSObject <NSApplicationDelegate>\n\
    \n@property (assign) IBOutlet NSWindow *window;\n@property (weak) IBOutlet NSButton\
    \ *startButton;\n@property (assign) IBOutlet NSTextView *resultsTextView;\n@property\
    \ (assign) BOOL isWorking;\n\n- (IBAction)doWork:(id)sender;\n\n@end\n```\n\n\
    This defines a couple of outlets to the two objects visible in our GUI, a Boolean\
    \ flag called `isWorking` (which we'll use later to keep track of whether we have\
    \ stuff going on in the background or not), and an action method to be triggered\
    \ by the button.\n\n**Note** The sharp-eyed will notice that the `resultsTextView`\
    \ property is declared with `assign` instead of `weak`. That's because the `NSTextView`\
    \ forbids us to use it in a weak context, just like `NSWindow`, which was discussed\
    \ in chapter 11. There aren't many classes in OS X that have this restriction,\
    \ but you can take comfort in the fact that Xcode will give you a confusing \"\
    synthesis of a weak-unavailable property is disallowed\" when you try to use `weak`\
    \ with a class that doesn't like it. This is the price of backward compatibility.\n\
    \nNow add the bold methods from the following code block to *SWAppDelegate.m*:\n\
    \n```objc\n#import \"SWAppDelegate.h\"\n\n@implementation SWAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification {\n    // Insert code here to initialize your application\n\
    }\n\n- (NSString *)fetchSomethingFromServer {\n    sleep(1);\n    return @\"Hi\
    \ there\";\n}\n\n- (NSString *)processData:(NSString *)data {\n    sleep(2);\n\
    \    return [data uppercaseString];\n}\n\n- (NSString *)calculateFirstResult:(NSString\
    \ *)data {\n    sleep(3);\n    return [NSString stringWithFormat:@\"Number of\
    \ chars: %ld\",\n            [data length]];\n}\n\n- (NSString *)calculateSecondResult:(NSString\
    \ *)data {\n    sleep(4);\n    return [data stringByReplacingOccurrencesOfString:@\"\
    E\"\n                                          withString:@\"e\"];\n}\n\n- (IBAction)doWork:(id)sender\
    \ {\n    NSDate *startTime = [NSDate date];\n    \n    NSString *fetchedData;\n\
    \    NSString *processed;\n    NSString *firstResult;\n    NSString *secondResult;\n\
    \n    self.isWorking = YES;\n\n    fetchedData = [self fetchSomethingFromServer];\n\
    \    _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \                               @\"Fetched: %@\\n\", fetchedData];\n    \n   \
    \ processed = [self processData:fetchedData];\n    _resultsTextView.string = [_resultsTextView.string\
    \ stringByAppendingFormat:\n                               @\"Processed: %@\\\
    n\", processed];\n    \n    firstResult = [self calculateFirstResult:processed];\n\
    \    secondResult = [self calculateSecondResult:processed];\n    _resultsTextView.string\
    \ = [_resultsTextView.string stringByAppendingFormat:\n                      \
    \         @\"First Result: [%@]\\nSecond Result: [%@]\\n\\n\",\n             \
    \                  firstResult, secondResult];\n\n    NSDate *endTime = [NSDate\
    \ date];\n    NSLog(@\"Completed in %f seconds\",\n          [endTime timeIntervalSinceDate:startTime]);\n\
    \    self.isWorking = NO;\n}\n\n@end\n```\n\nNote that the work of this class\
    \ (such as it is) is split up into a number of small chunks. This code is just\
    \ meant to simulate some slow activities, and none of these methods really does\
    \ anything time consuming at all. So, to make it interesting, each method contains\
    \ a call to the `sleep()` function, which simply makes the program (specifically,\
    \ the thread from which the function is called) effectively pause and do nothing\
    \ at all for the given number of seconds. The `doWork:` method also contains code\
    \ at the beginning and end to calculate the amount of time it took for all the\
    \ work to be done.\n\nNow, open up *MainMenu.xib*, and put an `NSButton` and an\
    \ `NSTextView` into the empty window, laying things out as shown in [Figure 17-1](#9781430245421_Ch17.xhtml#Fig1).\
    \ Connect the app delegate's two outlets to the relevant controls, and connect\
    \ the button's action back to the app delegate's `doWork:` method."
  raw: 'That’s a fairly complicated interaction, and until you’re used to it, it’s
    not really obvious how it works because parts of it occurs behind the scenes,
    thanks to Cocoa bindings. If you don’t quite understand how it’s working, consider
    rereading this chapter and see if it brings you any closer to the a-ha! moment
    where it suddenly all makes sense. Otherwise, proceed to the next chapter and
    learn how to use concurrency to make our application more responsive.    Chapter    17    Concurrency    One
    of the biggest challenges in software development is writing software that will
    do more than one thing at a time. For decades, computers have been able to give
    an illusion of concurrency by quickly switching between tasks at a high rate,
    making it seem that they’re doing several things at once (when in reality they’re
    continuously flipping from one task to the next, only “paying attention” to one
    at a time). Today’s computers frequently contain two or more computation cores
    so they really can do multiple things at once, simultaneously executing instructions
    on all cores at the same time.    However, even if our computer’s hardware and
    OS are capable of working with a multitude of cores, writing application software
    that can effectively make use of multiple cores is still technically challenging.
    In most development environments, the default assumption is that the code we’re
    writing is performed sequentially, one operation after the other, and splitting
    things up so that work can be performed concurrently can be a pretty big task.    This
    chapter will present an example of a common situation in which Cocoa applications
    can benefit from concurrency and show how it’s done. You’re surely familiar with
    OS X’s spinning disk cursor (sometimes called the “spinning beach ball of death”)
    that appears whenever an application isn’t responding to user actions. This typically
    appears after we click a button or menu item that triggers any sort of processing
    that takes more than a few seconds. OS X notices that the process isn’t handling
    input events and shows the spinning disk cursor to alert the user. This also happens
    whenever an application has really stopped responding entirely and is on its way
    to crashing (or being killed by the user). So when an app stops responding and
    starts showing the spinning disk cursor, the immediate reaction for many users
    is a moment of panic when they suspect that the app is about to crash!    Therefore,
    it’s in our best interests to make sure that any sort of long-running operation
    in our application is handled in such a way that the user can still interact with
    our application and not get the spinning disk—by making the operation occur in
    the background and letting our application still handle user input events as it
    normally does. This chapter will demonstrate two ways to add this sort of concurrency
    to a Cocoa application with a minimum of fuss. We’ll use the concepts embodied
    by the `NSOperation` and `NSOperationQueue` classes available in the Foundation
    framework, and we’ll also see how it can be done using Grand Central Dispatch
    (GCD from here on out), which is a C-language API usable by all OS X applications,
    whether they are Cocoa-based or not.    SlowWorker    As a platform for demonstrating
    these concurrency options, we’ll create a simple application called SlowWorker,
    which simulates doing some long-running operations such as fetching data from
    a server and performing some calculations. This app presents the user with a button
    to initiate some work and shows the results in a text view (see [Figure 17-1](#9781430245421_Ch17.xhtml#Fig1)).    ![9781430245421_Fig17-01.jpg](images/9781430245421_Fig17-01.jpg)    [Figure
    17-1](#9781430245421_Ch17.xhtml#_Fig1) .  The SlowWorker in action (inaction?)    Start
    by making a new Cocoa application in Xcode. Name it SlowWorker, and use SW as
    the class prefix. No Core Data or Document support is necessary. Once that’s done,
    add the following bold code to *SWAppDelegate.


    h*:    ``` #import <Cocoa/Cocoa.h>  @interface SWAppDelegate : NSObject <NSApplicationDelegate>  @property
    (assign) IBOutlet NSWindow *window; @property (weak) IBOutlet NSButton *startButton;
    @property (assign) IBOutlet NSTextView *resultsTextView; @property (assign) BOOL
    isWorking;  - (IBAction)doWork:(id)sender;  @end ```    This defines a couple
    of outlets to the two objects visible in our GUI, a Boolean flag called `isWorking`
    (which we’ll use later to keep track of whether we have stuff going on in the
    background or not), and an action method to be triggered by the button.    **Note**  The
    sharp-eyed will notice that the `resultsTextView` property is declared with `assign`
    instead of `weak`. That’s because the `NSTextView` forbids us to use it in a weak
    context, just like `NSWindow`, which was discussed in chapter 11\. There aren’t
    many classes in OS X that have this restriction, but you can take comfort in the
    fact that Xcode will give you a confusing “synthesis of a weak-unavailable property
    is disallowed” when you try to use weak with a class that doesn’t like it. This
    is the price of backward compatibility.    Now add the bold methods from the following
    code block to *SWAppDelegate.m*:    ``` #import "SWAppDelegate.h"  @implementation
    SWAppDelegate  - (void)applicationDidFinishLaunching:(NSNotification *)aNotification
    {     // Insert code here to initialize your application }  - (NSString *)fetchSomethingFromServer
    {     sleep(1);     return @"Hi there"; }  - (NSString *)processData:(NSString
    *)data {     sleep(2);     return [data uppercaseString]; }  - (NSString *)calculateFirstResult:(NSString
    *)data {     sleep(3);     return [NSString stringWithFormat:@"Number of chars:
    %ld",             [data length]]; }  - (NSString *)calculateSecondResult:(NSString
    *)data {     sleep(4);     return [data stringByReplacingOccurrencesOfString:@"E"
                                               withString:@"e"]; }  - (IBAction)doWork:(id)sender
    {     NSDate *startTime = [NSDate date];            NSString *fetchedData;     NSString
    *processed;     NSString *firstResult;     NSString *secondResult;      self.isWorking
    = YES;      fetchedData = [self fetchSomethingFromServer];     _resultsTextView.string
    = [_resultsTextView.string stringByAppendingFormat:                               
    @"Fetched: %@\n", fetchedData];            processed = [self processData:fetchedData];
        _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:
                                   @"Processed: %@\n", processed];            firstResult
    = [self calculateFirstResult:processed];     secondResult = [self calculateSecondResult:processed];
        _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:
                                   @"First Result: [%@]\nSecond Result: [%@]\n\n",
                                   firstResult, secondResult];      NSDate *endTime
    = [NSDate date];     NSLog(@"Completed in %f seconds",           [endTime timeIntervalSinceDate:startTime]);
        self.isWorking = NO; }  @end ```    Note that the work of this class (such
    as it is) is split up into a number of small chunks. This code is just meant to
    simulate some slow activities, and none of these methods really does anything
    time consuming at all. So, to make it interesting, each method contains a call
    to the `sleep()` function, which simply makes the program (specifically, the thread
    from which the function is called) effectively pause and do nothing at all for
    the given number of seconds. The `doWork:` method also contains code at the beginning
    and end to calculate the amount of time it took for all the work to be done.    Now,
    open up *MainMenu.xib*, and put an `NSButton` and an `NSTextView` into the empty
    window, laying things out as shown in [Figure 17-1](#9781430245421_Ch17.xhtml#Fig1).
    Connect the app delegate’s two outlets to the relevant controls, and connect the
    button’s action back to the app delegate’s `doWork:` method.'
  trans: "\n# 第 17 章 并发\n\n这是一个相当复杂的交互过程，在你适应之前，由于 Cocoa 绑定在幕后完成部分工作，它的运行方式并不直观。如果你对它的工作原理不太理解，不妨重新阅读本章，看看是否能更接近\"\
    恍然大悟\"的临界点。否则，请继续阅读下一章，学习如何使用并发让我们的应用程序响应更迅速。\n\n软件开发中最大的挑战之一，就是编写能够同时处理多项任务的软件。几十年来，计算机通过高速切换任务制造出并发的假象，让人以为它们能同时处理多件事情（实际上它们只是在任务间快速切换，一次只\"\
    关注\"一个任务）。如今，计算机通常包含两个或更多计算核心，因此它们确实能够同时执行多项任务——在所有核心上同时执行指令。\n\n然而，即使计算机硬件和操作系统能够支持多核心工作，编写能有效利用多核心的应用软件在技术上仍具挑战性。在大多数开发环境中，默认假设代码是顺序执行的（一个接一个操作），而分解任务以实现并发执行往往是一项艰巨的工作。\n\
    \n本章将举例说明 Cocoa 应用常见的受益于并发的情况，并演示具体实现方法。你一定见过 OS X 中那个旋转的光标（有时被称为\"死亡的沙滩球\"），它会在应用无法响应用户操作时出现。通常，当我们点击某个按钮或菜单项触发耗时超过几秒的处理时，这个光标就会出现。OS\
    \ X 检测到进程未处理输入事件，便会显示旋转光标提醒用户。当应用完全停止响应用户操作并濒临崩溃（或被用户强制退出）时，也会出现这种情况。因此，当应用停止响应并显示旋转光标时，许多用户的直接反应是恐慌——他们怀疑应用即将崩溃！\n\
    \n所以，为了用户也为了我们自己，必须确保应用中任何长时间运行的操作都能以不影响用户交互的方式处理——即让操作在后台执行，同时应用照常处理用户输入事件。本章将演示如何用最省事的方式为\
    \ Cocoa 应用添加此类并发功能。我们将使用 Foundation 框架中的`NSOperation`和`NSOperationQueue`类，还会学习如何通过\
    \ Grand Central Dispatch（以下简称 GCD）实现，这是所有 OS X 应用（无论是否基于 Cocoa）都能使用的 C 语言 API。\n\
    \n## SlowWorker\n\n作为演示这些并发选项的平台，我们将创建一个名为 SlowWorker 的简单应用，模拟从服务器获取数据并执行计算等长时间运行的操作。该应用提供一个按钮让用户启动任务，并在文本视图中显示结果（见图\
    \ 17-1）。\n\n![9781430245421_Fig17-01.jpg](img/9781430245421_Fig17-01.jpg)\n\n\
    图 17-1 SlowWorker 在运行中（还是静止中？）\n\n首先，在 Xcode 中新建一个 Cocoa 应用。命名为 SlowWorker，使用`SW`作为类前缀。无需\
    \ Core Data 或文档支持。完成这些后，在*SWAppDelegate.h*中添加以下粗体代码：\n\n```objc\n#import <Cocoa/Cocoa.h>\n\
    \n@interface SWAppDelegate : NSObject <NSApplicationDelegate>\n\n@property (assign)\
    \ IBOutlet NSWindow *window;\n@property (weak) IBOutlet NSButton *startButton;\n\
    @property (assign) IBOutlet NSTextView *resultsTextView;\n@property (assign) BOOL\
    \ isWorking;\n\n- (IBAction)doWork:(id)sender;\n\n@end\n```\n\n这定义了 GUI 中两个可见对象的输出口、一个名为`isWorking`的布尔标志（稍后用于跟踪后台是否有任务执行），以及一个由按钮触发的操作方法。\n\
    \n**注意** 眼尖的读者会发现`resultsTextView`属性用`assign`而非`weak`声明。这是因为`NSTextView`禁止在弱引用上下文中使用，就像第\
    \ 11 章讨论的`NSWindow`一样。OS X 中具有此限制的类并不多，但有一点可以放心：当你尝试对不支持的类使用`weak`时，Xcode 会给出令人困惑的\"\
    禁止合成 weak 不可用属性\"的提示。这就是向后兼容的代价。\n\n现在，将以下代码块中的粗体方法添加到*SWAppDelegate.m*中：\n\n\
    ```objc\n#import \"SWAppDelegate.h\"\n\n@implementation SWAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification {\n    // 在此处插入初始化应用代码\n}\n\n- (NSString *)fetchSomethingFromServer\
    \ {\n    sleep(1);\n    return @\"你好\";\n}\n\n- (NSString *)processData:(NSString\
    \ *)data {\n    sleep(2);\n    return [data uppercaseString];\n}\n\n- (NSString\
    \ *)calculateFirstResult:(NSString *)data {\n    sleep(3);\n    return [NSString\
    \ stringWithFormat:@\"字符数: %ld\",\n            [data length]];\n}\n\n- (NSString\
    \ *)calculateSecondResult:(NSString *)data {\n    sleep(4);\n    return [data\
    \ stringByReplacingOccurrencesOfString:@\"E\"\n                              \
    \            withString:@\"e\"];\n}\n\n- (IBAction)doWork:(id)sender {\n    NSDate\
    \ *startTime = [NSDate date];\n    \n    NSString *fetchedData;\n    NSString\
    \ *processed;\n    NSString *firstResult;\n    NSString *secondResult;\n\n   \
    \ self.isWorking = YES;\n\n    fetchedData = [self fetchSomethingFromServer];\n\
    \    _resultsTextView.string = [_resultsTextView.string stringByAppendingFormat:\n\
    \                               @\"已获取: %@\\n\", fetchedData];\n    \n    processed\
    \ = [self processData:fetchedData];\n    _resultsTextView.string = [_resultsTextView.string\
    \ stringByAppendingFormat:\n                               @\"已处理: %@\\n\", processed];\n\
    \    \n    firstResult = [self calculateFirstResult:processed];\n    secondResult\
    \ = [self calculateSecondResult:processed];\n    _resultsTextView.string = [_resultsTextView.string\
    \ stringByAppendingFormat:\n                               @\"第一结果: [%@]\\n 第二结果:\
    \ [%@]\\n\\n\",\n                               firstResult, secondResult];\n\n\
    \    NSDate *endTime = [NSDate date];\n    NSLog(@\"耗时 %f 秒完成\",\n          [endTime\
    \ timeIntervalSinceDate:startTime]);\n    self.isWorking = NO;\n}\n\n@end\n```\n\
    \n注意，该类的工作被拆分为多个小模块。这些代码仅用于模拟缓慢操作，实际上这些方法本身并不耗时。为了让效果更明显，每个方法都调用了`sleep()`函数，使程序（具体来说是调用该函数的线程）在指定秒数内暂停且不执行任何操作。`doWork:`方法还在开头和结尾包含计算总耗时的代码。\n\
    \n现在，打开*MainMenu.xib*，在空白窗口中放置一个`NSButton`和一个`NSTextView`，布局如图 17-1 所示。将应用代理的两个输出口连接到相关控件，并将按钮的动作连接到应用代理的`doWork:`方法。\n"
- fmt: 'Then configure the `NSTextView` a bit, deleting the example text from the
    view, and turning off the *Editable* checkbox in the *Attributes Inspector*. Now
    save the work, and hit **Run** in Xcode. The app should start, and clicking the
    button will make it work for about ten seconds (the sum of all those sleep amounts)
    before showing the results. About five or six seconds in, the mouse cursor will
    change to the spinning-disk cursor, and it stays that way until the work is complete.
    The `NSTextView` we put in the window remains blank until the end, even though
    our code tries to update its content occasionally, because the main thread that
    needs to redraw the display is “stuck” doing all of our background processing.
    Also, during the entire time, the application’s menu is unresponsive, along with
    the window controls. In fact, the only way we can interact with our application
    at all, besides killing it with Mac OS X’s *Force Quit* window, is to move its
    window around because the OS itself handles that. This is exactly the state of
    affairs we want to avoid! In this particular case, it’s not too bad because the
    application appears to be hung for just a few seconds. However, if your app regularly
    “beachballs” this way for much longer than that, you’ll end up with some unhappy
    users—and maybe even some ex-users!


    ## Threading Basics


    Before we start implementing solutions, let’s go over some of the basics involved
    in concurrency. This is far from a complete description of threading in OS X or
    threading in general. For that, you’ll need to look elsewhere. We just want to
    explain enough for you to understand what we’re doing in this chapter.


    In most modern operating systems (including, of course, OS X), apart from the
    notion of a process, which contains a running instance of a program stored on
    disk, there’s also the notion of threads of execution. Each process can consist
    of multiple threads that all run concurrently. If there’s just one processor core,
    the OS will switch between executing multiple threads, much like it switches between
    executing multiple processes. If there’s more than one core available, the threads
    will be distributed among them just like processes are.


    All threads in a process share the same executable program code and the same global
    data. Each thread can also have some data that is exclusive to the thread. Threads
    can make use of a special structure called a *mutex* (short for mutual exclusion)
    or a lock, which can ensure that a particular chunk of code can’t be run by multiple
    threads at once. This is useful for ensuring correct outcomes when multiple threads
    access the same data simultaneously by locking out other threads when one thread
    is updating a value (in what’s called a “critical section” of the code). For example,
    let’s say our application implements a banking system where an account balance
    can be modified as part of a transaction. In a multi-threaded system, we need
    to protect the section of code that adds or subtracts from the account balance
    to eliminate the possibility that two threads are both messing with it at the
    exact same time. Otherwise, we might have both threads reading the old balance
    more or less simultaneously, and both threads later writing back their own ideas
    of the new balance, oblivious to the changes that the other was trying to make,
    leading to an incorrect final state; whichever sets the value last is the “winner,”
    and the other thread’s change to the balance is simply lost.


    A common concern when dealing with threads is the idea of code being *thread-safe*.
    Some software libraries are written with concurrency in mind and have all their
    critical sections properly protected with mutexes. Some code libraries simply
    don’t. For instance, in Cocoa, the AppKit framework (containing the classes specific
    to building GUI applications, such as `NSApplication`, `NSView` and all its subclasses,
    and the like) is for the most part *not* thread-safe.


    This means that in a running Cocoa application, all method calls that deal with
    any AppKit objects should be executed from within the same thread, which is commonly
    known as the main thread. If we access AppKit objects from another thread, all
    bets are off; we are likely to encounter seemingly inexplicable bugs. By default,
    the main thread is where all the action of our Cocoa app (such as dealing with
    actions triggered by user events) occurs, so for simple applications it’s nothing
    we need to worry about. Action methods triggered by a user are already running
    in the main thread. Up to this point in the book, our code has been running exclusively
    on the main thread, but that’s about to change.


    ## Units of Work


    The problem with the threading model just described is that for the average programmer,
    writing error-free, multi-threaded code is nearly impossible. This is not meant
    as a critique of our industry or of the average programmer’s abilities; it’s simply
    an observation. The complex interactions we have to account for in our code when
    synchronizing data and actions across multiple threads are really just too much
    for most people to tackle. Imagine that 5 percent of all people have the capacity
    to write software at all. Only a small fraction of those 5 percent are really
    up to the task of writing heavy-duty, multi-threaded applications. Even people
    who have done it successfully will often advise others to not follow their example!


    Fortunately, all hope is not yet lost. It is possible to implement some concurrency
    without too much low-level thread-twisting. Just like we have the ability to display
    data on the screen without directly poking bits into video RAM and to read data
    from disk without interfacing directly with disk controllers, software abstractions
    exist that let us run our code on multiple threads without requiring us to do
    much directly with the threads at all. The solutions that Apple encourages us
    to use are centered around the idea of splitting up long-running tasks into units
    of work and putting those units into queues for execution. The system manages
    the queues for us, executing units of work on multiple threads. We don’t need
    to start and manage the background threads directly and are freed from much of
    the “bookkeeping” that’s usually involved in implementing concurrent applications.
    The system takes care of that for us.


    ## Operation Queues


    Since the release of OS X 10.5, Apple has provided us with a pair of classes called
    `NSOperation` and `NSOperationQueue` that work together to provide operation queues.
    The idea is that we split our computational tasks into chunks or units of work,
    wrap each of them up in an `NSOperation`, and put each operation into an `NSOperationQueue`.
    We can also establish interoperation dependencies, specifying that an operation
    won’t begin executing until another one is complete. The `NSOperationQueue` then
    takes care of these units the best it can, using the order that operations were
    added to the queue, along with the dependencies we specified, to determine its
    course of action. If the dependencies we specify allow some operations to execute
    at the same time, and there are enough cores available to run them, the operation
    queue will use multiple threads to execute multiple operations simultaneously.


    ## Becoming a Blockhead


    One of the most straightforward ways to use Apple’s concurrency APIs, either with
    `NSOperationQueue` or with GCD, is through the use of blocks. Originally released
    along with GCD, blocks are a bit of new syntax that Apple has added to the C language
    itself (and, by extension, Objective-C and C++). This new language feature, which
    is also known as *closures* in some other languages, is really important for getting
    the most out of GCD. The idea behind a block is to let a particular chunk of code
    be treated like any other C-language type.'
