    the `drawRect:` mode to specify exactly what should be drawn. We’re going to do
    just that and fill each view with a blended color. In order to do the blending,
    each instance of `CMColorBlendView` needs to know which blending mode to use and
    which two colors to blend. We’ll set up the blending mode for each `CMColorBlendView`
    by hand, but the values for the two colors will be populated using Cocoa Bindings,
    so that as soon as the user changes one of the chosen colors, all of the `CMColorBlendView`
    objects in our window will be instantly redrawn.    The CMColorBlendView Class    Start
    by creating a new class in our project. In the *New File* assistant, choose *Objective-C
    class* from the OS X - *Cocoa* section, then click Next. Name our new class `CMColorBlendView.m`,
    and make it a subclass of `NSView`.    Now edit *CMColorBlendView.h*, adding the
    bold lines shown in the following:    ``` #import <Cocoa/Cocoa.h>  @interface
    CMColorBlendView : NSView  @property (strong, nonatomic) NSColor *color1; @property
    (strong, nonatomic) NSColor *color2; @property (assign, nonatomic) CGBlendMode
    blendMode;  @end ```    This gives our class two `NSColor` objects, which will
    be populated by Cocoa Bindings, and a `CGBlendMode`, which will be set by the
    `MyController` class when it’s loading a nib file.


    We used the `nonatomic` keyword for all of these properties, which is a way of
    declaring that the getters and setters for these properties won’t take extra precautions
    to be thread-safe. Since we know that our code in this simple app is all being
    used solely on the main thread, using `nonatomic` is safe enough and gives slightly
    better performance.    Now switch over to *CMColorBlendView.m*, where the first
    thing we’ll do is define the methods for the properties we’ve declared. Most of
    the properties we’ve declared previously in this book have their methods created
    by an explicit `@synthesize` line, but here we have a bit of a special case because
    we want our view to redraw itself each time any of the property values changes.
    So we’ll provide explicit setter methods for each of our properties. Explicit
    methods, if present, always take the place of any synthesized methods. And actually,
    this brings us to one more reason we used `nonatomic` in our property declarations:
    without it, the compiler doesn’t really like letting us mix a synthesized getter
    with an explicit setter and so would generate a warning.    While we’re doing
    all this new stuff anyway, we’re going to introduce a pretty new piece of functionality
    in the LLVM compiler. Any time we declare a property in the interface, we can
    actually leave out the `@synthesize` row entirely! If we do so, the compiler will
    still create an instance variable for us, whose name will be the name of the property
    prefixed by an underscore. We can see this in the following code, which should
    be added to our class’s `@implementation` section:    ``` // put these at the
    beginning of the @implementation block - (void)setBlendMode:(CGBlendMode)bm {
        if (_blendMode != bm) {         _blendMode = bm;         [self setNeedsDisplay:YES];
        } } - (void)setColor1:(NSColor *)c {     if (![c isEqual:_color1]) {         _color1
    = c;         [self setNeedsDisplay:YES];     } } - (void)setColor2:(NSColor *)c
    {     if (![c isEqual:_color2]) {         _color2 = c;         [self setNeedsDisplay:YES];
        } } ```    One thing to note is the `[self setNeedsDisplay:YES]` call. We’ll
    get into this more in later chapters covering drawing in Cocoa, but the basic
    idea is that when we want to draw some content in an `NSView`, we call this method,
    which sets a flag, and when our application is done processing whatever event
    it’s currently handling, it will look through the open windows to see if anyone
    has been flagged for redrawing, which leads to the eventual calling of the `drawRect:`
    method.    Speaking of which, the only other method we need to implement in this
    class is the `drawRect:` method itself.    ``` - (void)drawRect:(NSRect)dirtyRect
    {   // don''t draw anything if we don''t have two valid colors.   if (!self.color1
    || !self.color2) return;    CGColorRef cgColor1 = genericRGBWithNSColor(self.color1);
      CGColorRef cgColor2 = genericRGBWithNSColor(self.color2);    CGContextRef myContext
    = [[NSGraphicsContext currentContext] graphicsPort];   CGContextSaveGState(myContext);    CGContextSetFillColorWithColor(myContext,
    cgColor1);   CGContextSetBlendMode(myContext, kCGBlendModeNormal);   CGContextFillRect(myContext,
    NSRectToCGRect(dirtyRect));    CGContextSetFillColorWithColor(myContext, cgColor2);
      CGContextSetBlendMode(myContext, self.blendMode);   CGContextFillRect(myContext,
    NSRectToCGRect(dirtyRect));    CGContextRestoreGState(myContext);    CGColorRelease(cgColor1);
      CGColorRelease(cgColor2); } ```    Try not to get too caught up in the details
    here. It’s enough if you read the comments and trust that the code is doing what
    the comments claim it’s doing. After going through some of the later chapters
    where we’ll be dealing with graphics, this will start to make more sense. For
    now, note that this code produces some compiler errors until we complete the next
    step.'
  trans: "\n至此，剩下的工作就是将 *CMDocument.xib* 中 `CMDocument` 的 `objectController` 输出口连接起来。回到那里，按住\
    \ Ctrl 键从 *File*’*s Owner* 拖拽到颜色集对象控制器，然后选择 `objectController` 输出口。保存工作，接着点击**运行**按钮。两个颜色井中的红色和黄色应该可见，点击其中一个会弹出颜色面板，让我们可以更改颜色。不仅如此，现在通过菜单可以完整使用文档功能。我们能够保存文档、关闭文档、访问最近使用的文档、打开文档等等。\n\
    \n## 确定文件格式\n\n做到这一步，你可能已经注意到，保存文档时，会有一个弹出列表让你选择将文件保存为*二进制*、*SQLite* 或 *XML* 格式，文件扩展名也会相应设置。虽然这种灵活性在开发期间可能有点用，但对于一个发布的成品应用，最好只选择一种格式并坚持使用，以免让用户感到困惑。总的来说，对于大多数应用，SQLite\
    \ 可能是最佳选择。你还应该将文件扩展名改为能体现应用用途的名称，而不是使用默认扩展名。所有这些选项都在 Xcode 的 Target 设置中配置。回到 Xcode，在导航窗格中选择最顶层的\
    \ `ColorMix` 组，点击 `ColorMix` target，然后点击视图顶部的 Info 选项卡查看 target 设置。展开 *Document\
    \ Types* 组，会看到一个视图，其中包含所有三个预配置的文件格式。删除*二进制*和 *XML* 选项（使用每个版块右上角的“x”按钮），只保留 *SQLite*\
    \ 选项。通过编辑 *Extensions* 列中显示的值，将此保留格式的文件扩展名改为 `ColorMix`。现在保存工作，构建并运行，然后保存一个颜色集，验证我们已无法选择保存为哪种文件格式。\n\
    \n## 添加色彩\n\n现在文档功能都正常工作了，但我们拥有的是一个非常无聊的应用，完全没有任何有趣的功能。让我们让应用完成本章开头承诺的功能：使用所有\
    \ Core Graphics 预定义的混合模式，显示由两种选定颜色混合而成的一系列颜色。\n\n为此，我们将创建一个名为 `CMColorBlendView`\
    \ 的新类，它直接继承自 `NSView`。在 `NSView` 子类中通常会做的主要事情之一就是重写 `drawRect:` 方法，以精确指定要绘制的内容。我们正是要这样做，并用混合后的颜色填充每个视图。为了进行混合，每个\
    \ `CMColorBlendView` 实例需要知道使用哪种混合模式以及要混合哪两种颜色。我们将手动为每个 `CMColorBlendView` 设置混合模式，但两种颜色的值将通过\
    \ Cocoa Bindings 填充，这样一旦用户更改了选定的颜色之一，窗口中所有的 `CMColorBlendView` 对象都会立即重绘。\n\n##\
    \ `CMColorBlendView` 类\n\n首先在项目中创建一个新类。在 *New File* 助手中，从 OS X - *Cocoa* 部分选择\
    \ *Objective-C class*，然后点击 Next。将新类命名为 `CMColorBlendView.m`，并使其成为 `NSView` 的子类。\n\
    \n现在编辑 `CMColorBlendView.h`，添加下面代码中加粗的行：\n\n```objective-c\n#import <Cocoa/Cocoa.h>\n\
    \n@interface CMColorBlendView : NSView\n\n@property (strong, nonatomic) NSColor\
    \ *color1;\n@property (strong, nonatomic) NSColor *color2;\n@property (assign,\
    \ nonatomic) CGBlendMode blendMode;\n\n@end\n```\n\n这为我们的类提供了两个 `NSColor` 对象（将由\
    \ Cocoa Bindings 填充），以及一个 `CGBlendMode`（将在 `MyController` 类加载 nib 文件时设置）。\n\n\
    我们为所有这些属性使用了 `nonatomic` 关键字，这是一种声明方式，表明这些属性的 getter 和 setter 不会采取额外的线程安全预防措施。由于我们知道这个简单应用中的所有代码都仅在主线程上使用，因此使用\
    \ `nonatomic` 足够安全，并且性能略好。\n\n现在切换到 `CMColorBlendView.m`，我们要做的第一件事是为已声明的属性定义方法。本书之前声明的大多数属性都是通过显式的\
    \ `@synthesize` 行来创建方法的，但这里情况有点特殊，因为我们希望视图在每次属性值发生变化时都重绘。所以我们将为每个属性提供显式的 setter\
    \ 方法。如果存在显式方法，它们总是会取代任何合成的方法。实际上，这也引出了我们在属性声明中使用 `nonatomic` 的另一个原因：如果没有它，编译器不太允许我们将合成的\
    \ getter 与显式的 setter 混合使用，因此会产生警告。\n\n在完成所有这些新工作的同时，我们将介绍 LLVM 编译器中的一项新功能。任何时候我们在接口中声明一个属性，实际上可以完全省略\
    \ `@synthesize` 行！如果这样做，编译器仍然会为我们创建一个实例变量，其名称将是属性名前加下划线。我们可以在下面的代码中看到这一点，这些代码应添加到类的\
    \ `@implementation` 部分：\n\n```objective-c\n// 将这些放在 @implementation 块的开头\n- (void)setBlendMode:(CGBlendMode)bm\
    \ {\n    if (_blendMode != bm) {\n        _blendMode = bm;\n        [self setNeedsDisplay:YES];\n\
    \    }\n}\n- (void)setColor1:(NSColor *)c {\n    if (![c isEqual:_color1]) {\n\
    \        _color1 = c;\n        [self setNeedsDisplay:YES];\n    }\n}\n- (void)setColor2:(NSColor\
    \ *)c {\n    if (![c isEqual:_color2]) {\n        _color2 = c;\n        [self\
    \ setNeedsDisplay:YES];\n    }\n}\n```\n\n有一点需要注意：`[self setNeedsDisplay:YES]`\
    \ 调用。我们将在后续涉及 Cocoa 绘图的章节中更详细地讨论这一点，但基本思想是：当我们要在 `NSView` 中绘制某些内容时，调用此方法，它会设置一个标记，当我们的应用处理完当前正在处理的任何事件后，它会遍历打开的窗口，检查是否有窗口被标记为需要重绘，这最终会导致调用\
    \ `drawRect:` 方法。\n\n说到这个，我们在这个类中需要实现的另一个方法就是 `drawRect:` 方法本身。\n\n```objective-c\n\
    - (void)drawRect:(NSRect)dirtyRect {\n  // 如果没有两个有效的颜色，则不绘制任何内容。\n  if (!self.color1\
    \ || !self.color2) return;\n\n  CGColorRef cgColor1 = genericRGBWithNSColor(self.color1);\n\
    \  CGColorRef cgColor2 = genericRGBWithNSColor(self.color2);\n\n  CGContextRef\
    \ myContext = [[NSGraphicsContext currentContext] graphicsPort];\n  CGContextSaveGState(myContext);\n\
    \n  CGContextSetFillColorWithColor(myContext, cgColor1);\n  CGContextSetBlendMode(myContext,\
    \ kCGBlendModeNormal);\n  CGContextFillRect(myContext, NSRectToCGRect(dirtyRect));\n\
    \n  CGContextSetFillColorWithColor(myContext, cgColor2);\n  CGContextSetBlendMode(myContext,\
    \ self.blendMode);\n  CGContextFillRect(myContext, NSRectToCGRect(dirtyRect));\n\
    \n  CGContextRestoreGState(myContext);\n\n  CGColorRelease(cgColor1);\n  CGColorRelease(cgColor2);\n\
    }\n```\n\n不要过于纠结这里的细节。只要阅读注释并相信代码正在执行注释所说的事情就足够了。在学习了后面一些涉及图形的章节后，这会变得更有意义。现在要注意的是，在我们完成下一步之前，这段代码会产生一些编译器错误。\n"
- fmt: "为了这个类能够正常工作，最后需要添加一个转换例程，以便用户从颜色面板中选择的`NSColor`可以转换为Core Graphics函数所需的`CGColorRef`。由于某些原因，Cocoa并未提供任何一行就能完成此转换的函数或方法调用，但以下函数可以很好地完成这项工作。将此函数插入到`.m`文件的顶部附近，位于`drawRect:`方法之上即可。不过为了保持结构清晰，我们建议将其放在`@implementation`块的正上方，以明确该函数并非类的一部分。\n\
    \n``` static CGColorRef genericRGBWithNSColor (NSColor *color) {  \n    CGColorRef\
    \ cgColor = NULL;    \n    NSColorSpace *nsColorSpace = [NSColorSpace genericRGBColorSpace];\
    \  \n    NSColor *deviceRGBColor = [color colorUsingColorSpace: nsColorSpace];\
    \  \n    if (deviceRGBColor != nil) {  \n        CGFloat components[4];  \n  \
    \      [deviceRGBColor getRed: &components[0] green: &components[1]  \n      \
    \                    blue: &components[2] alpha: &components[3]];  \n        cgColor\
    \ = CGColorCreate([nsColorSpace CGColorSpace], components);  \n    }    \n   \
    \ return cgColor;  \n} ```\n\n至此，`CMColorBlendView`类就完成了。保存工作并点击`Build`，它应能顺利编译。我们要求你现在点击`Build`只是为了确保到目前为止没有输入错误；我们尚未设置GUI，因此现在点击`Build\
    \ & Run`没有意义。\n\n## 向GUI中添加混合色\n\n现在是为文档窗口添加混合色样块的时候了。首先，在`CMDocument.h`文件中为每个样块添加一个`outlet`。此处显示的每个新`outlet`最终都将连接到`CMColorBlendView`的一个实例。我们还在顶部附近添加了一行`@class`声明，它告诉编译器下一个标记（`CMColorBlendView`）是一个类的名称。这足以让编译器处理指向该类实例的实例变量和方法参数，而无需导入该类的头文件。在头文件中始终使用这些前向声明而不是`#import`，可以略微缩短编译时间，并使头文件更稳健，因为它们之间的依赖关系更少。然而，在实现文件中，当我们调用这些类的方法时，则需要导入头文件。\n\
    \n``` #import <Cocoa/Cocoa.h>  \n@class CMColorBlendView;  \n\n@interface CMDocument\
    \ : NSPersistentDocument  \n\n@property (weak) IBOutlet CMColorBlendView *multiplyBlendView;\
    \  \n@property (weak) IBOutlet CMColorBlendView *screenBlendView;  \n@property\
    \ (weak) IBOutlet CMColorBlendView *overlayBlendView;  \n@property (weak) IBOutlet\
    \ CMColorBlendView *darkenBlendView;  \n@property (weak) IBOutlet CMColorBlendView\
    \ *lightenBlendView;  \n@property (weak) IBOutlet CMColorBlendView *colorDodgeBlendView;\
    \  \n@property (weak) IBOutlet CMColorBlendView *colorBurnBlendView;  \n@property\
    \ (weak) IBOutlet CMColorBlendView *softLightBlendView;  \n@property (weak) IBOutlet\
    \ CMColorBlendView *hardLightBlendView;  \n@property (weak) IBOutlet CMColorBlendView\
    \ *differenceBlendView;  \n@property (weak) IBOutlet CMColorBlendView *exclusionBlendView;\
    \  \n@property (weak) IBOutlet CMColorBlendView *hueBlendView;  \n@property (weak)\
    \ IBOutlet CMColorBlendView *saturationBlendView;  \n@property (weak) IBOutlet\
    \ CMColorBlendView *colorBlendView;  \n@property (weak) IBOutlet CMColorBlendView\
    \ *luminosityBlendView;  \n\n@end ```\n\n现在返回`CMDocument.xib`，将窗口放大至约350×500，并在顶部保留两个颜色选择器。从对象库中找到`Custom\
    \ View`（实际上是普通的`NSView`实例），将其拖入窗口，并使用`Identity Inspector`将其类更改为`CMColorBlendView`。然后使用`Size\
    \ Inspector`将`CMColorBlendView`的大小调整为约90×50。\n\n为了区分该视图所代表的混合模式，从对象库中拖一个标签到窗口，放在`CMColorBlendView`下方。使用控制手柄使标签与其上方的视图等宽，并使用`Attributes\
    \ Inspector`将标签文本居中（见图12-3）。\n\n![9781430245421_Fig12-03.jpg](images/9781430245421_Fig12-03.jpg)\n\
    \n[图12-3](#9781430245421_Ch12.xhtml#_Fig3) . 放置第一个`CMColorBlendView`\n\n同时选中`CMColorBlendView`和标签，按![images](images/arrow3.jpg)D进行复制，并将新复制的视图稍微向右对齐。再次按![images](images/arrow3.jpg)D，并将新的一组继续向右对齐。现在选中全部三个`ColorBlendView`和全部三个标签，按![images](images/arrow3.jpg)D，并将新复制的一组放在旧的一组下方。重复此操作，直到有五排标签，每排三个。然后遍历所有标签，设置其标题，如图12-4所示。\n\
    \n![9781430245421_Fig12-04.jpg](images/9781430245421_Fig12-04.jpg)\n\n[图12-4](#9781430245421_Ch12.xhtml#_Fig4)\
    \ . 即将混合颜色的网格\n\n布局完成后，需要进行大量的连接。最简单的方法是调出`Connections Inspector`，然后选择`File’s\
    \ Owner`对象（它是文档类的代理）。这样做会在检查器中显示文档的所有`outlet`。只需将每个`outlet`的圆点拖到我们在窗口中创建的对应`CMColorBlendView`上，并以标签名称作为指引，如图12-5所示。\n\
    \n![9781430245421_Fig12-05.jpg](images/9781430245421_Fig12-05.jpg)\n\n[图12-5](#9781430245421_Ch12.xhtml#_Fig5)\
    \ . 大约完成了一半的连接。事情终于开始变得明朗！\n\n然后返回`CMDocument.m`。我们将添加代码来为每个`CMColorBlendView`配置正确的混合模式，并手动配置绑定，以便当用户选择颜色时，每个`CMColorBlendView`都能得到更新。首先，导入`CMColorBlendView`类的头文件，以便调用其方法。在`CMDocument.m`顶部附近添加以下行：\n\
    \n``` #import \"CMColorBlendView.h\" ```\n\n接下来，修改`windowControllerDidLoadNib:`方法，如下所示：\n\
    \n``` - (void)windowControllerDidLoadNib:(NSWindowController *)windowController\
    \ {  \n    [super windowControllerDidLoadNib:windowController];  \n    if (isNew)\
    \ {  \n        id newObj = [_objectController newObject];  \n        [newObj setValue:[NSColor\
    \ redColor] forKey:@\"color1\"];  \n        [newObj setValue:[NSColor yellowColor]\
    \ forKey:@\"color2\"];  \n        [_objectController addObject:newObj];  \n  \
    \  }    \n    _multiplyBlendView.blendMode = kCGBlendModeMultiply;  \n    _screenBlendView.blendMode\
    \ = kCGBlendModeScreen;  \n    _overlayBlendView.blendMode = kCGBlendModeOverlay;\
    \  \n    _darkenBlendView.blendMode = kCGBlendModeDarken;  \n    _lightenBlendView.blendMode\
    \ = kCGBlendModeLighten;  \n    _colorDodgeBlendView.blendMode = kCGBlendModeColorDodge;\
    \  \n    _colorBurnBlendView.blendMode = kCGBlendModeColorBurn;  \n    _softLightBlendView.blendMode\
    \ = kCGBlendModeSoftLight;  \n    _hardLightBlendView.blendMode = kCGBlendModeHardLight;\
    \  \n    _differenceBlendView.blendMode = kCGBlendModeDifference;  \n    _exclusionBlendView.blendMode\
    \ = kCGBlendModeExclusion;  \n    _hueBlendView.blendMode = kCGBlendModeHue; \
    \ \n    _saturationBlendView.blendMode = kCGBlendModeSaturation;  \n    _colorBlendView.blendMode\
    \ = kCGBlendModeColor;  \n    _luminosityBlendView.```"
  raw: 'The final piece we need to add for this class to work is a conversion routine
    so that the `NSColor`s that are picked by the user in the color panel can be converted
    to the `CGColorRef`s that are necessary for the Core Graphics functions. For some
    reason, Cocoa doesn’t include any one-line function or method calls that do this,
    but the following function does the trick nicely. Insert this near the top of
    the *.m* file. Anywhere above the `drawRect:` method is fine, but, for the sake
    of keeping things structured, we’d recommend putting it just above the `@implementation`
    block to make it clear that this function is not a part of the class.    ``` static
    CGColorRef genericRGBWithNSColor (NSColor *color) {   CGColorRef cgColor = NULL;    NSColorSpace
    *nsColorSpace = [NSColorSpace genericRGBColorSpace];   NSColor *deviceRGBColor
    = [color colorUsingColorSpace: nsColorSpace];   if (deviceRGBColor != nil) {     CGFloat
    components[4];     [deviceRGBColor getRed: &components[0] green: &components[1]
                          blue: &components[2] alpha: &components[3]];            cgColor
    = CGColorCreate([nsColorSpace CGColorSpace], components);   }    return cgColor;
    } ```    With that in place, the `CMColorBlendView` class is complete. Save the
    work and click Build, and it should compile cleanly. We’re only asking you to
    click Build now to make sure that no typos have crept in up to this point; we
    haven’t set up the GUI yet, so there’s no point hitting Build & Run right now.    Adding
    Blended Colors to the GUI    Now it’s time to add the blended color swatches to
    our document window. Let’s start by adding an outlet for each of them to the *CMDocument.h*
    file. Each of the new outlets shown here will end up connected to an instance
    of `CMColorBlendView`. We’re also adding a line near the top with an `@class`
    declaration, which simply tells the compiler that the next token (`CMColorBlendView`)
    is the name of a class. That’s just enough information to let the compiler deal
    with instance variables and method arguments that are pointers to instances of
    that class, without importing the class’s header itself. Using these forward declarations
    instead of `#import`s consistently in our header files can give us slightly better
    compile times, and also makes our header files less brittle, because they have
    fewer dependencies on one another. In our implementation files, however, where
    we’re going to call methods on these classes, we’ll need to import the header
    file.    ``` #import <Cocoa/Cocoa.h> @class CMColorBlendView; @interface CMDocument
    : NSPersistentDocument  @property (weak) IBOutlet CMColorBlendView *multiplyBlendView;
    @property (weak) IBOutlet CMColorBlendView *screenBlendView; @property (weak)
    IBOutlet CMColorBlendView *overlayBlendView; @property (weak) IBOutlet CMColorBlendView
    *darkenBlendView; @property (weak) IBOutlet CMColorBlendView *lightenBlendView;
    @property (weak) IBOutlet CMColorBlendView *colorDodgeBlendView; @property (weak)
    IBOutlet CMColorBlendView *colorBurnBlendView; @property (weak) IBOutlet CMColorBlendView
    *softLightBlendView; @property (weak) IBOutlet CMColorBlendView *hardLightBlendView;
    @property (weak) IBOutlet CMColorBlendView *differenceBlendView; @property (weak)
    IBOutlet CMColorBlendView *exclusionBlendView; @property (weak) IBOutlet CMColorBlendView
    *hueBlendView; @property (weak) IBOutlet CMColorBlendView *saturationBlendView;
    @property (weak) IBOutlet CMColorBlendView *colorBlendView; @property (weak) IBOutlet
    CMColorBlendView *luminosityBlendView;  @end ```    Now go back to *CMDocument.xib*,
    and make the window bigger, about 350×500, leaving the two color pickers at the
    top. Find a `Custom View` (really an instance of a plain old `NSView`) in the
    Object library, drag it into the window, and use the *Identity Inspector* to change
    its class to `CMColorBlendView`. Then resize the `CMColorBlendView` to about 90×50,
    using the *Size Inspector* to help.


    We need to see which blend mode the view represents, so drag a label from the
    Object library into the window, just below the `CMColorBlendView`. Use the control
    handles to make the label the same with as the view above it, and use the *Attributes
    Inspector* to center the label’s text (see [Figure 12-3](#9781430245421_Ch12.xhtml#Fig3)).    ![9781430245421_Fig12-03.jpg](images/9781430245421_Fig12-03.jpg)    [Figure
    12-3](#9781430245421_Ch12.xhtml#_Fig3) .  Putting the first CMColorBlendView in
    place    Select both the `CMColorBlendView` and the label, press ![images](images/arrow3.jpg)D
    to duplicate them, and line the new ones up a bit to the right. Press ![images](images/arrow3.jpg)D
    again, and line the new set up even further to the right. Now select all three
    `ColorBlendView`s and all three labels, press ![images](images/arrow3.jpg)D, and
    line the new ones up below the old ones. Keep doing this until there are five
    rows of three labels, then go through all of the labels and set their titles,
    as shown in [Figure 12-4](#9781430245421_Ch12.xhtml#Fig4).    ![9781430245421_Fig12-04.jpg](images/9781430245421_Fig12-04.jpg)    [Figure
    12-4](#9781430245421_Ch12.xhtml#_Fig4) .  The grid of soon-to-be-blended colors    With
    the layout in place, it’s time for a whole lot of connecting. The easiest way
    to do this is to bring up the Connections Inspector, and select the File’s Owner
    object, which is a proxy to our document class. Doing so will display all of the
    document’s outlets in the Inspector. Simply drag from each outlet’s circle to
    the corresponding `CMColorBlendView` we created in our window, using the label
    names to guide us, as shown in [Figure 12-5](#9781430245421_Ch12.xhtml#Fig5).    ![9781430245421_Fig12-05.jpg](images/9781430245421_Fig12-05.jpg)    [Figure
    12-5](#9781430245421_Ch12.xhtml#_Fig5) .  About halfway through this list of connections.
    Things are finally starting to lighten up!    Then it’s time to go back to *CMDocument.m*.
    We’re going to add the code that will configure each `CMColorBlendView` with the
    right blend mode and manually configure bindings so that each `CMColorBlendView`
    is updated whenever the user picks a color. Start by importing the header file
    for the `CMColorBlendView` class so that we can call its methods. Add the following
    line somewhere near the top of *CMDocument.m*:    ``` #import "CMColorBlendView.h"
    ```    Next, modify the `windowControllerDidLoadNib:` method as shown here:    ```
    - (void)windowControllerDidLoadNib:(NSWindowController *)windowController {     [super
    windowControllerDidLoadNib:windowController];     if (isNew) {         id newObj
    = [_objectController newObject];         [newObj setValue:[NSColor redColor] forKey:@"color1"];
            [newObj setValue:[NSColor yellowColor] forKey:@"color2"];         [_objectController
    addObject:newObj];     }      _multiplyBlendView.blendMode = kCGBlendModeMultiply;
        _screenBlendView.blendMode = kCGBlendModeScreen;     _overlayBlendView.blendMode
    = kCGBlendModeOverlay;     _darkenBlendView.blendMode = kCGBlendModeDarken;     _lightenBlendView.blendMode
    = kCGBlendModeLighten;     _colorDodgeBlendView.blendMode = kCGBlendModeColorDodge;
        _colorBurnBlendView.blendMode = kCGBlendModeColorBurn;     _softLightBlendView.blendMode
    = kCGBlendModeSoftLight;     _hardLightBlendView.blendMode = kCGBlendModeHardLight;
        _differenceBlendView.blendMode = kCGBlendModeDifference;     _exclusionBlendView.blendMode
    = kCGBlendModeExclusion;     _hueBlendView.blendMode = kCGBlendModeHue;     _saturationBlendView.blendMode
    = kCGBlendModeSaturation;     _colorBlendView.blendMode = kCGBlendModeColor;     _luminosityBlendView.'
