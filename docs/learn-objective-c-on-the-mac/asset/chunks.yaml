    *Attributes Inspector*, set it to be view-based and give it three columns. Title
    the three columns “Quote Text,” “Character,” and “Show,” respectively.


    In addition, edit the text in each field to reflect the name of the column. We
    can also set the *Alternating Rows* checkbox for this table view in case the search
    returns a lot of matches. This table view won’t be going into a box so we can
    resize it to fill out the width of the window, letting the blue guidelines tell
    us where to stop.    Now, drag out a Text View from the *Object Library* (enter
    “text view” into the Search field at the bottom of the library area), and position
    it below the table view. Expand this one to be the same width as the table view.
    In the *Attributes Inspector*, turn off the *Editable* and *Rich Text* checkboxes.
    For Find, set the pop-up menu to *Uses Bar* and check the *Incremental Searching*
    checkbox. This will allow the big text view to use the embedded search bar that
    was introduced in Mac OS/X 10.7\. The window should look something like [Figure
    10-5](#9781430245421_Ch10.xhtml#Fig5).    ![9781430245421_Fig10-05.jpg](images/9781430245421_Fig10-05.jpg)    [Figure
    10-5](#9781430245421_Ch10.xhtml#_Fig5). First pass at the Query Finder window    Next,
    drag out an Array Controller and name it “FoundQuotes.” In the *Attributes Inspector*,
    set its *Mode* to be Entity Name and give “Quote” as the *Entity Name* to use.
    Check the checkbox by *Prepares Content* as well. Above these settings, in the
    Array Controller block of the *Attributes Inspector*, check the *Auto Rearrange
    Content* checkbox. This will cause it to correctly reload and refilter its contents
    whenever the user makes changes in the Quotes controller. In the *Bindings Inspector*,
    bind its *Managed Object Context* to the App Delegate and set the *Model Key Path*
    to “managedObjectContext.”    Now we need to set up bindings for the user interface
    controls—the table view and the text view. We’ll start, as usual, with the table
    view. Bind the *Content* and *Selection Indexes* bindings on the table view to
    the FoundQuotes controller. Bind the *Content* binding to the arrangedObjects
    *Controller Key*, and bind the *Selection Indexes* binding to the selectionIndexes
    *Controller Key*. Then, drill down to the “Static Text - Quote Text” field inside
    the table view. Configure its *Value* binding to the Table Cell View, and use
    “objectValue.quoteText” as the *Model Key Path*. Configure the “Static Text –
    Character” field’s *Value* binding to the Table Cell View, and use “objectValue.character”
    as the *Model Key Path*. Lastly, select the “Static Text – Show” field within
    the table view, and set its *Value* binding to the Table Cell View, using “objectValue.show.name”
    as the *Model Key Path*.    For the text view, it’s a bit simpler. Select the
    text view, and bind its *Value* binding to FoundQuotes. Use “selection” as the
    *Controller Key*, and “quoteText” as the *Model Key Path*.    Now click Run, and
    note the two windows. The new Query Finder window simply shows all quotes we’ve
    entered with the data entry window. The rest of this chapter will cover how to
    change that using an `NSPredicate` so that only the quotes a user searches for
    show up in this window.    Limiting Results with NSPredicate    As mentioned,
    we can limit which records an `NSArrayController` prepares for display by using
    an `NSPredicate`. We can assign a predicate to an array controller directly in
    Interface Builder; from within our application code during initialization or whenever
    conditions change, warranting a refetch; or through Cocoa Bindings, which means
    that changes to a predicate can be automatically propagated to a controller. We’ll
    explore all of these options in this chapter.    Creating Predicates    The simplest
    way to create an `NSPredicate` is by using a format string containing attribute
    names, comparators, and values to compare against. The definition of a predicate
    looks a lot like a `WHERE` clause in SQL and serves much the same purpose. Predicates
    are not limited to just Core Data usage and can be applied to other areas of Mac
    OS X such as Spotlight.'
