    withKeyPath:@"cp2Y"     options:nil];   // make me notice the CECurveView''s changes
      [self bind:@"cp1X" toObject:self.curveView withKeyPath:@"cp1X"     options:nil];
      [self bind:@"cp1Y" toObject:self.curveView withKeyPath:@"cp1Y"     options:nil];
      [self bind:@"cp2X" toObject:self.curveView withKeyPath:@"cp2X"     options:nil];
