    \ enumerateObjectsWithOptions:NSEnumerationConcurrent\n    usingBlock:^(id blockEnumerated,\
    \ NSUInteger i, BOOL *stop) {\n    NSLog(@\"Block enumeration accessing object:\
    \ %@\", blockEnumerated);\n}];\n```\n\n这个方法实际上使用了 GCD 将工作分布到所有可用的处理器核心上，这将使我们的应用运行得更快，并更好地利用系统资源。而且，我们无需额外付出就能得到这一切！"
- fmt: "Similar enumeration methods exist for the `NSSet` class, but without the index\
    \ parameter (because the objects in a set are, by definition, unordered). `NSDictionary`\
    \ has also gotten some good block action with new methods such as `enumerateKeysAndObjectsUsingBlock:`\
    \ (and its options-taking variant that allows for concurrency), letting us specify\
    \ a block that gets the key and value together. This is much better than previous\
    \ ways of enumerating the contents of a dictionary, which typically involved stepping\
    \ through all the keys and looking up the value for each key.\n\n## Observing\
    \ Notifications Using Blocks\n\nWe realize that we just threw notifications at\
    \ you a few pages ago, but guess what: Apple’s already taken the block concept\
    \ and applied it to the `NSNotification` class as well, which boasts a method\
    \ that lets us specify a block rather than a selector, like this:\n\n```\nid observe\
    \ = [[NSNotificationCenter defaultCenter] addObserverForName:DATA_RECEIVED\n \
    \                                                    object:nil queue:nil usingBlock:^(NSNotification\
    \ *notification){\n                                                         NSLog(@\"\
    received notification: %@\", notification);\n                                \
    \                     }];\n```\n\nThis is cool in a couple of ways. For one thing,\
    \ it frees us from the burden of creating a method for our notification-handling\
    \ code, letting us instead put it inline with the code that’s setting it up, which\
    \ can make our code easier to read. The other cool thing, which is true of all\
    \ blocks, is that because the block we create picks up its context from the location\
    \ where it’s defined, it has access to not only instance variables, but also local\
    \ variables defined earlier in the same method. That means that our block can\
    \ be created with some values that are available at setup time and used later\
    \ when the block is run, without needing to explicitly put them into instance\
    \ variables or pass them along in some other manual way.\n\nNote that this version\
    \ returns a value of type `id`, which we are stuffing into a variable called `observe`.\
    \ The block notification observer needs to be removed just like any other observer,\
    \ so we can use this return value to tidy up by calling this at the appropriate\
    \ time:\n\n```\n[[NSNotificationCenter defaultCenter] removeObserver:observe];\n\
    ```\n\nOne thing to be aware of when using blocks this way is that cleaning up\
    \ in the `dealloc` method may not be good enough; if the block has made use of\
    \ the `self` pointer, either explicitly or indirectly, then a sort of circular\
    \ reference occurs and the object will never be freed! This brings us to our next\
    \ block topic.\n\n## Weakening Pointers for Blocks\n\nGoing back to the last topic,\
    \ imagine that we have a class with an instance variable called `observation`\
    \ and the following `init` and `dealloc` methods:\n\n```\n@implementation MyController\
    \ {\n    id observation;\n}\n\n- (id)init {\n    if ((self = [super init])) {\n\
    \        observation = [[NSNotificationCenter defaultCenter]\n               \
    \        addObserverForName:@\"ESCHATON\"\n                       object:nil\n\
    \                       queue:nil\n                       usingBlock: ^(NSNotification\
    \ *notification){\n                           NSLog(@\"notified observer: %@\"\
    , self);\n                       }];\n\n    }\n    return self;\n}\n\n- (void)dealloc\
    \ {\n    [[NSNotificationCenter defaultCenter] removeObserver:observation];\n\
    }\n\n@end\n```\n\nThis looks fine at first glance, but there’s a subtle problem.\
    \ This setup creates a sort of circular reference chain, which means that neither\
    \ the `MyController` instance nor the `observation` object will ever be released!\
    \ The reason is that when `init` is executed and the block (which we pass to `NSNotificationCenter`)\
    \ is created, a special series of events occurs. Behind the scenes, ARC makes\
    \ sure that any variables accessed inside the block are made “block-ready.” That\
    \ means that for normal C types (`int`, `float`, etc.), a new read-only variable\
    \ slot is prepared for use within the block, and that Objective-C object pointers\
    \ are sent a `retain` message, thereby increasing their reference count during\
    \ the entire lifetime of the block.\n\nMeanwhile, the return value that is assigned\
    \ to `observation` is also handled nicely by ARC, which sends it a `retain` message\
    \ so that it won’t disappear. The result is the following:\n\n*   `MyController`\
    \ instance holds a strong reference to `observation`.\n*   The `observation` object\
    \ holds a strong reference to its block, since it “owns” it.\n*   The block holds\
    \ a strong reference to our `MyController` instance.\n\nThe way to break this\
    \ cycle is to turn one of those strong references into a weak one. The best way\
    \ to do this is by changing `init` as follows:\n\n```\n- (id)init {\n    if ((self\
    \ = [super init])) {\n        __weak id weakSelf = self;\n        observation\
    \ = [[NSNotificationCenter defaultCenter]\n                       addObserverForName:@\"\
    ESCHATON\"\n                       object:nil\n                       queue:nil\n\
    \                       usingBlock: ^(NSNotification *notification){\n       \
    \                    NSLog(@\"notified observer: %@\", self);\n              \
    \             NSLog(@\"notified observer: %@\", weakSelf);\n                 \
    \      }];\n\n    }\n    return self;\n}\n```\n\nHere we declare a new weak pointer\
    \ to `self`, stored in a new variable called `weakSelf`. This new pointer is used\
    \ inside the block. When the compiler sees this, it understands that this is a\
    \ weak pointer and therefore should not be retained by the block. That means that\
    \ `self` never receives an extra `retain`, so it’s free to be released at some\
    \ point in time when it’s not being used. When that happens, the `dealloc` method\
    \ is executed, the `observation` object is released, and the block it owns is\
    \ then also released.\n\nIt’s also important to realize this: a block will capture\
    \ any object referred to in its code, but in the case of instance variables, it’s\
    \ not the instance variable itself that is retained, but instead the `self` pointer!\
    \ The reason for this is that instance variables are accessed through a C-style\
    \ struct, even though we don’t see this in our code. In effect,\n\n```\n[tableView\
    \ reloadData];\n```\n\nis essentially the same as\n\n```\n[self->tableView reloadData];\n\
    ```\n\nIn the face of that, the compiler’s ARC rules demand that `self` be retained.\n\
    \nEven though we may not see this every day, it’s important to understand how\
    \ this mechanism works and why we must resort to this sort of workaround. Blocks\
    \ that are going to be executed and released immediately (e.g., when being used\
    \ with an enumerator) probably don’t need this sort of scrutiny. However, as soon\
    \ as we pass a block off to another object and we either know it’s going to be\
    \ a long-lived object or aren’t quite sure, we should take extra care to check\
    \ our blocks and make sure we’re not accidentally setting ourselves up for trouble.\n\
    \n## Filtering\n\nAnother use of blocks that Apple has added to Cocoa is `NSArray`’s\
    \ `indexesOfObjectsPassingTest:` method. This method lets us declare a block that\
    \ will examine an object, and, based on our own criteria, determine whether it\
    \ should be included in the set of indexes that comes out (which can in turn be\
    \ used to extract the “successes” from the original array). For example, assuming\
    \ we have an array of people, we can find all the people named “Bob” like this:\n\
    \n```\nNSArray *people;  // <- assume this exists\nNSIndexSet *bobIndexes = [people\
    \ indexesOfObjectsPassingTest:\n    BOOL ^(id obj, NSUInteger idx, BOOL *stop){\n\
    \    return [obj.firstName isEqual:@\"Bob\"];\n}];\nNSArray *bobs = [people objectsAtIndexes:bobIndexes];\n\
    ```\n\nAlthough the use of blocks may seem tricky at first, after a while they\
    \ become second nature, and once you get started, you’ll probably find more and\
    \ more ways to use them. They are a really important tool for every Cocoa programmer."
  raw: 'Similar enumeration methods exist for the `NSSet` class, but without the index
    parameter (because the objects in a set are, by definition, unordered). `NSDictionary`
    has also gotten some good block action with new methods such as `enumerateKeysAndObjectsUsingBlock:`
    (and its options-taking variant that allows for concurrency), letting us specify
    a block that gets the key and value together. This is much better than previous
    ways of enumerating the contents of a dictionary, which typically involved stepping
    through all the keys and looking up the value for each key.    Observing Notifications
    Using Blocks    We realize that we just threw notifications at you a few pages
    ago, but guess what: Apple’s already taken the block concept and applied it to
    the `NSNotification` class as well, which boasts a method that lets us specify
    a block rather than a selector, like this:    ``` id observe = [[NSNotificationCenter
    defaultCenter] addObserverForName:DATA_RECEIVED   object:nil queue:nil usingBlock:^(NSNotification
    *notification){   NSLog(@"received notification: %@", notification); }]; ```    This
    is cool in a couple of ways. For one thing, it frees us from the burden of creating
    a method for our notification-handling code, letting us instead put it inline
    with the code that’s setting it up, which can make our code easier to read. The
    other cool thing, which is true of all blocks, is that because the block we create
    picks up its context from the location where it’s defined, it has access to not
    only instance variables, but also local variables defined earlier in the same
    method. That means that our block can be created with some values that are available
    at setup time and used later when the block is run, without needing to explicitly
    put them into instance variables or pass them along in some other manual way.    Note
    that this version returns a value of type `id`, which we are stuffing into a variable
    called `observe`. The block notification observer needs to be removed just like
    any other observer, so we can use this return value to tidy up by calling this
    at the appropriate time:    ``` [[NSNotificationCenter defaultCenter] removeObserver:observe];
    ```    One thing to be aware of when using blocks this way is that cleaning up
    in the `dealloc` method may not be good enough; if the block has made use of the
    `self` pointer, either explicitly or indirectly, then a sort of circular reference
    occurs and the object will never be freed! This brings us to our next block topic.    Weakening
    Pointers for Blocks    Going back to the last topic, imagine that we have a class
    with an instance variable called `observation` and the following `init` and `dealloc`
    methods:    ``` @implementation MyController {     id observation; }  - (id)init
    {     if ((self = [super init])) {         observation = [[NSNotificationCenter
    defaultCenter]                        addObserverForName:@"ESCHATON"                       
    object:nil                        queue:nil                        usingBlock:
    ^(NSNotification *notification){                            NSLog(@"notified observer:
    %@", self);                        }];                }     return self; }  -
    (void)dealloc {     [[NSNotificationCenter defaultCenter] removeObserver:observation];
    }  @end ```    This looks fine at first glance, but there’s a subtle problem.
    This setup creates a sort of circular reference chain, which means that neither
    the `MyController` instance nor the `observation` object will ever be released!
    The reason is that when `init` is executed and the block (which we pass to `NSNotificationCenter`)
    is created, a special series of events occurs. Behind the scenes, ARC makes sure
    that any variables accessed inside the block are made “block-ready.” That means
    that for normal C types (`int`, `float`, etc.


    ), a new read-only variable slot is prepared for use within the block, and that
    Objective-C object pointers are sent a `retain` message, thereby increasing their
    reference count during the entire lifetime of the block.    Meanwhile, the return
    value that is assigned to `observation` is also handled nicely by ARC, which sends
    it a retain message so that it won’t disappear. The result is the following:    *   `MyController`
    instance holds a strong reference to `observation`. *   The `observation` object
    holds a strong reference to its block, since it “owns” it. *   The block holds
    a strong reference to our `MyController` instance.    The way to break this cycle
    is to turn one of those strong references into a weak one. The best way to do
    this is by changing `init` as follows:    ``` - (id)init {     if ((self = [super
    init])) {         __weak id weakSelf = self;         observation = [[NSNotificationCenter
    defaultCenter]                        addObserverForName:@"ESCHATON"                       
    object:nil                        queue:nil                        usingBlock:
    ^(NSNotification *notification){                            NSLog(@"notified observer:
    %@", self);                            NSLog(@"notified observer: %@", weakSelf);
                           }];                }     return self; } ```    Here we
    declare a new weak pointer to `self`, stored in a new variable called `weakSelf`.
    This new pointer is used inside the block. When the compiler sees this, it understands
    that this is a weak pointer and therefore should not be retained by the block.
    That means that `self` never receives an extra `retain`, so it’s free to be released
    at some point in time when it’s not being used. When that happens, the `dealloc`
    method is executed, the `observation` object is released, and the block it owns
    is then also released.    It’s also important to realize this: a block will capture
    any object referred to in its code, but in the case of instance variables, it’s
    not the instance variable itself that is retained, but instead the `self` pointer!
    The reason for this is that instance variables are accessed through a C-style
    struct, even though we don’t see this in our code. In effect,    ``` [tableView
    reloadData]; ```    is essentially the same as    ``` [self->tableView reloadData];
    ```    In the face of that, the compiler’s ARC rules demand that `self` be retained.    Even
    though we may not see this every day, it’s important to understand how this mechanism
    works and why we must resort to this sort of workaround. Blocks that are going
    to be executed and released immediately (e.g., when being used with an enumerator)
    probably don’t need this sort of scrutiny. However, as soon as we pass a block
    off to another object and we either know it’s going to be a long-lived object
    or aren’t quite sure, we should take extra care to check our blocks and make sure
    we’re not accidentally setting ourselves up for trouble.    Filtering    Another
    use of blocks that Apple has added to Cocoa is `NSArray`’s `indexesOfObjectsPassingTest:`
    method. This method lets us declare a block that will examine an object, and,
    based on our own criteria, determine whether it should be included in the set
    of indexes that comes out (which can in turn be used to extract the “successes”
    from the original array). For example, assuming we have an array of people, we
    can find all the people named “Bob” like this:    ``` NSArray *people;  // <-
    assume this exists NSIndexSet *bobIndexes = [people indexesOfObjectsPassingTest:
        BOOL ^(id obj, NSUInteger idx, BOOL *stop){     return [obj.firstName isEqual:@"Bob"];
    }]; NSArray *bobs = [people objectsAtIndexes:bobIndexes]; ```    Although the
    use of blocks may seem tricky at first, after a while they become second nature,
    and once you get started, you’ll probably find more and more ways to use them.
    They are a really important tool for every Cocoa programmer.'
  trans: "\n类似的枚举方法也存在于 `NSSet` 类中，只是没有索引参数（因为集合中的对象在定义上就是无序的）。`NSDictionary` 也通过一些新方法引入了强大的块操作，例如\
    \ `enumerateKeysAndObjectsUsingBlock:`（以及其支持并发的带选项变体），让我们可以指定一个同时获取键和值的块。这比之前枚举字典内容的方法要好得多，之前的方法通常需要遍历所有键，然后查找每个键对应的值。\n\
    \n## 使用块观察通知\n\n我们知道在之前几页已经向你介绍过通知，但猜猜看：Apple 也已经将块概念应用到了 `NSNotification` 类中，该类提供了一个方法，让我们可以指定一个块而不是选择器，就像这样：\n\
    \n```\nid observe = [[NSNotificationCenter defaultCenter] addObserverForName:DATA_RECEIVED\n\
    \                                                     object:nil queue:nil usingBlock:^(NSNotification\
    \ *notification){\n                                                         NSLog(@\"\
    received notification: %@\", notification);\n                                \
    \                     }];\n```\n\n这在几个方面都很酷。首先，它让我们摆脱了为通知处理代码创建方法的负担，转而允许我们将代码内联到设置它的地方，这可以使我们的代码更易读。另一个所有块都具备的酷炫特性是，因为我们创建的块会从其定义的位置获取上下文，所以它不仅可以访问实例变量，还可以访问同一方法中之前定义的局部变量。这意味着我们的块可以用设置时可用的某些值来创建，并在稍后块运行时使用，而无需显式地将它们放入实例变量或通过其他手动方式传递。\n\
    \n请注意，这个版本返回一个类型为 `id` 的值，我们将其存储到一个名为 `observe` 的变量中。块通知观察者需要像其他观察者一样被移除，因此我们可以利用这个返回值，在适当的时候调用以下代码进行清理：\n\
    \n```\n[[NSNotificationCenter defaultCenter] removeObserver:observe];\n```\n\n\
    以这种方式使用块时需要注意的一点是，在 `dealloc` 方法中进行清理可能不够好；如果块显式或间接地使用了 `self` 指针，那么就会发生一种循环引用，导致对象永远无法释放！这引出了我们下一个关于块的主题。\n\
    \n## 为块弱化指针\n\n回到上一个主题，想象我们有一个类，它包含一个名为 `observation` 的实例变量，以及如下的 `init` 和 `dealloc`\
    \ 方法：\n\n```\n@implementation MyController {\n    id observation;\n}\n\n- (id)init\
    \ {\n    if ((self = [super init])) {\n        observation = [[NSNotificationCenter\
    \ defaultCenter]\n                       addObserverForName:@\"ESCHATON\"\n  \
    \                     object:nil\n                       queue:nil\n         \
    \              usingBlock: ^(NSNotification *notification){\n                \
    \           NSLog(@\"notified observer: %@\", self);\n                       }];\n\
    \n    }\n    return self;\n}\n\n- (void)dealloc {\n    [[NSNotificationCenter\
    \ defaultCenter] removeObserver:observation];\n}\n\n@end\n```\n\n乍一看这似乎没问题，但存在一个微妙的问题。这种设置创建了一个循环引用链，这意味着\
    \ `MyController` 实例和 `observation` 对象都永远无法被释放！原因在于，当执行 `init` 并创建块（我们将其传递给 `NSNotificationCenter`）时，会发生一系列特殊事件。在幕后，ARC\
    \ 会确保块内部访问的任何变量都处于“块就绪”状态。这意味着对于普通的 C 类型（`int`、`float` 等），会为块内使用准备一个新的只读变量槽位，而\
    \ Objective-C 对象指针会收到一条 `retain` 消息，从而在整个块的生命周期内增加其引用计数。\n\n同时，被赋值给 `observation`\
    \ 的返回值也由 ARC 妥善处理，它会向其发送一条 `retain` 消息，防止其消失。结果如下：\n\n*   `MyController` 实例持有对\
    \ `observation` 的强引用。\n*   `observation` 对象持有对其块的强引用，因为它“拥有”该块。\n*   该块持有对我们`MyController`\
    \ 实例的强引用。\n\n打破这个循环的方法是将其中一个强引用变为弱引用。最好的方法是将 `init` 修改如下：\n\n```\n- (id)init {\n\
    \    if ((self = [super init])) {\n        __weak id weakSelf = self;\n      \
    \  observation = [[NSNotificationCenter defaultCenter]\n                     \
    \  addObserverForName:@\"ESCHATON\"\n                       object:nil\n     \
    \                  queue:nil\n                       usingBlock: ^(NSNotification\
    \ *notification){\n                           NSLog(@\"notified observer: %@\"\
    , self);\n                           NSLog(@\"notified observer: %@\", weakSelf);\n\
    \                       }];\n\n    }\n    return self;\n}\n```\n\n这里我们声明了一个指向\
    \ `self` 的新弱指针，存储在一个名为 `weakSelf` 的新变量中。这个新指针会在块内部使用。当编译器看到这个时，它理解这是一个弱指针，因此不应该被块保留。这意味着\
    \ `self` 永远不会收到额外的 `retain`，所以它可以在不再使用时被释放。当发生这种情况时，`dealloc` 方法会被执行，`observation`\
    \ 对象被释放，它所拥有的块也随之被释放。\n\n同样重要的是要认识到：一个块会捕获其代码中引用的任何对象，但对于实例变量，被保留的并非实例变量本身，而是\
    \ `self` 指针！原因在于，即使我们在代码中看不到，实例变量是通过一种 C 风格的结构体访问的。实际上，\n\n```\n[tableView reloadData];\n\
    ```\n\n本质上等同于\n\n```\n[self->tableView reloadData];\n```\n\n面对这种情况，编译器的 ARC 规则要求保留\
    \ `self`。\n\n即使我们可能不常遇到这种情况，理解这个机制的工作原理以及我们为何必须诉诸这种变通方法仍然很重要。那些会立即执行并释放的块（例如与枚举器一起使用时）可能不需要这种程度的审查。然而，一旦我们将块传递给另一个对象，并且我们知道它可能会是一个长期存在的对象，或者不确定时，我们就应该格外小心地检查我们的块，确保我们没有意外地为自己埋下隐患。\n\
    \n## 过滤\n\nApple 添加到 Cocoa 中的块另一个用途是 `NSArray` 的 `indexesOfObjectsPassingTest:`\
    \ 方法。这个方法允许我们声明一个块，该块会检查一个对象，并根据我们自己的标准，决定它是否应该包含在输出的索引集合中（然后可以用这个集合从原始数组中提取“符合条件的”对象）。例如，假设我们有一个人员数组，我们可以像这样找到所有名为“Bob”的人：\n\
    \n```\nNSArray *people;  // <- 假设这个数组已存在\nNSIndexSet *bobIndexes = [people indexesOfObjectsPassingTest:\n\
    \    BOOL ^(id obj, NSUInteger idx, BOOL *stop){\n    return [obj.firstName isEqual:@\"\
    Bob\"];\n}];\nNSArray *bobs = [people objectsAtIndexes:bobIndexes];\n```\n\n尽管块的使用一开始可能看起来很棘手，但过一段时间它们就会变得得心应手，一旦你开始使用，你可能会发现越来越多的使用方式。对于每一位\
    \ Cocoa 程序员来说，它们都是一个非常重要的工具。\n"
- fmt: "# Cocoa in a Foreign Language\n\nAs much as some of us love Objective-C, it’s\
    \ not the only game in town, and some people would rather use another language\
    \ for developing Cocoa apps. Maybe you have a particular code library you want\
    \ to make use of, or maybe you just prefer some other language. The good news\
    \ is that there are some languages out there that can interface with Objective-C\
    \ well enough to allow for some Cocoa development through the use of what’s called\
    \ a “bridge” between the other language and Objective-C.\n\nThe bad news, for\
    \ some people at least, is that two of the biggest, most popular languages (C++\
    \ and Java) aren’t among them. You may be wondering why not. Well, without getting\
    \ too deep: C++ and Java are just too inflexible. They don’t have the sort of\
    \ runtime introspection capability that’s required for fully interfacing with\
    \ complex Objective-C class libraries like Cocoa. Maybe, technically, Java has\
    \ got what it takes. In fact, Apple included a Java bridge for building Cocoa\
    \ apps in the first several versions of Mac OS X. But the fact that programmers\
    \ weren’t lining up at the gates to use it, combined with the technical challenge\
    \ of implementing and maintaining the Java bridge, made it not worthwhile for\
    \ them, so Apple abandoned the project several years ago. And because we can actually\
    \ combine Objective-C and C++ together in the form of Objective-C++, the need\
    \ for bridging there is somewhat reduced. There are some real limitations there.\
    \ We can’t, for instance, implement an Objective-C delegate in the form of a C++\
    \ class, so we need to create some “glue classes,” typically paired up across\
    \ the border (one C++, one Objective-C) that are each able to deal with their\
    \ own world and translate things for one another. It works, but that sort of code\
    \ is not much fun to write or maintain.\n\nBack on the good news side of things,\
    \ a batch of popular scripting languages (Ruby, Python, and JavaScript) have solid,\
    \ working bridges that let us do real Cocoa work with them.\n\n## PyObjC\n\nOne\
    \ of the earliest projects to bridge a non-Objective-C language with the Cocoa\
    \ frameworks is PyObjC, which lets us do a significant amount of Cocoa development\
    \ in Python. As you’re well aware by this point, Objective-C’s syntax, in particular\
    \ the intermixing of method names and arguments, is somewhat unusual, and most\
    \ other languages don’t have any equivalent. What PyObjC does is provide mappings\
    \ for all methods in all Objective-C classes included in Cocoa, so that we can\
    \ call them from Python. The mappings are determined by a pretty simple formula:\
    \ the entire Objective-C method name is pushed into a single symbol, with each\
    \ colon in the method name replaced by an underscore character. All the method\
    \ arguments are sent between parentheses, just like a standard C function. All\
    \ objects are automatically bridged so that we can use all the standard Cocoa\
    \ classes right from Python.\n\nFor example, let’s look at a line of code talking\
    \ about notifications. Here’s the Objective-C version:\n\n```\n[[NSNotificationCenter\
    \ defaultCenter]\n  postNotificationName:DATA_RECEIVED object:self];\n```\n\n\
    The Python version, using PyObjC, looks something like this:\n\n```\ncenter =\
    \ NSNotificationCenter.defaultCenter()\ncenter.postNotificationName_object_(DATA_RECEIVED,\
    \ self);\n```\n\nAs you can see, the lack of intermixed method name parts and\
    \ arguments really impacts the readability. Also, on the whole it’s rather “un-Pythonic,”\
    \ so, while it works well for what it does, there are things for all sides to\
    \ be somewhat unhappy about.\n\nPyObjC seems to have reached a stable state a\
    \ few years ago, with most of the past few releases focusing on bug fixes. The\
    \ version available at `http://packages.python.org/pyobjc/` seems to be in good\
    \ shape and is in use in real-world projects.\n\n## MacRuby\n\nOn the Ruby front,\
    \ there are a couple of ways to bridge to Objective-C. For several years, a project\
    \ called RubyCocoa has been available that works similarly to PyObjC in many ways.\n\
    \nHowever, RubyCocoa seems to have stagnated, with most forward momentum having\
    \ shifted to a newer project called MacRuby. This Apple-sponsored project aims\
    \ to bring Ruby syntax to Cocoa in a whole different way. Instead of bridging\
    \ between similar classes, MacRuby takes a different approach, basically jettisoning\
    \ all the existing Ruby standard library classes and using the Cocoa equivalents\
    \ instead, often giving them new methods whose names match their equivalents in\
    \ the Ruby world. This means that experienced Ruby developers who jump on a MacRuby\
    \ project may find that lots of their favorite classes and methods are missing\
    \ or subtly different.\n\nOne interesting difference between MacRuby and both\
    \ PyObjC and RubyCocoa is that MacRuby goes the extra mile to make method calls\
    \ feel similar to the way they do in Objective-C, while still working within Ruby\
    \ syntax. This works by a smart use of Ruby’s keyed arguments, using the name\
    \ of the Ruby method being called and the argument keys to look for a matching\
    \ Objective-C method. Returning to the previous example,\n\n```\n[[NSNotificationCenter\
    \ defaultCenter]\n  postNotificationName:DATA_RECEIVED object:self];\n```\n\n\
    is written like so in MacRuby:\n\n```\ncenter = NSNotificationCenter.defaultCenter\n\
    center.postNotificationName(DATA_RECEIVED, object:self)\n```\n\nWhen MacRuby hits\
    \ that second line, it uses the method name (`postNotificationName`) and the argument\
    \ key (`object`) to look for an Objective-C method called `postNotificationName:object:`\
    \ in the receiver (`center`), finds it, and calls it. If we didn’t include a keyed\
    \ argument for `object`, or included other keyed arguments that aren’t part of\
    \ the underlying method we’re shooting for, this method call wouldn’t find a matching\
    \ Objective-C method and would fail.\n\nOn top of all that, MacRuby offers some\
    \ other interesting features, such as compilation to native code, both just in\
    \ time and ahead of time. It has also moved away from the traditional Ruby VM,\
    \ instead sporting a new runtime built atop of LLVM, which some of you will recognize\
    \ as the most modern of the compilers that Xcode can use.\n\nAt the time of writing,\
    \ MacRuby hasn’t produced a 1.0 version yet, but it’s definitely something to\
    \ keep an eye on via `www.macruby.org`.\n\n## Nu\n\nAnother interesting language\
    \ in this context is Nu. Unlike PyObjC and MacRuby, here it’s not a matter of\
    \ interfacing an existing language to Objective-C. Instead, Nu is essentially\
    \ a whole new language (really a Lisp variant) that is designed specifically for\
    \ interoperation with Objective-C, so it features the same interwoven method and\
    \ argument syntax. Let’s bring back that example one more time. Objective-C:\n\
    \n```\n[[NSNotificationCenter defaultCenter]\n  postNotificationName:DATA_RECEIVED\
    \ object:self];\n```\n\nNu:\n\n```\n((NSNotificationCenter defaultCenter)\n  postNotificationName:DATA_RECEIVED\
    \ object:self)\n```\n\nHow about that! Of course, it’s not completely identical.\
    \ Even ignoring the change from square brackets to parentheses, there are lots\
    \ of other syntax changes when declaring classes, methods, and so on, often stemming\
    \ from Nu’s origins as a Lisp-based language. However, in general there’s a lot\
    \ here that’s immediately recognizable to an Objective-C developer.\n\nApart from\
    \ the language itself, Nu also includes a command-line shell (`nush`), a make-like\
    \ tool (`nuke`), and more. These tools add up to a package that lets us fire up\
    \ a shell and do some ad-hoc scripting using the Cocoa classes we know and love.\
    \ We can interact with live objects and take an exploratory approach to the Cocoa\
    \ frameworks. Head on over to `http://programming.nu` to download it and see more\
    \ about this interesting crossover between Cocoa and Lisp.\n\n## JavaScript\n\n\
    The odd man out here, in some sense, is JavaScript. Everyone knows that JavaScript\
    \ can be used to script web pages, but did you know that you can script your app\
    \ with it?"
  raw: 'Cocoa in a Foreign Language    As much as some of us love Objective-C, it’s
    not the only game in town, and some people would rather use another language for
    developing Cocoa apps. Maybe you have a particular code library you want to make
    use of, or maybe you just prefer some other language. The good news is that there
    are some languages out there that can interface with Objective-C well enough to
    allow for some Cocoa development through the use of what’s called a “bridge” between
    the other language and Objective-C.    The bad news, for some people at least,
    is that two of the biggest, most popular languages (C++ and Java) aren’t among
    them. You may be wondering why not. Well, without getting too deep: C++ and Java
    are just too inflexible. They don’t have the sort of runtime introspection capability
    that’s required for fully interfacing with complex Objective-C class libraries
    like Cocoa. Maybe, technically, Java has got what it takes. In fact, Apple included
    a Java bridge for building Cocoa apps in the first several versions of Mac OS
    X. But the fact that programmers weren’t lining up at the gates to use it, combined
    with the technical challenge of implementing and maintaining the Java bridge,
    made it not worthwhile for them, so Apple abandoned the project several years
    ago. And because we can actually combine Objective-C and C++ together in the form
    of Objective-C++, the need for bridging there is somewhat reduced. There are some
    real limitations there. We can’t, for instance, implement an Objective-C delegate
    in the form of a C++ class, so we need to create some “glue classes,” typically
    paired up across the border (one C++, one Objective-C) that are each able to deal
    with their own world and translate things for one another. It works, but that
    sort of code is not much fun to write or maintain.    Back on the good news side
    of things, a batch of popular scripting languages (Ruby, Python, and JavaScript)
    have solid, working bridges that let us do real Cocoa work with them.    PyObjC    One
    of the earliest projects to bridge a non-Objective-C language with the Cocoa frameworks
    is PyObjC, which lets us do a significant amount of Cocoa development in Python.
    As you’re well aware by this point, Objective-C’s syntax, in particular the intermixing
    of method names and arguments, is somewhat unusual, and most other languages don’t
    have any equivalent. What PyObjC does is provide mappings for all methods in all
    Objective-C classes included in Cocoa, so that we can call them from Python. The
    mappings are determined by a pretty simple formula: the entire Objective-C method
    name is pushed into a single symbol, with each colon in the method name replaced
    by an underscore character. All the method arguments are sent between parentheses,
    just like a standard C function. All objects are automatically bridged so that
    we can use all the standard Cocoa classes right from Python. For example, let’s
    look at a line of code talking about notifications. Here’s the Objective-C version:    ```
    [[NSNotificationCenter defaultCenter]   postNotificationName:DATA_RECEIVED object:self];
    ```    The Python version, using PyObjC, looks something like this:    ``` center
    = NSNotificationCenter.defaultCenter() center.postNotificationName_object_(DATA_RECEIVED,
    self); ```    As you can see, the lack of intermixed method name parts and arguments
    really impacts the readability. Also, on the whole it’s rather “un-Pythonic,”
    so, while it works well for what it does, there are things for all sides to be
    somewhat unhappy about.    PyObjC seems to have reached a stable state a few years
    ago, with most of the past few releases focusing on bug fixes. The version available
    at `http://packages.python.org/pyobjc/` seems to be in good shape and is in use
    in real-world projects.    MacRuby    On the Ruby front, there are a couple of
    ways to bridge to Objective-C. For several years, a project called RubyCocoa has
    been available that works similarly to PyObjC in many ways.


    However, RubyCocoa seems to have stagnated, with most forward momentum having
    shifted to a newer project called MacRuby. This Apple-sponsored project aims to
    bring Ruby syntax to Cocoa in a whole different way. Instead of bridging between
    similar classes, MacRuby takes a different approach, basically jettisoning all
    the existing Ruby standard library classes and using the Cocoa equivalents instead,
    often giving them new methods whose names match their equivalents in the Ruby
    world. This means that experienced Ruby developers who jump on a MacRuby project
    may find that lots of their favorite classes and methods are missing or subtly
    different.    One interesting difference between MacRuby and both PyObjC and RubyCocoa
    is that MacRuby goes the extra mile to make method calls feel similar to the way
    they do in Objective-C, while still working within Ruby syntax. This works by
    a smart use of Ruby’s keyed arguments, using the name of the Ruby method being
    called and the argument keys to look for a matching Objective-C method. Returning
    to the previous example,    ``` [[NSNotificationCenter defaultCenter]   postNotificationName:DATA_RECEIVED
    object:self]; ```    is written like so in MacRuby:    ``` center = NSNotificationCenter.defaultCenter
    center.postNotificationName(DATA_RECEIVED, object:self) ```    When MacRuby hits
    that second line, it uses the method name (`postNotificationName`) and the argument
    key (`object`) to look for an Objective-C method called `postNotificationName:object:`
    in the receiver (`center`), finds it, and calls it. If we didn’t include a keyed
    argument for `object`, or included other keyed arguments that aren’t part of the
    underlying method we’re shooting for, this method call wouldn’t find a matching
    Objective-C method and would fail.    On top of all that, MacRuby offers some
    other interesting features, such as compilation to native code, both just in time
    and ahead of time. It has also moved away from the traditional Ruby VM, instead
    sporting a new runtime built atop of LLVM, which some of you will recognize as
    the most modern of the compilers that Xcode can use.    At the time of writing,
    MacRuby hasn’t produced a 1.0 version yet, but it’s definitely something to keep
    an eye on via `www.macruby.org`.    Nu    Another interesting language in this
    context is Nu. Unlike PyObjC and MacRuby, here it’s not a matter of interfacing
    an existing language to Objective-C. Instead, Nu is essentially a whole new language
    (really a Lisp variant) that is designed specifically for interoperation with
    Objective-C, so it features the same interwoven method and argument syntax. Let’s
    bring back that example one more time. Objective-C:    ``` [[NSNotificationCenter
    defaultCenter]   postNotificationName:DATA_RECEIVED object:self]; ```    Nu:    ```
    ((NSNotificationCenter defaultCenter)   postNotificationName:DATA_RECEIVED object:self)
    ```    How about that! Of course, it’s not completely identical. Even ignoring
    the change from square brackets to parentheses, there are lots of other syntax
    changes when declaring classes, methods, and so on, often stemming from Nu’s origins
    as a Lisp-based language. However, in general there’s a lot here that’s immediately
    recognizable to an Objective-C developer.    Apart from the language itself, Nu
    also includes a command-line shell (nush), a make-like tool (nuke), and more.
    These tools add up to a package that lets us fire up a shell and do some ad-hoc
    scripting using the Cocoa classes we know and love. We can interact with live
    objects and take an exploratory approach to the Cocoa frameworks. Head on over
    to `http://programming.nu` to download it and see more about this interesting
    crossover between Cocoa and Lisp.    JavaScript    The odd man out here, in some
    sense, is JavaScript. Everyone knows that JavaScript can be used to script web
    pages, but did you know that you can script your app with it?'
  trans: "\n# 异域风味的 Cocoa\n\n尽管我们中有些人热爱 Objective-C，但它并非唯一的选择，有些人更愿意使用其他语言来开发 Cocoa\
    \ 应用。也许是因为你有一个特定的代码库想要利用，或者只是你更喜欢其他语言。好消息是，存在一些语言能够很好地与 Objective-C 对接，通过使用所谓的“桥接”技术，在它们与\
    \ Objective-C 之间搭建桥梁，从而进行一些 Cocoa 开发。\n\n坏消息（至少对某些人而言）是，两个最大、最流行的语言（C++ 和 Java）并不在其中。你可能想知道为什么。嗯，简单来说：C++\
    \ 和 Java 太不灵活了。它们缺乏与 Cocoa 这样复杂的 Objective-C 类库完全对接所需的运行时内省能力。也许从技术上讲，Java 具备这种能力。事实上，苹果在\
    \ Mac OS X 最初的几个版本中就包含了一个用于构建 Cocoa 应用的 Java 桥接。但程序员们并未趋之若鹜地使用它，再加上实现和维护 Java\
    \ 桥接的技术挑战，使得这项投入得不偿失，因此苹果在几年前放弃了该项目。而且，由于我们实际上可以通过 Objective-C++ 的形式将 Objective-C\
    \ 和 C++ 结合起来，这在一定程度上降低了对桥接的需求。但这里有一些实际限制。例如，我们不能以 C++ 类的形式实现 Objective-C 代理，因此需要创建一些“胶水类”，通常成对跨边界（一个\
    \ C++ 类，一个 Objective-C 类），每个类都能处理自己领域的事务并为对方翻译内容。这虽然可行，但编写和维护这类代码并不有趣。\n\n回到好消息方面，一批流行的脚本语言（Ruby、Python\
    \ 和 JavaScript）拥有稳定、可用的桥接，使我们能够用它们进行真正的 Cocoa 开发。\n\n## PyObjC\n\n将非 Objective-C\
    \ 语言与 Cocoa 框架桥接的最早项目之一是 PyObjC，它让我们可以用 Python 进行大量的 Cocoa 开发。至此你应该很清楚，Objective-C\
    \ 的语法，特别是方法名和参数的交错，有些不同寻常，而大多数其他语言并没有等价物。PyObjC 所做的是为 Cocoa 中包含的所有 Objective-C\
    \ 类中的所有方法提供映射，以便我们可以从 Python 中调用它们。这些映射由一个非常简单的规则决定：整个 Objective-C 方法名被压缩成一个单一的符号，方法名中的每个冒号都被替换为下划线字符。所有方法参数都被放在括号中传达，就像标准的\
    \ C 函数一样。所有对象都自动桥接，这样我们就可以直接从 Python 中使用所有标准的 Cocoa 类。\n\n例如，让我们来看一段关于通知的代码。这是\
    \ Objective-C 版本：\n\n```\n[[NSNotificationCenter defaultCenter]\n  postNotificationName:DATA_RECEIVED\
    \ object:self];\n```\n\n使用 PyObjC 的 Python 版本大致如下：\n\n```\ncenter = NSNotificationCenter.defaultCenter()\n\
    center.postNotificationName_object_(DATA_RECEIVED, self);\n```\n\n如你所见，缺少了交错的方法名部分和参数，确实影响了可读性。此外，总体而言，它相当“非\
    \ Python 化”，所以，虽然它在其功能上运行良好，但各方都有些不满意之处。\n\nPyObjC 似乎在几年前达到了稳定状态，最近几个版本主要集中在修复\
    \ bug 上。在 `http://packages.python.org/pyobjc/` 上可用的版本似乎状态良好，并且正在实际项目中使用。\n\n##\
    \ MacRuby\n\n在 Ruby 方面，有几种方法可以桥接到 Objective-C。多年来，一个名为 RubyCocoa 的项目一直可用，它在许多方面与\
    \ PyObjC 类似。\n\n然而，RubyCocoa 似乎已经停滞不前，大部分发展势头已转移到一个名为 MacRuby 的新项目。这个由苹果赞助的项目旨在以一种完全不同的方式将\
    \ Ruby 语法引入 Cocoa。MacRuby 没有桥接相似的类，而是采取了不同的方法，基本上抛弃了所有现有的 Ruby 标准库类，转而使用 Cocoa\
    \ 中的等价类，并且经常为它们提供名称与 Ruby 世界中等价类相匹配的新方法。这意味着，投身于 MacRuby 项目的有经验的 Ruby 开发者可能会发现，他们许多最喜爱的类和方法要么缺失，要么有细微差别。\n\
    \nMacRuby 与 PyObjC 和 RubyCocoa 的一个有趣区别在于，MacRuby 会多走一步，使方法调用的感觉更接近 Objective-C\
    \ 中的方式，同时仍在 Ruby 语法内工作。这通过巧妙使用 Ruby 的关键字参数来实现，使用被调用的 Ruby 方法名和参数键来寻找匹配的 Objective-C\
    \ 方法。回到之前的例子：\n\n```\n[[NSNotificationCenter defaultCenter]\n  postNotificationName:DATA_RECEIVED\
    \ object:self];\n```\n\n在 MacRuby 中写成这样：\n\n```\ncenter = NSNotificationCenter.defaultCenter\n\
    center.postNotificationName(DATA_RECEIVED, object:self)\n```\n\n当 MacRuby 处理第二行代码时，它会使用方法名（`postNotificationName`）和参数键（`object`）在接收者（`center`）中寻找名为\
    \ `postNotificationName:object:` 的 Objective-C 方法，找到它，然后调用它。如果我们没有包含 `object`\
    \ 的关键字参数，或者包含了不属于我们目标底层方法的其他关键字参数，那么这个方法调用将找不到匹配的 Objective-C 方法并失败。\n\n除此之外，MacRuby\
    \ 还提供了一些其他有趣的功能，例如编译成本地代码，既支持即时编译也支持提前编译。它也已经脱离了传统的 Ruby 虚拟机，转而采用一个构建在 LLVM 之上的新运行时，你们中的一些人会认出\
    \ LLVM 是 Xcode 能使用的最现代的编译器之一。\n\n在撰写本文时，MacRuby 尚未发布 1.0 版本，但绝对值得通过 `www.macruby.org`\
    \ 关注。\n\n## Nu\n\n在这个背景下，另一个有趣的语言是 Nu。与 PyObjC 和 MacRuby 不同，这里不是将现有语言与 Objective-C\
    \ 对接的问题。实际上，Nu 本质上是一种全新的语言（实际上是 Lisp 的一个变体），它是专门为与 Objective-C 互操作而设计的，因此它具有同样的交织方法名和参数语法。让我们再次举出那个例子。Objective-C：\n\
    \n```\n[[NSNotificationCenter defaultCenter]\n  postNotificationName:DATA_RECEIVED\
    \ object:self];\n```\n\nNu：\n\n```\n((NSNotificationCenter defaultCenter)\n  postNotificationName:DATA_RECEIVED\
    \ object:self)\n```\n\n怎么样！当然，它并非完全相同。即使忽略从方括号到圆括号的变化，在声明类、方法等方面还有许多其他语法变化，这通常源于\
    \ Nu 作为基于 Lisp 的语言的起源。不过，总的来说，这里有很多是 Objective-C 开发者一眼就能认出的。\n\n除了语言本身，Nu 还包含一个命令行\
    \ shell（`nush`）、一个类似 make 的工具（`nuke`）等等。这些工具组合成一个软件包，让我们可以启动一个 shell，并利用我们熟知并喜爱的\
    \ Cocoa 类进行一些临时脚本编写。我们可以与活动对象交互，并采用探索性的方法来研究 Cocoa 框架。请访问 `http://programming.nu`\
    \ 下载它，并了解更多关于 Cocoa 和 Lisp 这个有趣交集的信息。\n\n## JavaScript\n\n从某种意义上说，这里格格不入的是 JavaScript。每个人都知道\
    \ JavaScript 可以用于编写网页脚本，但你知道你也可以用它来为你的应用编写脚本吗？\n"
- fmt: 'Mac OS X 自带的 `WebKit` 框架不允许我们完全用 JavaScript 创建应用，但它允许我们包含一个脚本层（无论是否使用 Web
    视图），让熟悉 JavaScript 的人能够定义应用中的部分行为。我们最可能将它与 Web 视图结合使用。通过 WebKit 中的 `WebView` 类，我们可以“穿透”到
    `WebScriptObject`，这让我们能够从 Objective-C 调用 JavaScript 函数，同时也允许我们将一个 Objective-C
    对象暴露给 JavaScript 解释器，使 JavaScript 代码能够调用 Objective-C 方法，其方法到函数的映射方式类似于我们为 `PyObjC`
    描述的那样。如果我们希望使用 `WebView` 来布局 GUI，但仍需在 GUI 中包含能够影响 JavaScript 环境外部事物的控件，这主要会很有用。


    但等等，还有更多！除了 WebKit 提供的 JavaScript 支持外，还有一个名为 `JSCocoa` 的第三方选项，它使用与 WebKit 相同的
    JavaScript 引擎（`JavaScriptCore`）将 JavaScript 与 Cocoa 完全桥接。这让我们可以用 JavaScript 编写完整的
    Cocoa 应用，就像用 Python 或 Ruby 一样。`JSCocoa` 的一个优秀特性（它与本章最后一节描述的 `Cappuccino` 共享此特性）是，除了在
    JavaScript 风格函数名与 Objective-C 方法名之间进行转换外，`JSCocoa` 实际上还允许我们使用一种与 Objective-C 惊人相似的语法来编写
    JavaScript。


    ```

    [[NSNotificationCenter defaultCenter] postNotificationName:DATA_RECEIVED object:self];

    ```


    `JSCocoa`:


    ```

    [[NSNotificationCenter defaultCenter] postNotificationName:DATA_RECEIVED object:self]

    ```


    没错——唯一的区别是少了分号，因为在 JavaScript 中，如果一行的结尾也是一个有效的语句结束符，我们就不需要分号。我们第一个承认这看起来像一个 JavaScript
    奇迹：我们没有足够的 JavaScript 知识来理解这个技巧是如何实现的，可能永远也不会，但这没关系。想了解更多信息，请访问 `http://inexdo.com/JSCocoa`。


    **F-Script**


    如果不提及 `F-Script`，关于 Cocoa 编程的替代语言的讨论就不完整。与大多数最终旨在让我们用另一种语言构建 Cocoa 应用的语言桥不同，`F-Script`
    似乎有几个互补的目的。首先，我们可以将 `F-Script` 嵌入到我们的应用中，从而为应用添加用户脚本支持，包括用于输入和尝试以 `F-Script` 语言（基于
    Smalltalk，因此与 Objective-C 非常相似）编写的脚本的 GUI 组件。


    `F-Script` 的另一个（或许更有用的）特性是它为开发者提供的工具，即一个交互式命令外壳，让我们能探索正在运行的应用。这包括一个图形浏览器，可以让我们在应用的对象之间导航，检查它们的属性，遍历与其他对象的关系，等等。这就像是把
    Xcode 调试器的交互性提升到了最高档。


    不仅如此，我们还可以将 `F-Script` 注入任何正在运行的 Cocoa 应用，并使用相同的工具探索其对象！虽然在没有目标应用源码的情况下，这一功能没那么有用，但能够浏览其他应用的结构可以极具教育意义——而且也很有趣。所有
    Cocoa 开发者都应该对这个工具有所了解。请访问 `http://www.fscript.org` 亲自尝试一下。


    **移植的 Cocoa**


    本书主要介绍 Mac 软件开发（书名就说明了这一点），但如果不提及其他可能应用 Cocoa 及类 Cocoa 技术的领域，那就对不住您了。


    **Cocoa Touch**


    如今，随着 iPhone 开发的飞速发展，想必本书的每位读者都了解一些 iPhone 开发模型，以及它基于 Objective-C 的事实。事实上，很有把握地说，您很可能在试水
    Mac 开发之前就已经做过一些 iPhone 开发了。尽管如此，还是值得提一下 iPhone 的 `Cocoa Touch` 框架，以及它与我们一直在介绍的
    `Cocoa` 框架有何不同。


    Cocoa 的核心类分布在两个框架中：`Foundation` 包含所有在各种开发中都很有用的基础类（如 `NSString`、`NSArray` 等），而
    `AppKit` 包含所有特定于桌面 GUI 应用开发的类（如 `NSApplication`、`NSView`、`NSWindow` 等）。在 iPhone
    的 `Cocoa Touch` 中，`Foundation` 框架基本相同，但 `AppKit` 被移除，并由 `UIKit` 取代。


    `UIKit` 的许多基础与 `AppKit` 相似，但做了一些调整，使其能在支持加速计的小型触摸屏设备上轻松工作。每个应用都有一个单一的 `UIWindow`，所有绘制都在其中进行，而这个
    `UIWindow` 包含一个 `UIView` 子类（如 `UIButton`、`UITextField` 等）的层级结构。尽管 `AppKit` 仅有的原生用户输入方式是鼠标和键盘，但
    `UIKit` 也提供了类似的基于事件的输入，用于处理多个屏幕触摸以及设备移动。


    在其他方面，`UIKit` 有点像“AppKit 2.0”。苹果趁机抛弃了一些累赘，这些 API 和类可能在一二十年前看起来是个好主意，但现在已显得多余。例如，与视图不同的单元格类（如
    `NSCell` 类所展示的）整个概念现已不复存在。唯一名称中包含 *cell* 的 `UIKit` 类是 `UITableViewCell`，它实际上是一个用于绘制表格视图某一块的
    `UIView` 子类（因此得名）。此外，`UIKit` 以一种 `AppKit` 从未有过的方式接受了 Objective-C 2.0 的属性，为大多数可配置属性提供了声明的属性。


    除此之外，Cocoa 中还有一些重要部分在 `Cocoa Touch` 中不可用（至少写作本书时是这样）。具体来说，就您在本书中读到的内容而言，最大的缺失部分是
    `Cocoa Bindings`。`KVC` 和 `KVO` 是存在的，所以如果您雄心勃勃，构建自己的绑定技术的基础是有的。如果不这样做，您会发现 iOS
    应用中有很大一部分是样板代码，用于将模型对象的值推送到各种视图和控件中。


    **GNUstep 和 Cocotron**


    另一个可以运行类 Cocoa 应用的平台是 `GNUstep` 及其较新的兄弟项目 `Cocotron`。`GNUstep` 项目已经存在很长时间了，其最初目标是为
    Linux 和其他 Unix 机器提供桌面应用编程环境。开发库基于 `OpenStep` API，这是一个已发布的标准，列出了属于今天 `Foundation`
    和 `AppKit` 框架子集的类和 API。而这又源于 1990 年代中期 NeXT 与 Sun 的合作，当时 Sun 希望为其 `Solaris` 操作系统提供一个应用开发环境，所有这些都发生在苹果后来收购
    NeXT 之前，NeXT 的操作系统和软件后来演变成了 Mac OS X。


    所以，时至今日，`GNUstep` 仍活跃在开源社区中。`GNUstep` 持续发展，随着志愿者重新实现苹果添加到 Mac OS X 的最新功能而获取新的
    API，但其主要目标一直是实现旧的 `OpenStep` API，新增功能只是锦上添花。到目前为止，`GNUstep` 在知名项目方面还没有太多可吹嘘的，但作为将
    Cocoa 应用移植到其他 Unix 变体或 Windows 的一种方式，值得关注 `www.gnustep.org` 上的 `GNUstep`。


    几年前，出现了一个名为 `Cocotron` 的新替代方案。'
  raw: 'The WebKit framework included with Mac OS X won’t let us create an entire
    app in JavaScript, but it does let us include a scripting layer, with or without
    a web view, that lets someone familiar with JavaScript define some of what happens
    in the application.    This is something we’re most likely to use in conjunction
    with a web view. Using the `WebView` class from WebKit, we can “reach through”
    to a `WebScriptObject`, which lets us call JavaScript functions from Objective-C,
    and also lets us expose an Objective-C object to the JavaScript interpreter so
    that the JavaScript code can call Objective-C methods using a method-to-function
    mapping similar to what we described for PyObjC. This is primarily useful if we
    want to use a `WebView` to lay out our GUI but still include controls in our GUI
    that can affect things outside of the JavaScript environment.    But wait, there’s
    more! Besides the JavaScript support that WebKit gives us, there’s a third-party
    option called JSCocoa that fully bridges JavaScript with Cocoa using the same
    JavaScript engine (JavaScriptCore) that’s a part of WebKit. This lets us write
    complete Cocoa applications in JavaScript, much like we can in Python or Ruby.
    One nice feature of JSCocoa, which it shares with Cappuccino (described in the
    final section of this chapter) is that, in addition to the translation between
    JavaScript-style function names and Objective-C method names, JSCocoa actually
    lets us write our JavaScript in a syntax that is hauntingly similar to Objective-C.    ```
    [[NSNotificationCenter defaultCenter]   postNotificationName:DATA_RECEIVED object:self];
    ```    JSCocoa:    ``` [[NSNotificationCenter defaultCenter]   postNotificationName:DATA_RECEIVED
    object:self] ```    That’s right—the only difference is the absent semicolon because
    we don’t need a semicolon at the end of a line of JavaScript if the end of the
    line is also a valid statement ending. We’re the first to admit that this seems
    like a JavaScript miracle: we don’t have the JavaScript knowledge to have the
    slightest idea how this trick was pulled off, and probably never will, but that’s
    okay. To learn more about this, go to  `http://inexdo.com/JSCocoa`.    F-Script    No
    discussion of alternate languages for programming in Cocoa would be complete without
    mentioning F-Script. Unlike most of the language bridges, which are ultimately
    meant to let us build Cocoa apps in a different language, F-Script seems to have
    a couple of complementary purposes. First of all, we can embed F-Script into our
    applications, providing an easy way to add user scripting to our apps, including
    GUI components for entering and trying out scripts written in the F-Script language,
    which is based on Smalltalk and is therefore pretty similar to Objective-C.    The
    other, perhaps even more useful features of F-Script are the tools it provides
    to us, the developers, in the form of an interactive command shell that lets us
    explore our running application. This includes a graphical browser that lets us
    navigate among the objects in our application, inspecting their properties, traversing
    relationships to other objects, and so on. It’s like taking the interactivity
    of Xcode’s debugger and turning it up to 11.    Not only that, we can also inject
    F-Script into any running Cocoa application and use the same tools to explore
    its objects! Although this functionality is not as useful without the target app’s
    source, being able to browse the structure of other applications can be highly
    educational—and fun as well. All Cocoa developers should have some familiarity
    with this tool. Head over to `` `http://www.fscript.org` to try this out for yourself.
    ``   ``Ported Cocoa    This book is primarily about making Mac software (it’s
    right there in the title), but we’d be doing you a disservice if we didn’t point
    out the other areas where Cocoa and Cocoa-ish technologies may be applied.


    Cocoa Touch    These days, with iPhone development growing by leaps and bounds,
    presumably everyone reading this book knows a bit about the iPhone development
    model and the fact that it’s based around Objective-C. In fact, it’s a pretty
    safe bet that you probably did some iPhone development before testing the Mac
    waters. In spite of that, it’s worth mentioning the iPhone’s Cocoa Touch frameworks
    and how it differs from the Cocoa frameworks we’ve been covering.    Cocoa’s core
    classes are split between two frameworks: Foundation contains all the fundamental
    classes that can be useful in every type of development (`NSString`, `NSArray`,
    and so on), and AppKit contains all the classes that are specific to desktop GUI
    app development (`NSApplication`, `NSView`, `NSWindow`, and so on). In Cocoa Touch
    on the iPhone, the Foundation framework is about the same, but the AppKit is gone,
    and UIKit has taken its place.    Many of the fundamentals of UIKit are similar
    to AppKit, with a few twists to make it work easily on a small, accelerometer-enabled,
    touch-screen device. Each application has a single `UIWindow` where all drawing
    occurs, and that `UIWindow` contains a hierarchy of `UIView` subclasses (such
    as `UIButton`, `UITextField`, and the like). Although AppKit’s only native user
    input methods are mouse and keyboard, UIKit also provides similar event-based
    input for handling multiple onscreen touches as well as movement of the device.    In
    some other ways, UIKit is sort of “AppKit 2.0.” Apple took the opportunity to
    toss out some baggage in the form of APIs and classes that may have seemed like
    a good idea a decade or two ago, but now seem unnecessary. For instance, the whole
    concept of cell classes distinct from views (as exhibited by the `NSCell` classes)
    is now gone. The only UIKit class with *cell* in its name is `UITableViewCell`,
    which is really a `UIView` subclass used to draw a chunk of a table view (hence
    the name). Also, UIKit embraces Objective-C 2.0’s properties in a way that AppKit
    never has, providing declared properties for most of the configurable attributes.    Apart
    from that, there are a few important parts of Cocoa that aren’t available in Cocoa
    Touch (at least, not as of this writing). Specifically, in terms of what you’ve
    read in this book, the biggest missing piece is Cocoa Bindings. KVC and KVO are
    there, so, if you’re feeling ambitious, the underpinnings for building your own
    binding technology are there. Without doing that, you’ll find that a big chunk
    of any iOS app is glue code that’s pushing values from model objects into various
    kinds of views and controls.    GNUstep and Cocotron    Another platform that
    can run Cocoa-like apps is GNUstep and its more recent brother-in-arms, Cocotron.
    The GNUstep project has been around for a long time, and its original goals were
    centered on providing a desktop application programming environment for Linux
    and other Unix machines. The development libraries were based around the OpenStep
    API, a published standard that lists classes and APIs that are a subset of today’s
    Foundation and AppKit frameworks. That, in turn, came from a collaboration between
    NeXT and Sun in the mid-1990s when Sun wanted help providing an application development
    environment for their Solaris OS, all of which preceded Apple’s later acquisition
    of NeXT, whose OS and software later morphed into Mac OS X.    So here we are
    today, and GNUstep is still out there in the wild. GNUstep continues to grow,
    acquiring new APIs as volunteers reimplement the latest things that Apple adds
    to Mac OS X, but its main goal has always been to implement the old OpenStep APIs,
    with the new additions being just a bonus. So far, there’s not much for GNUstep
    to shout about in terms of big-name projects, but as a way to port a Cocoa app
    to another Unix variant or to Windows, GNUstep at `www.gnustep.org` is worth looking
    into.    A few years ago, a new alternative called Cocotron turned up.'
  trans: '

    Mac OS X 自带的 `WebKit` 框架不允许我们完全用 JavaScript 创建应用，但它允许我们包含一个脚本层（无论是否使用 Web 视图），让熟悉
    JavaScript 的人能够定义应用中的部分行为。我们最可能将它与 Web 视图结合使用。通过 WebKit 中的 `WebView` 类，我们可以“穿透”到
    `WebScriptObject`，这让我们能够从 Objective-C 调用 JavaScript 函数，同时也允许我们将一个 Objective-C
    对象暴露给 JavaScript 解释器，使 JavaScript 代码能够调用 Objective-C 方法，其方法到函数的映射方式类似于我们为 `PyObjC`
    描述的那样。如果我们希望使用 `WebView` 来布局 GUI，但仍需在 GUI 中包含能够影响 JavaScript 环境外部事物的控件，这主要会很有用。


    但等等，还有更多！除了 WebKit 提供的 JavaScript 支持外，还有一个名为 `JSCocoa` 的第三方选项，它使用与 WebKit 相同的
    JavaScript 引擎（`JavaScriptCore`）将 JavaScript 与 Cocoa 完全桥接。这让我们可以用 JavaScript 编写完整的
    Cocoa 应用，就像用 Python 或 Ruby 一样。`JSCocoa` 的一个优秀特性（它与本章最后一节描述的 `Cappuccino` 共享此特性）是，除了在
    JavaScript 风格函数名与 Objective-C 方法名之间进行转换外，`JSCocoa` 实际上还允许我们使用一种与 Objective-C 惊人相似的语法来编写
    JavaScript。


    ```

    [[NSNotificationCenter defaultCenter] postNotificationName:DATA_RECEIVED object:self];

    ```


    `JSCocoa`：


    ```

    [[NSNotificationCenter defaultCenter] postNotificationName:DATA_RECEIVED object:self]

    ```


    没错——唯一的区别是少了分号，因为在 JavaScript 中，如果一行的结尾也是一个有效的语句结束符，我们就不需要分号。我们第一个承认这看起来像一个 JavaScript
    奇迹：我们没有足够的 JavaScript 知识来理解这个技巧是如何实现的，可能永远也不会，但这没关系。想了解更多信息，请访问 `http://inexdo.com/JSCocoa`。


    **F-Script**


    如果不提及 `F-Script`，关于 Cocoa 编程的替代语言的讨论就不完整。与大多数最终旨在让我们用另一种语言构建 Cocoa 应用的语言桥不同，`F-Script`
    似乎有几个互补的目的。首先，我们可以将 `F-Script` 嵌入到我们的应用中，从而为应用添加用户脚本支持，包括用于输入和尝试以 `F-Script` 语言（基于
    Smalltalk，因此与 Objective-C 非常相似）编写的脚本的 GUI 组件。


    `F-Script` 的另一个（或许更有用的）特性是它为开发者提供的工具，即一个交互式命令外壳，让我们能探索正在运行的应用。这包括一个图形浏览器，可以让我们在应用的对象之间导航，检查它们的属性，遍历与其他对象的关系，等等。这就像是把
    Xcode 调试器的交互性提升到了最高档。


    不仅如此，我们还可以将 `F-Script` 注入任何正在运行的 Cocoa 应用，并使用相同的工具探索其对象！虽然在没有目标应用源码的情况下，这一功能没那么有用，但能够浏览其他应用的结构可以极具教育意义——而且也很有趣。所有
    Cocoa 开发者都应该对这个工具有所了解。请访问 `http://www.fscript.org` 亲自尝试一下。


    **移植的 Cocoa**


    本书主要介绍 Mac 软件开发（书名就说明了这一点），但如果不提及其他可能应用 Cocoa 及类 Cocoa 技术的领域，那就对不住您了。


    **Cocoa Touch**


    如今，随着 iPhone 开发的飞速发展，想必本书的每位读者都了解一些 iPhone 开发模型，以及它基于 Objective-C 的事实。事实上，很有把握地说，您很可能在试水
    Mac 开发之前就已经做过一些 iPhone 开发了。尽管如此，还是值得提一下 iPhone 的 `Cocoa Touch` 框架，以及它与我们一直在介绍的
    `Cocoa` 框架有何不同。


    Cocoa 的核心类分布在两个框架中：`Foundation` 包含所有在各种开发中都很有用的基础类（如 `NSString`、`NSArray` 等），而
    `AppKit` 包含所有特定于桌面 GUI 应用开发的类（如 `NSApplication`、`NSView`、`NSWindow` 等）。在 iPhone
    的 `Cocoa Touch` 中，`Foundation` 框架基本相同，但 `AppKit` 被移除，并由 `UIKit` 取代。


    `UIKit` 的许多基础与 `AppKit` 相似，但做了一些调整，使其能在支持加速计的小型触摸屏设备上轻松工作。每个应用都有一个单一的 `UIWindow`，所有绘制都在其中进行，而这个
    `UIWindow` 包含一个 `UIView` 子类（如 `UIButton`、`UITextField` 等）的层级结构。尽管 `AppKit` 仅有的原生用户输入方式是鼠标和键盘，但
    `UIKit` 也提供了类似的基于事件的输入，用于处理多个屏幕触摸以及设备移动。


    在其他方面，`UIKit` 有点像“AppKit 2.0”。苹果趁机抛弃了一些累赘，这些 API 和类可能在一二十年前看起来是个好主意，但现在已显得多余。例如，与视图不同的单元格类（如
    `NSCell` 类所展示的）整个概念现已不复存在。唯一名称中包含 *cell* 的 `UIKit` 类是 `UITableViewCell`，它实际上是一个用于绘制表格视图某一块的
    `UIView` 子类（因此得名）。此外，`UIKit` 以一种 `AppKit` 从未有过的方式接受了 Objective-C 2.0 的属性，为大多数可配置属性提供了声明的属性。


    除此之外，Cocoa 中还有一些重要部分在 `Cocoa Touch` 中不可用（至少写作本书时是这样）。具体来说，就您在本书中读到的内容而言，最大的缺失部分是
    `Cocoa Bindings`。`KVC` 和 `KVO` 是存在的，所以如果您雄心勃勃，构建自己的绑定技术的基础是有的。如果不这样做，您会发现 iOS
    应用中有很大一部分是样板代码，用于将模型对象的值推送到各种视图和控件中。


    **GNUstep 和 Cocotron**


    另一个可以运行类 Cocoa 应用的平台是 `GNUstep` 及其较新的兄弟项目 `Cocotron`。`GNUstep` 项目已经存在很长时间了，其最初目标是为
    Linux 和其他 Unix 机器提供桌面应用编程环境。开发库基于 `OpenStep` API，这是一个已发布的标准，列出了属于今天 `Foundation`
    和 `AppKit` 框架子集的类和 API。而这又源于 1990 年代中期 NeXT 与 Sun 的合作，当时 Sun 希望为其 `Solaris` 操作系统提供一个应用开发环境，所有这些都发生在苹果后来收购
    NeXT 之前，NeXT 的操作系统和软件后来演变成了 Mac OS X。


    所以，时至今日，`GNUstep` 仍活跃在开源社区中。`GNUstep` 持续发展，随着志愿者重新实现苹果添加到 Mac OS X 的最新功能而获取新的
    API，但其主要目标一直是实现旧的 `OpenStep` API，新增功能只是锦上添花。到目前为止，`GNUstep` 在知名项目方面还没有太多可吹嘘的，但作为将
    Cocoa 应用移植到其他 Unix 变体或 Windows 的一种方式，值得关注 `www.gnustep.org` 上的 `GNUstep`。


    几年前，出现了一个名为 `Cocotron` 的新替代方案。

