    \ endEditingFor:nil]`。让我们看看它的两个部分。首先，`_window`实例变量从何而来？Xcode 通过一个声明的属性（在`VillainTrackerAppDelegate.h`文件中生成）为我们构建了它，并自动连接到窗口：\n\
    \n```objectivec\n@property (assign) IBOutlet NSWindow *window;\n```\n\n由于我们没有通过`@synthesize`声明给出显式名称，Xcode\
    \ 默认创建了一个带下划线前缀的实例变量。其次，我们在窗口上调用的方法是`endEditingFor:`。这简单地告诉窗口：是时候结束用户当前正在进行的任何其他编辑行为（例如在文本字段中打字）了。我们需要调用此方法，以便将编辑后的值“保存”到其底层反派对象中，因为稍后在`newVillain:`中，我们将更改表格视图的选择，这反过来可能会清空各个控件中显示的值！\n\
    \n## 选择一个反派\n\n我们应用的详情部分仍然只显示列表中的第一个反派。为了更新详情视图，我们需要实现一个委托方法，该方法在表格视图选择发生变化时被调用。这让我们能注意到用户选择了哪一行，将我们的反派实例变量指向反派数组中的相应行，并重新显示所有其他控件以匹配新的选择。将以下方法添加到`VillianTrackerAppDelegate.m`的`@implementation`部分：\n\
