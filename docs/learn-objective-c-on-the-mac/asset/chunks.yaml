  trans: "\n# 高级绘图主题\n\n然而，Cocoa 的绘图功能远不止于此，我们还能绘制更复杂的曲线、让绘图响应鼠标事件以及为视图添加动画效果，这些内容都将在下一章中介绍。\n\
    \n第 14 章提供了 Cocoa 核心绘图概念的基础知识，例如使用路径描述形状、将图像复制到屏幕以及渲染文本。本章将在此基础上进一步展开，演示一些让图形活灵活现的技巧。第一部分将介绍如何让视图响应鼠标事件，使用户能够与自定义视图进行交互。第二部分将简要介绍\
    \ Core Animation，这项令人兴奋的技术只需几行代码就能创建流畅的动画效果。\n\n## 编辑曲线\n\n第 14 章介绍了用于绘制圆角矩形、椭圆、直线和点的`NSBezierPath`类。如果你在\
    \ Photoshop 或其他应用中使用过贝塞尔绘图工具，可能会好奇这些形状与贝塞尔曲线究竟有何关联！贝塞尔曲线本质上是一系列描述路径的点，以及描述点之间曲线的控制点。因此，基本上任何能用笔（现实世界中的笔，或计算机图形系统中的虚拟笔）绘制的形状，包括直线和锯齿形角度，都可以描述为贝塞尔曲线。\n\
    \n然而，通俗地说，贝塞尔曲线通常指的是类似图 15-1 中所示的形状。图中黑色曲线即为贝塞尔曲线，它由两个端点（左下角和右上角）以及两个控制点定义，这些控制点以杆端巨大的圆圈表示。用户通过拖拽控制点来改变曲线的形状。此类视图可用作节奏控制器，用于确定某些数值随时间变化的速率，例如物体从一点移动到另一点的运动。将曲线变成直线可实现完美的线性过渡，或制作出\
    \ S 形曲线，使数值开始变化缓慢，中途快速上升，接近目标值时再减慢速度（有时称为“缓入/缓出”过渡）。这就是我们将在本节中实现的控制功能。\n\n![9781430245421_Fig15-01.jpg](img/9781430245421_Fig15-01.jpg)\n\
    \n图 15-1. 贝塞尔曲线\n\n## 准备工作\n\n在 Xcode 中新建一个 Cocoa 项目，并将其命名为`CurveEdit`。确保勾选*自动引用计数*，并将此类前缀设置为`CE`。\n\
    \n本应用的核心部分将全部位于视图对象中，但首先让我们处理视图周围的基础架构。我们将在此项目中坚持使用 MVC 架构，这将有助于确保我们创建的视图能够作为独立组件使用。用于显示每个控制点\
    \ x 和 y 值的文本字段将通过 Cocoa 绑定连接到我们的控制器对象，自定义视图本身也是如此。此应用中的模型将只是控制器类中的一组实例变量，但如果我们选择使用或创建真实的模型对象，所有视图同样可以轻松地绑定到该模型对象上。\n\
    \n新建一个名为`CECurveView`的`NSView`子类，暂时保持其实现不变。我们很快就会回头处理它。打开`MainMenu.xib`。从*对象库*中拖出一个*自定义视图*，并使用*身份检查器*将其类设置为`CECurveView`。将其大小调整为约\
    \ 240 x 240。接下来，我们需要连接应用代理和我们刚刚放入窗口的视图。为此，在辅助编辑器中打开`CEAppDelegate.h`文件，然后按住 Control\
    \ 键从`CECurveView`自定义视图拖拽到辅助编辑器窗口中的`CEAppDelegate.h`代码处。拖拽到现有`@property`声明下方时，应出现“插入输出口”提示。将新输出口命名为`curveView`。\n\
    \n我们还需要进行一些其他更改。我们将添加一个导入语句来引入`CECurveView`头文件，以及一些稍后通过 Cocoa 绑定使用的额外属性。在`.h`文件中添加以下内容：\n\
    \n```objc\n#import <Cocoa/Cocoa.h>\n#import \"CECurveView.h\"\n\n@interface CEAppDelegate\
    \ : NSObject <NSApplicationDelegate>\n\n@property (assign) IBOutlet NSWindow *window;\n\
    @property (weak) IBOutlet CECurveView *curveView;\n\n@property (assign) CGFloat\
    \ cp1X;\n@property (assign) CGFloat cp1Y;\n@property (assign) CGFloat cp2X;\n\
    @property (assign) CGFloat cp2Y;\n\n@end\n```\n\n然后切换到`.m`文件，并添加以下行：\n\n```objc\n\
    #import \"CEAppDelegate.h\"\n\n@implementation CEAppDelegate\n\n- (void)applicationDidFinishLaunching:(NSNotification\
    \ *)aNotification {\n    // 让 CECurveView 注意到我的更改\n    [self.curveView bind:@\"\
    cp1X\" toObject:self withKeyPath:@\"cp1X\"\n        options:nil];\n    [self.curveView\
    \ bind:@\"cp1Y\" toObject:self withKeyPath:@\"cp1Y\"\n        options:nil];\n\
    \    [self.curveView bind:@\"cp2X\" toObject:self withKeyPath:@\"cp2X\"\n    \
    \    options:nil];\n    [self.curveView bind:@\"cp2Y\" toObject:self withKeyPath:@\"\
    cp2Y\"\n        options:nil];\n    // 让我注意到 CECurveView 的更改\n    [self bind:@\"\
    cp1X\" toObject:self.curveView withKeyPath:@\"cp1X\"\n        options:nil];\n\
    \    [self bind:@\"cp1Y\" toObject:self.curveView withKeyPath:@\"cp1Y\"\n    \
    \    options:nil];\n    [self bind:@\"cp2X\" toObject:self.curveView withKeyPath:@\"\
    cp2X\"\n        options:nil];\n    [self bind:@\"cp2Y\" toObject:self.curveView\
    \ withKeyPath:@\"cp2Y\"\n        options:nil];\n    // 设置初始值\n    self.cp1X =\
    \ 0.5;\n    self.cp1Y = 0.0;\n    self.cp2X = 0.5;\n    self.cp2Y = 1.0;\n}\n\n\
    @end\n```\n\n如您所见，控制器类非常简单。它所做的只是声明用于访问控制点 x 和 y 值的属性，以及一个用于连接到`CECurveView`本身的`IBOutlet`，代表我们的`curveView`建立一些绑定（因为我们无法在\
    \ Interface Builder 中完成这些操作），并为控制点设置一些默认起始值。由于我们通过代码设置了此对象的绑定，因此`CECurveView`实例现在已经准备就绪（就我们的\
    \ nib 文件而言）。至此，我们可以关闭辅助编辑器。\n\n返回*对象库*，拖出一个标签，将其放置在`CECurveView`下方。将标签的标题更改为`X1:`。同时拖出一个文本字段，将其放置在标签旁边，让蓝色参考线指示正确的对齐方式。同时选中标签和文本字段，然后按`⌘D`复制它们。将新一组放置在第一个组下方，并将标签标题更改为`Y1:`。此表单将显示贝塞尔曲线中第一个控制点的\
    \ x 和 y 值。为两个文本字段分别创建绑定。对于每个字段，我们想将其 Value 属性绑定到`CEAppDelegate`对象，分别使用模型键路径`cp1X`和`cp1Y`。\n\
    \n同时选中两个标签和两个文本字段，复制它们（`⌘D`），并将新副本放置在第一组的右侧。这些字段将显示第二个控制点的值，因此将标签重命名为`X2:`和`Y2:`，并设置类似于第一组的绑定，但改用`cp2X`和`cp2Y`作为键路径。\n\
    \n请参考图 15-1 查看预期效果，妥善布局，并调整窗口大小以容纳新增内容。保存文件，然后*运行*项目，确保此时没有错误。最终的应用将允许我们编辑四个文本字段的内容。\n"
- fmt: "It will also complain that `CECurveView` isn’t key value coding compliant\
    \ for the key `cp1X`, which is true: we haven’t yet added that to the `CECurveView`,\
    \ but we’re about to change that!\n\n**Bezier Plumbing**\n\nLet’s get started\
    \ with the `CECurveView` class by establishing some infrastructure. `CECurveView`\
    \ needs to keep track of two control points, which we’ll set up as four floats,\
    \ each accessible through a property, just like we did for the controller class.\
    \ We also want to use a technique similar to the one we used for `MrSmiley` in\
    \ [Chapter 14](#9781430245421_Ch14.xhtml), so that the GUI scales to match whatever\
    \ size it’s rendered. This time, we’re going to set up fixed bounds so that we\
    \ can always draw a curve in a square between (0,0) and (1,1) on the plane, leaving\
    \ a little extra surrounding space, so we’ll add some code that sets the bounds\
    \ to a square between (-0.1,-0.1) and (1.1,1.1), and maintain those bounds no\
    \ matter how the view is resized. Take care of all that by adding the bold lines\
    \ shown here:\n\n```objectivec\n// CECurveView.h:\n#import <Cocoa/Cocoa.h>\n@interface\
    \ CECurveView : NSView {\n    NSRect myBounds;\n}\n@property (assign, nonatomic)\
    \ CGFloat cp1X;\n@property (assign, nonatomic) CGFloat cp1Y;\n@property (assign,\
    \ nonatomic) CGFloat cp2X;\n@property (assign, nonatomic) CGFloat cp2Y;\n@end\n\
    ```\n\nThen these lines to the `.m` file:\n\n```objectivec\n// CECurveView.m:\n\
    #import \"CECurveView.h\"\n@implementation CECurveView\n\n- (void)setCp1X:(CGFloat)f\
    \ {\n    self.cp1X = MAX(MIN(f, 1.0), 0.0);\n    [self setNeedsDisplay:YES];\n\
    }\n- (void)setCp1Y:(CGFloat)f {\n    self.cp1Y = MAX(MIN(f, 1.0), 0.0);\n    [self\
    \ setNeedsDisplay:YES];\n}\n- (void)setCp2X:(CGFloat)f {\n    self.cp2X = MAX(MIN(f,\
    \ 1.0), 0.0);\n    [self setNeedsDisplay:YES];\n}\n- (void)setCp2Y:(CGFloat)f\
    \ {\n    self.cp2Y = MAX(MIN(f, 1.0), 0.0);\n    [self setNeedsDisplay:YES];\n\
    }\n\n- (id)initWithFrame:(NSRect)frame {\n    self = [super initWithFrame:frame];\n\
    \    if (self) {\n        // Initialization code here.\n        myBounds = NSMakeRect(-0.1,\
    \ -0.1, 1.2, 1.2);\n        [self setBounds:myBounds];\n    }\n    return self;\n\
    }\n- (void)setFrameSize:(NSSize)newSize {\n    [super setFrameSize:newSize];\n\
    \    [self setBounds:myBounds];\n}\n- (void)drawRect:(NSRect)rect {\n    // Drawing\
    \ code here.\n}\n@end\n```\n\nNote that we’re implementing our own setters for\
    \ the properties, so we’ll need to mark the properties as `nonatomic`. The compiler\
    \ will note that we’re not implementing our own getters, so the compiler will\
    \ still generate those for us. In the setters, we’ll enforce a limited range on\
    \ the input value, making it fit in the range from 0.0 to 1.0. We’ll also mark\
    \ the window as “dirty” with `setNeedsDisplay:`, forcing the system to redraw\
    \ it whenever a property changes.\n\n**Drawing a Curve**\n\nNow let’s move on\
    \ to the fun part: drawing the curve itself. We’ll use preprocessor `#defines`\
    \ to establish values for colors and line widths, making it easier to spot them\
    \ and change them in order to tweak the appearance. Add these lines somewhere\
    \ near the top of `CECurveView.m`:\n\n```objectivec\n#define CP_RADIUS 0.1\n#define\
    \ CP_DIAMETER (CP_RADIUS*2)\n#define BACKGROUND_COLOR [NSColor whiteColor]\n#define\
    \ GRID_STROKE_COLOR [NSColor lightGrayColor]\n#define GRID_FILL_COLOR [NSColor\
    \ colorWithCalibratedWhite:0.9 alpha:1.0]\n#define CURVE_COLOR [NSColor blackColor]\n\
    #define LINE_TO_CP_COLOR [NSColor darkGrayColor]\n#define CP_GRADIENT_COLOR1 [NSColor\
    \ lightGrayColor]\n#define CP_GRADIENT_COLOR2 [NSColor darkGrayColor]\n```\n\n\
    We’ll implement the `drawControlPointAtX:y:` and `drawRect:` methods as shown\
    \ in the following example. The code for drawing the control points demonstrates\
    \ the use of the `NSGradient` class, which can be used to fill the inside of a\
    \ Bezier path instead of just a solid color fill.\n\n```objectivec\n- (void)drawControlPointAtX:(CGFloat)x\
    \ y:(CGFloat)y {\n    NSBezierPath *cp = [NSBezierPath bezierPathWithOvalInRect:\n\
    \        NSMakeRect(x - CP_RADIUS, y - CP_RADIUS,\n                   CP_DIAMETER,\
    \ CP_DIAMETER)];\n    NSGradient *g;\n    g = [[NSGradient alloc] initWithStartingColor:CP_GRADIENT_COLOR1\n\
    \                             endingColor:CP_GRADIENT_COLOR2];\n    [g drawInBezierPath:cp\n\
    \       relativeCenterPosition:NSMakePoint(0.0, 0.0)];\n}\n\n- (void)drawRect:(NSRect)rect\
    \ {\n    [NSGraphicsContext saveGraphicsState];\n\n    // draw the background\n\
    \    NSBezierPath *bg = [NSBezierPath bezierPathWithRoundedRect:myBounds\n   \
    \                                 xRadius:0.1 yRadius:0.1];\n    [BACKGROUND_COLOR\
    \ set];\n    [bg fill];\n\n    // draw the grid\n    NSBezierPath *grid1 = [NSBezierPath\
    \ bezierPath];\n    [grid1 moveToPoint:NSMakePoint(0.0, 0.0)];\n    [grid1 lineToPoint:NSMakePoint(1.0,\
    \ 0.0)];\n    [grid1 lineToPoint:NSMakePoint(1.0, 1.0)];\n    [grid1 lineToPoint:NSMakePoint(0.0,\
    \ 1.0)];\n    [grid1 lineToPoint:NSMakePoint(0.0, 0.0)];\n\n    [grid1 moveToPoint:NSMakePoint(0.5,\
    \ 0.0)];\n    [grid1 lineToPoint:NSMakePoint(0.5, 1.0)];\n    [grid1 moveToPoint:NSMakePoint(0.0,\
    \ 0.5)];\n    [grid1 lineToPoint:NSMakePoint(1.0, 0.5)];\n    [GRID_FILL_COLOR\
    \ set];\n    [grid1 fill];\n    [GRID_STROKE_COLOR set];\n    [grid1 setLineWidth:0.01];\n\
    \    [grid1 stroke];\n\n    // draw the lines leading to the control points\n\
    \    NSBezierPath *cpLines = [NSBezierPath bezierPath];\n    [cpLines moveToPoint:NSMakePoint(0.0,\
    \ 0.0)];\n    [cpLines lineToPoint:NSMakePoint(self.cp1X, self.cp1Y)];\n    [cpLines\
    \ moveToPoint:NSMakePoint(1.0, 1.0)];\n    [cpLines lineToPoint:NSMakePoint(self.cp2X,\
    \ self.cp2Y)];\n    [LINE_TO_CP_COLOR set];\n    [cpLines setLineWidth:0.01];\n\
    \    [cpLines stroke];\n\n    // draw the curve itself\n    NSBezierPath *bp =\
    \ [NSBezierPath bezierPath];\n    [bp moveToPoint:NSMakePoint(0.0, 0.0)];\n  \
    \  [bp curveToPoint:NSMakePoint(1.0, 1.0)\n      controlPoint1:NSMakePoint(self.cp1X,\
    \ self.cp1Y)\n      controlPoint2:NSMakePoint(self.cp2X, self.cp2Y)];\n    [CURVE_COLOR\
    \ set];\n    [bp setLineWidth:0.01];\n    [bp stroke];\n\n    // draw the control\
    \ points\n    [self drawControlPointAtX:self.cp1X y:self.cp1Y];\n    [self drawControlPointAtX:self.cp2X\
    \ y:self.cp2Y];\n\n    [NSGraphicsContext restoreGraphicsState];\n}\n```\n\nThis\
    \ sort of drawing code can make for some pretty long methods, but it’s often pretty\
    \ straightforward, as in `drawRect:` shown previously. Not a single loop or `if`\
    \ construct in the whole method! Note that unlike the Mr. Smiley code in [Chapter\
    \ 14](#9781430245421_Ch14.xhtml), this drawing code doesn’t refer to our view’s\
    \ bounds rect at all. Because we know that the bounds are always adjusted to contain\
    \ a square from (0,0) to (1,1), we make use of simple hardcoded values to draw\
    \ our graphics in and around this unit square.\n\nClick *Run* to run the app;\
    \ it should look something like [Figure 15-1](#9781430245421_Ch15.xhtml#Fig1).\
    \ We should be able to edit the values in the text fields (any values between\
    \ 0.0 and 1.0 work well) and see the control points and curve change accordingly.\n\
    \n**Watching the Mouse**\n\nBut entering numeric values into text fields isn’t\
    \ the point of this exercise; we want to drag those control points around. As\
    \ it turns out, this is pretty simple to do. `NSView` contains methods that are\
    \ automatically called whenever a user interacts with the view by clicking, dragging,\
    \ and so on. All we have to do is override a few methods, and we can respond to\
    \ every click, drag, and release of the mouse.\n\nLet’s start by adding a pair\
    \ of `BOOL` properties to our view to keep track of whether one of the control\
    \ points is currently being dragged. Add the following two lines to the `@interface`\
    \ declaration in `CECurveView.h`:\n\n```objectivec\n@property (assign) BOOL draggingCp1;\n\
    @property (assign) BOOL draggingCp2;\n```\n\nNow let’s add some methods to the\
    \ `@implementation` section of `CECurveView.m` in order to start intercepting\
    \ the mouse activity we want to watch. The first method, `mouseDown:`, will be\
    \ called whenever a user clicks in our view."
