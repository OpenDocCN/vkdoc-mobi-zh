    如前所述，`takeName:`和`takeMugshot:`方法都期望从详细信息视图中进行更新的控件调用。之前，我们在每个方法的末尾添加了对`[villainsTableView
    reloadData]`的调用。现在我们需要在之后添加另一个调用。在`takeName:`和`takeMugshot:`中，在末尾添加对`[self updateDetailViews]`的调用。这确保了无论用户在何处进行编辑（在表格视图或详细信息视图中），更改都会在两个位置得到反映。


    是时候再次编译并运行应用程序，看看我们是否能在表格视图中编辑了。此时，我们应该能够添加新的反派、编辑其属性，然后将其删除。我们仍然无法保存关于反派的任何信息；这将是下一章的主题。


    ## 总结


    本章通过一个简单的示例，演示了如何维护一个项目列表、在表格视图中显示它们，并在独立的控件集中编辑选中项的详细信息。我们学习了关于`NSTableView`如何使用其`dataSource`来访问显示和编辑的项目，并了解了当选择发生变化时，它如何通知其委托，从而使我们能够手动更新依赖于表格视图选择的其他视图中的内容。


    如果您熟悉其他桌面 GUI 开发环境，其中一些内容可能看起来有些陌生，但我们希望您能看到 Cocoa 所支持方法中的一些优势，例如在代码和 GUI 布局之间提供了清晰的划分。然而，此时我们需要坦白：到目前为止我们所采用的方式并不一定是
    Cocoa 中处理这类事情的最佳方法。尽管目前一切都很简单，但实际上我们一直是在向您展示解决这些问题的笨办法！在过去几年中，一种新的 GUI 编程方法已经在
    Cocoa 社区中扎根，并且变得越来越普遍。这项技术称为 Cocoa 绑定，它是第 7 章的主题。


    ## 第 7 章 Cocoa 绑定


    第 5 章和第 6 章介绍了如何将控制器对象连接到各种视图对象，既用于显示值，也用于响应用户动作来获取新值。

    '
- fmt: '在我们的示例中，通常每个视图有一个小的操作方法（当用户编辑视图中显示的值时触发），外加一个庞大的`updateDetailViews`方法来一次性更新所有视图的内容（每当选择发生变化时调用）。这对于简单的项目来说没问题，但这种方法存在一些问题。首先，存在可扩展性问题。假设不是十个视图，而是有一百个视图。按照这种方法，我们最终会得到一个控制器，它有一百个小的操作方法，以及一个*庞大的*方法，用于将值推送到所有视图中！此外，我们的控制器与其关联视图之间确实存在紧密耦合。例如，如果我们最初使用`NSDatePicker`来显示和编辑日期，但后来决定改用`NSTextField`，该怎么办？除了修改图形用户界面，我们还必须更改输出口、相应的操作方法以及`updateDetailViews`方法。


    幸运的是，Apple 早已认识到这个问题，自 Mac OS X 10.3 起，它加入了一项名为 *Cocoa bindings* 的技术，解决了其中的许多问题。Cocoa
    bindings 让我们可以使用 Interface Builder 来配置视图，使其或多或少自动地检索其值并将更改传回模型对象。我们所要做的就是告诉它要处理哪个控制器对象，以及它应该使用哪个字符串作为键来获取和设置值。我们可以通过自己的控制器类或使用
    Cocoa 提供的通用控制器类来访问模型对象。


    这导致了一种架构，其中我们自己的控制器类通常不需要知道任何关于正在使用的视图对象的具体信息。我们不需要拥有指向它们的实例变量，也不需要实现操作方法以获取它们的输入！我们的控制器最终只不过是模型对象和一堆视图对象之间的一个简单通道，并且从控制器的角度来看，有十个视图还是一百个视图都没有区别。


    在本章中，我们将学习如何将 Cocoa bindings 用于简单的控件，例如复选框、滑块和文本字段，以及复杂的控件（如表视图）。我们将创建绑定，通过几个
    Apple 自带的控制器类连接到模型对象。我们还将介绍如何使用`NSUserDefaults`及其支持绑定的同伴`NSUserDefaultsController`来处理应用程序中的偏好设置。


    ## 绑定到简单控件


    本章的示例应用程序可供角色扮演游戏中的游戏主持人在随机创建角色、怪物和地牢时使用。主窗口将包含一些按钮，当用户点击时，这些按钮会创建随机游戏对象，以及一些文本字段来显示结果。我们还将创建一个偏好设置窗口，用户可以在其中指定一些用于创建游戏对象的参数。我们不会实际进行这些随机对象的“投掷”操作。我们只会在用户点击某个按钮时显示所用参数的摘要。随机游戏对象的创建对于本书来说有点偏离主题，但如果您有兴趣，这对读者来说可能是一个有趣的练习！


    ### 创建 DungeonThing 项目与偏好设置窗口


    启动 Xcode，然后从菜单中选择 File ![image](images/arrow.jpg) New Project。选择 *Cocoa Application*，并在
